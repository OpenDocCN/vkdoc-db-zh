  \       PRIMARY KEY\nAttendees      MessagingUser    AKMessagingUser_Us... UNIQUE\n\
  Attendees      MessagingUser    AKMessagingUser_At... UNIQUE\nAttendees      MessagingUser\
  \    CHKMessagingUser_U... CHECK\nAttendees      MessagingUser    FKMessagingUser$Is...\
  \ FOREIGN KEY\nAttendees      UserConnection   FKMessagingUser$Co... FOREIGN KEY\n\
  Attendees      UserConnection   FKMessagingUser$Is... FOREIGN KEY\nAttendees   \
  \   UserConnection   AKUserConnection_U... UNIQUE\nAttendees      UserConnection\
  \   PKUserConnection      PRIMARY KEY\nMessages       Message          PKMessage\
  \             PRIMARY KEY\nMessages       Message          AKMessage_TimeUser...\
  \ UNIQUE\nMessages       MessageTopic     AKMessageTopic_Top... UNIQUE\nMessages\
  \       MessageTopic     FKTopic$Categorize... FOREIGN KEY\nMessages       MessageTopic\
  \     FKMessage$isCatego... FOREIGN KEY\nMessages       MessageTopic     PKMessageTopic\
  \        PRIMARY KEY\nMessages       MessageTopic     CHKMessageTopic_Us... CHECK\n\
  Messages       MessageTopic     CHKMessageTopic_Us... CHECK\nMessages       Topic\
  \            CHKTopic_Name_NotE... CHECK\nMessages       Topic            PKTopic\
  \               PRIMARY KEY\nMessages       Topic            AKTopic_Name      \
  \    UNIQUE\n```\n\n这能帮助你初步了解已创建的表以及是否遵循了命名标准。\n\n## 查看触发器信息\n\n最后，以下查询将显示已创建的触发器列表：\n\
  \n```\nSELECT OBJECT_SCHEMA_NAME(parent_id) + '.' + OBJECT_NAME(parent_id) AS TABLE_NAME,\n\
  \       name AS TRIGGER_NAME,\n       CASE WHEN is_instead_of_trigger = 1 THEN 'INSTEAD\
  \ OF' ELSE 'AFTER' END AS TRIGGER_FIRE_TYPE\nFROM   sys.triggers\nWHERE  type_desc\
  \ = 'SQL_TRIGGER' -- not a clr trigger\n  AND  parent_class_desc = 'OBJECT_OR_COLUMN'\
  \ -- DML trigger on a table or view\nORDER BY TABLE_NAME, TRIGGER_NAME;\n```\n\n\
  在本章正文中，我们创建了三个触发器。在下载资料中，我已完成实现数据库所需的另外七个触发器。以下结果包含了下载资料中包含的所有十个触发器：\n\n```\nTABLE_NAME\
  \                TRIGGER_NAME                            TRIGGER_FIRE_TYPE\n-------------------------\
  \ --------------------------------------- -----------------\nAttendees.MessagingUser\
  \   MessagingUser$InsteadOfInsertTrigger    INSTEAD OF\nAttendees.MessagingUser\
  \   MessagingUser$UpdateRowControlsTrigger  AFTER\nAttendees.UserConnection  UserConnection$InsteadOfInsertTrigger\
  \   INSTEAD OF\nAttendees.UserConnection  UserConnection$InsteadOfUpdateTrigger\
  \   INSTEAD OF\nMessages.Message          Message$InsteadOfInsertTrigger       \
  \   INSTEAD OF\nMessages.Message          Message$InsteadOfUpdateTrigger       \
  \   INSTEAD OF\nMessages.MessageTopic     MessageTopic$InsteadOfInsertTrigger  \
  \   INSTEAD OF\nMessages.MessageTopic     MessageTopic$InsteadOfUpdateTrigger  \
  \   INSTEAD OF\nMessages.Topic            Topic$InsteadOfInsertTrigger         \
  \   INSTEAD OF\nMessages.Topic            Topic$InsteadOfUpdateTrigger         \
  \   INSTEAD OF\n```\n\n## 查看 CHECK 约束\n\n如果需要查看数据库中的 CHECK 约束，可以使用以下查询：\n\n```\n\
  SELECT  TABLE_SCHEMA + '.' + TABLE_NAME AS TABLE_NAME,\n        TABLE_CONSTRAINTS.CONSTRAINT_NAME,\
  \ CHECK_CLAUSE\nFROM    INFORMATION_SCHEMA.TABLE_CONSTRAINTS\nJOIN    INFORMATION_SCHEMA.CHECK_CONSTRAINTS\n\
  \  ON    TABLE_CONSTRAINTS.CONSTRAINT_SCHEMA = CHECK_CONSTRAINTS.CONSTRAINT_SCHEMA\n\
  \  AND   TABLE_CONSTRAINTS.CONSTRAINT_NAME = CHECK_CONSTRAINTS.CONSTRAINT_NAME;\n\
  ```\n\n这将返回：\n\n```\nTABLE_NAME                CONSTRAINT_NAME                 \
  \       CHECK_CLAUSE\n------------------------- --------------------------------------\
  \ -----------------------\nMessages.MessageTopic     CHKMessageTopic_UserDefinedTopicNa...\
  \  (len(rtrim([UserDefined...\nMessages.MessageTopic     CHKMessageTopic_UserDefinedTopicNa...\
  \  ([UserDefinedTopicName]...\nAttendees.MessagingUser   CHKMessagingUser_UserHandle_Length...\
  \  (len(rtrim([UserHandle]...\nMessages.Topic            CHKTopic_Name_NotEmpty\
  \                  (len(rtrim([Name]))>(0))\n```\n\n这只是可用元数据的一瞥。在本书中，我们将充分利用 `INFORMATION_SCHEMA`\
  \ 和其他目录视图，而不是为你提供 SSMS 或 Data Tools 的截图。\n\n**提示**：`INFORMATION_SCHEMA` 和目录视图是 DBA\
  \ 了解数据库内容的重要资源。在本书中，我将尝试为你深入介绍其中一些视图，但关于 SQL Server 元数据的信息量本身就像另一本书那么丰富。\n\n\n##\
  \ 为你的结构进行单元测试\n\n编写表代码很有趣，但这绝非流程的终点。既然你已经创建了结构，就需要编写测试脚本，向表中插入有效和无效数据，以确保预期行为确实发生。市面上有一些自动化工具可以帮助你完成这项任务（快速浏览\
  \ SourceForge，你至少能发现五款可用工具）。\n\n许多人对于测试有不同的想法，特别是试图将数据库当作普通编码对象来处理，为对象设置状态（创建或读入一些数据），运行他们的代码（通常是存储过程），然后删除数据。这种技术在测试单个代码模块时有效，但当需要测试整个数据库，并且为了测试一个过程、一个约束而必须加载\
  \ 20 张表时，这就变得相当繁琐。\n\n在本节中，我将为你提供一个测试数据库结构的简化版本，你可以轻松免费地完成。其中，我将使用一个单一脚本来运行，并基本上将数据插入到你的整个数据库中。\n\
  \n到目前为止，在本章中，我们已经创建了一个用于生成完全空数据库的脚本。这就是我们将用于测试的数据库。性能和并发性在此阶段均不关心。对于这轮测试，我们想要确保数据库能保存和处理数据，并能捕获超出合理范围的数据。我说“合理”是因为，除非有真实理由，否则我们不会测试数据类型的最大最小值，因为我们信任\
  \ SQL Server 能够处理这些值。我们还假设外键约束能有效验证插入和更新操作，因此不会花时间去测试用无效键值违反约束会发生什么。我们将检查删除操作，以确保级联操作在需要的地方生效，而在不需要的地方不生效。我们会测试任何已构建的检查约束，因为这些很可能是问题所在；我们也会检查已创建的触发器是否同样正常工作。\n\
  \n### 注意\n\n全面的测试讨论超出了本书的范围，因为完整的测试需要整个团队的参与。单元测试通常是包括集成测试、用户测试、性能测试等在内的多个测试步骤中的第一步。这些步骤将与待测试的应用程序实现同步进行。在对我们的数据库结构进行单元测试时，目标仅仅是向自己证明我们创建的代码完成了其编程要求的最基本功能。\n\
  \n在文中，我将包含一个测试脚本的删减版本，你可以在下载文件中获取完整版。我们将处理两种类型的场景：预期成功的场景和预期失败的场景。对于预期成功的场景，我们将在语句执行后检查行数，看是否符合预期。如果引发错误，那将是不言自明的。测试遵循以下模式：\n\
  \n```\nif @@ROWCOUNT <> 1 THROW 50000, '操作失败描述', 16;\n```\n\n对于预期失败的语句，我们将使用包含 `TRY...CATCH`\
  \ 块的语句来捕获错误。如果没有发生错误，`THROW` 语句将强制引发一个错误。然后在 `CATCH` 块中，我们检查错误信息是否引用了我们正在测试的约束。\n\
  \n```\nBEGIN TRY\n    THROW 50000, '未引发错误', 1;\nEND TRY\nBEGIN CATCH\n    IF ERROR_MESSAGE()\
  \ NOT LIKE '%约束名称%'\n        THROW 50000, '测试失败', 16;\nEND CATCH\n```\n\n前面的例子是测试你结构的极简方法，但即使如此，对于一个较小的数据库，构建它也需要相当长的时间。随着表数量的增加，复杂性呈指数级上升，因为必须违反的表间关系变得可能更多。目标是构建一个测试脚本，加载一个充满数据的完整数据库，并在过程中测试失败情况（使用我们的技术来抑制预期错误），最终得到一个完整的数据库。\n\
  \n### 注意\n\n在下载文件中，我包含了一个名为 `第 6 章 - 数据库创建对象.sql` 的脚本文件，其中包含了创建数据库并返回元数据的最小化脚本。这将使你能够反复从一个干净的数据库开始，而无需运行整个章节的脚本。\n\
  \n第一步是包含 `DELETE` 语句，以清除数据库中的所有数据，除了作为基础加载部分的数据。此处的目标是使你的测试脚本可重复，这样你就可以一遍又一遍地运行它，特别是在遇到意外错误需要修复结构时。\n\
  \n```\nSET NOCOUNT ON;\nUSE ConferenceMessaging;\nGO\nDELETE FROM Messages.MessageTopic\
  \ ;\nDELETE FROM Messages.Message;\nDELETE FROM Messages.Topic WHERE TopicId > 0;\
  \ -- 保留用户定义的主题\nDELETE FROM Attendees.UserConnection;\nDELETE FROM Attendees.MessagingUser;\n\
  ```\n\n通过删除表中的数据，你将重置数据，但不会重置标识值和序列对象。这将有助于确保你不会依赖特定的标识值进行测试。接下来，我将向 `MessagingUser`\
  \ 表添加一个合法用户：\n\n```\nINSERT INTO [Attendees].[MessagingUser]\n([UserHandle],[AccessKeyValue],[AttendeeNumber]\n\
  ,[FirstName],[LastName],[AttendeeType]\n,[DisabledFlag])\nVALUES ('FredF','0000000000','00000000','Fred','Flintstone','Regular',0);\n\
  IF @@ROWCOUNT <> 1 THROW 50000, 'Attendees.MessagingUser 单行插入失败', 16;\n```\n\n接下来，我将测试输入违反其中一个检查约束的数据。在下一个语句中，我将输入一个用户句柄过短的数据：\n\
  \n```\nBEGIN TRY -- 检查 UserHandle 检查约束\n    INSERT INTO [Attendees].[MessagingUser]\n\
  \    ([UserHandle],[AccessKeyValue],[AttendeeNumber]\n    ,[FirstName],[LastName],[AttendeeType]\n\
  \    ,[DisabledFlag])\n    VALUES ('Wil','0000000000','00000001','Wilma','Flintstone','Regular',0);\n\
  \    THROW 50000, '未引发错误', 1;\nEND TRY\nBEGIN CATCH\n    IF ERROR_MESSAGE() NOT\
  \ LIKE\n    '%CHKMessagingUser_UserHandle_LengthAndStart%'\n        THROW 50000,\
  \ '检查 Messages.Topic.Name 约束未生效', 1;\nEND CATCH;\n```\n\n当你执行这个批处理时，如果预期失败的约束名称出现在错误信息中（如果你构建了和我相同的数据库，它会出现），你就不会得到错误提示。然后，我将输入另一行因句柄中使用了非字母数字字符而违反检查约束的数据：\n\
  \n```\nBEGIN TRY -- 检查 UserHandle 检查约束\n    INSERT INTO [Attendees].[MessagingUser]\n\
  \    ([UserHandle],[AccessKeyValue],[AttendeeNumber]\n    ,[FirstName],[LastName],[AttendeeType]\n\
  \    ,[DisabledFlag])\n    VALUES ('Wilma@','0000000000','00000001','Wilma','Flintstone','Regular',0);\n\
  \    THROW 50000, '未引发错误', 1;\nEND TRY\nBEGIN CATCH\n    IF ERROR_MESSAGE() NOT\
  \ LIKE\n    '%CHKMessagingUser_UserHandle_LengthAndStart%'\n        THROW 50000,\
  \ '检查 Messages.Topic.Name 约束未生效', 16;\nEND CATCH;\n```\n\n### 提示\n\n在前面的代码块中，语句失败了，但没有返回错误。其目标是让你可以反复运行测试脚本，除了看到表中增加行之外，没有任何输出。然而在实践中，只看到有问题的输出会更清晰。如果你愿意，可以根据你的需要向测试脚本添加更多输出。\n\
  \n\n\n### 测试唯一约束与错误处理\n\n跳过一些较简单的测试项，我们现在来测试基于 `RoundedMessageTime`（将 `MessageTime`\
  \ 四舍五入到小时）设置的唯一约束。（示例代码中包含了一些支持这些测试的数据。）为了测试这个约束，我将向表中插入一行，然后立即在完全相同的时间再插入另一行。如果你恰好在整点时分在一台速度较慢的机器上运行此测试，虽然可能性极低，但两条语句可能在同一秒（甚至可能是同一毫秒）内执行。\n\
  \n```sql\nINSERT INTO [Messages].[Message]\n([MessagingUserId]\n,[SentToMessagingUserId]\n\
  ,[Text]\n,[MessageTime])\nVALUES\n((SELECT MessagingUserId FROM Attendees.MessagingUser\
  \ WHERE UserHandle = 'FredF')\n,(SELECT MessagingUserId FROM Attendees.MessagingUser\
  \ WHERE UserHandle = 'WilmaF')\n,'It looks like I will be late tonight'\n,SYSDATETIME());\n\
  IF @@ROWCOUNT <> 1 THROW 50000,'Messages.Messages Single Insert Failed',16;\nGO\n\
  ```\n\n接着，这条语句将引发一个错误，该错误应被捕获到 `CATCH` 块中：\n\n```sql\nBEGIN TRY --Unique Message\
  \ Error...\nINSERT INTO [Messages].[Message]\n([MessagingUserId]\n,[SentToMessagingUserId]\n\
  ,[Text]\n,[MessageTime])\nVALUES\n--Row1\n((SELECT MessagingUserId FROM Attendees.MessagingUser\n\
  WHERE UserHandle = 'FredF')\n,(SELECT MessagingUserId FROM Attendees.MessagingUser\n\
  WHERE UserHandle = 'WilmaF')  --\n,'It looks like I will be late tonight'\n,SYSDATETIME()),\n\
  --Row2\n((SELECT MessagingUserId FROM Attendees.MessagingUser\nWHERE UserHandle\
  \ = 'FredF')\n,(SELECT MessagingUserId FROM Attendees.MessagingUser\nWHERE UserHandle\
  \ = 'WilmaF')  --\n,'It looks like I will be late tonight'\n,SYSDATETIME());\nTHROW\
  \ 50000,'No error raised',1;\nEND TRY\nBEGIN CATCH\nIF ERROR_MESSAGE() NOT LIKE\
  \ '%AKMessage_TimeUserAndText%'\nTHROW 50000,'Unique Message Error didn''t work\
  \ (check times)',1;\nEND CATCH;\n```\n\n如果错误发生，它会被捕获，我们就知道约束正在起作用。如果没有错误发生，那么无错误的\
  \ `THROW` 语句将会执行。最后，我将在文中展示我们为这个数据库必须处理的最复杂的错误检查块。这是针对消息（message）和消息主题（message `Topic`）的。在下载代码中，我插入了两个成功的案例，首先是针对特定主题的，然后是带有用户自定义主题的。在下一个代码块中，我将展示失败的案例。\n\
  \n```sql\n--Do this in a more natural way. Usually the client would pass in these\
  \ values\nDECLARE @messagingUserId int, @text nvarchar(200),\n@messageTime datetime2,\
  \ @RoundedMessageTime datetime2(0);\nSELECT @messagingUserId = (SELECT MessagingUserId\
  \ FROM Attendees.MessagingUser\nWHERE UserHandle = 'FredF'),\n@text = 'Oops Why\
  \ Did I say That?', @messageTime = SYSDATETIME();\n--uses the same algorithm as\
  \ the check constraint to calculate part of the key\nSELECT @RoundedMessageTime\
  \ = (\nDATEADD(HOUR,DATEPART(HOUR,@MessageTime),CONVERT(datetime2(0),CONVERT(date,@MessageTime))));\n\
  IF NOT EXISTS (SELECT * FROM  Messages.Topic WHERE Name = 'General Topic')\nINSERT\
  \ INTO Messages.Topic(Name, Description)\nVALUES('General Topic','General Topic');\n\
  BEGIN TRY\nBEGIN TRANSACTION;\n--first create a new message\nINSERT INTO [Messages].[Message]\n\
  ([MessagingUserId],[SentToMessagingUserId]\n,[Text]        ,[MessageTime])\nVALUES\
  \ (@messagingUserId,NULL,@text, @messageTime);\n--then insert the topic, but this\
  \ will fail because General topic is not\n--compatible with a UserDefinedTopicName\
  \ value\nINSERT INTO Messages.MessageTopic(MessageId, TopicId, UserDefinedTopicName)\n\
  VALUES(\n(SELECT MessageId\nFROM   Messages.Message\nWHERE  MessagingUserId = @messagingUserId\n\
  AND  Text = @text\nAND  RoundedMessageTime = @RoundedMessageTime),\n(SELECT TopicId\n\
  FROM Messages.Topic\nWHERE Name = 'General'),'Stupid Stuff');\nCOMMIT TRANSACTION;\n\
  END TRY\nBEGIN CATCH\nIF ERROR_MESSAGE() NOT LIKE\n'%CHKMessageTopic_UserDefinedTopicName_NullUnlessUserDefined%'\n\
  THROW 50000,'UserDefined Message Check Failed',1;\nEND CATCH;\n```\n\n## 总结与经验\n\
  \n下载中提供的测试脚本只是一个非常基础的测试脚本示例，要创建一个好的单元测试脚本需要花费一些时间。我为这个简单的六表数据库创建这个脚本就花了不止几个小时。实际上，我通常从一个简单的脚本开始，只创建数据而不测试\
  \ `CHECK` 约束、唯一约束等，因为在我将数据库交给开发人员之前，很少有时间完成完整的测试脚本。\n\n一旦完成了构建单元测试的过程，你会发现它帮助你发现了设计中的问题以及约束方面的任何问题。在很多情况下，你可能不想立即将某些约束部署到开发服务器上，而是要与开发人员协作，在他们准备好时再应用。作为一名数据库开发人员，同时也是一名曾经的界面开发人员，我个人喜欢数据库能防止我违反基本规则，所以对于什么方式最适合你合作/打交道的人，可能因人而异（your\
  \ mileage may vary）。我可以说的是，在我创建这个脚本的过程中，我发现了为本章创建的示例设计中的一些较为重要的问题，如果不是在测试设计，这些问题很可能不会被我自己注意到。\n\
  \n\n\n## 最佳实践\n\n以下是实施数据库结构时最重要的一套最佳实践。请特别注意关于 `UNIQUE` 约束的建议。仅仅在表上使用代理键是实施数据库时最糟糕的错误之一。\n\
  \n### 理解关系引擎并明智选择\n在 SQL Server 中，经典的磁盘引擎模型和内存中模型并存，这让你拥有比以往更多的选择来构建高并发的数据库解决方案。绝大多数关系型数据库项目并不需要内存中模型，但对于那些需要的项目，你可以为数据库中的部分或全部表获得极高的性能。\n\
  \n### 投资于数据库生成工具\n在你明确了工具应该做什么之后再做这件事。手动实施表、列、关系等是项繁琐且痛苦的任务。有许多优秀的工具，它们既可以作为逻辑数据建模工具，也能生成这些对象，有时甚至能生成将在接下来三章中涉及的对象和代码。\n\
  \n### 保持规范化\n尽可能地保持在第 5 章中设计的规范化。这将有助于更好地保护数据，并能更好地适应变化。\n\n### 制定真正的对象命名策略\n牢记基本原则：\n\
  *   给所有对象起一个相对用户友好的名称。确保每个对象、列等的用途是显而易见的——至少对支持人员而言——如果可能的话，无需深入查阅文档。\n*   表的名称要么全部使用复数，要么全部使用单数。一致性是关键。\n\
  *   列的名称全部使用单数。\n*   我将对表和列使用单数名称。\n\n### 开发模板域\n在任何需要相似数据类型的情况下都重用它。这减少了实施时间，也让数据使用者感到高兴，因为每次他们看到一个名为\
  \ `Description` 的列时，它很可能具有与其他类似列相同的特性。\n\n### 仔细为每列选择数据类型和可空性\n这些是保持数据干净纯粹的第一道数据保护。此外，不恰当的数据类型可能导致数字精度问题，甚至性能问题。\n\
  \n### 确保每个表至少有一个不包含人工值的 `唯一性` 约束\n考虑使用 `IDENTITY` 列作为主键是个好主意。然而，如果这是表上唯一的 `唯一性`\
  \ 约束，那么表的实际列中可能会（并且通常将会）出现重复——这是个坏主意。\n\n### 使用外键约束实施外键\n它们速度很快，而且无论客户端犯了什么错误，只要存在外键约束，表之间的关系就不会被破坏。\n\
  \n### 记录并编写脚本\n使用扩展属性来记录你的对象可能非常有价值。最重要的是，当你在数据库中创建对象时，保留 T-SQL 代码的脚本，以便在迁移到质量保证和生产环境时后续使用。进一步将你的脚本保存在源代码控制仓库中，绝对是一个良好的后续步骤，这样你就可以在一个整洁的位置看到你当前的状态、要去哪里以及曾经在哪里。\n\
  \n### 开发测试脚本\n尽可能多地测试你的结构。测试常常是数据库实现中被遗忘的步骤，但良好的测试对于了解你的设计是否有效至关重要。\n\n## 部署生命周期\n\
  \n当你完成 DDL 并尽可能完成单元测试时，通常还有其他人正在等待构建用户界面、报告、对象模型等。因此，当你的开发过程进行到 DDL 准备就绪的阶段时，事情就进入实质性阶段了。\n\
  \n下一步是为你的队友提供一个真实的数据库来使用，一个你不会反复删除并重新创建的数据库。部署数据库脚本有两个步骤：\n\n### 全新的数据库\n这很简单。只需使用你用于测试的脚本。遗憾的是，这通常对一个数据库只能使用一次，而在你将需要以下步骤的数百到数千次中，这只是第一次。\n\
  \n### 随后的数据库构建\n数据库与大多数其他类型的软件编程不同，因为表具有状态信息。如果你更改了设计，就必须将数据适配到新对象中。我采用的方法是生成用于测试的数据库，并将其视为“模型”数据库。没有代码，没有数据（除了模型/域数据），只有设计中的内容。然后我使用比较工具生成模型数据库和实时数据库之间的差异，验证脚本，并应用。\n\
  \n我们需要稍微讨论一下这个过程的第二步。所描述的是对无数种可能应用变更方法的一种简化。我使用上述创建模型数据库的过程，然后将其与使用 Redgate 的 SQL\
  \ Source Control 工具镜像在源代码控制中的数据库进行比较，并应用变更。（微软的数据工具作为其工具集的一部分也具有类似功能。）在签入变更后，这与\
  \ Redgate 的 SQL Compare 工具一起使用，将结构变更应用到多个开发者服务器，然后是开发、测试，最后是生产服务器。\n\nSQL Server\
  \ Data Tools 内置了生命周期步骤，如果你觉得合适，这个工具的工作方式更像 Visual Studio 程序员所习惯的。其他公司也有其他工具来帮助管理数据库变更生命周期。\n\
  \n我在本节倡导的主要理念是，你保留一份从建模工具或脚本集创建的原始数据库副本，然后在其上运行你的单元测试。从那里，找出一种适合你的方式将你的变更传达给团队的其他成员。\n\
  \n## 总结\n\n这是漫长的一章，涵盖了大量内容。理解如何构建表以及它们是如何实施的，是每位数据库设计师知识体系的支柱。\n\n在确认模型准备好实施后，我深入研究了\
  \ SQL Server 表，逐步介绍了使用 `CREATE TABLE` 和 `ALTER TABLE` 语法创建数据库的过程，包括添加和创建表、添加约束和修改列，甚至创建触发器来管理自动维护的列。给出了命名表、列、索引和约束的一般准则。良好命名的关键在于一致性，如果我在此建议的命名标准对你来说显得丑陋、混乱或只是古怪，请选择你自己的标准。对于任何命名约定来说，一致性都是最重要的。\n\
  \n本章最重要的两节是关于选择数据类型和实施唯一性约束。我通过讨论为每个表选择主键和至少一个自然键的过程来完成本章。当然，关于测试的那节也相当重要，因为良好的测试是发现那些明显错误的关键，一些开发人员会急切地向任何愿意倾听的人指出，使用约束、触发器等会使过程变得多慢。\n\
  \n在本书的其余部分，我们将持续扩展本章的主题，构建越来越复杂的对象，并更深入地探究 SQL Server 的行为，这些将把你从本章的简单设计带入，让你能够创建复杂、高性能的数据库解决方案。\n\
  \n\n"
- '# 7. 利用检查约束与触发器扩展数据保护


  > 安全是发生在你耳中的事物，而非你握在手中的东西。——杰夫·库珀，美国海军陆战队员，现代手枪射击技术的创始人


  在数据库实现中，我观察到的最奇怪的现象之一是，人们花费大量时间设计正确的数据库存储（至少在他们看来是大量的时间），然后却让数据处于无保护状态，将表或多或少地视为可以接受任何东西的容器，选择让数据库层之外的代码承担所有的数据保护工作。老实说，我理解这种诱惑，因为你在项目早期阶段应用的约束越多，开发难度就越大，而且程序员们真心相信他们能捕获所有问题。问题在于，几乎没有办法
  100%确保所编写的所有代码都能始终强制执行每一条规则。


  反对使用自动强制数据保护的第二个论点是，程序员希望完全控制他们将收到的错误信息，以及可能改变数据的事件。我对此也表示赞同，只要这是完全可信的。当表本身拒绝不良数据时，你可以确信它不包含不良数据（至少在你所设计的“不良数据”定义范围内）。而如果用户界面需要重复需求中已指定的规则，这也是完全合理的。数据层的错误信息提示非常糟糕，即便使用一些技术将错误信息映射到描述。我们并非生活在一个大型机、批处理的世界，但有许多事情是数据层可以完美处理而外部代码无法做到的（当然，除非对数据库中的所有数据持锁）。


  也许，在理想世界中，你可以仔细控制所有数据输入，但现实中，数据库设计好后就移交给程序员和用户去“做他们想做的事”。那些烦人的用户会立即利用你设计中的任何弱点，以满足他们“以为自己一开始就提出了”的需求。无论我多少次忘记在应该使用
  `UNIQUE` 约束的地方应用它，数据重复最终都会开始出现。最终，用户感知取决于他们从你的数据库中检索到的数据的可靠性和完整性。如果他们在数据集中发现数据异常（通常表现为报表数值的偏差），他们对整个应用的信心会下降得比跳伞的大象（它打包了午餐而不是降落伞）还快。


  我希望你在阅读本章（并记住前面章节的内容）时能体会到一点，即如果可能的话，数据存储层应该负责保护基本的数据完整性。我们在前一章介绍了外键、唯一约束和一些检查约束。在本章中，我将进一步深入，展示在需要时可以采取的一些更深层次的例子。


  关于在多个位置放置代码的概念（例如，在数据输入框和检查约束中同时检查正值）的一个论点是，这样做：


  *   对性能不利

  *   增加工作量


  正如 C.S.刘易斯在其著作《地狱来鸿》中借一个反派角色之口指出的那样：“通过掺杂一点真相，他们的谎言变得更强有力。”事实是，从某个角度来看，这些确实是真实的陈述，但这两个论点都忽略了重点。我们必须解决的真正问题是数据可以来自多个来源：


  *   使用定制、精良前端工具的用户

  *   使用通用数据操作工具（如 Microsoft Access）的用户

  *   从外部源导入数据的例程

  *   数据管理员为修复用户错误而执行的原始查询


  这些都为你的完整性方案带来了不同的问题。最重要的是，这些场景（可能除了第二种）几乎构成了每个已开发数据库系统的一部分。为了最好地处理每种场景，必须对数据进行保护，使用无需用户（甚至是那位非常谨慎地修复数据的
  DBA）承担责任的机制。


  如果你决定在直接数据库层之外的其他层实现数据逻辑，你必须确保你实现了它——并且更重要的是，在每一个客户端中正确地实现了它。如果你更新了逻辑，你无论如何都必须在多个位置进行更新。如果一个客户端被“淘汰”并引入了新的客户端，逻辑必须在该新客户端中复制。如果你需要在多个地方编写代码，你更容易出现编码错误。将数据保护在单一位置有助于防止程序员忘记在某个情况下强制执行规则，即使他们在其他所有地方都记得。如果你收到错误（例如，当你尝试存储像
  `''A'' + 20` 这样不合逻辑的东西并期望它返回一个整数时），你就知道用户界面需要覆盖一个它未曾考虑到的场景。


  更重要的是，由于并发性，每个语句都可能因为死锁、超时，或者在用户界面中验证的数据在甚至几微秒前就已不再处于相同状态而失败。在第 11 章中，我们将讨论并发性，但可以这么说，由并发性问题引起的错误往往在表面上极其随机，并且必须被视为随时可能发生。而并发性是仅在客户端层进行完整性检查的棺材上的最后一颗钉子。除非你精心地将所有用户锁定在你正在使用的数据库对象之外，否则状态可能会改变，并发生数据库错误。这些错误烦人吗？是的，它们确实烦人，但它们是拥有优秀数据完整性与完全相反情况之间的最后一道防线。


  在本章中，我将介绍在 SQL Server 中强制实施数据完整性两个构建块，首先是使用声明性对象：检查约束（允许你在表的新行上定义谓词）和触发器（一种存储过程式的对象，在表的内容更改后触发）。


  在 SQL Server 2016 中，与内存中对象配合使用的原生编译模型支持检查约束和触发器。触发器也可以使用基于 CLR 的对象编写。在本章中，我将仅关注磁盘模型对象。在第
  13 章中，当我们讨论编写代码来访问我们创建的表时，我将涵盖解释模块和本机模块在代码上的一些差异，这种差异很大，并且决定了在触发器和检查约束中可以编写什么代码。原生编译会随着版本更新而改进（并且预计在
  Azure DB 产品中会持续改进），但截至 2016 年，它仍然相当有限。在可下载的附录 B 中，我将包含一个关于编写内存中触发器的部分。



  ## 检查约束


  检查约束属于声明性数据保护选项的一类。基本上，约束是 SQL Server 用于自动在单列或单行上实施数据完整性的机制。你应尽可能广泛地使用约束来保护数据，因为它们简单，并且在大多数情况下开销极小。


  SQL Server 所有约束（`DEFAULT` 约束除外）最强大的一个方面是，查询优化器可以利用它们来优化查询，因为约束向优化器提供了关于数据某些额外质量方面的信息。例如，假设你在某个列上放置了一个约束，要求该列的所有值必须介于
  `5` 和 `10` 之间。如果执行一个查询，请求该列值大于 `100` 的所有行，优化器甚至无需查看数据就能知道没有行符合条件。


  SQL Server 有五种声明性约束：


  *   `NULL`：决定列是否接受 `NULL` 值。虽然 `NULL` 约束从技术上讲并非你添加的命名约束，但它们通常被视为约束。

  *   `PRIMARY KEY` 和 `UNIQUE` 约束：用于确保你的行在给定的键列组合上只包含唯一的值组合。

  *   `FOREIGN KEY`：用于确保任何迁移的键值仅包含与其引用的键列相匹配的有效值。

  *   `DEFAULT`：用于在用户未提供值时，为列设置可接受的默认值。（有些人不将默认值视为约束，因为它们不限制更新。）

  *   `CHECK`：用于限制可输入到单列或整行中的值。


  我们已经在 第 6 章 中详细介绍了 `NULL`、`PRIMARY KEY`、`UNIQUE` 和 `DEFAULT` 约束；它们非常直接，使用方式变化不大。在本节中，我将重点通过示例展示使用
  `CHECK` 约束为列/行实现数据保护模式的各种方法。你使用 `CHECK` 约束来禁止将不恰当的数据输入到表的列中。`CHECK` 约束在 `DEFAULT`
  约束（因此你不能指定会与 `CHECK` 约束冲突的默认值）和 `INSTEAD OF` 触发器（本章稍后介绍）之后执行，但在 `AFTER` 触发器之前执行。`CHECK`
  约束不会影响正在插入或删除的值，而是用于验证所提供值的有效性。


  关于约束最常见的抱怨之一是，你会收到极其糟糕的错误信息。这也是我最大的抱怨之一，虽然你对此几乎无能为力，但我将在本章后面提出一个解决方案。理解一个重要事项对你大有裨益：所有
  DML（和 DDL）语句都应该包含错误处理，就好像数据库可能会返回错误一样——因为它确实可能。


  `CHECK` 约束有两种类型：列约束和表约束。列约束引用单个列，当修改中引用了单个列时使用。当条件中引用了多个列时，`CHECK` 约束被视为表约束。幸运的是，你无需担心将约束声明为列约束还是表约束。当
  SQL Server 编译约束时，它会验证是否需要检查多个列，并设置适当的内部值。


  我们将探讨使用两种方法构建 `CHECK` 约束：


  *   简单表达式

  *   使用用户定义函数的复杂表达式


  这两种方法类似，但使用函数可以构建更复杂的约束，尽管函数中的代码可能更复杂且难以管理。在本节中，我们将查看一些使用每种方法构建的约束示例；然后，我们将探讨一个处理约束错误的方案。不过，首先，让我们建立一个简单的模式，作为本节示例的基础。


  本节关于创建 `CHECK` 约束的示例使用了图 7-1 中所示的示例表。


  ![A978-1-4842-1973-7_7_Fig1_HTML.jpg](img/A978-1-4842-1973-7_7_Fig1_HTML.jpg)


  图 7-1。


  示例模式


  要创建和填充表，请执行以下代码（在下载资源中，我包含了一个用于名为 `Chapter` `7` 的数据库的简单创建脚本，并将所有对象放入该数据库）：


  ```sql

  CREATE SCHEMA Music;

  GO

  CREATE TABLE Music.Artist

  (

  ArtistId int NOT NULL,

  Name varchar(60) NOT NULL,

  CONSTRAINT PKArtist PRIMARY KEY CLUSTERED (ArtistId),

  CONSTRAINT PKArtist_Name UNIQUE NONCLUSTERED (Name)

  );

  CREATE TABLE Music.Publisher

  (

  PublisherId              int CONSTRAINT PKPublisher PRIMARY KEY,

  Name                     varchar(20),

  CatalogNumberMask        varchar(100)

  CONSTRAINT DFLTPublisher_CatalogNumberMask DEFAULT (''%''),

  CONSTRAINT AKPublisher_Name UNIQUE NONCLUSTERED (Name),

  );

  CREATE TABLE Music.Album

  (

  AlbumId int NOT NULL,

  Name varchar(60) NOT NULL,

  ArtistId int NOT NULL,

  CatalogNumber varchar(20) NOT NULL,

  PublisherId int NOT NULL,

  CONSTRAINT PKAlbum PRIMARY KEY CLUSTERED(AlbumId),

  CONSTRAINT AKAlbum_Name UNIQUE NONCLUSTERED (Name),

  CONSTRAINT FKArtist$records$Music_Album

  FOREIGN KEY (ArtistId) REFERENCES Music.Artist(ArtistId),

  CONSTRAINT FKPublisher$Published$Music_Album

  FOREIGN KEY (PublisherId) REFERENCES Music.Publisher(PublisherId)

  );

  ```


  然后使用以下语句播种数据：


  ```sql

  INSERT  INTO Music.Publisher (PublisherId, Name, CatalogNumberMask)

  VALUES (1,''Capitol'',

  ''[0-9][0-9][0-9]-[0-9][0-9][0-9a-z][0-9a-z][0-9a-z]-[0-9][0-9]''),

  (2,''MCA'', ''[a-z][a-z][0-9][0-9][0-9][0-9][0-9]'');

  INSERT  INTO Music.Artist(ArtistId, Name)

  VALUES (1, ''The Beatles''),(2, ''The Who'');

  INSERT INTO Music.Album (AlbumId, Name, ArtistId, PublisherId, CatalogNumber)

  VALUES (1, ''The White Album'',1,1,''433-43ASD-33''),

  (2, ''Revolver'',1,1,''111-11111-11''),

  (3, ''Quadrophenia'',2,2,''CD12345'');

  ```


  这种设计的一个可能问题是，它对于一个完整的解决方案来说规范化程度不够。出版商通常有一个在给定时间点有效的掩码，但一切都会变化。如果出版商延长了其目录编号的长度或更改为新格式，旧数据会怎样？对于一个运行正常的系统，拥有一个发布日期列和一个对给定日期范围有效的目录编号掩码将很有价值。当然，如果你按照所示方式实现表，有进取心的用户为了绕过不恰当的设计，会创建诸如
  `''MCA 1989-1990''`、`''MCA 1991-1994''` 等出版商行，从而为未来的报告需求搞乱数据，因为那时，你将需要做大量工作来关联来自
  MCA 公司的值（而且你的表甚至技术上都不符合第一范式！）。


  作为检查约束的第一个例子，考虑这样一个业务规则：不允许名称包含 `''Pet''` 后跟 `''Shop''` 的艺术家。你可以将规则编码如下（注意，所有示例都假设不区分大小写的排序规则，这几乎是常规情况）：


  ```sql

  ALTER TABLE Music.Artist WITH CHECK

  ADD CONSTRAINT CHKArtist$Name$NoPetShopNames

  CHECK (Name NOT LIKE ''%Pet%Shop%'');

  ```


  然后，通过尝试插入一个违规值的新行进行测试：


  ```sql

  INSERT INTO Music.Artist(ArtistId, Name)

  VALUES (3, ''Pet Shop Boys'');

  ```


  这将返回以下结果：




  ### 检查约束冲突示例


  ```

  Msg 547, Level 16, State 0, Line 1

  The INSERT statement conflicted with the CHECK constraint "CHKArtist$Name$NoPetShopNames".
  The conflict occurred in database "Chapter7", table "Music.Artist", column ''Name''.

  ```


  这让我的音乐收藏数据库至少能远离一支 80 年代的乐队。


  ## 使用 `WITH NOCHECK` 添加约束


  当你创建一个`CHECK`约束时，`WITH NOCHECK`设置（默认是`WITH CHECK`）让你有机会在添加约束时不检查表中的现有数据。


  让我们添加一行我未必想出现在表中的音乐家数据：


  ```

  INSERT INTO Music.Artist(ArtistId, Name)

  VALUES (3, ''Madonna'');

  ```


  在后续过程中，希望数据库不再添加名字中包含“Madonna”的艺术家，但如果你尝试添加一个检查约束


  ```

  ALTER TABLE Music.Artist WITH CHECK

  ADD CONSTRAINT CHKArtist$Name$noMadonnaNames

  CHECK (Name NOT LIKE ''%Madonna%'');

  ```


  你看到的不会是你所期望的那句愉快的“Command(s) completed successfully.”，而是下面这条信息：


  ```

  Msg 547, Level 16, State 0, Line 1

  The ALTER TABLE statement conflicted with the CHECK constraint "CHKArtist$Name$noMadonnaNames".
  The conflict occurred in database "Chapter7", table "Music.Artist", column ''Name''.

  ```


  理想情况下，你会接着修改表中的内容以满足约束的要求。为了让约束能够被添加，你可能会使用`WITH NOCHECK`而非`WITH CHECK`来指定约束，因为你现在想允许这个新约束存在，但表中有与之冲突的数据，并且修复或清理现有数据的代价被认为过高。


  ```

  ALTER TABLE Music.Artist WITH NOCHECK

  ADD CONSTRAINT CHKArtist$Name$noMadonnaNames

  CHECK (Name NOT LIKE ''%Madonna%'');

  ```


  该语句被执行以将检查约束添加到表定义中，而使用`NOCHECK`意味着无效值不会影响约束的创建。这在有些情况下是可以的，但也可能非常令人困惑，因为任何时候修改语句引用该列时，`CHECK`约束都会被触发。下次你尝试将表的值设置为同样的错误值时，就会发生错误。在下面的语句中，我只是将表的每一行都设置为其本身已存储的相同名称：


  ```

  UPDATE Music.Artist

  SET Name = Name;

  ```


  这产生了以下错误消息：


  ```

  Msg 547, Level 16, State 0, Line 1

  The UPDATE statement conflicted with the CHECK constraint "CHKArtist$Name$noMadonnaNames".
  The conflict occurred in database "Chapter7", table "Music.Artist", column ''Name''.

  ```


  “什么？”大多数用户可能会惊呼（嗯，除非他们是凌晨三点想知道发生了什么的支持人员，那样的话他们会升级为“什么？！？！”）。“如果这个值已经在表里了，它不就应该是没问题的吗？”用户是对的。处理格式变更，或允许旧数据满足一个标准而新数据满足另一个标准的一个策略，可以是为值包含一个时间范围。`CHECK
  Name NOT LIKE ''%Madonna%'' OR RowCreateDate < ''20141131''` 可能是一个合理的折中方案——只要用户理解他们的查询是怎么回事。


  使用`NOCHECK`并且让数值不被检查，在很多方面上几乎比干脆不设约束更糟糕。


  ### 提示


  如果一个数据值根据外部标准可能对也可能错，最好不要在强制执行时过于严苛。事实是，除非你能 100%确定，否则当你以后使用数据时，仍然需要在使用前确保数据是正确的。


  ## 约束的可信度与优化器


  除了明显的数据完整性原因外，使约束变得出色的因素之一是：如果约束是使用`WITH CHECK`构建的，并且约束没有使用任何函数，只使用了简单的比较（如小于、大于等），那么优化器在构建执行计划时可以利用这一事实。例如，想象你有一个约束表明某个值必须小于等于
  10。如果，在一个查询中，你寻找所有大于等于 11 的值，优化器可以利用这一事实，立即返回零行，而不必扫描表来查看是否有任何值匹配。


  如果一个约束是使用`WITH CHECK`构建的，它就被认为是可信的（trusted），因为优化器可以相信所有值都符合该`CHECK`约束。你可以使用目录对象`sys.check_constraints`来确定一个约束是否可信：


  ```

  SELECT definition, is_not_trusted

  FROM   sys.check_constraints

  WHERE  object_schema_name(object_id) = ''Music''

  AND  name = ''CHKArtist$Name$noMadonnaNames'';

  ```


  这会返回以下结果（当然，进行了一些小的格式调整）：


  ```

  definition                     is_not_trusted

  ------------------------------ ---------------

  (NOT [Name] like ''%Madonna%'')  1

  ```


  请务必在可能的情况下，确保所有行的`is_not_trusted = 0`，这样系统才会信任你所有的`CHECK`约束，优化器在构建执行计划时才能利用这些信息。


  ### 注意


  在一个非常大的表上使用`CHECK`选项（而非`NOCHECK`）创建检查约束，可能需要很长时间才能应用完成。因此，你常常会觉得需要走捷径来快速完成。问题在于，设计或实现上的捷径往往会在后续维护成本上，或者更糟，在用户体验上付出高得多的代价。如果条件允许，最好尝试把所有东西都正确设置好，以免产生混淆。


  ### 使约束可信


  要让约束变为可信，你需要清理数据，并使用`ALTER TABLE <tableName> WITH CHECK CHECK CONSTRAINT constraintName`来让
  SQL Server 检查该约束并将其设置为可信。当然，这种方法与最初使用`NOCHECK`创建约束有着相同的问题（主要是，它可能耗时极长！）。但是，如果不检查数据，约束就不会被信任，更不用说忘记重新启用约束是太容易发生的事了。对于我们的约束，我们可以尝试检查这些值：


  ```

  ALTER TABLE Music.Artist WITH CHECK CHECK CONSTRAINT CHKArtist$Name$noMadonnaNames;

  ```


  它会返回以下错误（正如我们第一次尝试创建它时一样）：


  ```

  Msg 547, Level 16, State 0, Line 1

  The ALTER TABLE statement conflicted with the CHECK constraint "CHKArtist$Name$noMadonnaNames".
  The conflict occurred in database "Chapter7", table "Music.Artist", column ''Name''.

  ```


  但是，如果我们删除名字为 Madonna 的那一行


  ```

  DELETE FROM  Music.Artist

  WHERE  Name = ''Madonna'';

  ```


  然后再试一次，`ALTER TABLE`语句将无错误执行，该约束也将变为可信（一切都会恢复正常！）。最后，你可以使用`NOCHECK`来禁用一个约束：


  ```

  ALTER TABLE Music.Artist NOCHECK CONSTRAINT CHKArtist$Name$noMadonnaNames;

  ```


  现在，你可以通过添加一个额外的对象属性来查看该约束已被禁用：


  ```

  SELECT definition, is_not_trusted, is_disabled

  FROM   sys.check_constraints

  WHERE  object_schema_name(object_id) = ''Music''

  AND  name = ''CHKArtist$Name$noMadonnaNames'';

  ```


  这将返回


  ```

  definition                     is_not_trusted is_disabled

  ------------------------------ -------------- -----------

  (NOT [Name] like ''%Madonna%'')  1              1

  ```


  然后，在我们继续之前，重新运行语句以启用该约束：


  ```

  ALTER TABLE Music.Artist WITH CHECK CHECK CONSTRAINT CHKArtist$Name$noMadonnaNames;

  ```


  在那之后，检查`sys.check_constraints`查询的输出，你会看到它已经被启用了。




  '
- '# 基于简单表达式的 CHECK 约束


  迄今为止，大多数 `CHECK` 约束都是简单的表达式，仅用于测试一列或多列中值的某些特性。这些约束通常不引用除单列外的任何数据，但可以引用单行中的任意列。


  举几个例子，请看以下情况：


  ## 空字符串

  防止用户插入一个或多个空格字符，以避免在列中输入任何实际内容，例如 `CHECK(LEN(ColumnName) > 0)`。在我设计的数据库中，约 90%的
  `character` 列都设置了此约束，以避免那种令人抓狂的、意料之外的空格字符输入。


  ## 日期范围检查

  确保输入合理的日期；例如：

  *   租借物品的归还日期应晚于 `RentalDate` 之后一天（假设两列均采用日期数据类型）：`CHECK (ReturnDate > DATEADD(DAY,1,RentalDate))`。

  *   某些本应在过去发生的事件日期：`CHECK(EventDate <= GETDATE())`。


  ## 值合理性

  确保某些值（通常是某种数字）对于当前情况是合理的。“合理”当然不意味着该值对于给定情况必然正确——这通常属于对象中间层的职责——仅表示其处于合理的取值范围内。例如：

  *   需要为非负整数的值：`CHECK(MilesDriven >= 0)`。此约束通常需要，因为经常存在负值无意义的列（如工作小时数、行驶里程等），但其内在类型允许负值。

  *   作者版税率小于或等于 30%。如果此税率可能大于 30%，那就不是一个 `CHECK` 约束。因此，若 15%是典型税率，用户界面可能会提示这不常见，但如果
  30%是绝对上限，则这是一个很好的 `CHECK` 约束：`CHECK (RoyaltyRate <= .3)`。


  当你遇到数据条件必须始终为真的情况时，这类 `CHECK` 约束总是个好主意。换一种说法，它约束的是数据本身的定义，而不仅仅是可能经常变化甚至因情况而异的约定。这些
  `CHECK` 约束通常速度极快，除非在极端情况下，不会对性能产生负面影响。作为示例，我仅展示第一个空字符串检查的代码，因为简单的 `CHECK` 约束一旦掌握了语法就很容易编写。


  为防止用户侥幸输入空列值，你可以添加以下约束（在删除两行空行后）以防止此类情况再次发生。例如，在 `Album` 表中，`Name` 列不允许 `NULL`。用户必须输入内容，但若精明的用户意识到
  `''''` 与 `NULL` 不同呢？对于空字符串该如何响应？当然，理想情况下，用户界面不会允许在已指定为必需的列中出现此类无意义输入，但用户可能只是按下空格键，为确保万无一失，我们需要编写一个约束来避免它。


  该约束通过使用默认执行修剪操作的 `LEN` 函数来消除任何空格字符，并检查长度：


  ```sql

  ALTER TABLE Music.Album WITH CHECK

  ADD CONSTRAINT CHKAlbum$Name$noEmptyString

  CHECK (LEN(Name) > 0); -- 注意，len 默认会执行修剪，因此全由空格字符组成的字符串将返回 0

  ```


  使用会与新约束冲突的数据进行测试：


  ```sql

  INSERT INTO Music.Album ( AlbumId, Name, ArtistId, PublisherId, CatalogNumber )

  VALUES ( 4, '''', 1, 1,''dummy value'' );

  ```


  你会得到以下错误信息：


  ```sql

  Msg 547, Level 16, State 0, Line 1

  The INSERT statement conflicted with the CHECK constraint "CHKAlbum$Name$noEmptyString".
  The conflict occurred in database "Chapter7", table "Music.Album", column ''Name''.

  ```


  太常见的情况是，为了绕过警告而输入无意义的数据，但这更多是用户界面或管理监督的问题，而非数据库设计问题，因为判断 `''ASDFASDF''` 是否为一个合理的名称值，显然不属于明确的是/否范畴。（你见过有些人给孩子起什么名字吗？）通常情况是，用户界面随后会阻止通过
  UI 创建此类数据，但 `CHECK` 约束的存在是为了防止其他进程输入完全无效的数据，无论数据来源如何。


  当你从外部源向表中加载数据时，这些检查约束非常有用。通常，当从文件（例如通过导入向导）导入数据时，空白数据会以空白值形式传播，而相关的程序员可能没想到要处理这种情况。检查约束确保数据被正确地插入。并且只要你确保回头重新检查受信任状态和值，即使它们被忽略（例如使用
  SSIS 的批量加载功能），它们的存在也有助于提醒你。在图 7-2 中，你会看到你可以选择（或选择不）在 OLEDB 目标输出上检查约束。在这种情况下，它可能禁用约束或将其设置为非受信任状态以加速加载，但在你将其重置为受信任状态（如前一节所示）之前，这将限制数据完整性以及优化器对约束的利用。


  ![A978-1-4842-1973-7_7_Fig2_HTML.jpg](img/A978-1-4842-1973-7_7_Fig2_HTML.jpg)


  **图 7-2.** 未选中检查约束的 SSIS OLEDB 输出示例




  '
- "# 使用函数的 CHECK 约束\n\n有时，你确实需要实现一个复杂的数据检查，而使用表中的列和基础 T-SQL 标量函数的简单布尔表达式根本无法满足需求。在标准\
  \ SQL 中，你可以在约束中使用子查询，但在 SQL Server 中，子查询是不允许的。然而，你可以使用标量 T-SQL 函数，即使它访问了另一个表。\n\n\
  一般来说，使用函数是确保数据完整性的一种相当**非常规**的解决方案，但当你需要构建稍微复杂的数据完整性保护时，它可能远为强大，并且在许多方面相当有用。在大多数情况下，`CHECK`\
  \ 约束通常包含检查单列的稳定格式或值这样的简单任务，对于这些任务，使用简单 `<布尔表达式>` 的标准 `CHECK` 约束完全足够。\n\n然而，`CHECK`\
  \ 约束不一定如此简单。用户定义函数 (`UDF`) 可以很复杂，并且可能在实例中涉及多个表。以下是一些例子：\n\n*   复杂的标量验证（通常使用 `CLR`\
  \ 函数）：例如，在正则表达式比 `LIKE` 比较更容易使用的情况下。\n*   访问其他表的验证：例如，检查一个基于多个表中值的域，而不是简单的外键。在示例中，我将实现一个基于表的输入掩码，因此它会根据相关表的值而变化。\n\
  \n我需要提醒你，调用 `UDF` 会有很大的开销，虽然你可能想封装一个简单的函数用于 `CHECK` 约束中，但这几乎总是得不偿失。正如我们提到的，`CHECK`\
  \ 约束对于受 `DML` 修改语句影响的每一行都会执行一次，而这个额外成本会因修改查询影响的每一行而**复合增加**。我意识到，对于一个优秀的程序员来说，这可能有些反直觉，因为他们认为封装是编程中最重要的目标之一，但\
  \ `SQL` 在许多方面与其他类型的编程**截然不同**，因为你将大量工作推给了引擎，而引擎必须接收你的操作，并找到执行代码的最佳方式（你必须尊重这种方式）。\n\
  \n因此，最好尝试在不使用 `UDF` 的情况下表达你的布尔表达式，除非确实需要访问额外的表，或者做一些比简单表达式更复杂的事情。在接下来的例子中，我将使用 `UDF`\
  \ 来提供强大的规则检查，这些规则可以实现使用简单布尔表达式难以编码的复杂规则。\n\n你可以用 `T-SQL` 或 .NET 语言（`VB .NET`、`C#`\
  \ 或任何允许你利用 `SQL Server 2005+` 功能在数据库中编写基于 `CLR` 的对象的 .NET 语言）来实现 `UDF`。在许多情况下，特别是如果你在函数代码中不进行任何类型的表访问，`CLR`\
  \ 的性能会比 `T-SQL` 版本好得多。\n\n举个例子，我需要访问另一个表中的值，所以我将构建一个示例，实现一个根据行的父项变化的输入掩码。假设需要验证专辑的目录编号格式是否正确。然而，不同的出版商对其客户专辑的目录编号掩码各不相同。（一个更自然、但也明显更复杂的例子是来自世界各地的电话号码和地址。）\n\
  \n在这个例子中，我将继续使用上一节中的表。请注意，掩码列 `Publisher.CatalogNumberMask` 需要比实际的 `CatalogNumber`\
  \ 列大得多（在我的示例代码中是大五倍），因为一些可能的掩码使用多个字符来表示单个字符。你还应该注意，它是一个 `varchar`，即使该列存储为 `char`\
  \ 值，因为使用 `char` 变量作为 `LIKE` 掩码可能会有问题，因为这类列末尾有空格填充（比较操作会认为固定长度字符串末尾填充的额外空格字符需要在目标字符串中匹配，而这很少是期望的结果）。\n\
  \n为此，我构建了一个 `T-SQL` 函数，它访问该列以检查值是否与掩码匹配，如下所示（注意，我们可能会使用 `T-SQL` 而不是 `CLR` 来构建此约束，因为它在函数体中访问了一个表）：\n\
  \n```sql\nCREATE FUNCTION Music.Publisher$CatalogNumberValidate\n(\n@CatalogNumber\
  \ char(12),\n@PublisherId int --now based on the Artist ID\n)\nRETURNS bit\nAS\n\
  BEGIN\nDECLARE @LogicalValue bit, @CatalogNumberMask varchar(100);\nSELECT @LogicalValue\
  \ = CASE WHEN @CatalogNumber LIKE CatalogNumberMask\nTHEN 1\nELSE 0  END\nFROM \
  \  Music.Publisher\nWHERE  PublisherId = @PublisherId;\nRETURN @LogicalValue;\n\
  END;\n```\n\n当我在本节开头加载数据时，我预加载了具有有效 `CatalogNumber` 和 `CatalogNumberMask` 列值的数据：\n\
  \n```sql\nSELECT Album.CatalogNumber, Publisher.CatalogNumberMask\nFROM   Music.Album\n\
  JOIN Music.Publisher as Publisher\nON Album.PublisherId = Publisher.PublisherId;\n\
  ```\n\n这将返回以下结果：\n\n```\nCatalogNumber        CatalogNumberMask\n--------------------\
  \ --------------------------------------------------------------\n433-43ASD-33 \
  \        [0-9][0-9][0-9]-[0-9][0-9][0-9a-z][0-9a-z][0-9a-z]-[0-9][0-9]\n111-11111-11\
  \         [0-9][0-9][0-9]-[0-9][0-9][0-9a-z][0-9a-z][0-9a-z]-[0-9][0-9]\nCD12345\
  \              [a-z][a-z][0-9][0-9][0-9][0-9][0-9]\n```\n\n现在，让我们将约束添加到表中，如下所示：\n\
  \n```sql\nALTER TABLE Music.Album\nWITH CHECK ADD CONSTRAINT\nCHKAlbum$CatalogNumber$CatalogNumberValidate\n\
  CHECK (Music.Publisher$CatalogNumberValidate\n(CatalogNumber,PublisherId) = 1);\n\
  ```\n\n如果由于表中存在无效数据而导致约束报错（因为你在添加数据、试用表，或者在真实开发中，这通常是由于尝试构建的 UI 产生的测试数据造成的），你可以使用类似以下的查询来找到它们：\n\
  \n```sql\nSELECT Album.Name, Album.CatalogNumber, Publisher.CatalogNumberMask\n\
  FROM Music.Album\nJOIN Music.Publisher\nON Publisher.PublisherId = Album.PublisherId\n\
  WHERE Music.Publisher$CatalogNumberValidate(Album.CatalogNumber,Album.PublisherId)\
  \ <> 1;\n```\n\n现在，让我们尝试添加一个具有无效值的新行：\n\n```sql\nINSERT  Music.Album(AlbumId, Name,\
  \ ArtistId, PublisherId, CatalogNumber)\nVALUES  (4,'Who''s Next',2,2,'1');\n```\n\
  \n这将导致以下错误，因为目录编号 `'1'` 与为 `PublisherId` 号 `2` 设置的掩码不匹配：\n\n```\nMsg 547, Level\
  \ 16, State 0, Line 1\nThe INSERT statement conflicted with the CHECK constraint\
  \ \"CHKAlbum$CatalogNumber$CatalogNumberValidate\". The conflict occurred in database\
  \ \"Chapter7\", table \"Music.Album\".\n```\n\n现在，将目录编号更改为与约束检查的输入掩码匹配的值：\n\n```sql\n\
  INSERT  Music.Album(AlbumId, Name, ArtistId, CatalogNumber, PublisherId)\nVALUES\
  \  (4,'Who''s Next',2,'AC12345',2);\nSELECT * FROM Music.Album;\n```\n\n这将返回以下结果，你可以看到它与为\
  \ `PublisherId = 2` 的出版商设置的 `'[a-z][a-z][0-9][0-9][0-9][0-9][0-9]'` 掩码匹配：\n\n\n\
  ```\nAlbumId     Name              ArtistId    CatalogNumber        PublisherId\n\
  ----------- ----------------- ----------- -------------------- -----------\n1  \
  \         The White Album   1           433-43ASD-33         1\n2           Revolver\
  \          1           111-11111-11         1\n3           Quadrophenia      2 \
  \          CD12345              2\n4           Who's Next        2           AC12345\
  \              2\n```\n\n使用这种方法，你可以为表构建任何单行验证代码。如前所述，每个用户定义函数（UDF）将在更新中被修改的每一行和每一列触发一次。如果你正在插入大量数据，性能可能会受到影响，但拥有值得信赖的数据是值得的。\n\
  \n我们将在本章后面讨论触发器，但作为替代方案，你可以创建一个触发器，该触发器基于之前用于查找表中不当数据的查询，检查查询是否返回了任何行：\n\n```sql\n\
  SELECT *\nFROM   Music.Album AS Album\nJOIN Music.Publisher AS Publisher\nON Publisher.PublisherId\
  \ = Album.PublisherId\nWHERE  Music.Publisher$CatalogNumberValidate\n(Album.CatalogNumber,\
  \ Album.PublisherId)  1;\n```\n\n这种类型的约束有一个缺点，无论是在约束还是触发器中实现。就目前而言，`Album`表受到保护，防止无效值被输入到`CatalogNumber`列中，但它没有说明如果用户更改了`Publisher`表上的`CatalogEntryMask`会发生什么。如果这是一个问题，你可以考虑向`Publisher`表添加一个触发器，针对任何现有数据验证对掩码的更改。\n\
  \n**Caution**\n\n使用访问同表中其他行的用户定义函数是危险的，因为在函数执行时，虽然每行的数据在表中可见，但如果同时更新多行，那些行在表中不可见，因此如果错误条件只存在于正在修改的行中，你的最终结果可能会出错。\n\
  \n### 增强由约束引发的错误\n\n检查约束真正的缺点是它们在失败时产生的错误消息。这些错误消息肯定不是你想要展示给用户的，即使没有其他原因，仅仅因为典型用户每次看到它们都会引发服务台呼叫。处理这些错误是使用\
  \ SQL Server 中约束更烦人的部分之一。\n\n每当一个语句违反了约束要求时，SQL Server 会提供一个难看的消息，并且没有提供显示清晰消息的真正自动方法。在本节中，我将简要详述一种改进约束错误消息的方法，就像上一条语句的错误一样：\n\
  \n```text\nMsg 547, Level 16, State 0, Line 1\nThe INSERT statement conflicted with\
  \ the CHECK constraint \"CHKAlbum$CatalogNumber$CatalogNumberValidate\". The conflict\
  \ occurred in database \"Chapter7\", table \"Music.Album\".\n```\n\n我将向你展示如何将其映射到一个至少有意义的错误消息。首先，错误消息的各个部分如下：\n\
  \n*   `Msg 547`：返回给调用程序的错误号。在某些情况下，这个错误号很重要；然而，在大多数情况下，说错误号是非零的就足够了。\n*   `Level\
  \ 16`：消息的严重级别。`0` 到 `18` 通常被认为是用户消息，`16` 是默认值。级别 `19`–`25` 是严重错误，会导致连接断开（消息会写入日志）。\n\
  *   `State 0`：一个从 `0`–`127` 的值，表示引发错误时进程的状态。这个值很少被任何进程使用。\n*   `Line 1`：批处理或对象中发生错误的行。这个值对于调试目的非常有用。\n\
  *   错误描述：已发生错误的文本解释。\n\n在原始形式中，这是将要发送到客户端的确切错误。使用 `TRY-CATCH` 错误处理，我们可以构建一个简单的错误处理程序和将约束映射到错误消息的方案（或者，你也可以在客户端代码中做类似的事情，以处理那些你无法从用户界面预防的错误）。我们命名约束的部分原因是为了确定创建约束时的意图。在下面的代码中，我们将实现一个非常基本的错误映射方案：通过从消息中解析出约束名称的文本，然后在映射表中查找该值。这不是一个“完美”的方案，但当使用约束作为情况的唯一数据保护时，它确实有效（它也有助于记录你的系统可能引发的错误）。\n\
  \n首先，让我们创建一个映射表，我们将已定义的约束名称和解释约束含义的消息放入其中：\n\n```sql\nCREATE SCHEMA ErrorHandling;\
  \ --used to hold objects for error management purposes\nGO\nCREATE TABLE ErrorHandling.ErrorMap\n\
  (\nConstraintName sysname NOT NULL CONSTRAINT PKErrorMap PRIMARY KEY,\nMessage \
  \        varchar(2000) NOT NULL\n);\nGO\nINSERT ErrorHandling.ErrorMap(constraintName,\
  \ message)\nVALUES ('CHKAlbum$CatalogNumber$CatalogNumberValidate',\n'The catalog\
  \ number does not match the format set up by the Publisher');\n```\n\n然后，我们创建一个过程来执行实际的映射，通过获取可以从\
  \ `CATCH` 块中访问的 `ERROR_%()` 过程中检索的值，并使用它们在 `ErrorMap` 表中查找值：\n\n```sql\nCREATE PROCEDURE\
  \ ErrorHandling.ErrorMap$MapError\n(\n@ErrorNumber  int = NULL,\n@ErrorMessage nvarchar(2000)\
  \ = NULL,\n@ErrorSeverity INT= NULL\n) AS\nBEGIN\nSET NOCOUNT ON\n--use values in\
  \ ERROR_ functions unless the user passes in values\nSET @ErrorNumber = Coalesce(@ErrorNumber,\
  \ ERROR_NUMBER());\nSET @ErrorMessage = Coalesce(@ErrorMessage, ERROR_MESSAGE());\n\
  SET @ErrorSeverity = Coalesce(@ErrorSeverity, ERROR_SEVERITY());\n--strip the constraint\
  \ name out of the error message\nDECLARE @constraintName sysname;\nSET @constraintName\
  \ = substring( @ErrorMessage,\nCHARINDEX('constraint \"',@ErrorMessage) + 12,\n\
  CHARINDEX('\"',substring(@ErrorMessage,\nCHARINDEX('constraint \"',@ErrorMessage)\
  \ +\n12,2000))-1)\n--store off original message in case no custom message found\n\
  DECLARE @originalMessage nvarchar(2000);\nSET @originalMessage = ERROR_MESSAGE();\n\
  IF @ErrorNumber = 547 --constraint error\nBEGIN\nSET @ErrorMessage =\n(SELECT message\n\
  FROM   ErrorHandling.ErrorMap\nWHERE  constraintName = @constraintName);\nEND\n\
  --if the error was not found, get the original message with generic 50000 error\
  \ number\nSET @ErrorMessage = ISNULL(@ErrorMessage, @originalMessage);\nTHROW  50000,\
  \ @ErrorMessage, @ErrorSeverity;\nEND\n```\n\n现在，看看当我们为专辑目录号输入一个无效值时会发生什么：\n\n```sql\n\
  BEGIN TRY\nINSERT  Music.Album(AlbumId, Name, ArtistId, CatalogNumber, PublisherId)\n\
  VALUES  (5,'who are you',2,'badnumber',2);\nEND TRY\nBEGIN CATCH\nEXEC ErrorHandling.ErrorMap$MapError;\n\
  END CATCH\n```\n\n错误消息如下所示：\n\n```text\nMsg 50000, Level 16, State 1, Procedure\
  \ ErrorMap$mapError, Line 24\nThe catalog number does not match the format set up\
  \ by the Publisher\n```\n\n而不是\n\n```text\nMsg 547, Level 16, State 0, Line 1\n\
  The INSERT statement conflicted with the CHECK constraint \"CHKAlbum$CatalogNumber$CatalogNumberValidate\"\
  . The conflict occurred in database \"Chapter7\", table \"Music.Album\".\n```\n\n\
  这令人愉快得多，即使达到这个新消息需要一番功夫。\n```\n\n\n## DML 触发器\n\n触发器是一种编码模块，类似于存储过程，它附加在表或视图上，当在该对象上执行\
  \ `INSERT`、`UPDATE` 或 `DELETE` 语句时，触发器会自动执行。虽然触发器与约束都具有强制数据保护的能力，但触发器比约束灵活得多，因为你可以像编写存储过程一样为它们编码，并且可以引入副作用，例如格式化输入数据或将任何操作级联到另一个表。你可以使用触发器来强制执行几乎任何业务规则，它们对于处理\
  \ `CHECK` 约束过于复杂而无法处理的情况尤为重要。我们在第 6 章中使用了触发器来自动管理行更新日期值。\n\n触发器名声常常不好，因为它们可能相当古怪，尤其是在处理大型更新时可能严重影响性能。例如，如果你在表上有一个触发器，并尝试更新一百万行，很可能会遇到问题。然而，对于典型\
  \ OLTP 数据库中的大多数操作，一次操作不应涉及超过少数几行。触发器的使用确实需要仔细考虑，但在需要它们的地方，它们非常有用。在本章中，我将演示几种无法通过其他方式自动在\
  \ SQL 代码中完成的触发器用途：\n\n*   执行跨数据库的参照完整性\n*   检查行间规则，其中仅查看当前行对于约束来说是不够的\n*   检查表间约束，当规则需要访问不同表中的数据时\n\
  *   为你的数据修改查询引入所需的副作用，例如维护所需的反规范化\n*   确保无法对表执行任何插入、更新或删除操作，即使用户确实有权执行该操作\n\n其中一些操作也可以在应用层完成，但在大多数情况下，使用触发器自动完成这些操作要容易和安全得多（特别是对于数据完整性）。在数据保护方面，触发器相对于应用代码的主要优势在于能够访问数据库中的任何数据来进行验证，而无需将其发送到客户端。在附录\
  \ B 中，我将讨论编写触发器的机制及其各种限制。在本章中，我将创建 DML 触发器来处理典型的业务需求。\n\n本章我们将利用两种不同类型的 DML 触发器。每种类型都有其自身的用处，但它们的使用原因却大相径庭。\n\
  \n*   `AFTER`：这些触发器在 DML 语句（`INSERT`/`UPDATE`/`DELETE`）影响表之后触发。`AFTER` 触发器通常用于处理不符合约束模式的规则，例如需要存储数据的规则，如日志记录机制。对于\
  \ `INSERT`、`UPDATE` 和 `DELETE` 或它们的任何组合，你实际上可以有无限数量的 `AFTER` 触发器。\n*   `INSTEAD\
  \ OF`：这些触发器“代替”影响表或视图的内置命令（`INSERT`、`UPDATE` 或 `DELETE`）进行操作。通过这种方式，你可以对数据执行任何操作，无论是完全按照用户请求执行，还是执行完全不同的操作（你甚至可以直接忽略该操作）。每个表最多只能有一个每种类型的\
  \ `INSTEAD OF INSERT`、`UPDATE` 和 `DELETE` 触发器。允许（但通常不是一个好主意）将所有三个操作合并到一个触发器中，用一个触发器来处理所有三种操作。\n\
  \n本节将按这两种触发器类型进行划分，因为它们有两组非常不同的用例。由于触发器编码在 SQL Server 中并不是一个非常常见的话题，在附录 B 中，我将介绍触发器编码技术并提供一个模板，我们将在本章中一直使用它（这也是我们在第\
  \ 6 章中使用的模板）。\n\nSQL Server 2016 提供了本机编译触发器，但仅限于 `AFTER` 触发器，并且也受限于当前对本机编译模块的限制。\n\
  \n### AFTER 触发器\n\n`AFTER` 触发器在 DML 语句完成后触发。虽然触发器现在看起来可能不太有用，但早在 SQL Server 6.0\
  \ 及更早版本时，还没有 `CHECK` 约束，甚至 `FOREIGN KEY` 也是刚刚引入，因此所有的数据保护都是使用触发器管理的。除了维护相当繁琐之外，一些相当复杂的系统是使用与我的罗技\
  \ Harmony 遥控器相当的硬件创建的。\n\n在关于 `AFTER` 触发器的这一节中，我将展示一些示例，这些示例演示了我用来解决相当常见问题的几种触发器形式。我将给出以下类型触发器的示例：\n\
  \n*   多行范围检查\n*   维护汇总值\n*   级联插入\n*   子到父的级联\n*   跨数据库和服务器的关系\n\n通过这些示例，你应该能够推断出几乎任何\
  \ `AFTER` 触发器的用途。请记住，触发器虽然本身对性能并非固有的糟糕，但也应仅在必要时使用。\n\n注意\n\n如需另一个示例，请查看第 8 章中关于唯一性的部分，我将在那里实现一种基于数据范围的唯一性，使用基于触发器的解决方案。\n\
  \n\n\n## 对多行的范围检查\n\n我们要看的第一类检查是**范围检查**，即确保某列的值在某个特定范围内。使用 `CHECK` 约束来验证单行数据中的数据（例如\
  \ `column > 10`）是相当容易的。然而，你无法用它们来验证基于聚合条件（如 `SUM(column) > 10`）的条件，因为 `CHECK` 约束只能访问当前行的数据（而且即使使用用户定义函数，你也无法看到新数据）。\n\
  \n如果你需要检查一行或多行数据是否违反某个给定条件（该条件通常基于最大总和等聚合值），就需要使用触发器。作为示例，我们将考察一个简单的会计系统。当用户向账户存取款时，你希望确保余额永远不会低于零。必须考虑某个账户的所有交易。\n\
  \n首先，我们为会计对象创建一个架构：\n```sql\nCREATE SCHEMA Accounting;\n```\n然后，我们创建一个账户表和一个包含该账户活动的表：\n\
  ```sql\nCREATE TABLE Accounting.Account\n(\nAccountNumber        char(10) NOT NULL\n\
  CONSTRAINT PKAccount PRIMARY KEY\n--应有其他列\n);\nCREATE TABLE Accounting.AccountActivity\n\
  (\nAccountNumber                char(10) NOT NULL\nCONSTRAINT FKAccount$has$Accounting_AccountActivity\n\
  FOREIGN KEY REFERENCES Accounting.Account(AccountNumber),\n--此值可能是每台 ATM/柜员生成的\n\
  TransactionNumber            char(20) NOT NULL,\nDate                         datetime2(3)\
  \ NOT NULL,\nTransactionAmount            numeric(12,2) NOT NULL,\nCONSTRAINT PKAccountActivity\n\
  PRIMARY KEY (AccountNumber, TransactionNumber)\n);\n```\n现在，我们向 `Accounting.AccountActivity`\
  \ 表添加一个触发器，用于检查确保当你将某个 `Account` 的所有交易金额相加时，总和大于零：\n```sql\nCREATE TRIGGER Accounting.AccountActivity$insertTrigger\n\
  ON Accounting.AccountActivity\nAFTER INSERT AS\nBEGIN\n    SET NOCOUNT ON;\n   \
  \ SET ROWCOUNT 0; --以防客户端修改了行数\n    --对 INSERT 或 UPDATE 触发器使用 inserted，对 UPDATE\
  \ 或 DELETE 触发器使用 deleted\n    --使用 COUNT 而非 @@ROWCOUNT，因为 MERGE 行为会将 @@ROWCOUNT\
  \ 设置为\n    --等于合并的行数，而非触发器中正在检查的行数\n    DECLARE @msg varchar(2000),    --用于保存错误消息\n\
  \    --对 INSERT 或 UPDATE 触发器使用 inserted，对 UPDATE 或 DELETE 触发器使用 deleted\n    --使用\
  \ COUNT 而非 @@ROWCOUNT，因为 MERGE 行为会将 @@ROWCOUNT 设置为\n    --等于合并的行数，而非触发器中正在检查的行数\n\
  \        @rowsAffected int = (SELECT COUNT(*) FROM inserted);\n    --      @rowsAffected\
  \ int = (SELECT COUNT(*) FROM deleted);\n    --如果未影响任何行，则无需继续\n    IF @rowsAffected\
  \ = 0 RETURN;\n\n    BEGIN TRY\n       --[验证部分]\n        --禁止会使余额变为负数的交易\n     \
  \   IF EXISTS ( SELECT AccountNumber\n                    FROM Accounting.AccountActivity\
  \ AS AccountActivity\n                    WHERE EXISTS (SELECT *\n             \
  \                     FROM   inserted\n                                  WHERE \
  \ inserted.AccountNumber =\n                                         AccountActivity.AccountNumber)\n\
  \                    GROUP BY AccountNumber\n                    HAVING SUM(TransactionAmount)\
  \ < 0\n                  )\n            BEGIN\n                --回滚事务\n        \
  \        ROLLBACK TRANSACTION;\n                THROW; --将暂停批处理或被调用方的 CATCH 块捕获\n\
  \            END\n    END CATCH\nEND;\n```\n这类触发器的关键在于查找基础表中的行是否存在，而不是 `inserted`\
  \ 表中的行，因为关注点是插入的行如何影响某个 `Account` 的整体状态。查询的基础是一个在没有触发器的情况下，人们可能运行来检查表状态的查询。是否存在某个账户，其所有交易的总和小于\
  \ 0？\n```sql\nSELECT AccountNumber\nFROM Accounting.AccountActivity AS AccountActivity\n\
  GROUP BY AccountNumber\nHAVING SUM(TransactionAmount) < 0;\n```\n然后，由于这是一个 INSERT\
  \ 触发器，我们包含了一个与新创建行的关联：\n```sql\nSELECT AccountNumber\nFROM Accounting.AccountActivity\
  \ AS AccountActivity\nWHERE EXISTS (SELECT *\n              FROM   inserted\n  \
  \            WHERE  inserted.AccountNumber = AccountActivity.AccountNumber)\nGROUP\
  \ BY AccountNumber\nHAVING SUM(TransactionAmount) < 0;\n```\n`WHERE` 子句只是确保我们只考虑那些有新数据插入的账户的行。这样，我们最终不会去检查那些我们知道查询未触及的所有行。还要注意，我没有使用\
  \ `JOIN` 操作。通过在 `WHERE` 子句中使用 `EXISTS` 条件，我们不会影响 `FROM` 子句中返回集合的基数，无论 `inserted`\
  \ 表中有多少行具有相同的 `AccountNumber`。现在，正如你在上方触发器中所看到的，这是使用 `IF EXISTS` 语句放入触发器的，其后跟着错误处理部分：\n\
  ```sql\nIF EXISTS ( SELECT AccountNumber\n            FROM Accounting.AccountActivity\
  \ AS AccountActivity\n            WHERE EXISTS (SELECT *\n                     \
  \     FROM   inserted\n                          WHERE  inserted.AccountNumber =\n\
  \                                 AccountActivity.AccountNumber)\n            GROUP\
  \ BY AccountNumber\n            HAVING SUM(TransactionAmount) < 0)\nBEGIN      \
  \       --错误处理部分\n```\n要查看实际效果，请使用以下代码：\n```sql\n--创建一些测试设置数据\nINSERT INTO Accounting.Account(AccountNumber)\n\
  VALUES ('1111111111');\n\nINSERT INTO Accounting.AccountActivity(AccountNumber,\
  \ TransactionNumber,\n                                       Date, TransactionAmount)\n\
  VALUES ('1111111111','A0000000000000000001','20050712',100),\n       ('1111111111','A0000000000000000002','20050713',100);\n\
  ```\n现在，让我们看看违反此规则时会发生什么：\n```sql\nINSERT  INTO Accounting.AccountActivity(AccountNumber,\
  \ TransactionNumber,\n                                        Date, TransactionAmount)\n\
  VALUES ('1111111111','A0000000000000000003','20050713',-300);\n```\n结果如下：\n```text\n\
  消息 50000，级别 16，状态 16，过程 AccountActivity$insertTrigger，第 40 行\n账户: 1111111111 交易号:\
  \ A0000000000000000003 金额: -300.00 无法处理，因为它将导致负余额\n```\n错误消息是我们在修改单行的情况下编写的自定义错误消息。现在，让我们确保当\
  \ `INSERT` 语句中有多于一行时，触发器也能正常工作：\n```sql\n--创建新账户\nINSERT  INTO Accounting.Account(AccountNumber)\n\
  VALUES ('2222222222');\nGO\n--现在，这些数据将违反新账户的约束：\nINSERT  INTO Accounting.AccountActivity(AccountNumber,\
  \ TransactionNumber,\n                                        Date, TransactionAmount)\n\
  VALUES ('1111111111','A0000000000000000004','20050714',100),\n       ('2222222222','A0000000000000000005','20050715',100),\n\
  \       ('2222222222','A0000000000000000006','20050715',100),\n       ('2222222222','A0000000000000000007','20050715',-201);\n\
  ```\n这会导致以下错误：\n```text\n消息 50000，级别 16，状态 16，过程 AccountActivity$insertUpdateTrigger，第\
  \ 40 行\n其中一行导致了负余额\n```\n多行错误消息的信息量要少得多，不过你可以扩展它，通过添加一些文本包含导致违规的行（或所有行）的信息，如果需要，甚至可以通过一些工作显示多个失败的值。通常，一个简单的消息就足以处理，因为一般来说，如果单个语句中修改了多行数据，那通常是一个批处理过程，而构建复杂错误消息的代价远高于其价值。流程中可能会建立如何处理某些返回错误的规范。\n\
  \n**提示**\n\n错误处理将在本章后面的“处理触发器和约束错误”一节中更详细地介绍。对于这些触发器，我使用了一个非常简单的错误模型，即在回滚事务后，只是重新抛出在触发器中发生的错误。\n\
  \n如果这是一个真正的会计导向表，那么一个 `INSERT` 触发器可能就足够了，因为真正的会计系统通过**冲正分录**（用 -$100 的费用冲销一笔 $100\
  \ 的费用）来处理修改。但是，如果你确实需要处理 DELETE 操作，你需要将基础查询改为\n\n\n\n### 维护汇总值\n\n## 查看触发事件\n\n\
  对于 DELETE 触发器和 UPDATE 触发器，我们需要检查两个表（以防有人更新了 `AccountNumber`，如果这是允许的话）：\n\n```sql\n\
  SELECT AccountNumber\nFROM Accounting.AccountActivity AS AccountActivity\nWHERE\
  \ EXISTS (SELECT *\nFROM   deleted\nWHERE  deleted.AccountNumber = AccountActivity.AccountNumber)\n\
  GROUP BY AccountNumber\nHAVING SUM(TransactionAmount) < 0;\n```\n\n像账户号码这样可以修改的可变键，在实现跨多行的数据检查时，会让很多人感到困惑。\n\
  \n要查看触发器触发的事件，可以使用以下查询：\n\n```sql\nSELECT trigger_events.type_desc\nFROM sys.trigger_events\n\
  JOIN sys.triggers\nON sys.triggers.object_id = sys.trigger_events.object_id\nWHERE\
  \  triggers.name = 'AccountActivity$insertTrigger';\n```\n\n虽然在本书的前五章中，我强烈反对维护汇总值，但在某些情况下，某种形式的主动汇总可能是必要的。例如：\n\
  \n-   没有其他合理的方法可以优化某个流程。\n-   汇总值的读取次数远远大于基础值的活动次数以及数据被修改和更改的次数。\n\n作为一个例子，让我们扩展之前在“多行范围检查”部分中使用的\
  \ `Account` 和 `AccountActivity` 表的例子。我将在 `Account` 表中添加一个 `BalanceAmount` 列：\n\n\
  ```sql\nALTER TABLE Accounting.Account\nADD BalanceAmount numeric(12,2) NOT NULL\n\
  CONSTRAINT DFLTAccount_BalanceAmount DEFAULT (0.00);\n```\n\n然后，我将更新 `BalanceAmount`\
  \ 列，使其值为 `AccountActivity` 行中的当前数据。首先，运行此查询以查看期望值：\n\n```sql\nSELECT  Account.AccountNumber,\n\
  SUM(COALESCE(AccountActivity.TransactionAmount,0.00)) AS NewBalance\nFROM   Accounting.Account\n\
  LEFT OUTER JOIN Accounting.AccountActivity\nON Account.AccountNumber = AccountActivity.AccountNumber\n\
  GROUP  BY Account.AccountNumber;\n```\n\n这将返回以下结果：\n\n```\nAccountNumber NewBalance\n\
  ------------- ---------------------------------------\n1111111111    200.00\n2222222222\
  \    0.00\n```\n\n现在，使用以下语句将 `BalanceAmount` 列的值更新为现有行的值：\n\n```sql\nWITH  UpdateCTE\
  \ AS (\nSELECT  Account.AccountNumber,\nSUM(coalesce(TransactionAmount,0.00)) AS\
  \ NewBalance\nFROM   Accounting.Account\nLEFT OUTER JOIN Accounting.AccountActivity\n\
  On Account.AccountNumber = AccountActivity.AccountNumber\nGROUP  BY Account.AccountNumber)\n\
  UPDATE Account\nSET    BalanceAmount = UpdateCTE.NewBalance\nFROM   Accounting.Account\n\
  JOIN UpdateCTE\nON Account.AccountNumber = UpdateCTE.AccountNumber;\n```\n\n该语句将构成我们在上一节添加的触发器修改的基础（更改内容以粗体显示）。唯一需要进行的更改是，像我们在上一节中使用\
  \ `EXISTS` 过滤器所做的那样，将 `Account` 集合过滤到受导致触发器触发的 DML 操作影响的账户，这样你就不必担心一个账户是创建了一个新行还是一百个。\n\
  \n```sql\nALTER TRIGGER Accounting.AccountActivity$insertTrigger\nON Accounting.AccountActivity\n\
  AFTER INSERT AS\nBEGIN\n    SET NOCOUNT ON;\n    SET ROWCOUNT 0; --防止客户端修改了行数计数\n\
  \    --对于插入或更新触发器使用 inserted，对于更新或删除触发器使用 deleted\n    --使用 count 而不是 @@rowcount，因为合并行为会将\
  \ @@rowcount 设置为等于合并的行数，而不是触发器中检查的行数\n    DECLARE @msg varchar(2000),    --用于保存错误消息\n\
  \            --对于插入或更新触发器使用 inserted，对于更新或删除触发器使用 deleted\n            --使用 count\
  \ 而不是 @@rowcount，因为合并行为会将 @@rowcount 设置为等于合并的行数，而不是触发器中检查的行数\n            @rowsAffected\
  \ int = (SELECT COUNT(*) FROM inserted);\n    --      @rowsAffected int = (SELECT\
  \ COUNT(*) FROM deleted);\n    BEGIN TRY\n        --[验证部分]\n        --禁止会使余额变为负数的交易\n\
  \        IF EXISTS ( SELECT AccountNumber\n                    FROM Accounting.AccountActivity\
  \ as AccountActivity\n                    WHERE EXISTS (SELECT *\n             \
  \                     FROM   inserted\n                                  WHERE \
  \ inserted.AccountNumber =\n                                         AccountActivity.AccountNumber)\n\
  \                    GROUP BY AccountNumber\n                    HAVING SUM(TransactionAmount)\
  \ < 0)\n        BEGIN\n            --引发错误\n            RAISERROR ('交易将导致余额为负', 16,\
  \ 1);\n            ROLLBACK TRANSACTION;\n            THROW; --将停止批处理或被调用方的 CATCH\
  \ 块捕获\n        END\n    END TRY\n    BEGIN CATCH\n        --/[修改部分]\n        --如果触发器是\
  \ AFTER 触发器，回滚已经发生\n        --如果触发器是 INSTEAD OF 触发器，这将回滚工作\n        IF XACT_STATE()\
  \ <> 0\n            ROLLBACK TRANSACTION;\n        --/[审核部分]\n        --本例中没有审核\n\
  \        --/[重置部分]\n        --这里不需要重置\n        THROW; --将停止批处理或被调用方的 CATCH 块捕获\n\
  \    END CATCH;\nEND;\n```\n\n现在，向 `AccountActivity` 插入一个新行：\n\n```sql\nINSERT \
  \ INTO Accounting.AccountActivity(AccountNumber, TransactionNumber,\n          \
  \                              Date, TransactionAmount)\nVALUES ('1111111111','A0000000000000000004','20050714',100);\n\
  ```\n\n接下来，检查 `Account` 表的状态，并与之前用于检查余额应是多少的查询进行比较：\n\n```sql\nSELECT  Account.AccountNumber,Account.BalanceAmount,\n\
  \        SUM(coalesce(AccountActivity.TransactionAmount,0.00)) AS SummedBalance\n\
  FROM   Accounting.Account\n        LEFT OUTER JOIN Accounting.AccountActivity\n\
  \        ON Account.AccountNumber = AccountActivity.AccountNumber\nGROUP  BY Account.AccountNumber,Account.BalanceAmount;\n\
  ```\n\n这将返回以下结果，显示总和与存储的余额相同：\n\n```\nAccountNumber BalanceAmount    SummedBalance\n\
  ------------- ---------------- -------------------\n1111111111    300.00       \
  \    300.00\n2222222222    0.00             0.00\n```\n\n下一步——多行测试——在构建这样的触发器时非常重要。你需要确保如果用户一次插入多行，它也能工作。在我们的例子中，我们将在同一个\
  \ DML 语句中为两个账户插入行，并为其中一个账户插入两行。这不一定是一个充分的测试，但至少用于演示目的足够了：\n\n```sql\nINSERT  into\
  \ Accounting.AccountActivity(AccountNumber, TransactionNumber,\n               \
  \                         Date, TransactionAmount)\nVALUES ('1111111111','A0000000000000000005','20050714',100),\n\
  \       ('2222222222','A0000000000000000006','20050715',100),\n       ('2222222222','A0000000000000000007','20050715',100);\n\
  ```\n\n同样，对 `AccountActivity` 和 `Account` 表的查询应显示相同的余额：\n\n```\nAccountNumber BalanceAmount\
  \    SummedBalance\n------------- ---------------- -------------------\n1111111111\
  \    400.00           400.00\n2222222222    200.00           200.00\n```\n\n如果你想要一个\
  \ `UPDATE` 或 `DELETE` 触发器，你只需在 `EXISTS` 表达式中应用与上一节相同的逻辑。\n\n我必须强调，这种汇总数据策略应该是罕见的例外，而不是规则。但是当你必须实现汇总数据时，使用触发器来确保其执行是一个很好的策略。使用数据时必须处理的最令人沮丧的问题之一，就是汇总数据与据称是其来源的数据不匹配，因为它会占用本可用于开发新软件的时间。\n\
  \n## 注意事项\n\n引入触发器时，请确保测试单行和多行操作、`INSERT`、`UPDATE` 和 `DELETE` 的所有变体，以及如果修改主键或用于对数据进行分组的键会发生什么。在附录\
  \ B 中，我还将介绍一些设置，这些设置决定了如果你在同一操作上有多个触发器时的行为，这也必须进行测试。\n\n\n### 级联插入\n\n## 概念介绍\n\n\
  级联插入是指在向一个表插入一行数据后，自动在其他一个或多个表中插入一行或多行新数据的情况。这在需要初始化另一个表中的行时经常发生，通常是某种状态信息。\n\n\
  在本示例中，我们将构建一个小型系统来存储网站链接系统的 URL。在低使用时段，自动化浏览器会连接到这些 URL 以进行验证（希望能限制网页上的失效链接）。\n\n\
  为了实现这一点，我将使用图 7-3 中的表集合。\n\n![A978-1-4842-1973-7_7_Fig3_HTML.jpg](img/A978-1-4842-1973-7_7_Fig3_HTML.jpg)\n\
  \n图 7-3. 存储网站链接系统的 URL\n\n## 示例代码\n\n### 建表与初始数据\n\n```sql\nCREATE SCHEMA Internet;\n\
  GO\nCREATE TABLE Internet.Url\n(\nUrlId int NOT NULL IDENTITY(1,1) CONSTRAINT PKUrl\
  \ primary key,\nName  varchar(60) NOT NULL CONSTRAINT AKUrl_Name UNIQUE,\nUrl  \
  \ varchar(200) NOT NULL CONSTRAINT AKUrl_Url UNIQUE\n);\n--Not a user manageable\
  \ table, so not using identity key (as discussed in\n--Chapter 6 when I discussed\
  \ choosing keys) in this one table.  Others are\n--using identity-based keys in\
  \ this example.\nCREATE TABLE Internet.UrlStatusType\n(\nUrlStatusTypeId  int NOT\
  \ NULL\nCONSTRAINT PKUrlStatusType PRIMARY KEY,\nName varchar(20) NOT NULL\nCONSTRAINT\
  \ AKUrlStatusType UNIQUE,\nDefaultFlag bit NOT NULL,\nDisplayOnSiteFlag bit NOT\
  \ NULL\n);\nCREATE TABLE Internet.UrlStatus\n(\nUrlStatusId int NOT NULL IDENTITY(1,1)\n\
  CONSTRAINT PKUrlStatus PRIMARY KEY,\nUrlStatusTypeId int NOT NULL\nCONSTRAINT\n\
  FKUrlStatusType$defines_status_type_of$Internet_UrlStatus\nREFERENCES Internet.UrlStatusType(UrlStatusTypeId),\n\
  UrlId int NOT NULL\nCONSTRAINT FKUrl$has_status_history_in$Internet_UrlStatus\n\
  REFERENCES Internet.Url(UrlId),\nActiveTime        datetime2(3),\nCONSTRAINT AKUrlStatus_statusUrlDate\n\
  UNIQUE (UrlStatusTypeId, UrlId, ActiveTime)\n);\n--set up status types\nINSERT \
  \ Internet.UrlStatusType (UrlStatusTypeId, Name,\nDefaultFlag, DisplayOnSiteFlag)\n\
  VALUES (1, 'Unverified',1,0),\n(2, 'Verified',0,1),\n(3, 'Unable to locate',0,0);\n\
  ```\n\n`Url`表保存指向网络上不同站点的 URL。当有人输入 URL 时，我们将其状态初始化为`'Unverified'`。应该有一个进程定期检查站点，以确保没有发生变化（尤其是那些未验证的！）。\n\
  \n#### 创建触发器\n\n首先构建一个触发器，当插入操作创建新行时，在`UrlStatus`表中插入一行，包含`UrlId`和基于`DefaultFlag`值为`1`的默认`UrlStatusType`：\n\
  \n```sql\nCREATE TRIGGER Internet.Url$insertTrigger\nON Internet.Url\nAFTER INSERT\
  \ AS\nBEGIN\nSET NOCOUNT ON;\nSET ROWCOUNT 0; --in case the client has modified\
  \ the rowcount\n--use inserted for insert or update trigger, deleted for update\
  \ or delete trigger\n--count instead of @@rowcount due to merge behavior that sets\
  \ @@rowcount to a number\n--that is equal to number of merged rows, not rows being\
  \ checked in trigger\nDECLARE @msg varchar(2000),    --used to hold the error message\n\
  --use inserted for insert or update trigger, deleted for update or delete trigger\n\
  --count instead of @@rowcount due to merge behavior that sets @@rowcount to a number\n\
  --that is equal to number of merged rows, not rows being checked in trigger\n@rowsAffected\
  \ int = (SELECT COUNT(*) FROM inserted);\n--           @rowsAffected int = (SELECT\
  \ COUNT(*) FROM deleted);\nBEGIN TRY\n--[validation section]\n--[modification section]\n\
  --add a row to the UrlStatus table to tell it that the new row\n--should start out\
  \ as the default status\nINSERT INTO Internet.UrlStatus (UrlId, UrlStatusTypeId,\
  \ ActiveTime)\nSELECT inserted.UrlId, UrlStatusType.UrlStatusTypeId,\nSYSDATETIME()\n\
  FROM inserted\nCROSS JOIN (SELECT UrlStatusTypeId\nFROM   UrlStatusType\nWHERE \
  \ DefaultFlag = 1)  as UrlStatusType;\n--use cross join to apply this one row to\n\
  --rows in inserted\nEND TRY\nBEGIN CATCH\nIF @@TRANCOUNT > 0\nROLLBACK TRANSACTION;\n\
  THROW; --will halt the batch or be caught by the caller's catch block\nEND CATCH;\n\
  END;\n```\n\n这里的想法是，对于`inserted`表中的每一行，我们将从`UrlStatusType`表中获取`DefaultFlag`等于`1`的单一行。那么，让我们尝试一下：\n\
  \n#### 测试触发器\n\n```sql\nINSERT  Internet.Url(Name, Url)\nVALUES ('Author''s Website',\n\
  'http://drsql.org');\nSELECT Url.Url,Url.Name,UrlStatusType.Name as Status, UrlStatus.ActiveTime\n\
  FROM   Internet.Url\nJOIN Internet.UrlStatus\nON Url.UrlId = UrlStatus.UrlId\nJOIN\
  \ Internet.UrlStatusType\nON UrlStatusType.UrlStatusTypeId = UrlStatus.UrlStatusTypeId;\n\
  ```\n\n这将返回以下结果：\n\n```\nUrl                 Name                  Status      \
  \         ActiveTime\n------------------- --------------------- --------------------\
  \ ---------------------------\nhttp://drsql.org    Author's Website      Unverified\
  \           2016-04-11 20:43:52.954\n```\n\n提示\n\n如果用户无法修改`UrlStatusType`表等表中的数据会更容易，这样就不会出现没有状态被设为默认值（或太多行）的情况。如果没有默认状态，URL\
  \ 将永远不会被使用，因为进程看不到它。本章后面的一个示例将强制不为 DML 操作执行任何操作。\n\n\n#### 从子级到父级的级联\n\n所有你通过约束（`CASCADE`\
  \ 或 `SET NULL`）能进行的更新级联操作，都是严格地从父级到子级的。有时，你希望反其道而行之，当删除子行时，也删除其父行。通常，当你关注的是子项，而父项仅仅作为子项的一个属性来维护，并且只在一个或多个子行存在时才需要它时，你会这样做。这类情况另一个典型特点是，你希望仅当所有子项都被删除时，才删除父项。\n\
  \n在我们的示例中，我有一个关于我的主机游戏收藏的小模型。我有几台游戏主机和相当多的游戏。通常，我在多个平台上拥有同一款游戏，所以我想要追踪这个事实，特别是当我想用我拥有的多平台游戏来交换其他东西时。因此，我有一个用于\
  \ `GamePlatform`（主机平台）的表，和另一个用于实际 `Game`（游戏）本身的表。这是一个多对多的关系，所以我有一个名为 `GameInstance`\
  \ 的关联实体来记录所有权，以及为给定平台购买游戏的时间。这些表中的每一个都有删除级联关系，因此所有实例都会被移除。但是，游戏本身呢？如果某个游戏的 `GameInstance`\
  \ 行全部被移除，我希望从数据库中删除该游戏。这些表如图 7-4 所示。\n\n![A978-1-4842-1973-7_7_Fig4_HTML.jpg](img/A978-1-4842-1973-7_7_Fig4_HTML.jpg)\n\
  \n图 7-4. 游戏表\n\n```\n--为娱乐相关的表创建一个模式\nCREATE SCHEMA Entertainment;\nGO\nCREATE TABLE\
  \ Entertainment.GamePlatform\n(\nGamePlatformId int NOT NULL CONSTRAINT PKGamePlatform\
  \ PRIMARY KEY,\nName  varchar(50) NOT NULL CONSTRAINT AKGamePlatform_Name UNIQUE\n\
  );\nCREATE TABLE Entertainment.Game\n(\nGameId  int NOT NULL CONSTRAINT PKGame PRIMARY\
  \ KEY,\nName    varchar(50) NOT NULL CONSTRAINT AKGame_Name UNIQUE\n--更多所有平台共有的细节\n\
  );\n--具有级联关系回 Game 和 GamePlatform 的关联实体\nCREATE TABLE Entertainment.GameInstance\n\
  (\nGamePlatformId int NOT NULL,\nGameId int NOT NULL,\nPurchaseDate date NOT NULL,\n\
  CONSTRAINT PKGameInstance PRIMARY KEY (GamePlatformId, GameId),\nCONSTRAINT FKGame$is_owned_on_platform_by$EntertainmentGameInstance\n\
  FOREIGN KEY (GameId)\nREFERENCES Entertainment.Game(GameId) ON DELETE CASCADE,\n\
  CONSTRAINT FKGamePlatform$is_linked_to$EntertainmentGameInstance\nFOREIGN KEY (GamePlatformId)\n\
  REFERENCES Entertainment.GamePlatform(GamePlatformId)\nON DELETE CASCADE\n);\n```\n\
  \n然后，我插入一些示例数据：\n\n```\nINSERT  Entertainment.Game (GameId, Name)\nVALUES (1,'Disney\
  \ Infinity'),\n(2,'Super Mario Bros');\nINSERT  Entertainment.GamePlatform(GamePlatformId,\
  \ Name)\nVALUES (1,'Nintendo WiiU'),   --是的，事实上我仍然是个\n(2,'Nintendo 3DS');     --任天堂粉丝，你为什么这么问？\n\
  INSERT  Entertainment.GameInstance(GamePlatformId, GameId, PurchaseDate)\nVALUES\
  \ (1,1,'20140804'),\n(1,2,'20140810'),\n(2,2,'20150604');\n-- FULL OUTER JOIN 确保返回所有集合中的所有行，\n\
  -- 在数据缺失的位置留下 NULL\nSELECT  GamePlatform.Name as Platform, Game.Name as Game, GameInstance.\
  \ PurchaseDate\nFROM    Entertainment.Game as Game\nFULL OUTER JOIN Entertainment.GameInstance\
  \ as GameInstance\nON Game.GameId = GameInstance.GameId\nFULL OUTER JOIN Entertainment.GamePlatform\n\
  ON GamePlatform.GamePlatformId = GameInstance.GamePlatformId;\n```\n\n如你所见，我在 WiiU\
  \ 上有两款游戏，而在 Nintendo 3DS 上只有一款：\n\n```\nPlatform             Game              \
  \   PurchaseDate\n-------------------- -------------------- ------------\nNintendo\
  \ WiiU        Disney Infinity      2014-08-04\nNintendo WiiU        Super Mario\
  \ Bros     2014-08-10\nNintendo 3DS         Super Mario Bros     2015-06-04\n```\n\
  \n因此，我在表上创建一个触发器来执行“反向”级联操作：\n\n```\nCREATE TRIGGER Entertainment.GameInstance$deleteTrigger\n\
  ON Entertainment.GameInstance\nAFTER DELETE AS\nBEGIN\nSET NOCOUNT ON;\nSET ROWCOUNT\
  \ 0; --以防客户端修改了行计数\n--对于 INSERT 或 UPDATE 触发器使用 inserted，对于 UPDATE 或 DELETE 触发器使用\
  \ deleted\n--使用 COUNT 而不是 @@ROWCOUNT，因为 MERGE 行为会将 @@ROWCOUNT 设置为\n--等于合并行数的数字，而不是在触发器中检查的行数\n\
  DECLARE @msg varchar(2000),    --用于保存错误信息\n--对于 INSERT 或 UPDATE 触发器使用 inserted，对于\
  \ UPDATE 或 DELETE 触发器使用 deleted\n--使用 COUNT 而不是 @@ROWCOUNT，因为 MERGE 行为会将 @@ROWCOUNT\
  \ 设置为\n--等于合并行数的数字，而不是在触发器中检查的行数\n--        @rowsAffected int = (SELECT COUNT(*)\
  \ FROM inserted);\n@rowsAffected int = (SELECT COUNT(*) FROM deleted);\nBEGIN TRY\n\
  --[验证部分]\n--[修改部分]\n--删除所有 Game\nDELETE Game      --那些 GameInstance 被删除且\nWHERE\
  \  GameId IN (SELECT deleted.GameId\nFROM   deleted     --不再剩余任何 GameInstance 的\
  \ Game\nWHERE  NOT EXISTS (SELECT  *\nFROM    GameInstance\nWHERE   GameInstance.GameId\
  \ =\ndeleted.GameId));\nEND TRY\nBEGIN CATCH\nIF @@TRANCOUNT > 0\nROLLBACK TRANSACTION;\n\
  THROW; --将停止批处理或被调用方的 CATCH 块捕获\nEND CATCH;\nEND;\n```\n\n就是这么简单。只需删除游戏实例，让触发器处理剩下的事。删除\
  \ Wii 的行：\n\n```\nDELETE  Entertainment.GameInstance\nWHERE   GamePlatformId = 1;\n\
  ```\n\n接下来，检查数据：\n\n```\nSELECT  GamePlatform.Name AS Platform, Game.Name as Game,\
  \ GameInstance. PurchaseDate\nFROM    Entertainment.Game AS Game\nFULL OUTER JOIN\
  \ Entertainment.GameInstance as GameInstance\nON Game.GameId = GameInstance.GameId\n\
  FULL OUTER JOIN Entertainment.GamePlatform\nON GamePlatform.GamePlatformId = GameInstance.GamePlatformId;\n\
  ```\n\n你可以看到现在 `Game` 表中只剩下一行了：\n\n```\nplatform             Game              \
  \   PurchaseDate\n-------------------- -------------------- ------------\nNintendo\
  \ 3DS         Super Mario Bros     2015-06-04\nNintendo WiiU        NULL       \
  \          NULL\n```\n\n这向我们展示了当所有实例都被移除时，`Game` 行被删除，但平台仍然存在。（使用 `FULL OUTER JOIN`\
  \ 的技术将帮助你查看匹配行的所有排列组合。重新插入 `'Disney Infinity'` 的 `Game` 行，你会看到另一行出现，其 `Platform`\
  \ 和 `PurchaseDate` 为 `NULL`。）\n\n### 跨数据库的关系\n\n在约束出现之前，所有关系都是由触发器强制执行的。值得庆幸的是，现在触发器在关系方面仅用于强制执行关系的特殊情况，例如当你在不同数据库上的表之间存在关系时。目前这更多是一个理论上的练习，因为对大多数读者来说这种情况不会发生。然而，这是一个很好的练习，迫使你思考使用触发器来覆盖多表情况时可能涉及的所有不同变化。\n\
  \n要使用触发器实现关系，你需要多个触发器：\n\n*   父表：\n    *   `UPDATE`：如果存在子值，则禁止更改键值，或级联更新。\n    *\
  \   `DELETE`：防止或级联删除具有关联父行的行。\n*   子表：\n    *   `INSERT`：检查确保键存在于父表中。\n    *   `UPDATE`：检查确保“可能”更改后的键存在于父表中。\n\
  \n在本节的开始，我将提供用于构建这些触发器的模板，然后在最后一节中，我将编写一个完整的触发器作为演示。对于这些代码片段，我将表称为父表和子表，不指定模式或数据库名称。将包含在大于和小于符号\
  \ `< >` 内的代码片段替换为适当的代码和表名（包括数据库和模式），当插入到本章一直使用的触发器模板中时，就能得到你想要的结果。\n\n\n\n## 父表更新\n\
  \n请注意，如果使用基于标识属性列的**代理键**，则可以省略父表更新步骤，因为它们不可编辑，因此无法更改。\n\n你可能希望实现以下几种可能性：\n\n* \
  \  将操作级联到子行\n*   如果存在子行，则阻止更新父表\n\n从一个合适的通用触发器编码角度来看，级联操作是不可能实现的。问题是，如果在触发触发器的语句中修改了一个或多个父表行的键，则不一定有任何方法可以将\
  \ `inserted` 表中的行与 `deleted` 表中的行关联起来，这使得你无法知道 `inserted` 表中的哪一行应该与 `deleted` 表中的哪一行匹配。因此，我不会在触发器中实现父键更改的级联；如果你发现需要可编辑的键并希望级联（而`FOREIGN\
  \ KEY`约束不允许这样做，这种情况应该很少见），我会在你的外部代码中实现这一点。\n\n### 阻止更新存在子行的父行\n\n这非常直接。这里的想法是，你希望采取与关系上的`NO\
  \ ACTION`子句相同的限制性操作，例如：\n\n```sql\nIF UPDATE(parent_key_column)\nBEGIN\n    IF EXISTS\
  \ ( SELECT  *\n                FROM    deleted\n                JOIN child_table\
  \ AS child\n                    ON child.parent_key = deleted.parent_key_column)\n\
  \    BEGIN\n        IF @rowsAffected = 1\n            SELECT @msg = 'one row message'\
  \ + inserted.somedata\n            FROM   inserted;\n        ELSE\n            SELECT\
  \ @msg = 'multi-row message';\n        THROW 50000, @msg, 16;\n    END;\nEND;\n\
  ```\n\n## 父表删除\n\n与更新类似，当删除父表行时，我们可以选择：\n\n*   将删除级联到子行\n*   如果存在子行，则阻止删除父行\n\n\
  ### 级联删除\n\n级联非常简单。对于删除，你只需使用一个关联的 `EXISTS` 子查询来获取子表中与父表匹配的行：\n\n```sql\nDELETE\
  \ parent_table\nWHERE  EXISTS ( SELECT *\n                FROM child_table\n   \
  \             WHERE child_table.parent_key = parent_table.parent_key_column);\n\
  ```\n\n### 阻止删除存在关联子行的父行\n\n以下是在存在关联子行时阻止删除行的代码基础：\n\n```sql\nIF EXISTS  ( SELECT\
  \   *\n             FROM     deleted\n             JOIN child_table AS child\n \
  \                ON child.parent_key = deleted.parent_key_column)\nBEGIN\n    IF\
  \ @rowsAffected = 1\n        SELECT @msg = 'one row message' + inserted.somedata\n\
  \        FROM   inserted;\n    ELSE\n        SELECT @msg = 'multi-row message';\n\
  \    THROW 50000, @msg, 16;\nEND;\n```\n\n## 子表插入与子表更新\n\n在子表上，目标基本上是确保你在子表中创建的每一个值，在父表中都存在对应的行。以下代码片段实现了这一点，并考虑了允许空值的情况：\n\
  \n```sql\n--@numrows 是标准模板的一部分\nDECLARE @nullcount int,\n        @validcount int;\n\
  IF UPDATE(parent_key_column)\nBEGIN\n    --如果不允许为空，则可以省略此检查\n    SELECT  @nullcount\
  \ = count(*)\n    FROM    inserted\n    WHERE   inserted.parent_key_column IS NULL;\n\
  \    --不计算空值\n    SELECT  @validcount = count(*)\n    FROM    inserted\n    JOIN\
  \ parent_table AS Parent\n        ON  inserted.parent_key_column = Parent.parent_key_column;\n\
  \    if @validcount + @nullcount != @numrows\n    BEGIN\n        IF @rowsAffected\
  \ = 1\n            SELECT @msg = 'The inserted parent_key: '\n                +\
  \ CAST(parent_key as varchar(10))\n                + ' is not valid in the parent\
  \ table.'\n            FROM   inserted;\n        ELSE\n            SELECT @msg =\
  \ 'Invalid parent_key in the inserted rows.'\n        THROW 50000, @msg, 16;\n \
  \   END\nEND\n```\n\n使用像这样的基本代码块，你可以使用触发器验证几乎任何外键关系。例如，假设你的 `PhoneData` 数据库中有一个名为\
  \ `Logs.Call` 的表，其主键为 `CallId`。在 `CRM` 数据库中，你有一个 `Contacts.Journal` 表，用于存储与某人的联系记录。要实现子表插入触发器，只需填写空白处。更新触发器的代码也将是相同的，并且如果只需要一个触发器，可以合并它们。以下代码无法直接执行；仅用于说明目的。\n\
  \n```sql\nCREATE TRIGGER Contacts.Journal$insertTrigger\nON Contacts.Journal\nAFTER\
  \ INSERT AS\nBEGIN\n    SET NOCOUNT ON;\n    SET ROWCOUNT 0; --in case the client\
  \ has modified the rowcount\n    --use inserted for insert or update trigger, deleted\
  \ for update or delete trigger\n    --count instead of @@rowcount due to merge behavior\
  \ that sets @@rowcount to a number\n    --that is equal to number of merged rows,\
  \ not rows being checked in trigger\n    DECLARE @msg varchar(2000),    --used to\
  \ hold the error message\n    --use inserted for insert or update trigger, deleted\
  \ for update or delete trigger\n    --count instead of @@rowcount due to merge behavior\
  \ that sets @@rowcount to a number\n    --that is equal to number of merged rows,\
  \ not rows being checked in trigger\n            @rowsAffected int = (SELECT COUNT(*)\
  \ FROM inserted);\n    --           @rowsAffected int = (SELECT COUNT(*) FROM deleted);\n\
  \    BEGIN TRY\n        --[validation section]\n        --@numrows 是标准模板的一部分\n \
  \       DECLARE @nullcount int,\n                @validcount int;\n        IF UPDATE(CallId)\n\
  \        BEGIN\n            --omit this check if nulls are not allowed\n       \
  \     --(left in here for an example)\n            SELECT  @nullcount = COUNT(*)\n\
  \            FROM    inserted\n            WHERE   inserted.CallId IS NULL;\n  \
  \          --does not include null values\n            SELECT  @validcount = count(*)\n\
  \            FROM    inserted\n            JOIN PhoneData.Logs.Call AS Parent\n\
  \                on  inserted.CallId = Parent.CallId;\n            IF @validcount\
  \ + @nullcount != @rowsAffected\n            BEGIN\n                IF @rowsAffected\
  \ = 1\n                    SELECT @msg = 'The inserted CallId: '\n             \
  \           + cast(CallId AS varchar(10))\n                        + ' is not valid\
  \ in the'\n                        + ' PhoneData.Logs.Call table.'\n           \
  \         FROM   inserted;\n                ELSE\n                    SELECT @msg\
  \ = 'Invalid CallId in the inserted rows.';\n                THROW  50000, @Msg,\
  \ 1;\n            END\n        END\n        --[modification section]\n    END TRY\n\
  \    BEGIN CATCH\n        IF @@trancount > 0\n            ROLLBACK TRANSACTION\n\
  \        THROW; --will halt the batch or be caught by the caller's catch block\n\
  \    END CATCH;\nEND;\n```\n\n\n\n### INSTEAD OF 触发器\n\n正如“DML 触发器”章节引言所解释的，`INSTEAD\
  \ OF` 触发器在 SQL 引擎执行 DML 操作**之前**触发，而 `AFTER` 触发器则在操作**之后**触发。实际上，当你在表上定义了 `INSTEAD\
  \ OF` 触发器时，对该表执行 `INSERT`、`UPDATE` 或 `DELETE` 操作时，触发器会首先执行。之所以称为 `INSTEAD OF`，是因为它们**替代**了用户执行的原生操作。在触发器内部，你来执行实际的操作——可以是用户请求的操作，也可以是其他操作。这种触发器的一个实用之处在于，你可以将它们用于视图，使原本不可编辑的视图变得可编辑。通过这种方式，你将所有受影响表的调用封装在触发器中，就像存储过程一样，只不过现在这个视图具备了物理表的所有外部特性，向用户隐藏了实际的实现细节。\n\
  \n`INSTEAD OF` 触发器最明显的限制可能是，每个表上针对每个操作（`INSERT`、`UPDATE` 和 `DELETE`）只能有一个这样的触发器。也可以像\
  \ `AFTER` 触发器一样组合触发的操作，例如创建一个同时处理 `INSERT` 和 `UPDATE` 的 `INSTEAD OF` 触发器（对于几乎所有\
  \ `INSTEAD OF` 触发器的用法，我更强烈地建议不要这样做）。我们将使用与 T-SQL `AFTER` 触发器模板稍作修改的相同模板，附录 B 中有更详细的介绍。\n\
  \n我最常用 `INSTEAD OF` 触发器来自动设置或修改语句中的值，使得无论客户端发送什么内容，值都能被设置成我想要的样子，这很像我们在第 6 章中处理\
  \ `rowLastModifiedTime` 和 `rowCreatedTime` 列的方式。如果通过客户端调用记录最后更新时间，当某个客户端的时钟快了一分钟、一天甚至一年时，可能会出现问题。（你在应用程序中经常看到这种情况。我最喜欢的一个例子是一个系统，其中电话呼叫似乎花费了负的时间，因为客户端报告开始时间，而服务器记录结束时间。）你可以扩展这种设置值的范式来格式化任何数据，例如，如果你想将所有存储的数据都转换为小写。\n\
  \n我将演示两种可以使用 `INSTEAD OF` 触发器的方式：\n*   将无效数据重定向到异常表\n*   强制不对表执行任何操作，即使操作者技术上拥有适当的权限\n\
  \n通常最佳实践是不要像使用 `AFTER` 触发器那样，使用 `INSTEAD OF` 触发器来做引发错误的验证。通常，`INSTEAD OF` 触发器用于在后台以静默方式完成某些事情。\n\
  \n#### 将无效数据重定向到异常表\n\n在某些情况下，当为列设置了无效值时，你可能不想返回错误，而是选择忽略它并记录发生了错误。一般来说，这不会用于批量加载数据（使用\
  \ `SSIS` 的工具来做这件事是更好的主意），但以下是一些你可能这样做的示例：\n\n*   **盲打录入**：在许多接收客户反馈表或付款单据成百上千的公司，会有员工打开邮件、阅读内容并将页面上的信息录入系统。这些员工变得极其熟练于快速录入，并且通常很少出错。他们犯的错误不会在屏幕上引发错误；而是转交给其他人——异常处理人员——来修复。你可以使用\
  \ `INSTEAD OF` 触发器将错误数据重定向到异常表，以便稍后处理。\n*   **从设备读取的值**：一个例子是在装配线上，读取到的值超出了可能的范围，这可能是由于设备故障或人为移动了传感器造成的。过多的异常行需要检查设备，但只有少数几个异常可能是正常且可接受的。另一种可能是当有人使用扫描仪扫描印刷页面并插入数据时。通常，读取的值不正确，需要手动检查。\n\
  \n对于我们的示例，我将设计一个表来接收来自单个温度计的天气读数。有时，这个温度计会发回不可能的错误值。我们需要能够输入读数，有时一次输入多个，因为如果信号丢失，设备可以缓存一段时间的结果，但它会丢弃那些不太可能的行。\n\
  \n我们构建以下表，最初使用约束来实现简单的合理性检查。在数据分析中，我们可能会发现异常，但在这个过程中，我们要做的只是查找“不可能”的情况：\n\n```sql\n\
  CREATE SCHEMA Measurements;\nGO\nCREATE TABLE Measurements.WeatherReading\n(\nWeatherReadingId\
  \ int NOT NULL IDENTITY\nCONSTRAINT PKWeatherReading PRIMARY KEY,\nReadingTime \
  \  datetime2(3) NOT NULL\nCONSTRAINT AKWeatherReading_Date UNIQUE,\nTemperature\
  \     float NOT NULL\nCONSTRAINT CHKWeatherReading_Temperature\nCHECK(Temperature\
  \ BETWEEN -80 and 150)\n--raised from last edition for global warming\n);\n```\n\
  \n然后，我们加载数据，模拟一次性导入数据时可能执行的操作：\n\n```sql\nINSERT  INTO Measurements.WeatherReading\
  \ (ReadingTime, Temperature)\nVALUES ('20160101 0:00',82.00), ('20160101 0:01',89.22),\n\
  ('20160101 0:02',600.32),('20160101 0:03',88.22),\n('20160101 0:04',99.01);\n```\n\
  \n我们知道，对于 `CHECK` 约束，这行不通：\n\n```\nMsg 547, Level 16, State 0, Line 741\nThe INSERT\
  \ statement conflicted with the CHECK constraint \"CHKWeatherReading_Temperature\"\
  . The conflict occurred in database \"Chapter7\", table \"Measurements.WeatherReading\"\
  , column 'Temperature'.\n```\n\n选择表中的所有数据，你会发现这些数据从未被录入。这是否意味着我们必须逐行筛选？在当前方案下，是的。或者你可以逐行插入，这会给服务器带来更多工作，但如果你一直跟着做，你会知道我们将编写一个\
  \ `INSTEAD OF` 触发器来为我们完成这个任务。首先，我们添加一个表来存放违反 `Temperature` 规则的异常值：\n\n```sql\nCREATE\
  \ TABLE Measurements.WeatherReading_exception\n(\nWeatherReadingId  int NOT NULL\
  \ IDENTITY\nCONSTRAINT PKWeatherReading_exception PRIMARY KEY,\nReadingTime    \
  \   datetime2(3) NOT NULL,\nTemperature       float NULL\n);\n```\n\n然后，我们创建触发器：\n\
  \n\n\n## INSTEAD OF 触发器示例\n\n```\nCREATE TRIGGER Measurements.WeatherReading$InsteadOfInsertTrigger\n\
  ON Measurements.WeatherReading\nINSTEAD OF INSERT AS\nBEGIN\nSET NOCOUNT ON;\nSET\
  \ ROWCOUNT 0; --in case the client has modified the rowcount\n--use inserted for\
  \ insert or update trigger, deleted for update or delete trigger\n--count instead\
  \ of @@rowcount due to merge behavior that sets @@rowcount to a number\n--that is\
  \ equal to number of merged rows, not rows being checked in trigger\nDECLARE @msg\
  \ varchar(2000),    --used to hold the error message\n--use inserted for insert\
  \ or update trigger, deleted for update or delete trigger\n--count instead of @@rowcount\
  \ due to merge behavior that sets @@rowcount to a number\n--that is equal to number\
  \ of merged rows, not rows being checked in trigger\n@rowsAffected int = (SELECT\
  \ COUNT(*) FROM inserted);\n--      @rowsAffected int = (SELECT COUNT(*) FROM deleted);\n\
  BEGIN TRY\n--[validation section]\n--[modification section]\n--\n--BAD data\nINSERT\
  \ Measurements.WeatherReading_exception (ReadingTime, Temperature)\nSELECT ReadingTime,\
  \ Temperature\nFROM   inserted\nWHERE  NOT(Temperature BETWEEN -80 and 150);\n--GOOD\
  \ data\nINSERT Measurements.WeatherReading (ReadingTime, Temperature)\nSELECT ReadingTime,\
  \ Temperature\nFROM   inserted\nWHERE  (Temperature BETWEEN -80 and 150);\nEND TRY\n\
  BEGIN CATCH\nIF @@trancount > 0\nROLLBACK TRANSACTION;\nTHROW; --will halt the batch\
  \ or be caught by the caller's catch block\nEND CATCH;\nEND;\n```\n\n现在，我们尝试插入那些仍然包含错误数据的行：\n\
  \n```\nINSERT  INTO Measurements.WeatherReading (ReadingTime, Temperature)\nVALUES\
  \ ('20160101 0:00',82.00), ('20160101 0:01',89.22),\n('20160101 0:02',600.32),('20160101\
  \ 0:03',88.22),\n('20160101 0:04',99.01);\nSELECT *\nFROM Measurements.WeatherReading;\n\
  ```\n\n正确的数据会在以下输出中显示：\n\n```\nWeatherReadingId ReadingTime               Temperature\n\
  ---------------- ------------------------- ----------------------\n4           \
  \     2016-01-01 00:00:00.000   82\n5                2016-01-01 00:01:00.000   89.22\n\
  6                2016-01-01 00:03:00.000   88.22\n7                2016-01-01 00:04:00.000\
  \   99.01\n```\n\n不符合规范的数据可以通过查看异常表中的数据看到：\n\n```\nSELECT *\nFROM   Measurements.WeatherReading_exception;\n\
  ```\n\n这将返回以下结果：\n\n```\nWeatherReadingId ReadingTime               Temperature\n\
  ---------------- ------------------------- ----------------\n1                2008-01-01\
  \ 00:02:00.000   600.32\n```\n\n现在，或许可以回过头来处理每个异常值，根据前后测量值推断出它本应是多少：\n\n```\n(88.22\
  \ + 89.22) /2 = 88.72\n```\n\n当然，如果我们那样做，可能还需要添加另一个属性，用以表明该读数是推断值而非来自设备的实际读数。这显然是一个非常简化的例子，通过使用先前的读数来确定何为合理值，你甚至可以让功能变得更有趣。\n\
  \n关于 `INSTEAD OF` 触发器的一点说明。如果你在执行单值插入，可能会倾向于使用 `SCOPE_IDENTITY()` 来获取插入的行。如果你在表上有一个\
  \ `INSTEAD OF` 触发器，这将不会返回你期望的值：\n\n```\nINSERT  INTO Measurements.WeatherReading\
  \ (ReadingTime, Temperature)\nVALUES ('20160101 0:05',93.22);\nSELECT SCOPE_IDENTITY();\n\
  ```\n\n这将返回 `NULL`。如果你需要标识值，可以使用该行的替代键（本例中是 `ReadingTime`），或者像我们在第 6 章中为其中一个表所做的那样，使用\
  \ `SEQUENCE` 生成器，以便对使用的值进行控制。\n\n## 强制不执行对表的任何操作\n\n我们的最后一个 `INSTEAD OF` 触发器示例处理的几乎是一个安全问题。通常，用户拥有过多的权限，这包括通常使用\
  \ `sysadmin` 权限来查找系统问题的管理员。有些表我们根本不希望被修改。我们可能会实现触发器来阻止任何用户（甚至是系统管理员）更改数据。\n\n在这个例子中，我们将实现一个表来保存数据库的版本。这是一个单行“表”，其行为更像是一个全局变量。它的作用是告诉应用程序应该期待哪个版本的模式，这样它就可以告知用户需要升级或会失去功能：\n\
  \n```\nCREATE SCHEMA System;\nGO\nCREATE TABLE System.Version\n(\nDatabaseVersion\
  \ varchar(10)\n);\nINSERT  INTO System.Version (DatabaseVersion)\nVALUES ('1.0.12');\n\
  ```\n\n我们的应用程序总是查看这个值，以了解在使用对象时期望哪些对象存在。我们显然不希望这个值被修改，即使某人在数据库中拥有 `db_owner` 权限。因此，我们可能会应用一个\
  \ `INSTEAD OF` 触发器：\n\n```\nCREATE TRIGGER System.Version$InsteadOfInsertUpdateDeleteTrigger\n\
  ON System.Version\nINSTEAD OF INSERT, UPDATE, DELETE AS\nBEGIN\nSET NOCOUNT ON;\n\
  SET ROWCOUNT 0; --in case the client has modified the rowcount\n--use inserted for\
  \ insert or update trigger, deleted for update or delete trigger\n--count instead\
  \ of @@rowcount due to merge behavior that sets @@rowcount to a number\n--that is\
  \ equal to number of merged rows, not rows being checked in trigger\nDECLARE @msg\
  \ varchar(2000),    --used to hold the error message\n--use inserted for insert\
  \ or update trigger, deleted for update or delete trigger\n--count instead of @@rowcount\
  \ due to merge behavior that sets @@rowcount to a number\n--that is equal to number\
  \ of merged rows, not rows being checked in trigger\n@rowsAffected int = (SELECT\
  \ COUNT(*) FROM inserted);\nIF @rowsAffected = 0 SET @rowsAffected = (SELECT COUNT(*)\
  \ FROM deleted);\n--no need to complain if no rows affected\nIF @rowsAffected =\
  \ 0 RETURN;\n--No error handling necessary, just the message.\n--We just put the\
  \ kibosh on the action.\nTHROW 50000, 'The System.Version table may not be modified\
  \ in production', 16;\nEND;\n```\n\n尝试删除该值，像这样：\n\n```\nUPDATE System.Version\n\
  SET    DatabaseVersion = '1.1.1';\nGO\n```\n\n将导致以下结果：\n\n```\nMsg 50000, Level\
  \ 16, State 16, Procedure Version$InsteadOfInsertUpdateDeleteTrigger, Line 15\n\
  The System.Version table may not be modified in production\n```\n\n检查数据，你会发现它保持不变：\n\
  \n```\nSELECT *\nFROM   System.Version;\n返回结果：\nDatabaseVersion\n\n1.0.12\n```\n\
  \n管理员在进行升级时，必须采取有意识的步骤运行以下代码：\n\n```\nALTER TABLE system.version\nDISABLE TRIGGER\
  \ version$InsteadOfInsertUpdateDeleteTrigger;\n```\n\n现在，你可以运行 `UPDATE` 语句了：\n\n\
  ```\nUPDATE System.Version\nSET    DatabaseVersion = '1.1.1';\n```\n\n再次检查数据：\n\n\
  ```\nSELECT *\nFROM   System.Version;\n```\n\n你会看到它已经被修改了：\n\n```\nDatabaseVersion\n\
  \n1.1.1\n```\n\n使用 `ALTER TABLE`…`ENABLE TRIGGER` 重新启用触发器：\n\n```\nALTER TABLE System.Version\n\
  ENABLE TRIGGER Version$InsteadOfInsertUpdateDeleteTrigger;\n```\n\n使用这样的触发器（当然，不能禁用，这是你可以通过\
  \ DDL 触发器捕获的）可以让你“关上大门”，将数据安全地保存在表中，甚至防止意外更改。\n\n\n### 处理触发器与约束错误\n\n关于触发器和约束，一个需要考虑的重要方面是如何处理由它们引发的错误。使用触发器的一个缺点在于，触发器出错后的数据库状态与约束出错后的状态不同。在使用触发器并借助本章介绍的错误处理器执行`ROLLBACK`时，我们需要考虑两种情况：\n\
  \n*   **未使用`TRY-CATCH`块**：这种情况很简单。批处理会立即停止执行。SQL Server 会负责清理你所在的任何未完成的事务。\n*  \
  \ **使用`TRY-CATCH`块**：这种情况可能有点棘手，并且结果将取决于你期望发生什么。\n\n以一个`TRY-CATCH`块为例，其结构如下：\n\n\
  ```sql\nBEGIN TRY\n\nEND TRY\nBEGIN CATCH\n\nEND CATCH;\n```\n\n如果一个 T-SQL 触发器回滚并引发错误，当你进入`<handle\
  \ it>`块时，你将**不**处于一个事务中。对于 CLR 触发器这种罕见情况，由你来决定连接是否终止。当`CHECK`约束导致错误或执行简单的`THROW`或`RAISERROR`时，你将**处于**一个事务中。通用情况下，这是我使用的`CATCH`块（正如本章到目前为止编写的触发器中所使用的那样）：\n\
  \n```sql\nBEGIN CATCH\nIF @@trancount > 0\n    ROLLBACK TRANSACTION;\nTHROW; --将停止批处理或被捕获调用方的\
  \ catch 块捕获\nEND CATCH;\n```\n\n在几乎所有情况下，我都会回滚任何活动事务，记录错误，然后重新引发错误。将其作为一条规则来执行更简单，并且在\
  \ 99.997%的情况下都是期望的做法。为了展示可能发生的不同场景，我将构建以下抽象表来演示触发器和约束的错误处理：\n\n```sql\nCREATE SCHEMA\
  \ alt;\nGO\nCREATE TABLE alt.errorHandlingTest\n(\n    errorHandlingTestId   int\
  \ CONSTRAINT PKerrorHandlingTest PRIMARY KEY,\n    CONSTRAINT CHKerrorHandlingTest_errorHandlingTestId_greaterThanZero\n\
  \        CHECK (errorHandlingTestId > 0)\n);\n```\n\n请注意，如果你尝试向`errorHandlingTestId`插入一个不大于\
  \ 0 的值，将会导致约束错误。在触发器中，我们在`TRY`部分实现的唯一语句是引发错误。因此，无论向表发送什么输入，它都将被丢弃，并且会引发一个错误。像我们之前所做的那样，如果事务正在进行，我们将使用`ROLLBACK`，然后执行`THROW`。\n\
  \n```sql\nCREATE TRIGGER alt.errorHandlingTest$insertTrigger\nON alt.errorHandlingTest\n\
  AFTER INSERT\nAS\nBEGIN TRY\n    THROW 50000, 'Test Error',16;\nEND TRY\nBEGIN CATCH\n\
  \    IF @@TRANCOUNT > 0\n        ROLLBACK TRANSACTION;\n    THROW;\nEND CATCH;\n\
  ```\n\n首先需要理解的是，当一个普通的约束导致 DML 操作失败时，批处理**将继续**执行：\n\n```sql\n--无事务，约束错误\nINSERT\
  \ alt.errorHandlingTest\nVALUES (-1);\nSELECT 'continues';\n```\n\n你会看到错误被引发，然后`SELECT`语句得到执行：\n\
  \n```\nMsg 547, Level 16, State 0, Line 913\nThe INSERT statement conflicted with\
  \ the CHECK constraint \"CHKerrorHandlingTest_errorHandlingTestId_greaterThanZero\"\
  . The conflict occurred in database \"Chapter7\", table \"alt.errorHandlingTest\"\
  , column 'errorHandlingTestId'.\nThe statement has been terminated.\n\ncontinues\n\
  ```\n\n然而，对于触发器错误，情况则不同：\n\n```sql\nINSERT alt.errorHandlingTest\nVALUES (1);\n\
  SELECT 'continues';\n```\n\n这将返回以下结果，并且完全不会执行到`SELECT 'continues'`这一行：\n\n```\n\
  Msg 50000, Level 16, State 16, Procedure errorHandlingTest$afterInsertTrigger, Line\
  \ 6\nTest Error\n```\n\n使用`THROW`会产生这种相当优雅的停止，因为`THROW`会停止批处理。但是，使用`RAISERROR`时批处理也会停止，不过它会给出一条关于停止触发器的消息。正如我将要展示的，如果你只是在触发器中`THROW`一个错误，批处理最终也会停止，但方式远没有那么优雅。\n\
  \n在使用`TRY-CATCH`和事务时，处理约束和触发器的错误也存在差异。看下面的批处理。错误将是约束类型的。需要理解的关键点是错误后事务的状态。这绝对是一个你必须小心处理的问题。\n\
  \n```sql\nBEGIN TRY\n    BEGIN TRANSACTION\n    INSERT alt.errorHandlingTest\n \
  \   VALUES (-1);\n    COMMIT;\nEND TRY\nBEGIN CATCH\n    SELECT  CASE XACT_STATE()\n\
  \                WHEN 1 THEN 'Committable'\n                WHEN 0 THEN 'No transaction'\n\
  \                ELSE 'Uncommitable tran' \n            END as XACT_STATE\n    \
  \    ,ERROR_NUMBER() AS ErrorNumber\n        ,ERROR_MESSAGE() as ErrorMessage;\n\
  \    IF @@TRANCOUNT > 0\n        ROLLBACK TRANSACTION;\nEND CATCH;\n```\n\n这将返回以下结果：\n\
  \n```\nXACT_STATE        ErrorNumber ErrorMessage\n----------------- -----------\
  \ ----------------------------------------------------------\nCommittable      \
  \ 547         The INSERT statement conflicted with the CHECK constraint...\n```\n\
  \n事务仍然有效且处于稳定状态。如果你想继续在批处理中执行任何需要做的事情，这当然是可以的。然而，如果你最终使用任何触发器来强制执行数据完整性，情况将会不同（并且对程序员来说并非完全显而易见）。在下一个批处理中，我们将使用\
  \ 1 作为值，这样我们会得到触发器错误而不是约束错误：\n\n```sql\nBEGIN TRANSACTION\nBEGIN TRY\n    INSERT\
  \ alt.errorHandlingTest\n    VALUES (1);\n    COMMIT TRANSACTION;\nEND TRY\nBEGIN\
  \ CATCH\n    SELECT  CASE XACT_STATE()\n                WHEN 1 THEN 'Committable'\n\
  \                WHEN 0 THEN 'No transaction'\n                ELSE 'Uncommitable\
  \ tran' \n            END as XACT_STATE\n        ,ERROR_NUMBER() AS ErrorNumber\n\
  \        ,ERROR_MESSAGE() as ErrorMessage;\n    IF @@TRANCOUNT > 0\n        ROLLBACK\
  \ TRANSACTION;\nEND CATCH;\n```\n\n这将返回以下结果：\n\n```\nXACT_STATE        ErrorNumber\
  \ ErrorMessage\n----------------- ----------- --------------------------------------------\n\
  No transaction    50000       Test Error\n```\n\n在我们批处理的错误处理程序中，会话不再处于事务中，因为我们在触发器中回滚了事务。然而，与没有错误处理程序的情况不同，我们继续在批处理中执行，而不是让批处理终止。但请注意，如果不借助技巧（例如将状态存储在临时表变量中，而不是抛出错误或回滚，但为了保持代码标准和易于遵循，强烈不建议这样做），则无法从触发器中的问题恢复。\n\
  \n事务状态的不可预测性正是我们检查`@@TRANCOUNT`以查看是否需要回滚的原因。在这种情况下，触发器中的错误消息被冒泡到这个`CATCH`语句中，所以我们处于由`CATCH`块处理的错误状态。\n\
  \n作为最后的演示，让我们看另一种情况，即你在触发器中引发错误但**没有**回滚事务：\n\n```sql\nALTER TRIGGER alt.errorHandlingTest$insertTrigger\n\
  ON alt.errorHandlingTest\nAFTER INSERT\nAS\nBEGIN TRY\n    THROW 50000, 'Test Error',16;\n\
  END TRY\nBEGIN CATCH\n    --出于测试目的已注释掉\n    --IF @@TRANCOUNT > 0\n    --    ROLLBACK\
  \ TRANSACTION;\n    THROW;\nEND CATCH;\n```\n\n现在，在触发器中引发错误：\n\n```sql\nBEGIN TRY\n\
  \    BEGIN TRANSACTION\n    INSERT alt.errorHandlingTest\n    VALUES (1);\n    COMMIT\
  \ TRANSACTION;\nEND TRY\nBEGIN CATCH\n    SELECT  CASE XACT_STATE()\n          \
  \      WHEN 1 THEN 'Committable'\n                WHEN 0 THEN 'No transaction'\n\
  \                ELSE 'Uncommitable tran' \n            END as XACT_STATE\n    \
  \    ,ERROR_NUMBER() AS ErrorNumber\n        ,ERROR_MESSAGE() as ErrorMessage;\n\
  \    IF @@TRANCOUNT > 0\n        ROLLBACK TRANSACTION;\nEND CATCH;\n```\n\n结果如下：\n\
  \n```\nXACT_STATE          ErrorNumber ErrorMessage\n------------------- -----------\
  \ --------------------------------------------\nUncommitable tran   50000      \
  \ Test Error\n```\n\n你得到了一个无法提交的事务，也被称为“已注定”（doomed）事务。无法提交的事务仍然有效，但永远无法提交，最终必须被回滚。\n\
  \n所有这一切的重点是，在编写错误处理代码时，你需要小心地做几件事：\n\n\n*   保持简单：仅执行必要操作，通常将错误视为不可恢复的，除非恢复确实必需。关键在于处理错误并返回稳定状态，以便客户端知道如何重试。\n\
  *   保持标准：制定并遵循标准。在所有需要相同操作的代码中，始终使用相同的处理器。\n*   充分测试：最重要的信息是反复测试代码可能经过的所有路径。\n\n\
  为了在我的代码中始终保持一致的情况，我几乎总是使用一个标准处理器。基本上，在每个数据操作语句之前，我在变量中设置一条手动消息，将其作为消息的前半部分以了解正在执行的操作，然后追加系统消息以了解出了什么问题，有时会使用前面提到的约束映射函数，不过通常这是多余的，因为\
  \ UI 会捕获所有错误：\n\n```sql\nBEGIN TRY\nBEGIN TRANSACTION;\nDECLARE @errorMessage nvarchar(4000)\
  \ = 'Error inserting data into alt.errorHandlingTest';\nINSERT alt.errorHandlingTest\n\
  VALUES (-1);\nCOMMIT TRANSACTION;\nEND TRY\nBEGIN CATCH\nIF @@TRANCOUNT > 0\nROLLBACK\
  \ TRANSACTION;\n--I also add in the stored procedure or trigger where the error\n\
  --occurred also when in a coded object\nSET @errorMessage = CONCAT( COALESCE(@errorMessage,''),\
  \ ' ( System Error: ',\nERROR_NUMBER(),':',ERROR_MESSAGE(),\n' : Line Number:',ERROR_LINE());\n\
  THROW 50000,@errorMessage,16;\nEND CATCH;\n```\n\n现在，这返回以下内容：\n\n```\nMsg 50000,\
  \ Level 16, State 16, Line 18\nError inserting data into alt.errorHandlingTest (\
  \ System Error: 547:The INSERT statement conflicted with the CHECK constraint \"\
  chkAlt_errorHandlingTest_errorHandlingTestId_greaterThanZero\".\nThe conflict occurred\
  \ in database \"Chapter7\", table \"alt.errorHandlingTest\", column 'errorHandlingTestId':\
  \ Line Number:4)\n```\n\n这将返回手动创建的消息和系统消息，以及错误发生的位置。在附录 B 中，我概述了一些记录错误的额外方法，使用我称为\
  \ `ErrorHandling.ErrorLog$insert` 的存储过程，具体取决于错误是预期偶尔发生还是（如我关于触发器所说）确实不应该发生的情况。如果我以预期错误会发生的方式实现代码，我还可能包含对类似\
  \ `ErrorHandling.ErrorMap$MapError` 过程的调用，以美化系统错误的错误消息值。\n\n错误处理无疑是 SQL Server 的\
  \ T-SQL 语言相比几乎所有其他语言都欠缺的地方，但在 2005 年通过 `TRY…CATCH` 取得了飞跃式的改进，并在 2012 年通过使用 `THROW`\
  \ 重新引发错误的能力（我们在标准触发器模板中已经使用）进行了一些改进。当然，编写错误处理代码最重要的部分是进行测试以确保其有效！\n\n## 最佳实践\n\n\
  主要的最佳实践是使用正确的工具完成工作。SQL 中（及其周围）有许多工具可用于保护数据。为特定情况选择合适的工具至关重要。例如，每个表中的每个列都可以定义为 `nvarchar(max)`。使用\
  \ `CHECK` 约束，然后可以将值约束为看起来像几乎任何数据类型。这听起来可能很傻，但确实是可能的。但阅读了第 6 章和本章之后，你就更清楚了，对吧？\n\n\
  在选择保护数据的方法时，最好按以下顺序应用以下类型的对象：\n\n*   数据类型：选择正确的类型是第一道防线。如果你的所有值都需要是 1 到 10,000 之间的整数，仅使用\
  \ `integer` 数据类型就立即满足了规则的一部分。\n*   默认值：虽然你可能不认为默认值可以被视为数据保护资源，但你应该知道你可以使用它们自动设置那些对用户可能不明显的列（数据库为该列添加合适的值）。\n\
  *   简单的 `CHECK` 约束：这些对于确保你的数据符合规范非常重要。你可以使用几乎任何标量函数（用户定义的或系统的），只要你最终得到一个单一的逻辑表达式。\n\
  *   复杂的 `CHECK` 约束，可能使用函数：这些可以是设计中非常有趣的部分，但应谨慎使用，并且你应该很少使用引用同一表数据的函数，因为结果可能不一致。\n\
  *   触发器：这些用于强制执行对于 `CHECK` 约束来说过于复杂的规则。触发器允许你构建代码段，这些代码段在针对单个表执行的任何 `INSERT`、`UPDATE`\
  \ 和 `DELETE` 操作上自动触发。\n\n不要害怕在多个位置强制执行规则。虽然将规则尽可能靠近数据存储对于在使用数据时信任数据的完整性至关重要，但没有理由让用户忍受糟糕的用户界面，例如一堆没有验证的简单文本框。\n\
  \n当然，并非所有的数据保护都可以在对象级别完成，有些需要使用客户端代码甚至在数据输入很久之后才执行的异步过程来管理。用户代码与本书到目前为止讨论的方法的主要区别在于，基于\
  \ SQL Server 的强制完整性是自动的，并且不能（意外地）被覆盖。在处理并发用户频繁更改数据方面，它也远远更优。\n\n\n\n## 总结\n\n现在，您已完成为数据库开发数据存储的任务。如果您已规划好数据存储和数据保护层，那么可能进入您系统的不良数据就与设计无关了（如果用户想把名字\
  \ John 拼写成 “Jahn” 甚至 “IdiotWhoInsultedMe”——更奇怪的事情都发生过！——数据库服务器层面是无法阻止的）。\n\n作为架构师或程序员，您不可能阻止用户将设备名称放入名为\
  \ `Employee` 的表中。数据库没有内置的语义检查功能，并且要实现这一点需要巨大的工作量和计算能力，这几乎是不可能的。只有通过教育才能解决这个问题。当然，如果您为用户提供了存储所有数据的表，情况会有所改善，但用户终究是用户。\n\
  \n我们在 SQL Server 中能做的最多是确保数据基本合理，即数据至少在不考虑用户决策背景（无论其正确与否，只要是合法值）的情况下是有意义的。如果您的 HR\
  \ 员工一直试图给新程序员支付最低工资，数据库可能不会在意；但如果他们试图说新员工的工资是负数，实际上是要为获得工作机会而欠公司钱，嗯，这恐怕行不通，即使这份工作是电子游戏测试员或其他非常令人向往的职位。在此过程中，我们利用\
  \ SQL Server 提供的资源来保护数据，防止其出现此类无效值，否则这些值日后还需要再次检查。\n\n使用**检查约束**来保护单行数据。您可以访问表中的任何列，但只能访问该行的数据。如果需要，您可以使用用户定义函数访问其他表中的数据，但请注意，就像构建自己的外键检查一样，您需要考虑正在检查的表以及所引用表的情况。使用**触发器**进行最复杂的检查，尤其是在需要引用同一表中的行时，例如检查余额。触发器还可能引入副作用，例如在需要时维护非规范化数据，甚至调用其他存储过程如\
  \ `sp_db_sendmail`。编写触发器最重要的一点是理解它每执行一次 DML 操作就执行一次，所以无论影响了 1 行还是 10 亿行，都只执行一次。请提前规划。\n\
  \n一旦您构建并实施了一套适当的数据保护资源，您就可以信任数据库中的数据已经过验证。数据一旦存储到数据库中，您就永远不需要重新验证键或值，但进行随机抽样是个好主意，这样您就能知道是否有完整性漏洞被遗漏，尤其是在全面测试过程中。\n\
  \n# 8. 模式与反模式\n\n简而言之，没有一种模式是孤立的实体。每种模式能够存在的程度，取决于其他模式的支持：它所嵌入的更大模式、围绕它的同规模模式，以及嵌入其中的更小模式。\n\
  ——克里斯托弗·亚历山大，建筑师和设计理论家\n\n有句老话说，不应该尝试重新发明轮子，老实说，这本质上是句非常好的话。但对于所有类似的说法，应用时都需要一点常识。如果历史上每个人都按字面意思理解这句话，那么你的车轮就会是用树干做的（《流言终结者》在他们的“好木头”一集中证明这是可行的），因为这显然可能是最早使用的轮状机器之一。如果历史上每个人都说“这已经够好了”，那么开着家里的旅行车去\
  \ Walley World 会是一次远不那么舒适的体验。\n\n然而，随着时间的推移，轮子的基本概念一直保持不变，从石轮到马车轮，再到钢丝子午线轮胎，甚至是一块切达干酪轮。每一种都是圆形的，能够通过滚动从\
  \ A 地移动到 B 地。每个解决方案都遵循这个共同的模式，但又有所分化以解决特定问题。软件程序员的目标应该是首先尝试理解现有技术，然后要么使用，要么改进它们。在不了解历史的情况下反复解决同样的问题，是愚蠢的。\n\
  \n软件设计（当然是数据库设计）的一个巧妙之处在于，存在一些基础模式，例如规范化，我们将以此为基础构建，但还有更多的模式是从规范化表开始逐步构建起来的。这就是本章的内容：利用我们迄今为止构建的基本结构，通过越来越复杂的结构组合，我们将产生更复杂、更有趣的解决方案。\n\
  \n当然，正如存在行之有效的正面模式一样，历史上也存在反复失败的负面模式。以个人飞行为例。在很长很长一段时间里，真正聪明的人们一次又一次地尝试将翅膀绑在手臂上飞行。他们在概念上是接近的，但只是重复做同样的事情确实是愚蠢的。一旦人们理解了如何将伯努利原理应用于制造机翼，以及真正实现飞行需要什么，莱特兄弟就应用这些原理制造出了第一架载人飞行器。如果您有机会经过北卡罗来纳州的基蒂霍克，您可以看到那架飞机和那次飞行的地点。从那架飞机到今天的飞机，基本原理并没有发生惊人的变化。他们的第一次飞行不需要全身扫描和拍身检查，但机翼的工作原理是一样的。\n\
  \n到目前为止，在本书中，我们已经介绍了您可以用来组装满足现实世界需求的解决方案的基本实现工具。在本章中，我将扩展这个概念，并提供一些更深入的示例，在这些示例中，我们将组装数据库的一部分，以处理几乎任何数据库解决方案中都会出现的常见问题。本章分为两个主要部分，从较大的主题开始，即希望使用的模式。第二大部分讨论反模式，或者您可能经常看到但不建议使用的模式（自然，也会提供首选的解决方案方法）。\n\
  \n\n## 理想模式\n\n在本节中，我将介绍多种实现模式，这些模式可用于解决你经常会遇到的一些非常常见的问题。请不要将其与你可能面临的问题类型的全面列表相混淆；相反，可以将其视为解决一些常见问题的示例集。\n\
  \n我将在以下小节中介绍的模式和解决方案如下：\n\n*   **唯一性**：超越我们在本书前几章介绍的简单唯一性，我们将探讨一些无法通过简单唯一性约束实现的、非常现实的解决方案模式。\n\
  *   **数据驱动设计**：数据驱动设计的目标是永不硬编码没有固定含义的值。你将编程需求分解为可基于数据值集合的情景，这些数据值可以在不影响代码的情况下进行修改。\n\
  *   **历史/时态数据**：有时，查看随时间变化的数据的先前版本是非常可取的。我将介绍一些策略，你可以使用它们来查看数据在历史不同时间点的状态。\n*  \
  \ **层次结构**：一个非常常见的需求是在数据中实现层次结构。最常见的例子是经理-员工关系。我将演示两种最简单的实现方法，并介绍其他你可以探索的方法。\n*\
  \   **图像、文档和其他文件**：通常需要将文档存储在数据库中，例如网络用户的头像图片、用于识别员工的安全照片，甚至是多种类型的文档。我们将探讨 SQL Server\
  \ 中可用的一些方法，并讨论你可能选择某种方法的原因。\n*   **泛化**：我们将探讨一些需要注意表具体程度的方法，以便使解决方案适应用户的需求。\n* \
  \  **存储用户指定的数据**：你无法总是设计一个数据库来满足所有已知的未来需求。我将介绍一些可能性，让用户以管理员可以某种程度控制的方式自己扩展他们的数据库。\n\
  \n> **注意**\n>\n> 我一直在寻找可以解决常见问题并增强你的设计（以及我的设计）的其他模式。在我的网站（[`www.drsql.org`](http://www.drsql.org)）上，我可能会随时间提供更多条目，如果你有更多模式的想法，请给我留言。\n\
  \n### 唯一性\n\n如果你一直在通读本书，你可能已经认识到唯一性是设计中的一个主要关注点。事实是，在数据库设计中，唯一性将是你要解决的最大问题之一，因为在某些情况下，区分两行数据可能是一项非常困难的任务。\n\
  \n在本节中，我们将探讨如何实现不同类型的唯一性问题，这些问题直指你会遇到的常见问题的核心：\n\n*   **选择性唯一**：有时，我们不会拥有所有行的全部信息，但我们确实有数据的那些行需要是唯一的。例如，考虑员工的驾照号码。不能有两个人拥有相同的信息，但并非每个人都必然拥有驾照，至少没有记录在数据库中。\n\
  *   **批量唯一**：有时，我们需要对物品进行清点，其中一些物品是等同的。例如，杂货店的玉米罐头。你无法区分每个物品，但你确实需要知道你有多少个。\n* \
  \  **范围唯一**：除了单一值的唯一性，我们通常还需要确保数据范围不重叠，例如预约。以理发店为例。你肯定不希望麦吉利卡蒂女士和默茨女士在同一时间有预约，否则没有人会满意。当你管理交通系统时，事情甚至更加重要。\n\
  *   **近似唯一**：最困难的情况也是最常见的情况，即区分到你公司寻求服务的两个人可能真的很难。昨天有两位路易斯·戴维森购买了玩具飞机吗？有可能。是同一电话号码和地址，用同一类型的信用卡吗？很可能不是。但我反复强调的另一点是，在数据库中你无法强制执行“可能”……只能强制执行“确定”。\n\
  \n唯一性是日常运营中最大的难题之一，尤其是在经营公司时，因为它对于不得罪客户、避免在客户实际只下了一个订单时却给他们运送了 100 个乐高订单至关重要。我们需要确保不会最终拥有十个社会安全号码相同的员工（并招致税务人员的来访）、玉米罐头比预期的少得多、同一时间有十个预约，等等。\n\
  \n## 选择性唯一性\n\n我们之前讨论了 `PRIMARY KEY` 和 `UNIQUE` 约束，但这两者都无法满足“确保数据的某个子集（而非每一行）是唯一的”这种场景。例如，假设你有一个员工表，每位员工可能都有一份保险单。保险单号必须是唯一的，但用户可能没有保险单。\n\
  \n对此问题有三种常见的解决方案：\n\n*   **筛选索引**：此功能在 SQL Server 2008 中新增。`CREATE INDEX` 命令的语法包含一个\
  \ `WHERE` 子句，使得索引仅适用于表中的特定行。\n*   **索引视图**：在 2008 之前的版本中，实现此功能的方法是创建一个带有 `WHERE`\
  \ 子句的视图，然后对该视图创建索引。\n*   **为可为空的项建立单独的表**：一个值得注意的解决方案是为低基数唯一性项建立一个单独的表。例如，你可能会有一个存放员工保险单号的表。在某些情况下，这可能是最佳解决方案，但它可能导致表数量激增，而这些表从未被单独访问，从而增加了不必要的工作量。如果设计得当，你应该在项目的设计阶段就决定采用此方案。\n\
  \n作为演示，我将创建一个人力资源员工表的模式和表，其中包含员工编号列和保险单号列。除非另有说明，我将在示例中使用名为 `Chapter8` 的数据库及其默认设置。\n\
  \n```\nCREATE SCHEMA HumanResources;\nGO\nCREATE TABLE HumanResources.Employee\n\
  (\nEmployeeId int IDENTITY(1,1) CONSTRAINT PKEmployee primary key,\nEmployeeNumber\
  \ char(5) NOT NULL\nCONSTRAINT AKEmployee_EmployeeNummer UNIQUE,\n--skipping other\
  \ columns you would likely have\nInsurancePolicyNumber char(10) NULL\n);\n```\n\n\
  筛选索引对于性能调整非常有用，特别是当只有少数值具有高选择性时，但它也适用于排除值以实现数据保护。除了 `WHERE` 子句之外，索引的所有方面都与普通索引相同（索引将在第\
  \ 10 章中更详细地介绍）。因此，你可以像这样添加一个索引：\n\n```\n--筛选后的备用键 (AKF)\nCREATE UNIQUE INDEX AKFEmployee_InsurancePolicyNumber\
  \ ON\nHumanResources.Employee(InsurancePolicyNumber)\nWHERE InsurancePolicyNumber\
  \ IS NOT NULL;\n```\n\n然后，创建一个初始样本行：\n\n```\nINSERT INTO HumanResources.Employee\
  \ (EmployeeNumber, InsurancePolicyNumber)\nVALUES ('A0001','1111111111');\n```\n\
  \n如果你尝试为另一位员工分配相同的 `InsurancePolicyNumber`\n\n```\nINSERT INTO HumanResources.Employee\
  \ (EmployeeNumber, InsurancePolicyNumber)\nVALUES ('A0002','1111111111');\n```\n\
  \n这次插入会失败：\n\n```\nMsg 2601, Level 14, State 1, Line 29\nCannot insert duplicate\
  \ key row in object 'HumanResources.employee' with unique index 'AKFEmployee_InsurancePolicyNumber'.\
  \ The duplicate key value is (1111111111).\n```\n\n使用更正后的值添加行将会成功：\n\n```\nINSERT\
  \ INTO HumanResources.Employee (EmployeeNumber, InsurancePolicyNumber)\nVALUES ('A0002','2222222222');\n\
  ```\n\n然而，添加两行 `NULL` 值将正常工作：\n\n```\nINSERT INTO HumanResources.Employee (EmployeeNumber,\
  \ InsurancePolicyNumber)\nVALUES ('A0003','3333333333'),\n('A0004',NULL),\n('A0005',NULL);\n\
  ```\n\n你可以看到这个查询\n\n```\nSELECT *\nFROM   HumanResources.Employee;\n```\n\n返回了以下结果：\n\
  \n```\nEmployeeId       EmployeeNumber           InsurancePolicyNumber\n----------------\
  \ ------------------------ --------------------------------\n1                A0001\
  \                    1111111111\n3                A0002                    2222222222\n\
  4                A0003                    3333333333\n5                A0004   \
  \                 NULL\n5                A0005                    NULL\n```\n\n\
  `NULL` 的例子是经典示例，因为人们通常希望实现这种功能。然而，此技术不仅限于排除 `NULL`。再举一例，假设你希望确保一组行中只有一行被设为主联系人，例如某个账户的主要联系人：\n\
  \n```\nCREATE SCHEMA Account;\nGO\nCREATE TABLE Account.Contact\n(\nContactId  \
  \ varchar(10) NOT NULL,\nAccountNumber   char(5) NOT NULL, --在完整示例中会是外键\nPrimaryContactFlag\
  \ bit NOT NULL,\nCONSTRAINT PKContact PRIMARY KEY(ContactId, AccountNumber)\n);\n\
  ```\n\n再次创建一个索引，但这次只选择那些 `PrimaryContactFlag` = `1` 的行。表中的其他值可以有任意多个其他值（当然，在此例中，由于是\
  \ `bit` 类型，值只能是 0 或 1）。\n\n```\nCREATE UNIQUE INDEX AKFContact_PrimaryContact\n\
  ON Account.Contact(AccountNumber) WHERE PrimaryContactFlag = 1;\n```\n\n如果你尝试插入两个主联系人，如下列语句将联系人\
  \ `'fred'` 和 `'bob'` 都设为账户号为 `'11111'` 的账户的主要联系人：\n\n```\nINSERT INTO Account.Contact\n\
  VALUES ('bob','11111',1);\nGO\nINSERT INTO Account.Contact\nVALUES ('fred','11111',1);\n\
  ```\n\n第二次插入后会返回以下错误：\n\n```\nMsg 2601, Level 14, State 1, Line 73\nCannot insert\
  \ duplicate key row in object 'Account.Contact' with unique index 'AKFContact_PrimaryContact'.\
  \ The duplicate key value is (11111).\n```\n\n要插入名为 `'fred'` 的行并将其设为主要联系人（假设 `'bob'`\
  \ 行先前已插入），你需要先将另一行更新为非主要，然后插入新的主要行：\n\n```\nBEGIN TRANSACTION;\nUPDATE Account.Contact\n\
  SET PrimaryContactFlag = 0\nWHERE  accountNumber = '11111';\nINSERT Account.Contact\n\
  VALUES ('fred','11111', 1);\nCOMMIT TRANSACTION;\n```\n\n请注意，在这种情况下，你肯定希望在代码中使用事务和错误处理，这样如果\
  \ `INSERT` 操作因其他原因失败，你就不会最终没有主要联系人。\n\n在 SQL Server 2008 之前，没有筛选索引时，实现此功能的优选方法是创建一个带有唯一聚集索引的索引视图。还有其他几种方法可以做到这一点（例如在触发器或存储过程中使用\
  \ `EXISTS` 查询，或者甚至在 `CHECK` 约束中使用用户定义函数），但如果你不能使用筛选索引，索引视图是最简单的（尽管截至本文撰写时，它在所有支持的\
  \ SQL Server 版本中都可用）。\n\n筛选索引的一个副作用是，它（就像我们之前使用的唯一性约束一样）极有可能对表的搜索查询有用的。唯一的缺点是错误来自索引而非约束，因此它不符合我们现有的错误处理范式。\n\
  \n\n## 批量唯一性\n\n有时，我们需要对现实世界中部分等价的物品进行盘存，例如杂货店的玉米罐头。通常，你甚至无法通过外观区分这些罐头（除非它们的保质期不同），但了解库存数量是非常普遍的需求。如果为一个街角小店的每罐商品都实现一个包含一行的解决方案，即使对于非常小的商店，也需要一个庞大的数据库。这将变得非常复杂，并且需要大量的行和数据操作。事实上，它可能使某些查询更容易，但会使数据存储变得更加困难。\n\
  \n你可以为每种类型的物品实现一行，而不是为每个单独的物品保留一行。这种类型将用于存储库存和消耗量，然后两者之间进行平衡。图 8-1 展示了一个非常简化的此类活动模型。\n\
  \n![A978-1-4842-1973-7_8_Fig1_HTML.jpg](img/A978-1-4842-1973-7_8_Fig1_HTML.jpg)\n\
  \n**图 8-1. 简化的库存模型**\n\n在 `InventoryAdjustment` 表中，你会记录入库的货品、被盗的物品、盘点后库存的变动（可能增加或减少，取决于你掌握数据的质量）等等。而在\
  \ `ProductSale` 表中（在一个完整模型中，它可能是销售头表或发票表的子表），你会记录因客户交互而从库存中移除或添加的产品。\n\n`InventoryAdjustment.Quantity`\
  \ 值的总和减去 `ProductSale.Quantity` 值的总和，应该告诉你手头产品的数量（或者可能是你超卖并需要紧急订购的数量！）。在更现实的场景中，你会遇到大量关于延期交货、未来订单、退货等的复杂情况，但基本概念是相同的。每一行不再代表单个物品，而是代表一批物品。\n\
  \n以下是一个微型设计示例，是我在为期一天的数据库设计研讨会上布置给学生们的作业。它涉及一个玩具收藏集，其中许多玩具是完全相同的：\n\n*   某人痴迷于他的乐高®收藏。他有成千上万的乐高积木，并希望将他的乐高进行编目，无论是存储在仓库中还是用于当前所在的创作中。乐高要么存放在存储“堆”中，要么用于某个套装。套装可以是购买的（将通过最多五位数的数字代码标识），也可以是个人的（没有数字代码）。两种风格的套装都应该有一个分配的名称和一个描述性说明的位置。\n\
  *   乐高有多种形状和尺寸，大多数以 2 或 3 维测量。首先是基于顶部凸点数量的宽度和长度，然后有时基于标准高度（例如，砖块有高度；薄板固定为 1 个砖块高度单位的\
  \ 1/3）。每个部件也有多种不同的标准颜色。除了尺寸部件外，还有许多不同的配件（有些有长度/宽度值）、说明书等等，这些都可以被编目。\n\n示例部件和套装如图\
  \ 8-2 所示。\n\n![A978-1-4842-1973-7_8_Fig2_HTML.jpg](img/A978-1-4842-1973-7_8_Fig2_HTML.jpg)\n\
  \n**图 8-2. 用于数据库的示例乐高部件**\n\n为了解决这个问题，我将为我拥有的每个乐高套装创建一个表（我将其称为 `Build`，因为“set”对于\
  \ SQL 名称来说是个不好的词，而“build”实际上更能涵盖个人创作）：\n\n```sql\nCREATE SCHEMA Lego;\nGO\nCREATE\
  \ TABLE Lego.Build\n(\nBuildId int CONSTRAINT PKBuild PRIMARY KEY,\nName    varchar(30)\
  \ NOT NULL CONSTRAINT AKBuild_Name UNIQUE,\nLegoCode varchar(5) NULL, --five character\
  \ set number\nInstructionsURL varchar(255) NULL --where you can get the PDF of the\
  \ instructions\n);\n```\n\n然后，我会为那个构建的每个单独实例添加一个表，我称之为 `BuildInstance`：\n\n```sql\n\
  CREATE TABLE Lego.BuildInstance\n(\nBuildInstanceId Int CONSTRAINT PKBuildInstance\
  \ PRIMARY KEY ,\nBuildId Int CONSTRAINT FKBuildInstance$isAVersionOf$LegoBuild\n\
  REFERENCES Lego.Build (BuildId),\nBuildInstanceName varchar(30) NOT NULL, --brief\
  \ description of item\nNotes varchar(1000)  NULL, --longform notes. These could\
  \ describe modifications\n--for the instance of the model\nCONSTRAINT AKBuildInstance\
  \ UNIQUE(BuildId, BuildInstanceName)\n);\n```\n\n下一个任务是为每种单独的部件类型创建一个表。我使用了术语“piece”作为你可以为乐高获得的不同种类部件（包括各种配件）的通用版本：\n\
  \n```sql\nCREATE TABLE Lego.Piece\n(\nPieceId int CONSTRAINT PKPiece PRIMARY KEY,\n\
  Type    varchar(15) NOT NULL,\nName    varchar(30) NOT NULL,\nColor   varchar(20)\
  \ NULL,\nWidth int NULL,\nLength int NULL,\nHeight int NULL,\nLegoInventoryNumber\
  \ int NULL,\nOwnedCount int NOT NULL,\nCONSTRAINT AKPiece_Definition UNIQUE (Type,Name,Color,Width,Length,Height),\n\
  CONSTRAINT AKPiece_LegoInventoryNumber UNIQUE (LegoInventoryNumber)\n);\n```\n\n\
  请注意，我将拥有数量 (`OwnedCount`) 实现为部件的一个属性，而不是一个多值属性来表示库存变动事件。在一个完全展开的销售模型中，这可能是不够的，但对于个人库存\
  \ (`personal inventory`) 来说，这是一个合理的解决方案。这里可能的用途是在新部件加入库存时更新该值，并可能在以后清点散件数量，并将该值添加到套装中的部件数量（我们稍后会有一个查询来处理）。\n\
  \n接下来，我将实现将部件分配给不同构建的表：\n\n```sql\nCREATE TABLE Lego.BuildInstancePiece\n(\nBuildInstanceId\
  \ int NOT NULL,\nPieceId int NOT NULL,\nAssignedCount int NOT NULL,\nCONSTRAINT\
  \ PKBuildInstancePiece PRIMARY KEY (BuildInstanceId, PieceId)\n);\n```\n\n从这里开始，我可以加载一些数据。我将加载一个真正的乐高商品，它可供销售，并且我经常在演示中赠送。这是一辆小型的黑色单座汽车，里面有一个穿着连帽衫的小人仔。\n\
  \n```sql\nINSERT Lego.Build (BuildId, Name, LegoCode, InstructionsURL)\nVALUES \
  \ (1,'Small Car','3177',\n'http://cache.lego.com/bigdownloads/buildinginstructions/4584500.pdf');\n\
  ```\n\n我会为这个创建一个实例，因为我的个人收藏中只有一个（另外还有一些盒装的用于赠送）：\n\n```sql\nINSERT Lego.BuildInstance\
  \ (BuildInstanceId, BuildId, BuildInstanceName, Notes)\nVALUES (1,1,'Small Car for\
  \ Book',NULL);\n```\n\n然后，我将收藏中不同的部件加载到表中，在本例中，是套装中包含的部件类型，再加上一些额外的部件。（请注意，在完全展开的设计中，其中一些值会有域约束，以及验证来强制执行具有高度、宽度和/或长度的项目类型。部分省略了此细节是为了简单，部分是因为对于基于用户需求的此类系统来说，实现起来可能过于复杂——尽管主要是为了以最紧凑的方式演示批量唯一性的基本原理。）\n\
  \n\n\n```\nINSERT Lego.Piece (PieceId, Type, Name, Color, Width, Length, Height,\n\
  LegoInventoryNumber, OwnedCount)\nVALUES (1, 'Brick','Basic Brick','White',1,3,1,'362201',20),\n\
  (2, 'Slope','Slope','White',1,1,1,'4504369',2),\n(3, 'Tile','Groved Tile','White',1,2,NULL,'306901',10),\n\
  (4, 'Plate','Plate','White',2,2,NULL,'302201',20),\n(5, 'Plate','Plate','White',1,4,NULL,'371001',10),\n\
  (6, 'Plate','Plate','White',2,4,NULL,'302001',1),\n(7, 'Bracket','1x2 Bracket with\
  \ 2x2','White',2,1,2,'4277926',2),\n(8, 'Mudguard','Vehicle Mudguard','White',2,4,NULL,'4289272',1),\n\
  (9, 'Door','Right Door','White',1,3,1,'4537987',1),\n(10,'Door','Left Door','White',1,3,1,'45376377',1),\n\
  (11,'Panel','Panel','White',1,2,1,'486501',1),\n(12,'Minifig Part','Minifig Torso\
  \ , Sweatshirt','White',NULL,NULL,\nNULL,'4570026',1),\n(13,'Steering Wheel','Steering\
  \ Wheel','Blue',1,2,NULL,'9566',1),\n(14,'Minifig Part','Minifig Head, Male Brown\
  \ Eyes','Yellow',NULL, NULL,\nNULL,'4570043',1),\n(15,'Slope','Slope','Black',2,1,2,'4515373',2),\n\
  (16,'Mudguard','Vehicle Mudgard','Black',2,4,NULL,'4195378',1),\n(17,'Tire','Vehicle\
  \ Tire,Smooth','Black',NULL,NULL,NULL,'4508215',4),\n(18,'Vehicle Base','Vehicle\
