  ## 替代建模方法


  在本节中，我将简要描述一些其他建模方法，当你在网络上寻找数据库信息时使用的工具中可能会遇到这些方法。你会发现它们之间有很多相似之处——例如，大多数方法都使用矩形表示表，用线表示关系。你也会看到它们之间的一些巨大差异，例如如何指示关系的基数和方向。例如，IDEF1X
  在子端使用实心圆，在另一端使用可选菱形，而一种最流行的方法在一端使用多条线，在另一端使用多个短横线来表示相同的东西。还有一些方法使用箭头从子指向父，以指示迁移键的来源（这确实会让习惯
  IDEF1X 和鸦爪符号的人感到困惑）。


  虽然本书中的所有示例都将使用 IDEF1X 完成，但了解其他方法在你上网搜索示例图以帮助你设计正在工作的数据库时可能会有所帮助。（架构师尤其不善于寻找现有设计，因为坦白说，解决手头的问题是工作的最佳部分之一。）


  我将简要讨论以下方法：


  *   信息工程（IE）：另一种主要方法，通常被称为鸦爪法

  *   Chen 实体关系模型（ERD）：主要由学术界使用的方法，尽管你可以在网上遇到这些模型


  注意


  此列表绝非详尽无遗。例如，没有列出基于统一建模语言（UML）类建模方法的几种变体。这类图表很常见，特别是对于使用 UML 其他组件的人，但这些模型实际上没有标准。关于
  UML 数据模型的进一步阅读可以在 Clare Churcher 的《Beginning Database Design》（Apress，2007）、Scott
  Adler 的 AgileData 网站（ [`www.agiledata.org/essays/umlDataModelingProfile.html`](http://www.agiledata.org/essays/umlDataModelingProfile.html)
  ）以及 IBM 的 Rational UML 文档网站（ [`www.ibm.com/software/rational`](http://www.ibm.com/software/rational)
  ）等许多其他地方找到。（这些 URL 容易改变的典型免责声明适用。）SQL Server Management Studio 包含一些基本的建模功能，可以显示物理数据库的模型。



  ### 信息工程


  信息工程（IE）方法论广为人知且被广泛使用（它和 IDEF1X 哪个更常见难分伯仲）。与 IDEF1X 类似，它能以清晰、紧凑且易于理解的方式展示必要信息。最大的区别在于该方法如何表示关系基数：它使用鱼尾纹代替点和线，并用虚线代替菱形和某些字母。


  在该方法中，表被表示为矩形，基本与 IDEF1X 相同。根据 IE 标准，属性不会显示在模型上，但大多数模型展示属性的方式与 IDEF1X 相同——以列表形式显示，尽管主键通常通过给属性添加下划线来标识，而不是通过在表中的位置来标识。（我也见过其他标识主键以及备用键/外键的方法，但它们通常都很清晰。）使用
  IE 方法时，在处理关系方面则非常不同。


  就像在 IDEF1X 中一样，IE 有一套必须理解的符号，用于指示关系中数据的基数和所有权。通过改变线条末端的基本符号，你可以得出关系的各种可能性。表 3-3
  展示了可用于构建关系表示的不同符号。


