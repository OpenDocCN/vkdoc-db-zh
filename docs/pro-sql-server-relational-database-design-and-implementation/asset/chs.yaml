  *   杰西卡·莫斯，感谢她教会我很多关于数据仓库的知识，并花时间为本书撰写了最后一章。\n*   保罗·尼尔森，感谢他挑战我进步，并更深入地思考关系模型及其优缺点。\n\
  *   MVP 计划，或许更重要的是，这些年来我接触到的 MVP 和微软人士。我在新闻组、邮件列表，特别是在 MVP 峰会上学到了很多东西，没有他们，我不可能做到现在的一半好（请查看本书第一版，那是我成为\
