  \ 牙医开展业务的地点。他们有多个办公室需要处理和安排患者预约。 |   |   |\n| `Address` | 建筑物所在的物理地址 | 非邮政信箱的地址\
  \ |\n| `Name` | 用于指代特定办公室的名称 | 唯一 |\n| `Supply` | 用于运行牙科诊所业务的耗材。给出的例子是样品项目，如牙膏或牙刷；另外，还提到了牙科耗材，即牙医和卫生师用于完成工作的耗材。\
