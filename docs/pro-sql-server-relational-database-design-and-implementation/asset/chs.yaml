- "# 1. 基础知识\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1973-7_​1](http://dx.doi.org/10.1007/978-1-4842-1973-7_1)）包含补充材料，可供授权用户使用。\n\
  \n> 成功既不神奇，也不神秘。成功是持续应用基本基础的自然结果。——吉姆·罗恩，美国企业家和励志演说家\n\n我对基础知识怀有一种**爱恨交织**的关系。任务看起来越简单，我似乎就越觉得它无趣——至少在我本身对这个话题有一定程度的喜爱之前是这样。在小学里，有一些有趣的课程，比如课间休息和午餐。但当书法课到来时，很少有孩子真正喜欢它，而那些喜欢的孩子大多只是迷恋铅笔芯的味道。然而，书法课是儿童教育发展的重要组成部分。没有它，你就无法在白板上书写，而没有这项技能，你真的能保住程序员的工作吗？就我个人而言，我沉醉于白板笔的味道，这或许不仅仅解释了我的职业。\n\
  \n就像书法是一项基本生活技能一样，数据库设计也有其自身需要掌握的一系列技能。虽然数据库设计并非一项难学的硬技能，但也绝非完全显而易见。从很多方面来看，正因为它不是硬技能，才难以精通。人们一直在设计数据库，但其中许多人对于什么才是“好”的设计理解有限。行政助理使用\
  \ `Excel` 构建数据库，孩子们在纸上列出他们电子游戏的清单，新手程序员使用各种数据库管理工具来构建数据库，几乎没有任何设计和实现是 100%错误的。问题在于，在几乎所有情况下，所产生的设计都存在根本性缺陷，导致未来的修改非常痛苦。当你读完本书时，你应该能够设计出减少许多常见根本性错误的数据库。如果说百万英里旅程始于一步，那么设计高质量数据库过程的第一步就是理解数据库为何如此设计，而这要求我们掌握基础知识。\n\
  \n我知道这个话题可能会让你感到无聊，但你会驾驶一座由不懂物理学的工程师设计的桥梁吗？或者你会乘坐一架由不懂飞行基本原理的人设计的飞机吗？听起来相当荒谬，对吧？那么，你会愿意将你的重要数据存储在由不懂数据库设计基础知识的人设计的数据库中吗？\n\
  \n本书的前五章致力于关系数据库设计的基本任务，并让你为接下来的任务做好思想准备：实现一个关系数据库。这些主题本质上不会特别困难，我将尽力把讨论保持在外行人的水平，而不会深入到让你在\
  \ `PASS` 峰会（[`www.sqlpass.org`](http://www.sqlpass.org)）上遇到我时想揍我的程度。\n\n在本章中，我们将从一些非常有用的基本背景主题开始。\n\
  \n## 历史\n\n这些关系数据库的东西从何而来？在本节中，我将介绍一些历史，主要基于 `科德` 的 `12 条规则` 来解释 `RDBMS`（`关系数据库管理系统`）的由来。\n\
  \n## 关系数据结构\n\n本节将介绍一些基本的数据库对象，包括数据库本身，以及 `表`、`列` 和 `键`。这些对象你可能很熟悉，但在使用中存在一些常见的误解，这些误解可能决定一个设计是平庸还是专业、一流。\n\
  \n## 实体间的关系\n\n我们将简要概述关系数据结构一节中介绍的数据结构之间可能存在的不同类型的关系。\n\n## 依赖关系\n\n本节将讨论值之间依赖关系的概念，以及它们如何影响本书后续的数据库设计过程。\n\
  \n## 关系编程\n\n本节将涵盖使用 `C#` 或 `VB`（`Visual Basic`）的过程式编程与使用 `SQL`（`结构化查询语言`）的关系编程之间的区别。\n\
  \n## 数据库设计阶段\n\n本节概述了关系数据库设计的主要阶段：概念/逻辑设计、物理设计和存储设计。出于时间和预算原因，你可能会想跳过第一个数据库设计阶段，直接进入物理实现阶段。然而，跳过任何或所有这些阶段都可能导致设计不完整或不正确，并且可能无法支持高性能查询和报告。\n\
  \n至少，这章关于基础知识的内容应该能让我们达到这样一个阶段：在本书中讨论和描述关系数据库时，我们拥有一套通用的术语和概念。在我多年的阅读和研究中，我注意到缺乏一致同意的术语是数据库社区中最大的问题之一。学术界有一套（好吧，可能有十套）术语，与我们这些实际编写代码的人使用的术语意思相同。有时，一个概念会用多个不同的词来表达，但最糟糕的情况是，一个词意味着多个不同的东西。从业者（像我，可能也包括你这位读者）有自己的术语，而且通常使用得非常随意。我自己在谈论数据库时也难免使用不严谨的术语，但在本书中，我尽力坚持使用一套统一的术语。有人可能会说这都是语义问题，而语义不值得争论，但老实说，它们才是唯一值得争论的东西。如果双方相互理解，那么同意各自保留意见是可以的，但生活中真正的问题往往出现在人们对一个想法完全认同，却对用来描述它的术语存在分歧的时候。\n\
  \n\n## 简要回顾历史\n\n无论你来自哪个国家，毫无疑问，你的民族历史上都有一个起点。在美国，这个起点是《独立宣言》，随后是《美国宪法》（以及被称为《权利法案》的前十条修正案）。这些文件深深植根于每一位优秀美国公民的经历中。同样，我们也有三份被普遍认为是关系数据库起源的文献。\n\
  \n1979 年，当时就职于 IBM 研究实验室的**埃德加·F·科德**撰写了一篇题为“大型共享数据库的关系数据模型”的论文，该论文发表在《ACM 通讯》上（“ACM”是计算机协会\
  \ [`www.acm.org`](http://www.acm.org)）。在这篇 11 页的论文中，科德提出了一个革命性的构想，旨在突破当时所用数据库类型的物理障碍。那时，大多数数据库系统都非常面向结构，需要大量了解数据在存储中的组织方式。例如，要在数据库中使用索引，必须做出特定选择，比如只索引一个键，或者如果存在多个索引，用户需要知道索引名称才能在查询中使用它。\n\
  \n正如大多数程序员所知，优秀编程的基本原则之一是力求计算机子系统间的低耦合，而需要了解数据存储的内部结构显然是背道而驰的。如果你想更改或删除一个索引，使用该数据库的软件和查询也需要相应更改。科德的关系模型论文前半部分介绍了一系列构建块，这些构建块构成了我们所知的关系数据库的基础。其中包括表、列、键（主键和候选键）、索引甚至早期范式等概念。论文后半部分引入了基于集合的逻辑，包括连接操作。这篇论文几乎可以说是数据库存储独立性的宣言。\n\
  \n时间快进六年，在各大公司开始实施所谓的数据库关系系统之后，科德为《Computerworld》杂志撰写了一篇分为两部分的文章，分别于 1985 年 10 月\
  \ 14 日和 10 月 21 日发表，题为“你的 DBMS 真的是关系型的吗？”和“你的 DBMS 是否按规则运行？”。尽管几乎无法获取这些原始文章的副本，但许多网站概述了这些规则，我也会这样做。这些规则超越了关系理论，并定义了特定的标准，如果一个关系数据库管理系统要真正被视为关系型的，就必须满足这些标准。\n\
  \n### 介绍科德的关系数据库管理系统规则\n\n我认为从科德的规则开始是很有用的，因为尽管这些规则已有 30 多年的历史，但它们可能最出色地设定了衡量数据库关系化程度的标准，同时也解释了关系数据库之所以被如此实现的原因。这些规则的巧妙之处在于，它们表面上只是对数据库用户\
  \ KISS 宣言（保持简单、愚蠢，或者保持标准，两者皆可）的形式化陈述。通过为数据库供应商建立一套正式的规则和原则，用户可以访问不仅比早期数据平台更简化的数据，而且在任何声称是关系型的产品上工作方式都基本相同。当然，世界远非完美，这些也不是试图让所有人达成共识的最终原则。每个数据库供应商的关系引擎版本都不同，虽然基础原理相同，但在结构和使用方式上存在巨大差异。基础是相同的，并且在很大程度上，SQL\
  \ 语言的实现非常相似（我将在下一节非常简要地讨论 SQL 标准）。这些规则对于刚开始学习设计的人来说之所以如此重要，主要是因为它们阐明了 SQL Server\
  \ 和其他基于关系引擎的数据库系统的工作原理。\n\n#### 规则 1：信息原则\n\n> 关系数据库中的所有信息都以唯一一种方式表示——即表中的值。\n\n\
  虽然这条规则在对关系数据库稍有经验后可能显得显而易见，但事实并非如此。数据库系统的设计者本可以使用全局变量来保存数据或文件位置，或者设计出任何他们想要的数据结构。科德的第一条规则设定了一个目标：用户无需思考去哪里获取数据。一种数据结构——表——遵循了一种常见的行与列的数据模式，用户正是与这种模式打交道。\n\
  \n早期使用了许多不同的数据结构，这些结构需要大量了解数据的内部知识。回想一下你使用过的所有不同的数据结构和工具。数据可以存储在文件中、层次结构中（如文件系统），或者任何某人构想出的方法中。更糟糕的是，想想你用过的所有计算机程序；有多少遵循了足够通用的标准，使其工作方式与其他人的一样？很少，而且新的创新每天都在涌现。\n\
  \n虽然创新很少是坏事，但关系数据库的创新主要局限于从用户视图中封装起来的层次。20 年前有效的相同数据库代码，如今可以轻松运行，唯一的显著区别是现在运行速度快得多。我们使用的语言（SQL）有了巨大的进步，但除了少数已被弃用的古怪语法（最常见的例子是左连接用\
  \ `*=`，右连接用 `=*` [没有 `*=*` 表示全外连接]），20 年前编写的 SQL 今天仍然有效，这主要是因为数据存储的结构在用户看来与 SQL\
  \ Server 1.0 时代完全相同，尽管内部机制已大不相同。\n\n#### 规则 2：保证访问\n\n> 每一个数据（原子值）都保证可以通过结合使用表名、主键值和列名进行逻辑访问。\n\
  \n这条规则是对第一条规则中关于如何访问数据的定义的扩展。虽然本章后面会更详细地定义这条规则中的所有术语，但可以说，列用于在数据行中存储单个数据点，主键是一种使用一个或多个数据列来唯一标识行的方法。这条规则定义了，至少存在一种独立于具体实现的方式来访问数据库中的数据。用户可以简单地根据已知的、能唯一标识所需数据的数据来请求数据。“原子”是一个我们将频繁使用的术语；它简单指代一个不可再分而不失去其基本价值的值。在本章后面以及第\
  \ 5 章讲解范式时，我们还会多次涉及这个概念。\n\n与第一条规则一起，规则二也建立了一种数据寻址系统。表名定位容器；主键值找到包含感兴趣单个数据项的行；而列用于寻址单个数据片段。\n\
  \n\n#### 规则 3：NULL 值的系统化处理\n\n> 在完全关系型的 RDBMS 中支持`NULL`值（不同于空字符串或空白字符组成的字符串，也不同于零或任何其他数字），用于以系统化的方式表示缺失信息，且独立于数据类型。\n\
  \n`NULL`规则要求 RDBMS 为每种已实现的数据类型提供一种表示“缺失”数据的方法。这非常重要，因为它让你能够一致地指示某个列没有值，而无需借助变通技巧。例如，假设你正在列出你拥有的电脑鼠标数量，你认为自己还有一个\
  \ Arc 鼠标，但不确定。你将 Arc 鼠标列出来以表明你对这类鼠标感兴趣，然后在数量列中填入——什么？零？这是否意味着你没有？你可以输入-1，但这到底是什么意思？是你借出去了吗？你可以在列表中填写“不确定”，但如果你尝试对你拥有的鼠标数量进行程序化求和，`1\
  \ + \"Not sure\"`是无法计算的。\n\n为了解决这个问题，设计了占位符`NULL`，使其能够独立于数据类型工作。例如，在字符串数据中，`NULL`与空字符串不同，并且它们总是应被视为一个未知的值。将它们想象成`UNKNOWN`通常有助于理解它们在数学和字符串操作中是如何工作的。`NULL`会在数学运算以及字符串运算中传播。\n\
  \n```\nNULL + <anything> = NULL\n```\n\n其逻辑是，`NULL`意味着“未知”。如果你将已知的东西与未知的东西相加，你仍然不知道你得到的是什么；它仍然是未知的。在关系型数据库系统的历史中，`NULL`曾被错误实现或滥用，因此通常有一些设置允许你忽略`NULL`的属性。然而，这样做是不可取的。`NULL`值将是贯穿本书的一个主题；例如，我们在第\
  \ 8 章中处理缺失数据的模式，并且在许多其他章节中，`NULL`极大地影响了数据的建模、表示、编码和实现方式。`NULL`是学术界多年来试图消除其必要性的一个概念，但尚未创造出实用的替代方案。请将其视为虽令人烦恼但通常是必要的。\n\
  \n#### 规则 4：基于关系模型的动态在线目录\n\n> 数据库描述在逻辑级别上以与普通数据相同的方式表示，因此授权用户可以将相同的关联语言应用于对其的查询，就像应用于常规数据一样。\n\
  \n此规则要求关系型数据库必须是`自描述的`，并使用与存储用户数据相同的工具。换句话说，数据库必须包含用于编目和描述数据库自身结构的表，这使得用户能够轻松发现数据库的结构，而无需学习新的语言或访问元数据的方法。这一特性非常普遍，我们将在本书后半部分频繁使用`系统目录表`来展示我们刚刚实现的内容如何在系统中表示，以及你如何识别还创建了哪些其他类似对象。\n\
  \n#### 规则 5：综合性数据子语言规则\n\n> 一个关系系统可以支持多种语言和各种终端使用模式。但是，必须至少有一种语言，其语句可以根据某种明确定义的语法表示为字符串，并且其支持以下所有功能的能力是可理解的：a.\
  \ 数据定义 b. 视图定义 c. 数据操作（交互式和通过程序） d. 完整性约束 e. 授权 f. 事务边界（开始、提交和回滚）。\n\n此规则强制要求存在一种关系数据库语言，例如`SQL`，来操作数据。该语言必须能够支持\
  \ DBMS 的所有核心功能：创建数据库、检索和输入数据、实施数据库安全性等。`SQL`并非绝对必需，其他实验性语言也一直在开发中，但`SQL`是事实上的标准关系语言，并且已使用超过\
  \ 20 年。\n\n关系语言不同于过程化（以及大多数其他类型的）语言，因为你不必指定事情如何发生，甚至不必指定在何处发生。从理想角度来说，你只需向关系引擎提出一个问题，它就会完成工作。至少，你现在应该意识到，这种封装和放弃职责的做法是关系型数据库实现的核心原则之一。保持接口简单，并将其与繁琐的数据访问现实隔离开来。这种封装使得关系语言编程非常优雅，但也常常令人沮丧。你通常受制于引擎程序员，并且无法像在`C#`中发现某个\
  \ API 运行不佳时那样实现自己的访问方法。另一方面，引擎设计师就像超级火箭科学家，通常在优化数据访问方面做得非常出色，因此最终，这样更好，而且，年轻的修行者，你越早放弃责任并学会遵循关系之道，就越好。\n\
  \n#### 规则 6：视图更新规则\n\n> 所有理论上可更新的视图，系统也应能对其进行更新。\n\n如我们之前简要定义的，表是一种具有行和列的结构，用于表示引擎存储的数据。视图是表的一种存储表示形式，其本身在技术上也是一个表；它通常被称为虚拟表。视图通常可以像常规（有时称为物化的）表一样对待，你应该能够像对表一样对视图进行创建、更新和删除数据。此规则在实践中其实很难实现，因为视图可以按用户希望的任何方式定义。\n\
  \n#### 规则 7：高级插入、更新和删除\n\n> 将基本关系或派生关系作为单一操作数处理的能力不仅适用于数据的检索，也适用于数据的插入、更新和删除。\n\n\
  此规则可能是所有规则中对程序员来说最大的福音。如果你曾是计算机科学学生、喜欢冒险的爱好者，或者只是像`Microsoft SQL Server Storage\
  \ Engine`团队成员那样的编程施虐狂，你可能曾不得不编写一些代码来从文件中存储和检索数据。你可能还记得，这非常痛苦且困难，因为你必须逐字节地操作数据，而且通常一次只为一个用户操作。现在，考虑一下成百上千个用户同时访问同一个文件，并且必须保证每个用户看到的数据都是一致的，并且能够并发修改。只有真正优秀的系统程序员才会认为这是一个有趣的挑战。\n\
  \n然而，作为关系引擎用户，你每天只需使用`SELECT`、`INSERT`、`UPDATE`和`DELETE`语句编写非常简单的语句就能完成这些。编写这些语句就像瓮中捉鳖——极其容易（如果你有顾虑，《流言终结者》已证实这很容易，但除非你打算晚餐吃鱼，否则不要在桶里射鱼——这不是件好事）。只需通过使用已知表及其列编写一条语句，你就可以将新数据放入一个表中，而该表可能同时有其他用户在查看、修改数据或进行任何操作。在第\
  \ 11 章中，我们将介绍并发的概念，以了解这种修改语句的多任务处理是如何完成的，但即使在那里介绍的概念，也是我们这些没有麻省理工学院博士学位的普通程序员能够掌握的。\n\
  \n\n#### 规则 8：物理数据独立性\n\n> 应用程序和终端活动在存储表示或访问方法发生任何变更时，在逻辑上保持不受影响。\n\n应用程序必须使用相同的语法工作，即使数据库内部实现数据存储和访问方法的方式发生变化。这条规则基本上是说，数据的存储方式必须独立于其使用方式，并且数据的存储方式对用户无关紧要。这条规则将在我们的整个设计过程中发挥重要作用，因为我们将尽力忽略实现细节，而是根据用户的数据需求进行设计。这样，为\
  \ SQL Server 引擎编写代码的人员就可以为产品添加新的有趣功能，而我们即使不知道（或者至少几乎不知道）这些功能，也能使用其中的许多功能。就我们所知，虽然在任何版本的\
  \ SQL Server 中，`SELECT * FROM <tablename>` 的输出结果都是一样的，但底层代码可能大不相同（当我们看到新的内存优化特性将如何影响内部结构和查询处理时，差异将是巨大的！）。\n\
  \n#### 规则 9：逻辑数据独立性\n\n> 应用程序和终端活动在基表上进行任何理论上允许不受影响的、保留信息的变更时，在逻辑上保持不受影响。\n\n虽然规则\
  \ 8 关注的是连接关系引擎与文件系统的内部数据结构，但这条规则更侧重于我们可以在 SQL 中对表定义执行的操作。假设你有一个包含两列 A 和 B 的表。用户\
  \ X 使用 A 列；用户 Y 使用 A 和 B 列。如果发现需要 C 列，那么添加 C 列不应该损害用户 X 和用户 Y 的程序。如果不再需要 B 列并因此将其删除，那么用户\
  \ Y 会受到影响是可以接受的，而只使用 A 列的用户 X 仍将不受影响。\n\n与物理数据独立性不同，这条原则确实涉及遵循可靠的编程实践。例如，考虑被称为星号（`*`）的结构，它被用作表中所有列的通配符（如\
  \ `SELECT * FROM <tablename>`）。使用这种简写意味着，如果向表中添加了列，结果可能会以不太理想的方式发生变化。还有其他地方也可能导致问题（例如在\
  \ `INSERT` 语句中使用列列表），我们将在本书中陆续介绍。不过，总的来说，为任何你期望重用的操作明确声明所需的数据，总是一个好主意。\n\n#### 规则\
  \ 10：完整性独立性\n\n> 特定于某个关系数据库的完整性约束必须能够在关系数据子语言中定义，并存储在目录中，而不是存储在应用程序中。\n\n另一个真正基本的概念是数据应具有完整性；在这种情况下，数据子系统应该能够保护自己免受大多数常见数据问题的影响。声明数据必须符合特定模式的谓词应该在数据库中实现。最低限度，RDBMS\
  \ 必须在内部支持定义和强制实施实体完整性（主键）和参照完整性（外键）。我们还有唯一约束来强制实施非主键的键、`NULL` 约束来声明在创建行时值是否必须已知，以及检查约束，它们就是必须满足的表或列条件。例如，假设你有一个存储员工工资的列。在存储工资的位置添加一个条件，确保值大于或等于零，这会很好，因为你可能有无薪志愿者，但我只能想到极少数工作是你需要付钱去上班的。\n\
  \n充分利用关系引擎的完整性约束可能具有争议性。应用程序程序员不喜欢放弃对规则管理的控制权，因为项目中通用规则的管理必须在多个地方进行（即使不考虑其他原因，为了用户友好性也应该如此）。同时，由于希望允许并发访问，许多需要使用引擎的约束在应用程序层实现是不可行的。例如，唯一性和参照完整性在客户端工具中实现起来极其困难，其原因在某些方面可能是显而易见的，但将在第\
  \ 11 章中详细讨论。\n\n关于这一特定条款的重要启示应该是：引擎提供了保护数据的工具，你应该以尽可能不干扰的方式，使用引擎来保护数据的完整性。\n\n####\
  \ 规则 11：分布独立性\n\n> 关系型 DBMS 的数据操作子语言必须使应用程序和终端活动在数据是物理集中还是分布的情况下，以及在任何分布的时刻，都能保持逻辑上不受影响。\n\
  \n这条规则在 1985 年极具前瞻性，到目前为止，除了最大的系统之外，也仅仅是在接近实现。它很大程度上是物理独立性规则的延伸，达到了一个跨越单个计算机系统容器的水平。如果数据移动到不同的服务器，关系引擎应该能够识别这一点并继续工作。自本书前一版于\
  \ 2012 年出版以来，云计算得到了极大的发展，我们正越来越接近这一现实。\n\n#### 规则 12：非篡改规则\n\n> 如果一个关系系统拥有或支持一个低级（一次处理单条记录）语言，那么该低级语言不能被用来篡改或绕过在高级（一次处理多条记录）关系语言中表达的完整性规则或约束。\n\
  \n这条规则要求，访问数据的方法不能绕过关系引擎在其他规则中规定提供的任何功能，这意味着用户不应该能够以任何方式违反数据库的规则。一般来说，在撰写本文时，大多数非基于\
  \ SQL 的工具会执行诸如检查数据一致性和清理内部存储结构之类的操作。还有一行一行处理数据的操作符称为游标，它们以非常非关系型的方式处理数据，但在所有情况下，它们都没有能力绕过或规避\
  \ RDBMS 的规则。\n\n一个常见的作弊行为是在使用批量加载技术加载大量数据时绕过规则检查。你在表上设置的所有完整性约束通常都会非常快，并且在正常操作期间只会造成可接受范围内的性能损失。但当你必须加载数百万行数据时，进行数百万次检查可能非常昂贵，因此有些工具可以跳过完整性检查。使用批量加载工具是必要的弊端，但它绝不能成为允许完整性差的数据进入系统的借口。\n\
  \n\n\n### 点头认可 SQL 标准\n\n除了科德规则外，还有一个应当简要提及的主题是 SQL 标准。规则五、六、七都涉及对一种高级语言的需求，该语言能以一种为用户封装掉繁琐技术细节的方式来处理数据。为了满足这一需求，SQL\
  \ 语言应运而生。SQL 语言最初被称为 `SEQUEL`（结构化英语查询语言），但因版权原因更名为 `SQL`（尽管我们今天仍经常将其读作 \"sequel\"\
  ）。`SQL` 起源于 20 世纪 70 年代初，由 Donald Chamberlin 和 Raymond Boyce 提出（参见 `http://en.wikipedia.org/wiki/SQL`），但通往我们现今所处位置的道路相当曲折。多个\
  \ `SQL` 版本相继出现，而使 `SQL` 成为一种通用语言的想法变得越来越不可能实现。\n\n1986 年，美国国家标准学会（`ANSI`）制定了一个名为\
  \ `SQL-86` 的标准，用以规定 `SQL` 语言应如何发展。该标准采纳了当时主要参与者已在实现的功能，旨在使代码能在这些系统之间互操作，而引擎部分则成为系统中专门化的部分。这个早期规范限制极大，甚至不包括参照完整性约束。1989\
  \ 年，`SQL-89` 规范被采纳，它包含了参照完整性，这是一个巨大的进步，也是朝着实现科德第十二条规则迈出的一步（参见 Bernus、Mertins 和 Schmidt\
  \ 所著的 *Handbook on Architectures of Information Systems* [Springer 2006]）。\n\n`SQL`\
  \ 标准的更多版本相继出台，分别在 1992、1999、2003、2006 和 2008 年。在很大程度上，这些文档读起来并不轻松，对于普通的程序员/从业者来说也并非真正有太多实际意义，但它们在将各种数据库引擎的新语法和特性纳入考量方面颇具启发性。该标准还有助于理解人们谈论标准\
  \ `SQL` 时所指的内容。它也能解释数据库供应商做出的一些更有趣的选择。\n\n这堂简短的历史课主要是为了让你开始理解为何关系型数据库在今天是这样实现的。在三篇论文中，科德在定义关系型数据库是什么以及应如何使用方面迈出了重要一步。在早期，科德的\
  \ 12 条规则被用来判断数据库供应商是否可以自称为关系型数据库，并对数据库开发者提出了严峻的实现挑战。正如你将在本书结尾看到的，即使在今天，实现这些规则中最复杂的部分也正变得可行，尽管\
  \ `SQL Server`（以及其他 `RDBMS`）仍未能完全实现其目标。\n\n显然，在 1985 年至今的这段时间里，还有更多的历史。包括科德本人在内的许多学者，已将关系型数据库的科学发展到了我们今天的水平。著名的贡献者包括\
  \ C. J. Date、Fabian Pascal（他有一个网站 `www.dbdebunk.com`）、Donald Chamberlin 和 Raymond\
  \ Boyce（他参与了其中一种范式的建立，在第 6 章中介绍），以及许多其他人。他们的部分材料可能只对学术界有趣，但即使非常难以理解，它们都有实际应用价值，并且对于任何设计中等复杂度模型的人来说都非常有用。我强烈建议你在读完本书后，阅读你能找到的所有其他数据库设计资料（注意，是读完本书之后）。在本书中，我们将保持内容处于一个非常实用的水平，旨在不降低其深度的前提下，迎合普通从业者的需求，聚焦于最重要的细节，并提供常见的有用构建块，以帮助你快速开始开发优秀的数据库。\n\
  \n## 识别关系型数据结构\n\n### 关系型数据结构\n\n本节介绍以下核心关系型数据库结构和概念：\n\n*   数据库与模式\n*   表、行和列\n\
  *   缺失值（`null`）\n*   唯一性约束（键）\n\n作为本书的读者，这可能不是你第一次接触数据库，因此你无疑对其中一些概念有些熟悉。然而，你可能会发现这里至少有几个你未曾思考过的要点，它们可能有助于你理解后续我们为何要那样做——例如，一个表由唯一的行组成，或者在单行中，一个列必须仅代表一个值。这些要点区分了客户能够毫不犹豫地依赖的数据库，与一个其中数据不断受到质疑的数据库。\n\
  \n### 容属关系与关系模型\n\n请注意，在本节中，我们只讨论关系模型中的项目。在 `SQL Server` 中，基于其实现方式，你有几层容属关系。例如，服务器的概念类似于一台计算机，或者可能是一台虚拟机。在一个服务器上，你可以有多个\
  \ `SQL Server` 实例，每个实例又可以有多个数据库。术语“服务器”和“实例”常被误用为同义词，这主要是由于 `SQL Server` 最初的工作方式（只允许每个服务器一个实例，而且产品名称就是\
  \ `SQL Server`，这是个很自然的问题）。在本书的大部分内容中，我们不需要考察比数据库更高的层级，这将在下一节中介绍。\n\n\n\n## 介绍数据库与架构\n\
  \n数据库的核心，本质上就是一个结构化的事实或数据集合。它不必是电子形式；它可以是图书馆的卡片目录、你的支票簿、一个 SQL Server 数据库、一个 Excel\
  \ 电子表格，或者甚至只是一个简单的文本文件。通常，任何数据库的目的都是为了便于快速搜索和检索数据而对数据进行排列——无论是电子还是其他形式。\n\n数据库是最高级别的容器，你将用它来分组服务于共同目的的所有对象和代码。在一个数据库服务器实例上，你可以拥有多个数据库，但最佳实践建议根据需求尽可能少地使用。这个容器通常被认为是期望所有数据得以维护的一致性层级，但为了某些目的可以覆盖此原则（一个例子是数据库可以被部分恢复，并用于实现高可用性数据库系统的快速恢复）。数据库也是文件系统存储与逻辑实现交汇的地方。直到本书非常靠后的部分，实际上是在第\
  \ 10 章，我们才会将数据库视为逻辑容器，并忽略数据如何存储的内部属性；我们将主要把存储和优化视为后关系结构实现阶段的考虑因素。\n\n下一级的容器化是架构。你可以使用架构来对数据库中具有共同主题甚至共同所有者的对象进行分组。数据库服务器上的所有对象都可以通过知道它们所在的数据库和架构来寻址，这就给出了所谓的“四部分名称”：\n\
  \n```\nserverName.databaseName.schemaName.objectName\n```\n\n名称中唯一始终必需的部分是 `objectName`，但正如我们稍后将看到的，通常最好始终包含架构名称。在正常使用中，包含数据库名称和服务器名称通常不被提倡。这些命名部分通常由用户所处的上下文获取，以使代码更具可移植性。三部分名称将用于访问上下文之外数据库的资源，而四部分名称则用于访问位于另一台服务器上的数据库资源。数据库开发的一个目标是尽可能将代码隔离在单个数据库中。访问不同服务器上的数据库是几乎任何从事数据库编码的人都不推崇的做法，首先是因为它可能对性能造成严重影响，其次是因为它会产生难以追踪的依赖关系。\n\
  \n数据库充当主要容器，用于保存、备份并在必要时恢复数据。它并不限制你只能访问该数据库内的数据；然而，将数据访问需求保持在一个数据库内通常应该是目标。\n\n\
  架构是你用来隔离同类对象或目的对象的一层容器化。它们不仅在逻辑组织上有价值，而且正如我们稍后将看到的，在控制数据访问和限制权限方面也很有价值。在第 9 章，我们将详细讨论在不同数据库和架构中管理数据安全的方法、价值和问题。\n\
  \n**注意**\n\n“Schema”（架构）一词还有其他常见用法，你应该意识到：整个数据库结构被称为架构，用于在数据库中创建对象的`数据定义语言`（DDL）语句（如\
  \ `CREATE TABLE` 和 `CREATE INDEX`）也被称为架构。一旦我们开始讨论架构数据库对象，我们将明确划清这一界限。\n\n## 理解表、行与列\n\
  \n在关系数据库中，表用于表示某个概念（通常是像人、地点、事物或想法这样的名词）以及关于该概念的信息（名称、地址、描述等）。正确定义你的表是数据库设计最重要的部分，我们将在后面更深入地讨论。\n\
  \n表是对概念的容器的定义。因此，例如，一个表可能代表一个人。每个人的实例，如“Fred Smith”、“Alice Smith”，都在数据的“行”中表示。所以在这个人员表中，一行将代表一个人。行进一步划分为列，列包含关于该行所表示对象的单条信息。例如，一行的名字列将包含“Fred”或“Alice”。表不应被认为具有任何顺序，也不应被认为是某种存储中的一个位置。正如本章前面“简要穿越历史之旅”一节所讨论的，关系数据库系统背后的一个主要设计理念是它应该从物理实现中封装出来。\n\
  \n“原子性”（或“标量”）这个术语，我之前简要提到过，描述了列中存储的数据类型。“原子”的含义与物理学中的含义基本相同。原子值将被分解，直到无法在不失去原始特性的情况下变得更小。在化学中，分子由多个原子组成——H[2]O\
  \ 可以分解为两个氢原子和一个氧原子——但如果你将氧原子分成更小的部分，你将不再拥有氧（而且你的邻居也不会喜欢你家原址出现的那个巨大弹坑）。\n\n标量值可以意味着对普通用户显而易见的单个值，比如一个单词或一个数字，也可以意味着像存储在二进制或复杂类型（例如具有经度和纬度的点）中的一整章书这样的东西。关键在于，该列代表一个单一的值，该值在你开始使用数据时，能抵抗被分解到比所需更低层级。因此，将标量值定义为两个独立的值，比如\
  \ `X` 和 `Y`，是完全可接受的，因为它们不是彼此独立的，而像 `'Cindy,Leo,John'` 这样的值很可能不是原子性的，因为该值可以被分解成三个独立的值而不会丢失任何含义。虽然你可能在想，任何值一块饼干钱的程序员都可以在需要时将这些值拆分成三个，但我们在整个数据库设计过程中的目标是提前完成这项工作，为关系引擎提供一种处理我们数据的统一方式。\n\
  \n在继续之前，我想花点时间讨论一下“表”、“行”和“列”这些术语存在的问题。这些术语通常被 Excel、Word 等工具用于表示显示数据的固定结构。对于“表”，Dictionary.com（\
  \ [`www.dictionary.com`](http://www.dictionary.com) ）有以下定义：\n\n> 数据的一种有序排列，特别是数据以列和行的形式排列，基本呈矩形。\n\
  \n当数据以矩形形式排列时，它具有顺序和非常具体的位置。大多数人熟悉的这个“表”定义的基本示例是 Microsoft Excel 电子表格，如图 1-1 所示。\n\
  \n![`A978-1-4842-1973-7_1_Fig1_HTML.jpg`](img/A978-1-4842-1973-7_1_Fig1_HTML.jpg)\n\
  \n**图 1-1.** Excel 表格\n\n\n在图 1-1 中，行编号为 1–4，列标为 A–E。该电子表格是一个账户表。每列代表关于账户的某项信息：社保号码、账号、账户余额，以及账户持有人的名和姓。电子表格的每一行代表一个特定的账户。按位置（例如，单元格\
  \ `A1`）或值范围（例如，`A1–A4`）访问电子表格中的数据而不引用其数据结构，这种情况并不少见。**这一点我已经提过好几次了，它违背了关系数据库的原则。**\n\
  \n## 表格、行和列的术语\n\n在接下来的几个表格中（在本书的文本里——看，这个词有很多意思！），我将介绍表格、行和列的术语，并解释它们在本书中的用法。理解这些术语远比它看起来更重要，因为正确使用这些术语将为你正确使用关系型对象指明方向。让我们从以下不同视角来看这些不同的术语及其呈现方式（请注意，还有其他不少术语也表示相同的事物，但这些是我在主流讨论中最常见的）：\n\
  \n*   **关系理论**：这个观点相当学术化。它在术语方面往往非常严格，其名称基于关系数据库的数学起源。\n*   **逻辑/概念**：这套术语用于实际实现阶段之前。基本上，它是基于\
  \ `实体-关系（ER）建模` 的概念，使用的术语比你在实际使用数据库时更通用。\n*   **物理**：这套术语用于已实现的数据库。这里的“物理”一词有点误导，因为物理数据库实际上是对有形的物理架构的一种抽象。然而，这个术语多年来已经根植于数据架构师的脑海中，不太可能改变。\n\
  *   **记录管理器**：早期的数据库系统需要大量的存储知识；例如，你需要知道在文件中去哪里获取一行数据。这些系统的术语已经蔓延到关系数据库中，因为其概念非常相似。\n\
  \n表 1-1 展示了从各种视角赋予基本数据表示（例如，表）的所有名称。这些名称的含义略有不同，但经常被用作完全同义词。\n\n### 表 1-1：基本数据表示术语细分\n\
  \n| 视角 | 名称 | 定义 |\n| --- | --- | --- |\n| 关系理论 | `关系` | 这个术语很少被非学术界人士使用，但有些文献专门用它来指代大多数程序员心目中的表。它是一个严格定义的结构，由元组和属性组成（稍后将详细定义，但在概念上与行和列有很多共同之处）。注意：关系数据库由此术语得名；该名称并非源于表之间可以相关（关系将在本章后面部分介绍）。\
  \ |\n| 逻辑/概念 | `实体` | 实体代表你想为其存储数据的某个“事物”的容器。例如，如果你在为人力资源应用程序建模，你可能会有一个 `员工` 实体。在逻辑建模阶段，会识别出许多实体，其中一些最终会成为表，一些会根据称为规范化的过程（我们将在第\
  \ 6 章详细介绍）成为多个表。同样应该清楚的是，实体不是具有实现的东西，而是一种引导我们走向实现的规范工具。 |\n| 物理 | `表` | 从本质上讲，表与关系和实体非常相似，因为其目标都是表示你将为其存储数据的某个概念。关系和表之间最大的区别在于，表在技术上可能包含数据重复（尽管在我们的实现中不应该允许这样做）。如果你了解视图，你可能会好奇它们如何融入其中。视图被视为一种表，通常是“虚拟”表，因为它的结构被认为是永久性的。\
  \ |\n| 记录管理器 | `文件` | 在许多非关系型数据库系统（如 Microsoft FoxPro）中，每个操作系统文件代表一个表（有时一个表实际上被称为数据库，这太容易让人混淆了）。多个文件组成一个数据库。SQL\
  \ Server 也使用文件，但在引擎层面，并且可能包含一个或多个表的全部或部分内容。正如之前关于科德规则所提到的，数据的存储方式对于它的使用方式或称呼应该无关紧要。\
  \ |\n| 物理 | `记录集`/`行集` | 记录集或行集是已检索出来供使用的数据，例如发送给客户端的结果。最常见的形式是表格数据流，用户界面或中间层对象可以使用。记录集与普通表有一些相似之处，但它们之间的差异也巨大。在数据库设计的上下文中，你很少会处理记录集，但一旦你开始编写\
  \ SQL 语句，你就会接触到。关系/表与记录集的一个主要区别在于，前者被认为是“集合”，没有顺序，而记录集是用于通信的物理结构。 |\n\n### 表 1-2：列术语细分\n\
  \n接下来，我们看看列。表 1-2 列出了从各种视角赋予列的所有名称，其中几个我们将在设计过程的不同上下文中使用。\n\n\n## 数据库术语的不同视角定义\n\
  \n| 视角 | 名称 | 定义 |\n| --- | --- | --- |\n| 逻辑/概念 | 属性 | “属性”一词在编程领域很常见。它基本上指定了关于某个对象的一些信息。在建模中，这个术语几乎可以应用于任何事物，并且它可能实际上代表其他实体。与实体一样，为了生成用于实现的适当表，规范化将改变属性的形状，直到它们成为合适的列素材。\
  \ |\n| 关系理论 | 属性 | 当用于关系理论时，属性具有严格的含义，即描述关系所建模事物本质的标量值。 |\n| 物理 | 列 | 列是描述一行所代表内容的单条信息。强烈建议列在表中的位置对其使用无关紧要，尽管\
  \ `SQL` 确实在目录中定义了列的从左到右顺序。所有对列的直接访问都将通过名称而非位置进行。每个列值预期是（但并非严格强制）一个原子的标量值。 |\n| 记录管理器\
  \ | 字段 | “字段”一词在数据库设计上下文中有几种含义。一种含义是行和列的交叉点，就像电子表格中一样（这也可能被称为单元格）。另一种含义与早期数据库技术更相关：字段是记录中的偏移位置，正如我将在表\
  \ 1-3 中定义的，它是磁盘上文件中的一个位置。没有设定要求字段只能存储标量值，仅仅要求它可以通过编程语言访问。 |\n\n### 注意\n像 `XML`、空间类型（`geography`\
  \ 和 `geography`）、`hierarchyId`，甚至自定义的 `CLR` 类型这样的数据类型，确实开始使原子的、标量的、不可分解的列值的概念变得模糊。这些类型都有一些实现价值，但在你的设计中，初始目标是首先使用标量类型，而将通常被称为“超越关系”的类型作为后备方案，用于实现仅用标量过于困难的结构。此外，`SQL\
  \ Server 2016` 增加了对翻译和读取 `JSON` 格式值的一些支持，尽管还没有正式的数据类型支持。\n\n最后，表 1-3 描述了引用一行的不同方式。\n\
  \n### 行术语解析\n| 视角 | 名称 | 定义 |\n| --- | --- | --- |\n| 关系理论 | 元组 | 元组（发音为“tupple”，而不是“toople”）是一个有限的无序集合，包含相关的、也是无序的名称-值对集合，如\
  \ `ColumnName: Value`。所谓“命名”，我的意思是每个值都有一个已知的名称（例如，`Name: Fred; Occupation: gravel\
  \ worker`）。“元组”一词在关系数据库上下文中很少使用，除了学术圈，但你应该知道它，以防你在浏览网页寻找数据库信息时遇到它。请注意，元组在多维数据集和\
  \ `MDX` 中也用于表示几乎相同的概念，如果事情还不够令人困惑的话。关系定义的一个重要部分是，不能有两个相同的元组。这种唯一性的概念是本书中反复出现的主题，因为虽然在表的实现中唯一性不是一个严格的规则，但它是一个非常强烈期望的设计特征。\
  \ |\n| 逻辑/概念 | 实例 | 基本上，在你设计时，你会考虑一个实体的一个版本会是什么样子，而这种存在通常被称为一个实例。 |\n| 物理 | 行 |\
  \ 一行本质上与一个元组相同，每一列代表行中的一条数据，而这一行代表了表被建模来代表的一件事物。 |\n| 记录管理器 | 记录 | 记录被认为是磁盘上文件中的一个位置。每个记录由字段组成，这些字段都有物理位置。理想情况下，这个术语不应与“行”一词互换使用，因为行不是一个物理位置，而是一个使用数据访问的结构。\
  \ |\n\n如果这是你第一次看到表 1-1 到 1-3 中列出的术语，我预计此刻你正在用头撞某种坚固的东西（并且可能希望你能用我的头代替），并试图弄清楚为什么使用如此多样的术语来表示几乎相同的东西。例如，许多激烈的争论（flame\
  \ war）都是因字段和列之间的区别而爆发的。我个人每当有人在真正想表达“行”或“元组”时使用“记录”这个词，都会感到不适，但我也意识到，如果一个人理解在 `SQL`\
  \ 中应该如何处理表的一切，那么误用一个术语并不是最糟糕的事情。\n\n\n### 处理缺失值（NULL）\n\n在上一节中，我们提到列用于存储单个值。但这样做的问题在于，你常常需要存储一个值，而在处理过程的某个时点，你可能并不知道这个值是什么。如前所述，科德的第三条规则定义了`NULL`值的概念，它不同于用于表示缺失信息的空字符串、空白字符字符串或零，并以一种独立于数据类型的方式系统性地存在。所有数据类型都能够表示`NULL`，因此任何列都有可能表示数据缺失。\n\
  \n在表示缺失值时，理解该值的含义至关重要。由于该值缺失，因此假定可能存在一个值（即使该值明确表示“无有效值”）。正因为如此，没有两个`NULL`值被视为相等，你必须将该值视为可能是任何值。这引出了`NULL`的几个有趣特性，这些特性使其使用起来颇为棘手，尽管它又经常不可或缺：\n\
  \n*   任何值与`NULL`连接，结果都是`NULL`。`NULL`可以表示任何有效值，因此如果一个未知值与一个已知值连接，结果仍然是一个未知值。\n* \
  \  所有与`NULL`的数学运算结果都将为`NULL`，原因完全相同：任何值与未知值进行`+/-/*`等数学运算，结果都是未知值（即使是`0 * NULL`，结果也为`NULL`）。\n\
  *   当引入`NULL`时，逻辑比较会变得棘手，因为`NULL <> NULL`（其布尔表达式结果为`NULL`，而非`FALSE`，因为任何未知值都可能与另一个未知值相等，因此它们不相等这一点是未知的）。在代码中需要特别注意，某个条件是在查找`TRUE`还是非`FALSE`（即`TRUE`或`NULL`）的条件。SQL\
  \ 约束尤其会查找非`FALSE`的条件来满足其谓词。\n\n让我们稍微扩展一下关于逻辑比较的这一点，因为它对于正确使用`NULL`非常重要。当`NULL`被引入布尔表达式时，真值表变得更加复杂。在评估涉及`NULL`的条件时，结果不是简单的二元布尔值，而是有三种可能：`TRUE`、`FALSE`或`UNKNOWN`。只有当搜索条件的评估结果为`TRUE`时，行才会出现在结果中。例如，如果你的一个条件是`NULL=1`，你可能会倾向于认为答案是`FALSE`，但实际上它解析为`UNKNOWN`。\n\
  \n这一点之所以有趣，是因为有如下的查询：\n\n```sql\nSELECT CASE WHEN 1=NULL or NOT(1=NULL) THEN 'True'\
  \ ELSE 'NotTrue' END;\n```\n\n由于这里有两个条件，且第二个条件是第一个的反面，这看起来似乎`NOT(1=NULL)`或`(1=NULL)`其中之一应该评估为`TRUE`。但事实上，`1=NULL`是`UNKNOWN`，而`NOT(UNKNOWN)`也是`UNKNOWN`。未知的反面并不像你猜测的那样是“已知”。相反，既然你不确定`UNKNOWN`代表`TRUE`还是`FALSE`，那么它的反面也可能是`TRUE`或`FALSE`。\n\
  \n表 1-4 展示了`NOT`运算符的真值表。\n\n**表 1-4. NOT 真值表**\n\n| 操作数 | NOT(操作数) |\n| --- | ---\
  \ |\n| `TRUE` | `FALSE` |\n| `UNKNOWN` | `UNKNOWN` |\n| `FALSE` | `TRUE` |\n\n表\
  \ 1-5 展示了`AND`和`OR`运算符的真值表。\n\n**表 1-5. AND 与 OR 真值表**\n\n| 操作数 1 | 操作数 2 | 操作数\
  \ 1 AND 操作数 2 | 操作数 1 OR 操作数 2 |\n| --- | --- | --- | --- |\n| `TRUE` | `TRUE` |\
  \ `TRUE` | `TRUE` |\n| `TRUE` | `FALSE` | `FALSE` | `TRUE` |\n| `TRUE` | `UNKNOWN`\
  \ | `UNKNOWN` | `TRUE` |\n| `FALSE` | `FALSE` | `FALSE` | `FALSE` |\n| `FALSE` |\
  \ `UNKNOWN` | `FALSE` | `UNKNOWN` |\n\n在这篇介绍性章节中，我的主要目标是指出`NULL`的存在，并且它是关系数据库基础的一部分（同时也让你基本理解为何它们可能带来麻烦）；我并不打算深入探讨如何针对它们进行编程。在你的设计中，目标将是尽量减少`NULL`的使用，但不幸的是，几乎不可能完全消除它们，特别是因为即使你执行外连接操作，它们也会开始出现在你的\
  \ SQL 语句中。\n\n\n### 定义域\n\n我们迄今讨论的所有概念都有一个非常重要的共同点：它们都是为了帮助我们最终获得某些存储信息的结构。我们将存储哪些信息，是我们接下来要考虑的问题，这也是我们需要将结构的域定义为允许存储的有效值集合的原因。在实体层面，您将通过对象的定义来指定实体的域。例如，如果您有一个员工表，每个实例将代表一名员工，而不是组成吊扇的部件。\n\
  \n对于您指定的实体的每个属性，都需要确定允许在该属性中包含什么数据。当您定义一个属性的域时，实现物理数据库的概念并非真正重要；域定义的某些部分可能最终只是作为对用户的警告。例如，考虑以下可能需要应用于您指定的属性以形成\
  \ `EmployeeDateOfBirth`（员工出生日期）列的域的类型列表：\n\n*   该值必须是不含时间值的日历日期。\n*   该值必须是早于当前日期的日期（未来的日期意味着该人尚未出生）。\n\
  *   该日期值应评估为该人至少 16 岁，因为例如，您不能合法地雇佣一名 10 岁的儿童。\n*   该日期值通常应小于 70 年前，因为很少会有员工（尤其是新员工）达到那个年龄。\n\
  *   该值必须小于 130 年前，因为我们肯定不会有那么年长的新员工。任何超出这些范围的值显然都是错误的。\n\n从 `第 6 章` 开始，我们将介绍如何实现这个域，但在设计阶段，您只需要记录它。这里最重要的是要注意，并非所有这些规则都被表达为\
  \ 100%必须遵守。例如，考虑“日期值应小于 70 岁”的陈述。在您的早期设计阶段，最好定义关于您的域的所有内容（实际上是您发现的任何内容，以便它能够以某种方式实现，即使只是弹出一个消息框，对于超出正常范围的值询问用户\
  \ `拜托，真的吗？`）。\n\n当您开始创建第一个模型时，您会发现属性之间有很多共性。当您开始构建第二个模型时，您会意识到您之前已经做过很多这样的事情。在构建了\
  \ 100 个模型之后，试图决定客户表中一个人的名字应该设多长，就如同重新发明切片面包一样。为了使这个过程更容易，并在您的模型之间实现一些标准，一个很好的做法是给常见的域类型命名，以便您可以将它们与具有共同需求的属性相关联。例如，您可以将本节开头描述的类型定义为\
  \ `employeeBirthDate`（员工出生日期）域。每次需要员工出生日期时，它都会与这个命名域相关联。诚然，使用命名域并不总是可行，特别是如果您没有工具来帮助您管理它，但能够创建可重用的域类型绝对是我在数据建模工具中寻找的功能。\n\
  \n域不必非常具体，因为我们通常只是以相同的方式使用相同类型的值。例如，如果我们有一个小狗数量的计数，该数据可能类似于辣酱瓶数的计数。小狗和辣酱不搭（自然地，只有老狗才用辣酱），但关于“有多少”的域是非常相似的。例如，您可能有以下命名域：\n\
  \n*   `positiveInteger`（正整数）：整数值 1 及以上\n*   `date`（日期）：任何有效的日期值（不含一天中的时间值）\n*  \
  \ `emailAddress`（电子邮件地址）：必须格式化为有效电子邮件地址的字符串值\n*   `30CharacterString`（30 字符字符串）：长度不超过\
  \ 30 个字符的字符串\n\n请记住，如果您实际上将字符串的域定义为任何正整数，理论上最大值是无限的。当今的硬件边界允许一些相当大的最大值（例如，普通整数为\
  \ 2,147,483,647；本书的技术编辑 Rodney Landrum 甚至将这个数字作为纹身，如果您好奇的话），因此定义多少算太多是有用的（你真的能拥有十亿只小狗吗？）。用户需要输入接近\
  \ 20 亿的值是相当罕见的，但如果您不限制域内的数据，报告和程序将需要能够处理如此大的数据。我将在 `第 7 章` 讨论数据完整性时，以及在 `第 8 章`\
  \ 讨论满足需求的实现模式时，对此进行更详细的介绍。\n\n### 存储元数据\n\n元数据是用于描述其他数据的数据。了解如何查找存储在系统中的数据的信息是文档化过程中一个非常重要的方面。如本章前面提到的，Codd\
  \ 的第四条规则指出：“数据库描述在逻辑级别上以与普通数据相同的方式表示，因此授权用户可以对其应用与普通数据相同的关系语言进行查询。” 这意味着您应该能够使用与查询用户数据相同的语言（即\
  \ `SQL`）来查询系统元数据。\n\n根据关系理论，一个关系由两部分组成：\n\n*   头部：定义元组属性的属性名/数据类型名对的集合\n*   主体：构成该关系的元组集合\n\
  \n在 `SQL Server`——以及大多数数据库中——通常将目录视为表和数据库中其他编码对象的头部信息的集体描述。`SQL Server` 通过几种方式公开头部信息：\n\
  \n*   通过一组称为 `information schema`（信息架构）的视图：它由一组标准视图组成，用于查看系统元数据表，应该存在于任何品牌的所有数据库服务器上。\n\
  *   通过 `SQL Server` 特定的目录（或系统）视图：这些视图提供有关您的对象的实现以及系统的许多其他属性的信息。\n\n维护关于您数据库的自定义元数据以超越仅仅命名对象来进一步定义表或列的用途，是一个非常好的实践。这通常通过电子表格和数据建模工具完成，也可以使用\
  \ `RDBMS` 内置的自定义元数据存储（例如，`SQL Server` 中的扩展属性）。\n\n\n\n### 定义唯一性约束（键）\n\n在关系理论中，根据定义，一个关系不能表示重复的元组。然而，在关系数据库管理系统产品中，并没有强制要求表中不能存在重复行。不过，我和大多数数据架构师都认为，所有表都应至少定义一个唯一性标准，以满足“表中的行应可通过表中的值访问”这一要求。除非每一行都与其他所有行不同，否则将无法有效地检索单行。\n\
  \n为了定义唯一性标准，我们将定义键。键在一个或多个列上为实体定义唯一性，这些列的值随后将被保证与其他所有实例的值不同。一般来说，键通常被称为**候选键**，因为你可以为一个实体定义多个键，并且一个键可能在实体中扮演几种角色（主键或备用键），本节后面将对此进行更详细讨论。\n\
  \n考虑以下名为 `T` 的数据集，包含列 `X` 和 `Y`：\n\n```\nX     Y\n---   ---\n1     1\n2     1\n\
  ```\n\n如果你尝试添加一个新行，其值为 `X:1, Y:1`，那么表中就会出现两行完全相同的行。如果允许这样做，会带来几个问题：\n\n*   表中的行是无序的，如果没有键，将无法区分上表中值为\
  \ `X:1, Y:1` 的行中的哪一行是哪一行。因此，将无法区分这些行，这意味着没有逻辑方法来访问单行。使用、更改或删除单个行会很困难，除非借助 SQL 语言的技巧（例如使用\
  \ `TOP` 运算符）。\n*   如果多行具有相同的值，它们描述的是同一个对象，因此如果你尝试更改其中一行，另一行也必须随之更改，这会导致混乱的局面。\n\n\
  如果我们在列 `X` 上定义一个键，那么之前创建新行的尝试将失败，任何其他为 `X` 列插入值 1 的操作（例如 `X:1, Y:3`）也会失败。或者，如果你使用列\
  \ `X` 和 `Y` 定义键（称为“复合”键，即包含多个列的键，而仅包含一列的键有时称为“简单”键），则 `X:1 Y:3` 的创建将被允许，但尝试插入 `X:1\
  \ Y:1` 的行仍然会被禁止。\n\n注意\n\n在实际意义上，没有两行可以真正相同，因为存在实现的现实因素，例如行在存储系统中的位置。然而，这种思维方式在关系数据库设计中没有立足之地，因为我们的目标是在很大程度上忽略实现的存储方面。\n\
  \n那么，这有什么大不了的呢？如果你有两行在 `X` 和 `Y` 上具有相同的值，又有什么关系呢？考虑一个有三列的表：\n\n```\nMascotName \
  \  MascotSchool   PersonName\n----------   ------------   -----------\nSmokey  \
  \     UT             Bob\nSmokey       UT             Fred\n```\n\n现在，你想回答“谁扮演了\
  \ UT 的吉祥物 Smokey”这个问题。假设实际上只有一个人扮演这个角色，你检索到一行。由于我们已说明表是无序的，你可能得到其中任意一行，因此是任意一个人。将候选键应用于\
  \ `MascotName` 和 `MascotSchool` 将确保，为了获取为 UT 欢呼的、名为 Smokey 的吉祥物而进行的表查询，只会获取到一个人的名字。（请注意，此示例是对整个问题的过度简化，因为可能出于各种原因希望或不希望允许多人扮演该角色。但我们正在定义一个领域，其中只应有一行满足该标准。）未能识别表的键是设计者可能犯的最大错误之一，这主要是因为在早期测试阶段，这种需求可能未被认识到，因为测试人员往往首先像优秀用户那样进行测试（通常他们是测试自己代码的程序员）。再加上测试往往是时间紧迫时首先被削减的成本这一事实，意味着重大错误可能一直存在，直到真实用户开始测试（使用）数据库。\n\
  \n总之，候选键（或简称为“键”）在一个列或一组列上定义了行的唯一性。在你的逻辑设计中，为每个实体设置一个唯一性标准是至关重要的，并且它可能拥有多个键来维护结果表和行中数据的唯一性，一个键可以包含定义其唯一性所需的任意数量的属性。\n\
  \n#### 键的类型\n\n定义了两种类型的键：主键和备用键。（你可能也听说过“外键”这个术语，但这指的是对一个键的引用，将在本章后面的“理解关系”一节中定义。）主键用作实体的主要标识符。它用于唯一标识该实体的每个实例。如果你有多个键可以扮演此角色，则在选择了主键后，每个剩余的候选键将被称为备用键。从技术上讲，两者的实现没有区别（尽管根据定义，主键不允许可为空的列，因为这确保至少有一个已知的键值可用于从未排序的集合中获取行。根据定义，备用键允许\
  \ `NULL` 值，在大多数关系数据库管理系统中，`NULL` 被视为不同的值（这与前面给出的 `NULL` 定义一致），但在 SQL Server 中，唯一约束（和唯一索引）会将所有\
  \ `NULL` 值视为相同的值，并且只能存在一个 `NULL` 实例。在第 7 章中，我们将更详细地讨论设计期间实现几种类型唯一性条件的实现模式，并在第 8\
  \ 章中再次讨论实现不同类型唯一性标准的方法。\n\n举例来说，在美国，社会安全号码/工作签证号码/永久居民号码对所有人都是唯一的。（有些人拥有不止一个这样的号码，但不存在合法的重复。因此，除非你想把“国税局特工”从你未拜访过的人员名单中划掉，否则你不会希望有两个员工拥有相同的社会安全号码。）然而，出于安全风险考虑，社会安全号码不是一个适合共享的键，因此每个员工可能还有一个唯一的、公司提供的身份证号。其中一个可以选为主键（很可能是员工编号），另一个则为备用键。\n\
  \n主键的选择在很大程度上是为了方便和易于使用。我们将在本章后面讨论关系的上下文中讨论主键。重要的是要记住，当你有值在数据库中应该只存在一次时，你需要防止重复。\n\
  \n\n\n## 选择键\n\n虽然键可以由任意数量的列组成，但最好尽可能限制键中的列数。例如，你可能有一个 `Book`（书籍）实体，其属性包括 `Publisher_Name`（出版商名称）、`Publisher_City`（出版商所在城市）、`ISBN_Number`（ISBN\
  \ 号）、`Book_Name`（书名）和 `Edition`（版次）。从这些值中，可以定义以下三种键：\n\n*   `Publisher_Name, Book_Name,\
  \ Edition`：一个出版商可能会出版不止一本书。同时，可以合理地假设书名在所有书籍中并非唯一。然而，同一个出版商不太可能出版两本标题和版次完全相同的书（至少我们可以这样假设！）。\n\
  *   `ISBN_Number`：ISBN（国际标准书号）是书籍出版时分配给它的唯一标识号。\n*   `Publisher_City, ISBN_Number`：因为\
  \ `ISBN_Number` 是唯一的，所以 `Publisher_City` 和 `ISBN_Number` 组合起来也是唯一的。\n\n选择（`Publisher_Name,\
  \ Book_Name, Edition`）作为复合候选键似乎是有效的，但（`Publisher_City, ISBN_Number`）这个键则需要更多思考。这个键的含义是，在每个城市，`ISBN_Number`\
  \ 可以重复使用，这个结论显然是不合适的，因为我们已经说过它本身必须是唯一的。这是复合键常见的问题，它们往往没有得到适当的考量。在这种情况下，你可以选择 `ISBN_Number`\
  \ 作为主键（PK），而（`Publisher_Name, Book_Name`）作为替代键（AK）。\n\n注意\n\n不应将唯一索引与唯一性键混淆。出于性能原因，在你的\
  \ SQL Server 数据库中实现 `Publisher_City, ISBN_Number` 唯一索引可能是合理的。然而，在设计过程中，这不会被识别为实体的键。在第\
  \ 6 章，我们将讨论键的实现，而在第 10 章，我们将介绍为增强数据访问而实现索引的方法。\n\n在明确了什么是键之后，我们接下来讨论两种主要的键类型：\n\n\
  *   自然键：组成键的值与数据库上下文之外的行数据有某种联系。\n    *   智能键：一种自然键，使用代码值将多条数据打包成简短格式。\n    *  \
  \ 代理键：通常是由数据库生成的值，与行数据没有联系，仅仅是作为自然键的替代品，用于处理复杂性或提升性能。\n\n### 自然键\n\n自然键通常是实体的某些真实属性，它们基于数据库外部存在的与实体的关系，在逻辑上唯一地标识实体的每个实例。根据我们之前的例子，到目前为止我们所有的候选键——员工编号、社会安全号码（SSN）、ISBN\
  \ 和（`Publisher_Name, Book_Name`）复合键——都是自然键的例子。当然，像美国 SSN 这样的号码看起来可能不“自然”，因为它是由 11\
  \ 位数字和破折号组成的，但它被认为是自然键，因为它起源于数据库外部。\n\n自然键是用户可以识别的值，并且逻辑上应呈现给用户。一些常见的自然键例子有：\n\n\
  *   对于人员：驾照号码 + 发行州、公司标识号、客户号、员工号等。\n*   对于交易凭证（如发票、账单和计算机生成的通知）：通常在创建时会被分配某种编号。\n\
  *   对于待售产品：产品编号（产品名称可能不唯一）、UPC 码。\n*   对于建筑物：完整的街道地址，包括邮政编码、GPS 坐标。\n*   对于邮件：收件人姓名和地址\
  \ + 寄件日期。\n\n选择自然键时要小心。理想情况下，你应该寻找稳定、可控且肯定能够唯一标识数据库中每一行的属性。\n\n这里有一点值得注意：在你的数据库中可能被认为是自然键的东西，在它被定义的地方通常实际上并不是自然键——例如，一个人的驾照号码。在例子中，这是每个人都有（或在纳入我们的数据库之前可能需要）的一个号码。然而，驾照号码的值可以是一系列整数。这个号码并非出生时就纹在人的脖子后面。在创建该号码的数据库中，它可能实际上更像是一个智能键，或者可能是一个代理键（我们将在后面定义）。\n\
  \n对于无法保证唯一性的值，无论这种情况多么不可能发生，都不应考虑作为键。鉴于三段式姓名在美国很常见，在同一家公司工作或在同一所学校就读的两个人拥有完全相同的三个名字的情况通常相对罕见。（当然，随着公司员工人数的增加，出现重复的概率会上升。）如果你包括前缀和后缀，可能性会更低，但“罕见”甚至“极其罕见”不能以一种构成合理键的方式实现。如果你恰好雇用了两个名叫\
  \ Sir Lester James Fredingston III 的人（我知道我与三位同名的人共事，其中两位是男士，因为谁不是呢，对吧？），第二位可能不会乐意为了让你的数据库系统能存储他的名字而被称为\
  \ Les（用户事实上可能就这么做）。\n\n一个名字必须唯一的职业是演员。持有工会卡的任何两个演员不能拥有相同的名字。有些人会把像 Archibald Leach\
  \ 这样的名字改成更悦耳的名字，比如 Cary Grant，但在某些情况下，当事人希望保留自己的名字，因此在演员数据库中，演员工会会给名字添加一个唯一标识符以使其唯一。唯一标识符是一个无意义的值（如序列号），它被添加到非唯一值中，以在像这样名字需要被视为唯一的情况下产生唯一性。\n\
  \n例如，互联网电影数据库网站（ [`www.imdb.com`](http://www.imdb.com) ）上列出了六位（比上一版多了五位，只是为了向您证明我多么勤奋地为您提供最新的信息）名叫\
  \ Gary Grant（不是 Cary，是 Gary）的人。每个人都有一个与他名字关联的不同数字，使其成为唯一的 Gary Grant。（当然，这些人中还没有一个大红大紫，但请注意——可能快发生了！）\n\
  \n提示\n\n在大多数系统中，我们倾向于将名字视为一种半唯一的自然键。这对于标识单一行来说不够好，但对于人类查找值来说非常有用。电话簿就是一个很好的例子。假设你需要在电话簿中查找\
  \ Ray Janakowski。可能有不止一个叫这个名字的人，但这可能是查找一个人电话号码的足够好的方法。这种半唯一性是实体的一个非常有趣的属性，应该记录下来以备后用，但只有在极少数情况下，你才会用半唯一的值创建一个键，可能通过添加一个唯一标识符来实现。在第\
  \ 8 章，我们将介绍定义和实现这种情况的过程，我称之为“可能唯一性”。可能唯一性标准基本上规定，如果你试图创建两个名字相同或极其相似的人，你应该要求验证。一旦数据被存储，查找和处理重复数据要困难得多。\n\
  \n\n### 智能键\n\n计算机系统中常见的一类自然键是智能键。某些标识符会嵌入额外信息，通常作为构建唯一值的简便方法，以帮助人类识别现实世界的某个事物。大多数情况下，智能键可以分解为多个组成部分。然而，在某些情况下，这些数据可能并不一目了然。以以下虚构的产品序列号\
  \ `XJV102329392000123` 为例，我将其设计为可分解为以下几个部分：\n\n*   `X`: 产品类型（LCD 电视）\n*   `JV`:\
  \ 产品子类型（32 英寸立式机型）\n*   `1023`: 产品生产批次（批次号 1023）\n*   `293`: 一年中的第几天\n*   `9`: 年份的最后一位数字\n\
  *   `2`: 原始颜色\n*   `000123`: 生产顺序\n\n这种易于使用的智能键值对最终用户有重要用途；收到产品的技术人员可以解码该值，并发现事实上该产品属于一批包含有缺陷的“某部件”的批次，他需要进行更换。在逻辑设计阶段，对我们而言关键的一点是找出构成智能键的所有信息片段，因为这些值几乎肯定最终都会存储在各自的列中。\n\
  \n智能键作为将大量信息浓缩到一个小位置的人类可读值非常有用，但它们显然不符合我们之前设定的标量标准。当我们开始实现数据库对象时，它们也不应是这些数据片段的唯一表示形式，而应是将每个数据片段实现为包含这些值的单独列，并尽可能确定如何确保其与智能键匹配（如果不可避免的话）。\n\
  \n智能键有几个大问题：其组成部分的唯一值可能会用尽，或者键的某个部分（例如产品类型或子类型）可能会发生变化。如果使用智能键来表示多条信息，必须非常谨慎并提前做好充分规划。当必须更改智能键的格式时，确保智能键的不同值实际有效成为一个重大的验证问题。还需注意，颜色位置不能表示当前颜色，只能表示原始颜色。这在重新喷漆的汽车中很常见：`VIN`\
  \ 号包含颜色信息，但颜色可能已经改变。\n\n**注意**\n\n智能键是向用户以小封装传递大量信息的有用工具。但是，需要识别、记录并以直接的方式实现构成智能键的所有信息片段。优化的\
  \ SQL 代码期望数据都存储在单独的列中，因此，至关重要的是，你永远不需要基于解码该值来做计算决策。我们将在 第 6 章 中更详细地讨论选择实现键的主题。\n\
  \n### 代理键\n\n代理键（有时称为人工键）在某种程度上与自然键相反。“代理”一词意为“替代某物的东西”，在此情况下，代理键充当自然键的替代品。有时，你可能认为模型中没有足够稳定或可靠的自然键可用，或者自然键可能过于笨重而难以使用。\n\
  \n代理键可以为表中的每一行提供一个唯一值，但它除了代表存在性之外，对该表没有实际含义。代理键通常由系统生成，作为对 `RDBMS`、建模者或客户端应用程序的便利，或三者的组合。创建代理键值的常用方法是使用单调递增的数字、随机值，甚至使用全局唯一标识符\
  \ (`GUID`)，这是一个非常长（16 字节）的标识符，在全世界所有机器上都是唯一的。\n\n代理键的概念可能会让纯粹主义者感到困扰，并可能引发一两次争论。由于代理键并非真正的信息，它真的能是实体的属性吗？这个问题是合理的，但代理键在实际使用中有许多优点，使实现更容易。例如，代理键一个非常好的特点是键值永远不需要改变。这一点，再加上代理键始终是单列这一事实，使得若干方面的实现远比原本可能的情况要容易得多。\n\
  \n通常，真正的代理键永远不会与任何用户共享。它将是在计算机系统上生成的、对用户隐藏的值，而用户只直接访问自然键的值。这种限制的最好理由可能是，一旦用户访问了某个值，该值可能就需要被修改。例如，如果你是客户\
  \ `0000013` 或客户 `00000666`，你可能会要求更改。\n\n正如驾照号码对警察来说可能除了用于快速查阅你的记录外没有其他含义（尽管 [`www.highprogrammer.com/alan/numbers/index.html`](http://www.highprogrammer.com/alan/numbers/index.html)\
  \ 上的一系列文章表明，在某些州并非如此），代理键用于使以编程方式处理数据更容易。由于代理键值的来源与用户可能关心的任何事物都没有对应关系，一旦一个值与某行关联，就没有任何理由再更改该值。这是代理键一个非常好的特点。键值不改变这一事实，再加上它始终是单列，使得若干方面的实现变得容易得多。这一点在本书后面讨论如何选择主键时会更清晰。\n\
  \n回想一下驾照的类比，如果驾照上只有一个值（代理键），那么 Uberter Sloudoun 警官如何确定你确实是所标识的那个人呢？他无法确定，因此还会列出其他属性，如姓名、出生日期，通常还有你的照片，照片是人类处理的一个极好的唯一键（当然，可能除了同卵双胞胎之外）。\n\
  \n再考虑前面由七个部分组成的产品标识符示例：\n\n*   `X`: 产品类型（LCD 电视）\n*   `JV`: 产品子类型（32 英寸立式机型）\n*\
  \   `1023`: 产品生产批次（批次 1023）\n*   `293`: 一年中的第几天\n*   `9`: 年份的最后一位数字\n*   `2`: 原始颜色\n\
  *   `000123`: 生产顺序\n\n\n一个自然键几乎肯定由这七个部分组成，因为这是一个智能键（也可能是值的某个子集构成键并添加了数据，但在此示例中我们假设所有部分都是必需的）。还有一个产品序列号，它是诸如\
  \ `XJV102329392000123` 这样的值的连接，用于标识该行。假设你在表中还有一个代理键列，其值为 `10`。如果定义在行上的唯一键是代理键，那么当插入除代理键（它会自动生成值\
  \ `3384`）之外相同的数据时，可能会出现以下情况：\n\n```\nSurrogateKey   ProductSerialNumber ProductType\
  \ ProductSubType Lot  Date     ColorCode  ...\n-------------  -------------------\
  \ ----------- -------------- ---- -------- ---------\n10             XJV102329392000123\
  \  X           JV             1023 20091020 2          ...\n3384           XJV102329392000123\
  \  X           JV             1023 20091020 2          ...\n```\n\n从技术上讲，这两行并非重复，但由于代理键值没有实际意义，本质上它们是重复行——用户无法有效地区分它们。当你开始处理关系（我们将在本章后面更详细地介绍）时，这种情况会变得非常麻烦。值\
  \ `10` 和 `3384` 作为引用存储在其他表中，因此看起来像是引用了两个不同的产品，而实际上只有一个。\n\n注意\n在进行早期设计时，我倾向于为每个实体建模一个代理主键，因为在设计过程中，我可能要到很后期才会知道最终的键是什么。在不需要代理键的实现系统中，设计过程将会消除这些代理键。这种方法在本书中将变得显而易见，从第\
  \ 4 章的概念模型开始。\n\n## 理解关系\n\n在上一节中，我们确定了什么是实体以及如何构建实体（尤其是着眼于未来将要创建的表），但实体本身可能有点单调。为了使实体更有趣，并且特别是为了实现将表塑造成所需形态的一些结构要求，你需要将它们连接起来（有时甚至将一个实体连接到自身）。如果没有关系的概念，当数据与自身相关时，通常只能将所有数据放入单个表中，这将是一个非常糟糕的主意，因为需要一遍又一遍地重复数据（在优秀的数据库设计中，重复数据组是主要的禁忌）。\n\
  \n我们需要建立的一个前面提到的术语是“外键”。外键用于在两个实体/表之间建立链接，它声明一个表中的一组列值必须匹配另一个表中候选键（通常是主键，但通常允许任何已声明的候选键，但有一些与\
  \ `NULL` 相关的注意事项，我们将在实现这些概念时介绍）的列值。\n\n在定义一个实体与另一个实体的关系时，有几个因素很重要：\n\n-   **参与性**：参与关系的实体对于关系的易用性很重要。在定义关系的现实中，相关实体的数量不一定是两个。有时，只有一个，例如一个员工实体，你需要表示一个员工为另一个员工工作；有时，它多于两个；例如，`图书批发商`、`书籍`\
  \ 和 `书店` 都是常见实体，它们将以复杂的关系相互关联。\n-   **所有权**：一个实体“拥有”另一个实体是很常见的。例如，一张发票将拥有发票明细行。没有发票，就没有明细行。\n\
  -   **基数**：基数表示一个实体的实例可以与另一个实体的实例相关联的数量。例如，一个人可能只允许有一个配偶（你真的想要更多吗？），但一个人可以有任意数量的孩子（不过，我觉得一个也是个好数！）。\n\
  \n当我们开始实现表时，会有一个限制：每个关系只能在两个表之间建立。关系的建立是通过获取主键列并将其放置在另一个表中（有时称为“迁移键”）。提供迁移键的表在关系中被称为父表，接收迁移键的表被称为子表。（请注意，关系中的两个表可能是同一个表，扮演两个角色，就像一个员工表中，关系是从管理者到被管理者，我们稍后会看到。）\n\
  \n作为一个包含代表性数据的两个表之间关系的示例，考虑 `Parent` 表（存储父母的社会安全号码和姓名）与 `Child` 表（为孩子做同样的事）之间的关系，如图\
  \ 1-2 所示。请记住，这是一个简单的例子，没有充分考虑人名的所有复杂性。\n\n![A978-1-4842-1973-7_1_Fig2_HTML.jpg](img/A978-1-4842-1973-7_1_Fig2_HTML.jpg)\n\
  \n图 1-2. 父母表和子女表示例\n\n在 `Child` 表中，`Parent SSN` 是外键（在这些小图中用双线表示）。它在 `Child` 行中用于将孩子与父母关联起来。从这些表中，你可以看到\
  \ Tay 的父亲是 Larry Bull，而 Maya 的父母是 Fred Badezine（哦，这双关语！）。\n\n接下来是基数问题。在定义关系时，了解多少父行可以与多少子行相关联非常重要。基于\
  \ `Parent` 实体的键已迁移到 `Child` 实体这一事实，我们有以下限制：一个父母可以有任意数量的孩子，甚至为零，这取决于该关系是否被视为可选的（我们将在本章后面讨论）。当然，如果这真的是一个父母与子女的人类关系，我们不能将父母限制为一个，因为每个人（仍然）都有两个亲生父母，而认为自己是父母的人数更是多种多样。使数据库设计工作充满挑战和趣味的是世界上所有并不总是能整齐划入规范的现实情况。\n\
  \n根据关系中涉及的实体数量，关系此时可分为两种基本类型：\n\n-   **二元关系**：两个实体之间的关系\n-   **非二元关系**：多于两个实体之间的关系\n\
  \n这两种关系类型的最大区别在于，二元关系使用外键实现起来非常直接，正如我们之前讨论的那样。当涉及两个以上实体时，我们通常会使用建模和实现方法将设计分解为一系列二元关系，而不会丢失原始关系的保真度或可读性，这是你的客户所期望的。\n\
  \n在进行早期设计时，你需要牢记这种区别，并学会识别每一种可能的关系。当我在第 3 章介绍数据建模时，你将学习如何在结构化表示中表示多种类型的关系。\n\n\n\
  ### 处理二元关系\n\n关系中每一侧可能参与的行数被称为关系的基数。本节将介绍不同基数的二元关系：\n\n*   **一对多关系**：将一个实体的一个实例与另一个实体的（可能）多个实例链接起来的关系。这正是我们将在数据库表中实现的关系类型。\n\
  *   **多对多关系**：通常指一个实体中的一个实例可以链接到第二个实体的多个实例，并且第二个实体中的实例又可以与第一个实体中的多个实例相关的关系。这是现实中发生的最典型的关系类型。\n\
  \n虽然你在代码中实际实现的所有关系都将是一对多的，但现实世界并非如此清晰。以足球运动员与球队的关系为例。一支球队有许多球员，而一名球员可以效力于一支球队。但一名球员在其职业生涯中可以为许多球队效力。因此，球员与球队的关系也是一种多对多关系。正如我们之前讨论过的，父母与子女的关系是多对多的，因为两个亲生父母可能有多个孩子。\n\
  \n我们将探讨这些关系类型及其不同的子类型，它们各有特定的用途和相关的挑战。\n\n#### 一对多关系\n\n一对多关系是指一个实体将其主键作为外键迁移到另一个实体的关系类别。如前所述，这通常被称为父/子关系，仅涉及恰好两个实体之间的关系。一个子实例最多可以有一个父实例，但一个父实例可以有一个或多个子实例。父/子关系的通用名称是一对多关系，但在实现关系时，对基数进行更具体的说明非常常见，其中“一”这部分实际上可以表示零个或一个（但绝不能大于一个，否则将是另一种称为多对多关系的类型），而“多”可以表示零个、一个、特定数量或无限数量。\n\
  \n应该立即明确的是，当关系类型以“一对-”开头时，例如“一对多”，一行与若干数量的其他行相关。然而，有时一个子行可能与零个父行相关。这种情况通常被称为可选关系。如果你考虑之前的\
  \ `Parent`/`Child` 示例，如果这个关系是可选的，那么一个子实例可能没有父实例。如果父母与子女的关系是可选的，那么出现一个名为 Sonny 但没有父母（至少数据库不知道其父母）的孩子是没问题的，如图\
  \ 1-3 所示。\n\n![A978-1-4842-1973-7_1_Fig3_HTML.jpg](img/A978-1-4842-1973-7_1_Fig3_HTML.jpg)\n\
  \n图 1-3.\n\n包含无父实例子实例的示例表\n\n缺失值通常用 `NULL` 表示，因此 Sonny 那一行将存储为 (`ChildSSN:'666-66-6666',\
  \ ChildName:'Sonny', ParentSSN:NULL`)。对于一般情况，我们（以及大多数人在正常对话中）为了便于讨论，会使用一对多关系的术语。然而，在更专业的术语中，零或一对-（任意）主题有几种不同的变体，这些变体在后续实现时会有不同的影响，我们将在本节中介绍：\n\
  \n*   一对多：这是一般情况，其中“多”的范围是零到无穷。\n*   一对一至恰好 N：在这种情况下，要求一个父行与给定数量的子行相关。例如，一个孩子必须有两位亲生父母，所以它是一对恰好\
  \ 2（不过关于是否必须知道双亲才能记录孩子的存在，更多的是需求主题，这将在第 2 章讨论）。常见的精确情况是一对一。\n*   一对一至介于 X 和 Y 之间：通常，X\
  \ 是 0，Y 是某个设定的边界以使事情更容易。例如，一个用户可能有 1 到 2 个用户名。\n\n#### 一对多（一般情况）\n\n一对多关系是最常见和最重要的关系类型。对于每个父行，可能存在无限数量的子行。一个一对多关系的例子可能是\
  \ `Customer` 到 `Orders`，如图 1-4 所示。\n\n![A978-1-4842-1973-7_1_Fig4_HTML.jpg](img/A978-1-4842-1973-7_1_Fig4_HTML.jpg)\n\
  \n图 1-4.\n\n一对多示例\n\n一种特殊的一对多关系是“递归关系”。在递归关系中，父实例和子实例来自同一个实体，并且通常将该关系设置为单个实体。这种关系用于对树数据结构建模。例如，考虑经典的物料清单（BOM）例子。拿一个简单的吊扇来说。吊扇本身可以被视为制造商销售的一个部件，它的每个组件本身也是一个具有不同部件编号的部件。其中一些组件也由其他部件组成。在这个例子中，吊扇可以被认为是由其每个部件组成的，而这些部件中的每一个又由其他部件组成，依此类推。（请注意，物料清单是更大“图”结构的一个切片，用于记录库存，因为每个部件可以有多种用途，以及多个部件。这种结构类型将在第\
  \ 8 章中更详细地介绍。）\n\n下表是组成吊扇的部件的一小部分。部件 2、3 和 4 都是吊扇的部件。你有一组扇叶和一个灯具组件（还有其他东西）。部件 4，即保护灯的球罩，是灯具组件的一部分。\n\
  \n```\n部件编号    描述                     用于部件编号\n-------------  --------------------\
  \  --------------------\n1              吊扇                     NULL\n2         \
  \     白色扇叶套件             1\n3              灯具组件                 1\n4           \
  \   灯罩                     3\n5              白色扇叶                 2\n```\n\n要读取这些数据，你会从\
  \ `部件编号 1` 开始，你可以看到哪些部件组成了它，即一个扇叶套件和一个灯具组件。现在，你有了编号为 2 和 3 的部件，你可以寻找组成它们的部件，这就得到了部件编号\
  \ 4 和 5。（请注意，我们刚刚使用的算法被称为广度优先搜索，即每次遍历数据时获取一个层级上的所有项目。目前这并不是特别重要，但在第 8 章讨论设计模式时会再次提到。）\n\
  \n\n#### 一对多关系\n\n通常，所建模的情境或业务规则会要求对子项数量设定限制。因此，与其说是一对多（其中“多”意味着无限），不如说我们只支持特定数量的关联项。一个人玩扑克时会被发五张牌。在整个游戏过程中，玩家持有零到五张牌，但绝不会超过五张。\n\
  \n另一个例子是，一项业务规则可能规定一个用户必须恰好有两个电子邮件地址，以便他们更有可能回复其中一封电子邮件。图 1-5 展示了这种“一对恰好二”的关系基数的示例。拥有这样的数据并不是特别常见，但你永远不知道何时需要这样的工具，直到客户带着一些古怪的需求找上门来。\n\
  \n![A978-1-4842-1973-7_1_Fig5_HTML.jpg](img/A978-1-4842-1973-7_1_Fig5_HTML.jpg)\n\
  \n图 1-5. 一对二关系示例\n\n最典型的“一对 N”关系类型是一对一关系。这表明对于任何给定的父项，恰好存在一个子项实例。一对一关系可以是一个简单的属性关系（例如，一个房子有一个位置），或者可能是所谓的“是一种”关系。“是一种”关系表明一个实体是另一个实体的扩展。例如，假设存在一个`Person`实体和一个`Employee`实体。员工都是人（在大多数公司中），因此他们需要与人相同的属性，所以我们将使用一对一关系：员工是一种人。如果说一个员工多于一个人，或者一个人是两个员工，这将是不合逻辑的（如果不是违反劳动法的话）。这些类型的“是一种”关系通常被称为子类型关系，我们将在本书后面再次讨论。\n\
  \n## 多对多关系\n\n最后一种二元关系是多对多关系。不是单个父项和一个或多个子项，而是两个实体，其中两个实体中的每个实例都可以与另一个实体中的任意数量的实例相关联。例如，继续以家庭关系为例，一个孩子总是有两个亲生父母——可能未知，但他们确实存在。这位母亲和父亲可能不止一个孩子，而且每位母亲和父亲也可以与其他关系有孩子。\n\
  \n多对多关系在我们的建模中所占的比例比你最初预期的要大得多。考虑一家汽车经销商。这家汽车经销商销售汽车。反过来，几乎随便挑一个车型，你会发现它由许多不同的汽车经销商销售。同样，汽车经销商销售许多不同的车型。所以，许多车型由许多汽车经销商销售，反之亦然。\n\
  \n另一个例子是，当你开始定义实体时，像专辑与歌曲的关系看起来似乎很简单地是一对多，然而一首歌可以出现在许多专辑中。一旦你开始将歌手、音乐家、作者等概念纳入考量，你会看到它需要很多多对多关系来充分建模这些关系（许多歌手对应一首歌，许多歌曲对应一位歌手等）。设计阶段的一个重要部分是检查关系的基数，并确保你考虑了实体在现实中以及在你的计算机系统中如何相互关联。\n\
  \n多对多关系无法使用简单的 SQL 关系直接实现，但通常通过引入另一个结构来实现该关系。不是将一个实体的键迁移到另一个实体，而是将关系中两个对象的键迁移到一个新实体中，该实体用于实现关系（并且可能记录关系性质的信息）。在第\
  \ 3 章中，我将提供更多示例并讨论如何实现多对多关系。\n\n### 处理非二元关系\n\n非二元关系涉及两个以上的实体。非二元关系可能非常难以发现和正确建模，然而它们比你预期的要常见得多，例如：\n\
  \n> 房间在给定的时间段内用于一项活动。出版商通过书店和在线零售商销售书籍。\n\n考虑第一个例子。我们首先为提到的每个主要概念定义实体——房间、活动和时间段：\n\
  \n```\nRoom (room_number)\nActivity (activity_name)\nTime_Period (time_period_name)\n\
  ```\n\n接下来，它们将通过一个实体连接起来，将它们全部关联到一个关系中：\n\n```\nRoom_Activity_TimePeriod (room_number,\
  \ activity_name, time_period_name)\n```\n\n我们现在有了一个实体，它看似表示了房间、活动和时间利用的关系。从那里，可能可以也可能无法进一步分解这三个实体之间的关系（通常称为三元关系，因为有三个实体），将其分解为一系列实体间的关系，从而以易于使用的方式满足需求。通常，最初复杂的三元关系实际上被发现是一系列易于处理的二元关系。这是第\
  \ 5 章将要介绍的规范化过程的一部分，该过程将把我们初始的实体转变为可以在 SQL 中实现为表的形式。在设计的早期概念阶段，简单地定位不同类型关系的存在就足够了。\n\
  \n### 理解函数依赖\n\n除了基本的数据库概念，我想在后续必需之前介绍几个数学概念。它们围绕着函数依赖的概念。数据库的结构基于这样的思想：给定一个值（如前面定义的键值），你可以找到相关的值。以一个现实世界的例子来说，就是一个人。如果你能识别这个人，你就可以确定关于这个人的其他信息（如头发颜色、眼睛颜色、身高或体重）。这些属性的值可能会随时间变化，但当你提问时，答案只有一个且只有一个。例如，在任何给定的瞬间，对于“这个人的眼睛颜色是什么？”这个问题，只能有一个答案。\n\
  \n我们将在接下来的章节中讨论与此相关的两个不同概念：函数依赖和决定因子。每个概念都基于一个值依赖于另一个值的思想。\n\n\n\n### 函数依赖与决定因素\n\
  \n### 理解函数依赖\n\n函数依赖是一个非常简单但重要的概念。它基本上意味着，如果你能根据变量 B 的值确定变量 A 的值，那么 B 就在函数上依赖于 A。例如，假设你有一个函数，并且你在一个值上执行它（我们称之为\
  \ `Value1`），而这个函数的输出总是同一个值（`Value2`）。那么 `Value2` 就在函数上依赖于 `Value1`。接着，如果你确信对于函数的每一个输入（`Value1-1`,\
  \ `Value1-2`, …, `Value 1-N`），你总是会得到对应的输出（`Value2-1`, `Value2-2`, …, `Value 2-N`），那么这个将\
  \ `Value1` 转换为 `Value2` 的函数就被认为是“确定性的”。另一方面，如果函数的值每次执行都可能不同，它就是“非确定性的”。这个概念是我们如何构建数据库以满足客户需求以及关系数据库管理系统（RDBMS）引擎需求的核心。\n\
  \n以表格形式来看，考虑非键列对键列的函数依赖。例如，考虑下面这个键为列 `X` 的表 `T`：\n\n```\nX     Y\n---   ---\n1 \
  \    1\n2     2\n3     2\n```\n\n你可以将列 `Y` 视为在函数上依赖于 `X` 中的值，或表示为 `fn(X) = Y`。显然，`Y`\
  \ 对于不同的 `X` 值可能是相同的，但反过来则不然（请注意这些函数并非严格的数学函数；它可能是 `IF X = (2 or 3) THEN 2 ELSE 1`\
  \ 构成了这个函数）。这是一个相当简单但需要被理解的重要概念。\n\n```\nX     Y    Z\n---   ---  ---\n1     1  \
  \  20\n2     2    4\n3     2    4\n```\n\n判断什么是依赖、什么是巧合也需要小心。在这个例子中，`fn(X) = Y`\
  \ 是确定无疑的（因为这是键的定义），但观察数据，在这个小子集数据中似乎还存在另一个依赖关系，`fn(Y) = Z`。假设 `fn(Y) = Z`，并且你想将第二行的\
  \ `Z` 值修改为 5：\n\n```\nX     Y    Z\n---   ---  ---\n1     1    20\n2     2    5\n\
  3     2    4\n```\n\n现在，我们声称的依赖关系 `fn(Y) = Z` 就出了问题，因为 `fn(2) = 5 AND fn(2) = 4`。正如你将在第五章中清楚看到的那样，对函数依赖的理解不足是许多数据库问题的核心，因为任何数据库设计的首要目标之一就是，要修改一个数据片段时，你不需要在多处修改数据。这是一个相当崇高的目标，但理想情况下，只需一点规划就能实现。\n\
  \n### 寻找决定因素\n\n与函数依赖相关的一个术语是“决定因素”，它可以定义为“任何在函数上决定其他属性或属性集的属性或属性集”。在我们之前的例子中，`X`\
  \ 就是决定因素。这里可以想到两个例子：\n\n*   考虑一个像 `2 * X` 这样的数学函数。对于 `X` 的每一个值，都会产生一个特定的值。对于 `2`，你会得到\
  \ `4`；对于 `4`，你会得到 `8`。任何时候你把值 `2` 放入函数，你总是会返回一个 `4`，因此对于函数 (`2 * X`)，`2` 在函数上决定了\
  \ `4`。在这种情况下，`2` 是决定因素。\n*   在一个更面向数据库的例子中，考虑产品的序列号。从序列号可以推导出额外信息，例如型号以及产品的其他特定、固定的特性。在这种情况下，序列号在函数上决定了特定、固定的特性，因此序列号是决定因素。\n\
  \n如果这一切看起来很熟悉，那是因为任何实体的键都会在函数上决定实体的其他属性，并且每个键都将是决定因素，因为它在函数上决定了实体的属性。如果你有两个键，比如实体的主键和候选键，那么每个键都必须是另一个键的决定因素。\n\
  \n## 关系编程\n\n关系理论的一个更重要的方面是，必须存在一种高级语言，通过它进行数据访问。正如本章前面所讨论的，Codd 的第五条规则指出：“……必须至少存在一种语言，其语句可以根据某种定义良好的语法表示为字符串，并且其支持以下所有功能的能力是全面的：数据定义、视图定义、数据操作（交互式和程序式）、完整性约束、授权和事务边界（开始、提交和回滚）。”\n\
  \n这种语言多年来已被标准化为我们所知（并且喜爱！）的 SQL。在本书中，我们将以某种方式、形式使用 SQL 的大部分功能，因为任何关于数据库设计和实现的讨论都将围绕使用\
  \ SQL 来完成第五条规则中列出的所有内容以及更多事情。\n\nSQL 有两个特性尤其需要理解。首先，SQL 在其核心上是一种声明性语言，这基本上意味着目标是向计算机描述你希望完成的事情，然后由\
  \ SQL 来解决细节问题。¹ 所以当你发出请求“给我所有关于人的数据”时，你就是用那种句子结构化版本的 SQL 来提问，而不是描述过程中的每一个单独步骤。\n\
  \n其次，SQL 是一种关系语言，因为你一次在关系（或表）级别上操作一组数据，而不是一次操作一个数据片段。这是一个重要的概念。回想一下 Codd 的第七条规则：“将一个基本关系或派生关系作为单个操作数进行处理的能力不仅适用于数据的检索，也适用于数据的插入、更新和删除。”\n\
  \nSQL 作为一种语言非常酷的一点是，一个非常简单的声明性语句几乎总是代表着执行了成百上千行的代码。这些代码中的许多在硬件领域执行，访问磁盘驱动器上的数据，将数据移入寄存器，并在\
  \ CPU 中执行操作。\n\n如果你已经精通像 `C#`、`FORTRAN`、`VB.NET` 等过程式编程语言，那么 SQL 在你能做的事情上限制要多得多。你有两类高级命令：\n\
  \n*   数据定义语言：用于设置数据存储（表和底层存储）、应用安全性等的 SQL 语句。\n*   数据操作语言：用于对已放入表中的数据进行创建、检索、更新和删除的\
  \ SQL 语句。在本书中，我假设你之前使用过 SQL，因此你知道大部分操作都是由四条语句处理的：`SELECT`、`INSERT`、`UPDATE` 和 `DELETE`。\n\
  \n作为关系型程序员，你的工作是放弃对存储数据、查询数据、修改现有数据等所有细节的控制。系统（通常称为关系引擎）为你完成工作——嗯，很大程度上为你完成工作。更重要的是，作为关系数据设计师，你的工作是确保数据库适合\
  \ RDBMS 的需求。可以把它想象成厨房里的厨师。制作美味的食物是他们最擅长的，但如果你把他们的用具随意摆放，为你做晚餐就会花更多时间。\n\nDavid DeWitt\
  \ 博士（微软公司数据与存储平台部门的技术专家）在 2010 年的 PASS 主题演讲中说，让 RDBMS 优化你发送的查询并非易事；它比火箭科学还要难得多，主要是因为人们向引擎抛出糟糕的查询却期望完美的结果。可以把它想象成你汽车上的控制装置。去杂货店买牛奶，你不需要知道内燃机或电动机是如何工作的。你启动汽车，挂挡，踩下踏板，然后出发。\n\
  \n\n\n## 概述数据库项目的特定阶段\n\n最后一点同样要回溯到 Codd 的规则，即第十二条规则：非破坏规则。其基本思想是，目标是使用能够同时处理多行数据的语言来完成所有工作，而低级语言不应能够绕过引擎的完整性规则或约束。换言之，将控制权交给引擎，并使用`SQL`。当然，这条规则并不妨碍其他语言的存在。第十二条规则确实规定，所有对数据进行操作的语言都必须遵循定义在数据上的规则。在某些关系型引擎中，逐行处理可能比基于集合的处理更快。然而，`SQL\
  \ Server`引擎的创造者选择为基于集合的操作进行优化。这就让非关系型程序员有责任与关系引擎良好协作，让引擎承担大部分工作。\n\n当我们经历一个项目的各个阶段时，数据库项目阶段有一些非常具体的名称，这些名称经过演变，用来描述所创建的模型。与整个项目的阶段类似，设计数据库时所经历的阶段被明确定义，旨在帮助你仅思考完成当前任务所必需的事情。\n\
  \n良好的设计与实践对于获得正确的最终结果至关重要。在流程早期，你的目标应仅仅是弄清楚需求所要求的基本内容。接下来，思考如何使用恰当的基础技术来实现。最后，调整实现方案，使其在现实世界中有效运行。\n\
  \n我在此概述的流程通过保持过程专注于正确完成任务，并使用在广大的实践程序员群体中相当通用的术语，引导我们完成数据库的创建：\n\n*   **概念阶段**：在此阶段，目标是根据初步需求收集和客户信息勾勒出数据库的草图。我说的是“阶段”，在此阶段，你要从高层次识别用户的需求。然后，你将这些信息捕获在一个由高层实体及其关系组成的数据模型中。（“概念”一词的名称基于发现概念，而非一个概念性的设计。可以将其想象成电影的分镜头脚本。他们制作分镜头脚本是为了确保一切看起来都能协同工作，如果不能，修改只需要用橡皮擦，而不是完全重拍整部电影。）\n\
  *   **逻辑阶段**：逻辑阶段是对概念阶段工作的、与具体实现无关的细化，将概念转化为一个成熟的关系型数据库设计，这将成为实现设计的基础。在此阶段，你需要充实系统所需的模型，并捕获所有需要实现的数据业务规则。（沿用电影的类比，这是编写“最终”剧本、聘请演员等的阶段。）\n\
  *   **物理阶段**：在此阶段，你将逻辑模型调整适应于宿主`RDBMS`的实现，在我们这里就是`SQL Server`。在很大程度上，此阶段的重点是构建一个符合逻辑阶段输出设计的解决方案。然而，近年来发生了一个重大变化，这基于`SQL\
  \ Server`的内部机制。我们将在物理阶段需要在几种实现模型之间做出选择。（物理数据库就像电影现在已制作完成，准备在影院上映。剧本可能会稍作改动，但总体上会非常接近。）\n\
  *   **引擎调整阶段**：在此阶段，你处理的是将实现数据结构映射到存储设备的模型。此阶段或多或少也是项目的性能调优/优化/适配阶段，因为重要的是，你的实现（在所有方面，性能除外）无论硬件/客户端软件如何，都应该以相同的方式运行。它可能运行得不是很快，但它能够运行。在此项目阶段，索引、磁盘布局会被调整，以使系统运行得更快，而不改变系统的含义。（项目的引擎调整阶段就像将电影分发给数百万人在不同的屏幕、不同大小的影院、格式等上面观看。在巨幕上和在手机屏幕上是同一部电影，并针对每种情况进行了优化以使其适用。）\n\
  \n你此时可能会质疑：“那测试呢？难道不应该有一个测试阶段吗？” 是的，每个阶段都包含测试。你测试概念设计以确保其符合需求。你测试逻辑设计以确保你涵盖了用户要求的每一个数据点。你通过构建代码并对其进行单元和场景测试来测试物理设计。你通过向数据库注入比生产中可能遇到的更多的数据，并判断引擎是否能够按原样处理或需要调整，来测试代码在引擎中的工作方式。对于整个应用程序，一个专门的测试阶段仍然是必要的，但每个数据库设计/实现阶段都应在流程内部进行测试（这一点同样会在本书后续覆盖整个流程时被融入书中）。\n\
  \n### 概念阶段\n\n概念设计阶段本质上是一个分析和发现的过程；其目标是定义系统的组织和用户数据需求。请注意，超出数据库设计需求的整体设计图景的某些部分将是概念设计阶段（以及所有后续阶段）的一部分，但对于本书而言，设计过程的讨论方式可能会让人感觉好像数据库就是一切（作为正在阅读本章基础知识的本书读者，你可能已经有这种感觉了）。\n\
  \n多年来，我发现“概念模型”一词根据我采访的对象不同而有多种含义。在一些人眼中，概念模型不过是一个实体和关系的图表。其他人在描述时还包括了属性和键。\n\n\
  根据我发现的所有来源，定义概念建模过程的核心活动是发现并记录一组实体以及它们之间可能的关系，其目标是在高层次上捕获支持业务流程和用户需求所必需的基本概念。实体发现是这个过程的核心。实体对应于名词（人、地点和事物），这些名词对于你试图通过创建软件来改进的业务流程至关重要。\n\
  \n除此之外，你还要建模或记录多少内容是有很大争议的。与我共事过的人几乎总是会尽可能多地将他们在模型中发现的信息记录下来。我个人认为，将模型限制在实体和关系是一步重要的第一步，而且几乎无一例外的是，我越接近一个正确的概念模型，后续的过程就越短。\n\
  \n\n\n### 逻辑阶段\n\n逻辑阶段是对概念阶段所做工作的细化。此阶段的输出将基本构成关系数据库设计的完整蓝图。请注意，在此阶段，您仍应从实体及其属性的角度思考，而非直接考虑表和列，尽管在数据库的最终状态下两者可能基本没有区别。此阶段不应考虑系统实现的具体细节。如前所述，良好的逻辑设计可以在任何`RDBMS`上构建。此阶段的核心活动包括：\n\
  \n*   深入剖析概念模型，识别出定义用户全部数据需求所需的完整实体集。\n*   定义每个实体的属性集。例如，一个`Order`实体可能具有`Order Date`、`Order\
  \ Amount`、`Customer Name`等属性。\n*   识别构成候选键的属性（或属性组）。这包括主键、外键、代理键等。\n*   定义关系及其关联的基数。\n\
  *   为每个属性确定合适的域（这将成为数据类型），包括值是否为必需。\n\n概念模型旨在为相关方提供一个沟通工具，以讨论数据需求并开始洞察最终解决方案的模式，而逻辑阶段则关乎应用恰当的设计技术。逻辑建模阶段定义了数据库系统的蓝图，该蓝图可以交给对系统了解不多的人员，使用给定技术（在我们的案例中将是某个版本的微软`SQL\
  \ Server`）来实现。\n\n注意\n在我们开始构建逻辑模型之前，我们需要引入一个完整的数据建模语言。在我们的案例中，我们将使用`IDEF1X`建模方法论，该方法将在`第\
  \ 3 章`中描述。\n\n### 物理阶段\n\n在物理实现阶段，您需要将逻辑设计适配到所使用的工具（在我们的案例中是`SQL Server RDBMS`）。这涉及验证设计（使用被称为范式的规则，将在`第\
  \ 5 章`中介绍），然后为列选择匹配域的数据类型，创建表，应用约束，偶尔编写触发器以实现业务规则等，从而以最高效的方式实现逻辑模型。此时，对`SQL Server`、`T-SQL`和其他技术具备相当深入的平台特定知识变得至关重要。\n\
  \n偶尔，此阶段可能需要对设计的对象进行一些重组，以使其更易于在`RDBMS`中实现。总的来说，我可以指出，对于大多数设计，很少有理由大幅偏离逻辑模型，尽管需要平衡用户负载、并发需求和硬件考虑，可能导致对初始设计决策进行一些更改。最终，主要目标之一是确保在概念和逻辑阶段指定的数据或已识别的完整性约束不会丢失。数据点可以（并且将会）被添加，通常是为了处理编写程序来使用数据的过程，例如记录谁创建或最后更改了某行的数据。关键在于避免影响设计的含义，或者至少不要从原始需求集中删减任何内容。\n\
  \n在项目的这个阶段，将应用各种结构来处理在设计概念部分识别出的业务规则。这些结构将从首选的声明性约束（如默认值和检查约束），到不那么优选但仍然有用的触发器，偶尔还有存储过程。最后，此阶段包括为我们将要存储的数据设计安全性（尽管需要明确的是，我们可能最后才设计安全性，但不应在您完成编码后才设计，以防其以某种方式影响设计）。\n\
  \n### 引擎调整阶段\n\n存储布局阶段的目标是优化您的设计与关系引擎的交互方式——例如，通过在物理磁盘存储上实现有效的数据分布、明智地使用索引，或者转而使用微软在过去几年中实现的列存储或内存中结构（并且在`SQL\
  \ Server 2016`中通过可用于`OLTP`表报表查询而不阻塞写入者的列存储索引、可编辑的列存储索引和其他新功能进行了显著改进）。虽然`RDBMS`的目的在很大程度上是将我们与数据检索和存储的物理方面隔离开来，但在当今时代，理解`SQL\
  \ Server`如何物理实现数据存储以优化数据库访问代码仍然非常重要。\n\n在此阶段，目标是在不改变已实现数据库的任何方面的情况下优化性能，以实现该目标。此目标体现了\
  \ Codd 的第十一条规则，即`RDBMS`应具有分布独立性。分布独立性意味着用户无需知道数据库是否是分布式的。将数据分布在不同的文件、甚至不同的服务器上可能是必要的，但只要发布的物理对象名称不变，用户仍将通过数据库中的表的行和列来访问数据。\n\
  \n随着越来越多的数据堆积到您的数据库中，理想情况下，您需要对数据库进行的唯一更改将是在此阶段进行（假设需求永不改变，这对大多数人来说是相当不可能的）。这项任务通常由生产环境`DBA`负责，他们负责维护数据库环境。当数据库系统由第三方构建时，例如在打包项目或由顾问构建时，情况尤其如此。\n\
  \n注意\n我们对存储模型的讨论将相当有限。我们首先会在概念和逻辑建模中查看实体和属性。在实现建模中，我们将转换方向来处理表、行和列。记录和字段的物理建模将仅简要涉及（在`第\
  \ 8 章`）。如果您想更深入地了解物理实现，请查阅 Kalen Delaney 的最新《内幕》系列（`http://sqlserverinternals.com/`）。要了解行业正快速迈向的方向，请看看`SQL\
  \ Azure`的实现，在那里，实现的存储方面在很大程度上已超出您的控制和理解范围。\n\n\n## 本章小结\n\n在本章中，我提供了一个简要的历史背景，为本书后续的旅程提供上下文，同时介绍了数据库对象的基本概念和一些理论方面的内容。理解本章讨论的大部分概念至关重要，因为从现在开始，我会默认你已经理解了它们。不过说实话，所有真正深刻重要的观点似乎都会在本书中反复出现。我几乎可以保证，关于每个表都需要一个**自然键**（这显然是阅读至此你想要在最终数据库中实现的目标）的强调会足够多，以至于你可能会发现自己去佛罗里达群岛度假，却甚至没意识到原因（提示，可能是**自然键**的美妙让你着迷）。\n\
  \n我介绍了关系型数据结构，并定义了什么是数据库。接着，我们讨论了表、行和列。之后，我解释了**信息原理**（该原理指出数据只能通过表访问，且表没有顺序），定义了键，并介绍了\
  \ `NULL` 值和关系。我们还简要介绍了 SQL 工作原理背后的推动力。\n\n我们探讨了**依赖**的概念，这基本上关注的是注意到某个值的存在需要另一个值的存在时的情况。这些信息将在第\
  \ 5 章中再次使用，届时我们将重新组织我们的数据设计，以优化在关系引擎中的使用。\n\n在接下来的几章中，当我们开始制定概念设计，然后是逻辑设计时，我们将主要参考实体及其属性。在我们逻辑上设计出数据应有的样子之后，我们将转向实现阶段，讨论表、行和列。术语本身并不是特别重要，在现实世界中最好不要成为术语狂热者，但在学习过程中，保持这些差异的清晰是很好的实践。真正令人兴奋的部分是当数据库建设开始，我们的数据库开始变为现实。之后，剩下的就是将我们的数据加载到一个结构良好、保护完善的关系数据库系统中，然后让用户去使用！\n\
  \n一切都始于这里介绍的基础知识，包括理解什么是表、什么是行（以及为什么它不同于记录）。作为最后一个不算太隐晦的潜意识提醒，表中的行没有顺序，表需要自然键。\n\
  \n本书的其余部分将围绕以下阶段的过程进行探讨（下一章将简要介绍在你开始概念设计需求之前的一个项目阶段）：\n\n*   **概念设计**：识别用户期望从你即将构建的数据库系统中获得的概念。\n\
  *   **逻辑设计**：记录用户数据库中需要的一切，包括数据、谓词/规则等。\n*   **物理设计**：根据使用的工具（在本书中，是 `SQL Server`）设计和实现数据库，并根据你正在使用的当前版本的\
  \ `SQL Server`/其他关系数据库管理系统的实际情况进行调整。\n*   **引擎调整**：根据使用模式和 `SQL Server` 的最佳实践，在存储上设计和布局数据。调整设计，使其与引擎层（包括算法层和存储层）良好协作。所做的更改应该只影响性能，而不影响正确性。\n\
  \n当然，同一个人不一定执行所有这些步骤。其中一些步骤需要不同的技能，并非每个人都能无所不知——或者至少我是这么听说的。\n\n脚注 1\n\n关于声明式语言的一个很好的概述，请参阅\
  \ [`https://www.britannica.com/technology/declarative-language`](https://www.britannica.com/technology/declarative-language)。\n\
  \n"
- '# 2. 需求简介


  > 忙碌并不总是意味着真正的工作。所有工作的目的都是生产或成就，要实现这些目标，就必须有远见、系统、计划、智慧和真诚的目标，以及汗水。看起来在做，并不等于真正在做。——托马斯·爱迪生，美国发明家和商人


  如果有什么比在没有完全理解成功要求的情况下做一件简单任务更糟糕的话，那就是在同样的情况下做一件复杂的任务。这种事每天都在发生，计算机项目在创建时往往对最终目标只有一个模糊的想法。有时这很有趣，并能引导你走向有趣的东西……有时，但当该项目的目标是向一个知道自己想要什么的客户交付价值时，几乎从不如此。因此，任何参与软件项目的人，都必须在开始设计任何软件之前，花时间弄清楚客户想要什么。如果你非常幸运，这个人可能不是你，因为捕获需求比后续章节中的任何任务都要困难得多。


  然而，在本章的剩余部分，我们将假设自己戴上了业务分析师的帽子，需要在开始设计数据库之前收集需求。我们将保持非常简单，只涵盖能应付过去的最小必要量。


  启动计算机项目时，通常做的第一件事是采访用户，并问类似“你们到底想要什么？”的问题，然后倾听，同时记住用户通常不是技术专家。有些人是。还有一些人完全相信自己是，但实际上并不是。所以一定要让很多人参与进来，并在尝试解决问题之前真正花时间理解客户的问题。我本人历史上的一个主要问题是，我会试图快速跳过理解客户需求这一步，直接进入数据库内部设计。


  问题在于用户不考虑数据库；他们考虑的是用户界面（UI）、报表以及他们希望事物呈现的外观和感觉。当然，用户为 UI 或报表格式指定的很多内容最终都会反映在数据库设计中；你的职责是确保需求中包含足够的信息，以便在不太多考虑数据将如何显示、处理或使用的情况下设计存储。在这个过程中，数据有其自身的本质，必须遵守，否则你将发现自己会与你构造的结构陷入斗争。在本章中，我们将探讨一些你想要获取的基本数据类型以及可以查找的位置，以确保你从业务分析师那里获得了正确类型的需求来开始数据库设计过程。


  当然，如果你是新手，你可能会想这听起来像是很多文档工作，而不是很多设计（和编码）。无论你怎么看，规划每个项目都是如此。如果你幸运，你会遇到负责需求收集的分析师，这样你就可以专注于设计和编写软件。然而，确保有人收集需求的重要性再怎么强调也不为过。在一个软件项目中（实际上是任何项目，但让我们专注于软件项目），以下几个阶段是常见的：


  *   需求收集：记录系统将是什么样子，并确定项目成功的标准。

  *   设计：将需求转化为实施计划。

  *   实施：编写软件代码。

  *   测试：验证软件是否按预期工作。

  *   维护：进行更改以解决测试中未发现的问题。



  项目在需求收集之后的每个阶段，都依赖于需求来确保目标得以实现。需求如同路线图，为你指明到达目的地的方向和目标。若不先明确需求就尝试构建数据库，就如同没有地图的旅行。旅途或许有趣，但你可能会发现自己**本该在阿尔伯克基左转**，结果非但未能在皮斯莫海滩晒羽毛，反而不得不与雪人搏斗。缺乏合理的需求，很大比例的项目将无法满足用户需求。一个需要考虑的非常实际的讨论是：多少需求才算足够？在软件开发的早期，这些阶段是针对整个项目依次进行的，即你收集所有可能需要的需求，然后在开始编码前设计整个软件项目，等等。这种项目安排方法被称为**“瀑布方法”**，因为一个步骤的产出会流入下一个步骤。瀑布方法常被嘲笑为普遍糟糕（当然也很酷不起来），因为每个阶段都必须全部完成才能进入下一阶段。越来越多的团队正在使用**“敏捷”**项目开发方法，但阶段与瀑布方法相同，主要区别在于迭代和时间分配。在进行设计前，你仍然需要知道要做什么；在进行编码前，也仍然需要先完成设计。


  本章我想阐明的一个重要观点很简单：无论你是否愿意，这些阶段都将被执行。我曾参与过一些项目，在项目启动时几乎同时开始了实现工作。最终，我们不得不回头收集需求，以弄清楚用户为何对我们的产出不满意。而当我们直接从需求收集跳到实现时，情况更是一团糟，因为每个程序员都各行其是，最终系统中的每个数据库、每个对象、每个接口都看起来完全不同。这是一场混乱，很可能直到今天仍在从中艰难跋涉。


  本书确实主要是关于设计和实现的（尽管第 13 章有一节关于数据质量和测试）。然而，本章之后，我将假设需求已经完成，设计阶段已正式开始。关于软件需求收集和文档记录过程的书籍已有很多，因此我甚至不打算尝试深入举例说明需求。相反，我会快速列出我在需求中所寻找的要点。正如作家盖莱特·伯雷斯曾谈论艺术时所说，“我对艺术一无所知，但我自己喜欢什么我知道”，需求方面的情况也确实非常相似。无论如何，需求应当被捕获，通常你可以通过几个关键标准来区分需求的好坏：


  *   需求通常应包含极少关于如何解决问题的**技术细节**；它们应只包含问题的定义和成功标准。例如，一个好的需求文档可能会说“职员们必须心算所有的加法，这很慢且容易出错。为了项目成功，我们希望以避免错误的方式完成数学计算。”一个差的需求文档则会将最后一句替换为“...我们希望使用德州仪器
  TI3243 计算器完成数学计算。”计算器可能是一个解决方案，而且可能是个很好的方案，但这个决定应留给技术人员，以避免过度限制最终解决方案。

  *   使用的语言应尽可能**具体**。例如，考虑这样的陈述：“我们只为新招聘的数据库管理员支付每年 20,000 美元的年薪，且第一次加薪在六个月后。”如果这是实际需求，公司将永远无法招聘到合格的数据库管理员——永远不能。如果你在软件中照此实现了该需求，那么当公司第一次想打破这个规则时（比如保罗·尼尔森这样的人才出现了），那个用户会诅咒你的名字，雇佣保罗担任首席执行官，仅仅是个虚职，六个月后，再将他的职位更改为数据库管理员。（用户总会找到完成工作的方法！）如果需求写得足够具体，它会说“我们通常只...”，其实施方式将大不相同。

  *   需求应便于客户**阅读和验证**。纯粹而简单，使用用户能理解的语言，而不是他们仅仅一带而过的技术术语，这样他们直到软件未能满足需求时才会意识到你错了。简单的图表和图片也是很好的沟通工具。


  在我看来，你如何记录需求并不重要，重要的是它们**被写下来**。写下来。写下来。希望如果你忘了本章我说的其他内容，你会记住这一点。如果你已婚或有父母，你可能犯过这样的错误：“是的
  ______，我保证会为你完成那件事”，然后很快就忘记了具体说了什么，最终导致争吵。“是的，你确实说过你想要屏幕是蓝色的！”你对你的客户说。此时，你无异于在说他们是骗子或愚蠢的，这可不是好的商业做法。另一方面，如果你转发了他们同意将屏幕设为蓝色的文档，那么承认错误的责任就在他们那边了。


  最后，在软件创建过程的其余部分，我们将如何使用书面需求？在设计阶段，需求是你塑造软件的指南。技术细节由你（或公司标准）决定：是两张表还是三张表，是存储过程还是即席访问，是`C#`还是`VB`？但最终输出应能通过将设计与需求进行比较来验证。当需要进行整体系统测试时，你将把需求作为成功的标准。之后，你将用需求来测试你的设计和代码，以确保你满足了它们。


  在本章中，我将介绍需求收集过程中的两个特定部分：


  *   **记录需求**：我将简要介绍在整个项目过程中，关于记录需求你会关注哪些方面。

  *   **寻找需求**：在这里，我将讨论寻找信息的地方以及挖掘这些信息的一些技巧。


  需求不是项目中微不足道的部分，而且绝对不应该被省略，但像任何事情一样，它们也可能被过度执行。本章将给你一点建议，告诉你该从哪里寻找，或者，如果你是那个不必负责收集需求的幸运程序员，该确保哪些方面已被审视。编程的悲哀现实是，如果你创建的系统很糟糕，是因为你得到的需求很差劲，那么需要重写的不会是收集需求的人。



  ## 记录需求


  如果你曾去过一个没人和你说同样语言的地方，你就会体会到那种仅仅因为沟通不畅而产生的孤立感。周围人说的话你都听不懂，无论你问多少次洗手间在哪里，换来的都只是茫然的眼神。这与智力无关；只因你们语言不通。这听起来显而易见，但你不能指望另一个国家的全体国民都完美学会你的语言，只为了满足你的需求。更好的办法是你去学习他们的语言。即使两人说同一种基础语言，也常常会有让人困惑的方言和措辞差异。而这正是我们常常对用户所抱有的期待。


  信息技术专业人士和我们的客户之间也往往存在这类沟通问题，因为我们这些技术人员常常与客户说着不同的“方言”，甚至不同的“语言”。客户倾向于用他们行业的语言来思考，而我们则习惯用计算机解决方案的思路来思考。当你作为用户时，很可能也有和他们相同的感受。例如，想想
  SQL Server 的工具。我们这些关系型程序员很难向工具设计者传达我们在 SQL Server 工具中想要什么。他们为大多数任务做得足够好，但显然，他们与用户并不完全在同一个频道上。


  在分析过程中，你应该尽早养成一个习惯：尽可能多地、合理地记录、记录、再记录你所获取的信息。有时人们会休假，带走了他们脑海中大量的工作知识，而他们有时休完假就不回来了（你懂的，因为他们可能得到了一份在迪士尼乐园担任丛林巡航船长的工作！）。这个情景有多种变体，并非都令人愉快地细思。没有文档记录，你很快就会面临丢失重要细节的风险。千万不要试图把所有事情都记在脑子里，因为即使是记忆力最好的人，也往往会忘记项目的细节（尤其是如果他们最终留在了那个“魔法王国”）。


  以下是一些有用的建议，当你开始记录用户需求时可以参考：


  *   尝试维护一套文档，用于共享系统需求和规格信息。需要考虑的重要文档包括设计会议记录、描述口头变更请求的文档，以及对所有规格（如功能、技术、测试等）的签收确认。

  *   除了正式文档，及时更新并确保设计团队成员充分知情也很重要。为所有信息建立并维护一个公共知识库，并保持其更新。

  *   在任何你添加了用户未提供或未明确同意的信息之处，务必加以注明。

  *   尽早确定项目范围，并尽力使需求范围与之保持一致。这将防止项目变得过于庞大或多样化，以至于无法在合理的时间和预算内完成。在过程的早期就厘清那些影响预算的变更，特别是会增加预算的变更，可以避免未来的不快。

  *   要简洁，但也要全面。一份文档可以是 1000 页，也可以是 10 页，但表达的内容可以相同。关键的检验标准是：用户、架构师和程序员能否使用它并实现最终目标？


  一旦你生成了文档，一个关键步骤紧随其后：确保客户同意你对其目标的描述版本。在进行整个系统设计过程中，客户无疑会在实体、数据点、业务规则、用户界面、颜色等几乎所有方面改变主意，而你必须为此做好准备。无论客户想要或需要什么，都是你必须努力去实现的，因为他们最终控制着项目。不幸的是，这常常意味着需要通过项目经理这样的第三方进行沟通，并且需要有足够的灵活性来应对任何提出的变更，无论大小。这种设置起初听起来很棒，因为你以为项目经理会为你翻译，并站在质量和正确性的一边，有时确实如此。但更多时候，经理会把客户的需求误解翻译成一些相当奇怪的东西，然后坚称那就是客户的愿望。“我需要所有数据在一个屏幕上”会被翻译成“我需要所有数据在一张表里”。最好的情况是，经理能分清谁是技术人员、谁有业务需求。如果你从事的是一份典型的工作，那么更接近现实的恐怕是最坏的情况。


  除了与客户交谈之外，收集尽可能多的笔记、打印件、截图、便携式硬盘等载有电子表格、数据库备份、Word 文档、电子邮件、手写笔记等资料的载体，这些对于当前问题的任何现有解决方案都至关重要。这些数据在发现数据元素、屏幕、报告以及其他需要设计到你应用程序中的要素时会非常有用。通常，你会在客户的“文物”中找到在构建数据模型时极为宝贵的信息。


  > **提示**

  > 在设计和实施的整个过程中，你无疑会发现对原始需求的变更。务必持续更新你的文档，因为世界上写得最好、格式最精美的文档，如果过时了，也就毫无用处。



  ## 收集需求


  ### 收集需求的方法


  收集需求可能是一项艰巨的任务，因此从小处着手，并持续添加，直到你和你的客户都同意你已经充分理解了问题，可以继续推进。最初并不需要收集一个大型系统所有领域的每一个需求；系统可以被分解成若干部分，通常称为主题区域。主题区域的大小取决于团队的需求和所使用的开发方法。例如，像
  `Scrum` 这样的敏捷方法，会将所有事情分解成小单元，以便频繁地进行设计、编码、测试和发布（例如，每两周一次）；而像瀑布式方法则会要求你先设计整个系统，然后再开始编码。无论你采用什么方法，最终的结果至少应该看起来是相似的（允许技术和公司需求发生变化）。重要的是，所有的开发方法都会告诉你一件事：在编码之前，先设计好你要编码的内容。


  对于收集需求，有很多工具和方法论可用于记录流程、业务规则和数据库结构。统一建模语言（`UML`）是一个可能的选择；微软解决方案框架（采用 `UML`）和 Rational
  Unified Process 是其他选择。`IDEF` 系列方法中也有几种用于业务流程建模的模型类型；我们将在 第 3 章 介绍它们的数据建模技术。我将采用实体-关系（`E-R`）建模方法
  `IDEF1X` 来为数据库建模。对于项目中非数据库结构部分，我将不会介绍任何其他建模语言，而是使用一种简单的手动电子表格方法，这无疑是记录需求的最常用方法——即使是在中型组织中，在文档工具上花钱也可能比教你的宠物半蜜蜂
  `Eric` 在玩 `Words with Friends`（“再次嗡嗡叫？”）时做出好的单词选择还要困难。


  ### 详细规格说明的重要性


  无论使用什么工具来记录需求，数据库设计过程的需求都是一样的。需要获取规格说明，以引导你作为数据库设计师发现以下所有内容：


  *   实体和关系

  *   属性和域

  *   可以在数据库中强制执行的业务规则

  *   需要使用数据库的过程


  没有这些规格说明，你要么需要不断回去询问客户一大堆问题（他们有时每被问两次就会给出三种不同的答案，这会锻炼你的辨别能力），要么就开始做猜测。虽然猜错几次对于学习如何不做事情来说是很好的教育，但这肯定不是高效工作的办法（除非你碰巧是了不起的
  `Kreskin`，能 `99.9%` 地猜对，尽管我很确定那是个把戏，他也做了他的需求收集工作）。


  作为实施数据库系统过程的主要部分，数据架构师的目标将是生成数据库的图形化模型，我们将在后续章节中介绍这一点。


  **提示**


  在项目的早期阶段，先弄清楚“是什么”和“为什么”；然后再处理“怎么做”。一旦你了解了需要构建内容的细节，构建它的过程就会相当自然地进行，你甚至可能将现有的模式应用到解决方案中。


  模糊性可能导致后续过程中不必要的讨论、争论甚至诉讼。因此，请确保你的客户理解你将为他们做什么，并使用能够被清晰理解但又足够具体以描述你在信息收集过程中学到的内容的语言。


  ### 数据库架构师的活动


  在整个发现过程中，将会收集和生成一些构件，这些构件将在整个实施过程中用作参考资料。构件是任何对设计很重要的文档，例如访谈记录、电子邮件、示例文档等。在本节中，我将讨论一些你作为数据库架构师需要非常关注的主要活动类型：


  *   采访客户

  *   提出正确的问题

  *   与现有系统和原型协作


  这绝不是寻找和获取文档来源的详尽列表；事实上，还差得远。目标只是为了让你开动脑筋，思考从客户那里获取哪些信息，从而让你的工作更轻松。



  ### 客户访谈


  设计数据存储的人员（通常称为 `数据架构师`）可能永远不会见到用户，更不用说参与正式访谈了。项目经理、业务分析师和/或系统架构师可能会提供所有所需信息。有些项目可能只涉及一位
  `数据架构师`，或者由一个人身兼数职，比整个第四机动部队演习时承担的角色还多。这两种方式我都经历过：我曾参与早期的设计会议，也根据文档工作过。与你合作的人越优秀，后一种选择就越有利。在本节中，我将快速介绍客户访谈的基础知识，因为在几乎任何项目中，你最终都需要对客户进行一定程度的访谈。


  客户访谈通常是项目真正启动的地方。这是自由、非结构化信息流开始的起点。然而，这也是沟通鸿沟开始的地方。许多客户通常以视觉方式思考——考虑表单、网页，或许还有简单的用户界面。用户也倾向于仅从自己的视角思考。例如，他们可能用
  `错误` 这个词来表示流程为何没有按预期运行。这些错误状况可能不仅是实际的错误，也可能是用户做出的选择。因此，像 `计划内维护` 这样的值也可能被归类为错误状况。这很大程度上需要帽子上绣着“分析师”字样的人去分析用户实际想要什么。


  因此，工作就是平衡客户感知到的想要和需求与他们真实的需求：一个结构合理、能很好地置于用户界面背后并捕捉他们真正目标的数据库，具体来说，就是让他们的业务生活更轻松、更有利可图的信息。更改表单以添加新的文本框、标签或其他元素是一项相对简单的任务，这会给用户造成错觉，认为创建整个应用程序是件容易的事。如果你想要证明，那就犯个愚蠢的错误：演示一个外观精致、使用非硬编码值的原型应用程序，让客户以为它真的能运行。客户可能会对你如此迅速地搭建出某些东西印象深刻，并期望你快完成了。他们很少会理解，隐藏在“引擎盖下”的东西——即数据库以及其他业务逻辑层和界面对象层——才是所有主要工作发生的地方。


  > **提示**

  >

  > 虽然在过程中，视觉元素是寻找用户所需数据线索的好地方，但你要小心，不要让数据库设计过分围绕某个特定的界面。数据的结构应由数据的含义决定，而不是由其呈现方式决定。呈现更多是界面设计的任务，而非数据库设计的任务。


  与用户进行头脑风暴会议也能一次收集大量信息，取得很好效果，只要与会人数不要太多（如果你的会议需要现场提供午餐的餐饮服务，那你们做不出什么重大决策）。这里的关键是要确保有人主持会议，防止
  `强势人物` 压制其他人、只发表自己的意见（如果你自己就是那个 `强势人物`，那就更糟了！）。认真对待每位受访者的发言，因为每个人都可能持有不同但有价值的视角。有时（好吧，通常是这样）最好的信息并非来自高管，而是来自实际工作的人。不要假设第一个人就能代表其他人，即使他们都在同一个项目上工作，或者即使这个人是经理（甚至是主要公司的总裁或所有者，尽管有时需要极大的技巧来走好这根钢丝）。


  在许多情况下，当主导型人物无法被约束，或者胆小的人无法被鼓励参与时，应采用一对一的面谈，让所有客户畅所欲言，不受意志坚强（尽管有时并非头脑更强）的同事不合时宜的打断。请注意，声音最大、最大胆的人可能没有最好的想法，而那个坐在后面一言不发的安静的人，可能掌握着整个项目的关键。确保至少考虑每个人的意见。


  本书这部分内容是我以最谦卑的态度写就的，因为我在设计流程的这一部分犯的错误比其他任何部分都多（而且像所有经验丰富的人一样，我在软件工程的各个层面都犯过相当多的错误）。客户访谈是我所遇到的流程中最困难的部分之一。对于经验丰富的分析师来说，这似乎不是一个合适的话题，但即使是我们中最优秀的人也需要被提醒：操之过急、欺压客户、在他们告诉你之前就告诉他们想要什么，甚至未能管理好用户的期望，都可能导致一个开发良好的系统走向失败。如果你的地基不稳，最终产品很可能也不稳固。


  ### 提出正确的问题


  在粉刷任何房屋的内部之前，粉刷公司的代表会问他们每位客户一系列问题（使用什么颜色？粉刷哪些房间？儿童房？用于写写擦擦？）。几乎任何计算机软件项目也是如此。在接下来的章节中，有一些问题对于系统开发中的数据库设计方面至关重要。显然，这不是一个详尽的清单，但它肯定足以让你开始，所以至少，你不会有一天坐在房间里却不知道该说什么。


  #### 需要什么数据？


  如果 `数据架构师` 是项目团队的一员，那么系统显然需要一些数据。大多数用户在较高层面上知道他们希望从系统中看到什么数据。例如，如果他们在会计部门，他们希望看到按某某分组汇总的美元和美分。在你的流程中的某个时间点，区分什么是必需的数据和什么只是“有了更好”的数据将非常重要。这显然是一个非常直接的问题，客户可能根本不知道他们需要什么，但许多用户已经在使用数据，无论是在现有系统上（他们要么讨厌这些系统，并很高兴你为他们替换掉；要么会因为你改变现状而讨厌你），或者是在他们自
  `VisiCalc` 以来一直使用的电子表格系统中。



  ### 数据将如何使用？


  了解客户计划如何使用系统中的数据确实是一项重要的信息。这样你不仅能理解将要尝试建模的流程，还能开始清晰地描绘出需要存储的数据类型。


  例如，想象一下你被要求为一个牙科诊所创建一个联系人数据库。你可能需要了解以下内容：


  *   联系人姓名是否仅用于打电话，就像一个快速电话簿？

  *   客户是否会向联系人列表的成员发送电子邮件或发布信息？为此是否需要将姓名细分为不同的组？

  *   客户是否会使用这些姓名来征求邮件回复，例如预约提醒？

  *   记录家庭成员信息是否重要？他们是否希望在重要的日子向相关人员寄送卡片？


  在设计流程的早期阶段，使用方式的问题可能看起来像是越界了，在某种程度上，你也可能是对的。但从宏观上看，使用信息绝对是有用的。了解数据可能被使用的流程类型很重要，但它可能出现在哪个屏幕上则相对不那么重要。例如，以地址为例。如果只是偶尔使用才捕获地址，你可能只需要给用户一个单行的字符串来输入整个地址。但如果你的业务涉及邮寄，你可能需要按照邮政局的精确规格来格式化它，这样就不必支付和普通人类一样的邮费。


  #### 哪些规则管理数据的使用？


  几乎你想要存储的每一条数据，都会有规则来管理其存储、使用和访问方式。这些规则将为你将要创建的模型提供大量指导。以我们之前的联系人为例，你可能会发现以下规则：


  *   每个联系人必须有一个有效的电子邮件地址。

  *   每个联系人必须有一个有效的街道地址。

  *   客户使用邮件例程检查每个电子邮件地址，在该例程成功执行之前，该联系人不是有效联系人。

  *   联系人必须根据他们遇到的问题类型进行细分。

  *   只有特定用户才能访问联系人的电子邮件地址。


  在流程早期阶段收集规则时，仔细处理措辞很重要。很多时候，你得到的规则在写下来时看起来相当直白，但实际情况往往并非如此简单。在假设规则为真之前，与分析师（可能还需要直接与客户）确认你所审查的规则是至关重要的。


  举一个恰当的例子，什么是“有效”的电子邮件地址？嗯，就是与该联系人准确对应的电子邮件地址。当然，但到底如何验证呢？事实是，在许多系统中你并不验证。通常，它的实现意味着该字符串符合电子邮件地址的格式，即在其他字符之间有一个&符号，并且在多个字母数字值之间有一个点（`.`）（例如
  `%@%.%`，加上 A 和 Z、0 和 9 之间的所有字符、下划线等），但具体含义完全取决于解释。另一方面，在其他类型的系统中，你实际上要求用户从电子邮件中获取一些信息来验证它确实是一个有效的电子邮件地址，并且输入数据的人拥有它的权限。这很大程度上取决于系统的需求，但这个问题用完全相同的英文词语可以轻松提出。


  真正的问题出现在你过于严格地解释规则，最终产品变得不可接受，因为你对数据施加了客户不想要的过度限制性规则，或者你遗漏了客户真正需要的规则。我曾经犯过一个大错，这导致一个系统在早期上线的几周内陷入困境。客户似乎希望严格执行的规则，根据其客户的需求，有时需要在个案基础上被覆盖。不幸的是，我们的程序没有让用户覆盖这些规则，而且他们在用户验收测试中从未尝试模拟这种情况，因此只能咬牙切齿、夜不能寐地修复这个问题。


  有些规则可能存在另一个问题：客户想要这个规则，但实现它不可行或不切实际。例如，客户可能要求网站的所有注册访客都必须输入有效的手机号码，但能确定访客会提供这些数据吗？而到底什么是有效的手机号码？你能仅通过格式来验证它，还是必须通过呼叫或向电话公司查询来验证该号码？如果用户提供的是固定电话呢？在这个流程阶段，可实施性的考虑是有限的。将来必须有人执行这个规则，这个问题会在流程后期得到解决。




  ## 报告涵盖哪些数据？


  报告往往是设计过程中最容易被遗忘的部分之一，但对客户而言，它几乎无疑是项目中最重要的环节。通常，让计算机系统产生价值的关键在于其能够详细报告系统中所有活动的能力——例如，组织不同部门的生产力如何，销售人员的效能如何（比如在第一个星期三之后的第二个星期二，因为……嗯，只是因为每个企业都会做一些在外人看来古怪的事情，甚至有些内部人员也这么觉得）。所有这些问题构成了计算机系统存在意义的“为什么”，即使对非常小的公司来说也值得为此部署系统。


  许多新手开发者会将报告的设计与实现留到最后一刻（这是我在过去多年中犯过不止一次的错误，也因此吃过很多苦头）。对用户而言，报告是将数据转化为信息的地方，是重要决策的基础，可能成就或毁掉一家公司。需要注意的是，这不是工具的问题。`Reporting
  Services`、`Power BI` 等工具都能让任务变得更轻松。问题在于知道要捕获什么数据。如果你需要知道冰柜过去五天的温度，那么初步设计的一部分就是以时间序列方式捕获至少五天的温度数据。如果你不知道这个需求，可能只会存储当前冰柜温度的单个数值，从而无法满足报告需求。这本是个容易解决的问题，但往往在项目后期会出现许多类似的小麻烦，最终导致实现效果不尽如人意。第一次就做对，显然比事后补救要好得多。


  回到联系人示例，客户希望在报告中看到什么名称？以下几种形式值得考虑：


  *   名，姓

  *   名，中间名，姓

  *   姓，名

  *   昵称


  尽早敲定此类问题很重要，无论它们此刻在你看来多么微不足道或愚蠢。它们对客户很重要，而你应该始终记住，客户是付费方。坦白说，报告最重要的规则是：你无法报告没有捕获的数据。


  从数据库设计的角度看，报告内容极其重要，因为它通常有助于发现其他方式未考虑到的数据需求。暂时不必关心报告的美观性，因为那可能会让人忍不住直接开始编码，而偏离了建模。


  提示


  不要忽视任何现有报告，因为新系统中可能有对应的报告。虽然很少直接照搬旧报告，但其内容往往包含客户在表达需求时可能从未想到的数据。当前生产系统中可能有数百份报告，在新系统中，除非能整合许多报告，否则数量几乎肯定会上升。具体的报告架构将在第
  14 章中更详细地介绍。


  ## 数据目前在哪里？


  偶尔有机会创建一个完全没有现有数据的新数据库是件好事。这会让工作变得轻松愉快。不幸的是，随着年复一年，找到一个全新系统来实施的可能性，比布朗队赢得超级碗还要低（无意冒犯布朗队球迷，但事实如此）。唯一可能的例外是构建一个交钥匙方式销售给最终用户的产品（那样的话，现有数据是他们的问题，或者如果你购买他们的系统，就成了你的问题）。在我参与过的几乎每一个系统中，我都在创建某个其他系统的更好版本，因此我们必须考虑转换对最终用户重要的现有数据。（其中有几个是全新的系统。这些经历非常美好，原因有很多：我们不仅不需要处理数据转换，也不需要处理现有流程和代码。）


  每个组织都不同。有些将数据集中存储在一个地方，而有些则分散在许多（非常多）地方。数据很少已经存在于一个你可以轻松访问的结构良好的数据库中。如果真是那样，客户为什么还要来找你呢？客户的数据通常存在于以下各种地方：


  *   大型机或遗留服务器：数百万行活跃的`COBOL`代码仍在许多公司运行。

  *   电子表格：电子表格是查看、筛选和分析数据的绝佳工具，但绝不是维护复杂数据的合适场所。大多数用户知道如何将电子表格用作数据库，但不幸的是，他们并不擅长确保数据的完整性，因此这些数据无疑会让你头疼不已。

  *   桌面数据库，如`Microsoft Access`：桌面数据库是很好的工具，易于部署和使用。然而，这种易用性往往意味着这些数据库是由非技术人员构建和维护的，设计不佳，当数据库需要扩容或修改时可能会引发许多问题。

  *   文件柜：即使在二十一世纪的今天，许多公司仍然很少或根本不使用计算机（除了玩纸牌游戏），而是堆积大量纸质文件。你的项目可能只是用基于计算机的系统替换一个文件柜，或者提供一个简单的数据库来记录现有纸质文档的物理位置。


  你需要纳入正在设计的`SQL Server`数据库的数据，将来自这些以及你从客户那里发现的其他奇怪而美妙的来源（现实常常比小说更离奇）。更糟糕的是，电子表格、文件柜和设计不良的计算机化数据库并不强制执行数据完整性（而且通常桌面数据库、大型机应用程序甚至现有的`SQL
  Server`数据库也不一定做得那么完美），因此要随时准备处理脏数据，在存入你崭新的数据库之前必须进行清理。


  ## 数据是否需要与其他系统集成？


  一旦你大致了解了客户重要数据的位置，就可以开始确定你新的`SQL Server`解决方案中的数据，将如何与那些保持原格式的数据进行交互。这可能包括构建通往大型机的复杂网关连接、连接到其他`SQL
  Server`、`Oracle`数据库或`Hadoop`系统的链接服务器连接，甚至链接到电子表格。在设计阶段，对此问题不能做太多假设。仅了解你需要处理的架构，对后续工作也可能有所帮助。


  提示


  永远不要期望你将要转换或集成的数据具有任何质量。太多项目启动时对所需工作量的预估不足，而数据清理一直是其中最难估准的部分。理解数据库中已有的内容已经够难了，如果数据质量很差，你的工作难度将成倍增加。



  ## 这些数据价值几何？


  对数据进行价值判断至关重要。在某些情况下，数据具有显著的货币价值。例如，稍后在第 4 章中将介绍的牙科诊所案例中，价值在于记录了对患者进行的治疗、向患者及其保险公司收取的费用。若没有这些文档记录，要找出这些数据并最终为完成的工作获得报酬，可能需要耗费数小时甚至数天。这类数据具有特定的货币价值，因为收款越快，产生的利息就越多，意味着利润更高。如果客户通过流程优化，将付款周转时间从一个月缩短至一周，这可能意味着多赚不少钱。


  另一方面，仅仅因为现有数据唾手可得，并不意味着它就应该被纳入新数据库。需要告知客户所有可用数据，并向其提供将其迁移到新数据库的成本估算。迁移遗留数据的费用可能很高，客户应有机会做出决策，以便将资金用于更重要的用途。


  ## 谁会使用这些数据？


  “谁将使用数据？”这个问题，可能在需求收集的早期阶段，并不会立刻让你觉得这是一种需要考虑的数据类型。在设计界面时，通常实际按下按钮的是谁，可能对按钮设计影响不大（除非需要考虑残障人士的使用）。然而，“谁”这个问题的答案，可以着手回答几种不同类型的问题：


  *   **安全性**：“谁将使用数据？”可以从两个方面理解。首先，这些人是唯一关心这些数据的人。其次，这些人是唯一有特权使用这些数据的人。后者将要求你为使用设置权限边界。有趣的是，若加入像《健康保险流通与责任法案》(HIPAA)
  或《萨班斯-奥克斯利法案》(SOX) 这类隐私法，或是全球范围内其他上百条善意但往往惩罚数据库管理员多于违规者的法律，问题就更复杂了。

  *   **结构**：如果多个用户群体需要相同的数据，但需求却大相径庭，这可能在后续过程中导致不同的设计结果。

  *   **并发**：支持一个并发用户系统的考量，与支持十个、一百个、一千个乃至更多并发用户的系统是不同的。用户数量不应改变我们的概念或逻辑设计，但它肯定会改变我们设计物理层的方式。关于并发，本书直到很后面（第
  11 章）才会详细讨论，但此刻你正在提问，并很可能需要指定未来的硬件/软件，所以现在就了解起来也无妨。


  这个关于谁会使用数据的选择，与你在需求收集过程中已解答的所有其他问题息息相关。当然，这些问题仅仅是信息收集过程的开始，在能够开始构建数据库之前，还有大量工作要做，所以你还得按捺住性子再等一阵。


  ## 是否在替换现有系统？


  如果你正在为一个现有的数据库系统编写新版本，那么对现有系统的访问将是福也是祸。显然，你能收集到的关于先前系统及其数据结构的信息越多越好。所有的界面屏、数据模型、对象模型、用户文档等等，对设计过程都很重要。


  然而，除非你只是对现有系统进行修订，否则通常旧数据库系统仅作为完整性参考点，而非初始蓝图。在大多数情况下，你将要替换的现有系统会有许多需要修复而非模仿的问题。如果被替换的系统毫无问题，客户为什么要替换它？也许只是为了迁移到更新的技术，但没有人会仅仅为了找乐子而替换一个运转正常的系统。替换现有系统最糟糕的部分是什么？测试。旧系统显示订单数量：100；新系统显示：102。哪个是对的？无论新代码测试得多么完善，总得有人证明新系统是正确的。


  使现有系统变得复杂的另一个因素是遗留数据。如果你有 20 年的历史数据，可能基于一个专有的、基于分层文件的主机应用程序，常常会出现两个问题。第一：新系统“需要”像旧系统一样工作。第二：20
  年的数据通常带来了海量的结构问题。因此，需求、设计和实施计划的一部分需要解决如何将旧数据导入的问题。


  早期设计过程中可能也存在原型。原型可以作为有用的工具，用来沟通如何通过计算机解决现实世界的问题，或者当你试图重新设计当前流程的管理方式时。它们的作用是作为一个概念验证——一个与设计团队和最终用户共同充实项目关键要素的机会，项目的成败将取决于这些要素。


  ## 利用其他类型的文档


  除了访谈和现有系统，你还可以从其他来源寻找数据规则和与设计项目相关的其他信息。通常，项目经理会获取这些文档；有时，它们可能无法提供给你，你只能依据他人对文档内容的描述。在这些情况下，我发现最好将你的理解书面化，并确保明确是谁对你无法查阅的文档含义做出了何种说明。一如既往，以下列表绝非详尽，但应能启发你思考可以从哪里获取你正创建或替换系统的现有文档。


  ### 早期项目文档


  如果你在一家为其他公司开发软件的公司工作，你会发现项目早期通常会创建一些用于征求成本和可能解决方案的文档，例如：


  *   **报价请求 (RFQ)**：一份包含相当成熟规格说明的文档，由组织发出以确定解决方案的成本。

  *   **提案请求 (RFP)**：针对不太成熟的想法，组织希望看到潜在解决方案并了解其大致成本。


  这些文档都包含了有价值的信息，可以帮助你设计解决方案，因为你可以了解在你介入之前客户的需求。当然，情况会变，最终解决方案并不总是与最初的要求一致，但一份 RFP
  或 RFQ 的副本应被添加到你将在后续流程中使用的信息堆中。尽管这些文档通常包含对问题和期望解决方案的粗略信息，但你可以用它们来确认最初想要数据库系统的原因，并更准确地把握要在其中存储的数据类型。


  无论如何，如果你能获得这些文档的副本，你将能看到客户的思考模式以及客户为何希望开发这样一个系统。


  ### 合同或客户工单


  获取合同副本看似是收集设计信息的一种相当激进的方法，具体取决于你所在的组织类型。坦率地说，在公司架构中，你可能需要突破层层管理，才能让他们理解你为何需要查看合同。合同本身可能因其使用的语言而难以阅读（类似于一种简明版本的编程语言，并夹杂着故意的模糊性，以便日后给律师们留下争论的余地）。然而，只要勤勉地过滤掉法律术语，你就能发现本质上相当于系统基本需求集的内容——通常这些是你必须严格满足、否则可能无法获得报酬的要求。更有趣的是，你可能会发现一些已承诺给客户、但实施团队却从未听说过的内容。


  合同之所以如此有吸引力，原因很简单。一般来说，它是你将要瞄准的目标。无论客户说了什么，或者现有系统是什么样的，如果合同规定你交付某种水上交通工具，而你因为下层客户改变主意却未修改合同，最终交付了一辆一级方程式赛车，那么你可能无法获得报酬，因为你的项目被视为失败（当然是比喻性的说法，也许他们会允许你保留那辆一级方程式赛车？）。


  ### 服务等级协议


  合同中一个对设计过程同样重要的部分是规定的服务等级。这可能包括每分钟的网页访问量、数据库中的行数等等。所有这些都需要进行测量、存储、测试等。当进入测试和优化阶段时，了解目标服务等级可能具有巨大价值。你可能还会发现一些需要存储的数据，用于验证是否达到了服务等级。


  ### 审计计划


  别忘了审计。构建系统时，你必须考虑系统未来是否可能被审计，以及由谁审计。政府机构、ISO 9000 认证客户以及其他受标准组织监督的客户，很可能有严格的审计要求。其他客户也可能有财务审计流程。尤其需要关注的是各种隐私政策、儿童数据限制、信用卡加密规则等等。所有这些不仅要求你遵守监管机构制定的规则，还要求你记录运营的某些部分。这些审计计划可能包含可用于设计过程的有价值信息。


  ### 原型


  原型有点像是一个活的文档，创建它是为了让用户能感受软件可能如何为他们工作。原型是极好的沟通工具，但它们侧重于视觉呈现，而非内部结构。原型真正的问题在于，如果为原型创建了数据库，那么这个数据库通常没什么实际价值。因此，当开始数据库设计时，你可能会被要求接手一个仓促开发的原型数据库，并“让它能用”，或者更糟的是，“稍作润色”。实际上，你可能会继承一个结构混乱、组织不清的原型，而你的任务将是立即将其转化为生产数据库（通俗地说，就是“昨天就该完成”）。


  有时可能需要你提醒客户，将原型仅视为交互式图片，用于让客户尝试某个概念，通常是为了让你们的公司签下合同。作为数据架构师，你必须尽最大努力，只将原型代码用作工作文档，以指导你自己的设计。原型有助于确保你不会遗漏用户所需的任何关键信息——例如姓名字段、搜索操作，甚至是一个按钮（这可能暗示着某个数据元素）——但它们可能完全无法告诉你关于最终数据库设计的任何信息。


  ### 遵循最佳实践


  在处理和收集需求时，遵循以下一些最佳实践列表可能很有用：


  *   **保持勤勉：** 仔细检查所有内容，确保所表达的内容合理。在进入下一步之前，务必尽可能多地理解约束系统的业务规则。早期阶段的错误可能会在后续阶段像滚雪球一样越来越大。

  *   **记录文档：** 文档的格式并非那么重要，重要的是尽可能多地记录客户的需求。确保文档所有相关方都能理解，并且对后续的实施工作有用。

  *   **保持沟通：** 与客户保持持续沟通对于确保设计不偏离正轨至关重要。危险在于，如果你开始误解客户的需求，那么之后的每个决定都可能是错误的。尽可能多地与客户进行面对面交流。


  ## 总结


  在本章中，我简要介绍了一些关于文档编制和需求收集的基础知识。这是创建软件过程中最重要的部分之一，因为它是后续一切工作的基础。如果基础牢固，后续流程才有成功的可能。如果基础草率，那么构建起来的系统其余部分很可能也是如此。此过程的目的是尽可能多地获取关于客户希望从其系统中获得什么的信息。作为数据架构师，这些信息可能会交付给你，或者至少大部分是。无论哪种方式，目标都是理解用户的需求。


  一旦你从用户那里获取了尽可能多的文档，真正的工作就开始了。贯穿所有这些文档，目标是为你做好准备，进入下一步：创建数据模型，该模型将以非常正式的方式记录以下所有内容：


  *   实体和关系

  *   属性和域

  *   可在数据库中强制执行的业务规则

  *   需要使用数据库的流程


  由此，将产生一个概念数据模型，该模型具有许多将在实际实施的数据库中存在的特性。在接下来的章节中，数据库设计肯定会从这个概念模型发生变化，但它将共享许多相同的特性。


