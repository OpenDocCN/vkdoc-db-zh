  \ 上提供链接——不过，如果该直接链接发生变化，这本书仍将以某种方式在我的网站上占据显著位置。随着新想法、我发现的错误，或者我选择发布的额外材料变得可用，我会在那里发布更多信息，因为一旦本书不再是一堆数字比特，而成为纸上的墨迹实例，我可能就会想到这些。\n\
