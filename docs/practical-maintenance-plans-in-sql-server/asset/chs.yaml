  图 2-4.

  恢复模型与备份类型


  遵循图 2-4 中描述的逻辑，我建议采用完整备份、差异备份和事务日志备份。这样，事务日志将为差异备份提供支持，而差异备份则依赖于完整备份才能正确恢复。


