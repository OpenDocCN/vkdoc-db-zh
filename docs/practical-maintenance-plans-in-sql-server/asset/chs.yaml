  *图 13-67. 报告和日志记录*\n\n这是默认屏幕。看；当维护计划操作运行时，我们可以生成新的文本文件报告，并且可以如图 13-68 所示向操作员发送电子邮件。\n\
  \n![A396023_1_En_13_Fig68_HTML.jpg](img/A396023_1_En_13_Fig68_HTML.jpg)\n*图 13-68.\
  \ 报告和日志记录（已更新）*\n\n这非常方便！更新界面后，单击“确定”继续。现在保存您的工作，沉浸在即将完成的维护计划的荣耀中。\n\n请注意，由于我们已进行设置，这些报告和日志记录设置将强制应用于备份维护计划中的所有子计划。这是一件好事，因此我们无需反复设置。或者，这也意味着，如果您需要在这些限制之外进行报告或日志记录，则必须创建一个具有不同报告和日志记录设置的新维护计划。\n\
  \n让我们快速回顾一下我们已完成的工作。\n\n*   我们将相关任务添加到了现有的备份维护计划中。\n*   我们按照之前决定的顺序在任务上添加了优先约束。\n\
  *   我们向维护计划添加了报告和日志记录。\n\n这简单地意味着，备份维护计划的子计划在其计划时间运行，从第一个任务开始，到最后一个任务结束。完成后，将发送一封附有维护文本报告的电子邮件。`SQL\
  \ Server Agent` 也会在其历史日志中记录此信息。无论失败还是成功，操作员都会收到警报。\n\n### 测试维护计划\n\n现在一切就绪，让我们对其进行一些测试。我们已将操作员设置为接收通知，因此我们应该能够直接运行维护计划，然后等待通知。\n\
  \n请记住，这将按任务顺序运行所有内容，即所有任务。我们希望从完整备份开始，然后运行差异备份，最后运行事务日志备份。您不能直接右键单击“维护计划”，因为其中有三个子计划。相反，在\
  \ `SQL Server Agent` 的“作业”文件夹中，右键单击 `Backup Maintenance Plan.Backup Database (Full)`\
  \ 作业，选择“在步骤…开始作业”，并观察如图 13-69 所示的内容。\n\n![A396023_1_En_13_Fig69_HTML.jpg](img/A396023_1_En_13_Fig69_HTML.jpg)\n\
  *图 13-69. 开始作业*\n\n到目前为止看起来不错。\n\n退一步，现在运行差异作业，查看如图 13-70 所示的内容。\n\n![A396023_1_En_13_Fig70_HTML.jpg](img/A396023_1_En_13_Fig70_HTML.jpg)\n\
  *图 13-70. 开始作业*\n\n让我们运行事务日志作业，查看如图 13-71 所示的内容。\n\n![A396023_1_En_13_Fig71_HTML.jpg](img/A396023_1_En_13_Fig71_HTML.jpg)\n\
  *图 13-71. 开始作业*\n\n干得漂亮。如果您已按照步骤操作，那么您可能已经收到了相当多的详细描述维护活动的电子邮件。花几分钟时间熟悉这些电子邮件，并知道您要查找什么。这样，在未来，您可以快速扫描电子邮件以获取所需信息。您还可以决定是否利用在维护活动完成时发送电子邮件的便利性，或者完全绕过此通知。最终，作为数据库管理员，这是您的选择。幸运的是，您刚刚学会了如何快速调整维护计划的设置以包含或移除步骤和通知！\n\
  \n这证明我们现在已经实现了在数据库中创建完整维护计划的目标，该计划将处理几乎所有日常维护活动。请记住，这些作业可以通过从 `SQL Server Agent`\
  \ 运行随时执行。或者，您也可以使用脚本运行作业，这可能更适合您。为此，让我们先查看脚本，然后理解它的作用。\n\n## 从 T-SQL 脚本启动作业\n\n\
  启动作业的脚本相对简单，大致如下：\n\n```\nEXEC msdb.dbo.sp_start_job @job_name=N'Backup Maintenance\
  \ Plan.Backup Database (Transaction Log)';\n```\n\n在这个例子中，我想要启动事务日志作业。在“新建查询”窗口中输入此查询并按\
  \ F5 执行，你将看到如下状态。\n\n![A396023_1_En_13_Figa_HTML.jpg](img/A396023_1_En_13_Figa_HTML.jpg)\n\
  \n关于这个脚本的一点说明：它是一个存储过程，针对 `msdb` 数据库中的 `sysjobs` 表运行启动命令。要查看这个表，只需在“新建查询”窗口中输入以下查询并按\
  \ F5。\n\n```\nSELECT * FROM msdb.dbo.sysjobs;\n```\n\n图 13-72 展示了该查询返回的结果。\n\n![A396023_1_En_13_Fig72_HTML.jpg](img/A396023_1_En_13_Fig72_HTML.jpg)\n\
  \n图 13-72. 查询结果\n\n看起来很熟悉吧？这就是我们创建的所有作业，还有一些详细信息。挺酷的！\n\n现在，打开 SQL Server 代理中的“作业活动监视器”。图\
  \ 13-73 展示了此时你应该看到的内容。\n\n![A396023_1_En_13_Fig73_HTML.jpg](img/A396023_1_En_13_Fig73_HTML.jpg)\n\
  \n图 13-73. 作业活动监视器\n\n嗯，我们所有的作业都在这里，排列整齐，告诉我们各种无用的信息。你可以看到除了 `E-mail User Information`，其他所有作业都已启用。它们都处于\
  \ `空闲` 状态，意味着当前没有在运行。它们上次运行时都成功了。如果你向右滚动，会看到 `上次运行` 和 `下次运行` 列。猜猜这些告诉你什么？这是快速查看你的作业是否正常运行的好方法。如果作业有问题，就在这里可以发现。你可以在这里右键单击任何作业并进行一些破坏性操作，所以请清楚自己在做什么。\n\
  \n> **提示**\n> 需要注意的是，你不应删除额外的维护计划。它们与所包含的作业是绑定的，如果你删除了维护计划，就会连带删除对应的作业。猜猜那时会发生什么？笨蛋帽子。你猜对了。\n\
  \n在我们结束之前，还有一件事。在 `SSMS 对象资源管理器` 中，单击 `连接` 并连接到 `Integration Services`。如果你无法连接到\
  \ `Integration Services`，那么只需以管理员身份启动 `SSMS`，应该就可以了。\n\n展开 `存储的包` 文件夹，然后是 `MSDB`，接着是\
  \ `维护计划`。此时你应该看到如图 13-74 所示的内容。\n\n![A396023_1_En_13_Fig74_HTML.jpg](img/A396023_1_En_13_Fig74_HTML.jpg)\n\
  \n图 13-74. Integration Services 维护计划\n\n右键单击我们的 `Backup Maintenance Plan` 并选择 `导出包…`。随后将出现图\
  \ 13-75。\n\n![A396023_1_En_13_Fig75_HTML.jpg](img/A396023_1_En_13_Fig75_HTML.jpg)\n\
  \n图 13-75. 导出包\n\n我们想将包路径更改为 `E:\\SQL Server` 下的一个新文件夹，所以我们称它为 `DTSX`。这意味着我们的维护计划备份位置将是\
  \ `E:\\SQL Server\\DTSX\\Backup Maintenance Plan.dtsx`，所以输入这个路径，然后单击 `确定`。其他所有设置保持原样即可。如果你检查那个目录，会看到那个文件现在就在里面。你甚至可以双击这些\
  \ `.dtsx` 文件来执行它们。\n\n为所有其他维护计划也执行此操作，以防万一。现在，我们已经备份了我们完成的所有工作，以防原始文件发生意外。\n\n让我们测试一下！哦，看，一个恶意用户闯入了数据库并删除了\
  \ `Update Statistics Plan` 维护计划。看图 13-76——它消失了！\n\n![A396023_1_En_13_Fig76_HTML.jpg](img/A396023_1_En_13_Fig76_HTML.jpg)\n\
  \n图 13-76. 维护计划\n\n真糟糕，图 13-77 显示作业也不见了！\n\n![A396023_1_En_13_Fig77_HTML.jpg](img/A396023_1_En_13_Fig77_HTML.jpg)\n\
  \n图 13-77. SQL Server 代理作业\n\n我们该怎么办呢？哦对了，我们做了备份。我们能轻松地把它加回来吗？能。\n\n\n### **导出与导入维护计划包**\n\
  \n连接到 Integration Services 并检查“维护计划”文件夹。它也不见了。不过不用担心；只需右键单击此文件夹并选择“导入包…”，即可显示图 13-78。\n\
  \n![A396023_1_En_13_Fig78_HTML.jpg](img/A396023_1_En_13_Fig78_HTML.jpg)\n**图 13-78.\
  \ 导入包**\n\n单击“包路径”旁边的省略号按钮，导航到我们的 `DTSX` 文件夹位置，`E:\\SQL Server\\DTSX`。选择 `Update\
  \ Statistics Plan.dtsx` 继续。您的界面现在应该如图 13-79 所示。\n\n![A396023_1_En_13_Fig79_HTML.jpg](img/A396023_1_En_13_Fig79_HTML.jpg)\n\
  **图 13-79. 导入包（已更新）**\n\n单击“确定”并刷新此文件夹，我们的计划就回来了，如图 13-80 所示。\n\n![A396023_1_En_13_Fig80_HTML.jpg](img/A396023_1_En_13_Fig80_HTML.jpg)\n\
  **图 13-80. Integration Services 维护计划**\n\n去查看数据库引擎中的“维护计划”和“作业”文件夹。在图 13-81 或图 13-82\
  \ 中看到什么有趣的东西了吗？\n\n![A396023_1_En_13_Fig82_HTML.jpg](img/A396023_1_En_13_Fig82_HTML.jpg)\n\
  **图 13-82. SQL Server Agent 作业**\n\n![A396023_1_En_13_Fig81_HTML.jpg](img/A396023_1_En_13_Fig81_HTML.jpg)\n\
  **图 13-81. 维护计划**\n\n所以它添加了维护计划，但没有添加作业？是的。但我们还没完成。\n\n再次回到 `Integration Services`\
  \ 部分，右键单击 `Update Statistics Plan` 并选择“导出包…”，这将打开如图 13-83 所示的界面。\n\n![A396023_1_En_13_Fig83_HTML.jpg](img/A396023_1_En_13_Fig83_HTML.jpg)\n\
  **图 13-83. 导出包**\n\n我们不打算将其导出到文件系统；这对于我们要完成的任务没有意义。相反，更新您的界面以显示图 13-84 中的值。对于“包路径”值，单击省略号，展开\
  \ `MSDB`，单击“维护计划”，然后单击“确定”。\n\n![A396023_1_En_13_Fig84_HTML.jpg](img/A396023_1_En_13_Fig84_HTML.jpg)\n\
  **图 13-84. 导出包（已更新）**\n\n完成后单击“确定”。接下来，您将看到一个如图 13-85 所示的弹出窗口。\n\n![A396023_1_En_13_Fig85_HTML.jpg](img/A396023_1_En_13_Fig85_HTML.jpg)\n\
  **图 13-85. 导出包警告**\n\n在这里单击“是”，以便替换当前包。\n\n回到数据库引擎实例，再次刷新您的“维护计划”文件夹。您可以在图 13-86\
  \ 中看到计划回来了。\n\n![A396023_1_En_13_Fig86_HTML.jpg](img/A396023_1_En_13_Fig86_HTML.jpg)\n\
  **图 13-86. 维护计划**\n\n仍然没有作业。很奇怪，对吧？还有最后一步，年轻的绝地武士。\n\n即使刷新“作业”文件夹，它也不会在那里。您需要先打开计划，然后从那里开始。双击“维护计划”中的\
  \ `Update Statistics Plan`，显示如图 13-87 所示的界面。\n\n![A396023_1_En_13_Fig87_HTML.jpg](img/A396023_1_En_13_Fig87_HTML.jpg)\n\
  **图 13-87. 更新统计信息计划**\n\n双击“子计划名称”并将其更新为图 13-88 所示的内容。\n\n![A396023_1_En_13_Fig88_HTML.jpg](img/A396023_1_En_13_Fig88_HTML.jpg)\n\
  **图 13-88. 子计划属性**\n\n现在保存计划，然后回去查看您的“作业”文件夹，如图 13-89 所示。\n\n![A396023_1_En_13_Fig89_HTML.jpg](img/A396023_1_En_13_Fig89_HTML.jpg)\n\
  **图 13-89. SQL Server Agent 作业**\n\n它在那里！不过，您需要将名称从 `Update Statistics Plan.Update\
  \ Statistics` 更改为 `Update Statistics`。完成后，您应该会看到如图 13-90 所示的更新界面。\n\n![A396023_1_En_13_Fig90_HTML.jpg](img/A396023_1_En_13_Fig90_HTML.jpg)\n\
  **图 13-90. SQL Server Agent 作业（已更新）**\n\n让我们验证一下它是否已恢复到之前的状态。\n\n双击 `Backup Maintenance\
  \ Plan`，然后双击设计阶段中的“更新统计信息”任务。然后您应该看到如图 13-91 所示的界面。\n\n![A396023_1_En_13_Fig91_HTML.jpg](img/A396023_1_En_13_Fig91_HTML.jpg)\n\
  **图 13-91. 执行 SQL Server Agent 作业任务**\n\n就在最下面那里……太棒了！我们已成功恢复了保存的包。\n\n### **总结**\n\
  \n哇！我们将本书过程中学到的所有知识整合成一个连贯的计划。让我们快速回顾一下本章向我们展示的内容。\n\n*   我们为备份计划上的每个时间片创建了单独的维护计划，每个计划在不同的时间运行不同的任务。\n\
  *   我们在每个维护计划中的任务上强制实施了优先级约束。\n*   我们设置了任务的报告和记录功能，并在每个任务完成时发送电子邮件。\n*   我们学习了如何用脚本启动作业。\n\
  *   我们简要了解了“作业活动监视器”及其重要性。\n\n在结束之前，让我们研究几件事：\n\n*   我们本可以在不设置各章中的计划的情况下完成本书的所有练习，但这不会引导您了解本章中计划如何与查询协同工作的知识。我希望您，作为读者，理解这些计划不仅仅是任意值，而是整体维护策略的一部分，应如此对待。\n\
  *   我们也可以主要在设计图面上使用“备份维护计划”来完成本书的大部分内容，但这同样不会让您获得关于“为什么”而不仅仅是“如何”的知识。您当然可以这样做——如果您愿意，可以回到设计图面来完成——因为那在您的空闲时间会是一个很好的练习。但最终，您需要回到\
  \ SQL Server Agent 的作业部分来配置实际的作业，这就是为什么我让您像我们这样完成它的原因。\n\n恭喜！您现在已经完成了本书的核心内容（豆腐和羽衣甘蓝）。我希望您现在已经建立了一个功能齐全的维护计划，并且已经开始梦想如何扩展这些新获得的知识。\n\
