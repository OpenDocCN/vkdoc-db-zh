  ### 启用邮件配置文件


  那么，现在我们的数据库可以发送邮件了，对吧？你可能会讨厌我这么说，但是……是也不是。你看，`SQL Server` 有一套关于安全原则的讲究，仅仅因为一个用户或登录账户有权限做某事，并不意味着所有用户和登录账户都有权限做同样的事。因此，必须强调一点：如果不进行额外的步骤，`Database
  Mail` 可能永远无法自行运行。


  是的，数据库刚刚确实发送了测试邮件。但请记住这一点：当你登录到 `SQL Server` 时，你所做的任何操作都是在你的登录上下文下完成的。如果你被授予了执行某项操作的权限，猜猜看：你就能做。因此，如果你没有被授予该权限，你就不允许做。在大多数情况下，常规的
  `SQL Server` 登录账户（特别是那些使用 `sa` 账户登录的）默认就有发送邮件的权限。有趣的是，`SQL Server Agent` 默认却没有发送邮件的权限。这不奇怪吗？


  默认情况下不启用发送邮件功能可能有其充分的理由，但我实在想不出任何好的理由，所以我就把这个问题推给微软了。


  我怎么强调都不为过的一点是，务必要在 `SQL Server Agent` 中启用邮件配置文件。首先，右键单击 `SQL Server Agent` 并选择 `属性`，如图
