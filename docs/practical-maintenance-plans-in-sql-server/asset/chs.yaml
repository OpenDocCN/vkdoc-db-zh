  这使您可以选择将警报错误文本包含在电子邮件、寻呼或网络发送中。您还可以通过在文本框中输入来指定任何附加信息。您也可以在此处延迟响应。什么是延迟响应？简单来说，就是在指定时间范围内，对于同一事件的后续发生，执行一个休眠命令。假设您没有正确设置此选项，并且像我们现在的默认设置那样。这意味着，针对数据库引擎的每一个目标事件，都会创建一封电子邮件并发送给列出的操作员。您可以想象这将生成大量邮件，您的想法是对的。设置响应延迟——即
  SQL Server 在响应下一个相同事件前等待的时间范围——可以解决这个问题。


  这一切意味着什么？这里有一个很好的理解方式。


  当指定的警报发生时，我希望通过电子邮件通知此人。我还想在电子邮件中添加文本“希望这不是一个永久性错误！”，所以我将在这里添加它。我不想了解此类型的所有错误，只想知道此错误已发生。我将为此设置一个延迟，这样，即使发生通常会触发此事件的相同事件，我也不希望该事件触发相同的作业。


