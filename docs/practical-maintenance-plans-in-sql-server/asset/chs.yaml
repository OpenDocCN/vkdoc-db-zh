  理想备份设置


  考虑图 2-6 所示的备份计划，它使用了图 2-5 中的颜色和引用。这就是我所说的“绝对理想”的情况。


  ![A396023_1_En_2_Fig6_HTML.jpg](img/A396023_1_En_2_Fig6_HTML.jpg)


