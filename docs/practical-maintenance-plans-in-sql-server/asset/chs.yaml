  \n### 实现维护计划\n\n任务已经设置好了，现在让我们付诸实践。我们该怎么做呢？只需在 `SQL Server Agent` 下双击作业名称（我的是 `T-SQL\
  \ Plan.T-SQL Task`），就行了，如图 11-13 所示。\n\n![A396023_1_En_11_Fig13_HTML.jpg](img/A396023_1_En_11_Fig13_HTML.jpg)\n\
  \n图 11-13. 作业属性，常规选项卡\n\n哦，谢天谢地。我们终于回到了熟悉的领域！从这里开始，像往常一样进行设置；如果您愿意，可以给它一个新名称并更新描述。我将我的改为了\
  \ `T-SQL Task`。请注意，我们当前位于左侧的 `General` 选项卡。现在让我们逐步查看其他选项卡。\n\n我们现在位于 `Steps` 选项卡。最初，此界面看起来类似于您在图\
  \ 11-14 中看到的内容。\n\n![A396023_1_En_11_Fig14_HTML.jpg](img/A396023_1_En_11_Fig14_HTML.jpg)\n\
  \n图 11-14. 作业属性，步骤选项卡\n\n一切都为我们设置好了！不过，有几处小地方我想改动一下，所以请点击 `Edit`，然后点击 `Advanced`。此时您应该会看到如图\
  \ 11-15 所示的界面。\n\n![A396023_1_En_11_Fig15_HTML.jpg](img/A396023_1_En_11_Fig15_HTML.jpg)\n\
  \n图 11-15. 作业属性，步骤选项卡，高级选项\n\n只需选中“包含步骤输出在历史记录中”复选框即可。\n\n在此区域完成操作后，点击 `OK`。\n\n\
  点击左侧的 `Schedules` 继续。此屏幕显示为任务定义的设置，即 `Daily` at `12:00 AM`。还记得之前设置的这个吗？除非您需要更改，否则可以保持原样。\n\
  \n接下来是 `Alerts` 选项卡，请点击它。我们其实不需要在此设置任何警报，因为我们只是运行一个简单的查询。同样，如果您需要在这里运行什么，请随意。毕竟，这是您的维护计划！\n\
  \n`Notifications` 是倒数第二个。这是重要的部分。确保您勾选 `E-mail` 框，选择我们的操作员，并将其设置为“当作业完成时”。图 11-16\
  \ 显示了推荐的设置。\n\n![A396023_1_En_11_Fig16_HTML.jpg](img/A396023_1_En_11_Fig16_HTML.jpg)\n\
  \n图 11-16. 作业属性，通知选项卡\n\n在 `Targets` 选项卡上，保持所有内容空白即可。我们根本没有为此部分定义任何内容。\n\n准备好后，点击\
  \ `OK` 以保存对此作业的更改。\n\n如果您通读了第 4 章，这个设置流程应该很熟悉。如果您还没有读过，那么您绝对应该读一下，以便理解我们正在做什么以及为什么这样做。\n\
  \n还记得我问过我们如何知道它是否成功了吗？好吧，我们现在就来找出答案。\n\n\n\n### 执行维护计划\n\n右键单击作业，然后选择 `从步骤启动作业…`\
  \ 来运行它。很可能，它会失败。我的就失败了！图 11-17 显示了这个失败。\n\n![A396023_1_En_11_Fig17_HTML.jpg](img/A396023_1_En_11_Fig17_HTML.jpg)\n\
  \n图 11-17. 启动作业\n\n是时候进行一些故障排除了。单击此框右侧的超链接，您将看到图 11-18 所示的内容。\n\n![A396023_1_En_11_Fig18_HTML.jpg](img/A396023_1_En_11_Fig18_HTML.jpg)\n\
  \n图 11-18. 启动作业错误\n\n哇。谢谢，微软。这除了告诉我们去阅读历史日志外，没有任何有用的信息。好吧，那我们就去读一下。关闭显示失败的窗口，右键单击作业，然后选择\
  \ `查看历史记录`。这将打开图 11-19 所示的界面。\n\n![A396023_1_En_11_Fig19_HTML.jpg](img/A396023_1_En_11_Fig19_HTML.jpg)\n\
  \n图 11-19. 日志文件查看器\n\n有趣。展开此错误信息会显示“**无效的对象名 'users'**”。嗯。关闭此窗口并打开 `T-SQL 计划`，如图\
  \ 11-20 所示。双击 `运行一些 SQL` 任务，同样如图 11-20 所示。\n\n![A396023_1_En_11_Fig20_HTML.jpg](img/A396023_1_En_11_Fig20_HTML.jpg)\n\
  \n图 11-20. T-SQL 计划\n\n既然错误明确指出 'users' 是一个无效的名称，那么让我们将查询修改为以下包含一个完全有效名称的形式：\n\n\
  ```sql\nSELECT firstname + ' ' + lastname FROM DEVTEST.dbo.users ORDER BY userid;\n\
  ```\n\n完成后单击 `确定`，然后保存维护计划。继续并右键单击 `T-SQL 任务` 作业，选择 `从步骤启动作业…` 来启动它。成功了吗？对我来说确实成功了。这是一个很好的教训，说明\
  \ `SQL Server 代理` 默认查看的是 `master` 数据库，而不是我们特定的数据库。\n\n如果您的查询仍然失败，我在此给您一个重要的建议。您可以指定想要执行\
  \ SQL 的账户，而不是使用 `SQL Server 代理`，尽管在 `作业属性` > `步骤` > `编辑` > `运行身份` 中无法选择其他选项。想知道怎么做吗？\n\
  \n回想一下我们最初的查询如下：\n\n```sql\nSELECT firstname + ' ' + lastname FROM users ORDER BY\
  \ userid;\n```\n\n然后我们将其更新为如下形式：\n\n```sql\nSELECT firstname + ' ' + lastname FROM\
  \ DEVTEST.dbo.users ORDER BY userid;\n```\n\n这就是我们查询的全部修改。但它仍然失败。所以此时，我们有一个选择：要么去找系统管理员，要求在服务器上为\
  \ `SQL Server 代理` 账户提升权限，要么为 `SQL Server 代理` 创建另一个域账户来运行（同样具有提升的权限）。不过，也许还有第三种选择？告诉我，您能否单独成功运行这个查询？可以。那么为什么您不能被设置为“运行身份”的值呢？哦，但您是可以的！\n\
  \n双击 `T-SQL 计划` 维护计划，然后双击图 11-21 灰色区域中显示的 `运行一些 SQL` 任务。\n\n![A396023_1_En_11_Fig21_HTML.jpg](img/A396023_1_En_11_Fig21_HTML.jpg)\n\
  \n图 11-21. 运行一些 SQL\n\n这将打开我们的 `T-SQL` 语句框，其中列出了之前的查询。我们将通过输入以下 SQL 稍微修改它。\n\n```sql\n\
  USE DEVTEST\nGO\nSELECT firstname + ' ' + lastname FROM users ORDER BY userid\n\
  EXEC AS LOGIN = '[DOMAIN]\\[USERNAME]';\n```\n\n看看第一部分……它本质上与我们之前定义 SQL 的方式相同，不是吗？没错。选择使用\
  \ `USE` 关键字或像之前那样在 SQL 中定义数据库，达到的是同一个目标。\n\n这里需要注意的一个重要点是，包仍然由 `SQL Server 代理` 执行。任务是在我的用户账户上下文中执行的。这说得通吗？\n\
  \n保存并关闭此维护计划。右键单击作业并选择 `从步骤启动作业…`，看看图 11-22 中会发生什么，只需将该 SQL 查询更改为包含我的登录名即可。\n\n\
  ![A396023_1_En_11_Fig22_HTML.jpg](img/A396023_1_En_11_Fig22_HTML.jpg)\n\n图 11-22.\
  \ 成功！\n\n我喜欢看到这个。\n\n## 总结\n\n我们来快速回顾一下……\n\n*   我们使用“另一种”方式（设计界面）设置了另一个计划。\n* \
  \  我们使用 `SQL Server 代理` 的 `作业属性` 编辑了该计划。\n*   我们发现了查询中可能的失败，因此重写了查询，现在它工作了。\n\n\
  您的 `作业` 文件夹现在应该如图 11-23 所示。\n\n![A396023_1_En_11_Fig23_HTML.jpg](img/A396023_1_En_11_Fig23_HTML.jpg)\n\
  \n图 11-23. SQL Server 代理作业\n\n您的 `维护计划` 文件夹现在应该如图 11-24 所示。\n\n![A396023_1_En_11_Fig24_HTML.jpg](img/A396023_1_En_11_Fig24_HTML.jpg)\n\
  \n图 11-24. 维护计划\n\n本章做得非常出色。请重读您不理解的部分，特别是关于如何使用您的用户账户而不是 `SQL Server 代理` 运行查询的那部分。接下来，我们将了解\
  \ `通知操作员任务`，然后为结束做准备。如果您已经走到这一步，做得太棒了！您即将拥有创建或维护自己的维护计划所需的工具和知识。\n\n## 12. 通知数据库操作员\n\
  \n`通知操作员任务` 的目的是专门设置一个通知任务。它可以用于计划中的任何事件；也就是说，这是本节的关键点。它也不必绑定到任何特定的任务。您可以设想仅拥有此任务，它将做的只是通知一个操作员。那可能有什么好处呢？如果这个任务不与其他任何东西绑定，一个简单的通知能做什么呢？让我们看看如何设置它，我将在过程中解释这个问题的答案。\n\
  \n\n\n### 设置维护计划\n\n右键单击 `维护计划` 并选择 `新建维护计划…` 以继续。输入 `通知操作员计划` 作为名称，如图 12-1 所示，然后单击\
  \ `确定`。\n\n![A396023_1_En_12_Fig1_HTML.jpg](img/A396023_1_En_12_Fig1_HTML.jpg)\n\
  *图 12-1. 新建维护计划*\n\n请确保此时 `工具箱` 已打开（`Ctrl+Alt+X`）。首先要做的就是更新该计划的默认选项，因此双击 `子计划` 名称（`Subplan_1`）并更新您的界面，如图\
  \ 12-2 所示。\n\n![A396023_1_En_12_Fig2_HTML.jpg](img/A396023_1_En_12_Fig2_HTML.jpg)\n\
  *图 12-2. 子计划属性*\n\n请注意，`计划` 框尚未设置。将其更改为 `每天 12:00 AM`，在 `计划` 页面上单击 `确定`，然后在返回到 `属性`\
  \ 窗口时再次单击 `确定`。这将引导我们进入更新后的界面，如图 12-3 所示。\n\n![A396023_1_En_12_Fig3_HTML.jpg](img/A396023_1_En_12_Fig3_HTML.jpg)\n\
  *图 12-3. “通知操作员计划”阶段*\n\n此时，我们已准备好添加 `通知操作员任务`，因此从工具栏单击并拖动 `通知操作员任务` 到该阶段中。\n\n\
  ### 配置任务并了解操作员要求\n\n您首先注意到的是那个大红叉。就像在第 11 章中一样，我们需要定义此任务的参数。双击 `通知操作员任务`。您将看到如图\
  \ 12-4 所示的内容。\n\n![A396023_1_En_12_Fig4_HTML.jpg](img/A396023_1_En_12_Fig4_HTML.jpg)\n\
  *图 12-4. 通知操作员任务*\n\n猜猜我们这里必须做什么？值得庆幸的是，Microsoft 让这相当容易确定。您可以看到 `本地服务器连接` 已经选中，所以没问题。在那下面，是系统上可用的操作员。\n\
  \n请注意，您在这里没有选项来创建新操作员或编辑当前操作员。我认为这是设计使然，因为它显示了添加新操作员和使用现有操作员流程之间的明显脱节。将这两个任务分开，迫使用户理解其决定的后果，并强化了维护计划内正确流程的理念。我认为\
  \ Microsoft 可能说过这样的话：“你不能添加一个不存在的操作员，对吧？因此，你必须首先添加一个操作员。而且别以为我们会让你用微软简化版的方式来做。你必须从\
  \ SSMS 中的操作员区域来添加。一旦你完成了，然后才能回到这里添加操作员。” 这样有道理吗？可以将其视为微软在某种程度上迫使用户有意识地决定遵循使用此特定任务的规定方法。\n\
  \n在流程的这一点上，您需要选择我们已经设置好的操作员。在其下方，您可以看到有 `主题` 和 `正文` 框。听起来像是一封电子邮件，不是吗？确实如此。否则我们为什么要使用已经设置好的操作员呢？当然，在操作员设置中，我们可以指定电子邮件、网络发送或寻呼机通知。如果我们没有为操作员指定电子邮件地址，但选择在这里通知他们，会发生什么？简短的回答是：不行。此任务专用于电子邮件地址。想要证据吗？\n\
  \n### 演示电子邮件要求\n\n让我们快速再设置两个操作员。取消当前打开的窗口，右键单击 `操作员`（在 `SQL Server Agent` 内；您可能需要单击屏幕底部的\
  \ `对象资源管理器` 来显示此项）并选择 `新建操作员…`。输入如图 12-5 所示的信息。我们称这个为 `网络发送操作员`，“`网络发送地址`”的格式为 `DOMAIN\\\
  username`。\n\n![A396023_1_En_12_Fig5_HTML.jpg](img/A396023_1_En_12_Fig5_HTML.jpg)\n\
  *图 12-5. 新建操作员*\n\n完成后单击 `确定`，打开另一个 `新建操作员…` 窗口，并输入如图 12-6 所示的信息。我们称这个为 `寻呼机操作员`，并选中所有天数。\n\
  \n![A396023_1_En_12_Fig6_HTML.jpg](img/A396023_1_En_12_Fig6_HTML.jpg)\n*图 12-6.\
  \ 新建操作员，常规选项卡*\n\n完成后单击 `确定`。此时，您应该有三个操作员，如图 12-7 所示。\n\n![A396023_1_En_12_Fig7_HTML.jpg](img/A396023_1_En_12_Fig7_HTML.jpg)\n\
  *图 12-7. 操作员*\n\n够简单吧。那么，使用 `通知操作员` 任务，让我们确定应该选择通知这些操作员中的哪一个。\n\n双击 `通知操作员任务`（它应该仍然在\
  \ SSMS 中打开着），并注意只有初始操作员被列出，如图 12-8 所示。\n\n![A396023_1_En_12_Fig8_HTML.jpg](img/A396023_1_En_12_Fig8_HTML.jpg)\n\
  *图 12-8. 通知操作员任务*\n\n嗯。这意味着在此上下文中，其他操作员都不是有效的操作员。想要更多证据吗？双击 `网络发送操作员` 或 `寻呼机操作员`，并注意电子邮件字段为空。我选择\
  \ `寻呼机操作员` 进行操作。将电子邮件地址复制并粘贴到 “`电子邮件名称`” 框中。您现在应该看到如图 12-9 所示的内容。\n\n![A396023_1_En_12_Fig9_HTML.jpg](img/A396023_1_En_12_Fig9_HTML.jpg)\n\
  *图 12-9. 寻呼机操作员属性*\n\n因此，现在我们为 `寻呼机操作员` 指定了一个电子邮件地址。单击 `确定`。返回到 `通知操作员任务` 并双击它。图\
  \ 12-10 显示了更新后的界面。\n\n![A396023_1_En_12_Fig10_HTML.jpg](img/A396023_1_En_12_Fig10_HTML.jpg)\n\
  *图 12-10. 通知操作员任务（已更新）*\n\n看看这个？`寻呼机操作员` 被添加进来了。\n\n因此，我们可以肯定地断言，一个操作员必须指定有电子邮件地址，才能被包含在\
  \ `通知操作员任务` 中并担任任何角色。\n\n现在，您可以通过右键单击并选择 `删除`，然后接受删除操作，来移除 `寻呼机操作员` 和 `网络发送操作员`。之后，您应该只剩下原始的操作员。\n\
  \n### 完成并测试任务\n\n继续完成任务！我们停留在界面的指定处，因此将其更新为如图 12-11 所示。\n\n![A396023_1_En_12_Fig11_HTML.jpg](img/A396023_1_En_12_Fig11_HTML.jpg)\n\
  *图 12-11. 通知操作员任务（已更新）*\n\n我们所做的只是添加了操作员并定义了一个通用的 `主题` 和 `正文`。此时单击 `确定`。\n\n请注意，我们的界面已更改，显示如图\
  \ 12-12 所示的信息。\n\n![A396023_1_En_12_Fig12_HTML.jpg](img/A396023_1_En_12_Fig12_HTML.jpg)\n\
  *图 12-12. 通知操作员任务*\n\n这表明我们正在使用 `本地服务器连接`，并且 `Bradley Beard` 是我们的操作员。\n\n到目前为止一切顺利。那么接下来是什么？我们需要测试它。我们可以等到午夜，按我们计划的时间触发它，或者我们可以现在就运行它。让我们现在运行。\n\
  \n首先，您需要保存目前的计划。保存后，`Notify Operator Plan.Email Operator` 作业会出现在 SSMS 中的 `SQL Server\
  \ Agent` ➤ `作业` 文件夹中，如图 12-13 所示。\n\n![A396023_1_En_12_Fig13_HTML.jpg](img/A396023_1_En_12_Fig13_HTML.jpg)\n\
  *图 12-13. SQL Server Agent 作业*\n\n还有其他作业，但我现在只想关注这一个。右键单击它并选择 `从步骤开始作业…`，然后观察发生了什么。图\
  \ 12-14 显示了预期的结果。\n\n![A396023_1_En_12_Fig14_HTML.jpg](img/A396023_1_En_12_Fig14_HTML.jpg)\n\
  *图 12-14. 成功！*\n\n成功！我喜欢这样。如果您收到了如图 12-15 所示的错误，请继续阅读。如果没有，请跳到本章末尾。\n\n![A396023_1_En_12_Fig15_HTML.jpg](img/A396023_1_En_12_Fig15_HTML.jpg)\n\
  *图 12-15. 或者失败了…*\n\n您说它失败了！？为什么它会失败呢？简而言之，它失败是因为我们尚未为该操作员设置配置文件。让我们现在来看看如何做。\n\n\
  \n\n### 创建操作员配置文件\n\n我们需要为作业创建一个操作员配置文件才能使其运行。双击 `Database Mail`，然后点击“管理配置文件安全性”单选按钮，如图\
  \ 12-16 所示的界面。\n\n![A396023_1_En_12_Fig16_HTML.jpg](img/A396023_1_En_12_Fig16_HTML.jpg)\n\
  \n图 12-16. 选择配置任务\n\n点击 `Next` 继续。\n\n您将看到一个窗口，其顶部有 `公共配置文件` 和 `专用配置文件` 两个选项卡。默认显示的是\
  \ `公共配置文件`，如图 12-17 所示的界面。\n\n![A396023_1_En_12_Fig17_HTML.jpg](img/A396023_1_En_12_Fig17_HTML.jpg)\n\
  \n图 12-17. 管理配置文件安全性\n\n此时，勾选 `公共` 复选框，并将 `默认配置文件` 选项更改为 `是`。您的界面应如图 12-18 所示。\n\
  \n![A396023_1_En_12_Fig18_HTML.jpg](img/A396023_1_En_12_Fig18_HTML.jpg)\n\n图 12-18.\
  \ 管理配置文件安全性（已更新）\n\n点击 `Next` 继续，然后点击 `Finish` 完成设置。您应该会收到一条 `成功` 消息，如图 12-19 所示。关闭窗口，再次右键单击该作业，选择\
  \ `从步骤开始作业…` 以查看接下来会发生什么。\n\n![A396023_1_En_12_Fig19_HTML.jpg](img/A396023_1_En_12_Fig19_HTML.jpg)\n\
  \n图 12-19. 成功！（再次）\n\n现在检查您的收件箱。嘿，看那个！挺不错的吧？\n\n继续将作业重命名为 `通知操作员`，并按照我们在前几章中的方式更新它。此时，您应该拥有如图\
  \ 12-20 所示的所有作业。\n\n![A396023_1_En_12_Fig20_HTML.jpg](img/A396023_1_En_12_Fig20_HTML.jpg)\n\
  \n图 12-20. SQL Server Agent 作业\n\n您的 `维护计划` 文件夹应如图 12-21 所示。\n\n![A396023_1_En_12_Fig21_HTML.jpg](img/A396023_1_En_12_Fig21_HTML.jpg)\n\
  \n图 12-21. 维护计划\n\n## 总结\n\n让我们快速回顾一下本章内容。\n\n*   我们学习了 `通知操作员任务`。\n*   我们了解到，操作员必须有一个电子邮件地址才能使用\
  \ `通知操作员任务` 进行通知。\n*   我们了解到，`Database Mail` 配置文件安全性需要启用才能正常工作。\n*   我们通过收到一封电子邮件确认了我们的设置。\n\
  \n到目前为止做得非常好。真的，如果您能一次就走到这一步，那真是做得太棒了；如果您能一口气读到这里，那就更了不起了。继续前进，我们最终将通过创建自定义维护计划来圆满结束这一切。\n\
  \n## 13. 整合所有内容\n\n至此，我们已经完成了创建每项任务的维护计划所需的所有具体任务。我们遵循了实践示例，引导我们走向本书的高潮，即让您——用户——创建属于您自己的维护计划。从现在开始，我们将从理论转向应用；我们将应用所学知识。\n\
  \n### 检查您的环境\n\n如果您一直跟着操作，您的收件箱里可能已经收到了不少测试邮件。请删除它们，因为您不再需要它们了。\n\n图 13-1 显示了 `SQL\
  \ Server Agent` 中列出的作业。\n\n![A396023_1_En_13_Fig1_HTML.jpg](img/A396023_1_En_13_Fig1_HTML.jpg)\n\
  \n图 13-1. SQL Server Agent 作业\n\n此外，我们应该拥有如图 13-2 所示的以下可用维护计划。\n\n![A396023_1_En_13_Fig2_HTML.jpg](img/A396023_1_En_13_Fig2_HTML.jpg)\n\
  \n图 13-2. 维护计划\n\n现在，这里重要的是，在很大程度上，我们已经完成了。没错！理论上，您可以将计划保持原样，就算大功告成。然而，关于维护计划有一些重要的考虑因素必须纳入，其中最重要的是要记住，某些任务需要在其他任务之前运行，而有些任务可能不需要每小时甚至每天运行。下一节将重点讨论哪些任务实际需要运行、何时运行以及运行的顺序。\n\
  \n### 维护任务的顺序\n\n没错；维护任务有一个优先顺序。为什么？先备份数据库，然后再重建索引，这没有多大意义，对吧？任务必须有一个顺序，所以让我们围绕要运行的主要任务——备份数据库——来看看它们的顺序。\n\
  \n可以这样想。您不希望备份错误的数据，但同时您也希望提供一个长期有效的备份机制。为了实现这一点，您希望提前完成基础工作，即处理数据完整性的任务。备份之后，您需要进行清理。\n\
  \n查看图 13-3。理想情况下，这就是我构建新维护计划的方式。\n\n![A396023_1_En_13_Fig3_HTML.jpg](img/A396023_1_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3. 维护计划结构\n\n进一步总结，可以这样理解。\n\n*   **备份前阶段** 由所有需要在数据库备份之前完成的事项组成。\n*   **备份阶段**\
  \ 是实际运行以备份数据的部分。\n*   **备份后阶段** 由备份完成后需要处理的事项组成。\n\n明白了吗？我们在备份前、备份中和备份后运行任务。结果是得到一个新鲜、干净的数据库备份，以及得到适当维护的任务和日志。\n\
  \n所以现在我们知道了需要按什么顺序运行任务。接下来，我们需要决定我们希望这个计划有多健壮。我们可以根据安全计划的需要，决定做多或做少。请记住，作为一名 `DBA`，您必须遵循有关数据保留和可用性的指导原则。您可能面临与我不同的要求，因此最好记住将本指南作为在您自身安全原则范围内创建数据库维护计划的参考。\n\
  \n\n\n## 确定维护计划的复杂度\n\n正如我刚才所说，这件事可简可繁，完全取决于你的意愿。我倾向于尽可能保持简单，因此在这里，我也不会偏离这个逻辑太远。\n\
  \n数据库成熟度主要有四个阶段，如图 13-4 所示。\n\n![A396023_1_En_13_Fig4_HTML.jpg](img/A396023_1_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4. 数据库成熟度阶段\n\n**提示**\n\n数据库成熟度指的是一个新数据库从创建开始，直到被投入生产环境以处理交易、满足业务需求的发展过程。\n\
  \n无论你是创建一个仅用于存储用户和会话信息的数据库，还是一个每秒记录数十亿笔交易的数据库，你总是从一个全新的、干净的数据库开始。因此，这个数据库必须经历成熟过程，才能准备好按其预期用途被使用。它成熟的唯一途径是经历一系列流程，以确保其将满足应用程序乃至最终用户的需求。这些流程的一部分将包括需要对数据库执行哪些维护工作以及以何种频率执行。\n\
  \n这里有趣的部分是，理想情况下，数据库规划只应在阶段 1 进行。显然，这并不总是现实的，因为应用程序或数据库的需求可能会发生变化。在这种情况下，阶段 1 将重新开始。明白这是怎么运作的吗？任何时候进行新的开发，都必须从阶段\
  \ 1 走到阶段 4，不能跳过任何步骤。这是确保系统绝对完整性和凝聚力的唯一方法。换句话说，当开发新功能时，它需要先在阶段 1 进行规划（如图 13-4 所示），然后通过工作流程推进，直至上线。\n\
  \n这对于你的需求来说可能有点过于复杂了。这是我在工作中处理事情的方式，所以我也习惯了这样做。你可能会找到另一种更适合你需求的处理方式，这完全可以。不过目前，我们将使用这种方法进行工作。\n\
  \n这并不意味着我们要创建四个不同的数据库或类似的东西。相反，我们将创建一个维护计划，然后我会向你展示如何将该维护计划背后的逻辑（即你从本书中学到的东西）移植到其他数据库中。\n\
  \n### 规划维护计划\n\n规划计划？听起来像个计划。只要有可能，一定要提前规划。说真的。是的，这一段有很多头韵，但这个概念大多时候能为你省去不少麻烦。务必谨慎行事，尤其是在处理数据库时。这里有一条处理数据库的**首要准则**：如有疑问，先做备份。只需要发生一次你不小心搞砸了某件事却没有备份的情况。这很可能就足以让你成为尽可能频繁备份的坚定信徒。\n\
  \n**提示**\n\n如有疑问，务必先做备份！\n\n那么，你如何规划一个计划呢？你需要确定需要哪些步骤，然后规划如何实施它们。让我们看两个不同的场景，并从中确定实施维护计划的最佳方式。\n\
  \n在第一个场景中，假设你有一个小型数据库，一次处理的数据量不大。这可能适用于像家庭数据库这样的情况，用于记录孩子的家务或 CD 收藏。\n\n在第二个场景中，假设你是一家中型或大型公司的\
  \ DBA，负责运行他们每小时处理相当大量交易的数据库。\n\n#### 场景 1\n\n第一个场景将针对一个不处理大量数据的小型数据库。由于这不是一个很大的数据库，而且可能并非任务关键型（意味着它可以快速轻松地恢复，并且在其缺失时不会影响任务的任何部分），那么我们可以将一些任务交给数据库引擎来运行。当遇到那三个神奇的\
  \ DML 语句时，`SQL Server` 会自动运行哪些任务？`重新生成索引`、`重新组织索引`和`更新统计信息`。在这个场景中，我们可以省略这些任务，因为我们实际上只是在重复\
  \ `SQL Server` 已经做过的事情。因此，场景 1 的维护计划可能如图 13-5 所示。\n\n![A396023_1_En_13_Fig5_HTML.jpg](img/A396023_1_En_13_Fig5_HTML.jpg)\n\
  \n图 13-5. 场景 1 结构\n\n这样是不是更精简了？记住，我们不一定需要运行所有可用的任务。我们可以不去管 `SQL Server` 本来就会执行的一些内部处理，只关注数据的完整性。我会称此为“仅含绝对必要任务的、最低限度”的维护计划。我认为这个场景可能并不适合很多企业，如果适合，很可能是因为\
  \ DBA 要么不理解维护计划，要么不愿意花时间学习。幸好你不是那样的 DBA；仅仅通过阅读本书，你就在采取积极的步骤来提升自己的知识。在实践时，你从本书中学到的工具无疑将帮助你实现更好的数据可用性和完整性。\n\
  \n正如我之前所说，这可能是家庭数据库或非关键重要数据库的最佳场景。如果你的业务运营依赖于数据，那么我认为这不会是你想要选择的场景。\n\n相反，你会想要一个更强大的方案；一个能够执行\
  \ `SQL Server` 自动执行的任务，但作为维护计划的一部分执行时，能够执行得更彻底，而不仅仅是顺带一做的方案。还记得 `SQL Server` 如何在大多数查询后执行索引重组和更新数据库统计信息吗？这在这里很重要，因为我们是在手动告诉\
  \ `SQL Server`，在维护计划成功运行后，确保这些操作已准备好迎接下一批数据交互。\n\n\n### 场景二\n\n这个场景稍微复杂一些，但更接近我惯用的方式。对于此场景，你需要记住，我们不会像场景一那样走快速但粗糙的路径。这个过程实际上更接近我们即将构建的完整维护计划；它看起来如图\
  \ 13-6 所示。\n\n![A396023_1_En_13_Fig6_HTML.jpg](img/A396023_1_En_13_Fig6_HTML.jpg)\n\
  \n图 13-6. 场景二结构\n\n看起来很眼熟？应该是的。这和之前的图是同一张。这清楚地暗示我们需要完成所有这些步骤。请记住，虽然我们已经定义了要运行哪些任务，但我们还需要知道何时运行它们。\n\
  \n请注意，在这两种情况下，我都保留了完整的备份计划不变。这是因为，即使你的数据库可能较小，但其中的数据对你的业务或最终用户来说同样重要。没有这些数据，你将丢掉工作。因此，无论数据库大小如何，数据库备份的概念都将保持不变。\n\
  \n我一直听到的规则是：维护工作需要在客户不使用数据库时进行。如果你的数据库是 7×24 小时使用的，那么你只需确定数据库使用最少的时间段，或者设置计划在 CPU\
  \ 空闲时触发。请记住，`SQL Server` 为你提供了许多调度选项，对于你能想到的几乎任何调度问题，都会有解决方案。对于这个计划，我们将在每晚午夜触发。我们还将让不同的任务在不同的时间间隔运行，所有这些我很快会演示。\n\
  \n调度维护计划的另一个重要部分是，你始终可以为任务设置优先约束，我们稍后会深入讨论。这些简直是救星！它们的作用是，当你有一系列任务形成一个任务链时，你希望它们按特定顺序执行。你还可以设置任务失败、成功或完成时发生的情况。可以想象，我们将在这些步骤中设置报告和日志记录，以便我们了解任何可能影响最终用户的问题。\n\
  \n让我们快速看一些有趣的东西。在 `SQL Server 代理`中双击任何一个作业。我选择了 `bak Files`，但你可以选择任何一个。现在你应该看到图\
  \ 13-7。\n\n![A396023_1_En_13_Fig7_HTML.jpg](img/A396023_1_En_13_Fig7_HTML.jpg)\n\
  \n图 13-7. 作业属性\n\n和以前一样，这有什么大不了的？点击左侧的 **步骤** 选项，并在作业步骤列表字段中展开列，如图 13-8 所示。注意到这里有什么特别之处吗？\n\
  \n![A396023_1_En_13_Fig8_HTML.jpg](img/A396023_1_En_13_Fig8_HTML.jpg)\n\n图 13-8.\
  \ 作业属性，步骤选项卡\n\n没错；这是一个 `SQL Server 集成服务` 包。我在开篇章节中简要提到过这一点。它就是这样保存在数据库中的，而我们甚至没有意识到。这开启了与数据库交互的一个全新层面，因为既然我们现在有了一个\
  \ `SSIS` 包，我们就可以把它们全部组合在一起，形成一个巨大的包。\n\n在继续之前，我想补充一个告诫：此时你应该拥有详尽而完整的作业。我说的完整是什么意思？请仔细检查所有作业内的所有对象是否都填写了描述和名称，具体包括：\n\
  \n*   **常规** 选项卡：**描述** 框。\n*   **步骤** 选项卡，**常规** 子选项卡：**名称** 框（点击 **编辑** 并更改“步骤名称”值）。\n\
  *   **步骤** 选项卡，**高级** 子选项卡：应选中“在历史记录中包括步骤输出”。\n*   **计划** 选项卡：我们将在几分钟后删除这些，所以现在可以保留。\n\
  *   **警报** 选项卡：应为空白。\n*   **通知** 选项卡：应选中 **写入 Windows 应用程序事件日志**，并选择“当作业完成时”。\n\
  *   **目标** 选项卡：应保持空白。\n\n不应为单个任务选择通知；相反，我们将让子计划负责报告和日志记录。电子邮件是此功能的一部分，你很快就会看到。\n\
  \n猜猜我们接下来要做什么？\n\n### 创建维护计划\n\n终于到了！这是我们整本书一直在努力的目标。我们将创建一个包，作为我们从现在开始用于维护数据库的维护计划的实现。\n\
  \n谁认为我们会使用 `维护计划向导` 来创建这个维护计划的，请举手……？猜猜怎么着？我们不能将 `维护计划向罗` 用于此任务，因为向导专门用于创建新任务，而不是将它们组合成一个包。我们可以创建任意多的独立作业，但除非我们将它们全部放入一个包中并按不同的计划运行，否则它们永远不会协同工作。此外，让它们单独运行，而不是作为集成解决方案的一部分，无法让我们强制执行之前看到的优先约束；相反，我们只会按计划运行一个任务，并不关心或不知道它是否实际有效。\n\
  \n我们不会采用那种方法，而是将致力于实现健壮维护计划的定义；一个满足我们所有维护需求的一站式解决方案。这将需要对各个计划进行更多的调整，我们现在就来看一看。\n\
  \n### 编辑作业\n\n鉴于这些是 `SSIS` 包，我们首先需要做的是规划包的部署。这是什么意思？这意味着每个包将作为更大包的一部分运行，内置优先约束和报告/日志记录功能，我们需要确保在将其发布到开发环境之前，所有这些都\
  \ 100% 设置好。我们在将任何东西发布到生产环境之前都会进行大量测试，对吧？现在让我们看看各个作业，并根据我们的需要对它们进行调整。\n\n回想一下，我们的作业列表如图\
  \ 13-9 所示。\n\n![A396023_1_En_13_Fig9_HTML.jpg](img/A396023_1_En_13_Fig9_HTML.jpg)\n\
  \n图 13-9. `SQL Server 代理` 作业\n\n又是相当多的作业！这些作业中的每一个稍后都将成为包的一部分。不过现在，我们要编辑它们；所以从顶部开始，按照建议进行更改。\n\
  \n### 完成作业编辑\n\n双击一个作业以显示 **常规** 页面。然后按照以下部分描述的步骤逐一进行，确保按说明进行更改。\n\n#### 常规页面设置\n\
  \n**常规** 页面包含作业的所有“高级”设置。我的意思是，更抽象的属性在后续页面中进一步划分，但整个作业的通用设置都在这里。\n\n*   **所有者**\
  \ 字段应设置为数据库的所有者。\n*   **类别** 应设置为 `数据库维护`。\n*   输入一个简短的描述。\n*   确保选中 **已启用** 复选框。\n\
  \n#### 步骤页面设置\n\n点击屏幕底部的 **编辑** 按钮，在 **常规** 子选项卡上将 **步骤名称** 更改为任务名称（清理历史记录、文本文件、T-SQL\
  \ 任务——作业名称，不是计划名称）。请注意，这个屏幕是新的且不同的，因为它严格涉及用于运行 `SSIS` 包的设置。目前还不需要在这里更改任何内容，所以先不用动这个区域。\n\
  \n点击左侧的 **高级**。这是我们定义包成功和失败操作的地方。单个包不需要输出文件，因为我们将在维护计划包级别而不是这个级别进行处理。确保选中“在历史记录中包括步骤输出”复选框。\n\
  \n准备好继续后，点击 **确定**。\n\n\n#### 计划页面设置\n\n通过点击屏幕底部的 **Remove** 按钮来删除计划。\n执行此步骤时，你会看到如图\
  \ 13-10 所示的错误。\n\n![A396023_1_En_13_Fig10_HTML.jpg](img/A396023_1_En_13_Fig10_HTML.jpg)\n\
  图 13-10. 计划错误\n\n这是预期中的情况。以下是我们将如何为未来的计划删除操作处理此问题。点击错误消息上的 **OK**，然后点击 **OK** 关闭作业界面。\n\
  首先，让我们通过运行以下查询来查看可用的计划。\n\n```sql\nSELECT * FROM msdb.dbo.sysschedules;\n```\n\n\
  图 13-10 中的错误引用了`sysmaintplan_subplans.schedule_id`列，所以简单的答案是使用以下查询将这些值设置为`NULL`。\n\
  \n```sql\nUPDATE msdb.dbo.sysmaintplan_subplans SET schedule_id = NULL;\n```\n\n\
  关于这点就这些了。现在，当你去删除一个计划时，你将不会得到错误，因为所有的计划都已被移除。不过，它们仍然驻留在界面中。真烦人。\n\n#### `sysjobschedules`\
  \ 表\n\n`msdb`数据库保存了大量关于我们作业的信息，包括分配给这些作业的计划。具体来说，我们要引用的表名为`sysjobschedules`。我们将编写一个查询来显示此表中的信息，以便我们可以在作业的上下文中查看计划及其工作原理。\n\
  这是我们用来查看该表内容的查询；请在一个新的查询窗口中运行它。\n\n```sql\nSELECT * FROM msdb.dbo.sysjobschedules\
  \ ORDER BY schedule_id;\n```\n\n该查询将返回如图 13-11 所示的信息。\n\n![A396023_1_En_13_Fig11_HTML.jpg](img/A396023_1_En_13_Fig11_HTML.jpg)\n\
  图 13-11. 查询结果\n\n让我们对`sysjobschedules`和`sysjobs`表使用一点`INNER JOIN`技巧来展示正在发生的事情。为澄清起见，`sysjobschedules`保存了从`sysjobs`表引用的作业的调度信息。我们想要做的是显示`sysjobs`表中的`job_id`和`name`列，以及`sysjobschedules`表中的`schedule_id`列。以下是完整的查询。\n\
  \n```sql\nSELECT msdb.dbo.sysjobs.job_id, msdb.dbo.sysjobs.name, sysjobschedules.schedule_id\n\
  FROM msdb.dbo.sysjobs\nINNER JOIN msdb.dbo.sysjobschedules ON\nsysjobschedules.job_id\
  \ = msdb.dbo.sysjobs.job_id\nORDER BY msdb.dbo.sysjobs.name;\n```\n\n运行此查询。你将看到如图\
  \ 13-12 所示的结果。\n\n![A396023_1_En_13_Fig12_HTML.jpg](img/A396023_1_En_13_Fig12_HTML.jpg)\n\
  图 13-12. 查询结果\n\n这样好多了！这为我们显示了剩下的可供删除的计划。让我们继续手动删除第一个计划“bak Files”，然后重新运行查询。图 13-13\
  \ 显示了此查询的结果。\n\n![A396023_1_En_13_Fig13_HTML.jpg](img/A396023_1_En_13_Fig13_HTML.jpg)\n\
  图 13-13. 查询结果\n\n正如我们所想；它消失了！这说明了什么？它意味着这个表专门存储了作业的计划，因此得名`sysjobschedules`。它也告诉我们，我们现在可以清空`sysjobschedules`表的内容，这将移除我们所有的计划。\n\
  让我们快速看一下图 13-14 中`sysjobschedules`表的结构。\n\n![A396023_1_En_13_Fig14_HTML.jpg](img/A396023_1_En_13_Fig14_HTML.jpg)\n\
  图 13-14. sysjobsschedules 结构\n\n这些列中没有`IDENTITY`列，但我们可以看到那些阻止我们早先删除计划的外部约束（由 SSMS\
  \ 生成的错误）。由于没有`IDENTITY`列需要担心，我建议我们使用`DELETE FROM`来清除此表。\n这实际上引出了一个好点子。在从表中清除数据时，`TRUNCATE`和`DELETE\
  \ FROM`有什么区别？基本上，当你使用`TRUNCATE`时，数据库引擎不处理整个事务日志，它只是清除表和页。`TRUNCATE`操作如果是事务的一部分，可以回滚。如果不是，除非从备份恢复，否则你无法取回该数据。`TRUNCATE`也会锁定表，因此不要在频繁使用的表上使用它。另一方面，`DELETE\
  \ FROM`只是删除指定的信息并将其记录在事务日志中。`DELETE FROM`也不会“重启”一个表；如果你有一个带有`IDENTITY`列的表并使用`DELETE\
  \ FROM`命令删除表中的所有内容，下一个插入表中的`IDENTITY`值将是下一个值——即使表中没有直接引用。这意味着如果你表中有 15 行数据；然后对该表运行`DELETE\
  \ FROM`；然后插入一行新数据；`IDENTITY`列的值将是 16 而不是 1。`TRUNCATE`会“重启”该表，所以当你有 15 行数据然后`TRUNCATE`该表时，插入新行数据时`IDENTITY`列从\
  \ 1 重新开始。这有很大的区别！\n这并不是说你不能运行`DELETE FROM`命令并在下一行到来时将编号重置为 1。为此，在运行`DELETE FROM`语句后运行以下查询。\n\
  \n```sql\nDBCC CHECKIDENT('[table_name].[column_name]', RESEED, 0);\n```\n\n此查询强制表将列重新设置为定义为`IDENTITY`限定符的值，在本例中为`0`。\n\
  因此，无论是在理论上还是在实践中，你都可以运行一个`DELETE FROM`语句，然后是前面的`DBCC`语句，以达到与`TRUNCATE`语句相同的结果（清除表并重置表中`IDENTITY`列的编号），不同之处在于我们能够将`DELETE\
  \ FROM`和`DBCC`语句作为事务日志的一部分。\n好的，让我们继续通过运行以下查询来删除`sysjobschedules`表的内容，但保留`syspolicy_purge_history`记录。从我们之前运行的`INNER\
  \ JOIN`查询中获取作业 ID，并将其插入以下查询中运行。\n\n```sql\nDELETE FROM msdb.dbo.sysjobschedules\
  \ WHERE job_id = 'F74BC679-83F7-4F20-B816-9E12A630EAF1';\n```\n\n这就是你需要做的全部。记住，没有`IDENTITY`列需要担心重新设置种子，所以该命令将完成我们对此表所需的一切：清除计划。如果你打开列表中的下一个作业“Cleanup\
  \ History”，注意“计划”选项卡中明显缺少计划。打开任何一个检查一下；它们都消失了。干得好！\n\n#### 警报页面设置\n\n此页面应为空白。没关系，因为我们将从包中处理日志记录和报告，而不是从单个任务处理。\n\
  \n#### 通知页面设置\n\n这是我们之前设置通知的地方。不过，现在应该像上面的“计划”部分一样被清空。我们不需要发送电子邮件，但我建议保留选中的 **Write\
  \ to the Windows Application event log** 选项，并使用 **“When the job completes”** 值。这样，每当作业完成（无论是\
  \ **On Success** 还是 **On Failure**），它都会被输入到事件日志中。\n\n#### 目标页面设置\n\n此页面默认为空白。保持空白。\n\
  \n\n\n### 保存更改\n\n点击“确定”以保存您所做的所有更改，这样就完成了作业的最终确定。为每个作业重复最终确定过程，除了名为 `E-mail User\
  \ Information` 的作业。让那个作业保持原样。\n\n我们不打算处理标题为 `E-mail User Information` 的作业，因为它专门用于展示\
  \ `SQL Server Agent` 作业任务的工作方式。为了防止此作业触发，只需右键单击它并选择 `禁用` 来禁用该任务。禁用后，您应该会看到如图 13-15\
  \ 所示的界面。\n\n![A396023_1_En_13_Fig15_HTML.jpg](img/A396023_1_En_13_Fig15_HTML.jpg)\n\
  **图 13-15.** 禁用作业\n\n另请注意，该作业现在在 `作业` 文件夹中有一个红色的向下小箭头，如图 13-16 所示。\n\n![A396023_1_En_13_Fig16_HTML.jpg](img/A396023_1_En_13_Fig16_HTML.jpg)\n\
  **图 13-16.** 显示已禁用作业的 `SQL Server Agent`\n\n此图标可一目了然地显示该作业已禁用。\n\n## 检查您的计划需求\n\n\
  我们已经配置了要添加到维护计划中的任务。让我们回顾一下维护计划的计划需求应该是什么样子（参见图 13-17）。请记住，我们也遵循方案 2，即我们将使用尽可能多的维护任务来对数据库进行适当的维护。\n\
  \n![A396023_1_En_13_Fig17_HTML.jpg](img/A396023_1_En_13_Fig17_HTML.jpg)\n**图 13-17.**\
  \ 方案 2 结构\n\n正如您所见，我将两个 `索引` 任务都保留在里面了。还记得我之前说过在一个计划中不需要两者吗？我将在不同的时间运行它们；这就是为什么它们都像那样放在里面。\n\
  \n### 将任务添加到计划中\n\n准备好开始组装您的计划了吗？我们开始吧！\n\n展开 `维护计划` 文件夹并查找 `备份维护计划`。双击它，您应该会看到如图\
  \ 13-18 所示的界面。\n\n![A396023_1_En_13_Fig18_HTML.jpg](img/A396023_1_En_13_Fig18_HTML.jpg)\n\
  **图 13-18.** `备份维护计划` 设计面\n\n遗憾的是，`子计划` 名称不会保留，而且由于我们删除了计划，我们需要快速更新这些信息。双击 `子计划`\
  \ 名称以更新信息，并注意当您单击不同的 `子计划` 时设计面如何变化。这有助于您为它们适当地命名；`Subplan_1` 是 `备份数据库（完整）`，`Subplan_2`\
  \ 是 `备份数据库（差异）`，`Subplan_3` 是 `备份数据库（事务日志）`。使用界面更新它们，然后输入计划。\n\n还记得我们为备份设置的计划吗？完整备份在午夜进行，差异备份每\
  \ 6 小时一次，事务日志备份每小时一次。将这三个任务的计划设置为这些值。您最终应该会看到如图 13-19 所示的界面。\n\n![A396023_1_En_13_Fig19_HTML.jpg](img/A396023_1_En_13_Fig19_HTML.jpg)\n\
  **图 13-19.** `备份维护计划` 计划\n\n请注意，计划现已设置好，`子计划` 名称已更新，并且它们都设置为以 `SQL Server Agent`\
  \ 服务帐户运行。\n\n我们现在要做的是将剩余的任务添加到此维护计划中。可以很有把握地说，我们将坚持使用图 13-19 中所示的三个备份计划作为我们备份的标准，并且我们所有的维护活动都将在那三个时间窗口内完成。并非所有维护任务，而是一些在不同时间出于不同原因执行的任务。因此，我们将把所需的任务添加到三个备份任务中的每一个，并强制执行优先级约束。\n\
  \n另外，当您保存 `备份维护计划` 时，作业名称会被更新。这太不方便了！我们稍后可以再次更新这些。\n\n#### 完整备份维护活动\n\n我们希望在午夜的完整备份中运行哪些任务？老实说，大部分都要运行。对于大多数安装来说，午夜可能是运行维护活动的好时机，因为用户在线的可能性微乎其微。\n\
  \n具体来说，我们希望按以下顺序运行以下作业：\n\n*   `检查完整性`\n*   `重建索引`\n*   `收缩数据库`\n*   `更新统计信息`\n\
  *   `备份维护计划.备份数据库（完整）`\n*   `清理历史记录`\n*   `bak` 文件\n*   `txt` 文件\n*   `trn` 文件\n\
  \n这些任务将在每晚午夜运行。将它们添加到现有的备份计划中在此时是微不足道的，因为它们已经创建好了。怎么做？`SQL Server` 为我们提供了在不同环境中做事的许多不同方法。在这种情况下，我们将把已经创建的作业添加到现有的\
  \ `备份维护计划` 中，并继续操作。这意味着几件事，所以在继续之前让我们快速回顾一下。\n\n*   不要删除“旧”的维护计划。原始作业（将被添加到 `备份维护计划`\
  \ 中）仍然链接到那些原始的维护计划。\n*   不要删除作业。\n\n换句话说，仅仅因为我们正在将作业添加到维护计划中，您不应该假设对原始计划的引用就不存在了。只要它的结构如我们所设，引用就会保留。稍后，我们将导出完成的计划并回顾如何恢复它们。然后您将确切看到这些引用如何协同工作以创建您现在所知的维护计划。\n\
  \n#### 添加检查完整性任务\n\n单击如图 13-19 所示的 `备份数据库（完整）` 子计划。这将显示设计面上的 `备份数据库（完整）` 任务，也如图\
  \ 13-18 所示。现在，从工具栏中单击并拖动 `执行 SQL Server Agent 作业` 到设计面上。此时，您应该会看到如图 13-20 所示的界面。\n\
