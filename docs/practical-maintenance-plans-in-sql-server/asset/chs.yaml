  **新建作业…**。在 **常规** 选项卡上首先要注意的是，**所有者** 框不一定显示你登录的用户名，而通常是你的 Windows 账户名（如果你使用的是
  Windows 身份验证，通常就是你的姓和名）。你需要将其更改为你的实际 Windows 用户名，如图 4-18 所示，该用户很可能也是数据库的所有者。


