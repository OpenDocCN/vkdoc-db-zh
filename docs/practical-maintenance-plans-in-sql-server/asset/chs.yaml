  绝对理想的备份设置


  完整备份启动备份集，第一个差异备份由事务日志备份支持。这些备份又会为差异备份提供支持，而差异备份则放置在完整备份之上。图 2-6 中需要注意的重要一点是，它没有时间限制。完全由你决定所有三种备份类型的时间间隔。例如，假设你希望每
  10 分钟进行一次事务日志备份来支持每 30 分钟进行一次的差异备份，而差异备份源自每晚进行的完整备份。图 2-6 所示的图像是量化这一点的好方法，因为从图形上看，你只需要添加更多的绿色和黄色条（老实说，需要很多条）。


  这为我们理解备份工作原理奠定了良好的基础。希望你能看到在紧急情况下正确备份数据的好处。


