- '# 6. 清理维护文件


  与第 5 章内容非常相似的是维护清理任务。历史记录和维护任务本可以联系在一起，但我可以理解为什么它们是分开的。


  ### 历史记录与维护的分离


  为什么历史记录和维护的清理任务是分开的？让我们看看这两个任务之间的区别。图 6-1 强调了需要注意的一些关键差异。


  ![A396023_1_En_6_Fig1_HTML.jpg](img/A396023_1_En_6_Fig1_HTML.jpg)

  图 6-1：维护清理任务与历史记录清理任务之间的差异


  这些差异用外行话来说意味着什么？以下是您需要了解的：


  *   `Maintenance Cleanup Task` 清理执行维护计划后留下的物理文件。当您查看记录维护计划步骤的文件系统时，可能会看到相当多的文件。当运行
  `Maintenance Cleanup Task` 时（取决于指定的时间段），这些文件将被删除。

  *   `Maintenance Cleanup` 任务清理文件系统中的 `.bak` 和 `.trn` 文件，但您需要为每种文件类型设置两个单独的维护计划，因为我们的文件系统像我这样设置（意味着我们将
  `.bak` 文件物理上与 `.trn` 文件分开存储）。

  *   `History Cleanup Task` 清理任务本身的历史记录，而不是物理文件。当您右键单击一个作业并选择“查看历史记录”时，该历史记录会在运行
  `History Cleanup Task` 时（取决于指定的时间段）消失，因为这些行已从 `msdb` 数据库中删除。


  现在我们了解了两种清理任务之间的区别，让我们看看如何设置 `Maintenance Cleanup Task`。




  ### 设置维护计划


  请记住，我们需要为此创建三个独立的任务：一个用于`.bak`文件，一个用于`.trn`文件，一个用于`.txt`文件。为什么？因为`SQL Server`要求你选择一个文件扩展名来查找并删除超出特定保留期限的文件，而数据库备份（`.bak`）和事务日志备份（`.trn`）在物理和逻辑上都是不同的。


  我们将这些计划分别命名为`备份清理`、`日志清理`和`文本文件清理`。这样命名清晰明了，方便我们轻松区分各项任务。


  我们将首先设置`备份清理`，然后是`日志清理`，最后是`文本文件清理`。请记住，如果维护任务出现问题，`文本文件清理`任务中引用的`.txt`文件是开始故障排查的好地方。


  ### 备份清理


  清理备份的目的相当简单：你不希望文件系统中存储着大型数据库的多个副本，从而占用其他应用程序或操作系统功能可能需要的空间。因此，配置一个默认的保留期限并基于该期限自动清理备份要容易得多。`备份清理`任务使我们能够创建一个自动清理这些备份文件的方法。


  右键单击`管理`文件夹下的`维护计划`文件夹，选择`维护计划向导`开始操作。在`名称`框中输入`备份清理`，在`描述`框中输入简短明了的说明，然后单击`更改…`按钮来设置计划。将`发生`下拉菜单改为`每天`，其余保持不变，然后单击`确定`。你的界面应类似于图
  6-2。


  ![A396023_1_En_6_Fig2_HTML.jpg](img/A396023_1_En_6_Fig2_HTML.jpg)

  图 6-2. 选择计划属性


