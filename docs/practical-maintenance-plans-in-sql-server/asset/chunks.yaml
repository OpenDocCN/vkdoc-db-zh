    回到数据库引擎实例，再次刷新您的“维护计划”文件夹。您可以在图 [13-86](#A396023_1_En_13_Chapter.html#Fig86) 中看到计划回来了。


    ![A396023_1_En_13_Fig86_HTML.jpg](A396023_1_En_13_Fig86_HTML.jpg)

    **图 13-86. 维护计划**


    仍然没有作业。很奇怪，对吧？还有最后一步，年轻的绝地武士。


    即使刷新“作业”文件夹，它也不会在那里。您需要先打开计划，然后从那里开始。双击“维护计划”中的 `Update Statistics Plan`，显示如图
    [13-87](#A396023_1_En_13_Chapter.html#Fig87) 所示的界面。


    ![A396023_1_En_13_Fig87_HTML.jpg](A396023_1_En_13_Fig87_HTML.jpg)

    **图 13-87. 更新统计信息计划**


