  trans: '

    ## 设置维护计划


    说实话，这个计划算是比较容易设置的。它几乎与第 7 章和第 8 章中的计划完全一样，所以到这里，大部分内容应该开始看起来很熟悉了。


    在 SSMS 的 `管理` 文件夹中，右键单击 `维护计划`，然后选择 `维护计划向导`。初始界面需要更改为如图 9-3 所示的界面。


    ![A396023_1_En_9_Fig3_HTML.jpg](img/A396023_1_En_9_Fig3_HTML.jpg)


    图 9-3. 选择计划属性


    通过单击 `更改…` 按钮来修改计划，并将 `发生` 选项设置为 `每天`，使其每天运行一次。收缩数据库需要一些时间，所以我建议不要设置得比这更频繁。单击
    `下一步` 继续。你将看到选择任务的页面，因此选择 `收缩数据库`，如图 9-4 所示。


    ![A396023_1_En_9_Fig4_HTML.jpg](img/A396023_1_En_9_Fig4_HTML.jpg)


    图 9-4. 选择维护任务


    这里的定义也很有趣。它会移除空的数据和日志页。回想一下，这对于第 6 章和第 7 章讨论的索引意味着什么。重组和重建索引可能会使这个任务更有意义，你不觉得吗？如果维护计划不需要运行并查找空页，效率肯定会更高。


    **注意：** `收缩数据库` 任务会收缩所选数据库的事务日志和数据文件。首先收缩事务日志，之后再收缩文件组。


    单击 `下一步` 继续。你将进入 `选择维护任务顺序` 屏幕，如图 9-5 所示，由于我们只执行这一个任务，请在此处单击 `下一步`。


    ![A396023_1_En_9_Fig5_HTML.jpg](img/A396023_1_En_9_Fig5_HTML.jpg)


    图 9-5. 选择维护任务顺序


    看来我们总是绕过这个屏幕，但我们稍后肯定会用到任务排序的概念，你会看到它在何时变得相当重要。不过现在，只需在此屏幕单击 `下一步`，你将看到如图 9-6 所示的
    `定义收缩数据库任务` 界面。


    ![A396023_1_En_9_Fig6_HTML.jpg](img/A396023_1_En_9_Fig6_HTML.jpg)


    图 9-6. 定义收缩数据库任务


    请从下拉列表中选择你的数据库，但保留其余选项不变。


    这意味着你希望在数据库增长超过 50MB 时才进行收缩。否则，不执行任何操作。因此，即使维护任务运行，如果数据库大小为 49.9MB，它也不会执行。很有意思，对吧？所以请确保将其更改为你能接受的设置。


    收缩后保留的可用空间量很重要。你不想将其设置为 0。那将很愚蠢，因为你的数据库首先要做的就是向操作系统请求空间。你可以将其保留为 10%，具体数值取决于数据库的大小，但通常不会太多。


    单击 `下一步`，你将看到报告选项屏幕，和之前一样，将其设置为如图 9-7 所示的配置。


    ![A396023_1_En_9_Fig7_HTML.jpg](img/A396023_1_En_9_Fig7_HTML.jpg)


    图 9-7. 选择报告选项


    同样，文件夹位置设置为我们写入维护文本文件的地方，以便维护清理任务稍后可以为我们处理它们。


    单击 `下一步` 将显示摘要，如图 9-8 所示。


    ![A396023_1_En_9_Fig8_HTML.jpg](img/A396023_1_En_9_Fig8_HTML.jpg)


    图 9-8. 完成向导


    因此，我们定义了 `收缩数据库` 任务，使其在我们的 `DEVTEST` 数据库增长超过 50MB 时，于每晚午夜运行。我们希望保留 10%的可用空间，并将结果写入
    `E:\SQL Server\Backups` 中的一个文件。看起来很不错！单击 `完成`，然后期待最好的结果，而巧的是，最好的结果如图 9-9 所示。


    ![A396023_1_En_9_Fig9_HTML.jpg](img/A396023_1_En_9_Fig9_HTML.jpg)


    图 9-9. 维护计划向导进度


    看到那些绿色的复选框总是让人高兴！


    别忘了像前面章节那样更新作业。我将作业命名为 `收缩数据库`，如图 9-10 所示。


    ![A396023_1_En_9_Fig10_HTML.jpg](img/A396023_1_En_9_Fig10_HTML.jpg)


    图 9-10. SQL Server 代理作业


    你的 `维护计划` 文件夹现在应该看起来像图 9-11。


    ![A396023_1_En_9_Fig11_HTML.jpg](img/A396023_1_En_9_Fig11_HTML.jpg)


    图 9-11. 维护计划


    ## 总结


    本章简短而精炼，但内容其实很丰富。让我们快速回顾一下。


    *   我们探讨了在最初设置数据库时，就空间需求而言是多么重要。

    *   我们看到了大型数据库增长得有多快，以及拥有一个良好的维护计划来控制数据库大小是多么重要。

    *   我们还设置了实际的维护计划来强制执行数据库收缩。


    如果你已经读到这里，那么你做得非常好。我希望到目前为止，你从这本书中学到了一些东西，而不仅仅是知道点击哪里来让事情发生。


    # 10. 更新对象统计信息


    别担心；这本书其实不是关于数学的。我不会骗你去做任何统计作业之类的事情。当 SQL Server 提到统计信息时，那是什么意思？


    这里的统计信息，指的是分布统计信息。


    很好……那么这是什么意思？如果你还记得第 7 章和第 8 章，我们讨论了索引。还记得我们说过，对于 B-Tree 结构，有不同的层级，以及每个层级如何供给更高的层级吗？分布统计信息就是用来定义这些层级的。

    '
- fmt: '## Distribution Statistics Explained


    Let’s say that you have a table that is used to store user data. Almost everyone
    has a `Users` table in their database. When you’re in development, you may have
    five or ten test accounts that you use to test your functionality under different
    roles. And when you move to production, what happens? You all of a sudden get
    a huge influx of user accounts. But if your statistics are still showing that
    you have a very small number of records, and you actually have a very large number
    of records, the indexes would be outdated, and it would actually take longer to
    return the correct information. Distribution statistics allows `SQL Server` to
    both manually and automatically recompute and optimize the values for these indexes
    so that they return the correct information quickly.


    When we discussed the `B-Tree` structure in Chapter [7](#A396023_1_En_7_Chapter.html),
    we had a pretty graphic that showed the various levels of the tree. Remember how
    they lined up nice and pretty? Well, what happens when records are moved around,
    deleted, updated, and inserted? Fragmentation of the physical files will occur,
    and the indexes will begin to drift. Does `SQL Server` do anything to automatically
    mitigate this? Yes. `SQL Server` will manually recompute these statistics as needed
    when some `DML` actions are performed (`delete`, `update`, and `insert`). This
    doesn’t take care of the fragmentation; that’s what our reorganize and rebuild
    tasks do, if you recall. But it does do a quick cleanup of the index.


    Remember when you were younger and company would drop in unannounced to your crappy
    apartment? (Maybe it was just me.) How fast would you get it cleaned and how thorough
    of a job was it? The same principle applies here, believe it or not. It’s not
    a perfect job, it’s not 100% complete, or as thorough as a maintenance task designed
    for this exact task, but it’s enough to keep the indexes in shape for the next
    query.


    Tip


    The important thing to remember about statistics is that they constantly change.


    Statistics won’t stay the same in a large database for very long. In order to
    provide the highest level of data integrity possible, we need to be able to return
    the requested data quickly and correctly. Recomputing and optimizing the statistics
    for the indexes and tables regularly goes a long way in helping achieve this goal.


    ## Setting Up the Maintenance Task


    To set up the task to update the statistics on the database, begin as normal.
    Right-click `Maintenance Plans` under the `Management` folder in `SSMS`, and choose
    `Maintenance Plan Wizard`, as shown in Figure [10-1](#A396023_1_En_10_Chapter.html#Fig1).


    ![A396023_1_En_10_Fig1_HTML.jpg](A396023_1_En_10_Fig1_HTML.jpg)

    Figure 10-1.


    Select Plan Properties


    Change the default values to what you see in Figure [10-1](#A396023_1_En_10_Chapter.html#Fig1)
    and then click the `Change…` button to set the schedule. You only want it to run
    once a day, so change the `Occurs` drop-down menu to `Daily` and click `OK`. Your
    schedule is now set to run at 12:00AM every day. Click `Next` to continue.


    You are now shown a screen where you can choose the task you want to perform.
    Figure [10-2](#A396023_1_En_10_Chapter.html#Fig2) details the tasks and shows
    the correct option for this area.


    ![A396023_1_En_10_Fig2_HTML.jpg](A396023_1_En_10_Fig2_HTML.jpg)

    Figure 10-2.


    Select Maintenance Tasks


    Choose the `Update Statistics` option, as shown in Figure [10-2](#A396023_1_En_10_Chapter.html#Fig2),
    and notice the definition. Just as I summarized before, this task “ensures the
    query optimizer has up-to-date information about the distribution of data values
    in the tables.”


    Click `Next` when you’re ready to move on. You will see what is shown in Figure
    [10-3](#A396023_1_En_10_Chapter.html#Fig3).


    ![A396023_1_En_10_Fig3_HTML.jpg](A396023_1_En_10_Fig3_HTML.jpg)

    Figure 10-3.


    Select Maintenance Task Order


    Since we just have the one task in here, don’t worry about it and click `Next`.


    You are then shown the default screen to define the task. It should look like
    Figure [10-4](#A396023_1_En_10_Chapter.html#Fig4).


    ![A396023_1_En_10_Fig4_HTML.jpg](A396023_1_En_10_Fig4_HTML.jpg)

    Figure 10-4.


    Define Update Statistics Task


    This is where we want to define the parameters of our task. Choose your database
    from the drop-down menu, with `Object` set to `Tables` and `Views`.


    If you recall from Chapters [6](#A396023_1_En_6_Chapter.html) and [7](#A396023_1_En_7_Chapter.html),
    leaving the `Object` set to `Tables` and `Views` lets us update the statistics
    on all available objects in the database. You are free to choose just `Tables`
    or `View` if you would like, but you will need to go in and change this setting
    if you ever want to make any changes to the maintenance plan later.


    There are two other options under there:


    *   `Update` allows you to choose between `All`, `Column`, or `Index` statistics.
    Keep the default at `All`.

    *   `Scan type` lets you define either a `full scan` (recommended) or you can
    also choose a `sample size` to run the scan under. What this means is that `SQL
    Server` takes a sample size of the specified number and extrapolates the extent
    of the scan from there. It doesn’t do a full scan, but it gets sort of close.
    The `full scan` option scans the entire catalog instead of just a sample of the
    data, and then updates the statistics based on the results of that scan.


    I recommend leaving these two options set to the default values, as shown in Figure
    [10-5](#A396023_1_En_10_Chapter.html#Fig5).


    ![A396023_1_En_10_Fig5_HTML.jpg](A396023_1_En_10_Fig5_HTML.jpg)

    Figure 10-5.


    Define Update Statistics Task (completed)


    Click `Next` when you are ready to move on.


    Here is the old familiar interface where we define our reporting options. Set
    it up as you see in Figure [10-6](#A396023_1_En_10_Chapter.html#Fig6) and click
    `Next` to move on.


    ![A396023_1_En_10_Fig6_HTML.jpg](A396023_1_En_10_Fig6_HTML.jpg)

    Figure 10-6.


    Select Report Options


    Now you see the summary screen shown in Figure [10-7](#A396023_1_En_10_Chapter.html#Fig7).
    Review this, as always, just to be sure that you didn’t miss something.


    ![A396023_1_En_10_Fig7_HTML.jpg](A396023_1_En_10_Fig7_HTML.jpg)

    Figure 10-7.


    Complete the Wizard


    When everything is copacetic, click `Finish` and wait with baited breath for what
    is shown in Figure [10-8](#A396023_1_En_10_Chapter.html#Fig8) to appear.


    ![A396023_1_En_10_Fig8_HTML.jpg](A396023_1_En_10_Fig8_HTML.jpg)

    Figure 10-8.


    Maintenance Plan Wizard Progress


    Once again, another maintenance plan is all set up.


    Make sure you update the `Job`, like in previous chapters. I updated the name
    of mine to `Update Statistics`. Your `Jobs` folder should now look like Figure
    [10-9](#A396023_1_En_10_Chapter.html#Fig9).


    ![A396023_1_En_10_Fig9_HTML.jpg](A396023_1_En_10_Fig9_HTML.jpg)

    Figure 10-9.


    SQL Server Agent Jobs


    That’s a lot of jobs in there! Don’t worry, I know this looks daunting right now,
    but I promise that this will all start to make more sense in the very near future.


    Your `Maintenance Plans` folder should also look like Figure [10-10](#A396023_1_En_10_Chapter.html#Fig10).


    ![A396023_1_En_10_Fig10_HTML.jpg](A396023_1_En_10_Fig10_HTML.jpg)

    Figure 10-10.


    Maintenance Plans


    ## Summary


    Let’s take a quick look at what this chapter was all about.


    *   We learned how a database uses statistics to recompute what it “knows” about
    a database.

    *   We saw how, when properly managed, recomputing the statistics on a database
    works in conjunction with the rebuilding and reorganizing of the indexes to provide
    a heightened level of data integrity and query completion time.

    *   We learned how to set up the task and went through the specifics of the task
    portions.


    Great job! This was a quick chapter, but still very important. We are starting
    to wind down now, so keep going and finish up your maintenance plan learning.'
