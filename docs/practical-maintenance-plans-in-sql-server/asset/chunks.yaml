- fmt: 'I’m going to select the default options for this interface and choose `Next`
    to proceed. You will see next an interface in Figure [4-12](#A396023_1_En_4_Chapter.html#Fig12)
    that is titled **Complete the Wizard**, with a brief summary of the settings chosen.
    Let’s look at those next.


    ![A396023_1_En_4_Fig12_HTML.jpg](A396023_1_En_4_Fig12_HTML.jpg)


    **Figure 4-12.**


    **Complete the Wizard**


    From top to bottom, we see all the information that we previously entered. It
    tells us we created a new account and profile. It tells us we added that new account
    to that new profile. Think of the profile like a security container of sorts;
    to edit the account, you have to edit the profile. Finally, it tells us that we
    set the profile as public.


    Looks like we’re ready to implement this, right? Click `Finish` to find out. Figure
    [4-13](#A396023_1_En_4_Chapter.html#Fig13) shows the result you should get.


    ![A396023_1_En_4_Fig13_HTML.jpg](A396023_1_En_4_Fig13_HTML.jpg)


    **Figure 4-13.**


    **Configuring…**


    Woohoo! I always love seeing all those green check boxes! If you didn’t get that,
    go back to the beginning of this chapter and start again.


    ## Sending a Test E-mail


    If you did get those green check boxes, congratulations! Let’s move on to implementing
    `Database Mail` as a part of the database maintenance plan. Remember, the purpose
    of using e-mail is to …? That’s right, to keep us database administrators informed
    of any potential issues with the database. In this case, specifically, we will
    utilize `Database Mail` to send us a status report when a query runs successfully.


    Right-click `Database Mail` again and select `Send Test E-Mail`. You will get
    a screen pop-up with information in it, as shown in Figure [4-14](#A396023_1_En_4_Chapter.html#Fig14).


    ![A396023_1_En_4_Fig14_HTML.jpg](A396023_1_En_4_Fig14_HTML.jpg)


    **Figure 4-14.**


    **Send Test E-Mail**


    Fill out the `To` box with a valid e-mail address, and click `Send Test E-Mail`.
    It takes a second to get there, but it should show up. If it doesn’t, then something
    was set up incorrectly and you probably need to go back to the beginning and figure
    out what you may have missed.


    ## Enabling the Mail Profile


    So now our database can send mail, right? You’re going to hate me, but… yes and
    no. You see, `SQL Server` has this thing about security principles, and just because
    one user or login has permission to do something does not mean that all users
    and logins have permission to do that same thing. For this reason, it is important
    to bring up that, without an extra step, `Database Mail` will likely never run
    on its own.


    Yes, the database has just sent the test mail. But remember this: whatever you
    do when you’re logged in to `SQL Server` is done under the context of your login.
    If you have been granted permission to do something, guess what: you can do it.
    Consequently, if you haven’t been granted that permission, you are not allowed
    to do it. For the most part, regular `SQL Server` logins (especially those that
    log in with the `sa` account) have permission to send mail by default. Interestingly
    enough, the `SQL Server Agent` does not, by default, have permission to send mail.
    Isn’t that odd?


    There are probably good reasons why sending mail isn’t enabled by default, but
    I honestly can’t think of any good ones, so I will punt to Microsoft on this one.


    A key point that I can’t stress enough is to make sure that you enable the mail
    profile in `SQL Server Agent`. Begin by right-clicking `SQL Server Agent` and
    choosing `Properties`, as shown in Figure [4-15](#A396023_1_En_4_Chapter.html#Fig15).


    ![A396023_1_En_4_Fig15_HTML.jpg](A396023_1_En_4_Fig15_HTML.jpg)


    **Figure 4-15.**


    **SQL Server Agent properties**


    Once that opens, on the left, you see that you have options where you can choose
    to go to different areas of the configuration of `SQL Server Agent`. Do not change
    anything in here yet. Seriously, you will regret it.


    Click the `Alert System` option. An interface comes up, as shown in Figure [4-16](#A396023_1_En_4_Chapter.html#Fig16).


    ![A396023_1_En_4_Fig16_HTML.jpg](A396023_1_En_4_Fig16_HTML.jpg)


    **Figure 4-16.**


    **SQL Server Agent Properties (initial interface)**


    Those sneaky little Microsoft developers! Note that top check box next to `Enable
    mail profile` is unchecked. That is literally the only thing stopping you from
    sending automated e-mail from `SQL Server`. Select that check box, make sure that
    `Database Mail` is selected, and choose the mail profile we set up earlier. If
    you have previously defined an operator, you can set them up here as the fail-safe
    operator; so check the check box near the bottom next to `Enable fail-safe operator`
    and choose your operator. If you don’t have an operator defined yet, we will do
    that shortly, and then you can skip back here and add it to these properties.
    Be sure to select the `E-mail` option also, so that the person is notified by
    e-mail. The completed interface should resemble Figure [4-17](#A396023_1_En_4_Chapter.html#Fig17).


    ![A396023_1_En_4_Fig17_HTML.jpg](A396023_1_En_4_Fig17_HTML.jpg)


    **Figure 4-17.**


    **SQL Server Agent Properties (completed interface)**


    When that’s all done, click `OK`, right-click `SQL Server Agent`, and select `Restart`.
    A prompt will pop up asking if you want to restart, so say `Yes`. That bounces
    the service and enables the `Database Mail` subsystem within `SQL Server Agent`.


    Trust me. This is what will stop you later. When you get done with this chapter,
    go back and disable the mail profile and watch what happens. No e-mail!


    Let’s take a second and review what we’ve done for this exercise so far. What
    did we want to do? We wanted to create a `SQL Server Agent` job that sends e-mail
    when a `SQL` query is run, and returns the status of that query in the e-mail.
    Did we accomplish that successfully? Why or why not? Not yet. We haven’t written
    the query or completed the `SQL Server Agent` job. What is the next step? The
    next step is to write a simple query, and then integrate the query and the `Database
    Mail` into the `SQL Server Agent` job for testing.


    Now we have a roadmap. First, write the query. Second, move the query and the
    mail into the steps of the job and begin testing.


    ## SQL Agent Job Creation


    Now that e-mail is configured, you can create `SQL Agent` jobs to execute, for
    example, queries. These may be simple `SQL` queries or they may represent `T-SQL`
    blocks.


    ### Creating an Example Table


    If you have a query that you would like to use, go right ahead. For the purposes
    of this exercise, if you don’t have any tables yet and you want to run an example,
    just execute the following two queries. The first query creates the table; the
    second populates it with data.


    ```sql

    CREATE TABLE [dbo].[Users](

    [uid] [int] IDENTITY(1,1) NOT NULL,

    [userid] [varchar](10) NOT NULL,

    [lastname] [varchar](20) NOT NULL,

    [firstname] [varchar](20) NOT NULL,

    [email] [varchar](100) NOT NULL,

    [phone] [varchar](25) NOT NULL,

    [admin] [bit] NOT NULL

    ) ON [PRIMARY]

    INSERT INTO [dbo].[Users]([userid],[lastname],[firstname],[email],[phone],[admin])

    VALUES (''beardbr1'',''Beard'',''Bradley'',''bradley.beard@gmail.com'',''555-555-5555'',1);

    GO

    ```


    You can enter as much data as you want into the table. I would put more than one
    row in the table though. This information is just a placeholder so that you can
    see what to enter. The last field, `admin`, is to determine whether a user is
    an admin level user or not. `0` is no, `1` is yes. Implementing this in an application
    is up to you or the software developer.


    Keep in mind that the preceding queries are not what we are going to use in the
    example `SQL Server Agent` job. They are just to set up a table with data for
    us to query.


    Next, let’s write the actual query that is going to go in the job. Looking at
    the columns in our data, it seems pretty cut and dried. How about a nice little
    report on all of the data, sorted by last name? Sounds like a plan. This is a
    very easy query to write.'
