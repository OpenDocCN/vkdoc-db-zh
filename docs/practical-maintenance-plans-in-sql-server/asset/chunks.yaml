    See how it works? An updated interface with suggested values is shown in Figure
    [4-32](#A396023_1_En_4_Chapter.html#Fig32).


    ![A396023_1_En_4_Fig32_HTML.jpg](A396023_1_En_4_Fig32_HTML.jpg)


    Figure 4-32.


    New Alert, Options tab (updated interface)


    Now we can see that we are going to wait at least 5 minutes between e-mails.


    We don’t want to actually use these values, so just press Cancel to return to
    the Job Properties page. You should see a blank Alerts screen; we didn’t want
    to set up any alerts here, remember. We did set up an operator, which is all we
