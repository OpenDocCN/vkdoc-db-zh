  trans: '

    # 为作业编写查询


    我们已经有了一个示例表和一些数据。现在，我们可以针对该数据编写查询，然后通过 SQL Server 代理作业安排查询的执行。


    以下是我们将要执行的示例查询：


    ```sql

    SELECT [userid],[firstname] + '' '' + [lastname] AS uname,[email],[phone],[admin]

    FROM [dbo].[Users]

    ORDER BY [lastname];

    ```


    **提示：** 如果你在编写完全有效的 SQL 时，总是看到列名和表名带有下划线，那可能是你的 IntelliSense 缓存需要刷新了。按 `Ctrl+Shift+R`
    可以刷新缓存，使其恢复正常显示。


    我们快速过一遍这个查询，以确保每个人都明白它做了什么。我将 `firstname` 和 `lastname` 字段连接起来，作为一个名为 `uname` 的新字段。这样做是为了避免为每个姓名返回两个列（姓和名分开）。我更希望以一种清晰、可读的格式返回它们；因此，将它们连接起来就完成了。


    好了，现在我们已经正确设置了数据库邮件，并且有一个可以正常工作的查询来返回数据。接下来，我们要做的就是把它们放到一个 SQL Server 代理作业里。


    # 创建 SQL Server 代理作业


    在 SQL Server Management Studio 中，展开 **SQL Server 代理**（位于最底部），右键单击 **作业** 文件夹，然后选择
    **新建作业…**。在 **常规** 选项卡上首先要注意的是，**所有者** 框不一定显示你登录的用户名，而通常是你的 Windows 账户名（如果你使用的是
    Windows 身份验证，通常就是你的姓和名）。你需要将其更改为你的实际 Windows 用户名，如图 4-18 所示，该用户很可能也是数据库的所有者。


    ![A396023_1_En_4_Fig18_HTML.jpg](img/A396023_1_En_4_Fig18_HTML.jpg)

    *图 4-18. 新建作业（初始界面）*


    你需要为作业添加一个名称，所以在 **名称** 字段中输入 `Email User Information`。


    将 **类别** 更改为 **数据库维护**，并添加一个简单的描述。描述应该易于识别。你不需要在这里写长篇大论，但也不能只写“做点事情”。简短而准确是关键。


    现在你的屏幕应该类似于图 4-19。


    ![A396023_1_En_4_Fig19_HTML.jpg](img/A396023_1_En_4_Fig19_HTML.jpg)

    *图 4-19. 新建作业（更新后的界面）*


    确保 **已启用** 复选框已被勾选；否则，作业将处于未启用状态，无法按预期运行。


    # SQL Server 代理选项


    请注意界面左侧的菜单选项。这些是你在作业中需要设置的不同选项，正如你在前面章节中看到的。现在让我们来看看这些选项。先不要做任何更改，只需熟悉一下这些选项：


    *   `常规`：这是你当前所在的选项卡。它用于设置常规选项，因此得名。

    *   `步骤`：此选项用于定义作业将要执行的步骤。你还可以调整步骤的顺序，或者定义不同的起始步骤。和往常一样，一旦添加了步骤，你随时可以返回进行编辑或删除。

    *   `计划`：此选项用于定义运行作业的计划。它的设置方式几乎可以随心所欲，所以花点时间在这个区域仔细检查，确保设置正确。

    *   `警报`：此选项让你可以从 SQL Server 维护的众多警报中进行选择。点击屏幕底部的 **添加** 按钮。当你首次进入此选项时，会看到 **新建警报**
    窗口的 **常规** 选项卡。


    警报进一步细分如下：


    *   `SQL Server 事件警报`：选择目标数据库以及要监视的严重级别或错误号。你还可以设置当任何消息返回特定文本（例如“error”或“failure”）时引发警报。

    *   `SQL Server 性能条件警报`：这个很有趣。你可以在这里选择要监视的 **对象**、**计数器** 和 **实例**。例如，如果你想查看作业运行时发生的事务数量，可以选择
    **数据库** 作为对象，**活动事务** 作为计数器，并将你的数据库名称作为实例。将“警报条件计数器”的值更改为“高于”，并将值设为 `0`，这样你就拥有了一个便捷的性能监视器。

    *   `WMI 事件警报`：此区域使用鲜为人知的 WQL（Windows Management Instrumentation (WMI) 查询语言）来监视
    SQL Server 事件。我认为这可能超出了本书的范围，因为我们可以用前两种方式完成所需的工作。


    接下来是 **响应** 选项卡。在这里，你可以定义希望执行的作业。你还可以选择 **通知操作员**，方法是勾选复选框并选择 **新建操作员** 或选择一个预定义的操作员。只需根据需要填写界面就完成了！SQL
    Server 让这个管理变得非常容易，你不觉得吗？勾选 **电子邮件** 复选框，你就设置好了。这里需要重要说明，这并不是我们之前设置的内容。这不是作业的数据库邮件部分；这仅与此特定的
    **警报** 区域相关。我们接下来会讲到数据库邮件部分。


    ## 通知


    这是我们添加数据库邮件的地方。当你首次打开此选项卡时，会看到右侧的 **电子邮件**、**寻呼** 等选项。勾选 **电子邮件** 复选框，然后点击其右侧的下拉菜单。你会看到你之前输入的操作员名称。现在先不管它，因为这只是对选项的介绍。


    ## 目标


    在这里，你可以选择要针对哪些服务器运行。你的选项是——准备好听答案—— **本地** 或 **多个**。注意，**多个** 选项可能是灰显的。这是因为没有其他服务器被添加为链接服务器，并且没有配置该服务器与其他任何服务器通信。


    现在我们已经过了一遍这些选项，最后来设置作业吧！


    # 步骤选项卡


    回到 **步骤** 选项卡。它现在应该是空的，意味着还没有列出任何步骤。在此 **步骤** 选项卡的屏幕底部，有一个标有 **新建** 的按钮。点击它以继续。


    ## 常规


    你应该会看到如图 4-20 所示的界面打开。注意，你当前在此屏幕上位于 **常规** 选项卡。


    ![A396023_1_En_4_Fig20_HTML.jpg](img/A396023_1_En_4_Fig20_HTML.jpg)

    *图 4-20. 新建作业步骤，常规选项（初始界面）*


    这是你此时看到的内容。在 **步骤名称** 框中输入 `Run SQL Query`。


    巧合的是，**Transact-SQL 脚本 (T-SQL)** 选项已经被为我们选好了。这里还有其他选项可供选择，但我们暂时坚持使用这个。


    这里有一个标为 **运行身份** 的下拉框。你可以保留其默认值（即为空）。此框用于当你已经设置了一个代理账户，并希望由该代理账户来执行此步骤，而不是由 SQL
    Server 代理账户执行。原因在于，运行作业的当前上下文始终是 SQL Server 代理，但当前步骤可以由不同的用户执行。你可以为特定任务设置不同的用户，我接下来会展示给你看，但这个可以保持默认。


    从 **数据库** 下拉菜单中选择你的数据库名称；当前选中的是 **master**。


    **命令** 框是你粘贴我们之前编写的 SQL 查询的地方，所以请将查询放进去。如果你想的话，可以点击 **解析**。此时界面应如图 4-21 所示。


    ![A396023_1_En_4_Fig21_HTML.jpg](img/A396023_1_En_4_Fig21_HTML.jpg)

    *图 4-21. 新建作业步骤，常规选项（更新后的界面）*


    准备就绪后，点击 **高级** 选项卡继续。

    '
- fmt: '## Advanced


    本屏幕的目的是为此步骤设置高级选项。初始界面如图[4-22](#A396023_1_En_4_Chapter.html#Fig22)所示。


    ![A396023_1_En_4_Fig22_HTML.jpg](A396023_1_En_4_Fig22_HTML.jpg)


    **图 4-22.**

    新建作业步骤，高级选项（初始界面）


    注意这里有一个`“Run as user”`框。我们刚才不是设置过了吗？嗯，是，也不是。这个字段的正确选项应该是你当前的Windows登录账户（如果你使用了Windows身份验证，并且该账户是数据库用户），或者数据库所有者（`dbo`）账户。原因是此步骤需要在用户账户的上下文中运行才能执行。通常，你可以使用`dbo`来完成几乎所有操作，因为它很可能就是拥有数据库的账户，因此可以无需额外权限执行大多数必要操作。


    如果你想记录发生的事情，就在这里设置。你有`On Success`和`On Failure`选项，以及重试和间隔选项。如果你已为此区域选择了日志记录，那么请继续在此处设置。


    你还可以选择输出SQL脚本、将SQL脚本追加到现有文件、记录到表（需要预先设置好表）以及在步骤历史记录中包含输出。实际上，我只想在历史记录中看到步骤输出，因此请继续选择此选项，如图[4-23](#A396023_1_En_4_Chapter.html#Fig23)所示。


    ![A396023_1_En_4_Fig23_HTML.jpg](A396023_1_En_4_Fig23_HTML.jpg)


    **图 4-23.**

    新建作业步骤，高级选项（更新后的界面）


    现在这一切都完成了，继续点击“确定”进入下一个区域，如图[4-24](#A396023_1_En_4_Chapter.html#Fig24)所示。


    ![A396023_1_En_4_Fig24_HTML.jpg](A396023_1_En_4_Fig24_HTML.jpg)


    **图 4-24.**

    新建作业步骤，高级选项（更新后的界面）


    注意点击“确定”后，你会返回到“作业属性”窗口的“步骤”选项卡，现在可以在那里看到新输入的步骤。干得不错！


    到目前为止一切顺利。注意“起始步骤”选项设置为唯一可用的值，也就是我们刚刚输入的步骤。你现在可以选择`Insert`、`Edit`或`Delete`步骤。请小心操作，因为如果意外删除某些内容，是不可恢复的。


    ## Schedules Tab


    在这里设置时间表。这是你需要决定希望作业运行频率的部分。你可以将其设置为几乎任何值，但要记住，如果你持续运行一个作业，将会大大消耗系统资源。这真的对你有帮助吗？请记住，此维护计划的目的是让你作为数据库管理员的工作更轻松，而不是更复杂。如果它让你的生活变得复杂，那你可能做错了。请花时间重新检查作业的要求，然后从那里实施解决方案。


    “时间表”选项卡最初有两个选项，如图[4-25](#A396023_1_En_4_Chapter.html#Fig25)所示。


    ![A396023_1_En_4_Fig25_HTML.jpg](A396023_1_En_4_Fig25_HTML.jpg)


    **图 4-25.**

    作业属性，时间表选项卡


    这些选项是`New`和`Pick`。`New`允许你从头开始创建一个全新的时间表。`Pick`让你从预先存在的时间表中选择。


    非常直接。你可以在此处查看预定义的时间表，或者根据你的特定需求创建自己的时间表。在本练习中，我选择了`Pick`，并打算使用选项`CollectorSchedule_Every_6h`。此计划将全天候运行，每6小时一次，直到永远。选择该选项并点击“确定”后，屏幕上会显示该选项，如图[4-26](#A396023_1_En_4_Chapter.html#Fig26)所示。


    ![A396023_1_En_4_Fig26_HTML.jpg](A396023_1_En_4_Fig26_HTML.jpg)


    **图 4-26.**

    作业属性，时间表选项卡（已更新）


    所以一切都设置好了。继续前进！


    ## Alerts Tab


    接下来是“警报”选项卡。这里面有大量有用的信息，我们将详细介绍所有的菜单选项。让我们先看看按下`Add`之后会发生什么的概览。你可以随时参考前面的信息进行更简短的介绍，因为这将需要一些时间。


    你首先注意到有三个选项卡：`General`、`Response`和`Options`。


    ### General


    `General`选项卡让你决定要针对哪个事件。现在，尽管我们不会在作业中使用警报，但我仍然想介绍如何设置它，以便你以后需要时可以参考。


    此区域仅用于捕获事件。可以捕获哪些类型的事件？


    *   `SQL Server event alert`：选择目标数据库，或保留默认的`<all databases>`。然后选择将引发的警报；可以通过错误编号或严重性来选择，并有一个额外的设置，用于在选定“引发警报”复选框并在“消息文本”字段中输入字符串后，搜索任何返回值中是否包含特定字符串。

    *   `SQL Server performance condition alert`：这个区域要复杂得多。这里有成千上万种数据字段组合，要概述每一个及其特定属性需要数千页的篇幅。对这个区域的简洁定义是：在特定性能条件发生时捕获它们。

    *   `WMI event alert`：我从未使用过这个，所以我不会重点介绍它。如果你希望看到一些很酷的WMI内容，我很抱歉让你失望了！'
  raw: '#### Advanced


    The purpose of this screen is to set up the advanced options for this step. Initially,
    it should look like Figure [4-22](#A396023_1_En_4_Chapter.html#Fig22).


    ![A396023_1_En_4_Fig22_HTML.jpg](A396023_1_En_4_Fig22_HTML.jpg)


    Figure 4-22.


    New Job Step, Advanced option (initial interface)


    Note that there is a “Run as user” box. We just did that, didn’t we? Well, yes
    and no. The correct option for this field is your current Windows login (if you
    have Windows Authentication and it is a user on the database), or the database
    owner (dbo) account. The reason is because this step needs to run under the context
    of the user account so that it can run. Typically, you can use dbo for just about
    anything, since it will most like be the account that owns the database and can
    therefore perform most of the necessary operations without any additional privileges.


    If you want to log what happens, this is the place to do it. You have an option
    for On Success and On Failure, with retry and interval options. If you have chosen
    logging for this area, then go ahead and set it here.


    You can also choose to output the SQL script, append the SQL script to an existing
    file, log to a table (you need to have the table already set up), and include
    the output in step history. Really, the only one that I want to see is the step
    output in history, so go ahead and select this option, as shown in Figure [4-23](#A396023_1_En_4_Chapter.html#Fig23).


    ![A396023_1_En_4_Fig23_HTML.jpg](A396023_1_En_4_Fig23_HTML.jpg)


    Figure 4-23.


    New Job Step, Advanced option (updated interface)


    Now that this is all done, go ahead and click OK to move to the next area shown
    in Figure [4-24](#A396023_1_En_4_Chapter.html#Fig24).


    ![A396023_1_En_4_Fig24_HTML.jpg](A396023_1_En_4_Fig24_HTML.jpg)


    Figure 4-24.


    New Job Step, Advanced option (updated interface)


    Note that after you clicked OK, you were brought back to the Job Properties window
    and Steps tab, and you can now see the newly entered step in there. Good job!


    It looks good so far. Note that the Start Step option is set to the only value
    available, which is what we just entered. You now have the option to Insert, Edit,
    or Delete steps. Proceed carefully because it is not recoverable if you accidentally
    delete something.


    ### Schedules Tab


    Here is where you set the schedule. This is the part where you need to determine
    how often you want the job to run. You can set it for just about any value, just
    remember that you will greatly diminish your system resources if you constantly
    have a job cranking along. That’s not really adding anything for you, is it? Remember,
    the purpose of this maintenance plan is to make your life as a database administrator
    easier, not more complicated. If this complicates your life, you’re probably doing
    it wrong. Take the time to reexamine the requirements of the job, and implement
    a solution from there.


    There are two options initially on the Schedules tab, as shown in Figure [4-25](#A396023_1_En_4_Chapter.html#Fig25).


    ![A396023_1_En_4_Fig25_HTML.jpg](A396023_1_En_4_Fig25_HTML.jpg)


    Figure 4-25.


    Job Properties, Schedules tab


    Those options are New and Pick. New lets you create an entirely new schedule from
    scratch. Pick lets you pick from a previously existing schedule.


    Pretty straightforward. You can go over the predefined schedules here, or create
    your own suited to your specific needs. For the purpose of this exercise, I have
    chosen Pick and I am going with the option CollectorSchedule_Every_6h. This plan
    will run all day, every day, every 6 hours, until the end of time. Choosing the
    option and clicking OK shows the option on the screen, as shown in Figure [4-26](#A396023_1_En_4_Chapter.html#Fig26).


    ![A396023_1_En_4_Fig26_HTML.jpg](A396023_1_En_4_Fig26_HTML.jpg)


    Figure 4-26.


    Job Properties, Schedules tab (updated)


    So that’s all set up. Moving right along!


    ### Alerts Tab


    Next is the Alerts tab. There is a ton of good information in here, and we will
    go over all of the menu options in detail. Let’s look at a general overview of
    what happens after you press Add. You can always refer to the preceding information
    for a briefer introduction, because this is going to be a while.


    The first thing you notice is that there are three tabs: General, Response, and
    Options.


    #### General


    The General tab lets you decide what event you are going to target. Now, even
    though we aren’t going to use alerts in our job, I still wanted to go over how
    to set it up, so you can always come back and reference this when needed.


    This area is for capturing events, and that is it. What types of events can be
    captured?


    *   SQL Server event alert: Choose the database to target, or leave the default
    as <all databases>. Then choose the alerts that will be raised; either by Error
    Number or Severity, with an additional setting to search any returned values for
    a specific string, as specified by selecting the Raise Alert check box and entering
    a string in the Message Text field.

    *   SQL Server performance condition alert: This area is much more complex. There
    are literally thousands of combinations of data fields here, and to outline each
    one with their specific attributes would take thousands of pages. A succinct definition
    of this area would be to capture specific performance conditions when they occur.

    *   WMI event alert: I have never once used this, so I am not going to focus on
    it. If you were hoping to see some cool WMI stuff, I’m sorry to disappoint!'
