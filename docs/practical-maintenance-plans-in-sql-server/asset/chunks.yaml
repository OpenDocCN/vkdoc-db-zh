  trans: '

    # 2. 数据库备份


    备份数据库可以说是数据库管理中最重要的环节。没有备份，在数据丢失或损坏的情况下，你将无法恢复。你无法快速重建你最终负责的数据。你见过对备份不太在意的数据库管理员吗？我敢保证，那是因为他们要么是懒惰，要么从未经历过灾难性故障的恢复。这两种原因最糟糕的地方在于，一个是主观选择，一个是客观环境所致，但两者都可以通过一点前瞻性和规划来补救。


    别误会我的意思；有时候，故障就是会发生。它就是会发生；墨菲定律就是这么说的。但这并不意味着我们不能成功地从中恢复，对吧？本章的目的不仅是解释定期备份的重要性，还要说明将这些备份构建成一个连贯且完整的维护计划的正确方法。


    我希望你从本章带走的是一句简单的话：**不拥有`数据库备份`是完全说不通的**。


    正如你所猜到的，`数据库备份`涉及多个不同的方面。在我解释实际任务本身之前，我们先来看看这些方面。


    *   `恢复模型`：这是你的数据库为恢复丢失数据而设置的方式。通常在数据库引擎安装期间设置，但可以随时更改。

    *   `备份类型`：某些类型的`恢复模型`允许特定类型的`备份`。根据需要备份的数据库的`恢复模型`设置，这也可以随时更改。


    ## 恢复模型


    开始之前需要注意的一个重要点是，特定数据库的`恢复模型`在此处发挥作用。什么是`恢复模型`？简单地说，它告诉数据库如何恢复以及以什么方式恢复。`恢复模型`在数据库的初始设置和配置中确定，但也可以通过`右键单击数据库名称并选择属性`来访问。`从菜单选项中选择选项`，如`图
    2-1`左侧所示，第二个选项将显示`恢复模式`。


    ![A396023_1_En_2_Fig1_HTML.jpg](img/A396023_1_En_2_Fig1_HTML.jpg)


    `图 2-1.` 数据库属性窗口


    让我们看看各种`恢复模型`之间的区别。`图 2-2` 显示了可用模型之间的基本区别，因此实际上取决于数据库管理员来确定实际需求或要求，以正确满足客户或应用程序的需求。


    ![A396023_1_En_2_Fig2_HTML.jpg](img/A396023_1_En_2_Fig2_HTML.jpg)


    `图 2-2.` 恢复模型


    ### 完整


    使用`完整恢复模型`时，数据丢失是最少的，因为除非`事务日志`的尾部损坏，否则所有数据都可以恢复。`完整恢复模型`可以被视为故障安全模型解决方案，因为所有内容都包含在备份中。唯一的注意事项是`事务日志`扮演着重要角色，因为如果它损坏或不完整，完整备份将会失败。


    ### 大容量日志记录


    `大容量日志记录恢复模型`是一种快速恢复的方式，但数据只能从上次备份中恢复。如果备份之间的时间间隔较短，这可能不是问题。例如，使用`大容量日志记录恢复模型`时，上次备份是唯一真正可行的备份，因为那是唯一可以恢复的备份。这意味着如果备份周期设置为每
    6 小时一次，那么最多可能丢失 6 小时的数据。


    ### 简单


    从上次备份到数据丢失事件之间的所有数据都将丢失。不推荐此选项，因为与其他两个模型相比，此模型导致数据丢失的可能性要高得多。


    那么，`恢复模型`如何与`备份数据库`任务协同工作呢？这样想：如果你有一个使用`简单恢复模型`的数据库，但试图强制执行`事务日志备份`，它会失败。为什么？因为`简单恢复模型`不执行`事务日志备份`。这是一种巧妙的方式，让你思考是否需要稍微不同的做法；如果你想备份`事务日志`，那么你很可能需要有可备份的`事务日志`。有道理，对吧？那么，`备份类型`之间有什么区别呢？


    ## 备份类型


    `图 2-3` 显示 `SQL Server` 中有三种`备份类型`，每种都是独特的，但都相互关联。如果使用得当，这三种类型可以协同工作，为用户提供更高级别的数据安全性。


    ![A396023_1_En_2_Fig3_HTML.jpg](img/A396023_1_En_2_Fig3_HTML.jpg)


    `图 2-3.` 备份类型


    ### 完整备份


    `完整备份`备份数据库中的所有内容。这是需要记住的重要部分；换句话说，它不会备份 `SQL Server` 的单独设置或组件。


    ### 差异备份


    `差异备份`与`完整备份`相关，因为`差异备份`只包含自上次`完整备份`以来的数据。这可能是一个难以理解的概念。把`完整备份`想象成橄榄球场上的主要码线（10、20、30、40
    等），而`差异备份`则是单个码线（11、12、13、14 等）。你能从 10 码线直接到达 30 码线吗？当然可以。但你也可以一码一码地到达那里。这就是`差异备份`给你的——一种“一码一码”的数据捕获方式。`差异备份`的美妙之处在于数据丢失被最小化，因为唯一丢失的是到最后一个`差异备份`为止的数据。它也快得多，因为备份的数据只是自上次`完整备份`以来添加或更改的数据。`差异备份`的缺点在于必须先恢复`完整备份`；然后`差异备份`才应用于基础数据。没有父`完整备份`的`差异备份`，实际上，是毫无用处的，因为它不能用于恢复任何东西。

    '
- fmt: '### Transaction Log Backups


    Transaction logs are at the core of the concept of data recovery. They can be
    run as often as required up until the limit of a physical disk. The interval for
    backup is entirely up to the database administrator and can be set to backup down
    to the minute, although this is probably a little ridiculous because you would
    obviously generate 1,440 logs per day. If this is the requirement, it can certainly
    be achieved; however, as noted earlier, storage will be a major consideration
    in this case.


    Keep in mind that the transaction log backup interval is basically the amount
    of time that has been agreed upon for maximum data loss. For some companies, this
    is absolute zero. For some, it may be 5 minutes, or 10, or 20. Whatever the interval
    agreed upon, that is what you are tasked to set up. If you get the company that
    says absolute zero, then the cost of additional fault tolerant storage needs to
    be added to the server configuration. More than likely, they will consider that
    they could go maybe 30 minutes with data loss, but that it should be mitigated
    as much as possible.


    Tip


    The minimum amount of time that you can have a scheduled task in SQL Server is
    10 seconds. If you need tasks run more frequently than this, you may need to consider
    switching to decaf.


    So that covers those concepts. Again, I cannot stress enough how important backups
    are for databases. It could be argued that it is the single most important thing
    that a database administrator is responsible for. To make this easier on you,
    your company, and your customers, always try to think two steps ahead of what
    is happening. A good way to help do this is to be prepared, and what better way
    to be prepared than to have a fresh, clean copy of the data always available for
    restoring in case of a catastrophic failure.


    Figure [2-4](#A396023_1_En_2_Chapter.html#Fig4) shows a closer look at how these
    recovery models affect the backup types.


    ![A396023_1_En_2_Fig4_HTML.jpg](A396023_1_En_2_Fig4_HTML.jpg)


    Figure 2-4.


    Recovery models vs. Backup types


    Following the logic described in Figure [2-4](#A396023_1_En_2_Chapter.html#Fig4),
    I would recommend a full backup with differential backups and transaction log
    backups. That way, the transaction logs would feed the differential backups, which
    rely on the full backups to restore correctly.


    Figure [2-5](#A396023_1_En_2_Chapter.html#Fig5) shows the ideal setting for backups,
    using the three types described earlier.


    ![A396023_1_En_2_Fig5_HTML.jpg](A396023_1_En_2_Fig5_HTML.jpg)


    Figure 2-5.


    Ideal backup settings


    Consider the backup schedule shown in Figure [2-6](#A396023_1_En_2_Chapter.html#Fig6)
    using the colors and references from Figure [2-5](#A396023_1_En_2_Chapter.html#Fig5).
    This is what I would call “absolutely ideal.”


    ![A396023_1_En_2_Fig6_HTML.jpg](A396023_1_En_2_Fig6_HTML.jpg)


    Figure 2-6.


    Absolutely ideal backup settings


    The full backup starts the backup set, with the first differential being supported
    by the transaction log backups. Those backups would in turn feed the differential
    backups, which are placed on top of the full backups. The important thing to notice
    in Figure [2-6](#A396023_1_En_2_Chapter.html#Fig6) is that there are no time constraints
    on it. It’s totally up to you to determine what the amount of time is for all
    three types of backups. For example, say you wanted to have 10-minute transaction
    log backups supporting differential backups taken at 30-minute intervals, leading
    from a full backup taken nightly. The image shown in Figure [2-6](#A396023_1_En_2_Chapter.html#Fig6)
    is a great way to quantify that, because all you need to do, graphically, is add
    more green and yellow bars (a lot more, honestly).


    That sets us up with a good foundation on understanding how backups work. Hopefully,
    you can see the benefit to having data properly backed up in case of an emergency.


    ## Setting Up the Maintenance Plan


    I’m basically going to go screen by screen and explain this in sometimes excruciating
    detail, so here we go!


    ### Full Backup Configuration


    Right-click Maintenance Plans and select Maintenance Plan Wizard to get going.
    The first interface you see is Select Plan Properties. Enter Backup Maintenance
    Plan in the Name box. Next, enter a brief description. Click the “Separate schedules
    for each task” radio button. Leave the rest defaulted for now. Figure [2-7](#A396023_1_En_2_Chapter.html#Fig7)
    should be what you see now.


    ![A396023_1_En_2_Fig7_HTML.jpg](A396023_1_En_2_Fig7_HTML.jpg)


    Figure 2-7.


    Select Plan Properties


    Remember when we looked at the database’s recovery model? Yours is hopefully set
    to `Full`. There are instances when you don’t need this, and that’s understandable;
    however, I would strongly recommend using `Full`.


    Why did I bring this up? This information leads to the selection of backup tasks.
    If your database is in `Full` recovery model, then we can create a more stringent
    maintenance plan, and that is the goal of this book.


    When you click Next on this screen, you will see the options we discussed earlier.
    Select all three backup options, as shown in Figure [2-8](#A396023_1_En_2_Chapter.html#Fig8).


    ![A396023_1_En_2_Fig8_HTML.jpg](A396023_1_En_2_Fig8_HTML.jpg)


    Figure 2-8.


    Select Maintenance Tasks


    Now, click Next to set up the three parts of the backup. This is sort of a moot
    point, because the three parts will execute at different times and for different
    reasons. Recall earlier in this chapter when I said that the full backup is fed
    from the differential backups, which is fed from the transaction log backups.
    When you see the screen shown in Figure [2-9](#A396023_1_En_2_Chapter.html#Fig9),
    just click Next.


    ![A396023_1_En_2_Fig9_HTML.jpg](A396023_1_En_2_Fig9_HTML.jpg)


    Figure 2-9.


    Select Maintenance Task


