    ![A396023_1_En_2_Fig17_HTML.jpg](A396023_1_En_2_Fig17_HTML.jpg)


    图 2-17. 选择报告选项


    现在，这是相当不言自明的。如果您想将报告写入文本文件并放入文件系统，请点击该框。请注意，我选择了 `Backups` 目录，而不是 `Logs` 目录。这是因为我想将
    `Logs` 目录保留用于我的事务日志。`Backups` 目录可用于存储维护文本文件，而 `Backups` 内的各个文件夹则存储实际的 `.bak` 文件，以防您需要恢复数据库。


    您也可以选择通过电子邮件接收报告，但您必须定义一个 `Operator`（稍后会详细介绍）。如果您定义了 `Operator`，请在此处选择它以接收电子邮件。这样做的目的是让您通过电子邮件知道维护计划何时运行以及结果如何。目前，我们将只保留报告选项选中。点击
    `Next` 继续。


    ## 完成向导


    在下一个屏幕“完成向导”上，您会看到我们所做工作的摘要。展开界面中的选项将显示所做工作的完整细节，如图 [2-18](#A396023_1_En_2_Chapter.html#Fig18)
    所示。


    ![A396023_1_En_2_Fig18_HTML.jpg](A396023_1_En_2_Fig18_HTML.jpg)


    图 2-18. 完成向导


    请注意，这些选项尚未保存。您可以在此处点击 `Cancel` 并销毁我们迄今为止所做的所有工作，但我们不要那样做。相反，检查我们所做的操作，当您准备好时，点击
    `Finish`。希望您看到图 [2-19](#A396023_1_En_2_Chapter.html#Fig19) 所示的内容。


    ![A396023_1_En_2_Fig19_HTML.jpg](A396023_1_En_2_Fig19_HTML.jpg)


    图 2-19. 维护计划向导进度


    这总是一个好迹象！准备好后点击 `Close`。请注意，`Backup Maintenance Plan` 现在出现在 SSMS 的 `Maintenance
    Plans` 区域中。它现在已启用，并将按照我们定义的计划运行。'
