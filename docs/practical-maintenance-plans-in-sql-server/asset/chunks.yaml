    单击“确定”并刷新此文件夹，我们的计划就回来了，如图 [13-80](#A396023_1_En_13_Chapter.html#Fig80) 所示。


    ![A396023_1_En_13_Fig80_HTML.jpg](A396023_1_En_13_Fig80_HTML.jpg)

    **图 13-80. Integration Services 维护计划**


    去查看数据库引擎中的“维护计划”和“作业”文件夹。在图 [13-81](#A396023_1_En_13_Chapter.html#Fig81) 或图 [13-82](#A396023_1_En_13_Chapter.html#Fig82)
    中看到什么有趣的东西了吗？


    ![A396023_1_En_13_Fig82_HTML.jpg](A396023_1_En_13_Fig82_HTML.jpg)

    **图 13-82. SQL Server Agent 作业**


    ![A396023_1_En_13_Fig81_HTML.jpg](A396023_1_En_13_Fig81_HTML.jpg)

    **图 13-81. 维护计划**


    所以它添加了维护计划，但没有添加作业？是的。但我们还没完成。


    再次回到 `Integration Services` 部分，右键单击 `Update Statistics Plan` 并选择“导出包…”，这将打开如图
    [13-83](#A396023_1_En_13_Chapter.html#Fig83) 所示的界面。


    ![A396023_1_En_13_Fig83_HTML.jpg](A396023_1_En_13_Fig83_HTML.jpg)

    **图 13-83. 导出包**


    我们不打算将其导出到文件系统；这对于我们要完成的任务没有意义。相反，更新您的界面以显示图 [13-84](#A396023_1_En_13_Chapter.html#Fig84)
    中的值。对于“包路径”值，单击省略号，展开 `MSDB`，单击“维护计划”，然后单击“确定”。


    ![A396023_1_En_13_Fig84_HTML.jpg](A396023_1_En_13_Fig84_HTML.jpg)

    **图 13-84. 导出包（已更新）**


    完成后单击“确定”。接下来，您将看到一个如图 [13-85](#A396023_1_En_13_Chapter.html#Fig85) 所示的弹出窗口。


    ![A396023_1_En_13_Fig85_HTML.jpg](A396023_1_En_13_Fig85_HTML.jpg)

    **图 13-85. 导出包警告**


