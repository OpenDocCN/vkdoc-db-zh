  trans: '# 11. 执行 T-SQL 语句


    `执行 T-SQL 语句任务`是最容易设置的任务之一。你只需要准备好要运行的 SQL 查询，将其粘贴到框中——就完成了。


    但是等等……如果查询在一个`.sql`文件中怎么办？如果那个文件可能会更改怎么办？这是否意味着每次查询更改时你都必须更新这个任务？


    不。这正是 SQL Server 大显身手、拯救局面的一个绝佳例子。对于 SQL 查询，你可以选择直接输入、文件连接或变量输入。


    我们将以不同于之前计划的方式设置此任务，因为此任务特定于 `SQL Server Integration Services (SSIS)` 子系统，而非 `SQL
    Server Agent` 子系统。尽管 `SQL Server Agent` 将执行这个以及所有其他作业，但这个特定任务（以及 `通知操作员任务`）只能在这里创建。


    ## 设置维护计划


    由于我们将在设计界面而非向导界面中工作，因此设置此计划与你之前所见的不同。任务的本质是相同的，即我们在设置一个要运行的作业，并在呈现给我们的界面中定义该作业的特性。简单来说，我们无法在常规维护计划中运行
    T-SQL 语句，除非进行大量额外工作，而这些工作实际上与原始维护计划无关。换句话说，它需要作为对现有计划的补充来运行，但这没有意义，因为我们希望将这些维护任务在逻辑上分开。在设计界面而非向导中创建此任务，使我们有机会专门创建一个
    T-SQL 任务。


    右键单击 `维护计划` 并选择 `新建维护计划…`，然后输入 `T-SQL 计划` 作为名称，如图 11-1 所示。


    ### 图 11-1.

    ![A396023_1_En_11_Fig1_HTML.jpg](img/A396023_1_En_11_Fig1_HTML.jpg)


    新建维护计划


    单击 `确定`。你应该会看到如图 11-2 所示的界面。


    ### 图 11-2.

    ![A396023_1_En_11_Fig2_HTML.jpg](img/A396023_1_En_11_Fig2_HTML.jpg)


    设计界面


    此时，你可以在屏幕顶部的大框中输入描述。完成后，双击已创建的子计划 (`Subplan_1`) 并按图 11-3 所示填写。


    ### 图 11-3.

    ![A396023_1_En_11_Fig3_HTML.jpg](img/A396023_1_En_11_Fig3_HTML.jpg)


    子计划属性


    看起来有点熟悉，不是吗？这是输入任务的另一种方式。像我们在其他章节中所做的那样更改计划，并将“`运行方式选项`”保留为默认值。


    正如我之前所说，这并不意味着它功能更强或更弱，也不意味着它做不同的事情，它只是以不同的方式完成基本相同的事情。在 `维护计划向导` 中，我们无法选择仅运行
    SQL 查询而不进入 `SQL Server Agent 作业` 并从那里运行 SQL 脚本。


    完成此屏幕后单击 `确定`。然后你会看到之前的界面，并填入了你输入的值。你应该看到类似于图 11-4 的内容。


    ### 图 11-4.

    ![A396023_1_En_11_Fig4_HTML.jpg](img/A396023_1_En_11_Fig4_HTML.jpg)


    设计界面


    我知道你在想什么。我们如何将 SQL 添加到这里？似乎没有任何地方可以添加任何内容。那是因为我们还没有显示 `工具箱`。还记得我们之前讨论过使用向导与使用设计界面设置维护计划的区别吗？这就是其中一个很大的区别。


    在屏幕左侧，你应该会看到一个写着 `工具箱` 的菜单。如果没有，请按 `Ctrl+Alt+X` 显示它。图 11-5 显示了 `工具箱` 的样子。


    ### 图 11-5.

    ![A396023_1_En_11_Fig5_HTML.jpg](img/A396023_1_En_11_Fig5_HTML.jpg)


    工具箱


    那就是 `工具箱`。注意，其中的大部分内容都是我们已经介绍过的。


    你在这里要做的是经典的“单击并拖拽”技术。单击 `执行 T-SQL 语句任务` 并将其拖到子计划信息下方的灰色区域。你将看到如图 11-6 所示的内容。


    ### 图 11-6.

    ![A396023_1_En_11_Fig6_HTML.jpg](img/A396023_1_En_11_Fig6_HTML.jpg)


    执行 T-SQL 语句任务（初始）


    这是第一步，所以不用担心那里有一个红色的 X。那只是因为我们还没有完成设置。说到这个，继续双击 `执行 T-SQL 语句任务` 框的任意位置以进入下一步，如图
    11-7 所示。


    ### 图 11-7.

    ![A396023_1_En_11_Fig7_HTML.jpg](img/A396023_1_En_11_Fig7_HTML.jpg)


    执行 T-SQL 语句任务详细信息'
- fmt: 'This is what you see when you first get there. This screen lets you define
    the connection, if you happen to have more than 1, and enter the T-SQL statement.
    You can also define the execution time out here as well. This value is in seconds,
    with 0 meaning that it will run until it finishes execution.


    The T-SQL statement we are going to enter is going to be something short and sweet:


    ```sql

    SELECT firstname + '' '' + lastname FROM users ORDER BY userid;

    ```


    This gives us the concatenated user names from the `Users` table in our database.


    Click `OK` when you are ready to move on. Notice that in Figure [11-8](#A396023_1_En_11_Chapter.html#Fig8),
    the red X went away and the screen looks more complete.


    ![A396023_1_En_11_Fig8_HTML.jpg](A396023_1_En_11_Fig8_HTML.jpg)


    Figure 11-8. Execute T-SQL Statement Task Detail (completed)


    Notice here that you can either keep the generic text of `Execute T-SQL Statement
    Task` in there, or you can enter a new value. To do this, just long-click the
    text and wait for it to become editable, enter the new value, and press `Enter`.
    I did this and changed it to `Run Some SQL`, as shown in Figure [11-9](#A396023_1_En_11_Chapter.html#Fig9).


    ![A396023_1_En_11_Fig9_HTML.jpg](A396023_1_En_11_Fig9_HTML.jpg)


    Figure 11-9. Execute T-SQL Statement Task Detail (updated)


    Now that that’s set up, let’s look at some of the settings. Right-click and choose
    `Properties`. Holy cow, that’s a lot of properties. To define them would take
    another whole chapter, so we’re just going to assume that everything is okay in
    here and move along to one interesting bit.


    Look for the property that says `SqlStatementSourceType`, as shown in Figure [11-10](#A396023_1_En_11_Chapter.html#Fig10).


    ![A396023_1_En_11_Fig10_HTML.jpg](A396023_1_En_11_Fig10_HTML.jpg)


    Figure 11-10. SqlStatementSourceType


    That property is the key to this. The `SqlStatementSourceType` property is set
    to `DirectInput` by default. The other values are `FileConnection` and `Variable`.
    Let’s look at these separately in Figure [11-11](#A396023_1_En_11_Chapter.html#Fig11)
    before we go on.


    ![A396023_1_En_11_Fig11_HTML.jpg](A396023_1_En_11_Fig11_HTML.jpg)


    Figure 11-11. Source types overview


    Make sense? Those are the three ways that you can define the SQL that needs to
    be run. If you can’t do it with one of these three methods, then I don’t know
    what to tell you. I can’t think of any other way that it can be run, honestly;
    except if it were a Stored Procedure, which can be set to a Boolean value by changing
    the `IsStoredProcedure` value to `True` from `False` (the default).


    For this exercise, we are going to stick with `DirectInput`, but I strongly encourage
    you to get into the other two methods of doing this step, if you haven’t already.


    Save the plan and close it, and then go back to the `Maintenance Plans` section
    and refresh the `Maintenance Plans` folder to see the plan.


    Open the `Jobs` folder. The plan is right near the bottom. Figure [11-12](#A396023_1_En_11_Chapter.html#Fig12)
    shows this new job with the rest of the jobs.


    ![A396023_1_En_11_Fig12_HTML.jpg](A396023_1_En_11_Fig12_HTML.jpg)


    Figure 11-12. SQL Server Agent Jobs


    Interesting! So now, we have a job… but did it work? Is it a failure or a success?
    We didn’t do any of those things this way. Remember setting all those options
    before? What happened to them?


    Well, think of it like this. Creating the task this way gave you the chance to
    operate strictly from the task side and not the schedule or reporting side. This
    way allowed us to focus in on what, specifically, we wanted to do. Implementing
    it will be another story, but it isn’t as hard as you may think.


    ## Implementing the Maintenance Plan


    Now that the task is set up, let’s put it to work. How do we do that? Just double-click
    the job name under `SQL Server Agent` (mine is `T-SQL Plan.T-SQL Task`) and there
    you go, as shown in Figure [11-13](#A396023_1_En_11_Chapter.html#Fig13).


    ![A396023_1_En_11_Fig13_HTML.jpg](A396023_1_En_11_Fig13_HTML.jpg)


    Figure 11-13. Job Properties, General tab


    Oh, thank God. We’re finally back to familiar territory! From here, set it up
    like you would normally; give it a new name and update the description, if you
    would like. I changed mine to `T-SQL Task`. Notice that we are on the `General`
    tab on the left. Let’s step through the other tabs now.


    We are now on the `Steps` tab. Initially, this interface appears similar to what
    you see in Figure [11-14](#A396023_1_En_11_Chapter.html#Fig14).


    ![A396023_1_En_11_Fig14_HTML.jpg](A396023_1_En_11_Fig14_HTML.jpg)


    Figure 11-14. Job Properties, Steps tab


    Everything is all set up for us! There are a couple of little things that I would
    like to change, though, so click `Edit` and then `Advanced`. You should see the
    interface shown in Figure [11-15](#A396023_1_En_11_Chapter.html#Fig15) at this
    point.


    ![A396023_1_En_11_Fig15_HTML.jpg](A396023_1_En_11_Fig15_HTML.jpg)


    Figure 11-15. Job Properties, Steps tab, Advanced option


    Just select the “Include step output in history” check box, and that’s it.


    Click `OK` when you are done in this area.


    Click `Schedules` on the left to continue. This screen shows the setting that
    was defined for the task, which was `Daily` at `12:00 AM`. Remember setting this
    earlier? It can stay like this, unless you need to change it.


    The `Alerts` tab is next, so go ahead and click that. We don’t really need to
    set any alerts on this, since we are just running a simple query. Again, if you
    need to run something here, feel free. This is your maintenance plan, after all!


    `Notifications` is the next to last. It is the important bit. Make sure that you
    check the `E-mail` box, choose our operator, and set it to “When the job completes”.
    Figure [11-16](#A396023_1_En_11_Chapter.html#Fig16) shows the recommended settings.


    ![A396023_1_En_11_Fig16_HTML.jpg](A396023_1_En_11_Fig16_HTML.jpg)


    Figure 11-16. Job Properties, Notifications tab


    On the `Targets` tab, just leave everything blank. We haven’t defined anything
    at all for this section.


    When you are ready, go ahead and click `OK` to save the changes to this Job.


    This setup routine should have been familiar to you if you read through Chapter
    [4](#A396023_1_En_4_Chapter.html). If you haven’t, then you should certainly read
    that so you get an understanding on what we’re doing and why.


    Remember when I asked how would we know whether it had succeeded? Well, let’s
    find out now.'
  raw: 'This is what you see when you first get there. This screen lets you define
    the connection, if you happen to have more than 1, and enter the T-SQL statement.
    You can also define the execution time out here as well. This value is in seconds,
    with 0 meaning that it will run until it finishes execution.


    The T-SQL statement we are going to enter is going to be something short and sweet:


    ```

    SELECT firstname + '' '' + lastname FROM users ORDER BY userid;

    ```


    This gives us the concatenated user names from the Users table in our database.


    Click OK when you are ready to move on. Notice that in Figure [11-8](#A396023_1_En_11_Chapter.html#Fig8),
    the red X went away and the screen looks more complete.


    ![A396023_1_En_11_Fig8_HTML.jpg](A396023_1_En_11_Fig8_HTML.jpg)


    Figure 11-8.


    Execute T-SQL Statement Task Detail (completed)


    Notice here that you can either keep the generic text of Execute T-SQL Statement
    Task in there, or you can enter a new value. To do this, just long-click the text
    and wait for it to become editable, enter the new value, and press Enter. I did
    this and changed it to Run Some SQL, as shown in Figure [11-9](#A396023_1_En_11_Chapter.html#Fig9).


    ![A396023_1_En_11_Fig9_HTML.jpg](A396023_1_En_11_Fig9_HTML.jpg)


    Figure 11-9.


    Execute T-SQL Statement Task Detail (updated)


    Now that that’s set up, let’s look at some of the settings. Right-click and choose
    Properties. Holy cow, that’s a lot of properties. To define them would take another
    whole chapter, so we’re just going to assume that everything is okay in here and
    move along to one interesting bit.


    Look for the property that says SqlStatementSourceType, as shown in Figure [11-10](#A396023_1_En_11_Chapter.html#Fig10).


    ![A396023_1_En_11_Fig10_HTML.jpg](A396023_1_En_11_Fig10_HTML.jpg)


    Figure 11-10.


    SqlStatementSourceType


    That property is the key to this. The SqlStatementSourceType property is set to
    DirectInput by default. The other values are FileConnection and Variable. Let’s
    look at these separately in Figure [11-11](#A396023_1_En_11_Chapter.html#Fig11)
    before we go on.


    ![A396023_1_En_11_Fig11_HTML.jpg](A396023_1_En_11_Fig11_HTML.jpg)


    Figure 11-11.


    Source types overview


    Make sense? Those are the three ways that you can define the SQL that needs to
    be run. If you can’t do it with one of these three methods, then I don’t know
    what to tell you. I can’t think of any other way that it can be run, honestly;
    except if it were a Stored Procedure, which can be set to a Boolean value by changing
    the IsStoredProcedure value to True from False (the default).


    For this exercise, we are going to stick with DirectInput, but I strongly encourage
    you to get into the other two methods of doing this step, if you haven’t already.


    Save the plan and close it, and then go back to the Maintenance Plans section
    and refresh the Maintenance Plans folder to see the plan.


    Open the Jobs folder. The plan is right near the bottom. Figure [11-12](#A396023_1_En_11_Chapter.html#Fig12)
    shows this new job with the rest of the jobs.


    ![A396023_1_En_11_Fig12_HTML.jpg](A396023_1_En_11_Fig12_HTML.jpg)


    Figure 11-12.


    SQL Server Agent Jobs


    Interesting! So now, we have a job… but did it work? Is it a failure or a success?
    We didn’t do any of those things this way. Remember setting all those options
    before? What happened to them?


    Well, think of it like this. Creating the task this way gave you the chance to
    operate strictly from the task side and not the schedule or reporting side. This
    way allowed us to focus in on what, specifically, we wanted to do. Implementing
    it will be another story, but it isn’t as hard as you may think.


    ## Implementing the Maintenance Plan


    Now that the task is set up, let’s put it to work. How do we do that? Just double-click
    the job name under SQL Server Agent (mine is T-SQL Plan.T-SQL Task) and there
    you go, as shown in Figure [11-13](#A396023_1_En_11_Chapter.html#Fig13).


    ![A396023_1_En_11_Fig13_HTML.jpg](A396023_1_En_11_Fig13_HTML.jpg)


    Figure 11-13.


    Job Properties, General tab


    Oh, thank God. We’re finally back to familiar territory! From here, set it up
    like you would normally; give it a new name and update the description, if you
    would like. I changed mine to T-SQL Task. Notice that we are on the General tab
    on the left. Let’s step through the other tabs now.


    We are now on the Steps tab. Initially, this interface appears similar to what
    you see in Figure [11-14](#A396023_1_En_11_Chapter.html#Fig14).


    ![A396023_1_En_11_Fig14_HTML.jpg](A396023_1_En_11_Fig14_HTML.jpg)


    Figure 11-14.


    Job Properties, Steps tab


    Everything is all set up for us! There are a couple of little things that I would
    like to change, though, so click Edit and then Advanced. You should see the interface
    shown in Figure [11-15](#A396023_1_En_11_Chapter.html#Fig15) at this point.


    ![A396023_1_En_11_Fig15_HTML.jpg](A396023_1_En_11_Fig15_HTML.jpg)


    Figure 11-15.


    Job Properties, Steps tab, Advanced option


    Just select the “Include step output in history” check box, and that’s it.


    Click OK when you are done in this area.


    Click Schedules on the left to continue. This screen shows the setting that was
    defined for the task, which was Daily at 12:00 AM. Remember setting this earlier?
