    # 6. Cleaning Up Maintenance Files


    Very similar to the content of Chapter [5](#A396023_1_En_5_Chapter.html) is the
    topic of maintenance cleanup tasks . History and maintenance tasks probably could
    have been tied together, but I can understand why they are separate.


    ## Separation of History from Maintenance


    Why are cleanup tasks separate for history and maintenance? Let’s look at the
    differences between the two tasks. Figure [6-1](#A396023_1_En_6_Chapter.html#Fig1)
    highlights some of the key differences to be aware of.


    ![A396023_1_En_6_Fig1_HTML.jpg](A396023_1_En_6_Fig1_HTML.jpg)


    Figure 6-1.


    Differences between Maintenance and History Cleanup Tasks


    What do these differences mean in layman’s terms? Here is what you need to know:


    *   The Maintenance Cleanup Task cleans up the physical files left after executing
    a maintenance plan. When you view the file system where you are logging the maintenance
    plan steps, you will likely see quite a few files. These files are deleted when
    the Maintenance Cleanup Task is run (subject to the period of time specified).

    *   The Maintenance Cleanup task cleans up the .bak and .trn files in the file
    system, but you need to have two separate maintenance plans for each file type,
    since we have our file system set up like I do (meaning that we are storing the
    .bak files physically separate from the .trn files).

    *   The History Cleanup Task cleans up history in the tasks themselves, and not
    the physical files. When you right-click a job and select View History, that history
    goes away when the History Cleanup Task is run (subject to the period of time
    specified) because these rows are removed from the msdb database.


    Now that we understand the difference between the two types of cleanup tasks,
    let’s look at setting up the Maintenance Cleanup Task.'
