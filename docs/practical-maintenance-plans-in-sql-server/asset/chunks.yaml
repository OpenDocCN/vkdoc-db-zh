    使用此模型，我们可以恢复到给定日期的任何小时，这意味着最多会丢失 1 小时的数据。如果这是可以接受的，我们可以继续。如果不能，我们可以调整备份之间的时间。不过，我们现在将保持这个计划。图
    2-11 显示了您现在屏幕上应该看到的内容。


    ![A396023_1_En_2_Fig11_HTML.jpg](img/A396023_1_En_2_Fig11_HTML.jpg)


    图 2-11. 新作业计划


    请注意，默认值并不是我们进行完整备份所需要的。要使我们的计划可用，您只需下拉 `Occurs` 菜单并选择 `Daily`。就这样。注意 `Summary`
