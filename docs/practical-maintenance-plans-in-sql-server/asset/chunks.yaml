    What tasks do we want to run along with the differential backups run every 6 hours?
    We want this to be sort of a refresh period; a quick water break, so to speak.


    In particular, we want to run the following jobs, in this order:


    *   `Check Integrity`

    *   `Reorganize Index`

    *   `Shrink Database`

    *   `Update Statistics`

    *   `Backup Maintenance Plan.Differential Backup`


