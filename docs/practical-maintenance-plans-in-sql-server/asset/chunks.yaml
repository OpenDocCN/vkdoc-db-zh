  trans: '## 从 T-SQL 脚本启动作业


    启动作业的脚本相对简单，大致如下：


    ```

    EXEC msdb.dbo.sp_start_job @job_name=N''Backup Maintenance Plan.Backup Database
    (Transaction Log)'';

    ```


    在这个例子中，我想要启动事务日志作业。在“新建查询”窗口中输入此查询并按 F5 执行，你将看到如下状态。


    ![A396023_1_En_13_Figa_HTML.jpg](img/A396023_1_En_13_Figa_HTML.jpg)


    关于这个脚本的一点说明：它是一个存储过程，针对 `msdb` 数据库中的 `sysjobs` 表运行启动命令。要查看这个表，只需在“新建查询”窗口中输入以下查询并按
    F5。


    ```

    SELECT * FROM msdb.dbo.sysjobs;

    ```


    图 13-72 展示了该查询返回的结果。


    ![A396023_1_En_13_Fig72_HTML.jpg](img/A396023_1_En_13_Fig72_HTML.jpg)


    图 13-72. 查询结果


    看起来很熟悉吧？这就是我们创建的所有作业，还有一些详细信息。挺酷的！


    现在，打开 SQL Server 代理中的“作业活动监视器”。图 13-73 展示了此时你应该看到的内容。


    ![A396023_1_En_13_Fig73_HTML.jpg](img/A396023_1_En_13_Fig73_HTML.jpg)


    图 13-73. 作业活动监视器


    嗯，我们所有的作业都在这里，排列整齐，告诉我们各种无用的信息。你可以看到除了 `E-mail User Information`，其他所有作业都已启用。它们都处于
    `空闲` 状态，意味着当前没有在运行。它们上次运行时都成功了。如果你向右滚动，会看到 `上次运行` 和 `下次运行` 列。猜猜这些告诉你什么？这是快速查看你的作业是否正常运行的好方法。如果作业有问题，就在这里可以发现。你可以在这里右键单击任何作业并进行一些破坏性操作，所以请清楚自己在做什么。


    > **提示**

    > 需要注意的是，你不应删除额外的维护计划。它们与所包含的作业是绑定的，如果你删除了维护计划，就会连带删除对应的作业。猜猜那时会发生什么？笨蛋帽子。你猜对了。


    在我们结束之前，还有一件事。在 `SSMS 对象资源管理器` 中，单击 `连接` 并连接到 `Integration Services`。如果你无法连接到
    `Integration Services`，那么只需以管理员身份启动 `SSMS`，应该就可以了。


    展开 `存储的包` 文件夹，然后是 `MSDB`，接着是 `维护计划`。此时你应该看到如图 13-74 所示的内容。


    ![A396023_1_En_13_Fig74_HTML.jpg](img/A396023_1_En_13_Fig74_HTML.jpg)


    图 13-74. Integration Services 维护计划


    右键单击我们的 `Backup Maintenance Plan` 并选择 `导出包…`。随后将出现图 13-75。


    ![A396023_1_En_13_Fig75_HTML.jpg](img/A396023_1_En_13_Fig75_HTML.jpg)


    图 13-75. 导出包


    我们想将包路径更改为 `E:\SQL Server` 下的一个新文件夹，所以我们称它为 `DTSX`。这意味着我们的维护计划备份位置将是 `E:\SQL Server\DTSX\Backup
    Maintenance Plan.dtsx`，所以输入这个路径，然后单击 `确定`。其他所有设置保持原样即可。如果你检查那个目录，会看到那个文件现在就在里面。你甚至可以双击这些
    `.dtsx` 文件来执行它们。


    为所有其他维护计划也执行此操作，以防万一。现在，我们已经备份了我们完成的所有工作，以防原始文件发生意外。


    让我们测试一下！哦，看，一个恶意用户闯入了数据库并删除了 `Update Statistics Plan` 维护计划。看图 13-76——它消失了！


    ![A396023_1_En_13_Fig76_HTML.jpg](img/A396023_1_En_13_Fig76_HTML.jpg)


    图 13-76. 维护计划


    真糟糕，图 13-77 显示作业也不见了！


    ![A396023_1_En_13_Fig77_HTML.jpg](img/A396023_1_En_13_Fig77_HTML.jpg)


    图 13-77. SQL Server 代理作业


    我们该怎么办呢？哦对了，我们做了备份。我们能轻松地把它加回来吗？能。'
- fmt: '### **导出与导入维护计划包**


    连接到 Integration Services 并检查“维护计划”文件夹。它也不见了。不过不用担心；只需右键单击此文件夹并选择“导入包…”，即可显示图 [13-78](#A396023_1_En_13_Chapter.html#Fig78)。


    ![A396023_1_En_13_Fig78_HTML.jpg](A396023_1_En_13_Fig78_HTML.jpg)

    **图 13-78. 导入包**


    单击“包路径”旁边的省略号按钮，导航到我们的 `DTSX` 文件夹位置，`E:\SQL Server\DTSX`。选择 `Update Statistics
    Plan.dtsx` 继续。您的界面现在应该如图 [13-79](#A396023_1_En_13_Chapter.html#Fig79) 所示。


    ![A396023_1_En_13_Fig79_HTML.jpg](A396023_1_En_13_Fig79_HTML.jpg)

