    第二个区别是向导中缺少 `Notify Operator` 任务。不过，您始终可以在任务本身中设置通知，所以这实际上也不是问题。


    图 1-3（实际上在任何一种界面中）显示的 11 个任务是数据库管理的核心。请注意，所有这些任务都可以在 SQL Server Management Studio
    界面中单独手动完成。并非说这是唯一能找到此功能的地方。恰恰相反；按照 Microsoft 的标准操作规程，完成任何一项任务总是至少有两种方法。


    同样值得指出的是，任意数量的这些任务都可以在同一个维护计划中连接起来，因此您确实可以自由地根据您的确切需求和目的完全自定义维护计划。将任务连接在一起形成一个有凝聚力的维护计划的过程，我称之为计划的“工作流”。没有它，第一个任务运行后就会停止。除非明确指示，否则不会执行其他任务。因此，为了解决这个问题，我们通过定义任务成功或失败的约束来实现；这样，如果出现问题，我们至少可以跟踪错误。


    ## 总结


    让我们开始这次探索吧！您可以使用任何已安装 SSIS 的 SQL Server 实例。这意味着任何 SQL Server 2005 及之后的版本，并且必须是标准版、企业版或商业智能版。尽管本书是专门针对
    SQL Server 2012 编写的，但我也在 SQL Server 2014 上运行了所有内容，除了界面略有不同外，没有任何问题。

    '
- fmt: '# 2. Backing Up a Database


    Backing up a database is arguably the most important aspect to database administration.
    Without backups, you cannot recover in cases of data loss or corruption. You cannot
    rebuild quickly without the data that you, ultimately, are responsible for. Have
    you ever met a DBA that is sort of mehhhh about backups? I guarantee you that
    is because they are either lazy or have never had to recover from a catastrophic
    failure. The worst part about either of those reasons is that one is by choice
    and one is by circumstance, but both can be remediated with a little foresight
    and planning.


    Don’t get me wrong; sometimes, a failure is going to happen. It just will; Murphy’s
    law says so. But that doesn’t mean that we can’t recover from it successfully,
    does it? The purpose of this chapter is to explain not only the importance of
    regular backups, but also the proper way to structure these into a cohesive and
    complete maintenance plan.


    The one thing I want you to take from this chapter is one simple sentence: it
    makes absolutely no sense at all to NOT have `database backups`.


    As you can guess, there are multiple different facets to `database backups` though.
    Let’s look at those before I explain the actual task itself.


    *   `Recovery models`: This is how your database is set up to recover lost data.
    This is typically set during the installation of the database engine, but can
    be changed at any time.

    *   `Backup types`: Certain types of `recovery models` allow for certain types
    of `backups`. This can also be changed at any time, depending on the settings
    of the `recovery model` of the database needing to be backed up.


    ## Recovery Models


    An important note before starting this is that the `recovery model` for a specific
    database comes into play here. What is a `recovery model`? Simply put, it tells
    the database how to recover and in what way. The `recovery model` is set in the
    initial setup and configuration of the database, but can also be accessed by `right-clicking
    the database name and choosing Properties`. `Choose Options from the menu choices`,
    shown on the left in `Figure 2-1`, and the second option down will show the `Recovery
    Mode`.


    ![A396023_1_En_2_Fig1_HTML.jpg](A396023_1_En_2_Fig1_HTML.jpg)


    `Figure 2-1.` Database Properties window


    Let’s look at the differences in `recovery models`. `Figure 2-2` shows the basic
    differences between the models available, so it’s really up to the database administrator
    to determine the actual need or requirement to properly meet the need of the customer
    or application.


    ![A396023_1_En_2_Fig2_HTML.jpg](A396023_1_En_2_Fig2_HTML.jpg)


    `Figure 2-2.` Recovery models


    ### Full


    Using the `Full Recovery model` , data loss is minimal because all of the data
    can be restored unless there is damage to the tail of the `transaction log`. The
    `Full Recovery model` can be thought of as the fail-safe model solution, since
    everything is included in the backup. The only caveat to this is that the `transaction
    log` plays an important role because, if it’s damaged or incomplete, the full
    backup will fail.


    ### Bulk Logged


    The `Bulk Logged Recovery model` is a quick way to recover, but data can only
    be recovered from the last backup. This may not be a problem if the time between
    backups is low. For example, when using the `Bulk Logged Recovery model`, the
    last backup is the only really viable one because that is the only one that can
    be recovered. This means that if the backup period is set to every 6 hours, then
    6 hours is the maximum amount of data that will be lost.


    ### Simple


    All data is lost from the time of the last backup until the data loss event. This
    option is not recommended because the likelihood of data loss is much higher with
    this model than the other two.


    How do the `recovery models` work toward the `Back Up Database` task, though?
    Think about it like this: if you had a database with a `Simple recovery model`,
    but tried to enforce `transaction log backups`, it would fail. Why? Because the
    `Simple recovery model` doesn’t do `transaction log backups`. It’s sort of a sneaky
    way to get you to think about doing things a little bit differently; if you want
    `transaction logs` to be backed up, then you should probably have `transaction
    logs` to backup. Makes sense, right? So, what’s the difference between the `backup
    types`?


    ## Backup Types


    `Figure 2-3` shows that there are three `backup types` in `SQL Server`, each of
    which is unique, but all sort of related. When used correctly, all three can work
    together to give a heightened level of data security to the users.


    ![A396023_1_En_2_Fig3_HTML.jpg](A396023_1_En_2_Fig3_HTML.jpg)


    `Figure 2-3.` Backup types


    ### Full Backups


    `Full backups` back up everything in the database. That is the important part
    to remember; it will not backup the individual settings or components of `SQL
    Server`, in other words.


    ### Differential Backups


    `Differential backups` are related to `full backups` in that `differential backups`
    only have data since the last `full backup`. This can be a hard concept to understand.
    Think of `full backups` being the major yard lines on a football field (10, 20,
    30, 40, etc.) and `differential backups` being the individual yard lines (11,
    12, 13, 14, etc.). Can you get from the 10 yard line straight to the 30? Sure.
    But you can also get there going yard by yard. This is what `differential backups`
    give you— a “yard by yard” capture of the data. The beauty of `differential backups`
    is that data loss is minimized because the only loss is to the last `differential
    backup`. It is also much faster because the only data that is backed up is the
    data added or changed since the last `full backup`. The downside to `differential
    backups` is that the `full backup` must be restored; the `differential backups`
    are then applied to the base data. A `differential backup` without its parent
    `full backup`, for all intents and purposes, is useless since it cannot be used
    to restore anything.'
