    ### 差异备份维护活动


    除了每 6 小时运行一次的差异备份之外，我们还想运行哪些任务？我们希望这有点像一个刷新期；可以说是快速的饮水休息时间。


    具体来说，我们想按以下顺序运行这些作业：


    *   `检查完整性`

    *   `重新组织索引`

    *   `收缩数据库`

    *   `更新统计信息`

    *   `备份维护计划.差异备份`


    等等。这大部分是相同的列表！是的，因为每次备份数据库时，都需要执行大部分相同的操作。主要区别在于我们使用的是 `重新组织` 任务，而不是 `重新生成` 任务，并且我们不清理维护文件或历史记录。这些只在午夜进行，以确保我们与备份计划保持同步。还记得重新组织和重新生成索引的区别吗？`重新组织`
    保持酒店已建好，而 `重新生成` 则将其拆除并全新重建。当我们只需运行一个快速的 `重新组织` 任务然后继续时，不需要花时间去重建。这并没有牺牲什么，因为夜间重建已经处理了这个额外步骤。


    添加这些任务将与上一部分非常相似，因此如有必要，请随意添加它们并继续前进。

