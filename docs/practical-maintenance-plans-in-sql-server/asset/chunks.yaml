- fmt: 'Make sure that you update the job by double-clicking the job in the `Jobs`
    folder under `SQL Server Agent`. I changed the name of mine to `trn Files`, but
    you can pick another name if you want. After you change it, your interface should
    look something like Figure [6-19](#A396023_1_En_6_Chapter.html#Fig19).


    ![A396023_1_En_6_Fig19_HTML.jpg](A396023_1_En_6_Fig19_HTML.jpg)


    Figure 6-19.


    `SQL Server Agent Jobs`


    Do you remember that we created two sections in the maintenance plan to delete
    files? The first part was `Backup Files`, which let us delete `.bak` files. The
    second part was `Logs Cleanup`, which let us delete `.trn` files. The next part
    is to clean up the text files left over by the backup operation.


    ## Text Files Cleanup


    When `SQL Server` runs maintenance operations using `SQL Server Agent`, it creates
    text reports for troubleshooting or general light reading. The `Text Files Cleanup`
    operation we’re going to set up will allow us to clean those files out after a
    certain amount of time. This is fine because a well-maintained database alerts
    a database administrator when there is trouble, which is the only real purpose
    of holding on to the maintenance text files generated by the tasks.


    Starting fresh again, just right-click the `Maintenance Plans` folder under `Management`
    and choose `Maintenance Plan Wizard`. Enter `Text Files Cleanup` as the `Name`,
    and something short and sweet in the `Description` box, and then click the `Change…`
    button to set the schedule. Change the `Occurs` drop-down to `Daily` and leave
    the rest alone, and then click `OK`. Your interface should resemble Figure [6-20](#A396023_1_En_6_Chapter.html#Fig20).


    ![A396023_1_En_6_Fig20_HTML.jpg](A396023_1_En_6_Fig20_HTML.jpg)


    Figure 6-20.


    `Select Plan Properties`


    Click `Next` at this screen. You can choose `Maintenance Cleanup Task` from the
    interface, as shown in Figure [6-21](#A396023_1_En_6_Chapter.html#Fig21).


    ![A396023_1_En_6_Fig21_HTML.jpg](A396023_1_En_6_Fig21_HTML.jpg)


    Figure 6-21.


    `Select Maintenance Tasks`


    Choose `Maintenance Cleanup Task` here and then click `Next`. You will then see
    the interface shown in Figure [6-22](#A396023_1_En_6_Chapter.html#Fig22).


    ![A396023_1_En_6_Fig22_HTML.jpg](A396023_1_En_6_Fig22_HTML.jpg)


    Figure 6-22.


    `Select Maintenance Task Order`


    Click `Next` here, since we only have the one task.


    Previously, we chose `Backup files`. This time, we’re going to choose `Maintenance
    Plan text reports`. This is because we needed to set up a different task to delete
    different types of files, if you recall.


    We are going to set this to point at our `Backups` directory, because that’s where
    we saved the maintenance plan text reports. These were stored as `.txt` files
    (defined back in Chapter [2](#A396023_1_En_2_Chapter.html) for report options).
    Your completed interface should look like Figure [6-23](#A396023_1_En_6_Chapter.html#Fig23)
    when you are finished.


    ![A396023_1_En_6_Fig23_HTML.jpg](A396023_1_En_6_Fig23_HTML.jpg)


    Figure 6-23.


    `Define Maintenance Cleanup Task`


    Going through the options, you can see that the folder is defined to our `Backups`
    location, and the `.txt` file extension specified. Remember that this is the default
    extension for text reports generated by `SQL Server`. Also note that I changed
    the time selection to three days instead of four weeks. What does this mean? It
    means that I want to delete all `.txt` files in the `E:\SQL Server\Backups` directory
    and those files in the first-level subdirectories that are older than three days
    when the task is run.


    Click `Next` when you are ready and you will see the `Select Report Options` interface
    shown in Figure [6-24](#A396023_1_En_6_Chapter.html#Fig24). Modify it as we did
    before (to write the detail log to our `Backups` directory) and alert us by email.


    ![A396023_1_En_6_Fig24_HTML.jpg](A396023_1_En_6_Fig24_HTML.jpg)


    Figure 6-24.


    `Select Report Options`


    Once you see this, click `Next` and review the summary. You should see what is
    shown in Figure [6-25](#A396023_1_En_6_Chapter.html#Fig25).


    ![A396023_1_En_6_Fig25_HTML.jpg](A396023_1_En_6_Fig25_HTML.jpg)


    Figure 6-25.


    `Complete the Wizard`


    Go over these options carefully. Everything looks good, so click `Finish` again.
    You should (hopefully) see what is shown in Figure [6-26](#A396023_1_En_6_Chapter.html#Fig26).


    ![A396023_1_En_6_Fig26_HTML.jpg](A396023_1_En_6_Fig26_HTML.jpg)


    Figure 6-26.


    `Maintenance Plan Wizard Progress`


    It’s a thing of beauty.


    Again, make sure that you change the job name as described earlier—and update
    the job while you’re at it. I named mine `txt Files`. It’s up to you what you
    want to name yours, as long as it is easily recognizable. When you are finished,
    you should see the `Jobs` layout shown in Figure [6-27](#A396023_1_En_6_Chapter.html#Fig27).


    ![A396023_1_En_6_Fig27_HTML.jpg](A396023_1_En_6_Fig27_HTML.jpg)


    Figure 6-27.


    `SQL Server Agent Jobs`


    Your `Maintenance Plans` folder should appear as shown in Figure [6-28](#A396023_1_En_6_Chapter.html#Fig28).


    ![A396023_1_En_6_Fig28_HTML.jpg](A396023_1_En_6_Fig28_HTML.jpg)


    Figure 6-28.


    `Maintenance Plans`


    This all looks really good so far. Notice how we have separated each task into
    its own maintenance plan or task. This is going to be important in later chapters.


    Let’s review what we did in this chapter, because this was perhaps the one chapter
    that could really screw up your database.


    ## Summary


    We learned that there are two different types of maintenance cleanup tasks that
    can be run: one that cleans up the files necessary for restoring data to the database
    (`.bak` and `.trn` files), and one for the maintenance plan text reports (`.txt`
    files). We also created three maintenance plans: `Backups Cleanup` (which deleted
    the `.bak` files), `Logs Cleanup` (which deleted the `.trn` files), and `Text
    Files Cleanup` (which deleted the `.txt` files). These three maintenance plans
    are going to be run separately and will delete the files specified by the individual
    plan.


    If any part of this chapter is unclear, I urge you to go back and redo the exercises
    so that you can really get a grasp of what is going on and why. I want to take
    a moment again to stress how important it is to understand exactly what is being
    backed up and deleted, and why. It makes no sense to have a backup plan that constantly
    fails, so if you see failures in yours, troubleshoot them until you find the issue.
    Work to resolve them as soon as possible, because if you can’t restore the data
    that you’ve been entrusted to protect, you are pretty much redundant. This concept
    is absolutely vital to the success of any database administrator.


    ### Tip


    Theory is important, but unless it’s put in practice, it is almost useless.'
