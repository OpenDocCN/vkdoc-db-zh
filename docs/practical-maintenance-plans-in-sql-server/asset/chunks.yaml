    Work to resolve them as soon as possible, because if you can’t restore the data
    that you’ve been entrusted to protect, you are pretty much redundant. This concept
    is absolutely vital to the success of any database administrator.


    Tip


    Theory is important, but unless it’s put in practice, it is almost useless.'
  trans: '请确保通过双击`SQL Server Agent`下`Jobs`文件夹中的作业来更新作业。我已将我自己的作业名称改为`trn Files`，但你可以根据需要选择其他名称。更改后，你的界面应类似于图
    6-19。


    ![A396023_1_En_6_Fig19_HTML.jpg](img/A396023_1_En_6_Fig19_HTML.jpg)


    图 6-19.


    `SQL Server Agent Jobs`


    还记得我们在维护计划中创建了两个部分来删除文件吗？第一部分是`Backup Files`，用于删除`.bak`文件。第二部分是`Logs Cleanup`，用于删除`.trn`文件。接下来的部分是清理备份操作留下的文本文件。


    ## 文本文件清理


    当`SQL Server`使用`SQL Server Agent`运行维护操作时，它会创建文本报告，用于故障排除或一般性查阅。我们将设置的`Text Files
    Cleanup`操作，将允许我们在一段时间后清理这些文件。这是可以的，因为一个维护良好的数据库会在出现故障时向数据库管理员发出警报，这正是保留任务生成的维护文本文件的唯一真正目的。


    重新开始，只需右键单击`Management`下的`Maintenance Plans`文件夹，然后选择`Maintenance Plan Wizard`。在`Name`框中输入`Text
    Files Cleanup`，在`Description`框中输入简短描述，然后单击`Change…`按钮设置计划。将`Occurs`下拉菜单更改为`Daily`，其余保持不变，然后单击`OK`。你的界面应类似于图
    6-20。


    ![A396023_1_En_6_Fig20_HTML.jpg](img/A396023_1_En_6_Fig20_HTML.jpg)


    图 6-20.


    `选择计划属性`


    在此屏幕单击`Next`。你可以从界面中选择`Maintenance Cleanup Task`，如图 6-21 所示。


    ![A396023_1_En_6_Fig21_HTML.jpg](img/A396023_1_En_6_Fig21_HTML.jpg)


    图 6-21.


    `选择维护任务`


    在此处选择`Maintenance Cleanup Task`，然后单击`Next`。你将看到如图 6-22 所示的界面。


    ![A396023_1_En_6_Fig22_HTML.jpg](img/A396023_1_En_6_Fig22_HTML.jpg)


    图 6-22.


    `选择维护任务顺序`


    因为我们只有一个任务，所以在此处单击`Next`。


    之前，我们选择了`Backup files`。这次，我们将选择`Maintenance Plan text reports`。这是因为，如果你还记得，我们需要设置不同的任务来删除不同类型的文件。


    我们将把此项指向我们的`Backups`目录，因为这就是我们保存维护计划文本报告的地方。这些报告存储为`.txt`文件（在 2 章中为报告选项定义）。完成时，你的完整界面应如图
    6-23 所示。


    ![A396023_1_En_6_Fig23_HTML.jpg](img/A396023_1_En_6_Fig23_HTML.jpg)


    图 6-23.


    `定义维护清理任务`


    浏览选项，你可以看到文件夹定义为我们的`Backups`位置，并指定了`.txt`文件扩展名。请记住，这是`SQL Server`生成的文本报告的默认扩展名。另请注意，我将时间选择从四周改为三天。这意味着什么？这意味着我希望在运行任务时，删除`E:\SQL
    Server\Backups`目录及其一级子目录中所有超过三天的`.txt`文件。


    当你准备好后，单击`Next`，你将看到如图 6-24 所示的`选择报告选项`界面。像之前一样修改它（将详细日志写入我们的`Backups`目录）并通过电子邮件提醒我们。


    ![A396023_1_En_6_Fig24_HTML.jpg](img/A396023_1_En_6_Fig24_HTML.jpg)


    图 6-24.


    `选择报告选项`


    看到此界面后，单击`Next`并查看摘要。你应该看到如图 6-25 所示的内容。


    ![A396023_1_En_6_Fig25_HTML.jpg](img/A396023_1_En_6_Fig25_HTML.jpg)


    图 6-25.


    `完成向导`


    仔细查看这些选项。一切看起来都很好，所以再次单击`Finish`。你（希望）将看到如图 6-26 所示的内容。


    ![A396023_1_En_6_Fig26_HTML.jpg](img/A396023_1_En_6_Fig26_HTML.jpg)


    图 6-26.


    `维护计划向导进度`


    这真是一件赏心悦目的事。


    再次，请确保如前所述更改作业名称——并顺便更新作业。我将其命名为`txt Files`。你可以根据自己的喜好命名，只要易于识别即可。完成后，你应该看到如图
    6-27 所示的`作业`布局。


    ![A396023_1_En_6_Fig27_HTML.jpg](img/A396023_1_En_6_Fig27_HTML.jpg)


    图 6-27.


    `SQL Server Agent Jobs`


    你的`Maintenance Plans`文件夹应如图 6-28 所示。


    ![A396023_1_En_6_Fig28_HTML.jpg](img/A396023_1_En_6_Fig28_HTML.jpg)


    图 6-28.


    `维护计划`


    到目前为止，一切看起来都很不错。注意我们是如何将每个任务分离到其自己的维护计划或任务中的。这在后面的章节中将非常重要。


    让我们回顾一下本章所做的事情，因为这一章可能是真正会搞砸你数据库的一章。


    ## 总结


    我们了解到有两种不同类型的维护清理任务可以运行：一种用于清理恢复数据到数据库所必需的文件（`.bak`和`.trn`文件），另一种用于维护计划文本报告（`.txt`文件）。我们还创建了三个维护计划：`Backups
    Cleanup`（删除`.bak`文件）、`Logs Cleanup`（删除`.trn`文件）和`Text Files Cleanup`（删除`.txt`文件）。这三个维护计划将分别运行，并删除各个计划指定的文件。


    如果本章有任何部分不清楚，我强烈建议你返回并重新操作练习，以便真正掌握正在发生的事情及其原因。我想再次花点时间强调，确切理解正在备份和删除的内容以及为何这样做，是*至关重要*的。一个持续失败的备份计划毫无意义，所以如果你的计划出现故障，请进行故障排除，直到找到问题所在。努力尽快解决它们，因为如果你无法恢复你受托保护的数据，你基本上就是多余的。这个概念对于任何数据库管理员的成功都*绝对至关重要*。


    ### 提示


    理论很重要，但除非付诸实践，否则几乎毫无用处。'
- fmt: '# 7. Rebuilding Indexes


    What is an index and why does it need to be rebuilt? An index is what `SQL Server`
    uses to retrieve rows from a table. The obvious similarity is to the index of
    a book; if you need to know about a certain topic, flip to the back and check
    the index. It tells you right where to find exactly what you’re looking for.


    You can have a table without an index defined. In this case, it’s just a heap
    of data, so it’s termed a *heap table*. Storing data as a heap isn’t very efficient,
    as the entire table must be scanned in order to return the data you are requesting
    in a query. Instead, when you use indexes, the data is retrieved much quicker
    and more efficiently.


    If you have a small database, is it worth it to create an index on a table? In
    short, yes. It is always worth it, because databases often tend to grow. When
    the administrative work is done at the beginning, it doesn’t need to be done later.
    And when you define indexes early on, and then set up a maintenance task to automatically
    rebuild those indexes, you are coming out way ahead of the game, because over
    time, the indexes start to “drift.” They may reference obsolete data, or large
    parts of the pages may be missing. Rebuilding the indexes makes sure that these
    things don’t happen, because they are all organized (which, if you ask my wife,
    is not my greatest strength).


    For the first part of this chapter, I am going to go briefly into indexes in `SQL
    Server`. I say briefly because there isn’t enough room in this book to explain
    every single concept, so I’m going to assume that you have at least heard of indexes.
    Then in the second part of this chapter, we will actually get to the maintenance
    task to use to maintain your indexes.


    ## Indexes Explained


    Maybe you don’t really know or understand what indexes are or how they work. Believe
    it or not, that’s okay! Not long term, but the first step is realization, right?
    More than likely, if you’re not very familiar with indexes, then you’re either
    a new database administrator or a seasoned `DBA` that just hasn’t had the time
    or inclination to get into the weeds of how indexes work.


    The best way that I can think of to describe indexes is to say that they are ways
    that `SQL Server` can access table data quickly by assuming certain things about
    how the data is accessed. You can have zero indexes on a table; that is completely
    acceptable. Not efficient at all, but acceptable. Think if you wanted to search
    for a certain word or phrase in this book, a standalone word like *interface*.
    I’ve said that word a lot, right? Can you imagine going through every page of
    this book just to find the locations where the word “interface” was used? That
    would take a long time! Imagine instead if you had an index that told you exactly
    where you could find these occurrences. That’s what indexes do for your database.


    From this point on, there are two things about every single reader. Every one
    of you will fall into one of these two categories:


    *   You already have indexes on your tables. You also need to manage them, either
    willingly or reluctantly.

    *   You don’t currently have indexes, but recognize a need for them.


    That’s it. Either you have them and want to manage them, or you don’t and want
    to implement them. For the rest of this section, I’m going to work from the assumption
    that you don’t currently have indexes. Skip ahead if you are solid in your understanding
    of indexes and how they work.


    ### Beginning Indexes


    Let’s start from the very beginning. How do you know if you even have an index?
    Simple. Go to `SQL Server Management Studio` and expand your database. Then expand
    a table that needs an index. Look at that—a folder named `Indexes`. Click the
    little plus-sign there. If it expands, there are indexes and the type is shown
    to you. If it doesn’t expand, there are no indexes on that table.


    At this point, you may be surprised to find that you had an index all along. If
    you inherited the database, then it may well be a custom index defined by the
    previous `DBA`. More than likely, it’s a primary key.


    How to tell if it’s a primary key index? Just right-click the table name and choose
    `Design`, and then look for the little key next to a column name. That’s your
    primary key.


    If you had a primary key index, then let’s look at what you can do with it from
    here. Right-click the index and choose `Properties`. You should see something
    similar to Figure 7-1.


    ![A396023_1_En_7_Fig1_HTML.jpg](A396023_1_En_7_Fig1_HTML.jpg)


    Figure 7-1. Index Properties


    Look at that! You have a clustered index on that table. Look at the part that
    says “Index key columns” there. It says that the `UID` is sorted in ascending
    order as an integer, it is an identity field, and it does not allow `NULL` values.
    What that tells us is that, with this index in place, data is returned sorted
    by the `UID` field in ascending order—smallest to largest values.


    Let’s say that you wanted the values to be returned in descending order, though.
    What can you do? You can’t edit the index from this screen. You could always add
    another index, but you can’t add another clustered index; it has to be nonclustered
    (more on the differences between those later), so that doesn’t make any sense.
    The last option is to delete this index and create a new one.


    Go ahead and close the `Index Properties` screen, if it’s still open. Right-click
    the index in the `Indexes` folder and choose `Delete`. You’re going to get a screen
    that looks like Figure 7-2. When you do, just click `OK`.


    ![A396023_1_En_7_Fig2_HTML.jpg](A396023_1_En_7_Fig2_HTML.jpg)


    Figure 7-2. Delete Object


    It is now deleted.


    Again, right-click the `Indexes` folder and choose `New Index` → `Clustered Index`.
    You will get an interface, as shown in Figure 7-3.


    ![A396023_1_En_7_Fig3_HTML.jpg](A396023_1_En_7_Fig3_HTML.jpg)


    Figure 7-3. New Index


    This lets you set up the index. When you choose a primary key, this is all done
    for you. This way gives you slightly more control, as you will see.


    You can see that the table name is automatically added for you, but then a great
    big ugly `Index name` is defined. Go ahead and change that to `IX_Users`. Click
    the `Unique` check box as well. Next, click the `Add` button there on the right.
    You are shown a list of the columns in the table, so choose the column that you
    want to index and click `OK`. You should then see the screen shown in Figure 7-4.


    ![A396023_1_En_7_Fig4_HTML.jpg](A396023_1_En_7_Fig4_HTML.jpg)


    Figure 7-4. New Index (updated)


    I said earlier that we wanted to show the values sorted in descending order. This
    is where we define that value. Pull down the menu under the `Sort Order` column
    shown in Figure 7-4 and select `Descending`. You should now see what is shown
    in Figure 7-5.


    ![A396023_1_En_7_Fig5_HTML.jpg](A396023_1_En_7_Fig5_HTML.jpg)


    Figure 7-5. New Index (updated)


    The only other thing we have to do is define where the index should live, so click
    the `Storage` option on the left. You should now see what is shown in Figure 7-6.


    ![A396023_1_En_7_Fig6_HTML.jpg](A396023_1_En_7_Fig6_HTML.jpg)


    Figure 7-6. New Index, Storage option'
