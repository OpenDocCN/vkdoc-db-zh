    \ [13-55](#A396023_1_En_13_Chapter.html#Fig55) 类似。\n\n![A396023_1_En_13_Fig55_HTML.jpg](A396023_1_En_13_Fig55_HTML.jpg)\n\
    \n图 13-55. 设计台面上的执行 SQL Server 代理作业任务\n\n双击我们刚刚添加的任务，从列表中选择 `Shrink Database`\
    \ 任务，然后单击“确定”。通过长按并更新来修改任务名称。完成后，您应该看到如图 [13-56](#A396023_1_En_13_Chapter.html#Fig56)\
    \ 所示的界面。\n\n![A396023_1_En_13_Fig56_HTML.jpg](A396023_1_En_13_Fig56_HTML.jpg)\n\
    \n图 13-56. 设计台面上的执行 SQL Server 代理作业任务（已更新）\n\n## 添加更新统计信息任务\n\n从工具栏中单击并拖动 `Execute\
    \ SQL Server Agent Job` 到设计台面，但这次将其放置在“收缩数据库”任务和“备份”任务之间。最终结果应与图 [13-57](#A396023_1_En_13_Chapter.html#Fig57)\
    \ 所示内容类似。\n\n![A396023_1_En_13_Fig57_HTML.jpg](A396023_1_En_13_Fig57_HTML.jpg)\n\
    \n图 13-57. 设计台面上的执行 SQL Server 代理作业任务\n\n双击我们刚刚添加的任务，从列表中选择 `Update Statistics`\
    \ 任务，然后单击“确定”。通过长按并更新来修改任务名称。完成后，您应该看到如图 [13-58](#A396023_1_En_13_Chapter.html#Fig58)\
    \ 所示的界面。\n\n![A396023_1_En_13_Fig58_HTML.jpg](A396023_1_En_13_Fig58_HTML.jpg)\n\
    \n图 13-58. 设计台面上的执行 SQL Server 代理作业任务（已更新）\n\n至此，维护计划的三个部分已就位。但我们还没有为刚刚添加的作业设置计划。维护计划如何知道何时执行这些包呢？\n\
    \n通过利用……\n\n## 前置约束\n\n什么是前置约束？基本上，前置约束是基于表达式或约束的结果来确定任务执行路径的机制。使用前置约束允许我们根据任务的执行状态分配通过、失败或成功值。\n\
    \n例如，假设我们为某个任务设置了一个“成功”约束和一个“失败”约束。我们可以将“失败”约束的结果定义为一个“通知操作员”任务，而将“成功”约束之后定义另一个任务，或者让它正常结束执行。在维护计划工作流中强制执行前置约束将极大地增强对正在运行的任务及其执行条件的可见性。\n\
    \n让我们从完整备份任务开始。首先，稍微分开您的任务，如图 [13-59](#A396023_1_En_13_Chapter.html#Fig59) 所示。为自己留出一些工作空间。这里有九个任务，所以会占用相当大的空间。请注意黄色高亮部分，它展示了如何组织这些任务。\n\
    \n![A396023_1_En_13_Fig59_HTML.jpg](A396023_1_En_13_Fig59_HTML.jpg)\n\n图 13-59.\
    \ 完整备份前置约束映射\n\n单击“检查完整性”，任务底部会出现一个绿色小箭头。单击该箭头并将其拖动到设计台面上的“重新生成索引”任务。完成后，您应该看到如图\
    \ [13-60](#A396023_1_En_13_Chapter.html#Fig60) 所示的内容。\n\n![A396023_1_En_13_Fig60_HTML.jpg](A396023_1_En_13_Fig60_HTML.jpg)\n\
    \n图 13-60. 完整备份前置约束（已更新）\n\n当它连接到任务时，会有点吸附效果，不是吗？这样很好，可以让您清楚它指向哪里。\n\n现在，如果您双击那条绿线，会看到图\
    \ [13-61](#A396023_1_En_13_Chapter.html#Fig61)。\n\n![A396023_1_En_13_Fig61_HTML.jpg](A396023_1_En_13_Fig61_HTML.jpg)\n\
    \n图 13-61. 前置约束编辑器\n\n这被称为“前置约束编辑器”。让我们花点时间看看这些约束。\n\n### 约束选项\n\n约束选项允许我们定义要评估的操作，以及在发现已评估的约束时要采取的操作。我们需要选择一个约束和/或一个表达式进行评估，然后根据约束或表达式的值定义返回值，以便我们捕获条件并相应地进行计划。以下列表对此进行了更详细的说明。\n\
    \n*   评估操作\n    *   `Constraint`\n    *   `Expression`\n    *   `Constraint and\
    \ Expression`\n    *   `Constraint or Expression`\n*   值\n    *   `Success`：作业成功执行，无错误\n\
    \    *   `Failure`：作业失败并导致错误\n    *   `Completion`：作业完成，无论成功或失败"
  raw: "### Adding the Shrink Database Task\n\nClick and drag Execute SQL Server Agent\
    \ Job from the toolbar to the stage, but this time, place it in between the Rebuild\
    \ Index task and the backup task. You should end up looking similar to Figure\
    \ [13-55](#A396023_1_En_13_Chapter.html#Fig55).\n\n![A396023_1_En_13_Fig55_HTML.jpg](A396023_1_En_13_Fig55_HTML.jpg)\n\
    \nFigure 13-55.\n\nExecute SQL Server Agent Job Task on Design Surface Stage\n\
    \nDouble-click the task that we just added, select the Shrink Database task from\
    \ the list, and click OK. Update the name of the task by long-clicking and updating\
    \ it. You should see Figure [13-56](#A396023_1_En_13_Chapter.html#Fig56) when\
    \ you are done.\n\n![A396023_1_En_13_Fig56_HTML.jpg](A396023_1_En_13_Fig56_HTML.jpg)\n\
    \nFigure 13-56.\n\nExecute SQL Server Agent Job Task on Design Surface Stage (updated)\n\
    \n### Adding the Update Statistics Task\n\nClick and drag Execute SQL Server Agent\
    \ Job from the toolbar to the stage, but this time, place it in between the Shrink\
    \ Database task and the backup task. You should end up looking similar to what’s\
    \ shown in Figure [13-57](#A396023_1_En_13_Chapter.html#Fig57).\n\n![A396023_1_En_13_Fig57_HTML.jpg](A396023_1_En_13_Fig57_HTML.jpg)\n\
    \nFigure 13-57.\n\nExecute SQL Server Agent Job Task on Design Surface Stage\n\
    \nDouble-click the task that we just added, select the Update Statistics task\
    \ from the list, and click OK. Update the name of the task by long-clicking and\
    \ updating it. You should see what’s shown in Figure [13-58](#A396023_1_En_13_Chapter.html#Fig58)\
    \ when you are done.\n\n![A396023_1_En_13_Fig58_HTML.jpg](A396023_1_En_13_Fig58_HTML.jpg)\n\
    \nFigure 13-58.\n\nExecute SQL Server Agent Job Task on Design Surface Stage (updated)\n\
    \nSo there are the three parts of the maintenance plan in place. But we don’t\
    \ have schedules for the jobs we just added. How is the maintenance plan going\
    \ to know when to execute the packages?\n\nBy using the power of…\n\n## Precedence\
    \ Constraints\n\nWhat is a precedence constraint ? Basically, a precedence constraint\
    \ is what determines the path of execution for a task based on the outcome of\
    \ an expression or constraint. Using precedence constraints allows us to assign\
    \ pass, fail, or success values based on the state of execution of the task.\n\
    \nFor example, let’s assume that we have a Success constraint and a Failure constraint\
    \ for a task. We could define a Notify Operator task as a result of the Failure\
    \ constraint, and either define another task after the Success constraint, or\
    \ let it cease execution normally. Enforcing precedence constraints in a maintenance\
    \ plan workflow will greatly enhance the visibility into the tasks being run and\
    \ the conditions they are executing under.\n\nLet’s start with the full backup\
    \ tasks. First off, separate your tasks a little bit, as shown in Figure [13-59](#A396023_1_En_13_Chapter.html#Fig59).\
    \ Give yourself some room to work. There are nine tasks in here, so it’s going\
    \ to take up a fair bit of room. Note the yellow highlighter to show you how to\
    \ structure these tasks.\n\n![A396023_1_En_13_Fig59_HTML.jpg](A396023_1_En_13_Fig59_HTML.jpg)\n\
    \nFigure 13-59.\n\nFull Backups Precedence Constraints Map\n\nClick Check Integrity\
    \ and a little green arrow will appear on the bottom of the task. Click that arrow\
    \ and drag it to the Rebuild Index task on the stage. You should see what’s shown\
    \ in Figure [13-60](#A396023_1_En_13_Chapter.html#Fig60) when you are done.\n\n\
    ![A396023_1_En_13_Fig60_HTML.jpg](A396023_1_En_13_Fig60_HTML.jpg)\n\nFigure 13-60.\n\
    \nFull Backups Precedence Constraints (updated)\n\nIt kind of snaps to the task\
    \ when it connects, doesn’t it? That’s good though, so you know where it is heading.\n\
    \nNow, if you double-click that green line, you see Figure [13-61](#A396023_1_En_13_Chapter.html#Fig61).\n\
    \n![A396023_1_En_13_Fig61_HTML.jpg](A396023_1_En_13_Fig61_HTML.jpg)\n\nFigure\
    \ 13-61.\n\nPrecedence Constraint Editor\n\nThis is called the Precedence Constraint\
    \ Editor. Let’s take a look at these constraints for a minute.\n\n### Constraint\
    \ Options\n\nConstraint options allow us to define what operation to evaluate,\
    \ and what action to take when an evaluated constraint is discovered. We need\
    \ to choose a constraint and/or an expression to evaluate, and then define the\
    \ return value based on the value of the constraint or expression so we can catch\
    \ the condition and plan accordingly. The following list explains this in a bit\
    \ more detail.\n\n*   Evaluation Operation\n    *   Constraint\n    *   Expression\n\
    \    *   Constraint and Expression\n    *   Constraint or Expression\n*   Value\n\
    \    *   Success: the job executes successfully, without error\n    *   Failure:\
    \ the job fails and causes an error\n    *   Completion: the job completes, whether\
    \ success or failure"
