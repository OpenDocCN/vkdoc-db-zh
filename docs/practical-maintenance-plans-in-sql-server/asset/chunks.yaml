    ![A396023_1_En_13_Fig50_HTML.jpg](img/A396023_1_En_13_Fig50_HTML.jpg)


    图 13-50. 设计图面上的执行 SQL Server 代理作业任务


    双击设计图面上的任务，勾选 `数据库完整性计划.检查完整性` 旁边的复选框，然后单击 `确定`。通过长按任务来更新名称。如果您长按顶部的任务名称，可以将其更改为
    `检查完整性`，如图 13-51 所示。


    ![A396023_1_En_13_Fig51_HTML.jpg](img/A396023_1_En_13_Fig51_HTML.jpg)


    图 13-51. 设计图面上的执行 SQL Server 代理作业任务（已更新）


