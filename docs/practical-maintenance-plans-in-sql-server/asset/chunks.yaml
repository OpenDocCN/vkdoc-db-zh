  trans: '

    当你初次进入这个界面时，看到的就是这个。此屏幕允许您定义连接（如果您有多个连接的话），并输入 T-SQL 语句。您也可以在此处定义执行超时。该值以秒为单位，0
    表示将一直运行直至完成。


    我们将要输入的 T-SQL 语句会是简短而精炼的：


    ```sql

    SELECT firstname + '' '' + lastname FROM users ORDER BY userid;

    ```


    这会从数据库的 `Users` 表中给我们返回拼接后的用户名。


    准备好后点击 `OK` 继续。注意，在图 11-8 中，红色的 X 消失了，界面看起来更完整了。


    ![A396023_1_En_11_Fig8_HTML.jpg](img/A396023_1_En_11_Fig8_HTML.jpg)


    图 11-8. 执行 T-SQL 语句任务详情（已完成）


    请注意，在这里您可以保留通用的 `Execute T-SQL Statement Task` 文本，也可以输入一个新值。操作方法是长按文本直至其可编辑，输入新值，然后按
    `Enter`。我做了这个操作，并将其改为了 `Run Some SQL`，如图 11-9 所示。


    ![A396023_1_En_11_Fig9_HTML.jpg](img/A396023_1_En_11_Fig9_HTML.jpg)


    图 11-9. 执行 T-SQL 语句任务详情（已更新）


    现在设置好了，我们来看一下其中的一些设置。右键单击并选择 `Properties`。天哪，这么多属性。要逐一定义它们需要再写一整章，所以我们暂且假设这里的一切都没问题，直接看一个有趣的部分。


    寻找名为 `SqlStatementSourceType` 的属性，如图 11-10 所示。


    ![A396023_1_En_11_Fig10_HTML.jpg](img/A396023_1_En_11_Fig10_HTML.jpg)


    图 11-10. SqlStatementSourceType


    这个属性是关键。`SqlStatementSourceType` 属性默认设置为 `DirectInput`。其他值是 `FileConnection` 和
    `Variable`。在我们继续之前，先分别看看图 11-11 中的这些选项。


    ![A396023_1_En_11_Fig11_HTML.jpg](img/A396023_1_En_11_Fig11_HTML.jpg)


    图 11-11. 源类型概述


    明白了吗？这些是定义需要运行的 SQL 的三种方式。如果这三种方法都不能满足您的需求，那我也不知道该说什么了。老实说，我想不出其他可以运行的方式了；除非是存储过程，这可以通过将
    `IsStoredProcedure` 的值从默认的 `False` 改为 `True` 来设置。


    在本练习中，我们将坚持使用 `DirectInput`，但我强烈建议您，如果还没有尝试过，请务必探索另外两种执行此步骤的方法。


    保存并关闭该计划，然后返回 `Maintenance Plans` 部分，刷新 `Maintenance Plans` 文件夹以查看该计划。


    打开 `Jobs` 文件夹。该计划就在接近底部的位置。图 11-12 显示了这个新作业与其他作业在一起。


    ![A396023_1_En_11_Fig12_HTML.jpg](img/A396023_1_En_11_Fig12_HTML.jpg)


    图 11-12. SQL Server Agent 作业


    有趣！现在，我们有了一个作业……但它成功运行了吗？是失败还是成功？我们并没有以这种方式设置任何这些。还记得之前设置的所有那些选项吗？它们去哪儿了？


    嗯，可以这样想。以这种方式创建任务让您有机会纯粹从任务侧进行操作，而不是从计划或报告侧。这种方式让我们能够专注于我们具体想做什么。实现它将是另一回事，但它并不像您想象的那么难。


    ## 实现维护计划


    任务已经设置好了，现在让我们付诸实践。我们该怎么做呢？只需在 `SQL Server Agent` 下双击作业名称（我的是 `T-SQL Plan.T-SQL
    Task`），就行了，如图 11-13 所示。


    ![A396023_1_En_11_Fig13_HTML.jpg](img/A396023_1_En_11_Fig13_HTML.jpg)


    图 11-13. 作业属性，常规选项卡


    哦，谢天谢地。我们终于回到了熟悉的领域！从这里开始，像往常一样进行设置；如果您愿意，可以给它一个新名称并更新描述。我将我的改为了 `T-SQL Task`。请注意，我们当前位于左侧的
    `General` 选项卡。现在让我们逐步查看其他选项卡。


    我们现在位于 `Steps` 选项卡。最初，此界面看起来类似于您在图 11-14 中看到的内容。


    ![A396023_1_En_11_Fig14_HTML.jpg](img/A396023_1_En_11_Fig14_HTML.jpg)


    图 11-14. 作业属性，步骤选项卡


    一切都为我们设置好了！不过，有几处小地方我想改动一下，所以请点击 `Edit`，然后点击 `Advanced`。此时您应该会看到如图 11-15 所示的界面。


    ![A396023_1_En_11_Fig15_HTML.jpg](img/A396023_1_En_11_Fig15_HTML.jpg)


    图 11-15. 作业属性，步骤选项卡，高级选项


    只需选中“包含步骤输出在历史记录中”复选框即可。


    在此区域完成操作后，点击 `OK`。


    点击左侧的 `Schedules` 继续。此屏幕显示为任务定义的设置，即 `Daily` at `12:00 AM`。还记得之前设置的这个吗？除非您需要更改，否则可以保持原样。


    接下来是 `Alerts` 选项卡，请点击它。我们其实不需要在此设置任何警报，因为我们只是运行一个简单的查询。同样，如果您需要在这里运行什么，请随意。毕竟，这是您的维护计划！


    `Notifications` 是倒数第二个。这是重要的部分。确保您勾选 `E-mail` 框，选择我们的操作员，并将其设置为“当作业完成时”。图 11-16
    显示了推荐的设置。


    ![A396023_1_En_11_Fig16_HTML.jpg](img/A396023_1_En_11_Fig16_HTML.jpg)


    图 11-16. 作业属性，通知选项卡


    在 `Targets` 选项卡上，保持所有内容空白即可。我们根本没有为此部分定义任何内容。


    准备好后，点击 `OK` 以保存对此作业的更改。


    如果您通读了第 4 章，这个设置流程应该很熟悉。如果您还没有读过，那么您绝对应该读一下，以便理解我们正在做什么以及为什么这样做。


    还记得我问过我们如何知道它是否成功了吗？好吧，我们现在就来找出答案。

    '
- fmt: '## Executing the Maintenance Plan


    Right-click the job and choose `Start Job at Step…` to run it. More than likely,
    it failed. Mine did! Figure [11-17](#A396023_1_En_11_Chapter.html#Fig17) shows
    this failure.


    ![A396023_1_En_11_Fig17_HTML.jpg](A396023_1_En_11_Fig17_HTML.jpg)


    Figure 11-17. Start Jobs


    It’s time for some troubleshooting. Click the hyperlink on the right side of this
    box and you will see what is shown in Figure [11-18](#A396023_1_En_11_Chapter.html#Fig18).


    ![A396023_1_En_11_Fig18_HTML.jpg](A396023_1_En_11_Fig18_HTML.jpg)


    Figure 11-18. Start Jobs error


    Wow. Thanks, Microsoft. That tells us nothing useful, except to read the history
    log. Okay, let’s do that then. Close the window that showed the failure, right-click
    the job, and choose `View History`. This opens the interface shown in Figure [11-19](#A396023_1_En_11_Chapter.html#Fig19).


    ![A396023_1_En_11_Fig19_HTML.jpg](A396023_1_En_11_Fig19_HTML.jpg)


    Figure 11-19. Log File Viewer


    Interesting. Expanding this error message shows us “Invalid object name ‘users’.”
    Hmm. Close this window and open the `T-SQL Plan`, as shown in Figure [11-20](#A396023_1_En_11_Chapter.html#Fig20).
    Double-click the `Run Some SQL` task, as also shown in Figure [11-20](#A396023_1_En_11_Chapter.html#Fig20).


    ![A396023_1_En_11_Fig20_HTML.jpg](A396023_1_En_11_Fig20_HTML.jpg)


    Figure 11-20. T-SQL Plan


    Since the error specifically said that ‘users’ was an invalid name, let’s change
    the query to the following, complete with a perfectly valid name:


    ```sql

    SELECT firstname + '' '' + lastname FROM DEVTEST.dbo.users ORDER BY userid;

    ```


    Click `OK` when you’re done and then save the maintenance plan. Go ahead and right-click
    the `T-SQL Task` job and select `Start Job at Step…` to fire it off. Did it work?
    It sure did for me. This is a great lesson in how `SQL Server Agent` isn’t looking
    at our specific database, but is instead looking at `master` as a default.


    If your query is still failing, I’m going to give you a major piece of advice
    here. You can specify the account you want to execute the SQL instead of the `SQL
    Server Agent`, even though you cannot choose another option in `Job Properties`
    > `Steps` > `Edit` > `Run as`. Want to know how?


    Recall that our original query was as follows:


    ```sql

    SELECT firstname + '' '' + lastname FROM users ORDER BY userid;

    ```


    And then we updated that query as follows:


    ```sql

    SELECT firstname + '' '' + lastname FROM DEVTEST.dbo.users ORDER BY userid;

    ```


    That’s the extent of our query. And it is failing. So at this point, we have a
    choice to make: we can either chase down a system administrator and demand heightened
    permissions for the `SQL Server Agent` account on the server, or we can create
    another domain account for the `SQL Server Agent` to be running as (with heightened
    permissions as well). Perhaps there’s a third option, though? Tell me, can you
    successfully run this query by itself? Yes. So why can’t you be set as the “Run
    as” value? Oh, but you can!


    Double-click the `T-SQL Plan` maintenance plan and then double-click the `Run
    Some SQL` task in the gray area shown in Figure [11-21](#A396023_1_En_11_Chapter.html#Fig21).


    ![A396023_1_En_11_Fig21_HTML.jpg](A396023_1_En_11_Fig21_HTML.jpg)


    Figure 11-21. Run Some SQL


    This brings up our `T-SQL` statement box, with the query listed earlier. We’re
    going to change that around just slightly by entering the following SQL instead.


    ```sql

    USE DEVTEST

    GO

    SELECT firstname + '' '' + lastname FROM users ORDER BY userid

    EXEC AS LOGIN = ''[DOMAIN]\[USERNAME]'';

    ```


    Take a look at the first bit… it’s essentially the same as how we defined the
    SQL earlier, isn’t it? That’s right. Choosing to use the `USE` keyword or defining
    the database in the SQL as we did earlier accomplishes the same goal.


    An important note to this is that the package is still executed by `SQL Server
    Agent`. The task is executed under the context of my user account. Does that make
    sense?


    Save this maintenance plan and close it. Right-click the job and select `Start
    Job at Step…` and watch what happens in Figure [11-22](#A396023_1_En_11_Chapter.html#Fig22),
    just by changing that SQL query to include my login.


    ![A396023_1_En_11_Fig22_HTML.jpg](A396023_1_En_11_Fig22_HTML.jpg)


    Figure 11-22. Success!


    I love seeing that.


    ## Summary


    Let’s do a quick recap here…


    *   We set up another plan using the “other” way (design surface).

    *   We edited that plan using `SQL Server Agent`’s `Job Properties`.

    *   We discovered a possible failure in the query, so we rewrote the query and
    now it works.


    Your `Jobs` folder should now look like Figure [11-23](#A396023_1_En_11_Chapter.html#Fig23).


    ![A396023_1_En_11_Fig23_HTML.jpg](A396023_1_En_11_Fig23_HTML.jpg)


    Figure 11-23. SQL Server Agent Jobs


    Your `Maintenance Plans` folder should now look like Figure [11-24](#A396023_1_En_11_Chapter.html#Fig24).


    ![A396023_1_En_11_Fig24_HTML.jpg](A396023_1_En_11_Fig24_HTML.jpg)


    Figure 11-24. Maintenance Plans


    Excellent job on this chapter. Reread what you didn’t understand, though, especially
    the part about how to run the query with your user account instead of `SQL Server
    Agent`. Next, we will look at the `Notify Operator Task`, and then wind everything
    down for the conclusion. If you’ve made it this far, excellent job! You are well
    on your way to having the tools and the knowledge to create or maintain your own
    maintenance plan.


    ## 12. Notifying Database Operators


    The purpose of the `Notify Operator Task` is specifically to set up a notification
    task. It can be for any event within the plan; that is, the takeaway for this
    one. It doesn’t have to be tied to any specific task either. You could conceivably
    have this task, by itself, and all it will do is notify an operator. What good
    could that possibly do? If this task is tied to nothing else, what could a simple
    notification do? Let’s look at how to set it up and I will explain the answer
    to that question as we go.'
