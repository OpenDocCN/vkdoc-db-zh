    Just like before, click and drag `Execute SQL Server Agent job` from the toolbar
    to the stage, but this time, place it in between the `Check Integrity` task and
    the `backup` task. You should end up looking similar to Figure [13-25](#A396023_1_En_13_Chapter.html#Fig25).


    ![A396023_1_En_13_Fig25_HTML.jpg](A396023_1_En_13_Fig25_HTML.jpg)


    Figure 13-25. `Execute SQL Server Agent Job Task` on Design Surface Stage


