- fmt: '### Multiple Constraints


    是的，任务上可以存在多个约束。这为我们解释任务提供了更大的灵活性，如下所列。


    *   **逻辑与 (Logical AND)**：所有语句都必须评估为真 (TRUE)。

    *   **逻辑或 (Logical OR)**：必须有一个约束评估为真 (TRUE)。


    **逻辑与** 意味着我们可以在任务中定义大量约束，并且所有这些约束都必须评估为真。


    **逻辑或** 意味着我们可以在任务中定义大量约束，且必须有任意一个约束评估为真。这意味着，在一个基于 N 个约束的列表中，1 到 N 个约束必须为真，但始终至少要有一个为真，否则任务失败。


    老实说，大部分内容可以保持原样。我们需要一个 `Success` 约束，而默认设置正是如此。这并不是说您不能更新此区域以实现所需功能，但就本目的而言，我们不需要更新任何内容，因此单击“确定”。


    看起来您也可以添加多个约束。单击 `Check Integrity` 任务，会出现另一个小绿色箭头。将其拖到 `Rebuild Index` 任务上。您应该看到如图
    [13-62](#A396023_1_En_13_Chapter.html#Fig62) 所示的内容。


    ![A396023_1_En_13_Fig62_HTML.jpg](A396023_1_En_13_Fig62_HTML.jpg)

    *图 13-62. 优先约束错误*


    好吧，看起来不行。这引发了一个疑问：为什么 SSMS 一开始就给我们这个选项，但那是另一个话题了。不过没关系，因为我们已经设置好了我们的约束。


    现在，对完整备份计划中的每个任务都执行此操作，如图 [13-63](#A396023_1_En_13_Chapter.html#Fig63) 所示。请记住，您唯一需要的约束是
    `Success` 约束。


    ![A396023_1_En_13_Fig63_HTML.jpg](A396023_1_En_13_Fig63_HTML.jpg)

    *图 13-63. 完整备份优先约束*


    图 [13-64](#A396023_1_En_13_Chapter.html#Fig64) 展示了您的差异备份计划应有的样子。


    ![A396023_1_En_13_Fig64_HTML.jpg](A396023_1_En_13_Fig64_HTML.jpg)

    *图 13-64. 差异备份优先约束*


    而图 [13-65](#A396023_1_En_13_Chapter.html#Fig65) 展示了您的事务日志备份计划应有的样子。


    ![A396023_1_En_13_Fig65_HTML.jpg](A396023_1_En_13_Fig65_HTML.jpg)

    *图 13-65. 事务日志备份优先约束*


    我们可以看到，每个任务现在都有了一个字面上的工作流。每个任务都导向下一个任务，如果失败，则会被记录。


    说到日志记录，对于此维护计划的报告和日志记录，我们有哪些选项？很高兴您问这个问题！单击任务栏中的 `Reporting and Logging` 按钮，如图
    [13-66](#A396023_1_En_13_Chapter.html#Fig66) 所示。


    ![A396023_1_En_13_Fig66_HTML.jpg](A396023_1_En_13_Fig66_HTML.jpg)

    *图 13-66. 报告和日志记录按钮*


    单击该按钮会打开如图 [13-67](#A396023_1_En_13_Chapter.html#Fig67) 所示的界面。


    ![A396023_1_En_13_Fig67_HTML.jpg](A396023_1_En_13_Fig67_HTML.jpg)

    *图 13-67. 报告和日志记录*


    这是默认屏幕。看；当维护计划操作运行时，我们可以生成新的文本文件报告，并且可以如图 [13-68](#A396023_1_En_13_Chapter.html#Fig68)
    所示向操作员发送电子邮件。


    ![A396023_1_En_13_Fig68_HTML.jpg](A396023_1_En_13_Fig68_HTML.jpg)

    *图 13-68. 报告和日志记录（已更新）*


    这非常方便！更新界面后，单击“确定”继续。现在保存您的工作，沉浸在即将完成的维护计划的荣耀中。


    请注意，由于我们已进行设置，这些报告和日志记录设置将强制应用于备份维护计划中的所有子计划。这是一件好事，因此我们无需反复设置。或者，这也意味着，如果您需要在这些限制之外进行报告或日志记录，则必须创建一个具有不同报告和日志记录设置的新维护计划。


    让我们快速回顾一下我们已完成的工作。


    *   我们将相关任务添加到了现有的备份维护计划中。

    *   我们按照之前决定的顺序在任务上添加了优先约束。

    *   我们向维护计划添加了报告和日志记录。


    这简单地意味着，备份维护计划的子计划在其计划时间运行，从第一个任务开始，到最后一个任务结束。完成后，将发送一封附有维护文本报告的电子邮件。`SQL Server
    Agent` 也会在其历史日志中记录此信息。无论失败还是成功，操作员都会收到警报。


    ## 测试维护计划


    现在一切就绪，让我们对其进行一些测试。我们已将操作员设置为接收通知，因此我们应该能够直接运行维护计划，然后等待通知。


    请记住，这将按任务顺序运行所有内容，即所有任务。我们希望从完整备份开始，然后运行差异备份，最后运行事务日志备份。您不能直接右键单击“维护计划”，因为其中有三个子计划。相反，在
    `SQL Server Agent` 的“作业”文件夹中，右键单击 `Backup Maintenance Plan.Backup Database (Full)`
    作业，选择“在步骤…开始作业”，并观察如图 [13-69](#A396023_1_En_13_Chapter.html#Fig69) 所示的内容。


    ![A396023_1_En_13_Fig69_HTML.jpg](A396023_1_En_13_Fig69_HTML.jpg)

    *图 13-69. 开始作业*


    到目前为止看起来不错。


    退一步，现在运行差异作业，查看如图 [13-70](#A396023_1_En_13_Chapter.html#Fig70) 所示的内容。


    ![A396023_1_En_13_Fig70_HTML.jpg](A396023_1_En_13_Fig70_HTML.jpg)

    *图 13-70. 开始作业*


    让我们运行事务日志作业，查看如图 [13-71](#A396023_1_En_13_Chapter.html#Fig71) 所示的内容。


    ![A396023_1_En_13_Fig71_HTML.jpg](A396023_1_En_13_Fig71_HTML.jpg)

    *图 13-71. 开始作业*


    干得漂亮。如果您已按照步骤操作，那么您可能已经收到了相当多的详细描述维护活动的电子邮件。花几分钟时间熟悉这些电子邮件，并知道您要查找什么。这样，在未来，您可以快速扫描电子邮件以获取所需信息。您还可以决定是否利用在维护活动完成时发送电子邮件的便利性，或者完全绕过此通知。最终，作为数据库管理员，这是您的选择。幸运的是，您刚刚学会了如何快速调整维护计划的设置以包含或移除步骤和通知！


    这证明我们现在已经实现了在数据库中创建完整维护计划的目标，该计划将处理几乎所有日常维护活动。请记住，这些作业可以通过从 `SQL Server Agent`
    运行随时执行。或者，您也可以使用脚本运行作业，这可能更适合您。为此，让我们先查看脚本，然后理解它的作用。'
  raw: '### Multiple Constraints


    Yes, there can be multiple constraints on the task. This gives us greater flexibility
    in the interpretation of the task, as shown in the following list.


    *   Logical AND: All statements must evaluate to TRUE

    *   Logical OR: One constraint must evaluate to TRUE


    LOGICAL AND means that we can define a lot of constraints in our task, and ALL
    of these constraints must evaluate to TRUE.


    LOGICAL OR means that we can define a lot of constraints in our task, and ANY
    ONE constraint must evaluate to TRUE. This means that, in an n-based list of constraints,
    1-to-n constraints must be TRUE, but always at least one, or the task fails.


    Honestly, most of this can stay right where it is. We want a Success constraint,
    and the default is exactly that. That’s not to say that you can’t update this
    area to do what you want, but for this purpose, we don’t need to update anything,
    so click OK.


    It looks like you can add multiple constraints as well. Click the Check Integrity
    task, and another little green arrow appears. Drag it to the Rebuild Index task.
    You should see what is shown in Figure [13-62](#A396023_1_En_13_Chapter.html#Fig62).


    ![A396023_1_En_13_Fig62_HTML.jpg](A396023_1_En_13_Fig62_HTML.jpg)


    Figure 13-62.


    Precedence Constraints error


    Okay, looks like a no. Which kind of presents a question as to why SSMS gave us
    the option in the first place, but that’s a different subject. That’s okay though,
    because we’ve got our constraint set up.


    Now, do this for each of the tasks in the full backup plan as shown in Figure
    [13-63](#A396023_1_En_13_Chapter.html#Fig63). Remember, the only constraints you
    want are Success constraints.


    ![A396023_1_En_13_Fig63_HTML.jpg](A396023_1_En_13_Fig63_HTML.jpg)


    Figure 13-63.


    Full Backups Precedence Constraints


    Figure [13-64](#A396023_1_En_13_Chapter.html#Fig64) shows what your differential
    backups plan should look like.


    ![A396023_1_En_13_Fig64_HTML.jpg](A396023_1_En_13_Fig64_HTML.jpg)


    Figure 13-64.


    Differential Backups Precedence Constraints


    And Figure [13-65](#A396023_1_En_13_Chapter.html#Fig65) shows what your transaction
    log backup plan should look like.


    ![A396023_1_En_13_Fig65_HTML.jpg](A396023_1_En_13_Fig65_HTML.jpg)


    Figure 13-65.


    Transaction Log Backups Precedence Constraints


    We can see that each of the tasks now have a literal workflow. Each task leads
    to the next task, and if it fails, it is logged.


    Speaking of logging, what options do we have for reporting and logging of this
    maintenance plan? I’m glad you asked! Click the Reporting and Logging button in
    the taskbar, as shown in Figure [13-66](#A396023_1_En_13_Chapter.html#Fig66).


    ![A396023_1_En_13_Fig66_HTML.jpg](A396023_1_En_13_Fig66_HTML.jpg)


    Figure 13-66.


    Reporting and Logging button


    Clicking that opens the interface shown in Figure [13-67](#A396023_1_En_13_Chapter.html#Fig67).


    ![A396023_1_En_13_Fig67_HTML.jpg](A396023_1_En_13_Fig67_HTML.jpg)


    Figure 13-67.


    Reporting and Logging


    This is the default screen. Look at that; we can generate a new text file report
    of the maintenance plan operations when they are run, AND we can send an e-mail
    to an operator, as shown in Figure [13-68](#A396023_1_En_13_Chapter.html#Fig68).


    ![A396023_1_En_13_Fig68_HTML.jpg](A396023_1_En_13_Fig68_HTML.jpg)


    Figure 13-68.


    Reporting and Logging (updated)


    That’s very convenient! Once your interface is updated, click OK to continue.
    Save your work now, and bask in the glory of your nearly completed maintenance
    plan.


    Note that, since we have set this, these reporting and logging settings are enforced
    for all of the subplans in the Backup Maintenance Plan. This is a good thing,
    so we don’t have to keep setting them. Alternately, this also implies that if
    you need reporting or logging outside of these restrictions, you must create a
    new maintenance plan with different reporting and logging settings.


    Let’s review what we’ve done really quickly.


    *   We added the relevant tasks to the existing Backup Maintenance Plan.

    *   We added precedence constraints on the tasks, in the order we decided earlier.

    *   We added reporting and logging to the maintenance plan.


    What this simply means is that the subplans of the Backup Maintenance Plan run
    at their scheduled time, starting with the first task and ending with the last
    task. When it is complete, an e-mail is sent with the maintenance text report
    attached. The SQL Server Agent keeps a record of this in its History logs as well.
    Whether it fails or succeeds, the operator is alerted.


    ## Testing the Maintenance Plan


    Now that it’s all set up, let’s run some tests on it. We set our operator to be
    informed, so we should just be able to run the maintenance plans, and then wait
    for notification.


    Keep in mind that this will run everything, all of the tasks, in the order they
    are in. We want to start with full and then run the differential, and finally
    run the transaction log. You can’t just right-click the Maintenance Plan though,
    because there are the three subplans in there. Instead, right-click the Backup
    Maintenance Plan.Backup Database (Full) job in the Jobs folder in SQL Server Agent,
    choose Start Job at Step… and observe what is shown in Figure [13-69](#A396023_1_En_13_Chapter.html#Fig69).


    ![A396023_1_En_13_Fig69_HTML.jpg](A396023_1_En_13_Fig69_HTML.jpg)


    Figure 13-69.


    Start Jobs


    Looks good so far.


    Take it back a step and run the differential job now, and see what is shown in
    Figure [13-70](#A396023_1_En_13_Chapter.html#Fig70).


    ![A396023_1_En_13_Fig70_HTML.jpg](A396023_1_En_13_Fig70_HTML.jpg)


    Figure 13-70.


    Start Jobs


    Let’s run the transaction log job to see what is shown in Figure [13-71](#A396023_1_En_13_Chapter.html#Fig71).


    ![A396023_1_En_13_Fig71_HTML.jpg](A396023_1_En_13_Fig71_HTML.jpg)


    Figure 13-71.


    Start Jobs


    Nicely done. If you’ve followed along, then you have probably received quite a
    few e-mails detailing the maintenance activities. Take a few minutes to familiarize
    yourself with these e-mails, and know what you’re looking for. That way, in the
    future, you could conceivably scan an e-mail quickly for the information you need.
    You can also decide whether to leverage the usefulness of having e-mails sent
    when the maintenance activities complete, or to bypass this notification all together.
    Ultimately, it is your choice as the database administrator. Luckily, you’ve just
    learned how to adjust the settings of the maintenance plan to include or remove
    steps and notifications very quickly!


    This proves that we have now accomplished our goal of creating a complete maintenance
    plan in our database that will take care of almost all of our day-to-day maintenance
    activities. Keep in mind that these jobs can be run at any time by running them
    from SQL Server Agent. Alternatively, you can also run a job with a script, which
    might be more up your alley. To do this, let’s first look at the script and then
    understand what it does.'
  trans: '### 多个约束


    是的，任务上可以存在多个约束。这为我们解释任务提供了更大的灵活性，如下所列。


    *   **逻辑与 (Logical AND)**：所有语句都必须评估为真 (TRUE)。

    *   **逻辑或 (Logical OR)**：必须有一个约束评估为真 (TRUE)。


    **逻辑与** 意味着我们可以在任务中定义大量约束，并且所有这些约束都必须评估为真。


    **逻辑或** 意味着我们可以在任务中定义大量约束，且必须有任意一个约束评估为真。这意味着，在一个基于 N 个约束的列表中，1 到 N 个约束必须为真，但始终至少要有一个为真，否则任务失败。


    老实说，大部分内容可以保持原样。我们需要一个 `Success` 约束，而默认设置正是如此。这并不是说您不能更新此区域以实现所需功能，但就本目的而言，我们不需要更新任何内容，因此单击“确定”。


    看起来您也可以添加多个约束。单击 `Check Integrity` 任务，会出现另一个小绿色箭头。将其拖到 `Rebuild Index` 任务上。您应该看到如图
    13-62 所示的内容。


    ![A396023_1_En_13_Fig62_HTML.jpg](img/A396023_1_En_13_Fig62_HTML.jpg)

    *图 13-62. 优先约束错误*


    好吧，看起来不行。这引发了一个疑问：为什么 SSMS 一开始就给我们这个选项，但那是另一个话题了。不过没关系，因为我们已经设置好了我们的约束。


    现在，对完整备份计划中的每个任务都执行此操作，如图 13-63 所示。请记住，您唯一需要的约束是 `Success` 约束。


    ![A396023_1_En_13_Fig63_HTML.jpg](img/A396023_1_En_13_Fig63_HTML.jpg)

    *图 13-63. 完整备份优先约束*


    图 13-64 展示了您的差异备份计划应有的样子。


    ![A396023_1_En_13_Fig64_HTML.jpg](img/A396023_1_En_13_Fig64_HTML.jpg)

    *图 13-64. 差异备份优先约束*


    而图 13-65 展示了您的事务日志备份计划应有的样子。


    ![A396023_1_En_13_Fig65_HTML.jpg](img/A396023_1_En_13_Fig65_HTML.jpg)

    *图 13-65. 事务日志备份优先约束*


    我们可以看到，每个任务现在都有了一个字面上的工作流。每个任务都导向下一个任务，如果失败，则会被记录。


    说到日志记录，对于此维护计划的报告和日志记录，我们有哪些选项？很高兴您问这个问题！单击任务栏中的 `Reporting and Logging` 按钮，如图
    13-66 所示。


    ![A396023_1_En_13_Fig66_HTML.jpg](img/A396023_1_En_13_Fig66_HTML.jpg)

    *图 13-66. 报告和日志记录按钮*


    单击该按钮会打开如图 13-67 所示的界面。


    ![A396023_1_En_13_Fig67_HTML.jpg](img/A396023_1_En_13_Fig67_HTML.jpg)

    *图 13-67. 报告和日志记录*


    这是默认屏幕。看；当维护计划操作运行时，我们可以生成新的文本文件报告，并且可以如图 13-68 所示向操作员发送电子邮件。


    ![A396023_1_En_13_Fig68_HTML.jpg](img/A396023_1_En_13_Fig68_HTML.jpg)

    *图 13-68. 报告和日志记录（已更新）*


    这非常方便！更新界面后，单击“确定”继续。现在保存您的工作，沉浸在即将完成的维护计划的荣耀中。


    请注意，由于我们已进行设置，这些报告和日志记录设置将强制应用于备份维护计划中的所有子计划。这是一件好事，因此我们无需反复设置。或者，这也意味着，如果您需要在这些限制之外进行报告或日志记录，则必须创建一个具有不同报告和日志记录设置的新维护计划。


    让我们快速回顾一下我们已完成的工作。


    *   我们将相关任务添加到了现有的备份维护计划中。

    *   我们按照之前决定的顺序在任务上添加了优先约束。

    *   我们向维护计划添加了报告和日志记录。


    这简单地意味着，备份维护计划的子计划在其计划时间运行，从第一个任务开始，到最后一个任务结束。完成后，将发送一封附有维护文本报告的电子邮件。`SQL Server
    Agent` 也会在其历史日志中记录此信息。无论失败还是成功，操作员都会收到警报。


    ## 测试维护计划


    现在一切就绪，让我们对其进行一些测试。我们已将操作员设置为接收通知，因此我们应该能够直接运行维护计划，然后等待通知。


    请记住，这将按任务顺序运行所有内容，即所有任务。我们希望从完整备份开始，然后运行差异备份，最后运行事务日志备份。您不能直接右键单击“维护计划”，因为其中有三个子计划。相反，在
    `SQL Server Agent` 的“作业”文件夹中，右键单击 `Backup Maintenance Plan.Backup Database (Full)`
    作业，选择“在步骤…开始作业”，并观察如图 13-69 所示的内容。


    ![A396023_1_En_13_Fig69_HTML.jpg](img/A396023_1_En_13_Fig69_HTML.jpg)

    *图 13-69. 开始作业*


    到目前为止看起来不错。


    退一步，现在运行差异作业，查看如图 13-70 所示的内容。


    ![A396023_1_En_13_Fig70_HTML.jpg](img/A396023_1_En_13_Fig70_HTML.jpg)

    *图 13-70. 开始作业*


    让我们运行事务日志作业，查看如图 13-71 所示的内容。


    ![A396023_1_En_13_Fig71_HTML.jpg](img/A396023_1_En_13_Fig71_HTML.jpg)

    *图 13-71. 开始作业*


    干得漂亮。如果您已按照步骤操作，那么您可能已经收到了相当多的详细描述维护活动的电子邮件。花几分钟时间熟悉这些电子邮件，并知道您要查找什么。这样，在未来，您可以快速扫描电子邮件以获取所需信息。您还可以决定是否利用在维护活动完成时发送电子邮件的便利性，或者完全绕过此通知。最终，作为数据库管理员，这是您的选择。幸运的是，您刚刚学会了如何快速调整维护计划的设置以包含或移除步骤和通知！


    这证明我们现在已经实现了在数据库中创建完整维护计划的目标，该计划将处理几乎所有日常维护活动。请记住，这些作业可以通过从 `SQL Server Agent`
    运行随时执行。或者，您也可以使用脚本运行作业，这可能更适合您。为此，让我们先查看脚本，然后理解它的作用。'
- fmt: '## Starting a Job from a T-SQL Script


    The script to start a job is sort of simple, and looks like this.


    ```

    EXEC msdb.dbo.sp_start_job @job_name=N''Backup Maintenance Plan.Backup Database
    (Transaction Log)'';

    ```


    In this case, I wanted to start the transaction log job. Entering this query into
    a New Query window and pressing F5 to execute it will show you the following status.


    ![A396023_1_En_13_Figa_HTML.jpg](A396023_1_En_13_Figa_HTML.jpg)


    A little note about this script; it is a stored procedure that is running a start
    command against the `sysjobs` table in `msdb`. To take a look at this table, just
    enter the following query in a New Query window and press F5.


    ```

    SELECT * FROM msdb.dbo.sysjobs;

    ```


    Figure [13-72](#A396023_1_En_13_Chapter.html#Fig72) shows what is returned from
    that query.


    ![A396023_1_En_13_Fig72_HTML.jpg](A396023_1_En_13_Fig72_HTML.jpg)


    Figure 13-72. Query Results


    Look familiar? That’s all of the jobs we created, and some detail information
    too. Pretty cool!


    Now, open up the Job Activity Monitor inside of SQL Server Agent. Figure [13-73](#A396023_1_En_13_Chapter.html#Fig73)
    shows you what you should see at this point.


    ![A396023_1_En_13_Fig73_HTML.jpg](A396023_1_En_13_Fig73_HTML.jpg)


    Figure 13-73. Job Activity Monitor


    Well, there are all of our jobs, lined up for us and telling us all sorts of useless
    stuff. You can see that they all are enabled, except for `E-mail User Information`.
    They are all `Idle`, meaning they aren’t currently running. They have all succeeded
    when they last ran. If you scroll to the right, you will see the columns `Last
    Run` and `Next Run`. Guess what those tell you? This is a great way to get a glimpse
    of whether or not your jobs are running correctly. It is right here if they aren’t.
    You can right-click any of the jobs here and do some damage, so be aware of what
    you’re doing.


    > **Tip**

    > Is it important to note that you should not delete the extra maintenance plans.
    They are tied to the jobs they contain, and if you delete the maintenance plan,
    you will delete the job. Guess what happens at that point? Dunce cap. You guessed
    it.


    One more thing before we close this out. In `SSMS Object Explorer`, click `Connect`
    and connect to `Integration Services`. If you can’t connect to `Integration Services`,
    then just start `SSMS` as an Administrator and you should be good to go.


    Expand the `Stored Packages` folder, followed by `MSDB`, and then `Maintenance
    Plans`. You should see what’s shown in Figure [13-74](#A396023_1_En_13_Chapter.html#Fig74)
    at this point.


    ![A396023_1_En_13_Fig74_HTML.jpg](A396023_1_En_13_Fig74_HTML.jpg)


    Figure 13-74. Integration Services Maintenance Plans


    Right-click our `Backup Maintenance Plan` and select `Export Package…` Figure
    [13-75](#A396023_1_En_13_Chapter.html#Fig75) will then appear.


    ![A396023_1_En_13_Fig75_HTML.jpg](A396023_1_En_13_Fig75_HTML.jpg)


    Figure 13-75. Export Package


    We want to change the package path to a new folder in `E:\SQL Server`, so let’s
    call it `DTSX`. That means our maintenance plan backup location is going to be
    `E:\SQL Server\DTSX\Backup Maintenance Plan.dtsx`, so enter that and then click
    `OK`. It’s okay to leave all the other settings alone. If you check that directory,
    you will see that file now in there. You can even double-click these `.dtsx` files
    to execute them.


    Do this for all the other maintenance plans, just in case. Now, we have a backup
    of all of the work that we’ve done, just in case something happens to our original
    files.


    Let’s test it! Oh, look, a nefarious individual has broken into the database and
    deleted the `Update Statistics Plan` maintenance plan. Look at Figure [13-76](#A396023_1_En_13_Chapter.html#Fig76)—it’s
    disappeared!


    ![A396023_1_En_13_Fig76_HTML.jpg](A396023_1_En_13_Fig76_HTML.jpg)


    Figure 13-76. Maintenance Plans


    Doggonit, Figure [13-77](#A396023_1_En_13_Chapter.html#Fig77) shows that the job
    is gone too!


    ![A396023_1_En_13_Fig77_HTML.jpg](A396023_1_En_13_Fig77_HTML.jpg)


    Figure 13-77. SQL Server Agent Jobs


    Whatever shall we do? Oh yeah, we took a backup. Can we add that back easily?
    Yep.'
