  trans: '

    ### 配置电子邮件


    首先，展开 SQL Server 安装中的 `Management` 节点，如图 4-2 所示。你应该能看到 `Database Mail`。


    ![A396023_1_En_4_Fig2_HTML.jpg](img/A396023_1_En_4_Fig2_HTML.jpg)

    图 4-2. SSMS 中数据库邮件的位置


    右键单击并选择 `Configure Database Mail`。你将看到如图 4-3 所示的信息。


    ![A396023_1_En_4_Fig3_HTML.jpg](img/A396023_1_En_4_Fig3_HTML.jpg)

    图 4-3. 数据库邮件配置向导


    这是一个出色的小向导，它将逐步指导你完成数据库邮件的设置。一旦设置完成，我保证你会开始在日常工作中寻找应用数据库邮件的理由。它能为你带来什么便利呢？想象一下，如果在任务运行后，或者在数据库成功备份或恢复后，你能收到一封电子邮件，那该多么方便。又或者，当你期待收到一封邮件告知你的主数据库已备份，却始终未收到时，这可能是不祥之兆的预警。至少你会得到某种提示，知道出了问题，而不是被愤怒的用户或经理打个措手不及。对于数据库管理员来说，这是一个管理消息传递的绝佳工具，几乎在每个应用程序中都能发挥作用。


    如果愿意，你可以勾选复选框以禁止以后显示此向导。我通常都会这么做。准备就绪后，单击 `Next` 继续。


    接下来出现的屏幕，如图 4-4 所示，允许你选择要执行的操作：设置新账户、管理账户或更改参数。


    ![A396023_1_En_4_Fig4_HTML.jpg](img/A396023_1_En_4_Fig4_HTML.jpg)

    图 4-4. 选择配置任务


    由于我们正在设置新用户，请保持默认选中的“`Set up Database Mail…`”，然后选择 `Next`。


    如果收到提醒说 `Database Mail` 功能不可用，请选择 `Yes` 来启用它。考虑到已完成完整的 SQL Server 安装，你应该无需安装任何额外内容。


    现在，你将进入 `New Profile` 界面，如图 4-5 所示。


    ![A396023_1_En_4_Fig5_HTML.jpg](img/A396023_1_En_4_Fig5_HTML.jpg)

    图 4-5. 新建配置文件（初始界面）


    大部分工作将在这里完成。在文本框中输入配置文件名称和描述。这些有助于你区分不同的账户。我输入了如图 4-6 所示的值，但你可以随意输入。


    ![A396023_1_En_4_Fig6_HTML.jpg](img/A396023_1_En_4_Fig6_HTML.jpg)

    图 4-6. 新建配置文件，接近完成


    对你输入的值满意后，按下界面右侧的 `Add` 按钮。这将允许你为数据库邮件添加一个新的配置文件。


    另一个界面神奇地出现了，显示的信息如图 4-7 所示。我已经填写完毕，以便你了解需要输入什么。你可能需要从系统管理员那里获取部分信息。


    ![A396023_1_En_4_Fig7_HTML.jpg](img/A396023_1_En_4_Fig7_HTML.jpg)

    图 4-7. 新建数据库邮件账户设置


    `Account Name` 和 `Description` 字段只是占位符，与上一个屏幕一样。外发邮件信息显然必须 100% 正确，否则会失败。其余部分应该相当明显。填写完所有内容后，单击
    `OK` 返回上一个界面，此时你应在网格区域看到 `Account Name` 和 `E-mail Address`，如图 4-8 所示。


    ![A396023_1_En_4_Fig8_HTML.jpg](img/A396023_1_En_4_Fig8_HTML.jpg)

    图 4-8. SMTP 账户


    准备好继续后，选择 `Next`。


    你将看到一个标题为 `Manage Profile Security` 的屏幕，包含两个选项卡：`Public Profiles` 和 `Private Profiles`。在本练习中，我们将专门处理
    `Public Profile`，如图 4-9 所示。


    ![A396023_1_En_4_Fig9_HTML.jpg](img/A396023_1_En_4_Fig9_HTML.jpg)

    图 4-9. 新建数据库邮件账户设置


    这意味着数据库邮件服务正在查找所输入对象的安全性。你可能认得 `Profile Name`，因为它是在上一个屏幕中输入的。我原以为这可能是从 `Active
    Directory` 或其他地方提取的，但在分布式数据库系统中，你可能没有 `Active Directory` 账户，但此功能仍然有效。因此，它必须是用户先前在界面中输入的值……在本例中，就是你。你可以在图
    4-10 中查看它的显示方式。如果愿意，可以按 `Back` 并更改屏幕顶部的 `Profile Name`，然后按 `Next` 查看名称是否已更改。非常酷！你需要勾选此界面
    `Public` 列中的复选框来启用它；否则，你将来所做的任何设置更改都将全局应用。此外，下拉 `Default Profile` 菜单并选择 `Yes`。在此情况下，你只想编辑这个特定用户。完成后的界面如图
    4-10 所示。


    ![A396023_1_En_4_Fig10_HTML.jpg](img/A396023_1_En_4_Fig10_HTML.jpg)

    图 4-10. 管理配置文件安全性


    准备好后，单击 `Next`。


    哦，看，图 4-11 又显示了另一个界面。需要澄清的是，我经常使用“界面”这个词。如果这让你感到困惑，你随时可以用任何你认为合适的术语来替代“界面”，指代屏幕上呈现给用户、显示提示或决策的外观变化。我记得在远古时代学习
    `Visual Basic 6` 入门课程时，我的教授称它们为“interfaces”。这个叫法就一直沿用下来了。


    ![A396023_1_En_4_Fig11_HTML.jpg](img/A396023_1_En_4_Fig11_HTML.jpg)

    图 4-11. 配置系统参数


    这就是你现在看到的界面。所有这些字段都是可编辑的，所以请自行承担风险进行操作。你可以自由做出任何选择，或保留默认值。无论你的环境或安全原则要求什么，都应该在这里强制执行。例如，我不建议更改
    `Prohibited Attachment File Extensions`。列出的扩展名基本上是当前 SQL Server 可访问且能被操作系统执行的所有文件扩展名。它们不一定由
    SQL Server 生成，但可以作为附件添加。


    以下是此屏幕上可用的选项：


    *   `Account Retry Attempts`：邮件服务器发送电子邮件的重试次数。

    *   `Account Retry Delay (seconds)`：邮件服务器发送电子邮件的重试间隔（秒）。

    *   `Maximum File Size (Bytes)`：邮件服务器发送电子邮件的附件最大文件大小（字节）。

    *   `Prohibited Attachment File Extensions`：邮件服务器发送电子邮件的禁止附件文件扩展名。

    *   `Database Mail Executable Minimum Lifetime (seconds)`：数据库邮件可执行文件的最小生存期（秒）。

    *   `Logging Level`：确定哪些事件写入数据库邮件事件日志。


    这些选项的定义直接来自图 4-11 所示的界面。这里有个有趣的事情要注意：如果你点击 `Reset All` 按钮，你会发现 `Account Retry
    Delay` 的值从 `60` 变成了 `5000`。因此，默认情况下，重试发送邮件不是等待 1 分钟，而是等待超过一个小时。想象一下在使用电子邮件报告灾难性故障时会发生什么。你是宁愿立即知道，还是在一个多小时后才知道事件发生？

