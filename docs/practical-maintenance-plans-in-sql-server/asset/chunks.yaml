    ### Notifications


    Next is the Notifications tab, as shown in Figure [4-33](#A396023_1_En_4_Chapter.html#Fig33).
    Notice that none of the options is checked and the drop-down values are defaulted.


    ![A396023_1_En_4_Fig33_HTML.jpg](A396023_1_En_4_Fig33_HTML.jpg)


    Figure 4-33.


    Job Properties, Notifications tab


    This is where we actually get to define the database mail option we set up earlier.
    The following are the available contact options:


    *   E-mail

    *   Page

    *   Net Send

    *   Write to the Windows Application event log

