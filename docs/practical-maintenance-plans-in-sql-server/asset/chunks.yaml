    ![A396023_1_En_13_Fig88_HTML.jpg](A396023_1_En_13_Fig88_HTML.jpg)

    **图 13-88. 子计划属性**


    现在保存计划，然后回去查看您的“作业”文件夹，如图 [13-89](#A396023_1_En_13_Chapter.html#Fig89) 所示。


    ![A396023_1_En_13_Fig89_HTML.jpg](A396023_1_En_13_Fig89_HTML.jpg)

    **图 13-89. SQL Server Agent 作业**


    它在那里！不过，您需要将名称从 `Update Statistics Plan.Update Statistics` 更改为 `Update Statistics`。完成后，您应该会看到如图
    [13-90](#A396023_1_En_13_Chapter.html#Fig90) 所示的更新界面。


    ![A396023_1_En_13_Fig90_HTML.jpg](A396023_1_En_13_Fig90_HTML.jpg)

    **图 13-90. SQL Server Agent 作业（已更新）**


    让我们验证一下它是否已恢复到之前的状态。


    双击 `Backup Maintenance Plan`，然后双击设计阶段中的“更新统计信息”任务。然后您应该看到如图 [13-91](#A396023_1_En_13_Chapter.html#Fig91)
    所示的界面。


    ![A396023_1_En_13_Fig91_HTML.jpg](A396023_1_En_13_Fig91_HTML.jpg)

    **图 13-91. 执行 SQL Server Agent 作业任务**


    就在最下面那里……太棒了！我们已成功恢复了保存的包。


    ### **总结**


    哇！我们将在本书过程中学到的所有知识整合成一个连贯的计划。让我们快速回顾一下本章向我们展示的内容。


    *   我们为备份计划上的每个时间片创建了单独的维护计划，每个计划在不同的时间运行不同的任务。

    *   我们在每个维护计划中的任务上强制实施了优先级约束。

    *   我们设置了任务的报告和记录功能，并在每个任务完成时发送电子邮件。

    *   我们学习了如何用脚本启动作业。

    *   我们简要了解了“作业活动监视器”及其重要性。


    在结束之前，让我们研究几件事：


    *   我们本可以在不设置各章中的计划的情况下完成本书的所有练习，但这不会引导您了解本章中计划如何与查询协同工作的知识。我希望您，作为读者，理解这些计划不仅仅是任意值，而是整体维护策略的一部分，应如此对待。

    *   我们也可以主要在设计图面上使用“备份维护计划”来完成本书的大部分内容，但这同样不会让您获得关于“为什么”而不仅仅是“如何”的知识。您当然可以这样做——如果您愿意，可以回到设计图面来完成——因为那在您的空闲时间会是一个很好的练习。但最终，您需要回到
    SQL Server Agent 的作业部分来配置实际的作业，这就是为什么我让您像我们这样完成它的原因。


    恭喜！您现在已经完成了本书的核心内容（豆腐和羽衣甘蓝）。我希望您现在已经建立了一个功能齐全的维护计划，并且已经开始梦想如何扩展这些新获得的知识。'
  raw: 'Connect to Integration Services and check the Maintenance Plans folder. It’s
    gone also. No worries though; just right-click this folder and choose Import Package…
    to show Figure [13-78](#A396023_1_En_13_Chapter.html#Fig78).


    ![A396023_1_En_13_Fig78_HTML.jpg](A396023_1_En_13_Fig78_HTML.jpg)


    Figure 13-78.


    Import Package


    Click the ellipse next to “Package path” and navigate to our DTSX folder location,
    E:\SQL Server\DTSX. Select Update Statistics Plan.dtsx to continue. Your interface
    should now look like Figure [13-79](#A396023_1_En_13_Chapter.html#Fig79).


    ![A396023_1_En_13_Fig79_HTML.jpg](A396023_1_En_13_Fig79_HTML.jpg)


    Figure 13-79.


    Import Package (updated)


    Click OK and refresh this folder, and there is our plan again, as shown in Figure
    [13-80](#A396023_1_En_13_Chapter.html#Fig80).


    ![A396023_1_En_13_Fig80_HTML.jpg](A396023_1_En_13_Fig80_HTML.jpg)


    Figure 13-80.


    Integration Services Maintenance Plans


    Go look at your Maintenance Plans and Jobs folders in the database engine. See
    anything interesting in Figure [13-81](#A396023_1_En_13_Chapter.html#Fig81) or
    Figure [13-82](#A396023_1_En_13_Chapter.html#Fig82)?


    ![A396023_1_En_13_Fig82_HTML.jpg](A396023_1_En_13_Fig82_HTML.jpg)


    Figure 13-82.


    SQL Server Agent Jobs


    ![A396023_1_En_13_Fig81_HTML.jpg](A396023_1_En_13_Fig81_HTML.jpg)


    Figure 13-81.


    Maintenance Plans


    So it added the Maintenance Plan, but not the job? Yes. But we’re not done yet.


    Go back to the Integration Services part again, and right-click the Update Statistics
    Plan and choose Export Package…, which brings up the interface shown in Figure
    [13-83](#A396023_1_En_13_Chapter.html#Fig83).


    ![A396023_1_En_13_Fig83_HTML.jpg](A396023_1_En_13_Fig83_HTML.jpg)


    Figure 13-83.


    Export Package


    We aren’t going to export it to the file system; that wouldn’t make any sense
    for what we’re trying to accomplish. Instead, update your interface to show the
    values shown in Figure [13-84](#A396023_1_En_13_Chapter.html#Fig84). For the Package
    path value, click the ellipse and expand MSDB, click Maintenance Plans, and then
    click OK.


    ![A396023_1_En_13_Fig84_HTML.jpg](A396023_1_En_13_Fig84_HTML.jpg)


    Figure 13-84.


    Export Package (updated)


    Click OK when you’re done. You’re going to get a pop-up window that looks like
    Figure [13-85](#A396023_1_En_13_Chapter.html#Fig85) next.


    ![A396023_1_En_13_Fig85_HTML.jpg](A396023_1_En_13_Fig85_HTML.jpg)


    Figure 13-85.


    Export Package alert


    Click Yes here, so that we’re replacing the current package.


    Skip back over to the database engine instance and refresh your Maintenance Plans
    folders again. You can see in Figure [13-86](#A396023_1_En_13_Chapter.html#Fig86)
    that the plan is back.


    ![A396023_1_En_13_Fig86_HTML.jpg](A396023_1_En_13_Fig86_HTML.jpg)


    Figure 13-86.


    Maintenance Plans


    Still no job though. Weird, huh? One last step, young Jedi.


    Even if you refresh the Jobs folder, it won’t be there. You need to open up the
    plan first, and go from there. Double-click Update Statistics Plan in Maintenance
    Plans to show the interface shown in Figure [13-87](#A396023_1_En_13_Chapter.html#Fig87).


    ![A396023_1_En_13_Fig87_HTML.jpg](A396023_1_En_13_Fig87_HTML.jpg)


    Figure 13-87.


    Update Statistics Plan


    Double-click the Subplan name and update it to show what is in Figure [13-88](#A396023_1_En_13_Chapter.html#Fig88).


    ![A396023_1_En_13_Fig88_HTML.jpg](A396023_1_En_13_Fig88_HTML.jpg)


    Figure 13-88.


    Subplan Properties


    Save the plan now, and go back to look at your Jobs folder again, as shown in
    Figure [13-89](#A396023_1_En_13_Chapter.html#Fig89).


    ![A396023_1_En_13_Fig89_HTML.jpg](A396023_1_En_13_Fig89_HTML.jpg)


    Figure 13-89.


    SQL Server Agent Jobs


    There it is! You’re going to need to change the name from Update Statistics Plan.Update
    Statistics to just Update Statistics though. After that’s done, you should see
    the updated interface shown in Figure [13-90](#A396023_1_En_13_Chapter.html#Fig90).


    ![A396023_1_En_13_Fig90_HTML.jpg](A396023_1_En_13_Fig90_HTML.jpg)


    Figure 13-90.


    SQL Server Agent Jobs, updated


    Let’s verify that we have it back to how it was before though.


    Double-click Backup Maintenance Plan and then double-click the Update Statistics
    task in the stage. You should then see the interface shown in Figure [13-91](#A396023_1_En_13_Chapter.html#Fig91).


    ![A396023_1_En_13_Fig91_HTML.jpg](A396023_1_En_13_Fig91_HTML.jpg)


    Figure 13-91.


    Execute SQL Server Agent Job Task


    Right down at the bottom there… excellent! We have successfully restored our saved
    package.


    ## Summary


    Wow! We took all that we learned in the course of this book and put it all together
    into one cohesive plan. Let’s take a quick look at exactly what this chapter showed
    us.


    *   We created individual maintenance plans for each time slice on the backup
    schedule, with each schedule having different tasks running at different times.

    *   We enforced precedence constraints on the tasks within each maintenance plan.

    *   We set reporting and logging on the tasks, with e-mails on completion of each
    task.

    *   We learned how to start a job with a script.

    *   We learned briefly about the Job Activity Monitor and its importance.


    Let’s examine a couple of things before we close:


    *   We could have done the exercises in this whole book without setting the Schedule
    in the individual chapters, but that wouldn’t have led you to the knowledge of
    how the schedules work together with the queries in this chapter. I wanted you,
    the reader, to understand that those schedules aren’t just arbitrary values, but
    are part of the overall maintenance strategy and should be treated as such.

    *   We also could have done the large majority of this book working with just
    the Backup Maintenance Plan in the Design Surface, but again, this wouldn’t have
    given you the knowledge you now have on the why and not just the how. You can
    certainly do that if you would like—go back and do it from the Design Surface
    instead—as that would be a good exercise in your spare time. But eventually, you
    need to get back into the jobs portion of SQL Server Agent to configure the actual
    jobs, which is why I had you go through it like we did.


    Congratulations! You are now finished with the meat and potatoes (tofu and kale)
    of this book. I hope that you have a fully functional maintenance plan now in
    place and that you are already dreaming of ways to expand upon this newfound knowledge.'
