  trans: '### 场景二


    这个场景稍微复杂一些，但更接近我惯用的方式。对于此场景，你需要记住，我们不会像场景一那样走快速但粗糙的路径。这个过程实际上更接近我们即将构建的完整维护计划；它看起来如图
    13-6 所示。


    ![A396023_1_En_13_Fig6_HTML.jpg](img/A396023_1_En_13_Fig6_HTML.jpg)


    图 13-6. 场景二结构


    看起来很眼熟？应该是的。这和之前的图是同一张。这清楚地暗示我们需要完成所有这些步骤。请记住，虽然我们已经定义了要运行哪些任务，但我们还需要知道何时运行它们。


    请注意，在这两种情况下，我都保留了完整的备份计划不变。这是因为，即使你的数据库可能较小，但其中的数据对你的业务或最终用户来说同样重要。没有这些数据，你将丢掉工作。因此，无论数据库大小如何，数据库备份的概念都将保持不变。


    我一直听到的规则是：维护工作需要在客户不使用数据库时进行。如果你的数据库是 7×24 小时使用的，那么你只需确定数据库使用最少的时间段，或者设置计划在 CPU
    空闲时触发。请记住，`SQL Server` 为你提供了许多调度选项，对于你能想到的几乎任何调度问题，都会有解决方案。对于这个计划，我们将在每晚午夜触发。我们还将让不同的任务在不同的时间间隔运行，所有这些我很快会演示。


    调度维护计划的另一个重要部分是，你始终可以为任务设置优先约束，我们稍后会深入讨论。这些简直是救星！它们的作用是，当你有一系列任务形成一个任务链时，你希望它们按特定顺序执行。你还可以设置任务失败、成功或完成时发生的情况。可以想象，我们将在这些步骤中设置报告和日志记录，以便我们了解任何可能影响最终用户的问题。


    让我们快速看一些有趣的东西。在 `SQL Server 代理`中双击任何一个作业。我选择了 `bak Files`，但你可以选择任何一个。现在你应该看到图
    13-7。


    ![A396023_1_En_13_Fig7_HTML.jpg](img/A396023_1_En_13_Fig7_HTML.jpg)


    图 13-7. 作业属性


    和以前一样，这有什么大不了的？点击左侧的 **步骤** 选项，并在作业步骤列表字段中展开列，如图 13-8 所示。注意到这里有什么特别之处吗？


    ![A396023_1_En_13_Fig8_HTML.jpg](img/A396023_1_En_13_Fig8_HTML.jpg)


    图 13-8. 作业属性，步骤选项卡


    没错；这是一个 `SQL Server 集成服务` 包。我在开篇章节中简要提到过这一点。它就是这样保存在数据库中的，而我们甚至没有意识到。这开启了与数据库交互的一个全新层面，因为既然我们现在有了一个
    `SSIS` 包，我们就可以把它们全部组合在一起，形成一个巨大的包。


    在继续之前，我想补充一个告诫：此时你应该拥有详尽而完整的作业。我说的完整是什么意思？请仔细检查所有作业内的所有对象是否都填写了描述和名称，具体包括：


    *   **常规** 选项卡：**描述** 框。

    *   **步骤** 选项卡，**常规** 子选项卡：**名称** 框（点击 **编辑** 并更改“步骤名称”值）。

    *   **步骤** 选项卡，**高级** 子选项卡：应选中“在历史记录中包括步骤输出”。

    *   **计划** 选项卡：我们将在几分钟后删除这些，所以现在可以保留。

    *   **警报** 选项卡：应为空白。

    *   **通知** 选项卡：应选中 **写入 Windows 应用程序事件日志**，并选择“当作业完成时”。

    *   **目标** 选项卡：应保持空白。


    不应为单个任务选择通知；相反，我们将让子计划负责报告和日志记录。电子邮件是此功能的一部分，你很快就会看到。


    猜猜我们接下来要做什么？


    ## 创建维护计划


    终于到了！这是我们整本书一直在努力的目标。我们将创建一个包，作为我们从现在开始用于维护数据库的维护计划的实现。


    谁认为我们会使用 `维护计划向导` 来创建这个维护计划的，请举手……？猜猜怎么着？我们不能将 `维护计划向罗` 用于此任务，因为向导专门用于创建新任务，而不是将它们组合成一个包。我们可以创建任意多的独立作业，但除非我们将它们全部放入一个包中并按不同的计划运行，否则它们永远不会协同工作。此外，让它们单独运行，而不是作为集成解决方案的一部分，无法让我们强制执行之前看到的优先约束；相反，我们只会按计划运行一个任务，并不关心或不知道它是否实际有效。


    我们不会采用那种方法，而是将致力于实现健壮维护计划的定义；一个满足我们所有维护需求的一站式解决方案。这将需要对各个计划进行更多的调整，我们现在就来看一看。


    ### 编辑作业


    鉴于这些是 `SSIS` 包，我们首先需要做的是规划包的部署。这是什么意思？这意味着每个包将作为更大包的一部分运行，内置优先约束和报告/日志记录功能，我们需要确保在将其发布到开发环境之前，所有这些都
    100% 设置好。我们在将任何东西发布到生产环境之前都会进行大量测试，对吧？现在让我们看看各个作业，并根据我们的需要对它们进行调整。


    回想一下，我们的作业列表如图 13-9 所示。


    ![A396023_1_En_13_Fig9_HTML.jpg](img/A396023_1_En_13_Fig9_HTML.jpg)


    图 13-9. `SQL Server 代理` 作业


    又是相当多的作业！这些作业中的每一个稍后都将成为包的一部分。不过现在，我们要编辑它们；所以从顶部开始，按照建议进行更改。


    ### 完成作业编辑


    双击一个作业以显示 **常规** 页面。然后按照以下部分描述的步骤逐一进行，确保按说明进行更改。


    #### 常规页面设置


    **常规** 页面包含作业的所有“高级”设置。我的意思是，更抽象的属性在后续页面中进一步划分，但整个作业的通用设置都在这里。


    *   **所有者** 字段应设置为数据库的所有者。

    *   **类别** 应设置为 `数据库维护`。

    *   输入一个简短的描述。

    *   确保选中 **已启用** 复选框。


    #### 步骤页面设置


    点击屏幕底部的 **编辑** 按钮，在 **常规** 子选项卡上将 **步骤名称** 更改为任务名称（清理历史记录、文本文件、T-SQL 任务——作业名称，不是计划名称）。请注意，这个屏幕是新的且不同的，因为它严格涉及用于运行
    `SSIS` 包的设置。目前还不需要在这里更改任何内容，所以先不用动这个区域。


    点击左侧的 **高级**。这是我们定义包成功和失败操作的地方。单个包不需要输出文件，因为我们将在维护计划包级别而不是这个级别进行处理。确保选中“在历史记录中包括步骤输出”复选框。


    准备好继续后，点击 **确定**。'
- fmt: '#### Schedules Page Settings


    通过点击屏幕底部的 Remove 按钮来删除计划。

    执行此步骤时，你会看到如图[13-10](#A396023_1_En_13_Chapter.html#Fig10)所示的错误。


    ![A396023_1_En_13_Fig10_HTML.jpg](A396023_1_En_13_Fig10_HTML.jpg)

    图 13-10. 计划错误


    这是预期中的情况。以下是我们将如何为未来的计划删除操作处理此问题。点击错误消息上的 OK，然后点击 OK 关闭作业界面。

    首先，让我们通过运行以下查询来查看可用的计划。


    ```sql

    SELECT * FROM msdb.dbo.sysschedules;

    ```


    图[13-10](#A396023_1_En_13_Chapter.html#Fig10)中的错误引用了`sysmaintplan_subplans.schedule_id`列，所以简单的答案是使用以下查询将这些值设置为`NULL`。


    ```sql

    UPDATE msdb.dbo.sysmaintplan_subplans SET schedule_id = NULL;

    ```


    关于这点就这些了。现在，当你去删除一个计划时，你将不会得到错误，因为所有的计划都已被移除。不过，它们仍然驻留在界面中。真烦人。


    #### The sysjobschedules Table


    `msdb`数据库保存了大量关于我们作业的信息，包括分配给这些作业的计划。具体来说，我们要引用的表名为`sysjobschedules`。我们将编写一个查询来显示此表中的信息，以便我们可以在作业的上下文中查看计划及其工作原理。

    这是我们用来查看该表内容的查询；请在一个新的查询窗口中运行它。


    ```sql

    SELECT * FROM msdb.dbo.sysjobschedules ORDER BY schedule_id;

    ```


    该查询将返回如图[13-11](#A396023_1_En_13_Chapter.html#Fig11)所示的信息。


    ![A396023_1_En_13_Fig11_HTML.jpg](A396023_1_En_13_Fig11_HTML.jpg)

    图 13-11. 查询结果


    让我们对`sysjobschedules`和`sysjobs`表使用一点`INNER JOIN`技巧来展示正在发生的事情。为澄清起见，`sysjobschedules`保存了从`sysjobs`表引用的作业的调度信息。我们想要做的是显示`sysjobs`表中的`job_id`和`name`列，以及`sysjobschedules`表中的`schedule_id`列。以下是完整的查询。


    ```sql

    SELECT msdb.dbo.sysjobs.job_id, msdb.dbo.sysjobs.name, sysjobschedules.schedule_id

    FROM msdb.dbo.sysjobs

    INNER JOIN msdb.dbo.sysjobschedules ON

    sysjobschedules.job_id = msdb.dbo.sysjobs.job_id

    ORDER BY msdb.dbo.sysjobs.name;

    ```


    运行此查询。你将看到如图[13-12](#A396023_1_En_13_Chapter.html#Fig12)所示的结果。


    ![A396023_1_En_13_Fig12_HTML.jpg](A396023_1_En_13_Fig12_HTML.jpg)

    图 13-12. 查询结果


    这样好多了！这为我们显示了剩下的可供删除的计划。让我们继续手动删除第一个计划“bak Files”，然后重新运行查询。图[13-13](#A396023_1_En_13_Chapter.html#Fig13)显示了此查询的结果。


    ![A396023_1_En_13_Fig13_HTML.jpg](A396023_1_En_13_Fig13_HTML.jpg)

    图 13-13. 查询结果


    正如我们所想；它消失了！这说明了什么？它意味着这个表专门存储了作业的计划，因此得名`sysjobschedules`。它也告诉我们，我们现在可以删除`sysjobschedules`表的内容，这将移除我们所有的计划。

    让我们快速看一下图[13-14](#A396023_1_En_13_Chapter.html#Fig14)中`sysjobschedules`表的结构。


    ![A396023_1_En_13_Fig14_HTML.jpg](A396023_1_En_13_Fig14_HTML.jpg)

    图 13-14. sysjobsschedules 结构


    这些列中没有`IDENTITY`列，但我们可以看到那些阻止我们早先删除计划的外部约束（由 SSMS 生成的错误）。由于没有`IDENTITY`列需要担心，我建议我们使用`DELETE
    FROM`来清除此表。

    这实际上引出了一个好点子。在从表中清除数据时，`TRUNCATE`和`DELETE FROM`有什么区别？基本上，当你使用`TRUNCATE`时，数据库引擎不处理整个事务日志，它只是清除表和页。`TRUNCATE`操作如果是事务的一部分，可以回滚。如果不是，除非从备份恢复，否则你无法取回该数据。`TRUNCATE`也会锁定表，因此不要在频繁使用的表上使用它。另一方面，`DELETE
    FROM`只是删除指定的信息并将其记录在事务日志中。`DELETE FROM`也不会“重启”一个表；如果你有一个带有`IDENTITY`列的表并使用`DELETE
    FROM`命令删除表中的所有内容，下一个插入表中的`IDENTITY`值将是下一个值——即使表中没有直接引用。这意味着如果你表中有15行数据；然后对该表运行`DELETE
    FROM`；然后插入一行新数据；`IDENTITY`列的值将是16而不是1。`TRUNCATE`会“重启”该表，所以当你有15行数据然后`TRUNCATE`该表时，插入新行数据时`IDENTITY`列从1重新开始。这有很大的区别！

    这并不是说你不能运行`DELETE FROM`命令并在下一行到来时将编号重置为1。为此，在运行`DELETE FROM`语句后运行以下查询。


    ```sql

    DBCC CHECKIDENT(''[table_name].[column_name]'', RESEED, 0);

    ```


    此查询强制表将列重新设置为定义为`IDENTITY`限定符的值，在本例中为`0`。

    因此，无论是在理论上还是在实践中，你都可以运行一个`DELETE FROM`语句，然后是前面的`DBCC`语句，以达到与`TRUNCATE`语句相同的结果（清除表并重置表中`IDENTITY`列的编号），不同之处在于我们能够将`DELETE
    FROM`和`DBCC`语句作为事务日志的一部分。

    好的，让我们继续通过运行以下查询来删除`sysjobschedules`表的内容，但保留`syspolicy_purge_history`记录。从我们之前运行的`INNER
    JOIN`查询中获取作业 ID，并将其插入以下查询中运行。


    ```sql

    DELETE FROM msdb.dbo.sysjobschedules WHERE job_id = ''F74BC679-83F7-4F20-B816-9E12A630EAF1'';

    ```


    这就是你需要做的全部。记住，没有`IDENTITY`列需要担心重新设置种子，所以该命令将完成我们对此表所需的一切：清除计划。如果你打开列表中的下一个作业“Cleanup
    History”，注意“计划”选项卡中明显缺少计划。打开任何一个检查一下；它们都消失了。干得好！


    #### Alerts Page Settings


    此页面应为空白。没关系，因为我们将从包中处理日志记录和报告，而不是从单个任务处理。


    #### Notifications Page Settings


    这是我们之前设置通知的地方。不过，现在应该像上面的“计划”部分一样被清空。我们不需要发送电子邮件，但我建议保留选中的 Write to the Windows
    Application event log 选项，并使用“When the job completes”值。这样，每当作业完成（无论是 On Success
    还是 On Failure），它都会被输入到事件日志中。


    #### Targets Page Settings


    此页面默认为空白。保持空白。'
  raw: '#### Schedules Page Settings


    Remove the schedule by clicking the Remove button at the bottom of the screen.


    You will see error shown in Figure [13-10](#A396023_1_En_13_Chapter.html#Fig10)
    when doing this step.


    ![A396023_1_En_13_Fig10_HTML.jpg](A396023_1_En_13_Fig10_HTML.jpg)


    Figure 13-10.


    Schedule error


    This is to be expected. Here’s how we’re going to take care of that for future
    schedule removals. Click OK on the error message and then click OK to close the
    job interface.


    First of all, let’s look at the available schedules by running the following query.


    ```

    SELECT * FROM msdb.dbo.sysschedules;

    ```


    The error in Figure [13-10](#A396023_1_En_13_Chapter.html#Fig10) referenced the
    sysmaintplan_subplans.schedule_id column, so the short answer is to set these
    values to NULL using the following query.


    ```

    UPDATE msdb.dbo.sysmaintplan_subplans SET schedule_id = NULL;

    ```


    And that’s about it for that. Now, when you go in to remove a schedule, you won’t
    get an error because all of the schedules have been removed. They are still resident
    in the interface though. How annoying.


    #### The sysjobschedules Table


    The msdb database holds a lot of information about our jobs, including the schedules
    assigned to those jobs. In particular, the table we are going to reference is
    named sysjobschedules . We are going to write a query that will show us the information
    in this table, so we can see the schedules and how they work in the context of
    the jobs.


    Here’s the query we’re going to use to see what’s in that table; go ahead and
    run this in a new query window.


    ```

    SELECT * FROM msdb.dbo.sysjobschedules ORDER BY schedule_id;

    ```


    That query will return the information shown in Figure [13-11](#A396023_1_En_13_Chapter.html#Fig11).


    ![A396023_1_En_13_Fig11_HTML.jpg](A396023_1_En_13_Fig11_HTML.jpg)


    Figure 13-11.


    Query Results


    Let’s put a little INNER JOIN magic on the sysjobschedules and sysjobs tables
    to show us what is going on. For clarification, sysjobschedules holds the scheduling
    information for the jobs referenced from the sysjobs table. What we want to do
    is show the `job_id` and `name` columns from the `sysjobs` table, and the `schedule_id`
    column from the `sysjobschedules` table. The following is the completed query.


    ```

    SELECT msdb.dbo.sysjobs.job_id, msdb.dbo.sysjobs.name, sysjobschedules.schedule_id

    FROM msdb.dbo.sysjobs

    INNER JOIN msdb.dbo.sysjobschedules ON

    sysjobschedules.job_id = msdb.dbo.sysjobs.job_id

    ORDER BY msdb.dbo.sysjobs.name;

    ```


    Run this query. You will see the results shown in Figure [13-12](#A396023_1_En_13_Chapter.html#Fig12).


    ![A396023_1_En_13_Fig12_HTML.jpg](A396023_1_En_13_Fig12_HTML.jpg)


    Figure 13-12.


    Query Results


    That’s better! That shows us the schedules left for us to delete. Let’s go ahead
    and manually delete the schedule for the top one, bak Files, and then rerun the
    query. Figure [13-13](#A396023_1_En_13_Chapter.html#Fig13) shows the result of
    this query.


    ![A396023_1_En_13_Fig13_HTML.jpg](A396023_1_En_13_Fig13_HTML.jpg)


    Figure 13-13.


    Query Results


    Just as we thought; it’s gone! What does that tell us? It means that this table
    specifically stores the schedules for the jobs, hence the name `sysjobschedules`.
    It also tells us that we can now delete the contents of the `sysjobschedules`
    table, and that will remove all of our schedules.


    Let’s take a quick look at the structure of the `sysjobschedules` table in Figure
    [13-14](#A396023_1_En_13_Chapter.html#Fig14) for a second though.


    ![A396023_1_En_13_Fig14_HTML.jpg](A396023_1_En_13_Fig14_HTML.jpg)


    Figure 13-14.


    sysjobsschedules Structure


    None of these columns are IDENTITY columns, but we can see those foreign constraints
    that stopped us from deleting the schedules earlier (the error generated by SSMS).
    Since there isn’t an IDENTITY column to worry about, I’m going to recommend that
    we DELETE FROM this table.


    This actually brings up a good point. What is the difference between TRUNCATE
    and DELETE FROM when clearing data from a table? Basically, when you TRUNCATE,
    the database engine doesn’t bother with that whole transaction log thing, it just
    wipes the table and the pages. The TRUNCATE operation can be rolled back if it
    is part of a transaction. If it’s not, you aren’t getting that data back without
    restoring from a backup. TRUNCATE also locks the table, so don’t use it on a table
    that is used a lot. DELETE FROM, on the other hand, simply deletes the specified
    information and logs it in the transaction log. DELETE FROM does not “restart”
    a table either; if you have a table with an IDENTITY column and delete everything
    in the table using the DELETE FROM command, the next IDENTITY value entered into
    the table is going to be the next value—even though there is no direct reference
    in the table. That means if you have 15 rows of data in a table; then run a DELETE
    FROM on that table; then insert a new row of data; the IDENTITY column value is
    going to be 16 and not 1\. TRUNCATE “restarts” that table, so that when you have
    15 rows of data and then TRUNCATE that table, the IDENTITY column starts back
    at 1 when inserting a new row of data. Big difference there!


    That’s not to say that you can’t run a DELETE FROM command and not restart the
    numbering at 1 when the next row comes in. To do this, run the following query
    after running your DELETE FROM statement.


    ```

    DBCC CHECKIDENT(''[table_name].[column_name]'', RESEED, 0);

    ```


    This query forces the table to reseed the column with the value defined as the
    IDENTITY qualifier, which in this case is 0.


    So, in both theory and in practice, you could run a DELETE FROM statement and
    then the preceding DBCC statement, and achieve the same results as a TRUNCATE
    statement (wipe the table and reset the numbering for the IDENTITY column in a
    table), except that we are able to have the DELETE FROM and DBCC statements as
    part of the transaction log.


    Okay, let’s go ahead and delete the contents of the `sysjobschedules` table, except
    for the syspolicy_purge_history record, by running the following query. Grab the
    job ID from the previous INNER JOIN query we ran before and insert that into the
    following query to run it.


    ```

    DELETE FROM msdb.dbo.sysjobschedules WHERE job_id  ''F74BC679-83F7-4F20-B816-9E12A630EAF1'';

    ```


    That’s all you need to do. Remember, there is no IDENTITY column to worry about
    reseeding, so that command will do all we need for this table; clear out the schedules.
    If you open up the next job in the list, Cleanup History, notice the distinct
    lack of a schedule in the Schedules tab. Open any of them and check; they’re all
    gone. Good job!


    #### Alerts Page Settings


    This page should be blank. That’s okay, because we will be handling the logging
    and reporting from the package and not the individual tasks.


    #### Notifications Page Settings


    This is where we set the notifications earlier. This should be cleared out now
    though, much like the Schedules part above. We don’t need to send an e-mail, but
    I recommend keeping the Write to the Windows Application event log option selected
    and with the “When the job completes” value. That way, whenever the job completes
    (either On Success or On Failure), it is entered into the event log.


    #### Targets Page Settings


    This page is blank by default. Leave it blank.'
