    in Figure [2-21](#A396023_1_En_2_Chapter.html#Fig21).


    ![A396023_1_En_2_Fig21_HTML.jpg](A396023_1_En_2_Fig21_HTML.jpg)


    Figure 2-21.


    Job Properties, Steps tab


    Notice that the menu bar does not show our new name yet. The Name in the Job step
    list isn’t updated either. How frustrating. Let’s fix that now.


    Double-click the text Subplan_1\. The Job Step Properties window opens, so change
    the “Step name” box to Full Backup, as shown in Figure [2-22](#A396023_1_En_2_Chapter.html#Fig22).


    ![A396023_1_En_2_Fig22_HTML.jpg](A396023_1_En_2_Fig22_HTML.jpg)


    Figure 2-22.


    Job Properties, Steps tab, General option


    Don’t touch anything else on this screen just yet, except for clicking the Advanced
    option on the left. Adjust this screen to the settings shown in Figure [2-23](#A396023_1_En_2_Chapter.html#Fig23).


    ![A396023_1_En_2_Fig23_HTML.jpg](A396023_1_En_2_Fig23_HTML.jpg)


    Figure 2-23.


    Job Properties, Steps tab, Advanced option


    Click OK when this is done and you will go back to the Job Properties screen,
    with the text Full Backup now replacing Subplan_1\. Figure [2-24](#A396023_1_En_2_Chapter.html#Fig24)
    is what you should see now.


    ![A396023_1_En_2_Fig24_HTML.jpg](A396023_1_En_2_Fig24_HTML.jpg)


    Figure 2-24.


    Job Properties, Steps tab


    Click the Schedules option on the left and notice that our schedule is in there,
    and that it is enabled, as shown in Figure [2-25](#A396023_1_En_2_Chapter.html#Fig25).


    ![A396023_1_En_2_Fig25_HTML.jpg](A396023_1_En_2_Fig25_HTML.jpg)


    Figure 2-25.


    Job Properties, Schedules tab


    Click the Alerts option and you will see a blank screen. This is fine, for now.


    Click the Notifications option and you will see what is shown in Figure [2-26](#A396023_1_En_2_Chapter.html#Fig26).


    ![A396023_1_En_2_Fig26_HTML.jpg](A396023_1_En_2_Fig26_HTML.jpg)


    Figure 2-26.


    Job Properties, Notifications tab


    If you have an Operator set up already, select that in the Email box. For the
    time being, we are going to keep the “Write to the Windows Application event log”
    option selected, but we are going to change the drop-down to “When the job completes”;
    that way, we will always know what happened with our job. More on this a bit later.


    Clicking the Targets option will show a blank screen as well. This is fine, since
    we haven’t defined any targets.


    Click OK when you are through with the Targets option and have followed the directions
    for this area. You will then see that the Jobs folder has changed to what you
    see in Figure [2-27](#A396023_1_En_2_Chapter.html#Fig27).


    ![A396023_1_En_2_Fig27_HTML.jpg](A396023_1_En_2_Fig27_HTML.jpg)


    Figure 2-27.


    Updated SQL Server Agent Jobs


    Now you can clearly see that this job is specifically the Full Backup job. Do
    the same things listed earlier for the other two and label them accordingly. Remember
    that we defined the full backup as the first task, the differential backup as
    the second task, and the transaction log as the third task. Those line up with
    the Subplan designations here. You should end up with what you see in Figure [2-28](#A396023_1_En_2_Chapter.html#Fig28).


    ![A396023_1_En_2_Fig28_HTML.jpg](A396023_1_En_2_Fig28_HTML.jpg)


    Figure 2-28.


    Completed SQL Server Agent Jobs


    It’s okay that syspolicy_purge_history is in there too. That’s a job that SQL
    Server does on its own.


    And that, my friend, is how you set up a database backup maintenance plan.


    It’s worth noting that you can also update the Job names from the Maintenance
    Plan itself by double-clicking and editing the Subplan names from the Design Surface,
    and then saving the plan. You may find this quicker, once you get experienced
    in setting up the maintenance plans.


    ## Summary


    This was a big chapter, but I wanted to be sure to cover all of the important
    bits needed to really get into the specifics of the tasks.


    To review, you learned about the following:


    *   Full, Bulk Logged, and Simple recovery models

    *   Full, differential, and transaction log backups

    *   Configuration options for the backup tasks


    Recall that I mentioned that database backups were arguably the most important
    part to database administration. I sincerely hope that you have learned exactly
    why this is in this chapter. Data integrity is an important topic, as is data
    protection, loss mitigation, and a host of other database concepts. At the core
    of each of these concepts is one very important piece of the puzzle that absolutely
    must be present: data. Protecting that data is our job as database administrators.
    And, properly maintained backups are integral in providing that puzzle piece.


    # 3. Checking Database Integrity


    Being a database administrator means that you wear many different hats. For those
    unfamiliar with this phrase, it means that you may do different things throughout
    the day that aren’t necessarily related. One thing will never change for a database
    administrator: the data is your life. Without it, you have no job. So for those
    of us working for a living, this is sort of important. Not only are we tasked
    with making sure that data coming in is sanitary, we also have to make sure that
    the data stays sanitary. This can be quite a daunting task, if not for database
    integrity.'
  trans: '### 配置作业


    请注意，现在在 `SQL Server 代理` 的 `作业` 文件夹中有一些作业。这些名称不太具有描述性，不是吗？哪个是哪个？让我们马上来修正。双击 `Subplan_1`。您应该会看到图
    2-20 所示的内容。


    ![A396023_1_En_2_Fig20_HTML.jpg](img/A396023_1_En_2_Fig20_HTML.jpg)


    图 2-20. 作业属性，`常规` 选项卡


    看到上面标有 `名称` 的第一个框了吗？只需将其末尾改为 `完整备份`，而不是 `Backup Maintenance Plan.Subplan_1`。注意它在
    `类别` 选项中也被设置为 `数据库维护`。这很好，因为这正是我们正在做的事情。确保 `启用` 复选框被勾选——这个界面就全部设置好了。


    我跳过的一件事是 `所有者` 选择。这通常应设置为数据库的所有者。


    另外请注意，在屏幕左侧有菜单选项。您当前位于 `常规` 选项。如果单击 `步骤` 选项，您将看到图 2-21 所示的内容。


    ![A396023_1_En_2_Fig21_HTML.jpg](img/A396023_1_En_2_Fig21_HTML.jpg)


    图 2-21. 作业属性，`步骤` 选项卡


    请注意，菜单栏尚未显示我们的新名称。`作业步骤` 列表中的 `名称` 也未更新。真令人沮丧。让我们现在就来修复它。


    双击文本 `Subplan_1`。`作业步骤属性` 窗口将打开，因此将“步骤名称”框更改为 `完整备份`，如图 2-22 所示。


    ![A396023_1_En_2_Fig22_HTML.jpg](img/A396023_1_En_2_Fig22_HTML.jpg)


    图 2-22. 作业属性，`步骤` 选项卡，`常规` 选项


    暂时不要碰此屏幕上的其他任何内容，只需单击左侧的 `高级` 选项。将此屏幕调整为图 2-23 所示的设置。


    ![A396023_1_En_2_Fig23_HTML.jpg](img/A396023_1_En_2_Fig23_HTML.jpg)


    图 2-23. 作业属性，`步骤` 选项卡，`高级` 选项


    完成后单击 `确定`，您将返回到 `作业属性` 屏幕，此时文本 `完整备份` 已替换 `Subplan_1`。图 2-24 是您现在应该看到的内容。


    ![A396023_1_En_2_Fig24_HTML.jpg](img/A396023_1_En_2_Fig24_HTML.jpg)


    图 2-24. 作业属性，`步骤` 选项卡


    单击左侧的 `计划` 选项，注意我们的计划就在那里，并且它是启用的，如图 2-25 所示。


    ![A396023_1_En_2_Fig25_HTML.jpg](img/A396023_1_En_2_Fig25_HTML.jpg)


    图 2-25. 作业属性，`计划` 选项卡


    单击 `警报` 选项，您将看到一个空白屏幕。目前，这没问题。


    单击 `通知` 选项，您将看到图 2-26 所示的内容。


    ![A396023_1_En_2_Fig26_HTML.jpg](img/A396023_1_En_2_Fig26_HTML.jpg)


    图 2-26. 作业属性，`通知` 选项卡


    如果您已经设置了 `操作员`，请在 `电子邮件` 框中选择它。目前，我们将保持“写入 `Windows 应用程序` 事件日志”选项为选中状态，但我们要将下拉菜单更改为“当作业完成时”；这样，我们总能知道我们的作业发生了什么。稍后会详细介绍。


    单击 `目标` 选项也将显示空白屏幕。这没问题，因为我们尚未定义任何目标。


    完成 `目标` 选项并遵循此区域的说明后，单击 `确定`。然后您将看到 `作业` 文件夹已更改为图 2-27 所示的内容。


    ![A396023_1_En_2_Fig27_HTML.jpg](img/A396023_1_En_2_Fig27_HTML.jpg)


    图 2-27. 已更新的 `SQL Server 代理` 作业


    现在您可以清楚地看到这个作业是专门的 `完整备份` 作业。对另外两个作业执行前面列出的相同操作，并相应地标记它们。请记住，我们将完整备份定义为第一个任务，差异备份定义为第二个任务，事务日志备份定义为第三个任务。这些与这里的
    `Subplan` 指定相对应。您最终应该得到图 2-28 所示的内容。


    ![A396023_1_En_2_Fig28_HTML.jpg](img/A396023_1_En_2_Fig28_HTML.jpg)


    图 2-28. 已完成的 `SQL Server 代理` 作业


    `syspolicy_purge_history` 也在里面，这没关系。那是 `SQL Server` 自己执行的作业。


    好了，我的朋友，这就是如何设置数据库备份维护计划。


    值得注意的是，您也可以从 `维护计划` 本身更新 `作业` 名称，方法是通过 `设计界面` 双击并编辑 `Subplan` 名称，然后保存计划。一旦您在设置维护计划方面经验丰富了，您可能会发现这种方法更快。


    ## 小结


    这是内容庞大的一章，但我希望能涵盖所有真正深入了解任务细节所需的要点。


    回顾一下，您学习了以下内容：


    *   `完整`、`大容量日志` 和 `简单` 恢复模型

    *   `完整`、`差异` 和 `事务日志` 备份

    *   备份任务的配置选项


    回想一下，我曾提到数据库备份可以说是数据库管理最重要的部分。我真诚地希望您在本章中已经了解了其中的确切原因。数据完整性是一个重要主题，数据保护、损失缓解以及许多其他数据库概念也是如此。所有这些概念的核心是一个非常重要的、绝对必须存在的要素：数据。保护这些数据是我们作为数据库管理员的工作。而正确维护的备份是提供这个关键拼图不可或缺的部分。


    # 3. 检查数据库完整性


    成为一名数据库管理员意味着您需要身兼多职。对于不熟悉这个短语的人来说，它的意思是您一天中可能要做不同的事情，这些事情不一定相关。对于数据库管理员来说，有一件事永远不会改变：数据就是您的生命。没有它，您就没有工作。所以，对于我们这些以此谋生的人来说，这有点重要。我们不仅负责确保输入的数据是干净的，还必须确保数据保持干净。如果不是为了数据库完整性，这可能是一项相当艰巨的任务。'
- fmt: '# What Is Database Integrity?


    Database integrity is a concept that should be applied in the design phase of
    the database. The tables themselves determine whether there are rules to apply
    for inserting data into a table. These rules are going to cascade down to either
    a well-built database with integrity, or a poorly built database with little or
    no integrity.


    Database integrity is an easy topic to understand. You want to be able to guarantee,
    as much as humanly possible, that this data is what it says it is. I have told
    my kids since they were little that the definition of integrity is “doing the
    right thing, even when no one is looking.” In this context, we, as database administrators,
    have to guarantee that the data entrusted to us is going to be protected and maintained
    as best as we know how. There is no better way to guarantee the integrity of data
    than to adopt a proactive approach to daily maintenance that includes the guidelines
    found in this book.


    How does this apply to data? Well, think about the implications if a record were
    entered into a table with the same `UID` (unique identifier) as another record,
    and then querying the database for that record. You would not return the data
    you thought you would get. This is clearly poor database design. How could this
    happen? If the `UID` field weren’t defined as a unique key, that’s how. Again,
    poor design leads to poor integrity.


    An interesting point about database integrity is that even poorly designed databases
    can guarantee the integrity of the data. Ever heard the saying that “even a broken
    clock is right twice a day”? Same thing here. Basically, the database will guarantee
    that it will return the wrong data, every time, as requested. Is this ideal? Obviously
    not.


    Another aspect to database integrity is the structural integrity of the tables
    and the indexes. Over time, they can become corrupted. Having a disaster recovery
    plan is the best way around this, and an important part of that recovery plan
    is ensuring that the data in the recovery is complete and correct. This can only
    be accomplished with database integrity.


    There seems to always be time, money, and resources to do the job over again later,
    but there is never enough time, money, or resources to do the job correctly the
    first time. Any job you do is worth doing well, so if you’re going to put your
    name on a project, make sure that you under-promise and over-deliver. In other
    words, your personal integrity (doing the right thing when no one is looking)
    leads to higher data integrity (quality/availability of data).


    **Tip**


    Take the time to do it right the first time instead of having to either do it
    over again or be forced to work with a poorly designed database.


    ## Practical Application of Database Integrity Principles


    Do you need to add this task to your maintenance plan? The short answer is yes.
    Let’s take a look and find out though. In SQL Server Management Studio, right-click
    your database name, go to Reports ➤ Standard Reports ➤ `Database Consistency History`
    . This starts a report that shows you the number of errors found and the number
    of errors repaired, as shown in Figure [3-1](#A396023_1_En_3_Chapter.html#Fig1).


    ![A396023_1_En_3_Fig1_HTML.jpg](A396023_1_En_3_Fig1_HTML.jpg)

    Figure 3-1. Database Consistency History Report with no data


    If you don’t see any data in the report, open a new Query window and type the
    following:


    ```

    DBCC CHECKDB([database_name]) WITH no_infomsgs

    ```


    Obviously, replace `[database_name]` with the name of your database. Press `F5`
    to run the query. It will take a few seconds. Switch back to the report and click
    the Refresh icon. Bingo! You’ve got a record. Figure [3-2](#A396023_1_En_3_Chapter.html#Fig2)
    shows what the interface looks like once a record has been added.


    ![A396023_1_En_3_Fig2_HTML.jpg](A396023_1_En_3_Fig2_HTML.jpg)

    Figure 3-2. Database Consistency History Report with data


    **Tip**


    If you get a failure at this point, the most common cause is going to be because
    the physical database files (the `MDF` and `LDF` files) are located on a partition
    that is formatted with `FAT` and not `NTFS`. The database engine will fail trying
    to create a snapshot at this point, which is what it runs the `DBCC` commands
    against (instead of the actual database).


    So… what does the record in Figure [3-2](#A396023_1_En_3_Chapter.html#Fig2) mean?
    Let’s break it down and see. Figure [3-2](#A396023_1_En_3_Chapter.html#Fig2) shows
    the data as recorded by the `DBCC` transaction. The following columns are returned:


    *   `Command Text`: This column simply shows the SQL that was parsed and executed
    by the database engine. This should be exactly as written earlier.

    *   `Login Name`: This is the name of the account that the `Command Text` was
    executed under. Different accounts have different permissions, so if the command
    failed, it could possibly be due to not having an account with permissions to
    run the `DBCC` command. In this event, you need to log in with an admin level
    account; otherwise, none of this will work.

    *   `Start Time`: I wonder what this means…? Oh! This is the time that the query
    started execution. What’s curious is that there isn’t an `End Time` column. There
    is, however a `Duration` column, so it’s up to the DBA to do the time parsing.

    *   `# Errors`: If you see a value here, you are in trouble. That means that something
    has started to go wrong; without further analysis, it will be impossible to determine
    what it is.

    *   `# Errors Repaired`: If you see a value in the `# Errors` column, and you
    don’t see the same value in this column, you are about to have serious issues.
    This means that there are unresolved errors in the consistency of the data; this
    will definitely not be the last you see of the error.

    *   `Duration (hh:mm:ss)`: This is simply how long the query took to run. The
    database I ran this on is a brand-new database, so it was only around `8MB` and
    it took `0` seconds for it to run.


    As you can tell, this report is extremely useful in determining whether your database
    is “healthy.” Keeping a close eye on this report helps mitigate future issues
    through early detection. Even though this record returned `0` errors, that doesn’t
    mean that it doesn’t need to be added to the maintenance plan. On the contrary,
    the fact that we see `0` here means that database integrity has been achieved
    to the point that there are no reportable errors with the consistency of the data,
    which is a very good thing. Having database integrity as a part of any maintenance
    plan is an absolute necessity.


    Let’s create a maintenance plan to cover database integrity now.'
