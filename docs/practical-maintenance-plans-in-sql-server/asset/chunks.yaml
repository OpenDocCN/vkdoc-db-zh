  trans: '

    我将为此界面选择默认选项，并点击 `下一步` 继续。接下来，你会看到如图 4-12 所示的界面，标题为 **完成向导**，其中包含所选设置的简要摘要。我们接下来就看看这些内容。


    ![A396023_1_En_4_Fig12_HTML.jpg](img/A396023_1_En_4_Fig12_HTML.jpg)


    **图 4-12.**


    **完成向导**


    从上到下，我们看到之前输入的所有信息。它告诉我们创建了一个新账户和配置文件。它告诉我们已将该新账户添加到了那个新配置文件中。可以把配置文件想象成某种安全容器；要编辑账户，就必须先编辑配置文件。最后，它告诉我们已将配置文件设为公开。


    看起来我们准备好实施了，对吧？点击 `完成` 见分晓。图 4-13 展示了你应该得到的结果。


    ![A396023_1_En_4_Fig13_HTML.jpg](img/A396023_1_En_4_Fig13_HTML.jpg)


    **图 4-13.**


    **正在配置…**


    哇哦！我总是喜欢看到所有那些绿色的复选框！如果你没得到这个结果，请回到本章开头重新开始。


    ## 发送测试电子邮件


    如果你确实得到了那些绿色的复选框，恭喜！让我们继续前进，将 `数据库邮件` 实施为数据库维护计划的一部分。记住，使用电子邮件的目的是……？没错，是为了让我们数据库管理员了解数据库的任何潜在问题。在此特定情况下，我们将利用
    `数据库邮件` 在查询成功运行时向我们发送状态报告。


    再次右键单击 `数据库邮件`，然后选择 `发送测试电子邮件`。你会看到一个弹出的屏幕，其中包含信息，如图 4-14 所示。


    ![A396023_1_En_4_Fig14_HTML.jpg](img/A396023_1_En_4_Fig14_HTML.jpg)


    **图 4-14.**


    **发送测试电子邮件**


    在 `收件人` 框中填写一个有效的电子邮件地址，然后点击 `发送测试电子邮件`。邮件可能需要一点时间才能送达，但它应该会出现。如果没有，那么说明某些设置不正确，你可能需要回到开头，找出可能遗漏的步骤。


    ## 启用邮件配置文件


    那么，现在我们的数据库可以发送邮件了，对吧？你可能会讨厌我这么说，但是……是也不是。你看，`SQL Server` 有一套关于安全原则的讲究，仅仅因为一个用户或登录账户有权限做某事，并不意味着所有用户和登录账户都有权限做同样的事。因此，必须强调一点：如果不进行额外的步骤，`Database
    Mail` 可能永远无法自行运行。


    是的，数据库刚刚确实发送了测试邮件。但请记住这一点：当你登录到 `SQL Server` 时，你所做的任何操作都是在你的登录上下文下完成的。如果你被授予了执行某项操作的权限，猜猜看：你就能做。因此，如果你没有被授予该权限，你就不允许做。在大多数情况下，常规的
    `SQL Server` 登录账户（特别是那些使用 `sa` 账户登录的）默认就有发送邮件的权限。有趣的是，`SQL Server Agent` 默认却没有发送邮件的权限。这不奇怪吗？


    默认情况下不启用发送邮件功能可能有其充分的理由，但我实在想不出任何好的理由，所以我就把这个问题推给微软了。


    我怎么强调都不为过的一点是，务必要在 `SQL Server Agent` 中启用邮件配置文件。首先，右键单击 `SQL Server Agent` 并选择
    `属性`，如图 4-15 所示。


    ![A396023_1_En_4_Fig15_HTML.jpg](img/A396023_1_En_4_Fig15_HTML.jpg)


    **图 4-15.**


    **SQL Server Agent 属性**


    打开后，在左侧，你会看到一些选项，可以让你选择进入 `SQL Server Agent` 配置的不同区域。先别在这里修改任何东西。说真的，你会后悔的。


    点击 `警报系统` 选项。会弹出一个界面，如图 4-16 所示。


    ![A396023_1_En_4_Fig16_HTML.jpg](img/A396023_1_En_4_Fig16_HTML.jpg)


    **图 4-16.**


    **SQL Server Agent 属性（初始界面）**


    那些狡猾的微软小开发者！注意，顶部的 `启用邮件配置文件` 旁边的复选框未被勾选。这简直就是阻止你从 `SQL Server` 发送自动化电子邮件的唯一原因。选中该复选框，确保选择了
    `数据库邮件`，然后选择我们之前设置的邮件配置文件。如果你之前定义了操作员，可以在这里将他们设置为故障安全操作员；因此，勾选底部附近 `启用故障安全操作员`
    旁边的复选框，并选择你的操作员。如果你还没有定义操作员，我们很快就会进行定义，然后你可以回到这里将其添加到这些属性中。还请务必选择 `电子邮件` 选项，以便通过电子邮件通知该人员。完成后的界面应类似于图
    4-17。


    ![A396023_1_En_4_Fig17_HTML.jpg](img/A396023_1_En_4_Fig17_HTML.jpg)


    **图 4-17.**


    **SQL Server Agent 属性（完成后的界面）**


    所有这些都完成后，点击 `确定`，右键单击 `SQL Server Agent`，然后选择 `重新启动`。将弹出一个提示，询问你是否要重新启动，所以选择 `是`。这将重启服务，并启用
    `SQL Server Agent` 内的 `数据库邮件` 子系统。


    相信我。这正是以后会阻止你的地方。当你学完本章后，回去禁用邮件配置文件，看看会发生什么。没有邮件！


    让我们花点时间回顾一下我们目前为此练习所做的工作。我们想做什么？我们想创建一个 `SQL Server Agent` 作业，该作业在运行 `SQL` 查询时发送电子邮件，并在该电子邮件中返回查询的状态。我们成功完成了吗？为什么成功或为什么没成功？还没有。我们还没有编写查询，也没有完成
    `SQL Server Agent` 作业。下一步是什么？下一步是编写一个简单的查询，然后将该查询和 `数据库邮件` 整合到 `SQL Server Agent`
    作业中进行测试。


    现在我们有了路线图。首先，编写查询。其次，将查询和邮件移到作业的步骤中并开始测试。


    ## SQL 代理作业创建


    现在电子邮件已配置好，你可以创建 `SQL Agent` 作业来执行查询等操作。这些可以是简单的 `SQL` 查询，也可以是 `T-SQL` 代码块。


    ### 创建示例表


    如果你有想使用的查询，直接使用即可。为了本练习的目的，如果你还没有任何表并且想运行一个示例，只需执行以下两个查询。第一个查询创建表；第二个用数据填充它。


    ```sql

    CREATE TABLE [dbo].Users NOT NULL,

    [userid] varchar NOT NULL,

    [lastname] varchar NOT NULL,

    [firstname] varchar NOT NULL,

    [email] varchar NOT NULL,

    [phone] varchar NOT NULL,

    [admin] [bit] NOT NULL

    ) ON [PRIMARY]

    INSERT INTO [dbo].Users

    VALUES (''beardbr1'',''Beard'',''Bradley'',''bradley.beard@gmail.com'',''555-555-5555'',1);

    GO

    ```


    你可以向表中输入任意多的数据。不过我建议在表中放入多于一行的数据。这些信息只是一个占位符，以便让你知道要输入什么。最后一个字段 `admin` 用于确定用户是否为管理员级别用户。`0`
    表示不是，`1` 表示是。如何在应用程序中实现这一点取决于你或软件开发人员。


    请记住，前面的查询并不是我们将在示例 `SQL Server Agent` 作业中使用的内容。它们只是为了为我们设置一个包含数据的表以便查询。


    接下来，让我们编写将要放入作业中的实际查询。查看我们数据中的列，事情似乎相当直白。按姓氏排序生成一个关于所有数据的漂亮小报告怎么样？听起来不错。这是一个非常容易编写的查询。

    '
- fmt: '# Writing a Query for the Job


    We have an example table and some data in place. Now we can write query against
    that data, and then schedule execution of the query through a SQL Agent job.


    Here is the example query that we’ll execute:


    ```sql

    SELECT [userid],[firstname] + '' '' + [lastname] AS uname,[email],[phone],[admin]

    FROM [dbo].[Users]

    ORDER BY [lastname];

    ```


    **Tip:** If you constantly see the column and table names underlined when writing
    perfectly valid SQL, your IntelliSense cache probably needs to be refreshed. Press
    `Ctrl+Shift+R` to refresh the cache and get it back to how it should look.


    Let’s just go over the query really quickly, just to be sure that everyone understands
    what is going on. I am getting the concatenation of the `firstname` and `lastname`
    fields as a new field name called `uname`. This is specifically so that I don’t
    return two columns for each name, with the last name and the first name separated.
    I would rather have them returned in a nice, readable format; hence, concatenate
    them together and call it a day.


    So now we have the database mail setup correctly and we have a functional query
    to return our data. All that is left is for us to put them together in a SQL Server
    Agent job.


    # Creating a SQL Server Agent Job


    In SQL Server Management Studio, expand SQL Server Agent (at the very bottom),
    right-click the `Jobs` folder and select `New Job…`. The first thing to notice
    on the General tab is that the `Owner` box isn’t necessarily your logged in user
    name, but usually your Windows account name (your first and last name, usually,
    if using Windows Authentication). You need to change this to your actual Windows
    username, as shown in Figure 4-18, which is probably the owner of the database
    anyway.


    ![A396023_1_En_4_Fig18_HTML.jpg](A396023_1_En_4_Fig18_HTML.jpg)

    *Figure 4-18. New Job (initial interface)*


    You need to add a name for the job, so just enter `Email User Information` in
    the `Name` field.


    Change the `Category` to `Database Maintenance` and add a simple description.
    It should be something that is easily identifiable. You don’t want to write War
    and Peace here, but you also don’t want to write “does stuff” either. Short but
    concise is the key.


    Your screen should now resemble Figure 4-19.


    ![A396023_1_En_4_Fig19_HTML.jpg](A396023_1_En_4_Fig19_HTML.jpg)

    *Figure 4-19. New Job (updated interface)*


    Make sure that the `Enabled` check box is checked; otherwise, the job is not enabled
    and it will not run as expected.


    # SQL Server Agent Options


    Pay attention to the menu options on the left of the interface. These are the
    different options that you have to set in the job, as you have seen in earlier
    chapters. Let’s take a look at those options now. Don’t make any changes yet,
    just familiarize yourself with the options:


    *   `General`: This is the option that you are currently on. It lets you set the
    general options, hence the name.

    *   `Steps`: This option lets you define the steps that the job will take. You
    can also switch up the order of the steps, or define a different starting step.
    As always, once you add a step, you can always go back and edit or delete it.

    *   `Schedules`: This option lets you define a schedule to run the job. It can
    be set up almost any way you can imagine, so spend some time in this area to make
    sure that you got it right.

    *   `Alerts`: This option lets you choose from a wide variety of alerts that SQL
    Server maintains. Click the `Add` button at the bottom of the screen. When you
    first enter this option, you are on the `General` tab of the `New Alert` window.


    Alerts are further broken down, as follows:


    *   `SQL Server event alert`: Choose the database to target and the severity or
    error number to look for. You can also set an alert to be raised whenever specific
    text is returned from any message, such as “error” or “failure”, for example.

    *   `SQL Server performance condition alert`: This one is fun. You can choose
    the `Object`, `Counter`, and `Instance` to target here. For example, if you wanted
    to see the number of transactions as of the time that the job runs, you would
    choose `Databases` as the Object, `Active Transactions` for Counter, and your
    database name for the Instance. Change the value to “Alert if counter” to “rises
    above” and `0`, and you will have a handy dandy performance monitor.

    *   `WMI event alert`: This area uses little-known WQL, or Windows Management
    Instrumentation (WMI) Query Language, to monitor SQL Server events. I think it
    may be beyond the scope of this book, since we can do what we need with the other
    two areas.


    Next is the `Response` tab. Here is where you define what job you want to execute.
    You also have the option to `Notify Operators` by selecting the check box and
    choosing `New Operator` or choosing a predefined operator. Simply fill out the
    interface as needed and you are done! SQL Server makes this very easy to manage,
    don’t you think? Select the `E-mail` check box and you will be all set up. It
    is important to mention here that this is not what we set up earlier. This isn’t
    the database mail portion of the job; this pertains only to this particular `Alerts`
    area. We will get to the database mail portion next.


    ## Notifications


    Here is the part where we add the database mail. When you first open this tab,
    you see the `E-mail`, `Page`, and other options on the right. Select the `E-mail`
    check box and pull down the menu just to the right. You will see the operator
    name that you entered earlier. Leave it alone for now, since this is just an introduction
    to the options.


    ## Targets


    This is where you can choose which servers to target. Your options are—get ready
    for it—`local` or `multiple`. Note that the `Multiple` option is probably grayed
    out. This is because there are no other servers added as linked servers, and there
    is no contingency to have the server communicate with any other server.


    Now that we’ve gone through the options, let’s finally set up the job!


    # Steps Tab


    Go back to the `Steps` tab. It should be blank, meaning that there are no steps
    listed yet. On this `Steps` tab, there is a button labeled `New` at the bottom
    of the screen. Click this to continue.


    ## General


    You should see the interface shown in Figure 4-20 open. Notice that you are currently
    on the `General` tab on this screen.


    ![A396023_1_En_4_Fig20_HTML.jpg](A396023_1_En_4_Fig20_HTML.jpg)

    *Figure 4-20. New Job Step, General option (initial interface)*


    This is what you see at this point. Enter `Run SQL Query` in the `Step name` box.


    Coincidentally, the `Transact-SQL Script (T-SQL)` option is already selected for
    us. There are other options here that you can choose, but we will stick with this
    one for now.


    There is a drop-down here labeled `Run as`. You can leave it at the default (which
    is blank). This box is for if you have set up a proxy account, and would like
    the proxy account to execute this step instead of the SQL Server Agent account.
    The reason for this is that the current context of a running job is always going
    to be SQL Server Agent, but the current step can be executed by a different user.
    You can set a different user for a particular task, which I will show you next,
    but this can stay at the default.


    Select your database name from the `Database` drop-down menu; `master` is currently
    selected.


    The `Command` box is where you want to paste the SQL query we wrote earlier, so
    go ahead and put that in there. You can press `Parse`, if you would like. The
    interface should now look like Figure 4-21.


    ![A396023_1_En_4_Fig21_HTML.jpg](A396023_1_En_4_Fig21_HTML.jpg)

    *Figure 4-21. New Job Step, General option (updated interface)*


    When you’re ready, click the `Advanced` tab to continue.'
