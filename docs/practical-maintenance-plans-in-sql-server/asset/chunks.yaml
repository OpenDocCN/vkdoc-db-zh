    献给你，我最亲爱的杰西卡


    # 引言


    您是否曾想过是什么让您的数据库运行顺畅？我们都希望数据库能像初次安装时那样良好运行，但究竟发生了什么？更重要的是，我们能否控制正在发生的事情？事实证明，我们确实可以控制这些事件，它们是我们用来确保数据库保持良好状态的极其强大的工具。


    本书将向您介绍创建维护计划的核心概念，该计划将处理所有必要任务，使您的数据库保持 100% 的功能。您可以在自己的 SQL Server 安装中运行这些练习，通过利用
    SQL Server Agent 的功能来确保更高的数据安全性和完整性。只要具备适当的预见和规划，任何经验级别的数据库管理员都能在短时间内自信地使用 SQL
    Server 中的可用工具创建极其多功能的维护计划。


    ## 本书的范围是什么？


    在本书中，我将尽可能集中使用 SQL Server 2012 Management Studio 界面。我不会涉及太多手写脚本；将尽可能采用点击操作。某些领域我们会涉足未知，但我会尽量减少这种情况。需要明确的是，我将使用维护计划向导，而非维护计划设计界面。虽然有时我会直接关注设计界面，但大部分情况下，我们将使用向导。正如您即将看到的，我在此详述和概述的内容大部分都适用于这两个界面。


    我们将创建一个单一的维护计划，该计划将在设定的时间表上每天自动执行。我将向您展示如何操纵数据库引擎，在我们选择的时间表上执行我们选择的维护活动。我还将向您展示如何从数据库的角度扩展报告和日志记录的概念，以便我们了解任何可能出现的问题。最终，我们将得到一个维护计划，它能一劳永逸地完成我们需要它做的一切。这将给我们提供一个助手，可以说，它在我们无需监督的情况下执行这些琐碎但重要的任务。当我想起维护计划时，我立刻会想到罗恩·波佩尔的老广告，其中说“设置它……然后忘记它！”。这正是我们在这里要做的事情。我们将花时间正确设置，并探究原因而不仅仅是方法。然后，我们将确保报告和日志记录设置正确，以便我们了解任何问题。之后，一切将一帆风顺，您可以享受您新近提升的摇滚明星
    DBA 地位。

    '
- fmt: '## Who Is this Book Written For?


    This book was written for you, of course! It should be a refresher course for
    the majority of readers. My hope is that this book will augment what you already
    know, and perhaps shed some light on some concepts that you didn’t know. At a
    minimum, you should come away from this book with a clear understanding of what
    a maintenance plan is, how it benefits a database, how to structure it correctly,
    how it runs, and how to possibly make it run more efficiently. I would like to
    think that this isn’t the first you have read about maintenance plans, as there
    is a certain level of assumed knowledge about the interface and mechanics of `SQL
    Server`. If it is the first you’ve heard of it, that’s fine; I keep everything
    as simple as possible so that anyone can read along and understand… even my 12-year-old
    daughter! I try to keep things “light”, meaning that I tend to try and put some
    element of humor into my writing to keep things interesting, but I will cover
    some pretty heavy topics also, so sometimes it gets serious.


    Chapter [1](#A396023_1_En_1_Chapter.html) provides introduction into the separate
    components of the maintenance plans, and concise examples of what you can do to
    make the maintenance plan work for you. Chapters [2](#A396023_1_En_2_Chapter.html)
    through [12](#A396023_1_En_12_Chapter.html) will detail each of the tasks available
    within the maintenance plan, and Chapter [13](#A396023_1_En_13_Chapter.html) will
    tie everything together so that you can create a complete maintenance plan based
    on your specific needs. Along the way, I will examine the multitude of rabbit
    holes that pop up, because there are actually quite a few little bits of interesting
    things that need to be discussed. In the end, you will have a complete set of
    tools and the knowledge to use those tools to achieve great things for your database.


    Having said all that, let’s dive into this adventure! You can use any installation
    of `SQL Server` you would like, provided that you have `SSIS` installed. That
    implies any version after and including `SQL Server 2005`, and it must be `Standard`,
    `Enterprise`, or `Business Intelligence` versions. Although this book was specifically
    written with `SQL Server 2012` in mind, I also ran everything through `SQL Server
    2014` and had absolutely no issues beyond slight interface differences.


    ## Acknowledgments


    First of all, a huge thanks to Jonathan Gennick for all the guidance and tips
    along the way.


    A big thanks to my wife and kids for understanding.


    Big, huge, gigantic thanks to my good friend and mentor John Wysocki, without
    whom I would not know half as much as I do about anything related to databases
    (or chemistry, or plumbing, or nuclear physics… seriously, he knows everything).


    Thanks to my other database nerd friends, including Cam, Eric (phpfreak), Leisha,
    Kyle, Isabelle, and everyone else in the MCSA class, and the guru herself, Suzy
    Moore. You guys are awesome.


    To my friends, brothers, and sisters. I told you I was writing a book and none
    of y’all believed me.


    To my brother Brian and my niece Holly, thanks for being you… even when I was
    too dumb to appreciate it.


    And finally, thank you, Lord, for second chances. I could never deserve your mercy
    and love.'
