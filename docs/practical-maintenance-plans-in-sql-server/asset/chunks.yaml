  trans: '#### 响应


    首次点击菜单选项时，您会看到如图 4-27 所示的屏幕。


    ![A396023_1_En_4_Fig27_HTML.jpg](img/A396023_1_En_4_Fig27_HTML.jpg)


    图 4-27.


    ##### 新建警报


    如果已保存作业，您会看到`执行作业`复选框默认处于选中状态。这是因为，无论是否愿意，它都是此作业的一部分。如果尚未保存，它则尚未分配给作业，但仍将被禁用。不过，您仍有能力通知操作员，这一点很关键。在此步骤中，要通知操作员所针对的事件，必须选中此项并选择一个用户。您可以勾选`通知操作员`框并点击`新建操作员`，向
    SQL Server Agent 的操作员区域添加一个新操作员。图 4-28 展示了一个示例。


    ![A396023_1_En_4_Fig28_HTML.jpg](img/A396023_1_En_4_Fig28_HTML.jpg)


    图 4-28.


    ##### 新建操作员


    在此屏幕点击`确定`。请注意，如果您展开服务器名称，然后展开`SQL Server Agent`，再展开`操作员`，您将在此区域看到在此处指定的操作员。同时请注意，您无法从此界面（在作业属性内）删除操作员。如需删除操作员，必须通过
    SSMS 在`操作员`部分进行操作。


    如果您已经添加了一个操作员，我们会看到该操作员显示在界面中，其名称旁有一组复选框。选项包括`电子邮件`、`寻呼`和`网络发送`。如果您已为这些选项设置了值，请在此处选择它们（至少选择电子邮件）。如果愿意，点击`查看操作员`，注意左侧还有一个名为`历史记录`的选项。点击该选项会显示一个新界面，如图
    4-29 所示。


    ![A396023_1_En_4_Fig29_HTML.jpg](img/A396023_1_En_4_Fig29_HTML.jpg)


    图 4-29.


    ##### 新建操作员，“历史记录”选项卡


    一旦此作业有可用数据，即运行之后，这里就会有数据。由于它从未运行过，因此没有数据。点击`确定`返回`新建警报`界面。


    您现在应该回到刚才离开的地方：`执行作业`选项已禁用，且未选择任何操作员，如图 4-30 所示。


    ![A396023_1_En_4_Fig30_HTML.jpg](img/A396023_1_En_4_Fig30_HTML.jpg)


    图 4-30.


    ##### 新建警报，“响应”选项卡


    接下来，点击左侧的`选项`选项卡。您将看到如图 4-31 所示的界面。


    ![A396023_1_En_4_Fig31_HTML.jpg](img/A396023_1_En_4_Fig31_HTML.jpg)


    图 4-31.


    ##### 新建警报，“选项”选项卡（初始界面）


    这使您可以选择将警报错误文本包含在电子邮件、寻呼或网络发送中。您还可以通过在文本框中输入来指定任何附加信息。您也可以在此处延迟响应。什么是延迟响应？简单来说，就是在指定时间范围内，对于同一事件的后续发生，执行一个休眠命令。假设您没有正确设置此选项，并且像我们现在的默认设置那样。这意味着，针对数据库引擎的每一个目标事件，都会创建一封电子邮件并发送给列出的操作员。您可以想象这将生成大量邮件，您的想法是对的。设置响应延迟——即
    SQL Server 在响应下一个相同事件前等待的时间范围——可以解决这个问题。


    这一切意味着什么？这里有一个很好的理解方式。


    当指定的警报发生时，我希望通过电子邮件通知此人。我还想在电子邮件中添加文本“希望这不是一个永久性错误！”，所以我将在这里添加它。我不想了解此类型的所有错误，只想知道此错误已发生。我将为此设置一个延迟，这样，即使发生通常会触发此事件的相同事件，我也不希望该事件触发相同的作业。


    明白它是如何工作的了吗？图 4-32 展示了一个包含建议值的更新界面。


    ![A396023_1_En_4_Fig32_HTML.jpg](img/A396023_1_En_4_Fig32_HTML.jpg)


    图 4-32.


    ##### 新建警报，“选项”选项卡（更新后的界面）


    现在我们可以看到，我们将在邮件之间至少等待 5 分钟。


    我们并不想实际使用这些值，因此只需按`取消`返回到作业属性页面。您应该看到一个空白的`警报`屏幕；请记住，我们并不想在此处设置任何警报。我们确实设置了一个操作员，这实际上是我们从该区域需要的全部。是的，还有其他几种方法可以做到这一点，但这种方式让您了解了此区域。


    ### 通知


    接下来是`通知`选项卡，如图 4-33 所示。请注意，没有任何选项被勾选，且下拉值为默认值。


    ![A396023_1_En_4_Fig33_HTML.jpg](img/A396023_1_En_4_Fig33_HTML.jpg)


    图 4-33.


    ##### 作业属性，“通知”选项卡


    这里才是我们实际定义先前设置的数据库邮件选项的地方。以下是可用的联系选项：


    *   电子邮件

    *   寻呼

    *   网络发送

    *   写入 Windows 应用程序事件日志

    *   自动删除作业


    可以选择其中任何一个或全部，以便需要被通知的用户能够收到通知。我通常建议为数据库问题设置一个通用电子邮件，但这最终取决于您的设置和任何安全限制。无论如何，此区域确实没有理由留空（除了选择电子邮件，因为这是重点）。例如，为什么不希望作业状态写入
    Windows 事件日志呢？


    此屏幕本身相当直观，如图 4-34 所示，其中包含我推荐的选项和值。


    ![A396023_1_En_4_Fig34_HTML.jpg](img/A396023_1_En_4_Fig34_HTML.jpg)


    图 4-34.


    ##### 作业属性，“通知”选项卡（已更新）


    **提示**


    如果您在框中看不到您的电子邮件名称，请保存作业并重新打开。瞧！


    注意我的账户名是如何出现在电子邮件字段中的吗？这是因为它是从我们之前所做的数据库邮件工作中填充在此处的。同时请注意下拉菜单有三个不同的选项：`当作业成功时`、`当作业失败时`和`当作业完成时`。图
    4-35 说明了这一点。


    ![A396023_1_En_4_Fig35_HTML.jpg](img/A396023_1_En_4_Fig35_HTML.jpg)


    图 4-35.


    ##### 作业状态含义


    这些是什么意思？它们之间有什么区别，我应该选择哪个？以下经验法则将有助于回答这些问题：


    *   如果您想知道作业何时成功完成，请选择`当作业成功时`。

    *   如果您想知道作业何时失败，请选择`当作业失败时`。

    *   如果您想知道作业是成功还是失败，请选择`当作业完成时`。


    这实际上就是这些选项之间唯一的区别。`完成`选项是一个全包含的选项，而`成功`和`失败`则取决于作业的通过或失败状态。可以将`完成`视为一个 AND 子句，而`成功`和`失败`则视为
    OR 子句。'
- fmt: '### Targets


    You can leave this screen defaulted to `“Target local server”`. Click OK when
    you’re done. The SQL Server Agent job is now set up!


    > **Note**

    >

    > This is a major chapter and there has been a lot of information. If you didn’t
    get everything to work, then you really do need to go back and work it through
    again. If you’ve made it this far, don’t give up now!


    Test the new job to make sure it works. Right-click the job and choose `Start
    Job at Step…` to start it. Figure 4-36 shows what you should see at this point.


    ![A396023_1_En_4_Fig36_HTML.jpg](A396023_1_En_4_Fig36_HTML.jpg)

    *Figure 4-36. Success!*


    Success! Now, check your e-mail. Hey, look at that! You should have received an
    e-mail similar to what is shown in Figure 4-37.


    ![A396023_1_En_4_Fig37_HTML.jpg](A396023_1_En_4_Fig37_HTML.jpg)

    *Figure 4-37. E-mail received*


    There’s something else that I need to add at this point… I set up the in an environment
    that did not have any contingencies for outside servers, so getting the connectivity
    was a piece of cake. In the real world, it will likely be much more complex, so
    I would suggest making sure that all your ducks are in a row before you start,
    so to speak. I went back and tried to get this to work using Gmail, and it effectively
    blew up in my face. There were a lot of settings that were specific to how Gmail
    operates that had to be set on Gmail’s side. It is assumed that you will be working
    in a corporate environment of some type, and will have access to the SMTP information
    you need from a system or mail administrator. I will include a short and sweet
    guide to connecting to Gmail and using their SMTP service though.


    ## Gmail’s SMTP


    This is actually a fairly convoluted process. There are very specific settings
    that you need to have set in order for Google to:


    *   Allow access to their SMTP server

    *   Send e-mail through their SMTP server


    Each of these items requires different steps to enable, and we will look at those
    in a minute. First, let’s set up the new profile.


    ### Setting Up a Profile


    Double-click `Database Mail` from inside the `Management` folder in `SSMS`. You
    will see the interface shown in Figure 4-38.


    ![A396023_1_En_4_Fig38_HTML.jpg](A396023_1_En_4_Fig38_HTML.jpg)

    *Figure 4-38. Select Configuration Task*


    This is the generic beginning screen, so choose the default option selected and
    click Next.


    When you see the screen in Figure 4-39, enter `Gmail Profile` as the profile name,
    and something short and sweet for the description.


    ![A396023_1_En_4_Fig39_HTML.jpg](A396023_1_En_4_Fig39_HTML.jpg)

    *Figure 4-39. New Profile*


    Once you get that, click `Add…` to continue.


    You should now see what is shown in Figure 4-40. Notice that our old profile is
    there. That’s the other profile, not the new Gmail one.


    ![A396023_1_En_4_Fig40_HTML.jpg](A396023_1_En_4_Fig40_HTML.jpg)

    *Figure 4-40. Add Account to Profile*


    Since we don’t want to use this old profile because we are setting up a new profile,
    click the `New Account…` button. That will bring up the interface that you see
    in Figure 4-41.


    ![A396023_1_En_4_Fig41_HTML.jpg](A396023_1_En_4_Fig41_HTML.jpg)

    *Figure 4-41. New Database Mail Account*


    This is exactly as we entered earlier, but now let’s update that for the Gmail-specific
    settings. Complete your selections as shown in Figure 4-42.


    ![A396023_1_En_4_Fig42_HTML.jpg](A396023_1_En_4_Fig42_HTML.jpg)

    *Figure 4-42. New Database Mail Account (updated)*


    The important bits are that the `SSL` check box needs to be selected and your
    account information needs to be correct, obviously. The SMTP server for Gmail
    is `smtp.gmail.com` and the port number is `25`. Click OK when you’re done. You
    will see the screen shown in Figure 4-43.


    ![A396023_1_En_4_Fig43_HTML.jpg](A396023_1_En_4_Fig43_HTML.jpg)

    *Figure 4-43. New Profile*


    Go ahead and click Next here. You will see the `Manage Profile Security` screen,
    as shown in Figure 4-44.


    ![A396023_1_En_4_Fig44_HTML.jpg](A396023_1_En_4_Fig44_HTML.jpg)

    *Figure 4-44. Manage Profile Security*


    Note that I have selected the `Public` check box. I also changed the `Default
    Profile` value to `Yes`. This is a pull-down menu, so pull it down and change
    the value. You don’t need to go into the `Private Profiles` section, so don’t
    worry about that. Click Next when you are ready to move on. You will see what
    is shown in Figure 4-45.


    ![A396023_1_En_4_Fig45_HTML.jpg](A396023_1_En_4_Fig45_HTML.jpg)

    *Figure 4-45. Configure System Parameters*


    This is the screen where you define the system parameters. Remember setting these
    options before? They’re the same now, so leave them alone and click Next.


    You will then see the `Complete the Wizard` screen, as shown in Figure 4-46.


    ![A396023_1_En_4_Fig46_HTML.jpg](A396023_1_En_4_Fig46_HTML.jpg)

    *Figure 4-46. Complete the Wizard*


    These settings are what we’ve done to this new profile, so go ahead and click
    Finish when you’re done. You should see the green check boxes next, as shown in
    Figure 4-47.


    ![A396023_1_En_4_Fig47_HTML.jpg](A396023_1_En_4_Fig47_HTML.jpg)

    *Figure 4-47. Configuring…*


    ### Testing E-mail Configuration


    At this point, the first part is done. It probably won’t work just yet. To test
    if it does, you can either manually send a test e-mail by right-clicking `Database
    Mail` and choosing `Send Test E-Mail…` or by using the following script.


    ```sql

    EXEC msdb.dbo.sp_send_dbmail

    @profile_name=''Gmail Profile'',

    @recipients = ''bradley.beard@gmail.com'',

    @subject=''This is only a test. We control the horizontal. We control the vertical.'',

    @body=''Testing the Gmail profile''

    ```


    This will send e-mail also. Either way you want to do it is fine. After you run
    it, check the `Database Mail Log` by right-clicking `Database Mail` and choosing
    `View Database Mail Log`. You will then see the screen shown in Figure 4-48.


    ![A396023_1_En_4_Fig48_HTML.jpg](A396023_1_En_4_Fig48_HTML.jpg)

    *Figure 4-48. Log File Viewer*


    See that error? Let’s look at that: “The mail could not be sent to the recipients
    because of the mail server failure. (Sending Mail using Account 3 (2015-11-13T16:35:55).
    Exception Message: Cannot send mails to mail server. (The SMTP server requires
    a secure connection or the client was not authenticated. The server response was:
    5.5.1 Authentication Required. Learn more at).”


    Interesting! The important part here is (and I can’t stress this enough): do not
    change anything yet. Trust me. SQL Server is configured correctly. You have to
    finish setting up Google before anything is going to work.


    Now, let’s look at Google’s settings.'
  raw: '### Targets


    You can leave this screen defaulted to “Target local server”. Click OK when you’re
    done. The SQL Server Agent job is now set up!


    Note


    This is a major chapter and there has been a lot of information. If you didn’t
    get everything to work, then you really do need to go back and work it through
    again. If you’ve made it this far, don’t give up now!


    Test the new job to make sure it works. Right-click the job and choose Start Job
    at Step… to start it. Figure [4-36](#A396023_1_En_4_Chapter.html#Fig36) shows
    what you should see at this point.


    ![A396023_1_En_4_Fig36_HTML.jpg](A396023_1_En_4_Fig36_HTML.jpg)


    Figure 4-36.


    Success!


    Success! Now, check your e-mail. Hey, look at that! You should have received an
    e-mail similar to what is shown in Figure [4-37](#A396023_1_En_4_Chapter.html#Fig37).


    ![A396023_1_En_4_Fig37_HTML.jpg](A396023_1_En_4_Fig37_HTML.jpg)


    Figure 4-37.


    E-mail received


    There’s something else that I need to add at this point… I set up the in an environment
    that did not have any contingencies for outside servers, so getting the connectivity
    was a piece of cake. In the real world, it will likely be much more complex, so
    I would suggest making sure that all your ducks are in a row before you start,
    so to speak. I went back and tried to get this to work using Gmail, and it effectively
    blew up in my face. There were a lot of settings that were specific to how Gmail
    operates that had to be set on Gmail’s side. It is assumed that you will be working
    in a corporate environment of some type, and will have access to the SMTP information
    you need from a system or mail administrator. I will include a short and sweet
    guide to connecting to Gmail and using their SMTP service though.


    ## Gmail’s SMTP


    This is actually a fairly convoluted process. There are very specific settings
    that you need to have set in order for Google to


    *   Allow access to their SMTP server

    *   Send e-mail through their SMTP server


    Each of these items requires different steps to enable, and we will look at those
    in a minute. First, let’s set up the new profile.


    ### Setting Up a Profile


    Double-click Database Mail from inside the Management folder in SSMS. You will
    see the interface shown in Figure [4-38](#A396023_1_En_4_Chapter.html#Fig38).


    ![A396023_1_En_4_Fig38_HTML.jpg](A396023_1_En_4_Fig38_HTML.jpg)


    Figure 4-38.


    Select Configuration Task


    This is the generic beginning screen, so choose the default option selected and
    click Next.


    When you see the screen in Figure [4-39](#A396023_1_En_4_Chapter.html#Fig39),
    enter Gmail Profile as the profile name, and something short and sweet for the
    description.


    ![A396023_1_En_4_Fig39_HTML.jpg](A396023_1_En_4_Fig39_HTML.jpg)


    Figure 4-39.


    New Profile


    Once you get that, click Add… to continue.


    You should now see what is shown in Figure [4-40](#A396023_1_En_4_Chapter.html#Fig40).
    Notice that our old profile is there. That’s the other profile, not the new Gmail
    one.


    ![A396023_1_En_4_Fig40_HTML.jpg](A396023_1_En_4_Fig40_HTML.jpg)


    Figure 4-40.


    Add Account to Profile


    Since we don’t want to use this old profile because we are setting up a new profile,
    click the New Account… button. That will bring up the interface that you see in
    Figure [4-41](#A396023_1_En_4_Chapter.html#Fig41).


    ![A396023_1_En_4_Fig41_HTML.jpg](A396023_1_En_4_Fig41_HTML.jpg)


    Figure 4-41.


    New Database Mail Account


    This is exactly as we entered earlier, but now let’s update that for the Gmail-specific
    settings. Complete your selections as shown in Figure [4-42](#A396023_1_En_4_Chapter.html#Fig42).


    ![A396023_1_En_4_Fig42_HTML.jpg](A396023_1_En_4_Fig42_HTML.jpg)


    Figure 4-42.


    New Database Mail Account (updated)


    The important bits are that the SSL check box needs to be selected and your account
    information needs to be correct, obviously. The SMTP server for Gmail is smtp.gmail.com
    and the port number is 25\. Click OK when you’re done. You will see the screen
    shown in Figure [4-43](#A396023_1_En_4_Chapter.html#Fig43).


    ![A396023_1_En_4_Fig43_HTML.jpg](A396023_1_En_4_Fig43_HTML.jpg)


    Figure 4-43.


    New Profile


    Go ahead and click Next here. You will see the Manage Profile Security screen,
    as shown in Figure [4-44](#A396023_1_En_4_Chapter.html#Fig44).


    ![A396023_1_En_4_Fig44_HTML.jpg](A396023_1_En_4_Fig44_HTML.jpg)


    Figure 4-44.


    Manage Profile Security


    Note that I have selected the Public check box. I also changed the Default Profile
    value to Yes. This is a pull-down menu, so pull it down and change the value.
    You don’t need to go into the Private Profiles section, so don’t worry about that.
    Click Next when you are ready to move on. You will see what is shown in Figure
    [4-45](#A396023_1_En_4_Chapter.html#Fig45).


    ![A396023_1_En_4_Fig45_HTML.jpg](A396023_1_En_4_Fig45_HTML.jpg)


    Figure 4-45.


    Configure System Parameters


    This is the screen where you define the system parameters. Remember setting these
    options before? They’re the same now, so leave them alone and click Next.


    You will then see the Complete the Wizard screen, as shown in Figure [4-46](#A396023_1_En_4_Chapter.html#Fig46).


    ![A396023_1_En_4_Fig46_HTML.jpg](A396023_1_En_4_Fig46_HTML.jpg)


    Figure 4-46.


    Complete the Wizard


    These settings are what we’ve done to this new profile, so go ahead and click
    Finish when you’re done. You should see the green check boxes next, as shown in
    Figure [4-47](#A396023_1_En_4_Chapter.html#Fig47).


    ![A396023_1_En_4_Fig47_HTML.jpg](A396023_1_En_4_Fig47_HTML.jpg)


    Figure 4-47.


    Configuring…


    ### Testing E-mail Configuration


    At this point, the first part is done. It probably won’t work just yet. To test
    if it does, you can either manually send a test e-mail by right-clicking Database
    Mail and choosing Send Test E-Mail… or by using the following script.


    ```

    EXEC msdb.dbo.sp_send_dbmail

    @profile_name=''Gmail Profile'',

    @recipients = ''bradley.beard@gmail.com'',

    @subject=''This is only a test. We control the horizontal. We control the vertical.'',

    @body=''Testing the Gmail profile''

    ```


    This will send e-mail also. Either way you want to do it is fine. After you run
    it, check the Database Mail Log by right-clicking Database Mail and choosing View
    Database Mail Log. You will then see the screen shown in Figure [4-48](#A396023_1_En_4_Chapter.html#Fig48).


    ![A396023_1_En_4_Fig48_HTML.jpg](A396023_1_En_4_Fig48_HTML.jpg)


    Figure 4-48.


    Log File Viewer


    See that error? Let’s look at that: “The mail could not be sent to the recipients
    because of the mail server failure. (Sending Mail using Account 3 (2015-11-13T16:35:55).
    Exception Message: Cannot send mails to mail server. (The SMTP server requires
    a secure connection or the client was not authenticated. The server response was:
    5.5.1 Authentication Required. Learn more at).”


    Interesting! The important part here is (and I can’t stress this enough): do not
    change anything yet. Trust me. SQL Server is configured correctly. You have to
    finish setting up Google before anything is going to work.


    Now, let’s look at Google’s settings.'
  trans: '### 目标


    此屏幕通常可保留为默认的 `“目标本地服务器”` 选项。设置完成后点击“确定”。至此，SQL Server 代理作业已设置完毕！


    > **注意**

    >

    > 这是内容非常丰富的重要章节。如果未能一次性成功完成所有步骤，请务必回头重新操作一遍。如果你已经跟到这里，请不要放弃！


    测试新作业以确保其正常运行。右键单击该作业，然后选择 `从步骤开始作业…` 以启动它。图 4-36 显示了此时应出现的界面。


    ![A396023_1_En_4_Fig36_HTML.jpg](img/A396023_1_En_4_Fig36_HTML.jpg)

    *图 4-36. 成功！*


    成功！现在，请检查你的电子邮箱。看，你应该已经收到了一封类似图 4-37 所示的邮件。


    ![A396023_1_En_4_Fig37_HTML.jpg](img/A396023_1_En_4_Fig37_HTML.jpg)

    *图 4-37. 收到的邮件*


    此时，我还需要补充一点……我设置的环境没有任何针对外部服务器的应急措施，因此建立连接轻而易举。但在现实世界中，情况可能要复杂得多，所以我建议在开始前确保“万事俱备”（打个比方）。我回头尝试使用
    Gmail 来实现此功能，结果基本上搞砸了。有很多设置是 Gmail 特有的，必须在 Gmail 那边进行配置。这里假设你将在某种企业环境中工作，并能从系统或邮件管理员那里获取所需的
    SMTP 信息。不过，我仍会提供一个简明的指南，说明如何连接 Gmail 并使用其 SMTP 服务。


    ## Gmail 的 SMTP


    这实际上是一个相当复杂的过程。你需要配置一些非常具体的设置，才能让 Google：


    *   允许访问其 SMTP 服务器

    *   通过其 SMTP 服务器发送电子邮件


    启用这些功能中的每一项都需要不同的步骤，我们稍后会逐一查看。首先，让我们来设置新的配置文件。


    ### 设置配置文件


    在 `SSMS` 的 `管理` 文件夹内双击 `Database Mail`。你将看到如图 4-38 所示的界面。


    ![A396023_1_En_4_Fig38_HTML.jpg](img/A396023_1_En_4_Fig38_HTML.jpg)

    *图 4-38. 选择配置任务*


    这是通用的起始屏幕，因此选择默认选项并点击“下一步”。


    当看到图 4-39 所示的屏幕时，在配置文件名称中输入 `Gmail Profile`，并为描述填写一个简短明了的内容。


    ![A396023_1_En_4_Fig39_HTML.jpg](img/A396023_1_En_4_Fig39_HTML.jpg)

    *图 4-39. 新建配置文件*


    完成后，点击 `添加…` 继续。


    现在你应该看到如图 4-40 所示的界面。注意我们旧的配置文件也在那里。那是另一个配置文件，不是新的 Gmail 配置文件。


    ![A396023_1_En_4_Fig40_HTML.jpg](img/A396023_1_En_4_Fig40_HTML.jpg)

    *图 4-40. 向配置文件添加账户*


    因为我们正在设置新的配置文件，所以不想使用这个旧的配置文件。请点击 `新建账户…` 按钮。这将打开如图 4-41 所示的界面。


    ![A396023_1_En_4_Fig41_HTML.jpg](img/A396023_1_En_4_Fig41_HTML.jpg)

    *图 4-41. 新建数据库邮件账户*


    这与我们之前输入的内容完全相同，但现在让我们根据 Gmail 的特定设置进行更新。按照图 4-42 所示完成你的选择。


    ![A396023_1_En_4_Fig42_HTML.jpg](img/A396023_1_En_4_Fig42_HTML.jpg)

    *图 4-42. 新建数据库邮件账户（已更新）*


    关键点在于必须选中 `SSL` 复选框，并且你的账户信息显然需要正确。Gmail 的 SMTP 服务器是 `smtp.gmail.com`，端口号是 `25`。完成后点击“确定”。你将看到如图
    4-43 所示的屏幕。


    ![A396023_1_En_4_Fig43_HTML.jpg](img/A396023_1_En_4_Fig43_HTML.jpg)

    *图 4-43. 新建配置文件*


    继续点击此处的“下一步”。你将看到 `管理配置文件安全性` 屏幕，如图 4-44 所示。


    ![A396023_1_En_4_Fig44_HTML.jpg](img/A396023_1_En_4_Fig44_HTML.jpg)

    *图 4-44. 管理配置文件安全性*


    注意我已经选中了 `公共` 复选框。我还将 `默认配置文件` 的值改为了 `是`。这是一个下拉菜单，因此请下拉并更改该值。你无需进入 `专用配置文件` 部分，所以不用担心那里。准备好继续后点击“下一步”。你将看到如图
    4-45 所示的内容。


    ![A396023_1_En_4_Fig45_HTML.jpg](img/A396023_1_En_4_Fig45_HTML.jpg)

    *图 4-45. 配置系统参数*


    这是定义系统参数的屏幕。还记得之前设置的这些选项吗？现在它们是一样的，所以保持原样，点击“下一步”。


    然后，你将看到 `完成该向导` 屏幕，如图 4-46 所示。


    ![A396023_1_En_4_Fig46_HTML.jpg](img/A396023_1_En_4_Fig46_HTML.jpg)

    *图 4-46. 完成向导*


    这些设置是我们为这个新配置文件所做的配置，完成后请直接点击“完成”。接下来，你应该会看到绿色的勾选框，如图 4-47 所示。


    ![A396023_1_En_4_Fig47_HTML.jpg](img/A396023_1_En_4_Fig47_HTML.jpg)

    *图 4-47. 正在配置…*


    ### 测试电子邮件配置


    至此，第一部分已完成。它可能还无法正常工作。要测试其功能，你可以通过右键单击 `Database Mail` 并选择 `发送测试电子邮件…` 来手动发送测试邮件，也可以使用以下脚本。


    ```sql

    EXEC msdb.dbo.sp_send_dbmail

    @profile_name=''Gmail Profile'',

    @recipients = ''bradley.beard@gmail.com'',

    @subject=''This is only a test. We control the horizontal. We control the vertical.'',

    @body=''Testing the Gmail profile''

    ```


    这封邮件也会被发送出去。两种方式都可以。运行之后，通过右键单击 `Database Mail` 并选择 `查看数据库邮件日志` 来检查 `数据库邮件日志`。然后你将看到如图
    4-48 所示的屏幕。


    ![A396023_1_En_4_Fig48_HTML.jpg](img/A396023_1_En_4_Fig48_HTML.jpg)

    *图 4-48. 日志文件查看器*


    看到那个错误了吗？让我们看看：“邮件无法发送给收件人，因为邮件服务器故障。（使用账户 3 发送邮件（2015-11-13T16:35:55）。异常消息：无法向邮件服务器发送邮件。（SMTP
    服务器需要安全连接，或者客户端未通过身份验证。服务器响应为：5.5.1 需要身份验证。了解更多信息请访问）。”


    有趣！这里最重要的部分是（我无法更加强调这一点）：**暂时不要更改任何设置**。相信我。SQL Server 的配置是正确的。你必须先完成 Google 那边的设置，一切才能正常工作。


    现在，让我们来看看 Google 的设置。'
- fmt: '## 允许访问谷歌的SMTP服务器


    首先，我们需要做的是允许SQL Server访问Gmail的服务器。这看起来像是一项微不足道的任务，实际上也差不多，但你需要在谷歌那边更改一些设置。


    首先，从你的浏览器登录谷歌并访问`https://myaccount.google.com/security`。这是谷歌的主要安全页面。你几乎可以从这里处理任何谷歌相关任务。


    到达此页面后，你需要找到一个名为“允许安全性较低的应用”的部分。默认情况下，此设置为“关闭”。只需点击按钮将其更改为“开启”，如图`4-49`所示。


    ![A396023_1_En_4_Fig49_HTML.jpg](A396023_1_En_4_Fig49_HTML.jpg)


    图 4-49. 允许安全性较低的应用


    完成后，返回`SSMS`并再次检查数据库邮件日志。我只在那里看到另一个错误，它发生在第一个错误之后大约1秒钟。还记得我们将间隔设置为5分钟吗？我们现在必须等待那么长时间，才能看到它是否有效。


    我还没看到任何东西，所以肯定还有别的原因！让我们想想…我们已经正确设置了数据库邮件任务（相信我），我们已经启用了安全性较低的应用与谷歌交互……还有什么？


    ### 启用POP电子邮件


    还有什么？原来是Gmail深处一个必须启用的晦涩设置。打开你的Gmail账户并转到“设置”。然后转到“转发和POP/IMAP”。你应该会看到如图`4-50`所示的屏幕。


    ![A396023_1_En_4_Fig50_HTML.jpg](A396023_1_En_4_Fig50_HTML.jpg)


    图 4-50. Gmail设置


    看到关于POP的那部分了吗？这就是我们接下来需要看的东西。突击测验：POP和SMTP有什么区别？POP接收电子邮件，而SMTP发送电子邮件。所以我的设置显示POP是禁用的，这意味着我无法通过POP接收电子邮件。将其更改为“对所有邮件启用POP”，然后点击屏幕底部的“保存更改”。保存需要一两秒钟，然后你就回到了收件箱。


    返回`SSMS`，使用之前的脚本再发送一封测试电子邮件。检查你的Gmail收件箱。你应该看到如图`4-51`所示的内容。


    ![A396023_1_En_4_Fig51_HTML.jpg](A396023_1_En_4_Fig51_HTML.jpg)


    图 4-51. Gmail已接收


    我们现在可以向Gmail发送测试电子邮件了！


    如果从这里连接到Gmail仍然有问题，请重新阅读本节内容。我听说SSL端口可能需要从`25`更改为`587`，但我的配置文件设置为`25`，而且它工作得很好。


    ## 总结


    这是一个庞大的章节。如果你有什么没搞懂的，我强烈建议你再读一遍。如果一切不完全准确，很多事情都可能出错。我更希望你花时间去理解我们正在做的每件事，这样你就能看到所有部分是如何组合在一起的，而不是因为概念看起来晦涩或超出你的舒适区而在中途感到沮丧并放弃。我写这本书的原因之一就是让你走出舒适区，因为如果你不接触新的概念和想法，你就永远无法作为数据库管理员成长。有机会学习更多能加深你对某个概念理解的知识是多么令人兴奋！


    ## 5. 清理SQL Server代理历史记录


    如果你一直在做练习，你可能已经注意到有很多存档数据，特别是在作业历史领域。这可能既是好事也是坏事，取决于你的观点。它可能是好事，因为如果作业失败，你希望了解其历史。


    *   如果你的作业总是成功，那么除了你自己的知识积累，你其实不需要知道它。

    *   如果你的作业总是失败，那么你真的需要了解它以便修复它。


    考虑这个清理任务的一个好方法是，它会清理掉作业历史的杂乱，这样你只会看到你指定时间段内的信息。你可以定义任何你想要的时间段，但通常可能是类似三天这样的设置。换句话说，只保留三天的历史记录；否则，一个作业的历史记录将永远存在，并且不会真正给你带来任何价值。


    如果你还记得，这些练习的总体目的是让你的生活更轻松。如果你是我的老板，如果你保留所有历史记录、记录一切，却没有设置任何清理任务，然后来找我要更多存储空间，因为你的硬盘都满了，那你的麻烦就大了。你第二天就得戴着傻瓜帽读这本书了！


    本章的一个重要说明是，你在这里学到的任务是清理`SQL Server Agent`的日志——仅此而已。这些不是由维护计划生成的`.txt`文件；那是在第`6`章。本章任务的作用是清除`SQL
    Server Agent`保存的有关作业状态的日志。对于许多作业来说，这可能会迅速成为一个难以筛选的巨大问题。将其截断到三天，可以让你有足够的时间查看可能弹出的任何问题，考虑到你会检查电子邮件是否有任何问题。


    ### 设置维护计划


    好了，言归正传。创建这个任务非常简单。继续在“管理”文件夹内右键单击“维护计划”文件夹，然后选择“维护计划向导”。你现在看到的通用界面（图`5-1`）应该是你熟悉的。


    ![A396023_1_En_5_Fig1_HTML.jpg](A396023_1_En_5_Fig1_HTML.jpg)


    图 5-1. 选择计划属性


    将其更新为如图`5-2`所示。


    ![A396023_1_En_5_Fig2_HTML.jpg](A396023_1_En_5_Fig2_HTML.jpg)


    图 5-2. 选择计划属性（已更新）


    这为我们进入下一节做好了准备，下一节是……？对了，是任务调度。记住，没有调度的任务毫无意义。这基本上意味着你打算手动运行任务，这完全违背了使用`SQL Server
    Agent`为你自动执行这些任务的初衷。


    单击`更改...`按钮来设置计划。最初，计划是不正确的，所以让我们将其更改为如图`5-3`所示的设置。


    *   发生频率：每天

    *   发生时间：上午 12:00:00


    ![A396023_1_En_5_Fig3_HTML.jpg](A396023_1_En_5_Fig3_HTML.jpg)


    图 5-3. 新建作业计划


    完成后，你应该会看到类似图`5-3`所示的结果。


    告诉过你这很简单。点击“确定”继续。请注意，你会回到之前设置选项的屏幕，只是现在计划块已经填好了。点击“下一步”继续。'
  raw: '### Allowing Access to Google’s SMTP Server


    The first thing that we need to do is allow SQL Server to access Gmail’s servers.
    This seems like it would be a trivial task, and it kind of is, but you need to
    change a few things on Google’s side.


    First off, log in to Google from your browser and go to [`https://myaccount.google.com/security`](https://myaccount.google.com/security)
    . This is Google’s main security page. You can handle just about any Google task
    from right here.


    Once you get to this page, you want to look for a section labeled “Allow less
    secure apps”. This is set to OFF by default. Just click the button and change
    it to ON, as shown in Figure [4-49](#A396023_1_En_4_Chapter.html#Fig49).


    ![A396023_1_En_4_Fig49_HTML.jpg](A396023_1_En_4_Fig49_HTML.jpg)


    Figure 4-49.


    Allow less secure apps


    Once that’s done, go back to SSMS and check the Database Mail Log again. I only
    see one more error in there, which happened about 1 second after the first one.
    Remember how we set the interval to 5 minutes? We have to wait that amount of
    time now to see if it worked or not.


    I don’t see anything yet, so there must be something else! Let’s see… we’ve set
    up the Database Mail task correctly (trust me), we’ve enabled less secure apps
    to interact with Google… what else is there?


    ### Enabling POP E-mail


    What else is there? An obscure setting in the bowels of Gmail that must be enabled,
    that’s what. Open your Gmail account and go to Settings. Then go to Forwarding
    and POP/IMAP. You should see the screen shown in Figure [4-50](#A396023_1_En_4_Chapter.html#Fig50).


    ![A396023_1_En_4_Fig50_HTML.jpg](A396023_1_En_4_Fig50_HTML.jpg)


    Figure 4-50.


    Gmail settings


    See that bit there about POP? That’s the stuff we need to look at next. Pop quiz:
    What is the difference between POP and SMTP? POP receives e-mail, whereas SMTP
    sends e-mail. So my settings say that POP is disabled, meaning I can’t receive
    e-mail over POP. Change this to “Enable POP for all mail” and click Save Settings
    at the bottom of the screen. It takes a second to save, and then you go back to
    your inbox.


    Go back to SSMS and send another test e-mail using the earlier script. Check your
    Gmail inbox. You should see what is shown in Figure [4-51](#A396023_1_En_4_Chapter.html#Fig51).


    ![A396023_1_En_4_Fig51_HTML.jpg](A396023_1_En_4_Fig51_HTML.jpg)


    Figure 4-51.


    Gmail received


    We can send test e-mails to Gmail now!


    If you still have trouble connecting to Gmail from here, go back over this section
    again. I’ve read that the SSL port might need to be changed to 587 from 25, but
    my profile is set to 25 and it works just fine.


    ## Summary


    This was a huge chapter. If there’s anything you didn’t get, I strongly suggest
    rereading it again. There is a lot that can go wrong if everything isn’t exact.
    I would much rather you took the time to understand exactly what we’re doing so
    that you can see how the pieces all fit together, rather than get frustrated and
    quit halfway through because the concepts seem obscure or outside of your comfort
    zone. One of the reasons I wrote this book is to bring you out of your comfort
    zone, because you can never grow as a DBA if you aren’t exposed to new concepts
    and ideas. How exciting to get the opportunity to learn more about the topics
    that will only serve to enhance your knowledge of a concept!


    # 5. Cleaning Up SQL Server Agent History


    If you’ve been doing the exercises, you may have noticed that there is a lot of
    archival data, specifically in the realm of the history of the jobs. This can
    be both good and bad, depending on your point of view. It can be good because
    you want to know about the history of your jobs if they fail.


    *   If your job always succeeds, then you don’t really need to know about it,
    except for your own edification.

    *   If your job always fails, then you really need to know about it to fix it.


    A good way to think about this cleanup task is that this will unclutter the history
    of your jobs so that you will only see the information for the time period you
    specify. You can define any arbitrary time slice that you would like, but usually
    it’s going to be something like three days. Only keep history for three days,
    in other words; otherwise, the history for a job will go on forever and not really
    give you anything.


    The overall purpose of these exercises, if you remember, is to make your life
    easier. If I were your boss, you would be in deep trouble if you keep history,
    log everything, and you don’t have any kind of cleanup tasks, but then come to
    me and ask for more storage because all your hard drives are full. Your next day
    would be spent reading this very book with a dunce cap on your head!


    An important note for this chapter is that the task you learn here is about cleaning
    up SQL Server Agent’s logs—and that’s it. These aren’t the .txt files generated
    by the maintenance plans; that is in Chapter [6](#A396023_1_En_6_Chapter.html).
    What this chapter’s task does is clean out the logs that SQL Server Agent keeps
    regarding the status of the jobs. For many jobs, this can quickly grow to be a
    huge problem that is hard to sift through. Keeping it truncated to three days
    gives you plenty of time to look at any issues that may pop up, considering that
    you are checking your emails for any issues.


    ## Setting Up the Maintenance Plan


    Okay, down to business. This task is very easy to create. Go ahead and right-click
    the Maintenance Plans folder again from inside the Management folder, and select
    Maintenance Plan Wizard. The generic interface you are presented with in Figure
    [5-1](#A396023_1_En_5_Chapter.html#Fig1) should be something you are familiar
    with by now.


    ![A396023_1_En_5_Fig1_HTML.jpg](A396023_1_En_5_Fig1_HTML.jpg)


    Figure 5-1.


    Select Plan Properties


    Update it to appear as shown in Figure [5-2](#A396023_1_En_5_Chapter.html#Fig2).


    ![A396023_1_En_5_Fig2_HTML.jpg](A396023_1_En_5_Fig2_HTML.jpg)


    Figure 5-2.


    Select Plan Properties (updated)


    That sets us up for the next section, which is …? That’s right, the scheduling
    of the task. Remember, it makes no sense to have a task that isn’t scheduled.
    That basically means that you intend to run the tasks manually, which completely
    defeats the purpose of using SQL Server Agent to automate these tasks for you.


    Click the Change… button to set up the schedule. Initially, the schedule is incorrect,
    so let’s change it to the settings shown in Figure [5-3](#A396023_1_En_5_Chapter.html#Fig3).


    *   Occurs: Daily

    *   Occurs once at: 12:00:00 AM


    ![A396023_1_En_5_Fig3_HTML.jpg](A396023_1_En_5_Fig3_HTML.jpg)


    Figure 5-3.


    New Job Schedule


    You should see a result like that shown in Figure [5-3](#A396023_1_En_5_Chapter.html#Fig3)
    when finished.


    Told you this was easy. Click OK to move on. Notice that you go back to the screen
    you set the options on before, except now the schedule block is filled in. Click
    Next to continue.'
  trans: '## 允许访问谷歌的 SMTP 服务器


    首先，我们需要做的是允许 SQL Server 访问 Gmail 的服务器。这看起来像是一项微不足道的任务，实际上也差不多，但你需要在谷歌那边更改一些设置。


    首先，从你的浏览器登录谷歌并访问`https://myaccount.google.com/security`。这是谷歌的主要安全页面。你几乎可以从这里处理任何谷歌相关任务。


    到达此页面后，你需要找到一个名为“允许安全性较低的应用”的部分。默认情况下，此设置为“关闭”。只需点击按钮将其更改为“开启”，如图`4-49`所示。


    ![A396023_1_En_4_Fig49_HTML.jpg](img/A396023_1_En_4_Fig49_HTML.jpg)


    图 4-49. 允许安全性较低的应用


    完成后，返回`SSMS`并再次检查数据库邮件日志。我只在那里看到另一个错误，它发生在第一个错误之后大约 1 秒钟。还记得我们将间隔设置为 5 分钟吗？我们现在必须等待那么长时间，才能看到它是否有效。


    我还没看到任何东西，所以肯定还有别的原因！让我们想想…我们已经正确设置了数据库邮件任务（相信我），我们已经启用了安全性较低的应用与谷歌交互……还有什么？


    ### 启用 POP 电子邮件


    还有什么？原来是 Gmail 深处一个必须启用的晦涩设置。打开你的 Gmail 账户并转到“设置”。然后转到“转发和 POP/IMAP”。你应该会看到如图`4-50`所示的屏幕。


    ![A396023_1_En_4_Fig50_HTML.jpg](img/A396023_1_En_4_Fig50_HTML.jpg)


    图 4-50. Gmail 设置


    看到关于 POP 的那部分了吗？这就是我们接下来需要看的东西。突击测验：POP 和 SMTP 有什么区别？POP 接收电子邮件，而 SMTP 发送电子邮件。所以我的设置显示
    POP 是禁用的，这意味着我无法通过 POP 接收电子邮件。将其更改为“对所有邮件启用 POP”，然后点击屏幕底部的“保存更改”。保存需要一两秒钟，然后你就回到了收件箱。


    返回`SSMS`，使用之前的脚本再发送一封测试电子邮件。检查你的 Gmail 收件箱。你应该看到如图`4-51`所示的内容。


    ![A396023_1_En_4_Fig51_HTML.jpg](img/A396023_1_En_4_Fig51_HTML.jpg)


    图 4-51. Gmail 已接收


    我们现在可以向 Gmail 发送测试电子邮件了！


    如果从这里连接到 Gmail 仍然有问题，请重新阅读本节内容。我听说 SSL 端口可能需要从`25`更改为`587`，但我的配置文件设置为`25`，而且它工作得很好。


    ## 总结


    这是一个庞大的章节。如果你有什么没搞懂的，我强烈建议你再读一遍。如果一切不完全准确，很多事情都可能出错。我更希望你花时间去理解我们正在做的每件事，这样你就能看到所有部分是如何组合在一起的，而不是因为概念看起来晦涩或超出你的舒适区而在中途感到沮丧并放弃。我写这本书的原因之一就是让你走出舒适区，因为如果你不接触新的概念和想法，你就永远无法作为数据库管理员成长。有机会学习更多能加深你对某个概念理解的知识是多么令人兴奋！


    ## 5. 清理 SQL Server 代理历史记录


    如果你一直在做练习，你可能已经注意到有很多存档数据，特别是在作业历史领域。这可能既是好事也是坏事，取决于你的观点。它可能是好事，因为如果作业失败，你希望了解其历史。


    *   如果你的作业总是成功，那么除了你自己的知识积累，你其实不需要知道它。

    *   如果你的作业总是失败，那么你真的需要了解它以便修复它。


    考虑这个清理任务的一个好方法是，它会清理掉作业历史的杂乱，这样你只会看到你指定时间段内的信息。你可以定义任何你想要的时间段，但通常可能是类似三天这样的设置。换句话说，只保留三天的历史记录；否则，一个作业的历史记录将永远存在，并且不会真正给你带来任何价值。


    如果你还记得，这些练习的总体目的是让你的生活更轻松。如果你是我的老板，如果你保留所有历史记录、记录一切，却没有设置任何清理任务，然后来找我要更多存储空间，因为你的硬盘都满了，那你的麻烦就大了。你第二天就得戴着傻瓜帽读这本书了！


    本章的一个重要说明是，你在这里学到的任务是清理`SQL Server Agent`的日志——仅此而已。这些不是由维护计划生成的`.txt`文件；那是在第`6`章。本章任务的作用是清除`SQL
    Server Agent`保存的有关作业状态的日志。对于许多作业来说，这可能会迅速成为一个难以筛选的巨大问题。将其截断到三天，可以让你有足够的时间查看可能弹出的任何问题，考虑到你会检查电子邮件是否有任何问题。


    ### 设置维护计划


    好了，言归正传。创建这个任务非常简单。继续在“管理”文件夹内右键单击“维护计划”文件夹，然后选择“维护计划向导”。你现在看到的通用界面（图`5-1`）应该是你熟悉的。


    ![A396023_1_En_5_Fig1_HTML.jpg](img/A396023_1_En_5_Fig1_HTML.jpg)


    图 5-1. 选择计划属性


    将其更新为如图`5-2`所示。


    ![A396023_1_En_5_Fig2_HTML.jpg](img/A396023_1_En_5_Fig2_HTML.jpg)


    图 5-2. 选择计划属性（已更新）


    这为我们进入下一节做好了准备，下一节是……？对了，是任务调度。记住，没有调度的任务毫无意义。这基本上意味着你打算手动运行任务，这完全违背了使用`SQL Server
    Agent`为你自动执行这些任务的初衷。


    单击`更改...`按钮来设置计划。最初，计划是不正确的，所以让我们将其更改为如图`5-3`所示的设置。


    *   发生频率：每天

    *   发生时间：上午 12:00:00


    ![A396023_1_En_5_Fig3_HTML.jpg](img/A396023_1_En_5_Fig3_HTML.jpg)


    图 5-3. 新建作业计划


    完成后，你应该会看到类似图`5-3`所示的结果。


    告诉过你这很简单。点击“确定”继续。请注意，你会回到之前设置选项的屏幕，只是现在计划块已经填好了。点击“下一步”继续。'
- fmt: '## Choosing Tasks


    现在我们需要实际选择要执行的任务，因为我们还没有进行这一步。图 [5-4](#A396023_1_En_5_Chapter.html#Fig4) 显示了可供我们选择的任务。


    ![A396023_1_En_5_Fig4_HTML.jpg](A396023_1_En_5_Fig4_HTML.jpg)

    图 5-4：选择维护任务


    显然，我们这里将选择 `Clean Up History`，然后点击下一步。


    图 [5-5](#A396023_1_En_5_Chapter.html#Fig5) 显示了下一个屏幕，您可以在其中选择任务的顺序。由于我们只有一个任务，我们可以点击“下一步”继续。然而，既然在这里，您可能想仔细看看，发现一个界面错误——虽然有点幽默，但也可能导致您丢失工作。


    ![A396023_1_En_5_Fig5_HTML.jpg](A396023_1_En_5_Fig5_HTML.jpg)

    图 5-5：选择维护任务顺序


    您现在看到的是图 [5-6](#A396023_1_En_5_Chapter.html#Fig6) 中的屏幕吗？点击 `Clean Up History`
    文本所在的区域。注意“下移…”按钮变为可用状态。


    ![A396023_1_En_5_Fig6_HTML.jpg](A396023_1_En_5_Fig6_HTML.jpg)

    图 5-6：选择维护任务顺序


    奇怪。现在点击“下移…”按钮吧。不会发生什么坏事，对吧？图 [5-7](#A396023_1_En_5_Chapter.html#Fig7) 显示坏事确实发生了。


    ![A396023_1_En_5_Fig7_HTML.jpg](A396023_1_En_5_Fig7_HTML.jpg)

    图 5-7：出错！


    哎呀！`Microsoft` 欠我一个调试他们界面的感谢！我预计在未来的 `SSMS` 版本中会修复这个问题。


    当您看到“定义历史记录清理任务”屏幕时，就可以继续了。


    ## Define What to Clean


    下一步是定义我们想要清理的内容以及频率，如图 [5-8](#A396023_1_En_5_Chapter.html#Fig8) 所示。


    ![A396023_1_En_5_Fig8_HTML.jpg](A396023_1_En_5_Fig8_HTML.jpg)

    图 5-8：定义历史记录清理任务


    图 [5-8](#A396023_1_En_5_Chapter.html#Fig8) 最初显示的是您进入此屏幕时看到的内容。只需将值更改为“3 天”即可。保持那三个复选框选中，因为我们想要清理这三个区域。您更新后的界面应如图
    [5-9](#A396023_1_En_5_Chapter.html#Fig9) 所示。


    ![A396023_1_En_5_Fig9_HTML.jpg](A396023_1_En_5_Fig9_HTML.jpg)

    图 5-9：定义历史记录清理任务（已更新）


    准备好继续后，点击下一步。


    下一个屏幕为您提供报告选项。您可以写入报告、通过电子邮件发送报告，或者两者都做。我建议两者都选，以防您无法使用其中任何一个选项。如果要使用文本文件选项，请确保选择一个专门用于存储日志文件的文件夹位置。我通常倾向于使用在第
    [1](#A396023_1_En_1_Chapter.html) 章描述的文件夹结构，并将所有维护日志指向 `Backup` 文件夹；这意味着只有事务日志会进入
    `Logs` 文件夹。


    如果选择通过电子邮件发送报告，请点击复选框，并选择我们在第 [4](#A396023_1_En_4_Chapter.html) 章数据库邮件讨论中设置的操作员。


    您的界面现在应类似于图 [5-10](#A396023_1_En_5_Chapter.html#Fig10)，其中包含您的值而非我的值。


    ![A396023_1_En_5_Fig10_HTML.jpg](A396023_1_En_5_Fig10_HTML.jpg)

    图 5-10：选择报告选项


    ## Review


    点击下一步，准备完成此任务。您将看到我们在此任务中迄今为止所做工作的摘要。展开所有内容。您应该看到图 [5-11](#A396023_1_En_5_Chapter.html#Fig11)
    中显示的信息。


    ![A396023_1_En_5_Fig11_HTML.jpg](A396023_1_En_5_Fig11_HTML.jpg)

    图 5-11：完成向导


    要查看，请浏览“完成向导”屏幕中列出的操作，并确保一切符合您的需要。如果不符合，只需点击“上一步”按钮并修复您需要修复的任何内容。准备好实施时，点击“完成”。您应该会看到图
    [5-12](#A396023_1_En_5_Chapter.html#Fig12) 所示的内容。


    ![A396023_1_En_5_Fig12_HTML.jpg](A396023_1_En_5_Fig12_HTML.jpg)

    图 5-12：维护计划向导进度


    我有没有提到我有多喜欢绿色复选框？它们告诉我们一切都检查通过，并且维护计划已添加到维护计划子系统中，由 `SQL Server Agent` 按设定的计划执行。


    记得现在更改作业的默认名称！在 `SQL Server Agent` 的 `Jobs` 文件夹中双击作业名称，并将其更改为易于记忆的名称。如果您记得，我们将维护计划命名为
    `Cleanup History`，因此我将作业也命名为 `Cleanup History`。完整名称现在是 `Cleanup History`，如图 [5-13](#A396023_1_En_5_Chapter.html#Fig13)
    所示。


    ![A396023_1_En_5_Fig13_HTML.jpg](A396023_1_En_5_Fig13_HTML.jpg)

    图 5-13：作业属性


    记住像之前一样设置此“属性”区域中的其余选项。您的 `Jobs` 文件夹现在应如图 [5-14](#A396023_1_En_5_Chapter.html#Fig14)
    所示。


