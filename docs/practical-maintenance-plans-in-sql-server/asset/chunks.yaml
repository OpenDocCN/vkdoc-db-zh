- fmt: '#### Response


    When you first click the menu option, you see the screen shown in Figure [4-27](#A396023_1_En_4_Chapter.html#Fig27).


    ![A396023_1_En_4_Fig27_HTML.jpg](A396023_1_En_4_Fig27_HTML.jpg)


    Figure 4-27.


    ##### New Alert


    If you have already saved the job, you will see that the `Execute Job` check box
    is defaulted to on. That’s because it is a part of this job, like it or not. If
    you haven’t, it won’t be assigned to a job yet, but will still be disabled. You
    also have the ability to notify operators, though, and this is key. For this step,
    to notify operators of the event being targeted, this must be checked and a user
    must be selected. You can check the `Notify Operators` box and click `New Operator`
    to add a new operator to the Operator area of SQL Server Agent. An example of
    this is shown in Figure [4-28](#A396023_1_En_4_Chapter.html#Fig28).


    ![A396023_1_En_4_Fig28_HTML.jpg](A396023_1_En_4_Fig28_HTML.jpg)


    Figure 4-28.


    ##### New Operator


    Click `OK` at this screen. Notice that if you were to expand your server name,
    followed by `SQL Server Agent`, and then `Operators`, you would see the operator
    you specified in this area. Also note that you cannot delete an operator from
    this interface (within the Job Properties). If you need to delete an operator,
    it will need to be done from SSMS in the `Operators` section.


    If you’ve already added an operator, we see that this operator is in the interface
    with a set of check boxes next to the name. The values are `E-mail`, `Pager`,
    and `Net Send`. If you’ve set a value for these options, then select them here
    (e-mail, at least). If you like, click `View Operator` and notice that there is
    another option on the left called `History`. Clicking that option reveals a new
    interface, as shown in Figure [4-29](#A396023_1_En_4_Chapter.html#Fig29).


    ![A396023_1_En_4_Fig29_HTML.jpg](A396023_1_En_4_Fig29_HTML.jpg)


    Figure 4-29.


    ##### New Operator, History tab


    Once there is data available for this job, that is, after it runs, then there
    will be data here. Since it has never run, it has no data. Click `OK` to go back
    to the `New Alert` interface.


    You should now see where you left off; the `Execute job` option is disabled and
    no operators are selected, as shown in Figure [4-30](#A396023_1_En_4_Chapter.html#Fig30).


    ![A396023_1_En_4_Fig30_HTML.jpg](A396023_1_En_4_Fig30_HTML.jpg)


    Figure 4-30.


    ##### New Alert, Response tab


    Next, click the `Options` tab on the left. You are presented with the interface
    shown in Figure [4-31](#A396023_1_En_4_Chapter.html#Fig31).


    ![A396023_1_En_4_Fig31_HTML.jpg](A396023_1_En_4_Fig31_HTML.jpg)


    Figure 4-31.


    ##### New Alert, Options tab (initial interface)


    This gives you the option to include the alert error text in e-mail, pager, or
    net send. You can specify any additional information here as well by entering
    it into the textbox. You can delay responses here as well. What is a delay response?
    Simply put, it’s a sleep command for any additional occurrences of the same event
    within the specified time frame. Let’s say that you didn’t set this correctly
    and had the defaults set as we have them now. What that implies is that for every
    single targeted event that hits the database engine, an e-mail is created and
    sent to the operator listed. You can imagine that this would generate a ton of
    e-mail, and you would be correct. Setting a delay between responses—a time frame
    that SQL Server waits to respond to the next same event—takes care of this.


    What does all this mean? Here is a good way to look at it.


    When the specified alert happens, I want to notify this person via e-mail. I also
    want to add the text “I hope it’s not a permanent error!” to the e-mail, so I’m
    going to add it here. I don’t want to know about every single error of this type,
    just that this error occurred. I’m going to set a delay for this, so that even
    if the same event occurs that would normally trigger this event, I don’t want
    the event to trigger this same job.


    See how it works? An updated interface with suggested values is shown in Figure
    [4-32](#A396023_1_En_4_Chapter.html#Fig32).


    ![A396023_1_En_4_Fig32_HTML.jpg](A396023_1_En_4_Fig32_HTML.jpg)


    Figure 4-32.


    ##### New Alert, Options tab (updated interface)


    Now we can see that we are going to wait at least 5 minutes between e-mails.


    We don’t want to actually use these values, so just press `Cancel` to return to
    the Job Properties page. You should see a blank `Alerts` screen; we didn’t want
    to set up any alerts here, remember. We did set up an operator, which is all we
    really needed out of this area. Yes, there are a few other ways to do it, but
    this way showed you around this area.


    ### Notifications


    Next is the `Notifications` tab, as shown in Figure [4-33](#A396023_1_En_4_Chapter.html#Fig33).
    Notice that none of the options is checked and the drop-down values are defaulted.


    ![A396023_1_En_4_Fig33_HTML.jpg](A396023_1_En_4_Fig33_HTML.jpg)


    Figure 4-33.


    ##### Job Properties, Notifications tab


    This is where we actually get to define the database mail option we set up earlier.
    The following are the available contact options:


    *   E-mail

    *   Page

    *   Net Send

    *   Write to the Windows Application event log

    *   Automatically delete job


    Any or all of these can be selected so that the users that need to be notified
    can be. I would usually suggest setting up a catchall e-mail for database issues,
    but that would ultimately depend on your setup and any security constraints. In
    any event, there really is no reason for this area to be left blank (besides e-mail
    being selected, since that’s the point of this). For example, why wouldn’t you
    want the job status to be written to the Windows event log?


    This screen itself is pretty self-explanatory, as shown in Figure [4-34](#A396023_1_En_4_Chapter.html#Fig34)
    with my recommended options and values.


    ![A396023_1_En_4_Fig34_HTML.jpg](A396023_1_En_4_Fig34_HTML.jpg)


    Figure 4-34.


    ##### Job Properties, Notifications tab (updated)


    **Tip**


    If you don’t see your E-mail name in the box, save the job and open it again.
    Presto!


    Note how my account name is in the e-mail field? That’s because it was populated
    there from the Database Mail work we did earlier. Also notice that there are three
    different options for the drop-down menus: `When the job succeeds`, `When the
    job fails`, and `When the job completes`. Figure [4-35](#A396023_1_En_4_Chapter.html#Fig35)
    illustrates this.


    ![A396023_1_En_4_Fig35_HTML.jpg](A396023_1_En_4_Fig35_HTML.jpg)


    Figure 4-35.


    ##### Job status meanings


    What do these mean? What is the difference between them and which should I choose?
    The following heuristics will help answer these questions:


    *   If you want to know when a job completes successfully, choose `When the job
    succeeds`.

    *   If you want to know when a job fails, choose `When the job fails`.

    *   If you want to know that a job either succeeded or failed, choose `When the
    job completes`.


    That is literally the only difference between the options. The `completes` option
    is a catchall, where `succeeds` and `fails` are contingent on the pass or fail
    status of the job. Think of `completes` as an AND clause, and both `succeeds`
    and `fails` as OR clauses.'
