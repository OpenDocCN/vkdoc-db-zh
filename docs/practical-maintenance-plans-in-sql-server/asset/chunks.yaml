    is complete.


    See how that works? We run tasks before, during, and after. The result is a fresh,
    clean backup of the database, and properly maintained tasks and logs.


    So now we know the order that we need to run the tasks in. Next, we need to decide
    how robust we want this to be. We can decide to do as much or as little as needed
    for our security plan. Remember that, as a DBA, you have to follow the guidelines
    set forth for data retention and availability. You may be subject to different
    requirements than I am, so it is best to remember to use this as a guideline to
    creating your own database maintenance plan within the confines of your security
    principles.'
  trans: '

    ## 创建操作员配置文件


    我们需要为作业创建一个操作员配置文件才能使其运行。双击 `Database Mail`，然后点击“管理配置文件安全性”单选按钮，如图 12-16 所示的界面。


    ![A396023_1_En_12_Fig16_HTML.jpg](img/A396023_1_En_12_Fig16_HTML.jpg)


    图 12-16. 选择配置任务


    点击 `Next` 继续。


    您将看到一个窗口，其顶部有 `公共配置文件` 和 `专用配置文件` 两个选项卡。默认显示的是 `公共配置文件`，如图 12-17 所示的界面。


    ![A396023_1_En_12_Fig17_HTML.jpg](img/A396023_1_En_12_Fig17_HTML.jpg)


    图 12-17. 管理配置文件安全性


    此时，勾选 `公共` 复选框，并将 `默认配置文件` 选项更改为 `是`。您的界面应如图 12-18 所示。


    ![A396023_1_En_12_Fig18_HTML.jpg](img/A396023_1_En_12_Fig18_HTML.jpg)


    图 12-18. 管理配置文件安全性（已更新）


    点击 `Next` 继续，然后点击 `Finish` 完成设置。您应该会收到一条 `成功` 消息，如图 12-19 所示。关闭窗口，再次右键单击该作业，选择
    `从步骤开始作业…` 以查看接下来会发生什么。


    ![A396023_1_En_12_Fig19_HTML.jpg](img/A396023_1_En_12_Fig19_HTML.jpg)


    图 12-19. 成功！（再次）


    现在检查您的收件箱。嘿，看那个！挺不错的吧？


    继续将作业重命名为 `通知操作员`，并按照我们在前几章中的方式更新它。此时，您应该拥有如图 12-20 所示的所有作业。


    ![A396023_1_En_12_Fig20_HTML.jpg](img/A396023_1_En_12_Fig20_HTML.jpg)


    图 12-20. SQL Server Agent 作业


    您的 `维护计划` 文件夹应如图 12-21 所示。


    ![A396023_1_En_12_Fig21_HTML.jpg](img/A396023_1_En_12_Fig21_HTML.jpg)


    图 12-21. 维护计划


    ## 总结


    让我们快速回顾一下本章内容。


    *   我们学习了 `通知操作员任务`。

    *   我们了解到，操作员必须有一个电子邮件地址才能使用 `通知操作员任务` 进行通知。

    *   我们了解到，`Database Mail` 配置文件安全性需要启用才能正常工作。

    *   我们通过收到一封电子邮件确认了我们的设置。


    到目前为止做得非常好。真的，如果您能一次就走到这一步，那真是做得太棒了；如果您能一口气读到这里，那就更了不起了。继续前进，我们最终将通过创建自定义维护计划来圆满结束这一切。


    ## 13. 整合所有内容


    至此，我们已经完成了创建每项任务的维护计划所需的所有具体任务。我们遵循了实践示例，引导我们走向本书的高潮，即让您——用户——创建属于您自己的维护计划。从现在开始，我们将从理论转向应用；我们将应用所学知识。


    ### 检查您的环境


    如果您一直跟着操作，您的收件箱里可能已经收到了不少测试邮件。请删除它们，因为您不再需要它们了。


    图 13-1 显示了 `SQL Server Agent` 中列出的作业。


    ![A396023_1_En_13_Fig1_HTML.jpg](img/A396023_1_En_13_Fig1_HTML.jpg)


    图 13-1. SQL Server Agent 作业


    此外，我们应该拥有如图 13-2 所示的以下可用维护计划。


    ![A396023_1_En_13_Fig2_HTML.jpg](img/A396023_1_En_13_Fig2_HTML.jpg)


    图 13-2. 维护计划


    现在，这里重要的是，在很大程度上，我们已经完成了。没错！理论上，您可以将计划保持原样，就算大功告成。然而，关于维护计划有一些重要的考虑因素必须纳入，其中最重要的是要记住，某些任务需要在其他任务之前运行，而有些任务可能不需要每小时甚至每天运行。下一节将重点讨论哪些任务实际需要运行、何时运行以及运行的顺序。


    ### 维护任务的顺序


    没错；维护任务有一个优先顺序。为什么？先备份数据库，然后再重建索引，这没有多大意义，对吧？任务必须有一个顺序，所以让我们围绕要运行的主要任务——备份数据库——来看看它们的顺序。


    可以这样想。您不希望备份错误的数据，但同时您也希望提供一个长期有效的备份机制。为了实现这一点，您希望提前完成基础工作，即处理数据完整性的任务。备份之后，您需要进行清理。


    查看图 13-3。理想情况下，这就是我构建新维护计划的方式。


    ![A396023_1_En_13_Fig3_HTML.jpg](img/A396023_1_En_13_Fig3_HTML.jpg)


    图 13-3. 维护计划结构


    进一步总结，可以这样理解。


    *   **备份前阶段** 由所有需要在数据库备份之前完成的事项组成。

    *   **备份阶段** 是实际运行以备份数据的部分。

    *   **备份后阶段** 由备份完成后需要处理的事项组成。


    明白了吗？我们在备份前、备份中和备份后运行任务。结果是得到一个新鲜、干净的数据库备份，以及得到适当维护的任务和日志。


    所以现在我们知道了需要按什么顺序运行任务。接下来，我们需要决定我们希望这个计划有多健壮。我们可以根据安全计划的需要，决定做多或做少。请记住，作为一名 `DBA`，您必须遵循有关数据保留和可用性的指导原则。您可能面临与我不同的要求，因此最好记住将本指南作为在您自身安全原则范围内创建数据库维护计划的参考。

    '
- fmt: '## Determining Complexity of the Maintenance Plan


    Like I just said, this can be as simple or as complex as you want. I tend to try
    and keep things as simple as possible, so in this case, I’m not going to stray
    too far from that logic.


    There are four main areas of database maturity, as shown in Figure [13-4](#A396023_1_En_13_Chapter.html#Fig4).


    ![A396023_1_En_13_Fig4_HTML.jpg](A396023_1_En_13_Fig4_HTML.jpg)


    Figure 13-4. Database Maturity Phases


    **Tip**


    Database maturity is the developmental process from when a new database is created,
    until it is to be implemented into a production environment for transaction processing
    to fulfill a business need.


    Whether you are creating a database to simply store user and session information,
    or logging billions of transactions per second, you will always start with a fresh,
    clean database. That database must therefore mature before being ready to be used
    as it is intended. The only way that it matures is by going through the processes
    to ensure that it will meet the needs of the application and, ultimately, the
    end user. Part of those processes is going to be what maintenance needs to be
    done to the database and at what interval.


    The interesting part here is that the planning for the database, ideally, should
    only be done at Phase 1. Now, obviously, this isn’t always realistic because the
    requirements of the application or the database may change. In this event, Phase
    1 begins again. See how that works? Anytime new development happens, it must go
    from 1 to 4 and not skip any steps. This is the only way to ensure absolute integrity
    and cohesion of the systems. In other words, when new functionality is being developed,
    it needs to be planned first in Phase 1, shown Figure [13-4](#A396023_1_En_13_Chapter.html#Fig4),
    and then progress through the workflow until it hits production.


    This may be a bit too complex for your needs. This is how I do things at my job,
    so that’s how I’m used to doing it. You may find another way of doing things that
    fits your needs, and that’s fine. For now though, we are going to work using this
    method.


    This doesn’t mean that we are going to create four different databases or anything
    like that. Instead, we are going to create one maintenance plan and then I will
    show you how to port the logic behind that maintenance plan, that is, what you
    learn from this book, into other databases.


    ## Planning the Maintenance Plan


    Plan the plan? Sounds like a plan. Always plan ahead, whenever you can. Seriously.
    Yes, there’s a lot of alliteration in this paragraph, but it’s a concept that
    will save you more times than not. Always err on the side of caution, especially
    when dealing with databases. And here is the cardinal rule of dealing with databases:
    when in doubt, do a backup first. All it takes is that one time when you blow
    something up on accident, but you didn’t take a backup. That is probably all you
    need to happen to become a firm believer in backing up as often as possible.


    **Tip**


    When in doubt, always do a backup first!


    So how do you plan a plan? You determine which steps you need, and then you plan
    how to implement them. Let’s look at two different scenarios and determine the
    best way to implement a maintenance plan from there.


    For the first scenario, let’s say that you have a small database that doesn’t
    handle a lot of data at once. This might be in instances like a home database
    that is used to record kids’ chores or a CD collection.


    For the second scenario, let’s say that you are the DBA for a medium or large
    company running their database that handles a fairly large number of transactions
    per hour.


    ### Scenario 1


    The first scenario is going to be for a small database that doesn’t handle a lot
    of data. Since this isn’t a very large database, and it probably isn’t mission
    critical (meaning it can be recovered quickly and easily and will not affect any
    portion of a mission or objective in its absence), then we can leave some of the
    tasks to the database engine to run. What tasks does `SQL Server` run automatically
    when those three magic DML statements are encountered? `Rebuild Indexes`, `Reorganize
    Indexes`, and `Update Statistics`. We can leave those out for this scenario, since
    we would effectively just be repeating what `SQL Server` has already done. For
    this reason, Scenario 1 might have a maintenance plan that looks like Figure [13-5](#A396023_1_En_13_Chapter.html#Fig5).


    ![A396023_1_En_13_Fig5_HTML.jpg](A396023_1_En_13_Fig5_HTML.jpg)


    Figure 13-5. Scenario 1 Structure


    That’s a bit more streamlined, isn’t it? Remember, we don’t necessarily need to
    run all the tasks just because they’re available to us. We can leave some of the
    internal processing alone that `SQL Server` does anyway, and just worry about
    the integrity of the data. I would call this the “bare-bones minimum, absolutely
    necessary tasks only” maintenance plan. I don’t really think that this scenario
    would work for a whole lot of businesses out there, and if it does, it is probably
    because the DBA either doesn’t understand maintenance plans or doesn’t care to
    take the time to learn. Good thing you aren’t that DBA; you are taking positive
    steps to enhance your own knowledge just by reading this book. When put into practice,
    the tools you have picked up from this book with definitely help you in your quest
    to better data availability and integrity.


    Like I said earlier, this is probably the best scenario for a home database, or
    one that is not critically important. If you have a dependency on the data to
    operate your business, then I don’t think that this is going to be the scenario
    you are going to want to go with.


    Instead, you are going to want something much more robust; one that will perform
    the tasks that `SQL Server` does automatically, but when done as part of a maintenance
    plan, they are done completely and not just as a passing thought. Remember how
    `SQL Server` performs index restructuring and updates the database statistics
    after most queries; this factors in here because we are manually telling `SQL
    Server` to go ahead and make sure that those are ready to go for the next batch
    of data interactions after the maintenance plan has run successfully.'
