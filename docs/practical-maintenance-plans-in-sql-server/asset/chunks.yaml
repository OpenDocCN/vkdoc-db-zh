    ## 事务日志备份维护活动


    我们想在每小时运行的事务日志备份之外，同时运行哪些任务呢？这是最难的部分，因为我们不想给服务器带来太大负担，但又希望能够执行必要的维护。


    具体来说，我们希望按以下顺序运行以下任务：


    *   `数据库完整性计划.检查完整性`

    *   `重新组织索引计划.重新组织索引`

    *   `收缩数据库计划.收缩数据库`

    *   `更新统计信息计划.更新统计信息`

    *   `备份维护计划.事务日志备份`


    添加这些任务的过程将与上一部分非常相似，因此如果需要，您可以自行添加它们并跳过后续步骤。


    ### 添加完整性检查任务


