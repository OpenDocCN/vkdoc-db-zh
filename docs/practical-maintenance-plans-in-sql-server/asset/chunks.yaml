- fmt: '# 1. Introduction to Maintenance Plans


    Ever heard of the faster/cheaper/better paradox? It says that anything can be
    broken down into three groups: get it faster, get it it cheaper, or get it better…
    but you can only pick two. So something must always be sacrificed: faster and
    cheaper means it won’t be better, and cheaper and better means it won’t be faster.
    Does this strike anyone as a bit unrealistic? Why can’t something be all three?


    Proper planning can isolate almost any failure. Correctly aligning resources can
    diminish nearly any risk. At the heart of database administration is the ever-present
    challenge to provide these three principles: faster performance, cheaper overhead,
    and better quality data. The failure to provide these for the organization employing
    you will definitely result in your lack of employment. Most of the time, it’s
    not really as serious as this, but the point can be made that you are the person
    responsible for the safe handling of the company’s most important asset—its data.
    Whether proprietary or trade data, or government classifications, or even just
    a simple database holding names and phone numbers, the data that you are responsible
    for is important to the people that need to access it. For that reason, we as
    `DBA`s are the last line of defense to make sure that we are maintaining our databases
    correctly in order to provide a higher level of database integrity for our end
    users, whether they are our grandmothers, or stockbrokers, or any other level
    of user.


    The most important part to database administration, beyond installation and actual
    development, is the maintenance of the database. This ongoing practice should
    be a part of the daily life of any seasoned database administrator (`DBA`) . Since
    the `DBA` is the primary focal point for the database, if it goes poof in the
    dark, you had better hope it’s not your fault. Luckily, `SQL Server` provides
    a wealth of tools specifically geared toward giving a lot of power to the `DBA`
    in as small a package as possible, with the hope that the `DBA` uses these tools
    to mitigate any possible risk to the data they are responsible for.


    After all, the primary responsibility of the `DBA` is to ensure protection, integrity,
    consistency, and availability of their data. Following the instructions in this
    book and implementing a complete maintenance plan will get you started accomplishing
    those goals.


    ## Before We Start


    I have a very specific way that I have my files structured. You might or might
    not, but I wanted to explain it because I frequently reference it throughout this
    book.


    I have a logical `E:\` drive that I use for all of my `SQL Server` files. Not
    the installation files, just the database files. The root of this drive is `E:\`
    and there is exactly one folder named `SQL Server`. So, the main directory for
    all of my database files is `E:\SQL Server`. Inside of this folder, I have the
    following directories.


    *   `Backups`: The `.bak` files for each backup, stored in folders per database

    *   `Data`: The `.mdf` and `.ldf` files for each database, stored in folders per
    database

    *   `Logs`: The `.trn` files for each database, stored in folders per database


    Everything that I need for `SQL Server` development is found in these folders.
    This might not work for your setup, but I hope it does. If it doesn’t, just adjust
    your own particular folder structure to the examples in the chapters. I am going
    to be adding folders to this structure in later chapters, so read on to find out
    what they will contain.


    You will also need a Windows login with `sysadmin` rights to the database engine,
    and a `SQL Server` login with `sysadmin` rights as well (usually, your `sa` account
    works just fine). These accounts are very common in newer `SQL Server` installations,
    so it shouldn’t be an issue. The large majority of the book will use the Windows
    login, as that login typically either owns the database, or has `sysadmin` permission
    to modify the database as needed. If you don’t have an account that has these
    permissions, you may not be able to create and execute the plans against the database
    you need to maintain. In this case, you are really not a `DBA` and are more like
    a “data facilitator.” As a `DBA`, you should have one account that gives you complete
    and total control of the database. Use that account to set up the things in this
    book.


    ## What Is a Maintenance Plan?


    When you create a maintenance plan , `SQL Server` creates an Integration Services
    package that is executed by the `SQL Server` Agent. A maintenance plan exists
    for one reason: to make the life of a `DBA` easier by automating administrative
    tasks. That’s it! With a well-thought-out maintenance plan, you can do all sorts
    of things automatically on a set schedule.


    So, exactly what things can be done in a maintenance plan, you ask? First of all,
    fire up `SQL Server Management Studio` and expand the `Management` section. Expand
    the `Maintenance Plans` section next. On a clean install, there won’t be anything
    in here, which is fine. That’s why you’re reading this, hopefully. You might see
    what is in Figure 1-1.


    ![A396023_1_En_1_Fig1_HTML.jpg](A396023_1_En_1_Fig1_HTML.jpg)


    Figure 1-1. Nothing in the Maintenance Plans folder!


    There are two ways to set up a maintenance plan from here. You can either go with
    the wizard or create it from scratch yourself by using what is referred to as
    the `Maintenance Plan Design Surface`. The differences between the two choices
    are slight, but there is no real power difference. Let’s examine the differences.


    Right-click `Maintenance Plans` and choose `Maintenance Plan Wizard`. An introduction
    screen pops up with general information about the wizard, so just click `Next`
    to continue.


    You are then presented with the first “real” screen of the wizard. Just click
    `Next` here, because we’re going to cancel it after the next step. This is just
    to get us familiar with the maintenance plan task choices.'
