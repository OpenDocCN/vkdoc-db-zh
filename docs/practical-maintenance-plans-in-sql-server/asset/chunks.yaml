  trans: '# 什么是数据库完整性？


    数据库完整性是一个应在数据库设计阶段就应用的概念。表本身决定了是否有规则适用于向表中插入数据。这些规则将最终决定是构建出一个具备完整性的良好数据库，还是一个几乎没有或完全没有完整性的糟糕数据库。


    数据库完整性是一个易于理解的概念。你需要尽可能地保证，这些数据就是它所声称的数据。我从小就告诉我的孩子们，完整性的定义是“即使无人监督，也做正确的事”。在这个语境下，作为数据库管理员，我们必须保证，委托给我们的数据将按照我们所知的最佳方式得到保护和维护。保证数据完整性的最佳方法，莫过于采取主动的日常维护方法，其中包含本书所发现的准则。


    这如何应用于数据呢？想想看，如果一条记录被插入表中，其`UID`（唯一标识符）与另一条记录相同，然后查询数据库以获取该记录，会有什么影响。你将无法获得你预期的数据。这显然是糟糕的数据库设计。这怎么可能发生？如果`UID`字段没有被定义为唯一键，那么这种情况就会发生。重申一次，糟糕的设计导致糟糕的完整性。


    关于数据库完整性的一个有趣之处是，即使是设计糟糕的数据库也可以保证数据的完整性。有没有听过“即使坏掉的时钟一天也能准两次”这句俗语？这里的情况与此类似。基本上，数据库将保证每次都会按照请求返回错误的数据。这理想吗？显然不是。


    数据库完整性的另一个方面是表和索引的结构完整性。随着时间的推移，它们可能会损坏。制定灾难恢复计划是解决此问题的最佳方法，而该恢复计划的一个重要部分是确保恢复中的数据是完整且正确的。这只能通过数据库完整性来实现。


    似乎总是有时间、金钱和资源在以后重做工作，但从来没有足够的时间、金钱或资源在第一次就把工作做对。任何你做的工作都值得做好，所以如果你要在一个项目上署名，请确保你**少承诺，多交付**。换句话说，你的个人完整性（在无人监督时做正确的事）会带来更高的数据完整性（数据的质量/可用性）。


    **提示**


    花时间第一次就把事情做对，而不是不得不重做，或者被迫使用一个设计糟糕的数据库。


    ## 数据库完整性原则的实际应用


    你需要将此任务添加到你的维护计划中吗？简短的回答是“是”。不过，让我们来看看并找出原因。在 SQL Server Management Studio 中，右键单击你的数据库名称，转到“报告”
    ➤ “标准报告” ➤ `数据库一致性历史记录`。这将启动一个报告显示你发现的错误数量和修复的错误数量，如图 3-1 所示。


    ![A396023_1_En_3_Fig1_HTML.jpg](img/A396023_1_En_3_Fig1_HTML.jpg)

    图 3-1. 无数据的数据库一致性历史记录报告


    如果你在报告中没有看到任何数据，请打开一个新的查询窗口并输入以下内容：


    ```

    DBCC CHECKDB([database_name]) WITH no_infomsgs

    ```


    显然，将 `[database_name]` 替换为你的数据库名称。按 `F5` 运行查询。这将需要几秒钟。切换回报告并单击“刷新”图标。瞧！你就有了一条记录。图
    3-2 显示了添加记录后的界面。


    ![A396023_1_En_3_Fig2_HTML.jpg](img/A396023_1_En_3_Fig2_HTML.jpg)

    图 3-2. 包含数据的数据库一致性历史记录报告


    **提示**


    如果此时出现失败，最常见的原因是因为物理数据库文件（`MDF` 和 `LDF` 文件）位于使用 `FAT` 而非 `NTFS` 格式的分区上。数据库引擎此时尝试创建快照会失败，而
    `DBCC` 命令正是针对该快照运行的（而非实际的数据库）。


    那么……图 3-2 中的记录意味着什么？让我们分解来看。图 3-2 显示了由 `DBCC` 事务记录的数据。返回的列如下：


    *   `命令文本`：此列仅显示数据库引擎解析并执行的 SQL。这应与之前写的完全一致。

    *   `登录名`：这是执行 `命令文本` 的账户名称。不同的账户有不同的权限，因此如果命令失败，可能是因为没有具有运行 `DBCC` 命令权限的账户。在这种情况下，你需要使用管理员级别的账户登录；否则，这些操作都无法进行。

    *   `开始时间`：我想知道这意味着什么……？哦！这是查询开始执行的时间。奇怪的是，没有 `结束时间` 列。不过，有一个 `持续时间` 列，所以需要由 DBA
    来解析时间差。

    *   `# 错误`：如果你在这里看到一个值，那你就麻烦了。这意味着某些地方开始出问题；没有进一步分析，将无法确定问题所在。

    *   `# 已修复错误`：如果你在 `# 错误` 列看到一个值，但在此列中没有看到相同的值，那你即将面临严重问题。这意味着数据一致性中存在未解决的错误；你肯定还会再次遇到这个错误。

    *   `持续时间 (hh:mm:ss)`：这只是查询运行所花费的时间。我运行此命令的数据库是一个全新的数据库，所以它只有大约 `8MB`，运行时间花了 `0`
    秒。


    如你所见，此报告在判断数据库是否“健康”方面极其有用。密切关注此报告有助于通过早期发现来缓解未来的问题。即使这条记录返回了 `0` 个错误，这并不意味着它不需要被添加到维护计划中。相反，我们在这里看到
    `0` 这一事实表明，数据库完整性已经达到了数据一致性没有可报告错误的程度，这是一件非常好的事情。将数据库完整性作为任何维护计划的一部分是绝对必要的。


    现在，让我们创建一个维护计划来涵盖数据库完整性。'
- fmt: '## Setting Up the Maintenance Plan


    Right-click `Maintenance Plans` and select `Maintenance Plan Wizard`, and then
    name it `Database Integrity Plan`. You can leave the radio button for the scheduling
    alone since there is only one task, but click the `Change` button to define the
    overall schedule, which is shown in Figure [3-3](#A396023_1_En_3_Chapter.html#Fig3).


    ![A396023_1_En_3_Fig3_HTML.jpg](A396023_1_En_3_Fig3_HTML.jpg)

    *Figure 3-3. New Job Schedule*


    The schedule should reflect that we want the task to run once every hour, basically
    mirroring the schedule for the transaction log backups. Why is this? Because we’re
    running a backup, we don’t want to have to worry about coming up with data integrity
    issues hours after the issue comes up. We want to be aware as soon as possible;
    so to implement that, we run it after the transaction log backups. That way, any
    integrity issues get reported immediately.


    Click `OK` on the `New Job Schedule` screen. You are returned to the `Select Plan
    Properties` screen, as shown in Figure [3-4](#A396023_1_En_3_Chapter.html#Fig4).


    ![A396023_1_En_3_Fig4_HTML.jpg](A396023_1_En_3_Fig4_HTML.jpg)

    *Figure 3-4. Select Plan Properties*


    Click `Next` to continue. You should see the `Select Maintenance Tasks` screen,
    as shown in Figure [3-5](#A396023_1_En_3_Chapter.html#Fig5). Choose the `Check
    Database Integrity` check box and then click `Next`.


    ![A396023_1_En_3_Fig5_HTML.jpg](A396023_1_En_3_Fig5_HTML.jpg)

    *Figure 3-5. Select Maintenance Tasks*


    You should see a screen titled `Select Maintenance Task Order`, as shown in Figure
    [3-6](#A396023_1_En_3_Chapter.html#Fig6). Just click `Next` here since there is
    only one task.


    ![A396023_1_En_3_Fig6_HTML.jpg](A396023_1_En_3_Fig6_HTML.jpg)

    *Figure 3-6. Select Maintenance Task Order*


    Next, the `Define Database Check Integrity Task` interface appears, as shown in
    Figure [3-7](#A396023_1_En_3_Chapter.html#Fig7). Choose your database from the
    drop-down menu, leave “Include indexes” selected, click `OK`, and then click `Next`.


    ![A396023_1_En_3_Fig7_HTML.jpg](A396023_1_En_3_Fig7_HTML.jpg)

    *Figure 3-7. Define Database Check Integrity Task*


    The next screen, shown in Figure [3-8](#A396023_1_En_3_Chapter.html#Fig8), is
    `Select Report Options`. Leave the report option checked and enter the backups
    location again. Remember that we are writing our maintenance logs to this location.
    Click `Next` when you are ready to move on.


    ![A396023_1_En_3_Fig8_HTML.jpg](A396023_1_En_3_Fig8_HTML.jpg)

    *Figure 3-8. Select Report Options*


    That leads to the `Summary` section of this area, as shown in Figure [3-9](#A396023_1_En_3_Chapter.html#Fig9).


    ![A396023_1_En_3_Fig9_HTML.jpg](A396023_1_En_3_Fig9_HTML.jpg)

    *Figure 3-9. Complete the Wizard*


    When you’re ready, click `Finish`. You should see what is shown in Figure [3-10](#A396023_1_En_3_Chapter.html#Fig10).


    ![A396023_1_En_3_Fig10_HTML.jpg](A396023_1_En_3_Fig10_HTML.jpg)

    *Figure 3-10. Maintenance Plan Wizard Progress*


    Click `Close` when you’re done. Note that the `Maintenance Plans` area shown in
    Figure [3-11](#A396023_1_En_3_Chapter.html#Fig11) now shows the `Database Integrity
    Plan`.


    ![A396023_1_En_3_Fig11_HTML.jpg](A396023_1_En_3_Fig11_HTML.jpg)

    *Figure 3-11. Maintenance Plans*


    You’re going to want to update the job, as defined in Chapter [1](#A396023_1_En_1_Chapter.html).
    Double-click the job name in the `Jobs` folder inside `SQL Server Agent`. Change
    the `Name of the Job` from `Database Integrity Plan.Subplan_1` to `Check Integrity`
    and continue from there. Refer to Chapter [1](#A396023_1_En_1_Chapter.html) for
    the necessary steps. Once finished, your `Jobs` folder should look like what’s
    shown in Figure [3-12](#A396023_1_En_3_Chapter.html#Fig12).


    ![A396023_1_En_3_Fig12_HTML.jpg](A396023_1_En_3_Fig12_HTML.jpg)

    *Figure 3-12. SQL Server Agent Jobs*


    ## Summary


    Let’s sum up what we’ve learned in this chapter.


    *   We learned about data integrity and the importance it carries.

    *   We learned how to check our database for consistency using `DBCC CHECKDB`.

    *   We learned how to set up the maintenance plan and update a job when the plan
    was completed.


    In the coming chapters, we are going to get much more involved. Better get more
    coffee…


    # 4. Executing SQL Server Agent Jobs


    Ah, good old `SQL Server Agent`. What would we do without you? Well, that’s easy;
    nothing. Not in this book, anyway. The purpose of `SQL Server Agent` is to execute
    scheduled administrative tasks, so without it, we couldn’t do anything automatically
    and we would have to do all of this manually. Now, don’t get me wrong; all of
    this can be done in T-SQL… but why would you want to do that, when you can have
    trusty `SQL Server Agent` do it’s one and only job?


    Now, before we go any further, let me stop right here and state the obvious. You
    cannot use this task to run a job that doesn’t exist. And I’m not bringing this
    up because I doubt the mental faculties of my readers; quite the contrary. I am
    embarrassed to admit that I have spent a considerable amount of time trying to
    track down why a task was failing, only to find that the job assigned to the task…
    didn’t… actually… exist. Talk about a rookie error, right? It happens. Slap your
    forehead and move on.


    Okay. So here we are, wanting to run a `SQL Server Agent` job. Do we have any
    jobs available to run? Let’s check and find out. Expand `SQL Server Agent` and
    then expand the `Jobs` folder to show any jobs you may have in there. You should
    see something similar to Figure [4-1](#A396023_1_En_4_Chapter.html#Fig1).


    ![A396023_1_En_4_Fig1_HTML.jpg](A396023_1_En_4_Fig1_HTML.jpg)

    *Figure 4-1. SQL Server Agent Jobs*


    We have our jobs that we’ve been creating and the default `SQL Server` job. I
    don’t really want to use these though, since they are running on their own. That
    means we need to create one from scratch. Fun!


    ## E-mail from the Database


    Before we get into creating agent jobs, let’s take the time to configure `SQL
    Server` to send e-mail. That way, you can create jobs that notify you when they
    are done. After all, what good is automation if you must manually check at the
    end?


    Here are a couple things to know about sending e-mail from `SQL Server`:


    *   `SQL Server` can only send e-mail over `SMTP`. It cannot receive e-mail in
    any way.

    *   The server must be set up with `SMTP` already. Work with your system administrator
    to be certain that `SMTP` is in place.


    Your tasks now are to configure your database for e-mail, send a test e-mail to
    be sure of your configuration, and finally, to enable the mail profile in `SQL
    Server Agent`.'
