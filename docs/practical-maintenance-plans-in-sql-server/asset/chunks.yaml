    13-52 类似。


    ![A396023_1_En_13_Fig52_HTML.jpg](img/A396023_1_En_13_Fig52_HTML.jpg)


    图 13-52. 设计图面上的执行 SQL Server 代理作业任务（已完成）


    ### 添加重新组织索引任务


    和之前一样，从工具栏单击并拖动 `执行 SQL Server 代理作业` 到设计图面上，但这次将其放置在 `检查完整性` 任务和备份任务之间。最终您看到的布局应与图
    13-53 类似。


    ![A396023_1_En_13_Fig53_HTML.jpg](img/A396023_1_En_13_Fig53_HTML.jpg)


    图 13-53. 设计图面上的执行 SQL Server 代理作业任务


    双击我们刚刚添加的任务，从列表中选择 `重新组织索引` 任务，然后单击 `确定`。长按并更改任务的名称。完成后，您应该看到图 13-54。


