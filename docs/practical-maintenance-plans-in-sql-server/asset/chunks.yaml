    ![A396023_1_En_12_Fig9_HTML.jpg](A396023_1_En_12_Fig9_HTML.jpg)


    Figure 12-9.


    Pager Operator properties


    So now we have an e-mail address specified for the Pager Operator. Click OK. Go
    back to the Notify Operator Task and double-click it. Figure [12-10](#A396023_1_En_12_Chapter.html#Fig10)
    shows the updated interface.


    ![A396023_1_En_12_Fig10_HTML.jpg](A396023_1_En_12_Fig10_HTML.jpg)


    Figure 12-10.


    Notify Operator Task (updated)


    Would you look at that? The Pager Operator is added.


    Therefore, we can positively assert that an operator must have an e-mail address
    specified in order to be included in the Notify Operator Task in any capacity.


    You can remove the Pager Operator and Net Send Operator now by right-clicking
    and choosing Delete, and then accepting the deletion operation. You should then
    be left with just the original operator.


    On with the task! We left off with the specification of the interface, so update
    it to look like Figure [12-11](#A396023_1_En_12_Chapter.html#Fig11).


    ![A396023_1_En_12_Fig11_HTML.jpg](A396023_1_En_12_Fig11_HTML.jpg)


    Figure 12-11.


    Notify Operator Task (updated)


    All we did was add the operator and define a generic subject and body. Click OK
    at this point.


    Notice that our interface has changed to display the information shown in Figure
    [12-12](#A396023_1_En_12_Chapter.html#Fig12).


    ![A396023_1_En_12_Fig12_HTML.jpg](A396023_1_En_12_Fig12_HTML.jpg)


    Figure 12-12.


    Notify Operator Task


    This says that we are using our local server connection and Bradley Beard is our
    operator.


    Perfect so far. So what is next? We need to test it. Either we can wait until
    midnight, when we scheduled it to fire, or we can run it now. Let’s run it now.


    First of all, you want to save the plan so far. Once you save it, the Notify Operator
    Plan.Email Operator job appears in the SQL Server Agent ➤ Jobs folder in SSMS,
    as shown in Figure [12-13](#A396023_1_En_12_Chapter.html#Fig13).


    ![A396023_1_En_12_Fig13_HTML.jpg](A396023_1_En_12_Fig13_HTML.jpg)


    Figure 12-13.


    SQL Server Agent Jobs


    There are other jobs, but I want to focus on just this one for now. Right-click
    it and choose Start Job at Step… and watch what happens. Figure [12-14](#A396023_1_En_12_Chapter.html#Fig14)
    shows what to expect.


    ![A396023_1_En_12_Fig14_HTML.jpg](A396023_1_En_12_Fig14_HTML.jpg)


    Figure 12-14.


    Success!


    Success! I love it. If you got an error like the one shown in Figure [12-15](#A396023_1_En_12_Chapter.html#Fig15),
    read on. If not, skip ahead to the end of this chapter.


    ![A396023_1_En_12_Fig15_HTML.jpg](A396023_1_En_12_Fig15_HTML.jpg)


    Figure 12-15.


    Or not…


    It failed, you say?! Now why would it fail? In a nutshell, it failed because we
    haven’t set up a profile for the operator yet. Let’s look at how to do that now.'
