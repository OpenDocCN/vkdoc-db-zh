  trans: '

    ## 保存更改


    点击“确定”以保存您所做的所有更改，这样就完成了作业的最终确定。为每个作业重复最终确定过程，除了名为 `E-mail User Information` 的作业。让那个作业保持原样。


    我们不打算处理标题为 `E-mail User Information` 的作业，因为它专门用于展示 `SQL Server Agent` 作业任务的工作方式。为了防止此作业触发，只需右键单击它并选择
    `禁用` 来禁用该任务。禁用后，您应该会看到如图 13-15 所示的界面。


    ![A396023_1_En_13_Fig15_HTML.jpg](img/A396023_1_En_13_Fig15_HTML.jpg)

    **图 13-15.** 禁用作业


    另请注意，该作业现在在 `作业` 文件夹中有一个红色的向下小箭头，如图 13-16 所示。


    ![A396023_1_En_13_Fig16_HTML.jpg](img/A396023_1_En_13_Fig16_HTML.jpg)

    **图 13-16.** 显示已禁用作业的 `SQL Server Agent`


    此图标可一目了然地显示该作业已禁用。


    ## 检查您的计划需求


    我们已经配置了要添加到维护计划中的任务。让我们回顾一下维护计划的计划需求应该是什么样子（参见图 13-17）。请记住，我们也遵循方案 2，即我们将使用尽可能多的维护任务来对数据库进行适当的维护。


    ![A396023_1_En_13_Fig17_HTML.jpg](img/A396023_1_En_13_Fig17_HTML.jpg)

    **图 13-17.** 方案 2 结构


    正如您所见，我将两个 `索引` 任务都保留在里面了。还记得我之前说过在一个计划中不需要两者吗？我将在不同的时间运行它们；这就是为什么它们都像那样放在里面。


    ## 将任务添加到计划中


    准备好开始组装您的计划了吗？我们开始吧！


    展开 `维护计划` 文件夹并查找 `备份维护计划`。双击它，您应该会看到如图 13-18 所示的界面。


    ![A396023_1_En_13_Fig18_HTML.jpg](img/A396023_1_En_13_Fig18_HTML.jpg)

    **图 13-18.** `备份维护计划` 设计面


    遗憾的是，`子计划` 名称不会保留，而且由于我们删除了计划，我们需要快速更新这些信息。双击 `子计划` 名称以更新信息，并注意当您单击不同的 `子计划` 时设计面如何变化。这有助于您为它们适当地命名；`Subplan_1`
    是 `备份数据库（完整）`，`Subplan_2` 是 `备份数据库（差异）`，`Subplan_3` 是 `备份数据库（事务日志）`。使用界面更新它们，然后输入计划。


    还记得我们为备份设置的计划吗？完整备份在午夜进行，差异备份每 6 小时一次，事务日志备份每小时一次。将这三个任务的计划设置为这些值。您最终应该会看到如图 13-19
    所示的界面。


    ![A396023_1_En_13_Fig19_HTML.jpg](img/A396023_1_En_13_Fig19_HTML.jpg)

    **图 13-19.** `备份维护计划` 计划


    请注意，计划现已设置好，`子计划` 名称已更新，并且它们都设置为以 `SQL Server Agent` 服务帐户运行。


    我们现在要做的是将剩余的任务添加到此维护计划中。可以很有把握地说，我们将坚持使用图 13-19 中所示的三个备份计划作为我们备份的标准，并且我们所有的维护活动都将在那三个时间窗口内完成。并非所有维护任务，而是一些在不同时间出于不同原因执行的任务。因此，我们将把所需的任务添加到三个备份任务中的每一个，并强制执行优先级约束。


    另外，当您保存 `备份维护计划` 时，作业名称会被更新。这太不方便了！我们稍后可以再次更新这些。


    ## 完整备份维护活动


    我们希望在午夜的完整备份中运行哪些任务？老实说，大部分都要运行。对于大多数安装来说，午夜可能是运行维护活动的好时机，因为用户在线的可能性微乎其微。


    具体来说，我们希望按以下顺序运行以下作业：


    *   `检查完整性`

    *   `重建索引`

    *   `收缩数据库`

    *   `更新统计信息`

    *   `备份维护计划.备份数据库（完整）`

    *   `清理历史记录`

    *   `bak` 文件

    *   `txt` 文件

    *   `trn` 文件


    这些任务将在每晚午夜运行。将它们添加到现有的备份计划中在此时是微不足道的，因为它们已经创建好了。怎么做？`SQL Server` 为我们提供了在不同环境中做事的许多不同方法。在这种情况下，我们将把已经创建的作业添加到现有的
    `备份维护计划` 中，并继续操作。这意味着几件事，所以在继续之前让我们快速回顾一下。


    *   不要删除“旧”的维护计划。原始作业（将被添加到 `备份维护计划` 中）仍然链接到那些原始的维护计划。

    *   不要删除作业。


    换句话说，仅仅因为我们正在将作业添加到维护计划中，您不应该假设对原始计划的引用就不存在了。只要它的结构如我们所设，引用就会保留。稍后，我们将导出完成的计划并回顾如何恢复它们。然后您将确切看到这些引用如何协同工作以创建您现在所知的维护计划。


    ### 添加检查完整性任务


    单击如图 13-19 所示的 `备份数据库（完整）` 子计划。这将显示设计面上的 `备份数据库（完整）` 任务，也如图 13-18 所示。现在，从工具栏中单击并拖动
    `执行 SQL Server Agent 作业` 到设计面上。此时，您应该会看到如图 13-20 所示的界面。


    ![A396023_1_En_13_Fig20_HTML.jpg](img/A396023_1_En_13_Fig20_HTML.jpg)

    **图 13-20.** `备份维护计划` 设计面


    这仅仅表明我们在那里有一个通用的 `SQL Server Agent` 作业任务，但我们尚未定义任务。为此，请双击设计面上的任务。猜猜会出现什么？图 13-21
    是一个很大的提示。


    ![A396023_1_En_13_Fig21_HTML.jpg](img/A396023_1_En_13_Fig21_HTML.jpg)

    **图 13-21.** `执行 SQL Server Agent 作业任务`


    看哪！我们已经创建的所有作业都排列整齐，看起来美观大方（在我对作业名称列排序之后）。这有多酷？这意味着我们不必返回去重新创建已经完成的工作；我们可以直接在这里添加它们就完成了。您现在很高兴您付出了所有的努力吗？既然我已经对作业进行了排序，请继续单击
    `检查完整性` 旁边的复选框，然后单击 `确定`。您现在应该看到如图 13-22 所示的内容。


    ![A396023_1_En_13_Fig22_HTML.jpg](img/A396023_1_En_13_Fig22_HTML.jpg)

    **图 13-22.** 设计面阶段上的 `执行 SQL Server Agent 作业任务`


    这向我们显示该任务已更新为现有的 `检查完整性` 任务。如果您在顶部的任务名称上长按单击，则可以将其更改为 `检查完整性`，如图 13-23 所示。


    ![A396023_1_En_13_Fig23_HTML.jpg](img/A396023_1_En_13_Fig23_HTML.jpg)

    **图 13-23.** 设计面阶段上的 `执行 SQL Server Agent 作业任务`（已更新）


    现在我可以轻松地看到这个任务是什么了。此时，您需要稍微重新组织一下您的设计面。看到备份任务在左上角很远的地方了吗？只需将其拖到更靠近中间的位置，然后将 `检查完整性`
    任务拖到它上面。您最终应该看起来类似于图 13-24。


    ![A396023_1_En_13_Fig24_HTML.jpg](img/A396023_1_En_13_Fig24_HTML.jpg)

    **图 13-24.** 设计面阶段上的 `执行 SQL Server Agent 作业任务`（已完成）

