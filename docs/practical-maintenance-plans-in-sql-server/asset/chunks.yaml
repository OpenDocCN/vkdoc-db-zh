- fmt: '## Saving the Changes


    Click OK to save any changes you have made and you are done with finalizing the
    jobs. Repeat the process of finalizing for each job except for the one called
    `E-mail User Information`. Leave that job alone.


    We aren’t going to worry about the job titled `E-mail User Information`, since
    that one was specifically to show how the `SQL Server Agent` job task works. To
    keep this job from firing, just disable the task by right-clicking it and choosing
    `Disable`. You should see the interface shown in Figure [13-15](#A396023_1_En_13_Chapter.html#Fig15)
    when this happens.


    ![A396023_1_En_13_Fig15_HTML.jpg](A396023_1_En_13_Fig15_HTML.jpg)

    **Figure 13-15.** Disable Jobs


    Also note that the job now has a little red down arrow in the `Jobs` folder, as
    shown in Figure [13-16](#A396023_1_En_13_Chapter.html#Fig16).


    ![A396023_1_En_13_Fig16_HTML.jpg](A396023_1_En_13_Fig16_HTML.jpg)

    **Figure 13-16.** `SQL Server Agent` showing a disabled job


    This icon shows at a glance that the job is disabled.


    ## Reviewing Your Schedule Needs


    We have configured the tasks to add to the maintenance plan. Let’s review what
    the schedule needs to look like for the maintenance plan (see Figure [13-17](#A396023_1_En_13_Chapter.html#Fig17)).
    Remember that we’re following Scenario 2 also, where we will be using as many
    maintenance tasks as available for proper maintenance of our database.


    ![A396023_1_En_13_Fig17_HTML.jpg](A396023_1_En_13_Fig17_HTML.jpg)

    **Figure 13-17.** Scenario 2 Structure


    I kept both of the `Index` tasks in there, as you can see. Remember how I said
    earlier that you didn’t need both in one plan? I will be running those at different
    times; that’s why they’re both in there like that.


    ## Adding the Tasks to the Plan


    Are you ready to begin putting your plan together? Here we go!


    Expand the `Maintenance Plan` folder and look for `Backup Maintenance Plan`. Double-click
    this and you should see the interface shown in Figure [13-18](#A396023_1_En_13_Chapter.html#Fig18).


    ![A396023_1_En_13_Fig18_HTML.jpg](A396023_1_En_13_Fig18_HTML.jpg)

    **Figure 13-18.** `Backup Maintenance Plan` stage


    Unfortunately, the `Subplan` names don’t carry over, and since we deleted our
    schedules, we need to update those really quick. Double-click the `Subplan` names
    to update the information, and notice how the stage changes when you click a different
    `Subplan`. This helps you to name them appropriately; `Subplan_1` is `Backup Database
    (Full)`, `Subplan_2` is `Backup Database (Differential)`, and `Subplan_3` is `Backup
    Database (Transaction Log)`. Update them using the interface and then enter the
    schedules.


    Remember the schedule we wanted for the backups? Full backups are at midnight,
    differentials are every 6 hours, and transaction logs are every hour. Set your
    schedules for the three tasks to these values. You should end up with the interface
    shown in Figure [13-19](#A396023_1_En_13_Chapter.html#Fig19).


    ![A396023_1_En_13_Fig19_HTML.jpg](A396023_1_En_13_Fig19_HTML.jpg)

    **Figure 13-19.** `Backup Maintenance Plan` Schedules


    Notice that the schedules are now set, the `Subplan` names are updated, and they
    are all set to run as `SQL Server Agent` service account.


    What we want to do now is add the rest of the tasks to this maintenance plan.
    It’s pretty safe to say that we are going to stick to the three backup plans shown
    in Figure [13-19](#A396023_1_En_13_Chapter.html#Fig19) as our standard for backing
    up, and all of our maintenance activities are going to be done in those three
    windows. Not all of the maintenance tasks, but some at different times and for
    different reasons. Because of this, we are going to add the needed tasks to each
    of the three backup tasks, and enforce precedence constraints.


    Also, when you save the `Backup Maintenance Plan`, the job names are updated.
    How very inconvenient! We can update these again later.


    ## Full Backup Maintenance Activities


    What tasks do we want to run along with the midnight full backups? Most of them,
    to be honest. For most installations, midnight is probably a good time to run
    maintenance activities since the chances of having users on is slim to none.


    In particular, we want to run the following jobs, in this order:


    *   `Check Integrity`

    *   `Rebuild Index`

    *   `Shrink Database`

    *   `Update Statistics`

    *   `Backup Maintenance Plan.Backup Database (Full)`

    *   `Cleanup History`

    *   `bak` Files

    *   `txt` Files

    *   `trn` Files


    These tasks will be run at midnight every night. Adding them to the existing backup
    plan is trivial, at this point, since they’re already created. How? `SQL Server`
    gives us a lot of different ways to do things in different environments. In this
    case, we are going to add the jobs we already created to the existing `Backup
    Maintenance Plan` and go from there. This implies a couple of things, so let’s
    go over that really quick before we push forward.


    *   Don’t delete the “old” maintenance plans. The original jobs, which are going
    to be added to the `Backup Maintenance Plan`, are still linked to those original
    maintenance plans.

    *   Don’t delete the jobs.


    In other words, just because we are adding the jobs to the maintenance plan, you
    shouldn’t assume that there isn’t a reference remaining to the original plans.
    As long as it’s structured how we have it, the reference will remain. Later, we
    will export the completed plans and review how to restore them. You will then
    see exactly how these references work together to create the maintenance plans
    as you now know them.


    ### Adding the Check Integrity Task


    Click the `Backup Database (Full)` subplan as shown in Figure [13-19](#A396023_1_En_13_Chapter.html#Fig19).
    This will show the `Back Up Database (Full)` task on the stage, as also shown
    in Figure [13-18](#A396023_1_En_13_Chapter.html#Fig18). Now, click and drag `Execute
    SQL Server Agent job` from the toolbar to the stage. You should see the interface
    shown in Figure [13-20](#A396023_1_En_13_Chapter.html#Fig20) at this point.


    ![A396023_1_En_13_Fig20_HTML.jpg](A396023_1_En_13_Fig20_HTML.jpg)

    **Figure 13-20.** `Backup Maintenance Plan` Stage


    All that says is that we have a generic `SQL Server Agent` job task there, but
    we haven’t defined a task yet. To do this, double-click the task on the stage.
    Guess what shows up? Figure [13-21](#A396023_1_En_13_Chapter.html#Fig21) is a
    big hint.


    ![A396023_1_En_13_Fig21_HTML.jpg](A396023_1_En_13_Fig21_HTML.jpg)

    **Figure 13-21.** `Execute SQL Server Agent Job Task`


    Look at that! All the jobs that we already created are lined up and looking nice
    and presentable (once I sorted the job name column). How cool is that? The implication
    of this is that we don’t have to go back in and re-create what we have already
    done; we can just add them here and be done with it. Aren’t you glad you put in
    all that work now? Since I already sorted the jobs, go ahead and click the check
    box next to `Check Integrity`, and click `OK`. You should now see what is shown
    in Figure [13-22](#A396023_1_En_13_Chapter.html#Fig22).


    ![A396023_1_En_13_Fig22_HTML.jpg](A396023_1_En_13_Fig22_HTML.jpg)

    **Figure 13-22.** `Execute SQL Server Agent Job Task` on Design Surface Stage


    That shows us that the task has been updated to the existing `Check Integrity`
    task. If you long-click the task name on the top, you can change it to `Check
    Integrity`, as shown in Figure [13-23](#A396023_1_En_13_Chapter.html#Fig23).


    ![A396023_1_En_13_Fig23_HTML.jpg](A396023_1_En_13_Fig23_HTML.jpg)

    **Figure 13-23.** `Execute SQL Server Agent Job Task` on Design Surface Stage
    (updated)


    Now I can easily see what this task is. At this point, you need to reorganize
    your stage a little bit. See how the backup task is way up on the top left? Just
    drag it more to the middle, and the drag the `Check Integrity` task above it.
    You should end up looking similar to Figure [13-24](#A396023_1_En_13_Chapter.html#Fig24).


    ![A396023_1_En_13_Fig24_HTML.jpg](A396023_1_En_13_Fig24_HTML.jpg)

    **Figure 13-24.** `Execute SQL Server Agent Job Task` on Design Surface Stage
    (completed)'
