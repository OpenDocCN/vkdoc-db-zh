  trans: '## 设置维护计划


    又来了！在 `SSMS` 的 `Management` 文件夹下右键单击 `Maintenance Plans`，然后选择 `Maintenance Plan
    Wizard`。你将看到如图 7-8 所示的界面。


    ![A396023_1_En_7_Fig8_HTML.jpg](img/A396023_1_En_7_Fig8_HTML.jpg)

    图 7-8.


    选择 `Plan Properties`。


    将默认值更改为图 7-8 所示的内容。单击 `Change…` 按钮以设置计划，如图 7-9 所示。


    ![A396023_1_En_7_Fig9_HTML.jpg](img/A396023_1_En_7_Fig9_HTML.jpg)

    图 7-9.


    新建作业计划。


    你只希望它每天运行一次，因此将 `Occurs` 下拉菜单更改为 `Daily`，然后单击 `OK`。你的计划现在已设置为每天 `12:00AM` 运行。单击
    `Next` 继续。


    你现在会看到如图 7-10 所示的屏幕，你可以在其中选择要执行的任务。


    ![A396023_1_En_7_Fig10_HTML.jpg](img/A396023_1_En_7_Fig10_HTML.jpg)

    图 7-10.


    选择维护任务。


    勾选 `Rebuild Index` 复选框，并注意给出的定义：“重新生成任务通过重新生成索引来重组数据页和索引页上的数据。这提高了索引扫描和查找的性能。此任务还优化了索引页上数据和可用空间的分布，允许未来更快地增长。”


    这与我们本章前面讨论的内容有何关联？那些索引最终会发生偏移；此任务通过从头重新生成索引使其恢复正常。这需要时间吗？是的。而且它也会消耗资源，因此这是一个需要密切关注的重要任务。幸运的是，我们可以做到这一点。


    准备好继续后，单击 `Next`。你现在将看到如图 7-11 所示的屏幕。


    ![A396023_1_En_7_Fig11_HTML.jpg](img/A396023_1_En_7_Fig11_HTML.jpg)

    图 7-11.


    选择维护任务顺序。


    由于我们这里只有一个任务，所以不用担心；单击 `Next`。


    然后你会看到定义任务的默认屏幕。它应该如图 7-12 所示。


    ![A396023_1_En_7_Fig12_HTML.jpg](img/A396023_1_En_7_Fig12_HTML.jpg)

    图 7-12.


    定义重新生成索引任务。


    现在这应该看起来很熟悉了。你首先需要从下拉菜单中选择你的数据库。然后你会看到 `Object` 选项，其值包括 `Tables`、`Views` 和 `Tables
    and Views`。选择你希望对其设置任务的对象，或者保留默认选中的 `Tables and Views`。这绝对是所有可以建立索引的内容：表和视图。


    *   如果选择 `Tables`，则必须手动定义要重新生成索引的表。

    *   如果选择 `Views`，则必须手动定义要重新生成索引的视图。

    *   如果选择 `Tables and Views`，则所有索引都会自动重新生成。


    在“可用空间选项”区域，保持“每页的默认可用空间”。这对数据库是最优的。


    在 `Advanced options` 下，有两个选项：“在 tempdb 中排序结果”和“重新索引时保持索引联机”。这到底是什么……？


    “在 tempdb 中排序结果”为你提供了一个选项，可以选择在 `tempdb` 中构建索引时保留它们，然后将完成并重新生成的索引输出到指定的文件组。除了直接在文件组中排序和存储它们之外，这并没有真正给你带来额外的好处。选择此选项会将排序结果存储在
    `tempdb` 中，然后再存储到文件组。不选择它则仅针对文件组运行排序。差不多就是这样。


    “重新索引时保持索引联机”选项从字面上看就很明显。你希望在重新生成索引时保持其联机吗？你很可能希望启用此功能；否则，索引在重新生成时将不可用。同时选择 `Rebuild
    indexes offline` 单选按钮，以防存在无法在联机时重新生成的索引。


    完成时，你的屏幕应如图 7-13 所示。


    ![A396023_1_En_7_Fig13_HTML.jpg](img/A396023_1_En_7_Fig13_HTML.jpg)

    图 7-13.


    定义重新生成索引任务（已完成）。


    在此处单击 `Next`。现在我们来定义报告选项。继续设置你的文本文件报告位置以及我们之前已设置的操作员。你的屏幕现在应如图 7-14 所示。


    ![A396023_1_En_7_Fig14_HTML.jpg](img/A396023_1_En_7_Fig14_HTML.jpg)

    图 7-14.


    选择报告选项。


    为什么我选择 `E:\SQL Server\Backups` 作为文件夹位置？还记得第 5 章我们定义文本文件的维护清理任务时吗？我们已将此文件夹位置设置为我们想要清理的位置，因为我们已经在此区域写入文件。因此，如果我们继续在此区域写入，维护清理任务将清理我们留下的任何杂乱，这是理想的情况。


    准备好后单击 `Next`。你将看到摘要屏幕，如图 7-15 所示。


    ![A396023_1_En_7_Fig15_HTML.jpg](img/A396023_1_En_7_Fig15_HTML.jpg)

    图 7-15.


    选择报告选项。


    祈祷好运。点击 `Finish`。应该会出现图 7-16，并且带有所有那些美妙的小绿色复选框。


    ![A396023_1_En_7_Fig16_HTML.jpg](img/A396023_1_En_7_Fig16_HTML.jpg)

    图 7-16.


    维护计划向导进度。


    完美。


    在我们继续之前，请确保如前所述更新作业。我将我的命名为 `Rebuild Index`。你的 `Jobs` 文件夹现在应如图 7-17 所示。


    ![A396023_1_En_7_Fig17_HTML.jpg](img/A396023_1_En_7_Fig17_HTML.jpg)

    图 7-17.


    SQL Server Agent 作业。


    你的 `Maintenance Plans` 现在应如图 7-18 所示。


    ![A396023_1_En_7_Fig18_HTML.jpg](img/A396023_1_En_7_Fig18_HTML.jpg)

    图 7-18.


    维护计划。


    ## 总结


    让我们快速回顾一下本章内容。


    我们学习了如何在表上建立索引，并通过展示如何根据索引值按降序返回数据来证明索引的成功建立。


    我们简要学习了索引和 B 树结构，现在我们理解了索引与数据检索相关的重要性。


    顺便提一下，还有一点要记住：如果你有一个高容量的数据库，那么你可能应该至少每周重新生成一次索引。我知道我们在任务中将其设置为每天一次，只要符合你的需求，那也没问题。我在前面的章节中提到过，“高容量”是一个相对术语，我理解它对所有用户可能意义不同。为了消除这种模糊性，我只想说，对于本书大约
    99% 的读者来说，每周一次就足够了。当然，你可以随心所欲地频繁执行此操作，但如果你确实有一个高容量的数据库，重新生成索引过于频繁会导致性能下降。


    对于索引来说，这是一个相当坚实的开端。如果你仍然不清楚，我强烈推荐阅读 Mike McQuillan 的书 *Introducing SQL Server*
    (Apress, 2015) 作为此主题的补充阅读材料。


    ## 8. 重新组织索引


    基于我们在第 7 章刚刚完成的操作，我们现在将重新组织我们的索引。既然它们刚刚被重新生成过，这有必要吗？让我们来看看找出答案。'
- fmt: '## Reorganizing vs. Rebuilding


    Think about a hotel. It’s a nice building, sitting there all built and stuff.
    It has a structure and multiple floors, with each floor having lots of rooms.
    You know that you can get right to the room you’re supposed to go to by going
    into the correct hotel first, and then up the elevator to the floor with the room
    on it, and then to the actual room. This is exactly how indexing works.


    With this hotel scenario in mind, does it make sense to destroy and rebuild the
    entire hotel, or just maybe reorganize the way you can find your way to the room
    that you want? Ultimately, that depends on your interpretation and needs. It might
    not be necessary to rebuild, but it is absolutely necessary to reorganize, at
    a minimum. Sometimes, all you need to do is update the map to the room that you
    need to get to, and not destroy the whole hotel.


    **Tip**


    Reorganizing indexes keeps the existing indexes as they are. Rebuilding indexes
    drops and rebuilds the indexes every single time.


    Clearly, there are differences in the time and effort it takes to destroy and
    rebuild a hotel vs. doing the same to an index. The principle is the same, though,
    and that is what needs to be understood. Just because you can do something doesn’t
    always mean that you should, in other words.


    Again, depending on your scenario, it might be advantageous to do either of the
    options, or even both options. There really isn’t a need to do both at the same
    time, since they both accomplish the same goals of a clean index.


    Another interesting point about indexes is that indexes are automatically maintained
    whenever `update`, `insert`, or `delete` queries are made. This causes modifications
    to the data itself, which is what causes fragmentation of the data. Excessive
    fragmentation is what leads to long query times, because the data is physically
    separated on the disk and not in contiguous pages. `Reorganizing` and `rebuilding`
    puts these pages back in order, so that the queries run faster and your database
    behaves better.


    ## Setting Up the Maintenance Plan


    The process of creating a maintenance plan should be very familiar by now. Right-click
    the `Maintenance Plan` option under `Management` in `SSMS` and choose `Maintenance
    Plan Wizard`. Change your interface to match what you see in Figure `8-1`.


    ![A396023_1_En_8_Fig1_HTML.jpg](A396023_1_En_8_Fig1_HTML.jpg)


    Figure `8-1`.


    Select `Plan Properties`.


    Click the `Change…` button to set the schedule to `Daily`, as in previous chapters,
    and click `OK`. You really don’t want to reorganize your index during usage hours,
    if at all possible, although it won’t hurt anything. Click `Next` when you are
    ready.


    You are now shown the interface where you can select the task, so choose `Reorganize
    Index`, as shown in Figure `8-2`.


    ![A396023_1_En_8_Fig2_HTML.jpg](A396023_1_En_8_Fig2_HTML.jpg)


    Figure `8-2`.


    Select `Maintenance Tasks`.


    Notice the definition for `Reorganize Index` given by Microsoft: “The `Reorganize
    Index` task defragments and compacts clustered and nonclustered indexes on tables
    and views. This will improve index-scanning performance.”


    Recall the definition for `Rebuild Index`: “The `Rebuild` task reorganizes data
    on the data and index pages by rebuilding indexes. This improves performance of
    index scans and seeks. This task also optimizes the distribution of data and free
    space on the index pages, allowing faster future growth.”


    They sound sort of alike, right? So why have two different options that do basically
    the same thing? Because it makes more sense from a DBA point of view to be able
    to point a task at a small or medium table with an index and say “go rebuild that
    index,” as opposed to doing the same thing to a massive table with billions of
    rows. You may want to just reorganize this index, since rebuilding the index will
    definitely take some time to run. Rebuilding that single massive index is something
    that will take a bit of time, more than likely a few seconds at least, but remember
    that this is an eternity in computer time.


    Click `Next` at the `Select Maintenance Tasks` screen (shown in Figure `8-2`)
    and then click `Next` again at the `Select Maintenance Task Order` screen, as
    shown in Figure `8-3`.


    ![A396023_1_En_8_Fig3_HTML.jpg](A396023_1_En_8_Fig3_HTML.jpg)


    Figure `8-3`.


    Select `Maintenance Task Order`.


    You then need to define the task on the `Define Reorganize Index Task` screen.
    Exactly like in Chapter `6`, choose your database and keep `Object` set to “Tables
    and views”. Leave the rest as is. You should see what is shown in Figure `8-4`.


    ![A396023_1_En_8_Fig4_HTML.jpg](A396023_1_En_8_Fig4_HTML.jpg)


    Figure `8-4`.


    Define `Reorganize Index Task`.


    Click `Next` here and you can start setting up the reporting options. Again, exactly
    like in Chapter `7`, change the folder location to where you are writing your
    logs, and enable the operator, as shown in Figure `8-5`.


