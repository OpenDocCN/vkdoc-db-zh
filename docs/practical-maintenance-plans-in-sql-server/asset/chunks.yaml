- fmt: '## Creating an Operator Profile


    We need to create an operator profile for our job to be able to run. Double-click
    `Database Mail` and click the "Manage profile security" radio button, as in the
    interface shown in Figure 12-16.


    ![A396023_1_En_12_Fig16_HTML.jpg](A396023_1_En_12_Fig16_HTML.jpg)


    Figure 12-16. Select Configuration Task


    Click `Next` to continue.


    You are brought to a screen that has `Public Profiles` and `Private Profiles`
    as tabs across the top of the window. The default screen is `Public Profiles`,
    as shown in the interface in Figure 12-17.


    ![A396023_1_En_12_Fig17_HTML.jpg](A396023_1_En_12_Fig17_HTML.jpg)


    Figure 12-17. Manage Profile Security


    At this point, click the `Public` check box and change the `Default Profile` option
    to `Yes`. Your interface should look like Figure 12-18.


    ![A396023_1_En_12_Fig18_HTML.jpg](A396023_1_En_12_Fig18_HTML.jpg)


    Figure 12-18. Manage Profile Security (updated)


    Click `Next` to continue, and then click `Finish` to wrap it up. You should get
    a `Success` message, as shown in Figure 12-19. Close the window, right-click the
    job again, and choose `Start Job at Step…` to see what happens next.


    ![A396023_1_En_12_Fig19_HTML.jpg](A396023_1_En_12_Fig19_HTML.jpg)


    Figure 12-19. Success! (again)


    Check your inbox now. Hey, look at that! Pretty fancy, huh?


    Go ahead and rename the job to `Notify Operator` and update it as we did in the
    previous chapters. At this point, you should have all the jobs shown in Figure
    12-20.


    ![A396023_1_En_12_Fig20_HTML.jpg](A396023_1_En_12_Fig20_HTML.jpg)


    Figure 12-20. SQL Server Agent Jobs


    Your `Maintenance Plans` folder should look as shown in Figure 12-21.


    ![A396023_1_En_12_Fig21_HTML.jpg](A396023_1_En_12_Fig21_HTML.jpg)


    Figure 12-21. Maintenance Plans


    ## Summary


    Let’s recap this chapter really quickly.


    *   We learned about the `Notify Operator Task`.

    *   We learned that the operator must have an e-mail address to be notified using
    the `Notify Operator Task`.

    *   We learned that the `Database Mail` profile security needed to be enabled
    for this to work correctly.

    *   We confirmed our settings by receiving an e-mail.


    Excellent work so far. Really, you’ve done a great job if you’ve gotten this far
    in one piece; even more so if you’ve gotten here in one sitting. Press onward
    and we will finally bring everything to a close with the creation of our custom
    maintenance plan.


    ## 13. Tying It All Together


    At this point, we’ve been through each of the specific tasks to create a maintenance
    plan for each task. We’ve followed practical examples to lead us to the culmination
    of this book, which is to have you, the user, create your very own maintenance
    plan. From here on, we move from theory to application; we’re going to apply what
    we know.


    ### Checking Your Environment


    If you’ve followed along, you’ve probably gotten quite a few test e-mails in your
    inbox. Go ahead and delete those since you don’t need them anymore.


    Figure 13-1 shows the jobs listed in `SQL Server Agent`.


    ![A396023_1_En_13_Fig1_HTML.jpg](A396023_1_En_13_Fig1_HTML.jpg)


    Figure 13-1. SQL Server Agent Jobs


    Additionally, we should have the following maintenance plans available, as shown
    in Figure 13-2.


    ![A396023_1_En_13_Fig2_HTML.jpg](A396023_1_En_13_Fig2_HTML.jpg)


    Figure 13-2. Maintenance Plans


    Now, the important thing here is that, for the most part, we are done. That’s
    right! You could conceivably leave the plans as they are and call it a day. However,
    there are important considerations that must be taken into account with regards
    to maintenance plans, and the most important one to remember is that some tasks
    need to be run before other tasks, and some maybe don’t need to be run every hour
    or even every day. This next section is going to focus on what tasks actually
    need to be run, when they should be run, and in what order they should run.


    ### Ordering of the Maintenance Tasks


    That’s right; there is a preferred order to the maintenance tasks. Why? It doesn’t
    make much sense to back up the database, and then rebuild the indexes, now does
    it? There has to be an order to the tasks, so let’s look at them in regards to
    the main task to be run—backing up the database.


    Think about it like this. You don’t want to back up bad data, but you also want
    to provide for a longstanding backup mechanism. To achieve this, you want to take
    care of the legwork up front, meaning the tasks that deal with the data integrity.
    After the backup, you want the cleanup.


    Check out Figure 13-3. Ideally, this is how I would structure my new maintenance
    plan.


    ![A396023_1_En_13_Fig3_HTML.jpg](A396023_1_En_13_Fig3_HTML.jpg)


    Figure 13-3. Maintenance Plan Structure


    To summarize this even further, think of it like this.


    *   The Pre-Backup phase is made up of all the things that need to happen before
    the database is backed up.

    *   The Backup phase is what runs to actually back up the data.

    *   The Post-Backup phase is made up of what needs to happen after the backup
    is complete.


    See how that works? We run tasks before, during, and after. The result is a fresh,
    clean backup of the database, and properly maintained tasks and logs.


    So now we know the order that we need to run the tasks in. Next, we need to decide
    how robust we want this to be. We can decide to do as much or as little as needed
    for our security plan. Remember that, as a `DBA`, you have to follow the guidelines
    set forth for data retention and availability. You may be subject to different
    requirements than I am, so it is best to remember to use this as a guideline to
    creating your own database maintenance plan within the confines of your security
    principles.'
