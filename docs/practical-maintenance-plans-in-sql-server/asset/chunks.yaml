- fmt: '### Configuring the Jobs


    Notice that there are now jobs in the `Jobs` folder inside of `SQL Server Agent`.
    These aren’t very descriptive, are they? Which is which? Let’s fix this right
    now. Double-click `Subplan_1`. You should see what is shown in Figure 2-20.


    ![A396023_1_En_2_Fig20_HTML.jpg](A396023_1_En_2_Fig20_HTML.jpg)


    Figure 2-20. Job Properties, `General` tab


    See that first box up there labeled `Name`? Just change the tail end of it to
    say `Full Backup` instead of `Backup Maintenance Plan.Subplan_1`. Notice that
    it is also set to `Database Maintenance` in the `Category` option. This is great,
    because this is what we are doing. Ensure that the `Enabled` check box is checked—and
    this screen is all set.


    One thing I skipped over is the `Owner` selection. This typically should be set
    to the owner of the database.


    Also notice that on the left of the screen, there are menu options. You are currently
    on the `General` option. If you click the `Steps` option, you will see what is
    shown in Figure 2-21.


    ![A396023_1_En_2_Fig21_HTML.jpg](A396023_1_En_2_Fig21_HTML.jpg)


    Figure 2-21. Job Properties, `Steps` tab


    Notice that the menu bar does not show our new name yet. The `Name` in the `Job
    step` list isn’t updated either. How frustrating. Let’s fix that now.


    Double-click the text `Subplan_1`. The `Job Step Properties` window opens, so
    change the “Step name” box to `Full Backup`, as shown in Figure 2-22.


    ![A396023_1_En_2_Fig22_HTML.jpg](A396023_1_En_2_Fig22_HTML.jpg)


    Figure 2-22. Job Properties, `Steps` tab, `General` option


    Don’t touch anything else on this screen just yet, except for clicking the `Advanced`
    option on the left. Adjust this screen to the settings shown in Figure 2-23.


    ![A396023_1_En_2_Fig23_HTML.jpg](A396023_1_En_2_Fig23_HTML.jpg)


    Figure 2-23. Job Properties, `Steps` tab, `Advanced` option


    Click `OK` when this is done and you will go back to the `Job Properties` screen,
    with the text `Full Backup` now replacing `Subplan_1`. Figure 2-24 is what you
    should see now.


    ![A396023_1_En_2_Fig24_HTML.jpg](A396023_1_En_2_Fig24_HTML.jpg)


    Figure 2-24. Job Properties, `Steps` tab


    Click the `Schedules` option on the left and notice that our schedule is in there,
    and that it is enabled, as shown in Figure 2-25.


    ![A396023_1_En_2_Fig25_HTML.jpg](A396023_1_En_2_Fig25_HTML.jpg)


    Figure 2-25. Job Properties, `Schedules` tab


    Click the `Alerts` option and you will see a blank screen. This is fine, for now.


    Click the `Notifications` option and you will see what is shown in Figure 2-26.


    ![A396023_1_En_2_Fig26_HTML.jpg](A396023_1_En_2_Fig26_HTML.jpg)


    Figure 2-26. Job Properties, `Notifications` tab


    If you have an `Operator` set up already, select that in the `Email` box. For
    the time being, we are going to keep the “Write to the `Windows Application` event
    log” option selected, but we are going to change the drop-down to “When the job
    completes”; that way, we will always know what happened with our job. More on
    this a bit later.


    Clicking the `Targets` option will show a blank screen as well. This is fine,
    since we haven’t defined any targets.


    Click `OK` when you are through with the `Targets` option and have followed the
    directions for this area. You will then see that the `Jobs` folder has changed
    to what you see in Figure 2-27.


    ![A396023_1_En_2_Fig27_HTML.jpg](A396023_1_En_2_Fig27_HTML.jpg)


    Figure 2-27. Updated `SQL Server Agent` Jobs


    Now you can clearly see that this job is specifically the `Full Backup` job. Do
    the same things listed earlier for the other two and label them accordingly. Remember
    that we defined the full backup as the first task, the differential backup as
    the second task, and the transaction log as the third task. Those line up with
    the `Subplan` designations here. You should end up with what you see in Figure
    2-28.


    ![A396023_1_En_2_Fig28_HTML.jpg](A396023_1_En_2_Fig28_HTML.jpg)


    Figure 2-28. Completed `SQL Server Agent` Jobs


    It’s okay that `syspolicy_purge_history` is in there too. That’s a job that `SQL
    Server` does on its own.


    And that, my friend, is how you set up a database backup maintenance plan.


    It’s worth noting that you can also update the `Job` names from the `Maintenance
    Plan` itself by double-clicking and editing the `Subplan` names from the `Design
    Surface`, and then saving the plan. You may find this quicker, once you get experienced
    in setting up the maintenance plans.


    ## Summary


    This was a big chapter, but I wanted to be sure to cover all of the important
    bits needed to really get into the specifics of the tasks.


    To review, you learned about the following:


    *   `Full`, `Bulk Logged`, and `Simple` recovery models

    *   `Full`, `differential`, and `transaction log` backups

    *   Configuration options for the backup tasks


    Recall that I mentioned that database backups were arguably the most important
    part to database administration. I sincerely hope that you have learned exactly
    why this is in this chapter. Data integrity is an important topic, as is data
    protection, loss mitigation, and a host of other database concepts. At the core
    of each of these concepts is one very important piece of the puzzle that absolutely
    must be present: data. Protecting that data is our job as database administrators.
    And, properly maintained backups are integral in providing that puzzle piece.


    # 3. Checking Database Integrity


    Being a database administrator means that you wear many different hats. For those
    unfamiliar with this phrase, it means that you may do different things throughout
    the day that aren’t necessarily related. One thing will never change for a database
    administrator: the data is your life. Without it, you have no job. So for those
    of us working for a living, this is sort of important. Not only are we tasked
    with making sure that data coming in is sanitary, we also have to make sure that
    the data stays sanitary. This can be quite a daunting task, if not for database
    integrity.'
