- fmt: '# Understanding SQL Server Indexes: Creation and Maintenance


    Since we have to give the index a home, pull down the `Filegroup` menu and choose
    `PRIMARY`. This means that we are defining the index to be performed on the `PRIMARY`
    filegroup. It wouldn’t make much sense to define an index and then not define
    what to index. Defining the table wasn’t enough, in other words; we had to actually
    specify the filegroup. Why? Because you can have multiple filegroups for multiple
    databases. You can also choose to select a partition scheme here, but I didn’t
    want to get that far into it, and I’ve honestly never had to deal with this before.
    For 99% of installations out there, you won’t be using this option anyway.


    Once you choose `PRIMARY`, click OK and your index is created. Now write a simple
    query against the table you just wrote the index for. Something easy, like the
    following, should suffice.


    ```sql

    SELECT uid FROM [dbo].[Users];

    ```


    Did you notice anything about the `UID` values returned? They’re sorted in descending
    order, that’s correct. It is important to note that from now on, any query against
    this table is returned with descending `UID` values by default. Even if the index
    is deleted, it still returns the values in descending order until told to do otherwise
    by a new index. Interesting!


    So what happens when you want to return the values sorted in ascending order again?
    I will leave that as an exercise for the student, but it entails deleting the
    current index and setting up another one. Review the previous steps to get going
    on that. You’re going to want this data sorted in ascending order, more than likely.


    That’s a great start to indexes. You can see what it can do for you and your data,
    which is organize it for you and return it much quicker than using a heap. You
    can really see the performance improve when you get into much larger tables and
    joins.


    So, are there different types of indexes? You bet. We’ve only dealt with clustered
    indexes so far. There is another type called nonclustered that you can also use.
    It is just a slightly different way of returning query data quickly. I’m not going
    to get into the definitions for these in this book. If you are still unclear on
    the purpose of indexes at this, read on.


    ## B-Tree Structures


    You can’t really talk about clustered and nonclustered indexes without first bringing
    up the concept of `B-Tree` structures, which are used to return specific row data
    as expeditiously as possible.


    Simply put, a `B-Tree` helps the index put the data together for return. Consider
    Figure 7-7, which shows the relationship between the different nodes of the structure.
    (I’m sure you’ve seen something like this a million times, if you’ve studied indexes
    before.) You can see from the illustration that the pages make up the traditional
    `B-Tree` structure. The top level, 1–200, stores all 200 rows of the table. The
    next level stores a subset of the original value, with each lower level storing
    the further subset until you actually get to the physical row of data.


    ![A396023_1_En_7_Fig7_HTML.jpg](A396023_1_En_7_Fig7_HTML.jpg)


    Figure 7-7. B-Tree structure example


    The `B-Tree` structure can be a great way to physically figure out how your database
    is returning the data it needs. It’s important to note that each page (or little
    box, as shown in Figure 7-7) references the lower pages until you get to the data.
    These pages are what become corrupted over time, so reorganizing and rebuilding
    the indexes is ideal for proper maintenance of your database.


    You can use the `B-Tree` structure for both clustered and nonclustered indexes;
    both indexes work the same way. Yet there is another important thing to remember:
    you can’t have more than one clustered index on a table, but you can have (almost)
    as many nonclustered indexes as you want on a table.


    > **Tip**

    >

    > Keep in mind that although you can, whether or not you should is ultimately
    the issue.


    There will be performance hits with too many indexes on a table, a classic example
    of too much of a good thing. Yes, indexes will definitely boost your query performance,
    as long as they are used sparingly. Don’t index just for the sake of indexing,
    in other words.


    I could have written about ten more pages on the different types and usages of
    indexes, but that’s really sort of outside of the scope of this book. If you are
    still unclear on indexes at this point, you should probably seek some supplemental
    reading on the topic. It is important for a good DBA to be absolutely clear on
    this subject of indexes.


    ## Rebuilding vs. Reorganizing


    For this chapter, we are focusing on rebuilding your indexes. You may have noticed
    that there was another task very similar to rebuilding that is named `Reorganize
    Index`. The major difference between rebuilding and reorganizing is quite simple:
    the `Rebuild Index` task drops and re-creates the indexes when the task is executed,
    while the `Reorganize Index` task simply shuffles the indexes to be better organized.
    They both return unused space to the operating system, they both will compress
    to an optimal size, and they both will leave the index functional during the operation
    (if selected).


    Because they are so similar, `Rebuild Index` and `Reorganize Index` can be treated
    almost alike. More consideration should be given to the `Rebuild` task, though,
    because as I noted earlier, the index is dropped (destroyed) and re-created. This
    is probably optimal because it means that the index does not have a chance to
    become fragmented or have much “drift,” as opposed to an index that has only had
    the `Reorganize` task run against it. The `Reorganize` task is essentially the
    same as when `insert`, `update`, and `delete` statements are executed by the database
    engine. Essentially, the `Reorganize` task is an additional layer on this same
    functionality. While it certainly isn’t meaningless, it carries less weight in
    my book than the `Rebuild` task.'
