    ![A396023_1_En_2_Fig12_HTML.jpg](img/A396023_1_En_2_Fig12_HTML.jpg)


    图 2-12. “定义备份数据库（完整）任务”界面，已完成


    点击 `Next` 继续设置计划。


    ## 差异备份配置


    接下来，将显示“定义备份数据库（差异）任务”界面。与之前一样，从 `Database(s)` 下拉菜单中选择数据库，更新文件夹位置，并勾选 `Create
    a sub-directory for each database` 复选框。您也可以勾选 `Verify database integrity`，但这实际上也会在稍后的任务中完成，所以取决于您。再次点击屏幕底部的
    `Change…` 来为此任务设置计划。


    此区域的默认设置也不正确！哦，好吧，这就是我们在这里的原因。将 `Occurs` 选择更改为 `Daily`。在 `Daily frequency` 区域下，点击
    `Occurs every` 单选按钮并在第一个框中输入 `6`。完成后，您的屏幕应如图 2-13 所示。


    ![A396023_1_En_2_Fig13_HTML.jpg](img/A396023_1_En_2_Fig13_HTML.jpg)


    图 2-13. 新作业计划


    这意味着我们的差异备份现在将每天每 6 小时运行一次。差异备份部分完成的界面应如图 2-14 所示。


    ![A396023_1_En_2_Fig14_HTML.jpg](img/A396023_1_En_2_Fig14_HTML.jpg)


    图 2-14. “定义备份数据库（差异）任务”界面，已完成


    有趣的是，除了 `Schedule` 部分外，此屏幕与完整备份屏幕相同。


    ## 事务日志备份配置


    点击 `OK`，然后点击 `Next` 继续。打开的下一个屏幕是“定义备份数据库（事务日志）任务”屏幕。与前两个屏幕相同的常规设置：从 `Database(s)`
    菜单中选择数据库，选择备份文件夹（应该是您的 `E:\SQL Server\Logs` 文件夹），并勾选 `Create a sub-directory for
    each database` 复选框。完成后，点击界面底部的 `Change…` 按钮来定义此计划。将 `Occurs` 值更改为 `Daily`，并确保
    `Occurs every` 值设置为 `1 hour(s)`。此区域就这些了。您的屏幕现在应类似于图 2-15。


    ![A396023_1_En_2_Fig15_HTML.jpg](img/A396023_1_En_2_Fig15_HTML.jpg)


    图 2-15. 新作业计划


    计划完成后点击 `OK`。然后您应该看到图 2-16 所示的内容。


    ![A396023_1_En_2_Fig16_HTML.jpg](img/A396023_1_En_2_Fig16_HTML.jpg)


    图 2-16. “定义备份数据库（事务日志）任务”界面，已完成


    准备好后，点击 `Next`。


    ## 选择报告选项


    打开的屏幕标题为“选择报告选项”。您现在应该看到图 2-17 所示的内容。


    ![A396023_1_En_2_Fig17_HTML.jpg](img/A396023_1_En_2_Fig17_HTML.jpg)


    图 2-17. 选择报告选项


    现在，这是相当不言自明的。如果您想将报告写入文本文件并放入文件系统，请点击该框。请注意，我选择了 `Backups` 目录，而不是 `Logs` 目录。这是因为我想将
    `Logs` 目录保留用于我的事务日志。`Backups` 目录可用于存储维护文本文件，而 `Backups` 内的各个文件夹则存储实际的 `.bak` 文件，以防您需要恢复数据库。


    您也可以选择通过电子邮件接收报告，但您必须定义一个 `Operator`（稍后会详细介绍）。如果您定义了 `Operator`，请在此处选择它以接收电子邮件。这样做的目的是让您通过电子邮件知道维护计划何时运行以及结果如何。目前，我们将只保留报告选项选中。点击
    `Next` 继续。


    ## 完成向导


    在下一个屏幕“完成向导”上，您会看到我们所做工作的摘要。展开界面中的选项将显示所做工作的完整细节，如图 2-18 所示。


    ![A396023_1_En_2_Fig18_HTML.jpg](img/A396023_1_En_2_Fig18_HTML.jpg)


    图 2-18. 完成向导


    请注意，这些选项尚未保存。您可以在此处点击 `Cancel` 并销毁我们迄今为止所做的所有工作，但我们不要那样做。相反，检查我们所做的操作，当您准备好时，点击
    `Finish`。希望您看到图 2-19 所示的内容。


    ![A396023_1_En_2_Fig19_HTML.jpg](img/A396023_1_En_2_Fig19_HTML.jpg)


    图 2-19. 维护计划向导进度


    这总是一个好迹象！准备好后点击 `Close`。请注意，`Backup Maintenance Plan` 现在出现在 SSMS 的 `Maintenance
    Plans` 区域中。它现在已启用，并将按照我们定义的计划运行。

