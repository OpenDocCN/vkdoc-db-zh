  trans: '

    # 理解 SQL Server 索引：创建与维护


    由于我们必须为索引指定一个存放位置，请下拉`文件组`菜单并选择`PRIMARY`。这意味着我们将索引定义为在`PRIMARY`文件组上执行。定义索引而不指定要索引的内容是没有意义的。换句话说，仅仅定义表是不够的；我们必须实际指定文件组。为什么？因为你可以为多个数据库设置多个文件组。你也可以在此处选择分区方案，但我不想深入探讨这一点，而且老实说，我以前从未需要处理过这个选项。对于
    99%的安装来说，反正你也不会使用这个选项。


    一旦你选择了`PRIMARY`，点击确定，你的索引就创建好了。现在，针对你刚刚创建索引的表编写一个简单的查询。类似下面这样的简单语句应该就足够了。


    ```sql

    SELECT uid FROM [dbo].[Users];

    ```


    你注意到返回的`UID`值有什么特点了吗？它们按降序排列，没错。重要的是要注意，从现在开始，默认情况下针对此表的任何查询都将以`UID`值的降序返回结果。即使删除了该索引，在收到新索引的另行指示之前，它仍会以降序返回值。有趣吧！


    那么，当你想再次返回升序排列的值时会发生什么？我将此留给读者作为练习，但这需要删除当前索引并建立另一个索引。回顾前面的步骤来着手完成此任务。你很可能希望这些数据按升序排列。


    这是索引一个很好的起点。你可以看到它能为你和你的数据做什么，即为你组织数据，并且比使用堆更快地返回数据。当处理更大的表和连接时，你真的可以看到性能的提升。


    那么，索引有不同的类型吗？当然有。到目前为止，我们只处理了聚集索引。还有一种称为非聚集索引的类型你也可以使用。它只是返回查询数据的一种略微不同的快速方式。我不会在本书中深入探讨这些索引的定义。如果你对此仍不清楚索引的目的，请继续阅读。


    ## B-树结构


    如果不首先引入`B-Tree`（B-树）结构的概念，就无法真正讨论聚集和非聚集索引，该结构用于尽可能迅速地返回特定的行数据。


    简而言之，`B-Tree`帮助索引将数据组织起来以供返回。参考图 7-7，它展示了该结构不同节点之间的关系。（如果你以前研究过索引，我肯定你见过很多次类似的东西。）从图中可以看出，页面构成了传统的`B-Tree`结构。顶级，1-200，存储了表的所有
    200 行。下一级存储了原始值的一个子集，每一更低的层级存储进一步的子集，直到你实际到达物理数据行。


    ![A396023_1_En_7_Fig7_HTML.jpg](img/A396023_1_En_7_Fig7_HTML.jpg)


    图 7-7. B-树结构示例


    `B-Tree`结构是物理上理解数据库如何返回所需数据的绝佳方式。重要的是要注意，每个页面（或如图 7-7 所示的小方框）都引用更低级的页面，直到你到达数据。这些页面会随着时间的推移而损坏，因此重组和重建索引是数据库正确维护的理想做法。


    你可以将`B-Tree`结构用于聚集索引和非聚集索引；两种索引的工作方式相同。然而，还有另外一件重要的事情要记住：一个表上不能有超过一个聚集索引，但一个表上可以有（几乎）任意多的非聚集索引。


    > **提示**

    >

    > 请记住，虽然你可以创建多个索引，但**是否应该**创建才是最终的问题。


    表上索引过多会导致性能下降，这是“好事过头反成坏事”的典型例子。是的，只要适度使用，索引肯定能提升你的查询性能。换句话说，不要仅仅为了索引而索引。


    我本可以再写十页左右关于索引的不同类型和用法，但这确实有点超出了本书的范围。如果你此时对索引仍不清楚，你可能应该寻找一些关于该主题的补充阅读材料。对于一名优秀的
    DBA 来说，透彻理解索引这个主题至关重要。


    ## 重建与重组


    本章中，我们重点讨论重建索引。你可能已经注意到，有一个与重建非常相似的任务叫做`重组索引`。重建和重组之间的主要区别非常简单：`重建索引`任务在执行时会删除并重新创建索引，而`重组索引`任务只是重新整理索引以使其组织得更好。它们都会将未使用的空间返回给操作系统，它们都会压缩到最优大小，并且如果选择了相应选项，它们都会在操作期间保持索引可用。


    由于它们非常相似，`重建索引`和`重组索引`几乎可以同等对待。不过，应该更多地考虑`重建`任务，因为正如我前面提到的，索引会被删除（销毁）并重新创建。这可能是最优的，因为这意味着索引没有机会变得碎片化或产生太多“漂移”，而仅运行了`重组`任务的索引则可能存在这种情况。`重组`任务本质上与数据库引擎执行`insert`、`update`和`delete`语句时的操作相同。从本质上讲，`重组`任务是此相同功能上的一个额外层。虽然它并非没有意义，但在我看来，它的权重低于`重建`任务。

    '
- fmt: '## Setting Up the Maintenance Plan


    Here we go again! Right-click `Maintenance Plans` under the `Management` folder
    in `SSMS` and choose `Maintenance Plan Wizard`. You then see what is shown in
    Figure 7-8.


    ![A396023_1_En_7_Fig8_HTML.jpg](A396023_1_En_7_Fig8_HTML.jpg)

    Figure 7-8.


    Select `Plan Properties`.


    Change the default values to what is shown in Figure 7-8. Click the `Change…`
    button to set the schedule, as shown in Figure 7-9.


    ![A396023_1_En_7_Fig9_HTML.jpg](A396023_1_En_7_Fig9_HTML.jpg)

    Figure 7-9.


    New Job Schedule.


    You only want it to run once a day, so change the `Occurs` drop-down menu to `Daily`
    and click `OK`. Your schedule is now set to run at `12:00AM` every day. Click
    `Next` to continue.


    You now see the screen shown in Figure 7-10, where you can choose the task you
    want to perform.


    ![A396023_1_En_7_Fig10_HTML.jpg](A396023_1_En_7_Fig10_HTML.jpg)

    Figure 7-10.


    Select Maintenance Tasks.


    Choose the `Rebuild Index` check box and note the definition given: “The Rebuild
    task reorganizes data on the data and index pages by rebuilding indexes. This
    improves performance of index scans and seeks. This task also optimizes the distribution
    of data and free space on the index pages, allowing faster future growth.”


    See how that relates to what we went over earlier in this chapter? Those indexes
    eventually drift; this task gets them back in line by rebuilding them from scratch.
    Does it take time? Yes. And it takes resources as well, so this is going to be
    an important one to keep an eye on. Luckily, we can do that.


    Click `Next` when you’re ready to move on. You will now see the screen shown in
    Figure 7-11.


    ![A396023_1_En_7_Fig11_HTML.jpg](A396023_1_En_7_Fig11_HTML.jpg)

    Figure 7-11.


    Select Maintenance Task Order.


    Since we just have the one task in here, don’t worry about it; click `Next`.


    You are then shown the default screen to define the task. It should look like
    Figure 7-12.


    ![A396023_1_En_7_Fig12_HTML.jpg](A396023_1_En_7_Fig12_HTML.jpg)

    Figure 7-12.


    Define Rebuild Index Task.


    This should look familiar by now. You want to choose your database from the drop-down
    menu first. You are then shown the option for `Object`, which has the values `Tables`,
    `Views`, and `Tables and Views`. Choose the object that you want to set the task
    on, or leave the default of `Tables and Views` selected. This is absolutely everything
    that can be indexed: tables and views.


    *   If you choose `Tables`, you have to manually define the tables you want to
    rebuild indexes on.

    *   If you choose `Views`, you have to manually define the views you want to rebuild
    indexes on.

    *   If you choose `Tables and Views`, all indexes are automatically rebuilt.


    In the “Free space options” area, keep the “Default free space per page”. This
    is optimal for the database.


    Under `Advanced options`, there are two selections: “Sort results in tempdb” and
    “Keep index online while reindexing”. What on earth…?


    “Sort results in tempdb” gives you the option of keeping the indexes as they are
    built in `tempdb`, and then outputting the completed and rebuilt index to the
    specified filegroup. This doesn’t really give you anything beyond sorting and
    storing them directly in the filegroup. Selecting this option stores the sort
    results in `tempdb` and then the filegroup. Leaving it unselected runs the sort
    only against the filegroup. That’s about it.


    The “Keep index online while reindexing” option is somewhat apparent. Do you want
    to keep it online while you’re rebuilding it? Chances are you want to enable this;
    otherwise, the index is not available when it is being rebuilt. Select the `Rebuild
    indexes offline` radio button also, in case there are indexes that cannot be rebuilt
    while online.


    Your screen should look like Figure 7-13 when you are finished.


    ![A396023_1_En_7_Fig13_HTML.jpg](A396023_1_En_7_Fig13_HTML.jpg)

    Figure 7-13.


    Define Rebuild Index Task (completed).


    Click `Next` here. Now we get to define our reporting options. Go ahead and set
    your text file report location and the operator that we already set up. Your screen
    should now look like Figure 7-14.


    ![A396023_1_En_7_Fig14_HTML.jpg](A396023_1_En_7_Fig14_HTML.jpg)

    Figure 7-14.


    Select Report Options.


    Why did I choose `E:\SQL Server\Backups` as the folder location? Remember back
    in Chapter 5 when we defined the maintenance cleanup task for text files? We had
    this folder location set as the location that we wanted to clean up because we
    were already writing to this area. So if we keep writing to this area, the maintenance
    cleanup task will clean up any mess we leave, which is ideal.


    Click `Next` when you’re ready. You will see the summary screen, as shown in Figure
    7-15.


    ![A396023_1_En_7_Fig15_HTML.jpg](A396023_1_En_7_Fig15_HTML.jpg)

    Figure 7-15.


    Select Report Options.


    Fingers crossed. Hit `Finish`. Figure 7-16 should appear, complete with all those
    wonderful little green check boxes.


    ![A396023_1_En_7_Fig16_HTML.jpg](A396023_1_En_7_Fig16_HTML.jpg)

    Figure 7-16.


    Maintenance Plan Wizard Progress.


    Beautiful.


    Before we go on, make sure that you update the job as described before. I named
    mine `Rebuild Index`. Your `Jobs` folder should now look like Figure 7-17.


    ![A396023_1_En_7_Fig17_HTML.jpg](A396023_1_En_7_Fig17_HTML.jpg)

    Figure 7-17.


    SQL Server Agent Jobs.


    Your `Maintenance Plans` should now look like Figure 7-18.


    ![A396023_1_En_7_Fig18_HTML.jpg](A396023_1_En_7_Fig18_HTML.jpg)

    Figure 7-18.


    Maintenance Plans.


    ## Summary


    Let’s quickly review this chapter.


    We learned how to set up an index on a table and demonstrated the successful indexing
    by showing how data is returned in descending order based on the index values.


    We briefly learned about indexes and B-Tree structures, and we now understand
    the importance of indexes as it relates to data retrieval.


    Here is something else to remember, as an aside: if you have a high-volume database,
    then you should probably rebuild at least once a week. I know we set this as once
    a day in the task, and that’s fine too, as long as it fits your needs. I mentioned
    in an earlier chapter that “high volume” is a relative term, and I appreciate
    that it may not mean the same to all users. To alleviate that, I’m going to just
    say that once a week is enough for probably 99% of the readers of this book. Of
    course, you are free to do it as often as you like, but if you truly have a high-volume
    database, you will experience performance degradation if you rebuild too often.


    That’s a pretty solid start for indexing. If you still are unclear, I highly recommend
    Mike McQuillan’s book *Introducing SQL Server* (Apress, 2015) as supplemental
    reading material on this topic.


    ## 8. Reorganizing Indexes


    Building on what we just did in Chapter 7, we are now going to reorganize our
    indexes. Is this necessary, since they would have just been rebuilt? Let’s take
    a look find out.'
