    ## 确定维护计划的复杂度


    正如我刚才所说，这件事可简可繁，完全取决于你的意愿。我倾向于尽可能保持简单，因此在这里，我也不会偏离这个逻辑太远。


    数据库成熟度主要有四个阶段，如图 13-4 所示。


    ![A396023_1_En_13_Fig4_HTML.jpg](img/A396023_1_En_13_Fig4_HTML.jpg)


    图 13-4. 数据库成熟度阶段


    **提示**


    数据库成熟度指的是一个新数据库从创建开始，直到被投入生产环境以处理交易、满足业务需求的发展过程。


    无论你是创建一个仅用于存储用户和会话信息的数据库，还是一个每秒记录数十亿笔交易的数据库，你总是从一个全新的、干净的数据库开始。因此，这个数据库必须经历成熟过程，才能准备好按其预期用途被使用。它成熟的唯一途径是经历一系列流程，以确保其将满足应用程序乃至最终用户的需求。这些流程的一部分将包括需要对数据库执行哪些维护工作以及以何种频率执行。


    这里有趣的部分是，理想情况下，数据库规划只应在阶段 1 进行。显然，这并不总是现实的，因为应用程序或数据库的需求可能会发生变化。在这种情况下，阶段 1 将重新开始。明白这是怎么运作的吗？任何时候进行新的开发，都必须从阶段
    1 走到阶段 4，不能跳过任何步骤。这是确保系统绝对完整性和凝聚力的唯一方法。换句话说，当开发新功能时，它需要先在阶段 1 进行规划（如图 13-4 所示），然后通过工作流程推进，直至上线。


    这对于你的需求来说可能有点过于复杂了。这是我在工作中处理事情的方式，所以我也习惯了这样做。你可能会找到另一种更适合你需求的处理方式，这完全可以。不过目前，我们将使用这种方法进行工作。


    这并不意味着我们要创建四个不同的数据库或类似的东西。相反，我们将创建一个维护计划，然后我会向你展示如何将该维护计划背后的逻辑（即你从本书中学到的东西）移植到其他数据库中。


    ## 规划维护计划


    规划计划？听起来像个计划。只要有可能，一定要提前规划。说真的。是的，这一段有很多头韵，但这个概念大多时候能为你省去不少麻烦。务必谨慎行事，尤其是在处理数据库时。这里有一条处理数据库的**首要准则**：如有疑问，先做备份。只需要发生一次你不小心搞砸了某件事却没有备份的情况。这很可能就足以让你成为尽可能频繁备份的坚定信徒。


    **提示**


    如有疑问，务必先做备份！


    那么，你如何规划一个计划呢？你需要确定需要哪些步骤，然后规划如何实施它们。让我们看两个不同的场景，并从中确定实施维护计划的最佳方式。


    在第一个场景中，假设你有一个小型数据库，一次处理的数据量不大。这可能适用于像家庭数据库这样的情况，用于记录孩子的家务或 CD 收藏。


    在第二个场景中，假设你是一家中型或大型公司的 DBA，负责运行他们每小时处理相当大量交易的数据库。


    ### 场景 1


    第一个场景将针对一个不处理大量数据的小型数据库。由于这不是一个很大的数据库，而且可能并非任务关键型（意味着它可以快速轻松地恢复，并且在其缺失时不会影响任务的任何部分），那么我们可以将一些任务交给数据库引擎来运行。当遇到那三个神奇的
    DML 语句时，`SQL Server` 会自动运行哪些任务？`重新生成索引`、`重新组织索引`和`更新统计信息`。在这个场景中，我们可以省略这些任务，因为我们实际上只是在重复
    `SQL Server` 已经做过的事情。因此，场景 1 的维护计划可能如图 13-5 所示。


    ![A396023_1_En_13_Fig5_HTML.jpg](img/A396023_1_En_13_Fig5_HTML.jpg)


    图 13-5. 场景 1 结构


    这样是不是更精简了？记住，我们不一定需要运行所有可用的任务。我们可以不去管 `SQL Server` 本来就会执行的一些内部处理，只关注数据的完整性。我会称此为“仅含绝对必要任务的、最低限度”的维护计划。我认为这个场景可能并不适合很多企业，如果适合，很可能是因为
    DBA 要么不理解维护计划，要么不愿意花时间学习。幸好你不是那样的 DBA；仅仅通过阅读本书，你就在采取积极的步骤来提升自己的知识。在实践时，你从本书中学到的工具无疑将帮助你实现更好的数据可用性和完整性。


    正如我之前所说，这可能是家庭数据库或非关键重要数据库的最佳场景。如果你的业务运营依赖于数据，那么我认为这不会是你想要选择的场景。


    相反，你会想要一个更强大的方案；一个能够执行 `SQL Server` 自动执行的任务，但作为维护计划的一部分执行时，能够执行得更彻底，而不仅仅是顺带一做的方案。还记得
    `SQL Server` 如何在大多数查询后执行索引重组和更新数据库统计信息吗？这在这里很重要，因为我们是在手动告诉 `SQL Server`，在维护计划成功运行后，确保这些操作已准备好迎接下一批数据交互。

    '
- fmt: '### Scenario 2


    This one is a bit more complex, but it’s closer to what I am used to. For this
    scenario, you are going to want to remember that we are not going to go for the
    quick and dirty path like in Scenario 1. This process is actually much closer
    to the complete maintenance plan that we will build shortly; it looks like Figure
    13-6.


    ![A396023_1_En_13_Fig6_HTML.jpg](A396023_1_En_13_Fig6_HTML.jpg)


    Figure 13-6. Scenario 2 Structure


    Look familiar? It should. It’s the same graphic as earlier. This clearly implies
    that we need to do all of these steps. Remember that, although we have which tasks
    defined that we want to run, we need to know when to run them.


    Notice that, in both instances, I have left the complete backup schedule intact.
    This is because, even though you may have a smaller database, the data within
    the database is no less important to your business or your end users. Without
    that data, you would have no job. So the concept of database backups will remain
    in place, regardless of the size of the database.


    The rule that I’ve always heard is that maintenance needs to be done when your
    customers are off the database. If you have a database that is in use 24/7, then
    you just have to determine when your database is used least, or set the schedule
    to fire when the CPU is idle. Remember that `SQL Server` gives you lots of options
    for scheduling, and there is going to be a solution to just about any scheduling
    issue you can think of. For this plan, we are going to fire this at midnight every
    night. We are going to have different tasks run at different intervals also, all
    of which I will demonstrate shortly.


    Another important part to scheduling the maintenance plan is that you can always
    set precedence constraints on the tasks, which we will get into later. Those are
    lifesavers! What those do is say that, when you have a chain of tasks in a task,
    you want to do them in a certain order. You can also set what happens if the task
    fails, succeeds, or completes. You can imagine that we are going to be setting
    reporting and logging at these steps, so that we are aware of any issues that
    may potentially affect our end users.


    Let’s take a look at something interesting really quick. Double-click any of the
    jobs in `SQL Server Agent`. I chose `bak Files`, but you can choose whichever
    one you want. You should see Figure 13-7 now.


    ![A396023_1_En_13_Fig7_HTML.jpg](A396023_1_En_13_Fig7_HTML.jpg)


    Figure 13-7. Job Properties


    Same as before, what’s the big deal? Click the **Steps** option on the left and
    expand the columns in the job step list field, as shown in Figure 13-8. Notice
    anything special here?


    ![A396023_1_En_13_Fig8_HTML.jpg](A396023_1_En_13_Fig8_HTML.jpg)


    Figure 13-8. Job Properties, Steps tab


    That’s right; this is a `SQL Server Integration Services` package. I briefly mentioned
    this in the beginning chapter. That’s how it was saved in the database and we
    didn’t even know it. This opens up a whole new level of interaction with the database,
    because now that we have an `SSIS` package, we can put them all together to make
    one giant package.


    Before we go on, I want to add the following caveat: you should have thorough
    and complete jobs at this point. What do I mean by complete? Double-check that
    all descriptions and names are filled in on all objects within the jobs, specifically:


    *   **General** tab: **Description** box.

    *   **Steps** tab, **General** tab: **Name** box (click **Edit** and change the
    “Step name” value).

    *   **Steps** tab, **Advanced** tab: “Include step output in history” should be
    selected.

    *   **Schedules** tab: We’re going to remove these in a few minutes, so they can
    stay for now.

    *   **Alerts** tab: Should be blank.

    *   **Notifications** tab: **Write to the Windows Application event log** should
    be selected with “When the job completes” selected.

    *   **Targets** tab: Should be left blank.


    Notifications should not be selected for individual tasks; instead, we are going
    to have the subplans take care of reporting and logging. E-mailing is a part of
    this function, which you will see shortly.


    Guess what we’re gonna do next?


    ## Creating the Maintenance Plan


    Finally! This is what we’ve been working towards for this entire book. We are
    going to create one package that will be the implementation of the maintenance
    plan that we will use to maintain the database from now on.


    Show of hands for who thinks we are going to use `Maintenance Plan Wizard` to
    create this maintenance plan…? Guess what? We can’t use the `Maintenance Plan
    Wizard` for this task, because the wizard is specifically for creating new tasks,
    not for combining them into a single package. We can make as many individual jobs
    as we want, but unless we put them all in one package together and run them on
    separate schedules, they will never work together. Also, leaving them to run individually,
    and not as part of an integrated solution, does not allow us to enforce the precedence
    constraints we looked at before; instead, we will simply run a task on a schedule,
    not knowing or caring if it actually worked or not.


    Instead of that approach, we are going to work on the definition of robust maintenance
    plans; a one-stop-shop for all of our maintenance needs in one area. This is going
    to require a bit more tweaking of the individual plans, which we will look at
    now.


    ### Editing the Jobs


    The first thing that we need to do, in light of the knowledge that these are `SSIS`
    packages, is plan for the deployment of the packages. What does that mean? It
    means that each package is going to be run as a portion of a larger package, with
    precedence constraints and reporting/logging built in, and we need to make sure
    all of that is 100% set before unleashing it onto our development environment.
    We will do a lot of testing before we ever unleash anything to the production
    environment, right? Let’s look at the individual jobs now, and tweak them to our
    needs.


    Recall that our jobs list looks like what’s shown in Figure 13-9.


    ![A396023_1_En_13_Fig9_HTML.jpg](A396023_1_En_13_Fig9_HTML.jpg)


    Figure 13-9. `SQL Server Agent` Jobs


    Again, quite a few jobs! Each one of those jobs is going to be a part of the package
    later. For now, we are going to edit these, though; so start from the top and
    make the recommended changes.


    ### Finalizing the Jobs


    Double-click a job to show the **General** page. Then go through each of the steps
    described in the following sections, making sure that the changes are made as
    explained.


    #### General Page Settings


    The **General** page holds all of the “high level” settings of the job. What I
    mean by this is that the further abstractions of properties are further divided
    in subsequent pages, but the generic settings for the entire job are all here.


    *   **Owner** field should be set to the owner of the database.

    *   **Category** should be set to `Database Maintenance`.

    *   Enter a short description.

    *   Make sure that the **Enabled** check box is selected.


    #### Steps Page Settings


    Click the **Edit** button at the bottom of the screen and change the **Step name**
    on the **General** page to the task name (Cleanup History, Text Files, T-SQL Task—the
    job name, not the plan name). Notice that this screen is something new and different,
    since it pertains strictly to the settings used to run the `SSIS` package. There
    isn’t a need to change anything in here yet, so leave this area alone.


    Click **Advanced** on the left. This is where we defined the on success and on
    failure actions of the package. The individual package doesn’t need an output
    file, since we will be doing that at the maintenance plan package level and not
    this level. Ensure that the “Include step output in history” check box is selected.


    Click **OK** when you are ready to move on.'
