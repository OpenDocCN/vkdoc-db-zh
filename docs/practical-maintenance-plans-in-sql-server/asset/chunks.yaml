  trans: '### 添加完整性检查任务


    如图 13-39 所示，单击 `备份数据库（差异）` 子计划。这将在设计图面上显示 `备份数据库（差异）` 任务，如图 13-39 所示。


    ![A396023_1_En_13_Fig39_HTML.jpg](img/A396023_1_En_13_Fig39_HTML.jpg)


    图 13-39. 备份维护计划设计图面


    现在，从工具栏单击并拖动 `执行 SQL Server 代理作业` 到设计图面上。此时，您应该看到图 13-40。


    ![A396023_1_En_13_Fig40_HTML.jpg](img/A396023_1_En_13_Fig40_HTML.jpg)


    图 13-40. 执行 SQL Server 代理作业任务


    双击设计图面上的任务，勾选 `数据库完整性计划.检查完整性` 旁边的复选框，然后单击 `确定`。通过长按任务来更新名称。如果您长按顶部的任务名称，可以将其更改为
    `检查完整性`，如图 13-41 所示。


    ![A396023_1_En_13_Fig41_HTML.jpg](img/A396023_1_En_13_Fig41_HTML.jpg)


    图 13-41. 设计图面上的执行 SQL Server 代理作业任务


    此时，您需要稍微重新整理一下您的设计图面。看到备份任务远在左上角了吗？只需将其拖到更靠中间的位置，然后将 `检查完整性` 任务拖到它的上方。最终您看到的布局应与图
    13-42 类似。


    ![A396023_1_En_13_Fig42_HTML.jpg](img/A396023_1_En_13_Fig42_HTML.jpg)


    图 13-42. 设计图面上的执行 SQL Server 代理作业任务（已更新）


    ### 添加重新组织索引任务


    和之前一样，从工具栏单击并拖动 `执行 SQL Server 代理作业` 到设计图面上，但这次将其放置在 `检查完整性` 任务和备份任务之间。最终您看到的布局应与图
    13-43 类似。


    ![A396023_1_En_13_Fig43_HTML.jpg](img/A396023_1_En_13_Fig43_HTML.jpg)


    图 13-43. 设计图面上的执行 SQL Server 代理作业任务


