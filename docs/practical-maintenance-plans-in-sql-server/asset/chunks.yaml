- fmt: '## Setting Up the Maintenance Plan


    Remember that we need three separate tasks for this: one for the `.bak` files,
    one for the `.trn` files, and one for the `.txt` files. Why? Because `SQL Server`
    makes you choose a file extension to look for and delete if it is beyond a certain
    age, and database backups (`.bak`) and transaction log backups (`.trn`) are both
    physically and logically different.


    We are going to name these plans `Backups Cleanup`, `Logs Cleanup`, and `Text
    Files Cleanup`. This should keep it nice and clean for us to easily see what goes
    where.


    We are going to set up `Backups Cleanup` first, followed by `Logs Cleanup`, and
    finally `Text Files Cleanup`. Remember that if something goes wrong with your
    maintenance tasks, the `.txt` files referenced in the `Text Files Cleanup` task
    are a great place to start troubleshooting.


    ## Backups Cleanup


    The purpose of cleaning up backups is fairly simple: you don’t want to have multiple
    copies of a large database in a file system, keeping space from other applications
    or operating system functions that may need the space. For this reason, it is
    far easier to configure a default retention period and clean the backups automatically
    based on that retention period. The `Backups Cleanup` task allows us to create
    an automatic method to clean up these backups files.


    Right-click the `Maintenance Plans` folder under `Management` and choose `Maintenance
    Plan Wizard` to get started. Enter `Backups Cleanup` as the `Name`, and something
    short and sweet in the `Description` box, and then click the `Change…` button
    to set the schedule. Change the `Occurs` drop-down to `Daily` but leave the rest
    alone, and then click `OK`. Your interface should resemble Figure 6-2.


    ![A396023_1_En_6_Fig2_HTML.jpg](A396023_1_En_6_Fig2_HTML.jpg)

    Figure 6-2. Select Plan Properties


    Good start. So, just like before, we’ve given it a good `Name` and `Description`,
    left `Run As` set to the default, and set the schedule to fire at midnight every
    night. Click `Next` and let’s set up the next part, as shown in Figure 6-3.


    ![A396023_1_En_6_Fig3_HTML.jpg](A396023_1_En_6_Fig3_HTML.jpg)

    Figure 6-3. Select Maintenance Tasks


    Obviously, you’re going to choose `Maintenance Cleanup Task` here and then click
    `Next`. You will then see the interface shown in Figure 6-4.


    ![A396023_1_En_6_Fig4_HTML.jpg](A396023_1_En_6_Fig4_HTML.jpg)

    Figure 6-4. Select Maintenance Task Order


    You can stop and generate the interface error, as we did in Chapter 4, but you
    need to start over if you do. Click `Next` when you’re ready.


    The next screen is the meat and potatoes of this task. If you’re vegetarian, it’s
    the tofu and kale. Either way, the initial interface appears as shown in Figure
    6-5.


    ![A396023_1_En_6_Fig5_HTML.jpg](A396023_1_En_6_Fig5_HTML.jpg)

    Figure 6-5. Define Maintenance Cleanup Task


    The first thing you notice is that there is a radio option at the top of the screen
    that gives you two options: “Backup files” and “Maintenance Plan text reports”.
    Does this imply that you can’t do both at the same time in the same task? In a
    word, yes. If you want to do both, you need to set two maintenance plans or jobs
    for each type of file that you want deleted. The reason for this is because in
    one area, you are deleting the actual backups of the database, and in the other,
    you are deleting the text reports for the maintenance plan operations. They’re
    different cleanup tasks, in other words, and behave differently. I would like
    to see Microsoft split these up into two separate tasks in future versions of
    `SQL Server`, but I won’t hold my breath.


    For now, let’s concentrate on the “Backup files” option. The “Maintenance Plan
    text reports” options are next.


    ### Deleting Backup Files


    You have the option to delete the actual database backup files. Note that if you
    have the backup schedule in place as described in Chapter 1, then you are running
    a full backup, followed by a differential backup, and then by transaction log
    backups. With this in mind, if you were to implement this solution, you would
    only retain backups for a certain period of time. But the kicker is this: there
    is no difference, from a file system point of view, between full and differential
    backups. Read that part again. There is no difference, because they both have
    the `.bak` file extension by default. So, if you delete the full backup, but not
    the differential, you will not be able to restore the differential, because it
    depends on the full backup to restore. Without it, it cannot restore the data
    to the database and it is, in essence, completely useless.


    ```

    Tip

    Obviously, any time you delete data, it should be done very carefully. Please
    take the time to go through this thoroughly to alleviate any future headaches
    from accidentally deleting a backup that you may need.

    ```


    Okay, so referring to Figure 6-5, make sure that “Backup files” is selected. The
    area under that, “File location”, determines if you want to delete a specific
    file or all the files in a folder with a certain extension. Although this sounds
    cut and dried, let’s look at the two options presented.


    ### Deleting a Specific File


    Let’s say that you have set up your logging to “Save all to the same file”. I
    can’t imagine why you would want to do this, but let’s say that you have a valid
    reason. This option finds and deletes a specified file in a specific location.
    Does that make sense? It will not traverse directories to find the file; it will
    only delete the file specified.'
  raw: '## Setting Up the Maintenance Plan


    Remember that we need three separate tasks for this: one for the .bak files, one
    for the .trn files, and one for the .txt files. Why? Because SQL Server makes
    you choose a file extension to look for and delete if it is beyond a certain age,
    and database backups (.bak) and transaction log backups (.trn) are both physically
    and logically different.


    We are going to name these plans Backups Cleanup, Logs Cleanup, and Text Files
    Cleanup. This should keep it nice and clean for us to easily see what goes where.


    We are going to set up Backups Cleanup first, followed by Logs Cleanup, and finally
    Text Files Cleanup. Remember that if something goes wrong with your maintenance
    tasks, the .txt files referenced in the Text Files Cleanup task are a great place
    to start troubleshooting.


    ## Backups Cleanup


    The purpose of cleaning up backups is fairly simple: you don’t want to have multiple
    copies of a large database in a file system, keeping space from other applications
    or operating system functions that may need the space. For this reason, it is
    far easier to configure a default retention period and clean the backups automatically
    based on that retention period. The Backups Cleanup task allows us to create an
    automatic method to clean up these backups files.


    Right-click the Maintenance Plans folder under Management and choose Maintenance
    Plan Wizard to get started. Enter Backups Cleanup as the Name, and something short
    and sweet in the Description box, and then click the Change… button to set the
    schedule. Change the Occurs drop-down to Daily but leave the rest alone, and then
    click OK. Your interface should resemble Figure [6-2](#A396023_1_En_6_Chapter.html#Fig2).


    ![A396023_1_En_6_Fig2_HTML.jpg](A396023_1_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    Select Plan Properties


    Good start. So, just like before, we’ve given it a good Name and Description,
    left Run As set to the default, and set the schedule to fire at midnight every
    night. Click Next and let’s set up the next part, as shown in Figure [6-3](#A396023_1_En_6_Chapter.html#Fig3).


    ![A396023_1_En_6_Fig3_HTML.jpg](A396023_1_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    Select Maintenance Tasks


    Obviously, you’re going to choose Maintenance Cleanup Task here and then click
    Next. You will then see the interface shown in Figure [6-4](#A396023_1_En_6_Chapter.html#Fig4).


    ![A396023_1_En_6_Fig4_HTML.jpg](A396023_1_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    Select Maintenance Task Order


    You can stop and generate the interface error, as we did in Chapter [4](#A396023_1_En_4_Chapter.html),
    but you need to start over if you do. Click Next when you’re ready.


    The next screen is the meat and potatoes of this task. If you’re vegetarian, it’s
    the tofu and kale. Either way, the initial interface appears as shown in Figure
    [6-5](#A396023_1_En_6_Chapter.html#Fig5).


    ![A396023_1_En_6_Fig5_HTML.jpg](A396023_1_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    Define Maintenance Cleanup Task


    The first thing you notice is that there is a radio option at the top of the screen
    that gives you two options: “Backup files” and “Maintenance Plan text reports”.
    Does this imply that you can’t do both at the same time in the same task? In a
    word, yes. If you want to do both, you need to set two maintenance plans or jobs
    for each type of file that you want deleted. The reason for this is because in
    one area, you are deleting the actual backups of the database, and in the other,
    you are deleting the text reports for the maintenance plan operations. They’re
    different cleanup tasks, in other words, and behave differently. I would like
    to see Microsoft split these up into two separate tasks in future versions of
    SQL Server, but I won’t hold my breath.


    For now, let’s concentrate on the “Backup files” option. The “Maintenance Plan
    text reports” options are next.


    ### Deleting Backup Files


    You have the option to delete the actual database backup files. Note that if you
    have the backup schedule in place as described in Chapter [1](#A396023_1_En_1_Chapter.html),
    then you are running a full backup, followed by a differential backup, and then
    by transaction log backups. With this in mind, if you were to implement this solution,
    you would only retain backups for a certain period of time. But the kicker is
    this: there is no difference, from a file system point of view, between full and
    differential backups. Read that part again. There is no difference, because they
    both have the .bak file extension by default. So, if you delete the full backup,
    but not the differential, you will not be able to restore the differential, because
    it depends on the full backup to restore. Without it, it cannot restore the data
    to the database and it is, in essence, completely useless.


    Tip


    Obviously, any time you delete data, it should be done very carefully. Please
    take the time to go through this thoroughly to alleviate any future headaches
    from accidentally deleting a backup that you may need.


    Okay, so referring to Figure [6-5](#A396023_1_En_6_Chapter.html#Fig5), make sure
    that “Backup files” is selected. The area under that, “File location”, determines
    if you want to delete a specific file or all the files in a folder with a certain
    extension. Although this sounds cut and dried, let’s look at the two options presented.


    ### Deleting a Specific File


    Let’s say that you have set up your logging to “Save all to the same file”. I
    can’t imagine why you would want to do this, but let’s say that you have a valid
    reason. This option finds and deletes a specified file in a specific location.
    Does that make sense? It will not traverse directories to find the file; it will
    only delete the file specified.'
  trans: '

    ## 设置维护计划


    请记住，我们需要为此创建三个独立的任务：一个用于`.bak`文件，一个用于`.trn`文件，一个用于`.txt`文件。为什么？因为`SQL Server`要求你选择一个文件扩展名来查找并删除超出特定保留期限的文件，而数据库备份（`.bak`）和事务日志备份（`.trn`）在物理和逻辑上都是不同的。


    我们将这些计划分别命名为`备份清理`、`日志清理`和`文本文件清理`。这样命名清晰明了，方便我们轻松区分各项任务。


    我们将首先设置`备份清理`，然后是`日志清理`，最后是`文本文件清理`。请记住，如果维护任务出现问题，`文本文件清理`任务中引用的`.txt`文件是开始故障排查的好地方。


    ## 备份清理


    清理备份的目的相当简单：你不希望文件系统中存储着大型数据库的多个副本，从而占用其他应用程序或操作系统功能可能需要的空间。因此，配置一个默认的保留期限并基于该期限自动清理备份要容易得多。`备份清理`任务使我们能够创建一个自动清理这些备份文件的方法。


    右键单击`管理`文件夹下的`维护计划`文件夹，选择`维护计划向导`开始操作。在`名称`框中输入`备份清理`，在`描述`框中输入简短明了的说明，然后单击`更改…`按钮来设置计划。将`发生`下拉菜单改为`每天`，其余保持不变，然后单击`确定`。你的界面应类似于图
    6-2。


    ![A396023_1_En_6_Fig2_HTML.jpg](img/A396023_1_En_6_Fig2_HTML.jpg)

    图 6-2. 选择计划属性


    好的开始。所以，就像之前一样，我们为它指定了一个合适的`名称`和`描述`，将`运行身份`保留为默认设置，并将计划设置为每晚午夜触发。单击`下一步`，我们来设置下一部分，如图
    6-3 所示。


    ![A396023_1_En_6_Fig3_HTML.jpg](img/A396023_1_En_6_Fig3_HTML.jpg)

    图 6-3. 选择维护任务


    显然，你需要在这里选择`维护清除任务`，然后单击`下一步`。之后你将看到如图 6-4 所示的界面。


    ![A396023_1_En_6_Fig4_HTML.jpg](img/A396023_1_En_6_Fig4_HTML.jpg)

    图 6-4. 选择维护任务顺序


    你可以像第 4 章那样停下来生成界面错误，但如果你这么做就需要重新开始。准备好后，单击`下一步`。


    下一个屏幕是本任务的核心部分。如果你是素食者，可以理解为豆腐和羽衣甘蓝。无论哪种情况，初始界面如图 6-5 所示。


    ![A396023_1_En_6_Fig5_HTML.jpg](img/A396023_1_En_6_Fig5_HTML.jpg)

    图 6-5. 定义维护清除任务


    你首先会注意到屏幕顶部有一个单选选项，提供两个选择：“备份文件”和“维护计划文本报告”。这是否意味着你无法在同一任务中同时处理两者？简而言之，是的。如果你想两者都处理，需要为每种想要删除的文件类型设置两个维护计划或作业。原因在于，在一个区域中，你是在删除数据库的实际备份，而在另一个区域，你是在删除维护计划操作的文本报告。换句话说，它们是不同的清理任务，行为也不同。我希望微软在未来的`SQL
    Server`版本中能将这两项任务分开，但我对此不抱太大希望。


    现在，让我们专注于“备份文件”选项。“维护计划文本报告”选项紧随其后。


    ### 删除备份文件


    你可以选择删除实际的数据库备份文件。请注意，如果你按照第 1 章所述设置了备份计划，那么你将运行完整备份，然后是差异备份，最后是事务日志备份。考虑到这一点，如果你要实施此解决方案，备份只会保留一段时间。但关键在于：从文件系统的角度来看，完整备份和差异备份之间没有区别。请再读一遍这部分。它们没有区别，因为默认情况下它们都具有`.bak`文件扩展名。因此，如果你删除了完整备份但没有删除差异备份，你将无法还原差异备份，因为它依赖于完整备份来进行还原。没有完整备份，差异备份就无法将数据还原到数据库中，实际上它就完全没用了。


    ```

    提示

    显然，任何时候删除数据都应非常谨慎。请花时间彻底了解此过程，以避免将来因意外删除可能需要的备份而带来麻烦。

    ```


    好的，参照图 6-5，确保选择了“备份文件”。其下方的“文件位置”区域决定了你是要删除特定文件，还是要删除具有特定扩展名的文件夹中的所有文件。虽然这听起来直截了当，但还是让我们看看给出的两个选项。


    ### 删除特定文件


    假设你已将日志记录设置为“全部保存到同一文件”。我想象不出你为什么要这么做，但假设你有一个合理的理由。此选项会查找并删除特定位置中的特定文件。这有意义吗？它不会遍历目录来查找文件；它只会删除指定的文件。

    '
- fmt: '### Searching and Deleting Based on Extension


    Much like the backup options, this option lets you delete all the files in a specific
    location, including the first-level subfolders. Why the first-level subfolders?
    Because this option was presented when you set up the backup section way back
    in Chapter [1](#A396023_1_En_1_Chapter.html), and they want you to be able to
    properly manage your backups. It wouldn’t make much sense to let you write backups
    to a directory, and then not give you the power to manage the backups in that
    directory.


    With those two nuggets of wisdom in mind, we are going to leave the default of
    `Search folder and delete files based on an extension` selected, and make sure
    to check the `Include first-level subfolders` as well. The default file extension
    should still be set to `bak`. The folder location needs to be set to where you
    defined the backups to be stored. This same location is where we are going to
    search for backup files and delete them based on the age of the backup. Figure
    [6-6](#A396023_1_En_6_Chapter.html#Fig6) should be what you see at this point.


    ![A396023_1_En_6_Fig6_HTML.jpg](A396023_1_En_6_Fig6_HTML.jpg)

    Figure 6-6. Define Maintenance Cleanup Task (completed)


    The last bit is the `File age` part. You want to leave the `Delete files based
    on the age of the file at task run time` check box selected. The standard that
    I try to stick to is three days of file retention, so update the selections to
    match this or whatever your requirements are.


    Be careful about this area. As I said before, this needs to be taken very seriously.
    You can’t undo a file deletion at this level. Be absolutely sure that you realize
    the implications of deleting these files. Once you make your selections, click
    `Next` to move on.


    Once again, you are met with the option to either `Write a report to a text file`
    or to `E-mail report`. I recommend selecting both options; that way, you are aware
    of what is happening to your database as it happens. Make the changes you see
    in Figure [6-7](#A396023_1_En_6_Chapter.html#Fig7), substituting your operator
    in the e-mail step.


    ![A396023_1_En_6_Fig7_HTML.jpg](A396023_1_En_6_Fig7_HTML.jpg)

    Figure 6-7. Select Report Options


    Click `Next` here and you will be shown the `Summary` page. Again, this is where
    you need to make absolutely sure that these settings are correct. Figure [6-8](#A396023_1_En_6_Chapter.html#Fig8)
    shows what my `Summary` looks like.


    ![A396023_1_En_6_Fig8_HTML.jpg](A396023_1_En_6_Fig8_HTML.jpg)

    Figure 6-8. Complete the Wizard


    Click `Finish` when you’re ready. Hopefully, you see the green boxes shown in
    Figure [6-9](#A396023_1_En_6_Chapter.html#Fig9).


    ![A396023_1_En_6_Fig9_HTML.jpg](A396023_1_En_6_Fig9_HTML.jpg)

    Figure 6-9. Maintenance Plan Wizard Progress


    I see all green check boxes. Very good!


    Make sure that you update the job using the techniques from earlier chapters by
    double-clicking the job in the `Jobs` folder under `SQL Server Agent`. I changed
    mine to `bak Files`, but you can pick another name if you want. After you update
    it, your interface should look something like Figure [6-10](#A396023_1_En_6_Chapter.html#Fig10).


    ![A396023_1_En_6_Fig10_HTML.jpg](A396023_1_En_6_Fig10_HTML.jpg)

    Figure 6-10. SQL Server Agent Jobs


    Next, we need to re-create the same job, but for `.trn` files (transaction log
    backups). Basically, this next part is going to be a cut-and-paste of the previous
    information, but updated for the `.trn` files.


    ### Logs Cleanup


    Much like before, the `Logs Cleanup` task is going to allow us to delete the `.trn`
    files present in the file system. Why do this? Aren’t the transaction log backups
    important? Yes, they are. But they are only relevant as long as they relate to
    a current backup set. Recall that backed up transaction logs can only be restored
    to a differential backup. Well, if the differential or the full backup file has
    been deleted, then there is no reason to keep the transaction logs for that backup.
    That’s what this task gives us: the flexibility to delete the transaction logs
    that just aren’t needed anymore.


    Begin the same as before. Right-click the `Maintenance Plans` folder under `Management`
    and choose `Maintenance Plan Wizard`. Enter `Logs Cleanup` as the `Name`, and
    something short and sweet in the `Description` box, and then click the `Change…`
    button to set the schedule. Change the `Occurs` drop-down to `Daily` and leave
    the rest alone, and then click `OK`. Your interface should resemble Figure [6-11](#A396023_1_En_6_Chapter.html#Fig11).


    ![A396023_1_En_6_Fig11_HTML.jpg](A396023_1_En_6_Fig11_HTML.jpg)

    Figure 6-11. Select Plan Properties


    Good start. So, just like before, we’ve provided a good `Name` and `Description`,
    left `Run As` set to the default, and set the schedule to fire at midnight every
    night. Click `Next`. Now let’s set up the next part, as shown in Figure [6-12](#A396023_1_En_6_Chapter.html#Fig12).


    ![A396023_1_En_6_Fig12_HTML.jpg](A396023_1_En_6_Fig12_HTML.jpg)

    Figure 6-12. Select Maintenance Tasks


    Choose `Maintenance Cleanup Task` here and then click `Next`. You will then see
    the interface shown in Figure [6-13](#A396023_1_En_6_Chapter.html#Fig13).


    ![A396023_1_En_6_Fig13_HTML.jpg](A396023_1_En_6_Fig13_HTML.jpg)

    Figure 6-13. Select Maintenance Task Order


    Click `Next` when you’re ready and you should see what is shown in Figure [6-14](#A396023_1_En_6_Chapter.html#Fig14).


    ![A396023_1_En_6_Fig14_HTML.jpg](A396023_1_En_6_Fig14_HTML.jpg)

    Figure 6-14. Define Maintenance Cleanup Task


    Choose the `Backup files` option here. Choose your transaction log location and
    enter `trn` in the `File extension` field. Notice that we have selected our logs
    location this time, because this is where the transaction logs are being stored.


    Figure [6-15](#A396023_1_En_6_Chapter.html#Fig15) should be what you see at this
    point.


    ![A396023_1_En_6_Fig15_HTML.jpg](A396023_1_En_6_Fig15_HTML.jpg)

    Figure 6-15. Define Maintenance Cleanup Task (completed)


    Notice that we’ve selected `3 Days`; the same as with the `.bak` option. The reason
    for this is that you won’t be able to restore a transaction log without the corresponding
    differential backup, so we’re going to delete all of the files by day so that
    we are always in sync. You want to leave the `Delete files based on the age of
    the file at task run time` check box selected. Click `Next` at this point.


    Once again, you are met with the option to either `Write a report to a text file`
    or to `E-mail report`. I recommend selecting both options; that way, you are aware
    of what is happening to your database as it happens. Make the changes that you
    see in Figure [6-16](#A396023_1_En_6_Chapter.html#Fig16), substituting your operator
    in the e-mail step.


    ![A396023_1_En_6_Fig16_HTML.jpg](A396023_1_En_6_Fig16_HTML.jpg)

    Figure 6-16. Select Report Options


    Click `Next` here. You will be shown the `Summary` page. Again, this is where
    you need to make absolutely sure that these settings are correct. Figure [6-17](#A396023_1_En_6_Chapter.html#Fig17)
    shows what my `Summary` looks like.


    ![A396023_1_En_6_Fig17_HTML.jpg](A396023_1_En_6_Fig17_HTML.jpg)

    Figure 6-17. Complete the Wizard


    Click `Finish` when you’re ready. Figure [6-18](#A396023_1_En_6_Chapter.html#Fig18)
    shows what you should expect to see at this point.


    ![A396023_1_En_6_Fig18_HTML.jpg](A396023_1_En_6_Fig18_HTML.jpg)

    Figure 6-18. Maintenance Plan Wizard Progress


    When you see only green check boxes, you have successfully configured this part
    of the maintenance plan. Excellent work so far!'
