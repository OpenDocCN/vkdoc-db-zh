  trans: '

    ## 设置维护计划


    右键单击`维护计划`并选择`维护计划向导`，然后将其命名为`数据库完整性计划`。由于只有一个任务，您可以保留计划安排的单选按钮不变，但需单击`更改`按钮来定义整体计划安排，如图
    3-3 所示。


    ![A396023_1_En_3_Fig3_HTML.jpg](img/A396023_1_En_3_Fig3_HTML.jpg)

    *图 3-3. 新建作业计划*


    计划应设置为任务每小时运行一次，基本上与事务日志备份的计划相同。这是为什么呢？因为我们运行了备份，不希望在问题出现数小时后才担心出现数据完整性问题。我们希望尽快知晓；因此，为了实现这一点，我们在事务日志备份之后运行它。这样，任何完整性问题都会被立即报告。


    在`新建作业计划`屏幕上单击`确定`。您将返回到`选择计划属性`屏幕，如图 3-4 所示。


    ![A396023_1_En_3_Fig4_HTML.jpg](img/A396023_1_En_3_Fig4_HTML.jpg)

    *图 3-4. 选择计划属性*


    单击`下一步`继续。您应该会看到`选择维护任务`屏幕，如图 3-5 所示。选择`检查数据库完整性`复选框，然后单击`下一步`。


    ![A396023_1_En_3_Fig5_HTML.jpg](img/A396023_1_En_3_Fig5_HTML.jpg)

    *图 3-5. 选择维护任务*


    您应该会看到一个标题为`选择维护任务顺序`的屏幕，如图 3-6 所示。由于只有一个任务，这里直接单击`下一步`即可。


    ![A396023_1_En_3_Fig6_HTML.jpg](img/A396023_1_En_3_Fig6_HTML.jpg)

    *图 3-6. 选择维护任务顺序*


    接下来，会出现`定义数据库检查完整性任务`界面，如图 3-7 所示。从下拉菜单中选择您的数据库，保留“包括索引”为选中状态，单击`确定`，然后单击`下一步`。


    ![A396023_1_En_3_Fig7_HTML.jpg](img/A396023_1_En_3_Fig7_HTML.jpg)

    *图 3-7. 定义数据库检查完整性任务*


    下一个屏幕是`选择报告选项`，如图 3-8 所示。保留报告选项的勾选状态，并再次输入备份位置。请记住，我们将维护日志写入此位置。准备好继续后，单击`下一步`。


    ![A396023_1_En_3_Fig8_HTML.jpg](img/A396023_1_En_3_Fig8_HTML.jpg)

    *图 3-8. 选择报告选项*


    这将进入此区域的`摘要`部分，如图 3-9 所示。


    ![A396023_1_En_3_Fig9_HTML.jpg](img/A396023_1_En_3_Fig9_HTML.jpg)

    *图 3-9. 完成向导*


    准备就绪后，单击`完成`。您应该会看到如图 3-10 所示的内容。


    ![A396023_1_En_3_Fig10_HTML.jpg](img/A396023_1_En_3_Fig10_HTML.jpg)

    *图 3-10. 维护计划向导进度*


    完成后单击`关闭`。请注意，图 3-11 所示的`维护计划`区域现在显示了`数据库完整性计划`。


    ![A396023_1_En_3_Fig11_HTML.jpg](img/A396023_1_En_3_Fig11_HTML.jpg)

    *图 3-11. 维护计划*


    您需要更新该作业，如第 1 章所定义。在`SQL Server Agent`内的`作业`文件夹中双击作业名称。将`作业名称`从`Database Integrity
    Plan.Subplan_1`更改为`Check Integrity`，然后继续后续步骤。具体步骤请参阅第 1 章。完成后，您的`作业`文件夹应如图 3-12
    所示。


    ![A396023_1_En_3_Fig12_HTML.jpg](img/A396023_1_En_3_Fig12_HTML.jpg)

    *图 3-12. SQL Server Agent 作业*


    ## 总结


    让我们总结一下本章学到的内容。


    *   我们了解了数据完整性及其重要性。

    *   我们学习了如何使用 `DBCC CHECKDB` 检查数据库的一致性。

    *   我们学习了如何设置维护计划，并在计划完成后更新作业。


    在接下来的章节中，我们将深入更多内容。最好再准备些咖啡…


    # 4. 执行 SQL Server Agent 作业


    啊，老牌好用的 `SQL Server Agent`。没有你我们该怎么办？嗯，这很简单；什么都做不了。至少在这本书里是这样。`SQL Server Agent`
    的目的是执行计划的行政任务，所以没有它，我们就无法自动执行任何操作，必须手动完成所有工作。现在，别误会；所有这些都可以用 T-SQL 完成……但既然可以让可靠的
    `SQL Server Agent` 完成它唯一的工作，何必自己动手呢？


    现在，在继续之前，让我在这里停下来陈述一个显而易见的事实。你不能使用此任务来运行不存在的作业。我提出这一点并非怀疑读者的智力；恰恰相反。我尴尬地承认，我曾花费大量时间试图追踪任务失败的原因，结果发现分配给该任务的作业……其实……根本不存在。真是菜鸟错误，对吧？这种事时有发生。拍下额头，继续前进吧。


    好的。那么，我们现在想要运行一个 `SQL Server Agent` 作业。我们有可用的作业吗？让我们检查一下。展开 `SQL Server Agent`，然后展开
    `作业` 文件夹以显示您可能拥有的任何作业。您应该看到类似于图 4-1 的内容。


    ![A396023_1_En_4_Fig1_HTML.jpg](img/A396023_1_En_4_Fig1_HTML.jpg)

    *图 4-1. SQL Server Agent 作业*


    我们有自己创建的作业和默认的 `SQL Server` 作业。不过我并不想使用这些，因为它们在独立运行。这意味着我们需要从头创建一个。有趣！


    ## 来自数据库的电子邮件


    在我们开始创建代理作业之前，让我们花时间配置 `SQL Server` 以发送电子邮件。这样，您就可以创建在完成时通知您的作业。毕竟，如果最终还需要手动检查，自动化又有什么用呢？


    以下是一些关于从 `SQL Server` 发送电子邮件需要了解的事项：


    *   `SQL Server` 只能通过 `SMTP` 发送电子邮件。它无法以任何方式接收电子邮件。

    *   服务器必须已设置好 `SMTP`。请与系统管理员合作以确保 `SMTP` 已就位。


    您现在的任务是为数据库配置电子邮件，发送测试电子邮件以确认配置，最后，在 `SQL Server Agent` 中启用邮件配置文件。

    '
- fmt: '### Configuring E-mail


    First things first. Expand the `Management` node of your SQL Server installation,
    as shown in Figure [4-2](#A396023_1_En_4_Chapter.html#Fig2). You should see `Database
    Mail`.


    ![A396023_1_En_4_Fig2_HTML.jpg](A396023_1_En_4_Fig2_HTML.jpg)

    Figure 4-2. Location of Database Mail in SSMS


    Right-click and select `Configure Database Mail`. You should see the information
    that is displayed in Figure [4-3](#A396023_1_En_4_Chapter.html#Fig3).


    ![A396023_1_En_4_Fig3_HTML.jpg](A396023_1_En_4_Fig3_HTML.jpg)

    Figure 4-3. Database Main Configuration Wizard


    This is a great little wizard that walks you through how to step up your database
    mail. Once this is set up, I guarantee that you will start looking for reasons
    to employ database mail in your daily workflow. What purpose could this possibly
    lend to you? Think about how convenient it would be if you were to receive an
    e-mail after a task has run, or after the database has been backed up or restored
    successfully. What about when you are expecting an e-mail to say that your primary
    database was backed up, but you never receive that e-mail? That could be a trigger
    for bad things afoot. At least you will have sort of a heads up that something
    is wrong, as opposed to being blindsided by angry users or managers. This is a
    great tool for managing messaging as a database administrator, and has a role
    to play in nearly every application.


    You can click the check box to not show this in the future, if you would like.
    I usually do. When you’re ready, click `Next` to continue.


    The next screen that comes up, as shown in Figure [4-4](#A396023_1_En_4_Chapter.html#Fig4),
    allows you to select what you want to do: set up a new account, manage accounts,
    or change parameters.


    ![A396023_1_En_4_Fig4_HTML.jpg](A396023_1_En_4_Fig4_HTML.jpg)

    Figure 4-4. Select Configuration Task


    Since we are setting up a new user, keep the default value of “`Set up Database
    Mail…`” selected and choose `Next`.


    If you get an alert saying that the `Database Mail` feature is not available,
    select `Yes` to enable it. You shouldn’t have to install anything, considering
    that a full SQL Server install was done.


    You now are taken to the `New Profile` screen, which looks like Figure [4-5](#A396023_1_En_4_Chapter.html#Fig5).


    ![A396023_1_En_4_Fig5_HTML.jpg](A396023_1_En_4_Fig5_HTML.jpg)

    Figure 4-5. New Profile (initial interface)


    This is where most of the work is done. Enter a profile name and description in
    the boxes. These help you to differentiate your accounts. I entered the values
    shown in Figure [4-6](#A396023_1_En_4_Chapter.html#Fig6), but you can enter whatever
    you want.


    ![A396023_1_En_4_Fig6_HTML.jpg](A396023_1_En_4_Fig6_HTML.jpg)

    Figure 4-6. New Profile, nearly complete


    When you’re satisfied with the values you’ve entered, press the `Add` button on
    the right side of the interface. This allows you to add a new profile for database
    mail.


    Yet another interface magically appears with the information shown in Figure [4-7](#A396023_1_En_4_Chapter.html#Fig7).
    I filled it in so you can get an idea of what you need to enter. You may need
    to get some of this information from your system administrator.


    ![A396023_1_En_4_Fig7_HTML.jpg](A396023_1_En_4_Fig7_HTML.jpg)

    Figure 4-7. New Database Mail Account settings


    The fields `Account Name` and `Description` are just placeholders, like in the
    previous screen. The outgoing mail information obviously has to be 100% correct
    or it will fail. The rest should be fairly obvious. Once you get everything filled
    in, click `OK` to be taken back to the previous interface, where you should now
    see the `Account Name` and `E-mail Address` in the grid area, as shown in Figure
    [4-8](#A396023_1_En_4_Chapter.html#Fig8).


    ![A396023_1_En_4_Fig8_HTML.jpg](A396023_1_En_4_Fig8_HTML.jpg)

    Figure 4-8. SMTP Accounts


    When you’re ready to move on, choose `Next`.


    You are shown a screen titled `Manage Profile Security` that has two tabs: `Public
    Profiles` and `Private Profiles`. We are going to deal specifically with the `Public
    Profile` for this exercise, as shown in Figure [4-9](#A396023_1_En_4_Chapter.html#Fig9).


    ![A396023_1_En_4_Fig9_HTML.jpg](A396023_1_En_4_Fig9_HTML.jpg)

    Figure 4-9. New Database Mail Account settings


    What this means is that the database mail service is looking for the security
    of the object entered. You may recognize `Profile Name` because that’s what was
    entered on the previous screen. I originally thought that this may have been pulling
    off of `Active Directory` or something, but in a distributed database system,
    you may not have an account on `Active Directory`, but this would still work.
    Therefore, it had to be a value that was previously entered into the interface
    by the user… in this case, you. You can see how it appears in Figure [4-10](#A396023_1_En_4_Chapter.html#Fig10).
    If you like, press `Back` and change the `Profile Name` at the top of the screen,
    then press `Next` to see that the name is changed. Pretty cool! You need to select
    the check box in the `Public` column of this interface to enable it; otherwise,
    any future setting changes you make will be applied globally. Also, pull down
    the `Default Profile` menu and select `Yes`. In this case, you just want to edit
    this particular user. The completed interface is shown in Figure [4-10](#A396023_1_En_4_Chapter.html#Fig10).


    ![A396023_1_En_4_Fig10_HTML.jpg](A396023_1_En_4_Fig10_HTML.jpg)

    Figure 4-10. Manage Profile Security


    Click `Next` when you’re ready.


    Oh look, Figure [4-11](#A396023_1_En_4_Chapter.html#Fig11) shows another interface.
    Just for clarification, I use the term interface a lot. If that seems confusing,
    then you can always substitute “interface” for whatever term you have deemed to
    be what you call a change in on-screen appearance presented to the user in which
    a prompt or decision is displayed. I remember going through beginner `Visual Basic
    6` courses way back in the Stone Age, and my professor called them “interfaces.”
    It just kind of stuck.


    ![A396023_1_En_4_Fig11_HTML.jpg](A396023_1_En_4_Fig11_HTML.jpg)

    Figure 4-11. Configure System Parameters


    This interface is what you see now. All of these fields are editable, so proceed
    at your own risk. You are free to make whatever choice you want here, or keep
    the defaults. Whatever your environment or security principles call for is what
    should be enforced here. For example, I would not recommend changing the `Prohibited
    Attachment File Extensions`. Those extensions listed are basically all of the
    current file extensions that can be accessed by SQL Server and can also be executed
    by the operating system. They can’t necessarily be produced by SQL Server, but
    they can be added as attachments.


    The following are the available options on this screen:


    *   `Account Retry Attempts`: Number of retry attempts for a mail server to send
    e-mail.

    *   `Account Retry Delay (seconds)`: Delay between attempts for a mail server
    to send e-mail in seconds.

    *   `Maximum File Size (Bytes)`: Maximum file size in bytes for an attachment
    for a mail server to send e-mail.

    *   `Prohibited Attachment File Extensions`: Prohibited file extensions for a
    mail server to send e-mail.

    *   `Database Mail Executable Minimum Lifetime (seconds)`: Minimum lifetime for
    Database Mail executable in seconds.

    *   `Logging Level`: Determines which events are written to the Database Mail
    event log.


    The definitions for those options are straight from the interface shown in Figure
    [4-11](#A396023_1_En_4_Chapter.html#Fig11). An interesting thing to note here:
    if you were to click the `Reset All` button, you will see that the value for `Account
    Retry Delay` changes to `5000` instead of `60`. So instead of waiting 1 minute,
    the default is to wait for over an hour just to retry sending mail. Think about
    what happens in the event of using e-mail to report a catastrophic failure. Would
    you rather know right away, or over an hour after the event?'
