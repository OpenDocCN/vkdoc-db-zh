    Using this model, we can restore to any hour in a given day, meaning that the
    most data we will lose is 1 hour. If this is acceptable, we can move on. If not,
    then we can adjust the time between backups. We will stay with this schedule for
    now though. Figure [2-11](#A396023_1_En_2_Chapter.html#Fig11) shows what you should
    see on the screen now.


    ![A396023_1_En_2_Fig11_HTML.jpg](A396023_1_En_2_Fig11_HTML.jpg)


    Figure 2-11.


    New Job Schedule


    Notice that the defaults are not what we want for a full backup. All you need
    to do to make this available for our schedule is to pull down the Occurs menu
    and choose Daily. That’s it. Notice the text in the Summary field now reads Occurs
    every day at 12:00:00 AM. Schedule will be used starting on [DATE]. This is perfect!
    Click OK here to save this schedule. Notice that the same Summary we just read
    has been transferred to the Schedule block on the interface. This completed screen
    is shown in Figure [2-12](#A396023_1_En_2_Chapter.html#Fig12).


    ![A396023_1_En_2_Fig12_HTML.jpg](A396023_1_En_2_Fig12_HTML.jpg)


    Figure 2-12.


    Define Back Up Database (Full) Task, completed


    Click Next to continue setting up the plan.


    ### Differential Backup Configuration


    Next, the Define Back Up Database (Differential) Task interface is displayed.
    Same as before, choose the database from the Database(s) drop-down menu, update
    the folder location, and click the “Create a sub-directory for each database”
    check box. You can also check “Verify database integrity”, but that’s actually
    done in a later task as well, so it’s up to you. Again, click Change… at the bottom
    of the screen to set up the schedule for the task.


    The defaults in this area are not correct either! Oh well, that’s why we’re here.
    Change the Occurs selection to Daily. Under the “Daily frequency” area, click
    the “Occurs every” radio button and enter 6 in the first box. Your screen should
    look like Figure [2-13](#A396023_1_En_2_Chapter.html#Fig13) when you are done.


    ![A396023_1_En_2_Fig13_HTML.jpg](A396023_1_En_2_Fig13_HTML.jpg)


    Figure 2-13.


    New Job Schedule


    So this means that our differential backup will now run every 6 hours every day.
    Your completed interface for the differential backup section should look like
    Figure [2-14](#A396023_1_En_2_Chapter.html#Fig14).


    ![A396023_1_En_2_Fig14_HTML.jpg](A396023_1_En_2_Fig14_HTML.jpg)


    Figure 2-14.


    Define Back Up Database (Differential) Task, completed


    It is interesting to note that this screen is the same as the full-backup screen,
    except for the Schedule portion.


    ### Transaction Log Backup Configuration


    Click OK and then click Next to continue. The next screen that opens is the Define
    Back Up Database (Transaction Log) Task screen. The same general settings as the
    two previous screens: select the database from the Database(s) menu, select the
    folder for the backup, which should be your E:\SQL Server\Logs folder, and check
    the “Create a sub-directory for each database” check box. When you’re done, click
    the Change… button at the bottom of the interface to define this schedule. Change
    the Occurs value to Daily, and make sure that the “Occurs every” value is set
    to 1 hour(s). That’s it for this area. Your screen should now resemble Figure
    [2-15](#A396023_1_En_2_Chapter.html#Fig15).


    ![A396023_1_En_2_Fig15_HTML.jpg](A396023_1_En_2_Fig15_HTML.jpg)


    Figure 2-15.


    New Job Schedule


    Click OK when you are done with the scheduling. You should then see what is shown
    in Figure [2-16](#A396023_1_En_2_Chapter.html#Fig16).


    ![A396023_1_En_2_Fig16_HTML.jpg](A396023_1_En_2_Fig16_HTML.jpg)


    Figure 2-16.


    Define Back Up Database (Transaction Log) Task, completed


    When you are ready, click Next.


    The screen that opens is titled Select Report Options. You should now see what
    is shown in Figure [2-17](#A396023_1_En_2_Chapter.html#Fig17).


    ![A396023_1_En_2_Fig17_HTML.jpg](A396023_1_En_2_Fig17_HTML.jpg)


    Figure 2-17.


    Select Report Options


    Now, this is fairly self-explanatory. If you want a report written to a text file
    and popped into the file system, click the box. Notice that I have chosen the
    Backups directory, not the Logs directory. This is because I want to keep the
    Logs directory for my transaction logs. The Backups directory can be used to store
    the maintenance text files, whereas the individual folders inside of Backups store
    the actual .bak files in case you ever need to restore the database.


    You can also get the report emailed to you, but you have to have an Operator defined
    (more on that later). If you have an Operator defined, select it here to receive
    the email. What this does is let you know, by email, when the maintenance plan
    runs and what the result was. For now, we will leave only the report option selected.
    Click Next to move on.


    On the next screen, Complete the Wizard, you see a summary of what we did. Expanding
    the options in the interface will show the complete detail of what was done, as
    shown in Figure [2-18](#A396023_1_En_2_Chapter.html#Fig18).


    ![A396023_1_En_2_Fig18_HTML.jpg](A396023_1_En_2_Fig18_HTML.jpg)


    Figure 2-18.


    Complete the Wizard


    Note that these options have not been saved yet. You could click Cancel right
    here and destroy all of the work that we’ve done thus far, but let’s not do that.
    Instead, review what we did, and when you’re ready, click Finish. Hopefully, you
    see what is shown in Figure [2-19](#A396023_1_En_2_Chapter.html#Fig19).


    ![A396023_1_En_2_Fig19_HTML.jpg](A396023_1_En_2_Fig19_HTML.jpg)


    Figure 2-19.


    Maintenance Plan Wizard Progress


    Always a good sign! Click Close when you are ready. Notice that Backup Maintenance
    Plan now appears in the Maintenance Plans area of SSMS. It is now enabled and
    it will run on the schedule that we defined.'
