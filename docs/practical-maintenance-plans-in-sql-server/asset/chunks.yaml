    to be performed whenever you back up the database. The main difference is that
    we are doing the `Reorganize` task instead of the `Rebuild` task, and we aren’t
    cleaning the maintenance files or history. That is done only at midnight, so we
    are sure to stay in sync with the backup schedule. Remember the difference between
    reorganizing and rebuilding the indexes? `Reorganize` keeps the hotel built, and
    `Rebuild` tears it down and starts brand new. We don’t need to take the time to
    rebuild when we can just run a quick `Reorganize` task and continue on. This isn’t
    sacrificing anything, since the nightly rebuild takes care of this extra step.


