    interface shown in Figure [6-13](#A396023_1_En_6_Chapter.html#Fig13).


    ![A396023_1_En_6_Fig13_HTML.jpg](A396023_1_En_6_Fig13_HTML.jpg)


    Figure 6-13.


    Select Maintenance Task Order


    Click Next when you’re ready and you should see what is shown in Figure [6-14](#A396023_1_En_6_Chapter.html#Fig14).


    ![A396023_1_En_6_Fig14_HTML.jpg](A396023_1_En_6_Fig14_HTML.jpg)


    Figure 6-14.


    Define Maintenance Cleanup Task


    Choose the “Backup files” option here. Choose your transaction log location and
    enter trn in the “File extension” field. Notice that we have selected our logs
    location this time, because this is where the transaction logs are being stored.


    Figure [6-15](#A396023_1_En_6_Chapter.html#Fig15) should be what you see at this
    point.


    ![A396023_1_En_6_Fig15_HTML.jpg](A396023_1_En_6_Fig15_HTML.jpg)


    Figure 6-15.


    Define Maintenance Cleanup Task (completed)


    Notice that we’ve selected 3 Days; the same as with the .bak option. The reason
    for this is that you won’t be able to restore a transaction log without the corresponding
    differential backup, so we’re going to delete all of the files by day so that
    we are always in sync. You want to leave the “Delete files based on the age of
    the file at task run time” check box selected. Click Next at this point.


    Once again, you are met with the option to either “Write a report to a text file”
    or to “E-mail report”. I recommend selecting both options; that way, you are aware
    of what is happening to your database as it happens. Make the changes that you
    see in Figure [6-16](#A396023_1_En_6_Chapter.html#Fig16), substituting your operator
    in the e-mail step.


    ![A396023_1_En_6_Fig16_HTML.jpg](A396023_1_En_6_Fig16_HTML.jpg)


    Figure 6-16.


    Select Report Options


    Click Next here. You will be shown the Summary page. Again, this is where you
    need to make absolutely sure that these settings are correct. Figure [6-17](#A396023_1_En_6_Chapter.html#Fig17)
    shows what my Summary looks like.


    ![A396023_1_En_6_Fig17_HTML.jpg](A396023_1_En_6_Fig17_HTML.jpg)


    Figure 6-17.


    Complete the Wizard


    Click Finish when you’re ready. Figure [6-18](#A396023_1_En_6_Chapter.html#Fig18)
    shows what you should expect to see at this point.


    ![A396023_1_En_6_Fig18_HTML.jpg](A396023_1_En_6_Fig18_HTML.jpg)


    Figure 6-18.


    Maintenance Plan Wizard Progress


    When you see only green check boxes, you have successfully configured this part
    of the maintenance plan. Excellent work so far!'
  trans: '

    ### 基于扩展名的搜索与删除


    与备份选项类似，此选项允许你删除特定位置（包括一级子文件夹）中的所有文件。为什么要包含一级子文件夹？因为此选项是在你很久以前（第 1 章）设置备份部分时提供的，他们希望你能妥善管理你的备份。让你将备份写入某个目录，却不赋予你管理该目录中备份的权限，这似乎不太合理。


    牢记这两点宝贵见解，我们将保留默认的 `搜索文件夹并基于扩展名删除文件` 选项，并确保也勾选 `包括一级子文件夹`。默认文件扩展名仍应设置为 `bak`。文件夹位置需要设置为你定义的存储备份的位置。这个相同的位置也是我们将搜索备份文件并根据备份时间长短来删除它们的地方。此时你应该看到如图
    6-6 所示的内容。


    ![A396023_1_En_6_Fig6_HTML.jpg](img/A396023_1_En_6_Fig6_HTML.jpg)

    图 6-6. 定义维护清理任务（已完成）


    最后一部分是 `文件存在时间`。你需要保持选中 `根据任务运行时文件的存在时间删除文件` 复选框。我努力遵循的标准是保留文件三天，所以请更新选项以符合这个标准或你的任何要求。


    请谨慎对待此区域。正如我之前所说，这一点需要非常认真地对待。在此级别删除文件是无法撤销的。务必确保你完全理解删除这些文件的含义。做出选择后，点击 `下一步`
    继续。


    再次，你遇到了将选项设为 `将报告写入文本文件` 或 `通过电子邮件发送报告` 的选择。我建议选择这两个选项；这样，你就能在数据库发生状况时及时知晓。进行如图
    6-7 所示的更改，并在电子邮件步骤中替换为你的操作员。


    ![A396023_1_En_6_Fig7_HTML.jpg](img/A396023_1_En_6_Fig7_HTML.jpg)

    图 6-7. 选择报告选项


    点击此处的 `下一步`，你将看到 `摘要` 页面。再次强调，这是你需要绝对确保设置正确的地方。图 6-8 显示了我的 `摘要` 页面的样子。


    ![A396023_1_En_6_Fig8_HTML.jpg](img/A396023_1_En_6_Fig8_HTML.jpg)

    图 6-8. 完成向导


    准备就绪后点击 `完成`。希望你会看到如图 6-9 所示的绿色方框。


    ![A396023_1_En_6_Fig9_HTML.jpg](img/A396023_1_En_6_Fig9_HTML.jpg)

    图 6-9. 维护计划向导进度


    我看到全是绿色的复选框。非常好！


    请确保使用前面章节中的技术来更新作业：双击 `SQL Server Agent` 下 `Jobs` 文件夹中的作业。我将其改为了 `bak 文件`，但如果你想，也可以选择其他名称。更新后，你的界面应该类似于图
    6-10。


    ![A396023_1_En_6_Fig10_HTML.jpg](img/A396023_1_En_6_Fig10_HTML.jpg)

    图 6-10. SQL Server Agent 作业


    接下来，我们需要为 `.trn` 文件（事务日志备份）重新创建相同的作业。基本上，接下来的部分将是复制前面的信息，但更新为适用于 `.trn` 文件。


    ### 日志清理


    与之前类似，`日志清理` 任务将允许我们删除文件系统中存在的 `.trn` 文件。为什么要这样做？事务日志备份不重要吗？是的，它们很重要。但它们只有与当前备份集相关时才具有意义。回想一下，备份的事务日志只能恢复到差异备份。嗯，如果差异备份或完整备份文件已被删除，那么就没有理由保留该备份的事务日志了。这正是此任务赋予我们的灵活性：删除那些不再需要的事务日志。


    像之前一样开始。右键单击 `Management` 下的 `Maintenance Plans` 文件夹，选择 `维护计划向导`。在 `名称` 框中输入 `日志清理`，在
    `描述` 框中输入简短明了的描述，然后点击 `更改…` 按钮设置计划。将 `发生` 下拉菜单更改为 `每天`，其余保持不变，然后点击 `确定`。你的界面应类似于图
    6-11。


    ![A396023_1_En_6_Fig11_HTML.jpg](img/A396023_1_En_6_Fig11_HTML.jpg)

    图 6-11. 选择计划属性


    好的开始。所以，就像之前一样，我们提供了良好的 `名称` 和 `描述`，将 `运行身份` 保留为默认设置，并将计划设置为每晚午夜触发。点击 `下一步`。现在让我们设置下一部分，如图
    6-12 所示。


    ![A396023_1_En_6_Fig12_HTML.jpg](img/A396023_1_En_6_Fig12_HTML.jpg)

    图 6-12. 选择维护任务


    在此处选择 `维护清理任务`，然后点击 `下一步`。你将看到如图 6-13 所示的界面。


    ![A396023_1_En_6_Fig13_HTML.jpg](img/A396023_1_En_6_Fig13_HTML.jpg)

    图 6-13. 选择维护任务顺序


    准备就绪后点击 `下一步`，你应该看到如图 6-14 所示的内容。


    ![A396023_1_En_6_Fig14_HTML.jpg](img/A396023_1_En_6_Fig14_HTML.jpg)

    图 6-14. 定义维护清理任务


    在此处选择 `备份文件` 选项。选择你的事务日志位置，并在 `文件扩展名` 字段中输入 `trn`。请注意，这次我们选择了日志位置，因为这是存储事务日志的地方。


    此时你应该看到如图 6-15 所示的内容。


    ![A396023_1_En_6_Fig15_HTML.jpg](img/A396023_1_En_6_Fig15_HTML.jpg)

    图 6-15. 定义维护清理任务（已完成）


    请注意，我们选择了 `3 天`；与 `.bak` 选项相同。原因在于，没有相应的差异备份，你将无法恢复事务日志，因此我们将按天删除所有文件，以确保始终保持同步。你需要保持选中
    `根据任务运行时文件的存在时间删除文件` 复选框。此时点击 `下一步`。


    再次，你遇到了将选项设为 `将报告写入文本文件` 或 `通过电子邮件发送报告` 的选择。我建议选择这两个选项；这样，你就能在数据库发生状况时及时知晓。进行如图
    6-16 所示的更改，并在电子邮件步骤中替换为你的操作员。


    ![A396023_1_En_6_Fig16_HTML.jpg](img/A396023_1_En_6_Fig16_HTML.jpg)

    图 6-16. 选择报告选项


    点击此处的 `下一步`。你将看到 `摘要` 页面。再次强调，这是你需要绝对确保设置正确的地方。图 6-17 显示了我的 `摘要` 页面的样子。


    ![A396023_1_En_6_Fig17_HTML.jpg](img/A396023_1_En_6_Fig17_HTML.jpg)

    图 6-17. 完成向导


    准备就绪后点击 `完成`。图 6-18 显示了此时你应该预期看到的内容。


    ![A396023_1_En_6_Fig18_HTML.jpg](img/A396023_1_En_6_Fig18_HTML.jpg)

    图 6-18. 维护计划向导进度


    当你只看到绿色复选框时，你就已经成功配置了维护计划的这一部分。到目前为止，干得漂亮！

