  raw: '## Reorganizing vs. Rebuilding


    Think about a hotel. It’s a nice building, sitting there all built and stuff.
    It has a structure and multiple floors, with each floor having lots of rooms.
    You know that you can get right to the room you’re supposed to go to by going
    into the correct hotel first, and then up the elevator to the floor with the room
    on it, and then to the actual room. This is exactly how indexing works.


    With this hotel scenario in mind, does it make sense to destroy and rebuild the
    entire hotel, or just maybe reorganize the way you can find your way to the room
    that you want? Ultimately, that depends on your interpretation and needs. It might
    not be necessary to rebuild, but it is absolutely necessary to reorganize, at
    a minimum. Sometimes, all you need to do is update the map to the room that you
    need to get to, and not destroy the whole hotel.


    Tip


    Reorganizing indexes keeps the existing indexes as they are. Rebuilding indexes
    drops and rebuilds the indexes every single time.


    Clearly, there are differences in the time and effort it takes to destroy and
    rebuild a hotel vs. doing the same to an index. The principle is the same, though,
    and that is what needs to be understood. Just because you can do something doesn’t
    always mean that you should, in other words.


    Again, depending on your scenario, it might be advantageous to do either of the
    options, or even both options. There really isn’t a need to do both at the same
    time, since they both accomplish the same goals of a clean index.


    Another interesting point about indexes is that indexes are automatically maintained
    whenever update, insert, or delete queries are made. This causes modifications
    to the data itself, which is what causes fragmentation of the data. Excessive
    fragmentation is what leads to long query times, because the data is physically
    separated on the disk and not in contiguous pages. Reorganizing and rebuilding
    puts these pages back in order, so that the queries run faster and your database
    behaves better.


    ## Setting Up the Maintenance Plan


    The process of creating a maintenance plan should be very familiar by now. Right-click
    the Maintenance Plan option under Management in SSMS and choose Maintenance Plan
    Wizard. Change your interface to match what you see in Figure [8-1](#A396023_1_En_8_Chapter.html#Fig1).


    ![A396023_1_En_8_Fig1_HTML.jpg](A396023_1_En_8_Fig1_HTML.jpg)


    Figure 8-1.


    Select Plan Properties


    Click the Change… button to set the schedule to Daily, as in previous chapters,
    and click OK. You really don’t want to reorganize your index during usage hours,
    if at all possible, although it won’t hurt anything. Click Next when you are ready.


    You are now shown the interface where you can select the task, so choose Reorganize
    Index, as shown in Figure [8-2](#A396023_1_En_8_Chapter.html#Fig2).


    ![A396023_1_En_8_Fig2_HTML.jpg](A396023_1_En_8_Fig2_HTML.jpg)


    Figure 8-2.


    Select Maintenance Tasks


    Notice the definition for Reorganize Index given by Microsoft: “The Reorganize
    Index task defragments and compacts clustered and nonclustered indexes on tables
    and views. This will improve index-scanning performance.”


    Recall the definition for Rebuild Index: “The Rebuild task reorganizes data on
    the data and index pages by rebuilding indexes. This improves performance of index
    scans and seeks. This task also optimizes the distribution of data and free space
    on the index pages, allowing faster future growth.”


    They sound sort of alike, right? So why have two different options that do basically
    the same thing? Because it makes more sense from a DBA point of view to be able
    to point a task at a small or medium table with an index and say “go rebuild that
    index,” as opposed to doing the same thing to a massive table with billions of
    rows. You may want to just reorganize this index, since rebuilding the index will
    definitely take some time to run. Rebuilding that single massive index is something
    that will take a bit of time, more than likely a few seconds at least, but remember
    that this is an eternity in computer time.


    Click Next at the Select Maintenance Tasks screen (shown in Figure [8-2](#A396023_1_En_8_Chapter.html#Fig2))
    and then click Next again at the Select Maintenance Task Order screen, as shown
    in Figure [8-3](#A396023_1_En_8_Chapter.html#Fig3).


    ![A396023_1_En_8_Fig3_HTML.jpg](A396023_1_En_8_Fig3_HTML.jpg)


    Figure 8-3.


    Select Maintenance Task Order


    You then need to define the task on the Define Reorganize Index Task screen. Exactly
    like in Chapter [6](#A396023_1_En_6_Chapter.html), choose your database and keep
    Object set to “Tables and views”. Leave the rest as is. You should see what is
    shown in Figure [8-4](#A396023_1_En_8_Chapter.html#Fig4).


    ![A396023_1_En_8_Fig4_HTML.jpg](A396023_1_En_8_Fig4_HTML.jpg)


    Figure 8-4.


    Define Reorganize Index Task


    Click Next here and you can start setting up the reporting options. Again, exactly
    like in Chapter [7](#A396023_1_En_7_Chapter.html), change the folder location
    to where you are writing your logs, and enable the operator, as shown in Figure
    [8-5](#A396023_1_En_8_Chapter.html#Fig5).


    ![A396023_1_En_8_Fig5_HTML.jpg](A396023_1_En_8_Fig5_HTML.jpg)


    Figure 8-5.


    Select Report Options


    Click Next at this screen to go to the summary screen, as shown in Figure [8-6](#A396023_1_En_8_Chapter.html#Fig6).


    ![A396023_1_En_8_Fig6_HTML.jpg](A396023_1_En_8_Fig6_HTML.jpg)


    Figure 8-6.


    Complete the Wizard


    This shows us the breakdown of what is happening. Everything is pretty much the
    same as in Chapter [7](#A396023_1_En_7_Chapter.html), so click Finish and wait
    for those green check boxes, as shown in Figure [8-7](#A396023_1_En_8_Chapter.html#Fig7).


    ![A396023_1_En_8_Fig7_HTML.jpg](A396023_1_En_8_Fig7_HTML.jpg)


    Figure 8-7.


    Maintenance Plan Wizard Progress


    Great job!


    Don’t forget to update the job, like in previous chapters. To do this, double-click
    the job named Reorganize Index Plan.Subplan_1 and rename it Reorganize Index,
    and then make the other necessary changes. Your Jobs folder should now look like
    Figure [8-8](#A396023_1_En_8_Chapter.html#Fig8).


    ![A396023_1_En_8_Fig8_HTML.jpg](A396023_1_En_8_Fig8_HTML.jpg)


    Figure 8-8.


    SQL Server Agent Jobs


    Your Maintenance Plans should look like Figure [8-9](#A396023_1_En_8_Chapter.html#Fig9).


    ![A396023_1_En_8_Fig9_HTML.jpg](A396023_1_En_8_Fig9_HTML.jpg)


    Figure 8-9.


    Maintenance Plans


    ## Summary


    If you’ve gotten this far, congratulations on the progress that you have made!
    Keep reading to learn about the other cool ways that we can manipulate our database
    in anticipation for the ultimate goal of heightened data integrity.


    # 9. Shrinking the Database and Files


    Ever get the feeling that things are just getting too big for you to handle? Wondering
    why your database, which doesn’t seem very big, all of a sudden is much larger
    than you remember? There are lots of reasons why this could be, not to mention
    that there is simply more data in there than you realize. Do you need to add a
    shrink task to your maintenance plan? Let’s take a look and find out.'
  trans: '

    ## 重组与重建


    想象一下酒店。它是一栋建好的漂亮建筑，矗立在那里。它有结构和多层楼，每层都有很多房间。你知道，你可以先进入正确的酒店，然后乘电梯到目标房间所在的楼层，最后找到具体的房间，就能直接到达你要去的房间。索引的工作原理正是如此。


    考虑到酒店这个场景，是拆毁并重建整个酒店更有意义，还是仅仅重新规划找到目标房间的路径更合理？最终，这取决于你的解读和需求。可能没必要重建，但至少，重新规划是绝对必要的。有时候，你只需要更新目标房间的地图，而无需摧毁整个酒店。


    **提示**


    重组索引会保留现有索引的原样。重建索引则会每次都删除并重建索引。


    显然，拆毁重建一个酒店与对索引做同样的事，在所需时间和精力上是有差异的。然而，其原理是相同的，而这正是需要理解的要点。换句话说，并非仅仅因为你能做某事，就意味着你总应该去做。


    再次强调，根据你的具体场景，执行这两个选项中的任何一个，甚至同时执行两者，都可能是有利的。实际上，没有必要同时执行两者，因为它们都能达到清理索引的相同目标。


    关于索引另一个有趣的点是，每当执行 `update`、`insert` 或 `delete` 查询时，索引都会自动维护。这会导致数据本身的修改，而这正是造成数据碎片化的原因。过度的碎片化会导致查询时间变长，因为数据在磁盘上是物理分离的，并不在连续的页面中。`重组`
    和 `重建` 操作会将这些页面重新排序，从而使查询运行得更快，你的数据库表现更佳。


    ## 设置维护计划


    创建维护计划的过程现在应该非常熟悉了。在 `SSMS` 中，右键单击 `Management` 下的 `Maintenance Plan` 选项，然后选择
    `Maintenance Plan Wizard`。将你的界面调整为与图 `8-1` 所示一致。


    ![A396023_1_En_8_Fig1_HTML.jpg](img/A396023_1_En_8_Fig1_HTML.jpg)


    图 `8-1`。


    选择 `Plan Properties`。


    单击 `Change…` 按钮，像之前的章节一样，将计划设置为 `Daily`，然后单击 `OK`。如果可能的话，你确实不希望在使用时段重组索引，尽管这不会造成什么损害。准备好后，单击
    `Next`。


    现在你会看到可以在此选择任务的界面，因此请选择 `Reorganize Index`，如图 `8-2` 所示。


    ![A396023_1_En_8_Fig2_HTML.jpg](img/A396023_1_En_8_Fig2_HTML.jpg)


    图 `8-2`。


    选择 `Maintenance Tasks`。


    注意 Microsoft 对 `Reorganize Index` 的定义：“`Reorganize Index` 任务对表和视图上的聚集索引和非聚集索引进行碎片整理和压缩。这将提高索引扫描性能。”


    回想一下 `Rebuild Index` 的定义：“`Rebuild` 任务通过重建索引来重新组织数据和索引页上的数据。这提高了索引扫描和查找的性能。此任务还优化了索引页上数据和可用空间的分布，允许未来更快地增长。”


    它们听起来有点相似，对吧？那么，为什么要有两个功能基本相同的不同选项呢？因为从数据库管理员（DBA）的角度来看，能够对一个带有索引的中小表执行一个任务并说“去重建那个索引”，比对一个拥有数十亿行的巨大表做同样的事更有意义。对于这样的庞大表，你可能只想重组这个索引，因为重建索引肯定需要运行一段时间。重建那个单独的庞大索引会花费一点时间，至少很可能是几秒钟，但请记住，在计算机时间里，这简直是永恒。


    在“选择维护任务”屏幕（如图 `8-2` 所示）单击 `Next`，然后在“选择维护任务顺序”屏幕（如图 `8-3` 所示）再次单击 `Next`。


    ![A396023_1_En_8_Fig3_HTML.jpg](img/A396023_1_En_8_Fig3_HTML.jpg)


    图 `8-3`。


    选择 `Maintenance Task Order`。


    然后你需要在“定义重组索引任务”屏幕定义任务。与第 `6` 章完全一样，选择你的数据库，并将 `Object` 保持设置为“表和视图”。其余保持原样。你应该看到如图
    `8-4` 所示的内容。


    ![A396023_1_En_8_Fig4_HTML.jpg](img/A396023_1_En_8_Fig4_HTML.jpg)


    图 `8-4`。


    定义 `Reorganize Index Task`。


    在这里单击 `Next`，然后你可以开始设置报告选项。同样，与第 `7` 章完全一样，将文件夹位置更改为你写入日志的位置，并启用操作员，如图 `8-5` 所示。


    ![A396023_1_En_8_Fig5_HTML.jpg](img/A396023_1_En_8_Fig5_HTML.jpg)


    图 `8-5`。


    选择 `Report Options`。


    在此屏幕单击 `Next` 进入摘要屏幕，如图 `8-6` 所示。


    ![A396023_1_En_8_Fig6_HTML.jpg](img/A396023_1_En_8_Fig6_HTML.jpg)


    图 `8-6`。


    完成向导。


    这向我们展示了正在发生的事情的细目。一切都与第 `7` 章非常相似，所以单击 `Finish` 并等待那些绿色的复选框，如图 `8-7` 所示。


    ![A396023_1_En_8_Fig7_HTML.jpg](img/A396023_1_En_8_Fig7_HTML.jpg)


    图 `8-7`。


    维护计划向导进度。


    干得漂亮！


    别忘了像之前的章节那样更新作业。为此，双击名为 `Reorganize Index Plan.Subplan_1` 的作业，将其重命名为 `Reorganize
    Index`，然后进行其他必要的更改。你的 `Jobs` 文件夹现在应该如图 `8-8` 所示。


    ![A396023_1_En_8_Fig8_HTML.jpg](img/A396023_1_En_8_Fig8_HTML.jpg)


    图 `8-8`。


    SQL Server 代理作业。


    你的 `Maintenance Plans` 应该如图 `8-9` 所示。


    ![A396023_1_En_8_Fig9_HTML.jpg](img/A396023_1_En_8_Fig9_HTML.jpg)


    图 `8-9`。


    维护计划。


    ## 总结


    如果你已经读到这里，为你取得的进步表示祝贺！请继续阅读，了解其他酷炫的方法，我们可以用它们来操作数据库，以期实现提高数据完整性的终极目标。


    # 9. 收缩数据库和文件


    是否曾感觉事情变得太大而难以掌控？是否想知道为什么你的数据库，看起来并不大，却突然比你记忆中大了很多？造成这种情况的原因有很多，更不用说里面只是有比你意识到的更多的数据而已。你需要在维护计划中添加一个收缩任务吗？让我们来看看并找出答案。

    '
- fmt: '## Disk Usage Reporting


    右键单击数据库名称并选择 **Reports** ➤ **Standard Reports** ➤ **Disk Usage**。它需要运行片刻，然后你会得到一个类似图
    [9-1](#A396023_1_En_9_Chapter.html#Fig1) 中展示的酷炫小图表。


    ![A396023_1_En_9_Fig1_HTML.jpg](A396023_1_En_9_Fig1_HTML.jpg)

    **图 9-1. 磁盘使用报告**


    我首先注意到的是饼图。通过它们，你可以看到它们分别代表了数据文件和事务日志的空间使用百分比。正如我之前所说，我的数据库很小，只有一个表，所以这些结果可能与你的非常不同。不过，这些信息以及它能告诉你的东西仍然很重要。请仔细阅读这份报告。


    > **提示**

    > 信不信由你，你确实希望数据库中保留一点未使用的空间。


    为什么你希望数据库中有未使用空间？这说不通！数据库应该尽可能精简，对吧？从某种意义上说，这是正确的。但数据库的主要目的是什么？当然是为数据提供一个有序的存放地。当你需要向一个极其紧凑的数据库添加更多数据时会发生什么？它必须从可用磁盘空间中分配更多空间。


    ## 磁盘空间考虑因素


    创建数据库时，有一个设置可以选择是以数据库大小的因子添加存储空间，还是以百分比添加。当需要空间以保持数据库功能时，会调用此设置。右键单击数据库名称并选择 **Properties**，然后在左侧选择
    **Files** 选项，将显示 **Autogrowth/Maxsize** 选项的设置。我的 `DEVTEST` 数据库的设置如图 [9-2](#A396023_1_En_9_Chapter.html#Fig2)
    所示。


    ![A396023_1_En_9_Fig2_HTML.jpg](A396023_1_En_9_Fig2_HTML.jpg)

    **图 9-2. 数据库属性**


    请注意，我为 **PRIMARY** 文件组和事务日志都选择了 4MB 的初始大小。这是因为我不想把它设得太小，导致数据库几乎立即就需要申请更多空间。换句话说，我给它留了一些活动的余地。我的
    **PRIMARY** 文件组将按需增长 1MB，增长无上限。由于我们设定了无上限增长，因此需要对此数据库进行仔细监控。事务日志将增长 5%，直到达到 2GB，然后将创建一个新的事务日志，这些日志将协同工作，直到日志被截断。另外请注意，我的
    **Path and File Name** 部分设置为我实际希望存放数据的位置，而不是埋没在默认的 SQL 安装文件夹中。


    请根据预期数据库用途的数据插入和检索速率，仔细考虑这些选项。


    为了缓解数据库大小带来的问题，可以使用 **Shrink Database** 选项。它基本上是对数据库说：“好吧，事情是这样的。白天你可以想要多少磁盘空间就用多少，但到了晚上，你得节食了。我会收回你未使用的任何空间，并将其返回给文件系统。如果你以后需要它，你知道去申请，但你不能一直占着它。”
    换句话说，数据库维护计划需要在夜间或系统上用户尽可能少的时候运行。当它运行时，它会获取先前由 SQL Server 占用的未使用空间，并将其返回给文件系统。如果数据库之后需要它，它会向文件系统申请该块空间，如果有可用空间，则取用。然后，在下次维护计划设置运行时重复此过程。


    因此，在设置维护计划的 **Shrink Database** 选项时，有一个选项可以设置在数据库中保留的未使用空间量。重要的是要记住，此设置与确定实际授予文件系统上数据库多少空间的设置协同工作。


    以一个 800GB 的数据库为例，当数据库被收缩并选择了 50% 的数据库大小时，我们的 800GB 数据库会保留 400GB，即 50% 的空间。所以，这个可能有
    70GB 空闲空间的 800GB 数据库，结果变成了 730GB 的主数据库大小和 365GB 的备用空间。明白这是怎么运作的了吗？如果没有适当的管理和监督，这将迅速耗尽磁盘空间。这就是我们作为数据库管理员介入的地方。


    ## 事务日志


    需要考虑的一个重要部分是事务日志如何作为数据库的一部分进行交互，特别是在数据库收缩如何进行方面。事务日志的目的是，嗯，记录数据库事务。它字面意义上记录了操作数据库的
    **DML** 语句（`SELECT`、`UPDATE`、`INSERT`、`DELETE`）。如果你想象这将变得非常大，那么你绝对正确。在一个有很多事务的数据库中，这个日志可以很快变得巨大。收缩数据库时，你可以随意收缩它，但你永远无法触及事务日志的大小，除非你专门收缩事务日志。请记住，它是一个完全独立的实体，有单独的文件标识，需要像主数据文件一样给予同样的关注。尽管如此，它仍然是数据库的一部分，除非明确告知其收缩，否则无法被收缩。否则，你的日志要么会一直增长直到磁盘空间用完，要么达到其限制并导致错误。无论哪种情况，这都不是好事！


    要缓解此问题，只需设置另一个数据库备份任务来收缩和截断事务日志。让我们看看如何执行此操作。'
  raw: '## Disk Usage Reporting


    Right-click your database name and choose Reports ➤ Standard Reports ➤ Disk Usage.
    It takes a second to run, and then you get a cool little graphic similar to the
    one shown in Figure [9-1](#A396023_1_En_9_Chapter.html#Fig1).


    ![A396023_1_En_9_Fig1_HTML.jpg](A396023_1_En_9_Fig1_HTML.jpg)


    Figure 9-1.


    Disk Usage Report


    This first thing that I noticed was the pie charts. Looking at those, you can
    see that they are representative of the percentage of space usage for the data
    files and the transaction logs, respectively. Now, as I said before, my database
    is tiny and only has the one table, so these results are probably very different
    from yours. The information is still important, though, and what it can tell you.
    Read through this report carefully.


    Tip


    Believe it or not, you actually do want a bit of unused space in the database.


    Why do you want unused space in the database? That makes no sense! The database
    should be as streamlined as possible, right? In one sense, this is correct. But
    what is the primary purpose of a database? To provide an organized place for data
    to live, of course. And what happens when you need to add more data to an extremely
    compact database? It has to add more space from the available disk space.


    ## Disk Space Considerations


    When a database is created, there is a setting to add storage either as a factor
    of the size of the database or as a percentage. This setting is invoked when space
    is needed to keep the database functional. Right-clicking the database name and
    choosing Properties, and then choosing the Files option on the left will show
    you the settings for the Autogrowth/Maxsize options. The settings for my DEVTEST
    database are shown in Figure [9-2](#A396023_1_En_9_Chapter.html#Fig2).


    ![A396023_1_En_9_Fig2_HTML.jpg](A396023_1_En_9_Fig2_HTML.jpg)


    Figure 9-2.


    Database Properties


    Note that I have selected an initial size of 4MB for both the PRIMARY filegroup
    and the transaction log. This is because I didn’t want to make it too small and
    then have the database almost immediately request more space. I gave it some room
    to play, in other words. My PRIMARY filegroup will grow by 1MB as needed, to unlimited
    growth. Careful monitoring of this database is required, since we said it will
    have unlimited growth. The transaction log will grow by 5% until it is 2GB, and
    then a new transaction log will be created, and these will work in conjunction
    until the logs are truncated. Also note that my Path and File Name sections are
    set to where I actually want my data, and not buried in the default SQL installation
    folders.


    Consider these options carefully, depending on the expected data insertion and
    retrieval rate for the intended database purpose.


    To alleviate any issues with database size, the Shrink Database option is available.
    It basically says to the database, “Okay, here’s the deal. You can have as much
    disk space as you want during the day, but at night, you’re on a diet. I’m taking
    back any room you haven’t used and returning it to the file system. If you need
    it later, you know to ask, but you can’t just hold on to it.” In other words,
    the database maintenance plan needs to run at night or when there are as few users
    on the system as possible. When it runs, it takes the unused space previously
    claimed by SQL Server and returns it to the file system. If the database needs
    it later, it requests the chunk of space from the file system, and if there is
    room available, then it takes it. The process is then repeated the next time the
    maintenance plan is set to run.


    Consequently, when setting up the Shrink Database option of the maintenance plan,
    there is an option where you can set the amount of unused space to remain in the
    database. It is important to remember that this setting works in conjunction with
    the setting to determine how much space is actually granted to your database on
    the file system.


    Using an 800GB database as an example, when the database is shrunk and 50% of
    the database size is chosen, our 800GB database reserves 400GB, or 50% of the
    space. So the 800GB database with maybe 70GB of free space turns out to be 730GB
    primary database size and 365GB in reserve. See how that works? That will quickly
    eat up disk space without proper management and oversight. That is where we, as
    the database administrators, come in.


    ## The Transaction Log


    An important part to consider is how the transaction log interacts as a part of
    the database, specifically in regards to how the shrinking of the database takes
    place. The purpose of a transaction log is to, um, log the database transactions.
    It literally keeps a record of the DML statements (SELECT, UPDATE, INSERT, DELETE)
    that manipulate the database. If you imagine that this will get very big, then
    you’re absolutely right. In a database with a lot of transactions, this log can
    get huge very quickly. When shrinking the database, you can shrink it as much
    as you want, but you’ll never touch the transaction log size unless you shrink
    the transaction log. Remember, it’s a completely separate entity with a separate
    file designation, and it needs to have the same attention as the primary data
    file. Given this, it is still a part of the database and can’t be shrunk without
    being explicitly told to shrink. Otherwise, your log will either continue to grow
    until the disk is full or get to its limit and cause an error. Either way, it
    is not a good thing!


    To alleviate this issue, simply set up another database backup task to shrink
    and truncate the transaction log. Let’s look at how to do that.'
  trans: '## 磁盘使用报告


    右键单击数据库名称并选择 **报告** ➤ **标准报告** ➤ **磁盘使用情况**。它需要运行片刻，然后你会得到一个类似图 9-1 中展示的酷炫小图表。


    ![A396023_1_En_9_Fig1_HTML.jpg](img/A396023_1_En_9_Fig1_HTML.jpg)

    **图 9-1. 磁盘使用情况报告**


    我首先注意到的是饼图。通过它们，你可以看到它们分别代表了数据文件和事务日志的空间使用百分比。正如我之前所说，我的数据库很小，只有一个表，所以这些结果可能与你的非常不同。不过，这些信息以及它能告诉你的东西仍然很重要。请仔细阅读这份报告。


    > **提示**

    > 信不信由你，你确实希望数据库中保留一点未使用的空间。


    为什么你希望数据库中有未使用空间？这说不通！数据库应该尽可能精简，对吧？从某种意义上说，这是正确的。但数据库的主要目的是什么？当然是为数据提供一个有序的存放地。当你需要向一个极其紧凑的数据库添加更多数据时会发生什么？它必须从可用磁盘空间中分配更多空间。


    ## 磁盘空间考虑因素


    创建数据库时，有一个设置可以选择是以数据库大小的因子添加存储空间，还是以百分比添加。当需要空间以保持数据库功能时，会调用此设置。右键单击数据库名称并选择 **属性**，然后在左侧选择
    **文件** 选项，将显示 **自动增长/最大大小** 选项的设置。我的 `DEVTEST` 数据库的设置如图 9-2 所示。


    ![A396023_1_En_9_Fig2_HTML.jpg](img/A396023_1_En_9_Fig2_HTML.jpg)

    **图 9-2. 数据库属性**


    请注意，我为 **PRIMARY** 文件组和事务日志都选择了 4MB 的初始大小。这是因为我不想把它设得太小，导致数据库几乎立即就需要申请更多空间。换句话说，我给它留了一些活动的余地。我的
    **PRIMARY** 文件组将按需增长 1MB，增长无上限。由于我们设定了无上限增长，因此需要对此数据库进行仔细监控。事务日志将增长 5%，直到达到 2GB，然后将创建一个新的事务日志，这些日志将协同工作，直到日志被截断。另外请注意，我的
    **路径和文件名** 部分设置为我实际希望存放数据的位置，而不是埋没在默认的 SQL 安装文件夹中。


    请根据预期数据库用途的数据插入和检索速率，仔细考虑这些选项。


    为了缓解数据库大小带来的问题，可以使用 **收缩数据库** 选项。它基本上是对数据库说：“好吧，事情是这样的。白天你可以想要多少磁盘空间就用多少，但到了晚上，你得节食了。我会收回你未使用的任何空间，并将其返回给文件系统。如果你以后需要它，你知道去申请，但你不能一直占着它。”
    换句话说，数据库维护计划需要在夜间或系统上用户尽可能少的时候运行。当它运行时，它会获取先前由 SQL Server 占用的未使用空间，并将其返回给文件系统。如果数据库之后需要它，它会向文件系统申请该块空间，如果有可用空间，则取用。然后，在下次维护计划设置运行时重复此过程。


    因此，在设置维护计划的 **收缩数据库** 选项时，有一个选项可以设置在数据库中保留的未使用空间量。重要的是要记住，此设置与确定实际授予文件系统上数据库多少空间的设置协同工作。


    以一个 800GB 的数据库为例，当数据库被收缩并选择了 50% 的数据库大小时，我们的 800GB 数据库会保留 400GB，即 50% 的空间。所以，这个可能有
    70GB 空闲空间的 800GB 数据库，结果变成了 730GB 的主数据库大小和 365GB 的备用空间。明白这是怎么运作的了吗？如果没有适当的管理和监督，这将迅速耗尽磁盘空间。这就是我们作为数据库管理员介入的地方。


    ## 事务日志


    需要考虑的一个重要部分是事务日志如何作为数据库的一部分进行交互，特别是在数据库收缩如何进行方面。事务日志的目的是，嗯，记录数据库事务。它字面意义上记录了操作数据库的
    **DML** 语句（`SELECT`、`UPDATE`、`INSERT`、`DELETE`）。如果你想象这将变得非常大，那么你绝对正确。在一个有很多事务的数据库中，这个日志可以很快变得巨大。收缩数据库时，你可以随意收缩它，但你永远无法触及事务日志的大小，除非你专门收缩事务日志。请记住，它是一个完全独立的实体，有单独的文件标识，需要像主数据文件一样给予同样的关注。尽管如此，它仍然是数据库的一部分，除非明确告知其收缩，否则无法被收缩。否则，你的日志要么会一直增长直到磁盘空间用完，要么达到其限制并导致错误。无论哪种情况，这都不是好事！


    要缓解此问题，只需设置另一个数据库备份任务来收缩和截断事务日志。让我们看看如何执行此操作。'
- fmt: '## Setting Up the Maintenance Plan


    This plan is one of the easier ones to set up, honestly. It’s almost exactly the
    same as the plans in Chapters [7](#A396023_1_En_7_Chapter.html) and [8](#A396023_1_En_8_Chapter.html),
    so most of this should start to look familiar at this point.


    Right-click `Maintenance Plans` from the `Management` folder in SSMS and choose
    `Maintenance Plan Wizard`. The initial interface needs to be changed to show what
    you see in Figure [9-3](#A396023_1_En_9_Chapter.html#Fig3).


    ![A396023_1_En_9_Fig3_HTML.jpg](A396023_1_En_9_Fig3_HTML.jpg)


    Figure 9-3. Select Plan Properties


    Change the schedule by clicking the `Change…` button and set the `Occurs` option
    to `Daily` to make it run once a day. Shrinking the database takes some time,
    so I wouldn’t set it any more frequently than that. Click `Next` to continue.
    You will see the page where you choose the tasks, so choose `Shrink Database`
    as shown in Figure [9-4](#A396023_1_En_9_Chapter.html#Fig4).


    ![A396023_1_En_9_Fig4_HTML.jpg](A396023_1_En_9_Fig4_HTML.jpg)


    Figure 9-4. Select Maintenance Tasks


    That’s an interesting definition there as well. It removes empty data and log
    pages. Recall what this means in terms of the indexes discussed in Chapter [6](#A396023_1_En_6_Chapter.html)
    and [7](#A396023_1_En_7_Chapter.html). Reorganizing and rebuilding indexes would
    probably make this task more relevant, don’t you think? If the maintenance plan
    didn’t have to run and find the empty pages, it would certainly be more efficient.


    **Note:** The `Shrink Database` task shrinks both the transaction logs and the
    data file for the selected database. Transaction logs are shrunk first, with the
    filegroup shrunk afterward.


    Click `Next` to continue. You are taken to the `Select Maintenance Task Order`
    screen, shown in Figure [9-5](#A396023_1_En_9_Chapter.html#Fig5), so click `Next`
    here since we are only doing the one task.


    ![A396023_1_En_9_Fig5_HTML.jpg](A396023_1_En_9_Fig5_HTML.jpg)


    Figure 9-5. Select Maintenance Task Order


    It seems that we are always bypassing this screen, but we will definitely be using
    the concept of ordering tasks later, and you will see where this can become quite
    important. For now, though, just click `Next` at this screen and you will see
    the `Define Shrink Database Task` interface shown in Figure [9-6](#A396023_1_En_9_Chapter.html#Fig6).


    ![A396023_1_En_9_Fig6_HTML.jpg](A396023_1_En_9_Fig6_HTML.jpg)


    Figure 9-6. Define Shrink Database Task


    Go ahead and choose your database from the drop-down, but leave the rest of the
    options alone.


    What this means is that you want to shrink the database if it grows beyond 50MB.
    Otherwise, do nothing. So even though the maintenance task will run, if the database
    is 49.9MB, it will not execute. Interesting, huh? So make sure that you change
    this to a setting you can deal with.


    The amount of free space to retain after shrink is important. You don’t want to
    set this to 0. That would be silly because the first thing your database is going
    to do is request space from the operating system. You can leave this set to 10%,
    which shouldn’t be very much depending on the size of the database.


    Click `Next` and you will see the reporting options screen, and just like before,
    set these to the settings shown in Figure [9-7](#A396023_1_En_9_Chapter.html#Fig7).


    ![A396023_1_En_9_Fig7_HTML.jpg](A396023_1_En_9_Fig7_HTML.jpg)


    Figure 9-7. Select Report Options


    Again, the folder location is set to where we are writing our maintenance text
    files, so that the maintenance cleanup task can take care of them for us later.


    Clicking `Next` will show the summary, as shown in Figure [9-8](#A396023_1_En_9_Chapter.html#Fig8).


    ![A396023_1_En_9_Fig8_HTML.jpg](A396023_1_En_9_Fig8_HTML.jpg)


    Figure 9-8. Complete the Wizard


    So we defined our `Shrink Database` task to run every night at midnight on our
    `DEVTEST` database when it grows beyond 50MB. We want to leave 10% free space,
    and write the results to a file in `E:\SQL Server\Backups`. Looks pretty good!
    Click `Finish` and hope for the best, which, coincidentally, is shown in Figure
    [9-9](#A396023_1_En_9_Chapter.html#Fig9).


    ![A396023_1_En_9_Fig9_HTML.jpg](A396023_1_En_9_Fig9_HTML.jpg)


    Figure 9-9. Maintenance Plan Wizard Progress


    Always good to see those green check boxes!


    Don’t forget to update the job like in previous chapters. I named the job `Shrink
    Database`, as shown in Figure [9-10](#A396023_1_En_9_Chapter.html#Fig10).


    ![A396023_1_En_9_Fig10_HTML.jpg](A396023_1_En_9_Fig10_HTML.jpg)


    Figure 9-10. SQL Server Agent Jobs


    Your `Maintenance Plans` folder should now look like Figure [9-11](#A396023_1_En_9_Chapter.html#Fig11).


    ![A396023_1_En_9_Fig11_HTML.jpg](A396023_1_En_9_Fig11_HTML.jpg)


    Figure 9-11. Maintenance Plans


    ## Summary


    This chapter was short and sweet, but there is actually a lot to it. Let’s do
    a quick review.


    *   We looked at how important it is to set up the database initially as far as
    space requirements are concerned.

    *   We saw how quickly large databases grow, and how important it is to have a
    good maintenance plan in place to keep the size of the database in check.

    *   And we set up the actual maintenance plan to enforce the shrinking of the
    database.


    If you’ve gotten this far, you’re doing really well. I hope that you’ve learned
    something in this book so far, instead of just knowing where to click to make
    things happen.


    # 10. Updating Object Statistics


    Don’t worry; this book isn’t really about math. I’m not going to trick you into
    doing any statistics homework or anything. When SQL Server refers to statistics,
    what does that mean?


    Statistics, in this reference, means distribution statistics.


    Great… so what does that mean? If you remember back in Chapters [7](#A396023_1_En_7_Chapter.html)
    and [8](#A396023_1_En_8_Chapter.html), we talked about indexes. Remember how we
    said that, for the B-Tree structure, there were different levels and how each
    level fed the next higher level? Distribution statistics is what defines those
    levels.'
