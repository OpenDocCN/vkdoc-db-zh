    ![A396023_1_En_5_Fig15_HTML.jpg](A396023_1_En_5_Fig15_HTML.jpg)

    图 5-15：维护计划


    ## Summary


    到目前为止，我们已经完成了五章和三个维护计划。请注意，我们没有为 `SQL Server Agent` 作业章节创建维护计划。这是有意设计的。我们不想为它创建维护计划，因为我只是想展示如何独立于维护计划创建作业。换句话说，作业和维护计划之间有明确的区分，您现在应该认识到这一点。


    # 6. Cleaning Up Maintenance Files


    与第 [5](#A396023_1_En_5_Chapter.html) 章内容非常相似的是维护清理任务。历史记录和维护任务本可以联系在一起，但我可以理解为什么它们是分开的。


    ## Separation of History from Maintenance


    为什么历史记录和维护的清理任务是分开的？让我们看看这两个任务之间的区别。图 [6-1](#A396023_1_En_6_Chapter.html#Fig1)
    强调了需要注意的一些关键差异。


    ![A396023_1_En_6_Fig1_HTML.jpg](A396023_1_En_6_Fig1_HTML.jpg)

    图 6-1：维护清理任务与历史记录清理任务之间的差异


    这些差异用外行话来说意味着什么？以下是您需要了解的：


    *   `Maintenance Cleanup Task` 清理执行维护计划后留下的物理文件。当您查看记录维护计划步骤的文件系统时，可能会看到相当多的文件。当运行
    `Maintenance Cleanup Task` 时（取决于指定的时间段），这些文件将被删除。

    *   `Maintenance Cleanup` 任务清理文件系统中的 `.bak` 和 `.trn` 文件，但您需要为每种文件类型设置两个单独的维护计划，因为我们的文件系统像我这样设置（意味着我们将
    `.bak` 文件物理上与 `.trn` 文件分开存储）。

    *   `History Cleanup Task` 清理任务本身的历史记录，而不是物理文件。当您右键单击一个作业并选择“查看历史记录”时，该历史记录会在运行
    `History Cleanup Task` 时（取决于指定的时间段）消失，因为这些行已从 `msdb` 数据库中删除。


    现在我们了解了两种清理任务之间的区别，让我们看看如何设置 `Maintenance Cleanup Task`。'
