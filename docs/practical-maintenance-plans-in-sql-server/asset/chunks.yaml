    ## 设置维护计划


    右键单击 `维护计划` 并选择 `新建维护计划…` 以继续。输入 `通知操作员计划` 作为名称，如图 12-1 所示，然后单击 `确定`。


    ![A396023_1_En_12_Fig1_HTML.jpg](img/A396023_1_En_12_Fig1_HTML.jpg)

    *图 12-1. 新建维护计划*


    请确保此时 `工具箱` 已打开（`Ctrl+Alt+X`）。首先要做的就是更新该计划的默认选项，因此双击 `子计划` 名称（`Subplan_1`）并更新您的界面，如图
    12-2 所示。


    ![A396023_1_En_12_Fig2_HTML.jpg](img/A396023_1_En_12_Fig2_HTML.jpg)

    *图 12-2. 子计划属性*


    请注意，`计划` 框尚未设置。将其更改为 `每天 12:00 AM`，在 `计划` 页面上单击 `确定`，然后在返回到 `属性` 窗口时再次单击 `确定`。这将引导我们进入更新后的界面，如图
    12-3 所示。


    ![A396023_1_En_12_Fig3_HTML.jpg](img/A396023_1_En_12_Fig3_HTML.jpg)

    *图 12-3. “通知操作员计划”阶段*


    此时，我们已准备好添加 `通知操作员任务`，因此从工具栏单击并拖动 `通知操作员任务` 到该阶段中。


    ### 配置任务并了解操作员要求


    您首先注意到的是那个大红叉。就像在第 11 章中一样，我们需要定义此任务的参数。双击 `通知操作员任务`。您将看到如图 12-4 所示的内容。


    ![A396023_1_En_12_Fig4_HTML.jpg](img/A396023_1_En_12_Fig4_HTML.jpg)

    *图 12-4. 通知操作员任务*


    猜猜我们这里必须做什么？值得庆幸的是，Microsoft 让这相当容易确定。您可以看到 `本地服务器连接` 已经选中，所以没问题。在那下面，是系统上可用的操作员。


    请注意，您在这里没有选项来创建新操作员或编辑当前操作员。我认为这是设计使然，因为它显示了添加新操作员和使用现有操作员流程之间的明显脱节。将这两个任务分开，迫使用户理解其决定的后果，并强化了维护计划内正确流程的理念。我认为
    Microsoft 可能说过这样的话：“你不能添加一个不存在的操作员，对吧？因此，你必须首先添加一个操作员。而且别以为我们会让你用微软简化版的方式来做。你必须从
    SSMS 中的操作员区域来添加。一旦你完成了，然后才能回到这里添加操作员。” 这样有道理吗？可以将其视为微软在某种程度上迫使用户有意识地决定遵循使用此特定任务的规定方法。


    在流程的这一点上，您需要选择我们已经设置好的操作员。在其下方，您可以看到有 `主题` 和 `正文` 框。听起来像是一封电子邮件，不是吗？确实如此。否则我们为什么要使用已经设置好的操作员呢？当然，在操作员设置中，我们可以指定电子邮件、网络发送或寻呼机通知。如果我们没有为操作员指定电子邮件地址，但选择在这里通知他们，会发生什么？简短的回答是：不行。此任务专用于电子邮件地址。想要证据吗？


    ### 演示电子邮件要求


    让我们快速再设置两个操作员。取消当前打开的窗口，右键单击 `操作员`（在 `SQL Server Agent` 内；您可能需要单击屏幕底部的 `对象资源管理器`
    来显示此项）并选择 `新建操作员…`。输入如图 12-5 所示的信息。我们称这个为 `网络发送操作员`，“`网络发送地址`”的格式为 `DOMAIN\username`。


    ![A396023_1_En_12_Fig5_HTML.jpg](img/A396023_1_En_12_Fig5_HTML.jpg)

    *图 12-5. 新建操作员*


    完成后单击 `确定`，打开另一个 `新建操作员…` 窗口，并输入如图 12-6 所示的信息。我们称这个为 `寻呼机操作员`，并选中所有天数。


    ![A396023_1_En_12_Fig6_HTML.jpg](img/A396023_1_En_12_Fig6_HTML.jpg)

    *图 12-6. 新建操作员，常规选项卡*


    完成后单击 `确定`。此时，您应该有三个操作员，如图 12-7 所示。


    ![A396023_1_En_12_Fig7_HTML.jpg](img/A396023_1_En_12_Fig7_HTML.jpg)

    *图 12-7. 操作员*


    够简单吧。那么，使用 `通知操作员` 任务，让我们确定应该选择通知这些操作员中的哪一个。


    双击 `通知操作员任务`（它应该仍然在 SSMS 中打开着），并注意只有初始操作员被列出，如图 12-8 所示。


    ![A396023_1_En_12_Fig8_HTML.jpg](img/A396023_1_En_12_Fig8_HTML.jpg)

    *图 12-8. 通知操作员任务*


    嗯。这意味着在此上下文中，其他操作员都不是有效的操作员。想要更多证据吗？双击 `网络发送操作员` 或 `寻呼机操作员`，并注意电子邮件字段为空。我选择 `寻呼机操作员`
    进行操作。将电子邮件地址复制并粘贴到 “`电子邮件名称`” 框中。您现在应该看到如图 12-9 所示的内容。


    ![A396023_1_En_12_Fig9_HTML.jpg](img/A396023_1_En_12_Fig9_HTML.jpg)

    *图 12-9. 寻呼机操作员属性*


    因此，现在我们为 `寻呼机操作员` 指定了一个电子邮件地址。单击 `确定`。返回到 `通知操作员任务` 并双击它。图 12-10 显示了更新后的界面。


    ![A396023_1_En_12_Fig10_HTML.jpg](img/A396023_1_En_12_Fig10_HTML.jpg)

    *图 12-10. 通知操作员任务（已更新）*


    看看这个？`寻呼机操作员` 被添加进来了。


    因此，我们可以肯定地断言，一个操作员必须指定有电子邮件地址，才能被包含在 `通知操作员任务` 中并担任任何角色。


    现在，您可以通过右键单击并选择 `删除`，然后接受删除操作，来移除 `寻呼机操作员` 和 `网络发送操作员`。之后，您应该只剩下原始的操作员。


    ### 完成并测试任务


    继续完成任务！我们停留在界面的指定处，因此将其更新为如图 12-11 所示。


    ![A396023_1_En_12_Fig11_HTML.jpg](img/A396023_1_En_12_Fig11_HTML.jpg)

    *图 12-11. 通知操作员任务（已更新）*


    我们所做的只是添加了操作员并定义了一个通用的 `主题` 和 `正文`。此时单击 `确定`。


    请注意，我们的界面已更改，显示如图 12-12 所示的信息。


    ![A396023_1_En_12_Fig12_HTML.jpg](img/A396023_1_En_12_Fig12_HTML.jpg)

    *图 12-12. 通知操作员任务*


    这表明我们正在使用 `本地服务器连接`，并且 `Bradley Beard` 是我们的操作员。


    到目前为止一切顺利。那么接下来是什么？我们需要测试它。我们可以等到午夜，按我们计划的时间触发它，或者我们可以现在就运行它。让我们现在运行。


    首先，您需要保存目前的计划。保存后，`Notify Operator Plan.Email Operator` 作业会出现在 SSMS 中的 `SQL Server
    Agent` ➤ `作业` 文件夹中，如图 12-13 所示。


    ![A396023_1_En_12_Fig13_HTML.jpg](img/A396023_1_En_12_Fig13_HTML.jpg)

    *图 12-13. SQL Server Agent 作业*


    还有其他作业，但我现在只想关注这一个。右键单击它并选择 `从步骤开始作业…`，然后观察发生了什么。图 12-14 显示了预期的结果。


    ![A396023_1_En_12_Fig14_HTML.jpg](img/A396023_1_En_12_Fig14_HTML.jpg)

    *图 12-14. 成功！*


    成功！我喜欢这样。如果您收到了如图 12-15 所示的错误，请继续阅读。如果没有，请跳到本章末尾。


    ![A396023_1_En_12_Fig15_HTML.jpg](img/A396023_1_En_12_Fig15_HTML.jpg)

    *图 12-15. 或者失败了…*


    您说它失败了！？为什么它会失败呢？简而言之，它失败是因为我们尚未为该操作员设置配置文件。让我们现在来看看如何做。

