    SELECT firstname + '' '' + lastname FROM DEVTEST.dbo.users ORDER BY userid;

    ```


    That’s the extent of our query. And it is failing. So at this point, we have a
    choice to make: we can either chase down a system administrator and demand heightened
    permissions for the SQL Server Agent account on the server, or we can create another
    domain account for the SQL Server Agent to be running as (with heightened permissions
    as well). Perhaps there’s a third option, though? Tell me, can you successfully
    run this query by itself? Yes. So why can’t you be set as the “Run as” value?
    Oh, but you can!


    Double-click the T-SQL Plan maintenance plan and then double-click the Run Some
    SQL task in the gray area shown in Figure [11-21](#A396023_1_En_11_Chapter.html#Fig21).


    ![A396023_1_En_11_Fig21_HTML.jpg](A396023_1_En_11_Fig21_HTML.jpg)


    Figure 11-21.


    Run Some SQL


    This brings up our T-SQL statement box, with the query listed earlier. We’re going
    to change that around just slightly by entering the following SQL instead.


    ```

    USE DEVTEST

    GO

    SELECT firstname + '' '' + lastname FROM users ORDER BY userid

    EXEC AS LOGIN = ''[DOMAIN]\[USERNAME]'';

    ```


    Take a look at the first bit… it’s essentially the same as how we defined the
    SQL earlier, isn’t it? That’s right. Choosing to use the `USE` keyword or defining
    the database in the SQL as we did earlier accomplishes the same goal.


    An important note to this is that the package is still executed by SQL Server
    Agent. The task is executed under the context of my user account. Does that make
    sense?


    Save this maintenance plan and close it. Right-click the job and select Start
    Job at Step… and watch what happens in Figure [11-22](#A396023_1_En_11_Chapter.html#Fig22),
    just by changing that SQL query to include my login.


    ![A396023_1_En_11_Fig22_HTML.jpg](A396023_1_En_11_Fig22_HTML.jpg)


    Figure 11-22.


    Success!


    I love seeing that.


    ## Summary


    Let’s do a quick recap here…


    *   We set up another plan using the “other” way (design surface).

    *   We edited that plan using SQL Server Agent’s Job Properties.

    *   We discovered a possible failure in the query, so we rewrote the query and
    now it works.


    Your Jobs folder should now look like Figure [11-23](#A396023_1_En_11_Chapter.html#Fig23).


    ![A396023_1_En_11_Fig23_HTML.jpg](A396023_1_En_11_Fig23_HTML.jpg)


    Figure 11-23.


    SQL Server Agent Jobs


    Your Maintenance Plans folder should now look like Figure [11-24](#A396023_1_En_11_Chapter.html#Fig24).


    ![A396023_1_En_11_Fig24_HTML.jpg](A396023_1_En_11_Fig24_HTML.jpg)


    Figure 11-24.


    Maintenance Plans


    Excellent job on this chapter. Reread what you didn’t understand, though, especially
    the part about how to run the query with your user account instead of SQL Server
    Agent. Next, we will look at the Notify Operator Task, and then wind everything
    down for the conclusion. If you’ve made it this far, excellent job! You are well
    on your way to having the tools and the knowledge to create or maintain your own
    maintenance plan.


    # 12. Notifying Database Operators


    The purpose of the Notify Operator Task is specifically to set up a notification
    task. It can be for any event within the plan; that is, the takeaway for this
    one. It doesn’t have to be tied to any specific task either. You could conceivably
    have this task, by itself, and all it will do is notify an operator. What good
    could that possibly do? If this task is tied to nothing else, what could a simple
    notification do? Let’s look at how to set it up and I will explain the answer
    to that question as we go.'
  trans: '

    ## 执行维护计划


    右键单击作业，然后选择 `从步骤启动作业…` 来运行它。很可能，它会失败。我的就失败了！图 11-17 显示了这个失败。


    ![A396023_1_En_11_Fig17_HTML.jpg](img/A396023_1_En_11_Fig17_HTML.jpg)


    图 11-17. 启动作业


    是时候进行一些故障排除了。单击此框右侧的超链接，您将看到图 11-18 所示的内容。


    ![A396023_1_En_11_Fig18_HTML.jpg](img/A396023_1_En_11_Fig18_HTML.jpg)


    图 11-18. 启动作业错误


    哇。谢谢，微软。这除了告诉我们去阅读历史日志外，没有任何有用的信息。好吧，那我们就去读一下。关闭显示失败的窗口，右键单击作业，然后选择 `查看历史记录`。这将打开图
    11-19 所示的界面。


    ![A396023_1_En_11_Fig19_HTML.jpg](img/A396023_1_En_11_Fig19_HTML.jpg)


    图 11-19. 日志文件查看器


    有趣。展开此错误信息会显示“**无效的对象名 ''users''**”。嗯。关闭此窗口并打开 `T-SQL 计划`，如图 11-20 所示。双击 `运行一些
    SQL` 任务，同样如图 11-20 所示。


    ![A396023_1_En_11_Fig20_HTML.jpg](img/A396023_1_En_11_Fig20_HTML.jpg)


    图 11-20. T-SQL 计划


    既然错误明确指出 ''users'' 是一个无效的名称，那么让我们将查询修改为以下包含一个完全有效名称的形式：


    ```sql

    SELECT firstname + '' '' + lastname FROM DEVTEST.dbo.users ORDER BY userid;

    ```


    完成后单击 `确定`，然后保存维护计划。继续并右键单击 `T-SQL 任务` 作业，选择 `从步骤启动作业…` 来启动它。成功了吗？对我来说确实成功了。这是一个很好的教训，说明
    `SQL Server 代理` 默认查看的是 `master` 数据库，而不是我们特定的数据库。


    如果您的查询仍然失败，我在此给您一个重要的建议。您可以指定想要执行 SQL 的账户，而不是使用 `SQL Server 代理`，尽管在 `作业属性` > `步骤`
    > `编辑` > `运行身份` 中无法选择其他选项。想知道怎么做吗？


    回想一下我们最初的查询如下：


    ```sql

    SELECT firstname + '' '' + lastname FROM users ORDER BY userid;

    ```


    然后我们将其更新为如下形式：


    ```sql

    SELECT firstname + '' '' + lastname FROM DEVTEST.dbo.users ORDER BY userid;

    ```


    这就是我们查询的全部修改。但它仍然失败。所以此时，我们有一个选择：要么去找系统管理员，要求在服务器上为 `SQL Server 代理` 账户提升权限，要么为
    `SQL Server 代理` 创建另一个域账户来运行（同样具有提升的权限）。不过，也许还有第三种选择？告诉我，您能否单独成功运行这个查询？可以。那么为什么您不能被设置为“运行身份”的值呢？哦，但您是可以的！


    双击 `T-SQL 计划` 维护计划，然后双击图 11-21 灰色区域中显示的 `运行一些 SQL` 任务。


    ![A396023_1_En_11_Fig21_HTML.jpg](img/A396023_1_En_11_Fig21_HTML.jpg)


    图 11-21. 运行一些 SQL


    这将打开我们的 `T-SQL` 语句框，其中列出了之前的查询。我们将通过输入以下 SQL 稍微修改它。


    ```sql

    USE DEVTEST

    GO

    SELECT firstname + '' '' + lastname FROM users ORDER BY userid

    EXEC AS LOGIN = ''[DOMAIN]\[USERNAME]'';

    ```


    看看第一部分……它本质上与我们之前定义 SQL 的方式相同，不是吗？没错。选择使用 `USE` 关键字或像之前那样在 SQL 中定义数据库，达到的是同一个目标。


    这里需要注意的一个重要点是，包仍然由 `SQL Server 代理` 执行。任务是在我的用户账户上下文中执行的。这说得通吗？


    保存并关闭此维护计划。右键单击作业并选择 `从步骤启动作业…`，看看图 11-22 中会发生什么，只需将该 SQL 查询更改为包含我的登录名即可。


    ![A396023_1_En_11_Fig22_HTML.jpg](img/A396023_1_En_11_Fig22_HTML.jpg)


    图 11-22. 成功！


    我喜欢看到这个。


    ## 总结


    我们来快速回顾一下……


    *   我们使用“另一种”方式（设计界面）设置了另一个计划。

    *   我们使用 `SQL Server 代理` 的 `作业属性` 编辑了该计划。

    *   我们发现了查询中可能的失败，因此重写了查询，现在它工作了。


    您的 `作业` 文件夹现在应该如图 11-23 所示。


    ![A396023_1_En_11_Fig23_HTML.jpg](img/A396023_1_En_11_Fig23_HTML.jpg)


    图 11-23. SQL Server 代理作业


    您的 `维护计划` 文件夹现在应该如图 11-24 所示。


    ![A396023_1_En_11_Fig24_HTML.jpg](img/A396023_1_En_11_Fig24_HTML.jpg)


    图 11-24. 维护计划


    本章做得非常出色。请重读您不理解的部分，特别是关于如何使用您的用户账户而不是 `SQL Server 代理` 运行查询的那部分。接下来，我们将了解 `通知操作员任务`，然后为结束做准备。如果您已经走到这一步，做得太棒了！您即将拥有创建或维护自己的维护计划所需的工具和知识。


    ## 12. 通知数据库操作员


    `通知操作员任务` 的目的是专门设置一个通知任务。它可以用于计划中的任何事件；也就是说，这是本节的关键点。它也不必绑定到任何特定的任务。您可以设想仅拥有此任务，它将做的只是通知一个操作员。那可能有什么好处呢？如果这个任务不与其他任何东西绑定，一个简单的通知能做什么呢？让我们看看如何设置它，我将在过程中解释这个问题的答案。

    '
- fmt: '## Setting Up the Maintenance Plan


    Right-click `Maintenance Plans` and choose `New Maintenance Plan…` to continue.
    Enter `Notify Operator Plan` as the name, as shown in Figure [12-1](#A396023_1_En_12_Chapter.html#Fig1),
    and click `OK`.


    ![A396023_1_En_12_Fig1_HTML.jpg](A396023_1_En_12_Fig1_HTML.jpg)

    *Figure 12-1. New Maintenance Plan*


    Make sure that the `Toolbox` is open at this point (`Ctrl+Alt+X`). The first bit
    to do is update the default options for the plan, so double-click the `Subplan`
    name (`Subplan_1`) and update your interface, as shown in Figure [12-2](#A396023_1_En_12_Chapter.html#Fig2).


    ![A396023_1_En_12_Fig2_HTML.jpg](A396023_1_En_12_Fig2_HTML.jpg)

    *Figure 12-2. Subplan Properties*


    Notice that the `Schedule` box is not set yet. Change this to `Daily at 12:00
    AM`, click `OK` on the `Schedule` page, and then click `OK` when you get back
    to the `Properties` window. This leads us to the updated interface, as shown in
    Figure [12-3](#A396023_1_En_12_Chapter.html#Fig3).


    ![A396023_1_En_12_Fig3_HTML.jpg](A396023_1_En_12_Fig3_HTML.jpg)

    *Figure 12-3. Notify Operator Plan stage*


    At this point, we are ready to add the `Notify Operator Task`, so click and drag
    the `Notify Operator Task` from the toolbar into the stage.


    ### Configuring the Task and Understanding Operator Requirements


    The first thing that you notice is the big red X. Just like in Chapter [11](#A396023_1_En_11_Chapter.html),
    we need to define the parameters of this task. Double-click the `Notify Operator
    Task`. You will see what is shown in Figure [12-4](#A396023_1_En_12_Chapter.html#Fig4).


    ![A396023_1_En_12_Fig4_HTML.jpg](A396023_1_En_12_Fig4_HTML.jpg)

    *Figure 12-4. Notify Operator Task*


    Guess what we have to do here? Thankfully, Microsoft makes this fairly easy to
    ascertain. You can see that `Local server connection` is already selected, so
    that’s fine. Underneath that, you have the available operators on the system.


    Notice that you don’t have the option here to create a new operator, or edit the
    current operator. I believe this is by design, as it shows a definite disjoint
    between the process of adding a new operator and using an existing operator. Keeping
    those two tasks separate forces the user to understand the ramifications of their
    decision, as well as reinforces the idea of proper flow within a maintenance plan.
    I believe that Microsoft said something like, “You can’t add an operator that
    doesn’t exist, now can you? Therefore, you must add an operator first. And don’t
    think we’re going to let you do it the Microsoft Lite way either. You’re going
    to have to do this from the operator’s area in SSMS. Once you do that, then you
    can come back in here and add an operator.” Does that make sense? Think of it
    as Microsoft sort of forcing the user to make the conscious decision to follow
    a prescribed method for using this particular task.


    At this point in the flow, you want to select the operator we already set up.
    Under that, you can see that there are boxes for `subject` and `body`. Sounds
    like an e-mail, doesn’t it? That’s because it is. Why else would we use the operator
    that we already set up? Now, granted, in the operator settings, we can specify
    e-mail, net send, or pager notifications. What happens if we don’t specify an
    e-mail address for an operator, but choose them to be notified here? Short answer:
    you can’t. This task is specifically for e-mail addresses. Want proof?


    ### Demonstrating the E-mail Requirement


    Let’s quickly set up two more operators. Cancel the current open window and right-click
    `Operators` (inside of `SQL Server Agent`; you may need to click `Object Explorer`
    at the bottom of the screen to show this) and choose `New Operator…`. Enter the
    information shown in Figure [12-5](#A396023_1_En_12_Chapter.html#Fig5). We will
    call this one `Net Send Operator`, with the “`Net send address`” being in the
    format of `DOMAIN\username`.


    ![A396023_1_En_12_Fig5_HTML.jpg](A396023_1_En_12_Fig5_HTML.jpg)

    *Figure 12-5. New Operator*


    Click `OK` when you’re done, open another `New Operator…` window, and enter the
    information shown in Figure [12-6](#A396023_1_En_12_Chapter.html#Fig6). We will
    call this one `Pager Operator`, with all days selected.


    ![A396023_1_En_12_Fig6_HTML.jpg](A396023_1_En_12_Fig6_HTML.jpg)

    *Figure 12-6. New Operator, General tab*


    Click `OK` when you’re done. At this point, you should have three operators, as
    shown in Figure [12-7](#A396023_1_En_12_Chapter.html#Fig7).


    ![A396023_1_En_12_Fig7_HTML.jpg](A396023_1_En_12_Fig7_HTML.jpg)

    *Figure 12-7. Operators*


    Easy enough. So with the `Notify Operators` task, let’s determine which of these
    operators we should choose to notify.


    Double-click the `Notify Operator Task` (it should still be up in SSMS) and notice
    that only the initial operator is listed, as shown in Figure [12-8](#A396023_1_En_12_Chapter.html#Fig8).


    ![A396023_1_En_12_Fig8_HTML.jpg](A396023_1_En_12_Fig8_HTML.jpg)

    *Figure 12-8. Notify Operator Task*


    Hmm. That means that none of the others are valid operators in this context. Want
    more proof? Double-click either the `Net Send Operator` or the `Pager Operator`
    and notice that the e-mail field is blank. I picked the `Pager Operator` to work
    with. Copy and paste the e-mail address in the “`E-mail name`” box. You should
    now see what is shown in Figure [12-9](#A396023_1_En_12_Chapter.html#Fig9).


    ![A396023_1_En_12_Fig9_HTML.jpg](A396023_1_En_12_Fig9_HTML.jpg)

    *Figure 12-9. Pager Operator properties*


    So now we have an e-mail address specified for the `Pager Operator`. Click `OK`.
    Go back to the `Notify Operator Task` and double-click it. Figure [12-10](#A396023_1_En_12_Chapter.html#Fig10)
    shows the updated interface.


    ![A396023_1_En_12_Fig10_HTML.jpg](A396023_1_En_12_Fig10_HTML.jpg)

    *Figure 12-10. Notify Operator Task (updated)*


    Would you look at that? The `Pager Operator` is added.


    Therefore, we can positively assert that an operator must have an e-mail address
    specified in order to be included in the `Notify Operator Task` in any capacity.


    You can remove the `Pager Operator` and `Net Send Operator` now by right-clicking
    and choosing `Delete`, and then accepting the deletion operation. You should then
    be left with just the original operator.


    ### Finalizing and Testing the Task


    On with the task! We left off with the specification of the interface, so update
    it to look like Figure [12-11](#A396023_1_En_12_Chapter.html#Fig11).


    ![A396023_1_En_12_Fig11_HTML.jpg](A396023_1_En_12_Fig11_HTML.jpg)

    *Figure 12-11. Notify Operator Task (updated)*


    All we did was add the operator and define a generic `subject` and `body`. Click
    `OK` at this point.


    Notice that our interface has changed to display the information shown in Figure
    [12-12](#A396023_1_En_12_Chapter.html#Fig12).


    ![A396023_1_En_12_Fig12_HTML.jpg](A396023_1_En_12_Fig12_HTML.jpg)

    *Figure 12-12. Notify Operator Task*


    This says that we are using our `local server connection` and `Bradley Beard`
    is our operator.


    Perfect so far. So what is next? We need to test it. Either we can wait until
    midnight, when we scheduled it to fire, or we can run it now. Let’s run it now.


    First of all, you want to save the plan so far. Once you save it, the `Notify
    Operator Plan.Email Operator` job appears in the `SQL Server Agent` ➤ `Jobs` folder
    in SSMS, as shown in Figure [12-13](#A396023_1_En_12_Chapter.html#Fig13).


    ![A396023_1_En_12_Fig13_HTML.jpg](A396023_1_En_12_Fig13_HTML.jpg)

    *Figure 12-13. SQL Server Agent Jobs*


    There are other jobs, but I want to focus on just this one for now. Right-click
    it and choose `Start Job at Step…` and watch what happens. Figure [12-14](#A396023_1_En_12_Chapter.html#Fig14)
    shows what to expect.


    ![A396023_1_En_12_Fig14_HTML.jpg](A396023_1_En_12_Fig14_HTML.jpg)

    *Figure 12-14. Success!*


    Success! I love it. If you got an error like the one shown in Figure [12-15](#A396023_1_En_12_Chapter.html#Fig15),
    read on. If not, skip ahead to the end of this chapter.


    ![A396023_1_En_12_Fig15_HTML.jpg](A396023_1_En_12_Fig15_HTML.jpg)

    *Figure 12-15. Or not…*


    It failed, you say?! Now why would it fail? In a nutshell, it failed because we
    haven’t set up a profile for the operator yet. Let’s look at how to do that now.'
