- '# 2. 准备环境


  武术学生首先学到的事情之一是如何摔倒。为什么？这样他们就不会伤到自己。在我们开始开发这个任务之前，我想让你知道：你将会经历失败。测试会失败，代码不会按预期运行，事情会出错。当它们发生时，我希望你接受软件开发的几个普遍真理：


  1.  失败是正常的。

  2.  如何恢复。


  我无法过分强调生命周期管理的必要性，而源代码控制是其中的核心。我使用 [`Microsoft Azure DevOps`](https://dev.azure.com)，但请随意使用任何可用的优秀源代码控制解决方案。在撰写本文时，对于五人或以下的团队，`Azure
  DevOps` 是免费的。源代码控制是你进行代码恢复的头号方法。请务必使用它。（你已经被警告过。）


  ## 创建 Azure DevOps 帐户


  在创建 `Azure DevOps` 项目之前，你需要一个 `Azure DevOps` 帐户。你可以通过访问 [`dev.​azure.​com`](https://dev.azure.com)
  来创建 `Azure DevOps` 帐户。在撰写本文时，基本的 `Azure DevOps Services` 对个人是免费的——有一些限制——最多支持五个用户，如图
  2-1 所示：


  ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig1_HTML.jpg](img/449652_2_En_2_Fig1_HTML.jpg)


  图 2-1


  个人服务的 `Azure DevOps` 定价（在撰写本文时）


  一旦你创建了 `Azure DevOps` 帐户并配置了一个组织，你就可以创建一个 `Azure DevOps` 项目。


  ## 创建 Azure DevOps 项目


  在 `Azure DevOps` 中有多个位置可以开始创建 `Azure DevOps` 项目。在撰写本文时，每个位置都显示一个“+ 新建项目”（`+ New
  project`）按钮，如图 2-2 所示：


