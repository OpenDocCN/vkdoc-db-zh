  向控制流添加两个 `序列容器`。将第一个命名为 `SEQ 步骤 1`，第二个命名为 `SEQ 步骤 2`。向 `SEQ 步骤 1` 添加一个 `执行目录包任务`，并将其重命名为
  `ECPT 执行 ReportAndSucceed`。配置 `ECPT 执行 ReportAndSucceed` 以同步执行 `ReportAndSucceed.dtsx`
  SSIS 包，如图 23-2 所示：


  ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig2_HTML.jpg](img/449652_2_En_23_Fig2_HTML.jpg)


  *图 23-2：配置 `ReportAndSucceed` 执行*


  向 `SEQ 步骤 1` 添加另一个 `执行目录包任务` 并将其重命名为 `ECPT 执行 RunForSomeTime`。配置 `ECPT 执行 RunForSomeTime`
  以同步执行 `ECPT 执行 RunForSomeTime.dtsx` SSIS 包，如图 23-3 所示：


