- '# 20. 添加同步执行属性


  第 19 章包含对两个严重错误的解决方案：


  1.  如果 SSIS 包执行时间超过 30 秒，`PackageInfo Execute()` 会返回一条错误消息：“任务执行方法返回错误代码 0x80131904（执行超时。在操作完成或服务器未响应之前超时时间段已过）。执行方法必须成功，并使用“out”参数指示结果。”


  2.  即使 SSIS 包执行失败，“执行目录包任务”也报告成功。


  第一个错误的解决方案涉及异步执行。`WaitHandle.WaitAny` 解决方案需要的三个设置是：


  *   `maximumRetries`：一个 `int` 变量，设置在终止 SSIS 目录包执行操作之前允许计时器“滴答”的次数。


  *   `retryIntervalSeconds`：一个 `int` 变量，设置计时器“滴答”或重试之间的秒数。


  *   `operationTimeoutMinutes`：一个 `int` 变量，设置在终止 SSIS 目录包执行操作之前允许的分钟数。


  在开发的这个阶段，`maximumRetries`、`retryIntervalSeconds` 和 `operationTimeoutMinutes` 变量及其值被硬编码到
  `ExecuteCatalogPackageTask` 类的 `executeSynchronous` 辅助函数中。`maximumRetries`、`retryIntervalSeconds`
  和 `operationTimeoutMinutes` 变量应该真正是 `ExecuteCatalogPackageTask` 类的属性，以便 SSIS 开发人员可以在同步
  SSIS 包执行超过 30 秒时配置这些值。


  此外，属性值是相关的，`maximumRetries` * `retryIntervalSeconds` 应小于 `operationTimeoutMinutes`
  / 60 的值，以避免执行超时。




  ## 呈现新属性


  新属性应在视觉上与 `SettingsNode` 中的 `Synchronized` 属性设置相关联，并且 `Synchronized` 属性应与 `SettingsNode`
  中的 “SSIS Package Execution Properties” 类别分开。首先，通过编辑 `SettingsNode` 中的 `Synchronized`
  属性，将其放入名为 “SSIS Package Synchronized Properties” 的独立类别中，使用清单 20-1 中的代码：


  ```

  [

  Category("SSIS Package Synchronized Properties"),

  Description("输入 SSIS 目录包 SYNCHRONIZED 执行参数值。")

  ]

  public bool Synchronized {

  get { return _task.Synchronized; }

  set { _task.Synchronized = value; }

  }

  清单 20-1

  编辑 Synchronized 属性类别

  ```


  编辑后，代码如图 20-1 所示：


  ![../images/449652_2_En_20_Chapter/449652_2_En_20_Fig1_HTML.jpg](img/449652_2_En_20_Fig1_HTML.jpg)


  图 20-1：`Synchronized` 属性现在位于 SSIS Package Synchronized Properties 类别中。


  构建 `ExecuteCatalogPackageTask` 解决方案，然后将执行目录包任务添加到测试 SSIS 包中。打开执行目录包任务编辑器，并注意 `Synchronized`
  属性的新位置，如图 20-2 所示：


  ![../images/449652_2_En_20_Chapter/449652_2_En_20_Fig2_HTML.jpg](img/449652_2_En_20_Fig2_HTML.jpg)


  图 20-2：编辑后的 `Synchronized` 属性。


  `Synchronized` 属性现在拥有其独立的属性类别，名为 “SSIS Package Synchronized Properties”。


  下一步是添加属性以管理 `maximumRetries`、`retryIntervalSeconds` 和 `operationTimeoutMinutes`
  值。


  ### 添加 MaximumRetries、RetryIntervalSeconds 和 OperationTimeoutMinutes


  使用清单 20-2 中的代码为 `ExecuteCatalogPackageTask` 对象添加新属性：


  ```

  public int MaximumRetries { get; set; } = 29;

  public int RetryIntervalSeconds { get; set; } = 10;

  public int OperationTimeoutMinutes { get; set; } = 5;

  清单 20-2

  向 ExecuteCatalogPackageTask 类添加 MaximumRetries、RetryIntervalSeconds 和 OperationTimeoutMinutes
  属性

  ```


  添加后，代码如图 20-3 所示：


  ![../images/449652_2_En_20_Chapter/449652_2_En_20_Fig3_HTML.jpg](img/449652_2_En_20_Fig3_HTML.jpg)


  图 20-3：添加到 `ExecuteCatalogPackageTask` 类的 `MaximumRetries`、`RetryIntervalSeconds`
  和 `OperationTimeoutMinutes` 属性。


  请注意，`MaximumRetries` 的默认值 (29) 乘以 `RetryIntervalSeconds` 的默认值 (10) 等于 290。当应用于 SSIS
  包执行过程时，计时器将在“超时”之前，每 10 秒“滴答”一次，共“滴答”29 次。`OperationTimeoutMinutes` 的默认值为 5，即 300
  秒。计时器操作超时时间大于 `MaximumRetries * RetryIntervalSeconds`，这是一个不错的起点。


  接下来，通过将清单 20-3 中的代码添加到 `SettingsView.cs` 文件，将 `MaximumRetries`、`RetryIntervalSeconds`
  和 `OperationTimeoutMinutes` 属性呈现在 `SettingsNode` 上：


  ```

