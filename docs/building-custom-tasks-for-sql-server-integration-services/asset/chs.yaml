  \n下一步是重构我们在 `ExecuteCatalogPackageTask` 中识别目录、文件夹、项目和包的方式。\n\n## 识别目录、文件夹、项目和包\n\
  \n“我们要解决的问题是什么？”这是我从一位导师那里学到的问题。这是一个好问题。我们要解决的问题是*更好*的连接管理。到目前为止，连接管理一直…*勉强够用*。当前设计中的连接管理忽略了至少两个有效的用例：\n\
