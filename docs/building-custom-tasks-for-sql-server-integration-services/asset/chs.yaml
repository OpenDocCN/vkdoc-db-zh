  图 16-9：更新 `TaskType` 属性\n\n`ExecuteCatalogPackageTask` 解决方案已降级完成，`ExecuteCatalogPackageTask`\
  \ 现已为 Azure-SSIS 做好准备。\n\n\n\n## 重构连接识别\n\n### 添加连接属性\n连接管理器识别至关重要——尤其是在连接字符串属性被动态管理或在执行时被覆盖的情况下。重构连接识别的第一步是使用清单\
