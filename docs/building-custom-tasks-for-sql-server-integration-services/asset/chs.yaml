  \ ExecuteCatalogPackageTask 类的 Connections、ConnectionManagerId 和 ConnectionManagerIndex*\n\
  \n### 初始化 Connections 变量\n通过向 `ExecuteCatalogPackageTask.InitializeTask` 方法添加清单\
  \ 16-2 中的代码来初始化 `Connections` 变量：\n\n```csharp\n// init Connections\nConnections\
  \ = connections;\n// Listing 16-2\n// 初始化 Connections\n```\n\n添加后，`ExecuteCatalogPackageTask.InitializeTask`\
  \ 方法如图 16-11 所示：\n\n![Figure 16-11](img/449652_2_En_16_Fig11_HTML.jpg)\n\n*图 16-11：更新后的\
  \ ExecuteCatalogPackageTask.InitializeTask 方法*\n\n### 创建 returnConnectionManagerIndex\
  \ 方法\n使用清单 16-3 中的代码创建 `returnConnectionManagerIndex` 方法，来初始化 `ConnectionManagerIndex`\
  \ 属性值：\n\n```csharp\nprivate int returnConnectionManagerIndex(Connections connections\n\
  , string connectionManagerName)\n{\n    int ret = -1;\n    try\n    {\n        ConnectionManagerId\
  \ = GetConnectionID(connections, ConnectionManagerName);\n        Microsoft.SqlServer.Dts.Runtime.ConnectionManager\
  \ connectionManager = connections[ConnectionManagerId];\n        ConnectionManagerName\
  \ = connectionManager.Name;\n        if (connectionManager != null)\n        {\n\
  \            for (int i = 0; i <= connections.Count; i++)\n            {\n     \
  \           if (connections[i].Name == connectionManager.Name)\n               \
  \ {\n                    ret = i;\n                    break;\n                }\n\
  \            }\n        }\n    }\n    catch (Exception ex)\n    {\n        string\
  \ message = \"Unable to locate connection manager: \" + ConnectionManagerName;\n\
  \        throw new Exception(message, ex.InnerException);\n    }\n    return ret;\n\
  }\n// Listing 16-3\n// returnConnectionManagerIndex 方法\n```\n\n添加后，`returnConnectionManagerIndex`\
  \ 方法如图 16-12 所示：\n\n![Figure 16-12](img/449652_2_En_16_Fig12_HTML.jpg)\n\n*图 16-12：returnConnectionManagerIndex\
