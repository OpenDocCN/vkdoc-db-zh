  ## 创建 Main.cmd 文件


  `main.cmd` 文件在每个 Azure-SSIS 节点启动时，在该节点上执行 Windows 安装程序应用程序 `msiexec.exe`。首先，打开您喜欢的文本编辑器并输入清单
  24-1 中所示的文本：


  ```

  @echo off

  rem execute the msi

  msiexec /i %~dp0\ExecuteCatalogPackageTask.msi /passive /l %CUSTOM_SETUP_SCRIPT_LOG_DIR%\ExecuteCatalogPackageTaskInstall.log

  echo

  echo Execute Catalog Package Task installed.

  Listing 24-1

  Main.cmd

  ```


