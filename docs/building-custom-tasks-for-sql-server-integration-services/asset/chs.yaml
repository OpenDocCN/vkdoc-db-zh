  \ 所示：\n\n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig12_HTML.jpg](img/449652_2_En_22_Fig12_HTML.jpg)\n\
  图 22-12\n更新 Product 标签\n\n## 配置 Package 标签\n\n安装过程需要管理员权限以搜索注册表、安装到 Program Files\
