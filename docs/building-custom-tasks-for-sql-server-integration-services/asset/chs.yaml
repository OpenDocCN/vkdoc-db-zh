- "# 15. 实现 Use32bit、Synchronized 和 LoggingLevel 设置视图属性\n\n在第 13 章和第 14 章中，我们实现了 `常规视图`\
  \ 和 `设置视图`。在本章中，我们将实现额外的 `设置节点` 属性——`Use32bit`、`Synchronized` 和 `LoggingLevel`。添加\
  \ `SourceConnection` 属性的过程很紧张，因此我们本章首先添加一个直接且简单的属性实现：`Use32bit`。请注意，强度将会增加。\n\n\
  ## 指定 32 位接口\n\nSSIS 与供应商无关，这意味着 SSIS 可以连接到服务器上安装的几乎任何数据提供程序。如果 SSIS 能够连接到提供程序，它就可以通过该提供程序读写该提供程序提供接口的资源。\n\
  \n### 添加 Use32bit 属性\n\n有些提供程序公开 32 位接口。少数提供程序*仅*公开 32 位接口。因此，SSIS 目录允许开发人员和操作员通过在执行时将“使用\
  \ 32 位”布尔值设置为 true，以 32 位模式执行 SSIS 包。\n\n要将 `Use32bit` 属性添加到 `设置节点`，我们首先将清单 15-1\
  \ 中的代码添加到 `设置节点` 类：\n\n```\n[\nCategory(\"SSIS 包执行属性\"),\nDescription(\"输入 SSIS\
  \ 目录包 Use32bit 执行属性值。\")\n]\npublic bool Use32bit {\nget { return _task.Use32bit;\
  \ }\nset { _task.Use32bit = value; }\n}\n清单 15-1：将 `Use32bit` 属性添加到 `设置节点`\n```\n\
  \n添加后，`设置节点 Use32bit` 属性代码如图 15-1 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig1_HTML.jpg](img/449652_2_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1：已实现的 `设置节点 Use32bit` 属性\n\n下一步是更新 `执行目录包任务执行` 方法，以使用在 `Use32bit` 属性中设置的值。将\
  \ `catalogPackage.Execute(false, null);` 语句编辑为与清单 15-2 中的代码匹配：\n\n```\ncatalogPackage.Execute(Use32bit,\
  \ null);\n清单 15-2：配置 `执行目录包任务执行` 方法以使用 `Use32bit` 属性\n```\n\n编辑后，`执行目录包任务执行` 方法如图\
  \ 15-2 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig2_HTML.jpg](img/449652_2_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2：`执行目录包任务执行` 方法现在使用 `Use32bit` 属性\n\n就是这样。`Use32bit` 属性已经实现。这并不那么困难，对吧？\n\
  \n### 测试 Use32bit\n\n要测试 `Use32bit` 属性，请构建 `执行目录包任务` 解决方案，打开一个测试 SSIS 包，并将 `执行目录包任务`\
  \ 配置为执行已部署到 SSIS 目录的 SSIS 包。将 `Use32bit` 属性设置为 True，如图 15-3 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig3_HTML.jpg](img/449652_2_En_15_Fig3_HTML.jpg)\n\
  \n图 15-3：将 `Use32bit` 属性设置为 True\n\n单击确定按钮，然后执行测试 SSIS 包。如果一切按计划进行，包执行将在 SSIS 目录中成功。检查是否设置了\
  \ `Use32bit` 属性的一种方法是执行清单 15-3 中的 T-SQL 查询：\n\n```\nSelect folder_name\n, project_name\n\
  , package_name\n, use32bitruntime\nFrom SSISDB.catalog.executions\nOrder by execution_id\
  \ DESC\n清单 15-3：检查是否设置了 `Use32bit`\n```\n\n执行清单 15-3 中的 T-SQL 会返回确认 `Use32bit` 属性有效的结果，如图\
  \ 15-4 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig4_HTML.jpg](img/449652_2_En_15_Fig4_HTML.jpg)\n\
  \n图 15-4：运行中的 `Use32bit` 属性\n\n下一个属性是 `Synchronized`，其实现与 `Use32bit` 属性的实现一样简单。\n\
  \n\n## 添加同步属性\n\n默认情况下，在 SSIS 目录中执行的 SSIS 包，其 **Synchronized**（同步）执行参数设置为 `false`。`false`\
  \ 的 Synchronized 执行参数意味着 SSIS 目录执行引擎会查找并启动 SSIS 包，然后立即返回。SSIS 包可能会继续执行——持续数小时或数天——之后才失败。监控\
  \ SSIS 执行的人员必须检查 SSIS 包执行的状态，以确定执行实例的当前状态。一个监控 SSIS 包执行实例状态的好方法是，查看 SQL Server Management\
  \ Studio (SSMS) 内置的 SSIS 目录“所有执行”和“概览”报告。\n\n如果希望 SSIS 包执行过程保持“进程内”，或者持续显示为正在运行状态直到执行实例完成，可以将\
  \ **Synchronized** 执行参数设置为 `true`。为了将 **Synchronized** 属性添加到 `SettingsNode`，我们首先将清单\
  \ 15-4 中的代码添加到 `SettingsNode` 类中：\n\n```\n[\nCategory(\"SSIS 包执行属性\"),\nDescription(\"\
  输入 SSIS 目录包 SYNCHRONIZED 执行参数值。\")\n]\npublic bool Synchronized {\nget { return\
  \ _task.Synchronized; }\nset { _task.Synchronized = value; }\n}\n```\n**清单 15-4**\
  \ 将 Synchronized 属性添加到 SettingsNode\n\n添加后，`SettingsNode Synchronized` 属性代码如图 15-5\
  \ 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig5_HTML.jpg](img/449652_2_En_15_Fig5_HTML.jpg)\n\
  \n**图 15-5** 已实现的 SettingsNode Synchronized 属性\n\n下一步是更新 `ExecuteCatalogPackageTask\
  \ Execute` 方法，以使用 **Synchronized** 属性中设置的值。编辑 `Execute` 方法不像实现 `Use32bit` 属性那样简单直接；它稍微复杂一些。首先，我们需要查看\
  \ `ExecuteCatalogPackageTask Execute` 方法中的 `Execute` 重载。\n\n### 检查 Execute() 重载\n\
  \n要查看 SSIS 包 `Execute` 方法的可用重载，请在 `ExecuteCatalogPackageTask` 代码中找到 `Execute` 方法。定位调用执行\
  \ SSIS 包的那行代码——即我们刚才在添加 `Use32bit` 属性时更新过的那一行。此时，该行代码为 `catalogPackage.Execute(Use32bit,\
  \ null);`。选择左括号并再次键入一个左括号，以打开重载选项，如图 15-6 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig6_HTML.jpg](img/449652_2_En_15_Fig6_HTML.jpg)\n\
  \n**图 15-6** 查看重载 1/3\n\n通过查看重载列表，我们知道 `Execute` 函数有三个重载，因为重载工具提示显示“1/3”。我们还知道第一个重载接受两个参数：\n\
  \n*   一个名为 `use32RuntimeOn64` 的 `Boolean` 值——我们已提供了名为 `Use32bit` 的 `Boolean` 属性作为其值。\n\
  *   一个名为 `reference` 的 `EnvironmentReference` 值。\n\n如果我们点击“1/3”右侧的“下箭头”，可以查看第二个重载（2/3），如图\
  \ 15-7 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig7_HTML.jpg](img/449652_2_En_15_Fig7_HTML.jpg)\n\
  \n**图 15-7** 查看重载 2/3\n\n查看第二个重载（2/3）的参数列表，我们知道此 `Execute` 重载接受三个参数，前两个参数与第一个重载（1/3）相同：\n\
  \n*   一个名为 `use32RuntimeOn64` 的 `Boolean` 值——我们已提供了名为 `Use32bit` 的 `Boolean` 属性作为其值。\n\
  *   一个名为 `reference` 的 `EnvironmentReference` 值。\n*   一个或多个 `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet`\
  \ 值的 `Collection`，名为 `setValueParameters`。\n\n这第三个参数——名为 `setValueParameters` 的\
  \ `ExecutionValueParameterSet` 参数集合——将是存放我们现在正在编码的 `Synchronized` 属性值的参数。但首先，让我们看看第三个重载。\n\
  \n如果我们点击“2/3”右侧的“下箭头”，可以查看第三个重载（3/3），如图 15-8 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig8_HTML.jpg](img/449652_2_En_15_Fig8_HTML.jpg)\n\
  \n**图 15-8** 查看重载 3/3\n\n查看第三个重载（3/3）的参数列表，我们知道此 `Execute` 重载接受四个参数，前三个参数与第二个重载（2/3）相同：\n\
  \n*   一个名为 `use32RuntimeOn64` 的 `Boolean` 值——我们已提供了名为 `Use32bit` 的 `Boolean` 属性作为其值。\n\
  *   一个名为 `reference` 的 `EnvironmentReference` 值。\n*   一个或多个 `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet`\
  \ 值的 `Collection`，名为 `setValueParameters`。\n*   一个或多个 `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.PropertyOverrideParameterSet`\
  \ 值的 `Collection`，名为 `propertyOverrideParameters`。\n\n我们将在此版本的 `ExecuteCatalogPackageTask`\
  \ 中使用第二个重载（2/3）。\n\n添加 `ExecutionValueParameterSet` 有两个步骤：\n\n1.  构建 `ExecutionValueParameterSet`。\n\
  2.  将 `ExecutionValueParameterSet` 添加到对 `package.Execute()` 的调用中。\n\n### 构建 ExecutionValueParameterSet\n\
  \n`ExecutionValueParameterSet` 是 `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet`\
  \ 类型的一个集合。第一步是创建一个函数来构建并返回 `ExecutionValueParameterSet`，使用清单 15-5 中的代码：\n\n```\n\
  using System.Collections.ObjectModel;\n.\n.\n.\nprivate Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>\
  \ returnExecutionValueParameterSet(Microsoft.SqlServer.Management.IntegrationServices.PackageInfo\
  \ catalogPackage)\n{\n    // 初始化参数集合\n    Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>\
  \ executionValueParameterSet = new Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>();\n\
  \    // 设置 SYNCHRONIZED 执行参数\n    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\
  \ { ObjectType = 50, ParameterName = \"SYNCHRONIZED\", ParameterValue = Synchronized\
  \ });\n    return executionValueParameterSet;\n}\n```\n**清单 15-5** 构建 returnExecutionValueParameterSet\
  \ 函数\n\n将 `using System.Collections.ObjectModel;` 指令添加到 `ExecuteCatalogPackageTask.cs`\
  \ 文件头部，与其他 `using` 指令放在一起。\n\n添加后，`returnExecutionValueParameterSet` 函数如图 15-9 所示：\n\
  \n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig9_HTML.jpg](img/449652_2_En_15_Fig9_HTML.jpg)\n\
  \n**图 15-9** returnExecutionValueParameterSet 函数\n\n第 82 行声明 `returnExecutionValueParameterSet`\
  \ 函数返回类型为 `Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>`\
  \ 的值。\n\n第 86-87 行创建了一个名为 `executionValueParameterSet` 的 `Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>`\
  \ 类型的新变量。\n\n第 90-92 行，初始化了一个新的 `Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>`\
  \ 对象并将其添加到 `executionValueParameterSet` 集合中。\n\n第 94 行，`executionValueParameterSet`\
  \ 集合被返回给调用者，现在我们将注意力转向调用者。\n\n\n### 调用 `returnExecutionValueParameterSet` 函数\n\n\
  回到 `ExecuteCatalogPackageTask Execute` 方法，用清单 15-6 中的代码覆盖 `catalogPackage.Execute(Use32bit,\
  \ null);` 语句：\n\n```\nCollection executionValueParameterSet = returnExecutionValueParameterSet();\n\
  catalogPackage.Execute(Use32bit, null, executionValueParameterSet);\nListing 15-6\n\
  Updating package.Execute()\n```\n\n编辑完成后，`ExecuteCatalogPackageTask Execute` 方法末尾附近的代码如图\
  \ 15-10 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig10_HTML.jpg](img/449652_2_En_15_Fig10_HTML.jpg)\n\
  \n图 15-10\n`Package.Execute()`，更新后用于配置和使用执行参数\n\n下一步是向 `SettingsNode` 添加 `Synchronized`\
  \ 属性。\n\n### 向 `SettingsView` 添加 `Synchronized` 属性\n\n要向 `SettingsNode` 添加 `Synchronized`\
  \ 属性，首先将清单 15-7 中的代码添加到 `SettingsNode` 类：\n\n```\n[\nCategory(\"SSIS Package Execution\
  \ Properties\"),\nDescription(\"Enter SSIS Catalog Package SYNCHRONIZED execution\
  \ parameter value.\")\n]\npublic bool Synchronized {\nget { return _task.Synchronized;\
  \ }\nset { _task.Synchronized = value; }\n}\nListing 15-7\nAdding the Synchronized\
  \ property to SettingsNode\n```\n\n添加后，`SettingsNode Synchronized` 属性代码如图 15-11\
  \ 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig11_HTML.jpg](img/449652_2_En_15_Fig11_HTML.jpg)\n\
  \n图 15-11\n已实现的 `SettingsNode Synchronized` 属性\n\n下一步是测试 `SettingsNode Synchronized`\
  \ 属性。\n\n### 测试 `Synchronized`\n\n要测试 `Synchronized` 属性，构建 `ExecuteCatalogPackageTask`\
  \ 解决方案，打开一个测试 SSIS 包，并将执行目录包任务配置为执行已部署到 SSIS 目录的 SSIS 包。将 `Synchronized` 属性设置为 True，如图\
  \ 15-12 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig12_HTML.jpg](img/449652_2_En_15_Fig12_HTML.jpg)\n\
  \n图 15-12\n将 `Synchronized` 属性设置为 True\n\n单击“确定”按钮，并在调试模式下执行测试 SSIS 包。如果一切按计划进行，测试\
  \ SSIS 包的调试执行将成功，如图 15-13 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig13_HTML.jpg](img/449652_2_En_15_Fig13_HTML.jpg)\n\
