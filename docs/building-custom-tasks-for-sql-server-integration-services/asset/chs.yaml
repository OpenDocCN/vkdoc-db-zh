  图 22-11\nWix 标签\n\n下一步是配置 `Product` 标签。首先将 `Product` 标签的属性放在不同的行上。`Product Id` 值被配置为\
  \ \"`*`\"，这表示该值将自动生成。根据需要，将 `Product Name` 属性值更新为 \"Execute Catalog Package Task\"\
  ，同时更新 `Product Version` 和 `Product Manufacturer` 属性值。我建议将 `Product Language` 和 `UpgradeCode`\
