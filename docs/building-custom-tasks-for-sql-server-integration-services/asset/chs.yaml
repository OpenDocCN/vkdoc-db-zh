  图 18-11\n同步执行插桩\n\n插桩是降低总拥有成本的一种好方法。向开发人员和操作员提供准确及时的反馈，可以减少确定故障或失败根本原因所需的时间。\n\n\
  ## 验证\n\n验证对于防止尝试执行配置不当的代码尤为重要。验证是主动进行的，并且应遵循属性层次结构。让我们从 `SourceConnection` ➤ `Folder`\
  \ ➤ `Project` ➤ `Package` 层次结构的顶部开始，通过验证 `SourceConnection` 属性入手。\n\n### 验证 SourceConnection\
  \ 属性\n\n我们首先测试 `SourceConnection` 属性中是否存在值，如果不存在则引发异常。回顾一下，`SettingsNode.SourceConnection`\
  \ 属性设置 `ExecuteCatalogPackageTask.ConnectionManagerName` 属性，如清单 18-6 中的代码所示（另见清单\
  \ 13-23）：\n\n```\n[\nCategory(\"Connections\"),\nDescription(\"The SSIS Catalog\
  \ connection\"),\nTypeConverter(typeof(ADONetConnections))\n]\npublic string SourceConnection\
  \ {\nget { return _task.ConnectionManagerName; }\nset { _task.ConnectionManagerName\
  \ = value; }\n}\n清单 18-6\nSettingsNode 的 SourceConnection 属性\n```\n\n当 `SourceConnection`\
  \ 属性更改时，`SettingsView.propertyGridSettings_PropertyValueChanged` 中的代码使用清单 18-7 中的代码更新\
  \ `ExecuteCatalogPackageTask.ConnectionManagerName` 属性（另见清单 13-27）：\n\n```\ntheTask.ServerName\
  \ = returnSelectedConnectionManagerDataSourceValue(settingsNode.SourceConnection);\n\
  清单 18-7\n更新 ExecuteCatalogPackageTask 的 ServerName 属性\n```\n\n`ExecuteCatalogPackageTask`\
  \ 的 `ConnectionManagerName` 和 `ServerName` 属性初始化为 `String.Empty`，如清单 18-8 所示：\n\n\
  ```\npublic string ConnectionManagerName { get; set; } = String.Empty;\n.\n.\n.\n\
  public string ServerName { get; set; } = String.Empty;\n清单 18-8\n与 SourceConnection\
  \ 相关的属性初始化为 String.Empty\n```\n\n`ExecuteCatalogPackageTask` 的 `Validate` 方法由 SSIS\
  \ 执行引擎调用。因此，我们的验证代码应放在 `ExecuteCatalogPackageTask` 的 `Validate` 方法中。\n\n通过使用清单 18-9\
  \ 中的代码测试 `ConnectionManagerName` 和 `ServerName` 属性值是否为非空字符串，开始验证 `SourceConnection`\
  \ 属性：\n\n```\n// test for SourceConnection (ConnectionManagerName and ServerName)\
  \ existence\nif((ConnectionManagerName == \"\") || (ServerName == \"\"))\n{\nthrow\
  \ new Exception(\"Source Connection property is not configured.\");\n}\n清单 18-9\n\
  开始验证 SourceConnection\n```\n\n添加后，`Validate()` 如图 18-12 所示：\n\n`../images/449652_2_En_18_Chapter/449652_2_En_18_Fig12_HTML.jpg`\n\
  图 18-12\n已更新的 Validate 方法\n\n构建 `Execute Catalog Package Task` 解决方案，并通过将 `Execute\
  \ Catalog Package Task` 添加到测试 SSIS 程序包来测试更新后的任务版本，如图 18-13 所示：\n\n`../images/449652_2_En_18_Chapter/449652_2_En_18_Fig13_HTML.jpg`\n\
  图 18-13\n测试最新版本的 Execute Catalog Package Task\n\n有两个值得注意的变更：\n\n1.  `Execute Catalog\
  \ Package Task` 现在指示一个错误状态。\n2.  错误列表指示两个错误。“根源”错误列在错误列表窗口的第二位，内容为：Validation error.\
  \ Execute Catalog Package Task: The Validate method on the task failed, and returned\
  \ error code 0x80131500 (Source Connection property is not configured.). The Validate\
  \ method must succeed and indicate the result using an “out” parameter.\n\n`../images/449652_2_En_18_Chapter/449652_2_En_18_Fig14_HTML.jpg`\n\
  图 18-14\n清理验证错误\n\n错误检查——以及验证——代码应该*永不*失败。`Try-catch` 功能可以优雅地处理代码执行中的失败。我们不应该在逻辑中抛出异常，而应该利用最近添加的插桩功能来告知开发人员验证问题。\n\
  \n使用清单 18-10 中的代码重构 `Validate` 方法：\n\n\n\n```\npublic override DTSExecResult Validate(\n\
  Connections connections,\nVariableDispenser variableDispenser,\nIDTSComponentEvents\
  \ componentEvents,\nIDTSLogging log)\n{\n// 初始化 validateResult\nDTSExecResult validateResult\
  \ = DTSExecResult.Success;\n// 测试 SourceConnection (ConnectionManagerName 和 ServerName)\
  \ 是否存在\ntry\n{\nif ((ConnectionManagerName == \"\") || (ServerName == \"\"))\n{\n\
  logMessage(componentEvents\n, \"Error\"\n, -1001\n, TaskName\n, \"源连接属性未配置。\");\n\
  validateResult = DTSExecResult.Failure;\n}\n}\ncatch(Exception ex)\n{\nif(componentEvents\
  \ != null)\n{\n// 触发一个包含异常详情的通用错误\nlogMessage(componentEvents\n, \"Error\"\n, -1001\n\
  , TaskName\n, ex.Message);\n}\n// 管理 validateResult 状态\nvalidateResult = DTSExecResult.Failure;\n\
  }\nreturn validateResult;\n}\n```\n**代码清单 18-10**\n重构后的 Validate\n\n一旦重构完成，`Validate()`\
  \ 方法如图 18-15 所示：\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig15_HTML.jpg](img/449652_2_En_18_Fig15_HTML.jpg)\n\
  \n**图 18-15**\nValidate，已重构\n\n重构后的 `Validate()` 方法在第 66 行声明并初始化了一个名为 `validateResult`\
  \ 的 `DTSExecResult` 类型变量。`validateResult` 变量在整个 `Validate()` 方法中管理验证状态——参见第 79 行和第\
  \ 95 行——并在第 98 行从 `Validate()` 方法返回。\n\n第 69 行启动了一个 `try` 代码块，涵盖了第 71-81 行的代码。\n\
  \n第 71 行的代码测试 `ConnectionManagerName` 和 `ServerName` 属性是否为非空字符串值。如果在 `ConnectionManagerName`\
  \ 和 `ServerName` 属性中检测到非空字符串值，则代码调用 `logMessage` 函数，该函数在 SSIS 包中触发一个错误事件。\n\n`catch`\
  \ 代码块从第 82 行开始，涵盖了第 83-96 行的代码。\n\n第 84 行的代码检查传递给 `Validate()` 方法的 `componentEvents`\
  \ 参数是否不为 null。如果不为 null，则调用 `logMessage` 函数来引发一个错误事件，该事件包含由 `try` 代码块中的代码引发的任何*其他*错误的详细信息。\n\
  \n综合来看，这种验证设计模式检查一个特定条件，回答“SourceConnection 属性是否配置了值？”这个问题。如果 SourceConnection 属性*未*配置值，则会在\
  \ SSIS 包中引发错误。如果在检查 SourceConnection 属性是否配置值时发生任何其他错误，`catch` 代码块会引发一个配置为报告错误消息的错误事件。如果\
  \ SourceConnection 属性*已*配置值，并且在检查过程中未发生其他错误，则 `Validate()` 方法返回一个 `Success DTSExecResult`\
  \ 值。\n\n和之前一样，构建解决方案，并使用测试 SSIS 包测试更新后的 ExecuteCatalogPackageTask 功能。\n\n一旦 SourceConnection\
  \ 属性配置完成，`Validate()` 方法将不显示错误，如图 18-16 所示：\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig16_HTML.jpg](img/449652_2_En_18_Fig16_HTML.jpg)\n\
  \n**图 18-16**\n已验证的 SourceConnection 属性\n\n`ConnectionManagerName` 和 `ServerName`\
  \ 属性值的验证逻辑按设计工作。\n\n### 构建连接验证辅助函数\n\n下一步是确保 Execute Catalog Package Task 能够连接到由\
  \ `ConnectionManagerName` 和 `ServerName` 属性值配置的 SSIS 目录。验证连接将需要几个*辅助*函数。添加代码清单 18-11\
  \ 中的 `returnConnection` 和 `attemptConnection` 辅助函数：\n\n```\nprivate SqlConnection\
  \ returnConnection()\n{\nreturn (SqlConnection)Connections[ConnectionManagerId].AcquireConnection(null);\n\
  }\nprivate bool attemptConnection(Connections connections\n, int connectionManagerIndex)\n\
  {\nbool ret = false;\ntry\n{\nusing (System.Data.SqlClient.SqlConnection con = returnConnection())\n\
  {\nif (con.State != System.Data.ConnectionState.Open)\n{\ncon.Open();\n}\nret =\
  \ true;\n}\n}\ncatch (Exception ex)\n{\nret = false;\n}\nreturn ret;\n}\n```\n**代码清单\
  \ 18-11**\n连接验证辅助函数：returnConnection 和 attemptConnection\n\n为了支持连接管理器连接字符串覆盖，`returnConnection`\
  \ 返回一个通过调用 `Connections` 集合对象的 `AcquireConnection` 方法获得的 `SqlConnection`，该集合对象使用\
  \ `ConnectionManagerId` 值定义。如果连接管理器连接到 Azure SQL Database 实例——这可能需要用户名和密码（SQL 登录）——将\
  \ `AcquireConnection` 方法返回值转换为 `SqlConnection` 可能是获取此连接的唯一方法。\n\n`returnConnection`\
  \ 方法用于设置在调用 `attemptConnection` 方法时 Execute Catalog Package Task 所使用的连接。`attemptConnection`\
  \ 在任务属性 `Validate` 过程的早期被调用。\n\n添加后，`returnConnection` 和 `attemptConnection` 辅助函数如图\
  \ 18-17 所示：\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig17_HTML.jpg](img/449652_2_En_18_Fig17_HTML.jpg)\n\
  \n**图 18-17**\nattemptConnection 辅助函数\n\n`returnConnection` 方法的返回值是一个 `SqlConnection`。`returnConnection`\
  \ 方法中的代码只有一行，但那一行代码*很繁忙*。让我们来解析一下这行代码。\n\nSSIS 连接管理器的 `AcquireConnection` 方法返回一个\
  \ `SqlConnection` 类型值。可以连接到托管在 Azure SQL DB 中的 SSIS 目录。本书后面，我们将更详细地介绍使用 Execute\
  \ Catalog Package Task 来执行部署到 Azure 数据工厂 (ADF) SSIS 集成运行时 (IR)（通常称为“Azure-SSIS”）的\
  \ SSIS 包。虽然托管在本地的 SSIS 目录需要 Windows 身份验证才能进行交互（部署、执行），但可以使用 SQL 登录与托管在 Azure SQL\
  \ DB 上的 SSIS 目录进行交互。连接管理器*从不*公开密码。使用登录名建立到 Azure SQL DB 的连接的一种方法——也许是唯一的方法——是调用连接管理器的\
  \ `AcquireConnection` 方法。\n\n第 151 行的代码返回连接管理器的 `AcquireConnection` 方法，并向其传递 `txn`（事务）`object`\
  \ 参数的 `null` 值。连接管理器由 `ConnectionManagerId` 标识——这是一个在之前响应 `SourceConnection` 属性值更改时填充的唯一标识符，该更改在\
  \ `SettingsView propertyGridSettings_PropertyValueChanged` 方法中被检测到。设置 `ExecuteCatalogPackageTask\
  \ ConnectionManagerId` 属性有两个调用——一个用于创建新连接时，另一个用于选择现有连接管理器时。设置 `ConnectionManagerId`\
  \ 的代码行对于两种用例是相同的：`theTask.ConnectionManagerId = theTask.GetConnectionID(theTask.Connections,\
  \ theTask.ConnectionManagerName);`。`GetConnectionID` 方法内置于 `Microsoft.SqlServer.Dts.Runtime.Task`\
  \ .NET Framework 程序集中。\n\n`returnConnection` 方法返回一个 `SqlConnection` 类型值，而不管使用何种身份验证方法。\n\
  \n`attemptConnection` 方法的返回值是一个名为 `ret` 的布尔（`bool`）类型变量。`ret` 变量在第 157 行声明并初始化为\
  \ `false`。如果在代码能够在第 165 行打开连接——或者在第 163 行发现连接已经打开，则在第 167 行将 `ret` 设置为 `true`。一个\
  \ try-catch 块捕获异常，如果发生错误，则在第 172 行将 `ret` 设置为 `false`。`ret` 在第 175 行从函数返回。\n\n\n\
  \n## 在 Validate 方法中调用 attemptConnection\n\n下一步是向 Validate 方法中添加逻辑，通过调用 `attemptConnection`\
  \ 辅助函数（使用清单 18-12 中的代码）来测试 `SourceConnection` 属性与 SSIS 目录的连接性：\n\n```\n// attempt\
  \ to connect\nbool connectionAttempt = attemptConnection(connections\n, ConnectionManagerIndex);\n\
  if (!connectionAttempt)\n{\nlogMessage(componentEvents\n, \"Error\"\n, -1002\n,\
  \ TaskName\n, \"SQL Server Instance Connection attempt failed.\");\nvalidateResult\
  \ = DTSExecResult.Failure;\n}\nListing 18-12\n调用 attemptConnection\n```\n\n添加完成后，代码如图\
  \ 18-18 所示：\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig18_HTML.jpg](img/449652_2_En_18_Fig18_HTML.jpg)\n\
  \n**图 18-18**\n调用 `attemptConnection` 辅助函数\n\n## 我如何测试 attemptConnection 验证\n\n\
  要测试 `attemptConnection` 辅助函数，请生成 `ExecuteCatalogPackageTask` 解决方案。我在一台名为 `vDemo19`\
  \ 的虚拟机上配置了一个名为 “HadACatalog” 的新 SQL Server 实例。我在 `HadACatalog` 实例上创建了一个 SSIS 目录，如图\
