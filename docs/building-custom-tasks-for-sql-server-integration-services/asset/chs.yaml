  ## 创建和配置部署容器


  Azure Blob Storage 充当 Azure 文件系统。在本节中，我们将创建一个 Azure 存储帐户。Azure 存储帐户允许开发人员创建容器，这些容器在
  Azure 中存储文档以供分布式访问。要了解更多信息，请访问 `docs.microsoft.com/en-us/azure/storage/blobs/storage-blobs-introduction`。


  我们按照以下步骤创建和配置部署容器：


  1.  预配一个 Azure 存储帐户。

  2.  创建部署容器。

  3.  上传 `ExecuteCatalogPackageTask.msi` 文件。

  4.  创建并上传 `main.cmd` 文件。


