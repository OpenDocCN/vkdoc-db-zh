  \n图 19-29\n删除第一个参数\n\n根据错误列表，只剩下 18 个错误待解决（你的错误数量可能有所不同）—— 如图 19-30 所示：\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig30_HTML.jpg](img/449652_2_En_19_Fig30_HTML.jpg)\n\
  \n图 19-30\n剩余 18 个错误\n\n对剩余 18 处（你的错误数量可能有所不同）显示错误消息“名称 `logMessage` 在当前上下文中不存在”的调用，重复将\
  \ `logMessage` 重命名为 `raiseEvent` 以及删除第一个参数的操作。\n\n下一步是实现 `CheckWaitState.CheckStatus`\
  \ 方法，该方法是在计时器触发时（即将实现）调用的方法，使用的是代码清单 19-13 中的代码：\n\n```\npublic void CheckStatus(object\
  \ state)\n{\n    TimerCheckerState localState = ((TimerCheckerState)state);\n  \
  \  this.manualResetState = localState.manualResetState;\n    // increment the counter\n\
  \    invokeCount++;\n    // log this tick\n    string msg = \"Asynchronous Execution\
  \ Retry Count: \" + invokeCount.ToString() + \" (Maximum Retry Count: \" + maximumCount.ToString()\
  \ + \")\";\n    this.task.raiseEvent(\"Information\"\n        , 101\n        , this.task.TaskName\
  \ + \".CheckStatus\"\n        , msg);\n    // check for package execution reached\
  \ max count\n    if (invokeCount == maximumCount)\n    {\n        // log maximumCount\
  \ reached\n        msg = \"Asynchronous Execution Maximum Retry Count (\"\n    \
  \        + maximumCount.ToString() + \") reached.\";\n        this.task.raiseEvent(\"\
  Information\"\n            , 101\n            , this.task.TaskName + \".CheckStatus\"\
  \n            , msg);\n        // set OperationStatus\n        OperationStatus =\
  \ Operation.ServerOperationStatus.Canceled;\n        // reset counter\n        invokeCount\
  \ = 0;\n        // signal thread\n        manualResetState.Set();\n    }\n    else\n\
  \    {\n        OperationStatus = returnOperationStatus();\n        checkOperationStatus(OperationStatus);\n\
  \    }\n}\n```\n代码清单 19-13\n实现 `CheckWaitState.CheckStatus` 方法\n\n添加后，代码将如图 19-31\
  \ 所示：\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig31_HTML.jpg](img/449652_2_En_19_Fig31_HTML.jpg)\n\
  \n图 19-31\n已实现的 `CheckWaitState.CheckStatus` 方法\n\n随着计时器的每次滴答（计时器代码接下来将实现），`CheckWaitState.CheckStatus`\
  \ 方法会被调用。这段代码最重要的部分或许在第 578–579 行。在第 578 行，声明并初始化了一个 `TimerCheckerState` 类的变量 `localState`，其值是\
  \ `state` 对象参数转换为 `TimerCheckerState` 类型后的值。接下来，在第 579 行，将 `CheckWaitState.manualResetState`\
  \ 变量（`ManualResetEvent` 类型）的值设置为 `localState.manualResetState`。在第 582 行，一个名为 `invokeCount`\
  \ 的变量被递增，该变量用于跟踪计时器调用 `CheckWaitState.CheckStatus` 方法的次数。\n\n在第 584–591 行，生成了一条消息并引发了一个事件。消息变量——名为\
  \ `msg`——在第 585–586 行包含了 `invokeCount` 和 `maximumCount` 变量的值。调用 `ExecuteCatalogPackageTask.raiseEvent`\
  \ 方法，传入 `msg` 变量，以在 SSIS 包中引发事件消息。\n\n在第 594–618 行，检查 `invokeCount` 变量的值，看其是否已达到\
  \ `maximumCount` 变量的值。如果 `invokeCount` 已达到 `maximumCount` 变量的值，则在第 597–598 行配置 `msg`\
  \ 变量值以发送一条指示已达到 `maximumCount` 变量值的消息，在第 599–602 行引发一个事件，并在第 605 行将 `CheckWaitState.OperationStatus`\
  \ 属性值设置为 `Operation.ServerOperationStatus.Canceled`。在第 608 行将 `invokeCount` 变量值重置为\
  \ 0，并在第 611 行调用 `manualResetState` 的 `Set()` 方法。第 611 行的 `manualResetState.Set()`\
  \ 调用通知等待的线程，告知它们当前线程已完成其独占操作，这使得下一个等待线程知道现在可以执行了。\n\n如果 `invokeCount` 尚未达到 `maximumCount`\
  \ 变量的值，则通过调用 `CheckWaitState.returnOperationStatus` 方法（参见代码清单 19-8 和图 19-21）来设置\
  \ `CheckWaitState.OperationStatus` 属性值。接下来在第 617 行调用 `CheckWaitState.checkOperationStatus`\
  \ 方法（参见代码清单 19-9 和图 19-22）以确定当前操作状态是否已达到“已完成”状态。如前所述，如果 `CheckWaitState.checkOperationStatus`\
