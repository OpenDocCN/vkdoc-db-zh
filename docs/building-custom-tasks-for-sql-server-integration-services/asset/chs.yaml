  \ - dataSourceTagStart;\nret = connString.Substring(dataSourceTagStart, dataSourceTagLength);\n\
  }\n}\n}\nreturn ret;\n}\n```\n*代码清单 13-26 returnSelectedConnectionManagerDataSourceValue\
