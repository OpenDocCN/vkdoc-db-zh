  '
- '# 26. 来自我的经验笔记


  在学习构建自定义 SSIS 任务的过程中，我遇到了一些基础错误，我相信有经验的 .Net 开发者会避免这些错误。当我搜索解决方案时，我发现能得到的帮助非常少。原因是什么？我相信我遇到的问题对于开发针对全局程序集缓存（GAC）的解决方案的开发者来说并不典型。当一个人开始在控件空间进行开发时，通常被认为应该*已经知道*
  .Net 开发的某些事情。


  我当时并不知道其中一些事情。


  我遇到了哪些问题，以及我学到了哪些应该遵循的最佳实践？以下部分重点介绍了一些我的心得。




  ## 以管理员身份启动 Visual Studio


  你希望能够构建到系统文件夹。要构建到系统文件夹，需要以管理员身份启动 Visual Studio。当你打开 Visual Studio 时，右键单击 Visual
  Studio 磁贴，然后单击“**以管理员身份运行**”，如图 26-1 所示：


  ![../images/449652_2_En_26_Chapter/449652_2_En_26_Fig1_HTML.jpg](img/449652_2_En_26_Fig1_HTML.jpg)


  图 26-1: 以管理员身份运行 Visual Studio


  当你点击“以管理员身份运行 Visual Studio”时，系统会提示你确认是否希望以管理员身份运行 Visual Studio，如图 26-2 所示：


  ![../images/449652_2_En_26_Chapter/449652_2_En_26_Fig2_HTML.jpg](img/449652_2_En_26_Fig2_HTML.jpg)


  图 26-2: 确认你确实想以管理员身份运行 Visual Studio


  以管理员身份运行 Visual Studio 的原因是为了省去将 DLL 程序集从 `bin\Debug` 文件夹复制到 `…DTS\Tasks` 文件夹的额外步骤。你需要将这些
  DLL 放在 `Tasks` 文件夹中，以便 SQL Server Data Tools 能够为 SSIS 开发定位（并加载）它们。你还需要将这些 DLL 放在全局程序集缓存
  (GAC) 中，以便 SSIS 可以在运行时使用它们。


  ## 学习如何恢复


  备份无用，恢复无价。从制定恢复策略开始。问问自己：“我呀，如果发生了什么不幸，我该如何回到起点？” 尽早回答这个问题。你会庆幸自己这么做了。


  ### 创建笔记文件


  在构建 Visual Basic 或 C# 应用程序时，你可以在 Visual Studio 社区版中配置生成后事件。不过，构建一个笔记文件帮助我们熟悉了这些工具。我很高兴我们采取了这种方法。我的笔记文件包含在
  GAC 中注销和注册我的 DLL 的命令，以及使用强名称工具生成公钥/私钥对的密钥生成命令。截至本项目结束时，我的笔记文件如清单 26-1 所示：


  ```

  -- key generation

  "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
  -k key.snk

  "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
  -p key.snk public.out

  "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
  -t public.out

  -- register

  "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\gacutil.exe"
  -if "E:\Program Files (x86)\Microsoft SQL Server\150\DTS\Tasks\ExecuteCatalogPackageTask.dll"

  "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\gacutil.exe"
  -if "E:\Program Files (x86)\Microsoft SQL Server\150\DTS\Tasks\ExecuteCatalogPackageTaskUI.dll"

  -- unregister

  "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\gacutil.exe"
