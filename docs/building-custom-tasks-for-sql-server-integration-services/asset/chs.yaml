  \n`ExecuteCatalogPackageTask.wxs` 文件以一个 XML 声明开始，如图 22-10 所示：\n\n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig10_HTML.jpg](img/449652_2_En_22_Fig10_HTML.jpg)\n\
