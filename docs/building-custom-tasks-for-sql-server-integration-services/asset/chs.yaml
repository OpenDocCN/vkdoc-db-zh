- "# 16. 重构 SourceConnection\n\n本章的目标是重构与 `SourceConnection` 属性相关的 `ExecuteCatalogPackageTask`\
  \ 方法。目标包括：\n\n*   从 SSIS 2019 降级到 SSIS 2017，以便在 Azure 平台上运行。\n*   重构连接标识，以支持“服务器\
  \ ➤ Integration Services ➤ SSIS 目录 ➤ 文件夹 ➤ 项目 ➤ 包”的层次结构。\n*   重构 `SettingsView.SourceConnection`\
  \ 属性。\n*   识别“服务器 ➤ Integration Services ➤ SSIS 目录 ➤ 文件夹 ➤ 项目 ➤ 包”层次结构中的目录、文件夹、项目和包对象。\n\
  \n我们还为了另外两个目标重构了“执行目录包任务”：\n\n1.  使用表达式——这是本书此版本的主要目标之一。\n2.  在 Azure-SSIS 集成运行时中执行“执行目录包任务”。\n\
  \n\n## 思考 Azure-SSIS\n\n在撰写本文时（2020 年 10 月），Azure-SSIS 尚不支持 SSIS 2019。它支持 SSIS 2017，因此我们必须将任务和\
  \ Visual Studio 解决方案降级，以作为 SSIS 2017 自定义任务运行。Azure-SSIS 未来很可能会支持 SSIS 2019（我无法得知，也无法影响微软内部的决策和优先级）。\n\
  \n我建议你将开发工作迁移到配置了 Microsoft SQL Server 2017 且未配置 Microsoft SQL Server 2019 的机器上，以避免与\
  \ Microsoft .Net Framework 中的程序集发生冲突。\n\n首先，通过展开解决方案资源管理器中的“引用”虚拟文件夹来更新 `ExecuteCatalogPackageTask`\
