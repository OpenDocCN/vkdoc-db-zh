  \ `manualResetState` 的 `ManualResetEvent` 类型变量，并将其初始化为一个新的、设置为 `false` 的 `ManualResetEvent`。\n\
  \n`ExecuteCatalogPackageTask.executeSynchronous` 辅助函数被声明为返回一个 `Operation.ServerOperationStatus`\
  \ 类型的值，并且返回 `ret` 变量以满足该声明。\n\n接下来完善 `ExecuteCatalogPackageTask.executeSynchronous`\
  \ 辅助函数，在 `ManualResetEvent` 声明之后和 `return ret;` 语句之前，添加清单 19-15 中的代码：\n\n```csharp\n\
  int maximumRetries = 20;\nint retryIntervalSeconds = 10;\nint operationTimeoutMinutes\
  \ = 10;\nCheckWaitState statusChecker = new CheckWaitState(executionId\n, maximumRetries\n\
  , connection\n, PackageCatalogName\n, this);\nTimeSpan dueTime = new TimeSpan(0,\
  \ 0, 0);\nTimeSpan period = new TimeSpan(0, 0, retryIntervalSeconds);\nobject timerState\
  \ = new TimerCheckerState(manualResetState);\nTimerCallback timerCallback = statusChecker.CheckStatus;\n\
  Timer timer = new Timer(timerCallback, timerState, dueTime, period);\nWaitHandle[]\
  \ manualResetStateWaitHandleCollection = new WaitHandle[]\n{ manualResetState };\n\
  int timeoutMillseconds = (int)new TimeSpan(0, operationTimeoutMinutes\n, 0).TotalMilliseconds;\n\
  bool exitContext = false;\n// 请在此处等待\nWaitHandle.WaitAny(manualResetStateWaitHandleCollection\n\
  , timeoutMillseconds\n, exitContext);\nret = statusChecker.OperationStatus;\nmanualResetState.Dispose();\n\
  timer.Dispose();\n```\n\n*清单 19-15*\n完成 `ExecuteCatalogPackageTask.executeSynchronous`\n\
  \n添加后，`ExecuteCatalogPackageTask.executeSynchronous` 辅助函数如图 19-33 所示：\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig33_HTML.jpg](img/449652_2_En_19_Fig33_HTML.jpg)\n\
  \n*图 19-33*\n`ExecuteCatalogPackageTask.executeSynchronous` 辅助函数，代码完成\n\n实现这个基于\
  \ `WaitHandle.WaitAny` 的解决方案需要一个 `ManualResetEvent` 来检查正在执行的包的状态。每次 `Timer` 计时触发时（在第\
  \ 469 行配置），`Timer` 调用 `CheckWaitState` 类（见清单 19-13 和图 19-31）中名为 `CheckStatus` 的方法——该方法在第\
  \ 468 行被配置为名为 `timerCallback` 的 `TimerCallback` 类型变量——该方法会检查 SSIS 包执行的状态。`Timer`\
  \ 计时触发还配置为传递另外三个变量：\n\n*   `timerState`：一个 `TimerCheckerState` 变量，在第 467 行用 `manualResetState`（`ManualResetEvent`\
  \ 类型）变量初始化。\n*   `dueTime`：一个 `TimeSpan` 变量，在第 464 行初始化为“立即开始”（`TimeSpan(0, 0, 0);`）。\n\
  *   `period`：一个 `TimeSpan` 变量，在第 465 行初始化为 `retryIntervalSeconds` int 变量（在第 456\
  \ 行初始化为 10 秒）所表示的秒数。\n\n一个名为 `manualResetStateWaitHandleCollection` 的 `WaitHandle`\
  \ 集合在第 471-472 行被声明并初始化为 `manualResetState` 变量中的 `WaitHandle` 集合。一个名为 `timeoutMilliseconds`\
  \ 的 `int` 类型变量在第 473 行被声明并初始化为 `operationTimeoutMinutes` int 类型变量（在第 457 行声明并初始化）所表示的毫秒数。一个名为\
  \ `exitContext` 的 `bool` 类型变量在第 474 行被声明并初始化为 `false`。\n\n在第 477-479 行，调用了 `WaitHandle.WaitAny`，传入\
  \ `manualResetStateWaitHandleCollection`、`timeoutMilliseconds` 和 `exitContext` 变量的值。正是在这里，包执行线程开始*等待*（阻塞）对\
  \ `ExecuteCatalogPackageTask.executeSynchronous` 辅助函数的任何额外调用。\n\n在*同步*执行中，`CheckWaitState.CheckStatus`\
  \ 方法会在每次计时器触发时被调用，直到名为 `manualResetState` 的 `ManualResetEvent` 变量被手动重置。手动重置发生在满足以下两个条件之一时：\n\
  \n1.  `CheckWaitState.CheckStatus` 方法中的 `operationStatus` 变量指示 SSIS 包执行处于“完成”状态。\n\
  2.  重试次数（由 `CheckWaitState.CheckStatus` 方法中的 `invokeCount` 变量捕获）达到 `maximumRetries`\
  \ 变量值。\n\n第一种情况发生在 `CheckWaitState.CheckStatus` 方法指示重试次数 (`invokeCount`) *尚未*达到\
  \ `maximumRetries` 变量值，并且对 `CheckWaitState.returnOperationStatus` 方法的调用返回了 SSIS\
  \ 包执行 `OperationStatus` 为“完成”状态。SSIS 包执行 `OperationStatus` 由 `CheckWaitState.checkOperationStatus`\
  \ 方法评估。如果发现 SSIS 包执行 `OperationStatus` 处于“完成”状态，则通过将 `CheckWaitState.manualResetState`\
  \ 变量值设置为 true 来停止执行。\n\n第二种情况发生在 `CheckWaitState.CheckStatus` 方法指示重试次数 (`invokeCount`)\
  \ *已*达到 `maximumRetries` 变量值。\n\n在*异步* SSIS 包执行中，不会调用 `CheckWaitState.CheckStatus`\
  \ 方法。我们接下来构建的 `ExecuteCatalogPackageTask.evaluateStatus` 方法同时支持同步和异步的 SSIS 包执行。\n\
  \n下一步是通过使用清单 19-16 中的代码构建 `evaluateStatus` 辅助方法来重构 SSIS 包执行，以检查 `CheckWaitState.CheckStatus`\
  \ 方法中的 `operationStatus` 变量是否为“完成”状态：\n\n\n## 添加 `ExecuteCatalogPackageTask.evaluateStatus`\
  \ 辅助方法\n\n```\nprivate DTSExecResult evaluateStatus(Operation.ServerOperationStatus\
  \ os\n, string packagePath\n, string elapsed)\n{\nDTSExecResult ret = DTSExecResult.Success;\n\
  string msg = String.Empty;\nstring swMsg = String.Empty;\nif (Synchronized)\n{\n\
  swMsg = \" Package Execution Time: \" + elapsed;\n}\nswitch (os)\n{\ndefault:\n\
  break;\ncase Operation.ServerOperationStatus.Success:\nmsg = packagePath + \" on\
  \ \" + ServerName + (Synchronized ?\n(\" succeeded.\" + swMsg.Substring(0, (swMsg.Length\
  \ - 4))) :\n(\" started. Check SSIS Catalog Reports for package execution results.\"\
  ));\nraiseEvent((Synchronized ? \"Information\" : \"Warning\")\n, 1099, TaskName,\
  \ msg);\nret = DTSExecResult.Success;\nbreak;\ncase Operation.ServerOperationStatus.Created:\n\
  case Operation.ServerOperationStatus.Pending:\ncase Operation.ServerOperationStatus.Running:\n\
  msg = packagePath + \" on \" + ServerName + (Synchronized ?\n(\" \" + os.ToString().ToLower()\
  \ + \".\" + swMsg.Substring(0, (swMsg.Length - 4))) :\n(\" started. Check SSIS Catalog\
  \ Reports for package execution results.\"));\nraiseEvent((Synchronized ? \"Information\"\
  \ : \"Warning\")\n, 1099, TaskName, msg);\nret = DTSExecResult.Success;\nbreak;\n\
  case Operation.ServerOperationStatus.Failed:\nmsg = packagePath + \" on \" + ServerName\
  \ + (Synchronized ?\n(\" failed.\" + swMsg.Substring(0, (swMsg.Length - 4))) :\n\
  (\" started. Check SSIS Catalog Reports for package execution results.\"));\nraiseEvent(\"\
  Error\", -1099, TaskName, msg);\nret = DTSExecResult.Failure;\nbreak;\ncase Operation.ServerOperationStatus.UnexpectTerminated:\n\
  msg = packagePath + \" on \" + ServerName + (Synchronized ?\n(\" terminated unexpectedly.\"\
  \ + swMsg.Substring(0, (swMsg.Length - 4))) :\n(\" started. Check SSIS Catalog Reports\
  \ for package execution results.\"));\nraiseEvent(\"Error\", -1099, TaskName, msg);\n\
  ret = DTSExecResult.Failure;\nbreak;\ncase Operation.ServerOperationStatus.Canceled:\n\
  msg = packagePath + \" on \" + ServerName + (Synchronized ?\n(\" was canceled.\"\
  \ + swMsg.Substring(0, (swMsg.Length - 4))) :\n(\" started. Check SSIS Catalog Reports\
  \ for package execution results.\"));\nraiseEvent(\"Error\", -1099, TaskName, msg);\n\
  ret = DTSExecResult.Failure;\nbreak;\n}\nreturn ret;\n}\n```\n列表 19-16\n添加 `ExecuteCatalogPackageTask.evaluateStatus`\
  \ 辅助方法\n\n一旦添加，`ExecuteCatalogPackageTask.evaluateStatus`方法将如图 19-34 所示：\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig34_HTML.jpg](img/449652_2_En_19_Fig34_HTML.jpg)\n\
