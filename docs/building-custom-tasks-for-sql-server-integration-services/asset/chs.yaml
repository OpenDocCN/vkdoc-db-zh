  \n图 22-4\n\n将 `ExecuteCatalogPackageTask.wxs` 文件重命名为 `ExecuteCatalogPackageTask.wxs`\n\
  \n下一步是添加引用。\n\n### 配置标签\n\n在本节中，我们配置 `WiX` 标签以构建安装项目，用于在运行 `SQL Server 2017` 的 `Windows\
  \ Server 2016` 上安装执行目录包任务。\n\n\n\n## 配置 Product 标签\n\n在解决方案资源管理器中，双击 `ExecuteCatalogPackageTask.wxs`\
