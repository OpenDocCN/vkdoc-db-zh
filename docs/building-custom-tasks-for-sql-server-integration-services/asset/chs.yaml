  \ 属性设置为 `True`，如图 19-13 所示：\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig13_HTML.jpg](img/449652_2_En_19_Fig13_HTML.jpg)\n\
  \n图 19-13：将 `Synchronized` 属性设置为 true\n\n执行测试用的 SSIS 包。30 秒后，请注意测试 SSIS 包执行失败，错误消息为“The\
  \ Execute method on the task returned error code 0x80131904 (Execution Timeout Expired.\
  \ The timeout period elapsed prior to completion of the operation or the server\
  \ is not responding.)”，如图 19-14 所示：\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig14_HTML.jpg](img/449652_2_En_19_Fig14_HTML.jpg)\n\
  \n图 19-14：在 30 秒时执行超时\n\n这就是我们希望克服的行为。现在可以使用 `RunForSomeTime.dtsx` SSIS 包来测试基于 `WaitHandle.WaitAny`\
  \ 的解决方案的实现了。\n\n\n### 实现 WaitHandle.WaitAny 方法\n\n基于 `WaitHandle.WaitAny` 的解决方案，其核心在于异步执行执行时间超过\
  \ 30 秒且 `Synchronized` 属性设置为 `true` 的 SSIS 包。异步执行 SSIS 包，就如同将 `Synchronized` 属性设置为\
  \ `false`。因此，仅当 `Synchronized` 属性设置为 `true` 时，才会调用此执行方法。\n\n## 编辑方法与参数\n\n首先，通过编辑\
  \ `ExecuteCatalogPackageTask` 类中的 `returnExecutionValueParameterSet` 方法来开始实现。在编辑时，使用清单\
  \ 19-3 中的代码添加用于设置 `CALLER_INFO` 执行参数的代码：\n\n```csharp\nprivate Collection returnExecutionValueParameterSet()\n\
  {\n    // 初始化参数集合\n    Collection executionValueParameterSet = new Collection();\n\
  \    // 设置 SYNCHRONIZED 执行参数\n    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\n\
  \    {\n        ObjectType = 50,\n        ParameterName = \"SYNCHRONIZED\",\n  \
  \      ParameterValue = false // 始终以 Synchronized 属性为 false 执行\n    });\n    //\
  \ 设置 LOGGING_LEVEL 执行参数\n    int LoggingLevelValue = decodeLoggingLevel(LoggingLevel);\n\
  \    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\n\
  \    {\n        ObjectType = 50,\n        ParameterName = \"LOGGING_LEVEL\",\n \
  \       ParameterValue = LoggingLevelValue\n    });\n    // 设置 CALLER_INFO 执行参数\n\
  \    string machineName = Environment.MachineName.Replace('\"', '\\'').Replace(\"\
  \\\\\", \"//\");\n    string userName = Environment.UserName;\n    executionValueParameterSet.Add(new\
  \ Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\n\
  \    {\n        ObjectType = 50,\n        ParameterName = \"CALLER_INFO\",\n   \
  \     ParameterValue = machineName + \"\\\\\" + userName\n    });\n    return executionValueParameterSet;\n\
  }\n```\n\n清单 19-3 编辑 `ExecuteCatalogPackageTask` 中的 `returnExecutionValueParameterSet`\
  \ 方法\n\n编辑完成后，`returnExecutionValueParameterSet` 方法如图 19-15 所示。\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig15_HTML.jpg](img/449652_2_En_19_Fig15_HTML.jpg)\n\
  \n图 19-15 编辑 `returnExecutionValueParameterSet` 方法\n\n## 修改执行调用\n\n继续实现，编辑 `ExecuteCatalogPackageTask.Execute`\
  \ 方法中的 `catalogPackage.Execute` 调用，添加清单 19-4 中的代码：\n\n```csharp\nlong executionId\
  \ = catalogPackage.Execute(Use32bit\n, null\n, executionValueParameterSet);\nif\
  \ (Synchronized)\n{\n    ManualResetEvent manualResetState = new ManualResetEvent(false);\n\
  }\n```\n\n清单 19-4 检查是否配置为同步执行\n\n添加后，代码如图 19-16 所示。\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig16_HTML.jpg](img/449652_2_En_19_Fig16_HTML.jpg)\n\
  \n图 19-16 实现基于 `WaitHandle.WaitAny` 的解决方案\n\n## 添加引用与处理错误\n\n使用 Visual Studio 快速操作添加\
  \ `using System.Threading;` 指令：将鼠标悬停在 `ManualResetEvent` 类型声明上，单击快速操作下拉菜单，然后单击 `using\
  \ System.Threading;` 指令。添加指令后，代码如图 19-17 所示。\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig17_HTML.jpg](img/449652_2_En_19_Fig17_HTML.jpg)\n\
  \n图 19-17 添加指令后错误清除\n\n如果包执行未配置为同步执行，则代码将按之前的方式执行包。如果包执行配置为同步执行，则会声明一个名为 `manualResetState`\
  \ 的 `ManualResetEvent`，并将其状态初始化为 `false`。请记住，设置为 `false` 的 `ManualResetEvent` 会开始等待（阻塞）任何试图使用分配给该\
  \ `ManualResetEvent` 的共享资源的其他线程。\n\n## 配置计时器与状态类\n\n下一步是配置 `Timer`，该计时器根据间隔配置进行“滴答”计时。当计时器滴答时，它将调用\
  \ `CheckWaitState` 类中名为 `CheckStatus` 的方法。使用清单 19-5 中的代码将 `CheckWaitState` 类添加到\
  \ `ExecuteCatalogPackageTask.cs` 文件并声明私有成员：\n\n```csharp\nclass CheckWaitState\n\
  {\n    private long executionId;\n    private int invokeCount;\n    private ManualResetEvent\
  \ manualResetState;\n    private int maximumCount;\n    private string catalogName;\n\
  \    private SqlConnection connection;\n    private ExecuteCatalogPackageTask task;\n\
  \    public Operation.ServerOperationStatus OperationStatus { get; set; }\n}\n```\n\
  \n清单 19-5 在 `ExecuteCatalogPackageTask.cs` 文件中实现 `CheckWaitState`\n\n添加后，代码如图 19-18\
  \ 所示。\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig18_HTML.jpg](img/449652_2_En_19_Fig18_HTML.jpg)\n\
  \n图 19-18 实现 `CheckWaitState` 类\n\n## 实现构造函数\n\n使用清单 19-6 中的代码实现 `CheckWaitState`\
  \ 构造函数：\n\n```csharp\npublic CheckWaitState(long executionId\n, int maxCount\n,\
  \ SqlConnection connection\n, string catalogName\n, ExecuteCatalogPackageTask task)\n\
  {\n    this.executionId = executionId;\n    this.invokeCount = 0;\n    this.maximumCount\
  \ = maxCount;\n    this.connection = connection;\n    this.catalogName = catalogName;\n\
  \    this.task = task;\n}\n```\n\n清单 19-6 实现 `CheckWaitState` 构造函数\n\n构造函数实现后，`CheckWaitState`\
  \ 类如图 19-19 所示。\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig19_HTML.jpg](img/449652_2_En_19_Fig19_HTML.jpg)\n\
  \n图 19-19 已实现构造函数的 `CheckWaitState` 类\n\n## 实现计时器状态类\n\n使用清单 19-7 中的代码实现 `TimerCheckerState`\
  \ 类：\n\n```csharp\nclass TimerCheckerState\n{\n    public ManualResetEvent manualResetState\
  \ { get; private set; }\n    public TimerCheckerState(ManualResetEvent manualResetState)\n\
  \    {\n        this.manualResetState = manualResetState;\n    }\n}\n```\n\n清单 19-7\
  \ 实现 `TimerCheckerState` 类\n\n添加后，代码如图 19-20 所示。\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig20_HTML.jpg](img/449652_2_En_19_Fig20_HTML.jpg)\n\
  \n图 19-20 `TimerCheckerState` 类\n\n## 实现辅助函数\n\n下一步，使用清单 19-8 中的代码在 `CheckWaitState`\
  \ 类中实现名为 `returnOperationStatus` 的辅助函数：\n\n```csharp\npublic Operation.ServerOperationStatus\
  \ returnOperationStatus()\n{\n    CatalogCollection catalogCollection = new IntegrationServices(connection).Catalogs;\n\
  \    Catalog catalog = catalogCollection[catalogName];\n    OperationCollection\
  \ operationCollection = catalog.Operations;\n    Operation operation = operationCollection[executionId];\n\
  \    Operation.ServerOperationStatus operationStatus = operation.Status;\n    return\
  \ operationStatus;\n}\n```\n\n清单 19-8 编写 `CheckWaitState.returnOperationStatus`\
  \ 辅助函数\n\n添加到 `CheckWaitState` 类后，`returnOperationStatus` 辅助函数如图 19-21 所示。\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig21_HTML.jpg](img/449652_2_En_19_Fig21_HTML.jpg)\n\
  \n图 19-21 `CheckWaitState.returnOperationStatus` 辅助函数\n\n\n### 实现 SSIS 包执行状态监控与事件日志重构\n\
  \n`returnOperationStatus` 方法首先连接到名为 `catalogCollection` 的 `CatalogCollection` 类型。一个名为\
  \ `catalog` 的 `Catalog` 类型通过 `catalogName` 属性（默认值为 “SSISDB”）从 `catalogCollection`\
  \ 中派生出来。\n\n一个名为 `operationCollection` 的 `OperationCollection` 类型从 `catalog.Operations`\
  \ 类型集合中赋值。一个名为 `operation` 的 `Operation` 类型从 `operationCollection[executionId]`\
  \ 中读取。`operationStatus` 变量，一个 `Operation.ServerOperationStatus` 类型的变量，从 `operation.Status`\
  \ 属性中读取。\n\n下一步是在 CheckWaitState 类中编写 `checkOperationStatus` 方法，以响应 SSIS 包执行的 `ServerOperationStatus`，使用代码清单\
  \ 19-9 中的代码：\n\n```csharp\npublic void checkOperationStatus(Operation.ServerOperationStatus\
  \ operationStatus)\n{\n// check for package execution \"finished\" states\nif (\n\
  (operationStatus == Operation.ServerOperationStatus.Canceled)\n|| (operationStatus\
  \ == Operation.ServerOperationStatus.Completion)\n|| (operationStatus == Operation.ServerOperationStatus.Failed)\n\
  || (operationStatus == Operation.ServerOperationStatus.Stopping)\n|| (operationStatus\
  \ == Operation.ServerOperationStatus.Success)\n|| (operationStatus == Operation.ServerOperationStatus.UnexpectTerminated)\n\
  )\n{\n// reset counter\ninvokeCount = 0;\n// signal thread\nmanualResetState.Set();\n\
  }\n}\n```\n**代码清单 19-9** 添加 `CheckWaitState.CheckOperationStatus` 方法\n\n添加后，代码如图\
  \ 19-22 所示：\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig22_HTML.jpg](img/449652_2_En_19_Fig22_HTML.jpg)\n\
  \n*图 19-22* 添加 `CheckWaitState.CheckOperationStatus` 方法\n\n`checkOperationStatus`\
  \ 方法接收一个名为 `operationStatus` 的 `Operation.ServerOperationStatus` 类型参数。一个 `if` 条件检查\
  \ `operationStatus` 参数值是否处于“已完成”操作状态。“已完成”操作状态包括：\n*   `Canceled`（已取消）\n*   `Completion`（已完成）\n\
  *   `Failed`（已失败）\n*   `Stopping`（正在停止）\n*   `Success`（成功）\n*   `UnexpectTerminated`（意外终止）\n\
  \n如果 `operationStatus` 参数值处于“已完成”操作状态，则名为 `invokeCount` 的定时器滴答计数器重置为 0，并且名为 `manualResetState`\
  \ 的 `ManualResetEvent` 类型属性被 `Set()`。如前所述：`ManualResetEvent.Set()` 方法 `发出信号`（将布尔状态设置为\
  \ `true`），`手动`通知等待的线程现在可以执行。\n\n### 将 logMessage 重构为 raiseEvent\n\n回到 `ExecuteCatalogPackageTask`\
  \ 类并重构 `logMessage` 方法，首先从方法名称开始。`logMessage` 方法实际上并不记录消息。相反，`logMessage` 方法引发一个事件。通过将\
  \ `logMessage` 方法重命名为 `raiseEvent` 并使用代码清单 19-10 中的代码替换它来重构该方法：\n\n```csharp\npublic\
  \ void raiseEvent(string messageType\n, int messageCode\n, string subComponent\n\
  , string message)\n{\nbool fireAgain = true;\nswitch (messageType)\n{\ndefault:\n\
  break;\ncase \"Information\":\ncomponentEvents.FireInformation(messageCode, subComponent,\
  \ message, \"\", 0, ref fireAgain);\nbreak;\ncase \"Warning\":\ncomponentEvents.FireWarning(messageCode,\
  \ subComponent, message, \"\", 0);\nbreak;\ncase \"Error\":\ncomponentEvents.FireError(messageCode,\
  \ subComponent, message, \"\", 0);\nbreak;\n}\n}\n```\n**代码清单 19-10** 将 `logMessage`\
  \ 方法重构为 `raiseEvent` 方法\n\n替换后，代码如图 19-23 所示：\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig23_HTML.jpg](img/449652_2_En_19_Fig23_HTML.jpg)\n\
  \n*图 19-23* 用 `raiseEvent` 方法替换 `logMessage` 方法\n\n`componentEvents` 属性引入了一个错误，由属性名称下方的红色波浪线表示。在\
  \ `logMessage` 方法中，`componentEvents` 是作为参数传递的。长话短说：到目前为止，我们调用 `logMessage` 方法的每个方法都能访问\
  \ `componentEvents`，这是由 `Task` 对象传递给这些方法的。\n\n在下一节中，我们希望从 *`Task` 对象外部*的方法引发事件消息，这些方法不属于\
  \ `ExecuteCatalogPackageTask Task` 对象类的一部分；我们希望从 `CheckWaitState` 类引发事件消息。\n\n将\
  \ `logMessage` 方法重命名为 `raiseEvent` 触发了一项重构工作，而这项重构工作显得顺序不当。重构工作看起来顺序不当的原因是因为它 *实际上*\
  \ 就是顺序不当。重构并不总是井然有序的。欢迎来到软件开发。\n\n`logMessage` 方法与 `raiseEvent` 方法的一个主要区别是参数的数量。`logMessage`\
  \ 方法有五个参数：`componentEvents`、`messageType`、`messageCode`、`subComponent` 和 `message`。`raiseEvent`\
  \ 方法有四个参数：`messageType`、`messageCode`、`subComponent` 和 `message`。这四个共享参数在两种方法中的类型相同。`logMessage`\
  \ 方法中的 `componentEvents` 参数在 `raiseEvent` 方法中缺失了。\n\n我们重构的第一步是处理 `componentEvents`\
  \ 参数，我们通过使用代码清单 19-11 中的代码向 `ExecuteCatalogPackageTask` 类添加一个 `componentEvents`\
  \ 属性来实现：\n\n```csharp\nprivate IDTSComponentEvents componentEvents { get; set; }\
  \ = null;\n```\n**代码清单 19-11** 向 `ExecuteCatalogPackageTask` 类添加 `componentEvents`\
  \ 属性\n\n添加后，新的 `componentEvents` 属性如图 19-24 所示：\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig24_HTML.jpg](img/449652_2_En_19_Fig24_HTML.jpg)\n\
  \n*图 19-24* 添加 `ExecuteCatalogPackageTask.componentEvents` 属性\n\n一旦 `componentEvents`\
  \ 属性被添加到 `ExecuteCatalogPackageTask` 类中，`raiseEvent` 方法中的早期错误就被清除了，如图 19-25 所示（与图\
  \ 19-23 对比）：\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig25_HTML.jpg](img/449652_2_En_19_Fig25_HTML.jpg)\n\
  \n*图 19-25* 错误已清除\n\n使用代码清单 19-12 中的代码在 `ExecuteCatalogPackageTask.Validate` 方法中初始化\
  \ `componentEvents` 属性：\n\n\n\n```\n// initialize componentEvents\nthis.componentEvents\
  \ = componentEvents;\n```\n代码清单 19-12\n在 `ExecuteCatalogPackageTask.Validate` 方法中初始化\
  \ `componentEvents` 属性\n\n添加后，代码将如图 19-26 所示：\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig26_HTML.jpg](img/449652_2_En_19_Fig26_HTML.jpg)\n\
  \n图 19-26\n在 `ExecuteCatalogPackageTask.Validate` 方法中初始化 `componentEvents` 属性值\n\
  \n根据错误列表（至少在我的项目中），还剩下 19 个错误。大多数错误显示相同的消息：“名称 `logMessage` 在当前上下文中不存在”，如图 19-27\
