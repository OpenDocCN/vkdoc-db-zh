  \n图 15-14\n`Synchronized` 执行参数为 True\n\n你是否注意到每个实现都变得越来越复杂？我们要实现的下一个属性是 Logging\
  \ Level。\n\n### 添加 `LoggingLevel` 属性\n\n默认情况下，在 SSIS 目录中执行的 SSIS 包，其日志级别执行参数设置为\
  \ `1`（基本）。日志级别是一个日志级别名称值的枚举，映射到一个整数列表。你是否察觉到了什么？我察觉到了。我闻到另一个 `TypeConverter` 正在酝酿……\n\
  \n根据所使用的 SSIS 目录版本，SSIS 开发人员可能会遇到四到五个内置的日志级别设置，以及可能更多的自定义日志级别。日志级别可以配置为 SSIS 目录的默认日志级别，但几乎所有\
  \ SSIS 开发人员都认为将默认目录日志级别设置为“基本”是一种最佳实践。日志级别可以针对任何 SSIS 包执行进行更改。\n\n### 构建 `LoggingLevel`\
  \ TypeConverter\n\n在向 `SettingsNode` 添加 `LoggingLevel` 属性之前，我们需要添加另一个 `TypeConverter`\
  \ 类。`TypeConverter` 遵循一个模式，包括一个类型特定的函数 `GetSpecializedObject` 和三个重写函数：`GetStandardValues`、`GetStandardValuesExclusive`\
  \ 和 `GetStandardValuesSupported`。首先将清单 15-8 中的代码添加到 `SettingsNode` 类：\n\n```\ninternal\
  \ class LoggingLevels : StringConverter\n{\nprivate object GetSpecializedObject(object\
  \ contextInstance)\n{\nDTSLocalizableTypeDescriptor typeDescr = contextInstance\
  \ as DTSLocalizableTypeDescriptor;\nif (typeDescr == null)\n{\nreturn contextInstance;\n\
  }\nreturn typeDescr.SelectedObject;\n}\npublic override StandardValuesCollection\
  \ GetStandardValues(ITypeDescriptorContext context)\n{\nobject retrievalObject =\
  \ GetSpecializedObject(context.Instance) as object;\nreturn new StandardValuesCollection(getLoggingLevels(retrievalObject));\n\
  }\npublic override bool GetStandardValuesExclusive(ITypeDescriptorContext context)\n\
  {\nreturn true;\n}\npublic override bool GetStandardValuesSupported(ITypeDescriptorContext\
  \ context)\n{\nreturn true;\n}\n}\nListing 15-8\nAdding the LoggingLevel TypeConverter\
  \ (StringConverter)\n```\n\n添加后，`SettingsNode LoggingLevel` `StringConverter` 代码如图\
  \ 15-15 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig15_HTML.jpg](img/449652_2_En_15_Fig15_HTML.jpg)\n\
  \n图 15-15\n`LoggingLevels` `StringConverter` 类\n\n所有 SSIS 目录版本都提供四种日志级别：\n*   无\
  \ (0)\n*   基本 (1)\n*   性能 (2)\n*   详细 (3)\n\n在所有版本的 SSIS 目录中，基本 (1) 是默认日志级别。通过添加清单\
  \ 15-9 中的 `getLoggingLevels` 函数代码来完成 `LoggingLevels StringConverter` 类：\n\n```\n\
  private ArrayList getLoggingLevels(object retrievalObject)\n{\nArrayList logLevelsArray\
  \ = new ArrayList();\nlogLevelsArray.Add(\"None\");\nlogLevelsArray.Add(\"Basic\"\
  );\nlogLevelsArray.Add(\"Performance\");\nlogLevelsArray.Add(\"Verbose\");\nreturn\
  \ logLevelsArray;\n}\nListing 15-9\nAdding the getLoggingLevels function\n```\n\n\
  \n### 使用 LoggingLevel 扩展 ExecutionValueParameterSet\n\n正如我们在添加 `Synchronized` 执行参数时提到的，`ExecutionValueParameterSet`\
  \ 是 `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValuearameterSet`\
  \ 类型的集合。与 `Synchronized` 执行参数类似，`LoggingLevel` 也是一个执行参数。\n\n在将 `LoggingLevel` 整数值添加到执行参数集合之前，必须使用清单\
  \ 15-10 中的代码对其进行解码：\n\n```\nprivate int decodeLoggingLevel(string loggingLevel)\n\
  {\n    int ret = 1;\n    switch (loggingLevel)\n    {\n        default:\n      \
  \      break;\n        case \"None\":\n            ret = 0;\n            break;\n\
  \        case \"Performance\":\n            ret = 2;\n            break;\n     \
  \   case \"Verbose\":\n            ret = 3;\n            break;\n    }\n    return\
  \ ret;\n}\n清单 15-10\n添加 DecodeLoggingLevel 函数\n```\n\n将 `decodeLoggingLevel` 函数添加到\
  \ `ExecuteCatalogPackageTask` 类后，代码如图 15-16 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig16_HTML.jpg](img/449652_2_En_15_Fig16_HTML.jpg)\n\
  图 15-16\n`decodeLoggingLevel` 函数\n\n要将 `LoggingLevel` 值添加到 `returnExecutionValueParameterSet`\
  \ 函数，请编辑该函数以匹配清单 15-11 中的代码：\n\n```\nprivate Collection returnExecutionValueParameterSet(\n\
  \    Microsoft.SqlServer.Management.IntegrationServices.PackageInfo catalogPackage)\n\
  {\n    // 初始化参数集合\n    Collection executionValueParameterSet = new Collection();\n\
  \    // 设置 SYNCHRONIZED 执行参数\n    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\
  \ { ObjectType = 50, ParameterName = \"SYNCHRONIZED\", ParameterValue = Synchronized\
  \ });\n    // 设置 LOGGING_LEVEL 执行参数\n    int LoggingLevelValue = decodeLoggingLevel(LoggingLevel);\n\
  \    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\
  \ { ObjectType = 50, ParameterName = \"LOGGING_LEVEL\", ParameterValue = LoggingLevelValue\
  \ });\n    return executionValueParameterSet;\n}\n清单 15-11\n编辑 returnExecutionValueParameterSet\
  \ 函数\n```\n\n添加完成后，`returnExecutionValueParameterSet` 函数如图 15-17 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig17_HTML.jpg](img/449652_2_En_15_Fig17_HTML.jpg)\n\
  图 15-17\n编辑后的 `returnExecutionValueParameterSet` 函数\n\n下一步是添加 `SettingsView.LoggingLevel`\
