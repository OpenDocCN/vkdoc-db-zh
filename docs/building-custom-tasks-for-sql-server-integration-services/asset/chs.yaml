- "# 18. 插桩与验证\n\n*插桩* 是工程学的一个子学科，最初指从工业过程中收集物理数据。在软件工程中，插桩指的是展现软件设置、状态和性能关键指标的艺术与科学。\n\
  \n*验证* 是检查值以确保这些值处于可用状态的过程。在 `执行目录包任务` 的上下文中，某些属性*必须*使用非空且非默认值进行配置。\n\n在本章中，我们将为\
  \ `执行目录包任务` 添加插桩和验证功能。\n\n### 插桩\n\n最基本的形式下，插桩是代码与开发者和操作员“对话”的方式——它向开发者和操作员通报操作的状态。就\
  \ `执行目录包任务` 而言，期望该任务能告知开发者和操作员 `SSIS` 目录包是否成功执行。\n\n\n\n## 添加插桩\n\n在 `ExecuteCatalogPackageTask`\
  \ 解决方案的 `ExecuteCatalogPackageTask` 项目中，打开 `ExecuteCatalogPackageTask.cs` 文件，并使用清单\
  \ 18-1 中的代码，在 `ExecuteCatalogPackageTask` 类中创建一个名为 `logMessage` 的新函数：\n\n```csharp\n\
  private void logMessage(\nIDTSComponentEvents componentEvents\n, string messageType\n\
  , int messageCode\n, string subComponent\n, string message)\n{\nbool fireAgain =\
  \ true;\nswitch(messageType)\n{\ndefault:\nbreak;\ncase \"Information\":\ncomponentEvents.FireInformation(messageCode,\
  \ subComponent, message, \"\", 0, ref fireAgain);\nbreak;\ncase \"Warning\":\ncomponentEvents.FireWarning(messageCode,\
  \ subComponent, message, \"\", 0);\nbreak;\ncase \"Error\":\ncomponentEvents.FireError(messageCode,\
  \ subComponent, message, \"\", 0);\nbreak;\n}\n}\n```\n\n*清单 18-1 添加 logMessage*\n\
  \n添加后，代码如图 18-1 所示：\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig1_HTML.jpg](img/449652_2_En_18_Fig1_HTML.jpg)\n\
  \n*图 18-1 logMessage 函数*\n\n## 添加“已启动”和“已完成”消息\n\n使用清单 18-2 中的代码，向 `Execute` 方法添加一个进程“已启动”信息消息：\n\
  \n```csharp\nstring packagePath = \"\\\\SSISDB\\\\\" + PackageFolder + \"\\\\\"\n\
  + PackageProject + \"\\\\\"\n+ PackageName;\nstring msg = \"Starting \" + packagePath\
  \ + \" on \" + ServerName;\nlogMessage(componentEvents, \"Information\", 1001, TaskName,\
  \ msg);\n```\n\n*清单 18-2 添加一个进程“已启动”消息*\n\n添加后，代码如图 18-2 所示：\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig2_HTML.jpg](img/449652_2_En_18_Fig2_HTML.jpg)\n\
  \n*图 18-2 添加“已启动”消息*\n\n使用清单 18-3 中的代码添加一个“已完成”消息：\n\n```csharp\nmsg = packagePath\
  \ + \" on \" + ServerName + \" completed\";\nlogMessage(componentEvents, \"Information\"\
  , 1002, TaskName, msg);\n```\n\n*清单 18-3 添加一个“已完成”消息*\n\n添加后，代码如图 18-3 所示：\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig3_HTML.jpg](img/449652_2_En_18_Fig3_HTML.jpg)\n\
  \n*图 18-3 添加“已完成”消息*\n\n## 根据执行模式进行优化\n\n构建并测试“执行目录包任务”，观察“执行结果”选项卡，如图 18-4 所示：\n\
  \n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig4_HTML.jpg](img/449652_2_En_18_Fig4_HTML.jpg)\n\
  \n*图 18-4 观察消息*\n\n代码按设计执行并报告，但报告代码设计不准确。当“执行目录包任务”在 SSIS 目录中执行 SSIS 包时，`Synchronized`\
  \ 执行参数控制 `package.Execute()` 方法的行为。如果 `Synchronized` 为 false（默认值），SSIS 目录会查找该包，然后从执行中返回。如果\
  \ `Synchronized` 为 true，SSIS 目录会 *在进程中* 执行该包，仅当 SSIS 包在 SSIS 目录中执行完成后才从执行中返回。这个消息应该突出显示，因此将\
  \ `logMessage` 方法中的 `messageType` 参数从 “Information” 更改为 “Warning”。\n\n当前的“已完成”消息不准确。使用清单\
  \ 18-4 中的代码更新“已完成”消息逻辑：\n\n```csharp\nmsg = packagePath + \" on \" + ServerName\n\
  + (Synchronized ? \" completed.\" : \" started. Check SSIS Catalog Reports for package\
  \ execution results.\");\nlogMessage(componentEvents, \"Warning\", 1002, TaskName,\
  \ msg);\n```\n\n*清单 18-4 更新“已完成”消息*\n\n添加后，代码如图 18-5 所示：\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig5_HTML.jpg](img/449652_2_En_18_Fig5_HTML.jpg)\n\
  \n*图 18-5 更新后的“已完成”消息和消息类型*\n\n构建 `ExecuteCatalogPackageTask` 解决方案，并将“执行目录包任务”添加到测试\
  \ SSIS 项目中，配置为执行 `Synchronized` 属性设置为 False 的包。执行完成后，查看“执行结果/进度”选项卡以找到新更新的（且更准确的）“已完成”消息，如图\
  \ 18-6 所示：\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig6_HTML.jpg](img/449652_2_En_18_Fig6_HTML.jpg)\n\
  \n*图 18-6 新的“已完成”消息*\n\n## 添加执行时间插桩\n\n“已完成”消息还应包含执行时间插桩，并且可以通过实现清单 18-5 中的代码将消息标记为警告而非信息：\n\
  \n```csharp\nStopwatch sw = new Stopwatch();\nsw.Start();\n.\n.\n.\nsw.Stop();\n\
  string swMsg = String.Empty;\nif(Synchronized)\n{\nswMsg = \" Package Execution\
  \ Time: \" + sw.Elapsed.ToString();\n}\nmsg = packagePath + \" on \" + ServerName\
  \ + (Synchronized ?\n(\" completed.\" + swMsg.Substring(0, (swMsg.Length - 4)))\
  \ :\n(\" started. Check SSIS Catalog Reports for package execution results.\"));\n\
  logMessage(componentEvents, (Synchronized ? \"Information\" : \"Warning\"), 1002,\
  \ TaskName, msg);\n```\n\n*清单 18-5 添加执行时间和警告*\n\n添加后，代码如图 18-7 所示：\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig7_HTML.jpg](img/449652_2_En_18_Fig7_HTML.jpg)\n\
  \n*图 18-7 再次更新“已完成”消息*\n\n如前所述，缺少一个指令，但 Visual Studio 知道我们需要的是 `using System.Diagnostics;`\
  \ 指令。使用快速操作添加 `using System.Diagnostics;` 指令。添加后，代码如图 18-8 所示：\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig8_HTML.jpg](img/449652_2_En_18_Fig8_HTML.jpg)\n\
  \n*图 18-8 添加 using System.Diagnostics; 指令后的更新消息代码*\n\n`Stopwatch` 是 `System.Diagnostics`\
  \ .Net Framework 程序集的一个成员，它允许开发人员测量两个事件之间经过的时间。名为 `sw` 的 `Stopwatch` 类型变量在第 92 行声明并初始化。`sw`\
  \ `Stopwatch` 变量在第 93 行启动，就在第 95 行调用名为 `catalogPackage` 的 `PackageInfo` 变量的 `Execute`\
  \ 方法之前。\n\n`Execute` 方法返回后，`Stopwatch` 在第 97 行停止。名为 `swMsg` 的字符串变量在第 98 行声明并初始化为空字符串。如果包是以\
  \ `Synchronized` 属性设置为 true 执行的（第 99 行），则 `swMsg` `string` 变量会填充一条消息，以告知开发人员和操作员由名为\
  \ `sw` 的 `Stopwatch` 变量捕获的包执行所用时间。\n\n名为 `msg` 的 `string` 变量在第 104-106 行被填充，以 `packagePath`\
  \ 字符串变量与字面字符串值 `\" on \"` 连接开始，后跟 `ServerName` 属性的值。\n\n如果 `Synchronized` 属性设置为\
  \ true——意味着代码 *等待* 直到 SSIS 包执行完成后才到达此行代码——`\" completed.\"` 和 `swMsg` `string` 变量的值会连接到\
  \ `msg` 变量的值。如果 `Synchronized` 属性设置为 false——意味着代码找到 SSIS 包并继续执行（也称为“发射后不管”）——则 `\"\
  \ started. Check SSIS Catalog Reports for package execution results.\"` 会连接到 `msg`\
  \ 变量的值。\n\n\n\nif-then-else 功能由三元条件运算符控制：`<表达式> ? <为真时> : <为假时>`。该表达式的求值结果必须为 `true`\
  \ 或 `false`。表达式部分就是 `Synchronized` 属性，这是一个布尔值。三元运算的“为真时”操作是 `(\" completed.\" +\
  \ swMsg.Substring(0, (swMsg.Length - 4)))`，它构建了一条消息，用于告知开发人员和操作员程序包执行已用的时间。`swMsg.Length\
  \ – 4` 这段代码截断了毫秒级的已用时间。三元运算的“为假时”操作是 `(\" started. Check SSIS Catalog Reports for\
  \ package execution results.\"))`，它构建了一条消息，告知开发人员和操作员程序包已开始异步执行，他们应该去其他地方查看程序包执行结果。\n\
  \n在第 107 行可以找到另一个不同的三元条件操作，它检查 `Synchronized` 属性的值以确定是返回 `Information` 还是 `Warning`\
  \ messageType。\n\n### 让我们测试一下！\n\n要进行测试，请构建任务解决方案，并配置一个 Execute Catalog Package\
  \ Task，将其 `Synchronized` 属性设置为 `False`。执行完成后，查看 Execution Results/Progress 选项卡，可以找到新近再次更新的“ended”消息，如图\
  \ 18-9 所示：\n\n`../images/449652_2_En_18_Chapter/449652_2_En_18_Fig9_HTML.jpg`\n\
  图 18-9\n新的、新的“ended”消息\n\nExecute Catalog Package Task 的插桩现在会输出“start”和“ended”消息。\n\
  \n将 Execute Catalog Package Task 的 `Synchronized` 属性设置为 `true`，如图 18-10 所示：\n\n\
  `../images/449652_2_En_18_Chapter/449652_2_En_18_Fig10_HTML.jpg`\n图 18-10\n将 Execute\
  \ Catalog Package Task 的 Synchronized 属性设置为 true\n\n执行测试 SSIS 程序包并查看 Progress/Execution\
