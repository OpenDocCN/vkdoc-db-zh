  ## 配置属性表达式


  为这个版本的 SSIS 框架构建执行引擎的最后一步是配置 `Execute Catalog Package Task` 的属性表达式。点击 `Expressions`
  页面，点击省略号，并将 `Execute Catalog Package Task` 属性映射到我们在配置 `Foreach Application Packages
  Variable Mappings` 页面时创建的变量。在本章前面，我们已经配置过 `Execute Catalog Package Task` 表达式（甚至配置过两次）。


