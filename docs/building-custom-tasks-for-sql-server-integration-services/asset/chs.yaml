  \n图 21-43\n\nSSIS 包执行已取消\n\n下一步是验证 SSIS 目录中 SSIS 包的执行是否已被取消。打开 `SSMS` 并连接到承载 SSIS\
  \ 目录的 `SQL Server` 实例。打开“所有执行”报告以查看 SSIS 包执行的状态，如图 21-44 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig44_HTML.jpg](img/449652_2_En_21_Fig44_HTML.jpg)\n\
  \n图 21-44\n\nSSIS 目录中的 SSIS 包执行状态\n\n如果一切按计划进行，`SSMS` 中的“所有执行”SSIS 目录报告应指示 SSIS\
  \ 包执行已取消。\n\n### 结论\n\n在本章中，我们应用了一种手动测试技术进行测试验证，然后测试了执行目录包任务的执行功能。\n\n下一步是构建一个安装程序文件，以便于在企业中分发执行目录包任务。\n\
  \n现在是一个签入代码的好时机。\n\n"
- "# 22. 构建安装项目\n\n安装项目允许开发人员管理代码在企业中的分发以及与其他企业共享代码。`SSIS` 长期以来一直促进着第三方任务和组件开发人员的健康发展。在本章中，我们将一个安装项目添加到\
  \ `ExecuteCatalogPackageTask` 解决方案中，并配置该项目，以便在其他服务器上安装执行目录包任务，步骤如下：\n\n*   添加 `ExecuteCatalogPackageTaskSetup`\
  \ 项目。\n*   添加引用。\n*   配置产品标签。\n    *   配置包标签。\n    *   配置安装路径属性标签。\n    *   配置 `MajorUpgrade`\
  \ 和 `MediaTemplate` 标签。\n    *   初始化 `UIRef` 和许可证文件标签。\n    *   配置安装功能和图标。\n*  \
  \ 配置文件夹和文件夹结构。\n    *   配置 `ExecuteCatalogPackageTask` 的 `GAC` 注册。\n    *   配置 `ExecuteCatalogPackageTask\
  \ Tasks` 部署文件夹。\n    *   配置 `ExecuteCatalogPackageTaskComplexUI` 的 `GAC` 注册。\n \
  \   *   配置 `ExecuteCatalogPackageTaskComplexUI Tasks` 部署文件夹。\n\n安装项目会创建一个名为 `setup.exe`\
  \ 或 `<*项目名称*>.msi` 的文件。一个名为 `MsiExec.exe` 的 `Windows` 应用程序执行 `msi` 文件来安装所需软件。`Visual\
  \ Studio` 支持可显示安装项目的扩展。其中一个扩展是 `Windows Installer XML` (`WiX`)。请访问 `WiX` 工具集页面 (`wixtoolset.org`)\
  \ 下载并安装我们将用于构建 `ExecuteCatalogPackageTask.msi` 文件的 `Visual Studio` 项目模板。\n\n要遵循本章中的演示和示例，读者*必须*访问\
  \ `wixtoolset.org`，下载最新版本的软件，并按照 `wixtoolset.org` 上的 `WiX` 工具集安装说明进行操作。\n\n本章仅列出了为执行目录包任务配置\
  \ `msi` 安装程序文件所需的 `XML`，未提供太多解释。鼓励读者在 `wixtoolset.org` 了解更多关于使用 `WiX` 工具集的信息，在那里可以找到深入的文档和示例：`wixtoolset.org/documentation`。\n\
  \n### 添加 ExecuteCatalogPackageTaskSetup 项目\n\n要将安装项目添加到 `ExecuteCatalogPackageTask`\
  \ 解决方案，请在解决方案资源管理器中右键单击解决方案，将鼠标悬停在“添加”上，然后单击“新建项目”，如图 22-1 所示：\n\n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig1_HTML.jpg](img/449652_2_En_22_Fig1_HTML.jpg)\n\
  \n图 22-1\n\n添加新的安装项目\n\n当“添加新项目”对话框显示时，导航到 `WiX` 工具集模板类别并选择最新版本。在可用模板列表中选择 `WiX`\
  \ 的安装项目，然后将新项目命名为 `ExecuteCatalogPackageTaskSetup`，如图 22-2 所示：\n\n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig2_HTML.jpg](img/449652_2_En_22_Fig2_HTML.jpg)\n\
  \n图 22-2\n\n添加 `ExecuteCatalogPackageTaskSetup` 项目\n\n将新项目添加到 `ExecuteCatalogPackageTask`\
