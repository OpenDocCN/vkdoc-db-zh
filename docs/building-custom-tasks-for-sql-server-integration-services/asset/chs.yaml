  SSIS 任务（或类似代码）的问题答案，这正是真正的软件开发人员常常忘记告诉你的一件棘手事。他们并非故意遗漏这些内容来给你设置障碍，也不是因为他们人不好；他们只是不记得自己当初为了支持这类开发而对开发环境所做的更改。


