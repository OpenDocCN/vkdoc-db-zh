- '# 4. 在项目代码中签入


  我刚看了看手表……没错……现在是 2020 年。**早就该**所有开发者都使用某种形式的源代码控制（或版本控制）了。根据我的经验，开发者有两种类型：


  1.  使用源代码控制的开发者

  2.  *最终会* 使用源代码控制的开发者


  为什么这么说？如果你不使用源代码控制，就会丢失代码。丢失代码会让你心碎，然后你就会开始使用源代码控制了。


  ## 在 Azure DevOps 中初始化源代码控制


