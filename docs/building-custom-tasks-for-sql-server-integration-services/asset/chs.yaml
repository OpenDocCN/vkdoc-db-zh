  \ 中所示的控制到属性映射，用于 `PackageFolder`、`PackageProject` 和 `PackageName` 属性：\n```\ntaskHost.Properties[\"\
  PackageFolder\"].SetValue(taskHost, txtFolder.Text);\ntaskHost.Properties[\"PackageProject\"\
  ].SetValue(taskHost, txtProject.Text);\ntaskHost.Properties[\"PackageName\"].SetValue(taskHost,\
  \ txtPackage.Text);\n```\n清单 8-12 添加属性映射\n\n一旦你为 `Click` 事件方法添加了额外属性的代码，`ExecuteCatalogPackageTaskUIForm`\
  \ 类应如图 8-27 所示：\n\n![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig27_HTML.jpg](img/449652_2_En_8_Fig27_HTML.jpg)\n\
  \n图 8-27 完成 Click 事件属性编码\n\n下一步是前面编码的补充。当表单显示时，我们希望检索任务对象属性（`ServerName`、`PackageFolder`、`PackageProject`\
  \ 和 `PackageName`）的值，并将它们显示在编辑器（表单）上的 `txtInstance`、`txtFolder`、`txtProject` 和 `txtPackage`\
  \ 文本框中。要实现此功能，请编辑现有的 `ExecuteCatalogPackageTaskUIForm` 构造函数以匹配清单 8-13：\n```\npublic\
  \ ExecuteCatalogPackageTaskUIForm (TaskHost taskHostValue)\n{\nInitializeComponent();\n\
  taskHost = taskHostValue;\ntxtInstance.Text = ➥ taskHost.Properties[\"ServerName\"\
  ].GetValue(taskHost).ToString();\ntxtFolder.Text = ➥ taskHost.Properties[\"PackageFolder\"\
  ].GetValue(taskHost).ToString();\ntxtProject.Text = ➥ taskHost.Properties[\"PackageProject\"\
  ].GetValue(taskHost).ToString();\ntxtPackage.Text = ➥ taskHost.Properties[\"PackageName\"\
  ].GetValue(taskHost).ToString();\n}\n```\n清单 8-13 ExecuteCatalogPackageTaskUIForm\
  \ 构造函数\n\n完成后，`ExecuteCatalogPackageTaskUIForm` 类应如图 8-28 所示：\n\n![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig28_HTML.jpg](img/449652_2_En_8_Fig28_HTML.jpg)\n\
  \n图 8-28 添加表单构造函数\n\n表单构造函数接受一个名为 `taskHost` 的 `TaskHost` 参数，这消除了在 `ExecuteCatalogPackageTaskUI`\
  \ 类的 `GetView` 函数代码中的错误，如图 8-29 所示：\n\n![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig29_HTML.jpg](img/449652_2_En_8_Fig29_HTML.jpg)\n\
  \n图 8-29 ExecuteCatalogPackageTaskUI.GetView() 中不再有波浪线\n\n\n### 结论\n\n在本章中，我们为自定义\
  \ SSIS 任务开发了一个简单的编辑器。我们向窗体添加了多个控件，并准备好了窗体以便将编辑器绑定到自定义 SSIS 任务对象。该项目现在包含了自定义任务的大部分功能。\n\
  \n现在是执行一次提交并推送到 Azure DevOps 的好时机。\n\n在开发的这个阶段，我们已经：\n\n*   创建并配置了一个 Azure DevOps\
  \ 项目\n*   将 Visual Studio 连接到该 Azure DevOps 项目\n*   在本地克隆了 Azure DevOps Git 仓库\n\
  *   创建了一个 Visual Studio 项目\n*   向 Visual Studio 项目添加了引用\n*   对项目代码执行了初始签入\n*   对程序集进行了签名\n\
  *   签入了一次更新\n*   配置了构建输出路径和生成事件\n*   重写了来自`Task`基类的三个方法\n*   为`Task`编辑器添加并编写了大部分项目代码\n\
  \n接下来，我们将把任务和编辑器组合起来！\n\n"
- '# 9. 签名与绑定


  本书以一段散漫的引言开始，揭示了我的部分思维过程。我提出了一个问题：“你认为使用 Visual Studio 社区版创建自定义 SSIS 任务是否可能？”


  接着，我们配置了开发机器和 Visual Studio，然后创建了一个新项目。我们对项目进行了签名，以便它能在全局程序集缓存中被接受，并准备好了 Visual
  Studio 环境，包含了构建自定义 SSIS 任务所需的所有附属物和引用。我们编写了任务及其编辑器的代码。所有这些工作将我们带到了这里。


  在本章中，我们将对任务编辑器项目进行签名，并将任务绑定到编辑器。然后我们将编写任务的功能代码，添加一个图标，并构建和测试该任务。


