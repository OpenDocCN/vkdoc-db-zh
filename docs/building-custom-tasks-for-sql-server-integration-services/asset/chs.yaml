  向 `Parent.dtsx` SSIS 包添加一个新的 SSIS 包作用域的 `ADO.Net 连接管理器`，命名为 `Framework SSIS Catalog`，并连接到承载框架
  SSIS 目录的 SQL Server 实例，如图 23-15 所示：


  ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig15_HTML.jpg](img/449652_2_En_23_Fig15_HTML.jpg)

  *图 23-15：添加 Framework SSIS Catalog 连接管理器*


  向 `ECPTFramework` SSIS 项目添加一个新的名为 `Parent.dtsx` 的 SSIS 包。向 `Parent.dtsx` 控制流添加一个
  `执行 SQL 任务`，并将该 `执行 SQL 任务` 重命名为 `SQL Get Application Packages`，如图 23-16 所示：


  ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig16_HTML.jpg](img/449652_2_En_23_Fig16_HTML.jpg)

  *图 23-16：SQL Get Application Packages 常规视图*


  将 `ConnectionType` 属性设置为 `ADO.NET`，并将 `Connection` 属性设置为 `Framework SSIS Catalog`
  连接管理器。在 `SQLStatement` 属性中，输入清单 23-5 中的 T-SQL：


  ```sql

  Select p.FolderName

  , p.ProjectName

  , p.PackageName

  , ap.Synchronized

  , ap.MaximumRetries

  , ap.RetryIntervalSeconds

  , ap.Use32bit

  , ap.LoggingLevel

  From fw.ApplicationPackages ap

  Join fw.Applications a

  On a.ApplicationId = ap.ApplicationId

  Join fw.Packages p

  On p.PackageId = ap.PackageId

  Where a.ApplicationName = @ApplicationName

  Order By ap.ExecutionOrder

  ```

