- "# 第 19 章 消灭 Bug\n\nExecute Catalog Package Task 的代码中仍存在两个严重的错误：\n\n1.  即使 SSIS\
  \ 包执行失败，Execute Catalog Package Task 也会报告成功。\n2.  如果 SSIS 包执行时间超过 30 秒，`ExecuteCatalogPackageTask.Execute`会返回一条错误消息，内容为：“任务上的\
  \ Execute 方法返回错误代码 0x80131904（执行超时。在操作完成或服务器未响应之前超时期限已过。）。Execute 方法必须成功，并使用‘out’参数指示结果。”\n\
  \n两个错误的根本原因都在于`Execute`方法，因此解决方案是结合的。让我们从第二个错误“执行超时”开始。\n\n## 执行超时\n\n为什么`ExecuteCatalogPackageTask.Execute`方法会在\
  \ 30 秒时超时？我不知道。仅仅因为我不知道或不理解某些功能为什么以这种方式编码，*并不*意味着该功能的编码是错误的。我只是不知道为什么`ExecuteCatalogPackageTask.Execute`方法会在\
  \ 30 秒时超时。然而，我*确实*需要绕过这个限制。\n\n我找到的解决方案使用了`WaitHandle.WaitAny`方法。\n\n\n\n## 线程处理，简而言之\n\
  \n`WaitHandle.WaitAny` 方法是一个线程处理主题，属于 `System.Threading` .NET Framework 命名空间。编写大多数\
  \ .NET 应用程序并不需要你精通线程处理，但懂得越多越好。线程管理是一个数据专业人士能够理解的主题。可以想想数据库*事务*。\n\n数据库事务不会允许一个联名银行账户的两个账户持有人仅仅因为他们在完全相同的时间执行取款请求，就将银行账户中的所有资金全部取出。数据库事务会*阻塞*一个取款请求，直到另一个取款请求完成，使第二个取款请求*等待*直到第一个取款请求完成。当第一个取款请求完成其事务时，数据库引擎会通知——或*发出信号*——第二个取款请求，阻塞过程已完成。第二个取款请求随即执行并失败，因为账户已空——第一个取款请求在阻塞第二个取款请求的同时，已将资金从账户中移除。\n\
  \n上一段中强调的术语既涉及数据事务，也涉及线程安全。\n\n如果一个应用程序包含了与数据库事务类似的状态管理功能，则该应用程序被认为是*线程安全*的。一个线程安全的应用程序管理线程安全，就像数据库事务维护原子性一样，以此作为一种保护代码执行并交付准确结果的机制。\n\
  \n线程安全的应用程序通过允许某些代码仅序列化执行，同时管理等待线程的队列来实现原子性。等待线程在轮到它们执行时会收到信号。线程安全的应用程序是多线程功能的核心。更多内容请访问\
  \ `docs.microsoft.com/en-us/dotnet/api/system.threading?view=netframework-4.7.2`。\n\
  \n多线程应用程序共享*资源*——这些功能块被编码为*独占*访问，例如银行应用程序中的 `WithdrawFunds()` 方法。一个多线程应用程序通常需要管理多个独占资源来完成执行。`WaitHandle`\
  \ 管理在相关操作中执行的一组资源，而 `WaitAny` 方法则等待 `WaitHandle` 中*任何*成员发出信号。更多关于 `WaitHandle.WaitAny`\
  \ 方法的信息请访问 `docs.microsoft.com/en-us/dotnet/api/system.threading.waithandle.waitany?view=netframework-4.7.2`。\n\
  \n`ManualResetEvent` 对象派生自 `WaitHandle` 对象。`ManualResetEvent` 对象的状态是一个布尔值：false\
  \ 或 true；此状态通过调用 `ManualResetEvent.Set()` 和 `ManualResetEvent.Reset()` 方法来管理。`ManualResetEvent.Reset()`\
  \ 方法*重置*（将布尔状态设为 *false*），*手动* 阻止任何新出现的线程使用共享资源，让这些线程知道它们必须等待轮到自己执行。`ManualResetEvent.Set()`\
  \ 方法则向等待的线程*发出信号*（将布尔状态设为 *true*），*手动* 让等待线程知道它们现在可以执行了。\n\n前两句话很重要。在我们接下来处理示例时，你可能需要回头参考本节内容。别灰心。线程处理很难。线程安全更难。\n\
  \n## ExecuteCatalogPackageTask.Execute\n\nSSIS 目录的 `Synchronized` 执行参数 —— 一个布尔值\
  \ —— 控制 `ExecuteCatalogPackageTask.Execute` 方法如何从执行中返回。默认的 `Synchronized` 执行参数值为\
  \ false，这意味着 `ExecuteCatalogPackageTask.Execute` 方法的功能是“启动并忘记”。如果你在 `Synchronized`\
  \ 执行参数值设为 false 的情况下启动一个 SSIS 包，该包开始执行，并且 `ExecuteCatalogPackageTask.Execute` 方法几乎立即返回“成功”。由于\
  \ `ExecuteCatalogPackageTask.Execute` 方法表现为“启动并忘记”并几乎立即返回“成功”，其默认的 30 秒超时设置不会影响\
  \ `Synchronized` 执行参数值设为 false 时执行的 SSIS 包。\n\n`ExecuteCatalogPackageTask.Execute`\
  \ 方法的 30 秒超时设置仅在使用 `Synchronized` 执行参数值设为 true 执行 SSIS 包时才会成为问题。\n\n因此，基于 `WaitHandle.WaitAny`\
  \ 的解决方案的实现，仅适用于 `Synchronized` 执行参数值设为 true 时的 SSIS 包执行情况。\n\n\n\n## 设计测试用的 SSIS\
  \ 包\n\n为了测试 `ExecuteCatalogPackageTask.Execute` 方法的 30 秒超时错误，请向一个测试用的 SSIS 项目中添加一个名为\
  \ `RunForSomeTime.dtsx` 的新测试 SSIS 包，如图 19-1 所示：\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig1_HTML.jpg](img/449652_2_En_19_Fig1_HTML.jpg)\n\
  \n图 19-1：添加 `RunForSomeTime.dtsx` 测试 SSIS 包\n\n添加一个名为 `DelayString`、数据类型为 `String`\
