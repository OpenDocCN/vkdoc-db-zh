- '# 12. 编辑器集成


  在第 11 章中，我们对 `ExecuteCatalogPackageTaskComplexUI` 进行了最小化编码。本章重点介绍将新的复杂编辑器 (`ExecuteCatalogPackageTaskComplexUI`)
  与 `ExecuteCatalogPackageTask` 耦合所需的操作，类似于我们在第 5 章和第 6 章中与之前编辑器实现的耦合。耦合后，我们将在测试 SSIS
  包中测试最小化编码的 `ExecuteCatalogPackageTask`。


  ## 签署程序集


  第 5 章详细介绍了签署程序集的过程。为了在全局程序集缓存 (GAC) 中使用程序集，必须签署该程序集。本节描述的过程与第 5 章中描述的过程几乎相同。


  首先向 `ExecuteCatalogPackageTaskComplexUI` 项目添加一个名为 `Notes.txt` 的新文本文件。在解决方案资源管理器中右键单击
  `ExecuteCatalogPackageTaskComplexUI` 项目，将鼠标悬停在“添加”上，然后单击“新建项...”。当“添加新项”对话框显示时，单击“常规”类别，然后单击“文本文件”。将“TextFile1.txt”重命名为“Notes.txt”，如图
  12-1 所示：


  ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig1_HTML.jpg](img/449652_2_En_12_Fig1_HTML.jpg)


  图 12-1


  添加 `Notes.txt` 文件


  单击“添加”按钮将 `Notes.txt` 文件添加到 `ExecuteCatalogPackageTaskComplexUI` 项目中。在我的解决方案中，我在解决方案资源管理器中展开了
  `ExecuteCatalogPackageTask` 项目，打开了其中包含的 `Notes.txt` 文件，选中所有内容，复制内容，然后将剪贴板内容粘贴到 `ExecuteCatalogPackageTaskComplexUI`
  项目的新 `Notes.txt` 文件中。然后我编辑了粘贴的内容，将“ExecuteCatalogPackageTask”替换为“ExecuteCatalogPackageTaskComplexUI”，如图
  12-2 所示：


  ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig2_HTML.jpg](img/449652_2_En_12_Fig2_HTML.jpg)


  图 12-2


  从 `ExecuteCatalogPackageTask` 项目复制、粘贴、编辑 `Notes.txt`



  ### 创建密钥


  您需要在服务器上找到 `sn.exe` 来完成接下来的三个步骤。


  打开命令提示符窗口，输入清单 12-1 中的代码（该代码应出现在您的 `Notes.txt` 文件顶部附近）：


  ```

  "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
  -k key.snk

  清单 12-1

  创建 key.snk 文件

  ```


  执行后，结果应与图 12-3 所示类似：


  ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig3_HTML.jpg](img/449652_2_En_12_Fig3_HTML.jpg)


  图 12-3

  创建 key.snk 文件


  要将公钥写入名为 `public.out` 的文件，请从 `Notes.txt` 文件中粘贴下一行代码，即清单 12-2：


  ```

  "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
  -p key.snk public.out

  清单 12-2

  将公钥写入 public.out

  ```


  输出应如图 12-4 所示：


  ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig4_HTML.jpg](img/449652_2_En_12_Fig4_HTML.jpg)


  图 12-4

  将公钥写入 public.out


  通过执行清单 12-3 中的代码，从 `public.out` 文件中提取公钥令牌：


  ```

  "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
  -t public.out

  清单 12-3

  提取公钥令牌

  ```


  输出应与图 12-5 类似：


  ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig5_HTML.jpg](img/449652_2_En_12_Fig5_HTML.jpg)


  图 12-5

