  执行控制器 SSIS 包，并注意执行的（虚拟）步骤。第一步是 `ECPT 执行 ReportAndSucceed` 和 `ECPT 执行 RunForSomeTime`
  在 `SEQ 步骤 1` 中并行开始，如图 23-6 所示：


