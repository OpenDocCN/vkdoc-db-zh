  SSIS 包未在指定时间内完成执行时停止执行。


  ### 清理过时的异步执行


  下一步是清理 `executeSynchronous` 方法中（现已）过时的局部变量 `maximumRetries`、`retryIntervalSeconds`
  和 `operationTimeoutMinutes`。删除图 20-8 中高亮显示的代码：


