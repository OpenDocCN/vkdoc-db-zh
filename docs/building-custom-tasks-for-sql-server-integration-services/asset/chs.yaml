  \n### 重置集合\n\n重置集合很重要，因为它使得在编辑时，`SourceConnection` -> `Folder` -> `Project` -> `Package`的层次结构更易于管理。使用清单\
  \ 17-23 中的代码在`SettingsView`类中实现`resetCollections`方法：\n\n```csharp\nprivate void\
  \ resetCollections(string collectionName)\n{\n    Cursor = Cursors.WaitCursor;\n\
  \    switch (collectionName)\n    {\n        default:\n            break;\n    \
  \    case \"Connections\":\n            settingsNode.Folder = \"\";\n          \
  \  settingsNode.Project = \"\";\n            settingsNode.Package = \"\";\n    \
  \        break;\n        case \"Folders\":\n            settingsNode.Project = \"\
  \";\n            settingsNode.Package = \"\";\n            break;\n        case\
  \ \"Projects\":\n            settingsNode.Package = \"\";\n            break;\n\
  \    }\n    Cursor = Cursors.Default;\n}\n```\n清单 17-23\n添加`SettingsView.resetCollections`方法\n\
  \n添加后，代码如图 17-41 所示：\n\n![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig41_HTML.jpg](img/449652_2_En_17_Fig41_HTML.jpg)\n\
  \n图 17-41\n\n添加`SettingsView.resetCollections`方法\n\n`resetCollections`方法是如何工作的？一个名为`collectionName`的`string`类型参数被传递给`resetCollections`方法。在`resetCollections`方法内部，光标首先被设置为`WaitCursor`，而在方法退出前，光标被重置为`Default`光标。\n\
  \n一个由`collectionName`参数值驱动的`switch`语句被夹在这两次光标“设置”之间。层次结构是`SourceConnection` -> `Folder`\
  \ -> `Project` -> `Package`。`switch`语句包含对应于“Connections”、“Folders”和“Projects”的情况（case）。\n\
  \n“Connections”情况将`settingsNode.Folder`、`settingsNode.Project`和`settingsNode.Package`属性值重置为空字符串。“Folders”情况将`settingsNode.Project`和`settingsNode.Package`属性值重置为空字符串。“Projects”情况将`settingsNode.Package`属性值重置为空字符串。\n\
  \n下一步是将调用`resetCollections`方法的代码添加到`SettingsView.propertyGridSettings_PropertyValueChanged`方法的响应代码中，用于`SourceConnection`、`Folder`和`Project`属性，如图\
