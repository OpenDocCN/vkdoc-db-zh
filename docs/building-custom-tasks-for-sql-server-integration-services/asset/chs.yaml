- "# 21. 测试任务\n\n在前面的章节中，我们为本书第二版构建的“执行目录包任务”版本编写了功能代码。现在是时候测试“执行目录包任务”了。\n\n\n##\
  \ 手动测试用例\n\n虽然存在能够自动化测试生成、执行和报告中重复工作的测试框架，但如果你的工作是日复一日地开发软件，你迟早会接触到测试框架。你偶尔会遇到某个测试需求，而所选测试框架对此要么无能为力，要么显得“笨拙”。在这种情况下，你将需要构建一个手动测试。\n\
  \n所有良好的测试都由一系列场景、预期答案或结果（断言）以及对实际结果的测量组成。场景与断言的组合被称为一个 `用例`。一个用例可能包含多个断言。当我们执行测试时，我们会逐一处理每个用例，测量结果并记录测量值。\n\
  \n我有一个格言：“所有软件都经过测试。有些是刻意的。” 我偶尔会在社交媒体上发布这句格言，如图 21-1 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig1_HTML.jpg](img/449652_2_En_21_Fig1_HTML.jpg)\n\
  \n图 21-1\n\nAndy 的软件测试格言\n\n软件测试是一项细致且要求高的工作。在本章中，我们只测试部分（而非全部）用例。如果我们测试所有用例，本章将长达\
  \ 150 页，而我的编辑（理所当然地）会指出这是一章内容，而非一份测试计划。\n\n## 用例\n\n在本节中，我们将探讨针对“执行目录包任务”的以下用例：\n\
  \n1.  `任务存在性`\n2.  `任务验证`\n3.  `任务编辑器` – `常规`\n\n前几个用例涉及目视检查——简单地查看 `执行目录包任务` 是否出现在\
  \ `SSIS 工具箱` 中，如果是，则在 `SSIS 工具箱` 中选择 `执行目录包任务` 并验证工具箱描述。\n\n这些测试使用手动测试文档格式进行记录。作者见过类似的手动测试文档以\
  \ Excel 电子表格形式呈现，但更倾向于使用 Word 文档来记录手动测试。\n\n### 测试任务存在性\n\n场景：构建 `ExecuteCatalogPackageTask`\
  \ 解决方案，打开一个测试用 `SSIS` 项目，然后打开一个测试用 `SSIS` 包。`执行目录包任务` 应出现在 `SSIS 工具箱` 中，如图 21-2\
