    ## Configure Folders and Folder Structure


    In this section of the ExecuteCatalogPackageTask.wxs installation file configuration,
    we configure two paths for each assembly:


    *   The Tasks folder


    *   The Global Assembly Cache, or GAC


    As stated earlier, Visual Studio uses assemblies deployed to the Tasks folder
    to populate the SSIS Toolbox for development. The SSIS execution engine uses the
    assemblies registered with the GAC for execution.


    Configure the folders and folder structure fragment using the XML in Listing [22-9](#449652_2_En_22_Chapter.xhtml#PC9):


    ```


    Listing 22-9

