    in Listing [14-3](#449652_2_En_14_Chapter.xhtml#PC3) to the `propertyGridSettings_PropertyValueChanged`
    event handler method:


    ```

    if (e.ChangedItem.PropertyDescriptor.Name.CompareTo("SourceConnection") == 0)
    { }

    Listing 14-3

    Respond to SourceConnection property changes

    ```


    Once added, the `propertyGridSettings_PropertyValueChanged` event handler method
    appears as shown in Figure [14-3](#449652_2_En_14_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig3_HTML.jpg](images/449652_2_En_14_Chapter/449652_2_En_14_Fig3_HTML.jpg)


    Figure 14-3


    SourceConnection property changes only, please


    The next step is to check if "New Connection" was selected. Before proceeding,
    however, add the code in Listing [14-4](#449652_2_En_14_Chapter.xhtml#PC4) to
    define the `NEW_CONNECTION` string constant in `SettingsView`:


    ```

    private const string NEW_CONNECTION = "";

    Listing 14-4

    Add the NEW_CONNECTION string constant to SettingsView

    ```


    Once added, the declarations in `SettingsView` appears as shown in Figure [14-4](#449652_2_En_14_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig4_HTML.jpg](images/449652_2_En_14_Chapter/449652_2_En_14_Fig4_HTML.jpg)


    Figure 14-4


    Declaring `NEW_CONNECTION` constant in `SettingsView`


    Add the code in Listing [14-5](#449652_2_En_14_Chapter.xhtml#PC5) inside the previous
    `if` conditional statement in the `propertyGridSettings_PropertyValueChanged`
    method to determine if "New Connection" was clicked:


    ```

    if (e.ChangedItem.Value.Equals(NEW_CONNECTION)) { }

    Listing 14-5

    Checking for “New Connection” click

    ```


    Once the check for a "New Connection" click is added, the `propertyGridSettings_PropertyValueChanged`
    method appears as shown in Figure [14-5](#449652_2_En_14_Chapter.xhtml#Fig5):


    ![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig5_HTML.jpg](images/449652_2_En_14_Chapter/449652_2_En_14_Fig5_HTML.jpg)


    Figure 14-5


    Checking for New Connection clicks


    Before we add the code to create a new ADO.Net connection manager, we must first
    add and initialize (a little later) an `IDtsConnectionService` member named `connectionService`
    to the `SettingsView` class by adding the code in Listing [14-6](#449652_2_En_14_Chapter.xhtml#PC6)
    to declare the `connectionService` member:


    ```

    private IDtsConnectionService connectionService;

    Listing 14-6

    Adding connectionService to SettingsView

    ```


    When the code in Listing [14-6](#449652_2_En_14_Chapter.xhtml#PC6) is added, the
    `SettingsView` declarations appear as shown in Figure [14-6](#449652_2_En_14_Chapter.xhtml#Fig6):


    ![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig6_HTML.jpg](images/449652_2_En_14_Chapter/449652_2_En_14_Fig6_HTML.jpg)


    Figure 14-6


    `connectionService` added to `SettingsView`


    The next step is to initialize the `connectionService IDtsConnectionService` member
    by adding the code in Listing [14-7](#449652_2_En_14_Chapter.xhtml#PC7) to the
    `SettingsView OnInitialize` method:


    ```

    connectionService = (IDtsConnectionService)connections;

    Listing 14-7

    Initializing connectionService in OnInitialize

    ```


    When the code in Listing [14-7](#449652_2_En_14_Chapter.xhtml#PC7) is added, the
    `SettingsView OnInitialize` method appears as shown in Figure [14-7](#449652_2_En_14_Chapter.xhtml#Fig7):


    ![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig7_HTML.jpg](images/449652_2_En_14_Chapter/449652_2_En_14_Fig7_HTML.jpg)


    Figure 14-7


    `connectionService` initialized in `SettingsView OnInitialize`


    Add the code in Listing [14-8](#449652_2_En_14_Chapter.xhtml#PC8) inside the previous
    `if` conditional statement – `if (e.ChangedItem.Value.Equals(NEW_CONNECTION))`
    – in the `propertyGridSettings_PropertyValueChanged` method to respond to "New
    Connection" clicks:


    ```

    ArrayList newConnection = new ArrayList();

    if (!((settingsNode.SourceConnection == null) || (settingsNode.SourceConnection
    == "")))

    {

    settingsNode.SourceConnection = null;

    }

    newConnection = connectionService.CreateConnection("ADO.Net");

    if ((newConnection != null) && (newConnection.Count > 0))

    {

    ConnectionManager cMgr = (ConnectionManager)newConnection[0];

    settingsNode.SourceConnection = cMgr.Name;

    settingsNode.Connections = connectionService.GetConnectionsOfType("ADO.Net");

    }

    else

    {

    if (e.OldValue == null)

    {

    settingsNode.SourceConnection = null;

    }

    else

    {

    settingsNode.SourceConnection = (string)e.OldValue;

    }

    }

    Listing 14-8

    Respond to “New Connection” clicks

    ```


    When the code in Listing [14-8](#449652_2_En_14_Chapter.xhtml#PC8) is added, the
    `propertyGridSettings_PropertyValueChanged` method appears as shown in Figure
    [14-8](#449652_2_En_14_Chapter.xhtml#Fig8):


    ![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig8_HTML.jpg](images/449652_2_En_14_Chapter/449652_2_En_14_Fig8_HTML.jpg)


    Figure 14-8


    Responding to New Connection clicks


    On line 118, the code checks to see if the change that triggered the call to the
    `propertyGridSettings_PropertyValueChanged` method was a change to the `SourceConnection`
    property. Line 120 checks to see if the developer clicked the "<new connection>"
    item in the `SourceConnection` property dropdown. If the developer clicked the
    "<new connection>" item in the `SourceConnection` property dropdown, a new `ArrayList`
    variable named `newConnection` is declared on line 122.


    On lines 124–127, the `settingsNode SourceConnection` value is set to null if
    and only if the current `settingsNode SourceConnection` value is *not* null or
    empty.


    On line 129, a new ADO.Net connection manager is created. Creating a new ADO.Net
    connection manager involves


    *   Creating a new generic ADO.Net connection manager


    *   Adding the new generic ADO.Net connection manager to the SSIS package’s connection
    collection


    *   Opening the editor for the new ADO.Net connection manager so the SSIS developer
    can configure the connection manager


    On lines 131–136, the `settingsNode SourceConnection` value is assigned to the
    new connection if the `newConnection ArrayList` is not null and contains at least
    one value. The `settingsView.Connections` property is reloaded to add the new
    connection manager. If the `newConnection ArrayList` is null or contains no values,
    the code on lines 139–146 restores the previous value to the `settingsNode SourceConnection`
    value.


    The next step is to test the code.


    ## Let’s Test It!


    Before testing, let’s define a couple use cases:


    *   Use case 1: As before, we may configure the Execute Catalog Package Task to
    use an ADO.Net connection manager that was previously configured in the test SSIS
    package. We may configure the `FolderName`, `ProjectName`, and `PackageName` properties
    on the Settings page to an SSIS package deployed to the SSIS Catalog.


    Assert: Test SSIS package debug execution succeeds and SSIS package deployed to
    the SSIS Catalog executes.


    *   Use case 2: We may configure the Execute Catalog Package Task to use a *new*
    ADO.Net connection manager by clicking "<New Connection…>" in the Settings page
    `SourceConnection` property dropdown. The "Configure New ADO.Net Connection" dialog
    will display and allow the developer to configure a new ADO.Net connection manager.
    As in use case 1, we configure the `FolderName`, `ProjectName`, and `PackageName`
    properties on the Settings page to an SSIS package deployed to the SSIS Catalog.


    Assert: A new ADO.Net connection manager is added to the Test SSIS package. Test
    SSIS package debug execution succeeds and SSIS package deployed to the SSIS Catalog
    executes.'
