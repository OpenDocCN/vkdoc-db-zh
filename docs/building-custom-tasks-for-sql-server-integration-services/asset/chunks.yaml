- fmt: '## Adding the `returnCatalogProject` Method


    Continue refactoring the `Execute()` method by adding the `returnCatalogProject`
    method to the `ExecuteCatalogPackageTask` using the code in Listing [16-11](#449652_2_En_16_Chapter.xhtml#PC11):


    ```csharp

    public ProjectInfo returnCatalogProject(string ServerName

    , string FolderName

    , string ProjectName)

    {

    ProjectInfo catalogProject = null;

    SqlConnection cn = (SqlConnection)Connections[ConnectionManagerId].AcquireConnection(null);

    integrationServices = new IntegrationServices(cn);

    if (integrationServices != null)

    {

    catalog = integrationServices.Catalogs[PackageCatalogName];

    if (catalog != null)

    {

    catalogFolder = catalog.Folders[FolderName];

    if (catalogFolder != null)

    {

    catalogProject = catalogFolder.Projects[ProjectName];

    }

    }

    }

    return catalogProject;

    }

    Listing 16-11

    Adding `ExecuteCatalogPackageTask.returnCatalogProject`

    ```


    Once added, the new function appears as shown in Figure [16-20](#449652_2_En_16_Chapter.xhtml#Fig20):


    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig20_HTML.jpg](images/449652_2_En_16_Chapter/449652_2_En_16_Fig20_HTML.jpg)


    Figure 16-20


    The `returnCatalogProject` function


    If `SqlConnection` has a red squiggly line beneath it, right-click `SqlConnection`,
    expand Quick Actions, and then click `using System.Data.SqlClient;` to add the
    `using System.Data.SqlClient;` directive near the top of the `ExecuteCatalogPackageTask.cs`
    file.


    Once the `using System.Data.SqlClient;` directive is added, the code appears as
    shown in Figure [16-21](#449652_2_En_16_Chapter.xhtml#Fig21):


    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig21_HTML.jpg](images/449652_2_En_16_Chapter/449652_2_En_16_Fig21_HTML.jpg)


    Figure 16-21


    The `returnCatalogProject` function


    Declaring the `returnCatalogProject` function as `public` allows access to the
    `ExecuteCatalogPackageTask.returnCatalogProject` function from the `ExecuteCatalogPackageTaskComplexUI`
    project.


    Additional “returnCatalog*” methods are similar and demonstrate a very helpful
    pattern for interacting with SSIS connection managers: The `Connections.AcquireConnection`
    method returns a `SqlConnection` type object. Acquiring a `SqlConnection` by calling
    the `Connections.AcquireConnection` method is one way – perhaps the only way –
    to obtain a connection that requires a username and password from a connection
    manager.


    Later in this book, we demonstrate connecting an `ExecuteCatalogPackageTask` to
    an Azure-SSIS Catalog deployed on an Azure SQL DB instance. One way to connect
    to Azure SQL DB instances uses a SQL Login with username and password.


    Edit the code in the `Execute()` method, replacing the code that populates the
    Server ➤ Integration Services ➤ SSIS Catalog ➤ Folder ➤ Project hierarchy using
    the code shown in Listing [16-12](#449652_2_En_16_Chapter.xhtml#PC12):


    ```csharp

    catalogProject = returnCatalogProject(ServerName, PackageFolder, PackageProject);

    Listing 16-12

    Updating the `Execute()` method

    ```


    Once updated, the new `Execute()` method appears as shown in Figure [16-22](#449652_2_En_16_Chapter.xhtml#Fig22):


    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig22_HTML.jpg](images/449652_2_En_16_Chapter/449652_2_En_16_Fig22_HTML.jpg)


    Figure 16-22


    A portion of the updated `Execute()` method


    The next step is to add a method to return the catalog package in a similar fashion.


    ## Adding the `returnCatalogPackage` Method


