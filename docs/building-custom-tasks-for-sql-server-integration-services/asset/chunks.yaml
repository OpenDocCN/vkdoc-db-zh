    ## 注意事项


    本章中的演示基于许多假设，因此存在许多注意事项。可以这么说，作者意识到了其中许多（但非全部）假设和注意事项，并且很感兴趣地想看看读者们将如何调整、改变和改进本文中提出的想法。


    ## 结论


    在本章中，我们利用“执行目录包任务”构建了一个基于 SSIS 目录的元数据驱动 SSIS 框架。这个元数据驱动的框架与《SQL Server Data Automation
    Through Frameworks》一书中的 SSIS 框架本地版本以及 SSIS Framework Community Edition ([dilmsuite.com/ssis-framework-community-edition](https://dilmsuite.com/ssis-framework-community-edition))
    相似——这是一个免费开源项目，是构成 Data Integration Lifecycle Management Suite ([dilmsuite.com](https://dilmsuite.com))
    的实用工具集的一部分。


    本章的框架并未穷尽“执行目录包任务”的所有功能。您可以配置“表达式”视图来覆盖*任何*属性表达式，如图 23-51 所示：


