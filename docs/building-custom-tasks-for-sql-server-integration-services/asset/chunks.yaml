    Catalog Package Task to a test SSIS package takes more time than before. Once
    validated, the Execute Catalog Package Task raises several errors, as shown in
    Figure [18-26](#449652_2_En_18_Chapter.xhtml#Fig26):


    ![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig26_HTML.jpg](images/449652_2_En_18_Chapter/449652_2_En_18_Fig26_HTML.jpg)


