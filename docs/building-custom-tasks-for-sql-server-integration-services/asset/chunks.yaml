    ## 总结


    在本章中，我们将三个硬编码的变量 `maximumRetries`、`retryIntervalSeconds` 和 `operationTimeoutMinutes`
    转换为 `ExecuteCatalogPackageTask` 类的属性，然后向 `SettingsView` 和 `SettingsNode` 类添加代码，以便向SSIS开发者公开这些新属性。


    在下一章中，我们将测试“执行目录包任务”的功能。


    现在是一个签入代码的好时机。


