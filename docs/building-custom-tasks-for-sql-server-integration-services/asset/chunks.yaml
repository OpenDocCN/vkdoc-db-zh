    Figure 22-29


    Configuring the folders and folder structure fragment


    In Figure [22-29](#449652_2_En_22_Chapter.xhtml#Fig29), the `Fragment` tag spans
    lines 51–57\. The outermost `Directory` tag opens on line 53 and closes on line
    56\. The outermost `Directory` tag’s `Id` attribute value is `TARGETDIR` and its
    `Name` attribute value is `SourceDir`. The `Directory` tag on line 54 contains
    Id and Name attributes set to GAC is a self-closing `Directory` tag because the
    installer recognizes the values for the GAC. On line 55, the `SSISINSTALLFOLDER`
    property Id is specified in a `Directory` tag that defines the `SSISINSTALLFOLDER`
    registry-informed path – configured earlier – to the SSIS Tasks folder. On my
    virtual machine running the Windows Server 2016 operation system, SQL Server 2017
    is installed on the E: drive, and my `SSISINSTALLFOLDER` path resolves to `E:\Program
    Files (x86)\Microsoft SQL Server\140\DTS\Tasks`. Once installed on my virtual
    machine, the ExecuteCatalogPackageTask and ExecuteCatalogPackageTaskComplexUI
    assemblies will be deployed to `E:\Program Files (x86)\Microsoft SQL Server\140\DTS\Tasks`,
    as shown in Figure [22-30](#449652_2_En_22_Chapter.xhtml#Fig30):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig30_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig30_HTML.jpg)


