  trans: "\n## SourceConnection 属性值变更\n\n检测并响应 `SourceConnection` 属性变化的第一步是检测其属性值的变化。请将清单\
    \ 14-3 中的代码添加到 `propertyGridSettings_PropertyValueChanged` 事件处理方法中：\n\n```\nif\
    \ (e.ChangedItem.PropertyDescriptor.Name.CompareTo(\"SourceConnection\") == 0)\
    \ { }\n清单 14-3\n响应 SourceConnection 属性变更\n```\n\n添加后，`propertyGridSettings_PropertyValueChanged`\
    \ 事件处理方法如图 14-3 所示：\n\n![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig3_HTML.jpg](img/449652_2_En_14_Fig3_HTML.jpg)\n\
    \n图 14-3\n\n仅响应 SourceConnection 属性变更\n\n下一步是检查是否选择了“新建连接”。然而，在继续之前，请先将清单 14-4\
    \ 中的代码添加到 `SettingsView` 中，以定义 `NEW_CONNECTION` 字符串常量：\n\n```\nprivate const string\
    \ NEW_CONNECTION = \"\";\n清单 14-4\n向 SettingsView 添加 NEW_CONNECTION 字符串常量\n```\n\
    \n添加后，`SettingsView` 中的声明如图 14-4 所示：\n\n![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig4_HTML.jpg](img/449652_2_En_14_Fig4_HTML.jpg)\n\
    \n图 14-4\n\n在 `SettingsView` 中声明 `NEW_CONNECTION` 常量\n\n将清单 14-5 中的代码添加到 `propertyGridSettings_PropertyValueChanged`\
    \ 方法中先前的 `if` 条件语句内部，以确定是否点击了“新建连接”：\n\n```\nif (e.ChangedItem.Value.Equals(NEW_CONNECTION))\
    \ { }\n清单 14-5\n检查是否点击了“新建连接”\n```\n\n添加了对“新建连接”点击的检查后，`propertyGridSettings_PropertyValueChanged`\
    \ 方法如图 14-5 所示：\n\n![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig5_HTML.jpg](img/449652_2_En_14_Fig5_HTML.jpg)\n\
    \n图 14-5\n\n检查新建连接点击\n\n在我们添加代码来创建新的 ADO.Net 连接管理器之前，必须首先向 `SettingsView` 类添加并（稍后）初始化一个名为\
    \ `connectionService` 的 `IDtsConnectionService` 成员。将清单 14-6 中的代码添加进来以声明 `connectionService`\
    \ 成员：\n\n```\nprivate IDtsConnectionService connectionService;\n清单 14-6\n向 SettingsView\
    \ 添加 connectionService\n```\n\n添加清单 14-6 中的代码后，`SettingsView` 的声明如图 14-6 所示：\n\
    \n![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig6_HTML.jpg](img/449652_2_En_14_Fig6_HTML.jpg)\n\
    \n图 14-6\n\n已将 `connectionService` 添加到 `SettingsView`\n\n下一步是初始化 `connectionService\
    \ IDtsConnectionService` 成员。将清单 14-7 中的代码添加到 `SettingsView OnInitialize` 方法中：\n\
    \n```\nconnectionService = (IDtsConnectionService)connections;\n清单 14-7\n在 OnInitialize\
    \ 中初始化 connectionService\n```\n\n添加清单 14-7 中的代码后，`SettingsView OnInitialize` 方法如图\
    \ 14-7 所示：\n\n![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig7_HTML.jpg](img/449652_2_En_14_Fig7_HTML.jpg)\n\
    \n图 14-7\n\n在 `SettingsView OnInitialize` 中初始化了 `connectionService`\n\n将清单 14-8\
    \ 中的代码添加到 `propertyGridSettings_PropertyValueChanged` 方法中先前的 `if` 条件语句（`if (e.ChangedItem.Value.Equals(NEW_CONNECTION))`）内部，以响应“新建连接”点击：\n\
    \n```\nArrayList newConnection = new ArrayList();\nif (!((settingsNode.SourceConnection\
    \ == null) || (settingsNode.SourceConnection == \"\")))\n{\nsettingsNode.SourceConnection\
    \ = null;\n}\nnewConnection = connectionService.CreateConnection(\"ADO.Net\");\n\
    if ((newConnection != null) && (newConnection.Count > 0))\n{\nConnectionManager\
    \ cMgr = (ConnectionManager)newConnection[0];\nsettingsNode.SourceConnection =\
    \ cMgr.Name;\nsettingsNode.Connections = connectionService.GetConnectionsOfType(\"\
    ADO.Net\");\n}\nelse\n{\nif (e.OldValue == null)\n{\nsettingsNode.SourceConnection\
    \ = null;\n}\nelse\n{\nsettingsNode.SourceConnection = (string)e.OldValue;\n}\n\
    }\n清单 14-8\n响应“新建连接”点击\n```\n\n添加清单 14-8 中的代码后，`propertyGridSettings_PropertyValueChanged`\
    \ 方法如图 14-8 所示：\n\n![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig8_HTML.jpg](img/449652_2_En_14_Fig8_HTML.jpg)\n\
    \n图 14-8\n\n响应新建连接点击\n\n在第 118 行，代码检查触发对 `propertyGridSettings_PropertyValueChanged`\
    \ 方法调用的变化是否是对 `SourceConnection` 属性的更改。第 120 行检查开发人员是否点击了 `SourceConnection` 属性下拉列表中的“<新建连接>”项。如果开发人员点击了\
    \ `SourceConnection` 属性下拉列表中的“<新建连接>”项，则会在第 122 行声明一个名为 `newConnection` 的新 `ArrayList`\
    \ 变量。\n\n在第 124–127 行，当且仅当当前的 `settingsNode SourceConnection` 值*不*为 null 或空时，才将其设置为\
    \ null。\n\n在第 129 行，创建一个新的 ADO.Net 连接管理器。创建新的 ADO.Net 连接管理器涉及：\n\n*   创建一个新的通用\
    \ ADO.Net 连接管理器\n*   将新的通用 ADO.Net 连接管理器添加到 SSIS 包的连接集合中\n*   打开新的 ADO.Net 连接管理器的编辑器，以便\
    \ SSIS 开发人员可以配置该连接管理器\n\n在第 131–136 行，如果 `newConnection ArrayList` 不为 null 且至少包含一个值，则将\
    \ `settingsNode SourceConnection` 值赋给这个新连接。`settingsView.Connections` 属性被重新加载以添加新的连接管理器。如果\
    \ `newConnection ArrayList` 为 null 或不包含任何值，则第 139–146 行的代码会将先前的值恢复为 `settingsNode\
    \ SourceConnection` 值。\n\n下一步是测试代码。\n\n## 让我们测试一下！\n\n在测试之前，让我们先定义几个用例：\n\n* \
    \  用例 1：和之前一样，我们可以将执行目录包任务配置为使用先前在测试 SSIS 包中配置的 ADO.Net 连接管理器。我们可以在“设置”页面上将 `FolderName`、`ProjectName`\
    \ 和 `PackageName` 属性配置为已部署到 SSIS 目录的 SSIS 包。\n\n   断言：测试 SSIS 包调试执行成功，并且已部署到 SSIS\
    \ 目录的 SSIS 包执行成功。\n\n*   用例 2：我们可以通过点击“设置”页面 `SourceConnection` 属性下拉列表中的“<新建连接…>”来配置执行目录包任务使用一个*新的*\
    \ ADO.Net 连接管理器。“配置新建 ADO.Net 连接”对话框将显示，允许开发人员配置新的 ADO.Net 连接管理器。与用例 1 类似，我们在“设置”页面上将\
    \ `FolderName`、`ProjectName` 和 `PackageName` 属性配置为已部署到 SSIS 目录的 SSIS 包。\n\n  \
    \ 断言：一个新的 ADO.Net 连接管理器被添加到测试 SSIS 包中。测试 SSIS 包调试执行成功，并且已部署到 SSIS 目录的 SSIS 包执行成功。\n"
- fmt: '### Use Case 1


    Build the solution and then open the test SSIS project. To test use case 1, add
    an `Execute Catalog Package Task` to the control, open the editor, and then configure
    the task to execute an SSIS package in the SSIS Catalog, as shown in Figure 14-9:


    ![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig9_HTML.jpg](images/449652_2_En_14_Chapter/449652_2_En_14_Fig9_HTML.jpg)


    Figure 14-9: The `Execute Catalog Package Task` configured for use case 1


    Execute the test SSIS package in the debugger. If all goes as planned, the test
    SSIS package should succeed, as shown in Figure 14-10:


    ![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig10_HTML.jpg](images/449652_2_En_14_Chapter/449652_2_En_14_Fig10_HTML.jpg)


    Figure 14-10: Use case 1 success for test SSIS package execution


    Check the `SSIS Catalog All Execution` report to be sure the package executed
