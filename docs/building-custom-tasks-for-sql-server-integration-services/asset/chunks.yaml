    ```csharp

    public void raiseEvent(string messageType

    , int messageCode

    , string subComponent

    , string message)

    {

    bool fireAgain = true;

    switch (messageType)

    {

    default:

    break;

    case "Information":

    componentEvents.FireInformation(messageCode, subComponent, message, "", 0, ref
    fireAgain);

    break;

    case "Warning":

    componentEvents.FireWarning(messageCode, subComponent, message, "", 0);

    break;

    case "Error":

    componentEvents.FireError(messageCode, subComponent, message, "", 0);

    break;

    }

    }

    ```

