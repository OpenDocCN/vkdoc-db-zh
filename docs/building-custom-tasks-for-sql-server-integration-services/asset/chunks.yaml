    # 17. Refactoring the SSIS Package Hierarchy


    The goal of this chapter is to refactor `ExecuteCatalogPackageTask` methods to
    prepare for adding and testing the `Reference` property. The goals are


    *   Refactor the `SettingsView` catalog, folder, project, and package properties.

    *   Test folder, project, and package property expressions.


    ## Refactor the SettingsView Catalog, Folder, Project, and Package Properties


    Are you tired of typing the folder name, project name, and package name each time
    we configure an instance of the `Execute Catalog Package Task`? I am. Let’s add
    properties and functionality to allow us to *select* folders, projects, and packages.


    In this section, we add `object` type members to manage three collections – folders,
    projects, and packages – to the `SettingsNode` class. To do so, we will follow
    this pattern for each collection:


    *   Declare `SettingsNode` object type members (properties) to contain the collection.

    *   Add a new property for each level in the Folder ➤ Project ➤ Package hierarchy.

    *   Add a hidden (non-browsable) property for each collection.

    *   Add a method to populate a list for each object collection.

    *   Add a method to update each object collection.

    *   Centralize the call to update all related collections.

    *   Add calls to the `propertyGridSettings_PropertyValueChanged` to populate the
    *next* property collections in the hierarchy when certain property hierarchy values
    change.

    *   Add calls to the `propertyGridSettings_PropertyValueChanged` to clear properties
    *lower* in the hierarchy when certain property hierarchy values change.

    *   Hide the original property.


