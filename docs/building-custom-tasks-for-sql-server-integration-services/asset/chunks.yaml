    # Coding SettingsNode for Connection-Related Members


    To begin adding connection-related members to the `SettingsNode`, add a private
    member named `_connections` (of the object type) to the `SettingsNode` class using
    the code in `Listing 13-16`:


    ```

    private object _connections = null;

    Listing 13-16

    Adding the _connections object to SettingsNode

    ```


    Once added, `SettingsNode` members should appear as shown in `Figure 13-28`:


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig28_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig28_HTML.jpg)


    `Figure 13-28` Adding `_connections`


    In the `SettingsNode` constructor, initialize the `_connections` object to the
    `connections` object passed to the constructor by adding the code in `Listing
    13-17`:


    ```

    _connections = connections;

    Listing 13-17

    Initializing the _connections member

    ```


    The `SettingsNode` constructor appears as shown in `Figure 13-29`:


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig29_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig29_HTML.jpg)


    `Figure 13-29` Connections, initialized


    The next step is isolating ADO.Net connections contained within the SSIS package.


    ## Regarding SSIS Package Connections


    The next few paragraphs are not intended to confuse you, but they may confuse
    you if you are reading about how SSIS packages surface collections to SSIS tasks
    for the very first time. The following statements are true about SSIS:


    *   SSIS packages and containers are containers.


    *   SSIS packages, containers, and tasks are executables.


    *   An SSIS package will always contain a collection of containers – and the containers
    collection will always have at least one member because the package itself is
    a container.


    *   An SSIS package will always contain a collection of executables – and the
    executables collection will always have at least one member because the package
    itself is an executable.


    *   An SSIS package will always contain a collection of connection managers –
    and the connections collection may contain 0, 1, or several connection managers.


    The SSIS package connections collection is available to executables in case any
    given executable needs to consume an SSIS package connection manager. SSIS project
    connection managers are also members of SSIS package connections collections.


    When the `ExecuteCatalogPackageTaskComplexUIForm` is instantiated, the `ExecuteCatalogPackageTaskComplexUI`’s
    `GetView` method is called, and a member named `connectionService` (of the `IDtsConnectionService`
    type) is passed to the `SettingsView OnInitialize` method. The connections collection
    is passed to the `SettingsNode` constructor, where it may be used to populate
    lists of certain connection types.'
