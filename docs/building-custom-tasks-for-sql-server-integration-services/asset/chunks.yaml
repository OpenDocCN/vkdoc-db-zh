- fmt: '## Add an Icon


    Before you can use an icon, you must import it into your project. Right-click
    the `ExecuteCatalogPackageTask` project in `Solution Explorer`, hover over `Add`,
    and then click `Existing Item` as shown in Figure 9-20:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig20_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig20_HTML.jpg)


    Figure 9-20: Adding an Existing Item to the `ExecuteCatalogPackageTask` Project


    Navigate to the icon file you wish to use as shown in Figure 9-21:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig21_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig21_HTML.jpg)


    Figure 9-21: Selecting the icon


    The icon file will appear in `Solution Explorer` as shown in Figure 9-22:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig22_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig22_HTML.jpg)


    Figure 9-22: Viewing the icon file


    With the icon file selected in `Solution Explorer`, press the `F4` key to display
    the `Properties`. Change the `Build Action` property of the icon file from `Content`
    to `Embedded Resource` as shown in Figure 9-23:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig23_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig23_HTML.jpg)


    Figure 9-23: Changing the `Build Action` property of the icon file


    Let’s add the icon to the `ExecuteCatalogPackageTaskUI` form. Open the form and
    view the `Properties`. Click the ellipsis beside the `Icon` property to open the
    icon selection dialog as shown in Figure 9-24:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig24_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig24_HTML.jpg)


    Figure 9-24: Opening the form icon selection dialog


    Select the icon as shown in Figure 9-25:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig25_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig25_HTML.jpg)


    Figure 9-25: Selecting the form icon


    The selected icon now appears as the icon for the `ExecuteCatalogPackageTaskForm`
    form as shown in Figure 9-26:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig26_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig26_HTML.jpg)


    Figure 9-26: Viewing the form icon


    While we’re here, let’s update the `Text` property of the form to `"Execute Catalog
    Package Task Editor"` as shown in Figure 9-27:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig27_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig27_HTML.jpg)


    Figure 9-27: Updating the form’s text property


    `SSIS` won’t know which icon to display until we update the `DtsTask` decoration
    for `ExecuteCatalogPackageTask`. Open `ExecuteCatalogPackageTask.cs` and add the
    line shown in Listing 9-8 to the decoration:


    ```

    , IconResource = "ExecuteCatalogPackageTask.ALCStrike.ico"

    ```


    Listing 9-8: Adding the icon to the `DtsTask` decoration


    Your decoration should now appear similar to that shown in Figure 9-28:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig28_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig28_HTML.jpg)


    Figure 9-28: Viewing updated `DtsTask` decoration


    Now would be an excellent time to check your code into source control.


    ## Building the Task


    We are now code-complete! It is time to build our solution, which will compile
    the code into an executable. From the `Build` dropdown menu, click `Build Solution`
    as shown in Figure 9-29:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig29_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig29_HTML.jpg)


    Figure 9-29: Building the solution


    If all goes well, you should see verbiage in the `Output` window similar to that
    shown in Figure 9-30:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig30_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig30_HTML.jpg)


    Figure 9-30: Build output


    If all goes as expected, you should have two assemblies successfully built to
    the `DTS\Tasks\` folder as shown in Figure 9-31:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig31_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig31_HTML.jpg)


    Figure 9-31: `ExecuteCatalogPackageTask` and `ExecuteCatalogPackageTaskUI` assemblies
    in the `DTS\Tasks\` folder


    You should also find the assemblies in the `GAC` as shown in Figure 9-32:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig32_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig32_HTML.jpg)


    Figure 9-32: `ExecuteCatalogPackageTask` and `ExecuteCatalogPackageTaskUI` assemblies
    in the `GAC`


    ## Testing the Task


    The moment of truth has arrived. Will the task work? Will it even show up in the
    `SSIS Toolbox`? Let’s open `SQL Server Data Tools (SSDT)` and find out! If all
    has gone according to plan, you will be able to open a test `SSIS` project and
    see the following on the `SSIS Toolbox` as shown in Figure 9-33:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig33_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig33_HTML.jpg)


    Figure 9-33: Execute Catalog Package Task in the `SSIS Toolbox`


    Drag it onto the surface of the `Control Flow` as shown in Figure 9-34:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig34_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig34_HTML.jpg)


    Figure 9-34: Execute Catalog Package Task on the `SSIS` control flow


    Double-click the task to open the editor and configure the task as shown in Figure
    9-35:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig35_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig35_HTML.jpg)


    Figure 9-35: Editing the task


    Click the `Done` button and execute the package in the debugger. If all goes well,
    our `Execute Catalog Package Task` will succeed as shown in Figure 9-36:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig36_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig36_HTML.jpg)


    Figure 9-36: Task execution


    Did the task *really* succeed or did it just report success? We can check by examining
    the `SSIS Catalog Reports` which are built into `SQL Server Management Studio
    (SSMS)`. Open `SSMS` and connect to the instance that hosts your `SSIS Catalog`.
    Expand the `Integration Services Catalogs` node, right-click on `SSISDB`, hover
    over `Reports`, hover over `Standard Reports`, and then click `All Executions`
    as shown in Figure 9-37:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig37_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig37_HTML.jpg)


    Figure 9-37: Opening the `SSIS Catalog All Executions Report` in `SSMS`


    The `All Executions Report` displays `SSIS Package` executions in the past 7 days
    (by default). I confess. I executed it twice as shown in Figure 9-38:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig38_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig38_HTML.jpg)


    Figure 9-38: Viewing `SSIS Catalog All Executions Report`


    Excellent!'
