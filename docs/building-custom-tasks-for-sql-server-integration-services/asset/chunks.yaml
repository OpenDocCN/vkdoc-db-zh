    单击确定按钮，然后执行测试 SSIS 包。如果一切按计划进行，包执行将在 SSIS 目录中成功。检查是否设置了 `Use32bit` 属性的一种方法是执行清单
    15-3 中的 T-SQL 查询：


    ```

    Select folder_name

    , project_name

    , package_name

    , use32bitruntime

    From SSISDB.catalog.executions

    Order by execution_id DESC

    清单 15-3：检查是否设置了 `Use32bit`

    ```


    执行清单 15-3 中的 T-SQL 会返回确认 `Use32bit` 属性有效的结果，如图 15-4 所示：


