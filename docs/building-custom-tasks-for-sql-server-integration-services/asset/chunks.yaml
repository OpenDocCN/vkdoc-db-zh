    We next need to inform the task that it has an editor. Open the `ExecuteCatalogPackageTask`
    solution and the `ExecuteCatalogPackageTask` project in Visual Studio. Open the
    `ExecuteCatalogPackageTask` class as shown in Figure 9-11:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig11_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig11_HTML.jpg)


