    We now have a list of ADO.Net connection managers stored in the `_connections`
    object, which are hidden (not `Browsable`), internal `SettingsNode` property (member)
    named `Connections`.


    The next step is to build a `TypeConverter` that builds a list of ADO.Net connection
    manager names.


    ### Building the ADONetConnections TypeConverter


    A `TypeConverter` “provides a unified way of converting types of values to other
    types, as well as for accessing standard values and subproperties,” according
    to Microsoft’s `TypeConverter` Class documentation (docs.microsoft.com/en-us/dotnet/api/system.componentmodel.typeconverter?view=netframework-4.7.2).
    A `TypeConverter` is used to create an enumeration, or list, of objects from a
    collection. Applied to the list of ADO.Net connection managers in the `ExecuteCatalogPackageTaskComplexUI`,
    we will build an `ArrayList` of string values containing the names of ADO.Net
    connection managers stored in the collection of `Connections` (of the `object`
    type).


    To begin, add a new class named `ADONetConnections` to the `SettingsView.cs` file
    using the code in Listing 13-20:


    ```

    internal class ADONetConnections : StringConverter { }

    Listing 13-20

    Adding the ADONetConnections class

    ```


    When added, the code will appear as shown in Figure 13-32:


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig32_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig32_HTML.jpg)


    Figure 13-32 The new `ADONetConnections` `StringConverter` class


    `StringConverter` is one interface for `TypeConverter`.


    Declare and initialize a `constant string` member named `NEW_CONNECTION` to the
    `ADONetConnections` class using the code in Listing 13-21:


    ```

    private const string NEW_CONNECTION = "";

    Listing 13-21

    Adding NEW_CONNECTION to ADONetConnections

    ```


    `ADONetConnections` should appear as shown in Figure 13-33 after declaring the
    new member:


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig33_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig33_HTML.jpg)


    Figure 13-33 Declaring `ADONetConnections.NEW_CONNECTION`


    A `TypeConverter` follows a general pattern, surfacing one object and three overridable
    methods:


    *   `GetSpecializedObject` (`object`)

    *   `GetStandardValues` (`StandardValuesCollection`)

    *   `GetStandardValuesExclusive` (`bool`)

    *   `GetStandardValuesSupported` (`bool`)


    Implement these methods by adding the code in Listing 13-22 to the `ADONetConnections`
    class:


    ```

    private object GetSpecializedObject(object contextInstance)

    {

    DTSLocalizableTypeDescriptor typeDescr = contextInstance as DTSLocalizableTypeDescriptor;

    if (typeDescr == null)

    {

    return contextInstance;

    }

    return typeDescr.SelectedObject;

    }

    public override StandardValuesCollection GetStandardValues(ITypeDescriptorContext
    context)

    {

    object retrievalObject = GetSpecializedObject(context.Instance) as object;

    return new StandardValuesCollection(getADONetConnections(retrievalObject));

    }

    public override bool GetStandardValuesExclusive(ITypeDescriptorContext context)

    {

    return true;

    }

    public override bool GetStandardValuesSupported(ITypeDescriptorContext context)

    {

    return true;

    }

    Listing 13-22

    Adding TypeConverter methods to ADONetConnections

    ```


    When added, the code appears as shown in Figure 13-34:


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig34_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig34_HTML.jpg)


    Figure 13-34 Adding `ADONetConnections` methods


    A discussion of `TypeConverter` methods is an in-depth topic that the author chooses
    not to include in this example. The outcome of the `TypeConverter` implemented
    in the `ADONetConnections StringConverter` will be an `ArrayList` containing the
    names of ADO.Net connection managers configured in the SSIS package, plus the
    option to create a new ADO.Net connection manager.


    The `ADONetConnections StringConverter`‘s `GetStandardValues` method calls `getADONetConnections`,
    which builds and returns the `ArrayList`, using the code in Listing 13-23:


    ```

    private ArrayList getADONetConnections(object retrievalObject)

    {

    SettingsNode node = (SettingsNode)retrievalObject;

    ArrayList list = new ArrayList();

    ArrayList listConnections = new ArrayList();

    listConnections = (ArrayList)node.Connections;

    // adds the new connection item

    list.Add(NEW_CONNECTION);

    // adds each ADO.Net connection manager

    foreach (ConnectionManager cm in listConnections)

    {

    list.Add(cm.Name);

    }

    // sorts the connection manager list

    if ((list != null) && (list.Count > 0))

    {

    list.Sort();

    }

    return list;

    }

    Listing 13-23

    getADONetConnections

    ```


    Clear the `ArrayList` type errors by adding the directive `using System.Collections;`
    to the `SettingsView.cs` file.


    Once added, the code will appear as shown in Figure 13-35:


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig35_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig35_HTML.jpg)


    Figure 13-35 `getADONetConnections` added


    A brief description of the code in `getADONetConnections` follows. An instance
    of `settingsNode` is passed to the `getADONetConnections` method in the `retrievalObject`
    (`object`) argument. A new internal `SettingsNode` variable named `node` and two
    `ArrayList` variables – `list` and `listConnections` – are declared and initialized.
    `listConnections` is assigned the `Connections` object of the `SettingsNode` variable
    (`node`). `NEW_CONNECTION` is added to the `list` (`ArrayList`).


    A `foreach` loop enumerates each connection in `listConnections` and adds the
    name of each connection manager to the `list ArrayList`. Remember, per the `SettingsNode`
    constructor, `Connections` contains only ADO.Net connection managers.


    If the `list ArrayList` contains values, the code sorts the values contained in
    the `list ArrayList`.


    Finally, the `list ArrayList` is returned to the caller.'
