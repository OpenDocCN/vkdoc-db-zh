    \    *   SourceConnection\n\n*   SSIS Catalog Package Properties\n    *   Folder\n\
    \n*   Project\n\n*   Package\n\n*   SSIS Package Execution Properties\n    * \
    \  Use32bit\n\n*   LoggingLevel\n\n*   SSIS Package Synchronized Properties\n\
    \    *   Synchronized\n\n*   MaximumRetries\n\n*   RetryIntervalSeconds\n\n* \
    \  OperationTimeoutMinutes\n\nMeasurement: True\n\nScenario: Click the SourceConnection\
    \ property dropdown, as shown in Figure [21-6](#449652_2_En_21_Chapter.xhtml#Fig6):\n\
    \n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig6_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig6_HTML.jpg)\n\
    \nFigure 21-6\n\nDoes the SourceConnection dropdown list display all available\
    \ ADO.Net connection managers without error?\n\nAssertion: The SourceConnection\
    \ dropdown list displays all available ADO.Net connection managers without error.\n\
    \nMeasurement: True.\n\nScenario: Configure the SourceConnection property value\
    \ from the SourceConnection property dropdown, as shown in Figure [21-7](#449652_2_En_21_Chapter.xhtml#Fig7):\n\
    \n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig7_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig7_HTML.jpg)\n\
    \nFigure 21-7\n\nSelecting a value for the SourceConnection property\n\nScenario:\
    \ Close the Execute Catalog Package Task Editor, as shown in Figure [21-8](#449652_2_En_21_Chapter.xhtml#Fig8):\n\
    \n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig8_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig8_HTML.jpg)\n\
    \nFigure 21-8\n\nDoes the Execute Catalog Package Task appear – in error – on\
    \ the Control Flow canvas?\n\nAssertion: The validation errors raised by the Execute\
    \ Catalog Package Task as currently configured are\n\n*   There were errors during\
    \ the task validation.\n\n*   Folder property is not properly configured.\n\n\
    *   Value cannot be null.\n\nMeasurement: True.\n\nScenario: Open the Execute\
    \ Catalog Package Task and navigate to the Settings view. Click the Folder property\
    \ dropdown, as shown in Figure [21-9](#449652_2_En_21_Chapter.xhtml#Fig9):\n\n\
    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig9_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig9_HTML.jpg)\n\
    \nFigure 21-9\n\nDoes the Folder dropdown list display all available folders in\
    \ the SSIS Catalog configured in the SourceConnection without error?"
  trans: "## 手动测试用例\n\n虽然存在能够自动化测试生成、执行和报告中重复工作的测试框架，但如果你的工作是日复一日地开发软件，你迟早会接触到测试框架。你偶尔会遇到某个测试需求，而所选测试框架对此要么无能为力，要么显得“笨拙”。在这种情况下，你将需要构建一个手动测试。\n\
    \n所有良好的测试都由一系列场景、预期答案或结果（断言）以及对实际结果的测量组成。场景与断言的组合被称为一个 `用例`。一个用例可能包含多个断言。当我们执行测试时，我们会逐一处理每个用例，测量结果并记录测量值。\n\
    \n我有一个格言：“所有软件都经过测试。有些是刻意的。” 我偶尔会在社交媒体上发布这句格言，如图 21-1 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig1_HTML.jpg](img/449652_2_En_21_Fig1_HTML.jpg)\n\
    \n图 21-1\n\nAndy 的软件测试格言\n\n软件测试是一项细致且要求高的工作。在本章中，我们只测试部分（而非全部）用例。如果我们测试所有用例，本章将长达\
    \ 150 页，而我的编辑（理所当然地）会指出这是一章内容，而非一份测试计划。\n\n## 用例\n\n在本节中，我们将探讨针对“执行目录包任务”的以下用例：\n\
    \n1.  `任务存在性`\n2.  `任务验证`\n3.  `任务编辑器` – `常规`\n\n前几个用例涉及目视检查——简单地查看 `执行目录包任务`\
    \ 是否出现在 `SSIS 工具箱` 中，如果是，则在 `SSIS 工具箱` 中选择 `执行目录包任务` 并验证工具箱描述。\n\n这些测试使用手动测试文档格式进行记录。作者见过类似的手动测试文档以\
    \ Excel 电子表格形式呈现，但更倾向于使用 Word 文档来记录手动测试。\n\n### 测试任务存在性\n\n场景：构建 `ExecuteCatalogPackageTask`\
    \ 解决方案，打开一个测试用 `SSIS` 项目，然后打开一个测试用 `SSIS` 包。`执行目录包任务` 应出现在 `SSIS 工具箱` 中，如图 21-2\
    \ 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig2_HTML.jpg](img/449652_2_En_21_Fig2_HTML.jpg)\n\
    \n图 21-2\n\n`执行目录包任务` 是否出现在 `SSIS 工具箱` 中？\n\n断言：`执行目录包任务` 出现在 `SSIS 工具箱` 中。\n\n\
    测量结果：`True`。\n\n断言：当在 `SSIS 工具箱` 中选择 `执行目录包任务` 时，`执行目录包任务` 的描述会显示在 `SSIS 工具箱`\
    \ 的“信息”部分。\n\n测量结果：`True`。\n\n### 测试任务验证\n\n场景：将一个 `执行目录包任务` 拖到测试 `SSIS` 包的 `控制流画布`\
    \ 上。检查 `错误列表` 对话框，如图 21-3 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig3_HTML.jpg](img/449652_2_En_21_Fig3_HTML.jpg)\n\
    \n图 21-3\n\n`执行目录包任务` 是否以错误形式出现在 `控制流画布` 上？\n\n断言：可以将 `执行目录包任务` 添加到测试 `SSIS` 包的\
    \ `控制流画布`。\n\n测量结果：`True`。\n\n断言：新添加的 `执行目录包任务` 会引发验证错误。\n\n测量结果：`True`。\n\n断言：新添加的\
    \ `执行目录包任务` 所引发的验证错误是：\n\n*   `源连接` 属性未正确配置。\n*   `SQL Server 实例` 连接尝试失败。\n\n\
    测量结果：`True`。\n\n断言：新添加的 `执行目录包任务` 所引发的上述验证错误会触发一个 `SSIS` 验证错误：\n\n*   任务验证期间出现错误。\n\
    \n测量结果：`True`。\n\n### 测试任务编辑器\n\n在以下测试部分中，我们将操作 `执行目录包任务编辑器`。测试内容包括外观和功能。\n\n\
    场景：打开 `执行目录包任务编辑器`，如图 21-4 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig4_HTML.jpg](img/449652_2_En_21_Fig4_HTML.jpg)\n\
    \n图 21-4\n\n`执行目录包任务编辑器` 是否能无错误显示？\n\n有时解决方案构建成功，但 `ExecuteCatalogPackageTask`\
    \ 和 `ExecuteCatalogPackageTaskComplexUI` 类之间有一个（或多个）值未对齐。当发生这种未对齐时，编辑器将无法显示，而是显示错误。\n\
    \n断言：`执行目录包任务编辑器` 能无错误打开。\n\n测量结果：`True`，`执行目录包任务编辑器` 能无错误打开。\n\n断言：`执行目录包任务编辑器`\
    \ 提供三个视图：\n\n1.  `常规`\n2.  `设置`\n3.  `表达式`\n\n测量结果：`True`。\n\n断言：首次打开 `执行目录包任务编辑器`\
    \ 时，显示的是 `常规` 视图。\n\n测量结果：`True`。\n\n断言：`常规` 视图显示 `执行目录包任务` 的 `名称` 和 `描述` 属性，且属性值可编辑。\n\
    \n测量结果：`True`。\n\n场景：单击 `设置` 视图，如图 21-5 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig5_HTML.jpg](img/449652_2_En_21_Fig5_HTML.jpg)\n\
    \n图 21-5\n\n`执行目录包任务编辑器` 的 `设置视图` 是否能无错误显示？\n\n断言：选择 `设置` 时，`设置` 视图能无错误显示。\n\n\
    测量结果：`True`。\n\n断言：选择 `设置` 时，`设置` 视图显示以下类别和属性：\n\n*   `连接`\n    *   `SourceConnection`\n\
    *   `SSIS 目录包属性`\n    *   `文件夹`\n    *   `项目`\n    *   `包`\n*   `SSIS 包执行属性`\n\
    \    *   `使用 32 位`\n    *   `日志记录级别`\n*   `SSIS 包同步属性`\n    *   `同步`\n    *  \
    \ `最大重试次数`\n    *   `重试间隔秒`\n    *   `操作超时分钟`\n\n测量结果：`True`\n\n场景：单击 `SourceConnection`\
    \ 属性下拉列表，如图 21-6 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig6_HTML.jpg](img/449652_2_En_21_Fig6_HTML.jpg)\n\
    \n图 21-6\n\n`SourceConnection` 下拉列表是否能无错误地显示所有可用的 `ADO.Net` 连接管理器？\n\n断言：`SourceConnection`\
    \ 下拉列表能无错误地显示所有可用的 `ADO.Net` 连接管理器。\n\n测量结果：`True`。\n\n场景：从 `SourceConnection`\
    \ 属性下拉列表中配置 `SourceConnection` 属性值，如图 21-7 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig7_HTML.jpg](img/449652_2_En_21_Fig7_HTML.jpg)\n\
    \n图 21-7\n\n为 `SourceConnection` 属性选择值\n\n场景：关闭 `执行目录包任务编辑器`，如图 21-8 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig8_HTML.jpg](img/449652_2_En_21_Fig8_HTML.jpg)\n\
    \n图 21-8\n\n`执行目录包任务` 是否以错误形式出现在 `控制流画布` 上？\n\n断言：当前配置的 `执行目录包任务` 所引发的验证错误是：\n\
    \n*   任务验证期间出现错误。\n*   `文件夹` 属性未正确配置。\n*   值不能为 null。\n\n测量结果：`True`。\n\n场景：打开\
    \ `执行目录包任务` 并导航到 `设置` 视图。单击 `文件夹` 属性下拉列表，如图 21-9 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig9_HTML.jpg](img/449652_2_En_21_Fig9_HTML.jpg)\n\
    \n图 21-9\n\n`文件夹` 下拉列表是否能无错误地显示在 `SourceConnection` 中配置的 `SSIS 目录` 中所有可用的文件夹？"
