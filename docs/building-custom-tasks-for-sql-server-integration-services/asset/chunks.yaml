    *Figure 18-25. Package validation code*\n\nThe Folder, Project, and Package property\
    \ validations are code complete. Build the `ExecuteCatalogPackageTask` solution,\
    \ and then add the Execute Catalog Package Task to a test SSIS package. As the\
    \ validation is currently coded, adding an Execute Catalog Package Task to a test\
    \ SSIS package takes more time than before. Once validated, the Execute Catalog\
    \ Package Task raises several errors, as shown in Figure 18-26:\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig26_HTML.jpg](images/449652_2_En_18_Chapter/449652_2_En_18_Fig26_HTML.jpg)\n\
    *Figure 18-26. Error raised when adding an Execute Catalog Package Task*\n\nBecause\
    \ the properties being validated are hierarchical (SourceConnection ➤ Folder ➤\
    \ Project ➤ Package), it makes no sense to attempt validation of properties *lower*\
    \ in the hierarchy if properties *higher* in the hierarchy are invalid. One way\
    \ to correct validation behavior is to check the value of the `validateResult\
    \ DTSExecResult` variable before validating subsequent properties by adding the\
    \ conditional statement in Listing 18-16 prior to Folder, Project, and Package\
    \ validation code:\n\n```\nif (validateResult != DTSExecResult.Failure)\n{\n \
    \   .\n    .\n    .\n}\n```\n*Listing 18-16. Check the value of validateResult\
    \ DTSExecResult variable*\n\nApplied to the Folder property validation, the code\
    \ appears as shown in Figure 18-27:\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig27_HTML.jpg](images/449652_2_En_18_Chapter/449652_2_En_18_Fig27_HTML.jpg)\n\
    *Figure 18-27. Applying validateResult conditional to Folder property*\n\nChecking\
    \ the value of the `validateResult` variable works because each property validation\
    \ sets `validateResult` to `DTSExecResult.Failure` if the property is invalid.\n\
    \nBuild the `ExecuteCatalogPackageTask` solution and then add the Execute Catalog\
    \ Package Task to a test SSIS package. Validation completes faster and tests only\
    \ `SourceConnection`, as shown in Figure 18-28:\n\n![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig28_HTML.jpg](images/449652_2_En_18_Chapter/449652_2_En_18_Fig28_HTML.jpg)\n\
    *Figure 18-28. Faster and better validation*\n\nThe validation code is complete.\n\
    \n## Conclusion\n\nIn this chapter, we added instrumentation and validation to\
    \ the `ExecuteCatalogPackageTask` solution.\n\nIn the next chapter, we identify\
    \ and address two egregious bugs.\n\nNow would be an excellent time to check in\
    \ your code.\n\n# 19. Crushing Bugs\n\nTwo egregious bugs remain in the Execute\
    \ Catalog Package Task code:\n\n1.  The Execute Catalog Package Task reports success,\
    \ even when the SSIS package execution fails.\n\n2.  If the SSIS package executes\
    \ for longer than 30 seconds, the `ExecuteCatalogPackageTask.Execute` returns\
    \ an error message that reads “The Execute method on the task returned error code\
    \ 0x80131904 (Execution Timeout Expired. The timeout period elapsed prior to completion\
    \ of the operation or the server is not responding.). The Execute method must\
    \ succeed, and indicate the result using an ‘out’ parameter.”\n\nThe root cause\
    \ of both bugs lies in the `Execute` method, so the solution is blended. Let’s\
    \ start with the second bug, Execution Timeout Expired.\n\n## Execution Timeout\
    \ Expired\n\nWhy does the `ExecuteCatalogPackageTask.Execute` method time out\
    \ at 30 seconds? I do not know. Just because I do not know or understand why some\
    \ functionality is coded the way it is coded does *not* mean the functionality\
    \ is coded incorrectly. I simply do not know why the `ExecuteCatalogPackageTask.Execute`\
    \ method times out at 30 seconds. I *do*, however, need to work around this limitation.\n\
    \nThe solution I found uses the `WaitHandle.WaitAny` method."
