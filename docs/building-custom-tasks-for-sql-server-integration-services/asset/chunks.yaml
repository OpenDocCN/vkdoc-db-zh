- fmt: '### Cleaning Up


    为了确保我们从相同的起点开始，请使用清单 [22-16](#449652_2_En_22_Chapter.xhtml#PC16) 中的命令，从 GAC 中注销
    `ExecuteCatalogPackageTask` 和 `ExecuteCatalogPackageTaskComplexUI` 程序集：


    ```

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.7.2 Tools\gacutil.exe"
    -u ExecuteCatalogPackageTask

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.7.2 Tools\gacutil.exe"
    -u ExecuteCatalogPackageTaskComplexUI

    ```

    清单 22-16 从 GAC 注销 `ExecuteCatalogPackageTask` 和 `ExecuteCatalogPackageTaskComplexUI`


    请确保以管理员身份打开命令提示符来执行 GAC 注销命令，如图 [22-40](#449652_2_En_22_Chapter.xhtml#Fig40) 所示：


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig40_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig40_HTML.jpg)

    图 22-40 从 GAC 注销 `ExecuteCatalogPackageTask` 和 `ExecuteCatalogPackageTaskComplexUI`


    在图 [22-40](#449652_2_En_22_Chapter.xhtml#Fig40) 中，我的服务器显示“Number of assemblies
    uninstalled = 0”，这表示程序集已经卸载。你的情况可能不同。


    请仔细检查 GAC 路径并删除可能在该位置发现的残留文件，如图 [22-41](#449652_2_En_22_Chapter.xhtml#Fig41) 所示：


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig41_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig41_HTML.jpg)

    图 22-41 清理 GAC


    在我的虚拟机上，GAC 文件的位置是 `C:\Windows\Microsoft.NET\assembly\GAC_MSIL`。你的 GAC 位置路径可能不同。


    接下来，通过在解决方案资源管理器中右键单击项目名称，然后单击“属性”，打开 `ExecuteCatalogPackageTask` Visual Studio
    项目的属性。在“生成”页面上，将“输出路径”属性更改为 `bin\Debug\`，如图 [22-42](#449652_2_En_22_Chapter.xhtml#Fig42)
    所示：


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig42_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig42_HTML.jpg)

    图 22-42 编辑“输出路径”属性


    单击“生成事件”页面，并清空“生成前事件命令行”和“生成后事件命令行”文本框中的所有文本，如图 [22-43](#449652_2_En_22_Chapter.xhtml#Fig43)
    所示：


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig43_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig43_HTML.jpg)

    图 22-43 清空生成前和生成后命令行


    *对 `ExecuteCatalogPackageTaskUI` Visual Studio 项目重复前两个步骤。*


    ### 执行安装


    双击你的 `ExecuteCatalogPackageTaskSetup.msi` 文件开始测试安装，将从许可页面启动安装。勾选“我接受许可协议中的条款”复选框以继续，如图
    [22-44](#449652_2_En_22_Chapter.xhtml#Fig44) 所示：


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig44_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig44_HTML.jpg)

    图 22-44 在许可协议页开始“Execute Catalog Package Task Setup”


    下一步是响应“用户账户控制”通知，如图 [22-45](#449652_2_En_22_Chapter.xhtml#Fig45) 所示：


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig45_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig45_HTML.jpg)

    图 22-45 响应用户账户控制通知


    如果单击“是”按钮，“Execute Catalog Package Task Setup”过程将完成，如图 [22-46](#449652_2_En_22_Chapter.xhtml#Fig46)
    所示：


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig46_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig46_HTML.jpg)

    图 22-46 完成“Execute Catalog Package Task Setup”过程


    重新执行 `ExecuteCatalogPackageTaskSetup.msi` 文件会显示“修复”和“删除”按钮，其功能不言自明，如图 [22-47](#449652_2_En_22_Chapter.xhtml#Fig47)
    所示：


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig47_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig47_HTML.jpg)

    图 22-47 重新执行 `ExecuteCatalogPackageTaskSetup.msi` 文件


    验证安装文件是否已将 `ExecuteCatalogPackageTask` 和 `ExecuteCatalogPackageTaskComplexUI`
    程序集（DLL 文件）部署到 SSIS Tasks（或开发）文件夹，如图 [22-48](#449652_2_En_22_Chapter.xhtml#Fig48)
    所示：


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig48_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig48_HTML.jpg)

    图 22-48 验证安装到 SSIS Tasks 文件夹


    在我的虚拟机上，SSIS Tasks（或开发）文件夹的路径是 `E:\Program Files\Microsoft SQL Server\140\DTS\Tasks`。


    验证安装文件是否已将 `ExecuteCatalogPackageTask` 和 `ExecuteCatalogPackageTaskComplexUI`
    程序集部署到 GAC，如图 [22-49](#449652_2_En_22_Chapter.xhtml#Fig49) 所示：


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig49_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig49_HTML.jpg)

    图 22-49 验证安装到 GAC


    如前所述，在我的虚拟机上，GAC 文件的位置是 `C:\Windows\Microsoft.NET\assembly\GAC_MSIL`。


    ### 让我们来测试一下！


    执行 `ExecuteCatalogPackageTaskSetup.msi` 安装程序文件后，打开一个测试 SSIS 项目和测试 SSIS 包。打开 SSIS
    工具箱并检查“Execute Catalog Package Task”是否可用，如图 [22-50](#449652_2_En_22_Chapter.xhtml#Fig50)
    所示：


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig50_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig50_HTML.jpg)

    图 22-50 “Execute Catalog Package Task”检查


    如果“Execute Catalog Package Task”在 SSIS 工具箱中可用，你应该能够在服务器上的 SSIS 中配置该任务。


    ## 故障排除安装


    生成安装文件可能很棘手。本节提供三个有用的故障排除技巧。


    重要的是要记住，在你的企业数据集成生命周期中的每个服务器上安装“Execute Catalog Package Task”。将 SSIS 包部署到未安装“Execute
    Catalog Package Task”的服务器将导致类似于以下错误：“`Error loading Package.dtsx: Cannot create
    a task from XML for task "Execute Catalog Package Task", type "ExecuteCatalogPackageTask.ExecuteCatalogPackageTask,
    ExecuteCatalogPackageTask, Version=1.0.0.0, Culture=neutral, PublicKeyToken=e86e33313a45419e"
    due to error 0x80070057 "The parameter is incorrect.".`”。在未安装“Execute Catalog
    Package Task”的服务器上打开 SSIS 包时，SSIS 项目会抛出错误，并且“Execute Catalog Package Task”将显示如图
    [22-51](#449652_2_En_22_Chapter.xhtml#Fig51) 所示：


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig51_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig51_HTML.jpg)

    图 22-51 在未安装“Execute Catalog Package Task”的服务器上打开配置了“Execute Catalog Package Task”的
    SSIS 包


    请注意图 [22-51](#449652_2_En_22_Chapter.xhtml#Fig51) 中的通用 SSIS 包任务徽标（圆圈）。


    ### 记录安装


    你可以使用类似于清单 [22-17](#449652_2_En_22_Chapter.xhtml#PC17) 所示的命令来记录安装：


    ```

    msiexec /i ExecuteCatalogPackageTask.msi /l*v ECPT_Installation_Log.txt

    ```

    清单 22-17 记录 msi 文件执行


    执行安装后，你可以查看日志文件的内容。'
  raw: '### Cleaning Up


    To make sure we are starting from the same starting point, unregister the ExecuteCatalogPackageTask
    and ExecuteCatalogPackageTaskComplexUI assemblies from the GAC using the commands
    in Listing [22-16](#449652_2_En_22_Chapter.xhtml#PC16):


    ```

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.7.2 Tools\gacutil.exe"
    -u ExecuteCatalogPackageTask

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.7.2 Tools\gacutil.exe"
    -u ExecuteCatalogPackageTaskComplexUI

    Listing 22-16

    Unregister ExecuteCatalogPackageTask and ExecuteCatalogPackageTaskComplexUI from
    the GAC

    ```


    Make sure you open a command prompt as an administrator to execute the GAC unregister
    commands, as shown in Figure [22-40](#449652_2_En_22_Chapter.xhtml#Fig40):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig40_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig40_HTML.jpg)


    Figure 22-40


    Unregistering ExecuteCatalogPackageTask and ExecuteCatalogPackageTaskComplexUI
    from the GAC


    In Figure [22-40](#449652_2_En_22_Chapter.xhtml#Fig40), my server displays “Number
    of assemblies uninstalled = 0” which indicates the assemblies are already uninstalled.
    Your mileage may vary.


    Double-check the GAC path and delete any residual files you may discover in that
    location, as shown in Figure [22-41](#449652_2_En_22_Chapter.xhtml#Fig41):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig41_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig41_HTML.jpg)


    Figure 22-41


    Cleaning the GAC


    On my virtual machine, the location of the GAC files is `C:\Windows\Microsoft.NET\assembly\GAC_MSIL`.
    The location of your GAC may be a different path.


    Next, open the Properties for the ExecuteCatalogPackageTask Visual Studio project
    by right-clicking the project name in Solution Explorer and then clicking Properties.
    On the Build page, change the Output path property to “bin\Debug\” as shown in
    Figure [22-42](#449652_2_En_22_Chapter.xhtml#Fig42):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig42_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig42_HTML.jpg)


    Figure 22-42


    Editing the Output path property


    Click the Build Events page and delete all text from the “Pre-build event command
    line” and the “Post-build event command line” textboxes, as shown in Figure [22-43](#449652_2_En_22_Chapter.xhtml#Fig43):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig43_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig43_HTML.jpg)


    Figure 22-43


    Clearing pre- and post-build command lines


    *Repeat the previous two steps* for the ExecuteCatalogPackageTaskUI Visual Studio
    project.


    ### Execute the Installation


    Double-click your ExecuteCatalogPackageTaskSetup.msi file to test installation
    to start the installation with the license page. Check the “I accept the terms
    in the License Agreement” checkbox to proceed, as shown in Figure [22-44](#449652_2_En_22_Chapter.xhtml#Fig44):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig44_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig44_HTML.jpg)


    Figure 22-44


    Starting the Execute Catalog Package Task Setup at the license agreement


    The next step is to reply to the User Account Control notification, as shown in
    Figure [22-45](#449652_2_En_22_Chapter.xhtml#Fig45):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig45_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig45_HTML.jpg)


    Figure 22-45


    Respond to User Access Control notification


    If you click the Yes button, the Execute Catalog Package Task Setup process completes,
    as shown in Figure [22-46](#449652_2_En_22_Chapter.xhtml#Fig46):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig46_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig46_HTML.jpg)


    Figure 22-46


    Completing the Execute Catalog Package Task Setup process


    Re-executing the ExecuteCatalogPackageTaskSetup.msi file presents Repair and Remove
    buttons, which are self-explanatory, as shown in Figure [22-47](#449652_2_En_22_Chapter.xhtml#Fig47):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig47_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig47_HTML.jpg)


    Figure 22-47


    Re-executing the ExecuteCatalogPackageTaskSetup.msi file


    Verify the install file deploys the ExecuteCatalogPackageTask and ExecuteCatalogPackageTaskComplexUI
    assemblies (DLL files) to the SSIS Tasks (or development) folder, as shown in
    Figure [22-48](#449652_2_En_22_Chapter.xhtml#Fig48):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig48_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig48_HTML.jpg)


    Figure 22-48


    Verifying installation to the SSIS Tasks folder


    On my virtual machine, the path to the SSIS Tasks (or development) folder is `E:\Program
    Files\Microsoft SQL Server\140\DTS\Tasks`.


    Verify the install file deploys the ExecuteCatalogPackageTask and ExecuteCatalogPackageTaskComplexUI
    assemblies to the GAC, as shown in Figure [22-49](#449652_2_En_22_Chapter.xhtml#Fig49):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig49_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig49_HTML.jpg)


    Figure 22-49


    Verifying installation to the GAC


    The location of the GAC files is `C:\Windows\Microsoft.NET\assembly\GAC_MSIL`
    on my virtual machine, as stated earlier.


    ### Let’s Test It!


    After executing the ExecuteCatalogPackageTaskSetup.msi installer file, open a
    test SSIS project and test SSIS package. Open the SSIS Toolbox and check for the
    Execute Catalog Package Task, as shown in Figure [22-50](#449652_2_En_22_Chapter.xhtml#Fig50):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig50_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig50_HTML.jpg)


    Figure 22-50


    Execute Catalog Package Task, check


    If the Execute Catalog Package Task is available in the SSIS Toolbox, you should
    be able to configure the task in SSIS on your server.


    ## Troubleshooting the Installation


    Building an install file can be tricky. In this section are three helpful tips
    for troubleshooting.


    It is important to remember to install the Execute Catalog Package Task on every
    server in your enterprise Data Integration Lifecycle. Deploying an SSIS package
    to a server where the Execute Catalog Package Task has *not* been installed will
    result an error similar to “`Error loading Package.dtsx: Cannot create a task
    from XML for task "Execute Catalog Package Task", type "ExecuteCatalogPackageTask.ExecuteCatalogPackageTask,
    ExecuteCatalogPackageTask, Version=1.0.0.0, Culture=neutral, PublicKeyToken=e86e33313a45419e"
    due to error 0x80070057 "The parameter is incorrect.".`” When opening an SSIS
    package on a server where the Execute Catalog Package Task has not been installed,
    the SSIS project throws errors, and the Execute Catalog Package Task appears as
    shown in Figure [22-51](#449652_2_En_22_Chapter.xhtml#Fig51):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig51_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig51_HTML.jpg)


    Figure 22-51


    Opening an SSIS package with an Execute Catalog Package Task configured, on a
    server on which the Execute Catalog Package Task has not been installed


    Note the generic SSIS package task logo, circle in Figure [22-51](#449652_2_En_22_Chapter.xhtml#Fig51).


    ### Logged Installation


    You may log the installation using a command similar to that shown in Listing
    [22-17](#449652_2_En_22_Chapter.xhtml#PC17):


    ```

    msiexec /i ExecuteCatalogPackageTask.msi /l*v ECPT_Installation_Log.txt

    Listing 22-17

    Logging the msi file execution

    ```


    After executing the installation, you may view the contents of the log file.'
