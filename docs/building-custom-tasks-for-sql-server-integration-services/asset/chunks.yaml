    ## Conclusion


    In this chapter, we implemented the `IDTSTaskUIView` editor interfaces for `GeneralView`
    and `SettingsView`, added properties (members) to each view, and conducted tests –
    where possible – each step along the way.


    The next steps are completing the `SourceConnection` property functionality and
    adding more `SettingsView` members.


    Now would be an excellent time to check in your code.


    # 14. Implement New Connection


    In Chapter [13](#449652_2_En_13_Chapter.xhtml), we implemented `GeneralView` and
    made a good start of implementing `SettingsView`. This chapter is all about completing
    the `SettingsView SourceConnection` property implementation, which is the most
    complex part of building the Execute Catalog Package Task Complex editor (thus
    far, at least).


    ## Implementing New Connection Functionality


    To implement “<New Connection…>” functionality in the `SourceConnection` dropdown,
    we first need to add an event handler for changes to manage and respond changes
    in PropertyGrid values.


    Begin by adding the code in Listing [14-1](#449652_2_En_14_Chapter.xhtml#PC1)
    to the `SettingsView` class:


    ```

    private void propertyGridSettings_PropertyValueChanged(object s, System.Windows.Forms.PropertyValueChangedEventArgs
    e) { }

    Listing 14-1

    Adding the propertyGridSettings_PropertyValueChanged event handler method

    ```


    Once added, the code appears as shown in Figure [14-1](#449652_2_En_14_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_14_Chapter/449652_2_En_14_Fig1_HTML.jpg](images/449652_2_En_14_Chapter/449652_2_En_14_Fig1_HTML.jpg)


