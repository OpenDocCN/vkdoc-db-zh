    添加后，脚本任务的 `Main()` 方法代码如图 19-42 所示：


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig42_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig42_HTML.jpg)

    图 19-42

    `ReportAndFail.dtsx` SSIS 包脚本任务 `Main()` 方法代码


    脚本中的 `Main()` 方法引发两个事件：一个信息事件和一个错误事件。信息事件提供消息“I am ReportAndFail”。引发错误事件会使 SSIS
