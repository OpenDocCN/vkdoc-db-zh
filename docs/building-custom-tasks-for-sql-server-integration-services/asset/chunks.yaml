  raw: '### Lifting and Shifting Framework Metadata Tables


    When engineers migrate data from on-premises to the cloud, the operation is often
    described as *lifting and shifting*. In this section, we lift and shift the framework
    metadata artifacts and data using the same T-SQL used in Chapter [23](#449652_2_En_23_Chapter.xhtml),
    but with a different database target. This time, the target is the Azure SQL database
    named SSISFramework, the database we provisioned in Chapter [24](#449652_2_En_24_Chapter.xhtml).


    If the following looks like it was copied from Chapter [23](#449652_2_En_23_Chapter.xhtml),
    pasted here, and then edited ever so slightly, that’s because the following was
    copied from Chapter [23](#449652_2_En_23_Chapter.xhtml), pasted here, and then
    edited ever so slightly.


    To begin, open SQL Server Management Studio (SSMS) and connect to the Azure SQL
    Server instance that hosts the SSIS Catalog database (SSISDB) used by your Azure-SSIS
    integration runtime. The next few T-SQL scripts are almost identical to the T-SQL
    scripts in Chapter [23](#449652_2_En_23_Chapter.xhtml). The difference is: no
    `Use` directives. At the time of this writing, Azure SQL DB does not support the
    `Use` directive. Work around this limitation by clicking the Working Database
    dropdown in SSMS and selecting the SSISFramework database, as shown in Figure
    [25-20](#449652_2_En_25_Chapter.xhtml#Fig20):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig20_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig20_HTML.jpg)


    Figure 25-20


    Selecting the SSISFramework working database


    Open a new query window in SSMS. Add a schema named `fw` to the SSISDB database
    using the T-SQL in Listing [25-1](#449652_2_En_25_Chapter.xhtml#PC1):


    ```

    print ''Fw schema''

    If Not Exists(Select s.[name]

    From [sys].[schemas] s

    Where s.[name] = N''fw'')

    begin

    print '' - Create fw schema''

    declare @sql varchar(30) = ''Create schema fw''

    exec(@sql)

    print '' - Fw schema created''

    end

    Else

    begin

    print '' - Fw schema already exists.''

    end

    go

    Listing 25-1

    Adding the fw schema

    ```


    When executed (the first time), the Messages tab displays as shown in Figure [25-21](#449652_2_En_25_Chapter.xhtml#Fig21):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig21_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig21_HTML.jpg)


    Figure 25-21


    Creating the fw schema


    Next, build the Applications table in the fw schema using the T-SQL in Listing
    [25-2](#449652_2_En_25_Chapter.xhtml#PC2):


    ```

    print ''Fw.Applications table''

    If Not Exists(Select s.[name] + ''.'' + t.[name]

    From [sys].[tables] t

    Join [sys].[schemas] s

    On s.[schema_id] = t.[schema_id]

    Where s.[name] = N''fw''

    And t.[name] = N''Applications'')

    begin

    print '' - Create fw.Applications table''

    Create Table fw.Applications

    (ApplicationId int identity(1, 1)

    Constraint PK_Applications Primary Key

    ,ApplicationName nvarchar(130) Not NULL)

    print '' - Fw.Applications table created''

    end

    Else

    begin

    print '' - Fw.Applications table already exists.''

    end

    go

    Listing 25-2

    Adding the fw.Applications table

    ```


    When executed (the first time), the Messages tab displays as shown in Figure [25-22](#449652_2_En_25_Chapter.xhtml#Fig22):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig22_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig22_HTML.jpg)


    Figure 25-22


    Creating the fw.Applications table


    Add the Packages table using the T-SQL in Listing [25-3](#449652_2_En_25_Chapter.xhtml#PC3):


    ```

    print ''Fw.Packages table''

    If Not Exists(Select s.[name] + ''.'' + t.[name]

    From [sys].[tables] t

    Join [sys].[schemas] s

    On s.[schema_id] = t.[schema_id]

    Where s.[name] = N''fw''

    And t.[name] = N''Packages'')

    begin

    print '' - Create fw.Packages table''

    Create Table fw.Packages

    (PackageId int identity(1, 1)

    Constraint PK_Packages Primary Key

    ,FolderName nvarchar(130) Not NULL

    ,ProjectName nvarchar(130) Not NULL

    ,PackageName nvarchar(260) Not NULL)

    print '' - Fw.Packages table created''

    end

    Else

    begin

    print '' - Fw.Packages table already exists.''

    end

    go

    Listing 25-3

    Adding the Packages table

    ```


    When executed (the first time), the Messages tab displays as shown in Figure [25-23](#449652_2_En_25_Chapter.xhtml#Fig23):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig23_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig23_HTML.jpg)


    Figure 25-23


    Creating the fw.Packages table


    Resolve the many-to-many cardinality between Applications and Packages by adding
    the ApplicationPackages table using the T-SQL in Listing [25-4](#449652_2_En_25_Chapter.xhtml#PC4):


    ```

    print ''Fw.ApplicationPackages table''

    If Not Exists(Select s.[name] + ''.'' + t.[name]

    From [sys].[tables] t

    Join [sys].[schemas] s

    On s.[schema_id] = t.[schema_id]

    Where s.[name] = N''fw''

    And t.[name] = N''ApplicationPackages'')

    begin

    print '' - Create fw.ApplicationPackages table''

    Create Table fw.ApplicationPackages

    (ApplicationPackageId int identity(1, 1)

    Constraint PK_ApplicationPackages Primary Key

    ,ApplicationId int Not NULL

    Constraint FK_ApplicationPackages_Applications

    Foreign Key References fw.Applications(ApplicationId)

    ,PackageId int Not NULL

    Constraint FK_ApplicationPackages_Packages

    Foreign Key References fw.Packages(PackageId)

    ,ExecutionOrder int Not NULL

    Constraint DF_ApplicationPackages_ExecutionOrder

    Default(10)

    ,Synchronized bit Not NULL

    Constraint DF_ApplicationPackages_Synchronized

    Default(1)

    ,MaximumRetries int Not NULL

    Constraint DF_ApplicationPackages_MaximumRetries

    Default(100)

    ,RetryIntervalSeconds int Not NULL

    Constraint DF_ApplicationPackages_RetryIntervalSeconds

    Default(10)

    ,Use32bit int Not NULL

    Constraint DF_ApplicationPackages_Use32bit

    Default(0)

    ,LoggingLevel nvarchar(25) Not NULL

    Constraint DF_ApplicationPackages_LoggingLevel

    Default(''Basic'')

    )

    print '' - Fw.ApplicationPackages table created''

    end

    Else

    begin

    print '' - Fw.ApplicationPackages table already exists.''

    end

    go

    Listing 25-4

    Adding the ApplicationPackages table

    ```


    When executed (the first time), the Messages tab displays as shown in Figure [25-24](#449652_2_En_25_Chapter.xhtml#Fig24):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig24_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig24_HTML.jpg)


    Figure 25-24


    Creating the fw.ApplicationPackages table


    The next step is to add Applications, Packages, and ApplicationPackages metadata
    to the framework tables.'
  trans: '### 提升与转移框架元数据表


    当工程师将数据从本地迁移到云端时，这种操作常被称为*提升与转移*。在本节中，我们将使用第 23 章中相同的 T-SQL 来提升和转移框架的元数据对象与数据，但目标数据库不同。这一次，目标是我们在第
    24 章中配置的名为 `SSISFramework` 的 Azure SQL 数据库。


    如果以下内容看起来像是从第 23 章复制、粘贴到这里，然后经过了极其细微的编辑，那是因为它确实是从第 23 章复制、粘贴到这里，然后经过了极其细微的编辑。


    首先，打开 SQL Server Management Studio (SSMS) 并连接到托管你的 Azure-SSIS 集成运行时所使用的 SSIS 目录数据库
    (`SSISDB`) 的 Azure SQL Server 实例。接下来的几个 T-SQL 脚本与第 23 章中的 T-SQL 脚本几乎相同。区别在于：没有
    `Use` 指令。在撰写本文时，Azure SQL DB 不支持 `Use` 指令。解决此限制的方法是：在 SSMS 中单击“工作数据库”下拉菜单并选择 `SSISFramework`
    数据库，如图 25-20 所示：


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig20_HTML.jpg](img/449652_2_En_25_Fig20_HTML.jpg)


    **图 25-20**

    选择 SSISFramework 工作数据库


    在 SSMS 中打开一个新的查询窗口。使用清单 25-1 中的 T-SQL 向 `SSISDB` 数据库添加一个名为 `fw` 的架构：


    ```sql

    print ''Fw schema''

    If Not Exists(Select s.[name]

    From [sys].[schemas] s

    Where s.[name] = N''fw'')

    begin

    print '' - Create fw schema''

    declare @sql varchar(30) = ''Create schema fw''

    exec(@sql)

    print '' - Fw schema created''

    end

    Else

    begin

    print '' - Fw schema already exists.''

    end

    go

    ```

    **清单 25-1**

    添加 `fw` 架构


    （第一次）执行后，“消息”选项卡显示如图 25-21 所示：


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig21_HTML.jpg](img/449652_2_En_25_Fig21_HTML.jpg)


    **图 25-21**

    创建 `fw` 架构


    接下来，使用清单 25-2 中的 T-SQL 在 `fw` 架构中构建 `Applications` 表：


    ```sql

    print ''Fw.Applications table''

    If Not Exists(Select s.[name] + ''.'' + t.[name]

    From [sys].[tables] t

    Join [sys].[schemas] s

    On s.[schema_id] = t.[schema_id]

    Where s.[name] = N''fw''

    And t.[name] = N''Applications'')

    begin

    print '' - Create fw.Applications table''

    Create Table fw.Applications

    (ApplicationId int identity(1, 1)

    Constraint PK_Applications Primary Key

    ,ApplicationName nvarchar(130) Not NULL)

    print '' - Fw.Applications table created''

    end

    Else

    begin

    print '' - Fw.Applications table already exists.''

    end

    go

    ```

    **清单 25-2**

    添加 `fw.Applications` 表


    （第一次）执行后，“消息”选项卡显示如图 25-22 所示：


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig22_HTML.jpg](img/449652_2_En_25_Fig22_HTML.jpg)


    **图 25-22**

    创建 `fw.Applications` 表


    使用清单 25-3 中的 T-SQL 添加 `Packages` 表：


    ```sql

    print ''Fw.Packages table''

    If Not Exists(Select s.[name] + ''.'' + t.[name]

    From [sys].[tables] t

    Join [sys].[schemas] s

    On s.[schema_id] = t.[schema_id]

    Where s.[name] = N''fw''

    And t.[name] = N''Packages'')

    begin

    print '' - Create fw.Packages table''

    Create Table fw.Packages

    (PackageId int identity(1, 1)

    Constraint PK_Packages Primary Key

    ,FolderName nvarchar(130) Not NULL

    ,ProjectName nvarchar(130) Not NULL

    ,PackageName nvarchar(260) Not NULL)

    print '' - Fw.Packages table created''

    end

    Else

    begin

    print '' - Fw.Packages table already exists.''

    end

    go

    ```

    **清单 25-3**

    添加 `Packages` 表


    （第一次）执行后，“消息”选项卡显示如图 25-23 所示：


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig23_HTML.jpg](img/449652_2_En_25_Fig23_HTML.jpg)


    **图 25-23**

    创建 `fw.Packages` 表


    通过使用清单 25-4 中的 T-SQL 添加 `ApplicationPackages` 表来解决 `Applications` 和 `Packages`
    之间的多对多基数关系：


    ```sql

    print ''Fw.ApplicationPackages table''

    If Not Exists(Select s.[name] + ''.'' + t.[name]

    From [sys].[tables] t

    Join [sys].[schemas] s

    On s.[schema_id] = t.[schema_id]

    Where s.[name] = N''fw''

    And t.[name] = N''ApplicationPackages'')

    begin

    print '' - Create fw.ApplicationPackages table''

    Create Table fw.ApplicationPackages

    (ApplicationPackageId int identity(1, 1)

    Constraint PK_ApplicationPackages Primary Key

    ,ApplicationId int Not NULL

    Constraint FK_ApplicationPackages_Applications

    Foreign Key References fw.Applications(ApplicationId)

    ,PackageId int Not NULL

    Constraint FK_ApplicationPackages_Packages

    Foreign Key References fw.Packages(PackageId)

    ,ExecutionOrder int Not NULL

    Constraint DF_ApplicationPackages_ExecutionOrder

    Default(10)

    ,Synchronized bit Not NULL

    Constraint DF_ApplicationPackages_Synchronized

    Default(1)

    ,MaximumRetries int Not NULL

    Constraint DF_ApplicationPackages_MaximumRetries

    Default(100)

    ,RetryIntervalSeconds int Not NULL

    Constraint DF_ApplicationPackages_RetryIntervalSeconds

    Default(10)

    ,Use32bit int Not NULL

    Constraint DF_ApplicationPackages_Use32bit

    Default(0)

    ,LoggingLevel nvarchar(25) Not NULL

    Constraint DF_ApplicationPackages_LoggingLevel

    Default(''Basic'')

    )

    print '' - Fw.ApplicationPackages table created''

    end

    Else

    begin

    print '' - Fw.ApplicationPackages table already exists.''

    end

    go

    ```

    **清单 25-4**

    添加 `ApplicationPackages` 表


    （第一次）执行后，“消息”选项卡显示如图 25-24 所示：


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig24_HTML.jpg](img/449652_2_En_25_Fig24_HTML.jpg)


    **图 25-24**

    创建 `fw.ApplicationPackages` 表


    下一步是向框架表中添加 `Applications`、`Packages` 和 `ApplicationPackages` 的元数据。'
