    \ parameter set to `3` (`Verbose`), as shown in Figure [15-21](#449652_2_En_15_Chapter.xhtml#Fig21):\n\
    \n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig21_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig21_HTML.jpg)\n\
    Figure 15-21\n`LoggingLevel` execution parameter set to `3` (`Verbose`)\n\nThe\
    \ next property to implement is `Reference`, which is the subject of the next\
    \ chapter.\n\n## Conclusion\n\nIn this chapter, we implemented the `Use32bit`,\
    \ `Synchronized`, and `LoggingLevel` `SettingsView` properties.\n\nNow would be\
    \ a good time to check in your code.\n\n## 16. Refactoring SourceConnection\n\n\
    The goal of this chapter is to refactor `ExecuteCatalogPackageTask` methods related\
    \ to the `SourceConnection` property. The goals are:\n\n*   Downgrade from SSIS\
    \ 2019 to SSIS 2017 so as to run on the Azure platform.\n*   Refactor connection\
    \ identification to support the Server ➤ Integration Services ➤ SSIS Catalog ➤\
    \ Folder ➤ Project ➤ Package hierarchy.\n*   Refactor the `SettingsView.SourceConnection`\
    \ property.\n*   Identify catalog, folder, project, and package objects in the\
    \ Server ➤ Integration Services ➤ SSIS Catalog ➤ Folder ➤ Project ➤ Package hierarchy.\n\
    \nWe also refactor the Execute Catalog Package Task for two additional goals:\n\
    \n1.  Using Expressions – which is one of the main goals for this edition of the\
    \ book.\n2.  Executing the Execute Catalog Package Task in Azure-SSIS integration\
    \ runtimes."
  raw: '### Extending the ExecutionValueParameterSet with LoggingLevel


    As we mentioned when adding the `Synchronized` execution parameter, the `ExecutionValueParameterSet`
    is a collection of the `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValuearameterSet`
    type . Like the `Synchronized` execution parameter, `LoggingLevel` is also an
    execution parameter.


    Before adding the LoggingLevel integer value to the execution parameters collection,
    the value must be decoded using the code in Listing [15-10](#449652_2_En_15_Chapter.xhtml#PC10):


    ```

    private int decodeLoggingLevel(string loggingLevel)

    {

    int ret = 1;

    switch (loggingLevel)

    {

    default:

    break;

    case "None":

    ret = 0;

    break;

    case "Performance":

    ret = 2;

    break;

    case "Verbose":

    ret = 3;

    break;

    }

    return ret;

    }

    Listing 15-10

    Adding the DecodeLoggingLevel function

    ```


    When the `decodeLoggingLevel function` is added to the ExecuteCatalogPackageTask
    class, the code appears as shown in Figure [15-16](#449652_2_En_15_Chapter.xhtml#Fig16):


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig16_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig16_HTML.jpg)


    Figure 15-16


    The decodeLoggingLevel function


    To add the LoggingLevel value to the returnExecutionValueParameterSet function,
    edit the returnExecutionValueParameterSet function to match the code in Listing
    [15-11](#449652_2_En_15_Chapter.xhtml#PC11):


    ```

    private Collection returnExecutionValueParameterSet(            Microsoft.SqlServer.Management.IntegrationServices.PackageInfo
    catalogPackage)

    {

    // initialize the parameters collection

    Collection executionValueParameterSet = new Collection();

    // set SYNCHRONIZED execution parameter

    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet
    { ObjectType = 50, ParameterName = "SYNCHRONIZED", ParameterValue = Synchronized
    });

    // set LOGGING_LEVEL execution parameter

    int LoggingLevelValue = decodeLoggingLevel(LoggingLevel);

    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet
    { ObjectType = 50, ParameterName = "LOGGING_LEVEL", ParameterValue = LoggingLevelValue
    });

    return executionValueParameterSet;

    }

    Listing 15-11

    Editing the returnExecutionValueParameterSet function

    ```


    Once added, the `returnExecutionValueParameterSet` function appears as shown in
    Figure [15-17](#449652_2_En_15_Chapter.xhtml#Fig17):


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig17_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig17_HTML.jpg)


    Figure 15-17


    The returnExecutionValueParameterSet function, edited


    The next step is to add the `SettingsView LoggingLevel` property.


    ### Adding the LoggingLevel Property to SettingsView


    To add the LoggingLevel property to `SettingsNode`, begin by adding the code in
    Listing [15-12](#449652_2_En_15_Chapter.xhtml#PC12) to the `SettingsNode` class
    :


    ```

    [

    Category("SSIS Package Execution Properties"),

    Description("Enter SSIS Catalog Package LOGGING_LEVEL execution parameter value."),

    TypeConverter(typeof(LoggingLevels))

    ]

    public string LoggingLevel {

    get { return _task.LoggingLevel; }

    set { _task.LoggingLevel = value; }

    }

    Listing 15-12

    Adding the LoggingLevel property to SettingsNode

    ```


    Once added, the `SettingsNode LoggingLevel` property code appears as shown in
    Figure [15-18](#449652_2_En_15_Chapter.xhtml#Fig18):


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig18_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig18_HTML.jpg)


    Figure 15-18


    The SettingsNode LoggingLevel property, implemented


    The next step is to test the `SettingsNode LoggingLevel` property.


    ### Test LoggingLevel


    To test the LoggingLevel property, build the ExecuteCatalogPackageTask solution,
    open a test SSIS package, and configure the Execute Catalog Package Task to execute
    an SSIS package deployed to an SSIS Catalog. Set the LoggingLevel property to
    Verbose, as shown in Figure [15-19](#449652_2_En_15_Chapter.xhtml#Fig19):


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig19_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig19_HTML.jpg)


    Figure 15-19


    Setting the LoggingLevel property to Verbose


    Click the OK button and execute the test SSIS package in debug. If all goes as
    planned, the test SSIS package debug execution succeeds as shown in Figure [15-20](#449652_2_En_15_Chapter.xhtml#Fig20):


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig20_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig20_HTML.jpg)


    Figure 15-20


    Successful test execution


    Browse to the Overview report for this test execution in SSMS’s Catalog Reports.
    The LOGGING_LEVEL execution parameter – in the Parameters Used sub-report – should
    indicate the LoggingLevel execution parameter set to 3 (Verbose), as shown in
    Figure [15-21](#449652_2_En_15_Chapter.xhtml#Fig21):


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig21_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig21_HTML.jpg)


    Figure 15-21


    LoggingLevel execution parameter set to 3 (Verbose)


    The next property to implement is Reference, which is the subject of the next
    chapter.


    ## Conclusion


    In this chapter, we implemented the `Use32bit`, `Synchronized`, and `LoggingLevel
    SettingsView` properties.


    Now would be a good time to check in your code.


    # 16. Refactoring SourceConnection


    The goal of this chapter is to refactor ExecuteCatalogPackageTask methods related
    to the `SourceConnection` property . The goals are


    *   Downgrade from SSIS 2019 to SSIS 2017 so as to run on the Azure platform.


    *   Refactor connection identification to support the Server ➤ Integration Services
    ➤ SSIS Catalog ➤ Folder ➤ Project ➤ Package hierarchy.


    *   Refactor the `SettingsView`.`SourceConnection` property.


    *   Identify catalog, folder, project, and package objects in the Server ➤ Integration
    Services ➤ SSIS Catalog ➤ Folder ➤ Project ➤ Package hierarchy.


    We also refactor the Execute Catalog Package Task for two additional goals:


    1.  Using Expressions – which is one of the main goals for this edition of the
    book.


    2.  Executing the Execute Catalog Package Task in Azure-SSIS integration runtimes.'
  trans: "### 使用 LoggingLevel 扩展 ExecutionValueParameterSet\n\n正如我们在添加 `Synchronized`\
    \ 执行参数时提到的，`ExecutionValueParameterSet` 是 `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValuearameterSet`\
    \ 类型的集合。与 `Synchronized` 执行参数类似，`LoggingLevel` 也是一个执行参数。\n\n在将 `LoggingLevel`\
    \ 整数值添加到执行参数集合之前，必须使用清单 15-10 中的代码对其进行解码：\n\n```\nprivate int decodeLoggingLevel(string\
    \ loggingLevel)\n{\n    int ret = 1;\n    switch (loggingLevel)\n    {\n     \
    \   default:\n            break;\n        case \"None\":\n            ret = 0;\n\
    \            break;\n        case \"Performance\":\n            ret = 2;\n   \
    \         break;\n        case \"Verbose\":\n            ret = 3;\n          \
    \  break;\n    }\n    return ret;\n}\n清单 15-10\n添加 DecodeLoggingLevel 函数\n```\n\
    \n将 `decodeLoggingLevel` 函数添加到 `ExecuteCatalogPackageTask` 类后，代码如图 15-16 所示：\n\
    \n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig16_HTML.jpg](img/449652_2_En_15_Fig16_HTML.jpg)\n\
    图 15-16\n`decodeLoggingLevel` 函数\n\n要将 `LoggingLevel` 值添加到 `returnExecutionValueParameterSet`\
    \ 函数，请编辑该函数以匹配清单 15-11 中的代码：\n\n```\nprivate Collection returnExecutionValueParameterSet(\n\
    \    Microsoft.SqlServer.Management.IntegrationServices.PackageInfo catalogPackage)\n\
    {\n    // 初始化参数集合\n    Collection executionValueParameterSet = new Collection();\n\
    \    // 设置 SYNCHRONIZED 执行参数\n    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\
    \ { ObjectType = 50, ParameterName = \"SYNCHRONIZED\", ParameterValue = Synchronized\
    \ });\n    // 设置 LOGGING_LEVEL 执行参数\n    int LoggingLevelValue = decodeLoggingLevel(LoggingLevel);\n\
    \    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\
    \ { ObjectType = 50, ParameterName = \"LOGGING_LEVEL\", ParameterValue = LoggingLevelValue\
    \ });\n    return executionValueParameterSet;\n}\n清单 15-11\n编辑 returnExecutionValueParameterSet\
    \ 函数\n```\n\n添加完成后，`returnExecutionValueParameterSet` 函数如图 15-17 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig17_HTML.jpg](img/449652_2_En_15_Fig17_HTML.jpg)\n\
    图 15-17\n编辑后的 `returnExecutionValueParameterSet` 函数\n\n下一步是添加 `SettingsView.LoggingLevel`\
    \ 属性。\n\n### 向 SettingsView 添加 LoggingLevel 属性\n\n要将 `LoggingLevel` 属性添加到 `SettingsNode`，首先将清单\
    \ 15-12 中的代码添加到 `SettingsNode` 类：\n\n```\n[\nCategory(\"SSIS 包执行属性\"),\nDescription(\"\
    输入 SSIS 目录包 LOGGING_LEVEL 执行参数值。\"),\nTypeConverter(typeof(LoggingLevels))\n]\n\
    public string LoggingLevel {\n    get { return _task.LoggingLevel; }\n    set\
    \ { _task.LoggingLevel = value; }\n}\n清单 15-12\n向 SettingsNode 添加 LoggingLevel\
    \ 属性\n```\n\n添加完成后，`SettingsNode.LoggingLevel` 属性代码如图 15-18 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig18_HTML.jpg](img/449652_2_En_15_Fig18_HTML.jpg)\n\
    图 15-18\n已实现的 `SettingsNode.LoggingLevel` 属性\n\n下一步是测试 `SettingsNode.LoggingLevel`\
    \ 属性。\n\n### 测试 LoggingLevel\n\n要测试 `LoggingLevel` 属性，请生成 `ExecuteCatalogPackageTask`\
    \ 解决方案，打开一个测试 SSIS 包，并配置“执行目录包任务”以执行已部署到 SSIS 目录的 SSIS 包。将 `LoggingLevel` 属性设置为\
    \ `Verbose`，如图 15-19 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig19_HTML.jpg](img/449652_2_En_15_Fig19_HTML.jpg)\n\
    图 15-19\n将 `LoggingLevel` 属性设置为 `Verbose`\n\n单击“确定”按钮并在调试模式下执行测试 SSIS 包。如果一切按计划进行，测试\
    \ SSIS 包的调试执行将成功，如图 15-20 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig20_HTML.jpg](img/449652_2_En_15_Fig20_HTML.jpg)\n\
    图 15-20\n成功的测试执行\n\n在 SSMS 的目录报告中，浏览到此测试执行的概览报告。“使用的参数”子报告中的 `LOGGING_LEVEL` 执行参数应指示\
    \ `LoggingLevel` 执行参数设置为 `3` (`Verbose`)，如图 15-21 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig21_HTML.jpg](img/449652_2_En_15_Fig21_HTML.jpg)\n\
    图 15-21\n`LoggingLevel` 执行参数设置为 `3` (`Verbose`)\n\n下一个要实现的属性是 `Reference`，这是下一章的主题。\n\
    \n## 总结\n\n在本章中，我们实现了 `SettingsView` 的 `Use32bit`、`Synchronized` 和 `LoggingLevel`\
    \ 属性。\n\n现在是签入代码的好时机。\n\n## 16. 重构 SourceConnection\n\n本章的目标是重构与 `SourceConnection`\
    \ 属性相关的 `ExecuteCatalogPackageTask` 方法。目标包括：\n\n*   从 SSIS 2019 降级到 SSIS 2017，以便在\
    \ Azure 平台上运行。\n*   重构连接标识，以支持“服务器 ➤ Integration Services ➤ SSIS 目录 ➤ 文件夹 ➤ 项目\
    \ ➤ 包”的层次结构。\n*   重构 `SettingsView.SourceConnection` 属性。\n*   识别“服务器 ➤ Integration\
    \ Services ➤ SSIS 目录 ➤ 文件夹 ➤ 项目 ➤ 包”层次结构中的目录、文件夹、项目和包对象。\n\n我们还为了另外两个目标重构了“执行目录包任务”：\n\
    \n1.  使用表达式——这是本书此版本的主要目标之一。\n2.  在 Azure-SSIS 集成运行时中执行“执行目录包任务”。"
- fmt: '## Thinking Azure-SSIS


    At the time of this writing (October 2020), Azure-SSIS does not support SSIS 2019.
    SSIS 2017 is supported, so we must downgrade the task and Visual Studio solution
    to run as an SSIS 2017 custom task. Azure-SSIS will likely support SSIS 2019 in
    the future (I don’t know and I have no control over internal Microsoft decisions
    and priorities).


    I advise you move your development effort to a machine configured with Microsoft
    SQL Server 2017 and not configured with Microsoft SQL Server 2019 to avoid collisions
    with assemblies in the Microsoft .Net Framework.


    Begin by updating the `ExecuteCatalogPackageTask` project References by expanding
    the References virtual folder in Solution Explorer, as shown in Figure [16-1](#449652_2_En_16_Chapter.xhtml#Fig1):

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig1_HTML.jpg](images/449652_2_En_16_Chapter/449652_2_En_16_Fig1_HTML.jpg)

    Figure 16-1: `ExecuteCatalogPackageTask` References


    References to certain assemblies – such as the `Micrsoft.SQLServer.ManagedDTS`
    assembly outlined in Figure [16-1](#449652_2_En_16_Chapter.xhtml#Fig1) – may display
    warning icons. The warning icon indicates an issue with the assembly. In this
    case, the issue is the SSIS 2019 of the `Micrsoft.SQLServer.ManagedDTS` assembly
    is not registered on the development server that has SQL Server 2017 (only) installed.


    It is very important to note that your development server may be configured differently
    than the development server I am using. Your mileage may vary.


    Click the reference to the `Micrsoft.SQLServer.ManagedDTS` assembly, and then
    press the `F4` key to display its properties, as shown in Figure [16-2](#449652_2_En_16_Chapter.xhtml#Fig2):

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig2_HTML.jpg](images/449652_2_En_16_Chapter/449652_2_En_16_Fig2_HTML.jpg)

    Figure 16-2: `Micrsoft.SQLServer.ManagedDTS` assembly properties


    Note the Version property of the `Micrsoft.SQLServer.ManagedDTS` assembly displays
    the value "`0.0.0.0`" because the later version of the `Micrsoft.SQLServer.ManagedDTS`
    assembly cannot be located on this development server.


    Delete the `Micrsoft.SQLServer.ManagedDTS` assembly from the `ExecuteCatalogPackageTask`
    References collection by right-clicking the assembly and then clicking Remove,
    as shown in Figure [16-3](#449652_2_En_16_Chapter.xhtml#Fig3):

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig3_HTML.jpg](images/449652_2_En_16_Chapter/449652_2_En_16_Fig3_HTML.jpg)

    Figure 16-3: Deleting the current version of the `Micrsoft.SQLServer.ManagedDTS`
    assembly


    As before, right-click the References virtual folder and click Add Reference to
    add a new reference (or, in this case, a new version of a reference), as shown
    in Figure [16-4](#449652_2_En_16_Chapter.xhtml#Fig4):

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig4_HTML.jpg](images/449652_2_En_16_Chapter/449652_2_En_16_Fig4_HTML.jpg)

    Figure 16-4: Adding – replacing, really – a new reference


    Expand Assemblies and select Extensions. Navigate to the `Micrsoft.SQLServer.ManagedDTS`
    assembly in the assemblies list, and select the `Micrsoft.SQLServer.ManagedDTS`
    assembly, as shown in Figure [16-5](#449652_2_En_16_Chapter.xhtml#Fig5):

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig5_HTML.jpg](images/449652_2_En_16_Chapter/449652_2_En_16_Fig5_HTML.jpg)

    Figure 16-5: Selecting `Micrsoft.SQLServer.ManagedDTS`


    Pay very close attention to the Version column and details in the Reference Manager’s
    right pane. SSIS 2017 is version 14. The selected version of `Micrsoft.SQLServer.ManagedDTS`
    is version 11.0.0.0 – or version 11. Version 11 is SSIS 2012.


    Click the Browse button and navigate to the location of the assembly file. On
    my server, the location is `C:\Windows\Microsoft.NET\assembly\GAC_MSIL\Microsoft.SqlServer.ManagedDTS\v4.0_14.0.0.0__89845dcd8080cc91`.
    Note the version of the `Micrsoft.SQLServer.ManagedDTS` assembly is `v4.0_14.0.0.0__89845dcd8080cc91`.
    We know the version because the folder which contains the `Micrsoft.SQLServer.ManagedDTS`
    assembly is named `v4.0_14.0.0.0__89845dcd8080cc91`, as shown in Figure [16-6](#449652_2_En_16_Chapter.xhtml#Fig6):

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig6_HTML.jpg](images/449652_2_En_16_Chapter/449652_2_En_16_Fig6_HTML.jpg)

    Figure 16-6: Selecting the SSIS 2017 version of the `Micrsoft.SQLServer.ManagedDTS`
    assembly


    Add the reference to the `Micrsoft.SQLServer.ManagedDTS` assembly, and view the
    properties to verify SSIS 2017 (version 14), as shown in Figure [16-7](#449652_2_En_16_Chapter.xhtml#Fig7):

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig7_HTML.jpg](images/449652_2_En_16_Chapter/449652_2_En_16_Fig7_HTML.jpg)

    Figure 16-7: The SSIS 2017 version of the `Micrsoft.SQLServer.ManagedDTS` assembly


    Repeat this process, verifying each version of each referenced assembly in *both*
    the `ExecuteCatalogPackageTask` and the `ExecuteCatalogPackageTaskComplexUI` projects,
    as shown in Figure [16-8](#449652_2_En_16_Chapter.xhtml#Fig8):

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig8_HTML.jpg](images/449652_2_En_16_Chapter/449652_2_En_16_Fig8_HTML.jpg)

    Figure 16-8: Rinse and repeat


    Once the References are downgraded, open the `ExecuteCatalogPackageTask` project’s
    `ExecuteCatalogPackageTask.cs` file. Update the `TaskType` attribute in the `DtsTask`
    decoration for the `ExecuteCatalogPackageTask` class, setting the `TaskType` from
    `DTS150` to `DTS140`, as shown in Figure [16-9](#449652_2_En_16_Chapter.xhtml#Fig9):

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig9_HTML.jpg](images/449652_2_En_16_Chapter/449652_2_En_16_Fig9_HTML.jpg)

    Figure 16-9: Updating the `TaskType` attribute


    The `ExecuteCatalogPackageTask` solution has been downgraded, and the `ExecuteCatalogPackageTask`
    is now ready for Azure-SSIS.'
