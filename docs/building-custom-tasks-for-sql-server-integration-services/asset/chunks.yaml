    在本节中，我们接触到 View ➤ Node ➤ Property Category ➤ Property 层次结构中的 Property Category
    ➤ Property 部分。节点的属性被修饰以指示属性类别和描述。在编辑器中，属性的值与属性名配对，该值被传递给任务的实例化。可以将此配对视为类似于键值映射，其中键由
    View ➤ Node ➤ Property Category ➤ Property 层次结构组成，值是 SSIS 开发人员在任务（实例）编辑期间提供的值。图[13-11](#449652_2_En_13_Chapter.xhtml#Fig11)中圈出了一个值的示例：


