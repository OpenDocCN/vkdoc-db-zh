    and then select the ConnectionString property. Click the ellipsis beside the Value
    column, as shown in Figure [25-30](#449652_2_En_25_Chapter.xhtml#Fig30):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig30_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig30_HTML.jpg)


    Figure 25-30


    Preparing to configure a literal for the Framework SSIS Catalog ConnectionString
    property


    The Framework SSIS Catalog connection manager should point to the SQL Server instance –
    and database – that holds the Framework metadata. Remember, we are making a slight
    change to this version of the framework; we store metadata in a different database
    named SSISFramework. The connection string is updated and shown in Figure [25-31](#449652_2_En_25_Chapter.xhtml#Fig31):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig31_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig31_HTML.jpg)


    Figure 25-31


    Configuring a literal for the Framework SSIS Catalog ConnectionString property


    When configured, the literal for the Execution SSIS Catalog ConnectionString property
    appears as shown in Figure [25-32](#449652_2_En_25_Chapter.xhtml#Fig32):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig32_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig32_HTML.jpg)


    Figure 25-32


    The Framework SSIS Catalog ConnectionString property, configured


    Repeat the process for the Framework SSIS Catalog Password property.


    When configured, the literal values for the Framework SSIS Catalog ConnectionString
    and Password properties appear as shown in Figure [25-33](#449652_2_En_25_Chapter.xhtml#Fig33):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig33_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig33_HTML.jpg)


    Figure 25-33


    The Framework SSIS Catalog ConnectionString and Password properties, configured


    The Execute SSIS Catalog and Framework SSIS Catalog connection managers have been
