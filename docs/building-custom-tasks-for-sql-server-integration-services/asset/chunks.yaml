    Figure 16-12


    The returnConnectionManagerIndex method


    Examining the code shown in Figure [16-12](#449652_2_En_16_Chapter.xhtml#Fig12),
    a return variable named `ret` of the `int` type is declared and initialized to
    `-1` on line 97\. A try-catch block spans lines 99–121, after which – on line
    123 – the value of the `ret` variable is returned from the `returnConnectionManagerIndex`
    method. On line 101, the code attempts to set the value of the `ExecuteCatalogPackageTask.ConnectionManagerId
    string` type property by calling the `GetConnectionID` method included in the
    `Microsoft.SqlServer.Dts.Runtime.Task` object methods. On line 102, a variable
    named `connectionManager`, of the `Microsoft.SqlServer.Dts.Runtime.ConnectionManager`
