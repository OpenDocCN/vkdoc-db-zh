    project. In my solution, I expanded the ExecuteCatalogPackageTask project in Solution
    Explorer, opened the Notes.txt file contained therein, selected all contents,
    copied the contents, and then pasted the clipboard to the new Notes.txt file in
    the ExecuteCatalogPackageTaskComplexUI project. I then edited the pasted contents,
    replacing “ExecuteCatalogPackageTask” with “ExecuteCatalogPackageTaskComplexUI,”
    as shown in Figure [12-2](#449652_2_En_12_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig2_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig2_HTML.jpg)


