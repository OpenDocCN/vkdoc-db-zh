    图 25-15


    配置字面值以粗体显示


    让我们测试一下！


    ## 测试配置


    要测试配置更改，请使用 SQL Server Management Studio (SSMS) 连接到托管你的 Azure-SSIS 集成运行时所使用的 SSIS
    目录的 Azure SQL 数据库实例。导航到 `TestSSISProject` 包虚拟文件夹，右键单击 `RunForSomeTime.dtsx` SSIS
    包，然后单击“执行…”，如图 25-16 所示：


