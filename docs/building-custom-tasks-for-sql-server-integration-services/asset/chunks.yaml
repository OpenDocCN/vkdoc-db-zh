    ### Configure the Installation Feature and Icon


    The `Feature` tag identifies the ExecuteCatalogPackageTask as the “unit of installation”
    in the `Title` attribute.


    The icon need not be imported into the WiX project because the `SourceFile` tag
    identifies the path to the icon file. The `ARPPRODUCTICON` property is used to
    set the icon to the installation file. If you want to use the ALStrike.ico, you
    may; it’s part of the ExecuteCatalogPackageTask Visual Studio project.


