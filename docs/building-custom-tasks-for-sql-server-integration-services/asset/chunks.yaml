    执行目录包任务属性表达式


    现在是签入代码的绝佳时机。


    # 24. 部署到 Azure-SSIS


    在上一章中，我们使用“执行目录包任务”构建了一个 SSIS 框架来执行元数据驱动的 SSIS 包集合。在本章中，我们将构建一个 Azure-SSIS 集成运行时实例，该实例安装“执行目录包任务”，然后将上一章的元数据驱动框架迁移到
    Azure。为了实现这个目标，我们将：


    *   配置一个 Azure SQL Database 实例来托管 `SSISDB` 数据库和 SSIS 目录

    *   配置一个 Azure Data Factory

    *   创建并配置部署容器

    *   配置一个 Azure-SSIS 集成运行时 (IR)，该运行时配置为安装“执行目录包任务”的 `msi` 文件


    在继续之前，让我们先了解一下 Azure Data Factory 的“执行 SSIS 包”活动所呈现的包位置选项。


    ## 检查包位置选项


    可以使用“执行 SSIS 包”活动在 Azure Data Factory 中执行 SSIS 包。在撰写本文时，“包位置”属性列出了五种 SSIS 包源选项，如图
    24-1 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig1_HTML.jpg](img/449652_2_En_24_Fig1_HTML.jpg)


    图 24-1


    “执行 SSIS 包”活动的包位置选项


    `SSISDB` 是 SSIS 目录，我们将在本章中使用它。文件系统（包）指存储在 Azure 文件共享中的单个 SSIS 包 `dtsx` 文件。文件系统（项目）指
    `ispac` 文件，这些是 SSIS 项目部署文件，包含 SSIS 项目中包含的 SSIS 包的单个 `dtsx` 文件，存储在 Azure 文件共享中。嵌入式包允许开发者上传单个
    SSIS 包 `dtsx` 文件。包存储类似于旧的 SSIS 包存储。有关更多信息，请参阅 Microsoft 的 SSIS 包存储文档 ([docs.microsoft.com/en-us/azure/data-factory/azure-ssis-integration-runtime-package-store](https://docs.microsoft.com/en-us/azure/data-factory/azure-ssis-integration-runtime-package-store)
    [截至 2020 年 10 月 28 日])。


    总之，Azure-SSIS IR 支持：


    *   运行部署到由 Azure SQL Database 服务器/托管实例托管的 SSIS 目录 (`SSISDB`) 中的包（项目部署模型）

    *   运行部署到文件系统、Azure 文件或由 Azure SQL 托管实例托管的 SQL Server 数据库 (`MSDB`) 中的包（包部署模型）


    包部署模型支持配置带有*包存储*的 Azure-SSIS IR。包存储在文件系统、Azure 文件或 Azure SQL 托管实例中托管的 `MSDB` 之上提供了一个包管理层。Azure-SSIS
    IR 包存储允许开发者通过 `SQL Server Management Studio (SSMS)` 导入、导出、删除和运行包，以及监控和停止正在运行的包——类似于旧的
    SSIS 包存储。


    第一步是配置一个 Azure SQL DB。'
- fmt: '# Provisioning an Azure SQL Database


    Azure SQL Database – or Azure SQL DB – is a flexible and scalable Platform-as-a-Service
    (PaaS) cloud database offering from Azure. Azure SQL DB sizes (and costs) range
    from small to very large.


    Connect to Azure and click `New Resource` to open the `New` blade, as shown in
    Figure 24-2:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig2_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig2_HTML.jpg)

    *Figure 24-2: Preparing to provision a new Azure SQL database*


    The `SQL Database` link on the `New` blade opens the `Create SQL Database` blade.
    When provisioning a new "work area" in Azure, start by creating a new `Resource
    group`, as shown in Figure 24-3:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig3_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig3_HTML.jpg)

    *Figure 24-3: Creating the rgECPT resource group while provisioning an Azure SQL
    database*


    The next step is to enter the database name. In the last chapter, we re-used the
    `SSISDB` database. Since we are not enforcing referential integrity (foreign keys)
    or using `SSISDB`’s encryption in this framework, we may provision a different
    database to host framework metadata, as shown in Figure 24-4:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig4_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig4_HTML.jpg)

    *Figure 24-4: Provisioning the SSISFramework database*


    The next step is to select or create a new SQL Server. Figure 24-5 shows the `New
    Server` blade displaying after the “Create new” link beneath the `Server` dropdown
    was clicked:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig5_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig5_HTML.jpg)

    *Figure 24-5: Provisioning a new SQL server*


    Leave the “Want to use SQL elastic pool” property set to “No.” The `General Purpose`
    server with `Gen5`, `2 vCores`, and `32 GB` storage is a bit more than we need,
    so click the `Configure database` link for the `Compute + storage` property, as
    shown in Figure 24-6:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig6_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig6_HTML.jpg)

    *Figure 24-6: Preparing to configure the SQL server*


    Configure the SQL Server by selecting the `Basic configuration`, as shown in Figure
    24-7:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig7_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig7_HTML.jpg)

    *Figure 24-7: Selecting the Basic configuration*


    Click the `Apply` button to return to the `Create SQL Database` blade, which appears
    as shown in Figure 24-8:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig8_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig8_HTML.jpg)

    *Figure 24-8: Ready to create the database*


    The next step is to click the `Review + create` button at the bottom of the blade
    which displays the `Review` blade shown in Figure 24-9:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig9_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig9_HTML.jpg)

    *Figure 24-9: Reviewing the SQL database and server configuration*


    Click the `Create` button at the bottom of the blade to complete provisioning
    the Azure SQL Database.


    The next step is to provision an Azure Data Factory.


    # Provisioning an Azure Data Factory


    Azure Data Factory (ADF) is a data integration PaaS (Platform-as-a-Service) offering
    on Microsoft Azure. At the time of this writing, ADFv2 is the current version.


    If you do not have an Azure account, visit `azure.com` and create an account.
    At the time of this writing, you may sign up for free and you get 12 months of
    free services. Azure sign-up offers have varied over time, but the author has
    always seen Azure offer free stuff at sign-up.


    To provision an Azure Data Factory, connect to the Azure Portal (`portal.azure.com`)
    and click the `Create a resource` option, as shown in Figure 24-10:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig10_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig10_HTML.jpg)

    *Figure 24-10: Creating a new resource*


    When the `New` blade displays, enter “Data Factory” in the `Search the Marketplace`
    textbox, and then click “Data Factory” listed in the suggestions, as shown in
    Figure 24-11:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig11_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig11_HTML.jpg)

    *Figure 24-11: Selecting Data Factory*


    Clicking “Data Factory” opens the `Data Factory overview` blade, as shown in Figure
    24-12:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig12_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig12_HTML.jpg)

    *Figure 24-12: Preparing to create the Data Factory*


    Click the `Create` button to open the `Create Data Factory` blade. Configure the
    `Resource group`, `Region`, `Name`, and `Version` properties, and then click the
    `Git configuration` tab, as shown in Figure 24-13:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig13_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig13_HTML.jpg)

    *Figure 24-13: Configuring the Data Factory*


    Check the `Configure Git later` checkbox, and then click the `Review + create`
    button, as shown in Figure 24-14:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig14_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig14_HTML.jpg)

    *Figure 24-14: Configuring the Git configuration tab*


    Azure validates the Azure Data Factory configuration and notifies you if the validation
    passes or if an issue is discovered. Once validation passes, review the settings
    and – if acceptable – click the `Create` button, as shown in Figure 24-15:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig15_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig15_HTML.jpg)

    *Figure 24-15: Reviewing the settings*


    If all goes as planned, deployment succeeds and the `Overview` blade displays,
    as shown in Figure 24-16:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig16_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig16_HTML.jpg)

    *Figure 24-16: Deployment success*


    Click the `Go to resource` button to open the `Data Factory Overview`, as shown
    in Figure 24-17:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig17_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig17_HTML.jpg)

    *Figure 24-17: The Data Factory overview*


    To configure Azure Data Factory artifacts, click the `Author & Monitor` button.
    The `Data Factory author and monitor overview` page displays, as shown in Figure
    24-18:


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig18_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig18_HTML.jpg)

    *Figure 24-18: The Data Factory author and monitor overview page*


    The Azure Data Factory is provisioned. The next step is to create and configure
    the deployment container.


    ## Creating and Configuring the Deployment Container


    Azure Blob Storage serves as the Azure file system. In this section, we create
    an Azure Storage account. Azure storage accounts allow developers to create containers,
    which store documents in Azure for distributed access. To learn more, visit `docs.microsoft.com/en-us/azure/storage/blobs/storage-blobs-introduction`.


    We follow these steps to create and configure a deployment container:


    1.  Provision an Azure Storage account.

    2.  Create the deployment container.

    3.  Upload the `ExecuteCatalogPackageTask.msi` file.

    4.  Create and upload the `main.cmd` file.'
