- fmt: '# 配置任务与实现属性联动


    配置“执行目录包任务”以执行一个短时间运行（少于5分钟）的SSIS包。将 `Synchronized` 属性设置为 `True`（因为新的 `MaximumRetries`、`RetryIntervalSeconds`
    和 `OperationTimeoutMinutes` 属性只有在 `Synchronized` 属性设置为 `True` 时才会被使用），然后关闭编辑器。执行测试SSIS包。如果一切按计划进行，测试SSIS包在调试器中执行时应成功，如图[20-6](#449652_2_En_20_Chapter.xhtml#Fig6)所示：


    ![../images/449652_2_En_20_Chapter/449652_2_En_20_Fig6_HTML.jpg](images/449652_2_En_20_Chapter/449652_2_En_20_Fig6_HTML.jpg)


    图 20-6


    执行成功


    下一步是使用 `MaximumRetries` 和 `RetryIntervalSeconds` 属性的值来管理 `OperationTimeoutMinutes`
    属性。`OperationTimeoutMinutes` 属性值的设置方法是：将 `maximumRetries` * `retryIntervalSeconds`
    相乘来计算预计执行秒数，然后将计算出的秒数值存储在一个名为 `retriesTimesIntervalSeconds` 的变量中。`OperationTimeoutMinutes`
    的值是通过将 `retriesTimesIntervalSeconds` 变量的值除以60，将结果转换为 `int` 值，然后再加1来确保充裕的。配置 `propertyGridSettings_PropertyValueChanged`
    方法，以响应 `MaximumRetires` 或 `RetryIntervalSeconds` 属性中的任一变更，并使用清单[20-4](#449652_2_En_20_Chapter.xhtml#PC4)中的代码触发
    `OperationTimeoutMinutes` 属性值的重新计算：


    ```

    if ((e.ChangedItem.PropertyDescriptor.Name.CompareTo("MaximumRetries") == 0)

    || (e.ChangedItem.PropertyDescriptor.Name.CompareTo("RetryIntervalSeconds") ==
    0))

    {

    int retriesTimesIntervalSeconds = settingsNode.MaximumRetries

    * settingsNode.RetryIntervalSeconds;

    int operationTimeoutSeconds = settingsNode.OperationTimeoutMinutes * 60;

    settingsNode.OperationTimeoutMinutes = (int)((retriesTimesIntervalSeconds / 60)
    + 1);

    this.settingsPropertyGrid.Refresh();

    }

    ```


    清单 20-4


    通过重置 `OperationTimeoutMinutes` 属性值来响应 `MaximumRetries` 和 `RetryIntervalSeconds`
    属性值的变更


    将代码添加到 `propertyGridSettings_PropertyValueChanged` 方法后，代码如图[20-7](#449652_2_En_20_Chapter.xhtml#Fig7)所示：


    ![../images/449652_2_En_20_Chapter/449652_2_En_20_Fig7_HTML.jpg](images/449652_2_En_20_Chapter/449652_2_En_20_Fig7_HTML.jpg)


    图 20-7


    自动重置 `OperationTimeoutMinutes` 属性值


    同样，也可以将 `MaximumRetries` 属性设置为只读，并通过使用 `RetryIntervalSeconds` 和 `OperationTimeoutMinutes`
    属性的值来计算 `MaximumRetries` 属性值。目标是一样的：我们希望在“执行目录包任务”编辑器中公开与等待相关的属性，以便使用该任务的SSIS开发者能够配置这些属性，以便在SSIS包未在指定时间内完成执行时停止执行。


    ### 清理过时的异步执行


    下一步是清理 `executeSynchronous` 方法中（现已）过时的局部变量 `maximumRetries`、`retryIntervalSeconds`
    和 `operationTimeoutMinutes`。删除图[20-8](#449652_2_En_20_Chapter.xhtml#Fig8)中高亮显示的代码：


    ![../images/449652_2_En_20_Chapter/449652_2_En_20_Fig8_HTML.jpg](images/449652_2_En_20_Chapter/449652_2_En_20_Fig8_HTML.jpg)


    图 20-8


    删除局部变量


    一旦删除了局部异步相关变量，`executeSynchronous` 方法如图[20-9](#449652_2_En_20_Chapter.xhtml#Fig9)所示：


    ![../images/449652_2_En_20_Chapter/449652_2_En_20_Fig9_HTML.jpg](images/449652_2_En_20_Chapter/449652_2_En_20_Fig9_HTML.jpg)


    图 20-9


    删除变量后的 `executeSynchronous` 方法


    在 `executeSynchronous` 方法中，使用清单[20-5](#449652_2_En_20_Chapter.xhtml#PC5)中的代码，将
    `maximumRetries` 替换为 `MaximumRetries`，将 `retryIntervalSeconds` 替换为 `RetryIntervalSeconds`，将
    `operationTimeoutMinutes` 替换为 `OperationTimeoutMinutes`：


    ```

    private Operation.ServerOperationStatus executeSynchronous(long executionId

    , SqlConnection connection)

    {

    Operation.ServerOperationStatus ret = Operation.ServerOperationStatus.UnexpectTerminated;

    ManualResetEvent manualResetState = new ManualResetEvent(false);

    CheckWaitState statusChecker = new CheckWaitState(executionId

    , MaximumRetries

    , connection

    , PackageCatalogName

    , this);

    TimeSpan dueTime = new TimeSpan(0, 0, 0);

    TimeSpan period = new TimeSpan(0, 0, RetryIntervalSeconds);

    object timerState = new TimerCheckerState(manualResetState);

    TimerCallback timerCallback = statusChecker.CheckStatus;

    Timer timer = new Timer(timerCallback, timerState, dueTime, period);

    WaitHandle[] manualResetStateWaitHandleCollection = new WaitHandle[]

    { manualResetState };

    int timeoutMillseconds = (int)new TimeSpan(0, OperationTimeoutMinutes

    , 0).TotalMilliseconds;

    bool exitContext = false;

    // wait here, please

    WaitHandle.WaitAny(manualResetStateWaitHandleCollection

    , timeoutMillseconds

    , exitContext);

    ret = statusChecker.OperationStatus;

    manualResetState.Dispose();

    timer.Dispose();

    return ret;

    }

    ```


    清单 20-5


    使用新属性更新局部变量


    更新后，代码如图[20-10](#449652_2_En_20_Chapter.xhtml#Fig10)所示：


    ![../images/449652_2_En_20_Chapter/449652_2_En_20_Fig10_HTML.jpg](images/449652_2_En_20_Chapter/449652_2_En_20_Fig10_HTML.jpg)


    图 20-10


    更新后的 `executeSynchronous` 方法


