    ## 结论


    在本章中，我们通过提供预先填充的文件夹、项目和包列表，使包路径管理更加健壮。我们使用表达式测试了重构后的属性，它们工作正常！


    现在是一个签入代码的好时机。


    ## 18. 插桩与验证


    *插桩* 是工程学的一个子学科，最初指从工业过程中收集物理数据。在软件工程中，插桩指的是展现软件设置、状态和性能关键指标的艺术与科学。


    *验证* 是检查值以确保这些值处于可用状态的过程。在 `执行目录包任务` 的上下文中，某些属性*必须*使用非空且非默认值进行配置。


    在本章中，我们将为 `执行目录包任务` 添加插桩和验证功能。


    ### 插桩


    最基本的形式下，插桩是代码与开发者和操作员“对话”的方式——它向开发者和操作员通报操作的状态。就 `执行目录包任务` 而言，期望该任务能告知开发者和操作员
    `SSIS` 目录包是否成功执行。

