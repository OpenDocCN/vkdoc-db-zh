- fmt: '## Implementing GeneralView OnInitialize


    Implement the `GeneralView OnInitialize` method by replacing the current `OnInitialize`
    method code with the code in Listing [13-2](#449652_2_En_13_Chapter.xhtml#PC2):


    ```

    public virtual void OnInitialize(IDTSTaskUIHost treeHost

    , System.Windows.Forms.TreeNode viewNode

    , object taskHost

    , object connections)

    {

    if (taskHost == null)

    {

    throw new ArgumentNullException("Attempting to initialize the ExecuteCatalogPackageTask
    UI with a null TaskHost");

    }

    if (!(((TaskHost)taskHost).InnerObject is ExecuteCatalogPackageTask.ExecuteCatalogPackageTask))

    {

    throw new ArgumentException("Attempting to initialize the ExecuteCatalogPackageTask
    UI with a task that is not an ExecuteCatalogPackageTask.");

    }

    theTask = ((TaskHost)taskHost).InnerObject as ExecuteCatalogPackageTask.ExecuteCatalogPackageTask;

    this.generalNode = new GeneralNode(taskHost as TaskHost);

    generalPropertyGrid.SelectedObject = this.generalNode;

    generalNode.Name = ((TaskHost)taskHost).Name;

    }

    Listing 13-2

    Implementing OnInitialize for GeneralView

    ```


    The `GeneralView OnInitialize` method appears as shown in Figure [13-2](#449652_2_En_13_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig2_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig2_HTML.jpg)


    Figure 13-2


    The GeneralView OnInitialize method


    Note `TaskHost` and `GeneralNode` are marked with red squiggly lines to indicate
    an issue with each. Hover over `TaskHost`, click the dropdown, and then click
    “using Microsoft.SqlServer.Dts.Runtime;” as shown in Figure [13-3](#449652_2_En_13_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig3_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig3_HTML.jpg)


    Figure 13-3


    Adding “using Microsoft.SqlServer.Dts.Runtime;”


    This Visual Studio automation adds a `using` directive for the `Microsoft.SqlServer.Dts.Runtime`
    assembly reference, clearing a number of red squiggly lines in the `GeneralView
    OnInitialize` method, as shown in Figure [13-4](#449652_2_En_13_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig4_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig4_HTML.jpg)


    Figure 13-4


    The using directive clears most design-time issues


    Visual Studio line numbers are included in Figure [13-4](#449652_2_En_13_Chapter.xhtml#Fig4)
    to aid in code functionality discussion. Lines 59–63 are the `GeneralView OnInitialize`
    method’s declaration and arguments.


    Lines 64–67 check to see if the `taskHost` member is null and, if `taskHost` is
    null, throw an `ArgumentNullException` that includes the message: “Attempting
    to initialize the ExecuteCatalogPackageTask UI with a null TaskHost.”


    Lines 69–72 test whether the `GeneralView taskHost` member’s `InnerObject` may
    *not* be cast to an instance of the `ExecuteCatalogPackageTask` type. If the `GeneralView
    taskHost` member’s `InnerObject` cannot be cast to an `ExecuteCatalogPackageTask`,
    the code throws an `ArgumentException` that includes the message: “Attempting
    to initialize the ExecuteCatalogPackageTask UI with a task that is not an ExecuteCatalogPackageTask.”


    If the previous “type test” succeeds, the `GeneralView theTask` member’s `InnerObject`
    is assigned to the `ExecuteCatalogPackageTask` object on line 74.


    On line 76, the `GeneralView generalNode` member is initialized (the code here
    is currently broken, but we will fix it soon).


    On line 78, the `GeneralView generalPropertyGrid` member is initialized as the
    `generalNode`.


    Finally, the `generalNode.Name` is initialized as the value of the `taskHost.Name`
    property value on line 80. The taskHost may be thought of as the “task on the
    SSIS package Control Flow.” This line of code helps keep the name of the ExecuteCatalogPackageTask
    in sync with the `taskHost.Name` property value displayed one the SSIS package
    Control Flow when the Execute Catalog Package Task editor is closed.


    There are a lot of moving parts in the `GeneralView OnInitialize` method. A lot
    of what is occurring in the `OnInitialize` method is a *knitting together* of
    the SSIS task editor View ➤ Node ➤ Property Category ➤ Property hierarchy we originally
    discussed in Chapter [10](#449652_2_En_10_Chapter.xhtml).


    An SSIS task editor surfaces properties in a hierarchy: View ➤ Node ➤ Property
    Category ➤ Property. *Views* are “pages” on an SSIS task editor. The following
    section appeared in Chapter [10](#449652_2_En_10_Chapter.xhtml). We present it
    here as a review.


    Figure [13-5](#449652_2_En_13_Chapter.xhtml#Fig5) visualizes the hierarchy for
    the Execute SQL Task Editor. As mentioned earlier, the General view (in the green
    box on the left) displays the General node – represented by the propertygrid control
    (in the blue box on the right). The property category named “General” is shown
    in the red box. The Name property is shown enclosed in the yellow box, as shown
    in Figure [13-5](#449652_2_En_13_Chapter.xhtml#Fig5):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig5_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig5_HTML.jpg)


    Figure 13-5


    Visualizing View ➤ Node ➤ Property Category ➤ Property


    Applied to the View ➤ Node ➤ Property Category ➤ Property hierarchy, the names
    of the entities for the Execute SQL Task Editor – shown in Figure [13-5](#449652_2_En_13_Chapter.xhtml#Fig5)
    – are the following: General (View) ➤ General (Node) ➤ General (Property Category)
    ➤ Name (Property). That’s a lot of General’s, and one – the General node – is
    hiding beneath the propertygrid control.


    The new `GeneralView OnInitialize` method is coupling the `ExecuteCatalogPackageTaskComplexUI`
    to the `ExecuteCatalogPackageTask` using the `GeneralView taskHost` member. Once
    that succeeds – and the code will throw an exception if the coupling is not possible
    – the `GeneralView`’s `generalNode` member is initialized (to a new `GeneralNode`
    object) and the `GeneralView`’s `generalPropertyGrid` is, in turn, initialized
    to the (new) `generalNode`.


    Again, there are a *lot* of moving parts in the `GeneralView OnInitialize` method.


