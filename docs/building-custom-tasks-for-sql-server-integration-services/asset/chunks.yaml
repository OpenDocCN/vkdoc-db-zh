    The relationship between the Project property and the Projects collection is identical
    to the relationship between the Folder property and the Folders collection. The
    only difference is the objects themselves. As with the Folders collection, we
    must manage the collection of SSIS Catalog Projects in our code.


    Add a new Project property to the `SettingsNode` class using the code in Listing
    [17-9](#449652_2_En_17_Chapter.xhtml#PC9):


