    # 12. Editor Integration


    In Chapter [11](#449652_2_En_11_Chapter.xhtml), we minimally coded the `ExecuteCatalogPackageTaskComplexUI`.
    This chapter focuses on the operations required to couple the new complex editor
    (`ExecuteCatalogPackageTaskComplexUI`) with the `ExecuteCatalogPackageTask`, similar
    to the coupling we achieved with the previous editor in Chapters [5](#449652_2_En_5_Chapter.xhtml)
    and [6](#449652_2_En_6_Chapter.xhtml). Once coupled, we will test the minimally
    coded `ExecuteCatalogPackageTask` in a test SSIS package.


    ## Signing the Assembly


    Chapter [5](#449652_2_En_5_Chapter.xhtml) walks through the process of signing
    an assembly. In order to use the assembly in the Global Assembly Cache (GAC),
    the assembly must be signed. The process described in this section is nearly identical
    to the process described in Chapter [5](#449652_2_En_5_Chapter.xhtml).


    Begin by adding a new text file named `Notes.txt` to the `ExecuteCatalogPackageTaskComplexUI`
    project. Right-click the `ExecuteCatalogPackageTaskComplexUI` project in Solution
    Explorer, hover over Add, and then click “New Item….” When the Add New Item dialog
    displays, click the General category and then click “Text File.” Rename “TextFile1.txt”
    to “Notes.txt,” as shown in Figure [12-1](#449652_2_En_12_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig1_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig1_HTML.jpg)


    Figure 12-1


    Adding the `Notes.txt` file


