    In Chapter [11](#449652_2_En_11_Chapter.xhtml), we used the same nifty functionality
    built into Visual Studio 2019 to implement the required IDTSTaskUIView interface
    methods for the SettingsView as we used to implement the GeneralView interface,
    as shown in Figure [13-19](#449652_2_En_13_Chapter.xhtml#Fig19):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig19_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig19_HTML.jpg)


    Figure 13-19


    Implementing required IDTSTaskUIView interface methods for SettingsView


    Near the end of the chapter, we commented out the `throw` statements so the ExecuteCatalogPackageTaskComplexUI
    project would build and pass some basic tests. The code – rearranged to suit my
    CDO – now appears as shown in Listing [13-9](#449652_2_En_13_Chapter.xhtml#PC9):


    ```

    public void OnInitialize(IDTSTaskUIHost treeHost, TreeNode viewNode, object taskHost,
    object connections)

