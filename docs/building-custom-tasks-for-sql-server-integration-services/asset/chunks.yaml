    执行 `ExecuteCatalogPackageTaskSetup.msi` 安装程序文件后，打开一个测试 SSIS 项目和测试 SSIS 包。打开 SSIS
    工具箱并检查“Execute Catalog Package Task”是否可用，如图 22-50 所示：


