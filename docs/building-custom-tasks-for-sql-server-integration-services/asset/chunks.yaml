    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig14_HTML.jpg](img/449652_2_En_19_Fig14_HTML.jpg)


    图 19-14：在 30 秒时执行超时


    这就是我们希望克服的行为。现在可以使用 `RunForSomeTime.dtsx` SSIS 包来测试基于 `WaitHandle.WaitAny` 的解决方案的实现了。

