    要开始构建此 SSIS 框架，请连接到已配置 SSIS 目录的 SQL Server 实例。使用清单 23-1 中的 T-SQL 向 `SSISDB` 数据库添加名为
    `fw` 的架构：


    ```sql

    Use SSISDB

    Go

    print ''Fw schema''

    If Not Exists(Select s.[name]

    From [sys].[schemas] s

    Where s.[name] = N''fw'')

    begin

    print '' - Create fw schema''

    declare @sql varchar(30) = ''Create schema fw''

    exec(@sql)

    print '' - Fw schema created''

    end

    Else

    begin

    print '' - Fw schema already exists.''

