    Note the `OperationTimeoutMinutes` property `ReadOnly` attribute is `true`, which
    means the value appears in the Execute Catalog Package Task editor, but is not
    editable. The `OperationTimeoutMinutes` property is managed mathematically and
    available for viewing only.


