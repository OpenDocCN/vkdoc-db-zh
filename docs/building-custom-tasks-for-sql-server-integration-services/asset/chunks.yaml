- fmt: "## Manually Testing Use Cases\n\nTest frameworks that automate redundancies\
    \ in test generation, execution, and reporting exist. If your job is developing\
    \ software all day every day, you either know about test frameworks or you will.\
    \ You will occasionally encounter a testing requirement for which your chosen\
    \ test framework is either incapable or \"clunky.\" In that case, you will need\
    \ to build a manual test.\n\nAll good testing is a series of scenarios, expected\
    \ answers or results (assertions), and measurement of the actual results. The\
    \ combination of a scenario and assertion is referred to as a `use case`. A single\
    \ use case may contain several assertions. When we perform testing, we work through\
    \ each use case, measure results, and record the measurements.\n\nI have a maxim:\
    \ \"All software is tested. Some intentionally.\" I occasionally post this maxim\
    \ in social media, as shown in Figure [21-1](#449652_2_En_21_Chapter.xhtml#Fig1):\n\
    \n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig1_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig1_HTML.jpg)\n\
    \nFigure 21-1\n\nAndy’s software testing maxim\n\nSoftware testing is meticulous\
    \ and demanding work. We test some, not all, use cases in this chapter. If we\
    \ tested all use cases, this chapter would be 150 pages, and my editor would (rightly)\
    \ point out that this is a chapter, not a test plan.\n\n## Use Cases\n\nIn this\
    \ section, we explore the following use cases for the Execute Catalog Package\
    \ Task:\n\n1.  `Task existence`\n2.  `Task validation`\n3.  `Task Editor` – `General`\n\
    \nThe first few use cases involve visual inspection – simply checking to see if\
    \ the `Execute Catalog Package Task` appears in the `SSIS Toolbox` and, if so,\
    \ selecting the `Execute Catalog Package Task` in the `SSIS Toolbox` and verifying\
    \ the toolbox description.\n\nThe tests are documented using a manual testing\
    \ documentation format. The author has seen similar manual testing documentation\
    \ presented in an Excel spreadsheet and prefers Word documentation for manual\
    \ test documentation.\n\n### Testing Task Existence\n\nScenario: Build the `ExecuteCatalogPackageTask`\
    \ solution, open a test `SSIS` project, and then open a test `SSIS` package. The\
    \ `Execute Catalog Package Task` should appear in the `SSIS Toolbox`, as shown\
    \ in Figure [21-2](#449652_2_En_21_Chapter.xhtml#Fig2):\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig2_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig2_HTML.jpg)\n\
    \nFigure 21-2\n\nDoes the `Execute Catalog Package Task` appear in the `SSIS Toolbox`?\n\
    \nAssertion: The `Execute Catalog Package Task` appears in the `SSIS Toolbox`.\n\
    \nMeasurement: `True`.\n\nAssertion: When the `Execute Catalog Package Task` is\
    \ selected in the `SSIS Toolbox`, the `Execute Catalog Package Task` description\
    \ appears in the Information portion of the `SSIS Toolbox`.\n\nMeasurement: `True`.\n\
    \n### Testing Task Validation\n\nScenario: Drag an `Execute Catalog Package Task`\
    \ to the `Control Flow canvas` of a test `SSIS` package. Examine the `Error List`\
    \ dialog, as shown in Figure [21-3](#449652_2_En_21_Chapter.xhtml#Fig3):\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig3_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig3_HTML.jpg)\n\
    \nFigure 21-3\n\nDoes the `Execute Catalog Package Task` appear – in error – on\
    \ the `Control Flow canvas`?\n\nAssertion: An `Execute Catalog Package Task` may\
    \ be added to the `Control Flow canvas` of a test `SSIS` package.\n\nMeasurement:\
    \ `True`.\n\nAssertion: A newly added `Execute Catalog Package Task` raises validation\
    \ errors.\n\nMeasurement: `True`.\n\nAssertion: The validation errors raised by\
    \ a newly added `Execute Catalog Package Task` are\n\n*   `Source Connection`\
    \ property is not properly configured.\n*   `SQL Server Instance` Connection attempt\
    \ failed.\n\nMeasurement: `True`.\n\nAssertion: The earlier validation errors\
    \ raised by a newly added `Execute Catalog Package Task` trigger an `SSIS` validation\
    \ error:\n\n*   There were errors during the task validation.\n\nMeasurement:\
    \ `True`.\n\n### Testing the Task Editor\n\nIn the following test sections, we\
    \ exercise the `Execute Catalog Package Task Editor`. Appearance and function\
    \ are tested.\n\nScenario: Open the `Execute Catalog Package Task Editor`, as\
    \ shown in Figure [21-4](#449652_2_En_21_Chapter.xhtml#Fig4):\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig4_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig4_HTML.jpg)\n\
    \nFigure 21-4\n\nDoes the `Execute Catalog Package Task Editor` display without\
    \ error?\n\nSometimes the solution build succeeds, and one (or more than one)\
    \ value is misaligned between the `ExecuteCatalogPackageTask` and `ExecuteCatalogPackageTaskComplexUI`\
    \ classes. When such misalignment occurs, the editor will not display. Instead,\
    \ an error will display.\n\nAssertion: The `Execute Catalog Package Task Editor`\
    \ opens without error.\n\nMeasurement: `True`, the `Execute Catalog Package Task\
    \ Editor` opens without error.\n\nAssertion: The `Execute Catalog Package Task\
    \ Editor` surfaces three Views:\n\n1.  `General`\n2.  `Settings`\n3.  `Expressions`\n\
    \nMeasurement: `True`.\n\nAssertion: The `General` View displays when the `Execute\
    \ Catalog Package Task Editor` first opens.\n\nMeasurement: `True`.\n\nAssertion:\
    \ The `General` View displays the `Execute Catalog Package Task` `Name` and `Description`\
    \ properties, and the property values are editable.\n\nMeasurement: `True`.\n\n\
    Scenario: Click the `Settings` view, as shown in Figure [21-5](#449652_2_En_21_Chapter.xhtml#Fig5):\n\
    \n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig5_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig5_HTML.jpg)\n\
    \nFigure 21-5\n\nDoes the `Execute Catalog Package Task Editor` `SettingsView`\
    \ display without error?\n\nAssertion: The `Settings` View displays without error\
    \ when `Settings` is selected.\n\nMeasurement: `True`.\n\nAssertion: When `Settings`\
    \ is selected, the `Settings` View displays the following categories and properties:\n\
    \n*   `Connections`\n    *   `SourceConnection`\n*   `SSIS Catalog Package Properties`\n\
    \    *   `Folder`\n    *   `Project`\n    *   `Package`\n*   `SSIS Package Execution\
    \ Properties`\n    *   `Use32bit`\n    *   `LoggingLevel`\n*   `SSIS Package Synchronized\
    \ Properties`\n    *   `Synchronized`\n    *   `MaximumRetries`\n    *   `RetryIntervalSeconds`\n\
    \    *   `OperationTimeoutMinutes`\n\nMeasurement: `True`\n\nScenario: Click the\
    \ `SourceConnection` property dropdown, as shown in Figure [21-6](#449652_2_En_21_Chapter.xhtml#Fig6):\n\
    \n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig6_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig6_HTML.jpg)\n\
    \nFigure 21-6\n\nDoes the `SourceConnection` dropdown list display all available\
    \ `ADO.Net` connection managers without error?\n\nAssertion: The `SourceConnection`\
    \ dropdown list displays all available `ADO.Net` connection managers without error.\n\
    \nMeasurement: `True`.\n\nScenario: Configure the `SourceConnection` property\
    \ value from the `SourceConnection` property dropdown, as shown in Figure [21-7](#449652_2_En_21_Chapter.xhtml#Fig7):\n\
    \n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig7_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig7_HTML.jpg)\n\
    \nFigure 21-7\n\nSelecting a value for the `SourceConnection` property\n\nScenario:\
    \ Close the `Execute Catalog Package Task Editor`, as shown in Figure [21-8](#449652_2_En_21_Chapter.xhtml#Fig8):\n\
    \n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig8_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig8_HTML.jpg)\n\
    \nFigure 21-8\n\nDoes the `Execute Catalog Package Task` appear – in error – on\
    \ the `Control Flow canvas`?\n\nAssertion: The validation errors raised by the\
    \ `Execute Catalog Package Task` as currently configured are\n\n*   There were\
    \ errors during the task validation.\n*   `Folder` property is not properly configured.\n\
    *   Value cannot be null.\n\nMeasurement: `True`.\n\nScenario: Open the `Execute\
    \ Catalog Package Task` and navigate to the `Settings` view. Click the `Folder`\
    \ property dropdown, as shown in Figure [21-9](#449652_2_En_21_Chapter.xhtml#Fig9):\n\
    \n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig9_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig9_HTML.jpg)\n\
    \nFigure 21-9\n\nDoes the `Folder` dropdown list display all available folders\
    \ in the `SSIS Catalog` configured in the `SourceConnection` without error?"
