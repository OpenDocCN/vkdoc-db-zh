- fmt: "### Extending the ExecutionValueParameterSet with LoggingLevel\n\nAs we mentioned\
    \ when adding the `Synchronized` execution parameter, the `ExecutionValueParameterSet`\
    \ is a collection of the `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValuearameterSet`\
    \ type. Like the `Synchronized` execution parameter, `LoggingLevel` is also an\
    \ execution parameter.\n\nBefore adding the `LoggingLevel` integer value to the\
    \ execution parameters collection, the value must be decoded using the code in\
    \ Listing [15-10](#449652_2_En_15_Chapter.xhtml#PC10):\n\n```\nprivate int decodeLoggingLevel(string\
    \ loggingLevel)\n{\n    int ret = 1;\n    switch (loggingLevel)\n    {\n     \
    \   default:\n            break;\n        case \"None\":\n            ret = 0;\n\
    \            break;\n        case \"Performance\":\n            ret = 2;\n   \
    \         break;\n        case \"Verbose\":\n            ret = 3;\n          \
    \  break;\n    }\n    return ret;\n}\nListing 15-10\nAdding the DecodeLoggingLevel\
    \ function\n```\n\nWhen the `decodeLoggingLevel` function is added to the `ExecuteCatalogPackageTask`\
    \ class, the code appears as shown in Figure [15-16](#449652_2_En_15_Chapter.xhtml#Fig16):\n\
    \n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig16_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig16_HTML.jpg)\n\
    Figure 15-16\nThe `decodeLoggingLevel` function\n\nTo add the `LoggingLevel` value\
    \ to the `returnExecutionValueParameterSet` function, edit the `returnExecutionValueParameterSet`\
    \ function to match the code in Listing [15-11](#449652_2_En_15_Chapter.xhtml#PC11):\n\
    \n```\nprivate Collection returnExecutionValueParameterSet(\n    Microsoft.SqlServer.Management.IntegrationServices.PackageInfo\
    \ catalogPackage)\n{\n    // initialize the parameters collection\n    Collection\
    \ executionValueParameterSet = new Collection();\n    // set SYNCHRONIZED execution\
    \ parameter\n    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\
    \ { ObjectType = 50, ParameterName = \"SYNCHRONIZED\", ParameterValue = Synchronized\
    \ });\n    // set LOGGING_LEVEL execution parameter\n    int LoggingLevelValue\
    \ = decodeLoggingLevel(LoggingLevel);\n    executionValueParameterSet.Add(new\
    \ Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\
    \ { ObjectType = 50, ParameterName = \"LOGGING_LEVEL\", ParameterValue = LoggingLevelValue\
    \ });\n    return executionValueParameterSet;\n}\nListing 15-11\nEditing the returnExecutionValueParameterSet\
    \ function\n```\n\nOnce added, the `returnExecutionValueParameterSet` function\
