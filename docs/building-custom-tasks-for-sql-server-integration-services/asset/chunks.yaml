    The propertyGridSettings_PropertyValueChanged event handler method added


    After adding the method to handle `propertyGridSettings_PropertyValueChanged`
    events, the next step is to update the `SettingsView InitializeComponent` method
    to assign the event handler to respond to the `propertyGridSettings`’ `PropertyValueChanged`
    event, adding the code in Listing [14-2](#449652_2_En_14_Chapter.xhtml#PC2):


    ```

    this.settingsPropertyGrid.PropertyValueChanged += new System.Windows.Forms.PropertyValueChangedEventHandler(this.propertyGridSettings_PropertyValueChanged);

    Listing 14-2

    Assigning propertyGridSettings_PropertyValueChanged to propertyGridSettings.PropertyValueChanged

    ```


