  trans: '

    # 应用密钥与版本控制


    ## 应用密钥


    密钥已经创建完毕，我们也已提取了所需的元数据。现在是时候将密钥文件应用到解决方案中了。在 `解决方案资源管理器` 中，打开 `属性`，如图 5-16 所示：


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig16_HTML.jpg](img/449652_2_En_5_Fig16_HTML.jpg)


    图 5-16 打开属性


    `属性` 页面打开后，导航到 `签名` 页。勾选 `为程序集签名` 复选框。点击 `选择强名称密钥文件` 下拉菜单并选择 `<浏览...>`，如图 5-17
    所示：


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig17_HTML.jpg](img/449652_2_En_5_Fig17_HTML.jpg)


    图 5-17 为程序集签名


    浏览到 `ExecuteCatalogPackageTask` 项目文件夹中的 `key.snk` 文件，如图 5-18 所示：


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig18_HTML.jpg](img/449652_2_En_5_Fig18_HTML.jpg)


    图 5-18 导航至 `key.snk` 文件


    点击 `打开` 按钮以使用 `key.snk` 文件为程序集签名，如图 5-19 所示：


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig19_HTML.jpg](img/449652_2_En_5_Fig19_HTML.jpg)


    图 5-19 已签名的程序集


    点击 `全部保存` 按钮（或点击 `文件` > `全部保存`）以保存你的 Visual Studio 解决方案。


    ## 签入变更


    在我们签入最新变更之前，请注意这是一个单开发者项目。Git 支持多种版本控制场景，尤其适用于分布式开发团队。此时发起拉取请求没有意义，因为我是代码的唯一审阅者。因此，下一步操作与我们初始的签入步骤相同。


    打开 `团队资源管理器`，如图 5-20 所示：


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig20_HTML.jpg](img/449652_2_En_5_Fig20_HTML.jpg)


    图 5-20 查看团队资源管理器


    点击 `更改` 磁贴并添加提交信息，如图 5-21 所示：


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig21_HTML.jpg](img/449652_2_En_5_Fig21_HTML.jpg)


    图 5-21 添加提交信息


    我可以通过点击 `全部提交` 按钮上的下拉箭头来节省一个步骤。点击 `全部提交并推送` 可以按顺序完成这两个步骤，如图 5-22 所示：


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig22_HTML.jpg](img/449652_2_En_5_Fig22_HTML.jpg)


    图 5-22 准备 `全部提交并推送`


    操作完成后，`团队资源管理器` 界面如图 5-23 所示：


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig23_HTML.jpg](img/449652_2_En_5_Fig23_HTML.jpg)


    图 5-23 更改已签入并推送到 Azure DevOps 仓库


    `解决方案资源管理器` 反映出新的工件已经签入，如图 5-24 所示：


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig24_HTML.jpg](img/449652_2_En_5_Fig24_HTML.jpg)


    图 5-24 签入后的解决方案资源管理器


    新的项目工件 `key.snk` 和 `Notes.txt` 现在可以在 Azure DevOps 仓库中找到，如图 5-25 所示：


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig25_HTML.jpg](img/449652_2_En_5_Fig25_HTML.jpg)


    图 5-25 Azure DevOps 仓库中的新项目工件


    ## 总结


    至此，在开发过程中我们已经：


    *   创建并配置了一个 Azure DevOps 项目

    *   将 Visual Studio 连接到 Azure DevOps 项目

    *   在本地克隆了 Azure DevOps Git 仓库

    *   创建了一个 Visual Studio 项目

    *   向 Visual Studio 项目添加了引用

    *   对项目代码进行了初始签入

    *   为程序集签名

    *   签入了一次更新


    下一步，我们将为程序集签名。


    # 准备构建


    构建自定义 SSIS 任务既不简单也不容易。你正在构建用于构造软件的组件。也许你以前做过这个。但很多人没有。


    构建程序集是直接的，包括两个步骤：


    1.  构建程序集。

    2.  在全局程序集缓存 (`GAC`) 中注册该程序集。


    当代码未按预期执行时，能够优雅地恢复是关键。如果构建/注册过程未能达到预期结果，开发者可以采取以下步骤恢复：


    *   从 `GAC` 中注销程序集。

    *   清理 Visual Studio 解决方案。

    *   在 Visual Studio 解决方案中构建程序集。

    *   在 `GAC` 中注册程序集。


    上述步骤几乎能像我们陷入麻烦一样快地让开发者摆脱困境，这是一件好事。


    ## 使用生成事件进行注册/注销


    `Gacutil` 是用于在全局程序集缓存 (`GAC`) 中 `注册` 和 `注销` 程序集的实用工具。如果你正在按照描述构建示例代码，有个好消息：C#
    支持生成事件——这允许开发者自动化在 `GAC` 中注册和注销程序集的过程。


    ### 查找 `gacutil.exe`


    就像第 5 章提到的 `sn.exe`（强名称）实用工具一样，`gacutil.exe` 随每个 .Net Framework 版本发布而移动。在撰写本文时，该版本位于
    `C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\` 文件夹中。

    '
- fmt: '### Adding Build Events


    One reason Visual Studio must be started as an administrator is to support unregistering
    and registering the build output file in the Global Assembly Cache, or `GAC`.
    Most non-administrator accounts lack permission to unregister and register assemblies
    in the `GAC`.


    Open the `ExecuteCatalogPackageTask` solution, and then open the Properties, as
    shown in Figure [6-1](#449652_2_En_6_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig1_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig1_HTML.jpg)


    Figure 6-1: Opening the project properties


    When the properties window displays, click the Build Events page as shown in Figure
    [6-2](#449652_2_En_6_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig2_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig2_HTML.jpg)


    Figure 6-2: The Build Events page


    Click the Edit Pre-build button and add the `gacutil` unregister command as shown
    in Listing [6-1](#449652_2_En_6_Chapter.xhtml#PC1) and Figure [6-3](#449652_2_En_6_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig3_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig3_HTML.jpg)


    Figure 6-3: Pre-build event command line


    ```

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 ➥ Tools\gacutil.exe"
    -u ExecuteCatalogPackageTask

    Listing 6-1: Unregister gacutil command syntax

    ```


    Click the Edit Post-build button, and add the `gacutil` register command as shown
    in Listing [6-2](#449652_2_En_6_Chapter.xhtml#PC2) and Figure [6-4](#449652_2_En_6_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig4_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig4_HTML.jpg)


    Figure 6-4: Post-build event command line


    ```

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 ➥ Tools\gacutil.exe"
    -if "E:\Program Files (x86)\Microsoft SQL ➥ Server\150\DTS\Tasks\ExecuteCatalogPackageTask.dll"

    Listing 6-2: Register gacutil command syntax

    ```


    The `gacutil` “register” command registers the `ExecuteCatalogPackageTask` dynamic-link
    library (`DLL`) file with the Global Assembly Cache (`GAC`). The `gacutil` “unregister”
    command unregisters the same assembly – effectively removing it from the `GAC`.


    Note: The `➥` characters in the listings above are line continuation characters.
    Please do `not` represent `CRLF` (Carriage Return Line Feed) line breaks. Please
    do not press the Enter key until the entire command string has been entered.


    Once configured, the Build Events page will appear as shown in Figure [6-5](#449652_2_En_6_Chapter.xhtml#Fig5):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig5_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig5_HTML.jpg)


    Figure 6-5: Build events, configured


    The `gacutil` unregister and register commands listed above are the first and
    last steps, respectively, for recovery from failure. In addition to configuring
    the Pre- and Post-build Events, developers may execute the `gacutil` unregister
    and register commands in a command window opened with “Run as Administrator” permissions
    – similar to the key-generation process discussed and demonstrated in Chapter
    [5](#449652_2_En_5_Chapter.xhtml). For this reason, add the `gacutil` unregister
    and register commands to `Notes.txt`, as shown in Figure [6-6](#449652_2_En_6_Chapter.xhtml#Fig6):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig6_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig6_HTML.jpg)


    Figure 6-6: Adding gacutil unregister and register commands to Notes.txt


    Developers may add pre- and post-build events to execute `gacutil` unregister
    and register commands automatically.


    Performing this step – executing `gacutil` to unregister and register the assembly
    – is one reason for starting Visual Studio Community Edition as an administrator.


    ### Setting the Output Path


    Another reason Visual Studio must be started as an administrator is to support
    a system directory path – `Program Files (x86)` – as the Build output target.
    As with build events, most non-administrator accounts lack permission to configure
    the build output to a system directory.


    Locate the `SSIS Tasks` subfolder used by SQL Server Data Tools (`SSDT`) to build
    SSIS packages. It will be located at `<installation drive>:\Program Files (x86)\Microsoft
    SQL Server\<version>\DTS\Tasks`. I installed SQL Server 2019 to my `E:` drive,
    so my path to the `SSIS Tasks` folder is as follows: `E:\Program Files (x86)\Microsoft
    SQL Server\150\DTS\Tasks\`. Replace the `<SSIS Tasks subfolder>` placeholder with
    the path to your `SSIS Tasks` subfolder in the “register” command listed above
    and in your `Notes.txt` file.


    In the project properties window, click the Build page. Copy the `SSIS Tasks`
    subfolder path into the “Build output path” textbox, as shown in Figure [6-7](#449652_2_En_6_Chapter.xhtml#Fig7):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig7_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig7_HTML.jpg)


    Figure 6-7: Configuring the project Build Output


    Aiming the project build output path to the `DTS\Tasks` folder means the assembly
    will be built and delivered to the folder `SSDT` uses to populate the SSIS Toolbox.
    Note: This is `not` the location of tasks that are executed at runtime. The runtime
    executables must be registered in the `GAC` because SSIS executables are executed
    from the `GAC` at runtime.


    For good measure, add the build output path to `Notes.txt` as shown in Figure
    [6-8](#449652_2_En_6_Chapter.xhtml#Fig8):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig8_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig8_HTML.jpg)


    Figure 6-8: Adding the project Build Output path to Notes.txt


    ### Conclusion


    The project now sports a solid foundation and is protected via source control.
    We now have all the required pieces in place to begin coding our custom task functionality.


    Now would be a good time to execute a commit and push to Azure DevOps.


    At this point in development, we have:

    *   Created and configured an Azure DevOps project

    *   Connected Visual Studio to the Azure DevOps project

    *   Cloned the Azure DevOps Git repo locally

    *   Created a Visual Studio project

    *   Added a reference to the Visual Studio project

    *   Performed an initial check-in of the project code

    *   Signed the assembly

    *   Checked in an update

    *   Configured the build output path and build events


    We are now ready to begin coding the task.


    ## 7. Coding the Task


    We’ve worked through several chapters in preparation for this chapter, but we
    are finally ready to begin coding the custom task in earnest. We begin by adding
    references to the project, decorating the class, inheriting from a base class,
    and adding a property.


    ### Using a Reference


    Open the Visual Studio solution `ExecuteCatalogPackageTask`. In Solution Explorer,
    open the class `ExecuteCatalogPackageTask.cs`. In the top section of the class,
    add the line `using Microsoft.SqlServer.Dts.Runtime;`


    Your class now appears as shown in Figure [7-1](#449652_2_En_7_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_7_Chapter/449652_2_En_7_Fig1_HTML.jpg](images/449652_2_En_7_Chapter/449652_2_En_7_Fig1_HTML.jpg)


    Figure 7-1: Using a reference


    This line of code allows you to use objects, methods, and properties contained
    in the assembly `Microsoft.SqlServer.ManagedDTS` – a reference added to this assembly
    in Chapter [3](#449652_2_En_3_Chapter.xhtml).'
  raw: '### Adding Build Events


    One reason Visual Studio must be started as an administrator is to support unregistering
    and registering the build output file in the Global Assembly Cache, or GAC. Most
    non-administrator accounts lack permission to unregister and register assemblies
    in the GAC.


    Open the ExecuteCatalogPackageTask solution, and then open the Properties, as
    shown in Figure [6-1](#449652_2_En_6_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig1_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Opening the project properties


    When the properties window displays, click the Build Events page as shown in Figure
    [6-2](#449652_2_En_6_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig2_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig2_HTML.jpg)


    Figure 6-2


    The Build Events page


    Click the Edit Pre-build button and add the gacutil unregister command as shown
    in Listing [6-1](#449652_2_En_6_Chapter.xhtml#PC1) and Figure [6-3](#449652_2_En_6_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig3_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Pre-build event command line


    ```

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 ➥ Tools\gacutil.exe"
    -u ExecuteCatalogPackageTask

    Listing 6-1

    Unregister gacutil command syntax

    ```


    Click the Edit Post-build button, and add the gacutil register command as shown
    in Listing [6-2](#449652_2_En_6_Chapter.xhtml#PC2) and Figure [6-4](#449652_2_En_6_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig4_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Post-build event command line


    ```

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 ➥ Tools\gacutil.exe"
    -if "E:\Program Files (x86)\Microsoft SQL ➥ Server\150\DTS\Tasks\ExecuteCatalogPackageTask.dll"

    Listing 6-2

    Register gacutil command syntax

    ```


    The gacutil “register” command registers the ExecuteCatalogPackageTask dynamic-link
    library (DLL) file with the Global Assembly Cache (GAC). The gacutil “unregister”
    command unregisters the same assembly – effectively removing it from the GAC.


    Note


    ➥ characters in the listings above are line continuation characters. Please do
    *not* represent CRLF (Carriage Return Line Feed) line breaks. Please do not press
    the Enter key until the entire command string has been entered.


    Once configured, the Build Events page will appear as shown in Figure [6-5](#449652_2_En_6_Chapter.xhtml#Fig5):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig5_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Build events, configured


    The gacutil unregister and register commands listed above are the first and last
    steps, respectively, for recovery from failure. In addition to configuring the
    Pre- and Post-build Events, developers *may* execute the gacutil unregister and
    register commands in a command window opened with “Run as Administrator” permissions –
    similar to the key-generation process discussed and demonstrated in Chapter [5](#449652_2_En_5_Chapter.xhtml).
    For this reason, add the gacutil unresgister and register commands to Notes.txt,
    as shown in Figure [6-6](#449652_2_En_6_Chapter.xhtml#Fig6):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig6_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Adding gacutil unregister and register commands to Notes.txt


    Developers may add pre- and post-build events to execute gacutil unregister and
    register commands automatically.


    Performing this step – executing gacutil to unregister and register the assembly –
    is one reason for starting Visual Studio Community Edition as an administrator.


    ## Setting the Output Path


    Another reason Visual Studio must be started as an administrator is to support
    a system directory path – Program Files (x86) – as the Build output target. As
    with build events, most non-administrator accounts lack permission to configure
    the build output to a system directory.


    Locate the SSIS Tasks subfolder used by SQL Server Data Tools to build SSIS packages.
    It will be located at *<installation drive>*:\Program Files (x86)\Microsoft SQL
    Server\*<version>*\DTS\Tasks. I installed SQL Server 2019 to my E: drive, so my
    path to the SSIS Tasks folder is as follows: “*E*:\Program Files (x86)\Microsoft
    SQL Server\*150*\DTS\Tasks\.” Replace the *<SSIS Tasks subfolder>* placeholder
    with the path to your SSIS Tasks subfolder in the “register” command listed above
    and in your Notes.txt file.


    In the project properties window, click the Build page. Copy the SSIS Tasks subfolder
    path into the “Build output path” textbox, as shown in Figure [6-7](#449652_2_En_6_Chapter.xhtml#Fig7):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig7_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Configuring the project Build Output


    Aiming the project build output path to the DTS\Tasks folder means the assembly
    will be built and delivered to the folder SSDT uses to populate the SSIS Toolbox.
    Note: This is *not* the location of tasks that are executed at runtime. The runtime
    executables must be registered in the GAC because SSIS executables are executed
    from the GAC at runtime.


    For good measure, add the build output path to Notes.txt as shown in Figure [6-8](#449652_2_En_6_Chapter.xhtml#Fig8):


    ![../images/449652_2_En_6_Chapter/449652_2_En_6_Fig8_HTML.jpg](images/449652_2_En_6_Chapter/449652_2_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Adding the project Build Output path to Notes.txt


    ## Conclusion


