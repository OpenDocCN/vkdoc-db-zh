    # 17. 重构 SSIS 包层次结构


    本章的目标是重构 `ExecuteCatalogPackageTask` 的方法，为添加和测试 `Reference` 属性做准备。目标包括：


    *   重构 `SettingsView` 的目录、文件夹、项目和包属性。

