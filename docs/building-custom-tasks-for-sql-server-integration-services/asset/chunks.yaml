- fmt: '## Threading, Briefly


    The `WaitHandle.WaitAny` method is a threading topic, which is part of the `System.Threading`
    .Net Framework namespace. You do not need to master threading to write most .Net
    applications, but the more you know, the better. Thread management is a topic
    to which data professionals can relate. Think database *transactions*.


    A database transaction would not allow two account owners of a joint banking account
    to withdraw all funds from the bank account just because they execute a withdrawal
    request at precisely the same time. A database transaction *blocks* one withdrawal
    request until the other withdrawal request completes, making the second withdrawal
    request *wait* until the first withdrawal request completes. When the first withdrawal
    request completes its transaction, the database engine notifies – or *signals* –
    the second withdrawal request that the blocking process is complete. The second
    withdrawal request executes and fails because the account is empty – the first
    withdrawal request already removed the funds from the account while blocking the
    second withdrawal request.


    The terms emphasized in the previous paragraph relate to both data transactions
    and thread safety.


    An application is considered *threadsafe* if the application includes state management
    functionality similar database transactions. A threadsafe application manages
    thread safety like a database transaction maintains atomicity as a mechanism for
    protecting code execution and delivering accurate results.


    A threadsafe application achieves atomicity by allowing some code to only execute
    serially while managing queues of waiting threads. Waiting threads receive signals
    when their turn to execute arrives. Threadsafe applications are the heart of multi-threaded
    functionality. Learn more at `docs.microsoft.com/en-us/dotnet/api/system.threading?view=netframework-4.7.2`.


    Multi-threaded applications share *resources* – chunks of functionality which
    are coded for *exclusive* access, like a `WithdrawFunds()` method in a banking
    application. It is common for a multi-threaded application to manage more than
    one exclusive resource to complete execution. A `WaitHandle` manages a collection
    of resources executing in a related operation, and the `WaitAny` method waits
    for a signal to *any* member of the collection in the `WaitHandle`. Learn more
    about the `WaitHandle.WaitAny` method at `docs.microsoft.com/en-us/dotnet/api/system.threading.waithandle.waitany?view=netframework-4.7.2`.


    A `ManualResetEvent` object is derived from the `WaitHandle` object. The state
    of a `ManualResetEvent` object is a Boolean value: false or true; and this state
    is managed by calling the `ManualResetEvent.Set()` and `ManualResetEvent.Reset()`
    methods. The `ManualResetEvent.Reset()` method *resets* (sets the Boolean state
    to *false*), *manually* blocking any additional threads that show up to use the
    shared resource, letting these threads know they have to wait for their turn to
    execute. The `ManualResetEvent.Set()` method *signals* (sets the Boolean state
    to *true*) waiting threads, *manually* letting waiting threads know they may now
    execute.


    The previous two sentences are important. You may need to come back to this section
    as we work through the examples to come. Don’t feel bad. Threading is hard. Thread
    safety is harder.


    ## ExecuteCatalogPackageTask.Execute


    The SSIS Catalog `Synchronized` execution parameter – A Boolean value – controls
    how the `ExecuteCatalogPackageTask.Execute` method returns from execution. The
    default `Synchronized` execution parameter value is false, which means the `ExecuteCatalogPackageTask.Execute`
    method functions as “fire and forget.” If you start an SSIS package with the `Synchronized`
    execution parameter value set to false, the package starts executing, and the
    `ExecuteCatalogPackageTask.Execute` method returns “success” almost immediately.
    Because the `ExecuteCatalogPackageTask.Execute` method behaves as “fire and forget”
    and returns “success” almost immediately, the `ExecuteCatalogPackageTask.Execute`
    method’s default 30-second timeout does not affect SSIS packages executed with
    the `Synchronized` execution parameter value set to false.


    The 30-second timeout for the `ExecuteCatalogPackageTask.Execute` method is only
    an issue when an SSIS package is executed with the `Synchronized` execution parameter
    value set to true.


    The implementation of the `WaitHandle.WaitAny`-based solution, then, applies only
    to SSIS package executions when the `Synchronized` execution parameter value set
    to true.'
