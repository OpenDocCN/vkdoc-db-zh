    checkbox. Click the `Choose a strong name key file` dropdown and select `<Browse…>`
    as shown in Figure 5-17:


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig17_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig17_HTML.jpg)


    Figure 5-17 Signing the assembly


    Browse to the `key.snk` file in the `ExecuteCatalogPackageTask` project folder
    as shown in Figure 5-18:


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig18_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig18_HTML.jpg)


    Figure 5-18 Navigating to the `key.snk` file


    Click the `Open` button to use the `key.snk` file to sign the assembly as shown
    in Figure 5-19:


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig19_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig19_HTML.jpg)


    Figure 5-19 Signed assembly


    Click the `Save All` button (or `File` > `Save All`) to save your Visual Studio
    solution.


    ## Checking In Changes


    Before we check in the latest changes, please note this is a single-developer
    project. Git supports a number of version control scenarios, particularly for
    distributed developer teams. Issuing a pull request at this time serves no purpose
    because I am the sole reviewer of code. The next step is therefore identical to
    our initial check-in step.


    Open `Team Explorer`, as shown in Figure 5-20:


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig20_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig20_HTML.jpg)


    Figure 5-20 Viewing Team Explorer


    Click the `Changes` tile and add a commit message, as shown in Figure 5-21:


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig21_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig21_HTML.jpg)


    Figure 5-21 Adding a commit message


    I have the option to save a step here by clicking the dropdown on the `Commit
    All` button. Clicking `Commit All and Push` accomplishes both steps in order as
    shown in Figure 5-22:


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig22_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig22_HTML.jpg)


    Figure 5-22 Preparing to `Commit All and Push`


    When the operations complete, `Team Explorer` appears as shown in Figure 5-23:


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig23_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig23_HTML.jpg)


    Figure 5-23 Changes checked in and pushed to the Azure DevOps repo


    `Solution Explorer` reflects the new artifacts have been checked in, as shown
    in Figure 5-24:


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig24_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig24_HTML.jpg)


    Figure 5-24 Solution Explorer after check-in


    New project artifacts, `key.snk` and `Notes.txt`, are now found in the Azure DevOps
    repo, as shown in Figure 5-25:


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig25_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig25_HTML.jpg)


    Figure 5-25 New project artifacts in the Azure DevOps repo


    ## Conclusion


    At this point in development, we have


    *   Created and configured an Azure DevOps project

    *   Connected Visual Studio to the Azure DevOps project

    *   Cloned the Azure DevOps Git repo locally

    *   Created a Visual Studio project

    *   Added a reference to the Visual Studio project

    *   Performed an initial check-in of the project code

    *   Signed the assembly

    *   Checked in an update


    We next sign the assembly.


    # Preparing to Build


    Building custom SSIS tasks is neither trivial nor easy. You are building components
    that will be used to construct software. Perhaps you have done this before. Many
    have not.


    Building the assembly is straightforward, consisting of two steps:


    1.  Build the assembly.

    2.  Register the assembly in the Global Assembly Cache (`GAC`).


    Recovering gracefully when the code does not perform as expected is key. When
    the build/register procedure fails to achieve the desired results, a developer
    can take the following steps to recover:


    *   Unregister the assembly from the `GAC`.

    *   Clean the Visual Studio solution.

    *   Build the assembly in the Visual Studio solution.

    *   Register the assembly in the `GAC`.


    The aforementioned steps get developers out of trouble almost as fast as we get
    into it, and that is a good thing.


    ## Using Build Events to Register/Unregister


    `Gacutil` is the utility used to `register` and `unregister` assemblies in the
    Global Assembly Cache (`GAC`). If you are following along and building the sample
    code as described, there is good news: C# supports build events – which allow
    developers to automate registering and unregistering assemblies in the `GAC`.


    ### Finding `gacutil.exe`


    Like the `sn.exe` (Strong Name) utility mentioned in Chapter 5, `gacutil.exe`
    moves around with each release of the .Net Framework. At the time of this writing,
    the version is located in the `C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX
    4.8 Tools\` folder.'
