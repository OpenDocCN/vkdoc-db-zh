    The propertyGridSettings_PropertyValueChanged event handler method assigned to
    the propertyGridSettings.PropertyValueChanged event


    The `propertyGridSettings_PropertyValueChanged` event handler method is now called
    whenever *any* property value changes in the `propertyGridSettings` PropertyGrid.


    The next step is tuning the logic of the `propertyGridSettings_PropertyValueChanged`
    event handler method so it responds as we desire to the value changing in *each*
    `propertyGridSettings` property. We begin with detecting – and responding to –
    changes in the `SourceConnection` property.'
