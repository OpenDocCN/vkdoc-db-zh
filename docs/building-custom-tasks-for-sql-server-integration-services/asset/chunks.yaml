    键值对的值


    在 SSIS 包中，该值由 SSIS 开发人员在编辑时配置。当 SSIS 开发人员单击编辑器上的“确定”按钮时，`OnCommit`方法触发，并将键值属性配置存储在
    SSIS 包的 XML 中，如图 13-12 所示：


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig12_HTML.jpg](img/449652_2_En_13_Fig12_HTML.jpg)


    图 13-12


    SSIS Execute SQL 任务的 XML


    在我们的示例 Execute SQL 任务中，`Name`属性值为“Execute SQL Task”。该属性值存储在名为 `DTS:ObjectName`
    的属性中。在运行时，SSIS XML 被加载、解释和执行，但一切都始于 SSIS 开发人员打开任务编辑器，然后配置键值对的值部分，其中键在构成 View ➤
    Node ➤ Property Category ➤ Property 层次结构的编辑器视图中直观地显示。


    要为我们的自定义 SSIS 任务添加 Name 属性，请将代码清单 13-7 中的代码添加到 GeneralNode：


    ```

