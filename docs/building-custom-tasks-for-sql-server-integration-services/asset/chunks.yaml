  trans: "## 响应属性变化与重置集合\n\n![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig36_HTML.jpg](img/449652_2_En_17_Fig36_HTML.jpg)\n\
    \n图 17-36\n\n添加代码以响应`Package`属性的更改\n\n要测试此功能，请构建`ExecuteCatalogPackageTask`解决方案，在测试\
    \ SSIS 项目中打开一个测试 SSIS 包，向控制流画布添加一个执行目录包任务（Execute Catalog Package Task），打开任务编辑器，并配置`SourceConnection`、文件夹和项目。配置好`SourceConnection`、文件夹和项目后，`Package`属性应填充有\
    \ SSIS 目录包的名称，如图 17-37 所示：\n\n![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig37_HTML.jpg](img/449652_2_En_17_Fig37_HTML.jpg)\n\
    \n图 17-37\n\n包列表\n\n下一步是隐藏`PackageName`属性。要隐藏`PackageName`属性，只需注释掉`PackageName`属性声明，方法是选择代码，按住`Ctrl`键，然后按`K`键，再按`C`键。所选代码将被注释掉，如图\
    \ 17-38 所示：\n\n![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig38_HTML.jpg](img/449652_2_En_17_Fig38_HTML.jpg)\n\
    \n图 17-38\n\n被注释掉的`PackageName`属性\n\n下一步是更新`SettingsView.OnCommit`方法，将代码行`theTask.PackageName\
    \ = settingsNode.PackageName;`更新为`theTask.PackageName = settingsNode.Package;`，如图\
    \ 17-39 所示：\n\n![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig39_HTML.jpg](img/449652_2_En_17_Fig39_HTML.jpg)\n\
    \n图 17-39\n\n更新`PackageName`属性赋值\n\n构建并测试`ExecuteCatalogPackageTask`解决方案。任务编辑器上的“设置”视图现在应如图\
    \ 17-40 所示：\n\n![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig40_HTML.jpg](img/449652_2_En_17_Fig40_HTML.jpg)\n\
    \n图 17-40\n\n`Package`属性\n\n现在，`Package`和`Packages`集合属性已配置完毕。\n\n现在是签入代码的绝佳时机。\n\
    \n### 重置集合\n\n重置集合很重要，因为它使得在编辑时，`SourceConnection` -> `Folder` -> `Project` ->\
    \ `Package`的层次结构更易于管理。使用清单 17-23 中的代码在`SettingsView`类中实现`resetCollections`方法：\n\
    \n```csharp\nprivate void resetCollections(string collectionName)\n{\n    Cursor\
    \ = Cursors.WaitCursor;\n    switch (collectionName)\n    {\n        default:\n\
    \            break;\n        case \"Connections\":\n            settingsNode.Folder\
    \ = \"\";\n            settingsNode.Project = \"\";\n            settingsNode.Package\
    \ = \"\";\n            break;\n        case \"Folders\":\n            settingsNode.Project\
    \ = \"\";\n            settingsNode.Package = \"\";\n            break;\n    \
    \    case \"Projects\":\n            settingsNode.Package = \"\";\n          \
    \  break;\n    }\n    Cursor = Cursors.Default;\n}\n```\n清单 17-23\n添加`SettingsView.resetCollections`方法\n\
    \n添加后，代码如图 17-41 所示：\n\n![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig41_HTML.jpg](img/449652_2_En_17_Fig41_HTML.jpg)\n\
    \n图 17-41\n\n添加`SettingsView.resetCollections`方法\n\n`resetCollections`方法是如何工作的？一个名为`collectionName`的`string`类型参数被传递给`resetCollections`方法。在`resetCollections`方法内部，光标首先被设置为`WaitCursor`，而在方法退出前，光标被重置为`Default`光标。\n\
    \n一个由`collectionName`参数值驱动的`switch`语句被夹在这两次光标“设置”之间。层次结构是`SourceConnection` ->\
    \ `Folder` -> `Project` -> `Package`。`switch`语句包含对应于“Connections”、“Folders”和“Projects”的情况（case）。\n\
    \n“Connections”情况将`settingsNode.Folder`、`settingsNode.Project`和`settingsNode.Package`属性值重置为空字符串。“Folders”情况将`settingsNode.Project`和`settingsNode.Package`属性值重置为空字符串。“Projects”情况将`settingsNode.Package`属性值重置为空字符串。\n\
    \n下一步是将调用`resetCollections`方法的代码添加到`SettingsView.propertyGridSettings_PropertyValueChanged`方法的响应代码中，用于`SourceConnection`、`Folder`和`Project`属性，如图\
    \ 17-42 所示：\n\n![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig42_HTML.jpg](img/449652_2_En_17_Fig42_HTML.jpg)\n\
    \n图 17-42\n\n添加对`resetCollections`方法的调用\n\n通过构建`ExecuteCatalogPackageTask`，打开一个测试\
    \ SSIS 包，然后向控制流 surface 添加一个执行目录包任务来测试`resetCollections`方法。打开执行目录包任务编辑器并配置一个 SSIS\
    \ 包执行，如图 17-43 所示：\n\n![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig43_HTML.jpg](img/449652_2_En_17_Fig43_HTML.jpg)\n\
    \n图 17-43\n\n配置好的 SSIS 包执行\n\n通过从下拉列表中选择一个不同的`Project`来测试`resetCollections`方法对`Project`的响应，如图\
    \ 17-44 所示：\n\n![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig44_HTML.jpg](img/449652_2_En_17_Fig44_HTML.jpg)\n\
    \n图 17-44\n\n`Project`属性值更改时`Package`属性重置\n\n通过从下拉列表中选择一个不同的`Folder`来测试`resetCollections`方法对`Folder`的响应，如图\
    \ 17-45 所示：\n\n![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig45_HTML.jpg](img/449652_2_En_17_Fig45_HTML.jpg)\n\
    \n图 17-45\n\n`Folder`属性值更改时`Project`属性重置\n\n通过从下拉列表中选择一个不同的`SourceConnection`来测试`resetCollections`方法对`SourceConnection`的响应，如图\
    \ 17-46 所示：\n\n![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig46_HTML.jpg](img/449652_2_En_17_Fig46_HTML.jpg)\n\
    \n图 17-46\n\n`SourceConnection`属性值更改时`Folder`属性重置\n\n`resetCollections`方法按设计工作。"
- fmt: '## Let’s Test Expressions!


    The code is in no shape, at present, to execute the `Execute Catalog Package Task`
    in an `Azure-SSIS` integration runtime. We may, however, use Expressions.


    To test expressions, add three `String` data type variables to your test `SSIS`
    package named `Folder`, `Project`, and `Package`, as shown in Figure [17-47](#449652_2_En_17_Chapter.xhtml#Fig47):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig47_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig47_HTML.jpg)

    Figure 17-47


    Add `Folder`, `Project`, and `Package` `SSIS` variables


    Configure the values of each variable to match a `Folder` ➤ `Project` ➤ `Package`
    in your `SSIS` Catalog. Your values will differ from the values shown here.


    Configure an `Execute Catalog Package Task` in your test `SSIS` package to execute
    a package deployed to an `SSIS` Catalog, as shown in Figure [17-48](#449652_2_En_17_Chapter.xhtml#Fig48):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig48_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig48_HTML.jpg)

    Figure 17-48


    A configured `Execute Catalog Package Task`


    The next step is to click `Expressions` in the left list to open the `Expression`
    view, as shown in Figure [17-49](#449652_2_En_17_Chapter.xhtml#Fig49):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig49_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig49_HTML.jpg)

    Figure 17-49


    The `Expressions` view


    Click the ellipsis to the right of the `Expressions` property (collection) value
    to open the `Property Expressions Editor` dialog, as shown in Figure [17-50](#449652_2_En_17_Chapter.xhtml#Fig50):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig50_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig50_HTML.jpg)

    Figure 17-50


    The `Property Expressions Editor`


    Click the `Property` dropdown and select `PackageFolder`, as shown in Figure [17-51](#449652_2_En_17_Chapter.xhtml#Fig51):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig51_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig51_HTML.jpg)

    Figure 17-51


    Selecting the `PackageFolder` property


    The next step in configuring the `PackageFolder` property expression is clicking
    the ellipsis beside the `Expression` value textbox, as shown in Figure [17-52](#449652_2_En_17_Chapter.xhtml#Fig52):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig52_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig52_HTML.jpg)

    Figure 17-52


    Configuring the expression for the `PackageFolder` property


    Clicking the ellipsis beside the `Expression` value textbox opens the `Expression
    Builder` dialog. Expand the `Variables and Parameters` virtual folder and select
    the `User::Folder` `SSIS` variable, as shown in Figure [17-53](#449652_2_En_17_Chapter.xhtml#Fig53):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig53_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig53_HTML.jpg)

    Figure 17-53


    Selecting the `User::Folder` `SSIS` variable


    Drag the `User::Folder` `SSIS` variable into the `Expression` textbox. Click the
    `Evaluate Expression` button and observe the default value of the `User::Folder`
    `SSIS` variable in the `Evaluated Value` textbox, as shown in Figure [17-54](#449652_2_En_17_Chapter.xhtml#Fig54):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig54_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig54_HTML.jpg)

    Figure 17-54


    `User::Folder` `SSIS` variable selected and evaluated


    Click the `OK` button to close the `Expression Builder` dialog. Note the property
    expression value for `PackageFolder` property is now configured to the `User::Folder`
    `SSIS` variable, as shown in Figure [17-55](#449652_2_En_17_Chapter.xhtml#Fig55):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig55_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig55_HTML.jpg)

    Figure 17-55


    The `User::Folder` `SSIS` variable assigned to the `PackageFolder` property


    At execution time, the value in the `User::Folder` `SSIS` variable will override
    the `PackageFolder` property.


    Repeat the procedure to assign the `PackageProject` property to the `User::Project`
    `SSIS` variable value, and the `PackageName` property to the `User::Package` `SSIS`
    variable value, as shown in Figure [17-56](#449652_2_En_17_Chapter.xhtml#Fig56):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig56_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig56_HTML.jpg)

    Figure 17-56


    `PackageProject` and `PackageName` properties assigned to `User::Project` and
    `User::Package` `SSIS` variables, respectively


    Execute the test `SSIS` package. If all goes as planned, the test execution succeeds,
    as shown in Figure [17-57](#449652_2_En_17_Chapter.xhtml#Fig57):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig57_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig57_HTML.jpg)

    Figure 17-57


    A successful test execution


    Check the `All Executions` report to verify the `Folder` ➤ `Project` ➤ `Package`
    path matches the values configure in your test `SSIS` package’s variables, as
    shown in Figure [17-58](#449652_2_En_17_Chapter.xhtml#Fig58):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig58_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig58_HTML.jpg)

    Figure 17-58


    Expressions test success


    `SSIS` Expression-driven property overrides are a powerful mechanism for reusing
    one `SSIS` package to perform multiple enterprise data integration operations.


    ## Conclusion


    In this chapter, we made package path management more robust by surfacing pre-populated
    lists of folders, projects, and packages. We tested the refactored properties
    with Expressions, and they work!


    Now would be an excellent time to check in your code.


    ## 18. Instrumentation and Validation


    *Instrumentation* is a sub-science of engineering which originally meant collecting
    physical data from industrial processes. In software engineering, instrumentation
    refers to the art and science of surfacing key indicators of the settings, state,
    and performance of software.


    *Validation* is checking values to make certain the values are in a usable state.
    In the context of the `Execute Catalog Package Task`, certain properties *must*
    be configured using non-empty and non-default values.


    In this chapter, we will add instrumentation and validation to the `Execute Catalog
    Package Task`.


    ### Instrumentation


    In its most basic form, instrumentation is how code “talks” to developers and
    operators – it informs developers and operators of the status of an operation.
    In the case of the `ExecuteCatalogPackageTask`, it is expected that the task inform
    developers and operators if the `SSIS` Catalog package executed successfully or
    not.'
