    Expressions


    Recall the goals of this section of the book, which are


    *   Surface a more “SSIS-y” experience for users of the task including a “pretty”
    editor with General and Settings pages “views”


    *   Enable the use of SSIS Expressions


    *   Add design-time validation of task settings


    *   Surface more SSIS Catalog execution properties in the editor


    In this section, we begin to see the second bullet realized – enabling the use
    is SSIS expressions – as Figure [12-18](#449652_2_En_12_Chapter.xhtml#Fig18) shows.


    We added no code to create an “ExpressionsView,” so where did this editor page
    come from? The ExpressionsView is inherited from the `Microsoft.DataTransformationServices.Controls`
    assembly. You may not believe it at this time, but the ability to manipulate SSIS
    custom task properties using SSIS expressions is worth all the work required to
    add an “SSIS-y” editor.


    ## Conclusion


    In this chapter, we focused on operations required to couple the new complex editor
    (ExecuteCatalogPackageTaskComplexUI) with the ExecuteCatalogPackageTask. Once
    coupled, we were able to test the minimally coded ExecuteCatalogPackageTask in
    a test SSIS package.


    Now would be an excellent time to check in your code.


    In the next chapter, we add properties.


