- fmt: "# Implementing a WaitHandle.WaitAny Method\n\n基于 `WaitHandle.WaitAny` 的解决方案，其核心在于异步执行执行时间超过\
    \ 30 秒且 `Synchronized` 属性设置为 `true` 的 SSIS 包。异步执行 SSIS 包，就如同将 `Synchronized` 属性设置为\
    \ `false`。因此，仅当 `Synchronized` 属性设置为 `true` 时，才会调用此执行方法。\n\n## 编辑方法与参数\n\n首先，通过编辑\
    \ `ExecuteCatalogPackageTask` 类中的 `returnExecutionValueParameterSet` 方法来开始实现。在编辑时，使用清单\
    \ 19-3 中的代码添加用于设置 `CALLER_INFO` 执行参数的代码：\n\n```csharp\nprivate Collection returnExecutionValueParameterSet()\n\
    {\n    // initialize the parameters collection\n    Collection executionValueParameterSet\
    \ = new Collection();\n    // set SYNCHRONIZED execution parameter\n    executionValueParameterSet.Add(new\
    \ Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\n\
    \    {\n        ObjectType = 50,\n        ParameterName = \"SYNCHRONIZED\",\n\
    \        ParameterValue = false // always execute with the Synchronized property\
    \ false\n    });\n    // set LOGGING_LEVEL execution parameter\n    int LoggingLevelValue\
    \ = decodeLoggingLevel(LoggingLevel);\n    executionValueParameterSet.Add(new\
    \ Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\n\
    \    {\n        ObjectType = 50,\n        ParameterName = \"LOGGING_LEVEL\",\n\
    \        ParameterValue = LoggingLevelValue\n    });\n    // set CALLER_INFO execution\
    \ parameter\n    string machineName = Environment.MachineName.Replace('\"', '\\\
    '').Replace(\"\\\\\", \"//\");\n    string userName = Environment.UserName;\n\
    \    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\n\
    \    {\n        ObjectType = 50,\n        ParameterName = \"CALLER_INFO\",\n \
    \       ParameterValue = machineName + \"\\\\\" + userName\n    });\n    return\
    \ executionValueParameterSet;\n}\n```\n\n清单 19-3 编辑 `ExecuteCatalogPackageTask`\
    \ 中的 `returnExecutionValueParameterSet` 方法\n\n编辑完成后，`returnExecutionValueParameterSet`\
    \ 方法如图 19-15 所示。\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig15_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig15_HTML.jpg)\n\
    \n图 19-15 编辑 `returnExecutionValueParameterSet` 方法\n\n## 修改执行调用\n\n继续实现，编辑 `ExecuteCatalogPackageTask.Execute`\
    \ 方法中的 `catalogPackage.Execute` 调用，添加清单 19-4 中的代码：\n\n```csharp\nlong executionId\
    \ = catalogPackage.Execute(Use32bit\n, null\n, executionValueParameterSet);\n\
    if (Synchronized)\n{\n    ManualResetEvent manualResetState = new ManualResetEvent(false);\n\
    }\n```\n\n清单 19-4 检查是否配置为同步执行\n\n添加后，代码如图 19-16 所示。\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig16_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig16_HTML.jpg)\n\
    \n图 19-16 实现基于 `WaitHandle.WaitAny` 的解决方案\n\n## 添加引用与处理错误\n\n使用 Visual Studio\
    \ 快速操作添加 `using System.Threading;` 指令：将鼠标悬停在 `ManualResetEvent` 类型声明上，单击快速操作下拉菜单，然后单击\
    \ `using System.Threading;` 指令。添加指令后，代码如图 19-17 所示。\n\n![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig17_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig17_HTML.jpg)\n\
    \n图 19-17 添加指令后错误清除\n\n如果包执行未配置为同步执行，则代码将按之前的方式执行包。如果包执行配置为同步执行，则会声明一个名为 `manualResetState`\
    \ 的 `ManualResetEvent`，并将其状态初始化为 `false`。请记住，设置为 `false` 的 `ManualResetEvent`\
