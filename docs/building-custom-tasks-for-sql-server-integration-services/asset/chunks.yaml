    ![../images/449652_2_En_20_Chapter/449652_2_En_20_Fig12_HTML.jpg](img/449652_2_En_20_Fig12_HTML.jpg)


    图 20-12


    计时器“滴答”检测消息


    计时器检测代码已完成。


    ## 总结


    在本章中，我们将三个硬编码的变量 `maximumRetries`、`retryIntervalSeconds` 和 `operationTimeoutMinutes`
    转换为 `ExecuteCatalogPackageTask` 类的属性，然后向 `SettingsView` 和 `SettingsNode` 类添加代码，以便向
    SSIS 开发者公开这些新属性。


    在下一章中，我们将测试“执行目录包任务”的功能。


    现在是一个签入代码的好时机。


