    if-then-else 功能由三元条件运算符控制：`<表达式> ? <为真时> : <为假时>`。该表达式的求值结果必须为 `true` 或 `false`。表达式部分就是
    `Synchronized` 属性，这是一个布尔值。三元运算的“为真时”操作是 `(" completed." + swMsg.Substring(0, (swMsg.Length
    - 4)))`，它构建了一条消息，用于告知开发人员和操作员程序包执行已用的时间。`swMsg.Length – 4` 这段代码截断了毫秒级的已用时间。三元运算的“为假时”操作是
    `(" started. Check SSIS Catalog Reports for package execution results."))`，它构建了一条消息，告知开发人员和操作员程序包已开始异步执行，他们应该去其他地方查看程序包执行结果。


    在第 107 行可以找到另一个不同的三元条件操作，它检查 `Synchronized` 属性的值以确定是返回 `Information` 还是 `Warning`
    messageType。


