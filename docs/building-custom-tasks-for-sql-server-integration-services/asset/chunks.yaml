- fmt: "## 测试超时功能\n\n通过配置一个设计为成功的长运行 SSIS 包来测试超时功能。将 `Synchronized` 属性设置为 `True`，然后配置\
    \ `MaximumRetries` 和 `RetryIntervalSeconds` 属性，使得 SSIS 包执行的 `MaximumRetries` 值*在*\
    \ SSIS 包执行完成*之前*达到，如图 [21-41](#449652_2_En_21_Chapter.xhtml#Fig41) 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig41_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig41_HTML.jpg)\n\
    \n图 21-41\n\n测试 `MaximumRetries`\n\n如果一切按计划进行，SSIS 包和执行目录包任务将失败，如图 [21-42](#449652_2_En_21_Chapter.xhtml#Fig42)\
    \ 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig42_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig42_HTML.jpg)\n\
    \n图 21-42\n\n预期的失败执行\n\n检查“进度/执行结果”选项卡，以验证是否显示了正确的事件消息——即指示 SSIS 包执行被取消的事件消息，如图\
    \ [21-43](#449652_2_En_21_Chapter.xhtml#Fig43) 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig43_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig43_HTML.jpg)\n\
    \n图 21-43\n\nSSIS 包执行已取消\n\n下一步是验证 SSIS 目录中 SSIS 包的执行是否已被取消。打开 `SSMS` 并连接到承载 SSIS\
    \ 目录的 `SQL Server` 实例。打开“所有执行”报告以查看 SSIS 包执行的状态，如图 [21-44](#449652_2_En_21_Chapter.xhtml#Fig44)\
    \ 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig44_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig44_HTML.jpg)\n\
    \n图 21-44\n\nSSIS 目录中的 SSIS 包执行状态\n\n如果一切按计划进行，`SSMS` 中的“所有执行”SSIS 目录报告应指示 SSIS\
    \ 包执行已取消。\n\n### 结论\n\n在本章中，我们应用了一种手动测试技术进行测试验证，然后测试了执行目录包任务的执行功能。\n\n下一步是构建一个安装程序文件，以便于在企业中分发执行目录包任务。\n\
    \n现在是一个签入代码的好时机。\n\n## 22. 构建安装项目\n\n安装项目允许开发人员管理代码在企业中的分发以及与其他企业共享代码。`SSIS` 长期以来一直促进着第三方任务和组件开发人员的健康发展。在本章中，我们将一个安装项目添加到\
    \ `ExecuteCatalogPackageTask` 解决方案中，并配置该项目，以便在其他服务器上安装执行目录包任务，步骤如下：\n\n*   添加\
    \ `ExecuteCatalogPackageTaskSetup` 项目。\n*   添加引用。\n*   配置产品标签。\n    *   配置包标签。\n\
    \    *   配置安装路径属性标签。\n    *   配置 `MajorUpgrade` 和 `MediaTemplate` 标签。\n    * \
    \  初始化 `UIRef` 和许可证文件标签。\n    *   配置安装功能和图标。\n*   配置文件夹和文件夹结构。\n    *   配置 `ExecuteCatalogPackageTask`\
    \ 的 `GAC` 注册。\n    *   配置 `ExecuteCatalogPackageTask Tasks` 部署文件夹。\n    *   配置\
    \ `ExecuteCatalogPackageTaskComplexUI` 的 `GAC` 注册。\n    *   配置 `ExecuteCatalogPackageTaskComplexUI\
    \ Tasks` 部署文件夹。\n\n安装项目会创建一个名为 `setup.exe` 或 `<*项目名称*>.msi` 的文件。一个名为 `MsiExec.exe`\
    \ 的 `Windows` 应用程序执行 `msi` 文件来安装所需软件。`Visual Studio` 支持可显示安装项目的扩展。其中一个扩展是 `Windows\
    \ Installer XML` (`WiX`)。请访问 `WiX` 工具集页面 (`wixtoolset.org`) 下载并安装我们将用于构建 `ExecuteCatalogPackageTask.msi`\
    \ 文件的 `Visual Studio` 项目模板。\n\n要遵循本章中的演示和示例，读者*必须*访问 `wixtoolset.org`，下载最新版本的软件，并按照\
    \ `wixtoolset.org` 上的 `WiX` 工具集安装说明进行操作。\n\n本章仅列出了为执行目录包任务配置 `msi` 安装程序文件所需的 `XML`，未提供太多解释。鼓励读者在\
    \ `wixtoolset.org` 了解更多关于使用 `WiX` 工具集的信息，在那里可以找到深入的文档和示例：`wixtoolset.org/documentation`。\n\
    \n### 添加 ExecuteCatalogPackageTaskSetup 项目\n\n要将安装项目添加到 `ExecuteCatalogPackageTask`\
    \ 解决方案，请在解决方案资源管理器中右键单击解决方案，将鼠标悬停在“添加”上，然后单击“新建项目”，如图 [22-1](#449652_2_En_22_Chapter.xhtml#Fig1)\
    \ 所示：\n\n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig1_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig1_HTML.jpg)\n\
    \n图 22-1\n\n添加新的安装项目\n\n当“添加新项目”对话框显示时，导航到 `WiX` 工具集模板类别并选择最新版本。在可用模板列表中选择 `WiX`\
    \ 的安装项目，然后将新项目命名为 `ExecuteCatalogPackageTaskSetup`，如图 [22-2](#449652_2_En_22_Chapter.xhtml#Fig2)\
    \ 所示：\n\n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig2_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig2_HTML.jpg)\n\
    \n图 22-2\n\n添加 `ExecuteCatalogPackageTaskSetup` 项目\n\n将新项目添加到 `ExecuteCatalogPackageTask`\
    \ 解决方案后，解决方案资源管理器如图 [22-3](#449652_2_En_22_Chapter.xhtml#Fig3) 所示：\n\n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig3_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig3_HTML.jpg)\n\
    \n图 22-3\n\n`ExecuteCatalogPackageTaskSetup` 项目\n\n将 `ExecuteCatalogPackageTask.wxs`\
    \ 文件重命名为 `ExecuteCatalogPackageTask.wxs`，如图 [22-4](#449652_2_En_22_Chapter.xhtml#Fig4)\
    \ 所示：\n\n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig4_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig4_HTML.jpg)\n\
    \n图 22-4\n\n将 `ExecuteCatalogPackageTask.wxs` 文件重命名为 `ExecuteCatalogPackageTask.wxs`\n\
    \n下一步是添加引用。\n\n### 配置标签\n\n在本节中，我们配置 `WiX` 标签以构建安装项目，用于在运行 `SQL Server 2017` 的\
    \ `Windows Server 2016` 上安装执行目录包任务。"
  raw: "Test timeout functionality by configuring a long-running SSIS package built\
    \ to succeed. Set the Synchronized property to True, and then configure the MaximumRetries\
    \ and RetryIntervalSeconds properties so that the SSIS package execution `MaximumRetries`\
    \ value is reached *before* the SSIS package execution completes, as shown in\
    \ Figure [21-41](#449652_2_En_21_Chapter.xhtml#Fig41):\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig41_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig41_HTML.jpg)\n\
    \nFigure 21-41\n\nTesting MaximumRetries\n\nIf all goes according to plan, the\
    \ SSIS package and Execute Catalog Package Task fail, as shown in Figure [21-42](#449652_2_En_21_Chapter.xhtml#Fig42):\n\
    \n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig42_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig42_HTML.jpg)\n\
    \nFigure 21-42\n\nA failed execution, as expected\n\nExamine the Progress/Execution\
    \ Results tab to verify the correct event message – the event message indicating\
    \ the SSIS package execution was canceled – displays, as shown in Figure [21-43](#449652_2_En_21_Chapter.xhtml#Fig43):\n\
    \n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig43_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig43_HTML.jpg)\n\
    \nFigure 21-43\n\nThe SSIS Package execution was canceled\n\nThe next step is\
    \ to verify that the SSIS package execution was canceled in the SSIS Catalog.\
    \ Open SSMS and connect to the SQL Server instance that hosts the SSIS Catalog.\
    \ Open the All Executions report to view the status of the SSIS package execution,\
    \ as shown in Figure [21-44](#449652_2_En_21_Chapter.xhtml#Fig44):\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig44_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig44_HTML.jpg)\n\
    \nFigure 21-44\n\nThe SSIS package execution status in the SSIS Catalog\n\nIf\
    \ all goes according to plan, the All Executions SSIS Catalog report in SSMS should\
    \ indicate the SSIS package execution was canceled.\n\n## Conclusion\n\nIn this\
    \ chapter, we applied one manual testing technique for testing validation and\
    \ then tested the Execute Catalog Package Task execution functionality.\n\nThe\
    \ next step is to build an installer file to ease propagation of the Execute Catalog\
    \ Package Task in an enterprise.\n\nNow would be an excellent time to check in\
    \ your code.\n\n# 22. Building the Setup Project\n\nSetup projects, or installer\
    \ projects, allow developers to manage distribution of code in an enterprise and\
    \ to share code with other enterprises. SSIS has long promoted a healthy community\
    \ of third-party task and component developers. In this chapter, we add a setup\
    \ project to the ExecuteCatalogPackageTask solution and configure the setup project\
    \ to install the Execute Catalog Package Task on other servers using the following\
    \ steps:\n\n*   Add the ExecuteCatalogPackageTaskSetup project.\n\n*   Add References.\n\
    \n*   Configure the Product tag.\n    *   Configure the Package tag.\n\n    *\
    \   Configure the Installation Path Property tags.\n\n    *   Configure the MajorUpgrade\
    \ and MediaTemplate tags.\n\n    *   Initialize the UIRef and License file tags.\n\
    \n    *   Configure the Installation feature and icon.\n\n*   Configure folders\
    \ and folder structure.\n    *   Configure the ExecuteCatalogPackageTask GAC registration.\n\
    \n    *   Configure the ExecuteCatalogPackageTask Tasks deployment folder.\n\n\
    \    *   Configure the ExecuteCatalogPackageTaskComplexUI GAC registration.\n\n\
    \    *   Configure the ExecuteCatalogPackageTaskComplexUI Tasks deployment folder.\n\
    \nInstaller projects create a file named setup.exe or <*project name*>.msi. A\
    \ Windows application named MsiExec.exe executes msi files, which installs the\
    \ desired software. Visual Studio supports extensions that surface installer projects.\
    \ One extension is Windows Installer XML, WiX. Visit the WiX Toolset page (wixtoolset.org)\
    \ to download and install the Visual Studio project template we will use to build\
    \ the ExecuteCatalogPackageTask.msi file.\n\nTo follow the demonstrations and\
    \ samples included in this chapter, the reader *must* visit wixtoolset.org, download\
    \ the latest version of the software, and follow the WiX Toolset installation\
    \ instructions found at wixtoolset.org.\n\nThis chapter merely lists the XML required\
    \ to configure an msi installer file for the Execute Catalog Package Task without\
    \ providing much explanation. The reader is encouraged to learn more about using\
    \ the WiX Toolset at wixtoolset.org where one may find in-depth documentation\
    \ and examples at wixtoolset.org/documentation.\n\n## Adding the ExecuteCatalogPackageTaskSetup\
    \ Project\n\nTo add an installer project to the ExecuteCatalogPackageTask solution,\
    \ right-click the solution in Solution Explorer, hover over Add, and then click\
    \ New Project, as shown in Figure [22-1](#449652_2_En_22_Chapter.xhtml#Fig1):\n\
    \n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig1_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig1_HTML.jpg)\n\
    \nFigure 22-1\n\nAdding a new setup project\n\nWhen the Add New Project dialog\
    \ displays, navigate to the WiX Toolset template category and select the latest\
    \ version. Select Setup Project for WiX in the available templates list, and then\
    \ name the new project “ExecuteCatalogPackageTaskSetup,” as shown in Figure [22-2](#449652_2_En_22_Chapter.xhtml#Fig2):\n\
    \n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig2_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig2_HTML.jpg)\n\
    \nFigure 22-2\n\nAdding the ExecuteCatalogPackageTaskSetup project\n\nOnce the\
    \ new project has been added to the ExecuteCatalogPackageTask solution, Solution\
    \ Explorer appears as shown in Figure [22-3](#449652_2_En_22_Chapter.xhtml#Fig3):\n\
    \n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig3_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig3_HTML.jpg)\n\
    \nFigure 22-3\n\nThe ExecuteCatalogPackageTaskSetup project\n\nRename the ExecuteCatalogPackageTask.wxs\
    \ file “ExecuteCatalogPackageTask.wxs,” as shown in Figure [22-4](#449652_2_En_22_Chapter.xhtml#Fig4):\n\
    \n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig4_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig4_HTML.jpg)\n\
    \nFigure 22-4\n\nRenaming the ExecuteCatalogPackageTask.wxs file ExecuteCatalogPackageTask.wxs\n\
    \nThe next step is to add references.\n\n## Configuring Tags\n\nIn this section,\
    \ we configure WiX tags to build the installation project to install the Execute\
    \ Catalog Package Task on Windows Server 2016 running SQL Server 2017."
  trans: "\n## 测试超时功能\n\n通过配置一个设计为成功的长运行 SSIS 包来测试超时功能。将 `Synchronized` 属性设置为 `True`，然后配置\
    \ `MaximumRetries` 和 `RetryIntervalSeconds` 属性，使得 SSIS 包执行的 `MaximumRetries` 值*在*\
    \ SSIS 包执行完成*之前*达到，如图 21-41 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig41_HTML.jpg](img/449652_2_En_21_Fig41_HTML.jpg)\n\
    \n图 21-41\n\n测试 `MaximumRetries`\n\n如果一切按计划进行，SSIS 包和执行目录包任务将失败，如图 21-42 所示：\n\
    \n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig42_HTML.jpg](img/449652_2_En_21_Fig42_HTML.jpg)\n\
    \n图 21-42\n\n预期的失败执行\n\n检查“进度/执行结果”选项卡，以验证是否显示了正确的事件消息——即指示 SSIS 包执行被取消的事件消息，如图\
    \ 21-43 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig43_HTML.jpg](img/449652_2_En_21_Fig43_HTML.jpg)\n\
    \n图 21-43\n\nSSIS 包执行已取消\n\n下一步是验证 SSIS 目录中 SSIS 包的执行是否已被取消。打开 `SSMS` 并连接到承载 SSIS\
    \ 目录的 `SQL Server` 实例。打开“所有执行”报告以查看 SSIS 包执行的状态，如图 21-44 所示：\n\n![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig44_HTML.jpg](img/449652_2_En_21_Fig44_HTML.jpg)\n\
    \n图 21-44\n\nSSIS 目录中的 SSIS 包执行状态\n\n如果一切按计划进行，`SSMS` 中的“所有执行”SSIS 目录报告应指示 SSIS\
    \ 包执行已取消。\n\n### 结论\n\n在本章中，我们应用了一种手动测试技术进行测试验证，然后测试了执行目录包任务的执行功能。\n\n下一步是构建一个安装程序文件，以便于在企业中分发执行目录包任务。\n\
    \n现在是一个签入代码的好时机。\n\n## 22. 构建安装项目\n\n安装项目允许开发人员管理代码在企业中的分发以及与其他企业共享代码。`SSIS` 长期以来一直促进着第三方任务和组件开发人员的健康发展。在本章中，我们将一个安装项目添加到\
    \ `ExecuteCatalogPackageTask` 解决方案中，并配置该项目，以便在其他服务器上安装执行目录包任务，步骤如下：\n\n*   添加\
    \ `ExecuteCatalogPackageTaskSetup` 项目。\n*   添加引用。\n*   配置产品标签。\n    *   配置包标签。\n\
    \    *   配置安装路径属性标签。\n    *   配置 `MajorUpgrade` 和 `MediaTemplate` 标签。\n    * \
    \  初始化 `UIRef` 和许可证文件标签。\n    *   配置安装功能和图标。\n*   配置文件夹和文件夹结构。\n    *   配置 `ExecuteCatalogPackageTask`\
    \ 的 `GAC` 注册。\n    *   配置 `ExecuteCatalogPackageTask Tasks` 部署文件夹。\n    *   配置\
    \ `ExecuteCatalogPackageTaskComplexUI` 的 `GAC` 注册。\n    *   配置 `ExecuteCatalogPackageTaskComplexUI\
    \ Tasks` 部署文件夹。\n\n安装项目会创建一个名为 `setup.exe` 或 `<*项目名称*>.msi` 的文件。一个名为 `MsiExec.exe`\
    \ 的 `Windows` 应用程序执行 `msi` 文件来安装所需软件。`Visual Studio` 支持可显示安装项目的扩展。其中一个扩展是 `Windows\
    \ Installer XML` (`WiX`)。请访问 `WiX` 工具集页面 (`wixtoolset.org`) 下载并安装我们将用于构建 `ExecuteCatalogPackageTask.msi`\
    \ 文件的 `Visual Studio` 项目模板。\n\n要遵循本章中的演示和示例，读者*必须*访问 `wixtoolset.org`，下载最新版本的软件，并按照\
    \ `wixtoolset.org` 上的 `WiX` 工具集安装说明进行操作。\n\n本章仅列出了为执行目录包任务配置 `msi` 安装程序文件所需的 `XML`，未提供太多解释。鼓励读者在\
    \ `wixtoolset.org` 了解更多关于使用 `WiX` 工具集的信息，在那里可以找到深入的文档和示例：`wixtoolset.org/documentation`。\n\
    \n### 添加 ExecuteCatalogPackageTaskSetup 项目\n\n要将安装项目添加到 `ExecuteCatalogPackageTask`\
    \ 解决方案，请在解决方案资源管理器中右键单击解决方案，将鼠标悬停在“添加”上，然后单击“新建项目”，如图 22-1 所示：\n\n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig1_HTML.jpg](img/449652_2_En_22_Fig1_HTML.jpg)\n\
    \n图 22-1\n\n添加新的安装项目\n\n当“添加新项目”对话框显示时，导航到 `WiX` 工具集模板类别并选择最新版本。在可用模板列表中选择 `WiX`\
    \ 的安装项目，然后将新项目命名为 `ExecuteCatalogPackageTaskSetup`，如图 22-2 所示：\n\n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig2_HTML.jpg](img/449652_2_En_22_Fig2_HTML.jpg)\n\
    \n图 22-2\n\n添加 `ExecuteCatalogPackageTaskSetup` 项目\n\n将新项目添加到 `ExecuteCatalogPackageTask`\
    \ 解决方案后，解决方案资源管理器如图 22-3 所示：\n\n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig3_HTML.jpg](img/449652_2_En_22_Fig3_HTML.jpg)\n\
    \n图 22-3\n\n`ExecuteCatalogPackageTaskSetup` 项目\n\n将 `ExecuteCatalogPackageTask.wxs`\
    \ 文件重命名为 `ExecuteCatalogPackageTask.wxs`，如图 22-4 所示：\n\n![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig4_HTML.jpg](img/449652_2_En_22_Fig4_HTML.jpg)\n\
    \n图 22-4\n\n将 `ExecuteCatalogPackageTask.wxs` 文件重命名为 `ExecuteCatalogPackageTask.wxs`\n\
    \n下一步是添加引用。\n\n### 配置标签\n\n在本节中，我们配置 `WiX` 标签以构建安装项目，用于在运行 `SQL Server 2017` 的\
    \ `Windows Server 2016` 上安装执行目录包任务。\n"
- fmt: '## Configure the Product tag


    In Solution Explorer, double-click the `ExecuteCatalogPackageTask.wxs` file to
    open the file in the Visual Studio editor, as shown in Figure [22-9](#449652_2_En_22_Chapter.xhtml#Fig9):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig9_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig9_HTML.jpg)

    Figure 22-9

    The `ExecuteCatalogPackageTask.wxs` file


    The WiX Toolset process uses the settings in the `ExecuteCatalogPackageTask.wxs`
    file to configure the msi installer project and includes a helpful template by
    default. The next step is to edit the template, where needed, to install the Execute
    Catalog Package Task.


    The `ExecuteCatalogPackageTask.wxs` file begins with an XML declaration shown
    in Figure [22-10](#449652_2_En_22_Chapter.xhtml#Fig10):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig10_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig10_HTML.jpg)

    Figure 22-10

    The xml tag


    The next tag, the `Wix` tag, encapsulates the remainder of the `ExecuteCatalogPackageTask.wxs`
    file, as shown in Figure [22-11](#449652_2_En_22_Chapter.xhtml#Fig11):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig11_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig11_HTML.jpg)

    Figure 22-11

    The Wix tag


    The next step is to configure the `Product` tag. Begin by placing `Product` tag
    attributes on different lines. The `Product Id` value is configured to "`*`" which
    indicates the value will be automatically generated. Update the `Product Name`
    attribute value to "Execute Catalog Package Task," the `Product Version` attribute
    value, and the `Product Manufacturer` attribute value, if desired. I recommend
    leaving the `Product Language` and `UpgradeCode` attribute values set to their
    default values. Since XML ignores whitespace, feel free to add space to the `ExecuteCatalogPackageTask.wxs`
    file, as shown in Figure [22-12](#449652_2_En_22_Chapter.xhtml#Fig12):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig12_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig12_HTML.jpg)

    Figure 22-12

    Updating the Product tag


    ## Configure the Package Tag


    The installation will require administrative permissions to search the registry,
    install to the Program Files (x86) path, and register the assemblies in the Global
    Assembly Cache (GAC) on the target server. Configure the `Package` tag by adding
    two attributes – `InstallPrivileges` and `AdminImage` – to permit installation
    as an administrator using the XML in Listing [22-1](#449652_2_En_22_Chapter.xhtml#PC1):


    ```

    InstallPrivileges="elevated"

    AdminImage="yes"

    ```

    Listing 22-1

    Permit Administrator installation


    Once added, the XML appears as shown in Figure [22-13](#449652_2_En_22_Chapter.xhtml#Fig13):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig13_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig13_HTML.jpg)

    Figure 22-13

    Package edited to permit administrative installation privileges


    ## Configure the Installation Path Property Tags


    SSIS task assemblies are installed in the `<drive>:\ Program Files (x86)\Microsoft
    SQL Server\<version>\DTS\Tasks` folder for use during development. SSIS task assemblies
    are registered in the Global Assembly Cache or GAC for use during execution.


    The next step is to add a property for the SSIS Task Installation Folder using
    the XML in Listing [22-2](#449652_2_En_22_Chapter.xhtml#PC2):


    ```

    ```

    Listing 22-2

    Add the SSIS Task Installation Folder property


    When added, the XML appears as shown in Figure [22-14](#449652_2_En_22_Chapter.xhtml#Fig14):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig14_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig14_HTML.jpg)

    Figure 22-14

    Adding the SSIS Task Installation Folder property


    The next step is to add the SSIS Folder property using the XML in Listing [22-3](#449652_2_En_22_Chapter.xhtml#PC3):


    ```

    ```

    Listing 22-3

    Add the SSIS Folder property


    When added, the XML appears as shown in Figure [22-15](#449652_2_En_22_Chapter.xhtml#Fig15):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig15_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig15_HTML.jpg)

    Figure 22-15

    Adding the SSIS Folder property


    On line 21, the property is configured by setting the Id attribute value and supplying
    a default Value property value.


    The next step is to add the SSIS Folder property. This step poses the highest
    challenge in configuring the installation project because it relies on the Windows
    Registry, and the registry for different Windows operating systems and different
    versions of SQL Server stores values in different locations. How and where you
    isolate registry values – and whether the values you find are ``*accurate*``,
    even – may be a matter of trial and error.


    For SQL Server 2017 running on Windows Server 2016, configure the registry-search
    XML using the XML in Listing [22-4](#449652_2_En_22_Chapter.xhtml#PC4):


    ```

    ```

    Listing 22-4

    Add the RegistrySearch XML


    When added, the XML appears as shown in Figure [22-16](#449652_2_En_22_Chapter.xhtml#Fig16):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig16_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig16_HTML.jpg)

    Figure 22-16

    Adding the RegistrySearch XML


    On lines 27–31, the `HKEY_LOCAL_MACHINE\SOFTWARE\WOW6432Node\Microsoft\Microsoft
    SQL Server\140\VerSpecificRootDir` registry key is read and used to set the property
    Value attribute with the key value, which is shown in Figure [22-17](#449652_2_En_22_Chapter.xhtml#Fig17):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig17_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig17_HTML.jpg)

    Figure 22-17

    Reading the `HKEY_LOCAL_MACHINE\SOFTWARE\WOW6432Node\Microsoft\Microsoft SQL Server\140\VerSpecificRootDir`
    registry key value


    Please note the Root attribute value on line 27 is "`HKLM.`" `HKLM` is an abbreviation
    for `HKEY_LOCAL_MACHINE`.


    The next step is to set the SSIS installation directory by combining the previous
    properties to complete the value of the `SSISINSTALLFOLDER` property value using
    the XML in Listing [22-5](#449652_2_En_22_Chapter.xhtml#PC5):


    ```

    ```

    Listing 22-5

    Complete the `SSISINSTALLFOLDER` value configuration


    When added, the XML appears as shown in Figure [22-18](#449652_2_En_22_Chapter.xhtml#Fig18):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig18_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig18_HTML.jpg)

    Figure 22-18

    Completing the `SSISINSTALLFOLDER` value configuration


    The `SSISINSTALLFOLDER` value is now configured.


    ## Configure the MajorUpgrade and MediaTemplate Tags


    The next step is configuring the `MajorUpgrade` and `MediaTemplate` tags using
    the XML in Listing [22-6](#449652_2_En_22_Chapter.xhtml#PC6):


    ```

    ```

    Listing 22-6

    Configure the `MajorUpgrade` and `MediaTemplate` tags


    The `MajorUpgrade` tag contains a message (found in the `DowngradeErrorMessage`
    attribute) to display when a newer version of the Execute Catalog Package Task
    is already installed. The `MediaTemplate` tag attributes are `EmbedCab` and `CompressionLevel`.
    `EmbedCab` controls whether the *cabinet*, or cab, file, which contains the Execute
    Catalog Package Task installation code, is embedded in the product (msi) file.
    `CompressionLevel` sets compression for the cab file.


    When added, the XML appears as shown in Figure [22-19](#449652_2_En_22_Chapter.xhtml#Fig19):


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig19_HTML.jpg](images/449652_2_En_22_Chapter/449652_2_En_22_Fig19_HTML.jpg)

    Figure 22-19

    Configuring the `MajorUpgrade` and `MediaTemplate` tags


    The next step is: Initialize the `UIRef` and `License` file tags.'
