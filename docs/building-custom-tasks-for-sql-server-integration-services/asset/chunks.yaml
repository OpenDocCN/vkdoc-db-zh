    # 15. Implement Use32bit, Synchronized, and LoggingLevel SettingsView Properties


    In Chapters 13 and 14, we implemented `GeneralView` and `SettingsView`. In this
    chapter, we implement additional `SettingsNode` properties – `Use32bit`, `Synchronized`,
    and `LoggingLevel`. Adding the `SourceConnection` property was intense, so we
    begin this chapter by adding one straightforward and simple property implementation:
    `Use32bit`. Be forewarned, the intensity increases.


    ## Specifying a 32-Bit Interface


    SSIS is provider-agnostic, which means SSIS can connect with just about any data
    provider installed on a server. If SSIS can connect to the provider, SSIS can
    read and write data through the said provider to resources for which the provider
    provides an interface.


    ### Adding the Use32bit Property


    Some providers surface 32-bit interfaces. A handful of providers surface *only*
    32-bit interfaces. For this reason, the SSIS Catalog allows developers and operators
    to execute SSIS packages in 32-bit mode by setting a “use 32-bit” Boolean value
    to true at execution time.


    To add the `Use32bit` property to `SettingsNode`, we begin by adding the code
    in Listing 15-1 to the `SettingsNode` class:


    ```

    [

    Category("SSIS Package Execution Properties"),

    Description("Enter SSIS Catalog Package Use32bit execution property value.")

    ]

    public bool Use32bit {

    get { return _task.Use32bit; }

    set { _task.Use32bit = value; }

    }

    Listing 15-1: Adding the `Use32bit` property to `SettingsNode`

    ```


    Once added, the `SettingsNode Use32bit` property code appears as shown in Figure
    15-1:


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig1_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig1_HTML.jpg)


    Figure 15-1: The `SettingsNode Use32bit` property, implemented


    The next step is to update the `ExecuteCatalogPackageTask Execute` method to use
    the value set in the `Use32bit` property. Edit the `catalogPackage.Execute(false,
    null);` statement to match the code in Listing 15-2:


    ```

    catalogPackage.Execute(Use32bit, null);

    Listing 15-2: Configure the `ExecuteCatalogPackageTask Execute` method to use
    the `Use32bit` property

    ```


    Once edited, the `ExecuteCatalogPackageTask Execute` method appears as shown in
    Figure 15-2:


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig2_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig2_HTML.jpg)


    Figure 15-2: The `ExecuteCatalogPackageTask Execute` method now uses the `Use32bit`
    property


    That’s it. The `Use32bit` property is implemented. That wasn’t so difficult, was
    it?


    ### Test Use32bit


    To test the `Use32bit` property, build the `ExecuteCatalogPackageTask` solution,
    open a test SSIS package, and configure the `Execute Catalog Package Task` to
    execute an SSIS package deployed to an SSIS Catalog. Set the `Use32bit` property
    to True, as shown in Figure 15-3:


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig3_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig3_HTML.jpg)


    Figure 15-3: Setting the `Use32bit` property to True


    Click the OK button and then execute the test SSIS package. If all goes as planned,
    the package execution will succeed in the SSIS Catalog. One way to check if the
    `Use32bit` property was set is to execute the T-SQL query in Listing 15-3:


    ```

    Select folder_name

    , project_name

    , package_name

    , use32bitruntime

    From SSISDB.catalog.executions

    Order by execution_id DESC

    Listing 15-3: Checking to see if `Use32bit` was set

    ```


    Executing the T-SQL in Listing 15-3 returns results that confirm the `Use32bit`
    property works, as shown in Figure 15-4:


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig4_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig4_HTML.jpg)


    Figure 15-4: The `Use32bit` property in action


    The next property is `Synchronized`, and the implementation is as easy as the
    implementation of the `Use32bit` property.'
