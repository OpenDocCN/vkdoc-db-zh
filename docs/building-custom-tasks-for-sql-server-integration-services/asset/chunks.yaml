    The stored procedure named xp_msver is available in on-premises instances of SQL
    Server. The stored procedure named xp_msver is available in Azure Managed Instances
    of SQL Server. At the time of this writing, the stored procedure named xp_msver
    is *not* available in Azure SQL DB instances of SQL Server.


    The author engineered a solution that may, or may not, work for you. At the time
    of this writing, however, adding a stored procedure named `xp_msver` to the SSISDB
    database resolves this condition. Connect to the SSISDB database and execute the
    code in Listing [25-8](#449652_2_En_25_Chapter.xhtml#PC8) to create the `xp_msver`
    stored procedure:


    ```

    Create or Alter Procedure xp_msver

    @arg sql_variant = N''Platform''

    ,@index int = 4 output

    ,@name nvarchar(25) = N''Platform'' output

    ,@internalvalue int = NULL output

    ,@charvalue nvarchar(25) = N''NT x64'' output

    As

    Select @index = 4

    , @name = N''Platform''

    , @internalvalue = NULL

    , @charvalue = N''NT x64''

    go

    Listing 25-8

    Add the xp_msver stored procedure to the SSISDB database

    ```


    After deploying the `xp_msver` stored procedure, re-execute the Parent.dtsx SSIS
    package as before, shown in Figures [25-34](#449652_2_En_25_Chapter.xhtml#Fig34)
    and [25-35](#449652_2_En_25_Chapter.xhtml#Fig35). Refresh the SSIS Catalog All
    Executions report to view the results of this execution, as shown in Figure [25-38](#449652_2_En_25_Chapter.xhtml#Fig38):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig38_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig38_HTML.jpg)


    Figure 25-38


    Framework application execution success


    The next step is analysis of our test results.


    ### Analyzing the Results


    Comparing the metadata configuration will let us know if the test really succeeded.
    The metadata configuration may be gleaned by executing the query in the Parent.dtsx
    package’s “SQL Get Application Packages” and is shown – slightly modified to supply
    the ApplicationName parameter value – in Listing [25-9](#449652_2_En_25_Chapter.xhtml#PC9):


    ```

    Select p.FolderName

    , p.ProjectName

    , p.PackageName

    , Convert(bit, ap.Synchronized) As Synchronized

    , ap.MaximumRetries

    , ap.RetryIntervalSeconds

    , Convert(bit, ap.Use32bit) As Use32bit

    , ap.LoggingLevel

    From fw.ApplicationPackages ap

    Join fw.Applications a

    On a.ApplicationId = ap.ApplicationId

    Join fw.Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = N''Framework Test'' -- @ApplicationName

    Order By ap.ExecutionOrder

    Listing 25-9

    SSISFramework metadata

    ```


    When pasted into SSMS, the query appears as shown in Figure [25-39](#449652_2_En_25_Chapter.xhtml#Fig39):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig39_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig39_HTML.jpg)


    Figure 25-39


    Framework metadata from the SSISFramework database


    When executed, the query results appear as shown in Figure [25-40](#449652_2_En_25_Chapter.xhtml#Fig40):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig40_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig40_HTML.jpg)


    Figure 25-40


    Metadata query results


    Comparing the items labeled “1” in Figures [25-38](#449652_2_En_25_Chapter.xhtml#Fig38)
    and [25-40](#449652_2_En_25_Chapter.xhtml#Fig40), we note the Synchronized is
    configured to 0 – or false – for the execution of the second SSIS package (ReportParameterAndSucceed.dtsx).
    Since the first SSIS package – ReportAndSucceed.dtsx – is configured to run synchronously,
    the second SSIS package and third SSIS package (RunForSomeTime.dtsx) should start
    as quickly as the Execute Catalog Package Task can start them. And this is what
    we find in Figure [25-38](#449652_2_En_25_Chapter.xhtml#Fig38); RunForSomeTime.dtsx
    starts 4 seconds after ReportParameterAndSucceed.dtsx begins executing.


    You can also see the execution of RunForSomeTime.dtsx did *not* wait for the completion
    of the execution of ReportParameterAndSucceed.dtsx. ReportParameterAndSucceed.dtsx
    executed for almost 13 seconds (see the Duration column).


    We next turn our analysis to the Use32bit metadata – denoted in the green box
    in Figure [25-40](#449652_2_En_25_Chapter.xhtml#Fig40). The SSIS Catalog reports
    built into SQL Server Management Studio are awesome. There are additional ways
    to view the data. Use the T-SQL in Listing [25-10](#449652_2_En_25_Chapter.xhtml#PC10)
    to view usage of the Use32bit metadata.


    ```

    Select execution_id

    , folder_name

    , project_name

    , package_name

    , use32bitruntime

    From [catalog].executions

    Where execution_id >= 10 /* ReportAndSucceed.dtsx execution_id */

    Order By execution_id Desc

    Listing 25-10

    View Use32bit execution settings

    ```


    The query results match our metadata configuration precisely, as shown in Figure
    [25-41](#449652_2_En_25_Chapter.xhtml#Fig41):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig41_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig41_HTML.jpg)


    Figure 25-41


    Use32bit metadata in action


    Finally, analyze the application of Logging Level metadata – denoted in the blue
    box in Figure [25-40](#449652_2_En_25_Chapter.xhtml#Fig40). Click on each execution’s
    Overview report to view the Parameters Used tablix. The author edited the image
    for Figure [25-42](#449652_2_En_25_Chapter.xhtml#Fig42) to get some of the Execution
    Information legible and in the same screenshot as the Parameters Used tablix:


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig42_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig42_HTML.jpg)


    Figure 25-42


    View Parameters Used on the overview report


    Note the LOGGING_LEVEL execution parameter was set to 2 for this execution of
    the ReportParameterAndSucceed.dtsx SSIS package. SSIS Catalog Logging Levels are
    an enumeration:


    *   0: None


    *   1: Basic


    *   2: Performance


    *   3: Verbose


    *   4: RuntimeLineage


    SSIS Catalog users may also create custom logging levels, provided they have the
    proper SSIS Catalog permissions.


    Note also that one can view the SYNCHRONIZED execution parameter value for this
    execution of the ReportParameterAndSucceed.dtsx SSIS package, shown in Figure
    [25-42](#449652_2_En_25_Chapter.xhtml#Fig42). Both execution parameters match
    the metadata configuration in Figure [25-40](#449652_2_En_25_Chapter.xhtml#Fig40).


    This analysis, cursory though it may be, reveals our framework is working as designed.


    ## Conclusion


    In this chapter, we tested Execute Catalog Package Task functionality in an Azure
    Data Factory Azure-SSIS integration runtime by


    *   Deploying TestSSISProject to the SSIS Catalog hosted on the Azure SQL DB provisioned
    in the previous chapter


    *   Deploying the ECPTFramework SSIS project


    *   Lifting and shifting framework metadata to an Azure SQL DB other than SSISDB


    *   Deploying the ECPTFramework SSIS project


    *   Testing execution of the SSIS framework’s Parent.dtsx package


    If all went as planned, we achieved the results recorded in this chapter.


    Next, the author examines some lessons learned during the development of the Execute
    Catalog Package Task.


    # 26. Notes from My Experience


    While learning to build a custom SSIS task, I encountered elementary errors that
    I believe experienced .Net developers avoid. When I searched for solutions, I
    found very little help. The reason? I believe the issues I encountered are not
    typical for developers building solutions targeted at the Global Assembly Cache
    (GAC). When one begins developing in the controls space, one is expected to *Just
    Know* certain things about .Net development.


    I did not know some of those things.


    What problems did I encounter, and what practices did I learn that should be done?
    The following sections highlight some of my learnings.'
  trans: '

    ### 雷德蒙德，我们遇到了一个问题


    存储过程 `xp_msver` 在本地 SQL Server 实例中可用。存储过程 `xp_msver` 在 Azure SQL 托管实例中可用。在撰写本文时，存储过程
    `xp_msver` 在 Azure SQL DB 实例中 ``不可`` 用。


    作者设计了一个解决方案，可能对您有用，也可能没用。然而，在撰写本文时，向 `SSISDB` 数据库添加一个名为 `xp_msver` 的存储过程可以解决此情况。连接到
    `SSISDB` 数据库并执行清单 25-8 中的代码以创建 `xp_msver` 存储过程：


    ```sql

    Create or Alter Procedure xp_msver

    @arg sql_variant = N''Platform''

    ,@index int = 4 output

    ,@name nvarchar(25) = N''Platform'' output

    ,@internalvalue int = NULL output

    ,@charvalue nvarchar(25) = N''NT x64'' output

    As

    Select @index = 4

    , @name = N''Platform''

    , @internalvalue = NULL

    , @charvalue = N''NT x64''

    go

    清单 25-8

    将 xp_msver 存储过程添加到 SSISDB 数据库

    ```


    部署 `xp_msver` 存储过程后，像之前一样重新执行 `Parent.dtsx` SSIS 包，如图 25-34 和 25-35 所示。刷新 SSIS
    目录的“所有执行”报告以查看此执行的结果，如图 25-38 所示：


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig38_HTML.jpg](img/449652_2_En_25_Fig38_HTML.jpg)

    *图 25-38 框架应用程序执行成功*


    下一步是分析我们的测试结果。


    ### 分析结果


    比较元数据配置将让我们知道测试是否真的成功。元数据配置可以通过执行 `Parent.dtsx` 包中“SQL Get Application Packages”的查询来获取，并在清单
    25-9 中展示——稍作修改以提供 `@ApplicationName` 参数值：


    ```sql

    Select p.FolderName

    , p.ProjectName

    , p.PackageName

    , Convert(bit, ap.Synchronized) As Synchronized

    , ap.MaximumRetries

    , ap.RetryIntervalSeconds

    , Convert(bit, ap.Use32bit) As Use32bit

    , ap.LoggingLevel

    From fw.ApplicationPackages ap

    Join fw.Applications a

    On a.ApplicationId = ap.ApplicationId

    Join fw.Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = N''Framework Test'' -- @ApplicationName

    Order By ap.ExecutionOrder

    清单 25-9

    SSISFramework 元数据

    ```


    粘贴到 SSMS 中时，查询如图 25-39 所示：


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig39_HTML.jpg](img/449652_2_En_25_Fig39_HTML.jpg)

    *图 25-39 来自 SSISFramework 数据库的框架元数据*


    执行时，查询结果如图 25-40 所示：


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig40_HTML.jpg](img/449652_2_En_25_Fig40_HTML.jpg)

    *图 25-40 元数据查询结果*


    比较图 25-38 和 25-40 中标记为“1”的项目，我们注意到第二个 SSIS 包（`ReportParameterAndSucceed.dtsx`）的执行，`Synchronized`
    被配置为 `0` —— 即 false。由于第一个 SSIS 包 `ReportAndSucceed.dtsx` 配置为同步运行，第二个 SSIS 包和第三个
    SSIS 包（`RunForSomeTime.dtsx`）应该在“执行目录包任务”能够启动它们时立即启动。这正是我们在图 25-38 中看到的情况；`RunForSomeTime.dtsx`
    在 `ReportParameterAndSucceed.dtsx` 开始执行后 4 秒启动。


    您还可以看到 `RunForSomeTime.dtsx` 的执行 ``不`` 等待 `ReportParameterAndSucceed.dtsx` 执行完成。`ReportParameterAndSucceed.dtsx`
    执行了近 13 秒（参见“持续时间”列）。


    接下来，我们将分析转向 `Use32bit` 元数据 —— 在图 25-40 中用绿色框标出。SQL Server Management Studio 中内置的
    SSIS 目录报告非常棒。还有其他查看数据的方式。使用清单 25-10 中的 T-SQL 查看 `Use32bit` 元数据的使用情况。


    ```sql

    Select execution_id

    , folder_name

    , project_name

    , package_name

    , use32bitruntime

    From [catalog].executions

    Where execution_id >= 10 /* ReportAndSucceed.dtsx execution_id */

    Order By execution_id Desc

    清单 25-10

    查看 Use32bit 执行设置

    ```


    查询结果与我们的元数据配置完全匹配，如图 25-41 所示：


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig41_HTML.jpg](img/449652_2_En_25_Fig41_HTML.jpg)

    *图 25-41 实际应用中的 Use32bit 元数据*


    最后，分析 `Logging Level` 元数据的应用 —— 在图 25-40 中用蓝色框标出。点击每个执行的“概述”报告以查看“使用的参数”表格。作者编辑了图
    25-42 的图像，使部分“执行信息”清晰可读，并与“使用的参数”表格处于同一截图中：


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig42_HTML.jpg](img/449652_2_En_25_Fig42_HTML.jpg)

    *图 25-42 在概述报告中查看使用的参数*


    请注意，对于此次 `ReportParameterAndSucceed.dtsx` SSIS 包的执行，`LOGGING_LEVEL` 执行参数被设置为 `2`。SSIS
    目录日志级别是一个枚举：


    *   `0`: 无

    *   `1`: 基本

    *   `2`: 性能

    *   `3`: 详细

    *   `4`: 运行时谱系


    SSIS 目录用户也可以创建自定义日志级别，前提是他们拥有适当的 SSIS 目录权限。


    另请注意，可以查看此 `ReportParameterAndSucceed.dtsx` SSIS 包执行的 `SYNCHRONIZED` 执行参数值，如图
    25-42 所示。这两个执行参数都与图 25-40 中的元数据配置相匹配。


    尽管这个分析可能比较粗略，但它揭示了我们的框架正按设计运行。


    ### 结论


    在本章中，我们在 Azure Data Factory 的 Azure-SSIS 集成运行时中测试了“执行目录包任务”功能，方法包括：


    *   将 `TestSSISProject` 部署到前一章配置的 Azure SQL DB 上托管的 SSIS 目录

    *   部署 `ECPTFramework` SSIS 项目

    *   将框架元数据迁移到 `SSISDB` 以外的 Azure SQL DB

    *   部署 `ECPTFramework` SSIS 项目

    *   测试 SSIS 框架的 `Parent.dtsx` 包的执行


    如果一切按计划进行，我们便实现了本章记录的结果。


    接下来，作者将审视在开发“执行目录包任务”过程中获得的一些经验教训。


    # 26. 来自我的经验笔记


    在学习构建自定义 SSIS 任务的过程中，我遇到了一些基础错误，我相信有经验的 .Net 开发者会避免这些错误。当我搜索解决方案时，我发现能得到的帮助非常少。原因是什么？我相信我遇到的问题对于开发针对全局程序集缓存（GAC）的解决方案的开发者来说并不典型。当一个人开始在控件空间进行开发时，通常被认为应该*已经知道*
    .Net 开发的某些事情。


    我当时并不知道其中一些事情。


    我遇到了哪些问题，以及我学到了哪些应该遵循的最佳实践？以下部分重点介绍了一些我的心得。

    '
- fmt: '## Start Visual Studio as an Administrator


    You want to be able to build to system folders. To build to system folders, you
    need to start Visual Studio as an administrator. When you open Visual Studio,
    right-click the Visual Studio tile, and then click the “Run as administrator”
    as shown in Figure [26-1](#449652_2_En_26_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_26_Chapter/449652_2_En_26_Fig1_HTML.jpg](images/449652_2_En_26_Chapter/449652_2_En_26_Fig1_HTML.jpg)


    Figure 26-1: Run Visual Studio as Administrator


    When you click Run Visual Studio as Administrator, you will be prompted to confirm
    you wish to run Visual Studio as shown in Figure [26-2](#449652_2_En_26_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_26_Chapter/449652_2_En_26_Fig2_HTML.jpg](images/449652_2_En_26_Chapter/449652_2_En_26_Fig2_HTML.jpg)


    Figure 26-2: Confirm you really want to run Visual Studio as Administrator


    The reason to run Visual Studio as Administrator is to save the additional step
    of copying the DLL assemblies from the `bin\Debug` folder to the `…DTS\Tasks`
    folder. You need the DLLs in the `Tasks` folder so SQL Server Data Tools can locate
    (and load) them for SSIS development. You need the DLLs in the GAC so SSIS can
    utilize them at runtime.


    ## Learn How to Recover


    Backups are useless. Recoveries are priceless. Start with a recovery strategy.
    Ask yourself, “Self, if something tragic happens, how will I get back to Square
    One?” Answer that question early. You’ll be glad you did.


    ### Build a Notes File


    You can configure post-build events in Visual Studio Community Edition when building
    Visual Basic or C# applications. Building a Notes file helped make us familiar
    with the Tools, though. I’m glad we took this approach. My Notes file holds commands
    to unregister and register my DLLs in the GAC, along with key-generation commands
    for building public/private key pairs using the Strong Name utility. As of the
    end of this project, my Notes file appears as shown in Listing [26-1](#449652_2_En_26_Chapter.xhtml#PC1):


    ```

    -- key generation

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
    -k key.snk

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
    -p key.snk public.out

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
    -t public.out

    -- register

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\gacutil.exe"
    -if "E:\Program Files (x86)\Microsoft SQL Server\150\DTS\Tasks\ExecuteCatalogPackageTask.dll"

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\gacutil.exe"
    -if "E:\Program Files (x86)\Microsoft SQL Server\150\DTS\Tasks\ExecuteCatalogPackageTaskUI.dll"

    -- unregister

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\gacutil.exe"
    -u ExecuteCatalogPackageTask

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\gacutil.exe"
    -u ExecuteCatalogPackageTaskUI

    Listing 26-1: Notes

    ```


    ### Cleaning the Solution


    Cleaning the solution is the other step in my four-step recovery process outlined
    in the following synopsis. When something goes wrong:


    1.  Unregister the assemblies from the GAC.

    2.  Clean the solution.

    3.  Correct the issue in the code and Build the solution.

    4.  Register the assemblies in the GAC.


    We configure the Build properties of our assemblies to output our DLLs to the
    `DTS\Tasks` system folder. We configured build events in our project properties
    to manage unregistering and registering our build output files in the GAC. We
    were able to accomplish all this because we chose C# and not Visual Basic for
    our development language.


    ## Change the Icon File’s Build Action Property


    This particular issue stumped me for ____ (I am embarrassed to say how long, but
    it was `too` long). You will want to change your icon file’s Build Action property
    to be `Embedded Resource`. Only after this update will your task icon display
    the SSIS Toolbox.


    By default, the file’s Build Action property will be `Content`. Change it to `Embedded
    Resource` as shown in Figure [26-3](#449652_2_En_26_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_26_Chapter/449652_2_En_26_Fig3_HTML.jpg](images/449652_2_En_26_Chapter/449652_2_En_26_Fig3_HTML.jpg)


    Figure 26-3: Changing the icon file Build Action


    This is important. If you do not change the Build Action property of the icon
    file from `Content` to `Embedded Resource`, the icon will `not` show up on your
    task.


    ## Engineering a Solution for the PackageInfo.Execute Timeout


    I was nearing the end of `ExecuteCatalogPackageTask` development when I encountered
    a “feature” of the `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo`‘s
    `Execute` method: It times out at 30 seconds. At the time of this writing, I remain
    uncertain why the timeout exists. I suspect there may be a very good reason, of
    which (again) I am simply unaware.


    A chapter in this book is dedicated to working around the timeout logic using
    the threading functionality developed to build threadsafe multi-threading applications.


    ## Engineering a Solution for the Missing xp_msver in Azure SQL DB


    I was building the last demo of the last coding chapter for `ExecuteCatalogPackageTask`
    development when I discovered:


    1.  `xp_msver` is missing from Azure SQL DB.

    2.  `xp_msver` is called by the `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo`‘s
    `Execute` method after the package execution completes.


    Please find the solution in Chapter [25](#449652_2_En_25_Chapter.xhtml).


    ## Read the Azure-SSIS Custom Task Installation Log


    The best way to know the status of the installation of your custom task is to
    read the installation log file, especially the path you provide the `main.cmd`
    file. This is covered in Chapter [24](#449652_2_En_24_Chapter.xhtml), but I confess
    I did not understand the importance of this file until I had wasted days trying
    to figure out why the `ExecuteCatalogPackageTask` msi was not properly installing.


    The line you want to read is near the bottom. It’s a long line and you want the
    last sentence to read, “Installation success or error status: 0.”


    Learn more in Chapter [24](#449652_2_En_24_Chapter.xhtml).


    ## There Are Bugs in the Code


    Every effort was made to ensure all the bugs were found and addressed, and these
    efforts were mostly successful. Please send bug reports to andy.leonard@entdna.com.


    ## Azure Will Change


    During the writing of this book, Azure-SSIS changed, and some of those changes
    impacted the `Execute Catalog Package Task` code.


    Azure-SSIS will continue to change.


    Some of those changes will impact the efficacy of the code in this book. From
    years of personal experience, I can assure you Azure will never change back. Instead,
    `you` will have to change any code you write that runs against Azure.


    ## Obtain Source Code


    The source code for this book may be obtained at `Apress.com` by following the
    link from the book’s catalog page on that sight. You may also find the example
    code at my GitHub site at `github.com/aleonard763/ExecuteCatalogPackageTask`.


    ## Final Thoughts


    As discussed at the outset of this book, I am not a C# developer. I am certain
    many readers who made it this far in the book have taken a look at the code and
    thought, “There’s a better way to write that.” I did not set out to inspire cringes.
    I set out to share one way to build a custom SSIS task using C#, and my target
    audience was SSIS developers.


    I welcome feedback and suggestions. You may reach me at `andy.leonard@EntDNA.com`.'
