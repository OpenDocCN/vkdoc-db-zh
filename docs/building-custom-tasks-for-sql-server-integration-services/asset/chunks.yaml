- fmt: '## The Controller SSIS Design Pattern


    Orchestration is a complex topic in data engineering. Workflow management is easy
    to underestimate. In the introduction to this chapter, we find one such example:
    The `Execute Catalog Package Task` supports *starting nearly parallel* SSIS package
    executions. The emphases in the previous sentence underscore orchestration challenges.


    When designing for parallelism, most SSIS developers are more concerned with *virtual
    steps*. A virtual step is a collection of operations that execute as a block (or
    step). Most often, the next step starts after *all* operations in the previous
    step *complete*. Another way to think about this kind of workflow management is:
    The next step doesn’t start until the last operation in the previous step completes.
    Please note we are not considering the execution status, which multiplies the
    complexity of any metadata solution.


    The Controller SSIS design pattern is one solution for managing workflow.


    ### Configuration Steps


    Begin by adding a new SSIS package to a new SSIS project named `ECPTFramework`.
    Rename the new SSIS package `ECPTController.dtsx`, as shown in Figure [23-1](#449652_2_En_23_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig1_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig1_HTML.jpg)


    *Figure 23-1: Adding the `ECPTController.dtsx` SSIS package*


    Add two `Sequence Container`s to the control flow. Name the first `SEQ Step 1`
    and the second `SEQ Step 2`. Add an `Execute Catalog Package Task` to `SEQ Step
    1`, and rename it `ECPT Execute ReportAndSucceed`. Configure `ECPT Execute ReportAndSucceed`
    to execute the `ReportAndSucceed.dtsx` SSIS package synchronously, as shown in
    Figure [23-2](#449652_2_En_23_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig2_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig2_HTML.jpg)


    *Figure 23-2: Configuring `ReportAndSucceed` execution*


    Add another `Execute Catalog Package Task` to `SEQ Step 1` and rename it `ECPT
    Execute RunForSomeTime`. Configure `ECPT Execute RunForSomeTime` to execute the
    `ECPT Execute RunForSomeTime.dtsx` SSIS package synchronously, as shown in Figure
    [23-3](#449652_2_En_23_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig3_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig3_HTML.jpg)


    *Figure 23-3: Configuring `RunForSomeTime` execution*


    Add an `Execute Catalog Package Task` to `SEQ Step 2` and rename it `ECPT Execute
    <*Some other package*>`. Configure `ECPT Execute <*Some other package*>` to execute
    any SSIS package asynchronously, as shown in Figure [23-4](#449652_2_En_23_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig4_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig4_HTML.jpg)


    *Figure 23-4: Configuring any other SSIS package for execution*


    Use a precedence constraint to connect `SEQ Step 1` to `SEQ Step 2`, as shown
    in Figure [23-5](#449652_2_En_23_Chapter.xhtml#Fig5):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig5_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig5_HTML.jpg)


    *Figure 23-5: The Controller, configured*


    ### Execution and Observation


    Execute the Controller SSIS package and note the (virtual) steps of execution.
    The first step is `ECPT Execute ReportAndSucceed` and `ECPT Execute RunForSomeTime`
    starting in parallel in `SEQ Step 1`, as shown in Figure [23-6](#449652_2_En_23_Chapter.xhtml#Fig6):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig6_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig6_HTML.jpg)


    *Figure 23-6: Virtual step 1*


    When `ECPT Execute ReportAndSucceed` completes and succeeds, `ECPT Execute RunForSomeTime`
    continues executing, as shown in Figure [23-7](#449652_2_En_23_Chapter.xhtml#Fig7):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig7_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig7_HTML.jpg)


    *Figure 23-7: Virtual step 2*


    The execution of the `ECPT Execute Child1 Execute Catalog Package Task` – nestled
    inside `SEQ Step 2` in my example – does not *start* executing until *all* tasks
    in `SEQ Step 1` *complete*, as shown in Figure [23-8](#449652_2_En_23_Chapter.xhtml#Fig8):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig8_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig8_HTML.jpg)


    *Figure 23-8: The Controller, execution complete*


    When SSIS developers consider executing SSIS packages in parallel, they most often
    imagine Controller functionality; starting the next virtual step after the previous
    virtual step has completed execution.


    ## A Metadata-Driven SSIS Execution Framework


    An SSIS framework has three functions:


    1.  Configuration

    2.  Execution

    3.  Logging


    By this definition, the SSIS Catalog is an SSIS framework.


    Why use a framework? As stated in the *SQL Server Data Automation Through Frameworks*
    book:


    > “Executing a few dozen SSIS packages is different – really different – from
    managing the execution of thousands of SSIS packages. Don’t take my word for it,
    ask any data engineer managing a larger enterprise.”


    If your enterprise uses only a few SSIS packages, a framework is most likely unnecessary
    overhead. If, however, your enterprise executes hundreds or thousands of SSIS
    packages per day, an SSIS framework is a *necessity*.


    This framework focuses on execution, but you could add logging using the framework
    Kent and I describe in the book titled *SQL Server Data Automation Through Frameworks:
    Building Metadata-Driven Frameworks with T-SQL, SSIS, and Azure Data Factory*
    (amazon.com/Server-Data-Automation-Through-Frameworks/dp/1484262123).


    We begin by defining an *SSIS application* as a collection of SSIS packages that
    execute as a group. In order to execute a group of SSIS packages, the framework
    requires SSIS package location metadata. The cardinality between applications
    and packages appears simple – one-to-one – until we consider use cases such as
    a package that archives flat files after their data is loaded.


    In SSIS projects designed for the SSIS Catalog, developers may use the `Execute
    Package Task` to call additional SSIS packages, but there’s a catch: The child
    package called by the `Execute Package Task` must reside in the same SSIS project
    as the (parent) package *calling* the child package. Applied to a package designed
    to archive files, this constraint means the same SSIS package – `ArchiveFile.dtsx`,
    for example – must be imported into every SSIS project that will call `ArchiveFile.dtsx`.
    Copying the same code over and over is not prudent. A better solution is to build
    one version of the `ArchiveFile.dtsx` package and deploy it to the SSIS Catalog
    and then execute `ArchiveFile.dtsx` from that single location whenever it is time
    to archive a file. If there are multiple copies of `ArchiveFile.dtsx` spread around
    the enterprise (or even a single SSIS Catalog), how do developers add functionality?
    Or fix a bug? It can be done, but it’s messy and horribly inefficient.


    Because SSIS packages like `ArchiveFile.dtsx` exist, the SSIS application-to-SSIS
    package cardinality is many-to-many. Our framework solution is 3rd normal form,
    so it requires a bridge (or resolver) table. Our bridge table is *application
    packages*.'
  raw: '## The Controller SSIS Design Pattern


    Orchestration is a complex topic in data engineering. Workflow management is easy
    to underestimate. In the introduction to this chapter, we find one such example:
    The Execute Catalog Package Task supports *starting nearly parallel* SSIS package
    executions. The emphases in the previous sentence underscore orchestration challenges.


    When designing for parallelism, most SSIS developers are more concerned with *virtual
    steps*. A virtual step is a collection of operations that execute as a block (or
    step). Most often, the next step starts after *all* operations in the previous
    step *complete*. Another way to think about this kind of workflow management is:
    The next step doesn’t start until the last operation in the previous step completes.
    Please note we are not considering the execution status, which multiplies the
    complexity of any metadata solution.


    The Controller SSIS design pattern is one solution for managing workflow.


    Begin by adding a new SSIS package to a new SSIS project named ECPTFramework.
    Rename the new SSIS package “ECPTController.dtsx,” as shown in Figure [23-1](#449652_2_En_23_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig1_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig1_HTML.jpg)


    Figure 23-1


    Adding the ECPTController.dtsx SSIS package


    Add two Sequence Containers to the control flow. Name the first “SEQ Step 1” and
    the second “SEQ Step 2.” Add an Execute Catalog Package Task to SEQ Step 1, and
    rename it “ECPT Execute ReportAndSucceed.” Configure ECPT Execute ReportAndSucceed
    to execute the ReportAndSucceed.dtsx SSIS package synchronously, as shown in Figure
    [23-2](#449652_2_En_23_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig2_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig2_HTML.jpg)


    Figure 23-2


    Configuring ReportAndSucceed execution


    Add another Execute Catalog Package Task to SEQ Step 1 and rename it “ECPT Execute
    RunForSomeTime.” Configure ECPT Execute RunForSomeTime to execute the ECPT Execute
    RunForSomeTime.dtsx SSIS package synchronously, as shown in Figure [23-3](#449652_2_En_23_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig3_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig3_HTML.jpg)


    Figure 23-3


    Configuring RunForSomeTime execution


    Add an Execute Catalog Package Task to SEQ Step 2 and rename it “ECPT Execute
    <*Some other package*>.” Configure ECPT Execute <*Some other package*> to execute
    any SSIS package asynchronously, as shown in Figure [23-4](#449652_2_En_23_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig4_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig4_HTML.jpg)


    Figure 23-4


    Configuring any other SSIS package for execution


    Use a precedence constraint to connect SEQ Step 1 to SEQ Step 2, as shown in Figure
    [23-5](#449652_2_En_23_Chapter.xhtml#Fig5):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig5_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig5_HTML.jpg)


    Figure 23-5


    The Controller, configured


    Execute the Controller SSIS package and note the (virtual) steps of execution.
    The first step is ECPT Execute ReportAndSucceed and ECPT Execute RunForSomeTime
    starting in parallel in SEQ Step 1, as shown in Figure [23-6](#449652_2_En_23_Chapter.xhtml#Fig6):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig6_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig6_HTML.jpg)


    Figure 23-6


    Virtual step 1


    When ECPT Execute ReportAndSucceed completes and succeeds, ECPT Execute RunForSomeTime
    continues executing, as shown in Figure [23-7](#449652_2_En_23_Chapter.xhtml#Fig7):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig7_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig7_HTML.jpg)


    Figure 23-7


    Virtual step 2


    The execution of the ECPT Execute Child1 Execute Catalog Package Task – nestled
    inside SEQ Step 2 in my example – does not *start* executing until *all* tasks
    in SEQ Step 1 *complete*, as shown in Figure [23-8](#449652_2_En_23_Chapter.xhtml#Fig8):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig8_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig8_HTML.jpg)


    Figure 23-8


    The Controller, execution complete


    When SSIS developers consider executing SSIS packages in parallel, they most often
    imagine Controller functionality; starting the next virtual step after the previous
    virtual step has completed execution.


    ## A Metadata-Driven SSIS Execution Framework


    An SSIS framework has three functions:


    1.  Configuration


    2.  Execution


    3.  Logging


    By this definition, the SSIS Catalog is an SSIS framework.


    Why use a framework? As stated in the *SQL Server Data Automation Through Frameworks*
    book:


    “Executing a few dozen SSIS packages is different – really different – from managing
    the execution of thousands of SSIS packages. Don’t take my word for it, ask any
    data engineer managing a larger enterprise.” If your enterprise uses only a few
    SSIS packages, a framework is most likely unnecessary overhead. If, however, your
    enterprise executes hundreds or thousands of SSIS packages per day, an SSIS framework
    is a *necessity*.


    This framework focuses on execution, but you could add logging using the framework
    Kent and I describe in the book titled *SQL Server Data Automation Through Frameworks:
    Building Metadata-Driven Frameworks with T-SQL, SSIS, and Azure Data Factory*
    (amazon.com/Server-Data-Automation-Through-Frameworks/dp/1484262123).


    We begin by defining an *SSIS application* as a collection of SSIS packages that
    execute as a group. In order to execute a group of SSIS packages, the framework
    requires SSIS package location metadata. The cardinality between applications
    and packages appears simple – one-to-one – until we consider use cases such as
    a package that archives flat files after their data is loaded.


    In SSIS projects designed for the SSIS Catalog, developers may use the Execute
    Package Task to call additional SSIS packages, but there’s a catch: The child
    package called by the Execute Package Task must reside in the same SSIS project
    as the (parent) package *calling* the child package. Applied to a package designed
    to archive files, this constraint means the same SSIS package – “ArchiveFile.dtsx,”
    for example – must be imported into every SSIS project that will call ArchiveFile.dtsx.
    Copying the same code over and over is not prudent. A better solution is to build
    one version of the ArchiveFile.dtsx package and deploy it to the SSIS Catalog
    and then execute ArchiveFile.dtsx from that single location whenever it is time
    to archive a file. If there are multiple copies of ArchiveFile.dtsx spread around
    the enterprise (or even a single SSIS Catalog), how do developers add functionality?
    Or fix a bug? It can be done, but it’s messy and horribly inefficient.


    Because SSIS packages like ArchiveFile.dtsx exist, the SSIS application-to-SSIS
    package cardinality is many-to-many. Our framework solution is 3rd normal form,
    so it requires a bridge (or resolver) table. Our bridge table is *application
    packages*.'
  trans: '

    ## 控制器 SSIS 设计模式


    编排是数据工程中的一个复杂主题。工作流管理很容易被低估。在本章引言中，我们找到了一个这样的例子：`执行目录包任务` 支持 *近乎并行地启动* SSIS 包执行。前一句中的强调凸显了编排的挑战。


    在设计并行性时，大多数 SSIS 开发人员更关注 *虚拟步骤*。虚拟步骤是一组作为一个块（或步骤）执行的操作。大多数情况下，下一步骤在前一步骤中的 *所有*
    操作 *完成后* 才开始。思考这种工作流管理的另一种方式是：直到前一步骤的最后一个操作完成，下一步骤才开始。请注意，我们并没有考虑执行状态，这使任何元数据解决方案的复杂性成倍增加。


    控制器 SSIS 设计模式是管理工作流的一种解决方案。


    ### 配置步骤


    首先，向名为 `ECPTFramework` 的新 SSIS 项目添加一个新的 SSIS 包。将新 SSIS 包重命名为 `ECPTController.dtsx`，如图
    23-1 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig1_HTML.jpg](img/449652_2_En_23_Fig1_HTML.jpg)


    *图 23-1：添加 `ECPTController.dtsx` SSIS 包*


    向控制流添加两个 `序列容器`。将第一个命名为 `SEQ 步骤 1`，第二个命名为 `SEQ 步骤 2`。向 `SEQ 步骤 1` 添加一个 `执行目录包任务`，并将其重命名为
    `ECPT 执行 ReportAndSucceed`。配置 `ECPT 执行 ReportAndSucceed` 以同步执行 `ReportAndSucceed.dtsx`
    SSIS 包，如图 23-2 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig2_HTML.jpg](img/449652_2_En_23_Fig2_HTML.jpg)


    *图 23-2：配置 `ReportAndSucceed` 执行*


    向 `SEQ 步骤 1` 添加另一个 `执行目录包任务` 并将其重命名为 `ECPT 执行 RunForSomeTime`。配置 `ECPT 执行 RunForSomeTime`
    以同步执行 `ECPT 执行 RunForSomeTime.dtsx` SSIS 包，如图 23-3 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig3_HTML.jpg](img/449652_2_En_23_Fig3_HTML.jpg)


    *图 23-3：配置 `RunForSomeTime` 执行*


    向 `SEQ 步骤 2` 添加一个 `执行目录包任务` 并将其重命名为 `ECPT 执行 <*某个其他包*>`。配置 `ECPT 执行 <*某个其他包*>`
    以异步执行任何 SSIS 包，如图 23-4 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig4_HTML.jpg](img/449652_2_En_23_Fig4_HTML.jpg)


    *图 23-4：配置任何其他 SSIS 包以供执行*


    使用优先约束将 `SEQ 步骤 1` 连接到 `SEQ 步骤 2`，如图 23-5 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig5_HTML.jpg](img/449652_2_En_23_Fig5_HTML.jpg)


    *图 23-5：已配置的控制器*


    ### 执行与观察


    执行控制器 SSIS 包，并注意执行的（虚拟）步骤。第一步是 `ECPT 执行 ReportAndSucceed` 和 `ECPT 执行 RunForSomeTime`
    在 `SEQ 步骤 1` 中并行开始，如图 23-6 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig6_HTML.jpg](img/449652_2_En_23_Fig6_HTML.jpg)


    *图 23-6：虚拟步骤 1*


    当 `ECPT 执行 ReportAndSucceed` 完成并成功时，`ECPT 执行 RunForSomeTime` 继续执行，如图 23-7 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig7_HTML.jpg](img/449652_2_En_23_Fig7_HTML.jpg)


    *图 23-7：虚拟步骤 2*


    在我的示例中，嵌套在 `SEQ 步骤 2` 内的 `ECPT 执行 Child1 执行目录包任务` 的执行，直到 `SEQ 步骤 1` 中的所有任务都 *完成后*
    才 *开始*，如图 23-8 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig8_HTML.jpg](img/449652_2_En_23_Fig8_HTML.jpg)


    *图 23-8：控制器，执行完成*


    当 SSIS 开发人员考虑并行执行 SSIS 包时，他们最常想象的就是控制器功能：在前一个虚拟步骤完成执行后，启动下一个虚拟步骤。


    ## 一个元数据驱动的 SSIS 执行框架


    一个 SSIS 框架有三个功能：


    1.  配置

    2.  执行

    3.  日志记录


    根据此定义，SSIS 目录本身就是一个 SSIS 框架。


    为什么要使用框架？正如 *通过框架实现 SQL Server 数据自动化* 一书中所述：


    > “执行几十个 SSIS 包是不同的——真的非常不同——与管理数千个 SSIS 包的执行相比。不要只听我说，去问问任何管理着大型企业的数据工程师。”


    如果你的企业只使用少数几个 SSIS 包，框架很可能就是不必要的开销。然而，如果你的企业每天执行数百或数千个 SSIS 包，那么一个 SSIS 框架就是 *必需品*。


    此框架侧重于执行，但你可以使用 Kent 和我在 *通过框架实现 SQL Server 数据自动化：使用 T-SQL、SSIS 和 Azure 数据工厂构建元数据驱动框架*（amazon.com/Server-Data-Automation-Through-Frameworks/dp/1484262123）一书中描述的框架来添加日志记录。


    我们首先将 *SSIS 应用程序* 定义为作为一个组执行的一组 SSIS 包。为了执行一组 SSIS 包，框架需要 SSIS 包位置元数据。应用程序与包之间的基数关系看起来很简单——一对一——直到我们考虑到诸如在数据加载后归档平面文件的包这样的用例。


    在专为 SSIS 目录设计的 SSIS 项目中，开发人员可以使用 `执行包任务` 来调用额外的 SSIS 包，但有一个陷阱：`执行包任务` 调用的子包必须与
    *调用* 该子包的（父）包位于同一个 SSIS 项目中。应用于旨在归档文件的包时，此约束意味着同一个 SSIS 包——例如 `ArchiveFile.dtsx`——必须被导入到每一个将要调用
    `ArchiveFile.dtsx` 的 SSIS 项目中。一遍又一遍地复制相同的代码是不明智的。更好的解决方案是构建一个版本的 `ArchiveFile.dtsx`
    包，将其部署到 SSIS 目录，然后在需要归档文件时从该单一位置执行 `ArchiveFile.dtsx`。如果 `ArchiveFile.dtsx` 有多个副本分散在企业（甚至是单个
    SSIS 目录）中，开发人员如何添加功能？或者修复一个 bug？虽然可以做到，但这很混乱且效率极低。


    因为存在像 `ArchiveFile.dtsx` 这样的 SSIS 包，所以 SSIS 应用程序与 SSIS 包之间的基数关系是多对多的。我们的框架解决方案是第三范式，因此需要一个桥接（或解析器）表。我们的桥接表就是
    *应用程序包*。

    '
- fmt: '# Adding Metadata Database Objects


    To start building this SSIS framework, connect to a SQL Server instance with an
    SSIS Catalog configured. Add a schema named `fw` to the `SSISDB` database using
    the T-SQL in Listing 23-1:


    ```sql

    Use SSISDB

    Go

    print ''Fw schema''

    If Not Exists(Select s.[name]

    From [sys].[schemas] s

    Where s.[name] = N''fw'')

    begin

    print '' - Create fw schema''

    declare @sql varchar(30) = ''Create schema fw''

    exec(@sql)

    print '' - Fw schema created''

    end

    Else

    begin

    print '' - Fw schema already exists.''

    end

    go

    ```

    **Listing 23-1** Adding the fw schema


    When executed (the first time), the Messages tab displays as shown in Figure 23-9:


    ![Creating the fw schema](images/449652_2_En_23_Chapter/449652_2_En_23_Fig9_HTML.jpg)


    **Figure 23-9** Creating the fw schema


    The T-SQL is idempotent, meaning the script may be executed multiple times and
    return the same result. Re-executing the T-SQL, the Messages tab displays as shown
    in Figure 23-10:


    ![Verifying the fw schema exists](images/449652_2_En_23_Chapter/449652_2_En_23_Fig10_HTML.jpg)


    **Figure 23-10** Verifying the fw schema exists


    Many T-SQL scripts in this chapter are idempotent.


    Next, build the `Applications` table in the `fw` schema using the T-SQL in Listing
    23-2:


    ```sql

    Use SSISDB

    go

    print ''Fw.Applications table''

    If Not Exists(Select s.[name] + ''.'' + t.[name]

    From [sys].[tables] t

    Join [sys].[schemas] s

    On s.[schema_id] = t.[schema_id]

    Where s.[name] = N''fw''

    And t.[name] = N''Applications'')

    begin

    print '' - Create fw.Applications table''

    Create Table fw.Applications

    (ApplicationId int identity(1, 1)

    Constraint PK_Applications Primary Key

    ,ApplicationName nvarchar(130) Not NULL)

    print '' - Fw.Applications table created''

    end

    Else

    begin

    print '' - Fw.Applications table already exists.''

    end

    go

    ```

    **Listing 23-2** Adding the fw.Applications table


    When executed (the first time), the Messages tab displays as shown in Figure 23-11:


    ![Creating the fw.Applications table](images/449652_2_En_23_Chapter/449652_2_En_23_Fig11_HTML.jpg)


    **Figure 23-11** Creating the fw.Applications table


    Add the `Packages` table using the T-SQL in Listing 23-3:


    ```sql

    Use SSISDB

    go

    print ''Fw.Packages table''

    If Not Exists(Select s.[name] + ''.'' + t.[name]

    From [sys].[tables] t

    Join [sys].[schemas] s

    On s.[schema_id] = t.[schema_id]

    Where s.[name] = N''fw''

    And t.[name] = N''Packages'')

    begin

    print '' - Create fw.Packages table''

    Create Table fw.Packages

    (PackageId int identity(1, 1)

    Constraint PK_Packages Primary Key

    ,FolderName nvarchar(130) Not NULL

    ,ProjectName nvarchar(130) Not NULL

    ,PackageName nvarchar(260) Not NULL)

    print '' - Fw.Packages table created''

    end

    Else

    begin

    print '' - Fw.Packages table already exists.''

    end

    go

    ```

    **Listing 23-3** Adding the Packages table


    When executed (the first time), the Messages tab displays as shown in Figure 23-12:


    ![Creating the fw.Packages table](images/449652_2_En_23_Chapter/449652_2_En_23_Fig12_HTML.jpg)


    **Figure 23-12** Creating the fw.Packages table


    Resolve the many-to-many cardinality between `Applications` and `Packages` by
    adding the `ApplicationPackages` table using the T-SQL in Listing 23-4:


    ```sql

    Use SSISDB

    go

    print ''Fw.ApplicationPackages table''

    If Not Exists(Select s.[name] + ''.'' + t.[name]

    From [sys].[tables] t

    Join [sys].[schemas] s

    On s.[schema_id] = t.[schema_id]

    Where s.[name] = N''fw''

    And t.[name] = N''ApplicationPackages'')

    begin

    print '' - Create fw.ApplicationPackages table''

    Create Table fw.ApplicationPackages

    (ApplicationPackageId int identity(1, 1)

    Constraint PK_ApplicationPackages Primary Key

    ,ApplicationId int Not NULL

    Constraint FK_ApplicationPackages_Applications

    Foreign Key References fw.Applications(ApplicationId)

    ,PackageId int Not NULL

    Constraint FK_ApplicationPackages_Packages

    Foreign Key References fw.Packages(PackageId)

    ,ExecutionOrder int Not NULL

    Constraint DF_ApplicationPackages_ExecutionOrder

    Default(10)

    ,Synchronized bit Not NULL

    Constraint DF_ApplicationPackages_Synchronized

    Default(1)

    ,MaximumRetries int Not NULL

    Constraint DF_ApplicationPackages_MaximumRetries

    Default(100)

    ,RetryIntervalSeconds int Not NULL

    Constraint DF_ApplicationPackages_RetryIntervalSeconds

    Default(10)

    ,Use32bit int Not NULL

    Constraint DF_ApplicationPackages_Use32bit

    Default(0)

    ,LoggingLevel nvarchar(25) Not NULL

    Constraint DF_ApplicationPackages_LoggingLevel

    Default(''Basic'')

    )

    print '' - Fw.ApplicationPackages table created''

    end

    Else

    begin

    print '' - Fw.ApplicationPackages table already exists.''

    end

    go

    ```

    **Listing 23-4** Adding the ApplicationPackages table


    When executed (the first time), the Messages tab displays as shown in Figure 23-13:


    ![Creating the fw.ApplicationPackages table](images/449652_2_En_23_Chapter/449652_2_En_23_Fig13_HTML.jpg)


    **Figure 23-13** Creating the fw.ApplicationPackages table


    The `ApplicationPackages` table contains several SSIS package execution settings
    available in the Execute Catalog Package Task. Why not add these attributes to
    the `Packages` table? Recall the same package may be used in multiple applications.
    It’s possible we may desire to execute `ArchiveFile.dtsx`, for example, synchronously
    in one application and asynchronously in another application. The same applies
    to the other attributes.'
