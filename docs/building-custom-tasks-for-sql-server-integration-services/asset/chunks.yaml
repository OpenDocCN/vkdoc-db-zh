    The Validate method should be overridden in our class. Later in this book, we
    will implement validation code in this method. At this juncture, the custom task
    is not production-ready. A production-ready custom SSIS task *should always* implement
    validation. For now, stub this method with a `DTSExecResult.Success` return value.


    Override the Validate method by adding the following function to our class:


    ```

    public override DTSExecResult Validate(

    Connections connections,

    VariableDispenser variableDispenser,

    IDTSComponentEvents componentEvents,

    IDTSLogging log)

    {

    return DTSExecResult.Success;

    }

    ```


    After adding this code, your class should appear similar to that shown in Figure
    [7-9](#449652_2_En_7_Chapter.xhtml#Fig9):


    ![../images/449652_2_En_7_Chapter/449652_2_En_7_Fig9_HTML.jpg](images/449652_2_En_7_Chapter/449652_2_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Overriding the Validate [function](http://1z049idasr93tofo34pmrt233.wpengine.netdna-cdn.com/wp-content/uploads/2012/12/OverridingValidate.jpg)


    The Validate method is called when the task is added to the SSIS Control Flow,
    when a property changes, and when a task is executed. The line `return DTSExecResult.Success`
    tells the method to return Success – which translates to “I think I am ready to
    run” in *Task-Speak* – to the Control Flow when the method is invoked.


    ## Overriding the Execute Method


    As with the Validate method, we override the inherited Execute method with a bare
    minimum of functionality. Again, this is not *yet* production-ready code.


    Add the Execute method override by adding the following code to the ExecuteCatalogPackageTask
    class:


    ```

    public override DTSExecResult Execute(

    Connections connections,

    VariableDispenser variableDispenser,

    IDTSComponentEvents componentEvents,

    IDTSLogging log,

    object transaction)

    {

    return DTSExecResult.Success

    }

    ```


    Altogether, your class should now contain three methods and resemble that shown
    in Figure [7-10](#449652_2_En_7_Chapter.xhtml#Fig10):


    ![../images/449652_2_En_7_Chapter/449652_2_En_7_Fig10_HTML.jpg](images/449652_2_En_7_Chapter/449652_2_En_7_Fig10_HTML.jpg)


    Figure 7-10


    Overriding Execute


    That is all we are going to code in this task at this time. We will add more code
    to these methods later in this book. The additional code will make this custom
    SSIS task more production-ready.


    ## Conclusion


    The project now contains the beginnings of custom task functionality.


    Now would be a good time to execute a commit and push to Azure DevOps.


    At this point in development, we have


    *   Created and configured an Azure DevOps project


    *   Connected Visual Studio to the Azure DevOps project


    *   Cloned the Azure DevOps Git repo locally


    *   Created a Visual Studio project


    *   Added a reference to the Visual Studio project


    *   Performed an initial check-in of the project code


    *   Signed the assembly


    *   Checked in an update


    *   Configured the build output path and build events


    *   Overridden three methods from the Task base class


    We are now ready to begin coding the task interface.


