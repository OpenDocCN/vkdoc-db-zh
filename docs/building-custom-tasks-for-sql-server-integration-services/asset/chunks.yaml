    }

    }

    }

    return foldersList;

    }

    清单 17-5

    填充 Folders 集合

    ```


    添加后，代码显示如图 17-6 所示：


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig6_HTML.jpg](img/449652_2_En_17_Fig6_HTML.jpg)


    图 17-6

    添加 `GetFoldersFromCatalog` 方法


