    ## Adding the LoggingLevel Property


    By default, SSIS packages executed in the SSIS Catalog execute with the Logging
    Level execution parameter set to *1* (Basic). Logging level is an enumeration
    of logging level name values that map to a list of integers. Do you smell something?
    I do. I smell another `TypeConverter` cooking…


    Depending on the version of the SSIS Catalog in use, an SSIS developer may encounter
    four to five built-in logging level settings, and – perhaps – many more custom-defined
    logging levels. And logging level may be configured as the SSIS Catalog default
    logging level, but nearly all SSIS developers agree setting the default Catalog
    logging level to Basic is a best practice. Logging level may be altered for any
    SSIS package execution.


    ### Building the LoggingLevel TypeConverter


    Before adding the `LoggingLevel` property to `SettingsNode`, we need to add another
    `TypeConverter` class . TypeConverters follow a pattern that includes one type-specific
    function named `GetSpecializedObject` and three overridden functions: `GetStandardValues`,
    `GetStandardValuesExclusive`, and `GetStandardValuesSupported`. Begin by adding
    the code in Listing [15-8](#449652_2_En_15_Chapter.xhtml#PC8) to the `SettingsNode`
    class:


    ```

    internal class LoggingLevels : StringConverter

    {

    private object GetSpecializedObject(object contextInstance)

    {

    DTSLocalizableTypeDescriptor typeDescr = contextInstance as DTSLocalizableTypeDescriptor;

    if (typeDescr == null)

    {

    return contextInstance;

    }

    return typeDescr.SelectedObject;

    }

    public override StandardValuesCollection GetStandardValues(ITypeDescriptorContext
    context)

    {

    object retrievalObject = GetSpecializedObject(context.Instance) as object;

    return new StandardValuesCollection(getLoggingLevels(retrievalObject));

    }

    public override bool GetStandardValuesExclusive(ITypeDescriptorContext context)

    {

    return true;

    }

    public override bool GetStandardValuesSupported(ITypeDescriptorContext context)

    {

    return true;

    }

    }

    Listing 15-8

    Adding the LoggingLevel TypeConverter (StringConverter)

    ```


    Once added, the `SettingsNode LoggingLevel` StringConverter code appears as shown
    in Figure [15-15](#449652_2_En_15_Chapter.xhtml#Fig15):


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig15_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig15_HTML.jpg)


    Figure 15-15


    The LoggingLevels StringConverter class


    All SSIS Catalog editions surface four logging levels:


    *   None (0)


    *   Basic (1)


    *   Performance (2)


    *   Verbose (3)


    In all versions of the SSIS Catalog, Basic (1) is the default logging level. Complete
    the `LoggingLevels StringConverter` class by adding the `getLoggingLevels` function
    code in Listing [15-9](#449652_2_En_15_Chapter.xhtml#PC9):


    ```

    private ArrayList getLoggingLevels(object retrievalObject)

    {

    ArrayList logLevelsArray = new ArrayList();

    logLevelsArray.Add("None");

    logLevelsArray.Add("Basic");

    logLevelsArray.Add("Performance");

    logLevelsArray.Add("Verbose");

    return logLevelsArray;

    }

    Listing 15-9

    Adding the getLoggingLevels function

    ```'
