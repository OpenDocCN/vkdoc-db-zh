  raw: '## Implementing a WaitHandle.WaitAny Method


    The heart of this `WaitHandle.WaitAny` -based solution for executing SSIS packages
    that take more than 30 seconds to execute with the `Synchronized` property set
    to true is to execute the SSIS package *asynchronously*. Executing the SSIS package
    asynchronously is, well, executing the SSIS package as if the `Synchronized` property
    set to *false*, so this method of executing the SSIS package will be invoked if
    and only if the `Synchronized` property is set to *true*.


    Begin implementing this `WaitHandle.WaitAny`-based solution by editing the `returnExecutionValueParameterSet`
    method in the `ExecuteCatalogPackageTask` class. While editing, add code to set
    the `CALLER_INFO` execution parameter using the code in Listing [19-3](#449652_2_En_19_Chapter.xhtml#PC3):


    ```

    private Collection returnExecutionValueParameterSet()

    {

    // initialize the parameters collection

    Collection executionValueParameterSet = new Collection();

    // set SYNCHRONIZED execution parameter

    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet

    {

    ObjectType = 50,

    ParameterName = "SYNCHRONIZED",

    ParameterValue = false // always execute with the Synchronized property false

    });

    // set LOGGING_LEVEL execution parameter

    int LoggingLevelValue = decodeLoggingLevel(LoggingLevel);

    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet

    {

    ObjectType = 50,

    ParameterName = "LOGGING_LEVEL",

    ParameterValue = LoggingLevelValue

    });

    // set CALLER_INFO execution parameter

    string machineName = Environment.MachineName.Replace(''"'', ''\'''').Replace("\\",
    "//");

    string userName = Environment.UserName;

    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet

    {

    ObjectType = 50,

    ParameterName = "CALLER_INFO",

    ParameterValue = machineName + "\\" + userName

    });

    return executionValueParameterSet;

    }

    Listing 19-3

    Editing the returnExecutionValueParameterSet method in ExecuteCatalogPackageTask

    ```


    Once edited, the `returnExecutionValueParameterSet` method appears as shown in
    Figure [19-15](#449652_2_En_19_Chapter.xhtml#Fig15):


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig15_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig15_HTML.jpg)


    Figure 19-15


    Editing the returnExecutionValueParameterSet method


    Continue implementing this `WaitHandle.WaitAny`-based solution by editing the
    `ExecuteCatalogPackageTask.Execute` method `catalogPackage.Execute` call by editing
    the call to `catalogPackage.Execute`, adding the code in Listing [19-4](#449652_2_En_19_Chapter.xhtml#PC4):


    ```

    long executionId = catalogPackage.Execute(Use32bit

    , null

    , executionValueParameterSet);

    if (Synchronized)

    {

    ManualResetEvent manualResetState = new ManualResetEvent(false);

    }

    Listing 19-4

    Checking for execution configured for Synchronized execution

    ```


    When added, the code appears as shown in Figure [19-16](#449652_2_En_19_Chapter.xhtml#Fig16):


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig16_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig16_HTML.jpg)


    Figure 19-16


    Implementing the WaitHandle.WaitAny-based solution


    Use Visual Studio Quick Actions to add the `using System.Threading;` directive
    by hovering over the ManualResetEvent type declaration, clicking the Quick Actions
    dropdown, and then clicking the `using System.Threading;` directive. After the
    `using System.Threading;` directive is added, the code appears as shown in Figure
    [19-17](#449652_2_En_19_Chapter.xhtml#Fig17):


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig17_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig17_HTML.jpg)


    Figure 19-17


    Error cleared after adding the directive


    If the package execution is *not* configured for Synchronized execution, the code
    executes the package as before. If the package execution *is* configured for Synchronized
    execution, a `ManualResetEvent` named `manualResetState` is declared, and the
    state of `manualResetState` is initialized as false. Remember, a `ManualResetEvent`
    set to false begins *waiting* (blocking) any other threads that show up to use
    the shared resource assigned to the `ManualResetEvent`.


    The next step is to configure the `Timer`, which *ticks* based on interval configuration.
    When the timer ticks, the timer will call a method named `CheckStatus` in a class
    named `CheckWaitState`. Add the `CheckWaitState` class to the ExecuteCatalogPackageTask.cs
    file and declare private members using the code in Listing [19-5](#449652_2_En_19_Chapter.xhtml#PC5):


    ```

    class CheckWaitState

    {

    private long executionId;

    private int invokeCount;

    private ManualResetEvent manualResetState;

    private int maximumCount;

    private string catalogName;

    private SqlConnection connection;

    private ExecuteCatalogPackageTask task;

    public Operation.ServerOperationStatus OperationStatus { get; set; }

    }

    Listing 19-5

    Implementing CheckWaitState in the ExecuteCatalogPackageTask.cs file

    ```


    Once the code is added, it appears as shown in Figure [19-18](#449652_2_En_19_Chapter.xhtml#Fig18):


