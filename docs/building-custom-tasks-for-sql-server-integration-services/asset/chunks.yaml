    The output should appear as shown in Figure [12-4](#449652_2_En_12_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig4_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig4_HTML.jpg)


    Figure 12-4


    Writing the public key to public.out


    Extract the public key token from the public.out file by executing the code in
    Listing [12-3](#449652_2_En_12_Chapter.xhtml#PC3):


    ```

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
    -t public.out

    Listing 12-3

    Extracting the public key token

    ```


    The output should appear similar to Figure [12-5](#449652_2_En_12_Chapter.xhtml#Fig5):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig5_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig5_HTML.jpg)


    Figure 12-5


    Public key token, extracted


    Select the public key token and copy the selection to the clipboard. Paste the
    clipboard results – along with some text to help identify the public key token –
    in the ExecuteCatalogPackageTaskComplexUI class, as shown in Figure [12-6](#449652_2_En_12_Chapter.xhtml#Fig6):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig6_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig6_HTML.jpg)


    Figure 12-6


    Storing the public key token in a code comment


    The next step is to sign the ExecuteCatalogPackageTaskComplexUI assembly.


    ### Sign the ExecuteCatalogPackageTaskComplexUI Assembly


    In Solution Explorer, double-click the ExecuteCatalogPackageTaskComplexUI Properties
    folder. Click on the Signing page, check the “Sign the assembly” checkbox, and
    then browse for the key.snk file, as shown in Figure [12-7](#449652_2_En_12_Chapter.xhtml#Fig7):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig7_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig7_HTML.jpg)


    Figure 12-7


    Browsing for the key.snk file


    Click the Open button to use the key.snk file to sign the ExecuteCatalogPackageTaskComplexUI
    assembly.


    The next step is to configure the Build output path location.


    ### Configure the Build Output Path


    Return to the Notes.txt file and copy the “build output path” location to the
    clipboard. Click the Build page on the ExecuteCatalogPackageTaskComplexUI properties
    page, and then paste the clipboard contents into the Output path textbox, as shown
    in Figure [12-8](#449652_2_En_12_Chapter.xhtml#Fig8):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig8_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig8_HTML.jpg)


    Figure 12-8


    Configuring the Build Output path property


    The next step is to configure build events for the ExecuteCatalogPackageTaskComplexUI
    assembly.


    ### Configure Build Events


    You will need to locate gacutil.exe on your server to complete the next two steps.


    Return to the Notes.txt file and copy the “unregister” command to the clipboard.
    Click the Build Events page on the ExecuteCatalogPackageTaskComplexUI properties
    page, and then click the “Edit Pre-build…” button to open the Pre-build Event
    Command Line dialog. Paste the clipboard contents into the Pre-build Event Command
    Line textbox, as shown in Figure [12-9](#449652_2_En_12_Chapter.xhtml#Fig9):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig9_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig9_HTML.jpg)


    Figure 12-9


    Pre-build event command line


    Click the OK button to close the Pre-build Event Command Line dialog. Return to
    the Notes.txt file and copy the “register” command to the clipboard. Click the
    Build Events page on the ExecuteCatalogPackageTaskComplexUI properties page, and
    then click the “Edit Post-build…” button to open the Post-build Event Command
    Line dialog. Paste the clipboard contents into the Post-build Event Command Line
    textbox, as shown in Figure [12-10](#449652_2_En_12_Chapter.xhtml#Fig10):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig10_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig10_HTML.jpg)


    Figure 12-10


    Post-build event command line


    The next step is to edit the ExecuteCatalogPackageTask to use the newly signed
    assembly.


    ### Editing the ExecuteCatalogPackageTask


    Copy the public key token for the ExecuteCatalogPackageTaskComplexUI assembly
    onto the clipboard. In Solution Explorer, expand ExecuteCatalogPackageTask and
    open the ExecuteCatalogPackageTask.cs assembly file. Edit the DtsTask decoration
    for the ExecuteCatalogPackageTask constructor, replacing *your* public key token
    with the public key token I show in Listing [12-4](#449652_2_En_12_Chapter.xhtml#PC4):


    ```

    [DtsTask(

    TaskType = "DTS150"

    , DisplayName = "Execute Catalog Package Task"

    , IconResource = "ExecuteCatalogPackageTask.ALCStrike.ico"

    , Description = "A task to execute packages stored in the SSIS Catalog."

    , UITypeName = "ExecuteCatalogPackageTaskComplexUI.ExecuteCatalogPackageTaskComplexUI,
    ExecuteCatalogPackageTaskComplexUI, Version=1.0.0.0, Culture=Neutral, PublicKeyToken=a68173515d1ee3e3"

    , TaskContact = "ExecuteCatalogPackageTask; Building Custom Tasks for SQL Server
    Integration Services, 2019 Edition; © 2020 Andy Leonard; https://dilmsuite.com/ExecuteCatalogPackageTaskBookCode")]

    Listing 12-4

    Editing the DtsTask decoration for the ExecuteCatalogPackageTask constructor

    ```


    Once edited, the DtsTask decoration for the ExecuteCatalogPackageTask constructor
    should appear similar to Figure [12-11](#449652_2_En_12_Chapter.xhtml#Fig11):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig11_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig11_HTML.jpg)


    Figure 12-11


    Editing the DtsTask decoration for the ExecuteCatalogPackageTask constructor


    The next step is to build and test the custom task solution


    ## Build the Solution


    Click the Build menu in Visual Studio, and then click “Build Solution,” as shown
    in Figure [12-12](#449652_2_En_12_Chapter.xhtml#Fig12):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig12_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig12_HTML.jpg)


    Figure 12-12


    Building the ExecuteCatalogPackageTask solution


    If all goes as planned, the Visual Studio Output window should display similar
    to Figure [12-13](#449652_2_En_12_Chapter.xhtml#Fig13):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig13_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig13_HTML.jpg)


    Figure 12-13


    Build succeeded


    The very first test of a .Net solution is: Does it build? This solution builds.'
  trans: '### 创建密钥


    您需要在服务器上找到 `sn.exe` 来完成接下来的三个步骤。


    打开命令提示符窗口，输入清单 12-1 中的代码（该代码应出现在您的 `Notes.txt` 文件顶部附近）：


    ```

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
    -k key.snk

    清单 12-1

    创建 key.snk 文件

    ```


    执行后，结果应与图 12-3 所示类似：


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig3_HTML.jpg](img/449652_2_En_12_Fig3_HTML.jpg)


    图 12-3

    创建 key.snk 文件


    要将公钥写入名为 `public.out` 的文件，请从 `Notes.txt` 文件中粘贴下一行代码，即清单 12-2：


    ```

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
    -p key.snk public.out

    清单 12-2

    将公钥写入 public.out

    ```


    输出应如图 12-4 所示：


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig4_HTML.jpg](img/449652_2_En_12_Fig4_HTML.jpg)


    图 12-4

    将公钥写入 public.out


    通过执行清单 12-3 中的代码，从 `public.out` 文件中提取公钥令牌：


    ```

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
    -t public.out

    清单 12-3

    提取公钥令牌

    ```


    输出应与图 12-5 类似：


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig5_HTML.jpg](img/449652_2_En_12_Fig5_HTML.jpg)


    图 12-5

    已提取的公钥令牌


    选择公钥令牌并将所选内容复制到剪贴板。将剪贴板结果——连同一些有助于识别公钥令牌的文本——粘贴到 `ExecuteCatalogPackageTaskComplexUI`
    类中，如图 12-6 所示：


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig6_HTML.jpg](img/449652_2_En_12_Fig6_HTML.jpg)


    图 12-6

    将公钥令牌存储在代码注释中


    下一步是签名 `ExecuteCatalogPackageTaskComplexUI` 程序集。


    ### 签名 `ExecuteCatalogPackageTaskComplexUI` 程序集


    在解决方案资源管理器中，双击 `ExecuteCatalogPackageTaskComplexUI` 属性文件夹。单击“签名”选项卡，勾选“为程序集签名”复选框，然后浏览找到
    `key.snk` 文件，如图 12-7 所示：


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig7_HTML.jpg](img/449652_2_En_12_Fig7_HTML.jpg)


    图 12-7

    浏览 key.snk 文件


    单击“打开”按钮，使用 `key.snk` 文件签名 `ExecuteCatalogPackageTaskComplexUI` 程序集。


    下一步是配置生成输出路径位置。


    ### 配置生成输出路径


    返回 `Notes.txt` 文件，将 `build output path` 位置复制到剪贴板。单击 `ExecuteCatalogPackageTaskComplexUI`
    属性页面上的“生成”选项卡，然后将剪贴板内容粘贴到“输出路径”文本框中，如图 12-8 所示：


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig8_HTML.jpg](img/449652_2_En_12_Fig8_HTML.jpg)


    图 12-8

    配置“生成输出路径”属性


    下一步是为 `ExecuteCatalogPackageTaskComplexUI` 程序集配置生成事件。


    ### 配置生成事件


    您需要在服务器上找到 `gacutil.exe` 来完成接下来的两个步骤。


    返回 `Notes.txt` 文件，将 `unregister` 命令复制到剪贴板。单击 `ExecuteCatalogPackageTaskComplexUI`
    属性页面上的“生成事件”选项卡，然后单击“编辑预生成事件…”按钮以打开“预生成事件命令行”对话框。将剪贴板内容粘贴到“预生成事件命令行”文本框中，如图 12-9
    所示：


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig9_HTML.jpg](img/449652_2_En_12_Fig9_HTML.jpg)


    图 12-9

    预生成事件命令行


    单击“确定”按钮关闭“预生成事件命令行”对话框。返回 `Notes.txt` 文件，将 `register` 命令复制到剪贴板。单击 `ExecuteCatalogPackageTaskComplexUI`
    属性页面上的“生成事件”选项卡，然后单击“编辑后期生成事件…”按钮以打开“后期生成事件命令行”对话框。将剪贴板内容粘贴到“后期生成事件命令行”文本框中，如图
    12-10 所示：


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig10_HTML.jpg](img/449652_2_En_12_Fig10_HTML.jpg)


    图 12-10

    后期生成事件命令行


    下一步是编辑 `ExecuteCatalogPackageTask` 以使用新签名的程序集。


    ### 编辑 `ExecuteCatalogPackageTask`


    将 `ExecuteCatalogPackageTaskComplexUI` 程序集的公钥令牌复制到剪贴板。在解决方案资源管理器中，展开 `ExecuteCatalogPackageTask`
    并打开 `ExecuteCatalogPackageTask.cs` 程序集文件。编辑 `ExecuteCatalogPackageTask` 构造函数的
    `DtsTask` 装饰，用我在清单 12-4 中显示的公钥令牌替换您的公钥令牌：


    ```

    [DtsTask(

    TaskType = "DTS150"

    , DisplayName = "Execute Catalog Package Task"

    , IconResource = "ExecuteCatalogPackageTask.ALCStrike.ico"

    , Description = "A task to execute packages stored in the SSIS Catalog."

    , UITypeName = "ExecuteCatalogPackageTaskComplexUI.ExecuteCatalogPackageTaskComplexUI,
    ExecuteCatalogPackageTaskComplexUI, Version=1.0.0.0, Culture=Neutral, PublicKeyToken=a68173515d1ee3e3"

    , TaskContact = "ExecuteCatalogPackageTask; Building Custom Tasks for SQL Server
    Integration Services, 2019 Edition; © 2020 Andy Leonard; https://dilmsuite.com/ExecuteCatalogPackageTaskBookCode")]

    清单 12-4

    编辑 ExecuteCatalogPackageTask 构造函数的 DtsTask 装饰

    ```


    编辑后，`ExecuteCatalogPackageTask` 构造函数的 `DtsTask` 装饰应与图 12-11 类似：


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig11_HTML.jpg](img/449652_2_En_12_Fig11_HTML.jpg)


    图 12-11

    编辑 ExecuteCatalogPackageTask 构造函数的 DtsTask 装饰


    下一步是生成并测试自定义任务解决方案。


    ### 生成解决方案


    单击 Visual Studio 中的“生成”菜单，然后单击“生成解决方案”，如图 12-12 所示：


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig12_HTML.jpg](img/449652_2_En_12_Fig12_HTML.jpg)


    图 12-12

    生成 ExecuteCatalogPackageTask 解决方案


    如果一切按计划进行，Visual Studio 的“输出”窗口应显示类似图 12-13 的内容：


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig13_HTML.jpg](img/449652_2_En_12_Fig13_HTML.jpg)


    图 12-13

    生成成功


    对 .Net 解决方案的第一个测试是：它能生成吗？这个解决方案可以生成。'
- fmt: "## 测试自定义 SSIS 任务\n\n通过创建（或打开）一个测试 SSIS 项目来测试解决方案。测试内容如下：\n\n1. 自定义 SSIS 任务是否出现在\
    \ SSIS 工具箱中？\n2. SSIS 开发人员是否能在不报错的情况下将自定义任务添加到包中？\n\n当 SSIS 包在 Visual Studio IDE（集成开发环境）中打开时，可以打开\
    \ SSIS 工具箱来检查条件 1，如图 [12-14](#449652_2_En_12_Chapter.xhtml#Fig14) 所示：\n\n![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig14_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig14_HTML.jpg)\n\
    **图 12-14** 在 SSIS 工具箱中显示的 Execute Catalog Package Task\n\n将 Execute Catalog Package\
    \ Task 拖放到 SSIS 包的控制流上，以查看是否可以无错误地将 Execute Catalog Package Task 添加到 SSIS 包中，如图\
    \ [12-15](#449652_2_En_12_Chapter.xhtml#Fig15) 所示：\n\n![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig15_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig15_HTML.jpg)\n\
    **图 12-15** 可以无错误地将 Execute Catalog Package Task 添加到 SSIS 包\n\n最后，双击 Execute Catalog\
    \ Package Task 以查看是否可以无错误地打开其编辑器，如图 [12-16](#449652_2_En_12_Chapter.xhtml#Fig16)\
    \ 所示：\n\n![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig16_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig16_HTML.jpg)\n\
    **图 12-16** 可以无错误地打开 Execute Catalog Package Task 编辑器\n\n测试通过！现在我们有了一个代码量最少的 Execute\
    \ Catalog Package Task 和一个闪亮的新编辑器。\n\n如 [12-16](#449652_2_En_12_Chapter.xhtml#Fig16)\
    \ 和 [12-17](#449652_2_En_12_Chapter.xhtml#Fig17) 图所示，`GeneralView` 和 `SettingsView`\
    \ 是空的：\n\n![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig17_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig17_HTML.jpg)\n\
    **图 12-17** SettingsView 为空\n\n单击 `Expressions` 页，单击 `Expressions` 属性值文本框内部，然后单击省略号以打开\
    \ `Property Expressions Editor`，如图 [12-18](#449652_2_En_12_Chapter.xhtml#Fig18)\
    \ 所示：\n\n![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig18_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig18_HTML.jpg)\n\
    **图 12-18** Expressions\n\n回顾本书此部分的目标：\n\n*   为任务用户提供更“SSIS 化”的体验，包括一个带有“常规”和“设置”页“视图”的“漂亮”编辑器。\n\
    *   启用 SSIS 表达式的使用。\n*   添加任务设置的设计时验证。\n*   在编辑器中显示更多 SSIS 目录执行属性。\n\n在本节中，我们开始看到第二个要点（启用\
    \ SSIS 表达式的使用）得以实现——如图 [12-18](#449652_2_En_12_Chapter.xhtml#Fig18) 所示。\n\n我们没有添加任何代码来创建\
    \ `ExpressionsView`，那么这个编辑器页面是从哪里来的呢？`ExpressionsView` 是从 `Microsoft.DataTransformationServices.Controls`\
    \ 程序集继承而来的。此时您可能不相信，但使用 SSIS 表达式操作自定义任务属性的能力，值得为添加一个“SSIS 化”编辑器所付出的所有努力。\n\n##\
    \ 结论\n\n在本章中，我们重点介绍了将新的复杂编辑器（`ExecuteCatalogPackageTaskComplexUI`）与 `ExecuteCatalogPackageTask`\
    \ 耦合所需的操作。一旦耦合，我们就能够在测试 SSIS 包中测试这个代码量最少的 `ExecuteCatalogPackageTask`。\n\n现在正是签入代码的绝佳时机。\n\
    \n在下一章中，我们将添加属性。\n\n# 13. 实现视图和属性\n\n在第 [12](#449652_2_En_12_Chapter.xhtml) 章中，我们构建并测试了一个代码量最少的\
    \ `ExecuteCatalogPackageTask`，它拥有一个名为 `ExecuteCatalogPackageTaskComplexUI` 的新“SSIS\
    \ 化”编辑器。在本章中，我们将为 `GeneralView` 和 `SettingsView` 实现 `IDTSTaskUIView` 编辑器接口，添加编辑器属性，并进行更多测试。\n\
    \n## 实现 GeneralView 的 IDTSTaskUIView 接口\n\n在第 [11](#449652_2_En_11_Chapter.xhtml)\
    \ 章中，我们使用了 Visual Studio 2019 中的一些巧妙功能，通过单击为 `GeneralView` 实现了所需的 `IDTSTaskUIView`\
    \ 接口方法，如图 [13-1](#449652_2_En_13_Chapter.xhtml#Fig1) 所示：\n\n![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig1_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig1_HTML.jpg)\n\
    **图 13-1** 为 GeneralView 实现所需的 IDTSTaskUIView 接口方法\n\n在本章接近尾声时，我们注释掉了 `throw`\
    \ 语句，以便 `ExecuteCatalogPackageTaskComplexUI` 项目能够构建并通过一些基本测试。代码现在如清单 [13-1](#449652_2_En_13_Chapter.xhtml#PC1)\
    \ 所示：\n\n```\npublic void OnInitialize(IDTSTaskUIHost treeHost, TreeNode viewNode,\
    \ object taskHost, object connections)\n{\n    // throw new NotImplementedException();\n\
    }\npublic void OnValidate(ref bool bViewIsValid, ref string reason)\n{\n    //\
    \ throw new NotImplementedException();\n}\npublic void OnCommit(object taskHost)\n\
    {\n    // throw new NotImplementedException();\n}\npublic void OnSelection()\n\
    {\n    // throw new NotImplementedException();\n}\npublic void OnLoseSelection(ref\
    \ bool bCanLeaveView, ref string reason)\n{\n    // throw new NotImplementedException();\n\
    }\n```\n**清单 13-1** GeneralView 的 IDTSTaskUIView 接口方法（已注释掉）\n\n上面的代码也已重新排列，以更接近我喜欢的顺序（参见前面关于“CDO”的说明）。\n\
    \n下一步是实现 `GeneralView` 的 `OnInitialize` 方法。"
  raw: '## Test the Custom SSIS Task


    Test the solution by creating (or opening) a test SSIS project. The tests are


    1.  Does the custom SSIS task show up in the SSIS Toolbox?


    2.  Can an SSIS developer add the custom task to a package without error?


    When an SSIS package is open in the Visual Studio IDE (Integrated Development
    Environment), the SSIS Toolbox may be opened to check for condition 1, as shown
    in Figure [12-14](#449652_2_En_12_Chapter.xhtml#Fig14):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig14_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig14_HTML.jpg)


    Figure 12-14


    The Execute Catalog Package Task shows up in the SSIS Toolbox


    Drag the Execute Catalog Package Task onto the SSIS package’s Control Flow to
    see if the Execute Catalog Package Task may be added to an SSIS package without
    error, as shown in Figure [12-15](#449652_2_En_12_Chapter.xhtml#Fig15):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig15_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig15_HTML.jpg)


    Figure 12-15


    The Execute Catalog Package Task may be added to an SSIS package without error


    Finally, double-click the Execute Catalog Package Task to see if it is possible
    to open the editor without error, as shown in Figure [12-16](#449652_2_En_12_Chapter.xhtml#Fig16):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig16_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig16_HTML.jpg)


    Figure 12-16


    The Execute Catalog Package Task Editor may be opened without error


    The tests pass! We now have a minimally coded Execute Catalog Package Task with
    a shiny, new editor.


    The GeneralView and SettingsView are empty, as seen in Figure [12-16](#449652_2_En_12_Chapter.xhtml#Fig16)
    and Figure [12-17](#449652_2_En_12_Chapter.xhtml#Fig17):


    ![../images/449652_2_En_12_Chapter/449652_2_En_12_Fig17_HTML.jpg](images/449652_2_En_12_Chapter/449652_2_En_12_Fig17_HTML.jpg)


    Figure 12-17


    SettingsView is empty


