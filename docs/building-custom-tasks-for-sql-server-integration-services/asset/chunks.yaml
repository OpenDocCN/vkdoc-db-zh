    `ExecuteCatalogPackageTask.evaluateStatus` 方法


    `ExecuteCatalogPackageTask.evaluateStatus`方法接收三个参数：

    *   `os`：一个`Operation.ServerOperationStatus`类型参数，包含正在执行的 SSIS 包的当前操作状态

    *   `packagePath`：一个`string`类型参数，包含正在执行的 SSIS 包的 SSIS 目录路径

    *   `elapsed`：一个`string`类型参数，表示 SSIS 包的执行时间


    `evaluateStatus`方法在第 311 行开始，声明并初始化名为`ret`的`DTSExecResult`变量，该变量初始化为`DTSExecResult.Success`。在第
    312 行声明并初始化名为`msg`的`string`变量为`String.Empty`，在第 313 行声明并初始化另一个名为`swMsg`的`string`变量为`String.Empty`。


    如果在 315 行检查到`ExecuteCatalogPackageTask.Synchronized`属性设置为 true，则`swMsg`被设置为`"
    Package Execution Time: " + elapsed;`。


    一个基于`os`参数值的`switch`语句跨越第 320–361 行。针对多个`Operation.ServerOperationStatus`值的 case
    用于决定`msg`变量值、调用`raiseEvent`方法并设置`ret`变量值。`ret`变量值从`evaluateStatus`方法返回。


    如果 SSIS 包正在同步执行，并且`CheckWaitState`重试计数（`invokeCount`）达到`maximumCount`值，则`CheckWaitState.OperationStatus`属性被设置为`Operation.ServerOperationStatus.Canceled`（参见列表
    19-13 和图 19-31）。设置`CheckWaitState.OperationStatus`属性的值对 SSIS 包的执行没有影响。我们的代码必须响应设置为`Operation.ServerOperationStatus.Canceled`的`CheckWaitState.OperationStatus`属性值。


    下一步是使用列表 19-17 中的代码实现一个辅助函数来停止包执行：


    ## 添加 `ExecuteCatalogPackageTask.stopExecution` 辅助函数


    ```

    private void stopExecution(long executionId

    , SqlConnection connection)

    {

    CatalogCollection catalogCollection = new IntegrationServices(connection).Catalogs;

    Catalog catalog = catalogCollection[PackageCatalogName];

    ExecutionOperationCollection executionCollection = catalog.Executions;

    ExecutionOperation executionOperation = executionCollection[executionId];

    executionOperation.Stop();

    }

    ```

