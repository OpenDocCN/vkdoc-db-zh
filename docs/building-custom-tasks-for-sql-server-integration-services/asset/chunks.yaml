    # 关于本书


    > —柯克·哈斯尔登


    ## 作者初版感想


    这本小书最初于 2012 年作为一系列博客文章发表在 Linchpin People 网站上。


    在撰写本文时，我提供 SQL Server Integration Services (SSIS) 解决方案已超过十年。在 SSIS 之前，我使用 Data
    Transformation Services (DTS) 工作了几年。尽管 SSIS 自 2005 版本以来就支持自定义任务和组件，但我最初建议我的咨询客户*不要*开发自定义
    SSIS 任务和组件。为什么？


    1.  源代码需要在使用这些自定义任务和组件的 SSIS 解决方案的整个生命周期内进行维护和支持。

    2.  需要投资购买 Visual Studio Professional（约 1000 美元）来构建代码。

    3.  需要相当扎实的.Net 开发技能来理解构建 Visual Studio 工具箱组件的复杂性。


    我的第一个担忧仍然存在，但入门门槛已大大降低——至少在成本方面。


    当微软®发布免费版本的 Visual Studio（Visual Studio Express 和更近期的 Visual Studio Community
    Edition）后，一旦我了解到可以使用免费工具来构建自定义 SSIS 任务（本书的主题），我的第二个担忧就消失了。


    本书解决了我的第三个担忧。


    撰写这个博客系列并重新审视该系列以创作本书，对我来说是件乐事。我祈祷您阅读时能像我写作时一样享受。


    > —安迪

    > 弗吉尼亚州法姆维尔

    > 2017 年 4 月


    ## 作者第二版感想


    我对本书第一版的反响感到惊喜。最初它只是一部自出版作品，当我准备在亚马逊点击“发布”按钮时，Apress 的（出色的）编辑乔纳森·詹尼克说服我把稿件发给他。


    许多读者表示他们喜欢这篇稿子的篇幅。他们分享道：“我一个下午就能读完。”我羡慕他们的阅读速度。


    我写下这些感想的时间是 2010 年代最后一个 11 月的最后一天。在经历了长达两年多的（书籍）写作停歇后，我意识到：


    1.  是时候更新内容了。

    2.  是时候更新示例了。


    正如我的朋友兼兄弟克里斯·耶茨常说的：“我们开始吧！”


    > —安迪

    > 弗吉尼亚州法姆维尔

    > 2020 年 12 月


