    decoration


    You can find (some) documentation for the `UITypeName` attribute [at docs.microsoft.com/en-us/dotnet/api/microsoft.sqlserver.dts.runtime.dtstaskattribute.uitypename?view=sqlserver-2017](http://msdn.microsoft.com/en-us/library/microsoft.sqlserver.dts.runtime.dtstaskattribute.uitypename.aspx).
    The property/value pairs are:


    *   Type Name: `ExecuteCatalogPackageTaskUI.ExecuteCatalogPackageTaskUI`

