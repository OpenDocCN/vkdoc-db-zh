- fmt: '# 实现 SSIS 包执行状态监控与事件日志重构


    The `returnOperationStatus` method first connects to the `CatalogCollection` type
    named `catalogCollection`. A `Catalog` type named `catalog` is derived from the
    `catalogCollection` by the `catalogName` property (defaulted to “SSISDB”).


    An `OperationCollection` type named `operationCollection` is assigned from the
    `catalog.Operations` type collection. An `Operation` type named `operation` is
    read from the `operationCollection[executionId]`. The `operationStatus` variable,
    a variable of the `Operation.ServerOperationStatus` type, is read from the `operation.Status`
    property.


    The next step is to code the `checkOperationStatus` method to the CheckWaitState
    class to respond to the `ServerOperationStatus` of the SSIS package execution
    using the code in Listing [19-9](#449652_2_En_19_Chapter.xhtml#PC9):


    ```csharp

    public void checkOperationStatus(Operation.ServerOperationStatus operationStatus)

    {

    // check for package execution "finished" states

    if (

    (operationStatus == Operation.ServerOperationStatus.Canceled)

    || (operationStatus == Operation.ServerOperationStatus.Completion)

    || (operationStatus == Operation.ServerOperationStatus.Failed)

    || (operationStatus == Operation.ServerOperationStatus.Stopping)

    || (operationStatus == Operation.ServerOperationStatus.Success)

    || (operationStatus == Operation.ServerOperationStatus.UnexpectTerminated)

    )

    {

    // reset counter

    invokeCount = 0;

    // signal thread

    manualResetState.Set();

    }

    }

    ```

    **Listing 19-9** Add the `CheckWaitState.CheckOperationStatus` method


    Once added, the code appears as shown in Figure [19-22](#449652_2_En_19_Chapter.xhtml#Fig22):


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig22_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig22_HTML.jpg)


    *Figure 19-22* Adding the `CheckWaitState.CheckOperationStatus` method


    The `checkOperationStatus` method receives an `Operation.ServerOperationStatus`
    type argument named `operationStatus`. An `if` conditional checks to see if the
    `operationStatus` argument value is in a “finished” operational state. “Finished”
    operation states include:

    *   `Canceled`

    *   `Completion`

    *   `Failed`

    *   `Stopping`

    *   `Success`

    *   `UnexpectTerminated`


    If the `operationStatus` argument value is in a “finished” operational state,
    the timer tick counter named `invokeCount` is reset to 0, and the `ManualResetEvent`
    type property named `manualResetState` is `Set()`. As stated earlier: The `ManualResetEvent.Set()`
    method `signals` (sets the Boolean state to `true`) waiting threads, `manually`
    letting waiting threads know they may now execute.


    # Refactoring logMessage to raiseEvent


    Return to the `ExecuteCatalogPackageTask` class and refactor the `logMessage`
    method, starting with the name of the method. The `logMessage` method doesn’t
    actually log a message. Instead, the `logMessage` method raises an event. Refactor
    the `logMessage` method by renaming it to `raiseEvent` and replacing it with the
    code in Listing [19-10](#449652_2_En_19_Chapter.xhtml#PC10):


    ```csharp

    public void raiseEvent(string messageType

    , int messageCode

    , string subComponent

    , string message)

    {

    bool fireAgain = true;

    switch (messageType)

    {

    default:

    break;

    case "Information":

    componentEvents.FireInformation(messageCode, subComponent, message, "", 0, ref
    fireAgain);

    break;

    case "Warning":

    componentEvents.FireWarning(messageCode, subComponent, message, "", 0);

    break;

    case "Error":

    componentEvents.FireError(messageCode, subComponent, message, "", 0);

    break;

    }

    }

    ```

