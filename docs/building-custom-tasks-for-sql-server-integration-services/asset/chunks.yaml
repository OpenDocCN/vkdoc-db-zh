    Once the constructor is implemented, the CheckWaitState class appears as shown
    in Figure [19-19](#449652_2_En_19_Chapter.xhtml#Fig19):


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig19_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig19_HTML.jpg)


