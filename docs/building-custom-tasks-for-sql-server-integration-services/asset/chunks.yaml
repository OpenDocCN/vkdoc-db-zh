    ## 结论


    鼓励读者在 `wixtoolset.org` 了解更多关于 WiX 工具集的使用信息，您可以在 `wixtoolset.org/documentation`
    找到深入的文档和示例。


    下一步是在企业数据工程框架解决方案中使用执行目录包任务。


    现在正是签入您的代码的绝佳时机。


    # 23. 在 SSIS 框架中使用执行目录包任务


    在 *SQL Server Data Automation Through Frameworks: Building Metadata-Driven Frameworks
    with T-SQL, SSIS, and Azure Data Factory* (`amazon.com/Server-Data-Automation-Through-Frameworks/dp/1484262123`)
    一书中，Kent Bradshaw 和我描述并演示了执行存储过程和 SSIS 包的数据框架。Kent 分享了一个基于元数据驱动、以存储过程为基础的框架，该框架执行其他存储过程并记录执行报告数据。我则分享了一个
    SSIS 框架，它执行存储在本地文件系统中的 SSIS 包，以及一个执行存储在 Azure 文件共享中的 SSIS 包的变体。与 Kent 的基于存储过程的框架类似，这两个
    SSIS 框架都是元数据驱动的，并记录执行元数据。本地版 SSIS 框架使用一个 SSIS 包作为框架“引擎”。Azure-SSIS 版本则由两个 Azure
    Data Factory 管道驱动。


    在本章中，我们将使用 `Execute Catalog Package Task` 来构建一个基于元数据、以 SSIS 目录为基础的 SSIS 框架。我们将构建的框架类似于
    *SQL Server Data Automation Through Frameworks* 一书中 SSIS 框架的本地版，也类似于 SSIS Framework
    Community Edition (`dilmsuite.com/ssis-framework-community-edition`)——一个免费开源项目，是构成数据集成生命周期管理套件
    (`dilmsuite.com`) 的实用工具集合的一部分。


    然而，我们在本章构建的 SSIS 框架具有额外的功能：能够串行启动包执行*或*并行启动执行（嗯，*近乎*并行）。在其他框架版本中实现并行性也是可能的；您只需要构建一个（额外的）SSIS
    包或 ADF 管道来管理并行执行的协调。`Execute Catalog Package Task` 公开了一个 `Synchronized` 属性，这意味着我们的框架可以将
    `Synchronized` 属性的值存储在元数据中；无需额外的 SSIS 包。与所有工程一样，天下没有免费的午餐。前一句中的“启动”一词是精心选择的；期望的设计*可能*围绕着
    SSIS 包并行执行的*完成*来展开。


    我们首先考察一个围绕 SSIS 包并行执行完成情况而设计的 SSIS 包。

