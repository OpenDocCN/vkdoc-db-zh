- fmt: '# Adding Instrumentation


    Open the `ExecuteCatalogPackageTask.cs` file in the `ExecuteCatalogPackageTask`
    project in the `ExecuteCatalogPackageTask` solution, and create a new function
    named `logMessage` in the `ExecuteCatalogPackageTask` class using the code in
    Listing [18-1](#449652_2_En_18_Chapter.xhtml#PC1):


    ```csharp

    private void logMessage(

    IDTSComponentEvents componentEvents

    , string messageType

    , int messageCode

    , string subComponent

    , string message)

    {

    bool fireAgain = true;

    switch(messageType)

    {

    default:

    break;

    case "Information":

    componentEvents.FireInformation(messageCode, subComponent, message, "", 0, ref
    fireAgain);

    break;

    case "Warning":

    componentEvents.FireWarning(messageCode, subComponent, message, "", 0);

    break;

    case "Error":

    componentEvents.FireError(messageCode, subComponent, message, "", 0);

    break;

    }

    }

    ```


    *Listing 18-1 Adding logMessage*


    Once added, the code appears as shown in Figure [18-1](#449652_2_En_18_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig1_HTML.jpg](images/449652_2_En_18_Chapter/449652_2_En_18_Fig1_HTML.jpg)


    *Figure 18-1 The logMessage function*


    ## Adding Starting and Ended Messages


    Add a process “starting” information message to the `Execute` method using the
    code in Listing [18-2](#449652_2_En_18_Chapter.xhtml#PC2):


    ```csharp

    string packagePath = "\\SSISDB\\" + PackageFolder + "\\"

    + PackageProject + "\\"

    + PackageName;

    string msg = "Starting " + packagePath + " on " + ServerName;

    logMessage(componentEvents, "Information", 1001, TaskName, msg);

    ```


    *Listing 18-2 Adding a process “starting” message*


    Once added, the code appears as shown in Figure [18-2](#449652_2_En_18_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig2_HTML.jpg](images/449652_2_En_18_Chapter/449652_2_En_18_Fig2_HTML.jpg)


    *Figure 18-2 Adding a “starting” message*


    Add an “ended” message using the code in Listing [18-3](#449652_2_En_18_Chapter.xhtml#PC3):


    ```csharp

    msg = packagePath + " on " + ServerName + " completed";

    logMessage(componentEvents, "Information", 1002, TaskName, msg);

    ```


    *Listing 18-3 Adding an “ended” message*


    Once added, the code appears as shown in Figure [18-3](#449652_2_En_18_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig3_HTML.jpg](images/449652_2_En_18_Chapter/449652_2_En_18_Fig3_HTML.jpg)


    *Figure 18-3 Adding an “ended” message*


    ## Refining Based on Execution Mode


    Build and test the Execute Catalog Package Task, observing the Execution Results
    tab as shown in Figure [18-4](#449652_2_En_18_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig4_HTML.jpg](images/449652_2_En_18_Chapter/449652_2_En_18_Fig4_HTML.jpg)


    *Figure 18-4 Observing the messages*


    The code executes and reports as designed, but the report code is designed inaccurately.
    When the Execute Catalog Package Task executes an SSIS package in the SSIS Catalog,
    the `Synchronized` execution parameter governs the behavior of the `package.Execute()`
    method. If `Synchronized` is false (which is the default), the SSIS Catalog finds
    the package and then returns from execution. If `Synchronized` is true, the SSIS
    Catalog executes the package *in-process*, returning from execution only *after*
    the SSIS package execution completes in the SSIS Catalog. The message should stand
    out, so change the `messageType` argument in the `logMessage` method from “Information”
    to “Warning.”


    The “ended” message is currently inaccurate. Update the “ended” message logic
    using the code in Listing [18-4](#449652_2_En_18_Chapter.xhtml#PC4):


    ```csharp

    msg = packagePath + " on " + ServerName

    + (Synchronized ? " completed." : " started. Check SSIS Catalog Reports for package
    execution results.");

    logMessage(componentEvents, "Warning", 1002, TaskName, msg);

    ```


    *Listing 18-4 Updating the “ended” message*


    Once added, the code appears as shown in Figure [18-5](#449652_2_En_18_Chapter.xhtml#Fig5):


    ![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig5_HTML.jpg](images/449652_2_En_18_Chapter/449652_2_En_18_Fig5_HTML.jpg)


    *Figure 18-5 Updated “ended” message and message type*


    Build the `ExecuteCatalogPackageTask` solution and add the Execute Catalog Package
    Task to a test SSIS project, configured to execute a package with the `Synchronized`
    property set to False. When execution completes, view the Execution Results/Progress
    tab to find the newly updated (and more accurate) “ended” message, as shown in
    Figure [18-6](#449652_2_En_18_Chapter.xhtml#Fig6):


    ![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig6_HTML.jpg](images/449652_2_En_18_Chapter/449652_2_En_18_Fig6_HTML.jpg)


    *Figure 18-6 The new “ended” message*


    ## Adding Execution Time Instrumentation


    The “ended” message should also include execution time instrumentation, and the
    message could be flagged as a warning instead of information by implementing the
    code in Listing [18-5](#449652_2_En_18_Chapter.xhtml#PC5):


    ```csharp

    Stopwatch sw = new Stopwatch();

    sw.Start();

    .

    .

    .

    sw.Stop();

    string swMsg = String.Empty;

    if(Synchronized)

    {

    swMsg = " Package Execution Time: " + sw.Elapsed.ToString();

    }

    msg = packagePath + " on " + ServerName + (Synchronized ?

    (" completed." + swMsg.Substring(0, (swMsg.Length - 4))) :

    (" started. Check SSIS Catalog Reports for package execution results."));

    logMessage(componentEvents, (Synchronized ? "Information" : "Warning"), 1002,
    TaskName, msg);

    ```


    *Listing 18-5 Adding execution time and warning*


    When added, the code appears as shown in Figure [18-7](#449652_2_En_18_Chapter.xhtml#Fig7):


    ![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig7_HTML.jpg](images/449652_2_En_18_Chapter/449652_2_En_18_Fig7_HTML.jpg)


    *Figure 18-7 Updating the “ended” message, again*


    As before, a directive is missing but Visual Studio knows what we need, the `using
    System.Diagnostics;` directive. Use Quick Actions to add the `using System.Diagnostics;`
    directive. Once added, the code appears as shown in Figure [18-8](#449652_2_En_18_Chapter.xhtml#Fig8):


    ![../images/449652_2_En_18_Chapter/449652_2_En_18_Fig8_HTML.jpg](images/449652_2_En_18_Chapter/449652_2_En_18_Fig8_HTML.jpg)


    *Figure 18-8 The updated message code, after adding the using System.Diagnostics;
    directive*


    `Stopwatch` is a member of the `System.Diagnostics` .Net Framework assembly that
    allows developers to measure the elapsed time between two events. The `Stopwatch`
    type variable named `sw` is declared and initialized on line 92. The `sw` `Stopwatch`
    variable is started on line 93, just before the `Execute` method for the `PackageInfo`
    variable named `catalogPackage` is called on line 95.


    Immediately after the `Execute` method returns, the `Stopwatch` is stopped on
    line 97. A string variable named `swMsg` is declared and initialized to an empty
    string on line 98. If the package was executed with the `Synchronized` property
    set to true (line 99), the `swMsg` `string` variable is populated with a message
    to inform developers and operators of the package execution elapsed time captured
    by the `Stopwatch` variable named `sw`.


    The `string` variable named `msg` is populated on lines 104–106 and begins with
    the value of the `packagePath` string variable concatenated with the literal string
    value `" on "`, followed by the value of the `ServerName` property.


    If the `Synchronized` property set to true – meaning the code *waited* until the
    SSIS package execution was completed before reaching this line of code – `" completed."`
    and the value of the `swMsg` `string` variable are concatenated to the value of
    the `msg` variable. If the `Synchronized` property set to false – meaning the
    code found the SSIS package and continued (also known as “fire and forget”) –
    `" started. Check SSIS Catalog Reports for package execution results."` is concatenated
    to the value of the `msg` variable.'
