    Ready to create the database


    The next step is to click the “Review + create” button at the bottom of the blade
    which displays the Review blade shown in Figure [24-9](#449652_2_En_24_Chapter.xhtml#Fig9):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig9_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig9_HTML.jpg)


    Figure 24-9


    Reviewing the SQL database and server configuration


    Click the Create button at the bottom of the blade to complete provisioning the
    Azure SQL Database.


    The next step is to provision an Azure Data Factory.


    ## Provisioning an Azure Data Factory


    Azure Data Factory (ADF) is a data integration PaaS (Platform-as-a-Service) offering
    on Microsoft Azure. At the time of this writing, ADFv2 is the current version.


    If you do not have an Azure account, visit azure.com and create an account. At
    the time of this writing, you may sign up for free and you get 12 months of free
    services. Azure sign-up offers have varied over time, but the author has always
    seen Azure offer free stuff at sign-up.


    To provision an Azure Data Factory, connect to the Azure Portal (portal.azure.com)
    and click the “Create a resource” option, as shown in Figure [24-10](#449652_2_En_24_Chapter.xhtml#Fig10):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig10_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig10_HTML.jpg)


    Figure 24-10


    Creating a new resource


    When the New blade displays, enter “Data Factory” in the “Search the Marketplace”
    textbox, and then click “Data Factory” listed in the suggestions, as shown in
    Figure [24-11](#449652_2_En_24_Chapter.xhtml#Fig11):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig11_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig11_HTML.jpg)


    Figure 24-11


    Selecting Data Factory


    Clicking “Data Factory” opens the Data Factory overview blade, as shown in Figure
    [24-12](#449652_2_En_24_Chapter.xhtml#Fig12):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig12_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig12_HTML.jpg)


    Figure 24-12


    Preparing to create the Data Factory


    Click the Create button to open the Create Data Factory blade. Configure the Resource
    group, Region, Name, and Version properties, and then click the “Git configuration”
    tab, as shown in Figure [24-13](#449652_2_En_24_Chapter.xhtml#Fig13):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig13_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig13_HTML.jpg)


    Figure 24-13


    Configuring the Data Factory


    Check the “Configure Git later” checkbox, and then click the “Review + create”
    button, as shown in Figure [24-14](#449652_2_En_24_Chapter.xhtml#Fig14):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig14_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig14_HTML.jpg)


    Figure 24-14


    Configuring the Git configuration tab


    Azure validates the Azure Data Factory configuration and notifies you if the validation
    passes or if an issue is discovered. Once validation passes, review the settings
    and – if acceptable – click the Create button, as shown in Figure [24-15](#449652_2_En_24_Chapter.xhtml#Fig15):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig15_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig15_HTML.jpg)


    Figure 24-15


    Reviewing the settings


    If all goes as planned, deployment succeeds and the Overview blade displays, as
    shown in Figure [24-16](#449652_2_En_24_Chapter.xhtml#Fig16):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig16_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig16_HTML.jpg)


    Figure 24-16


    Deployment success


    Click the “Go to resource” button to open the Data Factory Overview, as shown
    in Figure [24-17](#449652_2_En_24_Chapter.xhtml#Fig17):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig17_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig17_HTML.jpg)


    Figure 24-17


    The Data Factory overview


    To configure Azure Data Factory artifacts, click the “Author & Monitor” button.
    The Data Factory author and monitor overview page displays, as shown in Figure
    [24-18](#449652_2_En_24_Chapter.xhtml#Fig18):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig18_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig18_HTML.jpg)


    Figure 24-18


    The Data Factory author and monitor overview page


    The Azure Data Factory is provisioned. The next step is to create and configure
    the deployment container.


    ## Creating and Configuring the Deployment Container


    Azure Blob Storage serves as the Azure file system. In this section, we create
    an Azure Storage account. Azure storage accounts allow developers to create containers,
    which store documents in Azure for distributed access. To learn more, visit docs.microsoft.com/en-us/azure/storage/blobs/storage-blobs-introduction.


    We follow these steps to create and configure a deployment container:


    *   Provision an Azure Storage account.


    *   Create the deployment container.


    *   Upload the ExecuteCatalogPackageTask.msi file.


    *   Create and upload the main.cmd file.'
  trans: '# 预配 Azure SQL 数据库


    Azure SQL 数据库（或称 Azure SQL DB）是 Azure 提供的一项灵活且可扩展的平台即服务（PaaS）云数据库产品。Azure SQL
    DB 的大小（和成本）范围从小型到超大型不等。


    连接到 Azure 并点击 `新建资源` 以打开 `新建` 窗格，如图 24-2 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig2_HTML.jpg](img/449652_2_En_24_Fig2_HTML.jpg)

    *图 24-2：准备预配新的 Azure SQL 数据库*


    `新建` 窗格上的 `SQL 数据库` 链接会打开 `创建 SQL 数据库` 窗格。在 Azure 中预配新的“工作区”时，首先要创建一个新的 `资源组`，如图
    24-3 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig3_HTML.jpg](img/449652_2_En_24_Fig3_HTML.jpg)

    *图 24-3：在预配 Azure SQL 数据库时创建 rgECPT 资源组*


    下一步是输入数据库名称。在上一章中，我们重用了 `SSISDB` 数据库。由于在此框架中我们不强制实施引用完整性（外键）或使用 `SSISDB` 的加密功能，因此我们可以预配一个不同的数据库来托管框架元数据，如图
    24-4 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig4_HTML.jpg](img/449652_2_En_24_Fig4_HTML.jpg)

    *图 24-4：预配 SSISFramework 数据库*


    下一步是选择或创建一个新的 SQL Server。图 24-5 显示了在 `服务器` 下拉菜单下方点击“新建”链接后显示的 `新建服务器` 窗格：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig5_HTML.jpg](img/449652_2_En_24_Fig5_HTML.jpg)

    *图 24-5：预配新的 SQL 服务器*


    将“是否要使用 SQL 弹性池”属性设置为“否”。具有 `Gen5`、`2 个 vCore` 和 `32 GB` 存储的 `常规用途` 服务器配置略超出我们的需求，因此点击
    `计算 + 存储` 属性的 `配置数据库` 链接，如图 24-6 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig6_HTML.jpg](img/449652_2_En_24_Fig6_HTML.jpg)

    *图 24-6：准备配置 SQL 服务器*


    通过选择 `基本配置` 来配置 SQL Server，如图 24-7 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig7_HTML.jpg](img/449652_2_En_24_Fig7_HTML.jpg)

    *图 24-7：选择基本配置*


    点击 `应用` 按钮返回到 `创建 SQL 数据库` 窗格，该窗格显示如图 24-8 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig8_HTML.jpg](img/449652_2_En_24_Fig8_HTML.jpg)

    *图 24-8：准备创建数据库*


    下一步是点击窗格底部的 `查看 + 创建` 按钮，这将显示如图 24-9 所示的 `查看` 窗格：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig9_HTML.jpg](img/449652_2_En_24_Fig9_HTML.jpg)

    *图 24-9：查看 SQL 数据库和服务器配置*


    点击窗格底部的 `创建` 按钮，完成 Azure SQL 数据库的预配。


    下一步是预配一个 Azure 数据工厂。


    # 预配 Azure 数据工厂


    Azure 数据工厂（ADF）是 Microsoft Azure 上的数据集成平台即服务（PaaS）产品。在撰写本文时，ADFv2 是当前版本。


    如果你没有 Azure 帐户，请访问 `azure.com` 并创建一个帐户。在撰写本文时，你可以免费注册并获得 12 个月的免费服务。Azure 注册优惠随时间变化，但作者总是看到
    Azure 在注册时提供免费内容。


    要预配 Azure 数据工厂，请连接到 Azure 门户（`portal.azure.com`）并点击 `创建资源` 选项，如图 24-10 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig10_HTML.jpg](img/449652_2_En_24_Fig10_HTML.jpg)

    *图 24-10：创建新资源*


    当 `新建` 窗格显示时，在 `搜索市场` 文本框中输入“数据工厂”，然后点击建议中列出的“数据工厂”，如图 24-11 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig11_HTML.jpg](img/449652_2_En_24_Fig11_HTML.jpg)

    *图 24-11：选择数据工厂*


    点击“数据工厂”会打开 `数据工厂概述` 窗格，如图 24-12 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig12_HTML.jpg](img/449652_2_En_24_Fig12_HTML.jpg)

    *图 24-12：准备创建数据工厂*


    点击 `创建` 按钮以打开 `创建数据工厂` 窗格。配置 `资源组`、`区域`、`名称` 和 `版本` 属性，然后点击 `Git 配置` 选项卡，如图 24-13
    所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig13_HTML.jpg](img/449652_2_En_24_Fig13_HTML.jpg)

    *图 24-13：配置数据工厂*


    选中 `稍后配置 Git` 复选框，然后点击 `查看 + 创建` 按钮，如图 24-14 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig14_HTML.jpg](img/449652_2_En_24_Fig14_HTML.jpg)

    *图 24-14：配置 Git 配置选项卡*


    Azure 会验证 Azure 数据工厂的配置，并通知你验证是通过还是发现了问题。验证通过后，查看设置，如果接受，则点击 `创建` 按钮，如图 24-15
    所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig15_HTML.jpg](img/449652_2_En_24_Fig15_HTML.jpg)

    *图 24-15：查看设置*


    如果一切按计划进行，部署将成功，并且 `概述` 窗格会显示，如图 24-16 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig16_HTML.jpg](img/449652_2_En_24_Fig16_HTML.jpg)

    *图 24-16：部署成功*


    点击 `转到资源` 按钮以打开 `数据工厂概述`，如图 24-17 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig17_HTML.jpg](img/449652_2_En_24_Fig17_HTML.jpg)

    *图 24-17：数据工厂概述*


    要配置 Azure 数据工厂的构件，请点击 `创作和监视` 按钮。`数据工厂创作和监视概述` 页面将显示，如图 24-18 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig18_HTML.jpg](img/449652_2_En_24_Fig18_HTML.jpg)

    *图 24-18：数据工厂创作和监视概述页面*


    Azure 数据工厂已预配完成。下一步是创建和配置部署容器。


    ## 创建和配置部署容器


    Azure Blob Storage 充当 Azure 文件系统。在本节中，我们将创建一个 Azure 存储帐户。Azure 存储帐户允许开发人员创建容器，这些容器在
    Azure 中存储文档以供分布式访问。要了解更多信息，请访问 `docs.microsoft.com/en-us/azure/storage/blobs/storage-blobs-introduction`。


    我们按照以下步骤创建和配置部署容器：


    1.  预配一个 Azure 存储帐户。

    2.  创建部署容器。

    3.  上传 `ExecuteCatalogPackageTask.msi` 文件。

    4.  创建并上传 `main.cmd` 文件。'
- fmt: '# 配置 Azure 存储账户与部署容器


    创建和配置部署容器的步骤始于配置一个 Azure 存储账户。要配置存储账户，请连接到 Azure 门户，然后从菜单中点击“`Create a resource`”。如果“`Storage
    account`”未显示在“`New`”边栏选项卡的默认屏幕上，请使用“`Search the marketplace`”功能搜索“`Storage account`”，如图[24-19](#449652_2_En_24_Chapter.xhtml#Fig19)所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig19_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig19_HTML.jpg)


    图 24-19：准备添加存储账户


    通过选择资源组、输入存储账户名称，并选择位置、性能、账户类型和复制属性来配置新的存储账户，如图[24-20](#449652_2_En_24_Chapter.xhtml#Fig20)所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig20_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig20_HTML.jpg)


    图 24-20：配置存储账户属性


    点击“`Review + create`”按钮进入审阅边栏选项卡，如图[24-21](#449652_2_En_24_Chapter.xhtml#Fig21)所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig21_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig21_HTML.jpg)


    图 24-21：审阅存储账户配置


    点击“`Create`”按钮以创建存储账户。


    下一步是创建部署容器。


    ## 创建部署容器


    部署容器最初将托管两个文件：`main.cmd` 和 `ExecuteCatalogPackageTask.msi`。`main.cmd` 包含在 Azure-SSIS
    节点上安装 Execute Catalog Package Task 的说明。稍后，该容器还将托管包含每次安装 `ExecuteCatalogPackageTask.msi`
    安装程序文件详细信息的日志文件。


    在开始之前，请浏览到 storageexplorer.com 并下载 Microsoft Azure Storage Explorer，如图[24-22](#449652_2_En_24_Chapter.xhtml#Fig22)所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig22_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig22_HTML.jpg)


    图 24-22：下载 Storage Explorer


    下载后，安装 Microsoft Azure Storage Explorer。安装完成后，打开 Storage Explorer 并配置您的 Azure
    账户。配置好 Azure 账户后，Storage Explorer 应显示您之前配置的存储账户，如图[24-23](#449652_2_En_24_Chapter.xhtml#Fig23)所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig23_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig23_HTML.jpg)


    图 24-23：Storage Explorer 中的存储账户


    下一步是创建容器。右键单击存储账户，然后点击“`Create Blob Container`”，如图[24-24](#449652_2_En_24_Chapter.xhtml#Fig24)所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig24_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig24_HTML.jpg)


    图 24-24：创建新容器


    当新的未命名容器被添加到存储账户的“`Blob Containers`”节点下时，输入新容器的名称，如图[24-25](#449652_2_En_24_Chapter.xhtml#Fig25)所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig25_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig25_HTML.jpg)


    图 24-25：添加新容器


    下一步是上传 `ExecuteCatalogPackageTask.msi` 文件。


    ## 上传 ExecuteCatalogPackageTask.msi 文件


    输入新容器名称后按 `Enter` 键。Storage Explorer 会选中新容器并显示“`No data available in this blob
    container`”。点击“`Upload`”按钮，然后从下拉菜单中选择“`Upload Files…`”，如图[24-26](#449652_2_En_24_Chapter.xhtml#Fig26)所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig26_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig26_HTML.jpg)


    图 24-26：准备上传文件


    当“`Upload Files`”对话框显示时，点击“`Selected files`”属性文本框右侧的省略号（...），如图[24-27](#449652_2_En_24_Chapter.xhtml#Fig27)中高亮所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig27_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig27_HTML.jpg)


    图 24-27：准备选择 msi 文件


    当“`Choose files to upload`”对话框显示时，导航到并选择 `ExecuteCatalogPackageTask.msi` 文件，如图[24-28](#449652_2_En_24_Chapter.xhtml#Fig28)所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig28_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig28_HTML.jpg)


    图 24-28：选择 msi 文件


    点击“`Open`”按钮返回“`Upload Files`”对话框，如图[24-29](#449652_2_En_24_Chapter.xhtml#Fig29)所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig29_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig29_HTML.jpg)


    图 24-29：准备上传 msi 文件


    点击“`Upload`”按钮，将 `ExecuteCatalogPackageTask.msi` 文件上传到 Blob 容器，如图[24-30](#449652_2_En_24_Chapter.xhtml#Fig30)所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig30_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig30_HTML.jpg)


    图 24-30：msi 文件已上传


    下一步是创建 `main.cmd` 文件。


    ## 创建 Main.cmd 文件


    `main.cmd` 文件在每个 Azure-SSIS 节点启动时，在该节点上执行 Windows 安装程序应用程序 `msiexec.exe`。首先，打开您喜欢的文本编辑器并输入清单[24-1](#449652_2_En_24_Chapter.xhtml#PC1)中所示的文本：


    ```

    @echo off

    rem execute the msi

    msiexec /i %~dp0\ExecuteCatalogPackageTask.msi /passive /l %CUSTOM_SETUP_SCRIPT_LOG_DIR%\ExecuteCatalogPackageTaskInstall.log

    echo

    echo Execute Catalog Package Task installed.

    Listing 24-1

    Main.cmd

    ```


    将该文件保存为 `main.cmd`，然后将 `main.cmd` 上传到 Azure Blob 容器，如图[24-31](#449652_2_En_24_Chapter.xhtml#Fig31)所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig31_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig31_HTML.jpg)


    图 24-31：main.cmd 文件已上传


    您可以在 docs.microsoft.com/en-us/azure/data-factory/how-to-configure-azure-ssis-ir-custom-setup
    了解更多关于自定义 Azure-SSIS 集成运行时的信息。


    您可以在 docs.microsoft.com/en-us/windows-server/administration/windows-commands/msiexec
    了解更多关于 `msiexec` 应用程序的信息。


    下一步是预配 Azure-SSIS 集成运行时。'
  raw: '### Provision an Azure Storage Account


    The steps required to create and configure a deployment container begin with provisioning
    an Azure storage account. To provision an Azure storage account, connect to the
    portal, and then click “Create a resource” from the menu. If “Storage account”
    does not display on the “New” blade’s default screen, search for “Storage account”
    using the “Search the marketplace” functionality, as shown in Figure [24-19](#449652_2_En_24_Chapter.xhtml#Fig19):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig19_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig19_HTML.jpg)


    Figure 24-19


    Preparing to add a storage account


    Configure the new storage account by selecting the resource group, entering a
    storage account name, and selecting location, performance, account kind, and replication
    properties, as shown in Figure [24-20](#449652_2_En_24_Chapter.xhtml#Fig20):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig20_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig20_HTML.jpg)


    Figure 24-20


    Configuring the storage account properties


    Click the “Review + create” button to proceed to the review blade, as shown in
    Figure [24-21](#449652_2_En_24_Chapter.xhtml#Fig21):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig21_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig21_HTML.jpg)


    Figure 24-21


    Review storage account configuration


    Click the Create button to create the storage account.


    The next step is to create the deployment container.


    ### Create the Deployment Container


    The deployment container will initially host two files: main.cmd and ExecuteCatalogPackageTask.msi.
    Main.cmd contains instructions for installing the Execute Catalog Package Task
    on Azure-SSIS nodes. Later, the container will also host log files containing
    details of each installation of the ExecuteCatalogPackageTask.msi installer file.


    Before we begin, browse to storageexplorer.com and download Microsoft Azure Storage
    Explorer, as shown in Figure [24-22](#449652_2_En_24_Chapter.xhtml#Fig22):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig22_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig22_HTML.jpg)


    Figure 24-22


    Downloading Storage Explorer


    Once downloaded, install Microsoft Azure Storage Explorer. Once installed, open
    Storage Explorer and configure your Azure account. After your Azure account has
    been configured, Storage Explorer should display the storage account you configured
    earlier, as shown in Figure [24-23](#449652_2_En_24_Chapter.xhtml#Fig23):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig23_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig23_HTML.jpg)


    Figure 24-23


    Storage account in Storage Explorer


    The next step is to create the container. Right-click the storage account and
    then click Create Blob Container, as shown in Figure [24-24](#449652_2_En_24_Chapter.xhtml#Fig24):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig24_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig24_HTML.jpg)


    Figure 24-24


    Creating a new container


    When the new and unnamed container is added to the “Blob Containers” node in the
    storage account, enter the name of your new container, as shown in Figure [24-25](#449652_2_En_24_Chapter.xhtml#Fig25):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig25_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig25_HTML.jpg)


    Figure 24-25


    Adding a new container


    The next step is to upload the ExecuteCatalogPackageTask.msi file.


    ### Upload the ExecuteCatalogPackageTask.msi File


    Press the Enter key when finished entering the name of the new container. Storage
    explorer selects the new container and displays “No data available in this blob
    container”. Click the Upload button, and then select “Upload Files…” from the
    dropdown, as shown in Figure [24-26](#449652_2_En_24_Chapter.xhtml#Fig26):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig26_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig26_HTML.jpg)


    Figure 24-26


    Preparing to upload files


    When the Upload Files dialog displays, click the ellipsis to the right of the
    “Selected files” property textbox, highlighted in Figure [24-27](#449652_2_En_24_Chapter.xhtml#Fig27):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig27_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig27_HTML.jpg)


    Figure 24-27


    Preparing to select the msi file


    When the “Choose files to upload” dialog displays, navigate to – and select –
    the ExecuteCatalogPackageTask.msi file, as shown in Figure [24-28](#449652_2_En_24_Chapter.xhtml#Fig28):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig28_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig28_HTML.jpg)


    Figure 24-28


    Selecting the msi file


    Click the Open button to return to the Upload Files dialog, as shown in Figure
    [24-29](#449652_2_En_24_Chapter.xhtml#Fig29):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig29_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig29_HTML.jpg)


    Figure 24-29


    Preparing to upload the msi file


    Click the Upload button to upload the ExecuteCatalogPackageTask.msi file to the
    blob container, as shown in Figure [24-30](#449652_2_En_24_Chapter.xhtml#Fig30):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig30_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig30_HTML.jpg)


    Figure 24-30


    The msi file, uploaded


    The next step is to create the main.cmd file.


    ### Create the Main.cmd File


    The main.cmd file executes the Windows installer application – msiexec.exe – on
    each Azure-SSIS node at node startup. To begin, open your favorite text editor
    and enter the text shown in Listing [24-1](#449652_2_En_24_Chapter.xhtml#PC1):


    ```

    @echo off

    rem execute the msi

    msiexec /i %~dp0\ExecuteCatalogPackageTask.msi /passive /l %CUSTOM_SETUP_SCRIPT_LOG_DIR%\ExecuteCatalogPackageTaskInstall.log

    echo

    echo Execute Catalog Package Task installed.

    Listing 24-1

    Main.cmd

    ```


    Save the file as main.cmd, and then upload main.cmd to the Azure Blob container,
    as shown in Figure [24-31](#449652_2_En_24_Chapter.xhtml#Fig31):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig31_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig31_HTML.jpg)


    Figure 24-31


    The main.cmd file, uploaded


    You may learn more about customizing Azure-SSIS Integration Runtimes at docs.microsoft.com/en-us/azure/data-factory/how-to-configure-azure-ssis-ir-custom-setup.


    You may learn more about the msiexec application at docs.microsoft.com/en-us/windows-server/administration/windows-commands/msiexec.


    The next step is to provision an Azure-SSIS Integration Runtime.'
  trans: '# 配置 Azure 存储账户与部署容器


    创建和配置部署容器的步骤始于配置一个 Azure 存储账户。要配置存储账户，请连接到 Azure 门户，然后从菜单中点击“`创建资源`”。如果“`存储账户`”未显示在“`新建`”边栏选项卡的默认屏幕上，请使用“`搜索市场`”功能搜索“`存储账户`”，如图
    24-19 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig19_HTML.jpg](img/449652_2_En_24_Fig19_HTML.jpg)


    图 24-19：准备添加存储账户


    通过选择资源组、输入存储账户名称，并选择位置、性能、账户类型和复制属性来配置新的存储账户，如图 24-20 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig20_HTML.jpg](img/449652_2_En_24_Fig20_HTML.jpg)


    图 24-20：配置存储账户属性


    点击“`查看 + 创建`”按钮进入审阅边栏选项卡，如图 24-21 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig21_HTML.jpg](img/449652_2_En_24_Fig21_HTML.jpg)


    图 24-21：审阅存储账户配置


    点击“`创建`”按钮以创建存储账户。


    下一步是创建部署容器。


    ## 创建部署容器


    部署容器最初将托管两个文件：`main.cmd` 和 `ExecuteCatalogPackageTask.msi`。`main.cmd` 包含在 Azure-SSIS
    节点上安装 Execute Catalog Package Task 的说明。稍后，该容器还将托管包含每次安装 `ExecuteCatalogPackageTask.msi`
    安装程序文件详细信息的日志文件。


    在开始之前，请浏览到 storageexplorer.com 并下载 Microsoft Azure Storage Explorer，如图 24-22 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig22_HTML.jpg](img/449652_2_En_24_Fig22_HTML.jpg)


    图 24-22：下载 Storage Explorer


    下载后，安装 Microsoft Azure Storage Explorer。安装完成后，打开 Storage Explorer 并配置您的 Azure
    账户。配置好 Azure 账户后，Storage Explorer 应显示您之前配置的存储账户，如图 24-23 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig23_HTML.jpg](img/449652_2_En_24_Fig23_HTML.jpg)


    图 24-23：Storage Explorer 中的存储账户


    下一步是创建容器。右键单击存储账户，然后点击“`创建 Blob 容器`”，如图 24-24 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig24_HTML.jpg](img/449652_2_En_24_Fig24_HTML.jpg)


    图 24-24：创建新容器


    当新的未命名容器被添加到存储账户的“`Blob 容器`”节点下时，输入新容器的名称，如图 24-25 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig25_HTML.jpg](img/449652_2_En_24_Fig25_HTML.jpg)


    图 24-25：添加新容器


    下一步是上传 `ExecuteCatalogPackageTask.msi` 文件。


    ## 上传 ExecuteCatalogPackageTask.msi 文件


    输入新容器名称后按 `Enter` 键。Storage Explorer 会选中新容器并显示“`此 blob 容器中没有可用数据`”。点击“`上传`”按钮，然后从下拉菜单中选择“`上传文件…`”，如图
    24-26 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig26_HTML.jpg](img/449652_2_En_24_Fig26_HTML.jpg)


    图 24-26：准备上传文件


    当“`上传文件`”对话框显示时，点击“`选定的文件`”属性文本框右侧的省略号（...），如图 24-27 中高亮所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig27_HTML.jpg](img/449652_2_En_24_Fig27_HTML.jpg)


    图 24-27：准备选择 msi 文件


    当“`选择要上传的文件`”对话框显示时，导航到并选择 `ExecuteCatalogPackageTask.msi` 文件，如图 24-28 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig28_HTML.jpg](img/449652_2_En_24_Fig28_HTML.jpg)


    图 24-28：选择 msi 文件


    点击“`打开`”按钮返回“`上传文件`”对话框，如图 24-29 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig29_HTML.jpg](img/449652_2_En_24_Fig29_HTML.jpg)


    图 24-29：准备上传 msi 文件


    点击“`上传`”按钮，将 `ExecuteCatalogPackageTask.msi` 文件上传到 Blob 容器，如图 24-30 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig30_HTML.jpg](img/449652_2_En_24_Fig30_HTML.jpg)


    图 24-30：msi 文件已上传


    下一步是创建 `main.cmd` 文件。


    ## 创建 Main.cmd 文件


    `main.cmd` 文件在每个 Azure-SSIS 节点启动时，在该节点上执行 Windows 安装程序应用程序 `msiexec.exe`。首先，打开您喜欢的文本编辑器并输入清单
    24-1 中所示的文本：


    ```

    @echo off

    rem execute the msi

    msiexec /i %~dp0\ExecuteCatalogPackageTask.msi /passive /l %CUSTOM_SETUP_SCRIPT_LOG_DIR%\ExecuteCatalogPackageTaskInstall.log

    echo

    echo Execute Catalog Package Task installed.

    Listing 24-1

    Main.cmd

    ```


    将该文件保存为 `main.cmd`，然后将 `main.cmd` 上传到 Azure Blob 容器，如图 24-31 所示：


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig31_HTML.jpg](img/449652_2_En_24_Fig31_HTML.jpg)


    图 24-31：main.cmd 文件已上传


    您可以在 docs.microsoft.com/en-us/azure/data-factory/how-to-configure-azure-ssis-ir-custom-setup
    了解更多关于自定义 Azure-SSIS 集成运行时的信息。


    您可以在 docs.microsoft.com/en-us/windows-server/administration/windows-commands/msiexec
    了解更多关于 `msiexec` 应用程序的信息。


    下一步是预配 Azure-SSIS 集成运行时。'
- fmt: '# Provisioning an Azure-SSIS Integration Runtime


    To open the Azure Data Factory Management page, click the `Manage` link in the
    Azure Data Factory page, as shown in Figure 24-32:


    ![Figure 24-32: The Azure Data Factory Management page](images/449652_2_En_24_Chapter/449652_2_En_24_Fig32_HTML.jpg)


    To view Azure Data Factory Integration runtimes, click the `Connections` ➤ `Integration
    runtimes` link in the left-side list, as shown in Figure 24-33:


    ![Figure 24-33: Viewing Azure Data Factory Integration runtimes](images/449652_2_En_24_Chapter/449652_2_En_24_Fig33_HTML.jpg)


    Whenever one provisions an Azure Data Factory, an Azure integration runtime named
    `AutoResolveIntegrationRuntime` is provisioned. Integration Runtimes, or IRs,
    are used to dispatch ADF pipeline activity execution, connecting internal activity
    functionality to external resources via ADF Linked Services. To learn more about
    the `AutoResolveIntegrationRuntime`, please visit `docs.microsoft.com/en-us/azure/data-factory/concepts-integration-runtime`.


    Click the `+ New` link to create a new Integration Runtime. When the `Integration
    runtime setup` blade displays, select the `Azure-SSIS` integration runtime, as
    shown in Figure 24-34:


    ![Figure 24-34: Selecting the Azure-SSIS integration runtime](images/449652_2_En_24_Chapter/449652_2_En_24_Fig34_HTML.jpg)


    Click the `Continue` button to continue Azure-SSIS IR configuration. Enter a name
    and optional description for the Azure-SSIS integration runtime, and then configure
    `Location`, `Node Size`, `Node Number`, and `Edition` properties, as shown in
    Figure 24-35:


    ![Figure 24-35: Configuring the Azure-SSIS integration runtime](images/449652_2_En_24_Chapter/449652_2_En_24_Fig35_HTML.jpg)


    Please note you can save money if your enterprise already owns a SQL Server license,
    as shown in Figure 24-36:


    ![Figure 24-36: Save money if your enterprise owns a SQL Server license](images/449652_2_En_24_Chapter/449652_2_En_24_Fig36_HTML.jpg)


    Click the `Continue` button to configure the Azure-SSIS IR type to create an SSIS
    Catalog, as shown in Figure 24-37:


    ![Figure 24-37: Configuring the Azure-SSIS IR to create an SSIS Catalog](images/449652_2_En_24_Chapter/449652_2_En_24_Fig37_HTML.jpg)


    Configure the Azure-SSIS IR to connect to the Azure SQL Database created earlier
    in this chapter by selecting `Subscription`, `location`, and `Catalog database
    server endpoint` property values from their respective dropdowns and then entering
    connection information, as shown in Figure 24-38:


    ![Figure 24-38: Configuring Azure-SSIS properties for the SSIS Catalog](images/449652_2_En_24_Chapter/449652_2_En_24_Fig38_HTML.jpg)


    Click the `Continue` button to proceed to the Advanced Settings section of the
    Integration runtime setup blade.


    It is not vital that you add the SSIS Catalog and its database, `SSISDB`, to the
    same SQL Server instance configured earlier for the `SSISFramework` database.
    The `SSISFramework` database may reside anywhere accessible to your enterprise
    SSIS framework solution.


    Before continuing the Azure-SSIS IR configuration, return to Microsoft Azure Storage
    Explorer and navigate to the container created earlier. Right-click the container
    and then click `Get Shared Access Signature`, as shown in Figure 24-39:


    ![Figure 24-39: Preparing to get a Shared Access Signature (SAS)](images/449652_2_En_24_Chapter/449652_2_En_24_Fig39_HTML.jpg)


    Set the `Expiry time` to date-time well into the future because each time Azure-SSIS
    nodes are started, this folder is accessed. In addition to the default (`Read`
    and `List`) permissions, check the `Add`, `Create`, and `Write` permission checkboxes,
    as shown in Figure 24-40:


    ![Figure 24-40: Configuring the SAS](images/449652_2_En_24_Chapter/449652_2_En_24_Fig40_HTML.jpg)


    Click the `Create` button to create the Shared Access Signature Uniform Resource
    Identifier (URI) and Query string, as shown in Figure 24-41:


    ![Figure 24-41: The Shared Access Signature Uniform Resource Identifier (URI)
    and Query string](images/449652_2_En_24_Chapter/449652_2_En_24_Fig41_HTML.jpg)


    Click the `Copy` button beside the `SAS URI` textbox.


    Return to the Azure-SSIS Integration runtime setup blade, check the `Customize
    your Azure-SSIS Integration Runtime with additional system configurations/component
    installations` checkbox, and then paste the SAS URI into the `Custom setup container
    SAS URI` textbox, as shown in Figure 24-42:


    ![Figure 24-42: Customizing the Azure-SSIS IR to install the custom task](images/449652_2_En_24_Chapter/449652_2_En_24_Fig42_HTML.jpg)


    Once pasted, the SAS URI appears similar to the SAS URI (your values will likely
    be different) shown in Figure 24-43:


    ![Figure 24-43: The SAS URI, pasted](images/449652_2_En_24_Chapter/449652_2_En_24_Fig43_HTML.jpg)


    Click the `Continue` button to review the Summary of the Azure-SSIS IR configuration,
    as shown in Figure 24-44:


    ![Figure 24-44: Summary of the Azure-SSIS configuration](images/449652_2_En_24_Chapter/449652_2_En_24_Fig44_HTML.jpg)


    Click the `Create` button to start creating the Azure-SSIS integration runtime,
    as shown in Figure 24-45:


    ![Figure 24-45: Starting the Azure-SSIS integration runtime](images/449652_2_En_24_Chapter/449652_2_En_24_Fig45_HTML.jpg)


    Once the Azure-SSIS integration runtime has started, the `Manage` ➤ `Integration
    runtimes` page appears as shown in Figure 24-46:


    ![Figure 24-46: The Azure-SSIS integration runtime, started](images/449652_2_En_24_Chapter/449652_2_En_24_Fig46_HTML.jpg)


    The Azure-SSIS integration runtime displays the status `Running`. This is a very
    good sign.'
