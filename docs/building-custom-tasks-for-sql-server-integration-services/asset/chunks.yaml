    *   Version: `1.0.0.0`

    *   Culture: `Neutral`

    *   Public Key: `<*Your public key*>`


    ## Coding the Task Functionality


    Our task is *almost* ready to build and test. What’s left? SSIS Catalog Package
    execution functionality. Look in the `Execute` method shown in Figure 9-13:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig13_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig13_HTML.jpg)


    Figure 9-13: The `Execute` method


    We are going to add SSIS Catalog Package execution functionality here. There are
    several good articles available that walk one through executing SSIS Catalog Packages
    via .Net. A good summary of the process of executing SSIS 2019 package programmatically
    is found at `docs.microsoft.com/en-us/sql/integration-services/run-manage-packages-programmatically/running-and-managing-packages-programmatically?view=sql-server-ver15`.


    **Caution**


    Before we proceed, I want to remind you that we are not building a production-ready
    Execute Catalog Package Task. We are building a minimum amount of functionality
    to demonstrate the steps required to code a custom SSIS task. A production-ready
    custom SSIS task would include more functionality that we will cover here.


    We first need more .Net Framework References. Add the following references to
    the `ExecuteCatalogPackageTask` project:


    *   `Microsoft.SqlServer.ConnectionInfo`

    *   `Microsoft.SqlServer.Management.IntegrationServices`

    *   `Microsoft.SqlServer.Management.Sdk.Sfc`

    *   `Microsoft.SqlServer.Smo`


