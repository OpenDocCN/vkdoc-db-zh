  trans: "\n## 重构连接识别\n\n### 添加连接属性\n连接管理器识别至关重要——尤其是在连接字符串属性被动态管理或在执行时被覆盖的情况下。重构连接识别的第一步是使用清单\
    \ 16-1 中的代码，向 `ExecuteCatalogPackageTask` 代码添加与连接相关的属性：\n\n```csharp\npublic Connections\
    \ Connections;\npublic string ConnectionManagerId { get; set; } = String.Empty;\n\
    public int ConnectionManagerIndex { get; set; } = -1;\n// Listing 16-1\n// 向 ExecuteCatalogPackageTask\
    \ 类添加 Connections、ConnectionManagerIndex 和 ConnectionManagerId\n```\n\n添加后，代码如图\
    \ 16-10 所示：\n\n![Figure 16-10](img/449652_2_En_16_Fig10_HTML.jpg)\n\n*图 16-10：已添加到\
    \ ExecuteCatalogPackageTask 类的 Connections、ConnectionManagerId 和 ConnectionManagerIndex*\n\
    \n### 初始化 Connections 变量\n通过向 `ExecuteCatalogPackageTask.InitializeTask` 方法添加清单\
    \ 16-2 中的代码来初始化 `Connections` 变量：\n\n```csharp\n// init Connections\nConnections\
    \ = connections;\n// Listing 16-2\n// 初始化 Connections\n```\n\n添加后，`ExecuteCatalogPackageTask.InitializeTask`\
    \ 方法如图 16-11 所示：\n\n![Figure 16-11](img/449652_2_En_16_Fig11_HTML.jpg)\n\n*图 16-11：更新后的\
    \ ExecuteCatalogPackageTask.InitializeTask 方法*\n\n### 创建 returnConnectionManagerIndex\
    \ 方法\n使用清单 16-3 中的代码创建 `returnConnectionManagerIndex` 方法，来初始化 `ConnectionManagerIndex`\
    \ 属性值：\n\n```csharp\nprivate int returnConnectionManagerIndex(Connections connections\n\
    , string connectionManagerName)\n{\n    int ret = -1;\n    try\n    {\n      \
    \  ConnectionManagerId = GetConnectionID(connections, ConnectionManagerName);\n\
    \        Microsoft.SqlServer.Dts.Runtime.ConnectionManager connectionManager =\
    \ connections[ConnectionManagerId];\n        ConnectionManagerName = connectionManager.Name;\n\
    \        if (connectionManager != null)\n        {\n            for (int i = 0;\
    \ i <= connections.Count; i++)\n            {\n                if (connections[i].Name\
    \ == connectionManager.Name)\n                {\n                    ret = i;\n\
    \                    break;\n                }\n            }\n        }\n   \
    \ }\n    catch (Exception ex)\n    {\n        string message = \"Unable to locate\
    \ connection manager: \" + ConnectionManagerName;\n        throw new Exception(message,\
    \ ex.InnerException);\n    }\n    return ret;\n}\n// Listing 16-3\n// returnConnectionManagerIndex\
    \ 方法\n```\n\n添加后，`returnConnectionManagerIndex` 方法如图 16-12 所示：\n\n![Figure 16-12](img/449652_2_En_16_Fig12_HTML.jpg)\n\
    \n*图 16-12：returnConnectionManagerIndex 方法*\n\n检查图 16-12 所示的代码，在第 97 行声明并初始化了一个名为\
    \ `ret` 的 `int` 类型返回变量。一个 `try`-`catch` 块跨越第 99 至 121 行，随后在第 123 行，`ret` 变量的值从\
    \ `returnConnectionManagerIndex` 方法中返回。在第 101 行，代码尝试通过调用 `Microsoft.SqlServer.Dts.Runtime.Task`\
    \ 对象方法中包含的 `GetConnectionID` 方法来设置 `ExecuteCatalogPackageTask.ConnectionManagerId`\
    \ 字符串类型属性的值。在第 102 行，声明并初始化了一个名为 `connectionManager` 的变量（类型为 `Microsoft.SqlServer.Dts.Runtime.ConnectionManager`），使用\
    \ `ConnectionManagerId` 属性的值来标识 `connections` 集合的一个成员。在第 103 行，使用 `connectionManager.Name`\
    \ 将 `ConnectionManagerName` 属性的值设置（或重置）为 `connectionManager` 对象的名称。一个 `if` 条件始于第\
    \ 105 行，用于验证 `connectionManager` 对象是否不为 `null`。如果 `connectionManager` 对象不为 `null`，则从第\
    \ 107 行开始一个 `for` 循环。该 `for` 循环对 `connections` 的数量进行迭代。在第 109 行，一个 `if` 条件使用迭代器\
    \ `i` 将当前正在迭代的连接的 `Name` 属性值——`connection(i).Name`——与 `connectionManager.Name`\
    \ 属性的值进行比较。如果 `connection(i).Name` 的值等于 `connectionManager.Name` 属性的值，则将 `ret`\
    \ 变量的值设置为迭代器 `i` 的当前值。\n\n### 设置 ConnectionManagerIndex 属性\n要设置 `ConnectionManagerIndex`\
    \ 属性的值，请使用清单 16-4 中的代码，在 `ExecuteCatalogPackageTask.Execute` 方法中添加对 `returnConnectionManagerIndex`\
    \ 方法的调用：\n\n```csharp\nConnectionManagerIndex = returnConnectionManagerIndex(connections,\
    \ ConnectionManagerName);\n// Listing 16-4\n// 调用 returnConnectionManagerIndex\
