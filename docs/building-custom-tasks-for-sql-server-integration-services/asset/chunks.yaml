  trans: '

    ## 思考 Azure-SSIS


    在撰写本文时（2020 年 10 月），Azure-SSIS 尚不支持 SSIS 2019。它支持 SSIS 2017，因此我们必须将任务和 Visual
    Studio 解决方案降级，以作为 SSIS 2017 自定义任务运行。Azure-SSIS 未来很可能会支持 SSIS 2019（我无法得知，也无法影响微软内部的决策和优先级）。


    我建议你将开发工作迁移到配置了 Microsoft SQL Server 2017 且未配置 Microsoft SQL Server 2019 的机器上，以避免与
    Microsoft .Net Framework 中的程序集发生冲突。


    首先，通过展开解决方案资源管理器中的“引用”虚拟文件夹来更新 `ExecuteCatalogPackageTask` 项目的引用，如图 16-1 所示：

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig1_HTML.jpg](img/449652_2_En_16_Fig1_HTML.jpg)

    图 16-1：`ExecuteCatalogPackageTask` 引用


    对某些程序集（例如图 16-1 中概述的 `Micrsoft.SQLServer.ManagedDTS` 程序集）的引用可能会显示警告图标。警告图标表示该程序集存在问题。此问题在于，`Micrsoft.SQLServer.ManagedDTS`
    程序集的 SSIS 2019 版本未在仅安装了 SQL Server 2017 的开发服务器上注册。


    必须特别注意，你的开发服务器配置可能与我使用的开发服务器配置不同。具体情况可能有所差异。


    单击对 `Micrsoft.SQLServer.ManagedDTS` 程序集的引用，然后按 `F4` 键显示其属性，如图 16-2 所示：

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig2_HTML.jpg](img/449652_2_En_16_Fig2_HTML.jpg)

    图 16-2：`Micrsoft.SQLServer.ManagedDTS` 程序集属性


    请注意，`Micrsoft.SQLServer.ManagedDTS` 程序集的 Version 属性显示值为 "`0.0.0.0`"，因为在此开发服务器上找不到更高版本的
    `Micrsoft.SQLServer.ManagedDTS` 程序集。


    通过右键单击该程序集，然后单击“删除”，从 `ExecuteCatalogPackageTask` 引用集合中删除 `Micrsoft.SQLServer.ManagedDTS`
    程序集，如图 16-3 所示：

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig3_HTML.jpg](img/449652_2_En_16_Fig3_HTML.jpg)

    图 16-3：删除当前版本的 `Micrsoft.SQLServer.ManagedDTS` 程序集


    与之前一样，右键单击“引用”虚拟文件夹，然后单击“添加引用”以添加新引用（或者，在此例中，添加一个新版本的引用），如图 16-4 所示：

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig4_HTML.jpg](img/449652_2_En_16_Fig4_HTML.jpg)

    图 16-4：添加——实际上是替换——一个新引用


    展开“程序集”并选择“扩展”。在程序集列表中导航到 `Micrsoft.SQLServer.ManagedDTS` 程序集，并选中 `Micrsoft.SQLServer.ManagedDTS`
    程序集，如图 16-5 所示：

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig5_HTML.jpg](img/449652_2_En_16_Fig5_HTML.jpg)

    图 16-5：选择 `Micrsoft.SQLServer.ManagedDTS`


    请非常仔细地注意“引用管理器”右侧窗格中的“版本”列和详细信息。SSIS 2017 是版本 14。所选 `Micrsoft.SQLServer.ManagedDTS`
    版本是 11.0.0.0——即版本 11。版本 11 对应的是 SSIS 2012。


    单击“浏览”按钮并导航到程序集文件的位置。在我的服务器上，位置是 `C:\Windows\Microsoft.NET\assembly\GAC_MSIL\Microsoft.SqlServer.ManagedDTS\v4.0_14.0.0.0__89845dcd8080cc91`。请注意
    `Micrsoft.SQLServer.ManagedDTS` 程序集的版本是 `v4.0_14.0.0.0__89845dcd8080cc91`。我们知道版本是因为包含
    `Micrsoft.SQLServer.ManagedDTS` 程序集的文件夹被命名为 `v4.0_14.0.0.0__89845dcd8080cc91`，如图
    16-6 所示：

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig6_HTML.jpg](img/449652_2_En_16_Fig6_HTML.jpg)

    图 16-6：选择 SSIS 2017 版本的 `Micrsoft.SQLServer.ManagedDTS` 程序集


    添加对 `Micrsoft.SQLServer.ManagedDTS` 程序集的引用，并查看属性以确认是 SSIS 2017（版本 14），如图 16-7
    所示：

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig7_HTML.jpg](img/449652_2_En_16_Fig7_HTML.jpg)

    图 16-7：`Micrsoft.SQLServer.ManagedDTS` 程序集的 SSIS 2017 版本


    对 *`ExecuteCatalogPackageTask`* 和 *`ExecuteCatalogPackageTaskComplexUI`* 两个项目中的每一个引用的每个版本重复此过程，验证其版本，如图
    16-8 所示：

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig8_HTML.jpg](img/449652_2_En_16_Fig8_HTML.jpg)

    图 16-8：重复此过程


    引用降级完成后，打开 `ExecuteCatalogPackageTask` 项目的 `ExecuteCatalogPackageTask.cs` 文件。更新
    `ExecuteCatalogPackageTask` 类的 `DtsTask` 装饰中的 `TaskType` 属性，将 `TaskType` 从 `DTS150`
    设置为 `DTS140`，如图 16-9 所示：

    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig9_HTML.jpg](img/449652_2_En_16_Fig9_HTML.jpg)

    图 16-9：更新 `TaskType` 属性


    `ExecuteCatalogPackageTask` 解决方案已降级完成，`ExecuteCatalogPackageTask` 现已为 Azure-SSIS
    做好准备。

