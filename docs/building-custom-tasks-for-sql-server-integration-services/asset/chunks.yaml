    ## Conclusion


    In this chapter, we identified and corrected two errors in the Execute Catalog
    Package Task. The solutions were complex and involved adding a *lot* of code to
    the execute process. The solution, however, is not yet complete. We surface three
    properties that drive synchronous execution in the next chapter.


    Now would be an excellent time to check in your code.


    # 20. Adding Synchronous Execution Properties


    Chapter [19](#449652_2_En_19_Chapter.xhtml) included solutions for two egregious
    bugs:


    1.  If the SSIS package executes for longer than 30 seconds, the `PackageInfo
    Execute()` returns an error message that reads: “The Execute method on the task
    returned error code 0x80131904 (Execution Timeout Expired. The timeout period
    elapsed prior to completion of the operation or the server is not responding.).
    The Execute method must succeed, and indicate the result using an ‘out’ parameter.”


    2.  The Execute Catalog Package Task reports success, even when the SSIS package
    execution fails.


    The solution for the first bug involves asynchronous execution. Three settings
    required for the `WaitHandle.WaitAny` solution are


    *   `maximumRetries`: An `int` variable that sets the number of times the timer
    is allowed to “tick” before the SSIS Catalog Package execution operation is terminated.


    *   `retryIntervalSeconds`: An `int` variable that sets the number seconds between
    timer “ticks,” or retries.


    *   `operationTimeoutMinutes`: An `int` variable that sets the number of minutes
    permitted before the SSIS Catalog Package execution operation is terminated.


    At this point in development, the `maximumRetries`, `retryIntervalSeconds`, and
    `operationTimeoutMinutes` variables and their values are hard-coded into the `executeSynchronous`
    helper function in the `ExecuteCatalogPackageTask` class. The `maximumRetries`,
    `retryIntervalSeconds`, and `operationTimeoutMinutes` variables should really
    be `ExecuteCatalogPackageTask` class properties so SSIS developers may configure
    these values when Synchronous SSIS package execution exceeds 30 seconds.


    In addition, the property values are related in that `maximumRetries` * `retryIntervalSeconds`
    should be less than the value `operationTimeoutMinutes` / 60 in order to avoid
    execution timeouts.'
