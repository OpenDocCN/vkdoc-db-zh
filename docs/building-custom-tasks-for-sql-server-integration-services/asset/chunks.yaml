    # 11. Minimal Coding for the Complex Editor


    This chapter continues the goals of this section of the book, which are


    *   Surface a more “SSIS-y” experience for users of the task including a “pretty”
    editor with General and Settings pages “views”


    *   Enable the use of SSIS Expressions


    *   Add design-time validation of task settings


    *   Surface more SSIS Catalog execution properties in the editor


    In Chapter [10](#449652_2_En_10_Chapter.xhtml), we started the process of developing
    a new task editor by refactoring existing ExecuteCatalogPackageTask code and replacing
    the existing task editor project with a new version.


    In this chapter, we begin minimally coding the ExecuteCatalogPackageTaskComplexUI
    by creating the editor form and adding General and Settings views to the View
    ➤ Node ➤ Property Category ➤ Property hierarchy for SSIS tasks.


    ## Updating DtsTask Interface Members


