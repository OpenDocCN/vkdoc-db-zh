- fmt: '## 配置变量


    配置后，`User::MaximumRetries Int32` 类型变量如图 [23-30](#449652_2_En_23_Chapter.xhtml#Fig30)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig30_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig30_HTML.jpg)


    图 23-30：创建 `User::MaximumRetries` 变量


    创建一个新变量并配置属性，设置如下：


    *   容器：`Parent`

    *   名称：`RetryIntervalSeconds`

    *   命名空间：`User`

    *   值类型：`Int32`

    *   值：`10`


    配置后，`User::RetryIntervalSeconds Int32` 类型变量如图 [23-31](#449652_2_En_23_Chapter.xhtml#Fig31)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig31_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig31_HTML.jpg)


    图 23-31：创建 `User::RetryIntervalSeconds` 变量


    创建一个新变量并配置属性，设置如下：


    *   容器：`Parent`

    *   名称：`Use32bit`

    *   命名空间：`User`

    *   值类型：`Boolean`

    *   值：`false`


    配置后，`User::Use32bit Boolean` 类型变量如图 [23-32](#449652_2_En_23_Chapter.xhtml#Fig32)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig32_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig32_HTML.jpg)


    图 23-32：创建 `User::Use32bit` 变量


    创建最后一个 `Foreach Application Packages` 变量并配置属性，设置如下：


    *   容器：`Parent`

    *   名称：`LoggingLevel`

    *   命名空间：`User`

    *   值类型：`String`

    *   值：`Basic`


    配置后，`User::LoggingLevel Int32` 类型变量如图 [23-33](#449652_2_En_23_Chapter.xhtml#Fig33)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig33_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig33_HTML.jpg)


    图 23-33：创建 `User::LoggingLevel` 变量


    ## 配置变量映射页面


    创建并映射这些变量后，`Foreach Application Packages Variable Mappings` 页面如图 [23-34](#449652_2_En_23_Chapter.xhtml#Fig34)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig34_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig34_HTML.jpg)


    图 23-34：配置完成的 `Foreach Application Packages Variable Mappings` 页面


    点击 `OK` 按钮关闭 `Foreach Application Packages Foreach` 循环容器编辑器。


    ## 添加并配置执行任务


    下一步是向 `Foreach Application Packages Foreach` 循环容器添加一个 `Execute Catalog Package
    Task`，如图 [23-35](#449652_2_En_23_Chapter.xhtml#Fig35) 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig35_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig35_HTML.jpg)


    图 23-35：向 `Foreach Application Packages` 添加 `Execute Catalog Package Task`


    添加一个新的名为 `"Execution SSIS Catalog"` 的 `ADO.Net` 连接管理器，如图 [23-36](#449652_2_En_23_Chapter.xhtml#Fig36)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig36_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig36_HTML.jpg)


    图 23-36：`Execution SSIS Catalog` 连接管理器


    打开 `Execute Catalog Package Task Editor`，在 `General` 页面上将其重命名为 `"Execute Application
    Package"`。在 `Settings` 页面，点击 `SourceConnection` 下拉菜单并选择 `"Execute SSIS Catalog"`，如图
    [23-37](#449652_2_En_23_Chapter.xhtml#Fig37) 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig37_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig37_HTML.jpg)


    图 23-37：设置 `SourceConnection`


    通过选择一个文件夹继续配置 `Execute Catalog Package Task`，如图 [23-38](#449652_2_En_23_Chapter.xhtml#Fig38)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig38_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig38_HTML.jpg)


    图 23-38：配置 `folder` 属性


    通过选择一个项目继续配置 `Execute Catalog Package Task`，如图 [23-39](#449652_2_En_23_Chapter.xhtml#Fig39)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig39_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig39_HTML.jpg)


    图 23-39：配置 `project` 属性


    通过选择一个包继续配置 `Execute Catalog Package Task`，如图 [23-40](#449652_2_En_23_Chapter.xhtml#Fig40)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig40_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig40_HTML.jpg)


    图 23-40：配置 `package` 属性


    配置完成后，`Execute Catalog Package Task` 设置应如图 [23-41](#449652_2_En_23_Chapter.xhtml#Fig41)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig41_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig41_HTML.jpg)


    图 23-41：配置完成的 `Execute Catalog Package Task`


    ## 配置属性表达式


    为这个版本的 SSIS 框架构建执行引擎的最后一步是配置 `Execute Catalog Package Task` 的属性表达式。点击 `Expressions`
    页面，点击省略号，并将 `Execute Catalog Package Task` 属性映射到我们在配置 `Foreach Application Packages
    Variable Mappings` 页面时创建的变量。在本章前面，我们已经配置过 `Execute Catalog Package Task` 表达式（甚至配置过两次）。


    将 `Execute Catalog Package Task` 的 `PackageFolder` 属性映射到 `User::Folder` 变量。首先在
    `Property Expressions Editor` 中选择 `PackageFolder` 属性，如图 [23-42](#449652_2_En_23_Chapter.xhtml#Fig42)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig42_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig42_HTML.jpg)


    图 23-42：准备覆盖 `PackageFolder` 属性


    点击 `Expression` 文本框旁的省略号以打开 `Expression Builder`。展开 `Variables and Parameters`
    节点，然后将 `User::Folder` 拖放到 `Expression` 文本框中。点击 `Evaluate Expression` 按钮以查看 `Evaluated
    value` 文本框中的值，如图 [23-43](#449652_2_En_23_Chapter.xhtml#Fig43) 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig43_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig43_HTML.jpg)


    图 23-43：将 `User::Folder` 变量映射到 `PackageFolder` 属性


    重复上述过程映射以下属性：


    *   `PackageFolder`: `User::Folder`

    *   `PackageProject`: `User::Project`

    *   `PackageName`: `User::Package`

    *   `Synchronized`: `User::Synchronized`

    *   `MaximumRetries`: `User::MaximumRetries`

    *   `RetryIntervalSeconds`: `User::RetryIntervalSeconds`

    *   `Use32bit`: `User::Use32bit`

    *   `LoggingLevel`: `User::LoggingLevel`


    完成后，`Property Expressions Editor` 如图 [23-44](#449652_2_En_23_Chapter.xhtml#Fig44)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig44_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig44_HTML.jpg)


    图 23-44：映射完成的 `Property Expressions`


    点击 `Property Expressions Editor` 的 `OK` 按钮，然后点击 `Execute Catalog Package Task`
    的 `OK` 按钮。'
