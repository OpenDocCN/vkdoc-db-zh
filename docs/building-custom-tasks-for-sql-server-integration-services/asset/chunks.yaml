    **Assertion:** `Package`下拉列表显示了在`Project`属性中配置的SSIS目录项目中的所有可用包，且没有错误。要验证这一点，请使用`SQL
    Server Management Studio (SSMS)`连接到`SourceConnection` SQL Server实例。打开SSMS对象资源管理器并展开“Integration
