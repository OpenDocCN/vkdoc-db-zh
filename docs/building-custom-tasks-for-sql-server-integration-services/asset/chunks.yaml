    The new properties should be visually linked to the `Synchronized` property setting
    in `SettingsNode`, and the `Synchronized` property should be separated from the
    “SSIS Package Execution Properties” category in `SettingsNode`. Begin by editing
    the `Synchronized` property in `SettingsNode` to appear in its own category named
    “SSIS Package Synchronized Properties” using the code in Listing [20-1](#449652_2_En_20_Chapter.xhtml#PC1):


    ```

    [

    Category("SSIS Package Synchronized Properties"),

    Description("Enter SSIS Catalog Package SYNCHRONIZED execution parameter value.")

    ]

    public bool Synchronized {

    get { return _task.Synchronized; }

    set { _task.Synchronized = value; }

    }

    Listing 20-1

    Editing the Synchronized property category

    ```


    Once edited, the code appears as shown in Figure [20-1](#449652_2_En_20_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_20_Chapter/449652_2_En_20_Fig1_HTML.jpg](images/449652_2_En_20_Chapter/449652_2_En_20_Fig1_HTML.jpg)


    Figure 20-1: The `Synchronized` property is now in the SSIS Package Synchronized
    Properties category.


    Build the `ExecuteCatalogPackageTask` solution and then add the Execute Catalog
    Package Task to a test SSIS package. Open the Execute Catalog Package Task editor,
    and note the new location of the `Synchronized` property, as shown in Figure [20-2](#449652_2_En_20_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_20_Chapter/449652_2_En_20_Fig2_HTML.jpg](images/449652_2_En_20_Chapter/449652_2_En_20_Fig2_HTML.jpg)


    Figure 20-2: The `Synchronized` property, edited.


    The `Synchronized` property now has its own property category named “SSIS Package
    Synchronized Properties.”


    The next step is to add properties to manage the `maximumRetries`, `retryIntervalSeconds`,
    and `operationTimeoutMinutes` values.


    ### Adding MaximumRetries, RetryIntervalSeconds, and OperationTimeoutMinutes


    Add new properties to the `ExecuteCatalogPackageTask` object using the code in
    Listing [20-2](#449652_2_En_20_Chapter.xhtml#PC2):


    ```

    public int MaximumRetries { get; set; } = 29;

    public int RetryIntervalSeconds { get; set; } = 10;

    public int OperationTimeoutMinutes { get; set; } = 5;

    Listing 20-2

    Adding MaximumRetries, RetryIntervalSeconds, and OperationTimeoutMinutes properties
    to the ExecuteCatalogPackageTask class

    ```


    When added, the code appears as shown in Figure [20-3](#449652_2_En_20_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_20_Chapter/449652_2_En_20_Fig3_HTML.jpg](images/449652_2_En_20_Chapter/449652_2_En_20_Fig3_HTML.jpg)


    Figure 20-3: `MaximumRetries`, `RetryIntervalSeconds`, and `OperationTimeoutMinutes`
    properties, added to the `ExecuteCatalogPackageTask` class.


    Please note the default value for `MaximumRetries` (29) multiplied by the default
    value for `RetryIntervalSeconds` (10) equals 290. When applied to the SSIS package
    execution process, the timer will “tick” every 10 seconds 29 times before “timing
    out.” The `OperationTimeoutMinutes` default is 5, or 300 seconds. The timer operation
    timeout is greater than `MaximumRetries * RetryIntervalSeconds`, which is a good
    place to start.


    Next, surface the `MaximumRetries`, `RetryIntervalSeconds`, and `OperationTimeoutMinutes`
    properties on `SettingsNode` by adding the code in Listing [20-3](#449652_2_En_20_Chapter.xhtml#PC3)
    to the `SettingsView.cs` file:


    ```

    [

    Category("SSIS Package Synchronized Properties"),

    Description("Enter SSIS Catalog Package Maximum Retries " +

    "for the timer \"tick\" when SYNCHRONIZED is true.")

    ]

    public int MaximumRetries {

    get { return _task.MaximumRetries; }

    set { _task.MaximumRetries = value; }

    }

    [

    Category("SSIS Package Synchronized Properties"),

    Description("Enter SSIS Catalog Package Retry Interval Seconds " +

    "to wait between timer \"tick\" retries when SYNCHRONIZED is true.")

    ]

    public int RetryIntervalSeconds {

    get { return _task.RetryIntervalSeconds; }

    set { _task.RetryIntervalSeconds = value; }

    }

    [

    Category("SSIS Package Synchronized Properties"),

    Description("The SSIS Catalog Package Operation Timeout Minutes - " +

    "managed by RetryIntervalSeconds and MaximumRetires when SYNCHRONIZED is true."),

    ReadOnly(true)

    ]

    public int OperationTimeoutMinutes {

    get { return _task.OperationTimeoutMinutes; }

    set { _task.OperationTimeoutMinutes = value; }

    }

    Listing 20-3

    Surfacing the MaximumRetries, RetryIntervalSeconds, and OperationTimeoutMinutes
    properties

    ```


    Once added, the code appears as shown in Figure [20-4](#449652_2_En_20_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_20_Chapter/449652_2_En_20_Fig4_HTML.jpg](images/449652_2_En_20_Chapter/449652_2_En_20_Fig4_HTML.jpg)


    Figure 20-4: Surfacing the `MaximumRetries`, `RetryIntervalSeconds`, and `OperationTimeoutMinutes`
