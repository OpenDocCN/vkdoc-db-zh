    if (listProjects!= null)

    {

    // adds each project

    foreach (string fld in listProjects)

    {

    list.Add(fld); // Project name

    }

    // sorts the project list

    if ((list != null) && (list.Count > 0))

    {

    list.Sort();

    }

    }

    return list;

    }

