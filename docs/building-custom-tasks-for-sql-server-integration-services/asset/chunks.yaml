- fmt: "## Adding the Synchronized Property\n\nBy default, SSIS packages executed\
    \ in the SSIS Catalog execute with the Synchronized execution parameter set to\
    \ `false`. A `false` Synchronized execution parameter means the SSIS Catalog execution\
    \ engine finds and starts the SSIS package and then returns. It’s possible for\
    \ the SSIS package to continue executing – for hours or days – and then fail.\
    \ People who monitor SSIS executions must check the status of the SSIS package\
    \ execution to determine the state of the instance of execution. One good way\
    \ to monitor the state of an instance of execution for an SSIS package is to view\
    \ the SSIS Catalog All Executions and Overview reports built into SQL Server Management\
    \ Studio (SSMS).\n\nIf one desires an SSIS package execution process to remain\
    \ “in process,” or to continue to show the process as running until the instance\
    \ of execution completes, one may set the Synchronized execution parameter to\
    \ `true`. To add the Synchronized property to `SettingsNode`, we begin by adding\
    \ the code in Listing 15-4 to the `SettingsNode` class:\n\n```\n[\nCategory(\"\
    SSIS Package Execution Properties\"),\nDescription(\"Enter SSIS Catalog Package\
    \ SYNCHRONIZED execution parameter value.\")\n]\npublic bool Synchronized {\n\
    get { return _task.Synchronized; }\nset { _task.Synchronized = value; }\n}\n```\n\
    **Listing 15-4** Adding the Synchronized property to SettingsNode\n\nOnce added,\
    \ the `SettingsNode Synchronized` property code appears as shown in Figure 15-5:\n\
    \n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig5_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig5_HTML.jpg)\n\
    \n**Figure 15-5** The SettingsNode Synchronized property, implemented\n\nThe next\
    \ step is to update the `ExecuteCatalogPackageTask Execute` method to use the\
    \ value set in the Synchronized property. Editing the `Execute` method is not\
    \ as simple and straightforward as the edits to implement the `Use32bit` property;\
    \ it’s a little more involved. It all starts with a look at the `Execute` overloads\
    \ in the `ExecuteCatalogPackageTask Execute` method.\n\n### Examining Execute()\
    \ Overloads\n\nTo take a look at the available overloads for the SSIS package\
    \ `Execute` method, find the `Execute` method in the `ExecuteCatalogPackageTask`\
    \ code. Locate the line of code that calls the execution of the SSIS package –\
    \ the line that we just updated when adding the `Use32bit` property. At this time,\
    \ the line reads `catalogPackage.Execute(Use32bit, null);`. Select the opening\
    \ parenthesis and type another opening parenthesis over it to open the overload\
    \ options, as shown in Figure 15-6:\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig6_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig6_HTML.jpg)\n\
    \n**Figure 15-6** Viewing Execute overload 1 of 3\n\nBy viewing the overloads\
    \ list, we know the `Execute` function has three overloads because the overloads\
    \ tooltip tells us, “1 of 3.” We also know overload 1 of 3 takes two arguments:\n\
    \n*   A `Boolean` value named `use32RuntimeOn64` – for which we supplied our `Boolean`\
    \ property named `Use32bit`\n*   An `EnvironmentReference` value named `reference`\n\
    \nIf we click the “down arrow” to the right of the 1 of 3, we can view overload\
    \ 2 of 3, as shown in Figure 15-7:\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig7_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig7_HTML.jpg)\n\
    \n**Figure 15-7** Viewing Execute overload 2 of 3\n\nViewing the overloads argument\
    \ list for overload 2 of 3, we know this overload for the `Execute` takes three\
    \ arguments, and the first two arguments are the same as overload 1 of 3:\n\n\
    *   A `Boolean` value named `use32RuntimeOn64` – for which we supplied our `Boolean`\
    \ property named `Use32bit`\n*   An `EnvironmentReference` value named `reference`\n\
    *   A `Collection` of one or more `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet`\
    \ value(s) named `setValueParameters`\n\nThis third argument – the `collection`\
    \ of `ExecutionValueParameterSet` parameters named `setValueParameters` – is the\
    \ argument that will hold the `Synchronized` property value we are now coding.\
    \ But first, let’s look at the Execute 3 of overload.\n\nIf we click the “down\
    \ arrow” to the right of the 2 of 3, we can view Execute overload 3 of 3, as shown\
    \ in Figure 15-8:\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig8_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig8_HTML.jpg)\n\
    \n**Figure 15-8** Viewing Execute overload 3 of 3\n\nViewing the overloads argument\
    \ list for overload 3 of 3, we know this overload for the `Execute` takes four\
    \ arguments, and the first three arguments are the same as overload 2 of 3:\n\n\
    *   A `Boolean` value named `use32RuntimeOn64` – for which we supplied our `Boolean`\
    \ property named `Use32bit`\n*   An `EnvironmentReference` value named `reference`\n\
    *   A `Collection` of one or more `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet`\
    \ value(s) named `setValueParameters`\n*   A `Collection` of one or more `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.PropertyOverrideParameterSet`\
    \ value(s) named `propertyOverrideParameters`\n\nWe will use the second overload\
    \ – 2 of 3 – in this version of the `ExecuteCatalogPackageTask`.\n\nThere are\
    \ two steps to adding the `ExecutionValueParameterSet`:\n\n1.  Build the `ExecutionValueParameterSet`.\n\
    2.  Add the `ExecutionValueParameterSet` to the call to `package.Execute()`.\n\
    \n### Building the ExecutionValueParameterSet\n\nThe `ExecutionValueParameterSet`\
    \ is a collection of the `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValuearameterSet`\
    \ type. The first step is to create a function that builds and returns the `ExecutionValueParameterSet`,\
    \ using the code in Listing 15-5:\n\n```\nusing System.Collections.ObjectModel;\n\
    .\n.\n.\nprivate Collection returnExecutionValueParameterSet(Microsoft.SqlServer.Management.IntegrationServices.PackageInfo\
    \ catalogPackage)\n{\n    // initialize the parameters collection\n    Collection\
    \ executionValueParameterSet = new Collection();\n    // set SYNCHRONIZED execution\
    \ parameter\n    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\
    \ { ObjectType = 50, ParameterName = \"SYNCHRONIZED\", ParameterValue = Synchronized\
    \ });\n    return executionValueParameterSet;\n}\n```\n**Listing 15-5** Building\
    \ the returnExecutionValueParameterSet function\n\nAdd the `using System.Collections.ObjectModel;`\
    \ directive to the `ExecuteCatalogPackageTask.cs` file header, along with other\
    \ `using` directives.\n\nOnce added, the `returnExecutionValueParameterSet` function\
    \ appears as shown in Figure 15-9:\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig9_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig9_HTML.jpg)\n\
    \n**Figure 15-9** The returnExecutionValueParameterSet function\n\nThe `returnExecutionValueParameterSet`\
    \ function is declared to return a value of type `Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>`\
    \ on line 82.\n\nA new variable named `executionValueParameterSet` of `Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>`\
    \ type is created on lines 86–87.\n\nOn lines 90–92, a new `Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>`\
    \ object is initialized and added to the `executionValueParameterSet` collection.\n\
    \nOn line 94, the `executionValueParameterSet` collection is returned to the caller,\
    \ to which we now turn our attention."
  raw: '## Adding the Synchronized Property


    By default, SSIS packages executed in the SSIS Catalog execute with the Synchronized
    execution parameter set to *false*. A false Synchronized execution parameter means
    the SSIS Catalog execution engine finds and starts the SSIS package and then returns.
    It’s possible for the SSIS package to continue executing – for hours or days –
    and then fail. People who monitor SSIS executions must check the status of the
    SSIS package execution to determine the state of the instance of execution. One
    good way to monitor the state of an instance of execution for an SSIS package
    is to view the SSIS Catalog All Executions and Overview reports built into SQL
    Server Management Studio (SSMS).


    If one desires an SSIS package execution process to remain “in process,” or to
    continue to show the process as running until the instance of execution *completes*,
    one may set the Synchronized execution parameter to true. To add the Synchronized
    property to `SettingsNode`, we begin by adding the code in Listing [15-4](#449652_2_En_15_Chapter.xhtml#PC4)
    to the `SettingsNode` class:


    ```

    [

    Category("SSIS Package Execution Properties"),

    Description("Enter SSIS Catalog Package SYNCHRONIZED execution parameter value.")

    ]

    public bool Synchronized {

    get { return _task.Synchronized; }

    set { _task.Synchronized = value; }

    }

    Listing 15-4

    Adding the Synchronized property to SettingsNode

    ```


    Once added, the `SettingsNode Synchronized` property code appears as shown in
    Figure [15-5](#449652_2_En_15_Chapter.xhtml#Fig5):


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig5_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig5_HTML.jpg)


    Figure 15-5


    The SettingsNode Synchronized property, implemented


    The next step is to update the `ExecuteCatalogPackageTask Execute` method to use
    the value set in the Synchronized property. Editing the `Execute` method is not
    as simple and straightforward as the edits to implement the Use32bit property;
    it’s a little more involved. It all starts with a look at the `Execute` *statement*
    overloads in the `ExecuteCatalogPackageTask Execute` *method*.


    ### Examining Execute() Overloads


    To take a look at the available overloads for the SSIS package `Execute` method,
    find the `Execute` method in the `ExecuteCatalogPackageTask` code. Locate the
    line of code that calls the execution of the SSIS package – the line that we just
    updated when adding the Use32bit property. At this time, the line reads `catalogPackage.Execute(Use32bit,
    null);`. Select the opening parenthesis and type *another* opening parenthesis
    over it to open the overload options, as shown in Figure [15-6](#449652_2_En_15_Chapter.xhtml#Fig6):


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig6_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig6_HTML.jpg)


    Figure 15-6


    Viewing Execute overload 1 of 3


    By viewing the overloads list, we know the `Execute` function has three overloads
    because the overloads tooltip tells us, “1 of 3.” We also know overload 1 of 3
    takes two arguments:


    *   A `Boolean` value named `use32RuntimeOn64` – for which we supplied our `Boolean`
    property named `Use32bit`


    *   An `EnvironmentReference` value named `reference`


    If we click the “down arrow” to the right of the 1 of 3, we can view overload
    2 of 3, as shown in Figure [15-7](#449652_2_En_15_Chapter.xhtml#Fig7):


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig7_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig7_HTML.jpg)


    Figure 15-7


    Viewing Execute overload 2 of 3


    Viewing the overloads argument list for overload 2 of 3, we know this overload
    for the `Execute` takes three arguments, and the first two arguments are the same
    as overload 1 of 3:


    *   A `Boolean` value named `use32RuntimeOn64` – for which we supplied our `Boolean`
    property named `Use32bit`


    *   An `EnvironmentReference` value named `reference`


    *   A `Collection` of one or more `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet`
    value(s) named `setValueParameters`


    This third argument – the `collection` of `ExecutionValueParameterSet` parameters
    named `setValueParameters` – is the argument that will hold the `Synchronized`
    property value we are now coding. But first, let’s look at the Execute 3 of overload.


    If we click the “down arrow” to the right of the 2 of 3, we can view Execute overload
    3 of 3, as shown in Figure [15-8](#449652_2_En_15_Chapter.xhtml#Fig8):


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig8_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig8_HTML.jpg)


    Figure 15-8


    Viewing Execute overload 3 of 3


    Viewing the overloads argument list for overload 3 of 3, we know this overload
    for the `Execute` takes four arguments, and the first three arguments are the
    same as overload 2 of 3:


    *   A `Boolean` value named `use32RuntimeOn64` – for which we supplied our `Boolean`
    property named `Use32bit`


    *   An `EnvironmentReference` value named `reference`


    *   A `Collection` of one or more `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet`
    value(s) named `setValueParameters`


    *   A `Collection` of one or more `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.PropertyOverrideParameterSet`
    value(s) named `propertyOverrideParameters`


    We will use the second overload – 2 of 3 – in this version of the `ExecuteCatalogPackageTask`.


    There are two steps to adding the ExecutionValueParameterSet:


    1.  Build the ExecutionValueParameterSet.


    2.  Add the ExecutionValueParameterSet to the call to `package.Execute()`.


    ### Building the ExecutionValueParameterSet


    The `ExecutionValueParameterSet` is a collection of the `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValuearameterSet`
    type. The first step is to create a function that builds and returns the `ExecutionValueParameterSet`,
    using the code in Listing [15-5](#449652_2_En_15_Chapter.xhtml#PC5):


    ```

    using System.Collections.ObjectModel;

    .

    .

    .

    private Collection returnExecutionValueParameterSet(Microsoft.SqlServer.Management.IntegrationServices.PackageInfo
    catalogPackage)

    {

    // initialize the parameters collection

    Collection executionValueParameterSet = new Collection();

    // set SYNCHRONIZED execution parameter

    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet
    { ObjectType = 50, ParameterName = "SYNCHRONIZED", ParameterValue = Synchronized
    });

    return executionValueParameterSet;

    }

    Listing 15-5

    Building the returnExecutionValueParameterSet function

    ```


    Add the `using System.Collections.ObjectModel;` directive to the ExecuteCatalogPackageTask.cs
    file header, along with other `using` directives.


    Once added, the `returnExecutionValueParameterSet` function appears as shown in
    Figure [15-9](#449652_2_En_15_Chapter.xhtml#Fig9):


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig9_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig9_HTML.jpg)


    Figure 15-9


    The returnExecutionValueParameterSet function


    The returnExecutionValueParameterSet function is declared to return a value of
    type `Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>`
    on line 82.


    A new variable named `executionValueParameterSet` of `Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>`
    type is created on lines 86–87.


    On lines 90–92, a new `Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>`
    object is initialized and added to the `executionValueParameterSet` collection.


    On line 94, the `executionValueParameterSet` collection is returned to the caller,
    to which we now turn our attention.'
  trans: "## 添加同步属性\n\n默认情况下，在 SSIS 目录中执行的 SSIS 包，其 **Synchronized**（同步）执行参数设置为 `false`。`false`\
    \ 的 Synchronized 执行参数意味着 SSIS 目录执行引擎会查找并启动 SSIS 包，然后立即返回。SSIS 包可能会继续执行——持续数小时或数天——之后才失败。监控\
    \ SSIS 执行的人员必须检查 SSIS 包执行的状态，以确定执行实例的当前状态。一个监控 SSIS 包执行实例状态的好方法是，查看 SQL Server\
    \ Management Studio (SSMS) 内置的 SSIS 目录“所有执行”和“概览”报告。\n\n如果希望 SSIS 包执行过程保持“进程内”，或者持续显示为正在运行状态直到执行实例完成，可以将\
    \ **Synchronized** 执行参数设置为 `true`。为了将 **Synchronized** 属性添加到 `SettingsNode`，我们首先将清单\
    \ 15-4 中的代码添加到 `SettingsNode` 类中：\n\n```\n[\nCategory(\"SSIS 包执行属性\"),\nDescription(\"\
    输入 SSIS 目录包 SYNCHRONIZED 执行参数值。\")\n]\npublic bool Synchronized {\nget { return\
    \ _task.Synchronized; }\nset { _task.Synchronized = value; }\n}\n```\n**清单 15-4**\
    \ 将 Synchronized 属性添加到 SettingsNode\n\n添加后，`SettingsNode Synchronized` 属性代码如图\
    \ 15-5 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig5_HTML.jpg](img/449652_2_En_15_Fig5_HTML.jpg)\n\
    \n**图 15-5** 已实现的 SettingsNode Synchronized 属性\n\n下一步是更新 `ExecuteCatalogPackageTask\
    \ Execute` 方法，以使用 **Synchronized** 属性中设置的值。编辑 `Execute` 方法不像实现 `Use32bit` 属性那样简单直接；它稍微复杂一些。首先，我们需要查看\
    \ `ExecuteCatalogPackageTask Execute` 方法中的 `Execute` 重载。\n\n### 检查 Execute() 重载\n\
    \n要查看 SSIS 包 `Execute` 方法的可用重载，请在 `ExecuteCatalogPackageTask` 代码中找到 `Execute`\
    \ 方法。定位调用执行 SSIS 包的那行代码——即我们刚才在添加 `Use32bit` 属性时更新过的那一行。此时，该行代码为 `catalogPackage.Execute(Use32bit,\
    \ null);`。选择左括号并再次键入一个左括号，以打开重载选项，如图 15-6 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig6_HTML.jpg](img/449652_2_En_15_Fig6_HTML.jpg)\n\
    \n**图 15-6** 查看重载 1/3\n\n通过查看重载列表，我们知道 `Execute` 函数有三个重载，因为重载工具提示显示“1/3”。我们还知道第一个重载接受两个参数：\n\
    \n*   一个名为 `use32RuntimeOn64` 的 `Boolean` 值——我们已提供了名为 `Use32bit` 的 `Boolean` 属性作为其值。\n\
    *   一个名为 `reference` 的 `EnvironmentReference` 值。\n\n如果我们点击“1/3”右侧的“下箭头”，可以查看第二个重载（2/3），如图\
    \ 15-7 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig7_HTML.jpg](img/449652_2_En_15_Fig7_HTML.jpg)\n\
    \n**图 15-7** 查看重载 2/3\n\n查看第二个重载（2/3）的参数列表，我们知道此 `Execute` 重载接受三个参数，前两个参数与第一个重载（1/3）相同：\n\
    \n*   一个名为 `use32RuntimeOn64` 的 `Boolean` 值——我们已提供了名为 `Use32bit` 的 `Boolean` 属性作为其值。\n\
    *   一个名为 `reference` 的 `EnvironmentReference` 值。\n*   一个或多个 `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet`\
    \ 值的 `Collection`，名为 `setValueParameters`。\n\n这第三个参数——名为 `setValueParameters`\
    \ 的 `ExecutionValueParameterSet` 参数集合——将是存放我们现在正在编码的 `Synchronized` 属性值的参数。但首先，让我们看看第三个重载。\n\
    \n如果我们点击“2/3”右侧的“下箭头”，可以查看第三个重载（3/3），如图 15-8 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig8_HTML.jpg](img/449652_2_En_15_Fig8_HTML.jpg)\n\
    \n**图 15-8** 查看重载 3/3\n\n查看第三个重载（3/3）的参数列表，我们知道此 `Execute` 重载接受四个参数，前三个参数与第二个重载（2/3）相同：\n\
    \n*   一个名为 `use32RuntimeOn64` 的 `Boolean` 值——我们已提供了名为 `Use32bit` 的 `Boolean` 属性作为其值。\n\
    *   一个名为 `reference` 的 `EnvironmentReference` 值。\n*   一个或多个 `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet`\
    \ 值的 `Collection`，名为 `setValueParameters`。\n*   一个或多个 `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.PropertyOverrideParameterSet`\
    \ 值的 `Collection`，名为 `propertyOverrideParameters`。\n\n我们将在此版本的 `ExecuteCatalogPackageTask`\
    \ 中使用第二个重载（2/3）。\n\n添加 `ExecutionValueParameterSet` 有两个步骤：\n\n1.  构建 `ExecutionValueParameterSet`。\n\
    2.  将 `ExecutionValueParameterSet` 添加到对 `package.Execute()` 的调用中。\n\n### 构建 ExecutionValueParameterSet\n\
    \n`ExecutionValueParameterSet` 是 `Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet`\
    \ 类型的一个集合。第一步是创建一个函数来构建并返回 `ExecutionValueParameterSet`，使用清单 15-5 中的代码：\n\n```\n\
    using System.Collections.ObjectModel;\n.\n.\n.\nprivate Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>\
    \ returnExecutionValueParameterSet(Microsoft.SqlServer.Management.IntegrationServices.PackageInfo\
    \ catalogPackage)\n{\n    // 初始化参数集合\n    Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>\
    \ executionValueParameterSet = new Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>();\n\
    \    // 设置 SYNCHRONIZED 执行参数\n    executionValueParameterSet.Add(new Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet\
    \ { ObjectType = 50, ParameterName = \"SYNCHRONIZED\", ParameterValue = Synchronized\
    \ });\n    return executionValueParameterSet;\n}\n```\n**清单 15-5** 构建 returnExecutionValueParameterSet\
    \ 函数\n\n将 `using System.Collections.ObjectModel;` 指令添加到 `ExecuteCatalogPackageTask.cs`\
    \ 文件头部，与其他 `using` 指令放在一起。\n\n添加后，`returnExecutionValueParameterSet` 函数如图 15-9\
    \ 所示：\n\n![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig9_HTML.jpg](img/449652_2_En_15_Fig9_HTML.jpg)\n\
    \n**图 15-9** returnExecutionValueParameterSet 函数\n\n第 82 行声明 `returnExecutionValueParameterSet`\
    \ 函数返回类型为 `Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>`\
    \ 的值。\n\n第 86-87 行创建了一个名为 `executionValueParameterSet` 的 `Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>`\
    \ 类型的新变量。\n\n第 90-92 行，初始化了一个新的 `Collection<Microsoft.SqlServer.Management.IntegrationServices.PackageInfo.ExecutionValueParameterSet>`\
    \ 对象并将其添加到 `executionValueParameterSet` 集合中。\n\n第 94 行，`executionValueParameterSet`\
    \ 集合被返回给调用者，现在我们将注意力转向调用者。"
- fmt: '### 调用 `returnExecutionValueParameterSet` 函数


    回到 `ExecuteCatalogPackageTask Execute` 方法，用清单 [15-6](#449652_2_En_15_Chapter.xhtml#PC6)
    中的代码覆盖 `catalogPackage.Execute(Use32bit, null);` 语句：


    ```

    Collection executionValueParameterSet = returnExecutionValueParameterSet();

    catalogPackage.Execute(Use32bit, null, executionValueParameterSet);

    Listing 15-6

    Updating package.Execute()

    ```


    编辑完成后，`ExecuteCatalogPackageTask Execute` 方法末尾附近的代码如图 [15-10](#449652_2_En_15_Chapter.xhtml#Fig10)
    所示：


    ![../images/449652_2_En_15_Chapter/449652_2_En_15_Fig10_HTML.jpg](images/449652_2_En_15_Chapter/449652_2_En_15_Fig10_HTML.jpg)


    图 15-10

    `Package.Execute()`，更新后用于配置和使用执行参数


    下一步是向 `SettingsNode` 添加 `Synchronized` 属性。


    ### 向 `SettingsView` 添加 `Synchronized` 属性


    要向 `SettingsNode` 添加 `Synchronized` 属性，首先将清单 [15-7](#449652_2_En_15_Chapter.xhtml#PC7)
    中的代码添加到 `SettingsNode` 类：


    ```

    [

    Category("SSIS Package Execution Properties"),

    Description("Enter SSIS Catalog Package SYNCHRONIZED execution parameter value.")

    ]

    public bool Synchronized {

    get { return _task.Synchronized; }

    set { _task.Synchronized = value; }

    }

    Listing 15-7

    Adding the Synchronized property to SettingsNode

    ```


    添加后，`SettingsNode Synchronized` 属性代码如图 [15-11](#449652_2_En_15_Chapter.xhtml#Fig11)
