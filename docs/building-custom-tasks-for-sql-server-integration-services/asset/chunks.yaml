    The next step is to use the values of the `MaximumRetries` and `RetryIntervalSeconds`
    properties to manage the `OperationTimeoutMinutes` property. The `OperationTimeoutMinutes`
    property value is set by multiplying `maximumRetries` * `retryIntervalSeconds`
    to calculate projected execution seconds, and then the execution seconds value
    is stored in a variable named `retriesTimesIntervalSeconds`. The value of OperationTimeoutMinutes
    is calculated by dividing the value of the `retriesTimesIntervalSeconds` variable
    by 60, converting the result to an `int` value, and then adding 1 for good measure.
    Configure the `propertyGridSettings_PropertyValueChanged` method to respond to
    a change in either the `MaximumRetires` or the `RetryIntervalSeconds` property
    and trigger recalculation of the OperationTimeoutMinutes property value using
    the code in Listing [20-4](#449652_2_En_20_Chapter.xhtml#PC4):


    ```

    if ((e.ChangedItem.PropertyDescriptor.Name.CompareTo("MaximumRetries") == 0)

    || (e.ChangedItem.PropertyDescriptor.Name.CompareTo("RetryIntervalSeconds") ==
    0))

    {

    int retriesTimesIntervalSeconds = settingsNode.MaximumRetries

    * settingsNode.RetryIntervalSeconds;

    int operationTimeoutSeconds = settingsNode.OperationTimeoutMinutes * 60;

    settingsNode.OperationTimeoutMinutes = (int)((retriesTimesIntervalSeconds / 60)
    + 1);

    this.settingsPropertyGrid.Refresh();

    }

