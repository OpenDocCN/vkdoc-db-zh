    如果“Execute Catalog Package Task”在 SSIS 工具箱中可用，你应该能够在服务器上的 SSIS 中配置该任务。


    ## 故障排除安装


    生成安装文件可能很棘手。本节提供三个有用的故障排除技巧。


    重要的是要记住，在你的企业数据集成生命周期中的每个服务器上安装“Execute Catalog Package Task”。将 SSIS 包部署到未安装“Execute
    Catalog Package Task”的服务器将导致类似于以下错误：“`加载包时出错：无法从 XML 为任务 "Execute Catalog Package
    Task" 创建任务，类型 "ExecuteCatalogPackageTask.ExecuteCatalogPackageTask, ExecuteCatalogPackageTask,
    Version=1.0.0.0, Culture=neutral, PublicKeyToken=e86e33313a45419e"，原因是错误 0x80070057
    "参数不正确。"`”。在未安装“Execute Catalog Package Task”的服务器上打开 SSIS 包时，SSIS 项目会抛出错误，并且“Execute
    Catalog Package Task”将显示如图 22-51 所示：


    ![../images/449652_2_En_22_Chapter/449652_2_En_22_Fig51_HTML.jpg](img/449652_2_En_22_Fig51_HTML.jpg)

    图 22-51 在未安装“Execute Catalog Package Task”的服务器上打开配置了“Execute Catalog Package Task”的
    SSIS 包


    请注意图 22-51 中的通用 SSIS 包任务徽标（圆圈）。


    ### 记录安装


    你可以使用类似于清单 22-17 所示的命令来记录安装：


    ```

    msiexec /i ExecuteCatalogPackageTask.msi /l*v ECPT_Installation_Log.txt

    ```

    清单 22-17 记录 msi 文件执行


    执行安装后，你可以查看日志文件的内容。

