    ## Conclusion


    The reader is encouraged to learn more about using the WiX Toolset at `wixtoolset.org`
    where one may find in-depth documentation and examples at `wixtoolset.org/documentation`.


    The next step is to use the Execute Catalog Package Task in an enterprise data
    engineering framework solution.


    Now would be an excellent time to check in your code.


    # 23. Using the Execute Catalog Package Task in an SSIS Framework


    In the book titled *SQL Server Data Automation Through Frameworks: Building Metadata-Driven
    Frameworks with T-SQL, SSIS, and Azure Data Factory* (`amazon.com/Server-Data-Automation-Through-Frameworks/dp/1484262123`),
    Kent Bradshaw and I describe and demonstrate data frameworks that execute stored
    procedures and SSIS packages. Kent shares a metadata-driven stored procedure-based
    framework that executes other stored procedures and records execution report data.
    I share an SSIS framework that executes SSIS packages stored in on-premises file
    systems and a variation that executes SSIS packages stored in Azure file shares.
    Like Kent’s stored procedure-based framework, both SSIS frameworks are metadata-driven
    and record execution metadata. The on-premises version of the SSIS framework uses
    an SSIS package as the framework “engine.” The Azure-SSIS version is driven by
    two Azure Data Factory pipelines.


    In this chapter, we use the `Execute Catalog Package Task` to build a metadata-driven
    SSIS Catalog-based SSIS framework. The framework we will build is similar to the
    on-premises version of the SSIS framework in the *SQL Server Data Automation Through
    Frameworks* book and is also similar to SSIS Framework Community Edition (`dilmsuite.com/ssis-framework-community-edition`)
    – a free and open source project that is part of the collection of utilities that
    make up the Data Integration Lifecycle Management Suite (`dilmsuite.com`).


    The SSIS framework we build in this chapter has additional functionality, however:
    the ability to start package executions serially *or* start executions in parallel
    (well, *nearly* in parallel). It’s possible to achieve parallelism in the other
    framework versions; you just need to build an (additional) SSIS package or ADF
    pipeline to manage parallel-execution orchestration. The `Execute Catalog Package
    Task` surfaces a `Synchronized` property, which means our framework can store
    values for the `Synchronized` property in metadata; no extra SSIS package required.
    As with all engineering, there is no free lunch. The word “start” in an earlier
    sentence is carefully chosen; the desired design *may* revolve around the *completions*
    of SSIS package parallel executions.


    We begin with an examination of an SSIS package that revolves around SSIS package
    parallel execution completions.'
