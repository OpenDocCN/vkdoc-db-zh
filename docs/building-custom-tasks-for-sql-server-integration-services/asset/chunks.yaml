    # 测试执行


    在测试流程的这个节点，我们切换一下工作模式。虽然我非常热衷于手动软件测试，并喜欢用“测试术语”记录测试结果以便后人查阅，但并非所有人都像我一样对此充满热情。从这里开始，我们将切换到**散文体**表述。


