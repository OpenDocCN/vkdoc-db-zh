- fmt: "## Refactor Connection Identification\n\n### 添加连接属性\nConnection manager identification\
    \ is vital – especially when the connection string property is managed dynamically\
    \ or overridden at execution time. The first step in refactoring connection identification\
    \ is to add connection-related properties to the `ExecuteCatalogPackageTask` code\
    \ using the code in Listing 16-1:\n\n```csharp\npublic Connections Connections;\n\
    public string ConnectionManagerId { get; set; } = String.Empty;\npublic int ConnectionManagerIndex\
    \ { get; set; } = -1;\n// Listing 16-1\n// Adding Connections, ConnectionManagerIndex,\
    \ and ConnectionManagerId to the ExecuteCatalogPackageTask class\n```\n\nOnce\
    \ added, the code appears as shown in Figure 16-10:\n\n![Figure 16-10](images/449652_2_En_16_Chapter/449652_2_En_16_Fig10_HTML.jpg)\n\
    \n*Figure 16-10: Connections, ConnectionManagerId, and ConnectionManagerIndex\
    \ added to the ExecuteCatalogPackageTask class*\n\n### 初始化 Connections 变量\nInitialize\
    \ the `Connections` variable by adding the code in Listing 16-2 to the `ExecuteCatalogPackageTask.InitializeTask`\
    \ method:\n\n```csharp\n// init Connections\nConnections = connections;\n// Listing\
    \ 16-2\n// Initializing Connections\n```\n\nOnce added, the `ExecuteCatalogPackageTask.InitializeTask`\
    \ method appears as shown in Figure 16-11:\n\n![Figure 16-11](images/449652_2_En_16_Chapter/449652_2_En_16_Fig11_HTML.jpg)\n\
    \n*Figure 16-11: The ExecuteCatalogPackageTask.InitializeTask method, updated*\n\
    \n### 创建 returnConnectionManagerIndex 方法\nInitialize the `ConnectionManagerIndex`\
    \ property value by creating the `returnConnectionManagerIndex` method using the\
    \ code in Listing 16-3:\n\n```csharp\nprivate int returnConnectionManagerIndex(Connections\
    \ connections\n, string connectionManagerName)\n{\n    int ret = -1;\n    try\n\
    \    {\n        ConnectionManagerId = GetConnectionID(connections, ConnectionManagerName);\n\
    \        Microsoft.SqlServer.Dts.Runtime.ConnectionManager connectionManager =\
    \ connections[ConnectionManagerId];\n        ConnectionManagerName = connectionManager.Name;\n\
    \        if (connectionManager != null)\n        {\n            for (int i = 0;\
    \ i <= connections.Count; i++)\n            {\n                if (connections[i].Name\
    \ == connectionManager.Name)\n                {\n                    ret = i;\n\
    \                    break;\n                }\n            }\n        }\n   \
    \ }\n    catch (Exception ex)\n    {\n        string message = \"Unable to locate\
    \ connection manager: \" + ConnectionManagerName;\n        throw new Exception(message,\
    \ ex.InnerException);\n    }\n    return ret;\n}\n// Listing 16-3\n// The returnConnectionManagerIndex\
    \ method\n```\n\nOnce added, the `returnConnectionManagerIndex` method appears\
    \ as shown in Figure 16-12:\n\n![Figure 16-12](images/449652_2_En_16_Chapter/449652_2_En_16_Fig12_HTML.jpg)\n\
    \n*Figure 16-12: The returnConnectionManagerIndex method*\n\nExamining the code\
    \ shown in Figure 16-12, a return variable named `ret` of the `int` type is declared\
    \ and initialized to `-1` on line 97. A `try`-`catch` block spans lines 99–121,\
    \ after which – on line 123 – the value of the `ret` variable is returned from\
    \ the `returnConnectionManagerIndex` method. On line 101, the code attempts to\
    \ set the value of the `ExecuteCatalogPackageTask.ConnectionManagerId` `string`\
    \ type property by calling the `GetConnectionID` method included in the `Microsoft.SqlServer.Dts.Runtime.Task`\
    \ object methods. On line 102, a variable named `connectionManager`, of the `Microsoft.SqlServer.Dts.Runtime.ConnectionManager`\
    \ type, is declared and initialized using the value of the `ConnectionManagerId`\
    \ property to identify a member of the `connections` collection. On line 103,\
    \ the value of the `ConnectionManagerName` property is set (or reset) to the name\
    \ of the `connectionManager` object using `connectionManager.Name`. An `if` condition\
    \ starts on line 105 and verifies the `connectionManager` object is not `null`.\
    \ If the `connectionManager` object is not `null`, a `for` loop starts on line\
    \ 107. The `for` loop iterates the number of `connections`. On line 109, an `if`\
    \ condition uses the iterator `i` to compare the value of the `Name` property\
    \ of the currently iterating connection – `connection(i).Name` – to the value\
    \ of the `connectionManager.Name` property. If the value of the `connection(i).Name`\
    \ equals the value of the `connectionManager.Name` property, the value of the\
    \ `ret` variable is set to the current value of the iterator, `i`.\n\n### 设置 ConnectionManagerIndex\
    \ 属性\nTo set the value of the `ConnectionManagerIndex` property, add a call to\
    \ the `returnConnectionManagerIndex` method in the `ExecuteCatalogPackageTask.Execute`\
    \ method using the code in Listing 16-4:\n\n```csharp\nConnectionManagerIndex\
    \ = returnConnectionManagerIndex(connections, ConnectionManagerName);\n// Listing\
    \ 16-4\n// Calling the returnConnectionManagerIndex method\n```\n\nOnce added,\
    \ the code appears as shown in Figure 16-13:\n\n![Figure 16-13](images/449652_2_En_16_Chapter/449652_2_En_16_Fig13_HTML.jpg)\n\
    \n*Figure 16-13: Calling returnConnectionManagerIndex in the ExecuteCatalogPackageTask.Execute\
    \ method*\n\nSetting the `ConnectionManagerIndex` property value in this manner\
    \ supports property management by expressions, which we will cover later."
