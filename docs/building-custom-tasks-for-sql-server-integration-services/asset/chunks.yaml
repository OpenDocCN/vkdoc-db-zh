- fmt: '# The Folder Property and Folders Collection


    The relationship between the `Folder` property and the `Folders` collection is
    similar to the relationship between the `SourceConnection` property and the connections
    collection. One difference is the connections collection is passed to the task
    from the SSIS package hosting the Execute Catalog Package Task. Our code sets
    the value of a `Connections` property in the `ExecuteCatalogPackageTask.InitializeTask`
    method (see Figures [16-10](#449652_2_En_16_Chapter.xhtml#Fig10) and [16-11](https://doi.org/10.1007/978-1-4842-6482-9_16Fig#11)
    in Chapter [16](#449652_2_En_16_Chapter.xhtml)). The SSIS package is unaware of
    a collection of SSIS Catalog Folders. We must, therefore, manage the collection
    of SSIS Catalog Folders in our code.


    ## Adding the Folder Property


    Add a new `Folder` property to the `SettingsNode` class using the code in Listing
    [17-2](#449652_2_En_17_Chapter.xhtml#PC2):


    ```

    [

    Category("SSIS Catalog Package Properties"),

    Description("Select SSIS Catalog Package folder name."),

    TypeConverter(typeof(Folders))

    ]

    public string Folder {

    get { return _task.PackageFolder; }

    set {

    if (value == null)

    {

    throw new ApplicationException("Folder name cannot be empty");

    }

    _task.PackageFolder = value;

    }

    }

    Listing 17-2

    Add the SettingsNode.Folder property

    ```


    Once added, the code appears as shown in Figure [17-2](#449652_2_En_17_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig2_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig2_HTML.jpg)


    Figure 17-2

    Adding the `SettingsNode.Folder` property


    Note the `Folders` `TypeConverter` has a red squiggly line beneath it, indicating
    an error condition. In this case, the `Folders` `TypeConverter` does not yet exist.


    ## Adding the Folders TypeConverter


    Add the `Folders` `TypeConverter` – modeled after the `LoggingLevels` `TypeConverter`
    – using the code in Listing [17-3](#449652_2_En_17_Chapter.xhtml#PC3):


    ```

    internal class Folders : StringConverter

    {

    private object GetSpecializedObject(object contextInstance)

    {

    DTSLocalizableTypeDescriptor typeDescr = contextInstance as DTSLocalizableTypeDescriptor;

    if (typeDescr == null)

    {

    return contextInstance;

    }

    return typeDescr.SelectedObject;

    }

    public override StandardValuesCollection GetStandardValues(ITypeDescriptorContext
    context)

    {

    object retrievalObject = GetSpecializedObject(context.Instance) as object;

    return new StandardValuesCollection(getFolders(retrievalObject));

    }

    public override bool GetStandardValuesExclusive(ITypeDescriptorContext context)

    {

    return true;

    }

    public override bool GetStandardValuesSupported(ITypeDescriptorContext context)

    {

    return true;

    }

    private ArrayList getFolders(object retrievalObject)

    {

    SettingsNode node = (SettingsNode)retrievalObject;

    ArrayList list = new ArrayList();

    ArrayList listFolders;

    listFolders = (ArrayList)node.Folders;

    if (listFolders == null)

    {

    listFolders = new ArrayList();

    }

    if (listFolders != null)

    {

    // adds each folder

    foreach (string fld in listFolders)

    {

    list.Add(fld); // Folder name

    }

    // sorts the folder list

    if ((list != null) && (list.Count > 0))

    {

    list.Sort();

    }

    }

    return list;

    }

    }

    Listing 17-3

    The Folders TypeConverter

    ```


