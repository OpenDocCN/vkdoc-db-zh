  trans: "### 更新 Execute 方法\n\n为了继续我们的重构工作，请更新`Execute`方法中声明的变量，以使用并初始化新的内部任务属性。\n\
    \n`Execute`方法的当前状态列于代码清单 10-3，并如图 10-6 所示：\n\n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig6_HTML.jpg](img/449652_2_En_10_Fig6_HTML.jpg)\n\
    *图 10-6：Execute 方法的当前版本*\n\n```\npublic override DTSExecResult Execute(\n    Connections\
    \ connections,\n    VariableDispenser variableDispenser,\n    IDTSComponentEvents\
    \ componentEvents,\n    IDTSLogging log,\n    object transaction)\n{\n    Server\
    \ catalogServer = new Server(ServerName);\n    IntegrationServices integrationServices\
    \ = new IntegrationServices(catalogServer);\n    Catalog catalog = integrationServices.Catalogs[PackageCatalogName];\n\
    \    CatalogFolder catalogFolder = catalog.Folders[PackageFolder];\n    ProjectInfo\
    \ catalogProject = catalogFolder.Projects[PackageProject];\n    Microsoft.SqlServer.Management.IntegrationServices.PackageInfo\
    \ catalogPackage = catalogProject.Packages[PackageName];\n    catalogPackage.Execute(false,\
    \ null);\n    return DTSExecResult.Success;\n}\n```\n*代码清单 10-3：当前的 Execute 方法*\n\
    \n我们希望在`Execute`方法中初始化新的类作用域变量，因此需要移除类型声明。更新类型声明和初始化代码以*移除*类型声明，如代码清单 10-4 所示：\n\
    \n```\ncatalogServer = new Server(ServerName);\nintegrationServices = new IntegrationServices(catalogServer);\n\
    catalog = integrationServices.Catalogs[PackageCatalogName];\ncatalogFolder = catalog.Folders[PackageFolder];\n\
    catalogProject = catalogFolder.Projects[PackageProject];\ncatalogPackage = catalogProject.Packages[PackageName];\n\
    ```\n*代码清单 10-4：移除 Execute 方法中的变量类型声明*\n\n在我们扩展 Execute Catalog Package Task 功能的努力中，此刻可以通过构建解决方案并测试任务来进行验证（参见第\
    \ 9 章，“构建任务”和“测试任务”部分）。这是对我们修改`Execution`方法的一个良好测试。\n\n## 添加新的编辑器\n\n本章引言中的两个要点是：\n\
    \n*   为任务用户提供更“SSIS 风格”的体验，包括一个带有“常规”和“设置”页面“视图”的“漂亮”编辑器。\n*   支持使用 SSIS 表达式。\n\
    \n在继续本节内容之前，作者要向 Kirk Haselden 致以谢意，感谢他出色的早期 SSIS 著作《Microsoft SQL Server 2005\
    \ Integration Services》（amazon.com/Microsoft-Server-2005-Integration-Services-dp-0672327813/dp-0672327813），Sams\
    \ 出版社，2006 年。\n\n我认识许多人都是通过 Kirk 的书学习自定义 SSIS 任务的。\n\n谢谢你，Kirk！\n\n### 复杂用户界面概述\n\
    \n本书的这一部分内容难度较高且深入。复杂 UI 的核心是`Microsoft.DataTransformationServices.Controls`程序集。继承自`Microsoft.DataTransformationServices.Controls`程序集具有挑战性，并且可能不够直观。尽管如此，`Microsoft.DataTransformationServices.Controls`程序集所呈现的功能，绝对值得花费时间去克服任何挑战并应对其非直观性。\n\
    \n`Microsoft.DataTransformationServices.Controls`程序集要求开发*视图*，当我们打开任务编辑器时，SSIS\
    \ 开发者就会遇到这些视图。每个视图代表一组高级别的任务属性集合。视图列在编辑器的左侧，如图 10-7 中绿色框所示：\n\n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig7_HTML.jpg](img/449652_2_En_10_Fig7_HTML.jpg)\n\
    *图 10-7：执行 SQL 任务的“常规”页面*\n\n每个视图的底层是一个*节点*，定义为一个内部的 C#类，为每个视图实例化。每个节点呈现一个`PropertyGrid`控件，如图\
    \ 10-7 中蓝色框内所示。\n\n一个节点管理按属性类别组织的任务属性集合。每个任务属性都是节点类中的一个 C#属性。我们稍后将构建的一个例子是常规视图（General\
    \ view）中常规节点（General node）的`Name`属性。这段代码代表了一种 视图 ➤ 节点 ➤ 属性类别 ➤ 属性 的层次结构。代码流程如代码清单\
    \ 10-5 所示：\n\n```\nnamespace ExecuteCatalogPackageTaskComplexUI\n{\n    public\
    \ partial class GeneralView\n    {\n        private GeneralNode generalNode =\
    \ null;\n    }\n    internal class GeneralNode\n    {\n        [\n           \
    \ Category(\"General\"),\n            Description(\"Specifies the name of the\
    \ task.\")\n        ]\n        public string Name\n        {\n            get\
    \ { return taskHost.Name; }\n            set { taskHost.Name = value; }\n    \
    \    }\n    }\n}\n```\n*代码清单 10-5：常规视图、常规节点、Name 属性的部分代码列表*\n\n代码清单 10-5 部分列表中所示的\
    \ 视图 ➤ 节点 ➤ 属性类别 ➤ 属性 层次结构，始于名为`GeneralView`的视图。`GeneralView`声明了一个`GeneralNode`类型的私有成员，名为`generalNode`。`GeneralNode`类包含一个名为`Name`的字符串类型属性。`Name`属性使用`Category`和`Description`特性进行修饰，其中`Category`特性包含了属性类别的名称（\"\
    General\"）。\n\n图 10-8 展示了执行 SQL 任务编辑器的层次结构。如前所述，常规视图（左侧绿框中）显示常规节点——由`propertygrid`控件（右侧蓝框中）表示。名为“General”的属性类别显示在红框中。`Name`属性显示在黄框内，如图\
    \ 10-8 所示：\n\n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig8_HTML.jpg](img/449652_2_En_10_Fig8_HTML.jpg)\n\
    *图 10-8：可视化 视图 ➤ 节点 ➤ 属性类别 ➤ 属性*\n\n应用到 视图 ➤ 节点 ➤ 属性类别 ➤ 属性 层次结构中，执行 SQL 任务编辑器（如图\
    \ 10-8 所示）的实体名称如下：常规（视图） ➤ 常规（节点） ➤ 常规（属性类别） ➤ 名称（属性）。这里有很多“常规”——其中一个（常规节点）隐藏在`propertygrid`控件之下。"
- fmt: "# 10. Adding the Editor Project\n\n## Adding the Editor Project\n\nTo begin\
    \ adding a new editor, add a new project to the `ExecuteCatalogPackageTask` Visual\
    \ Studio solution by right-clicking the solution in Solution Explorer, hovering\
    \ over “Add,” and then clicking “New project…,” as shown in Figure [10-9](#449652_2_En_10_Chapter.xhtml#Fig9):\n\
    \n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig9_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig9_HTML.jpg)\n\
    \nFigure 10-9: Adding a new project\n\nWhen the “Create a new project” window\
    \ displays, search for, and then select, a C# Class Library (.Net Framework) project\
    \ type, or in the .Net language of your choosing. I chose C# for the language\
    \ and named the project `ExecuteCatalogPackageTask` as shown in Figure [10-10](#449652_2_En_10_Chapter.xhtml#Fig10):\n\
    \n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig10_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig10_HTML.jpg)\n\
    \nFigure 10-10: Selecting a project type\n\nSelect “Class Library (.NET Framework)”\
    \ and click the Next button.\n\nWhen the “Configure your new project” window displays,\
    \ enter “`ExecuteCatalogPackageTaskComplexUI` ”as the name for the new project,\
    \ and set the project files location as shown in Figure [10-11](#449652_2_En_10_Chapter.xhtml#Fig11):\n\
    \n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig11_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig11_HTML.jpg)\n\
    \nFigure 10-11: Configuring and naming the new project\n\nClick the Create button\
    \ to add the new `ExecuteCatalogPackageTaskComplexUI` project.\n\nTo remove the\
    \ existing `ExecuteCatalogPackageTaskUI` project, right-click the `ExecuteCatalogPackageTaskUI`\
    \ project in Solution Explorer, and then click “Remove,” as shown in Figure [10-12](#449652_2_En_10_Chapter.xhtml#Fig12):\n\
    \n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig12_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig12_HTML.jpg)\n\
    \nFigure 10-12: Removing the `ExecuteCatalogPackageTaskUI` project\n\nIn Solution\
    \ Explorer, rename the `ExecuteCatalogPackageTaskComplexUI` project’s `Class1.cs`\
    \ file “`ExecuteCatalogPackageTaskComplexUI`,” as shown in Figure [10-13](#449652_2_En_10_Chapter.xhtml#Fig13):\n\
    \n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig13_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig13_HTML.jpg)\n\
    \nFigure 10-13: Renaming `Class1.cs` to `ExecuteCatalogPackageTaskComplexUI.cs`\n\
    \nVisual Studio will prompt, asking if you would also like to rename all references\
    \ to “`Class1`” in the project, as shown in Figure [10-14](#449652_2_En_10_Chapter.xhtml#Fig14):\n\
    \n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig14_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig14_HTML.jpg)\n\
    \nFigure 10-14: Prompting to rename all `Class1` references to `ExecuteCatalogPackageTaskComplexUI`\n\
    \nClick the Yes button. Note the `public class Class1` declaration in the `ExecuteCatalogPackageTaskComplexUI.cs`\
    \ file now reads `public class ExecuteCatalogPackageTaskComplexUI`, as shown in\
    \ Figure [10-15](#449652_2_En_10_Chapter.xhtml#Fig15):\n\n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig15_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig15_HTML.jpg)\n\
    \nFigure 10-15: `Class1` is now `ExecuteCatalogPackageTaskComplexUI`\n\nThe `ExecuteCatalogPackageTaskComplexUI`\
    \ class is now ready for references and additional coding.\n\n## Using Referenced\
    \ Assemblies\n\nTo access the assemblies referenced in the previous section, add\
    \ the `using` statements shown in Listing [10-6](#449652_2_En_10_Chapter.xhtml#PC6)\
    \ near the existing using statements in the `ExecuteCatalogPackageTaskComplexUI`\
    \ class:\n\n```\nusing Microsoft.SqlServer.Dts.Runtime;\nusing Microsoft.SqlServer.Dts.Runtime.Design;\n\
    using System.Windows.Forms;\nListing 10-6: Use the referenced assemblies\n```\n\
    \nOnce added, the `ExecuteCatalogPackageTaskComplexUI` class should appear as\
    \ shown in Figure [10-20](#449652_2_En_10_Chapter.xhtml#Fig20):\n\n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig20_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig20_HTML.jpg)\n\
    \nFigure 10-20: `ExecuteCatalogPackageTaskComplexUI` class after adding additional\
    \ using statements\n\nNext, inherit the `IDtsTaskUI` interface by editing the\
    \ `ExecuteCatalogPackageTaskComplexUI` class declaration so it appears as shown\
    \ in Listing [10-7](#449652_2_En_10_Chapter.xhtml#PC7) and Figure [10-21](#449652_2_En_10_Chapter.xhtml#Fig21):\n\
    \n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig21_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig21_HTML.jpg)\n\
    \nFigure 10-21: `ExecuteCatalogPackageTaskComplexUI` inheriting `IDtsTaskUI`\n\
    \n```\npublic class ExecuteCatalogPackageTaskComplexUI : IDtsTaskUI\nListing 10-7:\
    \ `ExecuteCatalogPackageTaskComplexUI` inheriting `IDtsTaskUI`\n```\n\nWhen implemented,\
    \ the class should appear as shown in Figure [10-21](#449652_2_En_10_Chapter.xhtml#Fig21).\n\
    \nThe red squiggly line beneath `IDtsTaskUI` in Figure [10-21](#449652_2_En_10_Chapter.xhtml#Fig21)\
    \ indicates the inherited interface is not correctly – or *completely*, in this\
    \ case – implemented. Click the line and then expand Quick Actions to view the\
    \ issues, as shown in Figure [10-22](#449652_2_En_10_Chapter.xhtml#Fig22):\n\n\
    ![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig22_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig22_HTML.jpg)\n\
    \nFigure 10-22: `IDtsTaskUI` implementation issues\n\nClicking the “Implement\
    \ interface” option will implement a barebones version of the required interface\
    \ members, as shown in Figure [10-23](#449652_2_En_10_Chapter.xhtml#Fig23):\n\n\
    ![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig23_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig23_HTML.jpg)\n\
    \nFigure 10-23: The `IDtsTaskUI` interface with members implemented\n\nEach member\
    \ is implemented to throw an exception by default. Please note the red squiggly\
    \ line is no longer present beneath `IDtsTaskUI`.\n\n## Conclusion\n\nIn this\
    \ chapter, we started the process of developing a new task editor. We started\
    \ by refactoring existing `ExecuteCatalogPackageTask` code and replacing the existing\
    \ task editor project with a new version.\n\nNow would be an excellent time to\
    \ check in this solution.\n\n# 11. Minimal Coding for the Complex Editor\n\nThis\
    \ chapter continues the goals of this section of the book, which are:\n\n*   Surface\
    \ a more “SSIS-y” experience for users of the task including a “pretty” editor\
    \ with General and Settings pages “views”\n*   Enable the use of SSIS Expressions\n\
    *   Add design-time validation of task settings\n*   Surface more SSIS Catalog\
    \ execution properties in the editor\n\nIn Chapter [10](#449652_2_En_10_Chapter.xhtml),\
    \ we started the process of developing a new task editor by refactoring existing\
    \ `ExecuteCatalogPackageTask` code and replacing the existing task editor project\
    \ with a new version.\n\nIn this chapter, we begin minimally coding the `ExecuteCatalogPackageTaskComplexUI`\
    \ by creating the editor form and adding General and Settings views to the View\
    \ ➤ Node ➤ Property Category ➤ Property hierarchy for SSIS tasks.\n\n## Updating\
    \ DtsTask Interface Members\n\nThe current code in the `ExecuteCatalogPackageTaskComplexUI`\
    \ class, reordered, is shown in Listing [11-1](#449652_2_En_11_Chapter.xhtml#PC1):\n\
    \n```\npublic class ExecuteCatalogPackageTaskComplexUI : IDtsTaskUI\n{\n    public\
    \ void Initialize(TaskHost taskHost, IServiceProvider serviceProvider)\n    {\n\
    \        throw new NotImplementedException();\n    }\n\n    public ContainerControl\
    \ GetView()\n    {\n        throw new NotImplementedException();\n    }\n\n  \
    \  public void New(IWin32Window parentWindow)\n    {\n        throw new NotImplementedException();\n\
    \    }\n\n    public void Delete(IWin32Window parentWindow)\n    {\n        throw\
    \ new NotImplementedException();\n    }\n}\nListing 11-1: `ExecuteCatalogPackageTaskComplexUI`\
    \ current code, reordered\n```\n\nThe new order sorts well with my CDO (that’s\
    \ “OCD” with the letters in the proper order).\n\nIn the sections that follow,\
    \ we build out the “SSIS-y” editor by adding members (internal variables), interface\
    \ member methods, and views (which will translate to “pages” in the editor)."
