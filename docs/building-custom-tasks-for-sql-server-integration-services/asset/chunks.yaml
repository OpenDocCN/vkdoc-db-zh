    SSIS Execute SQL 任务的 XML


    在我们的示例 Execute SQL 任务中，`Name`属性值为“Execute SQL Task”。该属性值存储在名为 `DTS:ObjectName`
    的属性中。在运行时，SSIS XML 被加载、解释和执行，但一切都始于 SSIS 开发人员打开任务编辑器，然后配置键值对的值部分，其中键在构成 View ➤
    Node ➤ Property Category ➤ Property 层次结构的编辑器视图中直观地显示。


