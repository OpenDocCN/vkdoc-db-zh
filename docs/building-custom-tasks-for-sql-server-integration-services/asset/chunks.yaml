    operator: `<expression> ? <if true> : <if false>`. The expression must evaluate
    to either `true` or `false`. The expression portion is simply the `Synchronized`
    property, which is a Boolean value. The “if true” operation of the ternary operation
    is `(" completed." + swMsg.Substring(0, (swMsg.Length - 4)))`, which builds a
    message informing developers and operators of the package execution elapsed time.
    The `swMsg.Length – 4` code truncates the elapsed time at milliseconds. The “if
    false” operation of the ternary operation is `(" started. Check SSIS Catalog Reports
    for package execution results."))`, which builds a message informing developers
    and operators that the package has started executing asynchronously and that they
    should look elsewhere for package execution results.


