    # 6. Preparing to Build


    Building custom SSIS tasks is neither trivial nor easy. You are building components
    that will be used to construct software. Perhaps you have done this before. Many
    have not.


    Building the assembly is straightforward, consisting of two steps:


    1.  Build the assembly.


    2.  Register the assembly in the Global Assembly Cache (GAC).


    Recovering gracefully when the code does not perform as expected is key. When
    the build/register procedure fails to achieve the desired results, a developer
    can take the following steps to recover:


    *   Unregister the assembly from the GAC.


    *   Clean the Visual Studio solution.


    *   Build the assembly in the Visual Studio solution.


    *   Register the assembly in the GAC.


    The aforementioned steps get developers out of trouble almost as fast as we get
    into it, and that is a good thing.


    ## Using Build Events to Register/Unregister


    Gacutil is the utility used to *register* and *unregister* assemblies in the Global
    Assembly Cache (GAC). If you are following along and building the sample code
    as described, there is good news: C# supports *build events* – which allow developers
    to automate registering and unregistering assemblies in the GAC.


    ### Finding gacutil.exe


    Like the sn.exe (Strong Name) utility mentioned in Chapter [5](#449652_2_En_5_Chapter.xhtml),
    gacutil.exe moves around with each release of the .Net Framework. At the time
