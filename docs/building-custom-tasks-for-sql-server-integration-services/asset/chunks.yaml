- fmt: '## Conclusion


    In this chapter, we developed a simple editor for the custom SSIS task. We added
    multiple controls to a form and prepared the form for binding the editor to the
    custom SSIS task object. The project now contains most of the custom task functionality.


    Now would be a good time to execute a commit and push to Azure DevOps.


    At this point in development, we have


    *   Created and configured an Azure DevOps project

    *   Connected Visual Studio to the Azure DevOps project

    *   Cloned the Azure DevOps Git repo locally

    *   Created a Visual Studio project

    *   Added a reference to the Visual Studio project

    *   Performed an initial check-in of the project code

    *   Signed the assembly

    *   Checked in an update

    *   Configured the build output path and build events

    *   Overridden three methods from the `Task` base class

    *   Added and coded most of a project for the `Task` editor


    Next, we put together the task and editor!


    # 9. Signing and Binding


    We began this book with a rambling introduction that disclosed some of how my
    brain works. I asked a question: “Do you think it is possible to create a custom
    SSIS task using Visual Studio Community Edition?”


    Next, we configured our development machine and Visual Studio, and then we created
    a new project. We signed the project so that it would be accepted in the Global
    Assembly Cache (GAC) and prepared the Visual Studio environment with all the accouterments
    and references necessary to build a custom SSIS task. We coded the task and its
    editor. All that brings us here.


    In this chapter, we will sign the task editor project and bind the task to the
    editor. Then we’ll code our task’s functionality, add an icon, and build and test
    the task.


    ## Creating a New Public Key Token Value


    The first edition of this book was written in 2017. Consider this chapter a “reboot”
    of the task editor design. Just to be sure, let’s regenerate a key and re-extract
    the public key.


    Before we bind the task editor to the task, let’s make a new key.


    Open a command prompt as an administrator as shown in Figure [9-1](#449652_2_En_9_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig1_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig1_HTML.jpg)


    Figure 9-1: Opening an Administrator command prompt


    In the command prompt window, navigate to the `ExecuteCatalogPackageTaskUI` folder
    as shown in Figure [9-2](#449652_2_En_9_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig2_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig2_HTML.jpg)


    Figure 9-2: Navigating to the `ExecuteCatalogPackageTaskUI` folder


    Open the `Notes.txt` file saved earlier in the `ExecuteCatalogPackageTask` project,
    and copy the key retrieval creation and retrieval commands as shown in Listing
    [9-1](#449652_2_En_9_Chapter.xhtml#PC1) and Figure [9-7](#449652_2_En_9_Chapter.xhtml#Fig7):


    ```

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
    -k key.snk

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
    -p key.snk public.out

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe"
    -t public.out

    ```


    Listing 9-1: Strong name commands


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig3_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig3_HTML.jpg)


    Figure 9-3: Copying the public key creation and retrieval commands


    Paste the public key creation and retrieval commands into the Administrator command
    prompt window as shown in Figure [9-4](#449652_2_En_9_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig4_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig4_HTML.jpg)


    Figure 9-4: Creating and retrieving the public key token


    Highlight the public key token value as shown in Figure [9-5](#449652_2_En_9_Chapter.xhtml#Fig5):


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig5_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig5_HTML.jpg)


    Figure 9-5: Highlighting the public key token value


    Right-click the selection to copy it to the clipboard. Paste the clipboard contents
    in the `ExecuteCatalogPackageTask.cs` file near the original `Public` key value
    for comparison as shown in Figure [9-6](#449652_2_En_9_Chapter.xhtml#Fig6):


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig6_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig6_HTML.jpg)


    Figure 9-6: Comparing the original and new public key values


    Note


    A new public key is required for signing the UI assembly.


    ## Signing the Task Editor Project


    We haven’t yet signed the `Task` Editor project. Let’s do that now.


    In Solution Explorer, double-click `Properties` under the `ExecuteCatalogPackageTaskUI`
    project to open the project properties.


    Click on the `Signing` page, check the “Sign the assembly” checkbox, click the
    “Choose a strong key name file” dropdown, click `Browse`, browse to `key.snk`
    in the `ExecuteCatalogPackageTaskUI` project folder – the `key.snk` file we just
    created – and select that file as shown in Figure [9-7](#449652_2_En_9_Chapter.xhtml#Fig7):


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig7_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig7_HTML.jpg)


    Figure 9-7: Signing the UI project


    As with the `Task` project properties, click on the `Build` page and set the `Build
    output path` to `<drive>:\Program Files (x86)\Microsoft SQL Server\<version>\DTS\Tasks`
    where `<drive>` represents the installation drive for SQL Server and `<version>`
    represents the numeric version value of the SQL Server for which you are building
    this task, as seen in Figure [9-8](#449652_2_En_9_Chapter.xhtml#Fig8):


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig8_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig8_HTML.jpg)


    Figure 9-8: Setting the `Build output path` for the `ExecuteCatalogPackageTaskUI`
    project


    As with the `Task` project, we may automate the `gacutil` unregister and register
    functions. Click the `Build Events` page, click the `Edit Pre-build…` button,
    and then add the code shown in Listing [9-2](#449652_2_En_9_Chapter.xhtml#PC2)
    and Figure [9-9](#449652_2_En_9_Chapter.xhtml#Fig9):


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig9_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig9_HTML.jpg)


    Figure 9-9: Adding the `gacutil` unregister command to the pre-build build event


    ```

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\gacutil.exe"
    -u ExecuteCatalogPackageTask

    ```


    Listing 9-2: `gacutil` unregister command


    Click the `Edit Post-build…` button and add the code shown in Listing [9-3](#449652_2_En_9_Chapter.xhtml#PC3)
    and Figure [9-10](#449652_2_En_9_Chapter.xhtml#Fig10):


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig10_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig10_HTML.jpg)


    Figure 9-10: Adding the `gacutil` register command to the post-build build event


    ```

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\gacutil.exe"
    -if "E:\Program Files (x86)\Microsoft SQL Server\150\DTS\Tasks\ExecuteCatalogPackageTaskUI.dll"

    ```


    Listing 9-3: `gacutil` register command


    Once complete, save and close the project properties.'
