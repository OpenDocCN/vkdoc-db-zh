- fmt: '# Testing Execution


    We shift gears at this point in the test process. While I dearly love manual software
    testing and documenting test results in “test-speak” for posterity, not everyone
    shares my passion. Starting here, we switch to prose.


    Currently, the `Execute Catalog Package Task` is configured as shown in Figure
    [21-21](#449652_2_En_21_Chapter.xhtml#Fig21):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig21_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig21_HTML.jpg)


    Figure 21-21: The `Execute Catalog Package Task`, as configured


    The current configuration tests asynchronous SSIS package execution because the
    `Synchronized` property – which maps to the SSIS Catalog execution parameter –
    is set to `false`, which is the default.


    Execute the test SSIS package. If all goes as planned, the test SSIS package with
    the `Execute Catalog Package Task` will succeed, as shown in Figure [21-22](#449652_2_En_21_Chapter.xhtml#Fig22):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig22_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig22_HTML.jpg)


    Figure 21-22: A successful test execution


    Observe the `Progress/Execution Results` tab to validate the instrumentation messages
    raised as events, as shown in Figure [21-23](#449652_2_En_21_Chapter.xhtml#Fig23):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig23_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig23_HTML.jpg)


    Figure 21-23: Validating events


    Test synchronous SSIS package execution by opening the `Execute Catalog Package
    Task` editor and updating the `Synchronized` property to `True`, as shown in Figure
    [21-24](#449652_2_En_21_Chapter.xhtml#Fig24):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig24_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig24_HTML.jpg)


    Figure 21-24: Preparing to test synchronized execution


    Click the OK button to close the `Execute Catalog Package Task` Editor, and execute
    the test SSIS package in the debugger. If all goes as planned, the test SSIS package
    with the `Execute Catalog Package Task` will succeed, as shown in Figure [21-25](#449652_2_En_21_Chapter.xhtml#Fig25):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig25_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig25_HTML.jpg)


    Figure 21-25: Another successful test execution


    View the `Progress/Execution Results` tab to validate asynchronous execution event
    messages are present, as shown in Figure [21-26](#449652_2_En_21_Chapter.xhtml#Fig26):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig26_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig26_HTML.jpg)


    Figure 21-26: Asynchronous execution event messages: check


    Configure the `Execute Catalog Package Task` to synchronously execute an SSIS
    package that fails, as shown in Figure [21-27](#449652_2_En_21_Chapter.xhtml#Fig27):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig27_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig27_HTML.jpg)


    Figure 21-27: Preparing to test synchronized execution of an SSIS package built
    to fail


    As expected, the SSIS package and `Execute Catalog Package Task` fail, as shown
    in Figure [21-28](#449652_2_En_21_Chapter.xhtml#Fig28):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig28_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig28_HTML.jpg)


    Figure 21-28: A failed execution, as expected


    Observe the `Progress/Execution Results` tab as shown in in Figure [21-29](#449652_2_En_21_Chapter.xhtml#Fig29):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig29_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig29_HTML.jpg)


    Figure 21-29: Synchronous execution event messages, check


    Configure the `Execute Catalog Package Task` to `asynchronously` execute the same
    SSIS package that fails, as shown in Figure [21-30](#449652_2_En_21_Chapter.xhtml#Fig30):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig30_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig30_HTML.jpg)


    Figure 21-30: Preparing to test a non-synchronized execution of an SSIS package
    built to fail


    As expected, the SSIS package and `Execute Catalog Package Task` `succeed`, as
    shown in Figure [21-31](#449652_2_En_21_Chapter.xhtml#Fig31):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig31_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig31_HTML.jpg)


    Figure 21-31: A successful execution of a package, or is it?


    Verify the instrumentation messages found on the `Progress/Execution Results`
    tab are accurate for asynchronous execution, as shown in Figure [21-32](#449652_2_En_21_Chapter.xhtml#Fig32):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig32_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig32_HTML.jpg)


    Figure 21-32: Asynchronous execution instrumentation events


    Examine the SSIS Catalog All Executions Report.


    Configure a longer-running (greater than 30 seconds) SSIS package built to succeed.
    Configure the SSIS package to execute synchronously, as shown in Figure [21-33](#449652_2_En_21_Chapter.xhtml#Fig33):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig33_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig33_HTML.jpg)


    Figure 21-33: Configuring a longer-running synchronous SSIS package execution


    If all goes according to plan, the SSIS package and `Execute Catalog Package Task`
    succeed, as shown in Figure [21-34](#449652_2_En_21_Chapter.xhtml#Fig34):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig34_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig34_HTML.jpg)


    Figure 21-34: Yet another successful execution


    Observe the `Progress/Execution Results` to verify the instrumentation messages
    accurately reflect the progress of the execution, as shown in Figure [21-35](#449652_2_En_21_Chapter.xhtml#Fig35):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig35_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig35_HTML.jpg)


    Figure 21-35: Event messages for a synchronous execution of a longer-running execution


    Configure a longer-running (greater than 30 seconds) SSIS package built to fail.
    Configure the SSIS package to execute synchronously, as shown in Figure [21-36](#449652_2_En_21_Chapter.xhtml#Fig36):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig36_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig36_HTML.jpg)


    Figure 21-36: Configuring a longer-running synchronous SSIS package built to fail


    If all goes according to plan, the SSIS package and `Execute Catalog Package Task`
    fail, as shown in Figure [21-37](#449652_2_En_21_Chapter.xhtml#Fig37):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig37_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig37_HTML.jpg)


    Figure 21-37: A failed execution, as expected


    Verify the instrumentation messages found on the `Progress/Execution Results`
    tab are accurate for synchronous execution, as shown in Figure [21-38](#449652_2_En_21_Chapter.xhtml#Fig38):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig38_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig38_HTML.jpg)


    Figure 21-38: Synchronous failed execution instrumentation events


    Configure the `Execute Catalog Package Task` to `asynchronously` execute the same
    SSIS package that fails, as shown in Figure [21-39](#449652_2_En_21_Chapter.xhtml#Fig39):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig39_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig39_HTML.jpg)


    Figure 21-39: Preparing to test a non-synchronized execution of the same SSIS
    package built to fail


    As expected, the SSIS package and `Execute Catalog Package Task` succeed, as shown
    in Figure [21-40](#449652_2_En_21_Chapter.xhtml#Fig40):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig40_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig40_HTML.jpg)


    Figure 21-40: A successful execution'
