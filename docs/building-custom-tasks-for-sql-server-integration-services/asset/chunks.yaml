    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig11_HTML.jpg](img/449652_2_En_25_Fig11_HTML.jpg)


    图 25-11 成功部署


    下一步是配置 SSIS 目录项目。

    '
- fmt: '## Configuring TestSSISProject


    Use SSMS to connect to the Azure SQL database instance that hosts the SSIS Catalog
    for your Azure-SSIS integration runtime. To open the Configure dialog, right-click
    `TestSSISProject`, and then click “Configure,” as shown in Figure [25-12](#449652_2_En_25_Chapter.xhtml#Fig12):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig12_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig12_HTML.jpg)


    Figure 25-12


    Opening the `TestSSISProject` Configure dialog


    The “Configure – `TestSSISProject`” dialog opens. On the Parameters tab, click
    the ellipsis for the `DelayString` parameter in the `RunForSomeTime.dtsx` container,
    as shown in Figure [25-13](#449652_2_En_25_Chapter.xhtml#Fig13):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig13_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig13_HTML.jpg)


    Figure 25-13


    Configure – `TestSSISProject` dialog


    When the Set Parameter Value for the `"[RunForSomeTime.dtsx].[DelayString]"` parameter
    opens, select the “edit value” option and enter “00:00:35” in the corresponding
    textbox (which adds a Configuration Literal Value), and then click the OK button,
    as shown in Figure [25-14](#449652_2_En_25_Chapter.xhtml#Fig14):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig14_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig14_HTML.jpg)


    Figure 25-14


    Overriding the `DelayString` parameter value with a Configuration Literal value


    Configuration Literal values display in `bold` text decoration, as shown in Figure
    [25-15](#449652_2_En_25_Chapter.xhtml#Fig15):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig15_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig15_HTML.jpg)


    Figure 25-15


    Configuration Literal values display in bold


    Let’s test it!


    ## Testing the Configuration


    To test the configuration changes, use SQL Server Management Studio (SSMS) to
    connect to the instance of Azure SQL DB that hosts the SSIS Catalog used by your
    Azure-SSIS integration runtime. Navigate to the `TestSSISProject` packages virtual
    folder, right-click the `RunForSomeTime.dtsx` SSIS package, and then click “Execute…,”
    as shown in Figure [25-16](#449652_2_En_25_Chapter.xhtml#Fig16):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig16_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig16_HTML.jpg)


    Figure 25-16


    Preparing to execute the `RunForSomeTime.dtsx` SSIS package


    When the Execute Package dialog displays, click the OK button, as shown in Figure
    [25-17](#449652_2_En_25_Chapter.xhtml#Fig17):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig17_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig17_HTML.jpg)


    Figure 25-17


    Executing the `RunForSomeTime.dtsx` SSIS package


    When prompted to display the Execution Report, click the Yes button, as shown
    in Figure [25-18](#449652_2_En_25_Chapter.xhtml#Fig18):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig18_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig18_HTML.jpg)


    Figure 25-18


    Clicking the Yes button to open the Execution Report


    The SSIS Catalog All Executions report displays and, after some time, reports
    the `RunForSomeTime.dtsx` SSIS package completes and succeeds, as shown in Figure
    [25-19](#449652_2_En_25_Chapter.xhtml#Fig19):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig19_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig19_HTML.jpg)


    Figure 25-19


    Execution success!


    ## Lifting and Shifting an SSIS Framework


    In Chapter [23](#449652_2_En_23_Chapter.xhtml), we added the `fw` schema to the
    `SSISDB` database, and then we added three tables:


    1.  `fw.Applications`


    2.  `fw.Packages`


    3.  `fw.ApplicationPackages`


    The three tables contain metadata used by an SSIS execution framework. Summarizing
    the definition of a framework: An *application* is a collection of SSIS packages
    that execute as a group. In order to execute a group of SSIS packages, the framework
    requires *package* location metadata. Because a single package may be executed
    as part of many applications, *application packages* define the relationship between
    applications and packages.'
