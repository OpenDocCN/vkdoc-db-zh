    Add Applications metadata using the T-SQL in Listing [25-5](#449652_2_En_25_Chapter.xhtml#PC5):


    ```

    Insert Into fw.Applications

    (ApplicationName)

    Values(''Framework Test'')

    go

    Select * From fw.Applications

    go

    Listing 25-5

    Adding Applications metadata

    ```


    When executed, the T-SQL results appear as shown in Figure [25-25](#449652_2_En_25_Chapter.xhtml#Fig25):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig25_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig25_HTML.jpg)


    Figure 25-25 Adding an SSIS framework application


    Add Packages metadata using the T-SQL in Listing [25-6](#449652_2_En_25_Chapter.xhtml#PC6):


    ```

    Insert Into fw.Packages

    (FolderName, ProjectName, PackageName)

    Values

    (''Test'', ''TestSSISProject'', ''ReportAndSucceed.dtsx'')

    , (''Test'', ''TestSSISProject'', ''ReportParameterAndSucceed.dtsx'')

    , (''Test'', ''TestSSISProject'', ''RunForSomeTime.dtsx'')

    go

    Select * From fw.Packages

    go

    Listing 25-6

    Adding Packages metadata

    ```


    When executed, the T-SQL results appear as shown in Figure [25-26](#449652_2_En_25_Chapter.xhtml#Fig26):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig26_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig26_HTML.jpg)


    Figure 25-26 Adding SSIS framework packages


    Add ApplicationPackages metadata using the T-SQL in Listing [25-7](#449652_2_En_25_Chapter.xhtml#PC7):


    ```

    Insert Into fw.ApplicationPackages

    (ApplicationId, PackageId, ExecutionOrder

    , Synchronized, MaximumRetries

    , RetryIntervalSeconds, Use32bit, LoggingLevel)

    Values

    (1, 1, 10, 1, 10, 2, 0, ''Basic'')

    , (1, 2, 20, 0, 10, 2, 1, ''Performance'')

    , (1, 3, 30, 1, 30, 2, 1, ''Verbose'')

    go

    Select * From fw.ApplicationPackages

    go

    Listing 25-7

    Adding ApplicationPackages metadata

    ```


    Be sure the `ApplicationId` and `PackageId` values match corresponding values
    auto-generated by identity values in the `fw.Applications` and `fw.Packages` tables,
    respectively.


    When executed, the T-SQL results appear as shown in Figure [25-27](#449652_2_En_25_Chapter.xhtml#Fig27):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig27_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig27_HTML.jpg)


    Figure 25-27 Adding SSIS framework application packages


    The next step is to deploy to Azure-SSIS the `ECPTFramework` SSIS project that
    we developed in the previous chapter.


    ### Deploying ECPTFramework SSIS Project


    Open the `ECPTFramework` test SSIS project – the project developed in Chapter
    [23](#449652_2_En_23_Chapter.xhtml) – in Visual Studio. Open Solution Explorer,
    right-click the project name, and then click “Deploy,” as shown in Figure [25-28](#449652_2_En_25_Chapter.xhtml#Fig28):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig28_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig28_HTML.jpg)


    Figure 25-28 Deploying ECPTFramework


    When the Integration Services Deployment Wizard displays, follow the steps outlined
    in the “Deploy TestSSISProject” section earlier in this chapter to deploy the
    `ECPTFramework` SSIS project to the Azure SQL database hosting the `SSISDB` database
    you selected when provisioning your Azure-SSIS integration runtime. In this demo,
    I created a new SSIS Catalog folder named “SSIS” and deployed the `ECPTFramework`
    SSIS project the SSIS folder.


    ### Configure the ECPTFramework SSIS Project


    Once the `ECPTFramework` SSIS project is deployed, open SQL Server Management
    Studio, and navigate to the `ECPTFramework` SSIS project in the Integration Services
    Catalogs node. Right-click the `ECPTFramework` SSIS project and then click Configure,
    as shown in Figure [25-29](#449652_2_En_25_Chapter.xhtml#Fig29):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig29_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig29_HTML.jpg)


    Figure 25-29 Preparing to configure the ECPTFramework project


    To begin configuring the `ECPTFramework`, select the Framework SSIS Catalog Connection,
    and then select the `ConnectionString` property. Click the ellipsis beside the
    Value column, as shown in Figure [25-30](#449652_2_En_25_Chapter.xhtml#Fig30):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig30_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig30_HTML.jpg)


    Figure 25-30 Preparing to configure a literal for the Framework SSIS Catalog ConnectionString
    property


    The Framework SSIS Catalog connection manager should point to the SQL Server instance
    – and database – that holds the Framework metadata. Remember, we are making a
    slight change to this version of the framework; we store metadata in a different
    database named `SSISFramework`. The connection string is updated and shown in
    Figure [25-31](#449652_2_En_25_Chapter.xhtml#Fig31):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig31_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig31_HTML.jpg)


    Figure 25-31 Configuring a literal for the Framework SSIS Catalog ConnectionString
    property


    When configured, the literal for the Execution SSIS Catalog `ConnectionString`
    property appears as shown in Figure [25-32](#449652_2_En_25_Chapter.xhtml#Fig32):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig32_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig32_HTML.jpg)


    Figure 25-32 The Framework SSIS Catalog ConnectionString property, configured


    Repeat the process for the Framework SSIS Catalog Password property.


    When configured, the literal values for the Framework SSIS Catalog `ConnectionString`
    and `Password` properties appear as shown in Figure [25-33](#449652_2_En_25_Chapter.xhtml#Fig33):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig33_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig33_HTML.jpg)


    Figure 25-33 The Framework SSIS Catalog ConnectionString and Password properties,
    configured


    The Execute SSIS Catalog and Framework SSIS Catalog connection managers have been
    configured.


    The next step is a test execution of the `Parent.dtsx` SSIS package.


    ### Let’s Test It!


    In the SQL Server Management Studio’s Object Explorer, expand the Integration
    Services Catalogs node and navigate to the SSIS folder > `ECPTFramework` project
    > `Parent.dtsx` package. Right-click the `Parent.dtsx` SSIS package and then click
    “Execute…,” as shown in Figure [25-34](#449652_2_En_25_Chapter.xhtml#Fig34):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig34_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig34_HTML.jpg)


    Figure 25-34 Executing the Parent.dtsx SSIS package


    When the Execute Package dialog displays, click the OK button to start `Parent.dtsx`
    package execution, as shown in Figure [25-35](#449652_2_En_25_Chapter.xhtml#Fig35):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig35_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig35_HTML.jpg)


    Figure 25-35 Starting Parent.dtsx execution


    Open the SSIS Catalog All Executions report to view the resulting executions,
    as shown in Figure [25-36](#449652_2_En_25_Chapter.xhtml#Fig36):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig36_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig36_HTML.jpg)


    Figure 25-36 Parent.dtsx fails


    The `Parent.dtsx` SSIS package fails. The execution of `Parent.dtsx` results in
    the execution of the `TestSSISProject\ReportAndSucceed.dtsx` SSIS package. We
    need more information to troubleshoot this error. Click on the “All Messages”
    link in the `Parent.dtsx` report row to open the Messages report, as shown in
    Figure [25-37](#449652_2_En_25_Chapter.xhtml#Fig37):


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig37_HTML.jpg](images/449652_2_En_25_Chapter/449652_2_En_25_Fig37_HTML.jpg)


    Figure 25-37 Viewing the error message


    The error message reads: “Execute Application Package:Error: The Execute method
    on the task returned error code `0x80131904` (Could not find stored procedure
    ‘`xp_msver`’.). The Execute method must succeed, and indicate the result using
    an “out” parameter.” [sic]'
