  trans: '

    # 4. 在项目代码中签入


    我刚看了看手表……没错……现在是 2020 年。**早就该**所有开发者都使用某种形式的源代码控制（或版本控制）了。根据我的经验，开发者有两种类型：


    1.  使用源代码控制的开发者

    2.  *最终会* 使用源代码控制的开发者


    为什么这么说？如果你不使用源代码控制，就会丢失代码。丢失代码会让你心碎，然后你就会开始使用源代码控制了。


    ## 在 Azure DevOps 中初始化源代码控制


    让我们检查一下项目在 Azure DevOps 中的当前状态。点击左侧菜单中的 `Repos` 项，如图 4-1 所示：


    ![../images/449652_2_En_4_Chapter/449652_2_En_4_Fig1_HTML.jpg](img/449652_2_En_4_Fig1_HTML.jpg)


    图 4-1：Azure DevOps 当前没有代码


    让我们检查一下本地 Git 仓库，如图 4-2 所示：


    ![../images/449652_2_En_4_Chapter/449652_2_En_4_Fig2_HTML.jpg](img/449652_2_En_4_Fig2_HTML.jpg)


    图 4-2：本地仓库中的 `ExecuteCatalogPackageTask`


    接下来就是本章要解决的核心问题：如何将我们最新的 Visual Studio 项目代码导入 Azure DevOps？继续阅读以了解方法。


    首先，打开 Visual Studio 团队资源管理器（如果已关闭，请点击 `View` ➤ `Team Explorer`）。点击 `Team Explorer
    Home` 按钮，然后点击 `Changes` 磁贴，如图 4-3 所示：


    ![../images/449652_2_En_4_Chapter/449652_2_En_4_Fig3_HTML.jpg](img/449652_2_En_4_Fig3_HTML.jpg)


    图 4-3：点击团队资源管理器“更改”磁贴


    当你点击 `Changes` 按钮时，名为 `Team Explorer – Changes` 的对话框将显示，如图 4-4 所示：


    ![../images/449652_2_En_4_Chapter/449652_2_En_4_Fig4_HTML.jpg](img/449652_2_En_4_Fig4_HTML.jpg)


    图 4-4：团队资源管理器 – 更改


    添加一条提交消息。为什么？提交注释是为了“未来的你”和/或将来可能查看你代码的其他团队成员。如果你在几个月——甚至几年后——回顾这段代码，“未来的你”会感谢这个提醒。将来审查你代码的新成员或其他团队成员也会从有用的提交消息中受益。


    如果 `Commit Message` 文本框下方的按钮标签是“`Commit Staged`”，那么点击 `Commit Staged` 按钮。团队资源管理器会显示一个结果消息，如图
    4-5 所示：


    ![../images/449652_2_En_4_Chapter/449652_2_En_4_Fig5_HTML.jpg](img/449652_2_En_4_Fig5_HTML.jpg)


    图 4-5：查看本地已提交的暂存更改消息


    为项目代码的初始签入添加一条提交消息，然后点击 `Commit All` 按钮，用项目代码的最新版本更新本地仓库，如图 4-6 所示：


    ![../images/449652_2_En_4_Chapter/449652_2_En_4_Fig6_HTML.jpg](img/449652_2_En_4_Fig6_HTML.jpg)


    图 4-6：准备提交所有项目代码


    团队资源管理器会显示一个结果消息，如图 4-7 所示：


    ![../images/449652_2_En_4_Chapter/449652_2_En_4_Fig7_HTML.jpg](img/449652_2_En_4_Fig7_HTML.jpg)


    图 4-7：项目代码已本地提交的消息


    此示例适用于单个开发者。这个例子并未穷尽 Git 或 Azure DevOps 的全部功能。


    此时，Azure DevOps Book Code 项目仍然是空的。点击本地已提交消息中的 `Sync` 链接，以将项目代码更新到本地 Git 仓库。同步后，团队资源管理器准备将本地仓库的更改推送到
    Azure DevOps Book Code 项目，如图 4-8 所示：


    ![../images/449652_2_En_4_Chapter/449652_2_En_4_Fig8_HTML.jpg](img/449652_2_En_4_Fig8_HTML.jpg)


    图 4-8：团队资源管理器准备推送


    在 `Outgoing Commits` 部分，点击 `Push` 链接，将项目代码从本地仓库复制到 Azure DevOps Book Code 仓库。如果推送成功，团队资源管理器会显示类似于图
    4-9 所示的通知：


    ![../images/449652_2_En_4_Chapter/449652_2_En_4_Fig9_HTML.jpg](img/449652_2_En_4_Fig9_HTML.jpg)


    图 4-9：团队资源管理器显示推送成功消息


    Azure DevOps Book Code 仓库现在包含了我们最新项目代码的副本，如图 4-10 所示：


    ![../images/449652_2_En_4_Chapter/449652_2_En_4_Fig10_HTML.jpg](img/449652_2_En_4_Fig10_HTML.jpg)


    图 4-10：Azure DevOps Book Code 仓库


    在我们单开发者的场景中，此时我们*仅* 使用 Azure DevOps Book Code 仓库进行源代码控制。


    蓝色的锁图标标记了已签入源代码控制的项，如图 4-11 所示：


    ![../images/449652_2_En_4_Chapter/449652_2_En_4_Fig11_HTML.jpg](img/449652_2_En_4_Fig11_HTML.jpg)


    图 4-11：观察已签入的项目代码


    ## 结论


    至此，在开发过程中，我们已经：


    -   创建并配置了一个 Azure DevOps 项目

    -   将 Visual Studio 连接到 Azure DevOps 项目

    -   在本地克隆了 Azure DevOps Git 仓库

    -   创建了一个 Visual Studio 项目

    -   向 Visual Studio 项目添加了引用

    -   执行了项目代码的初始签入


    接下来，我们要对程序集进行签名。


    # 5. 对程序集进行签名


    为了能在 SSIS 项目中被 Visual Studio 使用，一个 SSIS 自定义任务程序集*必须* 被签名。.Net 框架包含了用于创建和管理“密钥”文件的工具，这些文件用于对程序集进行签名。

    '
- fmt: '## 准备添加密钥


    我建议首先以管理员身份打开命令窗口。打开 Windows 开始菜单并找到命令提示符。右键单击命令提示符，将鼠标悬停在“更多”上，然后单击“以管理员身份运行”，如图
    [5-1](#449652_2_En_5_Chapter.xhtml#Fig1) 所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig1_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig1_HTML.jpg)

    图 5-1 以管理员身份打开命令窗口


    出现提示时，单击“是”按钮，如图 [5-2](#449652_2_En_5_Chapter.xhtml#Fig2) 所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig2_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig2_HTML.jpg)

    图 5-2 允许命令提示符以管理员身份执行


    打开后，管理员命令窗口如图 [5-3](#449652_2_En_5_Chapter.xhtml#Fig3) 所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig3_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig3_HTML.jpg)

    图 5-3 管理员命令窗口


    我们正在创建一个程序集（实际上是几个程序集），它将驻留在全局程序集缓存（GAC）中。为了能存在于 GAC 中，程序集必须被签名。我们使用强名称密钥文件来签名程序集。在当前项目配置阶段，我们需要生成一个适合为我们程序集签名的密钥。对此，有好消息也有坏消息：

    * 好消息：微软提供了强名称工具（`sn.exe`）来创建密钥。

    * 坏消息：强名称工具会随着 .Net Framework 的新版本而变动。


    如果你在 Windows Server 2019 上开发，可以在 `C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX
    4.8 Tools\` 文件夹中找到强名称工具。该工具名为 `sn.exe`，因此完整路径是 `C:\Program Files (x86)\Microsoft
    SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe`。如果你是在遥远的未来读到这些文字并嘲笑 Windows Server
    2019 有多么过时，请搜索 `sn.exe` 并使用你找到的最新版本（聪明人）。


    提示

    你可以用任何喜欢的方式管理此过程。我建议你创建一个文本文件来保存与密钥相关的命令行。我坚信未来的你会感谢现在的你。


    我首先向项目添加一个新项，如图 [5-4](#449652_2_En_5_Chapter.xhtml#Fig4) 所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig4_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig4_HTML.jpg)

    图 5-4 向项目添加新项


    我选择一个文本文件，并将我的笔记文件命名为 `Notes.txt`（因为我感觉特别有创意），如图 [5-5](#449652_2_En_5_Chapter.xhtml#Fig5)
    所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig5_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig5_HTML.jpg)

    图 5-5 命名笔记文件


    接下来我粘贴以下几行：

    ```

    -- key generation

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 ➥ Tools\sn.exe"
    -k key.snk

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 ➥ Tools\sn.exe"
    -p key.snk public.out

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 ➥ Tools\sn.exe"
    -t public.out

    ```


    第一行创建公钥/私钥对并将它们放入名为 `key.snk` 的文件中。

    第二行将密钥对的公共部分提取到名为 `public.out` 的文件中。

    第三行从 `public.out` 文件中读取公钥。


    注意

    `➥` 符号表示这应该都在一行上，但 Microsoft Word 无法创建足够宽的行来完整呈现此代码。


    `Notes.txt` 现在出现在解决方案资源管理器中，如图 [5-6](#449652_2_En_5_Chapter.xhtml#Fig6) 所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig6_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig6_HTML.jpg)

    图 5-6 解决方案资源管理器中的 Notes.txt


    `Notes.txt` 文件也被添加到项目文件夹中，如图 [5-7](#449652_2_En_5_Chapter.xhtml#Fig7) 所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig7_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig7_HTML.jpg)

    图 5-7 项目文件夹中的 Notes.txt


    ## 创建密钥


    在命令窗口中，导航到 `ExecuteCatalogPackageTask` 项目目录。该项目目录将包含 `ExecuteCatalogPackageTask.cs`、`ExecuteCatalogPackageTask.csproj`
    以及 `Notes.txt` 文件，如图 [5-8](#449652_2_En_5_Chapter.xhtml#Fig8) 所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig8_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig8_HTML.jpg)

    图 5-8 导航到 ExecuteCatalogPackageTask 项目目录


    如果尚未打开，请在 Visual Studio 的解决方案资源管理器中打开 `Notes.txt`。选择第一行，复制它，然后粘贴到命令窗口中，如图 [5-9](#449652_2_En_5_Chapter.xhtml#Fig9)
    所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig9_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig9_HTML.jpg)

    图 5-9 粘贴到命令窗口


    按 Enter 键执行 `sn.exe` 命令，在 `ExecuteCatalogPackageTask` 项目目录中创建密钥文件，如图 [5-10](#449652_2_En_5_Chapter.xhtml#Fig10)
    所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig10_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig10_HTML.jpg)

    图 5-10 Key.snk 文件已创建


    我们需要从 `key.snk` 文件中获取公钥的公钥/私钥对。首先，使用 `Notes.txt` 中存储的第二行将公钥提取到名为 `public.out`
    的文件中，如图 [5-11](#449652_2_En_5_Chapter.xhtml#Fig11) 所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig11_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig11_HTML.jpg)

    图 5-11 公钥提取


    最后，我们需要从提取到的文件中读取公钥值，如图 [5-12](#449652_2_En_5_Chapter.xhtml#Fig12) 所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig12_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig12_HTML.jpg)

    图 5-12 读取公钥


    使用鼠标左键高亮显示公钥值，如图 [5-13](#449652_2_En_5_Chapter.xhtml#Fig13) 所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig13_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig13_HTML.jpg)

    图 5-13 在命令窗口中选择公钥


    右键单击高亮显示的文本。请注意，不会出现上下文菜单。文本已复制到剪贴板的迹象是高亮显示和标题栏中的“选择”文本消失，如图 [5-14](#449652_2_En_5_Chapter.xhtml#Fig14)
    所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig14_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig14_HTML.jpg)

    图 5-14 文本已选定到剪贴板


    将公钥存储在 Visual Studio 中 `ExecuteCatalogPackageTask.cs` 类的注释中。我们稍后将在后面用到它，如图 [5-15](#449652_2_En_5_Chapter.xhtml#Fig15)
    所示：

    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig15_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig15_HTML.jpg)

    图 5-15 公钥已存储'
  raw: '## Preparing to Add a Key


    I recommend opening a command window as an Administrator to begin. Open the Windows
    Start menu and locate Command Prompt. Right-click Command Prompt, hover over “More,”
    and then click “Run as Administrator” as shown in Figure [5-1](#449652_2_En_5_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig1_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Opening an Administrator command window


    When prompted, click the Yes button as shown in Figure [5-2](#449652_2_En_5_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig2_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Allowing Command Prompt to execute as Administrator


    When open, the Administrator command window appears as shown in Figure [5-3](#449652_2_En_5_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig3_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Administrator command window


    We are creating an assembly (actually, a couple of assemblies) that will reside
    in the Global Assembly Cache, or GAC. In order to live in the GAC, assemblies
    must be *signed*. We sign assemblies using *strong name key files*. At this point
    in our project configuration, we need to generate a key suitable to sign our assemblies.
    To that end, there is good and bad news:


    *   The good news: Microsoft provides a Strong Name utility (sn.exe) for creating
    keys.


    *   The bad news: The Strong Name utility moves around with new releases of the
    .Net Framework.


    If you are developing on Windows Server 2019, you can find the strong name utility
    in the C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\
    folder. The strong name utility is named “sn.exe,” so the full path is “C:\Program
    Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\sn.exe”. If you
    are reading this verbiage in the distant future and snickering about how archaic
    Windows Server 2019 was, search for “sn.exe” and use the latest version you find
    (smarty-pants).


    Tip


    You can manage this process in any manner you prefer. I recommend you create a
    text file to preserve key-related command lines. I firmly believe Future You will
    thank you later.


    I begin by adding a New Item to the project as shown in Figure [5-4](#449652_2_En_5_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig4_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Adding a new item to the project


    I select a Text File and name my notes file “Notes.txt” (because I am feeling
    especially creative) as shown in Figure [5-5](#449652_2_En_5_Chapter.xhtml#Fig5):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig5_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Naming the notes file


    I next paste the following lines:


    ```

    -- key generation

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 ➥ Tools\sn.exe"
    -k key.snk

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 ➥ Tools\sn.exe"
    -p key.snk public.out

    "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 ➥ Tools\sn.exe"
    -t public.out

    ```


    The first line creates the public/private key pair and puts them in a file named
    key.snk.


    The second line extracts the public part of the key pair to a file named public.out.


    The third line reads the public key from the public.out file.


    Note


    The ➥ symbol means this should all be on one line, but Microsoft Word doesn’t
    create wide enough lines for me to represent the code as such.


    Notes.txt now appears in Solution Explorer as shown in Figure [5-6](#449652_2_En_5_Chapter.xhtml#Fig6):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig6_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Notes.txt in Solution Explorer


    The Notes.txt file has also been added to the project folder as shown in Figure
    [5-7](#449652_2_En_5_Chapter.xhtml#Fig7):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig7_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Notes.txt in the project folder


    ## Creating the Key


    In the command window, navigate to the ExecuteCatalogPackageTask project directory.
    The project directory will contain ExecuteCatalogPackageTask.cs, ExecuteCatalogPackageTask.csproj,
    as well as the Notes.txt file as shown in Figure [5-8](#449652_2_En_5_Chapter.xhtml#Fig8):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig8_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Navigating to the ExecuteCatalogPackageTask project directory


    If it is not already open, open the Notes.txt in Visual Studio from Solution Explorer.
    Select the first line, copy it, and paste it into the command window as shown
    in Figure [5-9](#449652_2_En_5_Chapter.xhtml#Fig9):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig9_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Pasting into the command window


    Press the Enter key to execute the sn.exe command, creating the key file in the
    ExecuteCatalogPackageTask project directory as shown in Figure [5-10](#449652_2_En_5_Chapter.xhtml#Fig10):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig10_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Key.snk file created


    We need to get the public key’s public/private pair from key.snk file. First,
    we extract the public key to a file named public.out using the second line stored
    in Notes.txt as shown in Figure [5-11](#449652_2_En_5_Chapter.xhtml#Fig11):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig11_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Public key extraction


    Finally, we need to read the public key value out of the file to which we extracted
    it as shown in Figure [5-12](#449652_2_En_5_Chapter.xhtml#Fig12):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig12_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Reading the public key


    Using the left mouse button, highlight the public key value as shown in Figure
    [5-13](#449652_2_En_5_Chapter.xhtml#Fig13):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig13_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig13_HTML.jpg)


    Figure 5-13


    Selecting the public key in the command window


    Right-click the highlighted text. Note that no context menu will appear. Your
    indication the text has been copied to the clipboard is the highlighting and “Select”
    text in the title bar disappears as shown in Figure [5-14](#449652_2_En_5_Chapter.xhtml#Fig14):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig14_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Text selected to the clipboard


    Store the public key in a comment inside the class ExecuteCatalogPackageTask.cs
    in Visual Studio. We will use it here later as shown in Figure [5-15](#449652_2_En_5_Chapter.xhtml#Fig15):


    ![../images/449652_2_En_5_Chapter/449652_2_En_5_Fig15_HTML.jpg](images/449652_2_En_5_Chapter/449652_2_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Public key stored'
