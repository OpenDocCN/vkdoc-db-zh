    Listing 13-9

    IDTSTaskUIView interface methods for SettingsView, commented out

    ```


    The next step is to implement the `SettingsView OnInitialize` method.


    ### Implementing SettingsView OnInitialize


    Implement the `SettingsView OnInitialize` method by replacing the current `OnInitialize`
    method code with the code in Listing [13-10](#449652_2_En_13_Chapter.xhtml#PC10):


    ```

    public virtual void OnInitialize(IDTSTaskUIHost treeHost

    , System.Windows.Forms.TreeNode viewNode

    , object taskHost

    , object connections)

    {

    if (taskHost == null)

    {

    throw new ArgumentNullException("Attempting to initialize the ExecuteCatalogPackageTask
    UI with a null TaskHost");

    }

    if (!(((TaskHost)taskHost).InnerObject is ExecuteCatalogPackageTask.ExecuteCatalogPackageTask))

    {

    throw new ArgumentException("Attempting to initialize the ExecuteCatalogPackageTask
    UI with a task that is not a ExecuteCatalogPackageTask.");

    }

    theTask = ((TaskHost)taskHost).InnerObject as ExecuteCatalogPackageTask.ExecuteCatalogPackageTask;

    this.settingsNode = new SettingsNode(taskHost as TaskHost, connections);

    settingsPropertyGrid.SelectedObject = this.settingsNode;

    }

    Listing 13-10

    Implementing OnInitialize for SettingsView

    ```


    As when coding the `GeneralView`, repair the missing `using` directive to clear
    the `TaskHost` design-time warning (see Figure [13-3](#449652_2_En_13_Chapter.xhtml#Fig3)).
    We will clear the `SettingsNode` design-time warning – the red squiggly line –
    later.


    The `SettingsView OnInitialize` method should now appear as shown in Figure [13-20](#449652_2_En_13_Chapter.xhtml#Fig20):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig20_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig20_HTML.jpg)


    Figure 13-20


    The SettingsView OnInitialize method


    Visual Studio line numbers are included in Figure [13-20](#449652_2_En_13_Chapter.xhtml#Fig20)
    to aid in code functionality discussion. Lines 59–63 are the `SettingsView OnInitialize`
    method’s declaration and arguments.


    Lines 64–67 check to see if the `taskHost` member is null and, if `taskHost` is
    null, throw an `ArgumentNullException` that includes the message: “Attempting
    to initialize the ExecuteCatalogPackageTask UI with a null TaskHost.”


    Lines 69–72 test whether the `SettingsView taskHost` member’s `InnerObject` may
    *not* be cast to an instance of the `ExecuteCatalogPackageTask` type. If the `SettingsView
    taskHost` member’s `InnerObject` cannot be cast to an `ExecuteCatalogPackageTask`,
    the code throws an `ArgumentException` that includes the message: “Attempting
    to initialize the ExecuteCatalogPackageTask UI with a task that is not an ExecuteCatalogPackageTask.”


    If the previous “type test” succeeds, the `SettingsView theTask` member’s `InnerObject`
    is assigned to the `ExecuteCatalogPackageTask` object on line 74.


    On line 76, the `SettingsView generalNode` member is initialized (the code here
    is currently broken, but we will fix it soon).


    Finally, the `SettingsView settingsPropertyGrid` member is initialized as the
    `settingsNode`.


    As with the `GeneralView`, there are a lot of moving parts in the `SettingsView
    OnInitialize` method. The new `SettingsView OnInitialize` method is coupling the
    `ExecuteCatalogPackageTaskComplexUI` to the `ExecuteCatalogPackageTask` using
    the `SettingsView taskHost` member. Once that succeeds – and the code will throw
    an exception if the coupling is not possible – the `SettingsView`’s `settingsNode`
    member is initialized (to a new `SettingsNode` object), and the `SettingsView`’s
    `settingsPropertyGrid` is, in turn, initialized to the (new) `settingsNode`.


    ### Adding ExecuteCatalogPackageTask Properties


    Before implementing `SettingsView OnCommit`, we need to add a few properties to
    the `ExecuteCatalogPackageTask` class . Open the ExecuteCatalogPackageTask.cs
    file in the ExecuteCatalogPackageTask project, and then add the member declarations
    in Listing [13-11](#449652_2_En_13_Chapter.xhtml#PC11):


    ```

    public string ConnectionManagerName { get; set; } = String.Empty;

    public bool Synchronized { get; set; } = false;

    public bool Use32bit { get; set; } = false;

    public string LoggingLevel { get; set; } = "Basic";

    Listing 13-11

    Adding ExecuteCatalogPackageTask members

    ```


    When added, the new `ExecuteCatalogPackageTask` members appear as shown in Figure
