    键值对的值


    在 SSIS 包中，该值由 SSIS 开发人员在编辑时配置。当 SSIS 开发人员单击编辑器上的“确定”按钮时，`OnCommit`方法触发，并将键值属性配置存储在
    SSIS 包的 XML 中，如图[13-12](#449652_2_En_13_Chapter.xhtml#Fig12)所示：


