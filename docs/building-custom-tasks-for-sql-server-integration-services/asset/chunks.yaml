    图 17-7

    添加 using 指令后的 `GetFoldersFromCatalog` 方法


    `GetFoldersFromCatalog` 方法构造并填充一个 `ArrayList` 类型的变量，该变量包含由 `SourceConnection`
    属性所呈现的 SSIS 目录中托管的 SSIS 目录文件夹列表。


