- fmt: '### The Package Property and Packages Collection


    The relationship between the `Package` property and the `Packages` collection
    is identical to the relationship between the `Project` property and the `Projects`
    collection. The only difference is the objects themselves. As with the `Projects`
    collection, we must manage the collection of SSIS Catalog Packages in our code.


    Add a new `Package` property to the `SettingsNode` class using the code in Listing
    17-16:


    ```csharp

    [

    Category("SSIS Catalog Package Properties"),

    Description("Select SSIS Catalog Package name."),

    TypeConverter(typeof(Packages))

    ]

    public string Package {

    get { return _task.PackageName; }

    set {

    if (value == null)

    {

    throw new ApplicationException("Package name cannot be empty");

    }

    _task. PackageName = value;

    }

    }

    // Listing 17-16

    // Add the SettingsNode.Package property

    ```


    Once added, the code appears as shown in Figure 17-29:


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig29_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig29_HTML.jpg)


    *Figure 17-29: Adding the SettingsNode.Package property*


    As before with the `Folder` and `Project` `TypeConverter`s, please note the `Packages`
    `TypeConverter` has a red squiggly line beneath it, indicating the same error
    condition as before: The `Packages` `TypeConverter` does not yet exist. Add the
    `Packages` `TypeConverter` using the code in Listing 17-17:


    ```csharp

    internal class Packages : StringConverter

    {

    private object GetSpecializedObject(object contextInstance)

    {

    DTSLocalizableTypeDescriptor typeDescr = contextInstance as DTSLocalizableTypeDescriptor;

    if (typeDescr == null)

    {

    return contextInstance;

    }

    return typeDescr.SelectedObject;

    }

    public override StandardValuesCollection GetStandardValues(ITypeDescriptorContext
    context)

    {

    object retrievalObject = GetSpecializedObject(context.Instance) as object;

    return new StandardValuesCollection(getPackages(retrievalObject));

    }

    public override bool GetStandardValuesExclusive(ITypeDescriptorContext context)

    {

    return true;

    }

    public override bool GetStandardValuesSupported(ITypeDescriptorContext context)

    {

    return true;

    }

    private ArrayList getPackages(object retrievalObject)

    {

    SettingsNode node = (SettingsNode)retrievalObject;

    ArrayList list = new ArrayList();

    ArrayList listPackages;

    listPackages = (ArrayList)node.Packages;

    if (listPackages == null)

    {

    listPackages = new ArrayList();

    }

    if (listPackages != null)

    {

    // adds each package

    foreach (string pkg in listPackages)

    {

    list.Add(pkg); // Package name

    }

    // sorts the package list

    if ((list != null) && (list.Count > 0))

    {

    list.Sort();

    }

    }

    return list;

    }

    }

    // Listing 17-17

    // The Packages TypeConverter

    ```


    Once added, the `Projects` `TypeConverter` code appears as shown in Figure 17-30:


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig30_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig30_HTML.jpg)


    *Figure 17-30: The Packages TypeConverter*


    Note the `getPackages` method displays an error – a red squiggly line under `node.Packages`.
    We correct that error in the coming pages by adding the `Packages` property to
    the `SettingsNode` class.


    When the `Packages` `TypeConverter` is added, the error in the `Package` property
    declaration is resolved, as shown in Figure 17-31 (compare to Figure 17-29):


