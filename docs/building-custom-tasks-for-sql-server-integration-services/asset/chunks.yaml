  trans: '## 结论


    代码与编辑器现已作为一个整体运作。


    此时是执行提交并推送到 Azure DevOps 的好时机。


    在当前的开发阶段，我们已经：


    *   创建并配置了一个 Azure DevOps 项目

    *   将 Visual Studio 连接到 Azure DevOps 项目

    *   在本地克隆了 Azure DevOps Git 仓库

    *   创建了一个 Visual Studio 项目

    *   向 Visual Studio 项目添加了引用

    *   对项目代码执行了初始签入

    *   对程序集进行了签名

    *   签入了一次更新

    *   配置了生成输出路径和生成事件

    *   重写了 Task 基类中的三个方法

    *   为 Task 编辑器添加了大部分项目并编写了代码

    *   将 Task 编辑器与 Task 连接起来


    但如果事情不按这样发展呢？如果出现错误怎么办？


    我们接下来扩展编辑器功能。


    # 10. 扩展编辑器功能


    《为 SQL Server 集成服务构建自定义任务》的第一版于 2017 年出版。第 10 章涵盖了故障排除技巧。第 11 章包含了我根据经验总结的笔记。本版将包含这些章节……但会稍后放入。


    本书的这一部分是第二版新增的。本章及后续章节的目标是扩展“执行目录包任务”的功能，具体包括：


    *   为任务用户提供更“SSIS 风格”的体验，包括一个带有“常规”和“设置”页面视图的“漂亮”编辑器

    *   启用 SSIS 表达式的使用

    *   添加对任务设置的运行时验证

    *   在编辑器中展示更多 SSIS 目录执行属性


    我们在本章开始这些工作，重构现有的 `ExecuteCatalogPackageTask` 代码，并用一个新版本替换现有的任务编辑器项目。


    ## 重构


    开发者有时会有机会重写或更新他们代码的旧版本。代码使用的时间越长，开发者积累的经验就越多。*重构* 有几种定义方式，包括清理、简化和重组现有代码。


    在本章中，我们从重构 `ExecuteCatalogPackageTask` 代码开始，首先管理变量的作用域。


    ### 添加和更新任务属性


    有一项改动将直接解决上述要点之一，并使我们更接近解决其他几个：将 SSIS 目录、服务器和其他 SSIS 包相关对象作为私有属性添加到 `ExecuteCatalogPackageTask`
    对象中。


    检查 `ExecuteCatalogPackageTask` 项目中的 `ExecuteCatalogPackageTask` 类，我们在 `PackageCatalog`
    属性中发现了 SSIS 目录对象的 *开头*，如图 10-1 所示：


    ![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig1_HTML.jpg](img/449652_2_En_10_Fig1_HTML.jpg)

    *图 10-1：`PackageCatalog` 属性*


    `PackageCatalog` 属性是一个字符串，包含 SSIS 目录的名称。在撰写本文时，SSIS 目录名称一直保持一致且未变，即 “SSISDB”。包含此属性是为未来的“执行目录包任务”做准备，以防将来
    SSIS 目录的版本允许编辑 SSIS 目录名称，但我不喜欢“执行目录包任务”的 `PackageCatalog` 属性名称。


    将“执行目录包任务”的 `PackageCatalog` 属性重命名为 “`PackageCatalogName`”，点击左侧边栏中的“快速操作”螺丝刀图标，然后点击“将‘`PackageCatalog`’重命名为‘`PackageCatalogName`’”，如图
    10-2 所示：


    ![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig2_HTML.jpg](img/449652_2_En_10_Fig2_HTML.jpg)

    *图 10-2：将 `PackageCatalog` 属性重命名为 “`PackageCatalogName`”*


    `PackageCatalogName` 是对先前名为 `PackageCatalog` 的属性更准确的名称。


    当前版本的“执行目录包任务”在 `Execute` 方法中包含一个类型为 `Microsoft.SqlServer.Management.IntegrationServices.Catalog`
    的变量，如图 10-3 所示：


    ![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig3_HTML.jpg](img/449652_2_En_10_Fig3_HTML.jpg)

    *图 10-3：一个类型为 `Microsoft.SqlServer.Management.IntegrationServices.Catalog` 的变量*


    将此属性从 `Execute` 方法中剪切出来，并为类作用域中的任务使用一个新的、类型为 `Microsoft.SqlServer.Management.IntegrationServices.Catalog`
    的私有属性，这有多困难？一旦在任务配置期间有足够的信息可用，我们就可以为 `catalog` 属性赋值。毕竟，“执行目录包任务”将连接到一个且仅一个 SSIS
    目录。


    首先，在 `ExecuteCatalogPackageTask` 属性列表中添加一个名为 `catalog`、类型为 `Microsoft.SqlServer.Management.IntegrationServices`
    的新属性，如清单 10-1 和图 10-4 所示：


    ![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig4_HTML.jpg](img/449652_2_En_10_Fig4_HTML.jpg)

    *图 10-4：声明一个 `Catalog` 属性*


    ```csharp

    public Catalog catalog { get; set; } = null;

    ```

    *清单 10-1：添加 `Catalog` 属性的代码*


    > **注意**

    > 此属性的名称首字母不大写。这是有意为之。此属性将是任务内部的。此外，对象类型不需要包含 “`Microsoft.SqlServer.Management.IntegrationServices`”，因为代码在类代码顶部包含了
    `using Microsoft.SqlServer.Management.IntegrationServices`。


    因为 `catalog` 属性是 `ExecuteCatalogPackageTask` 类内部的，所以它被声明为 `private`。


    趁此机会，让我们将其他变量从 `Execute` 方法迁移到私有属性，例如 `catalogServer`（`Microsoft.SqlServer.Management.Smo.Server`
    类型）、`integrationServices`（`Microsoft.SqlServer.Management.IntegrationServices`
    类型）、`catalogFolder`（`Microsoft.SqlServer.Management.IntegrationServices.CatalogFolder`
    类型）、`catalogProject`（`Microsoft.SqlServer.Management.IntegrationServices.ProjectInfo`
    类型）、`catalogPackage`（`Microsoft.SqlServer.Management.IntegrationServices.PackageInfo`
    类型），如清单 10-2 和图 10-5 所示：


    ```csharp

    private Server catalogServer { get; set; } = null;

    private IntegrationServices integrationServices { get; set; } = null;

    private CatalogFolder catalogFolder { get; set; } = null;

    private ProjectInfo catalogProject { get; set; } = null;

    private Microsoft.SqlServer.Management.IntegrationServices.PackageInfo catalogPackage
    { get; set; } = null;

    ```

    *清单 10-2：添加其他属性*


    请注意 `catalogPackage` 私有属性的完整数据类型说明。必须声明变量类型的全名，因为在 `Microsoft.SqlServer.Dts.Runtime`
    程序集中存在另一个不同的 `PackageInfo` 类型。如果不具体说明，Visual Studio 会报错，因为它无法确定我们希望使用哪个 `PackageInfo`
    类型。


    ![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig5_HTML.jpg](img/449652_2_En_10_Fig5_HTML.jpg)

    *图 10-5：添加的其他属性*


    接下来让我们更新 `Execute` 方法，以初始化我们刚刚添加的类作用域变量。'
- fmt: "### Updating the Execute Method\n\nTo continue our refactoring effort, update\
    \ the variables declared in the `Execute` method to use and initialize the new\
    \ internal task properties.\n\nThe current state of the `Execute` method is listed\
    \ in Listing [10-3](#449652_2_En_10_Chapter.xhtml#PC3) and shown in Figure [10-6](#449652_2_En_10_Chapter.xhtml#Fig6):\n\
    \n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig6_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig6_HTML.jpg)\n\
    *Figure 10-6: The current version of the Execute method*\n\n```\npublic override\
    \ DTSExecResult Execute(\n    Connections connections,\n    VariableDispenser\
    \ variableDispenser,\n    IDTSComponentEvents componentEvents,\n    IDTSLogging\
    \ log,\n    object transaction)\n{\n    Server catalogServer = new Server(ServerName);\n\
    \    IntegrationServices integrationServices = new IntegrationServices(catalogServer);\n\
    \    Catalog catalog = integrationServices.Catalogs[PackageCatalogName];\n   \
    \ CatalogFolder catalogFolder = catalog.Folders[PackageFolder];\n    ProjectInfo\
    \ catalogProject = catalogFolder.Projects[PackageProject];\n    Microsoft.SqlServer.Management.IntegrationServices.PackageInfo\
    \ catalogPackage = catalogProject.Packages[PackageName];\n    catalogPackage.Execute(false,\
    \ null);\n    return DTSExecResult.Success;\n}\n```\n*Listing 10-3: The Execute\
    \ method, currently*\n\nWe want to initialize the new class-scoped variables in\
    \ the `Execute` method, so we need to remove the type declarations. Update the\
    \ type declaration and initialization code to *remove* type declarations, as shown\
    \ in Listing [10-4](#449652_2_En_10_Chapter.xhtml#PC4):\n\n```\ncatalogServer\
    \ = new Server(ServerName);\nintegrationServices = new IntegrationServices(catalogServer);\n\
    catalog = integrationServices.Catalogs[PackageCatalogName];\ncatalogFolder = catalog.Folders[PackageFolder];\n\
    catalogProject = catalogFolder.Projects[PackageProject];\ncatalogPackage = catalogProject.Packages[PackageName];\n\
    ```\n*Listing 10-4: Removing Execute method variable type declarations*\n\nAt\
    \ this point in our efforts to expand the functionality of the Execute Catalog\
    \ Package Task, we may test by building the solution and testing the task (see\
    \ Chapter [9](#449652_2_En_9_Chapter.xhtml), sections “Building the Task” and\
    \ “Testing the Task”). This is a good test of our changes to the `Execution` method.\n\
    \n## Adding a New Editor\n\nTwo bullets from the introduction of this chapter\
    \ are:\n\n*   Surface a more “SSIS-y” experience for users of the task including\
    \ a “pretty” editor with General and Settings pages “views.”\n*   Enable the use\
    \ of SSIS Expressions.\n\nBefore moving forward in this section, the author owes\
    \ a debt of gratitude to Kirk Haselden for his outstanding early SSIS book titled\
    \ *Microsoft SQL Server 2005 Integration Services* (amazon.com/Microsoft-Server-2005-Integration-Services-dp-0672327813/dp-0672327813),\
    \ Sams Publishing, 2006.\n\nI know lots of people who learned about custom SSIS\
    \ tasks from Kirk’s book.\n\nThank you, Kirk!\n\n### Complex UI Overview\n\nThis\
    \ section of the book is difficult and advanced. At the heart of the complex UI\
    \ is the `Microsoft.DataTransformationServices.Controls` assembly. Inheriting\
    \ from the `Microsoft.DataTransformationServices.Controls` assembly is challenging\
    \ and can be nonintuitive. That said, the functionality surfaced in the `Microsoft.DataTransformationServices.Controls`\
    \ assembly is more than worth the time required to overcome any challenges and\
    \ manage its nonintuitive-ness.\n\nThe `Microsoft.DataTransformationServices.Controls`\
    \ assembly requires development of *views*, which SSIS developers encounter when\
    \ we open a task editor. Each view represents a high-level collection of task\
    \ properties. Views are listed on the left side of the editor and outlined by\
    \ the green box in Figure [10-7](#449652_2_En_10_Chapter.xhtml#Fig7):\n\n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig7_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig7_HTML.jpg)\n\
    *Figure 10-7: The Execute SQL Task’s General page*\n\nUnder the hood of each view\
    \ is a *node*, defined as an internal C# class instantiated for each view. Each\
    \ node surfaces a `PropertyGrid` control, which is shown in Figure [10-7](#449652_2_En_10_Chapter.xhtml#Fig7)\
    \ inside the blue box.\n\nA node manages a collection of task properties organized\
    \ by property category. Each task property is a C# property in the node class.\
    \ An example we will build out later is the `Name` property in the General node\
    \ of the General view. The code represents a View ➤ Node ➤ Property Category ➤\
    \ Property hierarchy. The code flows as shown in Listing [10-5](#449652_2_En_10_Chapter.xhtml#PC5):\n\
    \n```\nnamespace ExecuteCatalogPackageTaskComplexUI\n{\n    public partial class\
    \ GeneralView\n    {\n        private GeneralNode generalNode = null;\n    }\n\
    \    internal class GeneralNode\n    {\n        [\n            Category(\"General\"\
    ),\n            Description(\"Specifies the name of the task.\")\n        ]\n\
    \        public string Name\n        {\n            get { return taskHost.Name;\
    \ }\n            set { taskHost.Name = value; }\n        }\n    }\n}\n```\n*Listing\
    \ 10-5: Partial listing for General view, General node, Name property*\n\nThe\
    \ View ➤ Node ➤ Property Category ➤ Property hierarchy shown in the partial listing\
    \ in Listing [10-5](#449652_2_En_10_Chapter.xhtml#PC5) begins with the view named\
    \ `GeneralView`. `GeneralView` declares a private member of the `GeneralNode`\
    \ type named `generalNode`. The `GeneralNode` class contains a string type property\
    \ named `Name`. The `Name` property is decorated with `Category` and `Description`\
    \ decorations, and the `Category` decoration contains the name for the property\
    \ category (“General”).\n\nFigure [10-8](#449652_2_En_10_Chapter.xhtml#Fig8) visualizes\
    \ the hierarchy for the Execute SQL Task Editor. As mentioned earlier, the General\
    \ view (in the green box on the left) displays the General node – represented\
    \ by the `propertygrid` control (in the blue box on the right). The property category\
    \ named “General” is shown in the red box. The `Name` property is shown enclosed\
    \ in the yellow box, as shown in Figure [10-8](#449652_2_En_10_Chapter.xhtml#Fig8):\n\
    \n![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig8_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig8_HTML.jpg)\n\
    *Figure 10-8: Visualizing View ➤ Node ➤ Property Category ➤ Property*\n\nApplied\
    \ to the View ➤ Node ➤ Property Category ➤ Property hierarchy, the names of the\
    \ entities for the Execute SQL Task Editor – shown in Figure [10-8](#449652_2_En_10_Chapter.xhtml#Fig8)\
    \ – are as follows: General (View) ➤ General (Node) ➤ General (Property Category)\
    \ ➤ Name (Property). That’s a lot of General’s, and one – the General node – is\
    \ hiding beneath the `propertygrid` control."
