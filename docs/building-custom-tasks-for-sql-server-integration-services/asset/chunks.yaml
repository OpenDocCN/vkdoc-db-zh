    ## Caveats


    The demo in this chapter makes a number of assumptions, and as a result, there
    are many caveats. Suffice it to say the author is aware of many, but not all,
    of the assumptions and caveats and is intrigued to see how readers adapt and change
    and improve the ideas presented herein.


    ## Conclusion


    In this chapter, we leveraged the Execute Catalog Package Task to build a metadata-driven
    SSIS Catalog-based SSIS framework. The metadata-driven framework was similar to
    the on-premises version of the SSIS framework in the *SQL Server Data Automation
    Through Frameworks* book and SSIS Framework Community Edition ([dilmsuite.com/ssis-framework-community-edition](https://dilmsuite.com/ssis-framework-community-edition))
    – a free and open source project that is part of the collection of utilities that
    make up the Data Integration Lifecycle Management Suite ([dilmsuite.com](https://dilmsuite.com)).


    The framework in this chapter does not exhaust the capabilities of the Execute
    Catalog Package Task. You may configure the Expressions view to override *any*
    property expression, as shown in Figure [23-51](#449652_2_En_23_Chapter.xhtml#Fig51):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig51_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig51_HTML.jpg)


    Figure 23-51


    Execute Catalog Package Task Property Expressions


    Now would be an excellent time to check in your code.


    # 24. Deploying to Azure-SSIS


    In the previous chapter, we built an SSIS framework to execute metadata-driven
    collections of SSIS packages using the Execute Catalog Package Task. In this chapter,
    we build an instance of the Azure-SSIS integration runtime that installs the Execute
    Catalog Package Task, and then we migrate the metadata-drive framework from the
    previous chapter to Azure. To accomplish this goal, we will


    *   Provision an Azure SQL Database instance to host the `SSISDB` database and
    SSIS Catalog

    *   Provision an Azure Data Factory

    *   Create and configure the Deployment Container

    *   Provision an Azure-SSIS Integration Runtime (IR) configured to install the
    Execute Catalog Package Task’s `msi` file


    Before moving forward, let’s take a look at SSIS package location options surfaced
    by the Azure Data Factory Execute SSIS Package activity.


    ## Examining Package Location Options


    SSIS packages may be executed in Azure Data Factory using the Execute SSIS Package
    Activity. At the time of this writing, the Package Location property lists five
    options for SSIS package sources, as shown in Figure [24-1](#449652_2_En_24_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_24_Chapter/449652_2_En_24_Fig1_HTML.jpg](images/449652_2_En_24_Chapter/449652_2_En_24_Fig1_HTML.jpg)


    Figure 24-1


    Package Location options for Execute SSIS Package Activity


    `SSISDB` is the SSIS Catalog, which we will use in this chapter. File System (Package)
    refers to individual SSIS package `dtsx` files stored in an Azure File Share.
    File System (Project) refers to `ispac` files, which are SSIS project deployment
    files that contain individual SSIS package `dtsx` files for SSIS packages included
    in the SSIS project, stored in an Azure File Share. Embedded Package allows developers
    to upload an individual SSIS package `dtsx` file. Package store is similar to
    the legacy SSIS package store. See Microsoft’s SSIS package store documentation
    ([docs.microsoft.com/en-us/azure/data-factory/azure-ssis-integration-runtime-package-store](https://docs.microsoft.com/en-us/azure/data-factory/azure-ssis-integration-runtime-package-store)
    [as of 28 Oct 2020]) for more information.


    In sum, an Azure-SSIS IR supports


    *   Running packages deployed into SSIS catalog (`SSISDB`) hosted by Azure SQL
    Database server/Managed Instance (Project Deployment Model)

    *   Running packages deployed into file system, Azure Files, or SQL Server database
    (`MSDB`) hosted by Azure SQL Managed Instance (Package Deployment Model)


    Package Deployment Model supports provisioning an Azure-SSIS IR with *package
    stores*. Package stores surface a package management layer on top of file system,
    Azure Files, or `MSDB` hosted in an Azure SQL Managed Instance. Azure-SSIS IR
    package store allows developers to import, export, delete, and run packages, as
    well as monitor and stop running packages via `SQL Server Management Studio (SSMS)`
    – similar to the legacy SSIS package store.


    The first step is to provision an Azure SQL DB.'
