- fmt: "### Coding the GeneralView Class\n\nThe code in this section builds part of\
    \ the `View` portion of the View ➤ Node ➤ Property Category ➤ Property hierarchy.\
    \ It is important to note the `GeneralView` class is actually a `System.Windows.Forms`\
    \ object, and this is why the implementation automatically added the statement\
    \ `using System.Windows.Forms`. Later in this chapter, we will add standard and\
    \ typical `Form` methods manually. Why not simply add `GeneralView` as a form?\
    \ This book is written for people who are not professional software developers.\
    \ Adding a class instead of adding a form is one way to emphasize the fact that\
    \ forms *are* classes.\n\nIn Solution Explorer, right-click the `ExecuteCatalogPackageTaskComplexUI`\
    \ project, hover over **Add**, and then click **Class…**. When the **Add New Item**\
    \ dialog displays, change `Class1.cs` to `GeneralView.cs`, as shown in Figure\
    \ 11-18:\n\n![../images/449652_2_En_11_Chapter/449652_2_En_11_Fig18_HTML.jpg](images/449652_2_En_11_Chapter/449652_2_En_11_Fig18_HTML.jpg)\n\
    \nFigure 11-18\nAdding the `GeneralView` class\n\nClick the **Add** button to\
    \ add the new `GeneralView` class.\n\nEdit the class declaration using the code\
    \ in Listing 11-13:\n\n```\npublic partial class GeneralView : System.Windows.Forms.UserControl,\
    \ IDTSTaskUIView\n```\n\nListing 11-13\n`GeneralView` class declaration\n\nOnce\
    \ edited, the code should appear as shown in Figure 11-19:\n\n![../images/449652_2_En_11_Chapter/449652_2_En_11_Fig19_HTML.jpg](images/449652_2_En_11_Chapter/449652_2_En_11_Fig19_HTML.jpg)\n\
    \nFigure 11-19\n`GeneralView` class declaration, edited\n\n`GeneralView` is declared\
    \ inheriting two interfaces:\n*   `System.Windows.Forms.UserControl`\n*   `IDTSTaskUIView`\n\
    \nAdd a `using` statement for the `Microsoft.DataTransformationServices.Controls`\
    \ assembly – in Listing 11-14 – to implement the `IDTSTaskUIView` interface:\n\
    \n```\nusing Microsoft.DataTransformationServices.Controls;\n```\n\nListing 11-14\n\
    `using` statement for `IDTSTaskUIView`\n\nAdding the `using` statement clears\
    \ the immediate error in the `GeneralView` class, but another error exists. Hovering\
    \ over the red squiggly underlined `IDTSTaskUIView` text, the potential fixes\
    \ \"helper\" icon displays, as shown in Figure 11-20:\n\n![../images/449652_2_En_11_Chapter/449652_2_En_11_Fig20_HTML.jpg](images/449652_2_En_11_Chapter/449652_2_En_11_Fig20_HTML.jpg)\n\
    \nFigure 11-20\n`IDTSTaskUIView` interface is recognized but not yet implemented\n\
    \nClick the dropdown and then click **Implement interface** as shown in Figure\
