- fmt: '# Decorating the Class


    If you are reading this near the holidays, I know what you’re thinking: “Andy,
    the holidays are almost over. Why are we decorating now?” It’s not that kind of
    decorating.


    We decorate to inform Visual Studio this class is *different*. In this case, the
    class is different because it is part of an SSIS task. Our decoration code goes
    just prior to the class definition and is composed of the code in Listing [7-1](#449652_2_En_7_Chapter.xhtml#PC2).
    We add this code to tell Visual Studio more about what we’re building, as displayed
    in Figure [7-2](#449652_2_En_7_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_7_Chapter/449652_2_En_7_Fig2_HTML.jpg](images/449652_2_En_7_Chapter/449652_2_En_7_Fig2_HTML.jpg)


    Figure 7-2: Decorating the class


    ```csharp

    [DtsTask(

    TaskType = "DTS"

    , DisplayName = "Execute Catalog Package Task"

    , Description = "A task to execute packages stored in the SSIS Catalog."

    )]

    ```


    *Listing 7-1: Decorating the class*


    The `TaskType` attribute is optional. SSIS 2019 is version 150. One could argue
    for permitting SSIS 2012, version 110, for the `TaskType` attribute in the `DtsTask`
    decoration since the SSIS Catalog was introduced with SSIS 2012. Since this project
    is built using Visual Studio 2019 using the default .Net Framework – 4.7.2 at
    the time of this writing – the author opted to code the task for SSIS 2019 and
    later.


    # Inheriting from Microsoft.SqlServer.Dts.Runtime.Task


    Once the reference and decoration are in place, the next step is to configure
    inheritance from the `Microsoft.SqlServer.Dts.Runtime.Task` object. Inheriting
    `Microsoft.SqlServer.Dts.Runtime.Task` provides a framework for a lot of the work
    to come, including methods the code will override.


    Modify the class definition to inherit from the `Task` object as shown in Listing
    [7-2](#449652_2_En_7_Chapter.xhtml#PC3):


    ```csharp

    public class ExecuteCatalogPackageTask : Microsoft.SqlServer.Dts.Runtime.Task

    ```


    *Listing 7-2: Inheriting from Task*


    Your class should now appear as shown in Figure [7-3](#449652_2_En_7_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_7_Chapter/449652_2_En_7_Fig3_HTML.jpg](images/449652_2_En_7_Chapter/449652_2_En_7_Fig3_HTML.jpg)


    Figure 7-3: Inheriting Task


    The actions taken so far combine to create a relationship between our code and
    the `base code` included in the `ManagedDTS` assembly we referenced and `using`
    statement earlier. Now it’s time to build on that relationship by adding the things
    we want our task to do.


    What do we want our task to do? We want to start an SSIS Package that’s been deployed
    to an SSIS Catalog. To accomplish this, we need to provide the name of a SQL Server
    Instance that hosts an SSIS Catalog, the name of the SSIS Catalog Folder that
    contains the SSIS Project, the name of the SSIS Project that contains the SSIS
    Package, and the name of the SSIS Package.


    # Adding a Property


    Properties provide a mechanism to expose values of internal variables to objects
    outside the class. In a class, a property may be coded using an internal private
    variable and publicly accessible property. Properties may also be coded using
    a `get`/`set` at declaration.


    Create properties by adding the lines of code after the class declaration:


    ```csharp

    public string ServerName { get; set; } = String.Empty;

    public string PackageCatalog { get; set; } = "SSISDB ";

    public string PackageFolder { get; set; } = String.Empty;

    public string PackageProject { get; set; } = String.Empty;

    public string PackageName { get; set; } = String.Empty;

    ```


    *Listing 7-3: Declaring task properties*


    The class should now appear as shown in Figure [7-4](#449652_2_En_7_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_7_Chapter/449652_2_En_7_Fig4_HTML.jpg](images/449652_2_En_7_Chapter/449652_2_En_7_Fig4_HTML.jpg)


    Figure 7-4: Adding properties


    Task properties will contain `string` values, and we will use the `string` values
    internally in the task. For example, the property named `ServerName` will surface
    name of an instance of SQL Server that hosts an SSIS Catalog. The Execute Catalog
    Package Task will connect to this SQL Server instance to execute an SSIS package
    stored in the SSIS Catalog hosted on the instance named in the `ServerName` property.


    Note the `PackageCatalog` property defaults to “SSISDB” and the other properties
    default the `String.Empty`. At the time of this writing, Microsoft limits the
    number of SSIS Catalogs to one catalog per SQL Server instance and defaults the
    name of this catalog to “SSISDB.” Although the `PackageCatalog` defaults to “SSISDB,”
    the value may be overridden if desired. Coding the task in this manner is an example
    of `future-proofing`, which means allowing for things to change in the future.


    Non-defaulted property values are `null`. `Null` property values cannot be written
    (`set`) or read (`get`). Failure to initialize property values may present a troubleshooting
    challenge.


    Properties can be read-only, write-only, and subject to many other conditions.
    Most properties are read-write, like the properties we constructed. If, for example,
    we desired to make the `PackageCatalog` property read-only, we would alter the
    declaration code as shown in Listing [7-4](#449652_2_En_7_Chapter.xhtml#PC5):


    ```csharp

    public string PackageCatalog { get; } = "SSISDB";

    ```


    *Listing 7-4: Declaring task properties*


    I prefer to leave the property read-write and recommend not removing the `set;`
    code from the declaration.


    # Investigating Task Methods


    Earlier, we added inheritance to the `ExecuteCatalogPackageTask` class – `public
    class ExecuteCatalogPackageTask : Microsoft.SqlServer.Dts.Runtime.Task` – remember?
    When you inherit one class in another, the inherited class is identified as the
    base class. In Visual Basic, the base class may be directly addressed using the
    keyword `MyBase`; in C#, it’s `base`.


    You can observe a bunch of information about a base class by clicking View ➤ Object
    Browser as shown in Figure [7-5](#449652_2_En_7_Chapter.xhtml#Fig5):


    ![../images/449652_2_En_7_Chapter/449652_2_En_7_Fig5_HTML.jpg](images/449652_2_En_7_Chapter/449652_2_En_7_Fig5_HTML.jpg)


    Figure 7-5: Opening Object Browser


    Once open, navigate in Object Browser to the `Microsoft.SqlServer.ManagedDTS\
    Microsoft.SqlServer.ManagedDTS.Runtime\Task` base class, as shown in Figure [7-6](#449652_2_En_7_Chapter.xhtml#Fig6):


    ![../images/449652_2_En_7_Chapter/449652_2_En_7_Fig6_HTML.jpg](images/449652_2_En_7_Chapter/449652_2_En_7_Fig6_HTML.jpg)


    Figure 7-6: Viewing the Task class in Object Browser


    Methods contained in this class are listed on the right. If we select a method,
    we may view details in the description pane as shown in Figure [7-7](#449652_2_En_7_Chapter.xhtml#Fig7):


    ![../images/449652_2_En_7_Chapter/449652_2_En_7_Fig7_HTML.jpg](images/449652_2_En_7_Chapter/449652_2_En_7_Fig7_HTML.jpg)


    Figure 7-7: Viewing the description of the InitializeTask method in Object Explorer


    The `InitializeTask` method is declared “virtual.” Virtual, abstract, and override
    methods may be overridden. Since we inherit the `Task` class, we will override
    the `InitializeTask` method in our inheriting class. We will also override two
    other methods declared virtual: `Validate` and `Execute`. Override the `InitializeTask`
    method with the code in Listing [7-5](#449652_2_En_7_Chapter.xhtml#PC6):


    ```csharp

    public override void InitializeTask(

    Connections connections,

    VariableDispenser variableDispenser,

    IDTSInfoEvents events,

    IDTSLogging log,

    EventInfos eventInfos,

    LogEntryInfos logEntryInfos,

    ObjectReferenceTracker refTracker)

    { }

    ```


    *Listing 7-5: Overriding the InitializeTask method*


    When you add this method to the `ExecuteCatalogPackageTask` class, your code should
    appear as shown in Figure [7-8](#449652_2_En_7_Chapter.xhtml#Fig8):


    ![../images/449652_2_En_7_Chapter/449652_2_En_7_Fig8_HTML.jpg](images/449652_2_En_7_Chapter/449652_2_En_7_Fig8_HTML.jpg)


    Figure 7-8: Overriding InitializeTask


    The `InitializeTask` method executes when the task is added to an SSIS Control
    Flow.'
  raw: '## Decorating the Class


    If you are reading this near the holidays, I know what you’re thinking: “Andy,
    the holidays are almost over. Why are we decorating now?” It’s not that kind of
    decorating.


    We decorate to inform Visual Studio this class is *different*. In this case, the
    class is different because it is part of an SSIS task. Our decoration code goes
    just prior to the class definition and is composed of the code in Listing [7-1](#449652_2_En_7_Chapter.xhtml#PC2).
    We add this code to tell Visual Studio more about what we’re building, as displayed
    in Figure [7-2](#449652_2_En_7_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_7_Chapter/449652_2_En_7_Fig2_HTML.jpg](images/449652_2_En_7_Chapter/449652_2_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Decorating the class


    ```

    [DtsTask(

    TaskType = "DTS"

    , DisplayName = "Execute Catalog Package Task"

    , Description = "A task to execute packages stored in the SSIS Catalog."

    )]

    Listing 7-1

    Decorating the class

    ```


    The TaskType attribute is optional. SSIS 2019 is version 150\. One could argue
    for permitting SSIS 2012, version 110, for the TaskType attribute in the DtsTask
    decoration since the SSIS Catalog was introduced with SSIS 2012\. Since this project
    is built using Visual Studio 2019 using the default .Net Framework – 4.7.2 at
    the time of this writing – the author opted to code the task for SSIS 2019 and
    later.


    ## Inheriting from Microsoft.SqlServer.Dts.Runtime.Task


    Once the reference and decoration are in place, the next step is to configure
    inheritance from the Microsoft.SqlServer.Dts.Runtime.Task object. Inheriting Microsoft.SqlServer.Dts.Runtime.Task
    provides a framework for a lot of the work to come, including methods the code
    will override.


    Modify the class definition to inherit from the Task object as shown in Listing
    [7-2](#449652_2_En_7_Chapter.xhtml#PC3):


    ```

    public class ExecuteCatalogPackageTask : Microsoft.SqlServer.Dts.Runtime.Task

    Listing 7-2

    Inheriting from Task

    ```


    Your class should now appear as shown in Figure [7-3](#449652_2_En_7_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_7_Chapter/449652_2_En_7_Fig3_HTML.jpg](images/449652_2_En_7_Chapter/449652_2_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Inheriting Task


    The actions taken so far combine to create a relationship between our code and
    the *base code* included in the ManagedDTS assembly we referenced and *using*
    statement earlier. Now it’s time to build on that relationship by adding the things
    we want our task to do.


    What do we want our task to do? We want to start an SSIS Package that’s been deployed
    to an SSIS Catalog. To accomplish this, we need to provide the name of a SQL Server
    Instance that hosts an SSIS Catalog, the name of the SSIS Catalog Folder that
    contains the SSIS Project, the name of the SSIS Project that contains the SSIS
    Package, and the name of the SSIS Package.


    ## Adding a Property


    Properties provide a mechanism to expose values of internal variables to objects
    outside the class. In a class, a property may be coded using an internal private
    variable and publicly accessible property. Properties may also be coded using
    a get/set at declaration.


    Create properties by adding the lines of code after the class declaration:


    ```

    public string ServerName { get; set; } = String.Empty;

    public string PackageCatalog { get; set; } = "SSISDB ";

    public string PackageFolder { get; set; } = String.Empty;

    public string PackageProject { get; set; } = String.Empty;

    public string PackageName { get; set; } = String.Empty;

    Listing 7-3

    Declaring task properties

    ```


    The class should now appear as shown in Figure [7-4](#449652_2_En_7_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_7_Chapter/449652_2_En_7_Fig4_HTML.jpg](images/449652_2_En_7_Chapter/449652_2_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Adding properties


    Task properties will contain string values, and we will use the string values
    internally in the task. For example, the property named ServerName will surface
    name of an instance of SQL Server that hosts an SSIS Catalog. The Execute Catalog
    Package Task will connect to this SQL Server instance to execute an SSIS package
    stored in the SSIS Catalog hosted on the instance named in the ServerName property.


    Note the PackageCatalog property defaults to “SSISDB” and the other properties
    default the `String.Empty`. At the time of this writing, Microsoft limits the
    number of SSIS Catalogs to one catalog per SQL Server instance and defaults the
    name of this catalog to “SSISDB.” Although the PackageCatalog defaults to “SSISDB,”
    the value may be overridden if desired. Coding the task in this manner is an example
    of *future-proofing*, which means allowing for things to change in the future.


    Non-defaulted property values are `null`. Null property values cannot be written
    (set) or read (get). Failure to initialize property values may present a troubleshooting
    challenge.


    Properties can be read-only, write-only, and subject to many other conditions.
    Most properties are read-write, like the properties we constructed. If, for example,
    we desired to make the PackageCatalog property read-only, we would alter the declaration
    code as shown in Listing [7-4](#449652_2_En_7_Chapter.xhtml#PC5):


    ```

    public string PackageCatalog { get; } = "SSISDB";

    Listing 7-4

    Declaring task properties

    ```


    I prefer to leave the property read-write and recommend not removing the “set;”
    code from the declaration.


