  trans: '

    ## 线程处理，简而言之


    `WaitHandle.WaitAny` 方法是一个线程处理主题，属于 `System.Threading` .NET Framework 命名空间。编写大多数
    .NET 应用程序并不需要你精通线程处理，但懂得越多越好。线程管理是一个数据专业人士能够理解的主题。可以想想数据库*事务*。


    数据库事务不会允许一个联名银行账户的两个账户持有人仅仅因为他们在完全相同的时间执行取款请求，就将银行账户中的所有资金全部取出。数据库事务会*阻塞*一个取款请求，直到另一个取款请求完成，使第二个取款请求*等待*直到第一个取款请求完成。当第一个取款请求完成其事务时，数据库引擎会通知——或*发出信号*——第二个取款请求，阻塞过程已完成。第二个取款请求随即执行并失败，因为账户已空——第一个取款请求在阻塞第二个取款请求的同时，已将资金从账户中移除。


    上一段中强调的术语既涉及数据事务，也涉及线程安全。


    如果一个应用程序包含了与数据库事务类似的状态管理功能，则该应用程序被认为是*线程安全*的。一个线程安全的应用程序管理线程安全，就像数据库事务维护原子性一样，以此作为一种保护代码执行并交付准确结果的机制。


    线程安全的应用程序通过允许某些代码仅序列化执行，同时管理等待线程的队列来实现原子性。等待线程在轮到它们执行时会收到信号。线程安全的应用程序是多线程功能的核心。更多内容请访问
    `docs.microsoft.com/en-us/dotnet/api/system.threading?view=netframework-4.7.2`。


    多线程应用程序共享*资源*——这些功能块被编码为*独占*访问，例如银行应用程序中的 `WithdrawFunds()` 方法。一个多线程应用程序通常需要管理多个独占资源来完成执行。`WaitHandle`
    管理在相关操作中执行的一组资源，而 `WaitAny` 方法则等待 `WaitHandle` 中*任何*成员发出信号。更多关于 `WaitHandle.WaitAny`
    方法的信息请访问 `docs.microsoft.com/en-us/dotnet/api/system.threading.waithandle.waitany?view=netframework-4.7.2`。


    `ManualResetEvent` 对象派生自 `WaitHandle` 对象。`ManualResetEvent` 对象的状态是一个布尔值：false
    或 true；此状态通过调用 `ManualResetEvent.Set()` 和 `ManualResetEvent.Reset()` 方法来管理。`ManualResetEvent.Reset()`
    方法*重置*（将布尔状态设为 *false*），*手动* 阻止任何新出现的线程使用共享资源，让这些线程知道它们必须等待轮到自己执行。`ManualResetEvent.Set()`
    方法则向等待的线程*发出信号*（将布尔状态设为 *true*），*手动* 让等待线程知道它们现在可以执行了。


    前两句话很重要。在我们接下来处理示例时，你可能需要回头参考本节内容。别灰心。线程处理很难。线程安全更难。


    ## ExecuteCatalogPackageTask.Execute


    SSIS 目录的 `Synchronized` 执行参数 —— 一个布尔值 —— 控制 `ExecuteCatalogPackageTask.Execute`
    方法如何从执行中返回。默认的 `Synchronized` 执行参数值为 false，这意味着 `ExecuteCatalogPackageTask.Execute`
    方法的功能是“启动并忘记”。如果你在 `Synchronized` 执行参数值设为 false 的情况下启动一个 SSIS 包，该包开始执行，并且 `ExecuteCatalogPackageTask.Execute`
    方法几乎立即返回“成功”。由于 `ExecuteCatalogPackageTask.Execute` 方法表现为“启动并忘记”并几乎立即返回“成功”，其默认的
    30 秒超时设置不会影响 `Synchronized` 执行参数值设为 false 时执行的 SSIS 包。


    `ExecuteCatalogPackageTask.Execute` 方法的 30 秒超时设置仅在使用 `Synchronized` 执行参数值设为 true
    执行 SSIS 包时才会成为问题。


    因此，基于 `WaitHandle.WaitAny` 的解决方案的实现，仅适用于 `Synchronized` 执行参数值设为 true 时的 SSIS 包执行情况。

    '
- fmt: '## Designing a Test SSIS Package


    To test 30-second timeout errors for the `ExecuteCatalogPackageTask.Execute` method,
    add a new test SSIS package named `RunForSomeTime.dtsx` to a test SSIS project,
    as shown in Figure 19-1:


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig1_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig1_HTML.jpg)


    Figure 19-1: Adding the `RunForSomeTime.dtsx` test SSIS package


    Add a package parameter named `DelayString` of the `String` data type as shown
    in Figure 19-2:


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig2_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig2_HTML.jpg)


    Figure 19-2: Adding the `DelayString` package parameter


    Add an SSIS variable named `WaitForQuery` of the `String` data type. Set the value
    of the `WaitForQuery` using the T-SQL statement shown in Listing 19-1:


    ```

    WaitFor Delay ''00:00:30''

    ```


    Listing 19-1: Adding the `WaitForQuery` SSIS variable value


    Once the T-SQL statement is added to the variable value, the `WaitForQuery` variable
    appears as shown in Figure 19-3:


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig3_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig3_HTML.jpg)


    Figure 19-3: Adding the `WaitForQuery` SSIS variable


    Click the ellipsis beside the `Expression` textbox to open the `Expression Builder`
    dialog, and then enter the SSIS Expression Language statement in Listing 19-2
    in the `Expression` textbox:


    ```

    "WaitFor Delay ''" + @[$Package::DelayString]  + "''"

    ```


    Listing 19-2: The `WaitForQuery` SSIS variable expression


    When added, the `WaitForQuery` SSIS variable expression appears as shown in Figure
    19-4:


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig4_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig4_HTML.jpg)


    Figure 19-4: The `WaitForQuery` SSIS variable expression


    Click the `OK` button to close the `Expression Builder` dialog.


    Add an `Execute SQL Task` to `RunForSomeTime.dtsx` and rename the execute SQL
    task “SQL Run for some time,” as shown in Figure 19-5:


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig5_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig5_HTML.jpg)


    Figure 19-5: Adding the SQL Run for some time `Execute SQL Task`


    Open the SQL Run for some time execute SQL task editor and set the `ConnectionType`
    to `ADO.NET`. Click the `Connection` dropdown and click “<New connection…>.” Configure
    an `ADO.Net` connection manager to *any* database – this package will not use
    the configured connection, but the `Execute SQL Task` requires a connection manager
    configured.


    Set the `SQLSourceType` property to “Variable.” Set the `SourceVariable` property
    to the `User::WaitForQery` SSIS variable, as shown in Figure 19-6:


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig6_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig6_HTML.jpg)


    Figure 19-6: Configuring SQL Run for some time execute SQL task


