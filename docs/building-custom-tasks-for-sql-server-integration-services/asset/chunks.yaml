    Figure 9-14: Adding a reference for `Microsoft.SqlServer.ConnectionInfo`


    I found `Microsoft.SqlServer.Management.IntegrationServices`, `Microsoft.SqlServer.Management.Sdk.Sfc`,
    and `Microsoft.SqlServer.Smo` in the `C:\Windows\Microsoft.NET\assembly\GAC_MSIL\`
    path, as well, as shown in Figure 9-15:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig15_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig15_HTML.jpg)


    Figure 9-15: Browsing to reference additional assemblies


    The Solution Explorer References virtual folder for the `ExecuteCatalogPackageTask`
    project should now appear as shown in Figure 9-16:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig16_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig16_HTML.jpg)


    Figure 9-16: Viewing the `ExecuteCatalogPackageTask` project References


    We next need to declare reference assemblies in `ExecuteCatalogPackageTask.cs`
    for use in our project, as shown in Listing 9-5:


    ```

    using Microsoft.SqlServer.Management.IntegrationServices;

    using Microsoft.SqlServer.Management.Smo;

    Listing 9-5: Using referenced assemblies

    ```


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig17_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig17_HTML.jpg)


    Figure 9-17: Importing Referenced Assemblies


    We’re now ready to add functionality to the `Execute` function. Declare and initialize
    some variables using the code shown in Listing 9-6:


    ```

    Server catalogServer = new Server(ServerName);

    IntegrationServices integrationServices = new ➥ IntegrationServices(catalogServer);

    Catalog catalog = integrationServices.Catalogs[PackageCatalog];

    CatalogFolder catalogFolder = catalog.Folders[PackageFolder];

    ProjectInfo catalogProject = catalogFolder.Projects[PackageProject];

    Microsoft.SqlServer.Management.IntegrationServices.PackageInfo ➥ catalogPackage
    = catalogProject.Packages[PackageName];

    Listing 9-6: Coding the Execute method, part 1

    ```


    Your `Execute` method should appear similar to that shown in Figure 9-18:


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig18_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig18_HTML.jpg)


    Figure 9-18: Execute SSIS Catalog Package method partially coded


    Finally, add the call to execute the SSIS Package object (`catalogPackage`) as
    shown in Listing 9-7 and Figure 9-19:


    ```

    catalogPackage.Execute(False, Nothing)

    Listing 9-7: Adding package execution code

    ```


    ![../images/449652_2_En_9_Chapter/449652_2_En_9_Fig19_HTML.jpg](images/449652_2_En_9_Chapter/449652_2_En_9_Fig19_HTML.jpg)


    Figure 9-19: Calling the `CatalogPackage.Execute` Method


