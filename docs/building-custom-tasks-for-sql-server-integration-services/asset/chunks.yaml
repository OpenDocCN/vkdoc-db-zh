- fmt: '配置 SQL 获取应用程序包任务


    点击 **OK** 按钮关闭 **Execute SQL Task Editor**。`Parent.dtsx` 控制流出现，如图 [23-22](#449652_2_En_23_Chapter.xhtml#Fig22)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig22_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig22_HTML.jpg)

    *图 23-22 SQL 获取应用程序包已配置*


    将 **Foreach Loop Container** 拖放到 `Parent.dtsx` 控制流上，并将 **Foreach Loop Container**
    重命名为 “Foreach Application Package”，如图 [23-23](#449652_2_En_23_Chapter.xhtml#Fig23)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig23_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig23_HTML.jpg)

    *图 23-23 添加 “Foreach Application Packages” Foreach 循环容器*


    从 **SQL Get Application Packages** 到 **Foreach Application Packages** 连接一个 **Success**
    优先级约束。打开 **Foreach Application Packages Editor**，点击 **Collection** 页面，然后将 `Enumerator`
    属性设置为 “`Foreach ADO Enumerator`”。通过点击下拉菜单并选择 `User::ApplicationPackages` 来配置 “ADO
    object source variable”，如图 [23-24](#449652_2_En_23_Chapter.xhtml#Fig24) 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig24_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig24_HTML.jpg)

    *图 23-24 配置 Foreach ADO 枚举器*


    点击 **Variable Mappings** 页面。点击 **Variable** 下拉菜单并选择 “<New variable…>”，如图 [23-25](#449652_2_En_23_Chapter.xhtml#Fig25)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig25_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig25_HTML.jpg)

    *图 23-25 创建新的变量映射*


    使用以下设置配置新变量属性：


    *   `Container`: `Parent`

    *   `Name`: `Folder`

    *   `Namespace`: `User`

    *   `Value type`: `String`

    *   `Value`: <*insert the name of an SSIS Catalog folder*>


    配置完成后，`User::Folder String` 类型变量出现，如图 [23-26](#449652_2_En_23_Chapter.xhtml#Fig26)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig26_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig26_HTML.jpg)

    *图 23-26 创建 User::Folder 变量*


    创建另一个新变量并使用以下设置配置属性：


    *   `Container`: `Parent`

    *   `Name`: `Project`

    *   `Namespace`: `User`

    *   `Value type`: `String`

    *   `Value`: <*insert the name of an SSIS Catalog project*>


    配置完成后，`User::Project String` 类型变量出现，如图 [23-27](#449652_2_En_23_Chapter.xhtml#Fig27)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig27_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig27_HTML.jpg)

    *图 23-27 创建 User::Project 变量*


    创建另一个新变量并使用以下设置配置属性：


    *   `Container`: `Parent`

    *   `Name`: `Package`

    *   `Namespace`: `User`

    *   `Value type`: `String`

    *   `Value`: <*insert the name of an SSIS Catalog package*>


    配置完成后，`User::Package String` 类型变量出现，如图 [23-28](#449652_2_En_23_Chapter.xhtml#Fig28)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig28_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig28_HTML.jpg)

    *图 23-28 创建 User::Package 变量*


    创建又一个新变量并使用以下设置配置属性：


    *   `Container`: `Parent`

    *   `Name`: `Synchronized`

    *   `Namespace`: `User`

    *   `Value type`: `Boolean`

    *   `Value`: `true`


    配置完成后，`User::Synchronized Boolean` 类型变量出现，如图 [23-29](#449652_2_En_23_Chapter.xhtml#Fig29)
    所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig29_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig29_HTML.jpg)

    *图 23-29 创建 User::Synchronized 变量*


    创建又一个新变量并使用以下设置配置属性：


    *   `Container`: `Parent`

    *   `Name`: `MaximumRetries`

    *   `Namespace`: `User`

    *   `Value type`: `Int32`

    *   `Value`: `29`'
  raw: 'Click the OK button to close the Execute SQL Task Editor. The Parent.dtsx
    control flow appears as shown in Figure [23-22](#449652_2_En_23_Chapter.xhtml#Fig22):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig22_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig22_HTML.jpg)


    Figure 23-22


    SQL Get Application Packages configured


    Drag a Foreach Loop Container onto the Parent.dtsx control flow, and rename the
    Foreach Loop Container “Foreach Application Package,” as shown in Figure [23-23](#449652_2_En_23_Chapter.xhtml#Fig23):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig23_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig23_HTML.jpg)


    Figure 23-23


    Adding the “Foreach Application Packages” Foreach Loop Container


    Connect a Success precedence constraint from SQL Get Application Packages to Foreach
    Application Packages. Open the Foreach Application Packages Editor, click the
    Collection page, and then set the Enumerator property to “`Foreach ADO Enumerator`.”
    Configure the “ADO object source variable” by clicking the dropdown and then selecting
    `User::ApplicationPackages`, as shown in Figure [23-24](#449652_2_En_23_Chapter.xhtml#Fig24):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig24_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig24_HTML.jpg)


    Figure 23-24


    Configuring the Foreach ADO Enumerator


    Click the Variable Mappings page. Click the Variable dropdown and select “<New
    variable…>,” as shown in Figure [23-25](#449652_2_En_23_Chapter.xhtml#Fig25):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig25_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig25_HTML.jpg)


    Figure 23-25


    Creating a new variable mapping


    Configure the new variable properties with the following settings:


    *   Container: Parent


    *   Name: Folder


    *   Namespace: User


    *   Value type: String


    *   Value: <*insert the name of an SSIS Catalog folder*>


    When configured, the `User::Folder String` type variable appears as shown in Figure
    [23-26](#449652_2_En_23_Chapter.xhtml#Fig26):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig26_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig26_HTML.jpg)


    Figure 23-26


    Creating the User::Folder variable


    Create another new variable and configure the properties with the following settings:


    *   Container: Parent


    *   Name: Project


    *   Namespace: User


    *   Value type: String


    *   Value: <*insert the name of an SSIS Catalog project*>


    When configured, the `User::Project String` type variable appears as shown in
    Figure [23-27](#449652_2_En_23_Chapter.xhtml#Fig27):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig27_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig27_HTML.jpg)


    Figure 23-27


    Creating the User::Project variable


    Create another new variable and configure the properties with the following settings:


    *   Container: Parent


    *   Name: Package


    *   Namespace: User


    *   Value type: String


    *   Value: <*insert the name of an SSIS Catalog package*>


    When configured, the `User::Package String` type variable appears as shown in
    Figure [23-28](#449652_2_En_23_Chapter.xhtml#Fig28):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig28_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig28_HTML.jpg)


    Figure 23-28


    Creating the User::Package variable


    Create yet another new variable and configure the properties with the following
    settings:


    *   Container: Parent


    *   Name: Synchronized


    *   Namespace: User


    *   Value type: Boolean


    *   Value: true


    When configured, the `User::Synchronized Boolean` type variable appears as shown
    in Figure [23-29](#449652_2_En_23_Chapter.xhtml#Fig29):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig29_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig29_HTML.jpg)


    Figure 23-29


    Creating the User::Synchronized variable


    Create yet another new variable and configure the properties with the following
    settings:


    *   Container: Parent


    *   Name: MaximumRetries


    *   Namespace: User


    *   Value type: Int32


    *   Value: 29'
  trans: '

    配置 SQL 获取应用程序包任务


    点击 **确定** 按钮关闭 **执行 SQL 任务编辑器**。`Parent.dtsx` 控制流出现，如图 23-22 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig22_HTML.jpg](img/449652_2_En_23_Fig22_HTML.jpg)

    *图 23-22 SQL 获取应用程序包已配置*


    将 **Foreach 循环容器** 拖放到 `Parent.dtsx` 控制流上，并将 **Foreach 循环容器** 重命名为 “Foreach Application
    Package”，如图 23-23 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig23_HTML.jpg](img/449652_2_En_23_Fig23_HTML.jpg)

    *图 23-23 添加 “Foreach Application Packages” Foreach 循环容器*


    从 **SQL Get Application Packages** 到 **Foreach Application Packages** 连接一个 **成功**
    优先级约束。打开 **Foreach Application Packages Editor**，点击 **集合** 页面，然后将 `Enumerator`
    属性设置为 “`Foreach ADO Enumerator`”。通过点击下拉菜单并选择 `User::ApplicationPackages` 来配置 “ADO
    对象源变量”，如图 23-24 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig24_HTML.jpg](img/449652_2_En_23_Fig24_HTML.jpg)

    *图 23-24 配置 Foreach ADO 枚举器*


    点击 **变量映射** 页面。点击 **变量** 下拉菜单并选择 “<新建变量…>”，如图 23-25 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig25_HTML.jpg](img/449652_2_En_23_Fig25_HTML.jpg)

    *图 23-25 创建新的变量映射*


    使用以下设置配置新变量属性：


    *   `Container`: `Parent`

    *   `Name`: `Folder`

    *   `Namespace`: `User`

    *   `Value type`: `String`

    *   `Value`: <*插入一个 SSIS 目录文件夹的名称*>


    配置完成后，`User::Folder String` 类型变量出现，如图 23-26 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig26_HTML.jpg](img/449652_2_En_23_Fig26_HTML.jpg)

    *图 23-26 创建 User::Folder 变量*


    创建另一个新变量并使用以下设置配置属性：


    *   `Container`: `Parent`

    *   `Name`: `Project`

    *   `Namespace`: `User`

    *   `Value type`: `String`

    *   `Value`: <*插入一个 SSIS 目录项目的名称*>


    配置完成后，`User::Project String` 类型变量出现，如图 23-27 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig27_HTML.jpg](img/449652_2_En_23_Fig27_HTML.jpg)

    *图 23-27 创建 User::Project 变量*


    创建另一个新变量并使用以下设置配置属性：


    *   `Container`: `Parent`

    *   `Name`: `Package`

    *   `Namespace`: `User`

    *   `Value type`: `String`

    *   `Value`: <*插入一个 SSIS 目录包的名称*>


    配置完成后，`User::Package String` 类型变量出现，如图 23-28 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig28_HTML.jpg](img/449652_2_En_23_Fig28_HTML.jpg)

    *图 23-28 创建 User::Package 变量*


    创建又一个新变量并使用以下设置配置属性：


    *   `Container`: `Parent`

    *   `Name`: `Synchronized`

    *   `Namespace`: `User`

    *   `Value type`: `Boolean`

    *   `Value`: `true`


    配置完成后，`User::Synchronized Boolean` 类型变量出现，如图 23-29 所示：


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig29_HTML.jpg](img/449652_2_En_23_Fig29_HTML.jpg)

    *图 23-29 创建 User::Synchronized 变量*


    创建又一个新变量并使用以下设置配置属性：


    *   `Container`: `Parent`

    *   `Name`: `MaximumRetries`

    *   `Namespace`: `User`

    *   `Value type`: `Int32`

    *   `Value`: `29`

