    }

    Listing 13-6

    Adding a GeneralNode class constructor

    ```


    Once the constructor is added, the `GeneralNode` class appears as shown in Figure
    [13-9](#449652_2_En_13_Chapter.xhtml#Fig9):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig9_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig9_HTML.jpg)


    Figure 13-9


    GeneralNode class constructor


    After the `GeneralNode` constructor is implemented, the design-time error on line
    76 clears, as shown in Figure [13-10](#449652_2_En_13_Chapter.xhtml#Fig10):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig10_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig10_HTML.jpg)


    Figure 13-10


    No more error


    The next step is to code the GeneralNode properties.


    ### Coding the GeneralNode Properties


    In this section, we reach the Property Category ➤ Property portion of the View
    ➤ Node ➤ Property Category ➤ Property hierarchy. Properties of nodes are decorated
    to indicate property category and description. In the editor, the value of the
    property is paired with the property name, and this value is passed to the instantiation
    of the task. The pairing may be thought of as similar to a key-value mapping where
    the key is composed of the View ➤ Node ➤ Property Category ➤ Property hierarchy
    and the value is the value supplied by the SSIS developer during task (instance)
    edit. An example of a value is circled in Figure [13-11](#449652_2_En_13_Chapter.xhtml#Fig11):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig11_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig11_HTML.jpg)


    Figure 13-11


    The value of the key-value pair


    In the SSIS package, the value is configured during editing by an SSIS developer.
    When the SSIS developer clicks the OK button on the editor, the `OnCommit` method
    fires and stores the key-value property configurations in the SSIS package’s XML,
    as shown in Figure [13-12](#449652_2_En_13_Chapter.xhtml#Fig12):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig12_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig12_HTML.jpg)


    Figure 13-12


    XML for an SSIS Execute SQL Task


    In our sample Execute SQL Task, the `Name` property value is “Execute SQL Task.”
    The property value is stored in an attribute named `DTS:ObjectName`. At runtime,
    SSIS XML is loaded, interpreted, and executed, but it all starts with the SSIS
    developer opening the task editor and then configuring the value portion of key-value
    pairs, in which the keys are visually surfaced in editor views that make up the
    View ➤ Node ➤ Property Category ➤ Property hierarchy.


    To add the Name property of our custom SSIS task, add the code in Listing [13-7](#449652_2_En_13_Chapter.xhtml#PC7)
    to the GeneralNode:


    ```

    [

    Category("General"),

    Description("Specifies the name of the task.")

    ]

    public string Name {

    get { return taskHost.Name; }

    set {

    if ((value == null) || (value.Trim().Length == 0))

    {

    throw new ApplicationException("Task name cannot be empty");

    }

    taskHost.Name = value;

    }

    }

    Listing 13-7

    Adding the Name property to the GeneralNode

    ```


    When added, the code appears as shown in Figure [13-13](#449652_2_En_13_Chapter.xhtml#Fig13):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig13_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig13_HTML.jpg)


    Figure 13-13


    Adding the Name property


    The red squiggly lines under the decorations indicate an issue. Hovering over
    the code presents options to address the issue, as shown in Figure [13-14](#449652_2_En_13_Chapter.xhtml#Fig14):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig14_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig14_HTML.jpg)


    Figure 13-14


    Addressing the decoration issue


    Adding the `using` directive resolves the issue (you have to love Visual Studio
    2019!), as shown in Figure [13-15](#449652_2_En_13_Chapter.xhtml#Fig15):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig15_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig15_HTML.jpg)


    Figure 13-15


    The Name property with issues resolved


    The Category and Description decorations shown on lines 117-120 are used by the
    propertygrid control for Property Category – which may hold one or more properties –
    and the Property Description displayed at the bottom of the editor when the property
    is selected during edit. The Property Category is set to `General` in this case;
    the Property Description is set to `Specifies the name of the task`. The Property
    Name is derived from the name of the view member – `Name` in this case.


    Line 122 contains a `get` statement that returns the value of the `Name` property
    from the `taskHost.Name` property, or the `Name` property of the `taskHost`. While
    the statement is relatively short, there are a few moving parts. The `GeneralNode
    taskHost` member points back to the `ExecuteCatalogPackageTask` class. The `taskHost.Name`
    property value that the `GeneralNode Name` property is `get`ting here is the `ExecuteCatalogPackageTask.Name`
    property value. Where is the `ExecuteCatalogPackageTask.Name` property value stored?
    In the SSIS package XML.


    Lines 123–130 contain the `set` functionality for the property. Lines 124–127
    check to see if the property value is null or empty and, if so, throws an `ApplicationException`
    that returns the message “`Task name cannot be empty`”.


    If there is no exception, the value of the taskHost.Name is set on Line 129.


    Add the Description property to the `GeneralNode` using the code in Listing [13-8](#449652_2_En_13_Chapter.xhtml#PC8):


    ```

