    The CheckWaitState.CheckStatus method, implemented


    With each tick of the timer (the timer code will be implemented next), the `CheckWaitState.CheckStatus`
    method is called. Perhaps the most important part of this code is found on lines
    578–579\. On line 578, a variable of the `TimerCheckerState` class named `localState`
    is declared and initialized with the value of the `state object` argument, converted
    to a `TimerCheckerState` type. The value of the `CheckWaitState.manualResetState`
    variable of the `ManualResetEvent` type is next set to the `localState.manualResetState`
    on line 579\. On line 582, a variable named `invokeCount`, which tracks the number
    of times the `CheckWaitState.CheckStatus` method has been called by the timer,
    is incremented.


    On lines 584–591, a message is generated and an event raised. The message variable –
    named `msg` – includes the values of the invokeCount and maximumCount variables
    on lines 585–586. The `ExecuteCatalogPackageTask.raiseEvent` method is called,
    passing the `msg` variable, to raise an event message in the SSIS package.


    On lines 594–618, the value of the `invokeCount` variable value is checked to
    see if `invokeCount` variable value has reached the value of the `maximumCount`
    variable. If the `invokeCount` has reached the value of the `maximumCount` variable,
    the `msg` variable value is configured to send a message indicating the `maximumCount`
    variable value has been reached on lines 597–598, an event is raised on lines
    599–602, and the `CheckWaitState.OperationStatus` property value is set to `Operation.ServerOperationStatus.Canceled`
    on line 605\. The `invokeCount` variable value is reset to 0 on line 608, and
    the `manualResetState` calls its `Set()` method on line 611\. The `manualResetState.Set()`
    call on line 611 notifies waiting threads, informing them that the current thread
    has completed the current thread’s exclusive operation, which lets the next waiting
    thread know it may now execute.


    If the `invokeCount` has not reached the value of the `maximumCount` variable,
    the `CheckWaitState.OperationStatus` property value is set by calling the `CheckWaitState.returnOperationStatus`
    method (see Listing [19-8](#449652_2_En_19_Chapter.xhtml#PC8) and Figure [19-21](#449652_2_En_19_Chapter.xhtml#Fig21)).
    The `CheckWaitState.checkOperationStatus` method (see Listing [19-9](#449652_2_En_19_Chapter.xhtml#PC9)
    and Figure [19-22](#449652_2_En_19_Chapter.xhtml#Fig22)) is next called to determine
    if the current Operation Status has reached a “finished” state on line 617\. As
    discussed earlier, if the `CheckWaitState.checkOperationStatus` method determines
    the SSIS package execution has reached a “finished” state, the execution is stopped.'
