  raw: 'Assertion: The Folder dropdown list displays all available folders in the
    SSIS Catalog configured in the SourceConnection property without error. To verify,
    close the Execute Catalog Package Task Editor, and edit the SSIS package connection
    manager selected in the SourceConnection property, as shown in Figure [21-10](#449652_2_En_21_Chapter.xhtml#Fig10):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig10_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig10_HTML.jpg)


    Figure 21-10


    Obtain the SQL Server instance from the SourceConnection connection manager


    Use SQL Server Management Studio (SSMS) to connect to the SourceConnection SQL
    Server instance. Open SSMS Object Explorer and expand Integration Services Catalogs.
    Expand the SSISDB node and observe SSIS Catalog folders, as shown in Figure [21-11](#449652_2_En_21_Chapter.xhtml#Fig11):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig11_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig11_HTML.jpg)


    Figure 21-11


    Observing SSIS Catalog folders


    The SSIS Catalog folders shown in Figure [21-11](#449652_2_En_21_Chapter.xhtml#Fig11)
    match the list of SSIS Catalog folders shown in Figure [21-9](#449652_2_En_21_Chapter.xhtml#Fig9).


    Measurement: True.


    Scenario: Configure the Folder property value from the Folder property dropdown,
    as shown in Figure [21-12](#449652_2_En_21_Chapter.xhtml#Fig12):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig12_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig12_HTML.jpg)


    Figure 21-12


    Selecting a value for the Folder property


    Scenario: Close the Execute Catalog Package Task Editor, as shown in Figure [21-13](#449652_2_En_21_Chapter.xhtml#Fig13):


    ![../images/449652_2_En_21_Chapter/449652_2_En_21_Fig13_HTML.jpg](images/449652_2_En_21_Chapter/449652_2_En_21_Fig13_HTML.jpg)


    Figure 21-13


