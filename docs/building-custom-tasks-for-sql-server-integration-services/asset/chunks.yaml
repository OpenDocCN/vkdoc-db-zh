    ### Calling the Views


    An SSIS task editor surfaces properties in a hierarchy: View ➤ Node ➤ Property
    Category ➤ Property. *Views* are “pages” on an SSIS task editor. The following
    section appeared in Chapter [10](#449652_2_En_10_Chapter.xhtml). We present it
    here as a review.


    Figure [11-16](#449652_2_En_11_Chapter.xhtml#Fig16) visualizes the hierarchy for
    the Execute SQL Task Editor. As mentioned earlier, the General view (in the green
    box on the left) displays the General node – represented by the `propertygrid`
    control (in the blue box on the right). The property category named “General”
    is shown in the red box. The `Name` property is shown enclosed in the yellow box,
    as shown in Figure [11-16](#449652_2_En_11_Chapter.xhtml#Fig16):


    ![../images/449652_2_En_11_Chapter/449652_2_En_11_Fig16_HTML.jpg](images/449652_2_En_11_Chapter/449652_2_En_11_Fig16_HTML.jpg)


    Figure 11-16


    Visualizing View ➤ Node ➤ Property Category ➤ Property


    Applied to the View ➤ Node ➤ Property Category ➤ Property hierarchy, the names
    of the entities for the Execute SQL Task Editor – shown in Figure [11-16](#449652_2_En_11_Chapter.xhtml#Fig16)
    – are as follows: General (View) ➤ General (Node) ➤ General (Property Category)
    ➤ Name (Property). That’s a lot of General’s, and one – the General node – is
    hiding beneath the `propertygrid` control.


    Add the code in Listing [11-12](#449652_2_En_11_Chapter.xhtml#PC12) to the `ExecuteCatalogPackageTaskComplexUIForm`
    class’s constructor to call the General and Settings views:


    ```

    // Add General view

    GeneralView generalView = new GeneralView();

    this.DTSTaskUIHost.AddView("General", generalView, null);

    // Add Settings view

    SettingsView settingsView = new SettingsView();

    this.DTSTaskUIHost.AddView("Settings", settingsView, null);

    Listing 11-12

    Adding calls to the General and Settings views

    ```


    Once added, the code should appear as shown in Figure [11-17](#449652_2_En_11_Chapter.xhtml#Fig17):


    ![../images/449652_2_En_11_Chapter/449652_2_En_11_Fig17_HTML.jpg](images/449652_2_En_11_Chapter/449652_2_En_11_Fig17_HTML.jpg)


    Figure 11-17


    `ExecuteCatalogPackageTaskComplexUIForm` class’s constructor with calls to the
    General and Settings views


    The `GeneralView` and `SettingsView` classes do not yet exist, hence the red squiggly
    lines beneath each. The next step is to create and code the view classes, starting
    with the `GeneralView`.'
