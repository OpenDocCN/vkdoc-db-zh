    ## Identifying Catalog, Folder, Project, and Package


    “What is the problem we are trying to solve?” This is a question I learned from
    a mentor. It is a good question. The problem we are trying to solve is *better*
    connection management. Until now, connection management has been…*adequate*. Connection
    management in the current design ignores two valid use cases (at least):


    1. Connecting to an Azure-SSIS Catalog hosted by an Azure SQL DB that requires
    a SQL login (username and password) for authentication

    2. Using property expressions to override the `ConnectionManagerName` property
    value


    We begin with a second look at how the task code assigns the `catalogProject`
    property value, found in the `ExecuteCatalogPackageTask.Execute()` method. In
    the `ExecuteCatalogPackageTask.Execute()` method, the task currently populates
    the Server ➤ Integration Services ➤ SSIS Catalog ➤ Folder ➤ Project ➤ Package
    hierarchy using the code shown in Listing [16-10](#449652_2_En_16_Chapter.xhtml#PC10)
    and shown in Figure [16-19](#449652_2_En_16_Chapter.xhtml#Fig19):


    ```csharp

    catalogServer = new Server(ServerName);

    integrationServices = new IntegrationServices(catalogServer);

    catalog = integrationServices.Catalogs[PackageCatalogName];

    catalogFolder = catalog.Folders[PackageFolder];

    catalogProject = catalogFolder.Projects[PackageProject];

    Listing 16-10

    Populating the Server ➤ Integration Services ➤ SSIS Catalog ➤ Folder ➤ Project
    ➤ Package hierarchy, currently

    ```


    ![../images/449652_2_En_16_Chapter/449652_2_En_16_Fig19_HTML.jpg](images/449652_2_En_16_Chapter/449652_2_En_16_Fig19_HTML.jpg)

    Figure 16-19

    The `Execute()` method


    The code in Listing [16-10](#449652_2_En_16_Chapter.xhtml#PC10) – shown in Figure
    [16-19](#449652_2_En_16_Chapter.xhtml#Fig19) – identifies one SSIS project based
    on property values configured from the `SettingsNode` in `SettingsView`. At execution
    time, this code is prone to errors if one or more of the `SettingsNode` properties
    are improperly configured. Identifying key artifacts – such as catalog, folder,
    project, and package objects – is important in the Server ➤ Integration Services
    ➤ SSIS Catalog ➤ Folder ➤ Project ➤ Package hierarchy. In this section, the code
    to identify catalog, folder, project, and package is collected and refactored
    into more robust and independent methods.


    Let’s refactor this code by moving it to a new function named `returnCatalogProject`
    in the `ExecuteCatalogPackageTask` class.'
