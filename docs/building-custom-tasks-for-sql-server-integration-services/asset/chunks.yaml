    ## Coding the SettingsNode FolderName, ProjectName, and PackageName Properties


    Let’s begin with `SettingsNode` members (properties) that identify the package
    in the SSIS Catalog we wish to execute:


    *   Folder name


    *   Project name


    *   Package name


    To add the `FolderName`, `ProjectName`, and `PackageName` properties of our custom
    SSIS task, add the code in `Listing 13-15` to the `SettingsNode`:


    ```

    [

    Category("SSIS Catalog Package Properties"),

    Description("Enter SSIS Catalog Package folder name.")

    ]

    public string FolderName {

    get { return _task.PackageFolder; }

    set {

    if (value == null)

    {

    throw new ApplicationException("Folder name cannot be empty");

    }

    _task.PackageFolder = value;

    }

    }

    [

    Category("SSIS Catalog Package Properties"),

    Description("Enter SSIS Catalog Package project name.")

    ]

    public string ProjectName {

    get { return _task.PackageProject; }

    set {

    if (value == null)

    {

    throw new ApplicationException("Project name cannot be empty");

    }

    _task. PackageProject = value;

    }

    }

    [

    Category("SSIS Catalog Package Properties"),

    Description("Enter SSIS Catalog Package name.")

    ]

    public string PackageName {

    get { return _task.PackageName; }

    set {

    if (value == null)

    {

    throw new ApplicationException("Package name cannot be empty");

    }

    _task. PackageName = value;

    }

    }

    Listing 13-15

    Adding FolderName, ProjectName, and PackageName properties to the SettingsNode

    ```


    When added, the code appears as shown in `Figure 13-26`:


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig26_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig26_HTML.jpg)


    `Figure 13-26` Adding `FolderName`, `ProjectName`, and `PackageName` properties


    Note the value is checked for null, but not checked for 0 length. The reason for
    the omission of a 0-length string check is the code will eventually set the value
    of the `FolderName`, `ProjectName`, and `PackageName` properties to an empty string
    when “parent” properties are updated in the editor. For example, if the SSIS developer
    selects a new `ProjectName` property value, the code needs to set the current
    `PackageName` property value to an empty string. This functionality will be coded
    a few chapters hence.


    As with adding initial properties to the `GeneralNode`, adding decorations requires
    adding the `using System.ComponentModel;` directive to the `SettingsView.cs` file.


    `FolderName`, `ProjectName`, and `PackageName` `SettingsNode` members are validated
    by design time much the same way `GeneralNode` members were validated.


    ## Testing SettingsView FolderName, ProjectName, and PackageName Properties


    Build the solution and then open a test SSIS project. Add an Execute Catalog Package
    Task to the control flow and open the editor. Observe the Settings page, as shown
    in `Figure 13-27`:


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig27_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig27_HTML.jpg)


    `Figure 13-27` The `SettingsView` `FolderName`, `ProjectName`, and `PackageName`
    properties in action


