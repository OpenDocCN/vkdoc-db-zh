- fmt: '### Add the Execution Engine


    The execution engine for our framework is an SSIS package that uses our `Execute
    Catalog Package Task`. Click the `Parameters` tab and add a new `String` type
    package parameter named `ApplicationName`, as shown in Figure [23-14](#449652_2_En_23_Chapter.xhtml#Fig14):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig14_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig14_HTML.jpg)

    *Figure 23-14: Adding the ApplicationName package parameter*


    Add a new SSIS package-scoped `ADO.Net Connection Manager` named `Framework SSIS
    Catalog` to the `Parent.dtsx` SSIS package, connected to the SQL Server instance
    that hosts the framework SSIS Catalog, as shown in Figure [23-15](#449652_2_En_23_Chapter.xhtml#Fig15):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig15_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig15_HTML.jpg)

    *Figure 23-15: Adding the Framework SSIS Catalog connection manager*


    Add a new SSIS package named `Parent.dtsx` to the `ECPTFramework` SSIS project.
    Add an `Execute SQL Task` to the `Parent.dtsx` Control Flow, and rename the `Execute
    SQL Task` `SQL Get Application Packages`, as shown in Figure [23-16](#449652_2_En_23_Chapter.xhtml#Fig16):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig16_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig16_HTML.jpg)

    *Figure 23-16: SQL Get Application Packages General view*


    Set the `ConnectionType` property to `ADO.NET` and the `Connection` property to
    the `Framework SSIS Catalog` connection manager. In the `SQLStatement` property,
    enter the T-SQL in Listing [23-5](#449652_2_En_23_Chapter.xhtml#PC5):


    ```sql

    Select p.FolderName

    , p.ProjectName

    , p.PackageName

    , ap.Synchronized

    , ap.MaximumRetries

    , ap.RetryIntervalSeconds

    , ap.Use32bit

    , ap.LoggingLevel

    From fw.ApplicationPackages ap

    Join fw.Applications a

    On a.ApplicationId = ap.ApplicationId

    Join fw.Packages p

    On p.PackageId = ap.PackageId

    Where a.ApplicationName = @ApplicationName

    Order By ap.ExecutionOrder

    ```

    *Listing 23-5: T-SQL to get application packages*


    Once added to the `SQLStatement` property, the T-SQL appears as shown in Figure
    [23-17](#449652_2_En_23_Chapter.xhtml#Fig17):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig17_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig17_HTML.jpg)

    *Figure 23-17: T-SQL for the SQL Statement property*


    Configure the `ResultSet` property to `Full result set`. Click the `Parameter
    Mapping` page and click the `Add` button. Set the `Variable Name` to `$Package::ApplicationName`,
    `Data Type` to `String`, and the `Parameter Name` to `ApplicationName`, as shown
    in Figure [23-18](#449652_2_En_23_Chapter.xhtml#Fig18):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig18_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig18_HTML.jpg)

    *Figure 23-18: Configuring the Parameter Mapping*


    On the `Result Set` page, click the `Add` button and rename the `Result Name`
    `0`. Click the `Variable Name` dropdown and select `<New variable…>`, as shown
    in Figure [23-19](#449652_2_En_23_Chapter.xhtml#Fig19):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig19_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig19_HTML.jpg)

    *Figure 23-19: Creating a new variable for the result set*


    Configure the new variable properties with the following settings:

    - Container: `Parent`

    - Name: `ApplicationPackages`

    - Namespace: `User`

    - Value type: `Object`


    When configured, the `User::ApplicationPackages Object` type variable appears
    as shown in Figure [23-20](#449652_2_En_23_Chapter.xhtml#Fig20):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig20_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig20_HTML.jpg)

    *Figure 23-20: The User::ApplicationPackages object type variable*


    Click the `OK` button to close the `Add Variable` dialog. The `Result Set` page
    appears as shown in Figure [23-21](#449652_2_En_23_Chapter.xhtml#Fig21):


    ![../images/449652_2_En_23_Chapter/449652_2_En_23_Fig21_HTML.jpg](images/449652_2_En_23_Chapter/449652_2_En_23_Fig21_HTML.jpg)

    *Figure 23-21: Configuring the Result Set*'
