    本作品受版权保护。出版者保留所有权利，无论涉及材料的全部或部分，具体包括翻译权、重印权、插图的再利用、朗诵、广播、缩微胶片或其他任何物理方式的复制，以及信息存储与检索、电子改编、计算机软件，或目前已知或未来开发的类似或相异方法论。本出版物中使用通用描述性名称、注册商标、服务标记等，即使未作特别声明，也不意味着这些名称不受相关保护性法律法规的约束，因此可自由用于一般用途。出版者、作者和编辑可以安全地假设本书中的建议和信息在出版时是真实准确的。出版者、作者或编辑均不对本作品所含材料或任何可能存在的错误或遗漏提供明示或暗示的保证。对于已出版地图中的管辖权主张和机构从属关系，出版者保持中立。


    本书通过 Springer Science+Business Media LLC 在全球图书贸易中发行，地址：1 New York Plaza, Suite
    4600, New York, NY 10004。电话：1-800-SPRINGER，传真：(201) 348-4505，电子邮件：orders-ny@springer-sbm.com，或访问
    www.springeronline.com。Apress Media, LLC 是一家加利福尼亚州有限责任公司，其唯一成员（所有者）是 Springer
    Science + Business Media Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是一家特拉华州公司。


    ## 前言


    阅读这本书以准备撰写这篇前言，对我来说是一次怀旧之旅。自定义任务的一些函数名称、代码、`GAC`、将自定义任务加入设计器的各种步骤——所有这些都唤起了我丰富的回忆，那是我们最初构建
    `Integration Services` 时的样子。2020 年标志着我们开始编写 `SSIS` 代码已有 20 周年。


    `SSIS` 起初是一个小团队，旨在用更多的东西取代 `Data Transformation Services (DTS)`。具体是什么，并不清晰。但我们都知道，新产品需要一个更健壮的数据处理引擎、更好的控制流和更丰富的设计时与运行时体验，尤其是，我们需要解决
    `DTS` 的一些设计缺陷。在此不过多怀旧，可以说我们致力于创建一个持久、灵活、可扩展且功能丰富的产品，以充分满足企业数据处理需求。


    我们最终完全废弃了 `DTS`，直到后来我们意识到 `DTS` 实际上做了一些我们未支持的很酷的事情，而且由于我们为了弥补 `DTS` 缺陷而做出的一些设计决策，我们严重限制了
    `DTS` 客户升级其现有包的能力。答案是什么？将 `DTS` 嵌入到 `SSIS` 中。这是 `SSIS` 中有意且深思熟虑的可扩展性设计（用于支持创建自定义任务）不仅重要而且至关重要的多次实例中的第一次。我们能够在几天内以编程方式将整个
    `DTS` 产品嵌入到一个自定义任务中，这就是后来广为人知的 `执行 DTS 包任务`！


    Andy 在这里提到了我对 `SSIS` 文档编年史的贡献。在强烈推荐 Andy 的书之前，我想先分享一些相关的事情。


    首先，我对 `SSIS` 项目的贡献常常被高估了。我注意到，因为我的名字与那本书相关联，我有时主要与该产品的成功联系在一起。团队中还有许多人做了了不起的事情：Ashvini
    Sharma、Matt David（我书籍的技术编辑）、Mike Blaszczak、Kamal Hathi、Donald Farmer、Slobodan
    Bojanic（我书籍的代码评审员）、James Howey、Michael Entin、Runying Mao、Silviu Guea、Nick Berezansky、Sergei
    Ivanov、Mark Durley、Euan Garden、Anjan Das、Bill Baker、Jeff Bernhardt、Bryan Hartman、Craig
    Guyer、Ranjeeta Nanda、Ovidiu Burlacu，以及我确信我遗漏的其他几位！`SSIS` 确实是一个团队努力的成果，它产生了一个持续进化、改进、远超我们最初设想并表现卓越的产品。成为该团队的一员是我的荣幸。


    当我开始写那本书时，我顾虑重重；那种自我怀疑，我后来了解到在作者中相当普遍。从一开始，我就问自己这类问题：“这值得花时间吗？”“真的会有人买这本书吗？”“我做这件事有什么价值吗？”“人们是只会看到错误和缺点，还是会欣赏我倾注其中的努力和热情？”


    在写作早期，一群也想写一本 `SSIS` 书的人联系了我，问我是否可以将我的目录作为他们书的起点。我说，当然可以。我的理由是，写 `SSIS` 的人越多，它的采用率就会越好。


    在我准备出版时，`SSIS` 用户教育团队找到了我。由于各种原因，他们在编写 `SSIS` 文档方面落后了，需要一个启动帮助。他们问我是否可以将我的手稿作为
    `SSIS` 联机丛书文档的起点。我说是的，当然可以。我感到很荣幸。我写的大部分内容在我甚至还没出版我的书之前，就变成了联机丛书的内容。


    人们为什么写技术书籍？原因有很多。有些理由比其他的更合理。这肯定`不是`为了赚很多钱。对我个人而言，我对 `SSIS` 充满热情，并希望社区在吸收这个产品时能得到尽可能多的帮助。因此，当在亚马逊上收到诸如“这本书里的所有内容都能在联机丛书中找到”和“这不是一本教程”的评论时，就显得很讽刺。


    那么，Kirk，你想说什么呢？在我认识的技术作者中，以及我有幸交往过的作者，他们都对他们所文档化的产品怀有真诚的热情。真正驱使他们，也驱使我写作的，不是名声、恶名、职业晋升或金钱，而是对产品的热爱以及帮助人们采用并取得成功的愿望。


    Andy 也不例外。没有人比 Andy Leonard 更了解、使用、教授和理解 `SSIS`。我知道他亲自撰写这些书籍，是出于他对于帮助人们使用 `SSIS`
    在工作中取得成功的热情。


    所以，当你阅读、使用并从这本书中学习时，请记住这一切。如果你发现你认为这里有错误或缺点，请记住，这是一项爱的劳动。它是热情与善意结合的产物，旨在帮助你取得成功。撰写技术参考书就是一项艰苦的工作！它不仅仅是文字，还是代码；它不仅要经受你这位读者的批判性审视，还要经受演示代码编译器的严苛考验。


    而且，当你发现这本书在你的 `SSIS` 之旅中至关重要时，记得向 Andy 表达感谢，感谢他所有的辛勤工作。这是一个技术作者所能体验到的最好回报。

    '
- fmt: '# 关于本书


    > —Kirk Haselden


    ## 作者初版感想


    这本小书最初于2012年作为一系列博客文章发表在Linchpin People网站上。


    在撰写本文时，我提供SQL Server Integration Services (SSIS) 解决方案已超过十年。在SSIS之前，我使用Data Transformation
    Services (DTS) 工作了几年。尽管SSIS自2005版本以来就支持自定义任务和组件，但我最初建议我的咨询客户*不要*开发自定义SSIS任务和组件。为什么？


    1.  源代码需要在使用这些自定义任务和组件的SSIS解决方案的整个生命周期内进行维护和支持。

    2.  需要投资购买Visual Studio Professional（约1000美元）来构建代码。

    3.  需要相当扎实的.Net开发技能来理解构建Visual Studio工具箱组件的复杂性。


    我的第一个担忧仍然存在，但入门门槛已大大降低——至少在成本方面。


    当微软®发布免费版本的Visual Studio（Visual Studio Express和更近期的Visual Studio Community Edition）后，一旦我了解到可以使用免费工具来构建自定义SSIS任务（本书的主题），我的第二个担忧就消失了。


    本书解决了我的第三个担忧。


    撰写这个博客系列并重新审视该系列以创作本书，对我来说是件乐事。我祈祷您阅读时能像我写作时一样享受。


    > —Andy

    > 弗吉尼亚州法姆维尔

    > 2017年4月


    ## 作者第二版感想


    我对本书第一版的反响感到惊喜。最初它只是一部自出版作品，当我准备在亚马逊点击“发布”按钮时，Apress的（出色的）编辑Jonathan Gennick说服我把稿件发给他。


    许多读者表示他们喜欢这篇稿子的篇幅。他们分享道：“我一个下午就能读完。”我羡慕他们的阅读速度。


    我写下这些感想的时间是2010年代最后一个11月的最后一天。在经历了长达两年多的（书籍）写作停歇后，我意识到：


    1.  是时候更新内容了。

    2.  是时候更新示例了。


    正如我的朋友兼兄弟Chris Yates常说的：“我们开始吧！”


    > —Andy

    > 弗吉尼亚州法姆维尔

    > 2020年12月


    ## 致谢


    这本小书离不开他人的帮助。Kirk Haselden，是《Microsoft SQL Server 2005 Integration Services》（Sams,
    2006, [amazon.com/Microsoft-Server-2005-Integration-Services/dp/0672327813](https://www.amazon.com/Microsoft-Server-2005-Integration-Services/dp/0672327813))的作者，他在本书中广泛撰写了关于为SQL
    Server Integration Services (SSIS) 开发自定义任务的内容。Matt Masson的博客([mattmasson.com](https://www.mattmasson.com/))包含了几篇标记为“extensions”的文章，涵盖了自定义SSIS任务开发的主题。


    感谢Luther Atkinson校对稿件并提供反馈，以及你的鼓励。


    我要感谢Enterprise Data & Analytics (entdna.com) 的同事们，感谢他们的鼓励，并在我熬夜试图弄清楚如何让这些修订代码工作时为我顶班。我们有一个很棒的团队！


    每次与Donald Farmer互动都激励着我。作为微软的首席项目经理，Donald广泛参与了SSIS的工作并帮助塑造了该产品。Donald继续通过在TreeHive
    Strategy (treehivestrategy.com) 为供应商提供独特的战略指导来塑造软件。


    我确信这个行业里有许多优秀的编辑。Jonathan Gennick是我有幸合作过的最出色的编辑。


    最后，感谢我的家人的理解。在我撰写本文时，我的孩子们Stevie Ray、Emma和Riley还住在家里，而Manda和Penny已经有了自己的孩子。


    特别感谢Christy，本书献给我的妻子，我的爱人。谢谢你。


    ## 关于作者


    ## 1. 本书的故事


    偶尔，我的工程好奇心会战胜我，我会问自己一些问题，比如，“自己，我觉得某某事情可能吗？”大多数时候，这些问题只会带来一些脑力练习，没什么其他用处。但有时，努力会带来一些好处。


    2012年夏末的一天，我问自己：“你认为有可能使用`Visual Basic Express`创建一个自定义的SSIS任务吗？”疯狂的问题，对吧？


    简短的答案是：是的。


    为什么这很重要？因为[Visual Studio IDE](https://www.visualstudio.com/vs/)（集成开发环境）现在是免费的。这意味着，如果你拥有SQL
    Server的许可证，就无需再花费更多钱来通过自定义任务和组件扩展SSIS。当然，你可能*想*花钱获取Visual Studio其他版本的一些工具和功能。


    我对博客系列进行了修订，创作了本书。有经验的开发者会注意到我使用了`Visual Studio 2019 Community Edition`，并以`SQL
    Server 2019 Integration Services (SSIS 2019)`版本的`.Net Framework`为目标。'
  raw: 'I cannot remember the first time I met Andy. I am fairly sure we have never
    met in person. However, over the years, we have conversed through various channels
    and come to know each other virtually. I have watched Andy’s training, read some
    of his books, and watched as he has firmly established himself as one of the most
    knowledgeable experts on enterprise data and analytics generally and SSIS specifically.


    This book is a deep dive into a subject that requires such a treatment.


    In several places in this book, Andy makes the disclaimer that he is no C# programmer.
    Do not let him fool you, and do not let that dissuade you from using this reference.
    The guidance given here is both functional and unique. Building a custom component
    to plug into any complex system is hard. Building an SSIS custom task can be confusing,
    and it is not uncommon to hit roadblocks that have no immediately obvious solution.
    I know. Even though I was part of the team that designed custom task architecture,
    I still ran into problems implementing them. Andy walks you through each step
    in meticulous detail while calling out the gotchas that are easy to overlook.


    Andy is an SSIS expert. If you want to extend SSIS to do something that it currently
    does not support, building a custom task is one powerful and highly flexible way
    to do that. This book does not just capture the books online details. It documents
    the things that you cannot learn there or anywhere else for that matter about
    how to build an SSIS custom task.


    Best of luck in your Custom Task adventures!


    > —Kirk Haselden


    Author’s First Edition Thoughts


    This small book was originally written as a series of blog posts hosted on the
    Linchpin People website in 2012.


    I have delivered SQL Server Integration Services (SSIS) solutions for over ten
    years at the time of this writing. Before SSIS, I worked with Data Transformation
    Services (DTS) for a couple years. Although SSIS has supported custom tasks and
    components since its 2005 release, I initially recommended that my consulting
    clients *not* develop custom SSIS tasks and components. Why?


    1.  The source code needs to be maintained and supported throughout the lifecycle
    of SSIS solutions that use the custom tasks and components.


    2.  One needs to invest in Visual Studio Professional (roughly $1,000USD) to build
    the code.


    3.  One needs fairly serious .Net developer skills to understand the intricacies
    of building a Visual Studio toolbox component.


    My first concern stands but with a much lower barrier to entry – at least cost-wise.


    When Microsoft® released free versions of Visual Studio (Visual Studio Express
    and, more recently, Visual Studio Community Edition), my second concern lapsed
    once I learned I could use the free tools to build a custom SSIS task (the topic
    of this book).


    This book addresses my third concern.


    Writing the blog series and revisiting the series to produce this book was fun
    for me. I pray you enjoy reading it as much as I enjoyed writing it.


    > —AndyFarmville, VirginiaApril 2017


    ## Author’s Second Edition Thoughts


    I was pleasantly surprised by the response to the first edition of this book.
    Initially intended to be a self-published work, Jonathan Gennick, my (excellent)
    editor at Apress, talked me into sending him the manuscript just as I was ready
    to click the Publish button at Amazon.


    Many readers communicated that they liked the length of the manuscript. They shared,
    “I can read this in an afternoon.” I envy their reading speed.


    I type these thoughts on the last day of the last November in the 20-teens. After
    a (book-) writing hiatus that has lasted over two years, I realize


    1.  It’s time to update the content.


    2.  It’s time to update the example.


    As my friend and brother Chris Yates is apt to say, “Let’s roll!”


    > —AndyFarmville, VirginiaDecember 2020


    Acknowledgments


    This small book would not have been possible without the help of others. Kirk
    Haselden, author of Microsoft SQL Server 2005 Integration Services (Sams, 2006,
    [amazon.​com/​Microsoft-Server-2005-Integration-Services/​dp/​0672327813](https://www.amazon.com/Microsoft-Server-2005-Integration-Services/dp/0672327813)),
    wrote extensively in this book about developing custom tasks for SQL Server Integration
    Services (SSIS). Matt Masson’s blog ([mattmasson.​com](https://www.mattmasson.com/))
    includes several posts tagged “extensions” which cover the topic of custom SSIS
    task development.


    Thank you, Luther Atkinson, for proofreading and providing feedback on the manuscript,
    and for your encouragement.


    I owe my coworkers at Enterprise Data & Analytics (entdna.com) a debt of gratitude
    for their encouragement and for covering for me when I stayed up too late trying
    to figure out how to make this revised code work. We have an awesome team!


    Donald Farmer inspires me every time we interact. As Principal Program Manager
    at Microsoft, Donald worked extensively with SSIS and helped shape the product.
    Donald continues to shape software by providing vendors unique strategic guidance
    at TreeHive Strategy (treehivestrategy.com).


    I am certain there are many excellent editors in this business. Jonathan Gennick
    is the best with whom I have had the privilege to work.


    Finally, I thank my family for their understanding. My children Stevie Ray, Emma,
    and Riley who live at home at the time of this writing, and Manda and Penny who
    have children of their own.


    Thanks especially to Christy, to whom this book is dedicated, my wife, my love.
    Thank you.


    About the Author


    # 1. The Story of This Book


    Occasionally, my engineering curiosity gets the better of me, and I ask myself
    questions like, “Self, do I think such-and-such is possible?” Most of the time,
    these questions lead to some brain exercise and little else of use. Sometimes,
    some good comes from the effort.


    One day in late summer 2012, I asked myself, “Do you think it is possible to create
    a custom SSIS task using Visual Basic Express?” Crazy question, right?


    The short answer is: Yes.


    Why is this significant? Because the [Visual Studio IDE](https://www.visualstudio.com/vs/)
    (Integrated Development Environment) is now free. This means if you have a license
    for SQL Server, you do not need to spend more money to extend SSIS with custom
    tasks and components. You may *want* to spend money to obtain some of the tools
    and features of other versions of Visual Studio, though.


    I revised the blog series to produce this book. Experienced developers will notice
    I used Visual Studio 2019 Community Edition and targeted the SQL Server 2019 Integration
    Services (SSIS 2019) versions of .Net Framework.'
