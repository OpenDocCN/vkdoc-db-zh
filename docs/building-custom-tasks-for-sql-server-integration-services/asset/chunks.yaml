  raw: '### Coding the GeneralView Class


    The code in this section builds part of the *View* portion of the View ➤ Node
    ➤ Property Category ➤ Property hierarchy. It is important to note the GeneralView
    class is actually a `System.Windows.Form` object, and this is why the implementation
    automatically added the statement `using System.Windows.Forms`. Later in this
    chapter, we will add standard and typical `Form` methods manually. Why not simply
    add GeneralView as a form? This book is written for people who are not professional
    software developers. Adding a class instead of adding a form is one way to emphasize
    the fact that forms *are* classes.


    In Solution Explorer, right-click the ExecuteCatalogPackageTaskComplexUI project,
    hover over Add, and then click “Class….” When the Add New Item dialog displays,
    change “Class1.cs” to “GeneralView.cs,” as shown in Figure [11-18](#449652_2_En_11_Chapter.xhtml#Fig18):


    ![../images/449652_2_En_11_Chapter/449652_2_En_11_Fig18_HTML.jpg](images/449652_2_En_11_Chapter/449652_2_En_11_Fig18_HTML.jpg)


    Figure 11-18


    Adding the GeneralView class


    Click the Add button to add the new GeneralView class.


    Edit the class declaration using the code in Listing [11-13](#449652_2_En_11_Chapter.xhtml#PC13):


