- fmt: '## Coding the Form


    打开 `ExecuteCatalogPackageTaskUIForm` 表单。向表单添加一个标签和一个文本框。将标签的文本更改为 “Instance:”，并将文本框命名为
    `txtInstance`，如图 8-20 所示：


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig20_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig20_HTML.jpg)


    图 8-20 添加标签和文本框


    为 Folder、Project 和 Package 属性添加标签和文本框控件，如图 8-21 所示：


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig21_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig21_HTML.jpg)


    图 8-21 为 Folder、Project 和 Package 属性添加控件


    将新的文本框分别命名为 `txtFolder`、`txtProject` 和 `txtPackage`。


    接下来，添加一个名为 `btnDone` 的按钮，并将其 `Text` 属性设置为 “Done”，如图 8-22 所示：


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig22_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig22_HTML.jpg)


    图 8-22 添加 Done 按钮


    最后，将 `btnDone` 的 `DialogResult` 属性更改为 “OK”，如图 8-23 所示：


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig23_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig23_HTML.jpg)


    图 8-23 更改 Done 按钮的 DialogResult 属性


    我们将使用按钮的 `Click` 事件来设置 `ExecuteCatalogPackageTask` 的目录包路径属性（Instance、Folder、Project
    和 Package）。将 `Done` 按钮的 `DialogResult` 属性设置为 `OK` 非常重要，因为它自动完成了两个功能：

    *   关闭编辑器表单。

    *   发送 `OK` 作为 `DialogResult` 会触发任务的 `Validate` 方法。


    ## Coding the Click Event and the Form


    我特意选择从讨论在 `btnDone` 的 `Click` 事件中编写表单代码开始。我能听到你在想：“为什么，Andy？”很高兴你问了。上一节末尾的两个要点代表了一个“陷阱”——在编写自定义
    SSIS 任务编辑器时很容易出错的地方。如果构建不正确，你很难通过搜索“Validate method doesn’t fire”来找到自定义 SSIS 任务的答案。


    我们稍后会讲到 `Click` 事件的实际代码。首先，让我们构建 `ExecuteCatalogPackageTaskUIForm` 类。首先双击 `btnDone`
    以在编辑器中打开 `Click` 事件。在直接向 `btnDone` 的 `Click` 事件添加代码之前，请将以下 `using` 语句添加到窗体类的最顶部，如清单
    8-9 所示：

    ```

    using System.Globalization;

    using Microsoft.SqlServer.Dts.Runtime;

    ```

    清单 8-9 添加 Using 语句


    你的窗体现在代码应如图 8-24 所示：


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig24_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig24_HTML.jpg)


    图 8-24 将 Imports 语句添加到 ExecuteCatalogPackageTaskUIForm 类


    通过添加清单 8-10 中的代码，声明一个新的名为 `TaskHostValue` 的 `TaskHost` 变量：

    ```

    private TaskHost taskHost;

    ```

    清单 8-10 声明 TaskHost


    你的窗体现在类应如图 8-25 所示：


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig25_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig25_HTML.jpg)


    图 8-25 声明 TaskHost 变量


    要开始编写 `Click` 事件的代码，我们需要通过一个托管 SSIS 自定义任务类的类来处理任务类，添加清单 8-11 中的代码：

    ```

    taskHost.Properties["ServerName"].SetValue(taskHost,  txtInstance.Text);

    ```

    清单 8-11 添加 ServerName 属性的值


    你的窗体现在类应如图 8-26 所示：


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig26_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig26_HTML.jpg)


    图 8-26 添加 ServerName 属性的值


    在此方法中——当数据集成开发人员在 `ExecuteCatalogPackageTask` 编辑器上单击 `Done` 按钮时触发——与此表单关联的 `TaskHost`
    的 `ServerName` 属性被设置为名为 `txtInstance` 的表单文本框的 `Text` 属性值。我们编写了大量代码才到达这里，但这就是我们这样做的原因，以便我们可以从任务编辑器表单编辑属性。


    在继续之前，添加清单 8-12 中所示的控制到属性映射，用于 `PackageFolder`、`PackageProject` 和 `PackageName`
    属性：

    ```

    taskHost.Properties["PackageFolder"].SetValue(taskHost, txtFolder.Text);

    taskHost.Properties["PackageProject"].SetValue(taskHost, txtProject.Text);

    taskHost.Properties["PackageName"].SetValue(taskHost, txtPackage.Text);

    ```

    清单 8-12 添加属性映射


    一旦你为 `Click` 事件方法添加了额外属性的代码，`ExecuteCatalogPackageTaskUIForm` 类应如图 8-27 所示：


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig27_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig27_HTML.jpg)


    图 8-27 完成 Click 事件属性编码


    下一步是前面编码的补充。当表单显示时，我们希望检索任务对象属性（`ServerName`、`PackageFolder`、`PackageProject`
    和 `PackageName`）的值，并将它们显示在编辑器（表单）上的 `txtInstance`、`txtFolder`、`txtProject` 和 `txtPackage`
    文本框中。要实现此功能，请编辑现有的 `ExecuteCatalogPackageTaskUIForm` 构造函数以匹配清单 8-13：

    ```

    public ExecuteCatalogPackageTaskUIForm (TaskHost taskHostValue)

    {

    InitializeComponent();

    taskHost = taskHostValue;

    txtInstance.Text = ➥ taskHost.Properties["ServerName"].GetValue(taskHost).ToString();

    txtFolder.Text = ➥ taskHost.Properties["PackageFolder"].GetValue(taskHost).ToString();

    txtProject.Text = ➥ taskHost.Properties["PackageProject"].GetValue(taskHost).ToString();

    txtPackage.Text = ➥ taskHost.Properties["PackageName"].GetValue(taskHost).ToString();

    }

    ```

    清单 8-13 ExecuteCatalogPackageTaskUIForm 构造函数


    完成后，`ExecuteCatalogPackageTaskUIForm` 类应如图 8-28 所示：


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig28_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig28_HTML.jpg)


    图 8-28 添加表单构造函数


    表单构造函数接受一个名为 `taskHost` 的 `TaskHost` 参数，这消除了在 `ExecuteCatalogPackageTaskUI` 类的
    `GetView` 函数代码中的错误，如图 8-29 所示：


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig29_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig29_HTML.jpg)


    图 8-29 ExecuteCatalogPackageTaskUI.GetView() 中不再有波浪线'
  raw: '## Coding the Form


    Open the ExecuteCatalogPackageTaskUIForm form. Add a label and a textbox to the
    form. Change the text of the label to “Instance:” and name the textbox “txtInstance”
    as shown in Figure [8-20](#449652_2_En_8_Chapter.xhtml#Fig20):


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig20_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig20_HTML.jpg)


    Figure 8-20


    Adding a label and textbox


    Add label and textbox controls for the Folder, Project, and Package properties
    as shown in Figure [8-21](#449652_2_En_8_Chapter.xhtml#Fig21):


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig21_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig21_HTML.jpg)


    Figure 8-21


    Adding controls for Folder, Project, and Package properties


    Name the new textboxes txtFolder, txtProject, and txtPackage, respectively.


    Next, add a button named btnDone and set the Text property to “Done” as shown
    in Figure [8-22](#449652_2_En_8_Chapter.xhtml#Fig22):


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig22_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig22_HTML.jpg)


    Figure 8-22


    Adding the Done button


    Finally, change the DialogResult property of btnDone to “OK” as shown in Figure
    [8-23](#449652_2_En_8_Chapter.xhtml#Fig23):


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig23_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig23_HTML.jpg)


    Figure 8-23


    Changing the DialogResult property for the Done button


    We will use the button’s Click event to set the Catalog Package Path properties
    (Instance, Folder, Project, and Package) of the ExecuteCatalogPackageTask. Setting
    the DialogResult property to OK for the Done button is important because it accomplishes
    a couple of automatic functions:


    *   It closes the editor form.


    *   Sending OK as the DialogResult triggers the Validate method of the Task.


    ## Coding the Click Event and the Form


    I deliberately choose to begin the discussion of coding the form in the Click
    event of btnDone. I can hear you thinking, “Why, Andy?” I’m glad you asked. The
    two bullets at the end of the previous section represent a “gotcha” – an easy
    place to fail when coding a custom SSIS task editor. If you build this incorrectly,
    you will be hard pressed to find the answer by searching for “Validate method
    doesn’t fire” for custom SSIS task.


    We’ll get to the actual code for the Click event in a bit. First, let’s build
    out the ExecuteCatalogPackageTaskUIForm class. Begin by double-clicking btnDone
    to open the editor at the Click event. Before we add code directly to the Click
    event of btnDone, add the following using statements to the very top of the Form
    class, as shown in Listing [8-9](#449652_2_En_8_Chapter.xhtml#PC9):


    ```

    using System.Globalization;

    using Microsoft.SqlServer.Dts.Runtime;

    Listing 8-9

    Adding Using Statements

    ```


    Your form code should now appear as shown in Figure [8-24](#449652_2_En_8_Chapter.xhtml#Fig24):


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig24_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig24_HTML.jpg)


    Figure 8-24


    Adding the Imports Statements to the ExecuteCatalogPackageTaskUIForm class


    Declare a new TaskHost variable named TaskHostValue by adding the code in Listing
    [8-10](#449652_2_En_8_Chapter.xhtml#PC10):


    ```

    private TaskHost taskHost;

    Listing 8-10

    Declaring the TaskHost

    ```


    Your form class should now appear as shown in Figure [8-25](#449652_2_En_8_Chapter.xhtml#Fig25):


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig25_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig25_HTML.jpg)


    Figure 8-25


    Declaring the TaskHost variable


    To begin coding the Click event, we need to address the task class *via* a class
    hosting the SSIS custom task class by adding the code found in Listing [8-11](#449652_2_En_8_Chapter.xhtml#PC11):


    ```

    taskHost.Properties["ServerName"].SetValue(taskHost,  txtInstance.Text);

    Listing 8-11

    Adding the value of the ServerName property

    ```


    Your form class should now appear as shown in Figure [8-26](#449652_2_En_8_Chapter.xhtml#Fig26):


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig26_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig26_HTML.jpg)


    Figure 8-26


    Adding the value of the ServerName property


    In this method – which fires when a data integration developer clicks the Done
    button on the ExecuteCatalogPackageTask editor – the ServerName property of the
    TaskHost that is coupled to this form is set to the text property value of the
    form textbox named txtInstance. We built a lot of code to get here, but this is
    why we did it, so that we could edit a property from a task editor form.


    Before proceeding, add control-to-property mappings shown in Listing [8-12](#449652_2_En_8_Chapter.xhtml#PC12)
    for the PackageFolder, PackageProject, and PackageName properties:


    ```

    taskHost.Properties["PackageFolder"].SetValue(taskHost, txtFolder.Text);

    taskHost.Properties["PackageProject"].SetValue(taskHost, txtProject.Text);

    taskHost.Properties["PackageName"].SetValue(taskHost, txtPackage.Text);

    Listing 8-12

    Adding property mappings

    ```


    Once you’ve added code for additional properties to the Click event method, the
    ExecuteCatalogPackageTaskUIForm class should appear as shown in Figure [8-27](#449652_2_En_8_Chapter.xhtml#Fig27):


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig27_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig27_HTML.jpg)


    Figure 8-27


    Completing the Click event property coding


    The next step is the complement of the previous coding. When the form displays,
    we want to retrieve the values of the task object’s properties (ServerName, PackageFolder,
    PackageProject, and PackageName) and display them in the txtInstance, txtFolder,
    txtProject, and txtPackage textboxes on the editor (form). To accomplish this
    functionality, edit the existing ExecuteCatalogPackageTaskUIForm constructor to
    match Listing [8-13](#449652_2_En_8_Chapter.xhtml#PC13):


    ```

    public ExecuteCatalogPackageTaskUIForm (TaskHost taskHostValue)

    {

    InitializeComponent();

    taskHost = taskHostValue;

    txtInstance.Text = ➥ taskHost.Properties["ServerName"].GetValue(taskHost).ToString();

    txtFolder.Text = ➥ taskHost.Properties["PackageFolder"].GetValue(taskHost).ToString();

    txtProject.Text = ➥ taskHost.Properties["PackageProject"].GetValue(taskHost).ToString();

    txtPackage.Text = ➥ taskHost.Properties["PackageName"].GetValue(taskHost).ToString();

    }

    Listing 8-13

    ExecuteCatalogPackageTaskUIForm constructor

    ```


    When done, the ExecuteCatalogPackageTaskUIForm class should appear as shown here
    as shown in Figure [8-28](#449652_2_En_8_Chapter.xhtml#Fig28):


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig28_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig28_HTML.jpg)


    Figure 8-28


    Adding the form constructor


    The form constructor takes a TaskHost argument named taskHost, and this clears
    the error in the code in the ExecuteCatalogPackageTaskUI class’s GetView function
    as shown in Figure [8-29](#449652_2_En_8_Chapter.xhtml#Fig29):


    ![../images/449652_2_En_8_Chapter/449652_2_En_8_Fig29_HTML.jpg](images/449652_2_En_8_Chapter/449652_2_En_8_Fig29_HTML.jpg)


    Figure 8-29


    No more squiggly line in ExecuteCatalogPackageTaskUI.GetView()'
  trans: '## 编写表单代码


    打开 `ExecuteCatalogPackageTaskUIForm` 表单。向表单添加一个标签和一个文本框。将标签的文本更改为“实例：”，并将文本框命名为
    `txtInstance`，如图 8-20 所示：


