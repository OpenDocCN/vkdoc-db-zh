- fmt: '## Conclusion


    The code and editor now function as a unit.


    Now would be a good time to execute a commit and push to Azure DevOps.


    At this point in development, we have


    *   Created and configured an Azure DevOps project

    *   Connected Visual Studio to the Azure DevOps project

    *   Cloned the Azure DevOps Git repo locally

    *   Created a Visual Studio project

    *   Added a reference to the Visual Studio project

    *   Performed an initial check-in of the project code

    *   Signed the assembly

    *   Checked in an update

    *   Configured the build output path and build events

    *   Overridden three methods from the Task base class

    *   Added and coded most of a project for the Task editor

    *   Knit the Task Editor to the Task


    But what if things don’t happen like this? What if there’s an error?


    We next extend editor functionality.


    # 10. Expanding Editor Functionality


    The first edition of Building Custom Tasks for SQL Server Integration Services
    was published in 2017. Chapter [10](#449652_2_En_10_Chapter.xhtml) covered troubleshooting
    tips. Chapter [11](#449652_2_En_11_Chapter.xhtml) contained notes from my experience.
    This edition will include those chapters… only later.


    This section of the book is new to the second edition. The goal of this chapter
    and subsequent chapters is to expand the functionality of the Execute Catalog
    Package Task, specifically


    *   Surface a more “SSIS-y” experience for users of the task including a “pretty”
    editor with General and Settings pages “views”

    *   Enable the use of SSIS Expressions

    *   Add design-time validation of task settings

    *   Surface more SSIS Catalog execution properties in the editor


    We begin these efforts in this chapter, in which we refactor existing `ExecuteCatalogPackageTask`
    code and replace the existing task editor project with a new version.


    ## Refactoring


    Developers are sometimes given the opportunity to rewrite or update older versions
    of their code. The longer said code has been in use, the more experience a developer
    has with the code. *Refactoring* is defined in a few ways, including cleaning,
    simplifying, and restructuring existing code.


    In this chapter, we begin with some refactoring of the `ExecuteCatalogPackageTask`
    code, starting with managing the scope of variables.


    ### Adding and Updating Task Properties


    One change will directly address one of the bullets above and move us closer to
    solving a few others: adding SSIS Catalog, Server, and other SSIS package related
    objects as private properties in the `ExecuteCatalogPackageTask` object.


    Examining the `ExecuteCatalogPackageTask` class in the `ExecuteCatalogPackageTask`
    project, we find the *beginning* of an SSIS Catalog object in the `PackageCatalog`
    property as shown in Figure [10-1](#449652_2_En_10_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig1_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig1_HTML.jpg)

    *Figure 10-1: The `PackageCatalog` property*


    The `PackageCatalog` property is a string and contains the name of the SSIS Catalog.
    At the time of this writing, SSIS Catalog names have remained consistent and unchanged,
    “SSISDB.” The property is included as an example of future-proofing the Execute
    Catalog Package Task in case future versions of the SSIS Catalog permit editing
    the SSIS Catalog name, but I do not like the name of the Execute Catalog Package
    Task’s `PackageCatalog` property.


    Rename the Execute Catalog Package Task `PackageCatalog` property to “`PackageCatalogName`,”
    click the “Quick Actions” screwdriver icon in the left margin, and then click
    “Rename ‘`PackageCatalog`’ to ‘`PackageCatalogName`’,” as shown in Figure [10-2](#449652_2_En_10_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig2_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig2_HTML.jpg)

    *Figure 10-2: Renaming the `PackageCatalog` property to “`PackageCatalogName`”*


    `PackageCatalogName` is a more accurate name for the property formerly known as
    `PackageCatalog`.


    The current version of the Execute Catalog Package Task includes a variable of
    type `Microsoft.SqlServer.Management.IntegrationServices.Catalog` in the `Execute`
    method, as shown in Figure [10-3](#449652_2_En_10_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig3_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig3_HTML.jpg)

    *Figure 10-3: A variable of type `Microsoft.SqlServer.Management.IntegrationServices.Catalog`*


    How difficult is it to cut this property from the `Execute` method and use a new
    private property for the task of the `Microsoft.SqlServer.Management.IntegrationServices.Catalog`
    type at the class scope? We may assign a value to the `catalog` property once
    we have enough information available during task configuration. After all, the
    Execute Catalog Package Task will connect to one and only one SSIS catalog.


    Begin this process by adding a new property named `catalog` of the `Microsoft.SqlServer.Management.IntegrationServices`
    type to the `ExecuteCatalogPackageTask` properties list as shown in Listing [10-1](#449652_2_En_10_Chapter.xhtml#PC1)
    and Figure [10-4](#449652_2_En_10_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig4_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig4_HTML.jpg)

    *Figure 10-4: Declaring a `Catalog` property*


    ```csharp

    public Catalog catalog { get; set; } = null;

    ```

    *Listing 10-1: Code to add the `Catalog` property*


    > **Note**

    > The name of this property is not a capital letter. That’s intentional. This
    property will be internal to the task. Also, the object type does not need to
    include “`Microsoft.SqlServer.Management.IntegrationServices`” because the code
    includes `using Microsoft.SqlServer.Management.IntegrationServices` at the top
    of the class code.


    Because the `catalog` property is internal to the `ExecuteCatalogPackageTask`
    class, it is declared as `private`.


    While we’re at it, let’s migrate other variables from the `Execute` method to
    private properties, such as `catalogServer` (`Microsoft.SqlServer.Management.Smo.Server`
    type), `integrationServices` (`Microsoft.SqlServer.Management.IntegrationServices`
    type), `catalogFolder` (`Microsoft.SqlServer.Management.IntegrationServices.CatalogFolder`
    type), `catalogProject` (`Microsoft.SqlServer.Management.IntegrationServices.ProjectInfo`
    type), `catalogPackage` (`Microsoft.SqlServer.Management.IntegrationServices.PackageInfo`
    type), as shown in Listing [10-2](#449652_2_En_10_Chapter.xhtml#PC2) and Figure
    [10-5](#449652_2_En_10_Chapter.xhtml#Fig5):


    ```csharp

    private Server catalogServer { get; set; } = null;

    private IntegrationServices integrationServices { get; set; } = null;

    private CatalogFolder catalogFolder { get; set; } = null;

    private ProjectInfo catalogProject { get; set; } = null;

    private Microsoft.SqlServer.Management.IntegrationServices.PackageInfo catalogPackage
    { get; set; } = null;

    ```

    *Listing 10-2: Adding additional properties*


    Please note the full data type specification for the `catalogPackage` private
    property. The full name of the variable type must be declared because there is
    a different `PackageInfo` type in the `Microsoft.SqlServer.Dts.Runtime` assembly.
    Visual Studio complains if it is not specific because Visual Studio has no way
    to determine which `PackageInfo` type we wish to use.


    ![../images/449652_2_En_10_Chapter/449652_2_En_10_Fig5_HTML.jpg](images/449652_2_En_10_Chapter/449652_2_En_10_Fig5_HTML.jpg)

    *Figure 10-5: Additional properties added*


    Let’s next update the `Execute` method to initialize the class-scoped variables
    we just added.'
