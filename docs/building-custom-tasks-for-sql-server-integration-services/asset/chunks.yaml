    ## Resetting Collections


    Resetting collections is important because it makes the SourceConnection ➤ Folder
    ➤ Project ➤ Package hierarchy more manageable while editing. Implement the `resetCollections`
    method in SettingsView class using the code in Listing [17-23](#449652_2_En_17_Chapter.xhtml#PC23):


    ```

    private void resetCollections(string collectionName)

    {

    Cursor = Cursors.WaitCursor;

    switch (collectionName)

    {

    default:

    break;

    case "Connections":

    settingsNode.Folder = "";

    settingsNode.Project = "";

    settingsNode.Package = "";

    break;

    case "Folders":

    settingsNode.Project = "";

    settingsNode.Package = "";

    break;

    case "Projects":

    settingsNode.Package = "";

    break;

    }

    Cursor = Cursors.Default;

    }

    Listing 17-23

    Add the SettingsView.resetCollections method

    ```


    Once added, the code appears as shown in Figure [17-41](#449652_2_En_17_Chapter.xhtml#Fig41):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig41_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig41_HTML.jpg)


    Figure 17-41


    Adding the SettingsView.resetCollections method


    How does the `resetCollections` method work? A `string` type argument named `collectionName`
    is passed to the `resetCollections` method. Just inside the `resetCollections`
    method, the cursor is set to a `WaitCursor`, and just before the `resetCollections`
    method exits, the cursor is reset to the `Default` cursor.


    A `switch` statement, driven by the collectionName argument value, is sandwiched
    in between these cursor “sets.” The hierarchy is SourceConnection ➤ Folder ➤ Project
    ➤ Package. `switch` statement cases exist for “Connections,” “Folders,” and “Projects.”


    The “Connections” case resets the `settingsNode.Folder`, `settingsNode.Project`,
    and `settingsNode.Package` property values to an empty string. The “Folders” case
    resets the `settingsNode.Project` and `settingsNode.Package` property values to
    an empty string. The “Projects” case resets the `settingsNode.Package` property
    value to an empty string.


    The next step is to add calls to the `resetCollections` method to the `SettingsView.propertyGridSettings_PropertyValueChanged`
    method’s response code for the `SourceConnection`, `Folder`, and `Project` properties,
    as shown in Figure [17-42](#449652_2_En_17_Chapter.xhtml#Fig42):


    ![../images/449652_2_En_17_Chapter/449652_2_En_17_Fig42_HTML.jpg](images/449652_2_En_17_Chapter/449652_2_En_17_Fig42_HTML.jpg)


