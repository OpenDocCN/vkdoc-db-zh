- fmt: '## Tribal Knowledge


    我在此过程中遇到了一些问题。起初，我不确定这些问题是否与免费的 `Express Edition` 有关。当你不知道某件事是否可行时，解决问题会很困难。这需要时间和决心，但我解决了足够多的问题，从而撰写了一系列博客文章，这些文章成为了本书的灵感来源。


    在 2012 年，我承认自己是一个生疏的软件开发人员。在 `.Net` 时代之前，我曾是一名微软认证解决方案开发专家 (`MCSD`)。对于你们这些年轻的后生来说，我是在那些年份以“1”开头的美好旧时光里获得那个认证的，那时我们得自己用木头雕刻芯片。#GetOffMyLawn
    ☺


    我遇到的一些事情对于经验丰富的软件开发人员来说显而易见。经过多年开发软件，这些经验丰富的开发人员拥有[部落知识](http://en.wikipedia.org/wiki/Tribal_knowledge)——他们不记得自己所知道的全部内容。因此，当一个像我这样的
    `.Net` 菜鸟（`.Net n00b`）提问时，他们会默认我已经通过某种相当于肌肉记忆的智力过程，完成了他们本来会做的所有事情。


    我没有完成所有那些事情（我提过我是个 `.Net` 菜鸟吗？）。


    结果之一是，让我栽跟头的事情相对微小。一旦我知道了诀窍，一切都很好，但这些诀窍被认为是如此基础，以至于人们在回答论坛问题时很少分享它们。人们假设，如果你构建
    `Visual Studio` 插件和针对全局程序集缓存 (`GAC`) 的程序集，你必然知道这些基础知识。


    如果你不是 `.Net` 菜鸟，你可能知道这些基础知识。但这并不适用于开始时的我。


    现在，在编码方面我并非无能。但在 2012 年，我也不再是职业软件开发人员。在 `.Net` 出现之前，我开发过软件。我已经提到了 `MCSD` 认证。我在
    1975 年学习了 `BASIC`，并在 1992 年 `Visual Basic` 2.0 版发布时开始编写代码。许多 `VB` 程序员从未跃迁到首先由
    `VB 4`（如果没记错的话）支持的面向对象编程 (`OOP`)，但我做到了。通过类来建模对象对我来说很有意义，并且在随后的岁月里让我受益匪浅。它甚至引导我走向了设计模式的概念，这些模式在[使用
    SSIS 进行数据集成开发](http://smile.amazon.com/Server-Integration-Services-Design-Patterns/dp/1484200837)中有一定的应用。


    此后，我跃迁到了 `C#`，使用 `C#` 开发了在[DILM Suite](https://dilmsuite.com/)中找到的工具和实用程序。


    本版与前一版的一个区别是，我将源代码切换到了 `C#`。


    ## A Starting Point


    我在本书中的目标是创建一个模板，任何人都可以将其作为起点，使用免费的 [`Visual Studio IDE`](https://www.visualstudio.com/vs/)
    创建自定义的 `SSIS` 任务。在接下来的章节中，我将演示实现这一点的一种方法。


    对于开发，我使用的是运行 `Windows Server 2019 Datacenter` 的虚拟机。该虚拟机配置了四个 `CPU`（虽然你不需要四个 `CPU`）和
    `32GB` `RAM`（在本书的第一版中，虚拟机有 `8GB` `RAM`；我建议最少 `4GB` `RAM`）。安装了 `SQL Server 2019
    Developer Edition` 以及 [`Visual Studio 2019 Community`](https://www.visualstudio.com/vs/)。


    ## The Problem We Are Trying to Solve


    我们试图解决什么问题？这始终是一个重要的问题。我们同时试图解决*两个*问题：


    1.  记录构建一个相对简单的自定义 `SSIS` 任务所需的步骤。

    2.  构建一个有用的自定义 `SSIS` 任务。


    `SSIS` 目录 (`SSIS Catalog`) 是一个出色的软件工程作品。然而，`SSIS` 目录提供的功能存在空白——特别是对于实践[数据集成生命周期管理](https://dilmsuite.com/)
    (`DILM`) 和/或 `DevOps` 的企业而言。其中一个空白是 `SSIS` 执行包任务 (`SSIS Execute Package Task`)
    的一个限制。开发人员无法选择另一个项目中的 `SSIS` 包。


    我们将在这次练习中构建的执行目录包任务 (`Execute Catalog Package Task`) 将允许我们做到这一点：启动一个驻留在 `SSIS`
    目录中的 `SSIS` 包。这是 `SSIS` 目录包执行功能的一个完整、生产就绪的实现吗？天哪，不是！这是一个自定义 `SSIS` 任务的基本示例。但既然你在构建这个功能，你可以随意扩展它。我*希望*你扩展它！


    ## Updates to the 2019 Edition


    2019 版与之前的版本有一些差异。其一，示例代码是用 `C#` 编写的，而不是 `Visual Basic`。其二，在本版中，`Azure DevOps`
    取代了源代码控制。这意味着：


    *   `Git` 替代了 `Team Foundation Server`。

    *   使用 `Git` 影响了章节的顺序和流程；本地 `Git` 仓库（`repo`）是*首先*创建的。


    那么，请继续阅读，学习使用现代版本控制工具 `Git` 在 `C#` 中创建自定义任务。


    # 2. Preparing the Environment


    武术学生首先学到的事情之一是如何摔倒。为什么？这样他们就不会伤到自己。在我们开始开发这个任务之前，我想让你知道：你将会经历失败。测试会失败，代码不会按预期运行，事情会出错。当它们发生时，我希望你接受软件开发的几个普遍真理：


    1.  失败是正常的。

    2.  如何恢复。


    我无法过分强调生命周期管理的必要性，而源代码控制是其中的核心。我使用 [`Microsoft Azure DevOps`](https://dev.azure.com)，但请随意使用任何可用的优秀源代码控制解决方案。在撰写本文时，对于五人或以下的团队，`Azure
    DevOps` 是免费的。源代码控制是你进行代码恢复的头号方法。请务必使用它。（你已经被警告过。）


    ## Creating an Azure DevOps Account


    在创建 `Azure DevOps` 项目之前，你需要一个 `Azure DevOps` 帐户。你可以通过访问 [`dev.​azure.​com`](https://dev.azure.com)
    来创建 `Azure DevOps` 帐户。在撰写本文时，基本的 `Azure DevOps Services` 对个人是免费的——有一些限制——最多支持五个用户，如图[2-1](#449652_2_En_2_Chapter.xhtml#Fig1)所示：


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig1_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig1_HTML.jpg)


    图 2-1


    个人服务的 `Azure DevOps` 定价（在撰写本文时）


    一旦你创建了 `Azure DevOps` 帐户并配置了一个组织，你就可以创建一个 `Azure DevOps` 项目。


    ## Creating an Azure DevOps Project


    在 `Azure DevOps` 中有多个位置可以开始创建 `Azure DevOps` 项目。在撰写本文时，每个位置都显示一个“+ 新建项目”（`+ New
    project`）按钮，如图[2-2](#449652_2_En_2_Chapter.xhtml#Fig2)所示：


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig2_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig2_HTML.jpg)


    图 2-2


    新建项目按钮


    点击新建项目按钮会打开“创建新项目”（`Create new project`）面板，如图[2-3](#449652_2_En_2_Chapter.xhtml#Fig3)所示：


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig3_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig3_HTML.jpg)


    图 2-3


    创建新项目面板


    在这个例子中，我创建了一个名为“Book Code”的公共项目，使用 `Git Version Control` 和 `Agile Work item process`。项目创建后，会显示一个仪表板，如图[2-4](#449652_2_En_2_Chapter.xhtml#Fig4)所示：


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig4_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig4_HTML.jpg)


    图 2-4


    `Azure DevOps` 项目仪表板


    一旦 `Azure DevOps` 项目创建完毕，我们就可以配置并连接 `Visual Studio` 来使用这个新项目。'
  raw: '## Tribal Knowledge


    I ran into some issues along the way. Initially, I didn’t know if the issues were
    related to the free Express Edition. It is difficult to work through issues when
    you do not know something is possible. It took time and determination, but I worked
    through enough issues to write a series of blog posts, which became the inspiration
    for this book.


    In 2012, I was admittedly an out-of-practice software developer. Before the .Net
    era, I was a Microsoft Certified Solutions Developer (MCSD). For you, young whipper-snappers,
    I achieved that certification back in the good ol’ days when the years began with
    “1” and we had to carve our own chips out of wood. #GetOffMyLawn ☺


    Some things I encountered are dreadfully obvious to experienced software developers.
    After years of developing software, those experienced developers possess [tribal
    knowledge](http://en.wikipedia.org/wiki/Tribal_knowledge) – they don’t remember
    all the stuff they know. So, when a relative .Net n00b (like me) asks a question,
    they assume I’ve done all the things they would have done by the intellectual
    equivalent of rote muscle memory.


    I had not done all those things (did I mention I was a .Net n00b?).


    One result was the things that tripped me up were relatively minor. It was all
    well and good once I knew the tricks, but the tricks are considered so basic that
    people rarely share them when answering forum questions. It is assumed that if
    you build Visual Studio plugins and assemblies aimed for the Global Assembly Cache
    (GAC), you must know the essentials.


    If you are not a .Net n00b, you probably know these essentials. But that did not
    apply to me at the outset.


    Now, I am no slouch when it comes to coding. But I was also no longer a professional
    software developer in 2012\. Before .Net arrived on the scene, I developed software.
    I already mentioned the MCSD certification. I learned BASIC in 1975 and began
    writing Visual Basic when version 2.0 was released in 1992\. Many VB programmers
    never made the leap to Object-Oriented Programming (OOP) first supported by VB
    4 (if memory serves), but I did. Modeling objects via classes made sense to me
    and has served me well in the years since. It even led me to the concept of design
    patterns which have some application in [data integration development with SSIS](http://smile.amazon.com/Server-Integration-Services-Design-Patterns/dp/1484200837).


    I’ve since made the leap to C#, developing the tools and utilities found in the
    [DILM Suite](https://dilmsuite.com/) using C#.


    One difference between this edition and the previous edition is I’ve switched
    the source code to C#.


    ## A Starting Point


    My goal in this book is to produce a template that anyone can use as a starting
    point for creating a custom SSIS task using the free version of the [Visual Studio
    IDE](https://www.visualstudio.com/vs/). In the chapters that follow, I will demonstrate
    one way to achieve this.


    For development, I am using a virtual machine running Windows Server 2019 Datacenter.
    The VM is configured with four CPUs (although you do not need four CPUs) and 32GB
    RAM (in the first edition of this book, the VM had 8GB RAM; I recommend a minimum
    of 4GB RAM). SQL Server 2019 Developer Edition is installed along with the [Visual
    Studio 2019 Community](https://www.visualstudio.com/vs/).


    ## The Problem We Are Trying to Solve


    What is the problem we are trying to solve? This is always an important question.
    We’re trying to solve *two* problems at once:


    1.  Document the steps necessary to build a relatively simple custom SSIS task.


    2.  Build a useful custom SSIS task.


    The SSIS Catalog is an awesome piece of software engineering. However, there are
    gaps in the functionality provided by the SSIS Catalog – especially for enterprises
    practicing [Data Integration Lifecycle Management](https://dilmsuite.com/) (DILM)
    and/or DevOps. One of the gaps is a limitation of the SSIS Execute Package Task.
    Developers cannot select an SSIS Package in another project.


    The Execute Catalog Package Task that we will build in this exercise will allow
    us to do just that: start an SSIS Package that resides in an SSIS Catalog. Is
    this a complete, production-ready implementation of SSIS Catalog Package execution
    functionality? Goodness no! This is a basic example of a custom SSIS task. But
    since you are building the functionality, you can extend it at will. I *want*
    you to extend it!


    ## Updates to the 2019 Edition


    There are differences between the 2019 and previous editions. For one, the the
    sample code is written in C# instead of Visual Basic. For another, in this edition,
    Azure DevOps supplants source control. What that means is that


    *   Git replaces Team Foundation Server.


    *   Using Git impacts chapter order and flow; the local Git repository (repo)
    is created *first*.


    Read on then, to learn about creating custom tasks in C# using modern version
    control with Git.


    # 2. Preparing the Environment


    One of the first things martial arts students are taught is how to fall. Why?
    So they don’t hurt themselves. Before we begin developing this task, I want you
    to know: you are going to experience failures. Tests will fail, code will not
    behave as anticipated, and things will go wrong. When they do, I want you to accept
    a couple universal truths of software development:


    1.  Failure is normal.


    2.  How to recover.


    I cannot overemphasize the need for lifecycle management, of which source control
    is central. I use [Microsoft Azure DevOps](https://dev.azure.com), but feel free
    to use any of the excellent source control solutions available. At the time of
    this writing, Azure DevOps is free for teams of five or less. Source control is
    your number one method for code recovery. Do it. (You have been warned.)


    ## Creating an Azure DevOps Account


    Before you can create an Azure DevOps project, you need an Azure DevOps account.
    You may create an Azure DevOps account by visiting [dev.​azure.​com](https://dev.azure.com).
    At the time of this writing, basic Azure DevOps Services for individuals are free –
    with some limitations – for up to five users, as shown in Figure [2-1](#449652_2_En_2_Chapter.xhtml#Fig1):


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig1_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Azure DevOps pricing for individual services (at the time of this writing)


    Once you have created an Azure DevOps account and configure an organization, you
    may create an Azure DevOps project.


    ## Creating an Azure DevOps Project


    There are a number of locations in Azure DevOps from which you may begin creating
    an Azure DevOps project. At the time of this writing, each displays a “+ New project”
    button, as shown in Figure [2-2](#449652_2_En_2_Chapter.xhtml#Fig2):


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig2_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig2_HTML.jpg)


    Figure 2-2


    The New project button


    Clicking the New project button opens the “Create new project” blade, shown in
    Figure [2-3](#449652_2_En_2_Chapter.xhtml#Fig3):


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig3_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig3_HTML.jpg)


    Figure 2-3


    The Create new project blade


    In this example, I created a public project named “Book Code” using Git Version
    Control and the Agile Work item process. Once the project is created, a dashboard
    is available as shown in Figure [2-4](#449652_2_En_2_Chapter.xhtml#Fig4):


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig4_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Azure DevOps project dashboard


    Once the Azure DevOps project has been created, we may configure and connect Visual
    Studio to use the new project.'
  trans: '## 部落知识


    我在这个过程中遇到了一些问题。起初，我不确定这些问题是否与免费的 `Express Edition` 有关。当你不确定某件事是否可行时，解决问题会很困难。这需要时间和决心，但我解决了足够多的问题，从而撰写了一系列博客文章，这些文章成为了本书的灵感来源。


    在 2012 年，我承认自己是一个生疏的软件开发人员。在 `.Net` 时代之前，我曾是一名微软认证解决方案开发专家 (`MCSD`)。对于你们这些年轻的后生来说，我是在那些年份以“1”开头的美好旧时光里获得那个认证的，那时我们得自己用木头雕刻芯片。#GetOffMyLawn
    ☺


    我遇到的一些事情对于经验丰富的软件开发人员来说显而易见。经过多年开发软件，这些经验丰富的开发人员拥有[部落知识](http://en.wikipedia.org/wiki/Tribal_knowledge)——他们不记得自己所知道的全部内容。因此，当一个像我这样的
    `.Net` 菜鸟（`.Net n00b`）提问时，他们会默认我已经通过某种相当于肌肉记忆的智力过程，完成了他们本来会做的所有事情。


    我没有完成所有那些事情（我提过我是个 `.Net` 菜鸟吗？）。


    结果之一是，让我栽跟头的事情相对微小。一旦我知道了诀窍，一切都很好，但这些诀窍被认为是如此基础，以至于人们在回答论坛问题时很少分享它们。人们假设，如果你构建
    `Visual Studio` 插件和针对全局程序集缓存 (`GAC`) 的程序集，你必然知道这些基础知识。


    如果你不是 `.Net` 菜鸟，你可能知道这些基础知识。但这并不适用于开始时的我。


    现在，在编码方面我并非无能。但在 2012 年，我也不再是职业软件开发人员。在 `.Net` 出现之前，我开发过软件。我已经提到了 `MCSD` 认证。我在
    1975 年学习了 `BASIC`，并在 1992 年 `Visual Basic` 2.0 版发布时开始编写代码。许多 `VB` 程序员从未跃迁到首先由
    `VB 4`（如果没记错的话）支持的面向对象编程 (`OOP`)，但我做到了。通过类来建模对象对我来说很有意义，并且在随后的岁月里让我受益匪浅。它甚至引导我走向了设计模式的概念，这些模式在[使用
    SSIS 进行数据集成开发](http://smile.amazon.com/Server-Integration-Services-Design-Patterns/dp/1484200837)中有一定的应用。


    此后，我跃迁到了 `C#`，使用 `C#` 开发了在[DILM Suite](https://dilmsuite.com/)中找到的工具和实用程序。


    本版与前一版的一个区别是，我将源代码切换到了 `C#`。


    ## 一个起点


    我在本书中的目标是创建一个模板，任何人都可以将其作为起点，使用免费的 [`Visual Studio IDE`](https://www.visualstudio.com/vs/)
    创建自定义的 `SSIS` 任务。在接下来的章节中，我将演示实现这一点的一种方法。


    对于开发，我使用的是运行 `Windows Server 2019 Datacenter` 的虚拟机。该虚拟机配置了四个 `CPU`（虽然你不需要四个 `CPU`）和
    `32GB` `RAM`（在本书的第一版中，虚拟机有 `8GB` `RAM`；我建议最少 `4GB` `RAM`）。安装了 `SQL Server 2019
    Developer Edition` 以及 [`Visual Studio 2019 Community`](https://www.visualstudio.com/vs/)。


    ## 我们试图解决的问题


    我们试图解决什么问题？这始终是一个重要的问题。我们同时试图解决*两个*问题：


    1.  记录构建一个相对简单的自定义 `SSIS` 任务所需的步骤。

    2.  构建一个有用的自定义 `SSIS` 任务。


    `SSIS` 目录 (`SSIS Catalog`) 是一个出色的软件工程作品。然而，`SSIS` 目录提供的功能存在空白——特别是对于实践[数据集成生命周期管理](https://dilmsuite.com/)
    (`DILM`) 和/或 `DevOps` 的企业而言。其中一个空白是 `SSIS` 执行包任务 (`SSIS Execute Package Task`)
    的一个限制。开发人员无法选择另一个项目中的 `SSIS` 包。


    我们将在这次练习中构建的执行目录包任务 (`Execute Catalog Package Task`) 将允许我们做到这一点：启动一个驻留在 `SSIS`
    目录中的 `SSIS` 包。这是 `SSIS` 目录包执行功能的一个完整、生产就绪的实现吗？天哪，不是！这是一个自定义 `SSIS` 任务的基本示例。但既然你在构建这个功能，你可以随意扩展它。我*希望*你扩展它！


    ## 2019 版的更新


    2019 版与之前的版本有一些差异。其一，示例代码是用 `C#` 编写的，而不是 `Visual Basic`。其二，在本版中，`Azure DevOps`
    取代了源代码控制。这意味着：


    *   `Git` 替代了 `Team Foundation Server`。

    *   使用 `Git` 影响了章节的顺序和流程；本地 `Git` 仓库（`repo`）是*首先*创建的。


    那么，请继续阅读，学习使用现代版本控制工具 `Git` 在 `C#` 中创建自定义任务。


    # 2. 准备环境


    武术学生首先学到的事情之一是如何摔倒。为什么？这样他们就不会伤到自己。在我们开始开发这个任务之前，我想让你知道：你将会经历失败。测试会失败，代码不会按预期运行，事情会出错。当它们发生时，我希望你接受软件开发的几个普遍真理：


    1.  失败是正常的。

    2.  如何恢复。


    我无法过分强调生命周期管理的必要性，而源代码控制是其中的核心。我使用 [`Microsoft Azure DevOps`](https://dev.azure.com)，但请随意使用任何可用的优秀源代码控制解决方案。在撰写本文时，对于五人或以下的团队，`Azure
    DevOps` 是免费的。源代码控制是你进行代码恢复的头号方法。请务必使用它。（你已经被警告过。）


    ## 创建 Azure DevOps 帐户


    在创建 `Azure DevOps` 项目之前，你需要一个 `Azure DevOps` 帐户。你可以通过访问 [`dev.​azure.​com`](https://dev.azure.com)
    来创建 `Azure DevOps` 帐户。在撰写本文时，基本的 `Azure DevOps Services` 对个人是免费的——有一些限制——最多支持五个用户，如图
    2-1 所示：


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig1_HTML.jpg](img/449652_2_En_2_Fig1_HTML.jpg)


    图 2-1


    个人服务的 `Azure DevOps` 定价（在撰写本文时）


    一旦你创建了 `Azure DevOps` 帐户并配置了一个组织，你就可以创建一个 `Azure DevOps` 项目。


    ## 创建 Azure DevOps 项目


    在 `Azure DevOps` 中有多个位置可以开始创建 `Azure DevOps` 项目。在撰写本文时，每个位置都显示一个“+ 新建项目”（`+ New
    project`）按钮，如图 2-2 所示：


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig2_HTML.jpg](img/449652_2_En_2_Fig2_HTML.jpg)


    图 2-2


    新建项目按钮


    点击新建项目按钮会打开“创建新项目”（`Create new project`）面板，如图 2-3 所示：


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig3_HTML.jpg](img/449652_2_En_2_Fig3_HTML.jpg)


    图 2-3


    创建新项目面板


    在这个例子中，我创建了一个名为“Book Code”的公共项目，使用 `Git Version Control` 和 `Agile Work item process`。项目创建后，会显示一个仪表板，如图
    2-4 所示：


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig4_HTML.jpg](img/449652_2_En_2_Fig4_HTML.jpg)


    图 2-4


    `Azure DevOps` 项目仪表板


    一旦 `Azure DevOps` 项目创建完毕，我们就可以配置并连接 `Visual Studio` 来使用这个新项目。'
- fmt: '## Configuring Visual Studio for Source Control


    打开 `Tools ➤ Options` 以配置 Visual Studio 源代码控制选项，如图 [2-5](#449652_2_En_2_Chapter.xhtml#Fig5)
    所示：

    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig5_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig5_HTML.jpg)

    图 2-5：打开 `Tools ➤ Options`


    当“选项”窗口显示时，展开“源代码管理”节点，然后选择“插件选择”。从“当前源代码管理插件”下拉列表中选择您的源代码管理插件，如图 [2-6](#449652_2_En_2_Chapter.xhtml#Fig6)
    所示：

    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig6_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig6_HTML.jpg)

    图 2-6：选择当前源代码管理插件


    如果您是 Git 新手，请访问 [`git-scm.com/doc`](https://git-scm.com/doc) 以了解更多信息。


    如果您像我一样使用 Git，请点击 `View ➤ Team Explorer`，如图 [2-7](#449652_2_En_2_Chapter.xhtml#Fig7)
    所示：

    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig7_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig7_HTML.jpg)

    图 2-7：打开 `Team Explorer`


    当 `Team Explorer` 显示时，点击“管理连接”链接，然后点击“连接到项目…”按钮，如图 [2-8](#449652_2_En_2_Chapter.xhtml#Fig8)
    所示：

    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig8_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig8_HTML.jpg)

    图 2-8：连接到 Azure DevOps 项目


    在此步骤中，您可能需要配置新的服务器和到团队项目的新连接。配置完成后，使用 `Team Explorer` 选择团队项目。我的团队项目名为“Book Code”，如图
    [2-9](#449652_2_En_2_Chapter.xhtml#Fig9) 所示：

    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig9_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig9_HTML.jpg)

    图 2-9：连接到名为 Book Code 的 Azure DevOps 项目


    点击 `Clone` 按钮，将 Azure DevOps 项目中的代码复制到对话框中列出的 `Path` 中。


    如果您是第一次连接到 Azure DevOps Git 仓库（或“repo”），您可能会惊讶地发现，此时 Book Code Git 仓库的目录几乎是空的，如图
    [2-10](#449652_2_En_2_Chapter.xhtml#Fig10) 所示：

    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig10_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig10_HTML.jpg)

    图 2-10：查看本地仓库内容


    如果您是第一次建立 Git 和 Visual Studio 之间的连接，`Team Explorer` 会提供一些有用的链接来安装第三方 Git 命令行工具。还有一个链接用于在此仓库中创建新项目或解决方案，如图
    [2-11](#449652_2_En_2_Chapter.xhtml#Fig11) 所示：

    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig11_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig11_HTML.jpg)

    图 2-11：`Team Explorer`


    请注意 `Team Explorer` 中的消息：“The repository was cloned successfully.” 下一条消息是：“Create
    a new project or solution in this repository.”


    ## Conclusion


    到此开发阶段，我们已经：


    *   创建并配置了一个 Azure DevOps 项目

    *   将 Visual Studio 连接到 Azure DevOps 项目

    *   在本地克隆了 Azure DevOps Git 仓库


    现在，Visual Studio 已配置并连接到新的 Git 仓库，并准备好创建一个新的 Visual Studio 项目。


    ## 3. Creating the Assembly Project


    如果您遵循了前一章并为您的项目设置了 Azure DevOps 或其他源代码控制，很好！如果没有，您可以稍后将我们在本节中构建的程序集添加到源代码控制中，*但是*，如果您计划使用
    Git，跳过上一章可能会让您后悔。


    创建一个自定义的 SSIS 任务始于创建一个 .Net 程序集。我们实践的方式与许多 .Net 开发项目不同，因为我们正在创建一个将在其他 Visual Studio
    项目（具体来说是 SSIS 项目）中使用的控件。


    在本章中，我们采取步骤为项目奠定基础，同时考虑后续步骤。第一步是如何打开 Visual Studio IDE。如果 Visual Studio 已打开，请在继续之前将其关闭。'
  raw: '## Configuring Visual Studio for Source Control


    Open Configure Visual Studio Source Control options by clicking Tools ➤ Options
    as shown in Figure [2-5](#449652_2_En_2_Chapter.xhtml#Fig5):


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig5_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Opening Tools ➤ Options


    When the Options window displays, expand the Source Control node, and select Plug-in
    Selection. Select your source control plug-in from the “Current source control
    plug-in” dropdown as shown in Figure [2-6](#449652_2_En_2_Chapter.xhtml#Fig6):


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig6_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Selecting current source control plug-in


    If you are new to Git, please visit [`git-scm.com/doc`](https://git-scm.com/doc)
    to learn more.


    If you are using Git like me, click View ➤ Team Explorer as shown in Figure [2-7](#449652_2_En_2_Chapter.xhtml#Fig7):


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig7_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig7_HTML.jpg)


    Figure 2-7


    Opening Team Explorer


    When Team Explorer displays, click the Manage Connections link and then click
    the “Connect to a Project…” button as shown in Figure [2-8](#449652_2_En_2_Chapter.xhtml#Fig8):


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig8_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Connecting to an Azure DevOps Project


    You may need to configure a new server and new connection to a Team Project during
    this step. Once configured, use Team Explorer to select the Team Project. My team
    project is named “Book Code,” as seen in Figure [2-9](#449652_2_En_2_Chapter.xhtml#Fig9):


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig9_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Connecting to an Azure DevOps Project named Book Code


    Click the Clone button to copy the code in the Azure DevOps project into the Path
    listed in the dialog.


    If this is your very first time connecting to an Azure DevOps Git repository (or
    “repo”), you may be surprised to find the directory for the Book Code Git repo
    almost empty at this time, as shown in Figure [2-10](#449652_2_En_2_Chapter.xhtml#Fig10):


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig10_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Viewing local repo contents


    If this is your first time establishing a connection between Git and Visual Studio,
    Team Explorer offers some helpful links for installing third-party Git command
    prompt tools. There’s also a link to create a new project or solution in this
    repository, as shown in Figure [2-11](#449652_2_En_2_Chapter.xhtml#Fig11):


    ![../images/449652_2_En_2_Chapter/449652_2_En_2_Fig11_HTML.jpg](images/449652_2_En_2_Chapter/449652_2_En_2_Fig11_HTML.jpg)


    Figure 2-11


    Team Explorer


    Note the message in Team Explorer: “The repository was cloned successfully.” The
    next message reads, “Create a new project or solution in this repository.”


    ## Conclusion


    At this point in development, we have


    *   Created and configured an Azure DevOps project


    *   Connected Visual Studio to the Azure DevOps project


    *   Cloned the Azure DevOps Git repo locally


    Visual Studio is now configured and connected to the new Git repo and ready for
    a new Visual Studio project.


    # 3. Creating the Assembly Project


    If you followed the previous chapter and set up Azure DevOps or some other source
    control for your project, good! If not, you may add the assembly we build in this
    section to source control later, *but* if you plan to use Git, you may regret
    skipping the previous chapter.


    Creating a custom SSIS task begins with creating a .Net assembly. We engage in
    practices that differ from many .Net development projects because we are creating
    a control that will be used in other Visual Studio projects, specifically, SSIS
    projects.


    In this chapter, we take steps to establish the foundation of our project while
    considering the following steps. The very first step is how we open the Visual
    Studio IDE. If Visual Studio is open, please close it before continuing.'
