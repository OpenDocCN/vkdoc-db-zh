  trans: '## 配置 TestSSISProject


    使用 SSMS 连接到托管你的 Azure-SSIS 集成运行时的 SSIS 目录的 Azure SQL 数据库实例。要打开“配置”对话框，请右键单击 `TestSSISProject`，然后单击“配置”，如图
    25-12 所示：


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig12_HTML.jpg](img/449652_2_En_25_Fig12_HTML.jpg)


    图 25-12


    打开 `TestSSISProject` 配置对话框


    将打开“配置 – `TestSSISProject`”对话框。在“参数”选项卡上，单击 `RunForSomeTime.dtsx` 容器中 `DelayString`
    参数的省略号，如图 25-13 所示：


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig13_HTML.jpg](img/449652_2_En_25_Fig13_HTML.jpg)


    图 25-13


    配置 – `TestSSISProject` 对话框


    当 `"[RunForSomeTime.dtsx].[DelayString]"` 参数的“设置参数值”窗口打开时，选择“编辑值”选项，在相应的文本框中输入“00:00:35”（这将添加一个配置字面值），然后单击“确定”按钮，如图
    25-14 所示：


    ![../images/449652_2_En_25_Chapter/449652_2_En_25_Fig14_HTML.jpg](img/449652_2_En_25_Fig14_HTML.jpg)


