- fmt: '## Refactoring the Execute Method


    Returning to the `ExecuteCatalogPackageTask.Execute` method, the code is getting…
    busy. It’s time for more refactoring. Begin by migrating the `ManualResetEvent`
    declaration and initialization code in Listing 19-4 to a new helper function named
    `executeSynchronous` using the code in Listing 19-14:


    ```csharp

    private Operation.ServerOperationStatus executeSynchronous(long executionId

    , SqlConnection connection)

    {

    Operation.ServerOperationStatus ret = Operation.ServerOperationStatus.UnexpectTerminated;

    ManualResetEvent manualResetState = new ManualResetEvent(false);

    return ret;

    }

    ```


    *Listing 19-14*

    Coding the `executeSynchronous` helper function in the `ExecuteCatalogPackageTask`


    Once added, the `ExecuteCatalogPackageTask.executeSynchronous` helper function
    appears as shown in Figure 19-32:


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig32_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig32_HTML.jpg)


    *Figure 19-32*

    The `ExecuteCatalogPackageTask.executeSynchronous` helper function


    The code in the `ExecuteCatalogPackageTask.executeSynchronous` helper function
    begins with the declaration and initialization of an `Operation.ServerOperationStatus`
    type variable named `ret`, which is initialized to the `Operation.ServerOperationStatus.UnexpectTerminated`
    value. A `ManualResetEvent` type variable named `manualResetState` is declared
    and initialized as a new `ManualResetEvent` set to `false`.


    The `ExecuteCatalogPackageTask.executeSynchronous` helper function is declared
    to return an `Operation.ServerOperationStatus` type value, and the `ret` variable
    is returned to satisfy the declaration.


    Build out the `ExecuteCatalogPackageTask.executeSynchronous` helper function,
    adding the code in Listing 19-15 after the `ManualResetEvent` declaration and
    before the `return ret;` statement:


    ```csharp

    int maximumRetries = 20;

    int retryIntervalSeconds = 10;

    int operationTimeoutMinutes = 10;

    CheckWaitState statusChecker = new CheckWaitState(executionId

    , maximumRetries

    , connection

    , PackageCatalogName

    , this);

    TimeSpan dueTime = new TimeSpan(0, 0, 0);

    TimeSpan period = new TimeSpan(0, 0, retryIntervalSeconds);

    object timerState = new TimerCheckerState(manualResetState);

    TimerCallback timerCallback = statusChecker.CheckStatus;

    Timer timer = new Timer(timerCallback, timerState, dueTime, period);

    WaitHandle[] manualResetStateWaitHandleCollection = new WaitHandle[]

    { manualResetState };

    int timeoutMillseconds = (int)new TimeSpan(0, operationTimeoutMinutes

    , 0).TotalMilliseconds;

    bool exitContext = false;

    // wait here, please

    WaitHandle.WaitAny(manualResetStateWaitHandleCollection

    , timeoutMillseconds

    , exitContext);

    ret = statusChecker.OperationStatus;

    manualResetState.Dispose();

    timer.Dispose();

    ```


    *Listing 19-15*

    Completing `ExecuteCatalogPackageTask.executeSynchronous`


    Once added, the `ExecuteCatalogPackageTask.executeSynchronous` helper function
    appears as shown in Figure 19-33:


    ![../images/449652_2_En_19_Chapter/449652_2_En_19_Fig33_HTML.jpg](images/449652_2_En_19_Chapter/449652_2_En_19_Fig33_HTML.jpg)


    *Figure 19-33*

    The `ExecuteCatalogPackageTask.executeSynchronous` helper function, code complete


    Implementing this `WaitHandle.WaitAny`-based solution requires a `ManualResetEvent`
    to check the status of the executing package. Each time the `Timer` ticks (configured
    on line 469), the `Timer` calls the method named `CheckStatus` in the `CheckWaitState`
    class (see Listing 19-13 and Figure 19-31) – configured as the `TimerCallback`
    type variable named `timerCallback` on line 468 – that checks the status of the
    SSIS package execution. `Timer` ticks are configured to also pass three additional
    variables:


    *   `timerState`: A `TimerCheckerState` variable initialized with the `manualResetState`
    (`ManualResetEvent` type) variable on line 467

    *   `dueTime`: A `TimeSpan` variable initialized to “right now” (`TimeSpan(0,
    0, 0);`) on line 464

    *   `period`: A `TimeSpan` variable initialized on line 465 to the number of seconds
    in the `retryIntervalSeconds` int variable (initialized as 10 seconds on line
    456)


    A `WaitHandle` collection named `manualResetStateWaitHandleCollection` is declared
    and initialized to the collection of `WaitHandle`s in `manualResetState` variable
    on lines 471–472. An `int` type variable named `timeoutMilliseconds` is declared
    and initialized to the number of milliseconds in the `operationTimeoutMinutes`
    int type variable (declared and initialized on line 457) – on line 473. A `bool`
    type variable named `exitContext` is declared and initialized to `false` on line
    474.


    On lines 477–479, `WaitHandle.WaitAny` is called passing the value of the `manualResetStateWaitHandleCollection`,
    `timeoutMilliseconds`, and `exitContext` variables. It is here that the package
    execution thread starts *waiting* (blocking) any additional calls to the `ExecuteCatalogPackageTask.executeSynchronous`
    helper function.


    In *synchronous* execution, the `CheckWaitState.CheckStatus` method is called
    with each timer tick until the `ManualResetEvent` variable named `manualResetState`
    is manually reset. The manual reset occurs when one of two conditions is met:


    1.  The `operationStatus` variable in the `CheckWaitState.CheckStatus` method
    indicates a “finished” state for the SSIS package execution.

    2.  The number of retries (captured by the `invokeCount` variable in the `CheckWaitState.CheckStatus`
    method) reaches the `maximumRetries` variable value.


    The first case occurs when the `CheckWaitState.CheckStatus` method indicates the
    number of retries (`invokeCount`) has *not* reached the `maximumRetries` variable
    value, and a call to the `CheckWaitState.returnOperationStatus` method returns
    the SSIS package execution `OperationStatus` of a “finished” state. The SSIS package
    execution `OperationStatus` is evaluated by the `CheckWaitState.checkOperationStatus`
    method. If the SSIS package execution `OperationStatus` is found to be in a “finished”
    state, execution is halted by setting the `CheckWaitState.manualResetState` variable
    value to true.


    The second case occurs when the `CheckWaitState.CheckStatus` method indicates
    the number of retries (`invokeCount`) *has* reached the `maximumRetries` variable
    value.


    In *asynchronous* SSIS package execution, there is no call to the `CheckWaitState.CheckStatus`
    method. The `ExecuteCatalogPackageTask.evaluateStatus` method – which we build
    next – supports both synchronous and asynchronous SSIS package executions.


    The next step is to check the `operationStatus` variable in the `CheckWaitState.CheckStatus`
    method for a “finished” state by refactoring SSIS package execution, using the
    code in Listing 19-16 to build the `evaluateStatus` helper method:'
