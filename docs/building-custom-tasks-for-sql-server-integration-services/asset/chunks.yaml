    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig30_HTML.jpg](img/449652_2_En_13_Fig30_HTML.jpg)


    图 13-30 Connections 属性


    我们希望仅使用 ADO.Net 连接来连接到 SSIS 目录。为了获取 SSIS 包中包含的 ADO.Net 连接管理器列表，请将清单 13-19 中的代码添加到`SettingsNode`构造函数中：


    ```

    _connections = ((IDtsConnectionService)connections).GetConnectionsOfType("ADO.Net");

    清单 13-19

    获取 ADO.Net 连接管理器列表

    ```


    将代码添加到项目后，其外观如图 13-31 所示：


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig31_HTML.jpg](img/449652_2_En_13_Fig31_HTML.jpg)


    图 13-31 将 ADO.Net 连接管理器列表添加到 `_connections`


    现在，我们已将一个 ADO.Net 连接管理器列表存储在`_connections`对象中，这是一个名为`Connections`的、隐藏的（非`Browsable`）、内部的`SettingsNode`属性（成员）。


    下一步是构建一个`TypeConverter`，用于生成 ADO.Net 连接管理器名称的列表。


    ### 构建 ADONetConnections TypeConverter


    根据微软的`TypeConverter`类文档（docs.microsoft.com/en-us/dotnet/api/system.componentmodel.typeconverter?view=netframework-4.7.2），`TypeConverter`“提供了一种统一的方式来将值类型转换为其他类型，以及访问标准值和子属性。”`TypeConverter`用于从集合中创建对象的枚举或列表。应用到`ExecuteCatalogPackageTaskComplexUI`中的
    ADO.Net 连接管理器列表，我们将构建一个字符串值的`ArrayList`，其中包含存储在`Connections`（`object`类型）集合中的 ADO.Net
    连接管理器的名称。


    首先，使用清单 13-20 中的代码，在`SettingsView.cs`文件中添加一个名为`ADONetConnections`的新类：


    ```

    internal class ADONetConnections : StringConverter { }

    清单 13-20

    添加 ADONetConnections 类

    ```


    添加后，代码将如图 13-32 所示：


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig32_HTML.jpg](img/449652_2_En_13_Fig32_HTML.jpg)


    图 13-32 新的 `ADONetConnections` `StringConverter` 类


    `StringConverter`是`TypeConverter`的一个接口实现。


    使用清单 13-21 中的代码，向`ADONetConnections`类声明并初始化一个名为`NEW_CONNECTION`的`常量字符串`成员：


    ```

    private const string NEW_CONNECTION = "";

    清单 13-21

    向 ADONetConnections 添加 NEW_CONNECTION

    ```


    声明新成员后，`ADONetConnections`应如图 13-33 所示：


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig33_HTML.jpg](img/449652_2_En_13_Fig33_HTML.jpg)


    图 13-33 声明 `ADONetConnections.NEW_CONNECTION`


    `TypeConverter`遵循一个通用模式，包含一个对象和三个可重写的方法：


    *   `GetSpecializedObject` (`object`)

    *   `GetStandardValues` (`StandardValuesCollection`)

    *   `GetStandardValuesExclusive` (`bool`)

    *   `GetStandardValuesSupported` (`bool`)


    通过将清单 13-22 中的代码添加到`ADONetConnections`类来实现这些方法：


    ```

    private object GetSpecializedObject(object contextInstance)

    {

    DTSLocalizableTypeDescriptor typeDescr = contextInstance as DTSLocalizableTypeDescriptor;

    if (typeDescr == null)

    {

    return contextInstance;

    }

    return typeDescr.SelectedObject;

    }

    public override StandardValuesCollection GetStandardValues(ITypeDescriptorContext
    context)

    {

    object retrievalObject = GetSpecializedObject(context.Instance) as object;

    return new StandardValuesCollection(getADONetConnections(retrievalObject));

    }

    public override bool GetStandardValuesExclusive(ITypeDescriptorContext context)

    {

    return true;

    }

    public override bool GetStandardValuesSupported(ITypeDescriptorContext context)

    {

    return true;

    }

    清单 13-22

    向 ADONetConnections 添加 TypeConverter 方法

    ```


    添加后，代码如图 13-34 所示：


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig34_HTML.jpg](img/449652_2_En_13_Fig34_HTML.jpg)


    图 13-34 添加 `ADONetConnections` 方法


    对`TypeConverter`方法的讨论是一个深入的话题，作者选择不在此示例中包含。在`ADONetConnections StringConverter`中实现的`TypeConverter`的结果将是一个`ArrayList`，其中包含
    SSIS 包中配置的 ADO.Net 连接管理器的名称，外加一个创建新 ADO.Net 连接管理器的选项。


    `ADONetConnections StringConverter`的`GetStandardValues`方法调用`getADONetConnections`，该方法使用清单
    13-23 中的代码构建并返回`ArrayList`：


    ```

    private ArrayList getADONetConnections(object retrievalObject)

    {

    SettingsNode node = (SettingsNode)retrievalObject;

    ArrayList list = new ArrayList();

    ArrayList listConnections = new ArrayList();

    listConnections = (ArrayList)node.Connections;

    // adds the new connection item

    list.Add(NEW_CONNECTION);

    // adds each ADO.Net connection manager

    foreach (ConnectionManager cm in listConnections)

    {

    list.Add(cm.Name);

    }

    // sorts the connection manager list

    if ((list != null) && (list.Count > 0))

    {

    list.Sort();

    }

    return list;

    }

    清单 13-23

    getADONetConnections

    ```


    通过将指令`using System.Collections;`添加到`SettingsView.cs`文件，可以清除`ArrayList`类型错误。


    添加后，代码将如图 13-35 所示：


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig35_HTML.jpg](img/449652_2_En_13_Fig35_HTML.jpg)


    图 13-35 `getADONetConnections` 已添加


    下面简要描述`getADONetConnections`中的代码。一个`settingsNode`实例通过`retrievalObject`(`object`)参数传递给`getADONetConnections`方法。声明并初始化了一个新的内部`SettingsNode`变量`node`和两个`ArrayList`变量——`list`和`listConnections`。`listConnections`被赋值为`SettingsNode`变量(`node`)的`Connections`对象。`NEW_CONNECTION`被添加到`list`(`ArrayList`)中。


    一个`foreach`循环枚举`listConnections`中的每个连接，并将每个连接管理器的名称添加到`list ArrayList`中。请记住，根据`SettingsNode`构造函数，`Connections`仅包含
    ADO.Net 连接管理器。


    如果`list ArrayList`包含值，代码会对`list ArrayList`中包含的值进行排序。


    最后，`list ArrayList`被返回给调用者。'
- fmt: '# SourceConnection 属性的实现与应用


    ## 暴露 SourceConnection 属性


    此前在“为连接相关成员编码 SettingsNode”章节中的所有工作，都是为了最终能够将 `SourceConnection` 属性添加到 `SettingsView`
    中。


    要暴露 `SourceConnection` 属性，请将代码清单 13-24 添加到 `SettingsNode` 类中：


    ```

    [

    Category("Connections"),

    Description("The SSIS Catalog connection"),

    TypeConverter(typeof(ADONetConnections))

    ]

    public string SourceConnection {

    get { return _task.ConnectionManagerName; }

    set { _task.ConnectionManagerName = value; }

    }

    ```

    *代码清单 13-24 添加 SourceConnection 属性*


    添加后，代码如图 13-36 所示：


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig36_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig36_HTML.jpg)

    *图 13-36 已向 SettingsNode 添加 SourceConnection 成员*


    ## 测试 SourceConnection 属性


    生成解决方案。如果一切顺利，解决方案应成功生成。打开一个测试 SSIS 项目，将“执行目录包任务”添加到测试 SSIS 包的控制流中。打开编辑器并单击“设置”选项卡。`SourceConnection`
    属性将出现在“连接”类别中，并包含 SSIS 包中 ADO.Net 连接管理器名称的列表，以及创建新连接的选项，如图 13-37 所示：


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig37_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig37_HTML.jpg)

    *图 13-37 SourceConnection 属性可见且已填充*


    `SourceConnection` 显示为下拉列表，是因为 `SettingsNode SourceConnection` 属性装饰包含了 `TypeConverter`
    特性，告知 `SettingsView` 的 PropertyGrid，`SourceConnection` 属性中的值属于 `ADONetConnections`
    类型。`ADONetConnections` 类型是一个 `StringConverter`，其中包含一个 `ArrayList` 字符串列表，而 `ArrayList`
    中的字符串列表就是 SSIS 包的 `connections` 集合中所有 ADO.Net 连接管理器的名称。


    开发至此真是**太棒了**：我们已经成功暴露了 `SourceConnection` 属性！这是个好消息。坏消息是，`SourceConnection` 属性目前还**没有任何作用**。不过，我们已经**非常接近**了。


    下一步是添加代码，使“执行目录包任务”能够使用 `SourceConnection` 属性。


    现在是个绝佳的时机来签入你的代码。


    ## 使用 SourceConnection 属性


    通过将代码清单 13-25 添加到 `SettingsView OnCommit` 方法，更新该方法，将 `SettingsNode SourceConnection`
    成员的值发送给 `ExecuteCatalogPackageTask` 的 `ConnectionManagerName` 属性：


    ```

    theTask.ConnectionManagerName = settingsNode.SourceConnection;

    ```

    *代码清单 13-25 为 ExecuteCatalogPackageTask 的 ConnectionManagerName 属性赋值*


    添加后，`OnCommit` 方法如图 13-38 所示：


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig38_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig38_HTML.jpg)

    *图 13-38 ConnectionManagerName 属性已赋值*


    `OnCommit` 方法在视图提交时触发。对于当前开发阶段的 `SettingsView` 来说，由 `settingsNode` 管理的 `SourceConnection`、`FolderName`、`ProjectName`
    和 `PackageName` 属性，将分别设置 `ExecuteCatalogPackageTask` 的 `ConnectionManagerName`、`PackageFolder`、`PackageProject`
    和 `PackageName` 属性的值。


    ## 从 SourceConnection 提取 ServerName


    `SourceConnection` 包含一个 SSIS 包连接管理器（一个 ADO.Net 连接管理器）的名称。我们可以使用代码清单 13-26 中的 `returnSelectedConnectionManagerDataSourceValue`
    函数代码，从连接管理器的连接字符串中提取其中包含的 SQL Server 实例名称：


    ```

    private string returnSelectedConnectionManagerDataSourceValue(string connectionManagerName,
    string connectionString = "")

    {

    string ret = String.Empty;

    ArrayList listConnections = (ArrayList)settingsNode.Connections;

    string connString = String.Empty;

    // match the selected ADO.Net connection manager

    if (listConnections.Count > 0)

    {

    foreach (ConnectionManager cm in listConnections)

    {

    if (cm.Name == connectionManagerName)

    {

    connString = cm.ConnectionString;

    }

    }

    }

    else

    {

    connString = connectionString;

    }

    // parse if a match is found

    if (connString!= String.Empty)

    {

    string dataSourceStartText = "Data Source=";

    string dataSourceEndText = ";";

    int dataSourceTagStart = connString.IndexOf(dataSourceStartText) + dataSourceStartText.Length;

    int dataSourceTagEnd = 0;

    int dataSourceTagLength = 0;

    if (dataSourceTagStart > 0)

    {

    dataSourceTagEnd = connString.IndexOf(dataSourceEndText, dataSourceTagStart);

    if (dataSourceTagEnd > dataSourceTagStart)

    {

    dataSourceTagLength = dataSourceTagEnd - dataSourceTagStart;

    ret = connString.Substring(dataSourceTagStart, dataSourceTagLength);

    }

    }

    }

    return ret;

    }

    ```

    *代码清单 13-26 returnSelectedConnectionManagerDataSourceValue 函数*


    添加到 `SettingsView.cs` 文件后，代码如图 13-39 所示：


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig39_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig39_HTML.jpg)

    *图 13-39 returnSelectedConnectionManagerDataSourceValue 函数*


    还有其他方法可以从连接字符串中提取数据源属性值。你可以在代码中实现更好的方式。


    通过将代码清单 13-27 添加到 `SettingsView OnCommit` 方法，更新该方法，将 `SettingsNode SourceConnection
    ConnectionString` 的数据源属性值中包含的服务器名称值发送给 `ExecuteCatalogPackageTask` 的 `ServerName`
    属性：


    ```

    theTask.ServerName = returnSelectedConnectionManagerDataSourceValue(settingsNode.SourceConnection);

    ```

    *代码清单 13-27 为 ExecuteCatalogPackageTask 的 ServerName 属性赋值*


    添加后，`OnCommit` 方法如图 13-40 所示：


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig40_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig40_HTML.jpg)

    *图 13-40 ServerName 属性已赋值*


    最后，编辑 `SettingsView.propertyGridSettings_PropertyValueChanged` 方法，使得对 `SourceConnection`
    属性的更改**也**触发对 `returnSelectedConnectionManagerDataSourceValue` 函数的调用——需要在两个地方进行修改（第一处，在“新建连接”功能内部，在赋值
    `SettingsNode.SourceConnection` 之后；第二处，为 `if (e.ChangedItem.Value.Equals(NEW_CONNECTION))`
    添加一个 `else` 块，并在那里放置一个调用）——使用代码清单 13-28 中的代码。'
  raw: '### Surface the SourceConnection Property


    The work in this section titled “Coding SettingsNode for Connection-Related Members”
    has all led to this point where we are (finally) able to add the SourceConnection
    property to `SettingsView`.


    To surface the SourceConnection property, add the code in Listing [13-24](#449652_2_En_13_Chapter.xhtml#PC24)
    to the `SettingsNode` class:


    ```

    [

    Category("Connections"),

    Description("The SSIS Catalog connection"),

    TypeConverter(typeof(ADONetConnections))

    ]

    public string SourceConnection {

    get { return _task.ConnectionManagerName; }

    set { _task.ConnectionManagerName = value; }

    }

    Listing 13-24

    Adding the SourceConnection property

    ```


    When added the code appears as shown in Figure [13-36](#449652_2_En_13_Chapter.xhtml#Fig36):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig36_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig36_HTML.jpg)


    Figure 13-36


    SourceConnection member added to SettingsNode


    ### Testing the SourceConnection Property


    Build the solution. If all goes well, the solution should build successfully.
    Open a test SSIS project and add the Execute Catalog Package Task to the control
    flow of a test SSIS package. Open the editor and click on the Settings page. The
    SourceConnection property appears in the Connections category and contains a list
    of the names of ADO.Net connection managers in the SSIS packages – plus the option
    to create a new connection – as shown in Figure [13-37](#449652_2_En_13_Chapter.xhtml#Fig37):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig37_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig37_HTML.jpg)


    Figure 13-37


    The SourceConnection property is visible and populated


    SourceConnection surfaces a dropdown list because the `SettingsNode SourceConnection`
    property decoration includes the `TypeConverter` attribute, informing the SettingsView
    PropertyGrid that the values in the `SourceConnection` property are of the `ADONetConnections`
    type. The `ADONetConnections` type is a `StringConverter` that contains an `ArrayList`
    of strings, and the list of strings the `ArrayList` contains is the names of all
    ADO.Net connection managers in the `connections` collection of the SSIS package.


    Reaching this point in development is *awesome*: We’ve surfaced the `SourceConnection`
    property! That’s the good news. The bad news is the `SourceConnection` property
    doesn’t do anything – yet. We are *almost* there, though.


    The next step is to add code so the Execute Catalog Package Task uses the `SourceConnection`
    property.


    Now would be an excellent time to check in your code.


    ## Using the SourceConnection Property


    Update the `SettingsView OnCommit` method to send the `SettingsNode SourceConnection`
    member value to the `ExecuteCatalogPackageTask`’s `ConnectionManagerName` property
    by adding the code in Listing [13-25](#449652_2_En_13_Chapter.xhtml#PC25) to the
    `SettingsView OnCommit` method:


    ```

    theTask.ConnectionManagerName = settingsNode.SourceConnection;

    Listing 13-25

    Assigning the ExecuteCatalogPackageTask’s ConnectionManagerName property

    ```


    Once added, the OnCommit method appears as shown in Figure [13-38](#449652_2_En_13_Chapter.xhtml#Fig38):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig38_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig38_HTML.jpg)


    Figure 13-38


    ConnectionManagerName property, assigned


    The `OnCommit` method fires when the view commits. In the case of the `SettingsView` –
    at this point during development – the `SourceConnection`, `FolderName`, `ProjectName`,
    and `PackageName` properties managed by the `settingsNode` will set the values
    of the `ExecuteCatalogPackageTask`’s `ConnectionManagerName`, `PackageFolder`,
    `PackageProject`, and `PackageName` properties, respectively.


    ### Extracting the ServerName from the SourceConnection


    SourceConnection contains the name of an SSIS package connection manager (an ADO.Net
    connection manager). We may extract the name of the SQL Server instance contained
    in the connection manager’s connection string using the returnSelectedConnectionManagerDataSourceValue
    function code in Listing [13-26](#449652_2_En_13_Chapter.xhtml#PC26):


    ```

    private string returnSelectedConnectionManagerDataSourceValue(string connectionManagerName,
    string connectionString = "")

    {

    string ret = String.Empty;

    ArrayList listConnections = (ArrayList)settingsNode.Connections;

    string connString = String.Empty;

    // match the selected ADO.Net connection manager

    if (listConnections.Count > 0)

    {

    foreach (ConnectionManager cm in listConnections)

    {

    if (cm.Name == connectionManagerName)

    {

    connString = cm.ConnectionString;

    }

    }

    }

    else

    {

    connString = connectionString;

    }

    // parse if a match is found

    if (connString!= String.Empty)

    {

    string dataSourceStartText = "Data Source=";

    string dataSourceEndText = ";";

    int dataSourceTagStart = connString.IndexOf(dataSourceStartText) + dataSourceStartText.Length;

    int dataSourceTagEnd = 0;

    int dataSourceTagLength = 0;

    if (dataSourceTagStart > 0)

    {

    dataSourceTagEnd = connString.IndexOf(dataSourceEndText, dataSourceTagStart);

    if (dataSourceTagEnd > dataSourceTagStart)

    {

    dataSourceTagLength = dataSourceTagEnd - dataSourceTagStart;

    ret = connString.Substring(dataSourceTagStart, dataSourceTagLength);

    }

    }

    }

    return ret;

    }

    Listing 13-26

    The returnSelectedConnectionManagerDataSourceValue function

    ```


    When added to the SettingsView.cs file, the code appears as shown in Figure [13-39](#449652_2_En_13_Chapter.xhtml#Fig39):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig39_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig39_HTML.jpg)


    Figure 13-39


    The returnSelectedConnectionManagerDataSourceValue function


    There are other ways to extract the Data Source attribute value from a connection
    string. Feel free to implement a better way in your code.


    Update the `SettingsView OnCommit` method to send the value of the server name
    contained in the `SettingsNode SourceConnection ConnectionString`’s Data Source
    attribute value to the `ExecuteCatalogPackageTask`’s `ServerName` property by
    adding the code in Listing [13-27](#449652_2_En_13_Chapter.xhtml#PC27) to the
    `SettingsView OnCommit` method :


    ```

    theTask.ServerName = returnSelectedConnectionManagerDataSourceValue(settingsNode.SourceConnection);

    Listing 13-27

    Assigning the ExecuteCatalogPackageTask’s ServerName property

    ```


    Once added, the OnCommit method appears as shown in Figure [13-40](#449652_2_En_13_Chapter.xhtml#Fig40):


    ![../images/449652_2_En_13_Chapter/449652_2_En_13_Fig40_HTML.jpg](images/449652_2_En_13_Chapter/449652_2_En_13_Fig40_HTML.jpg)


    Figure 13-40


    ServerName property, assigned


