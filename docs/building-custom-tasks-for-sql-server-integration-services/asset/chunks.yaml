    Property Description。本例中 Property Category 设置为 `General`；Property Description
    设置为 `Specifies the name of the task`。Property Name 源自视图成员的名称——本例中为 `Name`。


    第 122 行包含一个 `get` 语句，该语句从 `taskHost.Name` 属性（或 `taskHost` 的 `Name` 属性）返回 `Name`
    属性的值。虽然该语句相对简短，但有几个活动部分。`GeneralNode taskHost` 成员指向回 `ExecuteCatalogPackageTask`
