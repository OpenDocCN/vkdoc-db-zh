  \ `system_health` 会话，其中包括死锁。如果你没有准备好捕获此类信息，这是一个很好的资源。但请记住，它只在线保留四个 5MB 的文件。当这些文件写满时，最旧文件中的数据就会丢失。根据你系统中的事务数量以及可能填满这些文件的死锁或其他事件数量，你可能只有最近的数据可用。此外，如前所述，由于\
  \ `system_health` 会话使用环形缓冲区来捕获事件，你可以预期会丢失一些事件，因此你的死锁事件可能会丢失。\n\n此示例展示了一个经典的循环引用。虽然不是立即显而易见，但死锁是由\
  \ `Purchasing.PurchaseOrderDetail` 表上的触发器引起的。当更新 `Purchasing.PurchaseOrderDetail`\
  \ 表上的 `Quantity` 时，它会尝试更新 `Purchasing.PurchaseOrderHeader` 表。当运行前两个查询（每个都在一个打开的事务中）时，这只是一个阻塞情况。第二个查询正在等待第一个查询完成，以便它也可以更新\
  \ `Purchasing.PurchaseOrderHeader` 表。但当引入第三个查询（即第一个事务中的第二个查询）时，就创建了一个循环引用。解决它的唯一方法是终止其中一个进程。\n\
  \n在继续之前，请务必回滚任何打开的事务。\n\n现阶段一个显而易见的问题是：你能避免这个死锁吗？如果答案是“能”，那么如何避免？\n\n## 避免死锁\n\n\
  避免死锁场景的方法取决于死锁的性质。以下是一些可用于避免死锁的技术：\n\n*   以相同的物理顺序访问资源。\n\n*   减少访问的资源数量。\n\n* \
  \  最小化锁争用。\n\n*   优化查询。\n\n### 以相同的物理顺序访问资源\n\n避免死锁最常用的技术之一是确保每个事务都以相同的物理顺序访问资源。例如，假设两个事务需要访问两个资源。如果每个事务都以相同的物理顺序访问资源，那么第一个事务将成功获取资源上的锁，而不会被第二个事务阻塞。第二个事务在尝试获取第一个资源上的锁时将被第一个事务阻塞。这将导致典型的阻塞场景，而不会导致循环阻塞和死锁。\n\
  \n如果资源没有以相同的物理顺序访问（如前面的死锁分析示例所示），这可能导致两个事务之间的循环阻塞。\n\n*   事务 1:\n    *   访问资源 1\n\
  \n    *   访问资源 2\n\n*   事务 2:\n    *   访问资源 2\n\n    *   访问资源 1\n\n在当前的死锁场景中，涉及以下资源：\n\
  \n*   资源 1, `hobtid=72057594046578688`：这是 `Purchasing.PurchaseOrderDetail` 表上索引\
  \ `PK_PurchaseOrderDetail_PurchaseOrderId_PurchaseOrderDetailId` 中的一个索引行。\n\n* \
  \  资源 2, `hobtid=72057594046644224`：这是 `Purchasing.PurchaseOrderHeader` 表上聚集索引 `PK_PurchaseOrderHeader_PurchaseOrderId`\
  \ 中的一个行。\n\n两个会话都试图访问该资源；不幸的是，它们访问键的顺序不同。\n\n使用诸如 `nHibernate` 和 `Entity Framework`\
  \ 等工具生成的代码时，常见到对象在不同查询中以不同顺序被引用。你必须与你的开发团队合作，在生成的代码中消除此类问题。\n\n### 减少访问的资源数量\n\n\
  死锁至少涉及两个资源。一个会话持有第一个资源，然后请求第二个资源。另一个会话持有第二个资源并请求第一个资源。如果你能阻止会话（或至少其中一个）访问参与死锁的其中一个资源，那么你就可以阻止死锁。你可以通过重新设计应用程序来实现这一点，但在项目后期这是开发人员强烈抵制的解决方案。不过，你可以在不改变应用程序设计的情况下考虑使用\
  \ SQL Server 的以下功能：\n\n*   将非聚集索引转换为聚集索引。\n\n*   为 `SELECT` 语句使用覆盖索引。\n\n#### 将非聚集索引转换为聚集索引\n\
  \n如你所知，非聚集索引的叶级页与堆或聚集索引的数据页是分开的。因此，非聚集索引需要两个锁：一个用于基表（堆或聚集索引），另一个用于非聚集索引本身。然而，在聚集索引的情况下，索引的叶级页与表的数据页是相同的；它只需要一个锁，并且这一个锁同时保护聚集索引和表，因为叶级页和数据页是相同的。与使用非聚集索引相比，这减少了同一查询需要访问的资源数量。但这完全取决于这是否是一个合适的聚集索引。聚集索引本身并没有什么神奇之处，并非将其应用于任何列都会有所帮助。你仍然需要评估它是否合适。\n\
  \n#### 为 SELECT 语句使用覆盖索引\n\n你也可以使用覆盖索引来减少 `SELECT` 语句访问的资源数量。由于 `SELECT` 语句可以直接从覆盖索引本身获取所有内容，因此它不需要访问基表。否则，`SELECT`\
  \ 语句需要同时访问索引和基表才能检索所有需要的列值。使用覆盖索引可以阻止 `SELECT` 语句访问基表，使得基表可以自由地被另一个会话锁定。\n\n###\
  \ 最小化锁争用\n\n你也可以通过避免对其中一个争用资源的锁请求来解决死锁。当资源仅用于读取数据时，可以这样做。修改资源总是会在资源上获取排他锁以维护资源的一致性；因此，在死锁情况下，识别那些只读访问的资源，并尽可能使用脏读功能来避免它们相应的锁请求。你可以使用以下技术来避免对争用资源的锁请求：\n\
  \n*   实现行版本控制。\n\n*   降低隔离级别。\n\n*   使用锁提示。\n\n\n\n### 实现行版本控制\n\n与其尝试使用更严格的锁定方案来防止对资源的访问，不如通过\
  \ `READ_COMMITTED_SNAPSHOT` 隔离级别或 `SNAPSHOT` 隔离级别来实现行版本控制。行版本控制隔离级别用于减少阻塞，如第 21\
  \ 章所述。由于它们减少了阻塞（这是死锁的根本原因），因此也有助于解决死锁问题。通过以下 T-SQL 引入 `READ_COMMITTED_SNAPSHOT`，可以在\
  \ `tempdb` 中提供行的版本，从而可能消除前述死锁场景中由锁引起的争用：\n\n```sql\nALTER DATABASE AdventureWorks2017\n\
  SET READ_COMMITTED_SNAPSHOT ON;\n```\n\n这将允许任何必要的读取操作而不会引起锁争用，因为读取的是数据的不同版本。行版本控制存在开销，特别是在\
  \ `tempdb` 中，以及当需要从多个资源（而不仅仅是查询中使用的表或索引）封送数据时。但是，与减少死锁和增加并发性所带来的好处相比，增加的 `tempdb`\
  \ 开销这种权衡可能是值得的。\n\n### 降低隔离级别\n\n有时，`SELECT` 语句请求的共享（S）锁会导致形成循环阻塞。你可以通过将包含 `SELECT`\
  \ 语句的事务的隔离级别降低为 `READ COMMITTED SNAPSHOT` 来避免这种类型的循环阻塞。这将允许 `SELECT` 语句在不请求（S）锁的情况下读取数据，从而避免循环阻塞。你可能还会在游标周围看到这类问题，因为它们往往具有悲观并发性。\n\
  \n另外，请检查连接是否将自己设置为 `SERIALIZABLE`。有时，在线连接字符串生成器会包含此选项，开发人员可能会在完全不知情的情况下使用它。`MSDTC`\
  \ 默认使用可序列化级别，但可以更改。\n\n### 使用锁定提示\n\n我绝对不推荐这种方法。但是，你可以使用以下锁定提示来解决前面技术中呈现的死锁：\n\n\
  *   `NOLOCK`\n*   `READUNCOMMITTED`\n\n与 `READ UNCOMMITTED` 隔离级别类似，`NOLOCK` 或 `READUNCOMMITTED`\
  \ 锁定提示将避免给定会话请求的（S）锁，从而防止形成循环阻塞。\n\n锁定提示的效果作用于查询级别，并且仅限于应用它的表（及其索引）。`NOLOCK` 和 `READUNCOMMITTED`\
  \ 锁定提示仅允许在 `SELECT` 语句以及 `INSERT`、`DELETE` 和 `UPDATE` 语句的数据选择部分中使用。\n\n最小化锁争用的解决技术会引入脏读的副作用，这在每个事务中可能都是不可接受的。脏读可能涉及丢失行或额外行，这是由于页面拆分和页面重排造成的。因此，仅在数据质量要求不高的情况下使用这些解决技术。\n\
  \n### 优化查询\n\n从根本上讲，死锁是性能问题。如果所有查询在资源争用可能发生之前就完成执行，那么你就可以完全避免这个问题。\n\n## 总结\n\n\
  正如你在本章所学，死锁是进程间冲突阻塞的结果，并以错误号 `1205` 报告给应用程序。你可以通过使用各种资源收集死锁信息来分析死锁的原因，但扩展事件 `xml:deadlock_report`\
  \ 可能是最好的。\n\n你可以使用多种技术来避免死锁；哪种技术适用取决于参与会话执行的查询类型、在相关资源上持有和请求的锁，以及控制所需隔离级别的业务规则。通常，你可以通过重新配置索引和事务隔离级别来解决死锁。然而，有时你可能需要重新设计应用程序或在发生死锁时自动重新执行事务。请记住，死锁的核心是一个性能问题，任何能让查询运行更快的方法都有助于缓解（即使不能消除）查询中的死锁。\n\
  \n在下一章中，我将介绍游标的性能方面以及如何优化使用游标的成本开销。\n\n"
- "# 23. 逐行处理\n\n发现使用游标一次处理一行的数据库应用程序是很常见的。开发人员倾向于以逐行方式处理数据。Oracle 甚至使用一种称为游标的东西作为高速数据访问机制。SQL\
  \ Server 中的游标则不同。因为在 SQL Server 中通过游标进行数据操作会产生显著的额外开销，所以数据库应用程序应避免使用游标。T-SQL 和 SQL\
  \ Server 的设计初衷是处理数据集，而不是一次处理一行。Jeff Moden 著名地将这种类型的处理称为 `RBAR`（发音为 “ree-bar”），意思是“逐行痛苦处理”。但是，如果必须使用游标，则应使用成本最低的游标。\n\
  \n在本章中，我将涵盖以下主题：\n\n*   游标的基础知识\n*   游标不同特性的成本分析\n*   默认结果集相对于游标的优势和缺点\n*   最小化游标成本开销的建议\n\
  \n\n\n## 游标基础\n\n当应用程序执行一个查询时，SQL Server 会返回一个由多行组成的数据集。通常，应用程序无法同时处理多行数据；相反，它们会通过遍历\
  \ SQL Server 返回的结果集，一次处理一行。这项功能由一个*游标*提供，它是一种从多行结果集中一次处理一行的机制。\n\nT-SQL 游标处理通常涉及以下步骤：\n\
  \n1.  声明游标，将其与一个 `SELECT` 语句关联，并定义游标的特征。\n2.  打开游标以访问 `SELECT` 语句返回的结果集。\n3.  从游标中检索一行。可选择通过游标修改该行。\n\
  4.  移动到结果集中的其他行。\n5.  处理完结果集中的所有行后，关闭游标并释放分配给该游标的资源。\n\n你可以使用 T-SQL 语句或用于连接到 SQL\
  \ Server 的数据访问层来创建游标。使用数据访问层创建的游标通常被称为 `客户端` 游标。用 T-SQL 编写的游标被称为 `服务器` 游标。以下是一个服务器游标处理表中查询结果的示例：\n\
  \n```sql\n--将 SELECT 语句与游标关联并定义游标的特性\nUSE AdventureWorks2017;\nGO\nSET NOCOUNT ON\n\
  DECLARE MyCursor CURSOR /**/\nFOR\nSELECT adt.AddressTypeID,\nadt.Name,\nadt.ModifiedDate\n\
  FROM Person.AddressType AS adt;\n--打开游标以访问 SELECT 语句返回的结果集\nOPEN MyCursor;\n--从\
  \ SELECT 语句返回的结果集中一次检索一行\nDECLARE @AddressTypeId INT,\n@Name VARCHAR(50),\n@ModifiedDate\
  \ DATETIME;\nFETCH NEXT FROM MyCursor\nINTO @AddressTypeId,\n@Name,\n@ModifiedDate;\n\
  WHILE @@FETCH_STATUS = 0\nBEGIN\nPRINT 'NAME =   ' + @Name;\n--可选择通过游标修改该行\nUPDATE\
  \ Person.AddressType\nSET Name = Name + 'z'\nWHERE CURRENT OF MyCursor;\n--在数据集中移动到其他行\n\
  FETCH NEXT FROM MyCursor\nINTO @AddressTypeId,\n@Name,\n@ModifiedDate;\nEND\n--关闭游标并释放分配给该游标的所有资源\n\
  CLOSE MyCursor;\nDEALLOCATE MyCursor;\n```\n\n游标的部分开销取决于其特性。SQL Server 和数据访问层提供的游标特性可以大致分为三类。\n\
  \n*   `游标位置`：定义游标创建的位置。\n*   `游标并发性`：定义游标与底层内容的隔离和同步程度。\n*   `游标类型`：定义游标的具体特性。\n\
  \n在讨论游标的成本之前，我将用几页篇幅介绍游标的各项特性。你可以使用以下查询撤销对 `Person.AddressType` 表的更改：\n\n```sql\n\
  UPDATE Person.AddressType\nSET Name = LEFT(Name, LEN(Name) - 1);\n```\n\n### 游标位置\n\
  \n根据其创建位置，游标可分为两类。\n\n*   客户端游标\n*   服务器端游标\n\nT-SQL 游标总是在 SQL Server 上创建。然而，数据库\
  \ API 游标可以在客户端或服务器端创建。\n\n#### 客户端游标\n\n顾名思义，`客户端游标`是在运行应用程序的机器上创建的，无论该应用程序是服务、数据访问层还是用户前端。它具有以下特点：\n\
  \n*   它在客户端机器上创建。\n*   游标元数据维护在客户端机器上。\n*   它是使用数据访问层创建的。\n*   它适用于大多数数据访问层（OLEDB\
  \ 提供程序和 ODBC 驱动程序）。\n*   它可以是仅向前游标或静态游标。\n\n## 注意\n游标类型，包括仅向前和静态类型，将在本章后面的“游标类型”部分进行介绍。\n\
  \n#### 服务器端游标\n\n`服务器端游标`是在 SQL Server 机器上创建的。它具有以下特点：\n\n*   它在服务器机器上创建。\n*   游标元数据维护在服务器机器上。\n\
  *   它可以使用数据访问层或 T-SQL 语句创建。\n*   使用 T-SQL 语句创建的服务器端游标与 SQL Server 紧密集成。\n*   它可以是任何类型的游标。（游标类型将在本章后面解释。）\n\
  \n## 注意\n客户端和服务器端游标之间的成本比较将在本章后面的“游标类型成本比较”部分介绍。\n\n### 游标并发性\n\n根据与底层内容所需的隔离和同步程度，游标可分为以下并发模型：\n\
  \n*   `只读`：不可更新的游标。\n*   `乐观`：使用乐观并发模型的可更新游标（不对底层数据行保留锁）。\n*   `滚动锁`：对任何要更新的数据行都持有锁的可更新游标。\n\
  \n#### 只读\n\n只读游标不可更新；不对基表持有锁。在获取游标行时，是否会在底层行上获取（S）锁取决于连接的隔离级别以及游标 `SELECT` 语句中使用的任何锁提示。但是，一旦行被获取，默认情况下锁就会被释放。以下\
  \ T-SQL 语句创建了一个只读 T-SQL 游标：\n\n```sql\nDECLARE MyCursor CURSOR READ_ONLY FOR\nSELECT\
  \ adt.Name\nFROM Person.AddressType AS adt\nWHERE adt.AddressTypeID = 1;\n```\n\n\
  使用尽可能少的锁开销使得只读类型的游标更快、更安全。只需记住，你无法通过只读游标操作数据，这是你为提高性能所做的牺牲。\n\n\n\n## 乐观并发模型\n\n\
  乐观并发模型使游标可更新。它不会在基础数据上持有锁。决定是否在基础行上获取（S）锁的因素与只读游标相同。\n\n乐观并发模型使用行版本控制来确定自读入游标以来行是否已被修改，而不是在读入游标时锁定该行。基于版本的乐观并发要求在创建游标的基础用户表中包含一个\
  \ `ROWVERSION` 列。`ROWVERSION` 数据类型是一个二进制数字，表示行的修改的相对顺序。每次修改带有 `ROWVERSION` 列的行时，SQL\
  \ Server 都会将全局 `ROWVERSION` 值 `@@DBTS` 的当前值存储在 `ROWVERSION` 列中；然后递增 `@@DBTS` 值。\n\
  \n在通过乐观游标应用修改之前，SQL Server 会确定行的当前 `ROWVERSION` 列值与读入游标时该行的 `ROWVERSION` 列值是否匹配。仅当\
  \ `ROWVERSION` 值匹配时，才修改基础行，这表明该行在此期间未被其他用户修改。否则，将引发错误。如果发生错误，请使用更新后的数据刷新游标。\n\n\
  如果基础表不包含 `ROWVERSION` 列，则游标默认为基于值的乐观并发，这需要将行的当前值与读入游标时的值进行匹配。基于版本的并发控制比基于值的并发控制更高效，因为它需要更少的处理来确定基础行的修改。因此，为了使乐观并发模型的游标获得最佳性能，请确保基础表具有\
  \ `ROWVERSION` 列。\n\n以下 T-SQL 语句创建了一个乐观的 T-SQL 游标：\n\n```sql\nDECLARE MyCursor CURSOR\
  \ OPTIMISTIC FOR\nSELECT adt.Name\nFROM Person.AddressType AS adt\nWHERE adt.AddressTypeID\
  \ = 1;\n```\n\n具有滚动锁并发的游标在基础行上持有（U）锁，直到获取另一个游标行或关闭游标。这可以防止其他用户在游标获取行时修改基础行。滚动锁并发模型使游标可更新。\n\
  \n以下 T-SQL 语句创建了一个具有滚动锁并发模型的 T-SQL 游标：\n\n```sql\nDECLARE MyCursor CURSOR SCROLL_LOCKS\
  \ FOR\nSELECT adt.Name\nFROM Person.AddressType AS adt\nWHERE adt.AddressTypeID\
  \ = 1;\n```\n\n由于锁在引用的行上持有（直到获取另一个游标行或关闭游标），它会阻止所有其他用户在此期间尝试修改该行。这会损害数据库并发性，但确保在通过游标修改数据时不会出错。\n\
  \n### 游标类型\n\n游标可以分为以下四种类型：\n\n*   仅前向游标\n*   静态游标\n*   键集驱动游标\n*   动态游标\n\n让我们在接下来的章节中更详细地了解这四种类型。\n\
  \n#### 仅前向游标\n\n仅前向游标具有以下特点：\n\n*   它们直接在基表上操作。\n*   通常，基础表中的行直到使用游标 `FETCH` 操作获取游标行时才会检索。但是，数据库\
  \ API 仅前向游标类型（具有以下附加特性）会先检索基础表中的所有行：\n    *   客户端游标位置\n    *   服务器端游标位置和只读游标并发\n\
  *   它们仅支持通过游标向前滚动（`FETCH NEXT`）。\n*   它们允许通过游标进行所有更改（`INSERT`、`UPDATE` 和 `DELETE`）。此外，这些游标会反映对基础表所做的所有更改。\n\
  \n仅前向特性在数据库 API 游标和 T-SQL 游标中的实现方式不同。数据访问层将仅前向游标特性实现为前面列出的四种游标类型之一。但 T-SQL 游标不是将仅前向游标特性实现为游标类型；而是将其实现为定义游标可滚动行为的属性。因此，对于\
  \ T-SQL 游标，仅前向特性可用于定义其余三种游标类型之一的可滚动行为。\n\nT-SQL 语法提供了一个特定的游标类型选项 `FAST_FORWARD`\
  \ 来创建快速仅前向游标。`FAST_FORWARD` 游标的别名是 *fire hose*，因为它是通过游标移动数据最快的方式，并且所有信息都是单向流动的。但是，如果“firehose”仍然不如传统的基于集合的操作快，请不要惊讶。以下\
  \ T-SQL 语句创建了一个快速仅前向的 T-SQL 游标：\n\n```sql\nDECLARE MyCursor CURSOR FAST_FORWARD\
  \ FOR\nSELECT adt.Name\nFROM Person.AddressType AS adt\nWHERE adt.AddressTypeID\
  \ = 1;\n```\n\n`FAST_FORWARD` 属性指定一个仅前向、只读的游标，并启用了性能优化。\n\n#### 静态游标\n\n静态游标具有以下特点：\n\
  \n*   它们在打开游标时在 `tempdb` 数据库中创建游标结果的快照。此后，静态游标在 `tempdb` 数据库中的快照上操作。\n*   数据在打开游标时从基础表中检索。\n\
  *   静态游标支持所有滚动选项：`FETCH FIRST`、`FETCH NEXT`、`FETCH PRIOR`、`FETCH LAST`、`FETCH ABSOLUTE\
  \ n` 和 `FETCH RELATIVE n`。\n*   静态游标始终是只读的；不允许通过静态游标修改数据。此外，对基础表所做的更改（`INSERT`、`UPDATE`\
  \ 和 `DELETE`）不会反映在游标中。\n\n以下 T-SQL 语句创建了一个静态的 T-SQL 游标：\n\n```sql\nDECLARE MyCursor\
  \ CURSOR STATIC FOR\nSELECT adt.Name\nFROM Person.AddressType AS adt\nWHERE adt.AddressTypeID\
  \ = 1;\n```\n\n一些测试表明，静态游标的性能可以与仅前向游标一样好——有时甚至更快。在您必须使用游标的情况下，请务必在您自己的系统上测试此行为。\n\
  \n#### 键集驱动游标\n\n键集驱动游标具有以下特点：\n\n*   键集游标由一组称为 *keyset* 的唯一标识符（或键）控制。键集由唯一标识结果集中行的列集构建。\n\
  *   这些游标在打开游标时在 `tempdb` 数据库中创建行的键集。\n*   游标中行的成员资格仅限于在打开游标时在 `tempdb` 数据库中创建的行的键集。\n\
  *   在获取游标行时，数据库引擎首先查看 `tempdb` 中的行的键集，然后导航到基础表中相应的数据行以检索剩余的列。\n*   它们支持所有滚动选项。\n\
  *   键集游标允许通过游标进行所有更改。在游标外部执行的 `INSERT` 不会反映在游标中，因为游标中行的成员资格仅限于在打开游标时在 `tempdb` 数据库中创建的行的键集。通过游标执行的\
  \ `INSERT` 出现在游标的末尾。对基础表执行的 `DELETE` 在游标导航到被删除的行时会引发错误。对基础表的非键集列的 `UPDATE` 会反映在游标中。对键集列的\
  \ `UPDATE` 被视为对旧键值的 `DELETE` 和对新键值的 `INSERT`。如果更改使某行不符合成员资格或影响了行的顺序，则该行不会消失或移动，除非关闭并重新打开游标。\n\
  \n以下 T-SQL 语句创建了一个键集驱动的 T-SQL 游标：\n\n```sql\nDECLARE MyCursor CURSOR KEYSET FOR\n\
  SELECT adt.Name\nFROM Person.AddressType AS adt\nWHERE adt.AddressTypeID = 1;\n\
  ```\n\n\n\n#### 动态游标\n\n动态游标具有以下特性：\n\n*   动态游标直接在基础表上操作。\n*   由于直接在基础表上操作，游标中的行成员资格不是固定的。\n\
  *   与只进游标类似，直到使用游标 `FETCH` 操作获取游标行时，才会检索底层表的行。\n*   动态游标支持除 `FETCH ABSOLUTE n` 以外的所有滚动选项，因为游标中的行成员资格不固定。\n\
  *   这些游标允许通过游标进行所有更改。同样，对底层表所做的所有更改都会反映在游标中。\n*   动态游标不支持数据库 API 游标实现的所有属性和方法。诸如\
  \ `AbsolutePosition`、`Bookmark` 和 `RecordCount` 等属性，以及 `clone` 和 `Resync` 等方法，都不受动态游标支持。相反，它们由键集驱动游标支持。\n\
  \n以下 `T-SQL` 语句创建了一个动态 `T-SQL` 游标：\n```sql\nDECLARE MyCursor CURSOR DYNAMIC FOR\n\
  SELECT adt.Name\nFROM Person.AddressType AS adt\nWHERE adt.AddressTypeID = 1;\n\
  ```\n\n在任何情况下，动态游标绝对是最慢的游标。它获取更多锁并持有更长时间，这极大地增加了其糟糕的性能。在设计系统时请考虑到这一点。\n\n## 游标成本比较\n\
  \n现在你已经了解了不同的游标类型，让我们来看看它们的成本。如果你必须使用游标，应始终使用满足应用程序要求的最轻量级游标。接下来将详细介绍不同游标特性之间的成本比较。\n\
  \n### 游标位置的成本比较\n\n客户端游标和服务器端游标各有其成本效益和开销，如下文所述。\n\n#### 客户端游标\n\n与服务器端游标相比，客户端游标具有以下成本效益：\n\
  \n*   *更高的可伸缩性*：由于游标元数据维护在连接到服务器的各个客户端机器上，维护游标元数据的开销由客户端机器承担。因此，为更多用户提供服务的能力不受服务器资源的限制。\n\
  *   *更少的网络往返*：由于 `SELECT` 语句返回的结果集被传递到维护游标的客户端，因此在从游标检索行时不需要额外的网络往返服务器。\n*   *更快的滚动*：由于游标在客户端机器上本地维护，遍历游标行的速度可能更快。\n\
  *   *高度可移植*：由于游标使用数据访问层实现，它可以在多种数据库上工作：`SQL Server`、`Oracle`、`Sybase` 等等。\n\n客户端游标具有以下成本开销或缺点：\n\
  \n*   *对客户端资源压力更大*：由于游标在客户端管理，它增加了客户端资源的压力。但这可能没那么糟糕，因为大多数情况下客户端应用程序是 Web 应用程序，并且使用标准负载均衡解决方案横向扩展\
  \ Web 应用程序（或 Web 服务器）相当容易。另一方面，横向扩展事务性 `SQL Server` 数据库仍然是一门艺术！\n*   *支持的游标类型有限*：不支持动态和键集驱动游标。\n\
  *   *一个连接上只能有一个活动的基于游标的语句*：结果集中尽可能多的行（客户端网络可以缓冲的行数）以网络数据包的形式安排并发送到客户端应用程序。因此，直到应用程序获取了游标的所有行，数据库连接都保持忙碌状态，向客户端推送行。在此期间，其他基于游标的语句不能使用该连接。通过利用多个活动结果集\
  \ (MARS) 可以解决这个问题，它允许一个连接有第二个活动游标。\n\n#### 服务器端游标\n\n服务器端游标具有以下成本效益：\n\n*   *一个连接上支持多个活动的基于游标的语句*：使用服务器端游标时，在游标操作之间，连接上不会留下未处理的结果。这释放了连接，允许在同一时间在一个连接上使用多个基于游标的语句。对于客户端游标，如前所述，连接在应用程序获取所有游标行之前保持忙碌。这意味着它们不能同时被多个基于游标的语句使用。\n\
  *   *靠近数据进行行处理*：如果行处理涉及与其他表的联接和大量的集合操作，那么使用服务器端游标靠近数据进行行处理是有利的。\n*   *对客户端资源压力更小*：它减轻了客户端资源的压力。但这可能不那么理想，因为如果服务器资源达到上限（而不是客户端资源），那么将需要横向扩展数据库，这是一个困难的命题。\n\
  *   *支持所有游标类型*：客户端游标在可支持的游标类型方面有限制。服务器端游标没有限制。\n\n服务器端游标具有以下成本开销或缺点：\n\n*   *可伸缩性较低*：由于消耗服务器资源来管理游标，它们使服务器的可伸缩性降低。\n\
  *   *更多的网络往返*：如果游标行处理在客户端应用程序中完成，它们会增加网络往返次数。可以通过在存储过程中处理游标行或使用数据访问层的缓存大小特性来优化网络往返次数。\n\
  *   *可移植性较差*：使用 `T-SQL` 游标实现的服务器端游标不容易移植到其他数据库，因为管理游标的数据库代码语法在不同数据库之间是不同的。\n\n###\
  \ 游标并发性的成本比较\n\n正如预期的那样，并发模型更高的游标在数据库中产生的阻塞最少，并支持更高的可伸缩性，如下文所述。\n\n#### 只读\n\n只读并发模型提供以下成本效益：\n\
  \n*   *最低的锁定开销*：只读并发模型对数据库引入的锁定和同步开销最少。由于在获取游标行后不保持底层行的 (S) 锁，因此其他用户不会被阻止访问该行。此外，如果不在乎因脏读而返回何种数据，可以通过在游标的\
  \ `SELECT` 语句中使用 `NO_LOCK` 锁定提示来避免在获取游标行时获取底层行的 (S) 锁。\n*   *最高的并发性*：由于不在底层行上保持额外的锁，只读游标不会阻止其他用户访问底层表。仍然会获取共享锁。\n\
  \n只读游标的主要缺点如下：\n\n*   *不可更新*：无法通过游标修改底层表的内容。\n\n\n#### 乐观并发模型\n\n乐观并发模型提供以下优点：\n\
  \n*   *锁定开销低*：类似于只读模型，乐观并发模型在获取行后不会在游标行上持有 (S) 锁。为了进一步提高并发性，也可以使用 `NOLOCK` 锁定提示，如同只读并发模型中的情况。但请注意，`NOLOCK`\
  \ 绝对可能导致数据不正确或行丢失/重复，因此其使用需要仔细规划。通过游标对基础行进行修改需要操作查询所要求的该行的独占权限。\n\n*   *并发性高*：因为仅对基础行使用共享锁，游标不会阻止其他用户访问基础表。但通过游标对基础行进行的修改将在修改期间阻止其他用户访问该行。\n\
  \n以下示例详述了乐观并发模型的成本开销：\n\n*   *行版本控制*：由于乐观并发模型允许游标可更新，会产生额外成本以确保在通过游标应用修改之前，首先将当前基础行（使用基于版本或基于值的并发控制）与最初获取的游标行进行比较。这可以防止通过游标进行的修改意外覆盖在游标行被获取后由另一用户所做的修改。\n\
  \n*   *无 ROWVERSION 列的并发控制*：如前所述，基础表中的 `ROWVERSION` 列允许游标执行高效的基于版本的并发控制。如果基础表不包含\
  \ `ROWVERSION` 列，则游标将采用基于值的并发控制，这需要将行的当前值与读取到游标时的值进行匹配。这增加了并发控制的成本。这两种形式的并发控制都会在\
  \ `tempdb` 中引起额外开销。\n\n#### 滚动锁并发模型\n\n滚动锁并发模型的主要优点如下：\n\n*   *简单的并发控制*：通过对游标最后获取的行对应的基础行加锁，游标确保该基础行不能被另一用户修改。这消除了乐观锁的版本控制开销。此外，由于该行不能被另一用户修改，应用程序无需检查行不匹配错误。\n\
  \n滚动锁并发模型会产生以下成本开销：\n\n*   *最高的锁定开销*：滚动锁并发模型引入了悲观锁特性。对最后获取的游标行持有 (U) 锁，直到获取另一游标行或关闭游标。\n\
  \n*   *最低的并发性*：由于在基础行上持有 (U) 锁，所有其他请求在该基础行上持有 (U) 或 (X) 锁的用户将被阻塞。这会显著损害并发性。因此，除非绝对必要，请避免使用此游标并发模型。\n\
  \n### 游标类型的成本比较\n\n本章前面“游标基础”部分提到的四种基本游标类型中的每一种都会对服务器产生不同的成本开销。选择不正确的游标类型会损害数据库性能。除了四种基本游标类型外，还提供了一种快速只进游标（只进游标的一种变体）以增强性能。这些游标类型的成本开销将在后续章节中解释。\n\
  \n#### 只进游标\n\n只进游标的成本优点如下：\n\n*   *游标打开成本低于静态和键集驱动游标*：由于在打开游标时，游标行不是从基础表中检索，也不复制到\
  \ `tempdb` 数据库中，因此 T-SQL 只进游标打开速度快。类似地，具有乐观/滚动锁并发的服务器端 API 只进游标也打开快速，因为它们在打开游标时不检索行。\n\
  \n*   *滚动开销较低*：因为只能在此游标类型上执行 `FETCH NEXT`，支持不同滚动操作所需的开销较少。\n\n*   *对 tempdb 数据库的影响小于静态和键集驱动游标*：由于\
  \ T-SQL 只进游标不将行从基础表复制到 `tempdb` 数据库，因此不会对该数据库产生额外压力。\n\n只进游标类型有以下缺点：\n\n*   *并发性较低*：每次获取游标行时，会根据游标并发模型（如前面并发性讨论中所述）对相应的基础行进行锁请求。这可能会阻止其他用户访问该资源。\n\
  \n*   *不支持向后滚动*：需要双向滚动的应用程序不能使用此游标类型。但如果应用程序设计得当，不使用向后滚动也并非难事。\n\n#### 快速只进游标\n\n\
  快速只进游标是最快且开销最小的游标类型。这种只进、只读游标经过特别优化以提高性能。因此，您应始终优先选择它而非其他 SQL Server 游标类型。\n\n此外，数据访问层在客户端提供了快速只进游标。该类型的游标使用所谓的*默认结果集*，使游标开销几乎消失。\n\
  \n## 注意\n\n默认结果集将在本章后面的“默认结果集”部分进行解释。\n\n#### 静态游标\n\n静态游标的成本优点如下：\n\n*   *获取成本低于其他游标类型*：由于在打开游标时，从基础行在\
  \ `tempdb` 数据库中创建了一个快照，游标行的获取是针对该快照而非基础行进行的。这避免了原本获取游标行所需的锁定开销。\n\n*   *不会阻塞基础行*：由于快照是在\
  \ `tempdb` 数据库中创建的，尝试访问基础行的其他用户不会被阻塞。\n\n在缺点方面，静态游标有以下成本开销：\n\n*   *打开成本高于其他游标类型*：静态游标的游标打开操作比其他游标类型慢，因为在游标打开期间，必须从基础表中检索结果集的所有行，并且必须在\
  \ `tempdb` 数据库中创建快照。\n\n*   *对 tempdb 的影响大于其他游标类型*：在 `tempdb` 数据库中创建、填充和清理快照可能对服务器资源产生显著影响。\n\
  \n\n#### 键集驱动游标\n\n键集驱动游标具有以下成本优势：\n\n*   比静态游标更低的打开成本：由于在 `tempdb` 数据库中仅创建键集而非完整快照，键集驱动游标的打开速度比静态游标更快。SQL\
  \ Server 会异步填充大型键集驱动游标的键集，这缩短了游标打开到获取第一行游标数据之间的时间。\n*   比静态游标对 `tempdb` 的影响更小：由于键集驱动游标更小，它在\
  \ `tempdb` 中占用的空间更少。\n\n键集驱动游标的成本开销如下：\n\n*   比只进和动态游标更高的打开成本：在 `tempdb` 数据库中填充键集使得键集驱动游标的打开操作比只进游标（除前面提到的例外情况）和动态游标的成本更高。\n\
  *   比其他游标类型更高的获取成本：对于每一行游标数据的获取，必须先访问键集中的键，然后才能访问用户数据库中对应的底层行。每次获取游标行都需要访问 `tempdb`\
  \ 和用户数据库，这使得获取操作比其他游标类型的成本更高。\n*   比只进和动态游标对 `tempdb` 的影响更大：在 `tempdb` 中创建、填充和清理键集会影响服务器资源。\n\
  *   比静态游标更高的锁开销和阻塞：由于从游标获取行是从底层表中检索行，因此在行获取操作期间会对底层行获取一个 (S) 锁（除非使用了 `NOLOCK` 锁定提示）。\n\
  \n#### 动态游标\n\n动态游标具有以下成本优势：\n\n*   比静态和键集驱动游标更低的打开成本：由于游标是直接在底层行上打开，而无需将任何内容复制到\
  \ `tempdb` 数据库，因此动态游标的打开速度比静态和键集驱动游标更快。\n*   比静态和键集驱动游标对 `tempdb` 的影响更小：由于没有内容被复制到\
  \ `tempdb`，动态游标对 `tempdb` 造成的压力远小于其他游标类型。\n\n动态游标具有以下成本开销：\n\n*   比静态游标更高的锁开销和阻塞：动态游标中的每一次游标行获取都会重新查询游标\
  \ `SELECT` 语句所涉及的底层表。动态获取通常成本高昂，因为可能需要重新执行原始的查询条件。\n\n关于不同游标的总结及其优缺点，请参阅表 23-1。\n\
  \n表 23-1：游标比较\n\n| 游标类型 | 优点 | 缺点 |\n| :--- | :--- | :--- |\n| `只进` | 成本更低，滚动开销更小，对\
  \ `tempdb` 的影响更小 | 并发性较低，不支持向后滚动 |\n| `快速只进` | 速度最快，成本最低，影响最小 | 不支持向后滚动，无并发性 |\n\
  | `静态` | 获取成本更低，无阻塞，支持向前和向后滚动 | 打开成本更高，对 `tempdb` 的影响更大，无并发性 |\n| `键集驱动` | 打开成本更低，对\
  \ `tempdb` 的影响更小，支持向前和向后滚动，并发性 | 打开成本更高，获取成本最高，对 `tempdb` 的影响最大，锁定成本更高 |\n| `动态`\
  \ | 打开成本更低，对 `tempdb` 的影响更小，支持向前和向后滚动，并发性 | 锁定成本最高 |\n\n#### 默认结果集\n\n数据访问层（`ADO`、`OLEDB`\
  \ 和 `ODBC`）的默认游标类型是只进且只读的。数据访问层创建的默认游标并非真正的游标，而是从服务器到客户端的数据流，通常称为默认结果集或 `快速只进` 游标（由数据访问层创建）。在\
  \ `ADO.NET` 中，`DataReader` 控件具有只进和只读属性，它可以被视为 `ADO.NET` 环境中的默认结果集。SQL Server 在以下条件下使用此类结果集处理：\n\
  \n*   使用数据访问层（`ADO`、`OLEDB`、`ODBC`）的应用程序将所有游标特性保留为默认设置，这请求的是一个只进且只读的游标。\n*   应用程序执行的是\
  \ `SELECT` 语句，而不是 `DECLARE CURSOR` 语句。\n\n## 注意\n\n由于 SQL Server 设计用于处理数据集，而非逐条遍历记录，因此默认结果集总是比任何其他类型的游标更快。\n\
  \n从客户端发送到 SQL Server 的唯一请求是与默认游标关联的 SQL 语句。SQL Server 执行查询，将结果集的行组织到网络数据包中（尽可能填充数据包），然后将数据包发送到客户端。这些网络数据包缓存在客户端的网络缓冲区中。SQL\
  \ Server 将尽可能多的结果集行发送到客户端，只要客户端网络缓冲区可以缓存。随着客户端应用程序一次请求一行，客户端计算机上的数据访问层从客户端网络缓冲区中拉取该行并将其传输到客户端应用程序。\n\
  \n以下部分概述了默认结果集的优缺点。\n\n##### 优点\n\n默认结果集通常是从 SQL Server 返回行的最佳和最有效的方式，原因如下：\n\n\
  *   客户端与 SQL Server 之间的网络往返次数最少：由于 SQL Server 返回的结果集缓存在客户端网络缓冲区中，因此客户端无需通过网络请求来获取单个行。SQL\
  \ Server 将尽可能多的行放入网络缓冲区，并发送客户端网络缓冲区能够缓存的数据量。\n*   服务器开销最小：由于 SQL Server 无需在服务器上存储数据，这降低了服务器资源的利用率。\n\
  \n##### 多活动结果集\n\nSQL Server 2005 引入了多活动结果集的概念，其中一个连接在任意时刻可以运行多个批处理。在之前的版本中，必须在处理完或关闭单个结果集后才能提交下一个请求。MARS\
  \ 允许通过同一连接同时提交多个请求。MARS 在 SQL Server 上始终启用。除非连接明确调用它，否则该连接不会启用 MARS。事务必须在客户端级别处理，并且必须显式声明和提交或回滚。在\
  \ MARS 运行时，如果某个语句的事务未提交且连接关闭，则属于该单一连接的所有其他事务都将回滚。MARS 通过应用程序连接属性启用。\n\n\n## 缺点\n\
  \n虽然默认结果集有优点，但也存在缺点。要使用默认结果集并获得最佳性能，需要满足一些特殊条件：\n\n*   它不支持所有属性和方法：不支持 `AbsolutePosition`、`Bookmark`\
  \ 和 `RecordCount` 等属性，也不支持 `Clone`、`MoveLast`、`MovePrevious` 和 `Resync` 等方法。\n\n\
  *   可能锁定底层资源：SQL Server 会将尽可能多的结果集行发送到客户端网络缓冲区可以缓存的行。如果结果集的大小很大，客户端网络缓冲区可能无法接收所有行。此时，SQL\
  \ Server 会持有尚未发送到客户端的底层表下一页上的锁。\n\n为了说明这些概念，请考虑以下测试表：\n\n```sql\nUSE AdventureWorks2017;\n\
  GO\nDROP TABLE IF EXISTS dbo.Test1;\nGO\nCREATE TABLE dbo.Test1 (C1 INT,\nC2 CHAR(996));\n\
  CREATE CLUSTERED INDEX Test1Index ON dbo.Test1 (C1);\nINSERT INTO dbo.Test1\nVALUES\
  \ (1, '1'),\n(2, '2');\nGO\n```\n\n现在考虑这个 PowerShell 脚本，它使用带有 OLEDB 的 ADO 和数据库 API\
  \ 游标的默认游标类型（`ADODB.Recordset` 对象）来访问测试表的行，如下所示：\n\n```powershell\n$AdoConn = New-Object\
  \ -comobject ADODB.Connection\n$AdoRecordset = New-Object -comobject ADODB.Recordset\n\
  ##将数据源更改为你自己的服务器\n$AdoConn.Open(\"Provider= SQLOLEDB; Data Source=DOJO\\RANDORI;\
  \ Initial Catalog=AdventureWorks2017; Integrated Security=SSPI\")\n$AdoRecordset.Open(\"\
  SELECT * FROM dbo.Test1\", $AdoConn)\ndo {\n$C1 = $AdoRecordset.Fields.Item(\"C1\"\
  ).Value\n$C2 = $AdoRecordset.Fields.Item(\"C2\").Value\nWrite-Output \"C1 = $C1\
  \ and C2 = $C2\"\n$AdoRecordset.MoveNext()\n} until     ($AdoRecordset.EOF -eq $True)\n\
  $AdoRecordset.Close()\n$AdoConn.Close()\n```\n\n这不是通常从 PowerShell 访问数据库的方式，但它展示了客户端游标是如何操作的。请注意，该表有两行，每行大小等于\
  \ 1,000 字节（`INT` 占 4 字节 + `CHAR(996)` 占 996 字节），不考虑内部开销。因此，`SELECT` 语句返回的完整结果集的大小约为\
  \ 2,000 字节（2 × 1,000 字节）。\n\n执行游标打开语句（`$AdoRecordset.Open()`）时，会在运行代码的客户端计算机上创建一个默认结果集。默认结果集会缓存客户端网络缓冲区所能容纳的尽可能多的行。\n\
  \n由于结果集的大小足够小，可以被客户端网络缓冲区缓存，因此所有游标行在游标打开语句期间都缓存在客户端计算机上，而不会在 `dbo.Test1` 表上保留任何锁。你可以使用\
  \ `sys.dm_tran_locks` 动态管理视图来验证连接的锁定状态。在整个游标操作期间，客户端到 SQL Server 的唯一请求是与游标关联的 `SELECT`\
  \ 语句，如扩展事件输出中的图 23-1 所示。\n\n![../images/323849_5_En_23_Chapter/323849_5_En_23_Fig1_HTML.jpg](img/323849_5_En_23_Fig1_HTML.jpg)\n\
  \n图 23-1\n\nProfiler 跟踪输出，显示默认结果集发出的数据库请求\n\n要了解大结果集对默认结果集处理的影响，让我们向测试表中添加更多行。\n\
  \n```sql\nSELECT TOP 100000\nIDENTITY(INT, 1, 1) AS n\nINTO #Tally\nFROM master.dbo.syscolumns\
  \ AS scl,\nmaster.dbo.syscolumns AS sc2;\nINSERT INTO dbo.Test1 (C1,\nC2)\nSELECT\
  \ n,\nn\nFROM #Tally AS t;\nGO\n```\n\n此示例生成的额外行大大增加了结果集的大小。根据客户端网络缓冲区的大小，只能缓存部分结果集。执行\
  \ `Ado.Recordset.Open` 语句时，客户端计算机上的默认结果集将获取部分结果集，而 SQL Server 则在网络另一端等待发送剩余的行。\n\
  \n在此期间，在我的机器上，底层 `Test1` 表上持有如图 23-2 所示的锁，这些信息是从 `sys.dm_tran_locks` 的输出中获得的。\n\n\
  ![../images/323849_5_En_23_Chapter/323849_5_En_23_Fig2_HTML.jpg](img/323849_5_En_23_Fig2_HTML.jpg)\n\
  \n图 23-2\n\n`sys.dm_tran_locks` 的输出，显示在处理大结果集时默认结果集持有的锁\n\n表上的 `(IS)` 锁将阻止其他用户尝试获取\
  \ `(X)` 锁。为了最小化阻塞问题，请遵循以下建议：\n\n*   立即处理默认结果集的所有行。\n\n*   保持结果集较小。如示例所示，如果结果集的大小很小，默认结果集将能够在游标打开操作期间读取所有行。\n\
  \n## 游标开销\n\n在应用程序中实现以游标为中心的功能时，你有两种选择。你可以使用 T-SQL 游标或数据库 API 游标。由于 T-SQL 游标和数据库\
  \ API 游标的内部实现不同，这些游标在 SQL Server 上产生的负载也不同。这些游标对数据库的影响还取决于游标的不同特性，例如位置、并发性和类型。你可以使用扩展事件来分析\
  \ T-SQL 和数据库 API 游标产生的负载。当然，用于监视查询的标准事件会很有用。在游标类别下还有许多其他事件。这些事件中最有用的包括：\n\n*   `cursor_open`\n\
  \n*   `cursor_close`\n\n*   `cursor_execute`\n\n*   `cursor_prepare`\n\n其他事件也很有用，但只有在尝试排查特定问题时才需要它们。甚至这些游标的优化选项也不同。让我们逐一分析这些游标的开销。\n\
  \n### 使用 T-SQL 游标分析开销\n\n通过 T-SQL 语句实现的 T-SQL 游标总是在 SQL Server 上执行，因为它们需要 SQL Server\
  \ 引擎来处理其 T-SQL 语句。您可以结合先前解释的游标特性来降低这些游标的开销。如前所述，最轻量级的 T-SQL 游标不是使用默认设置创建的，而是通过调整设置来生成仅向前只读游标。即便如此，实现游标操作的\
  \ T-SQL 语句仍然需要由 SQL Server 处理。游标的完整负载由 SQL Server 承担，客户端计算机不提供任何帮助。假设一个应用程序需求导致必须支持以下任务列表：\n\
  \n*   识别所有已报废的产品（来自 `Production.WorkOrder` 表）。\n*   对于每个报废的产品，确定损失的金额，其中每个产品损失的金额等于库存数量\
  \ *乘以* 产品的单价。\n*   计算总损失。\n*   根据总损失，确定业务状态。\n\n第二点中的 `FOR EACH` 短语表明，这些应用程序任务可以通过游标来完成。然而，在\
  \ SQL Server 中使用 `FOR`、`WHILE`、游标或任何其他此类处理方式可能是危险的。尽管这种方法很有吸引力，但它不是基于集合的，也不应该是处理此类请求的方式。不过，让我们看看它如何通过游标工作。您可以使用\
  \ T-SQL 游标实现此应用程序需求，如下所示：\n\n```sql\nCREATE OR ALTER PROC dbo.TotalLoss_CursorBased\n\
  AS --使用默认设置（即快速仅向前）声明一个 T-SQL 游标来检索已废弃的产品\nDECLARE ScrappedProducts CURSOR FOR\n\
  SELECT p.ProductID,\nwo.ScrappedQty,\np.ListPrice\nFROM Production.WorkOrder AS\
  \ wo\nJOIN Production.ScrapReason AS sr\nON wo.ScrapReasonID = sr.ScrapReasonID\n\
  JOIN Production.Product AS p\nON wo.ProductID = p.ProductID;\n--打开游标以一次处理一个产品\n\
  OPEN ScrappedProducts;\nDECLARE @MoneyLostPerProduct MONEY = 0,\n@TotalLoss MONEY\
  \ = 0;\n--通过一次处理一个产品来计算每个产品损失的金额\nDECLARE @ProductId INT,\n@UnitsScrapped SMALLINT,\n\
  @ListPrice MONEY;\nFETCH NEXT FROM ScrappedProducts\nINTO @ProductId,\n@UnitsScrapped,\n\
  @ListPrice;\nWHILE @@FETCH_STATUS = 0\nBEGIN\nSET @MoneyLostPerProduct = @UnitsScrapped\
  \ * @ListPrice; --计算总损失\nSET @TotalLoss = @TotalLoss + @MoneyLostPerProduct;\nFETCH\
  \ NEXT FROM ScrappedProducts\nINTO @ProductId,\n@UnitsScrapped,\n@ListPrice;\nEND\n\
  --确定状态\nIF (@TotalLoss > 5000)\nSELECT 'We are bankrupt!' AS Status;\nELSE\nSELECT\
  \ 'We are safe!' AS Status;\n--关闭游标并释放分配给游标的所有资源\nCLOSE ScrappedProducts;\nDEALLOCATE\
  \ ScrappedProducts;\nGO\n```\n\n可以如下执行该存储过程，但您应该执行两次以利用计划缓存（图 23-3）：\n\n![../images/323849_5_En_23_Chapter/323849_5_En_23_Fig3_HTML.jpg](img/323849_5_En_23_Fig3_HTML.jpg)\n\
  \n图 23-3\n扩展事件输出，显示使用 T-SQL 游标进行数据处理的总成本的一部分\n\n```sql\nEXEC dbo.TotalLoss_CursorBased;\n\
  ```\n\n该存储过程执行的逻辑读总数为 8,786（由图 23-3 中的 `sql_batch_completed` 事件指示）。那么，这个数字是高还是低？考虑到\
  \ `Production.Products` 表只有 6,196 页，而 `Production.WorkOrder` 表只有 926 页，这肯定不低。您可以通过查询动态管理视图\
  \ `sys.dm_db_index_physical_stats` 来确定分配给这些表的页数。\n\n```sql\nSELECT  SUM(page_count)\n\
  FROM    sys.dm_db_index_physical_stats(DB_ID(N'AdventureWorks2017'),\nOBJECT_ID('Production.WorkOrder'),\n\
  DEFAULT, DEFAULT, DEFAULT);\n```\n\n## 注意\n\n`sys.dm_db_index_physical_stats` DMV\
  \ 在第 13 章有详细解释。\n\n在大多数情况下，您可以通过使用 SQL 查询重写功能来避免游标操作，专注于基于集合的数据访问方法。例如，您可以使用 SQL\
  \ 查询（而不是游标操作）重写前面的存储过程，如下所示：\n\n```sql\nCREATE OR ALTER PROC dbo.TotalLoss\nAS\n\
  SELECT CASE --基于以下计算确定状态\nWHEN SUM(MoneyLostPerProduct) > 5000 THEN\n'We are bankrupt!'\n\
  ELSE\n'We are safe!'\nEND AS Status\nFROM\n( --计算所有废弃产品的总损失金额\nSELECT SUM(wo.ScrappedQty\
  \ * p.ListPrice) AS MoneyLostPerProduct\nFROM Production.WorkOrder AS wo\nJOIN Production.ScrapReason\
  \ AS sr\nON wo.ScrapReasonID = sr.ScrapReasonID\nJOIN Production.Product AS p\n\
  ON wo.ProductID = p.ProductID\nGROUP BY p.ProductID) AS DiscardedProducts;\nGO\n\
  ```\n\n在此存储过程中，使用 SQL Server 的聚合函数计算每个产品的损失金额和总损失。`CASE` 语句用于根据产生的总损失确定业务状态。可以如下执行该存储过程；但同样，您应该执行两次，以便看到计划缓存的结果：\n\
  \n```sql\nEXEC dbo.TotalLoss;\n```\n\n图 23-4 显示了相应的扩展事件输出。\n\n![../images/323849_5_En_23_Chapter/323849_5_En_23_Fig4_HTML.jpg](img/323849_5_En_23_Fig4_HTML.jpg)\n\
  \n图 23-4\n扩展事件输出，显示使用等效 SELECT 语句进行数据处理的总成本\n\n在图 23-4 中，您可以看到该存储过程的第二次执行（重用现有计划）总共使用了\
  \ 547 次逻辑读。然而，您可以看到一个比读取次数更重要的结果：执行时间从 32.7 毫秒下降到 10.3 毫秒。使用 SQL 查询代替游标操作使执行速度提高了三倍。\n\
  \n因此，为了获得更好的性能，几乎总是建议您在 SQL 查询中使用基于集合的操作，而不是 T-SQL 游标。\n\n\n### 游标使用建议\n\n低效的游标使用会引入额外的网络往返次数和服务器资源负载，从而降低应用程序性能。为尽量降低游标开销，请尝试遵循以下建议：\n\
  \n*   优先使用基于集合的 SQL 语句而非 T-SQL 游标，因为 SQL Server 本身是为处理数据集而设计的。\n*   使用开销最低的游标。\n\
  \    *   使用 SQL Server 游标时，请采用 `FAST FORWARD`（只进快速）游标类型。\n    *   使用由 ADO、OLEDB\
  \ 或 ODBC 实现的 API 游标时，请使用默认游标类型，通常称为 `default result set`（默认结果集）。\n    *   使用 ADO.NET\
  \ 时，请使用 `DataReader` 对象。\n*   最小化对服务器资源的影响。\n    *   对 API 游标使用客户端游标。\n    *   不要通过游标对底层表执行操作。\n\
  \    *   尽快释放游标。这有助于释放资源，尤其是在 `tempdb` 中。\n    *   重新设计游标的 `SELECT` 语句（或应用程序），使其仅返回最小必要的行和列集。\n\
  \    *   将游标逻辑重写为基于集合的语句，从而完全避免使用 T-SQL 游标，因为基于集合的操作通常比游标更高效。\n    *   对动态游标使用 `ROWVERSION`\
  \ 列，以利用高效、基于版本的并发控制机制，而非依赖基于值的锁定技术。\n*   最小化对 `tempdb` 的影响。\n    *   避免使用静态游标和键集驱动游标，以减少\
  \ `tempdb` 中的资源争用。\n    *   静态游标和键集游标会给 `tempdb` 增加额外负载，因此若必须使用，请将此因素考虑在内；或者如果您的\
  \ `tempdb` 压力较大，请避免使用它们。\n*   最小化阻塞。\n    *   使用默认结果集、只进快速游标或静态游标。\n    *   尽快处理所有游标行。\n\
  \    *   避免使用滚动锁或悲观锁。\n*   使用 API 游标时最小化网络往返次数。\n    *   利用 ADO 的 `CacheSize` 属性在一次往返中获取多行数据。\n\
  \    *   使用客户端游标。\n    *   使用断开连接的记录集。\n\n## 总结\n\n正如您在本章所学，游标是 SQL Server 返回的结果集的自然扩展，它使调用应用程序能够逐行处理数据。游标会给应用程序性能带来额外开销，并影响服务器资源。\n\
  \n您应始终寻求避免使用游标的方法。在几乎所有情况下，基于集合的解决方案都表现更佳。然而，如果必须使用游标操作，则应选择最佳的游标位置、并发模型、类型和缓存大小组合，以最小化游标的开销。\n\
  \n在下一章中，我们将探讨内存中表、本机编译存储过程以及内存优化对象的其他方面所带来的特殊功能。\n\n"
- "# 24. 内存优化 OLTP 表与存储过程\n\n在线事务处理（OLTP）系统的主要需求之一是尽可能提升系统速度。有鉴于此，微软推出了内存中 OLTP 增强功能。这些功能在后续版本中得到了改进，并被添加到\
  \ Azure SQL Database 中。内存优化技术包括内存中表和本机编译存储过程。这套特性专为高端、事务密集型、以 OLTP 为核心的系统设计。在 SQL\
  \ Server 2014 中，内存中 OLTP 功能仅在企业版中可用。自 SQL Server 2016 起，所有版本均支持此增强功能。内存优化技术是查询调优工具箱中的另一件工具，但它是一个高度专业化的工具，仅适用于特定应用程序。采用此技术时需谨慎。话虽如此，在具备充足内存的合适系统上，内存中表和本机存储过程能带来极快的速度。\n\
  \n在本章中，我将涵盖以下主题：\n*   内存中表工作原理的基础知识\n*   通过本机编译存储过程提升性能\n*   本机编译过程和内存 OLTP 表的优缺点\n\
  *   何时使用内存 OLTP 表的建议\n\n## 内存 OLTP 基础\n\n究其核心，您可以调整查询使其运行得异常快速。但是，无论您让它们运行得多快，在某种程度上您都会受到现代计算机内部某些架构问题以及\
  \ SQL Server 行为基础的限制。通常，您硬件的头号瓶颈是存储系统。无论您仍在使用旋转磁盘，还是已转向某种类型的 SSD 或类似技术，磁盘仍然是系统中最慢的环节。这意味着无论是读取还是写入，您都必须等待。但内存速度快，而且有了\
  \ 64 位操作系统，内存可以非常充裕。因此，如果您有可以完全移入内存的表，您就可以从根本上提高速度。这正是内存中 OLTP 表的部分意义所在：将数据访问（包括读取和写入）移入内存，脱离磁盘。\n\
  \n然而，微软所做的不仅仅是简单地将表移入内存。它认识到磁盘速度慢，但系统变慢的另一个方面是数据如何通过事务系统进行访问和管理。因此，微软也在此处做出了一系列改变。最主要的是移除了事务处理的悲观方法。现有产品强制所有事务在允许数据更改刷新到磁盘之前写入事务日志。这在事务处理中造成了瓶颈。因此，微软不再对事务能否成功完成持悲观态度，而是采取了一种乐观的方式，认为大多数情况下事务会完成。此外，微软没有采用阻塞情况（即一个事务必须在下一个事务访问或更新数据之前完成更新），而是对数据进行了版本控制。它现在消除了系统内的一个主要争用点，并消除了锁，再加上所有这些都在内存中，因此速度更快。\n\
  \n微软随后将所有这些又推进了一步。对于防止多个进程访问页面进行写入的内存闩锁，微软没有采用悲观方法，而是将乐观方法扩展到内存管理。现在，借助版本控制，内存中表采用“最终”一致性的模型，并具有冲突解决过程，该过程将回滚事务，但绝不会让一个事务阻塞另一个事务。这有可能导致一些数据丢失，但它使数据访问层中的所有操作都变得快速。\n\
  \n数据确实会被写入磁盘以在重启或类似情况下保持持久性。但是，除了在服务器启动（或数据库联机）时，不会从磁盘读取任何数据。然后，内存中表的所有数据都会加载到内存中，对于这些数据不会再发生磁盘读取。但是，如果您处理的是临时数据，您甚至可以通过将数据定义为根本不持久化到磁盘来绕过此功能，从而进一步减少启动时间。\n\
  \n最后，正如您在本书其他部分所见，查询调优的一个主要部分是弄清楚如何与查询优化器协作以获得良好的执行计划，然后多次重用该计划。这也可能是一个密集且缓慢的过程。SQL\
  \ Server 2014 引入了本机编译存储过程的概念。这些实际上是编译为 DLL 并成为 SQL Server 操作系统一部分的 T-SQL 代码。这个编译过程成本高昂，不应随便用于任何查询。其主要思想是花费时间和精力将过程编译为本机代码，然后以极大提升的速度使用该过程数百万次。\n\
  \n\n\n所有这些技术结合在一起，创造出新的功能，你可以单独使用，也可以将其与现有的表结构和标准 T-SQL 结合使用。事实上，你可以将内存中表（in-memory\
  \ tables）当作普通的 SQL Server 表一样对待，仍然能获得一些性能提升。但是，你不能随时随地就这样做。利用内存 OLTP（On-Line Transaction\
  \ Processing）表和存储过程有一些相当具体的要求。\n\n## 系统要求\n\n在考虑内存优化表是否可行之前，你必须满足几个标准要求。\n\n*  \
  \ 一款现代的 64 位处理器\n*   你打算放入内存的数据所需磁盘存储空间的两倍空间\n*   大量的内存\n\n显然，对于大多数系统而言，关键在于拥有大量的内存。你需要有足够的内存来保证操作系统和\
  \ SQL Server 的正常运行。然后，你还需要为系统中所有非内存优化的需求（包括数据缓存）准备内存。最后，在所有这些基础之上，你还需要为你的内存优化表分配内存。如果你考虑的不是一个相当庞大的系统（至少配备\
  \ 64GB 内存），我甚至不建议你考虑这个选项。较小的系统无法在内存中提供足够的存储空间来使这项技术值得投入时间和精力。\n\n**仅限于** SQL Server\
  \ 2014，你必须运行 SQL Server 的企业版。当然，在 SQL Server 2014 中你也可以使用开发者版，但你不能在该版本上运行生产负载。对于高于\
  \ SQL Server 2014 的版本，微软根据版本不同规定了内存限制。\n\n## 基本设置\n\n除了硬件要求之外，你还必须对数据库进行额外的工作来启用内存表。我将从一个新数据库开始进行演示。\n\
  \n```\nCREATE DATABASE InMemoryTest\nON PRIMARY (NAME = N'InMemoryTest_Data',\n\
  FILENAME = N'D:\\Data\\InMemoryTest_Data.mdf',\nSIZE = 5GB)\nLOG ON (NAME = N'InMemoryTest_Log',\n\
  FILENAME = N'L:\\Log\\InMemoryTest_Log.ldf');\n```\n\n为了使内存表能够保持持久性，它们必须像写入内存一样也写入磁盘，因为断电后内存中的数据会丢失。持久性（关系型数据集的\
  \ ACID 属性之一）意味着一旦事务提交，它就会保持已提交的状态。你可以拥有一个持久的内存表，也可以是一个非持久的表。对于非持久表，你可能已经提交了事务，但仍然可能丢失该数据，这与\
  \ SQL Server 中标准表的工作方式不同。最广为人知的非持久数据用途包括会话状态或时间敏感的信息，如电子购物车。总之，内存存储与你标准关系表中通常的存储方式不同。因此，必须创建一个单独的文件组和文件。为此，你可以直接修改数据库，如下所示：\n\
  \n```\nALTER DATABASE InMemoryTest\nADD FILEGROUP InMemoryTest_InMemoryData\nCONTAINS\
  \ MEMORY_OPTIMIZED_DATA;\nALTER DATABASE InMemoryTest\nADD FILE (NAME = 'InMemoryTest_InMemoryData',\n\
  FILENAME = 'D:\\Data\\InMemoryTest_InMemoryData.ndf')\nTO FILEGROUP InMemoryTest_InMemoryData;\n\
  ```\n\n我本来可以直接修改你一直在试验的 AdventureWorks2017 数据库，但另一个关于内存优化表的考虑是，一旦创建了特殊的文件组，就无法将其移除。你只能删除整个数据库。这就是为什么我要用一个单独的数据库进行试验。这样更安全。这也是促使你在实施内存技术时需要谨慎考虑方式和地点的原因之一。你根本无法在不永久性修改生产服务器的情况下在其上进行尝试。\n\
  \n使用内存 OLTP 的数据库在功能上有一些限制。\n\n*   `DBCC CHECKDB`：你可以运行一致性检查，但内存优化表将被跳过。如果你试图运行`DBCC\
  \ CHECKTABLE`，会得到一个错误。\n*   `AUTO_CLOSE`：此功能不受支持。\n*   `DATABASE SNAPSHOT`：此功能不受支持。\n\
  *   `ATTACH_REBUILD_LOG`：此功能也不受支持。\n*   数据库镜像：你无法镜像包含`MEMORY_OPTIMIZED_DATA`文件组的数据库。但是，可用性组提供了无缝体验，故障转移群集也支持内存表（但这会影响恢复时间）。\n\
  \n一旦这些修改完成，你就可以开始在系统中创建内存表了。\n\n\n\n## 创建表\n\n### 基本语法与示例\n\n一旦数据库设置完成，你就可以创建如前所述的内存优化表。实际的语法非常简单。我将尽可能复制\
  \ AdventureWorks2017 中的 `Person.Address` 表。\n\n```sql\nUSE InMemoryTest;\nGO\nCREATE\
  \ TABLE dbo.Address\n(AddressID INT IDENTITY(1, 1) NOT NULL PRIMARY KEY NONCLUSTERED\
  \ HASH\nWITH (BUCKET_COUNT = 50000),\nAddressLine1 NVARCHAR(60) NOT NULL,\nAddressLine2\
  \ NVARCHAR(60) NULL,\nCity NVARCHAR(30) NOT NULL,\nStateProvinceID INT NOT NULL,\n\
  PostalCode NVARCHAR(15) NOT NULL,\n--SpatialLocation geography NULL,\n--rowguid\
  \ uniqueidentifier ROWGUIDCOL  NOT NULL CONSTRAINT DF_Address_rowguid  DEFAULT (newid()),\n\
  ModifiedDate DATETIME NOT NULL\nCONSTRAINT DF_Address_ModifiedDate\nDEFAULT (GETDATE()))\n\
  WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA);\n```\n\n这将在系统内存中创建一个持久表，使用你定义的磁盘空间来保留数据的持久副本，确保在断电情况下不会丢失数据。它有一个像常规\
  \ SQL Server 表一样的 `IDENTITY` 值作为主键（但是，在此版本的 SQL Server 中，若要使用 `IDENTITY` 而不是 `SEQUENCE`，你将无法将定义设置为除\
  \ `(1,1)` 以外的任何值）。你会注意到索引定义不是聚集的，而是 `NONCLUSTERED HASH`。我将在下一节讨论索引和像 `BUCKET_COUNT`\
  \ 这样的内容。你还会注意到我不得不注释掉两个列：`SpatialLocation` 和 `rowguid`。它们使用的数据类型在内存优化表中不可用。最后，`WITH`\
  \ 语句通过定义 `MEMORY_OPTIMIZED=ON` 来让 SQL Server 知道将此表放置在哪里。你可以通过将 `WITH` 子句修改为使用 `DURABILITY=SCHEMA_ONLY`\
  \ 来创建一个更快的表。这允许数据丢失，但使表更快，因为没有任何内容会写入磁盘。\n\n### 不支持的\n\n有许多不支持的数据类型可能会阻止你利用内存优化表。\n\
  \n*   `XML`\n*   `ROWVERSION`\n*   `SQL_VARIANT`\n*   `HIERARCHYID`\n*   `DATETIMEOFFSET`\n\
  *   `GEOGRAPHY/GEOMETRY`\n*   用户定义的数据类型\n\n除了数据类型之外，你还会遇到其他限制。我将在“内存索引”部分讨论索引要求。从\
  \ SQL Server 2016 开始，增加了对外键、检查约束和唯一约束的支持。\n\n### 查询与数据加载\n\n一旦表在内存中创建，你就可以像访问常规表一样访问它。如果我现在针对它运行一个查询，它不会返回任何行，但它会正常运行。\n\
  \n```sql\nSELECT a.AddressID\nFROM dbo.Address AS a\nWHERE a.AddressID = 42;\n```\n\
  \n因此，为了在数据库中试验一些实际数据，请继续将 AdventureWorks2017 中 `Person.Address` 存储的信息加载到这个新数据库中存储在内存中的新表中。\n\
  \n```sql\nCREATE TABLE dbo.AddressStaging (AddressLine1 NVARCHAR(60) NOT NULL,\n\
  AddressLine2 NVARCHAR(60) NULL,\nCity NVARCHAR(30) NOT NULL,\nStateProvinceID INT\
  \ NOT NULL,\nPostalCode NVARCHAR(15) NOT NULL);\nINSERT dbo.AddressStaging (AddressLine1,\n\
  AddressLine2,\nCity,\nStateProvinceID,\nPostalCode)\nSELECT a.AddressLine1,\na.AddressLine2,\n\
  a.City,\na.StateProvinceID,\na.PostalCode\nFROM AdventureWorks2017.Person.Address\
  \ AS a;\nINSERT dbo.Address (AddressLine1,\nAddressLine2,\nCity,\nStateProvinceID,\n\
  PostalCode)\nSELECT a.AddressLine1,\na.AddressLine2,\na.City,\na.StateProvinceID,\n\
  a.PostalCode\nFROM dbo.AddressStaging AS a;\nDROP TABLE dbo.AddressStaging;\n```\n\
  \n你不能在跨数据库查询中组合内存优化表，因此我不得不将大约 19,000 行加载到一个暂存表中，然后再将它们加载到内存优化表中。这并不是性能示例的一部分，但值得注意的是，在我的系统上，将数据插入标准表花了近\
  \ 850 毫秒，而将相同数据加载到内存优化表只花了 2 毫秒。\n\n但是，有了数据之后，我可以重新运行查询并实际看到结果，如图 24-1 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig1_HTML.jpg\
  \ 图 24-1　来自内存优化表的第一个查询结果诚然，这并不十分令人兴奋。因此，为了有一些有意义的东西可以操作，我将再创建几个表，以便你可以看到更多的查询行为。```sqlCREATE\
  \ TABLE dbo.StateProvince (StateProvinceID INT IDENTITY(1, 1) NOT NULL PRIMARY KEY\
  \ NONCLUSTERED HASHWITH (BUCKET_COUNT = 10000),StateProvinceCode NCHAR(3) COLLATE\
  \ Latin1_General_100_BIN2 NOT NULL,CountryRegionCode NVARCHAR(3) NOT NULL,Name VARCHAR(50)\
  \ NOT NULL,TerritoryID INT NOT NULL,ModifiedDate DATETIME NOT NULLCONSTRAINT DF_StateProvince_ModifiedDateDEFAULT\
  \ (GETDATE()))WITH (MEMORY_OPTIMIZED = ON);CREATE TABLE dbo.CountryRegion (CountryRegionCode\
  \ NVARCHAR(3) NOT NULL,Name VARCHAR(50) NOT NULL,ModifiedDate DATETIME NOT NULLCONSTRAINT\
  \ DF_CountryRegion_ModifiedDateDEFAULT (GETDATE()),CONSTRAINT PK_CountryRegion_CountryRegionCodePRIMARY\
  \ KEY CLUSTERED(CountryRegionCode ASC));```这是一个额外的内存优化表和一个标准表。我也会将数据加载到这些表中，以便你可以进行更有趣的查询。```sqlSELECT\
  \ sp.StateProvinceCode,sp.CountryRegionCode,sp.Name,sp.TerritoryIDINTO dbo.StateProvinceStagingFROM\
  \ AdventureWorks2017.Person.StateProvince AS sp;INSERT dbo.StateProvince (StateProvinceCode,CountryRegionCode,Name,TerritoryID)SELECT\
  \ StateProvinceCode,CountryRegionCode,Name,TerritoryIDFROM dbo.StateProvinceStaging;DROP\
  \ TABLE dbo.StateProvinceStaging;INSERT dbo.CountryRegion (CountryRegionCode,Name)SELECT\
  \ cr.CountryRegionCode,cr.NameFROM AdventureWorks2017.Person.CountryRegion AS cr;```###\
  \ 执行计划与性能数据加载后，以下查询返回单行，其执行计划如图 24-2 所示：![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig2_HTML.jpg](img/323849_5_En_24_Fig2_HTML.jpg)\n\
  \n图 24-2　显示内存优化表和标准表的执行计划\n\n```sql\nSELECT a.AddressLine1,\na.City,\na.PostalCode,\n\
  sp.Name AS StateProvinceName,\ncr.Name AS CountryName\nFROM dbo.Address AS a\nJOIN\
  \ dbo.StateProvince AS sp\nON sp.StateProvinceID = a.StateProvinceID\nJOIN dbo.CountryRegion\
  \ AS cr\nON cr.CountryRegionCode = sp.CountryRegionCode\nWHERE a.AddressID = 42;\n\
  ```\n\n如你所见，即使在使用内存优化表时，也完全有可能获得正常的执行计划。操作符甚至是相同的。在这个案例中，你有三个不同的索引查找操作。其中两个是针对你使用内存优化表创建的非聚集哈希索引，另一个是针对标准表的标准聚集索引查找。你可能还会注意到，此计划上的估计成本加起来是\
  \ 101%。在处理内存优化表时，你偶尔会看到这种异常，因为优化器为它们计算的成本与常规表截然不同。\n\n主要的性能提升来自于缺乏锁定和闩锁，允许大规模插入和更新，同时允许查询。但是，查询运行得也更快。上一个查询产生的执行时间和读取次数如图\
  \ 24-3 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig3_HTML.jpg](img/323849_5_En_24_Fig3_HTML.jpg)\n\
  \n图 24-3　内存优化表的查询指标\n\n针对 AdventureWorks2017 数据库运行类似的查询，会产生如图 24-4 所示的行为。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig4_HTML.jpg](img/323849_5_En_24_Fig4_HTML.jpg)\n\
  \n图 24-4　常规表的查询指标\n\n\n\n尽管使用内存表时执行时间明显更优，但读取操作的处理方式尚不明确。不过，由于我讨论的是从内存存储读取，而非内存中的页面或磁盘上的页面，而是针对哈希索引，因此在性能度量方面情况完全不同。你无需使用与之前完全相同的度量标准，而是应依赖执行时间。这种情况下，读取操作是系统活动的度量指标，因此可以预见，数值越高意味着数据访问越频繁，数值越低则访问越少。\n\
  \n在表就位且已证明插入和选择操作性能提升后，接下来让我们讨论可用于内存表的索引及其与标准索引的区别。\n\n## 内存索引\n\n一个内存表最多可同时创建八个索引。但每个内存优化表必须至少有一个索引。由主键定义的索引符合此要求。持久化表必须有一个主键。你可以创建三种索引类型：之前使用的非聚集哈希索引、非聚集索引和列存储索引。这些索引并非使用标准表创建的索引类型。首先，它们以内存中的方式维护，与内存表相同。其次，索引的持久性规则与内存表相同。内存索引也没有固定的页大小，因此不会产生碎片。让我们更详细地讨论每种索引类型。\n\
  \n### 哈希索引\n\n哈希索引并非仅仅是存储在内存中的平衡树索引。相反，哈希索引使用预定义的哈希桶（或表）以及键的哈希值，为检索表数据提供一种机制。SQL\
  \ Server 具有一个哈希函数，对于给定的输入，该函数始终会生成一个恒定的哈希值。这意味着对于给定的键值，你将始终获得相同的哈希值。你可以在哈希桶中存储同一哈希值的多个副本。拥有哈希值来检索点查找（即单行）使得操作效率极高——前提是你不会遇到大量哈希冲突。哈希冲突是指多个值存储在同一位置的情况。\n\
  \n这意味着正确使用哈希索引的关键在于确保值在各个桶中分布合理。你可以通过为索引定义桶数来实现这一点。对于我创建的第一个表 `dbo.Address`，我将桶数设置为\
  \ 50,000。当前该表中有 19,000 行数据。因此，通过将桶数设置为 50,000，我确保有足够的存储空间容纳现有的值集，并提供了充足的扩展余地。你需要设置合适的桶数，使其足够大但又不至于过大。如果桶数过小，你将在一个桶内存储大量数据，从而严重影响系统高效检索数据的能力。简而言之，最好让桶的容量偏大。如果你查看图\
  \ 24-5，可以从另一个角度理解这一点。\n\n![大量桶与少量桶中的哈希值](img/323849_5_En_24_Fig5_HTML.png)\n*图 24-5：大量桶与少量桶中的哈希值*\n\
  \n第一组桶呈现的是所谓的“浅分布”，即少量哈希值分布在大量桶中。这是一种更优的存储方案。正如你所见，有些桶可能是空的，但由于每个桶只包含一个值，因此查找速度很快。第二组桶显示了较小的桶数，即“深分布”。这意味着给定桶中的哈希值更多，需要在桶内进行扫描才能识别出各个哈希值。\n\
  \n微软关于桶数的建议是设置为表中行数的 1 到 2 倍。但是，由于无法修改内存表，你还需要考虑预期的增长。如果你认为内存表在未来三到六个月内很可能增长到三倍大小，你可能需要扩大桶数。桶数过大唯一可能遇到的问题是扫描操作耗时更长，因此会分配更多内存。但是，如果你的查询很可能导致扫描，那么你实在不应该使用非聚集哈希索引，而应改用非聚集索引。目前的建议是，在设置桶数时，不要超过你可能处理的唯一值数量的十倍。\n\
  \n你还需要关注一个哈希值可能返回多少个值。唯一索引和主键是使用哈希索引的首选，因为它们始终是唯一的。微软的建议是，如果平均而言，任何一个哈希值对应超过五个值，你就应该放弃使用非聚集哈希索引，转而使用非聚集索引。这是因为哈希桶仅充当指向存储在该桶中第一行的指针。然后，如果桶中存储了重复值或附加值，第一行会指向第二行，随后的每一行都指向下一行。这会将点查找操作转变为扫描操作，再次严重损害性能。这就是为什么重复值较少（少于五个）或唯一值最适合与哈希索引配合使用。\n\
  \n要查看哈希表中索引的分布情况，可以使用 `sys.dm_db_xtp_hash_index_stats`。\n\n```sql\nSELECT i.name\
  \ AS [index name],\nhs.total_bucket_count,\nhs.empty_bucket_count,\nhs.avg_chain_length,\n\
  hs.max_chain_length\nFROM sys.dm_db_xtp_hash_index_stats AS hs\nJOIN sys.indexes\
  \ AS i\nON hs.object_id = i.object_id\nAND hs.index_id = i.index_id\nWHERE OBJECT_NAME(hs.object_id)\
  \ = 'Address';\n```\n\n图 24-6 显示了此查询的结果。\n\n![查询 sys.dm_db_xtp_hash_index_stats\
  \ 的结果](img/323849_5_En_24_Fig6_HTML.jpg)\n*图 24-6：查询 sys.dm_db_xtp_hash_index_stats\
  \ 的结果*\n\n由此，你可以看到关于哈希索引创建和维护方式的一些有趣事实。你会注意到总桶数并非我设置的值 50,000。桶数向上取整到最接近的 2 的幂次方，在本例中是\
  \ 65,536。有 48,652 个空桶。平均链长度（由于这是一个唯一索引）为 1，因为值是唯一的。存在一些链值，这是因为当行被修改或更新时，会存储数据的版本，直到所有操作解决完毕。\n\
  \n\n\n## 非聚集索引\n\n非聚集索引基本上就像常规索引一样，只是它们与数据一起存储在内存中，以协助数据检索。它们也有指向数据存储位置的指针，类似于非聚集索引在堆表上的行为。内存中非聚集索引与标准非聚集索引之间一个有趣的区别是，SQL\
  \ Server 无法从内存中的索引中以相反顺序检索数据。其他行为似乎与标准索引大致相同。\n\n为了演示非聚集索引的实际应用，让我们看这个查询：\n\n```sql\n\
  SELECT  a.AddressLine1,\n        a.City,\n        a.PostalCode,\n        sp.Name\
  \ AS StateProvinceName,\n        cr.Name AS CountryName\nFROM    dbo.Address AS\
  \ a\nJOIN    dbo.StateProvince AS sp\n        ON sp.StateProvinceID = a.StateProvinceID\n\
  JOIN    dbo.CountryRegion AS cr\n        ON cr.CountryRegionCode = sp.CountryRegionCode\n\
  WHERE   a.City = 'Walla Walla';\n```\n\n当前的性能如图 24-7 所示。\n\n![查询未使用索引时的指标](img/323849_5_En_24_Fig7_HTML.jpg)\n\
  \n图 24-7  查询未使用索引时的指标\n\n图 24-8 显示了执行计划。\n\n![导致执行计划包含表扫描的查询](img/323849_5_En_24_Fig8_HTML.jpg)\n\
  \n图 24-8  导致执行计划包含表扫描的查询\n\n虽然内存中的表扫描肯定比磁盘上存储的表的相同扫描要快，但这仍然不是一个好的情况。此外，考虑到优化器认为需要满足`Merge\
  \ Join`而额外进行的`Filter`操作和`Sort`操作，这是一个有问题的查询。因此，你应该向表中添加一个索引以加速它。\n\n但是，你不能直接在`dbo.Address`表上运行`CREATE\
  \ INDEX`。相反，你有两个选择：重新创建表或修改表。你需要测试你的系统以确定哪种方法效果更好。为内存中表添加索引的`ALTER TABLE`命令可能代价高昂。如果你想删除表并重新创建它，表创建脚本现在看起来像这样：\n\
  \n```sql\nCREATE TABLE dbo.Address (\n    AddressID INT IDENTITY(1, 1) NOT NULL\
  \ PRIMARY KEY NONCLUSTERED HASH\n        WITH (BUCKET_COUNT = 50000),\n    AddressLine1\
  \ NVARCHAR(60) NOT NULL,\n    AddressLine2 NVARCHAR(60) NULL,\n    City NVARCHAR(30)\
  \ NOT NULL,\n    StateProvinceID INT NOT NULL,\n    PostalCode NVARCHAR(15) NOT\
  \ NULL,\n    ModifiedDate DATETIME NOT NULL\n        CONSTRAINT DF_Address_ModifiedDate\n\
  \        DEFAULT (GETDATE()),\n    INDEX nci NONCLUSTERED (City))\nWITH (MEMORY_OPTIMIZED\
  \ = ON);\n```\n\n使用`ALTER TABLE`命令创建相同的索引如下所示：\n\n```sql\nALTER TABLE dbo.Address\
  \ ADD INDEX nci (City);\n```\n\n将数据重新加载到新创建的表中后，你可以再次尝试查询。这次在我的系统上运行时间为 800 微秒，比之前的\
  \ 3.7 毫秒快得多。读取次数保持不变。图 24-9 显示了执行计划。\n\n![利用非聚集索引改进的执行计划](img/323849_5_En_24_Fig9_HTML.jpg)\n\
  \n图 24-9  利用非聚集索引改进的执行计划\n\n如你所见，非聚集索引被用来代替表扫描以提高性能，正如你对标准表上的索引所期望的那样。然而，与标准表不同，虽然这个查询拉取了不属于非聚集索引的列，但不需要键查找来从内存中的表检索数据，因为每个索引直接指向内存中所需数据的存储位置。这是相对于标准表行为的另一个虽小但重要的改进。\n\
  \n## 列存储索引\n\n关于向内存中的表添加列存储索引，实际上没有太多可说的。由于列存储索引在具有 100,000 行或更多的表上效果最佳，因此你需要大量内存来支持在内存中的表上实现它们。你仅限于聚集列存储索引。你也无法将筛选的列存储索引应用于内存中的表。除了这些限制之外，创建内存中的列存储索引与我们已经看到的索引相同：\n\
  \n```sql\nALTER TABLE dbo.Address ADD INDEX ccs CLUSTERED COLUMNSTORE;\n```\n\n\
  ## 统计信息维护\n\n内存中的表与标准表在索引创建方式上存在许多根本差异。索引维护（即碎片整理索引）不是你需要考虑的事情。然而，你确实需要关注内存中表的统计信息。内存中的索引维护的统计信息将需要更新。你还会希望获得有关内存中索引的信息，例如它们是通过扫描还是查找访问的。虽然跟踪所有这些信息的愿望是相同的，但实现的机制却不同。\n\
  \n实际上，你无法看到哈希索引上的统计信息。你可以针对索引运行`DBCC SHOW_STATISTICS`，但输出看起来像图 24-10。\n\n![内存中索引统计信息的空输出](img/323849_5_En_24_Fig10_HTML.jpg)\n\
  \n图 24-10  内存中索引统计信息的空输出\n\n这意味着没有办法查看内存中索引的统计信息。你可以检查任何非聚集索引的统计信息。无论你是否能看到这些统计信息，随着数据的变化，它们仍然会过时。在\
  \ SQL Server 2016 及更高版本中，内存中的表和索引的统计信息是自动维护的。规则与基于磁盘的统计信息相同。SQL Server 2014 没有自动统计信息维护，因此你必须使用手动方法。\n\
  \n你可以使用`sp_updatestats`。该过程的当前版本完全了解内存中的索引及其差异。你也可以使用`UPDATE STATISTICS`，但在 SQL\
  \ Server 2014 中，你必须将`FULLSCAN`或`RESAMPLE`与`NORECOMPUTE`一起使用，如下所示：\n\n```sql\nUPDATE\
  \ STATISTICS dbo.Address WITH FULLSCAN, NORECOMPUTE;\n```\n\n如果不使用此语法，看起来你正在尝试更改内存中表的统计信息，而你无法做到这一点。你会看到一个相当明确的错误。\n\
  \n```\nMsg 41346, Level 16, State 2, Line 1\nCREATE and UPDATE STATISTICS for memory\
  \ optimized tables requires the WITH FULLSCAN or RESAMPLE and the NORECOMPUTE options.\
  \ The WHERE clause is not supported.\n```\n\n将采样定义为`FULLSCAN`或`RESAMPLE`，然后通过使用`NORECOMPUTE`告知它你并非试图开启自动更新，统计信息将被更新。\n\
  \n在 SQL Server 2016 及更高版本中，你可以像控制其他统计信息一样控制采样方法。\n\n\n## 本地编译存储过程\n\n仅仅将表加载到内存并利用乐观方法大幅减少锁争用，就能带来显著的性能提升。而要让速度真正快起来，你还可以实现一项新特性：将存储过程编译成\
  \ DLL，在 SQL Server 可执行文件内部运行。这能让性能**飞起**。语法非常直接。以下是你如何将之前的查询拿来进行编译：\n\n```\nCREATE\
  \ PROC dbo.AddressDetails @City NVARCHAR(30)\nWITH NATIVE_COMPILATION,\nSCHEMABINDING,\n\
  EXECUTE AS OWNER\nAS\nBEGIN ATOMIC WITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT,\
  \ LANGUAGE = N'us_english')\nSELECT a.AddressLine1,\na.City,\na.PostalCode,\nsp.Name\
  \ AS StateProvinceName,\ncr.Name AS CountryName\nFROM dbo.Address AS a\nJOIN dbo.StateProvince\
  \ AS sp\nON sp.StateProvinceID = a.StateProvinceID\nJOIN dbo.CountryRegion AS cr\n\
  ON cr.CountryRegionCode = sp.CountryRegionCode\nWHERE a.City = @City;\nEND\n```\n\
  \n不幸的是，如果你尝试按当前定义运行此查询定义，会收到以下错误：\n\n```\nMsg 10775, Level 16, State 1, Procedure\
  \ AddressDetails, Line 7 [Batch Start Line 5013]\nObject 'dbo.CountryRegion' is\
  \ not a memory optimized table or a natively compiled inline table-valued function\
  \ and cannot be accessed from a natively compiled module.\n```\n\n虽然你可以查询内存表与标准表的混合体，但你只能针对内存表创建本地编译存储过程。我将使用前面展示的相同方法，将\
  \ `dbo.CountryRegion` 表加载到内存，然后再次运行脚本。这次它将编译成功。如果你再像之前那样使用 `@City = 'Walla Walla'`\
  \ 执行查询，执行时间甚至不会在 SSMS 里显示出来。你必须通过扩展事件捕获该事件，如图 24-11 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig11_HTML.jpg](img/323849_5_En_24_Fig11_HTML.jpg)\n\
  \n图 24-11\n扩展事件显示本地编译过程的执行时间\n\n那里的执行时间单位不是毫秒，而是微秒。因此，查询执行时间从原生的 3.7 毫秒，降到内存中的 800\
  \ 微秒，最终降到 451 微秒。这是一个相当可观的性能提升。\n\n但是，存在限制。如前所述，你必须只引用内存表。分配给过程的参数值不能接受 `NULL` 值。如果你选择将参数设为\
  \ `NOT NULL`，还必须提供初始值。否则，所有参数都是必需的。你必须对底层表强制实施架构绑定。最后，过程必须存在于一个 `ATOMIC BLOCK`（原子块）中。原子块要求事务中的所有语句要么全部成功，要么事务中的所有语句都会回滚。\n\
  \n关于本地编译过程，还有几个有趣的点。你只能检索估计的执行计划，而不是实际的执行计划。如果你在 SSMS 中开启实际计划然后执行查询，什么都不会出现。但是，如果你请求估计计划，是可以检索到的。图\
  \ 24-12 显示了之前创建过程的估计计划。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig12_HTML.jpg](img/323849_5_En_24_Fig12_HTML.jpg)\n\
  \n图 24-12\n本地编译过程的估计执行计划\n\n你会注意到它看起来与常规执行计划大体相似，但幕后存在很多差异。如果你点击 `SELECT` 运算符，它的属性要少得多。比较一下前面显示的编译存储过程的数据和之前图\
  \ 24-13 中运行的常规查询的属性。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig13_HTML.jpg](img/323849_5_En_24_Fig13_HTML.jpg)\n\
  \n图 24-13\n来自两个不同执行计划的 SELECT 运算符属性\n\n你期望看到的许多信息都消失了，因为本地编译过程的操作方式与其他查询不同。使用执行计划来确定这些查询的行为在这里与在标准查询中一样有价值，但内部机制会有所不同。\n\
  \n## 建议\n\n虽然内存表和本地编译存储过程能在 SQL Server 内带来性能的**飞跃式**提升，你仍然需要评估它们在你的场景下是否适用。施加于这些对象行为上的限制意味着它们并非在所有情况下都有用。此外，由于对硬件的要求以及需要企业级\
  \ SQL Server 安装，许多人将无法实现这些新对象及其行为。要确定你的工作负载是否是使用这些新对象的良好候选，你可以做几件事。\n\n### 基线\n\n\
  你应该已经计划通过使用性能监视器、动态管理对象、扩展事件以及你掌握的所有其他工具来收集各种指标，从而为系统建立性能基线。一旦有了基线，你就可以判断你的工作负载是否可能从内存表减少的锁定和增加的速度中受益。\n\
  \n### 合适的工作负载\n\n这项技术被称为内存 OLTP 表是有原因的。如果你处理的系统主要以读取为主，仅进行每晚或间歇性加载，或者在线事务处理工作负载非常低，那么内存表和本地编译过程不太可能为你带来重大好处。如果你遇到系统延迟很高的问题，内存表可能是个不错的解决方案。微软已经概述了几种其他可能受益的工作负载，你可以考虑使用内存表和本地编译过程；参见在线文档\
  \ ( [`http://bit.ly/1r6dmKY`](http://bit.ly/1r6dmKY) )。\n\n\n### 内存优化顾问\n\n要快速简便地判断某个表是否适合移至内存中存储，微软在\
  \ SSMS 中提供了一个工具。如果你使用 `对象资源管理器` 导航到某个特定的表，你可以右键单击该表，然后从上下文菜单中选择 `内存优化顾问`。这将打开一个向导。如果我选择之前手动迁移的\
  \ `Person.Address` 表，初始检查将找出所有在内存中表不受支持的列。这将导致向导停止，并且没有其他选项可用。输出结果如图 24-14 所示。\n\
  \n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig14_HTML.jpg](img/323849_5_En_24_Fig14_HTML.jpg)\n\
  \n图 24-14：显示所有不支持数据类型的表内存优化顾问\n\n这意味着，按当前结构，此表不是移至内存中存储的候选对象。为了让你能清晰地看到该工具的运行过程，我将在之前创建的\
  \ `InMemoryTest` 数据库中创建该表的干净副本，如下所示：\n\n```\nUSE InMemoryTest;\nGO\nCREATE TABLE\
  \ dbo.AddressStaging\n(\n    AddressID      INT           NOT NULL IDENTITY(1, 1)\
  \ PRIMARY KEY,\n    AddressLine1   NVARCHAR(60)  NOT NULL,\n    AddressLine2   NVARCHAR(60)\
  \  NULL,\n    City           NVARCHAR(30)  NOT NULL,\n    StateProvinceID INT  \
  \        NOT NULL,\n    PostalCode     NVARCHAR(15)  NOT NULL\n);\n```\n\n现在，运行\
  \ `内存优化顾问` 在第一步会得到完全不同的结果，如图 24-15 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig15_HTML.jpg](img/323849_5_En_24_Fig15_HTML.jpg)\n\
  \n图 24-15：内存优化顾问的首次检查成功\n\n向导的下一步显示了一组关于使用内存中表将在你的 T-SQL 中引发的差异的标准警告，以及指向有关这些限制的进一步阅读资料的链接。这是一个有用的提醒，表明如果你选择将此表迁移到内存中存储，可能需要调整你的代码。你可以在图\
  \ 24-16 中看到。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig16_HTML.jpg](img/323849_5_En_24_Fig16_HTML.jpg)\n\
  \n图 24-16：数据迁移警告\n\n你可以在此处停止，并单击 `报告` 按钮以生成针对你的表运行的检查报告。或者，你可以使用向导实际将表移入内存。从警告页面单击\
  \ `下一步` 将打开一个选项页面，你可以在其中确定表将如何迁移到内存中。你可以选择旧表的名称。它假设你将为内存中表保留相同的表名。还有其他几个选项可用，如图\
  \ 24-17 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig17_HTML.jpg](img/323849_5_En_24_Fig17_HTML.jpg)\n\
  \n图 24-17：设置将标准表迁移到内存中的选项\n\n单击 `下一步`，你需要确定如何创建表的主键。你可以为其提供一个名称。然后你必须选择是使用非聚集哈希索引还是非聚集索引。如果选择非聚集哈希索引，则必须提供存储桶计数。图\
  \ 24-18 展示了我如何以与之前使用 T-SQL 大致相同的方式配置键。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig18_HTML.jpg](img/323849_5_En_24_Fig18_HTML.jpg)\n\
  \n图 24-18：选择新的内存中表主键的配置\n\n单击 `下一步` 将显示你所做选择的摘要，并启用屏幕底部的按钮以立即迁移表。它将迁移表，按照指示重命名旧表，如果你选择了该选项，还将迁移数据。成功迁移的输出如图\
  \ 24-19 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig19_HTML.jpg](img/323849_5_En_24_Fig19_HTML.jpg)\n\
  \n图 24-19：使用向导成功迁移内存中表\n\n`内存优化顾问` 可以识别哪些表可以实际移入内存，并可以为你完成这项工作。但是，它没有判断哪些表应该移入内存的智能。你仍然需要自己思考这个问题。\n\
  \n### 本地编译顾问\n\n与 `内存优化顾问` 功能类似，`本地编译顾问` 可以针对现有的存储过程运行，以确定它是否可以本地编译。然而，它的功能比之前的向导要简单得多。为了展示其实际操作，我将创建两个不同的过程，如下所示：\n\
  \n```\nCREATE OR ALTER PROCEDURE dbo.FailWizard (@City NVARCHAR(30))\nAS\nSELECT\
  \ a.AddressLine1,\n       a.City,\n       a.PostalCode,\n       sp.Name AS StateProvinceName,\n\
  \       cr.Name AS CountryName\nFROM dbo.Address AS a\nJOIN dbo.StateProvince AS\
  \ sp\n    ON sp.StateProvinceID = a.StateProvinceID\nJOIN dbo.CountryRegion AS cr\
  \ WITH (NOLOCK)\n    ON cr.CountryRegionCode = sp.CountryRegionCode\nWHERE a.City\
  \ = @City;\nGO\nCREATE OR ALTER PROCEDURE dbo.PassWizard (@City NVARCHAR(30))\n\
  AS\nSELECT a.AddressLine1,\n       a.City,\n       a.PostalCode,\n       sp.Name\
  \ AS StateProvinceName,\n       cr.Name AS CountryName\nFROM dbo.Address AS a\n\
  JOIN dbo.StateProvince AS sp\n    ON sp.StateProvinceID = a.StateProvinceID\nJOIN\
  \ dbo.CountryRegion AS cr\n    ON cr.CountryRegionCode = sp.CountryRegionCode\n\
  WHERE a.City = @City;\nGO\n```\n\n第一个过程包含一个 `NOLOCK` 提示，该提示不能在内存中表上运行。第二个过程只是本章一直在使用的那个过程的重复。执行脚本创建两个过程后，我可以通过右键单击存储过程\
  \ `dbo.FailWizard` 并从上下文菜单中选择 `本地编译顾问` 来访问它。跳过向导开始屏幕后，第一步识别出了该过程的一个问题，如图 24-20 所示。\n\
  \n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig20_HTML.jpg](img/323849_5_En_24_Fig20_HTML.jpg)\n\
  \n图 24-20：本地编译顾问已识别出不适当的 T-SQL 语法\n\n请特别注意图 24-20 顶部的注释。它指出，所有表都必须是内存优化表才能本地编译该过程。但是，该检查不是\
  \ `本地编译顾问` 检查的一部分。\n\n按照提示单击 `下一步`，然后你可以看到向导识别出的问题，如图 24-21 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig21_HTML.jpg](img/323849_5_En_24_Fig21_HTML.jpg)\n\
  \n图 24-21：本地编译顾问识别出代码中的问题\n\n向导显示了有问题的 T-SQL，并显示了该 T-SQL 出现的行号。这就是此向导提供的全部信息。如果我对另一个过程\
  \ `dbo.WizardPass` 运行相同的检查，它只会报告没有任何不适当的 T-SQL 语句。没有额外的操作来为我编译该过程。要使该过程能够编译，需要添加本章前面定义的附加功能。除了此语法检查之外，没有其他帮助来本地编译存储过程。\n\
  \n\n## 概要\n\n本章介绍了**内存优化表**和**本机编译存储过程**的概念。这些是实现潜在巨大性能提升的高端方法。然而，大规模实施这些新对象存在许多限制。你需要一台拥有足够内存来支持额外负载的机器。在生产环境中采用此方法之前，你还需要仔细测试你的数据和负载。但是，如果你确实需要让你的\
  \ OLTP 系统运行得比以往任何时候都快，这是一项可行的技术。它也在 Azure SQL Database 中得到支持。\n\n下一章概述了查询和索引优化如何在\
  \ SQL Server 2017 和 Azure SQL Database 中实现部分自动化。\n\n# 25. Azure SQL Database 和 SQL\
  \ Server 中的自动调优\n\n虽然许多查询性能调优涉及本书中提出的关于系统、查询、统计信息、索引等的详细知识，但查询调优的某些方面本质上是相当机械的。注意到缺失索引建议，然后测试该索引是帮助还是损害了某个查询，以及是否损害了其他查询，这个过程可以被自动化。对于某些明显的执行计划优于另一种的不良参数探测问题也是如此。微软已经开始自动化这些查询调优方面的进程。此外，它正在向\
  \ Azure SQL Database 和 SQL Server 中引入其他形式的自动化机制，这些机制将通过即时调优查询的各个方面来帮助你。别担心，本书的其余部分仍然非常有用，因为这些方法只能解决相当狭窄范围的问题。你仍然需要做大量具有挑战性的工作。\n\
  \n在本章中，我将涵盖以下内容：\n\n```\n*   自动计划修正\n*   Azure SQL Database 自动索引管理\n*   自适应查询处理\n\
  ```\n\n## 自动计划修正\n\nSQL Server 2017 和 Azure SQL Database 能够自动修正执行计划的机制最好这样总结：微软利用了现在可用的数据（这要归功于`Query\
  \ Store`，有关`Query Store`的更多详细信息，请参见第 11 章），并将其武器化以完成一些惊人的事情。随着数据的变化，你的统计信息可能会改变。你可能有一个编写良好的查询和适当的索引，但随着时间的推移，随着统计信息的变化，你可能会看到一个新的执行计划被引入，从而损害性能，基本上就是第\
  \ 17 章中概述的不良参数探测问题。其他因素也可能导致良好的查询性能变差，例如累积更新改变了引擎行为。无论原因是什么，如果你能让正确的计划到位，你的代码和结构仍然支持良好的性能。显然，你可以自己使用通过`Query\
  \ Store`提供的工具来识别性能下降的查询以及哪些计划提供了更好的性能，然后强制使用这些计划。然而，请注意上面概述的整个过程非常直接。\n\n```\n1.\
  \  监控查询性能，并注意一个过去未更改的查询突然出现性能变化。\n2.  确定该查询的执行计划是否已更改。\n3.  如果计划已更改且性能下降，则强制使用之前的计划。\n\
  4.  测量性能以查看其是下降、改善还是保持不变。\n5.  如果性能下降，则撤销更改。\n```\n\n简而言之，这就是在 SQL Server 内部发生的事情。SQL\
  \ Server 内部的一个进程观察`Query Store`中的查询性能。如果它看到查询保持不变，但在执行计划更改时性能下降，它会将其记录为建议的计划回归。如果你启用了自动查询调优，当识别出回归时，它将自动强制使用最后一个良好的计划。然后，自动进程将观察行为，以查看强制计划是否是一个糟糕的选择。如果是，它会纠正问题并记录该事实供你稍后查看。简而言之，微软通过利用`Query\
  \ Store`中可用的数据，实现了自动化修复不良参数探测等问题。\n\n## 调优建议\n\n## 了解 SQL Server 调优建议\n\n首先，让我们看看\
  \ SQL Server 如何识别调优建议。由于这个过程完全依赖于**查询存储**，因此只能在启用了查询存储的数据库上启用此功能（参见第 11 章）。启用查询存储后，无论是\
  \ SQL Server 2017 还是 Azure SQL Database，都会自动开始监控性能回退的执行计划。一旦启用了查询存储，您无需再启用其他任何设置。\n\
  \nMicrosoft 并未精确定义一个执行计划在何种程度上会变为回退状态并被标记。因此，为保险起见，我们将使用 Adam Machanic 的脚本 (`make_big_adventure.sql`)\
  \ 在 AdventureWorks 数据库中创建一些非常大的表。该脚本可从 [`http://bit.ly/2mNBIhg`](http://bit.ly/2mNBIhg)\
  \ 下载。我们在第 9 章处理列存储索引时也用过它。如果您仍在使用同一个数据库，请先删除那些表再重新创建。这将为我们提供一个非常大的数据集，从中可以创建一个查询，该查询会根据传递给它的数据值表现出两种不同的行为。要查看一个回退的执行计划，让我们看看以下脚本：\n\
  \n```sql\nCREATE INDEX ix_ActualCost ON dbo.bigTransactionHistory (ActualCost);\n\
  GO\n--a simple query for the experiment\nCREATE OR ALTER PROCEDURE dbo.ProductByCost\
  \ (@ActualCost MONEY)\nAS\nSELECT bth.ActualCost\nFROM dbo.bigTransactionHistory\
  \ AS bth\nJOIN dbo.bigProduct AS p\nON p.ProductID = bth.ProductID\nWHERE bth.ActualCost\
  \ = @ActualCost;\nGO\n--ensuring that Query Store is on and has a clean data set\n\
  ALTER DATABASE AdventureWorks2017 SET QUERY_STORE = ON;\nALTER DATABASE AdventureWorks2017\
  \ SET QUERY_STORE CLEAR;\nGO\n```\n\n这段代码创建了一个我们将在 `dbo.bigTransactionHistory` 表上使用的索引。它还创建了一个我们将要测试的简单存储过程。最后，该脚本确保查询存储设置为\
  \ `ON` 并且清空了所有数据。准备好这些之后，我们可以如下运行我们的测试脚本：\n\n```sql\n--establish a history of query\
  \ performance\nEXEC dbo.ProductByCost @ActualCost = 8.2205;\nGO 30\n--remove the\
  \ plan from cache\nDECLARE @PlanHandle VARBINARY(64);\nSELECT  @PlanHandle = deps.plan_handle\n\
  FROM    sys.dm_exec_procedure_stats AS deps\nWHERE   deps.object_id = OBJECT_ID('dbo.ProductByCost');\n\
  IF @PlanHandle IS NOT NULL\nBEGIN\nDBCC FREEPROCCACHE(@PlanHandle);\nEND\nGO\n--execute\
  \ a query that will result in a different plan\nEXEC dbo.ProductByCost @ActualCost\
  \ = 0.0;\nGO\n--establish a new history of poor performance\nEXEC dbo.ProductByCost\
  \ @ActualCost = 8.2205;\nGO 15\n```\n\n这需要执行一段时间。完成后，我们的数据库中应该会有一条调优建议。参考上面的代码清单，我们通过至少执行查询\
  \ 30 次来建立特定的查询行为。当使用值 8.2205 时，查询本身只返回单行数据。所使用的执行计划如图 25-1 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig1_HTML.jpg](img/323849_5_En_25_Fig1_HTML.jpg)\n\
  \n*图 25-1 返回小数据集时查询的初始执行计划*\n\n虽然图 25-1 中显示的执行计划可能有一些调优机会，特别是包含了 `Key Lookup` 操作，但它对于小数据集效果很好。多次运行查询会在查询存储中积累历史记录。接下来，我们从缓存中移除该计划，当我们使用值\
  \ 0.0 时，会生成一个新计划，如图 25-2 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig2_HTML.jpg](img/323849_5_En_25_Fig2_HTML.jpg)\n\
  \n*图 25-2 大得多的数据集的执行计划*\n\n生成该计划后，我们再执行几次该过程（15 次似乎有效），以便清楚地表明我们看到的并非简单异常，而是确凿的计划回退正在进行。这将提示一条调优建议。\n\
  \n## 查看调优建议\n\n我们可以通过查看名为 `sys.dm_db_tuning_recommendations` 的新 DMV 来验证这一系列查询是否产生了调优建议。以下是一个返回有限结果集的示例查询：\n\
  \n```sql\nSELECT ddtr.type,\nddtr.reason,\nddtr.last_refresh,\nddtr.state,\nddtr.score,\n\
  ddtr.details\nFROM sys.dm_db_tuning_recommendations AS ddtr;\n```\n\n`sys.dm_db_tuning_recommendations`\
  \ 提供的信息远不止这些，但让我们先基于之前的计划回退来逐步解析当前看到的内容。您可以在图 25-3 中看到此查询的结果。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig3_HTML.jpg](img/323849_5_En_25_Fig3_HTML.jpg)\n\
  \n*图 25-3 来自 sys.dm_db_tuning_recommendations DMV 的第一条调优建议*\n\n这里呈现的信息既直观又有些令人困惑。首先，`TYPE`\
  \ 值很容易理解。这里的建议是，我们需要为此查询使用 `FORCE_LAST_GOOD_PLAN`。在出版时，这是目前唯一可用的选项，但随着额外自动调优机制的实现，这一点将会改变。`reason`\
  \ 值才是有趣之处。在本例中，需要恢复到先前计划的解释如下：\n\n```\nAverage query CPU time changed from 0.12ms\
  \ to 2180.37ms\n```\n\n我们的 CPU 为每次查询执行时间从不到 1 毫秒变为超过 2.2 秒。这是一个容易识别的问题。`last_refresh`\
  \ 值告诉我们建议中任何数据上次更改的时间。我们获得状态值，这是一个由两个字段组成的小型 JSON 文档：`currentValue` 和 `reason`。以下是先前结果集中的文档：\n\
  \n```\n{\"currentValue\":\"Active\",\"reason\":\"AutomaticTuningOptionNotEnabled\"\
  }\n```\n\n它显示此建议是 `Active` 状态，但由于我们尚未启用自动调优，因此未被实施。`Status` 字段有多种可能的值。我们将在下一节“启用自动调优”中介绍它们以及\
  \ `reason` 字段的值。得分是一个估计的影响值，范围在 0 到 100 之间。数值越高，表示建议进程的影响越大。最后，您会看到 `details`，这是另一个包含更多信息的\
  \ JSON 文档，如下所示：\n\n```json\n{\"planForceDetails\":{\"queryId\":2,\"regressedPlanId\"\
  :4,\"regressedPlanExecutionCount\":15,\"regressedPlanErrorCount\":0,\"regressedPlanCpuTimeAverage\"\
  :2.180373266666667e+006,\"regressedPlanCpuTimeStddev\":1.680328201712986e+006,\"\
  recommendedPlanId\":2,\"recommendedPlanExecutionCount\":30,\"recommendedPlanErrorCount\"\
  :0,\"recommendedPlanCpuTimeAverage\":1.176333333333333e+002,\"recommendedPlanCpuTimeStddev\"\
  :6.079253426385694e+001},\"implementationDetails\":{\"method\":\"TSql\",\"script\"\
  :\"exec sp_query_store_force_plan @query_id = 2, @plan_id = 2\"}}\n```\n\n这些信息以数据块的形式呈现，内容很多，所以让我们更直接地将其分解为网格：\n\
  \n\n## 调优建议详情\n\n| `planForceDetails` |   |   |\n| --- | --- | --- |\n|   | `queryID`\
  \ | 2: 来自查询存储的 `query_id` 值 |\n|   | `regressedPlanID` | 4: 问题计划来自查询存储的 `plan_id`\
  \ 值 |\n|   | `regressedPlanExecutionCount` | 15: 已使用退化计划的次数 |\n|   | `regressedPlanErrorCount`\
  \ | 0: 有值时表示执行期间的错误数 |\n|   | `regressedPlanCpuTimeAverage` | 2.18037326666667e+006:\
  \ 计划的平均 CPU 时间 |\n|   | `regressedPlanCpuTimeStddev` | 1.60328201712986e+006: 该值的标准差\
  \ |\n|   | `recommendedPlanID` | 2: 调优建议所建议的 `plan_id` |\n|   | `recommendedPlanExecutionCount`\
  \ | 30: 已使用推荐计划的次数 |\n|   | `recommendedPlanErrorCount` | 0: 有值时表示执行期间的错误数 |\n|\
  \   | `recommendedPlanCpuTimeAverage` | 1.176333333333333e+002: 计划的平均 CPU 时间 |\n\
  |   | `recommendedPlanCpuTimeStddev` | 6.079253426385694e+001: 该值的标准差 |\n| `implementationDetails`\
  \ |   |   |\n|   | Method | `TSql`: 值将始终为 T-SQL |\n|   | `script` | `exec sp_query_store_force_plan\
  \ @query_id = 2, @plan_id = 2` |\n\n这代表了调优建议的完整细节。无需启用自动调优，您就可以看到有关计划退化的建议以及提出这些建议的完整详细信息。您甚至可以获得脚本，使您能够在不启用自动计划修正的情况下执行建议的修复。\n\
  \n有了这些信息，您可以编写一个更复杂的查询来检索所有信息，以便充分调查这些建议，包括查看执行计划。您所需要做的就是直接查询 JSON 数据，然后将其与从查询存储中获得的其它信息连接起来，就像此脚本所做的那样：\n\
  \n```sql\nWITH DbTuneRec\nAS (SELECT ddtr.reason,\nddtr.score,\npfd.query_id,\n\
  pfd.regressedPlanId,\npfd.recommendedPlanId,\nJSON_VALUE(ddtr.state,\n'$.currentValue')\
  \ AS CurrentState,\nJSON_VALUE(ddtr.state,\n'$.reason') AS CurrentStateReason,\n\
  JSON_VALUE(ddtr.details,\n'$.implementationDetails.script') AS ImplementationScript\n\
  FROM sys.dm_db_tuning_recommendations AS ddtr\nCROSS APPLY\nOPENJSON(ddtr.details,\n\
  '$.planForceDetails')\nWITH (query_id INT '$.queryId',\nregressedPlanId INT '$.regressedPlanId',\n\
  recommendedPlanId INT '$.recommendedPlanId') AS pfd)\nSELECT qsq.query_id,\ndtr.reason,\n\
  dtr.score,\ndtr.CurrentState,\ndtr.CurrentStateReason,\nqsqt.query_sql_text,\nCAST(rp.query_plan\
  \ AS XML) AS RegressedPlan,\nCAST(sp.query_plan AS XML) AS SuggestedPlan,\ndtr.ImplementationScript\n\
  FROM DbTuneRec AS dtr\nJOIN sys.query_store_plan AS rp\nON rp.query_id = dtr.query_id\n\
  AND rp.plan_id = dtr.regressedPlanId\nJOIN sys.query_store_plan AS sp\nON sp.query_id\
  \ = dtr.query_id\nAND sp.plan_id = dtr.recommendedPlanId\nJOIN sys.query_store_query\
  \ AS qsq\nON qsq.query_id = rp.query_id\nJOIN sys.query_store_query_text AS qsqt\n\
  ON qsqt.query_text_id = qsq.query_text_id;\n```\n\n在观察了调优建议是如何得出之后，下一步是调查它们、实施它们，然后观察它们随时间的行为，或者您可以启用自动调优，这样就不必全程监控。\n\
  \n您需要知道，`sys.dm_db_tuning_recommendations` 中的信息不会持久化。如果数据库或服务器因任何原因离线，此信息将丢失。如果您发现自己定期使用此功能，应计划将其导出到更永久的位置。\n\
  \n## 启用自动调优\n\n启用自动调优的过程完全取决于您是在使用 Azure SQL Database 还是 SQL Server 2017。由于自动调优依赖于查询存储，因此开启它也是一项逐个数据库进行的操作。Azure\
  \ 提供了两种方法：使用 Azure 门户或使用 T-SQL 命令。SQL Server 2017 仅支持 T-SQL。我们将从 Azure 门户开始。\n\n\
  > 注意：Azure 门户会频繁更新。本书中的屏幕截图可能已过时，当您自己操作时可能会看到不同的图形。\n\n### Azure 门户\n\n我假设您已经拥有\
  \ Azure 帐户，并且知道如何创建 Azure SQL Database 并能导航到它。我们将从数据库的主边栏窗格开始。您可以在左侧看到各种标准设置。页面顶部将显示数据库的常规设置。页面中央将显示性能指标。最后，页面右下方是数据库功能。您可以在图\
  \ 25-4 中看到所有这些。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig4_HTML.jpg](img/323849_5_En_25_Fig4_HTML.jpg)\n\
  \n图 25-4\n\nAzure 门户上的数据库边栏窗格\n\n我们将重点关注屏幕右下角的详细信息，并单击自动调优功能。这将打开一个新边栏窗格，其中包含 Azure\
  \ 内自动调优的设置，如图 25-5 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig5_HTML.jpg](img/323849_5_En_25_Fig5_HTML.jpg)\n\
  \n图 25-5\n\nAzure SQL Database 的自动调优功能\n\n要在此数据库中启用自动调优，我们需要将 FORCE PLAN 的设置从默认为\
  \ OFF 的 INHERIT 更改为 ON。然后，您必须单击页面顶部的“应用”按钮。此过程完成后，您的选项应如图 25-6 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig6_HTML.jpg](img/323849_5_En_25_Fig6_HTML.jpg)\n\
  \n图 25-6\n\n自动调优选项更改为 FORCE PLAN 为 ON\n\n您可以为服务器更改这些设置，然后每个数据库可以自动继承它们。打开或关闭它们不会重置连接或以任何方式使数据库离线。其他选项将在本章后面的“Azure\
  \ SQL Database 自动索引管理”一节中讨论。\n\n完成此操作后，Azure SQL Database 将在查询退化时强制使用最后一个好计划，如您之前在“调优建议”部分所见。与之前一样，您可以查询\
  \ DMV 来检索信息。您也可以使用门户查看此信息。在 SQL Database 边栏窗格的左侧是功能列表。在“支持 + 疑难解答”标题下，您会看到“性能建议”。单击该选项将打开一个类似于图\
  \ 25-7 的屏幕。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig7_HTML.jpg](img/323849_5_En_25_Fig7_HTML.jpg)\n\
  \n图 25-7\n\n门户上的性能建议页面\n\n图 25-7 中显示的信息应该看起来部分熟悉。您已经从之前“调优建议”部分查询的 DMV 中看到了操作、建议和影响。从这里您可以手动应用建议，也可以查看已丢弃的建议。您还可以通过单击“自动化”按钮返回到设置屏幕。所有这些都利用了查询存储，它在所有新数据库中默认启用。\n\
  \n这就是在 Azure 中启用自动调优所需的全部操作。让我们看看如何在 SQL Server 2017 中操作。\n\n\n\n### SQL Server\
  \ 2017\n\n在 SQL Server 2017 中，目前没有图形界面来启用自动查询调优。相反，你必须使用一个 T-SQL 命令。你也可以在 Azure\
  \ SQL 数据库中使用相同的命令。命令如下：\n\n```sql\nALTER DATABASE current SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN\
  \ = ON);\n```\n\n当然，你可以用适当的数据库名称替换我在这里使用的默认值 `current`。这个命令一次只能在一个数据库上运行。如果你想要为实例上的所有数据库启用自动调优，你必须在那些其他数据库创建之前，在\
  \ `model` 数据库中启用它，或者你需要为服务器上的每个数据库单独开启它。\n\n目前 `automatic_tuning` 的唯一选项就是像我们这样做，启用强制使用最后一个良好执行计划。你可以使用以下命令禁用此功能：\n\
  \n```sql\nALTER DATABASE current SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = OFF);\n\
  ```\n\n如果你运行了此脚本，请记得再次使用 `ON` 运行它，以保持执行计划的自动调优功能。\n\n### 实际应用中的自动调优\n\n启用自动调优后，我们可以重新运行生成退化计划的脚本。然而，为了验证自动调优是否正在运行，让我们使用一个新的系统视图\
  \ `sys.database_automatic_tuning_options` 来进行验证。\n\n```sql\nSELECT name,\ndesired_state,\n\
  desired_state_desc,\nactual_state,\nactual_state_desc,\nreason,\nreason_desc\nFROM\
  \ sys.database_automatic_tuning_options;\n```\n\n结果显示 `desired_state` 值为 `1`，`desired_state_desc`\
  \ 值为 `On`。\n\n我在进行测试时会首先清除缓存，如下所示：\n\n```sql\nALTER DATABASE SCOPED CONFIGURATION\
  \ CLEAR PROCEDURE_CACHE;\nGO\nEXEC dbo.ProductByCost @ActualCost = 8.2205;\nGO 30\n\
  --remove the plan from cache\nDECLARE @PlanHandle VARBINARY(64);\nSELECT  @PlanHandle\
  \ = deps.plan_handle\nFROM    sys.dm_exec_procedure_stats AS deps\nWHERE   deps.object_id\
  \ = OBJECT_ID('dbo.ProductByCost');\nIF @PlanHandle IS NOT NULL\nBEGIN\nDBCC FREEPROCCACHE(@PlanHandle);\n\
  END\nGO\n--execute a query that will result in a different plan\nEXEC dbo.ProductByCost\
  \ @ActualCost = 0.0;\nGO\n--establish a new history of poor performance\nEXEC dbo.ProductByCost\
  \ @ActualCost = 8.2205;\nGO 15\n```\n\n现在，当我们使用我之前的示例脚本查询 DMV 时，结果是不同的，如图 25-8 所示。\n\
  \n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig8_HTML.jpg](img/323849_5_En_25_Fig8_HTML.jpg)\n\
  \n图 25-8 退化的查询已被强制执行\n\n`CurrentState` 值已更改为 `Verifying`。它将在多次执行中衡量性能，就像之前一样。如果性能下降，它将取消强制执行计划。此外，如果出现超时或执行中止等错误，计划也将被取消强制。在这个事件中，你还会看到\
  \ `sys.dm_db_tuning_recommendations` 中的 `error_prone` 列变为 `Yes`。\n\n如果你重启服务器，`sys.dm_db_tuning_recommendations`\
  \ 中的信息将被删除。同时，任何已被强制的计划也将被移除。一旦查询再次退化，假设查询存储历史记录存在，任何计划强制将自动重新启用。如果这是个问题，你总是可以手动强制执行计划。\n\
  \n如果一个查询被强制执行后性能下降，它将被取消强制，如前所述。如果该查询再次出现性能下降，计划强制将被移除，并且该查询将被标记，至少在服务器重启（信息被移除）之前，它不会被再次强制执行。\n\
  \n如果我们查看查询存储报告，也可以看到强制的计划。图 25-9 显示了自动调优导致计划强制执行的结果。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig9_HTML.jpg](img/323849_5_En_25_Fig9_HTML.jpg)\n\
  \n图 25-9 “具有强制计划的查询”报告显示自动调优的结果\n\n这些报告不会告诉你为什么计划被强制。但是，如果需要，你总是可以去 DMV 查找该信息。\n\
  \n### Azure SQL 数据库自动索引管理\n\n自动索引管理的核心概念是将 Azure SQL 数据库定位为平台即服务。大量功能，如打补丁、备份、损坏测试，以及高可用性和许多其他功能，都在微软云中为你管理。因此，将他们的知识和系统管理能力应用于索引工作是顺理成章的。此外，由于\
  \ Azure SQL 数据库的所有处理都在微软位于 Azure 的服务器场中进行，他们可以在监控你的系统时运用机器学习算法。\n\n请注意，微软不会从你的查询、数据或任何存储在那里的信息中收集私人信息。它只是使用查询指标来衡量行为。提前说明这一点很重要，因为关于这些功能的错误信息已经传播开来。\n\
  \n然而，在我们启用索引管理之前，让我们先生成一些糟糕的查询行为。我正在针对 Azure 中的示例数据库 `AdventureWorksLT` 使用两个脚本。当你在\
  \ Azure 中配置数据库时，示例数据库（门户中的选项之一）简单且易于立即实施。这就是我喜欢在示例中使用它的原因。首先，这是一个生成一些存储过程的 T-SQL\
  \ 脚本：\n\n```sql\nCREATE OR ALTER PROCEDURE dbo.CustomerInfo\n(@Firstname NVARCHAR(50))\n\
  AS\nSELECT c.FirstName,\nc.LastName,\nc.Title,\na.City\nFROM SalesLT.Customer AS\
  \ c\nJOIN SalesLT.CustomerAddress AS ca\nON ca.CustomerID = c.CustomerID\nJOIN SalesLT.Address\
  \ AS a\nON a.AddressID = ca.AddressID\nWHERE c.FirstName = @Firstname;\nGO\nCREATE\
  \ OR ALTER PROCEDURE dbo.EmailInfo (@EmailAddress nvarchar(50))\nAS\nSELECT c.EmailAddress,\n\
  c.Title,\nsoh.OrderDate\nFROM SalesLT.Customer AS c\nJOIN SalesLT.SalesOrderHeader\
  \ AS soh\nON soh.CustomerID = c.CustomerID\nWHERE c.EmailAddress = @EmailAddress;\n\
  GO\nCREATE OR ALTER PROCEDURE dbo.SalesInfo (@firstName NVARCHAR(50))\nAS\nSELECT\
  \ c.FirstName,\nc.LastName,\nc.Title,\nsoh.OrderDate\nFROM SalesLT.Customer AS c\n\
  JOIN SalesLT.SalesOrderHeader AS soh\nON soh.CustomerID = c.CustomerID\nWHERE c.FirstName\
  \ = @firstName\nGO\nCREATE OR ALTER PROCEDURE dbo.OddName (@FirstName NVARCHAR(50))\n\
  AS\nSELECT c.FirstName\nFROM SalesLT.Customer AS c\nWHERE c.FirstName BETWEEN 'Brian'\n\
  AND     @FirstName\nGO\n```\n\n接下来，这是一个 PowerShell 脚本，用于多次调用这些过程：\n\n\n## Azure\
  \ SQL Database 自动索引管理\n\n这些脚本将使我们能够生成必要的负载，以触发自动索引管理功能。该 PowerShell 脚本必须运行大约 12\
  \ 到 18 小时，才能在 Azure 中收集到足够的数据。但是，您必须首先更改一些要求设置。\n\n要使自动索引管理正常工作，必须在 Azure SQL 数据库上启用查询存储。查询存储在\
  \ Azure 中默认是启用的，因此如果您将其关闭了，只需要将其重新打开。为确保其已启用，您可以运行以下脚本：\n\n```powershell\nALTER\
  \ DATABASE CURRENT SET QUERY_STORE = ON;\n```\n\n启用查询存储后，您现在需要导航到数据库的“概述”屏幕。图 25-2\
  \ 显示了完整的屏幕。作为提醒，屏幕底部有许多选项，其中之一是“自动调优”，如图 25-10 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig10_HTML.jpg](img/323849_5_En_25_Fig10_HTML.jpg)\n\
  *图 25-10 Azure SQL 数据库中的数据库功能，包括“自动调优”*\n\n自动调优是右上角的选项。请记住，Azure 可能会发生变化，因此您的屏幕可能看起来与我的不同。单击“自动调优”按钮将打开如图\
  \ 25-11 所示的屏幕。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig11_HTML.jpg](img/323849_5_En_25_Fig11_HTML.jpg)\n\
  *图 25-11 在 Azure SQL 数据库中启用“自动调优”*\n\n在这种情况下，我启用了所有三个选项，因此我不仅可以获得前面章节描述的通过自动调优获得的“最后一个好计划”，还同时开启了自动索引管理。\n\
  \n启用这些功能后，我们现在可以运行 PowerShell 脚本至少 12 小时。您可以通过查询 `sys.dm_db_tuning_recommendations`（如我们之前所做）来验证是否已收到索引。这里我使用一个简单的脚本，仅从\
  \ DMV 中检索核心信息：\n\n```sql\nSELECT ddtr.type,\nddtr.reason,\nddtr.last_refresh,\n\
  ddtr.state,\nddtr.score,\nddtr.details\nFROM sys.dm_db_tuning_recommendations AS\
  \ ddtr;\n```\n\n在我的 Azure SQL 数据库上的结果如图 25-12 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig12_HTML.jpg](img/323849_5_En_25_Fig12_HTML.jpg)\n\
  *图 25-12 Azure SQL 数据库中的自动调优结果*\n\n如您所见，我的系统上发生了多个调优事件。第一个是我们在此示例中感兴趣的 `CreateIndex`\
  \ 类型。您也可以查看 Azure 门户以获取自动调优的运行情况。在门户屏幕的左侧，靠近底部，您应该看到一个标记为“性能建议”的“支持 + 疑难解答”选项。选择该选项将打开一个类似图\
  \ 25-13 的窗口。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig13_HTML.jpg](img/323849_5_En_25_Fig13_HTML.jpg)\n\
  *图 25-13 性能建议和调优历史记录*\n\n由于我们已经启用了所有自动调优，因此目前没有建议。自动调优已经生效。但是，我们仍然可以深入挖掘并收集更多信息。单击\
  \ `CREATE INDEX` 选项以打开一个新窗口。当自动调优尚未经过验证时，窗口将默认在“估计影响”视图中打开，如图 25-14 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig14_HTML.jpg](img/323849_5_En_25_Fig14_HTML.jpg)\n\
  *图 25-14 推荐索引的估计影响视图*\n\n在我的例子中，索引已经创建，并且正在验证该索引是否正确支持查询。您可以很好地了解该建议，并且它看起来应该很熟悉，因为其信息与前面自动计划调优中包含的信息类似。不同之处在于细节，这里我们有的是一个建议的索引、索引类型、架构、表、索引列以及任何包含列，而不是一个建议的计划。\n\
  \n您可以通过查看屏幕顶部的按钮来控制这些自动更改。您可以单击“撤消”手动删除更改。您可以查看用于生成更改的脚本，也可以查看收集的查询指标。\n\n我的系统默认打开“验证报告”视图，如图\
  \ 25-15 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig15_HTML.jpg](img/323849_5_En_25_Fig15_HTML.jpg)\n\
  *图 25-15 自动索引管理过程中的验证*\n\n从这份报告中，您可以看到新索引已就位，但它目前正处于评估期。目前尚不清楚评估期的确切时长，但可以合理地假设它可能是系统上另外\
  \ 12 到 18 小时的负载，在此期间将测量索引的任何负面影响，并用于决定是否保留该索引。评估的确切时间不是已发布的信息，因此即使我在这里的估计也可能发生变化。\n\
  \n---\n\n```powershell\n$SqlConnection = New-Object System.Data.SqlClient.SqlConnection\n\
  $SqlConnection.ConnectionString = 'Server=qpf.database.windows.net;Database=QueryPerformanceTuning;trusted_connection=false;user=UserName;password=YourPassword'\n\
  ## load customer names\n$DatCmd = New-Object System.Data.SqlClient.SqlCommand\n\
  $DatCmd.CommandText = \"SELECT c.FirstName, c.EmailAddress\nFROM SalesLT.Customer\
  \ AS c;\"\n$DatCmd.Connection = $SqlConnection\n$DatDataSet = New-Object System.Data.DataSet\n\
  $SqlAdapter = New-Object System.Data.SqlClient.SqlDataAdapter\n$SqlAdapter.SelectCommand\
  \ = $DatCmd\n$SqlAdapter.Fill($DatDataSet)\n$Proccmd = New-Object System.Data.SqlClient.SqlCommand\n\
  $Proccmd.CommandType = [System.Data.CommandType]'StoredProcedure'\n$Proccmd.CommandText\
  \ = \"dbo.CustomerInfo\"\n$Proccmd.Parameters.Add(\"@FirstName\",[System.Data.SqlDbType]\"\
  nvarchar\")\n$Proccmd.Connection = $SqlConnection\n$EmailCmd = New-Object System.Data.SqlClient.SqlCommand\n\
  $EmailCmd.CommandType = [System.Data.CommandType]'StoredProcedure'\n$EmailCmd.CommandText\
  \ = \"dbo.EmailInfo\"\n$EmailCmd.Parameters.Add(\"@EmailAddress\",[System.Data.SqlDbType]\"\
  nvarchar\")\n$EmailCmd.Connection = $SqlConnection\n$SalesCmd = New-Object System.Data.SqlClient.SqlCommand\n\
  $SalesCmd.CommandType = [System.Data.CommandType]'StoredProcedure'\n$SalesCmd.CommandText\
  \ = \"dbo.SalesInfo\"\n$SalesCmd.Parameters.Add(\"@FirstName\",[System.Data.SqlDbType]\"\
  nvarchar\")\n$SalesCmd.Connection = $SqlConnection\n$OddCmd = New-Object System.Data.SqlClient.SqlCommand\n\
  $OddCmd.CommandType = [System.Data.CommandType]'StoredProcedure'\n$OddCmd.CommandText\
  \ = \"dbo.OddName\"\n$OddCmd.Parameters.Add(\"@FirstName\",[System.Data.SqlDbType]\"\
  nvarchar\")\n$OddCmd.Connection = $SqlConnection\nwhile(1 -ne 0)\n{\nforeach($row\
  \ in $DatDataSet.Tables[0])\n{\n$name = $row[0]\n$email = $row[1]\n$SqlConnection.Open()\n\
  $Proccmd.Parameters[\"@FirstName\"].Value = $name\n$Proccmd.ExecuteNonQuery() |\
  \ Out-Null\n$EmailCmd.Parameters[\"@EmailAddress\"].Value = $email\n$EmailCmd.ExecuteNonQuery()\
  \ | Out-Null\n$SalesCmd.Parameters[\"@FirstName\"].Value = $name\n$SalesCmd.ExecuteNonQuery()\
  \ | Out-Null\n$OddCmd.Parameters[\"@FirstName\"].Value = $name\n$OddCmd.ExecuteNonQuery()\
  \ | Out-Null\n$SqlConnection.Close()\n}\n}\n```\n\n\n作为演示行为的一部分，我在验证期间停止了对数据库的查询运行。这意味着系统测量到的任何查询都不太可能从新索引中获得任何类型的优势。因此，两天后，该索引被回退，意味着它已从系统中移除。我们可以在调优历史中看到这一点，如图\
  \ 25-16 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig16_HTML.jpg](img/323849_5_En_25_Fig16_HTML.jpg)\n\
  \n图 25-16\n\n负载变更后，索引已被移除\n\n然而，假设负载保持不变，该索引将被验证为对正在调用的查询显示出性能改进。\n\n## 自适应查询处理\n\
  \n调优查询是本书的目的，因此谈论那些能让你不必调优那么多查询的机制，似乎有些违反直觉，但理解 SQL Server 将在哪些地方自动帮助你，是值得的。自适应查询处理概述的新机制从根本上关乎在查询执行时改变查询的行为。这有助于处理与错误估计的行计数和内存分配相关的一些基本问题。目前有三种类型的自适应查询处理，我们将在本章中演示全部三种：\n\
  \n*   批处理模式内存授予反馈\n*   批处理模式自适应连接\n*   交错执行\n\n我们已经在第 9 章介绍过自适应连接。我们将按顺序处理自适应查询处理的另外两种机制，首先从批处理模式内存授予反馈开始。\n\
  \n### 批处理模式内存授予反馈\n\n在撰写本文时，批处理模式仅支持涉及 `columnstore`（列存储）索引（`clustered`（聚集）或 `nonclustered`（非聚集））的查询。`Batch\
  \ mode`（批处理模式）本身值得简短解释。在执行计划内的 `row mode`（行模式）执行期间，每对运算符必须协商它们之间传输的每一行。如果有十行，就有十次协商。如果有千万行，就有千万次协商。可以想象，这成本相当高。因此，在\
  \ `batch mode`（批处理模式）操作中，处理不是一次一行地进行，而是以批处理方式进行，通常每批最多分配 900 行，但存在相当大的变化。这意味着，移动千万行不再需要千万次协商，而只需要这么多次：\n\
  \n10000000 行 / ~ 900 行每批 = 11,111 批\n\n从千万次协商减少到大约 11,000 次，这是一个巨大的改进。此外，由于处理时间被释放出来，并且因为更好的行估计成为可能，你可以在查询执行过程中获得不同的行为。\n\
  \n我们将探讨的第一种行为是 `batch mode memory grant feedback`（批处理模式内存授予反馈）。在这种情况下，当查询以 `batch\
  \ mode`（批处理模式）执行时，会计算查询是否拥有过剩或不足的内存。内存不足尤其是一个问题，因为它导致必须分配并使用磁盘来管理过剩部分，这被称为 `spill`（溢出）。更好的内存分配可以提高性能。让我们看一个例子。\n\
  \n首先，为了使其工作，请确保你仍然在 `bigTransactionHistory` 表上有一个 `columnstore`（列存储）索引，并且数据库的兼容性模式设置为\
  \ 140。\n\n在我们开始之前，我们还可以通过使用 `Extended Events`（扩展事件）来捕获与内存授予反馈过程直接相关的事件，以确保我们能观察到行为。以下是一个执行此操作的脚本：\n\
  \n```\nCREATE EVENT SESSION MemoryGrant\nON SERVER\nADD EVENT sqlserver.memory_grant_feedback_loop_disabled\n\
  (WHERE (sqlserver.database_name = N'AdventureWorks2017')),\nADD EVENT sqlserver.memory_grant_updated_by_feedback\n\
  (WHERE (sqlserver.database_name = N'AdventureWorks2017')),\nADD EVENT sqlserver.sql_batch_completed\n\
  (WHERE (sqlserver.database_name = N'AdventureWorks2017'))\nWITH (TRACK_CAUSALITY\
  \ = ON);\n```\n\n第一个事件 `memory_grant_feedback_loop_disabled` 在相关查询受到参数值过度影响时发生。查询引擎不会让内存授予剧烈波动，而是会禁用某些计划的反馈。当这种情况发生在某个计划上时，此事件将在执行期间触发。第二个事件\
  \ `memory_grant_updated_by_feedback` 在反馈被处理时发生。让我们看看实际效果。\n\n这是一个包含查询的存储过程，该查询聚合了来自\
  \ `bigTransactionHistory` 表的一些信息：\n\n```\nCREATE OR ALTER PROCEDURE dbo.CostCheck\
  \ (@Cost MONEY)\nAS\nSELECT p.Name,\nAVG(th.Quantity),\nAVG(th.ActualCost)\nFROM\
  \ dbo.bigTransactionHistory AS th\nJOIN dbo.bigProduct AS p\nON p.ProductID = th.ProductID\n\
  WHERE th.ActualCost = @Cost\nGROUP BY p.Name;\nGO\n```\n\n如果我们执行此查询，传递值 0，并捕获实际执行计划，它看起来如图\
  \ 25-17 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig17_HTML.jpg](img/323849_5_En_25_Fig17_HTML.jpg)\n\
  \n图 25-17\n\n`SELECT` 运算符上带有警告的执行计划\n\n这个查询中应该立即吸引你眼球的是 `SELECT` 运算符上的警告。我们可以打开属性窗口以查看计划的所有警告。请注意，工具提示只显示第一个警告，如图\
  \ 25-18 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig18_HTML.jpg](img/323849_5_En_25_Fig18_HTML.jpg)\n\
  \n图 25-18\n\n来自执行计划的内存授予过度警告\n\n\n\n# 内存授予反馈与交错执行\n\n此处的定义相当明确。根据存储在列存储索引中的数据统计信息，SQL\
  \ Server 估计处理此查询需要 **85,624KB** 内存。实际使用的内存为 **4,056KB**。差异超过了 **81,000KB**。如果频繁运行类似查询且差异如此之大，我们将面临严重的内存压力，而收益甚微。我们还可以通过扩展事件（Extended\
  \ Events）查看反馈过程的实际运行情况。图 25-19 显示了在执行查询时触发的 `memory_grant_updated_by_feedback` 事件。\n\
  \n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig19_HTML.jpg](img/323849_5_En_25_Fig19_HTML.jpg)\n\
  \n图 25-19：memory_grant_updated_by_feedback 事件的扩展事件属性\n\n你可以在图 25-19 中看到一些重要信息。`activity_id`\
  \ 值显示此事件发生在扩展事件会话中的其他事件之前，因为 `seq` 值为 1。如果你正在运行代码，会发现你的 `sql_batch_completed` 的\
  \ `seq` 值为 2。这意味着内存授予调整发生在查询完成执行之前，尽管你仍然会在执行计划中看到警告。这些调整是针对该查询的后续执行。实际上，让我们再次执行查询，并查看扩展事件中的查询执行结果，如图\
  \ 25-20 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig20_HTML.jpg](img/323849_5_En_25_Fig20_HTML.jpg)\n\
  \n图 25-20：显示内存授予反馈仅发生一次的扩展事件\n\n另一个值得注意的有趣现象是，如果你再次捕获执行计划，如图 25-21 所示，你将不再看到该警告。\n\
  \n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig21_HTML.jpg](img/323849_5_En_25_Fig21_HTML.jpg)\n\
  \n图 25-21：相同的执行计划但没有警告\n\n如果我们继续使用这些参数值运行此过程，将不会看到任何其他变化。但是，如果我们按如下方式修改参数值：\n\n\
  ```\nEXEC dbo.CostCheck @Cost = 15.035;\n```\n\n我们根本看不到任何变化。这是因为虽然结果集差异很大（1 行对 9000\
  \ 行），但内存需求并不像第一次执行第一个查询时那样差异巨大。但是，如果我们清除内存缓存，然后使用这些值执行该过程，你将再次看到 `memory_grant_updated_by_feedback`\
  \ 触发。\n\n如果你正在经历由更改内存授予引起的一定程度的颠簸，可以使用 `DATABASE SCOPED CONFIGURATION` 在数据库级别禁用它，如下所示：\n\
  \n```\nALTER DATABASE SCOPED CONFIGURATION SET DISABLE_BATCH_MODE_MEMORY_GRANT_FEEDBACK\
  \ = ON;\n```\n\n要重新启用它，只需使用相同的命令将其设置为 `OFF`。还有一个查询提示（query hint）可用于为单个查询禁用内存反馈。只需将\
  \ `DISABLE_BATCH_MODE_MEMORY_GRANT_FEEDBACK` 添加到查询提示的 `USE` 部分即可。\n\n## 交错执行\n\n\
  虽然我关于避免使用多语句表值函数的建议保持不变，但你可能会发现自己被迫处理它们。在 SQL Server 2017 之前，使这些函数运行更快的唯一真正选择是重写代码以完全不使用它们。然而，SQL\
  \ Server 2017 现在为这些对象提供了交错执行（interleaved execution）。其工作方式是，优化器会识别出正在处理的是一个多语句函数。它将暂停优化过程。处理表值函数的那部分计划将被执行，并返回准确的行数。这些行数随后将在优化过程的剩余部分中使用。如果你有多个多语句函数，你将获得多次执行，直到所有此类对象都返回了更准确的行数。\n\
  \n为了实际观察这一点，我想创建以下多语句函数：\n\n```\nCREATE OR ALTER FUNCTION dbo.SalesInfo ()\nRETURNS\
  \ @return_variable TABLE (SalesOrderID INT,\nOrderDate DATETIME,\nSalesPersonID\
  \ INT,\nPurchaseOrderNumber dbo.OrderNumber,\nAccountNumber dbo.AccountNumber,\n\
  ShippingCity NVARCHAR(30))\nAS\nBEGIN;\nINSERT INTO @return_variable (SalesOrderID,\n\
  OrderDate,\nSalesPersonID,\nPurchaseOrderNumber,\nAccountNumber,\nShippingCity)\n\
  SELECT soh.SalesOrderID,\nsoh.OrderDate,\nsoh.SalesPersonID,\nsoh.PurchaseOrderNumber,\n\
  soh.AccountNumber,\na.City\nFROM Sales.SalesOrderHeader AS soh\nJOIN Person.Address\
  \ AS a\nON soh.ShipToAddressID = a.AddressID;\nRETURN;\nEND;\nGO\nCREATE OR ALTER\
  \ FUNCTION dbo.SalesDetails ()\nRETURNS @return_variable TABLE (SalesOrderID INT,\n\
  SalesOrderDetailID INT,\nOrderQty SMALLINT,\nUnitPrice MONEY)\nAS\nBEGIN;\nINSERT\
  \ INTO @return_variable (SalesOrderID,\nSalesOrderDetailID,\nOrderQty,\nUnitPrice)\n\
  SELECT sod.SalesOrderID,\nsod.SalesOrderDetailID,\nsod.OrderQty,\nsod.UnitPrice\n\
  FROM Sales.SalesOrderDetail AS sod;\nRETURN;\nEND;\nGO\nCREATE OR ALTER FUNCTION\
  \ dbo.CombinedSalesInfo ()\nRETURNS @return_variable TABLE (SalesPersonID INT,\n\
  ShippingCity NVARCHAR(30),\nOrderDate DATETIME,\nPurchaseOrderNumber dbo.OrderNumber,\n\
  AccountNumber dbo.AccountNumber,\nOrderQty SMALLINT,\nUnitPrice MONEY)\nAS\nBEGIN;\n\
  INSERT INTO @return_variable (SalesPersonID,\nShippingCity,\nOrderDate,\nPurchaseOrderNumber,\n\
  AccountNumber,\nOrderQty,\nUnitPrice)\nSELECT si.SalesPersonID,\nsi.ShippingCity,\n\
  si.OrderDate,\nsi.PurchaseOrderNumber,\nsi.AccountNumber,\nsd.OrderQty,\nsd.UnitPrice\n\
  FROM dbo.SalesInfo() AS si\nJOIN dbo.SalesDetails() AS sd\nON si.SalesOrderID =\
  \ sd.SalesOrderID;\nRETURN;\nEND;\nGO\n```\n\n这些是我处理多语句函数时经常看到的反模式（或代码异味）类型。一个函数调用另一个函数，后者又与第三个函数连接，依此类推。由于优化器对这些函数的处理方式取决于所使用的基数估计引擎的版本，你实际上没有太多选择。在\
  \ SQL Server 2014 之前，优化器为这些对象假设为一行。SQL Server 2014 及更高版本有不同的假设，为 100 行。因此，如果兼容级别设置为\
  \ 140 或更高，你将看到 100 行的假设，除非启用了交错执行。\n\n我们可以针对这些函数运行一个查询。但是，首先我们需要在禁用交错执行的情况下运行它。然后我们将重新启用它，清除缓存，并再次执行查询，如下所示：\n\
  \n\n## 执行计划比较与交错执行优化\n\n```sql\nALTER DATABASE SCOPED CONFIGURATION SET DISABLE_INTERLEAVED_EXECUTION_TVF\
  \ = ON;\nGO\nSELECT csi.OrderDate,\ncsi.PurchaseOrderNumber,\ncsi.AccountNumber,\n\
  csi.OrderQty,\ncsi.UnitPrice,\nsp.SalesQuota\nFROM dbo.CombinedSalesInfo() AS csi\n\
  JOIN Sales.SalesPerson AS sp\nON csi.SalesPersonID = sp.BusinessEntityID\nWHERE\
  \ csi.SalesPersonID = 277\nAND csi.ShippingCity = 'Odessa';\nGO\nALTER DATABASE\
  \ SCOPED CONFIGURATION SET DISABLE_INTERLEAVED_EXECUTION_TVF = OFF;\nGO\nALTER DATABASE\
  \ SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\nGO\nSELECT csi.OrderDate,\ncsi.PurchaseOrderNumber,\n\
  csi.AccountNumber,\ncsi.OrderQty,\ncsi.UnitPrice,\nsp.SalesQuota\nFROM dbo.CombinedSalesInfo()\
  \ AS csi\nJOIN Sales.SalesPerson AS sp\nON csi.SalesPersonID = sp.BusinessEntityID\n\
  WHERE csi.SalesPersonID = 277\nAND csi.ShippingCity = 'Odessa';\nGO\n```\n\n得到的执行计划是不同的，但差异很细微，如图\
  \ 25-22 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig22_HTML.jpg](img/323849_5_En_25_Fig22_HTML.jpg)\n\
  \n图 25-22 两个执行计划，一个使用了交错执行\n\n观察这些计划，实际上很难看出差异，因为所有的操作符都是相同的。然而，差异在于估算的成本值。在第一个计划（旧方式）的顶部，表值函数估算成本为\
  \ 1%，这表明与 `Clustered Index Seek` 和 `Table Scan` 操作相比，它几乎是免费的。然而，在第二个计划中，`Clustered\
  \ Index Seek` 操作（估计返回一行）的估算成本突然只占总成本的 1%，其余的成本被合理地重新分配到了其他操作。正是这种行数估计上的差异在某些情况下可能导致性能提升。然而，让我们看看这些值以实际验证。\n\
  \n`Sequence` 操作符强制附加到它的每个子树按顺序执行。在这个例子中，第一个执行的是表值函数。它为两个计划底部的 `Table Scan` 操作符提供数据。图\
  \ 25-23 显示了顶部计划（以旧方式执行的计划）的属性。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig23_HTML.jpg](img/323849_5_En_25_Fig23_HTML.jpg)\n\
  \n图 25-23 旧式计划的属性\n\n在图 25-23 捕获的图像底部，您可以看到该操作符预计读取的行数为 100。其中，预计匹配的行数为 3.16228。实际行数在顶部，为\
  \ 148。这种差异是导致多语句函数执行时间如此之差的主要原因。\n\n现在，让我们看看以交错方式执行的函数的相同属性，如图 25-24 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig24_HTML.jpg](img/323849_5_En_25_Fig24_HTML.jpg)\n\
  \n图 25-24 交错执行的属性\n\n返回的实际行数是相同的，因为这些是对相同结果集的相同查询。但是，请注意 `Estimated Number of Rows\
  \ to be Read` 的值。现在它变成了 121317，而不是硬编码的 100（无论涉及什么数据）。这是一个更准确的估计。它导致预计返回 18.663 行。这仍然不是实际值\
  \ 148，但它正朝着更准确的估计迈进。\n\n由于这些计划相似，执行时间和读取次数出现很大差异的可能性不大。但是，让我们从扩展事件中获取度量值。平均而言，非交错执行耗时\
  \ 1.48 秒，读取次数为 341,000。交错执行平均耗时 1.45 秒，读取次数为 340,000。有小幅改进。\n\n现在，我们实际上可以显著提高性能，并且仍然使用多语句函数。与其将函数连接在一起，如果我们重写代码，像这样：\n\
  \n```sql\nCREATE OR ALTER FUNCTION dbo.AllSalesInfo (@SalesPersonID INT,\n@ShippingCity\
  \ VARCHAR(50))\nRETURNS @return_variable TABLE (SalesPersonID INT,\nShippingCity\
  \ NVARCHAR(30),\nOrderDate DATETIME,\nPurchaseOrderNumber dbo.OrderNumber,\nAccountNumber\
  \ dbo.AccountNumber,\nOrderQty SMALLINT,\nUnitPrice MONEY)\nAS\nBEGIN;\nINSERT INTO\
  \ @return_variable (SalesPersonID,\nShippingCity,\nOrderDate,\nPurchaseOrderNumber,\n\
  AccountNumber,\nOrderQty,\nUnitPrice)\nSELECT soh.SalesPersonID,\na.City,\nsoh.OrderDate,\n\
  soh.PurchaseOrderNumber,\nsoh.AccountNumber,\nsod.OrderQty,\nsod.UnitPrice\nFROM\
  \ Sales.SalesOrderHeader AS soh\nJOIN Person.Address AS a\nON a.AddressID = soh.ShipToAddressID\n\
  JOIN Sales.SalesOrderDetail AS sod\nON sod.SalesOrderID = soh.SalesOrderID\nWHERE\
  \ soh.SalesPersonID = @SalesPersonID\nAND a.City = @ShippingCity;\nRETURN;\nEND;\n\
  GO\n```\n\n我们不再使用 `WHERE` 子句来执行最终查询，而是像这样执行它：\n\n```sql\nSELECT asi.OrderDate,\n\
  asi.PurchaseOrderNumber,\nasi.AccountNumber,\nasi.OrderQty,\nasi.UnitPrice,\nsp.SalesQuota\n\
  FROM dbo.AllSalesInfo(277,'Odessa') AS asi\nJOIN Sales.SalesPerson AS sp\nON asi.SalesPersonID\
  \ = sp.BusinessEntityID;\n```\n\n通过将参数传递给函数，我们允许交错执行有值可以衡量。这样做返回的数据完全相同，但性能下降到 65\
  \ 毫秒，仅 1,135 次读取。对于多语句函数来说，这非常惊人。然而，以非交错方式运行此函数也将执行时间降低到 69 毫秒和 1,428 次读取。虽然我们讨论的是不需要代码或结构更改的改进，但这些改进非常微小。\n\
  \n另一个可能因交错执行而产生的问题是，特别是如果您像我在第二个查询中那样传递值。它将根据手头的值创建一个计划。这实际上就像是参数嗅探。它使用这些硬编码值来创建执行计划，并直接使用这些值对照统计信息作为行数估计。如果您的统计信息差异很大，您可能会遇到类似于我们在第\
  \ 15 章讨论的性能问题。\n\n您还可以使用查询提示来禁用交错执行。只需通过提示向查询提供 `DISABLE_INTERLEAVED_EXECUTION_TVF`，它将仅为正在执行的查询禁用它。\n\
  \n## 总结\n\n随着 SQL Server 2017 中调优建议的加入，以及 Azure SQL Database 中的索引自动化，您现在在 SQL Server\
  \ 自动化方面获得了更多帮助。您仍然需要利用本书其余部分学到的信息来理解哪些建议是有帮助的，哪些仅仅是您自己做出选择的线索。然而，事情变得更容易了，因为 SQL\
  \ Server 可以通过自适应查询处理进行自动调整，而无需您做任何工作。请记住，所有这些都有帮助，但都不是完整的解决方案。这只意味着您的工具箱中有更多工具来帮助处理性能不佳的查询。\n\
  \n下一章将讨论您可以通过分布式重放使用来自动化测试查询的方法。\n\n\n# 26. 数据库性能测试\n\n懂得如何识别性能问题并知道如何修复它们，是非常棒的技能。然而，问题在于你需要能够证明你所做的改进是真正有效的改进。虽然你能够并且应该在调整查询或添加索引前后捕获性能指标，但要确保你看到的是可衡量的改进，最好的方法是让你所做的更改投入工作。测试不仅仅意味着简单地运行几次查询，然后将其投入生产系统并祈求好运。你需要有一种系统化的方法，以现实的方式使用针对你的系统运行的全套查询来验证性能改进。从\
  \ 2012 版开始，`SQL Server`通过其`分布式重放`工具提供了这样一种机制。\n\n`分布式重放`利用由`SQL Profiler`及其创建的跟踪事件所生成的信息进行工作。跟踪事件捕获信息的方式与`扩展事件`工具有些相似，但跟踪事件是一种较旧（且功能较弱）的系统内事件捕获机制。在`SQL\
  \ Server` 2012 发布之前，你可以使用`SQL Server`的`Profiler`工具通过`服务器端跟踪`来回放捕获的事件。这虽然可行，但该过程极为有限。例如，该工具只能在单台机器上运行，并且回放机制——一个以串行方式运行的单线程过程，而非现实中发生的情况。微软已将并行方式从多台机器运行的功能添加到了`SQL\
  \ Server`中。在微软提供通过`扩展事件`输出使用`分布式重放`的机制之前，你仍需使用跟踪事件来进行性能测试的这一方面。\n\n`分布式重放`并不是一个被广泛采用的工具。大多数人完全跳过了实施可重复测试的想法。其他人可能会选择一些提供更多功能的第三方工具。我强烈建议你进行某种形式的测试，以确保你的调优工作对系统产生了可准确衡量的积极影响。\n\
  \n本章涵盖以下主题：\n\n*   数据库测试的概念\n*   如何创建`服务器端跟踪`\n*   使用`分布式重放`进行数据库测试\n\n## 数据库性能测试\n\
  \n数据库性能和负载测试的一般方法相当简单。你需要捕获在正常负载下对生产系统的调用，然后能够针对测试系统一遍又一遍地重放该负载。这使你能够直接测量由代码或结构更改引起的性能变化。不幸的是，在现实世界中实现这一点并不像听起来那么简单。\n\
  \n首先，你不能简单地捕获查询的记录。相反，你必须首先确保能够将生产数据库还原到测试系统上的某个时间点。具体来说，你需要能够还原到你开始在系统上记录事务的确切时刻，因为如果你还原到任何其他时间点，可能会有不同的数据甚至不同的结构。这将导致回放机制生成错误而不是有用的信息。这意味着，首先，你必须有一个处于`完整恢复`模式的数据库，以便你可以进行定期的完整备份以及日志备份，从而在测试开始时还原到特定时间点。\n\
  \n一旦你建立了还原到适当时间的能力，你将需要配置你的查询捕获机制——在本例中是由`Profiler`生成的`服务器端跟踪`定义。回放机制将准确定义你需要捕获哪些事件。你需要设置捕获过程，使其对系统的影响尽可能小。\n\
  \n接下来，你必须处理跟踪捕获的大量数据。根据你的系统规模大小，你可能在短时间内有大量事务。所有这些数据都必须存储和管理，而且会产生很多文件。\n\n你可以在单台机器上设置此过程；然而，要真正看到好处，你会需要设置多台机器来支持`分布式重放`工具的回放能力。这意味着你需要让这些机器作为测试过程的一部分为你所用。不幸的是，除了\
  \ Enterprise 版之外的所有版本都只允许一个客户端，因此在设置测试环境时需要考虑到这一点。\n\n此外，你不能忽视一个事实，即最好的数据、数据库和代码都存在于你的生产系统中。然而，根据你对本地和国际法律合规性的需求，你可能必须选择一种完全不同的机制来记录你的`服务器端跟踪`。你不希望危及组织内管理数据的隐私和保护。如果是这种情况，你可能不得不从用于其他类型自动化测试的`QA`服务器或预生产服务器捕获你的负载。这些可能是难以克服的问题。\n\
  \n当你把所有这些不同的部分都准备就绪后，就可以开始测试了。当然，这引出了一个新问题：你究竟要用数据库测试做什么？\n\n### 一个可重复的过程\n\n如第[1]章所解释的，系统性能调优是一个迭代过程，你可能需要多次进行，才能将性能调整到你需要的水平并保持在那里。由于业务会随时间变化，你的数据分布、应用程序、数据结构以及所有支持它的代码也会随之变化。正因为如此，你能为测试做的最重要的事情之一就是创建一个可以反复运行的过程。\n\
  \n你需要创建一个可重复的测试过程，主要原因是你不能总是确保本书前面章节中概述的方法在所有情况下都有效。这无疑意味着你需要能够验证你所做的更改是否带来了性能上的积极改进。如果没有，你需要能够撤销你所做的任何更改，进行一组新的更改，然后重复测试，迭代地重复这个过程。你可能会发现你需要重复整个调优周期，直到你达到本轮的目标。\n\
  \n由于这个过程的迭代性质，你绝对需要专注于尽可能实现自动化。这正是`分布式重放`工具的用武之地。\n\n\n\n## 分布式重放\n\n分布式重放工具由三部分架构组成。\n\
  \n*   `分布式重放控制器`：此服务管理分布式重放系统的进程。\n*   `分布式重放管理器`：这是一个允许你控制分布式重放控制器和分布式重放进程的界面。\n\
  *   `分布式重放客户端`：这是一个在一台或多台机器（最多 16 台）上运行的界面，用于对你的数据库服务器发起所有调用。\n\n你可以将所有三个组件安装到一台机器上；然而，理想的方法是将控制器放在一台机器上，然后让一个或多个客户端机器与控制器完全分离，这样每台机器只处理你将对测试机器发起的部分事务。仅为演示目的，我将所有组件运行在一个实例上。\n\
  \n首先，将 `分布式重放控制器` 服务安装到一台机器上。`分布式重放` 实用程序没有界面。相反，你将使用 XML 配置文件来控制 `分布式重放` 架构的不同部分。你可以将分布式重放用于各种任务，例如基本查询重放、服务器端游标或预处理服务器语句。由于我主要涵盖查询调优，我将专注于查询和预处理服务器语句（也称为参数化查询）。这定义了一个必须捕获的特定事件集。我将在下一节介绍如何做到这一点。\n\
  \n一旦信息被捕获到跟踪文件中，你将需要使用 `分布式重放控制器` 通过预处理事件运行该文件。这会将基本跟踪数据修改为不同的格式，以便分发给各个 `分布式重放客户端`\
  \ 机器。然后，你可以启动重放进程。重新格式化的数据被发送到客户端，客户端继而会创建查询以针对目标服务器运行。你可以从客户端机器捕获另一个跟踪输出，以确切查看它们进行了哪些调用，以及这些调用的\
  \ I/O 和 CPU 情况。假设你还会在目标服务器上设置标准监控，以查看你生成的负载如何影响该服务器。\n\n当你准备针对你的服务器运行系统时，你可以选择两种重放类型之一：同步模式或压力模式。在同步模式下，你将获得与原始重放完全相同的副本，尽管你可以影响系统上的空闲时间量。这对于精确的性能调优很有用，因为它有助于你了解系统的工作方式，特别是如果你正在对结构、索引或\
  \ T-SQL 代码进行更改时。压力模式不按任何特定顺序运行，但在单个连接内除外，其中查询将按正确的顺序流式传输。在这种情况下，调用会以客户端机器能够发出的最快速度进行——以任何顺序——以服务器能够接收的最快速度进行。简而言之，它执行压力测试。这对于测试数据库设计或硬件安装非常有用。\n\
  \n一个重要的注意事项是，一般来说，当你使用最新版本的 SQL Server 进行重放时，最安全的情况是仅使用最新版本的跟踪数据。但是，你可以在 SQL Server\
  \ 2017 上重放 SQL Server 2005 数据。此外，`分布式重放` 或跟踪事件不支持 Azure SQL Database，因此你将无法对 Azure\
  \ 数据库使用此功能。\n\n## 使用服务器端跟踪捕获数据\n\n使用跟踪事件捕获数据与使用扩展事件捕获查询执行类似。为了支持 `分布式重放` 过程，你需要捕获一些特定事件和这些事件的特定列。如果你想构建自己的跟踪事件，你需要关注表\
  \ 26-1 中列出的事件。\n\n**表 26-1：要捕获的事件**\n\n| 事件 | 列 |\n| --- | --- |\n| `准备 SQL`<br>`执行预处理\
  \ SQL`<br>`SQL:BatchStarting`<br>`SQL:BatchCompleted`<br>`RPC:Starting`<br>`RPC:Completed`<br>`RPC\
  \ 输出参数`<br>`审核登录`<br>`审核注销`<br>`现有连接`<br>`服务器端游标`<br>`服务器端预处理 SQL` | `事件类`<br>`事件序列`<br>`文本数据`<br>`应用程序名称`<br>`登录名`<br>`数据库名称`<br>`数据库\
  \ ID`<br>`主机名`<br>`二进制数据`<br>`SPID`<br>`开始时间`<br>`结束时间`<br>`是否系统` |\n\n你有两种设置这些事件的选项。首先，你可以使用\
  \ T-SQL 设置服务器端跟踪。其次，你可以使用一个名为 `Profiler` 的外部工具。虽然 `Profiler` 可以直接连接到你的 SQL Server\
  \ 实例，但我强烈建议不要使用此工具来捕获数据。`Profiler` 最好用作提供执行捕获的模板。你应该使用 T-SQL 来生成实际的服务器端跟踪。\n\n在测试或开发机器上，打开\
  \ `Profiler` 并从模板列表中选择 `TSQL_Replay`，如图 26-1 所示。\n\n![../images/323849_5_En_26_Chapter/323849_5_En_26_Fig1_HTML.jpg](img/323849_5_En_26_Fig1_HTML.jpg)\n\
  \n**图 26-1：分布式重放跟踪模板**\n\n由于你需要一个用于 `分布式重放` 的文件，你希望将跟踪的输出保存到文件。无论如何，这是设置服务器端跟踪的最佳方式，因此这样很合适。你希望输出到一个有足够空间的位置。根据你的系统需要支持的事务数量，跟踪文件可能会非常大。此外，最好对文件大小设置限制，并允许它们循环覆盖，根据需要创建新文件。你将需要处理更多文件，但实际上，操作系统处理大量较小文件的写入比处理单个大文件更好。我发现这一点是真的，原因有二。首先，文件较小，循环覆盖更快，这意味着如果你需要将其加载到表中或复制到另一台服务器，前一个文件可供处理。其次，根据我的经验，对于简单的日志文件，写入通常需要更长时间，因为此类文件的大小会变得非常大。我还建议为跟踪过程定义停止时间；这同样有助于确保你不会填满指定用于存储跟踪数据的驱动器。\n\
  \n由于这是一个模板，事件和列已经为你选择好了。你可以通过单击“事件选择”选项卡来验证事件和列，以确保你获得的正是你需要的。图 26-2 显示了一些事件和列，所有这些都已为你预定义。\n\
  \n![../images/323849_5_En_26_Chapter/323849_5_En_26_Fig2_HTML.jpg](img/323849_5_En_26_Fig2_HTML.jpg)\n\
  \n**图 26-2：TSQL_Replay 模板事件和列**\n\n此模板是通用的，因此它包含完整的事件列表，包括所有游标事件。你可以通过单击框来取消选择事件进行编辑；但是，我建议除了游标事件外，不要删除任何其他内容（如果你要删除的话）。\n\
  \n\n\n## 开始跟踪与保存定义\n\n我从连接测试服务器而非生产机器开始使用这个模板，因为一旦设置妥当，你必须通过点击**Run**来启动跟踪。我不会在生产系统上这么做。然而，在测试系统上，你可以观察屏幕以确保获取到预期的事件。它会显示事件，同时将其捕获到文件中。当你确认无误后，可以暂停跟踪。接着，点击**File**菜单，然后选择**Export\
  \ ➤ Script Trace Definition**。最后，选择**For SQL Server 2005 – 2014**（参见图 26-3）。\n\n\
  ![../images/323849_5_En_26_Chapter/323849_5_En_26_Fig3_HTML.jpg](img/323849_5_En_26_Fig3_HTML.jpg)\n\
  \n图 26-3\n用于输出跟踪定义的菜单选择\n\n这个模板允许你将刚刚创建的跟踪保存为一个 T-SQL 文件。一旦你拥有了 T-SQL，就可以将其配置为在任何你喜欢的服务器上运行。文件路径需要被替换，并且你可以通过脚本内的参数重置停止时间。下面的脚本展示了用于设置服务器端跟踪事件的\
  \ T-SQL 过程的开头部分：\n\n```sql\n/****************************************************/\n\
  /* Created by: SQL Server 2017 Profiler          */\n/* Date: 05/08/2018  08:27:40\
  \ PM         */\n/****************************************************/\n-- Create\
  \ a Queue\ndeclare @rc int\ndeclare @TraceID int\ndeclare @maxfilesize bigint\n\
  set @maxfilesize = 5\n-- Please replace the text InsertFileNameHere, with an appropriate\n\
  -- filename prefixed by a path, e.g., c:\\MyFolder\\MyTrace. The .trc extension\n\
  -- will be appended to the filename automatically. If you are writing from\n-- remote\
  \ server to local drive, please use UNC path and make sure server has\n-- write\
  \ access to your network share\nexec @rc = sp_trace_create @TraceID output, 0, N'InsertFileNameHere',\
  \ @maxfilesize, NULL\nif (@rc != 0) goto error\n```\n\n你可以编辑它显示 `InsertFileNameHere`\
  \ 的地方来提供路径，并为 `@DateTime` 提供不同的值。此时，你的脚本就可以在任何 SQL Server 2017 服务器上运行了。你可能可以将相同的脚本一直回溯到\
  \ SQL Server 2008R2 上运行；自那时以来，跟踪事件的变化如此之少，以至于它现在已成为一个固定的标准。然而，为了安全起见，务必进行测试。\n\n\
  你收集的信息量实际上取决于你想运行何种测试。对于标准的性能测试，至少收集一个小时的信息可能是个好主意；然而，在大多数情况下，你不想捕获超过两到三小时的数据。此外，必须强调的是，跟踪事件不如扩展事件轻量级，因此你捕获数据的时间越长，对生产服务器的负面影响就越大。捕获更多数据将意味着需要管理更多的数据，也意味着你计划运行测试很长时间。这完全取决于你打算在测试中处理的业务和应用程序行为。\n\
  \n在捕获数据之前，你确实需要考虑将在哪里运行测试。假设你不担心磁盘空间，并且不需要保护法律上审计的数据（如果你有这些问题，需要单独解决）。如果你的数据库不在**Full\
  \ Recovery**模式下，那么你就不能使用日志备份将其恢复到某个时间点。如果是这种情况，我强烈建议将数据库备份作为启动跟踪数据收集的一部分。原因是你需要数据库在开始记录事务时处于相同的状态。如果不是，你可能会遇到大量错误，这可能会严重影响你的性能测试运行方式。例如，尝试选择或修改不存在的数据会影响测试中测量的\
  \ I/O 和 CPU。如果你的数据库在或接近跟踪开始时保持相同的状态，那么你应该很少（如果有的话）遇到错误。\n\n有了准备就绪的数据库副本和一组跟踪数据，你就可以运行分布式重放工具了。\n\
  \n## 用于数据库测试的分布式重放\n\n假设你使用了分布式重放模板来捕获跟踪信息，你应该准备好开始处理文件了。如前所述，第一步是将跟踪文件转换为不同的格式，以便可以分配到多台客户端机器上进行重放。但这不仅仅是简单地对你的文件运行可执行文件。你还需要就希望分布式重放如何运行做出一些决定；这些决定是在你预处理跟踪文件时做出的。\n\
  \n这些决定相当直接。首先，你需要决定是随用户进程一起重放系统进程，还是不重放。除非你正在处理特定的系统问题，否则我建议将此值设置为 `No`。这也是默认值。其次，你需要决定如何处理空闲时间。你可以使用实际的调用数据库的频率值；或者，你可以输入一个以秒为单位的值，以将等待时间限制在不超过该值。这实际上取决于你将运行的重放类型。假设你使用**Synchronization**模式重放（最适合直接性能测量的模式），通过将值设置得较低（例如三到五秒）来消除空闲时间是个好主意。\n\
  \n如果你选择使用默认值，则无需修改配置文件。但如果你选择了包含系统调用或更改了空闲时间，那么你将需要更改配置文件 `DReplay.Exe.Preprocess.config`。这是一个简单的\
  \ XML 配置文件。我正在使用的那个看起来像这样：\n\n```xml\n<Preprocess>\n  <ReplaySystemOptions>\n  \
  \  <CaptureSystemProcesses>No</CaptureSystemProcesses>\n    <MaxIdleTime>5</MaxIdleTime>\n\
  \  </ReplaySystemOptions>\n</Preprocess>\n```\n\n我只做了一处更改，调整了 `MaxIdleTime` 以限制重放期间的任何停顿时间。\n\
  \n在运行预处理之前，请确保你已安装 `DRController` 并且 `DReplay` 服务正在你的系统上运行。如果是这样，你只需调用 `DReplay.exe`\
  \ 来执行预处理。\n\n```\ndreplay preprocess –i c:\\perfdata\\dr.trc –d c:\\DRProcess\n\
  ```\n\n在前面的代码中，你可以看到 `DReplay` 运行了预处理事件。输入文件由 `–i` 参数提供，用于保存输出的文件夹通过 `–d` 参数提供。跟踪文件将被处理，输出将进入指定的文件夹。输出将类似于图\
  \ 26-4。\n\n![../images/323849_5_En_26_Chapter/323849_5_En_26_Fig4_HTML.jpg](img/323849_5_En_26_Fig4_HTML.jpg)\n\
  \n图 26-4\n分布式重放预处理步骤的输出\n\n预处理完成后，你就可以继续运行分布式重放过程了。但在这样做之前，你需要确保你已准备好一台或多台客户端系统。\n\
  \n\n\n### 配置客户端\n\n客户端机器需要配置为与分布式重放控制器协同工作。首先将你的客户端安装到不同的机器上。仅为演示目的，我是在单台机器上运行所有组件；不过，如果你使用多台机器，设置过程也并无不同。你需要配置客户端使其与控制器协作，并且一个客户端一次只能与一个控制器工作。你还需要在系统上为两个项目预留空间。首先，需要一个位置存放每次重放时会被覆盖的工作文件。其次，如果你想从该客户端收集执行数据，还需要为客户端的跟踪文件输出预留空间。你还需要决定客户端进程的日志记录级别。所有这些都在另一个名为\
  \ `DReplayClient.config` 的 XML 配置文件中设置。以下是我的配置：\n\n```\nPerfTune\nC:\\DRClientWork\\\
  \nC:\\DRClientOutput\\\nCRITICAL\n```\n\n目录和日志记录级别很清晰。我还必须将客户端指向运行分布式重放服务的服务器。对于多个客户端工作，不需要其他设置；你只需要确保它们指向正确的控制器系统即可。\n\
  \n### 运行分布式测试\n\n到目前为止，你已经配置好了一切并捕获了数据。接下来，你需要回到命令行，使用 `Dreplay.exe` 可执行文件来运行。大部分控制是通过配置文件完成的，因此可执行文件本身需要的输入很少。你使用以下命令调用测试：\n\
  \n```\nDreplay replay –d c:\\data –w DOJO\n```\n\n你需要输入预处理输出的位置，这意味着你需要以逗号分隔的列表列出参与其中的客户端机器。执行的输出将类似于图\
  \ 26-5。\n\n![../images/323849_5_En_26_Chapter/323849_5_En_26_Fig5_HTML.jpg](img/323849_5_En_26_Fig5_HTML.jpg)\n\
  \n图 26-5：运行 `DReplay.exe` 的输出\n\n如你所见，捕获了 62 个事件，并且全部 62 个事件都成功重放。另一方面，如果出现错误或事件失败，你可能需要查明关于失败原因可能存在的信息。此信息可在日志中找到。然后，只需重新配置测试并再次运行即可。拥有可重复测试过程的整个理念就在于你可以一遍又一遍地运行它。前面的例子代表了对我本地\
  \ AdventureWorks2017 副本进行的轻负载运行，捕获过程大约持续了五分钟。然而，我配置了空闲时间的限制，因此重放仅在 26 秒内完成。\n\n\
  从这里开始，你可以根据需要重新配置测试、重置数据库并反复运行测试。请注意，更改配置文件将需要重启相关服务，以确保更改在下一组测试中生效。处理测试的最佳方法之一是启用查询存储。你可以捕获一组结果，重置测试，对系统进行任何计划的更改，然后从第二次测试中捕获另一组结果。然后，你可以轻松查看回归查询、消耗资源最多的查询等的报告。\n\
  \n## 结论\n\n通过包含分布式重放实用工具，SQL Server 现在使你能够对数据库进行负载和功能测试。你通过使用服务器端跟踪以简单的方式捕获代码来完成此操作。然而，如果你计划利用此功能，请务必验证你根据本书提出的原则对查询所做的更改是否确实有效，并将有助于改善系统的性能。你还应确保重置数据库，以尽可能避免错误。\n\
  \n# 27. 数据库工作负载优化\n\n到目前为止，你已经了解了许多可能影响查询性能的方面、可用于分析查询性能的工具，以及可用于提高查询性能的优化技术。接下来，你将学习如何应用这些信息来分析、排查和优化数据库工作负载的性能。我将引导你完成一个调优过程，包括可能走过一两个弯路，所以请耐心跟随我们探索这个过程。\n\
  \n在本章中，我将涵盖以下主题：\n\n*   数据库工作负载的特征\n*   数据库工作负载优化涉及的步骤\n*   如何识别工作负载中代价高昂的查询\n*\
  \   如何测量代价高昂查询的基线资源使用和性能\n*   如何分析影响代价高昂查询性能的因素\n*   如何应用技术来优化代价高昂的查询\n*   如何分析查询优化对整体工作负载的影响\n\
  \n## 工作负载优化基础\n\n优化数据库工作负载通常符合 80/20 法则：80% 的工作负载消耗了大约 20% 的服务器资源。尝试优化大部分工作负载的性能通常效率不高。因此，工作负载优化的第一步是找到消耗\
  \ 80% 服务器资源的那 20% 的工作负载。\n\n优化工作负载需要一套工具来衡量工作负载不同部分的资源消耗和响应时间。正如你在第 4 章和第 5 章中所见，SQL\
  \ Server 提供了一套工具和实用程序来分析数据库工作负载和单个查询的性能。\n\n除了使用这些工具外，了解如何使用不同技术来优化工作负载也很重要。关于工作负载优化，需要记住的最重要一点是，并非每项优化技术都能保证解决每个性能问题。许多优化技术是针对特定的数据库应用程序设计和数据库环境的。因此，对于每项优化技术，你都需要在应用该技术之前和之后测量工作负载的每个部分（即每个单独查询）的性能。你可以使用第\
  \ 26 章讨论的技术来实现这一点。\n\n发现一项优化技术对工作负载的其他部分影响很小，甚至产生负面影响，从而损害工作负载的整体性能，这种情况并不少见。例如，为优化\
  \ `SELECT` 语句而添加的非聚集索引可能会损害修改索引列值的 `UPDATE` 语句的性能。`UPDATE` 语句除了更新数据行外，还必须更新索引行。然而，正如第\
  \ 6 章所演示的，有时索引也能提高操作查询的性能。因此，提高特定查询的性能可能有益于或损害整体工作负载的性能。一如既往，你最好的行动方案是通过测试来验证任何假设。\n\
  \n\n\n## 工作负载优化步骤\n\n优化数据库工作负载的过程遵循一系列特定的步骤。作为此过程的一部分，你将使用前面章节介绍的一组优化技术。由于每个性能问题都是新的挑战，你可以使用不同的优化技术组合来排查不同的性能问题。请记住，第一步始终是确保服务器配置良好并在可接受的限度内运行，这些限度在章节\
  \ 2 和 3 中定义。\n\n为了理解查询优化过程，你将使用一组查询来模拟一个示例工作负载。\n\n查询调优的核心可以归结为几个步骤。\n\n1.  确定要调优的查询。\n\
  2.  查看执行计划，了解资源使用情况和行为。\n3.  修改查询或修改结构以提高性能。\n\n大多数情况下，答案就是修改查询。简而言之，这就是进行查询调优所需的全部工作。然而，这假设了你对系统有很多了解，并且你已经查看了诸如统计信息之类的东西。当你第一次进行查询调优或在一个新系统上时，这个过程要详细得多。关于调优查询所需步骤的完整定义，以下是你需要做的。这些是你在优化示例工作负载时将遵循的优化步骤：\n\
  \n1.  捕获工作负载。\n2.  分析工作负载。\n3.  识别代价最高/调用最频繁/运行时间最长的查询。\n4.  量化代价最高查询的基线资源使用情况。\n\
  5.  确定整体资源使用情况。\n6.  汇编有关资源使用的详细信息。\n7.  分析并优化外部因素。\n8.  分析索引的使用情况。\n9.  分析应用程序使用的批处理级别选项。\n\
  10. 分析统计信息的有效性。\n11. 评估碎片整理的必要性。\n12. 分析代价最高查询的内部行为。\n13. 分析查询执行计划。\n14. 识别执行计划中代价高昂的操作符。\n\
  15. 分析处理策略的有效性。\n16. 优化代价最高的查询。\n17. 分析更改对数据库工作负载的影响。\n18. 迭代多个优化阶段。\n\n如章节 1 所述，性能调优是一个迭代过程。因此，你应该多次迭代执行性能优化步骤，直到达到期望的应用程序性能目标。经过一段时间后，你将需要重复此过程，以解决数据和数据库更改对工作负载造成的影响。此外，随着时间的推移，当你发现自己在服务器上工作时，你可能会跳过许多之前的步骤，因为你已经验证了事务方法或统计信息维护或其他步骤。你不必严格遵循这个流程。它旨在作为一个指南。关于调优查询所需步骤的图形化表示，我建议你参考章节\
  \ 1。\n\n## 示例工作负载\n\n为了排查 SQL Server 性能问题，你需要了解在服务器上执行的 SQL 工作负载。然后，你可以分析该工作负载以识别性能不佳的原因和适用的优化步骤。理想情况下，你应该捕获面临性能问题的\
  \ SQL Server 上的工作负载。在本章中，你将使用一组查询来模拟一个示例工作负载，以便你可以遵循上一节列出的优化步骤。你将使用的示例工作负载由良好和不良查询的组合构成。\n\
  \n## 注意\n\n我建议你恢复 `AdventureWorks2017` 数据库的干净副本，以便完全删除先前章节遗留的任何工件。\n\n简单的测试工作负载由以下一组示例存储过程模拟；你在\
  \ `AdventureWorks2017` 数据库上使用第二个脚本来执行它们：\n\n```sql\nUSE AdventureWorks2017;\nGO\n\
  CREATE OR ALTER PROCEDURE dbo.ShoppingCart @ShoppingCartId VARCHAR(50)\nAS\n--provides\
  \ the output from the shopping cart including the line total\nSELECT sci.Quantity,\n\
  p.ListPrice,\np.ListPrice * sci.Quantity AS LineTotal,\np.Name\nFROM Sales.ShoppingCartItem\
  \ AS sci\nJOIN Production.Product AS p\nON sci.ProductID = p.ProductID\nWHERE sci.ShoppingCartID\
  \ = @ShoppingCartId;\nGO\nCREATE OR ALTER PROCEDURE dbo.ProductBySalesOrder @SalesOrderID\
  \ INT\nAS\n/*provides a list of products from a particular sales order,\nand provides\
  \ line ordering by modified date but ordered\nby product name*/\nSELECT ROW_NUMBER()\
  \ OVER (ORDER BY sod.ModifiedDate) AS LineNumber,\np.Name,\nsod.LineTotal\nFROM\
  \ Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail AS sod\nON soh.SalesOrderID\
  \ = sod.SalesOrderID\nJOIN Production.Product AS p\nON sod.ProductID = p.ProductID\n\
  WHERE soh.SalesOrderID = @SalesOrderID\nORDER BY p.Name ASC;\nGO\nCREATE OR ALTER\
  \ PROCEDURE dbo.PersonByFirstName @FirstName NVARCHAR(50)\nAS\n--gets anyone by\
  \ first name from the Person table\nSELECT p.BusinessEntityID,\np.Title,\np.LastName,\n\
  p.FirstName,\np.PersonType\nFROM Person.Person AS p\nWHERE p.FirstName = @FirstName;\n\
  GO\nCREATE OR ALTER PROCEDURE dbo.ProductTransactionsSinceDate\n@LatestDate DATETIME,\n\
  @ProductName NVARCHAR(50)\nAS\n--Gets the latest transaction against\n--all products\
  \ that have a transaction\nSELECT p.Name,\nth.ReferenceOrderID,\nth.ReferenceOrderLineID,\n\
  th.TransactionType,\nth.Quantity\nFROM Production.Product AS p\nJOIN Production.TransactionHistory\
  \ AS th\nON p.ProductID = th.ProductID\nAND th.TransactionID = (   SELECT TOP (1)\n\
  th2.TransactionID\nFROM Production.TransactionHistory AS th2\nWHERE th2.ProductID\
  \ = p.ProductID\nORDER BY th2.TransactionID DESC)\nWHERE th.TransactionDate > @LatestDate\n\
  AND p.Name LIKE @ProductName;\nGO\nCREATE OR ALTER PROCEDURE dbo.PurchaseOrderBySalesPersonName\n\
  @LastName NVARCHAR(50),\n@VendorID INT = NULL\nAS\nSELECT poh.PurchaseOrderID,\n\
  poh.OrderDate,\npod.LineTotal,\np.Name AS ProductName,\ne.JobTitle,\nper.LastName\
  \ + ', ' + per.FirstName AS SalesPerson,\npoh.VendorID\nFROM Purchasing.PurchaseOrderHeader\
  \ AS poh\nJOIN Purchasing.PurchaseOrderDetail AS pod\nON poh.PurchaseOrderID = pod.PurchaseOrderID\n\
  JOIN Production.Product AS p\nON pod.ProductID = p.ProductID\nJOIN HumanResources.Employee\
  \ AS e\nON poh.EmployeeID = e.BusinessEntityID\nJOIN Person.Person AS per\nON e.BusinessEntityID\
  \ = per.BusinessEntityID\nWHERE per.LastName LIKE @LastName\nAND poh.VendorID =\
  \ COALESCE(@VendorID,\npoh.VendorID)\nORDER BY per.LastName,\nper.FirstName;\nGO\n\
  CREATE OR ALTER PROCEDURE dbo.TotalSalesByProduct @ProductID INT\nAS\n--retrieve\
  \ aggregation of sales based on a productid\nSELECT SUM((isnull((sod.UnitPrice*((1.0)-sod.UnitPriceDiscount))*sod.OrderQty,(0.0))))\
  \ AS TotalSales,\nAVG(sod.OrderQty) AS AverageQty,\nAVG(sod.UnitPrice) AS AverageUnitPrice,\n\
  SUM(sod.LineTotal)\nFROM Sales.SalesOrderDetail AS sod\nWHERE sod.ProductID = @ProductID\n\
  GROUP BY sod.ProductID;\nGO\n```\n\n请记住，这只是一个说明性示例，而不是字面上放置在服务器上的真实负载。实际的存储过程通常要复杂得多，但我们在设置模拟生产负载方面能投入的篇幅有限。有了这些存储过程，你可以使用以下脚本来执行它们：\n\
  \n\n\n```\nEXEC dbo.PurchaseOrderBySalesPersonName @LastName = 'Hill%';\nGO\nEXEC\
  \ dbo.ShoppingCart @ShoppingCartId = '20621';\nGO\nEXEC dbo.ProductBySalesOrder\
  \ @SalesOrderID = 43867;\nGO\nEXEC dbo.PersonByFirstName @FirstName = 'Gretchen';\n\
  GO\nEXEC dbo.ProductTransactionsSinceDate @LatestDate = '9/1/2004',\n@ProductName\
  \ = 'Hex Nut%';\nGO\nEXEC dbo.PurchaseOrderBySalesPersonName @LastName = 'Hill%',\n\
  @VendorID = 1496;\nGO\nEXEC dbo.TotalSalesByProduct @ProductID = 707;\nGO\n```\n\
  \n我知道我有点重复，但我想说清楚。这是一个极其简单的负载，只是用来演示这个过程。在一个典型的系统中，你会看到针对更广泛的存储过程集和即席查询的成百上千个额外调用。尽管如此简单，但这个示例负载包含了通常在\
  \ SQL Server 上执行的不同类型的查询。\n\n*   使用聚合函数的查询\n*   仅检索一行或少数几行的点查询\n*   连接多个表的查询\n*\
  \   检索狭窄行范围的查询\n*   执行额外结果集处理的查询，例如提供排序输出\n\n第一个优化步骤是捕获负载，意思是观察这些查询的执行情况，如下一节所述。\n\
  \n## 捕获负载\n\n作为诊断数据收集步骤的一部分，您必须定义一个 Extended Events 会话来捕获数据库服务器上的负载。您可以使用第 6 章推荐的工具和方法来执行此操作。表\
  \ 27-1 列出了可用于测量查询资源消耗情况的具体事件。\n\n表 27-1 捕获有关高成本查询信息的事件\n\n| 类别 | 事件 |\n| --- | ---\
  \ |\n| 执行 | `rpc_completed` `sql_batch_completed` |\n\n如第 6 章所述，对于生产数据库，建议将 Extended\
  \ Events 会话的输出捕获到文件中。将输出捕获到文件有几个显著优势：\n\n*   由于您打算在负载捕获后分析 SQL 查询，因此在捕获时无需显示 SQL\
  \ 查询。\n*   通过 SSMS 运行会话无法为跟踪过程提供灵活的时间控制。\n\n让我们更详细地看看时间控制。假设您想在晚上 11 点开始捕获事件，并记录\
  \ 24 小时的 SQL 负载。您可以使用 GUI 或 T-SQL 定义 Extended Events 会话。但是，您不必在准备好之前启动该过程。这意味着您可以使用\
  \ SQL Agent 或其他调度工具创建命令，通过 `ALTER EVENT SESSION` 命令来启动和停止该过程。\n\n```sql\nALTER EVENT\
  \ SESSION \nON SERVER\nSTATE = ;\n```\n\n对于此示例，我在会话上设置了一个筛选器，以便仅捕获来自 AdventureWorks2017\
  \ 数据库的事件。该文件将仅捕获针对该数据库的查询，从而减少我需要处理的信息量。这对于您的系统可能也是一个不错的选择。虽然 Extended Events 会话的成本可能非常低（特别是与较旧的跟踪事件相比），但它们并非免费。应始终应用良好的筛选以确保影响最小。\n\
  \n## 分析负载\n\n一旦负载被捕获到文件中，您就可以通过使用 SSMS 浏览数据或将输出文件的内容导入数据库表来分析负载。\n\nSSMS 提供了以下两种分析文件内容的方法，两者都相对简单：\n\
  \n*   *通过右键单击选择排序顺序或按特定列对数据列进行排序来对输出进行排序*：您可能希望从“详细信息”选项卡中选择列，并使用“在表中显示列”命令将其上移。之后，您就可以在该列上发出分组和排序命令。\n\
  *   *将输出重新排列为选择性列和事件列表*：您可以通过右键单击表格并从上下文菜单中选择“选择列”来更改 SSMS 显示的输出。这使您不仅可以挑选和选择列；还可以将它们组合成新列。\n\
  \n正如我在本书中展示的那样，当与 Extended Events 一起使用时，SSMS 中的实时数据资源管理器可用于构建基本的聚合。例如，如果您想按查询文本或对象\
  \ ID 分组，然后获取平均持续时间或执行次数计数，您是可以做到的。事实上，SSMS 是一种进行此类更简单聚合的方法。\n\n另一方面，如果您想对负载进行深入分析，则必须将跟踪文件的内容导入数据库表。然后您可以创建更复杂的查询。会话的输出将大多数重要数据放入\
  \ XML 字段中，因此您需要在加载数据时查询它，如下所示：\n\n```sql\nDROP TABLE IF EXISTS dbo.ExEvents;\nGO\n\
  WITH xEvents\nAS (SELECT object_name AS xEventName,\nCAST(event_data AS XML) AS\
  \ xEventData\nFROM sys.fn_xe_file_target_read_file('C:\\PerfData\\QueryPerfTuning2017*.xel',\n\
  NULL,\nNULL,\nNULL) )\nSELECT xEventName,\nxEventData.value('(/event/data[@name=\"\
  duration\"]/value)[1]',\n'bigint') AS Duration,\nxEventData.value('(/event/data[@name=\"\
  physical_reads\"]/value)[1]',\n'bigint') AS PhysicalReads,\nxEventData.value('(/event/data[@name=\"\
  logical_reads\"]/value)[1]',\n'bigint') AS LogicalReads,\nxEventData.value('(/event/data[@name=\"\
  cpu_time\"]/value)[1]',\n'bigint') AS CpuTime,\nCASE xEventName\nWHEN 'sql_batch_completed'\
  \ THEN\nxEventData.value('(/event/data[@name=\"batch_text\"]/value)[1]',\n'varchar(max)')\n\
  WHEN 'rpc_completed' THEN\nxEventData.value('(/event/data[@name=\"statement\"]/value)[1]',\n\
  'varchar(max)')\nEND AS SQLText,\nxEventData.value('(/event/data[@name=\"query_plan_hash\"\
  ]/value)[1]',\n'binary(8)') AS QueryPlanHash\nINTO dbo.ExEvents\nFROM xEvents;\n\
  ```\n\n您需要用您自己的路径和文件名替换 `<ExEventsFileName>`。一旦将内容放入表中，就可以使用 SQL 查询来分析负载。例如，要查找最慢的查询，您可以执行以下\
  \ SQL 查询：\n\n```sql\nSELECT  *\nFROM    dbo.ExEvents AS ee\nORDER BY ee.Duration\
  \ DESC;\n```\n\n前面的查询将显示成本最高的单个查询，这对于本章中运行的测试来说已经足够了。您可能也想在生产系统上运行类似的查询；但是，更可能的情况是您希望基于数据的聚合进行工作，如本例所示：\n\
  \n```sql\nSELECT  ee.SQLText,\nSUM(Duration) AS SumDuration,\nAVG(Duration) AS AvgDuration,\n\
  COUNT(Duration) AS CountDuration\nFROM    dbo.ExEvents AS ee\nGROUP BY ee.SQLText;\n\
  ```\n\n执行此查询可以让您按您最感兴趣的字段排序——例如，按 `CountDuration` 排序以获取最常调用的存储过程，或按 `SumDuration`\
  \ 排序以获取累计运行时间最长的存储过程。您需要一种方法来移除或替换参数和参数值。这对于仅基于存储过程名称或仅基于不带参数或参数值的查询文本进行聚合是必要的（因为这些会不断变化）。\n\
  \n\n## SQL 查询性能分析与优化\n\n另一种机制是直接查询缓存，以查看其中代价最高的查询。这比设置扩展事件（Extended Events）更简单。此外，大多数时候你可能已经捕获到了大部分有问题的查询。因此，如果你是第一次开始对系统进行查询调优，你可能想跳过设置扩展事件来识别代价最高的查询。然而，我发现随着时间的推移，当你开始量化系统行为时，你将会需要扩展事件提供的那种详细数据。\n\
  \n我们已经在书中探讨过的另一种方法是使用查询存储（Query Store）来收集系统中查询行为的指标。它的优势是设置极其简单且易于查询，不涉及 XML。唯一的缺点是，如果你需要关于单个查询和存储过程调用的细粒度详细性能指标，那么你将再次发现自己需要调用扩展事件来满足对此类数据的需求。\n\
  \n简而言之，在如何整合这些信息方面，你有很多选择和灵活性。对于 SQL Server 2016 和 SQL Server 2017，你甚至可以开始使用 R 或\
  \ Python 进行数据分析，以增强呈现的信息。不过，就我们的目的而言，我将坚持使用我概述的第一种方法，即在 SSMS 中使用“实时数据”（Live Data）。\n\
  \n分析工作负载的目标是识别代价最高的查询（或通常意义上的高代价查询）；下一节将介绍如何做到这一点。\n\n## 识别代价最高的查询\n\n如前所述，你可以使用\
  \ SSMS 或查询技术，根据不同的标准识别高代价查询。可以按照`CPU`、`读取`或`写入`列对工作负载中的查询进行排序，以识别代价最高的查询，如第[3]章所述。你也可以使用聚合函数来得出累计成本以及单个成本。在生产系统中，了解累计运行时间最长、CPU\
  \ 使用率最高或读写次数最多的存储过程，通常比仅仅识别单次数字最高的查询更有用。\n\n因为即使是最繁忙的 OLTP 数据库，总读取次数通常也至少是总写入次数的七到八倍，所以按`读取`列排序查询通常比按`写入`列排序能识别出更多有问题的查询（但你应该总是在自己的系统上测试这一点）。同样值得查看的是那些执行时间最长的查询。如第[5]章所述，你可以使用性能监视器（Performance\
  \ Monitor）捕获等待状态，并将其与特定查询一起查看，以帮助确定为什么某个查询运行时间长。你还可以使用扩展事件捕获特定查询的特定等待，并将其添加到你的计算中。每个系统都是不同的。通常，我首先处理调用最频繁的存储过程，然后是运行时间最长的，最后是读取次数最多的那些。当然，性能调优是一个迭代过程，因此你需要定期重新检查每个类别。\n\
  \n为了分析样本工作负载中性能最差的查询，你需要知道查询在持续时间或读取方面的代价有多高。由于这些值只有在查询执行完成后才能得知，因此你主要关注的是已完成的事件。（使用已完成事件进行性能分析的基本原理在第[6]章中有详细解释。）\n\
  \n为了展示目的，在 SSMS 中打开跟踪文件。图[27-1]显示了将几列移动到网格中，然后通过单击该列（单击两次以使排序从升序变为降序）选择按持续时间排序后捕获的跟踪输出。\n\
  \n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig1_HTML.jpg](img/323849_5_En_27_Fig1_HTML.jpg)\n\
  \n图 27-1\n\n显示 SQL 工作负载的扩展事件会话输出\n\n在持续时间方面性能最差的查询，在 CPU 使用率和读取方面也是最差的之一。该存储过程`dbo.PurchaseOrderBySalesPersonName`位于图[27-1]的顶部（你可能有不同的值，但此查询很可能是性能最差的查询，或者至少是示例查询中最差的之一）。\n\
  \n一旦你识别出性能最差的查询，下一个优化步骤是确定该查询消耗的资源。\n\n### 确定代价最高查询的基线资源使用情况\n\n在应用任何优化技术之前，性能最差查询的当前资源使用情况可以被视为一个基线数值。你可能会对该查询应用不同的优化技术，并可以将查询优化后的资源使用情况与基线数值进行比较，以确定给定优化技术的有效性。查询的资源使用情况可以从两个类别呈现。\n\
  \n*   整体资源使用情况\n\n*   详细资源使用情况\n\n### 整体资源使用情况\n\n查询的整体资源使用情况提供了性能最差查询所消耗硬件资源的概要数据。你可以将优化后查询的资源使用情况与未优化查询的整体资源使用情况相比较，以确保你所应用的性能技术整体有效。\n\
  \n你可以从工作负载跟踪中确定查询的整体资源使用情况。你将使用该存储过程的第一次调用，因为它表现出最差的行为。表[27-2]显示了来自图[27-1]跟踪中该查询的整体使用情况。需要注意的一点是，表中的持续时间单位是毫秒，而图[27-1]中的值单位是微秒。在使用扩展事件时请记住这一点。\n\
  \n表 27-2\n\n表示查询所用资源数量的数据列\n\n| 数据列 | 值 | 描述 |\n| --- | --- | --- |\n| `LogicalReads`\
  \ | 8671 | 查询执行的逻辑读取次数。如果在内存中找不到数据页，则对该页的逻辑读取将需要先从磁盘进行物理读取，以将该页获取到内存中。 |\n|    `Writes`\
  \ | 0 | 查询修改的页数。 |\n|    `CPU` | 62ms | 查询使用 CPU 的时间长度。 |\n|    `Duration` | 464.1ms\
  \ | SQL Server 从编译到返回结果集处理此查询所花费的时间。 |\n\n## 注意\n\n在你的环境中，你可能有不同的前述数据列的数值。无论数据列的绝对值如何，跟踪这些值都很重要，以便你以后可以将它们与相应的值进行比较。\n\
  \n## 详细的资源使用分析\n\n你可以分解查询的整体资源使用情况，以定位查询所访问的不同数据库对象上的瓶颈。这种详细的资源使用分析有助于你确定哪些操作是最有问题的。理解系统中的等待状态将帮助你识别需要重点关注的优化方向。一个粗略的经验法则可能是简单地查看执行时长；然而，执行时长可能受到许多因素（尤其是阻塞）的影响，因此它充其量只是一个不完美的衡量标准。在这种情况下，我将花费时间分析以下三个方面：CPU\
  \ 使用率、读取次数和执行时长。读取次数是一个常用的性能衡量指标，但如同执行时长一样，孤立地看待它也可能存在问题。这就是为什么我更倾向于捕获多个值，并能够在查询的不同执行迭代之间进行比较。\n\
  \n正如你在第 6 章中所见，你可以从给定查询的 `STATISTICS IO` 输出中，获取该查询访问的各个表上执行的读取次数。你还可以设置 `STATISTICS\
  \ TIME` 选项来获取查询的基本执行时间和 CPU 时间，包括其编译时间。你可以通过重新执行查询并使用以下 `SET` 语句（或在查询窗口中选中“设置统计信息\
  \ IO”复选框）来获取此输出：\n\n```sql\nALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n\
  DBCC DROPCLEANBUFFERS;\nGO\nSET STATISTICS TIME ON;\nGO\nSET STATISTICS IO ON;\n\
  GO\nEXEC dbo.PurchaseOrderBySalesPersonName @LastName = 'Hill%';\nGO\nSET STATISTICS\
  \ TIME OFF;\nGO\nSET STATISTICS IO OFF;\nGO\n```\n\n为了模拟图 27-1 中所示的首次运行情况，请使用 `DBCC\
  \ DROPCLEANBUFFERS` 清除内存中存储的数据（**切勿**在生产系统上运行），并使用数据库作用域配置命令 `CLEAR PROCEDURE_CACHE`\
  \ 从指定数据库的缓存中移除查询（**同样切勿**在生产系统上运行）。\n\n性能最差查询的 `STATISTICS` 输出如下所示：\n\n```text\n\
  DBCC execution completed. If DBCC printed error messages, contact your system administrator.\n\
  SQL Server parse and compile time:\nCPU time = 0 ms, elapsed time = 0 ms.\nSQL Server\
  \ Execution Times:\nCPU time = 0 ms,  elapsed time = 0 ms.\nSQL Server parse and\
  \ compile time:\nCPU time = 0 ms, elapsed time = 0 ms.\nSQL Server parse and compile\
  \ time:\nCPU time = 31 ms, elapsed time = 40 ms.\n(1496 rows affected)\nTable 'Employee'.\
  \ Scan count 0, logical reads 2992, physical reads 2, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'Product'. Scan\
  \ count 0, logical reads 2992, physical reads 4, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'PurchaseOrderDetail'.\
  \ Scan count 763, logical reads 1539, physical reads 9, read-ahead reads 0, lob\
  \ logical reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'Worktable'.\
  \ Scan count 0, logical reads 0, physical reads 0, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'Workfile'. Scan\
  \ count 0, logical reads 0, physical reads 0, read-ahead reads 0, lob logical reads\
  \ 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'PurchaseOrderHeader'.\
  \ Scan count 1, logical reads 44, physical reads 1, read-ahead reads 42, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'Person'. Scan count\
  \ 1, logical reads 4, physical reads 1, read-ahead reads 2, lob logical reads 0,\
  \ lob physical reads 0, lob read-ahead reads 0.\nSQL Server Execution Times:\nCPU\
  \ time = 15 ms,  elapsed time = 93 ms.\nSQL Server Execution Times:\nCPU time =\
  \ 46 ms,  elapsed time = 133 ms.\nSQL Server parse and compile time:\nCPU time =\
  \ 0 ms, elapsed time = 0 ms.\n```\n\n值得一提的一个警告是，返回这些信息连同数据本身会带来一些开销，并且会影响一些性能指标，包括查询的执行时长衡量。对于我们大多数人来说，大多数情况下这不是问题，但有时它会明显引起问题。需要注意的是，通过这种方式捕获信息，你是在做出一个选择。\n\
  \n表 27-3 总结了 `STATISTICS IO` 的输出。\n\n**表 27-3** 分解 STATISTICS IO 的输出\n\n| 表 (Table)\
  \ | 逻辑读取 (Logical Reads) |\n| :--------- | :----------------------- |\n| `Person.Employee`\
  \ | 2,992 |\n| `Production.Product` | 2,992 |\n| `Purchasing.PurchaseOrderDetail`\
  \ | 1,539 |\n| `Purchasing.PurchaseOrderHeader` | 44 |\n| `Person.Person` | 4 |\n\
  \n通常，查询中引用的各个表的读取次数总和，会小于该查询执行的总读取次数。这是因为需要读取额外的页来访问内部数据库对象，例如 `sysobjects`、`syscolumns`\
  \ 和 `sysindexes`。\n\n表 27-4 总结了 `STATISTICS TIME` 的输出。\n\n**表 27-4** 分解 STATISTICS\
  \ TIME 的输出\n\n| 事件 (Event) | 时长 (Duration) | CPU 时间 |\n| :----------- | :--------------\
  \ | :------- |\n| `编译 (Compile)` | 40 ms | 31 ms |\n| `执行 (Execution)` | 93 ms |\
  \ 15 ms |\n| `完成 (Completion)` | 133 ms | 46 ms |\n\n不要将逻辑读取与执行时间孤立地使用。在确定性能不佳的查询时，你需要综合考虑所有衡量指标。反之，也不要假设执行时间是完美的衡量标准。资源争用对执行时间有很大影响，因此你会看到这个指标存在一些波动。同时使用这两个值，但要充分理解，孤立地看任何一个都可能无法准确反映现实情况。\n\
  \n你还可以为这些详细信息添加额外的指标。正如我在第 2-4 章概述的，等待统计信息是理解系统状况的重要衡量标准。这对查询同样适用。在 SQL Server 2016\
  \ 及更新版本中，当你捕获实际执行计划时，可以看到超过 1 毫秒的等待。该信息位于查询执行计划中 `SELECT` 操作符的属性里。你还可以使用扩展事件来捕获给定查询的等待统计信息，这将显示所有的等待，而不仅仅是那些超过\
  \ 1 毫秒的等待。这些对于衡量查询性能的详细指标来说，是有用的补充。\n\n一旦识别出性能最差的查询并测量了其资源使用情况，下一个优化步骤就是确定影响查询性能的因素。然而，在此之前，你应该检查是否存在查询外部的因素可能导致了这种不佳的性能。\n\
  \n## 分析和优化外部因素\n\n除了查询设计和索引等因素外，外部因素也会影响查询性能。因此，在深入研究查询的执行计划之前，你应该分析并优化可能影响查询性能的主要外部因素。以下是一些外部因素：\n\
  \n*   应用程序使用的连接选项\n*   查询所访问的数据库对象的统计信息\n*   查询所访问的数据库对象的碎片情况\n\n\n### 分析应用程序使用的连接选项\n\
  \n在与 SQL Server 建立连接时，各种选项（如 `ANSI_NULL` 或 `CONCAT_NULL_YIELDS_NULL`）可以设置为与服务器或数据库默认值不同的值。但是，按连接更改这些设置可能导致存储过程重新编译，从而引起性能下降。此外，某些选项（例如\
  \ `ARITHABORT`）在处理索引视图和某些其他特殊索引时必须设置为 `ON`。如果未这样设置，可能会导致性能低下，甚至代码出错。例如，将 `ANSI_WARNINGS`\
  \ 设置为 `OFF` 会导致优化器在生成执行计划时忽略索引视图和索引计算列。您可以再次查看执行计划的属性以获取此信息。创建执行计划时，ANSI 设置会随计划一起存储。因此，如果您查询缓存以查看计划，并从查询存储、扩展事件或\
  \ SSMS 捕获的计划中检索它，您将看到计划编译时的 ANSI 设置。此外，如果调用相同的查询而 ANSI 设置与当前缓存中的不同，则将编译一个新计划（并与另一个计划一起存储在查询存储中）。这些属性位于\
  \ `SELECT` 运算符中，如图 27-2 所示。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig2_HTML.jpg](img/323849_5_En_27_Fig2_HTML.jpg)\n\
  \n图 27-2\n\n显示“设置选项”属性的执行计划属性\n\n我建议使用 ANSI 标准设置，即将以下选项设置为 `TRUE`：`ANSI_NULLS`、`ANSI_NULL_DFLT_ON`、`ANSI_PADDING`、`ANSI_WARNINGS`、`CURS0R_CLOSE_ON_COMMIT`、`IMPLICIT_TRANSACTIONS`\
  \ 和 `QUOTED_IDENTIFIER`。您可以使用单个命令 `SET ANSI_DEFAULTS ON` 将它们全部同时设置为 `TRUE`。查询 `sys.query_context_settings`\
  \ 也是查看跨工作负载所用设置历史记录的有效方法。\n\n### 分析统计信息的有效性\n\n查询中引用的数据库对象的统计信息是查询优化器用于决定特定执行计划的关键信息之一。如第\
  \ 13 章所述，优化器基于查询中引用对象的统计信息来生成查询的执行计划。统计信息所建议的行数是驱动优化器的成本估算过程的主要部分。通过这种方式，它确定了查询的处理策略。如果数据库对象的统计信息不准确，则优化器可能会为查询生成低效的执行计划。可能会出现几个问题：可能完全缺乏统计信息（因为禁用了\
  \ `auto_create` 统计信息）、统计信息过时（因为未启用自动更新）、统计信息陈旧（因为统计信息已超过时限），或者由于数据分布或采样大小问题导致统计信息不准确。\n\
  \n如第 13 章所述，您可以使用 `DBCC SHOW_STATISTICS` 或 `sys.dm_db_stats_properties` 和 `sys.dm_db_stats_histogram`\
  \ 来检查表及其索引的统计信息。此查询中引用了五个表：`Purchasing.PurchaseOrderHeader`、`Purchasing.PurchaseOrderDetail`、`Person.Employee`、`Person.Person`\
  \ 和 `Production.Product`。您必须知道查询使用了哪些索引，才能获取有关它们的统计信息。您可以在查看执行计划时确定这一点。具体来说，您现在可以查看执行计划，以获取优化器在构建执行计划时使用的具体统计信息。与许多其他有趣的信息一样，这些信息存储在\
  \ `SELECT` 运算符中，如图 27-3 所示。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig3_HTML.jpg](img/323849_5_En_27_Fig3_HTML.jpg)\n\
  \n图 27-3\n\n优化器为正在探索的查询创建执行计划时所使用的统计信息\n\n虽然只有五个表，但您可以看到生成计划时使用了七个统计信息对象。如您所见，`PurchaseOrderDetail`\
  \ 表中使用了多个对象。您可能会看到来自任何给定表的几个不同的统计信息在使用中。这是轻松识别您需要确定其效率的统计信息的好方法。\n\n现在，我将检查 `HumanResources`.`Employee`\
  \ 表主键上的统计信息，因为它的读取次数最多。现在运行以下查询：\n\n```\nDBCC SHOW_STATISTICS('HumanResources.Employee',\
  \ 'PK_Employee_BusinessEntityID');\n```\n\n当上述查询完成后，您将看到如图 27-4 所示的输出。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig4_HTML.jpg](img/323849_5_En_27_Fig4_HTML.jpg)\n\
  \n图 27-4\n\nHumanResources.Employee 的 SHOW_STATISTICS 输出\n\n您可以看到索引的选择性非常高，因为密度相当低，如\
  \ `All density` 列所示。您可以看到这些统计信息扫描了所有行，并且分布在 146 个步骤中。在这种情况下，统计信息不太可能是导致此查询性能不佳的原因。在可能的情况下，查看实际执行计划并比较估计行数与实际行数可能是个好主意。您还可以检查\
  \ `Updated` 列以确定上次更新此组统计信息的时间。如果统计信息已超过几天未更新，那么您需要检查统计信息维护计划，并且应该手动更新这些统计信息。当然，这取决于您数据库中数据更改的频率。在本例中，考虑到提供的数据，这些统计信息可能已经严重过时（然而，由于这是一个未更新的示例数据库，实际上并未过时）。\n\
  \n\n### 分析碎片整理的必要性\n\n正如第 14 章所解释的，碎片化的表会增加执行扫描的查询需要访问的页面数量，从而对性能产生不利影响。然而，对于点查询来说，碎片通常不是问题。如果你看到大量扫描操作，你应该确保查询中引用的数据库对象没有过度碎片化。\n\
  \n你可以通过查询 `sys.dm_db_index_physical_stats` 来确定性能最差的查询所访问的五张表的碎片情况。首先，对 `HumanResources.Employee`\
  \ 表运行查询。\n\n```sql\nSELECT s.avg_fragmentation_in_percent,\ns.fragment_count,\n\
  s.page_count,\ns.avg_page_space_used_in_percent,\ns.record_count,\ns.avg_record_size_in_bytes,\n\
  s.index_id\nFROM sys.dm_db_index_physical_stats(DB_ID('AdventureWorks2017'),\nOBJECT_ID(N'HumanResources.Employee'),\n\
  NULL,\nNULL,\n'Sampled') AS s\nWHERE s.record_count > 0\nORDER BY s.index_id;\n\
  ```\n\n图 27-5 显示了此查询的输出。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig5_HTML.jpg](img/323849_5_En_27_Fig5_HTML.jpg)\n\
  \n图 27-5\nHumanResources.Employee 表的索引碎片情况\n\n如果你对其余四张表运行相同的查询（顺序为 `Purchasing.PurchaseOrderHeader`、`Purchasing.PurchaseOrderDetail`、`Production.Product`\
  \ 和 `Person.Person`），输出将如图 27-6 所示。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig6_HTML.jpg](img/323849_5_En_27_Fig6_HTML.jpg)\n\
  \n图 27-6\n问题查询中四张表的索引碎片情况\n\n所有索引的碎片都非常低，并且它们使用的空间都非常高。这意味着它们中的任何一个都不太可能对性能产生负面影响。如果你再考虑到这里的大多数索引都少于\
  \ 100 个页面，这使得它们成为非常小的索引，即使它们有碎片，其影响查询的程度也必定是微乎其微的。事实上，碎片化太经常被当作一种拐杖，试图在不费力识别系统中实际问题（通常是查询的内部行为）的情况下去改善性能。\n\
  \n值得注意的是，有一个索引有 301,696 行，而其他索引只有 19,972 行。如果你查一下，会发现它是一个 XML 索引，所以差异在于 XML 树。它在这些查询中未被使用，因此我们在此忽略它。\n\
  \n一旦你分析了可能影响查询性能的外部因素并解决了非最优的部分，你就应该分析内部因素，例如不当的索引和查询设计。\n\n## 分析代价最高查询的内部行为\n\n\
  现在你需要分析优化器为查询选择的执行策略，以确定影响查询性能的内部因素。分析可能影响查询性能的内部因素涉及以下步骤：\n\n- 分析查询执行计划\n- 识别执行计划中代价最高的步骤\n\
  - 分析处理策略的有效性\n\n### 分析查询执行计划\n\n要查看执行计划，请单击“显示实际执行计划”按钮将其启用，然后运行存储过程。确保你在非生产系统上进行此类测试，同时，尽可能让它像生产环境一样，以便那里的行为能反映你在生产环境中看到的情况。我们在第\
  \ 16 章介绍了执行计划。关于阅读执行计划的更多细节，请查阅我的书《SQL Server 执行计划》（Red Gate Publishing, 2018）。图\
  \ 27-7 显示了性能最差的查询的图形化执行计划。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig7_HTML.jpg](img/323849_5_En_27_Fig7_HTML.jpg)\n\
  \n图 27-7\n性能最差查询的实际执行计划\n\n这个计划的图形有点难以阅读。如果你没有跟着代码走，我会分解一些有趣的细节。你可以从这个执行计划中观察到以下内容：\n\
  \n- `SELECT` 属性\n    - `Optimization Level: Full`\n    - `Reason for Early Termination:\
  \ Good enough plan found`\n    - 查询时间统计：30ms CPU 时间 和 244 ms 已用时间\n    - 等待统计：WaitCount\
  \ 4, WaitTimeMs 214, WaitType `ASYNC_NETWORK_IO`\n- 数据访问\n    - 在非聚集索引 `Person.IX_Person_LastName_FirstName_MiddleName`\
  \ 上进行索引查找\n    - 在 `PurchaseOrderHeader.PK_PruchaseOrderHeader_PurchaseOrderID`\
  \ 上进行聚集索引扫描\n    - 在 `PurchaseOrderDetail.PK_PurchaseOrderDetail_PurchaseOrderDetailID`\
  \ 上进行聚集索引查找\n    - 在 `Product.PK_Product_ProductID` 上进行聚集索引查找\n    - 在 `Employee.PK_Employee_BusinessEntityID`\
  \ 上进行聚集索引查找\n- 连接策略\n    - 在常量扫描和 `Person.Person` 表之间进行嵌套循环连接，其中 `Person.Person`\
  \ 表作为外部表\n    - 在上一个连接的输出和 `Purchasing.PurchaseOrderHeader` 之间进行嵌套循环连接，其中 `Purchasing.PurchaseOrderHeader`\
  \ 表作为外部表\n    - 在上一个连接的输出和 `Purchasing.PurchaseOrderDetail` 表之间进行嵌套循环连接，`Purchasing.PurchaseOrderDetail`\
  \ 表也是外部表\n    - 在上一个连接的输出和 `Production.Product` 表之间进行嵌套循环连接，其中 `Production.Product`\
  \ 作为外部表\n    - 在上一个连接和 `HumanResources.Employee` 表之间进行嵌套循环连接，其中 `HumanResource.Employee`\
  \ 表作为外部表\n- 附加处理\n    - 常量扫描，为 `@LastName` 变量的 `LIKE` 操作提供占位符\n    - 计算标量，定义了 `@LastName`\
  \ 变量 `LIKE` 操作的结构，显示范围的上限和下限以及要检查的值\n    - 计算标量，将 `FirstName` 和 `LastName` 列组合成一个新列\n\
  \    - 计算标量，从 `Purchasing.PurchaseOrderDetail` 表计算 `LineTotal` 列\n    - 计算标量，获取计算出的\
  \ `LineTotal` 并将其作为永久值存储在结果集中以供进一步处理\n\n所有这些信息都可以通过浏览图形化执行计划属性表中公开的操作符的详细信息获得。\n\
  \n### 识别执行计划中代价最高的步骤\n\n一旦你理解了查询的执行计划，下一步就是识别执行计划中估计为代价最高的步骤。尽管这些成本是估计值，并且无论如何都不能反映现实，但它们是你将收到的用于衡量计划功能的唯一数字，因此识别、理解并可能解决代价最高的操作可以带来巨大的性能收益。你可以看到以下是两个代价最高的步骤：\n\
  \n- `Costly step 1`：在 `Purchasing.PurchaseOrderHeader` 表上的聚集索引扫描占 36%。\n- `Costly\
  \ step 2`：哈希匹配连接操作占 32%。\n\n接下来的优化步骤是分析这些代价最高的步骤，以确定是否可以通过重新设计查询或索引等技术来优化这些步骤。\n\
  \n\n## 分析处理策略\n\n虽然优化器已经完成了计划的优化（这一点你可以通过优化过程提前终止的原因是\"找到足够好的计划\"得知，或者因为它显示了`FULL`优化而没有提前终止的原因），但这并不意味着查询和结构中没有优化空间。你可以按照传统步骤开始对其进行评估。\n\
  \n高成本步骤 1 是聚集索引扫描。扫描不一定是个问题。它们只是表明，对相关对象（本例中是整个表）进行全表扫描，比检索查询所需信息的替代方案成本更低。\n\n\
  高成本步骤 2 是查询的哈希匹配连接操作。这同样不一定是个问题。但是，有时哈希匹配是索引缺失或索引设计不良的迹象，或者是无法利用现有索引的查询的迹象，因此它们通常是一个需要处理的区域。至少，在\
  \ OLTP 系统中经常是这种情况。对于大型数据仓库系统，哈希匹配可能是处理你在其中会看到的查询类型的理想选择。\n\n### 提示\n\n有时你可能会发现无法对处理策略中成本最高的步骤进行任何改进。在这种情况下，请专注于下一个成本最高的步骤以识别问题。如果没有任何步骤显示出优化的迹象，那么你可能需要考虑更改数据库设计或查询结构。\n\
  \n## 优化成本最高的查询\n\n一旦你诊断出具有高成本步骤的查询，下一个阶段就是实施必要的修正以降低这些步骤的成本。\n\n对于有问题的步骤，纠正措施可能有一种或多种替代解决方案。例如，是创建一个新索引还是以不同的方式构造查询？在这种情况下，你应该根据预期效果和所需工作量对解决方案进行优先级排序。例如，如果一个窄索引或多或少能完成工作，那么通常应优先选择它，而不是可能导致业务测试的代码更改。更改代码也可能是侵入性较小的方法。你需要根据所处理的业务和应用情况评估每种情况。\n\
  \n按预期收益的顺序单独应用解决方案，并衡量它们各自对查询性能的影响。最后，你可以应用能带来最大性能提升的解决方案（或多个解决方案）来纠正有问题的步骤。有时，很明显最佳解决方案会损害工作负载中的其他查询。例如，在大量列上创建新索引可能会损害操作查询的性能。然而，由于这并非总是问题，最好通过测试来确定此类优化技术对完整工作负载的影响。如果某个特定解决方案损害了工作负载的整体性能，请选择次优解决方案，同时密切关注工作负载的整体性能。\n\
  \n### 修改代码\n\n查询中成本最高的操作是对`PurchaseOrderHeader`表的聚集索引扫描。你需要做的第一件事是理解聚集索引扫描对于查询和返回的数据是否是必要的，或者它是否可能由于代码引起，甚至是由于另一个索引或不同的索引结构可以更好地工作。要开始理解为什么会发生聚集索引扫描，你应该查看扫描操作的属性。既然发生了扫描，你还需要查看代码以确保它是可使用索引搜索参数（sargable）的。具体来说，你关注的是`Predicate`属性，如图\
  \ 27-8 所示。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig8_HTML.jpg](img/323849_5_En_27_Fig8_HTML.jpg)\n\
  \n图 27-8 聚集索引扫描的谓词\n\n这是一个计算。`PurchaseOrderTable`表的`VendorID`列上有一个现有索引，可能对这个查询有用，但是因为你使用了`COALESCE`语句来筛选值，所以必须扫描整个表才能检索到信息。`COALESCE`运算符基本上是一种考虑给定值可能为`NULL`的方法，如果为`NULL`，则提供一个替代值，甚至可能是多个替代值。然而，它是一个函数，在`WHERE`子句、`JOIN`条件或`HAVING`子句中对列使用函数可能会导致扫描，因此你需要移除这个函数。因为这个函数，你不能简单地添加或修改索引，因为你最终仍然会得到扫描。你可以尝试使用`OR`子句重写查询，像这样：\n\
  \n```sql\n...WHERE   per.LastName LIKE @LastName AND\npoh.VendorID = @VendorID\n\
  OR poh.VendorID = poh.VendorID…\n```\n\n但从逻辑上讲，这与`COALESCE`操作并不相同。相反，它是用`WHERE`子句的另一部分替代一部分，而不仅仅是使用`OR`结构。因此，你可以像这样重写整个存储过程定义：\n\
  \n```sql\nCREATE OR ALTER PROCEDURE dbo.PurchaseOrderBySalesPersonName\n@LastName\
  \ NVARCHAR(50),\n@VendorID INT = NULL\nAS\nIF @VendorID IS NULL\nBEGIN\nSELECT poh.PurchaseOrderID,\n\
  poh.OrderDate,\npod.LineTotal,\np.Name AS ProductName,\ne.JobTitle,\nper.LastName\
  \ + ', ' + per.FirstName AS SalesPerson,\npoh.VendorID\nFROM Purchasing.PurchaseOrderHeader\
  \ AS poh\nJOIN Purchasing.PurchaseOrderDetail AS pod\nON poh.PurchaseOrderID = pod.PurchaseOrderID\n\
  JOIN Production.Product AS p\nON pod.ProductID = p.ProductID\nJOIN HumanResources.Employee\
  \ AS e\nON poh.EmployeeID = e.BusinessEntityID\nJOIN Person.Person AS per\nON e.BusinessEntityID\
  \ = per.BusinessEntityID\nWHERE per.LastName LIKE @LastName\nORDER BY per.LastName,\n\
  per.FirstName;\nEND\nELSE\nBEGIN\nSELECT poh.PurchaseOrderID,\npoh.OrderDate,\n\
  pod.LineTotal,\np.Name AS ProductName,\ne.JobTitle,\nper.LastName + ', ' + per.FirstName\
  \ AS SalesPerson,\npoh.VendorID\nFROM Purchasing.PurchaseOrderHeader AS poh\nJOIN\
  \ Purchasing.PurchaseOrderDetail AS pod\nON poh.PurchaseOrderID = pod.PurchaseOrderID\n\
  JOIN Production.Product AS p\nON pod.ProductID = p.ProductID\nJOIN HumanResources.Employee\
  \ AS e\nON poh.EmployeeID = e.BusinessEntityID\nJOIN Person.Person AS per\nON e.BusinessEntityID\
  \ = per.BusinessEntityID\nWHERE per.LastName LIKE @LastName\nAND poh.VendorID =\
  \ @VendorID\nORDER BY per.LastName,\nper.FirstName;\nEND\nGO\n```\n\n使用`IF`结构将查询一分为二。使用相同的参数集运行，执行时间从\
  \ 434 毫秒变为 128 毫秒（在扩展事件中测量），这是一个相当显著的改进。读取次数从 8,671 次增加到 9,243 次。虽然执行时间大幅下降，但读取次数略有增加。执行计划当然不同了，如图\
  \ 27-9 所示。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig9_HTML.jpg](img/323849_5_En_27_Fig9_HTML.jpg)\n\
  \n图 27-9 拆分查询后的新执行计划\n\n现在，两个成本最高的运算符不同了。不再有扫描操作，所有的连接操作现在都是循环连接。但是，添加了一个新的数据访问操作。你现在看到了一个`Key\
  \ Lookup`（键查找）操作，如第 12 章所述，因此你还有更多的调优机会。\n\n\n\n### 修复键查找操作\n\n既然你已经确定存在键查找操作，就需要判断是否能够应用第\
  \ 12 章中建议的任何解决方法。首先，你需要知道该操作中检索了哪些列。这意味着需要访问 `Key Lookup` 算子的属性。属性显示了 `VendorID`\
  \ 和 `OrderDate` 列。这意味着你只需通过非聚集索引的 `INCLUDE` 部分，将这些列添加到索引的叶级页面中即可。你可以如下修改该索引：\n\n\
  ```sql\nCREATE NONCLUSTERED INDEX IX_PurchaseOrderHeader_EmployeeID\nON Purchasing.PurchaseOrderHeader\n\
  (\nEmployeeID ASC\n)\nINCLUDE\n(\nVendorID,\nOrderDate\n)\nWITH DROP_EXISTING;\n\
  ```\n\n应用此索引后，执行计划发生了变化，性能也得到了修改。之前的结构和代码导致耗时 `128ms`。使用这个新索引后，查询执行时间下降到 `110ms`，读取次数也下降到\
  \ `7748`。现在的执行计划完全不同，如图 27-10 所示。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig10_HTML.jpg](img/323849_5_En_27_Fig10_HTML.jpg)\n\
  \n图 27-10\n修改索引后的新执行计划\n\n此时，执行计划中只剩下嵌套循环连接和索引查找操作。尽管查询中有 `ORDER BY` 语句，但甚至不再有排序操作。这是因为对\
  \ `Person` 表的索引查找输出是 `有序` 的，其余操作都维持了该顺序。简而言之，对于这个查询，你的状况已经相当好了，但现在存储过程中有两个查询。\n\n\
  ### 调整第二个查询\n\n消除 `COALESCE` 使你能够使用现有的索引，但这样做实际上为你的查询创建了两条路径。因为你只使用了单个参数，所以目前只探索了第一条路径，一直忽略了第二个查询。现在我们来修改测试脚本，看看查询的第二条路径将如何工作。\n\
  \n```sql\nEXEC dbo.PurchaseOrderBySalesPersonName @LastName = 'Hill%',\n@VendorID\
  \ = 1496;\n```\n\n运行此查询会产生一个完全不同的执行计划。你可以在图 27-11 中看到最有趣的部分。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig11_HTML.jpg](img/323849_5_En_27_Fig11_HTML.jpg)\n\
  \n图 27-11\n存储过程中另一个查询的执行计划\n\n这个新查询由于查询条件的不同而表现出不同的行为。这里的主要问题是对 `PurchaseOrderHeader`\
  \ 表的聚集索引扫描。尽管 `VendorID` 上有索引，但你看到的仍然是扫描操作。同样，你可以查看该算子的输出包含哪些内容。这次不止两列：`OrderDate`、`EmployeeID`、`PurchaseOrderID`。这些列虽然不算很大，但会增加索引的大小。你需要评估，索引大小的增加是否值得以换取消除索引扫描带来的性能收益。我打算通过如下修改索引来尝试一下：\n\
  \n```sql\nCREATE NONCLUSTERED INDEX IX_PurchaseOrderHeader_VendorID\nON Purchasing.PurchaseOrderHeader\n\
  (\nVendorID ASC\n)\nINCLUDE\n(\nOrderDate,\nEmployeeID,\nPurchaseOrderID\n)\nWITH\
  \ DROP_EXISTING;\nGO\n```\n\n应用索引前，执行时间约为 `4.3ms`，读取次数为 `273`。应用索引后，执行时间下降到 `2.3ms`，读取次数为\
  \ `263`。现在的执行计划如图 27-12 所示。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig12_HTML.jpg](img/323849_5_En_27_Fig12_HTML.jpg)\n\
  \n图 27-12\n修改索引后的第二个执行计划\n\n新的执行计划由索引查找和嵌套循环连接组成。其中有一个排序算子（计划中代价第二高的操作），按 `LastName`\
  \ 和 `FirstName` 对数据进行排序。让检索过程来处理排序可能有助于提高性能，但到目前为止，我已经取得了相当成功的优化效果，因此暂时保持原样。\n\n\
  对于拆分查询，还有一点需要考虑。当查询优化器处理此类查询时，两条语句都将针对传入的参数值进行优化。因此，你可能会看到糟糕的执行计划，特别是对于使用 `VendorID`\
  \ 进行过滤的第二个查询，这可能是由于不良的参数探测造成的。为避免这种情况，应进行一次额外的优化工作。\n\n### 创建包装存储过程\n\n因为你在存储过程中创建了两条路径以适应不同的数据查询机制，所以有可能遇到不良的参数探测问题，因为无论传入什么参数，两条路径都会被编译。解决此问题的一种机制是将你现有的存储过程包装进一个包装过程中。但首先，你需要创建两个新的存储过程，每个查询一个，如下所示：\n\
  \n```sql\nCREATE OR ALTER PROCEDURE dbo.PurchaseOrderByLastName\n@LastName NVARCHAR(50)\n\
  AS\nSELECT poh.PurchaseOrderID,\n       poh.OrderDate,\n       pod.LineTotal,\n\
  \       p.Name AS ProductName,\n       e.JobTitle,\n       per.LastName + ', ' +\
  \ per.FirstName AS SalesPerson,\n       poh.VendorID\nFROM   Purchasing.PurchaseOrderHeader\
  \ AS poh\n       JOIN Purchasing.PurchaseOrderDetail AS pod\n            ON  poh.PurchaseOrderID\
  \ = pod.PurchaseOrderID\n       JOIN Production.Product AS p\n            ON  pod.ProductID\
  \ = p.ProductID\n       JOIN HumanResources.Employee AS e\n            ON  poh.EmployeeID\
  \ = e.BusinessEntityID\n       JOIN Person.Person AS per\n            ON  e.BusinessEntityID\
  \ = per.BusinessEntityID\nWHERE  per.LastName LIKE @LastName\nORDER BY per.LastName,\n\
  \         per.FirstName;\nGO\n\nCREATE OR ALTER PROCEDURE dbo.PurchaseOrderByLastNameVendor\n\
  @LastName NVARCHAR(50),\n@VendorID INT\nAS\nSELECT poh.PurchaseOrderID,\n      \
  \ poh.OrderDate,\n       pod.LineTotal,\n       p.Name AS ProductName,\n       e.JobTitle,\n\
  \       per.LastName + ', ' + per.FirstName AS SalesPerson,\n       poh.VendorID\n\
  FROM   Purchasing.PurchaseOrderHeader AS poh\n       JOIN Purchasing.PurchaseOrderDetail\
  \ AS pod\n            ON  poh.PurchaseOrderID = pod.PurchaseOrderID\n       JOIN\
  \ Production.Product AS p\n            ON  pod.ProductID = p.ProductID\n       JOIN\
  \ HumanResources.Employee AS e\n            ON  poh.EmployeeID = e.BusinessEntityID\n\
  \       JOIN Person.Person AS per\n            ON  e.BusinessEntityID = per.BusinessEntityID\n\
  WHERE  per.LastName LIKE @LastName\n       AND poh.VendorID = @VendorID\nORDER BY\
  \ per.LastName,\n         per.FirstName;\nGO\n```\n\n然后，你需要修改现有的存储过程，使其如下所示：\n\n\
  ```sql\nCREATE OR ALTER PROCEDURE dbo.PurchaseOrderBySalesPersonName\n@LastName\
  \ NVARCHAR(50),\n@VendorID INT = NULL\nAS\nIF @VendorID IS NULL\nBEGIN\n    EXEC\
  \ dbo.PurchaseOrderByLastName @LastName;\nEND\nELSE\nBEGIN\n    EXEC dbo.PurchaseOrderByLastNameVendor\
  \ @LastName, @VendorID;\nEND\nGO\n```\n\n这样设置后，无论选择哪条代码路径，每次首次调用这些查询时，每个存储过程都将获得自己唯一的执行计划，从而避免了不良的参数探测。而且，这不会对执行时间产生负面影响。如果我现在运行这两个查询，结果大致相同。这种模式对于路径数量较少的情况非常有效。如果你的路径数量非常庞大，比如超过\
  \ 10 条左右，这种模式就会失效，你可能需要考虑动态执行方法。\n\n根据新的查询，执行时间从 `434ms` 降低到 `110ms` 或 `2.3ms`，这是一个相当不错的缩减，我们在读取次数方面也取得了同样大的收益。如果这个查询每分钟被调用数百次，那么这种程度的缩减将非常显著。但是，你应该始终回头评估对整体数据库工作负载的影响。\n\
  \n\n\n## 分析对数据库工作负载的影响\n\n一旦优化了性能最差的查询，你必须确保它不会损害其他查询的性能；否则，你的工作将徒劳无功。\n\n要分析整体工作负载的最终性能，你需要使用第\
  \ 15 章概述的技术。出于这个小型测试的目的，请重新执行完整的工作负载并捕获扩展事件以记录整体性能。\n\n### 提示\n\n为了与原始的扩展事件进行正确比较，请确保图形执行计划已关闭。\n\
  \n图 27-13 显示了捕获到的相应扩展事件输出。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig13_HTML.jpg](img/323849_5_En_27_Fig13_HTML.jpg)\n\
  \n图 27-13\n\n扩展事件输出显示了优化开销最大的查询对完整工作负载的影响\n\n优化性能最差的查询可能会损害工作负载中其他某些查询的性能。但是，只要工作负载的整体性能得到提升，你就可以保留对该查询所做的优化。在本例中，其他查询未受影响。但现在，有一个查询比其他查询花费的时间更长。它也可能需要优化，整个过程又重新开始。这也是\
  \ `查询存储` 发挥重要作用的地方，通过它可以轻松查找性能回归或行为变更，成为一个极好的资源。\n\n## 在优化阶段中迭代\n\n需要记住的一个重要点是，你需要多次迭代优化步骤。在每次迭代中，你可以识别一个或多个性能不佳的查询，并对其进行优化以提高工作负载的整体性能。你必须持续迭代优化步骤，直到获得足够的性能或达到服务级别协议\
  \ (`SLA`)。\n\n除了分析工作负载中的资源密集型查询外，你还必须分析工作负载中的错误条件。例如，如果你尝试向受唯一约束保护的表中插入重复行，`SQL\
  \ Server` 将拒绝新行并向应用程序报告错误条件。尽管数据未被输入表中且未执行任何有用工作，但宝贵的资源被用于确定数据无效并必须被拒绝。\n\n为了识别由数据库请求引起的错误条件，你需要在你的\
  \ `扩展事件` 会话中包含以下内容（或者，你可以创建一个新会话，在 `错误` 或 `警告` 类别中查找这些事件）：\n\n*   `error_reported`\n\
  *   `execution_warning`\n*   `hash_warning`\n*   `missing_column_statistics`\n*\
  \   `missing_join_predicate`\n*   `sort_warning`\n*   `hash_spill_details`\n\n例如，考虑以下\
  \ `SQL` 查询：\n\n```sql\nINSERT  INTO Purchasing.PurchaseOrderDetail\n(PurchaseOrderID,\n\
  DueDate,\nOrderQty,\nProductID,\nUnitPrice,\nReceivedQty,\nRejectedQty,\nModifiedDate\n\
  )\nVALUES  (1066,\n'1/1/2009',\n1,\n42,\n98.6,\n5,\n4,\n'1/1/2009'\n) ;\nGO\nSELECT\
  \  p.[Name],\npsc.[Name]\nFROM    Production.Product AS p,\nProduction.ProductSubCategory\
  \ AS psc ;\nGO\n```\n\n图 27-14 显示了相应的会话输出。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig14_HTML.jpg](img/323849_5_En_27_Fig14_HTML.jpg)\n\
  \n图 27-14\n\n扩展事件输出显示了由 SQL 工作负载引发的错误\n\n从图 27-14 中的 `扩展事件` 输出中，你可以看到我故意生成的两个错误发生了。\n\
  \n*   `error_reported`\n*   `missing_join_predicate`\n\n`error_reported` 错误是由 `INSERT`\
  \ 语句引起的，该语句试图插入未通过引用完整性检查的数据；即，它试图插入 `Productld = 42`，但 `Production.Product` 表中没有该值。从\
  \ `error_number` 列中，你可以看到错误编号是 547。`message` 列显示了错误的完整描述。不过值得注意的是，`error_reported`\
  \ 可能非常啰嗦，会返回大量数据，而且并非所有数据都有用。\n\n第二种错误类型 `missing_join_predicate` 是由 `SELECT` 语句引起的。\n\
  \n```sql\nSELECT p.Name,\nc.Name\nFROM Production.Product AS p,\nProduction.ProductSubcategory\
  \ AS c;\n```\n\n如果你仔细查看 `SELECT` 语句，会发现该查询未在两个表之间指定 `JOIN` 子句。表之间缺少连接谓词通常会导致结果集不准确和查询计划成本高昂。这就是所谓的\
  \ *笛卡尔连接* ，它会导致 *笛卡尔积* ，其中一个表的每一行与另一个表的每一行组合。你必须在 `错误和警告` 部分中识别引起此类事件的查询，并实施必要的修复。例如，在上面的\
  \ `SELECT` 语句中，你不应该将 `Production.ProductCategory` 表中的每一行都连接到 `Production.Product`\
  \ 表中的每一行——你必须只连接 `ProductCategorylD` 匹配的行，如下所示：\n\n```sql\nSELECT p.Name,\nc.Name\n\
  FROM Production.Product AS p\nJOIN Production.ProductSubcategory AS c\nON p.ProductSubcategoryID\
  \ = c.ProductSubcategoryID;\n```\n\n即使你彻底分析并优化了工作负载，你也必须记住，工作负载优化并非一劳永逸的过程。数据库上的工作负载或数据分布会随时间变化，因此你应该定期检查你的查询是否针对当前情况进行了优化。你也有可能发现数据库本身设计上的缺陷。过度规范化导致的太多连接，或不适当反规范化导致的太多列，都可能导致查询性能不佳，且没有真正的优化机会。在这种情况下，你需要考虑重新设计数据库以获得更优化的结构。\n\
  \n## 总结\n\n正如你在本章中学到的，优化数据库工作负载需要一系列工具、实用程序和命令来分析工作负载中涉及查询的不同方面。你可以使用 `扩展事件` 来分析工作负载的大局并识别开销大的查询。一旦识别出开销大的查询，你就可以使用执行计划和各种\
  \ `SQL` 命令来排查与这些查询相关的问题。根据检测到的开销查询问题，你可以应用一组或多组优化技术来提高查询性能。对开销查询的优化应该能提高工作负载的整体性能；如果未能实现，你应该回滚所做的更改。\n\
  \n在下一章中，我将简明扼要地总结与性能相关的最佳实践。你将能够把这些信息用作快速易读的参考。\n\n\n# 28. SQL Server 优化检查清单\n\n\
  如果你已经阅读了本书前 27 章，那么你应该理解了性能优化的主要方面。你也明白这是一项具有挑战性且持续进行的工作。\n\n我希望在本章中提供一个性能监控检查清单，可以在现场工作中为数据库开发人员和\
  \ DBA 提供快速参考。其理念类似于可撕下的*最佳实践*卡片。本章并未涵盖所有内容，但确实汇总了一些主要的调整活动，这些活动可以快速且显著地影响 SQL Server\
  \ 系统的性能。我将这些检查清单项目分为以下几个部分：\n\n*   数据库设计\n*   配置设置\n*   数据库管理\n*   数据库备份\n*   查询设计\n\
  \n每个部分都包含若干优化建议和技术。在适当的情况下，每个部分也交叉引用了本书中提供更详细信息的具体章节。\n\n## 数据库设计\n\n数据库设计是一个广泛的主题，在这本查询调优书的一个小节中无法给予其应有的重视；尽管如此，我建议你关注以下设计方面，以确保在早期阶段就注意到数据库性能：\n\
  \n*   使用实体完整性约束。\n*   维护域和引用完整性约束。\n*   采用索引设计最佳实践。\n*   避免为存储过程名称使用 `sp_` 前缀。\n\
  *   尽量减少触发器的使用。\n*   将表放入内存存储。\n*   使用列存储索引。\n\n### 使用实体完整性约束\n\n*数据完整性*对于确保数据库中的数据质量至关重要。数据完整性的一个基本组成部分是*实体完整性*，它将一行定义为特定表的唯一实体；也就是说，表中的每一行都必须是唯一可标识的。表中用作唯一行标识符的列或列集必须表示为表的主键。\n\
  \n有时，一个表可能包含一个额外的列（或列），该列也可以用于唯一标识表中的行。例如，`Employee` 表可能有 `EmployeeID` 和 `SocialSecurityNumber`\
  \ 列。`EmployeeID` 列用作唯一行标识符，它可以被定义为*主键*。同样，`SocialSecurityNumber` 列可以被定义为*替代键*。在\
  \ SQL Server 中，替代键可以使用唯一约束来定义，唯一约束本质上是主键的“小兄弟”。事实上，唯一约束和主键约束在后台都使用唯一索引。\n\n值得注意的是，关于使用自然键（例如，前面示例中的\
  \ `SocialSecurityNumber` 列）还是人工键（例如，`EmployeeID` 列）存在真正的分歧。我见过两种设计都成功了，但每种方法都有优点和缺点。与其建议一种而不是另一种，我将为你提供使用两者的几个原因以及每种方法的一些成本，从而避免无谓的争论。标识列通常是\
  \ `INT` 或 `BIGINT`，这使得它窄小且易于索引，从而提高性能。此外，将主键值与任何业务知识分离在某些圈子里被认为是良好的设计。有时全局唯一标识符（`GUIDs`）可能被用作主键。它们工作良好，但难以阅读，因此会影响故障排除，并且可能导致更大的索引碎片。键的宽度也可能对性能产生负面影响。人工键的一个缺点是，这些数字有时会获得业务含义，这绝对不应该发生。另一件需要记住的事情是，你必须为替代键创建唯一约束，以防止在不应存在的情况下创建多个行。这增加了你必须存储和维护的信息量。自然键提供了一个清晰、人类可读的、具有真正业务含义的主键。它们往往是较宽的字段——有时非常宽——使得它们在索引内部效率较低。此外，有时数据可能会发生变化，这会在你的数据库中产生深远的连锁反应，因为你将必须更新该键值使用的每一个地方，而不是像使用人工键那样只更新一处。随着欧盟《通用数据保护条例》（GDPR）等合规性的引入，在担心无需删除即可修改数据的能力时，自然键变得更加成问题。\n\
  \n让我重申一下，两种方法都可以很好地工作，并且每种方法都提供了大量的调优机会。任何一种方法，只要应用和维护得当，都能保护数据的完整性。\n\n\n## SQL\
  \ Server 数据完整性约束的性能优势\n\n除了维护数据完整性外，唯一索引（作为实体完整性约束的主要载体）还有助于优化器生成高效的执行计划。SQL Server\
  \ 通常可以比搜索非唯一索引更快地搜索唯一索引。这是因为唯一索引中的每一行都是唯一的；一旦找到一行，SQL Server 就无需进一步查找其他匹配行（优化器知晓此事实）。如果某列用于排序（或\
  \ `GROUP BY` 或 `DISTINCT`) 操作，请考虑在该列上定义唯一约束（使用唯一索引），因为具有唯一约束的列通常比没有唯一约束的列排序更快。此外，唯一约束为优化器的基数估计提供了额外信息。即使是一个“未使用”或“弃用”的索引，也可能由于对基数估计的影响而仍然有助于优化。\n\
  \n为了理解实体完整性或唯一约束的性能优势，请考虑以下示例。假设您想要修改 `Production.Product` 表上现有的唯一索引。\n\n```sql\n\
  CREATE NONCLUSTERED INDEX AK_Product_Name\nON Production.Product\n(\nName ASC\n\
  )\nWITH (DROP_EXISTING = ON)\nON [PRIMARY];\nGO\n```\n\n该非聚集索引不包含 `UNIQUE` 约束。因此，尽管\
  \ `[Name]` 列包含唯一值，但非聚集索引中缺少 `UNIQUE` 约束，无法预先将此信息提供给优化器。现在，让我们考虑 `UNIQUE` 约束（或缺失的\
  \ `UNIQUE` 约束）对以下 `SELECT` 语句的性能影响：\n\n```sql\nSELECT DISTINCT\n(p.Name)\nFROM Production.Product\
  \ AS p;\n```\n\n图 28-1 显示了此 `SELECT` 语句的执行计划。\n\n![../images/323849_5_En_28_Chapter/323849_5_En_28_Fig1_HTML.jpg](img/323849_5_En_28_Fig1_HTML.jpg)\n\
  \n*图 28-1：Name 列上没有 UNIQUE 约束的执行计划*\n\n从执行计划中可以看出，使用了非聚集 `AK_ProductName` 索引来检索数据，然后对数据执行\
  \ `Stream Aggregate` 操作，以便按 `[Name]` 列对数据进行分组，从而可以从最终结果集中删除重复的 `[Name]` 值。请注意，如果优化器事先被告知\
  \ `[Name]` 列的唯一性，则不需要 `Stream Aggregate` 操作。您可以通过定义带有 `UNIQUE` 约束的非聚集索引来实现这一点，如下所示：\n\
  \n```sql\nCREATE UNIQUE NONCLUSTERED INDEX [AK_Product_Name]\nON [Production].Product\n\
  WITH (\nDROP_EXISTING = ON)\nON    [PRIMARY];\nGO\n```\n\n图 28-2 显示了该 `SELECT` 语句新的执行计划。\n\
  \n![../images/323849_5_En_28_Chapter/323849_5_En_28_Fig2_HTML.jpg](img/323849_5_En_28_Fig2_HTML.jpg)\n\
  \n*图 28-2：Name 列上有 UNIQUE 约束的执行计划*\n\n一般来说，实体完整性约束（即主键和唯一约束）为优化器提供了有关预期结果的有用信息，协助优化器生成高效的执行计划。值得注意的是，`sys.dm_db_index_usage_stats`\
  \ 不会显示何时针对定义唯一约束的索引运行了约束检查。\n\n## 维护域和引用完整性约束\n\n数据完整性的另外两个重要组成部分是**域完整性**和**引用完整性**。列的域完整性可以通过限制列的数据类型、定义输入数据的格式以及限制列的可接受值范围来强制实施。引用完整性则通过使用表之间定义的外键约束来强制实施。SQL\
  \ Server 提供以下功能来实现域和引用完整性：数据类型、`FOREIGN KEY` 约束、`CHECK` 约束、`DEFAULT` 定义和 `NOT NULL`\
  \ 定义。如果应用程序要求将数据列的值限制在某个值范围内，则此业务规则可以在应用程序代码中实现，也可以在数据库架构中实现。在数据库中使用域约束（例如 `CHECK`\
  \ 约束）来实现此类业务规则，可以帮助优化器生成高效的执行计划。\n\n为了理解域完整性的性能优势，请考虑以下示例：\n\n```sql\nDROP TABLE\
  \ IF EXISTS dbo.Test1;\nGO\nCREATE TABLE dbo.Test1 (\nC1 INT,\nC2 INT CHECK (C2\
  \ BETWEEN 10 AND 20)\n) ;\nINSERT  INTO dbo.Test1\nVALUES  (11, 12);\nGO\nDROP TABLE\
  \ IF EXISTS dbo.Test2;\nGO\nCREATE TABLE dbo.Test2 (C1 INT, C2 INT);\nINSERT  INTO\
  \ dbo.Test2\nVALUES  (101, 102);\n```\n\n现在执行以下两个 `SELECT` 语句：\n\n```sql\nSELECT\
  \ T1.C1,\nT1.C2,\nT2.C2\nFROM dbo.Test1 AS T1\nJOIN dbo.Test2 AS T2\nON T1.C1 =\
  \ T2.C2\nAND T1.C2 = 20;\nGO\nSELECT T1.C1,\nT1.C2,\nT2.C2\nFROM dbo.Test1 AS T1\n\
  JOIN dbo.Test2 AS T2\nON T1.C1 = T2.C2\nAND T1.C2 = 30;\n```\n\n这两个 `SELECT` 语句看起来相同，除了谓词值不同（第一个语句中是\
  \ `20`，第二个语句中是 `30`）。尽管这两个 `SELECT` 语句形式相同，但由于 `CHECK` 约束作用于 `Tl.C2` 列，优化器对它们的处理方式不同，如图\
  \ 28-3 中的执行计划所示。\n\n![../images/323849_5_En_28_Chapter/323849_5_En_28_Fig3_HTML.jpg](img/323849_5_En_28_Fig3_HTML.jpg)\n\
  \n*图 28-3：谓词值在 CHECK 约束边界内外的执行计划*\n\n从执行计划中可以看出，对于第一个查询（`T1.C2` = `20`），优化器访问了两个表的数据。对于第二个查询（`Tl.C2`\
  \ = `30`），优化器根据列 `Tl.C2` 上对应的 `CHECK` 约束了解到该列不能包含 `10` 到 `20` 范围之外的任何值。因此，优化器甚至不访问任何一个表的数据。因此，第二个查询的相对估计成本以及几乎不执行任何操作的实际性能测量结果为\
  \ 0%。\n\n我在第 19 章的“声明式引用完整性”一节中详细解释了引用完整性的性能优势。\n\n因此，您应该使用域和引用约束，不仅是为了实现数据完整性，也是为了协助优化器生成高效的查询计划。确保使用\
  \ `WITH CHECK` 选项创建外键约束，否则优化器将忽略它们。要了解域和引用完整性的其他性能优势，请参阅第 19 章的“使用域和引用完整性”一节。\n\n\
  \n\n### 遵循索引设计最佳实践\n\n最常见的优化建议——也通常是提升良好性能的最大贡献因素之一——就是为数据库工作负载实施正确的索引。索引与表不同，表用于存储数据，即使不深入了解查询也可以进行设计（只要表能正确表示业务实体）。相反，索引必须通过仔细审查数据库查询来设计。除了常见且显而易见的情况（如主键和唯一索引）外，请避免陷入不了解查询就设计索引的陷阱。即使对于主键和唯一索引，我也建议你在开始设计数据库查询时，验证这些索引的适用性。考虑到索引对数据库性能的重要性，设计索引时必须谨慎。\n\
  \n尽管索引的性能方面在第 8、9、12 和 13 章中有详细解释，但为了便于参考，我将在此重申一个简短的建议列表：\n\n*   为索引键选择较窄的列。\n\
  *   确保候选列中数据的选择性非常高（即，该列返回的候选值数量必须很少）。\n*   优先选择整数数据类型（或其变体）的列。同时，避免在`VARCHAR`等字符串数据类型的列上创建索引。\n\
  *   在多列索引中，考虑将选择性更高的列列在前面。\n*   使用索引中的`INCLUDE`列表，作为一种在不改变索引键结构的情况下使索引覆盖该结构的方法。通过向键添加列来实现这一点，这可以避免昂贵的查找操作。\n\
  *   在决定对哪些列进行索引时，要特别注意查询的`WHERE`子句、`JOIN`条件列和`HAVING`子句。这些可以作为进入表的入口点，特别是当`WHERE`子句条件对某个列使用高度选择性的值或常量进行数据过滤时。这样的子句可以使该列成为索引的主要候选。\n\
  *   在选择索引类型（聚集或非聚集、列存储或行存储）时，请牢记各种索引类型的优缺点。\n\n设计聚集索引时要格外小心，因为表上的每个非聚集索引都依赖于聚集索引。因此，设计和实现聚集索引时请遵循以下建议：\n\
  \n*   尽可能保持聚集索引狭窄。你不希望因为有一个宽的聚集索引而加宽所有非聚集索引。\n*   首先创建聚集索引，然后在表上创建非聚集索引。\n*   如果需要，使用`CREATE\
  \ INDEX`命令中的`DROP_EXISTING = {ON|OFF}`命令在单一步骤中重建聚集索引。你不希望重建表上的所有非聚集索引两次：一次是在删除聚集索引时，另一次是在重新创建聚集索引时。\n\
  *   不要在频繁更新的列上创建聚集索引。如果这样做，表上的非聚集索引将通过与聚集索引键值保持同步而产生额外的负载。\n\n为了跟踪你已创建的索引并确定需要创建的其他索引，你应该利用\
  \ SQL Server 2017 和 Azure SQL Database 为你提供的动态管理视图。通过定期（例如每周一次左右）检查`sys.dm_db_index_usage_stats`中的数据，你可以确定哪些索引实际在使用，哪些是冗余的。那些没有为你的查询做出贡献以帮助你提高性能的索引，只是系统的负担。当表中的数据发生变化时，它们不仅需要更多的磁盘空间，还需要额外的\
  \ I/O 来维护索引内的数据。另一方面，查询`sys.dm_db_missing_indexes_details`将显示系统认为缺失的潜在索引，甚至建议`INCLUDE`列。你可以访问\
  \ DMV `sys.dm_db_missing_indexes_groups_stats`来查看有关可能受益于特定索引组的查询被调用次数的汇总信息。记住要彻底测试这些建议，不要假设它们一定是正确的。所有这些建议都只是建议。结合所有这些技巧，可以为你提供一种长期维护系统中索引的最佳方法。\n\
  \n### 避免在存储过程名称中使用 sp_ 前缀\n\n作为规则，不要为用户存储过程使用`sp_`前缀，因为 SQL Server 会假定带有`sp_`前缀的存储过程是系统存储过程，并且这些过程应该位于\
  \ master 数据库中。使用`sp`或`usp`作为用户存储过程的前缀非常普遍。这既不是主要的性能影响，也不是主要问题，但何必自找麻烦呢？`sp_`前缀的性能影响在第\
  \ 20 章的“小心命名存储过程”一节中有详细解释。完全去掉前缀是一个不错的方法。你有足够的空间用于描述性的对象名称。没有必要使用那些对查询的功能定义没有帮助的奇怪缩写。\n\
  \n### 最小化触发器的使用\n\n触发器为在数据库内自动化行为提供了一种有吸引力的方法。由于它们在数据被其他进程（无论何种进程）操作时触发，因此可用于确保在数据更改时运行某些功能。同样的功能使它们变得危险，因为它们对于正在处理系统的开发人员或\
  \ DBA 来说并非立即可见。在设计查询和排查性能问题时，必须考虑到它们。因为它们带有某种隐性成本，所以应仔细考虑触发器。在使用触发器之前，请确保解决所呈现问题的唯一方法是使用触发器。如果你确实使用了触发器，请在尽可能多的地方记录这一事实，以确保其他开发人员和\
  \ DBA 在工作中考虑到触发器的存在。\n\n### 将表放入内存存储\n\n虽然内存存储机制存在大量限制，但其性能收益很高。如果你有一个高吞吐量的 OLTP\
  \ 系统，并且看到大量 I/O 争用，尤其是在闩锁方面，那么内存存储是一个可行的选择。你可能还想探索将内存存储用于表变量以帮助提升其性能。如果你有不需要持久化的数据，你甚至可以使用`SCHEMA_ONLY`持久性选项在内存中创建表。通用的方法是使用内存中对象来帮助处理高吞吐量的\
  \ OLTP（在这些场景下你可能会遇到并发问题），而不是数据仓库场景中经历的更大量的扫描等情况。所有这些方法都能带来显著的性能收益。但请记住，你必须有足够的内存来支持这些选项。这里没有什么神奇之处。你是通过投入大量的内存（也就是金钱）来解决问题，从而提升性能。\n\
  \n\n### 使用列存储索引\n\n如果您正在设计和构建数据仓库，使用列存储索几乎是顺理成章的事。您的大多数查询很可能涉及跨大数据集的聚合操作，因此列存储索引是一种天然的性能增强器。不过，别忘了在您的\
  \ **OLTP** 系统中也启用非聚集列存储索引，特别是当系统中存在频繁的分析型查询时。这会带来额外的维护开销，并增加数据库的大小，但其带来的好处是巨大的。您可以创建一个由聚集索引定义的\
  \ **行存储表**，并让其使用列存储索引。您也可以创建一个由聚集索引定义的 **列存储表**，并让其使用行存储索引。通过这两种机制，您可以确保满足最常见的查询风格（分析型或\
  \ **OLTP**），同时仍然支持另一种风格。\n\n## 配置设置\n\n以下是服务器和数据库配置设置的检查清单，这些设置对数据库性能有重大影响：\n\n\
  *   内存配置选项\n*   并行运算的成本阈值\n*   最大并行度\n*   针对即席工作负荷进行优化\n*   被阻止进程阈值\n*   数据库文件布局\n\
  *   数据库压缩\n\n我将在后续章节中更详细地介绍这些设置。\n\n### 内存配置选项\n\n如第 2 章“SQL Server 内存管理”一节所述，强烈建议将\
  \ `max server memory`（最大服务器内存）设置配置为一个由系统配置决定的非默认值。SQL Server 的这些内存配置在第 2 章的“内存瓶颈分析”和“内存瓶颈解决方案”两节中有详细解释。\n\
  \n### 并行运算的成本阈值\n\n在具有多处理器的系统上，可以并行执行查询。并行的默认值为 5。这代表优化器估计查询执行成本为五秒。在大多数情况下，我发现这个值被设得太低；换句话说，提高并行阈值能带来更好的性能。在您的系统上进行测试将帮助您确定合适的值。为这个阈值建议一个具体的数值可能有些冒进，但我还是要提一下。我建议从测试值\
  \ 35 开始，然后观察效果。更好的方法是，使用查询存储中的数据来确定所有查询的平均成本，然后将 `Cost Threshold for Parallelism`（并行运算的成本阈值）的值设置为高于该平均值两到三个标准差。这样，大约\
  \ 95% 到 98% 的查询将不会进入并行处理，而那些真正需要并行的查询则会受益。最后，请记住您运行的是哪种类型的系统。**OLTP** 系统更可能从大量使用少量\
  \ CPU 的查询中获益，而分析型系统则更可能从更多使用更多 CPU 的查询中获益。\n\n### 最大并行度\n\n当系统有多个可用处理器时，默认情况下 SQL\
  \ Server 会在并行执行期间使用所有处理器。为了更好地控制机器负载，您可能会发现限制并行执行使用的处理器数量是有用的。此外，您可能需要设置处理器关联性，以便为操作系统以及与\
  \ SQL Server 一起运行的其他服务保留某些处理器。**OLTP** 系统可能会从完全禁用并行中获益，尽管这是一个有争议的选择。首先尝试提高并行运算的成本阈值，因为即使在\
  \ **OLTP** 系统中，也有一些查询（尤其是维护作业）会从并行执行中受益。您也可以探索使用资源调控器来控制某些工作负荷的可能性。\n\n### 针对即席工作负荷进行优化\n\
  \n如果对系统的主要调用是以即席或动态 **T-SQL** 的形式发起，而不是通过定义良好的存储过程或参数化查询（例如在某些对象关系映射 (**ORM**) 软件的实现中可能见到的那样），那么启用\
  \ `optimize for ad hoc workloads`（针对即席工作负荷进行优化）设置将减少过程缓存的消耗，因为系统会为初始查询调用创建计划存根，而不是完整的执行计划。这在第\
  \ 18 章中有详细说明。\n\n### 被阻止进程阈值\n\n`blocked process threshold`（被阻止进程阈值）设置以秒为单位定义何时触发被阻止进程报告。当查询运行并超过该阈值时，报告会被触发。同时也会触发一个警报，可用于发送电子邮件或短信。测试单个系统以确定此设置的值。您可以使用扩展事件\
  \ (**Extended Events**) 中的事件来监视此阈值。\n\n### 数据库文件布局\n\n为便于参考，以下是规划数据库文件布局时应考虑的最佳实践：\n\
  \n*   将用户数据库的数据文件和事务日志文件放在不同的 **I/O** 路径上。这允许事务日志磁头顺序推进，而不会被数据文件常用的非顺序 **I/O** 随机移动。\n\
  *   将事务日志放在专用磁盘上也能增强数据保护。如果数据库磁盘发生故障，您将能够通过对事务日志执行备份来保存故障点之前所有已完成的事务。在恢复过程中使用此最后一个事务日志备份，您将能够将数据库恢复到故障发生点。这被称为\
  \ *时间点恢复*。\n*   避免为事务日志使用 **RAID 5**，因为对于每个写入请求，与 **RAID 1** 或 **10** 相比，**RAID\
  \ 5** 磁盘阵列会产生两倍的磁盘 **I/O**。\n*   您可以为数据文件选择 **RAID 5**，因为即使在繁重的 **OLTP** 系统中，读取请求数量通常是写入请求数量的七到八倍。此外，对于读取请求，**RAID\
  \ 5** 的性能与总磁盘数相同的 **RAID 1** 和 **RAID 10** 相似。\n*   考虑转向更现代的磁盘子系统，如 **SSD** 或 **FusionIO**。\n\
  *   为 `tempdb` 创建多个文件。一般规则是文件数量为逻辑处理器核心数的一半或四分之一。现在 `tempdb` 中的所有分配都使用均匀区。您还会看到文件现在会自动增长到相同大小。\n\
  \n要详细了解数据库文件布局和 **RAID** 子系统，请参阅第 3 章的“磁盘瓶颈解决方案”一节。\n\n### 数据库压缩\n\n自 2008 年起，SQL\
  \ Server 的企业版和开发者版就提供了数据压缩功能。随着更多数据存储在一个页面上，这可以在占用空间和性能方面带来巨大好处。这些好处是以系统 **CPU**\
  \ 和内存的额外开销为代价的；然而，好处通常远远大于成本。在实施压缩时请考虑到这一点。\n\n## 数据库管理\n\n供您参考，以下是与性能相关的数据库管理活动的简短清单，您应将其作为管理数据库服务器过程的一部分定期执行：\n\
  \n*   保持统计信息为最新。\n*   将索引碎片保持在最低水平。\n*   避免使用诸如 `AUTOCLOSE`（自动关闭）或 `AUTOSHRINK`（自动收缩）之类的自动数据库功能。\n\
  \n在以下部分中，我将更详细地介绍上述活动。\n\n## 注意\n\n有关 SQL Server 2017 管理需求和方法的详细说明，请参阅 Microsoft\
  \ SQL Server 联机丛书文章“数据库引擎功能和任务”（[`http://bit.ly/SIlz8d`](http://bit.ly/SIlz8d))。\n\
  \n\n### 保持统计信息最新\n\n数据库统计信息对性能的影响在第 13 章（以及本书多处）有详细解释；不过，以下这份简要清单可作为保持统计信息最新的快速参考：\n\
  \n*   允许 SQL Server 使用配置参数 `AUTO_CREATE_STATISTICS` 和 `AUTO_UPDATE_STATISTICS` 的默认设置，自动维护表中数据分布的统计信息。\n\
  \n*   作为一项主动措施，您可以根据需要并在系统支持的前提下，以编程方式定期更新每个数据库对象的统计信息。这种做法能在自动更新统计信息功能未能提供满意结果时，部分保护您的数据库免受统计信息过时的影响。在第\
  \ 13 章中，我将说明如何设置 SQL Server 作业以按计划定期更新统计信息。\n\n*   请记住，您还可以以异步方式更新统计信息。这减少了在更新统计信息时对其的争用；因此，如果您的系统访问量相当持续，可以使用此方法更频繁地更新统计信息。如果您观察到统计信息更新引起的等待，异步方式可能更有帮助。\n\
  \n## 注意\n\n请确保在索引碎片整理作业完成之前安排统计信息更新作业，如本章后面所述。\n\n### 将索引碎片控制在最低限度\n\n以下最佳实践将帮助您将索引碎片控制在最低水平：\n\
  \n*   定期在非高峰时段对数据库进行碎片整理。\n\n*   定期确定索引的碎片级别；然后，根据该碎片情况，选择重建索引或通过执行第 14 章中概述的碎片整理查询来整理索引碎片。\n\
  \n*   请记住，非常小的表根本不需要进行碎片整理。\n\n*   在涉及非常大的数据库时，对于索引碎片整理可能适用不同的规则。\n\n*   如果您有仅用于单次查找操作的索引，那么碎片不会影响性能。\n\
  \n*   在 Azure SQL Database 中，仅在真正需要时才重建索引更为重要。重建索引会消耗大量 I/O 带宽，并可能导致节流。\n\n另请记住，索引碎片问题远没有大多数人想象的那么严重。一些专家甚至认为整理索引碎片是在浪费时间。虽然我仍然认为它有好处，但这取决于具体情况，因此请务必仔细监控和衡量您的性能指标，以便判断碎片整理是否有益。\n\
  \n### 避免使用如 AUTO_CLOSE 或 AUTO_SHRINK 之类的数据库功能\n\n`AUTO_CLOSE` 会在最后一个用户连接关闭时，干净地关闭数据库并释放其所有资源。这意味着缓存中的所有数据和查询都会自动清空。当下一个连接进来时，不仅数据库必须重新启动，而且所有数据都必须重新加载到缓存中。此外，存储过程和其他查询也必须重新编译。这对大多数数据库系统来说是一项极其昂贵的操作。请将\
  \ `AUTO_CLOSE` 保留为其默认值 `OFF`。\n\n`AUTO_SHRINK` 会定期收缩数据库大小。它可以收缩数据文件，在简单恢复模式下，也可以收缩日志文件。在执行此操作时，它可能会阻塞其他进程，严重减慢您的系统。通常，在启用了\
  \ `AUTO_SHRINK` 的系统上，文件增长也会被设置为自动发生，因此当数据或日志文件需要增长时，您的系统会再次被拖慢。此外，您会看到物理文件存储在操作系统级别变得碎片化，严重影响性能。请将数据库大小设置为适当的大小，并监控其增长需求。如果必须自动增长，请按固定增量增长，而不是按百分比增长。\n\
  \n### 数据库备份\n\n数据库备份是一个广泛的主题，无法在本查询优化书中得到充分阐述。尽管如此，我建议在涉及数据库性能时，请关注数据库备份过程的以下方面：\n\
  \n*   差异备份和事务日志备份的频率\n\n*   备份的分布\n\n*   备份压缩\n\n接下来的章节将对这些建议进行更详细的说明。\n\n### 差异备份和事务日志备份频率\n\
  \n对于 OLTP 数据库，必须定期备份数据库，以便在发生故障时，可以将数据库还原到不同的服务器。对于大型数据库，完整数据库备份通常需要很长时间，因此无法频繁执行。因此，完整备份在较长的时间间隔进行，而在两个连续完整备份之间安排更频繁的差异备份和事务日志备份。通过设置频繁的差异备份和事务日志备份，如果数据库完全故障，可以将数据库恢复到某个时间点。\n\
  \n差异备份可用于减少完整备份的开销，因为它只备份自上次完整备份以来更改的数据。因为这可能快得多，所以对生产系统造成的减速也会更小。每种情况都是独特的，因此您需要找到最适合您的方法。作为一般规则，我建议每周进行一次完整备份，然后每天进行差异备份。之后，您可以确定事务日志备份的需求。\n\
  \n频繁备份事务日志会给服务器增加少量开销，尤其是在高峰时段。\n\n对于大多数企业来说，可接受的数据丢失量（就时间而言）通常优先于节省日志磁盘空间或提供理想的数据库性能。因此，在安排事务日志备份时，必须考虑可接受的数据丢失量，而不是随意将备份计划设置为较短的时间间隔。\n\
  \n\n## 备份调度分布\n\n当需要备份多个数据库时，必须确保所有全备份不被安排在同一时间执行，以避免硬件资源同时受到冲击。如果备份过程涉及将数据库备份到中央\
  \ SAN 磁盘阵列，那么所有数据库服务器的全备份必须分散安排在备份时间窗口内，这样中央备份基础设施就不会因同时收到过多备份请求而不堪重负。同时用大量备份请求淹没中央基础设施，会迫使基础设施的组件将大量资源仅用于管理过多的请求。这种资源使用不当会显著增加备份时长，导致全备份在高峰时段仍在继续，从而影响用户请求的性能。\n\
  \n为了最小化全备份过程对数据库性能的影响，您首先必须确定可以安排全备份的非高峰时段，然后将全备份分散安排在该非高峰时间窗口内，具体步骤如下：\n\n1.  确定必须备份的数据库数量。\n\
  2.  根据数据库对业务的重要性进行优先级排序。\n3.  确定可以安排全数据库备份的非高峰时段。\n4.  计算两个连续全备份之间的时间间隔，公式如下：时间间隔\
  \ = (总备份时间窗口) / (全备份次数)。\n5.  按照数据库优先级顺序安排全备份，第一次备份在备份窗口开始时启动，后续备份按上述公式计算的时间间隔均匀分布执行。\n\
  \n这种全备份的均匀分布将确保备份基础设施不会同时被过多的备份请求淹没，从而降低全备份对数据库性能的影响。\n\n## 备份压缩\n\n对于相对较大的数据库，备份时长和备份文件大小通常会成为问题。过长的备份时长使得在管理时间窗口内完成备份变得困难，进而开始影响最终用户的体验。备份文件的大尺寸使得备份文件的空间管理颇具挑战性，并且在通过网络将备份执行到中央备份基础设施时，会增加网络压力。压缩还有助于加快备份过程，因为需要写入磁盘的数据量减少了。\n\
  \n优化备份时长、备份文件大小及由此产生的网络压力的推荐方法是使用 `备份压缩`。\n\n## 查询设计\n\n在设计数据库查询时，您应遵循以下与性能相关的最佳实践列表：\n\
  \n*   使用命令 `SET NOCOUNT ON`。\n*   显式定义对象的所有者。\n*   避免使用 `非可搜索` 条件。\n*   避免在 `WHERE`\
  \ 子句的列上使用算术运算符和函数。\n*   避免使用优化器提示。\n*   远离嵌套视图。\n*   确保没有隐式数据类型转换。\n*   最小化日志记录开销。\n\
  *   采用重用执行计划的最佳实践。\n*   采用数据库事务的最佳实践。\n*   消除或减少数据库游标的开销。\n*   使用本机编译存储过程。\n*  \
  \ 利用列存储索引进行分析查询。\n\n我将在以下各节中详细阐述每一项最佳实践。\n\n### 使用命令 `SET NOCOUNT ON`\n\n作为规则，始终在存储过程、触发器和其他批处理查询中将命令\
  \ `SET NOCOUNT ON` 作为首条语句使用。这使您能够避免与每次执行 SQL 语句后返回受影响行数相关的网络开销。命令 `SET NOCOUNT`\
  \ 在第 20 章的 “使用 SET NOCOUNT” 一节中有详细解释。\n\n### 显式定义对象的所有者\n\n作为一项性能最佳实践，始终使用其所有者名称限定数据库对象，以避免验证对象所有者所需的运行时开销。显式限定数据库对象所有者的性能优势在第\
  \ 16 章的 “不允许在查询中隐式解析对象” 一节中有详细解释。\n\n### 避免非可搜索条件\n\n在定义查询中的搜索条件时要保持警惕。如果 `WHERE`\
  \ 子句中使用的列上的搜索条件阻止优化器有效使用该列上的索引，那么即使存在正确的索引，查询的执行成本也会很高。非可搜索条件对性能的影响在第 19 章的相应章节中有详细解释。\n\
  \n此外，请注意在搜索功能上不要提供过多的灵活性。如果您定义了一个应用程序功能，例如“检索产品名称以‘caps’结尾的所有产品”，那么您将得到需要扫描完整表（或聚集索引）的查询。如您所知，扫描一个包含数百万行的表会损害您的数据库性能。除非使用索引提示，否则您将无法从该列上的索引中受益。然而，使用索引提示会覆盖查询优化器的决策，因此通常也不建议使用索引提示（更多信息请参见第\
  \ 19 章）。要理解此类业务规则对性能的影响，请考虑以下 `SELECT` 语句：\n\n```sql\nSELECT p.*\nFROM Production.Product\
  \ AS p\nWHERE p.Name LIKE '%Caps';\n```\n\n在图 28-4 中，您可以看到执行计划使用了 `[Name]` 列上的索引，但它执行的是扫描而非查找。由于字符数据类型（如\
  \ `CHAR` 和 `VARCHAR`）列上的索引会根据列的前导字符对数据值进行排序，因此在 `LIKE` 条件中使用前导 `%` 不允许对索引执行查找操作。匹配的行可能分布在整个索引行中，使得索引对搜索条件无效，从而损害查询性能。\n\
  \n![../images/323849_5_En_28_Chapter/323849_5_En_28_Fig4_HTML.jpg](img/323849_5_En_28_Fig4_HTML.jpg)\n\
  \n图 28-4：一个执行计划，显示由非可搜索 `LIKE` 子句引起的聚集索引扫描。\n\n### 避免在 WHERE 子句的列上使用算术表达式\n\n应始终避免在\
  \ `WHERE` 和 `JOIN` 子句中的列上使用算术运算符和函数。在列上使用运算符和函数会阻止对这些列使用索引。在 `WHERE` 子句列上使用算术运算符对性能的影响在第\
  \ 18 章的“避免在 WHERE 子句列上使用算术运算符”一节中有详细解释，而使用函数的影响在同一章的“避免在 WHERE 子句列上使用函数”一节中也有详细说明。\n\
  \n为了直观理解，请考虑以下查询：\n\n```sql\nSELECT  soh.SalesOrderNumber\nFROM    Sales.SalesOrderHeader\
  \ AS soh\nWHERE   'SO5' = LEFT(SalesOrderNumber, 3);\n\nSELECT  soh.SalesOrderNumber\n\
  FROM    Sales.SalesOrderHeader AS soh\nWHERE   SalesOrderNumber LIKE 'SO5%';\n```\n\
  \n这些查询基本实现了相同的逻辑：它们检查 `SalesOrderNumber` 是否等于 `S05`。然而，第一个查询在 `SalesOrderNumber`\
  \ 列上执行了一个函数，而第二个查询使用 `LIKE` 子句来检查相同的数据。图 28-5 展示了由此产生的执行计划。\n\n![../images/323849_5_En_28_Chapter/323849_5_En_28_Fig5_HTML.jpg](img/323849_5_En_28_Fig5_HTML.jpg)\n\
  \n图 28-5\n显示函数阻止索引使用的执行计划\n\n如图 28-5 所示，第一个查询强制执行了 `索引扫描` 操作，而第二个查询则能够执行一个干净利落的\
  \ `索引 Seek`。这些示例清楚地说明了为什么应该避免在 `WHERE` 子句的列上使用函数和运算符。\n\n你在执行计划中看到的警告与 `SalesOrderHeader`\
  \ 表中计算列内发生的隐式转换有关。\n\n### 避免优化器提示\n\n作为一项规则，应避免使用优化器提示，例如索引提示和连接提示，因为它们会推翻优化器的决策过程。在大多数情况下，优化器足够智能，能够生成高效的执行计划，并且在没有对其施加任何优化器提示时，它的工作效果最佳。关于优化器提示对性能影响的详细理解，请参阅第\
  \ 19 章的“避免优化器提示”一节。\n\n### 远离嵌套视图\n\n当一个视图调用另一个视图，而后者又调用更多视图，如此层层嵌套时，就存在嵌套视图。这可能导致代码混乱，原因有二。首先，视图掩盖了正在执行的操作。其次，查询本身可能很简单，但\
  \ SQL 引擎的执行计划和后续操作可能复杂且开销巨大。这是因为优化器没有时间来简化查询，消除不需要的表和列；相反，优化器会假定所有表和列都是必需的。同样的规则也适用于嵌套用户定义函数。\n\
  \n### 确保没有隐式数据类型转换\n\n在查询中创建变量时，请确保这些变量的数据类型与它们将要比较的列的数据类型相同。尽管 SQL Server 可以并且将会进行转换，例如将\
  \ `VARCHAR` 转换为 `DATE`，但这种隐式转换可能会阻止索引的使用。在表连接等情况下，你也必须同样小心，确保一个表的主键数据类型与被连接表的外键相匹配。你偶尔可能会在执行计划中看到警告来帮助你解决这个问题，但你不能依赖于此。\n\
  \n### 最小化日志记录开销\n\nSQL Server 在事务日志中维护每个原子操作（或事务）的新旧状态，以确保数据库的一致性和持久性。这可能会给日志磁盘带来巨大压力，常常使日志磁盘成为争用点。因此，为了提高数据库性能，必须尝试优化事务日志开销。除了本章后面讨论的硬件解决方案外，还应采用以下查询设计最佳实践：\n\
  \n*   对于小于 20 到 50 行的小型结果集，尽可能选择表变量而不是临时表。请记住，如果结果集不小，你可能会遇到严重问题。表变量的性能优势在第 18 章的“使用表变量”一节中有详细解释。\n\
  *   将多个操作查询批处理到单个事务中。使用此选项时必须小心，因为如果在单个事务中影响的行数过多，相应的数据库对象将被长时间锁定，从而阻塞所有其他试图访问这些对象的用户。\n\
  *   通过使用大容量日志恢复模型来减少某些操作的日志记录量。此规则主要适用于处理大规模数据操作时。当启用大容量日志恢复模型时，你还会在使用 `UPDATE`\
  \ 语句的 `WRITE` 子句或删除或创建索引时使用最小日志记录。\n\n### 采用重用执行计划的最佳实践\n\n优化计划生成成本的最佳实践可大致分为以下两类：\n\
  \n*   有效缓存执行计划\n*   最小化执行计划的重新编译\n\n#### 有效缓存执行计划\n\n你必须确保查询的执行计划不仅被缓存，而且要经常重用。通过采用以下最佳实践来实现：\n\
  \n*   避免以非参数化、即席查询的方式执行查询。相反，将查询的可变部分参数化，并使用存储过程或 `sp_executesql` 系统存储过程提交参数化查询。\n\
  *   如果必须使用大量即席查询，请启用“针对即席工作负载进行优化”选项，该选项将在第一次调用查询时创建一个计划存根，而不是一个完整的计划。这极大地减少了使用的过程缓存量。\n\
  *   在执行相同参数化查询的每个连接中使用相同的环境设置（如 `ANSI NULLS`）。这很重要，因为查询的执行计划取决于连接的环境设置。\n*   如前面“显式定义对象的所有者”一节所述，在查询中访问对象时，显式限定对象的所有者。\n\
  \n整个想法是确保缓存中只有你需要的计划，并且你重复使用这些计划，而不是总是编译新的计划。关于计划缓存的上述方面在第 17 章中有详细解释。\n\n#### 最小化执行计划的重新编译\n\
  \n为了最小化查询执行计划的不必要生成，你必须确保缓存中的计划不会因你能控制的原因而失效或重新编译。以下推荐的最佳实践可以最小化存储过程计划的重新编译：\n\n\
  *   不要在存储过程中交错使用 DDL 和 DML 语句。应将所有 DDL 语句放在存储过程的顶部。\n*   在存储过程中，避免使用在存储过程外部创建的临时表。\n\
  *   对于小型数据集，优先使用表变量而不是临时表。\n*   不要在存储过程中更改 `ANSI SET` 选项。\n*   如果确实无法避免重新编译，那么识别导致重新编译的存储过程语句，并通过\
  \ `sp_executesql` 系统存储过程执行它。\n\n存储过程重新编译的原因和推荐的解决方案在第 18 章中有详细解释。\n\n### 采用数据库事务最佳实践\n\
  \n你设计的并发查询效率越高，查询完成的速度就越快，彼此之间不会相互阻塞。在设计查询中的事务时，请考虑以下建议：\n\n*   尽可能缩短事务的作用域。事务中只应包含那些为保持数据一致性而必须一起提交的语句。\n\
  *   避免因错误处理例程或应用程序逻辑不佳而导致事务保持打开状态。可使用以下技术来实现：\n    *   使用 `SET XACTABORT ON` 来确保在事务内发生错误条件时，事务会被中止或回滚。\n\
  \    *   从客户端代码执行包含事务的存储过程或一批查询后，始终检查是否有打开的事务，然后使用以下 SQL 语句回滚任何打开的事务：\n\n      \
  \  ```\n        IF @@TRANC0UNT > 0 ROLLBACK\n        ```\n\n*   使用为保持数据一致性所需的最低级别事务隔离级别，具体由你的应用程序需求决定。默认的“已提交读”隔离级别提供的隔离程度在大多数情况下是足够的。如果发生过度锁等待，可考虑使用“快照隔离”级别。\n\
  \n事务对数据库性能的影响详见第 20 章。\n\n### 消除或减少数据库游标的开销\n\n由于 SQL Server 设计为处理数据集，因此使用 DML 语句处理多行数据通常比使用数据库游标逐行处理要快得多。如果你发现自己大量使用游标，请重新检查逻辑，看看是否有办法消除游标。如果必须使用数据库游标，请使用开销最小的游标类型：`FAST_FORWARD`\
  \ 游标（通常称为“只进游标”）。你也可以使用 [在 ADO.NET 中](http://inado.net) 等效的 `DataReader` 对象。\n\n\
  数据库游标的性能开销详见第 23 章。\n\n### 使用本机编译的存储过程\n\n在你只访问内存中表的情况下，还有一种额外的性能提升方法，就是将你的存储过程编译成在\
  \ SQL Server 可执行文件内运行的 DLL。正如第 24 章所展示的，这对性能有相当显著的影响。只需确保你以正确的方式调用过程，按序号位置传递参数，而不是按参数名称传递。尽管这感觉像是违反了最佳实践，但它能带来编译后过程更好的性能。\n\
  \n### 利用查询存储处理分析查询\n\n大多数使用关系型数据库存储信息的应用程序都有一定程度的分析查询。要么你有一个包含少量分析查询的 OLTP 系统，要么你有一个包含大量分析查询的数据仓库或报告系统。对于执行大量聚合和分析的查询，利用列存储索引来提供支持。当大多数查询是分析型时，聚集列存储索引效果最佳，但对于\
  \ OLTP 点查询样式则效果不佳。当大多数查询以 OLTP 为主，但其中一些需要进行分析时，非聚集列存储索引可以增加分析能力。在这种情况下，关键是选择合适的工具来做合适的工作。\n\
  \n## 总结\n\n性能优化是一个持续的过程。它需要持续关注影响性能的数据库和查询特性。本章的目标是为你提供一份这些特性的检查清单，作为在数据库应用程序开发和维护阶段快速便捷的参考。\n\
