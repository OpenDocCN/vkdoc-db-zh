  \ `uPurchaseOrderDetail` 的触发器。您还可以看到我用于生成死锁的代码。所有这些信息都可以帮助您准确识别导致死锁的代码片段。您还会获得诸如\
  \ `sqlhandle` 之类的信息，然后可以将其与 DMO 结合使用，从缓存或查询存储中提取语句和执行计划。因为计划是在查询运行之前创建的，所以即使对于被选为死锁牺牲品的查询，它也将对您可用。\n\
