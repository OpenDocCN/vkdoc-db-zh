- fmt: '## Bin fitting with limited number of bins of unlimited capacity


    Imagine we have boxes that are infinitely large – we can pack all the beer bottles
    into a box that we want. But we only have three such boxes, and we want to pack
    the beers as evenly distributed across the three boxes as possible. Still the
    rule goes that the quantity from a given location cannot be split across multiple
    boxes.


    Let me recap the inventory of Der Helle Kumpel, but in Listing 21-7, I just show
    it in order of descending quantity instead of location order as I used in Listing
    21-1.


    ```sql

    SQL> select

    2     product_name

    3   , warehouse as wh

    4   , aisle

    5   , position  as pos

    6   , qty

    7  from inventory_with_dims

    8  where product_name = ''Der Helle Kumpel''

    9  order by qty desc, wh, aisle, pos;

    Listing 21-7

    The inventory of the beer Der Helle Kumpel in order of descending quantity

    ```


    You see the by now familiar numbers, just in a different order:


    ```

    PRODUCT_NAME      WH  AISLE  POS  QTY

    Der Helle Kumpel  2   A      1    72

    Der Helle Kumpel  1   C      5    70

    Der Helle Kumpel  1   A      16   48

    Der Helle Kumpel  1   D      19   48

    Der Helle Kumpel  1   B      32   43

    Der Helle Kumpel  2   D      9    26

    Der Helle Kumpel  2   B      26   24

    Der Helle Kumpel  2   C      31   21

    Der Helle Kumpel  1   C      13   20

    Der Helle Kumpel  1   A      29   14

    Der Helle Kumpel  2   B      5    14

    ```


    A fairly simple but good approximation algorithm for this type of bin fitting
    is to take the quantities in descending order one by one and put them in the box
    that has the least quantity already. Keep doing that, and at the end you’ll have
    a pretty even distribution of the quantities.


    So for three boxes, that means that at first, the three largest quantities are
    each put in a different box. Then the fourth largest is put in the box with the
    smallest total, and so on. I illustrate this in Figure 21-2, which starts at the
    fourth step and shows the following five steps of distributing the quantities.
    It goes on after that, but you should get the picture of how it works.


    !`../images/475066_1_En_21_Chapter/475066_1_En_21_Fig2_HTML.jpg`

    Figure 21-2

    Distributing in order of descending quantity


    ### Implementation with Pattern Matching


    To implement this with pattern matching, it is no longer sufficient to use simple
    `define` and `pattern` clauses to create one match at a time. In principle here
    I would need to work simultaneously on three matches, adding rows interchangeably
    to each of the matches. That’s not how `match_recognize` works, however, so I
    need another way.


    Instead in Listing 21-8, I can create a classification definition for each of
    the three boxes and utilize running sums on each classification variable.


    ```sql

    SQL> select wh, aisle, pos, qty, box, qty1, qty2, qty3

    2  from (

    3     select

    4        product_name

    5      , warehouse as wh

    6      , aisle

    7      , position  as pos

    8      , qty

    9     from inventory_with_dims

    10     where product_name = ''Der Helle Kumpel''

    11  ) iwd

    12  match_recognize (

    13     order by qty desc, wh, aisle, pos

    14     measures

    15        classifier()          as box

    16      , running sum(box1.qty) as qty1

    17      , running sum(box2.qty) as qty2

    18      , running sum(box3.qty) as qty3

    19     all rows per match

    20     pattern (

    21        (box1 | box2 | box3)*

    22     )

    23     define

    24        box1 as count(box1.*) = 1

    25             or sum(box1.qty) - box1.qty

    26                  <= least(sum(box2.qty), sum(box3.qty))

    27      , box2 as count(box2.*) = 1

    28             or sum(box2.qty) - box2.qty

    29                  <= sum(box3.qty)

    30  )

    31  order by qty desc, wh, aisle, pos;

    Listing 21-8

    All rows in a single match, distributing with logic in define clause

    ```


    ### Query Explanation


    This query requires some explanations:


    *   The `pattern` in line 21 is deceptively simple: I look for any number of consecutive
    rows that are classified either `box1` or `box2` or `box3`. But if you look in
    the `define` clause, only `box1` and `box2` are defined, not `box3`. This means
    that any row not classified `box1` or `box2` will automatically be classified
    `box3`, which in turn means that it is certain that all rows will be either `box1`
    or `box2` or `box3`, so that the pattern ends up matching all rows.


    *   In other words, I’m not really interested in creating multiple matches. What
    interests me is how the individual rows are classified as I walk along the rows
    in the one big single match in the order specified in line 13.


    *   The rows are classified in this way: The classification definitions that potentially
    can expand the match (in this case all three classifications) are tested one by
    one for truth in such a way that it checks if the condition is true if the row
    is included in this classification. At the first true definition, the row gets
    that classification. If neither `box1` nor `box2` is true, the row gets the undefined
    (and thus by default true) classification `box3`.


    *   So when checking if a row is to be classified `box1`, it makes the assumption
    that the row is `box1` and then checks if the condition is true. Therefore, when
    in line 25 it evaluates the running `sum(box1.qty)`, this includes the `qty` of
    the current row. But I want to check how much was in `box1` before adding the
    current row, so I need to subtract the `qty` of the current row.


    *   Line 25 calculates how much is in `box1` (excluding the current row). In line
    26, I check if this is less than (or equal to) the smallest of how much is in
    `box2` and `box3`. If this is true, then `box1` is the box with the least in it
    (or at least one of them if more than one has the same smallest sum) and the current
    row should go into `box1`.


    *   If `box1` was not the one with the least in it, I move on to test `box2` by
    calculating in line 28 how much is in `box2` (excluding the current row) and checking
    in line 29 if it is less than (or equal) to how much is in `box3`. If this is
    true, then `box2` is the box with the least in it, and the current row should
    go into `box2`.


    *   If `box2` was not the one, the row defaults to `box3` – the only possibility
    left in the pattern.


    *   In lines 24 and 27, I check the count of `box1` and `box2`, respectively.
    If the count is 1, then that 1 row is the current row (remember by evaluating
    the conditions it is assumed the current row will be classified `box1` and `box2`,
    respectively) which means that the box was empty before the current row and therefore
    definitely the one with the least in it. Testing these counts eliminates worrying
    about null sums.


    *   As it is all one single match, line 19 outputs all of the rows. Line 15 then
    uses the `classifier()` function to show which box the row ended up in.


    *   Lines 16–18 show the running sums of the three boxes enabling me to inspect
    in the output if my algorithm worked. (Note that I haven’t written `running` in
    the sums in the define clause – they are by definition running sums.)


    ### Query Output


    Making the final `order by` identical to the `match_recognize` ordering makes
    the output explain what happens in the single match as the rows are handled in
    descending quantity order:


    ```

    WH  AISLE  POS  QTY  BOX   QTY1  QTY2  QTY3

    2   A      1    72   BOX1  72

    1   C      5    70   BOX2  72    70

    1   A      16   48   BOX3  72    70    48

    1   D      19   48   BOX3  72    70    96

    1   B      32   43   BOX2  72    113   96

    2   D      9    26   BOX1  98    113   96

    2   B      26   24   BOX3  98    113   120

    2   C      31   21   BOX1  119   113   120

    1   C      13   20   BOX2  119   133   120

    1   A      29   14   BOX1  133   133   120

    2   B      5    14   BOX3  133   133   134

    ```'
