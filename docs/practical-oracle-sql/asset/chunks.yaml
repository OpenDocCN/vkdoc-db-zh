    do-it-yourself manual pivoting, you can also see that in principle, I did not
    need to reduce the dataset with the `where` clause in lines 10–12\. I could simply
    remove those three lines, and my output would be exactly the same. (Since I do
    have all three breweries in my output already, if I had had breweries with no
    purchases at all within the years and product groups I’m after, then there’d be
    output differences in the form of empty rows.)


    However, it would not be a good idea to do so, since the data from the other years
    and other product groups still would be processed; the implicit case structures
    would just mean no data from those other years and product groups would be added
    to the aggregate sums. It would be a waste of CPU cycles and I/O.'
  trans: '## 多度量值


    我打算扩展查询，不仅对聚合数量进行透视，还要对聚合成本进行透视。在代码清单 8-6 中，你可以看到我在第 8 行简单地添加了 `cost` 列，这样我也可以在第
    12 行添加聚合度量 `sum(cost)`。


    ```

    SQL> select *

    2  from (

    3     select

    4        brewery_name

    5      , group_name

    6      , extract(year from purchased) as yr

    7      , qty

    8      , cost

    9     from purchases_with_dims pwd

    10  ) pivot (

    11     sum(qty)

    12   , sum(cost)

    13     for yr

    14     in (

    15        2016 as y2016

    16      , 2017 as y2017

    17      , 2018 as y2018

    18     )

    19  )

    20  order by brewery_name, group_name;

    Error at Command Line : 1 Column : 8

    Error report -

    SQL Error: ORA-00918: column ambiguously defined

    代码清单 8-6

    使用多个度量值时出现 ORA-00918 错误

    ```


    为什么我会得到一个说“列定义不明确”的错误？我并没有写两遍相同的列别名啊？嗯，不是直接写的，但间接地我写了。


    情况是这样的：我定义了两个没有列别名的度量。然后我在 `yr` 维度上定义了三个年份值并为它们定义了列别名。系统会为每个组合创建一个列，所以是 2 x 3
    = 6 列。这六列的命名规则是 *<维度别名>_<度量别名>*，但如果没有度量别名，那么它们就只会被命名为 *<维度别名>*，正如你在代码清单 8-3 和
    8-4 中看到的那样。那里没问题，但在这里这意味着将会有两列名为 `y2016`，两列名为 `y2017`，两列名为 `y2018`。因此出现了 ORA-00918
    错误。


    解决方法是也给度量值加上列别名，例如，我可以按照图 8-3 所示操作，将度量值简单地别名为 `q` 和 `c`，而维度值则用年份的后两位数字作为别名（因为这些别名不是以字母开头，所以需要加引号）。


    这样就会生成名为 `16_Q`、`16_C` 等的六个列（2 x 3）。


    ![../images/475066_1_En_8_Chapter/475066_1_En_8_Fig3_HTML.jpg](img/475066_1_En_8_Fig3_HTML.jpg)


    图 8-3


    当存在多个度量值时的示意流程


    为了向你证明这不仅仅在示意图上有效，我按照图 8-3 所示，通过给度量值和维度值添加别名来修改代码清单 8-6：


    ```

    ...

    10  ) pivot (

    11     sum(qty)  as q

    12   , sum(cost) as c

    13     for yr

    14     in (

    15        2016 as "16"

    16      , 2017 as "17"

    17      , 2018 as "18"

    18     )

    19  )

    ...

    ```


    然后我得到了想要的输出：


    ```

    BREWERY_NAME        GROUP_NAME  16_Q  16_C  17_Q  17_C  18_Q  18_C

    Balthazar Brauerei  Belgian     800   5840  1000  7360  1000  6960

    Balthazar Brauerei  Wheat       500   3280  500   3600  400   2800

    Brewing Barbarian   IPA         200   1440  300   1680  500   3920

    Brewing Barbarian   Stout       800   5600  1000  6960  1200  8960

    Happy Hoppy Hippo   IPA         1000  7360  900   6400  800   5680

    Happy Hoppy Hippo   Wheat       200   960   100   800   100   720

    ```


    （通常我可能会选择更具描述性的列别名，但使用如此短的别名可以使行宽适合书籍排版。）


    至此，我已经演示了如何获取透视列，它们是多个度量值与单一维度值的组合。接下来将添加多个维度。


    ### 同样使用多维度


    到目前为止，我只使用年份作为维度进行透视，将 `brewery` 和 `product group` 作为用于隐式 `group by` 的列。现在，我还要将
    `product group` 作为第二个维度进行透视，仅留下 `brewery` 进行分组。


    我的数据中有 4 个产品组和 3 个年份，这意味着有 12 种维度值组合，每个组合显示 2 个度量（数量和成本），总共将产生 24 列。这在印刷页面上作为演示有点大，所以在代码清单
    8-7 中，我通过在第 10 行只选择两个产品组，在第 11–12 行只选择两个年份（2017 和 2018）来稍微减少数据量。


    ```

    SQL> select *

    2  from (

    3     select

    4        brewery_name

    5      , group_name

    6      , extract(year from purchased) as yr

    7      , qty

    8      , cost

    9     from purchases_with_dims pwd

    10     where group_name in (''IPA'', ''Wheat'')

    11     and   purchased >= date ''2017-01-01''

    12     and   purchased <  date ''2019-01-01''

    13  ) pivot (

    14     sum(qty)  as q

    15   , sum(cost) as c

    16     for (group_name, yr)

    17     in (

    18        (''IPA''  , 2017) as i17

    19      , (''IPA''  , 2018) as i18

    20      , (''Wheat'', 2017) as w17

    21      , (''Wheat'', 2018) as w18

    22     )

    23  )

    24  order by brewery_name;

    代码清单 8-7

    组合两个维度和两个度量值

    ```


    你会注意到第 3-12 行内联视图的内容原则上与之前相同；我只是添加了一个 `where` 子句来减少我进行透视的数据集。


    第 14-15 行中的度量值 `q` 和 `c` 也没有变化，就像我只使用单一维度时一样。


    第 16 行则不同，因为这里我不再只指定单个列作为我的维度。我指定的是一个包含两列的表达式列表——`group_name` 和 `yr`。


    而且由于我在 `for` 子句中使用了包含两列的表达式列表，我也需要在第 18-21 行的 `in` 子句映射中使用相应的值表达式列表。我为每个值表达式列表（维度值的组合）赋予一个列别名——在这个例子中，为了保持行宽足够印刷，我使用了非常短的别名；在实际应用中，应使用更具意义的别名。


    总的来说，你可以在图 8-4 中看到，我通过表达式列表手动组合两个维度，然后维度值和度量值的自动组合会创建以下划线连接别名命名的列。


    ![../images/475066_1_En_8_Chapter/475066_1_En_8_Fig4_HTML.jpg](img/475066_1_En_8_Fig4_HTML.jpg)


    图 8-4


    使用多维度的流程只是用表达式列表替代了单个表达式


    并且你在代码清单 8-7 的输出中看到了这八个列名：


    ```

    BREWERY_NAME        I17_Q I17_C I18_Q I18_C W17_Q W17_C W18_Q W18_C

    Balthazar Brauerei                          500   3600  400   2800

    Brewing Barbarian   300   1680  500   3920

    Happy Hoppy Hippo   900   6400  800   5680  100   800   100   720

    ```


    空白处是因为 Good Beer Trading Co 没有从 Balthazar Brauerei 购买任何 IPA，也没有从 Brewing Barbarian
    购买任何小麦啤酒。


    正如我之前关于手动 DIY 透视所展示的那样，了解透视是如何作为隐式 `group by` 工作的，你也可以看到，原则上，我并不需要用第 10-12 行的
    `where` 子句来减少数据集。我可以直接移除这三行，我的输出结果将完全一样。（因为我的输出中已经包含了所有三个啤酒厂，如果我的数据中存在在我关注的年份和产品组内完全没有购买的啤酒厂，那么输出差异将表现为空行。）


    然而，这样做并不是一个好主意，因为其他年份和其他产品组的数据仍然会被处理；隐式的 case 结构只会意味着那些其他年份和产品组的数据不会被添加到聚合总和中。这将是对
    CPU 周期和 I/O 的浪费。'
- fmt: "## Lessons learned\n\nWith the help of a mix of code examples and some diagrams\
    \ showing how the bits and pieces of the `pivot` clause work together creating\
    \ new columns, I’ve covered pivoting topics as:\n\n*   Pivoting with the three\
    \ elements of the `pivot` clause: measures, dimensions, and mappings.\n*   Naming\
    \ the pivoted columns with measure and dimension aliases, where combinations with\
    \ multiple measures are automatically joined with underscores.\n*   Manual pivoting\
    \ with `group by` and aggregation on `case` structures to aid understanding of\
    \ how `pivot` works.\n*   Using expression lists for values from multiple dimensions\
    \ when pivoting.\n\nPivoting is a very useful tool in your toolbox for a variety\
    \ of things, quite often simply because users get a much better overview of their\
    \ data if they do not need to read a lot of rows like the output of Listing [8-2](#475066_1_En_8_Chapter.xhtml#PC2),\
    \ but can have fewer rows with more columns like the various pivoted outputs in\
    \ the chapter.\n\n# 9. Splitting Delimited Text\n\nParticularly if you get data\
    \ from somewhere else, it is not uncommon to get it in the form of a string with\
    \ a list of values separated by some delimiter, typically comma, semicolon, tab,\
    \ or similar. As you most often don’t know the number of elements in the list,\
    \ you can’t just use `substr` to split it into a fixed number of columns. Instead\
    \ it is normally most useful to be able to turn the list into rows, so you can\
    \ treat it as a table in your SQL.\n\nSuch splitting involves generating rows,\
    \ which you can do in many ways. I’ll show some different methods, ranging from\
    \ using `PL/SQL` to loop over the elements of the list and generating a row at\
    \ a time, over generating all rows at once by selecting from `dual` and retrieving\
    \ the elements for each row from the list, to pretending the list is `JSON` and\
    \ parsing it with native `JSON` functionality.\n\n## Customer favorites and reviews\n\
    \nYou would practically never model your tables with a column containing delimited\
    \ strings (actually I can’t think of a use case for it, but it’s safer never to\
    \ say never). You would get such strings from external data sources like files.\
    \ For demonstration purposes here, the web site of Good Beer Trading Co gives\
    \ the customers a possibility to choose their favorite beers as well as review\
    \ beers; the favorites and reviews end up in the `customer_favorites` and `customer_reviews`\
    \ tables shown in Figure [9-1](#475066_1_En_9_Chapter.xhtml#Fig1).\n\n![../images/475066_1_En_9_Chapter/475066_1_En_9_Fig1_HTML.jpg](images/475066_1_En_9_Chapter/475066_1_En_9_Fig1_HTML.jpg)\n\
    \n*Figure 9-1. Tables involved in these examples*\n\nBoth tables have a proper\
    \ foreign key to the `customers` table, but of course cannot have it to the `products`\
    \ table, as the product ids are just part of the strings in columns `favorite_list`\
    \ and `review_list` – I show sample data in the upcoming sections. The task at\
    \ hand is basically to extract out those product ids to be able to join to the\
    \ `products` table.\n\n## Delimited single values\n\nIn Listing [9-1](#475066_1_En_9_Chapter.xhtml#PC1),\
    \ I examine the data of the `customer_favorites` table, where column `favorite_list`\
    \ contains a comma-separated list of product ids. One customer has saved an empty\
    \ favorite list.\n\n```\nSQL> select customer_id, favorite_list\n  2  from customer_favorites\n\
    \  3  order by customer_id;\nCUSTOMER_ID  FAVORITE_LIST\n50042        4040,5310\n\
    50741        5430,7790,7870\n51069        6520\nListing 9-1. Comma-delimited content\
    \ of customer_favorites table\n```\n\nI now need to treat this list as if it was\
    \ a child table with a row for each of the comma-separated entries. That will\
    \ enable me to join to the `products` table (and any other table with a product\
    \ id column, for that matter). In the rest of this section, I show four different\
    \ ways to do this.\n\n### Pipelined table function\n\nOne way that will work also\
    \ in old database versions (since version 8i) is to extract values from the string\
    \ in a `PL/SQL` table function. That requires a collection type (nested table\
    \ type) and function whose return value is of that type, such as what I create\
    \ in Listing [9-2](#475066_1_En_9_Chapter.xhtml#PC2).\n\n```\nSQL> create type\
    \ favorite_coll_type\n  2     as table of integer;\n  3  /\nType FAVORITE_COLL_TYPE\
    \ compiled\nSQL> create or replace function favorite_list_to_coll_type (\n  2\
    \     p_favorite_list   in customer_favorites.favorite_list%type\n  3  )\n  4\
    \     return favorite_coll_type pipelined\n  5  is\n  6     v_from_pos  pls_integer;\n\
    \  7     v_to_pos    pls_integer;\n  8  begin\n  9     if p_favorite_list is not\
    \ null then\n 10        v_from_pos := 1;\n 11        loop\n 12           v_to_pos\
    \ := instr(p_favorite_list, ',', v_from_pos);\n 13           pipe row (to_number(\n\
    \ 14              substr(\n 15                 p_favorite_list\n 16          \
    \     , v_from_pos\n 17               , case v_to_pos\n 18                   \
    \ when 0 then length(p_favorite_list) + 1\n 19                           else\
    \ v_to_pos\n 20                 end - v_from_pos\n 21              )\n 22    \
    \       ));\n 23           exit when v_to_pos = 0;\n 24           v_from_pos :=\
    \ v_to_pos + 1;\n 25        end loop;\n 26     end if;\n 27  end favorite_list_to_coll_type;\n\
    \ 28  /\nFunction FAVORITE_LIST_TO_COLL_TYPE compiled\nListing 9-2. Collection\
    \ type and pipelined table function\n```\n\nCollection types can be of object\
    \ types or scalar types – in this case a scalar type: `integer`.\n\nI’ve chosen\
    \ to make the table function `pipelined` by using the keyword `pipelined` in line\
    \ 4.\n\nInside the function, I create a loop beginning in line 11, where I search\
    \ for the position of the next comma (the first if it’s the first iteration of\
    \ the loop). Lines 13–22 then pipe a row to the output containing the `substr`\
    \ from the previous comma to the found comma (or the end of the string if no comma\
    \ was found).\n\nIf I reach the end of the string (no comma was found), line 23\
    \ breaks out of the loop. If there’s still something left in the string, line\
    \ 24 sets the next `v_from_pos` to be used in the next iteration of the loop.\n\
    \nThe loop strategy works if there’s at least one element in the comma-separated\
    \ list. If it’s a completely empty list, I make sure in line 9 that I don’t start\
    \ the loop at all – in such a case, no rows will be piped to the output.\n\n**Tip:**\
    \ I could have used a regular table function instead of pipelined – then I would\
    \ have had to build the entire output collection before returning it. But if a\
    \ table function is meant to be used strictly from SQL and never from `PL/SQL`,\
    \ it is almost always a good idea to make it pipelined. This has the advantage\
    \ of less PGA memory usage as well as the ability to quit processing if the client\
    \ SQL stops fetching rows from the function. The downside is that you cannot use\
    \ it in `PL/SQL`.\n\nHaving created my table function, I can use it in Listing\
    \ [9-3](#475066_1_En_9_Chapter.xhtml#PC3) to split my strings into collections\
    \ and turn the collections into rows.\n\n```\nSQL> select\n  2     cf.customer_id\n\
    \  3   , fl.column_value as product_id\n  4  from customer_favorites cf\n  5 \
    \    , table(\n  6          favorite_list_to_coll_type(cf.favorite_list)\n  7\
    \       ) fl\n  8  order by cf.customer_id, fl.column_value;\nListing 9-3. Using\
    \ pipelined table function to split string\n```\n\nThe `table` keyword in line\
    \ 5 takes a collection (nested table) and turns the elements of the collection\
    \ into rows. If the collection had been of an object type, the columns of the\
    \ result would have been named like the object attributes, but here the collection\
    \ is of a scalar type (`integer`), and then the single column is always called\
    \ `column_value`, which in line 3 I give a more meaningful column alias:\n\n```\n\
    CUSTOMER_ID  PRODUCT_ID\n50042        4040\n50042        5310\n50741        5430\n\
    50741        7790\n50741        7870\n51069        6520\n```"
  raw: '## Lessons learned


    With the help of a mix of code examples and some diagrams showing how the bits
    and pieces of the pivot clause work together creating new columns, I’ve covered
    pivoting topics as


    *   Pivoting with the three elements of the `pivot` clause, measures, dimensions,
    and mappings


    *   Naming the pivoted columns with measure and dimension aliases, where combinations
    with multiple measures are automatically joined with underscores


    *   Manual pivoting with `group by` and aggregation on `case` structures to aid
    understanding of how `pivot` works


    *   Using expression lists for values from multiple dimensions when pivoting


    Pivoting is a very useful tool in your toolbox for a variety of things, quite
    often simply because users get a much better overview of their data if they do
    not need to read a lot of rows like the output of Listing [8-2](#475066_1_En_8_Chapter.xhtml#PC2),
    but can have fewer rows with more columns like the various pivoted outputs in
    the chapter.


    # 9. Splitting Delimited Text


    Particularly if you get data from somewhere else, it is not uncommon to get it
    in the form of a string with a list of values separated by some delimiter, typically
    comma, semicolon, tab, or similar. As you most often don’t know the number of
    elements in the list, you can’t just use `substr` to split it into a fixed number
    of columns. Instead it is normally most useful to be able to turn the list into
    rows, so you can treat it as a table in your SQL.


    Such splitting involves generating rows, which you can do in many ways. I’ll show
    some different methods, ranging from using PL/SQL to loop over the elements of
    the list and generating a row at a time, over generating all rows at once by selecting
    from `dual` and retrieving the elements for each row from the list, to pretending
    the list is JSON and parsing it with native JSON functionality.


    ## Customer favorites and reviews


    You would practically never model your tables with a column containing delimited
    strings (actually I can’t think of a use case for it, but it’s safer never to
    say never). You would get such strings from external data sources like files.
    For demonstration purposes here, the web site of Good Beer Trading Co gives the
    customers a possibility to choose their favorite beers as well as review beers;
    the favorites and reviews end up in the `customer_favorites` and `customer_reviews`
    tables shown in Figure [9-1](#475066_1_En_9_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_9_Chapter/475066_1_En_9_Fig1_HTML.jpg](images/475066_1_En_9_Chapter/475066_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Tables involved in these examples


    Both tables have a proper foreign key to the `customers` table, but of course
    cannot have it to the `products` table, as the product ids are just part of the
    strings in columns `favorite_list` and `review_list` – I show sample data in the
    upcoming sections. The task at hand is basically to extract out those product
    ids to be able to join to the `products` table.


    ## Delimited single values


    In Listing [9-1](#475066_1_En_9_Chapter.xhtml#PC1), I examine the data of the
    `customer_favorites` table, where column `favorite_list` contains a comma-separated
    list of product ids. One customer has saved an empty favorite list.


    ```

    SQL> select customer_id, favorite_list

    2  from customer_favorites

    3  order by customer_id;

    CUSTOMER_ID  FAVORITE_LIST

    50042        4040,5310

    50741        5430,7790,7870


    51069        6520

    Listing 9-1

    Comma-delimited content of customer_favorites table

    ```


    I now need to treat this list as if it was a child table with a row for each of
    the comma-separated entries. That will enable me to join to the `products` table
    (and any other table with a product id column, for that matter). In the rest of
    this section, I show four different ways to do this.


    ### Pipelined table function


    One way that will work also in old database versions (since version 8i) is to
    extract values from the string in a PL/SQL table function. That requires a collection
    type (nested table type) and function whose return value is of that type, such
    as what I create in Listing [9-2](#475066_1_En_9_Chapter.xhtml#PC2).


    ```

    SQL> create type favorite_coll_type

    2     as table of integer;

    3  /

    Type FAVORITE_COLL_TYPE compiled

    SQL> create or replace function favorite_list_to_coll_type (

    2     p_favorite_list   in customer_favorites.favorite_list%type

    3  )

    4     return favorite_coll_type pipelined

    5  is

    6     v_from_pos  pls_integer;

    7     v_to_pos    pls_integer;

    8  begin

    9     if p_favorite_list is not null then

    10        v_from_pos := 1;

    11        loop

    12           v_to_pos := instr(p_favorite_list, '','', v_from_pos);

    13           pipe row (to_number(

    14              substr(

    15                 p_favorite_list

    16               , v_from_pos

    17               , case v_to_pos

    18                    when 0 then length(p_favorite_list) + 1

    19                           else v_to_pos

    20                 end - v_from_pos

    21              )

    22           ));

    23           exit when v_to_pos = 0;

    24           v_from_pos := v_to_pos + 1;

    25        end loop;

    26     end if;

    27  end favorite_list_to_coll_type;

    28  /

    Function FAVORITE_LIST_TO_COLL_TYPE compiled

    Listing 9-2

    Collection type and pipelined table function

    ```


    Collection types can be of object types or scalar types – in this case a scalar
    type: `integer`.


    I’ve chosen to make the table function *pipelined* by using the keyword `pipelined`
    in line 4.


    Inside the function, I create a loop beginning in line 11, where I search for
    the position of the next comma (the first if it’s the first iteration of the loop).
    Lines 13–22 then pipe a row to the output containing the `substr` from the previous
    comma to the found comma (or the end of the string if no comma was found).


    If I reach the end of the string (no comma was found), line 23 breaks out of the
    loop. If there’s still something left in the string, line 24 sets the next `v_from_pos`
    to be used in the next iteration of the loop.


    The loop strategy works if there’s at least one element in the comma-separated
    list. If it’s a completely empty list, I make sure in line 9 that I don’t start
    the loop at all – in such a case, no rows will be piped to the output.


    Tip


    I could have used a regular table function instead of pipelined – then I would
    have had to build the entire output collection before returning it. But if a table
    function is meant to be used strictly from SQL and never from PL/SQL, it is almost
    always a good idea to make it pipelined. This has the advantage of less PGA memory
    usage as well as the ability to quit processing if the client SQL stops fetching
    rows from the function. The downside is that you cannot use it in PL/SQL.


    Having created my table function, I can use it in Listing [9-3](#475066_1_En_9_Chapter.xhtml#PC3)
    to split my strings into collections and turn the collections into rows.


    ```

    SQL> select

    2     cf.customer_id

    3   , fl.column_value as product_id

    4  from customer_favorites cf

    5     , table(

    6          favorite_list_to_coll_type(cf.favorite_list)

    7       ) fl

    8  order by cf.customer_id, fl.column_value;

    Listing 9-3

    Using pipelined table function to split string

    ```


    The `table` keyword in line 5 takes a collection (nested table) and turns the
    elements of the collection into rows. If the collection had been of an object
    type, the columns of the result would have been named like the object attributes,
    but here the collection is of a scalar type (integer), and then the single column
    is always called `column_value`, which in line 3 I give a more meaningful column
    alias:


    ```

    CUSTOMER_ID  PRODUCT_ID

    50042        4040

    50042        5310

    50741        5430

    50741        7790

    50741        7870

    51069        6520

    ```'
  trans: "\n## 经验总结\n\n通过结合代码示例和一些展示 `PIVOT` 子句各部分如何协同工作以创建新列的图解，我涵盖了以下关于数据透视的主题：\n\
    \n*   使用 `PIVOT` 子句的三个要素进行透视：度量值、维度和映射关系。\n*   使用度量值和维度别名命名透视后的列，其中包含多个度量值的组合会自动以下划线连接。\n\
    *   使用 `GROUP BY` 和基于 `CASE` 结构的聚合进行手动透视，以帮助理解 `PIVOT` 的工作原理。\n*   在进行透视时，使用表达式列表来获取来自多个维度的值。\n\
    \n数据透视是你工具箱中一个非常实用的工具，适用于多种场景，通常仅仅是因为用户如果无需阅读像清单 8-2 输出那样的大量行，而是能拥有行数更少但列数更多的数据，就能获得好得多的数据概述。\n\
    \n# 9. 分割定界符文本\n\n特别是当你从其他地方获取数据时，收到一个由字符串组成、包含由某种分隔符（通常是逗号、分号、制表符或类似符号）分隔的值列表的情况并不少见。由于你通常不知道列表中的元素数量，你不能简单地使用\
    \ `substr` 将其拆分为固定数量的列。相反，通常最有用的方法是能够将列表转换为行，这样你就可以在 SQL 中将其视为一个表来处理。\n\n这种分割涉及生成行，你可以通过多种方式实现。我将展示一些不同的方法，从使用\
    \ `PL/SQL` 循环遍历列表元素并逐行生成，到通过从 `dual` 表中选择并为每一行从列表中检索元素来一次性生成所有行，再到假装该列表是 `JSON`\
    \ 并使用原生 `JSON` 功能进行解析。\n\n## 客户偏好与评论\n\n你几乎永远不会在表中设计一个包含定界符字符串的列（实际上我想不出一个用例，但为了保险起见，最好别说“绝不”）。你会从外部数据源（如文件）获得这样的字符串。这里出于演示目的，Good\
    \ Beer Trading Co 网站让客户可以选择他们最喜欢的啤酒以及评论啤酒；偏好和评论最终会进入图 9-1 所示的 `customer_favorites`\
    \ 和 `customer_reviews` 表中。\n\n![../images/475066_1_En_9_Chapter/475066_1_En_9_Fig1_HTML.jpg](img/475066_1_En_9_Fig1_HTML.jpg)\n\
    \n*图 9-1. 这些示例涉及的表*\n\n两个表都有指向 `customers` 表的规范外键，但当然不能有指向 `products` 表的外键，因为产品\
    \ ID 只是 `favorite_list` 和 `review_list` 列字符串的一部分——我将在接下来的章节中展示样本数据。手头的任务基本上是提取出这些产品\
    \ ID，以便能够连接到 `products` 表。\n\n## 定界符分隔的单个值\n\n在清单 9-1 中，我检查了 `customer_favorites`\
    \ 表的数据，其中 `favorite_list` 列包含一个以逗号分隔的产品 ID 列表。一位客户保存了一个空的偏好列表。\n\n```\nSQL> select\
    \ customer_id, favorite_list\n  2  from customer_favorites\n  3  order by customer_id;\n\
    CUSTOMER_ID  FAVORITE_LIST\n50042        4040,5310\n50741        5430,7790,7870\n\
    51069        6520\n清单 9-1. customer_favorites 表的逗号定界内容\n```\n\n我现在需要将这个列表视为一个子表，其中每个逗号分隔的条目对应一行。这将使我能够连接到\
    \ `products` 表（以及任何其他包含产品 ID 列的表）。在本节的其余部分，我将展示四种不同的方法来实现这一点。\n\n### 管道化表函数\n\n\
    一种在旧数据库版本（自 8i 版本起）也能工作的方法是在 `PL/SQL` 表函数中从字符串中提取值。这需要一个集合类型（嵌套表类型）和一个返回值为该类型的函数，例如我在清单\
    \ 9-2 中创建的。\n\n```\nSQL> create type favorite_coll_type\n  2     as table of integer;\n\
    \  3  /\nType FAVORITE_COLL_TYPE compiled\nSQL> create or replace function favorite_list_to_coll_type\
    \ (\n  2     p_favorite_list   in customer_favorites.favorite_list%type\n  3 \
    \ )\n  4     return favorite_coll_type pipelined\n  5  is\n  6     v_from_pos\
    \  pls_integer;\n  7     v_to_pos    pls_integer;\n  8  begin\n  9     if p_favorite_list\
    \ is not null then\n 10        v_from_pos := 1;\n 11        loop\n 12        \
    \   v_to_pos := instr(p_favorite_list, ',', v_from_pos);\n 13           pipe row\
    \ (to_number(\n 14              substr(\n 15                 p_favorite_list\n\
    \ 16               , v_from_pos\n 17               , case v_to_pos\n 18      \
    \              when 0 then length(p_favorite_list) + 1\n 19                  \
    \         else v_to_pos\n 20                 end - v_from_pos\n 21           \
    \   )\n 22           ));\n 23           exit when v_to_pos = 0;\n 24         \
    \  v_from_pos := v_to_pos + 1;\n 25        end loop;\n 26     end if;\n 27  end\
    \ favorite_list_to_coll_type;\n 28  /\nFunction FAVORITE_LIST_TO_COLL_TYPE compiled\n\
    清单 9-2. 集合类型和管道化表函数\n```\n\n集合类型可以是对象类型或标量类型——本例中是标量类型：`integer`。\n\n我通过在第 4 行使用关键字\
    \ `pipelined` 使该表函数成为 `pipelined`（管道化）的。\n\n在函数内部，我从第 11 行开始创建一个循环，在其中搜索下一个逗号的位置（如果是第一次迭代则是第一个逗号）。然后第\
    \ 13–22 行通过管道将一行输出，其中包含从前一个逗号到找到的逗号（如果未找到逗号则是字符串末尾）的 `substr`。\n\n如果我到达字符串末尾（未找到逗号），第\
    \ 23 行会跳出循环。如果字符串中仍有内容，第 24 行会设置下一个 `v_from_pos`，以便在循环的下一次迭代中使用。\n\n如果逗号分隔的列表中至少有一个元素，这种循环策略就有效。如果是一个完全空的列表，我在第\
    \ 9 行确保根本不启动循环——在这种情况下，不会有行通过管道输出。\n\n**提示：** 我本可以使用常规表函数而不是管道化的——那样我就必须在返回之前构建整个输出集合。但是，如果一个表函数旨在严格从\
    \ SQL 中使用，而从不从 `PL/SQL` 中使用，那么将其管道化几乎总是一个好主意。这样做的好处是 PGA 内存使用量更少，并且如果客户端 SQL 停止从函数中提取行，则可以退出处理。缺点是不能在\
    \ `PL/SQL` 中使用它。\n\n创建了表函数后，我可以在清单 9-3 中使用它来将字符串拆分为集合，并将集合转换为行。\n\n```\nSQL> select\n\
    \  2     cf.customer_id\n  3   , fl.column_value as product_id\n  4  from customer_favorites\
    \ cf\n  5     , table(\n  6          favorite_list_to_coll_type(cf.favorite_list)\n\
    \  7       ) fl\n  8  order by cf.customer_id, fl.column_value;\n清单 9-3. 使用管道化表函数拆分字符串\n\
    ```\n\n第 5 行的 `table` 关键字接受一个集合（嵌套表）并将集合的元素转换为行。如果集合是对象类型的，结果列将被命名为类似对象属性的名称，但这里的集合是标量类型（`integer`），那么单个列始终名为\
    \ `column_value`，我在第 3 行为其赋予了一个更有意义的列别名：\n\n```\nCUSTOMER_ID  PRODUCT_ID\n50042\
    \        4040\n50042        5310\n50741        5430\n50741        7790\n50741\
    \        7870\n51069        6520\n```\n"
- fmt: '### 内置 APEX 表函数


    你可能会注意到输出中缺少了`favorite_list`为空的客户。这就是代码清单 [9-3](#475066_1_En_9_Chapter.xhtml#PC3)
    的工作原理；我将`customer_favorites`表与从我的函数管道化传输的行源进行连接，对于空白的`favorite_list`，它（正确地）没有输出任何行。这就好像我与一个不存在该客户行的子表进行了内连接一样。


    如果我想显示没有收藏品的客户，就需要等效于`left outer join`的操作。但由于没有连接谓词，我无法在谓词列上使用`(+)`语法。相反，Oracle支持将`(+)`语法直接放在`table(...)`调用之后，因此我可以将第7行改为这样：


    ```

    ...

    7       )(+) fl

    ...

    ```


    这会给出包含没有收藏品客户的输出：


    ```

    CUSTOMER_ID  PRODUCT_ID

    50042        4040

    50042        5310

    50741        5430

    50741        7790

    50741        7870


    51069        6520

    ```


    当然，作为`table`函数结果的行源也可以用于连接，就像它是一个真实的子表一样。我在代码清单 [9-4](#475066_1_En_9_Chapter.xhtml#PC7)
    中演示了这一点，同时展示了如何对`table`函数使用ANSI风格的连接，而不是代码清单 [9-3](#475066_1_En_9_Chapter.xhtml#PC3)
    中使用的传统逗号。


    ```sql

    SQL> select

    2     cf.customer_id  as c_id

    3   , c.name          as cust_name

    4   , fl.column_value as p_id

    5   , p.name          as prod_name

    6  from customer_favorites cf

    7  cross apply table(

    8     favorite_list_to_coll_type(cf.favorite_list)

    9  ) fl

    10  join customers c

    11     on c.id = cf.customer_id

    12  join products p

    13     on p.id = fl.column_value

    14  order by cf.customer_id, fl.column_value;

    ```

    **代码清单 9-4** 将拆分结果连接到产品


    常规的`join`语法需要一个`on`子句，而我这里没有也不需要。原则上，我需要的是对一个内联视图的`cross join lateral`，但在ANSI
    SQL中，决定使用特殊的`cross apply`语法来实现此目的，我将其放在第7行`table`关键字之前。


    其余部分是普通的SQL，使用`on`子句中的`column_value`列进行常规连接：


    ```

    C_ID   CUST_NAME        P_ID  PROD_NAME

    50042  The White Hart   4040  Coalminers Sweat

    50042  The White Hart   5310  Monks and Nuns

    50741  Hygge og Humle   5430  Hercule Trippel

    50741  Hygge og Humle   7790  Summer in India

    50741  Hygge og Humle   7870  Ghost of Hops

    51069  Der Wichtelmann  6520  Der Helle Kumpel

    ```


    如果我再次想包含没有收藏品的客户，在ANSI SQL中我不使用`(+)`，而是将第7行的`cross apply`改为`outer apply`，这需要将第12行的`join`改为`left
    outer join`：


    ```sql

    ...

    7  outer apply table(

    8     favorite_list_to_coll_type(cf.favorite_list)

    9  ) fl

    10  join customers c

    11     on c.id = cf.customer_id

    12  left outer join products p

    13     on p.id = fl.column_value

    ...

    ```


    现在，没有收藏品的客户Boom Beer Bar被包含在输出中：


    ```

    C_ID   CUST_NAME        P_ID  PROD_NAME

    50042  The White Hart   4040  Coalminers Sweat

    50042  The White Hart   5310  Monks and Nuns

    50741  Hygge og Humle   5430  Hercule Trippel

    50741  Hygge og Humle   7790  Summer in India

    50741  Hygge og Humle   7870  Ghost of Hops

    51007  Boom Beer Bar

    51069  Der Wichtelmann  6520  Der Helle Kumpel

    ```


    第一种方法是为此目的专门构建的表函数。你也可以编写一个通用函数，但实际上你不需要这样做。你数据库中很可能内置的APEX方案已经为你完成了这项工作，我将在接下来的内容中展示。


    ### 内置 APEX 表函数


    有一个APEX API函数`apex_util.string_to_table(favorite_list, '','')`，但它返回的是在包中定义的PL/SQL集合类型，而不是在SQL中定义的嵌套表类型。不过这是一个已弃用的函数，我提到它只是为了让你不要使用它，即使你碰巧用Google搜索到了它。


    > **注意**

    >

    > 截至12.2版本，APEX默认不会安装在数据库中；它只是随软件一起提供以便于安装。即使你的公司不使用APEX应用程序，我认为为了在编写SQL和PL/SQL时利用API包的优势，在数据库中安装APEX仍然是一个好主意。如果你愿意，可以在不配置Web监听器（ORDS、嵌入式PL/SQL网关或Oracle
    HTTP Server）的情况下进行安装。


    从APEX 5.1版本开始，为此目的支持的函数是`apex_string.split`，它返回一个SQL嵌套表类型，因此也适用于SQL。代码清单 [9-5](#475066_1_En_9_Chapter.xhtml#PC11)
    与代码清单 [9-4](#475066_1_En_9_Chapter.xhtml#PC7) 类似，只是使用了APEX API函数而不是我之前创建的自定义函数。


    ```sql

    SQL> select

    2     cf.customer_id  as c_id

    3   , c.name          as cust_name

    4   , to_number(fl.column_value) as p_id

    5   , p.name          as prod_name

    6  from customer_favorites cf

    7  cross apply table(

    8     apex_string.split(cf.favorite_list, '','')

    9  ) fl

    10  join customers c

    11     on c.id = cf.customer_id

    12  join products p

    13     on p.id = to_number(fl.column_value)

    14  order by cf.customer_id, p_id;

    ```

    **代码清单 9-5** 使用 `apex_string.split` 进行拆分


    区别仅在于第8行的函数调用，以及第14行的一个小细节，我利用可以在`order by`子句中使用列别名的特性，按更有意义的`p_id`而不是`fl.column_value`排序。


    代码清单 [9-5](#475066_1_En_9_Chapter.xhtml#PC11) 的输出与代码清单 [9-4](#475066_1_En_9_Chapter.xhtml#PC7)
    的输出相同。两种方法都调用PL/SQL函数来执行实际的字符串拆分，这当然意味着会发生上下文切换。接下来是一种不涉及上下文切换的纯SQL方法。'
  raw: 'But you’ll undoubtedly notice that the customer with a blank favorite_list
    is missing in the output. That’s how Listing [9-3](#475066_1_En_9_Chapter.xhtml#PC3)
    works; I’m joining the `customer_favorites` table to the row source that is pipelined
    from my function, and it outputs (correctly) no rows for a blank `favorite_list`.
    This is exactly as if I was inner joining to a child table where no rows existed
    for this customer.


    If I want to show the customer with no favorites, I need the equivalent of a `left
    outer join`. But as there are no join predicates, I cannot use the `(+)` syntax
    on a predicate column. Instead Oracle supports putting the `(+)` syntax directly
    after the `table(...)` call, so I can change line 7 to this:


    ```

    ...

    7       )(+) fl

    ...

    ```


    And that gives me an output that includes the customer with no favorites:


    ```

    CUSTOMER_ID  PRODUCT_ID

    50042        4040

    50042        5310

    50741        5430

    50741        7790

    50741        7870


    51069        6520

    ```


    The row source that’s the result of the `table` function I can of course use for
    joins as well, just like if it had been a real child table. I demonstrate this
    in Listing [9-4](#475066_1_En_9_Chapter.xhtml#PC7), at the same time showing you
    how to do ANSI style joins to the `table` function instead of the traditional
    comma used in Listing [9-3](#475066_1_En_9_Chapter.xhtml#PC3).


    ```

    SQL> select

    2     cf.customer_id  as c_id

    3   , c.name          as cust_name

    4   , fl.column_value as p_id

    5   , p.name          as prod_name

    6  from customer_favorites cf

    7  cross apply table(

    8     favorite_list_to_coll_type(cf.favorite_list)

    9  ) fl

    10  join customers c

    11     on c.id = cf.customer_id

    12  join products p

    13     on p.id = fl.column_value

    14  order by cf.customer_id, fl.column_value;

    Listing 9-4

    Join the results of the splitting to products

    ```


    The normal `join` syntax requires an `on` clause, which I do not have and do not
    need. In principle what I need is like a `cross join lateral` to an inline view,
    but in ANSI SQL, it has been decided instead to use a special syntax `cross apply`
    for this, which I put just before the `table` keyword in line 7.


    The rest is normal SQL with normal joins using the `column_value` column in the
    `on` clause in line 13:


    ```

    C_ID   CUST_NAME        P_ID  PROD_NAME

    50042  The White Hart   4040  Coalminers Sweat

    50042  The White Hart   5310  Monks and Nuns

    50741  Hygge og Humle   5430  Hercule Trippel

    50741  Hygge og Humle   7790  Summer in India

    50741  Hygge og Humle   7870  Ghost of Hops

    51069  Der Wichtelmann  6520  Der Helle Kumpel

    ```


    If again I want to include the customer with no favorites, in ANSI SQL I do not
    use `(+)`, instead I change the `cross apply` in line 7 to `outer apply`, which
    necessitates changing `join` in line 12 to `left outer join`:


    ```

    ...

    7  outer apply table(

    8     favorite_list_to_coll_type(cf.favorite_list)

    9  ) fl

    10  join customers c

    11     on c.id = cf.customer_id

    12  left outer join products p

    13     on p.id = fl.column_value

    ...

    ```


    Customer Boom Beer Bar, who has no favorites, is now included in the output:


    ```

    C_ID   CUST_NAME        P_ID  PROD_NAME

    50042  The White Hart   4040  Coalminers Sweat

    50042  The White Hart   5310  Monks and Nuns

    50741  Hygge og Humle   5430  Hercule Trippel

    50741  Hygge og Humle   7790  Summer in India

    50741  Hygge og Humle   7870  Ghost of Hops

    51007  Boom Beer Bar

    51069  Der Wichtelmann  6520  Der Helle Kumpel

    ```


    This first method is a custom built table function for this purpose only. You
    can also do a generic function, but in fact you don’t need to do that. The built-in
    APEX schema that you probably have in your database has already done this for
    you, as I’ll show next.


    ### Built-in APEX table function


    There is APEX API function `apex_util.string_to_table(favorite_list, '','')` –
    but it returns a PL/SQL collection type defined in a package, not a nested table
    type defined in SQL. But it is a deprecated function anyway, so I just mention
    it so you won’t use it, even if you happen to Google it.


    Note


    As of version 12.2, APEX is not installed in the database by default; rather it
    is just shipped with the software for easy installation. Even if your company
    does not use APEX applications as such, I think it is a good idea to install APEX
    in the database anyway to take advantage of the API packages when you code SQL
    and PL/SQL. If you wish, you can do it without configuring a web listener (ORDS,
    embedded PL/SQL gateway, or Oracle HTTP Server).


    From APEX version 5.1, the supported function for this is `apex_string.split`,
    which returns a SQL nested table type and therefore is good to use in SQL as well.
    Listing [9-5](#475066_1_En_9_Chapter.xhtml#PC11) is like Listing [9-4](#475066_1_En_9_Chapter.xhtml#PC7),
    just using the APEX API function instead of the custom function I created before.


    ```

    SQL> select

    2     cf.customer_id  as c_id

    3   , c.name          as cust_name

    4   , to_number(fl.column_value) as p_id

    5   , p.name          as prod_name

    6  from customer_favorites cf

    7  cross apply table(

    8     apex_string.split(cf.favorite_list, '','')

    9  ) fl

    10  join customers c

    11     on c.id = cf.customer_id

    12  join products p

    13     on p.id = to_number(fl.column_value)

    14  order by cf.customer_id, p_id;

    Listing 9-5

    Splitting with apex_string.split

    ```


    The difference is just the function call in line 8 and then a small detail in
    line 14, where I utilize the fact that I can use column aliases in the `order
    by` clause to order by the more meaningful `p_id` instead of `fl.column_value`.


    The output of Listing [9-5](#475066_1_En_9_Chapter.xhtml#PC11) is identical to
    that of Listing [9-4](#475066_1_En_9_Chapter.xhtml#PC7). Both methods call PL/SQL
    functions to do the actual splitting of the strings, which of course means context
    switching happening. Next up is a method in straight SQL without the context switching.'
  trans: '### 内置 APEX 表函数


    你可能会注意到输出中缺少了`favorite_list`为空的客户。这就是代码清单 9-3 的工作原理；我将`customer_favorites`表与从我的函数管道化传输的行源进行连接，对于空白的`favorite_list`，它（正确地）没有输出任何行。这就好像我与一个不存在该客户行的子表进行了内连接一样。


    如果我想显示没有收藏品的客户，就需要等效于`left outer join`的操作。但由于没有连接谓词，我无法在谓词列上使用`(+)`语法。相反，Oracle
    支持将`(+)`语法直接放在`table(...)`调用之后，因此我可以将第 7 行改为这样：


    ```

    ...

    7       )(+) fl

    ...

    ```


    这会给出包含没有收藏品客户的输出：


    ```

    CUSTOMER_ID  PRODUCT_ID

    50042        4040

    50042        5310

    50741        5430

    50741        7790

    50741        7870


    51069        6520

    ```


    当然，作为`table`函数结果的行源也可以用于连接，就像它是一个真实的子表一样。我在代码清单 9-4 中演示了这一点，同时展示了如何对`table`函数使用
    ANSI 风格的连接，而不是代码清单 9-3 中使用的传统逗号。


    ```sql

    SQL> select

    2     cf.customer_id  as c_id

    3   , c.name          as cust_name

    4   , fl.column_value as p_id

    5   , p.name          as prod_name

    6  from customer_favorites cf

    7  cross apply table(

    8     favorite_list_to_coll_type(cf.favorite_list)

    9  ) fl

    10  join customers c

    11     on c.id = cf.customer_id

    12  join products p

    13     on p.id = fl.column_value

    14  order by cf.customer_id, fl.column_value;

    ```

    **代码清单 9-4** 将拆分结果连接到产品


    常规的`join`语法需要一个`on`子句，而我这里没有也不需要。原则上，我需要的是对一个内联视图的`cross join lateral`，但在 ANSI
    SQL 中，决定使用特殊的`cross apply`语法来实现此目的，我将其放在第 7 行`table`关键字之前。


    其余部分是普通的 SQL，使用`on`子句中的`column_value`列进行常规连接：


    ```

    C_ID   CUST_NAME        P_ID  PROD_NAME

    50042  The White Hart   4040  Coalminers Sweat

    50042  The White Hart   5310  Monks and Nuns

    50741  Hygge og Humle   5430  Hercule Trippel

    50741  Hygge og Humle   7790  Summer in India

    50741  Hygge og Humle   7870  Ghost of Hops

    51069  Der Wichtelmann  6520  Der Helle Kumpel

    ```


    如果我再次想包含没有收藏品的客户，在 ANSI SQL 中我不使用`(+)`，而是将第 7 行的`cross apply`改为`outer apply`，这需要将第
    12 行的`join`改为`left outer join`：


    ```sql

    ...

    7  outer apply table(

    8     favorite_list_to_coll_type(cf.favorite_list)

    9  ) fl

    10  join customers c

    11     on c.id = cf.customer_id

    12  left outer join products p

    13     on p.id = fl.column_value

    ...

    ```


    现在，没有收藏品的客户 Boom Beer Bar 被包含在输出中：


    ```

    C_ID   CUST_NAME        P_ID  PROD_NAME

    50042  The White Hart   4040  Coalminers Sweat

    50042  The White Hart   5310  Monks and Nuns

    50741  Hygge og Humle   5430  Hercule Trippel

    50741  Hygge og Humle   7790  Summer in India

    50741  Hygge og Humle   7870  Ghost of Hops

    51007  Boom Beer Bar

    51069  Der Wichtelmann  6520  Der Helle Kumpel

    ```


    第一种方法是为此目的专门构建的表函数。你也可以编写一个通用函数，但实际上你不需要这样做。你数据库中很可能内置的 APEX 方案已经为你完成了这项工作，我将在接下来的内容中展示。


    ### 内置 APEX 表函数


    有一个 APEX API 函数`apex_util.string_to_table(favorite_list, '','')`，但它返回的是在包中定义的
    PL/SQL 集合类型，而不是在 SQL 中定义的嵌套表类型。不过这是一个已弃用的函数，我提到它只是为了让你不要使用它，即使你碰巧用 Google 搜索到了它。


    > **注意**

    >

    > 截至 12.2 版本，APEX 默认不会安装在数据库中；它只是随软件一起提供以便于安装。即使你的公司不使用 APEX 应用程序，我认为为了在编写 SQL
    和 PL/SQL 时利用 API 包的优势，在数据库中安装 APEX 仍然是一个好主意。如果你愿意，可以在不配置 Web 监听器（ORDS、嵌入式 PL/SQL
    网关或 Oracle HTTP Server）的情况下进行安装。


    从 APEX 5.1 版本开始，为此目的支持的函数是`apex_string.split`，它返回一个 SQL 嵌套表类型，因此也适用于 SQL。代码清单
    9-5 与代码清单 9-4 类似，只是使用了 APEX API 函数而不是我之前创建的自定义函数。


    ```sql

    SQL> select

    2     cf.customer_id  as c_id

    3   , c.name          as cust_name

    4   , to_number(fl.column_value) as p_id

    5   , p.name          as prod_name

    6  from customer_favorites cf

    7  cross apply table(

    8     apex_string.split(cf.favorite_list, '','')

    9  ) fl

    10  join customers c

    11     on c.id = cf.customer_id

    12  join products p

    13     on p.id = to_number(fl.column_value)

    14  order by cf.customer_id, p_id;

    ```

    **代码清单 9-5** 使用 `apex_string.split` 进行拆分


    区别仅在于第 8 行的函数调用，以及第 14 行的一个小细节，我利用可以在`order by`子句中使用列别名的特性，按更有意义的`p_id`而不是`fl.column_value`排序。


    代码清单 9-5 的输出与代码清单 9-4 的输出相同。两种方法都调用 PL/SQL 函数来执行实际的字符串拆分，这当然意味着会发生上下文切换。接下来是一种不涉及上下文切换的纯
    SQL 方法。'
- fmt: "### Straight SQL with row generators\n\nNo matter which method I use, I need\
    \ to generate rows for each of the elements in the comma-delimited lists. The\
    \ two previous methods used collections and the `table` function for this purpose.\
    \ Another typical method of generating rows is to use a `connect by` query on\
    \ `dual`, and this can be used here as well, as I show in Listing 9-6.\n\n```sql\n\
    SQL> select\n 2     favs.customer_id as c_id\n 3   , c.name           as cust_name\n\
    \ 4   , favs.product_id  as p_id\n 5   , p.name           as prod_name\n 6  from\
    \ (\n 7     select\n 8        cf.customer_id\n 9      , to_number(\n10       \
    \    regexp_substr(cf.favorite_list, '[^,]+', 1, sub#)\n11        ) as product_id\n\
    12     from customer_favorites cf\n13     cross join lateral(\n14        select\
    \ level sub#\n15        from dual\n16        connect by level <= regexp_count(cf.favorite_list,\
    \ ',') + 1\n17     ) fl\n18  ) favs\n19  join customers c\n20     on c.id = favs.customer_id\n\
    21  join products p\n22     on p.id = favs.product_id\n23  order by favs.customer_id,\
    \ favs.product_id;\n```\n**Listing 9-6**\nGenerating as many rows as delimiter\
    \ count\n\nUsing `cross join lateral` in line 13 makes the inline view `fl` in\
    \ lines 14–16 be executed for each row in `customer_favorites`, since I correlate\
    \ the lateral inline view by using `cf.favorite_list` in line 16\\. By counting\
    \ the number of commas and adding one, the inline view generates exactly the number\
    \ of rows as there are elements in the comma-separated list.\n\nAs I’ve numbered\
    \ the `fl` rows consecutively 1, 2, 3... in column `sub#`, I can use `sub#` in\
    \ `regexp_substr` in line 10 to extract the first, second, third... occurrence\
    \ of a “list of at least one character not containing a comma.” This is then my\
    \ `product_id` which I use to join the `products` table.\n\nThe output of Listing\
    \ 9-6 is identical to both Listing 9-5 and Listing 9-4.\n\nThe preceding simple\
    \ regular expression works if every element in the list has at least one character\
    \ (hence the `+`). If I want it to work also if an element can be blank (meaning\
    \ two commas in a row in the string), it will not work simply by changing the\
    \ `+` to a `*`, instead I need to switch to slightly more complex regular expression\
    \ like this:\n\n```sql\n...\n10           regexp_substr(\n11              cf.favorite_list\n\
    12            , '(^|,)([^,]*)'\n13            , 1\n14            , sub#\n15  \
    \          , null\n16            , 2\n17           )\n...\n```\n\nThe second group\
    \ in the expression is like before, just with `+` changed to `*`, but I need to\
    \ state it must follow either the beginning of the string or a comma. As I don’t\
    \ want that preceding comma to be part of the output, I ask for `regexp_substr`\
    \ to return to me just the second group (line 16).\n\n### Treating the string\
    \ as a JSON array\n\nA simple comma-separated list of values can become a JSON\
    \ array as shown in Listing 9-7.\n\n```sql\nSQL> select\n 2     cf.customer_id\
    \  as c_id\n 3   , c.name          as cust_name\n 4   , fl.product_id   as p_id\n\
    \ 5   , p.name          as prod_name\n 6  from customer_favorites cf\n 7  outer\
    \ apply json_table(\n 8     '[' || cf.favorite_list || ']'\n 9   , '$[*]'\n10\
    \     columns (\n11        product_id number path '$'\n12     )\n13  ) fl\n14\
    \  join customers c\n15     on c.id = cf.customer_id\n16  left outer join products\
    \ p\n17     on p.id = fl.product_id\n18  order by cf.customer_id, fl.product_id;\n\
    ```\n**Listing 9-7**\nTreating the string as a JSON array\n\nInstead of a PL/SQL\
    \ table function, I use the SQL function `json_table` in line 7.\n\nThe first\
    \ parameter to `json_table` must be valid JSON, which in this case I can very\
    \ simply accomplish by surrounding the comma-separated list with square brackets\
    \ in line 8.\n\n**Note**\n\nI can keep line 8 very simple only because my values\
    \ are all numeric. If there had been text values involved, I would have needed\
    \ to surround the text values with double quotes by replacing commas with quote-comma-quotes\
    \ and take into consideration escaping any existing quotes. Then I would do as\
    \ Stew Ashton shows here: [`https://stewashton.wordpress.com/2018/06/05/splitting-strings-a-new-champion/`](https://stewashton.wordpress.com/2018/06/05/splitting-strings-a-new-champion/).\n\
    \nIn line 9, I state that there should be one row output from `json_table` for\
    \ every element in the JSON array. As those elements are simple scalars, the path\
    \ in line 11 becomes a simple `$`.\n\nI’ve shown four methods to split simple\
    \ delimited strings into rows of scalar values. In most cases, I’d choose between\
    \ using straight SQL, JSON arrays, and `apex_string.split`. If you have very long\
    \ strings with many elements, the SQL method of asking for the 1st, 2nd, 3rd…occurrence\
    \ in `regexp_substr` might become slower for the 50th occurrence – such a case\
    \ might be better with a function that pipes a row as it traverses the string.\
    \ On the other hand, if you have many relatively short strings each with few elements,\
    \ the overhead of occurrence retrieval of elements might be smaller than the comparatively\
    \ more context switching to PL/SQL.\n\nAs always, test your own use case whether\
    \ SQL or pipelined function is the best. If pipelined function is the answer for\
    \ you, using built-in `apex_string.split` is often a good choice – creating your\
    \ own pipelined function would be useful if your database does not have the APEX\
    \ API packages installed or if you need some special datatype handling.\n\nNow\
    \ it’s time to increase the complexity and look at delimited strings with some\
    \ more structure in them.\n\n### Delimited multiple values\n\nFrom time to time,\
    \ I see applications where a string contains data with two delimiters – a row\
    \ delimiter and a column delimiter. These days that would typically be a JSON\
    \ string instead, but as data lives on a long time, you might still have to deal\
    \ with such strings.\n\nAs an example here, I’ve chosen that the customers on\
    \ the Good Beer Trading Co web site not only can enter their favorite lists, but\
    \ they can also enter a list of beers that they review, each beer with a score\
    \ of A, B, or C. This information is stored in column `review_list` of table `customer_reviews`,\
    \ the content of which I show in Listing 9-8.\n\n```sql\nSQL> select customer_id,\
    \ review_list\n 2  from customer_reviews\n 3  order by customer_id;\n```\n**Listing\
    \ 9-8**\nComma- and colon-delimited content of `customer_reviews` table\n\nThe\
    \ row delimiter is a comma, the column delimiter is a colon, so the data is like\
    \ `product:score,product:score,…`\n\n```\nCUSTOMER_ID  REVIEW_LIST\n50042    \
    \    4040:A,6600:C,7950:B\n50741        4160:A\n51069        4280:B,7790:B\n```\n\
    \nTo split up those strings into rows and columns, I’ll show you four different\
    \ methods."
  raw: '### Straight SQL with row generators


    No matter which method I use, I need to generate rows for each of the elements
    in the comma-delimited lists. The two previous methods used collections and the
    `table` function for this purpose. Another typical method of generating rows is
    to use a `connect by` query on dual, and this can be used here as well, as I show
    in Listing [9-6](#475066_1_En_9_Chapter.xhtml#PC12).


    ```

    SQL> select

    2     favs.customer_id as c_id

    3   , c.name           as cust_name

    4   , favs.product_id  as p_id

    5   , p.name           as prod_name

    6  from (

    7     select  8        cf.customer_id

    9      , to_number(

    10           regexp_substr(cf.favorite_list, ''[^,]+'', 1, sub#)

    11        ) as product_id

    12     from customer_favorites cf

    13     cross join lateral(

    14        select level sub#

    15        from dual

    16        connect by level <= regexp_count(cf.favorite_list, '','') + 1

    17     ) fl

    18  ) favs

    19  join customers c

    20     on c.id = favs.customer_id

    21  join products p

    22     on p.id = favs.product_id

    23  order by favs.customer_id, favs.product_id;

    Listing 9-6

    Generating as many rows as delimiter count

    ```


    Using `cross join lateral` in line 13 makes the inline view `fl` in lines 14–16
    be executed for each row in `customer_favorites`, since I correlate the lateral
    inline view by using `cf.favorite_list` in line 16\. By counting the number of
    commas and adding one, the inline view generates exactly the number of rows as
    there are elements in the comma-separated list.


    As I’ve numbered the `fl` rows consecutively 1, 2, 3... in column `sub#`, I can
    use `sub#` in `regexp_substr` in line 10 to extract the first, second, third...
    occurrence of a “list of at least one character not containing a comma.” This
    is then my `product_id` which I use to join the `products` table.


    The output of Listing [9-6](#475066_1_En_9_Chapter.xhtml#PC12) is identical to
    both Listing [9-5](#475066_1_En_9_Chapter.xhtml#PC11) and Listing [9-4](#475066_1_En_9_Chapter.xhtml#PC7).


    The preceding simple regular expression works if every element in the list has
    at least one character (hence the `+`). If I want it to work also if an element
    can be blank (meaning two commas in a row in the string), it will not work simply
    by changing the `+` to a `*`, instead I need to switch to slightly more complex
    regular expression like this:


    ```

    ...

    10           regexp_substr(

    11              cf.favorite_list

    12            , ''(^|,)([^,]*)''

    13            , 1

    14            , sub#

    15            , null

    16            , 2

    17           )

    ...

    ```


    The second group in the expression is like before, just with `+` changed to `*`,
    but I need to state it must follow either the beginning of the string or a comma.
    As I don’t want that preceding comma to be part of the output, I ask for `regexp_substr`
    to return to me just the second group (line 16).


    ### Treating the string as a JSON array


    A simple comma-separated list of values can become a JSON array as shown in Listing
    [9-7](#475066_1_En_9_Chapter.xhtml#PC14).


    ```

    SQL> select

    2     cf.customer_id  as c_id

    3   , c.name          as cust_name

    4   , fl.product_id   as p_id

    5   , p.name          as prod_name

    6  from customer_favorites cf

    7  outer apply json_table(

    8     ''['' || cf.favorite_list || '']''

    9   , ''$[*]''

    10     columns (

    11        product_id number path ''$''

    12     )

    13  ) fl

    14  join customers c

    15     on c.id = cf.customer_id

    16  left outer join products p

    17     on p.id = fl.product_id

    18  order by cf.customer_id, fl.product_id;

    Listing 9-7

    Treating the string as a JSON array

    ```


    Instead of a PL/SQL table function, I use the SQL function `json_table` in line
    7.


    The first parameter to `json_table` must be valid JSON, which in this case I can
    very simply accomplish by surrounding the comma-separated list with square brackets
    in line 8.


    Note


    I can keep line 8 very simple only because my values are all numeric. If there
    had been text values involved, I would have needed to surround the text values
    with double quotes by replacing commas with quote-comma-quotes and take into consideration
    escaping any existing quotes. Then I would do as Stew Ashton shows here: [`https://stewashton.wordpress.com/2018/06/05/splitting-strings-a-new-champion/`](https://stewashton.wordpress.com/2018/06/05/splitting-strings-a-new-champion/).


    In line 9, I state that there should be one row output from `json_table` for every
    element in the JSON array. As those elements are simple scalars, the path in line
    11 becomes a simple `$`.


    I’ve shown four methods to split simple delimited strings into rows of scalar
    values. In most cases, I’d choose between using straight SQL, JSON arrays, and
    `apex_string.split`. If you have very long strings with many elements, the SQL
    method of asking for the 1st, 2nd, 3rd…occurrence in `regexp_substr` might become
    slower for the 50th occurrence – such a case might be better with a function that
    pipes a row as it traverses the string. On the other hand, if you have many relatively
    short strings each with few elements, the overhead of occurrence retrieval of
    elements might be smaller than the comparatively more context switching to PL/SQL.


    As always, test your own use case whether SQL or pipelined function is the best.
    If pipelined function is the answer for you, using built-in `apex_string.split`
    is often a good choice – creating your own pipelined function would be useful
    if your database does not have the APEX API packages installed or if you need
    some special datatype handling.


    Now it’s time to increase the complexity and look at delimited strings with some
    more structure in them.


    ## Delimited multiple values


    From time to time, I see applications where a string contains data with two delimiters –
    a row delimiter and a column delimiter. These days that would typically be a JSON
    string instead, but as data lives on a long time, you might still have to deal
    with such strings.


    As an example here, I’ve chosen that the customers on the Good Beer Trading Co
    web site not only can enter their favorite lists, but they can also enter a list
    of beers that they review, each beer with a score of A, B, or C. This information
    is stored in column `review_list` of table `customer_reviews`, the content of
    which I show in Listing [9-8](#475066_1_En_9_Chapter.xhtml#PC15).


    ```

    SQL> select customer_id, review_list

    2  from customer_reviews

    3  order by customer_id;

    Listing 9-8

    Comma- and colon-delimited content of customer_reviews table

    ```


    The row delimiter is a comma, the column delimiter is a colon, so the data is
    like `product:score,product:score,…`


    ```

    CUSTOMER_ID  REVIEW_LIST

    50042        4040:A,6600:C,7950:B

    50741        4160:A


    51069        4280:B,7790:B

    ```


    To split up those strings into rows and columns, I’ll show you four different
    methods.'
  trans: "\n### 使用行生成器进行直接 SQL 查询\n\n无论我采用哪种方法，都需要为逗号分隔列表中的每个元素生成对应的行。前两种方法使用了集合和\
    \ `table` 函数来实现这一目的。另一种典型的生成行的方法是使用针对 `dual` 表的 `connect by` 查询，这种方法同样可以在这里使用，如代码清单\
    \ 9-6 所示。\n\n```sql\nSQL> select\n 2     favs.customer_id as c_id\n 3   , c.name\
    \           as cust_name\n 4   , favs.product_id  as p_id\n 5   , p.name     \
    \      as prod_name\n 6  from (\n 7     select\n 8        cf.customer_id\n 9 \
    \     , to_number(\n10           regexp_substr(cf.favorite_list, '[^,]+', 1, sub#)\n\
    11        ) as product_id\n12     from customer_favorites cf\n13     cross join\
    \ lateral(\n14        select level sub#\n15        from dual\n16        connect\
    \ by level <= regexp_count(cf.favorite_list, ',') + 1\n17     ) fl\n18  ) favs\n\
    19  join customers c\n20     on c.id = favs.customer_id\n21  join products p\n\
    22     on p.id = favs.product_id\n23  order by favs.customer_id, favs.product_id;\n\
    ```\n**代码清单 9-6**\n生成与分隔符数量相等的行\n\n在第 13 行使用 `cross join lateral` 使得第 14-16 行的内联视图\
    \ `fl` 能够为 `customer_favorites` 表中的每一行执行一次，因为我通过在第 16 行使用 `cf.favorite_list` 来关联这个横向内联视图。通过计算逗号的数量并加一，该内联视图可以生成精确对应于逗号分隔列表中元素数量的行数。\n\
    \n由于我将 `fl` 的行在 `sub#` 列中连续编号为 1、2、3...，因此可以在第 10 行的 `regexp_substr` 中使用 `sub#`\
    \ 来提取第一个、第二个、第三个...出现的“至少包含一个非逗号字符的列表”。这就是我用来与 `products` 表连接的 `product_id`。\n\
    \n代码清单 9-6 的输出结果与代码清单 9-5 和 9-4 完全相同。\n\n上述简单的正则表达式适用于列表中的每个元素至少包含一个字符的情况（因此使用了\
    \ `+`）。如果我希望它也能处理元素可能为空的情况（即字符串中出现两个连续逗号），简单地将 `+` 改为 `*` 是无法实现的。相反，我需要使用稍微复杂一些的正则表达式，如下所示：\n\
    \n```sql\n...\n10           regexp_substr(\n11              cf.favorite_list\n\
    12            , '(^|,)([^,]*)'\n13            , 1\n14            , sub#\n15  \
    \          , null\n16            , 2\n17           )\n...\n```\n\n表达式中的第二组与之前类似，只是将\
    \ `+` 改为了 `*`，但我需要指明它必须跟在字符串开头或逗号之后。由于我不希望将前面的逗号作为输出的一部分，因此我要求 `regexp_substr`\
    \ 只返回第二组（第 16 行）。\n\n### 将字符串视为 JSON 数组\n\n一个简单的逗号分隔值列表可以转换成一个 JSON 数组，如代码清单 9-7\
    \ 所示。\n\n```sql\nSQL> select\n 2     cf.customer_id  as c_id\n 3   , c.name  \
    \        as cust_name\n 4   , fl.product_id   as p_id\n 5   , p.name         \
    \ as prod_name\n 6  from customer_favorites cf\n 7  outer apply json_table(\n\
    \ 8     '[' || cf.favorite_list || ']'\n 9   , '$[*]'\n10     columns (\n11  \
    \      product_id number path '$'\n12     )\n13  ) fl\n14  join customers c\n\
    15     on c.id = cf.customer_id\n16  left outer join products p\n17     on p.id\
    \ = fl.product_id\n18  order by cf.customer_id, fl.product_id;\n```\n**代码清单 9-7**\n\
    将字符串视为 JSON 数组\n\n我使用了 SQL 函数 `json_table`（第 7 行）来代替 PL/SQL 表函数。\n\n传递给 `json_table`\
    \ 的第一个参数必须是有效的 JSON，在本例中，我可以非常简单地通过在第 8 行将逗号分隔列表用方括号括起来来实现。\n\n**注意**\n\n我之所以能让第\
    \ 8 行保持如此简单，仅仅是因为我的值都是数字。如果涉及文本值，我就需要将文本值用双引号括起来，方法是将逗号替换为引号-逗号-引号，并考虑对任何已有的引号进行转义。那么我就会像\
    \ Stew Ashton 在这里展示的那样做：[`https://stewashton.wordpress.com/2018/06/05/splitting-strings-a-new-champion/`](https://stewashton.wordpress.com/2018/06/05/splitting-strings-a-new-champion/)。\n\
    \n在第 9 行，我指明 `json_table` 应该为 JSON 数组中的每个元素输出一行。由于这些元素是简单的标量，第 11 行的路径就简化为一个简单的\
    \ `$`。\n\n我已经展示了四种将简单的分隔字符串拆分成标量值行的方法。在大多数情况下，我会在直接 SQL、JSON 数组和 `apex_string.split`\
    \ 之间做出选择。如果你的字符串非常长且包含许多元素，那么在 `regexp_substr` 中请求第 1 个、第 2 个、第 3 个...出现的 SQL\
    \ 方法在处理第 50 个出现项时可能会变慢——这种情况可能更适合使用一种在遍历字符串时输出行的函数。另一方面，如果你有许多相对短的字符串，且每个字符串包含的元素很少，那么获取元素出现项的开销可能比相对更多的向\
    \ PL/SQL 的上下文切换要小。\n\n一如既往，请根据你自己的用例测试 SQL 或流水线函数哪个是最佳选择。如果流水线函数对你来说是答案，那么使用内置的\
    \ `apex_string.split` 通常是个好选择——如果你的数据库没有安装 APEX API 包，或者你需要处理某些特殊数据类型，那么创建你自己的流水线函数会很有用。\n\
    \n现在是时候增加复杂性，来看看其中包含更多结构的分隔字符串了。\n\n### 分隔的多值\n\n我偶尔会看到一些应用程序，其中的字符串包含两种分隔符的数据——一种行分隔符和一种列分隔符。如今，这通常会是\
    \ JSON 字符串，但由于数据存在的时间很长，你可能仍然需要处理这类字符串。\n\n这里举一个例子，我假设 Good Beer Trading Co 网站上的客户不仅可以输入他们的收藏列表，还可以输入他们评价过的啤酒列表，每种啤酒都有一个\
    \ A、B 或 C 的评分。这些信息存储在 `customer_reviews` 表的 `review_list` 列中，我在代码清单 9-8 中展示了其内容。\n\
    \n```sql\nSQL> select customer_id, review_list\n 2  from customer_reviews\n 3\
    \  order by customer_id;\n```\n**代码清单 9-8**\n`customer_reviews` 表中以逗号和冒号分隔的内容\n\
    \n行分隔符是逗号，列分隔符是冒号，因此数据格式如 `product:score,product:score,…`\n\n```\nCUSTOMER_ID\
    \  REVIEW_LIST\n50042        4040:A,6600:C,7950:B\n50741        4160:A\n51069\
    \        4280:B,7790:B\n```\n\n为了将这些字符串拆分成行和列，我将向你展示四种不同的方法。\n"
- fmt: '# Custom ODCI Table Function


    The first method I’ll show involves a pipelined table function again, but not
    a straightforward one like Listing [9-2](#475066_1_En_9_Chapter.xhtml#PC2).


    Instead I am implementing it with the Oracle Data Cartridge Interface (ODCI) that
    allows me to hook into specific points in the processing of a SQL statement. This
    means that when the SQL engine hard parses a statement using this function, it
    will call my code to find out what columns and datatypes will be returned – instead
    of finding this information from the data dictionary. When a statement is prepared,
    when a row is fetched, and when the cursor is closed – all these will call my
    code instead of the standard handling.


    ## Note


    This is just one type of ODCI function implementing a custom *pipelined table*
    function. ODCI can also be used to implement a custom *aggregate* function, which
    I’ll show you in the next chapter.


    Here I’ll focus on using this ODCI function – all of the details of the PL/SQL
    is outside the scope of this book. In Listing [9-9](#475066_1_En_9_Chapter.xhtml#PC17),
    I just show the skeleton of the object type used for implementation of the function.


    For the curious reader, the complete code is available in the companion scripts.
    I describe the internals in detail on my blog: [`www.kibeha.dk/2015/06/supposing-youve-got-data-as-text-string.html`](http://www.kibeha.dk/2015/06/supposing-youve-got-data-as-text-string.html).


    ```sql

    SQL> create or replace type delimited_col_row as object (

    ...

    14   , static function parser(

    15        p_text      in    varchar2

    16      , p_cols      in    varchar2

    17      , p_col_delim in    varchar2 default ''|''

    18      , p_row_delim in    varchar2 default '';''

    19     ) return anydataset pipelined

    20       using delimited_col_row


    22   , static function odcitabledescribe(

    ...

    28     ) return number


    30   , static function odcitableprepare(

    ...

    37     ) return number


    39   , static function odcitablestart(

    ...

    45     ) return number


    47   , member function odcitablefetch(

    ...

    51     ) return number


    53   , member function odcitableclose(

    ...

    55     ) return number

    56  )

    57  /

    Type DELIMITED_COL_ROW compiled

    SQL> create or replace type body delimited_col_row as

    ...

    260  end;

    261  /

    Type Body DELIMITED_COL_ROW compiled

    ```

    **Listing 9-9**

    The skeleton of the object type that implements the ODCI function


    The object type must contain and implement the 5 `odci*` functions – they will
    be called by the SQL engine, not by anyone using the type.


    The `parser` function is the one that should be called when you wish to use it.
    As it references the implementing object type using the syntax `using delimited_col_row`
    (line 20), it needs not be inside the object type; if you prefer, it could be
    implemented as a stand-alone function or in a package.


    ## Using the ODCI Table Function


    The object type can be used generically – in Listing [9-10](#475066_1_En_9_Chapter.xhtml#PC18),
    I use it for this specific case.


    ```sql

    SQL> select cr.customer_id, rl.product_id, rl.score

    2  from customer_reviews cr

    3  outer apply table (

    4     delimited_col_row.parser(

    5        cr.review_list

    6      , ''PRODUCT_ID:NUMBER,SCORE:VARCHAR2(1)''

    7      , '':''

    8      , '',''

    9     )

    10  ) rl

    11  order by cr.customer_id, rl.product_id;

    ```

    **Listing 9-10**

    Using the ODCI table function to parse the delimited data


    Just like Listing [9-4](#475066_1_En_9_Chapter.xhtml#PC7), I do an `apply` on
    my table function – in this case I chose an `outer apply` instead of a `cross
    apply`. The table function `delimited_col_row.parser` then takes four parameters:


    *   First, the string that contains my delimited data: `cr.review_list`

    *   Then, the specification of the “columns” of each “row” of delimited data,
    what are their names and datatypes (this should be a literal, not a variable,
    as this is used at hard parse time, not soft parsing)

    *   Last, what is the column delimiter and the row delimiter in the data (these
    same delimiters I use in the column specification in line 6)


    When I execute this statement the first time (hard parse), the SQL engine calls
    my `odcitabledescribe` function, which parses the second parameter and lets the
    SQL engine know the table function will return a row set with two columns, `product_id`
    and `score`, of the specified datatypes.


    Then the SQL engine runs through `odcitableprepare`, `odcitablestart`, `odcitablefetch`,
    and `odcitableclose`. The actual splitting of the string data happens in `odcitablefetch`,
    where next row delimiter is found and the data split by the column delimiter,
    so a “row” is returned. At the end I see this output:


    ```

    CUSTOMER_ID  PRODUCT_ID  SCORE

    50042        4040        A

    50042        6600        C

    50042        7950        B

    50741        4160        A

    51069        4280        B

    51069        7790        B

    ```


    Note that I didn’t have to do any column aliasing of a generic `column_value`
    – I can use `rl.product_id` and `rl.score` directly. I use this in Listing [9-11](#475066_1_En_9_Chapter.xhtml#PC20)
    for a meaningful join to the `products` table.


    ```sql

    SQL> select

    2     cr.customer_id  as c_id

    3   , c.name          as cust_name

    4   , rl.product_id   as p_id

    5   , p.name          as prod_name

    6   , rl.score

    7  from customer_reviews cr

    8  cross apply table (

    9     delimited_col_row.parser(

    10        cr.review_list

    11      , ''PRODUCT_ID:NUMBER,SCORE:VARCHAR2(1)''

    12      , '':''

    13      , '',''

    14     )

    15  ) rl

    16  join customers c

    17     on c.id = cr.customer_id

    18  join products p

    19     on p.id = rl.product_id

    20  order by cr.customer_id, rl.product_id;

    ```

    **Listing 9-11**

    Joining with real column names instead of generic column_value


    In line 8, I used `cross apply`, so the output doesn’t have the customer with
    no reviews:


    ```

    C_ID   CUST_NAME        P_ID  PROD_NAME         SCORE

    50042  The White Hart   4040  Coalminers Sweat  A

    50042  The White Hart   6600  Hazy Pink Cloud   C

    50042  The White Hart   7950  Pale Rider Rides  B

    50741  Hygge og Humle   4160  Reindeer Fuel     A

    51069  Der Wichtelmann  4280  Hoppy Crude Oil   B

    51069  Der Wichtelmann  7790  Summer in India   B

    ```


    ## Conclusion


    Using an ODCI implementation like this allows fine control of all the small details
    of the implementation. This is well and good, but there are other solutions as
    well that doesn’t need installing a custom ODCI function.'
