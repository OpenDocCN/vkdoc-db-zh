    ### 展示箱柜容量过小的情况


    为了演示，我使用 `Listing [21-2]` 中按位置顺序的简单装箱法，而非稍优一些的改进的首次适应算法。无论使用何种算法原理都相同，因此我在 `Listing
    [21-6]` 中保持简单。


    ```sql

    SQL> select wh, aisle, pos, qty, run_qty, box#, box_qty

    2  from (

    3     select

    4        product_name

    5      , warehouse as wh

    6      , aisle

    7      , position  as pos

    8      , qty

    9     from inventory_with_dims

    10     where product_name = ''Der Helle Kumpel''

    11  ) iwd

    12  match_recognize (

    13     order by wh, aisle, pos

    14     measures

    15        match_number()   as box#

