    为了处理这些 `null` 值，我在代码清单 19-7 中做了更多一点的修改。


    ```

    ...

    8  match_recognize (

    9     partition by emp_id

    10    order by start_date nulls first, end_date nulls last

    11    measures

    12       max(name)         as name

    13     , first(start_date) as start_date

    14     , nullif(

    15          max(nvl(end_date, date ''9999-12-31''))

    16        , date ''9999-12-31''

    17       )                 as end_date

    18     , count(*)          as jobs

    19    pattern (

    20       adjoin_or_overlap* last_row

    21    )

    22    define

    23       adjoin_or_overlap as

    24          nvl(next(start_date), date ''-4712-01-01'')

    25             <= max(nvl(end_date, date ''9999-12-31''))

    26 )

    27 order by emp_id, start_date;

    代码清单 19-7

    处理开始和结束日期的 null=无穷大情况

    ```


    尽管这个特定案例中只有 `end_date` 存在 `null` 值，但为了演示目的，我做了必要的修改来处理如果 `start_date` 也存在 `null`
    值的情况：


    *   在第 10 行，我使 `order by` 子句更加明确。如果 `start_date` 中存在 `null` 值，这些值会被认为比任何其他 `start_date`
    都早，因此我使用 `nulls first` 使这些行排在最前面。类似地，`end_date` 中的 `null` 值被认为比任何其他 `end_date`
    都晚，所以我使用 `nulls last` 让这些行排在最后。


    *   在比较操作中，我不能简单地使用 `nulls first` 来将 `start_date` 中的 `null` 视为小于任何其他日期，所以在第 24
    行，我将 `null` 转换为 Oracle `date` 数据类型中可能的最小日期。


    *   聚合函数 `max` 会忽略 `null` 值，因此在第 25 行，我将 `end_date` 中的 `null` 转换为 `date` 中可能的最大日期。


    *   为了在 `end_date` `measure` 中获得正确结果，我在第 15 行的 `max` 函数内部做了同样的 `nvl` 处理。然后，如果
    `max` 的结果是最大日期，我使用第 14 行和第 16 行的 `nullif` 将其转换回 `null` 输出。


