  trans: '## 基于值范围的窗口


    如果我需要，我可以定义一个窗口，不是“当前行的前两行到后两行”，而是“那些值在当前行值的减 20 到加 20 范围内的行”。这可以通过 `range between`
    来实现，如代码清单 11-7 所示。


    ```

    ...

    6   , sum(ol.qty) over (

    7        partition by ol.product_id

    8        order by ol.qty

    9        range between 20 preceding

    10                  and 20 following

    11     ) as p_qty

    ...

    ```


    **代码清单 11-7** 基于数量（qty）值的范围窗口


    当我在第 9-10 行指定 `between 20 preceding and 20 following` 时，我要求窗口包含那些值在当前行值加/减 20
    范围内的行。但这个“值”指的是什么值？


    `range` 使用的值，是在分析函数的 `order by` 子句中所用列的值。因此，要使用范围窗口，`order by` 列必须是数字或日期/时间戳类型。


    我在 `sum` 函数中计算总和的列，不必与用于排序和范围定义的列相同，但在实践中，它们通常是相同的。这会得到一个输出，其中你可以看到第三和第四行都得到了
    370 的总和，因为它是分区内所有值在 80-20=60 到 80+20=100 之间的行的总和：


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   280

    4280  Hoppy Crude Oil  427   60   280

    4280  Hoppy Crude Oil  422   80   370

    4280  Hoppy Crude Oil  429   80   370

    4280  Hoppy Crude Oil  428   90   360

    4280  Hoppy Crude Oil  421   110  200

    6600  Hazy Pink Cloud  424   16   56

    6600  Hazy Pink Cloud  426   16   56

    6600  Hazy Pink Cloud  425   24   56

    ```


    即使范围窗口也不必包含当前行值；我也可以指定窗口包含那些 `qty` 值在当前 `qty` + 5 到当前 `qty` + 25 之间的行：


    ```

    ...

    9        range between  5 following

    10                  and 25 following

    ...

    ```


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   160

    4280  Hoppy Crude Oil  427   60   160

    4280  Hoppy Crude Oil  422   80   90

    4280  Hoppy Crude Oil  429   80   90

    4280  Hoppy Crude Oil  428   90   110

    4280  Hoppy Crude Oil  421   110

    6600  Hazy Pink Cloud  424   16   24

    6600  Hazy Pink Cloud  426   16   24

    6600  Hazy Pink Cloud  425   24

    ```


    累计求和也可以使用 `range` 窗口来完成：


    ```

    ...

    9        range between unbounded preceding

    10                  and current row

    ...

    ```


    但请注意，对于 `qty` 值相同的行，累计求和的结果是相同的：


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   120

    4280  Hoppy Crude Oil  427   60   120

    4280  Hoppy Crude Oil  422   80   280

    4280  Hoppy Crude Oil  429   80   280

    4280  Hoppy Crude Oil  428   90   370

    4280  Hoppy Crude Oil  421   110  480

    6600  Hazy Pink Cloud  424   16   32

    6600  Hazy Pink Cloud  426   16   32

    6600  Hazy Pink Cloud  425   24   56

    ```


    将此输出与代码清单 11-5 的输出对比，前两行在 `p_qty` 中的值分别是 60 和 120。而在这里，它们都是 120。


    这是 `range` 窗口的特性所致，它赋予了 `current row` 这个术语不同的含义。它不再具体指*那一行*当前行，而是指当前行的*值*。（在我看来，如果能对
    `range` 窗口使用 `current value` 这样的措辞会更好，但不幸的是，这不是支持的语法。）


    所以你会看到，在值存在并列（ties）的情况下，使用 `current row` 的 `range` 窗口实际上可能*包含后续的行*。这引出了一个非常容易掉入的陷阱。


    ## 默认窗口的危险性


    在图 11-3 中，你可以看到有可能使用 `order by` 而*不*指定窗口子句。这会导致一个默认的窗口子句，它可能会让你惊讶。在代码清单 11-8 中，我展示了默认情况、`range
    between` 和 `rows between` 之间的区别。


    ```sql

    SQL> select

    2     ol.product_id as p_id

    3   , p.name        as product_name

    4   , ol.order_id   as o_id

    5   , ol.qty

    6   , sum(ol.qty) over (

    7        partition by ol.product_id

    8        order by ol.qty

    9        /* no window - rely on default */

    10     ) as def_q

    11   , sum(ol.qty) over (

    12        partition by ol.product_id

    13        order by ol.qty

    14        range between unbounded preceding

    15                  and current row

    16     ) as range_q

    17   , sum(ol.qty) over (

    18        partition by ol.product_id

    19        order by ol.qty

    20        rows between unbounded preceding

    21                 and current row

    22     ) as rows_q

    23  from orderlines ol

    24  join products p

    25     on p.id = ol.product_id

    26  where ol.product_id in (4280, 6600)

    27  order by ol.product_id, ol.qty;

    ```


    **代码清单 11-8** 使用默认窗口、range 窗口和 rows 窗口的累计求和对比


    我这里有三个分析函数调用：


    *   第 6-10 行的 `def_q` 列使用了 `order by` 但留空了窗口子句。

    *   第 11-16 行的 `range_q` 列使用了 `range between` 窗口进行累计求和。

    *   第 17-22 行的 `rows_q` 列使用了 `rows between` 窗口进行累计求和。


    在输出中你可以看到，`def_q` 和 `range_q` 是相同的：


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  DEF_Q  RANGE_Q  ROWS_Q

    4280  Hoppy Crude Oil  423   60   120    120      60

    4280  Hoppy Crude Oil  427   60   120    120      120

    4280  Hoppy Crude Oil  422   80   280    280      200

    4280  Hoppy Crude Oil  429   80   280    280      280

    4280  Hoppy Crude Oil  428   90   370    370      370

    4280  Hoppy Crude Oil  421   110  480    480      480

    6600  Hazy Pink Cloud  424   16   32     32       16

    6600  Hazy Pink Cloud  426   16   32     32       32

    6600  Hazy Pink Cloud  425   24   56     56       56

    ```


    是的，如果你有一个 `order_by_clause`，`windowing_clause` 的默认值就是 `range between unbounded
    preceding and current row`。


    我见过很多博客和论坛帖子，将累计求和展示为类似 `sum(col1) over (order by col2)` 的形式就到此为止了。当你用这个默认窗口测试代码时，通常能得到预期的结果，因为输出的差异只出现在值存在并列时。所以你可能直到代码投入生产后才能发现这个错误。


    **注意**


    这不仅仅是值存在并列时的问题。即使你的 `order by` 列是唯一的，对累计求和使用默认的 `range between` 窗口也可能因为分析函数的计算而产生一些额外开销，影响性能。这是因为
    `rows between` 可以被 SQL 引擎更优化地执行，而 `range between` 要求 SQL 引擎“向前查看”行，看看是否有后续行具有相同的值。关于这一点的更详细解释，请参见我之前写的一篇博客：`www.kibeha.dk/2013/02/rows-versus-default-range-in-analytic.html`。


    在我看来，默认值本应是 `rows between`，因为根据我的经验，这是迄今为止最常用的窗口规范。我*非常*频繁地使用 `rows between`，而只在极少数情况下使用
    `range between`。'
- fmt: 'So my best practice rule of thumb is that whenever I have an `order by` clause,
    I always *explicitly* write the windowing clause, *never* relying on the default.
    Even for those rare cases where my window actually happens to be `range between
    unbounded preceding and current row`, I still write it explicitly. This tells
    the future me, or any developers maintaining my code in the future, that the `range
    between` is desired. If I see code where the windowing clause is absent, I always
    wonder if it is really meant to be `range between` or if it is simply a misunderstood
    copy-paste from a forum post.


    This applies only to analytic functions that support the windowing clause, of
    course. And I also do not use it if my window is the entire partition, then I
    simply omit `order by` and windowing clause rather than write `rows between unbounded
    preceding and unbounded following`.


    But even though Listing [11-5](#475066_1_En_11_Chapter.xhtml#PC10) adheres to
    this rule of thumb, there is another issue with it: the fact that it is possibly
    to get a different output from the same data in different executions of the code,
    because the rows with duplicate values might be in different order in the output
    depending on the access plan used by the optimizer.


    This issue does not strictly influence the correctness of the solution, but users
    are liable to question the correctness when they observe different outputs (even
    if both outputs are correct). So I make it my best practice to make the combination
    of the columns used in `partition by` and `order by` unique in the analytic function
    (when using `rows between`, not applicable to `range between`). This makes the
    output *deterministic*, so the user can verify he gets the same result in each
    run.


    Listing [11-9](#475066_1_En_11_Chapter.xhtml#PC28) represents both these best
    practices for doing running totals.


    ```

    SQL> select

    2     ol.product_id as p_id

    3   , p.name        as product_name

    4   , ol.order_id   as o_id

    5   , ol.qty

    6   , sum(ol.qty) over (

    7        partition by ol.product_id

    8        order by ol.qty, ol.order_id

    9        rows between unbounded preceding

    10                 and current row

    11     ) as p_qty

    12  from orderlines ol

    13  join products p

    14     on p.id = ol.product_id

    15  where ol.product_id in (4280, 6600)

    16  order by ol.product_id, ol.qty, ol.order_id;

    Listing 11-9

    A best practice for a running sum

    ```


    In reality I am only interested in the `qty` ordering within each `product_id`
    partition (as in Listing [11-5](#475066_1_En_11_Chapter.xhtml#PC10)), but the
    combination of those two columns is not unique, making the output nondeterministic.
    Therefore, I add `order_id` to both `order by` clauses (lines 8 and 16):


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   60

    4280  Hoppy Crude Oil  427   60   120

    4280  Hoppy Crude Oil  422   80   200

    4280  Hoppy Crude Oil  429   80   280

    4280  Hoppy Crude Oil  428   90   370

    4280  Hoppy Crude Oil  421   110  480

    6600  Hazy Pink Cloud  424   16   16

    6600  Hazy Pink Cloud  426   16   32

    6600  Hazy Pink Cloud  425   24   56

    ```


    This ensures a deterministic output.


    And in this case the statement can even execute using only a single sorting operation,
    since the columns in the analytic `partition by` followed by the columns in the
    analytic `order by` match the columns in the final `order by` in line 16. This
    enables the optimizer to skip the final ordering, as the analytic function evaluation
    has already ordered the data correctly.


    ## Lessons learned


    This chapter introduced the basic elements of the three subclauses of analytic
    functions. Although I’ve shown it specifically using the `sum` function, you can
    generalize to other analytic functions and use what you’ve learned about


    - Using `partition by` to split rows into parts where the analytic function is
    applied within each part separately.

    - Using the windowing clause in conjunction with `order by` to create moving windows
    of rows to calculate, for example, running totals.

    - Understanding that the *default* windowing clause is rarely a good match for
    your use case, so always using an *explicit* windowing clause is a good idea.


    With a good understanding of these subclauses, you can make analytic functions
    solve many otherwise difficult tasks for you. The following chapters in this part
    of the book are dedicated to several such solutions.


    # 12. Answering Top-N Questions


    I think it is extremely few developers that haven’t been asked to create a Top-N
    report. The questions by the business that can be classified as a Top-N question
    are legion such as the following:


    - Which of our products sell the most?

    - Which user profiles create the most tweets?

    - Which sales employees generate most leads?

    - Which hotels in the chain have the least complaints?


    The last one could strictly speaking be called a Bottom-N question, but that is
    in principle exactly the same. For a Top-N report, you order the data by a specific
    *descending* order and pick the Top-N rows of data. If you want a Bottom-N report,
    you simply order the data by a specific *ascending* order and still pick the Top-N
    rows of data. In SQL terms, it simply is a matter of doing `order by col_name
    desc` vs. `order by col_name asc`. So I’m just going to show Top-N examples –
    Bottom-N you can get by replacing `desc` with `asc`.


    To demonstrate the Top-N SQL, I’m using the first question from the preceding
    list: Which of our products sell the most?


    ## Top-N of sales data


    As my Good Beer Trading company sells beer, the marketing department has asked
    me to find out the Top-3 best-selling beers the company sells, so they can do
    a campaign with a pedestal like Figure [12-1](#475066_1_En_12_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_12_Chapter/475066_1_En_12_Fig1_HTML.jpg](images/475066_1_En_12_Chapter/475066_1_En_12_Fig1_HTML.jpg)


    Figure 12-1 Top-3 beers by total sales


    Now that’s a quite naïve question they gave me here, so I need to get back to
    them and ask them to specify what they mean. Do I determine the ordering in terms
    of quantity or amount sold? Is it all-time best sellers they want or from a specific
    year? What should I do if there are ties where two or more beers have sold the
    same?


    Often the easiest way for me as a developer to get the detailed specification
    I need is to give them examples, since they sometimes won’t understand why “Top-3
    best-selling beers” is an ambiguous question.


    ### Which kind of Top-3 do you mean?


    Particularly there’s ambiguity concerning what to do in case of ties. Generally
    there are three cases:


    - Top-rows rule: “*I want exactly 3 rows*.” In such a case, I need to explain
    to the business that this means they will not see, for example, a fourth row that
    has exactly the same value as the third row. For such a tie, the output will not
    show both rows, but only one of them. In this case, either it will be a random
    one or the business needs to decide a tiebreaker rule to determine which one to
    output.

    - Olympic rule: “*I want gold, silver, and bronze the Olympic way*.” By the rules
    often used in sports competitions, if, for example, there’s a tie for first place,
    two gold medals are given, then the silver medal is skipped, and the third guy
    gets a bronze medal. Using this rule can lead to more than three rows in the output,
    for example, when there is a tie for bronze, in which case there will be one first
    place, one second place, and two third places for a total of four rows in the
    output.

    - Top-values rule: “*I want all that have the Top-3 values*.” With the previous
    rule, if there’s a tie for second place, there’ll be a gold medal and two silver
    medals, but no bronze medal. This rule states that no matter how many ties there
    are for first value, ties for second value, and ties for third value, the output
    should contain all the rows that have the Top-3 values.


    All of these Top-3 rules can be handled in SQL – I’ll demonstrate how.'
