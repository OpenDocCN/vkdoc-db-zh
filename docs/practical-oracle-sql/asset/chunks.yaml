- fmt: '# Custom aggregate function stragg


    Long before version 11.2 was thought of, a quite common question people would
    ask of the famous Tom Kyte on [*http://asktom.oracle.com*](http://asktom.oracle.com)
    was how to do string aggregation. So Tom developed a custom aggregate function
    he called `stragg` as an answer to that question, and it has been used by many
    over the years. Here I’ll show a version where I have incorporated a few additions
    picked up here and there.


    ## Caution


    You may possibly find in your database a function called `stragg` in the `SYS`
    schema. This is a very little known function based on a C library and installed
    together with the `dbms_xmlindex` package. It is undocumented and designed specifically
    for certain tasks in the XML Index implementation. **Do not use it!** There is
    no guarantee how it works, and it is all too easy to unknowingly call it in an
    unsupported manner and either get errors or wrong results.


    Oracle Data Cartridge Interface (`ODCI`) is a set of interface functions for doing
    a rather low-level implementation of functionality that can be used very much
    like built-ins. Mostly it is used by library authors implementing special functionality
    in, for example, C, but it can also be used for simpler cases implemented in pure
    `PL/SQL`.


    As this is a book primarily on `SQL`, I am not going to waste paper having the
    entire implementation printed in the book. So I’ll show the create statements
    in the pieces of Listing 10-6, but skip the bulk of the body.


    ```

    SQL> create or replace type stragg_expr_type as object (

    2     element    varchar2(4000 char)

    3   , delimiter  varchar2(4000 char)

    4   , map member function map_func return varchar2

    5  );

    6  /

    Listing 10-6

    Types, type bodies, and function to implement custom aggregate

    ```


    The original `stragg` by Tom Kyte aggregated simply on a `varchar2` and then hardcoded
    the delimiter used, since an aggregate function cannot be created with multiple
    parameters. I am going to aggregate on an object type `stragg_expr_type` instead,
    allowing me to pass the desired delimiter as a second attribute in the object.


    ```

    SQL> create or replace type body stragg_expr_type

    2  as

    3     map member function map_func return varchar2

    4     is

    5     begin

    6        return element || ''|'' || delimiter;

    7     end map_func;

    8  end;

    9  /

    ```


    I implement a `map member function` in my object type, because that allows the
    database to discover whether two objects are identical or not. And that in turn
    allows my aggregate function to support the `distinct` keyword, which is one of
    the things `listagg` does not do until version 19c.


    ```

    SQL> create or replace type stragg_type as object

    2  (

    3     aggregated varchar2(4000)

    4   , delimiter  varchar2(4000)


    6   , static function ODCIAggregateInitialize(

    7        new_self    in out stragg_type

    8     ) return number


    10   , member function ODCIAggregateIterate(

    11        self        in out stragg_type

    12      , value       in     stragg_expr_type

    13     ) return number


    15   , member function ODCIAggregateTerminate(

    16        self        in     stragg_type

    17      , returnvalue out    varchar2

    18      , flags       in     number

    19     ) return number


    21   , member function ODCIAggregateMerge(

    22        self        in out stragg_type

    23      , other_self  in     stragg_type

    24     ) return number

    25  );

    26  /

    ```


    Then I define the type `stragg_type` that is going to implement the actual aggregation.
    The two attributes I use internally in the implementation. The four functions
    are determined by the `ODCI` interface and must be named like shown and with a
    parameter list exactly as shown (the parameter names may be different, but the
    order and type of parameters have to match):


    *   `ODCIAggregateInitialize` is kind of like a constructor function explicitly
    called by the database when aggregation is started, so here I create a new instance
    of the object.

    *   `ODCIAggregateIterate` is called by the database with each string that is
    to be aggregated, so here I add the delimiter and string to the `aggregated` attribute.
    (In the original `stragg`, the `value` parameter was simply a `varchar2`; here
    I am passing a value of type `stragg_expr_type`.)

    *   `ODCIAggregateTerminate` is called by the database at the end of the aggregation
    when it wants the result, and I return the aggregated string here.

    *   In case the database has decided to split the aggregation job in multiple
    parts (e.g., in parallel query), each part has called `ODCIAggregateInitialize`
    to get an object and then aggregated along with `ODCIAggregateIterate`. At the
    end each part will have an object with some strings aggregated in the `aggregated`
    attribute – the database will then call `ODCIAggregateMerge` to merge the content,
    so in this function, I append the `aggregated` of the `other_self` object to the
    `self` object.


    That was the textual description of what I need to implement in the functions,
    and then I just need to code this in the type body.


    ```

    SQL> create or replace type body stragg_type

    2  is

    ...

    54  end;

    55  /

    ```


    For the code implementing those four functions in the type body, see the companion
    script *practical_fill_schema.sql*.


    ```

    SQL> create or replace function stragg(input stragg_expr_type )

    2     return varchar2

    3     parallel_enable aggregate using stragg_type;

    4  /

    ```


    Having create the object type for implementation, the last thing to do is to create
    the aggregate function `stragg` itself. The input parameter must be of datatype
    matching the `value` parameter of `ODCIAggregateIterate` function, and the return
    datatype must match the `returnvalue` parameter of `ODCIAggregateTerminate` function.


    The `aggregate using stragg_type` tells the database this is a custom aggregate
    function that is implemented by the object type `stragg_type`, so when the database
    performs aggregation with this function, it will call the `ODCI∗` functions of
    the type. Keyword `parallel_enable` specifies the database may use parallelization,
    because I have implemented `ODCIAggregateMerge`.


    Having created these objects, I am now able to use my custom aggregate function
    in Listing 10-7.


    ```

    SQL> select

    2     max(brewery_name) as brewery_name

    3   , stragg(

    4        stragg_expr_type(product_name, '','')

    5     ) as product_list

    6  from brewery_products

    7  group by brewery_id

    8  order by brewery_id;

    Listing 10-7

    Using stragg custom aggregate function

    ```


    Since I declared this function an aggregate function using the `ODCI` interface,
    I can use `stragg` in lines 3–5 just like any built-in aggregate function. The
    input datatype is `stragg_expr_type`, so I use the type constructor with the product
    name and the comma as delimiter.


    ## Note


    The trick of using an object type to pass a delimiter to the aggregate function
    works nicely, but it does require a bit of self-discipline from me as a developer,
    since it is up to me to ensure that the delimiter is a constant. In principle
    I could pass different delimiter values in each row, but that would cause problems
    in the implementation. I have tried to implement such that the delimiter from
    the first call to `ODCITableIterate` is used, but in case of parallelization,
    there will be multiple calls to `ODCITableIterate` from different rows. It is
    therefore important you make sure the delimiter value is constant – the safest
    is to use a literal.


    The output of Listing 10-7 is almost, but not necessarily quite the same as the
    output I got from `listagg` and `collect`:


    ```

    BREWERY_NAME        PRODUCT_LIST

    Balthazar Brauerei  Monks and Nuns,Der Helle Kumpel,Hercule Trippel

    Happy Hoppy Hippo   Hazy Pink Cloud,Ghost of Hops,Summer in India

    Brewing Barbarian   Coalminers Sweat,Pale Rider Rides,Hoppy Crude Oil,Reindeer
    Fuel

    ```'
