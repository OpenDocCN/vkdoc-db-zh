- fmt: '# 问题描述


    `Product 4280` 是正常的；只是在三个库位拣货后，其滚动总和（rolling sum）恰好匹配了 110 的订单数量。但 `Product 6520`
    只拣到了 98，而它应该得到 140？如果回顾之前的输出，你会看到在下一个库位 (`1 A 16`)，滚动总和变成了 146，大于 140，因此该行未被包含在输出中，尽管我需要从那个库位拣取大部分数量。


    问题在于，我无法在 `where` 子句中创建一个过滤器，使其只包含滚动总和大于订单数量的*第一个*行，而不包含任何*更多*的行。


    # 解决方案原理


    但我可以做的是创建一个仅累加*之前*行的滚动总和，而不是包含当前行。这可以通过简单地将 [清单 13-3](#475066_1_En_13_Chapter.xhtml#PC4)
    中的窗口结束点在第 8 行从 `current row` 改为 `1 preceding` 来实现，如 [清单 13-5](#475066_1_En_13_Chapter.xhtml#PC8)
    所示。


    ```sql

    ...

    5   , sum(i.qty) over (

    6        partition by i.product_id

    7        order by i.purchased, i.qty

    8        rows between unbounded preceding and 1 preceding

    9     )            as acc_prv_q

    ...

    ```

    **清单 13-5**

    仅累加之前行的总和


    此输出中的滚动总和与 [清单 13-3](#475066_1_En_13_Chapter.xhtml#PC4) 的输出相比，向下移动了一行：


    ```text

    P_ID  ORD_Q  LOC_Q  ACC_PRV_Q  PURCHASED   WH  AI  POS

    4280  110    36                2018-02-23  1   C   1

    4280  110    39     36         2018-04-23  1   D   18

    4280  110    35     75         2018-06-23  2   B   3

    4280  110    34     110        2018-08-23  2   C   20

    4280  110    37     144        2018-10-23  1   A   4

    4280  110    19     181        2018-12-23  2   C   7

    6520  140    14                2018-02-26  2   B   5

    6520  140    14     14         2018-02-26  1   A   29

    6520  140    20     28         2018-02-26  1   C   13

    6520  140    24     48         2018-02-26  2   B   26

    6520  140    26     72         2018-04-26  2   D   9

    6520  140    48     98         2018-04-26  1   A   16

    6520  140    70     146        2018-06-26  1   C   5

    6520  140    21     216        2018-08-26  2   C   31

    6520  140    48     237        2018-08-26  1   D   19

    6520  140    72     285        2018-10-26  2   A   1

    6520  140    43     357        2018-12-26  1   B   32

    ```


    这意味着，在 [清单 13-4](#475066_1_En_13_Chapter.xhtml#PC6) 的输出中缺失的、产品 `6520` 在库位 `1 A
    16` 的行，现在处于 `acc_prv_q` 小于 `ord_q` 的行窗口内。因此，我可以创建出能正确过滤所需数据的 [清单 13-6](#475066_1_En_13_Chapter.xhtml#PC10)。这就是本章开头描述的三个问题中第一个问题的解决方案。


    ```sql

    SQL> select

    2     wh, ai, pos, p_id

    3   , least(loc_q, ord_q - acc_prv_q) as pick_q

    4  from (

    5     select

    6        i.product_id as p_id

    7      , ol.qty       as ord_q

    8      , i.qty        as loc_q

    9      , nvl(sum(i.qty) over (

    10           partition by i.product_id

    11           order by i.purchased, i.qty

    12           rows between unbounded preceding and 1 preceding

    13        ), 0)        as acc_prv_q

    14      , i.purchased

    15      , i.warehouse  as wh

    16      , i.aisle      as ai

    17      , i.position   as pos

    18     from orderlines ol

    19     join inventory_with_dims i

    20        on i.product_id = ol.product_id

    21     where ol.order_id = 421

    22  )

    23  where acc_prv_q < ord_q

    24  order by wh, ai, pos;

    ```

    **清单 13-6**

    基于之前行累加的过滤


    在第 9–13 行，我计算了之前行的滚动总和，但请注意，我需要使用 `nvl` 将第一行的 `null` 转换为零——否则，第 23 行的 `where`
    子句会失败。


    你可以将这个 `where` 子句理解为：“只要之前的行*尚未*拣够货以满足订单，我就需要将此行包含在输出中。”


    在第 3 行，我计算了每一行所在库位需要拣取的数量。我知道还需要拣取多少：是订单数量 (`ord_q`) 减去之前行已拣取的数量 (`acc_prv_q`)。如果这个值小于库位上的库存
    (`loc_q`)，那就是我需要拣取的数量。但如果它更大，那么当然我只能拣取库位上现有的数量。换句话说，我需要拣取这两个数字中较小的一个，这可以通过 `least`
    函数实现。


    最后，我清理了 `select` 列表，只保留了拣货单上必要的信息，并在第 23 行按库位顺序对行进行了排序：


    ```text

    WH  AI  POS  P_ID  PICK_Q

    1   A   16   6520  42

    1   A   29   6520  14

    1   C   1    4280  36

    1   C   13   6520  20

    1   D   18   4280  39

    2   B   3    4280  35

    2   B   5    6520  14

    2   B   26   6520  24

    2   D   9    6520  26

    ```


    拣货操作员现在可以拿着这份清单，在仓库中按指定位置拣货。他将按照 [图 13-2](#475066_1_En_13_Chapter.xhtml#Fig2)
    所示的路线进行。


    ![../images/475066_1_En_13_Chapter/475066_1_En_13_Fig2_HTML.jpg](images/475066_1_En_13_Chapter/475066_1_En_13_Fig2_HTML.jpg)

    **图 13-2**

    FIFO 拣货查询第一版的结果


    这条路线的问题是，在拣完 A 通道的前两个库位后，他需要“从底部开始”在 C 通道拣货。这意味着他要么需要掉头（如图所示），要么可能需要不必要地“向下”行驶
    B 通道。两种方式都不太理想，我稍后会回来解决这个问题。'
  raw: 'Product 4280 is OK; it just happens that the rolling sum exactly matches the
    ordered quantity of 110 after picking at three locations. But product 6520 only
    gets to pick 98, where it should get 140? If you look back at the previous output,
    you’ll see that by the next location (1 A 16), the rolling sum becomes 146, which
    is greater than 140 so that row is not included in the output, even though I need
    to pick most of the quantity of that location.


    The problem is that I cannot in the `where` clause create a filter that will include
    the *first* row where the rolling sum is greater than the ordered quantity, but
    not any *more* rows than that.


    But what I can do is to create a rolling sum that accumulates the *previous* rows
    only, rather than including the current row. This is simply done in Listing [13-5](#475066_1_En_13_Chapter.xhtml#PC8)
    by simply changing the window end point of Listing [13-3](#475066_1_En_13_Chapter.xhtml#PC4)
    from `current row` to `1 preceding` in line 8.


    ```

    ...

    5   , sum(i.qty) over (

    6        partition by i.product_id

    7        order by i.purchased, i.qty

    8        rows between unbounded preceding and 1 preceding

    9     )            as acc_prv_q

    ...

    Listing 13-5

    Accumulated sum of only the previous rows

    ```


    The rolling sums in this output is pushed one row down when compared to the output
    of Listing [13-3](#475066_1_En_13_Chapter.xhtml#PC4):


    ```

    P_ID  ORD_Q  LOC_Q  ACC_PRV_Q  PURCHASED   WH  AI  POS

    4280  110    36                2018-02-23  1   C   1

    4280  110    39     36         2018-04-23  1   D   18

    4280  110    35     75         2018-06-23  2   B   3

    4280  110    34     110        2018-08-23  2   C   20

    4280  110    37     144        2018-10-23  1   A   4

    4280  110    19     181        2018-12-23  2   C   7

    6520  140    14                2018-02-26  2   B   5

    6520  140    14     14         2018-02-26  1   A   29

    6520  140    20     28         2018-02-26  1   C   13

    6520  140    24     48         2018-02-26  2   B   26

    6520  140    26     72         2018-04-26  2   D   9

    6520  140    48     98         2018-04-26  1   A   16

    6520  140    70     146        2018-06-26  1   C   5

    6520  140    21     216        2018-08-26  2   C   31

    6520  140    48     237        2018-08-26  1   D   19

    6520  140    72     285        2018-10-26  2   A   1

    6520  140    43     357        2018-12-26  1   B   32

    ```


    This means that the row of product 6520 in location 1 A 16 that was missing in
    the output of Listing [13-4](#475066_1_En_13_Chapter.xhtml#PC6) is now within
    the window of rows where `acc_prv_q` is less than `ord_q`, so I can create Listing
    [13-6](#475066_1_En_13_Chapter.xhtml#PC10) that correctly filters what I need.
    It is the solution to the first problem of the three described at the beginning
    of the chapter.


    ```

    SQL> select

    2     wh, ai, pos, p_id

    3   , least(loc_q, ord_q - acc_prv_q) as pick_q

    4  from (

    5     select

    6        i.product_id as p_id

    7      , ol.qty       as ord_q

    8      , i.qty        as loc_q

    9      , nvl(sum(i.qty) over (

    10           partition by i.product_id

    11           order by i.purchased, i.qty

    12           rows between unbounded preceding and 1 preceding

    13        ), 0)        as acc_prv_q

    14      , i.purchased

    15      , i.warehouse  as wh

    16      , i.aisle      as ai

    17      , i.position   as pos

    18     from orderlines ol

    19     join inventory_with_dims i

    20        on i.product_id = ol.product_id

    21     where ol.order_id = 421

    22  )

    23  where acc_prv_q < ord_q

    24  order by wh, ai, pos;

    Listing 13-6

    Filtering on the accumulation of previous rows

    ```


    In lines 9–13, I do the rolling sum of previous rows, but note that I need to
    use `nvl` to turn the `null` of the first row into a zero – otherwise, the `where`
    clause in line 23 will fail.


    That `where` clause you can read as “As long as the previous row(s) have *not
    yet* picked enough to fulfill the order, I need to include this row in the output.”


    In line 3, I calculate how much needs to be picked at the location of each row.
    I know how much still needs to be picked; it’s the ordered quantity (`ord_q`)
    minus what has already been picked in the previous rows (`acc_prv_q`). If this
    is smaller than what is on the location (`loc_q`), that is what I need to pick.
    But if it is greater, then of course I can only pick as much as is on the location.
    In other words, I need to pick the smaller of the two numbers, which I can do
    with the `least` function.


    Finally I’ve cleaned up the `select` list only saving what’s necessary to put
    on the picking list, and in line 23, I’m ordering the rows in location order:


    ```

    WH  AI  POS  P_ID  PICK_Q

    1   A   16   6520  42

    1   A   29   6520  14

    1   C   1    4280  36

    1   C   13   6520  20

    1   D   18   4280  39

    2   B   3    4280  35

    2   B   5    6520  14

    2   B   26   6520  24

    2   D   9    6520  26

    ```


    The picking operator can now take this list and drive around the warehouse picking
    the goods as specified. He’ll follow the route shown in Figure [13-2](#475066_1_En_13_Chapter.xhtml#Fig2).


    ![../images/475066_1_En_13_Chapter/475066_1_En_13_Fig2_HTML.jpg](images/475066_1_En_13_Chapter/475066_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    The result of the first version of the FIFO picking query


    This route has the problem that after having picked the first two locations in
    aisle A, he needs to start “from the bottom” in aisle C. That means he either
    has to turn around (as shown in the figure) or he could take an unnecessary drive
    “down” aisle B. Neither is really satisfactory, and I’ll come back to the solution
    of this in a little while.'
