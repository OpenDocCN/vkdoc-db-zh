- fmt: '### Dynamic SQL in PL/SQL function


    You recall in Listing [4-2](#475066_1_En_4_Chapter.xhtml#PC3) I used `sys_connect_by_path`
    to build an expression of the multiplication to take place, like `16*8*3`. Wouldn’t
    it be nice simply to evaluate this expression? Well, in Listing [4-6](#475066_1_En_4_Chapter.xhtml#PC13)
    I do just that.


    ```sql

    SQL> with

    2     function evaluate_expr(

    3        p_expr varchar2

    4     )

    5        return number

    6     is

    7        l_retval number;

    8     begin

    9        execute immediate

    10           ''select '' || p_expr || '' from dual''

    11           into l_retval;

    12        return l_retval;

    13     end;

    14  select

    15     connect_by_root p.id as p_id

    16   , connect_by_root p.name as p_name

    17   , c.id as c_id

    18   , c.name as c_name

    19   , ltrim(sys_connect_by_path(pr.qty, ''*''), ''*'') as qty_expr

    20   , evaluate_expr(

    21        ltrim(sys_connect_by_path(pr.qty, ''*''), ''*'')

    22     ) as qty_mult

    23  from packaging_relations pr

    24  join packaging p

    25     on p.id = pr.packaging_id

    26  join packaging c

    27     on c.id = pr.contains_id

    28  where connect_by_isleaf = 1

    29  start with pr.packaging_id not in (

    30     select c.contains_id from packaging_relations c

    31  )

    32  connect by pr.packaging_id = prior pr.contains_id

    33  order siblings by pr.contains_id;

    34  /

    Listing 4-6

    Alternative method using dynamic evaluation function

    ```


    The query itself in lines 14–34 is like Listing [4-2](#475066_1_En_4_Chapter.xhtml#PC3),
    except that in lines 20–22, I call the function `evaluate_expr` using the `sys_connect_by_path`
    expression as argument.


    I could have created a stand-alone or packaged function for this, but I’ve chosen
    to put the function in a `with` clause (a feature available from version 12.1)
    as this ensures the dynamic SQL is *not* called with wrong arguments (think SQL
    injection). I’ll give more examples of this use of PL/SQL in `with` clause in
    the next chapter.


    Inside the `evaluate_expr` function, I simply use the `execute immediate` statement
    in lines 9–11 to build a dynamic SQL statement that evaluates the multiplication
    in the parameter string and returns the numeric result. That gives me an output
    with the correct values in `qty_mult`:


    ```sql

    P_ID  P_NAME         C_ID  C_NAME        QTY_EXPR  QTY_MULT

    531   Pallet of L    502   Bottle 500cl  12*72     864

    532   Pallet of M    501   Bottle 330cl  20*36     720

    533   Pallet Mix MS  501   Bottle 330cl  10*36     360

    533   Pallet Mix MS  502   Bottle 500cl  20*30     600

    534   Pallet Mix SG  502   Bottle 500cl  20*30     600

    534   Pallet Mix SG  501   Bottle 330cl  16*8*3    384

    534   Pallet Mix SG  502   Bottle 500cl  16*8*2    256

    ```


    I have not bothered to group this result by `packaging_id` and `contains_id` like
    in Listing [4-5](#475066_1_En_4_Chapter.xhtml#PC11); I will leave that as an exercise
    to you.


    Note


    Listing [4-6](#475066_1_En_4_Chapter.xhtml#PC13) has a slash in line 34, even
    though line 33 ends with a semicolon. Depending on which client and client version
    you use, this may be necessary for the client to accept that there was PL/SQL
    inside a `with` clause. Newest versions should accept the code without a slash,
    but in the version of `sqlcl` I used, it was needed.


    This last SQL statement wasn’t really recursion, but you might have situations
    where even recursion would be hard put to solve your case and a bit of judicious
    use of PL/SQL makes the solution possible. The thing to remember, however, is
    that it incurs a punishment whenever runtime context is switched from SQL to PL/SQL
    and vice versa, though this punishment can in some circumstances be reduced if
    you put the PL/SQL in a `with` clause as shown here.


    This punishment can be irrelevant if the function is called relatively few times
    compared to the total runtime, but if it is called millions of times, it can be
    significant. The next chapter dives deeper into this dilemma.


    ## Lessons learned


    Hierarchical data is very common, and we all know the classic example of the `scott.emp`
    table. Oracle has traditionally used the `connect by` syntax, which is not known
    in other databases, and it is an easy and usually efficient method. But recursive
    subquery factoring (which is known in other databases as well) can be a lot more
    flexible and solve things that `connect by` cannot. When you have understood the
    examples of this chapter, you know how to


    - Do SQL recursion by querying initial row set *before* the `union all` (equivalent
    of `start with`) and joining recursively *after* the `union all` (equivalent of
    `connect by`).


    - Let calculations use calculated values from the previous level of the recursion
    (rather than only table column values as supported by the `connect by` syntax).


    - Emulate `connect_by_root` by propagating the values of the initial row set down
    through all the levels.


    - Emulate `connect_by_isleaf` with analytic `lead` function.


    It is still a good idea to know the `connect by` syntax, but knowing recursive
    subquery factoring allows you to solve problems that `connect by` cannot do.


    # 5. Functions Defined Within SQL


    One of the beauties of the SQL language in Oracle is that it can so easily be
    extended by writing functions that SQL can call. Typically in PL/SQL, but for
    special cases, it might also be in C or in Java. With the new multilingual engine,
    it’ll be possible in future versions to write stored procedures and functions
    in multiple languages.


    But the thing to note is that SQL and PL/SQL are executed by two different engines,
    each with small differences, for example, how variables, datatypes, and memory
    are handled. Every time SQL calls a PL/SQL function, or vice versa PL/SQL executes
    static or dynamic SQL, data is passed from one engine to the other with some possible
    conversion along the way – this is called a context switch.


    Context switches are very tiny; normally you wouldn’t worry too much about them.
    But if a function is called a thousand times per second from SQL, it all adds
    up and can become a noticeable fraction of the time used. In version 12.1, it
    became possible to minimize this context switch, so it often becomes barely noticeable.


    ## Table with beer alcohol data


    To demonstrate this minimal context switch function in SQL, I will use the `product_alcohol`
    table shown in Figure [5-1](#475066_1_En_5_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_5_Chapter/475066_1_En_5_Fig1_HTML.jpg](images/475066_1_En_5_Chapter/475066_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Table product_alcohol contains data for alcohol calculations for the beers


    In this table is stored for each beer the volume (measured in milliliters) in
    a sales unit (aka a bottle or can) and the ABV (alcohol by volume) percent. In
    Listing [5-1](#475066_1_En_5_Chapter.xhtml#PC1), I’ll show the data for the beers
    in product group 142, which are the Stouts (relatively strong and very dark beers).


    ```sql

    SQL> select

    2     p.id as p_id

    3   , p.name

    4   , pa.sales_volume as vol

    5   , pa.abv

    6  from products p

    7  join product_alcohol pa

    8     on pa.product_id = p.id

    9  where p.group_id = 142

    10  order by p.id;

    Listing 5-1

    The alcohol data for the beers in the Stout product group

    ```


    Reindeer Fuel is in a half-liter bottle (500 milliliter) but only 6% alcohol;
    the other two are in the standard 0.33-liter bottles but stronger:


    ```sql

    P_ID  NAME              VOL  ABV

    4040  Coalminers Sweat  330  8.5

    4160  Reindeer Fuel     500  6

    4280  Hoppy Crude Oil   330  7

    ```


    This data can be used to find out how much pure alcohol one bottle of beer contains,
    which is needed to find out how much the blood alcohol concentration (BAC) will
    be increased by drinking one such bottle.'
  raw: '### Dynamic SQL in PL/SQL function


    You recall in Listing [4-2](#475066_1_En_4_Chapter.xhtml#PC3) I used `sys_connect_by_path`
    to build an expression of the multiplication to take place, like `16*8*3`. Wouldn’t
    it be nice simply to evaluate this expression? Well, in Listing [4-6](#475066_1_En_4_Chapter.xhtml#PC13)
    I do just that.


    ```

    SQL> with

    2     function evaluate_expr(

    3        p_expr varchar2

    4     )

    5        return number

    6     is

    7        l_retval number;

    8     begin

    9        execute immediate

    10           ''select '' || p_expr || '' from dual''

    11           into l_retval;

    12        return l_retval;

    13     end;

    14  select

    15     connect_by_root p.id as p_id

    16   , connect_by_root p.name as p_name

    17   , c.id as c_id

    18   , c.name as c_name

    19   , ltrim(sys_connect_by_path(pr.qty, ''*''), ''*'') as qty_expr

    20   , evaluate_expr(

    21        ltrim(sys_connect_by_path(pr.qty, ''*''), ''*'')

    22     ) as qty_mult

    23  from packaging_relations pr

    24  join packaging p

    25     on p.id = pr.packaging_id

    26  join packaging c

    27     on c.id = pr.contains_id

    28  where connect_by_isleaf = 1

    29  start with pr.packaging_id not in (

    30     select c.contains_id from packaging_relations c

    31  )

    32  connect by pr.packaging_id = prior pr.contains_id

    33  order siblings by pr.contains_id;

    34  /

    Listing 4-6

    Alternative method using dynamic evaluation function

    ```


    The query itself in lines 14–34 is like Listing [4-2](#475066_1_En_4_Chapter.xhtml#PC3),
    except that in lines 20–22, I call the function `evaluate_expr` using the `sys_connect_by_path`
    expression as argument.


    I could have created a stand-alone or packaged function for this, but I’ve chosen
    to put the function in a `with` clause (a feature available from version 12.1)
    as this ensures the dynamic SQL is *not* called with wrong arguments (think SQL
    injection). I’ll give more examples of this use of PL/SQL in `with` clause in
    the next chapter.


    Inside the `evaluate_expr` function, I simply use the `execute immediate` statement
    in lines 9–11 to build a dynamic SQL statement that evaluates the multiplication
    in the parameter string and returns the numeric result. That gives me an output
    with the correct values in `qty_mult`:


    ```

    P_ID  P_NAME         C_ID  C_NAME        QTY_EXPR  QTY_MULT

    531   Pallet of L    502   Bottle 500cl  12*72     864

    532   Pallet of M    501   Bottle 330cl  20*36     720

    533   Pallet Mix MS  501   Bottle 330cl  10*36     360

    533   Pallet Mix MS  502   Bottle 500cl  20*30     600

    534   Pallet Mix SG  502   Bottle 500cl  20*30     600

    534   Pallet Mix SG  501   Bottle 330cl  16*8*3    384

    534   Pallet Mix SG  502   Bottle 500cl  16*8*2    256

    ```


    I have not bothered to group this result by `packaging_id` and `contains_id` like
    in Listing [4-5](#475066_1_En_4_Chapter.xhtml#PC11); I will leave that as an exercise
    to you.


    Note


    Listing [4-6](#475066_1_En_4_Chapter.xhtml#PC13) has a slash in line 34, even
    though line 33 ends with a semicolon. Depending on which client and client version
    you use, this may be necessary for the client to accept that there was PL/SQL
    inside a `with` clause. Newest versions should accept the code without a slash,
    but in the version of `sqlcl` I used, it was needed.


    This last SQL statement wasn’t really recursion, but you might have situations
    where even recursion would be hard put to solve your case and a bit of judicious
    use of PL/SQL makes the solution possible. The thing to remember, however, is
    that it incurs a punishment whenever runtime context is switched from SQL to PL/SQL
    and vice versa, though this punishment can in some circumstances be reduced if
    you put the PL/SQL in a `with` clause as shown here.


    This punishment can be irrelevant if the function is called relatively few times
    compared to the total runtime, but if it is called millions of times, it can be
    significant. The next chapter dives deeper into this dilemma.


    ## Lessons learned


    Hierarchical data is very common, and we all know the classic example of the `scott.emp`
    table. Oracle has traditionally used the `connect by` syntax, which is not known
    in other databases, and it is an easy and usually efficient method. But recursive
    subquery factoring (which is known in other databases as well) can be a lot more
    flexible and solve things that `connect by` cannot. When you have understood the
    examples of this chapter, you know how to


    *   Do SQL recursion by querying initial row set *before* the `union all` (equivalent
    of `start with`) and joining recursively *after* the `union all` (equivalent of
    `connect by`).


    *   Let calculations use calculated values from the previous level of the recursion
    (rather than only table column values as supported by the `connect by` syntax).


    *   Emulate `connect_by_root` by propagating the values of the initial row set
    down through all the levels.


    *   Emulate `connect_by_isleaf` with analytic `lead` function.


    It is still a good idea to know the `connect by` syntax, but knowing recursive
    subquery factoring allows you to solve problems that `connect by` cannot do.


    # 5. Functions Defined Within SQL


    One of the beauties of the SQL language in Oracle is that it can so easily be
    extended by writing functions that SQL can call. Typically in PL/SQL, but for
    special cases, it might also be in C or in Java. With the new multilingual engine,
    it’ll be possible in future versions to write stored procedures and functions
    in multiple languages.


    But the thing to note is that SQL and PL/SQL are executed by two different engines,
    each with small differences, for example, how variables, datatypes, and memory
    are handled. Every time SQL calls a PL/SQL function, or vice versa PL/SQL executes
    static or dynamic SQL, data is passed from one engine to the other with some possible
    conversion along the way – this is called a context switch.


    Context switches are very tiny; normally you wouldn’t worry too much about them.
    But if a function is called a thousand times per second from SQL, it all adds
    up and can become a noticeable fraction of the time used. In version 12.1, it
    became possible to minimize this context switch, so it often becomes barely noticeable.


    ## Table with beer alcohol data


    To demonstrate this minimal context switch function in SQL, I will use the `product_alcohol`
    table shown in Figure [5-1](#475066_1_En_5_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_5_Chapter/475066_1_En_5_Fig1_HTML.jpg](images/475066_1_En_5_Chapter/475066_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Table product_alcohol contains data for alcohol calculations for the beers


    In this table is stored for each beer the volume (measured in milliliters) in
    a sales unit (aka a bottle or can) and the ABV (alcohol by volume) percent. In
    Listing [5-1](#475066_1_En_5_Chapter.xhtml#PC1), I’ll show the data for the beers
    in product group 142, which are the Stouts (relatively strong and very dark beers).


    ```

    SQL> select

    2     p.id as p_id

    3   , p.name

    4   , pa.sales_volume as vol

    5   , pa.abv

    6  from products p

    7  join product_alcohol pa

    8     on pa.product_id = p.id

    9  where p.group_id = 142

    10  order by p.id;

    Listing 5-1

    The alcohol data for the beers in the Stout product group

    ```


    Reindeer Fuel is in a half-liter bottle (500 milliliter) but only 6% alcohol;
    the other two are in the standard 0.33-liter bottles but stronger:


    ```

    P_ID  NAME              VOL  ABV

    4040  Coalminers Sweat  330  8.5

    4160  Reindeer Fuel     500  6

    4280  Hoppy Crude Oil   330  7

    ```


    This data can be used to find out how much pure alcohol one bottle of beer contains,
    which is needed to find out how much the blood alcohol concentration (BAC) will
    be increased by drinking one such bottle.'
  trans: '### PL/SQL 函数中的动态 SQL


    回想一下，在清单 4-2 中，我使用了 `sys_connect_by_path` 来构建一个需要执行的乘法表达式，例如 `16*8*3`。如果能直接计算这个表达式岂不是很好？那么，在清单
    4-6 中，我正是这样做的。


    ```sql

    SQL> with

    2     function evaluate_expr(

    3        p_expr varchar2

    4     )

    5        return number

    6     is

    7        l_retval number;

    8     begin

    9        execute immediate

    10           ''select '' || p_expr || '' from dual''

    11           into l_retval;

    12        return l_retval;

    13     end;

    14  select

    15     connect_by_root p.id as p_id

    16   , connect_by_root p.name as p_name

    17   , c.id as c_id

    18   , c.name as c_name

    19   , ltrim(sys_connect_by_path(pr.qty, ''*''), ''*'') as qty_expr

    20   , evaluate_expr(

    21        ltrim(sys_connect_by_path(pr.qty, ''*''), ''*'')

    22     ) as qty_mult

    23  from packaging_relations pr

    24  join packaging p

    25     on p.id = pr.packaging_id

    26  join packaging c

    27     on c.id = pr.contains_id

    28  where connect_by_isleaf = 1

    29  start with pr.packaging_id not in (

    30     select c.contains_id from packaging_relations c

    31  )

    32  connect by pr.packaging_id = prior pr.contains_id

    33  order siblings by pr.contains_id;

    34  /

    清单 4-6

    使用动态求值函数的替代方法

    ```


    第 14–34 行中的查询本身与清单 4-2 类似，不同之处在于第 20–22 行，我调用了函数 `evaluate_expr`，并将 `sys_connect_by_path`
    表达式作为参数传入。


    我本可以为此创建一个独立或打包的函数，但我选择将这个函数放在 `with` 子句中（这是从 12.1 版本开始可用的功能），因为这样可以确保动态 SQL 不会使用错误的参数被调用（考虑到
    SQL 注入问题）。在下一章中，我将给出更多关于在 `with` 子句中使用 PL/SQL 的例子。


    在 `evaluate_expr` 函数内部，我只是简单地在第 9–11 行使用 `execute immediate` 语句来构建一个动态 SQL 语句，该语句计算参数字符串中的乘法并返回数值结果。这让我在
    `qty_mult` 列中得到了正确的输出值：


    ```sql

    P_ID  P_NAME         C_ID  C_NAME        QTY_EXPR  QTY_MULT

    531   Pallet of L    502   Bottle 500cl  12*72     864

    532   Pallet of M    501   Bottle 330cl  20*36     720

    533   Pallet Mix MS  501   Bottle 330cl  10*36     360

    533   Pallet Mix MS  502   Bottle 500cl  20*30     600

    534   Pallet Mix SG  502   Bottle 500cl  20*30     600

    534   Pallet Mix SG  501   Bottle 330cl  16*8*3    384

    534   Pallet Mix SG  502   Bottle 500cl  16*8*2    256

    ```


    我没有像清单 4-5 那样对这个结果按 `packaging_id` 和 `contains_id` 进行分组；我将这个任务留给你作为练习。


    注意


    清单 4-6 在第 34 行有一个斜杠（/），尽管第 33 行以分号结尾。根据你使用的客户端及其版本，这可能是客户端能够接受 `with` 子句中存在 PL/SQL
    所必需的。最新版本的客户端应该可以接受没有斜杠的代码，但在我们使用的 `sqlcl` 版本中，这是必需的。


    上面最后这条 SQL 语句并不是真正的递归，但在某些情况下，即使递归也可能难以解决你的问题，而明智地使用 PL/SQL 可以使解决方案成为可能。然而，需要记住的是，每当运行时上下文从
    SQL 切换到 PL/SQL，或者反之，都会带来一定的开销（惩罚），尽管在某些情况下，如果像这里展示的那样将 PL/SQL 放在 `with` 子句中，这种开销可以减少。


    如果与总运行时间相比，函数调用的次数相对较少，这种开销可能无关紧要。但如果函数被调用数百万次，这种开销就可能变得非常显著。下一章将更深入地探讨这个难题。


    ## 经验教训


    层次数据非常常见，我们都知道经典的 `scott.emp` 表例子。Oracle 传统上使用 `connect by` 语法，这种语法在其他数据库中并不为人所知，它是一种简单且通常高效的方法。但递归子查询因子（在其他数据库中也为人所知）则灵活得多，能够解决
    `connect by` 无法解决的问题。当你理解了本章的示例，你就会知道如何做到：


    -   通过在 `union all` *之前*查询初始行集（相当于 `start with`）并在 `union all` *之后*递归连接（相当于 `connect
    by`）来实现 SQL 递归。

    -   让计算使用递归中上一层计算出的值（而不是像 `connect by` 语法那样只支持表列值）。

    -   通过将初始行集的值向下传播到所有层级来模拟 `connect_by_root`。

    -   使用分析函数 `lead` 来模拟 `connect_by_isleaf`。


    了解 `connect by` 语法仍然是个好主意，但掌握递归子查询因子使你能够解决 `connect by` 无法完成的问题。


    # 5. 在 SQL 中定义的函数


    Oracle SQL 语言的一个美妙之处在于，通过编写 SQL 可以调用的函数，它可以非常容易地被扩展。通常是用 PL/SQL，但对于特殊情况，也可能用 C
    或 Java。随着新的多语言引擎的出现，在未来的版本中，用多种语言编写存储过程和函数将成为可能。


    但需要注意的是，SQL 和 PL/SQL 由两个不同的引擎执行，每个引擎都有细微的差别，例如变量、数据类型和内存的处理方式。每次 SQL 调用 PL/SQL
    函数，或者反过来，PL/SQL 执行静态或动态 SQL 时，数据都会从一个引擎传递到另一个引擎，期间可能进行一些转换——这被称为上下文切换。


    上下文切换非常微小；通常你不必太担心它们。但是，如果一个函数每秒被 SQL 调用一千次，累积起来就会变得相当可观，成为总耗时中一个显著的比例。在 12.1
    版本中，可以最小化这种上下文切换，因此它通常变得几乎难以察觉。


    ## 包含啤酒酒精数据的表格


    为了演示 SQL 中这种最小化上下文切换的功能，我将使用图 5-1 所示的 `product_alcohol` 表。


    ![../images/475066_1_En_5_Chapter/475066_1_En_5_Fig1_HTML.jpg](img/475066_1_En_5_Fig1_HTML.jpg)


    图 5-1

    表 product_alcohol 包含啤酒的酒精计算数据


    此表存储了每种啤酒在销售单位（即一瓶或一罐）中的体积（以毫升为单位）和酒精度（ABV，体积百分比）。在清单 5-1 中，我将展示产品组 142（即世涛啤酒——相对较烈且颜色非常深的啤酒）的数据。


    ```sql

    SQL> select

    2     p.id as p_id

    3   , p.name

    4   , pa.sales_volume as vol

    5   , pa.abv

    6  from products p

    7  join product_alcohol pa

    8     on pa.product_id = p.id

    9  where p.group_id = 142

    10  order by p.id;

    清单 5-1

    世涛产品组中啤酒的酒精数据

    ```


    驯鹿燃料（Reindeer Fuel）是半升瓶装（500 毫升），但酒精度只有 6%；另外两种是标准的 0.33 升瓶装，但更烈：


    ```sql

    P_ID  NAME              VOL  ABV

    4040  Coalminers Sweat  330  8.5

    4160  Reindeer Fuel     500  6

    4280  Hoppy Crude Oil   330  7

    ```


    这些数据可用于计算一瓶啤酒中含有多少纯酒精，这对于了解饮用一瓶这样的啤酒会使血液酒精浓度升高多少是必需的。'
- fmt: '# Blood alcohol concentration


    The Good Beer Trading Co must follow a health regulative where each beer must
    have an indication of how high a concentration of alcohol in your blood that drinking
    the beer will cause. As this is different for males and females and depends on
    body weight too, it must be shown both for a male weighing 80 kilograms and a
    female weighing 60 kilograms.


    The BAC (blood alcohol concentration) must be calculated as gram alcohol per milliliter
    body fluid, measured in percent. Meaning that a BAC of 0.04 shows that 0.04% of
    the liquid in your body is grams of alcohol. It can be calculated using the Widmark
    formula.


    ## Widmark formula


    Milliliters of drink * ABV/100 = Milliliters alcohol. Milliliters alcohol * 0.789
    (specific gravity of alcohol) = Grams alcohol. Body weight * 1000 * Gender liquid
    ratio = Milliliter fluid in body. (Males are 68% liquids, females 55% liquids.)
    100 * Grams alcohol / Milliliter body fluid = BAC.


    Putting the Widmark formula into SQL, I can calculate the desired BAC values in
    Listing [5-2](#475066_1_En_5_Chapter.xhtml#PC3).


    ```sql

    SQL> select

    2     p.id as p_id

    3   , p.name

    4   , pa.sales_volume as vol

    5   , pa.abv

    6   , round(

    7        100 * (pa.sales_volume * pa.abv / 100 * 0.789)

    8         / (80 * 1000 * 0.68)

    9      , 3

    10     ) bac_m

    11   , round(

    12        100 * (pa.sales_volume * pa.abv / 100 * 0.789)

    13         / (60 * 1000 * 0.55)

    14      , 3

    15     ) bac_f

    16  from products p

    17  join product_alcohol pa

    18     on pa.product_id = p.id

    19  where p.group_id = 142

    20  order by p.id;

    Listing 5-2

    Calculating blood alcohol concentration for male and female

    ```


    Lines 6–10 calculate the BAC of an 80 kg heavy male, while lines 11–15 do the
    same for a 60 kg female. The male has more liquid (both because of his gender
    and his larger weight), so the alcohol is diluted more in his body, and he has
    a lower BAC.


    These two calculations give the columns `bac_m` and `bac_f`, which are the two
    figures Good Beer Trading Co needs to show on the beer labels and packaging:


    ```

    P_ID  NAME              VOL  ABV  BAC_M  BAC_F

    4040  Coalminers Sweat  330  8.5  0.041  0.067

    4160  Reindeer Fuel     500  6    0.044  0.072

    4280  Hoppy Crude Oil   330  7    0.034  0.055

    ```


    You can see that if, for example, your country is one of the many that have a
    legal limit for driving of 0.05% BAC (some countries prefer showing it as per
    mille instead of percent, so it is 0.5‰ in those countries), all of the beers
    would cause a 60 kg female to get a ticket for drunk driving if she drove a car
    after drinking just a single bottle of these strong beers, while an 80 kg male
    would be below the limit.


    **Note**


    This is example data to illustrate a formula encoded in SQL. Actual BAC will vary
    depending upon more detailed factors in individual bodies and metabolisms, so
    this should not be used as basis for judging whether you can legally drive a car
    after drinking a couple beers or not. Use these formulas only as examples for
    learning SQL – I do not take responsibility for any tickets, and I urge you to
    drink responsibly.


    Anyway, as a developer, you obviously see here that I should take that formula
    and put it in a function rather than repeat the same code with slightly different
    numbers twice in this query.


    ## Function with PRAGMA UDF


    So at first in Listing [5-3](#475066_1_En_5_Chapter.xhtml#PC5), I’ll create a
    regular (well, almost regular) PL/SQL function for the Widmark formula for BAC
    calculation. Not that it matters for this demonstration, but I’ll follow a best
    practice of putting the function in a package rather than a stand-alone function,
    so I’ve decided to have a package `formulas` for such functions.


    ```sql

    SQL> create or replace package formulas

    2  is

    3     function bac (

    4        p_volume in number

    5      , p_abv    in number

    6      , p_weight in number

    7      , p_gender in varchar2

    8     ) return number deterministic;

    9  end formulas;

    10  /

    Package FORMULAS compiled

    SQL> create or replace package body formulas

    2  is

    3     function bac (

    4        p_volume in number

    5      , p_abv    in number

    6      , p_weight in number

    7      , p_gender in varchar2

    8     ) return number deterministic

    9     is

    10        PRAGMA UDF;

    11     begin

    12        return round(

    13           100 * (p_volume * p_abv / 100 * 0.789)

    14            / (p_weight * 1000 * case p_gender

    15                                    when ''M'' then 0.68

    16                                    when ''F'' then 0.55

    17                                 end)

    18         , 3

    19        );

    20     end bac;

    21  end formulas;

    22  /

    Package Body FORMULAS compiled

    Listing 5-3

    Creating a formula package with a bac function

    ```


    All are pretty straightforward, except line 10 in the body. The `UDF pragma` (user-defined
    function) is available since version 12.1 and tells the compiler that I intend
    to *primarily* call this function from SQL, rather than call it from PL/SQL.


    If I had created the function *without* `PRAGMA UDF`, it would compile in the
    normal way, leading to normal context switching when the function is called. When
    it is compiled *with* `PRAGMA UDF`, it is compiled in a different manner, which
    potentially can reduce the overhead of the context switching. How much (if any)
    overhead reduction there might be is out of my control as a developer. I’ll explain
    more shortly, but first let me show the use of the function.


    Using the function is just the same as I would do with a normal function, so in
    Listing [5-4](#475066_1_En_5_Chapter.xhtml#PC6), I query the BAC using calls to
