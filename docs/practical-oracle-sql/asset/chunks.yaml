    ```


    第 17-27 行与清单 3-1 相同。但我想测试这个查询在表的内容是其他情况下的输出。


    我不创建测试表并在查询中搜索替换以使用测试表的名称，而是在第 1-15 行使用 `with` 子句创建一个命名子查询，我给它起了与 `product_alcohol`
    表*相同的名称*。我在第 2 行提供了一个列名列表，然后我在第 5-14 行简单地重复从 `dual` 中 `select` 常量值。这样可读性更高，*无需*在数据列表中充斥大量列别名，如下所示：


    ```sql

    ...

    4     /* 模拟表 product_alcohol */

    5     select 4040 as product_id, 330 as sales_volume, 4.5 as abv from dual union
    all

    6     select 4160 as product_id, 500 as sales_volume, 7.0 as abv from dual union
    all

    ...

    ```


    通过这种方式，我可以轻松地使用测试数据获得查询的输出，而无需更改查询本身的表名：


    ```

    P_ID  PRODUCT_NAME      ABV  ALC_CLASS

    5310  Monks and Nuns    4    1

    4040  Coalminers Sweat  4.5  1

    7790  Summer in India   4.5  1

    6600  Hazy Pink Cloud   5    1

    7950  Pale Rider Rides  6    1

    6520  Der Helle Kumpel  6.5  2

    7870  Ghost of Hops     6.5  2

    4160  Reindeer Fuel     7    2

    4280  Hoppy Crude Oil   8    2

    5430  Hercule Trippel   8.5  2

    ```


    这种在 `with` 子句中包含测试数据的方法在你在互联网论坛上提问时也非常方便。如果帮助你的人可以直接执行包含数据等所有内容的查询，而无需创建表、填充数据*然后*尝试你的查询，这会让事情变得容易得多。当然，这并非适用于所有情况，但在很多时候都很好用。


    ## 经验教训


    `with` 子句还能做很多其他事情，我将在后面的章节中介绍其中的大部分。本章重点介绍如何使用它来模块化 SQL 语句，以便你可以：


    *   分而治之，将 SQL 拆分成更易于整体把握的片段。

    *   将每个命名子查询的代码视为一个单元，而不是使用嵌套的内联视图。

    *   在你的语句中多次从一个命名子查询中选择，可能临时物化结果，而不是多次查询基表。

    *   提供一个列名列表作为列别名的替代方案，特别是当使用 `dual` 生成测试数据时，以避免代码过度混乱。


    在学习过程式代码时，我们都被告知模块化是降低复杂性风险的关键——在 SQL 中也是如此。`with` 子句确实是本地模块化 SQL 语句的一个*非常*好的工具，适用于那些比简单的双表连接稍微复杂一些的语句。

    '
- fmt: '# 4. Tree Calculations with Recursion


    Any procedural language I can think of supports some form of recursion. A procedure
    or function can call itself – if needed repeatedly until some condition has been
    reached. Typically they’ll also support iteration, which is related but not quite
    the same.


    SQL deals with sets of rows, not procedural logic, so how can you do recursion
    in SQL? It still concerns itself with sets of rows: first find a set of rows;
    then based on that set of rows, you apply some logic to find a second set of rows;
    then based on *that* set of rows, you apply the logic *again* (recursively) to
    find a third set of rows; and so you keep on going until you find no more rows.


    The typical use case for such recursion in SQL is hierarchical data. You find
    the top-level nodes of the tree, then find the child nodes of those, then the
    grandchild nodes, and so on. Each search for the next level down in the tree is
    recursively applying a lookup of children based on the rows of the previous level.


    In this chapter I primarily focus on SQL recursion in the form of `recursive subquery
    factoring` that is the most directly applicable method of recursion in SQL. (You
    can do iterations with the `model` clause – I give examples of this in Chapters
    [6](#475066_1_En_6_Chapter.xhtml) and [16](#475066_1_En_16_Chapter.xhtml). Chapter
    [16](#475066_1_En_16_Chapter.xhtml) also gives an example of recursive subquery
    factoring used in a nonhierarchical manner.)


    Here I will show the use of recursion on hierarchical data.


    ## Bottles in boxes on pallets


    The Good Beer Trading Co has beers in various sized bottles that are packed in
    various sized boxes, which might be in larger boxes, which are stacked on pallets.
    The definitions of those different types of product packaging and relations between
    them are stored in the tables in Figure [4-1](#475066_1_En_4_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_4_Chapter/475066_1_En_4_Fig1_HTML.jpg](images/475066_1_En_4_Chapter/475066_1_En_4_Fig1_HTML.jpg)


    Figure 4-1: Tables of packaging and how much is in each packaging type


    The `packaging` table contains the different types and sizes of bottles, boxes,
    and pallets. These are related to each other in the `packaging_relations` table,
    which shows how many of each type of packaging are stored within another type
    of packaging. Listing [4-1](#475066_1_En_4_Chapter.xhtml#PC1) shows the content
    of these tables in a hierarchical tree.


    ### Listing 4-1

    The hierarchical relations of the different packaging types


    ```sql

    SQL> select

    2     p.id as p_id

    3   , lpad('' '', 2*(level-1)) || p.name as p_name

    4   , c.id as c_id

    5   , c.name as c_name

    6   , pr.qty

    7  from packaging_relations pr

    8  join packaging p

    9     on p.id = pr.packaging_id

    10  join packaging c

    11     on c.id = pr.contains_id

    12  start with pr.packaging_id not in (

    13     select c.contains_id from packaging_relations c

    14  )

    15  connect by pr.packaging_id = prior pr.contains_id

    16  order siblings by pr.contains_id;

    ```


    In `start with` in lines 12–14, I start at the top-level pallets, because any
    packaging that exists as `contains_id` in `packaging_relations` is by definition
    not at the top level. The hierarchy is then traversed by the `connect by` in line
    15.


    In the output, you can see that pallet types are defined depending on which box
    (or mix of boxes) is stacked on the pallets:


    ```

    P_ID  P_NAME           C_ID  C_NAME        QTY

    531   Pallet of L      521   Box Large     12

    521     Box Large      502   Bottle 500cl  72

    532   Pallet of M      522   Box Medium    20

    522     Box Medium     501   Bottle 330cl  36

    533   Pallet Mix MS    522   Box Medium    10

    522     Box Medium     501   Bottle 330cl  36

    533   Pallet Mix MS    523   Box Small     20

    523     Box Small      502   Bottle 500cl  30

    534   Pallet Mix SG    523   Box Small     20

    523     Box Small      502   Bottle 500cl  30

    534   Pallet Mix SG    524   Gift Box      16

    524     Gift Box       511   Gift Carton   8

    511       Gift Carton  501   Bottle 330cl  3

    511       Gift Carton  502   Bottle 500cl  2

    ```


    You can see that a *Pallet of L* contains 12 *Box Large*, which in turn contains
    72 *Bottle 500cl* per box.


    On the other hand, a *Pallet Mix SG* contains 20 *Box Small*, which in turn contains
    30 *Bottle 500cl*, and the pallet also contains 16 *Gift Box*, which contains
    8 *Gift Carton* per box, which in turn contains 3 *Bottle 330cl* and 2 *Bottle
    500cl* per carton.


    From this hierarchy, the goal is for each top-level packaging (the pallets) to
    find out how many it contains of each lowest-level packaging (the bottles). For
    *Pallet Mix SG*, I want to know that it contains 20*30+16*8*2 = 856 *Bottle 500cl*
    plus 16*8*3 = 384 *Bottle 330cl*.


    In other words, I need to traverse the branches of the tree and multiply the quantities
    of each branch.'
