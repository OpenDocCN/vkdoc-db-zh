    `清单 1-6`

    替代语法 `cross apply`


    输出与之前的列表一样，与`清单 1-2`相同，但这次我既没有使用`lateral`也没有使用`join`，而是使用了第 8 行的关键字`cross apply`。这意味着对于`brewery_products`中的每一行，内联视图都将被*应用*。当我使用`apply`时，我被允许在第
    13 行的谓词中关联内联视图，就像使用`lateral`一样。在底层，数据库所做的与`lateral`内联视图完全相同；这只是你偏好哪种语法的问题。


    关键字`cross`将其与变体`outer apply`区分开来，我稍后会展示。这里的`cross`可以理解为我在前面讨论过的“分区笛卡尔积”。


    > **注意**

    > 你不仅可以将`cross apply`和`outer apply`用于内联视图，还可以用于以关联方式调用*表函数*（管道化或非管道化）。如果使用`lateral`，这将需要更长的语法。你可能不会经常看到它用于表函数，因为
