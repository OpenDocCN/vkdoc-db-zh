  trans: '

    ### 自己动手实现逆透视


    但还有一种不使用 `unpivot` 子句来逆透视的方法。在版本 10 之前，你必须手动完成，我将展示几个手动逆透视的版本。了解它会很有帮助，这样如果你在旧代码中看到它，就能明白其中发生了什么。而且在极少数情况下，你可能有些复杂的情况不太适合
    `unpivot` 子句，用这种方式实现反而更容易。


    两种版本的基本思路是：我需要生成与维度值数量一样多的行。使用 `unpivot` 子句时，这些行会根据 `in` 列表中的表达式数量自动生成——在清单 7-3
    中，我使用 `select from dual` 手动生成了三行。


    ```

    SQL> select

    2     wd.day

    3   , case r.rn

    4        when 1 then ''PC''

    5        when 2 then ''Tablet''

    6        when 3 then ''Phone''

    7     end as device

    8   , case r.rn

    9        when 1 then wd.pc

    10        when 2 then wd.tablet

    11        when 3 then wd.phone

    12     end as cnt

    13  from web_devices wd

    14  cross join (

    15     select level as rn from dual connect by level <= 3

    16  ) r

    17  order by day, device;

    清单 7-3

    使用编号行生成器进行手动逆透视

    ```


    在内联视图 `r` 中，我在第 15 行生成了编号为 1、2、3 的三行。利用这些行，我与 `web_devices` 表进行了笛卡尔积连接（第 14 行），因此对于
    `web_devices` 中的每一行，输出中都会得到三行。


    然后，我使用两个 `case` 结构来处理我的维度和度量：


    *   第 3-7 行将维度 `device` 的字面值分别放入第一、第二和第三个生成的行中。

    *   第 8-12 行将来自 `pc`、`tablet` 和 `phone` 列的计数值放入度量 `cnt` 的相同行中。


    这使得清单 7-3 产生的输出与清单 7-2 完全相同，只是通过手动逆透视实现。


    清单 7-4 是另一种手动逆透视方法，也能产生相同的输出。


    ```

    SQL> with devices( device ) as (

    2     select ''PC''     from dual union all

    3     select ''Tablet'' from dual union all

    4     select ''Phone''  from dual

    5  )

    6  select

    7     wd.day

    8   , d.device

    9   , case d.device

    10        when ''PC''     then wd.pc

    11        when ''Tablet'' then wd.tablet

    12        when ''Phone''  then wd.phone

    13     end as cnt

    14  from web_devices wd

    15  cross join devices d

    16  order by day, device;

    清单 7-4

    使用维度样式行生成器进行手动逆透视

    ```


    清单 7-3 使用 `case` 结构来定义在第 1 行、第 2 行和第 3 行放入什么数据，而清单 7-4 则生成已经包含维度所需值的三行。这里我选择将生成器放在第
    1-5 行的 `with` 子句中，而不是内联视图，但效果是一样的。


    我同样在 15 行与生成的行进行了笛卡尔积连接，但现在我不再需要两个 `case` 结构了。对于维度值，我可以在第 8 行直接使用生成行中的列，这样在 9-13
    行只需要一个 `case` 结构来处理我的度量。这里的区别在于，我不是使用“第 1 行、第 2 行、第 3 行”，而是使用维度的值。


    使用 `with` 子句也很好地说明了 `devices` 本可以是一个真实的表，而不是 `with` 子句中生成的行——那么查询将只由第 6-16 行组成。但请注意，这不会是一个*动态*的逆透视——即使维度值来自表，我仍然需要将这些值硬编码到
    `case` 结构中。它*可以*是动态的，但这需要动态 SQL。我将在本章后面展示一个这样的例子。


    ### 多个维度和/或多个度量


    前面的例子使用了具有单个维度和单个度量的 `web_devices` 表；现在我将展示如何处理多个维度和度量。你在本章开头看到了 `web_demographics`
    表的图表；清单 7-5 展示了其内容。


    ```

    SQL> select

    2     day

    3   , m_tw_cnt

    4   , m_tw_qty

    5   , m_fb_cnt

    6   , m_fb_qty

    7   , f_tw_cnt

    8   , f_tw_qty

    9   , f_fb_cnt

    10   , f_fb_qty

    11  from web_demographics

    12  order by day;

    清单 7-5

    按性别和渠道划分的每日网站访问量和购买量

    ```


    展示所有这些列格式不太美观，但你可以看到八列，它们都是两个度量（`cnt` 和 `qty`）对于维度 `gender` 的两个值（`m` 和 `f`）以及维度
    `channel` 的两个值（`tw` 和 `fb`）的所有组合：


    ```

    DAY         M_TW_CNT  M_TW_QTY  M_FB_CNT  M_FB_QTY  F_TW_CNT  F_TW_QTY  F_FB_CNT  F_FB_QTY

    2019-05-01  1232      86        1017      64        651       76        564       68

    2019-05-02  1438      142       1198      70        840       92        752       78

    ```


    使用 `unpivot` 处理多个维度和/或多个度量的语法与清单 7-2 中单个维度/度量的做法几乎完全相同——除了需要使用*表达式列表*而不是单个表达式，如清单
    7-6 所示。


    ```

    SQL> select day, gender, channel, cnt, qty

    2  from web_demographics

    3  unpivot (

    4     ( cnt, qty )

    5     for ( gender, channel )

    6     in (

    7        (m_tw_cnt, m_tw_qty) as (''Male''  , ''Twitter'' )

    8      , (m_fb_cnt, m_fb_qty) as (''Male''  , ''Facebook'')

    9      , (f_tw_cnt, f_tw_qty) as (''Female'', ''Twitter'' )

    10      , (f_fb_cnt, f_fb_qty) as (''Female'', ''Facebook'')

    11     )

    12  )

    13  order by day, gender, channel;

    清单 7-6

    使用 unpivot 处理两个维度和两个度量

    ```


    表达式列表是括号内用逗号分隔的表达式列表——括号是识别表达式列表所必需的，而不仅仅是为了提高可读性。在代码中，我在多个地方使用了表达式列表：


    *   在第 4 行，表达式列表定义了*两个*度量 `cnt` 和 `qty`——和之前一样，它们是要创建的列，而不是表中的列。

    *   第 5 行的表达式列表以类似方式定义了两个维度。

    *   第 7-10 行中的每个映射则使用了两个各包含两列的表达式列表——左侧是一个包含表中两列的表达式列表，右侧是一个包含两个字面量的表达式列表。


    所有这些导致每个输入行产生四个输出行——因为 `in` 子句中有四个映射：


    ```

    DAY         GENDER  CHANNEL   CNT   QTY

    2019-05-01  Female  Facebook  564   68

    2019-05-01  Female  Twitter   651   76

    2019-05-01  Male    Facebook  1017  64

    2019-05-01  Male    Twitter   1232  86

    2019-05-02  Female  Facebook  752   78

    2019-05-02  Female  Twitter   840   92

    2019-05-02  Male    Facebook  1198  70

    2019-05-02  Male    Twitter   1438  142

    ```


    在图 7-3 中，我展示了流程仍然相同——就像图 7-2 一样——以及表达式列表是如何对应的。`as` 关键字左侧的表列值流向度量，`as` 关键字右侧的字面量流向维度。


    ![../images/475066_1_En_7_Chapter/475066_1_En_7_Fig3_HTML.jpg](img/475066_1_En_7_Fig3_HTML.jpg)


    图 7-3

    多个维度和度量值的流向


    观察图表也可以清楚地看到，包含表列（左侧）的表达式列表必须与定义度量的表达式列表具有相同数量的列。同样，包含字面量（右侧）的表达式列表必须与定义维度的表达式列表具有相同数量的字面量。

    '
- fmt: '# 维度与度量的组合


    但维度的数量不一定需要与度量的数量相等——你可以拥有许多维度和很少或一个度量，反之亦然。我将为你展示一些这方面的例子。


    ## 单维度多度量


    第一个例子是列表 [7-7](#475066_1_En_7_Chapter.xhtml#PC10)，其中展示了使用单个维度和两个度量。


    ```sql

    SQL> select day, gender_and_channel, cnt, qty

    2  from web_demographics

    3  unpivot (

    4     ( cnt, qty )

    5     for gender_and_channel

    6     in (

    7        (m_tw_cnt, m_tw_qty) as ''Male on Twitter''

    8      , (m_fb_cnt, m_fb_qty) as ''Male on Facebook''

    9      , (f_tw_cnt, f_tw_qty) as ''Female on Twitter''

    10     , (f_fb_cnt, f_fb_qty) as ''Female on Facebook''

    11     )

    12  )

    13  order by day, gender_and_channel;

    Listing 7-7

    Using unpivot with one composite dimension and two measures

    ```


    第4行的度量表达式列表与第7-10行的左侧表列表达式列表相匹配。然后第5行只定义了一个维度（因此没有括号），相应地，第7-10行右侧的字面量也只是单个字面量。


    这样，我得到一个包含单个维度列 `gender_and_channel` 的输出——尽管在这种情况下我选择让它成为一个“复合”维度，仍然携带两种类型的信息：


    ```sql

    DAY         GENDER_AND_CHANNEL  CNT   QTY

    2019-05-01  Female on Facebook  564   68

    2019-05-01  Female on Twitter   651   76

    2019-05-01  Male on Facebook    1017  64

    2019-05-01  Male on Twitter     1232  86

    2019-05-02  Female on Facebook  752   78

    2019-05-02  Female on Twitter   840   92

    2019-05-02  Male on Facebook    1198  70

    2019-05-02  Male on Twitter     1438  142

    ```


    ## 简化维度信息


    当然，我并非必须这样做；如果我愿意，我可以选择丢弃信息，只保留一个“非复合”维度，仅包含性别信息并丢弃渠道信息，如列表 [7-8](#475066_1_En_7_Chapter.xhtml#PC12)
    所示。


    ```sql

    SQL> select day, gender, cnt, qty

    2  from web_demographics

    3  unpivot (

    4     ( cnt, qty )

    5     for gender

    6     in (

    7        (m_tw_cnt, m_tw_qty) as ''Male''

    8      , (m_fb_cnt, m_fb_qty) as ''Male''

    9      , (f_tw_cnt, f_tw_qty) as ''Female''

    10     , (f_fb_cnt, f_fb_qty) as ''Female''

    11     )

    12  )

    13  order by day, gender;

    Listing 7-8

    Using unpivot with one single dimension and two measures

    ```


    但请注意，即使我只保留了性别维度信息（只有两个不同的值），对于每个输入行，我仍然在输出中得到四行：


    ```sql

    DAY         GENDER  CNT   QTY

    2019-05-01  Female  564   68

    2019-05-01  Female  651   76

    2019-05-01  Male    1017  64

    2019-05-01  Male    1232  86

    2019-05-02  Female  840   92

    2019-05-02  Female  752   78

    2019-05-02  Male    1438  142

    2019-05-02  Male    1198  70

    ```


    ## 手动聚合数据


    换句话说，重复相同的维度值字面量并不会自动按维度进行聚合。如果那是我想要的输出，我可以使用列表 [7-9](#475066_1_En_7_Chapter.xhtml#PC14)
    来自己执行聚合。


    ```sql

    SQL> select day

    2       , gender

    3       , sum(cnt) as cnt

    4       , sum(qty) as qty

    5  from web_demographics

    6  unpivot (

    7     ( cnt, qty )

    8     for gender

    9     in (

    10        (m_tw_cnt, m_tw_qty) as ''Male''

    11      , (m_fb_cnt, m_fb_qty) as ''Male''

    12      , (f_tw_cnt, f_tw_qty) as ''Female''

    13      , (f_fb_cnt, f_fb_qty) as ''Female''

    14     )

    15  )

    16  group by day, gender

    17  order by day, gender;

    Listing 7-9

    Using unpivot with one aggregated dimension and two measures

    ```


    允许直接在 `unpivot` 查询中使用 `group by` 和聚合函数（如 `sum`）——我不需要将其包装在内联视图中。这样，对于每个原始输入行，我只能得到两行——每个性别一行：


    ```sql

    DAY         GENDER  CNT   QTY

    2019-05-01  Female  1215  144

    2019-05-01  Male    2249  150

    2019-05-02  Female  1592  170

    2019-05-02  Male    2636  212

    ```


    ## 多维度单度量


    当然，我也可以反过来做——两个维度和一个度量。例如，在列表 [7-10](#475066_1_En_7_Chapter.xhtml#PC16) 中，我只保留了
    `cnt` 度量，丢弃了 `qty` 信息。


    ```sql

    SQL> select day, gender, channel, cnt

    2  from web_demographics

    3  unpivot (

    4     cnt

    5     for ( gender, channel )

    6     in (

    7        m_tw_cnt as (''Male''  , ''Twitter'' )

    8      , m_fb_cnt as (''Male''  , ''Facebook'')

    9      , f_tw_cnt as (''Female'', ''Twitter'' )

    10     , f_fb_cnt as (''Female'', ''Facebook'')

    11     )

    12  )

    13  order by day, gender, channel;

    Listing 7-10

    Using unpivot with two dimensions and one measure

    ```


    你再次看到匹配：我为度量使用单个表达式，也为左侧的表列使用单个表达式；我为维度使用表达式列表，也为右侧的字面量使用表达式列表。正如你可以想到的，我得到了包含所有八行的输出，只是没有
    `qty` 列：


    ```sql

    DAY         GENDER  CHANNEL   CNT

    2019-05-01  Female  Facebook  564

    2019-05-01  Female  Twitter   651

    2019-05-01  Male    Facebook  1017

    2019-05-01  Male    Twitter   1232

    2019-05-02  Female  Facebook  752

    2019-05-02  Female  Twitter   840

    2019-05-02  Male    Facebook  1198

    2019-05-02  Male    Twitter   1438

    ```


    ## 多维多度量与总结


    手动反透视也可以使用多个维度和度量来完成，但我不会向你展示像之前那样使用 `dual` 生成行的例子（这将留给读者作为练习）。相反，我将使用真实的维度表来展示它。'
  raw: 'But it is not mandatory for the number of dimensions to be equal to the number
    of measures – you can have many dimensions and few or one measure or vice versa.
    I’ll show you some examples of this.


    The first example is Listing [7-7](#475066_1_En_7_Chapter.xhtml#PC10), where I
    show using a single dimension and two measures.


    ```

    SQL> select day, gender_and_channel, cnt, qty

    2  from web_demographics

    3  unpivot (

    4     ( cnt, qty )

    5     for gender_and_channel

    6     in (

    7        (m_tw_cnt, m_tw_qty) as ''Male on Twitter''

    8      , (m_fb_cnt, m_fb_qty) as ''Male on Facebook''

    9      , (f_tw_cnt, f_tw_qty) as ''Female on Twitter''

    10      , (f_fb_cnt, f_fb_qty) as ''Female on Facebook''

    11     )

    12  )

    13  order by day, gender_and_channel;

    Listing 7-7

    Using unpivot with one composite dimension and two measures

    ```


    The measure expression list in line 4 matches the left-side table column expression
    lists in lines 7–10\. Then line 5 defines just a single dimension (therefore no
    parentheses), and the right-side literals in lines 7–10 accordingly also are single
    literals.


    This way I get an output where I have a single dimension column `gender_and_channel` –
    though in this case I chose it to be “composite” dimension that still carries
    two types of information:


    ```

    DAY         GENDER_AND_CHANNEL  CNT   QTY

    2019-05-01  Female on Facebook  564   68

    2019-05-01  Female on Twitter   651   76

    2019-05-01  Male on Facebook    1017  64

    2019-05-01  Male on Twitter     1232  86

    2019-05-02  Female on Facebook  752   78

    2019-05-02  Female on Twitter   840   92

    2019-05-02  Male on Facebook    1198  70

    2019-05-02  Male on Twitter     1438  142

    ```


    Of course I do not necessarily need to do that; I can choose to discard information
    if I wish and keep just a single “non-composite” dimension keeping only the gender
    information and discarding the channel, as I show in Listing [7-8](#475066_1_En_7_Chapter.xhtml#PC12).


    ```

    SQL> select day, gender, cnt, qty

    2  from web_demographics

    3  unpivot (

    4     ( cnt, qty )

    5     for gender

    6     in (

    7        (m_tw_cnt, m_tw_qty) as ''Male''

    8      , (m_fb_cnt, m_fb_qty) as ''Male''

    9      , (f_tw_cnt, f_tw_qty) as ''Female''

    10      , (f_fb_cnt, f_fb_qty) as ''Female''

    11     )

    12  )

    13  order by day, gender;

    Listing 7-8

    Using unpivot with one single dimension and two measures

    ```


    But note that even though I only keep the dimension information on gender with
    two distinct values, I still get four rows in the output for each input row:


    ```

    DAY         GENDER  CNT   QTY

    2019-05-01  Female  564   68

    2019-05-01  Female  651   76

    2019-05-01  Male    1017  64

    2019-05-01  Male    1232  86

    2019-05-02  Female  840   92

    2019-05-02  Female  752   78

    2019-05-02  Male    1438  142

    2019-05-02  Male    1198  70

    ```


    In other words, repeating the same dimension value literal does *not* automatically
    aggregate on the dimension. If that is the output I desire, I can use Listing
    [7-9](#475066_1_En_7_Chapter.xhtml#PC14) to do the aggregation myself.


    ```

    SQL> select day

    2       , gender

    3       , sum(cnt) as cnt

    4       , sum(qty) as qty

    5  from web_demographics

    6  unpivot (

    7     ( cnt, qty )

    8     for gender

    9     in (

    10        (m_tw_cnt, m_tw_qty) as ''Male''

    11      , (m_fb_cnt, m_fb_qty) as ''Male''

    12      , (f_tw_cnt, f_tw_qty) as ''Female''

    13      , (f_fb_cnt, f_fb_qty) as ''Female''

    14     )

    15  )

    16  group by day, gender

    17  order by day, gender;

    Listing 7-9

    Using unpivot with one aggregated dimension and two measures

    ```


    It is allowed to use `group by` and aggregate functions like `sum` directly in
    the `unpivot` query – I do not need to wrap it in an inline view. This way I can
    get just two rows for each original input row – one for each gender:


    ```

    DAY         GENDER  CNT   QTY

    2019-05-01  Female  1215  144

    2019-05-01  Male    2249  150

    2019-05-02  Female  1592  170

    2019-05-02  Male    2636  212

    ```


    And of course I can also do the other way around – two dimensions with a single
    measure. In Listing [7-10](#475066_1_En_7_Chapter.xhtml#PC16), for example, I
    keep just the `cnt` measure and discard the `qty` information.


    ```

    SQL> select day, gender, channel, cnt

    2  from web_demographics

    3  unpivot (

    4     cnt

    5     for ( gender, channel )

    6     in (

    7        m_tw_cnt as (''Male''  , ''Twitter'' )

    8      , m_fb_cnt as (''Male''  , ''Facebook'')

    9      , f_tw_cnt as (''Female'', ''Twitter'' )

    10      , f_fb_cnt as (''Female'', ''Facebook'')

    11     )

    12  )

    13  order by day, gender, channel;

    Listing 7-10

    Using unpivot with two dimensions and one measure

    ```


    Again you see the match that I use single expression for measure as well as for
    the left-side table columns and I use expression lists for dimensions and the
    right-side literals. As you can figure out, I get this output with all eight rows,
    just no `qty` column:


    ```

    DAY         GENDER  CHANNEL   CNT

    2019-05-01  Female  Facebook  564

    2019-05-01  Female  Twitter   651

    2019-05-01  Male    Facebook  1017

    2019-05-01  Male    Twitter   1232

    2019-05-02  Female  Facebook  752

    2019-05-02  Female  Twitter   840

    2019-05-02  Male    Facebook  1198

    2019-05-02  Male    Twitter   1438

    ```


    Manual unpivoting can also be done with multiple dimensions and measures, but
    I will not show you examples of doing this with generated rows using `dual` like
    before (that will be left as an exercise for the reader). Instead I will show
    it using real dimension tables.'
