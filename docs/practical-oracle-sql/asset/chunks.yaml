  trans: '

    # 累计至零


    使用分析函数能做的真正有用的事情之一，就是我之前展示过的滚动（累计）总和。在清单 16-6 中，我再次使用了它。


    ```

    SQL> select

    2     mb.product_id as p_id, mb.mth

    3   , mb.qty b_qty, mo.qty o_qty

    4   , greatest(mb.qty, nvl(mo.qty, 0)) as qty

    5   , sum(greatest(mb.qty, nvl(mo.qty, 0))) over (

    6        partition by mb.product_id

    7        order by mb.mth

    8        rows between unbounded preceding and current row

    9     ) as acc_qty

    10  from monthly_budget mb

    11  left outer join monthly_orders mo

    12     on mo.product_id = mb.product_id

    13     and mo.mth = mb.mth

    14  where mb.product_id in (6520, 6600)

    15  and mb.mth >= date ''2019-01-01''

    16  order by mb.product_id, mb.mth;

    Listing 16-6

    累计数量

    ```


    在 `第 4 行`，我计算了月度数量，取的是 *预算数量* *或* *订单数量* 中较大的那个。在下面的输出中，您可以看到产品 6520 的 1 月份数据中，`o_qty`
    较大（使得 `qty` = 260），而产品 6600 的 1 月份数据中，`b_qty` 较大（使得 `qty` = 20。）


    这个想法是，如果订单数量是最小的，说明尚未有足够的订单达到预算，但预计它仍会上升直至达到预算。但是当订单数量是最大的时候，我知道预算已被超越，因此我不期望它还会变得更大。


    于是，这个数量就是我在 `第 5-9 行` 使用分析函数 `sum` 进行累计的基础，最终我得到了 `acc_qty` 列，它显示了累计预计需要从库存中提取的数量：


    ```

    P_ID  MTH         B_QTY  O_QTY  QTY  ACC_QTY

    6520  2019-01-01  45     260    260  260

    6520  2019-02-01  45     40     45   305

    6520  2019-03-01  50            50   355

    ...

    6520  2019-11-01  40            40   775

    6520  2019-12-01  40            40   815

    6600  2019-01-01  20     16     20   20

    6600  2019-02-01  20     40     40   60

    6600  2019-03-01  20            20   80

    ...

    6600  2019-11-01  20            20   240

    6600  2019-12-01  20            20   260

    ```


    在清单 16-7 中，我使用这个累计数量来计算每个月的预期库存（假设期间没有补货）。


    ```

    SQL> select

    2     mb.product_id as p_id, mb.mth

    3   , greatest(mb.qty, nvl(mo.qty, 0)) as qty

    4   , greatest(

    5        it.qty - nvl(sum(

    6            greatest(mb.qty, nvl(mo.qty, 0))

    7        ) over (

    8           partition by mb.product_id

    9           order by mb.mth

    10           rows between unbounded preceding and 1 preceding

    11        ), 0)

    12      , 0

    13     ) as inv_begin

    14   , greatest(

    15        it.qty - sum(

    16            greatest(mb.qty, nvl(mo.qty, 0))

    17        ) over (

    18           partition by mb.product_id

    19           order by mb.mth

    20           rows between unbounded preceding and current row

    21        )

    22      , 0

    23     ) as inv_end

    24  from monthly_budget mb

    25  left outer join monthly_orders mo

    26     on mo.product_id = mb.product_id

    27     and mo.mth = mb.mth

    28  join inventory_totals it

    29     on it.product_id = mb.product_id

    30  where mb.product_id in (6520, 6600)

    31  and mb.mth >= date ''2019-01-01''

    32  order by mb.product_id, mb.mth;

    Listing 16-7

    库存递减

    ```


    `第 4-13 行` 计算月初有多少库存，而 `第 14-23 行` 计算月末有多少库存：


    ```

    P_ID  MTH         QTY  INV_BEGIN  INV_END

    6520  2019-01-01  260  400        140

    6520  2019-02-01  45   140        95

    6520  2019-03-01  50   95         45

    6520  2019-04-01  50   45         0

    6520  2019-05-01  55   0          0

    ...

    6600  2019-01-01  20   100        80

    6600  2019-02-01  40   80         40

    6600  2019-03-01  20   40         20

    6600  2019-04-01  20   20         0

    6600  2019-05-01  20   0          0

    ...

    ```


    您可以看到库存如何逐渐减少直至归零。由于我使用月作为时间粒度，原则上我只能说库存将在该月的某个时间点达到零。但如果我假设预算销售额在整个月内均匀分布，那么我也可以在清单
    16-8 中对达到零库存的日期进行 `估算`。


    ```

    SQL> select

    2     product_id as p_id, mth, inv_begin, inv_end

    3   , trunc(

    4        mth + numtodsinterval(

    5                 (add_months(mth, 1) - 1 - mth) * inv_begin / qty

    6               , ''day''

    7              )

    8     ) as zero_day

    9  from (

    ...

    41  )

    42  where inv_begin > 0 and inv_end = 0

    43  order by product_id;

    Listing 16-8

    估算何时库存归零

    ```


    我将清单 16-7 包装在一个内联视图中，并使用 `第 5 行` 中的 `inv_begin / qty` 来计算月初的现有库存能够满足预计月度销售的比例。当我假设销售均匀分布时，这个比例就是该月内我拥有足够库存的天数比例。


    在 `第 42 行` 进行筛选，只输出库存变为零的行：


    ```

    P_ID  MTH         INV_BEGIN  INV_END  ZERO_DAY

    6520  2019-04-01  45         0        2019-04-27

    6600  2019-04-01  20         0        2019-04-30

    ```


    然而在现实中，我不会让库存降至零。我会设定一个不可低于的最低库存量（作为缓冲，以防我低估了销售额），并且每次库存达到最低量时，我必须购买更多啤酒来补充库存。

    '
- fmt: '# Restocking when minimum reached


    In table `product_minimums`， I have parameters for the inventory handling of each
    product。 Listing 16-9 shows the table content for the two beers I use for demonstration。


    ```sql

    SQL> select product_id, qty_minimum, qty_purchase

    2  from product_minimums pm

    3  where pm.product_id in (6520, 6600)

    4  order by pm.product_id;

    ```


    **Listing 16-9： Product minimum restocking parameters**


    Column `qty_minimum` is my inventory buffer – I plan that the inventory should
    never get below this。 Column `qty_purchase` is the number of beers I buy every
    time I restock the inventory：


    ```text

    PRODUCT_ID  QTY_MINIMUM  QTY_PURCHASE

    6520        100          400

    6600        30           100

    ```


    With this I am ready to write SQL that can show me when I need to purchase more
    beer and restock throughout 2019。


    This is not simply done with analytic functions， since I cannot use the result
    of an analytic function inside the analytic function itself to add more quantity。
    This would mean an unsupported type of recursive function call； it cannot be done。
    But I can do it with recursive subquery factoring instead of analytic functions
    as shown in Listing 16-10。


    ```sql

    SQL> with mb_recur(

    2     product_id, mth, qty, inv_begin, date_purch

    3   , p_qty, inv_end, qty_minimum, qty_purchase

    4  ) as (

    5     select

    6        it.product_id

    7      , date ''2018-12-01'' as mth

    8      , 0 as qty

    9      , 0 as inv_begin

    10      , cast(null as date) as date_purch

    11      , 0 as p_qty

    12      , it.qty as inv_end

    13      , pm.qty_minimum

    14      , pm.qty_purchase

    15     from inventory_totals it

    16     join product_minimums pm

    17        on pm.product_id = it.product_id

    18     where it.product_id in (6520, 6600)

    19  union all

    20     select

    21        mb.product_id

    22      , mb.mth

    23      , greatest(mb.qty, nvl(mo.qty, 0)) as qty

    24      , mbr.inv_end as inv_begin

    25      , case

    26           when mbr.inv_end - greatest(mb.qty, nvl(mo.qty, 0))

    27                 < pm.qty_minimum

    28           then mb.mth

    29              + (pm.qty_minimum -

    30                   (mbr.inv_end - greatest(mb.qty, nvl(mo.qty, 0)))

    31                 ) / greatest(mb.qty, nvl(mo.qty, 0))

    32                * (add_months(mb.mth， 1) - mb.mth)

    33        end as date_purch

    34      , case

    35           when mbr.inv_end - greatest(mb.qty, nvl(mo.qty, 0))

    36                 < pm.qty_minimum

    37           then pm.qty_purchase

    38        end as p_qty

    39      , mbr.inv_end - greatest(mb.qty, nvl(mo.qty, 0))

    40        + nvl(

    41            case

    42               when mbr.inv_end - greatest(mb.qty, nvl(mo.qty, 0))

    4                     < pm.qty_minimum

    43               then pm.qty_purchase

    44            end

    45          , 0

    46        ) as inv_end

    47      , pm.qty_minimum

    48      , pm.qty_purchase

    49     from mb_recur mbr

    50     join monthly_budget mb

    51        on mb.product_id = mbr.product_id

    52       and mb.mth = add_months(mbr.mth, 1)

    53     left join monthly_orders mo

    54        on mo.product_id = mb.product_id

    55       and mo.mth = mb.mth

    56     join product_minimums pm

    57        on pm.product_id = mb.product_id

    58     where mb.mth <= date ''2019-12-01''

    59  )

    60  select

    61     product_id as p_id, mth, qty, inv_begin

    62   , date_purch, p_qty, inv_end

    63  from mb_recur

    64  where date_purch is not null

    65  and p_qty is not null

    66  order by product_id, mth;

    ```


    **Listing 16-10： Restocking when a minimum is reached**


    I start in lines 5–18 by setting up one row per product containing what is the
    inventory when I start， along with the parameters for minimum quantity and how
    much to purchase。 I set this row as being in December 2018 with the inventory
    in the `inv_end` column – that way it will function as a “primer” row for the
    recursive part of the query in lines 20–59。


    In the recursive part I do：


    *   Join to the monthly budget for the *next* month in line 56。 The first iteration
    here will find January 2019 (since my “primer” row was December 2018)， and then
    each iteration will find the next month until there are no more budget rows。


    *   The `inv_begin` of this next month in the iteration is then equal to the `inv_end`
    of the previous month， so that’s a simple assignment in line 24。


    *   Lines 44–50 calculate the `inv_end`， which is the beginning inventory (previous
    `inv_end`) *minus* the quantity picked that month *plus* a possible restocking。
    If the beginning inventory minus the quantity would become less than the minimum，
    I add the quantity I will be purchasing for restocking。


    *   To show on the output how much I need to purchase for restocking， I separate
    this `case` structure out in lines 39–43。


    *   And in lines 25–28， I use the same `case` condition to calculate an estimated
    date of the month where the restocking by purchasing more beer should take place。


    Line 65 removes the “primer” rows from the output (they are not interesting)，
    and line 66 gives me just those months where I need to restock：


    ```text

    P_ID  MTH         QTY  INV_BEGIN  DATE_PURCH  P_QTY  INV_END

    6520  2019-02-01  45   140        2019-02-25  400    495

    6520  2019-10-01  50   115        2019-10-10  400    465

    6600  2019-03-01  20   40         2019-03-16  100    120

    6600  2019-08-01  20   40         2019-08-16  100    120

    ```


    I am now able to plan when I need to purchase more beers to restock the inventory。


    In Listing 16-10， I used recursive subquery factoring。 The way I did it means
    that for the budget and orders， there will be a series of repeated small lookups
    to the tables for each month。 Depending on circumstances， this might be perfectly
    fine， but in other cases， it could be bad for performance。


    Listing 16-11 shows an alternative method of recursion (or rather， *iteration*)
    with the `model` clause instead， where a different access plan can be used by
    the optimizer。


    ```sql

    SQL> select

    2     product_id as p_id, mth, qty, inv_begin

    3   , date_purch, p_qty, inv_end

    4  from (

    5     select *

    6     from monthly_budget mb

    7     left outer join monthly_orders mo

    8        on mo.product_id = mb.product_id

    9        and mo.mth = mb.mth

    10     join inventory_totals it

    11        on it.product_id = mb.product_id

    12     join product_minimums pm

    13        on pm.product_id = mb.product_id

    14     where mb.product_id in (6520, 6600)

    15     and mb.mth >= date ''2019-01-01''

    16     model

    17     partition by (mb.product_id)

    18     dimension by (

    19        row_number() over (

    20           partition by mb.product_id order by mb.mth

    21        ) - 1 as rn

    22     )

    23     measures (

    24        mb.mth

    25      , greatest(mb.qty, nvl(mo.qty, 0)) as qty

    26      , 0 as inv_begin

    27      , cast(null as date) as date_purch

    28      , 0 as p_qty

    29      , 0 as inv_end

    30      , it.qty as inv_orig

    31      , pm.qty_minimum

    32      , pm.qty_purchase

    33     )

    34     rules sequential order iterate (12) (

    35        inv_begin[iteration_number]

    36         = nvl(inv_end[iteration_number-1], inv_orig[cv()])

    37      , p_qty[iteration_number]

    38         = case

    39              when inv_begin[cv()] - qty[cv()]

    40                    < qty_minimum[cv()]

    41              then qty_purchase[cv()]

    42           end

    43      , date_purch[iteration_number]

    44         = case

    45              when p_qty[cv()] is not null

    46              then

    47                 trunc(

    48                    mth[cv()]

    49                  + numtodsinterval(

    50                       (add_months(mth[cv()], 1) - 1 - mth[cv()])

    51                        * (inv_begin[cv()] - qty_minimum[cv()])

    52                        / qty[cv()]

    53                     , ''day''

    54                    )

    55                 )

    56           end

    57      , inv_end[iteration_number]

    58         = inv_begin[cv()] + nvl(p_qty[cv()], 0) - qty[cv()]

    59     )

    60  )

    61  where p_qty is not null

    62  order by product_id, mth;

    ```


    **Listing 16-11： Restocking with model clause**


    With this method I do not need “primer” rows and repeated monthly lookups。 Instead
    I grab all the data I need in one go in lines 5–15， rather like if I was using
    analytic functions。 And then I can use `model`：


    *   Lines 19–21 create a consecutive numbering that I can use as dimension (“index”)
    in my measures。 I deliberately make it have the values 0–11 instead of 1–12， because
    that fits how `iteration_number` is filled when using iteration。


    *   In the `measures` in lines 24–32， I set up the “variables” I need to work
    with。


    *   In the `rules` clause， I can then perform all my calculations。 In line 34，
    I specify that I want my calculations to be performed in the order I have typed
    them， and they should be performed 12 times。 That means that within each of the
    12 iterations， I can use the pseudocolumn `iteration_number`， and it will increase
    from 0 to 11。


    *   The first rule to be executed is lines 35–36， where I set `inv_begin` to the
    `inv_end` of the previous month (in the first iteration， this will be `null`，
    so with `nvl` I set it to the original inventory in the first month)。


    *   If the inventory minus the quantity is less than the minimum， then in lines
    37–42， I set `p_qty` to the quantity I need to purchase。


    *   If I *did* find a `p_qty` (line 45)， the rule in lines 43–56 calculates the
    day I need to purchase and restock。'
