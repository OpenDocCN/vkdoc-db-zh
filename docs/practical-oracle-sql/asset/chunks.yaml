- fmt: "# 7. Unpivoting Columns to Rows\n\nIdeally, you’d hope always to work with\
    \ data that’s nicely normalized in your relational database, the way they teach\
    \ in computer science classes. In reality it’s quite often not as ideal.\n\nOne\
    \ quite common pattern is to have some data with a bunch of columns, where you’d\
    \ really like those data as rows with, for example, key-value pairs, where the\
    \ *key* would be derived from the original column name and the *value* then would\
    \ be the value from that column.\n\nPersonally I like to use the terms **dimension**\
    \ and **measure** instead of key and value. You might say that’s only for data\
    \ warehousing, but the terms are also used, for example, in the `model` clause\
    \ in SQL. The advantage, in my opinion, is that it is common to think of multiple\
    \ dimensions and multiple measures, whereas the key-value terminology most often\
    \ is used thinking only of a single key and a single value.\n\nThe act of turning\
    \ data in rows into columns is called *pivoting* (which is the topic of the next\
    \ chapter), so as this is the reverse operation, it is called *unpivoting*. I’ll\
    \ show you unpivoting with examples based on tables that contain data from an\
    \ external source – that’s of course not always the case, but it is not uncommon.\n\
    \n## Data received in columns\n\nTo exemplify unpivoting, I am going to use the\
    \ two tables shown in Figure [7-1](#475066_1_En_7_Chapter.xhtml#Fig1).\n\n![../images/475066_1_En_7_Chapter/475066_1_En_7_Fig1_HTML.jpg](images/475066_1_En_7_Chapter/475066_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1\n\nTables holding incoming data from web provider\n\nGood Beer Trading\
    \ Co uses an external service to gather statistics about visitors to the company\
    \ webshop. This service delivers daily statistical data that are imported into\
    \ these two tables:\n\n*   In table `web_devices` are saved daily stats about\
    \ how many visitors to the webshop are from PCs, tablets, and phones, each visitor\
    \ count stored in a separate column for each device type.\n*   In table `web_demographics`\
    \ are both visitor count as well as the quantity the visitors ended up buying.\
    \ Both count and quantity are separated into male vs. female visitors, as well\
    \ as into visitors coming from Twitter campaigns vs. Facebook campaigns. So, for\
    \ example, column `m_tw_cnt` is count of male visitors from Twitter, while column\
    \ `f_fb_qty` is the quantity bought by female visitors from Facebook.\n\nI’m going\
    \ to demonstrate various unpivoting methods on these tables.\n\n## Unpivoting\
    \ to rows\n\nFirst, I take a look at the content of table `web_devices` in Listing\
    \ [7-1](#475066_1_En_7_Chapter.xhtml#PC1).\n\n```\nSQL> select day, pc, tablet,\
    \ phone\n2  from web_devices\n3  order by day;\nDAY         PC    TABLET  PHONE\n\
    2019-05-01  1042  812     1610\n2019-05-02  967   1102    2159\nListing 7-1\n\
    Daily web visits per device\n```\n\nWhat I want to do now is to *unpivot* these\
    \ data with a single dimension column containing the device (PC, tablet, or phone)\
    \ and a single measure column with the visitor count for that device – that is,\
    \ the value from the corresponding column in the table.\n\nThe first method is\
    \ to use the `unpivot` clause of the `select` statement as shown in Listing [7-2](#475066_1_En_7_Chapter.xhtml#PC2).\n\
    \n```\nSQL> select day, device, cnt\n2  from web_devices\n3  unpivot (\n4    \
    \ cnt\n5     for device\n6     in (\n7        pc     as 'PC'\n8      , tablet\
    \ as 'Tablet'\n9      , phone  as 'Phone'\n10     )\n11  )\n12  order by day,\
    \ device;\nListing 7-2\nUsing unpivot to get dimension and measure\n```\n\nThe\
    \ unpivot clause consists of three parts:\n\n*   First measures must be defined\
    \ – in this case `cnt` in line 4. It’s a column that does not exist but will be\
    \ created; I simply define that there should be a single measure, and it is to\
    \ be called `cnt`.\n*   I then define for what dimensions the measures should\
    \ exist – line 5 with the keyword `for` followed by dimension name `device`. Again\
    \ a non-existing column will be created.\n*   Lastly the `in` clause in lines\
    \ 6–10 defines the mapping from the original columns to the new measure and dimension\
    \ columns. Here I have defined three mappings (lines 7–9) which means there will\
    \ be generated three output rows for each input row:\n    *   One row with the\
    \ value from `pc` in `cnt` and the string `'PC'` in `device`\n    *   One row\
    \ with the value from `tablet` in `cnt` and the string `'Tablet'` in `device`\n\
    \    *   One row with the value from `phone` in `cnt` and the string `'Phone'`\
    \ in `device`\n\nFigure [7-2](#475066_1_En_7_Chapter.xhtml#Fig2) shows how the\
    \ data flows – from the mapping rules in the `in` clause, the values of the *columns*\
    \ on the left flow to the measure column and the *literals* on the right flow\
    \ to the dimension column.\n\n![../images/475066_1_En_7_Chapter/475066_1_En_7_Fig2_HTML.jpg](images/475066_1_En_7_Chapter/475066_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2\n\nFlow of single dimension and measure values\n\nThose columns of\
    \ the original table I specify in the `in` clause will not be part of the output,\
    \ as they and their values have been transformed to dimensions and measures. Any\
    \ *other* column of the table will be output unaltered – in this case that is\
    \ only the `day` column, but had there been other columns they would have been\
    \ there too.\n\nIn total Listing [7-2](#475066_1_En_7_Chapter.xhtml#PC2) gives\
    \ me this output with three rows for each day, one row for each of the three device\
    \ types, unpivoted just like I wanted it:\n\n```\nDAY         DEVICE  CNT\n2019-05-01\
    \  PC      1042\n2019-05-01  Phone   1610\n2019-05-01  Tablet  812\n2019-05-02\
    \  PC      967\n2019-05-02  Phone   2159\n2019-05-02  Tablet  1102\n```"
