- fmt: '## Windows on value ranges


    If I want, I can specify a window not as “two rows before to two rows after the
    current row” but instead as “those rows where the value is from 20 less to 20
    more than the value in the current row.” This I can do with `range between` like
    Listing 11-7.


    ```

    ...

    6   , sum(ol.qty) over (

    7        partition by ol.product_id

    8        order by ol.qty

    9        range between 20 preceding

    10                  and 20 following

    11     ) as p_qty

    ...

    ```


    **Listing 11-7** Range window based on qty value


    When I specify `between 20 preceding and 20 following` in lines 9–10, I ask that
    the window will contain those rows where the value is the same as the value in
    the current row plus/minus 20\. But the value of what?


    The value that `range` will use is the value of the column used in the `order
    by` in the analytic function. Therefore, in order to use range windows, the `order
    by` column must be a number or a date/timestamp.


    The column I calculate the total of in the `sum` function does not have to be
    the same as the one I use for ordering and range, but in practice, it often is,
    giving me an output where you can see both third and fourth rows get a sum of
    370, as it is the sum of all the rows in the partition with values between 80-20=60
    and 80+20=100:


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   280

    4280  Hoppy Crude Oil  427   60   280

    4280  Hoppy Crude Oil  422   80   370

    4280  Hoppy Crude Oil  429   80   370

    4280  Hoppy Crude Oil  428   90   360

    4280  Hoppy Crude Oil  421   110  200

    6600  Hazy Pink Cloud  424   16   56

    6600  Hazy Pink Cloud  426   16   56

    6600  Hazy Pink Cloud  425   24   56

    ```


    Even range windows do not have to include the current row value; I can also specify
    I want the window to contain those rows with a `qty` value between the current
    `qty` + 5 and the current `qty` + 25:


    ```

    ...

    9        range between  5 following

    10                  and 25 following

    ...

    ```


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   160

    4280  Hoppy Crude Oil  427   60   160

    4280  Hoppy Crude Oil  422   80   90

    4280  Hoppy Crude Oil  429   80   90

    4280  Hoppy Crude Oil  428   90   110

    4280  Hoppy Crude Oil  421   110

    6600  Hazy Pink Cloud  424   16   24

    6600  Hazy Pink Cloud  426   16   24

    6600  Hazy Pink Cloud  425   24

    ```


    Running totals can be performed with `range` windows as well:


    ```

    ...

    9        range between unbounded preceding

    10                  and current row

    ...

    ```


    But notice how the running totals are identical for the rows that have same `qty`
    value:


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   120

    4280  Hoppy Crude Oil  427   60   120

    4280  Hoppy Crude Oil  422   80   280

    4280  Hoppy Crude Oil  429   80   280

    4280  Hoppy Crude Oil  428   90   370

    4280  Hoppy Crude Oil  421   110  480

    6600  Hazy Pink Cloud  424   16   32

    6600  Hazy Pink Cloud  426   16   32

    6600  Hazy Pink Cloud  425   24   56

    ```


    Compare this output to the output of Listing 11-5, where the first two rows have
    values in `p_qty` of 60 and 120, respectively. Here they both have 120.


    That is because of the nature of the `range` window, which gives a different meaning
    to the term `current row`. It no longer specifically means *the* current row,
    but rather the *value of* the current row. (In my opinion it would have been nice
    to use wording like `current value` for `range` windows, but that is unfortunately
    not supported syntax.)


    So you see `range` windows using the `current row` can actually *include following
    rows* in case of value ties. This leads me to showing you a pitfall that is all
    too easy to fall into.


    ## The danger of the default window


    In Figure 11-3, you can see that it is possible to use `order by` *without* specifying
    a windowing clause. That leads to a default windowing clause, which might surprise
    you. In Listing 11-8, I show you the difference between the default, `range between`,
    and `rows between`.


    ```sql

    SQL> select

    2     ol.product_id as p_id

    3   , p.name        as product_name

    4   , ol.order_id   as o_id

    5   , ol.qty

    6   , sum(ol.qty) over (

    7        partition by ol.product_id

    8        order by ol.qty

    9        /* no window - rely on default */

    10     ) as def_q

    11   , sum(ol.qty) over (

    12        partition by ol.product_id

    13        order by ol.qty

    14        range between unbounded preceding

    15                  and current row

    16     ) as range_q

    17   , sum(ol.qty) over (

    18        partition by ol.product_id

    19        order by ol.qty

    20        rows between unbounded preceding

    21                 and current row

    22     ) as rows_q

    23  from orderlines ol

    24  join products p

    25     on p.id = ol.product_id

    26  where ol.product_id in (4280, 6600)

    27  order by ol.product_id, ol.qty;

    ```


    **Listing 11-8** Comparing running sum with default, range, and rows window


    I have three analytic function calls here:


    *   Column `def_q` in lines 6–10 uses `order by` but leaves the windowing clause
    empty.


    *   Column `range_q` in lines 11–16 uses the `range between` window for a running
    total.


    *   Column `rows_q` in lines 17–22 uses the `rows between` window for a running
    total.


    You see in the output that `def_q` and `range_q` are identical:


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  DEF_Q  RANGE_Q  ROWS_Q

    4280  Hoppy Crude Oil  423   60   120    120      60

    4280  Hoppy Crude Oil  427   60   120    120      120

    4280  Hoppy Crude Oil  422   80   280    280      200

    4280  Hoppy Crude Oil  429   80   280    280      280

    4280  Hoppy Crude Oil  428   90   370    370      370

    4280  Hoppy Crude Oil  421   110  480    480      480

    6600  Hazy Pink Cloud  424   16   32     32       16

    6600  Hazy Pink Cloud  426   16   32     32       32

    6600  Hazy Pink Cloud  425   24   56     56       56

    ```


    Yes, if you have an `order_by_clause`, the default for the `windowing_clause`
    is `range between unbounded preceding and current row`.


    I have seen many blog and forum posts showing a running total as something like
    `sum(col1) over (order by col2)` and leaving it at that. And when you test your
    code with this default window, often you get the result you expect, as the difference
    in output only occurs when there are duplicates in the values. So you might not
    spot the error until the code has gone into production.


    **Note**


    It is not just a problem when there are duplicate values. Even if your order by
    is unique, using default `range between` windows for running totals can potentially
    incur some overhead by evaluation of the analytic function, impacting performance.
    This is because `rows between` can be executed more optimally by the SQL engine,
    while `range between` requires the SQL engine to “look ahead” in the rows and
    see if possibly any following rows have the same value. For more detailed explanation
    of this, see a blog post I did a while back: `www.kibeha.dk/2013/02/rows-versus-default-range-in-analytic.html`.


    In my opinion, the default ought to have been `rows between`, as in my experience,
    this is by far the most used window specification. It is *very* often I use `rows
    between` and only once in a rare while `range between`.'
