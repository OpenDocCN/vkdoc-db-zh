    a year, but this time `between 6 preceding and 5 following`, so I’m slightly off
    center in the other direction.


    *   Adding these two together and dividing by two (lines 28, 32, and 36) gives
    me the average of these two “off center” averages, and that is what is called
    *centered moving average*.


    *   If I calculated this for all 36 months of my sales data, I would get wrong
    values at both ends, because they would not be calculated for the entire 12-month
    periods. Therefore, I use a case structure in lines 26–27 and 37–38 to skip the
    first 6 months and the last 6 months of the 36 and only calculate `cma` for month
    numbers 7–30 (that’s the `ts`–time series–column).


    So when I plot in `cma` on the graph in Figure [15-3](#475066_1_En_15_Chapter.xhtml#Fig3),
    you can see it’s a slowly rising line covering the “middle” two years of the sales
    period. (To keep the graphs clearly separable, from now I’m only showing one of
    the beers – Reindeer Fuel. At the end of the chapter, I’ll show the final graphs
    for both beers.)


    ![../images/475066_1_En_15_Chapter/475066_1_En_15_Fig3_HTML.jpg](images/475066_1_En_15_Chapter/475066_1_En_15_Fig3_HTML.jpg)


    Figure 15-3


    Centered moving average for Reindeer Fuel


    Having calculated `cma`, I put that calculation into a new `with` clause named
    `s2` and proceed to calculate *seasonality factor* in Listing [15-4](#475066_1_En_15_Chapter.xhtml#PC6).


    ```

    SQL> with s1 as (

    ...     /* Listing 15-2 minus order by */

    23  ), s2 as (

    ...     /* Listing 15-3 final query minus order by */

    41  )

    42  select

    43     product_id, mth, ts, yr, mthno, qty, cma

    44   , nvl(avg(

    45        case qty

    46           when 0 then 0.0001

    47           else qty

    48        end / nullif(cma, 0)

    49     ) over (

    50        partition by product_id, mthno

    51     ),0) as s -- seasonality

    52  from s2

    53  order by product_id, mth;

    Listing 15-4

    Calculating seasonality factor

    ```


    Basically the seasonality factor is how much the monthly sales is higher or lower
    than the average month. But there’s a little more to it than just taking `qty/cma`:'
  trans: '

    # 时间序列


    时间序列预测首先要构建时间序列，这是一组连续的数据，每个数据点之间恰好相隔一个时间单位。在此例中，我使用月份作为时间单位。我拥有 3 年（即 36 个月）的实际数据，并希望预测
    1 年（即 12 个月），因此需要为清单 15-2 中的每种啤酒创建一个包含 48 行的时间序列。


    ```sql

    SQL> select

    2     ms.product_id

    3   , mths.mth

    4   , mths.ts

    5   , extract(year from mths.mth) as yr

    6   , extract(month from mths.mth) as mthno

    7   , ms.qty

    8  from (

    9     select

    10        add_months(date ''2016-01-01'', level - 1) as mth

    11      , level as ts --time series

    12     from dual

    13     connect by level <= 48

    14  ) mths

    15  left outer join (

    16     select product_id, mth, qty

    17     from monthly_sales

    18     where product_id in (4160, 7790)

    19  ) ms

    20     partition by (ms.product_id)

    21     on  ms.mth = mths.mth

    22  order by ms.product_id, mths.mth;

    Listing 15-2

    构建 2016-2019 年两种啤酒的时间序列

    ```


    第 9-13 行的内联视图 `mths` 创建了 48 行，对应 2016-2019 年中的每个月。`mth` 列包含 `date` 数据类型的月份，这是我需要与销售数据连接的。`ts`
    列包含连续数字 1-48，可以将其视为“时间单位”的数量，在本例中即月份数。


    第 16-18 行的内联视图 `ms` 简单地查询了 `monthly_sales` 表，获取我关注的两种产品——当我对模型满意时，只需删除第 18 行，即可对所有产品运行查询，而不仅限于两种。


    第 20 行，两个内联视图之间的 `left outer join` 是按产品 ID 分区的，这意味着 `mths` 的 48 行将分别与每个产品进行外连接——首先与产品
    4160 的 36 行进行外连接，然后与产品 7790 的 36 行进行外连接。


    输出总共得到 96 行，部分展示如下：


    ```

    PROD MTH      TS    YR MTHNO  QTY

    ---- ------- --- ----- ----- ----

    4160 2016-01   1  2016     1   79

    4160 2016-02   2  2016     2  133

    ...

    4160 2018-11  35  2018    11   73

    4160 2018-12  36  2018    12  160

    4160 2019-01  37  2019     1

    4160 2019-02  38  2019     2

    ...

    4160 2019-11  47  2019    11

    4160 2019-12  48  2019    12

    7790 2016-01   1  2016     1    4

    7790 2016-02   2  2016     2    6

    ...

    7790 2018-11  35  2018    11    3

    7790 2018-12  36  2018    12    5

    7790 2019-01  37  2019     1

    7790 2019-02  38  2019     2

    ...

    7790 2019-11  47  2019    11

    7790 2019-12  48  2019    12

    96 rows selected.

    ```


    对于每个产品，前 36 行在 `qty` 列中包含实际销售数据，然后是 12 行（`ts` = 37-48），其 `qty` 为 null——这 12 行将在我继续开发查询时用预测销售额填充。


    在上面的输出中，我只显示了部分行；因为如果以视觉方式呈现，我们人类更容易理解此类数据，所以我将完整结果集展示在图 15-2 中。


    ![Figure 15-2](img/475066_1_En_15_Fig2_HTML.jpg)


    图 15-2：2016-2018 年的月度销售额加上时间序列中用于 2019 年预测的行


    这两条线是两种啤酒的销售额，然后在末尾，是我将要预测的 12 个月。那么，让我从生成线性回归所需的值开始。


    ## 计算回归基础


    原则上，我可以直接对现有的销售数据进行线性回归，但那样只会得到 2019 年的一条直线，而不是一个考虑到啤酒在特定季节销售良好的预测。通过我选择的预测模型，我将得到一个考虑了季节性和年度趋势，并平滑掉不规则异常值的预测。


    我需要计算的第一个值是*中心移动平均*，因此我将清单 15-2 中的时间序列代码取出，放入一个名为 `s1` 的 `with` 子句中。这使我能够在清单 15-3
    中从 `s1` 进行 `select`。


    ```sql

    SQL> with s1 as (

    ...      /* 清单 15-2 减去 order by */

    23  )

    24  select

    25     product_id, mth, ts, yr, mthno, qty

    26   , case

    27        when ts between 7 and 30 then

    28           (nvl(avg(qty) over (

    29              partition by product_id

    30              order by ts

    31              rows between 5 preceding and 6 following

    32           ), 0) + nvl(avg(qty) over (

    33              partition by product_id

    34              order by ts

    35              rows between 6 preceding and 5 following

    36           ), 0)) / 2

    37        else

    38           null

    39     end as cma -- centered moving average (中心移动平均)

    40  from s1

    41  order by product_id, mth;

    Listing 15-3：计算中心移动平均

    ```


    这里发生的事情如下：


    *   在第 28-31 行，我在一个 12 个月的移动窗口 `between 5 preceding and 6 following` 中计算平均销售数量。这是一年内的月平均销售额，但稍微“偏离中心”，因为有
    5 个前月、当前月和 6 个后月。

    *   所以在第 32-36 行，我计算了另一个一年内的月平均销售额，但这次是 `between 6 preceding and 5 following`，所以我在另一个方向上稍微偏离中心。

    *   将这两个值相加并除以 2（第 28、32 和 36 行），得到这两个“偏离中心”平均值的平均值，这就是所谓的*中心移动平均*。

    *   如果我为销售数据的所有 36 个月计算这个值，两端会得到错误的数值，因为它们无法计算完整的 12 个月周期。因此，我在第 26-27 和 37-38
    行使用 case 结构来跳过 36 个月的前 6 个月和后 6 个月，只对月份数字 7-30（即 `ts`–时间序列–列）计算 `cma`。


    所以，当我在图 15-3 中将 `cma` 绘制到图表上时，你可以看到它是一条缓慢上升的线，覆盖了销售期间的“中间”两年。（为了使图表清晰可辨，从现在开始我只显示其中一种啤酒——Reindeer
    Fuel。在本章末尾，我将展示两种啤酒的最终图表。）


    ![Figure 15-3](img/475066_1_En_15_Fig3_HTML.jpg)


    图 15-3：Reindeer Fuel 的中心移动平均


    计算出 `cma` 后，我将其放入一个名为 `s2` 的新 `with` 子句中，并继续在清单 15-4 中计算*季节性因子*。


    ```sql

    SQL> with s1 as (

    ...     /* 清单 15-2 减去 order by */

    23  ), s2 as (

    ...     /* 清单 15-3 最终查询 减去 order by */

    41  )

    42  select

    43     product_id, mth, ts, yr, mthno, qty, cma

    44   , nvl(avg(

    45        case qty

    46           when 0 then 0.0001

    47           else qty

    48        end / nullif(cma, 0)

    49     ) over (

    50        partition by product_id, mthno

    51     ),0) as s -- seasonality (季节性)

    52  from s2

    53  order by product_id, mth;

    Listing 15-4：计算季节性因子

    ```


    基本上，季节性因子表示月度销售额比平均月份高或低的程度。但这里比简单地取 `qty/cma` 要复杂一些：

    '
- fmt: '## 处理零值与避免错误


    *   模型不喜欢零销售额的月份——它们会扭曲后续步骤的数据并导致预测错误，因此我在第45至48行使用了一个小技巧：将所有零值替换为一个非常小的值。由于我的最终结果会四舍五入到整数，所以我最终会预测出零值；我只是需要在中间计算中使用小值来代替零。


    *   为了避免潜在的除零错误，我在第48行使用 `nullif` 将所有零值转换为 `null`。还会有一些行中 `cma` 本身为 `null`，通过这种方式，我确保了在
    `cma` 为 `null` 或零的地方，除法结果都变为 `null`。


    ## 计算季节性因子


    季节性变化可能每年略有不同（不同的天气、复活节所在的月份等），所以我想要一个按月平均的季节性因子。换句话说，对于一月，我想要2016年1月、2017年1月和2018年1月的平均季节性；对于二月，所有二月的平均值；以此类推。这是在第44和49-51行通过一个分析型
    `avg` 调用实现的，该调用按产品和 `mthno` 进行分区——`mthno` 是通过 `extract(month from mths.mth)` 计算得出的，因此包含1,
    2,…12。


    该计算产生如下输出（部分复制），你可以看到列 `s`（季节性因子）的值是重复的，所以所有一月都有相同的值，依此类推。要特别注意，由于 `avg` 是按 `mthno`
    分区的，因此在 `cma` 为 `null`（或零）的月份中，`s` 也有值。这对于下一步（反季节化）和最后一步（重新季节化）都至关重要：


    ```

    PROD MTH      TS    YR MTHNO  QTY   CMA      S

    ---- ------- --- ----- ----- ---- ----- ------

    4160 2016-01   1  2016     1   79       3.3824

    4160 2016-02   2  2016     2  133       4.8771

    ...

    4160 2017-01  13  2017     1  148  40.3 3.3824

    4160 2017-02  14  2017     2  209  40.3 4.8771

    ...

    4160 2018-01  25  2018     1  167  54.1 3.3824

    4160 2018-02  26  2018     2  247  54.1 4.8771

    ...

    4160 2019-01  37  2019     1            3.3824

    4160 2019-02  38  2019     2            4.8771

    ...

    ```


    ## 反季节化销售数据


    在每个时间序列月份中都拥有季节性因子后，我再次将代码放入 `with` 子句 `s3` 中，并按照清单 [15-5](#475066_1_En_15_Chapter.xhtml#PC8)
    计算反季节化。


    ```

    SQL> with s1 as (

    ...     /* Listing 15-2 minus order by */

    23  ), s2 as (

    ...     /* Listing 15-3 final query minus order by */

    41  ), s3 as (

    ...     /* Listing 15-4 final query minus order by */

    53  )

    54  select

    55     product_id, mth, ts, yr, mthno, qty, cma, s

    56   , case when ts <= 36 then

    57        nvl(

    58           case qty

    59              when 0 then 0.0001

    60              else qty

    61           end / nullif(s, 0)

    62         , 0)

    63     end as des -- deseasonalized

    64  from s3

    65  order by product_id, mth;

    Listing 15-5

    Deseasonalizing sales data

    ```


    反季节化（“从数据中剔除季节性”）基本上就是用数量除以季节性因子。我再次通过将零值转换为小值（第58-61行）来避免问题，并通过第61行的 `nullif`
    调用避免潜在的除零错误。


    在图 [15-4](#475066_1_En_15_Chapter.xhtml#Fig4) 中，你可以看到 `des` 列在所有36个月中都有值，并且该线或多或少地跟随
    `cma` 线（中心移动平均线）。每年的季节性变化越相似，`des` 线与 `cma` 线就越接近。


    这里的大部分变化是由于零销售额被转换为小值造成的，你会看到一个急剧的峰值随后是一个急剧的低谷（或反之亦然）。但由于峰值和低谷的平均值能很好地命中 `cma`，它会在下一步中均衡掉（正如我将要展示的）。如果我保留了零值（可能转换为
    `null` 以避免除零），就会扭曲数据并破坏模型。


    ![../images/475066_1_En_15_Chapter/475066_1_En_15_Fig4_HTML.jpg](images/475066_1_En_15_Chapter/475066_1_En_15_Fig4_HTML.jpg)


    图 15-4


    驯鹿燃料（Reindeer Fuel）的反季节化销售数据


    图表上的这条反季节化曲线现在代表了月平均销售在一年中的某种平滑版本，它考虑了历年平均的季节性变化。下一步是创建一条尽可能匹配 `des` 线的直线。'
  raw: '*   The model does not like months with zero sales – they will skew the data
    in later steps and make the forecast wrong, so my little workaround for this in
    lines 45–48 is to make any zeroes become a very small value instead. In my final
    result, I’ll be rounding to integers anyway, so I will end up forecasting zeroes;
    I just need to use small values instead of zeroes in the intermediate calculations.


    *   To avoid potential division by zero errors, in line 48, I use `nullif` to
    turn any zeroes into `null`. There will also be rows where `cma` itself is `null`,
    so with this I make sure that the result of the division becomes `null` both where
    `cma` is `null` and where `cma` is zero.


    *   The seasonal variations might vary a bit from year to year (different weather,
    which month contains Easter, and so on), so I want a seasonality factor that is
    an average over the years, but *by month*. In other words, for January, I want
    the average seasonality of January 2016, January 2017, and January 2018; for February,
    the average of all Februaries; and so on. This is accomplished in lines 44 and
    49–51 with an analytic `avg` call that partitions by product and `mthno` – which
    was calculated as `extract(month from mths.mth)`, so it contains 1, 2,…12.


    That calculation produces this output (partially reproduced), where you can see
    that the values of column `s` (seasonality factor) repeat, so all Januaries have
    the same value and so on. Note in particular that due to the `avg` being partitioned
    on `mthno`, `s` has values also in those months where `cma` is `null` (or zero).
    This is crucial both for the next step (deseasonalizing) and the final step (reseasonalizing):


    ```

    PROD MTH      TS    YR MTHNO  QTY   CMA      S

    ---- ------- --- ----- ----- ---- ----- ------

    4160 2016-01   1  2016     1   79       3.3824

    4160 2016-02   2  2016     2  133       4.8771

    ...

    4160 2017-01  13  2017     1  148  40.3 3.3824

    4160 2017-02  14  2017     2  209  40.3 4.8771

    ...

    4160 2018-01  25  2018     1  167  54.1 3.3824

    4160 2018-02  26  2018     2  247  54.1 4.8771

    ...

    4160 2019-01  37  2019     1            3.3824

    4160 2019-02  38  2019     2            4.8771

    ...

    ```


    Armed with a seasonality factor in every month of the time series, once again
    I put the code in `with` clause `s3` and calculate deseasonalizing in Listing
    [15-5](#475066_1_En_15_Chapter.xhtml#PC8).


    ```

    SQL> with s1 as (

    ...     /* Listing 15-2 minus order by */

    23  ), s2 as (

    ...     /* Listing 15-3 final query minus order by */

    41  ), s3 as (

    ...     /* Listing 15-4 final query minus order by */

    53  )

    54  select

    55     product_id, mth, ts, yr, mthno, qty, cma, s

    56   , case when ts <= 36 then

    57        nvl(

    58           case qty

    59              when 0 then 0.0001

    60              else qty

    61           end / nullif(s, 0)

    62         , 0)

    63     end as des -- deseasonalized

    64  from s3

    65  order by product_id, mth;

    Listing 15-5

    Deseasonalizing sales data

    ```


    Deseasonalizing (“taking the season out of the data”) basically just is dividing
    the quantity with the seasonality factor. Once again I avoid problems with zeroes
    by turning them into a small value (lines 58–61) and avoid potential division
    by zero errors with a `nullif` call in line 61.


    In Figure [15-4](#475066_1_En_15_Chapter.xhtml#Fig4) you can see that I have values
    in column `des` for all 36 months and the line follows more or less the `cma`
    line (centered moving average). The more identical the seasonal variations was
    in each year, the closer the `des` line will match the `cma` line.


    Mostly the variations here are due to the zero sales that were turned into small
    values, where you’ll see a sharp spike followed by a sharp dip (or vice versa).
    But since the average of the spike and the dip hits the `cma` fairly well, it
    will even out in the next step (as I’ll show you). If I had left the zeroes (perhaps
    turning into `null` to avoid division by zero), I would have skewed the data and
    messed up the model.


