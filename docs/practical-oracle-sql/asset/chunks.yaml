- fmt: '### Handling the null dates


    To handle these `null` values, I change a little bit more in Listing [19-7](#475066_1_En_19_Chapter.xhtml#PC16).


    ```

    ...

    8  match_recognize (

    9     partition by emp_id

    10    order by start_date nulls first, end_date nulls last

    11    measures

    12       max(name)         as name

    13     , first(start_date) as start_date

    14     , nullif(

    15          max(nvl(end_date, date ''9999-12-31''))

    16        , date ''9999-12-31''

    17       )                 as end_date

    18     , count(*)          as jobs

    19    pattern (

    20       adjoin_or_overlap* last_row

    21    )

    22    define

    23       adjoin_or_overlap as

    24          nvl(next(start_date), date ''-4712-01-01'')

    25             <= max(nvl(end_date, date ''9999-12-31''))

    26 )

    27 order by emp_id, start_date;

    Listing 19-7

    Handling null=infinity for both start and end

    ```


    Even though this particular case only has `null` values in the `end_date`, for
    demonstration purposes, I have made the changes necessary to handle if there were
    `null` values in the `start_date` as well:


    *   In line 10, I make the `order by` a bit more explicit. If there had been `null`
    values in `start_date`, these would be considered earlier than any other `start_date`,
    so I use `nulls first` to make those rows come first. Similarly `null` values
    in `end_date` are considered later than any other `end_date`, so I use `nulls
    last` to make those rows come last.


    *   In comparisons I cannot simply use a `nulls first` to consider a `null` in
    `start_date` to be less than any other date, so in line 24, I turn a `null` into
    the smallest date possible in the Oracle `date` datatype.


    *   The aggregate function `max` ignores `null` values, so in line 25, I turn
    a `null` in `end_date` into the largest date possible in a `date`.


    *   To get a correct result in the `end_date` `measure`, I do the same `nvl` inside
    the `max` function in line 15. Then if the `max` results in the largest date,
    I use `nullif` in lines 14 and 16 to turn that back into `null` for output.


    With these expanded rules, I get the final output where the rows of Zoe Thorston
    also are merged into one:


    ```

    EMP_ID  NAME           START_DATE  END_DATE    JOBS

    142     Harold King    2010-07-01              2

    143     Mogens Juel    2010-07-01              4

    144     Axel de Proef  2010-07-01              2

    145     Zoe Thorston   2014-02-01              2

    146     Lim Tok Lo     2014-10-01  2016-02-01  1

    146     Lim Tok Lo     2017-03-01              1

    147     Ursula Mwbesi  2014-10-01  2015-05-01  1

    147     Ursula Mwbesi  2016-05-01              2

    ```


    This output matches Figure [19-3](#475066_1_En_19_Chapter.xhtml#Fig3), the result
    that I wanted.


    Now I cannot merge any further – the rows of this output are all neither overlapping
    nor adjoining.


    ## Lessons learned


    This is just a single example of merging rows with date ranges in a report on
    employee job history, but it serves as inspiration and lesson to enable you to
    go ahead and do the same for other data.


    In the course of the chapter, I’ve been explaining about


    *   The advantages of using half-open intervals for date ranges and how temporal
    validity can make it easier to query data with such intervals


    *   Using `match_recognize` to compare maximum values with next row to find overlapping
    or adjoining ranges and merge them into aggregate rows


    *   Expanding the rules to also handle situations where `null` indicates infinity


    You’ll likely find many places you can use these methods.


    # 20. Finding Abnormal Peaks


    In many cases there’s sequential data (often chronological) that’s supposed to
    have a fairly steady value or increasing/decreasing at a fairly steady rate. If
    there are spots in the data where it is *not* fairly steady, you want to know
    about it. Or in other words, if you graphically represent the data, you want to
    find the abnormal peaks and spikes.


    As a database professional, an obvious case of this situation is tablespace storage
    usage. Normally the number of GBs grows approximately the same rate each day/week/month
    – any excessive growth rate is indicative of an abnormal workload, which could
    be caused by a large scheduled onetime job or a bug causing a runaway process
    to falsely insert millions of rows.


    Another use case is the one I’ll use in this chapter – number of visits to individual
    web pages on the web site. Abnormal visit counts can mean denial-of-service attacks,
    high response to a marketing campaign, spam bots, and viral tweets – in all cases
    it’d be good to find such peaks in the data.


    I think you can easily think of many other similar use cases, but how then to
    spot those peaks? Putting the data on a graph often makes such peaks easily visible
    to the human eye, but you can’t make SQL code look at a graph – or can you? Well,
    in a sense, yes you can. I showed in Chapter [17](#475066_1_En_17_Chapter.xhtml)
    how to look for up-and-down patterns with `match_recognize` – it is a similar
    technique to find these peaks.


    ## Web page counter history


    As the example use case, I am going to use page counters for web pages – simply
    that each page on the Good Beer Trading Co web site has a counter that increments
    by 1 for every time someone visits that page.


    Every midnight the current value of each page counter is stored in the `web_counter_hist`
    table shown in Figure [20-1](#475066_1_En_20_Chapter.xhtml#Fig1), where you also
    see the `web_pages` and `web_apps` tables.


    ![../images/475066_1_En_20_Chapter/475066_1_En_20_Fig1_HTML.jpg](images/475066_1_En_20_Chapter/475066_1_En_20_Fig1_HTML.jpg)


    Figure 20-1


    The tables for storing web apps, pages, and counter history


    As the `web_counter_hist.page_no` column is not very human-friendly, in Listing
    [20-1](#475066_1_En_20_Chapter.xhtml#PC1), I create a view joining the three tables.


    ```

    SQL> create or replace view web_page_counter_hist

    2  as

    3  select

    4     ch.app_id

    5   , a.name as app_name

    6   , ch.page_no

    7   , p.friendly_url

    8   , ch.day

    9   , ch.counter

    10  from web_apps a

    11  join web_pages p

    12     on p.app_id = a.id

    13  join web_counter_hist ch

    14     on ch.app_id = p.app_id

    15     and ch.page_no = p.page_no;

    View WEB_PAGE_COUNTER_HIST created.

    Listing 20-1

    View joining web apps, pages, and counter history

    ```


    Having set the stage, I am now ready to dive into the data.'
