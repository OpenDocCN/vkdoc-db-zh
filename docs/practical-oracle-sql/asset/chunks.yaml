    ## Lessons learned


    Analytic functions are extremely useful and can solve a lot of things, including
    rolling sums to find when you reach some minimum. But it cannot do all, so in
    this chapter, I showed you a mix of


    *   Subtracting a rolling sum from a starting figure to discover when a minimum
    (or zero) has been reached


    *   Using recursive subquery to repeatedly replenish the dwindling figure whenever
    minimum has been reached


    *   Using the model clause to accomplish the same with an alternative data access
    plan


    Though it’s a mix of techniques, all in all they should help you solve similar
    cases in the future.


    # Part IIIRow Pattern Matching


    # 17. Up-and-Down Patterns


    Using `match_recognize` is also known as *row pattern matching* for a reason –
    it is very applicable for situations where you have data nicely ordered in, for
    example, a time series that can be depicted with a value on the y axis and the
    time on the x axis of a graph. Visually on a graph is an easy way for us humans
    to look for patterns – `match_recognize` can do the same with SQL.


    It doesn’t necessarily have to be time on the x axis, and there could be multiple
    values on the y axis – the thing to remember is that if you as human would visualize
    something on line graphs and look for patterns on the graphs, you can code SQL
    to go through the data a lot faster than your eyes can spot patterns visually.


    This chapter exemplifies this approach step by step, so that at the end you can
    apply the technique for similar pattern searching on other types of data.


    ## The stock ticker example


    In the Oracle Data Warehousing Guide, pattern matching examples are given using
    stock ticker data, because they are a nice example of data with a value that changes
    over time, where analysts look for specific patterns like V and W shapes that
    can indicate if it’s time to buy or sell shares. I’ll do the same.


    In the `practical` schema, I have created the tables shown in Figure [17-1](#475066_1_En_17_Chapter.xhtml#Fig1)
    for storing information on stock and their prices. The examples in the chapter
    only concern themselves with the `ticker` table , but for completeness, the `stock`
    table is created too.


    ![../images/475066_1_En_17_Chapter/475066_1_En_17_Fig1_HTML.jpg](images/475066_1_En_17_Chapter/475066_1_En_17_Fig1_HTML.jpg)


    Figure 17-1


    The ticker table used in this chapter


    I have created a fictional stock symbol BEER for my Good Beer Trading Co. In the
    ticker table, I’ve inserted the end-of-day stock prices for three weeks of stock
    trading in April 2019, depicted on the graph in Figure [17-2](#475066_1_En_17_Chapter.xhtml#Fig2).


    ![../images/475066_1_En_17_Chapter/475066_1_En_17_Fig2_HTML.jpg](images/475066_1_En_17_Chapter/475066_1_En_17_Fig2_HTML.jpg)


    Figure 17-2


    Graphical depiction of the data in the TICKER table


    Those 15 days of stock prices will be the basis for my walk-through of pattern
    matching for up-and-down patterns.


    ## Classifying downs and ups


    When developing a pattern matching query, I typically start simple.


    Almost always I’ll know beforehand what I want to partition by, as well as the
    ordering the data needs to be in for the pattern matching to make sense. For example,
    for the stock ticker data, I want to look for patterns within each `symbol` value
    separately, so I will use `partition by` for that purpose (this data only contains
    a single symbol, but there might have been more). And the patterns I’m looking
    for deal with how the data changes over time, so I do `order by` the `day` column
    (within each symbol).


    Then I build my first skeleton query (shown in Listing [17-1](#475066_1_En_17_Chapter.xhtml#PC1)),
    where I `define` how I want my rows to be classified and have the simplest possible
    `pattern` enabling me to test if my definitions are as I want them.


    ```

    SQL> select *

    2  from ticker

    3  match_recognize (

    4     partition by symbol

    5     order by day

    6     measures

    7        match_number() as match

    8      , classifier()   as class

    9      , prev(price)    as prev

    10     all rows per match

    11     pattern (

    12        down | up

    13     )

    14     define

    15        down as price  prev(price)

    17  )

    18  order by symbol, day;

    Listing 17-1

    Classifying the rows

    ```


    Apart from the `partition by` and `order by`, I like to go over the clauses from
    the bottom going up – that makes more sense to me.


    So in lines 15 and 16, I am defining that if the price in a row is less than the
    price in the previous row, the row is to be classified as a `down` row, but if
    the price is greater than the previous, the row is to be classified as an `up`
    row.


    The pattern in row 12 is as simple as possible – a match consists of a single
    row that is either a `down` row or an `up` row (the `|` sign is used for logical
    *or* in the `pattern`.) This is of course not the pattern I will end up with;
    it is merely a convenient pattern to test if my classification definitions give
    me what I want.


    Since my pattern in this case only gives a single row for each match, I’d get
    the same number of rows in my output if I chose `one row per match` in line 10
    instead of the `all rows per match` I use here. But a difference is that `one
    row` would only output the columns used in `partition` and `order by` as well
    as the measures, while `all rows` output all columns of the table. That helps
    for debugging while developing, even if I know that my final desired result will
    use `one row per match`.


    Lines 7–9 define what measures I want in the output (besides the table columns).
    Function `match_number()` shows me which rows belong together in a match (in this
    case always single rows in a match, but later that will change). Function `classifier()`
    shows me which classification definition the row got, which is what I want to
    see if I got right. And lastly in line 9, I output the previous price, so I can
    double-check that the correlation between price and previous price matches the
    classification.


