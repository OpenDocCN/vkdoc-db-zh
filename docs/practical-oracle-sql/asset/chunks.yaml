  trans: '

    因此，我的最佳实践法则是：每当使用 `order by` 子句时，我总是*显式*地编写窗口子句，*从不*依赖默认设置。即使对于那些窗口恰好是 `range
    between unbounded preceding and current row` 的罕见情况，我仍然会显式地写出来。这告诉未来的我，或者将来维护我代码的任何开发人员，`range
    between` 是故意的。如果我看到缺少窗口子句的代码，我总会怀疑它是否真的应该是 `range between`，或者只是从论坛帖子中误解了的复制粘贴。


    当然，这仅适用于支持窗口子句的分析函数。另外，如果我的窗口是整个分区，我也不会使用它，此时我干脆省略 `order by` 和窗口子句，而不是写 `rows
    between unbounded preceding and unbounded following`。


    但即使清单 11-5 遵循了这个经验法则，它还有另一个问题：由于优化器使用的访问计划不同，具有重复值的行在输出中的顺序可能不同，导致在不同代码执行中可能从相同数据得到不同的输出。


    这个问题并不严格影响解决方案的正确性，但当用户观察到不同的输出时（即使两种输出都是正确的），他们很可能会质疑正确性。因此，我将以下做法作为最佳实践：在分析函数中（当使用
    `rows between` 时，不适用于 `range between`），使 `partition by` 和 `order by` 中使用的列组合是唯一的。这使得输出是*确定性的*，因此用户可以验证他在每次运行中都得到相同的结果。


    清单 11-9 展示了进行累计汇总的这两个最佳实践。


    ```

    SQL> select

    2     ol.product_id as p_id

    3   , p.name        as product_name

    4   , ol.order_id   as o_id

    5   , ol.qty

    6   , sum(ol.qty) over (

    7        partition by ol.product_id

    8        order by ol.qty, ol.order_id

    9        rows between unbounded preceding

    10                 and current row

    11     ) as p_qty

    12  from orderlines ol

    13  join products p

    14     on p.id = ol.product_id

    15  where ol.product_id in (4280, 6600)

    16  order by ol.product_id, ol.qty, ol.order_id;

    清单 11-9

    累计求和的一个最佳实践

    ```


    实际上，我只对每个 `product_id` 分区内的 `qty` 排序感兴趣（如清单 11-5 所示），但这两个列的组合并不唯一，使得输出是非确定性的。因此，我在两个
    `order by` 子句中（第 8 行和第 16 行）都添加了 `order_id`：


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   60

    4280  Hoppy Crude Oil  427   60   120

    4280  Hoppy Crude Oil  422   80   200

    4280  Hoppy Crude Oil  429   80   280

    4280  Hoppy Crude Oil  428   90   370

    4280  Hoppy Crude Oil  421   110  480

    6600  Hazy Pink Cloud  424   16   16

    6600  Hazy Pink Cloud  426   16   32

    6600  Hazy Pink Cloud  425   24   56

    ```


    这确保了输出的确定性。


    在这种情况下，语句甚至可以只使用单个排序操作来执行，因为分析函数 `partition by` 中的列后接分析函数 `order by` 中的列，与最终第
    16 行的 `order by` 中的列相匹配。这使得优化器可以跳过最终的排序，因为分析函数的评估已经正确地对数据进行了排序。


    ## 经验教训


    本章介绍了分析函数的三个子句的基本要素。虽然我是专门使用 `sum` 函数来展示的，但你可以将其推广到其他分析函数，并运用你学到的关于以下内容的知识：


    - 使用 `partition by` 将行分割成若干部分，分析函数在每个部分内单独应用。

    - 使用窗口子句与 `order by` 结合，创建移动的行窗口来计算，例如，累计汇总。

    - 理解*默认*窗口子句很少适用于你的用例，因此始终使用*显式*窗口子句是个好主意。


    充分理解这些子句后，你就可以让分析函数为你解决许多原本困难的任务。本书这一部分的后续章节将专门介绍几个这样的解决方案。


    # 12. 回答 Top-N 问题


    我认为几乎没有开发者没有被要求创建过 Top-N 报告。业务部门提出的可以归类为 Top-N 问题的问题比比皆是，例如以下这些：


    - 我们的哪些产品最畅销？

    - 哪些用户资料发布的推文最多？

    - 哪些销售员工产生的潜在客户最多？

    - 连锁酒店中哪些酒店收到的投诉最少？


    最后一个严格来说可以称为 Bottom-N 问题，但这在原则上完全是一回事。对于 Top-N 报告，你按特定*降序*对数据进行排序，并挑选 Top-N 行数据。如果你想要
    Bottom-N 报告，你只需按特定*升序*对数据进行排序，然后仍然挑选 Top-N 行数据。在 SQL 术语中，这仅仅是做 `order by col_name
    desc` 与 `order by col_name asc` 的问题。所以我只展示 Top-N 的例子——Bottom-N 你可以通过将 `desc` 替换为
    `asc` 来得到。


    为了演示 Top-N SQL，我使用上面列表中的第一个问题：我们的哪些产品最畅销？


    ## 销售数据的 Top-N


    由于我的 Good Beer Trading 公司销售啤酒，市场部要求我找出公司销售的 Top-3 最畅销啤酒，以便他们可以开展一个类似图 12-1 所示的领奖台活动。


    ![../images/475066_1_En_12_Chapter/475066_1_En_12_Fig1_HTML.jpg](img/475066_1_En_12_Fig1_HTML.jpg)


    图 12-1 按总销售额排名的 Top-3 啤酒


    他们现在给我的这个问题相当笼统，所以我需要回头找他们，让他们具体说明他们的意思。我是按销售数量还是销售金额来确定排序？他们想要的是有史以来的最畅销品还是特定年份的？如果有并列情况，即两种或多种啤酒销量相同，我该怎么办？


    通常，作为开发者，获得所需详细规格说明的最简单方法是给他们举例，因为他们有时不理解为什么“Top-3 最畅销啤酒”是一个模糊的问题。


    ### 你指的是哪种 Top-3？


    特别是在出现并列时该怎么做存在模糊性。一般来说有三种情况：


    - Top-行规则：“*我正好要 3 行*。” 在这种情况下，我需要向业务部门解释，这意味着他们不会看到，例如，与第三行值完全相同的第四行。对于这样的并列，输出不会显示两行，而只显示其中一行。在这种情况下，要么是随机显示一行，要么业务部门需要决定一个平局规则来确定输出哪一行。

    - 奥运会规则：“*我想要金、银、铜牌，按奥运会的方式*。” 根据体育比赛中常用的规则，例如，如果第一名并列，则颁发两枚金牌，然后跳过银牌，第三名获得铜牌。使用此规则可能导致输出超过三行，例如，当铜牌并列时，将有一个第一名、一个第二名和两个第三名，总共输出四行。

    - Top-值规则：“*我想要所有拥有 Top-3 值的行*。” 使用前一个规则，如果第二名并列，将有一个金牌和两个银牌，但没有铜牌。这个规则规定，无论第一名、第二名、第三名有多少并列，输出都应包含所有拥有
    Top-3 值的行。


    所有这些 Top-3 规则都可以在 SQL 中处理——我将演示如何做。

    '
- fmt: '## The sales data for the beer


    Figure [12-2](#475066_1_En_12_Chapter.xhtml#Fig2) shows the tables with the beer
    sales data per month and the beer product names.


    ![../images/475066_1_En_12_Chapter/475066_1_En_12_Fig2_HTML.jpg](images/475066_1_En_12_Chapter/475066_1_En_12_Fig2_HTML.jpg)


    Figure 12-2: Tables holding monthly sales for products.


    I’ll be doing Top-N queries both on the total sales of the products and the sales
    for each year (there’s sales data for 2016, 2017, and 2018), and in Listing [12-1](#475066_1_En_12_Chapter.xhtml#PC1),
    I have a couple of views that aggregate the monthly sales.


    ```

    SQL> create or replace view total_sales

    2  as

    3  select

    4     ms.product_id

    5   , max(p.name) as product_name

    6   , sum(ms.qty) as total_qty

    7  from products p

    8  join monthly_sales ms

    9     on ms.product_id = p.id

    10  group by

    11     ms.product_id;

    View TOTAL_SALES created.

    SQL> create or replace view yearly_sales

    2  as

    3  select

    4     extract(year from ms.mth) as yr

    5   , ms.product_id

    6   , max(p.name) as product_name

    7   , sum(ms.qty) as yr_qty

    8  from products p

    9  join monthly_sales ms

    10     on ms.product_id = p.id

    11  group by

    12     extract(year from ms.mth), ms.product_id;

    View YEARLY_SALES created.

    ```


    Listing 12-1: Views for aggregating sales on total and year level.


    Querying the `total_sales` view, I can order it by `total_qty desc` in Listing
    [12-2](#475066_1_En_12_Chapter.xhtml#PC2).


    ```

    SQL> select product_name, total_qty

    2  from total_sales

    3  order by total_qty desc;

    ```


    Listing 12-2: A view of the total sales data.


    That shows me the ten beers from the products table, and I can visually see here
    which beers are the Top-3 best-selling beers. Since we have a tie for second place,
    then by the top-rows and the Olympic rules, it’s the first three rows, and by
    the top-values rule, it’s the first four rows:


    ```

    PRODUCT_NAME      TOTAL_QTY

    Reindeer Fuel     1604

    Ghost of Hops     1485

    Monks and Nuns    1485

    Der Helle Kumpel  1230

    Hercule Trippel   1056

    Summer in India   961

    Pale Rider Rides  883

    Coalminers Sweat  813

    Hazy Pink Cloud   324

    Hoppy Crude Oil   303

    ```


    I could query the `yearly_sales` view the same way:


    ```

    SQL> select yr, product_name, yr_qty

    2  from yearly_sales

    3  order by yr, yr_qty desc;

    ```


    But in Listing [12-3](#475066_1_En_12_Chapter.xhtml#PC5), I’m going to use the
    pivoting technique from Chapter [8](#475066_1_En_8_Chapter.xhtml) to show the
    ranking of the beers in columns for each year. Not that it is necessary for doing
    Top-N queries, but it visualizes the difference in the data over the three years.


    ```

    SQL> select *

    2  from (

    3     select

    4        yr, product_name, yr_qty

    5      , row_number() over (

    6           partition by yr

    7           order by yr_qty desc

    8        ) as rn

    9     from yearly_sales

    10  )

    11  pivot (

    12     max(product_name) as prod

    13   , max(yr_qty)

    14     for yr in (

    15        2016, 2017, 2018

    16     )

    17  )

    18  order by rn;

    ```


    Listing 12-3: A view of the yearly sales data (manually formatted, not ansiconsole).


    I’m getting a little ahead of myself with the use of analytic function `row_number`
    in lines 5–8. I’ll explain more in a little while, but what it does here is assigning
    the numbers 1–10 to each beer *within each year* in order of quantity sold. This
    number (`rn`) is then used for the implicit group by in the `pivot`, so I get
    an output with ten rows numbered 1–10 having two columns for each year – the name
    of the beer and the quantity sold:


    ```

    RN 2016_PROD 2016 2017_PROD 2017 2018_PROD 2018

    --- --------- ---- --------- ---- --------- ----

    1 Ghost of   552 Monks and  582 Reindeer   691

    Hops            Nuns          Fuel

    2 Monks and  478 Reindeer   582 Pale Ride  491

    Nuns          Fuel           r Rides

    3 Der Helle  415 Ghost of   482 Hercule T  451

    Kumpel        Hops           rippel

    4 Summer in  377 Der Helle  458 Ghost of   451

    India          Kumpel        Hops

    5 Reindeer   331 Hercule T  344 Monks and  425

    Fuel           rippel          Nuns

    6 Coalminer  286 Summer in  321 Der Helle  357

    s Sweat         India          Kumpel

    7 Hercule T  261 Coalminer  227 Coalminer  300

    rippel         s Sweat        s Sweat

    8 Pale Ride  182 Pale Ride  210 Summer in  263

    r Rides        r Rides         India

    9 Hazy Pink  121 Hazy Pink  105 Hoppy Cru  132

    Cloud          Cloud         de Oil

    10 Hoppy Cru   99 Hoppy Cru   72 Hazy Pink   98

    de Oil         de Oil          Cloud

    ```


    I’ve made the beer name columns narrow with `sqlcl` column formatting to get line
    breaks in the names instead of line breaks that put 2018 data below 2016 and 2017.
    This way doesn’t break names as nice, but the quantities are aligned to make it
    easy to observe the ordering in each year and where the ties are. Notice there’s
    a tie for first place in 2017 and a tie for third place in 2018.


    ## Traditional rownum method


    Before analytic functions, a traditional method for a Top-N query was to do an
    inline view with the desired `order by` clause and then filter on `rownum <=`
    in the outer query, as I show in Listing [12-4](#475066_1_En_12_Chapter.xhtml#PC7).


    ```

    SQL> select *

    2  from (

    3     select product_name, total_qty

    4     from total_sales

    5     order by total_qty desc

    6  )

    7  where rownum <= 3;

    ```


    Listing 12-4: Top-3 using inline view and filter on rownum.


    This method gives me the Top-3 beers according to the top-rows rule:


    ```

    PRODUCT_NAME    TOTAL_QTY

    Reindeer Fuel   1604

    Monks and Nuns  1485

    Ghost of Hops   1485

    ```


    It works fine and is performant – the optimizer recognizes the construct and will
    do as little work as possible to get only the desired three rows.


    However, this method cannot as easily help us with the Olympic rule and the top-values
    rule. For those it is much easier to use analytic functions.'
