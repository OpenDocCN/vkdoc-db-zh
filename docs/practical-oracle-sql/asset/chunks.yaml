  trans: '# 自定义聚合函数 stragg


    早在 Oracle 11.2 版本问世之前，人们在著名的 Tom Kyte 的 [*http://asktom.oracle.com*](http://asktom.oracle.com)
    网站上经常提出的一个问题是如何进行字符串聚合。于是 Tom 开发了一个名为 `stragg` 的自定义聚合函数作为答案，多年来被许多人使用。在此，我将展示一个我在此基础上添加了若干改进的版本。


    ## 注意事项


    您可能会在数据库的 `SYS` 模式中发现一个名为 `stragg` 的函数。这是一个基于 C 库、随 `dbms_xmlindex` 包一起安装的、鲜为人知的函数。它没有文档记录，专为
    XML 索引实现中的某些特定任务而设计。**请勿使用它！** 无法保证它的工作方式，并且很容易在不知情的情况下以不受支持的方式调用它，从而导致错误或错误结果。


    Oracle 数据 cartridges 接口 (`ODCI`) 是一组用于实现相当底层功能的接口函数，这些功能的使用方式与内置函数非常相似。它主要由库作者（例如使用
    C 语言）实现特殊功能时使用，但也可以用于在纯 `PL/SQL` 中实现的更简单的情况。


    由于本书主要是关于 `SQL` 的，我不会浪费纸张将整个实现打印在书中。因此，我将分段展示如代码清单 10-6 所示的创建语句，但跳过主体的大部分内容。


    ```

    SQL> create or replace type stragg_expr_type as object (

    2     element    varchar2(4000 char)

    3   , delimiter  varchar2(4000 char)

    4   , map member function map_func return varchar2

    5  );

    6  /

    Listing 10-6

    用于实现自定义聚合的类型、类型体和函数

    ```


    Tom Kyte 最初的 `stragg` 函数只是简单地聚合一个 `varchar2`，并且硬编码了所使用的分隔符，因为聚合函数无法创建多个参数。我改为聚合一个对象类型
    `stragg_expr_type`，允许我将所需的分隔符作为对象的第二个属性传递。


    ```

    SQL> create or replace type body stragg_expr_type

    2  as

    3     map member function map_func return varchar2

    4     is

    5     begin

    6        return element || ''|'' || delimiter;

    7     end map_func;

    8  end;

    9  /

    ```


    我在对象类型中实现了一个 `map member function`，因为它允许数据库判断两个对象是否相同。这反过来使得我的聚合函数能够支持 `distinct`
    关键字，而这正是 `listagg` 直到 19c 版本才具备的功能之一。


    ```

    SQL> create or replace type stragg_type as object

    2  (

    3     aggregated varchar2(4000)

    4   , delimiter  varchar2(4000)


    6   , static function ODCIAggregateInitialize(

    7        new_self    in out stragg_type

    8     ) return number


    10   , member function ODCIAggregateIterate(

    11        self        in out stragg_type

    12      , value       in     stragg_expr_type

    13     ) return number


    15   , member function ODCIAggregateTerminate(

    16        self        in     stragg_type

    17      , returnvalue out    varchar2

    18      , flags       in     number

    19     ) return number


    21   , member function ODCIAggregateMerge(

    22        self        in out stragg_type

    23      , other_self  in     stragg_type

    24     ) return number

    25  );

    26  /

    ```


    然后我定义了将要实现实际聚合的类型 `stragg_type`。我使用的两个属性用于内部实现。这四个函数由 `ODCI` 接口规定，必须按所示命名，并且参数列表必须完全一致（参数名称可以不同，但参数的顺序和类型必须匹配）：


    *   `ODCIAggregateInitialize` 类似于构造函数，在聚合开始时由数据库显式调用，因此我在此创建该对象的一个新实例。

    *   `ODCIAggregateIterate` 由数据库对每个要聚合的字符串调用，因此我在此将分隔符和字符串添加到 `aggregated` 属性中。（在原始的
    `stragg` 中，`value` 参数只是一个 `varchar2`；这里我传递的是一个 `stragg_expr_type` 类型的值。）

    *   `ODCIAggregateTerminate` 在聚合结束时由数据库调用，当它需要结果时，我在此返回聚合后的字符串。

    *   如果数据库决定将聚合工作拆分成多个部分（例如，在并行查询中），每个部分都会调用 `ODCIAggregateInitialize` 来获取一个对象，然后通过
    `ODCIAggregateIterate` 进行聚合。最后，每个部分都将拥有一个对象，其中一些字符串聚合在 `aggregated` 属性中——数据库随后将调用
    `ODCIAggregateMerge` 来合并内容，因此在此函数中，我将 `other_self` 对象的 `aggregated` 内容附加到 `self`
    对象中。


    以上是对函数中需要实现的内容的文字描述，然后我只需要在类型体中编写代码即可。


    ```

    SQL> create or replace type body stragg_type

    2  is

    ...

    54  end;

    55  /

    ```


    关于在类型体中实现这四个函数的代码，请参见配套脚本 *practical_fill_schema.sql*。


    ```

    SQL> create or replace function stragg(input stragg_expr_type )

    2     return varchar2

    3     parallel_enable aggregate using stragg_type;

    4  /

    ```


    创建了用于实现的对象类型后，最后要做的就是创建聚合函数 `stragg` 本身。输入参数的数据类型必须与 `ODCIAggregateIterate` 函数的
    `value` 参数匹配，返回数据类型必须与 `ODCIAggregateTerminate` 函数的 `returnvalue` 参数匹配。


    `aggregate using stragg_type` 告诉数据库这是一个由对象类型 `stragg_type` 实现的自定义聚合函数，因此当数据库使用此函数执行聚合时，它将调用该类型的
    `ODCI∗` 函数。关键字 `parallel_enable` 指定数据库可以使用并行化，因为我已实现了 `ODCIAggregateMerge`。


    创建了这些对象后，我现在可以在代码清单 10-7 中使用我的自定义聚合函数。


    ```

    SQL> select

    2     max(brewery_name) as brewery_name

    3   , stragg(

    4        stragg_expr_type(product_name, '','')

    5     ) as product_list

    6  from brewery_products

    7  group by brewery_id

    8  order by brewery_id;

    Listing 10-7

    使用 stragg 自定义聚合函数

    ```


    由于我使用 `ODCI` 接口将此函数声明为聚合函数，我可以在第 3-5 行像使用任何内置聚合函数一样使用 `stragg`。输入数据类型是 `stragg_expr_type`，因此我使用类型构造函数，传入产品名称和逗号作为分隔符。


    ## 注意


    使用对象类型向聚合函数传递分隔符的技巧很有效，但这确实需要我作为开发人员有一点自律精神，因为我需要确保分隔符是一个常量。原则上，我可以在每一行传递不同的分隔符值，但这会在实现中导致问题。我已尝试实现为使用首次调用
    `ODCITableIterate` 时传入的分隔符，但在并行化的情况下，会有多次来自不同行的 `ODCITableIterate` 调用。因此，确保分隔符值是常量非常重要——最安全的方式是使用字面量。


    代码清单 10-7 的输出与我从 `listagg` 和 `collect` 获得的输出几乎相同，但不一定完全一样：


    ```

    BREWERY_NAME        PRODUCT_LIST

    Balthazar Brauerei  Monks and Nuns,Der Helle Kumpel,Hercule Trippel

    Happy Hoppy Hippo   Hazy Pink Cloud,Ghost of Hops,Summer in India

    Brewing Barbarian   Coalminers Sweat,Pale Rider Rides,Hoppy Crude Oil,Reindeer
    Fuel

    ```'
- fmt: 'The product names within the `product_list` column are the same – the result
    is identical in terms of values. But the order of products within the delimited
    string is indeterminate with this custom aggregate function – I cannot implement
    an `order by` clause for `stragg`.


    A thing to note here is the behavior if I add the `distinct` clause to the call
    to `stragg`:


    ```

    ...

    4        distinct stragg_expr_type(product_name, '','')

    ...

    ```


    Suddenly the beers are alphabetically ordered in the product list:


    ```

    BREWERY_NAME        PRODUCT_LIST

    Balthazar Brauerei  Der Helle Kumpel,Hercule Trippel,Monks and Nuns

    Happy Hoppy Hippo   Ghost of Hops,Hazy Pink Cloud,Summer in India

    Brewing Barbarian   Coalminers Sweat,Hoppy Crude Oil,Pale Rider Rides,Reindeer
    Fuel

    ```


    This is a side effect of the database having to sort the product names in order
    to get the distinct values. But it cannot be guaranteed always to be ordered and
    work like you see here – the database might figure out a way to, for example,
    use a hash function to do `distinct`, and then the result will be very unordered.


    ## Aggregate function xmlagg


    So you’ve now seen `listagg`, `collect`, and `stragg` – if that’s not enough,
    the following listing shows a fourth method of string aggregation using `xmlagg`.


    ```

    SQL> select

    2     max(brewery_name) as brewery_name

    3   , rtrim(

    4        xmlagg(

    5           xmlelement(z, product_name, '','')

    6           order by product_id

    7        ).extract(''//text()'').getstringval()

    8      , '',''

    9     ) as product_list

    10  from brewery_products

    11  group by brewery_id

    12  order by brewery_id;

    Listing 10-8

    Using xmlagg and extract text from xml

    ```


    Examining the expression I use here, it works like this:


    *   In line 5, I create an XML element called `z` (the name is irrelevant) containing
    a concatenation of the product name and a comma.


    *   Using `xmlagg` in lines 4 and 6, I create an XML snippet that is an aggregation
    of the `z` XML elements created in the preceding text – ordered by product id.


    *   In line 7, I get rid of the XML tags in the snippet, keeping only the text
    values.


    *   The aggregated text at this point now has a trailing comma too much, so I
    get rid of that using `rtrim` in lines 3 and 8.


    All of that together makes Listing 10-8 return the exact same output as `listagg`
    and `collect` in Listings 10-3 and 10-5.


    So what’s up with this `z` XML element? What’s the purpose of this? Well, if I
    was to do just the `xmlagg(xmlelement(...` alone and skip the `extract` and `rtrim`,
    this would be the output for Balthazar Brauerei:


    ```

    Monks and Nuns,Hercule Trippel,Der Helle Kumpel,

    ```


    You see the XML start and end tags for a series of `z` elements, each containing
    a product name and comma. The actual name I use for the XML tag is irrelevant,
    so it might as well be as short as possible, because it is stripped away anyway,
    when I do `extract(''//text()'')` on it:


    ```

    Monks and Nuns,Hercule Trippel,Der Helle Kumpel,

    ```


    And now you can see why the `rtrim` is necessary to remove the comma at the end.


    Creating the `z` XML element is the nice way to behave when using `xmlagg`. But
    there is actually an alternative that can save you from needing to do the `extract`
    to strip away XML tags.


    The function `xmlparse` takes xml as text and transforms it to `XMLType` datatype.
    Normally it will check if it is good XML, but it also supports the keyword `wellformed`,
    by which you tell the database “trust me, this is good XML, you do not need to
    check it.” So I can replace the use of `xmlelement` with `xmlparse` and thereby
    skip having to use `extract`:


    ```

    ...

    4        xmlagg(

    5           xmlparse(content product_name || '','' wellformed)

    6           order by product_id

    7        ).getstringval()

    ...

    ```


    This will directly give me the output with no XML tags, ready to use the `rtrim`
    function to get rid of the last comma:


    ```

    Monks and Nuns,Hercule Trippel,Der Helle Kumpel,

    ```


    Why would you consider using `xmlagg` when you have the other alternatives I’ve
    shown? Partly it is nice in older databases that string aggregation is possible
    with `xmlagg` without having to install your own datatypes; partly it is one of
    the ways to handle very long aggregations, as I’ll show you now.


    ## When it doesn’t fit in a VARCHAR2


    The string aggregations I’ve shown so far will all fail, if the aggregated output
    is longer than the maximum length of a `varchar2` – normally 4000 bytes, but could
    be 32,767 bytes if your database `max_string_size` is set to `extended`.


    What to do then if you need larger output? To show you that, I’m going to use
    the table `monthly_sales` and join it to the `products` table.


    I have monthly sales data for 3 years for each of my 10 products, so 360 rows
    in this table. Imagine I need to output the product name for each of those rows
    in a fixed length format – that is, each product name padded with spaces so it
    fills exactly 20 characters without using any delimiters. The result is a single
    string 7200 characters.


    In the following listing, I attempt to generate this string using `listagg` –
    as I use no `group by`, I should get a single row with a single column in the
    output having this 7,200-character fixed length list of 360 product names.


    ```

    SQL> select

    2     listagg(rpad(p.name, 20)) within group (

    3        order by p.id

    4     ) as product_list

    5  from products p

    6  join monthly_sales ms

    7     on ms.product_id = p.id;

    Error starting at line : 1 in command -

    Error report -

    ORA-01489: result of string concatenation is too long

    Listing 10-9

    Getting ORA-01489 with listagg

    ```


    But it fails in my database where a `varchar2` can be at most 4,000 bytes long.
    To work around this, I have different options.'
