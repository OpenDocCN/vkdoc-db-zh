- fmt: '### Easy switch of picking principle


    But first I''d like to stress the point that the `order by` of the query itself
    and the `order by` within the analytic function do not have to be identical, as
    they were in Listing [13-3](#475066_1_En_13_Chapter.xhtml#PC4); they can be different
    like in the picking list query of Listing [13-6](#475066_1_En_13_Chapter.xhtml#PC10),
    where I use this fact to select the inventory in FIFO order with the analytic
    `order by`, but give the output of the selected rows in location order.


    This separation means that I can easily switch picking principle simply by changing
    my analytic `order by`, but still get an output in location order.


    So for these examples, imagine that beers can keep indefinitely, so it does not
    matter if I use the first-in, first-out principle or not.


    I could then use a picking principle saying that I want to prioritize locations
    close to the starting point of the driver to give him a short picking route. I
    just need to change line 11 in Listing [13-6](#475066_1_En_13_Chapter.xhtml#PC10):


    ```

    ...

    11           order by i.warehouse, i.aisle, i.position

    ...

    ```


    Selecting inventory to pick in location order gives a short route; he does not
    have to enter warehouse 2 at all:


    ```

    WH  AI  POS  P_ID  PICK_Q

    1   A   4    4280  37

    1   A   16   6520  48

    1   A   29   6520  14

    1   B   32   6520  43

    1   C   1    4280  36

    1   C   5    6520  35

    1   D   18   4280  37

    ```


    Or I could use as picking principle that I want the smallest number of picks:


    ```

    ...

    11           order by i.qty desc

    ...

    ```


    This will pick from inventories with large quantities first, making it possible
    to fulfill the order with just five picks:


    ```

    WH  AI  POS  P_ID  PICK_Q

    1   A   4    4280  37

    1   C   1    4280  34

    1   C   5    6520  68

    1   D   18   4280  39

    2   A   1    6520  72

    ```


    But if I pick from large quantities first, then over time the warehouse will be
    full of locations that have just a small quantity that was “left over” from previous
    picks. I could choose a picking principle that will clean up such small quantities,
    freeing the locations for new inventory:


    ```

    ...

    11           order by i.qty

    ...

    ```


    Ordering by quantity `asc` instead of `desc` helps cleaning out locations in the
    warehouse, but of course then the operator has to pick in more places:


    ```

    WH  AI  POS  P_ID  PICK_Q

    1   A   29   6520  14

    1   B   32   6520  21

    1   C   1    4280  22

    1   C   13   6520  20

    2   B   3    4280  35

    2   B   5    6520  14

    2   B   26   6520  24

    2   C   7    4280  19

    2   C   20   4280  34

    2   C   31   6520  21

    2   D   9    6520  26

    ```


    As you can see, having separated the `order by` that selects the inventory from
    the `order by` that controls the picking order, it is easy to switch picking strategies.


    With that point made, back to solving the routing problem of Figure [13-2](#475066_1_En_13_Chapter.xhtml#Fig2).


    ### Solving optimal picking route


    Simply ordering the output in location order means the picking operator needs
    to drive in the same direction (“upward”) in every aisle – this is not optimal.
    I''d like him to switch directions so that every other aisle he drives “down.”


    But it is not so simple that I can just say up in aisle A and C, down in aisle
    B and D. Instead I need it to be up in the first, third, fifth…aisle he visits
    and then down in the second, fourth, sixth…aisle he visits.


    To do that, I start by expanding Listing [13-6](#475066_1_En_13_Chapter.xhtml#PC10)
    with an extra column giving each visited aisle a consecutive number (Listing [13-7](#475066_1_En_13_Chapter.xhtml#PC18)).


    ```

    SQL> select

    2     wh, ai

    3   , dense_rank() over (

    4        order by wh, ai

    5     ) as ai#

    6   , pos, p_id

    7   , least(loc_q, ord_q - acc_prv_q) as pick_q

    8  from (

    ...

    26  )

    27  where acc_prv_q < ord_q

    28  order by wh, ai, pos;

    Listing 13-7

    Consecutively numbering visited warehouse aisles

    ```


    The analytic function `dense_rank` in lines 3–5 gives the same rank to rows that
    have the same value in the columns used in the `order by`. And unlike `rank`,
    `dense_rank` does not skip any numbers (as I showed in Chapter [12](#475066_1_En_12_Chapter.xhtml));
    it assigns the ranks consecutively.


    So using warehouse and aisle in the `order by` in `dense_rank`, the `ai#` column
    contains the “visited aisle number” I want:


    ```

    WH  AI  AI#  POS  P_ID  PICK_Q

    1   A   1    16   6520  42

    1   A   1    29   6520  14

    1   C   2    1    4280  36

    1   C   2    13   6520  20

    1   D   3    18   4280  39

    2   B   4    3    4280  35

    2   B   4    5    6520  14

    2   B   4    26   6520  24

    2   D   5    9    6520  26

    ```


    That enables me to wrap Listing [13-7](#475066_1_En_13_Chapter.xhtml#PC18) in
    an inline view to create Listing [13-8](#475066_1_En_13_Chapter.xhtml#PC20) with
    an odd-even ordering logic.


    ```

    SQL> select *

    2  from (

    ...

    30  )

    31  order by

    32     wh, ai#

    33   , case

    34        when mod(ai#, 2) = 1 then +pos

    35                             else -pos

    36     end;

    Listing 13-8

    Ordering ascending and descending alternately

    ```


    First, I order by warehouse and visited aisle, but then within each aisle, I use
    the `case` structure in lines 33–36 to order the positions *ascending* in odd
    numbered aisles and *descending* in even numbered aisles:


    ```

    WH  AI  AI#  POS  P_ID  PICK_Q

    1   A   1    16   6520  42

    1   A   1    29   6520  14

    1   C   2    13   6520  20

    1   C   2    1    4280  36

    1   D   3    18   4280  39

    2   B   4    26   6520  24

    2   B   4    5    6520  14

    2   B   4    3    4280  35

    2   D   5    9    6520  26

    ```


    That gives the operator a better picking route as you can see in Figure [13-3](#475066_1_En_13_Chapter.xhtml#Fig3),
    so Listing [13-8](#475066_1_En_13_Chapter.xhtml#PC20) is the solution to the second
    of my three problems.


    ![../images/475066_1_En_13_Chapter/475066_1_En_13_Fig3_HTML.jpg](images/475066_1_En_13_Chapter/475066_1_En_13_Fig3_HTML.jpg)


    Figure 13-3


    Alternating position order of odd/even visited aisles


    Again I can show a variation where I can adapt the query very easily to match
    changing conditions. In Figure [13-3](#475066_1_En_13_Chapter.xhtml#Fig3), you
    see a door between warehouses 1 and 2 both at the bottom and at the top, but what
    happens if there''s only a door at the bottom and it''s closed at the top?


    A small change to the `dense_rank` call of Listing [13-8](#475066_1_En_13_Chapter.xhtml#PC20)
    produces Listing [13-9](#475066_1_En_13_Chapter.xhtml#PC22).


    ```

    ...

    5      , dense_rank() over (

    6           partition by wh

    7           order by ai

    8        ) as ai#

    ...

    Listing 13-9

    Restarting aisle numbering within each warehouse

    ```


    All I''ve done is to change an `order by` warehouse and aisle into a `partition
    by` warehouse and `order by` aisle. The result is that the ranks assigned in column
    `ai#` restart from 1 in each warehouse:


    ```

    WH  AI  AI#  POS  P_ID  PICK_Q

    1   A   1    16   6520  42

    1   A   1    29   6520  14

    1   C   2    13   6520  20

    1   C   2    1    4280  36

    1   D   3    18   4280  39

    2   B   1    3    4280  35

    2   B   1    5    6520  14

    2   B   1    26   6520  24

    2   D   2    9    6520  26

    ```


    When `ai#` restarts in each warehouse, that means that aisle B in warehouse 2
    changes from being the fourth aisle he visits overall to being the first aisle
    he visits in warehouse 2. That means it changes from being an even numbered aisle
    (ordered descending) to being an odd numbered aisle (ordered ascending).


    And that gives the picking route shown in Figure [13-4](#475066_1_En_13_Chapter.xhtml#Fig4).


    ![../images/475066_1_En_13_Chapter/475066_1_En_13_Fig4_HTML.jpg](images/475066_1_En_13_Chapter/475066_1_En_13_Fig4_HTML.jpg)


    Figure 13-4


    What happens when there is just one door between warehouses


    The first two problems are now solved, so I''ll now move on to the third and last
    problem.'
