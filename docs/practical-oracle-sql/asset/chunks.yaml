- fmt: '# 1. Correlating Inline Views


    Most of the time in SQL, you can simply join tables or views to one another to
    get the result you want. Often you add inline views and scalar subqueries to the
    mix, and you can soon create relatively complex solutions to many problems. With
    analytic functions, you really start to rock ‘n’ roll and can solve almost anything.


    But it can happen from time to time that you have, for instance, a scalar subquery
    and wish that it could return multiple columns instead of just a single column.
    You can make workarounds with object types or string concatenation, but it’s never
    really elegant nor efficient.


    Also from time to time, you would really like, for example, a predicate inside
    the inline view to reference a value from a table outside the inline view, which
    is normally not possible. Often the workaround is to select the column you would
    like a predicate on in the inline view `select` list and put the predicate in
    the join `on` clause instead. This is often good enough, and the optimizer can
    often do predicate pushing to automatically do what you actually wanted – but
    it is not always able to do this, in which case you end up with an inefficient
    query.


    For both those problems, it has been possible since version 12.1 to solve them
    by correlating the inline view with `lateral` or `apply`, enabling you in essence
    to do your own predicate pushing.


    ## Brewery products and sales


    In the application schema of the Good Beer Trading Co, I have a couple of views
    (shown in Figure [1-1](#475066_1_En_1_Chapter.xhtml#Fig1)) I can use to illustrate
    inline view correlation.


    ![../images/475066_1_En_1_Chapter/475066_1_En_1_Fig1_HTML.jpg](images/475066_1_En_1_Chapter/475066_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Two views used in this chapter to illustrate lateral inline views


    It could just as easily have been tables that I used to demonstrate these techniques,
    so for this chapter, just think of them as such. The internals of the views will
    be more relevant in later chapters and shown in those chapters.


    View `brewery_products` shows which beers the Good Beer Trading Co buys from which
    breweries, while view `yearly_sales` shows how many bottles of each beer are sold
    per year. Joining the two together in Listing [1-1](#475066_1_En_1_Chapter.xhtml#PC1)
    on `product_id`, I can see the yearly sales of those beers that are bought from
    Balthazar Brauerei.


    ```sql

    SQL> select

    2     bp.brewery_name

    3   , bp.product_id as p_id

    4   , bp.product_name

    5   , ys.yr

    6   , ys.yr_qty

    7  from brewery_products bp

    8  join yearly_sales ys

    9     on ys.product_id = bp.product_id

    10  where bp.brewery_id = 518

    11  order by bp.product_id, ys.yr;

    ```


    Listing 1-1

    The yearly sales of the three beers from Balthazar Brauerei


    This data of 3 years of sales of three beers will be the basis for the examples
    of this chapter:


    ```

    BREWERY_NAME        P_ID  PRODUCT_NAME      YR    YR_QTY

    Balthazar Brauerei  5310  Monks and Nuns    2016  478

    Balthazar Brauerei  5310  Monks and Nuns    2017  582

    Balthazar Brauerei  5310  Monks and Nuns    2018  425

    Balthazar Brauerei  5430  Hercule Trippel   2016  261

    Balthazar Brauerei  5430  Hercule Trippel   2017  344

    Balthazar Brauerei  5430  Hercule Trippel   2018  451

    Balthazar Brauerei  6520  Der Helle Kumpel  2016  415

    Balthazar Brauerei  6520  Der Helle Kumpel  2017  458

    Balthazar Brauerei  6520  Der Helle Kumpel  2018  357

    ```


    At first I’ll use this to show a typical problem.


    ## Scalar subqueries and multiple columns


    The task at hand is to show for each of the three beers of Balthazar Brauerei
    which year the most bottles of that particular beer are sold and how many bottles
    that were. I can do this with two scalar subqueries in Listing [1-2](#475066_1_En_1_Chapter.xhtml#PC3).


    ```sql

    SQL> select

    2     bp.brewery_name

    3   , bp.product_id as p_id

    4   , bp.product_name

    5   , (

    6        select ys.yr

    7        from yearly_sales ys

    8        where ys.product_id = bp.product_id

    9        order by ys.yr_qty desc

    10        fetch first row only

    11     ) as yr

    12   , (

    13        select ys.yr_qty

    14        from yearly_sales ys

    15        where ys.product_id = bp.product_id

    16        order by ys.yr_qty desc

    17        fetch first row only

    18     ) as yr_qty

    19  from brewery_products bp

    20  where bp.brewery_id = 518

    21  order by bp.product_id;

    ```


    Listing 1-2

    Retrieving two columns from the best-selling year per beer


    For the data at hand (where there are no ties between years), it works okay and
    gives me the desired output:


    ```

    BREWERY_NAME        P_ID  PRODUCT_NAME      YR    YR_QTY

    Balthazar Brauerei  5310  Monks and Nuns    2017  582

    Balthazar Brauerei  5430  Hercule Trippel   2018  451

    Balthazar Brauerei  6520  Der Helle Kumpel  2017  458

    ```


    But there are some issues with this strategy:


    *   The same data in `yearly_sales` is accessed twice. Had I needed more than
    two columns, it would have been multiple times.

    *   Since my `order by` is not unique, my fetch first row will return a random
    one (well, probably the first it happens to find using whichever access plan it
    uses, of which I have no control, so in effect, it could be any one) of those
    rows that have the highest `yr_qty`. That means in the multiple subqueries, I
    have no guarantee that the values come from the same row – if I had had a column
    showing the profit of the beer in that year and a subquery to retrieve this profit,
    it might show the profit of a different year than the one shown in the `yr` column
    of the output.


    A classic workaround is to use just a single scalar subquery like in Listing [1-3](#475066_1_En_1_Chapter.xhtml#PC5).


    ```sql

    SQL> select

    2     brewery_name

    3   , product_id as p_id

    4   , product_name

    5   , to_number(

    6        substr(yr_qty_str, 1, instr(yr_qty_str, '';'') - 1)

    7     ) as yr

    8   , to_number(

    9        substr(yr_qty_str, instr(yr_qty_str, '';'') + 1)

    10     ) as yr_qty

    11  from (

    12     select

    13        bp.brewery_name

    14      , bp.product_id

    15      , bp.product_name

    16      , (

    17           select ys.yr || '';'' || ys.yr_qty

    18           from yearly_sales ys

    19           where ys.product_id = bp.product_id

    20           order by ys.yr_qty desc

    21           fetch first row only

    22        ) as yr_qty_str

    23     from brewery_products bp

    24     where bp.brewery_id = 518

    25  )

    26  order by product_id;

    ```


    Listing 1-3

    Using just a single scalar subquery and value concatenation


    The scalar subquery is here in lines 16–22, finding the row I want and then selecting
    in line 17 a concatenation of the values I am interested in. Then I place the
    entire thing in an inline view (lines 11–25) and split the concatenated string
    into individual values again in lines 5–10.


    The output of this is exactly the same as Listing [1-2](#475066_1_En_1_Chapter.xhtml#PC3),
    so that is all good, right? Well, as you can see, if I need more than two columns,
    it can quickly become unwieldy code. If I had been concatenating string values,
    I would have needed to worry about using a delimiter that didn’t exist in the
    real data. If I had been concatenating dates and timestamps, I’d need to use `to_char`
    and `to_date`/`to_timestamp`. And what if I had LOB columns or columns of complex
    types? Then I couldn’t do this at all.


    So there are many good reasons to try Listing [1-4](#475066_1_En_1_Chapter.xhtml#PC6)
    as an alternative workaround.'
  raw: '# 1. Correlating Inline Views


    Most of the time in SQL, you can simply join tables or views to one another to
    get the result you want. Often you add inline views and scalar subqueries to the
    mix, and you can soon create relatively complex solutions to many problems. With
    analytic functions, you really start to rock ‘n’ roll and can solve almost anything.


    But it can happen from time to time that you have, for instance, a scalar subquery
    and wish that it could return multiple columns instead of just a single column.
    You can make workarounds with object types or string concatenation, but it’s never
    really elegant nor efficient.


    Also from time to time, you would really like, for example, a predicate inside
    the inline view to reference a value from a table outside the inline view, which
    is normally not possible. Often the workaround is to select the column you would
    like a predicate on in the inline view `select` list and put the predicate in
    the join `on` clause instead. This is often good enough, and the optimizer can
    often do **predicate pushing** to automatically do what you actually wanted –
    but it is not always able to do this, in which case you end up with an inefficient
    query.


    For both those problems, it has been possible since version 12.1 to solve them
    by correlating the inline view with `lateral` or `apply`, enabling you in essence
    to do your own predicate pushing.


    ## Brewery products and sales


    In the application schema of the Good Beer Trading Co, I have a couple of views
    (shown in Figure [1-1](#475066_1_En_1_Chapter.xhtml#Fig1)) I can use to illustrate
    inline view correlation.


    ![../images/475066_1_En_1_Chapter/475066_1_En_1_Fig1_HTML.jpg](images/475066_1_En_1_Chapter/475066_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Two views used in this chapter to illustrate lateral inline views


    It could just as easily have been tables that I used to demonstrate these techniques,
    so for this chapter, just think of them as such. The internals of the views will
    be more relevant in later chapters and shown in those chapters.


    View `brewery_products` shows which beers the Good Beer Trading Co buys from which
    breweries, while view `yearly_sales` shows how many bottles of each beer are sold
    per year. Joining the two together in Listing [1-1](#475066_1_En_1_Chapter.xhtml#PC1)
    on `product_id`, I can see the yearly sales of those beers that are bought from
    Balthazar Brauerei.


    ```

    SQL> select

    2     bp.brewery_name

    3   , bp.product_id as p_id

    4   , bp.product_name

    5   , ys.yr

    6   , ys.yr_qty

    7  from brewery_products bp

    8  join yearly_sales ys

    9     on ys.product_id = bp.product_id

    10  where bp.brewery_id = 518

    11  order by bp.product_id, ys.yr;

    Listing 1-1

    The yearly sales of the three beers from Balthazar Brauerei

    ```


    This data of 3 years of sales of three beers will be the basis for the examples
    of this chapter:


    ```

    BREWERY_NAME        P_ID  PRODUCT_NAME      YR    YR_QTY

    Balthazar Brauerei  5310  Monks and Nuns    2016  478

    Balthazar Brauerei  5310  Monks and Nuns    2017  582

    Balthazar Brauerei  5310  Monks and Nuns    2018  425

    Balthazar Brauerei  5430  Hercule Trippel   2016  261

    Balthazar Brauerei  5430  Hercule Trippel   2017  344

    Balthazar Brauerei  5430  Hercule Trippel   2018  451

    Balthazar Brauerei  6520  Der Helle Kumpel  2016  415

    Balthazar Brauerei  6520  Der Helle Kumpel  2017  458

    Balthazar Brauerei  6520  Der Helle Kumpel  2018  357

    ```


    At first I’ll use this to show a typical problem.


    ## Scalar subqueries and multiple columns


    The task at hand is to show for each of the three beers of Balthazar Brauerei
    which year the most bottles of that particular beer are sold and how many bottles
    that were. I can do this with two scalar subqueries in Listing [1-2](#475066_1_En_1_Chapter.xhtml#PC3).


    ```

    SQL> select

    2     bp.brewery_name

    3   , bp.product_id as p_id

    4   , bp.product_name

    5   , (

    6        select ys.yr

    7        from yearly_sales ys

    8        where ys.product_id = bp.product_id

    9        order by ys.yr_qty desc

    10        fetch first row only

    11     ) as yr

    12   , (

    13        select ys.yr_qty

    14        from yearly_sales ys

    15        where ys.product_id = bp.product_id

    16        order by ys.yr_qty desc

    17        fetch first row only

    18     ) as yr_qty

    19  from brewery_products bp

    20  where bp.brewery_id = 518

    21  order by bp.product_id;

    Listing 1-2

    Retrieving two columns from the best-selling year per beer

    ```


    For the data at hand (where there are no ties between years), it works okay and
    gives me the desired output:


    ```

    BREWERY_NAME        P_ID  PRODUCT_NAME      YR    YR_QTY

    Balthazar Brauerei  5310  Monks and Nuns    2017  582

    Balthazar Brauerei  5430  Hercule Trippel   2018  451

    Balthazar Brauerei  6520  Der Helle Kumpel  2017  458

    ```


    But there are some issues with this strategy:


    *   The same data in `yearly_sales` is accessed twice. Had I needed more than
    two columns, it would have been multiple times.


    *   Since my `order by` is not unique, my fetch first row will return a random
    one (well, probably the first it happens to find using whichever access plan it
    uses, of which I have no control, so in effect, it could be any one) of those
    rows that have the highest `yr_qty`. That means in the multiple subqueries, I
    have no guarantee that the values come from the same row – if I had had a column
    showing the profit of the beer in that year and a subquery to retrieve this profit,
    it might show the profit of a different year than the one shown in the `yr` column
    of the output.


    A classic workaround is to use just a single scalar subquery like in Listing [1-3](#475066_1_En_1_Chapter.xhtml#PC5).


    ```

    SQL> select

    2     brewery_name

    3   , product_id as p_id

    4   , product_name

    5   , to_number(

    6        substr(yr_qty_str, 1, instr(yr_qty_str, '';'') - 1)

    7     ) as yr

    8   , to_number(

    9        substr(yr_qty_str, instr(yr_qty_str, '';'') + 1)

    10     ) as yr_qty

    11  from (

    12     select

    13        bp.brewery_name

    14      , bp.product_id

    15      , bp.product_name

    16      , (

    17           select ys.yr || '';'' || ys.yr_qty

    18           from yearly_sales ys

    19           where ys.product_id = bp.product_id

    20           order by ys.yr_qty desc

    21           fetch first row only

    22        ) as yr_qty_str

    23     from brewery_products bp

    24     where bp.brewery_id = 518

    25  )

    26  order by product_id;

    Listing 1-3

    Using just a single scalar subquery and value concatenation

    ```


    The scalar subquery is here in lines 16–22, finding the row I want and then selecting
    in line 17 a concatenation of the values I am interested in. Then I place the
    entire thing in an inline view (lines 11–25) and split the concatenated string
    into individual values again in lines 5–10.


    The output of this is exactly the same as Listing [1-2](#475066_1_En_1_Chapter.xhtml#PC3),
    so that is all good, right? Well, as you can see, if I need more than two columns,
    it can quickly become unwieldy code. If I had been concatenating string values,
    I would have needed to worry about using a delimiter that didn’t exist in the
    real data. If I had been concatenating dates and timestamps, I’d need to use `to_char`
    and `to_date`/`to_timestamp`. And what if I had LOB columns or columns of complex
    types? Then I couldn’t do this at all.


    So there are many good reasons to try Listing [1-4](#475066_1_En_1_Chapter.xhtml#PC6)
    as an alternative workaround.'
  trans: '# 1. 关联内联视图


    在 SQL 中，大多数时候你只需将表或视图相互连接，就能得到想要的结果。你经常还会加入内联视图和标量子查询，很快就能为许多问题创建出相对复杂的解决方案。借助分析函数，你便真正开始“大展拳脚”，几乎可以解决任何问题。


    但偶尔也会遇到这样的情况：例如，你有一个标量子查询，并希望它能返回多列，而非仅仅单列。你可以通过对象类型或字符串拼接来变通实现，但这既不优雅也不高效。


    同样，时不时地，你可能非常希望——比如说——让内联视图内的一个谓词能够引用内联视图外部表的值，而这通常是不可能的。常见的变通方法是将你希望施加谓词的列包含在内联视图的
    `select` 列表中，并将该谓词放在连接的 `on` 子句中。这通常已经足够好，优化器也常常能进行谓词下推，自动实现你实际想要的效果——但它并非总能做到这一点，若是这种情况，你最终会得到一个低效的查询。


    对于这两个问题，自 12.1 版本起，通过使用 `lateral` 或 `apply` 来关联内联视图，就有可能解决它们，使你本质上能够自己进行谓词下推。


    ## 啤酒厂产品与销售


    在“好啤酒贸易公司”的应用模式中，我有几个视图（如图 1-1 所示）可用于说明内联视图关联。


    ![../images/475066_1_En_1_Chapter/475066_1_En_1_Fig1_HTML.jpg](img/475066_1_En_1_Fig1_HTML.jpg)


    图 1-1


    本章中用于说明 lateral 内联视图的两个视图


    我本可以同样轻松地使用表来演示这些技术，因此在本章中，就把它们当作表来看待即可。视图的内部结构在后续章节中会更为相关，并将在那些章节中展示。


    视图 `brewery_products` 显示了“好啤酒贸易公司”从哪些啤酒厂采购了哪些啤酒，而视图 `yearly_sales` 则显示了每年每种啤酒的销售瓶数。如清单
    1-1 所示，在 `product_id` 上连接两者，我可以看到从 Balthazar Brauerei 采购的那些啤酒的年度销售情况。


    ```sql

    SQL> select

    2     bp.brewery_name

    3   , bp.product_id as p_id

    4   , bp.product_name

    5   , ys.yr

    6   , ys.yr_qty

    7  from brewery_products bp

    8  join yearly_sales ys

    9     on ys.product_id = bp.product_id

    10  where bp.brewery_id = 518

    11  order by bp.product_id, ys.yr;

    ```


    清单 1-1

    Balthazar Brauerei 三种啤酒的年度销售情况


    这三种啤酒三年的销售数据将作为本章示例的基础：


    ```

    BREWERY_NAME        P_ID  PRODUCT_NAME      YR    YR_QTY

    Balthazar Brauerei  5310  Monks and Nuns    2016  478

    Balthazar Brauerei  5310  Monks and Nuns    2017  582

    Balthazar Brauerei  5310  Monks and Nuns    2018  425

    Balthazar Brauerei  5430  Hercule Trippel   2016  261

    Balthazar Brauerei  5430  Hercule Trippel   2017  344

    Balthazar Brauerei  5430  Hercule Trippel   2018  451

    Balthazar Brauerei  6520  Der Helle Kumpel  2016  415

    Balthazar Brauerei  6520  Der Helle Kumpel  2017  458

    Balthazar Brauerei  6520  Der Helle Kumpel  2018  357

    ```


    我将首先用它来展示一个典型问题。


    ## 标量子查询与多列


    当前的任务是：针对 Balthazar Brauerei 的三种啤酒中的每一种，分别显示哪一年该特定啤酒的销量最高，以及最高销量是多少。我可以在清单 1-2
    中使用两个标量子查询来完成此操作。


    ```sql

    SQL> select

    2     bp.brewery_name

    3   , bp.product_id as p_id

    4   , bp.product_name

    5   , (

    6        select ys.yr

    7        from yearly_sales ys

    8        where ys.product_id = bp.product_id

    9        order by ys.yr_qty desc

    10        fetch first row only

    11     ) as yr

    12   , (

    13        select ys.yr_qty

    14        from yearly_sales ys

    15        where ys.product_id = bp.product_id

    16        order by ys.yr_qty desc

    17        fetch first row only

    18     ) as yr_qty

    19  from brewery_products bp

    20  where bp.brewery_id = 518

    21  order by bp.product_id;

    ```


    清单 1-2

    从每个啤酒最畅销的年份中检索两列


    对于当前的数据（年份之间没有并列第一），这种方法有效，并给出了我期望的输出：


    ```

    BREWERY_NAME        P_ID  PRODUCT_NAME      YR    YR_QTY

    Balthazar Brauerei  5310  Monks and Nuns    2017  582

    Balthazar Brauerei  5430  Hercule Trippel   2018  451

    Balthazar Brauerei  6520  Der Helle Kumpel  2017  458

    ```


    但这种策略存在一些问题：


    *   `yearly_sales` 中的相同数据被访问了两次。如果我需要超过两列，那就需要访问更多次。

    *   由于我的 `order by` 不唯一，我的 fetch first row 将返回一个随机行（好吧，很可能是在其使用的执行计划下找到的第一个行，对此我无法控制，因此实际上可能是具有最高
    `yr_qty` 的任何一行）。这意味着在多个子查询中，我无法保证这些值来自同一行——如果我有一个显示该啤酒在该年份利润的列，以及一个用于检索此利润的子查询，它显示的利润年份可能与输出中
    `yr`` 列显示的年份不同。


    一个经典的变通方法是只使用单个标量子查询，如清单 1-3 所示。


    ```sql

    SQL> select

    2     brewery_name

    3   , product_id as p_id

    4   , product_name

    5   , to_number(

    6        substr(yr_qty_str, 1, instr(yr_qty_str, '';'') - 1)

    7     ) as yr

    8   , to_number(

    9        substr(yr_qty_str, instr(yr_qty_str, '';'') + 1)

    10     ) as yr_qty

    11  from (

    12     select

    13        bp.brewery_name

    14      , bp.product_id

    15      , bp.product_name

    16      , (

    17           select ys.yr || '';'' || ys.yr_qty

    18           from yearly_sales ys

    19           where ys.product_id = bp.product_id

    20           order by ys.yr_qty desc

    21           fetch first row only

    22        ) as yr_qty_str

    23     from brewery_products bp

    24     where bp.brewery_id = 518

    25  )

    26  order by product_id;

    ```


    清单 1-3

    使用单个标量子查询和值拼接


    这里的标量子查询在第 16–22 行，找到我想要的行，然后在第 17 行选择我感兴趣的值的拼接。然后我把整个结果放在一个内联视图（第 11–25 行）中，并在第
    5–10 行将拼接的字符串拆分成单独的值。


    这个输出与清单 1-2 完全相同，所以一切都很好，对吧？嗯，正如你所见，如果我需要超过两列，代码可能会很快变得难以处理。如果我拼接的是字符串值，我就需要担心使用一个真实数据中不存在的分隔符。如果我拼接的是日期和时间戳，我就需要使用
    `to_char` 和 `to_date`/`to_timestamp`。如果我处理的是 LOB 列或复杂类型的列怎么办？那样的话，我就完全无法这样做了。


    因此，有很多充分的理由去尝试清单 1-4 中的替代变通方法。'
- fmt: '## 分析与使用分析函数


    ```sql

    SQL> select

    2     brewery_name

    3   , product_id as p_id

    4   , product_name

    5   , yr

    6   , yr_qty

    7  from (

    8     select

    9        bp.brewery_name

    10      , bp.product_id

    11      , bp.product_name

    12      , ys.yr

    13      , ys.yr_qty

    14      , row_number() over (

    15           partition by bp.product_id

    16           order by ys.yr_qty desc

    17        ) as rn

    18     from brewery_products bp

    19     join yearly_sales ys

    20        on ys.product_id = bp.product_id

    21     where bp.brewery_id = 518

    22  )

    23  where rn = 1

    24  order by product_id;

    ```

    `Listing 1-4`

    使用分析函数以便能够检索所有所需列


    这也给出了与`Listing 1-2`完全相同的输出，只是完全没有任何标量子查询。


    这里我在第18-20行连接了两个视图，而不是在标量子查询中查询`yearly_sales`。但这样做使得我无法使用`fetch first`语法，因为我需要每个酒厂一行，而`fetch
    first`不支持分区子句。


    我改为在第14-17行使用`row_number`分析函数，按`yr_qty`降序分配连续的序号1, 2, 3 …，实际上将`yr_qty`最高的行在`rn`中赋值为1。由于第15行的`partition
    by`，这是针对每种啤酒进行的，因此每种啤酒都会有一行`rn=1`。这些行我通过第23行的`where`子句保留下来。


    > **提示**

    > 本书第2部分展示了更多关于分析函数的内容。


    这样做的效果是，我可以根据需要从`yearly_sales`视图中查询任意多的列——这里我在第12-13行查询了两个列。然后它们也可以直接在外部查询的第5-6行中使用。不需要拼接，每个列都可直接使用，无论其数据类型如何。


    这是比`Listing 1-3`更好的解决方法，那么这难道不够好吗？在这种情况下这样是没问题的，但使用关联内联视图的替代方案在某些情况下可能更灵活。


    ## 关联内联视图


    `Listing 1-5`是生成与`Listing 1-2`完全相同输出的另一种方式，只是这次通过关联一个内联视图来实现。


    ```sql

    SQL> select

    2     bp.brewery_name

    3   , bp.product_id as p_id

    4   , bp.product_name

    5   , top_ys.yr

    6   , top_ys.yr_qty

    7  from brewery_products bp

    8  cross join lateral(

    9     select

    10        ys.yr

    11      , ys.yr_qty

    12     from yearly_sales ys

    13     where ys.product_id = bp.product_id

    14     order by ys.yr_qty desc

    15     fetch first row only

    16  ) top_ys

    17  where bp.brewery_id = 518

    18  order by bp.product_id;

    ```

    `Listing 1-5`

    使用关联内联视图实现相同效果


    工作原理如下：


    *   我没有直接连接`brewery_products`到`yearly_sales`；而是连接到第8行的内联视图`top_ys`。

    *   第9-15行的内联视图查询`yearly_sales`并使用`fetch first row`来查找销售额最高的年份所在行。但它*不是*为*所有*啤酒执行以找到跨所有啤酒的最畅销年份的单一最佳行，因为第13行在`product_id`上将`yearly_sales`与`brewery_products`相关联。

    *   第13行通常会引发错误，因为在通常的连接内联视图中这没有意义。但我在第8行的内联视图前放置了关键字`lateral`，这告诉数据库我希望建立关联，因此它应该为关联的外部行源——本例中是`brewery_products`——的*每一行*执行一次内联视图。这意味着对于每种啤酒，都将执行一次独立的`fetch
    first row`查询，几乎就像它是一个标量子查询一样。

    *   然后我在第8行使用`cross join`来进行实际的连接，这只是因为在这种情况下我不需要`on`子句。我在第13行已经有了所需的关联，因此不需要使用内连接或外连接。


    使用这种`lateral`内联视图使我能够像标量子查询那样为每种啤酒执行它，但又能像在`Listing 1-4`中那样查询独立的列。


    你可能对`cross join`感到疑惑，并说，“这不是笛卡尔积，对吗？”


    考虑一下，如果我使用传统的连接风格，使用逗号分隔的表和视图列表，并将所有连接谓词放在`where`子句中，没有`on`子句。在那种连接风格中，如果你在两个表/视图之间*完全*没有连接谓词（有时这可能是意外发生的——一个难以发现的经典错误），就会发生笛卡尔连接。


    如果我用传统风格的连接编写`Listing 1-5`，第8行会是这样：


    ```sql

    ...

    7  from brewery_products bp

    8  , lateral(

    9     select

    ...

    ```


    并且在`where`子句中没有连接谓词，它所做的与`cross join`完全一样。但由于`lateral`子句，它变成了`brewery_products`的*每一行*与关联内联视图为每种啤酒执行时输出的*每一行*之间的“笛卡尔”连接（可以将其视为“分区笛卡尔”），但最终结果看起来像是一个关联连接，根本不显示笛卡尔特性。只是不要让`cross
    join`的语法迷惑你。


    我本可以选择避免`cross join`带来的混淆，而使用常规的内连接，如下所示：


    ```sql

    ...

    7  from brewery_products bp

    8  join lateral(

    9     select

    ...

    16  ) top_ys

    17     on 1=1

    18  where bp.brewery_id = 518

    ...

    ```


    由于关联发生在`lateral`内联视图内部，我可以让`on`子句始终为真。效果完全相同。


    可能你觉得`cross join`和`on 1=1`这两种方法都没有清楚地说明发生了什么——如果你愿意的话，这两种语法都可以被认为有点“笨拙”。那么你可能更喜欢替代语法`cross
    apply`，如`Listing 1-6`所示。


    ```sql

    SQL> select

    2     bp.brewery_name

    3   , bp.product_id as p_id

    4   , bp.product_name

    5   , top_ys.yr

    6   , top_ys.yr_qty

    7  from brewery_products bp

    8  cross apply(

    9     select

    10        ys.yr

    11      , ys.yr_qty

    12     from yearly_sales ys

    13     where ys.product_id = bp.product_id

    14     order by ys.yr_qty desc

    15     fetch first row only

    16  ) top_ys

    17  where bp.brewery_id = 518

    18  order by bp.product_id;

    ```

    `Listing 1-6`

    替代语法 `cross apply`


    输出与之前的列表一样，与`Listing 1-2`相同，但这次我既没有使用`lateral`也没有使用`join`，而是使用了第8行的关键字`cross apply`。这意味着对于`brewery_products`中的每一行，内联视图都将被*应用*。当我使用`apply`时，我被允许在第13行的谓词中关联内联视图，就像使用`lateral`一样。在底层，数据库所做的与`lateral`内联视图完全相同；这只是你偏好哪种语法的问题。


