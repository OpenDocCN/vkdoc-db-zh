    Figure 15-4


    Deseasonalized sales for Reindeer Fuel


    This deseasonalized line on the graph is now representing a somewhat smoothed
    out version of monthly average sales over a year taking into account seasonal
    variations averaged over the years. Next step is creating a straight line as closely
    as possible matching the `des` line.'
