    检查了详细输出后，我将回到 `one row per match` 版本，再做一些调整，并向你展示几件事。


    首先，我想澄清一点：尽管带有 `one row per match` 的清单 22-3 只有一个聚合度量，并且到目前为止我只在使用 `all rows per
