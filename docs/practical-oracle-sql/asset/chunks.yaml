    ## 完整拣货周期分析


    我可以使用 `group by` 对 `emp`、`list` 和 `begin_cycle` 进行分组，以获取每个拣货周期的数据，但在本例中，使用 Listing
    [14-7](#475066_1_En_14_Chapter.xhtml#PC13) 中由 `pivot` 执行的*隐式*分组可能会更简单一些。


    SQL> select *

    2  from (

    3     select

    4        list.picker_emp_id as emp

    5      , list.id            as list

