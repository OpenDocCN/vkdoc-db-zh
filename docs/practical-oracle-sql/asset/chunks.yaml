- fmt: '### Revisiting if SAME is needed


    This is nice that I could achieve my desired pattern matching using the three
    definitions `down`, `up`, and `same` and then a subset `up_or_same`. But could
    it be simplified?


    Remember in the beginning of the chapter I tried using less-than-or-equal and
    greater-than-or-equal:


    ```

    ...

    15        down as price = prev(price)

    ...

    ```


    This was not working well when I simply was classifying single rows. But I promised
    to show that this is not always a problem – it depends on the pattern I use.


    I can rewrite the query so it looks like Listing 17-4. Here I am not using any
    `same` definition, but only `down` and `up` in lines 17–18 – notice both are using
    `-or-equal` variants of less-than and greater-than. That also means I can simplify
    the `pattern` in line 14 and avoid the use of a `subset`, and then line 12 simply
    skips to `last up`.


    ```

    SQL> select *

    2  from ticker

    3  match_recognize (

    4     partition by symbol

    5     order by day

    6     measures

    7        match_number() as match

    8      , first(day)     as first_day

    9      , last(day)      as last_day

    10      , count(*)       as days

    11     one row per match

    12     after match skip to last up

    13     pattern (

    14        strt down+ up+

    15     )

    16     define

    17        down as price = prev(price)

    19  )

    20  order by symbol, first_day;

    Listing 17-4

    Simplified query utilizing how definitions are evaluated for patterns

    ```


    The simplified Listing 17-4 gives me exactly the same desired result as I had
    before:


    ```

    SYMBOL  MATCH  FIRST_DAY   LAST_DAY    DAYS

    BEER    1      2019-04-01  2019-04-04  4

    BEER    2      2019-04-04  2019-04-12  7

    BEER    3      2019-04-12  2019-04-19  6

    ```


    Now how did it do that? Why do I not seem to have the problem from the beginning
    of the chapter, where the row on 2019-04-18 incorrectly was classified as `down`?
    To find out, it helps to go back and see `all rows per match` (very often a good
    trick when debugging `match_recognize`) in line 10 of Listing 17-5.


    ```

    SQL> select *

    2  from ticker

    3  match_recognize (

    4     partition by symbol

    5     order by day

    6     measures

    7        match_number() as match

    8      , classifier()   as class

    9      , prev(price)    as prev

    10     all rows per match

    11     after match skip to last up

    12     pattern (

    13        strt down+ up+

    14     )

    15     define

    16        down as price = prev(price)

    18  )

    19  order by symbol, day;

    Listing 17-5

    Seeing all rows of the simplified query

    ```


    Seeing all rows, I can also clearly see how 2019-04-04 and 2019-04-12 both are
    twice in the output – once as last row of one match and once as first row of the
    next match – so the total number of rows in the output is 17, even though the
    table contains 15 rows:


    ```

    SYMBOL  DAY         MATCH  CLASS  PREV  PRICE

    BEER    2019-04-01  1      STRT         14.9

    BEER    2019-04-02  1      DOWN   14.9  14.2

    BEER    2019-04-03  1      DOWN   14.2  14.2

    BEER    2019-04-04  1      UP     14.2  15.7

    BEER    2019-04-04  2      STRT   14.2  15.7

    BEER    2019-04-05  2      DOWN   15.7  15.6

    BEER    2019-04-08  2      DOWN   15.6  14.8

    BEER    2019-04-09  2      DOWN   14.8  14.8

    BEER    2019-04-10  2      DOWN   14.8  14

    BEER    2019-04-11  2      UP     14    14.4

    BEER    2019-04-12  2      UP     14.4  15.2

    BEER    2019-04-12  3      STRT   14.4  15.2

    BEER    2019-04-15  3      DOWN   15.2  15

    BEER    2019-04-16  3      DOWN   15    13.7

    BEER    2019-04-17  3      UP     13.7  14.3

    BEER    2019-04-18  3      UP     14.3  14.3

    BEER    2019-04-19  3      UP     14.3  15.5

    ```


    But I’m really very interested in the row on 2019-04-18, which was originally
    classified as `down`, which led me to introduce `same` to get a proper classification.
    Why is it correctly classified as `up` here?


    The reason is how things are evaluated when doing pattern matching. The database
    is not simply going through the definitions first to classify the rows and then
    checking if it fits the pattern. It tries to evaluate as little as possible. This
    means it will go along and evaluate something like this:


    *   When starting to look for a match, it will see if the first row matches `strt`
    – which any row will.

    *   Then it knows that if a match is to be found, the next row must be a `down`,
    so it checks if that is the case.

    *   The next row must be a `down` or an `up`, so it checks first if it is a `down`;
    if not, then it checks if it is an `up`. Repeat as long as it was a `down` that
    was found. So any row having less than *or the same* value as the previous row
    is classified `down` as long as we are in this part of the pattern, as `down`
    definition is evaluated first. The 2019-04-03 and 2019-04-09 rows are therefore
    both `down` rows.

    *   When the previous step found an `up`, it knows that the next row *must* be
    an `up` to make a valid match, so it checks if that is the case. Repeat checking
    for `up` as long as an `up` is found. That means that at this point, it will *not*
    evaluate a row *having same value* as the previous row to be `down`, because that
    definition is simply *not* evaluated at this point in the pattern.

    *   Therefore, since 2019-04-18 comes in the `up+` part of the pattern, it will
    *not* be classified `down`, but `up` as we want it to.


    This can be tricky when you have complex definitions and patterns. Life is simpler
    if the definitions are mutually exclusive like `down`, `up`, and `same`, but with
    knowledge of the evaluation method used by `match_recognize`, it is possible to
    utilize it to simplify a query like this, where rows that fall into more than
    one definition get the desired classification anyway, because the pattern dictates
    which definition is evaluated when.'
