- fmt: "### Outer joining correlated inline view\n\nSo far my uses of `lateral` and\
    \ `apply` have only been of the `cross` variety. That means that in fact I have\
    \ been cheating a little – it is not really the same as using scalar subqueries.\
    \ It is only because of having sales data for all the beers that Listings [1-2](#475066_1_En_1_Chapter.xhtml#PC3)\
    \ to [1-6](#475066_1_En_1_Chapter.xhtml#PC10) all had the same output.\n\nIf a\
    \ scalar subquery finds nothing, the value in that output column of the `brewery_products`\
    \ row will be null – but if a `cross join lateral` or `cross apply` inline view\
    \ finds no rows, then the `brewery_products` row will not be in the output at\
    \ all.\n\nWhat I need to really emulate the output of the scalar subquery method\
    \ is a functionality like an `outer join`, which I do in Listing [1-7](#475066_1_En_1_Chapter.xhtml#PC11).\
    \ In this listing, I still find the top year and quantity for each beer, but only\
    \ of those yearly sales that were less than 400.\n\n```sql\nselect\n   bp.brewery_name\n\
    \ , bp.product_id as p_id\n , bp.product_name\n , top_ys.yr\n , top_ys.yr_qty\n\
    from brewery_products bp\nouter apply(\n   select\n      ys.yr\n    , ys.yr_qty\n\
    \   from yearly_sales ys\n   where ys.product_id = bp.product_id\n   and ys.yr_qty\
    \ < 400\n   order by ys.yr_qty desc\n   fetch first row only\n) top_ys\nwhere\
    \ bp.brewery_id = 518\norder by bp.product_id;\n```\n\n**Listing 1-7**\nUsing\
    \ `outer apply` when you need `outer join` functionality\n\nIn line 14, I make\
    \ the inline view query only years that had sales of less than 400 bottles. And\
    \ then in line 8, I changed `cross apply` to `outer apply`, giving me this result:\n\
    \n```\nBREWERY_NAME        P_ID  PRODUCT_NAME      YR    YR_QTY\nBalthazar Brauerei\
    \  5310  Monks and Nuns\nBalthazar Brauerei  5430  Hercule Trippel   2017  344\n\
    Balthazar Brauerei  6520  Der Helle Kumpel  2018  357\n```\n\nIf I had been using\
    \ `cross apply` in line 8, I would only have seen the last two rows in the output.\n\
    \nSo `outer apply` is more correct to use if you want an output that is completely\
    \ identical to the scalar subquery method. But just like you don’t want to use\
    \ regular outer joins unnecessarily, you should use `cross apply` if you know\
    \ for a fact that rows always will be returned.\n\nAn `outer apply` is the same\
    \ as a `left outer join lateral` with an `on 1=1` join clause, so `outer apply`\
    \ cannot support right correlation, only left.\n\nThere are cases where an `outer\
    \ join lateral` is more flexible than `outer apply`, since you can actually use\
    \ the `on` clause sensibly, like in Listing [1-8](#475066_1_En_1_Chapter.xhtml#PC13).\n\
    \n```sql\nselect\n   bp.brewery_name\n , bp.product_id as p_id\n , bp.product_name\n\
    \ , top_ys.yr\n , top_ys.yr_qty\nfrom brewery_products bp\nleft outer join lateral(\n\
    \   select\n      ys.yr\n    , ys.yr_qty\n   from yearly_sales ys\n   where ys.product_id\
    \ = bp.product_id\n   order by ys.yr_qty desc\n   fetch first row only\n) top_ys\n\
    \   on top_ys.yr_qty < 500\nwhere bp.brewery_id = 518\norder by bp.product_id;\n\
    ```\n\n**Listing 1-8**\n`Outer join` with the `lateral` keyword\n\nSince I use\
    \ `lateral` in the `left outer join` in line 8, the inline view is executed once\
    \ for every beer, finding the best-selling year and quantity, just like most of\
    \ the examples in the chapter. But in the `on` clause in line 17, I filter, so\
    \ I only output a `top_ys` row if the quantity is less than 500. It gives me this\
    \ output, which is almost but not quite the same as the output of Listings [1-2](#475066_1_En_1_Chapter.xhtml#PC3)\
    \ to [1-6](#475066_1_En_1_Chapter.xhtml#PC10):\n\n```\nBREWERY_NAME        P_ID\
    \  PRODUCT_NAME      YR    YR_QTY\nBalthazar Brauerei  5310  Monks and Nuns\n\
    Balthazar Brauerei  5430  Hercule Trippel   2018  451\nBalthazar Brauerei  6520\
    \  Der Helle Kumpel  2017  458\n```\n\nNormally the `on` clause is for the joining\
    \ of the two tables (or views) and shouldn’t really contain a filter predicate.\
    \ But in this case, it is exactly because I do the filtering in the `on` clause\
    \ that I get the preceding result. Filtering in different places would solve different\
    \ problems:\n\n*   If the filter predicate is inside the inline view (like Listing\
    \ [1-7](#475066_1_En_1_Chapter.xhtml#PC11)), the problem solved is “For each beer\
    \ show me the best-selling year and quantity out of those years that sold less\
    \ than 400 bottles.”\n\n*   If the filter predicate is in the `on` clause (like\
    \ Listing [1-8](#475066_1_En_1_Chapter.xhtml#PC13)), the problem solved is “For\
    \ each beer show me the best-selling year and quantity if that year sold less\
    \ than 500 bottles.”\n\n*   If the filter predicate had been in the `where` clause\
    \ right after line 18, the problem solved would have been “For each beer where\
    \ the best-selling year sold less than 500 bottles, show me the best-selling year\
    \ and quantity.” (And then it shouldn’t be an `outer join,` but just an `inner`\
    \ or `cross join`.)\n\nIn all, `lateral` and `apply` (both in `cross` and `outer`\
    \ versions) have several uses that, though they might be solvable by various other\
    \ workarounds, can be quite nice and efficient. Typically you don’t want to use\
    \ it if the best access path would be to build the entire results of the inline\
    \ view first and then hash or merge the join with the outer table (for such a\
    \ case, Listing [1-4](#475066_1_En_1_Chapter.xhtml#PC6) is often a better solution).\
    \ But if the best path would be to do the outer table and then nested loop join\
    \ to the inline view, `lateral` and `apply` are very nice methods.\n\n**Tip**\n\
    \nYou will find more examples of doing Top-N queries in Chapter [12](#475066_1_En_12_Chapter.xhtml),\
    \ more examples of `lateral` in Chapters [9](#475066_1_En_9_Chapter.xhtml) and\
    \ [12](#475066_1_En_12_Chapter.xhtml), and examples of using `apply` on table\
    \ functions in Chapter [9](#475066_1_En_9_Chapter.xhtml).\n\n## Lessons learned\n\
    \nIn this chapter I’ve shown you some workarounds to some problems and then given\
    \ you examples of how to solve the same using correlated inline views, so you\
    \ now know about\n\n*   Using keyword `lateral` to enable doing a left correlation\
    \ inside an inline view\n*   Distinguishing between `cross` and `outer` versions\
    \ of joining to the lateral inline view\n*   Applying the `cross apply` or `outer\
    \ apply` as alternative syntax to achieve a left correlation\n*   Deciding whether\
    \ a correlated inline view or a regular inline view with analytic functions can\
    \ solve a problem most efficiently\n\nBeing able to correlate inline views can\
    \ be handy for several situations in your application development."
  raw: '### Outer joining correlated inline view


    So far my uses of `lateral` and `apply` have only been of the `cross` variety.
    That means that in fact I have been cheating a little – it is not *really* the
    same as using scalar subqueries. It is only because of having sales data for all
    the beers that Listings [1-2](#475066_1_En_1_Chapter.xhtml#PC3) to [1-6](#475066_1_En_1_Chapter.xhtml#PC10)
    all had the same output.


    If a scalar subquery finds nothing, the value in that output column of the `brewery_products`
    row will be null – but if a `cross join lateral` or `cross apply` inline view
    finds no rows, then the `brewery_products` row will not be in the output at all.


    What I need to really emulate the output of the scalar subquery method is a functionality
    like an `outer join`, which I do in Listing [1-7](#475066_1_En_1_Chapter.xhtml#PC11).
    In this listing, I still find the top year and quantity for each beer, but *only*
    of those yearly sales that were less than 400.


    ```

    SQL> select

    2     bp.brewery_name

    3   , bp.product_id as p_id

    4   , bp.product_name

    5   , top_ys.yr

    6   , top_ys.yr_qty

    7  from brewery_products bp

    8  outer apply(

    9     select

    10        ys.yr

    11      , ys.yr_qty

    12     from yearly_sales ys

    13     where ys.product_id = bp.product_id

    14     and ys.yr_qty < 400

    15     order by ys.yr_qty desc

    16     fetch first row only

    17  ) top_ys

    18  where bp.brewery_id = 518

    19  order by bp.product_id;

    Listing 1-7

    Using outer apply when you need outer join functionality

    ```


    In line 14, I make the inline view query only years that had sales of less than
    400 bottles. And then in line 8, I changed `cross apply` to `outer apply`, giving
    me this result:


    ```

    BREWERY_NAME        P_ID  PRODUCT_NAME      YR    YR_QTY

    Balthazar Brauerei  5310  Monks and Nuns

    Balthazar Brauerei  5430  Hercule Trippel   2017  344

    Balthazar Brauerei  6520  Der Helle Kumpel  2018  357

    ```


    If I had been using `cross apply` in line 8, I would only have seen the last two
    rows in the output.


    So `outer apply` is more correct to use if you want an output that is completely
    identical to the scalar subquery method. But just like you don’t want to use regular
    outer joins unnecessarily, you should use `cross apply` if you know for a fact
    that rows always will be returned.


    An `outer apply` is the same as a `left outer join lateral` with an `on 1=1` join
    clause, so `outer apply` cannot support right correlation, only left.


    There are cases where an `outer join lateral` is more flexible than `outer apply`,
    since you can actually use the `on` clause sensibly, like in Listing [1-8](#475066_1_En_1_Chapter.xhtml#PC13).


    ```

    SQL> select

    2     bp.brewery_name

    3   , bp.product_id as p_id

    4   , bp.product_name

    5   , top_ys.yr

    6   , top_ys.yr_qty

    7  from brewery_products bp

    8  left outer join lateral(

    9     select

    10        ys.yr

    11      , ys.yr_qty

    12     from yearly_sales ys

    13     where ys.product_id = bp.product_id

    14     order by ys.yr_qty desc

    15     fetch first row only

    16  ) top_ys

    17     on top_ys.yr_qty < 500

    18  where bp.brewery_id = 518

    19  order by bp.product_id;

    Listing 1-8

    Outer join with the lateral keyword

    ```


    Since I use `lateral` in the `left outer join` in line 8, the inline view is executed
    once for every beer, finding the best-selling year and quantity, just like most
    of the examples in the chapter. But in the `on` clause in line 17, I filter, so
    I only output a `top_ys` row if the quantity is less than 500\. It gives me this
    output, which is almost but not quite the same as the output of Listings [1-2](#475066_1_En_1_Chapter.xhtml#PC3)
    to [1-6](#475066_1_En_1_Chapter.xhtml#PC10):


    ```

    BREWERY_NAME        P_ID  PRODUCT_NAME      YR    YR_QTY

    Balthazar Brauerei  5310  Monks and Nuns

    Balthazar Brauerei  5430  Hercule Trippel   2018  451

    Balthazar Brauerei  6520  Der Helle Kumpel  2017  458

    ```


    Normally the `on` clause is for the joining of the two tables (or views) and shouldn’t
    really contain a filter predicate. But in this case, it is exactly *because* I
    do the filtering in the `on` clause that I get the preceding result. Filtering
    in different places would solve different problems:


    *   If the filter predicate is inside the inline view (like Listing [1-7](#475066_1_En_1_Chapter.xhtml#PC11)),
    the problem solved is “For each beer show me the best-selling year and quantity
    *out of those years that sold less than 400 bottles*.”


    *   If the filter predicate is in the `on` clause (like Listing [1-8](#475066_1_En_1_Chapter.xhtml#PC13)),
    the problem solved is “For each beer show me the best-selling year and quantity
    *if that year sold less than 500 bottles*.”


    *   If the filter predicate had been in the `where` clause right after line 18,
    the problem solved would have been “For each beer *where the best-selling year
    sold less than 500 bottles*, show me the best-selling year and quantity.” (And
    then it shouldn’t be an `outer join,` but just an `inner` or `cross join`.)


    In all, `lateral` and `apply` (both in `cross` and `outer` versions) have several
    uses that, though they might be solvable by various other workarounds, can be
    quite nice and efficient. Typically you don’t want to use it if the best access
    path would be to build the entire results of the inline view first and then hash
    or merge the join with the outer table (for such a case, Listing [1-4](#475066_1_En_1_Chapter.xhtml#PC6)
    is often a better solution). But if the best path would be to do the outer table
    and then nested loop join to the inline view, `lateral` and `apply` are very nice
    methods.


    Tip


    You will find more examples of doing Top-N queries in Chapter [12](#475066_1_En_12_Chapter.xhtml),
    more examples of `lateral` in Chapters [9](#475066_1_En_9_Chapter.xhtml) and [12](#475066_1_En_12_Chapter.xhtml),
    and examples of using `apply` on table functions in Chapter [9](#475066_1_En_9_Chapter.xhtml).


    ## Lessons learned


    In this chapter I’ve shown you some workarounds to some problems and then given
    you examples of how to solve the same using correlated inline views, so you now
    know about


    *   Using keyword `lateral` to enable doing a left correlation inside an inline
    view


    *   Distinguishing between `cross` and `outer` versions of joining to the lateral
    inline view


    *   Applying the `cross apply` or `outer apply` as alternative syntax to achieve
    a left correlation


    *   Deciding whether a correlated inline view or a regular inline view with analytic
    functions can solve a problem most efficiently


    Being able to correlate inline views can be handy for several situations in your
    application development.'
  trans: "### 关联内联视图的外连接\n\n到目前为止，我使用 `lateral` 和 `apply` 都只是 `cross` 变体。这意味着实际上我一直在取巧——它与使用标量子查询并不完全一样。只是因为所有啤酒的销售数据都存在，所以从清单\
    \ 1-2 到 1-6 的输出结果都相同。\n\n如果一个标量子查询找不到任何数据，那么 `brewery_products` 行对应输出列的值将是 null——但如果一个\
    \ `cross join lateral` 或 `cross apply` 内联视图找不到任何行，那么该 `brewery_products` 行将根本不会出现在输出中。\n\
    \n要真正模拟标量子查询方法的输出，我需要类似 `outer join` 的功能，如清单 1-7 所示。在此清单中，我仍然为每种啤酒找出销量最高的一年和数量，但仅限于那些年销售量低于\
    \ 400 瓶的年份。\n\n```sql\nselect\n   bp.brewery_name\n , bp.product_id as p_id\n\
    \ , bp.product_name\n , top_ys.yr\n , top_ys.yr_qty\nfrom brewery_products bp\n\
    outer apply(\n   select\n      ys.yr\n    , ys.yr_qty\n   from yearly_sales ys\n\
    \   where ys.product_id = bp.product_id\n   and ys.yr_qty < 400\n   order by ys.yr_qty\
    \ desc\n   fetch first row only\n) top_ys\nwhere bp.brewery_id = 518\norder by\
    \ bp.product_id;\n```\n\n**清单 1-7**\n当你需要 `outer join` 功能时使用 `outer apply`\n\n\
    在第 14 行，我让内联视图查询只包含销售量低于 400 瓶的年份。然后在第 8 行，我将 `cross apply` 改为 `outer apply`，得到以下结果：\n\
    \n```\nBREWERY_NAME        P_ID  PRODUCT_NAME      YR    YR_QTY\nBalthazar Brauerei\
    \  5310  Monks and Nuns\nBalthazar Brauerei  5430  Hercule Trippel   2017  344\n\
    Balthazar Brauerei  6520  Der Helle Kumpel  2018  357\n```\n\n如果我在第 8 行使用了 `cross\
    \ apply`，那么输出中将只会看到最后两行。\n\n因此，如果你想要与标量子查询方法完全相同的输出，使用 `outer apply` 更为正确。但就像你不想不必要地使用常规外连接一样，如果你确定知道总会有行返回，就应该使用\
    \ `cross apply`。\n\n`outer apply` 等同于带有 `on 1=1` 连接子句的 `left outer join lateral`，因此\
    \ `outer apply` 不支持右关联，只支持左关联。\n\n有些情况下，`outer join lateral` 比 `outer apply` 更灵活，因为你可以实际在\
    \ `on` 子句中进行有意义的使用，如清单 1-8 所示。\n\n```sql\nselect\n   bp.brewery_name\n , bp.product_id\
    \ as p_id\n , bp.product_name\n , top_ys.yr\n , top_ys.yr_qty\nfrom brewery_products\
    \ bp\nleft outer join lateral(\n   select\n      ys.yr\n    , ys.yr_qty\n   from\
    \ yearly_sales ys\n   where ys.product_id = bp.product_id\n   order by ys.yr_qty\
    \ desc\n   fetch first row only\n) top_ys\n   on top_ys.yr_qty < 500\nwhere bp.brewery_id\
    \ = 518\norder by bp.product_id;\n```\n\n**清单 1-8**\n带有 `lateral` 关键字的 `outer\
    \ join`\n\n由于我在第 8 行的 `left outer join` 中使用了 `lateral`，内联视图对每种啤酒执行一次，找出最畅销的年份和数量，就像本章大多数示例一样。但在第\
    \ 17 行的 `on` 子句中，我进行了过滤，因此仅当数量小于 500 时，我才输出 `top_ys` 行。这给出了以下输出，它与清单 1-2 到 1-6\
    \ 的输出几乎相同，但并非完全一致：\n\n```\nBREWERY_NAME        P_ID  PRODUCT_NAME      YR    YR_QTY\n\
    Balthazar Brauerei  5310  Monks and Nuns\nBalthazar Brauerei  5430  Hercule Trippel\
    \   2018  451\nBalthazar Brauerei  6520  Der Helle Kumpel  2017  458\n```\n\n\
    通常 `on` 子句是用于连接两个表（或视图）的，其中不应真正包含过滤谓词。但在这种情况下，正是由于我在 `on` 子句中进行了过滤，才得到了上述结果。在不同位置过滤可以解决不同的问题：\n\
    \n*   如果过滤谓词在内联视图内部（如清单 1-7），解决的问题是：“对于每种啤酒，向我展示那些销售量低于 400 瓶的年份中，最畅销的年份和数量。”\n\
    \n*   如果过滤谓词在 `on` 子句中（如清单 1-8），解决的问题是：“对于每种啤酒，如果某年的销售量低于 500 瓶，则向我展示该年最畅销的年份和数量。”\n\
    \n*   如果过滤谓词在第 18 行之后的 `where` 子句中，那么解决的问题将是：“对于最畅销年份销售量低于 500 瓶的每种啤酒，向我展示该最畅销年份和数量。”（并且，那样就不应该是\
    \ `outer join`，而只是 `inner` 或 `cross join`。）\n\n总的来说，`lateral` 和 `apply`（包括 `cross`\
    \ 和 `outer` 版本）有几种用途，尽管可能可以通过其他变通方法解决，但它们往往非常优雅且高效。通常，如果最佳访问路径是先构建内联视图的整个结果集，然后与外部表进行哈希连接或合并连接，那么你并不想使用它（对于这种情况，清单\
    \ 1-4 通常是更好的解决方案）。但如果最佳路径是先处理外部表，然后通过嵌套循环连接到内联视图，那么 `lateral` 和 `apply` 是非常优秀的方法。\n\
    \n**提示**\n\n你将在第 12 章找到更多关于执行 Top-N 查询的示例，在第 9 和 12 章找到更多关于 `lateral` 的示例，并在第\
    \ 9 章找到关于在表函数上使用 `apply` 的示例。\n\n## 经验教训\n\n在本章中，我向你展示了一些问题的变通解决方案，并给出了如何使用关联内联视图解决相同问题的示例，因此你现在了解了：\n\
    \n*   使用 `lateral` 关键字在内联视图中启用左关联\n*   区分连接到 lateral 内联视图的 `cross` 和 `outer` 变体\n\
    *   应用 `cross apply` 或 `outer apply` 作为实现左关联的替代语法\n*   判断关联内联视图还是带有分析函数的常规内联视图能最高效地解决问题\n\
    \n能够关联内联视图在你的应用开发中的多种情况下会非常方便。"
- fmt: '# 2. Pitfalls of Set Operations


    SQL and set theory are quite related, but in practical daily life, I think many
    developers (myself included) do not worry too much about theory. Maybe as a consequence
    thereof, it is typically more seldom that I see the set operators used than joins.
    Most often you get along with joins fine, but now and again, a well-chosen use
    of a set operator can be quite nice.


    But maybe because we don’t use the set operators as much, I see too often code
    where the developer unwittingly fell into one of the pitfalls that exists, specifically
    concerning using distinct sets or sets with duplicates.


    Most often you see the set operations illustrated with Venn diagrams like Figure
    2-1 (normally you’d see them horizontally; I show them vertically as it matches
    the code and illustrations I use later in the chapter). And it’s pretty clear
    what happens.


    ![../images/475066_1_En_2_Chapter/475066_1_En_2_Fig1_HTML.jpg](images/475066_1_En_2_Chapter/475066_1_En_2_Fig1_HTML.jpg)

    *Figure 2-1: Venn diagrams of the three set operations*


    But what often isn’t explained as well is that set theory in principle works on
    *distinct* sets – sets that have no duplicates. In fact the function `set` in
    Oracle SQL removes duplicates from a nested table turning it into a proper “set”
    according to set theory. In the practical life of a developer, it is often that
    we actually want to work with sets *including* duplicates, but the `set operators`
    default to working like set theory.


    And when you then add that the `multiset operators` default the other way around,
    confusion can easily abound. This chapter attempts to clear that confusion.


    ## Sets of beer


    In the schema for the Good Beer Trading Co, I have some views (shown in Figure
    2-2) I can use to demonstrate the set operations. The two views `brewery_products`
    and `customer_order_products` are both joins of multiple tables, but for the purposes
    in this chapter, you can think of them as tables, and the internals of the views
    are irrelevant.


    ![../images/475066_1_En_2_Chapter/475066_1_En_2_Fig2_HTML.jpg](images/475066_1_En_2_Chapter/475066_1_En_2_Fig2_HTML.jpg)

    *Figure 2-2: Two views for set examples and one for multiset examples*


    View `brewery_products` simply shows which beers are purchased from which breweries.
    A product will be shown only once per brewery.


    View `customer_order_products` shows which beers are sold to which customers,
    but also includes how much was sold and when, so a product can be shown multiple
    times per customer.


    The last view `customer_order_products_obj` contains the same data as `customer_order_products`
    but aggregated, so there is only one row per customer containing a nested table
    column `product_coll` with the product id and name for each time that product
    has been sold to the customer. The creation of the nested table type and this
    view is shown in Listing 2-1.


    ```sql

    SQL> create or replace type id_name_type as object (

    2     id     integer

    3   , name   varchar2(20 char)

    4  );

    5  /

    Type ID_NAME_TYPE compiled

    SQL> create or replace type id_name_coll_type

    2     as table of id_name_type;

    3  /

    Type ID_NAME_COLL_TYPE compiled

    SQL> create or replace view customer_order_products_obj

    2  as

    3  select

    4     customer_id

    5   , max(customer_name) as customer_name

    6   , cast(

    7        collect(

    8           id_name_type(product_id, product_name)

    9           order by product_id

    10        )

    11        as id_name_coll_type

    12     ) as product_coll

    13  from customer_order_products

    14  group by customer_id;

    View CUSTOMER_ORDER_PRODUCTS_OBJ created.

    ```

    *Listing 2-1: Creating the types and view for the multiset examples*


    With these views, I can show you the differences between `set` and `multiset`
    operators.


    ## Set operators


    I’m going to use just some of the data, so Listing 2-2 shows you the result of
    view `customer_order_products` for two customers.


    ```sql

    SQL> select

    2     customer_id as c_id, customer_name, ordered

    3   , product_id  as p_id, product_name, qty

    4  from customer_order_products

    5  where customer_id in (50042, 50741)

    6  order by customer_id, product_id;

    C_ID CUSTOMER_NAME   ORDERED     P_ID PRODUCT_NAME       QTY

    ------ --------------- ---------- ----- ----------------- ----

    50042 The White Hart  2019-01-15  4280 Hoppy Crude Oil    110

    50042 The White Hart  2019-03-22  4280 Hoppy Crude Oil     80

    50042 The White Hart  2019-03-02  4280 Hoppy Crude Oil     60

    50042 The White Hart  2019-03-22  5430 Hercule Trippel     40

    50042 The White Hart  2019-01-15  6520 Der Helle Kumpel   140

    50741 Hygge og Humle  2019-01-18  4280 Hoppy Crude Oil     60

    50741 Hygge og Humle  2019-03-12  4280 Hoppy Crude Oil     90

    50741 Hygge og Humle  2019-01-18  6520 Der Helle Kumpel    40

    50741 Hygge og Humle  2019-02-26  6520 Der Helle Kumpel    40

    50741 Hygge og Humle  2019-02-26  6600 Hazy Pink Cloud     16

    50741 Hygge og Humle  2019-03-29  7950 Pale Rider Rides    50

    50741 Hygge og Humle  2019-03-12  7950 Pale Rider Rides   100

    ```

    *Listing 2-2: Data for two customers and their orders*


    In the same way, Listing 2-3 shows the output of view `brewery_products` for two
    breweries.


    ```sql

    SQL> select

    2     brewery_id as b_id, brewery_name

    3   , product_id as p_id, product_name

    4  from brewery_products

    5  where brewery_id in (518, 523)

    6  order by brewery_id, product_id;

    B_ID BREWERY_NAME        P_ID PRODUCT_NAME

    ------ ------------------ ----- -----------------

    518 Balthazar Brauerei  5310 Monks and Nuns

    518 Balthazar Brauerei  5430 Hercule Trippel

    518 Balthazar Brauerei  6520 Der Helle Kumpel

    523 Happy Hoppy Hippo   6600 Hazy Pink Cloud

    523 Happy Hoppy Hippo   7790 Summer in India

    523 Happy Hoppy Hippo   7870 Ghost of Hops

    ```

    *Listing 2-3: Data for two breweries and the products bought from them*


    In set theory, a set has by definition unique values, a condition that `brewery_products`
    satisfies.


    But in practice in a database, you often don’t have unique values. If you look
    at the data in `customer_order_products`, it is unique when you include the `ordered`
    date and the `qty` value, but if you only look at product id and name per customer,
    it is *not* unique.


    This difference between real life and set theory is to a certain extent reflected
    in the set operators.'
