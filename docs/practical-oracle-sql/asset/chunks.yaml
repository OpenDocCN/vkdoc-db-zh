    3     select 2 from dual union all

    4     select 3 from dual union all

    5     select 6 from dual union all

    6     select 8 from dual union all

    7     select 9 from dual

    8  )

    9  select

    10     i

    11   , row_number() over (order by i)     as rn

    12   , i - row_number() over (order by i) as diff

    13  from ints

    14  order by i;

    Listing 18-1

    Difference between value and row_number

    ```


    Tabibitosan in Japanese means something like Mr. Pilgrim or Mr. Traveler. The
    idea is to imagine two walking pilgrims that both start at zero:


    *   The first pilgrim walks different distances each day, sometimes one mile and
    sometimes longer. His distance from the origin is represented by the integer value,
    in this case column `i`.


    *   The second pilgrim walks exactly one mile every day. His distance from the
    origin is represented by the results of `row_number` function that increases by
    exactly one for each row, in this case column `rn`.


    The third column in the output is the difference between `i` and `rn` . In the
    analogy, this represents the *distance* between the two pilgrims:


    ```

    I  RN  DIFF

    1  1   0

    2  2   0

    3  3   0

    6  4   2

    8  5   3

    9  6   3

    ```


    Those days where the first pilgrim travels at a speed of one mile per day, the
    distance between them remains the same. If the first pilgrim walks more than a
    single mile in one day, the distance between them increases. The numbers are fairly
    clear as is, but it’s even more clear when plotted on the graph in Figure [18-2](#475066_1_En_18_Chapter.xhtml#Fig2).


    ![../images/475066_1_En_18_Chapter/475066_1_En_18_Fig2_HTML.jpg](images/475066_1_En_18_Chapter/475066_1_En_18_Fig2_HTML.jpg)


    Figure 18-2


    Difference between the two pilgrims can be used for grouping


    In other words, the difference (the red diamonds in the graph) between the integer
    column and `row_number` will be *constant* for those rows where the integer column
    increases by exactly one per row (i.e., is consecutive), so I can easily `group
    by` this difference in Listing [18-2](#475066_1_En_18_Chapter.xhtml#PC3).


    ```

    SQL> with ints(i) as (

    2     select 1 from dual union all

    3     select 2 from dual union all

    4     select 3 from dual union all

    5     select 6 from dual union all

    6     select 8 from dual union all

    7     select 9 from dual

    8  )

    9  select

    10     min(i)   as first_int

    11   , max(i)   as last_int

    12   , count(*) as ints_in_grp

    13  from (

    14     select i, i - row_number() over (order by i) as diff

    15     from ints

    16  )

    17  group by diff

    18  order by first_int;

    Listing 18-2

    Tabibitosan grouping

    ```


    Simply wrap the difference calculation in an inline view in lines 14–15 and group
    by the `diff` in line 17, and I get an output specifying the three groups of consecutive
    integers found in the data:


    ```

    FIRST_INT  LAST_INT  INTS_IN_GRP

    1          3         3

    6          6         1

    8          9         2

    ```


    So why do it with pattern matching if a perfectly good method exists with analytic
    functions? Part of the answer is that it can become easier to adapt to changing
    requirements, as I’ll show you. Part of it is about the efficiency of doing a
    one-pass operation while working through the data, instead of two passes – first
    the analytic row numbering and then the grouping.


    In Listing [18-3](#475066_1_En_18_Chapter.xhtml#PC5), I show you how to get the
    exact same output as Listing [18-2](#475066_1_En_18_Chapter.xhtml#PC3), just using
    `match_recognize` instead of the Tabibitosan method.


    ```

    SQL> with ints(i) as (

    2     select 1 from dual union all

    3     select 2 from dual union all

    4     select 3 from dual union all

    5     select 6 from dual union all

    6     select 8 from dual union all

    7     select 9 from dual

    8  )

    9  select first_int, last_int, ints_in_grp

    10  from ints

    11  match_recognize (

    12     order by i

    13     measures

    14        first(i) as first_int

    15      , last(i)  as last_int

    16      , count(*) as ints_in_grp

    17     one row per match

    18     pattern (strt one_higher*)

    19     define

    20        one_higher as i = prev(i) + 1

    21  )

    22  order by first_int;

    Listing 18-3

    Same grouping with match_recognize

    ```


    It is reasonably straightforward and reads like this:


    *   I define classification `one_higher` in line 20 to be a row where `i` is exactly
    1 greater than the previous `i` – indicating it is consecutive to the previous
    row.


    *   The `pattern` in line 18 looks for any row (classified `strt`) followed by
    zero or more `one_higher` rows. So this matches a group of rows as long as they
    have consecutive `i` values – when it no longer is consecutive, the match stops.


    *   Instead of the `group by` in Tabibitosan, here I can simply specify in line
    17 that I just want a single row output per match.


    *   Lines 14–16 get me the same values as Listing [18-2](#475066_1_En_18_Chapter.xhtml#PC3),
    just without grouping; here the pattern matching can work out the results as it
    walks along the data.


    I’ve laid the ground rules with some simple integer data showing analytic function
    solution vs. pattern matching; now I’ll move on to doing the same with a different
    datatype on more realistic data.'
  trans: '## 解析式 Tabibitosan 方法与 match_recognize 对比


    在继续展示示例表之前，我将先引导您了解 Tabibitosan 方法——这是一种使用单个分析函数查找连续整数组的方法。该方法由 Aketi Jyuuzou
    在 Oracle 社区论坛（当时的 OTN 论坛）上提出。


    我将从代码清单 18-1 开始，这里我仅使用`with`子句生成一些带数字的行，而非创建真实表格。


    ```sql

    SQL> with ints(i) as (

    2     select 1 from dual union all

    3     select 2 from dual union all

    4     select 3 from dual union all

    5     select 6 from dual union all

    6     select 8 from dual union all

    7     select 9 from dual

    8  )

    9  select

    10     i

    11   , row_number() over (order by i)     as rn

    12   , i - row_number() over (order by i) as diff

    13  from ints

    14  order by i;

    Listing 18-1

    数值与行号之差

    ```


    Tabibitosan 在日语中意为"朝圣者先生"或"旅行者先生"。其核心思想是想象两位同时从零点出发的行走朝圣者：


    *   第一位朝圣者每天行走不同距离，有时一英里，有时更远。他与起点的距离由整数值表示，即本例中的列`i`。


    *   第二位朝圣者每天固定行走一英里。他与起点的距离由`row_number`函数结果表示，该函数每行恰好增加 1，即本例中的列`rn`。


    输出中的第三列是`i`与`rn`的差值。在这个比喻中，这代表两位朝圣者之间的*距离*：


    ```

    I  RN  DIFF

    1  1   0

    2  2   0

    3  3   0

    6  4   2

    8  5   3

    9  6   3

    ```


    当第一位朝圣者每天行走一英里时，他们之间的距离保持不变。若第一位朝圣者某天行走超过一英里，他们之间的距离就会增加。这些数字本身已经相当清晰，但用图 18-2
    中的图表呈现会更加直观。


    ![`../images/475066_1_En_18_Chapter/475066_1_En_18_Fig2_HTML.jpg`](img/475066_1_En_18_Fig2_HTML.jpg)


    **图 18-2**


    两位朝圣者之间的距离差可用于分组


    换言之，整数列与`row_number`的差值（图中的红色菱形）在那些整数列每行恰好增加 1（即连续）的行中将*保持恒定*，因此我可以在代码清单 18-2
    中轻松地按此差值进行`group by`分组。


    ```sql

    SQL> with ints(i) as (

    2     select 1 from dual union all

    3     select 2 from dual union all

    4     select 3 from dual union all

    5     select 6 from dual union all

    6     select 8 from dual union all

    7     select 9 from dual

    8  )

    9  select

    10     min(i)   as first_int

    11   , max(i)   as last_int

    12   , count(*) as ints_in_grp

    13  from (

    14     select i, i - row_number() over (order by i) as diff

    15     from ints

    16  )

    17  group by diff

    18  order by first_int;

    Listing 18-2

    Tabibitosan 分组法

    ```


    只需在第 14-15 行将差值计算包装在内联视图中，并在第 17 行按`diff`分组，即可得到输出，明确指出数据中找到的三组连续整数：


    ```

    FIRST_INT  LAST_INT  INTS_IN_GRP

    1          3         3

    6          6         1

    8          9         2

    ```


    那么，既然存在分析函数这种完美有效的方法，为何还要使用模式匹配呢？部分答案是，正如我将展示的，它能更容易适应不断变化的需求。另一部分原因则关乎效率——它能在遍历数据时进行单次操作，而非先执行分析函数行编号、再分组的两次遍历。


    在代码清单 18-3 中，我展示了如何使用`match_recognize`而非 Tabibitosan 方法，获得与代码清单 18-2 完全相同的输出。


    ```sql

    SQL> with ints(i) as (

    2     select 1 from dual union all

    3     select 2 from dual union all

    4     select 3 from dual union all

    5     select 6 from dual union all

    6     select 8 from dual union all

    7     select 9 from dual

    8  )

    9  select first_int, last_int, ints_in_grp

    10  from ints

    11  match_recognize (

    12     order by i

    13     measures

    14        first(i) as first_int

    15      , last(i)  as last_int

    16      , count(*) as ints_in_grp

    17     one row per match

    18     pattern (strt one_higher*)

    19     define

    20        one_higher as i = prev(i) + 1

    21  )

    22  order by first_int;

    Listing 18-3

    使用 match_recognize 实现相同分组

    ```


    该方法相当直接，可解读如下：


    *   我在第 20 行定义分类`one_higher`：当`i`恰好比前一个`i`大 1 时——表明它与前一行连续。

    *   第 18 行的`pattern`查找任何行（分类为`strt`），后跟零个或多个`one_higher`行。因此，只要行中的`i`值连续，该模式就会匹配一组行——当不再连续时，匹配停止。

    *   与 Tabibitosan 中的`group by`不同，这里我可以在第 17 行简单指定每个匹配仅输出一行。

    *   第 14-16 行获得了与代码清单 18-2 相同的值，只是无需分组；此处模式匹配能在遍历数据时直接计算出结果。


    我已通过一些简单的整数数据展示了分析函数解决方案与模式对比的基本规则；现在，我将使用不同数据类型在更实际的数据上进行相同操作。'
- fmt: '## Consecutive Dates Instead of Integers


    In the `server_heartbeat` table, I should get a heartbeat stored from every server
    exactly every five minutes. In Listing [18-4](#475066_1_En_18_Chapter.xhtml#PC6),
    you see the data of the table.


    ```

    SQL> select server, beat_time

    2  from server_heartbeat

    3  order by server, beat_time;

    Listing 18-4

    Server heartbeat as example of something other than integers

    ```


    Observe there are two servers and there are places where one or more heartbeats
    have been skipped:


    ```

    SERVER      BEAT_TIME

    10.0.0.100  2019-04-10 13:00:00

    10.0.0.100  2019-04-10 13:05:00

    10.0.0.100  2019-04-10 13:10:00

    10.0.0.100  2019-04-10 13:15:00

    10.0.0.100  2019-04-10 13:20:00

    10.0.0.100  2019-04-10 13:35:00

    10.0.0.100  2019-04-10 13:40:00

    10.0.0.100  2019-04-10 13:45:00

    10.0.0.100  2019-04-10 13:55:00

    10.0.0.142  2019-04-10 13:00:00

    10.0.0.142  2019-04-10 13:20:00

    10.0.0.142  2019-04-10 13:25:00

    10.0.0.142  2019-04-10 13:50:00

    10.0.0.142  2019-04-10 13:55:00

    ```


    Can I use Tabibitosan to group rows that are consecutive with exactly 5-minute
    intervals? Yes, surely. I just need to adjust the “unit” used, so it becomes a
    5-minute unit instead of a simple number 1. I do that in Listing [18-5](#475066_1_En_18_Chapter.xhtml#PC8).


    ```

    SQL> select

    2     server

    3   , min(beat_time) as first_beat

    4   , max(beat_time) as last_beat

    5   , count(*)       as beats

    6  from (

    7     select

    8        server

    9      , beat_time

    10      , beat_time - interval ''5'' minute

    11                  * row_number() over (

    12                       partition by server

    13                       order by beat_time

    14                    ) as diff

    15     from server_heartbeat

    16  )

    17  group by server, diff

    18  order by server, first_beat;

    Listing 18-5

    Tabibitosan adjusted to 5-minute intervals

    ```


    What was `i` before in Listing [18-2](#475066_1_En_18_Chapter.xhtml#PC3) is now
    `beat_time` in line 9. In order to create something with a constant difference
    as long as the rows are consecutive, in lines 10–14, I multiply `row_number()`
    with an `interval` of 5 minutes, which I then can subtract from the `beat_time`
    to get the `diff` value I can use for grouping.


    Since (unlike Listing [18-2](#475066_1_En_18_Chapter.xhtml#PC3)) I do this per
    server instead of on all rows at once, I use `partition by` in line 12. That way
    I get this output with three groups for each server:


    ```

    SERVER      FIRST_BEAT           LAST_BEAT            BEATS

    10.0.0.100  2019-04-10 13:00:00  2019-04-10 13:20:00  5

    10.0.0.100  2019-04-10 13:35:00  2019-04-10 13:45:00  3

    10.0.0.100  2019-04-10 13:55:00  2019-04-10 13:55:00  1

    10.0.0.142  2019-04-10 13:00:00  2019-04-10 13:00:00  1

    10.0.0.142  2019-04-10 13:20:00  2019-04-10 13:25:00  2

    10.0.0.142  2019-04-10 13:50:00  2019-04-10 13:55:00  2

    ```


    Multiplying `row_number()` with an `interval` to make a “unit” adjustment is not
    hard, but it is not really very clear from reading the code in Listing [18-5](#475066_1_En_18_Chapter.xhtml#PC8)
    what this `diff` calculation is good for and what it does.


    So let me try to similarly adapt Listing [18-4](#475066_1_En_18_Chapter.xhtml#PC6)
    to the 5-minute interval data and create Listing [18-6](#475066_1_En_18_Chapter.xhtml#PC10),
    which will give me the same output as Listing [18-5](#475066_1_En_18_Chapter.xhtml#PC8).


    ```

    SQL> select server, first_beat, last_beat, beats

    2  from server_heartbeat

    3  match_recognize (

    4     partition by server

    5     order by beat_time

    6     measures

    7        first(beat_time) as first_beat

    8      , last(beat_time)  as last_beat

    9      , count(*)         as beats

    10     one row per match

    11     pattern (strt five_mins_later*)

    12     define

    13        five_mins_later as

    14           beat_time = prev(beat_time) + interval ''5'' minute

    15  )

    16  order by server, first_beat;

    Listing 18-6

    Same adjustment to match_recognize solution

    ```


    I have given definitions and measures some other names than in Listing [18-4](#475066_1_En_18_Chapter.xhtml#PC6),
    so they represent the data better.


    But the only *functional* change I made is in line 14 (compared to line 20 in
    Listing [18-4](#475066_1_En_18_Chapter.xhtml#PC6)), where I replaced `+ 1` with
    `+ interval ''5'' minute` – that is all it took to change the functionality, and
    it is very self-documenting.


    You might have noticed that the data is very neatly exactly 5 minutes apart, which
    in reality is unlikely for such heartbeat data that probably arrives within some
    seconds either side of the exact time. I could create neatly aligned data by having
    a `before insert` trigger that rounded the inserted value to the nearest 5-minute
    value, but that would lose information (e.g., I might be interested in seeing
    that one server was always about 20 seconds late).


    So rather than “massage” the data, I want to change my query to allow for a certain
    leeway rather than looking for exactly 5 minutes. With the Tabibitosan method,
    I’d have to round the values to the nearest 5 minutes at query time in order to
    achieve the “constant difference” for grouping. With pattern matching, it is much
    easier to simply adapt the definition and change line 14 of Listing [18-6](#475066_1_En_18_Chapter.xhtml#PC10)
    into a condition with a `between` clause to define that `five_mins_later` means
    somewhere between 4 and 6 minutes later:


    ```

    ...

    12     define

    13        five_mins_later as

    14           beat_time between prev(beat_time) + interval ''4'' minute

    15                         and prev(beat_time) + interval ''6'' minute

    ...

    ```


    Again it is almost plain English and fairly readable and self-documenting.


    But these queries found me groups of rows that are consecutive (for some unit
    of measurement). Often what I’m asked to find is the *gaps* between such groups;
    where are data *missing* that should have been there.'
