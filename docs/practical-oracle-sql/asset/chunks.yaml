    在股票代码分析中，W形态（也称为双底）预示着趋势反转，因此在数据中搜索该模式非常重要。好吧，我已经知道如何查找V形态，所以我只需扩展清单 [17-6](#475066_1_En_17_Chapter.xhtml#PC24)
    中第 14 行的模式子句。


    ```sql

