- fmt: '# Linear regression


    As you may have guessed by now, in Listing [15-6](#475066_1_En_15_Chapter.xhtml#PC9),
    I put the previous calculations into `with` clause `s4` and proceed to perform
    linear regression.


    ```sql

    SQL> with s1 as (

    ...     /* Listing 15-2 minus order by */

    23  ), s2 as (

    ...     /* Listing 15-3 final query minus order by */

    41  ), s3 as (

    ...     /* Listing 15-4 final query minus order by */

    53  ), s4 as (

    ...     /* Listing 15-5 final query minus order by */

    65  )

    66  select

    67     product_id, mth, ts, yr, mthno, qty, cma, s, des

    68   , regr_intercept(des, ts) over (

    69        partition by product_id

    70     ) + ts * regr_slope(des, ts) over (

    71                 partition by product_id

    72              ) as t -- trend

    73  from s4

    74  order by product_id, mth;

    Listing 15-6

    Calculating trend line

    ```


    I am using two of the analytic linear regression functions here, each partitioned
    by product:


    *   Both functions accept two parameters, first the `y` coordinate of the graph
    and second the `x` coordinate. In my case the `des` (deseasonalized) value is
    the y coordinate, while `ts` (time series) is the x coordinate. I cannot use month
    directly; it must be a numeric datatype, so `ts` with a unit of 1 month is perfect.


    *   Lines 68–70 use `regr_intercept`, which gives me the *interception point*
    between the y axis and the interpolated straight line. In other words, the y value
    where x = 0.


    *   Lines 70–72 use `regr_slope`, which gives me the *slope* of the interpolated
    straight line. The slope is how much the y value increases (or decreases if negative)
    when the x value increases by 1. Since my x axis has a unit of 1 month, the slope
    therefore is how much the graph goes up (or down) per month.


    *   So in total lines 68–72 calculate the y value where x = 0 (`regr_intercept`)
    and for each month add the number of months (`ts`) times how much it goes up (or
    down) per month (`regr_slope`).


    Plotted on the graph in Figure [15-5](#475066_1_En_15_Chapter.xhtml#Fig5), I have
    now a straight trend line `t` that has a value in all 48 months.


    ![../images/475066_1_En_15_Chapter/475066_1_En_15_Fig5_HTML.jpg](images/475066_1_En_15_Chapter/475066_1_En_15_Fig5_HTML.jpg)


    Figure 15-5

    Trend line for Reindeer Fuel by linear regression


    I shove the calculation so far into `with` clause `s5` in Listing [15-7](#475066_1_En_15_Chapter.xhtml#PC10),
    and I can now do the final step in the forecast.


    ```sql

    SQL> with s1 as (

    ...     /* Listing 15-2 minus order by */

    23  ), s2 as (

    ...     /* Listing 15-3 final query minus order by */

    41  ), s3 as (

    ...     /* Listing 15-4 final query minus order by */

    53  ), s4 as (

    ...     /* Listing 15-5 final query minus order by */

    65  ), s5 as (

    ...     /* Listing 15-6 final query minus order by */

    74  )

    75  select

    76     product_id, mth, ts, yr, mthno, qty, cma, s, des

    77   , t * s as forecast --reseasonalized

    78  from s5

    79  order by product_id, mth;

    Listing 15-7

    Reseasonalizing trend ➤ forecast

    ```


    It is very simple – in line 77, I *reseasonalize* the trend line `t` by multiplying
    it with the seasonality factor `s`.


    Remember that the seasonality factor values were available in all rows in all
    years, including 2019 for which we have no sales data but wish a forecast. And
    as the trend line also exists in rows for 2019, I can plot the `forecast` values
    into Figure [15-6](#475066_1_En_15_Chapter.xhtml#Fig6).


    ![../images/475066_1_En_15_Chapter/475066_1_En_15_Fig6_HTML.jpg](images/475066_1_En_15_Chapter/475066_1_En_15_Fig6_HTML.jpg)


    Figure 15-6

    Reseasonalized forecast for Reindeer Fuel


    Having both `qty` and `forecast` values plotted in the same graph enables me visually
    to check if the model fits my data reasonably well. The closer the two lines match
    in 2016–2018, the more I can trust the forecast in 2019. In this case, it looks
    like it fits fairly well.


    ## Final forecast


    Having satisfied myself that the model looks like it fits my data, I’m going to
    clean up a little and not retrieve the columns with all the intermediate calculations,
    but instead in Listing [15-8](#475066_1_En_15_Chapter.xhtml#PC11), I just get
    the relevant information for showing my users the actual and forecast sales quantity.


    ```sql

    SQL> with s1 as (

    ...     /* Listing 15-2 minus order by */

    23  ), s2 as (

    ...     /* Listing 15-3 final query minus order by */

    41  ), s3 as (

    ...     /* Listing 15-4 final query minus order by */

    53  ), s4 as (

    ...     /* Listing 15-5 final query minus order by */

    65  ), s5 as (

    ...     /* Listing 15-6 final query minus order by */

    74  )

    75  select

    76     product_id

    77   , mth

    78   , case

    79        when ts <= 36 then qty

    80        else round(t * s)

    81     end as qty

    82   , case

    83        when ts <= 36 then ''Actual''

    84        else ''Forecast''

    85     end as type

    86  from s5

    87  order by product_id, mth;

    Listing 15-8

    Selecting actual and forecast

    ```


    I simply select the product and month, and then I use a `case` structure twice
    to give me a `qty` column and a `type` column:


    *   Lines 78–81 give me actual sold quantity for the first 36 months and the forecast
    (reseasonalized trend) for the last 12 months. As I cannot sell fractional beers,
    I’m rounding the forecast to integers.


    *   Lines 82–85 populate the `type` column with `Actual` for the first 36 months
    and `Forecast` for the last 12 months to allow me to distinguish what the contents
    of `qty` represent.


    That way I produce a simpler output:


    ```sql

    PROD MTH      QTY TYPE

    ---- ------- ---- --------

    4160 2016-01   79 Actual

    4160 2016-02  133 Actual

    ...

    4160 2018-11   73 Actual

    4160 2018-12  160 Actual

    4160 2019-01  222 Forecast

    4160 2019-02  325 Forecast

    ...

    4160 2019-11   26 Forecast

    4160 2019-12  191 Forecast

    7790 2016-01    4 Actual

    7790 2016-02    6 Actual

    ...

    7790 2018-11    3 Actual

    7790 2018-12    5 Actual

    7790 2019-01    1 Forecast

    7790 2019-02    7 Forecast

    ...

    7790 2019-11    3 Forecast

    7790 2019-12    3 Forecast

    96 rows selected.

    ```


    In Figure [15-7](#475066_1_En_15_Chapter.xhtml#Fig7) I plot these into a graph,
    where I show the results for both beers (same as I showed in Figure [15-2](#475066_1_En_15_Chapter.xhtml#Fig2),
    just now with the forecast added in).


    ![../images/475066_1_En_15_Chapter/475066_1_En_15_Fig7_HTML.jpg](images/475066_1_En_15_Chapter/475066_1_En_15_Fig7_HTML.jpg)


    Figure 15-7

    The monthly sales 2016–2018 plus the forecasts for 2019


    For Reindeer Fuel I’ve shown all the details in the previous pages, and here I
    only show the actual sales and the 2019 forecast. But even without the details
    in this graph, you can still visually see that it is a beer selling well in the
    winter time, it sells a little more each year, and the 2019 forecast graph matches
    the shape of the other years, just a little higher.


    The other beer, Summer in India, sells well in the summertime and sells a little
    less each year, and the 2019 forecast is shaped like the other years, just a little
    lower.


    All in all, for these two beers, this forecasting model looks quite good; and
    being entirely developed in SQL with analytic functions, it performs quite well
    indeed. At the job I mentioned at the start of the chapter, I forecasted 100,000
    products by inserting 1.2 million rows to a forecast table using `insert into…select…`
    in 1½ minute.


    Other products with a less nice seasonal variation profile might not fit as well
    into this forecasting model. This is where you probably need statistical tools
    instead of plain SQL in order to discover which forecasting models fit best to
    which products (or whatever you are forecasting).


    However, it can still be a nice option to use the tools in a discovery phase,
    and once you have categorized your products into a handful of different models,
    maybe it can still make sense then to implement this handful of models using the
    power of SQL to be able to efficiently process lots of data without needing to
    pull them out of the database.'
