    Here I chose to show the average number of seconds used to drive between picking
    locations and the average number of seconds used working (picking and packing)
    at each stop. I could just as easily have used `min`, `max`, `median`, `sum`,
    and so on, but I leave that as an exercise for the reader. It is more interesting
    to move on to analyzing the data when I also want to include the picking activity.


    ## Analyzing picking activity


    It is possible for me to use a similar technique with `lead` to include the picking
    activity, as I show in Listing [14-5](#475066_1_En_14_Chapter.xhtml#PC9).


    ```

    SQL> select

    2     emp, list

    3   , to_char(depart, ''HH24:MI:SS'') as depart

    4   , to_char(arrive, ''HH24:MI:SS'') as arrive

    5   , to_char(pick1 , ''HH24:MI:SS'') as pick1

    6   , to_char(

    7        case when pick2 < next_depart then pick2 end

    8      , ''HH24:MI:SS''

    9     ) as pick2

    10   , to_char(next_depart, ''HH24:MI:SS'') as next_dep

    11   , round((arrive      - depart)*(24*60*60)) as drv

    12   , round((next_depart - arrive)*(24*60*60)) as wrk

    13  from (

    14     select

    15        list.picker_emp_id as emp

    16      , list.id            as list

    17      , log.activity       as act

    18      , log.log_time       as depart

    19      , lead(log_time) over (

    20           partition by list.id

    21           order by log.log_time

    22        ) as arrive

    23      , lead(

    24           case log.activity when ''P'' then log_time end

    25        ) ignore nulls over (

    26           partition by list.id

    27           order by log.log_time

    28        ) as pick1

    29      , lead(

    30           case log.activity when ''P'' then log_time end, 2

    31        ) ignore nulls over (

    32           partition by list.id

    33           order by log.log_time

    34        ) as pick2

    35      , lead(

    36           case log.activity when ''D'' then log_time end

    37        ) ignore nulls over (

    38           partition by list.id

    39           order by log.log_time

    40        ) as next_depart

    41     from picking_list list

    42     join picking_log log

    43        on log.picklist_id = list.id

    44  )

    45  where act = ''D''

    46  order by list, depart;

    Listing 14-5

    Including picking activity

    ```


    I have here four calls to `lead`, which for any `D` row will give me the following:


    *   Lines 19–22 give me the next row after the `D` row, which always will be an
    `A` row.

    *   Lines 23–28 give me the next `P` row after the `D` row by using a `case` expression
    to return null for all rows that are *not* `P` rows, enabling me to skip those
    rows using `ignore nulls`.

    *   Lines 29–34 are almost identical, just adding parameter 2 in line 30 to get
    the *second* `P` row after the `D` row.

    *   Lines 35–40 finally use the `case` and `ignore nulls` technique to get me
    the next `D` row after the current `D` row.


    All that gives me an output very similar to that of Listing [14-3](#475066_1_En_14_Chapter.xhtml#PC5),
    just adding columns for the time of the first and second (if any) picks:


    ```

    EMP  LIST  DEPART    ARRIVE    PICK1     PICK2     NEXT_DEP  DRV  WRK

    149  841   14:05:11  14:05:44  14:05:52            14:06:01  33   17

    149  841   14:06:01  14:06:20  14:06:27            14:06:35  19   15

    ...

    149  841   14:11:26  14:12:42  14:12:53            14:13:00  76   18

    149  841   14:13:00  14:14:41                                101

    152  842   16:01:12  16:01:48  16:01:53            16:02:04  36   16

    ...

    152  842   16:07:03  16:07:12  16:07:16  16:07:22  16:07:34  9    22

    152  842   16:07:34  16:08:44  16:08:49            16:08:58  70   14

    152  842   16:08:58  16:09:23  16:09:34  16:09:42  16:09:53  25   30

    152  842   16:09:53  16:11:42                                109

    21 rows selected.

    ```


    I *could* then start calculating how many seconds were spent picking and packing
    out of the `wrk` seconds, but it is not really a good way to continue, as this
    code only works if the worker picks *at most* two picking lines at each stop on
    the route. And it’s a bad idea to try to keep adding multiple `lead` calls to
    try and create columns `pick1` to `pick<n>`. I want to try something else instead.


    When I don’t know how many picks there might be for each stop, it is better to
    work with rows instead of columns. But then I somehow need to know which rows
    belong together in a picking cycle. I can do that with `last_value` in Listing
    [14-6](#475066_1_En_14_Chapter.xhtml#PC11).'
