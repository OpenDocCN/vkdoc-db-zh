    considered true, so it can be used as a kind of `else` option.


    All in all, understanding these examples will help you gain the way of thinking
    that lets you really utilize all the power of `match_recognize`.


    # 22. Counting Children in Trees


    Sometimes you’d like to do aggregation where a row is included in multiple rows
    of the output, for example, being counted multiple times or having the value added
    multiple times. An example of this is hierarchical data, where you want for every
    row to find the count of all the children in the tree – not just immediate children
    but also grandchildren and their children and so on, all the way down to the leaves
    of the tree.


    It means that a given row is counted in the result for the parent, but also counted
    again in the result of the grandparent, and so on. It can look similar to subtotals
    created with `group by` and `rollup`, but with the hierarchy, you don’t know how
    many levels down it goes, so you cannot simply use `rollup`.


    One way I can solve this is using the `after match skip to next row` clause of
    `match_recognize`. Of course it could be used for other aggregates than `count`,
    but `count` is easy to understand, and once you know the technique, you can do
    the others easily.'
  trans: '

    你可以看到每个数量是如何分布到各个箱子里的，就像图 21-2 所示，其中列`qty1`、`qty2`和`qty3`是运行总和，分别显示到目前为止有多少数量已放入
    box1、box2 和 box3。


    这种方法唯一的缺点是更改箱子数量需要做较多工作。例如，如果我有四个箱子而不是三个，我需要像这样修改`代码清单 21-8`：


    ```

    20     pattern (

    21        (box1 | box2 | box3 | box4)*

    22     )

    23     define

    24        box1 as count(box1.*) = 1

    25             or sum(box1.qty) - box1.qty

    26                  <= least(

    27                        sum(box2.qty)

    28                      , sum(box3.qty)

    29                      , sum(box4.qty)

    30                     )

    31      , box2 as count(box2.*) = 1

    32             or sum(box2.qty) - box2.qty

    33                  <= least(sum(box3.qty), sum(box4.qty))

    34      , box3 as count(box3.*) = 1

    35             or sum(box3.qty) - box3.qty

    36                  <= sum(box4.qty)

    ```


    为了完成整个工作，在`代码清单 21-9`中，我对每个产品都执行此操作，以便每个产品都有三个容量无限的箱子。


    ```

    SQL> select product_name, wh, aisle, pos, qty, box

    2  from (

    3     select

    4        product_id

    5      , product_name

    6      , warehouse as wh

    7      , aisle

    8      , position  as pos

    9      , qty

    10     from inventory_with_dims

    11  ) iwd

    12  match_recognize (

    13     partition by product_id

    ...

    28  )

    29  order by wh, aisle, pos;

    代码清单 21-9

    每个产品各装三个箱子——按位置排序的输出

    ```


    我是通过第 13 行的`partition by`实现这一点的。如果我跳过这一行，所有啤酒都会被装进同样的三个箱子里。


    然后我按位置顺序对输出进行了排序，因此这可以作为从仓库打包所有物品的装箱清单：


    ```

    PRODUCT_NAME      WH  AISLE  POS  QTY  BOX

    Ghost of Hops     1   A      2    39   BOX1

    Reindeer Fuel     1   A      3    48   BOX1

    Hoppy Crude Oil   1   A      4    37   BOX2

    ...

    Hazy Pink Cloud   2   D      23   17   BOX2

    Reindeer Fuel     2   D      25   29   BOX2

    Pale Rider Rides  2   D      28   40   BOX3

    已选择 113 行。

    ```


    也许你认为这不是一种非常实用的啤酒装箱方法，因为在现实生活中啤酒箱当然不会有无限容量。但这个原理同样适用于其他情况——一个相当常见的例子是在给定的处理器/资源集上调度任务。这里不是分配数量，而是尽可能均匀地分配时间——将任务分配给已用分钟数最少的处理器，等价于将其分配给最早可用时间段的处理器。


    ## 经验总结


    装箱拟合本身就是一个难以获得最优拟合的问题；通常需要在接近最优拟合的复杂解决方案与近似拟合的更简单、更快的解决方案之间做出选择。你选择什么通常取决于你的业务目的需要多好的近似值。


    在本章中，我给你的不是完美拟合的解决方案，而是近似解——有限箱子数量的装箱拟合效果相当好，而无限箱子数量的装箱拟合则是一个相对粗糙的近似。但借助`match_recognize`，它们相当快速，并且它们是很好的例子来教你以下内容：


    *   在`define`子句中使用运行聚合，使分类依赖于截至当前行的汇总值。

    *   创建计算列值以支持复杂的排序，使`match_recognize`子句能够按照非常特定的期望顺序遍历数据。

    *   让`pattern`匹配*所有*行，并利用`define`对所有行进行分类，这可以作为一种选择，使`match_recognize`成为创建数据操作算法而非数据搜索工具的手段。

    *   在`define`子句中使用其他分类变量的聚合，使不同分类变量的结果相互依赖。

    *   利用*未定义*的分类变量默认情况下被视为`true`这一事实，因此它可以作为一种`else`选项来使用。


    总而言之，理解这些示例将帮助你获得思维方式，从而真正利用`match_recognize`的全部威力。


    ---


    # 22. 在树中统计子节点数量


    有时你希望进行聚合，其中一行被包含在输出的多行中，例如，被计数多次或其值被累加多次。一个例子是分层数据，你希望为每一行找出树中所有子节点的数量——不仅仅是直接子节点，还包括孙节点、孙节点的子节点等等，一直到树的叶子节点。


    这意味着一个给定的行在父节点的结果中被计数一次，但在祖父节点的结果中又被计数一次，依此类推。它看起来类似于使用`group by`和`rollup`创建的小计，但在层次结构中，你不知道它向下延伸了多少层，所以你不能简单地使用`rollup`。


    我解决这个问题的一种方法是使用`match_recognize`的`after match skip to next row`子句。当然，它也可以用于`count`以外的其他聚合，但`count`易于理解，一旦你掌握了这项技术，你就可以轻松地做其他的了。

    '
- fmt: '## 员工层级树


    用于演示 Oracle 层次查询最经典的表是 `scott.emp` 表。当然，“好啤酒贸易公司”也雇佣员工，因此我的 `practical` 模式中自然也有一个
    `employees` 表，如图 [22-1](#475066_1_En_22_Chapter.xhtml#Fig1) 所示。


    ![../images/475066_1_En_22_Chapter/475066_1_En_22_Fig1_HTML.jpg](images/475066_1_En_22_Chapter/475066_1_En_22_Fig1_HTML.jpg)


    图 22-1

    具有自引用外键的 employees 表


    `supervisor_id` 列是一个自引用外键，它引用了主键 `id`。只有一个人没有上司——公司的老板——对于其他所有人，`supervisor_id`
    包含了他们在员工层级中直属上司的 `id`。因此，我可以用清单 [22-1](#475066_1_En_22_Chapter.xhtml#PC1) 向你展示表中的树形数据。


    ```

    SQL> select

    2     e.id

    3   , lpad('' '', 2*(level-1)) || e.name as name

    4   , e.title as title

    5   , e.supervisor_id as super

    6  from employees e

    7  start with e.supervisor_id is null

    8  connect by e.supervisor_id = prior e.id

    9  order siblings by e.name;

    清单 22-1

    一个经典的员工层次查询

    ```


    对于像这样简单的层次结构，我倾向于使用 Oracle 专有的 `connect by` 查询，而不是我在第 [4](#475066_1_En_4_Chapter.xhtml)
    章展示的递归子查询因子化。使用 `connect by` 更容易做的事情之一，例如，就是我在这里使用的 `order siblings by`——如果用递归子查询因子化来编码会更加麻烦。


    因此，我通过第 7 行指定从没有上司的人开始，即从老板开始。然后第 8 行找到老板的直属下属，然后递归地查找这些下属的下属，以此类推：


    ```

    ID   NAME                TITLE              SUPER

    142  Harold King         Managing Director

    144    Axel de Proef     Product Director   142

    151      Jim Kronzki     Sales Manager      144

    150        Laura Jensen  Bulk Salesman      151

    154        Simon Chang   Retail Salesman    151

    148      Maria Juarez    Purchaser          144

    147    Ursula Mwbesi     Operations Chief   142

    146      Lim Tok Lo      Warehouse Manager  147

    152        Evelyn Smith  Forklift Operator  146

    149        Kurt Zollman  Forklift Operator  146

    155        Susanne Hoff  Janitor            146

    143      Mogens Juel     IT Manager         147

    153        Dan Hoeffler  IT Supporter       143

    145        Zoe Thorston  IT Developer       143

    ```


    虽然人名不同，但你很可能在别处使用 `scott.emp` 看到过非常相似的输出。这个查询将构成本章后续展示的所有 SQL 的基础。


    ## 统计所有级别的下属


    现在的任务是针对每一行，统计树中所有级别的下属数量——不仅仅是下一级的直属下属。如果你看图 [22-2](#475066_1_En_22_Chapter.xhtml#Fig2)
    中的组织结构图，我需要发现 Harold King 有 13 个下属（除了他自己之外的所有员工），Ursula Mwbesi 总共有 7 个下属（她下面直接有
    2 个，再往下树中还有一层的有 5 个），Lim Tok Lo 总共有 3 个下属（都只比他低一级，并且他们没有进一步的下属），以此类推。


    ![../images/475066_1_En_22_Chapter/475066_1_En_22_Fig2_HTML.jpg](images/475066_1_En_22_Chapter/475066_1_En_22_Fig2_HTML.jpg)


    图 22-2

    标记了部分子树的组织结构图


    一个简单的方法是使用如清单 [22-2](#475066_1_En_22_Chapter.xhtml#PC3) 所示的标量子查询。标量子查询可以在层次结构中找到相关的子树并计算该子树的节点数。


    ```

    SQL> select

    2     e.id

    3   , lpad('' '', 2*(level-1)) || e.name as name

    4   , (

    5        select count(*)

    6        from employees sub

    7        start with sub.supervisor_id = e.id

    8        connect by sub.supervisor_id = prior sub.id

    9     ) as subs

    10  from employees e

    11  start with e.supervisor_id is null

    12  connect by e.supervisor_id = prior e.id

    13  order siblings by e.name;

    清单 22-2

    统计下属数量

    ```


    外部查询与清单 [22-1](#475066_1_En_22_Chapter.xhtml#PC1) 相同。第 4–9 行的标量子查询使用了相同的 `connect
    by` 查询；只是 `start with` 不是从树的顶部开始，而是第 7 行的 `start with` 从外部查询当前行的直属下属开始，并从那里向下搜索子树：


    ```

    ID   NAME                SUBS

    142  Harold King         13

    144    Axel de Proef     4

    151      Jim Kronzki     2

    150        Laura Jensen  0

    154        Simon Chang   0

    148      Maria Juarez    0

    147    Ursula Mwbesi     7

    146      Lim Tok Lo      3

    152        Evelyn Smith  0

    149        Kurt Zollman  0

    155        Susanne Hoff  0

    143      Mogens Juel     2

    153        Dan Hoeffler  0

    145        Zoe Thorston  0

    ```


    输出正是我想要的，但我多次访问了表的相同行——比如 Simon Chang 被访问了四次：在标量子查询中，对于树中他上面的三个人各访问了一次，然后在主查询中轮到他时又访问了一次。此外，每次访问树中的一个叶节点时，数据库都会查询他/她下面是否有人，所以
    Simon 被访问的四次也引发了四次对他是否有下属的查找。


    总而言之，这对数据库来说是大量重复性的工作。但幸运的是，我有办法减少这项工作量。'
  raw: '## Hierarchical tree of employees


    The most classic table used to demonstrate hierarchical queries on Oracle is `scott.emp`
    table. Well, the Good Beer Trading Co also employs people, so my `practical` schema
    naturally has a table `employees` depicted in Figure [22-1](#475066_1_En_22_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_22_Chapter/475066_1_En_22_Fig1_HTML.jpg](images/475066_1_En_22_Chapter/475066_1_En_22_Fig1_HTML.jpg)


    Figure 22-1


    The employees table with a self-referencing foreign key


    The column `supervisor_id` is a self-referencing foreign key that references the
    primary key `id`. Only one person has no supervisor – the boss of the company –
    for everyone else the `supervisor_id` contains the `id` of their immediate supervisor
    in the employee hierarchy. So I can show you the data of the table in a tree using
    Listing [22-1](#475066_1_En_22_Chapter.xhtml#PC1).


    ```

    SQL> select

    2     e.id

    3   , lpad('' '', 2*(level-1)) || e.name as name

    4   , e.title as title

    5   , e.supervisor_id as super

    6  from employees e

    7  start with e.supervisor_id is null

    8  connect by e.supervisor_id = prior e.id

    9  order siblings by e.name;

    Listing 22-1

    A classic hierarchical query of employees

    ```


    For a simple hierarchy like this, I tend to use the Oracle proprietary `connect
    by` query instead of the recursive subquery factoring I showed in Chapter [4](#475066_1_En_4_Chapter.xhtml).
    One of the things that are easier with `connect by` is, for example, the `order
    siblings by` I use here – that is more awkward to code with recursive subquery
    factoring.


    So I start with the boss by specifying in line 7 to start with those with no supervisors.
    Then line 8 finds the immediate subordinates of the boss and then goes on recursively
    to find subordinates of those and so on:


    ```

    ID   NAME                TITLE              SUPER

    142  Harold King         Managing Director

    144    Axel de Proef     Product Director   142

    151      Jim Kronzki     Sales Manager      144

    150        Laura Jensen  Bulk Salesman      151

    154        Simon Chang   Retail Salesman    151

    148      Maria Juarez    Purchaser          144

    147    Ursula Mwbesi     Operations Chief   142

    146      Lim Tok Lo      Warehouse Manager  147

    152        Evelyn Smith  Forklift Operator  146

    149        Kurt Zollman  Forklift Operator  146

    155        Susanne Hoff  Janitor            146

    143      Mogens Juel     IT Manager         147

    153        Dan Hoeffler  IT Supporter       143

    145        Zoe Thorston  IT Developer       143

    ```


    It’s different persons, but you’re likely to have seen a very similar output using
    `scott.emp` somewhere. And this query will form the basis for the rest of the
    SQL I’ll show in this chapter.


    ## Counting subordinates of all levels


    The task is now for each row to do a `count` of subordinates all the way down
    the tree – not just the immediate subordinates one level down. If you look at
    the organization diagram in Figure [22-2](#475066_1_En_22_Chapter.xhtml#Fig2),
    I need to find that Harold King has 13 subordinates (all employees except himself),
    Ursula Mwbesi has 7 subordinates total (2 immediately below her plus 5 that are
    a level further down the tree), Lim Tok Lo has 3 subordinates total (all just
    1 level below and they have no further subordinates), and so on.


    ![../images/475066_1_En_22_Chapter/475066_1_En_22_Fig2_HTML.jpg](images/475066_1_En_22_Chapter/475066_1_En_22_Fig2_HTML.jpg)


    Figure 22-2


    Organization diagram with some of the subtrees marked


    A simple way to do this is using a scalar subquery as shown in Listing [22-2](#475066_1_En_22_Chapter.xhtml#PC3).
    The scalar subquery can find the relevant subtree in the hierarchy and count the
    nodes of the subtree.


    ```

    SQL> select

    2     e.id

    3   , lpad('' '', 2*(level-1)) || e.name as name

    4   , (

    5        select count(*)

    6        from employees sub

    7        start with sub.supervisor_id = e.id

    8        connect by sub.supervisor_id = prior sub.id

    9     ) as subs

    10  from employees e

    11  start with e.supervisor_id is null

    12  connect by e.supervisor_id = prior e.id

    13  order siblings by e.name;

    Listing 22-2

    Counting the number of subordinates

    ```


    The outer query is the same as Listing [22-1](#475066_1_En_22_Chapter.xhtml#PC1).
    The scalar subquery in lines 4–9 utilizes the same `connect by` query; only `start
    with` is not from the top of the tree, but instead `start with` in line 7 starts
    with those that are immediate subordinates of the current row in the outer query
    and searches the subtree from there and down:


    ```

    ID   NAME                SUBS

    142  Harold King         13

    144    Axel de Proef     4

    151      Jim Kronzki     2

    150        Laura Jensen  0

    154        Simon Chang   0

    148      Maria Juarez    0

    147    Ursula Mwbesi     7

    146      Lim Tok Lo      3

    152        Evelyn Smith  0

    149        Kurt Zollman  0

    155        Susanne Hoff  0

    143      Mogens Juel     2

    153        Dan Hoeffler  0

    145        Zoe Thorston  0

    ```


    The output is just what I’m after, but I’ve accessed the same rows of the tables
    multiple times – like Simon Chang that has been accessed four times: once in the
    scalar subquery for each of the three people above him in the tree and then once
    in the main query when it got to him in the tree. Also every time a leaf node
    in the tree was accessed, the database queried if there was anyone below him/her,
    so the four times Simon was accessed also incurred four lookups if he had subordinates.


    All in all, it is a lot of repetitive work for the database. But luckily I have
    a way to reduce that amount of work.'
