- fmt: '## Using dimension tables


    So I’m going to add two tables to hold the values for my two dimensions: `gender_dim`
    and `channels_dim` defined in Figure [7-4](#475066_1_En_7_Chapter.xhtml#Fig4).


    ![../images/475066_1_En_7_Chapter/475066_1_En_7_Fig4_HTML.jpg](images/475066_1_En_7_Chapter/475066_1_En_7_Fig4_HTML.jpg)


    Figure 7-4

    Dimension tables


    Listing [7-11](#475066_1_En_7_Chapter.xhtml#PC18) shows I’ve entered the values
    for male and female in `gender_dim`:


    ```

    SQL> select letter, name

    2  from gender_dim

    3  order by letter;

    LETTER  NAME

    F       Female

    M       Male

    Listing 7-11

    Dimension table for gender

    ```


    Likewise, Listing [7-12](#475066_1_En_7_Chapter.xhtml#PC19) shows the values for
    Twitter and Facebook in table `channels_dim`.


    ```

    SQL> select id, name, shortcut

    2  from channels_dim

    3  order by id;

    ID  NAME      SHORTCUT

    42  Twitter   tw

    44  Facebook  fb

    Listing 7-12

    Dimension table for channels

    ```


    Recall that I did manual unpivot before by doing a Cartesian join to some generated
    rows. When I use my dimension tables in Listing [7-13](#475066_1_En_7_Chapter.xhtml#PC20),
    I simply do Cartesian joins to both tables, so that for each input row in table
    `web_demographics,` I get a row for every combination of rows in `gender_dim`
    and `channels_dim`.


    ```

    SQL> select

    2     d.day

    3   , g.letter as g_id

    4   , c.id as ch_id

    5   , case g.letter

    6        when ''M'' then

    7           case c.shortcut

    8              when ''tw'' then d.m_tw_cnt

    9              when ''fb'' then d.m_fb_cnt

    10           end

    11        when ''F'' then

    12           case c.shortcut

    13              when ''tw'' then d.f_tw_cnt

    14              when ''fb'' then d.f_fb_cnt

    15           end

    16     end as cnt

    17   , case g.letter

    18        when ''M'' then

    19           case c.shortcut

    20              when ''tw'' then d.m_tw_qty

    21              when ''fb'' then d.m_fb_qty

    22           end

    23        when ''F'' then

    24           case c.shortcut

    25              when ''tw'' then d.f_tw_qty

    26              when ''fb'' then d.f_fb_qty

    27           end

    28     end as qty

    29  from web_demographics d

    30  cross join gender_dim g

    31  cross join channels_dim c

    32  order by day, g_id, ch_id;

    Listing 7-13

    Manual unpivot using dimension tables

    ```


    Explaining from the bottom up, I do the Cartesian joins with `cross join` in lines
    30 and 31.


    Having created four rows for each input row, I use two `case` constructs for each
    of my measures – lines 5–16 for `cnt` and lines 17–28 for `qty`. Each construct
    maps values from the dimension tables to specific columns in `web_demographics`.
    Should there happen to be more rows in the dimension tables with values that are
    *not* listed in my `case` structures, they will generate rows in the output that
    will have `null` values in the measures.


    And in lines 3 and 4, I get values for my dimensions directly from the dimension
    tables. Since I have real tables for the dimensions, I choose here to use the
    primary keys for the dimension tables instead of the textual descriptions – that
    way this result could, if I wished, be directly inserted into a table having foreign
    key relationships to the dimension tables:


    ```

    DAY         G_ID  CH_ID  CNT   QTY

    2019-05-01  F     42     651   76

    2019-05-01  F     44     564   68

    2019-05-01  M     42     1232  86

    2019-05-01  M     44     1017  64

    2019-05-02  F     42     840   92

    2019-05-02  F     44     752   78

    2019-05-02  M     42     1438  142

    2019-05-02  M     44     1198  70

    ```


    As a little curiosity, I’d like to mention that I tried doing the `case` expressions
    using expression lists like this:


    ```

    5   , case (g.letter, c.shortcut)

    6        when (''M'', ''tw'') then d.m_tw_cnt

    7        when (''M'', ''fb'') then d.m_fb_cnt

    8        when (''F'', ''tw'') then d.f_tw_cnt

    9        when (''F'', ''fb'') then d.f_fb_cnt

    10     end as cnt

    ```


    But that gave me an error – this is not supported syntax for the simple case expression.
    I think it would have been nice, but maybe it will be allowed in a future version,
    who knows.


    As noted earlier, I’m still hard-coding values even when using dimension tables
    like this – so I’ll end the chapter with an example of how it can be made truly
    dynamic.'
  raw: '## Using dimension tables


    So I’m going to add two tables to hold the values for my two dimensions: `gender_dim`
    and `channels_dim` defined in Figure [7-4](#475066_1_En_7_Chapter.xhtml#Fig4).


    ![../images/475066_1_En_7_Chapter/475066_1_En_7_Fig4_HTML.jpg](images/475066_1_En_7_Chapter/475066_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Dimension tables


    Listing [7-11](#475066_1_En_7_Chapter.xhtml#PC18) shows I’ve entered the values
    for male and female in `gender_dim`:


    ```

    SQL> select letter, name

    2  from gender_dim

    3  order by letter;

    LETTER  NAME

    F       Female

    M       Male

    Listing 7-11

    Dimension table for gender

    ```


    Likewise, Listing [7-12](#475066_1_En_7_Chapter.xhtml#PC19) shows the values for
    Twitter and Facebook in table `channels_dim`.


    ```

    SQL> select id, name, shortcut

    2  from channels_dim

    3  order by id;

    ID  NAME      SHORTCUT

    42  Twitter   tw

    44  Facebook  fb

    Listing 7-12

    Dimension table for channels

    ```


    Recall that I did manual unpivot before by doing a Cartesian join to some generated
    rows. When I use my dimension tables in Listing [7-13](#475066_1_En_7_Chapter.xhtml#PC20),
    I simply do Cartesian joins to both tables, so that for each input row in table
    `web_demographics,` I get a row for every combination of rows in `gender_dim`
    and `channels_dim`.


    ```

    SQL> select

    2     d.day

    3   , g.letter as g_id

    4   , c.id as ch_id

    5   , case g.letter

    6        when ''M'' then

    7           case c.shortcut

    8              when ''tw'' then d.m_tw_cnt

    9              when ''fb'' then d.m_fb_cnt

    10           end

    11        when ''F'' then

    12           case c.shortcut

    13              when ''tw'' then d.f_tw_cnt

    14              when ''fb'' then d.f_fb_cnt

    15           end

    16     end as cnt

    17   , case g.letter

    18        when ''M'' then

    19           case c.shortcut

    20              when ''tw'' then d.m_tw_qty

    21              when ''fb'' then d.m_fb_qty

    22           end

    23        when ''F'' then

    24           case c.shortcut

    25              when ''tw'' then d.f_tw_qty

    26              when ''fb'' then d.f_fb_qty

    27           end

    28     end as qty

    29  from web_demographics d

    30  cross join gender_dim g

    31  cross join channels_dim c

    32  order by day, g_id, ch_id;

    Listing 7-13

    Manual unpivot using dimension tables

    ```


    Explaining from the bottom up, I do the Cartesian joins with `cross join` in lines
    30 and 31.


    Having created four rows for each input row, I use two `case` constructs for each
    of my measures – lines 5–16 for `cnt` and lines 17–28 for `qty`. Each construct
    maps values from the dimension tables to specific columns in `web_demographics`.
    Should there happen to be more rows in the dimension tables with values that are
    *not* listed in my `case` structures, they will generate rows in the output that
    will have `null` values in the measures.


    And in lines 3 and 4, I get values for my dimensions directly from the dimension
    tables. Since I have real tables for the dimensions, I choose here to use the
    primary keys for the dimension tables instead of the textual descriptions – that
    way this result could, if I wished, be directly inserted into a table having foreign
    key relationships to the dimension tables:


    ```

    DAY         G_ID  CH_ID  CNT   QTY

    2019-05-01  F     42     651   76

    2019-05-01  F     44     564   68

    2019-05-01  M     42     1232  86

    2019-05-01  M     44     1017  64

    2019-05-02  F     42     840   92

    2019-05-02  F     44     752   78

    2019-05-02  M     42     1438  142

    2019-05-02  M     44     1198  70

    ```


    As a little curiosity, I’d like to mention that I tried doing the `case` expressions
    using expression lists like this:


    ```

    5   , case (g.letter, c.shortcut)

    6        when (''M'', ''tw'') then d.m_tw_cnt

    7        when (''M'', ''fb'') then d.m_fb_cnt

    8        when (''F'', ''tw'') then d.f_tw_cnt

    9        when (''F'', ''fb'') then d.f_fb_cnt

    10     end as cnt

    ```


    But that gave me an error – this is not supported syntax for the simple case expression.
    I think it would have been nice, but maybe it will be allowed in a future version,
    who knows.


    As noted earlier, I’m still hard-coding values even when using dimension tables
    like this – so I’ll end the chapter with an example of how it can be made truly
    dynamic.'
  trans: '

    ## 使用维度表


    因此，我将添加两个表来存储两个维度的值：`gender_dim` 和 `channels_dim`，它们定义在图 7-4 中。


    ![../images/475066_1_En_7_Chapter/475066_1_En_7_Fig4_HTML.jpg](img/475066_1_En_7_Fig4_HTML.jpg)


    图 7-4

    维度表


    代码清单 7-11 展示了我在 `gender_dim` 中输入的男性（M）和女性（F）的值：


    ```

    SQL> select letter, name

    2  from gender_dim

    3  order by letter;

    LETTER  NAME

    F       Female

    M       Male

    代码清单 7-11

    性别维度表

    ```


    同样地，代码清单 7-12 展示了表 `channels_dim` 中 Twitter 和 Facebook 的值。


    ```

    SQL> select id, name, shortcut

    2  from channels_dim

    3  order by id;

    ID  NAME      SHORTCUT

    42  Twitter   tw

    44  Facebook  fb

    代码清单 7-12

    渠道维度表

    ```


    回顾一下，我之前通过与一些生成行进行笛卡尔积连接来手动执行逆透视（unpivot）。当我在代码清单 7-13 中使用我的维度表时，我只需对两个表都执行笛卡尔积连接，这样对于表
    `web_demographics` 中的每一行输入，我都能获得 `gender_dim` 和 `channels_dim` 中所有行组合对应的一行。


    ```

    SQL> select

    2     d.day

    3   , g.letter as g_id

    4   , c.id as ch_id

    5   , case g.letter

    6        when ''M'' then

    7           case c.shortcut

    8              when ''tw'' then d.m_tw_cnt

    9              when ''fb'' then d.m_fb_cnt

    10           end

    11        when ''F'' then

    12           case c.shortcut

    13              when ''tw'' then d.f_tw_cnt

    14              when ''fb'' then d.f_fb_cnt

    15           end

    16     end as cnt

    17   , case g.letter

    18        when ''M'' then

    19           case c.shortcut

    20              when ''tw'' then d.m_tw_qty

    21              when ''fb'' then d.m_fb_qty

    22           end

    23        when ''F'' then

    24           case c.shortcut

    25              when ''tw'' then d.f_tw_qty

    26              when ''fb'' then d.f_fb_qty

    27           end

    28     end as qty

    29  from web_demographics d

    30  cross join gender_dim g

    31  cross join channels_dim c

    32  order by day, g_id, ch_id;

    代码清单 7-13

    使用维度表进行手动逆透视

    ```


    自下而上解释，我在第 30 和 31 行使用 `cross join` 执行了笛卡尔积连接。


    为每行输入创建了四行之后，我对每个度量值使用了两个 `case` 结构——第 5-16 行用于 `cnt`，第 17-28 行用于 `qty`。每个结构将维度表中的值映射到
    `web_demographics` 中的特定列。如果维度表中存在更多未在 `case` 结构中列出的值，它们将在输出中生成行，并且度量值列中将包含 `null`
    值。


    在第 3 行和第 4 行，我直接从维度表中获取维度的值。由于我有真正的维度表，这里我选择使用维度表的主键而不是文本描述——这样，如果我愿意，这个结果可以直接插入到一个与维度表具有外键关系的表中：


    ```

    DAY         G_ID  CH_ID  CNT   QTY

    2019-05-01  F     42     651   76

    2019-05-01  F     44     564   68

    2019-05-01  M     42     1232  86

    2019-05-01  M     44     1017  64

    2019-05-02  F     42     840   92

    2019-05-02  F     44     752   78

    2019-05-02  M     42     1438  142

    2019-05-02  M     44     1198  70

    ```


    作为一个有趣的小知识，我想提到我尝试过像下面这样使用表达式列表来编写 `case` 表达式：


    ```

    5   , case (g.letter, c.shortcut)

    6        when (''M'', ''tw'') then d.m_tw_cnt

    7        when (''M'', ''fb'') then d.m_fb_cnt

    8        when (''F'', ''tw'') then d.f_tw_cnt

    9        when (''F'', ''fb'') then d.f_fb_cnt

    10     end as cnt

    ```


    但这给了我一个错误——对于简单的 `case` 表达式，这种语法不受支持。我认为那样写本来会很好，但也许在未来的版本中会允许，谁知道呢。


    如前所述，即使在这样使用维度表时，我仍然是在硬编码值——因此，我将在本章结束时给出一个如何使其真正动态化的示例。

    '
- fmt: '### Dynamic mapping to dimension tables


    To make a truly dynamic unpivoting from values in the dimension tables, I need
    specifically to generate the mappings to be used in the `in` clause. To do this,
    I create the query in Listing [7-14](#475066_1_En_7_Chapter.xhtml#PC23).


    ```

    SQL> select

    2     s.cnt_col, s.qty_col

    3   , s.g_id, s.gender

    4   , s.ch_id, s.channel

    5  from (

    6     select

    7        lower(

    8           g.letter || ''_'' || c.shortcut || ''_cnt''

    9        ) as cnt_col

    10      , lower(

    11           g.letter || ''_'' || c.shortcut || ''_qty''

    12        )as qty_col

    13      , g.letter as g_id

    14      , g.name as gender

    15      , c.id as ch_id

    16      , c.name as channel

    17     from gender_dim g

    18     cross join channels_dim c

    19  ) s

    20  join user_tab_columns cnt_c

    21     on cnt_c.column_name = upper(s.cnt_col)

    22  join user_tab_columns qty_c

    23     on qty_c.column_name = upper(s.cnt_col)

    24  where cnt_c.table_name = ''WEB_DEMOGRAPHICS''

    25  and   qty_c.table_name = ''WEB_DEMOGRAPHICS''

    26  order by gender, channel;

    Listing 7-14

    Preparing column names mapped to dimension values

    ```


    I need each possible combination of values from my two dimension tables, so I
    use a Cartesian join in lines 17–18. Using the `letter` and `shortcut` column
    values from the two tables, in lines 7–9 and 10–12, I generate the names of the
    columns in my `web_demographics` table. (Strictly speaking I do not really need
    to use `lower` function here, I just do it for when I check-read the generated
    code later.)


    Since I could get runtime errors if the values in the dimension tables do not
    correctly reflect the columns in `web_demographics` table, I wrap in an inline
    view and join to `user_tab_columns` to make sure I only retrieve columns that
    exist.


    In total the query shows me the data I need for the mappings in the `in` clause:


    ```

    CNT_COL   QTY_COL   G_ID  GENDER  CH_ID  CHANNEL

    f_fb_cnt  f_fb_qty  F     Female  44     Facebook

    f_tw_cnt  f_tw_qty  F     Female  42     Twitter

    m_fb_cnt  m_fb_qty  M     Male    44     Facebook

    m_tw_cnt  m_tw_qty  M     Male    42     Twitter

    ```


    Armed with this query, I’m going to use PL/SQL to build dynamic SQL with `unpivot`.
    First, I’ll turn on serveroutput for debugging purposes:


    ```

    SQL> set serveroutput on

    ```


    And I’ll create a `sqlcl` (or `SQL*Plus`) bind variable to hold my dynamically
    generated cursor:


    ```

    SQL> variable unpivoted refcursor

    ```


    Then I’m ready to execute the anonymous PL/SQL block in Listing [7-15](#475066_1_En_7_Chapter.xhtml#PC27)
    to build dynamic SQL.


    ```

    SQL> declare

    2     v_unpivot_sql  varchar2(4000);

    3  begin

    4     for c in (

    5        select

    6           s.cnt_col, s.qty_col

    7         , s.g_id, s.gender

    8         , s.ch_id, s.channel

    9        from (

    10           select

    11              lower(

    12                 g.letter || ''_'' || c.shortcut || ''_cnt''

    13              ) as cnt_col

    14            , lower(

    15                 g.letter || ''_'' || c.shortcut || ''_qty''

    16              )as qty_col

    17            , g.letter as g_id

    18            , g.name as gender

    19            , c.id as ch_id

    20            , c.name as channel

    21           from gender_dim g

    22           cross join channels_dim c

    23        ) s

    24        join user_tab_columns cnt_c

    25           on cnt_c.column_name = upper(s.cnt_col)

    26        join user_tab_columns qty_c

    27           on qty_c.column_name = upper(s.cnt_col)

    28        where cnt_c.table_name = ''WEB_DEMOGRAPHICS''

    29        and   qty_c.table_name = ''WEB_DEMOGRAPHICS''

    30        order by gender, channel

    31     ) loop


    33        if v_unpivot_sql is null then

    34           v_unpivot_sql := q''[

    35              select day, g_id, ch_id, cnt, qty

    36              from web_demographics

    37              unpivot (

    38                 ( cnt, qty )

    39                 for ( g_id, ch_id )

    40                 in (

    41                    ]'';

    42        else

    43           v_unpivot_sql := v_unpivot_sql || q''[

    44                  , ]'';

    45        end if;


    47        v_unpivot_sql := v_unpivot_sql

    48                      || ''('' || c.cnt_col

    49                      || '', '' || c.qty_col

    50                      || '') as ('''''' || c.g_id

    51                      || '''''', '' || c.ch_id

    52                      || '')'';


    54     end loop;


    56     v_unpivot_sql := v_unpivot_sql || q''[

    57                 )

    58              )

    59              order by day, g_id, ch_id]'';


    60     dbms_output.put_line(v_unpivot_sql);


    61     open :unpivoted for v_unpivot_sql;

    62  end;

    63  /

    Listing 7-15

    Dynamically building unpivot query

    ```


    In the query from Listing [7-14](#475066_1_En_7_Chapter.xhtml#PC23), I put in
    a cursor `for` loop starting in line 4. In line 33, I check if this is the first
    row in the loop. If it is, then in lines 34–41, I generate the beginning of the
    SQL statement I am building. If not, then in lines 43–44, I generate a new line
    and a comma as separator between the mappings.


    Lines 47–52 generate each individual mapping for the `in` clause, and when the
    loop is done, lines 56–59 append the final pieces of the SQL to be generated.


    Line 61 then sends the generated SQL to the server output for debugging purposes,
    so I can see here the piece of SQL that was generated in the string variable `v_unpivot_sql`:


    ```

    select day, g_id, ch_id, cnt, qty

    from web_demographics

    unpivot (

    ( cnt, qty )

    for ( g_id, ch_id )

    in (

    (f_fb_cnt, f_fb_qty) as (''F'', 44)

    , (f_tw_cnt, f_tw_qty) as (''F'', 42)

    , (m_fb_cnt, m_fb_qty) as (''M'', 44)

    , (m_tw_cnt, m_tw_qty) as (''M'', 42)

    )

    )

    order by day, g_id, ch_id

    ```


    It looks like I want it, with one `in` clause mapping for each combination of
    values in my dimension tables. Actually it is just like Listing [7-6](#475066_1_En_7_Chapter.xhtml#PC8),
    except it uses the primary keys of the two dimension tables instead of descriptive
    names.


    Line 63 of the block opens the bind variable `unpivoted` (that I created before
    calling the block) using the dynamically created SQL in the string variable `v_unpivot_sql`.
    And then the block is done:


    ```

    PL/SQL procedure successfully completed.

    ```


    And I can see if the cursor retrieves the output I want:


    ```

    SQL> print unpivoted

    ```


    Lo and behold – I get the same output as Listing [7-13](#475066_1_En_7_Chapter.xhtml#PC20)
    gave me:


    ```

    DAY        G      CH_ID        CNT        QTY

    ---------- - ---------- ---------- ----------

    2019-05-01 F         42        651         76

    2019-05-01 F         44        564         68

    2019-05-01 M         42       1232         86

    2019-05-01 M         44       1017         64

    2019-05-02 F         42        840         92

    2019-05-02 F         44        752         78

    2019-05-02 M         42       1438        142

    2019-05-02 M         44       1198         70

    ```


    The dynamic aspect gets into play, if, for example, the statistics service adds
    data for Instagram and thus the table `web_demographics` gets four new columns
    (counts and quantities for male and female for Instagram).


    In such a case, using Listing [7-6](#475066_1_En_7_Chapter.xhtml#PC8) (or Listing
    [7-13](#475066_1_En_7_Chapter.xhtml#PC20)) requires that I add mappings to the
    code – change the SQL. But if I use the dynamic technique in Listing [7-15](#475066_1_En_7_Chapter.xhtml#PC27),
    all I need to do is insert data for Instagram in the `web_channel` dimension table,
    and the code auto-generates mappings to produce something like


    ```

    in (

    (f_fb_cnt, f_fb_qty) as (''F'', 44)

    , (f_in_cnt, f_in_qty) as (''F'', 46)

    , (f_tw_cnt, f_tw_qty) as (''F'', 42)

    , (m_fb_cnt, m_fb_qty) as (''M'', 44)

    , (m_in_cnt, m_in_qty) as (''M'', 46)

    , (m_tw_cnt, m_tw_qty) as (''M'', 42)

    )

    ```


    (Assuming Instagram got `id = 46` and `shortcut` = `''in''`.)


    This dynamic method opens a cursor using the generated SQL, so it must generate
    the SQL runtime every single time. Sometimes you may have a requirement for doing
    this, but in many cases, I would prefer using it as a code generator method.'
