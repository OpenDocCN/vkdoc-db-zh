    \ 9 行，我输出了前一个价格，这样我可以再次检查价格和前一个价格之间的关联是否与分类匹配。\n\n运行 列表 17-1 中的查询得到以下输出：\n\n```\n\
    SYMBOL  DAY         MATCH  CLASS  PREV  PRICE\nBEER    2019-04-02  1      DOWN\
    \   14.9  14.2\nBEER    2019-04-04  2      UP     14.2  15.7\nBEER    2019-04-05\
    \  3      DOWN   15.7  15.6\nBEER    2019-04-08  4      DOWN   15.6  14.8\nBEER\
    \    2019-04-10  5      DOWN   14.8  14\nBEER    2019-04-11  6      UP     14\
    \    14.4\nBEER    2019-04-12  7      UP     14.4  15.2\nBEER    2019-04-15  8\
    \      DOWN   15.2  15\nBEER    2019-04-16  9      DOWN   15    13.7\nBEER   \
    \ 2019-04-17  10     UP     13.7  14.3\nBEER    2019-04-19  11     UP     14.3\
    \  15.5\n```\n\n我可以看到，我的行根据我制定的定义被正确分类了。但我注意到我并没有匹配所有行，15 行中只匹配了 11 行。一方面，我没有找到价格与前一日价格*相等*的行。因此，我尝试将第\
    \ 15 和 16 行的定义改为使用小于等于和大于等于：\n"
