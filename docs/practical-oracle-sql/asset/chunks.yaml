  raw: '## V + V = W shapes


    In stock ticker analysis, a W shape (also known as double-bottom) indicates a
    trend reversal, so it is an important pattern to search for in the data. Well,
    I already know how to find V shapes, so I simply expand the pattern clause in
    line 14 in Listing [17-6](#475066_1_En_17_Chapter.xhtml#PC24).


    ```

    SQL> select *

    2  from ticker

    3  match_recognize (

    4     partition by symbol

    5     order by day

    6     measures

    7        match_number() as match

    8      , first(day)     as first_day

    9      , last(day)      as last_day

    10      , count(*)       as days

    11     one row per match

    12     after match skip to last up

    13     pattern (

    14        strt down+ up+ down+ up+

    15     )

    16     define

    17        down as price = prev(price)

    19  )

    20  order by symbol, first_day;

    Listing 17-6

    First attempt at finding W shapes

    ```


    Hang on; I was only expecting a single W match to be found, but my output shows
    two?


    ```

    SYMBOL  MATCH  FIRST_DAY   LAST_DAY    DAYS

    BEER    1      2019-04-01  2019-04-12  10

    BEER    2      2019-04-12  2019-04-19  6

    ```


    Looking at the graph in Figure [17-5](#475066_1_En_17_Chapter.xhtml#Fig5), I can
    see that first I do match a W shape from 2019-04-01 to 2019-04-12; that is fine.
    But after that, the graph has only a V shape, but it is matched as a W shape?
    Why?


    ![../images/475066_1_En_17_Chapter/475066_1_En_17_Fig5_HTML.jpg](images/475066_1_En_17_Chapter/475066_1_En_17_Fig5_HTML.jpg)


    Figure 17-5


    Unexpected match of the last V as a W shape


    As usual I fall back to show the output of my W pattern using an `all rows per
    match` and that enables me to see that suddenly 2019-04-18 is again classified
    as a `down` row instead of the `up` that it should have been:


    ```

    SYMBOL  DAY         MATCH  CLASS  PREV  PRICE

    BEER    2019-04-01  1      STRT         14.9

    BEER    2019-04-02  1      DOWN   14.9  14.2

    BEER    2019-04-03  1      DOWN   14.2  14.2

    BEER    2019-04-04  1      UP     14.2  15.7

    BEER    2019-04-05  1      DOWN   15.7  15.6

    BEER    2019-04-08  1      DOWN   15.6  14.8

    BEER    2019-04-09  1      DOWN   14.8  14.8

    BEER    2019-04-10  1      DOWN   14.8  14

    BEER    2019-04-11  1      UP     14    14.4

    BEER    2019-04-12  1      UP     14.4  15.2

    BEER    2019-04-12  2      STRT   14.4  15.2

    BEER    2019-04-15  2      DOWN   15.2  15

    BEER    2019-04-16  2      DOWN   15    13.7

    BEER    2019-04-17  2      UP     13.7  14.3

    BEER    2019-04-18  2      DOWN   14.3  14.3

    BEER    2019-04-19  2      UP     14.3  15.5

    ```


    Again I have to try and see how the pattern is evaluated and the order the definitions
    then are evaluated.


    As I explained before, in the V pattern (`strt down+ up+`), when the match reaches
    the `up+` part, it can skip evaluating the `down` definition, because it knows
    that the pattern can only be satisfied if it finds `up` rows; in all other cases,
    there will not be a match.


    But in the W pattern (`strt down+ up+ down+ up+`), when the match reaches the
    first `up+` part, a match can be satisfied by either another `up` row or a `down`
    row that would lead the match into the second `down+` part. Therefore it cannot
    skip evaluating the `down` definition, and so 2019-04-18 is classified as `down`,
    leading to the pattern being satisfied.


    So because of the change in pattern, my little “trick” with nonunique definitions
    that are evaluated correctly in a V shape does not work for a W shape. I’ll have
    to think of something else.


    Could I go back to using down, up, and same and then use a pattern like in the
    following?


    ```

    ...

    14        strt (down | same)+ (up | same)+ (down | same)+ (up | same)+

    ...

    ```


    Well no, it would not help in this case. The last V shape on the graph would become
    classified like this:


    ```

    ...

    BEER    2019-04-12  2      STRT   14.4  15.2

    BEER    2019-04-15  2      DOWN   15.2  15

    BEER    2019-04-16  2      DOWN   15    13.7

    BEER    2019-04-17  2      UP     13.7  14.3

    BEER    2019-04-18  2      SAME   14.3  14.3

    BEER    2019-04-19  2      UP     14.3  15.5

    ```


    And those six classifiers in that order will actually match that pattern, so it
    won’t do.


    Instead I’m going to put some more logic in the definitions in my `define` clause
    in Listing [17-7](#475066_1_En_17_Chapter.xhtml#PC29).


    ```

    SQL> select *

    2  from ticker

    3  match_recognize (

    4     partition by symbol

    5     order by day

    6     measures

    7        match_number() as match

    8      , classifier()   as class

    9      , prev(price)    as prev

    10     all rows per match

    11     after match skip to last up

    12     pattern (

    13        strt down+ up+ down+ up+

    14     )

    15     define

    16        down as price  prev(price)

    21             or (    price = prev(price)

    22                 and price = last(up.price  , 1)

    23                )

    24  )

    25  order by symbol, day;

    Listing 17-7

    More intelligent definitions for W shape matching

    ```


    Looking at `down`, the idea is to replace the less-than-or-equal with a dual logic:


    *   If the price is less than the previous (line 16), it certainly is a `down`
    row.


    *   If the price is equal to the previous row (line 17), it is *only* a `down`
    row if the graph was sloping down right before it hit this place with equal prices.
    I can check that in line 18 by testing if the price in the row is equal to the
    price of the last row that was classified `down`. This can only happen if that
    last `down` row was just before the flat part of the graph.


    And for `up` I use a similar dual logic in lines 20–23\. With such a logic built
    into the definitions, Listing [17-7](#475066_1_En_17_Chapter.xhtml#PC29) produces
    only one match – the first W shape in the graph:


    ```

    SYMBOL  DAY         MATCH  CLASS  PREV  PRICE

    BEER    2019-04-01  1      STRT         14.9

    BEER    2019-04-02  1      DOWN   14.9  14.2

    BEER    2019-04-03  1      DOWN   14.2  14.2

    BEER    2019-04-04  1      UP     14.2  15.7

    BEER    2019-04-05  1      DOWN   15.7  15.6

    BEER    2019-04-08  1      DOWN   15.6  14.8

    BEER    2019-04-09  1      DOWN   14.8  14.8

    BEER    2019-04-10  1      DOWN   14.8  14

    BEER    2019-04-11  1      UP     14    14.4

    BEER    2019-04-12  1      UP     14.4  15.2

    ```'
