    The *last* row of each picking list (partition) has a `null` value in `next_depart`,
    which makes the `work` calculation become `null` too. As shown before, the picker
    starts at the `null` location and ends at the `null` location, so after having
    picked the *last* product on the picking list, he registers a departure from that
    location and an arrival at the `null` location, indicating he is done and there
    is no `next_depart`. So the last `D-A-D` picking cycle is incomplete; it is only
    `D-A`. (If I had chosen to use `A-D-A` cycles, it would have been the *first*
    row that would be incomplete, having only `D-A`.)


