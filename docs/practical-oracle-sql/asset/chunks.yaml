- fmt: "## 多分区中的 Top-N 查询\n\n到目前为止，我执行的 Top-N 查询要么是针对总销售额，要么是针对年度销售额中的特定年份。无论哪种情况，最终得到的都是整个行集中的“前几行”。\n\
    \n但假设我想查看每一年的前三名最畅销啤酒。当然，我可以为每一年编写一个查询，或许使用 `union all` 将它们组合在一个输出中。\n\n但代码清单\
    \ [12-12] 展示了一种更简单的方法，它在第 6 行使用了 `partition by` 子句。\n\n```sql\nSQL> select *\n\
    \  2  from (\n  3     select\n  4        yr, product_name, yr_qty\n  5      ,\
    \ row_number() over (\n  6           partition by yr\n  7           order by yr_qty\
    \ desc\n  8        ) as ranking\n  9     from yearly_sales\n 10  )\n 11  where\
    \ ranking <= 3\n 12  order by yr, ranking;\n```\n\n代码清单 12-12\n在每一年内使用 `row_number`\
    \ 进行排名\n\n使用 `partition by`，`row_number` 值的分配发生在每个分区内部：\n\n*   数据被拆分为分区——每个不同的\
    \ `yr` 值对应一个分区。\n*   在每个分区中，数据按 `yr_qty desc` 排序，并分配连续的编号 1, 2, 3, …。\n\n这就是我在本章前面的代码清单\
    \ [12-3] 中利用的方法，为每年内的啤酒分配了 1-10 的编号，以便我能够 `pivot` 并按年将啤酒并排列出。\n\n但在代码清单 [12-12]\
    \ 中，我没有进行转置；而是对内联视图的结果进行过滤，因此只保留了每年内获得 `row_number` 为 1、2 和 3 的那些行：\n\n```\nYR\
    \    PRODUCT_NAME      YR_QTY  RANKING\n2016  Ghost of Hops     552     1\n2016\
    \  Monks and Nuns    478     2\n2016  Der Helle Kumpel  415     3\n2017  Monks\
    \ and Nuns    582     1\n2017  Reindeer Fuel     582     2\n2017  Ghost of Hops\
    \     482     3\n2018  Reindeer Fuel     691     1\n2018  Pale Rider Rides  491\
    \     2\n2018  Hercule Trippel   451     3\n```\n\n这给了我九行（每年三行），根据“首行规则”，这是一个每年的\
    \ Top-3 报告。\n\n我可以轻松地将第 5 行改为使用 `rank` 函数，从而根据“奥林匹克规则”获得每年的 Top-3 报告：\n\n```sql\n\
    5      , rank() over (\n```\n\n这给出了十行，因为在 2018 年，有四行啤酒的排名 `<= 3`：\n\n```\nYR \
    \   PRODUCT_NAME      YR_QTY  RANKING\n2016  Ghost of Hops     552     1\n2016\
    \  Monks and Nuns    478     2\n2016  Der Helle Kumpel  415     3\n2017  Monks\
    \ and Nuns    582     1\n2017  Reindeer Fuel     582     1\n2017  Ghost of Hops\
    \     482     3\n2018  Reindeer Fuel     691     1\n2018  Pale Rider Rides  491\
    \     2\n2018  Hercule Trippel   451     3\n2018  Ghost of Hops     451     3\n\
    ```\n\n而“首值规则”我在第 5 行用 `dense_rank` 实现：\n\n```sql\n5      , dense_rank() over\
    \ (\n```\n\n这产生了 11 行，因为根据此规则，在 2017 和 2018 年都有四行啤酒的排名 `<= 3`：\n\n```\nYR    PRODUCT_NAME\
    \      YR_QTY  RANKING\n2016  Ghost of Hops     552     1\n2016  Monks and Nuns\
    \    478     2\n2016  Der Helle Kumpel  415     3\n2017  Monks and Nuns    582\
    \     1\n2017  Reindeer Fuel     582     1\n2017  Ghost of Hops     482     2\n\
    2017  Der Helle Kumpel  458     3\n2018  Reindeer Fuel     691     1\n2018  Pale\
    \ Rider Rides  491     2\n2018  Hercule Trippel   451     3\n2018  Ghost of Hops\
    \     451     3\n```\n\n总而言之，在内联视图中使用分析函数，可以非常容易地选择总体的 Top-N 报告，或者加入 `partition\
    \ by` 来获得每年（或你用于分区键的任何字段）的 Top-N。\n\n使用行限制子句，就没那么容易了。\n\n### 行限制子句的 lateral 技巧\n\
    \n`fetch first` 不支持 `partition by`，所以基本上你不能直接用它来实现分区查询，而必须像代码清单 [12-12] 所示那样使用分析函数。\n\
    \n但是有一个技巧，可以通过使用 `lateral` 连接来关联一个内联视图，从而模拟这种行为，前提是你有一个定义“手动分区”的行源。\n\n在代码清单 [12-13]\
    \ 的第 3-5 行，我创建了一个内联视图 `years`，它硬编码了三个“分区”——2016、2017 和 2018 这三年。然后我有另一个内联视图 `top_sales`，这是一个使用\
    \ `fetch first` 的 Top-3 查询，在这个内联视图中，我在第 10 行过滤了年份。我可以在第 10 行进行这种关联，是因为第 7 行的 `cross\
    \ join lateral`，这意味着内联视图 `top_sales` 会针对内联视图 `years` 的每一行执行一次。\n\n```sql\nSQL>\
    \ select top_sales.*\n  2  from (\n  3     select 2016 as yr from dual union all\n\
    \  4     select 2017 as yr from dual union all\n  5     select 2018 as yr from\
    \ dual\n  6  ) years\n  7  cross join lateral (\n  8     select yr, product_name,\
    \ yr_qty\n  9     from yearly_sales\n 10     where yearly_sales.yr = years.yr\n\
    \ 11     order by yr_qty desc\n 12     fetch first 3 rows with ties\n 13  ) top_sales;\n\
    ```\n\n代码清单 12-13\n在横向连接的内联视图中使用 `fetch first`\n\n使用这种 `lateral` 技巧和 `with ties`，代码清单\
    \ [12-13] 产生了与我使用 `rank` 时的代码清单 [12-12] 相同的十行结果：\n\n```\nYR    PRODUCT_NAME  \
    \    YR_QTY\n2016  Ghost of Hops     552\n2016  Monks and Nuns    478\n2016  Der\
    \ Helle Kumpel  415\n2017  Monks and Nuns    582\n2017  Reindeer Fuel     582\n\
    2017  Ghost of Hops     482\n2018  Reindeer Fuel     691\n2018  Pale Rider Rides\
    \  491\n2018  Hercule Trippel   451\n2018  Ghost of Hops     451\n```\n\n根据数据、索引等情况，这种方法的性能可能很容易比代码清单\
    \ [12-12] 中的分析方法更差。如果一切条件都理想，它的性能可以一样好，但不会更快。那么，这真的有用吗？\n\n嗯，主要区别在于，代码清单 [12-12]\
    \ 的分析函数方法要求你能够为 `partition by` 指定一个表达式，该表达式能产生一组唯一的值——而代码清单 [12-13] 可以在第 10 行使用任意复杂的\
    \ `where` 子句进行关联。\n\n我承认，例如使用 `case` 结构，你可以为分区编写非常复杂的表达式，所以需要代码清单 [12-13] 这种复杂度的场景会非常罕见——但知道有这个选项备用总是好的。\n\
    \n## 经验总结\n\n在本章中，我使用销售数据来举例说明 Top-N 查询，并在此过程中让你深入了解了：\n\n*   三种不同的 Top-N 查询类型：首行、奥林匹克和首值。\n\
    *   使用分析函数 `row_number`、`rank` 和 `dense_rank` 来实现它们。\n*   对前两种类型使用快捷方式 `fetch\
    \ first` 行限制子句。\n*   在分析函数中使用 `partition by` 实现数据子集的 Top-N。\n\n这些方法将在许多用例中对你有所帮助，而不仅仅是销售数据。"
  raw: '## Top-N in multiple partitions


    So far I’ve executed a Top-N query either for the total sales or for a specific
    year in the yearly sales. In either case, I ended up with just the “top” rows
    of the entire row set.


    But suppose I’d like to see the Top-3 best-selling beers for each of the years.
    Of course I could write a query for each year, perhaps putting them together with
    `union all` to get it all in one output.


    But Listing [12-12](#475066_1_En_12_Chapter.xhtml#PC38) shows a much easier way
    using the `partition by` clause in line 6.


    ```

    SQL> select *

    2  from (

    3     select

    4        yr, product_name, yr_qty

    5      , row_number() over (

    6           partition by yr

    7           order by yr_qty desc

    8        ) as ranking

    9     from yearly_sales

    10  )

    11  where ranking <= 3

    12  order by yr, ranking;

    Listing 12-12

    Ranking with row_number within each year

    ```


    With the `partition` `by`, assignment of `row_number` values happens *within*
    each partition:


    *   The data is split into partitions – one for each distinct value of `yr`.


    *   In each partition, the data is ordered by `yr_qty desc` and consecutive numbers
    1, 2, 3, … assigned.


    This is what I utilize in Listing [12-3](#475066_1_En_12_Chapter.xhtml#PC5) some
    pages back in the chapter to get numbers 1-10 assigned to beers within each year,
    so I could `pivot` and list the beers in order per year in columns side by side.


    But here in Listing [12-12](#475066_1_En_12_Chapter.xhtml#PC38), I am not pivoting;
    instead I filter on the result of the inline view, so I only keep those rows that
    have got `row_number` 1, 2, and 3 within each year:


    ```

    YR    PRODUCT_NAME      YR_QTY  RANKING

    2016  Ghost of Hops     552     1

    2016  Monks and Nuns    478     2

    2016  Der Helle Kumpel  415     3

    2017  Monks and Nuns    582     1

    2017  Reindeer Fuel     582     2

    2017  Ghost of Hops     482     3

    2018  Reindeer Fuel     691     1

    2018  Pale Rider Rides  491     2

    2018  Hercule Trippel   451     3

    ```


    That gave me nine rows (three beers per each of three years) that are a Top-3
    report per year by the first-rows rule.


    I can easily change line 5 to use the `rank` function and get me a Top-3 report
    per year by the Olympic rule:


    ```

    5      , rank() over (

    ```


    That gives me ten rows, since in 2018 there are four beers with ranking <= 3:


    ```

    YR    PRODUCT_NAME      YR_QTY  RANKING

    2016  Ghost of Hops     552     1

    2016  Monks and Nuns    478     2

    2016  Der Helle Kumpel  415     3

    2017  Monks and Nuns    582     1

    2017  Reindeer Fuel     582     1

    2017  Ghost of Hops     482     3

    2018  Reindeer Fuel     691     1

    2018  Pale Rider Rides  491     2

    2018  Hercule Trippel   451     3

    2018  Ghost of Hops     451     3

    ```


    And the first-values rule I implement with a `dense_rank` in line 5:


    ```

    5      , dense_rank() over (

    ```


    This produces 11 rows, since with this rule I have four beers with ranking <=
    3 both in 2017 and 2018:


    ```

    YR    PRODUCT_NAME      YR_QTY  RANKING

    2016  Ghost of Hops     552     1

    2016  Monks and Nuns    478     2

    2016  Der Helle Kumpel  415     3

    2017  Monks and Nuns    582     1

    2017  Reindeer Fuel     582     1

    2017  Ghost of Hops     482     2

    2017  Der Helle Kumpel  458     3

    2018  Reindeer Fuel     691     1

    2018  Pale Rider Rides  491     2

    2018  Hercule Trippel   451     3

    2018  Ghost of Hops     451     3

    ```


    All in all, using analytic functions in inline views makes it very easy to either
    choose a total Top-N report or put in `partition by` and get a Top-N per year
    (or whatever you use for partition key or keys).


    Using the row limiting clause, this is not quite so easy.


    ### The lateral trick for the row limiting clause


    `fetch first` does not support `partition by`, so basically you cannot do it but
    have to write it with analytic functions as shown in Listing [12-12](#475066_1_En_12_Chapter.xhtml#PC38).


    But there is a trick that can allow you to emulate the behavior by using a `lateral`
    join to correlate an inline view, if you have some row source that defines your
    “manual partitions.”


    In Listing [12-13](#475066_1_En_12_Chapter.xhtml#PC44) lines 3–5, I create an
    inline view `years` that hardcodes three “partitions” – the three years 2016,
    2017, and 2018\. Then I have another inline view `top_sales` that is a Top-3 query
    using fetch first, and in this inline view, I filter on the year in line 10\.
    I can do this correlation in line 10 because of the `cross join lateral` in line
    7, which means that inline view `top_sales` is executed once *for each* of the
    rows from inline view `years`.


    ```

    SQL> select top_sales.*

    2  from (

    3     select 2016 as yr from dual union all

    4     select 2017 as yr from dual union all

    5     select 2018 as yr from dual

    6  ) years

    7  cross join lateral (

    8     select yr, product_name, yr_qty

    9     from yearly_sales

    10     where yearly_sales.yr = years.yr

    11     order by yr_qty desc

    12     fetch first 3 rows with ties

    13  ) top_sales;

    Listing 12-13

    Using fetch first in a laterally joined inline view

    ```


    Using this `lateral` trick and `with ties`, Listing [12-13](#475066_1_En_12_Chapter.xhtml#PC44)
    produces the same ten rows as Listing [12-12](#475066_1_En_12_Chapter.xhtml#PC38)
    did when I used `rank`:


    ```

    YR    PRODUCT_NAME      YR_QTY

    2016  Ghost of Hops     552

    2016  Monks and Nuns    478

    2016  Der Helle Kumpel  415

    2017  Monks and Nuns    582

    2017  Reindeer Fuel     582

    2017  Ghost of Hops     482

    2018  Reindeer Fuel     691

    2018  Pale Rider Rides  491

    2018  Hercule Trippel   451

    2018  Ghost of Hops     451

    ```


    Depending on the data and indexes and such, this could easily perform worse than
    the analytic method in Listing [12-12](#475066_1_En_12_Chapter.xhtml#PC38). If
    everything is right, it can perform just as well, but not faster. So is there
    really any use for this?


    Well, the main difference is that the analytic function method of Listing [12-12](#475066_1_En_12_Chapter.xhtml#PC38)
    requires you to be able to specify an expression resulting in a set of unique
    values to `partition by` – while Listing [12-13](#475066_1_En_12_Chapter.xhtml#PC44)
    can correlate with an arbitrarily complex `where` clause in line 10.


    I admit that using, for example, `case` structure, you can make very complex expressions
    for partitioning, so it will be a very rare case where the complexity is such
    that Listing [12-13](#475066_1_En_12_Chapter.xhtml#PC44) is needed – but it’s
    nice to know the option is there, just in case.


    ## Lessons learned


    In this chapter I’ve used sales data to exemplify Top-N queries, along the way
    providing you insight in


    *   The three different Top-N query types: top-rows, Olympic, and top-values


    *   Implementing these with analytic functions `row_number`, `rank,` and `dense_rank`


    *   Using the shortcut `fetch first` row limiting clause for the first two types


    *   Doing Top-N per subsets of data with `partition by` in analytic functions


    These methods will help you in many use cases, not just sales data.'
