  trans: '### 经验教训


    预测是一门科学，一本书中关于 SQL 的一小章内容并不能让你成为预测专家。但即使只是通过这个关于预测话题的“开胃小菜”，我也向你展示了一些技巧：


    *   在多个 `with` 子句中链式计算，作为嵌套内联视图的替代方案

    *   构建时间间隔为一个时间单位的连续行时间序列数据

    *   使用移动窗口求平均值，以及对不同年份的同一时期求平均值

    *   使用 `regr_intercept` 和 `regr_slope` 计算线性回归

    *   结合这些技术在 SQL 中实现一个预测模型


    尽管本章只展示了一个预测模型，但这应该能帮助你在 SQL 中实现其他类似的时间序列回归模型，前提是你有公式，并且需要比许多外部预测工具更高的速度和效率。


    # 16. 使用滚动求和预测最低库存达到时间


    如果你的消耗速率是稳定的，预测以该速率能持续多久是很容易的——例如，如果你知道你的汽车平均每升燃料行驶 20 公里，油箱里还剩 30 升，你只需简单地相乘就能知道在燃料耗尽前可以行驶
    600 公里。


    但如果消耗不是稳定的，你就需要别的方法了。如果“好啤酒贸易公司”销售一种特定的季节性圣诞啤酒，它的销量并非简单地稳定在每月 100 瓶——六月份可能卖得很少，而十二月份则能卖出数百瓶。对于这种情况，你需要估算（也许使用前一章的技术）预期的销售量，并将其存储为*预测*或销售预算。


    一旦你预测一月份将售出 150 瓶，二月份 100 瓶，三月份 250 瓶，依此类推，你就需要弄清楚，库存中的 400 瓶存货到一月底将减少到 250 瓶，到二月底减少到
    150 瓶，并在三月中旬稍后售罄。弄清楚这一点就是本章的主题。


    ## 库存、预算与订单


    在“好啤酒贸易公司”的示例中，我将演示在已知有多少啤酒已订购（等待从库存中拣选）以及有多少啤酒是预算销售（预计将在未来某个时间点被拣选）的情况下，预测库存何时达到零（或最小值）的情况。


    我将使用 `month` 作为时间粒度，按月预算销售数量。出于演示目的，我不需要细化到周或日的数据，但如果你需要，可以轻松地将这些方法调整到更细的时间粒度。我将使用图
    16-1 所示表中的数据。


    ![../images/475066_1_En_16_Chapter/475066_1_En_16_Fig1_HTML.jpg](img/475066_1_En_16_Fig1_HTML.jpg)

    图 16-1

    本章示例中使用的表


    从表 `inventory` 中，我知道每种啤酒的库存数量；表 `monthly_budget` 显示了每种啤酒每月的预期销售量；而已订购数量（但*尚未*拣取，因此尚未从库存中扣除）则在表
    `orderlines` 中。表 `product_minimums` 我稍后会在本章中讲到。


    你会注意到 `inventory` 表包含每个位置的数量（我使用了第 13 章 FIFO 拣选中的表），但为此，我只需要每种啤酒的总库存数量。为了更容易实现，我在清单
    16-1 中创建了视图 `inventory_totals`，按产品聚合库存。


    ```sql

    SQL> create or replace view inventory_totals

    2  as

    3  select

    4     i.product_id

    5   , sum(i.qty) as qty

    6  from inventory i

    7  group by i.product_id;

    View INVENTORY_TOTALS created.

    ```

    清单 16-1

    按产品汇总库存的视图


    类似地，对于订购数量，我不需要具体的订单行。我只需要每种啤酒每月的订购数量，所以我在清单 16-2 的视图 `monthly_orders` 中聚合了这些数据。


    ```sql

    SQL> create or replace view monthly_orders

    2  as

    3  select

    4     ol.product_id

    5   , trunc(o.ordered, ''MM'') as mth

    6   , sum(ol.qty) as qty

    7  from orders o

    8  join orderlines ol

    9     on ol.order_id = o.id

    10  group by ol.product_id, trunc(o.ordered, ''MM'');

    View MONTHLY_ORDERS created.

    ```

    清单 16-2

    按产品、按月汇总订单的视图


    这些就是我将要使用的表和视图；现在我来展示其中的数据。


    ### 数据


    我将使用两种啤酒作为本章的示例：`Der Helle Kumpel` 和 `Hazy Pink Cloud`。它们的总库存如清单 16-3 所示。


    ```sql

    SQL> select it.product_id, p.name, it.qty

    2  from inventory_totals it

    3  join products p

    4     on p.id = it.product_id

    5  where product_id in (6520, 6600)

    6  order by product_id;

    PRODUCT_ID  NAME              QTY

    6520        Der Helle Kumpel  400

    6600        Hazy Pink Cloud   100

    ```

    清单 16-3

    两种产品的库存总量


    这是截至 2019 年 1 月 1 日的库存总量。然后我有 2019 年的月度销售预算（清单 16-4）。


    ```sql

    SQL> select mb.product_id, mb.mth, mb.qty

    2  from monthly_budget mb

    3  where mb.product_id in (6520, 6600)

    4  and mb.mth >= date ''2019-01-01''

    5  order by mb.product_id, mb.mth;

    PRODUCT_ID  MTH         QTY

    6520        2019-01-01  45

    6520        2019-02-01  45

    6520        2019-03-01  50

    ...

    6520        2019-10-01  50

    6520        2019-11-01  40

    6520        2019-12-01  40

    6600        2019-01-01  20

    6600        2019-02-01  20

    6600        2019-03-01  20

    ...

    6600        2019-10-01  20

    6600        2019-11-01  20

    6600        2019-12-01  20

    24 rows selected.

    ```

    清单 16-4

    两种啤酒 2019 年的月度预算


    产品 `6520` 预计在夏季月份会多卖一些，而产品 `6600` 预计每月稳定销售 20 瓶。


    但我不仅有预期数量；在清单 16-5 中，我还拥有 2019 年头几个月已经订购的数量。


    ```sql

    SQL> select mo.product_id, mo.mth, mo.qty

    2  from monthly_orders mo

    3  where mo.product_id in (6520, 6600)

    4  order by mo.product_id, mo.mth;

    PRODUCT_ID  MTH         QTY

    6520        2019-01-01  260

    6520        2019-02-01  40

    6600        2019-01-01  16

    6600        2019-02-01  40

    ```

    清单 16-5

    当前月度订单数量


    这里需要注意的是，一月份产品 `6520` 的订购量远超预期。


    基于这些数据，我现在将编写一些 SQL 来找出这两种产品何时会售罄。'
- fmt: '# Accumulating until zero


    One of the really useful things you can do with analytic functions is the rolling
    (accumulated) sum that I’ve shown before. In Listing 16-6, I use it again.


    ```

    SQL> select

    2     mb.product_id as p_id, mb.mth

    3   , mb.qty b_qty, mo.qty o_qty

    4   , greatest(mb.qty, nvl(mo.qty, 0)) as qty

    5   , sum(greatest(mb.qty, nvl(mo.qty, 0))) over (

    6        partition by mb.product_id

    7        order by mb.mth

    8        rows between unbounded preceding and current row

    9     ) as acc_qty

    10  from monthly_budget mb

    11  left outer join monthly_orders mo

    12     on mo.product_id = mb.product_id

    13     and mo.mth = mb.mth

    14  where mb.product_id in (6520, 6600)

    15  and mb.mth >= date ''2019-01-01''

    16  order by mb.product_id, mb.mth;

    Listing 16-6

    Accumulating quantities

    ```


    In `line 4`, I calculate the monthly quantity as whichever is the greatest of
    *either* the budgeted quantity *or* the ordered quantity. In the following output,
    you see January for product 6520 has `o_qty` as the greatest (making `qty` = 260),
    while January for product 6600 has `b_qty` as the greatest (making `qty` = 20.)


    The idea is that if the ordered quantity is the smallest, there hasn’t yet been
    orders to match the budget, but it’s still expected to rise until budget is reached.
    But when the ordered quantity is the greatest, I know the budget has been surpassed,
    so I don’t expect it to become greater yet.


    So this quantity is then what I accumulate with the analytic `sum` in `lines 5–9`,
    so I end up with column `acc_qty` that shows me accumulated how much I expect
    to pick from the inventory:


    ```

    P_ID  MTH         B_QTY  O_QTY  QTY  ACC_QTY

    6520  2019-01-01  45     260    260  260

    6520  2019-02-01  45     40     45   305

    6520  2019-03-01  50            50   355

    ...

    6520  2019-11-01  40            40   775

    6520  2019-12-01  40            40   815

    6600  2019-01-01  20     16     20   20

    6600  2019-02-01  20     40     40   60

    6600  2019-03-01  20            20   80

    ...

    6600  2019-11-01  20            20   240

    6600  2019-12-01  20            20   260

    ```


    In Listing 16-7, I use this accumulated quantity to calculate what’s the expected
    inventory for each month (if I don’t restock along the way).


    ```

    SQL> select

    2     mb.product_id as p_id, mb.mth

    3   , greatest(mb.qty, nvl(mo.qty, 0)) as qty

    4   , greatest(

    5        it.qty - nvl(sum(

    6            greatest(mb.qty, nvl(mo.qty, 0))

    7        ) over (

    8           partition by mb.product_id

    9           order by mb.mth

    10           rows between unbounded preceding and 1 preceding

    11        ), 0)

    12      , 0

    13     ) as inv_begin

    14   , greatest(

    15        it.qty - sum(

    16            greatest(mb.qty, nvl(mo.qty, 0))

    17        ) over (

    18           partition by mb.product_id

    19           order by mb.mth

    20           rows between unbounded preceding and current row

    21        )

    22      , 0

    23     ) as inv_end

    24  from monthly_budget mb

    25  left outer join monthly_orders mo

    26     on mo.product_id = mb.product_id

    27     and mo.mth = mb.mth

    28  join inventory_totals it

    29     on it.product_id = mb.product_id

    30  where mb.product_id in (6520, 6600)

    31  and mb.mth >= date ''2019-01-01''

    32  order by mb.product_id, mb.mth;

    Listing 16-7

    Dwindling inventory

    ```


    `Lines 4–13` calculate how much quantity was in stock at the beginning of the
    month, while `lines 14–23` calculate how much at the end of the month:


    ```

    P_ID  MTH         QTY  INV_BEGIN  INV_END

    6520  2019-01-01  260  400        140

    6520  2019-02-01  45   140        95

    6520  2019-03-01  50   95         45

    6520  2019-04-01  50   45         0

    6520  2019-05-01  55   0          0

    ...

    6600  2019-01-01  20   100        80

    6600  2019-02-01  40   80         40

    6600  2019-03-01  20   40         20

    6600  2019-04-01  20   20         0

    6600  2019-05-01  20   0          0

    ...

    ```


    You see how the inventory dwindles until it reaches zero. As I use month for time
    granularity, in principle I can only state that the inventory will reach zero
    at some point during that month. But if I assume that the budgeted sales will
    be evenly distributed throughout the month, I can also in Listing 16-8 make a
    `guesstimation` of which day that zero will be reached.


    ```

    SQL> select

    2     product_id as p_id, mth, inv_begin, inv_end

    3   , trunc(

    4        mth + numtodsinterval(

    5                 (add_months(mth, 1) - 1 - mth) * inv_begin / qty

    6               , ''day''

    7              )

    8     ) as zero_day

    9  from (

    ...

    41  )

    42  where inv_begin > 0 and inv_end = 0

    43  order by product_id;

    Listing 16-8

    Estimating when zero is reached

    ```


    I wrap Listing 16-7 in an inline view and use `inv_begin / qty` in `line 5` to
    figure out how large a fraction of the estimated monthly sales can be fulfilled
    by the inventory at hand at the beginning of the month. When I assume evenly distributed
    sales, this is then the fraction of the number of days in the month that I have
    sufficient stock for.


    Filtering in `line 42` gives me as output just the rows where the inventory becomes
    zero:


    ```

    P_ID  MTH         INV_BEGIN  INV_END  ZERO_DAY

    6520  2019-04-01  45         0        2019-04-27

    6600  2019-04-01  20         0        2019-04-30

    ```


    In reality, however, I wouldn’t let the inventory reach zero. I’d set up a minimum
    quantity that I mustn’t get below of (as a buffer in case I underestimated sales),
    and every time I get to the minimum quantity, I must buy more beer and restock
    the inventory.'
