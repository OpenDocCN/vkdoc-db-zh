- fmt: '### Get just the first part of the result


    Sometimes I do not actually need to get the entire result; it is sufficient to
    get what can fit in a `varchar2` and an indication that there is more than could
    be shown. In version 12.2, the `listagg` function was enhanced to provide just
    this functionality, as I show in Listing [10-10](#475066_1_En_10_Chapter.xhtml#PC25).


    ```sql

    SQL> select

    2     listagg(

    3        rpad(p.name, 20)

    4        on overflow truncate ''{more}'' with count

    5     ) within group (

    6        order by p.id

    7     ) as product_list

    8  from products p

    9  join monthly_sales ms

    10     on ms.product_id = p.id;

    Listing 10-10

    Suppressing error in listagg

    ```


    Compared to Listing [10-9](#475066_1_En_10_Chapter.xhtml#PC24), I have simply
    added line 4:


    *   Keywords `on` and `overflow` are used to specify what the database should
    do if the result of the aggregation becomes too long to fit a `varchar2`. The
    default is `on overflow error`, which gives the error in Listing [10-9](#475066_1_En_10_Chapter.xhtml#PC24).

    *   `truncate` specifies that instead of raising an error, it should return only
    what will fit in a `varchar2` and truncate the rest. Note it never truncates in
    the middle of a string in the list – the string that causes the overflow so the
    output won’t fit, that string will be truncated in its entirety.

    *   The literal `''{more}''` will be appended to the result if it was truncated.
    If I do not specify a literal, the default is an ellipsis (three dots) `''...''`.

    *   `with count` causes a count of how many elements (not characters) were truncated
    to be appended. The default is `without count`.


    This addition of line 4 causes Listing [10-10](#475066_1_En_10_Chapter.xhtml#PC25)
    to run without error and give me this output instead with a single string almost
    4000 characters long (most of them omitted here to save paper):


    ```

    PRODUCT_LIST

    Coalminers Sweat    Coalminers Sweat    ...[[3880 characters removed]]...Der Helle
    Kumpel    Der Helle Kumpel    {more}(162)

    ```


    So for cases where it is enough to know there is more than could fit, this is
    a nice enhancement to `listagg`. But what if that is not the case? Then I have
    other possibilities.


    ### Try to make it fit with reduced data


    There can be cases where the reason it won’t fit with `listagg` is that the data
    is not unique, and you do not actually need to see each individual occurrence
    of the duplicated data – once is enough. When your database is version 19c or
    later, you can do `distinct` string aggregation, making the fewer occurrences
    possibly fit inside a `varchar2`.


    Listing [10-11](#475066_1_En_10_Chapter.xhtml#PC27) is like Listing [10-9](#475066_1_En_10_Chapter.xhtml#PC24);
    I just added the keyword `distinct` in the `listagg` function call, which is a
    new feature in version 19c.


    ```sql

    SQL> select

    2     listagg(distinct rpad(p.name, 20)) within group (

    3        order by p.id

    4     ) as product_list

    5  from products p

    6  join monthly_sales ms

    7     on ms.product_id = p.id;

    Listing 10-11

    Reducing data with distinct

    ```


    Since the 7200 character string in this case contains a whole lot of repetitions,
    doing `distinct` gives me a string with just 200 characters:


    ```

    PRODUCT_LIST

    Coalminers Sweat    Der Helle Kumpel    Ghost of Hops       Hazy Pink Cloud     Hercule
    Trippel     Hoppy Crude Oil     Monks and Nuns      Pale Rider Rides    Reindeer
    Fuel       Summer in India

    ```


    If I had not had a 19c database, I could have used an inline view with a `select
    distinct` and then performed my `listagg` aggregation on the result of the inline
    view.


    For cases where a `distinct` set of data makes the aggregated result small enough,
    `listagg` supports it in version 19c or later. But there can also be cases where
    you really do need the aggregated result to be larger than a `varchar2` – then
    you need a `clob`.


    ### Use a CLOB instead of a VARCHAR2


    One way to use a clob is to use the `collect` function shown earlier and then
    create a function `name_coll_type_to_clob` instead of the `name_coll_type_to_varchar2`
    I have shown. I’ll leave that as an exercise to you, as it is not much that need
    to be changed, if you want to try it.


    But in Listing [10-12](#475066_1_En_10_Chapter.xhtml#PC29), I’ll instead show
    you how to aggregate to a `clob` using the built-in function `xmlagg` – then you
    do not need to create any function of your own.


    ```sql

    SQL> select

    2     xmlagg(

    3        xmlparse(

    4           content rpad(p.name, 20) wellformed

    5        )

    6        order by product_id

    7     ).getclobval() as product_list

    8  from products p

    9  join monthly_sales ms

    10     on ms.product_id = p.id;

    Listing 10-12

    Using xmlagg to aggregate to a clob

    ```


    This is very like what I did in Listing [10-8](#475066_1_En_10_Chapter.xhtml#PC19),
    just using `getclobval()` in line 7 instead of `getstringval()`. That is really
    all that is necessary to get a `clob` instead of `varchar2` from an `xmltype`,
    and the result is the 7200 character string I want (shown here with most of it
    cut away):


    ```

    PRODUCT_LIST

    Coalminers Sweat    Coalminers Sweat    ...[[7120 characters removed]]...Pale
    Rider Rides    Pale Rider Rides

    ```


    If my database is version 18c or later, I can get the same output as Listing [10-12](#475066_1_En_10_Chapter.xhtml#PC29)
    by using `json_arrayagg` as alternative to `xmlagg`. I show an example in Listing
    [10-13](#475066_1_En_10_Chapter.xhtml#PC31).


    ```sql

    SQL> select

    2     json_value(

    3        replace(

    4           json_arrayagg(

    5              rpad(p.name, 20)

    6              order by product_id

    7              returning clob

    8           )

    9         , ''","''

    10         , ''''

    11        )

    12      , ''$[0]'' returning clob

    13     ) as product_list

    14  from products p

    15  join monthly_sales ms

    16     on ms.product_id = p.id;

    Listing 10-13

    Using json_arrayagg to aggregate to a clob

    ```


    If you didn’t create your own `name_coll_type_to_clob` and you have APEX installed
    in the database, you also have an APEX function that can be used, as I show in
    Listing [10-14](#475066_1_En_10_Chapter.xhtml#PC32).


    ```sql

    SQL> select

    2     apex_string.join_clob(

    3        cast(

    4           collect(

    5              rpad(p.name, 20)

    6              order by p.id

    7           )

    8           as apex_t_varchar2

    9        )

    10      , ''''

    11      , 12 /* dbms_lob.call */

    12     ) as product_list

    13  from products p

    14  join monthly_sales ms

    15     on ms.product_id = p.id;

    Listing 10-14

    Using apex_string.join_clob to aggregate to a clob

    ```


    This is a function that can be used just like `apex_string.join` that I showed
    you earlier in the chapter. Since `apex_string.join_clob` returns a temporary
    clob, it has an extra parameter compared to `apex_string.join` to indicate the
    life span of the temporary clob, accepting the same values as `dbms_lob.createtemporary`.
    In line 11, I state that the clob just lives for the duration of the call.


    Until perhaps a future `listagg` implementation might possibly implement `clob`
    support, `xmlagg`, `json_arrayagg`, and `apex_string.join_clob` are all valid
    methods to use. The JSON functionality in the database has generally been tuned
    from version to version, so in the most recent database versions, the JSON functions
    are typically the fastest solution.


    ## Lessons learned


    I’ve shown both built-in and custom-made methods of string aggregation enabling
    you to


    *   Use built-in `listagg` function as the preferred method, except for the special
    cases where it will not work.

    *   Create a nested table type and a function (or use APEX built-ins) to use the
    `collect` aggregate function as an alternative.

    *   Use a custom created aggregate function `stragg`.

    *   Do string aggregation both in `varchar2` and `clob` with various built-in
    functions.


    All of the methods can be good to know for special circumstances, but my recommendation
    is in general to stick to `listagg` if you can. The built-in functionality normally
    outperforms anything you can build yourself – unless the circumstances are very
    special.


    # Part II: Analytic Functions'
  raw: '### Get just the first part of the result


    Sometimes I do not actually need to get the entire result; it is sufficient to
    get what *can* fit in a `varchar2` and an indication that there is more than could
    be shown. In version 12.2, the `listagg` function was enhanced to provide just
    this functionality, as I show in Listing [10-10](#475066_1_En_10_Chapter.xhtml#PC25).


    ```

    SQL> select

    2     listagg(

    3        rpad(p.name, 20)

    4        on overflow truncate ''{more}'' with count

    5     ) within group (

    6        order by p.id

    7     ) as product_list

    8  from products p

    9  join monthly_sales ms

    10     on ms.product_id = p.id;

    Listing 10-10

    Suppressing error in listagg

    ```


    Compared to Listing [10-9](#475066_1_En_10_Chapter.xhtml#PC24), I have simply
    added line 4:


    *   Keywords `on` `overflow` is used to specify what the database should do if
    the result of the aggregation becomes too long to fit a `varchar2`. The default
    is `on overflow error`, which gives the error in Listing [10-9](#475066_1_En_10_Chapter.xhtml#PC24).


    *   `truncate` specifies that instead of raising an error, it should return only
    what will fit in a `varchar2` and truncate the rest. Note it never truncates in
    the middle of a string in the list – the string that causes the overflow so the
    output won’t fit, that string will be truncated in its entirety.


    *   The literal `''{more}''` will be appended to the result if it was truncated.
    If I do not specify a literal, the default is an ellipsis (three dots) `''...''`.


    *   `with count` causes a count of how many elements (not characters) were truncated
    to be appended. The default is `without count`.


    This addition of line 4 causes Listing [10-10](#475066_1_En_10_Chapter.xhtml#PC25)
    to run without error and give me this output instead with a single string almost
    4000 characters long (most of them omitted here to save paper):


    ```

    PRODUCT_LIST

    Coalminers Sweat    Coalminers Sweat    ...[[3880 characters removed]]...Der Helle
    Kumpel    Der Helle Kumpel    {more}(162)

    ```


    So for cases where it is enough to know there is more than could fit, this is
    a nice enhancement to `listagg`. But what if that is not the case? Then I have
    other possibilities.


    ### Try to make it fit with reduced data


    There can be cases where the reason it won’t fit with `listagg` is that the data
    is not unique, and you do not actually need to see each individual occurrence
    of the duplicated data – once is enough. When your database is version 19c or
    later, you can do `distinct` string aggregation, making the fewer occurrences
    possibly fit inside a `varchar2`.


    Listing [10-11](#475066_1_En_10_Chapter.xhtml#PC27) is like Listing [10-9](#475066_1_En_10_Chapter.xhtml#PC24);
    I just added the keyword `distinct` in the `listagg` function call, which is a
    new feature in version 19c.


    ```

    SQL> select

    2     listagg(distinct rpad(p.name, 20)) within group (

    3        order by p.id

    4     ) as product_list

    5  from products p

    6  join monthly_sales ms

    7     on ms.product_id = p.id;

    Listing 10-11

    Reducing data with distinct

    ```


    Since the 7200 character string in this case contains a whole lot of repetitions,
    doing `distinct` gives me a string with just 200 characters:


    ```

    PRODUCT_LIST

    Coalminers Sweat    Der Helle Kumpel    Ghost of Hops       Hazy Pink Cloud     Hercule
    Trippel     Hoppy Crude Oil     Monks and Nuns      Pale Rider Rides    Reindeer
    Fuel       Summer in India

    ```


    If I had not had a 19c database, I could have used an inline view with a `select
    distinct` and then performed my `listagg` aggregation on the result of the inline
    view.


    For cases where a `distinct` set of data makes the aggregated result small enough,
    `listagg` supports it in version 19c or later. But there can also be cases where
    you really *do* need the aggregated result to be larger than a `varchar2` – then
    you need a `clob`.


    ### Use a CLOB instead of a VARCHAR2


    One way to use a clob is to use the collect function shown earlier and then create
    a function `name_coll_type_to_clob` instead of the `name_coll_type_to_varchar2`
    I have shown. I’ll leave that as an exercise to you, as it is not much that need
    to be changed, if you want to try it.


    But in Listing [10-12](#475066_1_En_10_Chapter.xhtml#PC29), I’ll instead show
    you how to aggregate to a `clob` using the built-in function `xmlagg` – then you
    do not need to create any function of your own.


    ```

    SQL> select

    2     xmlagg(

    3        xmlparse(

    4           content rpad(p.name, 20) wellformed

    5        )

    6        order by product_id

    7     ).getclobval() as product_list

    8  from products p

    9  join monthly_sales ms

    10     on ms.product_id = p.id;

    Listing 10-12

    Using xmlagg to aggregate to a clob

    ```


    This is very like what I did in Listing [10-8](#475066_1_En_10_Chapter.xhtml#PC19),
    just using `getclobval()` in line 7 instead of `getstringval()`. That is really
    all that is necessary to get a `clob` instead of `varchar2` from an `xmltype`,
    and the result is the 7200 character string I want (shown here with most of it
    cut away):


    ```

    PRODUCT_LIST

    Coalminers Sweat    Coalminers Sweat    ...[[7120 characters removed]]...Pale
    Rider Rides    Pale Rider Rides

    ```


    If my database is version 18c or later, I can get the same output as Listing [10-12](#475066_1_En_10_Chapter.xhtml#PC29)
    by using `json_arrayagg` as alternative to `xmlagg`. I show an example in Listing
    [10-13](#475066_1_En_10_Chapter.xhtml#PC31).


    ```

    SQL> select

    2     json_value(

    3        replace(

    4           json_arrayagg(

    5              rpad(p.name, 20)

    6              order by product_id

    7              returning clob

    8           )

    9         , ''","''

    10         , ''''

    11        )

    12      , ''$[0]'' returning clob

    13     ) as product_list

    14  from products p

    15  join monthly_sales ms

    16     on ms.product_id = p.id;

    Listing 10-13

    Using json_arrayagg to aggregate to a clob

    ```


    If you didn’t create your own `name_coll_type_to_clob` and you have APEX installed
    in the database, you also have an APEX function that can be used, as I show in
    Listing [10-14](#475066_1_En_10_Chapter.xhtml#PC32).


    ```

    SQL> select

    2     apex_string.join_clob(

    3        cast(

    4           collect(

    5              rpad(p.name, 20)

    6              order by p.id

    7           )

    8           as apex_t_varchar2

    9        )

    10      , ''''

    11      , 12 /* dbms_lob.call */

    12     ) as product_list

    13  from products p

    14  join monthly_sales ms

    15     on ms.product_id = p.id;

    Listing 10-14

    Using apex_string.join_clob to aggregate to a clob

    ```


    This is a function that can be used just like `apex_string.join` that I showed
    you earlier in the chapter. Since `apex_string.join_clob` returns a temporary
    clob, it has an extra parameter compared to `apex_string.join` to indicate the
    life span of the temporary clob, accepting the same values as `dbms_lob.createtemporary`
    . In line 11, I state that the clob just lives for the duration of the call.


    Until perhaps a future `listagg` implementation might possibly implement `clob`
    support, `xmlagg`, `json_arrayagg,` and `apex_string.join_clob` are all valid
    methods to use. The JSON functionality in the database has generally been tuned
    from version to version, so in the most recent database versions, the JSON functions
    are typically the fastest solution.


    ## Lessons learned


    I’ve shown both built-in and custom-made methods of string aggregation enabling
    you to


    *   Use built-in `listagg` function as the preferred method, except for the special
    cases where it will not work.


    *   Create a nested table type and a function (or use APEX built-ins) to use the
    `collect` aggregate function as an alternative.


    *   Use a custom created aggregate function `stragg.`


    *   Do string aggregation both in `varchar2` and `clob` with various built-in
    functions.


    All of the methods can be good to know for special circumstances, but my recommendation
    is in general to stick to `listagg` if you can. The built-in functionality normally
    outperforms anything you can build yourself – unless the circumstances are very
    special.


    # Part IIAnalytic Functions'
  trans: '### 仅获取结果的第一部分


    有时我实际上并不需要获取整个结果；只需获取能放入一个`varchar2`的内容，并附带一个指示，说明还有更多无法显示的内容即可。在 12.2 版本中，`listagg`
    函数得到了增强，正好提供了此功能，如我所示于清单 10-10。


    ```sql

    SQL> select

    2     listagg(

    3        rpad(p.name, 20)

    4        on overflow truncate ''{more}'' with count

    5     ) within group (

    6        order by p.id

    7     ) as product_list

    8  from products p

    9  join monthly_sales ms

    10     on ms.product_id = p.id;

    清单 10-10

    在 listagg 中抑制错误

    ```


    与清单 10-9 相比，我只是添加了第 4 行：


    *   关键字 `on` 和 `overflow` 用于指定如果聚合结果变得太长而无法放入一个 `varchar2` 时，数据库应执行的操作。默认是 `on
    overflow error`，即清单 10-9 中显示的错误。

    *   `truncate` 指定不引发错误，而是只返回能放入 `varchar2` 的内容并截断其余部分。请注意，它绝不会在列表中的字符串中间截断——导致溢出的那个字符串（使得输出无法容纳）将被整体截断。

    *   如果结果被截断，字面量 `''{more}''` 将被附加到结果后。如果不指定字面量，默认是省略号（三个点）`''...''`。

    *   `with count` 会导致被截断的元素数量（而非字符数）被附加到结果后。默认是 `without count`。


    添加第 4 行使得清单 10-10 能够无错误地运行，并给我如下输出，这是一个几乎 4000 个字符长的单个字符串（此处为节省篇幅省略了大部分）：


    ```

    PRODUCT_LIST

    Coalminers Sweat    Coalminers Sweat    ...[[3880 个字符已移除]]...Der Helle Kumpel    Der
    Helle Kumpel    {more}(162)

    ```


    因此，对于只需知道有更多内容无法容纳的情况，这是对 `listagg` 的一个很好的增强。但如果情况并非如此呢？那么我还有其他可能性。


    ### 尝试通过减少数据来使其适应


    可能存在这样的情况：使用 `listagg` 无法容纳的原因是数据不唯一，而你实际上不需要看到重复数据的每个单独出现——一次就足够了。当你的数据库是 19c
    或更高版本时，你可以进行 `distinct` 字符串聚合，使得较少的出现次数可能适应一个 `varchar2`。


    清单 10-11 类似于清单 10-9；我只是在 `listagg` 函数调用中添加了关键字 `distinct`，这是 19c 版本中的一个新特性。


    ```sql

    SQL> select

    2     listagg(distinct rpad(p.name, 20)) within group (

    3        order by p.id

    4     ) as product_list

    5  from products p

    6  join monthly_sales ms

    7     on ms.product_id = p.id;

    清单 10-11

    使用 distinct 减少数据

    ```


    由于此案例中的 7200 字符字符串包含大量重复项，使用 `distinct` 给我一个仅有 200 个字符的字符串：


    ```

    PRODUCT_LIST

    Coalminers Sweat    Der Helle Kumpel    Ghost of Hops       Hazy Pink Cloud     Hercule
    Trippel     Hoppy Crude Oil     Monks and Nuns      Pale Rider Rides    Reindeer
    Fuel       Summer in India

    ```


    如果我没有 19c 数据库，我可以使用一个带有 `select distinct` 的内联视图，然后在该内联视图的结果上执行 `listagg` 聚合。


    对于唯一数据集能使聚合结果足够小的情况，`listagg` 在 19c 或更高版本中支持此功能。但也可能存在你确实需要聚合结果大于 `varchar2` 的情况——这时你需要一个
    `clob`。


    ### 使用 CLOB 代替 VARCHAR2


    使用 clob 的一种方法是使用前面展示的 `collect` 函数，然后创建一个函数 `name_coll_type_to_clob`，而不是我展示的 `name_coll_type_to_varchar2`。我将此留给你作为练习，因为如果你愿意尝试，不需要做太多更改。


    但在清单 10-12 中，我将展示如何使用内置函数 `xmlagg` 聚合到一个 `clob`——这样你就不需要创建任何自己的函数。


    ```sql

    SQL> select

    2     xmlagg(

    3        xmlparse(

    4           content rpad(p.name, 20) wellformed

    5        )

    6        order by product_id

    7     ).getclobval() as product_list

    8  from products p

    9  join monthly_sales ms

    10     on ms.product_id = p.id;

    清单 10-12

    使用 xmlagg 聚合到 clob

    ```


    这非常类似于我在清单 10-8 中所做的，只是在第 7 行使用了 `getclobval()` 而不是 `getstringval()`。这确实是将 `xmltype`
    转换为 `clob` 而非 `varchar2` 所需的全部操作，结果就是我想要的 7200 字符字符串（此处显示时省略了大部分）：


    ```

    PRODUCT_LIST

    Coalminers Sweat    Coalminers Sweat    ...[[7120 个字符已移除]]...Pale Rider Rides    Pale
    Rider Rides

    ```


    如果我的数据库是 18c 或更高版本，我可以使用 `json_arrayagg` 作为 `xmlagg` 的替代品，获得与清单 10-12 相同的输出。我在清单
    10-13 中展示了一个例子。


    ```sql

    SQL> select

    2     json_value(

    3        replace(

    4           json_arrayagg(

    5              rpad(p.name, 20)

    6              order by product_id

    7              returning clob

    8           )

    9         , ''","''

    10         , ''''

    11        )

    12      , ''$[0]'' returning clob

    13     ) as product_list

    14  from products p

    15  join monthly_sales ms

    16     on ms.product_id = p.id;

    清单 10-13

    使用 json_arrayagg 聚合到 clob

    ```


    如果你没有创建自己的 `name_coll_type_to_clob` 并且数据库中安装了 APEX，你还有一个 APEX 函数可以使用，如我在清单 10-14
    中所示。


    ```sql

    SQL> select

    2     apex_string.join_clob(

    3        cast(

    4           collect(

    5              rpad(p.name, 20)

    6              order by p.id

    7           )

    8           as apex_t_varchar2

    9        )

    10      , ''''

    11      , 12 /* dbms_lob.call */

    12     ) as product_list

    13  from products p

    14  join monthly_sales ms

    15     on ms.product_id = p.id;

    清单 10-14

    使用 apex_string.join_clob 聚合到 clob

    ```


    这是一个可以像本章前面展示的 `apex_string.join` 一样使用的函数。由于 `apex_string.join_clob` 返回一个临时 clob，它与
    `apex_string.join` 相比有一个额外的参数，用于指示临时 clob 的生命周期，接受与 `dbms_lob.createtemporary`
    相同的值。在第 11 行，我指定该 clob 仅在调用期间存在。


    在未来的 `listagg` 实现可能实现 `clob` 支持之前，`xmlagg`、`json_arrayagg` 和 `apex_string.join_clob`
    都是有效可用的方法。数据库中的 JSON 功能通常从版本到版本都进行了优化，因此在最新的数据库版本中，JSON 函数通常是最快的解决方案。


    ## 经验教训


    我展示了内置和自定义的字符串聚合方法，使你能够：


    *   在除了它不起作用的特殊情况外，使用内置的 `listagg` 函数作为首选方法。

    *   创建一个嵌套表类型和一个函数（或使用 APEX 内置函数）来使用 `collect` 聚合函数作为替代方案。

    *   使用自定义创建的聚合函数 `stragg`。

    *   使用各种内置函数在 `varchar2` 和 `clob` 中执行字符串聚合。


    所有这些方法在特殊情况下都可能有用，但我通常的建议是，如果可以的话，坚持使用 `listagg`。内置功能通常比你自己构建的任何东西性能更好——除非情况非常特殊。


    # 第二部分：分析函数'
- fmt: '# 11. Analytic Partitions, Ordering, and Windows


    A wise man once said in a conference presentation that if you put SQL on your
    resume and do not know analytic functions, you are lying. I can only agree. It
    would be similar to stating you know Windows and have never worked with a newer
    windows version than Windows 95.


    I use analytic functions almost daily when developing. There are so many cases
    where they either are necessary to create a SQL solution at all (the alternative
    being a slow procedural solution instead) or at the very least make the SQL much
    more performant than not using analytic functions (often cases of many self-joins
    leading to multiple lookups of the same data).


    The fantastic bit about analytic functions is that you can retrieve or reference
    values across rows – you are not restricted to values in the row itself when doing
    calculations. You can use different subclauses of analytic functions in different
    combinations to achieve this.


    The basics of these subclauses, and how they work together, are shown in this
    chapter. The rest of Part 2 contains different use cases of analytic functions
    solving tasks that often would be hard without.


    ## Sums of quantities


    To showcase the different subclauses of an analytic function call, I’ll be using
    the `orderlines` table shown in Figure [11-1](#475066_1_En_11_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig1_HTML.jpg](images/475066_1_En_11_Chapter/475066_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Orderlines table of how much of each product is ordered by customers


    The `orderlines` table contains how much is in order from customers for each of
    the beers in the `products` table. In the example queries of this chapter, I’ll
    join the two tables just to make it easier to spot the two different beers whose
    data I show in Listing [11-1](#475066_1_En_11_Chapter.xhtml#PC1).


    ```sql

    SQL> select

    2     ol.product_id as p_id

    3   , p.name        as product_name

    4   , ol.order_id   as o_id

    5   , ol.qty

    6  from orderlines ol

    7  join products p

    8     on p.id = ol.product_id

    9  where ol.product_id in (4280, 6600)

    10  order by ol.product_id, ol.qty;

    P_ID  PRODUCT_NAME     O_ID  QTY

    4280  Hoppy Crude Oil  423   60

    4280  Hoppy Crude Oil  427   60

    4280  Hoppy Crude Oil  422   80

    4280  Hoppy Crude Oil  429   80

    4280  Hoppy Crude Oil  428   90

    4280  Hoppy Crude Oil  421  110

    6600  Hazy Pink Cloud  424   16

    6600  Hazy Pink Cloud  426   16

    6600  Hazy Pink Cloud  425   24

    Listing 11-1

    Content of orderlines table for two beers

    ```


    I’ll make a lot of different sums of the `qty` column. With the basic ideas you
    can apply to most of the analytic functions, `sum` is just a handy example.


    ## Analytic syntax


    I’m sure you have seen Figure [11-2](#475066_1_En_11_Chapter.xhtml#Fig2) in the
    SQL Reference Manual, showing that all analytic functions use the keyword `over`
    followed by parentheses surrounding an analytic clause.


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig2_HTML.jpg](images/475066_1_En_11_Chapter/475066_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Basic analytic function syntax diagram


    Many functions are aggregate functions when used without `over` and become analytic
    when you add `over`. The interesting bits happen within the analytic clause shown
    in Figure [11-3](#475066_1_En_11_Chapter.xhtml#Fig3).


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig3_HTML.jpg](images/475066_1_En_11_Chapter/475066_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    The three parts that make up the analytic clause


    The analytic clause has three parts:


    *   `query_partition_clause` to split the data into partitions and apply the function
    separately to each partition


    *   `order_by_clause` to apply the function in a specific order and/or provide
    the ordering that the `windowing_clause` depends upon


    *   `windowing_clause` to specify a certain window (fixed or moving) of the ordered
    data in the partition


    But you’ll notice that the three parts are all optional in the syntax diagram,
    so the analytic clause itself is allowed to be empty. Listing [11-2](#475066_1_En_11_Chapter.xhtml#PC2)
    shows what happens then.


    ```sql

    SQL> select

    2     ol.product_id as p_id

    3   , p.name        as product_name

    4   , ol.order_id   as o_id

    5   , ol.qty

    6   , sum(ol.qty) over () as t_qty

    7  from orderlines ol

    8  join products p

    9     on p.id = ol.product_id

    10  where ol.product_id in (4280, 6600)

    11  order by ol.product_id, ol.qty;

    Listing 11-2

    The simplest analytic function call is a grand total

    ```


    I’ve just taken Listing [11-1](#475066_1_En_11_Chapter.xhtml#PC1) and added line
    6: a `sum` of the `qty` column as analytic function (recognizable by the `over`
    keyword) with an empty analytic clause. The output becomes:


    ```sql

    P_ID  PRODUCT_NAME     O_ID  QTY  T_QTY

    4280  Hoppy Crude Oil  423   60   536

    4280  Hoppy Crude Oil  427   60   536

    4280  Hoppy Crude Oil  422   80   536

    4280  Hoppy Crude Oil  429   80   536

    4280  Hoppy Crude Oil  428   90   536

    4280  Hoppy Crude Oil  421  110   536

    6600  Hazy Pink Cloud  424   16   536

    6600  Hazy Pink Cloud  426   16   536

    6600  Hazy Pink Cloud  425   24   536

    ```


    The `t_qty` column simply contains the `sum` of all the `qty` values – not of
    the entire table, but of those rows that satisfy the `where` clause.


    When executing a SQL statement, evaluation of analytic functions happens *after*
    the rows have been found (`where` clause evaluation) and also *after* any `group
    by` aggregation that may be in the statement. Therefore, analytic functions cannot
    be used in the `where`, `group by,` and `having` clauses. But they can be used
    in the `order by` clause, if you need to.


    The empty analytic clause means that no partitioning has been defined, so there
    is just a single partition containing all the rows. Also no ordering and windowing
    have been defined, so the entire partition is the window on which the `sum` function
    is applied. Therefore it becomes the grand total.


    Often, though, I’d like to apply the analytic function on smaller subsets, which
    I’ll show next.'
  raw: '# 11. Analytic Partitions, Ordering, and Windows


    A wise man once said in a conference presentation that if you put SQL on your
    resume and do not know analytic functions, you are lying. I can only agree. It
    would be similar to stating you know Windows and have never worked with a newer
    windows version than Windows 95.


    I use analytic functions almost daily when developing. There are so many cases
    where they either are necessary to create a SQL solution at all (the alternative
    being a slow procedural solution instead) or at the very least make the SQL much
    more performant than not using analytic functions (often cases of many self-joins
    leading to multiple lookups of the same data).


    The fantastic bit about analytic functions is that you can retrieve or reference
    values across rows – you are not restricted to values in the row itself when doing
    calculations. You can use different subclauses of analytic functions in different
    combinations to achieve this.


    The basics of these subclauses, and how they work together, are shown in this
    chapter. The rest of Part 2 contains different use cases of analytic functions
    solving tasks that often would be hard without.


    ## Sums of quantities


    To showcase the different subclauses of an analytic function call, I’ll be using
    the `orderlines` table shown in Figure [11-1](#475066_1_En_11_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig1_HTML.jpg](images/475066_1_En_11_Chapter/475066_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Orderlines table of how much of each product is ordered by customers


    The `orderlines` table contains how much is in order from customers for each of
    the beers in the `products` table. In the example queries of this chapter, I’ll
    join the two tables just to make it easier to spot the two different beers whose
    data I show in Listing [11-1](#475066_1_En_11_Chapter.xhtml#PC1).


    ```

    SQL> select

    2     ol.product_id as p_id

    3   , p.name        as product_name

    4   , ol.order_id   as o_id

    5   , ol.qty

    6  from orderlines ol

    7  join products p

    8     on p.id = ol.product_id

    9  where ol.product_id in (4280, 6600)

    10  order by ol.product_id, ol.qty;

    P_ID  PRODUCT_NAME     O_ID  QTY

    4280  Hoppy Crude Oil  423   60

    4280  Hoppy Crude Oil  427   60

    4280  Hoppy Crude Oil  422   80

    4280  Hoppy Crude Oil  429   80

    4280  Hoppy Crude Oil  428   90

    4280  Hoppy Crude Oil  421   110

    6600  Hazy Pink Cloud  424   16

    6600  Hazy Pink Cloud  426   16

    6600  Hazy Pink Cloud  425   24

    Listing 11-1

    Content of orderlines table for two beers

    ```


    I’ll make a lot of different sums of the `qty` column. With the basic ideas you
    can apply to most of the analytic functions, `sum` is just a handy example.


    ## Analytic syntax


    I’m sure you have seen Figure [11-2](#475066_1_En_11_Chapter.xhtml#Fig2) in the
    SQL Reference Manual, showing that all analytic functions use the keyword `over`
    followed by parentheses surrounding an analytic clause.


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig2_HTML.jpg](images/475066_1_En_11_Chapter/475066_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Basic analytic function syntax diagram


    Many functions are aggregate functions when used without `over` and become analytic
    when you add `over`. The interesting bits happen within the analytic clause shown
    in Figure [11-3](#475066_1_En_11_Chapter.xhtml#Fig3).


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig3_HTML.jpg](images/475066_1_En_11_Chapter/475066_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    The three parts that make up the analytic clause


    The analytic clause has three parts:


    *   **query_partition_clause** to split the data into partitions and apply the
    function separately to each partition


    *   **order_by_clause** to apply the function in a specific order and/or provide
    the ordering that the *windowing_clause* depends upon


    *   **windowing_clause** to specify a certain window (fixed or moving) of the
    ordered data in the partition


    But you’ll notice that the three parts are all optional in the syntax diagram,
    so the analytic clause itself is allowed to be empty. Listing [11-2](#475066_1_En_11_Chapter.xhtml#PC2)
    shows what happens then.


    ```

    SQL> select

    2     ol.product_id as p_id

    3   , p.name        as product_name

    4   , ol.order_id   as o_id

    5   , ol.qty

    6   , sum(ol.qty) over () as t_qty

    7  from orderlines ol

    8  join products p

    9     on p.id = ol.product_id

    10  where ol.product_id in (4280, 6600)

    11  order by ol.product_id, ol.qty;

    Listing 11-2

    The simplest analytic function call is a grand total

    ```


    I’ve just taken Listing [11-1](#475066_1_En_11_Chapter.xhtml#PC1) and added line
    6: a `sum` of the `qty` column as analytic function (recognizable by the `over`
    keyword) with an empty analytic clause. The output becomes:


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  T_QTY

    4280  Hoppy Crude Oil  423   60   536

    4280  Hoppy Crude Oil  427   60   536

    4280  Hoppy Crude Oil  422   80   536

    4280  Hoppy Crude Oil  429   80   536

    4280  Hoppy Crude Oil  428   90   536

    4280  Hoppy Crude Oil  421   110  536

    6600  Hazy Pink Cloud  424   16   536

    6600  Hazy Pink Cloud  426   16   536

    6600  Hazy Pink Cloud  425   24   536

    ```


    The `t_qty` column simply contains the `sum` of all the `qty` values – not of
    the entire table, but of those rows that satisfy the `where` clause.


    When executing a SQL statement, evaluation of analytic functions happens *after*
    the rows have been found (`where` clause evaluation) and also *after* any `group
    by` aggregation that may be in the statement. Therefore, analytic functions cannot
    be used in the `where`, `group by,` and `having` clauses. But they can be used
    in the `order by` clause, if you need to.


    The empty analytic clause means that no partitioning has been defined, so there
    is just a single partition containing all the rows. Also no ordering and windowing
    have been defined, so the entire partition is the window on which the `sum` function
    is applied. Therefore it becomes the grand total.


    Often, though, I’d like to apply the analytic function on smaller subsets, which
    I’ll show next.'
  trans: '

    # 第十一章 分析分区、排序与窗口


    一位智者曾在会议演讲中说，如果你在简历上写了 SQL 却不懂分析函数，那基本等同于撒谎。我深表赞同。这就像声称自己熟悉 Windows 系统，却从未使用过比
    Windows 95 更新的版本。


    在开发工作中，我几乎每天都会使用分析函数。许多场景下，它们要么是构建 SQL 解决方案的**必要条件**（否则只能采用缓慢的过程式方案），要么至少能大幅提升
    SQL 性能（特别是在需要多次自连接导致重复查找相同数据的情况下）。


    分析函数最精妙之处在于，它允许跨行检索或引用数值——在执行计算时，你不再局限于当前行的值。通过灵活组合分析函数的不同子句，可以实现这一特性。


    本章将介绍这些子句的基础知识及其协同工作机制。第二部分后续章节将展示分析函数解决各类实际问题的应用案例——这些问题若不使用分析函数通常难以处理。


    ## 数量求和示例


    为展示分析函数调用中各子句的作用，我将使用图 11-1 所示的 `orderlines` 表。


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig1_HTML.jpg](img/475066_1_En_11_Fig1_HTML.jpg)


    图 11-1


    记录客户对各产品订购数量的订单明细表


    `orderlines` 表记录了客户对 `products` 表中每种啤酒的订购数量。本章示例查询将连接这两个表，以便更清晰地展示代码清单 11-1 中两种啤酒的数据。


    ```sql

    SQL> select

    2     ol.product_id as p_id

    3   , p.name        as product_name

    4   , ol.order_id   as o_id

    5   , ol.qty

    6  from orderlines ol

    7  join products p

    8     on p.id = ol.product_id

    9  where ol.product_id in (4280, 6600)

    10  order by ol.product_id, ol.qty;

    P_ID  PRODUCT_NAME     O_ID  QTY

    4280  Hoppy Crude Oil  423   60

    4280  Hoppy Crude Oil  427   60

    4280  Hoppy Crude Oil  422   80

    4280  Hoppy Crude Oil  429   80

    4280  Hoppy Crude Oil  428   90

    4280  Hoppy Crude Oil  421  110

    6600  Hazy Pink Cloud  424   16

    6600  Hazy Pink Cloud  426   16

    6600  Hazy Pink Cloud  425   24

    代码清单 11-1

    两种啤酒在订单明细表中的数据

    ```


    接下来将对 `qty` 列进行多种求和计算。`sum` 函数在此仅作为示例，其原理适用于大多数分析函数。


    ## 分析函数语法


    相信你在 SQL 参考手册中见过图 11-2，它展示了所有分析函数都使用 `over` 关键字，后接包含分析子句的括号结构。


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig2_HTML.jpg](img/475066_1_En_11_Fig2_HTML.jpg)


    图 11-2


    分析函数基础语法结构图


    许多函数在不使用 `over` 时是聚合函数，加上 `over` 后则转变为分析函数。核心逻辑体现在图 11-3 所示的分析子句中。


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig3_HTML.jpg](img/475066_1_En_11_Fig3_HTML.jpg)


    图 11-3


    分析子句的三个组成部分


    分析子句包含三个部分：


    *   `query_partition_clause`：将数据划分为多个分区，并对每个分区单独应用函数

    *   `order_by_clause`：按指定顺序应用函数，和/或为 `windowing_clause` 提供排序依据

    *   `windowing_clause`：在分区内指定特定窗口（固定或移动窗口）


    但请注意语法结构图中这三部分都是可选的，这意味着分析子句本身可以为空。代码清单 11-2 展示了这种情况下会发生什么。


    ```sql

    SQL> select

    2     ol.product_id as p_id

    3   , p.name        as product_name

    4   , ol.order_id   as o_id

    5   , ol.qty

    6   , sum(ol.qty) over () as t_qty

    7  from orderlines ol

    8  join products p

    9     on p.id = ol.product_id

    10  where ol.product_id in (4280, 6600)

    11  order by ol.product_id, ol.qty;

    代码清单 11-2

    最简单的分析函数调用——计算总计

    ```


    我在代码清单 11-1 的基础上增加了第 6 行：将 `qty` 列的 `sum` 作为分析函数（通过 `over` 关键字识别），且分析子句为空。输出结果变为：


    ```sql

    P_ID  PRODUCT_NAME     O_ID  QTY  T_QTY

    4280  Hoppy Crude Oil  423   60   536

    4280  Hoppy Crude Oil  427   60   536

    4280  Hoppy Crude Oil  422   80   536

    4280  Hoppy Crude Oil  429   80   536

    4280  Hoppy Crude Oil  428   90   536

    4280  Hoppy Crude Oil  421  110   536

    6600  Hazy Pink Cloud  424   16   536

    6600  Hazy Pink Cloud  426   16   536

    6600  Hazy Pink Cloud  425   24   536

    ```


    `t_qty` 列简单地包含了所有 `qty` 值的总和——并非整个表的总和，而是满足 `where` 子句条件的那些行的总和。


    执行 SQL 语句时，分析函数的计算发生在行数据被筛选出来（`where` 子句计算）**之后**，也发生在可能存在的任何 `group by` 聚合**之后**。因此，分析函数不能用于
    `where`、`group by` 和 `having` 子句。但如果需要，它们可以用于 `order by` 子句。


    分析子句为空意味着未定义任何分区，因此只存在一个包含所有行的单一分区。同时也没有定义排序和窗口，因此整个分区就是应用 `sum` 函数的窗口，最终得到总计结果。


    不过在实际应用中，我通常更希望分析函数能在更小的子集上进行计算，接下来将展示具体方法。

    '
- fmt: '## Partitions


    有两种方法可以将行拆分为更小的子集用于分析函数，每种方法服务于不同的目的。第一种是使用图 [11-4](#475066_1_En_11_Chapter.xhtml#Fig4)
    所示的 *query_partition_clause* 进行分区。


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig4_HTML.jpg](images/475066_1_En_11_Chapter/475066_1_En_11_Fig4_HTML.jpg)


    **图 11-4**


    `query_partition_clause` 的语法图


    你可以使用一个或多个表达式进行分区，对于表达式中的每个不同值，都会创建一个分区。每个分区是完全隔离的，在一个分区中计算的分析函数无法看到任何其他分区中的数据。


    **注意**


    你会发现清单 [11-3](#475066_1_En_11_Chapter.xhtml#PC4) 与清单 [11-2](#475066_1_En_11_Chapter.xhtml#PC2)
    相同，只是更改了分析函数调用。本章中的大多数示例都是如此——除非另有说明，否则它们都是清单 [11-2](#475066_1_En_11_Chapter.xhtml#PC2)
    的副本，仅显示了更改后的函数调用。


    我在清单 [11-3](#475066_1_En_11_Chapter.xhtml#PC4) 中展示了一个使用 `partition by` 的简单示例。


    ```

    ...

    6   , sum(ol.qty) over (

    7        partition by ol.product_id

    8     ) as p_qty

    ...

    Listing 11-3

    使用分区按产品创建小计

    ```


    分析子句不再为空；我在第 7 行添加了 `partition by ol.product_id`，为每种啤酒创建一个分区，现在总计只适用于每个分区内部。这样
    `p_qty` 就是每个产品的总计：


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   480

    4280  Hoppy Crude Oil  427   60   480

    4280  Hoppy Crude Oil  422   80   480

    4280  Hoppy Crude Oil  429   80   480

    4280  Hoppy Crude Oil  428   90   480

    4280  Hoppy Crude Oil  421   110  480

    6600  Hazy Pink Cloud  424   16   56

    6600  Hazy Pink Cloud  426   16   56

    6600  Hazy Pink Cloud  425   24   56

    ```


    这很好，但我可以用第二种将数据拆分为子集的方式——使用 *order_by_clause* 和 *windowing_clause* 的窗口功能——发挥更大的创造力。


    ## 排序与窗口


    对于图 [11-5](#475066_1_En_11_Chapter.xhtml#Fig5) 所示的 *order_by_clause* 语法，SQL 参考手册的作者复制了查询中常规
    `order by` 的语法。


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig5_HTML.jpg](images/475066_1_En_11_Chapter/475066_1_En_11_Fig5_HTML.jpg)


    **图 11-5**


    `order_by_clause` 的语法图


    但这并不完全准确。当你阅读手册中的以下描述时，它解释了不能使用关键字 `siblings`，也不能在分析 `order by` 中使用 *position*
    和 *c_alias*。


    对于某些分析函数，只有 *query_partition_clause* 和 *order_by_clause*——第三个子句不可用。但对于许多函数，你还可以使用
    *windowing_clause*（图 [11-6](#475066_1_En_11_Chapter.xhtml#Fig6)）。要使用窗口功能，你必须已填写
    *order_by_clause*。


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig6_HTML.jpg](images/475066_1_En_11_Chapter/475066_1_En_11_Fig6_HTML.jpg)


    **图 11-6**


    `windowing_clause` 的语法图


    我在清单 [11-4](#475066_1_En_11_Chapter.xhtml#PC6) 中同时使用了排序和窗口来做一个累计总和。


    ```

    ...

    6   , sum(ol.qty) over (

    7        order by ol.qty

    8        rows between unbounded preceding

    9                 and current row

    10     ) as r_qty

    ...

    15  order by ol.qty;

    Listing 11-4

    使用排序和窗口创建累计总和

    ```


    第 7 行包含我的 `order by`，第 8–9 行是窗口规范。我指定在计算给定行的分析总和时，应对从最前面一行到当前行（包括当前行）的所有前序行应用滚动窗口。为了便于观察，我将第
    15 行的 `order by` 更改为与第 7 行的 `order by` 一致，这样输出中 `r_qty` 就是 `qty` 的累计总和：


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  R_QTY

    6600  Hazy Pink Cloud  426   16   16

    6600  Hazy Pink Cloud  424   16   32

    6600  Hazy Pink Cloud  425   24   56

    4280  Hoppy Crude Oil  427   60   116

    4280  Hoppy Crude Oil  423   60   176

    4280  Hoppy Crude Oil  422   80   256

    4280  Hoppy Crude Oil  429   80   336

    4280  Hoppy Crude Oil  428   90   426

    4280  Hoppy Crude Oil  421   110  536

    ```


    每一行的 `qty` 都在按顺序处理行时被累加，从而得到累计总和。当排序不唯一时，数据库首先访问哪一行，哪一行就会首先被加入总和。输出的前两行可能显示 `o_id`
    424 在 426 之前，如果访问计划使得 424 先被访问的话。


    我可以将第 15 行的 `order by` 更改回与清单 [11-2](#475066_1_En_11_Chapter.xhtml#PC2)（以及大多数其他示例）相同的顺序，先按
    `product_id` 排序，然后按 `qty` 排序：


    ```

    ...

    15  order by ol.product_id, ol.qty;

    ```


    现在我的输出顺序不同了，但累计总和 *仍然* 是基于分析 `sum` 中的 `order by`（即单独的 `qty`）计算的。你会看到，例如，之前输出的前两行现在出现在接近末尾的位置，但
    `o_id` 426 的 `r_qty` 值仍然是 16，`o_id` 424 的值是 32，依此类推：


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  R_QTY

    4280  Hoppy Crude Oil  423   60   176

    4280  Hoppy Crude Oil  427   60   116

    4280  Hoppy Crude Oil  422   80   256

    4280  Hoppy Crude Oil  429   80   336

    4280  Hoppy Crude Oil  428   90   426

    4280  Hoppy Crude Oil  421   110  536

    6600  Hazy Pink Cloud  424   16   32

    6600  Hazy Pink Cloud  426   16   16

    6600  Hazy Pink Cloud  425   24   56

    ```


    在与输出本身不同的顺序上应用分析功能，在很多情况下是一种有用的技术。


    **提示**


    图 [11-6](#475066_1_En_11_Chapter.xhtml#Fig6) 的下半部分显示了快捷语法。当窗口是 `rows between`
    *something* `and current row` 时，你可以简单地使用 `rows` *something*，它会默认使用 *something*
    作为窗口的起始行，`current row` 作为结束行。在清单 [11-4](#475066_1_En_11_Chapter.xhtml#PC6) 中，我本可以用一行
    `rows unbounded preceding` 来替换第 8–9 行。我个人喜欢总是使用 `between` 语法，但你可以使用快捷方式。这只是语法上的差异，结果是相同的。


    当然，我可以在一次调用中结合所有三个子句，就像我在清单 [11-5](#475066_1_En_11_Chapter.xhtml#PC10) 中所做的那样。


    ```

    ...

    6   , sum(ol.qty) over (

    7        partition by ol.product_id

    8        order by ol.qty

    9        rows between unbounded preceding

    10                 and current row

    11     ) as p_qty

    ...

    Listing 11-5

    结合分区、排序和窗口

    ```


    我在第 7 行按 `product_id` 分区，在第 8 行按 `qty` 排序，因此第 8–9 行的窗口为我提供了每种啤酒的累计 `sum`，输出很好地显示了这一点，因为我保持了通常的查询排序
    `product_id, qty`：


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   60

    4280  Hoppy Crude Oil  427   60   120

    4280  Hoppy Crude Oil  422   80   200

    4280  Hoppy Crude Oil  429   80   280

    4280  Hoppy Crude Oil  428   90   370

    4280  Hoppy Crude Oil  421   110  480

    6600  Hazy Pink Cloud  424   16   16

    6600  Hazy Pink Cloud  426   16   32

    6600  Hazy Pink Cloud  425   24   56

    ```


    窗口功能非常方便，经常用于累计总和，但窗口可以比这灵活得多。'
  raw: '### Partitions


    There are two ways to split the rows into smaller subsets for analytic functions,
    each serving different purposes. The first is partitioning with the *query_partition_clause*
    shown in Figure [11-4](#475066_1_En_11_Chapter.xhtml#Fig4).


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig4_HTML.jpg](images/475066_1_En_11_Chapter/475066_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Syntax diagram for the query_partition_clause


    You can use one or more expressions to do the partitioning, where there will be
    created a partition for each distinct value in the expression(s). Each partition
    is completely separated, and the analytic function evaluated in one partition
    cannot see data in any other partition.


    Note


    You’ll see that Listing [11-3](#475066_1_En_11_Chapter.xhtml#PC4) is the same
    as Listing [11-2](#475066_1_En_11_Chapter.xhtml#PC2), only changed in the analytic
    function call. This goes for most of the examples in the chapter – if nothing
    else is indicated, they are copies of Listing [11-2](#475066_1_En_11_Chapter.xhtml#PC2)
    with just the changed function call shown.


    I show a simple example of using `partition by` in Listing [11-3](#475066_1_En_11_Chapter.xhtml#PC4).


    ```

    ...

    6   , sum(ol.qty) over (

    7        partition by ol.product_id

    8     ) as p_qty

    ...

    Listing 11-3

    Creating subtotals by product with partitioning

    ```


    The analytic clause is no longer empty; I have added line 7 to create a partition
    for each beer, and the grand totals now apply within each partition only. This
    way `p_qty` is a grand total per product:


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   480

    4280  Hoppy Crude Oil  427   60   480

    4280  Hoppy Crude Oil  422   80   480

    4280  Hoppy Crude Oil  429   80   480

    4280  Hoppy Crude Oil  428   90   480

    4280  Hoppy Crude Oil  421   110  480

    6600  Hazy Pink Cloud  424   16   56

    6600  Hazy Pink Cloud  426   16   56

    6600  Hazy Pink Cloud  425   24   56

    ```


    That’s nice, but I can be much more creative with the second form of splitting
    the data into subsets – windowing with the *order_by_clause* and *windowing_clause*.


    ### Ordering and windows


    For the *order_by_clause* syntax shown in Figure [11-5](#475066_1_En_11_Chapter.xhtml#Fig5),
    the authors of the SQL Reference Manual have copied the syntax for the regular
    `order by` in a query.


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig5_HTML.jpg](images/475066_1_En_11_Chapter/475066_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


    Syntax diagram for the order_by_clause


    But it isn’t quite the truth. When you read the following description in the manual,
    it is explained that keyword `siblings` cannot be used, and you also cannot use
    *position* and *c_alias* for an analytic `order by`.


    For some analytic functions, *query_partition_clause* and *order_by_clause* are
    all there are – the third subclause is unavailable. But for many, you also have
    the *windowing_clause* (Figure [11-6](#475066_1_En_11_Chapter.xhtml#Fig6)) available.
    To use windowing, you must have filled the *order_by_clause*.


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig6_HTML.jpg](images/475066_1_En_11_Chapter/475066_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    Syntax diagram for the windowing_clause


    I’ll do a running total in Listing [11-4](#475066_1_En_11_Chapter.xhtml#PC6) by
    using both ordering and windowing.


    ```

    ...

    6   , sum(ol.qty) over (

    7        order by ol.qty

    8        rows between unbounded preceding

    9                 and current row

    10     ) as r_qty

    ...

    15  order by ol.qty;

    Listing 11-4

    Creating a running sum with ordering and windowing

    ```


    Line 7 contains my `order by` and lines 8–9 my window specification. I specify
    that when the analytic sum is to be evaluated on a given row, the sum should be
    applied to a rolling window of all the preceding rows up to and including the
    current row. To see easily what happens, I change the `order by` in line 15 to
    match the `order by` in line 7, giving me an output with `r_qty` being a running
    sum of `qty`:


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  R_QTY

    6600  Hazy Pink Cloud  426   16   16

    6600  Hazy Pink Cloud  424   16   32

    6600  Hazy Pink Cloud  425   24   56

    4280  Hoppy Crude Oil  427   60   116

    4280  Hoppy Crude Oil  423   60   176

    4280  Hoppy Crude Oil  422   80   256

    4280  Hoppy Crude Oil  429   80   336

    4280  Hoppy Crude Oil  428   90   426

    4280  Hoppy Crude Oil  421   110  536

    ```


    The `qty` of each row is added as the rows are processed in order, resulting in
    the running sum. When the ordering is not unique, whichever row the database happens
    to access first will be added first. The first two lines of the output might have
    shown `o_id` 424 before 426 instead, if the access plan had been such that 424
    was accessed first.


    I can change the `order by` in line 15 back to the same ordering as Listing [11-2](#475066_1_En_11_Chapter.xhtml#PC2)
    (and most other examples), ordering by `product_id` first, then `qty`:


    ```

    ...

    15  order by ol.product_id, ol.qty;

    ```


    Now my output is ordered differently, but the running sum is *still* calculated
    with the `order by` in the analytic `sum`, namely, `qty` alone. You’ll see, for
    example, that the two first lines of the previous output are now near the end,
    but `o_id` 426 still has a value of 16 in `r_qty` and `o_id` 424 a value of 32
    and so on:


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  R_QTY

    4280  Hoppy Crude Oil  423   60   176

    4280  Hoppy Crude Oil  427   60   116

    4280  Hoppy Crude Oil  422   80   256

    4280  Hoppy Crude Oil  429   80   336

    4280  Hoppy Crude Oil  428   90   426

    4280  Hoppy Crude Oil  421   110  536

    6600  Hazy Pink Cloud  424   16   32

    6600  Hazy Pink Cloud  426   16   16

    6600  Hazy Pink Cloud  425   24   56

    ```


    Having analytics applied in a different order than the output itself is a useful
    technique in a quite a few situations.


    Tip


    The lower half of Figure [11-6](#475066_1_En_11_Chapter.xhtml#Fig6) shows the
    shortcut syntax. When you have a window that is `rows between` *something* `and
    current row`, you can simply use `rows` *something*, and it will default to using
    *something* as start row and `current row` as end row of the window. In Listing
    [11-4](#475066_1_En_11_Chapter.xhtml#PC6), I could have replaced lines 8–9 with
    a single line containing `rows unbounded preceding`. Personally I like to always
    use the `between` syntax, but you can use the shortcut if you like. It is only
    syntactical difference, and the result is identical.


    Of course I can combine all three clauses in a single call, as I do it in Listing
    [11-5](#475066_1_En_11_Chapter.xhtml#PC10).


    ```

    ...

    6   , sum(ol.qty) over (

    7        partition by ol.product_id

    8        order by ol.qty

    9        rows between unbounded preceding

    10                 and current row

    11     ) as p_qty

    ...

    Listing 11-5

    Combining partitioning, ordering, and windowing

    ```


    I partition in line 7 by `product_id` and order in line 8 by `qty`, so the window
    in lines 8–9 gives me a running `sum` for each beer, which the output shows nicely
    since I kept the usual query ordering of `product_id, qty`:


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   60

    4280  Hoppy Crude Oil  427   60   120

    4280  Hoppy Crude Oil  422   80   200

    4280  Hoppy Crude Oil  429   80   280

    4280  Hoppy Crude Oil  428   90   370

    4280  Hoppy Crude Oil  421   110  480

    6600  Hazy Pink Cloud  424   16   16

    6600  Hazy Pink Cloud  426   16   32

    6600  Hazy Pink Cloud  425   24   56

    ```


    Windowing is very handy and often used for running totals, but the window can
    be much more flexible than that.'
  trans: '

    ## 分区


    有两种方法可以将行拆分为更小的子集用于分析函数，每种方法服务于不同的目的。第一种是使用图 11-4 所示的 *query_partition_clause*
    进行分区。


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig4_HTML.jpg](img/475066_1_En_11_Fig4_HTML.jpg)


    **图 11-4**


    `query_partition_clause` 的语法图


    你可以使用一个或多个表达式进行分区，对于表达式中的每个不同值，都会创建一个分区。每个分区是完全隔离的，在一个分区中计算的分析函数无法看到任何其他分区中的数据。


    **注意**


    你会发现清单 11-3 与清单 11-2 相同，只是更改了分析函数调用。本章中的大多数示例都是如此——除非另有说明，否则它们都是清单 11-2 的副本，仅显示了更改后的函数调用。


    我在清单 11-3 中展示了一个使用 `partition by` 的简单示例。


    ```

    ...

    6   , sum(ol.qty) over (

    7        partition by ol.product_id

    8     ) as p_qty

    ...

    清单 11-3

    使用分区按产品创建小计

    ```


    分析子句不再为空；我在第 7 行添加了 `partition by ol.product_id`，为每种啤酒创建了一个分区，现在总计只适用于每个分区内部。这样
    `p_qty` 就是每个产品的总计：


    ```

    P_ID  产品名称        O_ID  数量  P_QTY

    4280  Hoppy Crude Oil  423   60   480

    4280  Hoppy Crude Oil  427   60   480

    4280  Hoppy Crude Oil  422   80   480

    4280  Hoppy Crude Oil  429   80   480

    4280  Hoppy Crude Oil  428   90   480

    4280  Hoppy Crude Oil  421   110  480

    6600  Hazy Pink Cloud  424   16   56

    6600  Hazy Pink Cloud  426   16   56

    6600  Hazy Pink Cloud  425   24   56

    ```


    这很好，但我可以用第二种将数据拆分为子集的方式——使用 *order_by_clause* 和 *windowing_clause* 的窗口功能——发挥更大的创造力。


    ## 排序与窗口


    对于图 11-5 所示的 *order_by_clause* 语法，SQL 参考手册的作者复制了查询中常规 `order by` 的语法。


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig5_HTML.jpg](img/475066_1_En_11_Fig5_HTML.jpg)


    **图 11-5**


    `order_by_clause` 的语法图


    但这并不完全准确。当你阅读手册中的以下描述时，它解释了不能使用关键字 `siblings`，也不能在分析 `order by` 中使用 *position*
    和 *c_alias*。


    对于某些分析函数，只有 *query_partition_clause* 和 *order_by_clause*——第三个子句不可用。但对于许多函数，你还可以使用
    *windowing_clause*（图 11-6）。要使用窗口功能，你必须已填写 *order_by_clause*。


    ![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig6_HTML.jpg](img/475066_1_En_11_Fig6_HTML.jpg)


    **图 11-6**


    `windowing_clause` 的语法图


    我在清单 11-4 中同时使用了排序和窗口来做一个累计总和。


    ```

    ...

    6   , sum(ol.qty) over (

    7        order by ol.qty

    8        rows between unbounded preceding

    9                 and current row

    10     ) as r_qty

    ...

    15  order by ol.qty;

    清单 11-4

    使用排序和窗口创建累计总和

    ```


    第 7 行包含我的 `order by`，第 8–9 行是窗口规范。我指定在计算给定行的分析总和时，应对从最前面一行到当前行（包括当前行）的所有前序行应用滚动窗口。为了便于观察，我将第
    15 行的 `order by` 更改为与第 7 行的 `order by` 一致，这样输出中 `r_qty` 就是 `qty` 的累计总和：


    ```

    P_ID  产品名称        O_ID  数量  R_QTY

    6600  Hazy Pink Cloud  426   16   16

    6600  Hazy Pink Cloud  424   16   32

    6600  Hazy Pink Cloud  425   24   56

    4280  Hoppy Crude Oil  427   60   116

    4280  Hoppy Crude Oil  423   60   176

    4280  Hoppy Crude Oil  422   80   256

    4280  Hoppy Crude Oil  429   80   336

    4280  Hoppy Crude Oil  428   90   426

    4280  Hoppy Crude Oil  421   110  536

    ```


    每一行的 `qty` 都在按顺序处理行时被累加，从而得到累计总和。当排序不唯一时，数据库首先访问哪一行，哪一行就会首先被加入总和。输出的前两行可能显示 `o_id`
    424 在 426 之前，如果访问计划使得 424 先被访问的话。


    我可以将第 15 行的 `order by` 更改回与清单 11-2（以及大多数其他示例）相同的顺序，先按 `product_id` 排序，然后按 `qty`
    排序：


    ```

    ...

    15  order by ol.product_id, ol.qty;

    ```


    现在我的输出顺序不同了，但累计总和 *仍然* 是基于分析 `sum` 中的 `order by`（即单独的 `qty`）计算的。你会看到，例如，之前输出的前两行现在出现在接近末尾的位置，但
    `o_id` 426 的 `r_qty` 值仍然是 16，`o_id` 424 的值是 32，依此类推：


    ```

    P_ID  产品名称        O_ID  数量  R_QTY

    4280  Hoppy Crude Oil  423   60   176

    4280  Hoppy Crude Oil  427   60   116

    4280  Hoppy Crude Oil  422   80   256

    4280  Hoppy Crude Oil  429   80   336

    4280  Hoppy Crude Oil  428   90   426

    4280  Hoppy Crude Oil  421   110  536

    6600  Hazy Pink Cloud  424   16   32

    6600  Hazy Pink Cloud  426   16   16

    6600  Hazy Pink Cloud  425   24   56

    ```


    在与输出本身不同的顺序上应用分析功能，在很多情况下是一种有用的技术。


    **提示**


    图 11-6 的下半部分显示了快捷语法。当窗口是 `rows between` *something* `and current row` 时，你可以简单地使用
    `rows` *something*，它会默认使用 *something* 作为窗口的起始行，`current row` 作为结束行。在清单 11-4 中，我本可以用一行
    `rows unbounded preceding` 来替换第 8–9 行。我个人喜欢总是使用 `between` 语法，但你可以使用快捷方式。这只是语法上的差异，结果是相同的。


    当然，我可以在一次调用中结合所有三个子句，就像我在清单 11-5 中所做的那样。


    ```

    ...

    6   , sum(ol.qty) over (

    7        partition by ol.product_id

    8        order by ol.qty

    9        rows between unbounded preceding

    10                 and current row

    11     ) as p_qty

    ...

    清单 11-5

    结合分区、排序和窗口

    ```


    我在第 7 行按 `product_id` 分区，在第 8 行按 `qty` 排序，因此第 8–9 行的窗口为我提供了每种啤酒的累计 `sum`，输出很好地显示了这一点，因为我保持了通常的查询排序
    `product_id, qty`：


    ```

    P_ID  产品名称        O_ID  数量  P_QTY

    4280  Hoppy Crude Oil  423   60   60

    4280  Hoppy Crude Oil  427   60   120

    4280  Hoppy Crude Oil  422   80   200

    4280  Hoppy Crude Oil  429   80   280

    4280  Hoppy Crude Oil  428   90   370

    4280  Hoppy Crude Oil  421   110  480

    6600  Hazy Pink Cloud  424   16   16

    6600  Hazy Pink Cloud  426   16   32

    6600  Hazy Pink Cloud  425   24   56

    ```


    窗口功能非常方便，经常用于累计总和，但窗口可以比这灵活得多。

    '
- fmt: '## Flexibility of the window clause


    The running totals in the previous two listings was *up to and including current
    row*, which is quite normal. But the window does not need to include the current
    row, as I show in Listing 11-6 that calculates running total of all previous rows.


    ```sql

    ...

    6   , sum(ol.qty) over (

    7        partition by ol.product_id

    8        order by ol.qty

    9        rows between unbounded preceding

    10                 and 1 preceding

    11     ) as p_qty

    ...

    ```


    **Listing 11-6**

    Window with all previous rows


    In line 10, I replaced the `current row` with `1 preceding`, meaning the window
    is all rows *up to and including the row just before the current row*:


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60

    4280  Hoppy Crude Oil  427   60   60

    4280  Hoppy Crude Oil  422   80   120

    4280  Hoppy Crude Oil  429   80   200

    4280  Hoppy Crude Oil  428   90   280

    4280  Hoppy Crude Oil  421   110  370

    6600  Hazy Pink Cloud  424   16

    6600  Hazy Pink Cloud  426   16   16

    6600  Hazy Pink Cloud  425   24   32

    ```


    You’ll notice that means that `p_qty` is `null` on the first row of each partition,
    since there are no preceding rows at that point.


    Windows can also look *ahead* in the data rather than just look at the preceding
    rows. I can change the window specification of Listing 11-6 to a window starting
    at the current row and including all the following rows in the partition:


    ```sql

    ...

    9        rows between current row

    10                 and unbounded following

    ...

    ```


    That gives me a reversed running total:


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   480

    4280  Hoppy Crude Oil  427   60   420

    4280  Hoppy Crude Oil  422   80   360

    4280  Hoppy Crude Oil  429   80   280

    4280  Hoppy Crude Oil  428   90   200

    4280  Hoppy Crude Oil  421   110  110

    6600  Hazy Pink Cloud  424   16   56

    6600  Hazy Pink Cloud  426   16   40

    6600  Hazy Pink Cloud  425   24   24

    ```


    Again I do not only need to include the current row; I can also do a window of
    all rows *yet to come*:


    ```sql

    ...

    9        rows between 1 following

    10                 and unbounded following

    ...

    ```


    The `null` value at the end of each partition indicates there are no rows following:


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   420

    4280  Hoppy Crude Oil  427   60   360

    4280  Hoppy Crude Oil  422   80   280

    4280  Hoppy Crude Oil  429   80   200

    4280  Hoppy Crude Oil  428   90   110

    4280  Hoppy Crude Oil  421   110

    6600  Hazy Pink Cloud  424   16   40

    6600  Hazy Pink Cloud  426   16   24

    6600  Hazy Pink Cloud  425   24

    ```


    I can give the window bounds in both ends to sum, for example, the values from
    the previous row, the current row, and the following row:


    ```sql

    ...

    9        rows between 1 preceding

    10                 and 1 following

    ...

    ```


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   120

    4280  Hoppy Crude Oil  427   60   200

    4280  Hoppy Crude Oil  422   80   220

    4280  Hoppy Crude Oil  429   80   250

    4280  Hoppy Crude Oil  428   90   280

    4280  Hoppy Crude Oil  421   110  200

    6600  Hazy Pink Cloud  424   16   32

    6600  Hazy Pink Cloud  426   16   56

    6600  Hazy Pink Cloud  425   24   40

    ```


    Or I can make a window that is unbounded in both ends:


    ```sql

    ...

    9        rows between unbounded preceding

    10                 and unbounded following

    ...

    ```


    But this makes little sense, as the totally unbounded window is the entire partition,
    which means that the `order by` clause actually does not make a difference to
    the output, which is the same as I got from Listing 11-3 that had no `order by`
    and no windowing clause:


    ```

    P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY

    4280  Hoppy Crude Oil  423   60   480

    4280  Hoppy Crude Oil  427   60   480

    4280  Hoppy Crude Oil  422   80   480

    4280  Hoppy Crude Oil  429   80   480

    4280  Hoppy Crude Oil  428   90   480

    4280  Hoppy Crude Oil  421   110  480

    6600  Hazy Pink Cloud  424   16   56

    6600  Hazy Pink Cloud  426   16   56

    6600  Hazy Pink Cloud  425   24   56

    ```


    So for the completely unbounded window, I recommend just skipping `order by` and
    windowing clause.


    In the syntax diagram, you saw that a window could be specified using either `rows
    between` or `range between`. As I gave several examples of, a `rows between` window
    is determined by a number of rows before or after the current row. It is different
    with `range between`.'
