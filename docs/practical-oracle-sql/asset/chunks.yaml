    \n分析函数和模式匹配的一大优势在于，我可以为逻辑和最终输出使用不同的 `order by` 子句。因此，我可以尝试将第 13 行 `match_recognize`\
    \ 中的 `order by` 改为按 `qty` 降序排列（然后仅使用地点作为平局决胜项）。\n\n为了更容易验证输出，我还将第 25 行的最终 `order\
    \ by` 改为相同顺序（在制作装箱清单时，我随时可以将其改回按地点排序）：\n\n```\n...\n12  match_recognize (\n13\
    \     order by qty desc, wh, aisle, pos\n...\n24  )\n25  order by qty desc, wh,\
    \ aisle, pos;\n```\n\n我得到了一个与之前截然不同的装箱结果：\n\n```\nWH  AISLE  POS  QTY  RUN_QTY\
    \  BOX#  BOX_QTY\n2   A      1    72   72       1     72\n1   C      5    70 \
    \  70       2     70\n1   A      16   48   48       3     48\n1   D      19  \
    \ 48   48       4     48\n1   B      32   43   43       5     69\n2   D      9\
    \    26   69       5     69\n2   B      26   24   24       6     65\n2   C   \
    \   31   21   45       6     65\n1   C      13   20   65       6     65\n1   A\
    \      29   14   14       7     28\n2   B      5    14   28       7     28\n```\n\
    \n但这并没有真正变得更优化，因为我仍然使用了七个箱子。事实上，这甚至可以被认为稍微差了一些，因为在这里我甚至无法将填充最少的两个箱子合并在一起，因为 `28\
    \ + 48` 会超过 72。\n\n有各种各样的近似算法可以或多或少地接近最优解。我创建了一个相当简化的改进首次适应递减算法版本。我的简单算法是这样工作的：\n\
    \n*   首先，任何大于箱子容量三分之二的数量都被直接分配到单独的箱子。（任何可能“填补空隙”的小数量也很可能装入剩余的箱子，因此作为近似，偏差不会太大。）\n\
    \n*   然后，我以交错的方式对剩余的数量进行排序：\n    *   首先，最大的\n    *   然后，最小的\n    *   然后，第二大的\n\
    \    *   然后，第二小的\n    *   依此类推\n\n*   然后我像之前一样装箱，但使用这个排序后的顺序，这样交错的大/小排序就有很大机会在箱子里形成能匹配在一起的一对。\n\
    \n这个简单的近似算法在清单 21-3 中实现。\n\n```\nSQL> select wh, aisle, pos, qty, run_qty, box#,\
    \ box_qty\n2       , prio ,rn\n3  from (\n4     select\n5        product_name\n\
    6      , warehouse as wh\n7      , aisle\n8      , position  as pos\n9      ,\
    \ qty\n10      , case when qty > 72*2/3 then 1 else 2 end prio\n11      , least(\n\
    12           row_number() over (\n13              partition by\n14           \
    \      case when qty > 72*2/3 then 1 else 2 end\n15              order by qty\n\
    16           )\n17         , row_number() over (\n18              partition by\n\
    19                 case when qty > 72*2/3 then 1 else 2 end\n20              order\
    \ by qty desc\n21           )\n22        ) rn\n23     from inventory_with_dims\n\
    24     where product_name = 'Der Helle Kumpel'\n25  ) iwd\n26  match_recognize\
    \ (\n27     order by prio, rn, qty desc, wh, aisle, pos\n28     measures\n29 \
    \       match_number()   as box#\n30      , running sum(qty) as run_qty\n31  \
    \    , final   sum(qty) as box_qty\n32     all rows per match\n33     pattern\
    \ (\n34        fits_in_box+\n35     )\n36     define\n37        fits_in_box as\
    \ sum(qty) <= 72\n38  )\n39  order by prio, rn, qty desc, wh, aisle, pos;\n清单\
    \ 21-3\n使用一种简单的最佳适应近似算法\n```\n"
- fmt: 'With this modified algorithm, I get to use just six boxes. The first two have
    just a single large quantity, the next three all have a pair of quantities (one
    medium, one small), and in the last box fit three middlish/smallish quantities:


    ```

    WH  AISLE  POS  QTY  RUN_QTY  BOX#  BOX_QTY  PRIO  RN

    2   A      1    72   72       1     72       1     1

    1   C      5    70   70       2     70       1     1

    1   A      16   48   48       3     62       2     1

    1   A      29   14   62       3     62       2     1

    1   D      19   48   48       4     62       2     2

    2   B      5    14   62       4     62       2     2

    1   B      32   43   43       5     63       2     3

    1   C      13   20   63       5     63       2     3

    2   D      9    26   26       6     71       2     4

    2   C      31   21   47       6     71       2     4

    2   B      26   24   71       6     71       2     5

    ```


    This algorithm is by no means the most optimal in all cases. I suggest you try
    out several methods for your specific use cases. But the most near-optimal algorithms
    can easily be harder to implement (perhaps almost impossible to implement in SQL,
    requiring procedural code) and use more CPU, so it will probably be a matter of
    a trade-off between a simple perhaps-good-enough algorithm like this and a very-good-but-too-slow
    algorithm.


    Using the Der Helle Kumpel beer as example, I am now ready in Listing [21-4](#475066_1_En_21_Chapter.xhtml#PC9)
    to expand the algorithm to pack all beers in the warehouse.


    ```

    SQL> select product_id

    2       , wh, aisle, pos, qty, run_qty, box#, box_qty

    3  from (

    4     select

    5        product_id

    6      , product_name

    7      , warehouse as wh

    8      , aisle

    9      , position  as pos

    10      , qty

    11      , case when qty > 72*2/3 then 1 else 2 end prio

    12      , least(

    13           row_number() over (

    14              partition by

    15                 product_id

    16               , case when qty > 72*2/3 then 1 else 2 end

    17              order by qty

    18           )

    19         , row_number() over (

    20              partition by

    21                 product_id

    22               , case when qty > 72*2/3 then 1 else 2 end

    23              order by qty desc

    24           )

    25        ) rn

    26     from inventory_with_dims

    27  ) iwd

    28  match_recognize (

    29     partition by product_id

    30     order by prio, rn, qty desc, wh, aisle, pos

    31     measures

    32        match_number()   as box#

    33      , running sum(qty) as run_qty

    34      , final   sum(qty) as box_qty

    35     all rows per match

    36     pattern (

    37        fits_in_box+

    38     )

    39     define

    40        fits_in_box as sum(qty) <= 72

    41  )

    42  order by product_id, prio, rn, qty desc, wh, aisle, pos;

    Listing 21-4

    Using partition by to bin fit all products

    ```


    Basically it’s the same thing, but I include `product_id` in the inline view in
    line 5, so that I can use it to do `partition by` in line 29. That gives me an
    output that bin fits all the beers:


    ```

    PRODUCT_ID  WH  AISLE  POS  QTY  RUN_QTY  BOX#  BOX_QTY

    4040        1   A      13   48   48       1     51

    4040        1   C      10   3    51       1     51

    4040        2   C      28   48   48       2     53

    4040        1   A      25   5    53       2     53

    ...

    7950        2   B      25   48   48       10    48

    7950        1   C      24   42   42       11    42

    7950        2   C      5    44   44       12    44

    113 rows selected.

    ```


    Note that since I use `match_number()` for the `box#` column, the box numbering
    restarts for each product; it is not a unique box number throughout the output.
    If I need that, then I need to add, for example, a `dense_rank() over (order by
    product_id, box#)` to the select list.


    Listing [21-4](#475066_1_En_21_Chapter.xhtml#PC9) gave me details about which
    quantities to put in which box by using `all rows per match`. I can also get just
    the quantity of each box along with how many locations have been packed together
    by using `one row per match` in Listing [21-5](#475066_1_En_21_Chapter.xhtml#PC11).


    ```

    SQL> select product_id, product_name, box#, box_qty, locs

    2  from (

    ...

    26  ) iwd

    27  match_recognize (

    28     partition by product_id

    29     order by prio, rn, qty desc, wh, aisle, pos

    30     measures

    31        max(product_name) as product_name

    32      , match_number()    as box#

    33      , final sum(qty)    as box_qty

    34      , final count(*)    as locs

    35     one row per match

    36     pattern (

    37        fits_in_box+

    38     )

    39     define

    40        fits_in_box as sum(qty) <= 72

    41  )

    42  order by product_id, box#;

    Listing 21-5

    Getting a single output row for each box

    ```


