  trans: '

    ### 同一子查询的多次使用


    如清单 3-5 所示的做法可能会引发的一个问题是，我可能会计算所有产品的年度销售额，而实际上我只需要计算一半产品。根据代码的编写方式，优化器可能足够智能，能够判断直接为所有产品计算是否最快，或者将谓词推入子查询、仅为所需的那部分产品计算是否更快。


    有时，无法让查询自动推入谓词。在这种情况下，我可以按照清单 3-6 所示的方法，强制它只为所需的产品计算年度销售额。


    ```

    SQL> with product_alc_class as (

    ...

    8  ), yearly_sales as (

    ...

    16     from monthly_sales ms

    17     where ms.product_id in (

    18        select pac.product_id

    19        from product_alc_class pac

    20        where pac.alc_class = 1

    21     )

    ...

    25  )

    26  select

    ...

    31  from product_alc_class pac

    32  join yearly_sales ys

    33     on ys.product_id = pac.product_id

    34  where ys.yr_qty > ys.avg_yr

    35  order by p_id, yr;

    清单 3-6

    在多个地方查询同一个子查询

    ```


    清单 3-6 与清单 3-5 几乎完全相同。但我添加了第 17-21 行，使得`yearly_sales`仅针对在名为`product_alc_class`的子查询中找到的那些产品进行计算。即便如此，我仍然在主查询的连接中使用了`product_alc_class`（第
    31 行）——这是允许的，因为命名子查询可以在代码中多次使用。


    但由于`yearly_sales`现在已经被预过滤，只返回`alc_class = 1`的产品数据，我就不再需要在最终的`where`子句（第 34 行）中使用这个过滤条件了——我仍然能得到与前三份清单相同的输出。


    **注意**


    严格来说，在清单 3-6 的这个特定案例中，我可以避免在主查询中连接`product_alc_class`，因为我本可以在`select`列表中查询`ys.product_id`而不是`pac.product_id`。但是，如果`product_alc_class`中有更多我需要在输出中包含的列，那么重复使用这个命名子查询就是必要的。


    像这样在`with`子句中提取子查询的一个巨大好处是，优化器可以根据其判断的最低成本，以两种不同方式之一来处理它们：

    它可以将它们视同为视图，这意味着命名子查询的 SQL 基本上会在每次被查询的地方进行替换。

    它也可以选择*仅执行一次*命名子查询的 SQL，将结果存储到它动态创建的临时表中，然后在每次查询该命名子查询时访问这个临时表。


    `with`子句赋予了优化器这种选择权，并且（就像所有涉及优化器的情况一样）它通常会做出正确的选择，但有时也可能做出错误的选择。


    为了测试优化器采用第二种方法是否是个好主意，我可以在清单 3-6 的第 2 行添加*未公开文档的*提示`/*+ materialize */`，如下所示：


    ```

    SQL> with product_alc_class as (

    2     select /*+ materialize */

    3        pa.product_id

    ...

    ```


    有了这个提示，我强制优化器选择执行`temp table transformation`并`load as select`的访问方法，如图 3-2 所示。


    ![../images/475066_1_En_3_Chapter/475066_1_En_3_Fig2_HTML.jpg](img/475066_1_En_3_Fig2_HTML.jpg)


    ### 图 3-2


    执行计划显示临时表的创建和使用


    执行计划中嵌套在`load as select`下的操作是`product_alc_class`命名子查询的执行，其结果随后被存储到动态创建的、被赋予`sys_temp_*`名称的临时表中。然后，在执行计划的后续部分，这个临时表会被访问两次。


    `/*+ materialize */`提示非常适合用于测试，以弄清楚你是否真的希望优化器以这种方式操作。如果你发现确实如此，但优化器却（在*你*看来是错误地）选择将你的命名子查询当作视图来处理而不是物化它，那么你可能会想在生产代码中也使用这个提示。这是一个我无法推荐的想法。


    你使用该提示很可能是安全的，甚至非常安全，但在生产代码中使用未公开文档的提示是*绝对*强烈不鼓励的。你无法从 Oracle 获得任何保证它会一直存在——它可能在下一次升级时毫无预警地消失。那么，你可以使用另一种方法来强制物化：


    ```

    SQL> with product_alc_class as (

    2     select

    3        pa.product_id

    4      , ntile(2) over (

    5           order by pa.abv, pa.product_id

    6        ) as alc_class

    7     from product_alcohol pa

    8     where rownum >= 1

    9  ), yearly_sales as (

    ...

    ```


    在清单 3-6 的这个版本中，我移除了`/*+ materialize */`提示，但添加了第 8 行。一个对`rownum`的过滤子句（其求值结果总是为真）同样使得优化器有必要物化`product_alc_class`命名子查询的结果。


    使用`where rownum >= 1`或以其他方式引用`rownum`是一个防止视图合并的经典技巧。它之所以有效，是因为在执行视图合并和不合并时，分配给`rownum`伪列的值很容易变得不同。优化器不能允许自己执行一个可能改变查询结果的优化操作，因此在使用`rownum`时，它不能允许视图合并。所以它必须选择物化。此机制对`with`子句以及内联或存储视图都有效。

    '
- fmt: '### Listing column names


    到目前为止，我的所有 `with` 子句都包含依赖于列别名来指定在查询命名子查询时可用列的子查询。


    但我说过，这很像定义一个“局部视图”，你可能还记得，在 `create view` 语句中，你可以选择是*显式*提供列名列表，还是*隐式*让列获取查询列别名的名称。在
    `with` 子句中，你也可以这两种方式都做。


    **注意**


    在最初支持 `with` 子句的数据库版本中，隐式列命名是唯一的方式。在 11.1 版本中，`with` 子句被扩展以允许*递归*子查询分解（这是后续章节的一个主题），其中显式的列列表是强制性的。但显式的列列表也可以在一般情况下使用；它不仅限于递归子查询分解。


    列表 [3-4](#475066_1_En_3_Chapter.xhtml#PC7)、[3-5](#475066_1_En_3_Chapter.xhtml#PC8)
    和 [3-6](#475066_1_En_3_Chapter.xhtml#PC9) 都使用了来自列别名的隐式列命名——在列表 [3-7](#475066_1_En_3_Chapter.xhtml#PC12)
    中，我展示了列表 [3-6](#475066_1_En_3_Chapter.xhtml#PC9) 的一个重写版本，它使用了显式的列名列表。


    ```sql

    SQL> with product_alc_class (

    2     product_id, alc_class

    3  ) as (

    4     select

    5        pa.product_id

    6      , ntile(2) over (

    7           order by pa.abv, pa.product_id

    8        )

    9     from product_alcohol pa

    10  ), yearly_sales (

    11     product_id, yr, yr_qty, avg_yr

    12  ) as (

    13     select

    14        ms.product_id

    15      , extract(year from ms.mth)

    16      , sum(ms.qty)

    17      , avg(sum(ms.qty)) over (

    18           partition by ms.product_id

    19        )

    20     from monthly_sales ms

    21     where ms.product_id in (

    22        select pac.product_id

    23        from product_alc_class pac

    24        where pac.alc_class = 1

    25     )

    26     group by

    27        ms.product_id

    28      , extract(year from ms.mth)

    29  )

    30  select

    31     pac.product_id as p_id

    32   , ys.yr

    33   , ys.yr_qty

    34   , round(ys.avg_yr) as avg_yr

    35  from product_alc_class pac

    36  join yearly_sales ys

    37     on ys.product_id = pac.product_id

    38  where ys.yr_qty > ys.avg_yr

    39  order by p_id, yr;

    Listing 3-7

    指定列名列表而非列别名

    ```


    对于我在 `with` 子句中的每个命名子查询，我在查询名和 `as` 关键字之间插入一组带有列名列表的圆括号（第 1-3 行和第 10-12 行）。这会覆盖子查询本身返回的任何列名和/或别名——我甚至不需要提供列别名，正如你在第
    8 行和第 15-19 行看到的那样。


    这完全不会改变输出——从列表 [3-3](#475066_1_En_3_Chapter.xhtml#PC5) 到 [3-7](#475066_1_En_3_Chapter.xhtml#PC12)
    的所有列表都产生相同的输出。在许多类似的情况下，你不会看到使用显式的列名，尽管它确实能提高一点工作效率——当我在语句中编写后续子查询的代码并需要知道 `product_alc_class`
    命名子查询的哪些列可用时，简单地引用第 2 行的列表，而不是必须从可能很长很复杂的 `select` 列表代码中找出哪些是列名，是很方便的。


    但是，`with` 子句有一个常见的用途，其中显式的列列表极其方便——那就是通过从 `dual` 中选择来生成测试数据，如列表 [3-8](#475066_1_En_3_Chapter.xhtml#PC13)
    所示。


    ```sql

    SQL> with product_alcohol (

    2     product_id, sales_volume, abv

    3  ) as (

    4     /* Simulation of table product_alcohol */

    5     select 4040, 330, 4.5 from dual union all

    6     select 4160, 500, 7.0 from dual union all

    7     select 4280, 330, 8.0 from dual union all

    8     select 5310, 330, 4.0 from dual union all

    9     select 5430, 330, 8.5 from dual union all

    10     select 6520, 500, 6.5 from dual union all

    11     select 6600, 500, 5.0 from dual union all

    12     select 7790, 500, 4.5 from dual union all

    13     select 7870, 330, 6.5 from dual union all

    14     select 7950, 330, 6.0 from dual

    15  )

    16  /* Query to test with simulated data */

    17  select

    18     pa.product_id as p_id

    19   , p.name        as product_name

    20   , pa.abv

    21   , ntile(2) over (

    22        order by pa.abv, pa.product_id

    23     ) as alc_class

    24  from product_alcohol pa

    25  join products p

    26     on p.id = pa.product_id

    27  order by pa.abv, pa.product_id;

    Listing 3-8

    在 with 子句中使用测试数据“重载”一个表

    ```


    第 17-27 行与列表 [3-1](#475066_1_En_3_Chapter.xhtml#PC1) 相同。但我想测试这个查询在表的内容是其他情况下的输出。


    我不创建测试表并在查询中搜索替换以使用测试表的名称，而是在第 1-15 行使用 `with` 子句创建一个命名子查询，我给它起了与 `product_alcohol`
    表*相同的名称*。我在第 2 行提供了一个列名列表，然后我在第 5-14 行简单地重复从 `dual` 中 `select` 常量值。这样可读性更高，*无需*在数据列表中充斥大量列别名，如下所示：


    ```sql

    ...

    4     /* Simulation of table product_alcohol */

    5     select 4040 as product_id, 330 as sales_volume, 4.5 as abv from dual union
    all

    6     select 4160 as product_id, 500 as sales_volume, 7.0 as abv from dual union
    all

    ...

    ```


    通过这种方式，我可以轻松地使用测试数据获得查询的输出，而无需更改查询本身的表名：


    ```

    P_ID  PRODUCT_NAME      ABV  ALC_CLASS

    5310  Monks and Nuns    4    1

    4040  Coalminers Sweat  4.5  1

    7790  Summer in India   4.5  1

    6600  Hazy Pink Cloud   5    1

    7950  Pale Rider Rides  6    1

    6520  Der Helle Kumpel  6.5  2

    7870  Ghost of Hops     6.5  2

    4160  Reindeer Fuel     7    2

    4280  Hoppy Crude Oil   8    2

    5430  Hercule Trippel   8.5  2

    ```


    这种在 `with` 子句中包含测试数据的方法在你在互联网论坛上提问时也非常方便。如果帮助你的人可以直接执行包含数据等所有内容的查询，而无需创建表、填充数据*然后*尝试你的查询，这会让事情变得容易得多。当然，这并非适用于所有情况，但在很多时候都很好用。


    ## 经验教训


    `with` 子句还能做很多其他事情，我将在后面的章节中介绍其中的大部分。本章重点介绍如何使用它来模块化 SQL 语句，以便你可以：


    *   分而治之，将 SQL 拆分成更易于整体把握的片段。

    *   将每个命名子查询的代码视为一个单元，而不是使用嵌套的内联视图。

    *   在你的语句中多次从一个命名子查询中选择，可能临时物化结果，而不是多次查询基表。

    *   提供一个列名列表作为列别名的替代方案，特别是当使用 `dual` 生成测试数据时，以避免代码过度混乱。


    在学习过程式代码时，我们都被告知模块化是降低复杂性风险的关键——在 SQL 中也是如此。`with` 子句确实是本地模块化 SQL 语句的一个*非常*好的工具，适用于那些比简单的双表连接稍微复杂一些的语句。'
  raw: '### Listing column names


    So far all my `with` clauses have contained subqueries that depended on column
    aliases to specify the column names available when querying the named subqueries.


    But I’ve said that this is a lot like defining a “local view,” and you might recall
    that in the `create view` statement, you can choose between *explicitly* providing
    a list of column names and *implicitly* letting the columns get the names of the
    query column aliases. In the `with` clause, you can also do both.


    Note


    In the first database versions that supported the `with` clause, the implicit
    column naming was the only way to do it. In version 11.1 the `with` clause was
    expanded to allow *recursive* subquery factoring (a topic of a later chapter)
    in which the explicit column list is mandatory. But the explicit column list can
    also be used in general; it is not restricted to only recursive subquery factoring.


    Listings [3-4](#475066_1_En_3_Chapter.xhtml#PC7), [3-5](#475066_1_En_3_Chapter.xhtml#PC8),
    and [3-6](#475066_1_En_3_Chapter.xhtml#PC9) all use implicit column naming from
    column aliases – in Listing [3-7](#475066_1_En_3_Chapter.xhtml#PC12), I show a
    rewrite of Listing [3-6](#475066_1_En_3_Chapter.xhtml#PC9) that uses explicit
    lists of column names instead.


    ```

    SQL> with product_alc_class (

    2     product_id, alc_class

    3  ) as (

    4     select

    5        pa.product_id

    6      , ntile(2) over (

    7           order by pa.abv, pa.product_id

    8        )

    9     from product_alcohol pa

    10  ), yearly_sales (

    11     product_id, yr, yr_qty, avg_yr

    12  ) as (

    13     select

    14        ms.product_id

    15      , extract(year from ms.mth)

    16      , sum(ms.qty)

    17      , avg(sum(ms.qty)) over (

    18           partition by ms.product_id

    19        )

    20     from monthly_sales ms

    21     where ms.product_id in (

    22        select pac.product_id

    23        from product_alc_class pac

    24        where pac.alc_class = 1

    25     )

    26     group by

    27        ms.product_id

    28      , extract(year from ms.mth)

    29  )

    30  select

    31     pac.product_id as p_id

    32   , ys.yr

    33   , ys.yr_qty

    34   , round(ys.avg_yr) as avg_yr

    35  from product_alc_class pac

    36  join yearly_sales ys

    37     on ys.product_id = pac.product_id

    38  where ys.yr_qty > ys.avg_yr

    39  order by p_id, yr;

    Listing 3-7

    Specifying column names list instead of column aliases

    ```


    For each of my named subqueries in the `with` clause, I insert between the query
    name and the `as` keyword a set of parentheses with a list of column names (lines
    1–3 and lines 10–12). This overrules whatever column names and/or aliases returned
    by the subqueries themselves – I do not even have to provide column aliases, as
    you can see in line 8 and lines 15–19.


    It does not change the output a bit – all listings from Listings [3-3](#475066_1_En_3_Chapter.xhtml#PC5)
    to [3-7](#475066_1_En_3_Chapter.xhtml#PC12) produce the same output. And in many
    cases like this, you will not see an explicit column name used, though it can
    improve productivity a bit – when I do the coding of a subsequent subquery in
    the statement and need to know which columns of the `product_alc_class` named
    subquery are available, it is nice to simply refer to the list in line 2 rather
    than having to spot what are column names in the code of the `select` list (that
    might be long and convoluted).


    But there’s one common use of the `with` clause where the explicit column list
    is extremely handy – that is, for producing test data by selecting from `dual`
    like in Listing [3-8](#475066_1_En_3_Chapter.xhtml#PC13).


    ```

    SQL> with product_alcohol (

    2     product_id, sales_volume, abv

    3  ) as (

    4     /* Simulation of table product_alcohol */

    5     select 4040, 330, 4.5 from dual union all

    6     select 4160, 500, 7.0 from dual union all

    7     select 4280, 330, 8.0 from dual union all

    8     select 5310, 330, 4.0 from dual union all

    9     select 5430, 330, 8.5 from dual union all

    10     select 6520, 500, 6.5 from dual union all

    11     select 6600, 500, 5.0 from dual union all

    12     select 7790, 500, 4.5 from dual union all

    13     select 7870, 330, 6.5 from dual union all

    14     select 7950, 330, 6.0 from dual

    15  )

    16  /* Query to test with simulated data */

    17  select

    18     pa.product_id as p_id

    19   , p.name        as product_name

    20   , pa.abv

    21   , ntile(2) over (

    22        order by pa.abv, pa.product_id

    23     ) as alc_class

    24  from product_alcohol pa

    25  join products p

    26     on p.id = pa.product_id

    27  order by pa.abv, pa.product_id;

    Listing 3-8

    “Overloading” a table with test data in a with clause

    ```


    Lines 17–27 are the same as Listing [3-1](#475066_1_En_3_Chapter.xhtml#PC1). But
    I want to test what this query would output *if* the content of the table was
    something else.


    Instead of creating a test table and doing a search-and-replace in my query to
    make it use the name of the test table, I use the `with` clause in lines 1–15
    to create a named subquery that I give the *same name* as the `product_alcohol`
    table. I provide a list of column names in line 2, and then I simply `select`
    constant values `from dual` repeatedly in lines 5–14\. It is much more readable
    *without* having a lot of column aliases cluttering the data list, like the following:


    ```

    ...

    4     /* Simulation of table product_alcohol */

    5     select 4040 as product_id, 330 as sales_volume, 4.5 as abv from dual union
    all

    6     select 4160 as product_id, 500 as sales_volume, 7.0 as abv from dual union
    all

    ...

    ```


    This way I can easily get output from my query using test data, but without changing
    table names in the query itself:


    ```

    P_ID  PRODUCT_NAME      ABV  ALC_CLASS

    5310  Monks and Nuns    4    1

    4040  Coalminers Sweat  4.5  1

    7790  Summer in India   4.5  1

    6600  Hazy Pink Cloud   5    1

    7950  Pale Rider Rides  6    1

    6520  Der Helle Kumpel  6.5  2

    7870  Ghost of Hops     6.5  2

    4160  Reindeer Fuel     7    2

    4280  Hoppy Crude Oil   8    2

    5430  Hercule Trippel   8.5  2

    ```


    This method of including test data in a `with` clause is also very handy when
    you ask a question on a forum on the Internet. It makes it a lot easier for people
    that try to help you, if they can simply execute the query containing data and
    all, instead of having to create a table, populate it, and *then* try your query.
    It is not applicable to all situations, of course, but very often it will do nicely.


    ## Lessons learned


    The `with` clause can do many other things too, much of which I’ll cover in later
    chapters. This chapter focused on using it for modularizing a SQL statement so
    you can


    *   Divide and conquer by having your SQL split into pieces, each easier to have
    an overview of.


    *   View the code of each named subquery as a unit, as opposed to using nested
    inline views.


    *   Select from a named subquery more than once in your statement, potentially
    materializing the result temporarily instead of querying the base tables multiple
    times.


    *   Provide column names as a list as alternative to column aliases, particularly
    to avoid excessive cluttering of the code when using dual for test data.


    When learning procedural code, we’ve all been taught that modularization is key
    to reduce dangers of complexity – it is no different in SQL. The `with` clause
    is a *very* nice tool indeed for local modularization of SQL statements that are
    just a bit more complex than a simple two-table join.'
