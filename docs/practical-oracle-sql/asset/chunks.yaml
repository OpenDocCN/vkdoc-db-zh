    according to set theory. In the practical life of a developer, it is often that
    we actually want to work with sets *including* duplicates, but the **set operators**
    default to working like set theory.


    And when you then add that the **multiset operators** default the other way around,
    confusion can easily abound. This chapter attempts to clear that confusion.


    ## Sets of beer


    In the schema for the Good Beer Trading Co, I have some views (shown in Figure
    [2-2](#475066_1_En_2_Chapter.xhtml#Fig2)) I can use to demonstrate the set operations.
    The two views `brewery_products` and `customer_order_products` are both joins
    of multiple tables, but for the purposes in this chapter, you can think of them
    as tables, and the internals of the views are irrelevant.


    ![../images/475066_1_En_2_Chapter/475066_1_En_2_Fig2_HTML.jpg](images/475066_1_En_2_Chapter/475066_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Two views for set examples and one for multiset examples


    View `brewery_products` simply shows which beers are purchased from which breweries.
    A product will be shown only once per brewery.


    View `customer_order_products` shows which beers are sold to which customers,
    but also includes how much was sold and when, so a product can be shown multiple
    times per customer.


    The last view `customer_order_products_obj` contains the same data as `customer_order_products`
    but aggregated, so there is only one row per customer containing a nested table
    column `product_coll` with the product id and name for each time that product
    has been sold to the customer. The creation of the nested table type and this
    view is shown in Listing [2-1](#475066_1_En_2_Chapter.xhtml#PC1).


    ```

    SQL> create or replace type id_name_type as object (

    2     id     integer

    3   , name   varchar2(20 char)

    4  );

    5  /

    Type ID_NAME_TYPE compiled

    SQL> create or replace type id_name_coll_type

    2     as table of id_name_type;

    3  /

    Type ID_NAME_COLL_TYPE compiled

    SQL> create or replace view customer_order_products_obj

    2  as

    3  select

    4     customer_id

    5   , max(customer_name) as customer_name

    6   , cast(

    7        collect(

    8           id_name_type(product_id, product_name)

    9           order by product_id

    10        )

    11        as id_name_coll_type

    12     ) as product_coll

    13  from customer_order_products

    14  group by customer_id;

    View CUSTOMER_ORDER_PRODUCTS_OBJ created.

    Listing 2-1

    Creating the types and view for the multiset examples

    ```


    With these views, I can show you the differences between **set** and **multiset**
    operators.


    ## Set operators


    I’m going to use just some of the data, so Listing [2-2](#475066_1_En_2_Chapter.xhtml#PC2)
    shows you the result of view `customer_order_products` for two customers.


    ```

    SQL> select

    2     customer_id as c_id, customer_name, ordered

    3   , product_id  as p_id, product_name, qty

    4  from customer_order_products

    5  where customer_id in (50042, 50741)

    6  order by customer_id, product_id;

    C_ID CUSTOMER_NAME   ORDERED     P_ID PRODUCT_NAME       QTY

    ------ --------------- ---------- ----- ----------------- ----

    50042 The White Hart  2019-01-15  4280 Hoppy Crude Oil    110

    50042 The White Hart  2019-03-22  4280 Hoppy Crude Oil     80

    50042 The White Hart  2019-03-02  4280 Hoppy Crude Oil     60

    50042 The White Hart  2019-03-22  5430 Hercule Trippel     40

    50042 The White Hart  2019-01-15  6520 Der Helle Kumpel   140

    50741 Hygge og Humle  2019-01-18  4280 Hoppy Crude Oil     60

    50741 Hygge og Humle  2019-03-12  4280 Hoppy Crude Oil     90

    50741 Hygge og Humle  2019-01-18  6520 Der Helle Kumpel    40

    50741 Hygge og Humle  2019-02-26  6520 Der Helle Kumpel    40

    50741 Hygge og Humle  2019-02-26  6600 Hazy Pink Cloud     16

    50741 Hygge og Humle  2019-03-29  7950 Pale Rider Rides    50

    50741 Hygge og Humle  2019-03-12  7950 Pale Rider Rides   100

    Listing 2-2

    Data for two customers and their orders

    ```


    In the same way, Listing [2-3](#475066_1_En_2_Chapter.xhtml#PC3) shows the output
    of view `brewery_products` for two breweries.


    ```

    SQL> select

    2     brewery_id as b_id, brewery_name

    3   , product_id as p_id, product_name

    4  from brewery_products

    5  where brewery_id in (518, 523)

    6  order by brewery_id, product_id;

    B_ID BREWERY_NAME        P_ID PRODUCT_NAME

    ------ ------------------ ----- -----------------

    518 Balthazar Brauerei  5310 Monks and Nuns

    518 Balthazar Brauerei  5430 Hercule Trippel

    518 Balthazar Brauerei  6520 Der Helle Kumpel

    523 Happy Hoppy Hippo   6600 Hazy Pink Cloud

    523 Happy Hoppy Hippo   7790 Summer in India

    523 Happy Hoppy Hippo   7870 Ghost of Hops

    Listing 2-3

    Data for two breweries and the products bought from them

    ```


    In set theory, a set has by definition unique values, a condition that `brewery_products`
    satisfies.


    But in practice in a database, you often don’t have unique values. If you look
    at the data in `customer_order_products`, it is unique when you include the `ordered`
    date and the `qty` value, but if you only look at product id and name per customer,
    it is *not* unique.


    This difference between real life and set theory is to a certain extent reflected
    in the set operators.'
  trans: '

    # 2. 集合操作中的陷阱


    SQL 与集合论关系相当密切，但在实际日常工作中，我认为许多开发者（包括我自己）并不太担心理论问题。也许正因如此，我见到集合操作符的使用通常比连接（join）要少得多。大多数情况下，使用连接就足够了，但偶尔，一个精心选择的集合操作符也能带来非常好的效果。


    但也许正因为我们不常使用集合操作符，我常常看到一些代码，开发者在不知不觉中就陷入了某些陷阱，特别是关于使用不同集合（distinct sets）或包含重复元素的集合（sets
    with duplicates）的问题。


    最常见的是，你看到集合操作会用维恩图（Venn diagrams）来说明，就像图 2-1（通常它们是水平排列的；我这里垂直展示，以便与本章后面使用的代码和图示相匹配）。发生了什么是一目了然的。


    ![../images/475066_1_En_2_Chapter/475066_1_En_2_Fig1_HTML.jpg](img/475066_1_En_2_Fig1_HTML.jpg)

    *图 2-1：三种集合操作的维恩图*


    但通常没有解释清楚的是，集合论原则上作用于*不同*的集合——即没有重复元素的集合。实际上，Oracle SQL 中的 `set` 函数会从嵌套表中移除重复项，根据集合论将其转换为一个真正的“集合”。在开发者的实际工作中，我们常常希望处理*包含*重复项的集合，但
    `集合操作符` 默认是按照集合论的方式工作的。


    而当你再考虑到 `多重集合操作符` 默认是以相反的方式工作时，混乱就很容易产生了。本章旨在澄清这种困惑。


    ## 啤酒集合


    在“好啤酒贸易公司”（Good Beer Trading Co）的模式中，我有一些视图（如图 2-2 所示）可用于演示集合操作。视图 `brewery_products`
    和 `customer_order_products` 都是多个表的连接，但就本章的目的而言，你可以将它们视为表，视图的内部结构并不重要。


    ![../images/475066_1_En_2_Chapter/475066_1_En_2_Fig2_HTML.jpg](img/475066_1_En_2_Fig2_HTML.jpg)

    *图 2-2：用于集合示例的两个视图和一个用于多重集合示例的视图*


    视图 `brewery_products` 简单地显示从哪些啤酒厂购买了哪些啤酒。对于每个啤酒厂，一个产品只会显示一次。


    视图 `customer_order_products` 显示哪些啤酒卖给了哪些客户，但也包含了销售数量和时间，因此对于每个客户，一个产品可能会显示多次。


    最后一个视图 `customer_order_products_obj` 包含与 `customer_order_products` 相同的数据，但已聚合，因此每个客户只有一行，其中包含一个嵌套表列
    `product_coll`，该列包含该产品每次售予该客户的时刻的产品 ID 和名称。创建嵌套表类型和此视图的语句如清单 2-1 所示。


    ```sql

    SQL> create or replace type id_name_type as object (

    2     id     integer

    3   , name   varchar2(20 char)

    4  );

    5  /

    类型 ID_NAME_TYPE 已编译

    SQL> create or replace type id_name_coll_type

    2     as table of id_name_type;

    3  /

    类型 ID_NAME_COLL_TYPE 已编译

    SQL> create or replace view customer_order_products_obj

    2  as

    3  select

    4     customer_id

    5   , max(customer_name) as customer_name

    6   , cast(

    7        collect(

    8           id_name_type(product_id, product_name)

    9           order by product_id

    10        )

    11        as id_name_coll_type

    12     ) as product_coll

    13  from customer_order_products

    14  group by customer_id;

    视图 CUSTOMER_ORDER_PRODUCTS_OBJ 已创建。

    ```

    *清单 2-1：为多重集示例创建类型和视图*


    使用这些视图，我可以向你展示 `set` 和 `multiset` 操作符之间的区别。


    ## 集合操作符


    我将只使用部分数据，因此清单 2-2 显示了视图 `customer_order_products` 针对两个客户的结果。


    ```sql

    SQL> select

    2     customer_id as c_id, customer_name, ordered

    3   , product_id  as p_id, product_name, qty

    4  from customer_order_products

    5  where customer_id in (50042, 50741)

    6  order by customer_id, product_id;

    C_ID 客户名称         订单日期      P_ID 产品名称           数量

    ------ --------------- ---------- ----- ----------------- ----

    50042 The White Hart  2019-01-15  4280 Hoppy Crude Oil    110

    50042 The White Hart  2019-03-22  4280 Hoppy Crude Oil     80

    50042 The White Hart  2019-03-02  4280 Hoppy Crude Oil     60

    50042 The White Hart  2019-03-22  5430 Hercule Trippel     40

    50042 The White Hart  2019-01-15  6520 Der Helle Kumpel   140

    50741 Hygge og Humle  2019-01-18  4280 Hoppy Crude Oil     60

    50741 Hygge og Humle  2019-03-12  4280 Hoppy Crude Oil     90

    50741 Hygge og Humle  2019-01-18  6520 Der Helle Kumpel    40

    50741 Hygge og Humle  2019-02-26  6520 Der Helle Kumpel    40

    50741 Hygge og Humle  2019-02-26  6600 Hazy Pink Cloud     16

    50741 Hygge og Humle  2019-03-29  7950 Pale Rider Rides    50

    50741 Hygge og Humle  2019-03-12  7950 Pale Rider Rides   100

    ```

    *清单 2-2：两个客户及其订单的数据*


    同样地，清单 2-3 显示了视图 `brewery_products` 针对两个啤酒厂的输出。


    ```sql

    SQL> select

    2     brewery_id as b_id, brewery_name

    3   , product_id as p_id, product_name

    4  from brewery_products

    5  where brewery_id in (518, 523)

    6  order by brewery_id, product_id;

    B_ID 啤酒厂名称          P_ID 产品名称

    ------ ------------------ ----- -----------------

    518 Balthazar Brauerei  5310 Monks and Nuns

    518 Balthazar Brauerei  5430 Hercule Trippel

    518 Balthazar Brauerei  6520 Der Helle Kumpel

    523 Happy Hoppy Hippo   6600 Hazy Pink Cloud

    523 Happy Hoppy Hippo   7790 Summer in India

    523 Happy Hoppy Hippo   7870 Ghost of Hops

    ```

    *清单 2-3：两个啤酒厂以及从它们那里购买的产品的数据*


    在集合论中，根据定义，一个集合的值是唯一的，`brewery_products` 满足这个条件。


    但在数据库的实际应用中，你常常没有唯一的值。如果你查看 `customer_order_products` 中的数据，当你包含 `ordered` 日期和
    `qty` 值时，它是唯一的，但如果你只看每个客户的产品 ID 和名称，它就*不是*唯一的。


    现实生活与集合论之间的这种差异，在某种程度上也反映在集合操作符上。

    '
- fmt: '# Set concatenation


    In the daily life of a developer, often I am not concerned with set theory, but
    merely wish to concatenate two sets of rows, in effect just appending one set
    of rows after the other. This I can do with `union all`, illustrated in Figure
    [2-3](#475066_1_En_2_Chapter.xhtml#Fig3).


    ![../images/475066_1_En_2_Chapter/475066_1_En_2_Fig3_HTML.jpg](images/475066_1_En_2_Chapter/475066_1_En_2_Fig3_HTML.jpg)

    *Figure 2-3: Union all simply appends one result set after another*


    Figure [2-3](#475066_1_En_2_Chapter.xhtml#Fig3) shows first seven rows of product
    names for customer `50741`, followed by three rows of product names for brewery
    `523`. Expressed as SQL, this is the code in Listing [2-4](#475066_1_En_2_Chapter.xhtml#PC4).


    ```sql

    SQL> select product_id as p_id, product_name

    2  from customer_order_products

    3  where customer_id = 50741

    4  union all

    5  select product_id as p_id, product_name

    6  from brewery_products

    7  where brewery_id = 523;

    Listing 2-4: Concatenating the results of two queries

    ```


    Simply two `select` statements are separated with `union all`, and the output
    is the two results one after the other:


    ```

    P_ID PRODUCT_NAME

    ----- -----------------

    4280 Hoppy Crude Oil

    4280 Hoppy Crude Oil

    6520 Der Helle Kumpel

    6520 Der Helle Kumpel

    6600 Hazy Pink Cloud

    7950 Pale Rider Rides

    7950 Pale Rider Rides

    6600 Hazy Pink Cloud

    7790 Summer in India

    7870 Ghost of Hops

    ```


    I selected only the two columns that exist in both views, which makes the output
    hard to see what rows come from which view. In Listing [2-5](#475066_1_En_2_Chapter.xhtml#PC6)
    I also select the customer id and name in the first `select`, but the brewery
    id and name in the second `select`.


    ```sql

    SQL> select

    2     customer_id as c_or_b_id, customer_name as c_or_b_name

    3   , product_id as p_id, product_name

    4  from customer_order_products

    5  where customer_id = 50741

    6  union all

    7  select

    8     brewery_id, brewery_name

    9   , product_id as p_id, product_name

    10  from brewery_products

    11  where brewery_id = 523;

    Listing 2-5: Different columns from the two queries

    ```


    Notice that in the first two columns, I give an alias in the first `select`, but
    not in the second. That does not matter, since it is the column names or aliases
    of the first `select` that are used:


    ```

    C_OR_B_ID C_OR_B_NAME         P_ID PRODUCT_NAME

    --------- ------------------ ----- -----------------

    50741 Hygge og Humle      4280 Hoppy Crude Oil

    50741 Hygge og Humle      4280 Hoppy Crude Oil

    50741 Hygge og Humle      6520 Der Helle Kumpel

    50741 Hygge og Humle      6520 Der Helle Kumpel

    50741 Hygge og Humle      6600 Hazy Pink Cloud

    50741 Hygge og Humle      7950 Pale Rider Rides

    50741 Hygge og Humle      7950 Pale Rider Rides

    523 Happy Hoppy Hippo   6600 Hazy Pink Cloud

    523 Happy Hoppy Hippo   7790 Summer in India

    523 Happy Hoppy Hippo   7870 Ghost of Hops

    ```


    A side effect of this is that if I have given a column an alias, then I cannot
    use the table column name in the `order by` clause. If I try to append an `order
    by` with the table column `product_id`, I get an error:


    ```

    ...

    12  order by product_id;

    Error starting at line : 1 in command -

    ...

    Error at Command Line : 12 Column : 10

    Error report -

    SQL Error: ORA-00904: "PRODUCT_ID": invalid identifier

    ```


    Instead I need to use the column alias `p_id` to get my desired ordering:


    ```

    12  order by p_id;

    C_OR_B_ID C_OR_B_NAME         P_ID PRODUCT_NAME

    --------- ------------------ ----- -----------------

    50741 Hygge og Humle      4280 Hoppy Crude Oil

    50741 Hygge og Humle      4280 Hoppy Crude Oil

    50741 Hygge og Humle      6520 Der Helle Kumpel

    50741 Hygge og Humle      6520 Der Helle Kumpel

    50741 Hygge og Humle      6600 Hazy Pink Cloud

    523 Happy Hoppy Hippo   6600 Hazy Pink Cloud

    523 Happy Hoppy Hippo   7790 Summer in India

    523 Happy Hoppy Hippo   7870 Ghost of Hops

    50741 Hygge og Humle      7950 Pale Rider Rides

    50741 Hygge og Humle      7950 Pale Rider Rides

    ```


    The `union all` is a very practical and often used set operator, but there are
    more.


    ## The three set operators


    Using the same data as before, Figure [2-4](#475066_1_En_2_Chapter.xhtml#Fig4)
    illustrates `union`, `intersect`, and `minus`.


    ![../images/475066_1_En_2_Chapter/475066_1_En_2_Fig4_HTML.jpg](images/475066_1_En_2_Chapter/475066_1_En_2_Fig4_HTML.jpg)

    *Figure 2-4: Union, intersect, and minus on distinct data*


    You may wonder why I show `union` as a different operator than `union all`?


    In reality it is just the `union` operator. It is one of the three operators `union`,
    `intersect`, and `minus`. All three work by design as set theory does: they work
    on sets with distinct values, so they implicitly remove all duplicates (illustrated
    by the grayed-out strike-through lines in Figure [2-4](#475066_1_En_2_Chapter.xhtml#Fig4)).
    The keyword `all` tells the `union` operator `not` to remove duplicates but to
    keep `all` rows.


    What I see a lot in code is unfortunately that `union` is often used where `union
    all` really is wanted. Also in many cases where the values are already distinct,
    a `union` unnecessarily performs an implicit distinct where a `union all` would
    avoid this overhead.


    So my rule of thumb is that it is almost always `union all` that a SQL developer
    needs in daily development. Only once in a while is `union` called for. Therefore,
    I tend to think of `union all` and `union` separately, as it helps me automatically
    distinguish between when I need one and when I need the other.


    Having delivered now my lecture that you most of the time need `union all`, Listing
    [2-6](#475066_1_En_2_Chapter.xhtml#PC10) shows you the code for implementing the
    set operations illustrated in Figure [2-4](#475066_1_En_2_Chapter.xhtml#Fig4).


    ```sql

    SQL> select product_id as p_id, product_name

    2  from customer_order_products

    3  where customer_id = 50741

    4  union

    5  select product_id as p_id, product_name

    6  from brewery_products

    7  where brewery_id = 523

    8  order by p_id;

    Listing 2-6: Union is a true set operation that implicitly performs a distinct
    of the query result

    ```


    Using `union` (`without` `all`) produces the distinct concatenation of the two
    sets:


    ```

    P_ID PRODUCT_NAME

    ----- -----------------

    4280 Hoppy Crude Oil

    6520 Der Helle Kumpel

    6600 Hazy Pink Cloud

    7790 Summer in India

    7870 Ghost of Hops

    7950 Pale Rider Rides

    ```


    And changing to `intersect` produces the distinct set of overlapping rows:


    ```

    ...

    4  intersect

    ...

    P_ID PRODUCT_NAME

    ----- -----------------

    6600 Hazy Pink Cloud

    ```


    Finally changing to `minus` produces the distinct set of the rows of the first
    select that are `not` in the second select:


    ```

    ...

    4  minus

    ...

    P_ID PRODUCT_NAME

    ----- -----------------

    4280 Hoppy Crude Oil

    6520 Der Helle Kumpel

    7950 Pale Rider Rides

    ```


    All straightforward, the important thing to remember is that these three operators
    `always` implicitly remove duplicates. Only by `union all` can you keep duplicates.
    (That will change in a future version of the database – see tip at the end of
    the chapter.)'
