    in lines 8–15 give me this output:


    ```

    URL          FROM_DAY    TO_DAY      DAYS  BEGIN  GROWTH  DAILY

    /Shop        2019-04-12  2019-04-15  4     5800   1039    259.75

    /Categories  2019-04-28  2019-04-28  1     4625   360     360

    ```


    That’s exactly those two abnormalities that I mentioned in the preceding text
    I could spot by eye on the graphs in Figure [20-2](#475066_1_En_20_Chapter.xhtml#Fig2).


    Note that since I did not specify any `running` or `final` in Listing [20-4](#475066_1_En_20_Chapter.xhtml#PC6),
    the output specifically works because I am using `one row per match` – had I been
    using `all rows per match`, most of the measures would have used `running` semantics
    and given me an output I probably didn’t want.


    But I can also be explicit and specify that I actually want it to use `final`
    semantics, that is, evaluate the expressions as of the last row of the match.
    This would mean changing the `measures` expressions in lines 8–15 this way:


    ```

    ...

    8        first(friendly_url) as url

    9      , first(day) as from_day

    10      , final last(day) as to_day

    11      , final count(*) as days

    12      , first(counter) as begin

    13      , next(final last(counter)) - first(counter) as growth

    14      , (next(final last(counter)) - first(counter))

    15           / final count(*) as daily

    ...

    ```


    It gives me the exact same output, but now I’d also get the same values calculated
    if I used `all rows per match`.


    Note


    As explained in the preceding text, using `next(counter)` in the `define` clause
    gets the value of the next midnight, so when I subtract the current value, I get
    the day’s growth. To get the *total* growth of the period in line 13, the `final
    last` goes to the last day of the match – applying `next` then gives me the counter
    value from the following midnight *even though it is outside the match*.


    I’ve now found growth peaks that exceeded a constant number, but the problem is
    that “at least 200” may be a good number for the most-visited pages, but is not
    appropriate for the least-visited pages.


    So in Listing [20-5](#475066_1_En_20_Chapter.xhtml#PC9), I do not look for absolute
    numbers, but rather a relative growth in percent.'
  trans: '## 计数器数据


    首先，通过清单 20-2，我将展示我的网站只有一个应用，其中包含四个页面。


    ```sql

    SQL> select

    2     p.app_id

    3   , a.name as app_name

    4   , p.page_no

    5   , p.friendly_url

    6  from web_apps a

    7  join web_pages p

    8     on p.app_id = a.id

    9  order by p.app_id, p.page_no;

    Listing 20-2

    我的网店应用中的页面

    ```


    该应用是网店，这四个页面各自拥有一个 `friendly_url`，因为对我们人类而言，使用 `/About` 要比使用 `/pls/apex/f?p=542:4::::::`
    更为友好。


    ```

    APP_ID  APP_NAME  PAGE_NO  FRIENDLY_URL

    542     Webshop   1        /Shop

    542     Webshop   2        /Categories

    542     Webshop   3        /Breweries

    542     Webshop   4        /About

    ```


    因此，我可以使用清单 20-3 来查看应用 `542` 中每个页面的计数器历史。


    ```sql

    SQL> select

    2     friendly_url, day, counter

    3  from web_page_counter_hist

    4  where app_id = 542

    5  order by page_no, day;

    Listing 20-3

    网页计数器历史数据

    ```


    我获得了 2019 年 4 月 30 天的递增计数器值：


    ```

    FRIENDLY_URL  DAY         COUNTER

    /Shop         2019-04-01  5010

    /Shop         2019-04-02  5088

    ...

    /Shop         2019-04-29  7755

    /Shop         2019-04-30  7833

    /Categories   2019-04-01  3397

    ...

    /Categories   2019-04-30  5033

    /Breweries    2019-04-01  1866

    ...

    /Breweries    2019-04-30  3115

    /About        2019-04-01  455

    ...

    /About        2019-04-30  586

    已选择 120 行。

    ```


    我在图 20-2 的图表中对这些数据进行了可视化。实际上，在这些图表上发现异常并不那么容易。我大体能看出顶部的线条在月中有一段加速期，第二条线在月末附近有一次短暂的爆发。但要真正找出这些点，我将求助于
    SQL。


    ![../images/475066_1_En_20_Chapter/475066_1_En_20_Fig2_HTML.jpg](img/475066_1_En_20_Fig2_HTML.jpg)


    图 20-2


    网页计数器历史数据


    由于我只有这一个应用，因此在本章的剩余部分，我简化了 SQL，不再到处使用 `where app_id = 542`。剩余代码的假设是基于单个应用。


    ### 原始计数器数据中的模式


    在这一组 `match_recognize` 示例中，我将使用前面图表中描绘的这些原始计数器数据。


    首先，我可以尝试简单地查找某个页面计数器每天增长至少达到一个常数的时段。在清单 20-4 中，我搜索计数器增长至少为 200 的情况。


    ```sql

    SQL> select

    2     url, from_day, to_day, days, begin, growth, daily

    3  from web_page_counter_hist

    4  match_recognize(

    5     partition by page_no

    6     order by day

    7     measures

    8        first(friendly_url) as url

    9      , first(day) as from_day

    10      , last(day) as to_day

    11      , count(*) as days

    12      , first(counter) as begin

    13      , next(counter) - first(counter) as growth

    14      , (next(counter) - first(counter)) / count(*)

    15           as daily

    16     one row per match

    17     after match skip past last row

    18     pattern ( peak+ )

    19     define

    20        peak as next(counter) - counter >= 200

    21  )

    22  order by page_no, from_day;

    Listing 20-4

    识别计数器每天增长至少 200 的日期

    ```


    在第 20 行的定义中，我指明了什么是 `peak`：它是指当天计数器增长至少 200 的一天。由于计数器值存储在午夜，因此一天内计数器的增长是 `next`
    值减去当前值。因此，任何满足此值大于等于 200 的行都被归类为 `peak` 行。


    第 18 行的 `pattern` 因此可以非常简单——我正在寻找被归类为 `peak` 行的一个或多个连续天数的时段。通过在第 16 行使用 `one row
    per match`，我每个时段仅输出一行。而第 8-15 行的 `measures` 计算给了我这样的输出：


    ```

    URL          FROM_DAY    TO_DAY      DAYS  BEGIN  GROWTH  DAILY

    /Shop        2019-04-12  2019-04-15  4     5800   1039    259.75

    /Categories  2019-04-28  2019-04-28  1     4625   360     360

    ```


    这正是我在前文提到的，通过肉眼在图 20-2 的图表上发现的两处异常。


    请注意，由于我在清单 20-4 中没有指定任何 `running` 或 `final`，因此输出能正常工作是因为我使用了 `one row per match`——如果我使用
    `all rows per match`，大多数度量值将会使用 `runing` 语义，并可能产生一个我不想要的输出。


    但我也可以明确地指定我希望它使用 `final` 语义，即根据匹配的最后一行来计算表达式。这意味着需要这样更改第 8-15 行的 `measures` 表达式：


    ```sql

    ...

    8        first(friendly_url) as url

    9      , first(day) as from_day

    10      , final last(day) as to_day

    11      , final count(*) as days

    12      , first(counter) as begin

    13      , next(final last(counter)) - first(counter) as growth

    14      , (next(final last(counter)) - first(counter))

    15           / final count(*) as daily

    ...

    ```


    这给了我完全相同的输出，但现在如果我使用 `all rows per match`，我也能得到相同的计算值。


    注


    如前所述，在 `define` 子句中使用 `next(counter)` 获取的是下一个午夜的值，因此当我减去当前值时，我得到的是当天的增长量。为了在第
    13 行获取该时段的*总*增长量，`final last` 会定位到匹配的最后一天——应用 `next` 则会给我下一个午夜的计数器值，*即使它位于匹配范围之外*。


    至此，我找到了超过常数的增长峰值，但问题在于，“至少 200”对于访问量最大的页面可能是个合适的数字，但对于访问量最小的页面却不适用。


    因此，在清单 20-5 中，我不再寻找绝对数值，而是查找百分比的相对增长。'
- fmt: '```

    SQL> select

    2     url, from_day, to_day, days, begin, pct, daily

    3  from web_page_counter_hist

    4  match_recognize(

    5     partition by page_no

    6     order by day

    7     measures

    8        first(friendly_url) as url

    9      , first(day) as from_day

    10      , final last(day) as to_day

    11      , final count(*) as days

    12      , first(counter) as begin

    13      , round(

    14           100 * (next(final last(counter)) / first(counter))

    15               - 100

    16         , 1

    17        ) as pct

    18      , round(

    19           (100 * (next(final last(counter)) / first(counter))

    20                    - 100) / final count(*)

    21         , 1

    22        ) as daily

    23     one row per match

    24     after match skip past last row

    25     pattern ( peak+ )

    26     define

    27        peak as next(counter) / counter >= 1.04

    28  )

    29  order by page_no, from_day;

    Listing 20-5

    Recognizing days where counter grew by at least 4%

    ```


    In line 27, I changed my definition of what is a `peak` row, so I do not look
    at the `difference` between the values of next and current midnight, but rather
    the `ratio`. If the next value is at least a `factor` 1.04 of the current value,
    the growth that day has been at least 4%, and the row is a peak row.


    I keep most of my `measures` expressions, but in lines 13–22, I change from showing
    absolute growth to showing the total growth and average daily growth in percent:


    ```

    URL          FROM_DAY    TO_DAY      DAYS  BEGIN  PCT  DAILY

    /Shop        2019-04-12  2019-04-14  3     5800   14   4.7

    /Categories  2019-04-28  2019-04-28  1     4625   7.8  7.8

    /Breweries   2019-04-17  2019-04-17  1     2484   6.6  6.6

    /About       2019-04-05  2019-04-05  1     468    4.9  4.9

    ```


    In Listing [20-5](#475066_1_En_20_Chapter.xhtml#PC9), I look for periods where
    the growth in every day of the period has been at least 4%. But I can change the
    definition in line 27 to a slightly more complex calculation:


    ```

    ...

    27        peak as ((next(counter) / first(counter)) - 1)

    28                   / running count(*)  >= 0.04

    ...

    ```


    With this formula, I look for periods where the average daily growth in the period
    has been at least 4%. The output shows me almost the same four matches, except
    that each of the first three periods is a little bit longer now, since some larger
    daily growths in the start of the periods mean that an extra day or two can be
    included in the end of the match. Even though those extra days individually have
    a growth less than 4%, the average in the period still stays at least 4%:


    ```

    URL          FROM_DAY    TO_DAY      DAYS  BEGIN  PCT   DAILY

    /Shop        2019-04-12  2019-04-16  5     5800   21.2  4.2

    /Categories  2019-04-28  2019-04-29  2     4625   8.8   4.4

    /Breweries   2019-04-17  2019-04-18  2     2484   8.4   4.2

    /About       2019-04-05  2019-04-05  1     468    4.9   4.9

    ```


    I’ve now shown looking for abnormal growth in terms of absolute or relative growth,
    but it might not be the best to do in this case. It might be better to look at
    daily visits.


    ## Looking at daily visits


    Some cases can usefully look for growth the ways I’ve shown in the preceding text,
    but when you think about it, maybe it isn’t such a good idea for this case. Over
    time the counter value will just keep on increasing, so when the counter value
    over the years become orders of magnitude larger, a 4% growth rate needs a lot
    more daily visitors to satisfy.


    So I’m going to try to look instead into how the daily visit counts behave. When
    you look at the data this way, it becomes clear that what I actually found in
    Listing [20-5](#475066_1_En_20_Chapter.xhtml#PC9) were periods where the daily
    visits were at least 4% of the counter value. That will unfortunately make the
    `same` daily visits give a high percentage in the start of the counter lifetime
    and a lower and lower percentage as time goes by and the counter increases.


    To create a better solution, first, I’ll use Listing [20-6](#475066_1_En_20_Chapter.xhtml#PC13)
    to just show the daily visits.


    ```

    SQL> select

    2     friendly_url, day

    3   , lead(counter) over (

    4        partition by page_no order by day

    5     ) - counter as visits

    6  from web_page_counter_hist

    7  order by page_no, day;

    Listing 20-6

    Focusing on daily visits

    ```


    The expression in lines 3–5 uses the `lead` analytic function to find the difference
    between the counter value next midnight and this midnight – same as I did before
    using `next` in the `match_recognize` syntax:


    ```

    FRIENDLY_URL  DAY         VISITS

    /Shop         2019-04-01  78

    /Shop         2019-04-02  72

    ...

    /Shop         2019-04-29  78

    /Shop         2019-04-30

    /Categories   2019-04-01  57

    ...

    /Categories   2019-04-29  48

    /Categories   2019-04-30

    /Breweries    2019-04-01  21

    ...

    /Breweries    2019-04-29  38

    /Breweries    2019-04-30

    /About        2019-04-01  4

    ...

    /About        2019-04-29  5

    /About        2019-04-30

    120 rows selected.

    ```


    And I visualize this output in Figure [20-3](#475066_1_En_20_Chapter.xhtml#Fig3).


    ![../images/475066_1_En_20_Chapter/475066_1_En_20_Fig3_HTML.jpg](images/475066_1_En_20_Chapter/475066_1_En_20_Fig3_HTML.jpg)


    Figure 20-3


    Graphing visits instead of counter highlights peaks


    On this graph, it is much easier to spot the peaks compared to the graph in Figure
    [20-2](#475066_1_En_20_Chapter.xhtml#Fig2). You can even see the small peaks on
    the lowest line – the `/About` page.


    Then I’ll proceed to finding patterns based on this graph.

