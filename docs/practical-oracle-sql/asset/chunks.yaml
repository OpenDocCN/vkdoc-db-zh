    1   A   29   6520  14      1      14     422   1      80

    2   B   5    6520  14      15     28     422   1      80

    1   C   13   6520  20      29     48     422   1      80

    2   B   26   6520  24      49     72     422   1      80

    2   D   9    6520  26      73     98     422   1      80

    2   D   9    6520  26      73     98     423   81     120

    1   A   16   6520  22      99     120    423   81     120

    ```


    In the first row, all 36 go to order 422. Likewise in the second row, all 39 go
    to order 422.


    But the next 35 picked are numbers 76-110 (out of 140), which overlaps both with
    order 422 (numbers 1-80) and order 423 (numbers 81-140). You can see from those
    overlaps that 5 of the 35 (numbers 76-80) should go to order 422 and the 30 of
    the 35 (numbers 81-110) should go to order 423.


    In Listing [13-15](#475066_1_En_13_Chapter.xhtml#PC35), I calculate this as well
    as clean up the query a bit to not show the intermediate calculation columns.


    ```

    SQL> with olines as (

    ...

    18  ), orderbatch as (

    ...

    24  ), fifo as (

    ...

    49  )

