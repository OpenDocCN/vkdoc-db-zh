  trans: '

    ## 低度啤酒的畅销年份


    The Good Beer Trading Co. 将他们的啤酒分为两部分——酒精度最低的一半被定义为酒精等级 1，而酒精度较高的另一半则为酒精等级 2。我在清单
    3-1 中查明了哪些属于哪个等级。


    ```sql

    SQL> select

    2     pa.product_id as p_id

    3   , p.name        as product_name

    4   , pa.abv

    5   , ntile(2) over (

    6        order by pa.abv, pa.product_id

    7     ) as alc_class

    8  from product_alcohol pa

    9  join products p

    10     on p.id = pa.product_id

    11  order by pa.abv, pa.product_id;

    清单 3-1

    将啤酒分为酒精等级 1 和 2

    ```


    在第 5-7 行中，分析函数 `ntile()` 将每一行分配到桶中——参数即为桶的数量。它将按照 `order by` 子句指定的顺序进行分配，并确保行数据尽可能均匀地分布。在这个包含十行的示例中，按
    `abv` 排序的前五行将被分配到桶 1，最后五行将被分配到桶 2：


    ```text

    P_ID  PRODUCT_NAME      ABV  ALC_CLASS

    6600  Hazy Pink Cloud   4    1

    6520  Der Helle Kumpel  4.5  1

    7870  Ghost of Hops     4.5  1

    5310  Monks and Nuns    5    1

    7950  Pale Rider Rides  5    1

    7790  Summer in India   5.5  2

    4160  Reindeer Fuel     6    2

    5430  Hercule Trippel   6.5  2

    4280  Hoppy Crude Oil   7    2

    4040  Coalminers Sweat  8.5  2

    ```


    因此，在清单 3-2 中，我可以只选取 `alc_class` 值为 1 的啤酒，将它们连接到 `monthly_sales` 表，并进行聚合以显示年度销售数据。


    ```sql

    SQL> select

    2     pac.product_id as p_id

    3   , extract(year from ms.mth) as yr

    4   , sum(ms.qty) as yr_qty

    5  from (

    6     select

    7        pa.product_id

    8      , ntile(2) over (

    9           order by pa.abv, pa.product_id

    10        ) as alc_class

    11     from product_alcohol pa

    12  ) pac

    13  join monthly_sales ms

    14     on ms.product_id = pac.product_id

    15  where pac.alc_class = 1

    16  group by

    17     pac.product_id

    18   , extract(year from ms.mth)

    19  order by p_id, yr;

    清单 3-2

    查看酒精等级 1 啤酒的年度销售额

    ```


    由于分析函数不能在 `where` 子句中使用，我需要在第 6-11 行的内联视图中放置 `ntile()` 计算。在第 15 行，我只保留 `alc_class
    = 1` 的记录。其余部分是一个标准的内连接 (`inner join`) 和一个 `group by` 子句，输出每种啤酒三年的销售数据：


    ```text

    P_ID  YR    YR_QTY

    5310  2016  478

    5310  2017  582

    5310  2018  425

    6520  2016  415

    6520  2017  458

    6520  2018  357

    6600  2016  121

    6600  2017  105

    6600  2018  98

    7870  2016  552

    7870  2017  482

    7870  2018  451

    7950  2016  182

    7950  2017  210

    7950  2018  491

    ```


    目前为止一切顺利，现在我在该语句的基础上进一步构建。因此，在清单 3-3 中，我可以只找出那些特定啤酒的年销售额超过其自身年平均销售额的年份。


    ```sql

    SQL> select

    2     p_id, yr, yr_qty

    3   , round(avg_yr) as avg_yr

    4  from (

    5     select

    6        pac.product_id as p_id

    7      , extract(year from ms.mth) as yr

    8      , sum(ms.qty) as yr_qty

    9      , avg(sum(ms.qty)) over (

    10           partition by pac.product_id

    11        ) as avg_yr

    12     from (

    13        select

    14           pa.product_id

    15         , ntile(2) over (

    16              order by pa.abv, pa.product_id

    17           ) as alc_class

    18        from product_alcohol pa

    19     ) pac

    20     join monthly_sales ms

    21        on ms.product_id = pac.product_id

    22     where pac.alc_class = 1

    23     group by

    24        pac.product_id

    25      , extract(year from ms.mth)

    26  )

    27  where yr_qty > avg_yr

    28  order by p_id, yr;

    清单 3-3

    仅查看每种啤酒销售额高于其年平均销售额的年份

    ```


    清单 3-3 中的代码，我将其放入第 5-25 行的内联视图中，并添加了第 9-11 行，在这里我使用 `avg()` 函数的分析版本来计算每种啤酒的年平均销售额。这使我能够在第
    27 行仅保留那些销售额大于年平均销售额的年份：


    ```text

    P_ID  YR    YR_QTY  AVG_YR

    5310  2017  582     495

    6520  2016  415     410

    6520  2017  458     410

    6600  2016  121     108

    7870  2016  552     495

    7950  2018  491     294

    ```


    清单 3-3 中的查询本身并没有错，但你可以看到，每增加一个内联视图，语句就变得更复杂、更难以阅读。缩进对于跟踪哪个 `select` 列表属于哪个 `join`
    和 `where` 子句至关重要。如果语句再稍微大一点，你就无法不滚动屏幕而同时看到 `select` 列表和 `where` 子句了。


    这正是 `with` 子句的用武之地。

    '
- fmt: '## Modularization using the with clause


    The `with` clause allows me to put subqueries at the top of the query, giving
    them a name, and use them in other places just as if they were views — you can
    think of it like refactoring in procedural programming, hence the name *subquery
    factoring*. In Listing [3-4](#475066_1_En_3_Chapter.xhtml#PC7), I refactor Listing
    [3-3](#475066_1_En_3_Chapter.xhtml#PC5) to use named subqueries in the `with`
    clause instead of inline views.


    ```sql

    SQL> with product_alc_class as (

    2     select

    3        pa.product_id

    4      , ntile(2) over (

    5           order by pa.abv, pa.product_id

    6        ) as alc_class

    7     from product_alcohol pa

    8  ), class_one_yearly_sales as (

    9     select

    10        pac.product_id as p_id

    11      , extract(year from ms.mth) as yr

    12      , sum(ms.qty) as yr_qty

    13      , avg(sum(ms.qty)) over (

    14           partition by pac.product_id

    15        ) as avg_yr

    16     from product_alc_class pac

    17     join monthly_sales ms

    18        on ms.product_id = pac.product_id

    19     where pac.alc_class = 1

    20     group by

    21        pac.product_id

    22      , extract(year from ms.mth)

    23  )

    24  select

    25     p_id, yr, yr_qty

    26   , round(avg_yr) as avg_yr

    27  from class_one_yearly_sales

    28  where yr_qty > avg_yr

    29  order by p_id, yr;

    Listing 3-4

    Rewriting Listing 3-3 using subquery factoring

    ```


    The subquery from the innermost inline view of Listing [3-3](#475066_1_En_3_Chapter.xhtml#PC5)
    I place in lines 2–7 and give it the name `product_alc_class` (it is a good idea
    to use some meaningful names). Then I can refer to `product_alc_class` in later
    parts of the query, using it just as if it was a view in the data dictionary.
    But it is not created in the data dictionary; it is only locally defined within
    this SQL statement.


    The second-level inline view of Listing [3-3](#475066_1_En_3_Chapter.xhtml#PC5)
    then goes in lines 9–22 and gets the name `class_one_yearly_sales` in line 8.
    In line 16, it queries the `product_alc_class` named subquery in the same place
    that Listing [3-3](#475066_1_En_3_Chapter.xhtml#PC5) has an inline view.


    And the main query in lines 24–29 corresponds to the outer query of Listing [3-3](#475066_1_En_3_Chapter.xhtml#PC5)
    lines 1–4 and 26–28, just querying the `class_one_yearly_sales` named subquery
    instead of an inline view.


    The output of Listing [3-4](#475066_1_En_3_Chapter.xhtml#PC7) is identical to
    Listing [3-3](#475066_1_En_3_Chapter.xhtml#PC5), and the optimizer most likely
    rewrites the SQL to achieve the same access plan, so what have I gained?


    Using the `with` clause in this simple fashion, I’ve mostly gained readability
    — having the `select` list and `where` clause close together in lines 24–29, querying
    a suitably named subquery makes it easier to write, understand, and check the
    logic of just *this* part of the big query independently. Similarly each of the
    two named subqueries, they can be looked at individually. It is the same benefits
    you know from modularizing procedural code locally.


    But where Listing [3-4](#475066_1_En_3_Chapter.xhtml#PC7) refactors the *nested*
    inline views of Listing [3-3](#475066_1_En_3_Chapter.xhtml#PC5) by having the
    second subquery select from the first and the main query select from the second
    subquery, I can also rewrite it in an alternative manner in Listing [3-5](#475066_1_En_3_Chapter.xhtml#PC8).


    ```sql

    SQL> with product_alc_class as (

    2     select

    3        pa.product_id

    4      , ntile(2) over (

    5           order by pa.abv, pa.product_id

    6        ) as alc_class

    7     from product_alcohol pa

    8  ), yearly_sales as (

    9     select

    10        ms.product_id

    11      , extract(year from ms.mth) as yr

    12      , sum(ms.qty) as yr_qty

    13      , avg(sum(ms.qty)) over (

    14           partition by ms.product_id

    15        ) as avg_yr

    16     from monthly_sales ms

    17     group by

    18        ms.product_id

    19      , extract(year from ms.mth)

    20  )

    21  select

    22     pac.product_id as p_id

    23   , ys.yr

    24   , ys.yr_qty

    25   , round(ys.avg_yr) as avg_yr

    26  from product_alc_class pac

    27  join yearly_sales ys

    28     on ys.product_id = pac.product_id

    29  where pac.alc_class = 1

    30  and ys.yr_qty > ys.avg_yr

    31  order by p_id, yr;

    Listing 3-5

    Alternative rewrite using independent named subqueries

    ```


    The `product_alc_class` named subquery is unchanged from Listing [3-4](#475066_1_En_3_Chapter.xhtml#PC7).
    But instead of `class_one_yearly_sales`, I create the simpler `yearly_sales` in
    lines 8–20, where I calculate the yearly sales of *all* products *without* joining
    to `product_alc_class`. The two named subqueries in my `with` clause are now not
    dependent on one another.


    In the main query, I simply join the two named subqueries in lines 26–28 and do
    filtering in the `where` clause in lines 29–30. With this code, I achieve the
    same output once again as the last two listings.


    Listings [3-4](#475066_1_En_3_Chapter.xhtml#PC7) and [3-5](#475066_1_En_3_Chapter.xhtml#PC8)
    are both examples of using the `with` clause in a manner that could have been
    solved with inline views. The prime benefit is readability, as the definition
    of the named subqueries is separated, not inline nested within one another. But
    there are other benefits to the `with` clause that aren’t as easily solvable with
    inline views.'
