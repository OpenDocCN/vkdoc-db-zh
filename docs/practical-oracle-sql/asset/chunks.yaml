  trans: '

    # 血液酒精浓度


    好啤酒贸易公司必须遵守一项健康法规，要求每种啤酒都必须标明饮用该啤酒会导致的血液酒精浓度。由于该浓度对男性和女性不同，并且还取决于体重，因此必须同时显示体重
    80 公斤的男性和体重 60 公斤的女性的数值。


    血液酒精浓度必须计算为每毫升体液中的酒精克数，以百分比表示。这意味着 BAC 为 0.04 表示你体内的液体中有 0.04%是酒精克数。可以使用威德马克公式计算。


    ## 威德马克公式


    毫升饮品量 * ABV/100 = 毫升酒精。毫升酒精 * 0.789（酒精比重）= 酒精克数。体重 * 1000 * 性别液体比率 = 体内毫升液体。（男性体液占
    68%，女性占 55%。）100 * 酒精克数 / 体内毫升液体 = BAC。


    将威德马克公式代入 SQL，我可以在代码清单 5-2 中计算所需的 BAC 值。


    ```sql

    SQL> select

    2     p.id as p_id

    3   , p.name

    4   , pa.sales_volume as vol

    5   , pa.abv

    6   , round(

    7        100 * (pa.sales_volume * pa.abv / 100 * 0.789)

    8         / (80 * 1000 * 0.68)

    9      , 3

    10     ) bac_m

    11   , round(

    12        100 * (pa.sales_volume * pa.abv / 100 * 0.789)

    13         / (60 * 1000 * 0.55)

    14      , 3

    15     ) bac_f

    16  from products p

    17  join product_alcohol pa

    18     on pa.product_id = p.id

    19  where p.group_id = 142

    20  order by p.id;

    Listing 5-2

    计算男性和女性的血液酒精浓度

    ```


    第 6-10 行计算体重 80 公斤男性的 BAC，而第 11-15 行对体重 60 公斤的女性进行同样的计算。男性的体液更多（既因为性别也因为体重更大），因此酒精在他体内被稀释得更多，他的
    BAC 也更低。


    这两项计算给出了`bac_m`和`bac_f`两列，这正是好啤酒贸易公司需要在啤酒标签和包装上显示的两个数字：


    ```

    P_ID  NAME              VOL  ABV  BAC_M  BAC_F

    4040  Coalminers Sweat  330  8.5  0.041  0.067

    4160  Reindeer Fuel     500  6    0.044  0.072

    4280  Hoppy Crude Oil   330  7    0.034  0.055

    ```


    你可以看到，例如，如果你的国家是众多将驾驶法定限值设为 0.05% BAC 的国家之一（有些国家更倾向于用千分比而非百分比显示，因此是 0.5‰），那么所有这些啤酒，如果一个
    60 公斤的女性喝完一整瓶后开车，都会导致她因酒驾而收到罚单，而 80 公斤的男性则会低于限值。


    **注意**


    这是用于说明 SQL 中编码公式的示例数据。实际的 BAC 会因个体身体和新陈代谢的更详细因素而异，因此不应以此作为判断喝几瓶啤酒后是否可以合法驾车的依据。请仅将这些公式作为学习
    SQL 的示例——我对任何罚单概不负责，并敦促你饮酒要负责任。


    无论如何，作为一名开发者，你显然能看出，我应该将该公式放入一个函数中，而不是在查询中用略有不同的数字重复两次相同的代码。


    ## 使用 PRAGMA UDF 的函数


    因此，首先在代码清单 5-3 中，我将为 BAC 计算的威德马克公式创建一个常规（嗯，几乎是常规）的 PL/SQL 函数。虽然这对本演示无关紧要，但我会遵循最佳实践，将函数放在包中而不是独立函数中，因此我决定创建一个名为`formulas`的包来存放此类函数。


    ```sql

    SQL> create or replace package formulas

    2  is

    3     function bac (

    4        p_volume in number

    5      , p_abv    in number

    6      , p_weight in number

    7      , p_gender in varchar2

    8     ) return number deterministic;

    9  end formulas;

    10  /

    Package FORMULAS compiled

    SQL> create or replace package body formulas

    2  is

    3     function bac (

    4        p_volume in number

    5      , p_abv    in number

    6      , p_weight in number

    7      , p_gender in varchar2

    8     ) return number deterministic

    9     is

    10        PRAGMA UDF;

    11     begin

    12        return round(

    13           100 * (p_volume * p_abv / 100 * 0.789)

    14            / (p_weight * 1000 * case p_gender

    15                                    when ''M'' then 0.68

    16                                    when ''F'' then 0.55

    17                                 end)

    18         , 3

    19        );

    20     end bac;

    21  end formulas;

    22  /

    Package Body FORMULAS compiled

    Listing 5-3

    创建带有 bac 函数的公式包

    ```


    一切都非常直接，除了包体中的第 10 行。`UDF pragma`（用户定义函数）自 12.1 版本起可用，它告诉编译器，我打算*主要*从 SQL 调用此函数，而不是从
    PL/SQL 调用。


    如果我创建函数时*没有*使用`PRAGMA UDF`，它将以正常方式编译，在函数被调用时导致正常的上下文切换。如果它*带有*`PRAGMA UDF`编译，则会以不同的方式编译，这有可能减少上下文切换的开销。能减少多少开销（如果有的话）作为开发者我无法控制。我稍后会详细解释，但首先让我展示该函数的用法。


    使用该函数与我使用普通函数完全相同，因此在代码清单 5-4 中，我通过调用包函数来查询 BAC。


    ```sql

    SQL> select

    2     p.id as p_id

    3   , p.name

    4   , pa.sales_volume as vol

    5   , pa.abv

    6   , formulas.bac(pa.sales_volume, pa.abv, 80, ''M'') bac_m

    7   , formulas.bac(pa.sales_volume, pa.abv, 60, ''F'') bac_f

    8  from products p

    9  join product_alcohol pa

    10     on pa.product_id = p.id

    11  where p.group_id = 142

    12  order by p.id;

    Listing 5-4

    使用打包的公式查询男性和女性的 BAC

    ```


    它给出了与代码清单 5-2 相同的输出，这并不意外。


    使其非常易于使用的原因是，我像往常一样编写函数，但我知道该函数将主要从 SQL 使用，而较少（或从不）从 PL/SQL 使用，我只需添加`PRAGMA UDF`，编译器就会处理其余的事情，可能为我节省一些上下文切换的运行时开销。


    `PRAGMA UDF`可能带来多少好处取决于几个因素。如果 PL/SQL 函数内部的代码只包含*可以*直接用 SQL 表达的内容（如`formulas.bac`函数），好处可能更大，而包含大量
    PL/SQL 功能或内联 SQL 的更复杂函数可能获益较少或没有好处。你应该测试你的用例，但一般的经验法则是，当你*知道*函数几乎只从 SQL 使用时，使用该编译指示不会有害处，甚至可能有点帮助。


    当我用`PRAGMA UDF`编译函数时，我要求编译器尝试使该函数从 SQL 调用更廉价（如果可能的话）。这也意味着，我不在乎它*可能*从 PL/SQL 调用会稍微贵一点。同样取决于许多因素，这里可能会有轻微的负面影响，因为`PRAGMA
    UDF`函数可能期望接收 SQL 引擎传递的数据格式。这种影响可能几乎察觉不到，也可能稍微明显一些——这取决于实际情况。


    但我有另一个替代使用`PRAGMA UDF`编译函数的方法——我可以跳过在数据库中创建存储函数，直接在查询本身中指定我的函数。

    '
- fmt: '## Function in the `with` clause


    Version 12.1 also allows me to place PL/SQL function (and procedure, but that
    is rarely useful) code directly inside the `with` clause of a query, as I do it
    in Listing 5-5.


    ```

    SQL> with

    2     function bac (

    3        p_volume in number

    4      , p_abv    in number

    5      , p_weight in number

    6      , p_gender in varchar2

    7     ) return number deterministic

    8     is

    9     begin

    10        return round(

    11           100 * (p_volume * p_abv / 100 * 0.789)

    12            / (p_weight * 1000 * case p_gender

    13                                    when ''M'' then 0.68

    14                                    when ''F'' then 0.55

    15                                 end)

    16         , 3

    17        );

    18     end;

    19  select

    20     p.id as p_id

    21   , p.name

    22   , pa.sales_volume as vol

    23   , pa.abv

    24   , bac(pa.sales_volume, pa.abv, 80, ''M'') bac_m

    25   , bac(pa.sales_volume, pa.abv, 60, ''F'') bac_f

    26  from products p

    27  join product_alcohol pa

    28     on pa.product_id = p.id

    29  where p.group_id = 142

    30  order by p.id

    31  /

    Listing 5-5

    Querying BAC with a function in the with clause

    ```


    At first is the keyword `with`, just like in Chapter 3. But then instead of a
    subquery, lines 2–18 contain the code of the `bac` function, just as I had it
    in the package `formulas`. The defined function can then be called in the SQL
    as shown in lines 24–25. The output of this query is also the same as Listing
    5-2.


    A function in the `with` clause is compiled in the same manner as a `PRAGMA UDF`
    function, but it is not stored in the data dictionary as a PL/SQL object; it is
    only saved along with the query in the shared pool and *cannot* be called from
    any other SQL or PL/SQL statement.


    **Note**


    Line 31 of Listing 5-5 ends the query with slash (`/`) instead of semicolon (`;`).
    Once the parser has detected there is PL/SQL in the `with` clause, it seems unable
    (at present) to detect if a semicolon is the end of the statement or part of the
    PL/SQL code. This might change in future versions, but for now the workaround
    is to use a slash to make sqlcl or SQL*Plus find the end of the statement.


    It’s possible to have multiple functions in a single `with` clause. For example,
    I might decide to refactor my code and create two helper functions to calculate
    grams of alcohol and grams of body fluid (same as milliliters) and use those two
    functions inside my `bac` function. I can do that in Listing 5-6, which might
    be longer, but is also a bit more self-documenting.


    ```

    SQL> with

    2     function gram_alcohol (

    3        p_volume in number

    4      , p_abv    in number

    5     ) return number deterministic

    6     is

    7     begin

    8        return p_volume * p_abv / 100 * 0.789;

    9     end;

    10     function gram_body_fluid (

    11        p_weight in number

    12      , p_gender in varchar2

    13     ) return number deterministic

    14     is

    15     begin

    16        return p_weight * 1000 * case p_gender

    17                                    when ''M'' then 0.68

    18                                    when ''F'' then 0.55

    19                                 end;

    20     end;

    21     function bac (

    22        p_volume in number

    23      , p_abv    in number

    24      , p_weight in number

    25      , p_gender in varchar2

    26     ) return number deterministic

    27     is

    28     begin

    29        return round(

    30           100 * gram_alcohol(p_volume, p_abv)

    31            / gram_body_fluid(p_weight, p_gender)

    32         , 3

    33        );

    34     end;

    35  select

    ...

    Listing 5-6

    Having multiple functions in one with clause

    ```


    The multiple functions make no difference to the output — it’s the same again.


    But whether I use a single function or multiple functions, I still have a decision
    to make. If I want to use a function in multiple SQL statements, I have to create
    a stored function (with or without `PRAGMA UDF`), no question about it. But otherwise,
    why would I ever put it in the `with` clause instead of using a `PRAGMA UDF` function?


    One reason could be cases where you cannot create stored functions or procedures,
    for example, either in a read-only database or if you build some tool statements
    that you wish to run without installing code in databases of your clients.


    Another reason could be if the function in some rare cases executes dynamic SQL
    that for some reason cannot use bind variables, using string concatenated SQL
    instead. Having the function in the query gives you absolute control of what arguments
    the function is called with, so you can guard yourself more against SQL injection.
    The function cannot be called from elsewhere.


    A third reason could be functionality that is very specific for a single purpose,
    where you could choose a different way to encapsulate your code.


    ### Encapsulated in a view


    It would be reasonable (in this application) to say that the blood alcohol concentration
    calculation does not make sense outside the context of a row in the `product_alcohol`
    table. If I had been using object-oriented programming, I could say that it would
    be a *member* method rather than a *static* method.


    I can achieve a somewhat similar effect by creating the view in Listing 5-7.


    ```

    SQL> create view product_alcohol_bac

    2  as

    3  with

    4     function gram_alcohol (

    ...

    12     function gram_body_fluid (

    ...

    23     function bac (

    ...

    37  select

    38     pa.product_id

    39   , pa.sales_volume

    40   , pa.abv

    41   , bac(pa.sales_volume, pa.abv, 80, ''M'') bac_m

    42   , bac(pa.sales_volume, pa.abv, 60, ''F'') bac_f

    43  from product_alcohol pa

    44  /

    View PRODUCT_ALCOHOL_BAC created.

    Listing 5-7

    Creating a view with the BAC calculations

    ```


    In this view, I use the `with` clause with the three functions from Listing 5-6.
    The query itself in lines 37–43 only uses the `product_alcohol` table, selecting
    all columns of the table plus the two calculated `bac_m` and `bac_f` columns.


    Now I can make a query joining the `products` table with the `product_alcohol_bac`
    view in Listing 5-8, giving me the desired data directly and simply.


    ```

    SQL> select

    2     p.id as p_id

    3   , p.name

    4   , pab.sales_volume as vol

    5   , pab.abv

    6   , pab.bac_m

    7   , pab.bac_f

    8  from products p

    9  join product_alcohol_bac pab

    10     on pab.product_id = p.id

    11  where p.group_id = 142

    12  order by p.id;

    Listing 5-8

    Querying BAC data using the view

    ```


    The same output once again:


    ```

    P_ID  NAME              VOL  ABV  BAC_M  BAC_F

    4040  Coalminers Sweat  330  8.5  0.041  0.067

    4160  Reindeer Fuel     500  6    0.044  0.072

    4280  Hoppy Crude Oil   330  7    0.034  0.055

    ```


    This method enables me to reuse the logic in other SQL statements by querying
    the view instead of the table, but still have the logic only in a single place:
    the view definition.


    I could achieve the same by having the view calling the packaged function `formulas.bac`
    instead of defining the functions in the view, but if it is a functionality that
    is *so* specific that it is only relevant for this particular query/view definition,
    then it can be a nice thing to keep everything together and not clutter the data
    dictionary with stored functions that really never should be called outside this
    particular SQL.'
  raw: '## Function in the with clause


    Version 12.1 also allows me to place PL/SQL function (and procedure, but that
    is rarely useful) code directly inside the `with` clause of a query, as I do it
    in Listing [5-5](#475066_1_En_5_Chapter.xhtml#PC7).


    ```

    SQL> with

    2     function bac (

    3        p_volume in number

    4      , p_abv    in number

    5      , p_weight in number

    6      , p_gender in varchar2

    7     ) return number deterministic

    8     is

    9     begin

    10        return round(

    11           100 * (p_volume * p_abv / 100 * 0.789)

    12            / (p_weight * 1000 * case p_gender

    13                                    when ''M'' then 0.68

    14                                    when ''F'' then 0.55

    15                                 end)

    16         , 3

    17        );

    18     end;

    19  select

    20     p.id as p_id

    21   , p.name

    22   , pa.sales_volume as vol

    23   , pa.abv

    24   , bac(pa.sales_volume, pa.abv, 80, ''M'') bac_m

    25   , bac(pa.sales_volume, pa.abv, 60, ''F'') bac_f

    26  from products p

    27  join product_alcohol pa

    28     on pa.product_id = p.id

    29  where p.group_id = 142

    30  order by p.id

    31  /

    Listing 5-5

    Querying BAC with a function in the with clause

    ```


    At first is the keyword `with`, just like in Chapter [3](#475066_1_En_3_Chapter.xhtml).
    But then instead of a subquery, lines 2–18 contain the code of the `bac` function,
    just as I had it in the package `formulas`. The defined function can then be called
    in the SQL as shown in lines 24–25\. The output of this query is also the same
    as Listing [5-2](#475066_1_En_5_Chapter.xhtml#PC3).


    A function in the `with` clause is compiled in the same manner as a `PRAGMA UDF`
    function, but it is not stored in the data dictionary as a PL/SQL object; it is
    only saved along with the query in the shared pool and *cannot* be called from
    any other SQL or PL/SQL statement.


    Note


    Line 31 of Listing [5-5](#475066_1_En_5_Chapter.xhtml#PC7) ends the query with
    slash (`/`) instead of semicolon (`;`). Once the parser has detected there is
    PL/SQL in the `with` clause, it seems unable (at present) to detect if a semicolon
    is the end of the statement or part of the PL/SQL code. This might change in future
    versions, but for now the workaround is to use a slash to make sqlcl or SQL*Plus
    find the end of the statement.


    It’s possible to have multiple functions in a single `with` clause. For example,
    I might decide to refactor my code and create two helper functions to calculate
    grams of alcohol and grams of body fluid (same as milliliters) and use those two
    functions inside my `bac` function. I can do that in Listing [5-6](#475066_1_En_5_Chapter.xhtml#PC8),
    which might be longer, but is also a bit more self-documenting.


    ```

    SQL> with

    2     function gram_alcohol (

    3        p_volume in number

    4      , p_abv    in number

    5     ) return number deterministic

    6     is

    7     begin

    8        return p_volume * p_abv / 100 * 0.789;

    9     end;

    10     function gram_body_fluid (

    11        p_weight in number

    12      , p_gender in varchar2

    13     ) return number deterministic

    14     is

    15     begin

    16        return p_weight * 1000 * case p_gender

    17                                    when ''M'' then 0.68

    18                                    when ''F'' then 0.55

    19                                 end;

    20     end;

    21     function bac (

    22        p_volume in number

    23      , p_abv    in number

    24      , p_weight in number

    25      , p_gender in varchar2

    26     ) return number deterministic

    27     is

    28     begin

    29        return round(

    30           100 * gram_alcohol(p_volume, p_abv)

    31            / gram_body_fluid(p_weight, p_gender)

    32         , 3

    33        );

    34     end;

    35  select

    ...

    Listing 5-6

    Having multiple functions in one with clause

    ```


    The multiple functions make no difference to the output – it’s the same again.


    But whether I use a single function or multiple functions, I still have a decision
    to make. If I want to use a function in multiple SQL statements, I have to create
    a stored function (with or without `PRAGMA UDF`), no question about it. But otherwise,
    why would I ever put it in the `with` clause instead of using a `PRAGMA UDF` function?


    One reason could be cases where you cannot create stored functions or procedures,
    for example, either in a read-only database or if you build some tool statements
    that you wish to run without installing code in databases of your clients.


    Another reason could be if the function in some rare cases executes dynamic SQL
    that for some reason cannot use bind variables, using string concatenated SQL
    instead. Having the function in the query gives you absolute control of what arguments
    the function is called with, so you can guard yourself more against SQL injection.
    The function cannot be called from elsewhere.


    A third reason could be functionality that is very specific for a single purpose,
    where you could choose a different way to encapsulate your code.


    ### Encapsulated in a view


    It would be reasonable (in this application) to say that the blood alcohol concentration
    calculation does not make sense outside the context of a row in the `product_alcohol`
    table. If I had been using object-oriented programming, I could say that it would
    be a *member* method rather than a *static* method.


    I can achieve a somewhat similar effect by creating the view in Listing [5-7](#475066_1_En_5_Chapter.xhtml#PC9).


    ```

    SQL> create view product_alcohol_bac

    2  as

    3  with

    4     function gram_alcohol (

    ...

    12     function gram_body_fluid (

    ...

    23     function bac (

    ...

    37  select

    38     pa.product_id

    39   , pa.sales_volume

    40   , pa.abv

    41   , bac(pa.sales_volume, pa.abv, 80, ''M'') bac_m

    42   , bac(pa.sales_volume, pa.abv, 60, ''F'') bac_f

    43  from product_alcohol pa

    44  /

    View PRODUCT_ALCOHOL_BAC created.

    Listing 5-7

    Creating a view with the BAC calculations

    ```


    In this view, I use the `with` clause with the three functions from Listing [5-6](#475066_1_En_5_Chapter.xhtml#PC8).
    The query itself in lines 37–43 only uses the `product_alcohol` table, selecting
    all columns of the table plus the two calculated `bac_m` and `bac_f` columns.


    Now I can make a query joining the `products` table with the `product_alcohol_bac`
    view in Listing [5-8](#475066_1_En_5_Chapter.xhtml#PC10), giving me the desired
    data directly and simply.


    ```

    SQL> select

    2     p.id as p_id

    3   , p.name

    4   , pab.sales_volume as vol

    5   , pab.abv

    6   , pab.bac_m

    7   , pab.bac_f

    8  from products p

    9  join product_alcohol_bac pab

    10     on pab.product_id = p.id

    11  where p.group_id = 142

    12  order by p.id;

    Listing 5-8

    Querying BAC data using the view

    ```


    The same output once again:


    ```

    P_ID  NAME              VOL  ABV  BAC_M  BAC_F

    4040  Coalminers Sweat  330  8.5  0.041  0.067

    4160  Reindeer Fuel     500  6    0.044  0.072

    4280  Hoppy Crude Oil   330  7    0.034  0.055

    ```


    This method enables me to reuse the logic in other SQL statements by querying
    the view instead of the table, but still have the logic only in a single place:
    the view definition.


    I could achieve the same by having the view calling the packaged function `formulas.bac`
    instead of defining the functions in the view, but if it is a functionality that
    is *so* specific that it is only relevant for this particular query/view definition,
    then it can be a nice thing to keep everything together and not clutter the data
    dictionary with stored functions that really never should be called outside this
    particular SQL.'
  trans: '

    ## 在 `WITH` 子句中使用函数


    版本 12.1 还允许我将 PL/SQL 函数（以及过程，但后者很少使用）代码直接放在查询的 `with` 子句中，如代码清单 5-5 所示。


    ```

    SQL> with

    2     function bac (

    3        p_volume in number

    4      , p_abv    in number

    5      , p_weight in number

    6      , p_gender in varchar2

    7     ) return number deterministic

    8     is

    9     begin

    10        return round(

    11           100 * (p_volume * p_abv / 100 * 0.789)

    12            / (p_weight * 1000 * case p_gender

    13                                    when ''M'' then 0.68

    14                                    when ''F'' then 0.55

    15                                 end)

    16         , 3

    17        );

    18     end;

    19  select

    20     p.id as p_id

    21   , p.name

    22   , pa.sales_volume as vol

    23   , pa.abv

    24   , bac(pa.sales_volume, pa.abv, 80, ''M'') bac_m

    25   , bac(pa.sales_volume, pa.abv, 60, ''F'') bac_f

    26  from products p

    27  join product_alcohol pa

    28     on pa.product_id = p.id

    29  where p.group_id = 142

    30  order by p.id

    31  /

    代码清单 5-5

    在 with 子句中使用函数查询 BAC

    ```


    首先是关键字 `with`，和第 3 章中一样。但接下来第 2-18 行不是子查询，而是包含了 `bac` 函数的代码，就像我之前放在 `formulas`
    包里那样。定义好的函数随后就可以在 SQL 中调用，如第 24-25 行所示。此查询的输出结果也与代码清单 5-2 相同。


    `with` 子句中的函数的编译方式与 `PRAGMA UDF` 函数相同，但它不会作为 PL/SQL 对象存储在数据字典中；它只会随查询一起保存在共享池中，并且*不能*从任何其他
    SQL 或 PL/SQL 语句中调用。


    **注意**


    代码清单 5-5 的第 31 行以斜杠 (`/`) 而不是分号 (`;`) 结束查询。一旦解析器检测到 `with` 子句中有 PL/SQL 代码，它似乎（目前）无法检测分号是语句的结束还是
    PL/SQL 代码的一部分。未来版本可能会改变这一点，但目前的变通方法是使用斜杠，以便 sqlcl 或 SQL*Plus 能够找到语句的结尾。


    可以在单个 `with` 子句中拥有多个函数。例如，我可能决定重构我的代码，并创建两个辅助函数来计算酒精克数和体液克数（与毫升数相同），然后在 `bac`
    函数内部使用这两个函数。我可以在代码清单 5-6 中实现这一点，该清单可能更长，但也更加自文档化。


    ```

    SQL> with

    2     function gram_alcohol (

    3        p_volume in number

    4      , p_abv    in number

    5     ) return number deterministic

    6     is

    7     begin

    8        return p_volume * p_abv / 100 * 0.789;

    9     end;

    10     function gram_body_fluid (

    11        p_weight in number

    12      , p_gender in varchar2

    13     ) return number deterministic

    14     is

    15     begin

    16        return p_weight * 1000 * case p_gender

    17                                    when ''M'' then 0.68

    18                                    when ''F'' then 0.55

    19                                 end;

    20     end;

    21     function bac (

    22        p_volume in number

    23      , p_abv    in number

    24      , p_weight in number

    25      , p_gender in varchar2

    26     ) return number deterministic

    27     is

    28     begin

    29        return round(

    30           100 * gram_alcohol(p_volume, p_abv)

    31            / gram_body_fluid(p_weight, p_gender)

    32         , 3

    33        );

    34     end;

    35  select

    ...

    代码清单 5-6

    在一个 with 子句中包含多个函数

    ```


    多个函数对输出结果没有影响——结果仍然相同。


    但是，无论我使用单个函数还是多个函数，我仍然需要做一个决定。如果我想在多个 SQL 语句中使用一个函数，我必须创建一个存储函数（带或不带 `PRAGMA UDF`），这一点毋庸置疑。但除此之外，为什么我还要把它放在
    `with` 子句中，而不是使用 `PRAGMA UDF` 函数呢？


    一个原因可能是你无法创建存储函数或过程的情况，例如在只读数据库中，或者当你构建一些工具语句，希望在不为客户安装代码的数据库中运行时。


    另一个原因可能是，如果函数在某些罕见情况下执行动态 SQL，而这些 SQL 由于某种原因无法使用绑定变量，只能使用字符串拼接的 SQL。将函数放在查询中，你可以完全控制函数被调用时的参数，从而可以更好地防范
    SQL 注入。该函数无法从其他地方调用。


    第三个原因可能是功能非常特定于单一用途，你可以选择不同的方式来封装你的代码。


    ### 封装在视图中


    （在此应用程序中）可以说，血液酒精浓度计算在 `product_alcohol` 表的一行上下文之外是没有意义的。如果我使用的是面向对象编程，我会说这是一个*成员*方法，而不是*静态*方法。


    我可以通过创建代码清单 5-7 中的视图来实现类似的效果。


    ```

    SQL> create view product_alcohol_bac

    2  as

    3  with

    4     function gram_alcohol (

    ...

    12     function gram_body_fluid (

    ...

    23     function bac (

    ...

    37  select

    38     pa.product_id

    39   , pa.sales_volume

    40   , pa.abv

    41   , bac(pa.sales_volume, pa.abv, 80, ''M'') bac_m

    42   , bac(pa.sales_volume, pa.abv, 60, ''F'') bac_f

    43  from product_alcohol pa

    44  /

    视图 PRODUCT_ALCOHOL_BAC 已创建。

    代码清单 5-7

    创建包含 BAC 计算的视图

    ```


    在此视图中，我使用了带有代码清单 5-6 中三个函数的 `with` 子句。第 37-43 行的查询本身仅使用 `product_alcohol` 表，选择该表的所有列以及两个计算出的
    `bac_m` 和 `bac_f` 列。


    现在，我可以创建一个查询，将 `products` 表与 `product_alcohol_bac` 视图连接起来，如代码清单 5-8 所示，直接简单地获取所需数据。


    ```

    SQL> select

    2     p.id as p_id

    3   , p.name

    4   , pab.sales_volume as vol

    5   , pab.abv

    6   , pab.bac_m

    7   , pab.bac_f

    8  from products p

    9  join product_alcohol_bac pab

    10     on pab.product_id = p.id

    11  where p.group_id = 142

    12  order by p.id;

    代码清单 5-8

    使用视图查询 BAC 数据

    ```


    输出结果再次相同：


    ```

    P_ID  NAME              VOL  ABV  BAC_M  BAC_F

    4040  Coalminers Sweat  330  8.5  0.041  0.067

    4160  Reindeer Fuel     500  6    0.044  0.072

    4280  Hoppy Crude Oil   330  7    0.034  0.055

    ```


    这种方法使我能够通过查询视图而不是表，在其他 SQL 语句中重用该逻辑，同时仍保持逻辑只存在于一个地方：视图定义。


    我也可以通过让视图调用打包函数 `formulas.bac` 来实现相同的效果，而不是在视图中定义函数，但如果该功能*如此*特定，以至于仅与此特定查询/视图定义相关，那么将所有内容保持在一起，并且不让数据字典被那些确实不应在此特定
    SQL 之外调用的存储函数弄乱，可能是一件好事。

    '
- fmt: '## Lessons learned


    Even though the topic of this book is not PL/SQL as such, having the ability to
    integrate PL/SQL into SQL even tighter than it used to be is a feature you as
    a SQL developer should be aware of. With this chapter as example, you should now


    *   Consider if a function is primarily used from SQL and thus could benefit from
    adding the `PRAGMA UDF` to the definition.

    *   Know how to embed “single-use” functions in SQL statements in the `with` clause.

    *   Think about if very specific functionality might be better off encapsulated
    in a view using `with` clause functions instead of normal stored functions.


    For much of your daily development, probably it is the `PRAGMA UDF` you mostly
    should think about, but the `with` clause technique can be very useful if you
    have situations where you cannot install stored procedures and functions.


    ## 6. Iterative Calculations with Multidimensional Data


    You won’t find a multitude of real-life examples using the `model` clause, apart
    from doing recursion and iteration as I showed in Chapter [4](#475066_1_En_4_Chapter.xhtml).
    Recursive subquery factoring came in version 11, but with the `model` clause,
    you could do recursion from version 10. However, the real power of the `model`
    clause is the way you can address data in multiple dimensions in an array-like
    fashion, building formulas similar to the way spreadsheets work.


    A nested table type in Oracle has a single dimension (index), and the “cell” can
    be a scalar or a structured type. If you have multiple dimensions, you can nest
    the nested table types, or you can work with plain SQL – both methods can become
    hairy for some types of calculations. In the `model` clause, you work in a sense
    with arrays that can have multiple dimensions and multiple measures (values) in
    each cell, and you have a very dense syntax for addressing multiple cells.


    The `model` clause is not the obvious choice for implementation of everything,
    but I’ll show you an example that fits perfectly and uses both multiple dimensions
    as well as iteration. This example may not be the most useful in itself, but it
    demonstrates very well the kind of situations where you could consider using the
    `model` clause.


    ## Conway’s Game of Life


    In 1970, British mathematician John Horton Conway devised the Game of Life (also
    known simply as Life). It is about cells in a two-dimensional grid emulating how
    cells live and die over generations depending on how crowded things are in the
    grid. You can see cells populating the grid in Figure [6-1](#475066_1_En_6_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_6_Chapter/475066_1_En_6_Fig1_HTML.jpg](images/475066_1_En_6_Chapter/475066_1_En_6_Fig1_HTML.jpg)

    *Figure 6-1: Conway’s Game of Life is about life and death of cells in a grid*


    The idea is to start with some set of “live” cells (grid cells that are populated
    by live cellular organisms) and then see how the population evolves over time
    from generation to generation.


    The evolvement is governed by these rules:


    *   Any live cell with fewer than two live neighbors dies, as if caused by underpopulation.

    *   Any live cell with two or three live neighbors lives on to the next generation.

    *   Any live cell with more than three live neighbors dies, as if by overcrowding.

    *   Any dead cell with exactly three live neighbors becomes a live cell, as if
    by reproduction.


    So in order to find out which cells will be alive in the next generation, you
    count the number of live neighbors for each cell in this generation and apply
    the rules. Neighbors are defined as the eight cells that surround a cell (one
    cell away horizontally, vertically, or diagonally).


    Most often you see the Game of Life implemented iteratively in a procedural language
    – I am going to show you how to do it in a single SQL statement with the `model`
    clause.


    > **Note**

    >

    > You can find a fuller explanation of the Game of Life on Wikipedia: [https://en.wikipedia.org/wiki/Conway%27s_Game_of_Life](https://en.wikipedia.org/wiki/Conway%2527s_Game_of_Life).'
