    But there is another way to unpivot without using the `unpivot` clause. Before
    version 10, you had to do it yourself manually, and I’ll show you a couple of
    versions of the manual unpivot. It can be handy to know of it so you can recognize
    what’s happening if you see it in old code. And once in a rare while, there is
    also the possibility you have something complex that fits less optimally into
    the `unpivot` clause and it is easier to implement it this way.


    The basic idea in both versions is that I need to generate as many rows as I have
    values of my dimension. With the `unpivot` clause, these rows are generated automatically
    as many as I have expressions in the `in` list – in Listing [7-3](#475066_1_En_7_Chapter.xhtml#PC4),
    I generate those three rows manually using `select from dual`.


