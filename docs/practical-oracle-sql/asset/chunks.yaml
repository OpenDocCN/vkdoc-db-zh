    ...

    17  )

    18  match_recognize(

    19     partition by page_no

    20     order by day

    21     measures

    22        first(friendly_url) as url

    23      , round(first(avg_visits), 1) as avg_v

    24      , first(day) as from_day

    25      , final count(*) as days

    26      , final count(high.*) as hi

    27      , final count(medium.*) as med

    28      , final count(low.*) as low

    29      , final sum(visits) as t_v

    30      , round(final avg(visits), 1) as d_v

    31      , round(

    32           (100 * final avg(visits) / avg_visits) - 100

    33         , 1

    34        ) as d_pct

    35     one row per match

    36     after match skip past last row

    37     pattern ( high+ medium+ low+ )

    38     define

    39        high   as visits / avg_visits >= 2.5

    40      , medium as visits / avg_visits >= 1.5

    41      , low    as visits / avg_visits >= 1.1

    42  )

    43  order by page_no, from_day;

    Listing 20-12

    Finding peaks of a particular shape

    ```


    Again in lines 39–41, I `define` three different classifications (slightly different
    ratio values as before but otherwise same principle.)


    My `pattern` in line 37 then states I’m looking for a peak shaped with at least
    one `high` day, followed by at least one `medium` day and followed by at least
    one `low` day.


    The measures `hi`, `med,` and `low` in lines 26–28 tell me how many days of each
    classification, so I can see how many days the visit count stayed `high` before
    it started to taper off:


    ```

    URL    AVG_V  FROM_DAY    DAYS  HI  MED  LOW  T_V   D_V  D_PCT

    /Shop  97.3   2019-04-12  6     3   2    1    1386  231  137.3

    ```


    I found the single peak in the data that has the shape I was looking for.


    ## Lessons learned


    I’ve shown multiple examples here of looking for spikes in chronological data –
    techniques very similar to the up-and-down pattern search in Chapter [17](#475066_1_En_17_Chapter.xhtml)
    yet slightly different for slightly different use cases.


    Having understood these examples, you should now know about


    *   Using the navigational functions `prev` and `next` (in conjunction with `final`)
    to access rows outside the match in the measures expressions


    *   Pre-calculating values to enable simpler pattern matching (test it to see
    if it hurts or helps performance)


    *   Having multiple classification definitions to use in patterns that find either
    any of the classifications or specific classification combinations in a certain
    order


    There are many use cases of similar chronological (or just sequential) data where
    you can apply these types of pattern searches.


    # 21. Bin Fitting


    Imagine packing your car to go on a holiday. Probably there’s one person in your
    family that has the 3-D intuition needed to work out how to fit the suitcases
    just so, so that there’s a nook free here to fit a pair of boots and a cranny
    free there to fit the odd-shaped gift you’re bringing along to Aunt Mathilda.
    That one person always does the packing; the rest of you stay out of the way until
    the car is packed.


    Such packing skills can be highly valued in certain industries, as it is not an
    easy task to make an algorithm that will do it perfectly. Variants are known as
    **bin fitting**, **bin packing**, **knapsack problem**, **cutting stock problem**,
    and more. Googling these terms you will find many algorithms for approximate answers,
    where typically the better the solution is, the longer time it takes to run.


    The very best algorithms often require either several passes of the data or storing
    data in intermediate arrays for lookups. These are not easily translated to SQL
    and might even be examples of code where it is not optimal to do it in SQL. But
    with `match_recognize,` you *can* do some simple approximate bin fitting algorithms
    that are still quite useful.'
  trans: '

    # 第 21 章 装箱匹配


    ## 更复杂的模式


    利用清单 20-11，我可以同时搜索高、中、低三种峰值。


    ```sql

    SQL> select

    2     url, avg_v, from_day, days, class, t_v, d_v, d_pct

    3  from (

    ...

    17  )

    18  match_recognize(

    19     partition by page_no

    20     order by day

    21     measures

    22        first(friendly_url) as url

    23      , round(first(avg_visits), 1) as avg_v

    24      , first(day) as from_day

    25      , final count(*) as days

    26      , classifier() as class

    27      , final sum(visits) as t_v

    28      , round(final avg(visits), 1) as d_v

    29      , round(

    30           (100 * final avg(visits) / avg_visits) - 100

    31         , 1

    32        ) as d_pct

    33     one row per match

    34     after match skip past last row

    35     pattern ( high{1,} | medium{2,} | low{3,} )

    36     define

    37        high   as visits / avg_visits >= 4

    38      , medium as visits / avg_visits >= 2

    39      , low    as visits / avg_visits >= 1.1

    40  )

    41  order by page_no, from_day;

    清单 20-11

    同时查找多个峰值分类

    ```


    在第 37-39 行，我没有仅定义单一峰值，而是定义了三个不同的分类，分别命名为 `high`、`medium` 和 `low`——每个分类对应每日访问量与平均访问量之间不同的最小比率。`high`
    表示比率至少为 4，意味着当天的访问量至少是平均值的 400%或比平均值高 300%，其他定义的含义类似。


    在第 35 行的 `pattern` 中，我声明一个匹配结果必须是：至少一行 `high`，或者至少两行 `medium`，或者至少三行 `low`。单个
    `low` 峰值可能是随机的，但连续三天出现就值得研究了：


    ```

    URL          AVG_V  FROM_DAY    DAYS  CLASS   T_V   D_V    D_PCT

    /Shop        97.3   2019-04-12  4     MEDIUM  1039  259.8  166.8

    /Categories  56.4   2019-04-28  1     HIGH    360   360    538.1

    /Breweries   43.1   2019-04-05  4     LOW     217   54.3   26

    /About       4.5    2019-04-04  3     LOW     36    12     165.6

    /About       4.5    2019-04-27  3     LOW     31    10.3   128.8

    ```


    从输出中我看到，这三种不同类型的峰值都已被找到。


    **注意**


    最后找到的两个 `low` 峰值，其日均访问量都比总平均值高出 100%以上，换句话说，比率大于 2——那么为什么它们没有被分类为 `medium` 呢？为了弄清原因，请切换为
    `one row per match` 并移除所有的 `final` 关键字——我将此作为练习留给你。你会发现，答案是每个周期的第一行的比率在 1.1 到
    2 之间，因此被分类为 `low`。因此，后续的行就不会再被测试是否为 `medium` 或 `high`，因为根据模式这是不可能的。唯一以 `low` 行开头的可行模式是找到至少三个
    `low` 行，所以最后两个匹配结果中的第二和第三行只被评估为比率是否至少为 1.1，这是成立的（尽管它们实际的比率至少为 2）。


    除了同时查找多个分类，我还可以设计一个模式来查找特定形状的峰值。例如，在发送包含一些链接的新闻通讯后，我预计会看到一两天内访问量急剧上升，然后逐渐减弱为中等上升，最后变为低水平。清单
    20-12 查找的就是这种形状的峰值。


    ```sql

    SQL> select

    2     url, avg_v, from_day, days, hi, med, low, t_v, d_v, d_pct

    3  from (

    ...

    17  )

    18  match_recognize(

    19     partition by page_no

    20     order by day

    21     measures

    22        first(friendly_url) as url

    23      , round(first(avg_visits), 1) as avg_v

    24      , first(day) as from_day

    25      , final count(*) as days

    26      , final count(high.*) as hi

    27      , final count(medium.*) as med

    28      , final count(low.*) as low

    29      , final sum(visits) as t_v

    30      , round(final avg(visits), 1) as d_v

    31      , round(

    32           (100 * final avg(visits) / avg_visits) - 100

    33         , 1

    34        ) as d_pct

    35     one row per match

    36     after match skip past last row

    37     pattern ( high+ medium+ low+ )

    38     define

    39        high   as visits / avg_visits >= 2.5

    40      , medium as visits / avg_visits >= 1.5

    41      , low    as visits / avg_visits >= 1.1

    42  )

    43  order by page_no, from_day;

    清单 20-12

    查找特定形状的峰值

    ```


    同样在第 39-41 行，我 `define`（定义）了三个不同的分类（比率值与之前略有不同，但原理相同）。


    我在第 37 行的 `pattern` 声明，我正在寻找一个至少包含一天 `high`、随后至少一天 `medium`、再随后至少一天 `low` 的峰值形状。


    第 26-28 行的度量 `hi`、`med` 和 `low` 告诉我每个分类有多少天，这样我就可以看到访问量在开始减弱前保持 `high` 状态的天数：


    ```

    URL    AVG_V  FROM_DAY    DAYS  HI  MED  LOW  T_V   D_V  D_PCT

    /Shop  97.3   2019-04-12  6     3   2    1    1386  231  137.3

    ```


    我在数据中找到了一个符合我寻找的形状的峰值。


    ## 经验总结


    我在这里展示了多个查找时间序列数据中峰值的例子——这些技术与第 17 章中的升降模式搜索非常相似，但针对略有不同的用例进行了微调。


    理解了这些例子后，你现在应该了解：


    *   在度量表达式中，使用导航函数 `prev` 和 `next`（与 `final` 结合使用）来访问匹配范围之外的行。

    *   预先计算值，以实现更简单的模式匹配（测试一下它对性能是有害还是有帮助）。

    *   定义多个分类，用于在模式中查找任意分类或特定顺序的分类组合。


    有许多类似的时序（或仅仅是顺序）数据的用例，你都可以应用这些类型的模式搜索。


    想象一下打包你的汽车去度假。可能你的家人中有一个人具备那种 3D 直觉，能算出如何恰到好处地装进行李箱，这样这里有个空隙可以放一双靴子，那里有个角落可以放带给玛蒂尔达阿姨的形状奇怪的礼物。那个人总是负责打包；其他人则不插手，直到车装满为止。


    这种装箱技能在某些行业可能非常有价值，因为要编写一个能完美完成此任务的算法并非易事。其变体被称为 **装箱匹配**、**装箱问题**、**背包问题**、**切割库存问题**等。搜索这些术语，你会发现许多用于近似求解的算法，通常解的质量越好，运行时间就越长。


    最好的算法通常需要多次遍历数据或将数据存储在中间数组中以供查找。这些不容易转化为 SQL，甚至可能是那些在 SQL 中并非最优实现的代码示例。但是借助 `match_recognize`，你
    *可以* 实现一些简单且仍然相当有用的近似装箱匹配算法。

