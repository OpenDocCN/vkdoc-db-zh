    ## 经验教训


    我已经详细解释了带或不带 `DISTINCT` 和 `ALL` 的 `set` 与 `multiset` 操作符的变体，希望你现在能够：


    - 清晰区分 `UNION ALL` 和 `UNION`，这样就不会在不希望或不需要删除重复项时错误地使用 `UNION`。

    - 注意到集合操作符 `UNION`、`INTERSECT` 和 `MINUS` 默认为 `DISTINCT` 行为，而不像多重集合操作符 `MULTISET
    UNION`、`MULTISET INTERSECT` 和 `MULTISET EXCEPT` 默认为 `ALL` 行为。

    - 知道如何在数据库版本直接支持 `MINUS ALL` 的那一天到来之前，模拟它。


    这些知识可以让你避免在开发和测试环境中难以发现的无意识错误。


    # 3. 使用子查询分解进行分而治之


    每个程序员都曾在某个时候学习过 `模块化`——将代码拆分成更小的单元，每个单元解决整体中的一个独立部分，通常在过程式语言中以函数和过程的形式使用，例如在 PL/SQL
    中。在 SQL 中，视图有助于降低复杂性并提供可重用性。


    但模块化并不一定意味着全局可访问和可重用的单元。例如，在 PL/SQL 中，我可以在另一个函数或过程的声明部分创建本地函数和过程。这些代码单元仅具有本地作用域，并不作为对象存在于数据字典中——它们仅作为本地模块化来简化一个原本庞大的过程。


    在 SQL 中，有一个类似的机制称为 `子查询分解`，通常也称为 `WITH` 子句，有时也称为 `公共表表达式`、`语句作用域视图` 或 `命名查询块`（仅提及一些用于此的术语）。


    其思想（就像声明部分中的本地过程一样）是在 SQL 语句的一种“声明部分”中定义一个“本地视图”。这个“声明部分”本身就是 `WITH` 子句，其中定义的每个“本地视图”被称为
    `命名子查询`。这是一种在单个 SQL 语句内进行本地模块化的非常有用的技术。


    **提示**


    `WITH` 子句随着数据库版本的发展而演进，其功能远不止本章所示。更多内容将在后续章节中介绍。


    ## 产品和销售数据


    为了向你展示一个模块化 SQL 语句的例子，我将使用图 3-1 中所示的表。


    ![../images/475066_1_En_3_Chapter/475066_1_En_3_Fig1_HTML.jpg](img/475066_1_En_3_Fig1_HTML.jpg)


    图 3-1


    本章使用表 `product_alcohol` 和 `monthly_sales`


    在 `products` 表中存储着 Good Beer Trading Co 销售的啤酒。对于这些啤酒，关于其酒精含量的信息在表 `product_alcohol`
    中，而关于其月度销售的统计数据在表 `monthly_sales` 中。


    根据这些数据，我将创建 SQL 来找出哪些年份的销售额超过了 `abv`（酒精体积分数）列中酒精含量最低的那一半啤酒的平均值。

    '
- fmt: '## Best-selling years of the less strong beers


    The Good Beer Trading Co divides their beers into two halves – the half with the
    lowest alcohol percentage is defined as alcohol class 1, while the stronger half
    of the beers is alcohol class 2. I find out which are which in Listing [3-1](#475066_1_En_3_Chapter.xhtml#PC1).


    ```sql

    SQL> select

    2     pa.product_id as p_id

    3   , p.name        as product_name

    4   , pa.abv

    5   , ntile(2) over (

    6        order by pa.abv, pa.product_id

    7     ) as alc_class

    8  from product_alcohol pa

    9  join products p

    10     on p.id = pa.product_id

    11  order by pa.abv, pa.product_id;

    Listing 3-1

    Dividing the beers into alcohol class 1 and 2

    ```


    The analytic function `ntile()` in lines 5–7 assigns each row into buckets – the
    number of buckets being the argument. It will be assigned in the order given by
    the `order by` clause and such that the rows are distributed as evenly as possible.
    In this case with ten rows, the first five rows in order by `abv` will be assigned
    to bucket 1 and the last five rows to bucket 2:


    ```text

    P_ID  PRODUCT_NAME      ABV  ALC_CLASS

    6600  Hazy Pink Cloud   4    1

    6520  Der Helle Kumpel  4.5  1

    7870  Ghost of Hops     4.5  1

    5310  Monks and Nuns    5    1

    7950  Pale Rider Rides  5    1

    7790  Summer in India   5.5  2

    4160  Reindeer Fuel     6    2

    5430  Hercule Trippel   6.5  2

    4280  Hoppy Crude Oil   7    2

    4040  Coalminers Sweat  8.5  2

    ```


    So now in Listing [3-2](#475066_1_En_3_Chapter.xhtml#PC3), I can take just the
    beers with the value 1 in `alc_class`, join them to the `monthly_sales` table,
    and aggregate to show me yearly sales.


    ```sql

    SQL> select

    2     pac.product_id as p_id

    3   , extract(year from ms.mth) as yr

    4   , sum(ms.qty) as yr_qty

    5  from (

    6     select

    7        pa.product_id

    8      , ntile(2) over (

    9           order by pa.abv, pa.product_id

    10        ) as alc_class

    11     from product_alcohol pa

    12  ) pac

    13  join monthly_sales ms

    14     on ms.product_id = pac.product_id

    15  where pac.alc_class = 1

    16  group by

    17     pac.product_id

    18   , extract(year from ms.mth)

    19  order by p_id, yr;

    Listing 3-2

    Viewing yearly sales of the beers in alcohol class 1

    ```


    As analytic functions cannot be used in a `where` clause, I need to put the `ntile()`
    calculation in an inline view in lines 6–11. In line 15, I keep only those with
    `alc_class = 1`. The rest is a normal inner `join` and a `group by` to give me
    an output with 3 years of sales for each of the five beers:


    ```text

    P_ID  YR    YR_QTY

    5310  2016  478

    5310  2017  582

    5310  2018  425

    6520  2016  415

    6520  2017  458

    6520  2018  357

    6600  2016  121

    6600  2017  105

    6600  2018  98

    7870  2016  552

    7870  2017  482

    7870  2018  451

    7950  2016  182

    7950  2017  210

    7950  2018  491

    ```


    So far so good, now I build further upon that statement, so in Listing [3-3](#475066_1_En_3_Chapter.xhtml#PC5),
    I can get just those years where a given beer sold more than it sold in an average
    year for that beer.


    ```sql

    SQL> select

    2     p_id, yr, yr_qty

    3   , round(avg_yr) as avg_yr

    4  from (

    5     select

    6        pac.product_id as p_id

    7      , extract(year from ms.mth) as yr

    8      , sum(ms.qty) as yr_qty

    9      , avg(sum(ms.qty)) over (

    10           partition by pac.product_id

    11        ) as avg_yr

    12     from (

    13        select

    14           pa.product_id

    15         , ntile(2) over (

    16              order by pa.abv, pa.product_id

    17           ) as alc_class

    18        from product_alcohol pa

    19     ) pac

    20     join monthly_sales ms

    21        on ms.product_id = pac.product_id

    22     where pac.alc_class = 1

    23     group by

    24        pac.product_id

    25      , extract(year from ms.mth)

    26  )

    27  where yr_qty > avg_yr

    28  order by p_id, yr;

    Listing 3-3

    Viewing just the years that sold more than the average year per beer

    ```


    The code from Listing [3-3](#475066_1_En_3_Chapter.xhtml#PC5) I put inside the
    inline view in lines 5–25 with the addition of lines 9–11, where I calculate per
    beer what was sold in an average year using the analytic version of the `avg()`
    function. This enables me in line 27 to keep only those years where the sales
    were greater than the average year:


    ```text

    P_ID  YR    YR_QTY  AVG_YR

    5310  2017  582     495

    6520  2016  415     410

    6520  2017  458     410

    6600  2016  121     108

    7870  2016  552     495

    7950  2018  491     294

    ```


    There is nothing wrong as such with the query in Listing [3-3](#475066_1_En_3_Chapter.xhtml#PC5),
    but you can see that for each additional inline view I add, the statement becomes
    more complex and difficult to read. Indentation is absolutely essential to keep
    track of which `select` list belongs together with which `join` and `where` clause.
    If the statement grew just a little bigger, you couldn’t see the `select` list
    and the `where` clause together without scrolling.


    This is where the `with` clause comes in.'
  raw: '## Best-selling years of the less strong beers


    The Good Beer Trading Co divides their beers into two halves – the half with the
    lowest alcohol percentage is defined as alcohol class 1, while the stronger half
    of the beers is alcohol class 2\. I find out which are which in Listing [3-1](#475066_1_En_3_Chapter.xhtml#PC1).


    ```

    SQL> select

    2     pa.product_id as p_id

    3   , p.name        as product_name

    4   , pa.abv

    5   , ntile(2) over (

    6        order by pa.abv, pa.product_id

    7     ) as alc_class

    8  from product_alcohol pa

    9  join products p

    10     on p.id = pa.product_id

    11  order by pa.abv, pa.product_id;

    Listing 3-1

    Dividing the beers into alcohol class 1 and 2

    ```


    The analytic function `ntile` in lines 5–7 assigns each row into buckets – the
    number of buckets being the argument. It will be assigned in the order given by
    the `order by` clause and such that the rows are distributed as evenly as possible.
    In this case with ten rows, the first five rows in order by `abv` will be assigned
    to bucket 1 and the last five rows to bucket 2:


    ```

    P_ID  PRODUCT_NAME      ABV  ALC_CLASS

    6600  Hazy Pink Cloud   4    1

    6520  Der Helle Kumpel  4.5  1

    7870  Ghost of Hops     4.5  1

    5310  Monks and Nuns    5    1

    7950  Pale Rider Rides  5    1

    7790  Summer in India   5.5  2

    4160  Reindeer Fuel     6    2

    5430  Hercule Trippel   6.5  2

    4280  Hoppy Crude Oil   7    2

    4040  Coalminers Sweat  8.5  2

    ```


    So now in Listing [3-2](#475066_1_En_3_Chapter.xhtml#PC3), I can take just the
    beers with the value 1 in `alc_class`, join them to the `monthly_sales` table,
    and aggregate to show me yearly sales.


    ```

    SQL> select

    2     pac.product_id as p_id

    3   , extract(year from ms.mth) as yr

    4   , sum(ms.qty) as yr_qty

    5  from (

    6     select

    7        pa.product_id

    8      , ntile(2) over (

    9           order by pa.abv, pa.product_id

    10        ) as alc_class

    11     from product_alcohol pa

    12  ) pac

    13  join monthly_sales ms

    14     on ms.product_id = pac.product_id

    15  where pac.alc_class = 1

    16  group by

    17     pac.product_id

    18   , extract(year from ms.mth)

    19  order by p_id, yr;

    Listing 3-2

    Viewing yearly sales of the beers in alcohol class 1

    ```


    As analytic functions cannot be used in a `where` clause, I need to put the `ntile`
    calculation in an inline view in lines 6–11\. In line 15, I keep only those with
    `alc_class = 1`. The rest is a normal inner `join` and a `group by` to give me
    an output with 3 years of sales for each of the five beers:


    ```

    P_ID  YR    YR_QTY

    5310  2016  478

    5310  2017  582

    5310  2018  425

    6520  2016  415

    6520  2017  458

    6520  2018  357

    6600  2016  121

    6600  2017  105

    6600  2018  98

    7870  2016  552

    7870  2017  482

    7870  2018  451

    7950  2016  182

    7950  2017  210

    7950  2018  491

    ```


    So far so good, now I build further upon that statement, so in Listing [3-3](#475066_1_En_3_Chapter.xhtml#PC5),
    I can get just those years where a given beer sold more than it sold in an average
    year for that beer.


    ```

    SQL> select

    2     p_id, yr, yr_qty

    3   , round(avg_yr) as avg_yr

    4  from (

    5     select

    6        pac.product_id as p_id

    7      , extract(year from ms.mth) as yr

    8      , sum(ms.qty) as yr_qty

    9      , avg(sum(ms.qty)) over (

    10           partition by pac.product_id

    11        ) as avg_yr

    12     from (

    13        select

    14           pa.product_id

    15         , ntile(2) over (

    16              order by pa.abv, pa.product_id

    17           ) as alc_class

    18        from product_alcohol pa

    19     ) pac

    20     join monthly_sales ms

    21        on ms.product_id = pac.product_id

    22     where pac.alc_class = 1

    23     group by

    24        pac.product_id

    25      , extract(year from ms.mth)

    26  )

    27  where yr_qty > avg_yr

    28  order by p_id, yr;

    Listing 3-3

    Viewing just the years that sold more than the average year per beer

    ```


    The code from Listing [3-3](#475066_1_En_3_Chapter.xhtml#PC5) I put inside the
    inline view in lines 5–25 with the addition of lines 9–11, where I calculate per
    beer what was sold in an average year using the analytic version of the `avg`
    function . This enables me in line 27 to keep only those years where the sales
    were greater than the average year:


    ```

    P_ID  YR    YR_QTY  AVG_YR

    5310  2017  582     495

    6520  2016  415     410

    6520  2017  458     410

    6600  2016  121     108

    7870  2016  552     495

    7950  2018  491     294

    ```


