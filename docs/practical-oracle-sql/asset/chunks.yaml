    ### 多重集差集


    图 2-7 左侧的数据与之前顺序相同，展示了当我选取顾客 Hygge og Humle 的啤酒，并使用 `multiset except all` 减去顾客
    The White Hart 的啤酒后剩余的内容。使用 `all` 意味着它会考虑重复项出现的次数——第一位顾客有三行 Hoppy Crude Oil，而第二位顾客有两行，因此在减法输出中留下一行。


    在图 2-7 的中间部分，我仍然使用 `multiset except all`，但我交换了两位顾客，所以我选取 The White Hart 的啤酒并减去
    Hygge og Humle 的啤酒。原理同上，第一位顾客有两行 Der Helle Kumpel，而第二位顾客有一行，因此在输出中留下一行。当我切换到 `distinct`
    时，情况变得有趣起来。


    在图 2-7 的右侧，您可以看到当我使用 `multiset except distinct` 时，输出不再包含 Der Helle Kumpel。有人可能认为这应该像是从
    `multiset except all` 的输出中移除重复项，但事实并非如此。它是 *先* 从 *两个* 输入集合中移除重复项，*然后* 再进行减法运算。这意味着，使用
    `multiset except all` 显示的某些值，在使用 `multiset except distinct` 时可能会 *消失*。


    ![../images/475066_1_En_2_Chapter/475066_1_En_2_Fig7_HTML.jpg](img/475066_1_En_2_Fig7_HTML.jpg)


    图 2-7

    多重集差集所有与多重集差集唯一的区别


    在代码中展示相同操作，我只需更改清单 2-8 中的运算符即可得到图 2-7 的左侧输出：


    ```

    ...

    3     multiset except all

    ...

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_NAME_TYPE(5430,
    ''Hercule Trippel''))

    ```


    交换两个输入嵌套表列的顺序，得到图 2-7 的中间输出：


    ```

    SQL> select

    2     hyggehumle.product_coll

    3     multiset except all

    4     whitehart.product_coll

    ...

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(6520, ''Der Helle Kumpel''), ID_NAME_TYPE(6600,
    ''Hazy Pink Cloud''), ID_NAME_TYPE(7950, ''Pale Rider Rides''), ID_NAME_TYPE(7950,
    ''Pale Rider Rides''))

    ```


    最后切换到 `multiset except distinct` 会产生图 2-7 的右侧输出，您会注意到 Der Helle Kumpel 缺失了：


    ```

    SQL> select

    2     hyggehumle.product_coll

    3     multiset except distinct

    4     whitehart.product_coll

    ...

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(6600, ''Hazy Pink Cloud''), ID_NAME_TYPE(7950,
    ''Pale Rider Rides''))

    ```


    使用 `multiset except`，您可以像这里展示的那样在 `all` 和 `distinct` 之间选择，但对于集合运算符 `minus` 则不然。


    ## 减法运算符与多重集差集


    集合运算符通常比多重集运算符使用得更频繁，其中 `union all` 可能是使用最多的。但有时使用 `minus` 可以作为反连接（`not in` 和
    `not exists`）的一个不错的替代方案。


    我特意花了一些时间向您展示 `multiset except all` 和 `multiset except distinct` 之间的区别，为清单 2-9
    奠定基础，在那里我使用 `minus` 产生与刚才使用 `multiset except distinct` 相同的输出。


    ```

    SQL> select product_id as p_id, product_name

    2  from customer_order_products

    3  where customer_id = 50741

    4  minus

    5  select product_id as p_id, product_name

    6  from customer_order_products

    7  where customer_id = 50042

    8  order by p_id;

    清单 2-9

    减法运算符类似于多重集差集唯一

    ```


    由于 `minus` 在进行减法运算之前也会先移除输入集合的重复项，因此此输出中也没有 Der Helle Kumpel：


    ```

    P_ID PRODUCT_NAME

    ----- -----------------

    6600 Hazy Pink Cloud

    7950 Pale Rider Rides

    ```


    但是，如果我想要一个考虑重复项出现次数的输出呢？换句话说，即使 SQL 不支持，我如何才能得到一个 `minus all`？


    我已经向您展示过多重集运算符支持这个功能，所以我可以在清单 2-10 中利用这一点。


    ```

    SQL> select

    2     minus_all_table.id   as p_id

    3   , minus_all_table.name as product_name

    4  from table(

    5     cast(

    6        multiset(

    7           select product_id, product_name

    8           from customer_order_products

    9           where customer_id = 50741

    10        )

    11        as id_name_coll_type

    12     )

    13     multiset except all

    14     cast(

    15        multiset(

    16           select product_id, product_name

    17           from customer_order_products

    18           where customer_id = 50042

    19        )

    20        as id_name_coll_type

    21     )

    22  ) minus_all_table

    23  order by p_id;

    清单 2-10

    使用多重集差集所有模拟减法所有

    ```


    清单 2-9 中的两个 `select` 语句，我分别将它们放入一个 `multiset` 函数调用中（第 6-10 行和第 15-19 行），这将行集转换为多重集（嵌套表）。但我不能只是将其转换为“通用”类型；我必须使用
    `cast` 函数来指定我要创建的嵌套表类型，这里是 `id_name_coll_type`。


    这样我现在有了两个多重集，因此我可以在第 13 行使用 `multiset except all` 将一个从另一个中减去。这个减法运算的结果我放在第 4 行的
    `table` 函数中，该函数将多重集（嵌套表）转换回行集，因此查询产生了我想要的输出：


    ```

    P_ID PRODUCT_NAME

    ----- -----------------

    6520 Der Helle Kumpel

    6600 Hazy Pink Cloud

    7950 Pale Rider Rides

    7950 Pale Rider Rides

    ```


    它运行良好，并且展示的技术有时可以在集合和多重集之间来回切换时派上用场。但对于这个特定用例来说，这有点杀鸡用牛刀，因为我可以更简单地通过使用分析函数来模拟
    `minus all`，如清单 2-11 所示。


    ```

    SQL> select

    2     product_id as p_id

    3   , product_name

    4   , row_number() over (

    5        partition by product_id, product_name

    6        order by rownum

    7     ) as rn

    8  from customer_order_products

    9  where customer_id = 50741

    10  minus

    11  select

    12     product_id as p_id

    13   , product_name

    14   , row_number() over (

    15        partition by product_id, product_name

    16        order by rownum

    17     ) as rn

    18  from customer_order_products

    19  where customer_id = 50042

    20  order by p_id;

    清单 2-11

    使用分析 row_number 函数模拟减法所有

    ```

    '
- fmt: 'What I do here is that I add a column that uses `row_number()` to create a
    consecutive numbering 1, 2, 3 … for each distinct value combination of `product_id`
    and `product_name`. This way the implicit `DISTINCT` performed by the `MINUS`
    operator removes no rows, since the addition of the consecutive numbers in the
    `rn` column makes all rows unique.


    That means that the first customer will have two rows with Der Helle Kumpel, one
    getting `rn=1` and the other getting `rn=2`. While the second customer only has
    one row, so it gets `rn=1`. The use of `MINUS` then means that the row with `rn=1`
    is subtracted away, but the row with `rn=2` stays, as you can see in the output:


    ```

    P_ID PRODUCT_NAME      RN

    ----- ----------------- --

    6520 Der Helle Kumpel   2

    6600 Hazy Pink Cloud    1

    7950 Pale Rider Rides   1

    7950 Pale Rider Rides   2

    ```


    The code in Listing [2-11](#475066_1_En_2_Chapter.xhtml#PC29) might not be much
    shorter than Listing [2-10](#475066_1_En_2_Chapter.xhtml#PC27), but it is a solution
    that does not require creating of a nested table type, and the analytic function
    is less overhead than what is needed for converting collection types back and
    forth. So until a future SQL release gives us `MINUS ALL`, this is a nice way
    to emulate it.


    **Tip**


    In a future database release (probably 20c), the set operators `INTERSECT` and
    `EXCEPT` will also support the keyword `ALL`, just like `UNION` and the multiset
    operators. Then you won’t need a workaround like the ones shown here to emulate
    `MINUS ALL`, but can do it directly.


    ## Lessons learned


    I have explained in detail about the variants of `set` and `multiset` operators
    with or without `DISTINCT` and `ALL`, so that hopefully you now will


    - Distinguish clearly between `UNION ALL` and `UNION`, so you won’t fall into
    the mistake of using `UNION` when you don’t want or need duplicates removed.

    - Be aware that set operators `UNION`, `INTERSECT`, and `MINUS` default to `DISTINCT`
    behavior, unlike the multiset operators `MULTISET UNION`, `MULTISET INTERSECT`,
    and `MULTISET EXCEPT` that default to `ALL` behavior.

    - Know how to emulate `MINUS ALL` until the day comes where the database version
    supports it directly.


    This knowledge can save you from unwitting mistakes that can be hard to find in
    development and test environments.


    # 3. Divide and Conquer with Subquery Factoring


    Every programmer has at some point learned about `modularization` – splitting
    the code into smaller units each solving a distinct part of the whole, typically
    used in procedural languages as functions and procedures, like in PL/SQL. In SQL
    there are views to help reduce complexity and provide reusability.


    But modularization does not necessarily mean globally accessible and reusable
    units. For example, in PL/SQL I can create local functions and procedures in the
    declaration section of another function or procedure. These code units have only
    local scope and do not exist as objects in the data dictionary – they only serve
    as local modularization to simplify an otherwise large procedure.


    In SQL there is a similar mechanism called `subquery factoring`, also commonly
    known as the `WITH` clause or sometimes `common table expressions`, `statement
    scoped views`, or `named query blocks` (just to mention some of the terms used
    for this).


    The idea is (just like local procedures in a declaration section) to define a
    “local view” in a kind of “declaration section” of the SQL statement. This “declaration
    section” itself is the `WITH` clause, and each “local view” defined in it is called
    a `named subquery`. It is a very useful technique for local modularization within
    a single SQL statement.


    **Tip**


    The `WITH` clause has evolved over versions of the database and can do much more
    than just what is shown in this chapter. More on that to come in later chapters.


    ## Products and sales data


    To show you an example of modularizing a SQL statement, I will use the tables
    shown in Figure [3-1](#475066_1_En_3_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_3_Chapter/475066_1_En_3_Fig1_HTML.jpg](images/475066_1_En_3_Chapter/475066_1_En_3_Fig1_HTML.jpg)


