- fmt: '## About the code


    The major part of this book is code – SQL, SQL, and more SQL. To really learn
    from it, you should run the code yourself, play with it, alter it and see what
    happens, and fool around until you feel confident that you’ve “got it.” Now that
    wouldn’t be fun if you had to type in everything by yourself, so all of the code
    in the book is available as source files for you.


    ### Source files


    You can get the source files for the book from GitHub via the book’s page on Apress:


    `www.apress.com/9781484256169`


    What you will find is these files:


    *   `practical_readme.txt` – A short readme describing the other files.

    *   `practical_create_schema.sql` – All the example objects reside in a schema
    called `practical` (similar to the Oracle-supplied sample schemas `scott` and
    `hr`). This script creates the `practical` schema with necessary privileges and
    should be run as a DBA user. If your environment enforces complex passwords, you
    may need to edit this script to give the `practical` user a more complex password
    than `practical`.

    *   `practical_fill_schema.sql` – Once you have created the `practical` schema,
    log in as user `practical` – the password is `practical` unless you changed it
    in the preceding file. Then run this script to create all the example objects
    – tables, views, types, packages, and so on.

    *   `practical_clean_schema.sql` – This script is also to be run as user `practical`.
    It drops everything that was created with `practical_fill_schema.sql`. You can
    try things yourself and change the examples and manipulate the data all you want
    – when you are done, you can return to a fresh example schema by running `practical_clean_schema.sql`
    followed by `practical_fill_schema.sql`.

    *   `practical_drop_schema.sql` – If you want to completely get rid of the example
    schema `practical`, you can run this script as a DBA user.

    *   `ch_{chapter_name}.sql` – Each of the 22 chapters has its own example file
    with the code from the listings in each chapter. Do note, however, that every
    listing that is DDL (creation of views, object types, etc.) is not in the chapter
    SQL file but in `practical_fill_schema.sql` instead. This way every dictionary
    object is created and dropped together, and the chapter example scripts do not
    need to worry about cleaning up in the dictionary.


    All of the scripts and examples are meant as learning inspiration and should not
    be installed in productive environments. They are for your use as a learning tool
    and should be treated as such.


    ### The schema


    You should think of the `practical` schema as part of an application used by a
    fictional company called **Good Beer Trading Co**. Almost all of the examples
    are based on tasks that such an application could need to do – also in real life.
    Admitted, a few cases are slightly contrived, but most could have been taken straight
    from real applications. For example, all techniques shown in Part 2 are directly
    taken from code I have developed myself during the 16 years I mentioned in the
    preceding text – I have only adapted them to my `practical` example tables shown
    in Figure 1.


    ![../images/475066_1_En_BookFrontmatter_Fig1_HTML.jpg](images/475066_1_En_BookFrontmatter_Fig1_HTML.jpg)

    *Figure 1: The tables in the practical schema*


    The only table in the schema that has no relation to Good Beer Trading Co is the
    table `conway_gen_zero` used in Chapter 6. The other tables are all related to
    the fictional company, each table being used in one or more of the chapters.


    ### Versions and environment


    Almost all of the code examples were developed using the Database App Development
    VM pre-built VirtualBox image that can be downloaded from Oracle, specifically
    the version that contains Oracle Database 12c Enterprise Edition Release 12.2.0.1.0
    – 64bit Production. A few examples require database version 18c or 19c; for those
    I have used either newer VM images or `livesql.oracle.com`.


    In general a lot of the examples shown in Part 1 and Part 2 will work even on
    database versions that are no longer supported. Where versions higher than 12.2
    are required, this is explicitly noted. If relevant, I’ve also noted from which
    version specific syntax is supported, but I have not explicitly indicated a from-version
    for everything. If you are still using unsupported versions, I will leave it up
    to you to test if a given syntax works in your specific environment.


    During development, I used Oracle SQL Developer version 18.2. Screenshots of ER
    diagrams are also taken from this SQL Developer version. Code examples were executed
    using SQLcl release 4.2, mostly using `set sqlformat ansiconsole`, except for
    a few cases using traditional SQL∗Plus style formatting. These cases are noted
    in the source code files.


    When you try the code yourself, I recommend opening the files in Oracle SQL Developer
    or TOAD or PLSQL Developer or your favorite SQL IDE. Run each statement individually,
    inspecting results in the grid instead of relying on my formatting, which is optimized
    for getting an output that fits on a printed page. That way you can also very
    easily alter the statement a bit and try to execute it again and compare changes
    in the output.


    Most diagram figures were created by using various APEX graph and diagram components
    in a workspace on `apex.oracle.com` that I use to fiddle about working with small
    APEX pages.


    ## A final word


    Maybe you are under the impression that if SQL is slightly more complex than a
    two-table join, then it is only for geniuses to attempt and you won’t even try
    it. I assure you this is not the case.


    Expertise comes from practice. Confidence comes from familiarity. You should just
    go ahead and write slightly more complex SQL tomorrow, then slightly more the
    day after, and so on. Over time it will become as familiar to you as whatever
    other language you’ve worked in for years, and you will say to yourself: “What
    was I afraid of?”


    I am confident this book will give you a jump start in your journey toward *really*
    using the power of SQL.


    ## Acknowledgments


    Uncountable are the number of people inspiring me over the years learning – and
    eventually teaching – SQL. The space allows me only to acknowledge a few that
    have been of the greatest importance to me. If you are not mentioned, don’t worry;
    you have still been an invaluable inspiration.


    My first and greatest inspiration was – and still is – Tom Kyte. I have learned
    so much from his books and from AskTom. Without him as my role model, I am not
    sure I would have gotten involved in the community, sharing knowledge and blogging,
    and certainly I would not have ended up writing a book.


    Second on my list is Steven Feuerstein himself, author of books that many of us
    consider definitive sources. I thank Steven for giving me the chance to write
    SQL quizzes for the Oracle Dev Gym (`devgym.oracle.com`). Teaching is the best
    way to learn something, and having to come up with new quizzes every week is an
    opportunity for me to read up on all aspects of SQL.


    Everybody involved in sharing knowledge in the community and user groups are also
    inspirations for me. This is exemplified beautifully by ODTUG and everybody attending
    the Kscope yearly conferences. I’ve attended every year since 2010 and I wouldn’t
    have been where I am now without my Kscope network.


    Last but definitely not least, I must not forget to acknowledge Stew Ashton. He
    is the grand master of row pattern matching in SQL, and he has graciously given
    me permission to take great inspiration for several chapters of Part 3 from his
    blog (`stewashton.wordpress.com`).


    ## About the Author


