    previous queries; this time I get three distinct matches, one for each of the
    three V shapes in the graph:


    ```

    SYMBOL  DAY         MATCH  CLASS  PREV  PRICE

    BEER    2019-04-02  1      DOWN   14.9  14.2

    BEER    2019-04-03  1      SAME   14.2  14.2

    BEER    2019-04-04  1      UP     14.2  15.7

    BEER    2019-04-05  2      DOWN   15.7  15.6

    BEER    2019-04-08  2      DOWN   15.6  14.8

    BEER    2019-04-09  2      SAME   14.8  14.8

    BEER    2019-04-10  2      DOWN   14.8  14

    BEER    2019-04-11  2      UP     14    14.4

    BEER    2019-04-12  2      UP     14.4  15.2

    BEER    2019-04-15  3      DOWN   15.2  15

    BEER    2019-04-16  3      DOWN   15    13.7

    BEER    2019-04-17  3      UP     13.7  14.3

    BEER    2019-04-18  3      SAME   14.3  14.3

    BEER    2019-04-19  3      UP     14.3  15.5

    ```


    Having a pattern now that matches multiple rows, it makes sense to condense the
    output to show me `one row per match`, like in Listing [17-3](#475066_1_En_17_Chapter.xhtml#PC12)
    in line 11. But then I need some other changes as well.


    In the `measures,` I now use navigational functions `first` and `last` in lines
    8–9 to get the first and last day of each match, and I use aggregate `count` in
    line 10 to find how many days each match covers.


    Using `one` `row per match` `,` I also no longer get all columns in the output;
    here I only get what I use in `partition by` as well as all the `measures`, which
    means that in the `order by` in line 20, I cannot use column `day,` but need to
    use measure `first_day`.


    ```

    SQL> select *

    2  from ticker

    3  match_recognize (

    4     partition by symbol

    5     order by day

    6     measures

    7        match_number() as match

    8      , first(day)     as first_day

    9      , last(day)      as last_day

    10      , count(*)       as days

    11     one row per match

    12     pattern (

    13        (down | same)+ (up | same)+

    14     )

    15     define

    16        down as price  prev(price)

    18      , same as price = prev(price)

    19  )

    20  order by symbol, first_day;

    Listing 17-3

    Output a single row for each match

    ```


    My output is now condensed to a single row with data for each of the three V shapes
    in the graph:


    ```

    SYMBOL  MATCH  FIRST_DAY   LAST_DAY    DAYS

    BEER    1      2019-04-02  2019-04-04  3

    BEER    2      2019-04-05  2019-04-12  6

    BEER    3      2019-04-15  2019-04-19  5

    ```


    But hang on; I’m not quite happy with this – each matched V shape seems to start
    a day too late? When I mark out the three matches on the graph in Figure [17-3](#475066_1_En_17_Chapter.xhtml#Fig3),
    it is quite clear I’m not getting the entire V shape.


    ![../images/475066_1_En_17_Chapter/475066_1_En_17_Fig3_HTML.jpg](images/475066_1_En_17_Chapter/475066_1_En_17_Fig3_HTML.jpg)


    Figure 17-3


    The three V shapes not quite entirely matched


    OK, I can try adding a STRT to my pattern to match any row as the beginning of
    the V shape. I simply add that to my `pattern` in line 13:


    ```

    ...

    13        strt (down | same)+ (up | same)+

    ...

    ```


    And it helps for the first match, but not the second and third:


    ```

    SYMBOL  MATCH  FIRST_DAY   LAST_DAY    DAYS

    BEER    1      2019-04-01  2019-04-04  4

    BEER    2      2019-04-05  2019-04-12  6

    BEER    3      2019-04-15  2019-04-19  5

    ```


    The reason is that I have not defined what `match_recognize` should do after it
    has found a match – where should it start looking for the next match. When I do
    not specify anything, it defaults to jumping to the row *right after* the match
    and starts looking there. It behaves just as if I had specified this line 12 in
    the query:


    ```

    ...

    11     one row per match

    12     after match skip past last row

    13     pattern (

    ...

    ```


    The `after match` clause tells where to start looking for a new match after a
    match has finished, and the default is `skip past last row`. But starting the
    search for a new match at the row *after* the last row of the previous match is
    the reason why match 2 starts on 2019-04-05 instead of 2019-04-04 as I would have
    liked it.


    If there had been an option `after match skip to last row`, this would have been
    exactly what I want. But such an option does not exist; it is invalid syntax.
    Instead I need to use the syntax `after match skip to last {definition name}`.


    My problem then is that I do not know if the last row of the match was classified
    `up` or `same`; it could be either one. And in `skip to` I need to specify a single
    classification definition name. The solution is to use the `subset` clause here
    in line 16 to make a definition name of a subset that covers both `up` and `same`:


    ```

    ...

    11     one row per match

    12     after match skip to last up_or_same

    13     pattern (

    14        strt (down | same)+ (up | same)+

    15     )

    16     subset up_or_same = (up, same)

    17     define

    18        down as price  prev(price)

    20      , same as price = prev(price)

    21  )

    22  order by symbol, first_day;

    ```


    Using the subset `up_or_same` in the `after match skip to last` clause in line
    12 gives me the desired effect, which is that a search for a new match is begun
    on the *same* row as the last row of the previous match. This means that the last
    day of one match is also included in the next match as the first day, as seen
    here in the output and in Figure [17-4](#475066_1_En_17_Chapter.xhtml#Fig4):


    ![../images/475066_1_En_17_Chapter/475066_1_En_17_Fig4_HTML.jpg](images/475066_1_En_17_Chapter/475066_1_En_17_Fig4_HTML.jpg)


    Figure 17-4


    The three V shapes entirely matched


    ```

    SYMBOL  MATCH  FIRST_DAY   LAST_DAY    DAYS

    BEER    1      2019-04-01  2019-04-04  4

    BEER    2      2019-04-04  2019-04-12  7

    BEER    3      2019-04-12  2019-04-19  6

    ```'
