    26      , classifier() as class

    27      , final sum(visits) as t_v

    28      , round(final avg(visits), 1) as d_v

    29      , round(

    30           (100 * final avg(visits) / avg_visits) - 100

    31         , 1

    32        ) as d_pct

    33     one row per match

    34     after match skip past last row

    35     pattern ( high{1,} | medium{2,} | low{3,} )

    36     define

    37        high   as visits / avg_visits >= 4

    38      , medium as visits / avg_visits >= 2

    39      , low    as visits / avg_visits >= 1.1

    40  )

    41  order by page_no, from_day;

    Listing 20-11

    Finding multiple peak classifications simultaneously

    ```


    In lines 37–39 instead of just the single peak, I define three different classifications
    named high, medium, and low – each with a different minimum ratio between the
    day’s visits and the average visits. The high is a ratio of at least 4, meaning
    the day’s visits must be at least 400% of the average or 300% higher than the
    average, similar for the other definitions.


    In the pattern in line 35, I state that a match must be either at least one high
    row or at least two medium rows or at least three low rows. A single low spike
    can be random, but three days in a row can be interesting to look at:


    ```

    URL          AVG_V  FROM_DAY    DAYS  CLASS   T_V   D_V    D_PCT

    /Shop        97.3   2019-04-12  4     MEDIUM  1039  259.8  166.8

    /Categories  56.4   2019-04-28  1     HIGH    360   360    538.1

    /Breweries   43.1   2019-04-05  4     LOW     217   54.3   26

    /About       4.5    2019-04-04  3     LOW     36    12     165.6

    /About       4.5    2019-04-27  3     LOW     31    10.3   128.8

    ```


    I see in the output all the three different types of peaks has been found.


    Note


    The two last low peaks found both have an average daily visit count that is more
    than 100% larger than the total average, or in other words a ratio greater than
    2 – so why are they not classified medium? In order to see why, switch for all
    rows per match, and remove all final keywords – I’ll leave that as an exercise
    for you. You will find that the answer is that the first row of each of those
    periods has a ratio between 1.1 and 2, so it is classified low. Therefore, the
    next rows will not be tested as to whether they are medium or high, since that
    would be impossible according to the pattern. The only viable pattern that starts
    with a low row is to find at least three low rows, so the second and third rows
    in the bottom two matches are only evaluated as having a ratio of at least 1.1,
    which is true (even though they actually have a ratio of at least 2).


