    142  Harold King         13

    144    Axel de Proef     4

    151      Jim Kronzki     2

    150        Laura Jensen  0

    154        Simon Chang   0

    148      Maria Juarez    0

    147    Ursula Mwbesi     7

    146      Lim Tok Lo      3

    152        Evelyn Smith  0

    149        Kurt Zollman  0

    155        Susanne Hoff  0

    143      Mogens Juel     2

    153        Dan Hoeffler  0

    145        Zoe Thorston  0

    ```


    输出正是我想要的，但我多次访问了表的相同行——比如 Simon Chang 被访问了四次：在标量子查询中，对于树中他上面的三个人各访问了一次，然后在主查询中轮到他时又访问了一次。此外，每次访问树中的一个叶节点时，数据库都会查询他/她下面是否有人，所以
    Simon 被访问的四次也引发了四次对他是否有下属的查找。


    总而言之，这对数据库来说是大量重复性的工作。但幸运的是，我有办法减少这项工作量。

    '
- fmt: '### Counting with row pattern matching


    Using row pattern matching, I can create the query shown in Listing [22-3](#475066_1_En_22_Chapter.xhtml#PC5),
    which only needs to do the hierarchical query a single time and then do all the
    necessary counts on the retrieved tree without accessing the tables over and over
    again.


    ```

    SQL> with hierarchy as (

    2     select

    3        lvl, id, name, rownum as rn

    4     from (

    5        select

    6           level as lvl, e.id, e.name

    7        from employees e

    8        start with e.supervisor_id is null

    9        connect by e.supervisor_id = prior e.id

    10        order siblings by e.name

    11     )

    12  )

    13  select

    14     id

    15   , lpad('' '', (lvl-1)*2) || name as name

    16   , subs

    17  from hierarchy

    18  match_recognize (

    19     order by rn

    20     measures

    21        strt.rn           as rn

    22      , strt.lvl          as lvl

    23      , strt.id           as id

    24      , strt.name         as name

    25      , count(higher.lvl) as subs

    26     one row per match

    27     after match skip to next row

    28     pattern (

    29        strt higher*

    30     )

    31     define

    32        higher as higher.lvl > strt.lvl

    33  )

    34  order by rn;

    Listing 22-3

    Counting subordinates with match_recognize

    ```


    The output of Listing [22-3](#475066_1_En_22_Chapter.xhtml#PC5) is exactly the
    same as the output of Listing [22-2](#475066_1_En_22_Chapter.xhtml#PC3). I’ll
    tell you how it works:


    *   I’m using a `with` clause for clarity as I taught you in Chapter [3](#475066_1_En_3_Chapter.xhtml).


    *   Inside the `with` clause lines 5–10 is an inline view containing the basic
    hierarchical query I’ve already shown you in the previous listings. Notice the
    `order by` in line 10 is inside the inline view.


    *   I place it in an inline view so that I can use `rownum` in line 3 (outside
    the inline view) and save it as column alias `rn`. I need to preserve the hierarchical
    ordering created by the inline view when I do my row pattern matching – this allows
    me to do so.


    *   Building my `match_recognize` clause, I start by defining in line 32 that
    a row that has a higher level than the starting row of the pattern is classified
    as `higher` – meaning that when it has a higher level, then it is a child/grandchild/greatgrandchild/…
    of the starting row (i.e., a subordinate).


    *   Of course, not everybody in the entire row set with a higher level is a subordinate
    – only those consecutive rows with a higher level that follow the row itself.
    Once I reach someone with the same level (or lower), then I am no longer within
    the subtree I want. I solve this in the pattern in line 29 by looking for a `strt`
    row (which is undefined and therefore can be any row) followed by zero or more
    `higher` rows – when a row is reached that is no longer classified `higher`, the
    match stops.


    *   In line 26, I’ve specified `one row per match`, and the employee I’m interested
    in outputting data from is the `strt` row, so I’m using `strt` columns in the
    measures in lines 21–24.


    *   In line 25, I’m doing a `count` on how many `higher` rows were in the match.
    If I just did a plain `count(*),` I’d be including the `strt` row, but on that
    row anything I qualify with `higher` will be `null`, so counting `higher.lvl`
    gives me a count only of the higher rows, which is the count of subordinates that
    I want.


    *   With `after match skip to next row` in line 27, I’m specifying that once it
    has finished with a match of one `strt` row and zero or more `higher` rows, it
    should move to the next row that follows after the `strt` row. This is the part
    that makes rows be counted more than once – I’ll explain in detail shortly.


    That’s all clear, right? Well, I’ll dive a little more into the details to clarify
    why it works.


    **Note**


    A few words on why you’d consider using the long and somewhat convoluted Listing
    [22-3](#475066_1_En_22_Chapter.xhtml#PC5) instead of the short and clear Listing
    [22-2](#475066_1_En_22_Chapter.xhtml#PC3).


    I tested this on an employee table where I had 14001 employees in it.


    The scalar subquery method used about 11 seconds, nearly half a million consistent
    gets, and over 37000 sorts, due to a full table scan and many, many index range
    scans for the `connect by` processing.


    The `match_recognize` method used less than half a second, 55 consistent gets,
    and four (four!) sorts, with just a single full table scan.


    Your mileage will vary, of course, so test it yourself.'
