    8      , first(day)     as first_day

    9      , last(day)      as last_day

    10      , count(*)       as days

    11     one row per match

    12     after match skip to last up

    13     pattern (

    14        strt down+ up+ down+ up+

    15     )

    16     define

    17        down as price <= prev(price)

    19  )

    20  order by symbol, first_day;

    Listing 17-6

    寻找W形态的首次尝试

