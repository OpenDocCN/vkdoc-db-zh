    `supervisor_id` 列是一个自引用外键，它引用了主键 `id`。只有一个人没有上司——公司的老板——对于其他所有人，`supervisor_id`
    包含了他们在员工层级中直属上司的 `id`。因此，我可以用清单 22-1 向你展示表中的树形数据。


