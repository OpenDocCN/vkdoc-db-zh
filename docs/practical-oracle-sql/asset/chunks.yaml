    20        ol.p_id\n21      , sum(ol.qty) as qty\n22     from olines ol\n23   \
    \  group by ol.p_id\n24  ), fifo as (\n25     select\n26        wh, ai, pos, p_id,\
    \ loc_q\n27      , least(loc_q, ord_q - acc_prv_q) as pick_q\n28      , acc_prv_q\
    \ + 1                   as from_q\n29      , least(acc_prv_q + loc_q, ord_q) as\
    \ to_q\n30     from (\n31        select\n32           i.product_id as p_id\n33\
    \         , ob.qty       as ord_q\n34         , i.qty        as loc_q\n35    \
    \     , nvl(sum(i.qty) over (\n              partition by i.product_id\n     \
    \         order by i.purchased, i.qty\n              rows between unbounded preceding\
    \ and 1 preceding\n           ), 0)        as acc_prv_q\n36         , i.purchased\n\
    37         , i.warehouse  as wh\n38         , i.aisle      as ai\n39         ,\
    \ i.position   as pos\n40        from orderbatch ob\n41        join inventory_with_dims\
    \ i\n42           on i.product_id = ob.p_id\n43     )\n44  )\n45  select\n46 \
    \    f.wh, f.ai, f.pos, f.p_id\n47   , f.pick_q, f.from_q as p_f_q, f.to_q as\
    \ p_t_q\n48   , o.o_id, o.from_q as o_f_q, o.to_q as o_t_q\n49  from fifo f\n\
    50  join olines o\n51     on o.p_id = f.p_id\n52     and o.from_q <= f.to_q\n\
    53     and o.to_q >= f.from_q\n54     and o.from_q <= f.to_q\n55  order by f.p_id,\
    \ f.from_q, o.from_q;\n清单 13-14\n连接重叠的拣货与订单数量区间\n```\n\n我使用三个 `with` 子句子查询构建了这个查询：\n\
    \n*   首先，我创建了 `olines`，即清单 13-13，它计算了订单行项目的数量区间。\n*   然后是 `orderbatch`，类似于我在清单\
    \ 13-12 中的做法，只是我在第 22 行使用 `olines` 进行聚合，而不是 `orderlines` 表，因为 `olines` 已经包含了所需的订单行项目。\n\
    *   第三个子查询是 `fifo`，它也来自清单 13-12，负责构建包含数量区间的 FIFO 拣货。\n\n然后主查询基于产品 ID 和重叠的数量区间，对\
    \ `fifo` 和 `olines` 进行连接。在结果输出中，拣货的起止区间显示为 `p_f_q` / `p_t_q`，订单行项目的起止区间显示为 `o_f_q`\
    \ / `o_t_q`（短列名有利于打印）：\n\n```\nWH  AI  POS  P_ID  PICK_Q  P_F_Q  P_T_Q  O_ID \
    \ O_F_Q  O_T_Q\n1   C   1    4280  36      1      36     422   1      80\n1  \
    \ D   18   4280  39      37     75     422   1      80\n2   B   3    4280  35\
    \      76     110    422   1      80\n2   B   3    4280  35      76     110  \
    \  423   81     140\n2   C   20   4280  30      111    140    423   81     140\n\
    1   A   29   6520  14      1      14     422   1      80\n2   B   5    6520  14\
    \      15     28     422   1      80\n1   C   13   6520  20      29     48   \
    \  422   1      80\n2   B   26   6520  24      49     72     422   1      80\n\
    2   D   9    6520  26      73     98     422   1      80\n2   D   9    6520  26\
    \      73     98     423   81     120\n1   A   16   6520  22      99     120 \
    \   423   81     120\n```\n\n在第一行，全部 36 个都流向了订单 422。同样，在第二行，全部 39 个也都流向了订单 422。\n\
    \n但接下来的 35 个拣货数量是第 76-110 个（总共 140 个），这与订单 422（第 1-80 个）和订单 423（第 81-140 个）都重叠。从这些重叠部分可以看出，35\
    \ 个中的 5 个（第 76-80 个）应流向订单 422，35 个中的 30 个（第 81-110 个）应流向订单 423。\n\n在清单 13-15 中，我计算了这一点，同时也稍微清理了一下查询，不显示中间计算列。\n\
    \n```\nSQL> with olines as (\n...\n18  ), orderbatch as (\n...\n24  ), fifo as\
    \ (\n...\n49  )\n50  select\n51     f.wh, f.ai, f.pos, f.p_id\n52   , f.pick_q,\
    \ o.o_id\n53   , least(\n54        f.loc_q\n55      , least(o.to_q, f.to_q) -\
    \ greatest(o.from_q, f.from_q) + 1\n56     ) as q_f_o\n57  from fifo f\n58  join\
    \ olines o\n59     on o.p_id = f.p_id\n60     and o.to_q >= f.from_q\n61     and\
    \ o.from_q <= f.to_q\n62  order by f.p_id, f.from_q, o.from_q;\n清单 13-15\n每次拣货的数量分别流向了哪个订单，各是多少\n\
    ```\n\n第 53-56 行计算了“流向订单的数量” (`q_f_o`)，取的是库位上的数量或“重叠区间的大小”这两者中较小的一个。结果是以下输出，包含了拣货操作员所需的全部信息：\n\
    \n```\nWH  AI  POS  P_ID  PICK_Q  O_ID  Q_F_O\n1   C   1    4280  36      422\
    \   36\n1   D   18   4280  39      422   39\n2   B   3    4280  35      422  \
    \ 5\n2   B   3    4280  35      423   30\n2   C   20   4280  30      423   30\n\
    1   A   29   6520  14      422   14\n2   B   5    6520  14      422   14\n1  \
    \ C   13   6520  20      422   20\n2   B   26   6520  24      422   24\n2   D\
    \   9    6520  26      422   8\n2   D   9    6520  26      423   18\n1   A   16\
    \   6520  22      423   22\n```\n\n这样就解决了第三个问题；现在，完成解决方案只需要将问题 2 和问题 3 的解法结合起来，拣货操作员就能以高效的拣货路线进行批次拣货了。"
- fmt: '### Finalizing the complete picking SQL


    I have Listing [13-15](#475066_1_En_13_Chapter.xhtml#PC35) for batch picking and
    Listing [13-8](#475066_1_En_13_Chapter.xhtml#PC20) for a good picking route. Combining
    the two in Listing [13-16](#475066_1_En_13_Chapter.xhtml#PC37) gives me the complete
    solution.


    ```sql

    SQL> with olines as (

    ...

    18  ), orderbatch as (

    ...

    24  ), fifo as (

    ...

    49  ), pick as (

    50     select

    51        f.wh, f.ai

    52      , dense_rank() over (

    53           order by wh, ai

    54        ) as ai#

    55      , f.pos, f.p_id

    56      , f.pick_q, o.o_id

    57      , least(

    58           f.loc_q

    59         , least(o.to_q, f.to_q) - greatest(o.from_q, f.from_q) + 1

    60        ) as q_f_o

    61     from fifo f

    62     join olines o

    63        on o.p_id = f.p_id

    64        and o.to_q >= f.from_q

    65        and o.from_q <= f.to_q

    66  )

    67  select

    68     p.wh, p.ai, p.pos

    69   , p.p_id, p.pick_q

    70   , p.o_id, p.q_f_o

    71  from pick p

    72  order by p.wh

    73         , p.ai#

    74         , case

    75              when mod(p.ai#, 2) = 1 then +p.pos

    76                                     else -p.pos

    77           end;

    Listing 13-16

    The ultimate FIFO batch picking SQL statement

    ```


    The `with` clause subqueries `olines`, `orderbatch`, and `fifo` are the same as
    Listing [13-15](#475066_1_En_13_Chapter.xhtml#PC35). Then the main query from
    Listing [13-15](#475066_1_En_13_Chapter.xhtml#PC35) I have put into subquery `pick`
    in lines 49–66.


    I’ve added the calculation of the “visited aisle number” `ai#` (from Listing [13-8](#475066_1_En_13_Chapter.xhtml#PC20))
    in lines 52–54.


    Then the main query is simply selecting the necessary information from the `pick`
    subquery and using the `order by` from Listing [13-8](#475066_1_En_13_Chapter.xhtml#PC20)
    to give an optimal picking route:


    ```

    WH  AI  POS  P_ID  PICK_Q  O_ID  Q_F_O

    1   A   16   6520  22      423   22

    1   A   29   6520  14      422   14

    1   C   13   6520  20      422   20

    1   C   1    4280  36      422   36

    1   D   18   4280  39      422   39

    2   B   26   6520  24      422   24

    2   B   5    6520  14      422   14

    2   B   3    4280  35      422   5

    2   B   3    4280  35      423   30

    2   C   20   4280  30      423   30

    2   D   9    6520  26      422   8

    2   D   9    6520  26      423   18

    ```


    Where a location is repeated on the list, like `2 B 3`, you can see that it shows
    `35` should be picked, `5` of which are to be placed in the package for order
    `422` and `30` are for the package for order `423`.


    With this list, the picking operator will be led in a good route through the warehouses,
    picking products for a batch of multiple orders, where the products have been
    selected by the first-in, first-out principle.


    In total this is practically a complete warehouse goods picking app in a single
    SQL statement.


    ## Lessons learned


    This chapter has shown you the building of a single SQL app with multiple uses
    of analytic functions that have given you knowledge on


    *   Using the window clause to apply analytic `sum` to a subset of the rows to
    find the subset that gives a sufficiently large result

    *   Calculating intervals with analytic rolling sums to find overlapping intervals

    *   Assigning `dense_rank` to results for alternating ascending and descending
    ordering


    When you understand how to build a statement like this piece by piece with analytic
    functions, you can create many similar statements that contain a lot of business
    logic, thereby achieving an app with a lot better performance than extracting
    the data and doing the same logic procedurally.


    # 14. Analyzing Activity Logs with Lead


    Logs can be many things, and sometimes you are lucky that each line of the log
    is self-contained and has all the data you need to analyze the log. But most often
    a row in a log table pinpoints that at *this* exact moment in time, *this* specific
    activity occurred – and the interesting fact you need to analyze is how long time
    there was *between* rows in the log.


    This is where analytic functions `lag` and `lead` come in very handy, as they
    can be used on a given row to retrieve information from previous rows (`lag`)
    or next rows (`lead`) in a given order. You can often choose to use either `lag`
    or `lead` depending on how you build your logic, but most often the deciding factor
    will be *when* the row is inserted in the activity log. If the row is inserted
    at the start of the activity, the time of the activity is the time between this
    row and the *next* row, so `lead` is the sensible choice. Contrariwise, if the
    row is inserted when the activity is finished, the time of the activity is the
    time between the *previous* row and this row, and then the use of `lag` makes
    sense.


    Where I worked when I created this type of code first, there was an automatic
    warehouse with robot picking, so the operator stood in a fixed position, boxes
    came on a conveyor belt to him, he picked products, the box moved away, and a
    new one came. Departures and arrivals of the boxes were logged, which meant that
    the time from a box arrived until it departed was the time used for picking, while
    the time from the box departed until the next box arrived was waiting time. With
    the use of `lead` SQL similar to what I show here, we could analyze when there
    was too much waiting time and use that information to tune the robot warehouse.


    The Good Beer Trading Co in this book does not have a robot warehouse, but I showed
    picking optimization in the previous chapter. Now I can follow up in this chapter
    with analyzing how much time was used picking vs. driving around in the warehouse.'
