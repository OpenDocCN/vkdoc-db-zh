  raw: '## Delimited lists of products


    As examples, I am going to create text strings with comma-separated lists of product
    names that the company sells, using the tables shown in Figure [10-1](#475066_1_En_10_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_10_Chapter/475066_1_En_10_Fig1_HTML.jpg](images/475066_1_En_10_Chapter/475066_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    The tables used in this chapter


    For most of the examples in the chapter, I am going to use the tables `breweries`,
    `products,` and `purchases` joined together in the view `brewery_products` shown
    in Listing [10-1](#475066_1_En_10_Chapter.xhtml#PC1). At the end of the chapter,
    I’ll be using `monthly_sales` and `products` to create an artificially long string
    that won’t fit in a regular `varchar2`.


    ```

    SQL> create or replace view brewery_products

    2  as

    3  select

    4     b.id   as brewery_id

    5   , b.name as brewery_name

    6   , p.id   as product_id

    7   , p.name as product_name

    8  from breweries b

    9  cross join products p

    10  where exists (

    11     select null

    12     from purchases pu

    13     where pu.brewery_id = b.id

    14     and   pu.product_id = p.id

    15  );

    Listing 10-1

    View of which products are purchased at which breweries

    ```


    This view examines all combinations of the breweries and the beers if the beer
    has been purchased at some time from that brewery. The result – shown in Listing
    [10-2](#475066_1_En_10_Chapter.xhtml#PC2) – is a list that shows which beer is
    purchased at which brewery.


    ```

    SQL> select *

    2  from brewery_products

    3  order by brewery_id, product_id;

    BREWERY_ID  BREWERY_NAME        PRODUCT_ID  PRODUCT_NAME

    518         Balthazar Brauerei  5310        Monks and Nuns

    518         Balthazar Brauerei  5430        Hercule Trippel

    518         Balthazar Brauerei  6520        Der Helle Kumpel

    523         Happy Hoppy Hippo   6600        Hazy Pink Cloud

    523         Happy Hoppy Hippo   7790        Summer in India

    523         Happy Hoppy Hippo   7870        Ghost of Hops

    536         Brewing Barbarian   4040        Coalminers Sweat

    536         Brewing Barbarian   4160        Reindeer Fuel

    536         Brewing Barbarian   4280        Hoppy Crude Oil

    536         Brewing Barbarian   7950        Pale Rider Rides

    Listing 10-2

    The breweries and products

    ```


    In the next section, I’ll show multiple ways to create a variant of this list
    with just three rows – one for each brewery containing a column with a comma-separated
    list of all the beer names of that brewery.


    ## String aggregation


    You know the function `sum` is an aggregate function that adds numbers. I’m about
    to demonstrate various aggregate functions that concatenate strings instead; therefore,
    this is called *string aggregation*. You can find other methods if you search
    the Internet or forums – I’ll just highlight four methods that each have some
    pros and cons.


    ### Aggregate function listagg


    In version 11.2, a new built-in function appeared called `listagg` – it is by
    definition the very function to use for string aggregation (just as `sum` is the
    function for additive number aggregation).


    It requires a little more syntax than the simple `sum` function, but it is not
    hard to use as you can see in Listing [10-3](#475066_1_En_10_Chapter.xhtml#PC3).


    ```

    SQL> select

    2     max(brewery_name) as brewery_name

    3   , listagg(product_name, '','') within group (

    4        order by product_id

    5     ) as product_list

    6  from brewery_products

    7  group by brewery_id

    8  order by brewery_id;

    Listing 10-3

    Using listagg to create product list

    ```


    In line 3, I use `listagg` with two parameters: the first is the string column
    or expression I want to aggregate, and the second (optional) is the delimiter
    to put between the strings in the aggregated result. If you don’t provide a delimiter
    parameter, the default is `null` which simply concatenates the strings without
    any delimiter between them.


    After the parameters, the `within group` is mandatory and requires me to specify
    an `order by` (line 4) that tells Oracle in which order the strings should be
    aggregated.


    With those keywords, Listing [10-3](#475066_1_En_10_Chapter.xhtml#PC3) produces
    this output that has the beers purchased at each brewery in a comma-separated
    string, where the beers are ordered by `product_id`:


    ```

    BREWERY_NAME        PRODUCT_LIST

    Balthazar Brauerei  Monks and Nuns,Hercule Trippel,Der Helle Kumpel

    Happy Hoppy Hippo   Hazy Pink Cloud,Summer in India,Ghost of Hops

    Brewing Barbarian   Coalminers Sweat,Reindeer Fuel,Hoppy Crude Oil,Pale Rider
    Rides

    ```


    Suppose I want the beers ordered alphabetically in the product list? That’s very
    easy; I just need to change the `order by` clause inside `within group`:


    ```

    ...

    4        order by product_name

    ...

    ```


    And now the beers are alphabetically listed:


    ```

    BREWERY_NAME        PRODUCT_LIST

    Balthazar Brauerei  Der Helle Kumpel,Hercule Trippel,Monks and Nuns

    Happy Hoppy Hippo   Ghost of Hops,Hazy Pink Cloud,Summer in India

    Brewing Barbarian   Coalminers Sweat,Hoppy Crude Oil,Pale Rider Rides,Reindeer
    Fuel

    ```


    The function `listagg` is easy to use and as a built-in highly performant. There
    are just a few drawbacks:


    *   It cannot return a string larger than a `varchar2` – either 4.000 or 32.767
    bytes depending on your database setting. (Though there’s support for handling
    such situations – more on that later.)


    *   Before version 19c, it cannot do a `distinct` aggregation.


    *   It does not exist in versions before 11.2.


    But in all other cases, `listagg` should be your first choice when considering
    string aggregation. If, however, you *do* find yourself in one of those situations,
    there are alternatives.'
  trans: "\n## 产品分隔列表\n\n作为示例，我将创建一些文本字符串，这些字符串包含公司销售的产品名称的逗号分隔列表，并使用图 10-1 中所示的表格。\n\
    \n![../images/475066_1_En_10_Chapter/475066_1_En_10_Fig1_HTML.jpg](img/475066_1_En_10_Fig1_HTML.jpg)\n\
    \n图 10-1：本章使用的表格\n\n对于本章的大部分示例，我将使用代码清单 10-1 中所示的视图 `brewery_products` 中连接在一起的\
    \ `breweries`、`products` 和 `purchases` 表。在本章末尾，我将使用 `monthly_sales` 和 `products`\
    \ 来创建一个无法放入常规 `varchar2` 的超长字符串。\n\n```\nSQL> create or replace view brewery_products\n\
    \ 2  as\n 3  select\n 4     b.id   as brewery_id\n 5   , b.name as brewery_name\n\
    \ 6   , p.id   as product_id\n 7   , p.name as product_name\n 8  from breweries\
    \ b\n 9  cross join products p\n 10  where exists (\n 11     select null\n 12\
    \     from purchases pu\n 13     where pu.brewery_id = b.id\n 14  and   pu.product_id\
    \ = p.id\n 15  );\n```\n*代码清单 10-1: 哪些产品在哪些酒厂被采购的视图*\n\n该视图检查酒厂和啤酒的所有组合，前提是该啤酒曾在某个时间从该酒厂采购过。结果——如代码清单\
    \ 10-2 所示——是一个列表，显示哪种啤酒在哪个酒厂被采购。\n\n```\nSQL> select *\n 2  from brewery_products\n\
    \ 3  order by brewery_id, product_id;\n \nBREWERY_ID  BREWERY_NAME        PRODUCT_ID\
    \  PRODUCT_NAME\n518         Balthazar Brauerei  5310        Monks and Nuns\n\
    518         Balthazar Brauerei  5430        Hercule Trippel\n518         Balthazar\
    \ Brauerei  6520        Der Helle Kumpel\n523         Happy Hoppy Hippo   6600\
    \        Hazy Pink Cloud\n523         Happy Hoppy Hippo   7790        Summer in\
    \ India\n523         Happy Hoppy Hippo   7870        Ghost of Hops\n536      \
    \   Brewing Barbarian   4040        Coalminers Sweat\n536         Brewing Barbarian\
    \   4160        Reindeer Fuel\n536         Brewing Barbarian   4280        Hoppy\
    \ Crude Oil\n536         Brewing Barbarian   7950        Pale Rider Rides\n```\n\
    *代码清单 10-2: 酒厂和产品*\n\n在下一节中，我将展示多种方法来创建此列表的一个变体，该变体仅包含三行——每个酒厂一行，并包含一个列，其中包含该酒厂所有啤酒名称的逗号分隔列表。\n\
    \n## 字符串聚合\n\n你知道函数 `sum()` 是一个用于数字求和的聚合函数。我即将展示的是各种连接字符串的聚合函数；因此，这被称为字符串聚合。如果你在互联网或论坛上搜索，可以找到其他方法——我将只重点介绍四种各有优缺点的方法。\n\
    \n### 聚合函数 listagg\n\n在 11.2 版本中，出现了一个名为 `listagg()` 的新内置函数——顾名思义，它就是用于字符串聚合的专用函数（就像\
    \ `sum()` 是用于加法数字聚合的函数一样）。\n\n它比简单的 `sum()` 函数需要多一点语法，但正如你在代码清单 10-3 中所见，它并不难使用。\n\
    \n```\nSQL> select\n 2     max(brewery_name) as brewery_name\n 3   , listagg(product_name,\
    \ ',') within group (\n 4        order by product_id\n 5     ) as product_list\n\
    \ 6  from brewery_products\n 7  group by brewery_id\n 8  order by brewery_id;\n\
    ```\n*代码清单 10-3: 使用 listagg 创建产品列表*\n\n在第 3 行，我使用 `listagg()` 并带有两个参数：第一个是我想要聚合的字符串列或表达式，第二个（可选）是分隔符，用于放在聚合结果中的字符串之间。如果你不提供分隔符参数，默认值是\
    \ `null`，即只是简单地连接字符串，中间不加任何分隔符。\n\n在参数之后，`within group` 子句是强制性的，它要求我指定一个 `order\
    \ by`（第 4 行），以告知 Oracle 字符串应按什么顺序聚合。\n\n有了这些关键字，代码清单 10-3 产生以下输出，其中每个酒厂采购的啤酒以逗号分隔的字符串形式列出，且啤酒按\
    \ `product_id` 排序：\n\n```\nBREWERY_NAME        PRODUCT_LIST\nBalthazar Brauerei\
    \  Monks and Nuns,Hercule Trippel,Der Helle Kumpel\nHappy Hoppy Hippo   Hazy Pink\
    \ Cloud,Summer in India,Ghost of Hops\nBrewing Barbarian   Coalminers Sweat,Reindeer\
    \ Fuel,Hoppy Crude Oil,Pale Rider Rides\n```\n\n假设我想让产品列表中的啤酒按字母顺序排序？这非常简单；我只需更改\
    \ `within group` 内部的 `order by` 子句：\n\n```\n...\n 4        order by product_name\n\
    ...\n```\n\n现在啤酒就按字母顺序列出了：\n\n```\nBREWERY_NAME        PRODUCT_LIST\nBalthazar\
    \ Brauerei  Der Helle Kumpel,Hercule Trippel,Monks and Nuns\nHappy Hoppy Hippo\
    \   Ghost of Hops,Hazy Pink Cloud,Summer in India\nBrewing Barbarian   Coalminers\
    \ Sweat,Hoppy Crude Oil,Pale Rider Rides,Reindeer Fuel\n```\n\n`listagg()` 函数易于使用，并且作为内置函数，它具有很高的性能。只是存在几个缺点：\n\
    \n*   它无法返回大于 `varchar2` 的字符串——根据你的数据库设置，要么是 4,000 字节，要么是 32,767 字节。（尽管有支持处理此类情况的方法——稍后会详述。）\n\
    *   在 19c 版本之前，它不能进行 `distinct` 聚合。\n*   在 11.2 之前的版本中不存在。\n\n但在所有其他情况下，当你考虑字符串聚合时，`listagg()`\
    \ 应该是你的首选。然而，如果你*确实*发现自己身处上述情况之一，也存在替代方案。\n"
- fmt: '### Aggregate function collect


    One of the alternatives you can consider if you have one of the special cases
    is to aggregate into a collection (nested table type) using the `collect` function
    and then build the string from the collection.


    So to make this work, I need to define the two objects shown in Listing [10-4](#475066_1_En_10_Chapter.xhtml#PC7).
    The first is a nested table type `name_coll_type` of `varchar2` in the size I
    need – in this case `20 char` – I just need to represent that as `80 bytes`. This
    is due to a bug – see the note for further explanation.


    ```

    SQL> create or replace type name_coll_type

    2     as table of varchar2(80 byte);

    3  /

    SQL> create or replace function name_coll_type_to_varchar2 (

    2     p_name_coll    in name_coll_type

    3   , p_delimiter    in varchar2 default null

    4  )

    5     return varchar2

    6  is

    7     v_name_string  varchar2(4000 char);

    8  begin

    9     for idx in p_name_coll.first..p_name_coll.last

    10     loop

    11        if idx = p_name_coll.first then

    12           v_name_string := p_name_coll(idx);

    13        else

    14           v_name_string := v_name_string

    15                         || p_delimiter

    16                         || p_name_coll(idx);

    17        end if;

    18     end loop;

    19     return v_name_string;

    20  end name_coll_type_to_varchar2;

    21  /

    ```


    Listing 10-4

    Collection type and function to convert collection to string


    The second object I define is the function `name_coll_type_to_varchar2` that converts
    the collection to a delimited string. It simply loops over the elements of the
    collection and keeps concatenating them unto the string variable to be returned
    – with a delimiter between each if such parameter has been given.


    **Note**


    Type `name_coll_type` should really be `varchar2(20 char)`, but unfortunately
    this causes an error due to a bug in Oracle. It is only a problem if you have
    a database with a multi-byte character set (as I use `AL32UTF8`) and use `char`
    semantics defining your `varchar2` columns. This combination confuses `collect`.


    I’ve seen the bug in versions 12.2 and 18.3, and others have verified it in 11.2.
    You can see if it has been fixed in future releases on My Oracle Support by searching
    for bug 29195635. When the bug has been fixed, you can change to the correct datatype
    – until then the workaround is to use `varchar2(80 byte)` which is the maximum
    number of bytes that a `varchar2(20 char)` can be in `AL32UTF8`.


    So armed with these two objects, I can now use them together with the built-in
    `collect` and `cast` functions as I show in Listing [10-5](#475066_1_En_10_Chapter.xhtml#PC8).


    ```

    SQL> select

    2     max(brewery_name) as brewery_name

    3   , name_coll_type_to_varchar2(

    4        cast(

    5           collect(

    6              product_name

    7              order by product_id

    8           )

    9           as name_coll_type

    10        )

    11      , '',''

    12     ) as product_list

    13  from brewery_products

    14  group by brewery_id

    15  order by brewery_id;

    ```


    Listing 10-5

    Using collect and the created function


    How does it work? Well, starting from the inside of the expression, this is what
    happens:


    *   The `collect` function in lines 5–8 takes the `product_name` and aggregates
    it into a collection that’ll be ordered by `product_id`. But this is a “generic”
    collection type used internally by the database; we need to tell which *real*
    collection type it should be put in.

    *   So therefore in lines 4 and 9–10, I am using `cast` to specify I want the
    collection type `name_coll_type`.

    *   Now I have a collection of the correct type to call function `name_coll_type_to_varchar2`
    in line 3, and in line 11, I specify that a comma should be used as a delimiter
    in the resulting string.


    The output of Listing [10-5](#475066_1_En_10_Chapter.xhtml#PC8) is identical to
    that of Listing [10-3](#475066_1_En_10_Chapter.xhtml#PC3) using `listagg`.


    This method of using `collect` can be a workaround for all three drawbacks of
    `listagg`:


    *   It can be used in versions before 11.2.

    *   It supports distinct in the `collect` function, even you are not yet using
    version 19c.

    *   If needed, you can easily make a function `name_coll_type_to_clob` to handle
    cases where the result won’t fit in a `varchar2`.


    As I have the APEX packages installed in my database, I can even use this method
    without having to create my own custom nested table type and function. With the
    APEX installation comes a type `apex_t_varchar2`, and the package `apex_string`
    has a function `join` that does the same as my `name_coll_type_to_varchar2` function.


    So I can adapt Listing [10-5](#475066_1_En_10_Chapter.xhtml#PC8) to using APEX
    functionality by just changing lines 3 and 9:


    ```

    ...

    3   , apex_string.join(

    ...

    9           as apex_t_varchar2

    ...

    ```


    And this will work even if I am not using any APEX applications, just as long
    as the APEX API packages are installed in my database.'
