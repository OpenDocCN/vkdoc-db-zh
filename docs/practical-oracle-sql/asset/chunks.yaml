    in which she had 3 years of monthly sales data for one of our products and then
    a series of columns that successively calculated the intermediate steps in the
    model, ending with the forecast for the next year.


    The problem for her was that this spreadsheet was nice but could only operate
    on a single product. We had 100.000 products we needed to forecast. Therefore
    she really wished the forecast could be performed right inside the database with
    SQL.


    With the help of analytic functions for averaging and linear regression, I could
    implement the same forecasting model in SQL, doing a series of calculations that
    emulated the calculations of each separate column of the spreadsheet. In this
    chapter I will show you this step by step.


    Note


    The spreadsheet made by our analyst that I used as basis for developing this SQL
    was based on the work by Robert Nau, Fuqua School of Business, Duke University,
    who has written about it here, where you can download a similar spreadsheet: [*http://people.duke.edu/~rnau/411outbd.htm*](http://people.duke.edu/%257Ernau/411outbd.htm).


    ## Sales forecasting


    To demonstrate this time series forecasting model, I am going to use monthly sales
    data for the beers that my fictional Good Beer Trading Co sells. I have those
    data in the tables of Figure [15-1](#475066_1_En_15_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_15_Chapter/475066_1_En_15_Fig1_HTML.jpg](images/475066_1_En_15_Chapter/475066_1_En_15_Fig1_HTML.jpg)


    Figure 15-1


    Table with monthly sales for products


    There are more beers in the products table, but I am going to concentrate on two
    that have a nice seasonal variation in their sales – one sold primarily wintertime
    and one sold primarily summertime. Listing [15-1](#475066_1_En_15_Chapter.xhtml#PC1)
    shows the two beers queried by primary key id values.


    ```

    SQL> select id, name

    2  from products

    3  where id in (4160, 7790);

    Listing 15-1

    The two products for showing forecasting

    ```


    So you can see that if I query sales data for product ids 4160 and 7790, I will
    get data for Reindeer Fuel and Summer in India:


    ```

    ID NAME

    ---------- --------------------

    4160 Reindeer Fuel

    7790 Summer in India

    ```


    I have the sales data for 2016, 2017, and 2018, and besides having nice seasonal
    variations, Reindeer Fuel is selling a bit more each year, while Summer in India
    is selling a bit less. Now it’s time to try and apply this time series forecasting
    model to the data and forecast the sales of 2019.'
  trans: '# 第 15 章 使用线性回归进行预测


    ## 预热：行模式匹配


    `match_recognize`子句（正式名称为行模式匹配）是 SQL 开发人员工具箱中一个非常强大的工具。本书的第 3 部分将专门介绍使用此子句的各种方法。


    但本章我展示的内容，实际上是在检测数据中的模式并进行分组——即从`D`到`A`再到一个或多个`P`，最后回到`D`的活动周期模式。我曾通过刻意为`ignore
    nulls`子句创建`null`值，运用了分析函数工具箱中的一些实用技巧来创建周期分组，但代码清单 14-7 和 14-8 中的代码实际上做了什么，其逻辑相对晦涩难懂。


    使用行模式匹配，我可以编写如代码清单 14-9 所示的 SQL 语句，乍一看可能显得更加晦涩，但一旦你了解了`match_recognize`，这实际上（请相信我）更具可读性。


    ```

    SQL> select

    2     *

    3  from (

    4     select

    5        list.picker_emp_id as emp

    6      , list.id            as list

    7      , log.log_time

    8      , log.activity       as act

    9     from picking_list list

    10     join picking_log log

    11        on log.picklist_id = list.id

    12  )

    13  match_recognize (

    14     partition by list

    15     order by log_time

    16     measures

    17        max(emp) as emp

    18      , first(log_time) as begin_cycle

    19      , round(

    20           (arrive.log_time - first(depart.log_time))

    21         * (24*60*60)

    22        ) as drive

    23      , round(

    24           (last(pick.log_time) - arrive.log_time)

    25         * (24*60*60)

    26        ) as pick

    27      , round(

    28           (next(last(pick.log_time)) - last(pick.log_time))

    29         * (24*60*60)

    30        ) as pack

    31     one row per match

    32     after match skip to last arrive

    33     pattern (depart arrive pick* depart{0,1})

    34     define

    35        depart as act = ''D''

    36      , arrive as act = ''A''

    37      , pick   as act = ''P''

    38  )

    39  order by list;

    代码清单 14-9

    使用行模式匹配识别拣货周期

    ```


    此时我不会深入讲解语法，但我邀请你在读完第 3 部分后回到这里，再次阅读这个代码清单，看看你是否同意（在掌握了相关语法知识后）代码的功能更加清晰明了。


    但这里你可以注意到的重要一点是，在第 34-37 行，我进行了一些定义：`act = ''D''`的行被称为`depart`，`arrive`和`pick`同理。然后在第
    33 行，我可以轻松地声明一个拣货周期包含一个`depart`，后跟一个`arrive`，再后跟零个或多个`pick`，最后跟零个或一个`depart`。你会注意到这与正则表达式语法的相似性。（零个或多个以及零个或一个的部分是为了处理每个拣货行程结束时的不完整拣货周期。）


    正如代码清单 14-9 产生的输出与代码清单 14-7 相同，我也可以从代码清单 14-10 中获得与代码清单 14-8 相同的统计输出。


    ```

    SQL> select

    2     max(emp) as emp

    3   , list

    4   , min(begin_cycle) as begin

    5   , count(*) as drvs

    6   , round(avg(drive), 1) as avg_d

    7   , count(pick) as stops

    8   , round(avg(pick), 1) as avg_pick

    9   , round(avg(pack), 1) as avg_pack

    10  from (

    ...

    19  )

    20  match_recognize (

    ...

    45  )

    46  group by list

    47  order by list;

    代码清单 14-10

    使用行模式匹配获取每个拣货单的统计数据

    ```


    我希望我已经激发了你对本书第 3 部分的兴趣。当你完成第 3 部分的学习后，请回到这里并尝试运行这些代码。


    ## 经验总结


    本章的技术是分析函数如何使你能够跨行使用数据进行行间计算的经典示例。你尤其看到了以下应用：


    *   使用`lead`获取下一行的数据，或使用带可选参数的`lead`获取之后第 n 行的数据

    *   使用`lead`的`ignore nulls`子句从下一行获取非空值，你可以自定义该值，使其仅在你希望`lead`获取数据的那些行上非空

    *   使用带`ignore nulls`子句的`last_value`，在一组属于同一集合的行上设置一个共同值，并基于该共同值进行分组或透视


    这些都是在许多情况下非常有用的技巧。如果使用这些技巧变得过于复杂，我建议考虑使用`match_recognize`（第 3 部分的主题）作为替代方案，它通常非常适合这些情况。


    几年前，在我工作的一家零售公司，我们的数据分析师来找我。她正在预测我们每种产品在未来 12 个月的销量，并想知道我是否能帮忙开发一段 SQL 来实现这个功能。


    这样的预测可以通过多种不同的模型来完成，每种模型适用于不同类型的数据和情况。她已经用工具进行了试验，研究并测试了选定产品的模型，并运用了数据分析师用来在我们的数据中发现规律的所有神奇方法。在这个过程中，她发现对于我们这种情况，一个非常适用的销售预测模型是具有季节性调整和指数平滑的时间序列模型。


    为了帮助我理解这个模型并实现它，她带来了一个 Excel 电子表格。其中包含了我们一种产品过去 3 年的月度销售数据，然后是一系列列，这些列依次计算了模型中的中间步骤，最后得出下一年的预测结果。


    对她来说，问题是这个电子表格虽然很好，但只能处理单一产品。而我们有 10 万种产品需要预测。因此，她非常希望预测可以直接在数据库中用 SQL 完成。


    借助用于平均和线性回归的分析函数，我可以在 SQL 中实现相同的预测模型，通过一系列计算来模拟电子表格中每一列的计算过程。在本章中，我将一步步向你展示如何实现。


    注意

    我们分析师制作的、作为我开发此 SQL 基础的电子表格，是基于杜克大学福库商学院 Robert Nau 的工作成果，他撰写了相关内容，你可以在此处下载类似的电子表格：[*http://people.duke.edu/~rnau/411outbd.htm*](http://people.duke.edu/%7Ernau/411outbd.htm)。


    ## 销售预测


    为了演示这个时间序列预测模型，我将使用我虚构的“好啤酒贸易公司”所售啤酒的月度销售数据。这些数据存储在图 15-1 所示的表中。


    ![../images/475066_1_En_15_Chapter/475066_1_En_15_Fig1_HTML.jpg](img/475066_1_En_15_Fig1_HTML.jpg)


    图 15-1


    产品月度销售数据表


    产品表中还有更多啤酒，但我将重点关注两种销售有明显季节性变化的啤酒——一种主要在冬季销售，另一种主要在夏季销售。代码清单 15-1 显示了通过主键 ID 值查询到的两种啤酒。


    ```

    SQL> select id, name

    2  from products

    3  where id in (4160, 7790);

    代码清单 15-1

    用于展示预测的两种产品

    ```


    因此你可以看到，如果我查询产品 ID 为 4160 和 7790 的销售数据，我将得到“驯鹿燃料”（Reindeer Fuel）和“印度之夏”（Summer
    in India）的数据：


    ```

    ID NAME

    ---------- --------------------

    4160 Reindeer Fuel

    7790 Summer in India

    ```


    我拥有 2016 年、2017 年和 2018 年的销售数据。除了具有明显的季节性变化外，“驯鹿燃料”的年销量在一点点增长，而“印度之夏”的年销量则在一点点减少。现在是时候尝试将这个时间序列预测模型应用于数据，预测
    2019 年的销量了。'
- fmt: '# Time series


    The first thing to do in time series forecasting is to build the time series,
    which is a set of consecutive data each being exactly one time unit apart. In
    this case I am using months for time unit. I have 3 years = 36 months of actual
    data, and I want to forecast 1 year = 12 months, so I need to create a time series
    of 48 rows for each beer in Listing 15-2.


    ```sql

    SQL> select

    2     ms.product_id

    3   , mths.mth

    4   , mths.ts

    5   , extract(year from mths.mth) as yr

    6   , extract(month from mths.mth) as mthno

    7   , ms.qty

    8  from (

    9     select

    10        add_months(date ''2016-01-01'', level - 1) as mth

    11      , level as ts --time series

    12     from dual

    13     connect by level <= 48

    14  ) mths

    15  left outer join (

    16     select product_id, mth, qty

    17     from monthly_sales

    18     where product_id in (4160, 7790)

    19  ) ms

    20     partition by (ms.product_id)

    21     on  ms.mth = mths.mth

    22  order by ms.product_id, mths.mth;

    Listing 15-2

    Building time series 2016–2019 for the two beers

    ```


    The inline view `mths` in lines 9–13 creates 48 rows, one for each month in 2016–2019.
    The column `mth` contains the month as a `date` datatype, which I need to join
    with the sales data. Column `ts` contains consecutive numbers 1–48, which I can
    think of as number of “time unit,” in this case number of months.


    Inline view `ms` in lines 16–18 simply queries the `monthly_sales` table for the
    two products I’m after – when I’m happy with my model, I can simply remove line
    18 and run for all products instead of only two.


    The `left outer join` between the two inline views is partitioned in line 20 on
    the product id, which means that the 48 rows of `mths` will be outer joined individually
    to each product – first outer joined to the 36 rows of product 4160 and then outer
    joined to the 36 rows of product 7790.


    In total I get 96 rows in the output, partially shown here:


    ```

    PROD MTH      TS    YR MTHNO  QTY

    ---- ------- --- ----- ----- ----

    4160 2016-01   1  2016     1   79

    4160 2016-02   2  2016     2  133

    ...

    4160 2018-11  35  2018    11   73

    4160 2018-12  36  2018    12  160

    4160 2019-01  37  2019     1

    4160 2019-02  38  2019     2

    ...

    4160 2019-11  47  2019    11

    4160 2019-12  48  2019    12

    7790 2016-01   1  2016     1    4

    7790 2016-02   2  2016     2    6

    ...

    7790 2018-11  35  2018    11    3

    7790 2018-12  36  2018    12    5

    7790 2019-01  37  2019     1

    7790 2019-02  38  2019     2

    ...

    7790 2019-11  47  2019    11

    7790 2019-12  48  2019    12

    96 rows selected.

    ```


    For each product, the first 36 rows contain actual sales data in column `qty`
    and then 12 rows (`ts` = 37–48) with null in `qty` – these 12 rows are to be filled
    with the forecast sales as I continue developing the query.


    In the preceding output, I only showed parts of the rows; since it is easier for
    us humans to grasp such data if presented visually, the complete result set I
    show in Figure 15-2.


    ![Figure 15-2](images/475066_1_En_15_Chapter/475066_1_En_15_Fig2_HTML.jpg)


    Figure 15-2: The monthly sales 2016–2018 plus rows in the time series for 2019
    forecast


    The two lines are the sales for the two beers, and then at the end, there is the
    12 months I’m going to forecast. So let me start by generating the values I need
    for the linear regression.


    ## Calculating the basis for regression


    In principle I could just do a linear regression on the sales data just as they
    are, but that would just give me a straight line in 2019, not a forecast that
    takes into account that the beers sell well in specific seasons of the year. With
    the forecasting model I’ve chosen, I will get a forecast that takes into account
    the seasons and the trend over the years and smooths out irregular outliers.


    The first value I need to calculate is the *centered moving average*, so I take
    my time series code from Listing 15-2 and place it in a `with` clause named `s1`.
    That enables me to `select` from `s1` in Listing 15-3.


    ```sql

    SQL> with s1 as (

    ...      /* Listing 15-2 minus order by */

    23  )

    24  select

    25     product_id, mth, ts, yr, mthno, qty

    26   , case

    27        when ts between 7 and 30 then

    28           (nvl(avg(qty) over (

    29              partition by product_id

    30              order by ts

    31              rows between 5 preceding and 6 following

    32           ), 0) + nvl(avg(qty) over (

    33              partition by product_id

    34              order by ts

    35              rows between 6 preceding and 5 following

    36           ), 0)) / 2

    37        else

    38           null

    39     end as cma -- centered moving average

    40  from s1

    41  order by product_id, mth;

    Listing 15-3: Calculating centered moving average

    ```


    What happens here is the following:


    *   In lines 28–31, I calculate the average quantity sold in a moving window of
    12 months `between 5 preceding and 6 following`. That’s the monthly average sales
    measured over a year, but slightly “off center,” since I have 5 months before,
    then the current month, and then 6 months after.

    *   So in lines 32–26, I calculate another monthly average sales measured over
    a year, but this time `between 6 preceding and 5 following`, so I’m slightly off
    center in the other direction.

    *   Adding these two together and dividing by two (lines 28, 32, and 36) gives
    me the average of these two “off center” averages, and that is what is called
    *centered moving average*.

    *   If I calculated this for all 36 months of my sales data, I would get wrong
    values at both ends, because they would not be calculated for the entire 12-month
    periods. Therefore, I use a case structure in lines 26–27 and 37–38 to skip the
    first 6 months and the last 6 months of the 36 and only calculate `cma` for month
    numbers 7–30 (that’s the `ts`–time series–column).


    So when I plot in `cma` on the graph in Figure 15-3, you can see it’s a slowly
    rising line covering the “middle” two years of the sales period. (To keep the
    graphs clearly separable, from now I’m only showing one of the beers – Reindeer
    Fuel. At the end of the chapter, I’ll show the final graphs for both beers.)


    ![Figure 15-3](images/475066_1_En_15_Chapter/475066_1_En_15_Fig3_HTML.jpg)


    Figure 15-3: Centered moving average for Reindeer Fuel


    Having calculated `cma`, I put that calculation into a new `with` clause named
    `s2` and proceed to calculate *seasonality factor* in Listing 15-4.


    ```sql

    SQL> with s1 as (

    ...     /* Listing 15-2 minus order by */

    23  ), s2 as (

    ...     /* Listing 15-3 final query minus order by */

    41  )

    42  select

    43     product_id, mth, ts, yr, mthno, qty, cma

    44   , nvl(avg(

    45        case qty

    46           when 0 then 0.0001

    47           else qty

    48        end / nullif(cma, 0)

    49     ) over (

    50        partition by product_id, mthno

    51     ),0) as s -- seasonality

    52  from s2

    53  order by product_id, mth;

    Listing 15-4: Calculating seasonality factor

    ```


    Basically the seasonality factor is how much the monthly sales is higher or lower
    than the average month. But there’s a little more to it than just taking `qty/cma`:'
