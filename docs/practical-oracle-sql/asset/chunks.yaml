    ## 关于代码


    本书的主要内容是代码——SQL，SQL，还是 SQL。要真正从中学习，你应该自己运行代码，尝试修改它，看看会发生什么，反复摸索，直到你确信自己已经“掌握了”。当然，如果所有内容都需要你自己输入，那会很无趣，因此本书中的所有代码都以源文件的形式提供给你。


    ### 源文件


    你可以通过 Apress 上的本书页面从 GitHub 获取源文件：


    `www.apress.com/9781484256169`


    你会找到以下文件：


    *   `practical_readme.txt` – 一个简短的自述文件，描述其他文件。

    *   `practical_create_schema.sql` – 所有示例对象都存放在一个名为 `practical` 的模式中（类似于 Oracle
    提供的示例模式 `scott` 和 `hr`）。此脚本创建 `practical` 模式并授予必要的权限，应以 DBA 用户身份运行。如果你的环境强制要求复杂密码，你可能需要编辑此脚本，为
    `practical` 用户设置一个比 `practical` 更复杂的密码。

    *   `practical_fill_schema.sql` – 创建 `practical` 模式后，以用户 `practical` 登录——密码是 `practical`，除非你在上一个文件中更改了它。然后运行此脚本以创建所有示例对象——表、视图、类型、包等等。

    *   `practical_clean_schema.sql` – 此脚本也应以用户 `practical` 身份运行。它会删除由 `practical_fill_schema.sql`
    创建的所有内容。你可以自行尝试，修改示例，随意操作数据——完成后，你可以通过运行 `practical_clean_schema.sql` 后跟 `practical_fill_schema.sql`
    来恢复到一个干净的示例模式。

    *   `practical_drop_schema.sql` – 如果你想完全删除示例模式 `practical`，可以以 DBA 用户身份运行此脚本。

    *   `ch_{chapter_name}.sql` – 22 章中的每一章都有自己的示例文件，包含该章列表中的代码。但请注意，每个 DDL（创建视图、对象类型等）的列表不在章节
    SQL 文件中，而是在 `practical_fill_schema.sql` 中。这样，所有字典对象都是一起创建和删除的，章节示例脚本无需担心字典清理。


    所有脚本和示例都旨在提供学习灵感，不应安装在生产环境中。它们是供你使用的学习工具，应仅作此用。


    ### 模式


    你应该将 `practical` 模式视为一个虚构公司 **优质啤酒贸易公司** 使用的应用程序的一部分。几乎所有示例都基于这类应用程序可能需要完成的任务——在现实生活中也是如此。诚然，少数情况略有刻意，但大多数都可以直接取自实际应用。例如，第二部分展示的所有技术都直接取自我在过去
    16 年（前文提到过）开发过程中编写的代码——我只是将它们调整以适配图 1 所示的 `practical` 示例表。


    ![../images/475066_1_En_BookFrontmatter_Fig1_HTML.jpg](img/475066_1_En_BookFrontmatter_Fig1_HTML.jpg)

    *图 1：practical 模式中的表*


    模式中唯一与优质啤酒贸易公司无关的表是第 6 章中使用的表 `conway_gen_zero`。其他表都与这家虚构公司相关，每个表都在一章或多章中使用。


    ### 版本与环境


    几乎所有代码示例都是使用 Oracle 提供的预构建 VirtualBox 镜像“Database App Development VM”开发的，具体是包含
    Oracle Database 12c Enterprise Edition Release 12.2.0.1.0 – 64bit Production 的版本。少数示例需要数据库版本
    18c 或 19c；对于这些示例，我使用了更新的 VM 镜像或 `livesql.oracle.com`。


    总的来说，第一部分和第二部分展示的许多示例即使在不再受支持的数据库版本上也能运行。需要高于 12.2 版本的地方，都已明确注明。如果相关，我还注明了特定语法是从哪个版本开始支持的，但并未对所有内容都明确标出起始版本。如果你仍在使用不受支持的版本，我将由你自行测试特定语法是否在你的环境中有效。


    在开发过程中，我使用的是 Oracle SQL Developer 18.2 版本。ER 图的截图也来自此 SQL Developer 版本。代码示例使用
    SQLcl release 4.2 执行，大部分使用 `set sqlformat ansiconsole` 格式，只有少数情况使用传统的 SQL∗Plus
    样式格式。这些情况在源代码文件中已注明。


    当你自己尝试代码时，我建议在 Oracle SQL Developer、TOAD、PLSQL Developer 或你最喜欢的 SQL IDE 中打开文件。单独运行每条语句，在网格中检查结果，而不是依赖我的格式（我的格式是针对适合印刷页面的输出进行优化的）。这样你也可以非常容易地稍微修改语句，然后再次执行，并比较输出的变化。


    大多数图表是通过在 `apex.oracle.com` 上的一个工作区中使用各种 APEX 图形和图表组件创建的，我用这个工作区来摆弄和制作小型 APEX
    页面。


    ## 最后的话


    也许你有这样一种印象：如果 SQL 比两表连接稍微复杂一点，那就只有天才才能尝试，而你甚至不会去尝试。我向你保证，情况并非如此。


    专业技能源于实践。信心源于熟悉。你应该明天就去写稍微复杂一点的 SQL，后天再复杂一点，如此坚持。随着时间的推移，它会变得像你使用了多年的其他语言一样熟悉，你将会对自己说：“我当初在怕什么？”


    我相信这本书将为你开启旅程，让你*真正*运用 SQL 的力量。


    ## 致谢


    多年来，在学习——并最终教授——SQL 的过程中，激励我的人数不胜数。篇幅所限，我只能感谢几位对我最重要的人。如果你未被提及，请不要担心；你仍然给了我无价的启发。


    我的第一个也是最大的启发是——现在仍然是——Tom Kyte。我从他的书和 AskTom 中学到了很多。如果没有他作为我的榜样，我不确定我是否会参与社区，分享知识和写博客，当然我也不会最终写一本书。


    我名单上的第二位是 Steven Feuerstein 本人，他的著作被我们许多人视为权威资料。我感谢 Steven 给我机会为 Oracle Dev Gym
    (`devgym.oracle.com`) 编写 SQL 测验。教学是学习某件事的最好方法，而每周都需要设计新测验，这为我提供了一个机会去钻研 SQL 的各个方面。


    社区和用户组中参与知识分享的每一个人也都是我的灵感来源。ODTUG 以及参加 Kscope 年度会议的每一个人就是很好的例证。我自 2010 年以来每年都参加，如果没有我的
    Kscope 人脉网络，我就不会达到今天的水平。


    最后但同样重要的是，我必须感谢 Stew Ashton。他是 SQL 行模式匹配的大师，他慷慨地允许我从他的博客 (`stewashton.wordpress.com`)
    中获得大量灵感，用于第三部分的几个章节。


    ## 关于作者


