  trans: '


    ### 并列情况的处理


    在清单 12-8 中，我比较了 2018 年销售额的三种分析排名函数（类似于我在清单 12-6 中对总销售额所做的比较）。因为仅用前五行数据就能说明我的观点，而无需展示全部十种啤酒，我在第
    9 行使用了 `fetch first`，仅仅是因为这样在书中可以节省篇幅。


    ```sql

    SQL> select

    2     product_name, yr_qty

    3   , row_number() over (order by yr_qty desc) as rn

    4   , rank() over (order by yr_qty desc) as rnk

    5   , dense_rank() over (order by yr_qty desc) as dr

    6  from yearly_sales

    7  where yr = 2018

    8  order by yr_qty desc

    9  fetch first 5 rows only;

    清单 12-8

    2018 年销售额的分析函数比较

    ```


    从输出中我可以看到，2018 年存在并列第三名的情况：


    ```sql

    PRODUCT_NAME      YR_QTY  RN  RNK  DR

    Reindeer Fuel     691     1   1    1

    Pale Rider Rides  491     2   2    2

    Hercule Trippel   451     3   3    3

    Ghost of Hops     451     4   3    3

    Monks and Nuns    425     5   5    4

    ```


    因此，在清单 12-9 中，我可以使用第 5 行来应用“前几行”规则，获取按 `row_number` 函数排名（即上述输出中的 `rn` 列）的前三行数据。


    ```sql

    SQL> select product_name, yr_qty

    2  from yearly_sales

    3  where yr = 2018

    4  order by yr_qty desc

    5  fetch first 3 rows only;

    清单 12-9

    获取 2018 年的前三行

    ```


    是的，输出结果确实是我想要的那三行：


    ```sql

    PRODUCT_NAME      YR_QTY

    Reindeer Fuel     691

    Pale Rider Rides  491

    Hercule Trippel   451

    ```


    但是等等——由于 `Ghost of Hops` 和 `Hercule Trippel` 在 2018 年的销量都是 451，我完全有可能得到下面这个输出：


    ```sql

    PRODUCT_NAME      YR_QTY

    Reindeer Fuel     691

    Pale Rider Rides  491

    Ghost of Hops     451

    ```


    清单 12-9 中的查询具有 **不确定的** 输出结果——我最终得到这两个输出中的哪一个，原则上将是随机的；实际上，我在第三行得到 `Hercule Trippel`
    还是 `Ghost of Hops`，取决于数据库在访问数据时恰好先找到这两种啤酒中的哪一种。这高度依赖于优化器选择的访问路径。


    这个问题不仅存在于使用 `fetch first` 和 `rows only` 时，当我自己使用 `row_number` 函数时也同样存在。在清单 12-8
    的输出中，`Hercule Trippel` 和 `Ghost of Hops` 的位置可能已经互换了——我无法知晓。


    通常，业务用户不喜欢一份“一夜之间输出结果就变了”的报表，而这些报表本该是相同的。例如，如果第二天统计信息的收集导致优化器选择了不同的访问路径，这种情况就可能发生。换句话说，用户不喜欢
    **不确定的** 输出。使用 `row_number` 或 `fetch first` 加 `rows only` 时的一个最佳实践是，总是通过添加某种决胜规则来使
    `order by` 变得确定，例如，声明在出现并列时总是显示产品 ID 较小的那个：


    ```sql

    order by yr_qty desc, product_id

    ```


    但我更倾向于说服业务用户，他们其实并不想要“前几行”规则；相反，他们很可能想要，比如，奥林匹克规则。然后，我可以通过使用 `with ties` 代替 `rows
    only` 来轻松实现它：


    ```sql

    4  order by yr_qty desc

    5  fetch first 3 rows with ties;

    ```


    这样我就得到了一个包含 **四行** 的 **输出**，**同时显示** 了 `Hercule Trippel` 和 `Ghost of Hops`：


    ```sql

    PRODUCT_NAME      YR_QTY

    Reindeer Fuel     691

    Pale Rider Rides  491

    Hercule Trippel   451

    Ghost of Hops     451

    ```


    在这个 `输出` 中，`Hercule Trippel` 和 `Ghost of Hops` 的显示 **顺序** 实际上是 **不确定的**。正如我之前提到的，用户不喜欢这个，所以可能诱使人通过确保
    `order by` 是确定性的来“修复”这个问题：


    ```sql

    4  order by yr_qty desc, product_id

    5  fetch first 3 rows with ties;

    ```


    但这将是一个 **错误的** 做法，因为当 `order by` 是确定性的时，根据定义就 **没有并列**，因此 `输出` 结果就 **不是** 我想要的：


    ```sql

    PRODUCT_NAME      YR_QTY

    Reindeer Fuel     691

    Pale Rider Rides  491

    Hercule Trippel   451

    ```


    当我想在 `输出` 中显示并列项时，使用 `fetch first` 就必须接受一个非确定性的 `输出`。如果我无法接受这点，我就必须手动编写包含 `rank`
    函数的内联视图，因为那样能让我更好地控制，并能够在分析函数调用中使用非确定性的 `order by`，而在外层查询中使用确定性的 `order by`。


    ### 行限制子句不能做什么


    因此，`fetch first` 行限制子句中的 `with ties` 处理并列的方式，就像我使用了分析函数 `rank` 一样。但是，让我修改清单 12-8
    来显示 2017 年而不是 2018 年：


    ```sql

    7  where yr = 2017

    ```


    这次，我有并列第一名的情况：


    ```sql

    PRODUCT_NAME      YR_QTY  RN  RNK  DR

    Monks and Nuns    582     1   1    1

    Reindeer Fuel     582     2   1    1

    Ghost of Hops     482     3   3    2

    Der Helle Kumpel  458     4   4    3

    Hercule Trippel   344     5   5    4

    ```


    让我在清单 12-10 中尝试对 2017 年使用 `fetch first with ties`。


    ```sql

    SQL> select product_name, yr_qty

    2  from yearly_sales

    3  where yr = 2017

    4  order by yr_qty desc

    5  fetch first 3 rows with ties;

    清单 12-10

    为 2017 年获取并列数据

    ```


    我得到的是那些 `RNK` 列 `<= 3` 的行：


    ```sql

    PRODUCT_NAME    YR_QTY

    Monks and Nuns  582

    Reindeer Fuel   582

    Ghost of Hops   482

    ```


    换句话说，这类似于处理并列情况的奥林匹克规则。如果我想使用“前几个值”规则来获取所有具有前三名数值的行，我 **无法** 通过行限制子句实现。根本就不存在像这样的语法：


    ```sql

    fetch first 3 values with ties;  /* <-- 无效语法 */

    ```


    相反，我需要手动创建我的内联视图，并使用 `dense_rank`，如清单 12-11 所示。


    ```sql

    SQL> select *

    2  from (

    3     select

    4        product_name, yr_qty

    5      , dense_rank() over (order by yr_qty desc) as ranking

    6     from yearly_sales

    7     where yr = 2017

    8  )

    9  where ranking <= 3

    10  order by ranking;

    清单 12-11

    使用 dense_rank 实现 fetch first 无法完成的功能

    ```


    现在我得到了 2017 年具有前三名数值的四行数据：


    ```sql

    PRODUCT_NAME      YR_QTY  RANKING

    Monks and Nuns    582     1

    Reindeer Fuel     582     1

    Ghost of Hops     482     2

    Der Helle Kumpel  458     3

    ```


    行限制子句对于 Top-N 查询来说是一个非常方便的快捷方式，但它只能执行“前几行”规则或奥林匹克规则，其内部实现类似于包含 `row_number` 或
    `rank` 分析函数的内联视图。如果你想要“前几个值”规则，你需要自己用 `dense_rank` 来实现。


