  trans: '## 使用模型子句计算活跃邻居数


    我创建了一个名为 `conway_gen_zero` 的表格，用于存放网格中所有单元格以及它们在第零代是否包含活跃单元格。图 6-2 显示，该表有 `x`
    和 `y` 两列代表每个网格位置，以及 `alive` 列，其中用 1 表示活跃单元格，0 表示死亡（空）单元格。


    ![../images/475066_1_En_6_Chapter/475066_1_En_6_Fig2_HTML.jpg](img/475066_1_En_6_Fig2_HTML.jpg)

    图 6-2：第零代网格内容表格


    首先，在清单 6-1 中，我用一个 10x10 的网格填充此表格，其中网格中部按照图 6-1 所示的模式有一些活跃单元格。


    ```

    SQL> insert into conway_gen_zero (x, y, alive)

    2  select * from (

    3     with numbers as (

    4        select level as n from dual

    5        connect by level <= 10

    6     ), grid as (

    7        select

    8           x.n as x

    9         , y.n as y

    10        from numbers x

    11        cross join numbers y

    12     ), start_cells as (

    13        select  4 x,  4 y from dual union all

    14        select  5 x,  4 y from dual union all

    15        select  4 x,  5 y from dual union all

    16        select  6 x,  6 y from dual union all

    17        select  7 x,  6 y from dual union all

    18        select  4 x,  7 y from dual union all

    19        select  5 x,  7 y from dual union all

    20        select  6 x,  7 y from dual

    21     )

    22     select

    23        g.x

    24      , g.y

    25      , nvl2(sc.x, 1, 0) as alive

    26     from grid g

    27     left outer join start_cells sc

    28        on  sc.x = g.x

    29        and sc.y = g.y

    30  );

    100 rows inserted.

    清单 6-1：创建一个 10x10 的第零代种群

    ```


    我使用第 3 章的技术在多个 `with` 子句中构建此查询：


    *   第 4-5 行的 `numbers` 简单地给我提供了编号为 1-10 的十行数据。

    *   第 7-11 行的 `grid` 通过两次使用 `numbers` 进行笛卡尔连接，生成了 100 行数据，包含 10x10 网格的所有 (x, y)
    组合。

    *   第 13-20 行的 `start_cells` 生成了 8 行数据，包含那些在第零代（初始种群）中存活的单元格的 (x, y) 坐标。

    *   在第 22-29 行，`grid` 左连接到 `start_cells`，因此结果是 `grid` 的 100 行数据，第 25 行计算出如果单元格存在于
    `start_cells` 中则为 1（活跃），否则为 0（死亡）。


    我的第零代种群已准备就绪，在清单 6-2 中，我使用 `X` 表示活跃单元格，空格表示空单元格来展示种群，这样你可以直观地看到这就是图 6-1 的单元格模式。


    ```

    SQL> select

    2     listagg(

    3        case alive

    4           when 1 then ''X''

    5           when 0 then '' ''

    6        end

    7     ) within group (

    8        order by x

    9     ) as cells

    10  from conway_gen_zero

    11  group by y

    12  order by y;

    清单 6-2：可视化第零代

    ```


    第 2-9 行的 `listagg`（更多内容请参阅第 10 章）将包含 `X` 和空格的字符串按列 `x` 的顺序进行聚合，为每一列 `y` 生成结果，给出以下输出：


    ```

    CELLS


    XX

    X

    XX

    XXX

    ```


    第零代看起来不错，是时候在清单 6-3 中使用 `model` 子句来计算每个单元格有多少个活跃邻居了。


    ```

    SQL> select *

    2  from conway_gen_zero

    3  model

    4  dimension by (

    5     x, y

    6  )

    7  measures (

    8     alive

    9   , 0 as sum_alive

    10   , 0 as nb_alive

    11  )

    12  ignore nav

    13  rules

    14  (

    15     sum_alive[any, any] =

    16        sum(alive)[

    17           x between cv() - 1 and cv() + 1

    18         , y between cv() - 1 and cv() + 1

    19        ]

    20   , nb_alive[any, any] =

    21        sum_alive[cv(), cv()] - alive[cv(), cv()]

    22  )

    23  order by x, y;

    清单 6-3：使用模型子句计算活跃邻居数

    ```


    模型子句由一系列子句构建而成：


    *   第 4-6 行的 `dimension by` 指明了哪些列用作维度——或者，如果你愿意，可以理解为多维数组中的索引。

    *   第 7-11 行的 `measures` 是数组中每个单元格的属性。这里我创建了三个度量——一个就是表中的 `alive` 列；另外两个表中不存在，被初始化为零。

    *   然后可以是 `model` 子句的各种选项——在第 12 行，我使用了 `ignore nav`，它简单地表明当公式试图使用某个单元格中度量的值时，任何空值或不存在的值都应被视为取决于数据类型的默认值（此处为数字零）。

    *   从第 13 行开始的 `rules` 是一组公式，指明了我希望如何计算每个单元格中度量的值。我这里有两个公式，分别对应表中不存在的两个度量。

    *   第 15-19 行计算 `sum_alive`。使用 `[any, any]` 我要求计算网格中所有单元格的此度量值。当为特定单元格计算公式时，函数
    `cv()` 给出该特定单元格的维度值，我用它来定义一个 3x3 的网格，并计算该网格中 9 个单元格的 `alive` 度量的总和。例如，对于单元格 [3,
    5]，总和将计算在 `x` 维度介于 2 到 4 之间且 `y` 维度介于 4 到 6 之间的单元格上。

    *   第 20-21 行计算 `nb_alive`，即“活跃邻居数”。前面计算的 `sum_alive` 是包含该单元格自身的 3x3 网格中 9 个单元格的活跃细胞数。因此，通过减去单元格本身的
    `alive` 值，我就可以得到活跃邻居的数量。


    清单 6-3 中的模型子句看起来与普通 SQL 大不相同。这是一种非常不同的数据访问方式，也是对数据指定子集应用公式的方式，更类似于许多过程语言中的数组或电子表格中的公式，只不过是以
    SQL 标志性的更声明性的方式呈现。


    但是，我也可以使用标量子查询和内联视图，在普通 SQL 中完成与清单 6-3 相同的工作。清单 6-4 提供了一个例子。


    ```

    SQL> select

    2     x

    3   , y

    4   , alive

    5   , sum_alive

    6   , sum_alive - alive as nb_alive

    7  from (

    8     select

    9        x

    10      , y

    11      , alive

    12      , (

    13           select sum(gz2.alive)

    14           from conway_gen_zero gz2

    15           where gz2.x between gz.x - 1 and gz.x + 1

    16           and   gz2.y between gz.y - 1 and gz.y + 1

    17        ) as sum_alive

    18     from conway_gen_zero gz

    19  )

    20  order by x, y;

    清单 6-4：使用标量子查询计算活跃邻居数

    ```


    清单 6-3 和清单 6-4 产生相同的输出——网格中的所有单元格以及两个活跃计数：


    ```

    X   Y 活跃度  活跃总数   活跃邻居数

    --- --- ----- ---------- ----------

    1   1     0          0          0

    1   2     0          0          0

    1   3     0          0          0

    ...

    5   5     0          4          4

    5   6     0          5          5

    5   7     1          4          3

    5   8     0          3          3

    5   9     0          0          0

    5  10     0          0          0

    6   1     0          0          0

    6   2     0          0          0

    6   3     0          1          1

    6   4     0          1          1

    6   5     0          3          3

    ...

    10   9     0          0          0

    10  10     0          0          0

    100 rows selected.

    ```'
- fmt: 'So why do I choose to solve the Game of Life with the `model` clause instead
    of plain SQL? For one, it’s because the scalar subquery means a lot of repeated
    reads of the same data over and over. Normally I’d look to analytic functions
    to avoid such repetitive data access, but the problem here is that I want to sum
    over a range of *two* dimensions. If, for example, I were to use an analytic `sum`
    using the `range between 1 preceding and 1 following` clause, I could only do
    that on either `x` or `y` dimension, not on both simultaneously.


    The other reason for solving the Game of Life with the `model` clause will be
    clear when I start iterating the calculations over more generations in the game,
    as doing so is much more complex in plain SQL than in the `model` clause. Keep
    reading, and you’ll see what I mean.


    Before that, however, I’d like to visualize the results of calculations using
    the `listagg` technique of Listing [6-2](#475066_1_En_6_Chapter.xhtml#PC2). So
    in Listing [6-5](#475066_1_En_6_Chapter.xhtml#PC7), I simply take the SQL from
    either Listing [6-3](#475066_1_En_6_Chapter.xhtml#PC4) or Listing [6-4](#475066_1_En_6_Chapter.xhtml#PC5)
    and put it in a `with` clause and then query that instead of the table directly.


    ```

    SQL> with conway as (

    ...

    /* Content of Listing 6-3 or 6-4 */

    ...

    24  )

    25  select

    26     listagg(

    27        case alive

    28           when 1 then ''X''

    29           when 0 then '' ''

    30        end

    31     ) within group (

    32        order by x

    33     ) cells

    34   , listagg(sum_alive) within group (order by x) sum_alives

    35   , listagg(nb_alive ) within group (order by x) nb_alives

    36  from conway

    37  group by y

    38  order by y;

    Listing 6-5

    Displaying the counts grid fashion

    ```


    Lines 26–33 are just as they were in Listing [6-2](#475066_1_En_6_Chapter.xhtml#PC2),
    and then I’ve added lines 34 and 35 to visualize the content of measures `sum_alive`
    and `nb_alive`, which will work because the values always are single-digit. `sum_alive`
    I calculated over a 3x3 grid, so it can be a maximum of 9, and `nb_alive` can
    thus be a maximum of 8.


    ```

    CELLS      SUM_ALIVES NB_ALIVES

    ---------- ---------- ----------

    0000000000 0000000000

    0000000000 0000000000

    0012210000 0012210000

    XX      0023310000 0022210000

    X       0023432100 0022432100

    XX    0023543100 0023532100

    XXX     0012443100 0011333100

    0012321000 0012321000

    0000000000 0000000000

    0000000000 0000000000

    ```


    You can see that in those positions of the grid where there is an `X` in `cells`,
    the digit in `nb_alives` is one less than `sum_alive` – just as expected.


    So far I’ve only modeled and calculated neighbor count for generation zero. Now
    it’s time to use that neighbor count to calculate where there will be live cells
    in the next generation, calculate neighbor count for that generation, and then
    repeat the process iteratively for generation after generation after …


    ## Iterating generations


    In the beginning of the chapter, I stated the four rules of Conway’s Game of Life.
    They are good for describing Life in terms of simulating a population of cellular
    organisms. But for implementing the rules in a programming language, it can be
    helpful to examine the logic of the rules and restate them in the following manner:


    *   Any cell with exactly two live neighbors keeps the same status (alive or dead)
    in the next generation.

    *   Any cell with exactly three live neighbors will be alive in the next generation
    (no matter if it was alive or dead in this generation).

    *   Any other cell will be dead in the next generation.


    The result of these rules is the same as the original four rules, but there is
    a great advantage for a programmer: it can easily be stated in an `if` or `case`
    structure whether a cell is alive or dead in the next generation, based on whether
    the neighbor count in the current generation is two, three, or anything else.
    So that I will do in Listing [6-6](#475066_1_En_6_Chapter.xhtml#PC9).


    ```

    SQL> with conway as (

    2     select *

    3     from conway_gen_zero

    4     model

    5     dimension by (

    6        0 as generation

    7      , x, y

    8     )

    9     measures (

    10        alive

    11      , 0 as sum_alive

    12      , 0 as nb_alive

    13     )

    14     ignore nav

    15     rules upsert all iterate (2)

    16     (

    17        sum_alive[iteration_number, any, any] =

    18           sum(alive)[

    19              generation = iteration_number

    20            , x between cv() - 1 and cv() + 1

    21            , y between cv() - 1 and cv() + 1

    22           ]

    23      , nb_alive[iteration_number, any, any] =

    24           sum_alive[iteration_number, cv(), cv()]

    25             - alive[iteration_number, cv(), cv()]

    26      , alive[iteration_number + 1, any, any] =

    27           case nb_alive[iteration_number, cv(), cv()]

    28              when 2 then alive[iteration_number, cv(), cv()]

    29              when 3 then 1

    30              else 0

    31           end

    32     )

    33  )

    34  select

    35     generation

    36   , listagg(

    37        case alive

    38           when 1 then ''X''

    39           when 0 then '' ''

    40        end

    41     ) within group (

    42        order by x

    43     ) cells

    44   , listagg(sum_alive) within group (order by x) sum_alives

    45   , listagg(nb_alive ) within group (order by x) nb_alives

    46  from conway

    47  group by generation, y

    48  order by generation, y;

    Listing 6-6

    Iterating two generations

    ```


    Compared to Listing [6-3](#475066_1_En_6_Chapter.xhtml#PC4), I have added some
    things to handle generations of cells:


    *   In line 6, I have added another dimension `generation` for a total of three
    dimensions. This does not exist in the table, so I initialize it with the value
    zero. That means that the 100 rows in the table will be in the multidimensional
    array all having zero for `generation` but `x` and `y` values from the table.

    *   In the rules clause in line 15, I have added `upsert all`, which states that
    if I set a value for an existing cell, it will be updated, but if I set a value
    for a non-existing cell, it will be created. This is needed since I am going to
    create 100 new cells for every generation I am iterating over.

    *   In line 15, I have also added `iterate (2)`, which means that the rules will
    be applied twice.

    *   As I have added a dimension, I must also expand the indexing used in cell
    addressing in the formulas for `sum_alive` and `nb_alive` in lines 17–25. For
    the `generation` dimension, I use the value of `iteration_number`, which is a
    number that starts with zero for the first iteration and then increments by one
    for every iteration. So `sum_alive` and `nb_alive` are calculated for the generation
    that matches the iteration, starting with generation zero.'
