  raw: '```

    SQL> select

    2     brewery_name

    3   , product_id as p_id

    4   , product_name

    5   , yr

    6   , yr_qty

    7  from (

    8     select

    9        bp.brewery_name

    10      , bp.product_id

    11      , bp.product_name

    12      , ys.yr

    13      , ys.yr_qty

    14      , row_number() over (

    15           partition by bp.product_id

    16           order by ys.yr_qty desc

    17        ) as rn

    18     from brewery_products bp

    19     join yearly_sales ys

    20        on ys.product_id = bp.product_id

    21     where bp.brewery_id = 518

    22  )

    23  where rn = 1

    24  order by product_id;

    Listing 1-4

    Using analytic function to be able to retrieve all columns if desired

    ```


    This also gives the exact same output as Listing [1-2](#475066_1_En_1_Chapter.xhtml#PC3),
    just without any scalar subqueries at all.


    Here I join the two views in lines 18–20 instead of querying `yearly_sales` in
    a scalar subquery. But doing that makes it impossible for me to use the `fetch
    first` syntax, as I need a row per brewery and `fetch first` does not support
    a partition clause.


    Instead I use the `row_number` analytic function in lines 14–17 to assign consecutive
    numbers 1, 2, 3 … in descending order of `yr_qty`, in effect giving the row with
    the highest `yr_qty` the value 1 in `rn`. This happens for each beer because of
    the `partition by` in line 15, so there will be a row with `rn=1` for each beer.
    These rows I keep with the `where` clause in line 23.


    Tip


    Much more about analytic functions is shown in Part 2 of the book.


    The effect of this is that I can query as many columns from the `yearly_sales`
    view as I want – here I query two columns in lines 12–13\. These can then be used
    directly in the outer query as well in lines 5–6\. No concatenation needed, each
    column is available directly, no matter the datatype.


    This is a much nicer workaround than Listing [1-3](#475066_1_En_1_Chapter.xhtml#PC5),
    so isn’t this good enough? In this case it is fine, but the alternative with correlated
    inline views can be more flexible for some situations.


    ## Correlating inline view


    Listing [1-5](#475066_1_En_1_Chapter.xhtml#PC7) is yet another way to produce
    the exact same output as Listing [1-2](#475066_1_En_1_Chapter.xhtml#PC3), just
    this time by correlating an inline view.


    ```

    SQL> select

    2     bp.brewery_name

    3   , bp.product_id as p_id

    4   , bp.product_name

    5   , top_ys.yr

    6   , top_ys.yr_qty

    7  from brewery_products bp

    8  cross join lateral(

    9     select

    10        ys.yr

    11      , ys.yr_qty

    12     from yearly_sales ys

    13     where ys.product_id = bp.product_id

    14     order by ys.yr_qty desc

    15     fetch first row only

    16  ) top_ys

    17  where bp.brewery_id = 518

    18  order by bp.product_id;

    Listing 1-5

    Achieving the same with a lateral inline view

    ```


    The way this works is as follows:


    *   I do not join `brewery_products` to `yearly_sales` directly; instead I join
    to the inline view `top_ys` in line 8.


    *   The inline view in lines 9–15 queries `yearly_sales` and uses the `fetch first
    row` to find the row of the year with the highest sales. But it is *not* executed
    for *all* beers finding a single row with the best-selling year across all beers,
    for line 13 correlates the `yearly_sales` to the `brewery_products` on `product_id`.


    *   Line 13 would normally raise an error, since it would not make sense in the
    usual joining to an inline view. But I placed the keyword `lateral` in front of
    the inline view in line 8, which tells the database that I want a correlation
    here, so it should execute the inline view *once for each row* of the correlated
    outer row source – in this case `brewery_products`. That means that for each beer,
    there will be executed an individual `fetch first row` query, almost as if it
    were a scalar subquery.


    *   I then use `cross join` in line 8 to do the actual joining, which simply is
    because I need no `on` clause in this case. I have all the correlation I need
    in line 13, so I need not use an inner or outer join.


    Using this lateral inline view enables me to get it executed for each beer like
    a scalar subquery, but to have individual columns queried like in Listing [1-4](#475066_1_En_1_Chapter.xhtml#PC6).


    You might wonder about the `cross join` and say, “This isn’t a Cartesian product,
    is it?”


    Consider if I had used the traditional join style with a comma-separated list
    of tables and views and all join predicates in the `where` clause and no `on`
    clauses. In that join style, Cartesian joins happen if you have *no* join predicate
    at all between two tables/views (sometimes that can happen by accident – a classic
    error that can be hard to catch).


    If I had written Listing [1-5](#475066_1_En_1_Chapter.xhtml#PC7) with traditional
    style joins, line 8 would have looked like this:


    ```

    ...

    7  from brewery_products bp

    8  , lateral(

    9     select

    ...

    ```


    And with no join predicates in the `where` clause, it does exactly the same that
    the `cross join` does. But because of the `lateral` clause, it becomes a “Cartesian”
    join between *each* row of `brewery_products` and *each* output row set of the
    correlated inline view as it is executed for each beer. So for each beer, it actually
    *is* a Cartesian product (think of it as “partitioned Cartesian”), but the net
    effect is that the total result looks like a correlated join and doesn’t appear
    Cartesian at all. Just don’t let the `cross join` syntax confuse you.


    I could have chosen to avoid the confusion of the `cross join` by using a regular
    inner join like this:


    ```

    ...

    7  from brewery_products bp

    8  join lateral(

    9     select

    ...

    16  ) top_ys

    17     on 1=1

    18  where bp.brewery_id = 518

    ...

    ```


    Since the correlation happens inside the lateral inline view, I can simply let
    the `on` clause be always true. The effect is exactly the same.


    It might be that you feel that both `cross join` and the `on 1=1` methods really
    do not state clearly what happens – both syntaxes can be considered a bit “cludgy”
    if you will. Then perhaps you might like the alternative syntax `cross apply`
    instead as in Listing [1-6](#475066_1_En_1_Chapter.xhtml#PC10).


    ```

    SQL> select

    2     bp.brewery_name

    3   , bp.product_id as p_id

    4   , bp.product_name

    5   , top_ys.yr

    6   , top_ys.yr_qty

    7  from brewery_products bp

    8  cross apply(

    9     select

    10        ys.yr

    11      , ys.yr_qty

    12     from yearly_sales ys

    13     where ys.product_id = bp.product_id

    14     order by ys.yr_qty desc

    15     fetch first row only

    16  ) top_ys

    17  where bp.brewery_id = 518

    18  order by bp.product_id;

    Listing 1-6

    The alternative syntax cross apply

    ```


    The output is the same as Listing [1-2](#475066_1_En_1_Chapter.xhtml#PC3) like
    the previous listings, but this time I am using neither `lateral` nor `join`,
    but the keywords `cross apply` in line 8\. What this means is that for each row
    in `brewery_products`, the inline view will be *applied*. And when I use `apply`,
    I am allowed to correlate the inline view with the predicate in line 13, just
    like using `lateral`. Behind the scenes, the database does exactly the same as
    a lateral inline view; it is just a case of which syntax you prefer.


    The keyword `cross` distinguishes it from the variant `outer apply`, which I’ll
    show in a moment. Here `cross` is to be thought of as “partitioned Cartesian”
    as I discussed in the preceding text.


    Note


    You can use the `cross apply` and `outer apply` not only for inline views but
    also for calling *table functions* (pipelined or not) in a correlated manner.
    This would require a longer syntax if you use `lateral`. Probably you won’t see
    it used often on table functions, as the table functions in Oracle can be used
    as a correlated row source in joins anyway, so it is rarely *necessary* to use
    `apply`, though sometimes it can improve readability.'
