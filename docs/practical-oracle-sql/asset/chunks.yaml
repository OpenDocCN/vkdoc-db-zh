    7950        Pale Rider Rides  11    42       1

    7950        Pale Rider Rides  12    44       1

    86 rows selected.

    ```


    So far I’ve been packing in boxes that had sufficient capacity to contain even
    the largest location quantity I have in the warehouse (72). What happens if I
    used boxes that were too small?'
