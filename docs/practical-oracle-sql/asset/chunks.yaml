    所以这看起来正是我需要的，对吗？当滚动求和大于订购数量时，我就拣够了，对吧？我将在代码清单 13-4 中尝试这一点，方法是将代码清单 13-3 包装在一个内联视图中，并在`where`子句中进行过滤。


