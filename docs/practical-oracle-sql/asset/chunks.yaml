    ```

    SQL> select

    2     ol.order_id    as o_id

    3   , ol.product_id  as p_id

    4   , ol.qty

    5   , nvl(sum(ol.qty) over (

    6        partition by ol.product_id

    7        order by ol.order_id

    8        rows between unbounded preceding and 1 preceding

    9     ), 0) + 1      as from_q

    10   , nvl(sum(ol.qty) over (

    11        partition by ol.product_id

    12        order by ol.order_id

    13        rows between unbounded preceding and 1 preceding

    14     ), 0) + ol.qty as to_q

    15  from orderlines ol

    16  where ol.order_id in (422, 423)

    17  order by ol.product_id, ol.order_id;

    Listing 13-13

    Quantity intervals for each order out of total per product

    ```


    I’m skipping the inline view here and instead calculate `from_q` directly in lines
    5–9 and `to_q` in lines 10–14. In both calculations, I’m doing a rolling sum of
    all previous rows, so that when I’m using the exact same analytic function expression
    twice, the SQL engine will recognize this and only perform the analytic call once.


    The output shows me then that the 80 of product 4280 that is ordered in order
    422 are numbers 1-80 out of the 140, just like the picking quantity intervals
    before.


    ```

    O_ID  P_ID  QTY  FROM_Q  TO_Q

    422   4280  80   1       80

    423   4280  60   81      140

    422   6520  80   1       80

    423   6520  40   81      120

    ```


    With the two sets of quantity intervals, I can join them where they overlap and
    that way see how many of each pick go to what order. Listing [13-14](#475066_1_En_13_Chapter.xhtml#PC33)
    brings the code together.


    ```

    SQL> with olines as (

    2     select

    3        ol.order_id    as o_id

    4      , ol.product_id  as p_id

    5      , ol.qty

    6      , nvl(sum(ol.qty) over (

    7           partition by ol.product_id

    8           order by ol.order_id

    9           rows between unbounded preceding and 1 preceding

    10        ), 0) + 1      as from_q

    11      , nvl(sum(ol.qty) over (

    12           partition by ol.product_id

    13           order by ol.order_id

    14           rows between unbounded preceding and 1 preceding

    15        ), 0) + ol.qty as to_q

    16     from orderlines ol

    17     where ol.order_id in (422, 423)

    18  ), orderbatch as (

    19     select

    20        ol.p_id

    21      , sum(ol.qty) as qty

    22     from olines ol

    23     group by ol.p_id

    24  ), fifo as (

    25     select

    26        wh, ai, pos, p_id, loc_q

    27      , least(loc_q, ord_q - acc_prv_q) as pick_q

    28      , acc_prv_q + 1                   as from_q

    29      , least(acc_prv_q + loc_q, ord_q) as to_q

    30     from (

    31        select

    32           i.product_id as p_id

    33         , ob.qty       as ord_q

    34         , i.qty        as loc_q

    35         , nvl(sum(i.qty) over (

    36              partition by i.product_id

    37              order by i.purchased, i.qty

    38              rows between unbounded preceding and 1 preceding

    39           ), 0)        as acc_prv_q

    40         , i.purchased

    41         , i.warehouse  as wh

    42         , i.aisle      as ai

    43         , i.position   as pos

    44        from orderbatch ob

    45        join inventory_with_dims i

    46           on i.product_id = ob.p_id

    47     )

    48  )

    49  select

    50     f.wh, f.ai, f.pos, f.p_id

    51   , f.pick_q, f.from_q as p_f_q, f.to_q as p_t_q

    52   , o.o_id, o.from_q as o_f_q, o.to_q as o_t_q

    53  from fifo f

    54  join olines o

    55     on o.p_id = f.p_id

    56     and o.from_q <= f.to_q

    57     and o.to_q >= f.from_q

    58     and o.from_q <= f.to_q

    59  order by f.p_id, f.from_q, o.from_q;

    Listing 13-14

    Join overlapping pick and order quantity intervals

    ```


    I build the query using three `with` clause subqueries:


    *   First I create `olines`, which is Listing [13-13](#475066_1_En_13_Chapter.xhtml#PC31)
    calculating the quantity intervals for the orderlines.

    *   Then `orderbatch`, similar to how I did it in Listing [13-12](#475066_1_En_13_Chapter.xhtml#PC30),
    except that I do the aggregation using `olines` in line 22 instead of the `orderlines`
    table, since `olines` already has the desired orderlines.

    *   The third subquery is `fifo`, which also comes from Listing [13-12](#475066_1_En_13_Chapter.xhtml#PC30)
    and takes care of building the FIFO picks including quantity intervals.


    The main query then is a join of `fifo` and `olines` on the product id and on
    overlapping quantity intervals. In the resulting output, you see the from/to intervals
    for the picks as `p_f_q`/`p_t_q` and for the orderlines as `o_f_q`/`o_t_q` (short
    column names are good for print):


