  trans: '

    ### 与上一行进行比较的尝试


    在许多使用 `match_recognize` 的场景中，将当前行的某个值与上一行的某个值进行比较以进行行分类是典型的做法。因此，我将首先在代码清单 19-5
    中尝试这种方法。


    ```sql

    SQL> select

    2     emp_id

    3   , name

    4   , start_date

    5   , end_date

    6   , jobs

    7  from emp_hire_periods_with_name

    8  match_recognize (

    9     partition by emp_id

    10     order by start_date, end_date

    11     measures

    12        max(name)         as name

    13      , first(start_date) as start_date

    14      , last(end_date)    as end_date

    15      , count(*)          as jobs

    16     pattern (

    17        strt adjoin_or_overlap*

    18     )

    19     define

    20        adjoin_or_overlap as

    21           start_date <= prev(end_date)

    22  )

    23  order by emp_id, start_date;

    ```

    *代码清单 19-5. 将 `start_date` 与前一行的 `end_date` 进行比较*


    我在第 21 行的简单定义表明，如果 `start_date` 小于或等于前一行的 `end_date`，则该行是重叠或相邻的。然后，通过第 17 行的 `pattern`
    来查找匹配项：任何行后面跟着零个或多个相邻或重叠的行。


    果然，此规则确实合并了此输出中的部分日期范围：


    ```

    EMP_ID  NAME           START_DATE  END_DATE    JOBS

    142     Harold King    2010-07-01              2

    143     Mogens Juel    2010-07-01  2015-10-01  3

    143     Mogens Juel    2016-06-01              1

    144     Axel de Proef  2010-07-01              2

    145     Zoe Thorston   2014-02-01              1

    145     Zoe Thorston   2019-02-01              1

    146     Lim Tok Lo     2014-10-01  2016-02-01  1

    146     Lim Tok Lo     2017-03-01              1

    147     Ursula Mwbesi  2014-10-01  2015-05-01  1

    147     Ursula Mwbesi  2016-05-01              2

    ```


    但是，例如 Mogens Juel 的输出并未完全合并；应该只有一行显示他拥有四份工作。问题在于，当我按 `start_date` 对他的行排序时，Code
    Tester 和 IT Manager 行被比较，并且它们并不重叠。像这样与上一行进行比较，无法发现这两行都与 Sys Admin 行相邻或重叠。


    思考之后，我认为或许只需将第 10 行的排序改为首先按 `end_date` 排序会有所帮助：


    ```sql

    ...

    10     order by end_date, start_date

    ...

    ```


    输出已经改变，但 Mogens Juel 仍然错误地显示了两次：


    ```

    EMP_ID  NAME           START_DATE  END_DATE    JOBS

    142     Harold King    2010-07-01              2

    143     Mogens Juel    2010-07-01  2014-01-01  1

    143     Mogens Juel    2014-04-01              3

    144     Axel de Proef  2010-07-01              2

    145     Zoe Thorston   2014-02-01              1

    145     Zoe Thorston   2019-02-01              1

    146     Lim Tok Lo     2014-10-01  2016-02-01  1

    146     Lim Tok Lo     2017-03-01              1

    147     Ursula Mwbesi  2014-10-01  2015-05-01  1

    147     Ursula Mwbesi  2016-05-01              2

    ```


    在更改排序后，为 Mogens Juel 查找匹配项的第一次尝试将尝试比较 IT Technician 行与 Code Tester 行，但未能发现重叠。


    无论我选择哪种排序，仅仅通过将一行与前一行进行比较，我都无法在单个匹配项中获得所有重叠。我需要一种不同的方法来处理这个问题。


    ### 更好地与最大结束日期进行比较


    仔细查看图 19-2 中 Mogens Juel 的行后，我决定更好的方法是将行的 `start_date` 与我在匹配项中找到的最高 `end_date`
    进行比较。


    这种方法的初步尝试可能如下所示，但它不会起作用：


    ```sql

    ...

    8  match_recognize (

    9     partition by emp_id

    10     order by start_date, end_date

    11     measures

    12        max(name)         as name

    13      , first(start_date) as start_date

    14      , max(end_date)     as end_date

    15      , count(*)          as jobs

    16     pattern (

    17        strt adjoin_or_overlap*

    18     )

    19     define

    20        adjoin_or_overlap as

    21           start_date <= max(end_date)

    22  )

    ...

    ```


    它不起作用的原因是，当评估像第 21 行这样的定义条件时，会首先假设该行被分类为 `adjoin_or_overlap`，然后测试条件是否为真。因此，`max(end_date)`
    的结果是针对目前为止匹配项中的所有行加上当前行计算的，这没有意义。


    事实上，这非常没有意义，以至于当我测试这第一次尝试时，根据数据库版本和所使用的客户端，查询要么返回 `ORA-03113: end-of-file on communication
    channel`，要么返回 `java.lang.NullPointerException`。随后数据库连接中断。


    所以不要使用这第一次尝试。相反，你应该尝试我的第二次尝试，如代码清单 19-6 所示。


    ```sql

    ...

    8  match_recognize (

    9     partition by emp_id

    10     order by start_date, end_date

    11     measures

    12        max(name)         as name

    13      , first(start_date) as start_date

    14      , max(end_date)     as end_date

    15      , count(*)          as jobs

    16     pattern (

    17        adjoin_or_overlap* last_row

    18     )

    19     define

    20        adjoin_or_overlap as

    21           next(start_date) <= max(end_date)

    22  )

    23  order by emp_id, start_date;

    ```

    *代码清单 19-6. 将下一行的 `start_date` 与迄今为止见到的最高 `end_date` 进行比较*


    在代码清单 19-6 中，我反转了逻辑。我不是将当前行与前一行进行比较，而是将其与下一行进行比较：

    *   我在第 10 行回到了按 `start_date` 排序。

    *   在第 21 行，我检查下一行的 `start_date` 是否小于或等于迄今为止在匹配项中看到的最高 `end_date` —— 包括当前行，因为在评估时，`max`
    调用会假定当前行是匹配项的一部分。这意味着当一行被分类为 `adjoin_or_overlap` 时，该行应与下一行合并。

    *   第 17 行的 `pattern` 查找零个或多个 `adjoin_or_overlap` 行，后跟一个分类为 `last_row` 的行。由于该分类是未定义的，任何行都可以匹配它
    —— 但因为 `last_row` 之前的行被分类为 `adjoin_or_overlap`，我知道 `last_row` 也应该被合并。

    *   如果我没有找到任何 `adjoin_or_overlap` 行，该行将被分类为 `last_row`，因为第 17 行中的 `*` 表示模式中可以接受零个
    `adjoin_or_overlap` 行。这意味着当一行不与任何其他行重叠时，它将成为一个单独行的匹配项，分类为 `last_row`，因此作为未合并的部分出现在输出中。

    *   第 14 行的 `measure` `end_date` 是作为匹配项的最大 `end_date` 计算的。由于我没有在 `max` 调用中用 `adjoin_or_overlap`
    或 `last_row` 来限定 `end_date`，因此 `max` 应用于匹配项的所有行，无论行获得了何种分类。

    '
- fmt: '## 理解 MATCH_RECOGNIZE 子句


    这是一个理解起来有些棘手的 `match_recognize` 子句。当我就这个主题进行会议演讲时，我通常会在白板上绘制日期范围，并逐行演示行分类的评估过程。由于无法在书中绘制动画，我将使用从图
    19-4 到图 19-8 的系列图表来模拟这个过程，展示为 Mogens Juel 寻找匹配的步骤。


    ![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig4_HTML.jpg](images/475066_1_En_19_Chapter/475066_1_En_19_Fig4_HTML.jpg)


    图 19-4


    第一行能否分类为 `adjoin_or_overlap`？


    在图 19-4 中，我首先评估 Mogens Juel 的第一行是否可以被分类为 `adjoin_or_overlap`。由于我*假设*它可以，清单 19-6
    第 21 行的 `max(end_date)` 计算结果为第一行的结束日期。`next(start_date)` 计算结果为第二行的 `start_date`。两者相等，因此是相邻的，所以第
    21 行的条件为真，第一行被分类为 `adjoin_or_overlap`。


    ![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig5_HTML.jpg](images/475066_1_En_19_Chapter/475066_1_En_19_Fig5_HTML.jpg)


    图 19-5


    第二行能否分类为 `adjoin_or_overlap`？


    对第一行进行分类后，图 19-5 评估第二行是否可以被分类为 `adjoin_or_overlap`。`max(end_date)` 计算结果为第二行的 `end_date`，而
    `next(start_date)` 是第三行的 `start_date`。后者小于前者，因此是重叠的，第二行被分类为 `adjoin_or_overlap`。


    ![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig6_HTML.jpg](images/475066_1_En_19_Chapter/475066_1_En_19_Fig6_HTML.jpg)


    图 19-6


    第三行能否分类为 `adjoin_or_overlap`？


    模式仍然满足，因此在图 19-6 中，对第三行执行分类评估。在这种情况下，`max(end_date)` 没有移动；它仍然是第二行的 `end_date`。`next(start_date)`
    是第四行的 `start_date`。它们相等，所以第四行与到目前为止找到的匹配相邻，因此第三行是 `adjoin_or_overlap`。


    ![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig7_HTML.jpg](images/475066_1_En_19_Chapter/475066_1_En_19_Fig7_HTML.jpg)


    图 19-7


    第四行能否分类为 `adjoin_or_overlap`？


    匹配继续，图 19-7 评估第四行。这次，`max(end_date)` 应该如图所示为无穷大，因为第四行的 `end_date` 是 `null`。我*尚未*处理这种情况（稍后详述），所以实际上，`max(end_date)`
    *会错误地* 计算为第二行的 `end_date`。但由于没有更多的行，`next(start_date)` 计算结果为 `null`，这使得条件计算结果为布尔值
    *unknown*。因此，第四行*未被*分类为 `adjoin_or_overlap`。


