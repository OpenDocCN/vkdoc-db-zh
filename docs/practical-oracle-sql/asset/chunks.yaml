  raw: 'This is a somewhat tricky `match_recognize` clause to understand. When I do
    conference presentations on this topic, I usually draw the date ranges on a whiteboard
    and step through the evaluation of the row classification row by row. As I cannot
    do an animated drawing in a book, I am going to simulate it using a series of
    figures from Figure [19-4](#475066_1_En_19_Chapter.xhtml#Fig4) to Figure [19-8](#475066_1_En_19_Chapter.xhtml#Fig8),
    going through the steps of finding a match for Mogens Juel.


    ![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig4_HTML.jpg](images/475066_1_En_19_Chapter/475066_1_En_19_Fig4_HTML.jpg)


    Figure 19-4


    Can first row be classified as adjoin_or_overlap?


    In Figure [19-4](#475066_1_En_19_Chapter.xhtml#Fig4), I start by evaluating if
    the first row of Mogens Juel can be classified `adjoin_or_overlap` or not. Since
    I start by *assuming* it can, the `max(end_date)` in line 21 of Listing [19-6](#475066_1_En_19_Chapter.xhtml#PC14)
    evaluates to the end of the first row. The `next(start_date)` evaluates to the
    `start_date` of the second row. The two are equal, therefore adjoining, so the
    condition in line 21 is true, and the first row is classified `adjoin_or_overlap`.


    ![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig5_HTML.jpg](images/475066_1_En_19_Chapter/475066_1_En_19_Fig5_HTML.jpg)


    Figure 19-5


    Can second row be classified as adjoin_or_overlap?


    Having classified the first row, Figure [19-5](#475066_1_En_19_Chapter.xhtml#Fig5)
    evaluates if the second row can be classified `adjoin_or_overlap` or not. The
    `max(end_date)` evaluates to the `end_date` of the second row, while the `next(start_date)`
    is the `start_date` of the third row. The latter is less than the former, therefore
    overlapping, and the second row is classified `adjoin_or_overlap`.


    ![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig6_HTML.jpg](images/475066_1_En_19_Chapter/475066_1_En_19_Fig6_HTML.jpg)


    Figure 19-6


    Can third row be classified as adjoin_or_overlap?


    The pattern is still fulfilled, so in Figure [19-6](#475066_1_En_19_Chapter.xhtml#Fig6),
    the classification evaluation is performed for the third row. In this case the
    `max(end_date)` does not move; it is still the `end_date` of the second row. The
    `next(start_date)` is the `start_date` of the fourth row. They are equal, so the
    fourth row is adjoining to the match found so far, and therefore the third row
    is `adjoin_or_overlap`.


    ![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig7_HTML.jpg](images/475066_1_En_19_Chapter/475066_1_En_19_Fig7_HTML.jpg)


    Figure 19-7


    Can fourth row be classified as adjoin_or_overlap?


    The match continues, and Figure [19-7](#475066_1_En_19_Chapter.xhtml#Fig7) evaluates
    the fourth row. This time `max(end_date)` should be infinity as shown in the figure,
    because the fourth row has `null` in `end_date`. I am not *yet* handling this
    situation (more on this shortly), so in actual fact, `max(end_date)` would *wrongly*
    evaluate to the `end_date` of the second row. But since there are no more rows,
    `next(start_date)` evaluates to `null`, which makes the condition evaluate to
    Boolean *unknown*. Therefore the fourth row is *not* classified as `adjoin_or_overlap`.


    ![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig8_HTML.jpg](images/475066_1_En_19_Chapter/475066_1_En_19_Fig8_HTML.jpg)


    Figure 19-8


    Fourth row classified as last_row and a match has been found


    When the fourth row is *not* `adjoin_or_overlap`, the `pattern` in line 17 of
    Listing [19-6](#475066_1_En_19_Chapter.xhtml#PC14) states that it should be a
    `last_row` in order to complete the match. So Figure [19-8](#475066_1_En_19_Chapter.xhtml#Fig8)
    evaluates if the fourth row can be classified `last_row` or not. As `last_row`
    is an *undefined* classification, it *always* evaluates to true, and the fourth
    row *is* therefore classified as `last_row,` and the match has been completed.


    This step-by-step evaluation of the row classification of Mogens Juel leads to
    the output of Listing [19-6](#475066_1_En_19_Chapter.xhtml#PC14), where the four
    hire periods of Mogens Juel have correctly been merged into a single row showing
    four jobs:


    ```

    EMP_ID  NAME           START_DATE  END_DATE    JOBS

    142     Harold King    2010-07-01  2012-04-01  2

    143     Mogens Juel    2010-07-01  2016-06-01  4

    144     Axel de Proef  2010-07-01  2013-07-01  2

    145     Zoe Thorston   2014-02-01              1

    145     Zoe Thorston   2019-02-01              1

    146     Lim Tok Lo     2014-10-01  2016-02-01  1

    146     Lim Tok Lo     2017-03-01              1

    147     Ursula Mwbesi  2014-10-01  2015-05-01  1

    147     Ursula Mwbesi  2016-05-01  2017-03-01  2

    ```


    But I still have a couple of problems with this output.


    Firstly several of the employees (including Mogens Juel) have a wrong value in
    the measure `end_date`. Those that are still employed should have `null` (blank)
    in the `end_date` column, and in this output that is *only* true for those with
    just a *single* hire period. For those that have had *more* than one job, the
    highest *non-null* `end_date` is wrongly displayed.


    Secondly I notice that Zoe Thorston also has overlapping rows – the problem here
    is just that the `end_date` of both rows are `null`, meaning both rows are current
    and she has both job functions. With the `null` values, the simple comparison
    in line 21 of Listing [19-6](#475066_1_En_19_Chapter.xhtml#PC14) will *not* be
    `true`.


    Both of these problems are because I am not handling the `null` values in `end_date`.
    This I will do now.'
