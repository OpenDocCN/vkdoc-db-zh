  trans: '### 拣货原则的轻松切换


    但首先我想强调一点：查询本身的 `order by` 和分析函数内的 `order by` 不必像清单 13-3 中那样完全相同；它们可以像清单 13-6
    的拣货列表查询那样有所不同，我在其中利用这一事实，通过分析函数的 `order by` 以 FIFO 顺序选择库存，但输出所选行时则按位置顺序排列。


    这种分离意味着，我只需更改分析函数的 `order by`，就能轻松切换拣货原则，同时仍能按位置顺序获得输出。


    因此，对于这些示例，假设啤酒可以无限期保存，所以无论我是否使用先进先出原则都无关紧要。


    然后，我可以采用一种拣货原则，希望优先考虑靠近司机起点的货位，以便为他提供较短的拣货路线。我只需更改清单 13-6 中的第 11 行：


    ```

    ...

    11           order by i.warehouse, i.aisle, i.position

    ...

    ```


    按位置顺序选择要拣货的库存可以给出较短的路线；他根本不必进入 2 号仓库：


    ```

    WH  AI  POS  P_ID  PICK_Q

    1   A   4    4280  37

    1   A   16   6520  48

    1   A   29   6520  14

    1   B   32   6520  43

    1   C   1    4280  36

    1   C   5    6520  35

    1   D   18   4280  37

    ```


    或者，我可以采用一种拣货原则，希望拣货次数最少：


    ```

    ...

    11           order by i.qty desc

    ...

    ```


    这将首先从数量大的库存中拣货，使得只需五次拣货即可完成订单：


    ```

    WH  AI  POS  P_ID  PICK_Q

    1   A   4    4280  37

    1   C   1    4280  34

    1   C   5    6520  68

    1   D   18   4280  39

    2   A   1    6520  72

    ```


    但如果我首先从大数量中拣货，那么随着时间的推移，仓库里将充满只剩下少量“剩余”库存的货位。我可以选择一种拣货原则来清理这些小数量，腾出货位用于新库存：


    ```

    ...

    11           order by i.qty

    ...

    ```


    按数量 `asc`（升序）而非 `desc`（降序）排序有助于清理仓库中的货位，但当然，操作员需要在更多的地方拣货：


    ```

    WH  AI  POS  P_ID  PICK_Q

    1   A   29   6520  14

    1   B   32   6520  21

    1   C   1    4280  22

    1   C   13   6520  20

    2   B   3    4280  35

    2   B   5    6520  14

    2   B   26   6520  24

    2   C   7    4280  19

    2   C   20   4280  34

    2   C   31   6520  21

    2   D   9    6520  26

    ```


    如你所见，将选择库存的 `order by` 与控制拣货顺序的 `order by` 分开后，可以轻松切换拣货策略。


    阐明这一点后，回到解决图 13-2 的路线问题。


    ### 解决最优拣货路线


    仅仅按位置顺序输出意味着拣货操作员需要在每个通道中朝同一方向（“向上”）行驶——这并不理想。我希望他能切换方向，使得每隔一个通道他“向下”行驶。


    但这并非简单地规定在 A 和 C 通道向上、在 B 和 D 通道向下。相反，我需要他在访问的第一个、第三个、第五个……通道向上，然后在访问的第二个、第四个、第六个……通道向下。


    为此，我首先扩展清单 13-6，增加一列为每个访问的通道分配一个连续编号（清单 13-7）。


    ```

    SQL> select

    2     wh, ai

    3   , dense_rank() over (

    4        order by wh, ai

    5     ) as ai#

    6   , pos, p_id

    7   , least(loc_q, ord_q - acc_prv_q) as pick_q

    8  from (

    ...

    26  )

    27  where acc_prv_q < ord_q

    28  order by wh, ai, pos;

    清单 13-7

    为访问的仓库通道连续编号

    ```


    第 3-5 行的分析函数 `dense_rank` 对于在 `order by` 子句所用列中具有相同值的行分配相同的排名。而且与 `rank` 不同，`dense_rank`
    不会跳过任何数字（如我在第 12 章所示）；它连续分配排名。


    因此，在 `dense_rank` 的 `order by` 中使用仓库和通道，`ai#` 列就包含了我想要的“已访问通道编号”：


    ```

    WH  AI  AI#  POS  P_ID  PICK_Q

    1   A   1    16   6520  42

    1   A   1    29   6520  14

    1   C   2    1    4280  36

    1   C   2    13   6520  20

    1   D   3    18   4280  39

    2   B   4    3    4280  35

    2   B   4    5    6520  14

    2   B   4    26   6520  24

    2   D   5    9    6520  26

    ```


    这使我能够将清单 13-7 包装在一个内联视图中，创建具有奇偶排序逻辑的清单 13-8。


    ```

    SQL> select *

    2  from (

    ...

    30  )

    31  order by

    32     wh, ai#

    33   , case

    34        when mod(ai#, 2) = 1 then +pos

    35                             else -pos

    36     end;

    清单 13-8

    交替进行升序和降序排序

    ```


    首先，我按仓库和已访问通道排序，但在每个通道内，我使用第 33-36 行的 `case` 结构，在奇数编号的通道中按位置*升序*排序，在偶数编号的通道中按位置*降序*排序：


    ```

    WH  AI  AI#  POS  P_ID  PICK_Q

    1   A   1    16   6520  42

    1   A   1    29   6520  14

    1   C   2    13   6520  20

    1   C   2    1    4280  36

    1   D   3    18   4280  39

    2   B   4    26   6520  24

    2   B   4    5    6520  14

    2   B   4    3    4280  35

    2   D   5    9    6520  26

    ```


    如图 13-3 所示，这为操作员提供了更好的拣货路线，因此清单 13-8 是我的三个问题中第二个问题的解决方案。


    ![../images/475066_1_En_13_Chapter/475066_1_En_13_Fig3_HTML.jpg](img/475066_1_En_13_Fig3_HTML.jpg)


    图 13-3


    奇数/偶数已访问通道的交替位置顺序


    我还可以展示一个变体，其中我可以非常轻松地调整查询以适应变化的条件。在图 13-3 中，你看到 1 号和 2 号仓库之间在底部和顶部都有门，但如果只有底部有门而顶部关闭了呢？


    对清单 13-8 中的 `dense_rank` 调用进行小改动，即可生成清单 13-9。


    ```

    ...

    5      , dense_rank() over (

    6           partition by wh

    7           order by ai

    8        ) as ai#

    ...

    清单 13-9

    在每个仓库内重新开始通道编号

    ```


    我所做的只是将按仓库和通道的 `order by` 更改为按仓库的 `partition by` 和按通道的 `order by`。结果是，分配给 `ai#`
    列的排名在每个仓库中从 1 重新开始：


    ```

    WH  AI  AI#  POS  P_ID  PICK_Q

    1   A   1    16   6520  42

    1   A   1    29   6520  14

    1   C   2    13   6520  20

    1   C   2    1    4280  36

    1   D   3    18   4280  39

    2   B   1    3    4280  35

    2   B   1    5    6520  14

    2   B   1    26   6520  24

    2   D   2    9    6520  26

    ```


    当 `ai#` 在每个仓库中重新开始时，这意味着 2 号仓库中的 B 通道从他整体访问的第四个通道变成了他在 2 号仓库中访问的第一个通道。这意味着它从一个偶数编号的通道（降序排序）变成了一个奇数编号的通道（升序排序）。


    这就得到了图 13-4 所示的拣货路线。


    ![../images/475066_1_En_13_Chapter/475066_1_En_13_Fig4_HTML.jpg](img/475066_1_En_13_Fig4_HTML.jpg)


    图 13-4


    当仓库之间仅有一扇门时会发生什么


    前两个问题现已解决，因此我现在将继续处理第三个也是最后一个问题。'
- fmt: '## Solving batch picking


    It’s all well and good that I now can pick a single order by FIFO with a good
    picking route, but to work efficiently, I need the picking operator to be able
    to pick multiple orders simultaneously in a single drive through the warehouses.


    So I’m going to use Listing [13-2](#475066_1_En_13_Chapter.xhtml#PC2) again to
    show order data, just this time for two other orders. In real life, I’d probably
    model a “picking batch” table to use for specifying which orders are to be included
    in a batch, but here I’m just coding the two order ids using `in`:


    ```

    ...

    15  where o.id in (422, 423)

    ...

    ```


    And it shows me two pubs that each have ordered a quantity of both Hoppy Crude
    Oil and Der Helle Kumpel:


    ```

    C_ID   C_NAME           O_ID  P_ID  P_NAME            QTY

    51069  Der Wichtelmann  422   4280  Hoppy Crude Oil   80

    51069  Der Wichtelmann  422   6520  Der Helle Kumpel  80

    50741  Hygge og Humle   423   4280  Hoppy Crude Oil   60

    50741  Hygge og Humle   423   6520  Der Helle Kumpel  40

    ```


    I can start simple in Listing [13-10](#475066_1_En_13_Chapter.xhtml#PC26) by just
    finding the total quantities ordered for each product and then applying the FIFO
    picking method of Listing [13-6](#475066_1_En_13_Chapter.xhtml#PC10) to those
    totals.


    ### Listing 13-10

    FIFO picking of the total quantities


    ```

    SQL> with orderbatch as (

    2     select

    3        ol.product_id

    4      , sum(ol.qty) as qty

    5     from orderlines ol

    6     where ol.order_id in (422, 423)

    7     group by ol.product_id

    8  )

    9  select

    10     wh, ai, pos, p_id

    11   , least(loc_q, ord_q - acc_prv_q) as pick_q

    12  from (

    13     select

    14        i.product_id as p_id

    15      , ob.qty       as ord_q

    16      , i.qty        as loc_q

    17      , nvl(sum(i.qty) over (

    18           partition by i.product_id

    19           order by i.purchased, i.qty

    20           rows between unbounded preceding and 1 preceding

    21        ), 0)        as acc_prv_q

    22      , i.purchased

    23      , i.warehouse  as wh

    24      , i.aisle      as ai

    25      , i.position   as pos

    26     from orderbatch ob

    27     join inventory_with_dims i

    28        on i.product_id = ob.product_id

    29  )

    30  where acc_prv_q < ord_q

    31  order by wh, ai, pos;

    ```


    Using the `with` clause, I create the `orderbatch` subquery in lines 1–8 that
    simply is an aggregation of the ordered quantities per product. The rest of the
    query is identical to Listing [13-6](#475066_1_En_13_Chapter.xhtml#PC10), except
    that it uses `orderbatch` in line 26 instead of table `orderlines`.


    The output is a picking list showing what needs to be picked to fulfill the two
    orders:


    ```

    WH  AI  POS  P_ID  PICK_Q

    1   A   16   6520  22

    1   A   29   6520  14

    1   C   1    4280  36

    1   C   13   6520  20

    1   D   18   4280  39

    2   B   3    4280  35

    2   B   5    6520  14

    2   B   26   6520  24

    2   C   20   4280  30

    2   D   9    6520  26

    ```


    But there’s a slight problem for the picking operator – he can see how much to
    pick, but not how much of that he needs to pack in each order.


    To figure that out, I need to calculate some quantity intervals in Listing [13-11](#475066_1_En_13_Chapter.xhtml#PC28).


    ### Listing 13-11

    Quantity intervals for each pick out of total per product


    ```

    SQL> with orderbatch as (

    ...

    8  )

    9  select

    10     wh, ai, pos, p_id

    11   , least(loc_q, ord_q - acc_prv_q) as pick_q

    12   , acc_prv_q + 1       as from_q

    13   , least(acc_q, ord_q) as to_q

    14  from (

    15     select

    16        i.product_id as p_id

    17      , ob.qty       as ord_q

    18      , i.qty        as loc_q

    19      , nvl(sum(i.qty) over (

    20           partition by i.product_id

    21           order by i.purchased, i.qty

    22           rows between unbounded preceding and 1 preceding

    23        ), 0)        as acc_prv_q

    24      , nvl(sum(i.qty) over (

    25           partition by i.product_id

    26           order by i.purchased, i.qty

    27           rows between unbounded preceding and current row

    28        ), 0)        as acc_q

    29      , i.purchased

    30      , i.warehouse  as wh

    31      , i.aisle      as ai

    32      , i.position   as pos

    33     from orderbatch ob

    34     join inventory_with_dims i

    35        on i.product_id = ob.product_id

    36  )

    37  where acc_prv_q < ord_q

    38  order by p_id, purchased, loc_q, wh, ai, pos;

    ```


    The inline view in lines 14–36 is almost the same as before, but I have added
    an extra rolling sum in lines 24–28, so I now have both a rolling sum of the previous
    rows in `acc_prv_q` and a rolling sum that includes the current row in `acc_q`.


    With those I can in lines 12–13 calculate the from and to quantity intervals for
    the row, showing you this output that I’ve ordered in line 38 so that you easily
    can see what happens with the intervals:


    ```

    WH  AI  POS  P_ID  PICK_Q  FROM_Q  TO_Q

    1   C   1    4280  36      1       36

    1   D   18   4280  39      37      75

    2   B   3    4280  35      76      110

    2   C   20   4280  30      111     140

    1   A   29   6520  14      1       14

    2   B   5    6520  14      15      28

    1   C   13   6520  20      29      48

    2   B   26   6520  24      49      72

    2   D   9    6520  26      73      98

    1   A   16   6520  22      99      120

    ```


    With these quantity intervals, you can read that the 36 to be picked in the first
    row are numbers 1-36 out of the total 140 to be picked of product 4280, the 39
    in the next row are then numbers 37-75 out of the 140, and so on.


    If you’ve a keen eye, you may have spotted that in Listing [13-11](#475066_1_En_13_Chapter.xhtml#PC28),
    I am actually doing a superfluous analytic function call, since I am using a call
    both to calculate rolling sum of previous rows and to calculate rolling sum including
    the current row. But the latter could also be calculated as the rolling sum of
    previous rows + the quantity in the current row.


    So in Listing [13-12](#475066_1_En_13_Chapter.xhtml#PC30), I’ve changed slightly
    to only do the rolling sum of previous rows in order to save an analytic function
    call.


    ### Listing 13-12

    Quantity intervals with a single analytic sum


    ```

    SQL> with orderbatch as (

    ...

    8  )

    9  select

    10     wh, ai, pos, p_id

    11   , least(loc_q, ord_q - acc_prv_q) as pick_q

    12   , acc_prv_q + 1                   as from_q

    13   , least(acc_prv_q + loc_q, ord_q) as to_q

    14  from (

    15     select

    16        i.product_id as p_id

    17      , ob.qty       as ord_q

    18      , i.qty        as loc_q

    19      , nvl(sum(i.qty) over (

    20           partition by i.product_id

    21           order by i.purchased, i.qty

    22           rows between unbounded preceding and 1 preceding

    23        ), 0)        as acc_prv_q

    24      , i.purchased

    25      , i.warehouse  as wh

    26      , i.aisle      as ai

    27      , i.position   as pos

    28     from orderbatch ob

    29     join inventory_with_dims i

    30        on i.product_id = ob.product_id

    31  )

    32  where acc_prv_q < ord_q

    33  order by p_id, purchased, loc_q, wh, ai, pos;

    ```


    The inline view again only contains the `acc_prv_q` (as it used to), and then
    in line 13, I am using `acc_prv_q + loc_q` instead of the `acc_q` I no longer
    have. The result of Listing [13-12](#475066_1_En_13_Chapter.xhtml#PC30) is identical
    to that of Listing [13-11](#475066_1_En_13_Chapter.xhtml#PC28).'
