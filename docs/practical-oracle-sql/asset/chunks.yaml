    For these, beer information about their alcohol content is in table `product_alcohol`,
    and statistics about their monthly sales are in table `monthly_sales`.


    From these data, I will create SQL to find which year sold more than average for
    the half of the beers that have the lowest alcohol percentage in column `abv`
    (alcohol by volume).'
