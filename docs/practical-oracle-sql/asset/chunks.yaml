- fmt: '### Multiset except


    To the left in Figure [2-7](#475066_1_En_2_Chapter.xhtml#Fig7) is the same data
    in the same order as before, illustrating what is left if I take the beers of
    customer Hygge og Humle and use `multiset except all` to subtract the beers of
    customer The White Hart. Using `all` means it takes into account the number of
    occurrences of duplicates – the first customer has three rows with Hoppy Crude
    Oil, and the second customer has two rows, which leaves one row in the output
    of the subtraction.


    In the middle of Figure [2-7](#475066_1_En_2_Chapter.xhtml#Fig7), I still use
    `multiset except all`, except that I have swapped the two customers, so I take
    the beers of The White Hart and subtract the beers of Hygge og Humle. Same principle
    as before, the first customer has two rows of Der Helle Kumpel, and the second
    customer has one row, which leaves one row in the output. It gets interesting
    when I switch to `distinct`.


    To the right in Figure [2-7](#475066_1_En_2_Chapter.xhtml#Fig7), you can see that
    when I use `multiset except distinct`, the output no longer contains Der Helle
    Kumpel. One might think that it should be like removing duplicates from the output
    of `multiset except all`, but it is not. It is *first* removing duplicates from
    *both* input sets and *then* doing the subtraction. This means that there can
    be some values shown using `multiset except all` that *disappear* using `multiset
    except distinct`.


    ![../images/475066_1_En_2_Chapter/475066_1_En_2_Fig7_HTML.jpg](images/475066_1_En_2_Chapter/475066_1_En_2_Fig7_HTML.jpg)


    Figure 2-7

    Difference between multiset except all and multiset except distinct


    Showing the same in code, again I simply change the operator of Listing [2-8](#475066_1_En_2_Chapter.xhtml#PC16)
    to get the left output of Figure [2-7](#475066_1_En_2_Chapter.xhtml#Fig7):


    ```

    ...

    3     multiset except all

    ...

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_NAME_TYPE(5430,
    ''Hercule Trippel''))

    ```


    Swapping the order of the two input nested table columns gives me the middle output
    of Figure [2-7](#475066_1_En_2_Chapter.xhtml#Fig7):


    ```

    SQL> select

    2     hyggehumle.product_coll

    3     multiset except all

    4     whitehart.product_coll

    ...

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(6520, ''Der Helle Kumpel''), ID_NAME_TYPE(6600,
    ''Hazy Pink Cloud''), ID_NAME_TYPE(7950, ''Pale Rider Rides''), ID_NAME_TYPE(7950,
    ''Pale Rider Rides''))

    ```


    Finally switching to `multiset except distinct` produces the right output of Figure
    [2-7](#475066_1_En_2_Chapter.xhtml#Fig7), where you notice Der Helle Kumpel is
    missing:


    ```

    SQL> select

    2     hyggehumle.product_coll

    3     multiset except distinct

    4     whitehart.product_coll

    ...

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(6600, ''Hazy Pink Cloud''), ID_NAME_TYPE(7950,
    ''Pale Rider Rides''))

    ```


    With `multiset except`, you have the choice between `all` and `distinct` as shown
    here, but that is not the case with the set operator `minus`.


    ## Minus vs. multiset except


    The set operators are typically used more often than the multiset operators, `union
    all` probably most of all. But sometimes using `minus` can be a nice alternative
    to antijoins (`not in` and `not exists`).


    I’ve taken some care to show you the differences between `multiset except all`
    and `multiset except distinct` to lay the ground for Listing [2-9](#475066_1_En_2_Chapter.xhtml#PC25),
    where I use `minus` to produce the same output as I did just before with `multiset
    except distinct`.


    ```

    SQL> select product_id as p_id, product_name

    2  from customer_order_products

    3  where customer_id = 50741

    4  minus

    5  select product_id as p_id, product_name

    6  from customer_order_products

    7  where customer_id = 50042

    8  order by p_id;

    Listing 2-9

    Minus is like multiset except distinct

    ```


    Since `minus` also removes duplicates of the input sets first before doing the
    subtraction, this output also does not have Der Helle Kumpel in it:


    ```

    P_ID PRODUCT_NAME

    ----- -----------------

    6600 Hazy Pink Cloud

    7950 Pale Rider Rides

    ```


    But what if I want an output that takes number of occurrences of duplicates into
    account? In other words, how can I get a `minus all`, even if SQL does not support
    it?


    I’ve shown you that the multiset operators support it, so I can utilize this in
    Listing [2-10](#475066_1_En_2_Chapter.xhtml#PC27).


    ```

    SQL> select

    2     minus_all_table.id   as p_id

    3   , minus_all_table.name as product_name

    4  from table(

    5     cast(

    6        multiset(

    7           select product_id, product_name

    8           from customer_order_products

    9           where customer_id = 50741

    10        )

    11        as id_name_coll_type

    12     )

    13     multiset except all

    14     cast(

    15        multiset(

    16           select product_id, product_name

    17           from customer_order_products

    18           where customer_id = 50042

    19        )

    20        as id_name_coll_type

    21     )

    22  ) minus_all_table

    23  order by p_id;

    Listing 2-10

    Emulating minus all using multiset except all

    ```


    Each of the two `select`s of Listing [2-9](#475066_1_En_2_Chapter.xhtml#PC25)
    I put inside a `multiset` function call (lines 6–10 and 15–19), which converts
    the row set to a multiset (nested table). But I cannot just convert it to a “generic”
    type; I must use the `cast` function to specify which nested table type I want
    to create, in this case `id_name_coll_type`.


    That way I now have two multisets, so I can subtract one from the other with `multiset
    except all` in line 13. The result of this subtraction I place in the `table`
    function in line 4, which turns the multiset (nested table) back into a row set,
    so the query produces the output that I want:


    ```

    P_ID PRODUCT_NAME

    ----- -----------------

    6520 Der Helle Kumpel

    6600 Hazy Pink Cloud

    7950 Pale Rider Rides

    7950 Pale Rider Rides

    ```


    It works nicely, and the techniques shown can be useful from time to time to swap
    sets and multisets back and forth. But for this specific use case, it is a little
    bit overkill as I can emulate `minus all` simpler with the use of an analytic
    function, as I show in Listing [2-11](#475066_1_En_2_Chapter.xhtml#PC29).


    ```

    SQL> select

    2     product_id as p_id

    3   , product_name

    4   , row_number() over (

    5        partition by product_id, product_name

    6        order by rownum

    7     ) as rn

    8  from customer_order_products

    9  where customer_id = 50741

    10  minus

    11  select

    12     product_id as p_id

    13   , product_name

    14   , row_number() over (

    15        partition by product_id, product_name

    16        order by rownum

    17     ) as rn

    18  from customer_order_products

    19  where customer_id = 50042

    20  order by p_id;

    Listing 2-11

    Emulating minus all using analytic row_number function

    ```'
