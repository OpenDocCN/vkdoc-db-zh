  trans: '### 间隔检测


    当我从清单 18-5 和 18-6 的输出中获得连续的分组后，间隔就可以由一行的 `last_beat`（间隔前的最后一次心跳）和下一行的 `first_beat`（间隔后的下一次心跳）来定义。


    从下一行获取值自然让我想到了使用 `lead` 分析函数。因此，我在清单 18-7 中使用了 `lead`。


    ```sql

    SQL> select

    2     server, last_beat, next_beat

    3   , round((next_beat - last_beat) * (24*60)) as gap_minutes

    4  from (

    5     select

    6        server

    7      , last_beat

    8      , lead(first_beat) over (

    9           partition by server order by first_beat

    10        ) as next_beat

    11     from (

    ...

    27     )

    28  )

    29  where next_beat is not null

    30  order by server, last_beat;

    Listing 18-7

    使用 lead 函数从连续分组中检测间隔

    ```


    我将清单 18-6 的查询放在了第 11-27 行的内联视图中，然后在第 8-10 行，我使用 `lead` 来查找下一行的 `first_beat` 值。


    但对于分区中的最后一行，`lead` 将返回 `null`，谈论最后一行之后的间隔是没有意义的。所以，我再套了一层内联视图，并在第 29 行过滤掉了这些最后一行，得到了如下输出，显示每个服务器有两个间隔（将此与清单
    18-5 的输出进行比较）：


    ```sql

    SERVER      LAST_BEAT            NEXT_BEAT            GAP_MINUTES

    10.0.0.100  2019-04-10 13:20:00  2019-04-10 13:35:00  15

    10.0.0.100  2019-04-10 13:45:00  2019-04-10 13:55:00  10

    10.0.0.142  2019-04-10 13:00:00  2019-04-10 13:20:00  20

    10.0.0.142  2019-04-10 13:25:00  2019-04-10 13:50:00  25

    ```


    （如果你注意到第 3 行的 `round`，这只是因为其中一些 `gap_minutes` 值在第 20 位小数左右存在微小的舍入误差，因为 `next_beat
    – last_beat` 是以天为单位测量的，在某些情况下，当乘以 24∗60 转换为分钟时，会产生一些导致舍入误差的值。）


    这个方法运行良好，但实际上有可能避免对 `match_recognize` 的输出使用分析函数。在清单 18-8 中，我展示了如何直接通过模式匹配来检测间隔，无需任何“后处理”。


    ```sql

    SQL> select

    2     server, last_beat, next_beat

    3   , round((next_beat - last_beat) * (24*60)) as gap_minutes

    4  from server_heartbeat

    5  match_recognize (

    6     partition by server

    7     order by beat_time

    8     measures

    9        last(before_gap.beat_time) as last_beat

    10      , next_after_gap.beat_time   as next_beat

    11     one row per match

    12     after match skip to last next_after_gap

    13     pattern (strt five_mins_later* next_after_gap)

    14     subset before_gap = (strt, five_mins_later)

    15     define

    16        five_mins_later as

    17           beat_time = prev(beat_time) + interval ''5'' minute

    18      , next_after_gap as

    19           beat_time > prev(beat_time) + interval ''5'' minute

    20  )

    21  order by server, last_beat;

    Listing 18-8

    在 match_recognize 中直接检测间隔

    ```


    这给模式匹配增加了些许复杂度：


    *   我在第 16-19 行有*两个*定义。一个是我同样在清单 18-6 中用过的 `five_mins_later`。另一个是 `next_after_gap`，它将那些
    `beat_time` *超过*前一行 5 分钟的行进行分类。


    *   这使我可以在第 13 行指定一个像之前一样开始的 `pattern`：任意 `strt` 行后跟零个或多个 `five_mins_later` 行。但随后应该恰好有一行
    `next_after_gap` 行。因此，一个匹配项将由连续的行组*加上*之后的那一行（间隔后的行）组成。这也意味着，对于*最后一个*分组，找不到 `next_after_gap`
    行，所以它不会被匹配——这意味着我不需要过滤掉最后一个分组，因为这个模式只会找出那些（每台服务器）实际在其后存在间隔的两个分组。


    *   从这个匹配中，我需要间隔*前*的最后一次心跳和间隔*后*的第一次心跳。后者很简单；它就是单个 `next_after_gap` 行的 `beat_time`（第
    10 行）。前者则有点棘手，因为它可能来自一个 `strt` 行（如果连续的“组”仅由单行组成），也可能来自一个 `five_mins_later` 行。因此，我在第
    14 行定义了一个名为 `before_gap` 的子集，这样我就可以在第 9 行指定我需要最后一行 `before_gap` 行的 `beat_time`。


    *   最后，既然我已经将 `next_after_gap` 行包含在匹配中，我需要指定下一个匹配项应该*从*这一行开始搜索（而不是通常地从匹配项紧随的行开始）。我在第
    12 行的 `after match` 子句中完成了此操作，使得 `next_after_gap` 行成为下一个匹配项（如果有的话）的 `strt` 行。


    确实稍微复杂了一些，但当你了解了模式匹配中不同子句的含义后，它仍然可以像英语一样相对清晰地被阅读和理解——特别是当你为定义赋予了有意义的名字时。


    到目前为止，我展示了各种对连续数据进行分组的查询，这里的“连续”意味着一个列值对于每一行都按特定的固定单位递增。但也有一些情况，我们想根据其他定义来对数据进行分组。'
- fmt: '### Group until gap too large


    One of these other definitions is that a row keeps belonging to the group as long
    as it is “close” to the previous row – by however you define “close.” A group
    can become large and span a lot of rows, as the grouping doesn’t stop until the
    gap between two rows is bigger than the defined “closeness.”


    A common example of this is doing the so-called `sessionization`. You log every
    page visit (click) to your web site without having a unique session id – but as
    long as the clicks from a given client (IP address) keep on coming without much
    pause between them, you consider those visits together to be a “session.” Once
    the client has been away for a longer period (gaps in the page visit log), you
    consider his next visit to be the start of a new session.


    Good Beer Trading Co has such a web page visit log table, whose content you can
    see in Listing [18-9](#475066_1_En_18_Chapter.xhtml#PC15).


    ```

    SQL> select app_id, visit_time, client_ip, page_no

    2  from web_page_visits

    3  order by app_id, visit_time, client_ip;

    Listing 18-9

    Web page visit data

    ```


    Two different IP addresses have visited different pages at different times on
    a given date:


    ```

    APP_ID  VISIT_TIME           CLIENT_IP      PAGE_NO

    542     2019-04-20 08:15:42  104.130.89.12  1

    542     2019-04-20 08:16:31  104.130.89.12  3

    542     2019-04-20 08:28:55  104.130.89.12  4

    542     2019-04-20 08:41:12  104.130.89.12  3

    542     2019-04-20 08:42:37  104.130.89.12  2

    542     2019-04-20 08:55:02  104.130.89.12  4

    542     2019-04-20 09:03:34  104.130.89.12  2

    542     2019-04-20 09:17:50  104.130.89.12  2

    542     2019-04-20 09:28:32  104.130.89.12  2

    542     2019-04-20 09:34:29  104.130.89.12  2

    542     2019-04-20 09:43:46  104.130.89.12  2

    542     2019-04-20 09:47:08  104.130.89.12  2

    542     2019-04-20 09:49:12  104.130.89.12  3

    542     2019-04-20 11:57:26  85.237.86.200  1

    542     2019-04-20 11:58:09  85.237.86.200  2

    542     2019-04-20 11:58:39  85.237.86.200  2

    542     2019-04-20 12:02:02  85.237.86.200  3

    542     2019-04-20 14:45:10  104.130.89.12  1

    542     2019-04-20 15:02:22  104.130.89.12  3

    542     2019-04-20 15:02:44  104.130.89.12  2

    542     2019-04-20 15:04:01  104.130.89.12  2

    542     2019-04-20 15:05:11  104.130.89.12  2

    542     2019-04-20 15:05:48  104.130.89.12  3

    ```


    This is solved in Listing [18-10](#475066_1_En_18_Chapter.xhtml#PC17) pretty much
    like finding consecutive groups of rows, just adapting very slightly the criteria
    in the `define` clause.


    ```

    SQL> select app_id, first_visit, last_visit, visits, client_ip

    2  from web_page_visits

    3  match_recognize (

    4     partition by app_id, client_ip

    5     order by visit_time

    6     measures

    7        first(visit_time) as first_visit

    8      , last(visit_time)  as last_visit

    9      , count(*)          as visits

    10     one row per match

    11     pattern (strt within_15_mins*)

    12     define

    13        within_15_mins as

    14           visit_time <= prev(visit_time) + interval ''15'' minute

    15  )

    16  order by app_id, first_visit, client_ip;

    Listing 18-10

    Data belongs to same group (session) as long as max 15 minutes between page visits

    ```


    It’s another table and other column names and a classification name that gives
    more meaning for this case, but apart from that, you should recognize this is
    rather much like Listing [18-6](#475066_1_En_18_Chapter.xhtml#PC10). The *functional*
    difference is simply line 14 that uses `<=` instead of `=`, showing how a `match_recognize`
    solution is easy to adapt with small changes, as the different parts of the logic
    have been separated out in mainly the `define`, `pattern`, and `measure` clauses.
    Adapting Tabibitosan to solve sessionization would have been a lot harder (if
    not impossible) as the logic is so dependent on creating a value that can be compared
    to a monotonically increasing value.


    With this easy adaptation in Listing [18-10](#475066_1_En_18_Chapter.xhtml#PC17),
    I get four “session” groups created:


    ```

    APP_ID  FIRST_VISIT          LAST_VISIT           VISITS  CLIENT_IP

    542     2019-04-20 08:15:42  2019-04-20 09:49:12  13      104.130.89.12

    542     2019-04-20 11:57:26  2019-04-20 12:02:02  4       85.237.86.200

    542     2019-04-20 14:45:10  2019-04-20 14:45:10  1       104.130.89.12

    542     2019-04-20 15:02:22  2019-04-20 15:05:48  5       104.130.89.12

    ```


    Very often the logic used in pattern matching compares current rows to previous
    rows, but sometimes it can be a nice exercise to try and reverse the logic. Not
    that it changes much for this task, but knowing that you can do it with a “look
    ahead” logic can from time to time help in more tricky situations:


    ```

    ...

    11     pattern (has_15_mins_to_next* last_time)

    12     define

    13        has_15_mins_to_next as

    14           visit_time + interval ''15'' minute >= next(visit_time)

    ...

    ```


    Most of the code is like Listing [18-10](#475066_1_En_18_Chapter.xhtml#PC17),
    but I changed the `pattern` and `define` clauses:


    * Lines 13–14 define `has_15_mins_to_next` by comparing values to the `next` row
    – if the `visit_time` of the current row + 15 minutes is greater than the next
    row, I know it is within 15 minutes.

    * And then the `pattern` in line 11 needs to be adapted to find zero or more `has_15_mins_to_next`
    rows followed by exactly one other row (which I call `last_time`) that is *not*
    classified `has_15_mins_to_next`.


    This logic that looks ahead instead of back produces the same output as Listing
    [18-10](#475066_1_En_18_Chapter.xhtml#PC17).


    I’ve shown that almost same logic can group rows that either has a fixed interval
    between rows (consecutively) or has at most a certain interval between rows. But
    what if the groups are defined by having to be within a certain interval of the
    *first* row?'
