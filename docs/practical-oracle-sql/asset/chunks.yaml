- fmt: '### Combining `apex_string.split` and `substr`


    For the simple delimited list, I showed using `apex_string.split` as an alternative
    to building your own pipelined table function. There is no such standard alternative
    for the ODCI function `delimited_col_row.parser` that will handle both rows and
    columns.


    But I can separate handling of columns from handling of rows, as shown in Listing
    [9-12](#475066_1_En_9_Chapter.xhtml#PC22).


    ```sql

    SQL> select

    2     cr.customer_id  as c_id

    3   , c.name          as cust_name

    4   , p.id            as p_id

    5   , p.name          as prod_name

    6   , substr(

    7        rl.column_value

    8      , instr(rl.column_value, '':'') + 1

    9     ) as score

    10  from customer_reviews cr

    11  cross apply table(

    12     apex_string.split(cr.review_list, '','')

    13  ) rl

    14  join customers c

    15     on c.id = cr.customer_id

    16  join products p

    17     on p.id = to_number(

    18                  substr(

    19                     rl.column_value

    20                   , 1

    21                   , instr(rl.column_value, '':'') - 1

    22               ))

    23  order by cr.customer_id, p_id;

    ```


    Listing 9-12

    Getting rows with `apex_string.split` and columns with `substr`


    I start by splitting the review list into rows in line 12 by using `apex_string.split`
    with the row delimiter comma. That means that `rl` will have rows with `column_value`,
    which will contain values with the two columns delimited by a colon – for example,
    `4040:A`.


    Then it is a simple matter of using `substr` to pick out the product id in lines
    17–22 and pick out the score in lines 6–9. The output is identical to Listing
    [9-11](#475066_1_En_9_Chapter.xhtml#PC20).


    I’ve eliminated the custom function, but I’m still incurring a lot of context
    switches to PL/SQL, so next I’ll try to use pure SQL again.


    ### Row generators and `regexp_substr`


    Similar to how I used `apex_string.split` to get the rows and then `substr` to
    get the columns, I am adapting Listing [9-6](#475066_1_En_9_Chapter.xhtml#PC12)
    to create Listing [9-13](#475066_1_En_9_Chapter.xhtml#PC23), where I generate
    rows with `dual` and use `regexp_substr` to get the columns.


    ```sql

    SQL> select

    2     revs.customer_id as c_id

    3   , c.name           as cust_name

    4   , revs.product_id  as p_id

    5   , p.name           as prod_name

    6   , revs.score

    7  from (

    8     select

    9        cr.customer_id

    10      , to_number(

    11           regexp_substr(

    12              cr.review_list

    13            , ''(^|,)([^:,]*)''

    14            , 1

    15            , sub#

    16            , null

    17            , 2

    18           )

    19        ) as product_id

    20      , regexp_substr(

    21           cr.review_list

    22         , ''([^:,]*)(,|$)''

    23         , 1

    24         , sub#

    25         , null

    26         , 1

    27        ) as score

    28     from customer_reviews cr

    29     cross join lateral(

    30        select level sub#

    31        from dual

    32        connect by level <= regexp_count(cr.review_list, '','') + 1

    33     ) rl

    34  ) revs

    35  join customers c

    36     on c.id = revs.customer_id

    37  join products p

    38     on p.id = revs.product_id

    39  order by revs.customer_id, revs.product_id;

    ```


    Listing 9-13

    Generating as many rows as delimiter count


    The lateral inline view in lines 29–33 is just as I did in Listing [9-6](#475066_1_En_9_Chapter.xhtml#PC12).
    The trick here is to specify suitable regular expressions in lines 13 and 22 to
    extract the two columns as what comes *before* and *after* the colon, respectively:


    *   Line 13 looks for either the beginning of the string or a comma (group 1),
    followed by zero or more characters that are neither colon nor comma (group 2).
    Line 17 states the function should return the second group (this needs minimum
    version 11.2).

    *   Line 22 looks for zero or more characters that are neither colon nor comma
    (group 1), followed by either a comma or the end of the string (group 2). Line
    26 states the function should return the first group.


    Listing [9-13](#475066_1_En_9_Chapter.xhtml#PC23) produces an identical output
    as Listing [9-11](#475066_1_En_9_Chapter.xhtml#PC20) and Listing [9-12](#475066_1_En_9_Chapter.xhtml#PC22),
    but does it without PL/SQL calls at all. The cost is more use of regular expression
    functions, which can be relatively CPU expensive – so to find which performs best,
    you should test the approaches against your specific use case.


    All three solutions so far handle the string as it is, but I also mentioned at
    the start of the chapter that in many modern applications, such data would be
    stored as JSON rather than delimited. The database is capable of efficiently handling
    JSON as well as XML, so here’s a fourth method that utilizes this.'
