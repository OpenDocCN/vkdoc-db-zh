- fmt: '# 18. Grouping Data Through Patterns


    ### Overlapping W shapes


    The way I searched for the patterns in the last example meant that I looked on
    the graph as consisting of first a `W` shape and then a `V` shape. Looking at
    it that way means I only find a single `W` shape.


    But I could look on the graph as having two overlapping `W` shapes, as marked
    out in Figure [17-6](#475066_1_En_17_Chapter.xhtml#Fig6).


    ![../images/475066_1_En_17_Chapter/475066_1_En_17_Fig6_HTML.jpg](images/475066_1_En_17_Chapter/475066_1_En_17_Fig6_HTML.jpg)


    Figure 17-6


    The graph can be seen as having two overlapping `W` shapes


    Changing my code to enable searching for overlapping shapes is a matter of changing
    my `after match` clause, which in the previous examples was set like this:


    ```

    ...

    11     after match skip to last up

    ...

    ```


    That meant I never overlapped (except that strictly speaking a single row of each
    match would “overlap,” like in Figure [17-4](#475066_1_En_17_Chapter.xhtml#Fig4)
    with three `V` matches).


    If I **do** want to overlap, I need to change where to skip to in order to make
    the search for the next match start at a suitable row. Ideally it should be the
    “last row of the first `up+` part of the pattern,” but that cannot be specified.


    I could define two classifications, `up1` and `up2`, with identical definitions,
    use `up1+` for the first up-part and `up2+` for the second up-part, and then `skip
    to last up1`. But there is an easier solution that will work here, as I do in
    line 12 of Listing [17-8](#475066_1_En_17_Chapter.xhtml#PC32).


    ```sql

    SQL> select *

    2  from ticker

    3  match_recognize (

    4     partition by symbol

    5     order by day

    6     measures

    7        match_number() as match

    8      , first(day)     as first_day

    9      , last(day)      as last_day

    10      , count(*)       as days

    11     one row per match

    12     after match skip to first up

    13     pattern (

    14        strt down+ up+ down+ up+

    15     )

    16     define

    17        down as price < prev(price)

    18             or (    price = prev(price)

    19                 and price = last(up.price, 1)

    20                )

    21  )

    22  order by symbol, first_day;

    ```

    Listing 17-8

    Finding overlapping `W` shapes


    When I do `skip to first up` in line 12, the matching will run like this:


    *   The first `W` match is found from 2019-04-01 to 2019-04-12.


    *   The first `up` is 2019-04-04, so it goes there and tries if a new match can
    be found from there.


    *   So 2019-04-04 is classified `strt`, 2019-04-05 is `down`, and it keeps classifying
    rows that match the pattern right until 2019-04-19.


    *   The second `W` match therefore is 2019-04-04 to 2019-04-19.


    *   The first `up` of the second `W` match is 2019-04-11


    *   2019-04-11 is classified `strt`, 2019-04-12 is `up`, so the pattern is broken
    and no match.


    *   It moves on to 2019-04-12 and tries again for a new match, which will fail
    because it only matches a `V` shape, not a `W`.


    *   So it moves on to 2019-04-15 and tries again and fails.


    *   And so on until the end and no more matches are found.


    And that is exactly the output I get when I run Listing [17-8](#475066_1_En_17_Chapter.xhtml#PC32),
    which matches the markings on Figure [17-6](#475066_1_En_17_Chapter.xhtml#Fig6):


    ```

    SYMBOL  MATCH  FIRST_DAY   LAST_DAY    DAYS

    BEER    1      2019-04-01  2019-04-12  10

    BEER    2      2019-04-04  2019-04-19  12

    ```


    ## Lessons learned


    In this chapter I’ve dived deeper into the stock ticker example than the Oracle
    documentation does, mostly showing the complexities introduced when “flat” parts
    of the graph needs to be considered part of either a down-sloping or an up-sloping
    part of the graph.


    In the course of this walk-trough, I hope I’ve conveyed some knowledge about


    *   Using `all rows` vs. `one row per match` (often to debug the logic)


    *   How definitions in `define` are evaluated according to the fulfillment of
    `pattern`


    *   Different uses of `after match skip to`, with, or without `subset`


    This knowledge should help you develop code for matching similar patterns yourself.


    Grouping data with a `group by` clause requires you to find one or more values
    that are the same in those rows you want to belong to the same group. Often that
    is simply some columns or just as often a calculation on some columns.


    Sometimes, though, the condition that tells you a row belongs to a group is **not**
    simply a condition you can calculate using **only** values from that row itself,
    but the condition is on how the row **relates** to other rows. A condition to
    group by could, for example, be that all rows with consecutive sequential values
    should be grouped – when a gap in the sequence is found, a new group is started.
    This requires a calculation **across** rows, which often can be handled by analytic
    functions – but sometimes not.


    A solution here is to remember that in pattern matching when you use `one row
    per match`, that is in fact like an implicit `group by`, and you can use aggregates
    in the `measures` and get a result very much like if you had used a `group by`.
    And when you use `match_recognize` for grouping, the `define` and `pattern` clauses
    are just perfect for a grouping condition that depends on relations **between**
    rows in a certain order.


    ## Two sets of data to group


    To demonstrate grouping data with pattern matching, I use the tables in Figure
    [18-1](#475066_1_En_18_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_18_Chapter/475066_1_En_18_Fig1_HTML.jpg](images/475066_1_En_18_Chapter/475066_1_En_18_Fig1_HTML.jpg)


    Figure 18-1


    Tables with server heartbeat and web page visits used for grouping data


    In the `server_heartbeat` table, a row is inserted every time a server sends a
    heartbeat (a call that basically just says “I’m alive”), which should happen every
    5 minutes for every server.


    The `web_page_visits` table stores every visit to every web page in the web applications
    of Good Beer Trading Co (i.e., every click a user makes). This table references
    the `web_pages` table, which I include in the figure just to give you the context,
    but the examples in this chapter use the `web_page_visits` table.


    I’ll show the data of both tables later, just before the relevant examples.


    ## Three grouping conditions


    I’m going to show you three different types of relational conditions you can use
    pattern matching to group:


    *   Data where all consecutive data belong in a group, where consecutive simply
    means that a value increases by an exact fixed amount for each row. It can be
    numbers that increase by 1 or 100 or dates that increase by 5 minutes or 1 day
    or similar definitions of consecutive.


    *   Data where rows belong to a group as long as a value is close to the value
    of the previous row, for example, as long as a date value is within 15 minutes
    of the previous date.


    *   Data where a group is rows within a fixed interval, for example, one hour.
    But not hours on the clock (like grouping by `trunc(date_col, ''HH'')`), instead
    hours that begin by the first row in each group.


    You can probably think of other types of conditions, but these three cover a lot
    of use cases.


    ### Group consecutive data


    First let me delve into grouping data that is consecutive. This part I’ll cover
    more detailed to give you a ground base before going into the other two grouping
    methods.


    For comparison I’ll show you one method this could be done just with an analytic
    function and discuss why you might consider using `match_recognize` instead.'
  raw: '### Overlapping W shapes


    The way I searched for the patterns in the last example meant that I looked on
    the graph as consisting of first a W shape and then a V shape. Looking at it that
    way means I only find a single W shape.


    But I could look on the graph as having two overlapping W shapes, as marked out
    in Figure [17-6](#475066_1_En_17_Chapter.xhtml#Fig6).


    ![../images/475066_1_En_17_Chapter/475066_1_En_17_Fig6_HTML.jpg](images/475066_1_En_17_Chapter/475066_1_En_17_Fig6_HTML.jpg)


    Figure 17-6


    The graph can be seen as having two overlapping W shapes


    Changing my code to enable searching for overlapping shapes is a matter of changing
    my `after match` clause, which in the previous examples was set like this:


    ```

    ...

    11     after match skip to last up

    ...

    ```


    That meant I never overlapped (except that strictly speaking a single row of each
    match would “overlap,” like in Figure [17-4](#475066_1_En_17_Chapter.xhtml#Fig4)
    with three V matches).


    If I *do* want to overlap, I need to change where to skip to in order to make
    the search for the next match start at a suitable row. Ideally it should be the
    “last row of the first `up+` part of the pattern,” but that cannot be specified.


    I could define two classifications, `up1` and `up2`, with identical definitions,
    use `up1+` for the first up-part and `up2+` for the second up-part, and then `skip
    to last up1`. But there is an easier solution that will work here, as I do in
    line 12 of Listing [17-8](#475066_1_En_17_Chapter.xhtml#PC32).


    ```

    SQL> select *

    2  from ticker

    3  match_recognize (

    4     partition by symbol

    5     order by day

    6     measures

    7        match_number() as match

    8      , first(day)     as first_day

    9      , last(day)      as last_day

    10      , count(*)       as days

    11     one row per match

    12     after match skip to first up

    13     pattern (

    14        strt down+ up+ down+ up+

    15     )

    16     define

    17        down as price  prev(price)

    22             or (    price = prev(price)

    23                 and price = last(up.price  , 1)

    24                )

    25  )

    26  order by symbol, first_day;

    Listing 17-8

    Finding overlapping W shapes

    ```


    When I do `skip to first up` in line 12, the matching will run like this:


    *   The first W match is found from 2019-04-01 to 2019-04-12.


    *   The first `up` is 2019-04-04, so it goes there and tries if a new match can
    be found from there.


    *   So 2019-04-04 is classified `strt`, 2019-04-05 is `down`, and it keeps classifying
    rows that match the pattern right until 2019-04-19.


    *   The second W match therefore is 2019-04-04 to 2019-04-19.


    *   The first up of the second W match is 2019-04-11


    *   2019-04-11 is classified `strt`, 2019-04-12 is `up`, so the pattern is broken
    and no match.


    *   It moves on to 2019-04-12 and tries again for a new match, which will fail
    because it only matches a V shape, not a W.


    *   So it moves on to 2019-04-15 and tries again and fails.


    *   And so on until the end and no more matches are found.


    And that is exactly the output I get when I run Listing [17-8](#475066_1_En_17_Chapter.xhtml#PC32),
    which matches the markings on Figure [17-6](#475066_1_En_17_Chapter.xhtml#Fig6):


    ```

    SYMBOL  MATCH  FIRST_DAY   LAST_DAY    DAYS

    BEER    1      2019-04-01  2019-04-12  10

    BEER    2      2019-04-04  2019-04-19  12

    ```


    ## Lessons learned


    In this chapter I’ve dived deeper into the stock ticker example than the Oracle
    documentation does, mostly showing the complexities introduced when “flat” parts
    of the graph needs to be considered part of either a down-sloping or an up-sloping
    part of the graph.


    In the course of this walk-trough, I hope I’ve conveyed some knowledge about


    *   Using `all rows` vs. `one row per match` (often to debug the logic)


    *   How definitions in `define` are evaluated according to the fulfillment of
    `pattern`


    *   Different uses of `after match skip to`, with, or without `subset`


    This knowledge should help you develop code for matching similar patterns yourself.


    # 18. Grouping Data Through Patterns


    Grouping data with a `group by` clause requires you to find one or more values
    that are the same in those rows you want to belong to the same group. Often that
    is simply some columns or just as often a calculation on some columns.


    Sometimes, though, the condition that tells you a row belongs to a group is *not*
    simply a condition you can calculate using *only* values from that row itself,
    but the condition is on how the row *relates* to other rows. A condition to group
    by could, for example, be that all rows with consecutive sequential values should
    be grouped – when a gap in the sequence is found, a new group is started. This
    requires a calculation *across* rows, which often can be handled by analytic functions –
    but sometimes not.


    A solution here is to remember that in pattern matching when you use `one row
    per match`, that is in fact like an implicit `group by,` and you can use aggregates
    in the `measures` and get a result very much like if you had used a `group by`.
    And when you use `match_recognize` for grouping, the `define` and `pattern` clauses
    are just perfect for a grouping condition that depends on relations *between*
    rows in a certain order.


    ## Two sets of data to group


    To demonstrate grouping data with pattern matching, I use the tables in Figure
    [18-1](#475066_1_En_18_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_18_Chapter/475066_1_En_18_Fig1_HTML.jpg](images/475066_1_En_18_Chapter/475066_1_En_18_Fig1_HTML.jpg)


    Figure 18-1


    Tables with server heartbeat and web page visits used for grouping data


    In the `server_heartbeat` table , a row is inserted every time a server sends
    a heartbeat (a call that basically just says “I’m alive”), which should happen
    every 5 minutes for every server.


    The `web_page_visits` table stores every visit to every web page in the web applications
    of Good Beer Trading Co (i.e., every click a user makes). This table references
    the `web_pages` table, which I include in the figure just to give you the context,
    but the examples in this chapter use the `web_page_visits` table.


    I’ll show the data of both tables later, just before the relevant examples.


    ## Three grouping conditions


    I’m going to show you three different types of relational conditions you can use
    pattern matching to group:


    *   Data where all consecutive data belong in a group, where consecutive simply
    means that a value increases by an exact fixed amount for each row. It can be
    numbers that increase by 1 or 100 or dates that increase by 5 minutes or 1 day
    or similar definitions of consecutive.


    *   Data where rows belong to a group as long as a value is close to the value
    of the previous row, for example, as long as a date value is within 15 minutes
    of the previous date.


    *   Data where a group is rows within a fixed interval, for example, one hour.
    But not hours on the clock (like grouping by `trunc(date_col, ''HH'')`), instead
    hours that begin by the first row in each group.


    You can probably think of other types of conditions, but these three cover a lot
    of use cases.


    ### Group consecutive data


    First let me delve into grouping data that is consecutive. This part I’ll cover
    more detailed to give you a ground base before going into the other two grouping
    methods.


    For comparison I’ll show you one method this could be done just with an analytic
    function and discuss why you might consider using `match_recognize` instead.'
  trans: '# 18. 通过模式对数据进行分组


    ### 重叠的 W 形状


    我在上一个例子中搜索模式的方式，意味着我将图表看作先是一个`W`形状，然后是一个`V`形状。这样看的话，我只找到了一个单一的`W`形状。


    但我也可以将图表看作有两个重叠的`W`形状，如图 17-6 所标记的那样。


    ![../images/475066_1_En_17_Chapter/475066_1_En_17_Fig6_HTML.jpg](img/475066_1_En_17_Fig6_HTML.jpg)


    图 17-6


    该图表可以被视为具有两个重叠的`W`形状


    修改我的代码以支持搜索重叠形状，关键在于修改`after match`子句，在之前的例子中它是这样设置的：


    ```

    ...

    11     after match skip to last up

    ...

    ```


    这意味着我从未重叠（严格来说，每个匹配的一行可能会“重叠”，就像图 17-4 中三个`V`匹配那样）。


    如果我**确实**想要重叠，我需要改变跳转的位置，以便让下一次匹配的搜索从合适的行开始。理想情况下，它应该是“模式中第一个`up+`部分的最后一行”，但这无法直接指定。


    我可以定义两个分类`up1`和`up2`，它们具有相同的定义，对第一个上升部分使用`up1+`，对第二个上升部分使用`up2+`，然后`skip to last
    up1`。但这里有一个更简单的解决方案，就像我在代码清单 17-8 的第 12 行所做的那样。


    ```sql

    SQL> select *

    2  from ticker

    3  match_recognize (

    4     partition by symbol

    5     order by day

    6     measures

    7        match_number() as match

    8      , first(day)     as first_day

    9      , last(day)      as last_day

    10      , count(*)       as days

    11     one row per match

    12     after match skip to first up

    13     pattern (

    14        strt down+ up+ down+ up+

    15     )

    16     define

    17        down as price < prev(price)

    18             or (    price = prev(price)

    19                 and price = last(up.price, 1)

    20                )

    21  )

    22  order by symbol, first_day;

    ```

    代码清单 17-8

    查找重叠的`W`形状


    当我在第 12 行使用`skip to first up`时，匹配过程将如下进行：


    *   找到第一个`W`匹配，时间从 2019-04-01 到 2019-04-12。

    *   第一个`up`是 2019-04-04，所以跳转到那里，并尝试从那里开始是否能找到新的匹配。

    *   因此 2019-04-04 被分类为`strt`，2019-04-05 被分类为`down`，并且继续分类行，直到 2019-04-19 都符合模式。

    *   所以第二个`W`匹配是 2019-04-04 到 2019-04-19。

    *   第二个`W`匹配的第一个`up`是 2019-04-11。

    *   2019-04-11 被分类为`strt`，2019-04-12 被分类为`up`，因此模式被打破，没有匹配。

    *   它继续移动到 2019-04-12，并再次尝试寻找新匹配，但这将失败，因为它只匹配一个`V`形状，而不是`W`。

    *   所以它移动到 2019-04-15，再次尝试并失败。

    *   依此类推直到结束，没有找到更多的匹配。


    这正是我运行代码清单 17-8 得到的输出，它与图 17-6 上的标记相匹配：


    ```

    SYMBOL  MATCH  FIRST_DAY   LAST_DAY    DAYS

    BEER    1      2019-04-01  2019-04-12  10

    BEER    2      2019-04-04  2019-04-19  12

    ```


    ## 经验教训


    在本章中，我比 Oracle 文档更深入地探讨了股票行情示例，主要展示了当图表的“平坦”部分需要被视为图形下降部分或上升部分的一部分时引入的复杂性。


    在这个讲解过程中，我希望我已经传达了一些关于以下方面的知识：


    *   使用`all rows`与`one row per match`（通常用于调试逻辑）

    *   `define`中的定义如何根据`pattern`的满足情况来评估

    *   `after match skip to`的不同用法，带或不带`subset`


    这些知识应该能帮助你自己为类似的模式匹配开发代码。


    使用`group by`子句对数据进行分组，要求你找到那些你想要属于同一组的行中相同的一个或多个值。通常这很简单，就是某些列，或者同样常见的是对某些列的计算。


    然而，有时告诉你一行属于某个组的条件**并非**简单地基于**仅**使用该行本身值就能计算出的条件，而是关于该行如何**与其他行相关联**的条件。例如，一个分组条件可能是所有具有连续顺序值的行应该被分组——当序列中出现间隔时，就启动一个新组。这需要**跨行**进行计算，这通常可以通过分析函数来处理——但有时不行。


    这里的解决方案是记住，在模式匹配中，当你使用`one row per match`时，这实际上类似于一个隐式的`group by`，你可以在`measures`中使用聚合函数，得到的结果与使用`group
    by`非常相似。当你使用`match_recognize`进行分组时，`define`和`pattern`子句非常适合于依赖于**行之间**在特定顺序下关系的分组条件。


    ## 两组用于分组的数据


    为了演示使用模式匹配对数据进行分组，我使用了图 18-1 中的表。


    ![../images/475066_1_En_18_Chapter/475066_1_En_18_Fig1_HTML.jpg](img/475066_1_En_18_Fig1_HTML.jpg)


    图 18-1


    用于数据分组的服务器心跳和网页访问表


    在`server_heartbeat`表中，每次服务器发送心跳（基本上就是一个“我还活着”的调用）时插入一行，每个服务器应该每 5 分钟发生一次。


    `web_page_visits`表存储了 Good Beer Trading Co 公司 Web 应用中每个网页的每次访问（即用户的每次点击）。该表引用了`web_pages`表，我将其包含在图中只是为了提供上下文，但本章中的示例使用`web_page_visits`表。


    我将在相关示例之前展示这两个表的数据。


    ## 三种分组条件


    我将向你展示三种你可以使用模式匹配进行分组的不同类型的关系条件：


    *   所有连续数据属于一组的数据，其中“连续”仅意味着对于每一行，值按一个精确的固定量增加。可以是每次增加 1 或 100 的数字，也可以是每次增加 5
    分钟或 1 天或类似定义的日期。


    *   只要一个值与前一行值接近，行就属于一组的数据。例如，只要日期值在前一个日期的 15 分钟范围内。


    *   一组是固定时间间隔（例如一小时）内的行的数据。但不是时钟上的小时（如按`trunc(date_col, ''HH'')`分组），而是从每组的第一行开始计算的小时。


    你可能还能想到其他类型的条件，但这三种覆盖了很多用例。


    ### 对连续数据进行分组


    首先让我深入研究对连续数据进行分组。这部分我会讲得更详细，以便为进入其他两种分组方法之前给你打下基础。


    为了比较，我会展示一种仅使用分析函数就能完成此任务的方法，并讨论为什么你可能考虑改用`match_recognize`。'
- fmt: '## Analytic Tabibitosan vs. match_recognize


    Before moving on to the example tables I’ve shown, I will walk you through the
    Tabibitosan method to find groups of consecutive integers using a single analytic
    function. This method was introduced by Aketi Jyuuzou on the Oracle Community
    Forums (back then OTN Forums).


    I’ll start with Listing [18-1](#475066_1_En_18_Chapter.xhtml#PC1), where I just
    use a `with` clause to generate some rows with numbers instead of creating a real
    table.


    ```sql

    SQL> with ints(i) as (

    2     select 1 from dual union all

    3     select 2 from dual union all

    4     select 3 from dual union all

    5     select 6 from dual union all

    6     select 8 from dual union all

    7     select 9 from dual

    8  )

    9  select

    10     i

    11   , row_number() over (order by i)     as rn

    12   , i - row_number() over (order by i) as diff

    13  from ints

    14  order by i;

    Listing 18-1

    Difference between value and row_number

    ```


    Tabibitosan in Japanese means something like Mr. Pilgrim or Mr. Traveler. The
    idea is to imagine two walking pilgrims that both start at zero:


    *   The first pilgrim walks different distances each day, sometimes one mile and
    sometimes longer. His distance from the origin is represented by the integer value,
    in this case column `i`.


    *   The second pilgrim walks exactly one mile every day. His distance from the
    origin is represented by the results of `row_number` function that increases by
    exactly one for each row, in this case column `rn`.


    The third column in the output is the difference between `i` and `rn`. In the
    analogy, this represents the *distance* between the two pilgrims:


    ```

    I  RN  DIFF

    1  1   0

    2  2   0

    3  3   0

    6  4   2

    8  5   3

    9  6   3

    ```


    Those days where the first pilgrim travels at a speed of one mile per day, the
    distance between them remains the same. If the first pilgrim walks more than a
    single mile in one day, the distance between them increases. The numbers are fairly
    clear as is, but it’s even more clear when plotted on the graph in Figure [18-2](#475066_1_En_18_Chapter.xhtml#Fig2).


    ![`../images/475066_1_En_18_Chapter/475066_1_En_18_Fig2_HTML.jpg`](../images/475066_1_En_18_Chapter/475066_1_En_18_Fig2_HTML.jpg)


    **Figure 18-2**


    Difference between the two pilgrims can be used for grouping


    In other words, the difference (the red diamonds in the graph) between the integer
    column and `row_number` will be *constant* for those rows where the integer column
    increases by exactly one per row (i.e., is consecutive), so I can easily `group
    by` this difference in Listing [18-2](#475066_1_En_18_Chapter.xhtml#PC3).


    ```sql

    SQL> with ints(i) as (

    2     select 1 from dual union all

    3     select 2 from dual union all

    4     select 3 from dual union all

    5     select 6 from dual union all

    6     select 8 from dual union all

    7     select 9 from dual

    8  )

    9  select

    10     min(i)   as first_int

    11   , max(i)   as last_int

    12   , count(*) as ints_in_grp

    13  from (

    14     select i, i - row_number() over (order by i) as diff

    15     from ints

    16  )

    17  group by diff

    18  order by first_int;

    Listing 18-2

    Tabibitosan grouping

    ```


    Simply wrap the difference calculation in an inline view in lines 14–15 and group
    by the `diff` in line 17, and I get an output specifying the three groups of consecutive
    integers found in the data:


    ```

    FIRST_INT  LAST_INT  INTS_IN_GRP

    1          3         3

    6          6         1

    8          9         2

    ```


    So why do it with pattern matching if a perfectly good method exists with analytic
    functions? Part of the answer is that it can become easier to adapt to changing
    requirements, as I’ll show you. Part of it is about the efficiency of doing a
    one-pass operation while working through the data, instead of two passes – first
    the analytic row numbering and then the grouping.


    In Listing [18-3](#475066_1_En_18_Chapter.xhtml#PC5), I show you how to get the
    exact same output as Listing [18-2](#475066_1_En_18_Chapter.xhtml#PC3), just using
    `match_recognize` instead of the Tabibitosan method.


    ```sql

    SQL> with ints(i) as (

    2     select 1 from dual union all

    3     select 2 from dual union all

    4     select 3 from dual union all

    5     select 6 from dual union all

    6     select 8 from dual union all

    7     select 9 from dual

    8  )

    9  select first_int, last_int, ints_in_grp

    10  from ints

    11  match_recognize (

    12     order by i

    13     measures

    14        first(i) as first_int

    15      , last(i)  as last_int

    16      , count(*) as ints_in_grp

    17     one row per match

    18     pattern (strt one_higher*)

    19     define

    20        one_higher as i = prev(i) + 1

    21  )

    22  order by first_int;

    Listing 18-3

    Same grouping with match_recognize

    ```


    It is reasonably straightforward and reads like this:


    *   I define classification `one_higher` in line 20 to be a row where `i` is exactly
    1 greater than the previous `i` – indicating it is consecutive to the previous
    row.


    *   The `pattern` in line 18 looks for any row (classified `strt`) followed by
    zero or more `one_higher` rows. So this matches a group of rows as long as they
    have consecutive `i` values – when it no longer is consecutive, the match stops.


    *   Instead of the `group by` in Tabibitosan, here I can simply specify in line
    17 that I just want a single row output per match.


    *   Lines 14–16 get me the same values as Listing [18-2](#475066_1_En_18_Chapter.xhtml#PC3),
    just without grouping; here the pattern matching can work out the results as it
    walks along the data.


    I’ve laid the ground rules with some simple integer data showing analytic function
    solution vs. pattern matching; now I’ll move on to doing the same with a different
    datatype on more realistic data.'
