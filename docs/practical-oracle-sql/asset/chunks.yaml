    55      , least(o.to_q, f.to_q) - greatest(o.from_q, f.from_q) + 1

    56     ) as q_f_o

    57  from fifo f

    58  join olines o

    59     on o.p_id = f.p_id

    60     and o.to_q >= f.from_q

