  trans: '

    那么，为什么我选择使用 `model` 子句而非纯 SQL 来解决生命游戏呢？原因之一在于，标量子查询意味着需要对相同数据进行大量重复读取。通常，我会寻求使用分析函数来避免这种重复的数据访问，但这里的问题在于，我需要对*两个*维度上的一个范围进行求和。例如，如果我尝试使用带有
    `range between 1 preceding and 1 following` 子句的分析 `sum`，我只能在 `x` 或 `y` 维度中的一个上进行，而无法同时在两者上进行。


    使用 `model` 子句解决生命游戏的另一个原因，会在后续我开始在游戏中对更多世代进行迭代计算时变得清晰，因为用纯 SQL 实现这一点远比用 `model`
    子句复杂。请继续阅读，你就会明白我的意思。


    然而，在那之前，我想使用列表 6-2 中的 `listagg` 技术来可视化计算结果。因此在列表 6-5 中，我直接将列表 6-3 或 6-4 的 SQL
    放入一个 `with` 子句中，然后查询该子句的结果，而不是直接查询表。


    ```

    SQL> with conway as (

    ...

    /* 列表 6-3 或 6-4 的内容 */

    ...

    24  )

    25  select

    26     listagg(

    27        case alive

    28           when 1 then ''X''

    29           when 0 then '' ''

    30        end

    31     ) within group (

    32        order by x

    33     ) cells

    34   , listagg(sum_alive) within group (order by x) sum_alives

    35   , listagg(nb_alive ) within group (order by x) nb_alives

    36  from conway

    37  group by y

    38  order by y;

    Listing 6-5

    以网格形式显示计数

    ```


    第 26-33 行与列表 6-2 中的完全一致，然后我添加了第 34 和 35 行来可视化度量值 `sum_alive` 和 `nb_alive` 的内容，这样做是可行的，因为其值始终是个位数。`sum_alive`
    是我在 3x3 网格上计算的，因此最大值为 9，而 `nb_alive` 的最大值因此为 8。


    ```

    CELLS      SUM_ALIVES NB_ALIVES

    ---------- ---------- ----------

    0000000000 0000000000

    0000000000 0000000000

    0012210000 0012210000

    XX      0023310000 0022210000

    X       0023432100 0022432100

    XX    0023543100 0023532100

    XXX     0012443100 0011333100

    0012321000 0012321000

    0000000000 0000000000

    0000000000 0000000000

    ```


    你可以看到，在网格中 `cells` 为 `X` 的那些位置上，`nb_alives` 中的数字比 `sum_alive` 小 1 —— 正如预期的那样。


    到目前为止，我只为第零代建模并计算了邻居数量。现在，是时候利用该邻居数量来计算下一代中哪些位置会有存活细胞，计算下一代的邻居数量，然后为之后的一代又一代……迭代地重复这个过程。


    ## 迭代世代


    在本章开头，我陈述了康威生命游戏的四条规则。它们很好地用于描述模拟细胞生物种群的“生命”。但对于在编程语言中实现这些规则，审视规则的逻辑并以下列方式重新表述可能会有所帮助：


    *   任何具有恰好两个存活邻居的细胞，在下一代中保持其状态（存活或死亡）。

    *   任何具有恰好三个存活邻居的细胞，在下一代中将是存活的（无论它在当前代是存活还是死亡）。

    *   任何其他细胞在下一代中将是死亡的。


    这些规则的结果与原始四条规则相同，但对程序员有一个巨大优势：可以轻松地使用 `if` 或 `case` 结构，基于当前代的邻居数量是二、三还是其他，来判定一个细胞在下一代是存活还是死亡。因此，我将在列表
    6-6 中这样做。


    ```

    SQL> with conway as (

    2     select *

    3     from conway_gen_zero

    4     model

    5     dimension by (

    6        0 as generation

    7      , x, y

    8     )

    9     measures (

    10        alive

    11      , 0 as sum_alive

    12      , 0 as nb_alive

    13     )

    14     ignore nav

    15     rules upsert all iterate (2)

    16     (

    17        sum_alive[iteration_number, any, any] =

    18           sum(alive)[

    19              generation = iteration_number

    20            , x between cv() - 1 and cv() + 1

    21            , y between cv() - 1 and cv() + 1

    22           ]

    23      , nb_alive[iteration_number, any, any] =

    24           sum_alive[iteration_number, cv(), cv()]

    25             - alive[iteration_number, cv(), cv()]

    26      , alive[iteration_number + 1, any, any] =

    27           case nb_alive[iteration_number, cv(), cv()]

    28              when 2 then alive[iteration_number, cv(), cv()]

    29              when 3 then 1

    30              else 0

    31           end

    32     )

    33  )

    34  select

    35     generation

    36   , listagg(

    37        case alive

    38           when 1 then ''X''

    39           when 0 then '' ''

    40        end

    41     ) within group (

    42        order by x

    43     ) cells

    44   , listagg(sum_alive) within group (order by x) sum_alives

    45   , listagg(nb_alive ) within group (order by x) nb_alives

    46  from conway

    47  group by generation, y

    48  order by generation, y;

    Listing 6-6

    迭代两代

    ```


    与列表 6-3 相比，我添加了一些内容来处理细胞的世代：


    *   在第 6 行，我添加了另一个维度 `generation`，总共三个维度。这个维度在表中不存在，所以我用值零对其进行初始化。这意味着表中的 100
    行在多维数组中都将 `generation` 设为零，而 `x` 和 `y` 值来自表。

    *   在第 15 行的规则子句中，我添加了 `upsert all`，这表示如果我为一个现有单元格设置值，它将被更新；但如果我为一个不存在的单元格设置值，它将被创建。这是必要的，因为我将为每次迭代的每一代创建
    100 个新单元格。

    *   在第 15 行，我还添加了 `iterate (2)`，这意味着规则将被应用两次。

    *   由于我添加了一个维度，我必须扩展在 `sum_alive` 和 `nb_alive` 的公式中用于单元格寻址的索引（第 17-25 行）。对于 `generation`
    维度，我使用 `iteration_number` 的值，这是一个从零开始并在每次迭代时递增 1 的数字。因此，`sum_alive` 和 `nb_alive`
    是为与迭代匹配的代计算的，从第零代开始。

