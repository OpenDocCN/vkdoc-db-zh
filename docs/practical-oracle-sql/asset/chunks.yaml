    subquery, I can also rewrite it in an alternative manner in Listing [3-5](#475066_1_En_3_Chapter.xhtml#PC8).


    ```

    SQL> with product_alc_class as (

    2     select

    3        pa.product_id

    4      , ntile(2) over (

    5           order by pa.abv, pa.product_id

    6        ) as alc_class

    7     from product_alcohol pa

    8  ), yearly_sales as (

    9     select

    10        ms.product_id

    11      , extract(year from ms.mth) as yr

    12      , sum(ms.qty) as yr_qty

    13      , avg(sum(ms.qty)) over (

    14           partition by ms.product_id

    15        ) as avg_yr

    16     from monthly_sales ms

    17     group by

    18        ms.product_id

    19      , extract(year from ms.mth)

    20  )

    21  select

    22     pac.product_id as p_id

    23   , ys.yr

    24   , ys.yr_qty

    25   , round(ys.avg_yr) as avg_yr

    26  from product_alc_class pac

    27  join yearly_sales ys

    28     on ys.product_id = pac.product_id

    29  where pac.alc_class = 1

    30  and ys.yr_qty > ys.avg_yr

    31  order by p_id, yr;

    Listing 3-5

    Alternative rewrite using independent named subqueries

    ```


    The `product_alc_class` named subquery is unchanged from Listing [3-4](#475066_1_En_3_Chapter.xhtml#PC7).
    But instead of `class_one_yearly_sales,` I create the simpler `yearly_sales` in
    lines 8–20, where I calculate the yearly sales of *all* products *without* joining
    to `product_alc_class`. The two named subqueries in my `with` clause are now not
    dependent on one another.


    In the main query, I simply join the two named subqueries in lines 26–28 and do
    filtering in the `where` clause in lines 29–30\. With this code, I achieve the
    same output once again as the last two listings.


    Listings [3-4](#475066_1_En_3_Chapter.xhtml#PC7) and [3-5](#475066_1_En_3_Chapter.xhtml#PC8)
    are both examples of using the `with` clause in a manner that could have been
    solved with inline views. The prime benefit is readability, as the definition
    of the named subqueries is separated, not inline nested within one another. But
    there are other benefits to the `with` clause that aren’t as easily solvable with
    inline views.'
  trans: '## 使用 with 子句实现模块化


    `with` 子句允许我将子查询置于查询的顶部，为其命名，并在其他地方像使用视图一样引用它们——你可以将其视为过程式编程中的重构，因此也被称为*子查询因子化*。在清单
    3-4 中，我对清单 3-3 进行了重构，使用 `with` 子句中的命名子查询替代了内联视图。


    ```sql

    SQL> with product_alc_class as (

    2     select

    3        pa.product_id

    4      , ntile(2) over (

    5           order by pa.abv, pa.product_id

    6        ) as alc_class

    7     from product_alcohol pa

    8  ), class_one_yearly_sales as (

    9     select

    10        pac.product_id as p_id

    11      , extract(year from ms.mth) as yr

    12      , sum(ms.qty) as yr_qty

    13      , avg(sum(ms.qty)) over (

    14           partition by pac.product_id

    15        ) as avg_yr

    16     from product_alc_class pac

    17     join monthly_sales ms

    18        on ms.product_id = pac.product_id

    19     where pac.alc_class = 1

    20     group by

    21        pac.product_id

    22      , extract(year from ms.mth)

    23  )

    24  select

    25     p_id, yr, yr_qty

    26   , round(avg_yr) as avg_yr

    27  from class_one_yearly_sales

    28  where yr_qty > avg_yr

    29  order by p_id, yr;

    清单 3-4

    使用子查询因子化重写清单 3-3

    ```


    我将清单 3-3 最内层的内联视图的子查询放在第 2-7 行，并将其命名为 `product_alc_class`（使用有意义的名称是个好主意）。然后，我可以在查询的后续部分引用
    `product_alc_class`，就像使用数据字典中的视图一样。但它并未在数据字典中创建；仅在此 SQL 语句内部局部定义。


    清单 3-3 的第二级内联视图随后放在第 9-22 行，并在第 8 行被命名为 `class_one_yearly_sales`。在第 16 行，它查询了
    `product_alc_class` 命名子查询，而清单 3-3 在相同位置使用的是一个内联视图。


    第 24-29 行的主查询对应于清单 3-3 第 1-4 行和第 26-28 行的外部查询，只是查询的是 `class_one_yearly_sales`
    命名子查询，而非内联视图。


    清单 3-4 的输出与清单 3-3 相同，并且优化器很可能重写了 SQL 以实现相同的访问计划，那么我获得了什么？


    以这种简单的方式使用 `with` 子句，我主要获得了**可读性**——将 `select` 列表和 `where` 子句集中在第 24-29 行，通过查询一个命名恰当的子查询，使得独立编写、理解和检查大查询中仅*这部分*的逻辑变得更加容易。同样，两个命名子查询中的每一个，都可以单独查看。这与你从局部模块化过程代码中获得的好处相同。


    但是，清单 3-4 通过让第二个子查询从第一个子查询中选择，而主查询又从第二个子查询中选择，从而重构了清单 3-3 的*嵌套*内联视图。我也可以在清单 3-5
    中以另一种方式重写它。


    ```sql

    SQL> with product_alc_class as (

    2     select

    3        pa.product_id

    4      , ntile(2) over (

    5           order by pa.abv, pa.product_id

    6        ) as alc_class

    7     from product_alcohol pa

    8  ), yearly_sales as (

    9     select

    10        ms.product_id

    11      , extract(year from ms.mth) as yr

    12      , sum(ms.qty) as yr_qty

    13      , avg(sum(ms.qty)) over (

    14           partition by ms.product_id

    15        ) as avg_yr

    16     from monthly_sales ms

    17     group by

    18        ms.product_id

    19      , extract(year from ms.mth)

    20  )

    21  select

    22     pac.product_id as p_id

    23   , ys.yr

    24   , ys.yr_qty

    25   , round(ys.avg_yr) as avg_yr

    26  from product_alc_class pac

    27  join yearly_sales ys

    28     on ys.product_id = pac.product_id

    29  where pac.alc_class = 1

    30  and ys.yr_qty > ys.avg_yr

    31  order by p_id, yr;

    清单 3-5

    使用独立命名子查询的替代重写方式

    ```


    `product_alc_class` 命名子查询与清单 3-4 中相同。但在第 8-20 行，我没有使用 `class_one_yearly_sales`，而是创建了更简单的
    `yearly_sales`，它计算了*所有*产品的年度销售额，*没有*与 `product_alc_class` 进行连接。我的 `with` 子句中的两个命名子查询现在彼此独立。


    在主查询中，我简单地在第 26-28 行连接了两个命名子查询，并在第 29-30 行的 `where` 子句中进行了过滤。使用此代码，我再次获得了与前两个清单相同的输出。


    清单 3-4 和 3-5 都是使用 `with` 子句解决原本可以用内联视图解决的问题的例子。主要好处是可读性，因为命名子查询的定义是分离的，而不是相互嵌套内联的。但是
    `with` 子句还有其他内联视图不易解决的好处。'
- fmt: '### Multiple uses of the same subquery


    One of the issues that potentially can arise from doing something like Listing
    3-5 is that I might calculate the yearly sales of all products, even though I
    only need it done for half of the products. Depending on how the code is written,
    the optimizer might or might not be smart enough to decide whether or not it is
    the fastest to just do it for all products, or it might be faster to push the
    predicates into the subquery to only do it for the desired half.


    Sometimes it is not possible to make the query push the predicates. In such cases,
    I can force it to only calculate yearly sales for the desired products by the
    method in Listing 3-6.


    ```

    SQL> with product_alc_class as (

    ...

    8  ), yearly_sales as (

    ...

    16     from monthly_sales ms

    17     where ms.product_id in (

    18        select pac.product_id

    19        from product_alc_class pac

    20        where pac.alc_class = 1

    21     )

    ...

    25  )

    26  select

    ...

    31  from product_alc_class pac

    32  join yearly_sales ys

    33     on ys.product_id = pac.product_id

    34  where ys.yr_qty > ys.avg_yr

    35  order by p_id, yr;

    Listing 3-6

    Querying one subquery multiple places

    ```


    Listing 3-6 is almost identical to Listing 3-5. But I have added lines 17–21 to
    make the `yearly_sales` be calculated only for those products found in the `product_alc_class`
    named subquery. Even so I still use `product_alc_class` in the join in the main
    query in line 31 – that is okay, as it is allowed to use the named subquery multiple
    places in the code.


    But since the `yearly_sales` now has been pre-filtered to give me only those for
    `alc_class = 1`, I no longer need it in the final `where` clause in line 34 –
    I still get the same output as the last three listings.


    Note


    Strictly speaking, in this particular case, I could avoid joining to `product_alc_class`
    in the main query in Listing 3-6, since I could have queried `ys.product_id` in
    the `select` list instead of `pac.product_id`. But if there had been more columns
    in `product_alc_class` that I needed in the output, then the double usage of the
    named subquery would be necessary.


    A huge benefit of factoring out subqueries in the `with` clause like this is that
    the optimizer can decide to treat them in one of two different ways, depending
    on what it thinks will give the lowest cost:


    It can treat them just like views, meaning that the SQL of the named subqueries
    is basically substituted each place that they are queried.


    It can also decide to execute the SQL of a named subquery *only once*, storing
    the results in a temporary table it creates on the fly and then accessing this
    temporary table each place that the named subquery is queried.


    The `with` clause allows the optimizer this choice, and (like always when the
    optimizer is involved) it most often makes a good choice, but sometimes it can
    make the wrong choice.


    To try and see if it is a good idea for the optimizer to do the second method,
    I can add the *undocumented* hint `/*+ materialize */` in line 2 of Listing 3-6
    like this:


    ```

    SQL> with product_alc_class as (

    2     select /*+ materialize */

    3        pa.product_id

    ...

    ```


    With this hint, I force the optimizer to choose the access method of doing a `temp
    table transformation` with a `load as select` as seen in Figure 3-2.


    ![../images/475066_1_En_3_Chapter/475066_1_En_3_Fig2_HTML.jpg](images/475066_1_En_3_Chapter/475066_1_En_3_Fig2_HTML.jpg)


    ### Figure 3-2


    Explain plan showing creation and use of the ad hoc temporary table


    The operations in the explain plan that are nested under the `load as select`
    are the execution of the `product_alc_class` named subquery, whose results then
    are stored in the on-the-fly created temporary table that is given a `sys_temp_*`
    name. This temporary table is then accessed twice in the rest of the explain plan.


    The `/*+ materialize */` hint is perfect for testing and finding out if you would
    really like the optimizer to do it this way. If you find this to be the case,
    but the optimizer prefers (wrongly in *your* opinion) treating your named subquery
    as a view instead of materializing it, then you might get the idea that you would
    like to use the hint in your production code as well. An idea I cannot recommend.


    It is possible, even likely, that you will be safe using the hint, but it is *always*
    strongly discouraged to use undocumented hints in production code. You don’t have
    any guarantee from Oracle that it will stay there – it might disappear with no
    warning at the next upgrade. Then you can use an alternative method to force materialization:


    ```

    SQL> with product_alc_class as (

    2     select

    3        pa.product_id

    4      , ntile(2) over (

    5           order by pa.abv, pa.product_id

    6        ) as alc_class

    7     from product_alcohol pa

    8     where rownum >= 1

    9  ), yearly_sales as (

    ...

    ```


    In this version of Listing 3-6, I have taken out the `/*+ materialize */` hint
    again, but instead added line 8. A filter clause (that always evaluates as true)
    on `rownum` also makes it necessary for the optimizer to materialize the results
    of the `product_alc_class` named subquery.


    Using `where rownum >= 1` or in other ways referencing `rownum` is a classic trick
    to prevent view merging. It works because the values assigned to the `rownum`
    pseudocolumn could easily be different when view merging is performed compared
    to when it is not. The optimizer cannot allow itself to perform a query optimization
    that potentially can change the results, so therefore it cannot allow view merging
    when using `rownum`. Hence it must choose to materialize instead. This mechanism
    works for the `with` clause as well as for inline or stored views.'
