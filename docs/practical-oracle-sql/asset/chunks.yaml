    第 14-36 行的内联视图与之前几乎相同，但我额外在第 24-28 行添加了一个累加求和。这样，我同时拥有了 `acc_prv_q`（前序行的滚动和）和
    `acc_q`（包含当前行的滚动和）。


    借助这些字段，我就能在第 12-13 行计算出该行的数量区间（从...到...），并在第 38 行进行了排序，以便你清晰地看到区间是如何变化的：


