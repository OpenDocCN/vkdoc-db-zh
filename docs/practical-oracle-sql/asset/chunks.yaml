  trans: "\n# 7. 将列转为行\n\n理想情况下，你可能会希望总是使用那些在关系型数据库中已良好规范化的数据，就像计算机科学课程中所教授的那样。但在现实中，情况往往并非如此理想。\n\
    \n一个相当常见的模式是，某些数据拥有一系列列，而你实际上希望将这些数据作为行来处理，例如，以键值对的形式，其中*键*源自原始列名，而*值*则是该列的值。\n\
    \n我个人喜欢使用**维度**和**度量**这两个术语，而不是键和值。你可能会说这只适用于数据仓库，但这些术语也用于其他地方，例如在 SQL 的`model`子句中。在我看来，其优势在于人们通常会考虑多个维度和多个度量，而键值术语最常用于仅考虑单个键和单个值的情况。\n\
    \n将行数据转换为列的操作称为*透视*（*pivoting*）（这是下一章的主题），因此由于这是相反的操作，故称为*逆透视*（*unpivoting*）。我将通过一些示例来展示逆透视操作，这些示例基于包含来自外部源数据的表——当然这并非总是如此，但也并不少见。\n\
    \n## 以列形式接收的数据\n\n为了举例说明逆透视，我将使用图 7-1 所示的两个表。\n\n![../images/475066_1_En_7_Chapter/475066_1_En_7_Fig1_HTML.jpg](img/475066_1_En_7_Fig1_HTML.jpg)\n\
    \n图 7-1\n\n保存从网络提供商接收的传入数据的表\n\nGood Beer Trading Co 使用外部服务来收集关于公司网店访客的统计数据。该服务提供每日统计数据，这些数据被导入到以下两个表中：\n\
    \n*   表 `web_devices` 中保存了每日关于网店访客中有多少来自个人电脑（PC）、平板电脑和手机的统计信息，每种设备类型的访客数存储在单独的列中。\n\
    *   表 `web_demographics` 中同时保存了访客数量以及访客最终购买的数量。数量和购买量都按男性与女性访客分开，并且按来自 Twitter\
    \ 活动与来自 Facebook 活动的访客分开。因此，例如，列 `m_tw_cnt` 是来自 Twitter 的男性访客数，而列 `f_fb_qty` 是来自\
    \ Facebook 的女性访客的购买量。\n\n我将在这些表上演示各种逆透视方法。\n\n## 逆透视为行\n\n首先，我查看一下表 `web_devices`\
    \ 的内容，见清单 7-1。\n\n```\nSQL> select day, pc, tablet, phone\n2  from web_devices\n\
    3  order by day;\nDAY         PC    TABLET  PHONE\n2019-05-01  1042  812     1610\n\
    2019-05-02  967   1102    2159\n清单 7-1\n每日按设备的网站访问量\n```\n\n我现在想要做的是对这些数据进行*逆透视*，使用一个包含设备（PC、平板或手机）的单一维度列，以及一个包含该设备访客数（即来自表中对应列的值）的单一度量列。\n\
    \n第一种方法是使用 `select` 语句的 `unpivot` 子句，如清单 7-2 所示。\n\n```\nSQL> select day, device,\
    \ cnt\n2  from web_devices\n3  unpivot (\n4     cnt\n5     for device\n6     in\
    \ (\n7        pc     as 'PC'\n8      , tablet as 'Tablet'\n9      , phone  as\
    \ 'Phone'\n10     )\n11  )\n12  order by day, device;\n清单 7-2\n使用 unpivot 获取维度和度量\n\
    ```\n\n`unpivot` 子句由三部分组成：\n\n*   首先必须定义度量——本例中是第 4 行的 `cnt`。这是一个不存在但将被创建的列；我只是定义应有一个名为\
    \ `cnt` 的单一度量。\n*   然后我定义度量应存在的维度——第 5 行使用关键字 `for`，后跟维度名称 `device`。这同样是一个将被创建的不存在的列。\n\
    *   最后，第 6-10 行的 `in` 子句定义了从原始列到新的度量列和维度列的映射。这里我定义了三个映射（第 7-9 行），这意味着每个输入行将生成三个输出行：\n\
    \    *   一行，`cnt` 中为来自 `pc` 的值，`device` 中为字符串 `'PC'`\n    *   一行，`cnt` 中为来自 `tablet`\
    \ 的值，`device` 中为字符串 `'Tablet'`\n    *   一行，`cnt` 中为来自 `phone` 的值，`device` 中为字符串\
    \ `'Phone'`\n\n图 7-2 展示了数据流——根据 `in` 子句中的映射规则，左侧*列*的值流向度量列，右侧的*字面量*流向维度列。\n\n\
    ![../images/475066_1_En_7_Chapter/475066_1_En_7_Fig2_HTML.jpg](img/475066_1_En_7_Fig2_HTML.jpg)\n\
    \n图 7-2\n\n单一维度和度量值的流动\n\n我在 `in` 子句中指定的原始表的那些列将不会出现在输出中，因为它们及其值已被转换为维度和度量。表的任何*其他*列都将原样输出——本例中只有\
    \ `day` 列，但如果存在其他列，它们也会出现在输出中。\n\n总的来说，清单 7-2 给出了如下输出，每天三行，每行对应一种设备类型，正如我所希望的那样完成了逆透视：\n\
    \n```\nDAY         DEVICE  CNT\n2019-05-01  PC      1042\n2019-05-01  Phone  \
    \ 1610\n2019-05-01  Tablet  812\n2019-05-02  PC      967\n2019-05-02  Phone  \
    \ 2159\n2019-05-02  Tablet  1102\n```\n"
- fmt: '### Do-it-yourself unpivoting


    But there is another way to unpivot without using the `unpivot` clause. Before
    version 10, you had to do it yourself manually, and I’ll show you a couple of
    versions of the manual unpivot. It can be handy to know of it so you can recognize
    what’s happening if you see it in old code. And once in a rare while, there is
    also the possibility you have something complex that fits less optimally into
    the `unpivot` clause and it is easier to implement it this way.


    The basic idea in both versions is that I need to generate as many rows as I have
    values of my dimension. With the `unpivot` clause, these rows are generated automatically
    as many as I have expressions in the `in` list – in Listing 7-3, I generate those
    three rows manually using `select from dual`.


    ```

    SQL> select

    2     wd.day

    3   , case r.rn

    4        when 1 then ''PC''

    5        when 2 then ''Tablet''

    6        when 3 then ''Phone''

    7     end as device

    8   , case r.rn

    9        when 1 then wd.pc

    10        when 2 then wd.tablet

    11        when 3 then wd.phone

    12     end as cnt

    13  from web_devices wd

    14  cross join (

    15     select level as rn from dual connect by level <= 3

    16  ) r

    17  order by day, device;

    Listing 7-3

    Manual unpivot using numbered row generator

    ```


    In the inline view `r`, I generate three rows in line 15 numbered 1, 2, and 3.
    With these rows, I do a Cartesian join (line 14) to the `web_devices` table, so
    for each and every row in `web_devices`, I get three rows in the output.


    Then I use two `case` structures for my dimension and measure:


    *   Lines 3–7 put the literal values for dimension `device` in the first, second,
    and third generated row.

    *   Lines 8–12 put the count values from columns `pc`, `table`, and `phone` in
    the same rows in measure `cnt`.


    That makes Listing 7-3 produce the exact same output as Listing 7-2, just performed
    with manual unpivoting.


    Listing 7-4 is an alternative manual unpivoting method that also produces the
    same output.


    ```

    SQL> with devices( device ) as (

    2     select ''PC''     from dual union all

    3     select ''Tablet'' from dual union all

    4     select ''Phone''  from dual

    5  )

    6  select

    7     wd.day

    8   , d.device

    9   , case d.device

    10        when ''PC''     then wd.pc

    11        when ''Tablet'' then wd.tablet

    12        when ''Phone''  then wd.phone

    13     end as cnt

    14  from web_devices wd

    15  cross join devices d

    16  order by day, device;

    Listing 7-4

    Manual unpivot using dimension style row generator

    ```


    Where Listing 7-3 generates three numbered rows with `case` structures defining
    what data to put in row 1, row 2, and row 3, Listing 7-4 instead generates three
    rows that already have the values needed for the dimension. Here I chose to put
    the generator in a `with` clause in lines 1–5 instead of an inline view, but the
    effect is the same.


    Again I do a Cartesian join with the generated rows in line 15, but now I do not
    need two `case` structures anymore. As the dimension value, I can directly use
    the column from the generated rows in line 8, leaving me with a single `case`
    structure in lines 9–13 for my measure. The difference here is I do not use “row
    1, row 2, row 3,” but rather the values of the dimension.


    Using the `with` clause also illustrates nicely that `devices` could have been
    a real table instead of generated rows in a `with` clause – then the query simply
    would have consisted of lines 6–16. Note, however, that it would not be a *dynamic*
    unpivoting – even though the dimension values would come from a table, I would
    still need to hardcode the values into the `case` structure. It *could* be dynamic,
    but it would require dynamic SQL. I’ll show an example of this later in the chapter.


    ### More than one dimension and/or measure


    The previous example used table `web_devices` with a single dimension and single
    measure; now I’ll show handling of multiple dimensions and measures. You saw the
    diagram of table `web_demographics` at the start of the chapter; Listing 7-5 shows
    you the content.


    ```

    SQL> select

    2     day

    3   , m_tw_cnt

    4   , m_tw_qty

    5   , m_fb_cnt

    6   , m_fb_qty

    7   , f_tw_cnt

    8   , f_tw_qty

    9   , f_fb_cnt

    10   , f_fb_qty

    11  from web_demographics

    12  order by day;

    Listing 7-5

    Daily web visits and purchases per gender and channel

    ```


    Showing all those columns isn’t nicely formatted, but you can see the eight columns
    that are all combinations of two measures (`cnt` and `qty`) for two values of
    dimension `gender` (`m` and `f`) and two values of dimension `channel` (`tw` and
    `fb`):


    ```

    DAY         M_TW_CNT  M_TW_QTY  M_FB_CNT  M_FB_QTY  F_TW_CNT  F_TW_QTY  F_FB_CNT  F_FB_QTY

    2019-05-01  1232      86        1017      64        651       76        564       68

    2019-05-02  1438      142       1198      70        840       92        752       78

    ```


    The syntax for using `unpivot` with multiple dimensions and/or multiple measures
    is pretty much identical to what I did for single dimension/measure in Listing
    7-2 – except that instead of single expressions, I need to use *expression lists*,
    as I show it in Listing 7-6.


    ```

    SQL> select day, gender, channel, cnt, qty

    2  from web_demographics

    3  unpivot (

    4     ( cnt, qty )

    5     for ( gender, channel )

    6     in (

    7        (m_tw_cnt, m_tw_qty) as (''Male''  , ''Twitter'' )

    8      , (m_fb_cnt, m_fb_qty) as (''Male''  , ''Facebook'')

    9      , (f_tw_cnt, f_tw_qty) as (''Female'', ''Twitter'' )

    10      , (f_fb_cnt, f_fb_qty) as (''Female'', ''Facebook'')

    11     )

    12  )

    13  order by day, gender, channel;

    Listing 7-6

    Using unpivot with two dimensions and two measures

    ```


    Expression lists are comma-separated lists of expressions inside a set of parentheses
    – the parentheses are mandatory to identify an expression list, not just a convenience
    for readability. In the code, I have expression lists in multiple places:


    *   In line 4, the expression list defines *two* measures, `cnt` and `qty` – like
    before, they are columns that will be created, not columns in the table.

    *   The expression list in line 5 defines two dimensions in a similar manner.

    *   Each mapping in lines 7–10 then uses two expression lists each with two columns
    – first on the left side an expression list with two columns from the table and
    then on the right an expression list with two literals.


    All this leads to an output with four output rows for each input row – since there
    are four mappings in the `in` clause:


    ```

    DAY         GENDER  CHANNEL   CNT   QTY

    2019-05-01  Female  Facebook  564   68

    2019-05-01  Female  Twitter   651   76

    2019-05-01  Male    Facebook  1017  64

    2019-05-01  Male    Twitter   1232  86

    2019-05-02  Female  Facebook  752   78

    2019-05-02  Female  Twitter   840   92

    2019-05-02  Male    Facebook  1198  70

    2019-05-02  Male    Twitter   1438  142

    ```


    In Figure 7-3 I show that the flow is still the same – just like in Figure 7-2
    – and how the expression lists correspond. Values from the table columns left
    of the `as` keyword flow to the measures, literals to the right of the `as` keyword
    flow to the dimensions.


    ![../images/475066_1_En_7_Chapter/475066_1_En_7_Fig3_HTML.jpg](images/475066_1_En_7_Chapter/475066_1_En_7_Fig3_HTML.jpg)


    Figure 7-3

    Flow of multiple dimension and measure values


    Looking on the figure also makes it clear that the expression lists with table
    columns (left) must have the same number of columns as the expression list that
    defines the measures. Likewise, the expression lists with literals (right) must
    have the same number of literals as the expression list that defines the dimensions.'
