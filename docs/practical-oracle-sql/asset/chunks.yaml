- fmt: '# 康威生命游戏与SQL模型子句


    在代码的第26-31行，我应用了康威的三条改写规则。在这里，我根据当前代 (`this generation`) 中 `nb_alive` 的值，使用 `case`
    结构来设置 `next` 代中 `alive` 的值。这就是需要 `upsert all` 的地方，因为我正在创建代数值高一的新单元格。


    总的来说，代码清单 [6-6] 产生以下输出：


    ```

    GENERATION CELLS      SUM_ALIVES NB_ALIVES

    ---------- ---------- ---------- ----------

    0            0000000000 0000000000

    0            0000000000 0000000000

    0            0012210000 0012210000

    0    XX      0023310000 0022210000

    0    X       0023432100 0022432100

    0      XX    0023543100 0023532100

    0    XXX     0012443100 0011333100

    0            0012321000 0012321000

    0            0000000000 0000000000

    0            0000000000 0000000000

    1            0000000000 0000000000

    1            0000000000 0000000000

    1            0012210000 0012210000

    1    XX      0023421000 0022321000

    1    X X     0034643100 0033633100

    1    X XX    0023665200 0022654200

    1     XXX    0013564200 0013453200

    1     X      0002342100 0002242100

    1            0001110000 0001110000

    1            0000000000 0000000000


    2    XX

    2   XX XX

    2    X

    2    X  X

    2     X


    ```


    第零代中 `cells`（度量 `alive`）的内容直接来自表格。


    在第一次迭代 (`iteration_number` 为 `0`) 中，计算第零代的 `sum_alive` 和 `nb_alive`，并计算第一代的 `cells`（`alive`）。


    在第二次迭代 (`iteration_number` 为 `1`) 中，计算第一代的 `sum_alive` 和 `nb_alive`，并计算第二代的 `cells`（`alive`）。然后我不再迭代，所以第二代的
    `sum_alive` 和 `nb_alive` 未被计算。


    使用普通 SQL 来进行这种跨多代的迭代会困难得多。结合使用类似代码清单 [6-4] 的技术与递归子查询因子分解（第4章），可能可以实现，但不会很漂亮，而且很可能性能不佳。


    像代码清单 [6-6] 那样使用模型子句来做这件事实际上是相当声明式的，但这是另一种思维方式。代码清单 [6-6] 可能看起来有点长，但一旦我开发完成，我可以看到我实际上不需要显式计算中间值
    `sum_alive` 和 `nb_alive`。我可以将这些计算直接放入 `alive` 的计算中，从而在代码清单 [6-7] 中形成一个简化的查询。


    ```

    SQL> with conway as (

    2     select *

    3     from conway_gen_zero

    4     model

    5     dimension by (

    6        0 as generation

    7      , x, y

    8     )

    9     measures (

    10        alive

    11     )

    12     ignore nav

    13     rules upsert all iterate (2)

    14     (

    15        alive[iteration_number + 1, any, any] =

    16           case sum(alive)[

    17                    generation = iteration_number,

    18                    x between cv() - 1 and cv() + 1,

    19                    y between cv() - 1 and cv() + 1

    20                ] - alive[iteration_number, cv(), cv()]

    21              when 2 then alive[iteration_number, cv(), cv()]

    22              when 3 then 1

    23              else 0

    24           end

    25     )

    26  )

    27  select

    28     generation

    29   , listagg(

    30        case alive

    31           when 1 then ''X''

    32           when 0 then '' ''

    33        end

    34     ) within group (

    35        order by x

    36     ) cells

    37  from conway

    38  group by generation, y

    39  order by generation, y;

    Listing 6-7

    简化的查询

    ```


    简化后的查询当然不再显示邻居数量，但我不再需要它们了；它们主要在代码开发过程中有用：


    ```

    GENERATION CELLS

    ---------- ----------


    0    XX

    0    X

    0      XX

    0    XXX


    1    XX

    1    X X

    1    X XX

    1     XXX

    1     X


    2    XX

    2   XX XX

    2    X

    2    X  X

    2     X


    ```


    现在我可以随意尝试，例如生成25代：


    ```

    13     rules upsert all iterate (25)

    GENERATION CELLS

    ---------- ----------

    ...

    25    X   X X

    25   XXXX

    25  X  XX  XX

    25 X X   XXX

    25 X X X  XX

    25 X    X X

    25 X XX   X

    25  X    X  X

    25        XXX

    25         X

    260 rows selected.

    ```


    我可以看到活细胞已经扩散到我整个10x10的网格上，那么如果我运行50代，它会被完全填满吗？


    ```

    13     rules upsert all iterate (50)

    GENERATION CELLS

    ---------- ----------

    ...


    50         XX

    50         XX


    510 rows selected.

    ```


    嗯，没有。从大约第40代开始，种群数量开始减少，从第46代开始，只剩下四个活细胞，形成一个稳定的模式，并将永远保持这样。部分原因是我的网格太小且有限——理论上，生命游戏应该运行在无限的网格上。


    为了结束关于生命游戏的探索，代码清单 [6-8] 在一个6x6的网格上放置了一个不同的第零代。这个新的起点给我们带来了一个振荡的游戏，在运行迭代时看到它很有趣。


    ```

    SQL> truncate table conway_gen_zero;

    Table CONWAY_GEN_ZERO truncated.

    SQL> insert into conway_gen_zero (x, y, alive)

    2  select * from (

    3     with numbers as (

    4        select level as n from dual

    5        connect by level <= 6

    6     ), grid as (

    7        select

    8           x.n as x

    9         , y.n as y

    10        from numbers x

    11        cross join numbers y

    12     ), start_cells as (

    13        select  4 x,  2 y from dual union all

    14        select  2 x,  3 y from dual union all

    15        select  5 x,  3 y from dual union all

    16        select  2 x,  4 y from dual union all

    17        select  5 x,  4 y from dual union all

    18        select  3 x,  5 y from dual

    19     )

    20     select

    21        g.x

    22      , g.y

    23      , nvl2(sc.x, 1, 0) as alive

    24     from grid g

    25     left outer join start_cells sc

    26        on  sc.x = g.x

    27        and sc.y = g.y

    28  );

    36 rows inserted.

    Listing 6-8

    蟾蜍振荡器

    ```


    然后我运行代码清单 [6-7]，只迭代两代：


    ```

    13     rules upsert all iterate (2)

    ```


    在输出中，我可以看到第二代与第零代相同，这意味着第三代将与第一代相同，依此类推：


    ```

    GENERATION CELLS

    ---------- ----------


    0    X

    0  X  X

    0  X  X

    0   X


    1   XXX

    1  XXX


    2    X

    2  X  X

    2  X  X

    2   X


    18 rows selected.

    ```


    这个输出是一个被称为周期为2的振荡器的例子，因为它在两个种群状态之间来回振荡。有许多这样的振荡器例子——这一个被称为“蟾蜍”，在图 [6-3] 中进行了可视化。


    ![../images/475066_1_En_6_Chapter/475066_1_En_6_Fig3_HTML.jpg](images/475066_1_En_6_Chapter/475066_1_En_6_Fig3_HTML.jpg)


    图 6-3


    蟾蜍振荡器的两种状态


    ## 经验总结


    在本章中，我使用了一个更“有趣”而本身实用性较低的例子。然而，我这样做是因为它是展示 `model` 子句某些强大功能的绝佳示例，因此在阅读完本章后，你应该对以下内容有所了解：


    *   为 `dimension by` 中的多维数组选择“索引”

    *   定义属性，以在 `measures` 中携带数组每个单元格的值

    *   使用 `[]` 语法在 `rules` 中从一个或多个单元格（使用聚合）检索数据

    *   使用 `iterate` 重复多次规则

    *   使用 `upsert all` 创建新单元格


    有了这些“构建模块”，当你遇到适合用这种方法处理数据的用例时，就可以创建自己的 `model` 子句。'
  raw: '*   In lines 26–31, I apply the three rewritten rules of Conway, where I set
    the value of `alive` in the *next* generation using the case structure based on
    `nb_alive` in *this* generation. This is where the `upsert all` is needed, since
    I am creating new cells with a generation value one higher.


    In total, Listing [6-6](#475066_1_En_6_Chapter.xhtml#PC9) produces this output:


    ```

    GENERATION CELLS      SUM_ALIVES NB_ALIVES

    ---------- ---------- ---------- ----------

    0            0000000000 0000000000

    0            0000000000 0000000000

    0            0012210000 0012210000

    0    XX      0023310000 0022210000

    0    X       0023432100 0022432100

    0      XX    0023543100 0023532100

    0    XXX     0012443100 0011333100

    0            0012321000 0012321000

    0            0000000000 0000000000

    0            0000000000 0000000000

    1            0000000000 0000000000

    1            0000000000 0000000000

    1            0012210000 0012210000

    1    XX      0023421000 0022321000

    1    X X     0034643100 0033633100

    1    X XX    0023665200 0022654200

    1     XXX    0013564200 0013453200

    1     X      0002342100 0002242100

    1            0001110000 0001110000

    1            0000000000 0000000000


    2    XX

    2   XX XX

    2    X

    2    X  X

    2     X


    ```


    The content of `cells` (measure `alive`) in generation zero comes directly from
    the table.


    In the first iteration (`iteration_number 0`), the `sum_alive and nb_alive` of
    generation zero are calculated, and the `cells` (`alive`) of generation one are
    calculated.


    In the second iteration (`iteration_number 1`), the `sum_alive` and `nb_alive`
    of generation one are calculated, and the `cells` (`alive`) of generation two
    are calculated. Then I do not iterate anymore, so `sum_alive` and `nb_alive` of
    generation two are not calculated.


    Such iteration over multiple generations would have been much more difficult to
    do with plain SQL. Using a technique like Listing [6-4](#475066_1_En_6_Chapter.xhtml#PC5)
    combined with recursive subquery factoring (Chapter [4](#475066_1_En_4_Chapter.xhtml)),
    it would probably be possible, but it would not be very nice and most likely not
    very performant.


    Using the model clause to do this like Listing [6-6](#475066_1_En_6_Chapter.xhtml#PC9)
    is actually quite declarative, but it is a different way of thinking. Listing
    [6-6](#475066_1_En_6_Chapter.xhtml#PC9) may look a bit long, but once I have it
    developed, I can see that I do not actually need to explicitly calculate the intermediate
    values `sum_alive` and `nb_alive`. I can put those calculations directly into
    the calculation of `alive`, making a reduced query in Listing [6-7](#475066_1_En_6_Chapter.xhtml#PC11).


    ```

    SQL> with conway as (

    2     select *

    3     from conway_gen_zero

    4     model

    5     dimension by (

    6        0 as generation

    7      , x, y

    8     )

    9     measures (

    10        alive

    11     )

    12     ignore nav

    13     rules upsert all iterate (2)

    14     (

    15        alive[iteration_number + 1, any, any] =

    16           case sum(alive)[

    17                    generation = iteration_number,

    18                    x between cv() - 1 and cv() + 1,

    19                    y between cv() - 1 and cv() + 1

    20                ] - alive[iteration_number, cv(), cv()]

    21              when 2 then alive[iteration_number, cv(), cv()]

    22              when 3 then 1

    23              else 0

    24           end

    25     )

    26  )

    27  select

    28     generation

    29   , listagg(

    30        case alive

    31           when 1 then ''X''

    32           when 0 then '' ''

    33        end

    34     ) within group (

    35        order by x

    36     ) cells

    37  from conway

    38  group by generation, y

    39  order by generation, y;

    Listing 6-7

    Reducing the query

    ```


