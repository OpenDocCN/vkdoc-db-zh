  trans: "# 日常访问量数据中的模式\n\n首先，我再次尝试基于绝对数字寻找模式。在 `清单 20-7` 中，我查找那些日访问量比该时期前一天至少高出 50\
    \ 的时期。\n\n```sql\nSQL> select\n2     url, from_day, to_day, days, begin, p_v,\
    \ f_v, t_v, d_v\n3  from web_page_counter_hist\n4  match_recognize(\n5     partition\
    \ by page_no\n6     order by day\n7     measures\n8        first(friendly_url)\
    \ as url\n9      , first(day) as from_day\n10      , final last(day) as to_day\n\
    11      , final count(*) as days\n12      , first(counter) as begin\n13      ,\
    \ first(counter) - prev(first(counter)) as p_v\n14      , next(first(counter))\
    \ - first(counter) as f_v\n15      , next(final last(counter)) - first(counter)\
    \ as t_v\n16      , round(\n17           (next(final last(counter)) - first(counter))\n\
    18              / final count(*)\n19         , 1\n20        ) as d_v\n21     one\
    \ row per match\n22     after match skip past last row\n23     pattern ( peak+\
    \ )\n24     define\n25        peak as next(counter) - counter\n26            \
    \     - (first(counter) - prev(first(counter))) >= 50\n27  )\n28  order by page_no,\
    \ from_day;\n清单 20-7\n日访问量比前一天至少高出 50\n```\n\n看起来与我之前所做的有很多相似之处，但也存在一些差异：\n\n\
    *   第 25-26 行中峰值分类的定义是这样工作的：\n    *   第 25 行中 `next()` 计数器值减去当前计数器值是当前日的访问量。\n\
    \    *   第 26 行中 `first()` 减去 `prev(first()` 等同于回到上一行并执行 `next()` 减去当前值，换句话说，这是匹配开始前一天日的访问量。\n\
    \    *   用当前日访问量减去“前一天”访问量，得出当前日高出多少——如果这个值至少是 50，则该行被分类为 `peak`。\n*   在 `measures`\
    \ 子句中，我计算了这四个值：\n    *   `p_v` 是之前的访问量——即匹配第一行前一天的访问量，如前文所述。\n    *   `f_v` 是第一天的访问量——即匹配第一天的访问量。\n\
    \    *   `t_v` 是总访问量——从匹配第一天到最后一天的访问量总和。\n    *   `d_v` 是日均访问量——匹配期间每天的平均访问量。\n\
    \n总的来说，这段代码产生以下输出：\n\n```\nURL          FROM_DAY    TO_DAY      DAYS  BEGIN  P_V\
    \  F_V  T_V   D_V\n/Shop        2019-04-12  2019-04-17  6     5800   67   279\
    \  1386  231\n/Categories  2019-04-28  2019-04-28  1     4625   37   360  360\
    \   360\n/Breweries   2019-04-17  2019-04-17  1     2484   42   163  163   163\n\
    ```\n\n你会认出这是 `图 20-3` 中所示图表上最大的三个尖峰。\n\n在 `清单 20-7` 中，为了基于 `counter` 数据计算访问量，使用了大量的\
    \ `prev`、`next`、`first()` 和 `last()`。我也可以预先计算每日访问量，从而简化我的 `match_recognize` 子句，如\
    \ `清单 20-8` 所示。\n\n```sql\nSQL> select\n2     url, from_day, to_day, days, begin,\
    \ p_v, f_v, t_v, d_v\n3  from (\n4     select\n5        page_no, friendly_url,\
    \ day, counter\n6      , lead(counter) over (\n7           partition by page_no\
    \ order by day\n8        ) - counter as visits\n9     from web_page_counter_hist\n\
    10  )\n11  match_recognize(\n12     partition by page_no\n13     order by day\n\
    14     measures\n15        first(friendly_url) as url\n16      , first(day) as\
    \ from_day\n17      , final last(day) as to_day\n18      , final count(*) as days\n\
    19      , first(counter) as begin\n20      , prev(first(visits)) as p_v\n21  \
    \    , first(visits) as f_v\n22      , final sum(visits) as t_v\n23      , round(final\
    \ avg(visits)) as d_v\n24     one row per match\n25     after match skip past\
    \ last row\n26     pattern ( peak+ )\n27     define\n28        peak as visits\
    \ - prev(first(visits)) >= 50\n29  )\n30  order by page_no, from_day;\n清单 20-8\n\
    通过预计算访问量来简化代码\n```\n\n第 4-9 行包含一个与 `清单 20-6` 相同的内联视图，在其中我使用分析函数 `lead()` 来计算每日访问量。然后，我的\
    \ `match_recognize` 子句变得简单得多：\n\n*   第 28 行简单地就是当前 `visits` 与匹配开始前一天的访问量之间的差值。\n\
    *   前文描述的四个度量在第 20-23 行通过使用导航函数和聚合函数变得简单得多。\n\n`清单 20-8` 的输出与 `清单 20-7` 相同。\n\n\
    值得注意的是，数据库在 `清单 20-8` 中多做了一点工作，因为它必须先用分析函数进行预计算，然后才能进行模式匹配。另一方面，模式匹配处理变得简单了，所以根据数据情况，可能会抵消这部分开销——情况可能因人而异，所以请在你自己的数据上测试这两种方法。\n\
    \n还有一种常见情况是，你的数据已经包含类似“每日访问量”的形式，而不是递增计数器的历史快照值。如果是这样，那么很容易跳过 `清单 20-8` 中的内联视图，直接在你的数据上应用模式匹配。\n\
    \n现在，通过关注 `visits`，我似乎得到了比本章开头几个示例更好的峰值检测，但像“至少高出 50”这样的绝对值可能仍然不够好。所以在 `清单 20-9`\
    \ 中，我修改了 `清单 20-8`，改为相对地搜索“至少高出 50%”。\n\n```sql\nSQL> select\n2     url, from_day,\
    \ to_day, days, begin, p_v, f_v, t_v, d_pct\n3  from (\n...\n10  )\n11  match_recognize(\n\
    ...\n23      , round(\n24           (100*(final sum(visits) / prev(first(visits)))\
    \ - 100)\n25              / final count(*)\n26         , 1\n27        ) as d_pct\n\
    ...\n31     define\n32        peak as visits / nullif(prev(first(visits)), 0)\
    \ >= 1.5\n33  )\n34  order by page_no, from_day;\n清单 20-9\n日访问量比前一天至少高出 50%\n\
    ```\n\n在第 32 行，我从观察差值转向观察比率。如果 `prev()` 行的访问量为零，我无法计算比率，所以我使用 `nullif()` 在这些情况下使整个表达式为\
    \ null。\n\n然后，我没有使用每日访问量度量，而是使用第 23-27 行来计算每日访问量相对于“前一天”访问量的百分比日均值。\n\n我现在在数据中发现了相当多的更多峰值，但它们真的是峰值吗？"
