    62  order by f.p_id, f.from_q, o.from_q;

    Listing 13-15

    How much quantity from each pick goes to which order

    ```


    Lines 53–56 calculate the “quantity for order” (`q_f_o`) by taking either the
    quantity that is on the location or the “size of the interval overlap,” whichever
    is the smaller of the two. The result is this output with all the necessary information
    for the picking operator:


    ```

