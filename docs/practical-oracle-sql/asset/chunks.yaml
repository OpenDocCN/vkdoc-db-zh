    Listing 6-8

    The Toad

    ```


    And then I run Listing [6-7](#475066_1_En_6_Chapter.xhtml#PC11) iterating just
    for two generations:


    ```

    13     rules upsert all iterate (2)

    ```


    In the output, I can see that generation two is identical to generation zero,
    which means generation three would be identical to generation one, and so on:


    ```

    GENERATION CELLS

    ---------- ----------


    0    X

    0  X  X

    0  X  X

    0   X


    1   XXX

    1  XXX


    2    X

    2  X  X

    2  X  X

    2   X


    18 rows selected.

    ```


    This output is an example of what is known as an oscillator with period 2, since
    it oscillates back and forth between two populations. There are many examples
    of such oscillators – this one is known as the Toad, visualized in Figure [6-3](#475066_1_En_6_Chapter.xhtml#Fig3).


    ![../images/475066_1_En_6_Chapter/475066_1_En_6_Fig3_HTML.jpg](images/475066_1_En_6_Chapter/475066_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    The two states of the Toad oscillator


    ## Lessons learned


    In this chapter I have used an example that is a bit more “for fun” and less practically
    useful in itself. I have done it, however, as it is a very good showcase of some
    of the powerful features of the `model` clause, so having read the chapter, you
    should have an idea about


    *   Selecting “indexes” for the multidimensional array in `dimension by`


    *   Defining attributes to carry the values for each cell of the array in `measures`


    *   Using [] syntax to retrieve data from one or more (with aggregation) cells
    in `rules`


    *   Repeating the rules multiple times with `iterate`


    *   Creating new cells with `upsert all`


    With these “building blocks,” you can create your own `model` clauses when you
    have a use case that is suitable for this method of handling data.'
