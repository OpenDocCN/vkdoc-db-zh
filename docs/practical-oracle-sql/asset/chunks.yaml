    清单 18-10

    只要页面访问间隔最长为 15 分钟，数据就属于同一组（会话）


    这是另一个表、不同的列名以及一个为此案例赋予更多意义的分类名称，但除此之外，你应该能认出这与清单 18-6 非常相似。*功能上*的区别仅仅是第 14 行使用了
    `<=` 而不是 `=`，这表明 `match_recognize` 解决方案如何通过微小的改动轻松调整，因为逻辑的不同部分主要被分离在 `define`、`pattern`
    和 `measure` 子句中。而使用 Tabibitosan 方法来解决会话化问题将会困难得多（甚至可能无法实现），因为其逻辑严重依赖于创建一个可以与单调递增值进行比较的值。


    通过清单 18-10 中的这个简单调整，我创建了四个“会话”组：


    ```

    APP_ID  FIRST_VISIT          LAST_VISIT           VISITS  CLIENT_IP

    542     2019-04-20 08:15:42  2019-04-20 09:49:12  13      104.130.89.12

    542     2019-04-20 11:57:26  2019-04-20 12:02:02  4       85.237.86.200

    542     2019-04-20 14:45:10  2019-04-20 14:45:10  1       104.130.89.12

    542     2019-04-20 15:02:22  2019-04-20 15:05:48  5       104.130.89.12

    ```


    在模式匹配中使用的逻辑通常是比较当前行与前一行，但有时尝试反转逻辑也是一个很好的练习。尽管这对于这个任务改变不大，但知道你可以使用“向前看”的逻辑，偶尔会在更棘手的情况下有所帮助：


    ```sql

    ...

    11     pattern (has_15_mins_to_next* last_time)

    12     define

    13        has_15_mins_to_next as

    14           visit_time + interval ''15'' minute >= next(visit_time)

    ...

    ```


    大部分代码与清单 18-10 相同，但我更改了 `pattern` 和 `define` 子句：


    *   第 13–14 行通过将值与`next`（下一行）进行比较来定义 `has_15_mins_to_next`——如果当前行的 `visit_time`
    加上 15 分钟大于下一行的值，我就知道它在 15 分钟以内。

    *   然后，第 11 行的 `pattern` 需要调整为查找零个或多个 `has_15_mins_to_next` 行，后跟恰好一个未被分类为 `has_15_mins_to_next`
    的行（我称之为 `last_time`）。


    这种向前看而非向后的逻辑产生的输出与清单 18-10 相同。


    我已经展示了几乎相同的逻辑可以对行进行分组，这些行要么具有固定的行间间隔（连续的），要么行间间隔最多为某个值。但如果分组要求是必须在与*第一行*的某个时间间隔内呢？'
- fmt: '### Group until fixed limit


    I could choose to define a session *not* by "as long as visits are happening at
    suitably small intervals," but rather define that the first page visit (click)
    starts a session, which then lasts for one hour. All the visits within an hour
    from the first visit are part of the session. The *next* visit after the hour
    has gone by (whether 2 minutes or 2 days thereafter) marks the beginning of a
    *new* one-hour session.


    This can also be accomplished by a slight tweaking of the logic in the `pattern`
    and `define` of `match_recognize`, as I show in Listing [18-11](#475066_1_En_18_Chapter.xhtml#PC20).


    ```

    SQL> select app_id, first_visit, last_visit, visits, client_ip

    2  from web_page_visits

    3  match_recognize (

    4     partition by app_id, client_ip

    5     order by visit_time

    6     measures

    7        first(visit_time) as first_visit

    8      , last(visit_time)  as last_visit

    9      , count(*)          as visits

    10     one row per match

    11     pattern (same_hour+)

    12     define

    13        same_hour as

    14           visit_time <= first(visit_time) + interval ''1'' hour

    15  )

    16  order by app_id, first_visit, client_ip;

    Listing 18-11

    Sessions max one hour long since first page visit

    ```


    You''ll quickly spot that it''s not that much different from Listings [18-6](#475066_1_En_18_Chapter.xhtml#PC10)
    and [18-10](#475066_1_En_18_Chapter.xhtml#PC17). But there are a couple small,
    but important, changes:


    *   In the definition of classification `same_hour` in line 14, I am no longer
    comparing to `prev(visit_time)`, but instead to `first(visit_time)`. This does
    exactly what I wanted – whenever a row is within 1 hour of the first row in the
    match, the row will be included in the match.


    *   Notice in line 11 I no longer have a `strt` or similar undefined classification.
    This was needed when I used `prev`, which would yield *nothing* on the first row.
    But this time I am using `first`, and as a row is always *included* when evaluating
    the definition condition, the first row *itself* will be the result of the first
    call to `first`. This means that when testing the condition, it will always be
    true when it is tested on the first row (either the first overall or the first
    after a previous match has ended). Therefore I can skip having a `strt` and instead
    simply state that a match must be one or more `same_hour` rows.


    With this altered logic, I get four different session groups than I did before:


    ```

    APP_ID  FIRST_VISIT          LAST_VISIT           VISITS  CLIENT_IP

    542     2019-04-20 08:15:42  2019-04-20 09:03:34  7       104.130.89.12

    542     2019-04-20 09:17:50  2019-04-20 09:49:12  6       104.130.89.12

    542     2019-04-20 11:57:26  2019-04-20 12:02:02  4       85.237.86.200

    542     2019-04-20 14:45:10  2019-04-20 15:05:48  6       104.130.89.12

    ```


    When you compare to the output of Listing [18-10](#475066_1_En_18_Chapter.xhtml#PC17),
    you see that where IP 104.130.89.12 before had a single 13-visit session that
    lasted over 1½ hour, that is now two sessions of 7 and 6 visits, because the visit
    09:17:50 is more than an hour away from 08:15:42.


    On the other hand, the same IP now has a single six-visit session starting at
    14:45:10 and lasting about 20 minutes, whereas before that was split into two
    sessions because 15:02:22 is more than 15 minutes after 14:45:10.


    For different use cases, both of these grouping methods are useful.


    ## Lessons learned


    In this chapter, I''ve been showing various uses of pattern matching to group
    data that doesn''t have some key value to `group by`, but instead relates the
    rows by being consecutive or not too far apart. These examples should enable you
    to


    *   Consider `match_recognize` as an alternative to `group by` for cases where
    you cannot easily specify a grouping value from each row, but the grouping criteria
    are relations between rows.

    *   Express which rows are related and belong together with the `define` and `pattern`
    clauses.

    *   Use aggregate and navigational functions in the `measures` clause together
    with `one row per match` to achieve output like `group by`.

    *   Utilize the separation of logic in the different clauses of `match_recognize`
    with suitable aliasing and naming to make your code more readable and understandable.


    Once you grasp the fundamentals of this approach, you''ll find your own cases
    where you can substitute pattern matching for complex `group by` or analytic SQL.


    # 19. Merging Date Ranges


    Lots of data have a date range for validity – when is or was the event or price
    or whatever active. Schedules, prices, discounts, versioning, audit trails, the
    list is endless.


    It''s common to want to merge rows (at least in report output) where the date
    ranges are right after one another or even overlapping. For example, you may have
    a production schedule for your assembly line having three rows with adjoining
    date ranges – producing the same product for three different sales orders. For
    production planning, you may want to output this as a single row with the total
    date range and the sum of the quantities you need to produce.


    There can be many other examples of this – in this chapter I''ll show you an example
    of merging job hire periods with the `match_recognize` clause.'
  raw: '### Group until fixed limit


    I could choose to define a session *not* by “as long as visits are happening at
    suitably small intervals,” but rather define that the first page visit (click)
    starts a session, which then lasts for one hour. All the visits within an hour
    from the first visit are part of the session. The *next* visit after the hour
    has gone by (whether 2 minutes or 2 days thereafter) marks the beginning of a
    *new* one-hour session.


    This can also be accomplished by a slight tweaking of the logic in the `pattern`
    and `define` of `match_recognize`, as I show in Listing [18-11](#475066_1_En_18_Chapter.xhtml#PC20).


    ```

    SQL> select app_id, first_visit, last_visit, visits, client_ip

    2  from web_page_visits

    3  match_recognize (

    4     partition by app_id, client_ip

    5     order by visit_time

    6     measures

    7        first(visit_time) as first_visit

    8      , last(visit_time)  as last_visit

    9      , count(*)          as visits

    10     one row per match

    11     pattern (same_hour+)

    12     define

    13        same_hour as

    14           visit_time <= first(visit_time) + interval ''1'' hour

    15  )

    16  order by app_id, first_visit, client_ip;

    Listing 18-11

    Sessions max one hour long since first page visit

    ```


    You’ll quickly spot that it’s not that much different from Listings [18-6](#475066_1_En_18_Chapter.xhtml#PC10)
    and [18-10](#475066_1_En_18_Chapter.xhtml#PC17). But there are a couple small,
    but important, changes:


    *   In the definition of classification `same_hour` in line 14, I am no longer
    comparing to `prev(visit_time)`, but instead to `first(visit_time)`. This does
    exactly what I wanted – whenever a row is within 1 hour of the first row in the
    match, the row will be included in the match.


    *   Notice in line 11 I no longer have a `strt` or similar undefined classification.
    This was needed when I used `prev`, which would yield *nothing* on the first row.
    But this time I am using `first`, and as a row is always *included* when evaluating
    the definition condition, the first row *itself* will be the result of the first
    call to `first`. This means that when testing the condition, it will always be
    true when it is tested on the first row (either the first overall or the first
    after a previous match has ended). Therefore I can skip having a `strt` and instead
    simply state that a match must be one or more `same_hour` rows.


    With this altered logic, I get four different session groups than I did before:


    ```

    APP_ID  FIRST_VISIT          LAST_VISIT           VISITS  CLIENT_IP

    542     2019-04-20 08:15:42  2019-04-20 09:03:34  7       104.130.89.12

    542     2019-04-20 09:17:50  2019-04-20 09:49:12  6       104.130.89.12

    542     2019-04-20 11:57:26  2019-04-20 12:02:02  4       85.237.86.200

    542     2019-04-20 14:45:10  2019-04-20 15:05:48  6       104.130.89.12

    ```


    When you compare to the output of Listing [18-10](#475066_1_En_18_Chapter.xhtml#PC17),
    you see that where IP 104.130.89.12 before had a single 13-visit session that
    lasted over 1½ hour, that is now two sessions of 7 and 6 visits, because the visit
    09:17:50 is more than an hour away from 08:15:42.


    On the other hand, the same IP now has a single six-visit session starting at
    14:45:10 and lasting about 20 minutes, whereas before that was split into two
    sessions because 15:02:22 is more than 15 minutes after 14:45:10.


    For different use cases, both of these grouping methods are useful.


    ## Lessons learned


    In this chapter, I’ve been showing various uses of pattern matching to group data
    that doesn’t have some key value to `group by,` but instead relates the rows by
    being consecutive or not too far apart. These examples should enable you to


    *   Consider `match_recognize` as an alternative to `group by` for cases where
    you cannot easily specify a grouping value from each row, but the grouping criteria
    are relations between rows.


    *   Express which rows are related and belong together with the `define` and `pattern`
    clauses.


    *   Use aggregate and navigational functions in the `measures` clause together
    with `one row per match` to achieve output like `group by.`


    *   Utilize the separation of logic in the different clauses of `match_recognize`
    with suitable aliasing and naming to make your code more readable and understandable.


    Once you grasp the fundamentals of this approach, you’ll find your own cases where
    you can substitute pattern matching for complex `group by` or analytic SQL.


    # 19. Merging Date Ranges


    Lots of data have a date range for validity – when is or was the event or price
    or whatever active. Schedules, prices, discounts, versioning, audit trails, the
    list is endless.


    It’s common to want to merge rows (at least in report output) where the date ranges
    are right after one another or even overlapping. For example, you may have a production
    schedule for your assembly line having three rows with adjoining date ranges –
    producing the same product for three different sales orders. For production planning,
    you may want to output this as a single row with the total date range and the
    sum of the quantities you need to produce.


    There can be many other examples of this – in this chapter I’ll show you an example
    of merging job hire periods with the `match_recognize` clause.'
  trans: '### 按固定时限分组


    我可以选择这样定义会话：它*不是*基于“只要访问发生在足够短的时间间隔内”，而是基于首次页面访问（点击）启动一个会话，该会话持续一小时。从首次访问起一小时内的所有访问都属于该会话。一小时后发生的*下一次*访问（无论是
    2 分钟后还是 2 天后）标志着一个*新的*一小时会话的开始。


    通过稍微调整`match_recognize`中`pattern`和`define`的逻辑，也可以实现这一点，如代码清单 18-11 所示。


    ```

    SQL> select app_id, first_visit, last_visit, visits, client_ip

    2  from web_page_visits

    3  match_recognize (

    4     partition by app_id, client_ip

    5     order by visit_time

    6     measures

    7        first(visit_time) as first_visit

    8      , last(visit_time)  as last_visit

    9      , count(*)          as visits

    10     one row per match

    11     pattern (same_hour+)

    12     define

    13        same_hour as

    14           visit_time <= first(visit_time) + interval ''1'' hour

    15  )

    16  order by app_id, first_visit, client_ip;

    代码清单 18-11

    会话自首次页面访问起最长持续一小时

    ```


    你会很快发现它与代码清单 18-6 和 18-10 并没有太大不同。但有几点微小却重要的变化：


    *   在第 14 行对分类`same_hour`的定义中，我不再与`prev(visit_time)`比较，而是与`first(visit_time)`比较。这完全符合我的要求——只要一行在匹配的第一行
    1 小时内，该行就会被包括在匹配中。


    *   注意在第 11 行，我不再使用`strt`或类似的未定义分类。当我使用`prev`时这是必需的，因为`prev`在第一行会返回*空值*。但这次我使用了`first`，并且由于在评估定义条件时一行总是*被包含*的，第一行*本身*将是首次调用`first`的结果。这意味着在测试条件时，当在第一行（无论是整体的第一行还是前一个匹配结束后的第一行）测试时，条件总是为真。因此我可以跳过使用`strt`，而直接说明一个匹配必须是一个或多个`same_hour`行。


    通过这个修改后的逻辑，我得到了与之前不同的四个会话分组：


    ```

    APP_ID  FIRST_VISIT          LAST_VISIT           VISITS  CLIENT_IP

    542     2019-04-20 08:15:42  2019-04-20 09:03:34  7       104.130.89.12

    542     2019-04-20 09:17:50  2019-04-20 09:49:12  6       104.130.89.12

    542     2019-04-20 11:57:26  2019-04-20 12:02:02  4       85.237.86.200

    542     2019-04-20 14:45:10  2019-04-20 15:05:48  6       104.130.89.12

    ```


    当你与代码清单 18-10 的输出对比时，你会发现 IP 104.130.89.12 之前有一个持续超过一个半小时、包含 13 次访问的单一会话，现在变成了两个分别包含
    7 次和 6 次访问的会话，因为 09:17:50 的访问距离 08:15:42 超过了一个小时。


    另一方面，同一个 IP 现在有一个从 14:45:10 开始、持续约 20 分钟的单一六次访问会话，而之前因为 15:02:22 距离 14:45:10 超过
    15 分钟，这个区间被分成了两个会话。


    针对不同的用例，这两种分组方法都很有用。


    ## 经验总结


    在本章中，我展示了模式匹配的多种用途，用于对没有某个键值可供`group by`的数据进行分组，而是通过行与行之间连续或相隔不远的关系来关联它们。这些示例应该能够让你：


    *   考虑在无法轻易从每行指定一个分组值，但分组标准是行之间关系的情况下，使用`match_recognize`作为`group by`的替代方案。

    *   使用`define`和`pattern`子句来表达哪些行是相关且属于同一组的。

    *   在`measures`子句中结合`one row per match`使用聚合和导航函数，以获得类似`group by`的输出。

    *   利用`match_recognize`不同子句中逻辑的分离，配合恰当的别名和命名，使你的代码更易于阅读和理解。


    一旦你掌握了这种方法的基础，你就会发现自己的用例，可以用模式匹配替代复杂的`group by`或分析性 SQL。


    # 19. 合并日期范围


    许多数据都包含一个有效期的日期范围——事件、价格等何时有效或曾经有效。日程安排、价格、折扣、版本控制、审计跟踪，不胜枚举。


    通常需要合并那些日期范围紧挨着甚至重叠的行（至少在报表输出中）。例如，你可能有一个装配线的生产计划，其中三行具有相邻的日期范围——为三个不同的销售订单生产相同的产品。为了生产计划，你可能希望将其输出为一行，包含总的日期范围以及需要生产的数量总和。


    这种情况还有很多其他例子——在本章中，我将向你展示一个使用`match_recognize`子句合并工作雇佣期的例子。'
- fmt: "## Job hire periods\n\nAs an example of a table with date ranges, I’ll be\
    \ using the `emp_hire_periods` table shown in Figure [19-1](#475066_1_En_19_Chapter.xhtml#Fig1),\
    \ which has a foreign key relation to the `employees` table.\n\n![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig1_HTML.jpg](images/475066_1_En_19_Chapter/475066_1_En_19_Fig1_HTML.jpg)\n\
    \nFigure 19-1: The table of periods that employees have been hired for a given\
    \ job\n\nA given employee can be hired in different periods for different job\
    \ functions (indicated by the `title` column). The date ranges I have in the table\
    \ follow these rules:\n\n*   A `null` value in `end_date` means the employee currently\
    \ works at that function.\n*   When an employee stops working for Good Beer Trading\
    \ Co, `end_date` is filled.\n*   If the employee is rehired, a new row is inserted.\n\
    *   By promotion or change in job function, `end_date` is filled, and a new row\
    \ is inserted with the new title.\n*   An employee can have more than one function\
    \ at the same time, so the date ranges may overlap.\n*   The `start_date` is included\
    \ in the date range and the `end_date` is excluded from the date range – often\
    \ written as a `[start_date, end_date[` half-open interval.\n\nYou may find the\
    \ last rule less than intuitive, but I’ll get back shortly with an explanation\
    \ of why this is a good idea.\n\n> Note: A *closed* interval `[start, end]` is\
    \ `start <= x <= end`, while an *open* interval `]start, end[` is `start < x <\
    \ end`. The *half-open* interval is then either `]start, end]` or (as in this\
    \ case) `[start, end[`.\n\nAll of the logic I’ll be showing in this chapter is\
    \ in principle valid just by working with the `emp_hire_periods` table alone,\
    \ but to make it easier to see who is whom, I create a view in Listing [19-1](#475066_1_En_19_Chapter.xhtml#PC1)\
    \ so that I retrieve the employee `name` too.\n\n```sql\ncreate or replace view\
    \ emp_hire_periods_with_name\nas\nselect\n   ehp.emp_id\n , e.name\n , ehp.start_date\n\
    \ , ehp.end_date\n , ehp.title\nfrom emp_hire_periods ehp\njoin employees e\n\
    \   on e.id = ehp.emp_id;\n```\n\nListing 19-1: View joining the hire periods\
    \ with the employees\n\nQuerying the `emp_hire_periods_with_name` view in Listing\
    \ [19-2](#475066_1_En_19_Chapter.xhtml#PC2), I can show you the data I have.\n\
    \n```sql\nselect\n   ehp.emp_id\n , ehp.name\n , ehp.start_date\n , ehp.end_date\n\
    \ , ehp.title\nfrom emp_hire_periods_with_name ehp\norder by ehp.emp_id, ehp.start_date;\n\
    ```\n\nListing 19-2: The hire periods data\n\nIn the interest of saving a little\
    \ space, I have not filled the table with data for all 14 employees, just a selection\
    \ of 6:\n\n```\nEMP_ID  NAME           START_DATE  END_DATE    TITLE\n142    \
    \ Harold King    2010-07-01  2012-04-01  Product Director\n142     Harold King\
    \    2012-04-01              Managing Director\n143     Mogens Juel    2010-07-01\
    \  2014-01-01  IT Technician\n143     Mogens Juel    2014-01-01  2016-06-01  Sys\
    \ Admin\n143     Mogens Juel    2014-04-01  2015-10-01  Code Tester\n143     Mogens\
    \ Juel    2016-06-01              IT Manager\n144     Axel de Proef  2010-07-01\
    \  2013-07-01  Sales Manager\n144     Axel de Proef  2012-04-01              Product\
    \ Director\n145     Zoe Thorston   2014-02-01              IT Developer\n145 \
    \    Zoe Thorston   2019-02-01              Scrum Master\n146     Lim Tok Lo \
    \    2014-10-01  2016-02-01  Forklift Operator\n146     Lim Tok Lo     2017-03-01\
    \              Warehouse Manager\n147     Ursula Mwbesi  2014-10-01  2015-05-01\
    \  Delivery Manager\n147     Ursula Mwbesi  2016-05-01  2017-03-01  Warehouse\
    \ Manager\n147     Ursula Mwbesi  2016-11-01              Operations Chief\n```\n\
    \nWhen I visualize the same data in Figure [19-2](#475066_1_En_19_Chapter.xhtml#Fig2),\
    \ it’s easy to see who has changed jobs along the way, who has been away from\
    \ the company and returned in a different job, and who has had double jobs for\
    \ periods of time.\n\n![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig2_HTML.jpg](images/475066_1_En_19_Chapter/475066_1_En_19_Fig2_HTML.jpg)\n\
    \nFigure 19-2: Visualizing the data helps see the overlaps\n\nYou’ll notice that\
    \ because I use the half-open interval I mentioned before, employees changing\
    \ jobs have a `start_date` on the new job that is equal to the `end_date` of the\
    \ old job. Why didn’t I use closed intervals instead, so Harold King was product\
    \ director from 2010-07-01 to 2012-03-31 – both dates included?\n\nIt might seem\
    \ easier to use closed intervals, so you can simplify your code a little by using\
    \ `between` instead of `>=` and `<` – but there’s a problem. The `date` datatype\
    \ can contain not only whole dates but also hours, minutes, and seconds. That\
    \ means that with a closed interval `end_date` of 2012-03-31, Harold King would\
    \ not be hired anymore at 1 second past midnight, and the entire day of March\
    \ 31st, he would be out of a job until rehired April 1st at midnight.\n\n“Easy,”\
    \ you say, “just put an `end_date` of 2012-03-31 23:59:59, and all is well.” But\
    \ is it? Possibly it’ll be OK, but what if you need to switch to a `timestamp`\
    \ datatype in the future and support fractional seconds? (Probably not the case\
    \ for hire periods, but you can easily imagine other use cases for this.)\n\n\
    By using half-open intervals instead for your date ranges, you will never have\
    \ the problem that Harold King in principle is not hired for a short time (a day,\
    \ a second, a microsecond – no matter how small, with the closed interval, there\
    \ will always be a piece of time that is not covered by the ranges).\n\nWhen working\
    \ with half-open intervals, it can help to think of both dates as from dates:\n\
    \n*   The `start_date` is the exact moment *from* which the row starts being active.\n\
    *   The `end_date` is the exact moment *from* which the row is no longer active\
    \ (i.e., it *ends* being active *immediately* before that moment).\n\nThis thought\
    \ process might have been helped by choosing column names like `active_from` and\
    \ `inactive_from`, but the notion of *start* and *end* is just so commonly used\
    \ that I’m doing the same.\n\nOracle itself has realized the usefulness of half-open\
    \ intervals when they introduced temporal validity in version 12.1. So let me\
    \ use this as a good opportunity for a brief detour and show you how temporal\
    \ validity works. Afterward I’ll get back to the date range merging."
  raw: '## Job hire periods


    As an example of a table with date ranges, I’ll be using the `emp_hire_periods`
    table shown in Figure [19-1](#475066_1_En_19_Chapter.xhtml#Fig1), which has a
    foreign key relation to the `employees` table.


    ![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig1_HTML.jpg](images/475066_1_En_19_Chapter/475066_1_En_19_Fig1_HTML.jpg)


    Figure 19-1


    The table of periods that employees have been hired for a given job


    A given employee can be hired in different periods for different job functions
    (indicated by the `title` column). The date ranges I have in the table follow
    these rules:


    *   A `null` value in `end_date` means the employee currently works at that function.


    *   When an employee stops working for Good Beer Trading Co, `end_date` is filled.


    *   If the employee is rehired, a new row is inserted.


    *   By promotion or change in job function, `end_date` is filled, and a new row
    is inserted with the new title.


    *   An employee can have more than one function at the same time, so the date
    ranges may overlap.


    *   The `start_date` is *included* in the date range and the `end_date` is *excluded*
    from the date range – often written as a `[start_date, end_date[` half-open interval.


    You may find the last rule less than intuitive, but I’ll get back shortly with
    an explanation of why this is a good idea.


    Note


    A *closed* interval `[start, end]` is `start <= x <= end`, while an *open* interval
    `]start, end[` is `start < x < end`. The *half-open* interval is then either `]start,
    end]` or (as in this case) `[start, end[`.


    All of the logic I’ll be showing in this chapter is in principle valid just by
    working with the `emp_hire_periods` table alone, but to make it easier to see
    who is whom, I create a view in Listing [19-1](#475066_1_En_19_Chapter.xhtml#PC1)
    so that I retrieve the employee `name` too.


    ```

    SQL> create or replace view emp_hire_periods_with_name

    2  as

    3  select

    4     ehp.emp_id

    5   , e.name

    6   , ehp.start_date

    7   , ehp.end_date

    8   , ehp.title

    9  from emp_hire_periods ehp

    10  join employees e

    11     on e.id = ehp.emp_id;

    View EMP_HIRE_PERIODS_WITH_NAME created.

    Listing 19-1

    View joining the hire periods with the employees

    ```


    Querying the `emp_hire_periods_with_name` view in Listing [19-2](#475066_1_En_19_Chapter.xhtml#PC2),
    I can show you the data I have.


    ```

    SQL> select

    2     ehp.emp_id

    3   , ehp.name

    4   , ehp.start_date

    5   , ehp.end_date

    6   , ehp.title

    7  from emp_hire_periods_with_name ehp

    8  order by ehp.emp_id, ehp.start_date;

    Listing 19-2

    The hire periods data

    ```


    In the interest of saving a little space, I have not filled the table with data
    for all 14 employees, just a selection of 6:


    ```

    EMP_ID  NAME           START_DATE  END_DATE    TITLE

    142     Harold King    2010-07-01  2012-04-01  Product Director

    142     Harold King    2012-04-01              Managing Director

    143     Mogens Juel    2010-07-01  2014-01-01  IT Technician

    143     Mogens Juel    2014-01-01  2016-06-01  Sys Admin

    143     Mogens Juel    2014-04-01  2015-10-01  Code Tester

    143     Mogens Juel    2016-06-01              IT Manager

    144     Axel de Proef  2010-07-01  2013-07-01  Sales Manager

    144     Axel de Proef  2012-04-01              Product Director

    145     Zoe Thorston   2014-02-01              IT Developer

    145     Zoe Thorston   2019-02-01              Scrum Master

    146     Lim Tok Lo     2014-10-01  2016-02-01  Forklift Operator

    146     Lim Tok Lo     2017-03-01              Warehouse Manager

    147     Ursula Mwbesi  2014-10-01  2015-05-01  Delivery Manager

    147     Ursula Mwbesi  2016-05-01  2017-03-01  Warehouse Manager

    147     Ursula Mwbesi  2016-11-01              Operations Chief

    ```


    When I visualize the same data in Figure [19-2](#475066_1_En_19_Chapter.xhtml#Fig2),
    it’s easy to see who has changed jobs along the way, who has been away from the
    company and returned in a different job, and who has had double jobs for periods
    of time.


    ![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig2_HTML.jpg](images/475066_1_En_19_Chapter/475066_1_En_19_Fig2_HTML.jpg)


    Figure 19-2


    Visualizing the data helps see the overlaps


    You’ll notice that because I use the half-open interval I mentioned before, employees
    changing jobs have a `start_date` on the new job that is equal to the `end_date`
    of the old job. Why didn’t I use closed intervals instead, so Harold King was
    product director from 2010-07-01 to 2012-03-31 – both dates *included*?


    It might seem easier to use closed intervals, so you can simplify your code a
    little by using `between` instead of `>=` and `<` – but there’s a problem. The
    `date` datatype can contain not only whole dates but also hours, minutes, and
    seconds. That means that with a closed interval `end_date` of 2012-03-31, Harold
    King would not be hired anymore at 1 second past midnight, and the entire day
    of March 31st, he would be out of a job until rehired April 1st at midnight.


    “Easy,” you say, “just put an `end_date` of 2012-03-31 23:59:59, and all is well.”
    But is it? Possibly it’ll be OK, but what if you need to switch to a `timestamp`
    datatype in the future and support fractional seconds? (Probably not the case
    for hire periods, but you can easily imagine other use cases for this.)


    By using half-open intervals instead for your date ranges, you will never have
    the problem that Harold King in principle is not hired for a short time (a day,
    a second, a microsecond – no matter how small, with the closed interval, there
    will always be a piece of time that is not covered by the ranges).


    When working with half-open intervals, it can help to think of both dates as from
    dates:


    *   The `start_date` is the exact moment *from* which the row starts being active.


    *   The `end_date` is the exact moment *from* which the row is no longer active
    (i.e., it *ends* being active *immediately* before that moment).


    This thought process might have been helped by choosing column names like `active_from`
    and `inactive_from`, but the notion of *start* and *end* is just so commonly used
    that I’m doing the same.


    Oracle itself has realized the usefulness of half-open intervals when they introduced
    **temporal validity** in version 12.1\. So let me use this as a good opportunity
    for a brief detour and show you how temporal validity works. Afterward I’ll get
    back to the date range merging.'
  trans: "## 工作任职周期\n\n作为一个包含日期范围的表格示例，我将使用 `emp_hire_periods` 表，如图 19-1 所示，该表与 `employees`\
    \ 表存在外键关系。\n\n![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig1_HTML.jpg](img/475066_1_En_19_Fig1_HTML.jpg)\n\
    \n图 19-1：员工担任特定工作职位的任职周期表\n\n一个特定的员工可以在不同时间段内担任不同的工作职能（由 `title` 列指示）。我表中的日期范围遵循以下规则：\n\
    \n*   `end_date` 中的 `null` 值表示员工目前在该职能岗位上工作。\n*   当员工离开 Good Beer Trading Co 时，`end_date`\
    \ 会被填充。\n*   如果员工被重新雇佣，则会插入一个新行。\n*   因为晋升或工作职能变动，`end_date` 会被填充，并插入一个带有新职位的新行。\n\
    *   一个员工可以同时拥有多个职能，因此日期范围可能重叠。\n*   `start_date` 包含在日期范围内，而 `end_date` 被排除在日期范围之外——通常写作\
    \ `[start_date, end_date[` 半开区间。\n\n你可能会觉得最后一条规则不那么直观，但我稍后会解释为什么这是一个好主意。\n\n>\
    \ 注意：一个*闭*区间 `[start, end]` 表示 `start <= x <= end`，而一个*开*区间 `]start, end[` 表示\
    \ `start < x < end`。*半开*区间则要么是 `]start, end]`，要么是（如本例）`start, end[`。\n\n本章展示的所有逻辑原则上仅通过使用\
    \ `emp_hire_periods` 表本身即可有效，但为了更容易看清谁是谁，我在代码清单 [19-1 中创建了一个视图，以便也能检索员工的 `name`。\n\
    \n```sql\ncreate or replace view emp_hire_periods_with_name\nas\nselect\n   ehp.emp_id\n\
    \ , e.name\n , ehp.start_date\n , ehp.end_date\n , ehp.title\nfrom emp_hire_periods\
    \ ehp\njoin employees e\n   on e.id = ehp.emp_id;\n```\n\n代码清单 19-1：连接任职周期与员工信息的视图\n\
    \n查询代码清单 19-2 中的 `emp_hire_periods_with_name` 视图，我可以展示我拥有的数据。\n\n```sql\nselect\n\
    \   ehp.emp_id\n , ehp.name\n , ehp.start_date\n , ehp.end_date\n , ehp.title\n\
    from emp_hire_periods_with_name ehp\norder by ehp.emp_id, ehp.start_date;\n```\n\
    \n代码清单 19-2：任职周期数据\n\n为了节省一点空间，我没有为所有 14 名员工填充数据，只选择了其中 6 名：\n\n```\nEMP_ID  NAME\
    \           START_DATE  END_DATE    TITLE\n142     Harold King    2010-07-01 \
    \ 2012-04-01  Product Director\n142     Harold King    2012-04-01            \
    \  Managing Director\n143     Mogens Juel    2010-07-01  2014-01-01  IT Technician\n\
    143     Mogens Juel    2014-01-01  2016-06-01  Sys Admin\n143     Mogens Juel\
    \    2014-04-01  2015-10-01  Code Tester\n143     Mogens Juel    2016-06-01  \
    \            IT Manager\n144     Axel de Proef  2010-07-01  2013-07-01  Sales\
    \ Manager\n144     Axel de Proef  2012-04-01              Product Director\n145\
    \     Zoe Thorston   2014-02-01              IT Developer\n145     Zoe Thorston\
    \   2019-02-01              Scrum Master\n146     Lim Tok Lo     2014-10-01  2016-02-01\
    \  Forklift Operator\n146     Lim Tok Lo     2017-03-01              Warehouse\
    \ Manager\n147     Ursula Mwbesi  2014-10-01  2015-05-01  Delivery Manager\n147\
    \     Ursula Mwbesi  2016-05-01  2017-03-01  Warehouse Manager\n147     Ursula\
    \ Mwbesi  2016-11-01              Operations Chief\n```\n\n当我在图 19-2 中将相同的数据可视化时，很容易看出谁在过程中更换了工作，谁曾离开公司后又以不同的职位返回，以及谁在一段时间内身兼双职。\n\
    \n![../images/475066_1_En_19_Chapter/475066_1_En_19_Fig2_HTML.jpg](img/475066_1_En_19_Fig2_HTML.jpg)\n\
    \n图 19-2：数据可视化有助于看清重叠部分\n\n你会注意到，因为我使用了前面提到的半开区间，更换工作的员工在新工作上的 `start_date` 等于旧工作的\
    \ `end_date`。为什么我不改用闭区间呢，这样 Harold King 就可以是 2010-07-01 到 2012-03-31 的产品总监——两个日期都包含在内？\n\
    \n使用闭区间可能看起来更简单，因此你可以通过使用 `between` 而不是 `>=` 和 `<` 来简化一点代码——但这有个问题。`date` 数据类型不仅可以包含完整的日期，还可以包含小时、分钟和秒。这意味着，对于一个闭区间的\
    \ `end_date` 2012-03-31，Harold King 在午夜过一秒后就不再被雇佣了，而在 3 月 31 日这整天，直到 4 月 1 日午夜被重新雇佣前，他都会处于失业状态。\n\
    \n“简单，” 你说，“把 `end_date` 设为 2012-03-31 23:59:59 不就行了。” 但真的行吗？可能没问题，但如果你将来需要切换到\
    \ `timestamp` 数据类型并支持小数秒怎么办？（对于任职周期来说可能不会，但你可以很容易地想象到其他用例。）\n\n通过为你的日期范围改用半开区间，你就永远不会遇到\
    \ Harold King 原则上有短时间（一天、一秒、一微秒——无论多短，使用闭区间总会有一小段时间未被范围覆盖）未被雇佣的问题。\n\n使用半开区间时，将两个日期都理解为“起始日期”会有所帮助：\n\
    \n*   `start_date` 是行开始生效的确切时刻*从*。\n*   `end_date` 是行不再生效的确切时刻*从*（即，它在该时刻*之前立即结束*生效）。\n\
    \n这种思路或许可以通过选择像 `active_from` 和 `inactive_from` 这样的列名来强化，但*开始*和*结束*的概念实在太常用了，所以我还是沿用了它。\n\
    \nOracle 自己在 12.1 版本引入时间有效性时也认识到了半开区间的用处。所以让我借此机会简要离题一下，向你展示时间有效性是如何工作的。之后我会再回到日期范围合并的话题。"
- fmt: '### Temporal validity


    In Listing [19-3](#475066_1_En_19_Chapter.xhtml#PC4), you’ll see the `create table`
    statement I used for creating the `emp_hire_periods` table.


    ```sql

    SQL> create table emp_hire_periods (

    2     emp_id         not null constraint emp_hire_periods_emp_fk

    3                       references employees

    4   , start_date     date not null

    5   , end_date       date

    6   , title          varchar2(20 char) not null

    7   , constraint emp_hire_periods_pk primary key (emp_id, start_date)

    8   , period for employed_in (start_date, end_date)

    9  );

    Listing 19-3

    Table defined with temporal validity

    ```


    The interesting bit is line 8, which is the `period for` clause for defining temporal
    validity on the table.


    In the parentheses, I’ve specified the two columns that contain the start and
    end point of the half-open interval. (These can be `date` or `timestamp` columns.)
    Both columns are allowed to be nullable; it is just for this use case I have set
    `start_date` to be `not null` as a job period will always have a specific starting
    point, whereas `end_date` allows nulls, because this means the job is still current.


    Tip


    If you do not specify the two columns, the database auto-creates two hidden columns
    to contain the interval. Normally I prefer to create the columns myself and specify
    them, but it might be handy if you have a use case where those who query are not
    interested in the actual interval, just whether the row is valid at a specific
    point in time or not.


    Right after `period for`, you must name the period (give it an identifier), and
    I have carefully chosen `employed_in`. It is a good idea to give the name some
    thought, as a good name will be helpful in queries that use temporal validity,
    as I show it in Listing [19-4](#475066_1_En_19_Chapter.xhtml#PC5).


    ```sql

    SQL> select

    2     ehp.emp_id

    3   , e.name

    4   , ehp.start_date

    5   , ehp.end_date

    6   , ehp.title

    7  from emp_hire_periods

    8          as of period for employed_in date ''2010-07-01''

    9       ehp

    10  join employees e

    11     on e.id = ehp.emp_id

    12  order by ehp.emp_id, ehp.start_date;

    Listing 19-4

    Querying hire periods table as of a specific date

    ```


    In the `from` clause lines 7–9, I can use an `as of` syntax very similar to flashback
    queries, with the table in line 7, the `as of` specification in line 8, and the
    table alias in line 9.


    When using flashback, I specify `as of timestamp` or `as of scn`, but with temporal
    validity, I specify `as of period for` and then the name of the period. This means
    that the name `employed_in` in line 8 helps self-document that I’m querying those
    that were *employed in* 2010-07-01, which was the start of the company, and there
    were only three people:


    ```

    EMP_ID  NAME           START_DATE  END_DATE    TITLE

    142     Harold King    2010-07-01  2012-04-01  Product Director

    143     Mogens Juel    2010-07-01  2014-01-01  IT Technician

    144     Axel de Proef  2010-07-01  2013-07-01  Sales Manager

    ```


    If I want to find those that were employed 6 years later, I just change the date
    value in line 8:


    ```sql

    ...

    8          as of period for employed_in date ''2016-07-01''

    ...

    ```


    And here I have five people (some of whom are the same, just with new titles):


    ```

    EMP_ID  NAME           START_DATE  END_DATE    TITLE

    142     Harold King    2012-04-01              Managing Director

    143     Mogens Juel    2016-06-01              IT Manager

    144     Axel de Proef  2012-04-01              Product Director

    145     Zoe Thorston   2014-02-01              IT Developer

    147     Ursula Mwbesi  2016-05-01  2017-03-01  Warehouse Manager

    ```


    The query with `as of` is internally rewritten by the database into a regular
    `where` clause with suitable `>=` and `<` predicates; it is just easier to get
    it right with `as of`. Also the database treats it as a type of constraint – it
    will not let you insert data with an `end_date` that is before `start_date`.


    This little aside showed you briefly how temporal validity can make things easier,
    and if you do use temporal validity, you’ll also automatically get the benefits
    of the half-open intervals. Now I’ll get back to the range merging, which you
    can do with or without temporal validity.


    ## Merging overlapping ranges


    What I want to do now is to take the data in Figure [19-2](#475066_1_En_19_Chapter.xhtml#Fig2),
    find all places where hire periods of the same employee either adjoin or overlap,
    and merge those into single aggregate rows showing how many jobs (either successively
    or concurrently) the employee has had in that aggregated period. The result I
    want is shown in Figure [19-3](#475066_1_En_19_Chapter.xhtml#Fig3).


    ![`../images/475066_1_En_19_Chapter/475066_1_En_19_Fig3_HTML.jpg`](images/475066_1_En_19_Chapter/475066_1_En_19_Fig3_HTML.jpg)


    Figure 19-3


    Expected results after merging overlapping and adjoining date ranges


    I am now going to attempt solving this with `match_recognize`. To demonstrate
    trying out different approaches and changing the logic along the way, I will first
    show some attempts that do not quite work, leading up to a working solution in
    the end.'
