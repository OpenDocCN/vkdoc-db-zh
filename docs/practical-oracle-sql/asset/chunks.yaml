  trans: '### 完成完整的拣货 SQL


    我有用于批量拣货的清单 13-15 和用于良好拣货路线的清单 13-8。将两者结合在清单 13-16 中，就得到了完整的解决方案。


    ```sql

    SQL> with olines as (

    ...

    18  ), orderbatch as (

    ...

    24  ), fifo as (

    ...

    49  ), pick as (

    50     select

    51        f.wh, f.ai

    52      , dense_rank() over (

    53           order by wh, ai

    54        ) as ai#

    55      , f.pos, f.p_id

    56      , f.pick_q, o.o_id

    57      , least(

    58           f.loc_q

    59         , least(o.to_q, f.to_q) - greatest(o.from_q, f.from_q) + 1

    60        ) as q_f_o

    61     from fifo f

    62     join olines o

    63        on o.p_id = f.p_id

    64        and o.to_q >= f.from_q

    65        and o.from_q <= f.to_q

    66  )

    67  select

    68     p.wh, p.ai, p.pos

    69   , p.p_id, p.pick_q

    70   , p.o_id, p.q_f_o

    71  from pick p

    72  order by p.wh

    73         , p.ai#

    74         , case

    75              when mod(p.ai#, 2) = 1 then +p.pos

    76                                     else -p.pos

    77           end;

    Listing 13-16

    最终的 FIFO 批量拣货 SQL 语句

    ```


    `with` 子句中的子查询 `olines`、`orderbatch` 和 `fifo` 与清单 13-15 相同。然后，我将清单 13-15 中的主查询放到了第
    49-66 行的子查询 `pick` 中。


    我在第 52-54 行增加了“访问通道编号” `ai#`（来自清单 13-8）的计算。


    接着，主查询只是从 `pick` 子查询中选择必要的信息，并使用清单 13-8 中的 `order by` 来提供最优的拣货路线：


    ```

    WH  AI  POS  P_ID  PICK_Q  O_ID  Q_F_O

    1   A   16   6520  22      423   22

    1   A   29   6520  14      422   14

    1   C   13   6520  20      422   20

    1   C   1    4280  36      422   36

    1   D   18   4280  39      422   39

    2   B   26   6520  24      422   24

    2   B   5    6520  14      422   14

    2   B   3    4280  35      422   5

    2   B   3    4280  35      423   30

    2   C   20   4280  30      423   30

    2   D   9    6520  26      422   8

    2   D   9    6520  26      423   18

    ```


    其中，像 `2 B 3` 这样的库位在列表中重复出现，可以看到它显示应拣取 `35` 件，其中 `5` 件放入订单 `422` 的包裹，`30` 件放入订单
    `423` 的包裹。


    有了这份列表，拣货操作员将被引导通过仓库中的良好路线，为一批多个订单拣选产品，这些产品是按先进先出原则选择的。


    总的来说，这几乎就是一个完整的仓库货物拣选应用，浓缩在一个 SQL 语句中。


    ## 经验教训


    本章向你展示了如何构建一个单一 SQL 应用，其中多次使用了分析函数，为你提供了以下知识：


    *   使用窗口子句对行子集应用分析函数 `sum`，以找到结果足够大的子集

    *   使用分析滚动和计算间隔，以找到重叠的间隔

    *   为结果分配 `dense_rank`，以实现交替的升序和降序排序


    当你理解如何逐步使用分析函数构建这样的语句时，你就可以创建许多类似的、包含大量业务逻辑的语句，从而获得比提取数据并以过程方式执行相同逻辑好得多的性能。


    # 14. 使用 Lead 分析活动日志


    日志可以记录很多事情，有时你很幸运，日志的每一行都是独立的，并且包含分析日志所需的所有数据。但大多数情况下，日志表中的一行记录了在*这个*确切的时间点，发生了*这个*特定的活动——而你需要分析的有趣事实是日志行*之间*相隔了多长时间。


    这正是分析函数 `lag` 和 `lead` 非常有用的地方，因为它们可以在给定的行上使用，以检索给定顺序中之前行 (`lag`) 或之后行 (`lead`)
    的信息。根据你构建逻辑的方式，你通常可以选择使用 `lag` 或 `lead`，但大多数情况下的决定因素将是行*何时*被插入到活动日志中。如果行在活动开始时插入，那么活动的时间就是此行与*下*一行之间的时间间隔，因此
    `lead` 是合理的选择。相反，如果行在活动完成时插入，那么活动的时间就是*上*一行与此行之间的时间间隔，这时使用 `lag` 就有意义了。


    当我第一次创建这类代码时工作的地方，有一个自动化的机器人拣货仓库，所以操作员站在固定的位置，箱子通过传送带送到他面前，他拣取产品，箱子移走，然后新箱子到来。箱子的到达和离开都被记录了下来，这意味着从箱子到达直到它离开的时间就是拣货所用的时间，而从箱子离开直到下一个箱子到达的时间就是等待时间。通过使用类似我在此展示的
    `lead` SQL，我们可以分析何时等待时间过长，并利用这些信息来调整机器人仓库。


    本书中的 Good Beer Trading Co 公司没有机器人仓库，但我在前一章展示了拣货优化。现在，我可以在本章跟进分析拣货和在仓库中走动分别用了多少时间。'
- fmt: '# Picking activity log


    In Chapter [13](#475066_1_En_13_Chapter.xhtml) I showed how Good Beer Trading
    Co can calculate efficient picking lists for picking beers in the warehouse for
    multiple orders. When the warehouse operators start picking some orders, they
    do not just print the output from the queries in Chapter [13](#475066_1_En_13_Chapter.xhtml);
    instead a picking list is created in table `picking_list`, and the query output
    is stored in table `picking_line`, these two tables shown in Figure [14-1](#475066_1_En_14_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_14_Chapter/475066_1_En_14_Fig1_HTML.jpg](images/475066_1_En_14_Chapter/475066_1_En_14_Fig1_HTML.jpg)


    Figure 14-1: Tables to hold picking lists and logs for doing the picking


    Then after the picking list with corresponding picking lines has been created
    and printed, the picking operator drives off on his electric picking cart. As
    he drives along and picks the beers in the warehouse, he scans barcodes on the
    location shelves and the beers to register his activity – this activity is stored
    in table `picking_log`, the contents of which you can see in Listing [14-1](#475066_1_En_14_Chapter.xhtml#PC1).


    ```sql

    SQL> select

    2     list.picker_emp_id as emp

    3   , list.id            as list

    4   , log.log_time

    5   , log.activity       as act

    6   , log.location_id    as loc

    7   , log.pickline_no    as line

    8  from picking_list list

    9  join picking_log log

    10     on log.picklist_id = list.id

    11  order by list.id, log.log_time;

    ```


    Listing 14-1: Content of the activity log for picking lists


    I join with the `picking_list` table in order to retrieve the employee id, so
    that in my statistical reports, I can compare and see which operator works the
    fastest, so (s)he can teach the others:


    ```sql

    EMP  LIST  LOG_TIME             ACT  LOC  LINE

    149  841   2019-01-16 14:05:11  D

    149  841   2019-01-16 14:05:44  A    16

    149  841   2019-01-16 14:05:52  P    16   1

    149  841   2019-01-16 14:06:01  D    16

    149  841   2019-01-16 14:06:20  A    29

    149  841   2019-01-16 14:06:27  P    29   2

    ...

    149  841   2019-01-16 14:13:00  D    233

    149  841   2019-01-16 14:14:41  A

    152  842   2019-01-19 16:01:12  D

    152  842   2019-01-19 16:01:48  A    16

    152  842   2019-01-19 16:01:53  P    16   1

    ...

    152  842   2019-01-19 16:08:58  D    212

    152  842   2019-01-19 16:09:23  A    233

    152  842   2019-01-19 16:09:34  P    233  11

    152  842   2019-01-19 16:09:42  P    233  12

    152  842   2019-01-19 16:09:53  D    233

    152  842   2019-01-19 16:11:42  A

    63 rows selected.

    ```


    In the `activity` column of the table (`act` in the output) can be stored either
    `D` for departure, `A` for arrival, or `P` for pick. When he drives off from a
    location, he scans the location barcode, and a row with `D` is inserted in the
    table. Upon arrival at the next location, again he scans the location barcode,
    and a row with `A` is created. Then he picks one or more picking lines at that
    location, each time scanning the beer which creates a `P` row.


    There’s a little variation at each end. When he sets off on his picking tour,
    a `D` row is inserted with a `null` location. When he’s done and returns to his
    origin, an `A` row is similarly inserted with a `null` location.


    Apart from that variation, the work follows a repetitive cycle as shown in Figure
    [14-2](#475066_1_En_14_Chapter.xhtml#Fig2).


    ![../images/475066_1_En_14_Chapter/475066_1_En_14_Fig2_HTML.jpg](images/475066_1_En_14_Chapter/475066_1_En_14_Fig2_HTML.jpg)


    Figure 14-2: Timeline of part of the picking log


    You can see how he works, scanning locations and beers as he goes along, and this
    cycle repeats. It will always be `D->A->P->D`, with the possibility of there being
    more than one `P` in a cycle.


    But the interesting thing to analyze is the number of seconds *between* rows and
    also figuring out that the 25 seconds is driving, the 11+8 seconds is picking,
    and the last 11 seconds is packing. I’ll show you all of that, but I start simply
    by figuring out `driving` and `work` (lumping picking and packing together).


    ## Analyzing departures and arrivals


    First, I will simply analyze departures and arrivals, where the time between a
    departure and an arrival is `driving` time and the time between an arrival and
    a departure is `work` time (later I’ll look at the picking and packing part of
    the work time). In Listing [14-2](#475066_1_En_14_Chapter.xhtml#PC3), I look at
    just the `D` and `A` activities.


    ```sql

    SQL> select

    2     list.picker_emp_id as emp

    3   , list.id            as list

    4   , log.log_time

    5   , log.activity       as act

    6   , log.location_id    as loc

    7   , to_char(

    8        lead(log_time) over (

    9           partition by list.id

    10           order by log.log_time

    11        )

    12      , ''HH24:MI:SS''

    13     ) as next_time

    14   , to_char(

    15        lead(log_time, 2) over (

    16           partition by list.id

    17           order by log.log_time

    18        )

    19      , ''HH24:MI:SS''

    20     ) as next2_time

    21  from picking_list list

    22  join picking_log log

    23     on log.picklist_id = list.id

    24  where log.activity in (''D'', ''A'')

    25  order by list.id, log.log_time;

    ```


    Listing 14-2: Departures and arrivals with `lead` function calls


    I restrict the data to `D` and `A` activities in line 24.


    Using `lead` in lines 8–11 gives me what is the `log_time` of the next row, and
    adding the parameter 2 to the `lead` call in line 15 gives me the `log_time` of
    the next row after that:


    ```sql

    EMP  LIST  LOG_TIME             ACT  LOC  NEXT_TIME  NEXT2_TIME

    149  841   2019-01-16 14:05:11  D         14:05:44   14:06:01

    149  841   2019-01-16 14:05:44  A    16   14:06:01   14:06:20

    149  841   2019-01-16 14:06:01  D    16   14:06:20   14:06:35

    149  841   2019-01-16 14:06:20  A    29   14:06:35   14:07:16

    ...

    149  841   2019-01-16 14:11:26  D    163  14:12:42   14:13:00

    149  841   2019-01-16 14:12:42  A    233  14:13:00   14:14:41

    149  841   2019-01-16 14:13:00  D    233  14:14:41

    149  841   2019-01-16 14:14:41  A

    152  842   2019-01-19 16:01:12  D         16:01:48   16:02:04

    152  842   2019-01-19 16:01:48  A    16   16:02:04   16:02:19

    ...

    152  842   2019-01-19 16:09:53  D    233  16:11:42

    152  842   2019-01-19 16:11:42  A

    42 rows selected.

    ```


    You notice that the last row of each partition (picking list) has `null` in `next_time`,
    and the two last rows have `null` in `next2_time`. That makes sense and is OK
    for my purpose.


    Using `lead` twice in this manner gives me that each `D` row has the time of a
    complete Depart – Arrive – Depart picking cycle. Likewise each `A` row has the
    time of a complete Arrive – Depart – Arrive cycle. I only need one of the two,
    so I choose to work with Depart–Arrive–Depart cycles in Listing [14-3](#475066_1_En_14_Chapter.xhtml#PC5).


    ```sql

    SQL> select

    2     emp, list

    3   , log_time as depart

    4   , to_char(next_time , ''HH24:MI:SS'') as arrive

    5   , to_char(next2_time, ''HH24:MI:SS'') as next_depart

    6   , round((next_time  - log_time )*(24*60*60)) as drive

    7   , round((next2_time - next_time)*(24*60*60)) as work

    8  from (

    9     select

    10        list.picker_emp_id as emp

    11      , list.id            as list

    12      , log.log_time

    13      , log.activity       as act

    14      , lead(log_time) over (

    15           partition by list.id

    16           order by log.log_time

    17        ) as next_time

    18      , lead(log_time, 2) over (

    19           partition by list.id

    20           order by log.log_time

    21        ) as next2_time

    22     from picking_list list

    23     join picking_log log

    24        on log.picklist_id = list.id

    25     where log.activity in (''D'', ''A'')

    26  )

    27  where act = ''D''

    28  order by list, log_time;

    ```


    Listing 14-3: Depart–Arrive–Depart cycles


    The query from Listing [14-2](#475066_1_En_14_Chapter.xhtml#PC3) I use in the
    inline view and simply keep only the `D` rows in line 27 – I have all the data
    I need in those rows and can skip the `A` rows.'
