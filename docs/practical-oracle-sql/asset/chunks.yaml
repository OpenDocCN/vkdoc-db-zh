    列表 7-15

    动态构建逆透视查询

    ```


    在列表 7-14 的查询中，我在第 4 行开始放入了一个游标 `for` 循环。在第 33 行，我检查这是否是循环中的第一行数据。如果是，则在第 34-41
    行，我生成正在构建的 SQL 语句的开头。如果不是，则在第 43-44 行，我生成一个新行和一个逗号作为映射之间的分隔符。


