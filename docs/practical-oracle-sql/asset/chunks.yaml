  raw: '## Downs + ups = V shapes


    By now I’ve made the definitions `down`, `up,` and `same` – it’s time to put those
    together in a `pattern` to look for specific patterns of rows. I’d like to find
    where the price is going down (or staying the same within a downward slope) for
    a period, followed by going up (or staying the same within an upward slope) for
    a period – in other words a V shape in the graph.


    As discussed in the previous chapter, syntax for the `pattern` clause is very
    similar to regular expressions, so a period of at least one down-or-same price
    can be defined as `(down | same)+` and then followed by `(up | same)+` for a period
    of at least one up-or-same price, leading to the `pattern` shown in line 12 of
    Listing [17-2](#475066_1_En_17_Chapter.xhtml#PC10).


    ```

    SQL> select *

    2  from ticker

    3  match_recognize (

    4     partition by symbol

    5     order by day

    6     measures

    7        match_number() as match

    8      , classifier()   as class

    9      , prev(price)    as prev

    10     all rows per match

    11     pattern (

    12        (down | same)+ (up | same)+

    13     )

    14     define

    15        down as price  prev(price)

    17      , same as price = prev(price)

    18  )

    19  order by symbol, day;

    Listing 17-2

    Searching for V shapes

    ```


