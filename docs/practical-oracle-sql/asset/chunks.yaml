    The one slight drawback with this method is that the number of boxes needs a bit
    of work to change. If, for example, I have four boxes instead of three, I need
    to modify `Listing [21-8](#475066_1_En_21_Chapter.xhtml#PC23)` like this:


    ```

    20     pattern (

    21        (box1 | box2 | box3 | box4)*

    22     )

    23     define

    24        box1 as count(box1.*) = 1

    25             or sum(box1.qty) - box1.qty

    26                  <= least(

    27                        sum(box2.qty)

    28                      , sum(box3.qty)

    29                      , sum(box3.qty)

    30                     )

    31      , box2 as count(box2.*) = 1

    32             or sum(box2.qty) - box2.qty

    33                  <= least(sum(box3.qty), sum(box4.qty))

    34      , box3 as count(box3.*) = 1

    35             or sum(box3.qty) - box3.qty

    36                  <= sum(box4.qty)

    ```


    To complete it all, in `Listing [21-9](#475066_1_En_21_Chapter.xhtml#PC26)`, I
    do this for every product, so that each product has three infinite-capacity boxes.


    ```

    SQL> select product_name, wh, aisle, pos, qty, box

    2  from (

    3     select

    4        product_id

    5      , product_name

    6      , warehouse as wh

    7      , aisle

    8      , position  as pos

    9      , qty

    10     from inventory_with_dims

    11  ) iwd

    12  match_recognize (

    13     partition by product_id

    ...

    28  )

    29  order by wh, aisle, pos;

    Listing 21-9

    All products in three boxes each – output sorted by location

    ```


    This I accomplish with the `partition by` in line 13. If I skipped this line,
    all beers would be packed into the same three boxes.


    And then I’ve ordered the output in location order, so this can be a packing list
    for packing everything from the warehouse:


    ```

    PRODUCT_NAME      WH  AISLE  POS  QTY  BOX

    Ghost of Hops     1   A      2    39   BOX1

    Reindeer Fuel     1   A      3    48   BOX1

    Hoppy Crude Oil   1   A      4    37   BOX2

    ...

    Hazy Pink Cloud   2   D      23   17   BOX2

    Reindeer Fuel     2   D      25   29   BOX2

    Pale Rider Rides  2   D      28   40   BOX3

    113 rows selected.

    ```


    Maybe you think that it is not a very practical method for packing beers, as beer
    boxes of course in real life do not have an infinite capacity. But the principle
    is valid for other cases as well – a fairly common one is scheduling tasks on
    a given set of processors/resources. Instead of quantity, it is just time that
    is distributed as evenly as possible – putting a task on the processor with the
    least number of minutes in it is equivalent to putting it on the one that has
    the earliest available timeslot.


    ## Lessons learned


    Bin fitting in itself is a difficult problem to get as optimal a fit as possible;
    usually it is a matter of choosing either a complex solution with a nearly optimal
    fit or a simpler and faster solution with an approximate fit. What you choose
    is most often determined by how good an approximation you need for your business
    purpose.


    In this chapter I haven’t given you perfect fit solutions, but rather approximations
    – the bin fitting with limited number of boxes being reasonably good and the one
    with unlimited number of boxes being a relatively rough approximation. But with
    `match_recognize`, they’re pretty fast, and they are good examples to teach you
    the following:


    *   Using running aggregates in the `define` clause to make the classification
    depend on summary values up to the current row.

    *   Creating calculated column values to support complex ordering to make the
    `match_recognize` clause walk through the data in very specific desired order.

    *   Having the `pattern` match *all* rows and utilize `define` to classify all
    rows can be an option to make `match_recognize` a tool to create a data manipulation
    algorithm rather than a data search tool.

    *   Using aggregates of other classification variables in the `define` clause
    to make the outcomes of different classification variables depend on each other.

    *   Utilizing the fact that an *undefined* classification variable is by default
    considered true, so it can be used as a kind of `else` option.


    All in all, understanding these examples will help you gain the way of thinking
    that lets you really utilize all the power of `match_recognize`.


    ---


    # 22. Counting Children in Trees


    Sometimes you’d like to do aggregation where a row is included in multiple rows
    of the output, for example, being counted multiple times or having the value added
    multiple times. An example of this is hierarchical data, where you want for every
    row to find the count of all the children in the tree – not just immediate children
    but also grandchildren and their children and so on, all the way down to the leaves
    of the tree.


    It means that a given row is counted in the result for the parent, but also counted
    again in the result of the grandparent, and so on. It can look similar to subtotals
    created with `group by` and `rollup`, but with the hierarchy, you don’t know how
    many levels down it goes, so you cannot simply use `rollup`.


    One way I can solve this is using the `after match skip to next row` clause of
    `match_recognize`. Of course it could be used for other aggregates than `count`,
    but `count` is easy to understand, and once you know the technique, you can do
    the others easily.'
