    Lo 总共有 3 个下属（都只比他低一级，并且他们没有进一步的下属），以此类推。


    ![../images/475066_1_En_22_Chapter/475066_1_En_22_Fig2_HTML.jpg](img/475066_1_En_22_Fig2_HTML.jpg)


    图 22-2

    标记了部分子树的组织结构图


    一个简单的方法是使用如清单 22-2 所示的标量子查询。标量子查询可以在层次结构中找到相关的子树并计算该子树的节点数。


