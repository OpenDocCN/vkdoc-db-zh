    *To Lis-Karen for patience and clearing the dishes*


    Where do you go to learn SQL?


    Well, if I ask myself that same question, of course, the answer is I learn SQL
    many places: books by Tom Kyte and others, the SQL Reference Manual (that I use
    daily), conference presentations by experienced developers, blogs, Googling, and
    much more. But even all of that would not help if I didn’t simultaneously simply
    try writing SQL myself, see where I went wrong, and then try again, and again,
    and again.


    One thing I have noticed in my learning process is that almost all teaching examples
    are nicely short and sweet in order to facilitate understanding. This is fine
    as such, but it also sometimes means that it can be harder to relate to daily
    work.


    I had the good fortune of working 16 years at a retail company where the philosophy
    was never to adapt business practice to whatever the software was capable of,
    but instead always to customize the software to make the daily business go smarter
    and smoother. We always went by “of course it is possible to solve, we just need
    to figure out how.” In this atmosphere, I had plenty of practical real tasks to
    practice on, trying out SQL and changing it piece by piece until I had something
    that solved the task at hand.


    When I have presented about some of these solutions that I developed during those
    years, I have several times had audience approach me afterward, telling me that
    suddenly they “saw the light” and understood how analytic functions could help
    in their work, for example. Until then, they had seen it as some SQL extension
    that was smart and fancy, but they couldn’t relate it to their own tasks they
    had to solve.


    In this book, I will explain a series of tasks, solving them with SQL, explaining
    in steps how I create that SQL, starting small and building on it until I have
    a working statement that does not fit on a single PowerPoint slide. The statements
    I demonstrate here are not trivial examples – but they look more like something
    you might have to develop yourself in your job.


    If you end up with an attitude of “Of course it is possible to solve in SQL,”
    your boss will be happy because he saves a lot on cloud credits with your code
    using much less CPU. You will be happy because it is much more fun really using
    your brain to find a good solution.


    And I will be happy too and can say: “Mission accomplished!”


    ## What is in this book


    This is not a`SQL 101 For Beginners`book. The simplest basics of queries and joins
    are not covered here – I am assuming that you already have at least some working
    knowledge of querying a table or two.


    It is also not a`Definitive Reference Guide to SQL`book. I am not trying to cover
    every single piece of syntax in loving detail – not even of those statements and
    functions that I`do`write about in this book.


    Instead`Practical Oracle SQL`is a book with examples of how to solve lots of different
    tasks using SQL that is a little more complex than what is available in the SQL-92
    standard. Each chapter solves a different task, so the chapters do not necessarily
    need to be read consecutively.


    A chapter explains the task; shows the tables, data, and other objects involved;
    and then walks through developing the solution to the task. Typically this consists
    of building the SQL step by step from simple to complex. In the course of stepwise
    walking through the SQL, syntax is explained and examples given of alternatives
    or caveats where relevant.


    All chapters except one (Chapter 6) have as objective a task that is relevant
    for real application development. The specific examples are shown from the viewpoint
    of a fictional company that trades beer wholesale, but the techniques can be applied
    to many other applications. The chapters are divided into three parts based on
    the SQL technique used to solve the task.


    ### Part 1: Core SQL


    The first ten chapters deal with solutions that use a variety of SQL constructs.
    Everything that does not fit in Part 2 and Part 3 is found in this part.


    These chapters cover many techniques: inline view correlation, set operations,
    with clause and with clause functions, recursive subquery factoring and model
    clause iteration, pivoting and unpivoting, as well as splitting and creating delimited
    text.


    ### Part 2: Analytic functions


    Analytic functions have been my favorite since I started working with Oracle SQL.
    I saw a quote (source unknown) from a conference presentation: “If you write on
    your CV that you know SQL, but you do not use analytic functions, then you are
    lying.” I would hate to solve SQL tasks without having the use of analytic functions,
    so the six chapters of Part 2 are dedicated to solutions using analytic functions.


    Focus is on demonstrating practical tasks that can be solved extremely efficiently,
    walking through using analytic functions for tasks such as Top-N questions, warehouse
    picking with rolling sums, analyzing activity logs, and two types of forecasting.


    ### Part 3: Row pattern matching


    When in need of SQL that crosses row boundaries, my go-to solution since version
    8i has been analytic functions. From version 12.2,`match_recognize`has been added
    to my toolbox for cases where even an analytic function in SQL would be too convoluted.
    The six chapters of Part 3 show both using`match_recognize`for the row pattern
    matching it was designed for and using it for tasks that might not at first glance
    seem like a case for`match_recognize`.


    The tasks covered include finding up-and-down patterns, grouping consecutive data,
    merging date ranges, finding abnormal peaks, bin fitting, and tree branch calculations.'
