    of measurement). Often what I’m asked to find is the *gaps* between such groups;
    where are data *missing* that should have been there.'
  trans: '

    ## 连续日期而非整数


    在 `server_heartbeat` 表中，我应该能从每台服务器上恰好每五分钟获取到一次心跳存储。在清单 18-4 中，你可以看到表中的数据。


    ```

    SQL> select server, beat_time

    2  from server_heartbeat

    3  order by server, beat_time;

    清单 18-4

    作为非整数示例的服务器心跳

    ```


    观察可知有两台服务器，并且存在一处或多处心跳缺失的情况：


    ```

    SERVER      BEAT_TIME

    10.0.0.100  2019-04-10 13:00:00

    10.0.0.100  2019-04-10 13:05:00

    10.0.0.100  2019-04-10 13:10:00

    10.0.0.100  2019-04-10 13:15:00

    10.0.0.100  2019-04-10 13:20:00

    10.0.0.100  2019-04-10 13:35:00

    10.0.0.100  2019-04-10 13:40:00

    10.0.0.100  2019-04-10 13:45:00

    10.0.0.100  2019-04-10 13:55:00

    10.0.0.142  2019-04-10 13:00:00

    10.0.0.142  2019-04-10 13:20:00

    10.0.0.142  2019-04-10 13:25:00

    10.0.0.142  2019-04-10 13:50:00

    10.0.0.142  2019-04-10 13:55:00

    ```


    我能使用 Tabibitosan 方法来对恰好以 5 分钟间隔连续的行进行分组吗？当然可以。我只需要调整所使用的“单位”，使其成为 5 分钟单位，而不是简单的数字
    1。我在清单 18-5 中实现了这一点。


    ```

    SQL> select

    2     server

    3   , min(beat_time) as first_beat

    4   , max(beat_time) as last_beat

    5   , count(*)       as beats

    6  from (

    7     select

    8        server

    9      , beat_time

    10      , beat_time - interval ''5'' minute

    11                  * row_number() over (

    12                       partition by server

    13                       order by beat_time

    14                    ) as diff

    15     from server_heartbeat

    16  )

    17  group by server, diff

    18  order by server, first_beat;

    清单 18-5

    调整为 5 分钟间隔的 Tabibitosan

    ```


    在清单 18-2 中的 `i`，现在是第 9 行的 `beat_time`。为了在行连续时创建一个恒定差值，我在第 10-14 行将 `row_number()`
    乘以一个 5 分钟的 `interval`，然后可以从 `beat_time` 中减去这个值，得到可用于分组的 `diff` 值。


    因为（与清单 18-2 不同）我是按服务器执行此操作，而不是一次性对所有行执行，所以我在第 12 行使用了 `partition by`。这样我得到了每个服务器三组的输出：


    ```

    SERVER      FIRST_BEAT           LAST_BEAT            BEATS

    10.0.0.100  2019-04-10 13:00:00  2019-04-10 13:20:00  5

    10.0.0.100  2019-04-10 13:35:00  2019-04-10 13:45:00  3

    10.0.0.100  2019-04-10 13:55:00  2019-04-10 13:55:00  1

    10.0.0.142  2019-04-10 13:00:00  2019-04-10 13:00:00  1

    10.0.0.142  2019-04-10 13:20:00  2019-04-10 13:25:00  2

    10.0.0.142  2019-04-10 13:50:00  2019-04-10 13:55:00  2

    ```


    将 `row_number()` 乘以一个 `interval` 来进行“单位”调整并不难，但从阅读清单 18-5 中的代码来看，`diff` 计算的好处和作用并不是非常清晰。


    因此，让我尝试类似地将清单 18-4 适配到 5 分钟间隔数据，并创建清单 18-6，它将给出与清单 18-5 相同的输出。


    ```

    SQL> select server, first_beat, last_beat, beats

    2  from server_heartbeat

    3  match_recognize (

    4     partition by server

    5     order by beat_time

    6     measures

    7        first(beat_time) as first_beat

    8      , last(beat_time)  as last_beat

    9      , count(*)         as beats

    10     one row per match

    11     pattern (strt five_mins_later*)

    12     define

    13        five_mins_later as

    14           beat_time = prev(beat_time) + interval ''5'' minute

    15  )

    16  order by server, first_beat;

    清单 18-6

    对 match_recognize 解决方案进行的相同调整

    ```


    我给定义和度量起了与清单 18-4 中不同的其他名称，以便它们能更好地表示数据。


    但我所做的唯一*功能性*更改在第 14 行（对比清单 18-4 中的第 20 行），我将 `+ 1` 替换为 `+ interval ''5'' minute`
    – 这就是更改功能所需的所有操作，而且它非常自文档化。


    你可能已经注意到，数据非常整齐地恰好相隔 5 分钟，这在现实中不太可能出现在此类心跳数据上，这些数据可能在精确时间的前后几秒内到达。我可以通过一个 `before
    insert` 触发器来创建整齐对齐的数据，该触发器将插入的值四舍五入到最近的 5 分钟值，但那样会丢失信息（例如，我可能有兴趣看到某个服务器总是大约晚 20
    秒）。


    因此，与其“修饰”数据，我希望更改我的查询以允许一定的余地，而不是寻找恰好 5 分钟。使用 Tabibitosan 方法，为了实现分组的“恒定差值”，我必须在查询时将值四舍五入到最近的
    5 分钟。使用模式匹配，则更容易简单地调整定义，并将清单 18-6 的第 14 行更改为带有 `between` 子句的条件，以定义 `five_mins_later`
    意味着在 4 到 6 分钟之后的某个时间：


    ```

    ...

    12     define

    13        five_mins_later as

    14           beat_time between prev(beat_time) + interval ''4'' minute

    15                         and prev(beat_time) + interval ''6'' minute

    ...

    ```


    这同样是几乎纯英文的，并且相当易读和自文档化。


    但这些查询为我找到了在某种度量单位上连续的行组。我经常被要求查找的是这些组之间的*间隙*；即哪些*缺失*了本应存在的数据的位置。

    '
- fmt: '### Gap detection


    When I have the consecutive groups in the output from Listings [18-5](#475066_1_En_18_Chapter.xhtml#PC8)
    and [18-6](#475066_1_En_18_Chapter.xhtml#PC10), the gaps can be defined by the
    `last_beat` of one row (last beat before the gap) and the `first_beat` of the
    next row (next beat after the gap).


    Getting a value from the next row naturally makes me think of using the `lead`
    analytic function. So I use `lead` in Listing [18-7](#475066_1_En_18_Chapter.xhtml#PC12).


    ```sql

    SQL> select

    2     server, last_beat, next_beat

    3   , round((next_beat - last_beat) * (24*60)) as gap_minutes

    4  from (

    5     select

    6        server

    7      , last_beat

    8      , lead(first_beat) over (

    9           partition by server order by first_beat

    10        ) as next_beat

    11     from (

    ...

    27     )

    28  )

    29  where next_beat is not null

    30  order by server, last_beat;

    Listing 18-7

    Detecting gaps from consecutive grouping using lead function

    ```


    The query of Listing [18-6](#475066_1_En_18_Chapter.xhtml#PC10) I put inside the
    inline view in lines 11–27, and then in lines 8–10, I use `lead` to find the value
    of `first_beat` of the next row.


    But for the last row in the partition, `lead` will return `null,` and it doesn’t
    make sense to talk of a gap after the last row. So I wrap in yet another inline
    view and filter away those last rows in line 29, giving me this output showing
    two gaps for each server (compare this with the output of Listing [18-5](#475066_1_En_18_Chapter.xhtml#PC8)):


    ```sql

    SERVER      LAST_BEAT            NEXT_BEAT            GAP_MINUTES

    10.0.0.100  2019-04-10 13:20:00  2019-04-10 13:35:00  15

    10.0.0.100  2019-04-10 13:45:00  2019-04-10 13:55:00  10

    10.0.0.142  2019-04-10 13:00:00  2019-04-10 13:20:00  20

    10.0.0.142  2019-04-10 13:25:00  2019-04-10 13:50:00  25

    ```


    (If you noticed the `round` in line 3, this is simply because some of these `gap_minutes`
    values have teeny tiny rounding errors around the 20th decimal or so, because
    `next_beat – last_beat` is measured in days and in some of the cases has some
    values that create rounding errors when multiplied with 24∗60 to get minutes.)


    Now this works nicely, but it is actually possible to avoid having to use analytic
    functions on the output of `match_recognize`. In Listing [18-8](#475066_1_En_18_Chapter.xhtml#PC14),
    I show how to detect the gaps directly with pattern matching without any “post-processing.”


    ```sql

    SQL> select

    2     server, last_beat, next_beat

    3   , round((next_beat - last_beat) * (24*60)) as gap_minutes

    4  from server_heartbeat

    5  match_recognize (

    6     partition by server

    7     order by beat_time

    8     measures

    9        last(before_gap.beat_time) as last_beat

    10      , next_after_gap.beat_time   as next_beat

    11     one row per match

    12     after match skip to last next_after_gap

    13     pattern (strt five_mins_later* next_after_gap)

    14     subset before_gap = (strt, five_mins_later)

    15     define

    16        five_mins_later as

    17           beat_time = prev(beat_time) + interval ''5'' minute

    18      , next_after_gap as

    19           beat_time > prev(beat_time) + interval ''5'' minute

    20  )

    21  order by server, last_beat;

    Listing 18-8

    Detecting gaps directly in match_recognize

    ```


    This adds slightly more complexity to the pattern matching:


    *   I have *two* definitions in lines 16–19. One is the `five_mins_later` that
    I also used in Listing [18-6](#475066_1_En_18_Chapter.xhtml#PC10). The other is
    `next_after_gap` that classifies rows where `beat_time` is *more* than 5 minutes
    after the previous row.


    *   This enables me in line 13 to specify a `pattern` that begins like before:
    any `strt` row followed by zero or more `five_mins_later` rows. But then there
    should be exactly one `next_after_gap` row. So a match will consist of the group
    of consecutive rows *plus* the row after (that comes after the gap). This also
    means that for the *last* group, no `next_after_gap` row can be found, so it will
    not be matched – meaning I do not need to filter away the last group, as this
    pattern only finds the two groups (per server) that actually have a gap after
    them.


    *   From this match, I need the last beat *before* the gap and the first *after*
    the gap. The latter is easy; it is simply the `beat_time` of the single `next_after_gap`
    row (line 10). The first is a bit trickier, since it might be a value from a `strt`
    row (if the consecutive “group” consists of only a single row) or it might be
    a value from a `five_mins_later` row. Therefore I define a subset called `before_gap`
    in line 14, so that I in line 9 can specify that I want the `beat_time` of the
    last `before_gap` row.


    *   Finally, since I have included the `next_after_gap` row in the match, I need
    to specify that the next match should be searched for *from* this row (rather
    than normally from the row immediately following the match). This I do in line
    12 in the `after match` clause, so that the `next_after_gap` row becomes the `strt`
    row of the next match (if any).


    A little more complex, yes, but when you know the meaning of the different clauses
    in pattern matching, it still can be read and understood relatively plainly as
    English – especially if you have given the definitions meaningful names.


    So far I’ve shown various queries grouping data that is consecutive, where consecutive
    means a column value increases by a specific fixed unit for every row. But there
    are cases where we want to group the data by other definitions.'
