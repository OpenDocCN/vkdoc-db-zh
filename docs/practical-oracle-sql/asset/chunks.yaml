    清单 22-2

    统计下属数量

    ```


    外部查询与清单 22-1 相同。第 4–9 行的标量子查询使用了相同的 `connect by` 查询；只是 `start with` 不是从树的顶部开始，而是第
    7 行的 `start with` 从外部查询当前行的直属下属开始，并从那里向下搜索子树：


    ```

