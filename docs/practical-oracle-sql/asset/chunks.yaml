    \ 的分析函数方法要求你能够为 `partition by` 指定一个表达式，该表达式能产生一组唯一的值——而代码清单 [12-13] 可以在第 10 行使用任意复杂的\
    \ `where` 子句进行关联。\n\n我承认，例如使用 `case` 结构，你可以为分区编写非常复杂的表达式，所以需要代码清单 [12-13] 这种复杂度的场景会非常罕见——但知道有这个选项备用总是好的。\n\
    \n## 经验总结\n\n在本章中，我使用销售数据来举例说明 Top-N 查询，并在此过程中让你深入了解了：\n\n*   三种不同的 Top-N 查询类型：首行、奥林匹克和首值。\n\
    *   使用分析函数 `row_number`、`rank` 和 `dense_rank` 来实现它们。\n*   对前两种类型使用快捷方式 `fetch\
    \ first` 行限制子句。\n*   在分析函数中使用 `partition by` 实现数据子集的 Top-N。\n\n这些方法将在许多用例中对你有所帮助，而不仅仅是销售数据。"
- fmt: '# 13. Ordered Subsets with Rolling Sums


    One of the most useful features of analytic functions is the flexibility of the
    `window` clause, enabling aggregation of particular subsets of the data within
    a specific order. A classic subset that can be used for many purposes is the set
    of data from the beginning until the current row – if, for example, the `sum`
    aggregate function is used on that subset, you get an accumulated sum or rolling
    sum or running total (many names for the same thing).


    The use cases are plenty; many financial reports need running totals. But a different
    practical use case that has been extremely helpful in my work involves a slight
    variation of the running total, where I use the sum of all the *previous* rows
    to keep selecting rows until I have selected *just* sufficiently large subset
    to cover the sum I need – in this case until I have picked enough goods in the
    warehouse to cover the order by a customer.


    The complete case in this chapter will demonstrate the use of analytic functions
    to solve three problems simultaneously:


    *   Picking goods from the inventory in a certain order – most notably in first-in,
    first-out (FIFO) order

    *   Ordering the picking list to make the operator drive optimally through the
    warehouse

    *   Batch picking multiple orders


    It can all be done in a single SQL statement, and I’ll show the gradual building
    of the statement by solving the first problem and then expanding the statement
    adding the solutions to the second and third problems.


    ## Data for goods picking


    When you look at Figure 13-1, there are a lot of tables, mostly to show you a
    fairly realistic data model. For demonstration purposes, I could have simplified
    this a lot, but I will do that with a view, as you’ll see shortly.


    ![Figure 13-1](images/475066_1_En_13_Chapter/475066_1_En_13_Fig1_HTML.jpg)


    *Figure 13-1: The tables used in this chapter*


    In the `inventory` table is stored how many of a given product are currently stored
    in a given location and from which purchase did that quantity originate (thereby
    giving us the age of quantity in that location). Basically that’s just foreign
    keys to `locations`, `products`, and `purchases` tables and then a `qty` column.


    Then there are `customers` who have given `orders` that have `orderlines` specifying
    which `products` they are buying, how many, and for how much.


    To simplify working with these tables, I create the view `inventory_with_dims`
    shown in Listing 13-1. This simply joins the inventory table with the three referenced
    tables, so that I have all relevant information (product name, purchase date,
    warehouse, aisle, position) for each `inventory` row.


    ```sql

    create or replace view inventory_with_dims

    as

    select

    i.id

    , i.product_id

    , p.name as product_name

    , i.purchase_id

    , pu.purchased

    , i.location_id

    , l.warehouse

    , l.aisle

    , l.position

    , i.qty

    from inventory i

    join purchases pu

    on pu.id = i.purchase_id

    join products p

    on p.id = i.product_id

    join locations l

    on l.id = i.location_id;

    ```

    *Listing 13-1: View joining inventory with other relevant tables*


    When I build my picking SQL statement, I’ll be using this view together with the
    `orderlines` table.


    ## Building the picking SQL


    For the first two parts of the problem, I will just pick a single order, the order
    with id = 421. In Listing 13-2, I’ll just show you the data of that order.


    ```sql

    SQL> select

    2     c.id           as c_id

    3   , c.name         as c_name

    4   , o.id           as o_id

    5   , ol.product_id  as p_id

    6   , p.name         as p_name

    7   , ol.qty

    8  from orders o

    9  join orderlines ol

    10     on ol.order_id = o.id

    11  join products p

    12     on p.id = ol.product_id

    13  join customers c

    14     on c.id = o.customer_id

    15  where o.id = 421

    16  order by o.id, ol.product_id;

    ```

    *Listing 13-2: Data for the order I am going to pick*


    As you see here in the output, the White Hart pub has ordered 110 of Hoppy Crude
    Oil and 140 of Der Helle Kumpel:


    ```

    C_ID   C_NAME          O_ID  P_ID  P_NAME            QTY

    50042  The White Hart  421   4280  Hoppy Crude Oil   110

    50042  The White Hart  421   6520  Der Helle Kumpel  140

    ```


    Then it’s time to start building an analytic SQL statement.


    ### Solving picking an order by FIFO


    The first thing I do is I join the `orderlines` of order 421 with the `inventory_with_dims`
    view in Listing 13-3.


    (Bear with me that I’m using very short column aliases, but it’s an easy way to
    get a *sqlcl* output with very narrow columns that fits nicely on print.)


    ```sql

    SQL> select

    2     i.product_id as p_id

    3   , ol.qty       as ord_q

    4   , i.qty        as loc_q

    5   , sum(i.qty) over (

    6        partition by i.product_id

    7        order by i.purchased, i.qty

    8        rows between unbounded preceding and current row

    9     )            as acc_q

    10   , i.purchased

    11   , i.warehouse  as wh

    12   , i.aisle      as ai

    13   , i.position   as pos

    14  from orderlines ol

    15  join inventory_with_dims i

    16     on i.product_id = ol.product_id

    17  where ol.order_id = 421

    18  order by i.product_id, i.purchased, i.qty;

    ```

    *Listing 13-3: Possible inventory to pick – in order of purchase date*


    In lines 5–9 I am doing a rolling sum of the inventory quantity, partitioned by
    product and ordered by purchase date. And for those cases with multiple rows having
    the same purchase date, I add the quantity to the ordering, so I get to clean
    out smaller quantities in the warehouse first.


    In this query, the final `order by` in line 18 matches the columns of the `partition
    by` followed by `order by` in the analytic function. This is not necessary (later
    I will change this on purpose), but when they match like here, then the optimizer
    can do both with a single sorting operation.


    The output shows me for each of the two ordered products all of the inventory
    in purchase order, and in column `acc_q` (accumulated quantity), I can see the
    rolling sum:


    ```

    P_ID  ORD_Q  LOC_Q  ACC_Q  PURCHASED   WH  AI  POS

    4280  110    36     36     2018-02-23  1   C   1

    4280  110    39     75     2018-04-23  1   D   18

    4280  110    35     110    2018-06-23  2   B   3

    4280  110    34     144    2018-08-23  2   C   20

    4280  110    37     181    2018-10-23  1   A   4

    4280  110    19     200    2018-12-23  2   C   7

    6520  140    14     14     2018-02-26  2   B   5

    6520  140    14     28     2018-02-26  1   A   29

    6520  140    20     48     2018-02-26  1   C   13

    6520  140    24     72     2018-02-26  2   B   26

    6520  140    26     98     2018-04-26  2   D   9

    6520  140    48     146    2018-04-26  1   A   16

    6520  140    70     216    2018-06-26  1   C   5

    6520  140    21     237    2018-08-26  2   C   31

    6520  140    48     285    2018-08-26  1   D   19

    6520  140    72     357    2018-10-26  2   A   1

    6520  140    43     400    2018-12-26  1   B   32

    ```


    So this looks just like what I need, right? When the rolling sum is larger than
    the ordered quantity, I’ve got enough, right? I’m going to try that in Listing
    13-4 by wrapping Listing 13-3 in an inline view and filtering in the `where` clause.


    ```sql

    SQL> select *

    2  from (

    ...

    20  )

    21  where acc_q <= ord_q

    22  order by p_id, purchased, loc_q;

    ```

    *Listing 13-4: Filtering on the accumulated sum*


    Did I get the right result? No, not quite:


    ```

    P_ID  ORD_Q  LOC_Q  ACC_Q  PURCHASED   WH  AI  POS

    4280  110    36     36     2018-02-23  1   C   1

    4280  110    39     75     2018-04-23  1   D   18

    4280  110    35     110    2018-06-23  2   B   3

    6520  140    14     14     2018-02-26  2   B   5

    6520  140    14     28     2018-02-26  1   A   29

    6520  140    20     48     2018-02-26  1   C   13

    6520  140    24     72     2018-02-26  2   B   26

    6520  140    26     98     2018-04-26  2   D   9

    ```'
