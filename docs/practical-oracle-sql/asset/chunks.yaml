    To do this transformation, the innermost `replace` in lines 5–9 replaces each
    row delimiter (comma) with the five characters `"],["`, where each character is


    *   End of inner element


    *   End of inner array


    *   Comma as delimiter between elements of the outer array


    *   Start of new inner array


    *   Start of new inner element


    After that the `replace` in lines 4 and 10–12 replaces each column delimiter (colon)
    with the three characters `","`, where each character is


    *   End of inner element


    *   Comma as delimiter between elements in the inner array


    *   Start of new inner element


    In line 3, the JSON begins with the three characters `[["` for start of outer
    array, start of inner array, and start of inner element.


    Finally in line 13, the JSON ends with the three characters `"]]` for end of inner
    element, end of inner array, and end of outer array.


    Having created the string concatenation expression that transforms the delimited
    string to JSON, I can now use it in the `json_table` function in Listing [9-15](#475066_1_En_9_Chapter.xhtml#PC26).


    ```

    SQL> select

    2     cr.customer_id  as c_id

    3   , c.name          as cust_name

    4   , rl.product_id   as p_id

    5   , p.name          as prod_name

    6   , rl.score

    7  from customer_reviews cr

    8  cross apply json_table (

    9     ''[["''

    10     || replace(

    11           replace(

    12              cr.review_list

    13            , '',''

    14            , ''"],["''

    15           )

    16         , '':''

    17         , ''","''

    18        )

    19     || ''"]]''

    20   , ''$[*]''

    21     columns (

    22        product_id  number      path ''$[0]''

    23      , score       varchar2(1) path ''$[1]''

    24     )

    25  ) rl

    26  join customers c

    27     on c.id = cr.customer_id

    28  join products p

    29     on p.id = rl.product_id

    30  order by cr.customer_id, rl.product_id;

    Listing 9-15

    Parsing JSON with json_table

    ```


    The first parameter to the `json_table` function is the JSON itself, so lines
    9–19 are the expression I developed in the previous listing.


    The second parameter in line 20 specifies that `json_table` should take as rows
    all the inner arrays (`*`) in the outer JSON array that is in the root of the
    JSON string (`$`).


    And last in the `column` specification lines 22–23, I state that the first element
    (`$[0]`) of the inner array is a `number` and should be a column called `product_id`,
    while the second element (`$[1]`) of the inner array is a `varchar2` and should
    be a column called `score`.


    As you see, this output is identical to the output of the three previous methods:


    ```

    C_ID   CUST_NAME        P_ID  PROD_NAME         SCORE

    50042  The White Hart   4040  Coalminers Sweat  A

    50042  The White Hart   6600  Hazy Pink Cloud   C

    50042  The White Hart   7950  Pale Rider Rides  B

    50741  Hygge og Humle   4160  Reindeer Fuel     A

    51069  Der Wichtelmann  4280  Hoppy Crude Oil   B

    51069  Der Wichtelmann  7790  Summer in India   B

    ```


    As shown before, if I had wanted to show the customer with a blank `review_list`,
    I change `cross apply` in line 8 to `outer apply`.


    Tip


    Listing [9-15](#475066_1_En_9_Chapter.xhtml#PC26) can be adapted to use linefeed
    for row delimiter and comma for column delimiter if you have plain CSV in a CLOB,
    for example. Alternatively you could look into the `apex_data_parser` package
    as shown here: [`https://blogs.oracle.com/apex/super-easy-csv-xlsx-json-or-xml-parsing-about-the-apex_data_parser-package`](https://blogs.oracle.com/apex/super-easy-csv-xlsx-json-or-xml-parsing-about-the-apex_data_parser-package).


    Using `json_table` requires version 12.1.0.2 or newer. If you have a need for
    older versions, you’ll find in the companion script an example of doing the same
    thing by transforming to XML and using `xmltable` instead.


    ## Lessons learned


    Delimited text is most often a list of values separated by a single delimiter,
    but it can also be more structured with, for example, both a “row” delimiter and
    a “column” delimiter. I’ve shown both types of examples in this chapter along
    with multiple ways of splitting them, so you can


    *   Split delimited text with SQL only or built-in PL/SQL functionality.


    *   Create custom PL/SQL table functions – both regular and the ODCI variant –
    for special needs.


    *   Transform the text to JSON and use native JSON parsing.


    If you create your own data model, you should use child tables, collections, XML,
    or JSON rather than relying on storing data as delimited text. But it is common
    to receive delimited text from places out of your control, in which case any of
    the shown methods can be useful. Normally using native and built-in functionality
    is the easiest and the best performant, but for more special use cases, you can
    test if the other methods are better suited for you.


    # 10. Creating Delimited Text


    You learned in the previous chapter how to take a delimited text and split it
    to pieces, generating rows with one piece of text per row. Guess what, just like
    I did a chapter on pivoting after unpivoting, here comes a chapter showing how
    to take pieces of text in rows and aggregate them into delimited strings.


    This is often much liked by users reading reports, where it is easier to get an
    overview if there is not a lot of repeated data in multiple rows with most columns
    identical and just a single column with different values. Sometimes you can do
    pivoting to alleviate that problem, but sometimes you just don’t have a fixed
    number of columns. Outputting a comma-separated string can be the answer for such
    cases.


    Delimited strings can also be useful sometimes for importing elsewhere – for example,
    a tab- or semicolon-separated string is easy to import in an Excel spreadsheet
    to produce columns.


    There are several ways you can create such delimited text, both using built-in
    functionality as well as functionality you create yourself. I’ll show some of
    those different ways and their advantages and disadvantages.'
  trans: '

    ### 转换为 JSON 格式


    我首先想做的是将分隔符字符串转换为有效的 JSON。我在清单 9-14 中完成了这个操作，我将各分隔部分转换成了一个 JSON 数组的 JSON 数组，其中每个内部数组包含两个元素：第一个是产品
    ID 的值，第二个是评价分数的值。


    ```sql

    SQL> select

    2     customer_id

    3   , ''[["''

    4     || replace(

    5           replace(

    6              review_list

    7            , '',''

    8            , ''"],["''

    9           )

    10         , '':''

    11         , ''","''

    12        )

    13     || ''"]]''

    14     as json_list

    15  from customer_reviews

    16  order by customer_id;

    Listing 9-14

    将分隔符文本转换为 JSON

    ```


    在我解释代码之前，先让我展示一下输出：


    ```

    CUSTOMER_ID  JSON_LIST

    50042        [["4040","A"],["6600","C"],["7950","B"]]

    50741        [["4160","A"]]

    51007        [[""]]

    51069        [["4280","B"],["7790","B"]]

    ```


    你可以从输出中看到，第 3-13 行的代码将`review_list`的文本转换成了*嵌套的*JSON 数组。一个*外部的*数组，其元素对应于*行*，其中每一行本身又是一个*内部的*数组，其元素对应于*列*。


    为了进行这个转换，第 5-9 行中最内层的`replace`函数将每个行分隔符（逗号）替换为五个字符`"],["`，每个字符分别代表：


    *   内部元素的结束

    *   内部数组的结束

    *   作为外部数组元素间分隔符的逗号

    *   新内部数组的开始

    *   新内部元素的开始


    之后，第 4 行和第 10-12 行的`replace`函数将每个列分隔符（冒号）替换为三个字符`","`，每个字符分别代表：


    *   内部元素的结束

    *   作为内部数组元素间分隔符的逗号

    *   新内部元素的开始


    在第 3 行，JSON 以三个字符`[["`开始，分别代表外部数组的开始、内部数组的开始和内部元素的开始。


    最后在第 13 行，JSON 以三个字符`"]]`结束，分别代表内部元素的结束、内部数组的结束和外部数组的结束。


    创建好这个将分隔符字符串转换为 JSON 的字符串拼接表达式后，我现在可以在清单 9-15 的`json_table`函数中使用它了。


    ```sql

    SQL> select

    2     cr.customer_id  as c_id

    3   , c.name          as cust_name

    4   , rl.product_id   as p_id

    5   , p.name          as prod_name

    6   , rl.score

    7  from customer_reviews cr

    8  cross apply json_table (

    9     ''[["''

    10     || replace(

    11           replace(

    12              cr.review_list

    13            , '',''

    14            , ''"],["''

    15           )

    16         , '':''

    17         , ''","''

    18        )

    19     || ''"]]''

    20   , ''$[*]''

    21     columns (

    22        product_id  number      path ''$[0]''

    23      , score       varchar2(1) path ''$[1]''

    24     )

    25  ) rl

    26  join customers c

    27     on c.id = cr.customer_id

    28  join products p

    29     on p.id = rl.product_id

    30  order by cr.customer_id, rl.product_id;

    Listing 9-15

    使用 json_table 解析 JSON

    ```


    `json_table`函数的第一个参数是 JSON 本身，所以第 9-19 行就是我在前一个清单中开发的表达式。


    第 20 行中的第二个参数指定了`json_table`应该将 JSON 字符串根节点（`$`）处外部 JSON 数组中的所有内部数组（`*`）作为行。


    最后在`column`规范第 22-23 行中，我声明内部数组的第一个元素（`$[0]`）是一个`number`类型，应成为名为`product_id`的列，而内部数组的第二个元素（`$[1]`）是一个`varchar2`类型，应成为名为`score`的列。


    如你所见，这个输出与前三种方法的输出相同：


    ```

    C_ID   CUST_NAME        P_ID  PROD_NAME         SCORE

    50042  The White Hart   4040  Coalminers Sweat  A

    50042  The White Hart   6600  Hazy Pink Cloud   C

    50042  The White Hart   7950  Pale Rider Rides  B

    50741  Hygge og Humle   4160  Reindeer Fuel     A

    51069  Der Wichtelmann  4280  Hoppy Crude Oil   B

    51069  Der Wichtelmann  7790  Summer in India   B

    ```


    如前所述，如果我想显示`review_list`为空的客户，我将第 8 行的`cross apply`改为`outer apply`。


    **提示**


    清单 9-15 可以进行调整，例如，如果你有一个 CLOB 类型的纯 CSV 文件，可以使用换行符作为行分隔符，逗号作为列分隔符。或者，你可以研究一下 `apex_data_parser`
    包，如这里所示： [`https://blogs.oracle.com/apex/super-easy-csv-xlsx-json-or-xml-parsing-about-the-apex_data_parser-package`](https://blogs.oracle.com/apex/super-easy-csv-xlsx-json-or-xml-parsing-about-the-apex_data_parser-package)。


    使用`json_table`需要版本 12.1.0.2 或更高。如果你需要支持更早的版本，你会在配套脚本中找到一个通过转换为 XML 并使用`xmltable`来实现相同功能的示例。


    ## 经验总结


    分隔符文本通常是由单一分隔符分隔的值列表，但它也可以更具结构性，例如，同时包含“行”分隔符和“列”分隔符。我在本章中展示了这两种类型的示例，以及多种拆分它们的方法，因此你可以：


    *   仅使用 SQL 或内置的 PL/SQL 功能来拆分分隔符文本。

    *   为特殊需求创建自定义的 PL/SQL 表函数——包括常规的和 ODCI 变体。

    *   将文本转换为 JSON 并使用原生的 JSON 解析功能。


    如果你创建自己的数据模型，你应该使用子表、集合、XML 或 JSON，而不是依赖将数据存储为分隔符文本。但从你无法控制的来源接收分隔符文本是很常见的，在这种情况下，所示的任何方法都可能有用。通常，使用原生和内置功能是最简单且性能最好的，但对于更特殊的用例，你可以测试一下其他方法是否更适合你。


    # 10. 创建分隔符文本


    你在上一章学习了如何获取分隔符文本并将其拆分成片段，每行生成一个文本片段。你猜怎么着，就像我在讲解逆透视之后写了一章关于透视的内容一样，这里有一章将展示如何获取行中的文本片段并将它们聚合成分隔符字符串。


    这通常很受阅读报表的用户欢迎，因为如果多行中大部分列都相同，只有单个列的值不同，会产生大量重复数据，而有了聚合后的字符串，更容易获得概览。有时你可以使用透视来缓解这个问题，但有时你就是没有固定数量的列。输出一个逗号分隔的字符串可以是这种情况的答案。


    分隔符字符串有时对于导入到其他地方也很有用——例如，制表符或分号分隔的字符串很容易导入到 Excel 电子表格中以生成列。


    有几种方法可以创建这种分隔符文本，既可以使用内置功能，也可以使用你自己创建的功能。我将展示其中一些不同的方法及其优缺点。

