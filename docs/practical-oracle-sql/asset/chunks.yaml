- fmt: '# 15. Forecasting with Linear Regression


    ## Teaser: row pattern matching


    The `match_recognize` clause (formally known as row pattern matching) is a very
    powerful tool in the SQL developer’s toolbox. The entire Part 3 is dedicated to
    various ways to use this clause.


    But what I have been showing in this chapter is actually detecting and grouping
    on a pattern in the data – a cyclic pattern of activities going from `D` to `A`
    to one or more `P` and back to `D`. I have used some useful tricks in the analytic
    function toolbox by deliberately making `null` values for the `ignore nulls` clause
    to create groups of cycles, but it is actually relatively obscure what the code
    in Listing [14-7](#475066_1_En_14_Chapter.xhtml#PC13) and [14-8](#475066_1_En_14_Chapter.xhtml#PC15)
    does.


    With row pattern matching, I can make a SQL statement in Listing [14-9](#475066_1_En_14_Chapter.xhtml#PC17)
    that at first glance might seem even more obscure, but once you know `match_recognize`,
    this is actually (trust me on this) more readable.


    ```

    SQL> select

    2     *

    3  from (

    4     select

    5        list.picker_emp_id as emp

    6      , list.id            as list

    7      , log.log_time

    8      , log.activity       as act

    9     from picking_list list

    10     join picking_log log

    11        on log.picklist_id = list.id

    12  )

    13  match_recognize (

    14     partition by list

    15     order by log_time

    16     measures

    17        max(emp) as emp

    18      , first(log_time) as begin_cycle

    19      , round(

    20           (arrive.log_time - first(depart.log_time))

    21         * (24*60*60)

    22        ) as drive

    23      , round(

    24           (last(pick.log_time) - arrive.log_time)

    25         * (24*60*60)

    26        ) as pick

    27      , round(

    28           (next(last(pick.log_time)) - last(pick.log_time))

    29         * (24*60*60)

    30        ) as pack

    31     one row per match

    32     after match skip to last arrive

    33     pattern (depart arrive pick* depart{0,1})

    34     define

    35        depart as act = ''D''

    36      , arrive as act = ''A''

    37      , pick   as act = ''P''

    38  )

    39  order by list;

    Listing 14-9

    Identifying picking cycles with row pattern matching

    ```


    I will not dive deep into the syntax at this point, but I invite you to come back
    here after you have read Part 3 and read this listing again and see if you do
    not agree that (with suitable knowledge of the syntax) it is more clear what the
    code does.


    But the important thing you can note here is that in lines 34–37, I make some
    definitions that a row with `act = ''D''` is called `depart` and similar for `arrive`
    and `pick`, and then in line 33, I can easily state that one picking cycle contains
    a `depart`, followed by an `arrive`, followed by zero or more `pick`, and followed
    by zero or one `depart`. You’ll notice the similarity to regular expression syntax.
    (The zero or more and zero or one parts are to handle the incomplete picking cycle
    that ends each picking tour.)


    And just as Listing [14-9](#475066_1_En_14_Chapter.xhtml#PC17) produces the same
    output as Listing [14-7](#475066_1_En_14_Chapter.xhtml#PC13), I can get the same
    statistical output from Listing [14-10](#475066_1_En_14_Chapter.xhtml#PC18) that
    I got in Listing [14-8](#475066_1_En_14_Chapter.xhtml#PC15).


    ```

    SQL> select

    2     max(emp) as emp

    3   , list

    4   , min(begin_cycle) as begin

    5   , count(*) as drvs

    6   , round(avg(drive), 1) as avg_d

    7   , count(pick) as stops

    8   , round(avg(pick), 1) as avg_pick

    9   , round(avg(pack), 1) as avg_pack

    10  from (

    ...

    19  )

    20  match_recognize (

    ...

    45  )

    46  group by list

    47  order by list;

    Listing 14-10

    Statistics per picking list with row pattern matching

    ```


    I hope I have wetted your appetite for Part 3 of the book. Come back to this and
    play with this code when you are done with Part 3.


    ## Lessons learned


    The techniques of this chapter are classic examples of how analytic functions
    enable you to use data from across rows for inter-row calculations. In particular
    you have seen


    *   The use of `lead` to fetch data from the next row or `lead` with an optional
    parameter to fetch from the nth next row


    *   The use of the `ignore nulls` clause of `lead` to fetch data from the next
    row with a non-null value, where you can customize the value to be non-null only
    on those rows you want `lead` to fetch data from


    *   The use of `last_value` with the `ignore nulls` clause to set up a common
    value on a group of rows that belong together and grouping or pivoting on that
    common value


    These are all techniques useful in many situations, and if it becomes too complex
    to use these techniques, I recommend looking into using `match_recognize` (the
    topic of Part 3) as an alternative that often fits these situations very nicely.


    Some years ago at the retail company I worked at then, our data analyst came up
    to me. She was working on forecasting how much each of our products would sell
    in the next 12 months and wanted to know if I could help develop a piece of SQL
    to do this.


    Such forecasting can be done with a multitude of different models, each suitable
    to different types of data and circumstances. She had experimented with tools
    and researched and ran tests of the models on selected products and done whatever
    magic analysts do to make discoveries in our data. In the course of this, she
    found that a very suitable model for such sales forecasting in our case was a
    time series model with seasonal adjustment and exponential smoothing.


    To help me understand this model and implement it, she brought me an Excel spreadsheet
    in which she had 3 years of monthly sales data for one of our products and then
    a series of columns that successively calculated the intermediate steps in the
    model, ending with the forecast for the next year.


    The problem for her was that this spreadsheet was nice but could only operate
    on a single product. We had 100.000 products we needed to forecast. Therefore
    she really wished the forecast could be performed right inside the database with
    SQL.


    With the help of analytic functions for averaging and linear regression, I could
    implement the same forecasting model in SQL, doing a series of calculations that
    emulated the calculations of each separate column of the spreadsheet. In this
    chapter I will show you this step by step.


    Note


    The spreadsheet made by our analyst that I used as basis for developing this SQL
    was based on the work by Robert Nau, Fuqua School of Business, Duke University,
    who has written about it here, where you can download a similar spreadsheet: [*http://people.duke.edu/~rnau/411outbd.htm*](http://people.duke.edu/%257Ernau/411outbd.htm).


    ## Sales forecasting


    To demonstrate this time series forecasting model, I am going to use monthly sales
    data for the beers that my fictional Good Beer Trading Co sells. I have those
    data in the tables of Figure [15-1](#475066_1_En_15_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_15_Chapter/475066_1_En_15_Fig1_HTML.jpg](images/475066_1_En_15_Chapter/475066_1_En_15_Fig1_HTML.jpg)


    Figure 15-1


    Table with monthly sales for products


    There are more beers in the products table, but I am going to concentrate on two
    that have a nice seasonal variation in their sales – one sold primarily wintertime
    and one sold primarily summertime. Listing [15-1](#475066_1_En_15_Chapter.xhtml#PC1)
    shows the two beers queried by primary key id values.


    ```

    SQL> select id, name

    2  from products

    3  where id in (4160, 7790);

    Listing 15-1

    The two products for showing forecasting

    ```


    So you can see that if I query sales data for product ids 4160 and 7790, I will
    get data for Reindeer Fuel and Summer in India:


    ```

    ID NAME

    ---------- --------------------

    4160 Reindeer Fuel

    7790 Summer in India

    ```


    I have the sales data for 2016, 2017, and 2018, and besides having nice seasonal
    variations, Reindeer Fuel is selling a bit more each year, while Summer in India
    is selling a bit less. Now it’s time to try and apply this time series forecasting
    model to the data and forecast the sales of 2019.'
