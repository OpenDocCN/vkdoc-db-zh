    /Categories  2019-04-28  2019-04-29  2     4625   8.8   4.4\n/Breweries   2019-04-17\
    \  2019-04-18  2     2484   8.4   4.2\n/About       2019-04-05  2019-04-05  1\
    \     468    4.9   4.9\n```\n\n到目前为止，我展示了如何从绝对增长或相对增长的角度寻找异常增长，但在这种情况下，这可能不是最佳做法。也许查看每日访问量会更好。\n\
    \n## 查看每日访问量\n\n有些情况使用我前面展示的方式寻找增长是有用的，但仔细想想，对于当前案例这可能并不是一个好主意。随着时间的推移，计数器值会不断增长，因此当年复一年计数器值在数量级上变得巨大时，4%的增长率需要多得多的每日访问量才能满足条件。\n\
    \n所以我打算转而观察每日访问计数的变化情况。当你这样查看数据时，就会清楚我在代码清单 20-5 中实际找到的是每日访问量至少占计数器值 4%的时期。不幸的是，这会导致\
    \ `相同的` 每日访问量在计数器生命周期的初期显示出很高的百分比，而随着时间的推移和计数器的增加，百分比会越来越低。\n\n为了创建更好的解决方案，首先，我将使用代码清单\
    \ 20-6 来仅显示每日访问量。\n\n```\nSQL> select\n2     friendly_url, day\n3   , lead(counter)\
    \ over (\n        partition by page_no order by day\n     ) - counter as visits\n\
    6  from web_page_counter_hist\n7  order by page_no, day;\nListing 20-6\n聚焦于每日访问量\n\
    ```\n\n第 3-5 行中的表达式使用 `lead` 分析函数来查找下一个午夜的计数器值与此午夜值之间的差值——与我之前在 `match_recognize`\
    \ 语法中使用 `next` 所做的相同：\n\n```\nFRIENDLY_URL  DAY         VISITS\n/Shop        \
    \ 2019-04-01  78\n/Shop         2019-04-02  72\n...\n/Shop         2019-04-29\
    \  78\n/Shop         2019-04-30\n/Categories   2019-04-01  57\n...\n/Categories\
    \   2019-04-29  48\n/Categories   2019-04-30\n/Breweries    2019-04-01  21\n...\n\
    /Breweries    2019-04-29  38\n/Breweries    2019-04-30\n/About        2019-04-01\
    \  4\n...\n/About        2019-04-29  5\n/About        2019-04-30\n共选择出 120 行。\n\
    ```\n\n我将此输出可视化于图 20-3。\n\n![../images/475066_1_En_20_Chapter/475066_1_En_20_Fig3_HTML.jpg](img/475066_1_En_20_Fig3_HTML.jpg)\n\
    \n图 20-3\n\n绘制访问量而非计数器值的图表更能突出显示峰值\n\n在这张图上，相比于图 20-2，更容易发现峰值。你甚至可以在最底下的线——即 `/About`\
    \ 页面上——看到一些小的峰值。\n\n接下来，我将基于此图继续寻找模式。\n"
- fmt: "# Patterns in Daily Visits Data\n\nFor starters, again I simply try to find\
    \ patterns based on an absolute number. In `Listing 20-7`, I look for periods\
    \ where the daily visits are at least 50 higher than the day just before the period.\n\
    \n```sql\nSQL> select\n2     url, from_day, to_day, days, begin, p_v, f_v, t_v,\
    \ d_v\n3  from web_page_counter_hist\n4  match_recognize(\n5     partition by\
    \ page_no\n6     order by day\n7     measures\n8        first(friendly_url) as\
    \ url\n9      , first(day) as from_day\n10      , final last(day) as to_day\n\
    11      , final count(*) as days\n12      , first(counter) as begin\n13      ,\
    \ first(counter) - prev(first(counter)) as p_v\n14      , next(first(counter))\
    \ - first(counter) as f_v\n15      , next(final last(counter)) - first(counter)\
    \ as t_v\n16      , round(\n17           (next(final last(counter)) - first(counter))\n\
    18              / final count(*)\n19         , 1\n20        ) as d_v\n21     one\
    \ row per match\n22     after match skip past last row\n23     pattern ( peak+\
    \ )\n24     define\n25        peak as next(counter) - counter\n26            \
    \     - (first(counter) - prev(first(counter))) >= 50\n27  )\n28  order by page_no,\
    \ from_day;\nListing 20-7\nDaily visits at least 50 higher than previous day\n\
    ```\n\nMuch looks similar to what I did before, but there are some differences:\n\
    \n*   The definition of the peak classification in lines 25–26 works like this:\n\
    \    *   The `next()` counter value minus current counter value in line 25 is\
    \ the visits of the current day.\n    *   Taking the `first()` minus `prev(first()`\
    \ in line 26 is identical to going back to the previous row and doing `next()`\
    \ minus current, or in other words this is the visits of the day just before the\
    \ beginning of the match.\n    *   Subtracting the “day before” visits from the\
    \ current day visits gives how much higher the current day is – if this is at\
    \ least 50, the row is classified `peak`.\n*   In the `measures` I calculate these\
    \ four values:\n    *   `p_v` is previous visits – the visits of the day before\
    \ the first row of the match, as explained in the preceding text.\n    *   `f_v`\
    \ is first day’s visits – the visits of the first day of the match.\n    *   `t_v`\
    \ is total period visits – the visits from the first to the last day of the match.\n\
    \    *   `d_v` is daily visits – the average visits per day in the match period.\n\
    \nAll in all, the code produces this output:\n\n```\nURL          FROM_DAY   \
    \ TO_DAY      DAYS  BEGIN  P_V  F_V  T_V   D_V\n/Shop        2019-04-12  2019-04-17\
    \  6     5800   67   279  1386  231\n/Categories  2019-04-28  2019-04-28  1  \
    \   4625   37   360  360   360\n/Breweries   2019-04-17  2019-04-17  1     2484\
    \   42   163  163   163\n```\n\nWhich you’ll recognize as the largest three spikes\
    \ on the graph shown in `Figure 20-3`.\n\nThere was a lot of `prev`, `next`, `first()`,\
    \ and `last()` used in `Listing 20-7` to calculate visits based on the `counter`\
    \ data. Alternatively I can pre-calculate the daily visits and that way simplify\
    \ my `match_recognize` clause, like in `Listing 20-8`.\n\n```sql\nSQL> select\n\
    2     url, from_day, to_day, days, begin, p_v, f_v, t_v, d_v\n3  from (\n4   \
    \  select\n5        page_no, friendly_url, day, counter\n6      , lead(counter)\
    \ over (\n7           partition by page_no order by day\n8        ) - counter\
    \ as visits\n9     from web_page_counter_hist\n10  )\n11  match_recognize(\n12\
    \     partition by page_no\n13     order by day\n14     measures\n15        first(friendly_url)\
    \ as url\n16      , first(day) as from_day\n17      , final last(day) as to_day\n\
    18      , final count(*) as days\n19      , first(counter) as begin\n20      ,\
    \ prev(first(visits)) as p_v\n21      , first(visits) as f_v\n22      , final\
    \ sum(visits) as t_v\n23      , round(final avg(visits)) as d_v\n24     one row\
    \ per match\n25     after match skip past last row\n26     pattern ( peak+ )\n\
    27     define\n28        peak as visits - prev(first(visits)) >= 50\n29  )\n30\
    \  order by page_no, from_day;\nListing 20-8\nPre-calculating visits for simplifying\
    \ code\n```\n\nLines 4–9 contain an inline view identical to `Listing 20-6`, where\
    \ I calculate the daily visits with the analytic `lead()` function. Then my `match_recognize`\
    \ clauses become a lot simpler:\n\n*   Line 28 simply is the difference between\
    \ current `visits` and visits from the day before the match start.\n*   The four\
    \ measures described in the preceding text are much simpler in lines 20–23 by\
    \ using navigational functions and aggregates.\n\nThe output of `Listing 20-8`\
    \ is identical to `Listing 20-7`.\n\nIt is worth noting that the database worked\
    \ a little harder in `Listing 20-8`, since it had to first do the pre-calculation\
    \ with analytic functions before it could do the pattern matching. On the other\
    \ hand, the pattern matching processing became simpler, so depending on the data,\
    \ it might offset this overhead – your mileage may vary, so test either approach\
    \ on your own data.\n\nIt can also often be the case that your data already contains\
    \ data in the form like “daily visits” instead of historical snapshot values of\
    \ an increasing counter. If so, then it is easy to skip the inline view in `Listing\
    \ 20-8` and simply apply the pattern matching directly on your data.\n\nNow, I\
    \ do seem to get a better peak detection focusing on the `visits` than in the\
    \ first couple of examples in this chapter, but it is still probably not good\
    \ to look for an absolute like “at least 50 higher.” So in `Listing 20-9`, I’m\
    \ altering `Listing 20-8` to search relatively for “at least 50% higher” instead.\n\
    \n```sql\nSQL> select\n2     url, from_day, to_day, days, begin, p_v, f_v, t_v,\
    \ d_pct\n3  from (\n...\n10  )\n11  match_recognize(\n...\n23      , round(\n\
    24           (100*(final sum(visits) / prev(first(visits))) - 100)\n25       \
    \       / final count(*)\n26         , 1\n27        ) as d_pct\n...\n31     define\n\
    32        peak as visits / nullif(prev(first(visits)), 0) >= 1.5\n33  )\n34  order\
    \ by page_no, from_day;\nListing 20-9\nDaily visits at least 50% higher than the\
    \ previous day\n```\n\nIn line 32 I switch from looking at differences to looking\
    \ at ratios. If the `prev()` row had zero visits, I cannot calculate a ratio,\
    \ so I use `nullif()` to make the entire expression null in those cases.\n\nAnd\
    \ then instead of a daily visits measure, I use lines 23–27 to calculate the daily\
    \ average of the percentage of the day’s visits compared to the “day before” visits.\n\
    \nI’m now finding quite a few more peaks in my data, or are they really peaks?"
