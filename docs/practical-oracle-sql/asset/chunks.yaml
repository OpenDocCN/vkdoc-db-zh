    I got more rows in my output now; those rows with a price equal to the previous
    price are included. But it is maybe not the best idea, since looking at match
    numbers 12, 13, and 14, that is definitely an *upward*-going trend on the graph,
    but my definition has classified the row in match 13 as `DOWN`.


    My problem is that rows with an unchanged price potentially match *both* of my
    definitions, so with the simple *or* pattern I have used, such rows will be classified
    as the first classifier in the pattern that evaluates to true. This may not always
    be a problem as I’ll show later, but for now I will try changing my definitions
    to be mutually exclusive by adding a `same` classification (remembering to add
    it to the *or* pattern):


    ```

    ...

    11     pattern (

    12        down | up | same

    13     )

    14     define

    15        down as price  prev(price)

    17      , same as price = prev(price)

    ...

    ```


    And I get the same rows as the last output, just this time classified three ways:
    `DOWN`, `UP,` and `SAME`:


    ```

    SYMBOL  DAY         MATCH  CLASS  PREV  PRICE

    BEER    2019-04-02  1      DOWN   14.9  14.2

    BEER    2019-04-03  2      SAME   14.2  14.2

    BEER    2019-04-04  3      UP     14.2  15.7

    BEER    2019-04-05  4      DOWN   15.7  15.6

    BEER    2019-04-08  5      DOWN   15.6  14.8

    BEER    2019-04-09  6      SAME   14.8  14.8

    BEER    2019-04-10  7      DOWN   14.8  14

    BEER    2019-04-11  8      UP     14    14.4

    BEER    2019-04-12  9      UP     14.4  15.2

    BEER    2019-04-15  10     DOWN   15.2  15

    BEER    2019-04-16  11     DOWN   15    13.7

    BEER    2019-04-17  12     UP     13.7  14.3

    BEER    2019-04-18  13     SAME   14.3  14.3

    BEER    2019-04-19  14     UP     14.3  15.5

    ```


    I’m still not entirely happy, as I’m not seeing the very first row in the output.
    Since it has no previous row, it can never satisfy any of the three definitions,
    so how to handle that? It is fairly easy by adding a fourth classification to
    the `pattern` in line 12:


    ```

    ...

    12        down | up | same | strt

    ...

    ```


    Now you’ll be expecting me to add `strt` to the definitions in the `define` clause,
    but that is not needed here. If the pattern matching hits a definition in the
    pattern that is not defined, it is simply assumed always to be true. So the first
    row cannot match any of the three defined classifications, and the matching then
    attempts to see if it matches `strt`, and it does, since any row can do that.


    Therefore I see classifier `strt` for the first row in the output, which now contains
    all 15 rows:


    ```

    SYMBOL  DAY         MATCH  CLASS  PREV  PRICE

    BEER    2019-04-01  1      STRT         14.9

    BEER    2019-04-02  2      DOWN   14.9  14.2

    BEER    2019-04-03  3      SAME   14.2  14.2

    BEER    2019-04-04  4      UP     14.2  15.7

    BEER    2019-04-05  5      DOWN   15.7  15.6

    BEER    2019-04-08  6      DOWN   15.6  14.8

    BEER    2019-04-09  7      SAME   14.8  14.8

    BEER    2019-04-10  8      DOWN   14.8  14

    BEER    2019-04-11  9      UP     14    14.4

    BEER    2019-04-12  10     UP     14.4  15.2

    BEER    2019-04-15  11     DOWN   15.2  15

    BEER    2019-04-16  12     DOWN   15    13.7

    BEER    2019-04-17  13     UP     13.7  14.3

    BEER    2019-04-18  14     SAME   14.3  14.3

    BEER    2019-04-19  15     UP     14.3  15.5

    ```


    A thing to note is that it *does* matter where in the `pattern` I place such an
    undefined classification. For example, I could have placed it at the beginning
    of my *or* list of classifications:


    ```

    ...

    12        strt | down | up | same

    ...

    ```


    As the matching is lazy and short circuit evaluates the pattern, it’ll begin by
    seeing if the row matches the definition of `strt` , which is undefined, and therefore
    any row matches it, so I’m getting an immediate match, and `down`, `up,` and `same`
    are never evaluated. I get an output that isn’t very helpful:


    ```

    SYMBOL  DAY         MATCH  CLASS  PREV  PRICE

    BEER    2019-04-01  1      STRT         14.9

    BEER    2019-04-02  2      STRT   14.9  14.2

    BEER    2019-04-03  3      STRT   14.2  14.2

    BEER    2019-04-04  4      STRT   14.2  15.7

    BEER    2019-04-05  5      STRT   15.7  15.6

    BEER    2019-04-08  6      STRT   15.6  14.8

    BEER    2019-04-09  7      STRT   14.8  14.8

    BEER    2019-04-10  8      STRT   14.8  14

    BEER    2019-04-11  9      STRT   14    14.4

    BEER    2019-04-12  10     STRT   14.4  15.2

    BEER    2019-04-15  11     STRT   15.2  15

    BEER    2019-04-16  12     STRT   15    13.7

    BEER    2019-04-17  13     STRT   13.7  14.3

    BEER    2019-04-18  14     STRT   14.3  14.3

    BEER    2019-04-19  15     STRT   14.3  15.5

    ```


    But I’m reasonably happy with the query so far, classifying my rows into `down`,
    `up`, `same,` and `strt` – it’s now time to start using these classifications
    for some pattern matching.'
