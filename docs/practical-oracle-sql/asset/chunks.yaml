  raw: '## Blood alcohol concentration


    The Good Beer Trading Co must follow a health regulative where each beer must
    have an indication of how high a concentration of alcohol in your blood that drinking
    the beer will cause. As this is different for males and females and depends on
    body weight too, it must be shown both for a male weighing 80 kilograms and a
    female weighing 60 kilograms.


    The BAC (blood alcohol concentration) must be calculated as gram alcohol per milliliter
    body fluid, measured in percent. Meaning that a BAC of 0.04 shows that 0.04% of
    the liquid in your body is grams of alcohol. It can be calculated using the Widmark
    formula.


    Widmark formula


    Milliliters of drink * ABV/100 = Milliliters alcohol. Milliliters alcohol * 0.789
    (specific gravity of alcohol) = Grams alcohol. Body weight * 1000 * Gender liquid
    ratio = Milliliter fluid in body. (Males are 68% liquids, females 55% liquids.)
    100 * Grams alcohol / Milliliter body fluid = BAC.


    Putting the Widmark formula into SQL, I can calculate the desired BAC values in
    Listing [5-2](#475066_1_En_5_Chapter.xhtml#PC3).


    ```

    SQL> select

    2     p.id as p_id

    3   , p.name

    4   , pa.sales_volume as vol

    5   , pa.abv

    6   , round(

    7        100 * (pa.sales_volume * pa.abv / 100 * 0.789)

    8         / (80 * 1000 * 0.68)

    9      , 3

    10     ) bac_m

    11   , round(

    12        100 * (pa.sales_volume * pa.abv / 100 * 0.789)

    13         / (60 * 1000 * 0.55)

    14      , 3

    15     ) bac_f

    16  from products p

    17  join product_alcohol pa

    18     on pa.product_id = p.id

    19  where p.group_id = 142

    20  order by p.id;

    Listing 5-2

    Calculating blood alcohol concentration for male and female

    ```


    Lines 6–10 calculate the BAC of an 80 kg heavy male, while lines 11–15 do the
    same for a 60 kg female. The male has more liquid (both because of his gender
    and his larger weight), so the alcohol is diluted more in his body, and he has
    a lower BAC.


    These two calculations give the columns `bac_m` and `bac_f`, which are the two
    figures Good Beer Trading Co needs to show on the beer labels and packaging:


    ```

    P_ID  NAME              VOL  ABV  BAC_M  BAC_F

    4040  Coalminers Sweat  330  8.5  0.041  0.067

    4160  Reindeer Fuel     500  6    0.044  0.072

    4280  Hoppy Crude Oil   330  7    0.034  0.055

    ```


    You can see that if, for example, your country is one of the many that have a
    legal limit for driving of 0.05% BAC (some countries prefer showing it as per
    mille instead of percent, so it is 0.5‰ in those countries), all of the beers
    would cause a 60 kg female to get a ticket for drunk driving if she drove a car
    after drinking just a single bottle of these strong beers, while an 80 kg male
    would be below the limit.


    Note


    This is example data to illustrate a formula encoded in SQL. Actual BAC will vary
    depending upon more detailed factors in individual bodies and metabolisms, so
    this should not be used as basis for judging whether you can legally drive a car
    after drinking a couple beers or not. Use these formulas only as examples for
    learning SQL – I do not take responsibility for any tickets, and I urge you to
    drink responsibly.


    Anyway, as a developer, you obviously see here that I should take that formula
    and put it in a function rather than repeat the same code with slightly different
    numbers twice in this query.


    ## Function with PRAGMA UDF


    So at first in Listing [5-3](#475066_1_En_5_Chapter.xhtml#PC5), I’ll create a
    regular (well, almost regular) PL/SQL function for the Widmark formula for BAC
    calculation. Not that it matters for this demonstration, but I’ll follow a best
    practice of putting the function in a package rather than a stand-alone function,
    so I’ve decided to have a package `formulas` for such functions.


    ```

    SQL> create or replace package formulas

    2  is

    3     function bac (

    4        p_volume in number

    5      , p_abv    in number

    6      , p_weight in number

    7      , p_gender in varchar2

    8     ) return number deterministic;

    9  end formulas;

    10  /

    Package FORMULAS compiled

    SQL> create or replace package body formulas

    2  is

    3     function bac (

    4        p_volume in number

    5      , p_abv    in number

    6      , p_weight in number

    7      , p_gender in varchar2

    8     ) return number deterministic

    9     is

    10        PRAGMA UDF;

    11     begin

    12        return round(

    13           100 * (p_volume * p_abv / 100 * 0.789)

    14            / (p_weight * 1000 * case p_gender

    15                                    when ''M'' then 0.68

    16                                    when ''F'' then 0.55

    17                                 end)

    18         , 3

    19        );

    20     end bac;

    21  end formulas;

    22  /

    Package Body FORMULAS compiled

    Listing 5-3

    Creating a formula package with a bac function

    ```


    All are pretty straightforward, except line 10 in the body. The **UDF pragma**
    (user-defined function) is available since version 12.1 and tells the compiler
    that I intend to *primarily* call this function from SQL, rather than call it
    from PL/SQL.


    If I had created the function *without* `PRAGMA UDF`, it would compile in the
    normal way, leading to normal context switching when the function is called. When
    it is compiled *with* `PRAGMA UDF`, it is compiled in a different manner, which
    potentially can reduce the overhead of the context switching. How much (if any)
    overhead reduction there might be is out of my control as a developer. I’ll explain
    more shortly, but first let me show the use of the function.


    Using the function is just the same as I would do with a normal function, so in
    Listing [5-4](#475066_1_En_5_Chapter.xhtml#PC6), I query the BAC using calls to
    the packaged function.


    ```

    SQL> select

    2     p.id as p_id

    3   , p.name

    4   , pa.sales_volume as vol

    5   , pa.abv

    6   , formulas.bac(pa.sales_volume, pa.abv, 80, ''M'') bac_m

    7   , formulas.bac(pa.sales_volume, pa.abv, 60, ''F'') bac_f

    8  from products p

    9  join product_alcohol pa

    10     on pa.product_id = p.id

    11  where p.group_id = 142

    12  order by p.id;

    Listing 5-4

    Querying male and female BAC using packaged formula

    ```


    It gives me the same output as Listing [5-2](#475066_1_En_5_Chapter.xhtml#PC3),
    no surprises there.


    What makes this very easy to use is that I code the function just like I normally
    would, but as I know the function will be used a lot from SQL and less (or never)
    from PL/SQL, I simply add the `PRAGMA UDF,` and the compiler takes care of the
    rest, potentially saving me from some of the runtime overhead of context switching.


    How much benefit the PRAGMA UDF might give is depending on several factors. If
    the code inside the PL/SQL function only contains something that *could* have
    been expressed directly in SQL itself (such as the `formulas.bac` function), the
    benefit probably is larger, while a more complex function with much PL/SQL functionality
    or inline SQL might gain less or no benefit. You should test your use cases, but
    the general rule of thumb is that it won’t harm and probably might help a bit
    if you use the pragma whenever you *know* the function will be almost exclusively
    used from SQL.


    When I compile the function with `PRAGMA UDF,` I ask the compiler to try and make
    the function cheaper to call from SQL, if it can. That also means that I do not
    care if it *might* become slightly more expensive to call from PL/SQL. Again depending
    on many factors, there might be a slight negative effect here, since a `PRAGMA
    UDF` function could expect to receive data in the format the SQL engine delivers
    it. It might be hardly noticeable, or it might be slightly more – it’ll depend
    on actual circumstances.


    But I have another alternative to using a `PRAGMA UDF` compiled function – I can
    skip creating a stored function in the database and just specify my function in
