- fmt: '# Inventory to be packed in boxes


    As an example of bin fitting, imagine that the Good Beer Trading Co is moving,
    so all of the inventory has to be packed into boxes (boxes being my specific example
    of the generic term `bin`) and moved to a new warehouse somewhere else.


    I will be using the `inventory` and related tables I introduced to you in Chapter
    [13](#475066_1_En_13_Chapter.xhtml) on FIFO picking. In Chapter [13](#475066_1_En_13_Chapter.xhtml)
    I used more tables, but here I just use the ones shown in Figure [21-1](#475066_1_En_21_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_21_Chapter/475066_1_En_21_Fig1_HTML.jpg](images/475066_1_En_21_Chapter/475066_1_En_21_Fig1_HTML.jpg)


    Figure 21-1: Inventory, locations, and products tables used in this chapter


    In Chapter [13](#475066_1_En_13_Chapter.xhtml) I also introduced the view `inventory_with_dims`
    that joins the `inventory` with `locations` and `products`. This view I will be
    using throughout this chapter.


    Observe the inventory data of one of the beers in Listing [21-1](#475066_1_En_21_Chapter.xhtml#PC1).


    ```sql

    SQL> select

    2     product_name

    3   , warehouse as wh

    4   , aisle

    5   , position  as pos

    6   , qty

    7  from inventory_with_dims

    8  where product_name = ''Der Helle Kumpel''

    9  order by wh, aisle, pos;

    Listing 21-1: The inventory of the beer Der Helle Kumpel

    ```


    Most of the chapter examples show bin fitting for this beer:


    ```

    PRODUCT_NAME      WH  AISLE  POS  QTY

    Der Helle Kumpel  1   A      16   48

    Der Helle Kumpel  1   A      29   14

    Der Helle Kumpel  1   B      32   43

    Der Helle Kumpel  1   C      5    70

    Der Helle Kumpel  1   C      13   20

    Der Helle Kumpel  1   D      19   48

    Der Helle Kumpel  2   A      1    72

    Der Helle Kumpel  2   B      5    14

    Der Helle Kumpel  2   B      26   24

    Der Helle Kumpel  2   C      31   21

    Der Helle Kumpel  2   D      9    26

    ```


    I’ll try to pack these beers into boxes according to my bin fitting rules. First
    with limited capacity boxes.


    # Bin fitting with unlimited number of bins of limited capacity


    This type of bin fitting is also a simple variant of the knapsack problem, which
    is a problem that is quite hard to solve exactly within reasonable time. In fact
    it belongs to a class of problems called NP-hard, which is out of the scope of
    this book to delve deeper into. Suffice it to say here that any solution I give
    will just be an approximation – more or less optimal.


    I pack the beers into boxes according to these rules:


    *   A box can contain at maximum 72 bottles of beer.

    *   Quantities from different locations are allowed to be packed together in the
    same box.

    *   A quantity from a single location cannot be split into multiple boxes but
    must stay together in a single box.


    At first I am not worrying about trying to get close to optimal bin fitting. In
    Listing [21-2](#475066_1_En_21_Chapter.xhtml#PC3) I simply go through the warehouse
    in order of location and pack the beers into boxes. When I reach a location, if
    the quantity will fit into the current box, I will pack it into that box; otherwise,
    I will start packing in a new box.


    ```sql

    SQL> select wh, aisle, pos, qty, run_qty, box#, box_qty

    2  from (

    3     select

    4        product_name

    5      , warehouse as wh

    6      , aisle

    7      , position  as pos

    8      , qty

    9     from inventory_with_dims

    10     where product_name = ''Der Helle Kumpel''

    11  ) iwd

    12  match_recognize (

    13     order by wh, aisle, pos

    14     measures

    15        match_number()   as box#

    16      , running sum(qty) as run_qty

    17      , final   sum(qty) as box_qty

    18     all rows per match

    19     pattern (

    20        fits_in_box+

    21     )

    22     define

    23        fits_in_box as sum(qty) <= 72

    24  )

    25  order by wh, aisle, pos;

    Listing 21-2: Bin fitting in order of location

    ```


    So what happens in this query? I’ll explain:


    *   In the inline view lines 3–10, I simply limit the data to the beer I am packing
    at the moment.

    *   In `match_recognize,` I order the data by location in line 13.

    *   I define the classification `fits_in_box` in line 23 to be when the sum of
    `qty` is less than or equal to 72. When using an aggregate in a definition, it
    is evaluated using *running* semantics.

    *   The `pattern` in line 20 states I want one or more rows that are classified
    `fits_in_box`. This means that the `qty` of the first row is set as the running
    sum. If the running sum is not larger than 72, the row is added to the match.
    Then the `qty` of the second row is added to the running sum. If it still is not
    larger than 72, the row is added to the match and so on until a row causes the
    running sum to exceed 72, at which point the match ends.

    *   In the measures lines 15–17, I use the `match_number()` as the number of the
    box to be packed in, and I show both the `running` and the `final` sums.


    When you look at the output, you can see this in action:


    ```

    WH  AISLE  POS  QTY  RUN_QTY  BOX#  BOX_QTY

    1   A      16   48   48       1     62

    1   A      29   14   62       1     62

    1   B      32   43   43       2     43

    1   C      5    70   70       3     70

    1   C      13   20   20       4     68

    1   D      19   48   68       4     68

    2   A      1    72   72       5     72

    2   B      5    14   14       6     59

    2   B      26   24   38       6     59

    2   C      31   21   59       6     59

    2   D      9    26   26       7     26

    ```


    The first 48 beers are added to the running sum – it’s not larger than 72, so
    it is assigned to `box#` 1. Then 14 beers are added making the running sum 62 –
    still assigned to `box#` 1.


    Then it tries to add the 43 beers in the third row, which gives a running sum
    of 105 – it’s larger than 72, so therefore the row is not classified `fits_in_box`,
    and the `box#` 1 thus stops with the first two rows. Instead the 43 beers in the
    third row become the first beers in the second match – `box#` 2.'
  raw: '## Inventory to be packed in boxes


    As an example of bin fitting, imagine that the Good Beer Trading Co is moving,
    so all of the inventory has to be packed into boxes (boxes being my specific example
    of the generic term *bin*) and moved to a new warehouse somewhere else.


    I will be using the `inventory` and related tables I introduced to you in Chapter
    [13](#475066_1_En_13_Chapter.xhtml) on FIFO picking. In Chapter [13](#475066_1_En_13_Chapter.xhtml)
    I used more tables, but here I just use the ones shown in Figure [21-1](#475066_1_En_21_Chapter.xhtml#Fig1).


    ![../images/475066_1_En_21_Chapter/475066_1_En_21_Fig1_HTML.jpg](images/475066_1_En_21_Chapter/475066_1_En_21_Fig1_HTML.jpg)


    Figure 21-1


    Inventory, locations, and products tables used in this chapter


    In Chapter [13](#475066_1_En_13_Chapter.xhtml) I also introduced the view `inventory_with_dims`
    that joins the `inventory` with `locations` and `products`. This view I will be
    using throughout this chapter.


    Observe the inventory data of one of the beers in Listing [21-1](#475066_1_En_21_Chapter.xhtml#PC1).


    ```

    SQL> select

    2     product_name

    3   , warehouse as wh

    4   , aisle

    5   , position  as pos

    6   , qty

    7  from inventory_with_dims

    8  where product_name = ''Der Helle Kumpel''

    9  order by wh, aisle, pos;

    Listing 21-1

    The inventory of the beer Der Helle Kumpel

    ```


    Most of the chapter examples show bin fitting for this beer:


    ```

    PRODUCT_NAME      WH  AISLE  POS  QTY

    Der Helle Kumpel  1   A      16   48

    Der Helle Kumpel  1   A      29   14

    Der Helle Kumpel  1   B      32   43

    Der Helle Kumpel  1   C      5    70

    Der Helle Kumpel  1   C      13   20

    Der Helle Kumpel  1   D      19   48

    Der Helle Kumpel  2   A      1    72

    Der Helle Kumpel  2   B      5    14

    Der Helle Kumpel  2   B      26   24

    Der Helle Kumpel  2   C      31   21

    Der Helle Kumpel  2   D      9    26

    ```


    I’ll try to pack these beers into boxes according to my bin fitting rules. First
    with limited capacity boxes.


    ## Bin fitting with unlimited number of bins of limited capacity


    This type of bin fitting is also a simple variant of the knapsack problem, which
    is a problem that is quite hard to solve exactly within reasonable time. In fact
    it belongs to a class of problems called NP-hard, which is out of the scope of
    this book to delve deeper into. Suffice it to say here that any solution I give
    will just be an approximation – more or less optimal.


    I pack the beers into boxes according to these rules:


    *   A box can contain at maximum 72 bottles of beer.


    *   Quantities from different locations are allowed to be packed together in the
    same box.


    *   A quantity from a single location cannot be split into multiple boxes but
    must stay together in a single box.


    At first I am not worrying about trying to get close to optimal bin fitting. In
    Listing [21-2](#475066_1_En_21_Chapter.xhtml#PC3) I simply go through the warehouse
    in order of location and pack the beers into boxes. When I reach a location, if
    the quantity will fit into the current box, I will pack it into that box; otherwise,
    I will start packing in a new box.


    ```

    SQL> select wh, aisle, pos, qty, run_qty, box#, box_qty

    2  from (

    3     select

    4        product_name

    5      , warehouse as wh

    6      , aisle

    7      , position  as pos

    8      , qty

    9     from inventory_with_dims

    10     where product_name = ''Der Helle Kumpel''

    11  ) iwd

    12  match_recognize (

    13     order by wh, aisle, pos

    14     measures

    15        match_number()   as box#

    16      , running sum(qty) as run_qty

    17      , final   sum(qty) as box_qty

    18     all rows per match

    19     pattern (

    20        fits_in_box+

    21     )

    22     define

    23        fits_in_box as sum(qty) <= 72

    24  )

    25  order by wh, aisle, pos;

    Listing 21-2

    Bin fitting in order of location

    ```


    So what happens in this query? I’ll explain:


    *   In the inline view lines 3–10, I simply limit the data to the beer I am packing
    at the moment.


    *   In `match_recognize,` I order the data by location in line 13.


    *   I define the classification `fits_in_box` in line 23 to be when the sum of
    `qty` is less than or equal to 72\. When using an aggregate in a definition, it
    is evaluated using *running* semantics.


    *   The `pattern` in line 20 states I want one or more rows that are classified
    `fits_in_box`. This means that the `qty` of the first row is set as the running
    sum. If the running sum is not larger than 72, the row is added to the match.
    Then the `qty` of the second row is added to the running sum. If it still is not
    larger than 72, the row is added to the match and so on until a row causes the
    running sum to exceed 72, at which point the match ends.


    *   In the measures lines 15–17, I use the `match_number()` as the number of the
    box to be packed in, and I show both the `running` and the `final` sums.


    When you look at the output, you can see this in action:


    ```

    WH  AISLE  POS  QTY  RUN_QTY  BOX#  BOX_QTY

    1   A      16   48   48       1     62

    1   A      29   14   62       1     62

    1   B      32   43   43       2     43

    1   C      5    70   70       3     70

    1   C      13   20   20       4     68

    1   D      19   48   68       4     68

    2   A      1    72   72       5     72

    2   B      5    14   14       6     59

    2   B      26   24   38       6     59

    2   C      31   21   59       6     59

    2   D      9    26   26       7     26

    ```


    The first 48 beers are added to the running sum – it’s not larger than 72, so
    it is assigned to box# 1\. Then 14 beers are added making the running sum 62 –
    still assigned to box# 1.


    Then it tries to add the 43 beers in the third row, which gives a running sum
    of 105 – it’s larger than 72, so therefore the row is not classified fits_in_box,
    and the box# 1 thus stops with the first two rows. Instead the 43 beers in the
    third row become the first beers in the second match – box# 2.'
  trans: '# 需要装箱的库存清单


    以箱装拟合为例，想象一下“好啤酒贸易公司”正在搬迁，因此所有库存都需要被打包进箱子（这里，“箱子”是通用术语 `bin` 的一个具体例子）并搬到另一个新仓库。


    我将使用在讲解 13 章（关于先进先出拣货）时向您介绍的 `inventory`（库存）及相关表。在第 13 章中我使用了更多表，但这里我只使用图 21-1
    中所示的那些。


    ![../images/475066_1_En_21_Chapter/475066_1_En_21_Fig1_HTML.jpg](img/475066_1_En_21_Fig1_HTML.jpg)


    图 21-1：本章中使用的库存、位置和产品表


    在第 13 章中，我还介绍了视图 `inventory_with_dims`，该视图将 `inventory` 与 `locations` 和 `products`
    连接起来。本章中我将全程使用这个视图。


    请观察清单 21-1 中某款啤酒的库存数据。


    ```sql

    SQL> select

    2     product_name

    3   , warehouse as wh

    4   , aisle

    5   , position  as pos

    6   , qty

    7  from inventory_with_dims

    8  where product_name = ''Der Helle Kumpel''

    9  order by wh, aisle, pos;

    清单 21-1：啤酒 Der Helle Kumpel 的库存

    ```


    本章的大多数示例都展示了这款啤酒的箱装拟合：


    ```

    PRODUCT_NAME      WH  AISLE  POS  QTY

    Der Helle Kumpel  1   A      16   48

    Der Helle Kumpel  1   A      29   14

    Der Helle Kumpel  1   B      32   43

    Der Helle Kumpel  1   C      5    70

    Der Helle Kumpel  1   C      13   20

    Der Helle Kumpel  1   D      19   48

    Der Helle Kumpel  2   A      1    72

    Der Helle Kumpel  2   B      5    14

    Der Helle Kumpel  2   B      26   24

    Der Helle Kumpel  2   C      31   21

    Der Helle Kumpel  2   D      9    26

    ```


    我将尝试根据我的箱装拟合规则将这些啤酒装入箱子。首先是容量有限的箱子。


    # 无限数量、容量有限的箱子进行箱装拟合


    这种箱装拟合也是背包问题的一个简单变体，而背包问题是一个在合理时间内很难精确求解的问题。事实上，它属于一类被称为“NP 难”的问题，深入探讨超出了本书的范围。这里只需说明，我给出的任何解决方案都只是一个近似解——或多或少是最优的。


    我根据以下规则将啤酒装入箱子：

    *   一个箱子最多可容纳 72 瓶啤酒。

    *   允许将来自不同位置的数量装在同一个箱子里。

    *   来自单个位置的数量不能被拆分到多个箱子中，必须完整地放在一个箱子里。


    首先，我不担心如何接近最优的箱装拟合。在清单 21-2 中，我只是简单地按位置顺序遍历仓库，将啤酒装入箱子。当我到达一个位置时，如果该数量能放入当前箱子，我就将其装入该箱子；否则，我就开始在一个新箱子里装货。


    ```sql

    SQL> select wh, aisle, pos, qty, run_qty, box#, box_qty

    2  from (

    3     select

    4        product_name

    5      , warehouse as wh

    6      , aisle

    7      , position  as pos

    8      , qty

    9     from inventory_with_dims

    10     where product_name = ''Der Helle Kumpel''

    11  ) iwd

    12  match_recognize (

    13     order by wh, aisle, pos

    14     measures

    15        match_number()   as box#

    16      , running sum(qty) as run_qty

    17      , final   sum(qty) as box_qty

    18     all rows per match

    19     pattern (

    20        fits_in_box+

    21     )

    22     define

    23        fits_in_box as sum(qty) <= 72

    24  )

    25  order by wh, aisle, pos;

    清单 21-2：按位置顺序进行箱装拟合

    ```


    那么这个查询中发生了什么？我来解释一下：

    *   在第 3-10 行的内联视图中，我只是将数据限制为当前正在装箱的啤酒。

    *   在 `match_recognize` 子句中，我在第 13 行按位置对数据排序。

    *   我在第 23 行定义分类 `fits_in_box` 为 `qty` 的总和小于或等于 72 的情况。当在定义中使用聚合函数时，它使用*运行*语义进行计算。

    *   第 20 行的 `pattern` 表示我需要一行或多行被分类为 `fits_in_box`。这意味着第一行的 `qty` 被设置为运行总和。如果运行总和不大于
    72，则将该行添加到匹配项中。然后将第二行的 `qty` 添加到运行总和中。如果仍然不大于 72，则将该行添加到匹配项，依此类推，直到某一行导致运行总和超过
    72，此时匹配结束。

    *   在 `measures` 子句的第 15-17 行，我使用 `match_number()` 作为要装入的箱子编号，并同时显示 `running`（运行）和
    `final`（最终）总和。


    当你查看输出时，可以看到实际效果：


    ```

    WH  AISLE  POS  QTY  RUN_QTY  BOX#  BOX_QTY

    1   A      16   48   48       1     62

    1   A      29   14   62       1     62

    1   B      32   43   43       2     43

    1   C      5    70   70       3     70

    1   C      13   20   20       4     68

    1   D      19   48   68       4     68

    2   A      1    72   72       5     72

    2   B      5    14   14       6     59

    2   B      26   24   38       6     59

    2   C      31   21   59       6     59

    2   D      9    26   26       7     26

    ```


    前 48 瓶啤酒被加入运行总和——未超过 72，因此被分配到 `box#` 1。然后加入 14 瓶啤酒，使运行总和达到 62——仍然分配给 `box#` 1。


    接着，它尝试添加第三行的 43 瓶啤酒，这使得运行总和达到 105——超过了 72，因此该行未被分类为 `fits_in_box`，`box#` 1 于是由前两行结束。相反，第三行的
    43 瓶啤酒成为第二个匹配项——`box#` 2 中的第一批啤酒。'
- fmt: "And so it goes on until I end up having packed the beers from the 11 locations\
    \ into 7 boxes. Fast and easy, but not very optimal. It’s easy to spot that at\
    \ the very least I could save one box by putting the contents of `box#` 2 and\
    \ `box#` 7 together in a single box with 69 beers.\n\nThe problem is that packing\
    \ simply in order of location does not take into account at all whether the quantities\
    \ would fit together or not. Had the spread of quantities been different, I might\
    \ even have gotten an even worse result using more than seven boxes.\n\nOne of\
    \ the beauties of both analytic functions as well as pattern matching is that\
    \ I can use different `order by` clauses for the logic and for the final output.\
    \ So I can try to change the `order by` in the `match_recognize` in line 13 to\
    \ order by the `qty` in descending order (and then only use location as a tiebreaker).\n\
    \nTo verify the output more easily, I also change the final `order by` in line\
    \ 25 to the same (when making a packing list I can always change it back to location\
    \ order):\n\n```\n...\n12  match_recognize (\n13     order by qty desc, wh, aisle,\
    \ pos\n...\n24  )\n25  order by qty desc, wh, aisle, pos;\n```\n\nI get an output\
    \ that packs the beers quite differently than before:\n\n```\nWH  AISLE  POS \
    \ QTY  RUN_QTY  BOX#  BOX_QTY\n2   A      1    72   72       1     72\n1   C \
    \     5    70   70       2     70\n1   A      16   48   48       3     48\n1 \
    \  D      19   48   48       4     48\n1   B      32   43   43       5     69\n\
    2   D      9    26   69       5     69\n2   B      26   24   24       6     65\n\
    2   C      31   21   45       6     65\n1   C      13   20   65       6     65\n\
    1   A      29   14   14       7     28\n2   B      5    14   28       7     28\n\
    ```\n\nBut it isn’t really any more optimal as I still use seven boxes. In fact\
    \ this can even be called slightly worse, since here I cannot even take the two\
    \ least-filled boxes and pack them together, as `28 + 48` would exceed 72.\n\n\
    There are various approximation algorithms that can get more or less close to\
    \ the optimal solution. I have created a quite simplified version of a modified\
    \ first fit decreasing (MFFD) algorithm. My simple algorithm works like this:\n\
    \n*   First any quantity larger than 2/3 of a box capacity is simply assigned\
    \ to individual boxes. (Any small quantities that might have “filled the holes”\
    \ are likely to also fit into the rest of the boxes, so as approximation it won’t\
    \ be too far off.)\n\n*   The remaining quantities I sort in an interleaved manner:\n\
    \    *   First, the largest\n    *   Then the smallest\n    *   Then the second\
    \ largest\n    *   Then the second smallest\n    *   And so on\n\n*   Then I pack\
    \ as before, but using this sorted order, so that I get good chances that the\
    \ interleaved large/small sorting creates pairs that fit together in a box.\n\n\
    This simple approximation algorithm I implement in Listing [21-3](#475066_1_En_21_Chapter.xhtml#PC7).\n\
    \n```\nSQL> select wh, aisle, pos, qty, run_qty, box#, box_qty\n2       , prio\
    \ ,rn\n3  from (\n4     select\n5        product_name\n6      , warehouse as wh\n\
    7      , aisle\n8      , position  as pos\n9      , qty\n10      , case when qty\
    \ > 72*2/3 then 1 else 2 end prio\n11      , least(\n12           row_number()\
    \ over (\n13              partition by\n14                 case when qty > 72*2/3\
    \ then 1 else 2 end\n15              order by qty\n16           )\n17        \
    \ , row_number() over (\n18              partition by\n19                 case\
    \ when qty > 72*2/3 then 1 else 2 end\n20              order by qty desc\n21 \
    \          )\n22        ) rn\n23     from inventory_with_dims\n24     where product_name\
    \ = 'Der Helle Kumpel'\n25  ) iwd\n26  match_recognize (\n27     order by prio,\
    \ rn, qty desc, wh, aisle, pos\n28     measures\n29        match_number()   as\
    \ box#\n30      , running sum(qty) as run_qty\n31      , final   sum(qty) as box_qty\n\
    32     all rows per match\n33     pattern (\n34        fits_in_box+\n35     )\n\
    36     define\n37        fits_in_box as sum(qty) <= 72\n38  )\n39  order by prio,\
    \ rn, qty desc, wh, aisle, pos;\nListing 21-3\nUsing a simple best-fit approximation\n\
    ```"
