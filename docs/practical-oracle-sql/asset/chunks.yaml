  trans: '# 4. 使用递归进行树形计算


    我能想到的任何过程式语言都支持某种形式的递归。一个过程或函数可以调用自身——如果需要，可以反复调用直到达到某个条件。通常它们也支持迭代，这两者相关但并不完全相同。


    SQL 处理的是行的集合，而不是过程式逻辑，那么如何在 SQL 中实现递归呢？它仍然关注行的集合：首先找到一组行；然后基于这组行，应用某些逻辑找到第二组行；接着基于*那*组行，*再次*（递归地）应用逻辑找到第三组行；如此继续，直到找不到更多的行为止。


    SQL 中这种递归的典型用例是处理层次数据。你找到树的顶层节点，然后找到它们的子节点，接着是孙节点，依此类推。对树中每一层进行的下一次查找，都是基于前一层的行递归地应用子节点查找逻辑。


    在本章中，我主要关注 SQL 中以`递归子查询因式分解`形式存在的递归，这是 SQL 中最直接适用的递归方法。（你可以使用`model`子句进行迭代——我在第
    6 章和第 16 章给出了相关示例。第 16 章也给出了一个非层次化使用递归子查询因式分解的例子。）


    这里我将展示在层次数据上使用递归。


    ## 托盘上的箱中瓶


    好啤酒贸易公司有不同大小瓶装的啤酒，这些瓶子被装入不同大小的箱子中，箱子可能又被装入更大的箱子里，而这些箱子则堆放在托盘上。这些不同类型的产品包装及其关系的定义存储在图
    4-1 所示的表中。


    ![../images/475066_1_En_4_Chapter/475066_1_En_4_Fig1_HTML.jpg](img/475066_1_En_4_Fig1_HTML.jpg)


    图 4-1：包装表及每种包装类型中包含的数量


    `packaging`表包含不同类型和尺寸的瓶子、箱子和托盘。它们之间的关系存储在`packaging_relations`表中，该表显示了每种包装类型中有多少个另一种包装类型。清单
    4-1 以层次树的形式展示了这些表的内容。


    ### 清单 4-1

    不同包装类型的层次关系


    ```sql

    SQL> select

    2     p.id as p_id

    3   , lpad('' '', 2*(level-1)) || p.name as p_name

    4   , c.id as c_id

    5   , c.name as c_name

    6   , pr.qty

    7  from packaging_relations pr

    8  join packaging p

    9     on p.id = pr.packaging_id

    10  join packaging c

    11     on c.id = pr.contains_id

    12  start with pr.packaging_id not in (

    13     select c.contains_id from packaging_relations c

    14  )

    15  connect by pr.packaging_id = prior pr.contains_id

    16  order siblings by pr.contains_id;

    ```


    在第 12-14 行的`start with`中，我从顶层托盘开始，因为任何作为`contains_id`存在于`packaging_relations`中的包装，根据定义都不在顶层。然后通过第
    15 行的`connect by`遍历层次结构。


    在输出中，你可以看到托盘类型是根据堆放在托盘上的箱子（或混合箱子）来定义的：


    ```

    P_ID  P_NAME           C_ID  C_NAME        QTY

    531   Pallet of L      521   Box Large     12

    521     Box Large      502   Bottle 500cl  72

    532   Pallet of M      522   Box Medium    20

    522     Box Medium     501   Bottle 330cl  36

    533   Pallet Mix MS    522   Box Medium    10

    522     Box Medium     501   Bottle 330cl  36

    533   Pallet Mix MS    523   Box Small     20

    523     Box Small      502   Bottle 500cl  30

    534   Pallet Mix SG    523   Box Small     20

    523     Box Small      502   Bottle 500cl  30

    534   Pallet Mix SG    524   Gift Box      16

    524     Gift Box       511   Gift Carton   8

    511       Gift Carton  501   Bottle 330cl  3

    511       Gift Carton  502   Bottle 500cl  2

    ```


    你可以看到，一个*Pallet of L*包含 12 个*Box Large*，而每个*Box Large*又包含 72 个*Bottle 500cl*。


    另一方面，一个*Pallet Mix SG*包含 20 个*Box Small*，而每个*Box Small*包含 30 个*Bottle 500cl*；该托盘还包含
    16 个*Gift Box*，每个*Gift Box*包含 8 个*Gift Carton*，而每个*Gift Carton*又包含 3 个*Bottle
    330cl*和 2 个*Bottle 500cl*。


    从这个层次结构出发，目标是对于每个顶层包装（托盘），找出它包含了多少个最低层级包装（瓶子）的每个种类。对于*Pallet Mix SG*，我想知道它包含 20*30+16*8*2
    = 856 个*Bottle 500cl*，以及 16*8*3 = 384 个*Bottle 330cl*。


    换句话说，我需要遍历树的各个分支，并将每个分支的数量相乘。'
- fmt: '## 乘法层级数量


    要遍历层级结构，Oracle中的传统方法是使用 `connect by` 语法（正如我在前面的列表[4-1](#475066_1_En_4_Chapter.xhtml#PC1)中所使用的那样），因此我将首先在列表[4-2](#475066_1_En_4_Chapter.xhtml#PC3)中尝试这种方法。


    ```

    SQL> select

    2     connect_by_root p.id as p_id

    3   , connect_by_root p.name as p_name

    4   , c.id as c_id

    5   , c.name as c_name

    6   , ltrim(sys_connect_by_path(pr.qty, ''*''), ''*'') as qty_expr

    7   , qty * prior qty as qty_mult

    8  from packaging_relations pr

    9  join packaging p

    10     on p.id = pr.packaging_id

    11  join packaging c

    12     on c.id = pr.contains_id

    13  where connect_by_isleaf = 1

    14  start with pr.packaging_id not in (

    15     select c.contains_id from packaging_relations c

    16  )

    17  connect by pr.packaging_id = prior pr.contains_id

    18  order siblings by pr.contains_id;

    Listing 4-2

    数量乘法的首次尝试

    ```


    我使用了与列表[4-1](#475066_1_En_4_Chapter.xhtml#PC1)相同的 `start with` 和 `connect by`，但第13行对
    `connect_by_isleaf` 的过滤使得输出结果*仅*包含每个分支的叶节点。


    通过在第2行和第3行使用 `connect_by_root`，我在输出中达到了预期的效果，即 `p_id` 是顶层的 `packaging_id`，而 `c_id`
    是最底层的 `contains_id`：


    ```

    P_ID  P_NAME         C_ID  C_NAME        QTY_EXPR  QTY_MULT

    531   Pallet of L    502   Bottle 500cl  12*72     864

    532   Pallet of M    501   Bottle 330cl  20*36     720

    533   Pallet Mix MS  501   Bottle 330cl  10*36     360

    533   Pallet Mix MS  502   Bottle 500cl  20*30     600

    534   Pallet Mix SG  502   Bottle 500cl  20*30     600

    534   Pallet Mix SG  501   Bottle 330cl  16*8*3    24

    534   Pallet Mix SG  502   Bottle 500cl  16*8*2    16

    ```


    层级中的中间行（在列表[4-1](#475066_1_En_4_Chapter.xhtml#PC1)的输出中可见）在此输出中被省略了，但这并不意味着它们被跳过了。通过在第6行使用
    `sys_connect_by_path`，我可以在 `qty_expr` 列中看到所有中间行的数量，我特意用星号作为分隔符，以便可视化我需要进行的乘法。


    在代码的第7行，我尝试在 `qty_mult` 列中计算乘法，但如你所见，它仅在前五行有效，这些行只有两个层级需要相乘。在最后两行，我有三个层级需要相乘，但我的输出只包含了最后两个层级的乘法。


    你可能发现了错误：


    ```

    7   , qty * prior qty as qty_mult

    ```


    我将 `qty` 与 `prior` 行的 `qty` 相乘。这显然是错误的，实际上我想做的是将 `qty` 与上一行计算出的 `qty_mult` 相乘：


    ```

    7   , qty * prior qty_mult as qty_mult

    ```


    但不幸的是，`connect by` 语法不支持这样做，其中 `prior` 只能用于表列及其表达式，而*不能*用于选择列表的列别名。如果我尝试这个修改，会得到一个错误：`ORA-00904:
    "QTY_MULT": invalid identifier`。


    但是，有另一种遍历树的方法，称为递归子查询因子。


    ### 递归子查询因子


    递归子查询因子有时也被称为递归 `with` 子句，因为它是使用 `with` 的一种特殊方式。在列表[4-3](#475066_1_En_4_Chapter.xhtml#PC7)中使用递归
    `with` 使我能够进行想要的乘法。


    ```

    SQL> with recursive_pr (

    2     packaging_id, contains_id, qty, lvl

    3  ) as (

    4     select

    5        pr.packaging_id

    6      , pr.contains_id

    7      , pr.qty

    8      , 1 as lvl

    9     from packaging_relations pr

    10     where pr.packaging_id not in (

    11        select c.contains_id from packaging_relations c

    12     )

    13     union all

    14     select

    15        pr.packaging_id

    16      , pr.contains_id

    17      , rpr.qty * pr.qty as qty

    18      , rpr.lvl + 1      as lvl

    19     from recursive_pr rpr

    20     join packaging_relations pr

    21        on pr.packaging_id = rpr.contains_id

    22  )

    23     search depth first by contains_id set rpr_order

    24  select

    25     p.id as p_id

    26   , lpad('' '', 2*(rpr.lvl-1)) || p.name as p_name

    27   , c.id as c_id

    28   , c.name as c_name

    29   , rpr.qty

    30  from recursive_pr rpr

    31  join packaging p

    32     on p.id = rpr.packaging_id

    33  join packaging c

    34     on c.id = rpr.contains_id

    35  order by rpr.rpr_order;

    Listing 4-3

    使用递归子查询因子进行数量乘法

    ```


    这比使用 `connect by` 语法要长一些，但深入了解各个部分应该有助于理解：


    我在第1行命名了 `with` 子查询（如前一章所示）。


    当它是*递归* `with` 而不是普通 `with` 时，必须包含列名列表，正如我在第2行所做的那样。


    在 `with` 子句内部，我需要两个由第13行的 `union all` 分隔的 `select` 语句。


    第一个 `select`（第4-12行）查找层级的顶层节点。这等价于选择 `start with` 子句中的行，但可以更复杂，例如涉及连接。


    递归子查询因子没有内置的伪列 `level`，因此我在第8行使用了自己的 `lvl` 列，对于顶层节点初始化为1。


    第二个 `select`（第14-21行）是递归部分。它必须查询自身（第19行）并连接到一个或多个其他表以查找子行。


    在第一次迭代中，`recursive_pr` 将包含前文找到的第1级节点，第20-21行对 `packaging_relations` 的连接等价于 `connect
    by`，并找到树中的第2级节点。在第18行，我将 `lvl` 值加1来表示这一点。


    在第二次迭代中，`recursive_pr` 将提供第一次迭代中找到的第2级节点，而 `join` 找到第3级节点。它将如此反复执行，直到找不到更多的子行。


    这种方法看起来比 `connect by` 更复杂，但它提供了更大的灵活性。它允许的一件事是在下一级的表达式中使用在前一级计算的值，正如我在第17行所做的那样，我将递归的
    `qty` 与树中的下一个子行的 `qty` 相乘。这正是我在 `connect by` 中*不能*做的。


    递归子查询因子也没有 `order siblings by` 子句。但第23行指定了三件事：首先，树应如何搜索（`depth first` 等价于 `connect
    by` 的工作方式；`breadth first` 是另一种方式且很少使用）；其次，按哪个列对同级节点排序；第三，`set rpr_order` 创建一个该名称的虚拟列，其值递增，可用于第35行的最终
    `order by`，以确保整个输出按我指定的方式排序。


    在第24行开始的主要查询中，我简单地查询递归子查询并将其连接到 `packaging` 表以获取包装名称。


    最终，我得到了包含所需 `qty` 值的输出：'
  raw: '## Multiplying hierarchical quantities


    To traverse a hierarchy, the traditional method in Oracle is to use the `connect
    by` syntax (as I used in the preceding text in Listing [4-1](#475066_1_En_4_Chapter.xhtml#PC1)),
    so I will try that first in Listing [4-2](#475066_1_En_4_Chapter.xhtml#PC3).


    ```

    SQL> select

    2     connect_by_root p.id as p_id

    3   , connect_by_root p.name as p_name

    4   , c.id as c_id

    5   , c.name as c_name

    6   , ltrim(sys_connect_by_path(pr.qty, ''*''), ''*'') as qty_expr

    7   , qty * prior qty as qty_mult

    8  from packaging_relations pr

    9  join packaging p

    10     on p.id = pr.packaging_id

    11  join packaging c

    12     on c.id = pr.contains_id

    13  where connect_by_isleaf = 1

    14  start with pr.packaging_id not in (

    15     select c.contains_id from packaging_relations c

    16  )

    17  connect by pr.packaging_id = prior pr.contains_id

    18  order siblings by pr.contains_id;

    Listing 4-2

    First attempt at multiplication of quantities

    ```


    I use the same `start with` and `connect by` as Listing [4-1](#475066_1_En_4_Chapter.xhtml#PC1),
    but the filter on `connect_by_isleaf` in line 13 makes the output contain *only*
    the leaves of each branch.


    By using `connect_by_root` in lines 2 and 3, I get the desired effect in this
    output that `p_id` is the top-level `packaging_id`, while `c_id` is the lowest-level
    `contains_id`:


    ```

    P_ID  P_NAME         C_ID  C_NAME        QTY_EXPR  QTY_MULT

    531   Pallet of L    502   Bottle 500cl  12*72     864

    532   Pallet of M    501   Bottle 330cl  20*36     720

    533   Pallet Mix MS  501   Bottle 330cl  10*36     360

    533   Pallet Mix MS  502   Bottle 500cl  20*30     600

    534   Pallet Mix SG  502   Bottle 500cl  20*30     600

    534   Pallet Mix SG  501   Bottle 330cl  16*8*3    24

    534   Pallet Mix SG  502   Bottle 500cl  16*8*2    16

    ```


    The intermediate rows of the hierarchy (that were visible in the output of Listing
    [4-1](#475066_1_En_4_Chapter.xhtml#PC1)) are omitted from this output, but that
    does not mean they were skipped. Using `sys_connect_by_path` in line 6, I can
    see the quantities of all intermediate rows in the `qty_expr` column, which on
    purpose I delimited with an asterisk so that it visualizes the multiplication
    that I need to do.


    In line 7 of the code, I try to calculate the multiplication in column `qty_mult`,
    but as you can see, it only works in the first five rows, which are those where
    I only have two levels to multiply. In the last two rows, I have three levels
    to multiply, but my output contains just the multiplication of the last two levels.


    Probably you spot the error:


    ```

    7   , qty * prior qty as qty_mult

    ```


    I am multiplying `qty` with just the `qty` of the `prior` row. This is patently
    wrong, and instead I really want to multiply `qty` with the calculated `qty_mult`
    of the prior row:


    ```

    7   , qty * prior qty_mult as qty_mult

    ```


    But this is unfortunately not supported with the `connect by` syntax, where `prior`
    only can be used on the table columns and expressions with these, *not* on column
    aliases of the select list. If I try this modification, I get an error: `ORA-00904:
    "QTY_MULT": invalid identifier`.


    But there is a different way to traverse a tree that is called recursive subquery
    factoring.


    ### Recursive subquery factoring


    Recursive subquery factoring is also sometimes called the recursive `with` clause,
    as it is a special way of using `with`. Using recursive `with` in Listing [4-3](#475066_1_En_4_Chapter.xhtml#PC7)
    enables me to do the multiplication I want.


    ```

    SQL> with recursive_pr (

    2     packaging_id, contains_id, qty, lvl

    3  ) as (

    4     select

    5        pr.packaging_id

    6      , pr.contains_id

    7      , pr.qty

    8      , 1 as lvl

    9     from packaging_relations pr

    10     where pr.packaging_id not in (

    11        select c.contains_id from packaging_relations c

    12     )

    13     union all

    14     select

    15        pr.packaging_id

    16      , pr.contains_id

    17      , rpr.qty * pr.qty as qty

    18      , rpr.lvl + 1      as lvl

    19     from recursive_pr rpr

    20     join packaging_relations pr

    21        on pr.packaging_id = rpr.contains_id

    22  )

    23     search depth first by contains_id set rpr_order

    24  select

    25     p.id as p_id

    26   , lpad('' '', 2*(rpr.lvl-1)) || p.name as p_name

    27   , c.id as c_id

    28   , c.name as c_name

    29   , rpr.qty

    30  from recursive_pr rpr

    31  join packaging p

    32     on p.id = rpr.packaging_id

    33  join packaging c

    34     on c.id = rpr.contains_id

    35  order by rpr.rpr_order;

    Listing 4-3

    Multiplication of quantities with recursive subquery factoring

    ```


    This is quite a bit longer than using the `connect by` syntax, but diving into
    the separate parts should help understanding:


    I name my `with` subquery in line 1 (just as shown in the previous chapter).


    When it is a *recursive* `with` instead of just a normal `with`, it is mandatory
    to include the list of column names, as I do in line 2.


    Inside the `with` clause, I need two `select` statements separated by the `union
    all` in line 13.


    The first `select` (lines 4–12) finds the top-level nodes of the hierarchy. This
    is equivalent to selecting the rows in the `start with` clause, but can be more
    complex with, for example, joins.


    Recursive subquery factoring does not have a built-in pseudocolumn `level` , so
    instead I have my own `lvl` column, which is initialized to 1 for the top-level
    nodes in line 8.


    The second `select` (lines 14–21) is the recursive part. It must query itself
    (line 19) and join to one or more other tables to find child rows.


    In the first iteration, the `recursive_pr` will contain the level 1 nodes found
    in the preceding text, and the `join` to `packaging_relations` in lines 20–21
    is equivalent to the `connect by` and finds the level 2 nodes in the tree. In
    line 18, I add 1 to the `lvl` value to indicate this.


    In the second iteration, the `recursive_pr` will give me the level 2 nodes found
    in the first iteration, and the `join` finds the level 3 nodes. And so it will
    be executed repeatedly until no more child rows are found.


    This method looks more complex than `connect by`, but it allows much more flexibility.
    One of the things it allows is using values calculated on the prior level in the
    expressions for the next level, as I do in line 17 where I multiply the recursive
    `qty` with the `qty` of the next child row in the tree. This is exactly what I
    could *not* do in `connect by`.


    Recursive subquery factoring also does not have an `order siblings by` clause.
    But line 23 specifies three things: first, how the tree should be searched (`depth
    first` is equivalent to how `connect by` works; `breadth first` is the other way
    around and rarely used); second, which column to order siblings by; and, third,
    the `set rpr_order` creating a virtual column of that name with an incremental
    value that can be used in the final `order by` in line 35 to ensure the entire
    output is ordered the way I specified.


    In the main query beginning line 24, I simply query the recursive subquery and
    join it to the `packaging` table to get the packaging names.


    In the end I get this output with the `qty` values that I want:'
  trans: '

    ## 乘法层级数量


    要遍历层级结构，Oracle 中的传统方法是使用 `connect by` 语法（正如我在前面的列表 4-1 中所使用的那样），因此我将首先在列表 4-2
    中尝试这种方法。


    ```

    SQL> select

    2     connect_by_root p.id as p_id

    3   , connect_by_root p.name as p_name

    4   , c.id as c_id

    5   , c.name as c_name

    6   , ltrim(sys_connect_by_path(pr.qty, ''*''), ''*'') as qty_expr

    7   , qty * prior qty as qty_mult

    8  from packaging_relations pr

    9  join packaging p

    10     on p.id = pr.packaging_id

    11  join packaging c

    12     on c.id = pr.contains_id

    13  where connect_by_isleaf = 1

    14  start with pr.packaging_id not in (

    15     select c.contains_id from packaging_relations c

    16  )

    17  connect by pr.packaging_id = prior pr.contains_id

    18  order siblings by pr.contains_id;

    列表 4-2

    数量乘法的首次尝试

    ```


    我使用了与列表 4-1 相同的 `start with` 和 `connect by`，但第 13 行对 `connect_by_isleaf` 的过滤使得输出结果*仅*包含每个分支的叶节点。


    通过在第 2 行和第 3 行使用 `connect_by_root`，我在输出中达到了预期的效果，即 `p_id` 是顶层的 `packaging_id`，而
    `c_id` 是最底层的 `contains_id`：


    ```

    P_ID  P_NAME         C_ID  C_NAME        QTY_EXPR  QTY_MULT

    531   Pallet of L    502   Bottle 500cl  12*72     864

    532   Pallet of M    501   Bottle 330cl  20*36     720

    533   Pallet Mix MS  501   Bottle 330cl  10*36     360

    533   Pallet Mix MS  502   Bottle 500cl  20*30     600

    534   Pallet Mix SG  502   Bottle 500cl  20*30     600

    534   Pallet Mix SG  501   Bottle 330cl  16*8*3    24

    534   Pallet Mix SG  502   Bottle 500cl  16*8*2    16

    ```


    层级中的中间行（在列表 4-1 的输出中可见）在此输出中被省略了，但这并不意味着它们被跳过了。通过在第 6 行使用 `sys_connect_by_path`，我可以在
    `qty_expr` 列中看到所有中间行的数量，我特意用星号作为分隔符，以便可视化我需要进行的乘法。


    在代码的第 7 行，我尝试在 `qty_mult` 列中计算乘法，但如你所见，它仅在前五行有效，这些行只有两个层级需要相乘。在最后两行，我有三个层级需要相乘，但我的输出只包含了最后两个层级的乘法。


    你可能发现了错误：


    ```

    7   , qty * prior qty as qty_mult

    ```


    我将 `qty` 与 `prior` 行的 `qty` 相乘。这显然是错误的，实际上我想做的是将 `qty` 与上一行计算出的 `qty_mult` 相乘：


    ```

    7   , qty * prior qty_mult as qty_mult

    ```


    但不幸的是，`connect by` 语法不支持这样做，其中 `prior` 只能用于表列及其表达式，而*不能*用于选择列表的列别名。如果我尝试这个修改，会得到一个错误：`ORA-00904:
    "QTY_MULT": invalid identifier`。


    但是，有另一种遍历树的方法，称为递归子查询因子。


    ### 递归子查询因子


    递归子查询因子有时也被称为递归 `with` 子句，因为它是使用 `with` 的一种特殊方式。在列表 4-3 中使用递归 `with` 使我能够进行想要的乘法。


    ```

    SQL> with recursive_pr (

    2     packaging_id, contains_id, qty, lvl

    3  ) as (

    4     select

    5        pr.packaging_id

    6      , pr.contains_id

    7      , pr.qty

    8      , 1 as lvl

    9     from packaging_relations pr

    10     where pr.packaging_id not in (

    11        select c.contains_id from packaging_relations c

    12     )

    13     union all

    14     select

    15        pr.packaging_id

    16      , pr.contains_id

    17      , rpr.qty * pr.qty as qty

    18      , rpr.lvl + 1      as lvl

    19     from recursive_pr rpr

    20     join packaging_relations pr

    21        on pr.packaging_id = rpr.contains_id

    22  )

    23     search depth first by contains_id set rpr_order

    24  select

    25     p.id as p_id

    26   , lpad('' '', 2*(rpr.lvl-1)) || p.name as p_name

    27   , c.id as c_id

    28   , c.name as c_name

    29   , rpr.qty

    30  from recursive_pr rpr

    31  join packaging p

    32     on p.id = rpr.packaging_id

    33  join packaging c

    34     on c.id = rpr.contains_id

    35  order by rpr.rpr_order;

    列表 4-3

    使用递归子查询因子进行数量乘法

    ```


    这比使用 `connect by` 语法要长一些，但深入了解各个部分应该有助于理解：


    我在第 1 行命名了 `with` 子查询（如前一章所示）。


    当它是*递归* `with` 而不是普通 `with` 时，必须包含列名列表，正如我在第 2 行所做的那样。


    在 `with` 子句内部，我需要两个由第 13 行的 `union all` 分隔的 `select` 语句。


    第一个 `select`（第 4-12 行）查找层级的顶层节点。这等价于选择 `start with` 子句中的行，但可以更复杂，例如涉及连接。


    递归子查询因子没有内置的伪列 `level`，因此我在第 8 行使用了自己的 `lvl` 列，对于顶层节点初始化为 1。


    第二个 `select`（第 14-21 行）是递归部分。它必须查询自身（第 19 行）并连接到一个或多个其他表以查找子行。


    在第一次迭代中，`recursive_pr` 将包含前文找到的第 1 级节点，第 20-21 行对 `packaging_relations` 的连接等价于
    `connect by`，并找到树中的第 2 级节点。在第 18 行，我将 `lvl` 值加 1 来表示这一点。


    在第二次迭代中，`recursive_pr` 将提供第一次迭代中找到的第 2 级节点，而 `join` 找到第 3 级节点。它将如此反复执行，直到找不到更多的子行。


    这种方法看起来比 `connect by` 更复杂，但它提供了更大的灵活性。它允许的一件事是在下一级的表达式中使用在前一级计算的值，正如我在第 17 行所做的那样，我将递归的
    `qty` 与树中的下一个子行的 `qty` 相乘。这正是我在 `connect by` 中*不能*做的。


    递归子查询因子也没有 `order siblings by` 子句。但第 23 行指定了三件事：首先，树应如何搜索（`depth first` 等价于 `connect
    by` 的工作方式；`breadth first` 是另一种方式且很少使用）；其次，按哪个列对同级节点排序；第三，`set rpr_order` 创建一个该名称的虚拟列，其值递增，可用于第
    35 行的最终 `order by`，以确保整个输出按我指定的方式排序。


    在第 24 行开始的主要查询中，我简单地查询递归子查询并将其连接到 `packaging` 表以获取包装名称。


    最终，我得到了包含所需 `qty` 值的输出：

    '
- fmt: '# 使用递归子查询实现层次查询


    ```

    P_ID  P_NAME           C_ID  C_NAME        QTY

    531   Pallet of L      521   Box Large     12

    521     Box Large      502   Bottle 500cl  864

    532   Pallet of M      522   Box Medium    20

    522     Box Medium     501   Bottle 330cl  720

    533   Pallet Mix MS    522   Box Medium    10

    522     Box Medium     501   Bottle 330cl  360

    533   Pallet Mix MS    523   Box Small     20

    523     Box Small      502   Bottle 500cl  600

    534   Pallet Mix SG    523   Box Small     20

    523     Box Small      502   Bottle 500cl  600

    534   Pallet Mix SG    524   Gift Box      16

