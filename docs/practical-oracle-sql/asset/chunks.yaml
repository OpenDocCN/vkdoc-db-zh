    3  order by yr, yr_qty desc;

    ```


    但在代码清单 12-3 中，我将使用第 8 章中的**数据透视**技术，按年份在列中显示啤酒的排名。虽然这对于进行 Top-N 查询不是必需的，但它能将数据在三年间的变化差异可视化。


    ```

    SQL> select *

    2  from (

    3     select

    4        yr, product_name, yr_qty

    5      , row_number() over (

    6           partition by yr

    7           order by yr_qty desc

    8        ) as rn

    9     from yearly_sales

    10  )

    11  pivot (

    12     max(product_name) as prod

    13   , max(yr_qty)

    14     for yr in (

    15        2016, 2017, 2018

    16     )

    17  )

    18  order by rn;

    ```


    代码清单 12-3：年度销售数据视图（手动格式化，非 ansiconsole 格式）。


    我在第 5-8 行使用分析函数 `row_number` 有些超前了。稍后我会详细解释，但它在这里的作用是：按销售数量排序，为每年内的每种啤酒分配 1 到
    10 的序号。然后，这个序号 (`rn`) 被用于 `pivot` 子句中隐式的分组，因此我得到了一个包含十行（编号 1-10）的输出，每年有两列——啤酒名称和销售数量：


    ```

    RN 2016_PROD 2016 2017_PROD 2017 2018_PROD 2018

    --- --------- ---- --------- ---- --------- ----

    1 Ghost of   552 Monks and  582 Reindeer   691

    Hops            Nuns          Fuel

    2 Monks and  478 Reindeer   582 Pale Ride  491

    Nuns          Fuel           r Rides

    3 Der Helle  415 Ghost of   482 Hercule T  451

    Kumpel        Hops           rippel

    4 Summer in  377 Der Helle  458 Ghost of   451

    India          Kumpel        Hops

    5 Reindeer   331 Hercule T  344 Monks and  425

    Fuel           rippel          Nuns

    6 Coalminer  286 Summer in  321 Der Helle  357

    s Sweat         India          Kumpel

    7 Hercule T  261 Coalminer  227 Coalminer  300

    rippel         s Sweat        s Sweat

    8 Pale Ride  182 Pale Ride  210 Summer in  263

    r Rides        r Rides         India

    9 Hazy Pink  121 Hazy Pink  105 Hoppy Cru  132

    Cloud          Cloud         de Oil

    10 Hoppy Cru   99 Hoppy Cru   72 Hazy Pink   98

    de Oil         de Oil          Cloud

    ```


    我使用 `sqlcl` 的列格式化功能让啤酒名列变窄，以便名称能换行显示，而不是让 2018 年的数据因换行而跑到 2016 和 2017 年数据的下方。这种方式对名称的换行处理不如之前美观，但数量列是对齐的，便于观察每年的排序以及出现并列的地方。注意，2017
    年出现了第一名并列，2018 年出现了第三名并列。


    ## 传统的 rownum 方法


    在分析函数出现之前，进行 Top-N 查询的传统方法是：使用一个包含所需 `order by` 子句的内联视图，然后在外部查询中通过 `rownum <=`
    进行过滤，如代码清单 12-4 所示。


    ```

    SQL> select *

    2  from (

    3     select product_name, total_qty

    4     from total_sales

    5     order by total_qty desc

    6  )

    7  where rownum <= 3;

    ```


    代码清单 12-4：使用内联视图和 rownum 过滤得到 Top-3。


    这种方法根据“前几行”规则给出了前三名的啤酒：


    ```

    PRODUCT_NAME    TOTAL_QTY

    Reindeer Fuel   1604

    Monks and Nuns  1485

    Ghost of Hops   1485

    ```


    它运行良好且性能优异——优化器能识别这种结构，并会尽可能少地做工作以仅获取所需的三行。


    然而，这种方法无法轻易地帮助我们处理奥林匹克规则和“相同数值”规则。对于这些规则，使用分析函数要容易得多。

    '
- fmt: '## Analytic functions for ranking


    In `Listing 12-5`, I am rewriting `Listing 12-4`, just using the analytic function
    `row_number` in line 5 instead of the construct with `rownum`. As an analytic
    function cannot be used inside the `where` clause, I still need to use an inline
    view.


    ```sql

    SQL> select *

    2  from (

    3     select

    4        product_name, total_qty

    5      , row_number() over (order by total_qty desc) as ranking

    6     from total_sales

    7  )

    8  where ranking <= 3

    9  order by ranking;

    Listing 12-5

    Top-3 using inline view and filter on row_number()

    ```


    The output is the same as I got from `Listing 12-4` – it is still the top-rows
    rule I am applying for my Top-3 output:


    ```sql

    PRODUCT_NAME    TOTAL_QTY  RANKING

    Reindeer Fuel   1604       1

    Monks and Nuns  1485       2

    Ghost of Hops   1485       3

    ```


    But `row_number` is not the only analytic function I can use for ranking my data;
    I have two other analytic functions at my disposal too. `Listing 12-6` compares
    the three functions.


    ```sql

    SQL> select

    2     product_name, total_qty

    3   , row_number() over (order by total_qty desc) as rn

    4   , rank() over (order by total_qty desc) as rnk

    5   , dense_rank() over (order by total_qty desc) as dr

    6  from total_sales

    7  order by total_qty desc;

    Listing 12-6

    Comparison of the three analytic ranking functions

    ```


    The three functions correspond directly to the three ranking rules I’ve mentioned:


    *   `row_number` – Implements the top-rows rule

    *   `rank` – Implements the Olympic rule

    *   `dense_rank` – Implements the top-values rule


    Which I can see in the output:


    ```sql

    PRODUCT_NAME      TOTAL_QTY  RN  RNK  DR

    Reindeer Fuel     1604       1   1    1

    Ghost of Hops     1485       2   2    2

    Monks and Nuns    1485       3   2    2

    Der Helle Kumpel  1230       4   4    3

    Hercule Trippel   1056       5   5    4

    Summer in India   961        6   6    5

    Pale Rider Rides  883        7   7    6

    Coalminers Sweat  813        8   8    7

    Hazy Pink Cloud   324        9   9    8

    Hoppy Crude Oil   303        10  10   9

    ```


    I simply get consecutive numbers when I use `row_number`.


    When I use `rank`, a row can follow one of two rules: if it is a tie with the
    previous row, it gets the `same ranking` as the previous row; if it is not a tie,
    it gets the same ranking `as if it had been` using `row_number`. This makes it
    “skip” rankings in the Olympic fashion, like here where we have two beers ranked
    second place and then the next one is ranked fourth place.


    Lastly with `dense_rank`, a row can also follow one of two rules: again if it
    is a tie with the previous row, it gets the `same ranking` as the previous row;
    but if it is not a tie, the row here gets the ranking of the previous row `plus
    one`. Therefore, rankings are not skipped, but a consecutive ranking is assigned
    to each unique value, thus implementing the top-values rule.


    Armed with these different analytic functions, it is easy for me to switch between
    the different ranking rules. `Listing 12-5` gave me the top-rows rule – I can
    simply change line 5 to `rank` to use the Olympic rule:


    ```sql

    5      , rank() over (order by total_qty desc) as ranking

    ```


    In this case, the output is the same three beers; the only difference is that
    the second and third rows both are ranked as second place:


    ```sql

    PRODUCT_NAME    TOTAL_QTY  RANKING

    Reindeer Fuel   1604       1

    Ghost of Hops   1485       2

    Monks and Nuns  1485       2

    ```


    Or alternatively I can change line 5 to `dense_rank` to use the top-values rule:


    ```sql

    5      , dense_rank() over (order by total_qty desc) as ranking

    ```


    This gives me a Top-3 report with an output of four rows, since there are two
    rows both having the second place ranked value:


    ```sql

    PRODUCT_NAME      TOTAL_QTY  RANKING

    Reindeer Fuel     1604       1

    Monks and Nuns    1485       2

    Ghost of Hops     1485       2

    Der Helle Kumpel  1230       3

    ```


    With these three analytic functions, I can answer Top-N questions with all three
    rules, so I’m happy. The only slight hitch is that I still need to write inline
    views and filter rows in the outer query. Could I write less? The answer is yes.


    ## Fetch only the first rows


    In version 12 came along a new syntax to the `select` statement – the `row limiting
    clause`. It’s also known as `fetch first`, since that’s the syntax used as you
    can see in `Listing 12-7`.


    ```sql

    SQL> select product_name, total_qty

    2  from total_sales

    3  order by total_qty desc

    4  fetch first 3 rows only;

    Listing 12-7

    Fetching only the first three rows

    ```


    With this syntax, I skip the inline view; I just write my query with a suitable
    `order by` clause and append the `fetch first` clause to state I only want the
    first three rows, which is then what I get in the output:


    ```sql

    PRODUCT_NAME    TOTAL_QTY

    Reindeer Fuel   1604

    Ghost of Hops   1485

    Monks and Nuns  1485

    ```


    Doing `rows only` gave me a result according to the first-rows rule. In effect
    this is simply “syntactic sugar” that makes it easier and simpler to write such
    a Top-N query, but underneath the database is automagically rewriting `Listing
    12-7` to perform the same operation as an inline view with a `row_number` function
    like `Listing 12-5`. The two listings work and perform identically; the difference
    is only that `Listing 12-7` is shorter and easier to write and read.


    The row limiting clause has another option instead of `rows only` – I can choose
    to do `rows with ties`:


    ```sql

    4  fetch first 3 rows with ties;

    ```


    The definition is that when the three rows have been fetched, it checks if there
    are further rows with the same value (ties) – if yes, then these are also output.
    For the data here, this is not the case, so I get the same output:


    ```sql

    PRODUCT_NAME    TOTAL_QTY

    Reindeer Fuel   1604

    Ghost of Hops   1485

    Monks and Nuns  1485

    ```


    The rule from the rows with ties definition is implemented underneath as an inline
    view with a `rank` function call, as that rule matches the Olympic rule I’ve shown
    – it is just stated differently.


    But how does that compare to the tie handling of the analytic functions according
    to the three ranking rules I showed before? I’ll dive a little deeper into the
    handling of ties with some examples from the yearly sales data.'
