    53  )

    54  select

    55     product_id, mth, ts, yr, mthno, qty, cma, s

    56   , case when ts <= 36 then

    57        nvl(

    58           case qty

    59              when 0 then 0.0001

    60              else qty

    61           end / nullif(s, 0)

    62         , 0)

    63     end as des -- deseasonalized

    64  from s3

    65  order by product_id, mth;

    Listing 15-5

    反季节化销售数据

    ```


    反季节化（“从数据中剔除季节性”）基本上就是用数量除以季节性因子。我再次通过将零值转换为小值（第 58-61 行）来避免问题，并通过第 61 行的 `nullif`
    调用避免潜在的除零错误。


    在图 15-4 中，你可以看到 `des` 列在所有 36 个月中都有值，并且该线或多或少地跟随 `cma` 线（中心移动平均线）。每年的季节性变化越相似，`des`
    线与 `cma` 线就越接近。


    这里的大部分变化是由于零销售额被转换为小值造成的，你会看到一个急剧的峰值随后是一个急剧的低谷（或反之亦然）。但由于峰值和低谷的平均值能很好地命中 `cma`，它会在下一步中均衡掉（正如我将要展示的）。如果我保留了零值（可能转换为
    `null` 以避免除零），就会扭曲数据并破坏模型。


    ![../images/475066_1_En_15_Chapter/475066_1_En_15_Fig4_HTML.jpg](img/475066_1_En_15_Fig4_HTML.jpg)


    图 15-4


    驯鹿燃料（Reindeer Fuel）的反季节化销售数据


    图表上的这条反季节化曲线现在代表了月平均销售在一年中的某种平滑版本，它考虑了历年平均的季节性变化。下一步是创建一条尽可能匹配 `des` 线的直线。


