    Well no, from generation 40 or so, the population starts to decrease, and from
    generation 46, I have just four cells alive in a stable pattern that will stay
    like that forever. Partly this is because my grid is much too small and limited –
    in theory the Game of Life should run on an infinite grid.


    Just to round off the playing around with Game of Life, Listing [6-8](#475066_1_En_6_Chapter.xhtml#PC15)
    puts a different generation zero onto a 6x6 grid. This new starting point gives
    us an oscillating game, which is interesting to see when you run the iterations.


    ```

    SQL> truncate table conway_gen_zero;

