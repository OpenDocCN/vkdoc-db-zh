    dimension table, then you run Listing `7-15` (just with line 63 removed), and
    finally you take the generated query from the output and copy it to your real
    code and compile it. You have gained the benefit of dynamically generating code
    with much less chance of errors, but you do not suffer runtime penalties of building
    dynamic strings all the time.


    If the data change very often, of course, you may need to be completely dynamic.
    For a case like this, however, it is likely that such changes are rare and only
    occur along with releasing new application functionality anyway. A generator approach
    is well suited for such cases.


    ## Lessons learned


    Unpivoting is a useful skill, particularly when dealing with data that hasn’t
    been normalized in the usual way of relational databases. In the pages of this
    chapter, I’ve shown you different variations on the theme:


    *   Unpivoting with the three elements of the `unpivot` clause, measures, dimensions,
    and mappings

    *   Using either single expressions or expression lists to unpivot single or multiple
    measures and/or dimensions

    *   Manual alternatives to the `unpivot` clause for use in real old databases
    or really special circumstances

    *   Building dynamic `unpivot` SQL within PL/SQL based on values in dimension
    tables


    If you know the concepts of unpivoting and you can remember (or lookup) the syntax
    of using `for` and `in` in `unpivot`, you’ll find the methods useful for many
    things.


    # 8. Pivoting Rows to Columns


    The previous chapter was about unpivoting, which is the process of turning columns
    into rows. The opposite operation is called pivoting, which – surprise, surprise
    – is turning rows into columns.


    The idea is that you have a resultset with some dimensional values in one or more
    columns and some facts/measure values in one or more other columns. You’d like
    the output grouped by some other columns, so you only have one aggregated row
    for those values, and then the values from your measures should be placed in a
    set of columns, one for each value of your dimension (or combination of values
    if you have multiple dimensions).


    One thing to remember here is that in SQL, the engine needs at parse time to be
    able to determine names and datatypes of each column. That means that you have
    to hardcode the dimension values and what column names they should be turned into.


    If you wish to have dynamic pivoting, where there automatically will be columns
    for every dimension value in the data, you need to build it with dynamic SQL similarly
    to what I showed at the end of the previous chapter. That way there will be a
    parsing every time you run it, and the column names can then be known at that
    time. Alternatively the pivot clause supports returning XML instead of columns,
    which allows you dynamic pivoting without dynamic SQL – which can be an option
    if an XML output is acceptable. Either way of dynamic pivoting will not be covered
    in this book.


    Tip


    In Oracle version 18c or newer, there is a third dynamic pivoting method using
    polymorphic table functions. I won’t be covering PTFs in this book, but Chris
    Saxon of the Oracle AskTom team has an example of a PTF for dynamic pivoting on
    Live SQL: `https://livesql.oracle.com/apex/livesql/file/content_HPN95108FSSZD87PXX7MG3LW3.html`.


    ## Tables for pivoting


    The Good Beer Trading Co purchases beer from some breweries, storing the information
    in the `purchases` table shown in Figure `8-1`, along with dimension lookup tables
    `breweries`, `products`, and `product_groups`.


    ![../images/475066_1_En_8_Chapter/475066_1_En_8_Fig1_HTML.jpg](images/475066_1_En_8_Chapter/475066_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Purchases table and associated dimension tables


    I’ll be demonstrating pivoting data by brewery, product group, and year. To do
    that, I use the view `purchases_with_dims` in Listing `8-1`, which simply joins
    the `purchases` table with the dimension tables.


    ```

    SQL> create or replace view purchases_with_dims

    2  as

    3  select

    4     pu.id

    5   , pu.purchased

    6   , pu.brewery_id

    7   , b.name as brewery_name

    8   , pu.product_id

    9   , p.name as product_name

    10   , p.group_id

    11   , pg.name as group_name

    12   , pu.qty

    13   , pu.cost

    14  from purchases pu

    15  join breweries b

    16     on b.id = pu.brewery_id

    17  join products p

    18     on p.id = pu.product_id

    19  join product_groups pg

    20     on pg.id = p.group_id;

    View PURCHASES_WITH_DIMS created.

    ```


    Listing 8-1

    View joining purchases table with the dimensions


    At first I’m going to aggregate the quantity grouped by brewery, product group,
    and year in Listing `8-2`, which is a simple `group by` without any pivoting at
    all.


    ```

    SQL> select

    2     brewery_name

    3   , group_name

    4   , extract(year from purchased) as yr

    5   , sum(qty) as qty

    6  from purchases_with_dims pwd

    7  group by

    8     brewery_name

    9   , group_name

    10   , extract(year from purchased)

    11  order by

    12     brewery_name

    13   , group_name

    14   , yr;

    ```


    Listing 8-2

    Yearly purchased quantities by brewery and product group


    The output shows me that the company bought from three breweries, two different
    product groups from each brewery, in three years from 2016 to 2018, resulting
    in 18 rows for those combinations:


    ```

    BREWERY_NAME        GROUP_NAME  YR    QTY

    Balthazar Brauerei  Belgian     2016  800

    Balthazar Brauerei  Belgian     2017  1000

    Balthazar Brauerei  Belgian     2018  1000

    Balthazar Brauerei  Wheat       2016  500

    Balthazar Brauerei  Wheat       2017  500

    Balthazar Brauerei  Wheat       2018  400

    Brewing Barbarian   IPA         2016  200

    Brewing Barbarian   IPA         2017  300

    Brewing Barbarian   IPA         2018  500

    Brewing Barbarian   Stout       2016  800

    Brewing Barbarian   Stout       2017  1000

    Brewing Barbarian   Stout       2018  1200

    Happy Hoppy Hippo   IPA         2016  1000

    Happy Hoppy Hippo   IPA         2017  900

    Happy Hoppy Hippo   IPA         2018  800

    Happy Hoppy Hippo   Wheat       2016  200

    Happy Hoppy Hippo   Wheat       2017  100

    Happy Hoppy Hippo   Wheat       2018  100

    ```


    Now I’d like to have a column for quantity purchased each of the three years instead
    of a row for each year – this is what pivoting is all about.'
