  trans: '### 时间有效性


    在代码清单 19-3 中，你可以看到我用来创建 `emp_hire_periods` 表的 `create table` 语句。


    ```sql

    SQL> create table emp_hire_periods (

    2     emp_id         not null constraint emp_hire_periods_emp_fk

    3                       references employees

    4   , start_date     date not null

    5   , end_date       date

    6   , title          varchar2(20 char) not null

    7   , constraint emp_hire_periods_pk primary key (emp_id, start_date)

    8   , period for employed_in (start_date, end_date)

    9  );

    代码清单 19-3

    定义了时间有效性的表

    ```


    有趣的部分在第 8 行，这是用于在表上定义时间有效性的 `period for` 子句。


    在括号内，我指定了包含半开区间起点和终点的两个列。（这些可以是 `date` 或 `timestamp` 列。）这两列都允许为空；只是在这个用例中，我将 `start_date`
    设置为 `not null`，因为工作期间总是有一个特定的起点，而 `end_date` 允许空值，因为这意味着该职位仍然有效。


    **提示**


    如果你不指定这两列，数据库会自动创建两个隐藏列来包含该区间。通常我更喜欢自己创建列并指定它们，但如果你的用例中查询者不关心实际区间，只关心某行在特定时间点是否有效，那么这可能很方便。


    在 `period for` 之后，你必须为时间段命名（给它一个标识符），我仔细地选择了 `employed_in`。给名字好好想想是个好主意，因为一个好的名字将有助于编写使用时间有效性的查询，正如我在代码清单
    19-4 中所示。


    ```sql

    SQL> select

    2     ehp.emp_id

    3   , e.name

    4   , ehp.start_date

    5   , ehp.end_date

    6   , ehp.title

    7  from emp_hire_periods

    8          as of period for employed_in date ''2010-07-01''

    9       ehp

    10  join employees e

    11     on e.id = ehp.emp_id

    12  order by ehp.emp_id, ehp.start_date;

    代码清单 19-4

    按特定日期查询雇佣时间段表

    ```


    在 `from` 子句的第 7-9 行，我可以使用一种与闪回查询非常相似的 `as of` 语法，其中第 7 行是表名，第 8 行是 `as of` 规范，第
    9 行是表别名。


    使用闪回时，我指定 `as of timestamp` 或 `as of scn`，但对于时间有效性，我指定 `as of period for` 后跟时间段的名称。这意味着第
    8 行的 `employed_in` 名称有助于自我文档化，表明我正在查询在 2010-07-01（公司成立之初）*受雇于*公司的员工，当时只有三个人：


    ```

    EMP_ID  NAME           START_DATE  END_DATE    TITLE

    142     Harold King    2010-07-01  2012-04-01  Product Director

    143     Mogens Juel    2010-07-01  2014-01-01  IT Technician

    144     Axel de Proef  2010-07-01  2013-07-01  Sales Manager

    ```


    如果我想找 6 年后雇佣的员工，只需更改第 8 行的日期值：


    ```sql

    ...

    8          as of period for employed_in date ''2016-07-01''

    ...

    ```


    这里我有五个人（其中一些是同一个人，只是职位变了）：


    ```

    EMP_ID  NAME           START_DATE  END_DATE    TITLE

    142     Harold King    2012-04-01              Managing Director

    143     Mogens Juel    2016-06-01              IT Manager

    144     Axel de Proef  2012-04-01              Product Director

    145     Zoe Thorston   2014-02-01              IT Developer

    147     Ursula Mwbesi  2016-05-01  2017-03-01  Warehouse Manager

    ```


    带有 `as of` 的查询在数据库内部会被重写为带有适当 `>=` 和 `<` 谓词的常规 `where` 子句；只是用 `as of` 更容易正确编写。此外，数据库将其视为一种约束——它不允许你插入
    `end_date` 在 `start_date` 之前的数据。


    这个简短的旁注向你简要展示了时间有效性如何使事情变得更简单，如果你确实使用时间有效性，你还会自动获得半开区间的好处。现在我将回到范围合并，无论是否使用时间有效性，你都可以进行这种合并。


    ## 合并重叠范围


    我现在想做的是获取图 19-2 中的数据，找到同一员工的雇佣期相邻或重叠的所有位置，并将它们合并成汇总行，显示该员工在该汇总期间内担任了多少个职位（无论是连续还是同时担任）。我想要的结果如图
    19-3 所示。


    ![`../images/475066_1_En_19_Chapter/475066_1_En_19_Fig3_HTML.jpg`](img/475066_1_En_19_Fig3_HTML.jpg)


    图 19-3


    合并相邻和重叠日期范围后的预期结果


    我现在将尝试使用 `match_recognize` 来解决这个问题。为了展示尝试不同方法并在此过程中更改逻辑，我将首先展示一些不太成功的尝试，最终导向一个可行的解决方案。'
- fmt: '### Attempts comparing to the previous row


    In quite a few scenarios using `match_recognize`, it is typical to compare a value
    from the current row to a value from the previous row in order to make a row classification.
    So I’ll try that first in Listing 19-5.


    ```sql

    SQL> select

    2     emp_id

    3   , name

    4   , start_date

    5   , end_date

    6   , jobs

    7  from emp_hire_periods_with_name

    8  match_recognize (

    9     partition by emp_id

    10     order by start_date, end_date

    11     measures

    12        max(name)         as name

    13      , first(start_date) as start_date

    14      , last(end_date)    as end_date

    15      , count(*)          as jobs

    16     pattern (

    17        strt adjoin_or_overlap*

    18     )

    19     define

    20        adjoin_or_overlap as

    21           start_date <= prev(end_date)

    22  )

    23  order by emp_id, start_date;

    ```

    *Listing 19-5. Comparing `start_date` to `end_date` of the previous row*


    My simple definition in line 21 states that a row is overlapping or adjoining
    if the `start_date` is smaller than or equal to the `end_date` of the previous
    row. A match is then found by the `pattern` in line 17 of any row followed by
    zero or more adjoining or overlapping rows.


    And sure enough, this rule does indeed merge some of the date ranges in this output:


    ```

    EMP_ID  NAME           START_DATE  END_DATE    JOBS

    142     Harold King    2010-07-01              2

    143     Mogens Juel    2010-07-01  2015-10-01  3

    143     Mogens Juel    2016-06-01              1

    144     Axel de Proef  2010-07-01              2

    145     Zoe Thorston   2014-02-01              1

    145     Zoe Thorston   2019-02-01              1

    146     Lim Tok Lo     2014-10-01  2016-02-01  1

    146     Lim Tok Lo     2017-03-01              1

    147     Ursula Mwbesi  2014-10-01  2015-05-01  1

    147     Ursula Mwbesi  2016-05-01              2

    ```


    But the output of, for example, Mogens Juel is not completely merged; there should
    have been a single row only for him with four jobs. The problem is that when I
    order his rows by `start_date`, the Code Tester and IT Manager rows are compared
    and not overlapping. A comparison like this to the previous row fails to discover
    that both rows are adjoining or overlapping to Sys Admin.


    Thinking about it, I figured that maybe it would help simply to change the ordering
    in line 10 to order by `end_date` first:


    ```sql

    ...

    10     order by end_date, start_date

    ...

    ```


    The output has changed, but Mogens Juel still wrongly is shown twice:


    ```

    EMP_ID  NAME           START_DATE  END_DATE    JOBS

    142     Harold King    2010-07-01              2

    143     Mogens Juel    2010-07-01  2014-01-01  1

    143     Mogens Juel    2014-04-01              3

    144     Axel de Proef  2010-07-01              2

    145     Zoe Thorston   2014-02-01              1

    145     Zoe Thorston   2019-02-01              1

    146     Lim Tok Lo     2014-10-01  2016-02-01  1

    146     Lim Tok Lo     2017-03-01              1

    147     Ursula Mwbesi  2014-10-01  2015-05-01  1

    147     Ursula Mwbesi  2016-05-01              2

    ```


    With the changed ordering, the first attempt at finding a match for Mogens Juel
    will try to compare the IT Technician row with the Code Tester row and fail to
    find an overlap.


    No matter which ordering I choose, I cannot get all the overlaps in a single match
    by simply comparing a row to the previous row. I need a different way to handle
    this.


    ### Better comparing to the maximum end date


    Looking more closely on the rows of Mogens Juel in Figure 19-2, I decide that
    a better approach would be to compare the `start_date` of a row with the highest
    `end_date` that I have found so far in the match.


    A first attempt at this approach could look like this, but it would not work:


    ```sql

    ...

    8  match_recognize (

    9     partition by emp_id

    10     order by start_date, end_date

    11     measures

    12        max(name)         as name

    13      , first(start_date) as start_date

    14      , max(end_date)     as end_date

    15      , count(*)          as jobs

    16     pattern (

    17        strt adjoin_or_overlap*

    18     )

    19     define

    20        adjoin_or_overlap as

    21           start_date <= max(end_date)

    22  )

    ...

    ```


    The reason it does not work is that when a definition condition like line 21 is
    evaluated, the row is first assumed to be classified `adjoin_or_overlap`, and
    then the condition is tested if it is true. Therefore the result of `max(end_date)`
    is calculated of all rows of the match so far plus the current row, which does
    not make sense.


    In fact it makes so little sense that when I tested this first attempt, the query
    gave me either `ORA-03113: end-of-file on communication channel` or `java.lang.NullPointerException`
    depending on database version and which client I use. The database connection
    was then broken.


    So do not use this first attempt. Instead you should try my second attempt, which
    is shown in Listing 19-6.


    ```sql

    ...

    8  match_recognize (

    9     partition by emp_id

    10     order by start_date, end_date

    11     measures

    12        max(name)         as name

    13      , first(start_date) as start_date

    14      , max(end_date)     as end_date

    15      , count(*)          as jobs

    16     pattern (

    17        adjoin_or_overlap* last_row

    18     )

    19     define

    20        adjoin_or_overlap as

    21           next(start_date) <= max(end_date)

    22  )

    23  order by emp_id, start_date;

    ```

    *Listing 19-6. Comparing `start_date` of next row to highest `end_date` seen so
    far*


    In Listing 19-6, I reverse the logic. Instead of comparing the current row with
    the previous row, I compare it with the next row:

    *   I go back to ordering by `start_date` in line 10.

    *   In line 21, I check if the `start_date` of the next row is less than or equal
    to the highest `end_date` seen so far in the match – including the current row,
    because the `max` call will assume the current row is part of the match when it
    is evaluated. That means that when a row is classified as `adjoin_or_overlap`,
    that row should be merged with the next row.

    *   The `pattern` in line 17 looks for zero or more `adjoin_or_overlap` rows followed
    by one single row classified `last_row`. As that classification is undefined,
    any row can match it – but since the row before `last_row` was classified `adjoin_or_overlap`,
    I know that the `last_row` should be merged too.

    *   If I find no `adjoin_or_overlap` rows, the row will become classified `last_row`
    because of the `*` in line 17 that says that zero `adjoin_or_overlap` rows are
    acceptable in the pattern. This means that when a row is not overlapping with
    any other rows, it will become a match of a single row classified as `last_row`
    and thus unmerged be part of the output.

    *   The `measure` `end_date` in line 14 is calculated as the largest `end_date`
    of the match. Since I am not qualifying the `end_date` in the `max` call with
    either `adjoin_or_overlap` or `last_row`, `max` is applied to all rows of the
    match no matter what classification the rows got.'
