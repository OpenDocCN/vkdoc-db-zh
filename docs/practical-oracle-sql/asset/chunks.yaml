    行和第 10-12 行，我生成了 `web_demographics` 表中相应列的名称。（严格来说，我在这里并不真正需要使用 `lower` 函数，我只是为了在后续检查生成的代码时更易读。）


    由于如果维度表中的值不能正确反映 `web_demographics` 表中的列，可能会导致运行时错误，因此我将其包装在一个内联视图中，并连接到 `user_tab_columns`
