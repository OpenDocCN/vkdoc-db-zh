    你可以看到最后两行有正确的值 384 和 256，而不是 [Listing 4-2](#475066_1_En_4_Chapter.xhtml#PC3) 输出中的错误值
    24 和 16。


    但我对这个输出还有另一个问题——它包含了所有我不想要的中间行。递归子查询因子化没有内置的伪列 `connect_by_isleaf` 和运算符 `connect_by_root`，因此在
    [Listing 4-4](#475066_1_En_4_Chapter.xhtml#PC9) 中，我使用分析函数做了一个变通方案来查找叶节点。


    ## Listing 4-4

    ### 在递归子查询因子化中查找叶节点


    ```

    SQL> with recursive_pr (

    2     root_id, packaging_id, contains_id, qty, lvl

    3  ) as (

    4     select

    5        pr.packaging_id as root_id

    6      , pr.packaging_id

    7      , pr.contains_id

    8      , pr.qty

    9      , 1 as lvl

    10     from packaging_relations pr

    11     where pr.packaging_id not in (

    12        select c.contains_id from packaging_relations c

    13     )

    14     union all

    15     select

    16        rpr.root_id

    17      , pr.packaging_id

    18      , pr.contains_id

    19      , rpr.qty * pr.qty as qty

    20      , rpr.lvl + 1      as lvl

    21     from recursive_pr rpr

    22     join packaging_relations pr

    23        on pr.packaging_id = rpr.contains_id

    24  )

    25     search depth first by contains_id set rpr_order

    26  select

    27     p.id as p_id

    28   , p.name as p_name

    29   , c.id as c_id

    30   , c.name as c_name

    31   , leaf.qty

    32  from (

    33     select

    34        rpr.*

    35      , case

    36           when nvl(

    37                   lead(rpr.lvl) over (order by rpr.rpr_order)

    38                 , 0

    39                ) > rpr.lvl

    40           then 0

    41           else 1

    42        end as is_leaf

    43     from recursive_pr rpr

    44  ) leaf

    45  join packaging p

    46     on p.id = leaf.root_id

    47  join packaging c

    48     on c.id = leaf.contains_id

    49  where leaf.is_leaf = 1

    50  order by leaf.rpr_order;

    ```


    [Listing 4-4](#475066_1_En_4_Chapter.xhtml#PC9) 与 [Listing 4-3](#475066_1_En_4_Chapter.xhtml#PC7)
    相比，有趣的差异如下：


    我在递归中增加了一个额外的列 `root_id`。在第 5 行，我将其初始化为根节点的 `packaging_id`。然后在第 16 行，将相同的值复制到同一分支的所有子行。这会将
    `root_id` 传播到所有节点，是 `connect_by_root` 的替代方案。


    我在第 32–44 行创建了一个内联视图 `leaf`，其中使用第 35–42 行的计算创建了列 `is_leaf`。通过在第 37 行使用分析函数 `lead`，该计算简单地表明，如果分层顺序中下一行的
    `lvl` 大于当前的 `lvl`，则当前行有子节点，不是叶节点。


    我在第 49 行对计算出的 `is_leaf` 列进行了过滤，作为 `connect_by_isleaf` 的替代方案。


    在第 46 行，我确保在输出中，通过 `root_id` 而不是 `packaging_id` 进行连接，在 `p_id` 和 `p_name` 列中看到根节点。


    这总共给了我与 [Listing 4-2](#475066_1_En_4_Chapter.xhtml#PC3) 相同的七行，只是 `qty` 的值是正确的：


    ```

    P_ID  P_NAME         C_ID  C_NAME        QTY

    531   Pallet of L    502   Bottle 500cl  864

    532   Pallet of M    501   Bottle 330cl  720

    533   Pallet Mix MS  501   Bottle 330cl  360

    533   Pallet Mix MS  502   Bottle 500cl  600

    534   Pallet Mix SG  502   Bottle 500cl  600

    534   Pallet Mix SG  501   Bottle 330cl  384

    534   Pallet Mix SG  502   Bottle 500cl  256

    ```


    我几乎要完成了，但你会注意到输出的第 5 行和第 7 行都是 *Pallet Mix SG* 中包含的 *Bottle 500cl*——其中 600 个来自
    *Box Small*，256 个来自 *Gift Carton*/*Gift Box*。我实际上希望将其合并为单行，这在 [Listing 4-5](#475066_1_En_4_Chapter.xhtml#PC11)
    中处理。


    ## Listing 4-5

    ### 对包装组合进行分组汇总


    ```

