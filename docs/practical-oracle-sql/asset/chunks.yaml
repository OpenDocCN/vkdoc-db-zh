  trans: '## 用于排名的分析函数


    在 `清单 12-5` 中，我重写了 `清单 12-4`，只是在第 5 行使用了分析函数 `row_number` 来替代带有 `rownum` 的构造。由于分析函数不能在
    `where` 子句中使用，我仍然需要使用一个内联视图。


    ```sql

    SQL> select *

    2  from (

    3     select

    4        product_name, total_qty

    5      , row_number() over (order by total_qty desc) as ranking

    6     from total_sales

    7  )

    8  where ranking <= 3

    9  order by ranking;

    清单 12-5

    使用内联视图并过滤 row_number() 来获取前三名

    ```


    输出结果与我从 `清单 12-4` 得到的一样——我仍然在为我的前三名输出应用着“首行规则”：


    ```sql

    PRODUCT_NAME    TOTAL_QTY  RANKING

    Reindeer Fuel   1604       1

    Monks and Nuns  1485       2

    Ghost of Hops   1485       3

    ```


    但 `row_number` 并不是我可用于数据排名的唯一分析函数；我还有另外两个分析函数可供使用。`清单 12-6` 对比了这三个函数。


    ```sql

    SQL> select

    2     product_name, total_qty

    3   , row_number() over (order by total_qty desc) as rn

    4   , rank() over (order by total_qty desc) as rnk

    5   , dense_rank() over (order by total_qty desc) as dr

    6  from total_sales

    7  order by total_qty desc;

    清单 12-6

    三种分析排名函数的比较

    ```


    这三个函数直接对应于我提到的三种排名规则：


    *   `row_number` – 实现首行规则

    *   `rank` – 实现奥林匹克规则

    *   `dense_rank` – 实现顶尖值规则


    这可以从输出中看出：


    ```sql

    PRODUCT_NAME      TOTAL_QTY  RN  RNK  DR

    Reindeer Fuel     1604       1   1    1

    Ghost of Hops     1485       2   2    2

    Monks and Nuns    1485       3   2    2

    Der Helle Kumpel  1230       4   4    3

    Hercule Trippel   1056       5   5    4

    Summer in India   961        6   6    5

    Pale Rider Rides  883        7   7    6

    Coalminers Sweat  813        8   8    7

    Hazy Pink Cloud   324        9   9    8

    Hoppy Crude Oil   303        10  10   9

    ```


    当我使用 `row_number` 时，我得到的是连续的数字。


    当我使用 `rank` 时，一行可以遵循两种规则之一：如果它与前一行并列，它获得与前一行`相同的排名`；如果不是并列，它获得的排名与使用 `row_number`
    时`相同`。这使得它会以奥林匹克的方式“跳过”排名，就像这里我们有两个啤酒并列第二名，然后下一个是第四名。


    最后是 `dense_rank`，一行同样可以遵循两种规则：如果它与前一行并列，它获得与前一行`相同的排名`；但如果不是并列，该行获得的排名是前一行的排名`加一`。因此，排名不会跳过，而是为每个唯一值分配一个连续的排名，从而实现了顶尖值规则。


    掌握了这些不同的分析函数后，我可以轻松地在不同的排名规则之间切换。`清单 12-5` 给了我首行规则——我只需将第 5 行改为 `rank` 即可使用奥林匹克规则：


    ```sql

    5      , rank() over (order by total_qty desc) as ranking

    ```


    在这种情况下，输出仍然是那三款啤酒；唯一的区别是第二行和第三行都排名第二：


    ```sql

    PRODUCT_NAME    TOTAL_QTY  RANKING

    Reindeer Fuel   1604       1

    Ghost of Hops   1485       2

    Monks and Nuns  1485       2

    ```


    或者，我也可以将第 5 行改为 `dense_rank` 来使用顶尖值规则：


    ```sql

    5      , dense_rank() over (order by total_qty desc) as ranking

    ```


    这给了我一个有四行输出的前三名报告，因为有两行并列第二名：


    ```sql

    PRODUCT_NAME      TOTAL_QTY  RANKING

    Reindeer Fuel     1604       1

    Monks and Nuns    1485       2

    Ghost of Hops     1485       2

    Der Helle Kumpel  1230       3

    ```


    有了这三种分析函数，我可以用所有三种规则来回答 Top-N 问题，所以我很满意。唯一的小问题是我仍然需要编写内联视图并在外部查询中过滤行。我能否少写点代码？答案是肯定的。


    ## 仅获取首行


    在版本 12 中，`select` 语句引入了一种新语法——`行限制子句`。它也被称为 `fetch first`，因为如你在 `清单 12-7` 中看到的，使用的正是这种语法。


    ```sql

    SQL> select product_name, total_qty

    2  from total_sales

    3  order by total_qty desc

    4  fetch first 3 rows only;

    清单 12-7

    仅获取前三行

    ```


    使用这种语法，我跳过了内联视图；我只需在查询中使用合适的 `order by` 子句，并附加 `fetch first` 子句来声明我只需要前三行，然后我就能在输出中得到这些：


    ```sql

    PRODUCT_NAME    TOTAL_QTY

    Reindeer Fuel   1604

    Ghost of Hops   1485

    Monks and Nuns  1485

    ```


    使用 `rows only` 让我根据首行规则得到了结果。实际上，这仅仅是“语法糖”，使得编写这样的 Top-N 查询更容易、更简单，但在底层，数据库正在自动地将
    `清单 12-7` 重写为与带有 `row_number` 函数的内联视图（如 `清单 12-5`）执行相同的操作。这两个清单的工作和性能是相同的；区别仅在于
    `清单 12-7` 更短，更易于编写和阅读。


    行限制子句有另一个选项来替代 `rows only`——我可以选择 `rows with ties`：


    ```sql

    4  fetch first 3 rows with ties;

    ```


    其定义是，当获取了三行后，它会检查是否有更多具有相同值（并列）的行——如果有，那么这些行也会被输出。对于这里的数据，情况并非如此，所以我得到了相同的输出：


    ```sql

    PRODUCT_NAME    TOTAL_QTY

    Reindeer Fuel   1604

    Ghost of Hops   1485

    Monks and Nuns  1485

    ```


    `rows with ties` 定义中的规则在底层是通过带有 `rank` 函数调用的内联视图实现的，因为该规则与我展示过的奥林匹克规则相匹配——只是表述方式不同。


    但这与根据我之前展示的三种排名规则的分析函数处理并列的方式相比如何呢？我将通过一些年度销售数据的例子更深入地探讨一下并列处理。'
- fmt: '### Handling of ties


    In Listing [12-8](#475066_1_En_12_Chapter.xhtml#PC21), I am comparing the three
    analytic ranking functions for the sales of year 2018 (similar to how I compared
    them for total sales in Listing [12-6](#475066_1_En_12_Chapter.xhtml#PC11)). As
    I can show my point just with the first five rows instead of showing all ten beers,
    I use `fetch first` in line 9 just because it’s so easy that way to save paper
    in the book.


    ```sql

    SQL> select

    2     product_name, yr_qty

    3   , row_number() over (order by yr_qty desc) as rn

    4   , rank() over (order by yr_qty desc) as rnk

    5   , dense_rank() over (order by yr_qty desc) as dr

    6  from yearly_sales

    7  where yr = 2018

    8  order by yr_qty desc

    9  fetch first 5 rows only;

    Listing 12-8

    Comparison of analytic functions for 2018 sales

    ```


    In 2018 I have a tie for third place, as I can see here in the output:


    ```sql

    PRODUCT_NAME      YR_QTY  RN  RNK  DR

    Reindeer Fuel     691     1   1    1

    Pale Rider Rides  491     2   2    2

    Hercule Trippel   451     3   3    3

    Ghost of Hops     451     4   3    3

    Monks and Nuns    425     5   5    4

    ```


    So in Listing [12-9](#475066_1_En_12_Chapter.xhtml#PC23), I can use line 5 to
    apply the top-rows rule and get the first three rows as they are ranked by the
    `row_number` function (the `rn` column in the preceding output).


    ```sql

    SQL> select product_name, yr_qty

    2  from yearly_sales

    3  where yr = 2018

    4  order by yr_qty desc

    5  fetch first 3 rows only;

    Listing 12-9

    Fetching first three rows for 2018

    ```


    And yes, I get the desired three rows in the output:


    ```sql

    PRODUCT_NAME      YR_QTY

    Reindeer Fuel     691

    Pale Rider Rides  491

    Hercule Trippel   451

    ```


    But hang on – I could also get this output instead, since `Ghost of Hops` and
    `Hercule Trippel` both sold 451 in 2018:


    ```sql

    PRODUCT_NAME      YR_QTY

    Reindeer Fuel     691

    Pale Rider Rides  491

    Ghost of Hops     451

    ```


    The query in Listing [12-9](#475066_1_En_12_Chapter.xhtml#PC23) has an `indeterminate`
    output – which of these two outputs I get will in principle be random; in practice
    whether I get `Hercule Trippel` or `Ghost of Hops` in the third line depends on
    which of the two beers the database happens to find first in the order that it
    happens to access the data. That will be highly dependent on which access plan
    the optimizer chooses.


    The problem is not only when using `fetch first` with `rows only`, it applies
    equally when I myself use the `row_number` function. In the output from Listing
    [12-8](#475066_1_En_12_Chapter.xhtml#PC21), `Hercule Trippel` and `Ghost of Hops`
    might have swapped places – I cannot know.


    Typically business users dislike a report whose output “changes overnight” when
    supposed be identical, which might happen if, for example, statistics gathering
    made the optimizer choose a different access path the next day. In other words,
    users don’t like `indeterminate` output. A best practice when using `row_number`
    or `fetch first` with `rows only` can be to always make the order by deterministic
    by adding some tiebreaker rule, for example, stating that in case of ties always
    display the one with the first product id:


    ```sql

    order by yr_qty desc, product_id

    ```


    But I prefer instead to convince the business user that he really doesn’t want
    to use the first-rows rule; instead he most likely would like, for example, to
    use the Olympic rule, which I then can implement easily by using `with ties` instead
    of `rows only`:


    ```sql

    4  order by yr_qty desc

    5  fetch first 3 rows with ties;

    ```


    And then I get an `output` of four rows showing `both` `Hercule Trippel` and `Ghost
    of Hops`:


    ```sql

    PRODUCT_NAME      YR_QTY

    Reindeer Fuel     691

    Pale Rider Rides  491

    Hercule Trippel   451

    Ghost of Hops     451

    ```


    Now in that `output`, it is actually `indeterminate` in which `order` `Hercule
    Trippel` and `Ghost of Hops` are displayed. As I remarked before, users dislike
    that, so it can be tempting to “fix” this by making sure the `order by` is deterministic:


    ```sql

    4  order by yr_qty desc, product_id

    5  fetch first 3 rows with ties;

    ```


    But that would be a `wrong` approach, since when the `order by` is deterministic,
    there `are no ties` by definition, so the `output` then is `not` what I want:


    ```sql

    PRODUCT_NAME      YR_QTY

    Reindeer Fuel     691

    Pale Rider Rides  491

    Hercule Trippel   451

    ```


    When I want ties to be displayed in my `output`, I’ll have to live with a nondeterministic
    `output` when I use `fetch first`. If I cannot live with that, I’ll have to code
    the inline view with the `rank` function manually, since that gives me higher
    control and enables me to use the `nondeterministic` `order by` in the analytic
    function call and a `deterministic` `order by` in the outer query.


    ### What the row limiting clause cannot do


    So `with ties` in the `fetch first` row limiting clause handles ties like if I
    use analytic function `rank`. But let me change Listing [12-8](#475066_1_En_12_Chapter.xhtml#PC21)
    to show the year 2017 instead of 2018:


    ```sql

    7  where yr = 2017

    ```


    This time I have a tie for first place:


    ```sql

    PRODUCT_NAME      YR_QTY  RN  RNK  DR

    Monks and Nuns    582     1   1    1

    Reindeer Fuel     582     2   1    1

    Ghost of Hops     482     3   3    2

    Der Helle Kumpel  458     4   4    3

    Hercule Trippel   344     5   5    4

    ```


    Let me try to use `fetch first with ties` for 2017 in Listing [12-10](#475066_1_En_12_Chapter.xhtml#PC33).


    ```sql

    SQL> select product_name, yr_qty

    2  from yearly_sales

    3  where yr = 2017

    4  order by yr_qty desc

    5  fetch first 3 rows with ties;

    Listing 12-10

    Fetching with ties for 2017

    ```


    I get those rows where column `RNK` is `<= 3`:


    ```sql

    PRODUCT_NAME    YR_QTY

    Monks and Nuns  582

    Reindeer Fuel   582

    Ghost of Hops   482

    ```


    In other words this is like the Olympic rule for handling ties. If I want to use
    the first-values rule to get all rows that have the Top-3 values, I can `not`
    do it with the row limiting clause. There simply does not exist syntax like:


    ```sql

    fetch first 3 values with ties;  /* <-- Invalid syntax */

    ```


    Instead I need to manually create my inline view and use `dense_rank` as shown
    in Listing [12-11](#475066_1_En_12_Chapter.xhtml#PC36).


    ```sql

    SQL> select *

    2  from (

    3     select

    4        product_name, yr_qty

    5      , dense_rank() over (order by yr_qty desc) as ranking

    6     from yearly_sales

    7     where yr = 2017

    8  )

    9  where ranking <= 3

    10  order by ranking;

    Listing 12-11

    Using dense_rank for what fetch first cannot do

    ```


    Now I’m getting the four rows from 2017 that have the Top-3 values:


    ```sql

    PRODUCT_NAME      YR_QTY  RANKING

    Monks and Nuns    582     1

    Reindeer Fuel     582     1

    Ghost of Hops     482     2

    Der Helle Kumpel  458     3

    ```


    The row limiting clause is a very handy shortcut for Top-N queries, but it can
    only do the top-rows or Olympic rule, internally implementing it like an inline
    view with `row_number` or `rank` analytic functions. If you want top-values rule,
    you do it yourself with `dense_rank`.'
