    ## Fiddling with the output


    Having examined the detailed output, I’ll return to the `one row per match` version
    to fiddle a bit more and show you a couple of things.


    First, I’d like to make it clear that although Listing 22-3 with `one row per
    match` only has a single aggregate measure, and so far I’ve only shown multiple
    aggregate measures in Listing 22-4 using `all rows per match`, it is perfectly
    legitimate to use multiple aggregates or uses of functions like `first` and `last`
    together with `one row`. Take a look at Listing 22-6.


    ```

    SQL> with hierarchy as (

    ...

    12  )

    13  select

    14     lpad('' '', (lvl-1)*2) || name as name

    15   , subs

    16   , hifrom

    17   , hito

    18   , himax

    19  from hierarchy

    20  match_recognize (

    21     order by rn

    22     measures

    23        strt.rn            as rn

    24      , strt.lvl           as lvl

    25      , strt.name          as name

    26      , count(higher.lvl)  as subs

    27      , first(higher.name) as hifrom

    28      , last(higher.name)  as hito

    29      , max(higher.lvl)    as himax

    30     one row per match

    31     after match skip to next row

    32     pattern (

    33        strt higher*

    34     )

    35     define

    36        higher as higher.lvl > strt.lvl

    37  )

    38  order by rn;

    ```

    Listing 22-6

    Adding multiple measures when doing one row per match


    In lines 26–29, I am using both navigational functions and aggregates. Remember
    that when I use `one row per match`, it makes no difference if I use `running`
    or `final` for the aggregates, so even if I didn’t specify `final`, I get the
    same result:


    ```

    NAME                SUBS  HIFROM         HITO          HIMAX

    Harold King         13    Axel de Proef  Zoe Thorston  4

    Axel de Proef     4     Jim Kronzki    Maria Juarez  4

    Jim Kronzki     2     Laura Jensen   Simon Chang   4

    Laura Jensen  0

    Simon Chang   0

    Maria Juarez    0

    Ursula Mwbesi     7     Lim Tok Lo     Zoe Thorston  4

    Lim Tok Lo      3     Evelyn Smith   Susanne Hoff  4

    Evelyn Smith  0

    Kurt Zollman  0

    Susanne Hoff  0

    Mogens Juel     2     Dan Hoeffler   Zoe Thorston  4

    Dan Hoeffler  0

    Zoe Thorston  0

    ```


    So my first point was the use of multiple measures for whatever output I want
    in the various columns. Can I fiddle with the rows in the output as well? Say,
    for example, I want to output only those employees that actually have subordinates
    (or in other words are not leaf nodes in the tree).


    Sure, I could put the entire query in an inline view and then use a `where` clause
    to filter on `subs > 0` and that way not get any leaf nodes in the output. It
    would work fine, but my second point to show you is a better alternative that
    filters away the non-leaf nodes earlier in the processing.


    In Listing 22-3 line 29, I’m using a pattern of `strt higher*` which is a pattern
    that by design will be matched by *any* row that will be classified `strt` – it
    is just a question of how many `higher` rows will follow after that `strt` row.
    So Listing 22-3 will by the nature of the pattern output all rows of the table.


    Let me in Listing 22-7 change just one character – otherwise, it is identical
    to Listing 22-3.


    ```

    ...

    29        strt higher+

    ...

    ```

    Listing 22-7

    Filtering matches with the pattern definition


    I have changed `*` to `+` which means that any given `strt` row will *only* cause
    a match if it is followed by at least one `higher` row. So the leaf nodes, which
    are *not* followed by any `higher` row, will not cause a match – instead the database
    simply moves one row along and checks if it can find a match using the next row
    as `strt` row. This leads to only supervisors being output:


    ```

    ID   NAME             SUBS

    142  Harold King      13

    144    Axel de Proef  4

    151      Jim Kronzki  2

    147    Ursula Mwbesi  7

    146      Lim Tok Lo   3

    143      Mogens Juel  2

    ```


    Doing it this way allows the database to discard the unwanted rows immediately
    as it works its way through the pattern matching process – rather than the inline
    view that lets the database build a result set of all rows and then afterward
    removes the unwanted ones again.


    ## Lessons learned


    In this chapter I’ve demonstrated that with a suitable ordering, the `after match
    skip to next row` clause can very efficiently allow `match_recognize` to process
    the same rows multiple times in different groupings without accessing them in
    the table multiple times. In the demos I covered:


    *   Preparing the source query by creating an ordering column that allows `match_recognize`
    to work in the hierarchical order

    *   Setting a `pattern` that for each row finds the group of rows that are in
    the subtree below

    *   Using `after match skip to next row` to use the pattern search on every row,
    even if it was included in previous matches

    *   Changing the `pattern` to ignore those rows not having a subtree below


    These methods you can use on any hierarchical data. They can also be useful on
    other data with an ordering that is nontrivial, where you can set up a more complex
    query to prepare the data and preserve the ordering, before you process the data
    with `match_recognize`.'
