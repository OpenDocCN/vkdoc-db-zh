  trans: '# 线性回归


    正如你现在可能已经猜到的，在清单 15-6 中，我将之前的计算放入了 `with` 子句 `s4`，并继续执行线性回归分析。


    ```sql

    SQL> with s1 as (

    ...     /* 清单 15-2 去掉 order by */

    23  ), s2 as (

    ...     /* 清单 15-3 最终查询去掉 order by */

    41  ), s3 as (

    ...     /* 清单 15-4 最终查询去掉 order by */

    53  ), s4 as (

    ...     /* 清单 15-5 最终查询去掉 order by */

    65  )

    66  select

    67     product_id, mth, ts, yr, mthno, qty, cma, s, des

    68   , regr_intercept(des, ts) over (

    69        partition by product_id

    70     ) + ts * regr_slope(des, ts) over (

    71                 partition by product_id

    72              ) as t -- 趋势线

    73  from s4

    74  order by product_id, mth;

    清单 15-6

    计算趋势线

    ```


    我在这里使用了两个分析线性回归函数，每个函数都按产品分区：


    *   这两个函数都接受两个参数，第一个是图表的 `y` 坐标，第二个是 `x` 坐标。在我的例子中，`des`（去季节化）值是 y 坐标，而 `ts`（时间序列）是
    x 坐标。我不能直接使用月份；它必须是数字数据类型，所以单位为 1 个月的 `ts` 是完美的选择。


    *   第 68-70 行使用了 `regr_intercept`，它给出了 y 轴与插值直线之间的*截距点*。换句话说，就是 x = 0 时的 y 值。


    *   第 70-72 行使用了 `regr_slope`，它给出了插值直线的*斜率*。斜率表示当 x 值增加 1 时，y 值增加（如果为负数则为减少）的量。由于我的
    x 轴单位是 1 个月，因此斜率就是图表每月上升（或下降）的量。


    *   因此，第 68-72 行总共计算了 x = 0 时的 y 值 (`regr_intercept`)，并且对于每个月，加上月份数 (`ts`) 乘以每月上升（或下降）的量
    (`regr_slope`)。


    绘制在图表 15-5 上，我现在得到了一条在所有 48 个月都有值的直线趋势线 `t`。


    ![../images/475066_1_En_15_Chapter/475066_1_En_15_Fig5_HTML.jpg](img/475066_1_En_15_Fig5_HTML.jpg)


    图 15-5

    通过线性回归得到的驯鹿燃料趋势线


    我把目前的计算结果塞进清单 15-7 的 `with` 子句 `s5` 中，现在可以进行预测的最后一步了。


    ```sql

    SQL> with s1 as (

    ...     /* 清单 15-2 去掉 order by */

    23  ), s2 as (

    ...     /* 清单 15-3 最终查询去掉 order by */

    41  ), s3 as (

    ...     /* 清单 15-4 最终查询去掉 order by */

    53  ), s4 as (

    ...     /* 清单 15-5 最终查询去掉 order by */

    65  ), s5 as (

    ...     /* 清单 15-6 最终查询去掉 order by */

    74  )

    75  select

    76     product_id, mth, ts, yr, mthno, qty, cma, s, des

    77   , t * s as forecast -- 重新季节化

    78  from s5

    79  order by product_id, mth;

    清单 15-7

    将趋势线重新季节化 ➤ 预测

    ```


    这非常简单——在第 77 行，我通过将趋势线 `t` 乘以季节性因子 `s` 来*重新季节化*趋势线。


    请记住，季节性因子值在包括 2019 年在内的所有年份的所有行中都是可用的，尽管我们没有 2019 年的销售数据，但希望对其进行预测。由于趋势线在 2019
    年的行中也存在，我可以将 `forecast` 值绘制到图表 15-6 中。


    ![../images/475066_1_En_15_Chapter/475066_1_En_15_Fig6_HTML.jpg](img/475066_1_En_15_Fig6_HTML.jpg)


    图 15-6

    驯鹿燃料的重新季节化预测


    将 `qty`（实际值）和 `forecast`（预测值）绘制在同一张图中，使我能够直观地检查模型是否与数据拟合得相当好。在 2016-2018 年期间，两条线匹配得越接近，我就越能信任
    2019 年的预测。在这个案例中，看起来拟合得相当不错。


    ## 最终预测


    在确认模型看起来与我的数据拟合良好之后，我打算稍微清理一下，不再检索包含所有中间计算结果的列，而是在清单 15-8 中，只获取向用户展示实际和预测销售量的相关信息。


    ```sql

    SQL> with s1 as (

    ...     /* 清单 15-2 去掉 order by */

    23  ), s2 as (

    ...     /* 清单 15-3 最终查询去掉 order by */

    41  ), s3 as (

    ...     /* 清单 15-4 最终查询去掉 order by */

    53  ), s4 as (

    ...     /* 清单 15-5 最终查询去掉 order by */

    65  ), s5 as (

    ...     /* 清单 15-6 最终查询去掉 order by */

    74  )

    75  select

    76     product_id

    77   , mth

    78   , case

    79        when ts <= 36 then qty

    80        else round(t * s)

    81     end as qty

    82   , case

    83        when ts <= 36 then ''Actual''

    84        else ''Forecast''

    85     end as type

    86  from s5

    87  order by product_id, mth;

    清单 15-8

    选择实际值和预测值

    ```


    我只是选择产品和月份，然后使用两次 `case` 结构，分别给出一个 `qty` 列和一个 `type` 列：


    *   第 78-81 行为前 36 个月提供实际销售量，为后 12 个月提供预测（重新季节化的趋势）值。由于我不能销售小数瓶的啤酒，我将预测值四舍五入为整数。


    *   第 82-85 行用 `Actual` 填充前 36 个月的 `type` 列，用 `Forecast` 填充后 12 个月，以便区分 `qty`
    列的内容代表什么。


    这样，我生成了一个更简洁的输出：


    ```sql

    PROD MTH      QTY TYPE

    ---- ------- ---- --------

    4160 2016-01   79 Actual

    4160 2016-02  133 Actual

    ...

    4160 2018-11   73 Actual

    4160 2018-12  160 Actual

    4160 2019-01  222 Forecast

    4160 2019-02  325 Forecast

    ...

    4160 2019-11   26 Forecast

    4160 2019-12  191 Forecast

    7790 2016-01    4 Actual

    7790 2016-02    6 Actual

    ...

    7790 2018-11    3 Actual

    7790 2018-12    5 Actual

    7790 2019-01    1 Forecast

    7790 2019-02    7 Forecast

    ...

    7790 2019-11    3 Forecast

    7790 2019-12    3 Forecast

    已选择 96 行。

    ```


    在图表 15-7 中，我将这些数据绘制到图表中，展示了两种啤酒的结果（与我在图表 15-2 中展示的相同，只是现在加上了预测值）。


    ![../images/475066_1_En_15_Chapter/475066_1_En_15_Fig7_HTML.jpg](img/475066_1_En_15_Fig7_HTML.jpg)


    图 15-7

    2016-2018 年月度销售额及 2019 年预测


    对于驯鹿燃料啤酒，我在前面几页已经展示了所有细节，这里我只显示实际销售额和 2019 年的预测值。但即使在这个图表中没有这些细节，你仍然可以直观地看到这是一种在冬季销售良好的啤酒，每年的销量都略有增加，2019
    年的预测图与其他年份的形状相匹配，只是略高一些。


    另一种啤酒，印度之夏，在夏季销售良好，每年的销量略有下降，2019 年的预测形状与其他年份相似，只是略低一些。


    总而言之，对于这两种啤酒，这个预测模型看起来相当不错；而且完全使用 SQL 和分析函数开发，它的性能确实相当好。在我本章开头提到的工作中，我通过使用 `insert
    into…select…` 将 120 万行数据插入到预测表中，在 1.5 分钟内预测了 10 万种产品。


    其他季节性变化特征不太好的产品可能不太适合这个预测模型。这时候你可能需要统计工具，而不是纯粹的 SQL，来发现哪些预测模型最适合哪些产品（或者你正在预测的任何东西）。


    不过，在探索阶段使用这些工具仍然是一个不错的选择，一旦你将产品归类为少数几种不同的模型，也许使用 SQL 的强大功能来实现这几种模型，仍然可以高效地处理大量数据，而无需将它们从数据库中提取出来。'
- fmt: '### Lessons learned


    Forecasting is a science, and one small chapter in a book on SQL will not make
    you a forecasting expert, but even with such a small appetizer on the forecasting
    topic, I’ve shown you some things about


    *   Chaining calculations in multiple `with` clauses as an alternative to nested
    inline views


    *   Building time series data with consecutive rows one time unit apart


    *   Averaging with moving windows and averaging the same period across different
    years


    *   Calculating linear regression with `regr_intercept` and `regr_slope`


    *   Combining these techniques to implement a forecasting model in SQL


    Though this chapter has shown just a single forecasting model, this should help
    you implement other similar time series–based regressions in SQL, if you have
    the formulas and you have the need for speed and efficiency higher than many external
    forecasting tools can offer.


    # 16. Rolling Sums to Forecast Reaching Minimums


    If you have a steady consumption rate, it is easy to forecast how far you can
    go with that rate – for example, if you know your car on average drives 20 kilometers
    per liter fuel and it has 30 liters left in the tank, you can simply multiply
    to know that you can drive 600 kilometers before you run out of fuel.


    But if the consumption is not steady, you need something else. If the Good Beer
    Trading Co sells a particular seasonal Christmas beer, it is not simply a steady
    100 beers sold per month – June will sell very few of those beers, while December
    sells hundreds. For such a case, you estimate (perhaps using the techniques of
    the previous chapter) what you think you are going to sell and store it as a *forecast*
    or sales budget.


    Once you have forecast you are going to sell 150 in January, 100 in February,
    250 in March, and so on, you need to figure out that the 400 you have in stock
    in your inventory will dwindle to 250 by the end of January and to 150 by the
    end of February and be sold out a little later than the middle of March. Figuring
    this out is the topic of this chapter.


    ## Inventory, budget, and order


    In the Good Beer Trading Co example, I’m going to demonstrate the case of forecasting
    when the inventory reaches zero (or a minimum) given that I know how many beers
    are in order (waiting to be picked from the inventory) and how many beers are
    budgeted to be sold (assumed to be picked at some point).


    I’ll use `month` as the time granularity, budgeting sales quantities per month.
    For this demonstration purpose, I don’t need to go to weekly or daily data, but
    you can easily adapt the methods to finer time granularity if you need it. I will
    use the data in the tables shown in Figure 16-1.


    ![../images/475066_1_En_16_Chapter/475066_1_En_16_Fig1_HTML.jpg](images/475066_1_En_16_Chapter/475066_1_En_16_Fig1_HTML.jpg)


    Figure 16-1


    The tables used in the examples of this chapter


    From table `inventory`, I know what quantity of each beer is in stock, table `monthly_budget`
    shows me the quantity each beer is expected to sell per month, and how much has
    been ordered (but *not yet* picked and therefore not yet taken from the stock)
    is in table `orderlines`. Table `product_minimums` I’ll get back to later in the
    chapter.


    You’ll notice the `inventory` table contains quantities per location (I used the
    table in the FIFO picking in Chapter 13), but for this purpose, I just need the
    total quantity in stock per beer. To make that easier, I create the view `inventory_totals`
    in Listing 16-1 aggregating the inventory per beer.


    ```sql

    SQL> create or replace view inventory_totals

    2  as

    3  select

    4     i.product_id

    5   , sum(i.qty) as qty

    6  from inventory i

    7  group by i.product_id;

    View INVENTORY_TOTALS created.

    ```

    Listing 16-1

    View of total inventory per product


    Similarly for the quantities in order, I do not need specific orderlines. I just
    need how many of each beer each month, so I aggregate those figures in view `monthly_orders`
    in Listing 16-2.


    ```sql

    SQL> create or replace view monthly_orders

    2  as

    3  select

    4     ol.product_id

    5   , trunc(o.ordered, ''MM'') as mth

    6   , sum(ol.qty) as qty

    7  from orders o

    8  join orderlines ol

    9     on ol.order_id = o.id

    10  group by ol.product_id, trunc(o.ordered, ''MM'');

    View MONTHLY_ORDERS created.

    ```

    Listing 16-2

    View of monthly order totals per product


    Those are the tables and views I’m going to be using; now I’ll show the data in
    them.


    ### The data


    I’ll use two beers for the examples of this chapter: `Der Helle Kumpel` and `Hazy
    Pink Cloud`. They have the total inventory shown in Listing 16-3.


    ```sql

    SQL> select it.product_id, p.name, it.qty

    2  from inventory_totals it

    3  join products p

    4     on p.id = it.product_id

    5  where product_id in (6520, 6600)

    6  order by product_id;

    PRODUCT_ID  NAME              QTY

    6520        Der Helle Kumpel  400

    6600        Hazy Pink Cloud   100

    ```

    Listing 16-3

    The inventory totals for two products


    This is totals in stock as of January 1, 2019. Then I have a monthly sales budget
    for the year 2019 (Listing 16-4).


    ```sql

    SQL> select mb.product_id, mb.mth, mb.qty

    2  from monthly_budget mb

    3  where mb.product_id in (6520, 6600)

    4  and mb.mth >= date ''2019-01-01''

    5  order by mb.product_id, mb.mth;

    PRODUCT_ID  MTH         QTY

    6520        2019-01-01  45

    6520        2019-02-01  45

    6520        2019-03-01  50

    ...

    6520        2019-10-01  50

    6520        2019-11-01  40

    6520        2019-12-01  40

    6600        2019-01-01  20

    6600        2019-02-01  20

    6600        2019-03-01  20

    ...

    6600        2019-10-01  20

    6600        2019-11-01  20

    6600        2019-12-01  20

    24 rows selected.

    ```

    Listing 16-4

    The 2019 monthly budget for the two beers


    Product `6520` is expected to sell a bit more in the summer months, while product
    `6600` is expected to sell a steady 20 per month.


    But I don’t just have the expected quantities; I also have in Listing 16-5 the
    quantities that have already been ordered in the first months of 2019.


    ```sql

    SQL> select mo.product_id, mo.mth, mo.qty

    2  from monthly_orders mo

    3  where mo.product_id in (6520, 6600)

    4  order by mo.product_id, mo.mth;

    PRODUCT_ID  MTH         QTY

    6520        2019-01-01  260

    6520        2019-02-01  40

    6600        2019-01-01  16

    6600        2019-02-01  40

    ```

    Listing 16-5

    The current monthly order quantities


    The thing to note here is that in January, product `6520` has been ordered much
    more than what was expected.


    Given these data, I’ll now make some SQL to find out when we run out of beers
    for those two products.'
