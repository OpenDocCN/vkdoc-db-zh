    你会去哪里学习 SQL？


    嗯，如果我问自己同样的问题，答案当然是我在很多地方学习 SQL：Tom Kyte 等人的书籍、SQL 参考手册（我每天都在用）、有经验开发者的会议演讲、博客、谷歌搜索，等等。但即使所有这些，如果我不同时自己动手写
    SQL，看看哪里出错了，然后一遍又一遍地尝试，也是无济于事的。


    我在学习过程中注意到的一件事是，几乎所有的教学示例都是简短精炼以便于理解。这本身很好，但有时也意味着它更难与日常工作联系起来。


    我曾有幸在一家零售公司工作了 16 年，那里的理念是**从不因软件功能而改变业务实践，而是始终定制软件，使日常业务运作得更智能、更顺畅**。我们总是秉持“当然有办法解决，我们只需要弄清楚怎么做”的态度。在这种氛围下，我有大量实际的任务可以练习，尝试编写
    SQL，并一部分一部分地修改，直到找到解决手头任务的方案。


    当我展示那些在那些年间开发的一些解决方案时，曾多次有听众在会后找到我，告诉我他们突然“豁然开朗”，明白了分析函数如何能在他们的工作中提供帮助。在那之前，他们只是认为这是一种聪明而花哨的
    SQL 扩展，但无法将其与自己需要解决的任务联系起来。


    在本书中，我将解释一系列任务，使用 SQL 解决它们，并逐步讲解我如何创建这些 SQL，从简单开始并逐步构建，直到形成一个无法放在单张 PowerPoint
    幻灯片上的有效语句。我在此演示的语句并非简单示例——它们看起来更像是你在工作中可能需要自己开发的东西。


    如果你最终形成了“**当然可以用 SQL 解决**”的态度，你的老板会很高兴，因为你的代码使用了更少的 CPU，从而节省了大量的云资源费用。你也会很高兴，因为真正动脑筋找到一个好的解决方案要有趣得多。


    而我也将很高兴，并可以说：“任务完成！”


    ## 本书内容


    这不是一本`SQL 入门 101`书籍。这里不涵盖查询和连接的最简单基础——我假设你至少已经具备查询一两个表的基本知识。


    它也不是一本`SQL 权威参考指南`。我并不试图详尽地涵盖每一个语法细节——甚至不包括我在本书中`确实`会讲到的那些语句和函数。


    相反，`实用 Oracle SQL`是一本通过示例展示如何使用比 SQL-92 标准更复杂一点的 SQL 来解决大量不同任务的书籍。每一章解决一个不同的任务，因此这些章节不一定需要按顺序阅读。


    一个章节会解释任务；展示涉及的表、数据和其他对象；然后逐步讲解解决方案的开发过程。这通常包括从简单到复杂逐步构建 SQL。在逐步讲解 SQL 的过程中，会解释语法，并在相关时给出替代方案或注意事项的示例。


    除一章（第 6 章）外，所有章节的目标都是一个与真实应用开发相关的任务。具体的示例是从一个虚构的啤酒批发公司的视角展示的，但这些技术可以应用于许多其他应用。根据解决任务所使用的
    SQL 技术，章节被分为三个部分。


    ### 第 1 部分：核心 SQL


    前十章涉及使用各种 SQL 结构的解决方案。所有不属于第 2 部分和第 3 部分的内容都在此部分。


    这些章节涵盖了许多技术：内联视图关联、集合操作、WITH 子句和 WITH 子句函数、递归子查询因式分解和 MODEL 子句迭代、行列转换（透视和逆透视），以及拆分和创建分隔文本。


    ### 第 2 部分：分析函数


    分析函数是我自从开始使用 Oracle SQL 以来最喜欢的特性。我在某个会议演讲中看到过一句话（来源未知）：“如果你在简历上说你懂 SQL，但你不使用分析函数，那你就是在撒谎。”我非常讨厌在没有分析函数的情况下去解决
    SQL 任务，因此第 2 部分的六章专门致力于使用分析函数的解决方案。


    重点是演示可以极其高效解决的实际任务，逐步讲解如何使用分析函数处理诸如 Top-N 问题、带滚动总和的仓库拣货、分析活动日志以及两种类型的预测等任务。


    ### 第 3 部分：行模式匹配


    当需要跨越行边界的 SQL 时，自从 8i 版本以来，我的首选解决方案一直是分析函数。从 12.2 版本开始，`MATCH_RECOGNIZE` 被添加到我的工具箱中，用于那些即使使用
    SQL 中的分析函数也会变得过于复杂的场景。第 3 部分的六章既展示了使用 `MATCH_RECOGNIZE` 进行其设计初衷的行模式匹配，也展示了将其用于那些乍看之下似乎并非
    `MATCH_RECOGNIZE` 用例的任务。


    涵盖的任务包括：查找上升-下降模式、分组合并连续数据、合并日期范围、寻找异常峰值、装箱拟合以及树分支计算。

