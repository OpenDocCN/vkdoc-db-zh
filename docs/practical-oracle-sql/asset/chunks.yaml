    by reproduction.


    So in order to find out which cells will be alive in the next generation, you
    count the number of live neighbors for each cell in this generation and apply
    the rules. Neighbors are defined as the eight cells that surround a cell (one
    cell away horizontally, vertically, or diagonally).


    Most often you see the Game of Life implemented iteratively in a procedural language –
    I am going to show you how to do it in a single SQL statement with the `model`
    clause.


    Note


    You can find a fuller explanation of the Game of Life on Wikipedia: [`https://en.wikipedia.org/wiki/Conway%27s_Game_of_Life`](https://en.wikipedia.org/wiki/Conway%2527s_Game_of_Life).'
  trans: '## 经验教训


    尽管本书的主题并非 PL/SQL 本身，但能够比以往更紧密地将 PL/SQL 集成到 SQL 中，是作为 SQL 开发人员的你应当了解的一项功能。以本章为例，你现在应该：


    *   思考某个函数是否主要从 SQL 中使用，从而可能受益于在其定义中添加 `PRAGMA UDF`。

    *   了解如何在 SQL 语句的 `with` 子句中嵌入“一次性”函数。

    *   考虑某些非常具体的功能，是将其封装在使用 `with` 子句函数的视图中，还是使用普通的存储函数更好。


    对于日常的大部分开发工作，你可能主要需要考虑 `PRAGMA UDF`，但在无法安装存储过程和函数的情况下，`with` 子句技术可能非常有用。


    ## 6. 使用多维数据进行迭代计算


    除了我在第 4 章展示的递归和迭代之外，你不会找到太多使用 `model` 子句的真实示例。递归子查询因子化在版本 11 中引入，但从版本 10 开始，你就可以使用
    `model` 子句进行递归。然而，`model` 子句的真正强大之处在于，它能够以类似数组的方式处理多维数据，构建类似于电子表格工作方式的公式。


    Oracle 中的嵌套表类型是单维的（索引），其“单元格”可以是标量或结构化类型。如果你有多维数据，你可以嵌套嵌套表类型，或者使用纯 SQL——对于某些类型的计算，这两种方法都可能变得非常复杂。在
    `model` 子句中，你某种意义上是在处理可以具有多个维度，并且每个单元格可以包含多个度量值（值）的数组，并且你拥有一套非常紧凑的语法来寻址多个单元格。


    `model` 子句并非实现所有功能的显而易见的选择，但我会展示一个非常适合且同时使用多维度和迭代的例子。这个例子本身可能不是最有用的，但它很好地展示了你可以考虑使用
    `model` 子句的情况。


    ## 康威的生命游戏


    1970 年，英国数学家约翰·霍顿·康威设计了生命游戏（也常简称为“生命”）。它模拟一个二维网格中的细胞，根据网格中的拥挤程度，模仿细胞如何世代生存与死亡。你可以在图
    6-1 中看到细胞在网格中的增殖情况。


    ![../images/475066_1_En_6_Chapter/475066_1_En_6_Fig1_HTML.jpg](img/475066_1_En_6_Fig1_HTML.jpg)

    *图 6-1：康威的生命游戏是关于网格中细胞生死的问题*


    其思路是从一组“活”细胞（被活细胞生物占据的网格单元）开始，然后观察种群如何随时间推移，一代一代地演化。


    演化遵循以下规则：


    *   任何活细胞，如果其活邻居少于两个，则死亡，如同因人口过少而死。

    *   任何活细胞，如果其活邻居有两个或三个，则存活到下一代。

    *   任何活细胞，如果其活邻居超过三个，则死亡，如同因人口过剩而死。

    *   任何死细胞，如果其活邻居恰好有三个，则变成活细胞，如同通过繁殖产生。


    因此，为了找出下一代中哪些细胞将存活，你需要计算这一代中每个细胞的活邻居数量，并应用这些规则。邻居定义为围绕一个细胞的八个细胞（水平、垂直或对角线方向，相隔一个细胞）。


    最常见的情况是，你会看到生命游戏在过程式语言中通过迭代实现——我将向你展示如何用一条包含 `model` 子句的 SQL 语句来实现它。


    > **注意**

    >

    > 你可以在维基百科上找到关于生命游戏的更详细解释：[`en.wikipedia.org/wiki/Conway%27s_Game_of_Life`](https://en.wikipedia.org/wiki/Conway%2527s_Game_of_Life)。'
- fmt: '## Live neighbor count with the model clause


    I have created a table `conway_gen_zero` for holding all cells in the grid and
    whether they contain a live cell or not in generation zero. Figure 6-2 shows it
    has `x` and `y` columns for each grid position and column `alive` that contains
    1 for a live cell and 0 for a dead (empty) cell.


    ![../images/475066_1_En_6_Chapter/475066_1_En_6_Fig2_HTML.jpg](images/475066_1_En_6_Chapter/475066_1_En_6_Fig2_HTML.jpg)

    Figure 6-2: Table for the grid content of generation zero


    To begin with, in Listing 6-1, I populate this table with a 10x10 grid, where
    the middle of the grid has some live cells in the pattern shown in Figure 6-1.


    ```

    SQL> insert into conway_gen_zero (x, y, alive)

    2  select * from (

    3     with numbers as (

    4        select level as n from dual

    5        connect by level <= 10

    6     ), grid as (

    7        select

    8           x.n as x

    9         , y.n as y

    10        from numbers x

    11        cross join numbers y

    12     ), start_cells as (

    13        select  4 x,  4 y from dual union all

    14        select  5 x,  4 y from dual union all

    15        select  4 x,  5 y from dual union all

    16        select  6 x,  6 y from dual union all

    17        select  7 x,  6 y from dual union all

    18        select  4 x,  7 y from dual union all

    19        select  5 x,  7 y from dual union all

    20        select  6 x,  7 y from dual

    21     )

    22     select

    23        g.x

    24      , g.y

    25      , nvl2(sc.x, 1, 0) as alive

    26     from grid g

    27     left outer join start_cells sc

    28        on  sc.x = g.x

    29        and sc.y = g.y

    30  );

    100 rows inserted.

    Listing 6-1: Creating a 10x10 generation zero population

    ```


    I use the techniques of Chapter 3 to make this query in several `with` clauses:


    *   `numbers` in lines 4–5 simply gives me ten rows numbered 1–10.

    *   `grid` in lines 7–11 makes a Cartesian join using `numbers` twice to generate
    100 rows with all the (x, y) combinations of a 10x10 grid.

    *   `start_cells` in lines 13–20 generates eight rows with the (x, y) coordinates
    of those cells that are alive in generation zero (the starting population).

    *   In lines 22–29, the `grid` is left joined to `start_cells`, so the result
    is the 100 rows of the `grid` with line 25 calculating a 1 (alive) if the cell
    exists in `start_cells` and otherwise 0 (dead).


    My generation zero population is ready, and in Listing 6-2, I display the population
    using X for a live cell and space for an empty cell, so you can visually see that
    this is the cell pattern of Figure 6-1.


    ```

    SQL> select

    2     listagg(

    3        case alive

    4           when 1 then ''X''

    5           when 0 then '' ''

    6        end

    7     ) within group (

    8        order by x

    9     ) as cells

    10  from conway_gen_zero

    11  group by y

    12  order by y;

    Listing 6-2: Vizualizing generation zero

    ```


    The `listagg` in lines 2–9 (read more about it in Chapter 10) aggregates a string
    containing Xs and spaces in order of column `x` for each column `y` giving this
    output:


    ```

    CELLS


    XX

    X

    XX

    XXX

    ```


    Generation zero looks good, so it’s time to play around with the `model` clause
    in Listing 6-3 to calculate how many live neighbors each cell has.


    ```

    SQL> select *

    2  from conway_gen_zero

    3  model

    4  dimension by (

    5     x, y

    6  )

    7  measures (

    8     alive

    9   , 0 as sum_alive

    10   , 0 as nb_alive

    11  )

    12  ignore nav

    13  rules

    14  (

    15     sum_alive[any, any] =

    16        sum(alive)[

    17           x between cv() - 1 and cv() + 1

    18         , y between cv() - 1 and cv() + 1

    19        ]

    20   , nb_alive[any, any] =

    21        sum_alive[cv(), cv()] - alive[cv(), cv()]

    22  )

    23  order by x, y;

    Listing 6-3: Live neighbor calculation with the model clause

    ```


    The model clause is built in a set of subclauses:


    *   `dimension by` in lines 4–6 states which columns to use as dimensions – or
    if you wish, indexes in a multidimensional array.

    *   `measures` in lines 7–11 are the attributes of each cell in the array. Here
    I am creating three measures – one is simply the column `alive`; the two others
    do not exist in the table but are initialized to zero.

    *   Then there can be various options of the `model` clause – in line 12, I’m
    using `ignore nav`, which simply states that when a formula tries to use the value
    of a measure in a cell, any nulls or non-existing values should be treated as
    a default value that depends on the datatype (in this case, zero for numbers).

    *   `rules` beginning in line 13 is a set of formulas that states how I want the
    values of the measures in each cell to be calculated. I have two formulas here,
    one for each of the two measures that were not in the table.

    *   Lines 15–19 calculate `sum_alive`. Using `[any, any]` I ask that the measure
    should be calculated for all cells in the grid. When the formula is calculated
    for a specific cell, function `cv()` gives the value of the dimension for that
    specific cell, and I use this to define a 3x3 grid for which I calculate the sum
    of measure `alive` in the nine cells in that grid. For example, for the cell in
    [3, 5], the sum will be calculated over the cells with dimension `x` between 2
    and 4 and dimension `y` between 4 and 6.

    *   Lines 20–21 calculate `nb_alive`, which is “neighbors alive.” The `sum_alive`
    calculated in the preceding text is the number of live cells in the nine cells
    in the 3x3 grid which includes the cell itself. So that means I can find the number
    of neighbors alive by subtracting the `alive` value in the cell itself.


    The model clause in Listing 6-3 looks very different from normal SQL. It is a
    quite different way of addressing the data and applying formulas to specified
    subsets of the data, more similar to arrays in many procedural languages or formulas
    in spreadsheets, just in the more declarative manner that is the hallmark of SQL.


    But I could do the same as Listing 6-3 in normal SQL, if I use a scalar subquery
    and an inline view. Listing 6-4 provides an example.


    ```

    SQL> select

    2     x

    3   , y

    4   , alive

    5   , sum_alive

    6   , sum_alive - alive as nb_alive

    7  from (

    8     select

    9        x

    10      , y

    11      , alive

    12      , (

    13           select sum(gz2.alive)

    14           from conway_gen_zero gz2

    15           where gz2.x between gz.x - 1 and gz.x + 1

    16           and   gz2.y between gz.y - 1 and gz.y + 1

    17        ) as sum_alive

    18     from conway_gen_zero gz

    19  )

    20  order by x, y;

    Listing 6-4: Live neighbor calculation with the scalar subquery

    ```


    Both Listing 6-3 and Listing 6-4 produce the same output – all cells in the grid
    with the two live counts:


    ```

    X   Y ALIVE  SUM_ALIVE   NB_ALIVE

    --- --- ----- ---------- ----------

    1   1     0          0          0

    1   2     0          0          0

    1   3     0          0          0

    ...

    5   5     0          4          4

    5   6     0          5          5

    5   7     1          4          3

    5   8     0          3          3

    5   9     0          0          0

    5  10     0          0          0

    6   1     0          0          0

    6   2     0          0          0

    6   3     0          1          1

    6   4     0          1          1

    6   5     0          3          3

    ...

    10   9     0          0          0

    10  10     0          0          0

    100 rows selected.

    ```'
