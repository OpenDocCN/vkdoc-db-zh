- fmt: '# Multiset operators


    数据在嵌套表类型的列中，在 PL/SQL 中使用时称为集合（具有多种集合类型）。在 SQL 操作中，它被称为**multiset**。不同的 SQL 客户端会以不同的格式显示这些数据——清单
    [2-7](#475066_1_En_2_Chapter.xhtml#PC14) 展示了它在 sqlcl 和 SQL∗Plus 中的样子。


    ```

    SQL> select

    2     customer_id as c_id, customer_name

    3   , product_coll

    4  from customer_order_products_obj

    5  where customer_id in (50042, 50741)

    6  order by customer_id;

    Listing 2-7

    The customer product data viewed as a collection type

    ```


    我只是查询了聚合视图 `customer_order_products_obj` 以获取我的两个客户的信息，并得到一个输出，其中每个客户占一行，包含一个*multiset*列，这意味着它是一个产品
    id 和名称的集合（或数组）：


    ```

    C_ID CUSTOMER_NAME   PRODUCT_COLL(ID, NAME)

    ------ --------------- ----------------------------------------

    50042 The White Hart  ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Ho

    ppy Crude Oil''), ID_NAME_TYPE(4280, ''Hop

    py Crude Oil''), ID_NAME_TYPE(4280, ''Hopp

    y Crude Oil''), ID_NAME_TYPE(5430, ''Hercu

    le Trippel''), ID_NAME_TYPE(6520, ''Der He

    lle Kumpel''))

    50741 Hygge og Humle  ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Ho

    ppy Crude Oil''), ID_NAME_TYPE(4280, ''Hop

    py Crude Oil''), ID_NAME_TYPE(6520, ''Der

    Helle Kumpel''), ID_NAME_TYPE(6520, ''Der

    Helle Kumpel''), ID_NAME_TYPE(6600, ''Hazy

    Pink Cloud''), ID_NAME_TYPE(7950, ''Pale

    Rider Rides''), ID_NAME_TYPE(7950, ''Pale

    Rider Rides''))

    ```


    请注意，每个客户的 multiset 包含的行数与清单 [2-2](#475066_1_En_2_Chapter.xhtml#PC2) 输出中每个客户的行数相同，这是设计使然，因为此输出只是清单
    [2-2](#475066_1_En_2_Chapter.xhtml#PC2) 输出的聚合。由于我没有在 multiset 中包含 `ordered` 和
    `qty` 列，因此存在重复项。这使我能够向您展示 multiset 操作符如何处理这种情况。


    ## Multiset union


    操作符 `multiset union` 支持使用 `all` 或 `distinct` 关键字，如图 [2-5](#475066_1_En_2_Chapter.xhtml#Fig5)
    所示。使用 `distinct` 关键字时，它的工作方式类似于集合操作符 `union`，会删除所有重复项。使用 `all` 关键字的效果与 `union
    all` 相同，即保留所有行（包括重复项）。


    ![../images/475066_1_En_2_Chapter/475066_1_En_2_Fig5_HTML.jpg](images/475066_1_En_2_Chapter/475066_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Difference between multiset union all and multiset union distinct


    在清单 [2-8](#475066_1_En_2_Chapter.xhtml#PC16) 中，我在客户 The White Hart 和客户 Hygge og
    Humle 的 multiset 之间执行了 `multiset union`。


    ```

    SQL> select

    2     whitehart.product_coll

    3     multiset union

    4     hyggehumle.product_coll

    5        as multiset_coll

    6  from customer_order_products_obj whitehart

    7  cross join customer_order_products_obj hyggehumle

    8  where whitehart.customer_id = 50042

    9  and hyggehumle.customer_id = 50741;

    Listing 2-8

    Doing union as a multiset operation on the collections

    ```


    请注意，我既没有使用 `all` 也没有使用 `distinct`。但您可以在输出中看到，所有行都存在，并且没有删除重复项：


    ```

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_

    NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_NAME_TYPE(4280, ''Hopp

    y Crude Oil''), ID_NAME_TYPE(5430, ''Hercule Trippel''), ID_NAM

    E_TYPE(6520, ''Der Helle Kumpel''), ID_NAME_TYPE(4280, ''Hoppy

    Crude Oil''), ID_NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_NAME_

    TYPE(6520, ''Der Helle Kumpel''), ID_NAME_TYPE(6520, ''Der Hell

    e Kumpel''), ID_NAME_TYPE(6600, ''Hazy Pink Cloud''), ID_NAME_T

    YPE(7950, ''Pale Rider Rides''), ID_NAME_TYPE(7950, ''Pale Ride

    r Rides''))

    ```


    如果我添加关键字 `all`，结果完全相同：


    ```

    ...

    3     multiset union all

    ...

    ```


    Caution


    这是混淆的基础，因为集合操作符 `union` 默认为 `distinct` 行为，而 `multiset union` 默认为 `all` 行为。为了帮助自己避免错误，我遵循的经验法则是永远不依赖默认值。对于
    `multiset`，我总是包含 `all` 或 `distinct`。对于集合操作符 `union`，我没有添加 `distinct` 关键字的选项，但我会在注释中将其添加为
    `/*distinct*/`，以便让未来的自己清楚我没有不小心忘记 `all` 关键字。


    如果我将其更改为 `distinct`，我会得到一个删除了所有重复项的输出：


    ```

    ...

    3     multiset union distinct

    ...

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_

    NAME_TYPE(5430, ''Hercule Trippel''), ID_NAME_TYPE(6520, ''Der

    Helle Kumpel''), ID_NAME_TYPE(6600, ''Hazy Pink Cloud''), ID_NA

    ME_TYPE(7950, ''Pale Rider Rides''))

    ```


    接下来是 `multiset intersect`。


    ## Multiset intersect


    图 [2-6](#475066_1_En_2_Chapter.xhtml#Fig6) 显示，使用 `multiset intersect`，我可以得到两个集合共有的行。


    ![../images/475066_1_En_2_Chapter/475066_1_En_2_Fig6_HTML.jpg](images/475066_1_En_2_Chapter/475066_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Difference between multiset intersect all and multiset intersect distinct


    如果我将清单 [2-8](#475066_1_En_2_Chapter.xhtml#PC16) 的 multiset 操作符更改为 `multiset intersect
    all`，您也可以在输出中看到相同的情况：


    ```

    ...

    3     multiset intersect all

    ...

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Hoppy Crude Oil''),

    ID_NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_NAME_TYPE(6520,

    ''Der Helle Kumpel''))

    ```


    同样，`multiset intersect distinct` 版本：


    ```

    ...

    3     multiset intersect distinct

    ...

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_

    NAME_TYPE(6520, ''Der Helle Kumpel''))

    ```


    这里没有太多惊喜，但使用 `multiset except` 会变得更有趣。'
  raw: '## Multiset operators


    Data in a column of a nested table type is known as a collection when used in
    PL/SQL (that has several types of collections). Within SQL operations, it is known
    as a **multiset**. Different SQL clients will show these in different formats –
    Listing [2-7](#475066_1_En_2_Chapter.xhtml#PC14) shows how it looks like in sqlcl
    and SQL∗Plus.


    ```

    SQL> select

    2     customer_id as c_id, customer_name

    3   , product_coll

    4  from customer_order_products_obj

    5  where customer_id in (50042, 50741)

    6  order by customer_id;

    Listing 2-7

    The customer product data viewed as a collection type

    ```


    I simply query the aggregate view `customer_order_products_obj` for my two customers
    and get an output with one row per customer having a column that is a *multiset*,
    meaning a collection (or array if you will) of product id and names:


    ```

    C_ID CUSTOMER_NAME   PRODUCT_COLL(ID, NAME)

    ------ --------------- ----------------------------------------

    50042 The White Hart  ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Ho

    ppy Crude Oil''), ID_NAME_TYPE(4280, ''Hop

    py Crude Oil''), ID_NAME_TYPE(4280, ''Hopp

    y Crude Oil''), ID_NAME_TYPE(5430, ''Hercu

    le Trippel''), ID_NAME_TYPE(6520, ''Der He

    lle Kumpel''))

    50741 Hygge og Humle  ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Ho

    ppy Crude Oil''), ID_NAME_TYPE(4280, ''Hop

    py Crude Oil''), ID_NAME_TYPE(6520, ''Der

    Helle Kumpel''), ID_NAME_TYPE(6520, ''Der

    Helle Kumpel''), ID_NAME_TYPE(6600, ''Hazy

    Pink Cloud''), ID_NAME_TYPE(7950, ''Pale

    Rider Rides''), ID_NAME_TYPE(7950, ''Pale

    Rider Rides''))

    ```


    Note the multiset for each of the customers contains as many rows as there were
    rows per customer in the output of Listing [2-2](#475066_1_En_2_Chapter.xhtml#PC2),
    which is by design as this output is simply an aggregation of the Listing [2-2](#475066_1_En_2_Chapter.xhtml#PC2)
    output. Since I did not include the `ordered` and `qty` columns in my multiset,
    I have duplicates. This enables me to show you how the multiset operators handle
    this.


    ### Multiset union


    The operator `multiset union` supports the use of either `all` or `distinct` keyword,
    as illustrated in Figure [2-5](#475066_1_En_2_Chapter.xhtml#Fig5). With the `distinct`
    keyword, it works like the set operator `union` by removing all duplicates. Using
    the `all` keyword has the same effect as in `union all` of keeping all rows including
    duplicates.


    ![../images/475066_1_En_2_Chapter/475066_1_En_2_Fig5_HTML.jpg](images/475066_1_En_2_Chapter/475066_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Difference between multiset union all and multiset union distinct


    In Listing [2-8](#475066_1_En_2_Chapter.xhtml#PC16) I do a `multiset union` between
    the multisets of customer The White Hart and customer Hygge og Humle.


    ```

    SQL> select

    2     whitehart.product_coll

    3     multiset union

    4     hyggehumle.product_coll

    5        as multiset_coll

    6  from customer_order_products_obj whitehart

    7  cross join customer_order_products_obj hyggehumle

    8  where whitehart.customer_id = 50042

    9  and hyggehumle.customer_id = 50741;

    Listing 2-8

    Doing union as a multiset operation on the collections

    ```


    Notice I am using neither `all` nor `distinct`. But you can see in the output
    that all rows are there and no duplicates have been removed:


    ```

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_

    NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_NAME_TYPE(4280, ''Hopp

    y Crude Oil''), ID_NAME_TYPE(5430, ''Hercule Trippel''), ID_NAM

    E_TYPE(6520, ''Der Helle Kumpel''), ID_NAME_TYPE(4280, ''Hoppy

    Crude Oil''), ID_NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_NAME_

    TYPE(6520, ''Der Helle Kumpel''), ID_NAME_TYPE(6520, ''Der Hell

    e Kumpel''), ID_NAME_TYPE(6600, ''Hazy Pink Cloud''), ID_NAME_T

    YPE(7950, ''Pale Rider Rides''), ID_NAME_TYPE(7950, ''Pale Ride

    r Rides''))

    ```


    If I do add the keyword `all`, I get exactly the same result:


    ```

    ...

    3     multiset union all

    ...

    ```


    Caution


    This is the basis of confusion, since the set operator `union` defaults to `distinct`
    behavior, while `multiset union` defaults to `all` behavior. To help myself not
    to make mistakes, I go by the rule of thumb of never relying on the defaults.
    For `multiset`, I always include `all` or `distinct`. For the set operator `union`,
    I have no option of adding a `distinct` keyword, but I add it in a comment anyway
    as `/*distinct*/` to make it clear to a future me that I didn’t accidentally forget
    an `all` keyword.


    If I change it to `distinct`, I get an output with all duplicates removed:


    ```

    ...

    3     multiset union distinct

    ...

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_

    NAME_TYPE(5430, ''Hercule Trippel''), ID_NAME_TYPE(6520, ''Der

    Helle Kumpel''), ID_NAME_TYPE(6600, ''Hazy Pink Cloud''), ID_NA

    ME_TYPE(7950, ''Pale Rider Rides''))

    ```


    Next up is `multiset intersect`.


    ### Multiset intersect


    Figure [2-6](#475066_1_En_2_Chapter.xhtml#Fig6) shows that with `multiset intersect`,
    I get the rows that are common to both.


    ![../images/475066_1_En_2_Chapter/475066_1_En_2_Fig6_HTML.jpg](images/475066_1_En_2_Chapter/475066_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Difference between multiset intersect all and multiset intersect distinct


    And you can see the same in the output if I change the multiset operator of Listing
    [2-8](#475066_1_En_2_Chapter.xhtml#PC16) to `multiset intersect all`:


    ```

    ...

    3     multiset intersect all

    ...

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Hoppy Crude Oil''),

    ID_NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_NAME_TYPE(6520,

    ''Der Helle Kumpel''))

    ```


    Similarly with the `multiset intersect distinct` version:


    ```

    ...

    3     multiset intersect distinct

    ...

    MULTISET_COLL(ID, NAME)


    ID_NAME_COLL_TYPE(ID_NAME_TYPE(4280, ''Hoppy Crude Oil''), ID_

    NAME_TYPE(6520, ''Der Helle Kumpel''))

    ```


    Not much surprise here, but it gets more interesting with `multiset except`.'
