    ### 每次匹配的细节


    正如我之前提到的，观察匹配过程中发生情况的一个常用方法是，使用每匹配的所有行来检查详细的输出。这就是我在清单 22-4 中所做的。


    ```SQL

    SQL> with hierarchy as (

    ...

    12  )

    13  select

    14     mn

    15   , rn

    16   , lvl

    17   , lpad('' '', (lvl-1)*2)

    18      || substr(name, 1, instr(name, '' '') - 1) as name

    19   , roll

    20   , subs

    21   , cls

    22   , substr(stname, 1, instr(stname, '' '') - 1) as stname

    23   , substr(hiname, 1, instr(hiname, '' '') - 1) as hiname

    24  from hierarchy

    25  match_recognize (

    26     order by rn

    27     measures

    28        match_number()    as mn

    29      , classifier()      as cls

    30      , strt.name         as stname

    31      , higher.name       as hiname

    32      , count(higher.lvl) as roll

    33      , final count(higher.lvl) as subs

    34     all rows per match

    35     after match skip to next row

    36     pattern (

    37        strt higher*

    38     )

    39     define

    40        higher as higher.lvl > strt.lvl

    41  )

    43  order by mn, rn;

    清单 22-4

    使用每匹配的所有行检查细节

    ```


    `with` 子句的子查询未改变，`after match`、`pattern` 和 `define` 子句也保持不变。我将第 34 行的 `one row`
    改为 `all rows per match`，然后在第 28–33 行创建了一些不同的 `measures`：


    *   第 28 行的 `match_number()` 函数为找到的匹配分配连续编号。没有它，我将无法在输出中辨别哪些行属于同一个匹配。

    *   `classifier()` 函数显示该行根据 `pattern` 和 `define` 子句被分类为什么——此处显示一行是 `strt` 还是 `higher`。

    *   当列名未被限定时，使用的是匹配中当前行的值，无论其分类器是什么。当我在第 30 和 31 行用分类器 `strt` 和 `higher` 来限定列名时，我获取的是*具有该分类器*的最后一行中的值。

    *   第 32 和 33 行中的聚合函数如 `count` 可以是 `running` 或 `final`。在清单 22-3 中，这无关紧要，因为我使用了
    `one row per match`，但在这里它很重要，因此我同时输出两者以展示差异。第 32 行默认为 `running`（即滚动计数），其结果类似于窗口为
    `rows between unbounded preceding and current row` 的分析函数，而第 33 行带有 `final` 关键字，其作用类似于
    `rows between unbounded preceding and unbounded following`。


    清单 22-4 的输出行数远多于表中的行数，但我有 14 次匹配（表中每一行对应一次匹配），由 `mn` 列中的 1–14 标识。因此，如果我逐步查看输出，以下是第一次匹配的行：


    ```SQL

    MN  RN  LVL  NAME           ROLL  SUBS  CLS     STNAME   HINAME

    1   1   1    Harold         0     13    STRT    Harold

    1   2   2      Axel         1     13    HIGHER  Harold   Axel

    1   3   3        Jim        2     13    HIGHER  Harold   Jim

    1   4   4          Laura    3     13    HIGHER  Harold   Laura

    1   5   4          Simon    4     13    HIGHER  Harold   Simon

    1   6   3        Maria      5     13    HIGHER  Harold   Maria

    1   7   2      Ursula       6     13    HIGHER  Harold   Ursula

    1   8   3        Lim        7     13    HIGHER  Harold   Lim

    1   9   4          Evelyn   8     13    HIGHER  Harold   Evelyn

    1   10  4          Kurt     9     13    HIGHER  Harold   Kurt

    1   11  4          Susanne  10    13    HIGHER  Harold   Susanne

    1   12  3        Mogens     11    13    HIGHER  Harold   Mogens

    1   13  4          Dan      12    13    HIGHER  Harold   Dan

    1   14  4          Zoe      13    13    HIGHER  Harold   Zoe

    ```


    由于我的模式匹配是按 `rn` 排序的，它从 `rn = 1`（Harold）开始，并将他分类为 `strt`（因为任何行都可以匹配 `strt`），然后重复检查下一行的
    `lvl` 是否大于 `strt` 行的 `lvl`。对于剩下的 13 行，这都是成立的，因为其他人的 `lvl` 都大于 1。这意味着第一次匹配直到行尾才会停止。


    匹配编号 1 现在已找到，包含 1 个 `strt` 行和 13 个 `higher` 行，如 `cls` 列所示。在 `strt` 行中，*尚未*找到任何
    `higher` 行，因此当我限定一个列为 `higher` 时（并且没有使用 `final` 关键字），结果是 `null`，你可以在 `hiname`
    列中看到这一点。这也意味着，当我在 `subs` 列中对 `higher` 进行总数（`final`）统计时，`strt` 行不计入其中，结果就是所需的 13
    个下属。


    你还可以在输出中看到 `roll` 列中的滚动总计是如何变化的，以及 `stname` 列中的 `strt.name` 如何保留最后一个（此处仅有一个）`strt`
    行的值。


    因此，当第一次匹配结束时，我指定了 `after match skip to next row`，此处是 `rn = 2`（Axel）。他将在继续的输出中作为匹配
    `mn = 2` 的 `strt` 行：


    ```SQL

    2   2   2      Axel         0     4     STRT    Axel

    2   3   3        Jim        1     4     HIGHER  Axel     Jim

    2   4   4          Laura    2     4     HIGHER  Axel     Laura

    2   5   4          Simon    3     4     HIGHER  Axel     Simon

    2   6   3        Maria      4     4     HIGHER  Axel     Maria

    ```


    在 Axel 作为 `strt` 之后，此匹配找到了四个 `higher` 行，因为行 `rn = 7`（Ursula）的 `lvl = 2`，它*不高于*
    Axel（是相同的），因此匹配在 Maria 处停止。下属的计数工作方式与之前一样——即使匹配中有五行，也只有四行被分类为 `higher` 并被计数。这些行在匹配编号
    1 中也计入了 Harold King 的下属总数，但由于跳回到 `rn = 2` 来寻找下一个匹配，这些行又被计入了一次。


    Axel 之后的下一行是 Jim，他将是输出中下一个匹配 `mn = 3` 的 `strt` 行：


    ```SQL

    3   3   3        Jim        0     2     STRT    Jim

    3   4   4          Laura    1     2     HIGHER  Jim      Laura

    3   5   4          Simon    2     2     HIGHER  Jim      Simon

    ```


    匹配编号 3 最终包含一个 `strt` 行和仅仅 2 个 `higher` 行，因为 Maria（在 `rn` 顺序中位于 Simon 之后）的 `lvl`
    并*不高于* Jim。因此，Laura 和 Simon 被计为 Jim 的下属——就像他们也被计入 Axel 和 Harold 名下一样。


    输出继续到匹配编号 4，它从 Laura 开始，将她分类为 `strt` 行。在她之后是 Simon，但他与 Laura 的 `lvl` 相同。因此，他不能是
    `higher` 行，该匹配变成一个仅包含单个 `strt` 行而没有 `higher` 行的匹配，导致下属计数为 0：


    ```SQL

    4   4   4          Laura    0     0     STRT    Laura

    ```


    就这样继续下去，直到最后，找到匹配编号 `mn = 14`，其中只包含 Zoe：


    ```SQL

    ...

    14  14  4          Zoe      0     0     STRT    Zoe

    ```


    这个冗长输出的细节有助于了解 `match_recognize` 的不同部分在此解决方案中如何工作。但我也可以只取 `all rows per match`
    输出中的部分列，并在清单 22-5 中使用 `pivot` 来可视化构成每次匹配的行。

