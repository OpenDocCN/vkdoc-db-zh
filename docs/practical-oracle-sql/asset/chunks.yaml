- fmt: '## Pivoting single measure and dimension


    ### 基本的行转列操作


    Listing [8-3](#475066_1_En_8_Chapter.xhtml#PC4) 展示了如何使用 `pivot` 子句对年份进行行转列。


    ```sql

    SQL> select *

    2  from (

    3     select

    4        brewery_name

    5      , group_name

    6      , extract(year from purchased) as yr

    7      , sum(qty) as qty

    8     from purchases_with_dims pwd

    9     group by

    10        brewery_name

    11      , group_name

    12      , extract(year from purchased)

    13  ) pivot (

    14     sum(qty)

    15     for yr

    16     in (

    17        2016 as y2016

    18      , 2017 as y2017

    19      , 2018 as y2018

    20     )

    21  )

    22  order by brewery_name, group_name;

    Listing 8-3

    Pivoting the year rows into columns

    ```


    我这样构建了这个查询：


    *   第 3-12 行就是 Listing [8-2](#475066_1_En_8_Chapter.xhtml#PC2) 中的 `select` 语句，只是包装在了一个内联视图中。

    *   第 13 行的 `pivot` 关键字告诉 Oracle 我想要进行行转列。

    *   然后我在第 14 行定义了我要聚合的度量——这里只有一个，即数量（`qty`）。我必须在这里使用聚合函数——任何聚合函数都可以，这里最合适的是 `sum`。

    *   在第 15 行的关键字 `for` 之后，我定义了要转换的维度——这里只有年份（`yr`）。

    *   最后，第 16-19 行的 `in` 子句将聚合后的度量值映射到对应的维度值所在的列——这些列在原表中并不存在，但会在输出中创建。


    如图 [8-2](#475066_1_En_8_Chapter.xhtml#Fig2) 所示，聚合度量 `sum(qty)` 会流向三个列别名，分别对应 `yr`
    维度的三个值。


    ![../images/475066_1_En_8_Chapter/475066_1_En_8_Fig2_HTML.jpg](images/475066_1_En_8_Chapter/475066_1_En_8_Fig2_HTML.jpg)


    *Figure 8-2 The flows of the pivot clause*


    这样，我就得到了期望的输出：18 个聚合后的数量值显示在 6 行数据中，每行有 3 个数量列（每年一列），而不是原来的 18 行：


    ```sql

    BREWERY_NAME        GROUP_NAME  Y2016  Y2017  Y2018

    Balthazar Brauerei  Belgian     800    1000   1000

    Balthazar Brauerei  Wheat       500    500    400

    Brewing Barbarian   IPA         200    300    500

    Brewing Barbarian   Stout       800    1000   1200

    Happy Hoppy Hippo   IPA         1000   900    800

    Happy Hoppy Hippo   Wheat       200    100    100

    ```


    请注意，输出中不再包含内联视图里的 `yr` 和 `qty` 列，但 `brewery_name` 和 `group_name` 列还在。原因是，在 `pivot`
    子句中用作度量和维度的列会被用于行转列操作，而剩下的列则会被用于一个隐含的 `group by`（分组）。


    由于在我的内联视图中已经按啤酒厂、产品组和年份对数据进行了分组，这意味着第 14 行的 `sum(qty)` 实际上总是将单行数据“聚合”到对应的年份列中，因此这个聚合操作实际上并非必需。但我不能省略它——`pivot`
    子句要求必须使用聚合函数。


    我可以做的是，跳过内联视图中的 `group by`，而让 `pivot` 执行的隐含 `group by` 来单独完成聚合操作，从而避免一次不必要的分组操作。Listing
    [8-4](#475066_1_En_8_Chapter.xhtml#PC6) 与 Listing [8-3](#475066_1_En_8_Chapter.xhtml#PC4)
    完全相同，只是移除了 Listing [8-3](#475066_1_En_8_Chapter.xhtml#PC4) 中第 9-12 行的 `group by`
    子句。


    ```sql

    SQL> select *

    2  from (

    3     select

    4        brewery_name

    5      , group_name

    6      , extract(year from purchased) as yr

    7      , qty

    8     from purchases_with_dims pwd

    9  ) pivot (

    10     sum(qty)

    11     for yr

    12     in (

    13        2016 as y2016

    14      , 2017 as y2017

    15      , 2018 as y2018

    16     )

    17  )

    18  order by brewery_name, group_name;

    Listing 8-4

    Utilizing the implicit group by

    ```


    Listing [8-4](#475066_1_En_8_Chapter.xhtml#PC6) 产生的输出与 Listing [8-3](#475066_1_En_8_Chapter.xhtml#PC4)
    完全相同；它只是因为省去了多余的分组操作而效率稍高一些。


    你可能会想，那我是不是可以完全跳过内联视图呢？嗯，有时是可以的，但在本例中不行。首先，我需要从 `purchased` 日期列中提取年份；其次，`pivot`
    在将某些列用作度量和维度后，会对剩余列执行隐含的 `group by`。


    如果我在视图中就有 `yr` 列，并可以直接在 `purchases_with_dims` 视图上执行 `pivot`，那么分组操作将会在视图中除 `qty`
    和 `yr` 之外的*所有*列上进行——这将得到错误的结果。内联视图让我能够*仅保留*我需要的列——那些用于行转列操作的列，以及那些用于隐含 `group
    by` 的列。


    为了更清楚地说明 `pivot` 子句在幕后的工作原理，让我展示一下不使用 `pivot` 的手动行转列操作。


    ### 手动实现行转列


    在很老的数据库版本（10g 之前）中，我必须在没有 `pivot` 子句帮助的情况下自己动手实现行转列。我不得不编写一个类似于 Listing [8-5](#475066_1_En_8_Chapter.xhtml#PC7)
    的查询。


    ```sql

    SQL> select

    2     brewery_name

    3   , group_name

    4   , sum(

    5        case extract(year from purchased)

    6           when 2016 then qty

    7        end

    8     ) as y2016

    9   , sum(

    10        case extract(year from purchased)

    11           when 2017 then qty

    12        end

    13     ) as y2017

    14   , sum(

    15        case extract(year from purchased)

    16           when 2018 then qty

    17        end

    18     ) as y2018

    19  from purchases_with_dims pwd

    20  group by

    21     brewery_name

    22   , group_name

    23  order by brewery_name, group_name;

    Listing 8-5

    Manual pivoting without using pivot clause

    ```


    我在第 20-22 行执行了 `group by` 操作，按 `brewery_name` 和 `group_name` 分组。然后我为想要得到的三列分别写了三个
    `case` 结构，这样视图中所有 2016 年的行，其 `qty` 值会被累加到 `y2016` 列；所有 2017 年的行会累加到 `y2017` 列；2018
    年的会累加到 `y2018` 列。输出结果与 Listing [8-4](#475066_1_En_8_Chapter.xhtml#PC6) 和 Listing
    [8-3](#475066_1_En_8_Chapter.xhtml#PC4) 完全相同。


    这个结构在我使用 `pivot` 子句时会自动构建。在 Listing [8-4](#475066_1_En_8_Chapter.xhtml#PC6) 中，我定义了要对
    `qty` 列的值使用 `sum` 聚合函数，但要求 2016 年的行数据进入一个我希望命名为 `y2016` 的列，以此类推。我并没有定义隐含 `group
    by` 使用哪些列——这将是所有剩余的列，因此我使用内联视图来限制进入 `pivot` 子句的列，而不是使用视图中的所有列。


    了解 `pivot` 的这种工作方式会很有帮助，因为接下来我将展示如何使用 `purchases` 表和 `purchases_with_dims` 视图中的
    `cost` 列，而不仅仅是 `qty`，来实现多度量的行转列。'
  raw: '## Pivoting single measure and dimension


    Listing [8-3](#475066_1_En_8_Chapter.xhtml#PC4) shows how I do the pivoting of
    the years using the `pivot` clause.


    ```

    SQL> select *

    2  from (

    3     select

    4        brewery_name

    5      , group_name

    6      , extract(year from purchased) as yr

    7      , sum(qty) as qty

    8     from purchases_with_dims pwd

    9     group by

    10        brewery_name

    11      , group_name

    12      , extract(year from purchased)

    13  ) pivot (

    14     sum(qty)

    15     for yr

    16     in (

    17        2016 as y2016

    18      , 2017 as y2017

    19      , 2018 as y2018

    20     )

    21  )

    22  order by brewery_name, group_name;

    Listing 8-3

    Pivoting the year rows into columns

    ```


    I built the query of these elements:


    *   Lines 3–12 simply are the `select` from Listing [8-2](#475066_1_En_8_Chapter.xhtml#PC2),
    wrapped in an inline view.


    *   The `pivot` keyword in line 13 tells Oracle I want to pivot the data.


    *   Then I define my measures – in this case only one, the quantity – in line
    14\. I *must* use an aggregate function here – it can be any aggregate, the one
    that makes sense in this case is `sum`.


    *   After the keyword `for` in line 15, I define the dimensions I want – here
    only the year.


    *   Last, the `in` clause in lines 16–19 maps in which columns the aggregated
    measure should be placed for which values of the dimension – columns that do not
    exist in the table, but will be created in the output.


    Shown schematically, you can see in Figure [8-2](#475066_1_En_8_Chapter.xhtml#Fig2)
    that the measure `sum(qty)` flows to the three column aliases, one for each of
    the values of the `yr` dimension.


    ![../images/475066_1_En_8_Chapter/475066_1_En_8_Fig2_HTML.jpg](images/475066_1_En_8_Chapter/475066_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    The flows of the pivot clause


    And so I get the output that I desired with 18 aggregated quantities shown in
    six rows of three quantity columns (one per year) instead of 18 rows:


    ```

    BREWERY_NAME        GROUP_NAME  Y2016  Y2017  Y2018

    Balthazar Brauerei  Belgian     800    1000   1000

    Balthazar Brauerei  Wheat       500    500    400

    Brewing Barbarian   IPA         200    300    500

    Brewing Barbarian   Stout       800    1000   1200

    Happy Hoppy Hippo   IPA         1000   900    800

    Happy Hoppy Hippo   Wheat       200    100    100

    ```


    Notice that the `yr` and `qty` columns from the inline view are no longer in the
    output, but `brewery_name` and `group_name` are. What happens is that those columns
    I am referencing in the measures and dimensions in the `pivot` clause are used
    for the pivoting. The columns that are left over, they are used for an *implicit*
    group by.


    Since in my inline view I have already grouped the data by brewery, product group,
    and year, this means that the `sum(qty)` in line 14 actually always will “aggregate”
    just a single row of data into each of the year columns, so that aggregation is
    not really necessary. But I cannot skip it – the pivot clause demands an aggregate
    function.


    What I can do instead is to skip the `group by` within the inline view and instead
    let the implicit `group by` performed by `pivot` do the aggregation alone, thus
    avoiding an unnecessary grouping operation. Listing [8-4](#475066_1_En_8_Chapter.xhtml#PC6)
    simply is the same as Listing [8-3](#475066_1_En_8_Chapter.xhtml#PC4), just with
    the `group by` from Listing [8-3](#475066_1_En_8_Chapter.xhtml#PC4) lines 9–12
    removed.


    ```

    SQL> select *

    2  from (

    3     select

    4        brewery_name

    5      , group_name

    6      , extract(year from purchased) as yr

    7      , qty

    8     from purchases_with_dims pwd

    9  ) pivot (

    10     sum(qty)

    11     for yr

    12     in (

    13        2016 as y2016

    14      , 2017 as y2017

    15      , 2018 as y2018

    16     )

    17  )

    18  order by brewery_name, group_name;

    Listing 8-4

    Utilizing the implicit group by

    ```


    Listing [8-4](#475066_1_En_8_Chapter.xhtml#PC6) gives exactly the same output
    as Listing [8-3](#475066_1_En_8_Chapter.xhtml#PC4); it is just a little bit more
    efficient from not doing a superfluous grouping operation.


    You might think that I could then skip the inline view completely? Well, sometimes
    it is possible, but not in this case, first because I need to extract the year
    from the `purchased` date column and second because the pivot performs an implicit
    `group by` on the remaining columns after some of the columns have been used for
    measures and dimensions.


    If I had the `yr` column in the view and could pivot directly on the `purchases_with_dims`
    view, the grouping would be performed on *all* the columns of the view *except*
    `qty` and `yr` – it would give me the wrong result. The inline view lets me keep
    *only* the columns I need – those to be used in the pivoting and those to be used
    for the implicit `group by`.


    To make it a little more clear what’s happening behind the scenes with the `pivot`
    clause, let me show you pivoting performed manually without `pivot`.


    ### Do-it-yourself manual pivoting


    In really old database versions (before version 10), I would have had to do pivoting
    myself with no help from the `pivot` clause. Instead I would have had to write
    a query like Listing [8-5](#475066_1_En_8_Chapter.xhtml#PC7).


    ```

    SQL> select

    2     brewery_name

    3   , group_name

    4   , sum(

    5        case extract(year from purchased)

    6           when 2016 then qty

    7        end

    8     ) as y2016

    9   , sum(

    10        case extract(year from purchased)

    11           when 2017 then qty

    12        end

    13     ) as y2017

    14   , sum(

    15        case extract(year from purchased)

    16           when 2018 then qty

    17        end

    18     ) as y2018

    19  from purchases_with_dims pwd

    20  group by

    21     brewery_name

    22   , group_name

    23  order by brewery_name, group_name;

    Listing 8-5

    Manual pivoting without using pivot clause

    ```


    I do a `group by` brewery and product group in lines 20–22\. And then I have three
    `case` structures for each of the three columns I want, so that all rows in the
    view from the year 2016 will have the `qty` value summed in column `y2016`, all
    rows from 2017 will be summed in `y2017`, and 2018 in `y2018`. The output is exactly
    the same as Listing [8-4](#475066_1_En_8_Chapter.xhtml#PC6) and Listing [8-3](#475066_1_En_8_Chapter.xhtml#PC4).


    This structure is built for me automatically when I use the pivot clause. In Listing
    [8-4](#475066_1_En_8_Chapter.xhtml#PC6), I defined I wanted to use aggregate function
    `sum` on the value from column `qty`, but such that `qty` for rows in year 2016
    goes to a column I want to be named `y2016`, and so on. I am *not* defining what
    to use for the implicit `group by` – this will be whatever columns are left over,
    so therefore I am using the inline view to limit the columns that go to the `pivot`
    clause rather than use all columns of the view.


    Knowing this is the way `pivot` works will help, when I now show you pivoting
    with multiple measures by also using the column `cost` from the table `purchases`
    and the view `purchases_with_dims`, instead of just `qty`.'
  trans: '

    ## 单度量与单维度的行转列操作


    ### 基本的行转列操作


    清单 8-3 展示了如何使用 `pivot` 子句对年份进行行转列。


    ```sql

    SQL> select *

    2  from (

    3     select

    4        brewery_name

    5      , group_name

    6      , extract(year from purchased) as yr

    7      , sum(qty) as qty

    8     from purchases_with_dims pwd

    9     group by

    10        brewery_name

    11      , group_name

    12      , extract(year from purchased)

    13  ) pivot (

    14     sum(qty)

    15     for yr

    16     in (

    17        2016 as y2016

    18      , 2017 as y2017

    19      , 2018 as y2018

    20     )

    21  )

    22  order by brewery_name, group_name;

    清单 8-3

    将年份行转列

    ```


    我是这样构建这个查询的：


    *   第 3-12 行就是清单 8-2 中的 `select` 语句，只是包装在了一个内联视图中。

    *   第 13 行的 `pivot` 关键字告诉 Oracle 我想要进行行转列。

    *   然后我在第 14 行定义了我要聚合的度量——这里只有一个，即数量（`qty`）。我必须在这里使用聚合函数——任何聚合函数都可以，这里最合适的是 `sum`。

    *   在第 15 行的关键字 `for` 之后，我定义了要转换的维度——这里只有年份（`yr`）。

    *   最后，第 16-19 行的 `in` 子句将聚合后的度量值映射到对应的维度值所在的列——这些列在原表中并不存在，但会在输出中创建。


    如图 8-2 所示，聚合度量 `sum(qty)` 会流向三个列别名，分别对应 `yr` 维度的三个值。


    ![../images/475066_1_En_8_Chapter/475066_1_En_8_Fig2_HTML.jpg](img/475066_1_En_8_Fig2_HTML.jpg)


    *图 8-2 pivot 子句的数据流向*


    这样，我就得到了期望的输出：18 个聚合后的数量值显示在 6 行数据中，每行有 3 个数量列（每年一列），而不是原来的 18 行：


    ```sql

    BREWERY_NAME        GROUP_NAME  Y2016  Y2017  Y2018

    Balthazar Brauerei  Belgian     800    1000   1000

    Balthazar Brauerei  Wheat       500    500    400

    Brewing Barbarian   IPA         200    300    500

    Brewing Barbarian   Stout       800    1000   1200

    Happy Hoppy Hippo   IPA         1000   900    800

    Happy Hoppy Hippo   Wheat       200    100    100

    ```


    请注意，输出中不再包含内联视图里的 `yr` 和 `qty` 列，但 `brewery_name` 和 `group_name` 列还在。原因是，在 `pivot`
    子句中用作度量和维度的列会被用于行转列操作，而剩下的列则会被用于一个隐含的 `group by`（分组）。


    由于在我的内联视图中已经按啤酒厂、产品组和年份对数据进行了分组，这意味着第 14 行的 `sum(qty)` 实际上总是将单行数据“聚合”到对应的年份列中，因此这个聚合操作实际上并非必需。但我不能省略它——`pivot`
    子句要求必须使用聚合函数。


    我可以做的是，跳过内联视图中的 `group by`，而让 `pivot` 执行的隐含 `group by` 来单独完成聚合操作，从而避免一次不必要的分组操作。清单
    8-4 与清单 8-3 完全相同，只是移除了清单 8-3 中第 9-12 行的 `group by` 子句。


    ```sql

    SQL> select *

    2  from (

    3     select

    4        brewery_name

    5      , group_name

    6      , extract(year from purchased) as yr

    7      , qty

    8     from purchases_with_dims pwd

    9  ) pivot (

    10     sum(qty)

    11     for yr

    12     in (

    13        2016 as y2016

    14      , 2017 as y2017

    15      , 2018 as y2018

    16     )

    17  )

    18  order by brewery_name, group_name;

    清单 8-4

    利用隐含分组

    ```


    清单 8-4 产生的输出与清单 8-3 完全相同；它只是因为省去了多余的分组操作而效率稍高一些。


    你可能会想，那我是不是可以完全跳过内联视图呢？嗯，有时是可以的，但在本例中不行。首先，我需要从 `purchased` 日期列中提取年份；其次，`pivot`
    在将某些列用作度量和维度后，会对剩余列执行隐含的 `group by`。


    如果我在视图中就有 `yr` 列，并可以直接在 `purchases_with_dims` 视图上执行 `pivot`，那么分组操作将会在视图中除 `qty`
    和 `yr` 之外的*所有*列上进行——这将得到错误的结果。内联视图让我能够*仅保留*我需要的列——那些用于行转列操作的列，以及那些用于隐含 `group
    by` 的列。


    为了更清楚地说明 `pivot` 子句在幕后的工作原理，让我展示一下不使用 `pivot` 的手动行转列操作。


    ### 手动实现行转列


    在很老的数据库版本（10g 之前）中，我必须在没有 `pivot` 子句帮助的情况下自己动手实现行转列。我不得不编写一个类似于清单 8-5 的查询。


    ```sql

    SQL> select

    2     brewery_name

    3   , group_name

    4   , sum(

    5        case extract(year from purchased)

    6           when 2016 then qty

    7        end

    8     ) as y2016

    9   , sum(

    10        case extract(year from purchased)

    11           when 2017 then qty

    12        end

    13     ) as y2017

    14   , sum(

    15        case extract(year from purchased)

    16           when 2018 then qty

    17        end

    18     ) as y2018

    19  from purchases_with_dims pwd

    20  group by

    21     brewery_name

    22   , group_name

    23  order by brewery_name, group_name;

    清单 8-5

    不使用 pivot 子句的手动行转列

    ```


    我在第 20-22 行执行了 `group by` 操作，按 `brewery_name` 和 `group_name` 分组。然后我为想要得到的三列分别写了三个
    `case` 结构，这样视图中所有 2016 年的行，其 `qty` 值会被累加到 `y2016` 列；所有 2017 年的行会累加到 `y2017` 列；2018
    年的会累加到 `y2018` 列。输出结果与清单 8-4 和清单 8-3 完全相同。


    这个结构在我使用 `pivot` 子句时会自动构建。在清单 8-4 中，我定义了要对 `qty` 列的值使用 `sum` 聚合函数，但要求 2016 年的行数据进入一个我希望命名为
    `y2016` 的列，以此类推。我并没有定义隐含 `group by` 使用哪些列——这将是所有剩余的列，因此我使用内联视图来限制进入 `pivot` 子句的列，而不是使用视图中的所有列。


    了解 `pivot` 的这种工作方式会很有帮助，因为接下来我将展示如何使用 `purchases` 表和 `purchases_with_dims` 视图中的
    `cost` 列，而不仅仅是 `qty`，来实现多度量的行转列。

    '
- fmt: '## Multiple measures


    I''m going to extend my query to not only pivot the aggregate quantity but also
    the aggregate cost. In Listing [8-6](#475066_1_En_8_Chapter.xhtml#PC8), you see
    I''ve simply added the `cost` column in line 8, so I also can add the aggregate
    measure `sum(cost)` in line 12.


    ```

    SQL> select *

    2  from (

    3     select

    4        brewery_name

    5      , group_name

    6      , extract(year from purchased) as yr

    7      , qty

    8      , cost

    9     from purchases_with_dims pwd

    10  ) pivot (

    11     sum(qty)

    12   , sum(cost)

    13     for yr

    14     in (

    15        2016 as y2016

    16      , 2017 as y2017

    17      , 2018 as y2018

    18     )

    19  )

    20  order by brewery_name, group_name;

    Error at Command Line : 1 Column : 8

    Error report -

    SQL Error: ORA-00918: column ambiguously defined

    Listing 8-6

    Getting an ORA-00918 error with multiple measures

    ```


    Why do I get an error saying `column ambiguously defined`? I haven''t written
    the same column alias twice? Well, not directly, but indirectly I have.


    What happens is that I have defined two measures with no column aliases. Then
    I have defined the three year values in the `yr` dimension and column aliases
    for them. There will be created a column for every combination, so 2 x 3 = 6 columns.
    Those six columns will be named *<dimension alias>_<measure alias>*, but if there
    are no measure aliases, then they will just be named *<dimension alias>*, as you
    saw in Listings [8-3](#475066_1_En_8_Chapter.xhtml#PC4) and [8-4](#475066_1_En_8_Chapter.xhtml#PC6).
    There it was okay, but here it means there will be two columns named `y2016`,
    two columns `y2017`, and two columns `y2018`. Thus the ORA-00918 error.


    The solution is to also give the measures column aliases, so, for example, I can
    do as shown in Figure [8-3](#475066_1_En_8_Chapter.xhtml#Fig3), where I alias
    the measures simply `q` and `c`, while the dimension values are aliased with two
    digits of the year (since those aliases do not start with a letter, they need
    to be quoted).


    This generates therefore the six columns (2 x 3) that are named `16_Q`, `16_C`,
    and so on.


    ![../images/475066_1_En_8_Chapter/475066_1_En_8_Fig3_HTML.jpg](images/475066_1_En_8_Chapter/475066_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Schematic flow when you have multiple measures


    And to show you it is not just in a schematic diagram it works, I change Listing
    [8-6](#475066_1_En_8_Chapter.xhtml#PC8) by aliasing the measures and dimension
    values as shown in Figure [8-3](#475066_1_En_8_Chapter.xhtml#Fig3):


    ```

    ...

    10  ) pivot (

    11     sum(qty)  as q

    12   , sum(cost) as c

    13     for yr

    14     in (

    15        2016 as "16"

    16      , 2017 as "17"

    17      , 2018 as "18"

    18     )

    19  )

    ...

    ```


    And I get the output I want:


    ```

    BREWERY_NAME        GROUP_NAME  16_Q  16_C  17_Q  17_C  18_Q  18_C

    Balthazar Brauerei  Belgian     800   5840  1000  7360  1000  6960

    Balthazar Brauerei  Wheat       500   3280  500   3600  400   2800

    Brewing Barbarian   IPA         200   1440  300   1680  500   3920

    Brewing Barbarian   Stout       800   5600  1000  6960  1200  8960

    Happy Hoppy Hippo   IPA         1000  7360  900   6400  800   5680

    Happy Hoppy Hippo   Wheat       200   960   100   800   100   720

    ```


    (Normally I''d probably pick a little more descriptive column aliases, but using
    so short aliases makes the lines fit in a book.)


    So I''ve now demonstrated getting pivoted columns as combinations of multiple
    measures and values of a single dimension. Next up is adding multiple dimensions
    too.


    ### Multiple dimensions as well


    So far I''ve pivoted only with the year as a dimension, leaving `brewery` and
    `product group` as the columns that are used for implicit `group by`. Now I''m
    going to also pivot the `product group` as a second dimension, leaving only the
    `brewery` to be grouped upon.


    I have in my data 4 product groups and 3 years, which would mean 12 combinations
    of dimension values, each showing 2 measures (quantity and cost) for a total of
    24 columns. That''s a bit large to demo here on a printed page, so in Listing
    [8-7](#475066_1_En_8_Chapter.xhtml#PC11), I''m reducing the data a bit by selecting
    only two product groups in line 10 and only two years (2017 and 2018) in lines
    11–12.


    ```

    SQL> select *

    2  from (

    3     select

    4        brewery_name

    5      , group_name

    6      , extract(year from purchased) as yr

    7      , qty

    8      , cost

    9     from purchases_with_dims pwd

    10     where group_name in (''IPA'', ''Wheat'')

    11     and   purchased >= date ''2017-01-01''

    12     and   purchased <  date ''2019-01-01''

    13  ) pivot (

    14     sum(qty)  as q

    15   , sum(cost) as c

    16     for (group_name, yr)

    17     in (

    18        (''IPA''  , 2017) as i17

    19      , (''IPA''  , 2018) as i18

    20      , (''Wheat'', 2017) as w17

    21      , (''Wheat'', 2018) as w18

    22     )

    23  )

    24  order by brewery_name;

    Listing 8-7

    Combining two dimensions and two measures

    ```


    You''ll notice that the content of the inline view in lines 3–12 is in principle
    the same as before; I''ve simply added a `where` clause to reduce the dataset
    I''m pivoting.


    The measures `q` and `c` in lines 14–15 are also unchanged, just as they were
    when I only used a single dimension.


    Line 16 is different, since here I am no longer just specifying a single column
    to be my dimension. I am specifying an expression list of two columns instead
    – `group_name` and `yr`.


    And since I use an expression list of two columns in my `for` clause, I also need
    to use corresponding expression lists of values in the `in` clause mappings in
    lines 18–21. Each value expression list (combinations of dimension values) I give
    a column alias – in this case a very short alias to keep my lines short enough
    for print; in real life more meaningful aliases should be used.


    In total you can see in Figure [8-4](#475066_1_En_8_Chapter.xhtml#Fig4) that the
    combining of the two dimensions I do manually with the expression list and then
    the combining of the dimension values and the measures automatically creates the
    columns named with the aliases joined by an underscore.


    ![../images/475066_1_En_8_Chapter/475066_1_En_8_Fig4_HTML.jpg](images/475066_1_En_8_Chapter/475066_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Flows with multiple dimensions just have expression lists instead of single expressions


    And those eight column names you see in the output of Listing [8-7](#475066_1_En_8_Chapter.xhtml#PC11):


    ```

    BREWERY_NAME        I17_Q I17_C I18_Q I18_C W17_Q W17_C W18_Q W18_C

    Balthazar Brauerei                          500   3600  400   2800

    Brewing Barbarian   300   1680  500   3920

    Happy Hoppy Hippo   900   6400  800   5680  100   800   100   720

    ```


    The blanks are because the Good Beer Trading Co does not buy any IPA from Balthazar
    Brauerei nor any Wheat beers from Brewing Barbarian.


    Knowing how the pivoting works as an implicit `group by` as I showed earlier about
    do-it-yourself manual pivoting, you can also see that in principle, I did not
    need to reduce the dataset with the `where` clause in lines 10–12. I could simply
    remove those three lines, and my output would be exactly the same. (Since I do
    have all three breweries in my output already, if I had had breweries with no
    purchases at all within the years and product groups I''m after, then there''d
    be output differences in the form of empty rows.)


    However, it would not be a good idea to do so, since the data from the other years
    and other product groups still would be processed; the implicit case structures
    would just mean no data from those other years and product groups would be added
    to the aggregate sums. It would be a waste of CPU cycles and I/O.'
