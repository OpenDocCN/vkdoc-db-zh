    are used, no matter what classifier they have. When I qualify the column names
    with the classifier `strt` and `higher` in lines 30 and 31, I get the values from
    the last of the rows *with that classifier*.


    *   Aggregate functions like `count` in lines 32 and 33 can be `running` or `final`.
    In Listing [22-3](#475066_1_En_22_Chapter.xhtml#PC5), it did not matter, since
    I used `one row per match`, but here it does matter, so I output both to show
    the difference. Line 32 defaults to `running` (aka rolling count) which gives
    a result similar to an analytic function with a window of `rows between unbounded
    preceding and current row`, while line 33 with `final` keyword works similar `to
    rows between unbounded preceding and unbounded following`.


    The output of Listing [22-4](#475066_1_En_22_Chapter.xhtml#PC6) has far more rows
    than are in the table, but I have 14 matches (one for each row in the table) identified
    by 1–14 in the `mn` column. So if I step through the output, here’s the rows for
    the first match:


    ```

    MN  RN  LVL  NAME           ROLL  SUBS  CLS     STNAME   HINAME

    1   1   1    Harold         0     13    STRT    Harold

    1   2   2      Axel         1     13    HIGHER  Harold   Axel

    1   3   3        Jim        2     13    HIGHER  Harold   Jim

    1   4   4          Laura    3     13    HIGHER  Harold   Laura

    1   5   4          Simon    4     13    HIGHER  Harold   Simon

    1   6   3        Maria      5     13    HIGHER  Harold   Maria

    1   7   2      Ursula       6     13    HIGHER  Harold   Ursula

    1   8   3        Lim        7     13    HIGHER  Harold   Lim

    1   9   4          Evelyn   8     13    HIGHER  Harold   Evelyn

    1   10  4          Kurt     9     13    HIGHER  Harold   Kurt

    1   11  4          Susanne  10    13    HIGHER  Harold   Susanne

    1   12  3        Mogens     11    13    HIGHER  Harold   Mogens

    1   13  4          Dan      12    13    HIGHER  Harold   Dan

    1   14  4          Zoe      13    13    HIGHER  Harold   Zoe

    ```


    As my pattern matching is ordered by `rn`, it starts at `rn = 1` (Harold) and
    classifies him `strt` (since any row can match `strt`) and then repeatedly checks
    if the next row has a `lvl` greater than the `lvl` of the `strt` row, which is
    true for all of the remaining 13 rows, as everybody else has a `lvl` greater than
    1. That means that the first match does not stop until it reaches the end of the
    rows.


    Match number 1 has now been found, containing 1 `strt` row and 13 `higher` rows
    as shown in the `cls` column. In the `strt` row, no `higher` rows have been found
    *yet*, so when I qualify a column with `higher` (and I am not using the `final`
    keyword), the result is `null`, as you can see in column `hiname`. This also means
    that when I do the total (`final`) count of `higher` in column `subs`, the `strt`
    row is not counted, and the result is the desired 13 subordinates.


    You can also see in the output how the running total goes in column `roll` and
    that `strt.name` in column `stname` keeps the value of the last (in this case
    only) `strt` row.


    So when the first match is finished, I specified `after match skip to next row`,
    which in this case is `rn = 2` (Axel). He’ll be the `strt` row of match `mn =
    2` in the continued output:


    ```

    2   2   2      Axel         0     4     STRT    Axel

    2   3   3        Jim        1     4     HIGHER  Axel     Jim

    2   4   4          Laura    2     4     HIGHER  Axel     Laura

    2   5   4          Simon    3     4     HIGHER  Axel     Simon

    2   6   3        Maria      4     4     HIGHER  Axel     Maria

    ```


    After Axel as `strt`, this match finds four `higher` rows, because row `rn = 7`
    (Ursula) has `lvl = 2`, which is *not* higher than Axel (it is the same), and
    therefore the match stops with Maria. The counting of subordinates works just
    like before – even though there are five rows in the match, there are only four
    that are classified `higher` and are counted. These rows were also included in
    the count of Harold King’s subordinates in match number 1, but because of skipping
    back up to `rn = 2` to find the next match, these rows are included once more.


    The next row after Axel is Jim, who’ll be the `strt` row of match `mn = 3` that
    is the next in the output:


    ```

    3   3   3        Jim        0     2     STRT    Jim

    3   4   4          Laura    1     2     HIGHER  Jim      Laura

    3   5   4          Simon    2     2     HIGHER  Jim      Simon

    ```


    Match number 3 ends up with one `strt` row and just 2 `higher` rows, since Maria
    (who follows Simon in the `rn` order) does *not* have a `lvl` higher than Jim.
    So Laura and Simon are counted as Jim’s subordinates – just as they also were
    counted under Axel and under Harold.


    The output moves on to match number 4, which starts with Laura classifying her
    as a `strt` row. After her comes Simon, but he has the same `lvl` as Laura. Therefore,
    he cannot be a `higher` row, and the match becomes a match containing only a single
    `strt` row and no `higher` rows, leading to a subordinate count of 0 in the output:


    ```

    4   4   4          Laura    0     0     STRT    Laura

    ```


    And so it goes on and on, until at the end, the match number `mn = 14` is found,
    containing just Zoe:


    ```

    ...

    14  14  4          Zoe      0     0     STRT    Zoe

    ```


    The details of this long output are good to learn how the different pieces of
    `match_recognize` work for this solution. But I can also take just some of the
    columns of the `all rows per match` output and use `pivot` in Listing [22-5](#475066_1_En_22_Chapter.xhtml#PC12)
    to visualize the rows that are part of each match.'
