  在表的 `activity` 列（输出中的 `act`）中，可以存储 `D` 代表离开，`A` 代表到达，或 `P` 代表拣货。当他从一个货位驶离时，他会扫描货位条形码，表中会插入一行
  `D`。到达下一个货位时，他再次扫描货位条形码，创建一行 `A`。然后他会在该货位拣选一个或多个拣货行，每次扫描啤酒时都会创建一个 `P` 行。


  在两端会有一些微小变化。当他开始拣货行程时，会插入一行 `D`，其货位为 `null`。当他完成并返回起点时，同样会插入一行 `A`，其货位也为 `null`。


  除了这个变化，工作遵循一个重复的循环，如图 14-2 所示。


  ![../images/475066_1_En_14_Chapter/475066_1_En_14_Fig2_HTML.jpg](img/475066_1_En_14_Fig2_HTML.jpg)


  图 14-2: 部分拣货日志的时间线


  你可以看到他是如何工作的，一边前进一边扫描货位和啤酒，这个循环不断重复。总是 `D->A->P->D`，并且在一个循环中可能出现不止一个 `P`。


  但有趣的是分析行与行之间的*秒数*，并弄清楚那 25 秒是行驶时间，那 11+8 秒是拣货时间，最后的 11 秒是打包时间。我会展示所有这些，但我首先从简单地计算
  `driving`（行驶）和 `work`（工作，将拣货和打包合并）开始。


  ### 分析出发与到达


  首先，我将简单分析出发和到达，其中出发与到达之间的时间是 `driving` 时间，而到达与出发之间的时间是 `work` 时间（稍后我会查看工作时间中的拣货和打包部分）。在代码清单
  14-2 中，我只查看 `D` 和 `A` 活动。


  ```sql

  SQL> select

  2     list.picker_emp_id as emp

  3   , list.id            as list

  4   , log.log_time

  5   , log.activity       as act

  6   , log.location_id    as loc

  7   , to_char(

  8        lead(log_time) over (

  9           partition by list.id

  10           order by log.log_time

  11        )

  12      , ''HH24:MI:SS''

  13     ) as next_time

