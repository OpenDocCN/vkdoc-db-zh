  那么，为什么我选择使用 `model` 子句而非纯 SQL 来解决生命游戏呢？原因之一在于，标量子查询意味着需要对相同数据进行大量重复读取。通常，我会寻求使用分析函数来避免这种重复的数据访问，但这里的问题在于，我需要对*两个*维度上的一个范围进行求和。例如，如果我尝试使用带有
  `range between 1 preceding and 1 following` 子句的分析 `sum`，我只能在 `x` 或 `y` 维度中的一个上进行，而无法同时在两者上进行。


  使用 `model` 子句解决生命游戏的另一个原因，会在后续我开始在游戏中对更多世代进行迭代计算时变得清晰，因为用纯 SQL 实现这一点远比用 `model`
  子句复杂。请继续阅读，你就会明白我的意思。


