  \n图 6-3\n\n蟾蜍振荡器的两种状态\n\n### 经验总结\n\n在本章中，我使用了一个更“有趣”而本身实用性较低的例子。然而，我这样做是因为它是展示\
  \ `model` 子句某些强大功能的绝佳示例，因此在阅读完本章后，你应该对以下内容有所了解：\n\n*   为 `dimension by` 中的多维数组选择“索引”\n\
  *   定义属性，以在 `measures` 中携带数组每个单元格的值\n*   使用 `[]` 语法在 `rules` 中从一个或多个单元格（使用聚合）检索数据\n\
  *   使用 `iterate` 重复多次规则\n*   使用 `upsert all` 创建新单元格\n\n有了这些“构建模块”，当你遇到适合用这种方法处理数据的用例时，就可以创建自己的\
  \ `model` 子句。\n\n\n\n## 7. 将列转为行\n\n理想情况下，你可能会希望总是使用那些在关系型数据库中已良好规范化的数据，就像计算机科学课程中所教授的那样。但在现实中，情况往往并非如此理想。\n\
  \n一个相当常见的模式是，某些数据拥有一系列列，而你实际上希望将这些数据作为行来处理，例如，以键值对的形式，其中*键*源自原始列名，而*值*则是该列的值。\n\n\
  我个人喜欢使用**维度**和**度量**这两个术语，而不是键和值。你可能会说这只适用于数据仓库，但这些术语也用于其他地方，例如在 SQL 的`model`子句中。在我看来，其优势在于人们通常会考虑多个维度和多个度量，而键值术语最常用于仅考虑单个键和单个值的情况。\n\
  \n将行数据转换为列的操作称为*透视*（*pivoting*）（这是下一章的主题），因此由于这是相反的操作，故称为*逆透视*（*unpivoting*）。我将通过一些示例来展示逆透视操作，这些示例基于包含来自外部源数据的表——当然这并非总是如此，但也并不少见。\n\
  \n### 以列形式接收的数据\n\n为了举例说明逆透视，我将使用图 7-1 所示的两个表。\n\n![../images/475066_1_En_7_Chapter/475066_1_En_7_Fig1_HTML.jpg](img/475066_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\n\n保存从网络提供商接收的传入数据的表\n\nGood Beer Trading Co 使用外部服务来收集关于公司网店访客的统计数据。该服务提供每日统计数据，这些数据被导入到以下两个表中：\n\
  \n*   表 `web_devices` 中保存了每日关于网店访客中有多少来自个人电脑（PC）、平板电脑和手机的统计信息，每种设备类型的访客数存储在单独的列中。\n\
  *   表 `web_demographics` 中同时保存了访客数量以及访客最终购买的数量。数量和购买量都按男性与女性访客分开，并且按来自 Twitter 活动与来自\
  \ Facebook 活动的访客分开。因此，例如，列 `m_tw_cnt` 是来自 Twitter 的男性访客数，而列 `f_fb_qty` 是来自 Facebook\
  \ 的女性访客的购买量。\n\n我将在这些表上演示各种逆透视方法。\n\n### 逆透视为行\n\n首先，我查看一下表 `web_devices` 的内容，见清单\
  \ 7-1。\n\n```\nSQL> select day, pc, tablet, phone\n2  from web_devices\n3  order\
  \ by day;\nDAY         PC    TABLET  PHONE\n2019-05-01  1042  812     1610\n2019-05-02\
  \  967   1102    2159\n清单 7-1\n每日按设备的网站访问量\n```\n\n我现在想要做的是对这些数据进行*逆透视*，使用一个包含设备（PC、平板或手机）的单一维度列，以及一个包含该设备访客数（即来自表中对应列的值）的单一度量列。\n\
  \n第一种方法是使用 `select` 语句的 `unpivot` 子句，如清单 7-2 所示。\n\n```\nSQL> select day, device,\
  \ cnt\n2  from web_devices\n3  unpivot (\n4     cnt\n5     for device\n6     in\
  \ (\n7        pc     as 'PC'\n8      , tablet as 'Tablet'\n9      , phone  as 'Phone'\n\
  10     )\n11  )\n12  order by day, device;\n清单 7-2\n使用 unpivot 获取维度和度量\n```\n\n\
  `unpivot` 子句由三部分组成：\n\n*   首先必须定义度量——本例中是第 4 行的 `cnt`。这是一个不存在但将被创建的列；我只是定义应有一个名为\
  \ `cnt` 的单一度量。\n*   然后我定义度量应存在的维度——第 5 行使用关键字 `for`，后跟维度名称 `device`。这同样是一个将被创建的不存在的列。\n\
  *   最后，第 6-10 行的 `in` 子句定义了从原始列到新的度量列和维度列的映射。这里我定义了三个映射（第 7-9 行），这意味着每个输入行将生成三个输出行：\n\
  \    *   一行，`cnt` 中为来自 `pc` 的值，`device` 中为字符串 `'PC'`\n    *   一行，`cnt` 中为来自 `tablet`\
  \ 的值，`device` 中为字符串 `'Tablet'`\n    *   一行，`cnt` 中为来自 `phone` 的值，`device` 中为字符串\
  \ `'Phone'`\n\n图 7-2 展示了数据流——根据 `in` 子句中的映射规则，左侧*列*的值流向度量列，右侧的*字面量*流向维度列。\n\n![../images/475066_1_En_7_Chapter/475066_1_En_7_Fig2_HTML.jpg](img/475066_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2\n\n单一维度和度量值的流动\n\n我在 `in` 子句中指定的原始表的那些列将不会出现在输出中，因为它们及其值已被转换为维度和度量。表的任何*其他*列都将原样输出——本例中只有\
  \ `day` 列，但如果存在其他列，它们也会出现在输出中。\n\n总的来说，清单 7-2 给出了如下输出，每天三行，每行对应一种设备类型，正如我所希望的那样完成了逆透视：\n\
  \n```\nDAY         DEVICE  CNT\n2019-05-01  PC      1042\n2019-05-01  Phone   1610\n\
  2019-05-01  Tablet  812\n2019-05-02  PC      967\n2019-05-02  Phone   2159\n2019-05-02\
  \  Tablet  1102\n```\n\n\n\n#### 自己动手实现逆透视\n\n但还有一种不使用 `unpivot` 子句来逆透视的方法。在版本 10\
  \ 之前，你必须手动完成，我将展示几个手动逆透视的版本。了解它会很有帮助，这样如果你在旧代码中看到它，就能明白其中发生了什么。而且在极少数情况下，你可能有些复杂的情况不太适合\
  \ `unpivot` 子句，用这种方式实现反而更容易。\n\n两种版本的基本思路是：我需要生成与维度值数量一样多的行。使用 `unpivot` 子句时，这些行会根据\
  \ `in` 列表中的表达式数量自动生成——在清单 7-3 中，我使用 `select from dual` 手动生成了三行。\n\n```\nSQL> select\n\
  2     wd.day\n3   , case r.rn\n4        when 1 then 'PC'\n5        when 2 then 'Tablet'\n\
  6        when 3 then 'Phone'\n7     end as device\n8   , case r.rn\n9        when\
  \ 1 then wd.pc\n10        when 2 then wd.tablet\n11        when 3 then wd.phone\n\
  12     end as cnt\n13  from web_devices wd\n14  cross join (\n15     select level\
  \ as rn from dual connect by level <= 3\n16  ) r\n17  order by day, device;\n清单\
  \ 7-3\n使用编号行生成器进行手动逆透视\n```\n\n在内联视图 `r` 中，我在第 15 行生成了编号为 1、2、3 的三行。利用这些行，我与 `web_devices`\
  \ 表进行了笛卡尔积连接（第 14 行），因此对于 `web_devices` 中的每一行，输出中都会得到三行。\n\n然后，我使用两个 `case` 结构来处理我的维度和度量：\n\
  \n*   第 3-7 行将维度 `device` 的字面值分别放入第一、第二和第三个生成的行中。\n*   第 8-12 行将来自 `pc`、`tablet`\
  \ 和 `phone` 列的计数值放入度量 `cnt` 的相同行中。\n\n这使得清单 7-3 产生的输出与清单 7-2 完全相同，只是通过手动逆透视实现。\n\
  \n清单 7-4 是另一种手动逆透视方法，也能产生相同的输出。\n\n```\nSQL> with devices( device ) as (\n2    \
  \ select 'PC'     from dual union all\n3     select 'Tablet' from dual union all\n\
  4     select 'Phone'  from dual\n5  )\n6  select\n7     wd.day\n8   , d.device\n\
  9   , case d.device\n10        when 'PC'     then wd.pc\n11        when 'Tablet'\
  \ then wd.tablet\n12        when 'Phone'  then wd.phone\n13     end as cnt\n14 \
  \ from web_devices wd\n15  cross join devices d\n16  order by day, device;\n清单 7-4\n\
  使用维度样式行生成器进行手动逆透视\n```\n\n清单 7-3 使用 `case` 结构来定义在第 1 行、第 2 行和第 3 行放入什么数据，而清单 7-4\
  \ 则生成已经包含维度所需值的三行。这里我选择将生成器放在第 1-5 行的 `with` 子句中，而不是内联视图，但效果是一样的。\n\n我同样在 15 行与生成的行进行了笛卡尔积连接，但现在我不再需要两个\
  \ `case` 结构了。对于维度值，我可以在第 8 行直接使用生成行中的列，这样在 9-13 行只需要一个 `case` 结构来处理我的度量。这里的区别在于，我不是使用“第\
  \ 1 行、第 2 行、第 3 行”，而是使用维度的值。\n\n使用 `with` 子句也很好地说明了 `devices` 本可以是一个真实的表，而不是 `with`\
  \ 子句中生成的行——那么查询将只由第 6-16 行组成。但请注意，这不会是一个*动态*的逆透视——即使维度值来自表，我仍然需要将这些值硬编码到 `case`\
  \ 结构中。它*可以*是动态的，但这需要动态 SQL。我将在本章后面展示一个这样的例子。\n\n#### 多个维度和/或多个度量\n\n前面的例子使用了具有单个维度和单个度量的\
  \ `web_devices` 表；现在我将展示如何处理多个维度和度量。你在本章开头看到了 `web_demographics` 表的图表；清单 7-5 展示了其内容。\n\
  \n```\nSQL> select\n2     day\n3   , m_tw_cnt\n4   , m_tw_qty\n5   , m_fb_cnt\n\
  6   , m_fb_qty\n7   , f_tw_cnt\n8   , f_tw_qty\n9   , f_fb_cnt\n10   , f_fb_qty\n\
  11  from web_demographics\n12  order by day;\n清单 7-5\n按性别和渠道划分的每日网站访问量和购买量\n```\n\
  \n展示所有这些列格式不太美观，但你可以看到八列，它们都是两个度量（`cnt` 和 `qty`）对于维度 `gender` 的两个值（`m` 和 `f`）以及维度\
  \ `channel` 的两个值（`tw` 和 `fb`）的所有组合：\n\n```\nDAY         M_TW_CNT  M_TW_QTY  M_FB_CNT\
  \  M_FB_QTY  F_TW_CNT  F_TW_QTY  F_FB_CNT  F_FB_QTY\n2019-05-01  1232      86  \
  \      1017      64        651       76        564       68\n2019-05-02  1438  \
  \    142       1198      70        840       92        752       78\n```\n\n使用 `unpivot`\
  \ 处理多个维度和/或多个度量的语法与清单 7-2 中单个维度/度量的做法几乎完全相同——除了需要使用*表达式列表*而不是单个表达式，如清单 7-6 所示。\n\
  \n```\nSQL> select day, gender, channel, cnt, qty\n2  from web_demographics\n3 \
  \ unpivot (\n4     ( cnt, qty )\n5     for ( gender, channel )\n6     in (\n7  \
  \      (m_tw_cnt, m_tw_qty) as ('Male'  , 'Twitter' )\n8      , (m_fb_cnt, m_fb_qty)\
  \ as ('Male'  , 'Facebook')\n9      , (f_tw_cnt, f_tw_qty) as ('Female', 'Twitter'\
  \ )\n10      , (f_fb_cnt, f_fb_qty) as ('Female', 'Facebook')\n11     )\n12  )\n\
  13  order by day, gender, channel;\n清单 7-6\n使用 unpivot 处理两个维度和两个度量\n```\n\n表达式列表是括号内用逗号分隔的表达式列表——括号是识别表达式列表所必需的，而不仅仅是为了提高可读性。在代码中，我在多个地方使用了表达式列表：\n\
  \n*   在第 4 行，表达式列表定义了*两个*度量 `cnt` 和 `qty`——和之前一样，它们是要创建的列，而不是表中的列。\n*   第 5 行的表达式列表以类似方式定义了两个维度。\n\
  *   第 7-10 行中的每个映射则使用了两个各包含两列的表达式列表——左侧是一个包含表中两列的表达式列表，右侧是一个包含两个字面量的表达式列表。\n\n所有这些导致每个输入行产生四个输出行——因为\
  \ `in` 子句中有四个映射：\n\n```\nDAY         GENDER  CHANNEL   CNT   QTY\n2019-05-01  Female\
  \  Facebook  564   68\n2019-05-01  Female  Twitter   651   76\n2019-05-01  Male\
  \    Facebook  1017  64\n2019-05-01  Male    Twitter   1232  86\n2019-05-02  Female\
  \  Facebook  752   78\n2019-05-02  Female  Twitter   840   92\n2019-05-02  Male\
  \    Facebook  1198  70\n2019-05-02  Male    Twitter   1438  142\n```\n\n在图 7-3\
  \ 中，我展示了流程仍然相同——就像图 7-2 一样——以及表达式列表是如何对应的。`as` 关键字左侧的表列值流向度量，`as` 关键字右侧的字面量流向维度。\n\
  \n![../images/475066_1_En_7_Chapter/475066_1_En_7_Fig3_HTML.jpg](img/475066_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3\n多个维度和度量值的流向\n\n观察图表也可以清楚地看到，包含表列（左侧）的表达式列表必须与定义度量的表达式列表具有相同数量的列。同样，包含字面量（右侧）的表达式列表必须与定义维度的表达式列表具有相同数量的字面量。\n\
  \n\n### 维度与度量的组合\n\n但维度的数量不一定需要与度量的数量相等——你可以拥有许多维度和很少或一个度量，反之亦然。我将为你展示一些这方面的例子。\n\
  \n#### 单维度多度量\n\n第一个例子是列表 7-7，其中展示了使用单个维度和两个度量。\n\n```sql\nSQL> select day, gender_and_channel,\
  \ cnt, qty\n2  from web_demographics\n3  unpivot (\n4     ( cnt, qty )\n5     for\
  \ gender_and_channel\n6     in (\n7        (m_tw_cnt, m_tw_qty) as 'Male on Twitter'\n\
  8      , (m_fb_cnt, m_fb_qty) as 'Male on Facebook'\n9      , (f_tw_cnt, f_tw_qty)\
  \ as 'Female on Twitter'\n10     , (f_fb_cnt, f_fb_qty) as 'Female on Facebook'\n\
  11     )\n12  )\n13  order by day, gender_and_channel;\nListing 7-7\n使用 unpivot\
  \ 操作，包含一个复合维度和两个度量\n```\n\n第 4 行的度量表达式列表与第 7-10 行的左侧表列表达式列表相匹配。然后第 5 行只定义了一个维度（因此没有括号），相应地，第\
  \ 7-10 行右侧的字面量也只是单个字面量。\n\n这样，我得到一个包含单个维度列 `gender_and_channel` 的输出——尽管在这种情况下我选择让它成为一个“复合”维度，仍然携带两种类型的信息：\n\
  \n```sql\nDAY         GENDER_AND_CHANNEL  CNT   QTY\n2019-05-01  Female on Facebook\
  \  564   68\n2019-05-01  Female on Twitter   651   76\n2019-05-01  Male on Facebook\
  \    1017  64\n2019-05-01  Male on Twitter     1232  86\n2019-05-02  Female on Facebook\
  \  752   78\n2019-05-02  Female on Twitter   840   92\n2019-05-02  Male on Facebook\
  \    1198  70\n2019-05-02  Male on Twitter     1438  142\n```\n\n#### 简化维度信息\n\n\
  当然，我并非必须这样做；如果我愿意，我可以选择丢弃信息，只保留一个“非复合”维度，仅包含性别信息并丢弃渠道信息，如列表 7-8 所示。\n\n```sql\n\
  SQL> select day, gender, cnt, qty\n2  from web_demographics\n3  unpivot (\n4   \
  \  ( cnt, qty )\n5     for gender\n6     in (\n7        (m_tw_cnt, m_tw_qty) as\
  \ 'Male'\n8      , (m_fb_cnt, m_fb_qty) as 'Male'\n9      , (f_tw_cnt, f_tw_qty)\
  \ as 'Female'\n10     , (f_fb_cnt, f_fb_qty) as 'Female'\n11     )\n12  )\n13  order\
  \ by day, gender;\nListing 7-8\n使用 unpivot 操作，包含一个单一维度和两个度量\n```\n\n但请注意，即使我只保留了性别维度信息（只有两个不同的值），对于每个输入行，我仍然在输出中得到四行：\n\
  \n```sql\nDAY         GENDER  CNT   QTY\n2019-05-01  Female  564   68\n2019-05-01\
  \  Female  651   76\n2019-05-01  Male    1017  64\n2019-05-01  Male    1232  86\n\
  2019-05-02  Female  840   92\n2019-05-02  Female  752   78\n2019-05-02  Male   \
  \ 1438  142\n2019-05-02  Male    1198  70\n```\n\n#### 手动聚合数据\n\n换句话说，重复相同的维度值字面量并不会自动按维度进行聚合。如果那是我想要的输出，我可以使用列表\
  \ 7-9 来自己执行聚合。\n\n```sql\nSQL> select day\n2       , gender\n3       , sum(cnt)\
  \ as cnt\n4       , sum(qty) as qty\n5  from web_demographics\n6  unpivot (\n7 \
  \    ( cnt, qty )\n8     for gender\n9     in (\n10        (m_tw_cnt, m_tw_qty)\
  \ as 'Male'\n11      , (m_fb_cnt, m_fb_qty) as 'Male'\n12      , (f_tw_cnt, f_tw_qty)\
  \ as 'Female'\n13      , (f_fb_cnt, f_fb_qty) as 'Female'\n14     )\n15  )\n16 \
  \ group by day, gender\n17  order by day, gender;\nListing 7-9\n使用 unpivot 操作，包含一个聚合维度和两个度量\n\
  ```\n\n允许直接在 `unpivot` 查询中使用 `group by` 和聚合函数（如 `sum`）——我不需要将其包装在内联视图中。这样，对于每个原始输入行，我只能得到两行——每个性别一行：\n\
  \n```sql\nDAY         GENDER  CNT   QTY\n2019-05-01  Female  1215  144\n2019-05-01\
  \  Male    2249  150\n2019-05-02  Female  1592  170\n2019-05-02  Male    2636  212\n\
  ```\n\n#### 多维度单度量\n\n当然，我也可以反过来做——两个维度和一个度量。例如，在列表 7-10 中，我只保留了 `cnt` 度量，丢弃了 `qty`\
  \ 信息。\n\n```sql\nSQL> select day, gender, channel, cnt\n2  from web_demographics\n\
  3  unpivot (\n4     cnt\n5     for ( gender, channel )\n6     in (\n7        m_tw_cnt\
  \ as ('Male'  , 'Twitter' )\n8      , m_fb_cnt as ('Male'  , 'Facebook')\n9    \
  \  , f_tw_cnt as ('Female', 'Twitter' )\n10     , f_fb_cnt as ('Female', 'Facebook')\n\
  11     )\n12  )\n13  order by day, gender, channel;\nListing 7-10\n使用 unpivot 操作，包含两个维度和一个度量\n\
  ```\n\n你再次看到匹配：我为度量使用单个表达式，也为左侧的表列使用单个表达式；我为维度使用表达式列表，也为右侧的字面量使用表达式列表。正如你可以想到的，我得到了包含所有八行的输出，只是没有\
  \ `qty` 列：\n\n```sql\nDAY         GENDER  CHANNEL   CNT\n2019-05-01  Female  Facebook\
  \  564\n2019-05-01  Female  Twitter   651\n2019-05-01  Male    Facebook  1017\n\
  2019-05-01  Male    Twitter   1232\n2019-05-02  Female  Facebook  752\n2019-05-02\
  \  Female  Twitter   840\n2019-05-02  Male    Facebook  1198\n2019-05-02  Male \
  \   Twitter   1438\n```\n\n#### 多维多度量与总结\n\n手动反透视也可以使用多个维度和度量来完成，但我不会向你展示像之前那样使用\
  \ `dual` 生成行的例子（这将留给读者作为练习）。相反，我将使用真实的维度表来展示它。\n\n\n#### 使用维度表\n\n因此，我将添加两个表来存储两个维度的值：`gender_dim`\
  \ 和 `channels_dim`，它们定义在图 7-4 中。\n\n![../images/475066_1_En_7_Chapter/475066_1_En_7_Fig4_HTML.jpg](img/475066_1_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4\n维度表\n\n代码清单 7-11 展示了我在 `gender_dim` 中输入的男性（M）和女性（F）的值：\n\n```\nSQL> select\
  \ letter, name\n2  from gender_dim\n3  order by letter;\nLETTER  NAME\nF       Female\n\
  M       Male\n代码清单 7-11\n性别维度表\n```\n\n同样地，代码清单 7-12 展示了表 `channels_dim` 中 Twitter\
  \ 和 Facebook 的值。\n\n```\nSQL> select id, name, shortcut\n2  from channels_dim\n\
  3  order by id;\nID  NAME      SHORTCUT\n42  Twitter   tw\n44  Facebook  fb\n代码清单\
  \ 7-12\n渠道维度表\n```\n\n回顾一下，我之前通过与一些生成行进行笛卡尔积连接来手动执行逆透视（unpivot）。当我在代码清单 7-13 中使用我的维度表时，我只需对两个表都执行笛卡尔积连接，这样对于表\
  \ `web_demographics` 中的每一行输入，我都能获得 `gender_dim` 和 `channels_dim` 中所有行组合对应的一行。\n\n\
  ```\nSQL> select\n2     d.day\n3   , g.letter as g_id\n4   , c.id as ch_id\n5  \
  \ , case g.letter\n6        when 'M' then\n7           case c.shortcut\n8      \
  \        when 'tw' then d.m_tw_cnt\n9              when 'fb' then d.m_fb_cnt\n10\
  \           end\n11        when 'F' then\n12           case c.shortcut\n13     \
  \         when 'tw' then d.f_tw_cnt\n14              when 'fb' then d.f_fb_cnt\n\
  15           end\n16     end as cnt\n17   , case g.letter\n18        when 'M' then\n\
  19           case c.shortcut\n20              when 'tw' then d.m_tw_qty\n21    \
  \          when 'fb' then d.m_fb_qty\n22           end\n23        when 'F' then\n\
  24           case c.shortcut\n25              when 'tw' then d.f_tw_qty\n26    \
  \          when 'fb' then d.f_fb_qty\n27           end\n28     end as qty\n29  from\
  \ web_demographics d\n30  cross join gender_dim g\n31  cross join channels_dim c\n\
  32  order by day, g_id, ch_id;\n代码清单 7-13\n使用维度表进行手动逆透视\n```\n\n自下而上解释，我在第 30 和\
  \ 31 行使用 `cross join` 执行了笛卡尔积连接。\n\n为每行输入创建了四行之后，我对每个度量值使用了两个 `case` 结构——第 5-16\
  \ 行用于 `cnt`，第 17-28 行用于 `qty`。每个结构将维度表中的值映射到 `web_demographics` 中的特定列。如果维度表中存在更多未在\
  \ `case` 结构中列出的值，它们将在输出中生成行，并且度量值列中将包含 `null` 值。\n\n在第 3 行和第 4 行，我直接从维度表中获取维度的值。由于我有真正的维度表，这里我选择使用维度表的主键而不是文本描述——这样，如果我愿意，这个结果可以直接插入到一个与维度表具有外键关系的表中：\n\
  \n```\nDAY         G_ID  CH_ID  CNT   QTY\n2019-05-01  F     42     651   76\n2019-05-01\
  \  F     44     564   68\n2019-05-01  M     42     1232  86\n2019-05-01  M     44\
  \     1017  64\n2019-05-02  F     42     840   92\n2019-05-02  F     44     752\
  \   78\n2019-05-02  M     42     1438  142\n2019-05-02  M     44     1198  70\n\
  ```\n\n作为一个有趣的小知识，我想提到我尝试过像下面这样使用表达式列表来编写 `case` 表达式：\n\n```\n5   , case (g.letter,\
  \ c.shortcut)\n6        when ('M', 'tw') then d.m_tw_cnt\n7        when ('M', 'fb')\
  \ then d.m_fb_cnt\n8        when ('F', 'tw') then d.f_tw_cnt\n9        when ('F',\
  \ 'fb') then d.f_fb_cnt\n10     end as cnt\n```\n\n但这给了我一个错误——对于简单的 `case` 表达式，这种语法不受支持。我认为那样写本来会很好，但也许在未来的版本中会允许，谁知道呢。\n\
  \n如前所述，即使在这样使用维度表时，我仍然是在硬编码值——因此，我将在本章结束时给出一个如何使其真正动态化的示例。\n\n\n##### 动态映射到维度表\n\
  \n为了实现真正动态的、根据维度表数值进行的**逆透视**转换，我需要专门生成用于 `in` 子句的映射。为此，我创建了列表 7-14 中的查询。\n\n```\n\
  SQL> select\n2     s.cnt_col, s.qty_col\n3   , s.g_id, s.gender\n4   , s.ch_id,\
  \ s.channel\n5  from (\n6     select\n7        lower(\n8           g.letter || '_'\
  \ || c.shortcut || '_cnt'\n9        ) as cnt_col\n10      , lower(\n11         \
  \  g.letter || '_' || c.shortcut || '_qty'\n12        )as qty_col\n13      , g.letter\
  \ as g_id\n14      , g.name as gender\n15      , c.id as ch_id\n16      , c.name\
  \ as channel\n17     from gender_dim g\n18     cross join channels_dim c\n19  )\
  \ s\n20  join user_tab_columns cnt_c\n21     on cnt_c.column_name = upper(s.cnt_col)\n\
  22  join user_tab_columns qty_c\n23     on qty_c.column_name = upper(s.cnt_col)\n\
  24  where cnt_c.table_name = 'WEB_DEMOGRAPHICS'\n25  and   qty_c.table_name = 'WEB_DEMOGRAPHICS'\n\
  26  order by gender, channel;\n列表 7-14\n准备映射到维度值的列名\n```\n\n我需要获取两个维度表中所有可能的值组合，因此在第\
  \ 17-18 行使用了笛卡尔连接。利用两个表中的 `letter` 和 `shortcut` 列值，在第 7-9 行和第 10-12 行，我生成了 `web_demographics`\
  \ 表中相应列的名称。（严格来说，我在这里并不真正需要使用 `lower` 函数，我只是为了在后续检查生成的代码时更易读。）\n\n由于如果维度表中的值不能正确反映\
  \ `web_demographics` 表中的列，可能会导致运行时错误，因此我将其包装在一个内联视图中，并连接到 `user_tab_columns` 以确保只检索确实存在的列。\n\
  \n总的来说，这个查询向我展示了 `in` 子句映射所需的数据：\n\n```\nCNT_COL   QTY_COL   G_ID  GENDER  CH_ID\
  \  CHANNEL\nf_fb_cnt  f_fb_qty  F     Female  44     Facebook\nf_tw_cnt  f_tw_qty\
  \  F     Female  42     Twitter\nm_fb_cnt  m_fb_qty  M     Male    44     Facebook\n\
  m_tw_cnt  m_tw_qty  M     Male    42     Twitter\n```\n\n有了这个查询，我将使用 PL/SQL 来构建包含\
  \ `unpivot` 的动态 SQL。首先，为了调试目的，我开启服务器输出：\n\n```\nSQL> set serveroutput on\n```\n\n\
  然后，我创建一个 `sqlcl`（或 `SQL*Plus`）绑定变量来保存我动态生成的游标：\n\n```\nSQL> variable unpivoted refcursor\n\
  ```\n\n接下来，我准备执行列表 7-15 中的匿名 PL/SQL 块来构建动态 SQL。\n\n```\nSQL> declare\n2     v_unpivot_sql\
  \  varchar2(4000);\n3  begin\n4     for c in (\n5        select\n6           s.cnt_col,\
  \ s.qty_col\n7         , s.g_id, s.gender\n8         , s.ch_id, s.channel\n9   \
  \     from (\n10           select\n11              lower(\n12                 g.letter\
  \ || '_' || c.shortcut || '_cnt'\n13              ) as cnt_col\n14            ,\
  \ lower(\n15                 g.letter || '_' || c.shortcut || '_qty'\n16       \
  \       )as qty_col\n17            , g.letter as g_id\n18            , g.name as\
  \ gender\n19            , c.id as ch_id\n20            , c.name as channel\n21 \
  \          from gender_dim g\n22           cross join channels_dim c\n23       \
  \ ) s\n24        join user_tab_columns cnt_c\n25           on cnt_c.column_name\
  \ = upper(s.cnt_col)\n26        join user_tab_columns qty_c\n27           on qty_c.column_name\
  \ = upper(s.cnt_col)\n28        where cnt_c.table_name = 'WEB_DEMOGRAPHICS'\n29\
  \        and   qty_c.table_name = 'WEB_DEMOGRAPHICS'\n30        order by gender,\
  \ channel\n31     ) loop\n\n33        if v_unpivot_sql is null then\n34        \
  \   v_unpivot_sql := q'[\n35              select day, g_id, ch_id, cnt, qty\n36\
  \              from web_demographics\n37              unpivot (\n38            \
  \     ( cnt, qty )\n39                 for ( g_id, ch_id )\n40                 in\
  \ (\n41                    ]';\n42        else\n43           v_unpivot_sql := v_unpivot_sql\
  \ || q'[\n44                  , ]';\n45        end if;\n\n47        v_unpivot_sql\
  \ := v_unpivot_sql\n48                      || '(' || c.cnt_col\n49            \
  \          || ', ' || c.qty_col\n50                      || ') as (''' || c.g_id\n\
  51                      || ''', ' || c.ch_id\n52                      || ')';\n\n\
  54     end loop;\n\n56     v_unpivot_sql := v_unpivot_sql || q'[\n57           \
  \      )\n58              )\n59              order by day, g_id, ch_id]';\n\n60\
  \     dbms_output.put_line(v_unpivot_sql);\n\n61     open :unpivoted for v_unpivot_sql;\n\
  62  end;\n63  /\n列表 7-15\n动态构建逆透视查询\n```\n\n在列表 7-14 的查询中，我在第 4 行开始放入了一个游标 `for`\
  \ 循环。在第 33 行，我检查这是否是循环中的第一行数据。如果是，则在第 34-41 行，我生成正在构建的 SQL 语句的开头。如果不是，则在第 43-44\
  \ 行，我生成一个新行和一个逗号作为映射之间的分隔符。\n\n第 47-52 行为 `in` 子句生成每个单独的映射，当循环结束时，第 56-59 行追加待生成\
  \ SQL 的最后部分。\n\n然后，第 60 行将生成的 SQL 发送到服务器输出以供调试，这样我就可以在字符串变量 `v_unpivot_sql` 中看到生成的\
  \ SQL 片段：\n\n```\nselect day, g_id, ch_id, cnt, qty\nfrom web_demographics\nunpivot\
  \ (\n( cnt, qty )\nfor ( g_id, ch_id )\nin (\n(f_fb_cnt, f_fb_qty) as ('F', 44)\n\
  , (f_tw_cnt, f_tw_qty) as ('F', 42)\n, (m_fb_cnt, m_fb_qty) as ('M', 44)\n, (m_tw_cnt,\
  \ m_tw_qty) as ('M', 42)\n)\n)\norder by day, g_id, ch_id\n```\n\n它看起来符合我的要求，`in`\
  \ 子句中为维度表中的每个值组合提供了一个映射。实际上，这与列表 7-6 类似，只不过它使用的是两个维度表的主键，而不是描述性名称。\n\n该代码块的第 61\
  \ 行使用字符串变量 `v_unpivot_sql` 中的动态创建的 SQL 打开了绑定变量 `unpivoted`（我在调用代码块之前创建的）。然后代码块就完成了：\n\
  \n```\nPL/SQL 过程已成功完成。\n```\n\n我可以看到该游标是否检索到了我想要的输出：\n\n```\nSQL> print unpivoted\n\
  ```\n\n看啊——我得到了与列表 7-13 相同的输出：\n\n```\nDAY        G      CH_ID        CNT      \
  \  QTY\n---------- - ---------- ---------- ----------\n2019-05-01 F         42 \
  \       651         76\n2019-05-01 F         44        564         68\n2019-05-01\
  \ M         42       1232         86\n2019-05-01 M         44       1017       \
  \  64\n2019-05-02 F         42        840         92\n2019-05-02 F         44  \
  \      752         78\n2019-05-02 M         42       1438        142\n2019-05-02\
  \ M         44       1198         70\n```\n\n动态特性会在例如统计服务添加了 Instagram 的数据，从而使 `web_demographics`\
  \ 表新增四列（男性和女性的 Instagram 数据数量）时发挥作用。\n\n在这种情况下，使用列表 7-6（或列表 7-13）需要我在代码中手动添加映射——修改\
  \ SQL。但如果我使用列表 7-15 中的动态技术，我只需要在 `web_channel` 维度表中为 Instagram 插入数据，代码就会自动生成映射，产生类似这样的结果：\n\
  \n```\nin (\n(f_fb_cnt, f_fb_qty) as ('F', 44)\n, (f_in_cnt, f_in_qty) as ('F',\
  \ 46)\n, (f_tw_cnt, f_tw_qty) as ('F', 42)\n, (m_fb_cnt, m_fb_qty) as ('M', 44)\n\
  , (m_in_cnt, m_in_qty) as ('M', 46)\n, (m_tw_cnt, m_tw_qty) as ('M', 42)\n)\n```\n\
  \n（假设 Instagram 的 `id = 46` 且 `shortcut` = `'in'`。）\n\n这种动态方法使用生成的 SQL 打开游标，因此它必须在每次运行时生成\
  \ SQL。有时你可能有这样做的需求，但在许多情况下，我更倾向于将其用作代码生成器方法。\n\n\n这样，当添加 Instagram 列时，你首先在维度表中插入\
  \ Instagram，然后运行清单 `7-15`（只需移除第 63 行），最后从输出中获取生成的查询，将其复制到你的实际代码中并进行编译。你获得了动态生成代码的好处，大大减少了出错的机会，但又不会遭受始终构建动态字符串所带来的运行时性能损失。\n\
  \n如果数据变化非常频繁，当然，你可能需要完全动态的方式。然而，对于这种情况，很可能此类变化很少见，并且通常只在发布新的应用程序功能时才会发生。**生成器方法**非常适合这类情况。\n\
  \n### 经验教训\n\n逆透视是一项有用的技能，特别是在处理未按照关系数据库常规方式进行规范化的数据时。在本章中，我向你展示了这个主题的不同变体：\n\n\
  *   使用`unpivot`子句的三个元素进行逆透视：度量、维度和映射\n*   使用单个表达式或表达式列表来逆透视单个或多个度量及/或维度\n*   用于实际旧数据库或真正特殊情况的`unpivot`子句的手动替代方法\n\
  *   基于维度表中的值，在 PL/SQL 中构建动态的`unpivot` SQL 语句\n\n如果你理解了逆透视的概念，并且能记住（或查找）在`unpivot`中使用`for`和`in`的语法，你会发现这些方法在很多场景下都很有用。\n\
  \n## 8. 将行透视为列\n\n上一章是关于逆透视的，即将列转换为行的过程。相反的操作称为透视——不出所料——是将行转换为列。\n\n其核心思想是：你有一个结果集，其中一列或多列包含维度值，另一列或多列包含事实/度量值。你希望输出结果按其他一些列进行分组，这样对于这些值就只有一行聚合数据，然后你的度量值应该被放置到一组列中，每个维度值（或者如果你有多个维度，则是维度值的组合）对应一列。\n\
  \n这里需要记住的一点是，在 SQL 中，解析引擎需要在解析时就能确定每一列的名称和数据类型。这意味着你必须硬编码维度值以及它们应该被转换成的列名。\n\n如果你希望进行动态透视，即自动为数据中的每个维度值创建列，你需要像我在上一章末尾展示的那样，使用动态\
  \ SQL 来构建它。这样每次运行时都会进行一次解析，此时列名就可以被获知。或者，`pivot`子句支持返回 XML 而不是列，这让你无需动态 SQL 即可实现动态透视——如果\
  \ XML 输出可以接受的话，这可能是一个选项。本书将不涵盖这两种动态透视的方法。\n\n提示\n\n在 Oracle 18c 或更新版本中，有第三种使用多态表函数的动态透视方法。本书不会涵盖\
  \ PTF，但 Oracle AskTom 团队的 Chris Saxon 在 Live SQL 上有一个用于动态透视的 PTF 示例：`https://livesql.oracle.com/apex/livesql/file/content_HPN95108FSSZD87PXX7MG3LW3.html`。\n\
  \n### 用于透视的表\n\n精酿啤酒贸易公司从一些啤酒厂采购啤酒，信息存储在如图 `8-1` 所示的 `purchases` 表中，以及维度查找表 `breweries`、`products`\
  \ 和 `product_groups`。\n\n![../images/475066_1_En_8_Chapter/475066_1_En_8_Fig1_HTML.jpg](img/475066_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\n采购表及关联的维度表\n\n我将按啤酒厂、产品组和年份来演示数据的透视。为此，我使用清单 `8-1` 中的视图 `purchases_with_dims`，它只是将\
  \ `purchases` 表与维度表连接起来。\n\n```\nSQL> create or replace view purchases_with_dims\n\
  2  as\n3  select\n4     pu.id\n5   , pu.purchased\n6   , pu.brewery_id\n7   , b.name\
  \ as brewery_name\n8   , pu.product_id\n9   , p.name as product_name\n10   , p.group_id\n\
  11   , pg.name as group_name\n12   , pu.qty\n13   , pu.cost\n14  from purchases\
  \ pu\n15  join breweries b\n16     on b.id = pu.brewery_id\n17  join products p\n\
  18     on p.id = pu.product_id\n19  join product_groups pg\n20     on pg.id = p.group_id;\n\
  View PURCHASES_WITH_DIMS created.\n```\n\n清单 8-1\n连接采购表与维度的视图\n\n首先，我将按啤酒厂、产品组和年份对数量进行聚合，如清单\
  \ `8-2` 所示，这是一个简单的 `group by`，没有任何透视。\n\n```\nSQL> select\n2     brewery_name\n\
  3   , group_name\n4   , extract(year from purchased) as yr\n5   , sum(qty) as qty\n\
  6  from purchases_with_dims pwd\n7  group by\n8     brewery_name\n9   , group_name\n\
  10   , extract(year from purchased)\n11  order by\n12     brewery_name\n13   , group_name\n\
  14   , yr;\n```\n\n清单 8-2\n按啤酒厂和产品组统计的年度采购数量\n\n输出显示，该公司从三家啤酒厂采购，每家啤酒厂有两个不同的产品组，采购时间跨越\
  \ 2016 年至 2018 年这三年，这些组合共产生了 18 行数据：\n\n```\nBREWERY_NAME        GROUP_NAME  YR\
  \    QTY\nBalthazar Brauerei  Belgian     2016  800\nBalthazar Brauerei  Belgian\
  \     2017  1000\nBalthazar Brauerei  Belgian     2018  1000\nBalthazar Brauerei\
  \  Wheat       2016  500\nBalthazar Brauerei  Wheat       2017  500\nBalthazar Brauerei\
  \  Wheat       2018  400\nBrewing Barbarian   IPA         2016  200\nBrewing Barbarian\
  \   IPA         2017  300\nBrewing Barbarian   IPA         2018  500\nBrewing Barbarian\
  \   Stout       2016  800\nBrewing Barbarian   Stout       2017  1000\nBrewing Barbarian\
  \   Stout       2018  1200\nHappy Hoppy Hippo   IPA         2016  1000\nHappy Hoppy\
  \ Hippo   IPA         2017  900\nHappy Hoppy Hippo   IPA         2018  800\nHappy\
  \ Hoppy Hippo   Wheat       2016  200\nHappy Hoppy Hippo   Wheat       2017  100\n\
  Happy Hoppy Hippo   Wheat       2018  100\n```\n\n现在，我希望为这三年每年的采购数量分别建立一列，而不是每年占一行——这就是透视的核心目的。\n\
  \n\n\n### 单度量与单维度的行转列操作\n\n#### 基本的行转列操作\n\n清单 8-3 展示了如何使用 `pivot` 子句对年份进行行转列。\n\
  \n```sql\nSQL> select *\n2  from (\n3     select\n4        brewery_name\n5     \
  \ , group_name\n6      , extract(year from purchased) as yr\n7      , sum(qty) as\
  \ qty\n8     from purchases_with_dims pwd\n9     group by\n10        brewery_name\n\
  11      , group_name\n12      , extract(year from purchased)\n13  ) pivot (\n14\
  \     sum(qty)\n15     for yr\n16     in (\n17        2016 as y2016\n18      , 2017\
  \ as y2017\n19      , 2018 as y2018\n20     )\n21  )\n22  order by brewery_name,\
  \ group_name;\n清单 8-3\n将年份行转列\n```\n\n我是这样构建这个查询的：\n\n*   第 3-12 行就是清单 8-2 中的 `select`\
  \ 语句，只是包装在了一个内联视图中。\n*   第 13 行的 `pivot` 关键字告诉 Oracle 我想要进行行转列。\n*   然后我在第 14 行定义了我要聚合的度量——这里只有一个，即数量（`qty`）。我必须在这里使用聚合函数——任何聚合函数都可以，这里最合适的是\
  \ `sum`。\n*   在第 15 行的关键字 `for` 之后，我定义了要转换的维度——这里只有年份（`yr`）。\n*   最后，第 16-19 行的\
  \ `in` 子句将聚合后的度量值映射到对应的维度值所在的列——这些列在原表中并不存在，但会在输出中创建。\n\n如图 8-2 所示，聚合度量 `sum(qty)`\
  \ 会流向三个列别名，分别对应 `yr` 维度的三个值。\n\n![../images/475066_1_En_8_Chapter/475066_1_En_8_Fig2_HTML.jpg](img/475066_1_En_8_Fig2_HTML.jpg)\n\
  \n*图 8-2 pivot 子句的数据流向*\n\n这样，我就得到了期望的输出：18 个聚合后的数量值显示在 6 行数据中，每行有 3 个数量列（每年一列），而不是原来的\
  \ 18 行：\n\n```sql\nBREWERY_NAME        GROUP_NAME  Y2016  Y2017  Y2018\nBalthazar\
  \ Brauerei  Belgian     800    1000   1000\nBalthazar Brauerei  Wheat       500\
  \    500    400\nBrewing Barbarian   IPA         200    300    500\nBrewing Barbarian\
  \   Stout       800    1000   1200\nHappy Hoppy Hippo   IPA         1000   900 \
  \   800\nHappy Hoppy Hippo   Wheat       200    100    100\n```\n\n请注意，输出中不再包含内联视图里的\
  \ `yr` 和 `qty` 列，但 `brewery_name` 和 `group_name` 列还在。原因是，在 `pivot` 子句中用作度量和维度的列会被用于行转列操作，而剩下的列则会被用于一个隐含的\
  \ `group by`（分组）。\n\n由于在我的内联视图中已经按啤酒厂、产品组和年份对数据进行了分组，这意味着第 14 行的 `sum(qty)` 实际上总是将单行数据“聚合”到对应的年份列中，因此这个聚合操作实际上并非必需。但我不能省略它——`pivot`\
  \ 子句要求必须使用聚合函数。\n\n我可以做的是，跳过内联视图中的 `group by`，而让 `pivot` 执行的隐含 `group by` 来单独完成聚合操作，从而避免一次不必要的分组操作。清单\
  \ 8-4 与清单 8-3 完全相同，只是移除了清单 8-3 中第 9-12 行的 `group by` 子句。\n\n```sql\nSQL> select\
  \ *\n2  from (\n3     select\n4        brewery_name\n5      , group_name\n6    \
  \  , extract(year from purchased) as yr\n7      , qty\n8     from purchases_with_dims\
  \ pwd\n9  ) pivot (\n10     sum(qty)\n11     for yr\n12     in (\n13        2016\
  \ as y2016\n14      , 2017 as y2017\n15      , 2018 as y2018\n16     )\n17  )\n\
  18  order by brewery_name, group_name;\n清单 8-4\n利用隐含分组\n```\n\n清单 8-4 产生的输出与清单 8-3\
  \ 完全相同；它只是因为省去了多余的分组操作而效率稍高一些。\n\n你可能会想，那我是不是可以完全跳过内联视图呢？嗯，有时是可以的，但在本例中不行。首先，我需要从\
  \ `purchased` 日期列中提取年份；其次，`pivot` 在将某些列用作度量和维度后，会对剩余列执行隐含的 `group by`。\n\n如果我在视图中就有\
  \ `yr` 列，并可以直接在 `purchases_with_dims` 视图上执行 `pivot`，那么分组操作将会在视图中除 `qty` 和 `yr` 之外的*所有*列上进行——这将得到错误的结果。内联视图让我能够*仅保留*我需要的列——那些用于行转列操作的列，以及那些用于隐含\
  \ `group by` 的列。\n\n为了更清楚地说明 `pivot` 子句在幕后的工作原理，让我展示一下不使用 `pivot` 的手动行转列操作。\n\n\
  #### 手动实现行转列\n\n在很老的数据库版本（10g 之前）中，我必须在没有 `pivot` 子句帮助的情况下自己动手实现行转列。我不得不编写一个类似于清单\
  \ 8-5 的查询。\n\n```sql\nSQL> select\n2     brewery_name\n3   , group_name\n4   , sum(\n\
  5        case extract(year from purchased)\n6           when 2016 then qty\n7  \
  \      end\n8     ) as y2016\n9   , sum(\n10        case extract(year from purchased)\n\
  11           when 2017 then qty\n12        end\n13     ) as y2017\n14   , sum(\n\
  15        case extract(year from purchased)\n16           when 2018 then qty\n17\
  \        end\n18     ) as y2018\n19  from purchases_with_dims pwd\n20  group by\n\
  21     brewery_name\n22   , group_name\n23  order by brewery_name, group_name;\n\
  清单 8-5\n不使用 pivot 子句的手动行转列\n```\n\n我在第 20-22 行执行了 `group by` 操作，按 `brewery_name`\
  \ 和 `group_name` 分组。然后我为想要得到的三列分别写了三个 `case` 结构，这样视图中所有 2016 年的行，其 `qty` 值会被累加到\
  \ `y2016` 列；所有 2017 年的行会累加到 `y2017` 列；2018 年的会累加到 `y2018` 列。输出结果与清单 8-4 和清单 8-3\
  \ 完全相同。\n\n这个结构在我使用 `pivot` 子句时会自动构建。在清单 8-4 中，我定义了要对 `qty` 列的值使用 `sum` 聚合函数，但要求\
  \ 2016 年的行数据进入一个我希望命名为 `y2016` 的列，以此类推。我并没有定义隐含 `group by` 使用哪些列——这将是所有剩余的列，因此我使用内联视图来限制进入\
  \ `pivot` 子句的列，而不是使用视图中的所有列。\n\n了解 `pivot` 的这种工作方式会很有帮助，因为接下来我将展示如何使用 `purchases`\
  \ 表和 `purchases_with_dims` 视图中的 `cost` 列，而不仅仅是 `qty`，来实现多度量的行转列。\n\n\n### 多度量值\n\
  \n我打算扩展查询，不仅对聚合数量进行透视，还要对聚合成本进行透视。在代码清单 8-6 中，你可以看到我在第 8 行简单地添加了 `cost` 列，这样我也可以在第\
  \ 12 行添加聚合度量 `sum(cost)`。\n\n```\nSQL> select *\n2  from (\n3     select\n4    \
  \    brewery_name\n5      , group_name\n6      , extract(year from purchased) as\
  \ yr\n7      , qty\n8      , cost\n9     from purchases_with_dims pwd\n10  ) pivot\
  \ (\n11     sum(qty)\n12   , sum(cost)\n13     for yr\n14     in (\n15        2016\
  \ as y2016\n16      , 2017 as y2017\n17      , 2018 as y2018\n18     )\n19  )\n\
  20  order by brewery_name, group_name;\nError at Command Line : 1 Column : 8\nError\
  \ report -\nSQL Error: ORA-00918: column ambiguously defined\n代码清单 8-6\n使用多个度量值时出现\
  \ ORA-00918 错误\n```\n\n为什么我会得到一个说“列定义不明确”的错误？我并没有写两遍相同的列别名啊？嗯，不是直接写的，但间接地我写了。\n\n\
  情况是这样的：我定义了两个没有列别名的度量。然后我在 `yr` 维度上定义了三个年份值并为它们定义了列别名。系统会为每个组合创建一个列，所以是 2 x 3 =\
  \ 6 列。这六列的命名规则是 *<维度别名>_<度量别名>*，但如果没有度量别名，那么它们就只会被命名为 *<维度别名>*，正如你在代码清单 8-3 和 8-4\
  \ 中看到的那样。那里没问题，但在这里这意味着将会有两列名为 `y2016`，两列名为 `y2017`，两列名为 `y2018`。因此出现了 ORA-00918\
  \ 错误。\n\n解决方法是也给度量值加上列别名，例如，我可以按照图 8-3 所示操作，将度量值简单地别名为 `q` 和 `c`，而维度值则用年份的后两位数字作为别名（因为这些别名不是以字母开头，所以需要加引号）。\n\
  \n这样就会生成名为 `16_Q`、`16_C` 等的六个列（2 x 3）。\n\n![../images/475066_1_En_8_Chapter/475066_1_En_8_Fig3_HTML.jpg](img/475066_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\n当存在多个度量值时的示意流程\n\n为了向你证明这不仅仅在示意图上有效，我按照图 8-3 所示，通过给度量值和维度值添加别名来修改代码清单\
  \ 8-6：\n\n```\n...\n10  ) pivot (\n11     sum(qty)  as q\n12   , sum(cost) as c\n\
  13     for yr\n14     in (\n15        2016 as \"16\"\n16      , 2017 as \"17\"\n\
  17      , 2018 as \"18\"\n18     )\n19  )\n...\n```\n\n然后我得到了想要的输出：\n\n```\nBREWERY_NAME\
  \        GROUP_NAME  16_Q  16_C  17_Q  17_C  18_Q  18_C\nBalthazar Brauerei  Belgian\
  \     800   5840  1000  7360  1000  6960\nBalthazar Brauerei  Wheat       500  \
  \ 3280  500   3600  400   2800\nBrewing Barbarian   IPA         200   1440  300\
  \   1680  500   3920\nBrewing Barbarian   Stout       800   5600  1000  6960  1200\
  \  8960\nHappy Hoppy Hippo   IPA         1000  7360  900   6400  800   5680\nHappy\
  \ Hoppy Hippo   Wheat       200   960   100   800   100   720\n```\n\n（通常我可能会选择更具描述性的列别名，但使用如此短的别名可以使行宽适合书籍排版。）\n\
  \n至此，我已经演示了如何获取透视列，它们是多个度量值与单一维度值的组合。接下来将添加多个维度。\n\n#### 同样使用多维度\n\n到目前为止，我只使用年份作为维度进行透视，将\
  \ `brewery` 和 `product group` 作为用于隐式 `group by` 的列。现在，我还要将 `product group` 作为第二个维度进行透视，仅留下\
  \ `brewery` 进行分组。\n\n我的数据中有 4 个产品组和 3 个年份，这意味着有 12 种维度值组合，每个组合显示 2 个度量（数量和成本），总共将产生\
  \ 24 列。这在印刷页面上作为演示有点大，所以在代码清单 8-7 中，我通过在第 10 行只选择两个产品组，在第 11–12 行只选择两个年份（2017 和\
  \ 2018）来稍微减少数据量。\n\n```\nSQL> select *\n2  from (\n3     select\n4        brewery_name\n\
  5      , group_name\n6      , extract(year from purchased) as yr\n7      , qty\n\
  8      , cost\n9     from purchases_with_dims pwd\n10     where group_name in ('IPA',\
  \ 'Wheat')\n11     and   purchased >= date '2017-01-01'\n12     and   purchased\
  \ <  date '2019-01-01'\n13  ) pivot (\n14     sum(qty)  as q\n15   , sum(cost) as\
  \ c\n16     for (group_name, yr)\n17     in (\n18        ('IPA'  , 2017) as i17\n\
  19      , ('IPA'  , 2018) as i18\n20      , ('Wheat', 2017) as w17\n21      , ('Wheat',\
  \ 2018) as w18\n22     )\n23  )\n24  order by brewery_name;\n代码清单 8-7\n组合两个维度和两个度量值\n\
  ```\n\n你会注意到第 3-12 行内联视图的内容原则上与之前相同；我只是添加了一个 `where` 子句来减少我进行透视的数据集。\n\n第 14-15\
  \ 行中的度量值 `q` 和 `c` 也没有变化，就像我只使用单一维度时一样。\n\n第 16 行则不同，因为这里我不再只指定单个列作为我的维度。我指定的是一个包含两列的表达式列表——`group_name`\
  \ 和 `yr`。\n\n而且由于我在 `for` 子句中使用了包含两列的表达式列表，我也需要在第 18-21 行的 `in` 子句映射中使用相应的值表达式列表。我为每个值表达式列表（维度值的组合）赋予一个列别名——在这个例子中，为了保持行宽足够印刷，我使用了非常短的别名；在实际应用中，应使用更具意义的别名。\n\
  \n总的来说，你可以在图 8-4 中看到，我通过表达式列表手动组合两个维度，然后维度值和度量值的自动组合会创建以下划线连接别名命名的列。\n\n![../images/475066_1_En_8_Chapter/475066_1_En_8_Fig4_HTML.jpg](img/475066_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\n\n使用多维度的流程只是用表达式列表替代了单个表达式\n\n并且你在代码清单 8-7 的输出中看到了这八个列名：\n\n```\nBREWERY_NAME\
  \        I17_Q I17_C I18_Q I18_C W17_Q W17_C W18_Q W18_C\nBalthazar Brauerei   \
  \                       500   3600  400   2800\nBrewing Barbarian   300   1680 \
  \ 500   3920\nHappy Hoppy Hippo   900   6400  800   5680  100   800   100   720\n\
  ```\n\n空白处是因为 Good Beer Trading Co 没有从 Balthazar Brauerei 购买任何 IPA，也没有从 Brewing\
  \ Barbarian 购买任何小麦啤酒。\n\n正如我之前关于手动 DIY 透视所展示的那样，了解透视是如何作为隐式 `group by` 工作的，你也可以看到，原则上，我并不需要用第\
  \ 10-12 行的 `where` 子句来减少数据集。我可以直接移除这三行，我的输出结果将完全一样。（因为我的输出中已经包含了所有三个啤酒厂，如果我的数据中存在在我关注的年份和产品组内完全没有购买的啤酒厂，那么输出差异将表现为空行。）\n\
  \n然而，这样做并不是一个好主意，因为其他年份和其他产品组的数据仍然会被处理；隐式的 case 结构只会意味着那些其他年份和产品组的数据不会被添加到聚合总和中。这将是对\
  \ CPU 周期和 I/O 的浪费。\n\n\n### 经验总结\n\n通过结合代码示例和一些展示 `PIVOT` 子句各部分如何协同工作以创建新列的图解，我涵盖了以下关于数据透视的主题：\n\
  \n*   使用 `PIVOT` 子句的三个要素进行透视：度量值、维度和映射关系。\n*   使用度量值和维度别名命名透视后的列，其中包含多个度量值的组合会自动以下划线连接。\n\
  *   使用 `GROUP BY` 和基于 `CASE` 结构的聚合进行手动透视，以帮助理解 `PIVOT` 的工作原理。\n*   在进行透视时，使用表达式列表来获取来自多个维度的值。\n\
  \n数据透视是你工具箱中一个非常实用的工具，适用于多种场景，通常仅仅是因为用户如果无需阅读像清单 8-2 输出那样的大量行，而是能拥有行数更少但列数更多的数据，就能获得好得多的数据概述。\n\
  \n## 9. 分割定界符文本\n\n特别是当你从其他地方获取数据时，收到一个由字符串组成、包含由某种分隔符（通常是逗号、分号、制表符或类似符号）分隔的值列表的情况并不少见。由于你通常不知道列表中的元素数量，你不能简单地使用\
  \ `substr` 将其拆分为固定数量的列。相反，通常最有用的方法是能够将列表转换为行，这样你就可以在 SQL 中将其视为一个表来处理。\n\n这种分割涉及生成行，你可以通过多种方式实现。我将展示一些不同的方法，从使用\
  \ `PL/SQL` 循环遍历列表元素并逐行生成，到通过从 `dual` 表中选择并为每一行从列表中检索元素来一次性生成所有行，再到假装该列表是 `JSON`\
  \ 并使用原生 `JSON` 功能进行解析。\n\n### 客户偏好与评论\n\n你几乎永远不会在表中设计一个包含定界符字符串的列（实际上我想不出一个用例，但为了保险起见，最好别说“绝不”）。你会从外部数据源（如文件）获得这样的字符串。这里出于演示目的，Good\
  \ Beer Trading Co 网站让客户可以选择他们最喜欢的啤酒以及评论啤酒；偏好和评论最终会进入图 9-1 所示的 `customer_favorites`\
  \ 和 `customer_reviews` 表中。\n\n![../images/475066_1_En_9_Chapter/475066_1_En_9_Fig1_HTML.jpg](img/475066_1_En_9_Fig1_HTML.jpg)\n\
  \n*图 9-1. 这些示例涉及的表*\n\n两个表都有指向 `customers` 表的规范外键，但当然不能有指向 `products` 表的外键，因为产品\
  \ ID 只是 `favorite_list` 和 `review_list` 列字符串的一部分——我将在接下来的章节中展示样本数据。手头的任务基本上是提取出这些产品\
  \ ID，以便能够连接到 `products` 表。\n\n### 定界符分隔的单个值\n\n在清单 9-1 中，我检查了 `customer_favorites`\
  \ 表的数据，其中 `favorite_list` 列包含一个以逗号分隔的产品 ID 列表。一位客户保存了一个空的偏好列表。\n\n```\nSQL> select\
  \ customer_id, favorite_list\n  2  from customer_favorites\n  3  order by customer_id;\n\
  CUSTOMER_ID  FAVORITE_LIST\n50042        4040,5310\n50741        5430,7790,7870\n\
  51069        6520\n清单 9-1. customer_favorites 表的逗号定界内容\n```\n\n我现在需要将这个列表视为一个子表，其中每个逗号分隔的条目对应一行。这将使我能够连接到\
  \ `products` 表（以及任何其他包含产品 ID 列的表）。在本节的其余部分，我将展示四种不同的方法来实现这一点。\n\n#### 管道化表函数\n\n\
  一种在旧数据库版本（自 8i 版本起）也能工作的方法是在 `PL/SQL` 表函数中从字符串中提取值。这需要一个集合类型（嵌套表类型）和一个返回值为该类型的函数，例如我在清单\
  \ 9-2 中创建的。\n\n```\nSQL> create type favorite_coll_type\n  2     as table of integer;\n\
  \  3  /\nType FAVORITE_COLL_TYPE compiled\nSQL> create or replace function favorite_list_to_coll_type\
  \ (\n  2     p_favorite_list   in customer_favorites.favorite_list%type\n  3  )\n\
  \  4     return favorite_coll_type pipelined\n  5  is\n  6     v_from_pos  pls_integer;\n\
  \  7     v_to_pos    pls_integer;\n  8  begin\n  9     if p_favorite_list is not\
  \ null then\n 10        v_from_pos := 1;\n 11        loop\n 12           v_to_pos\
  \ := instr(p_favorite_list, ',', v_from_pos);\n 13           pipe row (to_number(\n\
  \ 14              substr(\n 15                 p_favorite_list\n 16            \
  \   , v_from_pos\n 17               , case v_to_pos\n 18                    when\
  \ 0 then length(p_favorite_list) + 1\n 19                           else v_to_pos\n\
  \ 20                 end - v_from_pos\n 21              )\n 22           ));\n 23\
  \           exit when v_to_pos = 0;\n 24           v_from_pos := v_to_pos + 1;\n\
  \ 25        end loop;\n 26     end if;\n 27  end favorite_list_to_coll_type;\n 28\
  \  /\nFunction FAVORITE_LIST_TO_COLL_TYPE compiled\n清单 9-2. 集合类型和管道化表函数\n```\n\n\
  集合类型可以是对象类型或标量类型——本例中是标量类型：`integer`。\n\n我通过在第 4 行使用关键字 `pipelined` 使该表函数成为 `pipelined`（管道化）的。\n\
  \n在函数内部，我从第 11 行开始创建一个循环，在其中搜索下一个逗号的位置（如果是第一次迭代则是第一个逗号）。然后第 13–22 行通过管道将一行输出，其中包含从前一个逗号到找到的逗号（如果未找到逗号则是字符串末尾）的\
  \ `substr`。\n\n如果我到达字符串末尾（未找到逗号），第 23 行会跳出循环。如果字符串中仍有内容，第 24 行会设置下一个 `v_from_pos`，以便在循环的下一次迭代中使用。\n\
  \n如果逗号分隔的列表中至少有一个元素，这种循环策略就有效。如果是一个完全空的列表，我在第 9 行确保根本不启动循环——在这种情况下，不会有行通过管道输出。\n\
  \n**提示：** 我本可以使用常规表函数而不是管道化的——那样我就必须在返回之前构建整个输出集合。但是，如果一个表函数旨在严格从 SQL 中使用，而从不从 `PL/SQL`\
  \ 中使用，那么将其管道化几乎总是一个好主意。这样做的好处是 PGA 内存使用量更少，并且如果客户端 SQL 停止从函数中提取行，则可以退出处理。缺点是不能在\
  \ `PL/SQL` 中使用它。\n\n创建了表函数后，我可以在清单 9-3 中使用它来将字符串拆分为集合，并将集合转换为行。\n\n```\nSQL> select\n\
  \  2     cf.customer_id\n  3   , fl.column_value as product_id\n  4  from customer_favorites\
  \ cf\n  5     , table(\n  6          favorite_list_to_coll_type(cf.favorite_list)\n\
  \  7       ) fl\n  8  order by cf.customer_id, fl.column_value;\n清单 9-3. 使用管道化表函数拆分字符串\n\
  ```\n\n第 5 行的 `table` 关键字接受一个集合（嵌套表）并将集合的元素转换为行。如果集合是对象类型的，结果列将被命名为类似对象属性的名称，但这里的集合是标量类型（`integer`），那么单个列始终名为\
  \ `column_value`，我在第 3 行为其赋予了一个更有意义的列别名：\n\n```\nCUSTOMER_ID  PRODUCT_ID\n50042\
  \        4040\n50042        5310\n50741        5430\n50741        7790\n50741  \
  \      7870\n51069        6520\n```\n\n\n#### 内置 APEX 表函数\n\n你可能会注意到输出中缺少了`favorite_list`为空的客户。这就是代码清单\
  \ 9-3 的工作原理；我将`customer_favorites`表与从我的函数管道化传输的行源进行连接，对于空白的`favorite_list`，它（正确地）没有输出任何行。这就好像我与一个不存在该客户行的子表进行了内连接一样。\n\
  \n如果我想显示没有收藏品的客户，就需要等效于`left outer join`的操作。但由于没有连接谓词，我无法在谓词列上使用`(+)`语法。相反，Oracle\
  \ 支持将`(+)`语法直接放在`table(...)`调用之后，因此我可以将第 7 行改为这样：\n\n```\n...\n7       )(+) fl\n\
  ...\n```\n\n这会给出包含没有收藏品客户的输出：\n\n```\nCUSTOMER_ID  PRODUCT_ID\n50042        4040\n\
  50042        5310\n50741        5430\n50741        7790\n50741        7870\n\n51069\
  \        6520\n```\n\n当然，作为`table`函数结果的行源也可以用于连接，就像它是一个真实的子表一样。我在代码清单 9-4 中演示了这一点，同时展示了如何对`table`函数使用\
  \ ANSI 风格的连接，而不是代码清单 9-3 中使用的传统逗号。\n\n```sql\nSQL> select\n2     cf.customer_id\
  \  as c_id\n3   , c.name          as cust_name\n4   , fl.column_value as p_id\n\
  5   , p.name          as prod_name\n6  from customer_favorites cf\n7  cross apply\
  \ table(\n8     favorite_list_to_coll_type(cf.favorite_list)\n9  ) fl\n10  join\
  \ customers c\n11     on c.id = cf.customer_id\n12  join products p\n13     on p.id\
  \ = fl.column_value\n14  order by cf.customer_id, fl.column_value;\n```\n**代码清单\
  \ 9-4** 将拆分结果连接到产品\n\n常规的`join`语法需要一个`on`子句，而我这里没有也不需要。原则上，我需要的是对一个内联视图的`cross join\
  \ lateral`，但在 ANSI SQL 中，决定使用特殊的`cross apply`语法来实现此目的，我将其放在第 7 行`table`关键字之前。\n\n\
  其余部分是普通的 SQL，使用`on`子句中的`column_value`列进行常规连接：\n\n```\nC_ID   CUST_NAME        P_ID\
  \  PROD_NAME\n50042  The White Hart   4040  Coalminers Sweat\n50042  The White Hart\
  \   5310  Monks and Nuns\n50741  Hygge og Humle   5430  Hercule Trippel\n50741 \
  \ Hygge og Humle   7790  Summer in India\n50741  Hygge og Humle   7870  Ghost of\
  \ Hops\n51069  Der Wichtelmann  6520  Der Helle Kumpel\n```\n\n如果我再次想包含没有收藏品的客户，在\
  \ ANSI SQL 中我不使用`(+)`，而是将第 7 行的`cross apply`改为`outer apply`，这需要将第 12 行的`join`改为`left\
  \ outer join`：\n\n```sql\n...\n7  outer apply table(\n8     favorite_list_to_coll_type(cf.favorite_list)\n\
  9  ) fl\n10  join customers c\n11     on c.id = cf.customer_id\n12  left outer join\
  \ products p\n13     on p.id = fl.column_value\n...\n```\n\n现在，没有收藏品的客户 Boom Beer\
  \ Bar 被包含在输出中：\n\n```\nC_ID   CUST_NAME        P_ID  PROD_NAME\n50042  The White\
  \ Hart   4040  Coalminers Sweat\n50042  The White Hart   5310  Monks and Nuns\n\
  50741  Hygge og Humle   5430  Hercule Trippel\n50741  Hygge og Humle   7790  Summer\
  \ in India\n50741  Hygge og Humle   7870  Ghost of Hops\n51007  Boom Beer Bar\n\
  51069  Der Wichtelmann  6520  Der Helle Kumpel\n```\n\n第一种方法是为此目的专门构建的表函数。你也可以编写一个通用函数，但实际上你不需要这样做。你数据库中很可能内置的\
  \ APEX 方案已经为你完成了这项工作，我将在接下来的内容中展示。\n\n#### 内置 APEX 表函数\n\n有一个 APEX API 函数`apex_util.string_to_table(favorite_list,\
  \ ',')`，但它返回的是在包中定义的 PL/SQL 集合类型，而不是在 SQL 中定义的嵌套表类型。不过这是一个已弃用的函数，我提到它只是为了让你不要使用它，即使你碰巧用\
  \ Google 搜索到了它。\n\n> **注意**\n>\n> 截至 12.2 版本，APEX 默认不会安装在数据库中；它只是随软件一起提供以便于安装。即使你的公司不使用\
  \ APEX 应用程序，我认为为了在编写 SQL 和 PL/SQL 时利用 API 包的优势，在数据库中安装 APEX 仍然是一个好主意。如果你愿意，可以在不配置\
  \ Web 监听器（ORDS、嵌入式 PL/SQL 网关或 Oracle HTTP Server）的情况下进行安装。\n\n从 APEX 5.1 版本开始，为此目的支持的函数是`apex_string.split`，它返回一个\
  \ SQL 嵌套表类型，因此也适用于 SQL。代码清单 9-5 与代码清单 9-4 类似，只是使用了 APEX API 函数而不是我之前创建的自定义函数。\n\n\
  ```sql\nSQL> select\n2     cf.customer_id  as c_id\n3   , c.name          as cust_name\n\
  4   , to_number(fl.column_value) as p_id\n5   , p.name          as prod_name\n6\
  \  from customer_favorites cf\n7  cross apply table(\n8     apex_string.split(cf.favorite_list,\
  \ ',')\n9  ) fl\n10  join customers c\n11     on c.id = cf.customer_id\n12  join\
  \ products p\n13     on p.id = to_number(fl.column_value)\n14  order by cf.customer_id,\
  \ p_id;\n```\n**代码清单 9-5** 使用 `apex_string.split` 进行拆分\n\n区别仅在于第 8 行的函数调用，以及第 14\
  \ 行的一个小细节，我利用可以在`order by`子句中使用列别名的特性，按更有意义的`p_id`而不是`fl.column_value`排序。\n\n代码清单\
  \ 9-5 的输出与代码清单 9-4 的输出相同。两种方法都调用 PL/SQL 函数来执行实际的字符串拆分，这当然意味着会发生上下文切换。接下来是一种不涉及上下文切换的纯\
  \ SQL 方法。\n\n\n#### 使用行生成器进行直接 SQL 查询\n\n无论我采用哪种方法，都需要为逗号分隔列表中的每个元素生成对应的行。前两种方法使用了集合和\
  \ `table` 函数来实现这一目的。另一种典型的生成行的方法是使用针对 `dual` 表的 `connect by` 查询，这种方法同样可以在这里使用，如代码清单\
  \ 9-6 所示。\n\n```sql\nSQL> select\n 2     favs.customer_id as c_id\n 3   , c.name\
  \           as cust_name\n 4   , favs.product_id  as p_id\n 5   , p.name       \
  \    as prod_name\n 6  from (\n 7     select\n 8        cf.customer_id\n 9     \
  \ , to_number(\n10           regexp_substr(cf.favorite_list, '[^,]+', 1, sub#)\n\
  11        ) as product_id\n12     from customer_favorites cf\n13     cross join\
  \ lateral(\n14        select level sub#\n15        from dual\n16        connect\
  \ by level <= regexp_count(cf.favorite_list, ',') + 1\n17     ) fl\n18  ) favs\n\
  19  join customers c\n20     on c.id = favs.customer_id\n21  join products p\n22\
  \     on p.id = favs.product_id\n23  order by favs.customer_id, favs.product_id;\n\
  ```\n**代码清单 9-6**\n生成与分隔符数量相等的行\n\n在第 13 行使用 `cross join lateral` 使得第 14-16 行的内联视图\
  \ `fl` 能够为 `customer_favorites` 表中的每一行执行一次，因为我通过在第 16 行使用 `cf.favorite_list` 来关联这个横向内联视图。通过计算逗号的数量并加一，该内联视图可以生成精确对应于逗号分隔列表中元素数量的行数。\n\
  \n由于我将 `fl` 的行在 `sub#` 列中连续编号为 1、2、3...，因此可以在第 10 行的 `regexp_substr` 中使用 `sub#`\
  \ 来提取第一个、第二个、第三个...出现的“至少包含一个非逗号字符的列表”。这就是我用来与 `products` 表连接的 `product_id`。\n\n\
  代码清单 9-6 的输出结果与代码清单 9-5 和 9-4 完全相同。\n\n上述简单的正则表达式适用于列表中的每个元素至少包含一个字符的情况（因此使用了 `+`）。如果我希望它也能处理元素可能为空的情况（即字符串中出现两个连续逗号），简单地将\
  \ `+` 改为 `*` 是无法实现的。相反，我需要使用稍微复杂一些的正则表达式，如下所示：\n\n```sql\n...\n10           regexp_substr(\n\
  11              cf.favorite_list\n12            , '(^|,)([^,]*)'\n13           \
  \ , 1\n14            , sub#\n15            , null\n16            , 2\n17       \
  \    )\n...\n```\n\n表达式中的第二组与之前类似，只是将 `+` 改为了 `*`，但我需要指明它必须跟在字符串开头或逗号之后。由于我不希望将前面的逗号作为输出的一部分，因此我要求\
  \ `regexp_substr` 只返回第二组（第 16 行）。\n\n#### 将字符串视为 JSON 数组\n\n一个简单的逗号分隔值列表可以转换成一个\
  \ JSON 数组，如代码清单 9-7 所示。\n\n```sql\nSQL> select\n 2     cf.customer_id  as c_id\n\
  \ 3   , c.name          as cust_name\n 4   , fl.product_id   as p_id\n 5   , p.name\
  \          as prod_name\n 6  from customer_favorites cf\n 7  outer apply json_table(\n\
  \ 8     '[' || cf.favorite_list || ']'\n 9   , '$[*]'\n10     columns (\n11    \
  \    product_id number path '$'\n12     )\n13  ) fl\n14  join customers c\n15  \
  \   on c.id = cf.customer_id\n16  left outer join products p\n17     on p.id = fl.product_id\n\
  18  order by cf.customer_id, fl.product_id;\n```\n**代码清单 9-7**\n将字符串视为 JSON 数组\n\
  \n我使用了 SQL 函数 `json_table`（第 7 行）来代替 PL/SQL 表函数。\n\n传递给 `json_table` 的第一个参数必须是有效的\
  \ JSON，在本例中，我可以非常简单地通过在第 8 行将逗号分隔列表用方括号括起来来实现。\n\n**注意**\n\n我之所以能让第 8 行保持如此简单，仅仅是因为我的值都是数字。如果涉及文本值，我就需要将文本值用双引号括起来，方法是将逗号替换为引号-逗号-引号，并考虑对任何已有的引号进行转义。那么我就会像\
  \ Stew Ashton 在这里展示的那样做：[`https://stewashton.wordpress.com/2018/06/05/splitting-strings-a-new-champion/`](https://stewashton.wordpress.com/2018/06/05/splitting-strings-a-new-champion/)。\n\
  \n在第 9 行，我指明 `json_table` 应该为 JSON 数组中的每个元素输出一行。由于这些元素是简单的标量，第 11 行的路径就简化为一个简单的\
  \ `$`。\n\n我已经展示了四种将简单的分隔字符串拆分成标量值行的方法。在大多数情况下，我会在直接 SQL、JSON 数组和 `apex_string.split`\
  \ 之间做出选择。如果你的字符串非常长且包含许多元素，那么在 `regexp_substr` 中请求第 1 个、第 2 个、第 3 个...出现的 SQL 方法在处理第\
  \ 50 个出现项时可能会变慢——这种情况可能更适合使用一种在遍历字符串时输出行的函数。另一方面，如果你有许多相对短的字符串，且每个字符串包含的元素很少，那么获取元素出现项的开销可能比相对更多的向\
  \ PL/SQL 的上下文切换要小。\n\n一如既往，请根据你自己的用例测试 SQL 或流水线函数哪个是最佳选择。如果流水线函数对你来说是答案，那么使用内置的\
  \ `apex_string.split` 通常是个好选择——如果你的数据库没有安装 APEX API 包，或者你需要处理某些特殊数据类型，那么创建你自己的流水线函数会很有用。\n\
  \n现在是时候增加复杂性，来看看其中包含更多结构的分隔字符串了。\n\n### 分隔的多值\n\n我偶尔会看到一些应用程序，其中的字符串包含两种分隔符的数据——一种行分隔符和一种列分隔符。如今，这通常会是\
  \ JSON 字符串，但由于数据存在的时间很长，你可能仍然需要处理这类字符串。\n\n这里举一个例子，我假设 Good Beer Trading Co 网站上的客户不仅可以输入他们的收藏列表，还可以输入他们评价过的啤酒列表，每种啤酒都有一个\
  \ A、B 或 C 的评分。这些信息存储在 `customer_reviews` 表的 `review_list` 列中，我在代码清单 9-8 中展示了其内容。\n\
  \n```sql\nSQL> select customer_id, review_list\n 2  from customer_reviews\n 3  order\
  \ by customer_id;\n```\n**代码清单 9-8**\n`customer_reviews` 表中以逗号和冒号分隔的内容\n\n行分隔符是逗号，列分隔符是冒号，因此数据格式如\
  \ `product:score,product:score,…`\n\n```\nCUSTOMER_ID  REVIEW_LIST\n50042      \
  \  4040:A,6600:C,7950:B\n50741        4160:A\n51069        4280:B,7790:B\n```\n\n\
  为了将这些字符串拆分成行和列，我将向你展示四种不同的方法。\n\n\n\n#### 自定义 ODCI 表函数\n\n我将展示的第一种方法再次涉及一个流水线表函数，但它不像清单\
  \ 9-2 中的那样直接。\n\n相反，我正在使用 **Oracle 数据 cartridges 接口（ODCI）** 来实现它，这允许我在 SQL 语句处理过程中的特定点介入。这意味着当\
  \ SQL 引擎使用此函数对语句进行硬解析时，它将调用我的代码来查明将返回哪些列和数据类型——而不是从数据字典中查找此信息。当语句被准备、当行被提取、以及当游标被关闭时——所有这些都将调用我的代码，而不是标准处理流程。\n\
  \n#### 注意\n\n这只是实现自定义*流水线表*函数的一种 ODCI 函数类型。ODCI 也可以用于实现自定义*聚合*函数，我将在下一章向你展示。\n\n\
  这里我将重点介绍如何使用这个 ODCI 函数——所有 PL/SQL 的细节都超出了本书的范围。在清单 9-9 中，我只展示了用于实现该函数的对象类型的骨架。\n\
  \n对于好奇的读者，完整代码可在配套脚本中找到。我在我的博客上详细描述了内部原理：[`www.kibeha.dk/2015/06/supposing-youve-got-data-as-text-string.html`](http://www.kibeha.dk/2015/06/supposing-youve-got-data-as-text-string.html)。\n\
  \n```sql\nSQL> create or replace type delimited_col_row as object (\n...\n14   ,\
  \ static function parser(\n15        p_text      in    varchar2\n16      , p_cols\
  \      in    varchar2\n17      , p_col_delim in    varchar2 default '|'\n18    \
  \  , p_row_delim in    varchar2 default ';'\n19     ) return anydataset pipelined\n\
  20       using delimited_col_row\n\n22   , static function odcitabledescribe(\n\
  ...\n28     ) return number\n\n30   , static function odcitableprepare(\n...\n37\
  \     ) return number\n\n39   , static function odcitablestart(\n...\n45     ) return\
  \ number\n\n47   , member function odcitablefetch(\n...\n51     ) return number\n\
  \n53   , member function odcitableclose(\n...\n55     ) return number\n56  )\n57\
  \  /\nType DELIMITED_COL_ROW compiled\nSQL> create or replace type body delimited_col_row\
  \ as\n...\n260  end;\n261  /\nType Body DELIMITED_COL_ROW compiled\n```\n**清单 9-9**\n\
  实现 ODCI 函数的对象类型骨架\n\n对象类型必须包含并实现 5 个 `odci*` 函数——它们将由 SQL 引擎调用，而不是由使用该类型的任何人调用。\n\
  \n`parser` 函数是当你希望使用它时应该调用的函数。由于它使用语法 `using delimited_col_row`（第 20 行）引用了实现对象类型，因此它不需要在对象类型内部；如果你愿意，它可以被实现为一个独立函数或在一个包中。\n\
  \n#### 使用 ODCI 表函数\n\n该对象类型可以通用使用——在清单 9-10 中，我将其用于此特定情况。\n\n```sql\nSQL> select\
  \ cr.customer_id, rl.product_id, rl.score\n2  from customer_reviews cr\n3  outer\
  \ apply table (\n4     delimited_col_row.parser(\n5        cr.review_list\n6   \
  \   , 'PRODUCT_ID:NUMBER,SCORE:VARCHAR2(1)'\n7      , ':'\n8      , ','\n9     )\n\
  10  ) rl\n11  order by cr.customer_id, rl.product_id;\n```\n**清单 9-10**\n使用 ODCI\
  \ 表函数解析分隔数据\n\n就像清单 9-4 一样，我对我的表函数执行了一个 `apply`——在这种情况下，我选择了 `outer apply` 而不是 `cross\
  \ apply`。然后，表函数 `delimited_col_row.parser` 接受四个参数：\n\n*   首先，包含分隔数据的字符串：`cr.review_list`\n\
  *   然后，指定每个分隔数据“行”的“列”的规范，包括它们的名称和数据类型（这应该是一个字面量，而不是变量，因为它在硬解析时使用，而不是软解析时）\n*  \
  \ 最后，数据中的列分隔符和行分隔符是什么（这些分隔符与我在第 6 行的列规范中使用的相同）\n\n当我第一次执行这个语句（硬解析）时，SQL 引擎调用我的 `odcitabledescribe`\
  \ 函数，该函数解析第二个参数并让 SQL 引擎知道表函数将返回一个包含两列、`product_id` 和 `score` 的行集，具有指定的数据类型。\n\n\
  然后 SQL 引擎依次运行 `odcitableprepare`、`odcitablestart`、`odcitablefetch` 和 `odcitableclose`。字符串数据的实际拆分发生在\
  \ `odcitablefetch` 中，它找到下一个行分隔符，并按列分隔符拆分数据，从而返回一个“行”。最后我看到这个输出：\n\n```\nCUSTOMER_ID\
  \  PRODUCT_ID  SCORE\n50042        4040        A\n50042        6600        C\n50042\
  \        7950        B\n50741        4160        A\n51069        4280        B\n\
  51069        7790        B\n```\n\n请注意，我不必对通用的 `column_value` 做任何列别名处理——我可以直接使用\
  \ `rl.product_id` 和 `rl.score`。我在清单 9-11 中利用这一点与 `products` 表进行了有意义的连接。\n\n```sql\n\
  SQL> select\n2     cr.customer_id  as c_id\n3   , c.name          as cust_name\n\
  4   , rl.product_id   as p_id\n5   , p.name          as prod_name\n6   , rl.score\n\
  7  from customer_reviews cr\n8  cross apply table (\n9     delimited_col_row.parser(\n\
  10        cr.review_list\n11      , 'PRODUCT_ID:NUMBER,SCORE:VARCHAR2(1)'\n12  \
  \    , ':'\n13      , ','\n14     )\n15  ) rl\n16  join customers c\n17     on c.id\
  \ = cr.customer_id\n18  join products p\n19     on p.id = rl.product_id\n20  order\
  \ by cr.customer_id, rl.product_id;\n```\n**清单 9-11**\n使用真实的列名而不是通用的 column_value\
  \ 进行连接\n\n在第 8 行，我使用了 `cross apply`，所以输出中没有没有评论的客户：\n\n```\nC_ID   CUST_NAME   \
  \     P_ID  PROD_NAME         SCORE\n50042  The White Hart   4040  Coalminers Sweat\
  \  A\n50042  The White Hart   6600  Hazy Pink Cloud   C\n50042  The White Hart \
  \  7950  Pale Rider Rides  B\n50741  Hygge og Humle   4160  Reindeer Fuel     A\n\
  51069  Der Wichtelmann  4280  Hoppy Crude Oil   B\n51069  Der Wichtelmann  7790\
  \  Summer in India   B\n```\n\n### 结论\n\n使用这样的 ODCI 实现允许对实现的所有细节进行精细控制。这固然很好，但也存在其他不需要安装自定义\
  \ ODCI 函数的解决方案。\n\n\n#### 结合使用 `apex_string.split` 与 `substr`\n\n对于简单的分隔列表，我展示了使用\
  \ `apex_string.split` 作为构建自定义流水线表函数的替代方法。而对于能同时处理行与列的 ODCI 函数 `delimited_col_row.parser`，则没有类似的标准替代方案。\n\
  \n但我可以将处理列与处理行分离开来，如代码清单 9-12 所示。\n\n```sql\nSQL> select\n2     cr.customer_id \
  \ as c_id\n3   , c.name          as cust_name\n4   , p.id            as p_id\n5\
  \   , p.name          as prod_name\n6   , substr(\n7        rl.column_value\n8 \
  \     , instr(rl.column_value, ':') + 1\n9     ) as score\n10  from customer_reviews\
  \ cr\n11  cross apply table(\n12     apex_string.split(cr.review_list, ',')\n13\
  \  ) rl\n14  join customers c\n15     on c.id = cr.customer_id\n16  join products\
  \ p\n17     on p.id = to_number(\n18                  substr(\n19              \
  \       rl.column_value\n20                   , 1\n21                   , instr(rl.column_value,\
  \ ':') - 1\n22               ))\n23  order by cr.customer_id, p_id;\n```\n\n代码清单\
  \ 9-12\n使用 `apex_string.split` 获取行，使用 `substr` 获取列\n\n首先，在第 12 行使用行分隔符逗号，通过 `apex_string.split`\
  \ 将评论列表拆分成多行。这意味着 `rl` 将包含 `column_value` 的行，其中的值由冒号分隔的两个列组成——例如 `4040:A`。\n\n然后，在第\
  \ 17-22 行使用 `substr` 提取产品 ID，在第 6-9 行提取评分就很简单了。输出结果与代码清单 9-11 相同。\n\n虽然我消除了自定义函数，但仍需进行大量切换到\
  \ PL/SQL 的上下文，所以下一步我将尝试再次使用纯 SQL。\n\n#### 行生成器与 `regexp_substr`\n\n类似于使用 `apex_string.split`\
  \ 获取行，然后使用 `substr` 获取列的方式，我改编了代码清单 9-6 来创建代码清单 9-13。在该清单中，我使用 `dual` 生成行，并使用 `regexp_substr`\
  \ 获取列。\n\n```sql\nSQL> select\n2     revs.customer_id as c_id\n3   , c.name    \
  \       as cust_name\n4   , revs.product_id  as p_id\n5   , p.name           as\
  \ prod_name\n6   , revs.score\n7  from (\n8     select\n9        cr.customer_id\n\
  10      , to_number(\n11           regexp_substr(\n12              cr.review_list\n\
  13            , '(^|,)([^:,]*)'\n14            , 1\n15            , sub#\n16   \
  \         , null\n17            , 2\n18           )\n19        ) as product_id\n\
  20      , regexp_substr(\n21           cr.review_list\n22         , '([^:,]*)(,|$)'\n\
  23         , 1\n24         , sub#\n25         , null\n26         , 1\n27       \
  \ ) as score\n28     from customer_reviews cr\n29     cross join lateral(\n30  \
  \      select level sub#\n31        from dual\n32        connect by level <= regexp_count(cr.review_list,\
  \ ',') + 1\n33     ) rl\n34  ) revs\n35  join customers c\n36     on c.id = revs.customer_id\n\
  37  join products p\n38     on p.id = revs.product_id\n39  order by revs.customer_id,\
  \ revs.product_id;\n```\n\n代码清单 9-13\n生成与分隔符数量一样多的行\n\n第 29-33 行的横向内联视图与我在代码清单 9-6\
  \ 中的做法相同。这里的技巧是在第 13 行和第 22 行指定合适的正则表达式，以分别提取冒号*之前*和*之后*的两列：\n\n*   第 13 行查找字符串开头或逗号（组\
  \ 1），后跟零个或多个既非冒号也非逗号的字符（组 2）。第 17 行指明函数应返回第二组（这需要最低版本 11.2）。\n*   第 22 行查找零个或多个既非冒号也非逗号的字符（组\
  \ 1），后跟逗号或字符串结尾（组 2）。第 26 行指明函数应返回第一组。\n\n代码清单 9-13 产生的输出与代码清单 9-11 和 9-12 相同，但完全没有调用\
  \ PL/SQL。代价是更多地使用了正则表达式函数，这可能相对耗费 CPU——因此要找到性能最佳的方法，你应该针对你的具体用例测试这些方案。\n\n到目前为止的三种方案都是按字符串原样处理的，但我在本章开头也提到过，在许多现代应用程序中，此类数据会存储为\
  \ JSON 而非分隔格式。数据库同样能够高效处理 JSON 和 XML，因此这里介绍第四种利用这一点的方法。\n\n\n#### 转换为 JSON 格式\n\n\
  我首先想做的是将分隔符字符串转换为有效的 JSON。我在清单 9-14 中完成了这个操作，我将各分隔部分转换成了一个 JSON 数组的 JSON 数组，其中每个内部数组包含两个元素：第一个是产品\
  \ ID 的值，第二个是评价分数的值。\n\n```sql\nSQL> select\n2     customer_id\n3   , '[[\"'\n4 \
  \    || replace(\n5           replace(\n6              review_list\n7          \
  \  , ','\n8            , '\"],[\"'\n9           )\n10         , ':'\n11        \
  \ , '\",\"'\n12        )\n13     || '\"]]'\n14     as json_list\n15  from customer_reviews\n\
  16  order by customer_id;\nListing 9-14\n将分隔符文本转换为 JSON\n```\n\n在我解释代码之前，先让我展示一下输出：\n\
  \n```\nCUSTOMER_ID  JSON_LIST\n50042        [[\"4040\",\"A\"],[\"6600\",\"C\"],[\"\
  7950\",\"B\"]]\n50741        [[\"4160\",\"A\"]]\n51007        [[\"\"]]\n51069  \
  \      [[\"4280\",\"B\"],[\"7790\",\"B\"]]\n```\n\n你可以从输出中看到，第 3-13 行的代码将`review_list`的文本转换成了*嵌套的*JSON\
  \ 数组。一个*外部的*数组，其元素对应于*行*，其中每一行本身又是一个*内部的*数组，其元素对应于*列*。\n\n为了进行这个转换，第 5-9 行中最内层的`replace`函数将每个行分隔符（逗号）替换为五个字符`\"\
  ],[\"`，每个字符分别代表：\n\n*   内部元素的结束\n*   内部数组的结束\n*   作为外部数组元素间分隔符的逗号\n*   新内部数组的开始\n\
  *   新内部元素的开始\n\n之后，第 4 行和第 10-12 行的`replace`函数将每个列分隔符（冒号）替换为三个字符`\",\"`，每个字符分别代表：\n\
  \n*   内部元素的结束\n*   作为内部数组元素间分隔符的逗号\n*   新内部元素的开始\n\n在第 3 行，JSON 以三个字符`[[\"`开始，分别代表外部数组的开始、内部数组的开始和内部元素的开始。\n\
  \n最后在第 13 行，JSON 以三个字符`\"]]`结束，分别代表内部元素的结束、内部数组的结束和外部数组的结束。\n\n创建好这个将分隔符字符串转换为 JSON\
  \ 的字符串拼接表达式后，我现在可以在清单 9-15 的`json_table`函数中使用它了。\n\n```sql\nSQL> select\n2     cr.customer_id\
  \  as c_id\n3   , c.name          as cust_name\n4   , rl.product_id   as p_id\n\
  5   , p.name          as prod_name\n6   , rl.score\n7  from customer_reviews cr\n\
  8  cross apply json_table (\n9     '[[\"'\n10     || replace(\n11           replace(\n\
  12              cr.review_list\n13            , ','\n14            , '\"],[\"'\n\
  15           )\n16         , ':'\n17         , '\",\"'\n18        )\n19     || '\"\
  ]]'\n20   , '$[*]'\n21     columns (\n22        product_id  number      path '$[0]'\n\
  23      , score       varchar2(1) path '$[1]'\n24     )\n25  ) rl\n26  join customers\
  \ c\n27     on c.id = cr.customer_id\n28  join products p\n29     on p.id = rl.product_id\n\
  30  order by cr.customer_id, rl.product_id;\nListing 9-15\n使用 json_table 解析 JSON\n\
  ```\n\n`json_table`函数的第一个参数是 JSON 本身，所以第 9-19 行就是我在前一个清单中开发的表达式。\n\n第 20 行中的第二个参数指定了`json_table`应该将\
  \ JSON 字符串根节点（`$`）处外部 JSON 数组中的所有内部数组（`*`）作为行。\n\n最后在`column`规范第 22-23 行中，我声明内部数组的第一个元素（`$[0]`）是一个`number`类型，应成为名为`product_id`的列，而内部数组的第二个元素（`$[1]`）是一个`varchar2`类型，应成为名为`score`的列。\n\
  \n如你所见，这个输出与前三种方法的输出相同：\n\n```\nC_ID   CUST_NAME        P_ID  PROD_NAME        \
  \ SCORE\n50042  The White Hart   4040  Coalminers Sweat  A\n50042  The White Hart\
  \   6600  Hazy Pink Cloud   C\n50042  The White Hart   7950  Pale Rider Rides  B\n\
  50741  Hygge og Humle   4160  Reindeer Fuel     A\n51069  Der Wichtelmann  4280\
  \  Hoppy Crude Oil   B\n51069  Der Wichtelmann  7790  Summer in India   B\n```\n\
  \n如前所述，如果我想显示`review_list`为空的客户，我将第 8 行的`cross apply`改为`outer apply`。\n\n**提示**\n\
  \n清单 9-15 可以进行调整，例如，如果你有一个 CLOB 类型的纯 CSV 文件，可以使用换行符作为行分隔符，逗号作为列分隔符。或者，你可以研究一下 `apex_data_parser`\
  \ 包，如这里所示： [`https://blogs.oracle.com/apex/super-easy-csv-xlsx-json-or-xml-parsing-about-the-apex_data_parser-package`](https://blogs.oracle.com/apex/super-easy-csv-xlsx-json-or-xml-parsing-about-the-apex_data_parser-package)。\n\
  \n使用`json_table`需要版本 12.1.0.2 或更高。如果你需要支持更早的版本，你会在配套脚本中找到一个通过转换为 XML 并使用`xmltable`来实现相同功能的示例。\n\
  \n### 经验总结\n\n分隔符文本通常是由单一分隔符分隔的值列表，但它也可以更具结构性，例如，同时包含“行”分隔符和“列”分隔符。我在本章中展示了这两种类型的示例，以及多种拆分它们的方法，因此你可以：\n\
  \n*   仅使用 SQL 或内置的 PL/SQL 功能来拆分分隔符文本。\n*   为特殊需求创建自定义的 PL/SQL 表函数——包括常规的和 ODCI 变体。\n\
  *   将文本转换为 JSON 并使用原生的 JSON 解析功能。\n\n如果你创建自己的数据模型，你应该使用子表、集合、XML 或 JSON，而不是依赖将数据存储为分隔符文本。但从你无法控制的来源接收分隔符文本是很常见的，在这种情况下，所示的任何方法都可能有用。通常，使用原生和内置功能是最简单且性能最好的，但对于更特殊的用例，你可以测试一下其他方法是否更适合你。\n\
  \n## 10. 创建分隔符文本\n\n你在上一章学习了如何获取分隔符文本并将其拆分成片段，每行生成一个文本片段。你猜怎么着，就像我在讲解逆透视之后写了一章关于透视的内容一样，这里有一章将展示如何获取行中的文本片段并将它们聚合成分隔符字符串。\n\
  \n这通常很受阅读报表的用户欢迎，因为如果多行中大部分列都相同，只有单个列的值不同，会产生大量重复数据，而有了聚合后的字符串，更容易获得概览。有时你可以使用透视来缓解这个问题，但有时你就是没有固定数量的列。输出一个逗号分隔的字符串可以是这种情况的答案。\n\
  \n分隔符字符串有时对于导入到其他地方也很有用——例如，制表符或分号分隔的字符串很容易导入到 Excel 电子表格中以生成列。\n\n有几种方法可以创建这种分隔符文本，既可以使用内置功能，也可以使用你自己创建的功能。我将展示其中一些不同的方法及其优缺点。\n\
  \n\n\n### 产品分隔列表\n\n作为示例，我将创建一些文本字符串，这些字符串包含公司销售的产品名称的逗号分隔列表，并使用图 10-1 中所示的表格。\n\
  \n![../images/475066_1_En_10_Chapter/475066_1_En_10_Fig1_HTML.jpg](img/475066_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1：本章使用的表格\n\n对于本章的大部分示例，我将使用代码清单 10-1 中所示的视图 `brewery_products` 中连接在一起的 `breweries`、`products`\
  \ 和 `purchases` 表。在本章末尾，我将使用 `monthly_sales` 和 `products` 来创建一个无法放入常规 `varchar2`\
  \ 的超长字符串。\n\n```\nSQL> create or replace view brewery_products\n 2  as\n 3  select\n\
  \ 4     b.id   as brewery_id\n 5   , b.name as brewery_name\n 6   , p.id   as product_id\n\
  \ 7   , p.name as product_name\n 8  from breweries b\n 9  cross join products p\n\
  \ 10  where exists (\n 11     select null\n 12     from purchases pu\n 13     where\
  \ pu.brewery_id = b.id\n 14  and   pu.product_id = p.id\n 15  );\n```\n*代码清单 10-1:\
  \ 哪些产品在哪些酒厂被采购的视图*\n\n该视图检查酒厂和啤酒的所有组合，前提是该啤酒曾在某个时间从该酒厂采购过。结果——如代码清单 10-2 所示——是一个列表，显示哪种啤酒在哪个酒厂被采购。\n\
  \n```\nSQL> select *\n 2  from brewery_products\n 3  order by brewery_id, product_id;\n\
  \ \nBREWERY_ID  BREWERY_NAME        PRODUCT_ID  PRODUCT_NAME\n518         Balthazar\
  \ Brauerei  5310        Monks and Nuns\n518         Balthazar Brauerei  5430   \
  \     Hercule Trippel\n518         Balthazar Brauerei  6520        Der Helle Kumpel\n\
  523         Happy Hoppy Hippo   6600        Hazy Pink Cloud\n523         Happy Hoppy\
  \ Hippo   7790        Summer in India\n523         Happy Hoppy Hippo   7870    \
  \    Ghost of Hops\n536         Brewing Barbarian   4040        Coalminers Sweat\n\
  536         Brewing Barbarian   4160        Reindeer Fuel\n536         Brewing Barbarian\
  \   4280        Hoppy Crude Oil\n536         Brewing Barbarian   7950        Pale\
  \ Rider Rides\n```\n*代码清单 10-2: 酒厂和产品*\n\n在下一节中，我将展示多种方法来创建此列表的一个变体，该变体仅包含三行——每个酒厂一行，并包含一个列，其中包含该酒厂所有啤酒名称的逗号分隔列表。\n\
  \n### 字符串聚合\n\n你知道函数 `sum()` 是一个用于数字求和的聚合函数。我即将展示的是各种连接字符串的聚合函数；因此，这被称为字符串聚合。如果你在互联网或论坛上搜索，可以找到其他方法——我将只重点介绍四种各有优缺点的方法。\n\
  \n### 聚合函数 listagg\n\n在 11.2 版本中，出现了一个名为 `listagg()` 的新内置函数——顾名思义，它就是用于字符串聚合的专用函数（就像\
  \ `sum()` 是用于加法数字聚合的函数一样）。\n\n它比简单的 `sum()` 函数需要多一点语法，但正如你在代码清单 10-3 中所见，它并不难使用。\n\
  \n```\nSQL> select\n 2     max(brewery_name) as brewery_name\n 3   , listagg(product_name,\
  \ ',') within group (\n 4        order by product_id\n 5     ) as product_list\n\
  \ 6  from brewery_products\n 7  group by brewery_id\n 8  order by brewery_id;\n\
  ```\n*代码清单 10-3: 使用 listagg 创建产品列表*\n\n在第 3 行，我使用 `listagg()` 并带有两个参数：第一个是我想要聚合的字符串列或表达式，第二个（可选）是分隔符，用于放在聚合结果中的字符串之间。如果你不提供分隔符参数，默认值是\
  \ `null`，即只是简单地连接字符串，中间不加任何分隔符。\n\n在参数之后，`within group` 子句是强制性的，它要求我指定一个 `order\
  \ by`（第 4 行），以告知 Oracle 字符串应按什么顺序聚合。\n\n有了这些关键字，代码清单 10-3 产生以下输出，其中每个酒厂采购的啤酒以逗号分隔的字符串形式列出，且啤酒按\
  \ `product_id` 排序：\n\n```\nBREWERY_NAME        PRODUCT_LIST\nBalthazar Brauerei\
  \  Monks and Nuns,Hercule Trippel,Der Helle Kumpel\nHappy Hoppy Hippo   Hazy Pink\
  \ Cloud,Summer in India,Ghost of Hops\nBrewing Barbarian   Coalminers Sweat,Reindeer\
  \ Fuel,Hoppy Crude Oil,Pale Rider Rides\n```\n\n假设我想让产品列表中的啤酒按字母顺序排序？这非常简单；我只需更改\
  \ `within group` 内部的 `order by` 子句：\n\n```\n...\n 4        order by product_name\n\
  ...\n```\n\n现在啤酒就按字母顺序列出了：\n\n```\nBREWERY_NAME        PRODUCT_LIST\nBalthazar Brauerei\
  \  Der Helle Kumpel,Hercule Trippel,Monks and Nuns\nHappy Hoppy Hippo   Ghost of\
  \ Hops,Hazy Pink Cloud,Summer in India\nBrewing Barbarian   Coalminers Sweat,Hoppy\
  \ Crude Oil,Pale Rider Rides,Reindeer Fuel\n```\n\n`listagg()` 函数易于使用，并且作为内置函数，它具有很高的性能。只是存在几个缺点：\n\
  \n*   它无法返回大于 `varchar2` 的字符串——根据你的数据库设置，要么是 4,000 字节，要么是 32,767 字节。（尽管有支持处理此类情况的方法——稍后会详述。）\n\
  *   在 19c 版本之前，它不能进行 `distinct` 聚合。\n*   在 11.2 之前的版本中不存在。\n\n但在所有其他情况下，当你考虑字符串聚合时，`listagg()`\
  \ 应该是你的首选。然而，如果你*确实*发现自己身处上述情况之一，也存在替代方案。\n\n\n\n### 聚合函数 collect\n\n如果你遇到的是某种特殊情况，可以考虑的替代方案之一是使用\
  \ `collect` 函数聚合到一个集合（嵌套表类型）中，然后再从该集合构建字符串。\n\n因此，为了实现这一点，我需要定义如**代码清单 10-4** 所示的两个对象。第一个是嵌套表类型\
  \ `name_coll_type`，其元素为 `varchar2` 类型，长度根据我的需要设定——本例中为 `20 char`——但我只需将其表示为 `80\
  \ bytes`。这是由于一个错误导致的——详见注释以获得更详细解释。\n\n```\nSQL> create or replace type name_coll_type\n\
  2     as table of varchar2(80 byte);\n3  /\nSQL> create or replace function name_coll_type_to_varchar2\
  \ (\n2     p_name_coll    in name_coll_type\n3   , p_delimiter    in varchar2 default\
  \ null\n4  )\n5     return varchar2\n6  is\n7     v_name_string  varchar2(4000 char);\n\
  8  begin\n9     for idx in p_name_coll.first..p_name_coll.last\n10     loop\n11\
  \        if idx = p_name_coll.first then\n12           v_name_string := p_name_coll(idx);\n\
  13        else\n14           v_name_string := v_name_string\n15                \
  \         || p_delimiter\n16                         || p_name_coll(idx);\n17  \
  \      end if;\n18     end loop;\n19     return v_name_string;\n20  end name_coll_type_to_varchar2;\n\
  21  /\n```\n\n代码清单 10-4\n用于将集合转换为字符串的集合类型及函数\n\n我定义的第二个对象是函数 `name_coll_type_to_varchar2`，它将集合转换为带分隔符的字符串。它只是遍历集合的元素，并将它们不断连接到要返回的字符串变量上——如果提供了分隔符参数，则在每个元素之间添加分隔符。\n\
  \n**注意**\n\n类型 `name_coll_type` 本应是 `varchar2(20 char)`，但不幸的是，由于 Oracle 的一个错误，这会导致错误。只有当你使用多字节字符集（例如我使用的\
  \ `AL32UTF8`）的数据库，并且在定义 `varchar2` 列时使用了 `char` 语义时，才会出现此问题。这种组合会混淆 `collect` 函数。\n\
  \n我在此错误存在于 12.2 和 18.3 版本中，其他人也确认在 11.2 版本中存在。你可以在 My Oracle Support 上搜索 bug 29195635\
  \ 来查看它是否在未来的版本中被修复。当错误被修复后，你就可以改用正确的数据类型——在此之前，解决方法是使用 `varchar2(80 byte)`，这是 `varchar2(20\
  \ char)` 在 `AL32UTF8` 字符集中可能占用的最大字节数。\n\n因此，有了这两个对象，我现在就可以像**代码清单 10-5** 所示的那样，将它们与内置的\
  \ `collect` 和 `cast` 函数结合使用了。\n\n```\nSQL> select\n2     max(brewery_name) as brewery_name\n\
  3   , name_coll_type_to_varchar2(\n4        cast(\n5           collect(\n6     \
  \         product_name\n7              order by product_id\n8           )\n9   \
  \        as name_coll_type\n10        )\n11      , ','\n12     ) as product_list\n\
  13  from brewery_products\n14  group by brewery_id\n15  order by brewery_id;\n```\n\
  \n代码清单 10-5\n使用 collect 和已创建的函数\n\n它是如何工作的呢？嗯，从表达式的最内层开始，过程如下：\n\n*   第 5–8 行的 `collect`\
  \ 函数获取 `product_name` 并将其聚合到一个按 `product_id` 排序的集合中。但这是一个数据库内部使用的“通用”集合类型；我们需要告诉它应该放入哪种*真实的*集合类型。\n\
  *   因此，在第 4 行和第 9–10 行，我使用 `cast` 来指定我想要的集合类型是 `name_coll_type`。\n*   现在我有了正确类型的集合，可以在第\
  \ 3 行调用函数 `name_coll_type_to_varchar2`，并且在第 11 行，我指定在结果字符串中应使用逗号作为分隔符。\n\n代码清单 10-5\
  \ 的输出与使用 `listagg` 的代码清单 10-3 的输出相同。\n\n这种使用 `collect` 的方法可以作为 `listagg` 三个缺点的变通解决方案：\n\
  \n*   它可以在 11.2 之前的版本中使用。\n*   它支持在 `collect` 函数中使用 `distinct`，即使你尚未使用 19c 版本。\n\
  *   如果需要，你可以轻松创建一个函数 `name_coll_type_to_clob` 来处理结果无法放入 `varchar2` 的情况。\n\n由于我的数据库中安装了\
  \ APEX 包，我甚至可以使用这种方法，而无需创建自己的自定义嵌套表类型和函数。APEX 安装包自带一个类型 `apex_t_varchar2`，并且包 `apex_string`\
  \ 有一个 `join` 函数，它与我的 `name_coll_type_to_varchar2` 函数作用相同。\n\n因此，我可以通过只修改第 3 行和第\
  \ 9 行来调整代码清单 10-5 以使用 APEX 功能：\n\n```\n...\n3   , apex_string.join(\n...\n9    \
  \       as apex_t_varchar2\n...\n```\n\n即使我没有使用任何 APEX 应用程序，只要我的数据库中安装了 APEX API\
  \ 包，这就能正常工作。\n\n\n"
- '# 自定义聚合函数 stragg


  早在 Oracle 11.2 版本问世之前，人们在著名的 Tom Kyte 的 [*http://asktom.oracle.com*](http://asktom.oracle.com)
  网站上经常提出的一个问题是如何进行字符串聚合。于是 Tom 开发了一个名为 `stragg` 的自定义聚合函数作为答案，多年来被许多人使用。在此，我将展示一个我在此基础上添加了若干改进的版本。


  #### 注意事项


  您可能会在数据库的 `SYS` 模式中发现一个名为 `stragg` 的函数。这是一个基于 C 库、随 `dbms_xmlindex` 包一起安装的、鲜为人知的函数。它没有文档记录，专为
  XML 索引实现中的某些特定任务而设计。**请勿使用它！** 无法保证它的工作方式，并且很容易在不知情的情况下以不受支持的方式调用它，从而导致错误或错误结果。


  Oracle 数据 cartridges 接口 (`ODCI`) 是一组用于实现相当底层功能的接口函数，这些功能的使用方式与内置函数非常相似。它主要由库作者（例如使用
  C 语言）实现特殊功能时使用，但也可以用于在纯 `PL/SQL` 中实现的更简单的情况。


  由于本书主要是关于 `SQL` 的，我不会浪费纸张将整个实现打印在书中。因此，我将分段展示如代码清单 10-6 所示的创建语句，但跳过主体的大部分内容。


  ```

  SQL> create or replace type stragg_expr_type as object (

  2     element    varchar2(4000 char)

  3   , delimiter  varchar2(4000 char)

  4   , map member function map_func return varchar2

  5  );

  6  /

  Listing 10-6

  用于实现自定义聚合的类型、类型体和函数

  ```


  Tom Kyte 最初的 `stragg` 函数只是简单地聚合一个 `varchar2`，并且硬编码了所使用的分隔符，因为聚合函数无法创建多个参数。我改为聚合一个对象类型
  `stragg_expr_type`，允许我将所需的分隔符作为对象的第二个属性传递。


  ```

  SQL> create or replace type body stragg_expr_type

  2  as

  3     map member function map_func return varchar2

  4     is

  5     begin

  6        return element || ''|'' || delimiter;

  7     end map_func;

  8  end;

  9  /

  ```


  我在对象类型中实现了一个 `map member function`，因为它允许数据库判断两个对象是否相同。这反过来使得我的聚合函数能够支持 `distinct`
  关键字，而这正是 `listagg` 直到 19c 版本才具备的功能之一。


  ```

  SQL> create or replace type stragg_type as object

  2  (

  3     aggregated varchar2(4000)

  4   , delimiter  varchar2(4000)


  6   , static function ODCIAggregateInitialize(

  7        new_self    in out stragg_type

  8     ) return number


  10   , member function ODCIAggregateIterate(

  11        self        in out stragg_type

  12      , value       in     stragg_expr_type

  13     ) return number


  15   , member function ODCIAggregateTerminate(

  16        self        in     stragg_type

  17      , returnvalue out    varchar2

  18      , flags       in     number

  19     ) return number


  21   , member function ODCIAggregateMerge(

  22        self        in out stragg_type

  23      , other_self  in     stragg_type

  24     ) return number

  25  );

  26  /

  ```


  然后我定义了将要实现实际聚合的类型 `stragg_type`。我使用的两个属性用于内部实现。这四个函数由 `ODCI` 接口规定，必须按所示命名，并且参数列表必须完全一致（参数名称可以不同，但参数的顺序和类型必须匹配）：


  *   `ODCIAggregateInitialize` 类似于构造函数，在聚合开始时由数据库显式调用，因此我在此创建该对象的一个新实例。

  *   `ODCIAggregateIterate` 由数据库对每个要聚合的字符串调用，因此我在此将分隔符和字符串添加到 `aggregated` 属性中。（在原始的
  `stragg` 中，`value` 参数只是一个 `varchar2`；这里我传递的是一个 `stragg_expr_type` 类型的值。）

  *   `ODCIAggregateTerminate` 在聚合结束时由数据库调用，当它需要结果时，我在此返回聚合后的字符串。

  *   如果数据库决定将聚合工作拆分成多个部分（例如，在并行查询中），每个部分都会调用 `ODCIAggregateInitialize` 来获取一个对象，然后通过
  `ODCIAggregateIterate` 进行聚合。最后，每个部分都将拥有一个对象，其中一些字符串聚合在 `aggregated` 属性中——数据库随后将调用
  `ODCIAggregateMerge` 来合并内容，因此在此函数中，我将 `other_self` 对象的 `aggregated` 内容附加到 `self`
  对象中。


  以上是对函数中需要实现的内容的文字描述，然后我只需要在类型体中编写代码即可。


  ```

  SQL> create or replace type body stragg_type

  2  is

  ...

  54  end;

  55  /

  ```


  关于在类型体中实现这四个函数的代码，请参见配套脚本 *practical_fill_schema.sql*。


  ```

  SQL> create or replace function stragg(input stragg_expr_type )

  2     return varchar2

  3     parallel_enable aggregate using stragg_type;

  4  /

  ```


  创建了用于实现的对象类型后，最后要做的就是创建聚合函数 `stragg` 本身。输入参数的数据类型必须与 `ODCIAggregateIterate` 函数的
  `value` 参数匹配，返回数据类型必须与 `ODCIAggregateTerminate` 函数的 `returnvalue` 参数匹配。


  `aggregate using stragg_type` 告诉数据库这是一个由对象类型 `stragg_type` 实现的自定义聚合函数，因此当数据库使用此函数执行聚合时，它将调用该类型的
  `ODCI∗` 函数。关键字 `parallel_enable` 指定数据库可以使用并行化，因为我已实现了 `ODCIAggregateMerge`。


  创建了这些对象后，我现在可以在代码清单 10-7 中使用我的自定义聚合函数。


  ```

  SQL> select

  2     max(brewery_name) as brewery_name

  3   , stragg(

  4        stragg_expr_type(product_name, '','')

  5     ) as product_list

  6  from brewery_products

  7  group by brewery_id

  8  order by brewery_id;

  Listing 10-7

  使用 stragg 自定义聚合函数

  ```


  由于我使用 `ODCI` 接口将此函数声明为聚合函数，我可以在第 3-5 行像使用任何内置聚合函数一样使用 `stragg`。输入数据类型是 `stragg_expr_type`，因此我使用类型构造函数，传入产品名称和逗号作为分隔符。


  #### 注意


  使用对象类型向聚合函数传递分隔符的技巧很有效，但这确实需要我作为开发人员有一点自律精神，因为我需要确保分隔符是一个常量。原则上，我可以在每一行传递不同的分隔符值，但这会在实现中导致问题。我已尝试实现为使用首次调用
  `ODCITableIterate` 时传入的分隔符，但在并行化的情况下，会有多次来自不同行的 `ODCITableIterate` 调用。因此，确保分隔符值是常量非常重要——最安全的方式是使用字面量。


  代码清单 10-7 的输出与我从 `listagg` 和 `collect` 获得的输出几乎相同，但不一定完全一样：


  ```

  BREWERY_NAME        PRODUCT_LIST

  Balthazar Brauerei  Monks and Nuns,Der Helle Kumpel,Hercule Trippel

  Happy Hoppy Hippo   Hazy Pink Cloud,Ghost of Hops,Summer in India

  Brewing Barbarian   Coalminers Sweat,Pale Rider Rides,Hoppy Crude Oil,Reindeer Fuel

  ```



  `product_list` 列中的产品名称是相同的——其值结果完全一致。但使用此自定义聚合函数`stragg`时，分隔符字符串中产品的顺序是不确定的——我无法为其实施
  `order by` 子句。


  这里需要注意的是，如果我在调用 `stragg` 时添加 `distinct` 子句，其行为会有所不同：


  ```

  ...

  4        distinct stragg_expr_type(product_name, '','')

  ...

  ```


  突然之间，产品列表中的啤酒按字母顺序排序了：


  ```

  BREWERY_NAME        PRODUCT_LIST

  Balthazar Brauerei  Der Helle Kumpel,Hercule Trippel,Monks and Nuns

  Happy Hoppy Hippo   Ghost of Hops,Hazy Pink Cloud,Summer in India

  Brewing Barbarian   Coalminers Sweat,Hoppy Crude Oil,Pale Rider Rides,Reindeer Fuel

  ```


  这是数据库为了获取唯一值而必须对产品名称进行排序所导致的副作用。但这并不能保证总是像这里看到的这样有序并正常工作——数据库可能会找到一种方法，例如，使用哈希函数来执行
  `distinct`，那时结果就会变得非常无序。


  ## 聚合函数 xmlagg


  既然你已经看过了 `listagg`、`collect` 和 `stragg`——如果这还不够，下面的清单展示了使用 `xmlagg` 进行字符串聚合的第四种方法。


  ```

  SQL> select

  2     max(brewery_name) as brewery_name

  3   , rtrim(

  4        xmlagg(

  5           xmlelement(z, product_name, '','')

  6           order by product_id

  7        ).extract(''//text()'').getstringval()

  8      , '',''

  9     ) as product_list

  10  from brewery_products

  11  group by brewery_id

  12  order by brewery_id;

  清单 10-8

  使用 xmlagg 并从 xml 中提取文本

  ```


  审视一下我在这里使用的表达式，其工作原理如下：


  *   在第 5 行，我创建了一个名为 `z` 的 XML 元素（名称无关紧要），其中包含产品名称和逗号的连接。

  *   在第 4 和第 6 行使用 `xmlagg`，我创建了一个 XML 片段，它是前面创建的 `z` XML 元素的聚合——按产品 id 排序。

  *   在第 7 行，我移除了片段中的 XML 标签，只保留文本值。

  *   此时聚合的文本末尾多了一个逗号，因此我使用第 3 和第 8 行的 `rtrim` 将其去掉。


  所有这些加在一起，使得清单 10-8 的输出与清单 10-3 和 10-5 中的 `listagg` 和 `collect` 的输出完全一致。


  那么这个 `z` XML 元素是怎么回事？它的目的是什么？嗯，如果我只做 `xmlagg(xmlelement(...` 而跳过 `extract` 和 `rtrim`，对于
  Balthazar Brauerei 来说，输出将是这样的：


  ```

  Monks and Nuns,Hercule Trippel,Der Helle Kumpel,

  ```


  你可以看到一系列 `z` 元素的 XML 开始和结束标签，每个都包含一个产品名称和逗号。我用于 XML 标签的实际名称无关紧要，所以尽可能短也可以，因为当我对其执行
  `extract(''//text()'')` 时，它会被剥离掉：


  ```

  Monks and Nuns,Hercule Trippel,Der Helle Kumpel,

  ```


  现在你可以明白为什么需要 `rtrim` 来移除末尾的逗号了。


  创建 `z` XML 元素是在使用 `xmlagg` 时的一种良好做法。但实际上还有一种替代方法，可以让你免于执行 `extract` 来剥离 XML 标签。


  函数 `xmlparse` 接收文本形式的 XML 并将其转换为 `XMLType` 数据类型。通常它会检查是否是良好的 XML，但它也支持关键字 `wellformed`，通过它你告诉数据库“相信我，这是良构的
  XML，你不需要检查它。” 因此，我可以用 `xmlparse` 替换 `xmlelement` 的使用，从而跳过使用 `extract`：


  ```

  ...

  4        xmlagg(

  5           xmlparse(content product_name || '','' wellformed)

  6           order by product_id

  7        ).getstringval()

  ...

  ```


  这将直接给我输出，没有 XML 标签，准备好使用 `rtrim` 函数去掉最后一个逗号：


  ```

  Monks and Nuns,Hercule Trippel,Der Helle Kumpel,

  ```


  当你有我展示过的其他替代方案时，为什么还要考虑使用 `xmlagg`？部分原因是在较旧的数据库中，使用 `xmlagg` 就可以进行字符串聚合，而无需安装自己的数据类型，这很方便；部分原因是它是处理非常长的聚合的方式之一，就像我马上要展示给你的那样。


  ### 当结果不适合 VARCHAR2 时


  到目前为止我展示的字符串聚合，如果聚合输出的长度超过了 `varchar2` 的最大长度——通常是 4000 字节，但如果你的数据库 `max_string_size`
  设置为 `extended`，则可能是 32,767 字节——它们都将失败。


  如果你需要更大的输出该怎么办？为了向你展示这一点，我将使用 `monthly_sales` 表并将其与 `products` 表连接。


  我有 10 种产品中每一种的 3 年月度销售数据，因此此表中有 360 行。想象一下，我需要以固定长度格式输出每一行的产品名称——也就是说，每个产品名称用空格填充，使其恰好占满
  20 个字符，且不使用任何分隔符。结果是一个 7200 字符的单一字符串。


  在下面的清单中，我尝试使用 `listagg` 生成此字符串——由于我使用了 `group by`，我应该得到一行输出，其中包含一个包含这 7200 个字符、固定长度的
  360 个产品名称列表的列。


  ```

  SQL> select

  2     listagg(rpad(p.name, 20)) within group (

  3        order by p.id

  4     ) as product_list

  5  from products p

  6  join monthly_sales ms

  7     on ms.product_id = p.id;

  Error starting at line : 1 in command -

  Error report -

  ORA-01489: result of string concatenation is too long

  清单 10-9

  使用 listagg 时出现 ORA-01489 错误

  ```


  但在我的数据库中失败了，因为 `varchar2` 最长只能为 4,000 字节。为了解决这个问题，我有不同的选择。



  #### 仅获取结果的第一部分


  有时我实际上并不需要获取整个结果；只需获取能放入一个`varchar2`的内容，并附带一个指示，说明还有更多无法显示的内容即可。在 12.2 版本中，`listagg`
  函数得到了增强，正好提供了此功能，如我所示于清单 10-10。


  ```sql

  SQL> select

  2     listagg(

  3        rpad(p.name, 20)

  4        on overflow truncate ''{more}'' with count

  5     ) within group (

  6        order by p.id

  7     ) as product_list

  8  from products p

  9  join monthly_sales ms

  10     on ms.product_id = p.id;

  清单 10-10

  在 listagg 中抑制错误

  ```


  与清单 10-9 相比，我只是添加了第 4 行：


  *   关键字 `on` 和 `overflow` 用于指定如果聚合结果变得太长而无法放入一个 `varchar2` 时，数据库应执行的操作。默认是 `on overflow
  error`，即清单 10-9 中显示的错误。

  *   `truncate` 指定不引发错误，而是只返回能放入 `varchar2` 的内容并截断其余部分。请注意，它绝不会在列表中的字符串中间截断——导致溢出的那个字符串（使得输出无法容纳）将被整体截断。

  *   如果结果被截断，字面量 `''{more}''` 将被附加到结果后。如果不指定字面量，默认是省略号（三个点）`''...''`。

  *   `with count` 会导致被截断的元素数量（而非字符数）被附加到结果后。默认是 `without count`。


  添加第 4 行使得清单 10-10 能够无错误地运行，并给我如下输出，这是一个几乎 4000 个字符长的单个字符串（此处为节省篇幅省略了大部分）：


  ```

  PRODUCT_LIST

  Coalminers Sweat    Coalminers Sweat    ...[[3880 个字符已移除]]...Der Helle Kumpel    Der
  Helle Kumpel    {more}(162)

  ```


  因此，对于只需知道有更多内容无法容纳的情况，这是对 `listagg` 的一个很好的增强。但如果情况并非如此呢？那么我还有其他可能性。


  #### 尝试通过减少数据来使其适应


  可能存在这样的情况：使用 `listagg` 无法容纳的原因是数据不唯一，而你实际上不需要看到重复数据的每个单独出现——一次就足够了。当你的数据库是 19c 或更高版本时，你可以进行
  `distinct` 字符串聚合，使得较少的出现次数可能适应一个 `varchar2`。


  清单 10-11 类似于清单 10-9；我只是在 `listagg` 函数调用中添加了关键字 `distinct`，这是 19c 版本中的一个新特性。


  ```sql

  SQL> select

  2     listagg(distinct rpad(p.name, 20)) within group (

  3        order by p.id

  4     ) as product_list

  5  from products p

  6  join monthly_sales ms

  7     on ms.product_id = p.id;

  清单 10-11

  使用 distinct 减少数据

  ```


  由于此案例中的 7200 字符字符串包含大量重复项，使用 `distinct` 给我一个仅有 200 个字符的字符串：


  ```

  PRODUCT_LIST

  Coalminers Sweat    Der Helle Kumpel    Ghost of Hops       Hazy Pink Cloud     Hercule
  Trippel     Hoppy Crude Oil     Monks and Nuns      Pale Rider Rides    Reindeer
  Fuel       Summer in India

  ```


  如果我没有 19c 数据库，我可以使用一个带有 `select distinct` 的内联视图，然后在该内联视图的结果上执行 `listagg` 聚合。


  对于唯一数据集能使聚合结果足够小的情况，`listagg` 在 19c 或更高版本中支持此功能。但也可能存在你确实需要聚合结果大于 `varchar2` 的情况——这时你需要一个
  `clob`。


  #### 使用 CLOB 代替 VARCHAR2


  使用 clob 的一种方法是使用前面展示的 `collect` 函数，然后创建一个函数 `name_coll_type_to_clob`，而不是我展示的 `name_coll_type_to_varchar2`。我将此留给你作为练习，因为如果你愿意尝试，不需要做太多更改。


  但在清单 10-12 中，我将展示如何使用内置函数 `xmlagg` 聚合到一个 `clob`——这样你就不需要创建任何自己的函数。


  ```sql

  SQL> select

  2     xmlagg(

  3        xmlparse(

  4           content rpad(p.name, 20) wellformed

  5        )

  6        order by product_id

  7     ).getclobval() as product_list

  8  from products p

  9  join monthly_sales ms

  10     on ms.product_id = p.id;

  清单 10-12

  使用 xmlagg 聚合到 clob

  ```


  这非常类似于我在清单 10-8 中所做的，只是在第 7 行使用了 `getclobval()` 而不是 `getstringval()`。这确实是将 `xmltype`
  转换为 `clob` 而非 `varchar2` 所需的全部操作，结果就是我想要的 7200 字符字符串（此处显示时省略了大部分）：


  ```

  PRODUCT_LIST

  Coalminers Sweat    Coalminers Sweat    ...[[7120 个字符已移除]]...Pale Rider Rides    Pale
  Rider Rides

  ```


  如果我的数据库是 18c 或更高版本，我可以使用 `json_arrayagg` 作为 `xmlagg` 的替代品，获得与清单 10-12 相同的输出。我在清单
  10-13 中展示了一个例子。


  ```sql

  SQL> select

  2     json_value(

  3        replace(

  4           json_arrayagg(

  5              rpad(p.name, 20)

  6              order by product_id

  7              returning clob

  8           )

  9         , ''","''

  10         , ''''

  11        )

  12      , ''$[0]'' returning clob

  13     ) as product_list

  14  from products p

  15  join monthly_sales ms

  16     on ms.product_id = p.id;

  清单 10-13

  使用 json_arrayagg 聚合到 clob

  ```


  如果你没有创建自己的 `name_coll_type_to_clob` 并且数据库中安装了 APEX，你还有一个 APEX 函数可以使用，如我在清单 10-14
  中所示。


  ```sql

  SQL> select

  2     apex_string.join_clob(

  3        cast(

  4           collect(

  5              rpad(p.name, 20)

  6              order by p.id

  7           )

  8           as apex_t_varchar2

  9        )

  10      , ''''

  11      , 12 /* dbms_lob.call */

  12     ) as product_list

  13  from products p

  14  join monthly_sales ms

  15     on ms.product_id = p.id;

  清单 10-14

  使用 apex_string.join_clob 聚合到 clob

  ```


  这是一个可以像本章前面展示的 `apex_string.join` 一样使用的函数。由于 `apex_string.join_clob` 返回一个临时 clob，它与
  `apex_string.join` 相比有一个额外的参数，用于指示临时 clob 的生命周期，接受与 `dbms_lob.createtemporary` 相同的值。在第
  11 行，我指定该 clob 仅在调用期间存在。


  在未来的 `listagg` 实现可能实现 `clob` 支持之前，`xmlagg`、`json_arrayagg` 和 `apex_string.join_clob`
  都是有效可用的方法。数据库中的 JSON 功能通常从版本到版本都进行了优化，因此在最新的数据库版本中，JSON 函数通常是最快的解决方案。


  ### 经验教训


  我展示了内置和自定义的字符串聚合方法，使你能够：


  *   在除了它不起作用的特殊情况外，使用内置的 `listagg` 函数作为首选方法。

  *   创建一个嵌套表类型和一个函数（或使用 APEX 内置函数）来使用 `collect` 聚合函数作为替代方案。

  *   使用自定义创建的聚合函数 `stragg`。

  *   使用各种内置函数在 `varchar2` 和 `clob` 中执行字符串聚合。


  所有这些方法在特殊情况下都可能有用，但我通常的建议是，如果可以的话，坚持使用 `listagg`。内置功能通常比你自己构建的任何东西性能更好——除非情况非常特殊。


  '
- '# 第二部分：分析函数



  '
- "# 第十一章 分析分区、排序与窗口\n\n一位智者曾在会议演讲中说，如果你在简历上写了 SQL 却不懂分析函数，那基本等同于撒谎。我深表赞同。这就像声称自己熟悉\
  \ Windows 系统，却从未使用过比 Windows 95 更新的版本。\n\n在开发工作中，我几乎每天都会使用分析函数。许多场景下，它们要么是构建 SQL\
  \ 解决方案的**必要条件**（否则只能采用缓慢的过程式方案），要么至少能大幅提升 SQL 性能（特别是在需要多次自连接导致重复查找相同数据的情况下）。\n\n\
  分析函数最精妙之处在于，它允许跨行检索或引用数值——在执行计算时，你不再局限于当前行的值。通过灵活组合分析函数的不同子句，可以实现这一特性。\n\n本章将介绍这些子句的基础知识及其协同工作机制。第二部分后续章节将展示分析函数解决各类实际问题的应用案例——这些问题若不使用分析函数通常难以处理。\n\
  \n### 数量求和示例\n\n为展示分析函数调用中各子句的作用，我将使用图 11-1 所示的 `orderlines` 表。\n\n![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig1_HTML.jpg](img/475066_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1\n\n记录客户对各产品订购数量的订单明细表\n\n`orderlines` 表记录了客户对 `products` 表中每种啤酒的订购数量。本章示例查询将连接这两个表，以便更清晰地展示代码清单\
  \ 11-1 中两种啤酒的数据。\n\n```sql\nSQL> select\n2     ol.product_id as p_id\n3   , p.name\
  \        as product_name\n4   , ol.order_id   as o_id\n5   , ol.qty\n6  from orderlines\
  \ ol\n7  join products p\n8     on p.id = ol.product_id\n9  where ol.product_id\
  \ in (4280, 6600)\n10  order by ol.product_id, ol.qty;\nP_ID  PRODUCT_NAME     O_ID\
  \  QTY\n4280  Hoppy Crude Oil  423   60\n4280  Hoppy Crude Oil  427   60\n4280 \
  \ Hoppy Crude Oil  422   80\n4280  Hoppy Crude Oil  429   80\n4280  Hoppy Crude\
  \ Oil  428   90\n4280  Hoppy Crude Oil  421  110\n6600  Hazy Pink Cloud  424   16\n\
  6600  Hazy Pink Cloud  426   16\n6600  Hazy Pink Cloud  425   24\n代码清单 11-1\n两种啤酒在订单明细表中的数据\n\
  ```\n\n接下来将对 `qty` 列进行多种求和计算。`sum` 函数在此仅作为示例，其原理适用于大多数分析函数。\n\n### 分析函数语法\n\n相信你在\
  \ SQL 参考手册中见过图 11-2，它展示了所有分析函数都使用 `over` 关键字，后接包含分析子句的括号结构。\n\n![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig2_HTML.jpg](img/475066_1_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2\n\n分析函数基础语法结构图\n\n许多函数在不使用 `over` 时是聚合函数，加上 `over` 后则转变为分析函数。核心逻辑体现在图 11-3\
  \ 所示的分析子句中。\n\n![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig3_HTML.jpg](img/475066_1_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3\n\n分析子句的三个组成部分\n\n分析子句包含三个部分：\n\n*   `query_partition_clause`：将数据划分为多个分区，并对每个分区单独应用函数\n\
  *   `order_by_clause`：按指定顺序应用函数，和/或为 `windowing_clause` 提供排序依据\n*   `windowing_clause`：在分区内指定特定窗口（固定或移动窗口）\n\
  \n但请注意语法结构图中这三部分都是可选的，这意味着分析子句本身可以为空。代码清单 11-2 展示了这种情况下会发生什么。\n\n```sql\nSQL> select\n\
  2     ol.product_id as p_id\n3   , p.name        as product_name\n4   , ol.order_id\
  \   as o_id\n5   , ol.qty\n6   , sum(ol.qty) over () as t_qty\n7  from orderlines\
  \ ol\n8  join products p\n9     on p.id = ol.product_id\n10  where ol.product_id\
  \ in (4280, 6600)\n11  order by ol.product_id, ol.qty;\n代码清单 11-2\n最简单的分析函数调用——计算总计\n\
  ```\n\n我在代码清单 11-1 的基础上增加了第 6 行：将 `qty` 列的 `sum` 作为分析函数（通过 `over` 关键字识别），且分析子句为空。输出结果变为：\n\
  \n```sql\nP_ID  PRODUCT_NAME     O_ID  QTY  T_QTY\n4280  Hoppy Crude Oil  423  \
  \ 60   536\n4280  Hoppy Crude Oil  427   60   536\n4280  Hoppy Crude Oil  422  \
  \ 80   536\n4280  Hoppy Crude Oil  429   80   536\n4280  Hoppy Crude Oil  428  \
  \ 90   536\n4280  Hoppy Crude Oil  421  110   536\n6600  Hazy Pink Cloud  424  \
  \ 16   536\n6600  Hazy Pink Cloud  426   16   536\n6600  Hazy Pink Cloud  425  \
  \ 24   536\n```\n\n`t_qty` 列简单地包含了所有 `qty` 值的总和——并非整个表的总和，而是满足 `where` 子句条件的那些行的总和。\n\
  \n执行 SQL 语句时，分析函数的计算发生在行数据被筛选出来（`where` 子句计算）**之后**，也发生在可能存在的任何 `group by` 聚合**之后**。因此，分析函数不能用于\
  \ `where`、`group by` 和 `having` 子句。但如果需要，它们可以用于 `order by` 子句。\n\n分析子句为空意味着未定义任何分区，因此只存在一个包含所有行的单一分区。同时也没有定义排序和窗口，因此整个分区就是应用\
  \ `sum` 函数的窗口，最终得到总计结果。\n\n不过在实际应用中，我通常更希望分析函数能在更小的子集上进行计算，接下来将展示具体方法。\n\n\n\n###\
  \ 分区\n\n有两种方法可以将行拆分为更小的子集用于分析函数，每种方法服务于不同的目的。第一种是使用图 11-4 所示的 *query_partition_clause*\
  \ 进行分区。\n\n![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig4_HTML.jpg](img/475066_1_En_11_Fig4_HTML.jpg)\n\
  \n**图 11-4**\n\n`query_partition_clause` 的语法图\n\n你可以使用一个或多个表达式进行分区，对于表达式中的每个不同值，都会创建一个分区。每个分区是完全隔离的，在一个分区中计算的分析函数无法看到任何其他分区中的数据。\n\
  \n**注意**\n\n你会发现清单 11-3 与清单 11-2 相同，只是更改了分析函数调用。本章中的大多数示例都是如此——除非另有说明，否则它们都是清单 11-2\
  \ 的副本，仅显示了更改后的函数调用。\n\n我在清单 11-3 中展示了一个使用 `partition by` 的简单示例。\n\n```\n...\n6 \
  \  , sum(ol.qty) over (\n7        partition by ol.product_id\n8     ) as p_qty\n\
  ...\n清单 11-3\n使用分区按产品创建小计\n```\n\n分析子句不再为空；我在第 7 行添加了 `partition by ol.product_id`，为每种啤酒创建了一个分区，现在总计只适用于每个分区内部。这样\
  \ `p_qty` 就是每个产品的总计：\n\n```\nP_ID  产品名称        O_ID  数量  P_QTY\n4280  Hoppy Crude\
  \ Oil  423   60   480\n4280  Hoppy Crude Oil  427   60   480\n4280  Hoppy Crude\
  \ Oil  422   80   480\n4280  Hoppy Crude Oil  429   80   480\n4280  Hoppy Crude\
  \ Oil  428   90   480\n4280  Hoppy Crude Oil  421   110  480\n6600  Hazy Pink Cloud\
  \  424   16   56\n6600  Hazy Pink Cloud  426   16   56\n6600  Hazy Pink Cloud  425\
  \   24   56\n```\n\n这很好，但我可以用第二种将数据拆分为子集的方式——使用 *order_by_clause* 和 *windowing_clause*\
  \ 的窗口功能——发挥更大的创造力。\n\n### 排序与窗口\n\n对于图 11-5 所示的 *order_by_clause* 语法，SQL 参考手册的作者复制了查询中常规\
  \ `order by` 的语法。\n\n![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig5_HTML.jpg](img/475066_1_En_11_Fig5_HTML.jpg)\n\
  \n**图 11-5**\n\n`order_by_clause` 的语法图\n\n但这并不完全准确。当你阅读手册中的以下描述时，它解释了不能使用关键字 `siblings`，也不能在分析\
  \ `order by` 中使用 *position* 和 *c_alias*。\n\n对于某些分析函数，只有 *query_partition_clause*\
  \ 和 *order_by_clause*——第三个子句不可用。但对于许多函数，你还可以使用 *windowing_clause*（图 11-6）。要使用窗口功能，你必须已填写\
  \ *order_by_clause*。\n\n![../images/475066_1_En_11_Chapter/475066_1_En_11_Fig6_HTML.jpg](img/475066_1_En_11_Fig6_HTML.jpg)\n\
  \n**图 11-6**\n\n`windowing_clause` 的语法图\n\n我在清单 11-4 中同时使用了排序和窗口来做一个累计总和。\n\n```\n\
  ...\n6   , sum(ol.qty) over (\n7        order by ol.qty\n8        rows between unbounded\
  \ preceding\n9                 and current row\n10     ) as r_qty\n...\n15  order\
  \ by ol.qty;\n清单 11-4\n使用排序和窗口创建累计总和\n```\n\n第 7 行包含我的 `order by`，第 8–9 行是窗口规范。我指定在计算给定行的分析总和时，应对从最前面一行到当前行（包括当前行）的所有前序行应用滚动窗口。为了便于观察，我将第\
  \ 15 行的 `order by` 更改为与第 7 行的 `order by` 一致，这样输出中 `r_qty` 就是 `qty` 的累计总和：\n\n```\n\
  P_ID  产品名称        O_ID  数量  R_QTY\n6600  Hazy Pink Cloud  426   16   16\n6600  Hazy\
  \ Pink Cloud  424   16   32\n6600  Hazy Pink Cloud  425   24   56\n4280  Hoppy Crude\
  \ Oil  427   60   116\n4280  Hoppy Crude Oil  423   60   176\n4280  Hoppy Crude\
  \ Oil  422   80   256\n4280  Hoppy Crude Oil  429   80   336\n4280  Hoppy Crude\
  \ Oil  428   90   426\n4280  Hoppy Crude Oil  421   110  536\n```\n\n每一行的 `qty`\
  \ 都在按顺序处理行时被累加，从而得到累计总和。当排序不唯一时，数据库首先访问哪一行，哪一行就会首先被加入总和。输出的前两行可能显示 `o_id` 424 在\
  \ 426 之前，如果访问计划使得 424 先被访问的话。\n\n我可以将第 15 行的 `order by` 更改回与清单 11-2（以及大多数其他示例）相同的顺序，先按\
  \ `product_id` 排序，然后按 `qty` 排序：\n\n```\n...\n15  order by ol.product_id, ol.qty;\n\
  ```\n\n现在我的输出顺序不同了，但累计总和 *仍然* 是基于分析 `sum` 中的 `order by`（即单独的 `qty`）计算的。你会看到，例如，之前输出的前两行现在出现在接近末尾的位置，但\
  \ `o_id` 426 的 `r_qty` 值仍然是 16，`o_id` 424 的值是 32，依此类推：\n\n```\nP_ID  产品名称      \
  \  O_ID  数量  R_QTY\n4280  Hoppy Crude Oil  423   60   176\n4280  Hoppy Crude Oil\
  \  427   60   116\n4280  Hoppy Crude Oil  422   80   256\n4280  Hoppy Crude Oil\
  \  429   80   336\n4280  Hoppy Crude Oil  428   90   426\n4280  Hoppy Crude Oil\
  \  421   110  536\n6600  Hazy Pink Cloud  424   16   32\n6600  Hazy Pink Cloud \
  \ 426   16   16\n6600  Hazy Pink Cloud  425   24   56\n```\n\n在与输出本身不同的顺序上应用分析功能，在很多情况下是一种有用的技术。\n\
  \n**提示**\n\n图 11-6 的下半部分显示了快捷语法。当窗口是 `rows between` *something* `and current row`\
  \ 时，你可以简单地使用 `rows` *something*，它会默认使用 *something* 作为窗口的起始行，`current row` 作为结束行。在清单\
  \ 11-4 中，我本可以用一行 `rows unbounded preceding` 来替换第 8–9 行。我个人喜欢总是使用 `between` 语法，但你可以使用快捷方式。这只是语法上的差异，结果是相同的。\n\
  \n当然，我可以在一次调用中结合所有三个子句，就像我在清单 11-5 中所做的那样。\n\n```\n...\n6   , sum(ol.qty) over (\n\
  7        partition by ol.product_id\n8        order by ol.qty\n9        rows between\
  \ unbounded preceding\n10                 and current row\n11     ) as p_qty\n...\n\
  清单 11-5\n结合分区、排序和窗口\n```\n\n我在第 7 行按 `product_id` 分区，在第 8 行按 `qty` 排序，因此第 8–9 行的窗口为我提供了每种啤酒的累计\
  \ `sum`，输出很好地显示了这一点，因为我保持了通常的查询排序 `product_id, qty`：\n\n```\nP_ID  产品名称        O_ID\
  \  数量  P_QTY\n4280  Hoppy Crude Oil  423   60   60\n4280  Hoppy Crude Oil  427 \
  \  60   120\n4280  Hoppy Crude Oil  422   80   200\n4280  Hoppy Crude Oil  429 \
  \  80   280\n4280  Hoppy Crude Oil  428   90   370\n4280  Hoppy Crude Oil  421 \
  \  110  480\n6600  Hazy Pink Cloud  424   16   16\n6600  Hazy Pink Cloud  426  \
  \ 16   32\n6600  Hazy Pink Cloud  425   24   56\n```\n\n窗口功能非常方便，经常用于累计总和，但窗口可以比这灵活得多。\n\
  \n\n\n### 窗口子句的灵活性\n\n前两个代码清单中的运行总计是*直至并包含当前行*，这很正常。但窗口不一定需要包含当前行，正如我在代码清单 11-6\
  \ 中展示的，它计算了所有之前行的运行总计。\n\n```sql\n...\n6   , sum(ol.qty) over (\n7        partition\
  \ by ol.product_id\n8        order by ol.qty\n9        rows between unbounded preceding\n\
  10                 and 1 preceding\n11     ) as p_qty\n...\n```\n\n**代码清单 11-6**\n\
  包含所有之前行的窗口\n\n在第 10 行，我将 `current row` 替换为 `1 preceding`，这意味着窗口是*直至并包含当前行之前一行*的所有行：\n\
  \n```\nP_ID  PRODUCT_NAME     O_ID  QTY  P_QTY\n4280  Hoppy Crude Oil  423   60\n\
  4280  Hoppy Crude Oil  427   60   60\n4280  Hoppy Crude Oil  422   80   120\n4280\
  \  Hoppy Crude Oil  429   80   200\n4280  Hoppy Crude Oil  428   90   280\n4280\
  \  Hoppy Crude Oil  421   110  370\n6600  Hazy Pink Cloud  424   16\n6600  Hazy\
  \ Pink Cloud  426   16   16\n6600  Hazy Pink Cloud  425   24   32\n```\n\n你会注意到，这意味着每个分区的第一行\
  \ `p_qty` 是 `null`，因为此时没有前序行。\n\n窗口也可以*向前*查看数据，而不仅仅是查看之前的行。我可以将代码清单 11-6 的窗口规范更改为从当前行开始并包含分区内所有后续行的窗口：\n\
  \n```sql\n...\n9        rows between current row\n10                 and unbounded\
  \ following\n...\n```\n\n这给了我一个反向的运行总计：\n\n```\nP_ID  PRODUCT_NAME     O_ID  QTY\
  \  P_QTY\n4280  Hoppy Crude Oil  423   60   480\n4280  Hoppy Crude Oil  427   60\
  \   420\n4280  Hoppy Crude Oil  422   80   360\n4280  Hoppy Crude Oil  429   80\
  \   280\n4280  Hoppy Crude Oil  428   90   200\n4280  Hoppy Crude Oil  421   110\
  \  110\n6600  Hazy Pink Cloud  424   16   56\n6600  Hazy Pink Cloud  426   16  \
  \ 40\n6600  Hazy Pink Cloud  425   24   24\n```\n\n同样，我不仅可以包含当前行，还可以仅使用所有*即将到来的*行作为一个窗口：\n\
  \n```sql\n...\n9        rows between 1 following\n10                 and unbounded\
  \ following\n...\n```\n\n每个分区末尾的 `null` 值表示没有后续行：\n\n```\nP_ID  PRODUCT_NAME   \
  \  O_ID  QTY  P_QTY\n4280  Hoppy Crude Oil  423   60   420\n4280  Hoppy Crude Oil\
  \  427   60   360\n4280  Hoppy Crude Oil  422   80   280\n4280  Hoppy Crude Oil\
  \  429   80   200\n4280  Hoppy Crude Oil  428   90   110\n4280  Hoppy Crude Oil\
  \  421   110\n6600  Hazy Pink Cloud  424   16   40\n6600  Hazy Pink Cloud  426 \
  \  16   24\n6600  Hazy Pink Cloud  425   24\n```\n\n我可以在两端指定窗口边界，例如，对前一行、当前行和后一行的值进行求和：\n\
  \n```sql\n...\n9        rows between 1 preceding\n10                 and 1 following\n\
  ...\n```\n\n```\nP_ID  PRODUCT_NAME     O_ID  QTY  P_QTY\n4280  Hoppy Crude Oil\
  \  423   60   120\n4280  Hoppy Crude Oil  427   60   200\n4280  Hoppy Crude Oil\
  \  422   80   220\n4280  Hoppy Crude Oil  429   80   250\n4280  Hoppy Crude Oil\
  \  428   90   280\n4280  Hoppy Crude Oil  421   110  200\n6600  Hazy Pink Cloud\
  \  424   16   32\n6600  Hazy Pink Cloud  426   16   56\n6600  Hazy Pink Cloud  425\
  \   24   40\n```\n\n或者，我可以创建一个两端无界的窗口：\n\n```sql\n...\n9        rows between unbounded\
  \ preceding\n10                 and unbounded following\n...\n```\n\n但这没什么意义，因为完全无界的窗口就是整个分区，这意味着\
  \ `order by` 子句实际上对输出没有影响，这与我从没有 `order by` 和没有窗口子句的代码清单 11-3 得到的结果相同：\n\n```\n\
  P_ID  PRODUCT_NAME     O_ID  QTY  P_QTY\n4280  Hoppy Crude Oil  423   60   480\n\
  4280  Hoppy Crude Oil  427   60   480\n4280  Hoppy Crude Oil  422   80   480\n4280\
  \  Hoppy Crude Oil  429   80   480\n4280  Hoppy Crude Oil  428   90   480\n4280\
  \  Hoppy Crude Oil  421   110  480\n6600  Hazy Pink Cloud  424   16   56\n6600 \
  \ Hazy Pink Cloud  426   16   56\n6600  Hazy Pink Cloud  425   24   56\n```\n\n\
  所以对于完全无界的窗口，我建议直接跳过 `order by` 和窗口子句。\n\n在语法图中，你看到窗口可以使用 `rows between` 或 `range\
  \ between` 来指定。正如我给出的几个例子，`rows between` 窗口由当前行之前或之后的行数决定。`range between` 则有所不同。\n\
  \n\n### 基于值范围的窗口\n\n如果我需要，我可以定义一个窗口，不是“当前行的前两行到后两行”，而是“那些值在当前行值的减 20 到加 20 范围内的行”。这可以通过\
  \ `range between` 来实现，如代码清单 11-7 所示。\n\n```\n...\n6   , sum(ol.qty) over (\n7  \
  \      partition by ol.product_id\n8        order by ol.qty\n9        range between\
  \ 20 preceding\n10                  and 20 following\n11     ) as p_qty\n...\n```\n\
  \n**代码清单 11-7** 基于数量（qty）值的范围窗口\n\n当我在第 9-10 行指定 `between 20 preceding and 20 following`\
  \ 时，我要求窗口包含那些值在当前行值加/减 20 范围内的行。但这个“值”指的是什么值？\n\n`range` 使用的值，是在分析函数的 `order by`\
  \ 子句中所用列的值。因此，要使用范围窗口，`order by` 列必须是数字或日期/时间戳类型。\n\n我在 `sum` 函数中计算总和的列，不必与用于排序和范围定义的列相同，但在实践中，它们通常是相同的。这会得到一个输出，其中你可以看到第三和第四行都得到了\
  \ 370 的总和，因为它是分区内所有值在 80-20=60 到 80+20=100 之间的行的总和：\n\n```\nP_ID  PRODUCT_NAME \
  \    O_ID  QTY  P_QTY\n4280  Hoppy Crude Oil  423   60   280\n4280  Hoppy Crude\
  \ Oil  427   60   280\n4280  Hoppy Crude Oil  422   80   370\n4280  Hoppy Crude\
  \ Oil  429   80   370\n4280  Hoppy Crude Oil  428   90   360\n4280  Hoppy Crude\
  \ Oil  421   110  200\n6600  Hazy Pink Cloud  424   16   56\n6600  Hazy Pink Cloud\
  \  426   16   56\n6600  Hazy Pink Cloud  425   24   56\n```\n\n即使范围窗口也不必包含当前行值；我也可以指定窗口包含那些\
  \ `qty` 值在当前 `qty` + 5 到当前 `qty` + 25 之间的行：\n\n```\n...\n9        range between\
  \  5 following\n10                  and 25 following\n...\n```\n\n```\nP_ID  PRODUCT_NAME\
  \     O_ID  QTY  P_QTY\n4280  Hoppy Crude Oil  423   60   160\n4280  Hoppy Crude\
  \ Oil  427   60   160\n4280  Hoppy Crude Oil  422   80   90\n4280  Hoppy Crude Oil\
  \  429   80   90\n4280  Hoppy Crude Oil  428   90   110\n4280  Hoppy Crude Oil \
  \ 421   110\n6600  Hazy Pink Cloud  424   16   24\n6600  Hazy Pink Cloud  426  \
  \ 16   24\n6600  Hazy Pink Cloud  425   24\n```\n\n累计求和也可以使用 `range` 窗口来完成：\n\n\
  ```\n...\n9        range between unbounded preceding\n10                  and current\
  \ row\n...\n```\n\n但请注意，对于 `qty` 值相同的行，累计求和的结果是相同的：\n\n```\nP_ID  PRODUCT_NAME \
  \    O_ID  QTY  P_QTY\n4280  Hoppy Crude Oil  423   60   120\n4280  Hoppy Crude\
  \ Oil  427   60   120\n4280  Hoppy Crude Oil  422   80   280\n4280  Hoppy Crude\
  \ Oil  429   80   280\n4280  Hoppy Crude Oil  428   90   370\n4280  Hoppy Crude\
  \ Oil  421   110  480\n6600  Hazy Pink Cloud  424   16   32\n6600  Hazy Pink Cloud\
  \  426   16   32\n6600  Hazy Pink Cloud  425   24   56\n```\n\n将此输出与代码清单 11-5 的输出对比，前两行在\
  \ `p_qty` 中的值分别是 60 和 120。而在这里，它们都是 120。\n\n这是 `range` 窗口的特性所致，它赋予了 `current row`\
  \ 这个术语不同的含义。它不再具体指*那一行*当前行，而是指当前行的*值*。（在我看来，如果能对 `range` 窗口使用 `current value` 这样的措辞会更好，但不幸的是，这不是支持的语法。）\n\
  \n所以你会看到，在值存在并列（ties）的情况下，使用 `current row` 的 `range` 窗口实际上可能*包含后续的行*。这引出了一个非常容易掉入的陷阱。\n\
  \n### 默认窗口的危险性\n\n在图 11-3 中，你可以看到有可能使用 `order by` 而*不*指定窗口子句。这会导致一个默认的窗口子句，它可能会让你惊讶。在代码清单\
  \ 11-8 中，我展示了默认情况、`range between` 和 `rows between` 之间的区别。\n\n```sql\nSQL> select\n\
  2     ol.product_id as p_id\n3   , p.name        as product_name\n4   , ol.order_id\
  \   as o_id\n5   , ol.qty\n6   , sum(ol.qty) over (\n7        partition by ol.product_id\n\
  8        order by ol.qty\n9        /* no window - rely on default */\n10     ) as\
  \ def_q\n11   , sum(ol.qty) over (\n12        partition by ol.product_id\n13   \
  \     order by ol.qty\n14        range between unbounded preceding\n15         \
  \         and current row\n16     ) as range_q\n17   , sum(ol.qty) over (\n18  \
  \      partition by ol.product_id\n19        order by ol.qty\n20        rows between\
  \ unbounded preceding\n21                 and current row\n22     ) as rows_q\n\
  23  from orderlines ol\n24  join products p\n25     on p.id = ol.product_id\n26\
  \  where ol.product_id in (4280, 6600)\n27  order by ol.product_id, ol.qty;\n```\n\
  \n**代码清单 11-8** 使用默认窗口、range 窗口和 rows 窗口的累计求和对比\n\n我这里有三个分析函数调用：\n\n*   第 6-10 行的\
  \ `def_q` 列使用了 `order by` 但留空了窗口子句。\n*   第 11-16 行的 `range_q` 列使用了 `range between`\
  \ 窗口进行累计求和。\n*   第 17-22 行的 `rows_q` 列使用了 `rows between` 窗口进行累计求和。\n\n在输出中你可以看到，`def_q`\
  \ 和 `range_q` 是相同的：\n\n```\nP_ID  PRODUCT_NAME     O_ID  QTY  DEF_Q  RANGE_Q  ROWS_Q\n\
  4280  Hoppy Crude Oil  423   60   120    120      60\n4280  Hoppy Crude Oil  427\
  \   60   120    120      120\n4280  Hoppy Crude Oil  422   80   280    280     \
  \ 200\n4280  Hoppy Crude Oil  429   80   280    280      280\n4280  Hoppy Crude\
  \ Oil  428   90   370    370      370\n4280  Hoppy Crude Oil  421   110  480   \
  \ 480      480\n6600  Hazy Pink Cloud  424   16   32     32       16\n6600  Hazy\
  \ Pink Cloud  426   16   32     32       32\n6600  Hazy Pink Cloud  425   24   56\
  \     56       56\n```\n\n是的，如果你有一个 `order_by_clause`，`windowing_clause` 的默认值就是\
  \ `range between unbounded preceding and current row`。\n\n我见过很多博客和论坛帖子，将累计求和展示为类似\
  \ `sum(col1) over (order by col2)` 的形式就到此为止了。当你用这个默认窗口测试代码时，通常能得到预期的结果，因为输出的差异只出现在值存在并列时。所以你可能直到代码投入生产后才能发现这个错误。\n\
  \n**注意**\n\n这不仅仅是值存在并列时的问题。即使你的 `order by` 列是唯一的，对累计求和使用默认的 `range between` 窗口也可能因为分析函数的计算而产生一些额外开销，影响性能。这是因为\
  \ `rows between` 可以被 SQL 引擎更优化地执行，而 `range between` 要求 SQL 引擎“向前查看”行，看看是否有后续行具有相同的值。关于这一点的更详细解释，请参见我之前写的一篇博客：`www.kibeha.dk/2013/02/rows-versus-default-range-in-analytic.html`。\n\
  \n在我看来，默认值本应是 `rows between`，因为根据我的经验，这是迄今为止最常用的窗口规范。我*非常*频繁地使用 `rows between`，而只在极少数情况下使用\
  \ `range between`。\n\n\n因此，我的最佳实践法则是：每当使用 `order by` 子句时，我总是*显式*地编写窗口子句，*从不*依赖默认设置。即使对于那些窗口恰好是\
  \ `range between unbounded preceding and current row` 的罕见情况，我仍然会显式地写出来。这告诉未来的我，或者将来维护我代码的任何开发人员，`range\
  \ between` 是故意的。如果我看到缺少窗口子句的代码，我总会怀疑它是否真的应该是 `range between`，或者只是从论坛帖子中误解了的复制粘贴。\n\
  \n当然，这仅适用于支持窗口子句的分析函数。另外，如果我的窗口是整个分区，我也不会使用它，此时我干脆省略 `order by` 和窗口子句，而不是写 `rows\
  \ between unbounded preceding and unbounded following`。\n\n但即使清单 11-5 遵循了这个经验法则，它还有另一个问题：由于优化器使用的访问计划不同，具有重复值的行在输出中的顺序可能不同，导致在不同代码执行中可能从相同数据得到不同的输出。\n\
  \n这个问题并不严格影响解决方案的正确性，但当用户观察到不同的输出时（即使两种输出都是正确的），他们很可能会质疑正确性。因此，我将以下做法作为最佳实践：在分析函数中（当使用\
  \ `rows between` 时，不适用于 `range between`），使 `partition by` 和 `order by` 中使用的列组合是唯一的。这使得输出是*确定性的*，因此用户可以验证他在每次运行中都得到相同的结果。\n\
  \n清单 11-9 展示了进行累计汇总的这两个最佳实践。\n\n```\nSQL> select\n2     ol.product_id as p_id\n\
  3   , p.name        as product_name\n4   , ol.order_id   as o_id\n5   , ol.qty\n\
  6   , sum(ol.qty) over (\n7        partition by ol.product_id\n8        order by\
  \ ol.qty, ol.order_id\n9        rows between unbounded preceding\n10           \
  \      and current row\n11     ) as p_qty\n12  from orderlines ol\n13  join products\
  \ p\n14     on p.id = ol.product_id\n15  where ol.product_id in (4280, 6600)\n16\
  \  order by ol.product_id, ol.qty, ol.order_id;\n清单 11-9\n累计求和的一个最佳实践\n```\n\n实际上，我只对每个\
  \ `product_id` 分区内的 `qty` 排序感兴趣（如清单 11-5 所示），但这两个列的组合并不唯一，使得输出是非确定性的。因此，我在两个 `order\
  \ by` 子句中（第 8 行和第 16 行）都添加了 `order_id`：\n\n```\nP_ID  PRODUCT_NAME     O_ID  QTY\
  \  P_QTY\n4280  Hoppy Crude Oil  423   60   60\n4280  Hoppy Crude Oil  427   60\
  \   120\n4280  Hoppy Crude Oil  422   80   200\n4280  Hoppy Crude Oil  429   80\
  \   280\n4280  Hoppy Crude Oil  428   90   370\n4280  Hoppy Crude Oil  421   110\
  \  480\n6600  Hazy Pink Cloud  424   16   16\n6600  Hazy Pink Cloud  426   16  \
  \ 32\n6600  Hazy Pink Cloud  425   24   56\n```\n\n这确保了输出的确定性。\n\n在这种情况下，语句甚至可以只使用单个排序操作来执行，因为分析函数\
  \ `partition by` 中的列后接分析函数 `order by` 中的列，与最终第 16 行的 `order by` 中的列相匹配。这使得优化器可以跳过最终的排序，因为分析函数的评估已经正确地对数据进行了排序。\n\
  \n### 经验教训\n\n本章介绍了分析函数的三个子句的基本要素。虽然我是专门使用 `sum` 函数来展示的，但你可以将其推广到其他分析函数，并运用你学到的关于以下内容的知识：\n\
  \n- 使用 `partition by` 将行分割成若干部分，分析函数在每个部分内单独应用。\n- 使用窗口子句与 `order by` 结合，创建移动的行窗口来计算，例如，累计汇总。\n\
  - 理解*默认*窗口子句很少适用于你的用例，因此始终使用*显式*窗口子句是个好主意。\n\n充分理解这些子句后，你就可以让分析函数为你解决许多原本困难的任务。本书这一部分的后续章节将专门介绍几个这样的解决方案。\n\
  \n## 12. 回答 Top-N 问题\n\n我认为几乎没有开发者没有被要求创建过 Top-N 报告。业务部门提出的可以归类为 Top-N 问题的问题比比皆是，例如以下这些：\n\
  \n- 我们的哪些产品最畅销？\n- 哪些用户资料发布的推文最多？\n- 哪些销售员工产生的潜在客户最多？\n- 连锁酒店中哪些酒店收到的投诉最少？\n\n最后一个严格来说可以称为\
  \ Bottom-N 问题，但这在原则上完全是一回事。对于 Top-N 报告，你按特定*降序*对数据进行排序，并挑选 Top-N 行数据。如果你想要 Bottom-N\
  \ 报告，你只需按特定*升序*对数据进行排序，然后仍然挑选 Top-N 行数据。在 SQL 术语中，这仅仅是做 `order by col_name desc`\
  \ 与 `order by col_name asc` 的问题。所以我只展示 Top-N 的例子——Bottom-N 你可以通过将 `desc` 替换为 `asc`\
  \ 来得到。\n\n为了演示 Top-N SQL，我使用上面列表中的第一个问题：我们的哪些产品最畅销？\n\n### 销售数据的 Top-N\n\n由于我的 Good\
  \ Beer Trading 公司销售啤酒，市场部要求我找出公司销售的 Top-3 最畅销啤酒，以便他们可以开展一个类似图 12-1 所示的领奖台活动。\n\n\
  ![../images/475066_1_En_12_Chapter/475066_1_En_12_Fig1_HTML.jpg](img/475066_1_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1 按总销售额排名的 Top-3 啤酒\n\n他们现在给我的这个问题相当笼统，所以我需要回头找他们，让他们具体说明他们的意思。我是按销售数量还是销售金额来确定排序？他们想要的是有史以来的最畅销品还是特定年份的？如果有并列情况，即两种或多种啤酒销量相同，我该怎么办？\n\
  \n通常，作为开发者，获得所需详细规格说明的最简单方法是给他们举例，因为他们有时不理解为什么“Top-3 最畅销啤酒”是一个模糊的问题。\n\n#### 你指的是哪种\
  \ Top-3？\n\n特别是在出现并列时该怎么做存在模糊性。一般来说有三种情况：\n\n- Top-行规则：“*我正好要 3 行*。” 在这种情况下，我需要向业务部门解释，这意味着他们不会看到，例如，与第三行值完全相同的第四行。对于这样的并列，输出不会显示两行，而只显示其中一行。在这种情况下，要么是随机显示一行，要么业务部门需要决定一个平局规则来确定输出哪一行。\n\
  - 奥运会规则：“*我想要金、银、铜牌，按奥运会的方式*。” 根据体育比赛中常用的规则，例如，如果第一名并列，则颁发两枚金牌，然后跳过银牌，第三名获得铜牌。使用此规则可能导致输出超过三行，例如，当铜牌并列时，将有一个第一名、一个第二名和两个第三名，总共输出四行。\n\
  - Top-值规则：“*我想要所有拥有 Top-3 值的行*。” 使用前一个规则，如果第二名并列，将有一个金牌和两个银牌，但没有铜牌。这个规则规定，无论第一名、第二名、第三名有多少并列，输出都应包含所有拥有\
  \ Top-3 值的行。\n\n所有这些 Top-3 规则都可以在 SQL 中处理——我将演示如何做。\n\n\n\n### 啤酒销售数据\n\n图 12-2\
  \ 展示了按月统计的啤酒销售数据表和啤酒产品名称表。\n\n![../images/475066_1_En_12_Chapter/475066_1_En_12_Fig2_HTML.jpg](img/475066_1_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2：保存月度产品销售数据的表。\n\n我将对产品的总销售额以及每年的销售额（有 2016 年、2017 年和 2018 年的销售数据）进行 Top-N\
  \ 查询。在代码清单 12-1 中，我创建了几个用于汇总月度销售的视图。\n\n```\nSQL> create or replace view total_sales\n\
  2  as\n3  select\n4     ms.product_id\n5   , max(p.name) as product_name\n6   ,\
  \ sum(ms.qty) as total_qty\n7  from products p\n8  join monthly_sales ms\n9    \
  \ on ms.product_id = p.id\n10  group by\n11     ms.product_id;\nView TOTAL_SALES\
  \ created.\nSQL> create or replace view yearly_sales\n2  as\n3  select\n4     extract(year\
  \ from ms.mth) as yr\n5   , ms.product_id\n6   , max(p.name) as product_name\n7\
  \   , sum(ms.qty) as yr_qty\n8  from products p\n9  join monthly_sales ms\n10  \
  \   on ms.product_id = p.id\n11  group by\n12     extract(year from ms.mth), ms.product_id;\n\
  View YEARLY_SALES created.\n```\n\n代码清单 12-1：用于汇总总销售额和年度销售额的视图。\n\n查询 `total_sales`\
  \ 视图，我可以在代码清单 12-2 中按 `total_qty desc` 进行排序。\n\n```\nSQL> select product_name, total_qty\n\
  2  from total_sales\n3  order by total_qty desc;\n```\n\n代码清单 12-2：总销售数据的视图。\n\n\
  这显示了产品表中的十种啤酒，我可以直观地看到哪些啤酒是销量前三的啤酒。由于第二名出现了并列，那么根据“前几行”规则和奥林匹克规则，是前三行；而根据“相同数值”规则，则是前四行：\n\
  \n```\nPRODUCT_NAME      TOTAL_QTY\nReindeer Fuel     1604\nGhost of Hops     1485\n\
  Monks and Nuns    1485\nDer Helle Kumpel  1230\nHercule Trippel   1056\nSummer in\
  \ India   961\nPale Rider Rides  883\nCoalminers Sweat  813\nHazy Pink Cloud   324\n\
  Hoppy Crude Oil   303\n```\n\n我也可以用同样的方式查询 `yearly_sales` 视图：\n\n```\nSQL> select\
  \ yr, product_name, yr_qty\n2  from yearly_sales\n3  order by yr, yr_qty desc;\n\
  ```\n\n但在代码清单 12-3 中，我将使用第 8 章中的**数据透视**技术，按年份在列中显示啤酒的排名。虽然这对于进行 Top-N 查询不是必需的，但它能将数据在三年间的变化差异可视化。\n\
  \n```\nSQL> select *\n2  from (\n3     select\n4        yr, product_name, yr_qty\n\
  5      , row_number() over (\n6           partition by yr\n7           order by\
  \ yr_qty desc\n8        ) as rn\n9     from yearly_sales\n10  )\n11  pivot (\n12\
  \     max(product_name) as prod\n13   , max(yr_qty)\n14     for yr in (\n15    \
  \    2016, 2017, 2018\n16     )\n17  )\n18  order by rn;\n```\n\n代码清单 12-3：年度销售数据视图（手动格式化，非\
  \ ansiconsole 格式）。\n\n我在第 5-8 行使用分析函数 `row_number` 有些超前了。稍后我会详细解释，但它在这里的作用是：按销售数量排序，为每年内的每种啤酒分配\
  \ 1 到 10 的序号。然后，这个序号 (`rn`) 被用于 `pivot` 子句中隐式的分组，因此我得到了一个包含十行（编号 1-10）的输出，每年有两列——啤酒名称和销售数量：\n\
  \n```\nRN 2016_PROD 2016 2017_PROD 2017 2018_PROD 2018\n--- --------- ---- ---------\
  \ ---- --------- ----\n1 Ghost of   552 Monks and  582 Reindeer   691\nHops    \
  \        Nuns          Fuel\n2 Monks and  478 Reindeer   582 Pale Ride  491\nNuns\
  \          Fuel           r Rides\n3 Der Helle  415 Ghost of   482 Hercule T  451\n\
  Kumpel        Hops           rippel\n4 Summer in  377 Der Helle  458 Ghost of  \
  \ 451\nIndia          Kumpel        Hops\n5 Reindeer   331 Hercule T  344 Monks\
  \ and  425\nFuel           rippel          Nuns\n6 Coalminer  286 Summer in  321\
  \ Der Helle  357\ns Sweat         India          Kumpel\n7 Hercule T  261 Coalminer\
  \  227 Coalminer  300\nrippel         s Sweat        s Sweat\n8 Pale Ride  182 Pale\
  \ Ride  210 Summer in  263\nr Rides        r Rides         India\n9 Hazy Pink  121\
  \ Hazy Pink  105 Hoppy Cru  132\nCloud          Cloud         de Oil\n10 Hoppy Cru\
  \   99 Hoppy Cru   72 Hazy Pink   98\nde Oil         de Oil          Cloud\n```\n\
  \n我使用 `sqlcl` 的列格式化功能让啤酒名列变窄，以便名称能换行显示，而不是让 2018 年的数据因换行而跑到 2016 和 2017 年数据的下方。这种方式对名称的换行处理不如之前美观，但数量列是对齐的，便于观察每年的排序以及出现并列的地方。注意，2017\
  \ 年出现了第一名并列，2018 年出现了第三名并列。\n\n## 传统的 rownum 方法\n\n在分析函数出现之前，进行 Top-N 查询的传统方法是：使用一个包含所需\
  \ `order by` 子句的内联视图，然后在外部查询中通过 `rownum <=` 进行过滤，如代码清单 12-4 所示。\n\n```\nSQL> select\
  \ *\n2  from (\n3     select product_name, total_qty\n4     from total_sales\n5\
  \     order by total_qty desc\n6  )\n7  where rownum <= 3;\n```\n\n代码清单 12-4：使用内联视图和\
  \ rownum 过滤得到 Top-3。\n\n这种方法根据“前几行”规则给出了前三名的啤酒：\n\n```\nPRODUCT_NAME    TOTAL_QTY\n\
  Reindeer Fuel   1604\nMonks and Nuns  1485\nGhost of Hops   1485\n```\n\n它运行良好且性能优异——优化器能识别这种结构，并会尽可能少地做工作以仅获取所需的三行。\n\
  \n然而，这种方法无法轻易地帮助我们处理奥林匹克规则和“相同数值”规则。对于这些规则，使用分析函数要容易得多。\n\n\n### 用于排名的分析函数\n\n在\
  \ `清单 12-5` 中，我重写了 `清单 12-4`，只是在第 5 行使用了分析函数 `row_number` 来替代带有 `rownum` 的构造。由于分析函数不能在\
  \ `where` 子句中使用，我仍然需要使用一个内联视图。\n\n```sql\nSQL> select *\n2  from (\n3     select\n\
  4        product_name, total_qty\n5      , row_number() over (order by total_qty\
  \ desc) as ranking\n6     from total_sales\n7  )\n8  where ranking <= 3\n9  order\
  \ by ranking;\n清单 12-5\n使用内联视图并过滤 row_number() 来获取前三名\n```\n\n输出结果与我从 `清单 12-4`\
  \ 得到的一样——我仍然在为我的前三名输出应用着“首行规则”：\n\n```sql\nPRODUCT_NAME    TOTAL_QTY  RANKING\n\
  Reindeer Fuel   1604       1\nMonks and Nuns  1485       2\nGhost of Hops   1485\
  \       3\n```\n\n但 `row_number` 并不是我可用于数据排名的唯一分析函数；我还有另外两个分析函数可供使用。`清单 12-6` 对比了这三个函数。\n\
  \n```sql\nSQL> select\n2     product_name, total_qty\n3   , row_number() over (order\
  \ by total_qty desc) as rn\n4   , rank() over (order by total_qty desc) as rnk\n\
  5   , dense_rank() over (order by total_qty desc) as dr\n6  from total_sales\n7\
  \  order by total_qty desc;\n清单 12-6\n三种分析排名函数的比较\n```\n\n这三个函数直接对应于我提到的三种排名规则：\n\
  \n*   `row_number` – 实现首行规则\n*   `rank` – 实现奥林匹克规则\n*   `dense_rank` – 实现顶尖值规则\n\
  \n这可以从输出中看出：\n\n```sql\nPRODUCT_NAME      TOTAL_QTY  RN  RNK  DR\nReindeer Fuel\
  \     1604       1   1    1\nGhost of Hops     1485       2   2    2\nMonks and\
  \ Nuns    1485       3   2    2\nDer Helle Kumpel  1230       4   4    3\nHercule\
  \ Trippel   1056       5   5    4\nSummer in India   961        6   6    5\nPale\
  \ Rider Rides  883        7   7    6\nCoalminers Sweat  813        8   8    7\n\
  Hazy Pink Cloud   324        9   9    8\nHoppy Crude Oil   303        10  10   9\n\
  ```\n\n当我使用 `row_number` 时，我得到的是连续的数字。\n\n当我使用 `rank` 时，一行可以遵循两种规则之一：如果它与前一行并列，它获得与前一行`相同的排名`；如果不是并列，它获得的排名与使用\
  \ `row_number` 时`相同`。这使得它会以奥林匹克的方式“跳过”排名，就像这里我们有两个啤酒并列第二名，然后下一个是第四名。\n\n最后是 `dense_rank`，一行同样可以遵循两种规则：如果它与前一行并列，它获得与前一行`相同的排名`；但如果不是并列，该行获得的排名是前一行的排名`加一`。因此，排名不会跳过，而是为每个唯一值分配一个连续的排名，从而实现了顶尖值规则。\n\
  \n掌握了这些不同的分析函数后，我可以轻松地在不同的排名规则之间切换。`清单 12-5` 给了我首行规则——我只需将第 5 行改为 `rank` 即可使用奥林匹克规则：\n\
  \n```sql\n5      , rank() over (order by total_qty desc) as ranking\n```\n\n在这种情况下，输出仍然是那三款啤酒；唯一的区别是第二行和第三行都排名第二：\n\
  \n```sql\nPRODUCT_NAME    TOTAL_QTY  RANKING\nReindeer Fuel   1604       1\nGhost\
  \ of Hops   1485       2\nMonks and Nuns  1485       2\n```\n\n或者，我也可以将第 5 行改为 `dense_rank`\
  \ 来使用顶尖值规则：\n\n```sql\n5      , dense_rank() over (order by total_qty desc) as ranking\n\
  ```\n\n这给了我一个有四行输出的前三名报告，因为有两行并列第二名：\n\n```sql\nPRODUCT_NAME      TOTAL_QTY  RANKING\n\
  Reindeer Fuel     1604       1\nMonks and Nuns    1485       2\nGhost of Hops  \
  \   1485       2\nDer Helle Kumpel  1230       3\n```\n\n有了这三种分析函数，我可以用所有三种规则来回答\
  \ Top-N 问题，所以我很满意。唯一的小问题是我仍然需要编写内联视图并在外部查询中过滤行。我能否少写点代码？答案是肯定的。\n\n### 仅获取首行\n\n\
  在版本 12 中，`select` 语句引入了一种新语法——`行限制子句`。它也被称为 `fetch first`，因为如你在 `清单 12-7` 中看到的，使用的正是这种语法。\n\
  \n```sql\nSQL> select product_name, total_qty\n2  from total_sales\n3  order by\
  \ total_qty desc\n4  fetch first 3 rows only;\n清单 12-7\n仅获取前三行\n```\n\n使用这种语法，我跳过了内联视图；我只需在查询中使用合适的\
  \ `order by` 子句，并附加 `fetch first` 子句来声明我只需要前三行，然后我就能在输出中得到这些：\n\n```sql\nPRODUCT_NAME\
  \    TOTAL_QTY\nReindeer Fuel   1604\nGhost of Hops   1485\nMonks and Nuns  1485\n\
  ```\n\n使用 `rows only` 让我根据首行规则得到了结果。实际上，这仅仅是“语法糖”，使得编写这样的 Top-N 查询更容易、更简单，但在底层，数据库正在自动地将\
  \ `清单 12-7` 重写为与带有 `row_number` 函数的内联视图（如 `清单 12-5`）执行相同的操作。这两个清单的工作和性能是相同的；区别仅在于\
  \ `清单 12-7` 更短，更易于编写和阅读。\n\n行限制子句有另一个选项来替代 `rows only`——我可以选择 `rows with ties`：\n\
  \n```sql\n4  fetch first 3 rows with ties;\n```\n\n其定义是，当获取了三行后，它会检查是否有更多具有相同值（并列）的行——如果有，那么这些行也会被输出。对于这里的数据，情况并非如此，所以我得到了相同的输出：\n\
  \n```sql\nPRODUCT_NAME    TOTAL_QTY\nReindeer Fuel   1604\nGhost of Hops   1485\n\
  Monks and Nuns  1485\n```\n\n`rows with ties` 定义中的规则在底层是通过带有 `rank` 函数调用的内联视图实现的，因为该规则与我展示过的奥林匹克规则相匹配——只是表述方式不同。\n\
  \n但这与根据我之前展示的三种排名规则的分析函数处理并列的方式相比如何呢？我将通过一些年度销售数据的例子更深入地探讨一下并列处理。\n\n\n\n#### 并列情况的处理\n\
  \n在清单 12-8 中，我比较了 2018 年销售额的三种分析排名函数（类似于我在清单 12-6 中对总销售额所做的比较）。因为仅用前五行数据就能说明我的观点，而无需展示全部十种啤酒，我在第\
  \ 9 行使用了 `fetch first`，仅仅是因为这样在书中可以节省篇幅。\n\n```sql\nSQL> select\n2     product_name,\
  \ yr_qty\n3   , row_number() over (order by yr_qty desc) as rn\n4   , rank() over\
  \ (order by yr_qty desc) as rnk\n5   , dense_rank() over (order by yr_qty desc)\
  \ as dr\n6  from yearly_sales\n7  where yr = 2018\n8  order by yr_qty desc\n9  fetch\
  \ first 5 rows only;\n清单 12-8\n2018 年销售额的分析函数比较\n```\n\n从输出中我可以看到，2018 年存在并列第三名的情况：\n\
  \n```sql\nPRODUCT_NAME      YR_QTY  RN  RNK  DR\nReindeer Fuel     691     1   1\
  \    1\nPale Rider Rides  491     2   2    2\nHercule Trippel   451     3   3  \
  \  3\nGhost of Hops     451     4   3    3\nMonks and Nuns    425     5   5    4\n\
  ```\n\n因此，在清单 12-9 中，我可以使用第 5 行来应用“前几行”规则，获取按 `row_number` 函数排名（即上述输出中的 `rn` 列）的前三行数据。\n\
  \n```sql\nSQL> select product_name, yr_qty\n2  from yearly_sales\n3  where yr =\
  \ 2018\n4  order by yr_qty desc\n5  fetch first 3 rows only;\n清单 12-9\n获取 2018 年的前三行\n\
  ```\n\n是的，输出结果确实是我想要的那三行：\n\n```sql\nPRODUCT_NAME      YR_QTY\nReindeer Fuel   \
  \  691\nPale Rider Rides  491\nHercule Trippel   451\n```\n\n但是等等——由于 `Ghost of\
  \ Hops` 和 `Hercule Trippel` 在 2018 年的销量都是 451，我完全有可能得到下面这个输出：\n\n```sql\nPRODUCT_NAME\
  \      YR_QTY\nReindeer Fuel     691\nPale Rider Rides  491\nGhost of Hops     451\n\
  ```\n\n清单 12-9 中的查询具有 **不确定的** 输出结果——我最终得到这两个输出中的哪一个，原则上将是随机的；实际上，我在第三行得到 `Hercule\
  \ Trippel` 还是 `Ghost of Hops`，取决于数据库在访问数据时恰好先找到这两种啤酒中的哪一种。这高度依赖于优化器选择的访问路径。\n\n\
  这个问题不仅存在于使用 `fetch first` 和 `rows only` 时，当我自己使用 `row_number` 函数时也同样存在。在清单 12-8\
  \ 的输出中，`Hercule Trippel` 和 `Ghost of Hops` 的位置可能已经互换了——我无法知晓。\n\n通常，业务用户不喜欢一份“一夜之间输出结果就变了”的报表，而这些报表本该是相同的。例如，如果第二天统计信息的收集导致优化器选择了不同的访问路径，这种情况就可能发生。换句话说，用户不喜欢\
  \ **不确定的** 输出。使用 `row_number` 或 `fetch first` 加 `rows only` 时的一个最佳实践是，总是通过添加某种决胜规则来使\
  \ `order by` 变得确定，例如，声明在出现并列时总是显示产品 ID 较小的那个：\n\n```sql\norder by yr_qty desc, product_id\n\
  ```\n\n但我更倾向于说服业务用户，他们其实并不想要“前几行”规则；相反，他们很可能想要，比如，奥林匹克规则。然后，我可以通过使用 `with ties`\
  \ 代替 `rows only` 来轻松实现它：\n\n```sql\n4  order by yr_qty desc\n5  fetch first 3 rows\
  \ with ties;\n```\n\n这样我就得到了一个包含 **四行** 的 **输出**，**同时显示** 了 `Hercule Trippel` 和\
  \ `Ghost of Hops`：\n\n```sql\nPRODUCT_NAME      YR_QTY\nReindeer Fuel     691\n\
  Pale Rider Rides  491\nHercule Trippel   451\nGhost of Hops     451\n```\n\n在这个\
  \ `输出` 中，`Hercule Trippel` 和 `Ghost of Hops` 的显示 **顺序** 实际上是 **不确定的**。正如我之前提到的，用户不喜欢这个，所以可能诱使人通过确保\
  \ `order by` 是确定性的来“修复”这个问题：\n\n```sql\n4  order by yr_qty desc, product_id\n5 \
  \ fetch first 3 rows with ties;\n```\n\n但这将是一个 **错误的** 做法，因为当 `order by` 是确定性的时，根据定义就\
  \ **没有并列**，因此 `输出` 结果就 **不是** 我想要的：\n\n```sql\nPRODUCT_NAME      YR_QTY\nReindeer\
  \ Fuel     691\nPale Rider Rides  491\nHercule Trippel   451\n```\n\n当我想在 `输出` 中显示并列项时，使用\
  \ `fetch first` 就必须接受一个非确定性的 `输出`。如果我无法接受这点，我就必须手动编写包含 `rank` 函数的内联视图，因为那样能让我更好地控制，并能够在分析函数调用中使用非确定性的\
  \ `order by`，而在外层查询中使用确定性的 `order by`。\n\n#### 行限制子句不能做什么\n\n因此，`fetch first` 行限制子句中的\
  \ `with ties` 处理并列的方式，就像我使用了分析函数 `rank` 一样。但是，让我修改清单 12-8 来显示 2017 年而不是 2018 年：\n\
  \n```sql\n7  where yr = 2017\n```\n\n这次，我有并列第一名的情况：\n\n```sql\nPRODUCT_NAME    \
  \  YR_QTY  RN  RNK  DR\nMonks and Nuns    582     1   1    1\nReindeer Fuel    \
  \ 582     2   1    1\nGhost of Hops     482     3   3    2\nDer Helle Kumpel  458\
  \     4   4    3\nHercule Trippel   344     5   5    4\n```\n\n让我在清单 12-10 中尝试对\
  \ 2017 年使用 `fetch first with ties`。\n\n```sql\nSQL> select product_name, yr_qty\n\
  2  from yearly_sales\n3  where yr = 2017\n4  order by yr_qty desc\n5  fetch first\
  \ 3 rows with ties;\n清单 12-10\n为 2017 年获取并列数据\n```\n\n我得到的是那些 `RNK` 列 `<= 3` 的行：\n\
  \n```sql\nPRODUCT_NAME    YR_QTY\nMonks and Nuns  582\nReindeer Fuel   582\nGhost\
  \ of Hops   482\n```\n\n换句话说，这类似于处理并列情况的奥林匹克规则。如果我想使用“前几个值”规则来获取所有具有前三名数值的行，我 **无法**\
  \ 通过行限制子句实现。根本就不存在像这样的语法：\n\n```sql\nfetch first 3 values with ties;  /* <-- 无效语法\
  \ */\n```\n\n相反，我需要手动创建我的内联视图，并使用 `dense_rank`，如清单 12-11 所示。\n\n```sql\nSQL> select\
  \ *\n2  from (\n3     select\n4        product_name, yr_qty\n5      , dense_rank()\
  \ over (order by yr_qty desc) as ranking\n6     from yearly_sales\n7     where yr\
  \ = 2017\n8  )\n9  where ranking <= 3\n10  order by ranking;\n清单 12-11\n使用 dense_rank\
  \ 实现 fetch first 无法完成的功能\n```\n\n现在我得到了 2017 年具有前三名数值的四行数据：\n\n```sql\nPRODUCT_NAME\
  \      YR_QTY  RANKING\nMonks and Nuns    582     1\nReindeer Fuel     582     1\n\
  Ghost of Hops     482     2\nDer Helle Kumpel  458     3\n```\n\n行限制子句对于 Top-N 查询来说是一个非常方便的快捷方式，但它只能执行“前几行”规则或奥林匹克规则，其内部实现类似于包含\
  \ `row_number` 或 `rank` 分析函数的内联视图。如果你想要“前几个值”规则，你需要自己用 `dense_rank` 来实现。\n\n\n\n\
  ### 多分区中的 Top-N 查询\n\n到目前为止，我执行的 Top-N 查询要么是针对总销售额，要么是针对特定年份的年度销售额。无论哪种情况，最终得到的都是整个行集中的“前几行”。\n\
  \n但假设我想查看每一年的前三名最畅销啤酒。当然，我可以为每一年编写一个查询，或许使用 `union all` 将它们组合在一个输出中。\n\n但代码清单 [12-12]\
  \ 展示了一种更简单的方法，它在第 6 行使用了 `partition by` 子句。\n\n```sql\nSQL> select *\n  2  from\
  \ (\n  3     select\n  4        yr, product_name, yr_qty\n  5      , row_number()\
  \ over (\n  6           partition by yr\n  7           order by yr_qty desc\n  8\
  \        ) as ranking\n  9     from yearly_sales\n 10  )\n 11  where ranking <=\
  \ 3\n 12  order by yr, ranking;\n```\n\n代码清单 12-12\n在每一年内使用 `row_number` 进行排名\n\n\
  使用 `partition by`，`row_number` 值的分配发生在每个分区内部：\n\n*   数据被拆分为分区——每个不同的 `yr` 值对应一个分区。\n\
  *   在每个分区中，数据按 `yr_qty desc` 排序，并分配连续的编号 1, 2, 3, …。\n\n这就是我在本章前面的代码清单 [12-3] 中利用的方法，为每年内的啤酒分配了\
  \ 1-10 的编号，以便我能够 `pivot` 并按年将啤酒并排列出。\n\n但在代码清单 [12-12] 中，我没有进行转置；而是对内联视图的结果进行过滤，因此只保留了每年内获得\
  \ `row_number` 为 1、2 和 3 的那些行：\n\n```\n年份    产品名称          年度数量  排名\n2016  Ghost\
  \ of Hops     552     1\n2016  Monks and Nuns    478     2\n2016  Der Helle Kumpel\
  \  415     3\n2017  Monks and Nuns    582     1\n2017  Reindeer Fuel     582   \
  \  2\n2017  Ghost of Hops     482     3\n2018  Reindeer Fuel     691     1\n2018\
  \  Pale Rider Rides  491     2\n2018  Hercule Trippel   451     3\n```\n\n这给了我九行（每年三行），根据“首行规则”，这是一个每年的\
  \ Top-3 报告。\n\n我可以轻松地将第 5 行改为使用 `rank` 函数，从而根据“奥林匹克规则”获得每年的 Top-3 报告：\n\n```sql\n\
  5      , rank() over (\n```\n\n这给出了十行，因为在 2018 年，有四行啤酒的排名 `<= 3`：\n\n```\n年份   \
  \ 产品名称          年度数量  排名\n2016  Ghost of Hops     552     1\n2016  Monks and Nuns\
  \    478     2\n2016  Der Helle Kumpel  415     3\n2017  Monks and Nuns    582 \
  \    1\n2017  Reindeer Fuel     582     1\n2017  Ghost of Hops     482     3\n2018\
  \  Reindeer Fuel     691     1\n2018  Pale Rider Rides  491     2\n2018  Hercule\
  \ Trippel   451     3\n2018  Ghost of Hops     451     3\n```\n\n而“首值规则”我在第 5 行用\
  \ `dense_rank` 实现：\n\n```sql\n5      , dense_rank() over (\n```\n\n这产生了 11 行，因为根据此规则，在\
  \ 2017 和 2018 年都有四行啤酒的排名 `<= 3`：\n\n```\n年份    产品名称          年度数量  排名\n2016  Ghost\
  \ of Hops     552     1\n2016  Monks and Nuns    478     2\n2016  Der Helle Kumpel\
  \  415     3\n2017  Monks and Nuns    582     1\n2017  Reindeer Fuel     582   \
  \  1\n2017  Ghost of Hops     482     2\n2017  Der Helle Kumpel  458     3\n2018\
  \  Reindeer Fuel     691     1\n2018  Pale Rider Rides  491     2\n2018  Hercule\
  \ Trippel   451     3\n2018  Ghost of Hops     451     3\n```\n\n总而言之，在内联视图中使用分析函数，可以非常容易地选择总体的\
  \ Top-N 报告，或者加入 `partition by` 来获得每年（或你用于分区键的任何字段）的 Top-N。\n\n使用行限制子句，就没那么容易了。\n\
  \n### 行限制子句的 lateral 技巧\n\n`fetch first` 不支持 `partition by`，所以基本上你不能直接用它来实现分区查询，而必须像代码清单\
  \ [12-12] 所示那样使用分析函数。\n\n但是有一个技巧，可以通过使用 `lateral` 连接来关联一个内联视图，从而模拟这种行为，前提是你有一个定义“手动分区”的行源。\n\
  \n在代码清单 [12-13] 的第 3-5 行，我创建了一个内联视图 `years`，它硬编码了三个“分区”——2016、2017 和 2018 这三年。然后我有另一个内联视图\
  \ `top_sales`，这是一个使用 `fetch first` 的 Top-3 查询，在这个内联视图中，我在第 10 行过滤了年份。我可以在第 10 行进行这种关联，是因为第\
  \ 7 行的 `cross join lateral`，这意味着内联视图 `top_sales` 会针对内联视图 `years` 的每一行执行一次。\n\n```sql\n\
  SQL> select top_sales.*\n  2  from (\n  3     select 2016 as yr from dual union\
  \ all\n  4     select 2017 as yr from dual union all\n  5     select 2018 as yr\
  \ from dual\n  6  ) years\n  7  cross join lateral (\n  8     select yr, product_name,\
  \ yr_qty\n  9     from yearly_sales\n 10     where yearly_sales.yr = years.yr\n\
  \ 11     order by yr_qty desc\n 12     fetch first 3 rows with ties\n 13  ) top_sales;\n\
  ```\n\n代码清单 12-13\n在横向连接的内联视图中使用 `fetch first`\n\n使用这种 `lateral` 技巧和 `with ties`，代码清单\
  \ [12-13] 产生了与我使用 `rank` 时的代码清单 [12-12] 相同的十行结果：\n\n```\n年份    产品名称          年度数量\n\
  2016  Ghost of Hops     552\n2016  Monks and Nuns    478\n2016  Der Helle Kumpel\
  \  415\n2017  Monks and Nuns    582\n2017  Reindeer Fuel     582\n2017  Ghost of\
  \ Hops     482\n2018  Reindeer Fuel     691\n2018  Pale Rider Rides  491\n2018 \
  \ Hercule Trippel   451\n2018  Ghost of Hops     451\n```\n\n根据数据、索引等情况，这种方法的性能可能很容易比代码清单\
  \ [12-12] 中的分析方法更差。如果一切条件都理想，它的性能可以一样好，但不会更快。那么，这真的有用吗？\n\n嗯，主要区别在于，代码清单 [12-12]\
  \ 的分析函数方法要求你能够为 `partition by` 指定一个表达式，该表达式能产生一组唯一的值——而代码清单 [12-13] 可以在第 10 行使用任意复杂的\
  \ `where` 子句进行关联。\n\n我承认，例如使用 `case` 结构，你可以为分区编写非常复杂的表达式，所以需要代码清单 [12-13] 这种复杂度的场景会非常罕见——但知道有这个选项备用总是好的。\n\
  \n### 经验总结\n\n在本章中，我使用销售数据来举例说明 Top-N 查询，并在此过程中让你深入了解了：\n\n*   三种不同的 Top-N 查询类型：首行、奥林匹克和首值。\n\
  *   使用分析函数 `row_number`、`rank` 和 `dense_rank` 来实现它们。\n*   对前两种类型使用快捷方式 `fetch first`\
  \ 行限制子句。\n*   在分析函数中使用 `partition by` 实现数据子集的 Top-N。\n\n这些方法将在许多用例中对你有所帮助，而不仅仅是销售数据。\n\
  \n\n## 第 13 章 带滚动求和的有序子集\n\n分析函数最有用的特性之一就是`窗口`子句的灵活性，它能够对数据中特定顺序的特定子集进行聚合。一个经典的、可用于多种目的的子集是从开头到当前行的数据——例如，如果对该子集使用`sum`聚合函数，你将得到一个累计求和、滚动求和或运行总计（同一概念的不同名称）。\n\
  \n其应用场景非常广泛；许多财务报表都需要累计总额。但我在工作中遇到的一个非常有用的、稍有不同的实际案例涉及滚动求和的变体：我使用所有*之前*行的总和来持续选择行，直到我选择了一个*恰好*足够大的子集来覆盖所需的总和——在本例中，即从仓库中拣选了足够覆盖客户订单的货物。\n\
  \n本章的完整案例将演示如何使用分析函数同时解决三个问题：\n\n*   按特定顺序（最显著的是先进先出，FIFO 顺序）从库存中拣选货物\n*   对拣货单进行排序，使操作员能以最优路径在仓库中行驶\n\
  *   批量拣选多个订单\n\n所有这些都可以在单个 SQL 语句中完成，我将通过首先解决第一个问题，然后扩展语句以添加第二和第三个问题的解决方案，来展示该语句的逐步构建过程。\n\
  \n### 货物拣选数据\n\n查看图 13-1，你会发现有许多表格，这主要是为了向你展示一个相当真实的数据模型。为了演示目的，我本可以大幅简化，但我会通过一个视图来实现这一点，你马上就会看到。\n\
  \n![图 13-1](img/475066_1_En_13_Fig1_HTML.jpg)\n\n*图 13-1：本章所使用的表*\n\n`inventory`表中存储了给定产品在给定位置的当前存储数量，以及该数量源自哪次采购（从而告诉我们该位置的数量的“年龄”）。基本上，它就是指向`locations`、`products`和`purchases`表的外键，然后是一个`qty`列。\n\
  \n然后是`customers`，他们提交了`orders`，其中包含`orderlines`，指明了他们购买哪些`products`、购买多少以及价格多少。\n\
  \n为了简化对这些表的操作，我创建了代码清单 13-1 中所示的视图`inventory_with_dims`。这个视图简单地将库存表与三个引用表连接起来，这样我就能获得每个`inventory`行的所有相关信息（产品名称、采购日期、仓库、通道、位置）。\n\
  \n```sql\ncreate or replace view inventory_with_dims\nas\nselect\ni.id\n, i.product_id\n\
  , p.name as product_name\n, i.purchase_id\n, pu.purchased\n, i.location_id\n, l.warehouse\n\
  , l.aisle\n, l.position\n, i.qty\nfrom inventory i\njoin purchases pu\non pu.id\
  \ = i.purchase_id\njoin products p\non p.id = i.product_id\njoin locations l\non\
  \ l.id = i.location_id;\n```\n*代码清单 13-1：连接库存表与其他相关表的视图*\n\n当构建我的拣货 SQL 语句时，我将结合使用这个视图和`orderlines`表。\n\
  \n### 构建拣货 SQL 语句\n\n对于问题的前两部分，我将仅拣选一个订单，即 ID 为 421 的订单。在代码清单 13-2 中，我仅展示该订单的数据。\n\
  \n```sql\nSQL> select\n2     c.id           as c_id\n3   , c.name         as c_name\n\
  4   , o.id           as o_id\n5   , ol.product_id  as p_id\n6   , p.name       \
  \  as p_name\n7   , ol.qty\n8  from orders o\n9  join orderlines ol\n10     on ol.order_id\
  \ = o.id\n11  join products p\n12     on p.id = ol.product_id\n13  join customers\
  \ c\n14     on c.id = o.customer_id\n15  where o.id = 421\n16  order by o.id, ol.product_id;\n\
  ```\n*代码清单 13-2：我将要拣选的订单数据*\n\n如你在此处的输出所见，The White Hart 酒馆订购了 110 瓶 Hoppy Crude\
  \ Oil 和 140 瓶 Der Helle Kumpel：\n\n```\nC_ID   C_NAME          O_ID  P_ID  P_NAME\
  \            QTY\n50042  The White Hart  421   4280  Hoppy Crude Oil   110\n50042\
  \  The White Hart  421   6520  Der Helle Kumpel  140\n```\n\n接下来是开始构建分析 SQL 语句的时候了。\n\
  \n#### 通过 FIFO 解决拣选一个订单的问题\n\n首先，我在代码清单 13-3 中将订单 421 的`orderlines`与`inventory_with_dims`视图连接起来。\n\
  \n（请容忍我使用非常短的列别名，但这是获得*sqlcl*输出中非常窄的列宽、便于打印的一种简便方法。）\n\n```sql\nSQL> select\n2 \
  \    i.product_id as p_id\n3   , ol.qty       as ord_q\n4   , i.qty        as loc_q\n\
  5   , sum(i.qty) over (\n6        partition by i.product_id\n7        order by i.purchased,\
  \ i.qty\n8        rows between unbounded preceding and current row\n9     )    \
  \        as acc_q\n10   , i.purchased\n11   , i.warehouse  as wh\n12   , i.aisle\
  \      as ai\n13   , i.position   as pos\n14  from orderlines ol\n15  join inventory_with_dims\
  \ i\n16     on i.product_id = ol.product_id\n17  where ol.order_id = 421\n18  order\
  \ by i.product_id, i.purchased, i.qty;\n```\n*代码清单 13-3：可供拣选的库存——按采购日期排序*\n\n在第\
  \ 5-9 行，我对库存数量进行滚动求和，按产品分区，并按采购日期排序。对于那些采购日期相同的多行，我将数量也加入排序条件，以便先清理掉仓库中较小数量的库存。\n\
  \n在这个查询中，第 18 行的最终`order by`与分析函数中`partition by`后跟`order by`的列相匹配。这不是必须的（稍后我会故意改变它），但当它们像这里一样匹配时，优化器可以通过单次排序操作完成这两件事。\n\
  \n输出显示了两个订购产品中每一个的所有库存（按采购顺序），并且在`acc_q`列（累计数量）中，我可以看到滚动求和：\n\n```\nP_ID  ORD_Q\
  \  LOC_Q  ACC_Q  PURCHASED   WH  AI  POS\n4280  110    36     36     2018-02-23\
  \  1   C   1\n4280  110    39     75     2018-04-23  1   D   18\n4280  110    35\
  \     110    2018-06-23  2   B   3\n4280  110    34     144    2018-08-23  2   C\
  \   20\n4280  110    37     181    2018-10-23  1   A   4\n4280  110    19     200\
  \    2018-12-23  2   C   7\n6520  140    14     14     2018-02-26  2   B   5\n6520\
  \  140    14     28     2018-02-26  1   A   29\n6520  140    20     48     2018-02-26\
  \  1   C   13\n6520  140    24     72     2018-02-26  2   B   26\n6520  140    26\
  \     98     2018-04-26  2   D   9\n6520  140    48     146    2018-04-26  1   A\
  \   16\n6520  140    70     216    2018-06-26  1   C   5\n6520  140    21     237\
  \    2018-08-26  2   C   31\n6520  140    48     285    2018-08-26  1   D   19\n\
  6520  140    72     357    2018-10-26  2   A   1\n6520  140    43     400    2018-12-26\
  \  1   B   32\n```\n\n所以这看起来正是我需要的，对吗？当滚动求和大于订购数量时，我就拣够了，对吧？我将在代码清单 13-4 中尝试这一点，方法是将代码清单\
  \ 13-3 包装在一个内联视图中，并在`where`子句中进行过滤。\n\n```sql\nSQL> select *\n2  from (\n...\n20\
  \  )\n21  where acc_q <= ord_q\n22  order by p_id, purchased, loc_q;\n```\n*代码清单\
  \ 13-4：基于累计和进行过滤*\n\n我得到正确的结果了吗？不，并不完全正确：\n\n```\nP_ID  ORD_Q  LOC_Q  ACC_Q  PURCHASED\
  \   WH  AI  POS\n4280  110    36     36     2018-02-23  1   C   1\n4280  110   \
  \ 39     75     2018-04-23  1   D   18\n4280  110    35     110    2018-06-23  2\
  \   B   3\n6520  140    14     14     2018-02-26  2   B   5\n6520  140    14   \
  \  28     2018-02-26  1   A   29\n6520  140    20     48     2018-02-26  1   C \
  \  13\n6520  140    24     72     2018-02-26  2   B   26\n6520  140    26     98\
  \     2018-04-26  2   D   9\n```\n\n\n\n#### 问题描述\n\n`Product 4280` 情况正常；只是在三个库位拣货后，其滚动总和（rolling\
  \ sum）恰好匹配了 110 的订单数量。但 `Product 6520` 只拣到了 98，而它应该得到 140？如果回顾之前的输出，你会看到在下一个库位 (`1\
  \ A 16`)，滚动总和变成了 146，大于 140，因此该行未被包含在输出中，尽管我需要从那个库位拣取大部分数量。\n\n问题在于，我无法在 `where`\
  \ 子句中创建一个过滤器，使其只包含滚动总和大于订单数量的*第一个*行，而不包含任何*更多*的行。\n\n#### 解决方案原理\n\n但我可以做的是创建一个仅累加*之前*行的滚动总和，而不是包含当前行。这可以通过简单地将\
  \ 清单 13-3 中的窗口结束点在第 8 行从 `current row` 改为 `1 preceding` 来实现，如 清单 13-5 所示。\n\n```sql\n\
  ...\n5   , sum(i.qty) over (\n6        partition by i.product_id\n7        order\
  \ by i.purchased, i.qty\n8        rows between unbounded preceding and 1 preceding\n\
  9     )            as acc_prv_q\n...\n```\n**清单 13-5**\n仅累加之前行的总和\n\n此输出中的滚动总和与\
  \ 清单 13-3 的输出相比，向下移动了一行：\n\n```text\nP_ID  ORD_Q  LOC_Q  ACC_PRV_Q  PURCHASED  \
  \ WH  AI  POS\n4280  110    36                2018-02-23  1   C   1\n4280  110 \
  \   39     36         2018-04-23  1   D   18\n4280  110    35     75         2018-06-23\
  \  2   B   3\n4280  110    34     110        2018-08-23  2   C   20\n4280  110 \
  \   37     144        2018-10-23  1   A   4\n4280  110    19     181        2018-12-23\
  \  2   C   7\n6520  140    14                2018-02-26  2   B   5\n6520  140  \
  \  14     14         2018-02-26  1   A   29\n6520  140    20     28         2018-02-26\
  \  1   C   13\n6520  140    24     48         2018-02-26  2   B   26\n6520  140\
  \    26     72         2018-04-26  2   D   9\n6520  140    48     98         2018-04-26\
  \  1   A   16\n6520  140    70     146        2018-06-26  1   C   5\n6520  140 \
  \   21     216        2018-08-26  2   C   31\n6520  140    48     237        2018-08-26\
  \  1   D   19\n6520  140    72     285        2018-10-26  2   A   1\n6520  140 \
  \   43     357        2018-12-26  1   B   32\n```\n\n这意味着，在 清单 13-4 的输出中缺失的、产品 `6520`\
  \ 在库位 `1 A 16` 的行，现在处于 `acc_prv_q` 小于 `ord_q` 的行窗口内。因此，我可以创建出能正确过滤所需数据的 清单 13-6。这就是本章开头描述的三个问题中第一个问题的解决方案。\n\
  \n```sql\nSQL> select\n2     wh, ai, pos, p_id\n3   , least(loc_q, ord_q - acc_prv_q)\
  \ as pick_q\n4  from (\n5     select\n6        i.product_id as p_id\n7      , ol.qty\
  \       as ord_q\n8      , i.qty        as loc_q\n9      , nvl(sum(i.qty) over (\n\
  10           partition by i.product_id\n11           order by i.purchased, i.qty\n\
  12           rows between unbounded preceding and 1 preceding\n13        ), 0) \
  \       as acc_prv_q\n14      , i.purchased\n15      , i.warehouse  as wh\n16  \
  \    , i.aisle      as ai\n17      , i.position   as pos\n18     from orderlines\
  \ ol\n19     join inventory_with_dims i\n20        on i.product_id = ol.product_id\n\
  21     where ol.order_id = 421\n22  )\n23  where acc_prv_q < ord_q\n24  order by\
  \ wh, ai, pos;\n```\n**清单 13-6**\n基于之前行累加的过滤\n\n在第 9–13 行，我计算了之前行的滚动总和，但请注意，我需要使用\
  \ `nvl` 将第一行的 `null` 转换为零——否则，第 23 行的 `where` 子句会失败。\n\n你可以将这个 `where` 子句理解为：“只要之前的行*尚未*拣够货以满足订单，我就需要将此行包含在输出中。”\n\
  \n在第 3 行，我计算了每一行所在库位需要拣取的数量。我知道还需要拣取多少：是订单数量 (`ord_q`) 减去之前行已拣取的数量 (`acc_prv_q`)。如果这个值小于库位上的库存\
  \ (`loc_q`)，那就是我需要拣取的数量。但如果它更大，那么当然我只能拣取库位上现有的数量。换句话说，我需要拣取这两个数字中较小的一个，这可以通过 `least`\
  \ 函数实现。\n\n最后，我清理了 `select` 列表，只保留了拣货单上必要的信息，并在第 23 行按库位顺序对行进行了排序：\n\n```text\n\
  WH  AI  POS  P_ID  PICK_Q\n1   A   16   6520  42\n1   A   29   6520  14\n1   C \
  \  1    4280  36\n1   C   13   6520  20\n1   D   18   4280  39\n2   B   3    4280\
  \  35\n2   B   5    6520  14\n2   B   26   6520  24\n2   D   9    6520  26\n```\n\
  \n拣货操作员现在可以拿着这份清单，在仓库中按指定位置拣货。他将按照 图 13-2 所示的路线进行。\n\n![../images/475066_1_En_13_Chapter/475066_1_En_13_Fig2_HTML.jpg](img/475066_1_En_13_Fig2_HTML.jpg)\n\
  **图 13-2**\nFIFO 拣货查询第一版的结果\n\n这条路线的问题是，在拣完 A 通道的前两个库位后，他需要“从底部开始”在 C 通道拣货。这意味着他要么需要掉头（如图所示），要么可能需要不必要地“向下”行驶\
  \ B 通道。两种方式都不太理想，我稍后会回来解决这个问题。\n\n\n### 拣货原则的轻松切换\n\n但首先我想强调一点：查询本身的 `order by`\
  \ 和分析函数内的 `order by` 不必像清单 13-3 中那样完全相同；它们可以像清单 13-6 的拣货列表查询那样有所不同，我在其中利用这一事实，通过分析函数的\
  \ `order by` 以 FIFO 顺序选择库存，但输出所选行时则按位置顺序排列。\n\n这种分离意味着，我只需更改分析函数的 `order by`，就能轻松切换拣货原则，同时仍能按位置顺序获得输出。\n\
  \n因此，对于这些示例，假设啤酒可以无限期保存，所以无论我是否使用先进先出原则都无关紧要。\n\n然后，我可以采用一种拣货原则，希望优先考虑靠近司机起点的货位，以便为他提供较短的拣货路线。我只需更改清单\
  \ 13-6 中的第 11 行：\n\n```\n...\n11           order by i.warehouse, i.aisle, i.position\n\
  ...\n```\n\n按位置顺序选择要拣货的库存可以给出较短的路线；他根本不必进入 2 号仓库：\n\n```\nWH  AI  POS  P_ID  PICK_Q\n\
  1   A   4    4280  37\n1   A   16   6520  48\n1   A   29   6520  14\n1   B   32\
  \   6520  43\n1   C   1    4280  36\n1   C   5    6520  35\n1   D   18   4280  37\n\
  ```\n\n或者，我可以采用一种拣货原则，希望拣货次数最少：\n\n```\n...\n11           order by i.qty desc\n\
  ...\n```\n\n这将首先从数量大的库存中拣货，使得只需五次拣货即可完成订单：\n\n```\nWH  AI  POS  P_ID  PICK_Q\n1\
  \   A   4    4280  37\n1   C   1    4280  34\n1   C   5    6520  68\n1   D   18\
  \   4280  39\n2   A   1    6520  72\n```\n\n但如果我首先从大数量中拣货，那么随着时间的推移，仓库里将充满只剩下少量“剩余”库存的货位。我可以选择一种拣货原则来清理这些小数量，腾出货位用于新库存：\n\
  \n```\n...\n11           order by i.qty\n...\n```\n\n按数量 `asc`（升序）而非 `desc`（降序）排序有助于清理仓库中的货位，但当然，操作员需要在更多的地方拣货：\n\
  \n```\nWH  AI  POS  P_ID  PICK_Q\n1   A   29   6520  14\n1   B   32   6520  21\n\
  1   C   1    4280  22\n1   C   13   6520  20\n2   B   3    4280  35\n2   B   5 \
  \   6520  14\n2   B   26   6520  24\n2   C   7    4280  19\n2   C   20   4280  34\n\
  2   C   31   6520  21\n2   D   9    6520  26\n```\n\n如你所见，将选择库存的 `order by` 与控制拣货顺序的\
  \ `order by` 分开后，可以轻松切换拣货策略。\n\n阐明这一点后，回到解决图 13-2 的路线问题。\n\n### 解决最优拣货路线\n\n仅仅按位置顺序输出意味着拣货操作员需要在每个通道中朝同一方向（“向上”）行驶——这并不理想。我希望他能切换方向，使得每隔一个通道他“向下”行驶。\n\
  \n但这并非简单地规定在 A 和 C 通道向上、在 B 和 D 通道向下。相反，我需要他在访问的第一个、第三个、第五个……通道向上，然后在访问的第二个、第四个、第六个……通道向下。\n\
  \n为此，我首先扩展清单 13-6，增加一列为每个访问的通道分配一个连续编号（清单 13-7）。\n\n```\nSQL> select\n2     wh,\
  \ ai\n3   , dense_rank() over (\n4        order by wh, ai\n5     ) as ai#\n6   ,\
  \ pos, p_id\n7   , least(loc_q, ord_q - acc_prv_q) as pick_q\n8  from (\n...\n26\
  \  )\n27  where acc_prv_q < ord_q\n28  order by wh, ai, pos;\n清单 13-7\n为访问的仓库通道连续编号\n\
  ```\n\n第 3-5 行的分析函数 `dense_rank` 对于在 `order by` 子句所用列中具有相同值的行分配相同的排名。而且与 `rank`\
  \ 不同，`dense_rank` 不会跳过任何数字（如我在第 12 章所示）；它连续分配排名。\n\n因此，在 `dense_rank` 的 `order by`\
  \ 中使用仓库和通道，`ai#` 列就包含了我想要的“已访问通道编号”：\n\n```\nWH  AI  AI#  POS  P_ID  PICK_Q\n1 \
  \  A   1    16   6520  42\n1   A   1    29   6520  14\n1   C   2    1    4280  36\n\
  1   C   2    13   6520  20\n1   D   3    18   4280  39\n2   B   4    3    4280 \
  \ 35\n2   B   4    5    6520  14\n2   B   4    26   6520  24\n2   D   5    9   \
  \ 6520  26\n```\n\n这使我能够将清单 13-7 包装在一个内联视图中，创建具有奇偶排序逻辑的清单 13-8。\n\n```\nSQL> select\
  \ *\n2  from (\n...\n30  )\n31  order by\n32     wh, ai#\n33   , case\n34      \
  \  when mod(ai#, 2) = 1 then +pos\n35                             else -pos\n36\
  \     end;\n清单 13-8\n交替进行升序和降序排序\n```\n\n首先，我按仓库和已访问通道排序，但在每个通道内，我使用第 33-36 行的 `case`\
  \ 结构，在奇数编号的通道中按位置*升序*排序，在偶数编号的通道中按位置*降序*排序：\n\n```\nWH  AI  AI#  POS  P_ID  PICK_Q\n\
  1   A   1    16   6520  42\n1   A   1    29   6520  14\n1   C   2    13   6520 \
  \ 20\n1   C   2    1    4280  36\n1   D   3    18   4280  39\n2   B   4    26  \
  \ 6520  24\n2   B   4    5    6520  14\n2   B   4    3    4280  35\n2   D   5  \
  \  9    6520  26\n```\n\n如图 13-3 所示，这为操作员提供了更好的拣货路线，因此清单 13-8 是我的三个问题中第二个问题的解决方案。\n\
  \n![../images/475066_1_En_13_Chapter/475066_1_En_13_Fig3_HTML.jpg](img/475066_1_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3\n\n奇数/偶数已访问通道的交替位置顺序\n\n我还可以展示一个变体，其中我可以非常轻松地调整查询以适应变化的条件。在图 13-3 中，你看到\
  \ 1 号和 2 号仓库之间在底部和顶部都有门，但如果只有底部有门而顶部关闭了呢？\n\n对清单 13-8 中的 `dense_rank` 调用进行小改动，即可生成清单\
  \ 13-9。\n\n```\n...\n5      , dense_rank() over (\n6           partition by wh\n\
  7           order by ai\n8        ) as ai#\n...\n清单 13-9\n在每个仓库内重新开始通道编号\n```\n\n\
  我所做的只是将按仓库和通道的 `order by` 更改为按仓库的 `partition by` 和按通道的 `order by`。结果是，分配给 `ai#`\
  \ 列的排名在每个仓库中从 1 重新开始：\n\n```\nWH  AI  AI#  POS  P_ID  PICK_Q\n1   A   1    16  \
  \ 6520  42\n1   A   1    29   6520  14\n1   C   2    13   6520  20\n1   C   2  \
  \  1    4280  36\n1   D   3    18   4280  39\n2   B   1    3    4280  35\n2   B\
  \   1    5    6520  14\n2   B   1    26   6520  24\n2   D   2    9    6520  26\n\
  ```\n\n当 `ai#` 在每个仓库中重新开始时，这意味着 2 号仓库中的 B 通道从他整体访问的第四个通道变成了他在 2 号仓库中访问的第一个通道。这意味着它从一个偶数编号的通道（降序排序）变成了一个奇数编号的通道（升序排序）。\n\
  \n这就得到了图 13-4 所示的拣货路线。\n\n![../images/475066_1_En_13_Chapter/475066_1_En_13_Fig4_HTML.jpg](img/475066_1_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4\n\n当仓库之间仅有一扇门时会发生什么\n\n前两个问题现已解决，因此我现在将继续处理第三个也是最后一个问题。\n\n\n\n### 解决批量拣货问题\n\
  \n到目前为止，我能够按照 FIFO 原则为单笔订单规划出良好的拣货路径，这固然不错，但为了高效作业，我需要拣货员能够在一次仓库巡行中同时拣选多个订单。\n\n\
  因此，我将再次使用清单 13-2 来展示订单数据，不过这次是另外两笔订单。在现实中，我可能会为“拣货批次”建立一个表，用于指定哪些订单应包含在一个批次中，但在这里，我仅使用\
  \ `in` 子句来编码这两个订单 ID：\n\n```\n...\n15  where o.id in (422, 423)\n...\n```\n\n查询结果显示有两家酒馆，它们都订购了相同数量的\
  \ Hoppy Crude Oil 和 Der Helle Kumpel 啤酒：\n\n```\nC_ID   C_NAME           O_ID  P_ID\
  \  P_NAME            QTY\n51069  Der Wichtelmann  422   4280  Hoppy Crude Oil  \
  \ 80\n51069  Der Wichtelmann  422   6520  Der Helle Kumpel  80\n50741  Hygge og\
  \ Humle   423   4280  Hoppy Crude Oil   60\n50741  Hygge og Humle   423   6520 \
  \ Der Helle Kumpel  40\n```\n\n在清单 13-10 中，我可以从简单开始：先找出每种产品的总订购数量，然后对这些总量应用清单 13-6\
  \ 的 FIFO 拣货方法。\n\n#### 清单 13-10\nFIFO 拣货：按总量拣选\n\n```\nSQL> with orderbatch as (\n\
  2     select\n3        ol.product_id\n4      , sum(ol.qty) as qty\n5     from orderlines\
  \ ol\n6     where ol.order_id in (422, 423)\n7     group by ol.product_id\n8  )\n\
  9  select\n10     wh, ai, pos, p_id\n11   , least(loc_q, ord_q - acc_prv_q) as pick_q\n\
  12  from (\n13     select\n14        i.product_id as p_id\n15      , ob.qty    \
  \   as ord_q\n16      , i.qty        as loc_q\n17      , nvl(sum(i.qty) over (\n\
  18           partition by i.product_id\n19           order by i.purchased, i.qty\n\
  20           rows between unbounded preceding and 1 preceding\n21        ), 0) \
  \       as acc_prv_q\n22      , i.purchased\n23      , i.warehouse  as wh\n24  \
  \    , i.aisle      as ai\n25      , i.position   as pos\n26     from orderbatch\
  \ ob\n27     join inventory_with_dims i\n28        on i.product_id = ob.product_id\n\
  29  )\n30  where acc_prv_q < ord_q\n31  order by wh, ai, pos;\n```\n\n使用 `with`\
  \ 子句，我在第 1-8 行创建了 `orderbatch` 子查询，它只是对每种产品的订购数量进行聚合。查询的其余部分与清单 13-6 相同，除了在第 26\
  \ 行使用了 `orderbatch`，而非 `orderlines` 表。\n\n输出结果是一份拣货清单，显示了为满足这两笔订单需要拣选的物品：\n\n```\n\
  WH  AI  POS  P_ID  PICK_Q\n1   A   16   6520  22\n1   A   29   6520  14\n1   C \
  \  1    4280  36\n1   C   13   6520  20\n1   D   18   4280  39\n2   B   3    4280\
  \  35\n2   B   5    6520  14\n2   B   26   6520  24\n2   C   20   4280  30\n2  \
  \ D   9    6520  26\n```\n\n但这对拣货员来说有一个小问题——他能看到需要拣选多少数量，但不知道其中有多少需要打包到哪个订单里。\n\n\
  为了弄清楚这一点，我需要在清单 13-11 中计算出一些数量区间。\n\n#### 清单 13-11\n基于每种产品总拣货量的每次拣货数量区间\n\n```\n\
  SQL> with orderbatch as (\n...\n8  )\n9  select\n10     wh, ai, pos, p_id\n11  \
  \ , least(loc_q, ord_q - acc_prv_q) as pick_q\n12   , acc_prv_q + 1       as from_q\n\
  13   , least(acc_q, ord_q) as to_q\n14  from (\n15     select\n16        i.product_id\
  \ as p_id\n17      , ob.qty       as ord_q\n18      , i.qty        as loc_q\n19\
  \      , nvl(sum(i.qty) over (\n20           partition by i.product_id\n21     \
  \      order by i.purchased, i.qty\n22           rows between unbounded preceding\
  \ and 1 preceding\n23        ), 0)        as acc_prv_q\n24      , nvl(sum(i.qty)\
  \ over (\n25           partition by i.product_id\n26           order by i.purchased,\
  \ i.qty\n27           rows between unbounded preceding and current row\n28     \
  \   ), 0)        as acc_q\n29      , i.purchased\n30      , i.warehouse  as wh\n\
  31      , i.aisle      as ai\n32      , i.position   as pos\n33     from orderbatch\
  \ ob\n34     join inventory_with_dims i\n35        on i.product_id = ob.product_id\n\
  36  )\n37  where acc_prv_q < ord_q\n38  order by p_id, purchased, loc_q, wh, ai,\
  \ pos;\n```\n\n第 14-36 行的内联视图与之前几乎相同，但我额外在第 24-28 行添加了一个累加求和。这样，我同时拥有了 `acc_prv_q`（前序行的滚动和）和\
  \ `acc_q`（包含当前行的滚动和）。\n\n借助这些字段，我就能在第 12-13 行计算出该行的数量区间（从...到...），并在第 38 行进行了排序，以便你清晰地看到区间是如何变化的：\n\
  \n```\nWH  AI  POS  P_ID  PICK_Q  FROM_Q  TO_Q\n1   C   1    4280  36      1   \
  \    36\n1   D   18   4280  39      37      75\n2   B   3    4280  35      76  \
  \    110\n2   C   20   4280  30      111     140\n1   A   29   6520  14      1 \
  \      14\n2   B   5    6520  14      15      28\n1   C   13   6520  20      29\
  \      48\n2   B   26   6520  24      49      72\n2   D   9    6520  26      73\
  \      98\n1   A   16   6520  22      99      120\n```\n\n根据这些数量区间，你可以读出：第一行需要拣选的\
  \ 36 件是产品 4280 总需 140 件中的第 1-36 件；下一行的 39 件则是第 37-75 件，依此类推。\n\n如果你观察敏锐，可能已经发现清单\
