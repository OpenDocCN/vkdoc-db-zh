  ### SQL 查询优化：识别与分析拣货周期


  SQL> select

  2     list.picker_emp_id as emp

  3   , list.id            as list

  4   , last_value(

  5        case log.activity when ''D'' then log_time end

  6     ) ignore nulls over (

  7        partition by list.id

  8        order by log.log_time

  9        rows between unbounded preceding and current row

