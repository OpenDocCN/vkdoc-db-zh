  \ 的包裹。\n\n有了这份列表，拣货操作员将被引导通过仓库中的良好路线，为一批多个订单拣选产品，这些产品是按先进先出原则选择的。\n\n总的来说，这几乎就是一个完整的仓库货物拣选应用，浓缩在一个\
  \ SQL 语句中。\n\n### 经验教训\n\n本章向你展示了如何构建一个单一 SQL 应用，其中多次使用了分析函数，为你提供了以下知识：\n\n*   使用窗口子句对行子集应用分析函数\
  \ `sum`，以找到结果足够大的子集\n*   使用分析滚动和计算间隔，以找到重叠的间隔\n*   为结果分配 `dense_rank`，以实现交替的升序和降序排序\n\
  \n当你理解如何逐步使用分析函数构建这样的语句时，你就可以创建许多类似的、包含大量业务逻辑的语句，从而获得比提取数据并以过程方式执行相同逻辑好得多的性能。\n\n"
- '# 14. 使用 Lead 分析活动日志


  日志可以记录很多事情，有时你很幸运，日志的每一行都是独立的，并且包含分析日志所需的所有数据。但大多数情况下，日志表中的一行记录了在*这个*确切的时间点，发生了*这个*特定的活动——而你需要分析的有趣事实是日志行*之间*相隔了多长时间。


  这正是分析函数 `lag` 和 `lead` 非常有用的地方，因为它们可以在给定的行上使用，以检索给定顺序中之前行 (`lag`) 或之后行 (`lead`)
  的信息。根据你构建逻辑的方式，你通常可以选择使用 `lag` 或 `lead`，但大多数情况下的决定因素将是行*何时*被插入到活动日志中。如果行在活动开始时插入，那么活动的时间就是此行与*下*一行之间的时间间隔，因此
  `lead` 是合理的选择。相反，如果行在活动完成时插入，那么活动的时间就是*上*一行与此行之间的时间间隔，这时使用 `lag` 就有意义了。


  当我第一次创建这类代码时工作的地方，有一个自动化的机器人拣货仓库，所以操作员站在固定的位置，箱子通过传送带送到他面前，他拣取产品，箱子移走，然后新箱子到来。箱子的到达和离开都被记录了下来，这意味着从箱子到达直到它离开的时间就是拣货所用的时间，而从箱子离开直到下一个箱子到达的时间就是等待时间。通过使用类似我在此展示的
  `lead` SQL，我们可以分析何时等待时间过长，并利用这些信息来调整机器人仓库。


  本书中的 Good Beer Trading Co 公司没有机器人仓库，但我在前一章展示了拣货优化。现在，我可以在本章跟进分析拣货和在仓库中走动分别用了多少时间。


  ### 拣货活动日志


  在第 13 章，我展示了 Good Beer Trading Co 如何为多份订单计算出高效的啤酒仓库拣货清单。当仓库操作员开始拣选某些订单时，他们并不是直接打印第
  13 章中查询的输出；而是在 `picking_list` 表中创建一个拣货清单，并将查询输出存储在 `picking_line` 表中，这两个表如图 14-1
  所示。


  ![../images/475066_1_En_14_Chapter/475066_1_En_14_Fig1_HTML.jpg](img/475066_1_En_14_Fig1_HTML.jpg)


  图 14-1: 用于存放拣货清单和拣货操作日志的表


  在拣货清单及对应的拣货行创建并打印出来后，拣货操作员便驾驶着他的电动拣货车出发了。当他沿途行驶并在仓库中拣选啤酒时，他会扫描货位货架和啤酒上的条形码以记录他的活动——该活动存储在
  `picking_log` 表中，你可以在代码清单 14-1 中看到其内容。


  ```sql

  SQL> select

  2     list.picker_emp_id as emp

  3   , list.id            as list

  4   , log.log_time

  5   , log.activity       as act

  6   , log.location_id    as loc

  7   , log.pickline_no    as line

  8  from picking_list list

  9  join picking_log log

  10     on log.picklist_id = list.id

  11  order by list.id, log.log_time;

  ```


  代码清单 14-1: 拣货清单的活动日志内容


  我与 `picking_list` 表进行连接是为了获取员工 ID，这样在我的统计报告中，我可以比较并看出哪位操作员工作速度最快，以便（他/她）可以教导其他人：


  ```sql

