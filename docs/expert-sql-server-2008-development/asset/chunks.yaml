    ## The Great Balancing Act


    When it comes down to it, the real goal of software development is to produce
    working software that customers will want to use, in addition to software that
    can be easily fixed or extended as time and needs progress. But, when developing
    a piece of software, there are hard limits that constrain what can actually be
    achieved. No project has a limitless quantity of time or money, so sacrifices
    must often be made in one area in order to allow for a higher-priority requirement
    in another.


    The database is, in most cases, the center of the applications it drives. The
    data controls the applications, to a great extent, and without the data the applications
    would not be worth much.


    Likewise, the database is often where applications face real challenges in terms
    of performance, maintainability, and other critical success factors. It is quite
    common for application developers to push these issues as far down into the data
    tier as possible, and in the absence of a data architect, this leaves the database
    developer as the person responsible for balancing the needs of the entire application.


    Attempting to strike the right balance generally involves a trade-off between
    the following areas:


    - Performance

    - Testability

    - Maintainability

    - Security

    - Allowing for future requirements


    Balancing the demands of these competing facets is not an easy task. What follows
    are some initial thoughts on these issues; examples throughout the remainder of
    the book will serve to illustrate them in more detail.


    ## Performance


    We live in an increasingly impatient society. Customers and management place demands
    that must be met *now* (or sometimes yesterday). We want fast food, fast cars,
    and fast service, and are constantly in search of instant gratification of all
    types. That need for speed certainly applies to the world of database development.
    Users continuously seem to feel that applications just aren’t performing as fast
    as they should, even when those applications are doing a tremendous amount of
    work. It sometimes feels as though users would prefer to have *any* data as fast
    as possible, rather than the *correct* data if it means waiting a bit longer.


    The problem, of course, is that performance isn’t easy, and can throw the entire
    balance off.


    Building a truly high-performance application often involves sacrifice. Functionality
    might have to be trimmed (less work for the application to do means it will be
    faster), security might have to be reduced (less authorization cycles means less
    work), or inefficient code might have to be rewritten in arcane, unmaintainable
    ways in order to squeeze every last CPU cycle out of the server.


    So how do we reconcile this need for extreme performance—which many seem to care
    about to the exclusion of all else—with the need for development best practices?
    Unfortunately, the answer is that sometimes we can only do as well as we can do.
    Most of the time, if we find ourselves in a position in which a user is complaining
    about performance and we’re going to lose money or a job if it’s not remedied,
    the user doesn’t want to hear about why fixing the performance problem will increase
    coupling and decrease maintainability. The user just wants the software to work
    fast—and we have no choice but to deliver.


    A fortunate fact about sticking with best practices is that they’re often considered
    to be the best way to do things for several reasons. Keeping a close watch on
    issues of coupling, cohesion, and proper encapsulation throughout the development
    cycle can not only reduce the incidence of performance problems, but will also
    make fixing most of them a whole lot easier. And on those few occasions where
    you need to break some “perfect” code to get it working as fast as necessary,
    know that it’s not your fault—society put you in this position!


    ## Testability


    It is inadvisable, to say the least, to ship any product without thoroughly testing
    it. However, it is common to see developers exploit anti-patterns that make proper
    testing difficult or impossible. Many of these problems result from attempts to
    produce “flexible” modules or interfaces—instead of properly partitioning functionality
    and paying close attention to cohesion, it is sometimes tempting to create “all-singing,
    all-dancing,” monolithic routines that try to do it all.


    Development of these kinds of routines produces software that can never be fully
    tested. The combinatorial explosion of possible use cases for a single routine
    can be immense—even though, in most cases, the number of actual combinations that
    users of the application will exploit is far more limited.


    Think very carefully before implementing a flexible solution merely for the sake
    of flexibility. Does it really need to be that flexible? Will the functionality
    really be exploited in full right away, or can it be slowly extended later as
    required?


    ## Maintainability


    Throughout the lifespan of an application, various modules and routines will require
    maintenance and revision in the form of enhancements and bug fixes. The issues
    that make routines more or less maintainable are similar to those that influence
    testability, with a few twists.


    When determining how testable a given routine is, we are generally only concerned
    with whether the interface is stable enough to allow the authoring of test cases.
    For determining the level of maintainability, we are also concerned with exposed
    interfaces, but for slightly different reasons. From a maintainability point of
    view, the most important interface issue is coupling. Tightly coupled routines
    tend to carry a higher maintenance cost, as any changes have to be propagated
    to multiple routines instead of being made in a single place.


    The issue of maintainability also goes beyond the interface into the actual implementation.
    A routine may have a stable, simple interface, yet have a convoluted, undocumented
    implementation that is difficult to work with. Generally speaking, the more lines
    of code in a routine, the more difficult maintenance becomes; but since large
    routines may also be a sign of a cohesion problem, such an issue should be caught
    early in the design process if developers are paying attention.


    It’s worth noting that the database-as-API mindset that I’m proposing requires
    the use of stored procedures as an interface to the data, but does not get into
    the detail of what protocol you use to access those stored procedures. Many software
    shops have discovered that web services are a good way to provide a standard,
    cross-platform interface layer, such as using `ADO.NET data services` to produce
    a `RESTful web service` based on an `entity data model`. Whether using web services
    is superior to using other protocols is something that must be decided on a per-case
    basis; like any other technology, they can certainly be used in the wrong way
    or in the wrong scenario. Keep in mind that web services require a lot more network
    bandwidth and follow different authentication rules than other protocols that
    `SQL Server` supports—their use may end up causing more problems than they solve.


    By using stored procedures with correctly defined interfaces and full encapsulation
    of information, coupling between the application and the database will be greatly
    reduced, resulting in a database system that is much easier to maintain and evolve
    over time.


    It is difficult to stress the importance that stored procedures play in a well-designed
    `SQL Server` database system in only a few paragraphs. In order to reinforce the
    idea that the database must be thought of as an API rather than a persistence
    layer, this topic will be revisited throughout the book with examples that deal
    with interfaces to outside systems.'
