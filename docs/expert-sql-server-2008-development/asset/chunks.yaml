    EXEC sp_addrolemember ''db_owner'', ''UserA'';


    EXEC sp_addrolemember ''db_owner'', ''UserB'';


    GO


    To keep the example simple, requests from each of these database users will be
    mapped to their own workload group, which in turn has its own dedicated resource
    pool, as follows:


    USE master;


    GO


    ALTER RESOURCE GOVERNOR RECONFIGURE;


    GO


    -- Create two resource pools with default settings


    CREATE RESOURCE POOL PoolA;


    CREATE RESOURCE POOL PoolB;


    GO


    -- Create two workload groups


    CREATE WORKLOAD GROUP GroupA USING PoolA;


    CREATE WORKLOAD GROUP GroupB USING PoolB;


    GO


    Next, we must create the classifier function that will be used to assign the workload
    group into which incoming requests are placed. For this example, we will classify
    all requests from UserA into the GroupA workload group, and all requests from
    UserB into the GroupB workload group, as follows: 270


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    CREATE FUNCTION dbo.RGClassifier()


    RETURNS sysname WITH SCHEMABINDING


    AS


    BEGIN


    DECLARE @grp_name AS sysname = N''default'';


    DECLARE @login_name AS sysname = SUSER_NAME();


    IF @login_name = N''UserA''


    SET @grp_name = N''GroupA'';


    ELSE IF @login_name = N''UserB''


    SET @grp_name = N''GroupB'';


    RETURN @grp_name;


    END;


    GO


    For the purposes of this demonstration, I’ve simply classified each incoming connection
    request based on the login name of the user making the request. All requests from
    UserA are classified into the GroupA workgroup, and all requests from UserB will
    be classified into the GroupB workgroup. All other requests will use the default
    group.


    You can also make classification decisions based on other factors, including the
    name of the host or application supplied in the connection string (retrieved using
    HOST_NAME() and APP_NAME(), respectively), and whether the user is a member of
    a particular role or group.


    It is important to note that once Resource Governor is activated, the classifier
    function will be run to classify *every* incoming connection to the server, and
    govern the resources available for that session. It is therefore crucially important
    to make sure that this function is thoroughly tested and optimized or else you
    risk potentially crippling your system.


    „ **Tip** All queries issued via a dedicated administrator connection (DAC) are
    run using the internal workload group and resource pool, and are not subject to
    classification. You may find that you need to connect to SQL Server 2008


    via DAC in order to investigate and repair issues if a classifier function goes
    awry.


    Finally, Resource Governor will be bound to the classifier function and activated
    as follows: ALTER RESOURCE GOVERNOR


    WITH ( CLASSIFIER_FUNCTION = dbo.RGClassifier );


    GO


    ALTER RESOURCE GOVERNOR RECONFIGURE;


    GO


    Now that we have set up the basic resource governor infrastructure, we need some
    way of


    monitoring the effects on performance in high-concurrency environments. To do
    so, open up the system performance monitor console (perfmon.exe). Right-click
    the performance graph and select the Add Counters menu option. Scroll down the
    list of available counters, and, when you get to the SQL


    ![](index-292_1.png)


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    Server:Workload Group Stats heading, click to add the CPU Usage % measure for
    both GroupA and GroupB. These steps are illustrated in Figure 9-1.


    *Figure 9-1\. Adding performance counters for GroupA and GroupB CPU usage percentage*


    Controlling Resource Allocation


    One of the most fundamental uses of Resource Governor is to set explicit minimum
    and maximum levels for CPU and server memory allocated to different resource pools.
    To demonstrate the effect of applying these limits, we first need to place some
    load on the server. Open the RML command prompt and use the ostress tool to set
    up a query issued by UserA, as follows:


    ostress -U"UserA" -P"password" -Q"WHILE(1=1) SELECT REPLICATE(''a'',4000);" -n5
    –q Next, open a second RML command prompt and enter the following request issued
    by UserB:


    ostress -U"UserB" -P"password" -Q"WHILE(1=1) SELECT REPLICATE(''b'',4000);" -n5
    -q


    -o"C:\UserB"


    Each of these queries will issue a recurring, relatively CPU-intensive query that
    will repeat indefinitely across five separate threads. We can confirm that the
    classifier function is working correctly 272


    ![](index-293_1.png)


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    by checking the sys.dm_resource_governor_workload_groups DMV, as shown in the
    following code listing:


    SELECT


    name,


    total_request_count


    FROM


    sys.dm_resource_governor_workload_groups


    WHERE


    name IN (''GroupA'', ''GroupB'');


    The results show that there are five requests running under each workload group.
    Now check on the performance monitor graph. On my system, this appears as shown
    in Figure 9-2.


    *Figure 9-2\. Balanced performance of two default workload groups*


    Perhaps unsurprisingly, as we have left all resource governor settings at their
    default values, the graph shows an approximately equal split of CPU usage percentage
    between the two workloads. So now let’s try to change things around a bit. Firstly,
    we’ll try to limit the CPU resources given to both resource pools:


    ALTER RESOURCE POOL PoolA


    WITH ( MAX_CPU_PERCENT = 10 );


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    ALTER RESOURCE POOL PoolB


    WITH ( MAX_CPU_PERCENT = 10 );


    ALTER RESOURCE GOVERNOR RECONFIGURE;


    GO


    Executing this code, you might be surprised to find, makes no difference to the
    graph. So how come the Resource Governor is seemingly ignoring our specified MAX_CPU_PERCENT
    and has failed to limit both resource pools to 10 percent of CPU? This illustrates
    an important point concerning the way in which resources are allocated by the
    Resource Governor—rather than prescribing a hard limit on CPU usage, the MAX_CPU_PERCENT
    value is used to balance competing requests *when there is contention for resources*.


    In this case, since the combined stated MAX_CPU_PERCENT of all resource pools
    is less than 100 percent, there is no contention. The SQL Server OS will always
    attempt to maximize CPU resource usage, so if there is spare CPU available, it
    will be assigned between the available pools. The MAX_CPU_PERCENT of a resource
    pool is only enforced in situations where exceeding that limit would prevent another
    resource pool from being granted its requested maximum CPU settings.


    „ **Note** When testing applications that execute using resource pools limited
    to a MAX_CPU_PERCENT, it is important to remember that that limit will only be
    enforced if there is contention for that CPU resource from other resource pools.
    You should therefore always test in environments with competing concurrent processes.


    With this in mind, let’s now try another example. For this example, we’ll ensure
    that the total MAX_CPU_PERCENT of the two resource pools adds up to 100 percent
    so that neither will be allowed to exceed that limit (lest the other would be
    denied CPU resources):


    ALTER RESOURCE POOL PoolA


    WITH ( MAX_CPU_PERCENT = 90 );


    ALTER RESOURCE POOL PoolB


    WITH ( MAX_CPU_PERCENT = 10 );


    ALTER RESOURCE GOVERNOR RECONFIGURE;


    GO


    Following the rules explained previously, you would perhaps now expect the CPU
    usage between PoolA and PoolB to be split in the ratio 90:10, and depending on
    your system, this might be the outcome that you now observe on the performance
    monitor graph. However, the graph on my system *still* shows little discernible
    difference between the two workload groups, as shown in Figure 9-3.


