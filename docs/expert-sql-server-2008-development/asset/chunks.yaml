    Save this query as insert_test.sql and execute it using the same ostress settings
    as before. The elapsed time of this test when run on my laptop is 00:00:29.184—less
    than a third of the time taken for the equivalent update test.


    The results are fairly clear: when simulating a massive blocking scenario, inserts
    are the clear winner over updates, thanks to the fact that processes do not block
    each other trying to write the same rows.


    Admittedly, this example is contrived, but it should serve to illustrate the purported
    benefit of MVCC as a concurrency technique.


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    Of course, there is a bit more to MVCC than the idea of using inserts instead
    of updates. You still need to be able to retrieve a consistent view of the data.
    A query such as the following can be used to get the latest version of every row
    in the Test_Inserts table:


    SELECT


    ti.PK_Col,


    ti.Other_Col,


    ti.Version


    FROM Test_Inserts ti


    WHERE


    Version =


    (


    SELECT MAX(ti1.Version)


    FROM Test_Inserts ti1


    WHERE


    ti1.PK_Col = ti.PK_Col


    );


    I will not cover MVCC queries extensively in this section—instead, I will refer
    you to Chapter 11, which covers temporal data. The bitemporal techniques discussed
    in that chapter share many


    similarities with MVCC, but with a greater overall value proposition thanks to
    the fact that they take advantage of time as well as versioning, allowing you
    to pull back consistent views of the data based on time rather than just version.


    As you might guess, MVCC, while an interesting concept, cannot be applied as described
    here to many real-world applications. Merging the MVCC concept with bitemporal
    data models can help make this a much more interesting technique for highly concurrent
    applications in which versioning of data collisions makes sense.


    Sharing Resources Between Concurrent Users


    So far in this chapter, we’ve looked at the business rules for protecting the
    integrity of data—preventing overwrites and minimizing occurrences of blocking—and
    a brief consideration of performance


    implications of different concurrent models. However, I have yet to address the
    important issue of how to balance competing demand for limited resources in a
    concurrent environment.


    By default, when multiple requests are made to a SQL Server instance, the database
    engine shares resources between all concurrent users equally. As a result, every
    request will face more contention for CPU, memory, and I/O resources, leading
    to longer average query times and greater risk of blocking scenarios occurring.
    In practice, however, it is rare for all queries to be of equal importance. Some
    requests may be classified as high-priority based on the urgency with which the
    data is needed, or on the seniority of the user asking for that data. Maintenance
    tasks, in contrast, should sometimes run only in the background, when there is
    idle resource to fulfill them. By using **Resource Governor**, a new feature introduced
    in the Developer and Enterprise editions of SQL Server 2008, it is possible to
    classify and prioritize incoming connections into categories to determine how
    resources are allocated between them.


    I don’t intend to cover every aspect of Resource Governor in these pages: for
    readers not familiar with the topic, I recommend reading the introduction to Resource
    Governor on Books Online, at http://msdn.microsoft.com/en-us/library/bb895232.aspx.
    In this section, I’ll concentrate only on demonstrating some of the ways in which
    Resource Governor can be applied to benefit performance in high-concurrency environments.


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    Before continuing, create a new database and add two new users to that database
    that will be used in the upcoming examples:


    -- Create and switch to a new database


    CREATE DATABASE ResourceGovernor;


    GO


    USE ResourceGovernor;


    GO


    -- Create two users and a DB login based on each


    CREATE LOGIN UserA


    WITH


    PASSWORD = ''password'',


    CHECK_POLICY = OFF;


    CREATE USER UserA FROM LOGIN UserA;


    GO


    CREATE LOGIN UserB WITH'
  trans: "COMMIT;\n\n将此查询保存为 `insert_test.sql`，并使用与之前相同的 `ostress` 设置执行。在我的笔记本电脑上运行此测试的耗时为\
    \ 00:00:29.184——不到等效更新测试所用时间的三分之一。\n\n结果相当清晰：在模拟大规模阻塞场景时，插入操作明显优于更新操作，这得益于进程不会因尝试写入相同行而互相阻塞。\n\
    \n诚然，这个例子是刻意设计的，但它应足以说明 MVCC 作为一种并发技术的所谓优势。\n\n## 第九章 „ 设计支持应用并发的系统\n\n当然，MVCC\
    \ 不仅仅是使用插入代替更新的概念。你还需要能够检索数据的一致视图。可以使用如下查询来获取 `Test_Inserts` 表中每一行的最新版本：\n\n```sql\n\
    SELECT\n    ti.PK_Col,\n    ti.Other_Col,\n    ti.Version\nFROM Test_Inserts ti\n\
    WHERE\n    Version =\n    (\n        SELECT MAX(ti1.Version)\n        FROM Test_Inserts\
    \ ti1\n        WHERE\n            ti1.PK_Col = ti.PK_Col\n    );\n```\n\n本节我不会广泛涵盖\
    \ MVCC 查询——相反，我会建议你参考[第 11 章](http://example.com/chapter11)，该章涵盖了时态数据。其中讨论的双时态技术与\
    \ MVCC 有许多相似之处，但由于它们同时利用了时间和版本控制，因此总体价值主张更大，允许你基于时间而不仅仅是版本回溯数据的一致视图。\n\n正如你可能猜测的那样，MVCC\
    \ 虽然是一个有趣的概念，但如上所述，它无法直接应用于许多现实世界的应用程序。将 MVCC 概念与双时态数据模型相结合，可以使这项技术对高并发应用更具吸引力，在这些场景中，数据冲突的版本控制是有意义的。\n\
    \n### 在并发用户之间共享资源\n\n到目前为止，在本章中，我们已经探讨了用于保护数据完整性的业务规则——防止覆盖并最小化阻塞的发生——以及对不同并发模型性能影响的简要考量。然而，我尚未解决一个重要问题，即如何在并发环境中平衡对有限资源的竞争需求。\n\
    \n默认情况下，当向 SQL Server 实例发出多个请求时，数据库引擎会在所有并发用户之间平均共享资源。结果，每个请求都将面临更多的 CPU、内存和 I/O\
    \ 资源争用，导致平均查询时间更长，发生阻塞场景的风险更大。然而，在实践中，所有查询同等重要是罕见的。有些请求可能基于数据需求的紧迫性或请求用户的资历被归类为高优先级。相比之下，维护任务有时应仅在后台运行，即在有空闲资源时才执行。通过使用\
    \ **Resource Governor**（SQL Server 2008 的 Developer 和 Enterprise 版本中引入的一项新功能），可以对传入的连接进行分类和优先级排序，以确定资源如何在它们之间分配。\n\
    \n我不打算在本文中涵盖 Resource Governor 的所有方面：对于不熟悉该主题的读者，我建议阅读联机丛书上关于 Resource Governor\
    \ 的介绍：`http://msdn.microsoft.com/en-us/library/bb895232.aspx`。在本节中，我将集中演示一些可将\
    \ Resource Governor 应用于高并发环境以提升性能的方法。\n\n### 第九章 „ 设计支持应用并发的系统\n\n在继续之前，创建一个新数据库并向该数据库添加两个新用户，用于接下来的示例：\n\
    \n```sql\n-- 创建并切换到新数据库\nCREATE DATABASE ResourceGovernor;\nGO\nUSE ResourceGovernor;\n\
    GO\n\n-- 为每个用户创建 DB 登录和用户\nCREATE LOGIN UserA\nWITH\n    PASSWORD = 'password',\n\
    \    CHECK_POLICY = OFF;\nCREATE USER UserA FROM LOGIN UserA;\nGO\nCREATE LOGIN\
    \ UserB WITH\n```"
- fmt: "# 设计应用并发系统\n\n## 设置用户与资源组\n\n首先，创建用户并授予其数据库所有者权限。\n\n```sql\nPASSWORD='password',\n\
    CHECK_POLICY = OFF;\n\nCREATE USER UserB FROM LOGIN UserB;\n\nGO\n\n-- For simplicity,\
    \ make both users db_owners\nEXEC sp_addrolemember 'db_owner', 'UserA';\nEXEC\
    \ sp_addrolemember 'db_owner', 'UserB';\n\nGO\n```\n\n为简化示例，来自这些数据库用户的请求将被映射到它们各自的工作负载组，每个组又有其专用的资源池，如下所示：\n\
    \n```sql\nUSE master;\n\nGO\n\nALTER RESOURCE GOVERNOR RECONFIGURE;\n\nGO\n\n\
    -- Create two resource pools with default settings\nCREATE RESOURCE POOL PoolA;\n\
    CREATE RESOURCE POOL PoolB;\n\nGO\n\n-- Create two workload groups\nCREATE WORKLOAD\
    \ GROUP GroupA USING PoolA;\nCREATE WORKLOAD GROUP GroupB USING PoolB;\n\nGO\n\
    ```\n\n## 创建分类器函数\n\n接下来，必须创建用于分配传入请求所属工作负载组的分类器函数。在此示例中，我们将所有来自`UserA`的请求分类到`GroupA`工作负载组，所有来自`UserB`的请求分类到`GroupB`工作负载组，如下所示：\n\
    \n```sql\nCREATE FUNCTION dbo.RGClassifier()\nRETURNS sysname WITH SCHEMABINDING\n\
    AS\nBEGIN\n    DECLARE @grp_name AS sysname = N'default';\n    DECLARE @login_name\
    \ AS sysname = SUSER_NAME();\n    IF @login_name = N'UserA'\n        SET @grp_name\
    \ = N'GroupA';\n    ELSE IF @login_name = N'UserB'\n        SET @grp_name = N'GroupB';\n\
    \    RETURN @grp_name;\nEND;\n\nGO\n```\n\n为便于演示，我仅根据发出请求的用户登录名对每个传入连接请求进行分类。所有来自`UserA`的请求被分类到`GroupA`工作组，所有来自`UserB`的请求将被分类到`GroupB`工作组。所有其他请求将使用默认组。\n\
    \n也可以基于其他因素进行分类决策，包括连接字符串中提供的主机或应用程序名称（分别使用`HOST_NAME()`和`APP_NAME()`检索），以及用户是否是特定角色或组的成员。\n\
    \n> **重要提示**：一旦激活`Resource Governor`，分类器函数将运行以分类*每一个*传入服务器的连接，并管理该会话可用的资源。因此，至关重要的是确保此函数经过彻底测试和优化，否则可能会危及你的系统。\n\
    \n> **提示**：所有通过专用管理员连接（DAC）发出的查询都在内部工作负载组和资源池中运行，不受分类约束。如果分类器函数出现问题，你可能会发现需要通过DAC连接到`SQL\
    \ Server 2008`来调查和修复问题。\n\n## 激活资源 governor\n\n最后，将`Resource Governor`绑定到分类器函数并激活，如下所示：\n\
    \n```sql\nALTER RESOURCE GOVERNOR\nWITH ( CLASSIFIER_FUNCTION = dbo.RGClassifier\
    \ );\nGO\n\nALTER RESOURCE GOVERNOR RECONFIGURE;\n\nGO\n```\n\n## 监控性能\n\n既然我们已经设置了基本的资源\
    \ governor 基础设施，就需要某种方法来监控高并发环境下的性能影响。为此，打开系统性能监视器控制台（`perfmon.exe`）。右键单击性能图，然后选择“添加计数器”菜单选项。向下滚动可用计数器列表，当看到`SQL\
    \ Server:Workload Group Stats`标题时，单击为`GroupA`和`GroupB`添加`CPU Usage %`度量。这些步骤如图9-1所示。\n\
    \n**图9-1\\. 为GroupA和GroupB添加CPU使用率百分比性能计数器**\n\n## 控制资源分配\n\n`Resource Governor`最基本的用途之一是为分配给不同资源池的CPU和服务器内存设置明确的最小和最大级别。为了演示应用这些限制的效果，我们首先需要在服务器上施加一些负载。打开RML命令提示符，使用`ostress`工具设置由`UserA`发出的查询，如下所示：\n\
    \n```\nostress -U\"UserA\" -P\"password\" -Q\"WHILE(1=1) SELECT REPLICATE('a',4000);\"\
    \ -n5 –q\n```\n\n接下来，打开第二个RML命令提示符并输入以下由`UserB`发出的请求：\n\n```\nostress -U\"UserB\"\
    \ -P\"password\" -Q\"WHILE(1=1) SELECT REPLICATE('b',4000);\" -n5 -q -o\"C:\\\
    UserB\"\n```\n\n每个查询都将发出一个循环的、相对CPU密集型的查询，该查询将跨五个独立线程无限重复。我们可以通过检查`sys.dm_resource_governor_workload_groups`\
    \ DMV来确认分类器函数是否正常工作，如下列代码清单所示：\n\n```sql\nSELECT\n    name,\n    total_request_count\n\
    FROM\n    sys.dm_resource_governor_workload_groups\nWHERE\n    name IN ('GroupA',\
    \ 'GroupB');\n```\n\n结果显示，每个工作负载组下都有五个正在运行的请求。现在检查性能监视器图。在我的系统上，这如图9-2所示。\n\n\
    **图9-2\\. 两个默认工作负载组的平衡性能**\n\n## 调整CPU限制\n\n正如我们保留了所有资源 governor 设置为默认值所预期的那样，图中显示两个工作负载之间的CPU使用率百分比大致均等。那么现在让我们尝试改变一下。首先，我们将尝试限制分配给两个资源池的CPU资源：\n\
    \n```sql\nALTER RESOURCE POOL PoolA\nWITH ( MAX_CPU_PERCENT = 10 );\n\nALTER RESOURCE\
    \ POOL PoolB\nWITH ( MAX_CPU_PERCENT = 10 );\n\nALTER RESOURCE GOVERNOR RECONFIGURE;\n\
    \nGO\n```\n\n执行此代码后，你可能会惊讶地发现，图表没有任何变化。那么为什么`Resource Governor`似乎忽略了我们指定的`MAX_CPU_PERCENT`，并且未能将两个资源池限制在10%的CPU呢？这说明了`Resource\
    \ Governor`分配资源的方式的一个重要点——`MAX_CPU_PERCENT`值并非规定CPU使用的硬性限制，而是在*资源存在争用时*用于平衡竞争请求。\n\
    \n在这种情况下，由于所有资源池的声明性`MAX_CPU_PERCENT`总和小于100%，因此不存在争用。SQL Server OS总是会尝试最大化CPU资源使用率，因此如果有空闲CPU可用，它将在可用池之间分配。资源池的`MAX_CPU_PERCENT`仅在超出该限制会阻止另一个资源池被授予其请求的最大CPU设置的情况下强制执行。\n\
    \n> **注意**：在测试使用限制为`MAX_CPU_PERCENT`的资源池执行的应用程序时，重要的是要记住，仅当存在来自其他资源池对该CPU资源的争用时，该限制才会被强制执行。因此，你应该始终在具有竞争性并发进程的环境中进行测试。\n\
    \n考虑到这一点，让我们现在尝试另一个例子。在此示例中，我们将确保两个资源池的`MAX_CPU_PERCENT`总和为100%，这样任何一个都不允许超过该限制（否则另一个将被拒绝CPU资源）：\n\
    \n```sql\nALTER RESOURCE POOL PoolA\nWITH ( MAX_CPU_PERCENT = 90 );\n\nALTER RESOURCE\
    \ POOL PoolB\nWITH ( MAX_CPU_PERCENT = 10 );\n\nALTER RESOURCE GOVERNOR RECONFIGURE;\n\
    \nGO\n```\n\n遵循前面解释的规则，你现在可能期望`PoolA`和`PoolB`之间的CPU使用率按90:10的比例分配，并且根据你的系统，这可能是你现在在性能监视器图上观察到的结果。然而，我的系统上的图表*仍然*显示两个工作负载组之间几乎没有可察觉的差异，如图9-3所示。\n\
    \n**图9-3\\. CPU使用率百分比**"
