    CHAPTER 1 „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    );


    CREATE TABLE Books


    (


    BookStoreId int REFERENCES BookStores (BookStoreId),


    BookName varchar(50),


    Quantity int,


    PRIMARY KEY (BookStoreId, BookName)


    );


    While the object-oriented and SQL representations can store the same information,
    they do so differently enough that it does not make sense to say that a table
    represents a class, at least in current SQL databases.


    Modeling Inheritance


    In object-oriented design, there are two basic relationships that can exist between
    objects: “has-a”


    relationships, where an object “has” an instance of another object (e.g., a bookstore
    has books), and “is-a” relationships, where an object’s type is a subtype (or
    *subclass*) of another object (e.g., a bookstore is a type of store). In an SQL
    database, “has-a” relationships are quite common, whereas “is-a” relationships
    can be difficult to achieve.


    Consider a table called “Products,” which might represent the entity class of
    all products available for sale by a company. This table may have columns (attributes)
    that typically belong to a product, such as “price,” “weight,” and “UPC.” These
    common attributes are applicable to all products that the company sells. However,
    the company may sell many subclasses of products, each with their own specific
    sets of additional attributes. For instance, if the company sells both books and
    DVDs, the books might have a “page count,” whereas the DVDs would probably have
    “length” and “format” attributes.


    Subclassing in the object-oriented world is done via inheritance models that are
    implemented in languages such as C#. In these models, a given entity can be a
    member of a subclass, and still generally treated as a member of the *superclass*
    in code that works at that level. This makes it possible to seamlessly deal with
    both books and DVDs in the checkout part of a point-of-sale application, while
    keeping separate attributes about each subclass for use in other parts of the
    application where they are needed.


    In SQL databases, modeling inheritance can be tricky. The following code listing
    shows one way that it can be approached:


    CREATE TABLE Products


    (


    UPC int NOT NULL PRIMARY KEY,


    Weight decimal NOT NULL,


    Price decimal NOT NULL


    );


    CREATE TABLE Books


    (


    UPC int NOT NULL PRIMARY KEY


    REFERENCES Products (UPC),


    PageCount int NOT NULL


    );


    CHAPTER


    „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    CREATE TABLE DVDs


    (


    UPC int NOT NULL PRIMARY KEY


    REFERENCES Products (UPC),


    LengthInMinutes decimal NOT NULL,


    Format varchar(4) NOT NULL


    CHECK (Format IN (''NTSC'', ''PAL''))


    );


    The database structure created using this code listing is illustrated in Figure
    1-2.


    *Figure 1-2\. Modeling CREATE TABLE DVDs inheritance in a SQL database*


    Although this model successfully establishes books and DVDs as subtypes for products,
    it has a couple of serious problems. First of all, there is no way of enforcing
    uniqueness of subtypes in this model as it stands. A single UPC can belong to
    both the Books and DVDs subtypes simultaneously. That makes little sense in the
    real world in most cases (although it might be possible that a certain book ships
    with a DVD, in which case this model could make sense).


    Another issue is access to attributes. In an object-oriented system, a subclass
    automatically inherits all of the attributes of its superclass; a book entity
    would contain all of the attributes of both books and general products. However,
    that is not the case in the model presented here. Getting general product attributes
    when looking at data for books or DVDs requires a join back to the Products table.
    This really breaks down the overall sense of working with a subtype.


    Solving these problems is not impossible, but it takes some work. One method of
    guaranteeing uniqueness among subtypes involves populating the supertype with
    an additional attribute identifying the subtype of each instance. The following
    tables show how this solution could be implemented: CREATE TABLE Products


    (


    UPC int NOT NULL PRIMARY KEY,


    Weight decimal NOT NULL,


    Price decimal NOT NULL,


    ProductType char(1) NOT NULL


    CHECK (ProductType IN (''B'', ''D'')),


    UNIQUE (UPC, ProductType)


    );


    CREATE TABLE Books


    (


    UPC int NOT NULL PRIMARY KEY,


    ProductType char(1) NOT NULL


    CHECK (ProductType = ''B''),


    CHAPTER 1 „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    PageCount int NOT NULL,


    FOREIGN KEY (UPC, ProductType) REFERENCES Products (UPC, ProductType)


    );


    CREATE TABLE DVDs


    (


    UPC int NOT NULL PRIMARY KEY,


    ProductType char(1) NOT NULL


    CHECK (ProductType = ''D''),


    LengthInMinutes decimal NOT NULL,


    Format varchar(4) NOT NULL


    CHECK (Format IN (''NTSC'', ''PAL'')),


    FOREIGN KEY (UPC, ProductType) REFERENCES Products (UPC, ProductType)


    );


    By defining the subtype as part of the supertype, a UNIQUE constraint can be created,
    enabling SQL


    Server to enforce that only one subtype for each instance of a supertype is allowed.
    The relationship is further enforced in each subtype table by a CHECK constraint
    on the ProductType column, ensuring that only the correct product types are allowed
    to be inserted.


    It is possible to extend this method even further using indexed views and INSTEAD
    OF triggers. A view can be created for each subtype, which encapsulates the join
    necessary to retrieve the supertype’s attributes. By creating views to hide the
    joins, a consumer does not have to be aware of the subtype/supertype relationship,
    thereby fixing the attribute access problem. The indexing helps with performance,
    and the triggers allow the views to be updateable.


    It is possible in SQL databases to represent almost any relationship that can
    be embodied in an object-oriented system, but it’s important that database developers
    understand the intricacies of doing so. Mapping object-oriented data into a database
    (properly) is often not at all straightforward, and for complex object graphs
    can be quite a challenge.


