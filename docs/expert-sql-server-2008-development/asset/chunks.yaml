    \ T-SQL 查找工程副总裁的直接报告：\n\n```sql\nDECLARE @Path varchar(900);\nSELECT @Path = thePath\n\
    FROM Employee_Temp\nWHERE EmployeeID = 12;\n\nSELECT *\nFROM Employee_Temp\nWHERE\n\
    \    thePath LIKE @Path + '%/'\n    AND thePath NOT LIKE @Path + '%/%/';\n```\n\
    \n## 向上遍历层次结构\n\n持久化物化路径的一个限制是，没有特别有效的方法来使用它们向上遍历层次结构以生成“我们如何从当前节点到达 CEO”的报告。然而，物化路径本身已经包含了所有必要的信息——只是需要对数据进行一些操作才能将其转换为可用的格式。\n"
- fmt: "# TREES, HIERARCHIES, AND GRAPHS\n\n## The path for each employee is a stroke-delimited\
    \ ordered list of the nodes that lead from the root node to the given employee.\
    \ In order to generate a table from the list, it must be split up based on its\
    \ delimiters. This can be done by recursively using the `SUBSTRING` function.\
    \ By putting this logic in a recursive CTE, we can take the substring of each\
    \ node in the path on each iteration. Simultaneously, we can remember the order\
    \ of the nodes in the list so that the output can be ordered properly. The following\
    \ CTE finds the path to the CEO starting at the Research and Development Manager:\n\
    \n```sql\nWITH n AS\n(\n    SELECT\n        CONVERT(int,\n            SUBSTRING(thePath,\
    \ 2, CHARINDEX('/', thePath, 2) -2)) AS EmployeeID,\n        SUBSTRING(thePath,\
    \ CHARINDEX('/', thePath, 2), LEN(thePath)) AS thePath,\n        1 AS theLevel\n\
    \    FROM Employee_Temp\n    WHERE EmployeeID = 217\n\n    UNION ALL\n\n    SELECT\n\
    \        CONVERT(int,\n            SUBSTRING(thePath, 2, CHARINDEX('/', thePath,\
    \ 2) -2)),\n        SUBSTRING(thePath, CHARINDEX('/', thePath, 2), LEN(thePath)),\n\
    \        theLevel + 1\n    FROM n\n    WHERE thePath LIKE '/%/'\n)\n\nSELECT *\n\
    FROM n\nORDER BY theLevel;\n```\n\nThe output of this query is as follows:\n\n\
    | EmployeeID | thePath | theLevel |\n| :--- | :--- | :--- |\n| 109 | /12/3/158/217/\
    \ | 1 |\n| 12 | /3/158/217/ | 2 |\n| 3 | /158/217/ | 3 |\n| 158 | /217/ | 4 |\n\
    | 217 | | 5 |\n\nAside from the expression used to pull out the current first\
    \ node, another expression I used in both the anchor and recursive members cuts\
    \ the first node out of the path, so that the path progressively shrinks as the\
    \ CTE recurses at each level. This time, the cut starts just after the first delimiter—and\
    \ takes the entire remainder of the path.\n\nAlthough the `EmployeeID` column\
    \ is probably the only one necessary in the output, I’ve left the other columns\
    \ in so that you can see how the path is affected by the CTE’s logic at each level.\n\
    \n## Inserting Nodes\n\nWhenever a new leaf node is added to the hierarchy, its\
    \ parent’s path must be determined, and the new node appended to the path. This\
    \ logic can be encapsulated in a trigger such that whenever new nodes are inserted\
    \ into the adjacency list, their paths will automatically be updated. The following\
    \ trigger handles this logic:\n\n```sql\nCREATE TRIGGER tg_Insert\nON Employee_Temp\n\
    FOR INSERT\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    IF @@ROWCOUNT > 1\n    BEGIN\n\
    \        RAISERROR('Only one node can be inserted at a time', 16, 1);\n      \
    \  ROLLBACK;\n    END\n\n    UPDATE e\n    SET e.thePath =\n        Managers.thePath\
    \ +\n        RIGHT(\n            REPLICATE('0', 10) + CONVERT(varchar, i.EmployeeID),\n\
    \            10) + '/'\n    FROM Employee_Temp e\n    JOIN inserted i ON i.EmployeeID\
    \ = e.EmployeeID\n    JOIN Employee_Temp Managers ON Managers.EmployeeID = e.ManagerID;\n\
    END;\nGO\n```\n\nThe logic of this trigger is relatively simple: find the updated\
    \ row in the `Employee_Temp` table by joining on the `EmployeeID` columns of both\
    \ it and the `inserted` virtual table, and then join back to `Employee_Temp` to\
    \ get the manager’s path. Finally, concatenate the employee’s ID onto the end\
    \ of the path.\n\nThe most important thing to mention about this trigger is its\
    \ limitation when it comes to multirow inserts. Due to the fact that SQL Server\
    \ does not have any guarantees when it comes to update order, it is possible to\
    \ create invalid paths by inserting two nodes at the same time. For instance,\
    \ try disabling the row count check and inserting a subordinate first, followed\
    \ by a manager, in the same statement:\n\n```sql\nINSERT INTO Employee_Temp\n\
    (\n    EmployeeID,\n    ManagerID,\n    Title\n)\nVALUES\n    (1000, 999, 'Subordinate'),\n\
    \    (999, 109, 'Manager');\n```\n\nSince the order in which the `UPDATE` processes\
    \ rows is not guaranteed, the result of this operation is nondeterministic. The\
    \ subordinate may therefore end up with a `NULL` path, since at the moment its\
    \ row is updated the manager’s path has not yet have been processed. It may be\
    \ possible to solve this problem by traversing any hierarchy present in the `inserted`\
    \ table using a cursor, but I decided not to attempt this as I have never seen\
    \ a situation in a real-world project in which this limitation would be a barrier.\n\
    \n## Relocating Subtrees\n\nData modification is the real downside of the persisted\
    \ materialized paths technique. Any time you affect a node’s path, you must cascade\
    \ the new path to all of its subordinates. This can mean that some updates are\
    \ extremely expensive—should one of the vice presidents replace the CEO, every\
    \ node in the hierarchy must be updated! Luckily, the average cost is not huge;\
    \ the following T-SQL finds the `` `span of control` `` or average number of subordinates—four,\
    \ as it turns out—for all nodes in the `Employee_Temp` hierarchy:\n\n```sql\n\
    SELECT AVG(NumberOfSubordinates)\nFROM\n(\n    SELECT COUNT(*) AS NumberOfSubordinates\n\
    \    FROM Employee_Temp e\n    JOIN Employee_Temp e2 ON e2.thePath LIKE e.thePath\
    \ + '%'\n    GROUP BY e.EmployeeID\n) x;\n```\n\nRelocating a materialized path’s\
    \ subtree involves finding the new manager’s path and replacing it in the updated\
    \ node as well as all of its child nodes. This becomes clearer through example,\
    \ so consider what would happen if the Engineering Manager (`EmployeeID` 3) gets\
    \ a promotion and now reports directly to the CEO. Her path will change to the\
    \ CEO’s path with her employee ID concatenated to the end: `0000000109/0000000003/`.\
    \ This operation will also invalidate the paths of the Design Engineer and the\
    \ Senior Tool Designer, both of whose paths depend on that of the Engineering\
    \ Manager. So the same operation—replacement of the beginning of the path—has\
    \ to happen for all three nodes. It also has to happen for any of their subordinates,\
    \ all the way down the tree, since every subordinate inherits its manager’s path.\n\
    \nOnce again, a trigger can be employed to automatically perform this update when\
    \ a subtree is located based on the adjacency list. The following trigger handles\
    \ the logic:\n\n```sql\nCREATE TRIGGER tg_Update\nON Employee_Temp\nFOR UPDATE\n\
    AS\nBEGIN\n    DECLARE @n int = @@ROWCOUNT;\n\n    IF UPDATE(thePath)\n    BEGIN\n\
    \        RAISERROR('Direct updates to the path are not allowed', 16, 1);\n   \
    \     ROLLBACK;\n    END\n\n    IF UPDATE(ManagerID)\n    BEGIN\n        IF @n\
    \ > 1\n        BEGIN\n            RAISERROR('Only update one node''s manager at\
    \ a time', 16, 1);\n            ROLLBACK;\n        END\n\n        --Update all\
    \ nodes using the new manager's path\n        UPDATE e\n        SET e.thePath\
    \ =\n            REPLACE(e.thePath, i.thePath,\n                Managers.thePath\
    \ +\n                RIGHT(\n                    REPLICATE('0', 10) + CONVERT(varchar,\
    \ i.EmployeeID),\n                    10) + '/'\n            )\n        FROM Employee_Temp\
    \ e\n        JOIN inserted i ON e.thePath LIKE i.thePath + '%'\n        JOIN Employee_Temp\
    \ Managers ON Managers.EmployeeID = i.ManagerID\n    END\nEND\nGO\n```\n\nThere\
    \ are a few things to discuss in this trigger. Starting at the top, the trigger\
    \ first obtains the number of rows affected by the update operation. Just like\
    \ when dealing with inserting new nodes, relocation of subtrees must be serialized\
    \ to one node at a time in order to avoid logical ambiguities.\n\nHowever, an\
    \ error is not thrown right away in this case; it is possible that someone might\
    \ be updating a different column in the table, such as changing all of the “Production\
    \ Technicians” to “Production Specialists.” As long as the update is not to the\
    \ hierarchy, multirow updates are certainly allowed.\n\nThe first error check\
    \ done is for direct updates to the path—this is not allowed, since it’s the job\
    \ of the trigger. Next, the trigger checks to see whether the `ManagerID` column\
    \ is being updated. If not, it has nothing to do. If so, it then throws an error\
    \ if multiple rows have been affected. Finally, if there are no issues, the paths\
    \ of the affected node and all subordinates are updated based on the new manager’s\
    \ path. The logic used is to find the previous path of the updated node—using\
    \ the `inserted` virtual table, which will still have that original path because\
    \ direct updates to the path are not allowed—and replace it in all nodes with\
    \ the new path.\n\nAs before, this trigger could probably be made to handle multirow\
    \ updates by using a cursor, but I do not feel that the effort required to implement\
    \ such a solution would be worthwhile."
  raw: 'The path for each employee is a stroke-delimited ordered list of the nodes
    that lead from the root node to the given employee. In order to generate a table
    from the list, it must be split up based on its delimiters. This can be done by
    recursively using the SUBSTRING function. By putting this logic in a recursive
    CTE, we can take the substring of each node in the path on each iteration. Simultaneously,
    we can remember the order of the nodes in the list so that the output can be ordered
    properly. The following CTE finds the path to the CEO starting at the Research
    and Development Manager:


    WITH n AS


    (


    SELECT


    CONVERT(int,


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    SUBSTRING(thePath, 2, CHARINDEX(''/'', thePath, 2) -2)) AS EmployeeID,


    SUBSTRING(thePath, CHARINDEX(''/'', thePath, 2), LEN(thePath)) AS thePath,


    1 AS theLevel


    FROM Employee_Temp


    WHERE EmployeeID = 217


    UNION ALL


    SELECT


    CONVERT(int,


    SUBSTRING(thePath, 2, CHARINDEX(''/'', thePath, 2) -2)),


    SUBSTRING(thePath, CHARINDEX(''/'', thePath, 2), LEN(thePath)),


    theLevel + 1


    FROM n


    WHERE thePath LIKE ''/%/''


    )


    SELECT *


    FROM n


    ORDER BY theLevel;


    The output of this query is as follows:


    EmployeeID thePath theLevel


    109 /12/3/158/217/ 1


    12 /3/158/217/ 2


    3 /158/217/ 3


    158 /217/ 4


    217 5


    Aside from the expression used to pull out the current first node, another expression
    I used in both the anchor and recursive members cuts the first node out of the
    path, so that the path progressively shrinks as the CTE recurses at each level.
    This time, the cut starts just after the first delimiter—and takes the entire
    remainder of the path.


    Although the EmployeeID column is probably the only one necessary in the output,
    I’ve left the other columns in so that you can see how the path is affected by
    the CTE’s logic at each level.


    Inserting Nodes


    Whenever a new leaf node is added to the hierarchy, its parent’s path must be
    determined, and the new node appended to the path. This logic can be encapsulated
    in a trigger such that whenever new nodes are inserted into the adjacency list,
    their paths will automatically be updated. The following trigger handles this
    logic:


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    CREATE TRIGGER tg_Insert


    ON Employee_Temp


    FOR INSERT


    AS


    BEGIN


    SET NOCOUNT ON;


    IF @@ROWCOUNT > 1


    BEGIN


    RAISERROR(''Only one node can be inserted at a time'', 16, 1);


    ROLLBACK;


    END


    UPDATE e


    SET e.thePath =


    Managers.thePath +


    RIGHT(


    REPLICATE(''0'', 10) + CONVERT(varchar, i.EmployeeID),


    10) + ''/''


    FROM Employee_Temp e


    JOIN inserted i ON i.EmployeeID = e.EmployeeID


    JOIN Employee_Temp Managers ON Managers.EmployeeID = e.ManagerID;


    END;


    GO


    The logic of this trigger is relatively simple: find the updated row in the Employee_Temp
    table by joining on the EmployeeID columns of both it and the inserted virtual
    table, and then join back to Employee_Temp to get the manager’s path. Finally,
    concatenate the employee’s ID onto the end of the path.


    The most important thing to mention about this trigger is its limitation when
    it comes to multirow inserts. Due to the fact that SQL Server does not have any
    guarantees when it comes to update order, it is possible to create invalid paths
    by inserting two nodes at the same time. For instance, try disabling the row count
    check and inserting a subordinate first, followed by a manager, in the same statement:
    INSERT INTO Employee_Temp


    (


    EmployeeID,


    ManagerID,


    Title


    )


    VALUES


    (1000, 999, ''Subordinate''),


    (999, 109, ''Manager'');


    Since the order in which the UPDATE processes rows is not guaranteed, the result
    of this operation is nondeterministic. The subordinate may therefore end up with
    a NULL path, since at the moment its row is updated the manager’s path has not
    yet have been processed. It may be possible to solve this problem by traversing
    any hierarchy present in the inserted table using a cursor, but I decided not
    to attempt this as I have never seen a situation in a real-world project in which
    this limitation would be a barrier.


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    Relocating Subtrees


    Data modification is the real downside of the persisted materialized paths technique.
    Any time you affect a node’s path, you must cascade the new path to all of its
    subordinates. This can mean that some updates are extremely expensive—should one
    of the vice presidents replace the CEO, every node in the hierarchy must be updated!
    Luckily, the average cost is not huge; the following T-SQL finds the **span of**
    **control** or average number of subordinates—four, as it turns out—for all nodes
    in the Employee_Temp hierarchy:


    SELECT AVG(NumberOfSubordinates)


    FROM


    (


    SELECT COUNT(*) AS NumberOfSubordinates


    FROM Employee_Temp e


    JOIN Employee_Temp e2 ON e2.thePath LIKE e.thePath + ''%''


    GROUP BY e.EmployeeID


    ) x;


    Relocating a materialized path’s subtree involves finding the new manager’s path
    and replacing it in the updated node as well as all of its child nodes. This becomes
    clearer through example, so consider what would happen if the Engineering Manager
    (EmployeeID 3) gets a promotion and now reports directly to the CEO. Her path
    will change to the CEO’s path with her employee ID concatenated to the end: 0000000109/0000000003/.
    This operation will also invalidate the paths of the Design Engineer and the Senior
    Tool Designer, both of whose paths depend on that of the Engineering Manager.
    So the same operation—replacement of the beginning of the path—has to happen for
    all three nodes. It also has to happen for any of their subordinates, all the
    way down the tree, since every subordinate inherits its manager’s path.


    Once again, a trigger can be employed to automatically perform this update when
    a subtree is located based on the adjacency list. The following trigger handles
    the logic:


    CREATE TRIGGER tg_Update


    ON Employee_Temp


    FOR UPDATE


    AS


    BEGIN


    DECLARE @n int = @@ROWCOUNT;


    IF UPDATE(thePath)


    BEGIN


    RAISERROR(''Direct updates to the path are not allowed'', 16, 1);


    ROLLBACK;


    END


    IF UPDATE(ManagerID)


    BEGIN


    IF @n > 1


    BEGIN


    RAISERROR(''Only update one node''''s manager at a time'', 16, 1);


    ROLLBACK;


    END


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    --Update all nodes using the new manager''s path


    UPDATE e


    SET e.thePath =


    REPLACE(e.thePath, i.thePath,


    Managers.thePath +


    RIGHT(


    REPLICATE(''0'', 10) + CONVERT(varchar, i.EmployeeID),


    ) + ''/''


    )


    FROM Employee_Temp e


    JOIN inserted i ON e.thePath LIKE i.thePath + ''%''


    JOIN Employee_Temp Managers ON Managers.EmployeeID = i.ManagerID


    END


    END


    GO


    There are a few things to discuss in this trigger. Starting at the top, the trigger
    first obtains the number of rows affected by the update operation. Just like when
    dealing with inserting new nodes, relocation of subtrees must be serialized to
    one node at a time in order to avoid logical ambiguities.


    However, an error is not thrown right away in this case; it is possible that someone
    might be updating a different column in the table, such as changing all of the
    “Production Technicians” to “Production Specialists.” As long as the update is
    not to the hierarchy, multirow updates are certainly allowed.


    The first error check done is for direct updates to the path—this is not allowed,
    since it’s the job of the trigger. Next, the trigger checks to see whether the
    ManagerID column is being updated. If not, it has nothing to do. If so, it then
    throws an error if multiple rows have been affected. Finally, if there are no
    issues, the paths of the affected node and all subordinates are updated based
    on the new manager’s path. The logic used is to find the previous path of the
    updated node—using the inserted virtual table, which will still have that original
    path because direct updates to the path are not allowed—and replace it in all
    nodes with the new path.


    As before, this trigger could probably be made to handle multirow updates by using
    a cursor, but I do not feel that the effort required to implement such a solution
    would be worthwhile.'
  trans: "\n# 树、层次结构与图形\n\n## 每位员工的路径都是一个由斜杠分隔的有序节点列表，该列表从根节点开始，延伸到给定的员工。为了从该列表生成一个表，必须根据其分隔符进行拆分。这可以通过递归使用\
    \ `SUBSTRING` 函数来完成。通过将此逻辑置于递归公用表表达式 (CTE) 中，我们可以在每次迭代时提取路径中每个节点的子字符串。同时，我们可以记住列表中节点的顺序，以便能够正确地对输出进行排序。下面的\
    \ CTE 从研发部经理开始，寻找通往 CEO 的路径：\n\n```sql\nWITH n AS\n(\n    SELECT\n        CONVERT(int,\n\
    \            SUBSTRING(thePath, 2, CHARINDEX('/', thePath, 2) -2)) AS EmployeeID,\n\
    \        SUBSTRING(thePath, CHARINDEX('/', thePath, 2), LEN(thePath)) AS thePath,\n\
    \        1 AS theLevel\n    FROM Employee_Temp\n    WHERE EmployeeID = 217\n\n\
    \    UNION ALL\n\n    SELECT\n        CONVERT(int,\n            SUBSTRING(thePath,\
    \ 2, CHARINDEX('/', thePath, 2) -2)),\n        SUBSTRING(thePath, CHARINDEX('/',\
    \ thePath, 2), LEN(thePath)),\n        theLevel + 1\n    FROM n\n    WHERE thePath\
    \ LIKE '/%/'\n)\n\nSELECT *\nFROM n\nORDER BY theLevel;\n```\n\n该查询的输出如下：\n\n\
    | EmployeeID | thePath | theLevel |\n| :--- | :--- | :--- |\n| 109 | /12/3/158/217/\
    \ | 1 |\n| 12 | /3/158/217/ | 2 |\n| 3 | /158/217/ | 3 |\n| 158 | /217/ | 4 |\n\
    | 217 | | 5 |\n\n除了用于提取当前第一个节点的表达式之外，我在锚定成员和递归成员中使用的另一个表达式，从路径中切掉了第一个节点，这样随着 CTE\
    \ 在每一层级递归，路径会逐渐缩短。这一次，切分从第一个分隔符之后开始——并取路径的剩余全部内容。\n\n虽然 `EmployeeID` 列可能是输出中唯一必需的列，但我保留了其他列，以便您可以看到路径如何受到\
    \ CTE 在每一层级逻辑的影响。\n\n## 插入节点\n\n每当向层次结构添加一个新的叶节点时，必须确定其父节点的路径，并将新节点附加到该路径后面。此逻辑可以封装在触发器中，以便每当新节点被插入到邻接表中时，它们的路径会自动更新。以下触发器处理此逻辑：\n\
    \n```sql\nCREATE TRIGGER tg_Insert\nON Employee_Temp\nFOR INSERT\nAS\nBEGIN\n\
    \    SET NOCOUNT ON;\n\n    IF @@ROWCOUNT > 1\n    BEGIN\n        RAISERROR('Only\
    \ one node can be inserted at a time', 16, 1);\n        ROLLBACK;\n    END\n\n\
    \    UPDATE e\n    SET e.thePath =\n        Managers.thePath +\n        RIGHT(\n\
    \            REPLICATE('0', 10) + CONVERT(varchar, i.EmployeeID),\n          \
    \  10) + '/'\n    FROM Employee_Temp e\n    JOIN inserted i ON i.EmployeeID =\
    \ e.EmployeeID\n    JOIN Employee_Temp Managers ON Managers.EmployeeID = e.ManagerID;\n\
    END;\nGO\n```\n\n这个触发器的逻辑相对简单：通过连接 `Employee_Temp` 表和 `inserted` 虚拟表的 `EmployeeID`\
    \ 列来找到要更新的行，然后连接回 `Employee_Temp` 表以获取经理的路径。最后，将员工的 ID 连接到路径的末尾。\n\n关于这个触发器，最重要的是要提到它在处理多行插入时的局限性。由于\
    \ SQL Server 无法保证更新顺序，因此同时插入两个节点可能会创建无效的路径。例如，尝试禁用行数检查，并在同一条语句中先插入一个下属，然后再插入一个经理：\n\
    \n```sql\nINSERT INTO Employee_Temp\n(\n    EmployeeID,\n    ManagerID,\n    Title\n\
    )\nVALUES\n    (1000, 999, 'Subordinate'),\n    (999, 109, 'Manager');\n```\n\n\
    由于 `UPDATE` 处理行的顺序无法保证，此操作的结果是非确定性的。因此，下属最终可能得到一个 `NULL` 路径，因为在更新它的行时，经理的路径可能尚未被处理。通过使用游标遍历\
    \ `inserted` 表中存在的任何层次结构，或许可以解决这个问题，但我决定不尝试这样做，因为我从未在真实项目中遇到过此限制会成为障碍的情况。\n\n\
    ## 重新定位子树\n\n数据修改是这种持久化物化路径技术的真正缺点。任何时候影响节点的路径，都必须将新路径级联到其所有下属。这可能意味着某些更新极其昂贵——如果某位副总裁接替了\
    \ CEO，层次结构中的每个节点都必须更新！幸运的是，平均成本并不高；以下 T-SQL 查询在 `Employee_Temp` 层次结构中查找 `` `管理幅度`\
    \ `` 或平均下属数量——结果发现是四：\n\n```sql\nSELECT AVG(NumberOfSubordinates)\nFROM\n(\n \
    \   SELECT COUNT(*) AS NumberOfSubordinates\n    FROM Employee_Temp e\n    JOIN\
    \ Employee_Temp e2 ON e2.thePath LIKE e.thePath + '%'\n    GROUP BY e.EmployeeID\n\
    ) x;\n```\n\n重新定位物化路径的子树涉及找到新经理的路径，并在更新的节点及其所有子节点中替换它。通过例子可以看得更清楚，因此考虑一下如果工程经理（`EmployeeID`\
    \ 为 3）得到晋升并现在直接向 CEO 汇报会发生什么。她的路径将变为 CEO 的路径，并在其末尾连接她的员工 ID：`0000000109/0000000003/`。此操作还将使设计工程师和高级工具设计师的路径失效，这两者的路径都依赖于工程经理的路径。因此，同样的操作——替换路径的开头部分——必须对所有三个节点执行。对于他们的任何下属，也必须执行此操作，一直向下到树的底部，因为每个下属都继承其经理的路径。\n\
    \n同样，可以利用触发器在基于邻接表重新定位子树时自动执行此更新。以下触发器处理该逻辑：\n\n```sql\nCREATE TRIGGER tg_Update\n\
    ON Employee_Temp\nFOR UPDATE\nAS\nBEGIN\n    DECLARE @n int = @@ROWCOUNT;\n\n\
    \    IF UPDATE(thePath)\n    BEGIN\n        RAISERROR('Direct updates to the path\
    \ are not allowed', 16, 1);\n        ROLLBACK;\n    END\n\n    IF UPDATE(ManagerID)\n\
    \    BEGIN\n        IF @n > 1\n        BEGIN\n            RAISERROR('Only update\
    \ one node''s manager at a time', 16, 1);\n            ROLLBACK;\n        END\n\
    \n        --Update all nodes using the new manager's path\n        UPDATE e\n\
    \        SET e.thePath =\n            REPLACE(e.thePath, i.thePath,\n        \
    \        Managers.thePath +\n                RIGHT(\n                    REPLICATE('0',\
    \ 10) + CONVERT(varchar, i.EmployeeID),\n                    10) + '/'\n     \
    \       )\n        FROM Employee_Temp e\n        JOIN inserted i ON e.thePath\
    \ LIKE i.thePath + '%'\n        JOIN Employee_Temp Managers ON Managers.EmployeeID\
    \ = i.ManagerID\n    END\nEND\nGO\n```\n\n这个触发器中有几点需要讨论。从顶部开始，触发器首先获取更新操作影响的行数。就像处理插入新节点一样，重新定位子树必须序列化为一次一个节点，以避免逻辑上的歧义。\n\
    \n然而，在这种情况下，并不会立即抛出错误；可能有人正在更新表中的其他列，例如将所有“Production Technicians”更改为“Production\
    \ Specialists”。只要更新不是针对层次结构的，当然允许多行更新。\n\n首先进行的错误检查是针对对路径的直接更新——这是不允许的，因为这是触发器的职责。接下来，触发器检查\
    \ `ManagerID` 列是否正在被更新。如果不是，它就无事可做。如果是，并且影响了多个行，则抛出错误。最后，如果没有问题，则基于新经理的路径更新受影响节点及其所有下属的路径。所使用的逻辑是找到更新节点的先前路径——使用\
    \ `inserted` 虚拟表，因为它仍然包含原始路径（因为直接对路径的更新是不允许的）——并在所有节点中将其替换为新路径。\n\n和之前一样，这个触发器可能可以通过使用游标来处理多行更新，但我认为实现这样一个解决方案所需的努力并不值得。\n\
    \n"
- fmt: "# CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS\n\n**Note** If you’re using\
    \ the `tg_AtLeastOneRoot` trigger in conjunction with the `tg_Update` trigger,\
    \ you’ll have a problem if you need to swap the root node, because to satisfy\
    \ the `tg_AtLeastOneRoot` trigger’s logic, the update must end with a root note\
    \ in place, and this will require a multirow update. Luckily, that’s not generally\
    \ something that has to happen very often, but if you do need to do it, remember\
    \ to disable one of the triggers before making the change, and reenable it immediately\
    \ afterward to make sure that other callers don’t introduce data inconsistencies\
    \ in the interim.\n\n## Deleting Nodes\n\nThanks to the fact that the adjacency\
    \ list is being used in conjunction with the materialized path, deleting nodes\
    \ requires no additional logic. Due to the self-referential constraint on the\
    \ adjacency list, only leaf nodes can be deleted. Leaf nodes have no subordinates\
    \ and therefore there is nothing to cascade—the row will be deleted, and no further\
    \ logic is necessary. This is one of the main benefits of keeping both hierarchical\
    \ models in the same table—each inherits the other’s constraints, helping to ensure\
    \ greater data integrity.\n\n## Constraining the Hierarchy\n\nAll of the logic\
    \ mentioned in the previous “Constraining the Hierarchy” section (which dealt\
    \ with adjacency lists) still applies to materialized paths. However, with a materialized\
    \ path, it’s much easier to detect cycles, so there is no need to use the `tg_NoCycles`\
    \ trigger. Instead, a simple check constraint should be used that makes sure the\
    \ given employee only appears once, at the end of the path:\n\n```sql\nALTER TABLE\
    \ Employee_Temp\nADD CONSTRAINT ck_NoCycles\nCHECK\n(\n    thePath NOT LIKE\n\
    \    '%' +\n    RIGHT(REPLICATE('0', 10) + CONVERT(varchar, EmployeeID), 10) +\n\
    \    '/%/' +\n    RIGHT(REPLICATE('0', 10) + CONVERT(varchar, EmployeeID), 10)\
    \ +\n    '/'\n);\nGO\n```\n\n**Note** There is a subtle difference between the\
    \ logic expressed here and the logic used to prevent endless loops in the section\
    \ “Traversing the Graph.” In that section, the nodes in the path were not left-padded\
    \ with zeros, so the first node had to be delimited in order to make sure to detect\
    \ a cycle involving it. This was done to prevent a false alarm in case of a path\
    \ like `123/456/3`. In this case, the left-padding means that there is no way\
    \ to misinterpret a section of one ID as another, so we do not have to modify\
    \ the basic path logic already established.\n\n## The hierarchyid Datatype\n\n\
    In the preceding section, I discussed one of the limitations of the materialized\
    \ path approach—namely, that the string encoding makes it difficult to work with\
    \ deep hierarchies. Fortunately, in SQL Server 2008, the `hierarchyid` datatype\
    \ was introduced, which essentially stores hierarchical data using materialized\
    \ paths that are serialized into a CLR datatype. While this doesn’t provide much\
    \ additional functionality on top of what was possible using the materialized\
    \ path approach described previously, it does make querying hierarchical data\
    \ much easier, as I will demonstrate in this section.\n\nThe `hierarchyid` datatype\
    \ comes with a set of defined methods for working with hierarchical data, and\
    \ the first method of interest to us is the `Parse()` method, which instantiates\
    \ a new item of `hierarchyid` data based on a supplied string representation of\
    \ a materialized path. Fortunately for us, the string format expected by the `Parse()`\
    \ method is exactly the same as we used in the `thePath` column created in the\
    \ previous section—using an oblique stroke between each node in the path.\n\n\
    The following code listing creates and populates a column of `hierarchyid` values\
    \ representing rows in the `Employee_Temp` table based on the existing materialized\
    \ path.\n\n```sql\nALTER TABLE Employee_Temp\nADD hierarchy hierarchyid;\n\nUPDATE\
    \ Employee_Temp\nSET hierarchy = hierarchyid::Parse (thePath);\n```\n\n### Finding\
    \ Subordinates\n\nHaving populated the `hierarchyid` column, let’s put it to the\
    \ test by performing the same set of common queries as we did for the other methods.\
    \ The first requirement is to identify all those rows that are subordinates of\
    \ a particular manager. To do this, we can use the `IsDescendantOf()` method,\
    \ as shown in the following query:\n\n```sql\nSELECT * FROM Employee_Temp\nWHERE\
    \ hierarchy.IsDescendantOf('/109/6/') = 1;\n```\n\nThe preceding query returns\
    \ all those rows that are subordinates of the Marketing Manager (whose hierarchy\
    \ path is `/109/6/`), as follows:\n\n| EmployeeID | ManagerID | Title        \
    \          | thePath              | hierarchy (binary) |\n|------------|-----------|------------------------|----------------------|--------------------|\n\
    | 2          | 6         | Marketing Assistant    | /109/6/2/            | 0xE02EE568\
    \         |\n| 6          | 109       | Marketing Manager      | /109/6/     \
    \         | 0xE02EE5           |\n| 46         | 6         | Marketing Specialist\
    \   | /109/6/46/           | 0xE02EE5CBD0       |\n| 106        | 6         |\
    \ Marketing Specialist   | /109/6/106/          | 0xE02EE5E02D40     |\n| 119\
    \        | 6         | Marketing Specialist   | /109/6/119/          | 0xE02EE5E047C0\
    \     |\n| 203        | 6         | Marketing Specialist   | /109/6/203/     \
    \     | 0xE02EE5E0EDC0     |\n| 269        | 6         | Marketing Assistant \
    \   | /109/6/269/          | 0xE02EE5E26EC0     |\n| 271        | 6         |\
    \ Marketing Specialist   | /109/6/271/          | 0xE02EE5E26FC0     |\n| 272\
    \        | 6         | Marketing Assistant    | /109/6/272/          | 0xE02EE5E28440\
    \     |\n\nThere are a couple of important points to note about the result obtained\
    \ from the preceding query:\n\n*   Notice that the value supplied to the `IsDescendantOf()`\
    \ method, like all string representations of `hierarchyid` data, both begins and\
    \ ends with an oblique stroke. This style of syntax is probably familiar to all\
    \ developers who have previously used XQuery functionality in SQL Server or elsewhere.\n\
    *   The `hierarchyid` values are returned in the result set in their native binary\
    \ format. To get the string representation of a `hierarchyid` value, you must\
    \ call the `ToString()` method.\n*   Note that even though we were attempting\
    \ to identify subordinates of the Marketing Manager, the Marketing Manager himself\
    \ is returned in the results. This is an interesting quirk of the `hierarchyid`\
    \ type in that, for any given node `x`, `x.IsDescendantOf(x) = 1`. This is by\
    \ design, and is useful in some circumstances, but may not seem that intuitive.\n\
    *   The `IsDescendantOf()` method returns `true` for all descendants of the given\
    \ node, not just direct children, but grandchildren, great-grandchildren, and\
    \ so on.\n\nTo restrict the results to only return *direct* descendants of a node\
    \ (and also to exclude the node itself from the results), we can take advantage\
    \ of the `GetLevel()` method, which returns an integer representing the “level”\
    \ of a node in the hierarchy. The root node is level 0, and at each level of the\
    \ hierarchy underneath the root node this value increases by one. Therefore, the\
    \ direct subordinates of a given node will always be one level greater than their\
    \ parent. The following code listing demonstrates how to constrain the results\
    \ to only include direct subordinates of the Marketing Manager:\n\n```sql\nDECLARE\
    \ @Parent hierarchyid = hierarchyid::Parse('/109/6/');\n\nSELECT * FROM Employee_Temp\n\
    WHERE hierarchy.IsDescendantOf(@Parent) = 1\nAND hierarchy.GetLevel() = @Parent.GetLevel()\
    \ + 1;\n```\n\nThis is a very flexible structure that can be used to specify exactly\
    \ how many levels of descendants to traverse under a given node—for example, to\
    \ return children and grandchildren, you can include all those nodes where the\
    \ difference between the two levels is less than or equal to 2.\n\n### Navigating\
    \ up the Hierarchy\n\nSince the `hierarchyid` datatype is essentially just a materialized\
    \ path serialized as a CLR datatype, each individual `hierarchyid` value already\
    \ contains the full path back to the root node. In order to display this path\
    \ in a readable format, we simply need to call the `ToString()` method. For example,\
    \ consider the path from the CEO to the Production Technician, `EmployeeID` 100:\n\
    \n```sql\nSELECT\n    EmployeeID,\n    ManagerID,\n    Title,\n    hierarchy.ToString()\
    \ AS hierarchyPath\nFROM Employee_Temp\nWHERE EmployeeID = 100;\n```\n\nThe results\
    \ of this query are as follows:\n\n| EmployeeID | ManagerID | Title          \
    \            | hierarchyPath         |\n|------------|-----------|----------------------------|-----------------------|\n\
    | 100        | 143       | Production Technician - WC20 | /109/148/21/143/100/\
    \ |"
  raw: '„ **Note** If you’re using the tg_AtLeastOneRoot trigger in conjunction with
    the tg_Update trigger, you’ll have a problem if you need to swap the root node,
    because to satisfy the tg_AtLeastOneRoot trigger’s logic, the update must end
    with a root note in place, and this will require a multirow update. Luckily, that’s
    not generally something that has to happen very often, but if you do need to do
    it, remember to disable one of the triggers before making the change, and reenable
    it immediately afterward to make sure that other callers don’t introduce data
    inconsistencies in the interim.


    Deleting Nodes


    Thanks to the fact that the adjacency list is being used in conjunction with the
    materialized path, deleting nodes requires no additional logic. Due to the self-referential
    constraint on the adjacency list, only leaf nodes can be deleted. Leaf nodes have
    no subordinates and therefore there is nothing to 411


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    cascade—the row will be deleted, and no further logic is necessary. This is one
    of the main benefits of keeping both hierarchical models in the same table—each
    inherits the other’s constraints, helping to ensure greater data integrity.


    Constraining the Hierarchy


    All of the logic mentioned in the previous “Constraining the Hierarchy” section
    (which dealt with adjacency lists) still applies to materialized paths. However,
    with a materialized path, it’s much easier to detect cycles, so there is no need
    to use the tg_NoCycles trigger. Instead, a simple check constraint should be used
    that makes sure the given employee only appears once, at the end of the path:
    ALTER TABLE Employee_Temp


    ADD CONSTRAINT ck_NoCycles


    CHECK


    (


    thePath NOT LIKE


    ''%'' +


    RIGHT(REPLICATE(''0'', 10) + CONVERT(varchar, EmployeeID), 10) +


    ''/%'' +


    RIGHT(REPLICATE(''0'', 10) + CONVERT(varchar, EmployeeID), 10) +


    ''/''


    );


    GO


    „ **Note** There is a subtle difference between the logic expressed here and the
    logic used to prevent endless loops in the section “Traversing the Graph.” In
    that section, the nodes in the path were not left-padded with zeros, so the first
    node had to be delimited in order to make sure to detect a cycle involving it.
    This was done to prevent a false alarm in case of a path like 123/456/3\. In this
    case, the left-padding means that there is no way to misinterpret a section of
    one ID as another, so we do not have to modify the basic path logic already established.


    The hierarchyid Datatype


    In the preceding section, I discussed one of the limitations of the materialized
    path approach—namely, that the string encoding makes it difficult to work with
    deep hierarchies. Fortunately, in SQL Server 2008, the hierarchyid datatype was
    introduced, which essentially stores hierarchical data using materialized paths
    that are serialized into a CLR datatype. While this doesn’t provide much additional
    functionality on top of what was possible using the materialized path approach
    described previously, it does make querying hierarchical data much easier, as
    I will demonstrate in this section.


    The hierarchyid datatype comes with a set of defined methods for working with
    hierarchical data, and the first method of interest to us is the Parse() method,
    which instantiates a new item of hierarchyid data based on a supplied string representation
    of a materialized path. Fortunately for us, the string format expected by the
    Parse() method is exactly the same as we used in the thePath column created in
    the previous section—using an oblique stroke between each node in the path.


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    The following code listing creates and populates a column of hierarchyid values
    representing rows in the Employee_Temp table based on the existing materialized
    path.


    ALTER TABLE Employee_Temp


    ADD hierarchy hierarchyid;


    UPDATE Employee_Temp


    SET hierarchy = hierarchyid::Parse (thePath);


    Finding Subordinates


    Having populated the hierarchyid column, let’s put it to the test by performing
    the same set of common queries as we did for the other methods. The first requirement
    is to identify all those rows that are subordinates of a particular manager. To
    do this, we can use the IsDescendantOf() method, as shown in the following query:


    SELECT * FROM Employee_Temp


    WHERE hierarchy.IsDescendantOf(''/109/6/'') = 1;


    The preceding query returns all those rows that are subordinates of the Marketing
    Manager (whose hierarchy path is /109/6/), as follows:


    2 6 Marketing Assistant /109/6/2/ 0xE02EE568


    6 109 Marketing Manager /109/6/ 0xE02EE5


    46 6 Marketing Specialist /109/6/46/ 0xE02EE5CBD0


    106 6 Marketing Specialist /109/6/106/ 0xE02EE5E02D40


    119 6 Marketing Specialist /109/6/119/ 0xE02EE5E047C0


    203 6 Marketing Specialist /109/6/203/ 0xE02EE5E0EDC0


    269 6 Marketing Assistant /109/6/269/ 0xE02EE5E26EC0


    271 6 Marketing Specialist /109/6/271/ 0xE02EE5E26FC0


    272 6 Marketing Assistant /109/6/272/ 0xE02EE5E28440


    There are a couple of important points to note about the result obtained from
    the preceding query:


    •


    Notice that the value supplied to the IsDescendantOf() method, like all string


    representations of hierarchyid data, both begins and ends with an oblique stroke.


    This style of syntax is probably familiar to all developers who have previously
    used


    XQuery functionality in SQL Server or elsewhere.


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    •


    The hierarchyid values are returned in the result set in their native binary format.


    To get the string representation of a hierarchyid value, you must call the


    ToString() method.


    •


    Note that even though we were attempting to identify subordinates of the


    Marketing Manager, the Marketing Manager himself is returned in the results.


    This is an interesting quirk of the hierarchyid type in that, for any given node
    x,


    x.IsDescendantOf(x) = 1\. This is by design, and is useful in some circumstances,


    but may not seem that intuitive.


    •


    The IsDescendantOf() method returns true for all descendants of the given node,


    not just direct children, but grandchildren, great-grandchildren, and so on.


    To restrict the results to only return *direct* descendants of a node (and also
    to exclude the node itself from the results), we can take advantage of the GetLevel()
    method, which returns an integer


    representing the “level” of a node in the hierarchy. The root node is level 0,
    and at each level of the hierarchy underneath the root node this value increases
    by one. Therefore, the direct subordinates of a given node will always be one
    level greater than their parent. The following code listing demonstrates how to
    constrain the results to only include direct subordinates of the Marketing Manager:


    DECLARE @Parent hierarchyid = hierarchyid::Parse(''/109/6/'');


    SELECT * FROM Employee_Temp


    WHERE hierarchy.IsDescendantOf(@Parent) = 1


    AND hierarchy.GetLevel() = @Parent.GetLevel() + 1;


    This is a very flexible structure that can be used to specify exactly how many
    levels of descendants to traverse under a given node—for example, to return children
    and grandchildren, you can include all those nodes where the difference between
    the two levels is less than or equal to 2.


    Navigating up the Hierarchy


    Since the hierarchyid datatype is essentially just a materialized path serialized
    as a CLR datatype, each individual hierarchyid value already contains the full
    path back to the root node. In order to display this path in a readable format,
    we simply need to call the ToString() method. For example, consider the path from
    the CEO to the Production Technician, EmployeeID 100:


    SELECT


    EmployeeID,


    ManagerID,


    Title,


    hierarchy.ToString() AS hierarchyPath


    FROM Employee_Temp


    WHERE EmployeeID = 100;


    The results of this query are as follows:


    EmployeeID ManagerID Title hierarchyPath


    100 143 Production Technician - WC20 /109/148/21/143/100/


