  trans: "\n# 悲观并发解决方案的一个问题及一项提议的技术\n\n先前提出的解决方案以及其他程序化的悲观并发方案存在一个问题，即锁通常在应用程序代码之外不被强制实施。尽管在许多情况下这没有问题，但确保每个数据使用者在获取和释放锁时遵循相同的规则集至关重要。这些锁并不阻止数据修改，而仅作为一种手段来告知调用应用程序是否允许修改数据。如果应用程序的编码逻辑不正确，则可能导致核心数据规则被违反。\n\
    \n通过在写入时使用触发器对锁进行双重检查，可能避免部分或所有此类问题，但这可能难以实现，因为您可能无法确定哪个用户为特定行获取了哪个锁，更不用说判断是哪个用户在进行特定更新，特别是在您的应用程序仅使用单个数据库登录的情况下。\n\
    \n我提出了一种技术，可以帮助规避其中一些问题。首先，应基于 `CustomerId` 和 `LockToken` 列，为 `CustomerLocks`\
    \ 表添加一个新的候选键：\n\n```sql\nALTER TABLE CustomerLocks\nADD CONSTRAINT UN_Customer_Token\n\
    UNIQUE (CustomerId, LockToken);\nGO\n```\n\n然后，在 `Customers` 表中添加 `LockToken`\
    \ 列后，此键可用作引用：\n\n```sql\nALTER TABLE Customers\nADD\nLockToken uniqueidentifier\
    \ NULL,\nCONSTRAINT FK_CustomerLocks\nFOREIGN KEY (CustomerId, LockToken)\nREFERENCES\
    \ CustomerLocks (CustomerId, LockToken);\nGO\n```\n\n由于 `Customers` 表中的 `LockToken`\
    \ 列是可为空的，因此不需要始终引用有效的令牌。但是，当它实际设置为某个值时，该值必须存在于 `CustomerLocks` 表中，并且 `Customers`\
    \ 表中的客户 ID 和令牌组合必须与 `CustomerLocks` 表中的相同组合一致。\n\n一旦设置完成，就可以使用触发器为所有写入者在写入时强制实施锁：\n\
    \n```sql\nCREATE TRIGGER tg_EnforceCustomerLocks\nON Customers\nFOR UPDATE\nAS\n\
    BEGIN\n    SET NOCOUNT ON;\n\n    IF EXISTS\n    (\n        SELECT *\n       \
    \ FROM inserted\n        WHERE LockToken IS NULL\n    )\n    BEGIN\n        RAISERROR('LockToken\
    \ is a required column', 16, 1);\n        ROLLBACK;\n    END\n\n    UPDATE Customers\n\
    \    SET LockToken = NULL\n    WHERE\n        LockToken IN\n        (\n      \
    \      SELECT LockToken\n            FROM inserted\n        );\nEND\nGO\n```\n\
    \n外键约束强制分配给 `LockToken` 列的任何非 NULL 值必须有效。但是，它不强制 NULL 值；触发器处理这种情况，强制写入者在写入时设置锁令牌。如果所有行都符合条件，则令牌会更新回\
    \ NULL，以便锁可以被释放——保持引用将意味着无法从 `CustomerLocks` 表中删除这些行。\n\n此技术为更新增加了一些开销，因为每行必须更新两次。如果您的应用程序每天处理大量事务，请务必仔细测试，以确保这不会导致性能问题。\n\
    \n# 应用锁：推广悲观并发\n\n上一节中的示例可用于悲观地锁定行，但它需要为每种要锁定的实体类型进行一些设置，并且不容易推广到跨多行、表或 SQL Server\
    \ 数据库支持的其他粒度级别的资源锁定。\n\n认识到对这种锁定结构的需求，Microsoft 在 SQL Server 中包含了一项名为应用锁的功能。应用锁是程序化的、命名的锁，其行为类似于数据库中的其他类型的锁：在会话或事务范围内，调用者尝试获取与另一个调用者已持有的锁不兼容的锁会导致阻塞和排队。\n\
    \n使用 `sp_getapplock` 存储过程获取应用锁。默认情况下，锁绑定到活动事务，这意味着结束事务会释放锁。还有一个选项可以将锁绑定到会话，这意味着用户断开连接时会释放锁。要设置事务锁，请开始一个事务并请求一个锁名称（在应用锁术语中称为资源）。\n\
    \n您还可以指定锁模式，例如共享或独占。调用者还可以设置等待超时时间，之后存储过程将停止等待其他调用者释放锁。以下 TSQL 获取对 `customers`\
    \ 资源的独占事务锁，最多等待 2 秒让其他调用者释放他们持有的任何锁：\n\n```sql\nBEGIN TRAN;\nEXEC sp_getapplock\n\
    \    @Resource = 'customers',\n    @LockMode = 'exclusive',\n    @LockTimeout\
    \ = 2000;\n```\n\n`sp_getapplock` 如果锁未成功获取，不会引发异常，而是设置一个返回值。如果锁无需等待就成功获取，返回值将为\
    \ 0；如果锁在等待一段时间后获取，返回值将为 1；如果锁未成功获取，返回值将为多个负值中的任何一个。作为 `sp_getapplock` 的使用者，了解您是否实际获取了您请求的锁非常重要——因此前面的示例调用实际上是不完整的。以下调用检查返回值以了解锁是否被授予：\n\
    \n```sql\nBEGIN TRAN;\nDECLARE @ReturnValue int;\nEXEC @ReturnValue = sp_getapplock\n\
    \    @Resource = 'customers',\n    @LockMode = 'exclusive',\n    @LockTimeout\
    \ = 2000;\n\nIF @ReturnValue IN (0, 1)\n    PRINT 'Lock granted';\nELSE\n    PRINT\
    \ 'Lock not granted';\n```\n\n要释放锁，您可以提交或回滚活动事务，或者使用 `sp_releaseapplock` 存储过程，该过程将锁资源名称作为其输入值：\n\
    \n```sql\nEXEC sp_releaseapplock\n    @Resource = 'customers';\n```\n\nSQL Server\
    \ 的应用锁在许多场景中非常有用，但它们存在与之前提到的相同问题，即 SQL Server 提供的并发模型与业务实际需求之间存在差异。应用锁仅在事务或会话的持续时间内持有，这意味着要锁定资源并基于该锁执行长时间运行的业务事务，调用者必须在整个时间内保持与数据库的连接。这显然不是一个可扩展的选项，因此我着手编写一个替代的、非事务性的应用锁框架。\n\
    \n我的目标是模拟 `sp_getapplock` 的大部分行为，但仅针对独占锁——悲观锁定方案通常不需要资源上的共享锁。我特别希望调用者能够排队并等待其他资源释放锁。由于这不是事务锁，我还希望处理我在本节中讨论的所有注意事项，包括确保同时请求锁的多个调用者不会都认为锁已授予他们，返回令牌以避免无效的锁释放场景，以及添加锁超时时间以确保孤立锁不会滞留直到管理员移除它们。\n\
    \n在考虑有助于我创建此功能的 SQL Server 2008 功能时，我立即想到了 Service Broker。Service Broker 提供可跨事务和会话边界的异步排队，而\
    \ `WAITFOR` 命令允许调用者等待消息，而无需持续轮询队列。\n\n> **注意** 有关 SQL Server Service Broker 的详细背景，请参阅\
    \ Klaus Aschenbrenner 所著的 *Pro SQL Server 2008 Service Broker*（Apress, 2008）。\n\
    \n我开发用于解决此问题的架构始于一个中央表，用于跟踪已获取的锁：\n\n```sql\nCREATE TABLE AppLocks\n(\n```\n"
- fmt: '### **设计系统以实现应用并发性**


    `AppLockName` `nvarchar(255)` `NOT NULL`,

    `AppLockKey` `uniqueidentifier` `NULL`,

    `InitiatorDialogHandle` `uniqueidentifier` `NOT NULL`,

    `TargetDialogHandle` `uniqueidentifier` `NOT NULL`,

    `LastGrantedDate` `datetime` `NOT NULL` `DEFAULT`(`GETDATE()`),

    `PRIMARY KEY` (`AppLockName`)

    );

    `GO`


    `AppLockName` 列存储用户请求的锁的名称，`AppLockKey` 充当锁令牌。该令牌恰好也是一个 Service Broker 对话的对话句柄，我稍后会详细说明。`InitiatorDialogHandle`
    和 `TargetDialogHandle` 列是另一个 Service Broker 对话的对话句柄，我也会在后面解释。最后，`LastGrantedDate`
    列的用法与之前的示例相同，用于跟踪表中每个锁的使用时间。如你所见，此列在此方案中比在之前的情况下更为重要，因为锁是被重用而非删除的。


    为了支持 Service Broker 服务，我创建了一种消息类型和一个契约：


    ```sql

    CREATE MESSAGE TYPE AppLockGrant

    VALIDATION = EMPTY;

    GO


    CREATE CONTRACT AppLockContract (

    AppLockGrant SENT BY INITIATOR

    );

    GO

    ```


    如果你好奇为什么有一种用于授予锁的消息却没有用于请求它们的消息，那是因为此解决方案不使用锁请求服务。使用 Service Broker 仅仅是因为它恰好提供了我所需的排队、等待和超时功能——这与大多数
    Service Broker 示例有所不同。


    我创建了两个队列和两个服务来支持此基础设施。接下来我们将深入了解系统的核心部分：


    ```sql

    CREATE QUEUE AppLock_Queue;

    GO


    CREATE SERVICE AppLock_Service

    ON QUEUE AppLock_Queue (AppLockContract);

    GO


    CREATE QUEUE AppLockTimeout_Queue;

    GO


    CREATE SERVICE AppLockTimeout_Service

    ON QUEUE AppLockTimeOut_Queue;

    GO

    ```


    `AppLock_Queue` 队列及其关联服务的使用方式如下：当调用方请求对给定资源的锁时，如果以前从未有人请求过该资源的锁，则会在 `AppLock_Service`
    服务与其自身之间启动一个对话。该对话的发起方和目标对话句柄分别用于填充 `InitiatorDialogHandle` 和 `TargetDialogHandle`
    列。之后，当该调用方释放其锁时，会使用表中存储的发起方对话句柄在队列上发送一条 `AppLockGrant` 消息。当另一个调用方想要获取同一资源上的锁时，它会从表中获取目标对话句柄并在其上等待。这样，调用方就可以在不进行轮询的情况下等待锁被释放，并且如果在释放时正好在等待，就能立即获取它。


    `AppLockTimeout_Queue` 的用法略有不同。你可能会注意到其关联服务使用了默认契约。这是因为除了 Service Broker 系统消息外，将不会有其他消息从它发出或发送给它。每当授予一个锁时，就会在服务与其自身之间启动一个新的对话，该对话的发起方对话句柄成为锁令牌。


    除了用作锁令牌外，该对话还有另一个目的：启动时会为其设置一个生命周期。对话生命周期是一个计时器，在设定的时间段后，会向对话中所有活动的参与方发送一条消息——在此情况下，由于没有发送过消息，只有发起方会收到消息。收到消息后，将使用一个激活存储过程来释放锁。我发现这比使用
    SQL Server 代理作业（如上一节示例所示）更能精细地控制锁的过期。每当调用方释放锁时，对话就会结束，从而清除其生命周期计时器。


    为了允许调用方请求锁，我创建了一个名为 `GetAppLock` 的存储过程。由于此存储过程相当长，我将分节介绍它，以便更彻底地解释细节。'
  raw: 'AppLockName nvarchar(255) NOT NULL,


    AppLockKey uniqueidentifier NULL,


    InitiatorDialogHandle uniqueidentifier NOT NULL,


    TargetDialogHandle uniqueidentifier NOT NULL,


    LastGrantedDate datetime NOT NULL DEFAULT(GETDATE()),


    PRIMARY KEY (AppLockName)


    );


    GO


    The AppLockName column stores the names of locks that users have requested, and
    the AppLockKey functions as a lock token. This token also happens to be the conversation
    handle for a Service Broker dialog, but I’ll get to that shortly. The InitiatorDialogHandle
    and TargetDialogHandle columns are conversation handles for another Service Broker
    dialog, which I will also explain shortly. Finally, the LastGrantedDate column
    is used just as in the examples earlier, to keep track of when each lock in the
    table was used. As you’ll see, this column is even more important than it was
    in the previous case, because locks are reused instead of deleted in this scheme.


    To support the Service Broker services, I created one message type and one contract:


    CREATE MESSAGE TYPE AppLockGrant


    VALIDATION = EMPTY;


    GO


    CREATE CONTRACT AppLockContract (


    AppLockGrant SENT BY INITIATOR


    );


    GO


    If you’re wondering why there is a message used to grant locks but none used to
    request them, it’s because this solution does not use a lock request service.
    Service Broker is used only because it happens to provide the queuing, waiting,
    and timeout features I needed—a bit different from most Service Broker samples.


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    I created two queues to support this infrastructure, along with two services.
    Here is where we get closer to the meat of the system:


    CREATE QUEUE AppLock_Queue;


    GO


    CREATE SERVICE AppLock_Service


    ON QUEUE AppLock_Queue (AppLockContract);


    GO


    CREATE QUEUE AppLockTimeout_Queue;


    GO


    CREATE SERVICE AppLockTimeout_Service


    ON QUEUE AppLockTimeOut_Queue;


    GO


    The AppLock_Queue queue and its associated service are used as follows: when a
    lock on a given resource is requested by a caller, if no one has ever requested
    a lock on that resource before, a dialog is started between the AppLock_Service
    service and itself. Both the initiator and target conversation handles for that
    dialog are used to populate the InitiatorDialogHandle and TargetDialogHandle columns,
    respectively. Later, when that caller releases its lock, an AppLockGrant message
    is sent on the queue from the initiator dialog handle stored in the table. When
    another caller wants to acquire a lock on the same resource, it gets the target
    dialog handle from the table and waits on it. This way callers can wait for the
    lock to be released without having to poll, and will be able to pick it up as
    soon as it is released if they happen to be waiting at that moment.


    The AppLockTimeout_Queue is used a bit differently. You might notice that its
    associated service uses the default contract. This is because no messages—except
    perhaps Service Broker system messages—


    will ever be sent from or to it. Whenever a lock is granted, a new dialog is started
    between the service and itself, and the initiator conversation handle for the
    dialog becomes the lock token.


    In addition to being used as the lock token, the dialog serves another purpose:
    when it is started, a lifetime is set. A dialog lifetime is a timer that, after
    its set period, sends a message to all active parties involved in the conversation—in
    this case, since no messages will have been sent, only the initiator will receive
    the message. Upon receipt, an activation procedure is used to release the lock.
    I found this to be a more granular way of controlling lock expirations than using
    a SQL Server agent job, as I did in the example in the previous section. Whenever
    a lock is released by a caller, the conversation is ended, thereby clearing its
    lifetime timer.


    To allow callers to request locks, I created a stored procedure called GetAppLock.
    As this stored procedure is quite long, I will walk through it in sections in
    order to explain the details more thoroughly.'
