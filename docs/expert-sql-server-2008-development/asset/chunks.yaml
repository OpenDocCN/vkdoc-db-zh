    # 第 6 章：加密


    ## 平衡性能与安全性


    *图 6-6。一种混合加密方法。*


    混合加密结构的要素可以描述如下：


    *   数据使用对称密钥进行加密，这提供了性能最佳的加密方法。我推荐基于`AES`算法的加密，并根据您的需求选择适当的密钥长度。密钥越长提供的保护越多，但同时也需要更多的处理开销。


    *   对称密钥由一个或多个证书保护，这些证书提供了非对称加密的强度以及额外的好处，例如能够从`T-SQL`备份和恢复证书，以及为证书的有效期设置明确的开始和到期日期。我倾向于为每个需要访问对称密钥的用户或用户组创建一个证书。这些相同的证书也可用于加密该用户或用户组所需的其他密钥。


    *   每个证书都用一个（强）密码保护，以便只有知道密码的个人才能访问。这意味着加密信息对系统管理员也是保密的，否则他们可以使用`DMK`来打开证书及底层的对称密钥。


    *   可以在此模型中添加进一步的加密层，方法是在证书加密之前，使用额外的对称密钥来保护该对称密钥。每一层都为潜在的黑客破解设置了额外的障碍，同时也使得密钥轮换更容易实施。


    为了说明如何创建上述混合加密模型，首先创建两个用户：


    ```sql

    CREATE USER FinanceUser WITHOUT LOGIN;

    CREATE USER MarketingUser WITHOUT LOGIN;

    GO

    ```

    '
- fmt: "# Chapter 6: Encryption\n\n## Creating Certificates and a Shared Symmetric\
    \ Key\n\nThen create a certificate for each user, each with their own password:\n\
    \n```sql\nCREATE CERTIFICATE FinanceCertificate\nAUTHORIZATION FinanceUser\nENCRYPTION\
    \ BY PASSWORD = '#F1n4nc3_P455w()rD#'\nWITH SUBJECT = 'Certificate for Finance',\n\
    EXPIRY_DATE = '20101031';\n\nCREATE CERTIFICATE MarketingCertificate\nAUTHORIZATION\
    \ MarketingUser\nENCRYPTION BY PASSWORD = '-+M@Rket1ng-P@s5w0rD!+-'\nWITH SUBJECT\
    \ = 'Certificate for Marketing',\nEXPIRY_DATE = '20101105';\nGO\n```\n\nWe’ll\
    \ also create a sample table and give both users permission to select and insert\
    \ data into the table:\n\n```sql\nCREATE TABLE Confidential (\n    EncryptedData\
    \ varbinary(255)\n);\nGO\n\nGRANT SELECT, INSERT ON Confidential TO FinanceUser,\
    \ MarketingUser;\nGO\n```\n\nNow that we have the basic structure set up, we will\
    \ create a shared symmetric key that will be encrypted by both the finance and\
    \ marketing certificates. However, you cannot directly create a key in this manner.\
    \ Instead, we will create the key with protection by the first certificate, and\
    \ then open and alter the key to add encryption by the second certificate too:\n\
    \n```sql\n-- Create a symmetric key protected by the first certificate\nCREATE\
    \ SYMMETRIC KEY SharedSymKey\nWITH ALGORITHM = AES_256\nENCRYPTION BY CERTIFICATE\
    \ FinanceCertificate;\nGO\n\n-- Then OPEN and ALTER the key to add encryption\
    \ by the second certificate\nOPEN SYMMETRIC KEY SharedSymKey\nDECRYPTION BY CERTIFICATE\
    \ FinanceCertificate\nWITH PASSWORD = '#F1n4nc3_P455w()rD#';\n\nALTER SYMMETRIC\
    \ KEY SharedSymKey\nADD ENCRYPTION BY CERTIFICATE MarketingCertificate;\n\nCLOSE\
    \ SYMMETRIC KEY SharedSymKey;\nGO\n```\n\nFinally, we need to grant permissions\
    \ on the symmetric key for each user:\n\n```sql\nGRANT VIEW DEFINITION ON SYMMETRIC\
    \ KEY::SharedSymKey TO FinanceUser;\nGRANT VIEW DEFINITION ON SYMMETRIC KEY::SharedSymKey\
    \ TO MarketingUser;\nGO\n```\n\n## Encrypting and Decrypting Data\n\nTo encrypt\
    \ data using the shared symmetric key, either user must first open the key by\
    \ specifying the name and password of their certificate that is protecting it.\
    \ They can then use the `ENCRYPTBYKEY` function as demonstrated earlier in this\
    \ chapter. The following listing demonstrates how `FinanceUser` can insert data\
    \ into the `Confidential` table, encrypted using the shared symmetric key:\n\n\
    ```sql\nEXECUTE AS USER = 'FinanceUser';\n\nOPEN SYMMETRIC KEY SharedSymKey\n\
    DECRYPTION BY CERTIFICATE FinanceCertificate\nWITH PASSWORD = '#F1n4nc3_P455w()rD#';\n\
    \nINSERT INTO Confidential\nSELECT ENCRYPTBYKEY(KEY_GUID(N'SharedSymKey'), N'This\
    \ is shared information\naccessible to finance and marketing');\n\nCLOSE SYMMETRIC\
    \ KEY SharedSymKey;\n\nREVERT;\nGO\n```\n\nTo decrypt this data, either the marketing\
    \ user or the finance user can explicitly open the `SharedSymKey` key prior to\
    \ decryption, similar to the pattern used for encryption, or they can take advantage\
    \ of the `DECRYPTBYKEYAUTOCERT` function, which allows you to automatically open\
    \ a symmetric key protected by a certificate as part of the inline function that\
    \ performs the decryption.\n\nTo demonstrate the `DECRYPTBYKEYAUTOCERT` function,\
    \ the following code listing shows how `MarketingUser` can decrypt the value in\
    \ the `Confidential` table inserted by `FinanceUser`, opening the shared symmetric\
    \ key using their own certificate name and password protecting the symmetric key:\n\
    \n```sql\nEXECUTE AS USER = 'MarketingUser';\n\nSELECT\n    CAST(\n        DECRYPTBYKEYAUTOCERT(\n\
    \            CERT_ID(N'MarketingCertificate'),\n            N'-+M@Rket1ng-P@s5w0rD!+-',\n\
    \            EncryptedData)\n        AS nvarchar(255))\nFROM Confidential;\n\n\
    REVERT;\nGO\n```\n\nThe result shows that `MarketingUser` can use the `MarketingCertificate`\
    \ to access data encrypted by `FinanceUser` using the shared symmetric key:\n\n\
    \    This is shared information accessible to finance and marketing\n\n## Extending\
    \ the Hybrid Model\n\nTo extend this example a little further, suppose that in\
    \ addition to storing encrypted data that is shared between finance and marketing,\
    \ the `Confidential` table also holds data to which only the finance user should\
    \ be granted access. Using the hybrid model described here, this is very easy\
    \ to achieve—simply create a new symmetric key that is protected by the existing\
    \ finance certificate and grant permissions on that key to the finance user.\n\
    \n```sql\nCREATE SYMMETRIC KEY FinanceSymKey\nWITH ALGORITHM = AES_256\nENCRYPTION\
    \ BY CERTIFICATE FinanceCertificate;\nGO\n\nGRANT VIEW DEFINITION ON SYMMETRIC\
    \ KEY::FinanceSymKey TO FinanceUser;\nGO\n```\n\nAs this new symmetric key is\
    \ protected using the existing `FinanceCertificate`, the finance user can open\
    \ it using exactly the same syntax as for the shared key, and encrypt data using\
    \ the key by specifying the appropriate `KEY_GUID` to the `ENCRYPTBYKEY` method:\n\
    \n```sql\nEXECUTE AS USER = 'FinanceUser';\n\nOPEN SYMMETRIC KEY FinanceSymKey\n\
    DECRYPTION BY CERTIFICATE FinanceCertificate\nWITH PASSWORD = '#F1n4nc3_P455w()rD#';\n\
    \nINSERT INTO Confidential\nSELECT ENCRYPTBYKEY(\n    KEY_GUID(N'FinanceSymKey'),\n\
    \    N'This information is only accessible to finance');\n\nCLOSE SYMMETRIC KEY\
    \ FinanceSymKey;\n\nREVERT;\nGO\n```\n\nThe `Confidential` table now contains\
    \ two rows of data: one row is encrypted using the shared symmetric key, `SharedSymKey`,\
    \ to which both `MarketingUser` and `FinanceUser` have access; the second row\
    \ is encrypted using `FinanceSymKey`, which is only accessible by `FinanceUser`.\n\
    \nThe beauty of this approach is that, since all of the keys to which a given\
    \ user has access are protected by a single certificate, the `DECRYPTBYKEYAUTOCERT`\
    \ method can be used to decrypt the entire column of data, whatever key was used\
    \ to encrypt the individual values.\n\nFor example, the following code listing\
    \ demonstrates how `FinanceUser` can automatically decrypt all values in the `EncryptedData`\
    \ column by using `DECRYPTBYKEYAUTOCERT` in conjunction with the `FinanceCertificate`:\n\
    \n```sql\nEXECUTE AS USER = 'FinanceUser';\n\nSELECT\n    CAST(\n        DECRYPTBYKEYAUTOCERT(\n\
    \            CERT_ID(N'FinanceCertificate'),\n            N'#F1n4nc3_P455w()rD#',\n\
    \            EncryptedData\n        ) AS nvarchar(255))\nFROM Confidential;\n\n\
    REVERT;\nGO\n```\n\nThe results show that `FinanceUser` can use `DECRYPTBYKEYAUTOCERT`\
    \ to decrypt values encrypted by both the `FinanceSymKey` and the `SharedSymKey`,\
    \ because they are both protected using the same `FinanceCertificate`:\n\n   \
    \ This is shared information accessible to finance and marketing\n    This information\
    \ is only accessible to finance\n\nIf `MarketingUser` were to attempt to perform\
    \ exactly the same query using the `MarketingCertificate`, they would be able\
    \ to decrypt only those values encrypted using the `SharedSymKey`; the result\
    \ of attempting to decrypt values that had been encrypted using `FinanceSymKey`\
    \ would be `NULL`:\n\n```sql\nEXECUTE AS USER = 'MarketingUser';\n\nSELECT\n \
    \   CAST(\n        DECRYPTBYKEYAUTOCERT(\n            CERT_ID(N'MarketingCertificate'),\n\
    \            N'-+M@Rket1ng-P@s5w0rD!+-',\n            EncryptedData) AS nvarchar(255))\n\
    FROM Confidential;\n\nREVERT;\nGO\n```\n\n    This is shared information accessible\
    \ to finance and marketing\n    NULL\n\nI hope that this has demonstrated how\
    \ the hybrid model of encryption achieves a balance between security and maintainability\
    \ for the majority of situations in which encryption is required, and how it can\
    \ be extended to deal with a range of different use scenarios.\n\nIn the following\
    \ section, I’ll show you how to write efficient queries against encrypted data\
    \ held in such a model.\n\n## Implications of Encryption on Query Design\n\nHaving\
    \ discussed the relative merits of different encryption architecture decisions,\
    \ the remainder of this chapter will focus on methods to optimize the performance\
    \ of applications that deal with encrypted data.\n\nThe security of encryption\
    \ always comes with an associated performance cost. As previously mentioned, reads\
    \ and writes of encrypted data are more resource-intensive and typically take\
    \ longer to perform. However, the special nature of encrypted data has wider-ranging\
    \ implications than accepting a simple performance hit, and particular attention\
    \ needs to be paid to any activities that involve ordering, filtering, or performing\
    \ joins on encrypted data."
  raw: 'Then create a certificate for each user, each with their own password:


    CHAPTER 6 „ ENCRYPTION


    CREATE CERTIFICATE FinanceCertificate


    AUTHORIZATION FinanceUser


    ENCRYPTION BY PASSWORD = ''#F1n4nc3_P455w()rD#''


    WITH SUBJECT = ''Certificate for Finance'',


    EXPIRY_DATE = ''20101031'';


    CREATE CERTIFICATE MarketingCertificate


    AUTHORIZATION MarketingUser


    ENCRYPTION BY PASSWORD = ''-+M@Rket1ng-P@s5w0rD!+-''


    WITH SUBJECT = ''Certificate for Marketing'',


    EXPIRY_DATE = ''20101105'';


    GO


    We’ll also create a sample table and give both users permission to select and
    insert data into the table:


    CREATE TABLE Confidential (


    EncryptedData varbinary(255)


    );


    GO


    GRANT SELECT, INSERT ON Confidential TO FinanceUser, MarketingUser;


    GO


    Now that we have the basic structure set up, we will create a shared symmetric
    key that will be encrypted by both the finance and marketing certificates. However,
    you cannot directly create a key in this manner. Instead, we will create the key
    with protection by the first certificate, and then open and alter the key to add
    encryption by the second certificate too:


    -- Create a symmetric key protected by the first certificate


    CREATE SYMMETRIC KEY SharedSymKey


    WITH ALGORITHM = AES_256


    ENCRYPTION BY CERTIFICATE FinanceCertificate;


    GO


    -- Then OPEN and ALTER the key to add encryption by the second certificate


    OPEN SYMMETRIC KEY SharedSymKey


    DECRYPTION BY CERTIFICATE FinanceCertificate


    WITH PASSWORD = ''#F1n4nc3_P455w()rD#'';


    ALTER SYMMETRIC KEY SharedSymKey


    ADD ENCRYPTION BY CERTIFICATE MarketingCertificate;


    CLOSE SYMMETRIC KEY SharedSymKey;


    GO


    CHAPTER 6 „ ENCRYPTION


    Finally, we need to grant permissions on the symmetric key for each user:


    GRANT VIEW DEFINITION ON SYMMETRIC KEY::SharedSymKey TO FinanceUser


    GRANT VIEW DEFINITION ON SYMMETRIC KEY::SharedSymKey TO MarketingUser


    GO


    To encrypt data using the shared symmetric key, either user must first open the
    key by specifying the name and password of their certificate that is protecting
    it. They can then use the ENCRYPTBYKEY


    function as demonstrated earlier in this chapter. The following listing demonstrates
    how FinanceUser can insert data into the Confidential table, encrypted using the
    shared symmetric key:


    EXECUTE AS USER = ''FinanceUser'';


    OPEN SYMMETRIC KEY SharedSymKey


    DECRYPTION BY CERTIFICATE FinanceCertificate


    WITH PASSWORD = ''#F1n4nc3_P455w()rD#'';


    INSERT INTO Confidential


    SELECT ENCRYPTBYKEY(KEY_GUID(N''SharedSymKey''), N''This is shared information


    accessible to finance and marketing'');


    CLOSE SYMMETRIC KEY SharedSymKey;


    REVERT;


    GO


    To decrypt this data, either the marketing user or the finance user can explicitly
    open the


    SharedSymKey key prior to decryption, similar to the pattern used for encryption,
    or they can take advantage of the DECRYPTBYKEYAUTOCERT function, which allows
    you to automatically open a symmetric key protected by a certificate as part of
    the inline function that performs the decryption.


    To demonstrate the DECRYPTBYKEYAUTOCERT function, the following code listing shows
    how


    MarketingUser can decrypt the value in the Confidential table inserted by FinanceUser,
    opening the shared symmetric key using their own certificate name and password
    protecting the symmetric key: EXECUTE AS USER = ''MarketingUser'';


    SELECT


    CAST(


    DECRYPTBYKEYAUTOCERT(


    CERT_ID(N''MarketingCertificate''),


    N''-+M@Rket1ng-P@s5w0rD!+-'',


    EncryptedData)


    AS nvarchar(255))


    FROM Confidential;


    REVERT;


    GO


    The result shows that MarketingUser can use the MarketingCertificate to access
    data encrypted by FinanceUser using the shared symmetric key:


    CHAPTER 6 „ ENCRYPTION


    This is shared information accessible to finance and marketing


    To extend this example a little further, suppose that in addition to storing encrypted
    data that is shared between finance and marketing, the Confidential table also
    holds data to which only the finance user should be granted access. Using the
    hybrid model described here, this is very easy to achieve—


    simply create a new symmetric key that is protected by the existing finance certificate
    and grant permissions on that key to the finance user.


    CREATE SYMMETRIC KEY FinanceSymKey


    WITH ALGORITHM = AES_256


    ENCRYPTION BY CERTIFICATE FinanceCertificate;


    GO


    GRANT VIEW DEFINITION ON SYMMETRIC KEY::FinanceSymKey TO FinanceUser


    GO


    As this new symmetric key is protected using the existing FinanceCertificate,
    the finance user can open it using exactly the same syntax as for the shared key,
    and encrypt data using the key by specifying the appropriate KEY_GUID to the ENCRYPTBYKEY
    method:


    EXECUTE AS USER = ''FinanceUser'';


    OPEN SYMMETRIC KEY FinanceSymKey


    DECRYPTION BY CERTIFICATE FinanceCertificate


    WITH PASSWORD = ''#F1n4nc3_P455w()rD#'';


    INSERT INTO Confidential


    SELECT ENCRYPTBYKEY(


    KEY_GUID(N''FinanceSymKey''),


    N''This information is only accessible to finance'');


    CLOSE SYMMETRIC KEY FinanceSymKey;


    REVERT;


    GO


    The Confidential table now contains two rows of data: one row is encrypted using
    the shared


    symmetric key, SharedSymKey, to which both MarketingUser and FinanceUser have
    access; the second row is encrypted using FinanceSymKey, which is only accessible
    by FinanceUser.


    The beauty of this approach is that, since all of the keys to which a given user
    has access are protected by a single certificate, the DECRYPTBYKEYAUTOCERT method
    can be used to decrypt the entire column of data, whatever key was used to encrypt
    the individual values.


    For example, the following code listing demonstrates how FinanceUser can automatically
    decrypt all values in the EncryptedData column by using DECRYPTBYKEYAUTOCERT in
    conjunction with the


    FinanceCertificate:


    EXECUTE AS USER = ''FinanceUser'';


    SELECT


    CAST(


    CHAPTER 6 „ ENCRYPTION


    DECRYPTBYKEYAUTOCERT(


    CERT_ID(N''FinanceCertificate''),


    N''#F1n4nc3_P455w()rD#'',


    EncryptedData


    ) AS nvarchar(255))


    FROM Confidential;


    REVERT;


    GO


    The results show that FinanceUser can use DECRYPTBYKEYAUTOCERT to decrypt values
    encrypted by both the FinanceSymKey and the SharedSymKey, because they are both
    protected using the same


    FinanceCertificate:


    This is shared information accessible to finance and marketing


    This information is only accessible to finance


    If MarketingUser were to attempt to perform exactly the same query using the


    MarketingCertificate, they would be able to decrypt only those values encrypted
    using the


    SharedSymKey; the result of attempting to decrypt values that had been encrypted
    using FinanceSymKey would be NULL:


    EXECUTE AS USER = ''MarketingUser'';


    SELECT


    CAST(


    DECRYPTBYKEYAUTOCERT(


    CERT_ID(N''MarketingCertificate''),


    N''-+M@Rket1ng-P@s5w0rD!+-'',


    EncryptedData) AS nvarchar(255))


    FROM Confidential;


    REVERT;


    GO


    This is shared information accessible to finance and marketing


    NULL


    I hope that this has demonstrated how the hybrid model of encryption achieves
    a balance between security and maintainability for the majority of situations
    in which encryption is required, and how it can be extended to deal with a range
    of different use scenarios.


    In the following section, I’ll show you how to write efficient queries against
    encrypted data held in such a model.


    CHAPTER 6 „ ENCRYPTION


    Implications of Encryption on Query Design


    Having discussed the relative merits of different encryption architecture decisions,
    the remainder of this chapter will focus on methods to optimize the performance
    of applications that deal with encrypted data.


    The security of encryption always comes with an associated performance cost. As
    previously


    mentioned, reads and writes of encrypted data are more resource-intensive and
    typically take longer to perform. However, the special nature of encrypted data
    has wider-ranging implications than accepting a simple performance hit, and particular
    attention needs to be paid to any activities that involve ordering, filtering,
    or performing joins on encrypted data.'
  trans: "# 第 6 章：加密\n\n## 创建证书与共享对称密钥\n\n接下来，为每个用户创建证书，每个证书使用各自独立的密码：\n\n```sql\n\
    CREATE CERTIFICATE FinanceCertificate\nAUTHORIZATION FinanceUser\nENCRYPTION BY\
    \ PASSWORD = '#F1n4nc3_P455w()rD#'\nWITH SUBJECT = 'Certificate for Finance',\n\
    EXPIRY_DATE = '20101031';\n\nCREATE CERTIFICATE MarketingCertificate\nAUTHORIZATION\
    \ MarketingUser\nENCRYPTION BY PASSWORD = '-+M@Rket1ng-P@s5w0rD!+-'\nWITH SUBJECT\
    \ = 'Certificate for Marketing',\nEXPIRY_DATE = '20101105';\nGO\n```\n\n我们还将创建一个示例表，并授予两个用户对该表的选择与插入权限：\n\
    \n```sql\nCREATE TABLE Confidential (\n    EncryptedData varbinary(255)\n);\n\
    GO\n\nGRANT SELECT, INSERT ON Confidential TO FinanceUser, MarketingUser;\nGO\n\
    ```\n\n现在基础结构已设置好，我们将创建一个共享对称密钥，该密钥将由财务和营销两个证书加密保护。但是，不能直接以此方式创建密钥。我们将首先通过第一个证书保护来创建密钥，然后打开并修改该密钥以添加第二个证书的加密保护：\n\
    \n```sql\n-- 创建受第一个证书保护的对称密钥\nCREATE SYMMETRIC KEY SharedSymKey\nWITH ALGORITHM\
    \ = AES_256\nENCRYPTION BY CERTIFICATE FinanceCertificate;\nGO\n\n-- 然后打开并修改密钥以添加第二个证书的加密保护\n\
    OPEN SYMMETRIC KEY SharedSymKey\nDECRYPTION BY CERTIFICATE FinanceCertificate\n\
    WITH PASSWORD = '#F1n4nc3_P455w()rD#';\n\nALTER SYMMETRIC KEY SharedSymKey\nADD\
    \ ENCRYPTION BY CERTIFICATE MarketingCertificate;\n\nCLOSE SYMMETRIC KEY SharedSymKey;\n\
    GO\n```\n\n最后，我们需要为每个用户授予对该对称密钥的权限：\n\n```sql\nGRANT VIEW DEFINITION ON SYMMETRIC\
    \ KEY::SharedSymKey TO FinanceUser;\nGRANT VIEW DEFINITION ON SYMMETRIC KEY::SharedSymKey\
    \ TO MarketingUser;\nGO\n```\n\n## 加密与解密数据\n\n要使用共享对称密钥加密数据，任一用户必须首先通过指定保护该密钥的证书名称和密码来打开密钥。然后，他们可以使用`ENCRYPTBYKEY`函数，如本章前面所示。以下代码清单展示了`FinanceUser`如何将加密数据插入`Confidential`表，使用共享对称密钥进行加密：\n\
    \n```sql\nEXECUTE AS USER = 'FinanceUser';\n\nOPEN SYMMETRIC KEY SharedSymKey\n\
    DECRYPTION BY CERTIFICATE FinanceCertificate\nWITH PASSWORD = '#F1n4nc3_P455w()rD#';\n\
    \nINSERT INTO Confidential\nSELECT ENCRYPTBYKEY(KEY_GUID(N'SharedSymKey'), N'This\
    \ is shared information\naccessible to finance and marketing');\n\nCLOSE SYMMETRIC\
    \ KEY SharedSymKey;\n\nREVERT;\nGO\n```\n\n要解密此数据，营销用户或财务用户都可以在解密前显式打开`SharedSymKey`密钥，类似于加密时使用的模式，或者他们可以利用`DECRYPTBYKEYAUTOCERT`函数，该函数允许你在执行解密的内联函数中自动打开受证书保护的对称密钥。\n\
    \n为了演示`DECRYPTBYKEYAUTOCERT`函数，以下代码清单展示了`MarketingUser`如何解密由`FinanceUser`插入到`Confidential`表中的值，使用他们自己的证书名称和保护对称密钥的密码来打开共享对称密钥：\n\
    \n```sql\nEXECUTE AS USER = 'MarketingUser';\n\nSELECT\n    CAST(\n        DECRYPTBYKEYAUTOCERT(\n\
    \            CERT_ID(N'MarketingCertificate'),\n            N'-+M@Rket1ng-P@s5w0rD!+-',\n\
    \            EncryptedData)\n        AS nvarchar(255))\nFROM Confidential;\n\n\
    REVERT;\nGO\n```\n\n结果显示，`MarketingUser`可以使用`MarketingCertificate`访问由`FinanceUser`使用共享对称密钥加密的数据：\n\
    \n    This is shared information accessible to finance and marketing\n\n## 扩展混合模型\n\
    \n为了进一步扩展此示例，假设除了存储财务和营销之间共享的加密数据外，`Confidential`表还保存着只应授予财务用户访问权限的数据。使用此处描述的混合模型，这很容易实现——只需创建一个新的对称密钥，由现有的财务证书保护，并授予财务用户对该密钥的权限。\n\
    \n```sql\nCREATE SYMMETRIC KEY FinanceSymKey\nWITH ALGORITHM = AES_256\nENCRYPTION\
    \ BY CERTIFICATE FinanceCertificate;\nGO\n\nGRANT VIEW DEFINITION ON SYMMETRIC\
    \ KEY::FinanceSymKey TO FinanceUser;\nGO\n```\n\n由于这个新的对称密钥使用现有的`FinanceCertificate`进行保护，财务用户可以使用与共享密钥完全相同的语法打开它，并通过向`ENCRYPTBYKEY`方法指定适当的`KEY_GUID`来使用该密钥加密数据：\n\
    \n```sql\nEXECUTE AS USER = 'FinanceUser';\n\nOPEN SYMMETRIC KEY FinanceSymKey\n\
    DECRYPTION BY CERTIFICATE FinanceCertificate\nWITH PASSWORD = '#F1n4nc3_P455w()rD#';\n\
    \nINSERT INTO Confidential\nSELECT ENCRYPTBYKEY(\n    KEY_GUID(N'FinanceSymKey'),\n\
    \    N'This information is only accessible to finance');\n\nCLOSE SYMMETRIC KEY\
    \ FinanceSymKey;\n\nREVERT;\nGO\n```\n\n`Confidential`表现在包含两行数据：一行使用共享对称密钥`SharedSymKey`加密，`MarketingUser`和`FinanceUser`都可以访问；第二行使用`FinanceSymKey`加密，只有`FinanceUser`可以访问。\n\
    \n这种方法的妙处在于，由于某个用户有权访问的所有密钥都由单一证书保护，因此可以使用`DECRYPTBYKEYAUTOCERT`方法解密整列数据，无论单个值是用哪个密钥加密的。\n\
    \n例如，以下代码清单演示了`FinanceUser`如何通过结合使用`DECRYPTBYKEYAUTOCERT`和`FinanceCertificate`来自动解密`EncryptedData`列中的所有值：\n\
    \n```sql\nEXECUTE AS USER = 'FinanceUser';\n\nSELECT\n    CAST(\n        DECRYPTBYKEYAUTOCERT(\n\
    \            CERT_ID(N'FinanceCertificate'),\n            N'#F1n4nc3_P455w()rD#',\n\
    \            EncryptedData\n        ) AS nvarchar(255))\nFROM Confidential;\n\n\
    REVERT;\nGO\n```\n\n结果显示，`FinanceUser`可以使用`DECRYPTBYKEYAUTOCERT`解密由`FinanceSymKey`和`SharedSymKey`加密的值，因为它们都受同一个`FinanceCertificate`保护：\n\
    \n    This is shared information accessible to finance and marketing\n    This\
    \ information is only accessible to finance\n\n如果`MarketingUser`尝试使用`MarketingCertificate`执行完全相同的查询，他们将只能解密那些使用`SharedSymKey`加密的值；尝试解密使用`FinanceSymKey`加密的值的结果将是`NULL`：\n\
    \n```sql\nEXECUTE AS USER = 'MarketingUser';\n\nSELECT\n    CAST(\n        DECRYPTBYKEYAUTOCERT(\n\
    \            CERT_ID(N'MarketingCertificate'),\n            N'-+M@Rket1ng-P@s5w0rD!+-',\n\
    \            EncryptedData) AS nvarchar(255))\nFROM Confidential;\n\nREVERT;\n\
    GO\n```\n\n    This is shared information accessible to finance and marketing\n\
    \    NULL\n\n我希望这已经展示了加密混合模型如何在大多数需要加密的场景中实现安全性与可维护性之间的平衡，以及如何扩展它以应对各种不同的使用场景。\n\
    \n在下一节中，我将向您展示如何针对以此模型保存的加密数据编写高效查询。\n\n## 加密对查询设计的影响\n\n讨论了不同加密架构决策的相对优劣之后，本章剩余部分将重点介绍优化处理加密数据应用程序性能的方法。\n\
    \n加密的安全性总是伴随着相关的性能成本。如前所述，加密数据的读写操作资源消耗更大，通常需要更长时间执行。然而，加密数据的特殊性质带来的影响范围超出了简单的性能下降，需要特别注意任何涉及对加密数据进行排序、筛选或连接的操作。"
- fmt: "# CHAPTER 6 ENCRYPTION\n\nIndexing, sorting, and filtering data relies on\
    \ identifying ordered patterns within that data. Most data can be assigned a logical\
    \ order: for example, `varchar` or `char` data can be arranged alphabetically;\
    \ `datetime` data can be ordered chronologically; and `int`, `decimal`, `float`,\
    \ and `money` data can be arranged in numeric order. The very purpose of encryption,\
    \ however, is to remove any kind of logical pattern that might expose information\
    \ about the underlying data, which makes it very tricky to assign order to encrypted\
    \ data. This creates a number of issues for efficient query design.\n\nTo demonstrate\
    \ these issues, let’s create a table containing some example confidential data.\
    \ The following code listing will create a table and populate it with 100,000\
    \ rows of randomly generated 16-digit numbers, representing dummy credit card\
    \ numbers.\n\nAmong the random data, we will also insert one predetermined value\
    \ representing the credit card number `4005-5500-0000-0019`. It is this known\
    \ value that we will use to test various methods of searching for values within\
    \ encrypted data.\n\n```sql\nCREATE TABLE CreditCards (\n    CreditCardID int\
    \ IDENTITY(1,1) NOT NULL,\n    CreditCardNumber_Plain nvarchar(32)\n);\nGO\n\n\
    WITH RandomCreditCards AS (\n    SELECT\n        CAST(9E+15 * RAND(CHECKSUM(NEWID()))\
    \ + 1E+15 AS bigint) AS CardNumber\n)\nINSERT INTO CreditCards (CreditCardNumber_Plain)\n\
    SELECT TOP 100000\n    CardNumber\nFROM\n    RandomCreditCards,\n    MASTER..spt_values\
    \ a,\n    MASTER..spt_values b\nUNION ALL SELECT\n    '4005550000000019' AS CardNumber;\n\
    GO\n```\n\n**Note** Before you rush out on a spending spree, I regret to inform\
    \ you that the credit card number listed in this example, `4005-5500-0000-0019`,\
    \ is a test card number issued by VISA for testing payment processing systems\
    \ and cannot be used to make purchases. Of course, the 100,000 randomly generated\
    \ rows *might* by chance contain valid credit card details, but good luck finding\
    \ them!\n\nTo protect this information, we’ll follow the hybrid encryption model\
    \ described in the previous section. To do so first requires the creation of a\
    \ certificate encrypted by password:\n\n```sql\nCREATE CERTIFICATE CreditCard_Cert\n\
    ENCRYPTION BY PASSWORD = '#Ch0o53_@_5Tr0nG_P455w0rD#'\nWITH SUBJECT = 'Secure\
    \ Certificate for Credit Card Information',\nEXPIRY_DATE = '20101031';\nGO\n```\n\
    \nand then a symmetric key protected by the certificate:\n\n```sql\nCREATE SYMMETRIC\
    \ KEY CreditCard_SymKey\nWITH ALGORITHM = AES_256\nENCRYPTION BY CERTIFICATE CreditCard_Cert;\n\
    GO\n```\n\nAs we’re only concerned with testing the performance of different methods,\
    \ we won’t bother creating different users with access to the key this time—we’ll\
    \ do everything as the `dbo` user.\n\nTo begin, add a new column to the `CreditCards`\
    \ table, `CreditCardNumber_Sym`, and populate it with values encrypted using the\
    \ `CreditCard_SymKey` symmetric key:\n\n```sql\nALTER TABLE CreditCards ADD CreditCardNumber_Sym\
    \ varbinary(100);\nGO\n\nOPEN SYMMETRIC KEY CreditCard_SymKey\nDECRYPTION BY CERTIFICATE\
    \ CreditCard_Cert\nWITH PASSWORD = '#Ch0o53_@_5Tr0nG_P455w0rD#';\n\nUPDATE CreditCards\n\
    SET CreditCardNumber_Sym =\n    ENCRYPTBYKEY(KEY_GUID('CreditCard_SymKey'),CreditCardNumber_Plain);\n\
    \nCLOSE SYMMETRIC KEY CreditCard_SymKey;\nGO\n```\n\nNow let’s assume that we\
    \ are designing an application that requires searching for specific credit numbers\
    \ that have been encrypted in the `CreditCardNumber_Sym` column. Firstly, let’s\
    \ create an index to support the search:\n\n```sql\nCREATE NONCLUSTERED INDEX\
    \ idxCreditCardNumber_Sym\nON CreditCards (CreditCardNumber_Sym);\nGO\n```\n\n\
    Let’s try performing a simple search against the encrypted data. We’ll search\
    \ for our chosen credit card number by decrypting the `CreditCardNumber_Sym` column\
    \ and comparing the result to the search string:\n\n```sql\nDECLARE @CreditCardNumberToSearch\
    \ nvarchar(32) = '4005550000000019';\n\nSELECT * FROM CreditCards\nWHERE DECRYPTBYKEYAUTOCERT(\n\
    \    CERT_ID('CreditCard_Cert'),\n    N'#Ch0o53_@_5Tr0nG_P455w0rD#',\n    CreditCardNumber_Sym)\
    \ = @CreditCardNumberToSearch;\nGO\n```\n\nA quick glance at the execution plan\
    \ shown in *Figure 6-7* reveals that, despite the index, the query must scan the\
    \ whole table, decrypting each row in order to see if it satisfies the predicate.\n\
    \n*Figure 6-7. A query scan performed on encrypted data*\n\nThe need for a table\
    \ scan is caused by the nondeterministic nature of encrypted data. Since the values\
    \ in the `CreditCard_Sym` column are encrypted, we cannot tell which rows match\
    \ the search criteria without decrypting every value. Nor can we simply encrypt\
    \ the search value `4005550000000019` and search for the corresponding encrypted\
    \ value in the `CreditCard_Sym` column, because the result is nondeterministic\
    \ and will differ every time.\n\nEven though we are using symmetric encryption,\
    \ the faster-performing cell-encryption and -decryption method, the requirement\
    \ to conduct an entire table scan means that the query does not perform well.\
    \ We can obtain a quick measure of the overall performance by inspecting `sys.dm_exec_query_stats`,\
    \ as follows:\n\n```sql\nSELECT\n    st.text,\n    CAST(qs.total_worker_time AS\
    \ decimal(18,9)) / qs.execution_count / 1000\n        AS Avg_CPU_Time_ms,\n  \
    \  qs.total_logical_reads\nFROM\n    sys.dm_exec_query_stats qs\n    CROSS APPLY\
    \ sys.dm_exec_sql_text(qs.plan_handle) st\nWHERE\n    st.text LIKE '%CreditCardNumberToSearch%';\n\
    ```\n\nThe results I obtain are given here:\n\n```\ntext                     \
    \                   Avg_CPU_Time_ms  total_logical_reads\nDECLARE @CreditCardNumberToSearch\
    \ nvarchar(32)\n    = '4005550000000019'; --*SELECT------------- 1389.079    \
    \     71623\n```\n\nThe `SELECT` query is taking nearly 1.5 seconds of CPU time\
    \ to query only 100,000 rows of encrypted data. Also notice that the query text\
    \ contained in the `text` column of `sys.dm_exec_sql_text` is blanked out, as\
    \ it is for all queries that reference encrypted objects.\n\nThe appropriate solution\
    \ to the problem of searching encrypted data differs depending on how the data\
    \ will be queried—whether it will be searched for a single exact matching row\
    \ to the search string (an equality match), a pattern match using a wildcard (i.e.,\
    \ `LIKE %`), or a range search (i.e., using the `BETWEEN`, `>`, or `<` operators).\n\
    \n## Equality Matching Using Hashed Message Authentication Codes\n\nOne method\
    \ to facilitate the efficient searching and filtering of individual rows of encrypted\
    \ data is to make use of hashed message authentication codes (HMACs), which are\
    \ created using a hashing function, as introduced earlier in this chapter. Remember\
    \ that the output of a hashing function is deterministic—any given input will\
    \ always lead to the same output, which is a crucial property to allow encrypted\
    \ data to be efficiently searched for any given search value. Binary hash values\
    \ stored in a database can be indexed, and filtering data can be performed by\
    \ creating the hash value of the search criteria and searching for that value\
    \ in the column containing the precalculated hash values.\n\nHowever, we don’t\
    \ want to store the simple hash of each credit card number as returned by `HASHBYTES`—as\
    \ explained previously, hash values can be attacked using dictionaries or rainbow\
    \ tables, especially if, as in the case of a credit card number, they follow a\
    \ predetermined format. This would weaken the strength of the existing solution\
    \ implemented using symmetric encryption.\n\nHMACs, designed to validate the authenticity\
    \ of a message, overcome this problem by combining a hash function with a secret\
    \ key (salt). By combining the plain text with a strong salt prior to hashing,\
    \ the resulting hash can be made virtually invulnerable to a dictionary attack\
    \ because any lookup would have to combine every possible source value with every\
    \ possible salt value, leading to an unfeasibly large list of possible hash values\
    \ against which a hacker would have to compare.\n\n**Message Authentication Codes**\n\
    \nHMACs are a method of verifying the authenticity of a message to prove that\
    \ it has not been tampered with in transmission. They work like this:\n\n1.  The\
    \ sender and the receiver agree on a secret value, known only to them. For example,\
    \ let’s say that they agree on the word `salt`."
  raw: 'Indexing, sorting, and filtering data relies on identifying ordered patterns
    within that data. Most data can be assigned a logical order: for example, varchar
    or char data can be arranged alphabetically; datetime data can be ordered chronologically;
    and int, decimal, float, and money data can be arranged in numeric order. The
    very purpose of encryption, however, is to remove any kind of logical pattern
    that might expose information about the underlying data, which makes it very tricky
    to assign order to encrypted data. This creates a number of issues for efficient
    query design.


    To demonstrate these issues, let’s create a table containing some example confidential
    data. The following code listing will create a table and populate it with 100,000
    rows of randomly generated 16-digit numbers, representing dummy credit card numbers.


    Among the random data, we will also insert one predetermined value representing
    the credit card number 4005-5500-0000-0019\. It is this known value that we will
    use to test various methods of searching for values within encrypted data.


    CREATE TABLE CreditCards (


    CreditCardID int IDENTITY(1,1) NOT NULL,


    CreditCardNumber_Plain nvarchar(32)


    );


    GO


    WITH RandomCreditCards AS (


    SELECT


    CAST(9E+15 * RAND(CHECKSUM(NEWID())) + 1E+15 AS bigint) AS CardNumber


    )


    INSERT INTO CreditCards (CreditCardNumber_Plain)


    SELECT TOP 100000


    CardNumber


    FROM


    RandomCreditCards,


    MASTER..spt_values a,


    MASTER..spt_values b


    UNION ALL SELECT


    ''4005550000000019'' AS CardNumber;


    GO


    CHAPTER 6 „ ENCRYPTION


    „ **Note** Before you rush out on a spending spree, I regret to inform you that
    the credit card number listed in this example, 4005-5500-0000-0019, is a test
    card number issued by VISA for testing payment processing systems and cannot be
    used to make purchases. Of course, the 100,000 randomly generated rows *might*
    by chance contain valid credit card details, but good luck finding them!


    To protect this information, we’ll follow the hybrid encryption model described
    in the previous section. To do so first requires the creation of a certificate
    encrypted by password:


    CREATE CERTIFICATE CreditCard_Cert


    ENCRYPTION BY PASSWORD = ''#Ch0o53_@_5Tr0nG_P455w0rD#''


    WITH SUBJECT = ''Secure Certificate for Credit Card Information'',


    EXPIRY_DATE = ''20101031'';


    GO


    and then a symmetric key protected by the certificate:


    CREATE SYMMETRIC KEY CreditCard_SymKey


    WITH ALGORITHM = AES_256


    ENCRYPTION BY CERTIFICATE CreditCard_Cert;


    GO


    As we’re only concerned with testing the performance of different methods, we
    won’t bother


    creating different users with access to the key this time—we’ll do everything
    as the dbo user.


    To begin, add a new column to the CreditCards table, CreditCardNumber_Sym, and
    populate it with values encrypted using the CreditCard_SymKey symmetric key:


    ALTER TABLE CreditCards ADD CreditCardNumber_Sym varbinary(100);


    GO


    OPEN SYMMETRIC KEY CreditCard_SymKey


    DECRYPTION BY CERTIFICATE CreditCard_Cert


    WITH PASSWORD = ''#Ch0o53_@_5Tr0nG_P455w0rD#'';


    UPDATE CreditCards


    SET CreditCardNumber_Sym =


    ENCRYPTBYKEY(KEY_GUID(''CreditCard_SymKey''),CreditCardNumber_Plain);


    CLOSE SYMMETRIC KEY CreditCard_SymKey;


    GO


    Now let’s assume that we are designing an application that requires searching
    for specific credit numbers that have been encrypted in the CreditCardNumber_Sym
    column. Firstly, let’s create an index to support the search:


    CREATE NONCLUSTERED INDEX idxCreditCardNumber_Sym


    ON CreditCards (CreditCardNumber_Sym);


    GO


    CHAPTER 6 „ ENCRYPTION


    Let’s try performing a simple search against the encrypted data. We’ll search
    for our chosen credit card number by decrypting the CreditCardNumber_Sym column
    and comparing the result to the search string:


    DECLARE @CreditCardNumberToSearch nvarchar(32) = ''4005550000000019'';


    SELECT * FROM CreditCards


    WHERE DECRYPTBYKEYAUTOCERT(


    CERT_ID(''CreditCard_Cert''),


    N''#Ch0o53_@_5Tr0nG_P455w0rD#'',


    CreditCardNumber_Sym) = @CreditCardNumberToSearch;


    GO


    A quick glance at the execution plan shown in Figure 6-7 reveals that, despite
    the index, the query must scan the whole table, decrypting each row in order to
    see if it satisfies the predicate.


    *Figure 6-7\. A query scan performed on encrypted data*


    The need for a table scan is caused by the nondeterministic nature of encrypted
    data. Since the values in the CreditCard_Sym column are encrypted, we cannot tell
    which rows match the search criteria without decrypting every value. Nor can we
    simply encrypt the search value 4005550000000019 and search for the corresponding
    encrypted value in the CreditCard_Sym column, because the result is nondeterministic
    and will differ every time.


    Even though we are using symmetric encryption, the faster-performing cell-encryption
    and -


    decryption method, the requirement to conduct an entire table scan means that
    the query does not perform well. We can obtain a quick measure of the overall
    performance by inspecting


    sys.dm_exec_query_stats, as follows:


    SELECT


    st.text,


    CAST(qs.total_worker_time AS decimal(18,9)) / qs.execution_count / 1000


    AS Avg_CPU_Time_ms,


    qs.total_logical_reads


    FROM


    sys.dm_exec_query_stats qs


    CROSS APPLY sys.dm_exec_sql_text(qs.plan_handle) st


    WHERE


    st.text LIKE ''%CreditCardNumberToSearch%'';


    The results I obtain are given here:


    CHAPTER 6 „ ENCRYPTION


    text Avg_CPU_Time_ms total_logical_reads


    DECLARE @CreditCardNumberToSearch nvarchar(32)


    = ''4005550000000019''; --*SELECT------------- 1389.079 71623


    The SELECT query is taking nearly 1.5 seconds of CPU time to query only 100,000
    rows of encrypted data. Also notice that the query text contained in the text
    column of sys.dm_exec_sql_text is blanked out, as it is for all queries that reference
    encrypted objects.


    The appropriate solution to the problem of searching encrypted data differs depending
    on how the data will be queried—whether it will be searched for a single exact
    matching row to the search string (an equality match), a pattern match using a
    wildcard ( i.e., LIKE %), or a range search (i.e., using the BETWEEN,


    >, or < operators).


    Equality Matching Using Hashed Message


    Authentication Codes


    One method to facilitate the efficient searching and filtering of individual rows
    of encrypted data is to make use of hashed message authentication codes (HMACs),
    which are created using a hashing


    function, as introduced earlier in this chapter. Remember that the output of a
    hashing function is deterministic—any given input will always lead to the same
    output, which is a crucial property to allow encrypted data to be efficiently
    searched for any given search value. Binary hash values stored in a database can
    be indexed, and filtering data can be performed by creating the hash value of
    the search criteria and searching for that value in the column containing the
    precalculated hash values.


    However, we don’t want to store the simple hash of each credit card number as
    returned by


    HASHBYTES—as explained previously, hash values can be attacked using dictionaries
    or rainbow tables, especially if, as in the case of a credit card number, they
    follow a predetermined format. This would weaken the strength of the existing
    solution implemented using symmetric encryption.


    HMACs, designed to validate the authenticity of a message, overcome this problem
    by combining a hash function with a secret key (salt). By combining the plain
    text with a strong salt prior to hashing, the resulting hash can be made virtually
    invulnerable to a dictionary attack because any lookup would have to combine every
    possible source value with every possible salt value, leading to an unfeasibly
    large list of possible hash values against which a hacker would have to compare.


    **Message Authentication Codes**


    HMACs are a method of verifying the authenticity of a message to prove that it
    has not been tampered with in transmission. They work like this:


    1\. The sender and the receiver agree on a secret value, known only to them. For
    example, let’s say that they agree on the word salt.'
  trans: "\n# 第 6 章 加密\n\n索引、排序和筛选数据依赖于识别数据内部的有序模式。大多数数据可以被赋予逻辑顺序：例如，`varchar` 或 `char`\
    \ 数据可以按字母顺序排列；`datetime` 数据可以按时间顺序排列；而 `int`、`decimal`、`float` 和 `money` 数据可以按数字顺序排列。然而，加密的根本目的正是要消除任何可能暴露底层数据信息的逻辑模式，这就使得为加密数据分配顺序变得非常棘手。这给高效的查询设计带来了一些问题。\n\
    \n为了演示这些问题，让我们创建一个包含一些示例机密数据的表。下面的代码清单将创建一个表并填充 100,000 行随机生成的 16 位数字，代表虚拟信用卡号。\n\
    \n在随机数据中，我们还将插入一个预定值，代表信用卡号 `4005-5500-0000-0019`。我们将使用这个已知值来测试在加密数据中搜索值的各种方法。\n\
    \n```sql\nCREATE TABLE CreditCards (\n    CreditCardID int IDENTITY(1,1) NOT NULL,\n\
    \    CreditCardNumber_Plain nvarchar(32)\n);\nGO\n\nWITH RandomCreditCards AS\
    \ (\n    SELECT\n        CAST(9E+15 * RAND(CHECKSUM(NEWID())) + 1E+15 AS bigint)\
    \ AS CardNumber\n)\nINSERT INTO CreditCards (CreditCardNumber_Plain)\nSELECT TOP\
    \ 100000\n    CardNumber\nFROM\n    RandomCreditCards,\n    MASTER..spt_values\
    \ a,\n    MASTER..spt_values b\nUNION ALL SELECT\n    '4005550000000019' AS CardNumber;\n\
    GO\n```\n\n**注意** 在您冲出去疯狂购物之前，我很遗憾地告诉您，本示例中列出的信用卡号 `4005-5500-0000-0019` 是 VISA\
    \ 用于测试支付处理系统的测试卡号，不能用于购买商品。当然，那 100,000 行随机生成的数据*可能*碰巧包含有效的信用卡详细信息，但祝您好运能找到它们！\n\
    \n为了保护这些信息，我们将遵循前一节描述的混合加密模型。为此，首先需要创建一个由密码加密的证书：\n\n```sql\nCREATE CERTIFICATE\
    \ CreditCard_Cert\nENCRYPTION BY PASSWORD = '#Ch0o53_@_5Tr0nG_P455w0rD#'\nWITH\
    \ SUBJECT = 'Secure Certificate for Credit Card Information',\nEXPIRY_DATE = '20101031';\n\
    GO\n```\n\n然后创建一个由该证书保护的对称密钥：\n\n```sql\nCREATE SYMMETRIC KEY CreditCard_SymKey\n\
    WITH ALGORITHM = AES_256\nENCRYPTION BY CERTIFICATE CreditCard_Cert;\nGO\n```\n\
    \n由于我们只关心测试不同方法的性能，这次我们不必费心创建具有密钥访问权限的不同用户——我们将以 `dbo` 用户身份完成所有操作。\n\n首先，向 `CreditCards`\
    \ 表添加一个新列 `CreditCardNumber_Sym`，并使用 `CreditCard_SymKey` 对称密钥加密的值来填充它：\n\n```sql\n\
    ALTER TABLE CreditCards ADD CreditCardNumber_Sym varbinary(100);\nGO\n\nOPEN SYMMETRIC\
    \ KEY CreditCard_SymKey\nDECRYPTION BY CERTIFICATE CreditCard_Cert\nWITH PASSWORD\
    \ = '#Ch0o53_@_5Tr0nG_P455w0rD#';\n\nUPDATE CreditCards\nSET CreditCardNumber_Sym\
    \ =\n    ENCRYPTBYKEY(KEY_GUID('CreditCard_SymKey'),CreditCardNumber_Plain);\n\
    \nCLOSE SYMMETRIC KEY CreditCard_SymKey;\nGO\n```\n\n现在，假设我们正在设计一个需要搜索 `CreditCardNumber_Sym`\
    \ 列中已加密的特定信用卡号的应用程序。首先，让我们创建一个索引来支持搜索：\n\n```sql\nCREATE NONCLUSTERED INDEX idxCreditCardNumber_Sym\n\
    ON CreditCards (CreditCardNumber_Sym);\nGO\n```\n\n让我们尝试对加密数据执行一个简单的搜索。我们将通过解密\
    \ `CreditCardNumber_Sym` 列并将结果与搜索字符串进行比较来搜索我们选定的信用卡号：\n\n```sql\nDECLARE @CreditCardNumberToSearch\
    \ nvarchar(32) = '4005550000000019';\n\nSELECT * FROM CreditCards\nWHERE DECRYPTBYKEYAUTOCERT(\n\
    \    CERT_ID('CreditCard_Cert'),\n    N'#Ch0o53_@_5Tr0nG_P455w0rD#',\n    CreditCardNumber_Sym)\
    \ = @CreditCardNumberToSearch;\nGO\n```\n\n快速浏览一下*图 6-7* 所示的执行计划就会发现，尽管存在索引，但查询必须扫描整个表，解密每一行以查看它是否满足谓词条件。\n\
    \n*图 6-7. 在加密数据上执行的查询扫描*\n\n需要全表扫描的原因在于加密数据的非确定性本质。由于 `CreditCard_Sym` 列中的值是加密的，我们无法在不解密每个值的情况下判断哪些行匹配搜索条件。我们也不能简单地加密搜索值\
    \ `4005550000000019` 并在 `CreditCard_Sym` 列中搜索相应的加密值，因为结果是非确定性的，每次都会不同。\n\n即使我们使用的是对称加密（更快的单元格加密和解密方法），但需要进行整个表扫描意味着该查询的性能不佳。我们可以通过检查\
    \ `sys.dm_exec_query_stats` 来快速评估整体性能，如下所示：\n\n```sql\nSELECT\n    st.text,\n\
    \    CAST(qs.total_worker_time AS decimal(18,9)) / qs.execution_count / 1000\n\
    \        AS Avg_CPU_Time_ms,\n    qs.total_logical_reads\nFROM\n    sys.dm_exec_query_stats\
    \ qs\n    CROSS APPLY sys.dm_exec_sql_text(qs.plan_handle) st\nWHERE\n    st.text\
    \ LIKE '%CreditCardNumberToSearch%';\n```\n\n我得到的结果如下：\n\n```\ntext          \
    \                              Avg_CPU_Time_ms  total_logical_reads\nDECLARE @CreditCardNumberToSearch\
    \ nvarchar(32)\n    = '4005550000000019'; --*SELECT------------- 1389.079    \
    \     71623\n```\n\n该 `SELECT` 查询仅查询 100,000 行加密数据就花费了近 1.5 秒的 CPU 时间。另请注意，`sys.dm_exec_sql_text`\
    \ 的 `text` 列中包含的查询文本被清空了，所有引用加密对象的查询都是如此。\n\n解决加密数据搜索问题的适当解决方案因数据的查询方式而异——无论是搜索与搜索字符串完全匹配的单行（相等匹配）、使用通配符的模式匹配（即\
    \ `LIKE %`），还是范围搜索（即使用 `BETWEEN`、`>` 或 `<` 运算符）。\n\n## 使用哈希消息认证码进行相等匹配\n\n一种促进高效搜索和过滤加密数据单行的方法是利用哈希消息认证码，它是由哈希函数创建的，如本章前面所述。请记住，哈希函数的输出是确定性的——任何给定的输入总是导致相同的输出，这是允许对加密数据高效搜索任何给定搜索值的关键属性。存储在数据库中的二进制哈希值可以被索引，并且可以通过创建搜索条件的哈希值并在包含预计算哈希值的列中搜索该值来执行数据过滤。\n\
    \n但是，我们不想存储由 `HASHBYTES` 返回的每个信用卡号的简单哈希值——如前所述，哈希值可以使用字典或彩虹表进行攻击，特别是当它们（如信用卡号的情况）遵循预定格式时。这将削弱使用对称加密实现的现有解决方案的强度。\n\
    \nHMAC 设计用于验证消息的真实性，它通过将哈希函数与密钥（盐值）结合来克服这个问题。通过在哈希前将明文与强盐值组合，得到的哈希值几乎可以免疫字典攻击，因为任何查找都必须将每个可能的源值与每个可能的盐值组合，从而产生一个黑客必须与之比较的、不可行的庞杂可能哈希值列表。\n\
    \n**消息认证码**\n\nHMAC 是一种验证消息真实性以证明其在传输过程中未被篡改的方法。其工作原理如下：\n\n1.  发送方和接收方约定一个只有他们知道的秘密值。例如，假设他们约定单词\
    \ `salt`。\n"
- fmt: "## CHAPTER 6 „ ENCRYPTION\n\n2.  When the sender creates their message, they\
    \ append the secret value onto the end of the message. They then create a hash\
    \ of the combined message with the salt value:\n    `HMAC = HASH( “This is the\
    \ original message” + “salt”)`\n3.  The sender transmits the original message\
    \ to the receiver, together with the `HMAC`.\n4.  When the receiver receives the\
    \ message, they append the agreed salt value to the received message, and then\
    \ hash the result themselves. They then check to make sure that the result is\
    \ the same as the supplied `HMAC` value.\n\n`HMAC`s are a relatively simple but\
    \ very effective method of ensuring that messages can be verified as authentic\
    \ by the intended receiver. If somebody had attempted to intercept and tamper\
    \ with the message, it would no longer match the supplied `HMAC` value. Nor could\
    \ the attacker generate a new matching `HMAC` value, as they would not know the\
    \ secret salt that had to be applied.\n\nThe first step toward implementing an\
    \ `HMAC`-based solution is to define a secure way of storing the salt value (or\
    \ `key`). For the purpose of this example, we’ll store the salt in a separate\
    \ table and encrypt it using a secure asymmetric key.\n\n```sql\nCREATE ASYMMETRIC\
    \ KEY HMACASymKey\nWITH ALGORITHM = RSA_1024\nENCRYPTION BY PASSWORD = N'4n0th3r_5tr0ng_K4y!';\n\
    GO\n\nCREATE TABLE HMACKeys (\n    HMACKeyID int PRIMARY KEY,\n    HMACKey varbinary(255)\n\
    );\nGO\n\nINSERT INTO HMACKeys\nSELECT\n    1,\n    ENCRYPTBYASYMKEY(ASYMKEY_ID(N'HMACASymKey'),\
    \ N'-->Th15_i5_Th3_HMAC_kEy!');\nGO\n```\n\nNow we can create an `HMAC` value\
    \ based on the key. You could create a simple `HMAC` in `T-SQL` by simply using\
    \ `HASHBYTES` with the salt value appended onto the original message, as follows:\n\
    \n```sql\nDECLARE @HMAC varbinary(max) = HASHBYTES('SHA1', 'PlainText' + 'Salt')\n\
    ```\n\nHowever, there are a number of ways in which this method could be improved:\n\
    \n*   The `HASHBYTES` function only creates a hash based on the first 8000 bytes\
    \ of any input. If the message length equals or exceeds this value, then any salt\
    \ value appended after the message content will be disregarded. It would therefore\
    \ be better to supply the salt value first, and *then* the message to be hashed.\n\
    *   The `HMAC` specification, as defined by the Federal Information Processing\
    \ Standard (`FIPS PUB 198`, `http://csrc.nist.gov/publications/fips/fips198/fips-198a.pdf`),\
    \ actually hashes the plain text value twice, as follows:\n    `HMAC = HASH(Key1\
    \ + HASH(Key2 + PlainText))`\n    According to the `FIPS` standard, `Key1` and\
    \ `Key2` are calculated by padding the supplied salt value to the size of the\
    \ block size of the hash function keys. `Key1` is padded with the byte `0x5c`\
    \ and `Key2` is padded with the byte `0x36`. These two values are deliberately\
    \ chosen to have a large `hamming distance`—that is, the resulting padded keys\
    \ will be significantly different from each other, so that the strengthening effect\
    \ of hashing with both keys is maximized.\n*   The `HMAC` standard does not specify\
    \ which hashing algorithm is used to perform the hashing, but the strength of\
    \ the resulting `HMAC` is directly linked to the cryptographic strength of the\
    \ underlying hash function on which it is based. The `HASHBYTES` function only\
    \ supports hashing using the `MD2`, `MD4`, `MD5`, `SHA`, and `SHA1` algorithms.\
    \ The hashing methods provided by the `.NET Framework`, in contrast, support the\
    \ more secure `SHA2` family of algorithms, and also the 160-bit `RIPEMD160` algorithm.\n\
    \nIt seems that `SQL Server`’s basic `HASHBYTES` function leaves a little bit\
    \ to be desired, but fortunately there is an easy solution. In order to create\
    \ an `HMAC` compliant with the `FIPS` standard, based on a strong hashing algorithm,\
    \ we can employ a `CLR` user-defined function that uses methods provided by the\
    \ `.NET` `System.Security` namespace instead. The following code listing illustrates\
    \ the `C#` required to create a reusable class that can be used to generate `HMAC`\
    \ values for all supported hash algorithms for a given key:\n\n```csharp\n[SqlFunction(IsDeterministic\
    \ = true, DataAccess = DataAccessKind.None)]\npublic static SqlBytes GenerateHMAC\n\
    (\n    SqlString Algorithm,\n    SqlBytes PlainText,\n    SqlBytes Key\n)\n{\n\
    ```"
