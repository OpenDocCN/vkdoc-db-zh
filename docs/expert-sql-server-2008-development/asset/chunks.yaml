  trans: '

    两者都是可选的，但如果你包含了连字符，则**必须**同时包含 `T`。


    `datetime`、`datetime2`、`smalldatetime` 和 `datetimeoffset` 数据类型同时存储日期和时间部分，而 `date`
    和 `time` 数据类型则分别只存储日期或时间。然而，需要注意的一个重要点是，无论使用何种数据类型，任何输入的时间和日期元素都是可选的。如果为记录时间成分的数据类型未提供时间部分，SQL
    Server 将使用午夜作为默认值；如果为记录日期成分的数据类型未在输入中指定日期部分，SQL Server 将使用 1900 年 1 月 1 日。类似地，如果为
    `date` 数据类型提供了时间成分作为输入，或者为 `time` 数据类型提供了日期，该值将被简单地忽略。


    以下每一种都是有效、明确的日期/时间格式，可用于为任何时间数据类型提供输入：


    ```

    --无分隔符的日期和时间

    20090501 13:45:03


    --带连字符的日期，并用 T 指定时间 (ISO 8601)

    2009-05-01T13:45:03


    --仅日期

    20090501


    --仅时间

    13:45:03

    ```


    ### 注意


    如果你选择在 ISO 8601 格式中使用连字符分隔年、月、日值，则**必须**在时间部分之前包含 `T` 字符。为了演示此字符的重要性，请比较以下结果：


    ```

    SET LANGUAGE British;

    SELECT CAST(''2003-12-09 00:00:00'' AS datetime), CAST(''2003-12-09T00:00:00''
    AS datetime).

    ```


    始终使用前述格式之一——并始终确保客户端按该格式发送日期——你可以确保 SQL Server 将始终使用正确的日期。


    请记住，SQL Server 不存储原始的输入日期字符串；日期会被转换并以二进制格式在内部存储。因此，如果无效的日期最终进入了数据库，将无法仅从数据中将其还原。


    不幸的是，在数据到达数据库之前，总是不一定能使其恰好处于正确的格式。SQL Server 提供了两种主要机制，可在处理非标准日期/时间格式时提供帮助：一是对
    `CONVERT` 函数的扩展，允许指定日期“样式”；二是称为 `DATEFORMAT` 的运行时设置。


    要使用 `CONVERT` 从非标准日期创建日期/时间数据实例，请使用该函数的第三个参数来指定日期的格式。以下代码块展示了如何为英式/法式和美式样式创建日期：


    ```

    --英式/法式风格

    SELECT CONVERT(date, ''01/02/2003'', 103);


    --美式风格

    SELECT CONVERT(date, ''01/02/2003'', 101);

    ```


    样式 `103` 生成日期“2003 年 2 月 1 日”，而样式 `101` 生成日期“2003 年 1 月 2 日”。通过使用这些样式，你可以更轻松地控制日期/时间输入的处理方式，并明确告知
    SQL Server 如何处理输入字符串。文档中记录了 20 多种不同的样式；有关完整列表，请参阅 SQL Server 2008 联机丛书中主题“`CAST`
    和 `CONVERT` (Transact-SQL)”。


    另一个常用于控制输入日期字符串格式的选项是 `DATEFORMAT` 设置。`DATEFORMAT` 允许你使用说明符 `D`、`M` 和 `Y` 来指定日、月、年在输入日期格式中出现的顺序。以下
    T-SQL 等效于前面使用 `CONVERT` 的示例：


    ```

    --英式/法式风格

    SET DATEFORMAT DMY;

    SELECT CONVERT(date, ''01/02/2003'');


    --美式风格

    SET DATEFORMAT MDY;

    SELECT CONVERT(date, ''01/02/2003'');

    ```


    使用 `DATEFORMAT` 和 `CONVERT` 来纠正非标准输入之间其实没有太大区别。`DATEFORMAT` 在某些情况下可能更简洁，因为它只需要为每个连接指定一次，但
    `CONVERT` 由于可用的样式更多，提供了略多的控制。最终，你应该选择能使你正在处理的特定代码更易于阅读、测试和维护的选项。

    '
- fmt: "# CHAPTER 11 - WORKING WITH TEMPORAL DATA\n\n`Note` Using `SET DATEFORMAT`\
    \ within a stored procedure will cause a recompile to occur whenever the procedure\
    \ is executed. This may cause a performance problem in some cases, so make sure\
    \ to test carefully before deploying solutions to production environments.\n\n\
    ## Output Date Formatting\n\nThe `CONVERT` function is not only useful for specification\
    \ of input date/time string formats. It is also commonly used to format dates\
    \ for output.\n\nBefore continuing, I feel that a quick disclaimer is in order:\
    \ it’s generally not a good idea to do formatting work in the database. By formatting\
    \ dates into strings in the data layer, you may reduce the ease with which stored\
    \ procedures can be reused. This is because it may force applications that require\
    \ differing date/time formats to convert the strings back into native date/time\
    \ objects, and then reformat them as strings again. Such additional work on the\
    \ part of the application is probably unnecessary, and there are very few occasions\
    \ in which it really makes sense to send dates back to an application formatted\
    \ as strings. One example that springs to mind is when doing data binding to a\
    \ grid or other object that doesn’t support the date format you need—but that\
    \ is a rare situation.\n\nJust like when working with input formatting, the main\
    \ T-SQL function used for date/time output formatting is `CONVERT`. The same set\
    \ of styles that can be used for input can also be used for output formats; the\
    \ only difference is that the function is converting from an instance of a date/time\
    \ type into a string, rather than the other way around. The following T-SQL shows\
    \ how to format the current date as a string in both US and British/French styles:\n\
    \n```sql\n--British/French style\nSELECT CONVERT(varchar(50), GETDATE(), 103);\n\
    \n--US style\nSELECT CONVERT(varchar(50), GETDATE(), 101);\n```\n\nThe set of\
    \ styles available for the `CONVERT` function is somewhat limited, and may not\
    \ be enough for all situations. Fortunately, SQL Server’s CLR integration provides\
    \ a solution to this problem. The .NET `System.DateTime` class includes extremely\
    \ flexible string-formatting capabilities that can be harnessed using a CLR scalar\
    \ user-defined function (UDF). The following method exposes the necessary functionality:\n\
    \n```csharp\npublic static SqlString FormatDate(\n    SqlDateTime Date,\n    SqlString\
    \ FormatString)\n{\n    DateTime theDate = Date.Value;\n    return new SqlString(theDate.ToString(FormatString.ToString()));\n\
    }\n```\n\nThis UDF converts the `SqlDateTime` instance into an instance of `System.DateTime`,\
    \ and then uses the overloaded `ToString` method to format the date/time as a\
    \ string. The method accepts a wide array of formatting directives, all of which\
    \ are fully documented in the Microsoft MSDN Library. As a quick example, the\
    \ following invocation of the method formats the current date/time with the month\
    \ part first, followed by a four-digit year, and finally the day: `SELECT dbo.FormatDate(GETDATE(),\
    \ 'MM yyyy dd');`\n\nKeep in mind that the `ToString` method’s formatting overload\
    \ is case sensitive. `MM`, for instance, is not the same as `mm`, and you may\
    \ get unexpected results if you are not careful.\n\n## Efficiently Querying Date/Time\
    \ Columns\n\nKnowing how to format dates for input and output is a good first\
    \ step, but the real goal of any database system is to allow the user to query\
    \ the data to answer business questions. Querying date/time data in SQL Server\
    \ has some interesting pitfalls, but for the most part they’re easily avoidable\
    \ if you understand how the DBMS treats temporal data.\n\nTo start things off,\
    \ create the following table:\n\n```sql\nCREATE TABLE VariousDates\n(\n    ADate\
    \ datetime NOT NULL,\n    PRIMARY KEY (ADate) WITH (IGNORE_DUP_KEY = ON)\n);\n\
    GO\n```\n\nNow we’ll insert some data into the table. The following T-SQL will\
    \ insert 85,499 rows into the table, with dates spanning from February through\
    \ November of 2010:\n\n```sql\nWITH Numbers\nAS\n(\n    SELECT DISTINCT number\n\
    \    FROM master..spt_values\n    WHERE number BETWEEN 1001 AND 1256\n)\nINSERT\
    \ INTO VariousDates ( ADate )\nSELECT\n    CASE x.n\n        WHEN 1 THEN\n```"
  raw: '„ **Note** Using SET DATEFORMAT within a stored procedure will cause a recompile
    to occur whenever the procedure is executed. This may cause a performance problem
    in some cases, so make sure to test carefully before deploying solutions to production
    environments.


    Output Date Formatting


    The CONVERT function is not only useful for specification of input date/time string
    formats. It is also commonly used to format dates for output.


    Before continuing, I feel that a quick disclaimer is in order: it’s generally
    not a good idea to do formatting work in the database. By formatting dates into
    strings in the data layer, you may reduce the ease with which stored procedures
    can be reused. This is because it may force applications that require differing
    date/time formats to convert the strings back into native date/time objects, and
    then reformat them as strings again. Such additional work on the part of the application
    is probably unnecessary, and there are very few occasions in which it really makes
    sense to send dates back to an application formatted as strings. One example that
    springs to mind is when doing data binding to a grid or other object that doesn’t
    support the date format you need—but that is a rare situation.


    Just like when working with input formatting, the main T-SQL function used for
    date/time output formatting is CONVERT. The same set of styles that can be used
    for input can also be used for output formats; the only difference is that the
    function is converting from an instance of a date/time type into a string, rather
    than the other way around. The following T-SQL shows how to format the current
    date as a string in both US and British/French styles:


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    --British/French style


    SELECT CONVERT(varchar(50), GETDATE(), 103);


    --US style


    SELECT CONVERT(varchar(50), GETDATE(), 101);


    The set of styles available for the CONVERT function is somewhat limited, and
    may not be enough for all situations. Fortunately, SQL Server’s CLR integration
    provides a solution to this problem. The .NET


    System.DateTime class includes extremely flexible string-formatting capabilities
    that can be harnessed using a CLR scalar user-defined function (UDF). The following
    method exposes the necessary


    functionality:


    public static SqlString FormatDate(


    SqlDateTime Date,


    SqlString FormatString)


    {


    DateTime theDate = Date.Value;


    return new SqlString(theDate.ToString(FormatString.ToString()));


    }


    This UDF converts the SqlDateTime instance into an instance of System.DateTime,
    and then uses the overloaded ToString method to format the date/time as a string.
    The method accepts a wide array of formatting directives, all of which are fully
    documented in the Microsoft MSDN Library. As a quick example, the following invocation
    of the method formats the current date/time with the month part first, followed
    by a four-digit year, and finally the day:


    SELECT dbo.FormatDate(GETDATE(), ''MM yyyy dd'');


    Keep in mind that the ToString method’s formatting overload is case sensitive.
    MM, for instance, is not the same as mm, and you may get unexpected results if
    you are not careful.


    Efficiently Querying Date/Time Columns


    Knowing how to format dates for input and output is a good first step, but the
    real goal of any database system is to allow the user to query the data to answer
    business questions. Querying date/time data in SQL Server has some interesting
    pitfalls, but for the most part they’re easily avoidable if you understand how
    the DBMS treats temporal data.


    To start things off, create the following table:


    CREATE TABLE VariousDates


    (


    ADate datetime NOT NULL,


    PRIMARY KEY (ADate) WITH (IGNORE_DUP_KEY = ON)


    );


    GO


    Now we’ll insert some data into the table. The following T-SQL will insert 85,499
    rows into the table, with dates spanning from February through November of 2010:


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    WITH Numbers


    AS


    (


    SELECT DISTINCT number


    FROM master..spt_values


    WHERE number BETWEEN 1001 AND 1256


    )


    INSERT INTO VariousDates ( ADate )


    SELECT


    CASE x.n


    WHEN 1 THEN'
  trans: "# 第 11 章 处理时间数据\n\n`注意` 在存储过程中使用 `SET DATEFORMAT` 会导致每次执行该过程时都发生重新编译。这在某些情况下可能会引发性能问题，因此在将解决方案部署到生产环境之前，请务必进行仔细测试。\n\
    \n## 输出日期格式化\n\n`CONVERT` 函数不仅可用于指定输入的日期/时间字符串格式，它也常用于格式化日期以供输出。\n\n在继续之前，我觉得有必要快速声明一点：在数据库中进行格式化工作通常不是个好主意。通过在数据层将日期格式化为字符串，你可能会降低存储过程的可重用性。因为这可能会迫使需要不同日期/时间格式的应用程序将字符串转换回本机日期/时间对象，然后再将其重新格式化为字符串。应用程序方面这种额外的工作很可能没有必要，而且真正需要以字符串格式将日期发送回应用程序的情况少之又少。我能想到的一个例子是在进行数据绑定到网格或其他不支持所需日期格式的对象时——但这种情况很少见。\n\
    \n与处理输入格式化时一样，用于日期/时间输出格式化的主要 T-SQL 函数也是 `CONVERT`。可用于输入的同样一组样式代码，也可用于输出格式；唯一的区别是该函数是从日期/时间类型的实例转换为字符串，而不是相反。以下\
    \ T-SQL 展示了如何将当前日期格式化为美式和英式/法式风格的字符串：\n\n```sql\n--英式/法式风格\nSELECT CONVERT(varchar(50),\
    \ GETDATE(), 103);\n\n--美式风格\nSELECT CONVERT(varchar(50), GETDATE(), 101);\n```\n\
    \n`CONVERT` 函数可用的样式集有些有限，可能不足以应对所有情况。幸运的是，SQL Server 的 CLR 集成为此问题提供了解决方案。.NET\
    \ 的 `System.DateTime` 类包含了极其灵活的字符串格式化功能，可以通过 CLR 标量用户定义函数（UDF）来利用。以下方法公开了必要的功能：\n\
    \n```csharp\npublic static SqlString FormatDate(\n    SqlDateTime Date,\n    SqlString\
    \ FormatString)\n{\n    DateTime theDate = Date.Value;\n    return new SqlString(theDate.ToString(FormatString.ToString()));\n\
    }\n```\n\n此 UDF 将 `SqlDateTime` 实例转换为 `System.DateTime` 的实例，然后使用重载的 `ToString`\
    \ 方法将日期/时间格式化为字符串。该方法接受广泛的格式化指令，所有这些指令在微软 MSDN 库中都有完整记录。作为一个快速示例，以下方法调用将当前日期/时间格式化为月在前，然后是四位数的年份，最后是日：`SELECT\
    \ dbo.FormatDate(GETDATE(), 'MM yyyy dd');`\n\n请记住，`ToString` 方法的格式化重载是区分大小写的。例如，`MM`\
    \ 和 `mm` 不同，如果不小心，可能会得到意想不到的结果。\n\n## 高效查询日期/时间列\n\n知道如何格式化输入和输出日期是良好的第一步，但任何数据库系统的真正目标是允许用户查询数据以解答业务问题。在\
    \ SQL Server 中查询日期/时间数据有一些有趣的陷阱，但如果你理解 DBMS 如何处理时间数据，这些陷阱在大多数情况下都很容易避免。\n\n首先，创建下表：\n\
    \n```sql\nCREATE TABLE VariousDates\n(\n    ADate datetime NOT NULL,\n    PRIMARY\
    \ KEY (ADate) WITH (IGNORE_DUP_KEY = ON)\n);\nGO\n```\n\n现在，我们将向表中插入一些数据。以下 T-SQL\
    \ 将向表中插入 85,499 行，日期范围从 2010 年 2 月到 11 月：\n\n```sql\nWITH Numbers\nAS\n(\n   \
    \ SELECT DISTINCT number\n    FROM master..spt_values\n    WHERE number BETWEEN\
    \ 1001 AND 1256\n)\nINSERT INTO VariousDates ( ADate )\nSELECT\n    CASE x.n\n\
    \        WHEN 1 THEN\n```"
- fmt: "# 第11章 处理时态数据\n\n## SQL 查询示例\n\n```sql\nDATEADD(millisecond,\n    POWER(a.number,\
    \ 2) * b.number,\n    DATEADD(day, a.number-1000, '20100201'))\nWHEN 2 THEN\n\
    DATEADD(millisecond,\n    b.number-1001,\n    DATEADD(day, a.number-1000, '20100213'))\n\
    END\nFROM Numbers a, Numbers b\nCROSS JOIN\n(\n    SELECT 1\n    UNION ALL\n \
    \   SELECT 2\n) x (n);\nGO\n```\n\n## 查询数据与最小日期\n\n数据插入后，下一个合乎逻辑的步骤自然是查询它。你可能首先想问“表中的最小日期值是多少？”以下查询使用`MIN`聚合函数来回答这个问题：\n\
    \n```sql\nSELECT MIN(ADate)\nFROM VariousDates;\nGO\n```\n\n这个查询返回一行，值为`2010-02-13\
    \ 14:36:43.000`。但或许你想知道表中还有哪些来自`2010`年`2`月`13`日的时间。第一次尝试这个查询可能如下：\n\n```sql\n\
    SELECT *\nFROM VariousDates\nWHERE ADate = '20100213';\nGO\n```\n\n如果你运行这个查询，可能会惊讶地发现，返回的并不是`2010`年`2`月`13`日的所有行，而是零行。原因在于`ADate`列使用的是`datetime`类型，如前所述，它同时包含日期和时间部分。当此查询被评估，且搜索参数`ADate\
    \ = '20100213'`被处理时，SQL Server 看到`datetime`类型的`ADate`列正与`varchar`字符串`'20100213'`进行比较。根据SQL\
    \ Server的数据类型优先级规则，该字符串在比较前会被转换为`datetime`；由于该字符串不包含时间部分，因此使用默认时间`00:00:00.000`。要查看此转换过程，请尝试以下T-SQL：\n\
    \n```sql\nSELECT CONVERT(datetime, '20100213');\nGO\n```\n\n当此代码运行时，会自动添加默认时间部分，此`SELECT`语句的输出为值`2010-02-13\
    \ 00:00:00.000`。显然，基于此字符串与`datetime`类型之间隐式转换的查询是无效的——除非你只想要午夜时刻的值。\n\n## 解决方案：日期转换与索引利用\n\
    \n此问题有很多潜在解决方案。当然，我们可以修改表结构，将`ADate`列的类型从`datetime`改为`date`。这样做将便于对特定日期进行查询，但会丢失与每条记录关联的时间元素。因此，这个解决方案只适用于你永远不需要知道记录发生的具体时间，只需知道其发生日期的场景。\n\
    \n一个更好的解决方案是以稍有不同的方式尝试控制从`datetime`到`date`的转换。\n\n许多开发人员的第一反应是尝试完全避免字符串到`datetime`实例的转换，通过转换`ADate`列本身并使用能消除时间部分的转换样式。以下查询是这样一个示例：\n\
    \n```sql\nSELECT *\nFROM VariousDates\nWHERE CONVERT(varchar(20), ADate, 112)\
    \ = '20100213';\n```\n\n运行此查询，你会发现返回了正确的数据；你将看到所有来自`2010`年`2`月`13`日的行。虽然获得正确结果是件好事，但不幸的是，这里存在一个在本例使用的少量样本数据中可能不太明显的主要问题。表中`ADate`列上的索引是基于其原生类型——即`datetime`——构建的。该表并没有一个用于将`ADate`转换为使用样式`112`（或任何其他样式）的`varchar(20)`的索引。因此，此查询无法利用索引查找，SQL\
    \ Server被迫扫描表的每一行，将每个`ADate`值转换为字符串，然后与日期字符串进行比较。这会产生如图11-1所示的执行计划，其估计成本为`0.229923`。\n\
    \n*图11-1. 将日期/时间列转换为字符串不会产生良好的执行计划。*\n\n任何试图使用字符串操作函数截断`datetime`字符串末尾时间部分的方法都会导致类似问题。\n\
    \n一般来说，在查询中对列进行计算或转换会妨碍使用该列上的任何索引。然而，此规则有一个例外：对于`datetime`、`datetime2`或`datetimeoffset`类型的查询谓词被转换（或`CAST`）为`date`的特殊情况，查询优化器仍然可以依赖索引顺序来满足查询。\n\
    \n为了演示这种不寻常但非常有用的行为，我们可以将之前的查询重写如下：\n\n```sql\nSELECT *\nFROM VariousDates\nWHERE\
    \ CAST(ADate AS date) = '20100213';\n```\n\n此查询性能好得多，产生了如图11-2所示的执行计划，其中包含一个估计成本为`0.0032831`的聚集索引查找（成本仅为前一版本的`1/68`！）。\n\
    \n*图11-2. 查询将日期/时间列`CAST`为`date`类型允许查询引擎利用索引查找。*\n\n## 时间范围查询\n\n将`datetime`转换为`date`对于查询`datetime`范围内的特定日期非常有效，但如果我们想查询一个不代表整天数的连续时间范围呢？例如，假设我们将每天划分为两个`12`小时的班次：一个从午夜到中午，另一个从中午到午夜。基于此数据的查询可能如下所示：\n\
    \n```sql\nSELECT *\nFROM VariousDates\nWHERE ADate BETWEEN '20100213 12:00:00'\
    \ AND '20100214 00:00:00';\n```\n\n此查询与上一个类似，能够使用高效的聚集索引查找，但它有一个问题。`BETWEEN`操作符在两端都是包含性的，这意味着`X\
    \ BETWEEN Y AND Z`展开为`X >= Y AND X <= Z`。如果恰好有一行数据是`2010`年`2`月`14`日午夜的（示例表中的数据确实包含这样一行），那么该行将同时包含在此查询和返回下一个班次数据的查询的结果中。幸运的是，解决这个问题很容易；在对时间数据执行范围查询时，不要使用`BETWEEN`。而是始终使用完全展开的版本，包含区间的起始值，但*排除*结束值：\n\
    \n```sql\nSELECT *\nFROM VariousDates\nWHERE\nADate >= '20100213 12:00:00'\nAND\
    \ ADate < '20100214 00:00:00';\n```\n\n此模式可用于查询任何类型的日期和时间范围，并且实际上非常灵活。在下一节中，你将学习如何扩展此模式以查找所有“今天”的行、“本月”的行以及其他类似的需求。\n\
    \n## 日期/时间计算\n\n上一节中用于返回给定日期所有行的查询模式有效且能返回正确结果，但目前来看过于静态。期望所有日期范围查询都对输入日期进行硬编码，这既不现实，也不是一个易于维护的解决方案。通过使用SQL\
    \ Server的日期计算函数，可以操作输入日期以动态生成给定查询所需的任何范围。\n\n常用于执行日期/时间计算的两个主要函数是`DATEDIFF`和`DATEADD`。第一个返回两个日期之间的差值；第二个从现有日期中添加（或减去）时间。这些函数中的每一个都接受粒度（`granularity`）作为参数，并且可以在毫秒到年之间的任何级别上操作。\n\
    \n`DATEDIFF`接受三个参数：用于比较两个输入日期的时间粒度、开始日期和结束日期。例如，要找出`2010`年`2`月`13`日午夜到`2010`年`2`月`14`日午夜之间经过了多少小时，可以使用以下查询：\n\
    \n```sql\nSELECT DATEDIFF(hour, '20100113', '20100114');\n```\n\n结果，正如你所料，是`24`。请注意，我提到此查询比较的是两个日期（均在午夜），即使两个输入字符串都不包含时间。再次强调，我想强调的是，每当你将字符串用作日期/时间类型的输入时，它都会被SQL\
    \ Server隐式转换。"
  raw: 'DATEADD(millisecond,


    POWER(a.number, 2) * b.number,


    DATEADD(day, a.number-1000, ''20100201''))


    WHEN 2 THEN


    DATEADD(millisecond,


    b.number-1001,


    DATEADD(day, a.number-1000, ''20100213''))


    END


    FROM Numbers a, Numbers b


    CROSS JOIN


    (


    SELECT 1


    UNION ALL


    SELECT 2


    ) x (n);


    GO


    Once the data has been inserted, the next logical step is of course to query it.
    You might first want to ask the question “What is the minimum date value in the
    table?” The following query uses the MIN


    aggregate to answer that question:


    SELECT MIN(ADate)


    FROM VariousDates;


    GO


    This query returns one row, with the value 2010-02-13 14:36:43.000. But perhaps
    you’d like to know what other times from February 13, 2010 are in the table. A
    first shot at that query might be something like the following:


    SELECT *


    FROM VariousDates


    WHERE ADate = ''20100213'';


    GO


    If you run this query, you might be surprised to find out that instead of seeing
    all rows for February 13, 2010, zero rows are returned. The reason for this is
    that the ADate column uses the datetime type, which, as stated earlier, includes
    both a date and a time component. When this query is evaluated and the search
    argument ADate = ''20100213'' is processed, SQL Server sees that the datetime
    ADate column is being compared to the varchar string ''20100213''. Based on SQL
    Server’s rules for data type precedence, the string is converted to datetime before
    being compared; and because the string includes 327


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    no time portion, the default time of 00:00:00.000 is used. To see this conversion
    in action, try the following T-SQL:


    SELECT CONVERT(datetime, ''20100213'');


    GO


    When this code is run, the default time portion is automatically added, and the
    output of this SELECT


    is the value 2010-02-13 00:00:00.000\. Clearly, querying based on the implicit
    conversion between this string and the datetime type is ineffective—unless you
    only want values for midnight.


    There are many potential solutions to this problem. We could of course alter the
    table schema to use the date datatype for the ADate column rather than datetime.
    Doing so would facilitate easy queries on a particular date, but would lose the
    time element associated with each record. This solution is therefore only really
    suitable in situations where you never need to know the time associated with a
    record, but just the date on which it occurred.


    A better solution is to try to control the conversion from datetime to date in
    a slightly different way.


    Many developers’ first reaction is to try to avoid the conversion of the string
    to an instance of datetime altogether, by converting the ADate column itself and
    using a conversion style that eliminates the time portion. The following query
    is an example of one such way of doing this:


    SELECT *


    FROM VariousDates


    WHERE CONVERT(varchar(20), ADate, 112) = ''20100213'';


    Running this query, you will find that the correct data is returned; you’ll see
    all rows from February 13, 2010\. While getting back correct results is a wonderful
    thing, there is unfortunately a major problem that might not be too obvious with
    the small sample data used in this example. The table’s index on the ADate column
    is based on ADate as it is natively typed—in other words, as datetime. The table
    does not have an index for ADate converted to varchar(20) using style 112 (or
    any other style, for that matter). As a result, this query is unable to seek an
    index, and SQL Server is forced to scan every row of the table, convert each ADate
    value to a string, and then compare it to the date string. This produces the execution
    plan shown in Figure 11-1, which has an estimated cost of 0.229923.


    *Figure 11-1\. Converting the date/time column to a string does not result in
    a good execution plan.*


    Similar problems arise with any method that attempts to use string manipulation
    functions to truncate the time portion from the end of the datetime string.


    Generally speaking, performing a calculation or conversion of a column in a query
    precludes any index on that column from being used. However, there is an exception
    to this rule: in the special case of a query predicate of datetime, datetime2,
    or datetimeoffset type that is converted (or CAST) to a date, the query optimizer
    can still rely on index ordering to satisfy the query.


    To demonstrate this unusual but surprisingly useful behavior, we can rewrite the
    previous query as follows:


    SELECT *


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    FROM VariousDates


    WHERE CAST(ADate AS date) = ''20100213'';


    This query performs much better, producing the execution plan shown in Figure
    11-2, which has a clustered index seek with an estimated cost of 0.0032831 (1/68
    the estimated cost of the previous version!)


    *Figure 11-2\. Querying date/time columns CAST to date type allows the query engine
    to take advantage of* *an index seek.*


    CASTing a datetime to date is all very well for querying distinct dates within
    a datetime range, but what if we wanted to query a range of time that did not
    represent a whole number of days? Suppose, for instance, that we were to divide
    each day into two 12-hour shifts: one from midnight to midday, and the other from
    midday to midnight. A query based on this data might look like this:


    SELECT *


    FROM VariousDates


    WHERE ADate BETWEEN ''20100213 12:00:00'' AND ''20100214 00:00:00'';


    This query, like the last, is able to use an efficient clustered index seek, but
    it has a problem. The BETWEEN operator is inclusive on either end, meaning that
    X BETWEEN Y AND Z expands to X >= Y AND X


    <= Z. If there happens to be a row for February 14, 2010 at midnight (and the
    data in the sample table does indeed include such a row), that row will be included
    in the results of both this query and the query to return data for the following
    shift. Luckily, solving this problem is easy; when performing range queries of
    time data, don’t use BETWEEN. Instead, always use the fully expanded version,
    inclusive of the start of the interval, and *exclusive* of the end value:


    SELECT *


    FROM VariousDates


    WHERE


    ADate >= ''20100213 12:00:00''


    AND ADate < ''20100214 00:00:00'';


    This pattern can be used to query any kind of date and time range and is actually
    quite flexible. In the next section, you will learn how to extend this pattern
    to find all of “today’s” rows, “this month’s”


    rows, and other similar requirements.


    Date/Time Calculations


    The query pattern presented in the previous section to return all rows for a given
    date works and returns the correct results, but is rather overly static as-is.
    Expecting all date range queries to have hard-coded values for the input dates
    is neither a realistic expectation nor a very maintainable solution. By using
    329


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    SQL Server’s date calculation functions, input dates can be manipulated in order
    to dynamically come up with whatever ranges are necessary for a given query.


    The two primary functions that are commonly used to perform date/time calculations
    are DATEDIFF


    and DATEADD. The first returns the difference between two dates; the second adds
    (or subtracts) time from an existing date. Each of these functions takes granularity
    as a parameter and can operate at any level between milliseconds and years.


    DATEDIFF takes three parameters: the time granularity that should be used to compare
    the two input dates, the start date, and the end date. For example, to find out
    how many hours elapsed between midnight on February 13, 2010, and midnight on
    February 14, 2010, the following query could be used: SELECT DATEDIFF(hour, ''20100113'',
    ''20100114'');


    The result, as you might expect, is 24\. Note that I mentioned that this query
    compares the two dates, both at midnight, even though neither of the input strings
    contains a time. Again, I want to stress that any time you use a string as an
    input where a date/time type is expected, it will be implicitly converted by SQL
    Server.'
  trans: "\n# 第 11 章 处理时态数据\n\n## SQL 查询示例\n\n```sql\nDATEADD(millisecond,\n    POWER(a.number,\
    \ 2) * b.number,\n    DATEADD(day, a.number-1000, '20100201'))\nWHEN 2 THEN\n\
    DATEADD(millisecond,\n    b.number-1001,\n    DATEADD(day, a.number-1000, '20100213'))\n\
    END\nFROM Numbers a, Numbers b\nCROSS JOIN\n(\n    SELECT 1\n    UNION ALL\n \
    \   SELECT 2\n) x (n);\nGO\n```\n\n## 查询数据与最小日期\n\n数据插入后，下一个合乎逻辑的步骤自然是查询它。你可能首先想问“表中的最小日期值是多少？”以下查询使用`MIN`聚合函数来回答这个问题：\n\
    \n```sql\nSELECT MIN(ADate)\nFROM VariousDates;\nGO\n```\n\n这个查询返回一行，值为`2010-02-13\
    \ 14:36:43.000`。但或许你想知道表中还有哪些来自`2010`年`2`月`13`日的时间。第一次尝试这个查询可能如下：\n\n```sql\n\
    SELECT *\nFROM VariousDates\nWHERE ADate = '20100213';\nGO\n```\n\n如果你运行这个查询，可能会惊讶地发现，返回的并不是`2010`年`2`月`13`日的所有行，而是零行。原因在于`ADate`列使用的是`datetime`类型，如前所述，它同时包含日期和时间部分。当此查询被评估，且搜索参数`ADate\
    \ = '20100213'`被处理时，SQL Server 看到`datetime`类型的`ADate`列正与`varchar`字符串`'20100213'`进行比较。根据\
    \ SQL Server 的数据类型优先级规则，该字符串在比较前会被转换为`datetime`；由于该字符串不包含时间部分，因此使用默认时间`00:00:00.000`。要查看此转换过程，请尝试以下\
    \ T-SQL：\n\n```sql\nSELECT CONVERT(datetime, '20100213');\nGO\n```\n\n当此代码运行时，会自动添加默认时间部分，此`SELECT`语句的输出为值`2010-02-13\
    \ 00:00:00.000`。显然，基于此字符串与`datetime`类型之间隐式转换的查询是无效的——除非你只想要午夜时刻的值。\n\n## 解决方案：日期转换与索引利用\n\
    \n此问题有很多潜在解决方案。当然，我们可以修改表结构，将`ADate`列的类型从`datetime`改为`date`。这样做将便于对特定日期进行查询，但会丢失与每条记录关联的时间元素。因此，这个解决方案只适用于你永远不需要知道记录发生的具体时间，只需知道其发生日期的场景。\n\
    \n一个更好的解决方案是以稍有不同的方式尝试控制从`datetime`到`date`的转换。\n\n许多开发人员的第一反应是尝试完全避免字符串到`datetime`实例的转换，通过转换`ADate`列本身并使用能消除时间部分的转换样式。以下查询是这样一个示例：\n\
    \n```sql\nSELECT *\nFROM VariousDates\nWHERE CONVERT(varchar(20), ADate, 112)\
    \ = '20100213';\n```\n\n运行此查询，你会发现返回了正确的数据；你将看到所有来自`2010`年`2`月`13`日的行。虽然获得正确结果是件好事，但不幸的是，这里存在一个在本例使用的少量样本数据中可能不太明显的主要问题。表中`ADate`列上的索引是基于其原生类型——即`datetime`——构建的。该表并没有一个用于将`ADate`转换为使用样式`112`（或任何其他样式）的`varchar(20)`的索引。因此，此查询无法利用索引查找，SQL\
    \ Server 被迫扫描表的每一行，将每个`ADate`值转换为字符串，然后与日期字符串进行比较。这会产生如图 11-1 所示的执行计划，其估计成本为`0.229923`。\n\
    \n*图 11-1. 将日期/时间列转换为字符串不会产生良好的执行计划。*\n\n任何试图使用字符串操作函数截断`datetime`字符串末尾时间部分的方法都会导致类似问题。\n\
    \n一般来说，在查询中对列进行计算或转换会妨碍使用该列上的任何索引。然而，此规则有一个例外：对于`datetime`、`datetime2`或`datetimeoffset`类型的查询谓词被转换（或`CAST`）为`date`的特殊情况，查询优化器仍然可以依赖索引顺序来满足查询。\n\
    \n为了演示这种不寻常但非常有用的行为，我们可以将之前的查询重写如下：\n\n```sql\nSELECT *\nFROM VariousDates\nWHERE\
    \ CAST(ADate AS date) = '20100213';\n```\n\n此查询性能好得多，产生了如图 11-2 所示的执行计划，其中包含一个估计成本为`0.0032831`的聚集索引查找（成本仅为前一版本的`1/68`！）。\n\
    \n*图 11-2. 查询将日期/时间列`CAST`为`date`类型允许查询引擎利用索引查找。*\n\n## 时间范围查询\n\n将`datetime`转换为`date`对于查询`datetime`范围内的特定日期非常有效，但如果我们想查询一个不代表整天数的连续时间范围呢？例如，假设我们将每天划分为两个`12`小时的班次：一个从午夜到中午，另一个从中午到午夜。基于此数据的查询可能如下所示：\n\
    \n```sql\nSELECT *\nFROM VariousDates\nWHERE ADate BETWEEN '20100213 12:00:00'\
    \ AND '20100214 00:00:00';\n```\n\n此查询与上一个类似，能够使用高效的聚集索引查找，但它有一个问题。`BETWEEN`操作符在两端都是包含性的，这意味着`X\
    \ BETWEEN Y AND Z`展开为`X >= Y AND X <= Z`。如果恰好有一行数据是`2010`年`2`月`14`日午夜的（示例表中的数据确实包含这样一行），那么该行将同时包含在此查询和返回下一个班次数据的查询的结果中。幸运的是，解决这个问题很容易；在对时间数据执行范围查询时，不要使用`BETWEEN`。而是始终使用完全展开的版本，包含区间的起始值，但*排除*结束值：\n\
    \n```sql\nSELECT *\nFROM VariousDates\nWHERE\nADate >= '20100213 12:00:00'\nAND\
    \ ADate < '20100214 00:00:00';\n```\n\n此模式可用于查询任何类型的日期和时间范围，并且实际上非常灵活。在下一节中，你将学习如何扩展此模式以查找所有“今天”的行、“本月”的行以及其他类似的需求。\n\
    \n## 日期/时间计算\n\n上一节中用于返回给定日期所有行的查询模式有效且能返回正确结果，但目前来看过于静态。期望所有日期范围查询都对输入日期进行硬编码，这既不现实，也不是一个易于维护的解决方案。通过使用\
    \ SQL Server 的日期计算函数，可以操作输入日期以动态生成给定查询所需的任何范围。\n\n常用于执行日期/时间计算的两个主要函数是`DATEDIFF`和`DATEADD`。第一个返回两个日期之间的差值；第二个从现有日期中添加（或减去）时间。这些函数中的每一个都接受粒度（`granularity`）作为参数，并且可以在毫秒到年之间的任何级别上操作。\n\
    \n`DATEDIFF`接受三个参数：用于比较两个输入日期的时间粒度、开始日期和结束日期。例如，要找出`2010`年`2`月`13`日午夜到`2010`年`2`月`14`日午夜之间经过了多少小时，可以使用以下查询：\n\
    \n```sql\nSELECT DATEDIFF(hour, '20100113', '20100114');\n```\n\n结果，正如你所料，是`24`。请注意，我提到此查询比较的是两个日期（均在午夜），即使两个输入字符串都不包含时间。再次强调，我想强调的是，每当你将字符串用作日期/时间类型的输入时，它都会被\
    \ SQL Server 隐式转换。\n"
- fmt: "It’s also important to note that `DATEDIFF` maintains the idea of “start”\
    \ and “end” times, and the result will change if you reverse the two. Changing\
    \ the previous query so that February 14 is passed before February 13 results\
    \ in the output of `-24`.\n\nThe `DATEADD` function takes three parameters: the\
    \ time granularity, the amount of time to add, and the input date. For example,\
    \ the following query adds 24 hours to midnight on February 13, 2010, resulting\
    \ in an output of `2010-01-14 00:00:00.000`:\n\n```sql\nSELECT DATEADD(hour, 24,\
    \ '20100113');\n```\n\n`DATEADD` will also accept negative amounts, which will\
    \ lead to the relevant amount of time being subtracted rather than added, as in\
    \ this case.\n\n### Truncating the Time Portion of a `datetime` Value\n\nIn versions\
    \ of SQL Server prior to SQL Server 2008, the limited choice of only `datetime`\
    \ and `smalldatetime` temporal datatypes meant that it was not possible to store\
    \ a date value without an associated time component. As a result, developers came\
    \ up with a number of methods to “truncate” `datetime` values so that, without\
    \ changing the underlying datatype, they could be interrogated as dates without\
    \ consideration of the time component. These methods generally involve rounding\
    \ the time portion of a `datetime` value down to `00:00:00` (midnight), so that\
    \ the only remaining significant figures of the result represent the day, month,\
    \ and year of the associated value.\n\nAlthough, with the introduction of the\
    \ `date` datatype, it is no longer necessary to perform such truncation, the “rounding”\
    \ approach taken is still very useful as a basis for other temporal queries. To\
    \ demonstrate, let me first break down the truncation process into its component\
    \ parts:\n\n1.  First, you must decide on the level of granularity to which you’d\
    \ like to round the result. For instance, if you want to remove the seconds and\
    \ milliseconds of a time value, you’d round down using minutes. Likewise, to remove\
    \ the entire time portion, you’d round down using days.\n2.  Once you’ve decided\
    \ on a level of granularity, pick a reference date/time. I generally use midnight\
    \ on `1900-01-01`, but you can use any date/time within the range of the data\
    \ type you’re working with.\n3.  Using the `DATEDIFF` function, find the difference\
    \ between the reference date/time and the date/time you want to truncate, at the\
    \ level of granularity you’ve chosen.\n4.  Finally, use `DATEADD` to add the output\
    \ from the `DATEDIFF` function to the same reference date/time that you used to\
    \ find the difference. The result will be the truncated value of the original\
    \ date/time.\n\nWalking through an example should make this a bit clearer. Assume\
    \ that you want to start with `2010-04-23 13:45:43.233` and truncate the time\
    \ portion (in other words, come out with `2010-04-23` at midnight). The granularity\
    \ used will be days, since that is the lowest level of granularity above the units\
    \ of time (milliseconds, seconds, minutes, and hours). The following T-SQL can\
    \ be used to determine the number of days between the reference date of `1900-01-01`\
    \ and the input date:\n\n```sql\nDECLARE @InputDate datetime = '20100423 13:45:43.233';\n\
    SELECT DATEDIFF(day, '19000101', @InputDate);\n```\n\nRunning this T-SQL, we discover\
    \ that 40289 days passed between the reference date and the input date. Using\
    \ `DATEADD`, that number can be added to the reference date:\n\n```sql\nSELECT\
    \ DATEADD(day, 40289, '19000101');\n```\n\nThe result of this operation is the\
    \ desired truncation: `2010-04-23 00:00:00.000`. Because only the number of days\
    \ was added back to the reference date—with no time portion—the date was rounded\
    \ down and the time portion eliminated. Of course, you don’t have to run this\
    \ T-SQL step by step; in a real application, you’d probably combine everything\
    \ into one inline statement:\n\n```sql\nSELECT DATEADD(day, DATEDIFF(day, '19000101',\
    \ @InputDate), '19000101');\n```\n\nBecause it is a very common requirement to\
    \ round down date/time values to different levels of granularity—to find the first\
    \ day of the week, the first day of the month, and so on—you might find it helpful\
    \ to encapsulate this logic in a reusable function with common named units of\
    \ time, as follows:\n\n```sql\nCREATE FUNCTION DateRound (\n    @Unit varchar(32),\n\
    \    @InputDate datetime\n) RETURNS datetime\nAS\nBEGIN\n    DECLARE @RefDate\
    \ datetime = '19000101';\n    SET @Unit = UPPER(@Unit);\n    RETURN\n    CASE(@Unit)\n\
    \        WHEN 'DAY' THEN\n            DATEADD(day, DATEDIFF(day, @RefDate, @InputDate),\
    \ @RefDate)\n        WHEN 'MONTH' THEN\n            DATEADD(month, DATEDIFF(month,\
    \ @RefDate, @InputDate), @RefDate)\n        WHEN 'YEAR' THEN\n            DATEADD(year,\
    \ DATEDIFF(year, @RefDate, @InputDate), @RefDate)\n        WHEN 'WEEK' THEN\n\
    \            DATEADD(week, DATEDIFF(week, @RefDate, @InputDate), @RefDate)\n \
    \       WHEN 'QUARTER' THEN\n            DATEADD(quarter, DATEDIFF(quarter, @RefDate,\
    \ @InputDate), @RefDate)\n    END\nEND;\nGO\n```\n\nThe following code illustrates\
    \ how the `DateRound()` function can be used with a date/time value representing\
    \ 08:48 a.m. on August 20, 2009:\n\n```sql\nSELECT\n    dbo.DateRound('Day', '20090820\
    \ 08:48'),\n    dbo.DateRound('Month', '20090820 08:48'),\n    dbo.DateRound('Year',\
    \ '20090820 08:48'),\n    dbo.DateRound('Week', '20090820 08:48'),\n    dbo.DateRound('Quarter',\
    \ '20090820 08:48');\n```\n\nThis code returns the following results:\n\n```\n\
    2009-08-20 00:00:00.000\n2009-08-01 00:00:00.000\n2009-01-01 00:00:00.000\n2009-08-17\
    \ 00:00:00.000\n2009-07-01 00:00:00.000\n```\n\n`Note`: Developers who have experience\
    \ with Oracle databases may be familiar with the Oracle PL/SQL `TRUNC()` method,\
    \ which provides similar functionality to the `DateRound` function described here.\n\
    \n### Finding Relative Dates\n\nOnce you understand the basic pattern for truncation\
    \ described in the previous section, you can modify it to come up with any combination\
    \ of dates. Suppose, for example, that you want to find the last day of the month.\
    \ One method is to find the first day of the month, add an additional month, and\
    \ then subtract one day:\n\n```sql\nSELECT DATEADD(day, -1, DATEADD(month, DATEDIFF(month,\
    \ '19000101', @InputDate) + 1, '19000101'));\n```\n\nAn alternative method to\
    \ find the last day of the month is to add a whole number of months to a reference\
    \ date that is in itself the last day of a month. For instance, you can use a\
    \ reference date of `190012-31`:\n\n```sql\nSELECT DATEADD(month, DATEDIFF(month,\
    \ '19001231', @InputDate), '19001231');\n```\n\nNote that when using this approach,\
    \ it is important to choose a month that has 31 days; what this T-SQL does is\
    \ to find the same day of the month as the reference date, on the month in which\
    \ the input date lies. But, if the month has less than 31 days, SQL Server will\
    \ automatically round down to the closest date, which will represent the actual\
    \ last date of the month in question. Had I used February 28 instead of December\
    \ 31 for the reference date, the output any time this query was run would be the\
    \ 28th of the month.\n\nOther more interesting combinations are also possible.\
    \ For example, a common requirement in many applications is to perform calculations\
    \ based on time periods such as “every day between last Friday and today.” By\
    \ modifying the truncation pattern a bit, finding “last Friday” is fairly simple—the\
    \ main trick is to choose an appropriate reference date. In this case, to find\
    \ the nearest Friday to a supplied input date, the reference date should be *any*\
    \ Friday. We know that the number of days between any Friday and any other Friday\
    \ is divisible by 7, and we can use that knowledge to truncate the current date\
    \ to the nearest Friday.\n\nThe following T-SQL finds the number of days between\
    \ the reference Friday, January 7, 2000, and the input date, February 9, 2009:\n\
    \n```sql\nDECLARE @Friday date = '20000107';\nSELECT DATEDIFF(day, @Friday, '20090209');\n\
    ```\n\nThe result is `3321`, which of course is an integer. Taking advantage of\
    \ SQL Server’s integer math properties, dividing the result by 7, and then multiplying\
    \ it by 7 again will round it down to the nearest number divisible by seven, `3318`:\n\
    \n```sql\nSELECT (3321 / 7) * 7;\n```"
