  raw: 'The following sections introduce the security and reliability features that
    are used by SQLCLR, and show how to create assembly references that exploit these
    features to manage security on a granular level.


    SQLCLR Security and Reliability Features


    Unlike stored procedures, triggers, UDFs, and other types of code modules that
    can be exposed within SQL Server, a given SQLCLR routine is not directly related
    to a database, but rather to an assembly **cataloged** within the database. Cataloging
    of an assembly is done using SQL Server’s CREATE ASSEMBLY


    statement, and unlike their T-SQL equivalents, SQLCLR modules get their first
    security restrictions not via grants, but rather at the same time their assemblies
    are cataloged. The CREATE ASSEMBLY statement allows the DBA or database developer
    to specify one of three security and reliability **permission sets** that dictate
    what the code in the assembly is allowed to do.


    The allowed permission sets are SAFE, EXTERNAL_ACCESS, and UNSAFE. Each increasingly
    permissive level includes and extends permissions granted by lower permission
    sets. The restricted set of permissions allowed for SAFE assemblies includes limited
    access to math and string functions, along with data access to the host database
    via the context connection. The EXTERNAL_ACCESS permission set adds the ability
    to communicate outside of the SQL Server instance, to other database servers,
    file servers, web servers, and so on. And the UNSAFE permission set gives the
    assembly the ability to do pretty much anything—including running unmanaged code.


    Although exposed as only a single user-controllable setting, internally each permission
    set’s rights are actually enforced by two distinct methods:


    •


    Assemblies assigned to each permission set are *granted* access to perform certain


    operations via .NET’s **Code Access Security** (CAS) technology.


    •


    At the same time, access is *denied* to certain operations based on checks against


    a.NET 3.5 attribute called HostProtectionAttribute (HPA).


    On the surface, the difference between HPA and CAS is that they are opposites:
    CAS permissions dictate what an assembly can do, whereas HPA permissions dictate
    what an assembly cannot do. The combination of everything granted by CAS and everything
    denied by HPA makes up each of the three permission sets.


    Beyond this basic difference is a much more important distinction between the
    two access control methods. Although violation of a permission enforced by either
    method will result in a runtime exception, the actual checks are done at very
    different times. CAS grants are checked dynamically at runtime via a stack walk
    performed as code is executed. On the other hand, HPA permissions are checked
    at the point of just-in-time compilation—just *before* calling the method being
    referenced.


    To observe how these differences affect the way code runs, a few test cases will
    be necessary, which are described in the following sections.


    CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    „ **Tip** You can download the source code of the examples in this chapter, together
    with all associated project files and libraries, from the Source Code/Download
    area of the Apress web site, www.apress.com.


    Security Exceptions


    To begin with, let’s take a look at how a CAS exception works. Create a new assembly
    containing the following CLR stored procedure:


    [SqlProcedure]


    public static void CAS_Exception()


    {


    SqlContext.Pipe.Send("Starting...");


    using (FileStream fs =


    new FileStream(@"c:\b.txt", FileMode.Open))


    {


    //Do nothing...


    }


    SqlContext.Pipe.Send("Finished...");


    return;


    }


    Catalog the assembly as SAFE and execute the stored procedure. This will result
    in the following output:


    Starting...


    Msg 6522, Level 16, State 1, Procedure CAS_Exception, Line 0


    A .NET Framework error occurred during execution of user-defined routine or


    aggregate "CAS_Exception":


    System.Security.SecurityException: Request for the permission of type


    ''System.Security.Permissions.FileIOPermission, mscorlib, Version=2.0.0.0,'
