    than seeing the split between the resource pools as 90:10, it appears to be 45:5—this
    is the correct ratio between the pools, but what has happened to the other 50
    percent of resource?


    The reason for this is that the “CPU usage %” performance counter is normalized
    based on the number of CPUs on the server. In this case, I am running the tests
    on a dual-processor machine, but I’ve just set the SQL Server affinity mask to
    only allow SQL Server processor threads on one processor. As a result, all measurements
    for CPU usage percentage are half their expected value, with a maximum CPU


    usage figure of 50 percent.


    ![](index-297_1.png)


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    *Figure 9-4\. CPU usage between resource pools after setting CPU affinity to a
    single processor* Calculating Effective and Shared Maximum Resource Allocation


    In a highly concurrent environment, it is rare for every request to be treated
    equally. In many cases, it is a business requirement to ensure that certain defined
    groups of users or specific sets of queries receive preferential treatment to
    guarantee fast response times. Special treatment may be required for queries from
    high-priority users or queries that must be completed within a certain timeframe
    in order to ensure that customer service level agreements are met.


    So far, I have demonstrated how the Resource Governor can be used to limit the
    maximum server resource usage in certain scenarios, but a more practical situation
    involves guaranteeing the *minimum* resource available to a query. By setting
    appropriate limits on the MAX_CPU_USAGE and MIN_CPU_USAGE of different resource
    pools (and the corresponding MIN_MEMORY_PERCENT and MAX_MEMORY_PERCENT), it is
    easy to classify preferential requests to a dedicated resource pool that receives
    a guaranteed minimum share of the server CPU and memory resource while capping
    the resource given to other pools.


    To understand the interplay between settings of different pools, suppose that
    we want PoolA to be our preferential pool and PoolB to be our normal pool. To
    achieve this, we will state that PoolA should have a minimum CPU resource of 30
    percent and a maximum of 90 percent. We will state a minimum of 0 percent CPU
    for PoolB, and a maximum CPU limit of 50 percent. These changes can be made using
    the following T-SQL:


    ALTER RESOURCE POOL PoolA


    WITH (


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    MIN_CPU_PERCENT = 30,


    MAX_CPU_PERCENT = 90


    );


    ALTER RESOURCE POOL PoolB


    WITH (


    MIN_CPU_PERCENT = 0,


    MAX_CPU_PERCENT = 50


    );


    ALTER RESOURCE GOVERNOR RECONFIGURE;


    GO


