  trans: "\n# 第 12 章 树、层次结构与图\n\n利用模式和函数，我们可以开始遍历节点。图遍历的基本技术非常简单：找到起始交叉点及其连接的所有节点，然后迭代或递归地向外移动，将前一个节点的终点作为下一个节点的起点。这可以通过递归公用表表达式（`CTE`）轻松实现。以下是一个简单的初始\
    \ `CTE` 示例，可用于从 `Madison` 和 `1st Avenue` 遍历节点到 `Madison` 和 `4th Avenue`：\n\n```sql\n\
    DECLARE\n    @Start int = dbo.GetIntersectionId('Madison', '1st Ave'),\n    @End\
    \ int = dbo.GetIntersectionId('Madison', '4th Ave');\n\nWITH Paths\nAS\n(\n  \
    \  SELECT\n        @Start AS theStart,\n        IntersectionId_End AS theEnd\n\
    \    FROM dbo.StreetSegments\n    WHERE\n        IntersectionId_Start = @Start\n\
    \n    UNION ALL\n\n    SELECT\n        p.theEnd,\n        ss.IntersectionId_End\n\
    \    FROM Paths p\n    JOIN dbo.StreetSegments ss ON ss.IntersectionId_Start =\
    \ p.theEnd\n    WHERE p.theEnd <> @End\n)\n\nSELECT *\nFROM Paths;\nGO\n```\n\n\
    该 `CTE` 的锚点部分找到了起始交叉点连接的所有节点——在此情况下，根据我们已经输入的数据，只有一个。递归部分使用锚点的输出作为其输入，从那里查找所有连接的节点，并且仅当下一个交叉点的终点不等于终点交叉点时才继续。此查询的输出如下：\n\
    \n```\ntheStart theEnd\n1 2\n2 3\n3 4\n```\n\n虽然这个输出是正确的，并且在两点之间只有一条路径的情况下描述得很清晰，但它存在一些问题。首先，`CTE`\
    \ 的输出顺序——就像任何其他查询一样——如果没有 `ORDER BY` 子句是无法保证的。在此情况下，顺序恰好与路径的顺序一致，但这只是一个非常小的数据集，而且我运行查询的服务器只有一个处理器。在更大的数据集上和/或使用多个处理器时，`SQL\
    \ Server` 可能会选择以不同的顺序处理数据，从而破坏隐含的输出顺序。\n\n第二个问题是，在这种情况下，起点和终点之间恰好有一条路径。如果有多条路径怎么办？图\
    \ 12-6 展示了添加了一条新街道、几个新交叉点和更多路段后的街道地图。以下 `T-SQL` 可用于将新数据添加到相应的表中：\n\n```sql\n--New\
    \ street\nINSERT INTO Streets VALUES (6, 'Lexington');\nGO\n\n--New intersections\n\
    INSERT INTO Intersections VALUES\n(5, 'E'), (6, 'F'), (7, 'G'), (8, 'H');\nGO\n\
    \n--New intersection/street mappings\nINSERT INTO IntersectionStreets VALUES\n\
    (5, 1), (5, 6), (6, 2), (6, 6), (7, 3), (7, 6), (8, 4), (8, 6);\nGO\n\n--North/South\
    \ segments\nINSERT INTO StreetSegments VALUES (2, 6, 2), (4, 8, 4);\nGO\n\n--East/West\
    \ segments\nINSERT INTO StreetSegments VALUES (8, 7, 6), (7, 6, 6), (6, 5, 6);\n\
    GO\n```\n\n请注意，虽然交叉点 `E` 和 `G` 已创建，但它们对应的南北路段尚未插入。这是有意为之，因为我将使用这些路段来说明另一个复杂情况。\n\
    \n*图 12-6. 一个更完整的街道地图版本*\n\n新数据插入后，我们可以尝试与之前相同的 `CTE`，这次从 `Madison` 和 `1st Avenue`\
    \ 遍历到 `Lexington` 和 `1st Avenue`。要更改目的地，请修改分配 `@Start` 和 `@End` 变量的 `DECLARE`\
    \ 语句，如下所示：\n\n```sql\nDECLARE\n    @Start int = dbo.GetIntersectionId('Madison',\
    \ '1st Ave'),\n    @End int = dbo.GetIntersectionId('Lexington', '1st Ave');\n\
    ```\n\n进行这些更改后，`CTE` 查询的输出现在如下：\n\n```\ntheStart theEnd\n1 2\n2 3\n2 6\n6 5\n\
    3 4\n4 8\n8 7\n7 6\n6 5\n```\n\n现在从起点到终点有两条路径，但无法分辨它们是什么；每条路径涉及的交叉点在输出中混在了一起。\n\
    \n为了解决这个问题，`CTE` 必须在每次迭代时“记住”它已经遍历过的\n"
- fmt: "# CHAPTER 12: TREES, HIERARCHIES, AND GRAPHS\n\nprevious iterations. Since\
    \ each iteration of a CTE can only access the data from the previous iteration—and\
    \ not all data from all previous iterations—each row will have to keep its own\
    \ records inline. This can be done using a **materialized path** notation, where\
    \ each previously visited node will be appended to a running list. This will require\
    \ adding a new column to the CTE as highlighted in bold in the following code\
    \ listing:\n\n```sql\nDECLARE\n    @Start int = dbo.GetIntersectionId('Madison',\
    \ '1st Ave'),\n    @End int = dbo.GetIntersectionId('Lexington', '1st Ave');\n\
    \nWITH Paths\nAS\n(\n    SELECT\n        @Start AS theStart,\n        IntersectionId_End\
    \ AS theEnd,\n        CAST('/' +\n             CAST(@Start AS varchar(255)) +\
    \ '/' +\n             CAST(IntersectionId_End AS varchar(255)) + '/'\n       \
    \      AS varchar(255) ) AS thePath\n    FROM dbo.StreetSegments\n    WHERE\n\
    \        IntersectionId_Start = @Start\n    UNION ALL\n    SELECT\n        p.theEnd,\n\
    \        ss.IntersectionId_End,\n        CAST(p.ThePath +\n             CAST(IntersectionId_End\
    \ AS varchar(255)) + '/'\n             AS varchar(255)\n        )\n    FROM Paths\
    \ p\n    JOIN dbo.StreetSegments ss ON ss.IntersectionId_Start = p.theEnd\n  \
    \  WHERE p.theEnd <> @End\n)\nSELECT *\nFROM Paths;\nGO\n```\n\nThis code will\
    \ start to form a list of visited nodes. If node A (IntersectionId 1) is specified\
    \ as the start point, the output for this column for the anchor member will be\
    \ `/1/2/`, since node B (IntersectionId 2) is the only node that participates\
    \ in a street segment starting at node A.\n\nAs new nodes are visited, their IDs\
    \ will be appended to the list, producing a “breadcrumb” trail of all visited\
    \ nodes. Note that the columns in both the anchor and recursive members are `CAST`\
    \ to make sure their data types are identical. This is required because the `varchar`\
    \ size changes due to concatenation, and all columns exposed by the anchor and\
    \ recursive members must have identical types. The output of the CTE after making\
    \ these modifications is as follows:\n\n```\ntheStart theEnd thePath\n1      \
    \  2      /1/2/\n2        3      /1/2/3/\n2        6      /1/2/6/\n6        5\
    \      /1/2/6/5/\n3        4      /1/2/3/4/\n4        8      /1/2/3/4/8/\n8  \
    \      7      /1/2/3/4/8/7/\n7        6      /1/2/3/4/8/7/6/\n6        5     \
    \ /1/2/3/4/8/7/6/5/\n```\n\nThe output now includes the complete paths to the\
    \ endpoints, but it still includes all subpaths visited along the way. To finish,\
    \ add the following to the outermost query:\n\n```sql\nWHERE theEnd = @End\n```\n\
    \nThis will limit the results to only paths that actually end at the specified\
    \ endpoint—in this case, node E (IntersectionId 5). After making that addition,\
    \ only the two paths that actually visit both the start and end nodes are shown.\n\
    \nThe CTE still has one major problem as-is. Figure 12-7 shows a completed version\
    \ of the map, with the final two street segments filled in. The following T-SQL\
    \ can be used to populate the `StreetSegments` table with the new data:\n\n```sql\n\
    INSERT INTO StreetSegments VALUES (5, 1, 1), (7, 3, 3);\nGO\n```\n\n**Figure 12-7.\
    \ A version of the map with all segments filled in**\n\nRerunning the CTE after\
    \ introducing the new segments results in the following partial output (abbreviated\
    \ for brevity):\n\n```\ntheStart theEnd thePath\n6        5      /1/2/6/5/\n6\
    \        5      /1/2/3/4/8/7/6/5/\n6        5      /1/2/3/4/8/7/3/4/8/7/6/5/\n\
    6        5      /1/2/3/4/8/7/3/4/8/7/3/4/8/7/6/5/\n...\n```\n\nalong with the\
    \ following error:\n\n```\nMsg 530, Level 16, State 1, Line 9\nThe statement terminated.\n\
    The maximum recursion 100 has been exhausted before statement completion.\n```\n\
    \nThe issue is that these new intersections create cycles in the graph. The problem\
    \ can be seen to start at the fourth line of the output, when the recursion first\
    \ visits node G (IntersectionId 7). From there, one can go one of two ways: west\
    \ to node F (IntersectionId 6) or north to node C (IntersectionId 3).\n\nFollowing\
    \ the first route, the recursion eventually completes. But following the second\
    \ route, the recursion will keep coming back to node G again and again, following\
    \ the same two branches.\n\nEventually, the default recursive limit of 100 is\
    \ reached and execution ends with an error. Note that this default limit can be\
    \ overridden using the `OPTION (MAXRECURSION N)` query hint, where `N` is the\
    \ maximum recursive depth you’d like to use. In this case, 100 is a good limit\
    \ because it quickly tells us that there is a major problem!\n\nFixing this issue,\
    \ luckily, is quite simple: check the path to find out whether the next node has\
    \ already been visited, and if so, do not visit it again. Since the path is a\
    \ string, this can be accomplished using a `LIKE` predicate by adding the following\
    \ argument to the recursive member’s `WHERE` clause: `AND p.thePath NOT LIKE '%/'\
    \ + CONVERT(varchar, ss.IntersectionId_End) + '/%'`\n\nThis predicate checks to\
    \ make sure that the ending `IntersectionId`, delimited by `/` on both sides,\
    \ does not yet appear in the path—in other words, has not yet been visited. This\
    \ will make it impossible for the recursion to fall into a cycle.\n\nRunning the\
    \ CTE after adding this fix eliminates the cycle issue. The full code for the\
    \ fixed CTE follows:\n\n```sql\nDECLARE\n    @Start int = dbo.GetIntersectionId('Madison',\
    \ '1st Ave'),\n    @End int = dbo.GetIntersectionId('Lexington', '1st Ave');\n\
    \nWITH Paths\nAS\n(\n    SELECT\n        @Start AS theStart,\n        IntersectionId_End\
    \ AS theEnd,\n        CAST('/' +\n             CAST(@Start AS varchar(255)) +\
    \ '/' +\n             CAST(IntersectionId_End AS varchar(255)) + '/'\n       \
    \      AS varchar(255) ) AS thePath\n    FROM dbo.StreetSegments\n    WHERE\n\
    \        IntersectionId_Start = @Start\n    UNION ALL\n    SELECT\n        p.theEnd,\n\
    \        ss.IntersectionId_End,\n        CAST(p.ThePath +\n             CAST(IntersectionId_End\
    \ AS varchar(255)) + '/'\n             AS varchar(255)\n        )\n    FROM Paths\
    \ p\n    JOIN dbo.StreetSegments ss ON ss.IntersectionId_Start = p.theEnd\n  \
    \  WHERE p.theEnd <> @End\n      AND p.thePath NOT LIKE '%/' + CONVERT(varchar,\
    \ ss.IntersectionId_End) + '/%'\n)\nSELECT *\nFROM Paths;\nGO\n```\n\nThis concludes\
    \ this chapter’s coverage on general graphs. The remainder of the chapter deals\
    \ with modeling and querying of hierarchies. Although hierarchies are much more\
    \ specialized than graphs, they tend to be more typically seen in software projects\
    \ than general graphs, and developers must consider slightly different issues\
    \ when modeling them.\n\n## Advanced routing\n\nThe example shown in this section\
    \ is highly simplified, and it is designed to teach the basics of querying graphs\
    \ rather than serve as a complete routing solution. I have had the pleasure of\
    \ working fairly extensively with a production system designed to traverse actual\
    \ street routes and will briefly share some of the insights I have gained in case\
    \ you are interested in these kinds of problems.\n\nThe first issue with the solution\
    \ shown here is that of scalability. A big city has tens of thousands of street\
    \ segments, and determining a route from one end of the city to another using\
    \ this method will create a combinatorial explosion of possibilities. In order\
    \ to reduce the number of combinations, a few things can be done.\n\nFirst of\
    \ all, each segment can be weighted, and a score tallied along the way as you\
    \ recurse over the possible paths. If the score gets too high, you can terminate\
    \ the recursion. For example, in the system I worked on, weighting was done based\
    \ on distance traveled. The algorithm used was fairly complex, but essentially,\
    \ if a destination was 2 miles away and the route went over 3 miles, recursion\
    \ would be terminated for that branch. This scoring also lets the system determine\
    \ the shortest possible routes."
