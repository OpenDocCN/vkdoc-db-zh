    ```

    LEVEL_2 = HIGH,

    LEVEL_3 = HIGH,

    LEVEL_4 = HIGH),

    CELLS_PER_OBJECT = 16);

    ```


    Once again, we’ll examine the properties of this index using the `sp_help_spatial_geography_index`
    procedure:


    ```

    EXEC sp_help_spatial_geography_index

    @tabname = allCountries,

    @indexname = idxallCountriesHigh,

    @verboseoutput = 1,

    @query_sample = ''POLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))'';

    ```


    ## 索引性能对比


    Unsurprisingly, the `Base_Table_Rows` value remains unchanged at `6,906,119`,
    as does the total number-of-rows output from the query, `44,840`. The number of
    rows selected by the primary filter remains very similar at `49,157`, and the
    primary filter efficiency barely changes—from `91.4766` to `91.21793`. However,
    there is a very important distinction between the indexes, as shown in the following
    rows:


    `Number_Of_Rows_Selected_By_Internal_Filter` `25333`

    `Number_Of_Times_Secondary_Filter_Is_Called` `23824`

    `Percentage_Of_Primary_Filter_Rows_Selected_By_Internal_Filter` `51.5348780438188`

    `Internal_Filter_Efficiency` `56.4964317573595`


    When using a `MEDIUM` grid resolution, `79.385` percent of the candidate rows
    selected by the primary filter could be automatically included in the result set.
    The secondary filter therefore only needed to be called on the remaining `10,105`
    rows. However, when set to `HIGH` resolution, only `51.53` percent of the primary
    filter could be preselected by the internal filter. Thus, the expensive secondary
    filter had to be called twice as many times.


    ## 网格分辨率选择原理


    At first consideration, this may seem illogical. One would assume that when indexing
    a table of Points, in which each geometry can only intersect a single cell (or
    at most four cells, if the Point were placed on a corner where cells meet), the
    `HIGH` grid resolution must provide the best fit. Each Point geometry would only
    require a single cell in the index, and by using the `HIGH` resolution, that cell
    would be as granular as possible.


    However, the important thing to realize is that, in order to satisfy a spatial
    query, the spatial predicate against which the geometries are being compared (the
    query sample, as defined by the stored procedure) must also be tessellated using
    the same index settings as the base table itself. In this case, `@BoundingBox`
    is quite a large Polygon representing the state of Colorado, which requires a
    great number of cells to fully cover. Since this exceeds the `CELLS_PER_OBJECT`
    limit, tessellation is stopped and the fit is not as good as it could have been.
    In this example, the `MEDIUM` resolution grid provides a more accurate index,
    and hence better performance, than the `HIGH` resolution grid.


    Unfortunately, there are very few general rules to follow with regard to determining
    optimum spatial index settings, since they are very much dependent on the exact
    distribution of the data in question, together with the nature of the queries
    run against that data. Tuning spatial indexes requires a large degree of trial
    and error, but the stored procedures introduced here can provide valuable statistics
    to assess the performance of an index to help the process.


    ## 总结


    Spatial data is an exciting and growing area of database development. As more
    applications and services become location-aware, there is a requirement for all
    types of data to be stored with associated spatial information in a structured,
    searchable manner.


    The `geography` and `geometry` datatypes in SQL Server 2008 provide a powerful,
    standards-compliant way of storing, retrieving, and performing calculations against
    spatial data using either a flat or ellipsoidal model. However, the complexity
    and uniqueness of spatial data means that specific approaches must be taken to
    ensure that spatial queries remain performant. Spatial indexes can be used to
    provide a primary filter of data to satisfy a spatial query, reducing the amount
    of processing required to perform expensive accurate spatial operations such as
    `STIntersects()`.


