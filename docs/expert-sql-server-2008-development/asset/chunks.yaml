    most recent Thursday) as of and including the 14th will be the second Thursday
    of the month. The following T-SQL uses this approach:


    DECLARE @InputDate date = ''20100101'';


    DECLARE @Thursday date = ''20000914'';


    DECLARE @FourteenthOfMonth date =


    DATEADD(month, DATEDIFF(month, @Thursday, @InputDate), @Thursday);


    SELECT DATEADD(week, (DATEDIFF(day, @Thursday, @FourteenthOfMonth) / 7),


    @Thursday);


    Of course, this doesn’t find the *next* meeting; it finds the meeting for the
    month of the input date. To find the next meeting, a CASE expression will be necessary,
    in addition to an observation about second Thursdays: if the second Thursday of
    a month falls on the eighth, ninth, or tenth, the next month’s second Thursday
    is five weeks away. Otherwise, the next month’s second Thursday is four weeks
    away.


    To find the day of the month represented by a given date/time instance, use T-SQL’s
    DATEPART function, which takes the same date granularity inputs as DATEADD and
    DATEDIFF. The following T-SQL combines all of these techniques to find the next
    date for a New England SQL Server Users Group meeting, given an input date:


    DECLARE @InputDate date = GETDATE();


    DECLARE @Thursday date = ''20000914'';


    DECLARE @FourteenthOfMonth date =


    DATEADD(month, DATEDIFF(month, @Thursday, @InputDate), @Thursday);


    DECLARE @SecondThursday date =


    DATEADD(week, (DATEDIFF(day, @Thursday, @FourteenthOfMonth) / 7), @Thursday);


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    SELECT


    CASE


    WHEN @InputDate <= @SecondThursday


    THEN @SecondThursday


    ELSE


    DATEADD(


    week,


    CASE


    WHEN DATEPART(day, @SecondThursday) <= 10 THEN 5


    ELSE 4


    END,


    @SecondThursday)


    END;


    Finding complex dates like the second Thursday of a month is not a very common
    requirement


    unless you’re writing a scheduling application. More common are requirements along
    the lines of “find all of today’s rows.” Combining the range techniques discussed
    in the previous section with the date/time calculations shown here, it becomes
    easy to design stored procedures that both efficiently and dynamically query for
    required time periods.


    How Many Candles on the Birthday Cake?


    As a final example of date/time calculations in T-SQL, consider a seemingly simple
    task: finding out how many years old you are as of today. The obvious answer is
    of course the following:


    SELECT DATEDIFF(year, @YourBirthday, GETDATE());


    Unfortunately, this answer—depending on the current day—is wrong. Consider someone
    born on


    March 25, 1965\. On March 25, 2010, that person’s 45th birthday should be celebrated.
    Yet according to SQL Server, that person was already 45 on March 24, 2010:


    SELECT DATEDIFF(year, ''19650325'', ''20100324'');


    In fact, according to SQL Server, this person was 45 throughout the whole of 2010,
    starting on January 1\. Happy New Year and happy birthday combined, thanks to
    the magic of SQL Server? Probably not; the discrepancy is due to the way SQL Server
    calculates date differences. Only the date/time component being differenced is
    considered, and any components below are truncated. This feature makes the previous
    date/time truncation examples work, but makes age calculations fail because when
    differencing years, days and months are not taken into account.


    To get around this problem, a CASE expression must be added that subtracts one
    year if the day and month of the current date is less than the day and month of
    the input date—in other words, if the person has yet to celebrate their birthday
    in the current year. The following T-SQL both accomplishes the primary goal, and
    as an added bonus, also takes leap years into consideration:


    SELECT


    DATEDIFF (


    YEAR,


    @YourBirthday,


    GETDATE()) -


    CASE


    WHEN 100 * MONTH(GETDATE()) + DAY(GETDATE())


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    < 100 * MONTH(@YourBirthday) + DAY(@YourBirthday) THEN 1


    ELSE 0


    END;


    Note that this T-SQL uses the MONTH and DAY functions, which are shorthand for
    DATEPART(month,


    <date>) and DATEPART(day, <date>), respectively.


    Defining Periods Using Calendar Tables


    Given the complexity of doing date/time calculations in order to query data efficiently,
    it makes sense to seek alternative techniques in some cases. For the most part,
    using the date/time calculation and range-matching techniques discussed in the
    previous section will yield the best possible performance.'
  trans: "## 处理时间数据\n\n将 3318 天添加到原始参考日期 2000 年 1 月 7 日，即可得到所需输出，即 2009 年 2 月 9 日之前的“最后一个星期五”，该日期为\
    \ 2009 年 2 月 6 日：\n\n```sql\nSELECT DATEADD(day, 3318, '20000107')\n```\n\n与上一个示例类似，可以通过将所有内容合并到一行来简化（并明确）表达：\n\
    \n```sql\nDECLARE @InputDate date = '20090209';\nDECLARE @Friday date = '20000107';\n\
    SELECT DATEADD(day, ((DATEDIFF(day, @Friday, @InputDate) / 7) * 7), @Friday);\n\
    ```\n\n还可以对最后一条语句进行进一步简化。目前，内部`DATEDIFF`的结果除以 7 以计算整周数，然后再乘以 7 以生成使用`DATEADD`方法添加的等效天数。但是，如果您可以直接指定以周为单位的添加时间量，则无需执行乘法转换为天，如下所示：\n\
    \n```sql\nSELECT DATEADD(week, (DATEDIFF(day, @Friday, @InputDate) / 7), @Friday);\n\
    ```\n\n请注意，在输入日期是星期五的情况下，这些示例将返回输入日期本身。如果您希望每次都返回“上一个”星期五，而绝不返回输入日期本身——即使输入日期就是星期五——则需要进行小幅修改。为此，您必须使用两个参考日期：一个代表任意已知的星期五，另一个代表该参考星期五之后一周内的任意一天（为简单起见，我推荐第二天）。通过计算这第二个参考日期与输入日期之间经过的天数，如果输入日期是星期五，四舍五入后的周数将减少一周，这意味着结果将始终是上一个星期五。以下\
    \ T-SQL 代码针对给定输入日期实现了这一点：\n\n```sql\nDECLARE @InputDate date = '20100423';\nDECLARE\
    \ @Friday date = '20000107';\nDECLARE @Saturday date = DATEADD(day, 1, @Friday);\n\
    SELECT DATEADD(week, (DATEDIFF(day, @Saturday, @InputDate) / 7), @Friday);\n```\n\
    \n通过使用此模式并切换参考日期，您可以轻松地根据输入日期找到任意星期几的“上一个”日期。要找到给定日期的“下一个”日期（例如“下一个星期五”），只需在将内部计算结果添加到参考日期之前，为其加上一周：\n\
    \n```sql\nDECLARE @InputDate datetime = GETDATE();\nDECLARE @Friday datetime =\
    \ '2000-01-07';\nSELECT DATEADD(week, (DATEDIFF(day, @Friday, @InputDate) / 7)\
    \ +1, @Friday);\n```\n\n作为日期/时间计算的最后一个示例，这里有一个稍微复杂些的需求。假设您正在访问波士顿地区，并想参加新英格兰 SQL\
    \ Server 用户组的会议。该小组在每月的第二个星期四举行会议。给定一个输入日期，您如何找到下一次会议的日期？\n\n回答这个问题需要对问题进行一点思考。第二个星期四可能出现的最早日期是当月的第一天是星期四。在这种情况下，第二个星期四出现在当月的第八天。第二个星期四可能出现的最晚日期是当月的第一天是星期五，此时第二个星期四是\
    \ 14 号。因此，对于任何给定月份，截至并包括 14 号的“上一个星期四”（换句话说，最近的星期四）将是该月的第二个星期四。以下 T-SQL 使用了这种方法：\n\
    \n```sql\nDECLARE @InputDate date = '20100101';\nDECLARE @Thursday date = '20000914';\n\
    DECLARE @FourteenthOfMonth date = DATEADD(month, DATEDIFF(month, @Thursday, @InputDate),\
    \ @Thursday);\nSELECT DATEADD(week, (DATEDIFF(day, @Thursday, @FourteenthOfMonth)\
    \ / 7), @Thursday);\n```\n\n当然，这并不是在寻找*下一次*会议；它找到的是输入日期所在月份的会议。要找到下一次会议，除了观察第二个星期四的特性外，还需要使用`CASE`表达式：如果某个月的第二个星期四落在\
    \ 8 号、9 号或 10 号，那么下个月的第二个星期四就在五周之后。否则，下个月的第二个星期四就在四周之后。\n\n要找出给定日期/时间实例所代表的月份中的日期，请使用\
    \ T-SQL 的`DATEPART`函数，该函数接受与`DATEADD`和`DATEDIFF`相同的日期粒度输入。以下 T-SQL 结合了所有这些技术，根据输入日期找出新英格兰\
    \ SQL Server 用户组会议的下一次日期：\n\n```sql\nDECLARE @InputDate date = GETDATE();\nDECLARE\
    \ @Thursday date = '20000914';\nDECLARE @FourteenthOfMonth date = DATEADD(month,\
    \ DATEDIFF(month, @Thursday, @InputDate), @Thursday);\nDECLARE @SecondThursday\
    \ date = DATEADD(week, (DATEDIFF(day, @Thursday, @FourteenthOfMonth) / 7), @Thursday);\n\
    SELECT\n  CASE\n    WHEN @InputDate <= @SecondThursday\n      THEN @SecondThursday\n\
    \    ELSE\n      DATEADD(\n        week,\n        CASE\n          WHEN DATEPART(day,\
    \ @SecondThursday) <= 10 THEN 5\n          ELSE 4\n        END,\n        @SecondThursday)\n\
    \  END;\n```\n\n查找诸如某月第二个星期四之类的复杂日期并不是一个非常常见的需求，除非您正在编写日程安排应用程序。更常见的需求是类似于“查找今天的所有记录”这样的查询。结合上一节讨论的范围技术和此处展示的日期/时间计算，可以轻松设计出既高效又能动态查询所需时间段的存储过程。\n\
    \n## 生日蛋糕上有多少根蜡烛？\n\n作为 T-SQL 中日期/时间计算的最后一个示例，考虑一个看似简单的任务：计算截至今天您是多少岁。显而易见的答案当然是以下语句：\n\
    \n```sql\nSELECT DATEDIFF(year, @YourBirthday, GETDATE());\n```\n\n不幸的是，这个答案——取决于当前日期——是错误的。考虑一个出生于\
    \ 1965 年 3 月 25 日的人。在 2010 年 3 月 25 日，应该庆祝这个人的 45 岁生日。然而，根据 SQL Server，这个人在 2010\
    \ 年 3 月 24 日就已经是 45 岁了：\n\n```sql\nSELECT DATEDIFF(year, '19650325', '20100324');\n\
    ```\n\n事实上，根据 SQL Server，这个人在整个 2010 年，从 1 月 1 日开始，都是 45 岁。新年快乐加上生日快乐，多亏了 SQL\
    \ Server 的魔力？可能并非如此；这种差异源于 SQL Server 计算日期差异的方式。它只考虑正在比较的日期/时间组件，任何更小的组件都被截断。这一特性使得前面的日期/时间截断示例能够工作，但会使年龄计算失败，因为在比较年份时，天数和月份没有被考虑进去。\n\
    \n为了解决这个问题，必须添加一个`CASE`表达式，如果当前日期的月和日小于输入日期的月和日——换句话说，如果该人在当前年份尚未庆祝其生日——则减去一岁。以下\
    \ T-SQL 既实现了主要目标，还有一个额外好处，即也考虑到了闰年：\n\n```sql\nSELECT\n  DATEDIFF(YEAR, @YourBirthday,\
    \ GETDATE()) -\n  CASE\n    WHEN 100 * MONTH(GETDATE()) + DAY(GETDATE())\n   \
    \    < 100 * MONTH(@YourBirthday) + DAY(@YourBirthday) THEN 1\n    ELSE 0\n  END;\n\
    ```\n\n请注意，此 T-SQL 使用了`MONTH`和`DAY`函数，它们分别是`DATEPART(month, <date>)`和`DATEPART(day,\
    \ <date>)`的简写形式。\n\n## 使用日历表定义周期\n\n考虑到为了高效查询数据而进行日期/时间计算的复杂性，在某些情况下寻求替代技术是合理的。在大多数情况下，使用前一节讨论的日期/时间计算和范围匹配技术将产生最佳性能。"
- fmt: "然而，在某些情况下，用户交互的便利性可能比性能更重要。很可能是那些更具技术背景的业务用户会请求直接访问以查询关键业务数据库，但他们精通 T-SQL\
    \ 足以完成复杂的日期/时间计算的可能性非常低。\n\n在这些情况下，以及本节将讨论的其他一些情况下，预定义将被查询的时间段是有意义的。可以创建一个查找表，允许用户轻松地从当前日期派生任意数量的命名周期。这些表，不足为奇地，被称为\
    \ `calendar tables`，它们可能非常有用。\n\n基本的日历表有一个充当主键的日期列，以及几个描述时间段的列。日历覆盖的日期范围内的每个日期都将在表中插入一行，可用于引用所有关联的时间段。一个标准示例可以使用以下代码清单创建：\n\
    \n```sql\nCREATE TABLE Calendar\n(\n    DateKey date PRIMARY KEY,\n    DayOfWeek\
    \ tinyint,\n    DayName nvarchar(10),\n    DayOfMonth tinyint,\n    DayOfYear\
    \ smallint,\n    WeekOfYear tinyint,\n    MonthNumber tinyint,\n    MonthName\
    \ nvarchar(10),\n    Quarter tinyint,\n    Year smallint\n);\nGO\n\nSET NOCOUNT\
    \ ON;\nDECLARE @Date date = '19900101';\nWHILE @Date < '20250101'\nBEGIN\n   \
    \ INSERT INTO Calendar\n    SELECT\n        @Date AS DateKey,\n        DATEPART(dw,\
    \ @Date) AS DayOfWeek,\n        DATENAME(dw, @Date) AS DayName,\n        DATEPART(dd,\
    \ @Date) AS DayOfMonth,\n        DATEPART(dy, @Date) AS DayOfYear,\n        DATEPART(ww,\
    \ @Date) as WeekOfYear,\n        DATEPART(mm, @Date) AS MonthNumber,\n       \
    \ DATENAME(mm, @Date) AS MonthName,\n        DATEPART(qq, @Date) AS Quarter,\n\
    \        YEAR(@Date) AS Year;\n    SET @Date = DATEADD(d, 1, @Date);\nEND\nGO\n\
    ```\n\n此表为 1990 年 1 月 1 日至 2025 年 1 月 1 日之间的每一天创建一行。我建议回溯到您将处理的数据所涉及的最早日期，并至少向前展望十年。虽然这听起来可能会产生很多行，但请记住，每十年的数据只需要大约\
    \ 3,652 行。考虑到数据库表中包含数亿行的情况很常见，这么小的数字应该很容易管理。\n\n在 `Calendar` 表中定义的列代表用户希望查找和处理的时间段。由于添加额外列不会为表增加太多空间，因此偏向于过多而不是过少可能不是个坏主意。例如，您可能希望添加列来记录财政年度、周开始和结束日期或节假日。但是，请记住，额外的列可能会使技术背景较弱的用户感到困惑。\n\
    \n一旦创建了日历表，它就可以用于上一节涵盖的许多相同计算，以及许多其他用途。首先，让我们尝试查找关于“今日行”的信息：\n\n```sql\nSELECT\
    \ *\nFROM Calendar AS Today\nWHERE Today.DateKey = CAST(GETDATE() AS date);\n\
    ```\n\n一旦确定了“今天”，就很容易找到其他日期。例如，“上周五”是 `DateKey` 值小于今天的最接近的星期五：\n\n```sql\nSELECT\
    \ TOP(1) *\nFROM Calendar LastFriday\nWHERE\n    LastFriday.DateKey < GETDATE()\n\
    \    AND LastFriday.DayOfWeek = 6\nORDER BY DateKey DESC;\n```\n\n请注意，在创建日历时我选择了默认设置，将星期日作为一周的第一天，因此对于任何星期五，`DayOfWeek`\
    \ 都将为 6。如果您选择了一周的第一天不同，您将必须更改指定的 `DayOfWeek` 值。当然，您也可以使用 `DayName` 列进行过滤，这样用户就不必知道该使用哪个数字；他们可以基于名称进行查询。`DayName`\
    \ 列是使用 `DATENAME` 函数填充的，该函数返回表示日期名称的本地化字符串（即，英语中的“Friday”）。请记住，在区域设置不同的服务器上运行此代码可能会产生不同的结果。\n\
    \n由于日历表包含定义各种周期的列，例如当前年份和一年中的第几周，因此很容易回答诸如“本周发生了什么？”之类的问题。要查找“本周”的第一天和最后一天，可以使用以下查询：\n\
    \n```sql\nSELECT\n    MIN(ThisWeek.DateKey) AS FirstDayOfWeek,\n    MAX(ThisWeek.DateKey)\
    \ AS LastDayOfWeek\nFROM Calendar AS Today\nJOIN Calendar AS ThisWeek ON\n   \
    \ ThisWeek.Year = Today.Year\n    AND ThisWeek.WeekOfYear = Today.WeekOfYear\n\
    WHERE\n    Today.DateKey = CAST(GETDATE() AS date);\n```\n\n一个类似的问题可能涉及相邻的周。例如，您可能希望确定“上周的星期五”。以下查询是此操作的首次尝试：\n\
    \n```sql\nSELECT FridayLastWeek.*\nFROM Calendar AS Today\nJOIN Calendar AS FridayLastWeek\
    \ ON\n    Today.Year = FridayLastWeek.Year\n    AND Today.WeekOfYear - 1 = FridayLastWeek.WeekOfYear\n\
    WHERE\n    Today.DateKey = CAST(GETDATE() AS date)\n    AND FridayLastWeek.DayName\
    \ = 'Friday';\n```\n\n不幸的是，这段代码存在一个边界问题，在某些情况下（例如在新年伊始附近）会导致其功能部分失效。问题在于，`WeekOfYear`\
    \ 值在新年的第一天重置为 1，无论它是星期几。该查询还在 `Year` 列上进行联接，使情况变得加倍复杂。\n\n使用 `CASE` 表达式解决这个问题可能是可行的，但会很困难，而日历表的目标是简化事情。一个好的替代解决方案是添加一个\
    \ `WeekNumber` 列，该列在整个日历所代表的时间段内为每一周连续编号。执行此操作的第一步是修改表并添加列，如下面的 T-SQL 所示：\n\n\
    ```sql\nALTER TABLE Calendar\nADD WeekNumber int NULL;\n```\n\n接下来，可以使用以下 T-SQL\
    \ 创建一个包含所有周编号的临时表：\n\n```sql\nWITH StartOfWeek (DateKey) AS\n(\n    SELECT MIN(DateKey)\n\
    \    FROM Calendar\n    UNION\n    SELECT DateKey\n    FROM Calendar\n    WHERE\
    \ DayOfWeek = 1\n),\nEndOfWeek (DateKey) AS\n(\n    SELECT DateKey\n    FROM Calendar\n\
    \    WHERE DayOfWeek = 7\n    UNION\n    SELECT MAX(DateKey)\n    FROM Calendar\n\
    )\nSELECT\n    StartOfWeek.DateKey AS StartDate,\n    (\n        SELECT TOP(1)\n\
    \        EndOfWeek.DateKey\n        FROM EndOfWeek\n        WHERE EndOfWeek.DateKey\
    \ >= StartOfWeek.DateKey\n        ORDER BY EndOfWeek.DateKey\n    ) AS EndDate,\n\
    \    ROW_NUMBER() OVER (ORDER BY StartOfWeek.DateKey) AS WeekNumber\nINTO #WeekNumbers\n\
    FROM StartOfWeek;\n```\n\n这段 T-SQL 的逻辑需要稍作解释。`StartOfWeek` 公用表表达式 (CTE) 从日历表中选择一周的第一天（`DayOfWeek\
    \ = 1`）的所有日期，此外还选择表中的最早日期（以防该日不是一周的第一天）。`EndOfWeek` CTE 使用类似的逻辑来查找每周的最后一天，以及表中的最后一天。`SELECT`\
    \ 列表包括 `StartOfWeek` CTE 每一行所代表的 `DateKey`、`EndOfWeek` CTE 中大于 `StartOfWeek` 值的最小\
    \ `DateKey` 值（即该周的结束日期），以及使用 `ROW_NUMBER` 函数生成的周编号。查询的结果被插入到一个名为 `#WeekNumbers`\
    \ 的临时表中。\n\n一旦运行了此 T-SQL，就可以使用以下代码填充日历表的新列（并将其设置为不可为 `NULL`）：\n\n```sql\nUPDATE\
    \ Calendar\nSET WeekNumber =\n(\n    SELECT WN.WeekNumber\n    FROM #WeekNumbers\
    \ AS WN\n    WHERE\n        Calendar.DateKey BETWEEN WN.StartDate AND WN.EndDate\n\
    );\n\nALTER TABLE Calendar\nALTER COLUMN WeekNumber int NOT NULL;\n```\n\n现在，使用新的\
    \ `WeekNumber` 列，查找“上周的星期五”变得几乎轻而易举：\n\n```sql\nSELECT FridayLastWeek.*\nFROM\
    \ Calendar AS Today\nJOIN Calendar AS FridayLastWeek ON\n    Today.WeekNumber\
    \ = FridayLastWeek.WeekNumber + 1\nWHERE\n    Today.DateKey = CAST(GETDATE() AS\
    \ date)\n    AND FridayLastWeek.DayName = 'Friday';\n```"
  raw: 'However, in some cases ease of user interaction may be more important than
    performance. It is quite likely that more technical business users will request
    direct access to query key business databases, but very unlikely that they will
    be savvy enough with T-SQL to be able to do complex date/time calculations.


    In these cases, as well as a few others that will be discussed in this section,
    it makes sense to predefine the time periods that will get queried. A lookup table
    can be created that allows users to derive any number of named periods from the
    current date with ease. These tables, not surprisingly, are referred to as **calendar
    tables**, and they can be extremely useful.


    The basic calendar table has a date column that acts as the primary key and several
    columns that describe time periods. Each date in the range of dates covered by
    the calendar will have one row inserted into the table, which can be used to reference
    all of the associated time periods. A standard example can be created using the
    following code listing:


    CREATE TABLE Calendar


    (


    DateKey date PRIMARY KEY,


    DayOfWeek tinyint,


    DayName nvarchar(10),


    DayOfMonth tinyint,


    DayOfYear smallint,


    WeekOfYear tinyint,


    MonthNumber tinyint,


    MonthName nvarchar(10),


    Quarter tinyint,


    Year smallint


    );


    GO


    SET NOCOUNT ON;


    DECLARE @Date date = ''19900101'';


    WHILE @Date < ''20250101''


    BEGIN


    INSERT INTO Calendar


    SELECT


    @Date AS DateKey,


    DATEPART(dw, @Date) AS DayOfWeek,


    DATENAME(dw, @Date) AS DayName,


    DATEPART(dd, @Date) AS DayOfMonth,


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    DATEPART(dy, @Date) AS DayOfYear,


    DATEPART(ww, @Date) as WeekOfYear,


    DATEPART(mm, @Date) AS MonthNumber,


    DATENAME(mm, @Date) AS MonthName,


    DATEPART(qq, @Date) AS Quarter,


    YEAR(@Date) AS Year;


    SET @Date = DATEADD(d, 1, @Date);


    END


    GO


    This table creates one row for every date between January 1, 1990 and January
    1, 2025\. I recommend going as far back as the data you’ll be working with goes,
    and at least ten years into the future. Although this sounds like it will potentially
    produce a lot of rows, keep in mind that every ten years worth of data will only
    require around 3,652 rows. Considering that it’s quite common to see database
    tables containing hundreds of millions of rows, such a small number should be
    easily manageable.


    The columns defined in the Calendar table represent the periods of time that users
    will want to find and work with. Since creating additional columns will not add
    too much space to the table, it’s probably not a bad idea to err on the side of
    too many rather than too few. You might, for example, want to add columns to record
    fiscal years, week start and end dates, or holidays. However, keep in mind that
    additional columns may make the table more confusing for less-technical users.


    Once the calendar table has been created, it can be used for many of the same
    calculations covered in the last section, as well as for many other uses. To start
    off simply, let’s try finding information about


    “today’s row”:


    SELECT *


    FROM Calendar AS Today


    WHERE Today.DateKey = CAST(GETDATE() AS date);


    Once you’ve identified “today,” it’s simple to find other days. For example, “Last
    Friday” is the most recent Friday with a DateKey value less than today:


    SELECT TOP(1) *


    FROM Calendar LastFriday


    WHERE


    LastFriday.DateKey < GETDATE()


    AND LastFriday.DayOfWeek = 6


    ORDER BY DateKey DESC;


    Note that I selected the default setting of Sunday as first day of the week when
    I created my calendar table, so DayOfWeek will be 6 for any Friday. If you select
    a different first day of the week, you’ll have to change the DayOfWeek value specified.
    You could of course filter using the DayName column instead so that users will
    not have to know which number to use; they can query based on the name. The DayName
    column was populated using the DATENAME function, which returns a localized character
    string representing the day name (i.e., “Friday,” in English). Keep in mind that
    running this code on servers with different locale settings may produce different
    results.


    Since the calendar table contains columns that define various periods, such as
    the current year and the week of the year, it becomes easy to answer questions
    such as “What happened this week?” To find the first and last days of “this week,”
    the following query can be used:


    SELECT


    MIN(ThisWeek.DateKey) AS FirstDayOfWeek,


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    MAX(ThisWeek.DateKey) AS LastDayOfWeek


    FROM Calendar AS Today


    JOIN Calendar AS ThisWeek ON


    ThisWeek.Year = Today.Year


    AND ThisWeek.WeekOfYear = Today.WeekOfYear


    WHERE


    Today.DateKey = CAST(GETDATE() AS date);


    A similar question might deal with adjacent weeks. For instance, you may wish
    to identify “Friday of last week.” The following query is a first attempt at doing
    so:


    SELECT FridayLastWeek.*


    FROM Calendar AS Today


    JOIN Calendar AS FridayLastWeek ON


    Today.Year = FridayLastWeek.Year


    AND Today.WeekOfYear - 1 = FridayLastWeek.WeekOfYear


    WHERE


    Today.DateKey = CAST(GETDATE() AS date)


    AND FridayLastWeek.DayName = ''Friday'';


    Unfortunately, this code has an edge problem that will cause it to be somewhat
    nonfunctional around the first of the year in certain cases. The issue is that
    the WeekOfYear value resets to 1 on the first day of a new year, regardless of
    what day it falls on. The query also joins on the Year column, making the situation
    doubly complex.


    Working around the issue using a CASE expression may be possible, but it will
    be difficult, and the goal of the calendar table is to simplify things. A good
    alternative solution is to add a WeekNumber column that numbers every week consecutively
    for the entire duration represented by the calendar. The first step in doing this
    is to alter the table and add the column, as shown by the following T-SQL: ALTER
    TABLE Calendar


    ADD WeekNumber int NULL;


    Next, a temporary table of all of the week numbers can be created, using the following
    T-SQL: WITH StartOfWeek (DateKey) AS


    (


    SELECT MIN(DateKey)


    FROM Calendar


    UNION


    SELECT DateKey


    FROM Calendar


    WHERE DayOfWeek = 1


    ),


    EndOfWeek (DateKey) AS


    (


    SELECT DateKey


    FROM Calendar


    WHERE DayOfWeek = 7


    UNION


    SELECT MAX(DateKey)


    FROM Calendar


    )


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    SELECT


    StartOfWeek.DateKey AS StartDate,


    (


    SELECT TOP(1)


    EndOfWeek.DateKey


    FROM EndOfWeek


    WHERE EndOfWeek.DateKey >= StartOfWeek.DateKey


    ORDER BY EndOfWeek.DateKey


    ) AS EndDate,


    ROW_NUMBER() OVER (ORDER BY StartOfWeek.DateKey) AS WeekNumber


    INTO #WeekNumbers


    FROM StartOfWeek;


    The logic of this T-SQL should be explained a bit. The StartOfWeek CTE selects
    each day from the calendar table where the day of the week is 1, in addition to
    the earliest date in the table, in case that day is not the first day of a week.
    The EndOfWeek CTE uses similar logic to find the last day of every week, in addition
    to the last day represented in the table. The SELECT list includes the DateKey
    represented for each row of the StartOfWeek CTE, the lowest DateKey value from
    the EndOfWeek CTE that’s greater than the StartOfWeek value (which is the end
    of the week), and a week number generated using the


    ROW_NUMBER function. The results of the query are inserted into a temporary table
    called #WeekNumbers.


    Once this T-SQL has been run, the calendar table’s new column can be populated
    (and set to be nonnullable), using the following code:


    UPDATE Calendar


    SET WeekNumber =


    (


    SELECT WN.WeekNumber


    FROM #WeekNumbers AS WN


    WHERE


    Calendar.DateKey BETWEEN WN.StartDate AND WN.EndDate


    );


    ALTER TABLE Calendar


    ALTER COLUMN WeekNumber int NOT NULL;


    Now, using the new WeekNumber column, finding “Friday of last week” becomes almost
    trivially simple:


    SELECT FridayLastWeek.*


    FROM Calendar AS Today


    JOIN Calendar AS FridayLastWeek ON


    Today.WeekNumber = FridayLastWeek.WeekNumber + 1


    WHERE


    Today.DateKey = CAST(GETDATE() AS date)


    AND FridayLastWeek.DayName = ''Friday'';'
  trans: "\n然而，在某些情况下，用户交互的便利性可能比性能更重要。很可能是那些更具技术背景的业务用户会请求直接访问以查询关键业务数据库，但他们精通 T-SQL\
    \ 足以完成复杂的日期/时间计算的可能性非常低。\n\n在这些情况下，以及本节将讨论的其他一些情况下，预定义将被查询的时间段是有意义的。可以创建一个查找表，允许用户轻松地从当前日期派生任意数量的命名周期。这些表，不足为奇地，被称为\
    \ `calendar tables`，它们可能非常有用。\n\n基本的日历表有一个充当主键的日期列，以及几个描述时间段的列。日历覆盖的日期范围内的每个日期都将在表中插入一行，可用于引用所有关联的时间段。一个标准示例可以使用以下代码清单创建：\n\
    \n```sql\nCREATE TABLE Calendar\n(\n    DateKey date PRIMARY KEY,\n    DayOfWeek\
    \ tinyint,\n    DayName nvarchar(10),\n    DayOfMonth tinyint,\n    DayOfYear\
    \ smallint,\n    WeekOfYear tinyint,\n    MonthNumber tinyint,\n    MonthName\
    \ nvarchar(10),\n    Quarter tinyint,\n    Year smallint\n);\nGO\n\nSET NOCOUNT\
    \ ON;\nDECLARE @Date date = '19900101';\nWHILE @Date < '20250101'\nBEGIN\n   \
    \ INSERT INTO Calendar\n    SELECT\n        @Date AS DateKey,\n        DATEPART(dw,\
    \ @Date) AS DayOfWeek,\n        DATENAME(dw, @Date) AS DayName,\n        DATEPART(dd,\
    \ @Date) AS DayOfMonth,\n        DATEPART(dy, @Date) AS DayOfYear,\n        DATEPART(ww,\
    \ @Date) as WeekOfYear,\n        DATEPART(mm, @Date) AS MonthNumber,\n       \
    \ DATENAME(mm, @Date) AS MonthName,\n        DATEPART(qq, @Date) AS Quarter,\n\
    \        YEAR(@Date) AS Year;\n    SET @Date = DATEADD(d, 1, @Date);\nEND\nGO\n\
    ```\n\n此表为 1990 年 1 月 1 日至 2025 年 1 月 1 日之间的每一天创建一行。我建议回溯到您将处理的数据所涉及的最早日期，并至少向前展望十年。虽然这听起来可能会产生很多行，但请记住，每十年的数据只需要大约\
    \ 3,652 行。考虑到数据库表中包含数亿行的情况很常见，这么小的数字应该很容易管理。\n\n在 `Calendar` 表中定义的列代表用户希望查找和处理的时间段。由于添加额外列不会为表增加太多空间，因此偏向于过多而不是过少可能不是个坏主意。例如，您可能希望添加列来记录财政年度、周开始和结束日期或节假日。但是，请记住，额外的列可能会使技术背景较弱的用户感到困惑。\n\
    \n一旦创建了日历表，它就可以用于上一节涵盖的许多相同计算，以及许多其他用途。首先，让我们尝试查找关于“今日行”的信息：\n\n```sql\nSELECT\
    \ *\nFROM Calendar AS Today\nWHERE Today.DateKey = CAST(GETDATE() AS date);\n\
    ```\n\n一旦确定了“今天”，就很容易找到其他日期。例如，“上周五”是 `DateKey` 值小于今天的最接近的星期五：\n\n```sql\nSELECT\
    \ TOP(1) *\nFROM Calendar LastFriday\nWHERE\n    LastFriday.DateKey < GETDATE()\n\
    \    AND LastFriday.DayOfWeek = 6\nORDER BY DateKey DESC;\n```\n\n请注意，在创建日历时我选择了默认设置，将星期日作为一周的第一天，因此对于任何星期五，`DayOfWeek`\
    \ 都将为 6。如果您选择了一周的第一天不同，您将必须更改指定的 `DayOfWeek` 值。当然，您也可以使用 `DayName` 列进行过滤，这样用户就不必知道该使用哪个数字；他们可以基于名称进行查询。`DayName`\
    \ 列是使用 `DATENAME` 函数填充的，该函数返回表示日期名称的本地化字符串（即，英语中的“Friday”）。请记住，在区域设置不同的服务器上运行此代码可能会产生不同的结果。\n\
    \n由于日历表包含定义各种周期的列，例如当前年份和一年中的第几周，因此很容易回答诸如“本周发生了什么？”之类的问题。要查找“本周”的第一天和最后一天，可以使用以下查询：\n\
    \n```sql\nSELECT\n    MIN(ThisWeek.DateKey) AS FirstDayOfWeek,\n    MAX(ThisWeek.DateKey)\
    \ AS LastDayOfWeek\nFROM Calendar AS Today\nJOIN Calendar AS ThisWeek ON\n   \
    \ ThisWeek.Year = Today.Year\n    AND ThisWeek.WeekOfYear = Today.WeekOfYear\n\
    WHERE\n    Today.DateKey = CAST(GETDATE() AS date);\n```\n\n一个类似的问题可能涉及相邻的周。例如，您可能希望确定“上周的星期五”。以下查询是此操作的首次尝试：\n\
    \n```sql\nSELECT FridayLastWeek.*\nFROM Calendar AS Today\nJOIN Calendar AS FridayLastWeek\
    \ ON\n    Today.Year = FridayLastWeek.Year\n    AND Today.WeekOfYear - 1 = FridayLastWeek.WeekOfYear\n\
    WHERE\n    Today.DateKey = CAST(GETDATE() AS date)\n    AND FridayLastWeek.DayName\
    \ = 'Friday';\n```\n\n不幸的是，这段代码存在一个边界问题，在某些情况下（例如在新年伊始附近）会导致其功能部分失效。问题在于，`WeekOfYear`\
    \ 值在新年的第一天重置为 1，无论它是星期几。该查询还在 `Year` 列上进行联接，使情况变得加倍复杂。\n\n使用 `CASE` 表达式解决这个问题可能是可行的，但会很困难，而日历表的目标是简化事情。一个好的替代解决方案是添加一个\
    \ `WeekNumber` 列，该列在整个日历所代表的时间段内为每一周连续编号。执行此操作的第一步是修改表并添加列，如下面的 T-SQL 所示：\n\n\
    ```sql\nALTER TABLE Calendar\nADD WeekNumber int NULL;\n```\n\n接下来，可以使用以下 T-SQL\
    \ 创建一个包含所有周编号的临时表：\n\n```sql\nWITH StartOfWeek (DateKey) AS\n(\n    SELECT MIN(DateKey)\n\
    \    FROM Calendar\n    UNION\n    SELECT DateKey\n    FROM Calendar\n    WHERE\
    \ DayOfWeek = 1\n),\nEndOfWeek (DateKey) AS\n(\n    SELECT DateKey\n    FROM Calendar\n\
    \    WHERE DayOfWeek = 7\n    UNION\n    SELECT MAX(DateKey)\n    FROM Calendar\n\
    )\nSELECT\n    StartOfWeek.DateKey AS StartDate,\n    (\n        SELECT TOP(1)\n\
    \        EndOfWeek.DateKey\n        FROM EndOfWeek\n        WHERE EndOfWeek.DateKey\
    \ >= StartOfWeek.DateKey\n        ORDER BY EndOfWeek.DateKey\n    ) AS EndDate,\n\
    \    ROW_NUMBER() OVER (ORDER BY StartOfWeek.DateKey) AS WeekNumber\nINTO #WeekNumbers\n\
    FROM StartOfWeek;\n```\n\n这段 T-SQL 的逻辑需要稍作解释。`StartOfWeek` 公用表表达式 (CTE) 从日历表中选择一周的第一天（`DayOfWeek\
    \ = 1`）的所有日期，此外还选择表中的最早日期（以防该日不是一周的第一天）。`EndOfWeek` CTE 使用类似的逻辑来查找每周的最后一天，以及表中的最后一天。`SELECT`\
    \ 列表包括 `StartOfWeek` CTE 每一行所代表的 `DateKey`、`EndOfWeek` CTE 中大于 `StartOfWeek` 值的最小\
    \ `DateKey` 值（即该周的结束日期），以及使用 `ROW_NUMBER` 函数生成的周编号。查询的结果被插入到一个名为 `#WeekNumbers`\
    \ 的临时表中。\n\n一旦运行了此 T-SQL，就可以使用以下代码填充日历表的新列（并将其设置为不可为 `NULL`）：\n\n```sql\nUPDATE\
    \ Calendar\nSET WeekNumber =\n(\n    SELECT WN.WeekNumber\n    FROM #WeekNumbers\
    \ AS WN\n    WHERE\n        Calendar.DateKey BETWEEN WN.StartDate AND WN.EndDate\n\
    );\n\nALTER TABLE Calendar\nALTER COLUMN WeekNumber int NOT NULL;\n```\n\n现在，使用新的\
    \ `WeekNumber` 列，查找“上周的星期五”变得几乎轻而易举：\n\n```sql\nSELECT FridayLastWeek.*\nFROM\
    \ Calendar AS Today\nJOIN Calendar AS FridayLastWeek ON\n    Today.WeekNumber\
    \ = FridayLastWeek.WeekNumber + 1\nWHERE\n    Today.DateKey = CAST(GETDATE() AS\
    \ date)\n    AND FridayLastWeek.DayName = 'Friday';\n```\n"
- fmt: "# CHAPTER 11 „ WORKING WITH TEMPORAL DATA\n\nOf course, one key problem still\
    \ remains: finding the date of the next New England SQL Server Users Group meeting,\
    \ which takes place on the second Thursday of each month. There are a couple of\
    \ ways that a calendar table can be used to address this dilemma. The first method,\
    \ of course, is to query the calendar table directly. The following T-SQL is one\
    \ way of doing so:\n\n```sql\nWITH NextTwoMonths AS\n(\n    SELECT\n        Year,\n\
    \        MonthNumber\n    FROM Calendar\n    WHERE\n        DateKey IN (\n   \
    \         CAST(GETDATE() AS date),\n            DATEADD(month, 1, CAST(GETDATE()\
    \ AS date)))\n),\nNumberedThursdays AS\n(\n    SELECT\n        Thursdays.*,\n\
    \        ROW_NUMBER() OVER (PARTITION BY Thursdays.MonthNumber ORDER BY DateKey)\
    \ AS ThursdayNumber\n    FROM Calendar Thursdays\n    JOIN NextTwoMonths ON\n\
    \        NextTwoMonths.Year = Thursdays.Year\n        AND NextTwoMonths.MonthNumber\
    \ = Thursdays.MonthNumber\n    WHERE\n        Thursdays.DayName = 'Thursday'\n\
    )\nSELECT TOP(1)\n    NumberedThursdays.*\nFROM NumberedThursdays\nWHERE\n   \
    \ NumberedThursdays.DateKey >= CAST(GETDATE() AS date)\n    AND NumberedThursdays.ThursdayNumber\
    \ = 2\nORDER BY NumberedThursdays.DateKey;\n```\n\nIf you find this T-SQL to be\
    \ just a bit on the confusing side, don’t be concerned! Here’s how it works: first,\
    \ the code finds the month and year for the current month and the next month,\
    \ using the `NextTwoMonths` CTE. Then, in the `NumberedThursdays` CTE, every Thursday\
    \ for those two months is identified and numbered sequentially. Finally, the lowest\
    \ Thursday with a number of 2 (meaning that it’s a second Thursday) that falls\
    \ on a day on or after \"today\" is returned.\n\nLuckily, such complex T-SQL can\
    \ often be made obsolete using calendar tables. The calendar table demonstrated\
    \ here already represents a variety of generic named days and time periods. There\
    \ is, of course, no reason that you can’t add your own columns to create named\
    \ periods specific to your business requirements. Asking for the next second Thursday\
    \ would have been much easier had there simply been a prepopulated column representing\
    \ user group meeting days.\n\n## Calculating Business Days\n\nA much more common\
    \ requirement is figuring out which days are business days. This information is\
    \ essential for determining work schedules, metrics relating to service-level\
    \ agreements, and other common business needs. Although you could simply count\
    \ out the weekend days, this would fail to take into account national holidays,\
    \ state and local holidays that your business might observe, and company retreat\
    \ days or other days off that might be specific to your firm.\n\nTo address all\
    \ of these issues in one shot, simply add a column to the table called `HolidayDescription`:\n\
    \n```sql\nALTER TABLE Calendar\nADD HolidayDescription varchar(50) NULL;\n```\n\
    \nThis column can be populated for any holiday, be it national, local, firm-specific,\
    \ or a weekend day.\n\nIf you do not need to record a full description associated\
    \ with each holiday, then you could instead populate the column with a set of\
    \ simple flag values representing different types of holidays. This makes it easy\
    \ to answer questions such as \"How many business days do we have this month?\"\
    \ The following T-SQL answers that one:\n\n```sql\nSELECT COUNT(*)\nFROM Calendar\
    \ AS ThisMonth\nWHERE\n    HolidayDescription IS NULL\n    AND EXISTS\n    (\n\
    \        SELECT *\n        FROM Calendar AS Today\n        WHERE\n           \
    \ Today.DateKey = CAST(GETDATE() as date)\n            AND Today.Year = ThisMonth.Year\n\
    \            AND Today.MonthNumber = ThisMonth.MonthNumber\n    );\n```\n\nThis\
    \ query counts the number of days in the current month that are not flagged as\
    \ holidays. If you only want to count the working weekdays, you can add an additional\
    \ condition to the `WHERE` clause to exclude rows where the `DayName` is `Saturday`\
    \ or `Sunday`.\n\n## Handling Seasonal Periods\n\nIf your business is seasonally\
    \ affected, try adding a column that helps you identify various seasonal time\
    \ periods, such as \"early spring,\" \"midsummer,\" or \"the holiday season\"\
    \ to help with analytical queries based on these time periods. Or you might find\
    \ that several additional columns are necessary to reflect all of the time periods\
    \ that are important to your queries."
  raw: 'Of course, one key problem still remains: finding the date of the next New
    England SQL Server Users Group meeting, which takes place on the second Thursday
    of each month. There are a couple of ways that a calendar table can be used to
    address this dilemma. The first method, of course, is to query the calendar table
    directly. The following T-SQL is one way of doing so:


    WITH NextTwoMonths AS


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    (


    SELECT


    Year,


    MonthNumber


    FROM Calendar


    WHERE


    DateKey IN (


    CAST(GETDATE() AS date),


    DATEADD(month, 1, CAST(GETDATE() AS date)))


    ),


    NumberedThursdays AS


    (


    SELECT


    Thursdays.*,


    ROW_NUMBER() OVER (PARTITION BY Thursdays.MonthNumber ORDER BY DateKey)


    AS ThursdayNumber


    FROM Calendar Thursdays


    JOIN NextTwoMonths ON


    NextTwoMonths.Year = Thursdays.Year


    AND NextTwoMonths.MonthNumber = Thursdays.MonthNumber


    WHERE


    Thursdays.DayName = ''Thursday''


    )


    SELECT TOP(1)


    NumberedThursdays.*


    FROM NumberedThursdays


    WHERE


    NumberedThursdays.DateKey >= CAST(GETDATE() AS date)


    AND NumberedThursdays.ThursdayNumber = 2


    ORDER BY NumberedThursdays.DateKey;


    If you find this T-SQL to be just a bit on the confusing side, don’t be concerned!
    Here’s how it works: first, the code finds the month and year for the current
    month and the next month, using the NextTwoMonths CTE. Then, in the NumberedThursdays
    CTE, every Thursday for those two months is identified and numbered sequentially.
    Finally, the lowest Thursday with a number of 2 (meaning that it’s a second Thursday)
    that falls on a day on or after “today” is returned.


    Luckily, such complex T-SQL can often be made obsolete using calendar tables.
    The calendar table demonstrated here already represents a variety of generic named
    days and time periods. There is, of course, no reason that you can’t add your
    own columns to create named periods specific to your business requirements. Asking
    for the next second Thursday would have been much easier had there simply been
    a prepopulated column representing user group meeting days.


    A much more common requirement is figuring out which days are business days. This
    information is essential for determining work schedules, metrics relating to service-level
    agreements, and other common business needs. Although you could simply count out
    the weekend days, this would fail to take into account national holidays, state
    and local holidays that your business might observe, and company retreat days
    or other days off that might be specific to your firm.


    To address all of these issues in one shot, simply add a column to the table called


    HolidayDescription:


    ALTER TABLE Calendar


    ADD HolidayDescription varchar(50) NULL;


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    This column can be populated for any holiday, be it national, local, firm-specific,
    or a weekend day.


    If you do not need to record a full description associated with each holiday,
    then you could instead populate the column with a set of simple flag values representing
    different types of holidays. This makes it easy to answer questions such as “How
    many business days do we have this month?” The following TSQL answers that one:


    SELECT COUNT(*)


    FROM Calendar AS ThisMonth


    WHERE


    HolidayDescription IS NULL


    AND EXISTS


    (


    SELECT *


    FROM Calendar AS Today


    WHERE


    Today.DateKey = CAST(GETDATE() as date)


    AND Today.Year = ThisMonth.Year


    AND Today.MonthNumber = ThisMonth.MonthNumber


    );


    This query counts the number of days in the current month that are not flagged
    as holidays. If you only want to count the working weekdays, you can add an additional
    condition to the WHERE clause to exclude rows where the DayName is Saturday or
    Sunday.


    If your business is seasonally affected, try adding a column that helps you identify
    various seasonal time periods, such as “early spring,” “midsummer,” or “the holiday
    season” to help with analytical queries based on these time periods. Or you might
    find that several additional columns are necessary to reflect all of the time
    periods that are important to your queries.'
  trans: "\n# 第 11 章 处理时间数据\n\n当然，一个关键问题仍然存在：找出新英格兰 SQL Server 用户组下一次会议的日期，该会议在每月的第二个星期四举行。有几种方法可以利用日历来解决这个难题。第一种方法，当然是直接查询日历表。以下\
    \ T-SQL 代码展示了一种实现方式：\n\n```sql\nWITH NextTwoMonths AS\n(\n    SELECT\n       \
    \ Year,\n        MonthNumber\n    FROM Calendar\n    WHERE\n        DateKey IN\
    \ (\n            CAST(GETDATE() AS date),\n            DATEADD(month, 1, CAST(GETDATE()\
    \ AS date)))\n),\nNumberedThursdays AS\n(\n    SELECT\n        Thursdays.*,\n\
    \        ROW_NUMBER() OVER (PARTITION BY Thursdays.MonthNumber ORDER BY DateKey)\
    \ AS ThursdayNumber\n    FROM Calendar Thursdays\n    JOIN NextTwoMonths ON\n\
    \        NextTwoMonths.Year = Thursdays.Year\n        AND NextTwoMonths.MonthNumber\
    \ = Thursdays.MonthNumber\n    WHERE\n        Thursdays.DayName = 'Thursday'\n\
    )\nSELECT TOP(1)\n    NumberedThursdays.*\nFROM NumberedThursdays\nWHERE\n   \
    \ NumberedThursdays.DateKey >= CAST(GETDATE() AS date)\n    AND NumberedThursdays.ThursdayNumber\
    \ = 2\nORDER BY NumberedThursdays.DateKey;\n```\n\n如果你觉得这段 T-SQL 代码有点令人困惑，别担心！它是这样工作的：首先，代码使用\
    \ `NextTwoMonths` 公共表表达式 (CTE) 找出当前月份和下个月的年份与月份。接着，在 `NumberedThursdays` CTE 中，这两个月中的每个星期四都被识别出来并按顺序编号。最后，返回日期在“今天”或之后、且编号为\
    \ 2（表示是第二个星期四）的最早的星期四。\n\n幸运的是，像这样复杂的 T-SQL 代码通常可以通过日历表变得过时。这里演示的日历表已经包含了各种通用的命名日期和时间段。当然，没有理由阻止你添加自己的列，以创建符合你业务需求的特定命名时间段。如果有一个预先填充的列来表示用户组会议日，那么询问下一个第二个星期四就会容易得多。\n\
    \n## 计算工作日\n\n一个更常见的需求是弄清楚哪些天是工作日。这对于确定工作时间表、与服务水平协议相关的度量以及其他常见的业务需求至关重要。虽然你可以简单地数出周末天数，但这将无法考虑国家法定假日、你的企业可能遵守的州和地方假日，以及可能特定于你公司的团队建设日或其他休假。\n\
    \n为了同时解决所有这些问题，只需在表中添加一个名为 `HolidayDescription` 的列：\n\n```sql\nALTER TABLE Calendar\n\
    ADD HolidayDescription varchar(50) NULL;\n```\n\n这个列可以为任何假日填充，无论是国家的、地方的、公司特有的，还是周末日。\n\
    \n如果你不需要为每个假日记录完整的描述，那么你可以改用一组简单的标志值来填充该列，代表不同类型的假日。这使得回答诸如“我们这个月有多少个工作日？”这样的问题变得容易。以下\
    \ T-SQL 回答了这个问题：\n\n```sql\nSELECT COUNT(*)\nFROM Calendar AS ThisMonth\nWHERE\n\
    \    HolidayDescription IS NULL\n    AND EXISTS\n    (\n        SELECT *\n   \
    \     FROM Calendar AS Today\n        WHERE\n            Today.DateKey = CAST(GETDATE()\
    \ as date)\n            AND Today.Year = ThisMonth.Year\n            AND Today.MonthNumber\
    \ = ThisMonth.MonthNumber\n    );\n```\n\n此查询统计当前月份中未被标记为假日的天数。如果你只想计算工作日（周一至周五），可以在\
    \ `WHERE` 子句中添加一个额外条件，以排除 `DayName` 为 `Saturday` 或 `Sunday` 的行。\n\n## 处理季节性时段\n\
    \n如果你的业务受季节影响，可以尝试添加一个列，帮助你识别各种季节性时段，例如“早春”、“仲夏”或“节假日季”，以协助基于这些时段的分析查询。或者，你可能会发现需要几个额外的列来反映对你的查询重要的所有时间段。\n"
- fmt: "# CHAPTER 11: WORKING WITH TEMPORAL DATA\n\nUsing calendar tables can make\
    \ time period–oriented queries easier to perform, but remember that they require\
    \ ongoing maintenance. Make sure to document processes for keeping defined time\
    \ periods up to date, as well as for adding additional days to the calendar to\
    \ make sure that your data doesn’t overrun the scope of the available days. You\
    \ may want to add an additional year of days on the first of each year in order\
    \ to maintain a constant ten-year buffer.\n\n## Dealing with Time Zones\n\nOne\
    \ of the consequences of moving into a global economy is the complexity that doing\
    \ business with people in different areas brings to the table. Language barriers\
    \ aside, one of the most important issues arises from the problems of time variance.\
    \ Essentially, any system that needs to work with people simultaneously residing\
    \ in different areas must be able to properly handle the idea that those people\
    \ do not all have their watches set the same way.\n\nIn 1884, 24 standard time\
    \ zones were defined at a meeting of delegates in Washington, DC, for the International\
    \ Meridian Conference. Each of these time zones represents a 1-hour offset, which\
    \ is determined in relation to the Prime Meridian, the time zone of Greenwich,\
    \ England. This central time zone is referred to either as `GMT` (Greenwich Mean\
    \ Time) or `UTC` (Universel Temps Coordonné, French for “Coordinated Universal\
    \ Time”). The standard time zones are illustrated in Figure 11-3.\n\n*Figure 11-3\\\
    . Standard time zones of the world*\n\nThe key benefit of defining these standard\
    \ zones is that, if two people know the offset of the zone in which the other\
    \ is located, and they are synchronized to the same `UTC`-specific clock, it is\
    \ possible to determine each other’s time wherever they are on earth.\n\nAs I\
    \ write these words, it’s just after 8:15 a.m. in England, but since we’re currently\
    \ observing British Summer Time (`BST`), this time represents `UTC + 1 hour`.\
    \ Many other countries in the Northern hemisphere that observe daylight savings\
    \ time are also currently 1 hour ahead of their normal time zone.\n\nThe Eastern\
    \ United States, for example, is normally `UTC – 5`, but right now is actually\
    \ `UTC – 4`, making it 3:15 a.m.\n\n**Note:** Different countries switch into\
    \ and back from daylight savings time at different times: for example, the time\
    \ difference between the United Kingdom and mainland Chile can be three, four,\
    \ or five hours, depending on the time of year.\n\nElsewhere around the world,\
    \ I can instantly deduce that it is 2:15 p.m. local time in Bangkok, Thailand,\
    \ which uses an offset of `UTC + 7`. Unfortunately, not all of the countries in\
    \ the world use the standard zones. For instance, it is 12:45 p.m. in Mumbai,\
    \ India right now; India uses a nonstandard offset of `UTC + 5.5`. Time zones,\
    \ as it turns out, are really just as much about political boundaries as they\
    \ are about keeping the right time globally.\n\nThere are three central issues\
    \ to worry about when writing time zone–specific software:\n\nWhen a user sees\
    \ data presented by the application, any dates should be rendered in the user’s\
    \ local time zone (if known), unless otherwise noted, in which case data should\
    \ generally be rendered in `UTC` to avoid confusion.\n\nWhen a user submits new\
    \ data or updates existing data, thereby altering date/time data in the database,\
    \ the database should convert the data from the user’s time zone to a standard\
    \ time zone (again, this will generally be `UTC`). All date/time data in the database\
    \ should be standardized to a specific zone so that, based on known offsets, it\
    \ can be easily converted to users’ local times. It can also be important to store\
    \ both the original zone and the local time in the zone in which a given event\
    \ occurred, for greater control and auditability. There are various ways of modeling\
    \ such data, as I’ll discuss shortly. Given that start and end dates for daylight\
    \ savings times occasionally change, it can be difficult to derive the original\
    \ local times from a time stored only in `UTC` or only with an offset. If you\
    \ will need to report or query based on local times in which events occurred,\
    \ consider persisting them as-is in addition to storing the times standardized\
    \ to `UTC`.\n\nWhen a user asks a temporally based question, it’s important to\
    \ decide whether the dates used to ask the question will be used as-is (possibly\
    \ in the user’s local time zone) or converted to the standard time zone first.\
    \ Consider a user in New York asking the question, “What happened between 2:00\
    \ p.m. and 5:00 p.m. today?” If date/time data in the database is all based in\
    \ the `UTC` zone, it’s unclear whether the user is referring to 2:00 p.m. to 5:00\
    \ p.m. `EST` or `UTC`—very different questions! The actual requirements here will\
    \ vary based on business requirements, but it is a good idea to put a note on\
    \ any screen in which this may be an issue to remind the user of what’s going\
    \ on.\n\nDealing with these issues is not actually too difficult, but it does\
    \ require a good amount of discipline and attention to detail, not to mention\
    \ some data about time zone offsets and daylight savings changes in various zones.\
    \ It’s a good idea to handle as much of the work as possible in the application\
    \ layer, but some (or sometimes all) of the responsibility will naturally spill\
    \ into the data layer. So how should we deal with handling multiple time zones\
    \ within the database? In the following sections I’ll discuss two possible models\
    \ for dealing with this problem.\n\n## Storing UTC Time\n\nThe basic technique\
    \ for storing temporal data for global applications is to maintain time zone settings\
    \ for each user of the system so that when they log in, you can find out what\
    \ zone you should treat their data as native to. Any time you need to show the\
    \ user dates and times, convert them to the user’s local zone; and any time the\
    \ user enters dates or times into the application for either searching or as data\
    \ points, convert them into `UTC` before they hit the database.\n\nThis approach\
    \ requires some changes to the database code. For example, whenever the `GETDATE()`\
    \ function is used to insert data, you should instead use the `GETUTCDATE()` function,\
    \ which returns the current date/time in Greenwich. However, this rule only applies\
    \ unconditionally for inserts; if you’re converting a database from local time\
    \ to `UTC`, a blind find/replace-style conversion from `GETDATE()` to `GETUTCDATE()`\
    \ may not yield the expected results. For instance, consider the following stored\
    \ procedure, which selects “today’s” orders from the `AdventureWorks` `Sales.SalesOrderHeader`\
    \ table:\n\n```sql\nCREATE PROCEDURE GetTodaysOrders\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON\n\n    SELECT\n        OrderDate,\n        SalesOrderNumber,\n        AccountNumber,\n\
    \        TotalDue\n    FROM Sales.SalesOrderHeader\n    WHERE\n        CAST(OrderDate\
    \ as date) = CAST(GETDATE() AS date)\nEND;\n```\n\nAssuming that the `Sales.SalesOrderHeader`\
    \ table contains date/time values defined in `UTC`, it might seem like changing\
    \ the `GETDATE()` calls in this code to `GETUTCDATE()` is a natural follow-up\
    \ move. However, what if your application is hosted in New York, in which case\
    \ the majority of your users are used to seeing and dealing with times synchronized\
    \ to Eastern Standard Time (`EST`)? In such cases, the definition of “today’s\
    \ orders” becomes ambiguous, depending on whether “today” is measured according\
    \ to `EST` or `UTC`. Although for the most part `CAST(GETDATE() AS date)` will\
    \ return the same as `CAST(GETUTCDATE() AS date)`, there are 4 hours of each day\
    \ (or sometimes 5, depending on daylight savings settings) in which the date as\
    \ measured using `UTC` will be one day ahead of the date measured according to\
    \ `EST`. If this query were to be called after 7:00 or 8:00 p.m. `EST` (again,\
    \ depending on the time of year), `GETUTCDATE()` will return a date/time that\
    \ for people in the eastern United States is “tomorrow.” The time portion will\
    \ be truncated, and the query won’t return any of “today’s” data at all—at least\
    \ not if you’re expecting things to work using `EST` rules."
  raw: 'Using calendar tables can make time period–oriented queries easier to perform,
    but remember that they require ongoing maintenance. Make sure to document processes
    for keeping defined time periods up to date, as well as for adding additional
    days to the calendar to make sure that your data doesn’t overrun the scope of
    the available days. You may want to add an additional year of days on the first
    of each year in order to maintain a constant ten-year buffer.


    Dealing with Time Zones


    One of the consequences of moving into a global economy is the complexity that
    doing business with people in different areas brings to the table. Language barriers
    aside, one of the most important issues arises from the problems of time variance.
    Essentially, any system that needs to work with people simultaneously residing
    in different areas must be able to properly handle the idea that those people
    do not all have their watches set the same way.


    In 1884, 24 standard time zones were defined at a meeting of delegates in Washington,
    DC, for the International Meridian Conference. Each of these time zones represents
    a 1-hour offset, which is determined in relation to the Prime Meridian, the time
    zone of Greenwich, England. This central time zone is referred to either as GMT
    (Greenwich Mean Time) or UTC (Universel Temps Coordonné, French for “Coordinated
    Universal Time”). The standard time zones are illustrated in Figure 11-3.


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    *Figure 11-3\. Standard time zones of the world*


    The key benefit of defining these standard zones is that, if two people know the
    offset of the zone in which the other is located, and they are synchronized to
    the same UTC-specific clock, it is possible to determine each other’s time wherever
    they are on earth.


    As I write these words, it’s just after 8:15 a.m. in England, but since we’re
    currently observing British Summer Time (BST), this time represents UTC + 1 hour.
    Many other countries in the Northern


    hemisphere that observe daylight savings time are also currently 1 hour ahead
    of their normal time zone.


    The Eastern United States, for example, is normally UTC – 5, but right now is
    actually UTC – 4, making it 3:15 a.m.


    „ **Note** Different countries switch into and back from daylight savings time
    at different times: for example, the time difference between the United Kingdom
    and mainland Chile can be three, four, or five hours, depending on the time of
    year.


    Elsewhere around the world, I can instantly deduce that it is 2:15 p.m. local
    time in Bangkok, Thailand, which uses an offset of UTC + 7. Unfortunately, not
    all of the countries in the world use the standard zones. For instance, it is
    12:45 p.m. in Mumbai, India right now; India uses a nonstandard offset of UTC
    + 5.5\. Time zones, as it turns out, are really just as much about political boundaries
    as they are about keeping the right time globally.


    There are three central issues to worry about when writing time zone–specific
    software:


    When a user sees data presented by the application, any dates should be rendered


    in the user’s local time zone (if known), unless otherwise noted, in which case
    data


    should generally be rendered in UTC to avoid confusion.


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    When a user submits new data or updates existing data, thereby altering date/time


    data in the database, the database should convert the data from the user’s time


    zone to a standard time zone (again, this will generally be UTC). All date/time
    data


    in the database should be standardized to a specific zone so that, based on known


    offsets, it can be easily converted to users’ local times. It can also be important
    to


    store both the original zone and the local time in the zone in which a given event


    occurred, for greater control and auditability. There are various ways of modeling


    such data, as I’ll discuss shortly. Given that start and end dates for daylight
    savings


    times occasionally change, it can be difficult to derive the original local times
    from


    a time stored only in UTC or only with an offset. If you will need to report or
    query


    based on local times in which events occurred, consider persisting them as-is
    in


    addition to storing the times standardized to UTC.


    When a user asks a temporally based question, it’s important to decide whether
    the


    dates used to ask the question will be used as-is (possibly in the user’s local
    time


    zone) or converted to the standard time zone first. Consider a user in New York


    asking the question, “What happened between 2:00 p.m. and 5:00 p.m. today?” If


    date/time data in the database is all based in the UTC zone, it’s unclear whether


    the user is referring to 2:00 p.m. to 5:00 p.m. EST or UTC—very different questions!


    The actual requirements here will vary based on business requirements, but it
    is a


    good idea to put a note on any screen in which this may be an issue to remind
    the


    user of what’s going on.


    Dealing with these issues is not actually too difficult, but it does require a
    good amount of discipline and attention to detail, not to mention some data about
    time zone offsets and daylight savings changes in various zones. It’s a good idea
    to handle as much of the work as possible in the application layer, but some (or
    sometimes all) of the responsibility will naturally spill into the data layer.
    So how should we deal with handling multiple time zones within the database? In
    the following sections I’ll discuss two possible models for dealing with this
    problem.


    Storing UTC Time


    The basic technique for storing temporal data for global applications is to maintain
    time zone settings for each user of the system so that when they log in, you can
    find out what zone you should treat their data as native to. Any time you need
    to show the user dates and times, convert them to the user’s local zone; and any
    time the user enters dates or times into the application for either searching
    or as data points, convert them into UTC before they hit the database.


    This approach requires some changes to the database code. For example, whenever
    the GETDATE


    function is used to insert data, you should instead use the GETUTCDATE function,
    which returns the current date/time in Greenwich. However, this rule only applies
    unconditionally for inserts; if you’re converting a database from local time to
    UTC, a blind find/replace-style conversion from GETDATE to GETUTCDATE may not
    yield the expected results. For instance, consider the following stored procedure,
    which selects “today’s” orders from the AdventureWorks Sales.SalesOrderHeader
    table:


    CREATE PROCEDURE GetTodaysOrders


    AS


    BEGIN


    SET NOCOUNT ON


    SELECT


    OrderDate,


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    SalesOrderNumber,


    AccountNumber,


    TotalDue


    FROM Sales.SalesOrderHeader


    WHERE


    CAST(OrderDate as date) = CAST(GETDATE() AS date)


    END;


    Assuming that the Sales.SalesOrderHeader table contains date/time values defined
    in UTC, it might seem like changing the GETDATE calls in this code to GETUTCDATE
    is a natural follow-up move. However, what if your application is hosted in New
    York, in which case the majority of your users are used to seeing and dealing
    with times synchronized to Eastern Standard Time (EST)? In such cases, the definition
    of “today’s orders” becomes ambiguous, depending on whether “today” is measured


    according to EST or UTC. Although for the most part CAST(GETDATE() AS date) will
    return the same as CAST (GETUTCDATE() AS date), there are 4 hours of each day
    (or sometimes 5, depending on daylight savings settings) in which the date as
    measured using UTC will be one day ahead of the date measured according to EST.
    If this query were to be called after 7:00 or 8:00 p.m. EST (again, depending
    on the time of year), GETUTCDATE will return a date/time that for people in the
    eastern United States is “tomorrow.”


    The time portion will be truncated, and the query won’t return any of “today’s”
    data at all—at least not if you’re expecting things to work using EST rules.'
  trans: "\n# 第十一章：处理时间数据\n\n使用日历表可以让面向时间段的查询更容易执行，但要记住它们需要持续维护。务必记录流程，以保持已定义时间段的最新状态，并向日历中添加额外的日期，以确保你的数据不会超出可用日期的范围。你可能希望每年的第一天增加一年的日期，以维持一个恒定的十年的缓冲期。\n\
    \n## 处理时区\n\n进入全球经济的后果之一是，与不同地区的人们开展业务带来的复杂性。抛开语言障碍不谈，最重要的问题之一源于时差问题。本质上，任何需要与同时身处不同地区的人们打交道的系统，都必须能够正确处理这样一个事实：那些人的手表设置并不都相同。\n\
    \n1884 年，在华盛顿特区召开的国际子午线会议上，与会代表们定义了 24 个标准时区。每个时区代表一个小时的偏移量，该偏移量是相对于格林威治（英国）所在的时区——本初子午线——来确定的。这个中心时区被称为`GMT`（格林威治标准时间）或`UTC`（Universel\
    \ Temps Coordonné，法语“协调世界时”）。标准时区如图 11-3 所示。\n\n*图 11-3. 世界标准时区*\n\n定义这些标准时区的关键好处在于，如果两个人知道对方所在时区的偏移量，并且他们的时钟都与同一个`UTC`时钟同步，那么无论他们在地球上的哪个位置，都可以确定对方的时间。\n\
    \n在我写下这些文字时，英格兰刚过上午 8:15，但由于我们目前使用的是英国夏令时（`BST`），这个时间代表的是`UTC + 1 小时`。北半球许多其他实行夏令时的国家目前也比其正常时间提前\
    \ 1 小时。\n\n例如，美国东部通常是`UTC – 5`，但现在实际上是`UTC – 4`，即凌晨 3:15。\n\n**注意：** 不同国家切换到和退出夏令时的时间不同：例如，英国和智利本土之间的时间差可能是三、四或五小时，具体取决于一年中的时间。\n\
    \n在世界其他地方，我可以立即推断出泰国曼谷的当地时间是下午 2:15，该地使用`UTC + 7`的偏移量。不幸的是，并非世界上所有国家都使用标准时区。例如，印度孟买现在是下午\
    \ 12:45；印度使用非标准偏移量`UTC + 5.5`。事实证明，时区既是关于政治边界的问题，也是关于在全球保持正确时间的问题。\n\n编写特定于时区的软件时，有三个核心问题需要担心：\n\
    \n当用户看到应用程序呈现的数据时，除非另有说明，否则任何日期都应以用户的当地时区（如果已知）呈现。在另有说明的情况下，数据通常应以`UTC`呈现，以避免混淆。\n\
    \n当用户提交新数据或更新现有数据，从而更改数据库中的日期/时间数据时，数据库应将数据从用户的时区转换为标准时区（同样，通常是`UTC`）。数据库中的所有日期/时间数据都应标准化到特定时区，以便基于已知偏移量，可以轻松地将其转换为用户的当地时间。为了更好地控制和审计，存储事件发生时的原始时区和当地时间也很重要。有各种方法可以对此类数据建模，我稍后会讨论。鉴于夏令时的开始和结束日期偶尔会发生变化，如果时间仅以`UTC`存储或仅带有偏移量，可能很难从中推导出原始的当地时间。如果你需要根据事件发生的当地时间进行报告或查询，除了将时间标准化存储为`UTC`外，还请考虑将原始时间按原样持久化。\n\
    \n当用户提出一个基于时间的问题时，重要的是要决定用于提问的日期是按原样使用（可能是用户的当地时间），还是先转换为标准时区。考虑一个在纽约的用户提出这样的问题：“今天下午\
    \ 2:00 到 5:00 之间发生了什么？”如果数据库中的日期/时间数据都基于`UTC`时区，就不清楚用户指的是东部标准时间（`EST`）的下午 2:00\
    \ 到 5:00，还是`UTC`的下午 2:00 到 5:00——这可是非常不同的问题！这里实际的需求会根据业务需求而变化，但最好在任何可能出现此问题的界面上添加注释，以提醒用户注意。\n\
    \n处理这些问题实际上并不太难，但它确实需要相当的条理性和对细节的关注，更不用说还需要一些关于不同时区偏移和夏令时变化的数据了。尽可能多地在应用层处理这些工作是个好主意，但部分（或有时全部）责任自然也会延伸到数据层。那么，我们该如何在数据库中处理多时区问题呢？在接下来的章节中，我将讨论两种处理此问题的可能模型。\n\
    \n## 存储 UTC 时间\n\n为全球应用程序存储时间数据的基本技术是：维护系统中每个用户的时区设置，以便在他们登录时，你可以知道应该将其数据视为源自哪个时区。每当需要向用户显示日期和时间时，将其转换为用户的当地时间；每当用户输入日期或时间到应用程序中用于搜索或作为数据点时，在数据进入数据库之前将其转换为`UTC`。\n\
    \n这种方法需要对数据库代码进行一些更改。例如，每当使用`GETDATE()`函数插入数据时，应改用`GETUTCDATE()`函数，该函数返回格林威治的当前日期/时间。然而，这条规则仅无条件适用于插入操作；如果你正在将数据库从本地时间转换为`UTC`，盲目地进行从`GETDATE()`到`GETUTCDATE()`的查找/替换式转换可能不会产生预期的结果。例如，考虑下面这个存储过程，它从`AdventureWorks`数据库的`Sales.SalesOrderHeader`表中选择“今日”订单：\n\
    \n```sql\nCREATE PROCEDURE GetTodaysOrders\nAS\nBEGIN\n    SET NOCOUNT ON\n\n\
    \    SELECT\n        OrderDate,\n        SalesOrderNumber,\n        AccountNumber,\n\
    \        TotalDue\n    FROM Sales.SalesOrderHeader\n    WHERE\n        CAST(OrderDate\
    \ as date) = CAST(GETDATE() AS date)\nEND;\n```\n\n假设`Sales.SalesOrderHeader`表包含定义为`UTC`的日期/时间值，将此代码中的`GETDATE()`调用更改为`GETUTCDATE()`似乎是自然而然的下一步。但是，如果你的应用程序托管在纽约，并且你的大多数用户习惯于看到和处理与东部标准时间（`EST`）同步的时间呢？在这种情况下，“今日订单”的定义就变得模糊了，取决于“今天”是按`EST`还是`UTC`来衡量。尽管在大多数情况下`CAST(GETDATE()\
    \ AS date)`会返回与`CAST(GETUTCDATE() AS date)`相同的结果，但每天有 4 个小时（有时是 5 个小时，取决于夏令时设置），按`UTC`衡量的日期会比按`EST`衡量的日期提前一天。如果在此查询在`EST`时间晚上\
    \ 7:00 或 8:00 之后（同样，取决于一年中的时间）被调用，`GETUTCDATE()`将返回一个对美国东部的人来说是“明天”的日期/时间。时间部分将被截断，查询根本不会返回任何“今日”数据——至少如果你期望按`EST`规则工作的话是不会的。\n"
- fmt: "To correct these issues, use `GETUTCDATE` to find the current date/time in\
    \ Greenwich, and convert it to the user’s local time. After it is converted to\
    \ local time, *then* truncate the time portion. Finally, convert the date back\
    \ to UTC, and use the resultant date/time to search the table of UTC values. Depending\
    \ on whether or not you’ve handled it in your application code, a further modification\
    \ might be required to convert the `OrderDate` column in the `SELECT` list, in\
    \ order to return the data in the user’s local time zone.\n\nWhenever your application\
    \ needs to handle relative dates, such as “today,” “tomorrow,” or “last week,”\
    \ you should always define these sensitive to the time zone of the user submitting\
    \ the query, handling conversion into UTC and back again within the query.\n\n\
    ## Using the `datetimeoffset` Type\n\nThe new `datetimeoffset` datatype is the\
    \ most fully featured temporal datatype in SQL Server 2008. Not only does it match\
    \ the resolution and range of the `datetime2` datatype, but it also allows you\
    \ to specify an offset, representing the difference between the stated time value\
    \ and UTC. Thus, a single value can contain all the information required to express\
    \ both a local time and the corresponding UTC time.\n\nAt first, this seems like\
    \ an ideal solution to the problems of working with data across different time\
    \ zones. Calculations on `datetimeoffset` values take account of both the time\
    \ component and the offset.\n\nConsider the following example:\n\n```sql\nDECLARE\
    \ @LondonMidday datetimeoffset = '2009-07-15 12:00 +0:00';\nDECLARE @MoscowMidday\
    \ datetimeoffset = '2009-07-15 12:00 +3:00';\nSELECT DATEDIFF(hour, @LondonMidday,\
    \ @MoscowMidday);\n```\n\nThe time zone for Moscow is 3 hours ahead of London,\
    \ so the result of this code is `-3`. In other words, midday in Moscow occurred\
    \ 3 hours before midday in London.\n\nUsing `datetimeoffset` makes it easy to\
    \ compare values held centrally representing times stored in different locales.\
    \ Consider the following:\n\n```sql\nCREATE TABLE TimeAndPlace (\n    Place varchar(32),\n\
    \    Time datetimeoffset\n);\nGO\n\nINSERT INTO TimeAndPlace (Place, Time) VALUES\n\
    ('London', '2009-07-15 08:15:00 +0:00'),\n('Paris', '2009-07-15 08:30:00 +1:00'),\n\
    ('Zurich', '2009-07-15 09:05:00 +2:00'),\n('Dubai', '2009-07-15 10:30:00 +3:00');\n\
    GO\n```\n\nTo find out which event took place first, we can use a simple `ORDER\
    \ BY` statement in a `SELECT` query—the output will order the results taking account\
    \ of their offset:\n\n```sql\nSELECT\n    Place,\n    Time\nFROM TimeAndPlace\n\
    WHERE Time BETWEEN '20090715 07:30' AND '20090715 08:30'\nORDER BY Time ASC;\n\
    ```\n\nThe results are as follows:\n\n```\nPlace       Time\nParis       2009-07-15\
    \ 08:30:00.0000000 +01:00\nDubai       2009-07-15 10:30:00.0000000 +03:00\nLondon\
    \      2009-07-15 08:15:00.0000000 +00:00\n```\n\nNote that the rows are filtered\
    \ and ordered according to the UTC time at which they occurred, not the local\
    \ time. In UTC terms, the Zurich time corresponds to 7:05 a.m. which lies outside\
    \ of the range of the query condition and so is not included in the results. Dubai\
    \ and Paris both correspond to 7:30 a.m., and London to 8:15 a.m.\n\n### Limitations\
    \ and Time Zone Awareness\n\nThe `datetimeoffset` type has a number of benefits,\
    \ as demonstrated here, but it is important to note that it is not “time zone\
    \ aware”—it simply provides calculations based on an offset from a consistently\
    \ (UTC) defined time. The application still needs to tell the database the correct\
    \ offset for the time zone in which the time is defined.\n\nMany operating systems\
    \ allow users to choose the time zone in which to operate from a list of places.\
    \ For example, my operating system reports my current time zone as “(GMT) Greenwich\
    \ Mean Time : Dublin, Edinburgh, Lisbon, London.” It is not difficult to present\
    \ the user with such a choice of locations, and to persist the corresponding time\
    \ zone within the database so that `datetimeoffset` values may be created with\
    \ the correct offset. Such information can be extracted from a lookup table based\
    \ on the system registry, and newer operating systems recognize and correctly\
    \ allow for daylight savings time, adjusting the system clock automatically when\
    \ required.\n\nFor example, in a front-end .NET application, you can use `TimeZoneInfo.Local.Id`\
    \ to retrieve the ID of the user’s local time zone, and then translate this to\
    \ a `TimeZoneInfo` object using the `TimeZoneInfo.FindSystemTimeZoneById` method.\
    \ Each `TimeZoneInfo` has an associated offset from UTC that can be accessed via\
    \ the `BaseUtcOffset` property to get the correct offset for the corresponding\
    \ `datetimeoffset` instance in the database.\n\nHowever, even though this might\
    \ solve the problem of *creating* temporal data in different time zones, problems\
    \ still occur when performing calculations on that data. For example, suppose\
    \ that you wanted to know the time in London, 24 hours after a given time, at\
    \ 1:30 a.m. on the March 27, 2010:\n\n```sql\nDECLARE @LondonTime datetimeoffset\
    \ = '20100327 01:30:00 +0:00';\nSELECT DATEADD(hour, 24, @LondonTime);\n```\n\n\
    This code will give the result `2010-03-28 01:30:00.0000000 +00:00`, which is\
    \ technically correct—it is the time 24 hours later, based on the same offset\
    \ as the supplied `datetimeoffset` value. However, at 1:00 a.m. on Sunday, March\
    \ 28, clocks in Britain are put forward 1 hour to 2:00 a.m. to account for the\
    \ change from GMT to BST. The time in London 24 hours after the supplied input\
    \ will actually be `2010-03-28 02:30:00.0000000 +01:00`. Although this corresponds\
    \ to the same UTC time as the result obtained, any application that displayed\
    \ only the local time to the user would appear incorrect.\n\nWhat’s more, the\
    \ offset corresponding to a given time zone does not remain static. For example,\
    \ in December 2007, President Hugo Chavez created a new time zone for Venezuela,\
    \ putting the whole country back half an hour to make it 4.5 hours behind UTC.\
    \ Whatever solution you implement to translate from a time zone to an offset needs\
    \ to account for such changes.\n\nTime zone issues can become quite complex, but\
    \ they can be solved by carefully evaluating the necessary changes to the code\
    \ and even more carefully testing once changes have been implemented.\n\n### Consistency\
    \ is Key\n\nThe most important thing to remember is that consistency is key when\
    \ working with time-standardized data; any hole in the data modification routines\
    \ that inserts nonstandardized data can cause ambiguity that may be impossible\
    \ to fix. Once inserted, there is no way to ask the database whether a time was\
    \ supposed to be in UTC or a local time zone.\n\n## Working with Intervals\n\n\
    Very few real-world events happen in a single moment. Time is continuous, and\
    \ any given state change normally has both a clearly defined start time and end\
    \ time. For example, you might say, “I drove from Stockbridge to Boston at 10:00.”\
    \ But you really didn’t drive only at 10:00, unless you happen to be in possession\
    \ of some futuristic time/space-folding technology (and that’s clearly beyond\
    \ the scope of this chapter)."
  raw: 'To correct these issues, use GETUTCDATE to find the current date/time in Greenwich,
    and convert it to the user’s local time. After it is converted to local time,
    *then* truncate the time portion. Finally, convert the date back to UTC, and use
    the resultant date/time to search the table of UTC values. Depending on whether
    or not you’ve handled it in your application code, a further modification might
    be required to convert the OrderDate column in the SELECT list, in order to return
    the data in the user’s local time zone.


    Whenever your application needs to handle relative dates, such as “today,” “tomorrow,”
    or “last week,”


    you should always define these sensitive to the time zone of the user submitting
    the query, handling conversion into UTC and back again within the query.


    Using the datetimeoffset Type


    The new datetimeoffset datatype is the most fully featured temporal datatype in
    SQL Server 2008\. Not only does it match the resolution and range of the datetime2
    datatype, but it also allows you to specify an offset, representing the difference
    between the stated time value and UTC. Thus, a single value can contain all the
    information required to express both a local time and the corresponding UTC time.


    At first, this seems like an ideal solution to the problems of working with data
    across different time zones. Calculations on datetimeoffset values take account
    of both the time component and the offset.


    Consider the following example:


    DECLARE @LondonMidday datetimeoffset = ''2009-07-15 12:00 +0:00'';


    DECLARE @MoscowMidday datetimeoffset = ''2009-07-15 12:00 +3:00'';


    SELECT DATEDIFF(hour, @LondonMidday, @MoscowMidday);


    The time zone for Moscow is 3 hours ahead of London, so the result of this code
    is -3\. In other words, midday in Moscow occurred 3 hours before midday in London.


    Using datetimeoffset makes it easy to compare values held centrally representing
    times stored in different locales. Consider the following:


    CREATE TABLE TimeAndPlace (


    Place varchar(32),


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    Time datetimeoffset


    );


    GO


    INSERT INTO TimeAndPlace (Place, Time) VALUES


    (''London'', ''2009-07-15 08:15:00 +0:00''),


    (''Paris'', ''2009-07-15 08:30:00 +1:00''),


    (''Zurich'', ''2009-07-15 09:05:00 +2:00''),


    (''Dubai'', ''2009-07-15 10:30:00 +3:00'');


    GO


    To find out which event took place first, we can use a simple ORDER BY statement
    in a SELECT query—


    the output will order the results taking account of their offset:


    SELECT


    Place,


    Time


    FROM TimeAndPlace


    WHERE Time BETWEEN ''20090715 07:30'' AND ''20090715 08:30''


    ORDER BY Time ASC;


    The results are as follows:


    Place Time


    Paris 2009-07-15 08:30:00.0000000 +01:00


    Dubai 2009-07-15 10:30:00.0000000 +03:00


    London 2009-07-15 08:15:00.0000000 +00:00


    Note that the rows are filtered and ordered according to the UTC time at which
    they occurred, not the local time. In UTC terms, the Zurich time corresponds to
    7:05 a.m. which lies outside of the range of the query condition and so is not
    included in the results. Dubai and Paris both correspond to 7:30 a.m., and London
    to 8:15 a.m.


    The datetimeoffset type has a number of benefits, as demonstrated here, but it
    is important to note that it is not “time zone aware”—it simply provides calculations
    based on an offset from a consistently (UTC) defined time. The application still
    needs to tell the database the correct offset for the time zone in which the time
    is defined. Many operating systems allow users to choose the time zone in which
    to operate from a list of places. For example, my operating system reports my
    current time zone as “(GMT) Greenwich Mean Time : Dublin, Edinburgh, Lisbon, London.”
    It is not difficult to present the user with such a choice of locations, and to
    persist the corresponding time zone within the database so that datetimeoffset
    values may be created with the correct offset. Such information can be extracted
    from a lookup table based on the system registry, and newer operating systems
    recognize and correctly allow for daylight savings time, adjusting the system
    clock automatically when required.


    For example, in a front-end .NET application, you can use TimeZoneInfo.Local.Id
    to retrieve the ID


    of the user’s local time zone, and then translate this to a TimeZoneInfo object
    using the


    TimeZoneInfo.FindSystemTimeZoneById method. Each TimeZoneInfo has an associated
    offset from UTC


    that can be accessed via the BaseUtcOffset property to get the correct offset
    for the corresponding datetimeoffset instance in the database.


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    However, even though this might solve the problem of *creating* temporal data
    in different time zones, problems still occur when performing calculations on
    that data. For example, suppose that you wanted to know the time in London, 24
    hours after a given time, at 1:30 a.m. on the March 27, 2010: DECLARE @LondonTime
    datetimeoffset = ''20100327 01:30:00 +0:00'';


    SELECT DATEADD(hour, 24, @LondonTime);


    This code will give the result 2010-03-28 01:30:00.0000000 +00:00, which is technically
    correct—it is the time 24 hours later, based on the same offset as the supplied
    datetimeoffset value. However, at 1:00 a.m. on Sunday, March 28, clocks in Britain
    are put forward 1 hour to 2:00 a.m. to account for the change from GMT to BST.
    The time in London 24 hours after the supplied input will actually be 2010-03-28
    02:30:00.0000000 +01:00\. Although this corresponds to the same UTC time as the
    result obtained, any application that displayed only the local time to the user
    would appear incorrect.


    What’s more, the offset corresponding to a given time zone does not remain static.
    For example, in December 2007, President Hugo Chavez created a new time zone for
    Venezuela, putting the whole country back half an hour to make it 4.5 hours behind
    UTC. Whatever solution you implement to translate from a time zone to an offset
    needs to account for such changes.


    Time zone issues can become quite complex, but they can be solved by carefully
    evaluating the necessary changes to the code and even more carefully testing once
    changes have been implemented.


    The most important thing to remember is that consistency is key when working with
    time-standardized data; any hole in the data modification routines that inserts
    nonstandardized data can cause ambiguity that may be impossible to fix. Once inserted,
    there is no way to ask the database whether a time was supposed to be in UTC or
    a local time zone.


    Working with Intervals


    Very few real-world events happen in a single moment. Time is continuous, and
    any given state change normally has both a clearly defined start time and end
    time. For example, you might say, “I drove from Stockbridge to Boston at 10:00.”
    But you really didn’t drive only at 10:00, unless you happen to be in possession
    of some futuristic time/space-folding technology (and that’s clearly beyond the
    scope of this chapter).'
  trans: "\n要纠正这些问题，请使用 `GETUTCDATE` 查找格林尼治的当前日期/时间，并将其转换为用户的本地时间。转换为本地时间后，*再*截断时间部分。最后，将日期转换回\
    \ UTC，并使用得到的日期/时间来搜索 UTC 值表。根据您是否已在应用程序代码中处理，可能还需要对 `SELECT` 列表中的 `OrderDate`\
    \ 列进行进一步修改，以便以用户的本地时区返回数据。\n\n每当您的应用程序需要处理相对日期时，例如“今天”、“明天”或“上周”，您应始终使其对提交查询的用户的时区敏感，并在查询中处理与\
    \ UTC 的来回转换。\n\n## 使用 `datetimeoffset` 类型\n\n新的 `datetimeoffset` 数据类型是 SQL Server\
    \ 2008 中功能最全的时间数据类型。它不仅匹配 `datetime2` 数据类型的精度和范围，还允许您指定一个偏移量，表示给定时间值与 UTC 之间的差异。因此，单个值可以包含表达本地时间和相应\
    \ UTC 时间所需的所有信息。\n\n乍看之下，这似乎是解决跨不同时区处理数据问题的理想方案。对 `datetimeoffset` 值的计算会同时考虑时间成分和偏移量。\n\
    \n考虑以下示例：\n\n```sql\nDECLARE @LondonMidday datetimeoffset = '2009-07-15 12:00\
    \ +0:00';\nDECLARE @MoscowMidday datetimeoffset = '2009-07-15 12:00 +3:00';\n\
    SELECT DATEDIFF(hour, @LondonMidday, @MoscowMidday);\n```\n\n莫斯科的时区比伦敦早 3 小时，因此此代码的结果是\
    \ `-3`。换句话说，莫斯科的中午发生在伦敦中午之前 3 小时。\n\n使用 `datetimeoffset` 可以轻松比较中央存储的、表示不同区域存储时间的值。考虑以下：\n\
    \n```sql\nCREATE TABLE TimeAndPlace (\n    Place varchar(32),\n    Time datetimeoffset\n\
    );\nGO\n\nINSERT INTO TimeAndPlace (Place, Time) VALUES\n('London', '2009-07-15\
    \ 08:15:00 +0:00'),\n('Paris', '2009-07-15 08:30:00 +1:00'),\n('Zurich', '2009-07-15\
    \ 09:05:00 +2:00'),\n('Dubai', '2009-07-15 10:30:00 +3:00');\nGO\n```\n\n要找出哪个事件最先发生，我们可以在\
    \ `SELECT` 查询中使用简单的 `ORDER BY` 语句——输出将根据其偏移量对结果进行排序：\n\n```sql\nSELECT\n    Place,\n\
    \    Time\nFROM TimeAndPlace\nWHERE Time BETWEEN '20090715 07:30' AND '20090715\
    \ 08:30'\nORDER BY Time ASC;\n```\n\n结果如下：\n\n```\nPlace       Time\nParis   \
    \    2009-07-15 08:30:00.0000000 +01:00\nDubai       2009-07-15 10:30:00.0000000\
    \ +03:00\nLondon      2009-07-15 08:15:00.0000000 +00:00\n```\n\n请注意，行是根据其发生的\
    \ UTC 时间而非本地时间进行过滤和排序的。以 UTC 时间计，苏黎世的时间对应于上午 7:05，这超出了查询条件的范围，因此未包含在结果中。迪拜和巴黎都对应于上午\
    \ 7:30，而伦敦对应于上午 8:15。\n\n### 局限性与时区感知\n\n`datetimeoffset` 类型具有许多优点，如本文所示，但重要的是要注意它并不“感知时区”——它只是基于与一个一致定义（UTC）的时间的偏移量进行计算。应用程序仍然需要告诉数据库时间定义所在时区的正确偏移量。\n\
    \n许多操作系统允许用户从地点列表中选择操作时区。例如，我的操作系统报告我当前的时区为“(GMT) 格林尼治标准时间 : 都柏林、爱丁堡、里斯本、伦敦”。向用户提供此类地点选择并不困难，并将相应的时区持久化在数据库中，以便可以使用正确的偏移量创建\
    \ `datetimeoffset` 值。此类信息可以从基于系统注册表的查找表中提取，较新的操作系统可以识别并正确处理夏令时，在需要时自动调整系统时钟。\n\
    \n例如，在前端的 .NET 应用程序中，您可以使用 `TimeZoneInfo.Local.Id` 检索用户本地时区的 ID，然后使用 `TimeZoneInfo.FindSystemTimeZoneById`\
    \ 方法将其转换为 `TimeZoneInfo` 对象。每个 `TimeZoneInfo` 都有一个关联的与 UTC 的偏移量，可以通过 `BaseUtcOffset`\
    \ 属性访问，以获取数据库中相应 `datetimeoffset` 实例的正确偏移量。\n\n然而，即使这可以解决在不同时区*创建*时间数据的问题，在对这些数据进行计算时仍然会出现问题。例如，假设您想知道\
    \ 2010 年 3 月 27 日凌晨 1:30 给定时间之后 24 小时在伦敦的时间：\n\n```sql\nDECLARE @LondonTime datetimeoffset\
    \ = '20100327 01:30:00 +0:00';\nSELECT DATEADD(hour, 24, @LondonTime);\n```\n\n\
    此代码将给出结果 `2010-03-28 01:30:00.0000000 +00:00`，这在技术上是正确的——这是基于与提供的 `datetimeoffset`\
    \ 值相同的偏移量计算出的 24 小时后的时间。然而，在 3 月 28 日星期日凌晨 1:00，英国的时钟会拨快 1 小时至凌晨 2:00，以应对从 GMT\
    \ 到 BST（英国夏令时）的变化。提供输入 24 小时后伦敦的实际时间将是 `2010-03-28 02:30:00.0000000 +01:00`。尽管这与获得的结果对应的\
    \ UTC 时间相同，但任何仅向用户显示本地时间的应用程序都会显得不正确。\n\n更重要的是，与给定时间区对应的偏移量并非一成不变。例如，在 2007 年\
    \ 12 月，总统乌戈·查韦斯为委内瑞拉创建了一个新的时区，将全国时间调慢半小时，使其比 UTC 晚 4.5 小时。您实现的任何从时区到偏移量的转换方案都需要考虑此类变化。\n\
    \n时区问题可能变得相当复杂，但可以通过仔细评估代码所需的更改，并在实施更改后更加仔细地测试来解决。\n\n### 一致性是关键\n\n需要记住的最重要的一点是，在处理时间标准化数据时，一致性是关键；数据修改例程中的任何漏洞插入了非标准化数据，都可能导致无法修复的歧义。一旦插入，就无法询问数据库某个时间应该是\
    \ UTC 还是本地时区。\n\n## 处理时间间隔\n\n现实世界中很少有事件发生在单一时刻。时间是连续的，任何给定的状态变化通常都有明确定义的开始时间和结束时间。例如，您可能会说，“我在\
    \ 10:00 从斯托克布里奇开车到波士顿。”但您并非真的只在 10:00 开车，除非您恰好拥有某种未来主义的时空折叠技术（这显然超出了本章的范围）。\n"
- fmt: "# CHAPTER 11 „ WORKING WITH TEMPORAL DATA\n\nWhen working with databases,\
    \ we often consider only the start or end time of an event, rather than the full\
    \ interval. A column called `OrderDate` is an almost ubiquitous feature in databases\
    \ that handle orders; but this column only stores the date/time that the order\
    \ ended—when the user submitted the final request. It does not reflect how long\
    \ the user spent browsing the site, filling the shopping cart, and entering credit\
    \ card information. Likewise, every time we check our e-mail, we see a `Sent Date`\
    \ field, which captures the moment that the sender hit the send button, but does\
    \ not help identify how long that person spent thinking about or typing the e-mail,\
    \ activities that constitute part of the “sending” process.\n\nThe reason we don’t\
    \ often see this extended data is because it’s generally unnecessary. For most\
    \ sites, it really doesn’t matter for the purpose of order fulfillment how long\
    \ the user spent browsing (although that information may be useful to interface\
    \ designers, or when considering the overall customer experience). And it doesn’t\
    \ really matter, once an e-mail is sent, how much effort went into sending it.\
    \ The important thing is, it was sent (and later received, another data point\
    \ that many e-mail clients don’t expose).\n\nDespite these examples to the contrary,\
    \ for many applications, both start and end times are necessary for a complete\
    \ analysis. Take for instance your employment history. As you move from job to\
    \ job, you carry intervals during which you had a certain title, were paid a certain\
    \ amount, or had certain job responsibilities. Failing to include both the start\
    \ and end dates with this data can create some interesting challenges.\n\n## Modeling\
    \ and Querying Continuous Intervals\n\nIf a table uses only a starting time or\
    \ an ending time (but not both) to represent intervals, all of the rows in that\
    \ table can be considered to belong to one continuous interval that spans the\
    \ entire time period represented. Each row in this case would represent a subinterval\
    \ during which some status change occurred. Let’s take a look at some simple examples\
    \ to clarify this. Start with the following table and rows:\n\n```sql\nCREATE\
    \ TABLE JobHistory\n(\n    Company varchar(100),\n    Title varchar(100),\n  \
    \  Pay decimal(9, 2),\n    StartDate date\n);\nGO\n\nINSERT INTO JobHistory\n\
    (\n    Company,\n    Title,\n    Pay,\n    StartDate\n) VALUES\n('Acme Corp',\
    \ 'Programmer', 50000.00, '19970626'),\n('Software Shop', 'Programmer/Analyst',\
    \ 62000.00, '20001005'),\n('Better Place', 'Junior DBA', 82000.00, '20030108'),\n\
    ('Enterprise', 'Database Developer', 95000.00, '20071114');\nGO\n```\n\nNotice\
    \ that each of the dates uses the `date` type. No one—except the worst micromanager—cares,\
    \ looking at a job history record, if someone got in to work at 8:00 a.m. or 8:30\
    \ a.m. on the first day. What matters is that the date in the table is the start\
    \ *date*.\n\nThe data in the `JobHistory` table is easy enough to transform into\
    \ a more logical format; to get the full subintervals we can assume that the end\
    \ date of each job is the start date of the next. The end date of the final job,\
    \ it can be assumed, is the present date (or, if you prefer, `NULL`). Converting\
    \ this into a start/end report based on these rules requires T-SQL along the following\
    \ lines:\n\n```sql\nSELECT\n    J1.*,\n    COALESCE((\n        SELECT MIN(J2.StartDate)\n\
    \        FROM JobHistory AS J2\n        WHERE J2.StartDate > J1.StartDate),\n\
    \        CAST(GETDATE() AS date)\n    ) AS EndDate\nFROM JobHistory AS J1;\n```\n\
    \nwhich gives the following results (the final date will vary to show the date\
    \ on which you run the query):\n\n| Company | Title | Pay | StartDate | EndDate\
    \ |\n| :--- | :--- | :--- | :--- | :--- |\n| Acme Corp | Programmer | 50000.00\
    \ | 1997-06-26 | 2000-10-05 |\n| Software Shop | Programmer/Analyst | 62000.00\
    \ | 2000-10-05 | 2003-01-08 |\n| Better Place | Junior DBA | 82000.00 | 2003-01-08\
    \ | 2007-11-14 |\n| Enterprise | Database Developer | 95000.00 | 2007-11-14 |\
    \ 2009-07-12 |\n\nThe outer query gets the job data and the start times, and the\
    \ subquery finds the first start date after the current row’s start date. If no\
    \ such start date exists, the current date is used. Of course, an obvious major\
    \ problem here is lack of support for gaps in the job history. This table may,\
    \ for instance, hide the fact that the subject was laid off from `Software Shop`\
    \ in July 2002. This is why I stressed the continuous nature of data modeled in\
    \ this way.\n\nDespite the lack of support for gaps, let’s try a bit more data\
    \ and see what happens. As the subject’s career progressed, he received various\
    \ title and pay changes during the periods of employment with these different\
    \ companies, which are represented in the following additional rows:\n\n```sql\n\
    INSERT INTO JobHistory\n(\n    Company,\n    Title,\n    Pay,\n    StartDate\n\
    ) VALUES\n('Acme Corp', 'Programmer', 55000.00, '19980901'),\n('Acme Corp', 'Programmer\
    \ 2', 58000.00, '19990901'),\n('Acme Corp', 'Programmer 3', 58000.00, '20000901'),\n\
    ('Software Shop', 'Programmer/Analyst', 62000.00, '20001005'),\n('Software Shop',\
    \ 'Programmer/Analyst', 67000.00, '20020101'),\n('Software Shop', 'Programmer',\
    \ 40000.00, '20020301'),\n('Better Place', 'Junior DBA', 84000.00, '20040601'),\n\
    ('Better Place', 'DBA', 87000.00, '20060601');\n```\n\nThe data in the `JobHistory`\
    \ table, shown in full in Table 11-1, follows the subject along a path of relative\
    \ job growth. A few raises and title adjustments—including one title adjustment\
    \ with no associated pay raise—and an unfortunate demotion along with a downsized\
    \ salary, just before getting laid off in 2002 (the gap which, as mentioned, is\
    \ not able to be represented here). Luckily, after studying hard while laid off,\
    \ the subject bounced back with a much better salary, and of course a more satisfying\
    \ career track!\n\n### Table 11-1. The Subject’s Full Job History, with Salary\
    \ and Title Adjustments\n\n| Company | Title | Pay | StartDate |\n| :--- | :---\
    \ | :--- | :--- |\n| Acme Corp | Programmer | 50000.00 | 1997-06-26 |\n| Acme\
    \ Corp | Programmer | 55000.00 | 1998-09-01 |\n| Acme Corp | Programmer 2 | 58000.00\
    \ | 1999-09-01 |\n| Acme Corp | Programmer 3 | 58000.00 | 2000-09-01 |\n| Software\
    \ Shop | Programmer/Analyst | 62000.00 | 2000-10-05 |\n| Software Shop | Programmer/Analyst\
    \ | 62000.00 | 2000-10-05 |\n| Software Shop | Programmer/Analyst | 67000.00 |\
    \ 2002-01-01 |\n| Software Shop | Programmer | 40000.00 | 2002-03-01 |\n| Better\
    \ Place | Junior DBA | 82000.00 | 2003-01-08 |\n| Better Place | Junior DBA |\
    \ 84000.00 | 2004-06-01 |\n| Better Place | DBA | 87000.00 | 2006-06-01 |\n| Enterprise\
    \ | Database Developer | 95000.00 | 2007-11-14 |\n\nIgnoring the gap, let’s see\
    \ how one might answer a resume-style question using this data. As a modification\
    \ to the previous query, suppose that we wanted to show the start and end date\
    \ of tenure with each company, along with the maximum salary earned at the company,\
    \ and what title was held when the highest salary was being earned.\n\nThe first\
    \ step commonly taken in tackling this kind of challenge is to use a correlated\
    \ subquery to find the rows that have the maximum value per group. In this case,\
    \ that means the maximum pay per company:\n\n```sql\nSELECT\n    Pay,\n    Title\n\
    FROM JobHistory AS J2\nWHERE\n    J2.Pay =\n    (\n        SELECT MAX(Pay)\n \
    \       FROM JobHistory AS J3\n        WHERE J3.Company = J2.Company\n    );\n\
    ```\n\nOne key modification that must be made is to the basic query that finds\
    \ start and end dates. Due to the fact that there are now multiple rows per job,\
    \ the `MIN` aggregate will have to be employed to find the real start date, and\
    \ the end date subquery will have to be modified to look not only at date changes,\
    \ but also company changes. The following T-SQL finds the correct start and end\
    \ dates for each company:\n\n```sql\nSELECT\n    J1.Company,\n    MIN(J1.StartDate)\
    \ AS StartDate,\n    COALESCE((\n        SELECT MIN(J2.StartDate)\n        FROM\
    \ JobHistory AS J2\n        WHERE\n            J2.Company <> J1.Company\n    \
    \        AND J2.StartDate > MIN(J1.StartDate)),\n        CAST(GETDATE() AS date)\n\
    \    ) AS EndDate\nFROM JobHistory AS J1\nGROUP BY J1.Company\nORDER BY StartDate;\n\
    ```"
  raw: 'When working with databases, we often consider only the start or end time
    of an event, rather than the full interval. A column called OrderDate is an almost
    ubiquitous feature in databases that handle orders; but this column only stores
    the date/time that the order ended—when the user submitted the final request.
    It does not reflect how long the user spent browsing the site, filling the shopping
    cart, and entering credit card information. Likewise, every time we check our
    e-mail, we see a Sent Date field, which captures the moment that the sender hit
    the send button, but does not help identify how long that person spent thinking
    about or typing the e-mail, activities that constitute part of the “sending” process.


    The reason we don’t often see this extended data is because it’s generally unnecessary.
    For most sites, it really doesn’t matter for the purpose of order fulfillment
    how long the user spent browsing (although that information may be useful to interface
    designers, or when considering the overall customer experience). And it doesn’t
    really matter, once an e-mail is sent, how much effort went into sending it. The
    important thing is, it was sent (and later received, another data point that many
    e-mail clients don’t expose).


    Despite these examples to the contrary, for many applications, both start and
    end times are


    necessary for a complete analysis. Take for instance your employment history.
    As you move from job to job, you carry intervals during which you had a certain
    title, were paid a certain amount, or had certain job responsibilities. Failing
    to include both the start and end dates with this data can create some interesting
    challenges.


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    Modeling and Querying Continuous Intervals


    If a table uses only a starting time or an ending time (but not both) to represent
    intervals, all of the rows in that table can be considered to belong to one continuous
    interval that spans the entire time period represented. Each row in this case
    would represent a subinterval during which some status change occurred. Let’s
    take a look at some simple examples to clarify this. Start with the following
    table and rows:


    CREATE TABLE JobHistory


    (


    Company varchar(100),


    Title varchar(100),


    Pay decimal(9, 2),


    StartDate date


    );


    GO


    INSERT INTO JobHistory


    (


    Company,


    Title,


    Pay,


    StartDate


    ) VALUES


    (''Acme Corp'', ''Programmer'', 50000.00, ''19970626''),


    (''Software Shop'', ''Programmer/Analyst'', 62000.00, ''20001005''),


    (''Better Place'', ''Junior DBA'', 82000.00, ''20030108''),


    (''Enterprise'', ''Database Developer'', 95000.00, ''20071114'');


    GO


    Notice that each of the dates uses the date type. No one—except the worst micromanager—cares,
    looking at a job history record, if someone got in to work at 8:00 a.m. or 8:30
    a.m. on the first day. What matters is that the date in the table is the start
    *date*.


    The data in the JobHistory table is easy enough to transform into a more logical
    format; to get the full subintervals we can assume that the end date of each job
    is the start date of the next. The end date of the final job, it can be assumed,
    is the present date (or, if you prefer, NULL). Converting this into a start/end
    report based on these rules requires T-SQL along the following lines:


    SELECT


    J1.*,


    COALESCE((


    SELECT MIN(J2.StartDate)


    FROM JobHistory AS J2


    WHERE J2.StartDate > J1.StartDate),


    CAST(GETDATE() AS date)


    ) AS EndDate


    FROM JobHistory AS J1;


    which gives the following results (the final date will vary to show the date on
    which you run the query): 347


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    Company Title Pay StartDate EndDate


    Acme Corp Programmer 50000.00 1997-06-26 2000-10-05


    Software Shop Programmer/Analyst 62000.00 2000-10-05 2003-01-08


    Better Place Junior DBA 82000.00 2003-01-08 2007-11-14


    Enterprise Database Developer 95000.00 2007-11-14 2009-07-12


    The outer query gets the job data and the start times, and the subquery finds
    the first start date after the current row’s start date. If no such start date
    exists, the current date is used. Of course, an obvious major problem here is
    lack of support for gaps in the job history. This table may, for instance, hide
    the fact that the subject was laid off from Software Shop in July 2002\. This
    is why I stressed the continuous nature of data modeled in this way.


    Despite the lack of support for gaps, let’s try a bit more data and see what happens.
    As the subject’s career progressed, he received various title and pay changes
    during the periods of employment with these different companies, which are represented
    in the following additional rows:


    INSERT INTO JobHistory


    (


    Company,


    Title,


    Pay,


    StartDate


    ) VALUES


    (''Acme Corp'', ''Programmer'', 55000.00, ''19980901''),


    (''Acme Corp'', ''Programmer 2'', 58000.00, ''19990901''),


    (''Acme Corp'', ''Programmer 3'', 58000.00, ''20000901''),


    (''Software Shop'', ''Programmer/Analyst'', 62000.00, ''20001005''),


    (''Software Shop'', ''Programmer/Analyst'', 67000.00, ''20020101''),


    (''Software Shop'', ''Programmer'', 40000.00, ''20020301''),


    (''Better Place'', ''Junior DBA'', 84000.00, ''20040601''),


    (''Better Place'', ''DBA'', 87000.00, ''20060601'');


    The data in the JobHistory table, shown in full in Table 11-1, follows the subject
    along a path of relative job growth. A few raises and title adjustments—including
    one title adjustment with no associated pay raise—and an unfortunate demotion
    along with a downsized salary, just before getting laid off in 2002 (the gap which,
    as mentioned, is not able to be represented here). Luckily, after studying hard
    while laid off, the subject bounced back with a much better salary, and of course
    a more satisfying career track!


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    *Table 11-1\. The Subject’s Full Job History, with Salary and Title Adjustments*


    **Company Title Pay**


    **StartDate**


    Acme Corp


    Programmer


    50000.00


    1997-06-26


    Acme Corp


    Programmer


    55000.00


    1998-09-01


    Acme Corp


    Programmer 2


    58000.00


    1999-09-01


    Acme Corp


    Programmer 3


    58000.00


    2000-09-01


    Software Shop


    Programmer/Analyst


    62000.00


    2000-10-05


    Software Shop


    Programmer/Analyst


    62000.00


    2000-10-05


    Software Shop


    Programmer/Analyst


    67000.00


    2002-01-01


    Software Shop


    Programmer


    40000.00


    2002-03-01


