- fmt: "# CHAPTER 1 SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD\n\n\
    ## Performance vs. Design vs. Reality\n\nArchitecture purists might argue that\
    \ performance should have no bearing on application design; it’s an implementation\
    \ detail, and can be solved at the code level. Those of us who’ve been in the\
    \ trenches and have had to deal with the reality of poorly designed architectures\
    \ know that this is not the case.\n\nPerformance is, in fact, inexorably tied\
    \ to design in virtually every application. Consider chatty interfaces that send\
    \ too much data or require too many client requests to fill the user’s screen\
    \ with the requested information, or applications that must go back to a central\
    \ server for key functionality with every user request. In many cases, these performance\
    \ flaws can be identified—and fixed—during the design phase, before they are allowed\
    \ to materialize. However, it’s important not to go over the top in this respect:\
    \ designs should not become overly contorted in order to avoid anticipated “performance\
    \ problems” that may never occur.\n\n## Application Logic\n\nIf data logic *definitely*\
    \ belongs in the database, and business logic *may* have a place in the database,\
    \ application logic is the set of rules that should be kept as far away from the\
    \ central data as possible. The rules that make up application logic include such\
    \ things as user interface behaviors, string and number formatting rules, localization,\
    \ and other related issues that are generally tied to user interfaces. Given the\
    \ application hierarchy discussed previously (one database that might be shared\
    \ by many applications, which in turn might be shared by many user interfaces),\
    \ it’s clear that mingling user interface data with application or central business\
    \ data can raise severe coupling issues and ultimately reduce the possibility\
    \ for sharing of data.\n\nNote that I’m not implying that you should always avoid\
    \ persisting UI-related entities in a database. Doing so certainly makes sense\
    \ for many applications. What I am warning against is the risk of failing to draw\
    \ a sufficiently distinct line between user interface elements and the rest of\
    \ the application’s data.\n\nWhenever possible, make sure to create different\
    \ tables, preferably in different schemas or even entirely different databases,\
    \ in order to store purely application-related data. This will enable you to keep\
    \ the application decoupled from the data as much as possible.\n\n## The \"Object-Relational\
    \ Impedance Mismatch\"\n\nThe primary stumbling block that makes it difficult\
    \ to move information between object-oriented systems and relational databases\
    \ is that the two types of systems are incompatible from a basic design point\
    \ of view. Relational databases are designed using the rules of normalization,\
    \ which help to ensure data integrity by splitting information into tables interrelated\
    \ by keys. Object-oriented systems, on the other hand, tend to be much more lax\
    \ in this area. It is quite common for objects to contain data that, while related,\
    \ might not be modeled in a database in a single table.\n\nFor example, consider\
    \ the following class, for a product in a retail system:\n\n```\nclass Product\n\
    {\n    string UPC;\n    string Name;\n    string Description;\n    decimal Price;\n\
    \    datetime UpdatedDate;\n}\n```\n\nAt first glance, the fields defined in this\
    \ class seem to relate to one another quite readily, and one might expect that\
    \ they would always belong in a single table in a database. However, it’s possible\
    \ that this product class represents only a point-in-time view of any given product,\
    \ as of its last-updated date.\n\nIn the database, the data could be modeled as\
    \ follows:\n\n```\nCREATE TABLE Products\n(\n    UPC varchar(20) PRIMARY KEY,\n\
    \    Name varchar(50)\n);\n\nCREATE TABLE ProductHistory\n(\n    UPC varchar(20)\
    \ FOREIGN KEY REFERENCES Products (UPC),\n    Description varchar(100),\n    Price\
    \ decimal,\n    UpdatedDate datetime,\n    PRIMARY KEY (UPC, UpdatedDate)\n);\n\
    ```"
  raw: 'CHAPTER 1 „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    **Performance vs. Design vs. Reality**


    Architecture purists might argue that performance should have no bearing on application
    design; it’s an implementation detail, and can be solved at the code level. Those
    of us who’ve been in the trenches and have had to deal with the reality of poorly
    designed architectures know that this is not the case.


    Performance is, in fact, inexorably tied to design in virtually every application.
    Consider chatty interfaces that send too much data or require too many client
    requests to fill the user’s screen with the requested information, or applications
    that must go back to a central server for key functionality with every user request.
    In many cases, these performance flaws can be identified—and fixed—during the
    design phase, before they are allowed to materialize. However, it’s important
    not to go over the top in this respect: designs should not become overly contorted
    in order to avoid anticipated “performance problems” that may never occur.


    Application Logic


    If data logic *definitely* belongs in the database, and business logic *may* have
    a place in the database, application logic is the set of rules that should be
    kept as far away from the central data as possible. The rules that make up application
    logic include such things as user interface behaviors, string and number formatting
    rules, localization, and other related issues that are generally tied to user
    interfaces. Given the application hierarchy discussed previously (one database
    that might be shared by many applications, which in turn might be shared by many
    user interfaces), it’s clear that mingling user interface data with application
    or central business data can raise severe coupling issues and ultimately reduce
    the possibility for sharing of data.


    Note that I’m not implying that you should always avoid persisting UI-related
    entities in a database.


    Doing so certainly makes sense for many applications. What I am warning against
    is the risk of failing to draw a sufficiently distinct line between user interface
    elements and the rest of the application’s data.


    Whenever possible, make sure to create different tables, preferably in different
    schemas or even entirely different databases, in order to store purely application-related
    data. This will enable you to keep the application decoupled from the data as
    much as possible.


    The “Object-Relational Impedance Mismatch”


    The primary stumbling block that makes it difficult to move information between
    object-oriented systems and relational databases is that the two types of systems
    are incompatible from a basic design point of view. Relational databases are designed
    using the rules of normalization, which help to ensure data integrity by splitting
    information into tables interrelated by keys. Object-oriented systems, on the
    other hand, tend to be much more lax in this area. It is quite common for objects
    to contain data that, while related, might not be modeled in a database in a single
    table.


    For example, consider the following class, for a product in a retail system:


    class Product


    {


    string UPC;


    string Name;


    string Description;


    decimal Price;


    CHAPTER


    „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    datetime UpdatedDate;


    }


    At first glance, the fields defined in this class seem to relate to one another
    quite readily, and one might expect that they would always belong in a single
    table in a database. However, it’s possible that this product class represents
    only a point-in-time view of any given product, as of its last-updated date.


    In the database, the data could be modeled as follows:


    CREATE TABLE Products


    (


    UPC varchar(20) PRIMARY KEY,


    Name varchar(50)


    );


    CREATE TABLE ProductHistory


    (


    UPC varchar(20) FOREIGN KEY REFERENCES Products (UPC),


    Description varchar(100),


    Price decimal,


    UpdatedDate datetime,


    PRIMARY KEY (UPC, UpdatedDate)


    );'
  trans: "\n# 第一章 数据库世界的软件开发方法论\n\n## 性能 vs. 设计 vs. 现实\n\n架构纯粹主义者可能会争辩说，性能不应影响应用程序设计；它只是一个实现细节，可以在代码层面解决。但我们这些曾在一线奋战、不得不面对设计糟糕的架构所带来的现实的人知道，事实并非如此。\n\
    \n事实上，性能在几乎所有应用中都与设计密不可分。试想那些发送过多数据或需要太多客户端请求才能将所需信息填满用户屏幕的“过于絮叨的”接口，或者那些每次用户请求都必须返回中央服务器以执行关键功能的应用。在许多情况下，这些性能缺陷可以在设计阶段就被识别并修复，从而避免它们在日后显现。然而，重要的是不要在这方面走得太远：设计不应为了规避可能永远不会发生的预期“性能问题”而变得过度扭曲。\n\
    \n## 应用逻辑\n\n如果说数据逻辑*绝对*属于数据库，业务逻辑*可能*在数据库中占有一席之地，那么应用逻辑就是应该尽可能远离核心数据的一套规则。构成应用逻辑的规则包括诸如用户界面行为、字符串和数字格式化规则、本地化以及其他通常与用户界面相关的问题。考虑到前面讨论的应用层次结构（一个数据库可能被多个应用共享，而这些应用又可能被多个用户界面共享），很明显，将用户界面数据与应用程序或核心业务数据混在一起会引发严重的耦合问题，并最终降低数据共享的可能性。\n\
    \n请注意，我并不是说总是应该避免在数据库中持久化与用户界面相关的实体。对于许多应用来说，这样做当然有其道理。我所警告的是，未能清晰区分用户界面元素与应用程序其余数据所带来的风险。\n\
    \n在可能的情况下，务必创建不同的表（最好放在不同的模式中，甚至完全不同的数据库中），以存储纯粹与应用相关的数据。这将使你能够尽可能保持应用与数据的解耦。\n\
    \n## “对象-关系阻抗不匹配”\n\n使得信息在面向对象系统和关系数据库之间难以迁移的主要障碍在于，从基本设计的角度来看，这两种系统类型是不兼容的。关系数据库采用规范化规则设计，通过将信息拆分成由键相互关联的表来帮助确保数据完整性。而面向对象系统在这方面则往往宽松得多。对象中包含的数据虽然相关，但可能不会在数据库的单个表中建模，这种情况相当常见。\n\
    \n例如，考虑下面这个零售系统中产品的类：\n\n```\nclass Product\n{\n    string UPC;\n    string Name;\n\
    \    string Description;\n    decimal Price;\n    datetime UpdatedDate;\n}\n```\n\
    \n乍一看，这个类中定义的字段似乎彼此紧密相关，人们可能会期望它们总是属于数据库中的单个表。然而，这个产品类可能仅代表了某个产品在最后更新日期那一刻的视图。\n\
    \n在数据库中，数据可能建模如下：\n\n```\nCREATE TABLE Products\n(\n    UPC varchar(20) PRIMARY\
    \ KEY,\n    Name varchar(50)\n);\n\nCREATE TABLE ProductHistory\n(\n    UPC varchar(20)\
    \ FOREIGN KEY REFERENCES Products (UPC),\n    Description varchar(100),\n    Price\
    \ decimal,\n    UpdatedDate datetime,\n    PRIMARY KEY (UPC, UpdatedDate)\n);\n\
    ```\n"
- fmt: "The important thing to note here is that the object representation of data\
    \ may not have any bearing on how the data happens to be modeled in the database,\
    \ and vice versa. The object-oriented and relational worlds each have their own\
    \ goals and means to attain those goals, and developers should not attempt to\
    \ wedge them together, lest functionality is reduced.\n\n## Are Tables Really\
    \ Classes in Disguise?\n\nIt is sometimes stated in introductory database textbooks\
    \ that tables can be compared to classes, and rows to instances of a class (i.e.,\
    \ objects). This makes a lot of sense at first; tables, like classes, define a\
    \ set of attributes (known as columns) for an entity. They can also define (loosely)\
    \ a set of methods for an entity, in the form of triggers.\n\nHowever, that is\
    \ where the similarities end. The key foundations of an object-oriented system\
    \ are inheritance and polymorphism, both of which are difficult if not impossible\
    \ to represent in SQL databases. Furthermore, the access path to related information\
    \ in databases and object-oriented systems is quite different. An entity in an\
    \ object-oriented system can “have” a child entity, which is generally accessed\
    \ using a “dot” notation. For instance, a bookstore object might have a collection\
    \ of books:\n\n```sql\nBooks = BookStore.Books;\n```\n\nIn this object-oriented\
    \ example, the bookstore “has” the books. But in SQL databases this kind of relationship\
    \ between entities is maintained via keys, where the child entity points to its\
    \ parent. Rather than the bookstore having the books, the relationship between\
    \ the entities is expressed the other way around, where the books maintain a foreign\
    \ key that points back to the bookstore:\n\n```sql\nCREATE TABLE BookStores\n\
    (\n    BookStoreId int PRIMARY KEY\n);\n\nCREATE TABLE Books\n(\n    BookStoreId\
    \ int REFERENCES BookStores (BookStoreId),\n    BookName varchar(50),\n    Quantity\
    \ int,\n    PRIMARY KEY (BookStoreId, BookName)\n);\n```\n\nWhile the object-oriented\
    \ and SQL representations can store the same information, they do so differently\
    \ enough that it does not make sense to say that a table represents a class, at\
    \ least in current SQL databases.\n\n## Modeling Inheritance\n\nIn object-oriented\
    \ design, there are two basic relationships that can exist between objects: “has-a”\
    \ relationships, where an object “has” an instance of another object (e.g., a\
    \ bookstore has books), and “is-a” relationships, where an object’s type is a\
    \ subtype (or *subclass*) of another object (e.g., a bookstore is a type of store).\
    \ In an SQL database, “has-a” relationships are quite common, whereas “is-a” relationships\
    \ can be difficult to achieve.\n\nConsider a table called “Products,” which might\
    \ represent the entity class of all products available for sale by a company.\
    \ This table may have columns (attributes) that typically belong to a product,\
    \ such as “price,” “weight,” and “UPC.” These common attributes are applicable\
    \ to all products that the company sells. However, the company may sell many subclasses\
    \ of products, each with their own specific sets of additional attributes. For\
    \ instance, if the company sells both books and DVDs, the books might have a “page\
    \ count,” whereas the DVDs would probably have “length” and “format” attributes.\n\
    \nSubclassing in the object-oriented world is done via inheritance models that\
    \ are implemented in languages such as C#. In these models, a given entity can\
    \ be a member of a subclass, and still generally treated as a member of the *superclass*\
    \ in code that works at that level. This makes it possible to seamlessly deal\
    \ with both books and DVDs in the checkout part of a point-of-sale application,\
    \ while keeping separate attributes about each subclass for use in other parts\
    \ of the application where they are needed.\n\nIn SQL databases, modeling inheritance\
    \ can be tricky. The following code listing shows one way that it can be approached:\n\
    \n```sql\nCREATE TABLE Products\n(\n    UPC int NOT NULL PRIMARY KEY,\n    Weight\
    \ decimal NOT NULL,\n    Price decimal NOT NULL\n);\n\nCREATE TABLE Books\n(\n\
    \    UPC int NOT NULL PRIMARY KEY\n        REFERENCES Products (UPC),\n    PageCount\
    \ int NOT NULL\n);\n\nCREATE TABLE DVDs\n(\n    UPC int NOT NULL PRIMARY KEY\n\
    \        REFERENCES Products (UPC),\n    LengthInMinutes decimal NOT NULL,\n \
    \   Format varchar(4) NOT NULL\n        CHECK (Format IN ('NTSC', 'PAL'))\n);\n\
    ```\n\nThe database structure created using this code listing is illustrated in\
    \ Figure 1-2.\n\n*Figure 1-2\\. Modeling inheritance in a SQL database*\n\nAlthough\
    \ this model successfully establishes books and DVDs as subtypes for products,\
    \ it has a couple of serious problems. First of all, there is no way of enforcing\
    \ uniqueness of subtypes in this model as it stands. A single UPC can belong to\
    \ both the Books and DVDs subtypes simultaneously. That makes little sense in\
    \ the real world in most cases (although it might be possible that a certain book\
    \ ships with a DVD, in which case this model could make sense).\n\nAnother issue\
    \ is access to attributes. In an object-oriented system, a subclass automatically\
    \ inherits all of the attributes of its superclass; a book entity would contain\
    \ all of the attributes of both books and general products. However, that is not\
    \ the case in the model presented here. Getting general product attributes when\
    \ looking at data for books or DVDs requires a join back to the `Products` table.\
    \ This really breaks down the overall sense of working with a subtype.\n\nSolving\
    \ these problems is not impossible, but it takes some work. One method of guaranteeing\
    \ uniqueness among subtypes involves populating the supertype with an additional\
    \ attribute identifying the subtype of each instance. The following tables show\
    \ how this solution could be implemented:\n\n```sql\nCREATE TABLE Products\n(\n\
    \    UPC int NOT NULL PRIMARY KEY,\n    Weight decimal NOT NULL,\n    Price decimal\
    \ NOT NULL,\n    ProductType char(1) NOT NULL\n        CHECK (ProductType IN ('B',\
    \ 'D')),\n    UNIQUE (UPC, ProductType)\n);\n\nCREATE TABLE Books\n(\n    UPC\
    \ int NOT NULL PRIMARY KEY,\n    ProductType char(1) NOT NULL\n        CHECK (ProductType\
    \ = 'B'),\n    PageCount int NOT NULL,\n    FOREIGN KEY (UPC, ProductType) REFERENCES\
    \ Products (UPC, ProductType)\n);\n\nCREATE TABLE DVDs\n(\n    UPC int NOT NULL\
    \ PRIMARY KEY,\n    ProductType char(1) NOT NULL\n        CHECK (ProductType =\
    \ 'D'),\n    LengthInMinutes decimal NOT NULL,\n    Format varchar(4) NOT NULL\n\
    \        CHECK (Format IN ('NTSC', 'PAL')),\n    FOREIGN KEY (UPC, ProductType)\
    \ REFERENCES Products (UPC, ProductType)\n);\n```\n\nBy defining the subtype as\
    \ part of the supertype, a `UNIQUE` constraint can be created, enabling SQL Server\
    \ to enforce that only one subtype for each instance of a supertype is allowed.\
    \ The relationship is further enforced in each subtype table by a `CHECK` constraint\
    \ on the `ProductType` column, ensuring that only the correct product types are\
    \ allowed to be inserted.\n\nIt is possible to extend this method even further\
    \ using indexed views and `INSTEAD OF` triggers. A view can be created for each\
    \ subtype, which encapsulates the join necessary to retrieve the supertype’s attributes.\
    \ By creating views to hide the joins, a consumer does not have to be aware of\
    \ the subtype/supertype relationship, thereby fixing the attribute access problem.\
    \ The indexing helps with performance, and the triggers allow the views to be\
    \ updateable.\n\nIt is possible in SQL databases to represent almost any relationship\
    \ that can be embodied in an object-oriented system, but it’s important that database\
    \ developers understand the intricacies of doing so. Mapping object-oriented data\
    \ into a database (properly) is often not at all straightforward, and for complex\
    \ object graphs can be quite a challenge.\n\n## The “Lots of Null Columns” Inheritance\
    \ Model"
