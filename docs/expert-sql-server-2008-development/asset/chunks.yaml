    cheaper to offload work to clients than to purchase bigger servers.'
  trans: '# 关于灵活性与接口的核心要义


    我希望在此传达的核心信息是，在许多情况下，极致的灵活性与稳固、可维护的接口可能无法并行不悖。如果你的目标是开发真正健壮的软件，你往往会发现必须削减灵活性。但请记住，在大多数情况下，都存在完全合理的变通方案，而无需牺牲原始接口所预期的任何真实灵活性。例如，在这个例子中，可以通过多种方式重写接口以保留所有可能的功能。其中一个版本如下所示：


    ```sql

    CREATE PROCEDURE GetAllEmployeeData

    @OrderByName int = 0,

    @OrderByNameASC bit = 1,

    @OrderBySalary int = 0,

    @OrderBySalaryASC bit = 1,

    -- 其他列 ...

    ```


    在这个修改后的接口版本中，使用者可以选择用于排序的每个列都有两个相关联的参数：一个参数指定列的排序顺序，第二个参数指定是升序还是降序排序。因此，如果使用者为
    `@OrderByName` 参数传递值 2，并为 `@OrderBySalary` 参数传递值 1，结果将首先按工资排序，然后按姓名排序。使用者可以通过操作
    `@OrderByNameASC` 和 `@OrderBySalaryASC` 参数来进一步修改排序，为每个列指定排序方向。


    这个版本的接口没有暴露关于存储过程内部实现的任何信息。开发者可以自由使用他或她选择的任何技术，以最有效的方式返回正确的结果。此外，使用者无需了解 `Employees`
    表的实际列名。包含员工姓名的列可能叫 `Name`，也可能叫 `EmpName`。或者，可能有两列，一列包含名字，一列包含姓氏。由于使用者不需要知道这些名称，它们可以根据数据变化进行必要的修改，并且由于使用者并不耦合于基于例程的列名知识，因此无需对使用者进行任何更改。请注意，同样的推理也可以用来建议，最终用户和应用程序应该只访问作为视图公开的数据，而不是直接访问数据库中的基表。视图可以提供一个抽象层，使得可以对底层表进行更改，同时保持视图的属性不变。


    请注意，此示例仅讨论了接口的输入。请记住，输出（例如，结果集）同样重要，这些也应该在契约中记录。我建议始终根据需要使用 `AS` 关键字创建列别名，以便即使底层表发生变化，接口也能继续返回相同的输出。如前所述，我还建议开发者避免根据输入参数返回额外数据，例如额外的列或结果集。这样做可能会产生难以测试和维护的存储过程。


    # 第一章 — 数据库世界的软件开发方法论


    ## 异常是任何接口的重要组成部分


    在思考隐含契约时，开发者经常未能考虑到的一种重要输出类型是，当事情出错时，给定方法可能抛出的异常。许多方法在某些情况下会抛出明确定义的异常，但如果这些异常没有得到充分记录，它们原本良好的意图就会变得相当浪费。通过确保正确记录异常，你不仅能让客户端捕获并处理你已预见的异常，还能帮助开发者理解哪些地方可能出错，并针对可能的问题进行防御性编码。通常，围绕潜在问题遵循代码路径几乎总是比不得不处理异常要好。


    ## 集成数据库与面向对象系统


    一个似乎使数据库开发变得比其应有的难度大得多的主要问题，其实与开发本身无关，而是一个架构问题。面向对象框架和数据库系统通常不能很好地协同工作，主要是因为它们有一套不同的核心目标。面向对象系统旨在从行为的角度对业务实体进行建模——业务实体能做什么，其他实体能对它做什么或者能与它一起做什么？另一方面，数据库更关心实体之间的关系，而较少关心它们所参与的活动。


    显然，我们有两个不兼容的范式来对业务实体建模。然而，两者都是几乎每个应用程序的必要组成部分，必须为了共同的目标——服务用户——而一起被利用。为此，数据库开发者需要知道什么属于哪里，以及何时将责任交还给他们的应用程序开发者同行，这一点很重要。不幸的是，如何为任何给定的业务流程的各个部分进行适当建模的问题，可能会迅速让人陷入一个灰色地带。你应该如何决定是在数据库中实现还是在应用程序中实现？


    自古以来（或至少自互联网诞生以来），许多数据库论坛上的核心争论一直围绕着如何处理那始终存在的必需“逻辑”。可悲的是，尽管我们努力尝试，开发者们仍然没有想出如何在不需要实现业务需求的情况下开发应用程序。因此，争论仍在激烈进行。“业务逻辑”属于数据库？属于应用层？用户界面呢？较新的应用程序架构对这个古老的问题有何影响？


    ## 逻辑放置的简史


    从前，计算机只是被称为“计算机”。它们日夜不停地为“哑”终端提供少量数据。那时，应用程序和数据之间没有太大区别，因此对于我们今天争论的架构问题，几乎没什么问题可问，也没什么答案可给。


    但是，随着时间的推移，变革之风吹遍了世界各地装有空调的数据中心，以前被称为“计算机”的系统变成了“大型机”——1960 年代中期机架上的新计算机是“小型机”。比大型机更小更便宜的“小型机”迅速流行起来。它们相对于大型机较低的成本意味着，现在通过将应用程序运行在多台机器上来实现横向扩展在财政上成为可能。此外，这些机器足够便宜，甚至可以直接被最终用户用作之前无处不在的哑终端的替代品。在同一时期，我们也看到了第一批商业上可用的数据库系统，例如
    `Adabas` 数据库管理系统（`DBMS`）。


    小型机的出现标志着应用程序架构领域的多重变化。除了多服务器横向扩展的替代方案外，最终用户开始使用比终端更强大的机器这一事实意味着，在某些情况下，应用程序的部分工作可以卸载到用户界面（UI）层。工作负载现在可以进行分配以创建更具可扩展性的应用程序，而不再仅仅利用一台服务器的能力。


    随着时间的推移，“微型计算机”（当今基于英特尔和 AMD 的系统的祖先）变得越来越强大，最终小型机消失了。然而，在小型机时代诞生的基于客户端/服务器的架构并没有消亡；应用程序开发者发现，将工作卸载到客户端可能比购买更大的服务器便宜得多。'
- fmt: '# 软件开发方法论与数据库世界


    20世纪90年代末期，架构趋势发生了又一次范式转变——奇怪的是，它又回到了大型机和哑终端的世界。Web服务器取代了大型机系统，成为集中的数据和UI系统，而浏览器则扮演了先前由终端承担的角色。本质上，这使应用程序架构经历了一个轮回，但有一个关键区别：现代基于Web的数据中心的特征是“**commodity
    servers**”**农场——廉价、标准化且易于更换的硬件，而不是单一的大型机。


    云计算这一最新趋势，似乎将对传统的架构设计决策观点构成另一项严峻挑战。在基于云的模型中，应用程序使用共享的、虚拟化的服务器资源，这些资源通常由第三方通过互联网以服务的形式提供。


    亚马逊、谷歌和微软等供应商已经提供了基于云的数据库服务，但在撰写本文时，这些服务仍处于非常初级的阶段。例如，当前的SQL Server数据服务的实现，在带宽和存储方面有严重限制，这意味着在大多数情况下，它无法替代专用数据中心。然而，向云端迁移的动力日益增强，未来几年它将如何影响数据架构决策，值得关注。


    在思考这些问题时，需要记住的一个重要点是：单个数据库可能被多个应用程序共享，这些应用程序又可能暴露多个用户界面，如图1-1所示。


    数据库开发人员必须努力确保数据被充分封装，以允许其在多个应用程序之间共享，同时确保不同应用程序的逻辑不会冲突，从而使整个数据库陷入不一致的状态。达到这种程度的封装需要仔细划分逻辑，尤其是数据验证规则。


    规则和逻辑可以划分为三个基本组：


    *   数据逻辑

    *   业务逻辑

    *   应用逻辑


    *图1-1. 数据库应用层级*


    设计应用程序时，重要的是理解这些划分，并考虑在应用层级中，任何给定的逻辑片段应放置在何处，以确保其可重用性。


    ## 数据逻辑


    `Data logic`定义了数据库中的数据必须满足的条件，以保持一致、未损坏的状态。数据库开发人员无疑熟悉以主键和外键约束、检查约束、触发器等形式实现这些规则。数据规则并不规定*如何*操作数据或*何时*操作数据；相反，数据规则规定的是任何过程完成后数据必须处于的状态。


    重要的是要记住，在大多数应用程序中，数据不仅仅是“数据”——相反，数据库中的数据是对实际业务的建模。因此，数据规则必须反映驱动业务本身的所有规则。例如，如果你正在设计一个支持银行应用程序的数据库，可能会遇到一项业务规则，规定某些类型的账户不允许透支。


    为了对当前应用程序和所有可能的未来应用程序正确实施此规则，必须在数据本身的层面集中实施。如果数据保证是一致的，那么应用程序只需担心对数据*做什么*。


    作为一般准则，你应尝试实施尽可能多的数据规则，以避免出现数据质量问题的可能性。数据库是数据的持有者，因此应充当数据是否有资格被持久化的最终仲裁者。任何对业务至关重要的验证规则，对数据也同样至关重要，反之亦然。在我参与众多数据库支持的应用程序的工作过程中，我从未见过数据规则过多的数据库；但我经常看到数据库因缺乏足够的规则而导致数据完整性问题。


    ### 数据规则到底属于哪里？


    许多面向对象的狂热者会争辩说，正确的解决方案根本不是数据库，而是一个接口总线，它充当数据库之上的外观，并控制所有进出数据库的通信。虽然这种方法在理论上可行，但存在几个问题。首先，这种方法完全忽略了数据库强制数据完整性的概念，并将数据库层变成了一个纯粹的存储容器，未能利用几乎所有现代数据库为此目的而内置的任何特性。此外，这样的接口层仍然必须与数据库通信，因此无论如何都必须在某个层面编写数据库代码。编写这样的接口层可能会消除一些数据库代码，但这只是推迟了与数据库打交道的必要性。最后，以我相当主观的观点来看，在许多情况下，应用层不如数据库稳定或持久。虽然应用程序和应用架构来来去去，但数据库似乎在企业中拥有极长的生命周期。同样的规则也适用于一个无所不包的接口总线。所有这些问题可能是一个重要原因，尽管我多年来听到架构师们争论这个问题，但我从未见过这样的系统被实现。


    ## 业务逻辑


    `Business logic`这个术语在软件开发圈中通常被用作一个模糊的统称，指代应用程序所做的任何与UI无关、且涉及至少一个条件分支的事情。换句话说，这个术语被过度使用，没有真正的含义。


    幸运的是，软件开发是一个不断变化的领域，我们不必坚持这种公认的缺乏定义的状态。就本文而言，`Business logic`被定义为任何规定如何或何时操作数据以改变其状态，但不规定如何持久化或验证数据的规则或过程。这方面的一个例子是将原始数据渲染成适合最终用户的报告所需的逻辑。我们假设已经应用了数据逻辑规则的原始数据，可以通过`Business
    logic`来确定适当的聚合和分析，以回答最终用户可能提出的问题。如果这些数据需要以其新形式持久化在数据库中，则必须再次应用数据规则；请记住，数据库应始终对任何给定数据是否允许拥有最终决定权。


    那么，业务逻辑属于数据库吗？答案是明确的“可能”。作为一名数据库开发人员，你的主要关注点往往围绕着数据完整性和性能。抛开其他因素（如整体应用架构）不谈，这意味着在一般实践中，你应该尝试将`Business
    logic`放在能提供最佳性能的层中，或者放在最易于重用的层中。例如，如果许多应用程序共享相同的数据，并且每个应用程序都有类似的报告需求，那么设计存储过程来将数据渲染成正确的报告格式，可能比在每个应用程序中实现类似的报告更有意义。'
  raw: 'The late 1990s saw yet another paradigm shift in architectural trends—strangely,
    back toward the world of mainframes and dumb terminals. Web servers replaced the
    mainframe systems as centralized data and UI systems, and browsers took on the
    role previously filled by the terminals. Essentially, this brought application
    architecture full circle, but with one key difference: the modern web-based data
    center is characterized by “farms” of *commodity servers*—cheap, standardized,
    and easily replaced hardware, rather than a single monolithic mainframe.


    The latest trend toward cloud-based computing looks set to pose another serious
    challenge to the traditional view of architectural design decisions. In a cloud-based
    model, applications make use of shared, virtualized server resources, normally
    provided by a third-party as a service over the internet.


    Vendors such as Amazon, Google, and Microsoft already offer cloud-based database
    services, but at the time of writing, these are all still at a very embryonic
    stage. The current implementation of SQL Server Data Services, for example, has
    severe restrictions on bandwidth and storage which mean that, in most cases, it
    is not a viable replacement to a dedicated data center. However, there is growing
    momentum behind the move to the cloud, and it will be interesting to see what
    effect this has on data architecture decisions over the next few years.


    When considering these questions, an important point to remember is that a single
    database may be shared by multiple applications, which in turn expose multiple
    user interfaces, as illustrated in Figure 1-1.


    Database developers must strive to ensure that data is sufficiently encapsulated
    to allow it to be shared among multiple applications, while ensuring that the
    logic of disparate applications does not collide and put the entire database into
    an inconsistent state. Encapsulating to this level requires careful partitioning
    of logic, especially data validation rules.


    Rules and logic can be segmented into three basic groups:


    •


    Data logic


    •


    Business logic


    •


    Application logic


    CHAPTER 1 „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    *Figure 1-1\. The database application hierarchy*


    When designing an application, it’s important to understand these divisions and
    consider where in the application hierarchy any given piece of logic should be
    placed in order to ensure reusability.


    Data Logic


    Data logic defines the conditions that must be true for the data in the database
    to be in a consistent, noncorrupt state. Database developers are no doubt familiar
    with implementing these rules in the form of primary and foreign key constraints,
    check constraints, triggers, and the like. Data rules do not dictate *how* the
    data can be manipulated or *when* it should be manipulated; rather, data rules
    dictate the state that the data must end up in once any process is finished.


    It’s important to remember that data is not “just data” in most applications—rather,
    the data in the database models the actual business. Therefore, data rules must
    mirror all rules that drive the business itself. For example, if you were designing
    a database to support a banking application, you might be presented with a business
    rule that states that certain types of accounts are not allowed to be overdrawn.


    In order to properly enforce this rule for both the current application and all
    possible future applications, it must be implemented centrally, at the level of
    the data itself. If the data is guaranteed to be consistent, applications must
    only worry about what to *do* with the data.


    As a general guideline, you should try to implement as many data rules as necessary
    in order to avoid the possibility of data quality problems. The database is the
    holder of the data, and as such should act as the final arbiter of the question
    of what data does or does not qualify to be persisted. Any validation rule that
    is central to the business is central to the data, and vice versa. In the course
    of my work with numerous database-backed applications, I’ve never seen one with
    too many data rules; but I’ve very often seen databases in which the lack of enough
    rules caused data integrity issues.


    CHAPTER


    „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    **Where Do the Data Rules Really Belong?**


    Many object-oriented zealots would argue that the correct solution is not a database
    at all, but rather an interface bus, which acts as a façade over the database
    and takes control of all communications to and from the database. While this approach
    would work in theory, there are a few issues. First of all, this approach completely
    ignores the idea of database-enforced data integrity and turns the database layer
    into a mere storage container, failing to take advantage of any of the in-built
    features offered by almost all modern databases designed specifically for that
    purpose. Furthermore, such an interface layer will still have to communicate with
    the database, and therefore database code will have to be written at some level
    anyway. Writing such an interface layer may eliminate some database code, but
    it only defers the necessity of working with the database. Finally, in my admittedly
    subjective view, application layers are not as stable or long-lasting as databases
    in many cases. While applications and application architectures come and go, databases
    seem to have an extremely long life in the enterprise. The same rules would apply
    to a do-it-all interface bus. All of these issues are probably one big reason
    that although I’ve heard architects argue this issue for years, I’ve never seen
    such a system implemented.


    Business Logic


    The term **business logic** is generally used in software development circles
    as a vague catch-all for anything an application does that isn’t UI related and
    that involves at least one conditional branch. In other words, this term is overused
    and has no real meaning.


    Luckily, software development is an ever-changing field, and we don’t have to
    stick with the accepted lack of definition. Business logic, for the purpose of
    this text, is defined as any rule or process that dictates how or when to manipulate
    data in order to change the state of the data, but that does not dictate how to
    persist or validate the data. An example of this would be the logic required to
    render raw data into a report suitable for end users. The raw data, which we might
    assume has already been subjected to data logic rules, can be passed through business
    logic in order to determine the aggregations and analyses appropriate for answering
    the questions that the end user might pose. Should this data need to be persisted
    in its new form within a database, it must once again be subjected to data rules;
    remember that the database should always make the final decision on whether any
    given piece of data is allowed.


    So does business logic belong in the database? The answer is a definite “maybe.”
    As a database developer, your main concerns tend to revolve around data integrity
    and performance. Other factors (such as overall application architecture) notwithstanding,
    this means that in general practice you should try to put the business logic in
    the tier in which it can deliver the best performance, or in which it can be reused
    with the most ease. For instance, if many applications share the same data and
    each have similar reporting needs, it might make more sense to design stored procedures
    that render the data into the correct format for the reports, rather than implementing
    similar reports in each application.'
  trans: '

    # 软件开发方法论与数据库世界


    20 世纪 90 年代末期，架构趋势发生了又一次范式转变——奇怪的是，它又回到了大型机和哑终端的世界。Web 服务器取代了大型机系统，成为集中的数据和 UI
