  trans: '

    # 第三章 „ 测试数据库例程


    „ **注意** `在许多组织中，访问性能监控工具的权限仅限于数据库或系统管理员。然而，本节描述的大多数工具都允许保存性能日志，因此，如果你的权限不足以监控性能，另一位拥有足够权限的用户可以对服务器进行性能剖析，并将结果导出给你。`


    一个与开发过程良好整合的测试流程，能在大多数缺陷产生之初就发现它们，而不是留到以后。一名正在增强某个特定模块的开发人员，在那一刻对代码有着深刻的理解。一旦他或她转向另一个模块，随着注意力转移到应用程序的其他部分，这种理解就会开始减弱。如果在开发人员仍在"战壕"中时就发现并报告缺陷，他们就无需为了修复问题而重新学习代码，从而节省大量时间。这些时间节省直接转化为生产力的提升，因为开发人员最终能将更多时间用于开发新功能，而花在修复缺陷上的时间则更少。


    如果管理团队拒绝听取合理建议，不愿为进行适当的测试而分配额外的开发时间，那么无论如何也要尝试去做。诸如测试驱动开发（TDD）之类的方法——你先编写测试，然后创建能通过测试的例程——可以极大地提高整体开发人员的生产力。无论是否获得管理层的批准，采用测试策略都可能意味着更好、更快的产出，最终将有助于确保成功。


    ## 性能监控工具


    使用单元测试、功能测试和回归测试进行验证，对于彻底测试应用程序行为是否正确极为重要，但真正吸引大多数开发人员注意力的还是性能测试。性能测试对于确保积极的用户体验至关重要。用户不希望等待超过绝对必要的时间来获取数据。


    性能测试依赖于收集、审查和分析系统不同方面的性能数据。因此，在深入探讨如何分析系统性能之前，有必要先了解一些可用于捕获此类数据的工具。`SQL Server
    2008` 提供了许多内置工具，允许 `DBA` 和开发人员存储或查看关于服务器上活动的实时信息，包括以下工具：


    *   `SQL Server Profiler`

    *   服务器端跟踪

    *   系统监视器控制台

    *   动态管理视图 (DMVs)

    *   扩展事件

    *   数据收集器


    此外，还有许多第三方监控工具可用，它们可以以不同的方式测量、聚合和呈现性能数据。在本节中，我将讨论一些不同的性能监控方法，以及它们可以适用的情况。


    ## 实时客户端监控


    随 `SQL Server 2008` 提供的 `Profiler` 工具非常有用且易于使用。只需加载 `Profiler` 应用程序并将其指向你想要监控的
    `SQL Server` 实例，它就会基于大约 200 种不同事件报告实时信息。然而，对于大多数性能监控工作，你只需要关注少数几个关键事件。


    在最初为应用程序建立基线时，我通常从只查看 `SQL:BatchCompleted` 和 `RPC:Completed` 事件开始。这两个事件都在查询完成时触发；它们之间的唯一区别是，`RPC:Completed`
    在远程过程调用 (`RPC`) 完成时触发，而 `SQL:BatchCompleted` 在 SQL 批处理完成时触发——不同的访问方法，相同的结果。


    对于这两个事件，最有价值的列是 `CPU`、`Reads`、`Writes` 和 `Duration`：


    *   `CPU` 列报告用于解析、编译和执行查询的 CPU 时间（以毫秒为单位）。由于该列包含

    '
- fmt: "进入`compilation time`，通常可以看到报告的时间在连续查询中下降，这得益于计划缓存。\n\n- `Reads`列报告查询执行的`logical`读取次数。`logical`\
    \ I/O 发生在 SQL Server 的查询引擎请求数据时，无论是从物理磁盘还是从缓冲区缓存。如果在此列中看到高数字，不一定表示性能问题，因为大多数数据可能从缓存中读取。然而，即使从内存中读取数据也会消耗服务器的\
    \ CPU 时间，因此最好尽量减少任何类型的读取。\n- `Writes`列报告查询执行的`physical`写入次数。这意味着只有在查询过程中实际持久化到磁盘的写入才会被报告。\n\
    - `Duration`列报告调用总耗时，以毫秒为单位。查询的持续时间直接反映了用户体验，因此通常从此开始。如果应用程序运行缓慢，您可以使用此列找到最差的查询。\n\
    \n通过查看这些列中包含的高层信息，您可以识别潜在的进一步调查候选对象。首先，考虑系统中任何给定查询需要设置的限制。查询允许运行的最长时间是多少？平均运行时间应该是多少？通过聚合`Duration`列，您可以确定这些时间是否已被超过。\n\
    \n一旦您隔离了可能的问题区域（请参阅本章后面的“Granular Analysis”部分），您可以使用更深入的事件集进行深入探究。例如，`Scan:Started`事件可用于识别可能未有效使用索引并因此可能导致\
    \ I/O 问题的查询。另一方面，`SP:Recompile`事件表示查询被查询优化器重新编译，因此可能消耗了比必要更大的 CPU 时间。\n\n## CHAPTER\
    \ 3 „ TESTING DATABASE ROUTINES\n\n### Server-Side Traces\n\n虽然 SQL Server Profiler\
    \ 是一个方便且有用的工具，但它有一些限制。主要问题是，为了便于实时数据收集和显示，SQL Server 需要持续将数据流式传输回工具——这样做存在开销。因此，尝试监控性能的行为可能对被测量系统的性能产生负面影响，导致有偏差的结果（“观察者效应”）。\n\
    \n在极高事务的性能测试中，您应该通过使用`server-side traces`而不是 Profiler 工具来最小化监控对测试结果的影响。`server-side\
    \ trace`在 SQL 服务器后台运行，将其结果保存到服务器上的本地文件，而不是流式传输到客户端。\n\n可以手动在 T-SQL 中定义`server-side\
    \ trace`的参数，但这样做是一个繁琐且不必要的过程。更好的方法是基于从 SQL Server Profiler 工具导出的跟踪定义创建`server-side\
    \ trace`，如以下步骤所述：\n\n1. 首先，使用 SQL Server Profiler 定义跟踪所需的事件、列和筛选器。\n2. 选择 File\
    \ > Export > Script Trace Definition > For SQL Server 2005 – 2008，并选择文件名以保存脚本。\n\
    3. 保存脚本后，在 SQL Server Management Studio 中打开它。此文件包含基于提供的参数启动跟踪所需的 T-SQL 代码。\n4.\
    \ 编辑脚本的以下行，通过指定跟踪结果的有效输出路径和文件名：\n   ```\n   exec @rc = sp_trace_create @TraceID\
    \ output, 0, N'InsertFileNameHere', @maxfilesize, NULL\n   ```\n\n**Note** 指定的文件名不应包含任何类型的扩展名。跟踪将自动添加一个。"
  raw: 'compilation time, it is common to see the reported amount of time drop on


    consecutive queries, thanks to plan caching.


    •


    The Reads column reports the number of **logical** reads performed by the query.
    A


    logical I/O occurs any time SQL Server’s query engine requests data, whether from


    the physical disk or from the buffer cache. If you see high numbers in this column,


    it may not necessarily indicate a performance problem, because the majority of


    data may be read from cache. However, even reading data from memory does cost


    the server in terms of CPU time, so it is a good idea to try to keep any kind
    of reads


    to a minimum.


    •


    The Writes column reports the number of **physical** writes performed by the query.


    This means that only writes that were actually persisted to disk during the course


    of the query will be reported.


    •


    The Duration column reports the total time elapsed for the call, in milliseconds.


    The duration of a query is a direct reflection on the user experience, so this
    is


    generally the one to start with. If the application is performing slowly, you
    can find


    the worst offending queries using this column.


    By reviewing the high-level information contained in these columns, you can identify
    potential candidates for further investigation. First, think about limits that
    need to be set for any given query in the system. What is the maximum amount of
    time that a query can be allowed to run? What should the average amount of run
    time be? By aggregating the Duration column, you can determine whether these times
    have been exceeded.


    Once you’ve isolated possible problem areas (see the “Granular Analysis” section
    later in the chapter), you can delve deeper in with more in-depth sets of events.
    For instance, the Scan:Started event can be used to identify possible queries
    that are making inefficient use of indexes and therefore may be causing I/O problems.
    The SP:Recompile event, on the other hand, indicates queries that are 59


    CHAPTER 3 „ TESTING DATABASE ROUTINES


    getting recompiled by the query optimizer, and may therefore be consuming larger-than-necessary
    amounts of CPU time.


    Server-Side Traces


    While SQL Server Profiler is a convenient and useful tool, it does have some limitations.
    The main problem is that, in order to facilitate real-time data collection and
    display, SQL Server needs to continually stream the data back to the tool—and
    there is an overhead associated with doing so. As such, the very act of attempting
    to monitor performance may have a negative effect on the performance of the system
    being measured, leading to biased results (the “observer effect”).


    In an extremely high-transaction performance test, you should strive to minimize
    the impact of monitoring on results of the test by using **server-side traces**
    instead of the Profiler tool. A server-side trace runs in the background on the
    SQL server, saving its results to a local file on the server instead of streaming
    them to the client.


    It is possible to define the parameters for a server-side trace manually in T-SQL,
    but to do so is a laborious and unnecessary process. A better approach is to create
    a server-side trace based on a trace definition exported from the SQL Server Profiler
    tool, as explained in the following steps:


    1\. First, use SQL Server Profiler to define the events, columns, and filters
    required


    for the trace.


    2\. Select File > Export > Script Trace Definition > For SQL Server 2005 – 2008,
    and select a file name to save the script.


    3\. Once the script has been saved, open it in SQL Server Management Studio.


    This file contains the T-SQL code required to start a trace based on the


    parameters supplied.


    4\. Edit the following line of the script, by specifying a valid output path and
    file


    name for the trace results where indicated:


    exec @rc = sp_trace_create @TraceID output, 0, N''InsertFileNameHere'',


    @maxfilesize, NULL


    „ **Note** The specified file name should not include an extension of any kind.
    One will automatically be added by the trace.'
  trans: "\n进入`compilation time`阶段，通常可以观察到报告的时间在连续查询中呈下降趋势，这得益于计划缓存。\n\n- `Reads`列报告查询执行的`logical`读取次数。`logical`\
    \ I/O 发生在 SQL Server 的查询引擎请求数据时，无论是从物理磁盘还是从缓冲区缓存获取。如果在此列中看到高数值，不一定表示性能问题，因为大多数数据可能从缓存中读取。然而，即使从内存中读取数据也会消耗服务器的\
    \ CPU 时间，因此最好尽量减少任何类型的读取。\n- `Writes`列报告查询执行的`physical`写入次数。这意味着只有在查询过程中实际持久化到磁盘的写入操作才会被报告。\n\
    - `Duration`列报告调用总耗时，以毫秒为单位。查询的持续时间直接反映了用户体验，因此通常从此入手分析。如果应用程序运行缓慢，您可以使用此列找到性能最差的查询。\n\
    \n通过查看这些列中包含的高层级信息，您可以识别出值得进一步调查的潜在候选对象。首先，考虑系统中任何给定查询需要设定的限制。查询允许运行的最长时间是多少？平均运行时间应该是多少？通过对`Duration`列进行聚合分析，您可以确定这些时间限制是否已被超出。\n\
    \n一旦您隔离了可能的问题区域（请参阅本章后面的“Granular Analysis”部分），您可以使用更详细的事件集进行深入探究。例如，`Scan:Started`事件可用于识别可能未有效使用索引并因此可能导致\
    \ I/O 问题的查询。另一方面，`SP:Recompile`事件表示查询被查询优化器重新编译，因此可能消耗了比必要更多的 CPU 时间。\n\n## 第三章：测试数据库例程\n\
    \n### 服务器端跟踪\n\n虽然 SQL Server Profiler 是一个方便且有用的工具，但它有一些限制。主要问题是，为了便于实时数据收集和显示，SQL\
