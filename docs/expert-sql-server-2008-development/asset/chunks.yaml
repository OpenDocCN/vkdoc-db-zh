    此外，得益于存储过程，支持更先进的测试方法也变得更容易，而不是更困难。例如，考虑使用 **mock objects**（模拟对象）——返回特定已知值的 façade
    方法。在测试场景中，模拟对象可以替代真实方法，以便可以单独测试任何给定的方法，而无需同时测试它调用的任何方法（被测试方法内部的任何调用实际上都将是对方法的模拟版本的调用）。当使用存储过程时，这种技术实际上更容易实现，因为可以轻松创建模拟存储过程并将其换入换出，而不会中断或重新编译正在测试的应用程序代码。


    另一个重要问题是安全性。临时 SQL（以及动态 SQL）带来了各种安全挑战，包括可能打开攻击向量，以及使得以声明式而非编程方式强制执行数据访问安全性变得更加困难。这意味着，通过使用临时
    SQL，你的应用程序可能更容易被黑客攻击，并且你可能无法依赖 SQL Server 来保护数据访问。最终结果是需要进行更高程度的测试，以确保安全漏洞得到适当修补，并且用户（无论是授权用户还是未授权用户）无法访问他们本不应看到的数据。有关这些观点的进一步讨论，请参见“动态
    SQL 安全注意事项”部分。


    最后，我将讨论在线辩论似乎总是倾向于的最热门问题，当然，那就是性能问题。临时 SQL 的支持者提出了一个有效的观点，由于最新版本的 SQL Server 对查询计划缓存的支持更好，存储过程与临时查询相比不再具有显著的性能优势。虽然这听起来像是一个不使用存储过程的绝佳理由，但我个人认为这是一个不成问题的问题。在性能相当的情况下，我认为显而易见的选择是更易于维护和更安全的选项（即存储过程）。


    归根结底，存储过程与临时 SQL 的问题实际上是关于目的的问题。ORM 社区中的许多人认为数据库应该只用作一个非常简单的对象持久层，并且可能对只有一个表、只有两列（一个用于标识对象
    ID 的 GUID 和一个用于序列化对象图的 XML 列）的数据库完全满意。


    在我看来，数据库远不止是数据的集合。它还是数据规则的执行者、数据完整性的保护者，以及可以跨多个应用程序共享的中央数据资源。


    基于这些原因，我认为基于解耦的存储过程的设计是最佳选择。


    ## 为何选择动态 SQL？


    正如本章引言所述，动态 SQL 可以帮助创建更灵活的数据访问层，从而帮助实现更灵活的应用程序，这会让用户更满意。这是一个正当的目标，但事实是，动态 SQL
    只是实现预期最终结果的一种手段。在许多桌面应用程序中，直接在客户端进行动态排序和过滤是完全可能的——事实上通常是更可取的——或者在业务层（如果存在）中进行，以支持基于
    Web 或客户端-服务器风格的桌面应用程序。也可以完全不采用动态 SQL，通过支持提供可选参数的静态存储过程来实现——但这通常不被推荐，因为它可能很快导致代码非常笨拙且难以维护，正如本章后面的“通过静态
    T-SQL 实现可选参数”部分将演示的那样。


    在承诺采用任何基于数据库的解决方案之前，请确定它是否确实是正确的行动方针。请牢记性能、可维护性以及最重要的可扩展性问题。


    数据库资源通常是特定应用程序使用的任何资源中负担最重的，而数据的动态排序和过滤可能意味着给数据库带来更多负载。请记住，扩展数据库通常比扩展应用程序的其他层要昂贵得多。

