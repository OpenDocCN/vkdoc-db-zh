    ```\n\n一个相关的，或许更严重的，对防御性应用程序的威胁是依赖未记录功能的代码。SQL Server 中存在许多此类功能——例如，以下代码清单演示了未记录的\
    \ `sp_MSForEachTable` 存储过程，它可用于对数据库中的每个表执行提供的查询。\n\n```sql\nEXEC sp_MSforeachtable\
    \ \"EXEC sp_spaceused '?'\";\n```\n\n虽然可以肯定已弃用功能将在未来的某个时间点被移除，但这个时间尺度通常是已知的，并且通常有一个记录的升级路径，以确保任何先前由已弃用功能提供的功能将被替代方法所取代。相比之下，未记录功能可能在任何时间无警告地中断，并且可能没有明确的升级路径。我强烈建议你避免这种冒险（并且几乎总是不必要的）做法。\n\
    \n## 限制暴露面\n\n如果防御性编程旨在确保应用程序能够应对异常事件的发生，那么一个基本的防御技术就是限制此类事件可能发生的数量。从逻辑上讲，异常只能发生在正在运行的功能中，因此不要安装超过必要的功能——通过减少应用程序的受攻击面，你可以限制对潜在攻击的暴露。当\
    \ `SAFE` 可以满足时，不要授予程序集 `EXTERNAL_ACCESS` 权限。除非它们增加价值或应用程序严格需要，否则不要启用诸如数据库邮件之类的功能。\n\
    \n所有用户都应经过身份验证，并且仅被授权访问所需的资源，且仅在需要的时间段内。应立即删除未使用的账户，并撤销不必要的权限。这样做可以减少系统被攻击破坏的机会，这将在第\
    \ 5 章中更详细地讨论。\n\n如果系统的安全性受到破坏，采用加密可能有助于限制造成的损害。不同的加密方法将在第 6 章中讨论。\n\n## 践行良好编码规范\n\
    \n良好的编码规范——我指的是诸如清晰注释、一致布局和良好命名变量等实践——应被视为任何软件开发方法的重要组成部分，而不仅仅与防御性编程相关。我选择在这里包含它，部分是因为我认为它如此重要以至于怎么重申都不为过，但也因为防御性编程的本质比其他方法更强调这些领域，原因如下：\n\
    \n正如前面所述，防御性编程的目标是尽量减少由于未来不可预见的事件而导致错误的风险。这些未来的事件可能包括未来对代码的维护和增强。通过现在创建清晰、文档完善的代码，你可以增强其未来的可理解性，降低下次修改时意外引入错误的可能性。\n\
    \n此外，由于防御性编程旨在创建健壮、有弹性的应用程序，这些应用程序可能会在没有任何人工干预的情况下运行很长时间。当它们在几年后再次被审查时，负责的开发团队可能已经大不相同，或者最初的开发人员可能不再记得为什么采取某种方法。至关重要的是，这些信息被记录并在代码本身中清晰可见，以免引入可能损害应用程序稳定性的错误或新的假设。\n\
    \n布局良好的代码通常与经过深思熟虑的代码密不可分。通过采取简单的步骤，例如缩进代码块，你可以轻松识别循环内的步骤和循环外的步骤，防止粗心的错误。大多数 IDE\
    \ 和代码编辑器提供布局功能，可以自动应用一致的制表符、空格、大小写等格式，这些设置通常可以自定义以匹配特定组织中的任何编码标准。\n\n布局良好、注释有意义的代码将使彻底的代码审查更容易。如果需要修改代码，将更容易快速确定最佳方法。\n\
    \n最后，如果在代码的某一部分中发现错误，在一个编码良好的函数中追踪它要容易得多，从而以最小的干扰解决它。\n\n基于这些原因，我相信践行良好的编码规范是防御性编程的关键部分。在以下各节中，我将就编码规范的一些具体方面发表一些看法。\n\
    \n### 注释\n\n每个人都知道注释是任何代码的重要组成部分，但我们很少有人能像应该的那样充分注释我们的代码（一个常见的理由是开发者更喜欢编写代码，而不是写关于代码的注释）。几乎每一个关于最佳编码实践的思想流派都指出，你应该在代码中自由使用注释，防御性编程也不例外。编写良好的注释更容易说明一个函数的目标是什么以及它为什么以某种方式编写，这意味着更容易发现任何可能破坏该代码的错误或假设。\n\
    \n好的注释应该给阅读代码的人提供额外的信息——而不仅仅是指出显而易见的东西或重述可能很容易在在线书籍中找到的信息。例如，以下注释没有帮助：\n\n```sql\n\
    -- 将 x 设置为 5\nSET @x = 5;\n```\n\n一般来说，注释应该解释为什么采取某种方法以及什么...\n"
- fmt: "# 注释与代码清晰性\n\n开发者试图实现的目标。使用注释描述*预期*行为，能更容易识别*意外*情况。一般来说，没有必要简单地注释内置函数的作用，但也有例外。例如，你能一眼看出下面代码预期的结果是什么吗？\n\
    \n```sql\nDECLARE @y int = 2010, @c int, @n int, @k int, @i int, @j int, @l int,\
    \ @m int,\n@d int;\n\nSET @c = (@y / 100);\nSET @n = @y - 19 * (@y / 19);\nSET\
    \ @k = (@c - 17) / 25;\nSET @i = @c - @c / 4 - ( @c - @k) / 3 + 19 * @n + 15;\n\
    SET @i = @i - 30 * (@i / 30);\nSET @i = @i - (@i / 28) * (1 - (@i / 28) * (29\
    \ / (@i + 1)) * ((21 - @n) / 11));\nSET @j = @y + @y / 4 + @i + 2 - @c + @c /\
    \ 4;\nSET @j = @j - 7 * (@j / 7);\nSET @l = @i - @j;\nSET @m = 3 + (@l + 40) /\
    \ 44;\nSET @d = @l + 28 - 31 * ( @m / 4 );\n\nSELECT CAST(CONVERT(char(4),@y)\
    \ + '-' + RIGHT('0' + CONVERT(varchar(2),@m),2) + '-'\n+ RIGHT('0' + CONVERT(varchar(2),@d),2)\
    \ AS DateTime);\n```\n\n我曾在生产应用中遇到过前面的函数，它被用来确定员工是否因在公共假期工作而有资格获得奖金。如果你还没弄明白，这个结果会返回任意给定年份（通过变量`@y`指定）的复活节星期日日期。代码确实完成了它的目的，但没有任何注释，我花了很长时间才弄清楚这个目的是什么！\n\
    \n在许多情况下，你可以通过使用**自文档化**的代码——选择命名良好的变量、列别名和表别名——来避免编写显式注释。考虑以下代码：\n\n```sql\n\
    SELECT DATEPART(Y, '20090617');\n```\n\n在大多数编程语言中，日期格式函数中使用的字符`Y`表示与日期相关的年份。因此，你可能期望前面的代码返回所提供日期的完整年份`2009`，或者可能只是年份的最后一位数字`9`。要解释实际结果为`168`，代码本可以通过用`DAYOFYEAR`（它是其缩写）替换`Y`，从而轻松实现自文档化：\n\
    \n```sql\nSELECT DATEPART(DAYOFYEAR, '20090617');\n```\n\n## 代码缩进与语句块\n\n代码缩进和大量使用空白有助于识别逻辑代码块、循环和批处理，从而创建可理解、易于维护且未来引入错误可能性更低的代码。然而，这些实践对代码本身的执行显然没有直接影响。因此，至关重要的是代码的视觉布局要强化其逻辑行为，因为格式不佳的代码实际上可能具有误导性。考虑以下例子：\n\
    \n```sql\nIF 1 = 1\n    PRINT 'True';\nELSE\n    PRINT 'False';\n    PRINT 'Then\
    \ Print this';\n```\n\n在这种情况下，最后一行代码的缩进使其看起来像是`ELSE`子句的一部分，但事实并非如此，无论测试结果如何，`Then\
    \ Print this`都会被打印出来。\n\n为了避免这种误导性情况，我总是建议大量使用由`BEGIN`和`END`标记的语句块，即使块只包含一个语句，如下所示：\n\
    \n```sql\nIF 1 = 1\nBEGIN\n    PRINT 'True';\nEND\nELSE\nBEGIN\n    PRINT 'False';\n\
    END\n\nPRINT 'Then Print This';\n```\n\n另一个可以轻松避免的误导性做法是未能使用括号来显式展示查询组件被解析的顺序。考虑以下代码清单：\n\
    \n```sql\nDECLARE @Table TABLE (x int, y int);\nINSERT INTO @Table VALUES (1,1),\
    \ (1,2), (2,1), (2,2), (3,1), (3,2);\n\nSELECT *\nFROM @Table\nWHERE\n    x =\
    \ 1 AND\n    y = 1 OR y = 2;\nGO\n```\n\n在这种情况下，和之前一样，代码缩进实际上损害了代码的真实逻辑，即选择所有`x=1\
    \ AND y=1`，或`y=2`的行。\n\n## 如果其他方法都失败了……\n\n防御性编程的一个基本特性是进行断言以确保异常情况不会发生。可以说，如果防御性编程的理想状态真的实现了，就没有必要实现异常处理代码，因为任何可能导致异常的情况在被允许发生之前都已被识别和处理。\n\
    \n不幸的是，显式测试所有异常场景在实际上是不可能的，在现实世界中，异常和错误处理仍然是任何软件应用程序中非常重要的一部分。有关 SQL Server 中异常和错误处理的详细讨论，请参阅第\
    \ 4 章。\n\n# 创建健康的开发环境\n\n最好的应用程序并非由一两个程序员的个人才华创造，而是由开发团队协调、有效的协作创造。当编码成为一项共享、开放的活动时，成功的防御性开发最有可能发生。\n\
    \n协作编码的好处在于，你可以利用共享的技术知识和资源池，确保编码彻底而准确。不同的人能够从多个不同的批判性视角审视代码，这有助于识别可能被单个开发者忽视的任何假设。\n\
    \n如果开发者孤立工作，他们可能会引入依赖关系，这会给代码未来的可维护性带来风险。如果只有一个开发者了解某段特别复杂代码的细节，然后该开发者离职或无法联系上，将来你可能会遇到维护该代码的困难。事实上，开发者之间的个人竞争可能导致开发者*故意*给应用程序增加复杂性。编码者可能会试图确保只有他们自己理解某段复杂代码的工作原理，无论是作为炫耀其技术知识的一种方式，出于个人自豪感，还是作为制造对其依赖的一种手段——使他们自己变得不可或缺并确保未来的工作保障。所有这些都创造了一个不健康的开发环境，并可能对所产生代码的质量产生负面影响。\n\
    \n负责开发团队的管理者应努力营造一个持续专业发展的环境，其中共享学习和最佳实践是关键。软件开发是一个不断变化的领域——现在被认为是最佳实践的东西可能在几年内就过时了。为了确保应用程序保持前沿，应促进和鼓励开发者的个人培训和同行之间的知识共享。\n\
    \n实施防御性开发的成功与否也可能受到更广泛公司决策的影响，包括奖励制度。例如，公司可能实施一项奖励计划，为任何在生产应用中发现并解决错误的开发者支付个人奖金。虽然其初衷可能是提高软件质量，但效果可能恰恰相反——毕竟，如果防御性编码（在错误发生前预防）消除了开发者\
    \ later 个人获得修复错误奖励的机会，那么进行防御性编码的动力是什么？此类政策可能会鼓励竞争性的、个人主义的行为，开发者只为自己考虑，而不是基于项目的最佳利益采取行动。"
  raw: 'developer is aiming to achieve. Using comments to describe *expected* behavior
    makes it much easier to identify cases of *unexpected* behavior. In general it
    is not necessary to simply comment what a built-in function does, but there may
    be exceptions to this rule. For example, at a single glance, can you say what
    you expect the result of the following to be?


    DECLARE @y int = 2010, @c int, @n int, @k int, @i int, @j int, @l int, @m int,


    @d int;


    SET @c = (@y / 100);


    SET @n = @y - 19 * (@y / 19);


    SET @k = (@c - 17) / 25;


    SET @i = @c - @c / 4 - ( @c - @k) / 3 + 19 * @n + 15;


    SET @i = @i - 30 * (@i / 30);


    SET @i = @i - (@i / 28) * (1 - (@i / 28) * (29 / (@i + 1)) * ((21 - @n) / 11));


    SET @j = @y + @y / 4 + @i + 2 - @c + @c / 4;


    SET @j = @j - 7 * (@j / 7);


    SET @l = @i - @j;


    SET @m = 3 + (@l + 40) / 44;


    SET @d = @l + 28 - 31 * ( @m / 4 );


    SELECT CAST(CONVERT(char(4),@y) + ''-'' + RIGHT(''0'' + CONVERT(varchar(2),@m),2)
    + ''-''


    + RIGHT(''0'' + CONVERT(varchar(2),@d),2) AS DateTime);


    I actually encountered the previous function in a production application, where
    it was being used to determine whether employees were entitled to a bonus because
    they had worked on a public holiday. In case you haven’t figured it out, the result
    gives you the date of Easter Sunday in any given year (specified using the variable
    @y). The code actually fulfils its purpose, but without any comments it took me
    a long time to find out what that purpose was!


    In many cases, you can obviate the need for writing explicit comments by using
    **self-documenting** code—choosing well-named variables, column aliases, and table
    aliases. Consider the following code: SELECT DATEPART(Y, ''20090617'');


    In most programming languages, the character Y used in a date format function
    denotes the year associated with a date. It may therefore seem reasonable to expect
    the preceding code to return the full year of the supplied date, 2009, or perhaps
    just the final digit of the year, 9\. To explain the actual result of 168, the
    code could have easily been made self-documenting by replacing the Y with DAYOFYEAR
    (for which it is an abbreviation):


    SELECT DATEPART(DAYOFYEAR, ''20090617'');


    Indentations and Statement Blocks


    Code indentations and liberal use of whitespace can help to identify logical blocks
    of code, loops, and batches, creating code that is understandable, easily maintained,
    and less likely to have bugs introduced in the future. However, these practices
    clearly have no direct effect on the execution of the code itself. It is therefore
    vitally important that the visual layout of code reinforces its logical behavior,
    as poorly presented code may actually be misleading. Consider the following example:


    IF 1 = 1


    PRINT ''True'';


    ELSE


    CHAPTER 2 „ BEST PRACTICES FOR DATABASE PROGRAMMING


    PRINT ''False'';


    PRINT ''Then Print this'';


    In this case, the indentation on the final line of code makes it appear to be
    part of the ELSE clause, but this is not the case, and the result Then Print this
    will be printed irrespective of the result of the test.


    To avoid such misleading situations, I always recommend the liberal use of statement
    blocks


    marked by BEGIN and END, even if a block contains only one statement, as follows:


    IF 1 = 1


    BEGIN


    PRINT ''True'';


    END


    ELSE


    BEGIN


    PRINT ''False'';


    END


    PRINT ''Then Print This'';


    Another misleading practice that can easily be avoided is the failure to use parentheses
    to explicitly demonstrate the order in which the components of a query are resolved.
    Consider the following code listing:


    DECLARE @Table TABLE (x int, y int);


    INSERT INTO @Table VALUES (1,1), (1,2), (2,1), (2,2), (3,1), (3,2);


    SELECT *


    FROM @Table


    WHERE


    x = 1 AND


    y = 1 OR y = 2;


    GO


    In this case, as before, the code indentation actually detracts from the true
    logic of the code, which is to select all rows where x=1 AND y=1, or where y=2.


    If All Else Fails. . .


    A fundamental feature of defensive programming is to make assertions to ensure
    that exceptional circumstances do not occur. It can be argued that, if the ideal
    of defensive programming were ever truly realized, it would not be necessary to
    implement exception-handling code, since any potential scenarios that could lead
    to exceptions would have been identified and handled before they were allowed
    to occur.


    Unfortunately, it is not practically possible to explicitly test all exceptional
    scenarios and, in the real-world, exception and error handling remain very important
    parts of any software application. For a detailed discussion of exception and
    error handling in SQL Server, please refer to Chapter 4.


    CHAPTER


    „ BEST PRACTICES FOR DATABASE PROGRAMMING


    Creating a Healthy Development Environment


    The best applications are not created by the individual brilliance of one or two
    coders, but by the coordinated, effective collaboration of a development team.
    Successful defensive development is most likely to occur when coding is a shared,
    open activity.


    The benefits of collaborative coding are that you can draw on a shared pool of
    technical knowledge and resources to ensure that coding is thorough and accurate.
    Different people will be able to critically examine code from a number of different
    points of view, which helps to identify any assumptions that might have gone unnoticed
    by a single developer.


    If developers work in isolation, they may introduce dependencies that present
    a risk to the future maintainability of the code. If only one developer knows
    the intricacies of a particularly complex section of code and then that developer
    leaves or is unavailable, you may encounter difficulties maintaining that code
    in the future. In fact, individual competiveness between developers can lead to
    developers *deliberately* adding complexity to an application. Coders may seek
    to ensure that only they understand how a particular section of complex code works,
    either as a way of flaunting their technical knowledge, for reasons of personal
    pride, or as a way of creating a dependence on them—making themselves indispensable
    and ensuring their future job security. All of these create an unhealthy development
    environment and are likely to negatively affect the quality of any code produced.


    Managers responsible for development teams should try to foster an environment
    of continued


    professional development, in which shared learning and best practice are key.
    Software development is a constantly changing area—what is considered best practice
    now may well be obsolete within a few years. In order to make sure that applications
    remain cutting edge, individual training of developers and knowledge-sharing between
    peers should be promoted and encouraged.


    The success (or otherwise) of attempts to implement defensive development may
    also be influenced by wider corporate decisions, including reward systems. For
    example, a company may implement a reward scheme that pays individual bonuses
    for any developer that discovers and solves bugs in live applications. Although
    presumably designed to improve software quality, the effect may actually be completely
    the opposite—after all, what is the incentive to code defensively (preventing
    errors before they occur) when it removes the opportunity for a developer to allow
    bugs through and personally receive the reward for fixing them later? Such policies
    are likely to encourage competitive, individualistic behavior where developers
    only look after themselves, instead of taking actions based on the best interests
    of the project.'
  trans: "# 注释与代码清晰性\n\n开发者试图实现的目标。使用注释描述*预期*行为，能更容易识别*意外*情况。一般来说，没有必要简单地注释内置函数的作用，但也有例外。例如，你能一眼看出下面代码预期的结果是什么吗？\n\
    \n```sql\nDECLARE @y int = 2010, @c int, @n int, @k int, @i int, @j int, @l int,\
    \ @m int,\n@d int;\n\nSET @c = (@y / 100);\nSET @n = @y - 19 * (@y / 19);\nSET\
    \ @k = (@c - 17) / 25;\nSET @i = @c - @c / 4 - ( @c - @k) / 3 + 19 * @n + 15;\n\
    SET @i = @i - 30 * (@i / 30);\nSET @i = @i - (@i / 28) * (1 - (@i / 28) * (29\
    \ / (@i + 1)) * ((21 - @n) / 11));\nSET @j = @y + @y / 4 + @i + 2 - @c + @c /\
    \ 4;\nSET @j = @j - 7 * (@j / 7);\nSET @l = @i - @j;\nSET @m = 3 + (@l + 40) /\
    \ 44;\nSET @d = @l + 28 - 31 * ( @m / 4 );\n\nSELECT CAST(CONVERT(char(4),@y)\
    \ + '-' + RIGHT('0' + CONVERT(varchar(2),@m),2) + '-'\n+ RIGHT('0' + CONVERT(varchar(2),@d),2)\
    \ AS DateTime);\n```\n\n我曾在生产应用中遇到过前面的函数，它被用来确定员工是否因在公共假期工作而有资格获得奖金。如果你还没弄明白，这个结果会返回任意给定年份（通过变量`@y`指定）的复活节星期日日期。代码确实完成了它的目的，但没有任何注释，我花了很长时间才弄清楚这个目的是什么！\n\
    \n在许多情况下，你可以通过使用**自文档化**的代码——选择命名良好的变量、列别名和表别名——来避免编写显式注释。考虑以下代码：\n\n```sql\n\
    SELECT DATEPART(Y, '20090617');\n```\n\n在大多数编程语言中，日期格式函数中使用的字符`Y`表示与日期相关的年份。因此，你可能期望前面的代码返回所提供日期的完整年份`2009`，或者可能只是年份的最后一位数字`9`。要解释实际结果为`168`，代码本可以通过用`DAYOFYEAR`（它是其缩写）替换`Y`，从而轻松实现自文档化：\n\
    \n```sql\nSELECT DATEPART(DAYOFYEAR, '20090617');\n```\n\n## 代码缩进与语句块\n\n代码缩进和大量使用空白有助于识别逻辑代码块、循环和批处理，从而创建可理解、易于维护且未来引入错误可能性更低的代码。然而，这些实践对代码本身的执行显然没有直接影响。因此，至关重要的是代码的视觉布局要强化其逻辑行为，因为格式不佳的代码实际上可能具有误导性。考虑以下例子：\n\
    \n```sql\nIF 1 = 1\n    PRINT 'True';\nELSE\n    PRINT 'False';\n    PRINT 'Then\
    \ Print this';\n```\n\n在这种情况下，最后一行代码的缩进使其看起来像是`ELSE`子句的一部分，但事实并非如此，无论测试结果如何，`Then\
    \ Print this`都会被打印出来。\n\n为了避免这种误导性情况，我总是建议大量使用由`BEGIN`和`END`标记的语句块，即使块只包含一个语句，如下所示：\n\
    \n```sql\nIF 1 = 1\nBEGIN\n    PRINT 'True';\nEND\nELSE\nBEGIN\n    PRINT 'False';\n\
    END\n\nPRINT 'Then Print This';\n```\n\n另一个可以轻松避免的误导性做法是未能使用括号来显式展示查询组件被解析的顺序。考虑以下代码清单：\n\
    \n```sql\nDECLARE @Table TABLE (x int, y int);\nINSERT INTO @Table VALUES (1,1),\
    \ (1,2), (2,1), (2,2), (3,1), (3,2);\n\nSELECT *\nFROM @Table\nWHERE\n    x =\
    \ 1 AND\n    y = 1 OR y = 2;\nGO\n```\n\n在这种情况下，和之前一样，代码缩进实际上损害了代码的真实逻辑，即选择所有`x=1\
    \ AND y=1`，或`y=2`的行。\n\n## 如果其他方法都失败了……\n\n防御性编程的一个基本特性是进行断言以确保异常情况不会发生。可以说，如果防御性编程的理想状态真的实现了，就没有必要实现异常处理代码，因为任何可能导致异常的情况在被允许发生之前都已被识别和处理。\n\
    \n不幸的是，显式测试所有异常场景在实际上是不可能的，在现实世界中，异常和错误处理仍然是任何软件应用程序中非常重要的一部分。有关 SQL Server 中异常和错误处理的详细讨论，请参阅第\
    \ 4 章。\n\n# 创建健康的开发环境\n\n最好的应用程序并非由一两个程序员的个人才华创造，而是由开发团队协调、有效的协作创造。当编码成为一项共享、开放的活动时，成功的防御性开发最有可能发生。\n\
    \n协作编码的好处在于，你可以利用共享的技术知识和资源池，确保编码彻底而准确。不同的人能够从多个不同的批判性视角审视代码，这有助于识别可能被单个开发者忽视的任何假设。\n\
    \n如果开发者孤立工作，他们可能会引入依赖关系，这会给代码未来的可维护性带来风险。如果只有一个开发者了解某段特别复杂代码的细节，然后该开发者离职或无法联系上，将来你可能会遇到维护该代码的困难。事实上，开发者之间的个人竞争可能导致开发者*故意*给应用程序增加复杂性。编码者可能会试图确保只有他们自己理解某段复杂代码的工作原理，无论是作为炫耀其技术知识的一种方式，出于个人自豪感，还是作为制造对其依赖的一种手段——使他们自己变得不可或缺并确保未来的工作保障。所有这些都创造了一个不健康的开发环境，并可能对所产生代码的质量产生负面影响。\n\
    \n负责开发团队的管理者应努力营造一个持续专业发展的环境，其中共享学习和最佳实践是关键。软件开发是一个不断变化的领域——现在被认为是最佳实践的东西可能在几年内就过时了。为了确保应用程序保持前沿，应促进和鼓励开发者的个人培训和同行之间的知识共享。\n\
    \n实施防御性开发的成功与否也可能受到更广泛公司决策的影响，包括奖励制度。例如，公司可能实施一项奖励计划，为任何在生产应用中发现并解决错误的开发者支付个人奖金。虽然其初衷可能是提高软件质量，但效果可能恰恰相反——毕竟，如果防御性编码（在错误发生前预防）消除了开发者\
    \ later 个人获得修复错误奖励的机会，那么进行防御性编码的动力是什么？此类政策可能会鼓励竞争性的、个人主义的行为，开发者只为自己考虑，而不是基于项目的最佳利益采取行动。"
- fmt: '# CHAPTER 2 „ BEST PRACTICES FOR DATABASE PROGRAMMING


    Another factor affecting the success of defensive development concerns the way
    in which budget and project deadlines are managed. Penalties are normally incurred
    for delivering software projects after deadline. It is an unfortunate fact that,
    when deadlines are brought forward or budgets slashed, it is defensive practices
    (such as rigorous testing) that management regard as nonessential, and are among
    the first to be dropped from the scope of the project.


    Managers that demand quick-fix solutions based on unrealistic short-term time
    scales are likely to encourage piecemeal coding practices that create holes. These
    are unlikely to use defensive programming and will not stand up to rigorous testing.
    Software development must be crafted with patience and care, yet management demands
    often necessitate that shortcuts must be taken, and rarely can truly defensive
    programming projects be seen to completion. For these reasons, true defensive
    programming might be seen as an ideal, rather than an achievable objective.


    ## Summary


    Defensive programming practices aim to improve the resilience and reliability
    of software applications when faced with unforeseen circumstances. Given the typical
    expected lifespan of database applications and the potential severity of the consequences
    should a bug occur, it makes sense to adopt a defensive approach to ensure that
    the applications remain robust over a long period of time, and that the need for
    ongoing maintenance is kept to a minimum.


    In this chapter, I have demonstrated a few simplistic examples of what I consider
    to be best practice in `SQL` programming, and illustrated how they relate to the
    defensive programming methodology.


    Throughout the rest of the book, I will continue to show in more detail how to
    adopt a defensive stance across a range of development scenarios.


    # CHAPTER 3 „ „ „ Testing Database Routines


    What defines a great developer? Is it the ability to code complex routines quickly
    and accurately? The ability to implement business requirements correctly, within
    budget, and on schedule? Or perhaps it can be defined by how quickly the developer
    can track down and fix bugs in the application—or the inverse, the lack of bugs
    in the developer’s code?


    All of these are certainly attributes of a great developer, but in most cases
    they don’t manifest themselves merely due to raw skill. The hallmark of a truly
    great developer, and what allows these qualities to shine through, is a thorough
    understanding of the importance of testing.


    By creating `unit tests` early on in the development process, developers can continuously
    validate interfaces and test for exceptions and regressions. Carefully designed
    `functional tests` ensure compliance with business requirements. And performance
    testing—the kind of testing that always seems to get the most attention—can be
    used to find out whether the application can actually handle the anticipated amount
    of traffic.


    Unfortunately, like various other practices that are better established in the
    application development community, testing hasn’t yet caught on much with database
    professionals. Although some development shops performance test stored procedures
    and other database code, it is rare to see database developers writing data-specific
    `unit tests`.


    There is no good reason that database developers should not write just as many—or
    more—tests than their application developer counterparts. It makes little sense
    to test a data-dependent application without validating the data pieces that drive
    the application components!


    This chapter provides a brief introduction to the world of software testing and
    how testing techniques can be applied in database development scenarios. Software
    testing is a huge field, complete with much of its own lingo, so my intention
    is to concentrate only on those areas that I believe to be most important for
    database developers.


    ### Approaches to Testing'
