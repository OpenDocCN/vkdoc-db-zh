    permission to access will always be presented to the user in an unencrypted state.


    •


    Encryption cannot be controlled at a granular level—either the whole database
    is


    encrypted or it is not.


    •


    There is a performance impact on *every* query run against a database that has
    TDE


    enabled, whether that query contains “confidential” items of data or not. In fact,


    because the tempdb database must be encrypted when TDE is enabled, there is a


    performance hit against *every query of every database* on a server that has at
    least


    one TDE-enabled database on it.


    •


    TDE negates any reduction in size of database files achieved from using SQL


    Server 2008’s compression options. Compression algorithms only work effectively


    when there are recognizable patterns in the data, which TDE encryption removes.


    •


    Not all data can be encrypted. For example, the filestream datatype stores BLOB


    data directly to the filesystem. Since this data does not pass through the SQL
    OS, it


    cannot be encrypted by TDE.


    It is important to realize that TDE provides a totally different model of encryption
    than the other encryption methods discussed in this chapter. Cell-level encryption
    methods, such as ENCRYPTBYKEY and ENCRYPTBYASYMKEY, encrypt an individual item
    or column of data. TDE, in contrast, applies to the database level. As such, TDE
    has more in common with encryption methods provided at the operating system level,
    such as encrypting file system (EFS) technology and Windows BitLocker.


    Although useful in some situations, I do not consider TDE to provide sufficient
    security or control over encrypted data to be relied upon for high-security applications.
    I will therefore not consider it in the remaining sections in this chapter.


    Balancing Performance and Security


    Symmetric keys, asymmetric keys, passwords, and certificates . . . each have their
    own advantages and disadvantages, so how do you choose between them? In this section
    I’ll describe an architecture that means that you don’t have to make a compromise
    between different individual encryption methods; rather, you can combine the best
    features of each approach into a single hybrid model.


    The hybrid model of encryption described in this section is illustrated in Figure
    6-6.


    CHAPTER 6 „ ENCRYPTION


    *Figure 6-6\. A hybrid approach to encryption.*


    The elements of the hybrid encryption structure can be described as follows:


    •


    Data is encrypted using a symmetric key, which provides the best-performing


    encryption method. I recommend encryption based on the AES algorithm, and


    choosing a key length appropriate for your needs. Longer keys provide more


    protection, but also require more processing overhead.


    •


    The symmetric key is protected by one or more certificates, which provide the


    strength of asymmetric encryption together with additional benefits, such as the


    ability to back up and restore certificates from T-SQL, as well as the option
    to set


    explicit start and expiration dates for the validity of the certificate. I tend
    to create


    one certificate for each user or group of users that need access to the symmetric


    key. Those same certificates can also be used to encrypt other keys required by


    that user or group of users.


    •


    Each certificate is protected with a (strong) password, so that it can only be


    accessed by individuals with knowledge of the password. This means that


    encrypted information is kept secret from sysadmins, who could otherwise use the


    DMK to open the certificate and underlying symmetric key.


    •


    Further layers of encryption can be added to this model by protecting the


    symmetric key with further symmetric keys prior to encryption by the certificate.


    Each additional layer creates a further barrier for potential hackers to break,
    and


    also makes key rotation much easier to facilitate.


    To illustrate how to create the hybrid encryption model just described, first
    create two users: CREATE USER FinanceUser WITHOUT LOGIN;


    CREATE USER MarketingUser WITHOUT LOGIN;


    GO'
