    \ trace`在 SQL Server 后台运行，将其结果保存到服务器上的本地文件，而不是流式传输到客户端。\n\n可以手动在 T-SQL 中定义`server-side\
    \ trace`的参数，但这样做是一个繁琐且不必要的过程。更好的方法是基于从 SQL Server Profiler 工具导出的跟踪定义来创建`server-side\
    \ trace`，如以下步骤所述：\n\n1.  首先，使用 SQL Server Profiler 定义跟踪所需的事件、列和筛选器。\n2.  选择 File\
    \ > Export > Script Trace Definition > For SQL Server 2005 – 2008，并选择文件名以保存脚本。\n\
    3.  保存脚本后，在 SQL Server Management Studio 中打开它。此文件包含基于提供的参数启动跟踪所需的 T-SQL 代码。\n\
    4.  编辑脚本的以下行，通过指定跟踪结果的有效输出路径和文件名：\n   ```\n   exec @rc = sp_trace_create @TraceID\
    \ output, 0, N'InsertFileNameHere', @maxfilesize, NULL\n   ```\n\n**注意** 指定的文件名不应包含任何类型的扩展名。跟踪将自动添加一个。\n"
- fmt: '## 3.1 操作追踪脚本


    5.  你可能还需要修改`@maxfilesize`参数的值，该参数默认设置为5MB。增加最大文件大小有助于最小化在追踪期间创建的滚动文件数量。我通常将其设置为200MB作为起点。

    6.  完成编辑后，执行脚本。追踪将在后台开始收集数据，生成的脚本将返回一个追踪标识符`TraceID`，你应该记下它，因为稍后控制追踪时将需要它。


    按照这些步骤操作后，追踪将会运行，所有指定事件的输出都将被写入日志文件，所以现在是执行你的测试套件的时候了。当你完成追踪后，必须使用`sp_trace_setstatus`存储过程停止并关闭追踪，该过程需要提供启动追踪时返回的`TraceID`追踪标识符。以下代码清单演示了这一点（此例中追踪标识符列为99）：


    ```sql

    EXEC sp_trace_setstatus @traceid=99, @status=0;

    EXEC sp_trace_setstatus @traceid=99, @status=2;

    GO

    ```


    一旦追踪被停止并关闭，就可以使用`sys.fn_trace_gettable`函数从追踪文件中读取数据。此函数接受两个参数：追踪文件名的完整路径（包括SQL
    Server自动添加的`.trc`扩展名），以及要读取的最大滚动文件数。以下T-SQL将用于从路径`C:\Traces\myTrace.trc`读取追踪文件。滚动文件的数量设置得足够高，以便即使追踪多次滚动到新文件，也能读回所有数据：


    ```sql

    SELECT *

    FROM sys.fn_trace_gettable(''C:\Traces\myTrace.trc'', 999);

    GO

    ```


    以这种方式选中后，追踪数据可以像SQL Server中的任何其他数据一样使用。它可以被插入到表中、查询或以多种方式进行聚合，以评估哪些查询可能正在引发问题。


    ## 3.2 系统监控


    要从更宏观的角度了解服务器的整体性能，系统性能计数器是一种宝贵的资源。可以使用“系统监视器”控制台（也称为“性能监视器”或`perfmon.exe`，具体取决于你的SQL
    Server实例运行的操作系统）来读取这些计数器，尽管许多负载测试工具集成了系统计数器收集和报告机制。与SQL Server追踪事件类似，有数百个计数器可供选择——但在对SQL
    Server安装进行初步性能评估时，通常只需要监控其中少数几个。


