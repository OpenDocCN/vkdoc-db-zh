    because it is UNIQUE, only allows one such row to be inserted.


    While this approach works well to prevent multiple root nodes from being created,
    it does not enforce the hierarchical condition that there should always be *exactly*
    *one* root node. For example, it doesn’t stop someone from assigning a manager
    to the root node (the unique constraint can only enforce rows that exist, and
    by updating the table, the NULL manager ID would no longer exist at all). To solve
    this problem, a trigger can be used to make sure that there is always at least
    one NULL manager ID


    in the table:


    CREATE TRIGGER tg_AtLeastOneRoot


    ON Employee_Temp


    FOR UPDATE


    AS


    BEGIN


    SET NOCOUNT ON;


    IF NOT EXISTS


    (


    SELECT *


    FROM Employee_Temp


    WHERE ManagerID IS NULL


    )


    BEGIN


    RAISERROR(''A root node is required'', 16, 1);


    ROLLBACK;


    END


    END;


    GO


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    To eliminate the possibility of cycles, we need to think about what kinds of cycles
    can exist in the table. To begin with, the simplest cycle—and one that’s not constrained
    against by either the primary key or the foreign key—is an employee managing herself.
    This is easily solved with a check constraint: ALTER TABLE Employee_Temp


    ADD CONSTRAINT ck_ManagerIsNotEmployee


    CHECK (EmployeeID <> ManagerID);


    GO


    This constraint does nothing for deeper cycles, where an employee manages himself
    one or more levels below. For instance, if George manages Ed and Ed manages Steve,
    someone could issue an update to the table so that Ed manages George. This would
    create a deeper cycle that the constraint would not be able to catch. In order
    to solve this problem, a trigger can be employed. The trigger should start with
    the updated row, traversing up the tree toward the root node. Should it encounter
    the same employee a second time before hitting the root, it is apparent that there
    is a cycle. Following is the code for such a trigger:


