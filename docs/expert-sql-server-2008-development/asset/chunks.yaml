  trans: '

    # 第六章：加密


    如前所述，默认情况下，非对称密钥对的私钥和证书由 DMK 保护，DMK 会在任何被授予相关安全对象权限的用户需要使用这些密钥时自动将其打开。


    以下代码清单展示了如何使用 RSA 算法创建一个 1024 位的非对称密钥：


    ```sql

    CREATE ASYMMETRIC KEY AsymKey1

    WITH Algorithm = RSA_1024;

    GO

    ```


    使用非对称密钥加密数据的过程与对称加密略有不同，因为在加密或解密之前无需显式打开非对称密钥。


    相反，你需要将非对称密钥的 ID 和要加密的明文传递给 `ENCRYPTBYASYMKEY` 方法，如下列代码清单所示：


    ```sql

    DECLARE @Secret nvarchar(255) = ''This is my secret message'';

    DECLARE @Encrypted varbinary(max);

    SET @Encrypted = ENCRYPTBYASYMKEY(ASYMKEY_ID(N''AsymKey1''), @Secret);

    GO

    ```


    `DECRYPTBYASYMKEY`（以及等效的 `DECRYPTBYCERT`）函数可用于返回任何非对称加密数据的 `varbinary` 表示形式，通过提供密钥
    ID 和加密后的密文，如下所示：


    ```sql

    DECLARE @Secret nvarchar(255) = ''This is my secret message'';

    DECLARE @Encrypted varbinary(max);

    SET @Encrypted = ENCRYPTBYASYMKEY(ASYMKEY_ID(N''AsymKey1''), @secret);

    SELECT

    CAST(DECRYPTBYASYMKEY(ASYMKEY_ID(N''AsymKey1''), @Encrypted) AS nvarchar(255));

    GO

    ```


    你可能在运行前面的代码示例时已经注意到，即使处理的数据量非常小，非对称加密和解密方法也比等效的对称函数慢得多。这就是为什么，尽管非对称加密比对称加密提供更强的保护，但不建议将其用于加密任何将在查询中用于筛选行的列，或用于一次需要解密多于一两条记录的情况。相反，非对称加密最有用的方法是作为保护其他加密密钥的手段，本章稍后将对此进行讨论。


    ## 透明数据加密


    透明数据加密（TDE）是 SQL Server 2008 开发版和企业版中提供的一项新功能。它是“透明”的，因为与之前列出的所有方法都不同，它不需要显式更改数据库架构，也不需要使用特定的方法重写查询来加密或解密数据。此外，一般来说，不需要处理与
    TDE 相关的任何密钥管理问题。那么 TDE 是如何工作的呢？


    透明加密不是操作选定的值或数据列，而是对从文件系统层传递到 SQL Server 进程的 *所有* 数据提供自动的对称加密和解密。换句话说，保存数据库信息的
    MDF 和 LDF 文件以加密状态存储。当 SQL Server 请求这些文件中的数据时，它会在 I/O 层自动解密。因此，查询引擎可以像处理任何其他类型的数据一样对其进行操作。当数据写回磁盘时，TDE
    会再次自动将其加密。


    TDE 基于存储在用户数据库中的 `数据库加密密钥`（DEK），为启用此功能的任何数据库中的（几乎所有）所有数据提供加密。DEK 是一个对称密钥，由存储在
    master 数据库中的服务器证书保护，而该证书又由 master 数据库的 DMK 和 SMK 保护。


    要在数据库上启用 TDE，首先需要在 master 数据库中创建一个服务器证书（假设 master 数据库已有一个 DMK）：


    ```sql

    USE MASTER;

    GO

    CREATE CERTIFICATE TDE_Cert

    WITH SUBJECT = ''Certificate for TDE Encryption'';

    GO

    ```


    然后，在相应的用户数据库中使用 `CREATE DATABASE ENCRYPTION KEY` 语句创建 DEK：


    ```sql

    USE ExpertSqlEncryption;

    GO

    CREATE DATABASE ENCRYPTION KEY

    WITH ALGORITHM = AES_128

    ```

    '
- fmt: "# CHAPTER 6: ENCRYPTION\n\n`ENCRYPTION BY SERVER CERTIFICATE TDE_Cert;`\n\n\
    `GO`\n\n**注意** 上面的代码列表将生成一个警告信息，建议您备份用于加密DEK的服务器证书。在生产环境中，我建议您仔细阅读此信息并遵循其建议。如果证书变得不可用，您将无法解密DEK，并且关联数据库中的所有数据都将丢失。\n\
    \n创建必要的密钥后，可以使用单条T-SQL语句启用TDE，如下所示：\n```sql\nALTER DATABASE ExpertSqlEncryption\n\
    SET ENCRYPTION ON;\nGO\n```\n\n要检查服务器上所有数据库的加密状态，可以查询 `sys.dm_database_encryption_keys`\
    \ 视图，如下所示：\n```sql\nSELECT\nDB_NAME(database_id) AS database_name,\nCASE encryption_state\n\
    WHEN 0 THEN 'Unencrypted (No database encryption key present)'\nWHEN 1 THEN 'Unencrypted'\n\
    WHEN 2 THEN 'Encryption in Progress'\nWHEN 3 THEN 'Encrypted'\nWHEN 4 THEN 'Key\
    \ Change in Progress'\nWHEN 5 THEN 'Decryption in Progress'\nEND AS encryption_state,\n\
    key_algorithm,\nkey_length\nFROM sys.dm_database_encryption_keys;\nGO\n```\n\n\
    结果显示，用户数据库 `ExpertSqlEncryption` 和系统数据库 `tempdb` 现在都已加密：\n\n| database_name |\
    \ encryption_state | key_algorithm | key_length |\n|---------------|------------------|---------------|------------|\n\
    | tempdb | Encrypted | AES | 256 |\n| ExpertSqlEncryption | Encrypted | AES |\
    \ 128 |\n\n这展示了一个重要观点：由于 `tempdb` 是所有用户数据库共享的系统资源，如果SQL Server实例上的**任何**用户数据库使用了TDE加密，那么\
    \ `tempdb` 数据库也必须被加密，如此案例所示。\n\n禁用TDE的过程与启用它一样简单：\n```sql\nALTER DATABASE ExpertSqlEncryption\n\
    SET ENCRYPTION OFF;\nGO\n```\n\n请注意，即使在所有用户数据库上关闭了TDE，`tempdb` 数据库仍将保持加密状态，直到它被重新创建，例如在服务器下次重启时。\n\
    \n**注意** 有关 `sys.dm_database_encryption_keys` 中可用列的更多信息，请参阅 http://msdn.microsoft.com/en-us/library/bb677274.aspx。\n\
    \nTDE的优点如下：\n\n- 静态数据被加密（嗯，并非**所有**静态数据；参见下一节）。\n  - 如果您的主要目标是防止数据物理被盗，TDE确保您的数据库文件（包括事务日志和备份）无法在没有必要DKM的情况下被盗并还原到另一台机器上。\n\
