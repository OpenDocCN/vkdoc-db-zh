    The final method that can be used is a bit more creative, and also can result
    in somewhat better results. The following version of the stored procedure shows
    how it is implemented:


    ALTER PROCEDURE GetEmployeeData


    @BusinessEntityID int = NULL,


    @NationalIDNumber nvarchar(15) = NULL


    AS


    BEGIN


    SET NOCOUNT ON;


    SELECT


    BusinessEntityID,


    LoginID,


    JobTitle


    FROM


    HumanResources.Employee


    WHERE


    BusinessEntityID BETWEEN COALESCE(@BusinessEntityID, -2147483648) AND


    COALESCE(@BusinessEntityID, 2147483647)


