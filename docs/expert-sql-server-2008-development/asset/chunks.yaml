    \n## 使用`TRY/CATCH`构建重试逻辑"
  raw: '--Catch the exception here


    END CATCH


    Any type of exception—except for connection- or server-level exceptions—that occurs
    between


    BEGIN TRY and END TRY will cause the code between BEGIN CATCH and END CATCH to
    be immediately executed, bypassing any other code left in the try block.


    As a first example, consider the following T-SQL:


    BEGIN TRY


    SELECT 1/0 AS DivideByZero;


    END TRY


    BEGIN CATCH


    SELECT ''Exception Caught!'' AS CatchMessage;


    END CATCH


    Running this batch produces the following output:


    DivideByZero


    CatchMessage


    Exception Caught!


    The interesting things to note here are that, first and foremost, there is no
    reported exception. We can see that an exception occurred because code execution
    jumped to the CATCH block, but the exception was successfully handled, and the
    client is not aware that an exception occurred. Second, notice that an empty result
    set is returned for the SELECT statement that caused the exception. Had the exception
    not been handled, no result set would have been returned. By sending back an empty
    result set, the implied contract of the SELECT statement is honored (more or less,
    depending on what the client was actually expecting).


    Although already mentioned, it needs to be stressed that when using TRY/CATCH,
    all exceptions encountered within the TRY block will immediately abort execution
    of the remainder of the TRY block.


    Therefore, the following T-SQL has the exact same output as the last example:


    BEGIN TRY


    SELECT 1/0 AS DivideByZero;


    SELECT 1 AS NoError;


    END TRY


    BEGIN CATCH


    SELECT ''Exception Caught!'' AS CatchMessage;


    END CATCH


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    Finally, it is worth noting that parsing and compilation exceptions will not be
    caught using TRY/CATCH, nor will they ever have a chance to be caught—an exception
    will be thrown by SQL Server before any of the code is ever actually executed.


    Getting Extended Error Information in the Catch Block


    In addition to the ability to catch an exception, SQL Server 2008 offers a range
    of additional functions that are available for use within the CATCH block. These
    functions, a list of which follows, enable the developer to write code that retrieves
    information about the exception that occurred in the TRY block.


    •


    ERROR_MESSAGE


    •


    ERROR_NUMBER


    •


    ERROR_SEVERITY


    •


    ERROR_STATE


    •


    ERROR_LINE


    •


    ERROR_PROCEDURE


    These functions take no input arguments and are fairly self-explanatory based
    on their names.


    However, it is important to point out that unlike @@ERROR, the values returned
    by these functions are not reset after every statement. They are persistent for
    the entire CATCH block. Therefore, logic such as that used in the following T-SQL
    works:


    BEGIN TRY


    SELECT CONVERT(int, ''ABC'') AS ConvertException;


    END TRY


    BEGIN CATCH


    IF ERROR_NUMBER() = 123


    SELECT ''Error 123'';


    ELSE


    SELECT ERROR_NUMBER() AS ErrorNumber;


    END CATCH


    As expected, in this case the error number is correctly reported:


    ConvertException


    ErrorNumber


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    These functions, especially ERROR_NUMBER, allow for coding of specific paths for
    certain exceptions.


    For example, if a developer knows that a certain piece of code is likely to cause
    an exception that can be programmatically fixed, that exception number can be
    checked for in the CATCH block.


    Rethrowing Exceptions


    A common feature in most languages that have try/catch capabilities is the ability
    to **rethrow** *exceptions from the catch block. This means that the exception
    that originally occurred in the try block will be raised again, as if it were
    not handled at all. This is useful when you need to do some handling of the exception
    but also let the caller know that something went wrong in the routine.*


    *T-SQL does not include any kind of built-in rethrow functionality. However, it
    is fairly easy to create such behavior based on the CATCH block error functions,
    in conjunction with RAISERROR. The following example shows a basic implementation
    of rethrow in T-SQL:


    BEGIN TRY


    SELECT CONVERT(int, ''ABC'') AS ConvertException;


    END TRY


    BEGIN CATCH


    DECLARE


    @ERROR_SEVERITY int = ERROR_SEVERITY(),


    @ERROR_STATE int = ERROR_STATE(),


    @ERROR_NUMBER int = ERROR_NUMBER(),


    @ERROR_LINE int = ERROR_LINE(),


    @ERROR_MESSAGE varchar(245) = ERROR_MESSAGE();


    RAISERROR(''Msg %d, Line %d: %s'',


    @ERROR_SEVERITY,


    @ERROR_STATE,


    @ERROR_NUMBER,


    @ERROR_LINE,


    @ERROR_MESSAGE);


    END CATCH


    GO


    Due to the fact that RAISERROR cannot be used to throw exceptions below 13000,
    in this case


    “rethrowing” the exception requires raising a user-defined exception and sending
    back the data in a specially formed error message. As functions are not allowed
    within calls to RAISERROR, it is necessary to define variables and assign the
    values of the error functions before calling RAISERROR to rethrow the exception.
    Following is the output message of this T-SQL:


    (0 row(s) affected)


    Msg 50000, Level 16, State 1, Line 19


    Msg 245, Line 2: Conversion failed when converting the varchar value ''ABC''


    to data type int.


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    Keep in mind that, based on your interface requirements, you may not always want
    to rethrow the same exception that was caught to begin with. It might make more
    sense in many cases to catch the initial exception, and then throw a new exception
    that is more relevant (or more helpful) to the caller.


    For example, if you’re working with a linked server and the server is not responding
    for some reason, your code will throw a timeout exception. It might make more
    sense to pass back a generic “data not available” exception than to expose the
    actual cause of the problem to the caller. This is something that should be decided
    on a case-by-case basis, as you work out optimal designs for your stored procedure
    interfaces.


    When Should TRY/CATCH Be Used?


    As mentioned previously, the general use case for handling exceptions in T-SQL
    routines (such as within stored procedures) is to encapsulate as much as possible
    at as low a level as possible, in order to simplify the overall code of the application.
    A primary example of this is logging of database exceptions. Instead of sending
    an exception that cannot be properly handled back to the application tier where
    it will be logged back to the database, it probably makes more sense to log it
    while already in the scope of a database routine.


    Another use case involves temporary fixes for problems stemming from application
    code. For


    instance, the application—due to a bug—might occasionally pass invalid keys to
    a stored procedure that is supposed to insert them into a table. It might be simple
    to *temporarily* “fix” the problem by simply catching the exception in the database
    rather than throwing it back to the application where the user will receive an
    error message. Putting quick fixes of this type into place is often much cheaper
    than rebuilding and redeploying the entire application.


    It is also important to consider when *not* to encapsulate exceptions. Make sure
    not to overhandle security problems, severe data errors, and other exceptions
    that the application—and ultimately, the user—should probably be informed of.
    There is definitely such a thing as too much exception handling, and falling into
    that trap can mean that problems will be hidden until they cause enough of a commotion
    to make themselves impossible to ignore.


    Long-term issues hidden behind exception handlers usually pop into the open in
    the form of


    irreparable data corruption. These situations are usually highlighted by a lack
    of viable backups because the situation has been going on for so long, and inevitably
    end in lost business and developers getting their resumes updated for a job search.
    Luckily, avoiding this issue is fairly easy. Just use a little bit of common sense,
    and don’t go off the deep end in a quest to stifle any and all exceptions.


    Using TRY/CATCH to Build Retry Logic'
  trans: "\n# 第 4 章 错误与异常\n\n在`BEGIN TRY`和`END TRY`之间发生的任何类型异常——连接或服务器级别异常除外——都将导致`BEGIN\
    \ CATCH`和`END CATCH`之间的代码立即执行，绕过`TRY`块中剩余的任何代码。\n\n作为第一个示例，考虑以下 T-SQL：\n\n```sql\n\
    BEGIN TRY\n    SELECT 1/0 AS DivideByZero;\nEND TRY\nBEGIN CATCH\n    SELECT 'Exception\
    \ Caught!' AS CatchMessage;\nEND CATCH\n```\n\n运行此批处理会产生以下输出：\n\n```\nDivideByZero\n\
    CatchMessage\nException Caught!\n```\n\n这里需要注意的是，首先，没有报告异常。我们可以看到发生了异常，因为代码执行跳到了`CATCH`块，但异常被成功处理了，客户端并不知道发生了异常。其次，请注意导致异常的`SELECT`语句返回了一个空结果集。如果异常没有被处理，则不会返回任何结果集。通过返回空结果集，`SELECT`语句的隐含契约得到了履行（或多或少，取决于客户端实际期望什么）。\n\
    \n虽然已经提到过，但需要强调的是，当使用`TRY/CATCH`时，在`TRY`块中遇到的所有异常都将立即中止`TRY`块剩余部分的执行。\n\n因此，以下\
    \ T-SQL 的输出与上一个示例完全相同：\n\n```sql\nBEGIN TRY\n    SELECT 1/0 AS DivideByZero;\n\
    \    SELECT 1 AS NoError;\nEND TRY\nBEGIN CATCH\n    SELECT 'Exception Caught!'\
    \ AS CatchMessage;\nEND CATCH\n```\n\n## 获取`CATCH`块中的扩展错误信息\n\n除了能够捕获异常之外，SQL\
    \ Server 2008 还提供了一系列可在`CATCH`块中使用的附加函数。这些函数（列表如下）使开发人员能够编写代码来检索`TRY`块中发生的异常的信息。\n\
    \n- `ERROR_MESSAGE`\n- `ERROR_NUMBER`\n- `ERROR_SEVERITY`\n- `ERROR_STATE`\n-\
    \ `ERROR_LINE`\n- `ERROR_PROCEDURE`\n\n这些函数不接受输入参数，并且根据其名称来看，其含义相当直观。\n\n然而，重要的是要指出，与`@@ERROR`不同，这些函数返回的值在每个语句之后不会被重置。它们在整个`CATCH`块中是持久的。因此，以下\
    \ T-SQL 中使用的逻辑是有效的：\n\n```sql\nBEGIN TRY\n    SELECT CONVERT(int, 'ABC') AS ConvertException;\n\
    END TRY\nBEGIN CATCH\n    IF ERROR_NUMBER() = 123\n        SELECT 'Error 123';\n\
    \    ELSE\n        SELECT ERROR_NUMBER() AS ErrorNumber;\nEND CATCH\n```\n\n正如预期的那样，在这种情况下，错误编号被正确报告：\n\
    \n```\nConvertException\nErrorNumber\n```\n\n这些函数，特别是`ERROR_NUMBER`，允许为某些异常编写特定的代码路径。\n\
    \n例如，如果开发人员知道某段代码可能会引发可以程序化修复的异常，则可以在`CATCH`块中检查该异常编号。\n\n## 重新抛出异常\n\n大多数具有`try/catch`功能的编程语言中有一个常见特性，即能够从`catch`块中`rethrow`异常。这意味着最初在`try`块中发生的异常将被再次引发，就像它根本没有被处理一样。当你需要对异常进行一些处理，但同时也要让调用者知道例程中出现了问题时，这很有用。\n\
    \nT-SQL 不包含任何内置的`rethrow`功能。然而，基于`CATCH`块错误函数，结合`RAISERROR`，很容易创建这种行为。以下示例展示了\
    \ T-SQL 中`rethrow`的基本实现：\n\n```sql\nBEGIN TRY\n    SELECT CONVERT(int, 'ABC')\
    \ AS ConvertException;\nEND TRY\nBEGIN CATCH\n    DECLARE\n        @ERROR_SEVERITY\
    \ int = ERROR_SEVERITY(),\n        @ERROR_STATE int = ERROR_STATE(),\n       \
    \ @ERROR_NUMBER int = ERROR_NUMBER(),\n        @ERROR_LINE int = ERROR_LINE(),\n\
    \        @ERROR_MESSAGE varchar(245) = ERROR_MESSAGE();\n    RAISERROR('Msg %d,\
    \ Line %d: %s',\n              @ERROR_SEVERITY,\n              @ERROR_STATE,\n\
    \              @ERROR_NUMBER,\n              @ERROR_LINE,\n              @ERROR_MESSAGE);\n\
    END CATCH\nGO\n```\n\n由于`RAISERROR`不能用于抛出低于 13000 的异常，在这种情况下“重新抛出”异常需要引发一个用户定义的异常，并将数据以特殊格式的错误消息发回。由于函数不允许在`RAISERROR`的调用中使用，因此必须在调用`RAISERROR`重新抛出异常之前定义变量并赋值错误函数的值。以下是此\
    \ T-SQL 的输出消息：\n\n```\n(0 row(s) affected)\nMsg 50000, Level 16, State 1, Line\
    \ 19\nMsg 245, Line 2: Conversion failed when converting the varchar value 'ABC'\n\
    to data type int.\n```\n\n请记住，根据你的接口需求，你可能并不总是希望重新抛出最初捕获的相同异常。在许多情况下，捕获初始异常，然后抛出一个对调用者更相关（或更有帮助）的新异常可能更有意义。\n\
    \n例如，如果你正在使用链接服务器，并且该服务器由于某种原因没有响应，你的代码将抛出超时异常。传回一个通用的“数据不可用”异常可能比向调用者暴露问题的实际原因更有意义。这应该根据具体情况决定，以便你为存储过程接口设计出最佳方案。\n\
    \n## 何时应该使用`TRY/CATCH`？\n\n如前所述，在 T-SQL 例程（例如存储过程中）处理异常的一般用例是，尽可能在较低级别进行封装，以简化应用程序的整体代码。这方面的一个主要例子是记录数据库异常。与其将无法正确处理的异常发送回应用层（在那里它将被记录回数据库），不如在数据库例程的范围内记录它，这样可能更有意义。\n\
    \n另一个用例涉及对源于应用程序代码的问题进行临时修复。例如，应用程序可能由于一个错误，偶尔向存储过程传递无效的键，而该存储过程本应将它们插入表中。通过在数据库中简单地捕获异常，而不是将其抛回给应用程序导致用户收到错误消息，来*临时*“修复”问题，可能更简单。将此类快速修复到位通常比重建和重新部署整个应用程序要便宜得多。\n\
    \n考虑何时*不*封装异常也很重要。确保不要过度处理安全问题、严重的数据错误以及其他应用程序——最终是用户——可能应该被告知的异常。绝对存在“过度处理异常”这种事，陷入这个陷阱可能意味着问题会被隐藏，直到它们引起足够的骚动而变得无法忽视。\n\
    \n隐藏在异常处理器背后的长期问题通常会以无法修复的数据损坏形式暴露出来。这些情况通常因缺乏可行的备份而凸显，因为问题已经存在了很长时间，并不可避免地以业务损失和开发人员更新简历寻找工作而告终。幸运的是，避免这个问题相当容易。只需运用一点常识，不要为了压制所有异常而走向极端。\n\
    \n## 使用`TRY/CATCH`构建重试逻辑\n"
- fmt: "# CHAPTER 4 - ERRORS AND EXCEPTIONS\n\nAn interesting example of where `TRY/CATCH`\
    \ can be used to fully encapsulate an exception is when dealing with deadlocks.\
    \ Although it’s better to try to find and solve the source of a deadlock than\
    \ to code around it, this is often a difficult and time-consuming task. Therefore,\
    \ it’s common to deal with deadlocks—at least temporarily—by having the application\
    \ reissue the request that caused the deadlock. Eventually the deadlock condition\
    \ will resolve itself (i.e., when the other transaction finishes), and the DML\
    \ operation will go through as expected. Note that I do not recommend this as\
    \ a long-term solution to solving recurring deadlock situations!\n\nBy using T-SQL’s\
    \ `TRY/CATCH` syntax, the application no longer needs to reissue a request or\
    \ even know that a problem occurred. A retry loop can be set up, within which\
    \ the deadlock-prone code can be tried in a `TRY` block and the deadlock caught\
    \ in a `CATCH` block in order to try again.\n\nA basic implementation of a retry\
    \ loop follows:\n\n```sql\nDECLARE @Retries int;\n\nSET @Retries = 3;\n\nWHILE\
    \ @Retries > 0\n\nBEGIN\n\n    BEGIN TRY\n\n        /*\n\n        Put deadlock-prone\
    \ code here\n\n        */\n\n        --If execution gets here, success\n\n   \
    \     BREAK;\n\n    END TRY\n\n    BEGIN CATCH\n\n        IF ERROR_NUMBER() =\
    \ 1205\n\n        BEGIN\n\n            SET @Retries = @Retries - 1;\n\n      \
    \      IF @Retries = 0\n\n                RAISERROR('Could not complete transaction!',\
    \ 16, 1);\n\n        END\n\n        ELSE\n\n            RAISERROR('Non-deadlock\
    \ condition encountered', 16, 1);\n\n        BREAK;\n\n    END CATCH\n\nEND;\n\
    \nGO\n```\n\nIn this example, the deadlock-prone code is retried as many times\
    \ as the value of `@Retries`. Each time through the loop, the code is tried. If\
    \ it succeeds without an exception being thrown, the code gets to the `BREAK`\
    \ and the loop ends. Otherwise, execution jumps to the `CATCH` block, where a\
    \ check is made to ensure that the error number is 1205 (deadlock victim). If\
    \ so, the counter is decremented so that the loop can be tried again. If the exception\
    \ is not a deadlock, another exception is thrown so that the caller knows that\
    \ something went wrong. It’s important to make sure that the wrong exception does\
    \ not trigger a retry.\n\n## Exception Handling and Defensive Programming\n\n\
    Exception handling is extremely useful, and its use in T-SQL is absolutely invaluable.\
    \ However, I hope that all readers keep in mind that exception handling is no\
    \ substitute for proper checking of error conditions *before* they occur. Whenever\
    \ possible, code defensively—proactively look for problems, and if they can be\
    \ both detected and handled, code around them.\n\nRemember that it’s generally\
    \ a better idea to handle exceptions rather than errors. If you can predict a\
    \ condition and write a code path to handle it during development, that will usually\
    \ provide a much more robust solution than trying to trap the exception once it\
    \ occurs and handle it then.\n\n## Exception Handling and SQLCLR\n\nThe .NET Framework\
    \ provides its own exception-handling mechanism, which is quite separate from\
    \ the mechanism used to deal with exceptions encountered in T-SQL. So, how do\
    \ the two systems interact when an exception occurs in CLR code executed within\
    \ the SQLCLR process hosted by SQL Server?\n\nLet’s look at an example—the following\
    \ C# code illustrates a simple CLR user-defined function (UDF) to divide one number\
    \ by another:\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction()]\n\npublic\
    \ static SqlDecimal Divide(SqlDecimal x, SqlDecimal y)\n\n{\n\n    return x /\
    \ y;\n\n}\n```\n\nWhen cataloged and called from SQL Server with a value of 0\
    \ for the `y` parameter, the result is as follows:\n\n```\nMsg 6522, Level 16,\
    \ State 2, Line 1\n\nA .NET Framework error occurred during execution of user-defined\
    \ routine or\n\naggregate \"Divide\":\n\nSystem.DivideByZeroException: Divide\
    \ by zero error encountered.\n\nSystem.DivideByZeroException:\n\n   at System.Data.SqlTypes.SqlDecimal.op_Division(SqlDecimal\
    \ x, SqlDecimal y)\n\n   at ExpertSQLServer.UserDefinedFunctions.Divide(SqlDecimal\
    \ x, SqlDecimal y)\n\n.\n```\n\nSQL Server automatically wraps an exception handler\
    \ around any managed code executed from within its process."
