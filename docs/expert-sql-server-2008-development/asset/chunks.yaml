- fmt: "# CHAPTER 4 ERRORS AND EXCEPTIONS\n\nexceptions, and then deliberately raise\
    \ these exceptions as a method of controlling the flow of an application. There\
    \ are some possible benefits to this approach: raising an exception is a useful\
    \ way to break out of a routine immediately, however deeply nested in the call\
    \ stack that routine might be; and, an exception can be used to describe conditions\
    \ that would be difficult to express in the normal return value of a method. However\
    \ convenient it may seem to use exceptions in such scenarios, they clearly represent\
    \ an abuse of the intended purpose of exception-handling code (which, remember,\
    \ is to deal with *exceptional* circumstances). Furthermore, making lots of exception\
    \ calls can make your code hard to read, and debugging can be made more difficult,\
    \ since debuggers generally implement special behavior whenever exceptions are\
    \ encountered. As a result, exception-laden code is more difficult to maintain\
    \ when compared to code that relies on more standard control flow structures.\n\
    \nIn my opinion, you should raise exceptions only to describe truly exceptional\
    \ circumstances. Furthermore, due to the fact that exceptions can cause abort\
    \ conditions, they should be used sparingly. However, there is certainly an upside\
    \ to using exceptions over errors, which is that it’s more difficult for the caller\
    \ to ignore an exception, since it will cause code to abort if not properly handled.\
    \ If you’re designing an interface that needs to ensure that the caller definitely\
    \ sees a certain condition when and if it occurs, it might make sense to use an\
    \ exception rather than an error.\n\nAs in almost all cases, the decision is very\
    \ dependent on the context of your application, so do not feel obliged to stick\
    \ to my opinion!\n\n## How Exceptions Work in SQL Server\n\nThe first step in\
    \ understanding how to handle errors and exceptions in SQL Server is to take a\
    \ look at how the server itself deals with error conditions. Unlike many other\
    \ programming languages, SQL Server has an exception model that involves different\
    \ behaviors for different types of exceptions. This can cause unexpected behavior\
    \ when error conditions do occur, so careful programming is essential when dealing\
    \ with T-SQL exceptions.\n\nTo begin with, think about connecting to a SQL Server\
    \ and issuing some T-SQL. First, you must establish a `connection` to the server\
    \ by issuing login credentials. The connection also determines what database will\
    \ be used as the default for scope resolution (i.e., finding objects—more on this\
    \ in a bit).\n\nOnce connected, you can issue a `batch` of T-SQL. A batch consists\
    \ of one or more T-SQL `statements`, which will be compiled together to form an\
    \ execution plan.\n\nThe behavior of the exceptions thrown by SQL Server mostly\
    \ follows this same pattern: depending on the type of exception, a statement,\
    \ a batch, or an entire connection may be aborted. Let’s take a look at some practical\
    \ examples to see this in action.\n\n## Statement-Level Exceptions\n\nA statement-level\
    \ exception aborts only the current statement that is running within a batch of\
    \ T-SQL, allowing any subsequent statements within the batch to run. To see this\
    \ behavior, you can use SQL Server Management Studio to execute a batch that includes\
    \ an exception, followed by a `PRINT` statement.\n\nFor instance:\n\n```sql\n\
    SELECT POWER(2, 32);\nPRINT 'This will print!';\nGO\n```\n\nRunning this batch\
    \ results in the following output:\n\n```text\nMsg 232, Level 16, State 3, Line\
    \ 1\nArithmetic overflow error for type int, value = 4294967296.000000.\nThis\
    \ will print!\n```\n\nWhen this batch was run, the attempt to calculate `POWER(2,\
    \ 32)` caused an integer overflow, which threw the exception. However, only the\
    \ `SELECT` statement was aborted. The rest of the batch continued to run, which,\
    \ in this case, meant that the `PRINT` statement still printed its message.\n\n\
    ## Batch-Level Exceptions\n\nUnlike a statement-level exception, a batch-level\
    \ exception does not allow the rest of the batch to continue running. The statement\
    \ that throws the exception will be aborted, and any remaining statements in the\
    \ batch will not be run. An example of a batch-aborting exception is an invalid\
    \ conversion, such as the following:\n\n```sql\nSELECT CONVERT(int, 'abc');\n\
    PRINT 'This will NOT print!';\nGO\n```\n\nThe output of this batch is as follows:\n\
    \n```text\nMsg 245, Level 16, State 1, Line 1\nConversion failed when converting\
    \ the varchar value 'abc' to data type int.\n```\n\nIn this case, the conversion\
    \ exception occurred in the `SELECT` statement, which aborted the batch at that\
    \ point. The `PRINT` statement was not allowed to run, although if the batch had\
    \ contained any valid statements *before* the exception, these would have been\
    \ executed successfully.\n\nBatch-level exceptions might be easily confused with\
    \ connection-level exceptions (which drop the connection to the server), but after\
    \ a batch-level exception, the connection is still free to send other batches.\
    \ For instance:\n\n```sql\nSELECT CONVERT(int, 'abc');\nGO\nPRINT 'This will print!';\n\
    GO\n```\n\nIn this case there are two batches sent to SQL Server, separated by\
    \ the batch separator, `GO`. The first batch throws a conversion exception, but\
    \ the second batch is still run. This results in the following output:\n\n```text\n\
    Msg 245, Level 16, State 1, Line 2\nConversion failed when converting the varchar\
    \ value 'abc' to data type int.\nThis will print!\n```\n\nBatch-level exceptions\
    \ do not affect only the scope in which the exception occurs. The exception will\
    \ `bubble up` to the next level of execution, aborting every call in the stack.\
    \ This can be illustrated by creating the following stored procedure:\n\n```sql\n\
    CREATE PROCEDURE ConversionException\nAS\nBEGIN\n    SELECT CONVERT(int, 'abc');\n\
    END;\nGO\n```\n\nRunning this stored procedure followed by a `PRINT` shows that,\
    \ even when an exception occurs in an inner scope (within the stored procedure),\
    \ the outer batch is still aborted:\n\n```sql\nEXEC ConversionException;\nPRINT\
    \ 'This will NOT print!';\nGO\n```\n\nThe result of this batch is the same as\
    \ if no stored procedure was used:\n\n```text\nMsg 245, Level 16, State 1, Line\
    \ 4\nConversion failed when converting the varchar value 'abc' to data type int.\n\
    ```\n\n## Parsing and Scope-Resolution Exceptions\n\nExceptions that occur during\
    \ parsing or during the scope-resolution phase of compilation appear at first\
    \ to behave just like batch-level exceptions. However, they actually have a slightly\
    \ different behavior. If the exception occurs in the same scope as the rest of\
    \ the batch, these exceptions will behave just like a batch-level exception. If,\
    \ on the other hand, an exception occurs in a lower level of scope, these exceptions\
    \ will behave just like statement-level exceptions—at least, as far as the outer\
    \ batch is concerned.\n\nAs an example, consider the following batch, which includes\
    \ a malformed `SELECT` statement (this is a parse exception):\n\n```sql\nSELECTxzy\
