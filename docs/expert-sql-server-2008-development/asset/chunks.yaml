    it, you’ll see vastly different results. If you’re lucky enough to call it the
    first time with no arguments, the result will be an index scan, producing nine
    logical reads—and the same number of reads will result for any combination of
    parameters passed in thereafter. If, however, you first call the stored procedure
    using only the


    @BusinessEntityID parameter, the resultant plan will use only four logical reads—until
    you happen to call the procedure with no arguments, which will produce a massive
    582 reads.


