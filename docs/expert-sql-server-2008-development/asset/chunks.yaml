  trans: "\n# 第 12 章 树、层次结构与图形\n\n> **注意：** 为非键列 `ManagerId` 添加聚集索引，可能对专门查询“哪些员工向特定经理汇报”的查询产生最佳性能，但这不一定是通用员工表的最佳设计。\n\
    \n一旦完成此更改，重新运行用于查找 CEO 直属下属的 T-SQL 语句，将产生聚集索引寻址而非扫描——这是一次小幅改进，当对行数更多的表执行查询时，此改进效果将被放大。\n\
    \n## 向下遍历层次结构\n\n从查找单个节点的直接子节点转向向下遍历整个层次结构直至叶节点，这极其简单，与处理通用图的情况一样。递归公共表表达式（CTE）是可用于此目的的工具之一。以下\
    \ CTE（由图形部分的代码修改而来）从 CEO 开始遍历 `Employee_Temp` 层次结构，返回公司中的所有员工：\n\n```sql\nWITH\
    \ n AS\n(\n    SELECT\n        EmployeeID,\n        ManagerID,\n        Title\n\
    \    FROM Employee_Temp\n    WHERE ManagerID IS NULL\n    UNION ALL\n    SELECT\n\
    \        e.EmployeeID,\n        e.ManagerID,\n        e.Title\n    FROM Employee_Temp\
    \ e\n    JOIN n ON n.EmployeeID = e.ManagerID\n)\nSELECT\n    n.EmployeeID,\n\
    \    n.ManagerID,\n    n.Title\nFROM n;\nGO\n```\n\n请注意，此 CTE 返回所有列以供外部查询使用——但这并非编写此查询的唯一方式。也可以将查询编写为\
    \ CTE 仅使用并返回 `EmployeeID` 列，从而需要在外部查询中进行额外的 `JOIN` 操作以获取其他列：\n\n```sql\nWITH n\
    \ AS\n(\n    SELECT\n        EmployeeID\n    FROM Employee_Temp\n    WHERE ManagerID\
    \ IS NULL\n    UNION ALL\n    SELECT\n        e.EmployeeID\n    FROM Employee_Temp\
    \ e\n    JOIN n ON n.EmployeeID = e.ManagerID\n)\nSELECT\n    e.EmployeeID,\n\
    \    e.ManagerID,\n    e.Title\nFROM n\nJOIN Employee_Temp e ON e.EmployeeID =\
    \ n.EmployeeID;\nGO\n```\n\n我认为后一种形式可能会减少 I/O 活动，但在针对此表以及具有更多列的表测试了索引与查询形式的几种组合后，我得出的结论是：没有直接的答案。随着输出行大小的增加，后一种查询往往表现更好，但在小型测试表的情况下，前一种查询则高效得多。再次强调，在部署解决方案前，您应该针对实际工作负载对此进行测试。\n\
    \n## 输出排序\n\n无论上一节中两个查询的性能如何，事实是我们尚未真正做太多工作。这两个查询目前的输出在逻辑上等价于 `SELECT * FROM Employee_Temp`\
    \ 的输出。为了增加价值，输出应进行排序，以符合表中所表示的层次结构。为此，我们可以使用“遍历图形”部分描述的相同路径技术，但无需担心循环。通过对路径进行排序，输出将遵循与层次结构本身相同的嵌套顺序。以下\
    \ T-SQL 展示了如何实现此目的：\n\n```sql\nWITH n AS\n(\n    SELECT\n        EmployeeID,\n\
    \        ManagerID,\n        Title,\n        CONVERT(varchar(900),\n         \
    \   RIGHT(REPLICATE('0', 10) + CONVERT(varchar, EmployeeID), 10) + '/'\n     \
    \   ) AS thePath\n    FROM Employee_Temp\n    WHERE ManagerID IS NULL\n    UNION\
    \ ALL\n    SELECT\n        e.EmployeeID,\n        e.ManagerID,\n        e.Title,\n\
    \        CONVERT(varchar(900),\n            n.thePath +\n            RIGHT(REPLICATE('0',\
    \ 10) + CONVERT(varchar, e.EmployeeID), 10) + '/'\n        ) AS thePath\n    FROM\
    \ Employee_Temp e\n    JOIN n ON n.EmployeeID = e.ManagerID\n)\nSELECT\n    n.EmployeeID,\n\
    \    n.ManagerID,\n    n.Title,\n    n.thePath\nFROM n\nORDER BY n.thePath;\n\
    GO\n```\n\n运行此查询将产生如下所示的输出（为简洁起见已截断）：\n\n| EmployeeID | ManagerID | Title    \
    \              | thePath                          |\n| ---------- | ---------\
    \ | ---------------------- | -------------------------------- |\n| 109       \
    \ | NULL      | Chief Executive Officer | 0000000109/                      |\n\
    | 6          | 109       | Marketing Manager      | 0000000109/0000000006/   \
    \        |\n| 2          | 6         | Marketing Assistant    | 0000000109/0000000006/0000000002/\
    \ |\n| 46         | 6         | Marketing Specialist   | 0000000109/0000000006/0000000046/\
    \ |\n| 106        | 6         | Marketing Specialist   | 0000000109/0000000006/0000000106/\
    \ |\n| 119        | 6         | Marketing Specialist   | 0000000109/0000000006/0000000119/\
    \ |\n"
- fmt: "# CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS\n\n## Are CTEs the Best Choice?\n\
    \n203 6 Marketing Specialist 0000000109/0000000006/0000000203/\n\n269 6 Marketing\
    \ Assistant 0000000109/0000000006/0000000269/\n\n271 6 Marketing Specialist 0000000109/0000000006/0000000271/\n\
    \n272 6 Marketing Assistant 0000000109/0000000006/0000000272/\n\n12 109 V President\
    \ Engineering 0000000109/0000000012/\n\n3 12 Engineering Manager 0000000109/0000000012/0000000003/\n\
    \nIn order to support proper numerical ordering on the nodes, I’ve left-padded\
    \ them with zeros. This ensures that, for instance, the path `1/2/` does not sort\
    \ higher than the path `1/10/`. The numbers are padded to ten digits to support\
    \ the full range of positive integer values supported by SQL Server’s `int` data\
    \ type. Note that siblings in this case are ordered based on their `EmployeeID`.\
    \ Changing the ordering of siblings—for instance, to alphabetical order based\
    \ on `Title`—requires a bit of manipulation to the path.\n\nInstead of materializing\
    \ the `EmployeeID`, materialize a row number that represents the current ordered\
    \ sibling. This can be done using SQL Server’s `ROW_NUMBER` function, and is sometimes\
    \ referred to as enumerating the path. The following modified version of the CTE\
    \ enumerates the path:\n\n```sql\nWITH n AS\n(\n    SELECT\n        EmployeeID,\n\
    \        ManagerID,\n        Title,\n        CONVERT(varchar(900), '0000000001/')\
    \ AS thePath\n    FROM Employee_Temp\n    WHERE ManagerID IS NULL\n\n    UNION\
    \ ALL\n\n    SELECT\n        e.EmployeeID,\n        e.ManagerID,\n        e.Title,\n\
    \        CONVERT(varchar(900),\n            n.thePath +\n            RIGHT(\n\
    \                REPLICATE('0', 10) +\n                CONVERT(varchar, ROW_NUMBER()\
    \ OVER (ORDER BY e.Title)),\n                10\n            ) + '/'\n       \
    \ ) AS thePath\n    FROM Employee_Temp e\n    JOIN n ON n.EmployeeID = e.ManagerID\n\
    )\nSELECT\n    n.EmployeeID,\n    n.ManagerID,\n    n.Title,\n    n.thePath\n\
    FROM n\nORDER BY n.thePath;\nGO\n```\n\nThe enumerated path representing each\
    \ node is illustrated in the results of the query as follows:\n\n`EmployeeID`\
    \ `ManagerID` `Title` `thePath`\n109 NULL Chief Executive Officer 00000001/\n\
    140 109 Chief Financial Officer 00000001/00000001/\n139 140 Accounts Manager 00000001/00000001/00000001/\n\
    216 139 Accountant 00000001/00000001/00000001/00000001/\n178 139 Accountant 00000001/00000001/00000001/00000002/\n\
    166 139 Accs Payable Specialist 00000001/00000001/00000001/00000003/\n201 139\
    \ Accs Payable Specialist 00000001/00000001/00000001/00000004/\n130 139 Accs Recvble\
    \ Specialist 00000001/00000001/00000001/00000005/\n94 139 Accs Recvble Specialist\
    \ 00000001/00000001/00000001/00000006/\n59 139 Accs Recvble Specialist 00000001/00000001/00000001/00000007/\n\
    103 140 Assistant to the CFO 00000001/00000001/00000002/\n71 140 Finance Manager\
    \ 00000001/00000001/00000003/\n274 71 Purchasing Manager 00000001/00000001/00000003/00000001/\n\
    \n„ **Tip** Instead of left-padding the node IDs with zeros, you could expose\
    \ the `thePath` column typed as `varbinary` and convert the IDs to `binary(4)`.\
    \ This would have the same net effect for the purpose of sorting and at the same\
    \ time take up less space—so you will see an efficiency benefit, and in addition\
    \ you’ll be able to hold more node IDs in each row’s path. The downside is that\
    \ this makes the IDs more difficult to visualize, so for the purposes of this\
    \ chapter—where visual cues are important—I use the left-padding method instead.\n\
    \nThe downside of including an enumerated path instead of a materialized path\
    \ is that the enumerated version cannot be easily deconstructed to determine the\
    \ keys that were followed. For instance, simply looking at the `thePath` column\
    \ in the results of the first query in this section, we can see that the path\
    \ to the Engineering Manager (`EmployeeID` 3) starts with `EmployeeID` 109 and\
    \ continues to `EmployeeID` 12 before getting to the Engineering Manager. Looking\
    \ at the same column using the enumerated path, it is not possible to discover\
    \ the actual IDs that make up a given path without following it back up the hierarchy\
    \ in the output."
