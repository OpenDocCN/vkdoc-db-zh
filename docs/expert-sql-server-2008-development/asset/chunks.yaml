    automatically the first time it is required and stored in the master database.'
  trans: '# 第六章 加密


    加密所能提供的最基本保护或许是针对**静态数据**面临的风险。在 SQL Server 中，`静态数据`指的是存储在文件系统上的底层数据库文件，包括事务日志和备份。如果未经授权的第三方能够访问这些文件，他们就有可能将数据库复制并还原到自己的系统上，从而可以从容地浏览您的数据。然而，如果数据库中的敏感数据以加密格式存储，攻击者还需要知道相关的密钥或密码才能解密被盗数据，否则这些数据对他们毫无价值。


    除了数据库文件的物理盗窃外，黑客和外部威胁也对数据库安全构成持续风险。黑客通常知识渊博，并配备了各种工具来探测和利用您安全系统中的任何弱点。通过确保所有通过网络传输的数据都经过安全加密，您可以确保只有预期的接收方才能理解这些数据，从而降低数据被成功拦截并用于对付您的可能性。


    许多组织也认识到内部来源对数据安全构成的威胁。心怀不满的 DBA 和试图试探其授权极限的开发人员可能会访问其工作不需要的数据。如果有合适的价码，此类信息很容易流出组织，落入不法分子之手。如果设计和部署得当，加密策略可以防止此类风险发生。


    请记住，加密不能替代其他安全措施，例如适当的身份验证和授权程序。但是，如果实施正确，它可以提供额外的安全级别，这可能是您的数据暴露还是按预期保密的关键区别。


    ## SQL Server 2008 加密密钥层次结构


    与几乎所有民用密码学一样，SQL Server 中的所有加密方法都基于标准化的、公开可用的加密算法。在许多方面，这是一件好事：这些算法由世界上一些顶尖的信息理论家开发，并且通常已被证明能够经受住集中、蓄意的攻击。然而，这种公开知识的使用对任何处理机密数据的数据库应用程序设计提出了一个有趣的假设，即`敌人知道系统`。


    香农格言（即上述陈述的普遍称呼）是对荷兰密码学家奥古斯特·克尔克霍夫斯早期工作的重述。克尔克霍夫斯提出了一些原则，如果遵循这些原则，就能确保军事密码在部分系统事实被泄露的情况下仍能保持安全。这些原则最初于
    1883 年发表在法国期刊`le Journal des Sciences Militaires`上，在现代密码学中仍然非常适用。


    所有 SQL Server 加密方法都使用基于密钥或从中生成密钥的密码的算法。如果我们假设香农格言成立（即所使用的任何加密算法的细节都是公开知识），那么您的加密数据的安全性就*完全*依赖于保护算法用于解密和加密数据的密钥。因此，必须为存储密钥创建一个安全环境，这必须被视为任何加密策略的首要任务。事实上，安全密钥管理和分发问题是现代密码学中最重要的领域之一，因为未能正确保护加密密钥会危及您的整个安全策略。在研究
    SQL Server 中可用的不同类型加密之前，首先有必要考虑如何管理这些加密方法所基于的密钥。


    ### 自动密钥管理层次结构


    SQL Server 解决安全密钥管理问题的方法是实现一个加密密钥层次结构，每个密钥为低于它的密钥提供保护。`自动密钥管理`层次结构如图 6-1 所示。


    *图 6-1. SQL Server 2008 中的默认自动密钥管理层次结构*


    自动密钥管理层次结构的主要特点将在以下标题下描述。


    #### 对称密钥、非对称密钥和证书


    在最低级别，数据项使用`对称密钥`、`非对称密钥对`的公钥或`证书`进行加密。这些密钥和证书存储在创建它们的用户数据库中。这三种方法各有优缺点，将在本章后面讨论。


    创建每种类型密钥的语法略有不同，但遵循相同的基本模式：列出密钥名称、要使用的加密算法、将拥有该密钥的数据库用户名以及保护密钥的方法。例如，以下代码清单演示了使用
    Rivest、Shamir 和 Adleman (RSA) 算法创建由数据库用户 Tom 拥有的 1,024 位非对称密钥所需的语法：


    ```sql

    CREATE ASYMMETRIC KEY ExampleAsymKey

    AUTHORIZATION Tom

    WITH ALGORITHM = RSA_1024;

    ```


    在此示例中，没有显式指定保护方法，因此密钥将受自动密钥层次结构保护。默认情况下，这意味着密钥和证书受其所在数据库的`数据库主密钥` (DMK) 保护。


    #### 数据库主密钥


    服务器上的每个用户数据库都可以有自己的 DMK，这是一个对称密钥，存储在`master`数据库和用户数据库中。DMK 受两种不同形式的加密保护：一种是使用基于服务器的`服务主密钥`
    (SMK) 的三重 DES（数据加密标准）算法进行的加密，另一种是使用密码进行的加密。


    即使同时受 SMK *和*密码保护，默认情况下，SQL Server 在需要时可以通过仅使用 SMK 解密来自动打开 DMK，而无需提供密码。这意味着受 DMK
    保护的任何依赖私钥的用户不需要被授予打开 DMK 的显式权限。用户只需要对各个依赖密钥或证书拥有权限，因为 SQL Server 将在必要时打开 DMK 以访问这些密钥。这对于保护数据免受`sysadmins`和`db_owners`的访问具有一些影响，将在后面讨论。


    可以通过在要存储密钥的数据库中运行`CREATE MASTER KEY`语句来创建 DMK，如下所示：


    ```sql

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''5Tr()ng_p455woRD_4_dA_DMK!!!'';

    ```


    **注意：** 每个数据库只能关联一个 DMK。如果您遵循了第 5 章中的示例，您可能已经为了从证书创建代理数据库用户而创建了一个 DMK。


    #### 服务主密钥


    SMK 是位于 SQL Server 加密层次结构顶部的对称密钥，用于加密服务器上存储的所有 DMK，并保护与链接服务器关联的登录名和凭据。


    SMK 受操作系统的`数据保护 API` (DPAPI) 保护，使用 SQL Server 的服务账户凭据和计算机凭据。如果这些凭据中的任何一个失效（例如，如果服务账户被更改），SQL
    Server 将基于剩余的有效密钥重新创建失效的密钥。这确保了 SMK 能够抵御除最严重故障之外的所有问题。没有创建 SMK 的命令；它在首次需要时自动创建并存储在`master`数据库中。'
- fmt: 'SMK 提供了 SQL Server 2008 中自动密钥层次结构所包含的所有加密密钥的顶层控制。该 SMK 保护的层次结构为大多数情况提供了足够的安全性，并使密钥访问相对容易：使用
    `GRANT` 命令将层次结构中各个密钥或密钥子树的使用权授予个人或组，授权用户可以根据需要打开和使用这些密钥。


    ### 替代加密管理结构


    有些情况下，你可能希望使用替代方法来增强或替换默认的自动密钥管理，以保护你的加密密钥。SQL Server 2008 灵活的加密密钥管理结构提供了几种实现方式，我将在接下来的内容中讨论。


    ### 对称密钥分层与轮换


    数据库内的对称密钥本身可以被**分层**以提供额外的层次级别。


    例如，一个对称密钥可以被另一个对称密钥加密，而后者又由受 DMK 保护的证书进行保护。以这种方式对密钥进行分层可以提供额外的控制和安全性，并且更容易实现**密钥轮换**，即可以更改中间层密钥，而无需解密和重新加密所有底层数据。


    在仅基于单个加密密钥的扁平模型中进行密钥轮换是非常繁琐的。


    要理解原因，假设你有大量的数据被单个对称密钥加密。现在假设，由于新的客户端要求，该加密密钥必须每月轮换一次。轮换将需要使用新密钥解密和重新加密所有数据，这可能需要大量的工作，并且可能要求数据在用新密钥重新加密之前至少暂时进入未加密状态。在分层模型中，你可以非常轻松地轮换更高层的密钥，因为它们包含的唯一加密数据是下一层加密使用的对称密钥。


    并非所有密钥都需要同时轮换；轮换层次结构中的任何密钥都会重新加密所有依赖的密钥，这使得任何暴力攻击破解你的加密层次结构并获取敏感数据的难度显著增加。但是，请记住，尽管正确处理的密钥轮换通常会提高安全性，但密钥轮换确实涉及一定程度的固有风险。例如，存储在磁带备份上的存档加密数据，将其留在物理安全的位置可能比为了用新密钥重新加密数据而取回磁带更安全。


    在创建额外的密钥层时，你应该尝试确保更高层密钥的加密强度与其所保护的密钥相同或更高。用较弱的密钥保护一个强密钥不会为系统增加任何额外的安全性。


    ### 从自动加密层次结构中移除密钥


    当 DMK 同时受 SMK 和密码保护时（如默认层次结构中那样），你无需显式提供密码即可打开 DMK；当具有适当权限的用户请求受 DMK 保护的密钥时，SQL
    Server 会自动使用 SMK 打开 DMK 以访问所需的依赖密钥。此行为的一个有趣特点是，拥有数据库 `GRANT` 权限的系统管理员或 `db_owner`
    角色中的 DBA 因此有权查看层次结构中的*所有*依赖密钥。


    在你希望限制这些角色中的个人访问加密数据的情况下，必须删除对 DMK 的 SMK 保护，这将强制改为使用密码进行 DMK 保护。以下 T-SQL 语句在用户具有
    `CONTROL` 权限的数据库中运行时，将删除与该数据库关联的 DMK 的 SMK 保护：


    ```

    ALTER MASTER KEY DROP ENCRYPTION BY SERVICE MASTER KEY;

    ```


    当仅受密码保护时，DMK 会从默认的自动密钥管理层次结构中移除，并且每次需要时都必须由具有适当密码的用户显式打开：


    ```

    OPEN MASTER KEY DECRYPTION BY PASSWORD = ''5Tr()ng_p455woRD_4_dA_DMK!!!'';


    -- Perform some action on properties dependent on the DMK


    CLOSE MASTER KEY;

    ```


    单独的对称密钥、非对称密钥和证书也可以通过密码进行保护，以防止它们在每次需要时未提供适当密码的情况下被打开。


    将密钥从自动密钥层次结构中移除的问题在于，随后就需要有一个保护这些密钥密码的系统。除非*此*系统设计有充分的安全措施，否则使用密码保护密钥的加密数据并不会比在自动密钥管理下加密时更安全（甚至可能更不安全）。


    ### 可扩展密钥管理


    SQL Server 2008 支持通过可扩展密钥管理（EKM）方法管理加密密钥。EKM 使用外部硬件安全模块（HSM）在 SQL Server 之外保存对称或非对称密钥，并将这些密钥的管理委托给
    HSM。


    以下代码清单说明了在 SQL Server 中创建映射到存储在 EKM 设备上的密钥的非对称所需的语法：


    ```

    CREATE ASYMMETRIC KEY EKMAsymKey

    FROM PROVIDER EKM_Provider

    WITH

    ALGORITHM = RSA_1024,

    CREATION_DISPOSITION = OPEN_EXISTING,

    PROVIDER_KEY_NAME = ''EKMKey1'';

    GO

    ```


    EKM 使用专用硬件提供完整的加密管理解决方案，这意味着 SQL Server 可以将加密过程留给 HSM，而专注于其他任务。实现 EKM 涉及使用供应商特定的库来配置
    SQL Server 和 HSM 单元之间的连接，本章不予涵盖。


    图 6-2 说明了本节讨论的不同加密配置，这些配置提供了默认自动密钥管理层次结构的替代方案。


    这些可能的加密配置中的每一种对提供的安全级别、密钥管理的难易程度以及访问和操作底层数据的性能影响都有不同的影响。要了解这些差异，有必要更详细地审视加密各个数据项的各种方法，这将在本章的下一部分中介绍。


    在继续之前，请运行以下代码清单以创建一个新的数据库和关联的 DMK：


    ```

    CREATE DATABASE ExpertSqlEncryption;

    GO

    USE ExpertSqlEncryption;

    GO

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''-=+I_aM-tH3-DMK_P45sW0rd+=-'';

    GO

    ```


    本章后续的所有示例都将使用此数据库。


    图 6-2\. 替代加密密钥管理结构（从左至右）：通过 EKM 保护的对称密钥；分层对称密钥；由受密码保护的证书加密的对称密钥；受密码而非 SMK 保护的
    DMK


    ### 数据保护与加密方法


    SQL Server 2008 提供了一系列加密方法，这些方法提供不同级别的保护，同时具有不同的相关性能和架构影响。我在此不试图详细描述每种方法的全部细节；对每种方法的详细描述感兴趣的读者应查阅专门讨论该主题的书籍，例如
    *Expert SQL Server 2008 Encryption*，作者 Michael Coles（Apress，2009）。不过，我将简要概述以下方法：


    - 哈希

    - 对称密钥加密

    - 非对称密钥加密

    - 透明数据加密


    ### 哈希


    哈希函数允许你对任何数据执行**单向**加密，并产生确定性的结果。'
  raw: 'The SMK provides the top level of control over all encryption keys that are
    contained within the automatic key hierarchy implemented by SQL Server 2008\.
    The hierarchical structure protected by the SMK provides sufficient security for
    most situations, and makes key access relatively easy: permissions to use individual
    keys or subtrees of keys within the hierarchy are granted to individuals or groups
    using the GRANT command, and such keys can be opened and used by authorized users
    as required.


    Alternative Encryption Management Structures


    There are some occasions where you may want to augment or replace the default
    automatic key


    management with alternative methods to protect your encryption keys. The flexible
    encryption key management structure in SQL Server 2008 provides several ways for
    doing this, as I’ll now discuss.


    CHAPTER 6 „ ENCRYPTION


    Symmetric Key Layering and Rotation


    Symmetric keys within a database may themselves be **layered** to provide additional
    levels of hierarchy.


    For example, a symmetric key may be encrypted by another symmetric key, which
    is then protected by a certificate protected by the DMK. Layering keys in this
    way can provide additional control and security, and makes it easier to facilitate
    **key rotation**, where middle layers of keys can be changed without having to
    decrypt and reencrypt all of the underlying data.


    Key rotation using a flat model, which is based on only a single encryption key,
    is very cumbersome.


    To understand why, suppose that you had a very large amount of data encrypted
    by a single symmetric key. Now suppose that, as a result of a new client requirement,
    that encryption key had to be rotated every month. Rotation would require decrypting
    and reencrypting all of the data with a new key, which could require a considerable
    amount of effort, and may require the data to at least temporarily enter an unencrypted
    state before reencryption with the new key. In a layered model, you can rotate
    higher keys very easily, since the only encrypted data they contain is the symmetric
    key used by the next lower level of encryption.


    Not all keys need to be rotated at once; rotation of any key in the hierarchy
    will reencrypt all dependent keys, which makes it significantly harder for any
    brute force attacks to break through your encryption hierarchy and obtain access
    to your sensitive data. However, bear in mind that, although properly handled
    key rotation generally improves security, key rotation does involve a certain
    level of inherent risk. Archived encrypted data stored on a tape backup, for example,
    may be kept safer by being left in a physically secure location than by having
    the tape retrieved in order to perform reencryption of the data with a new key.


    When creating additional layers of keys, you should try to ensure that higher
    levels of keys have the same or greater encryption strength than the keys that
    they protect. Protecting a strong key with a weaker key does not add any additional
    security to the system.


    Removing Keys from the Automatic Encryption Hierarchy


    When a DMK is protected by both the SMK and a password, as in the default hierarchy,
    you do not need to explicitly provide the password in order to open the DMK; when
    a user with appropriate permissions requests a key protected by the DMK, SQL Server
    opens the DMK automatically using the SMK to access the required dependent keys.
    One interesting feature of this behavior is that system administrators or DBAs
    in the db_owner role, who have GRANT permission on the database, therefore have
    permission to view *all* dependent keys in the hierarchy.


    In cases where you want to restrict access to encrypted data from individuals
    in these roles, it is necessary to drop the DMK protection by SMK, which will
    enforce the DMK protection by password instead. The following T-SQL, when run
    in a database on which the user has CONTROL permission, will drop the SMK protection
    on the DMK associated with that database:


    ALTER MASTER KEY DROP ENCRYPTION BY SERVICE MASTER KEY;


    When protected only by a password, a DMK is removed from the default automatic
    key


    management hierarchy, and must be explicitly opened by a user with the appropriate
    password every time it is required:


    OPEN MASTER KEY DECRYPTION BY PASSWORD = ''5Tr()ng_p455woRD_4_dA_DMK!!!'';


    -- Perform some action on properties dependent on the DMK


    CLOSE MASTER KEY;


    CHAPTER 6 „ ENCRYPTION


    Individual symmetric keys, asymmetric keys, and certificates may also be protected
    by passwords to prevent them from being opened unless supplied with the appropriate
    password on every occasion.


    The problem with removing keys from the automatic key hierarchy is that it then
    becomes


    necessary to have a system that protects the passwords that secure those keys.
    Unless *this* system is designed with adequate security measures, the encrypted
    data becomes no more secure (and possibly less secure) with password protected
    keys than it was when encrypted with keys held under automatic key management.


    Extensible Key Management


    SQL Server 2008 supports management of encryption keys by extensible key management
    (EKM)


    methods. EKM uses an external hardware security module (HSM) to hold symmetric
    or asymmetric keys outside of SQL Server, and delegates the management of those
    keys to the HSM.


    The following code listing illustrates the syntax required to create an asymmetric
    key in SQL Server mapped to a key stored on an EKM device:


    CREATE ASYMMETRIC KEY EKMAsymKey


    FROM PROVIDER EKM_Provider


    WITH


    ALGORITHM = RSA_1024,


    CREATION_DISPOSITION = OPEN_EXISTING,


    PROVIDER_KEY_NAME = ''EKMKey1'';


    GO


    EKM provides a total encryption management solution using dedicated hardware,
    which means


    that SQL Server can leave the process of encryption to the HSM and concentrate
    on other tasks.


    Implementing EKM involves using vendor-specific libraries to configure the connection
    between SQL


    Server and the HSM unit, and is not covered in this chapter.


    Figure 6-2 illustrates the different encryption configurations discussed in this
    section that provide alternatives to the default automatic key management hierarchy.


    Each of these possible encryption configurations has different implications on
    the level of security offered, the ease with which keys can be managed, and the
    performance impacts for accessing and manipulating the underlying data. To understand
    more about these differences, it’s necessary to have a more detailed look at the
    various methods by which individual items of data can be encrypted, which will
    be covered in the next part of this chapter.


    Before going any further, run the following code listing to create a new database
    and associated DMK:


    CREATE DATABASE ExpertSqlEncryption;


    GO


    USE ExpertSqlEncryption;


    GO


    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''-=+I_aM-tH3-DMK_P45sW0rd+=-'';


    GO


    This database will be used for all of the examples following in this chapter.


    CHAPTER 6 „ ENCRYPTION


    *Figure 6-2\. Alternative encryption key management structures (from left to right):
    symmetric key* *protection by EKM; layered symmetric keys; symmetric key encrypted
    by password-protected certificate;* *DMK protected by password rather than SMK*


    Data Protection and Encryption Methods


    SQL Server 2008 provides a range of encryption methods that provide differing
    levels of protection together with differing associated performance and architecture
    implications. I will not attempt to describe the full details of every method
    here; readers who are interested in a detailed description of each method should
    consult a book dedicated to the subject, such as *Expert SQL Server 2008 Encryption*,
    by Michael Coles (Apress, 2009). However, I will give a brief overview of the
    following methods:


    •


    Hashing


    •


    Symmetric key encryption


    •


    Asymmetric key encryption


    •


    Transparent data encryption


    CHAPTER 6 „ ENCRYPTION


    Hashing


    A hashing function allows you to perform a **one-way** encryption of any data,
    with deterministic results.'
  trans: '

    SMK 提供了 SQL Server 2008 中自动密钥层次结构所包含的所有加密密钥的顶层控制。该 SMK 保护的层次结构为大多数情况提供了足够的安全性，并使密钥访问相对容易：使用
    `GRANT` 命令将层次结构中各个密钥或密钥子树的使用权授予个人或组，授权用户可以根据需要打开和使用这些密钥。


    ### 替代加密管理结构


    有些情况下，你可能希望使用替代方法来增强或替换默认的自动密钥管理，以保护你的加密密钥。SQL Server 2008 灵活的加密密钥管理结构提供了几种实现方式，我将在接下来的内容中讨论。


    ### 对称密钥分层与轮换


    数据库内的对称密钥本身可以被**分层**以提供额外的层次级别。


    例如，一个对称密钥可以被另一个对称密钥加密，而后者又由受 DMK 保护的证书进行保护。以这种方式对密钥进行分层可以提供额外的控制和安全性，并且更容易实现**密钥轮换**，即可以更改中间层密钥，而无需解密和重新加密所有底层数据。


    在仅基于单个加密密钥的扁平模型中进行密钥轮换是非常繁琐的。


    要理解原因，假设你有大量的数据被单个对称密钥加密。现在假设，由于新的客户端要求，该加密密钥必须每月轮换一次。轮换将需要使用新密钥解密和重新加密所有数据，这可能需要大量的工作，并且可能要求数据在用新密钥重新加密之前至少暂时进入未加密状态。在分层模型中，你可以非常轻松地轮换更高层的密钥，因为它们包含的唯一加密数据是下一层加密使用的对称密钥。


    并非所有密钥都需要同时轮换；轮换层次结构中的任何密钥都会重新加密所有依赖的密钥，这使得任何暴力攻击破解你的加密层次结构并获取敏感数据的难度显著增加。但是，请记住，尽管正确处理的密钥轮换通常会提高安全性，但密钥轮换确实涉及一定程度的固有风险。例如，存储在磁带备份上的存档加密数据，将其留在物理安全的位置可能比为了用新密钥重新加密数据而取回磁带更安全。


    在创建额外的密钥层时，你应该尝试确保更高层密钥的加密强度与其所保护的密钥相同或更高。用较弱的密钥保护一个强密钥不会为系统增加任何额外的安全性。


    ### 从自动加密层次结构中移除密钥


    当 DMK 同时受 SMK 和密码保护时（如默认层次结构中那样），你无需显式提供密码即可打开 DMK；当具有适当权限的用户请求受 DMK 保护的密钥时，SQL
    Server 会自动使用 SMK 打开 DMK 以访问所需的依赖密钥。此行为的一个有趣特点是，拥有数据库 `GRANT` 权限的系统管理员或 `db_owner`
    角色中的 DBA 因此有权查看层次结构中的*所有*依赖密钥。


    在你希望限制这些角色中的个人访问加密数据的情况下，必须删除对 DMK 的 SMK 保护，这将强制改为使用密码进行 DMK 保护。以下 T-SQL 语句在用户具有
    `CONTROL` 权限的数据库中运行时，将删除与该数据库关联的 DMK 的 SMK 保护：


    ```

    ALTER MASTER KEY DROP ENCRYPTION BY SERVICE MASTER KEY;

    ```


    当仅受密码保护时，DMK 会从默认的自动密钥管理层次结构中移除，并且每次需要时都必须由具有适当密码的用户显式打开：


    ```

    OPEN MASTER KEY DECRYPTION BY PASSWORD = ''5Tr()ng_p455woRD_4_dA_DMK!!!'';


    -- Perform some action on properties dependent on the DMK


    CLOSE MASTER KEY;

    ```


    单独的对称密钥、非对称密钥和证书也可以通过密码进行保护，以防止它们在每次需要时未提供适当密码的情况下被打开。


    将密钥从自动密钥层次结构中移除的问题在于，随后就需要有一个保护这些密钥密码的系统。除非*此*系统设计有充分的安全措施，否则使用密码保护密钥的加密数据并不会比在自动密钥管理下加密时更安全（甚至可能更不安全）。


    ### 可扩展密钥管理


    SQL Server 2008 支持通过可扩展密钥管理（EKM）方法管理加密密钥。EKM 使用外部硬件安全模块（HSM）在 SQL Server 之外保存对称或非对称密钥，并将这些密钥的管理委托给
    HSM。


    以下代码清单说明了在 SQL Server 中创建映射到存储在 EKM 设备上的密钥的非对称所需的语法：


    ```

    CREATE ASYMMETRIC KEY EKMAsymKey

    FROM PROVIDER EKM_Provider

    WITH

    ALGORITHM = RSA_1024,

    CREATION_DISPOSITION = OPEN_EXISTING,

    PROVIDER_KEY_NAME = ''EKMKey1'';

    GO

    ```


    EKM 使用专用硬件提供完整的加密管理解决方案，这意味着 SQL Server 可以将加密过程留给 HSM，而专注于其他任务。实现 EKM 涉及使用供应商特定的库来配置
    SQL Server 和 HSM 单元之间的连接，本章不予涵盖。


    图 6-2 说明了本节讨论的不同加密配置，这些配置提供了默认自动密钥管理层次结构的替代方案。


    这些可能的加密配置中的每一种对提供的安全级别、密钥管理的难易程度以及访问和操作底层数据的性能影响都有不同的影响。要了解这些差异，有必要更详细地审视加密各个数据项的各种方法，这将在本章的下一部分中介绍。


    在继续之前，请运行以下代码清单以创建一个新的数据库和关联的 DMK：


    ```

    CREATE DATABASE ExpertSqlEncryption;

    GO

    USE ExpertSqlEncryption;

    GO

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''-=+I_aM-tH3-DMK_P45sW0rd+=-'';

    GO

    ```


    本章后续的所有示例都将使用此数据库。


    图 6-2\. 替代加密密钥管理结构（从左至右）：通过 EKM 保护的对称密钥；分层对称密钥；由受密码保护的证书加密的对称密钥；受密码而非 SMK 保护的
    DMK


    ### 数据保护与加密方法


    SQL Server 2008 提供了一系列加密方法，这些方法提供不同级别的保护，同时具有不同的相关性能和架构影响。我在此不试图详细描述每种方法的全部细节；对每种方法的详细描述感兴趣的读者应查阅专门讨论该主题的书籍，例如
    *Expert SQL Server 2008 Encryption*，作者 Michael Coles（Apress，2009）。不过，我将简要概述以下方法：


    - 哈希

    - 对称密钥加密

    - 非对称密钥加密

    - 透明数据加密


    ### 哈希


    哈希函数允许你对任何数据执行**单向**加密，并产生确定性的结果。

    '
- fmt: "# 第六章：加密\n\n## 哈希函数\n\n所谓“确定性”，我指的是哈希函数对给定的输入总会产生相同的输出。哈希本身可以说并不是一种真正的加密方法，因为一旦一个值被哈希，就无法反向过程来获得原始输入。然而，哈希方法常与加密结合使用，本章后续将会演示。\n\
    \nSQL Server 2008 提供了 `HASHBYTES` 函数，它使用多种标准哈希算法之一为任何提供的数据生成二进制哈希值。对于任何给定的输入 `x`，`HASHBYTES(x)`\
    \ 总是会产生相同的输出 `y`，但没有提供方法从结果值 `y` 中检索 `x`。图 6-3 展示了 `HASHBYTES` 函数的实际应用。\n\n`HASHBYTES`\
    \ 在需要比较两个安全值是否相同，而不关心其实际值的情况下非常有用：例如，用于验证登录应用程序的用户提供的密码是否与该用户的存储密码匹配。在这种情况下，不是直接比较两个值，而是可以比较每个值的哈希值；如果任意两个给定值相等，那么使用给定算法生成的它们的哈希值也会相同。\n\
    \n尽管哈希算法是确定性的，即给定输入值总会生成相同的哈希值，但从理论上讲，两个不同的源输入有可能共享相同的哈希值。这种被称为**哈希碰撞**的情况相对罕见，但从安全角度来看必须牢记。在一个完全安全的环境中，不能仅仅因为两个哈希值相等，就断定生成这些哈希值的原始值是相同的。\n\
    \n`HASHBYTES` 函数支持消息摘要（Message Digest，MD）算法 MD2、MD4、MD5，以及安全哈希算法（Secure Hash Algorithm，SHA）算法\
    \ SHA 和 SHA1。其中，SHA1 是最强的，除非有充分理由，否则应在所有情况下指定该算法。以下代码清单展示了使用 SHA1 算法对纯文本字符串进行哈希的\
    \ `HASHBYTES` 函数的结果：\n```sql\nSELECT HASHBYTES('SHA1', 'The quick brown fox jumped\
    \ over the lazy dog');\nGO\n```\n这种情况下生成的哈希值如下：\n```\n0xF6513640F3045E9768B239785625CAA6A2588842\n\
    ```\n*图 6-3. `HASHBYTES` 函数的实际应用*\n\n这个结果是完全可重复的——你可以根据需要多次执行前面的查询，并且总会得到相同的输出。哈希函数的这种确定性特性既是其最大的优点，也是其最大的缺点。\n\
    \n获得一致输出的优点是，从数据架构的角度来看，哈希数据可以像任何其他二进制数据一样被存储、索引和检索，这意味着对哈希数据的查询可以设计成以最小的查询重新设计来高效运行。然而，存在一种风险，即潜在的攻击者可以编译已知哈希值的字典（针对不同算法），并利用这些哈希值对你的数据进行反向查找，以尝试猜测源值。\n\
    \n当攻击者可以做出合理的假设以减少可能的源值列表时，这种风险变得更加现实。例如，在未强制执行密码强度的系统中，没有安全意识的用户通常会选择简短、简单的密码或常见单词的易预测变体。如果黑客获得了一个使用\
    \ MD5 算法生成的此类密码哈希值的数据集，他们只需查找 `0x2AC9CB7DC02B3C0083EB70898E549B63` 的出现，即可识别所有选择使用“Password1”作为密码的用户。\n\
    \n通过在对纯文本进行哈希之前添加一个秘密的**盐值**，可以使哈希更安全，本章后续将展示这一点。\n\n## 对称密钥加密\n\n对称密钥加密方法使用同一个密钥来执行数据的加密和解密。如图\
    \ 6-4 所示。\n\n*图 6-4. 对称密钥加密*\n\n与确定性的哈希不同，对称加密是一个非确定性过程。也就是说，即使每次使用相同的密钥加密，对同一数据项在不同场合进行加密也会得到不同的结果。\n\
    \nSQL Server 2008 支持多种常见的对称加密算法，包括三重数据加密标准（Triple DES），以及基于高级加密标准（Advanced Encryption\
    \ Standard, AES）的 128 位、192 位和 256 位密钥。\n\n支持的最强对称密钥是 AES256。\n\n对称密钥本身可以由证书、密码、非对称密钥或另一个对称密钥来保护，也可以由外部的\
    \ EKM 提供程序在 SQL Server 外进行保护。\n\n以下示例展示了如何创建一个新的、受密码保护的对称密钥 `SymKey1`：\n```sql\n\
    CREATE SYMMETRIC KEY SymKey1\nWITH ALGORITHM = AES_256\nENCRYPTION BY PASSWORD\
    \ = '5yMm3tr1c_K3Y_P@$$w0rd!';\nGO\n```\n> **注意** 默认情况下，使用 `CREATE SYMMETRIC KEY`\
    \ 语句创建的对称密钥是随机生成的。\n\n如果要生成特定的、可重现的密钥，则必须在生成密钥时显式指定 `KEY_SOURCE` 和 `IDENTITY_VALUE`\
    \ 选项，如下所示：\n```sql\nCREATE SYMMETRIC KEY StaticKey\nWITH\n    KEY_SOURCE = '#K3y_50urc£#',\n\
    \    IDENTITY_VALUE = '-=1d3nt1ty_VA1uE!=-',\n    ALGORITHM = TRIPLE_DES\nENCRYPTION\
    \ BY PASSWORD = 'P@55w0rD';\n```\n\n要使用对称密钥加密数据，必须首先打开该密钥。由于 `SymKey1` 受密码保护，要打开此密钥，必须使用\
    \ `OPEN SYMMETRIC KEY DECRYPTION BY PASSWORD` 语法提供关联的密码。打开密钥后，可以通过将要加密的纯文本连同对称密钥的\
    \ GUID 一起提供给 `ENCRYPTBYKEY` 方法来加密数据。\n\n使用完密钥后，应使用 `CLOSE SYMMETRIC KEY` 再次关闭它（如果未能显式关闭任何打开的对称密钥，它们将在会话结束时自动关闭）。这些步骤在下面的代码清单中说明：\n\
    ```sql\n-- 打开密钥\nOPEN SYMMETRIC KEY SymKey1\nDECRYPTION BY PASSWORD = '5yMm3tr1c_K3Y_P@$$w0rd!';\n\
    \n-- 声明要加密的明文\nDECLARE @Secret nvarchar(255) = 'This is my secret message';\n\n\
    -- 加密消息\nSELECT ENCRYPTBYKEY(KEY_GUID(N'SymKey1'), @secret);\n\n-- 再次关闭密钥\nCLOSE\
    \ SYMMETRIC KEY SymKey1;\nGO\n```\n上述代码清单的结果是一个加密的二进制值，例如：\n```\n0x007937851F763944BD71F451E4E50D520100000097A76AED7AD1BD77E04A4BE68404AA3B48FF6179A\n\
    D9FD74E10EE8406CC489D7CD8407F7EC34A879BB34BA9AF9D6887D1DD2C835A71B760A527B0859D47B3\n\
    8EED\n```\n> **注意** 请记住，加密是一个非确定性过程，因此你获得的结果会与刚才显示的不同。\n\n使用对称密钥解密已加密的数据遵循与加密类似的过程，但使用\
    \ `DECRYPTBYKEY` 方法而不是 `ENCRYPTBYKEY` 方法。另一个需要注意的区别是，`DECRYPTBYKEY` 唯一需要的参数是要解密的密文；无需指定用于加密数据的对称密钥的\
    \ GUID，因为该值作为加密数据的一部分被存储。\n\n以下代码清单说明了如何解密上一个示例中用对称密钥加密的数据：\n```sql\nOPEN SYMMETRIC\
    \ KEY SymKey1\nDECRYPTION BY PASSWORD = '5yMm3tr1c_K3Y_P@$$w0rd!';\n\nDECLARE\
    \ @Secret nvarchar(255) = 'This is my secret message';\nDECLARE @Encrypted varbinary(max);\n\
    SET @Encrypted = ENCRYPTBYKEY(KEY_GUID(N'SymKey1'), @secret);\n\nSELECT CAST(DECRYPTBYKEY(@Encrypted)\
    \ AS nvarchar(255));\n\nCLOSE SYMMETRIC KEY SymKey1;\nGO\n```\n这将检索到原始的纯文本消息：\n\
    ```\nThis is my secret message\n```"
  raw: 'By “deterministic,” I mean that a given input into the hashing function will
    always produce the same output. Hashing, in itself, is arguably not a true method
    of encryption, because once a value has been hashed there is no way to reverse
    the process to obtain the original input. However, hashing methods are often used
    in conjunction with encryption, as will be demonstrated later in this chapter.


    SQL Server 2008 provides the HASHBYTES function, which produces a binary hash
    of any supplied data using one of a number of standard hashing algorithms. For
    any given input *x*, HASHBYTES( *x*) will always produce the same output *y*,
    but there is no method provided to retrieve *x* from the resulting value *y*.
    Figure 6-3 illustrates the HASHBYTES function in action.


    HASHBYTES is useful in situations where you need to compare whether two secure
    values are the same, but when you are not concerned with what the actual values
    are: for example, to verify that the password supplied by a user logging into
    an application matches the stored password for that user. In such cases, instead
    of comparing the two values directly, you can compare the hashes of each value;
    if any two given values are equal, then the hashes of those values produced using
    a given algorithm will also be the same.


    Although hash algorithms are deterministic, so that a given input value will always
    generate the same hash, it is theoretically possible that two different source
    inputs will share the same hash. Such occurrences, known as **hash collisions**,
    are relatively rare but important to bear in mind from a security point of view.
    In a totally secure environment, you cannot be certain that simply because two
    hashes are equal, the values that generated those hashes were the same.


    The HASHBYTES function supports the Message Digest (MD) algorithms MD2, MD4, MD5,
    and the Secure Hash Algorithm (SHA) algorithms SHA, and SHA1\. Of these, SHA1
    is the strongest, and is the algorithm you should specify in all cases unless
    you have a good reason otherwise. The following code listing illustrates the result
    of the HASHBYTES function used to hash a plain text string using the SHA1 algorithm:
    SELECT HASHBYTES(''SHA1'', ''The quick brown fox jumped over the lazy dog'');


    GO


    The hash generated in this case is as follows:


    0xF6513640F3045E9768B239785625CAA6A2588842


    *Figure 6-3\. The HASHBYTES function in action*


    This result is entirely repeatable—you can execute the preceding query as many
    times as you want and you will always receive the same output. This deterministic
    property of hash functions is both their greatest strength and their greatest
    weakness.


    CHAPTER 6 „ ENCRYPTION


    The advantage of obtaining consistent output is that, from a data architecture
    point of view, hashed data can be stored, indexed, and retrieved just like any
    other binary data, meaning that queries of hashed data can be designed to operate
    efficiently with a minimum amount of query redesign. However, there is a risk
    that potential attackers can compile a dictionary of known hashes for different
    algorithms and use these to perform reverse-lookups against your data in order
    to try to guess the source values.


    This risk becomes even more plausible in cases where attackers can make reasonable
    assumptions in order to reduce the list of likely source values. For example,
    in systems where password strength is not enforced, users who are not security-minded
    typically choose short, simple passwords or easily predicted variations on common
    words. If a hacker were to obtain a dataset containing hashes of such passwords
    generated using the MD5 algorithm, they would only have to search for occurrences
    of 0x2AC9CB7DC02B3C0083EB70898E549B63 to identify all those users who had chosen
    to use “Password1” as their password, for example.


    Hashes can be made more secure by adding a secret **salt** value to the plain
    text prior to hashing, as will be shown later in this chapter.


    Symmetric Key Encryption


    Symmetric key encryption methods use the same single key to perform both encryption
    and decryption of data. This is illustrated in Figure 6-4.


    *Figure 6-4\. Symmetric key encryption*


    Unlike hashing, which is deterministic, symmetric encryption is a nondeterministic
    process. That is to say, you will obtain different results from encrypting the
    same item of data on different occasions, even if it is encrypted with the same
    key each time.


    SQL Server 2008 supports a number of common symmetric encryption algorithms, including
    Triple DES, and keys with bit lengths of 128, 192, and 256 based on the Advanced
    Encryption Standard (AES).


    The strongest symmetric key supported is AES256.


    Symmetric keys themselves can be protected either by a certificate, password,
    asymmetric key, or another symmetric key, or they can be protected outside SQL
    Server by an EKM provider.


    The following example illustrates how to create a new symmetric key, SymKey1,
    that is protected by a password:


    CREATE SYMMETRIC KEY SymKey1


    WITH ALGORITHM = AES_256


    ENCRYPTION BY PASSWORD = ''5yMm3tr1c_K3Y_P@$$w0rd!'';


    GO


    CHAPTER 6 „ ENCRYPTION


    „ **Note** By default, symmetric keys created using the CREATE SYMMETRIC KEY statement
    are randomly generated.


    If you want to generate a specific, reproduceable key, you must explicitly specify
    the KEY_SOURCE and IDENTITY_VALUE options when the key is generated, such as follows:
    CREATE SYMMETRIC KEY StaticKey WITH


    KEY_SOURCE = ‘#K3y_50urc£#’, IDENTITY_VALUE = ‘-=1d3nt1ty_VA1uE!=-’, ALGORITHM
    = TRIPLE_DES


    ENCRYPTION BY PASSWORD = ‘P@55w0rD’;


    To encrypt data using a symmetric key, you must first open the key. Since SymKey1
    is protected by a password, to open this key you must provide the associated password
    using the OPEN SYMMETRIC KEY


    DECRYPTION BY PASSWORD syntax. Having opened the key, you can use it to encrypt
    data by providing the plain text to be encrypted, together with the GUID of the
    symmetric key, to the ENCRYPTBYKEY method.


    Once you are finished using the key, you should close it again using CLOSE SYMMETRIC
    KEY (if you fail to explicitly close any open symmetric keys, they will automatically
    be closed at the end of a session). These steps are illustrated in the following
    code listing:


    -- Open the key


    OPEN SYMMETRIC KEY SymKey1


    DECRYPTION BY PASSWORD = ''5yMm3tr1c_K3Y_P@$$w0rd!'';


    -- Declare the cleartext to be encrypted


    DECLARE @Secret nvarchar(255) = ''This is my secret message'';


    -- Encrypt the message


    SELECT ENCRYPTBYKEY(KEY_GUID(N''SymKey1''), @secret);


    -- Close the key again


    CLOSE SYMMETRIC KEY SymKey1;


    GO


    The result of the preceding code listing is an encrypted binary value, such as
    that shown following: 0x007937851F763944BD71F451E4E50D520100000097A76AED7AD1BD77E04A4BE68404AA3B48FF6179A


    D9FD74E10EE8406CC489D7CD8407F7EC34A879BB34BA9AF9D6887D1DD2C835A71B760A527B0859D47B3


    8EED


    „ **Note** Remember that encryption is a nondeterministic process, so the results
    that you obtain will differ from those just shown.


    Decrypting data that has been encrypted using a symmetric key follows a similar
    process as for encryption, but using the DECRYPTBYKEY method rather than the ENCRYPTBYKEY
    method. A further difference to note is that the only parameter required by DECRYPTBYKEY
    is the ciphertext to be decrypted; 131


    CHAPTER 6 „ ENCRYPTION


    there is no need to specify the GUID of the symmetric key that was used to encrypt
    the data, as this value is stored as part of the encrypted data itself.


    The following code listing illustrates how to decrypt the data encrypted with
    a symmetric key in the previous example:


    OPEN SYMMETRIC KEY SymKey1


    DECRYPTION BY PASSWORD = ''5yMm3tr1c_K3Y_P@$$w0rd!'';


    DECLARE @Secret nvarchar(255) = ''This is my secret message'';


    DECLARE @Encrypted varbinary(max);


    SET @Encrypted = ENCRYPTBYKEY(KEY_GUID(N''SymKey1''),@secret);


    SELECT CAST(DECRYPTBYKEY(@Encrypted) AS nvarchar(255));


    CLOSE SYMMETRIC KEY SymKey1;


    GO


    This results in the original plain text message being retrieved:


    This is my secret message'
  trans: "# 第六章：加密\n\n## 哈希函数\n\n所谓“确定性”，我指的是哈希函数对给定的输入总会产生相同的输出。哈希本身可以说并不是一种真正的加密方法，因为一旦一个值被哈希，就无法反向过程来获得原始输入。然而，哈希方法常与加密结合使用，本章后续将会演示。\n\
    \nSQL Server 2008 提供了 `HASHBYTES` 函数，它使用多种标准哈希算法之一为任何提供的数据生成二进制哈希值。对于任何给定的输入 `x`，`HASHBYTES(x)`\
    \ 总是会产生相同的输出 `y`，但没有提供方法从结果值 `y` 中检索 `x`。图 6-3 展示了 `HASHBYTES` 函数的实际应用。\n\n`HASHBYTES`\
    \ 在需要比较两个安全值是否相同，而不关心其实际值的情况下非常有用：例如，用于验证登录应用程序的用户提供的密码是否与该用户的存储密码匹配。在这种情况下，不是直接比较两个值，而是可以比较每个值的哈希值；如果任意两个给定值相等，那么使用给定算法生成的它们的哈希值也会相同。\n\
    \n尽管哈希算法是确定性的，即给定输入值总会生成相同的哈希值，但从理论上讲，两个不同的源输入有可能共享相同的哈希值。这种被称为**哈希碰撞**的情况相对罕见，但从安全角度来看必须牢记。在一个完全安全的环境中，不能仅仅因为两个哈希值相等，就断定生成这些哈希值的原始值是相同的。\n\
    \n`HASHBYTES` 函数支持消息摘要（Message Digest，MD）算法 MD2、MD4、MD5，以及安全哈希算法（Secure Hash Algorithm，SHA）算法\
    \ SHA 和 SHA1。其中，SHA1 是最强的，除非有充分理由，否则应在所有情况下指定该算法。以下代码清单展示了使用 SHA1 算法对纯文本字符串进行哈希的\
    \ `HASHBYTES` 函数的结果：\n```sql\nSELECT HASHBYTES('SHA1', 'The quick brown fox jumped\
    \ over the lazy dog');\nGO\n```\n这种情况下生成的哈希值如下：\n```\n0xF6513640F3045E9768B239785625CAA6A2588842\n\
    ```\n*图 6-3. `HASHBYTES` 函数的实际应用*\n\n这个结果是完全可重复的——你可以根据需要多次执行前面的查询，并且总会得到相同的输出。哈希函数的这种确定性特性既是其最大的优点，也是其最大的缺点。\n\
    \n获得一致输出的优点是，从数据架构的角度来看，哈希数据可以像任何其他二进制数据一样被存储、索引和检索，这意味着对哈希数据的查询可以设计成以最小的查询重新设计来高效运行。然而，存在一种风险，即潜在的攻击者可以编译已知哈希值的字典（针对不同算法），并利用这些哈希值对你的数据进行反向查找，以尝试猜测源值。\n\
    \n当攻击者可以做出合理的假设以减少可能的源值列表时，这种风险变得更加现实。例如，在未强制执行密码强度的系统中，没有安全意识的用户通常会选择简短、简单的密码或常见单词的易预测变体。如果黑客获得了一个使用\
    \ MD5 算法生成的此类密码哈希值的数据集，他们只需查找 `0x2AC9CB7DC02B3C0083EB70898E549B63` 的出现，即可识别所有选择使用“Password1”作为密码的用户。\n\
    \n通过在对纯文本进行哈希之前添加一个秘密的**盐值**，可以使哈希更安全，本章后续将展示这一点。\n\n## 对称密钥加密\n\n对称密钥加密方法使用同一个密钥来执行数据的加密和解密。如图\
    \ 6-4 所示。\n\n*图 6-4. 对称密钥加密*\n\n与确定性的哈希不同，对称加密是一个非确定性过程。也就是说，即使每次使用相同的密钥加密，对同一数据项在不同场合进行加密也会得到不同的结果。\n\
    \nSQL Server 2008 支持多种常见的对称加密算法，包括三重数据加密标准（Triple DES），以及基于高级加密标准（Advanced Encryption\
    \ Standard, AES）的 128 位、192 位和 256 位密钥。\n\n支持的最强对称密钥是 AES256。\n\n对称密钥本身可以由证书、密码、非对称密钥或另一个对称密钥来保护，也可以由外部的\
    \ EKM 提供程序在 SQL Server 外进行保护。\n\n以下示例展示了如何创建一个新的、受密码保护的对称密钥 `SymKey1`：\n```sql\n\
    CREATE SYMMETRIC KEY SymKey1\nWITH ALGORITHM = AES_256\nENCRYPTION BY PASSWORD\
    \ = '5yMm3tr1c_K3Y_P@$$w0rd!';\nGO\n```\n> **注意** 默认情况下，使用 `CREATE SYMMETRIC KEY`\
    \ 语句创建的对称密钥是随机生成的。\n\n如果要生成特定的、可重现的密钥，则必须在生成密钥时显式指定 `KEY_SOURCE` 和 `IDENTITY_VALUE`\
    \ 选项，如下所示：\n```sql\nCREATE SYMMETRIC KEY StaticKey\nWITH\n    KEY_SOURCE = '#K3y_50urc£#',\n\
    \    IDENTITY_VALUE = '-=1d3nt1ty_VA1uE!=-',\n    ALGORITHM = TRIPLE_DES\nENCRYPTION\
    \ BY PASSWORD = 'P@55w0rD';\n```\n\n要使用对称密钥加密数据，必须首先打开该密钥。由于 `SymKey1` 受密码保护，要打开此密钥，必须使用\
    \ `OPEN SYMMETRIC KEY DECRYPTION BY PASSWORD` 语法提供关联的密码。打开密钥后，可以通过将要加密的纯文本连同对称密钥的\
    \ GUID 一起提供给 `ENCRYPTBYKEY` 方法来加密数据。\n\n使用完密钥后，应使用 `CLOSE SYMMETRIC KEY` 再次关闭它（如果未能显式关闭任何打开的对称密钥，它们将在会话结束时自动关闭）。这些步骤在下面的代码清单中说明：\n\
    ```sql\n-- 打开密钥\nOPEN SYMMETRIC KEY SymKey1\nDECRYPTION BY PASSWORD = '5yMm3tr1c_K3Y_P@$$w0rd!';\n\
    \n-- 声明要加密的明文\nDECLARE @Secret nvarchar(255) = 'This is my secret message';\n\n\
    -- 加密消息\nSELECT ENCRYPTBYKEY(KEY_GUID(N'SymKey1'), @secret);\n\n-- 再次关闭密钥\nCLOSE\
    \ SYMMETRIC KEY SymKey1;\nGO\n```\n上述代码清单的结果是一个加密的二进制值，例如：\n```\n0x007937851F763944BD71F451E4E50D520100000097A76AED7AD1BD77E04A4BE68404AA3B48FF6179A\n\
    D9FD74E10EE8406CC489D7CD8407F7EC34A879BB34BA9AF9D6887D1DD2C835A71B760A527B0859D47B3\n\
    8EED\n```\n> **注意** 请记住，加密是一个非确定性过程，因此你获得的结果会与刚才显示的不同。\n\n使用对称密钥解密已加密的数据遵循与加密类似的过程，但使用\
    \ `DECRYPTBYKEY` 方法而不是 `ENCRYPTBYKEY` 方法。另一个需要注意的区别是，`DECRYPTBYKEY` 唯一需要的参数是要解密的密文；无需指定用于加密数据的对称密钥的\
    \ GUID，因为该值作为加密数据的一部分被存储。\n\n以下代码清单说明了如何解密上一个示例中用对称密钥加密的数据：\n```sql\nOPEN SYMMETRIC\
    \ KEY SymKey1\nDECRYPTION BY PASSWORD = '5yMm3tr1c_K3Y_P@$$w0rd!';\n\nDECLARE\
    \ @Secret nvarchar(255) = 'This is my secret message';\nDECLARE @Encrypted varbinary(max);\n\
    SET @Encrypted = ENCRYPTBYKEY(KEY_GUID(N'SymKey1'), @secret);\n\nSELECT CAST(DECRYPTBYKEY(@Encrypted)\
    \ AS nvarchar(255));\n\nCLOSE SYMMETRIC KEY SymKey1;\nGO\n```\n这将检索到原始的纯文本消息：\n\
    ```\nThis is my secret message\n```"
- fmt: '# 加密功能


    ## 使用密码进行加密


    有时，您可能希望在不处理创建和安全存储永久对称密钥相关问题的情况下加密数据。在这种情况下，`ENCRYPTBYPASSPHRASE`函数可能会很有用。


    `ENCRYPTBYPASSPHRASE`根据提供的密码值，使用 Triple DES 算法生成对称密钥，并使用该密钥加密提供的明文字符串。此方法的主要好处是它不需要创建或存储任何密钥或证书；当需要解密数据时，只需向`DECRYPTBYPASSPHRASE`方法提供相同的密码，该方法即可生成相同的对称密钥来解密密文。密钥本身在任何时候都不会被存储，仅在需要时临时生成。


    要使用密码短语加密数据，请将密码短语后跟一个明文字符串作为参数提供给`ENCRYPTBYPASSPHRASE`函数，如下所示：


    ```sql

    SELECT ENCRYPTBYPASSPHRASE(''PassPhrase'', ''My Other Secret Message'');


    GO

    ```


    当我运行此代码清单时，我得到了如下所示的二进制值。但请记住，`ENCRYPTBYPASSPHRASE`使用非确定性对称加密，因此每次执行此查询时都会获得不同的结果。


    `0x010000007A65B54B1797E637F3F018C4100468B115CB5B88BEA1A7C36432B0B93B8F616AC8D3BA7307D5005E`


    要再次解密数据，请将相同的密码短语和加密后的文本传递到`DECRYPTBYPASSPHRASE`函数中。与 SQL Server 提供的所有非对称和对称加密方法一样，解密后的结果数据以`varbinary`数据类型返回，可能需要转换为适合您应用程序的格式。在本例中，将结果转换为`varchar`即可返回原始明文字符串：


    ```sql

    SELECT CAST(DECRYPTBYPASSPHRASE(''PassPhrase'',

    0x010000007A65B54B1797E637F3F018C4100468B115CB5B88BEA1A7C36432B0B93B8F616AC8D3BA7307D5005E)
    AS varchar(32));


    GO

    -- 结果: My Other Secret Message

    ```


    如演示所示，`ENCRYPTBYPASSPHRASE`是一种非常简单的实现对称加密的方法，无需处理密钥管理相关问题。然而，它也并非没有缺点：


    首先，由`ENCRYPTBYPASSPHRASE`生成的密文只能在使用用于加密它的密码短语时才能解密。这看似显而易见，但请记住 SQL Server 没有提供备份或重新创建密码短语的机制，因此，如果密码短语丢失，原始数据将永远无法恢复。这意味着您需要考虑如何安全地备份密码短语的策略；如果存储访问数据所需的唯一知识（密码短语）的地方是公开可访问的，那么加密数据就没有多大意义。


    其次，`ENCRYPTBYPASSPHRASE`函数总是使用 Triple DES 算法加密数据。尽管这是一个广为人知且广泛使用的标准，但某些业务需求或客户规范可能要求更强的加密算法，例如基于
    AES 的算法。虽然 SQL Server 2008 可以创建比特长度为 128、192 和 256 的 AES 对称密钥，但这些不能被`ENCRYPTBYPASSPHRASE`使用。


    对称密钥的强度完全取决于生成它的密码短语，但 SQL Server 不会对提供给`ENCRYPTBYPASSPHRASE`的密码短语施加任何密码复杂性要求。这可能导致基于选择不当的密钥而产生的弱加密强度。


    提供的明文只能是`varchar`或`nvarchar`类型（尽管通过先将任何其他数据类型进行`CAST`转换，可以比较容易地克服此限制）。


    尽管存在这些弱点，`ENCRYPTBYPASSPHRASE`在某些情况下仍然是一个有用的选择，例如当需要加密来自`sysadmin`和`db_owner`角色用户的数据时。有关此主题的更多信息，请参阅题为“保护信息不被
    DBA 访问”的侧栏。


    ## 保护信息不被 DBA 访问


    最近企业 IT 部门外包或离岸外包的趋势，加上关于谁应被允许访问敏感数据的日益严格的法规，意味着限制对敏感数据的访问（即使是来自`sysadmin`和`db_owner`角色的用户）已成为一个日益普遍的需求。


    DBA 拥有查看、插入、更新和删除任何数据库表中数据的权限，任何处于`sysadmin`角色的 DBA 都控制着 SQL Server 实例上的每个密钥和证书。那么，如何设计数据库架构来保护数据不被这些用户访问呢？任何依赖于自动密钥管理层次结构的解决方案都将不起作用；唯一的方法是依赖一个对这些用户保密的密码。这个密码可以与`ENCRYPTBYPASSPHRASE`函数一起使用，也可以用来保护一个证书或非对称密钥，而该证书或密钥又保护了加密数据的对称密钥。


    即便如此，也需要注意风险；`sysadmin`仍然可以`DROP`任何密钥，并且您必须确保在提供密码时，采用安全的方式，使其在通过网络传递或通过数据库分析工具检测时无法被发现。


    ## 非对称密钥加密


    非对称加密是使用一对相关的密钥执行的：**公钥**用于加密数据，相关的**私钥**用于解密生成的密文。非对称密钥对的公钥和私钥是相关的，但它们之间的数学关系足够复杂，以至于无法从已知的一个密钥推导出另一个密钥。图
    6-5 说明了非对称加密模型。


    图 6-5. 非对称密钥加密


    除了非对称密钥对，非对称加密也可以使用**证书**实现。基于 X.509 标准的证书用于将公钥绑定到有权使用关联密钥加密数据的给定身份。证书可以由第三方认证机构（CA）颁发，也可以在
    SQL Server 2008 内部创建自签名证书。自签名证书在上一章中用于演示为存储过程分配权限的一种方法。


    证书加密和非对称密钥加密使用相同的算法，并且假设密钥长度相同，则提供完全相同的加密强度。对于 SQL Server 中处理非对称密钥加密的每种方法，都有一个等效的方法为证书加密提供相同的功能。


    ## 非对称密钥还是证书？


    证书和非对称密钥加密都使用相同的、广泛使用的 RSA 算法。假设密钥长度相同，证书和非对称加密将提供相同的加密强度，并且两种类型可用的功能之间没有显著差异。那么，应该选择哪一个呢？


    决策可能受到您选择在 SQL Server 内部生成密钥还是从外部来源生成密钥的影响。SQL Server 中的自签名证书密钥长度只能是 1024 位，而非对称密钥可以创建私钥长度为
    512、1024 或 2048 位的更强密钥。


    但是，非对称密钥和证书都可以从外部来源导入，在这种情况下，密钥长度最高可达 3456 位。


    我推荐使用证书进行非对称加密，而不是非对称密钥对，因为证书允许在密钥旁边存储额外的元数据（例如过期日期），并且证书可以使用`BACKUP CERTIFICATE`命令轻松备份到
    CER 文件，而非对称密钥对却奇怪地缺乏提供等效功能的方法。'
  raw: 'On occasions, you may wish to encrypt data without having to deal with the
    issues associated with creating and securely storing a permanent symmetric key.
    In such cases, the ENCRYPTBYPASSPHRASE


    function may prove useful.


    ENCRYPTBYPASSPHRASE generates a symmetric key using the Triple DES algorithm based
    on the value of a supplied password, and uses that key to encrypt a supplied plain
    text string. The main benefit of this method is that it does not require the creation
    or storage of any keys or certificates; when the data needs to be decrypted, you
    simply supply the same password to the DECRYPTBYPASSPHRASE method, which enables
    the identical symmetric key to be generated to decrypt the ciphertext. The key
    itself is never stored at any point, and is only generated transiently as and
    when it is required.


    To encrypt data using a passphrase, supply a passphrase followed by a clear text
    string to the ENCRYPTBYPASSPHRASE function as follows:


    SELECT ENCRYPTBYPASSPHRASE(''PassPhrase'', ''My Other Secret Message'');


    GO


    When I ran this code listing, I obtained the binary value shown following. However,
    remember that ENCRYPTBYPASSPHRASE uses nondeterministic symmetric encryption,
    so you will obtain different results every time you execute this query.


    0x010000007A65B54B1797E637F3F018C4100468B115CB5B88BEA1A7C36432B0B93B8F616AC8D3BA7307D5005E


    To decrypt the data again, pass the same passphrase and the encrypted text into
    the


    DECRYPTBYPASSPHRASE function. As with all the asymmetric and symmetric encryption
    methods provided by SQL Server, the resulting decrypted data is returned using
    the varbinary datatype, and may need to 132


    CHAPTER 6 „ ENCRYPTION


    be converted into the appropriate format for your application. In this case, CASTing
    the result to a varchar returns the original plain text string:


    SELECT CAST(DECRYPTBYPASSPHRASE(''PassPhrase'',


    0x010000007A65B54B1797E637F3F018C4100468B115CB5B88BEA1A7C36432B0B93B8F616AC8D3BA7307


    D5005E) AS varchar(32));


    GO


    My Other Secret Message


    As demonstrated, ENCRYPTBYPASSPHRASE is a very simple method of implementing symmetric


    encryption without the issues associated with key management. However, it is not
    without its drawbacks:


    Firstly, ciphertext generated by ENCRYPTBYPASSPHRASE can be decrypted only when


    used in conjunction with the passphrase used to encrypt it. This may seem like
    an


    obvious point, but bear in mind that SQL Server provides no mechanism for


    backing up or recreating the passphrase, so, if it is ever lost, the original
    data can


    never be restored. This means that you need to consider strategies for how to


    backup the passphrase in a secure manner; there is not much point encrypting


    your data if the passphrase containing the only knowledge required to access that


    data is stored in an openly accessible place.


    Secondly, the ENCRYPTBYPASSPHRASE function always encrypts data using the Triple


    DES algorithm. Although this is a well-recognized and widely used standard, some


    business requirements or client specifications may require stronger encryption


    algorithms, such as those based on AES. Although AES symmetric keys of bit


    lengths 128, 192, and 256 may be created in SQL Server 2008, these cannot be used


    by ENCRYPTBYPASSPHRASE.


    The strength of the symmetric key is entirely dependent on the passphrase from


    which it is generated, but SQL Server does not enforce any degree of password


    complexity on the passphrase supplied to ENCRYPTBYPASSPHRASE. This may lead to


    weak encryption strength based on a poorly chosen key.


    The supplied clear text can only be varchar or nvarchar type (although this


    limitation is fairly easily overcome by CASTing any other datatype prior to


    encryption).


    Despite these weaknesses, ENCRYPTBYPASSPHRASE can still be a useful choice in
    certain situations, such as when it is necessary to encrypt data from users in
    the sysadmin and db_owner roles. See the sidebar entitled “Protecting Information
    from the DBA” for more information on this topic.


    CHAPTER 6 „ ENCRYPTION


    **Protecting Information from the DBA**


    The recent trend in outsourcing or offshoring of corporate IT departments, combined
    with ever more stringent regulations about who should be allowed access to sensitive
    data, has meant that it is an increasingly common requirement to restrict access
    to sensitive data, even from those users in the sysadmin and db_owner roles.


    DBAs have permissions to view, insert, update, and delete data from any database
    table, and any DBAs in the sysadmin role have control over every key and certificate
    held on a SQL Server instance. How then do you design database architecture that
    secures data from these users? Any solution that relies upon the automatic key
    management hierarchy will not work; the only approach is to rely on a password
    that is kept secret from these users. This password can either be used with the
    ENCRYPTBYPASSPHRASE function, or it can be used to secure a certificate or asymmetric
    key that protects the symmetric key with which the data is encrypted.


    Even then, there are risks to be aware of; the sysadmin can still DROP any keys,
    and you must ensure that whenever the password is supplied, it is done so in a
    secure manner that cannot be detected as it passes across the network or by profiling
    of the database.


    Asymmetric Key Encryption


    Asymmetric encryption is performed using a pair of related keys: the **public
    key** is used to encrypt data, and the associated **private key** is used to decrypt
    the resulting ciphertext. The public and private keys of an asymmetric key pair
    are related, but the mathematical relationship between them is sufficiently complex
    that it is not feasible to derive one key from knowledge of the other. Figure
    6-5 illustrates the asymmetric encryption model.


    *Figure 6-5\. Asymmetric key encryption*


    In addition to asymmetric key pairs, asymmetric encryption may also be implemented
    using a


    **certificate**. Certificates based on the X.509 standard are used to bind a public
    key to a given identity entitled to encrypt data using the associated key. Certificates
    may be issued by a third-party certification authority (CA), and self-signed certificates
    can be created within SQL Server 2008 itself. Self-signed 134


    CHAPTER 6 „ ENCRYPTION


    certificates were used in the last chapter to demonstrate one method of assigning
    permissions to stored procedures.


    Encryption by certificate and encryption by asymmetric key use the same algorithm
    and, assuming equal key length, provide exactly the same encryption strength.
    For every method that deals with asymmetric key encryption in SQL Server, an equivalent
    method provides the same functionality for certificate encryption.


    **Asymmetric Keys or Certificates?**


    Certificate and asymmetric key encryption both use the same widely used RSA algorithm.
    Assuming equal key length, certificate and asymmetric encryption will provide
    the same encryption strength, and there are no significant differences between
    the functionality available with either type. So, which should you choose?


    The decision may be influenced by whether you choose to generate the key within
    SQL Server itself or from an outside source. Self-signed certificates in SQL Server
    can only have a key length of 1024 bits, whereas stronger asymmetric keys may
    be created with a private key length of 512, 1024, or 2048 bits.


    However, asymmetric keys and certificates may both be imported from external sources,
    in which case the key length may be up to 3456 bits.


    I recommend asymmetric encryption using certificates rather than asymmetric key
    pairs, as certificates allow for additional metadata to be stored alongside the
    key (such as expiry dates), and certificates can easily be backed up to a CER
    file using the BACKUP CERTIFICATE command, whereas a method to provide the equivalent
    functionality for an asymmetric key pair is strangely lacking.'
  trans: '

    # 加密功能


    ## 使用密码短语进行加密


    有时，您可能希望在不处理创建和安全存储永久对称密钥相关问题的情况下加密数据。在这种情况下，`ENCRYPTBYPASSPHRASE`函数可能会很有用。


    `ENCRYPTBYPASSPHRASE`根据提供的密码短语，使用 Triple DES 算法生成对称密钥，并使用该密钥加密提供的明文字符串。此方法的主要好处是它不需要创建或存储任何密钥或证书；当需要解密数据时，只需向`DECRYPTBYPASSPHRASE`方法提供相同的密码短语，该方法即可生成相同的对称密钥来解密密文。密钥本身在任何时候都不会被存储，仅在需要时临时生成。


    要使用密码短语加密数据，请将密码短语后跟一个明文字符串作为参数提供给`ENCRYPTBYPASSPHRASE`函数，如下所示：


    ```sql

    SELECT ENCRYPTBYPASSPHRASE(''PassPhrase'', ''My Other Secret Message'');


    GO

    ```


    当我运行此代码清单时，我得到了如下所示的二进制值。但请记住，`ENCRYPTBYPASSPHRASE`使用非确定性对称加密，因此每次执行此查询时都会获得不同的结果。


    `0x010000007A65B54B1797E637F3F018C4100468B115CB5B88BEA1A7C36432B0B93B8F616AC8D3BA7307D5005E`


    要再次解密数据，请将相同的密码短语和加密后的文本传递到`DECRYPTBYPASSPHRASE`函数中。与 SQL Server 提供的所有非对称和对称加密方法一样，解密后的结果数据以`varbinary`数据类型返回，可能需要转换为适合您应用程序的格式。在本例中，将结果转换为`varchar`即可返回原始明文字符串：


    ```sql

    SELECT CAST(DECRYPTBYPASSPHRASE(''PassPhrase'',

    0x010000007A65B54B1797E637F3F018C4100468B115CB5B88BEA1A7C36432B0B93B8F616AC8D3BA7307D5005E)
    AS varchar(32));


    GO

    -- 结果: My Other Secret Message

    ```


    如演示所示，`ENCRYPTBYPASSPHRASE`是一种非常简单的实现对称加密的方法，无需处理密钥管理相关问题。然而，它也并非没有缺点：


    首先，由`ENCRYPTBYPASSPHRASE`生成的密文只能在使用用于加密它的密码短语时才能解密。这看似显而易见，但请记住 SQL Server 没有提供备份或重新创建密码短语的机制，因此，如果密码短语丢失，原始数据将永远无法恢复。这意味着您需要考虑如何安全地备份密码短语的策略；如果存储访问数据所需的唯一知识（密码短语）的地方是公开可访问的，那么加密数据就没有多大意义。


    其次，`ENCRYPTBYPASSPHRASE`函数总是使用 Triple DES 算法加密数据。尽管这是一个广为人知且广泛使用的标准，但某些业务需求或客户规范可能要求更强的加密算法，例如基于
    AES 的算法。虽然 SQL Server 2008 可以创建比特长度为 128、192 和 256 的 AES 对称密钥，但这些不能被`ENCRYPTBYPASSPHRASE`使用。


    对称密钥的强度完全取决于生成它的密码短语，但 SQL Server 不会对提供给`ENCRYPTBYPASSPHRASE`的密码短语施加任何密码复杂性要求。这可能导致基于选择不当的密钥而产生的弱加密强度。


    提供的明文只能是`varchar`或`nvarchar`类型（尽管通过先将任何其他数据类型进行`CAST`转换，可以比较容易地克服此限制）。


    尽管存在这些弱点，`ENCRYPTBYPASSPHRASE`在某些情况下仍然是一个有用的选择，例如当需要加密来自`sysadmin`和`db_owner`角色用户的数据时。有关此主题的更多信息，请参阅题为“保护信息不被
    DBA 访问”的侧栏。


    ## 保护信息不被 DBA 访问


    最近企业 IT 部门外包或离岸外包的趋势，加上关于谁应被允许访问敏感数据的日益严格的法规，意味着限制对敏感数据的访问（即使是来自`sysadmin`和`db_owner`角色的用户）已成为一个日益普遍的需求。


    DBA 拥有查看、插入、更新和删除任何数据库表中数据的权限，任何处于`sysadmin`角色的 DBA 都控制着 SQL Server 实例上的每个密钥和证书。那么，如何设计数据库架构来保护数据不被这些用户访问呢？任何依赖于自动密钥管理层次结构的解决方案都将不起作用；唯一的方法是依赖一个对这些用户保密的密码。这个密码可以与`ENCRYPTBYPASSPHRASE`函数一起使用，也可以用来保护一个证书或非对称密钥，而该证书或密钥又保护了加密数据的对称密钥。


    即便如此，也需要注意风险；`sysadmin`仍然可以`DROP`任何密钥，并且您必须确保在提供密码时，采用安全的方式，使其在通过网络传递或通过数据库分析工具检测时无法被发现。


    ## 非对称密钥加密


    非对称加密是使用一对相关的密钥执行的：**公钥**用于加密数据，相关的**私钥**用于解密生成的密文。非对称密钥对的公钥和私钥是相关的，但它们之间的数学关系足够复杂，以至于无法从已知的一个密钥推导出另一个密钥。图
    6-5 说明了非对称加密模型。


    图 6-5. 非对称密钥加密


    除了非对称密钥对，非对称加密也可以使用**证书**实现。基于 X.509 标准的证书用于将公钥绑定到有权使用关联密钥加密数据的给定身份。证书可以由第三方认证机构（CA）颁发，也可以在
    SQL Server 2008 内部创建自签名证书。自签名证书在上一章中用于演示为存储过程分配权限的一种方法。


    证书加密和非对称密钥加密使用相同的算法，并且假设密钥长度相同，则提供完全相同的加密强度。对于 SQL Server 中处理非对称密钥加密的每种方法，都有一个等效的方法为证书加密提供相同的功能。


    ## 非对称密钥还是证书？


    证书和非对称密钥加密都使用相同的、广泛使用的 RSA 算法。假设密钥长度相同，证书和非对称加密将提供相同的加密强度，并且两种类型可用的功能之间没有显著差异。那么，应该选择哪一个呢？


    决策可能受到您选择在 SQL Server 内部生成密钥还是从外部来源生成密钥的影响。SQL Server 中的自签名证书密钥长度只能是 1024 位，而非对称密钥可以创建私钥长度为
    512、1024 或 2048 位的更强密钥。


    但是，非对称密钥和证书都可以从外部来源导入，在这种情况下，密钥长度最高可达 3456 位。


    我推荐使用证书进行非对称加密，而不是非对称密钥对，因为证书允许在密钥旁边存储额外的元数据（例如过期日期），并且证书可以使用`BACKUP CERTIFICATE`命令轻松备份到
    CER 文件，而非对称密钥对却奇怪地缺乏提供等效功能的方法。

    '
- fmt: '# CHAPTER 6: ENCRYPTION


    As explained previously, by default the private keys of asymmetric key pairs and
    certificates are protected by the DMK, which is automatically used to open these
    keys as and when they are required by any users who have been granted permission
    to the relevant securable.


    The following code listing illustrates how to create a 1024-bit asymmetric key
    using the RSA algorithm:


    ```sql

    CREATE ASYMMETRIC KEY AsymKey1

    WITH Algorithm = RSA_1024;

    GO

    ```


    Encrypting data using the asymmetric key follows a slightly different process
    than for symmetric encryption, as there is no need to explicitly open an asymmetric
    key prior to encryption or decryption.


    Instead, you pass the ID of the asymmetric key and the plain text to be encrypted
    to the `ENCRYPTBYASYMKEY` method, as demonstrated in the following code listing:


    ```sql

    DECLARE @Secret nvarchar(255) = ''This is my secret message'';

    DECLARE @Encrypted varbinary(max);

    SET @Encrypted = ENCRYPTBYASYMKEY(ASYMKEY_ID(N''AsymKey1''), @Secret);

    GO

    ```


    The `DECRYPTBYASYMKEY` (and the equivalent `DECRYPTBYCERT`) functions can be used
    to return the `varbinary` representation of any asymmetrically encrypted data,
    by supplying the key ID and encrypted ciphertext, as follows:


    ```sql

    DECLARE @Secret nvarchar(255) = ''This is my secret message'';

    DECLARE @Encrypted varbinary(max);

    SET @Encrypted = ENCRYPTBYASYMKEY(ASYMKEY_ID(N''AsymKey1''), @secret);

    SELECT

    CAST(DECRYPTBYASYMKEY(ASYMKEY_ID(N''AsymKey1''), @Encrypted) AS nvarchar(255));

    GO

    ```


    You may have noticed when running the preceding code samples that, even when only
    dealing with a very small amount of data, asymmetric encryption and decryption
    methods are much slower than the equivalent symmetric functions. This is one of
    the reasons that, even though asymmetric encryption provides stronger protection
    than symmetric encryption, it is not recommended for encrypting any column that
    will be used to filter rows in a query, or where more than one or two records
    will be decrypted at a time. Instead, asymmetric encryption is most useful as
    a method to protect other encryption keys, as will be discussed later in this
    chapter.


    ## Transparent Data Encryption


    Transparent data encryption (TDE) is a new feature available in the Developer
    and Enterprise editions of SQL Server 2008. It is "transparent" in that, unlike
    all of the previous methods listed, it requires no explicit change to database
    architecture, and it doesn’t necessitate queries to be rewritten using specific
    methods to encrypt or decrypt data. In addition, generally speaking, it is not
    necessary to deal with any key management issues relating to TDE. So how does
    TDE work?


    Rather than operating on chosen values or columns of data, transparent encryption
    provides automatic symmetric encryption and decryption of *all* data passing from
    the file system layer to the SQL Server process. In other words, the MDF and LDF
    files in which database information is saved are stored in an encrypted state.
    When SQL Server makes a request for data in these files, it is automatically decrypted
    at the I/O level. The query engine can therefore operate on it just as it does
    any other kind of data. When the data is written back to disk, TDE automatically
    encrypts it again.


    TDE provides encryption of (almost) all data within any database for which it
    is enabled, based on the `database encryption key` (DEK) stored in the user database.
    The DEK is a symmetric key protected by a server certificate stored in the master
    database, which, in turn, is protected by the DMK of the master database and the
    SMK.


    To enable TDE on a database, you first need to create a server certificate in
    the master database (assuming that the master database already has a DMK):


    ```sql

    USE MASTER;

    GO

    CREATE CERTIFICATE TDE_Cert

    WITH SUBJECT = ''Certificate for TDE Encryption'';

    GO

    ```


    Then use the `CREATE DATABASE ENCRYPTION KEY` statement to create the DEK in the
    appropriate user database:


    ```sql

    USE ExpertSqlEncryption;

    GO

    CREATE DATABASE ENCRYPTION KEY

    WITH ALGORITHM = AES_128

    ```'
