    );


    GO


    CREATE USER Assembly_Permissions_User


    FOR CERTIFICATE Assembly_Permissions_Certificate;


    GO


    Finally, sign the assembly with the certificate, thereby granting access and allowing
    the assembly to be referenced:


    ADD SIGNATURE TO ASSEMBLY::SafeDictionary


    BY CERTIFICATE Assembly_Permissions_Certificate


    WITH PASSWORD=''uSe_a STr()nG PaSSW0rD!'';


    GO'
  trans: "\n# 第 7 章 SQLCLR：架构与设计考虑\n\n`ALTER DATABASE AdventureWorks2008`\n\n`SET\
    \ TRUSTWORTHY ON;`\n\n`GO`\n\n遗憾的是，尽管启用此选项的操作很简单，但其带来的影响却远非如此。\n\n本质上，这意味着在可信数据库上下文中运行的代码，比在未标记为可信的数据库中运行的代码，能更轻松地访问数据库外部的资源。这包括访问文件系统、远程数据库服务器，甚至同一服务器上的其他数据库——所有这些访问都受控于这一个选项，因此请务必谨慎。\n\
    \n关闭 `TRUSTWORTHY` 选项意味着恶意代码将更难访问数据库外部的资源，但这也意味着，作为开发人员，你将不得不花费更多时间处理安全问题。话虽如此，我强烈建议除非有非常充分的理由，否则应保持\
    \ `TRUSTWORTHY` 选项处于关闭状态。在非可信数据库中处理访问控制并非难事；应采用第 5 章讨论的模块签名技术，这样访问控制权就完全掌握在你手中，而不应获得特定资源访问权限的代码也就无法轻易得逞。\n\
    \n在 SQLCLR 环境中，如果你在非可信数据库中注册一个使用 `EXTERNAL_ACCESS` 或 `UNSAFE` 权限集引用了另一个程序集的程序集，将会看到部署时异常。\n\
    \n以下是我尝试注册包含 `GetConvertedAmount` 方法的程序集时遇到的异常（在此前，我已将数据库设置为非可信模式）：\n\n```\nCREATE\
    \ ASSEMBLY for assembly 'CurrencyConversion' failed because\nassembly 'SafeDictionary'\
    \ is not authorized for PERMISSION_SET = UNSAFE.\nThe assembly is authorized when\
    \ either of the following is true: the database\nowner (DBO) has UNSAFE ASSEMBLY\
    \ permission and the database has the TRUSTWORTHY\ndatabase property on; or the\
    \ assembly is signed with a certificate or an asymmetric\nkey that has a corresponding\
    \ login with UNSAFE ASSEMBLY permission.\nIf you have restored or attached this\
    \ database, make sure the database owner is\nmapped to the correct login on this\
    \ server. If not, use sp_changedbowner to fix\nthe problem.\n```\n\n这段相当详细的异常信息实属难得，值得珍视：它确切地描述了如何解决问题！遵循第\
    \ 5 章描述的流程，你可以使用证书来授予 `UNSAFE ASSEMBLY` 权限。首先，在 `master` 数据库中创建一个证书和对应的登录名，并授予该登录名\
    \ `UNSAFE ASSEMBLY` 权限：\n\n```\nUSE master;\nGO\nCREATE CERTIFICATE Assembly_Permissions_Certificate\n\
    ENCRYPTION BY PASSWORD = 'uSe_a STr()nG PaSSW0rD!'\nWITH SUBJECT = 'Certificate\
    \ used to grant assembly permission';\nGO\nCREATE LOGIN Assembly_Permissions_Login\n\
    FROM CERTIFICATE Assembly_Permissions_Certificate;\nGO\nGRANT UNSAFE ASSEMBLY\
    \ TO Assembly_Permissions_Login;\nGO\n```\n\n接下来，将证书备份到文件：\n\n```\nBACKUP CERTIFICATE\
    \ Assembly_Permissions_Certificate\nTO FILE = 'C:\\assembly_permissions.cer'\n\
    WITH PRIVATE KEY\n(\n    FILE = 'C:\\assembly_permissions.pvk',\n    ENCRYPTION\
    \ BY PASSWORD = 'is?tHiS_a_VeRySTronGP4ssWoR|)?',\n    DECRYPTION BY PASSWORD\
    \ = 'uSe_a STr()nG PaSSW0rD!'\n);\nGO\n```\n\n现在，在你正在工作的数据库中（我的例子中是 `AdventureWorks2008`）恢复证书并基于它创建一个本地数据库用户：\n\
    \n```\nUSE AdventureWorks2008;\nGO\nCREATE CERTIFICATE Assembly_Permissions_Certificate\n\
    FROM FILE = 'C:\\assembly_permissions.cer'\nWITH PRIVATE KEY\n(\n    FILE = 'C:\\\
    assembly_permissions.pvk',\n    DECRYPTION BY PASSWORD = 'is?tHiS_a_VeRySTronGP4ssWoR|)?',\n\
    \    ENCRYPTION BY PASSWORD = 'uSe_a STr()nG PaSSW0rD!'\n);\nGO\nCREATE USER Assembly_Permissions_User\n\
    FOR CERTIFICATE Assembly_Permissions_Certificate;\nGO\n```\n\n最后，用证书对程序集进行签名，从而授予访问权限并允许引用该程序集：\n\
    \n```\nADD SIGNATURE TO ASSEMBLY::SafeDictionary\nBY CERTIFICATE Assembly_Permissions_Certificate\n\
    WITH PASSWORD='uSe_a STr()nG PaSSW0rD!';\nGO\n```\n"
- fmt: '# 强命名


    你可能遇到的另一个问题与强命名程序集有关。强命名是一项 .NET 安全特性，允许你对程序集进行数字签名，分配版本号，并向用户确保其有效性。对于大多数 SQLCLR
    代码来说，强命名可能有些过度——在安全、受管理的数据库中运行的代码可能不需要强命名提供的额外保证。然而，对于考虑分发包含 SQLCLR 组件的应用程序的供应商来说，他们绝对会希望研究强命名。


    在对包含 `ReadFileLines` 方法的程序集进行签名，并重新部署它和包含 `CAS_Exception` 存储过程的程序集之后，当我调用该过程时，我收到了以下错误：


    ```

    Msg 6522, Level 16, State 1, Procedure CAS_Exception, Line 0

    A .NET Framework error occurred during execution of user-defined routine or

    aggregate "CAS_Exception":

    System.Security.SecurityException: That assembly does not allow partially trusted

    callers.

    System.Security.SecurityException:

    at System.Security.CodeAccessSecurityEngine.ThrowSecurityException(Assembly asm,

    PermissionSet granted, PermissionSet refused, RuntimeMethodHandle rmh,

    SecurityAction action, Object demand, IPermission permThatFailed)

    at udf_part2.CAS_Exception()

    .

    ```


    解决方案是在代码中添加一个 `AllowPartiallyTrustedCallersAttribute`（在文章中常简称为 APTCA）。这个特性应该被添加到程序集中的一个单独文件中，位于
    `using` 声明之后，在任何类或命名空间定义之前。在 `FileLines` 程序集的例子中，添加该特性后的文件如下所示：


    ```

    using System;

    using System.Data;

    using System.Data.SqlClient;

    using System.Data.SqlTypes;

    using Microsoft.SqlServer.Server;

    using System.Collections.Generic;

    using System.Security.Permissions;


    [assembly: System.Security.AllowPartiallyTrustedCallers]


    public partial class FileLines

    {

    ```


    一旦添加了这个特性，任何调用者都可以使用 `FileLines` 类中的方法，而不会收到异常。请记住，指定此特性是有原因的，使用它你可能允许调用者绕过安全检查。如果程序集执行的操作不应被所有用户访问，请确保实施其他安全措施，例如创建具有不同所有者的程序集组，以确保非组内程序集无法引用敏感方法。


    # 性能比较：SQLCLR 与 TSQL


    讨论了实现基于 SQLCLR 的解决方案背后的一些安全和架构考虑后，你可能想知道哪些情况实际上可以从使用 SQLCLR 中受益。


    重要的是要认识到，SQLCLR 不是，也从来无意成为 T-SQL 的替代品作为 SQL Server 中的数据操作语言。为了从数据库读取数据以及执行大多数标准数据操作，T-SQL
    是唯一的选择。此外，虽然我强调了创建易于在各层之间移动和共享的可移植代码的重要性，但你不应尝试使用 SQLCLR 将本应属于应用程序的逻辑移入数据库。虽然允许在层之间进行代码重用可能有好处，但请记住，数据库服务器通常是成本最高的扩展层，因此将过多逻辑移入数据库是对宝贵数据库资源的低效使用，而这些资源本可以由一个便宜得多的应用程序服务器来提供。关于数据和应用逻辑正确放置位置的进一步讨论，请回顾第
    1 章。


    以下是一些常被提及的、SQLCLR 可能是比 TSQL 更好选择的情况。'
  raw: 'Strong Naming


    The other issue you might encounter has to do with strongly named assemblies.
    Strong naming is a .NET


    security feature that allows you to digitally sign your assembly, allocating a
    version number and ensuring its validity to users. For most SQLCLR code, strong
    naming is probably overkill—code running in secured, managed databases probably
    doesn’t need the additional assurances that strong naming provides. However, vendors
    looking at distributing applications that include SQLCLR components will definitely
    want to look at strong naming.


    After signing the assembly that contains the ReadFileLines method and redeploying
    both it and the assembly containing the CAS_Exception stored procedure, I receive
    the following error when I call the procedure:


    Msg 6522, Level 16, State 1, Procedure CAS_Exception, Line 0


    A .NET Framework error occurred during execution of user-defined routine or


    aggregate "CAS_Exception":


    System.Security.SecurityException: That assembly does not allow partially trusted


    callers.


    System.Security.SecurityException:


    at System.Security.CodeAccessSecurityEngine.ThrowSecurityException(Assembly asm,


    CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    PermissionSet granted, PermissionSet refused, RuntimeMethodHandle rmh,


    SecurityAction action, Object demand, IPermission permThatFailed)


    at udf_part2.CAS_Exception()


    .


    The solution is to add an AllowPartiallyTrustedCallersAttribute (often referred
    to merely as APTCA in articles) to the code. This attribute should be added to
    a single file in the assembly, after the using declarations and before definition
    of any classes or namespaces. In the case of the FileLines assembly, the file
    looks like the following after adding the attribute:


    using System;


    using System.Data;


    using System.Data.SqlClient;


    using System.Data.SqlTypes;


    using Microsoft.SqlServer.Server;


    using System.Collections.Generic;


    using System.Security.Permissions;


    [assembly: System.Security.AllowPartiallyTrustedCallers]


    public partial class FileLines


    {


    Once this attribute has been added, any caller can use the methods in the FileLines
    class, without receiving an exception. Keep in mind that this attribute must be
    specified for a reason, and by using it you may be allowing callers to circumvent
    security. If the assembly performs operations that not all users should be able
    to access, make sure to implement other security measures, such as by creating
    groups of assemblies with different owners, to ensure that nongrouped assemblies
    cannot reference the sensitive methods.


    Performance Comparison: SQLCLR vs. TSQL


    Having discussed some of the security and architecture considerations behind implementing
    a SQLCLR-based solution, you may be wondering about what sort of situations could
    actually benefit from using SQLCLR.


    It is important to realize that SQLCLR is not, and was never intended to be, a
    replacement for T-SQL


    as a data manipulation language in SQL Server. In order to read data from the
    database, and to perform most standard data operations, T-SQL is the only choice.
    Also, although I’ve stressed the importance of creating portable code that may
    be easily moved and shared between tiers, you should not try to use SQLCLR as
    a way of moving logic that rightly belongs in the application into the database.
    Although allowing the potential for code reuse between tiers can be beneficial,
    remember that database servers are typically the most expensive tier to scale,
    so moving too much logic into the database is an inefficient use of precious database
    resources, which could have been provided by a much cheaper application 178


    CHAPTER


    „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    server. For a further discussion of the correct placement of data and application
    logic, refer back to Chapter 1.


    Examples of commonly cited situations in which SQLCLR is perhaps a better choice
    than TSQL'
  trans: '# 强命名


    你可能遇到的另一个问题与强命名程序集有关。强命名是一项 .NET 安全特性，允许你对程序集进行数字签名，分配版本号，并向用户确保其有效性。对于大多数 SQLCLR
    代码来说，强命名可能有些过度——在安全、受管理的数据库中运行的代码可能不需要强命名提供的额外保证。然而，对于考虑分发包含 SQLCLR 组件的应用程序的供应商来说，他们绝对会希望研究强命名。


    在对包含 `ReadFileLines` 方法的程序集进行签名，并重新部署它和包含 `CAS_Exception` 存储过程的程序集之后，当我调用该过程时，我收到了以下错误：


    ```

    Msg 6522, Level 16, State 1, Procedure CAS_Exception, Line 0

    A .NET Framework error occurred during execution of user-defined routine or

    aggregate "CAS_Exception":

    System.Security.SecurityException: That assembly does not allow partially trusted

    callers.

    System.Security.SecurityException:

    at System.Security.CodeAccessSecurityEngine.ThrowSecurityException(Assembly asm,

    PermissionSet granted, PermissionSet refused, RuntimeMethodHandle rmh,

    SecurityAction action, Object demand, IPermission permThatFailed)

    at udf_part2.CAS_Exception()

    .

    ```


    解决方案是在代码中添加一个 `AllowPartiallyTrustedCallersAttribute`（在文章中常简称为 APTCA）。这个特性应该被添加到程序集中的一个单独文件中，位于
    `using` 声明之后，在任何类或命名空间定义之前。在 `FileLines` 程序集的例子中，添加该特性后的文件如下所示：


    ```

    using System;

    using System.Data;

    using System.Data.SqlClient;

    using System.Data.SqlTypes;

    using Microsoft.SqlServer.Server;

    using System.Collections.Generic;

    using System.Security.Permissions;


    [assembly: System.Security.AllowPartiallyTrustedCallers]


    public partial class FileLines

    {

    ```


    一旦添加了这个特性，任何调用者都可以使用 `FileLines` 类中的方法，而不会收到异常。请记住，指定此特性是有原因的，使用它你可能允许调用者绕过安全检查。如果程序集执行的操作不应被所有用户访问，请确保实施其他安全措施，例如创建具有不同所有者的程序集组，以确保非组内程序集无法引用敏感方法。


    # 性能比较：SQLCLR 与 TSQL


    讨论了实现基于 SQLCLR 的解决方案背后的一些安全和架构考虑后，你可能想知道哪些情况实际上可以从使用 SQLCLR 中受益。


    重要的是要认识到，SQLCLR 不是，也从来无意成为 T-SQL 的替代品作为 SQL Server 中的数据操作语言。为了从数据库读取数据以及执行大多数标准数据操作，T-SQL
    是唯一的选择。此外，虽然我强调了创建易于在各层之间移动和共享的可移植代码的重要性，但你不应尝试使用 SQLCLR 将本应属于应用程序的逻辑移入数据库。虽然允许在层之间进行代码重用可能有好处，但请记住，数据库服务器通常是成本最高的扩展层，因此将过多逻辑移入数据库是对宝贵数据库资源的低效使用，而这些资源本可以由一个便宜得多的应用程序服务器来提供。关于数据和应用逻辑正确放置位置的进一步讨论，请回顾第
    1 章。


    以下是一些常被提及的、SQLCLR 可能是比 TSQL 更好选择的情况。'
- fmt: '# CHAPTER: SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    include manipulation of string or XML data, certain math functions that are provided
    by dedicated methods in the .NET Base Class Library, and situations where procedural
    code is more efficient than set-based logic. In order to test the validity of
    these claims, I decided to set up some simple test cases to compare the relative
    performance of T-SQL against SQLCLR, which are described in the following sections.


    ## Creating a “Simple Sieve” for Prime Numbers


    For this test, I created two simple procedures that return a list of all prime
    numbers up to a supplied maximum value—one implemented in T-SQL, and one using
    SQLCLR. The logic of these tests was made as simple as possible: each is supplied
    with a maximum value that is decremented in a loop, and in each iteration of the
    loop, the modulo operator is used to determine the remainder when that value is
    divided by every lesser number. If the remainder of the division is 0 (in other
    words, we have found a factor), we know that the current value is not a prime
    number. The loop therefore moves on to test the next possible value. If the inner
    loop tests every possible divisor and has not found any factors, then we know
    the value must be a prime. Using this kind of “simple sieve” algorithm for finding
    prime numbers relies on basic mathematical functions and procedural logic, which
    makes it a good test to compare the performance of T-SQL and SQLCLR. Here’s the
    T-SQL implementation:


    ```

    CREATE PROCEDURE ListPrimesTSQL (


    @Limit int


    )


    AS BEGIN


    DECLARE


    -- @n is the number we''re testing to see if it''s a prime


    @n int = @Limit,


    --@m is all the possible numbers that could be a factor of @n


    @m int = @Limit - 1;


    -- Loop descending through the candidate primes


    WHILE (@n > 1)


    BEGIN


    -- Loop descending through the candidate factors


    WHILE (@m > 0)


    BEGIN


    -- We''ve got all the way to 2 and haven''t found any factors


    IF(@m = 1)


    BEGIN


    PRINT CAST(@n AS varchar(32)) + '' is a prime''


    BREAK;


    END


    -- Is this @m a factor of this prime?


    IF(@n%@m) <> 0


    BEGIN


    -- Not a factor, so move on to the next @m


    SET @m = @m - 1;


    CONTINUE;


    END


    CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    ELSE BREAK;


    END


    SET @n = @n-1;


    SET @m = @n-1;


    END


    END;

    ```


    And here’s the SQLCLR implementation using exactly the same logic:


    ```

    [SqlProcedure]


    public static void ListPrimesCLR(SqlInt32 Limit)


    {


    int n = (int)Limit;


    int m = (int)Limit - 1;


    while(n > 1)


    {


    while(m > 0)


    {


    if(m == 1)


    {


    SqlContext.Pipe.Send(n.ToString() + " is a prime");


    }


    if(n%m != 0)


    {


    m = m - 1;


    continue;


    }


    else


    {


    break;


    }


    }


    n = n - 1;


    m = n - 1;


    }


    }

    ```


    `Note` Clearly, if you actually wanted to get a list of the prime numbers, you
    would NOT use such a naive approach as this. The example used here is intended
    to provide a simple procedure that can be implemented consistently across both
    T-SQL and SQLCLR.


    I tested each solution several times, supplying different values for the maximum
    limit from which the loop starts. The average execution time for each solution
    is shown in the graph illustrated in Figure 7-1.


    *Figure 7-1\. Comparison of prime number sieve implemented in T-SQL and SQLCLR*


    The results should come as no surprise—since the approach taken relies on mathematical
    operations in an iterative loop, SQLCLR is always likely to outperform set-based
    T-SQL. However, you might be surprised by the magnitude of the difference between
    the two solutions, especially as the number of iterations increases. If we were
    to compare simple inline, or nonprocedural, calculations then there would likely
    not be such a stark contrast between the two methods.


    ## Calculating Running Aggregates


    Few practical database applications need to produce a list of prime numbers—a
    more common type of mathematical query operation that might benefit from the use
    of SQLCLR is when you need to calculate a value in a row based on the value of
    previous rows’ data. The most common example of such a linear query is in the
    calculation of aggregates, such as running sums of columns.'
