- fmt: "# CHAPTER 8 DYNAMIC T-SQL\n\n## Before running the code\nBefore running the\
    \ code, be sure to clear out the stored procedure cache by issuing the following\
    \ command:\n```sql\nDBCC FREEPROCCACHE;\nGO\n```\nThen execute the C# code to\
    \ call the static procedure in a loop. Once it’s run, we’ll investigate the performance\
    \ by once again interrogating the system DMVs. This time, we’ll amend our original\
    \ cache plan query to add in performance counter columns from the `sys.dm_exec_query_stats`\
    \ view as follows:\n```sql\nSELECT\n    cp.objtype AS type,\n    COUNT(DISTINCT\
    \ st.text) AS plans,\n    SUM(qs.execution_count) AS execution_count,\n    CAST(SUM(qs.total_worker_time)\
    \ AS decimal(18,9)) / SUM(qs.execution_count)\n    / 1000 AS avg_CPU_ms\nFROM\
    \ sys.dm_exec_query_stats qs\nJOIN sys.dm_exec_cached_plans cp ON cp.plan_handle\
    \ = qs.plan_handle\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) st\nWHERE\n\
    \    st.text LIKE '%HumanResources.Employee%'\n    AND st.text NOT LIKE '%sys.dm_exec_sql_text%'\n\
    GROUP BY\n    cp.objtype\n```\n\n## The results obtained\nThe results obtained\
    \ when I run this on my laptop are as follows:\n```\ntype        plans   execution_count\
    \     avg_CPU_ms\nAdhoc       1       1                   3.00000000000000000000000000000\n\
    Proc        1       8710                0.08829402985074626865671641791\n```\n\
    As expected, the cache contains a single execution plan, which was compiled once\
    \ and then reused for all `8,710` queries. Each static query took, on average,\
    \ `0.08829`ms to run. Not bad.\n\n## Next, create a renamed version\nNext, create\
    \ a renamed version of the `EXECUTE` solution, called `GetEmployeeData_Execute`:\n\
    ```sql\nCREATE PROCEDURE GetEmployeeData_Execute\n    @BusinessEntityID int =\
    \ NULL,\n    @NationalIDNumber nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n    DECLARE @sql nvarchar(max);\n    SET @sql = '' +\n        'SELECT '\
    \ +\n        'LoginID, ' +\n        'JobTitle ' +\n        'FROM HumanResources.Employee\
    \ ' +\n        'WHERE 1=1 ' +\n        CASE\n            WHEN @BusinessEntityID\
    \ IS NULL THEN ''\n            ELSE\n                'AND BusinessEntityID = '\
    \ +\n                CONVERT(nvarchar, @BusinessEntityID) + ' '\n        END +\n\
    \        CASE\n            WHEN @NationalIDNumber IS NULL THEN ''\n          \
    \  ELSE\n                'AND NationalIDNumber = N''' +\n                @NationalIDNumber\
    \ + ''' '\n        END;\n    EXEC(@sql);\nEND\n```\n\n## Testing this stored procedure\n\
    Testing this stored procedure against the static solution, and later, the `sp_executesql`\
    \ solution, will create a nice means by which to compare static SQL against both\
    \ parameterized and nonparameterized dynamic SQL, and will show the effects of\
    \ parameterization on performance. Back in the C# application, change the `SqlCommand`\
    \ to reflect the name of the new procedure, as follows:\n```csharp\nSqlCommand\
    \ cmd2 = new SqlCommand(\"GetEmployeeData_execute\", sqlConn);\n```\nOnce you’ve\
    \ made this change, clear the stored procedure cache with another call to `DBCC\
    \ FREEPROCCACHE`, and then run the tests again. Interrogating the DMV tables after\
    \ the test runs on my system gives the following results:\n```\ntype        plans\
    \   execution_count     avg_CPU_ms\nAdhoc       872     8711                0.11204224543680404086786821260\n\
    ```\nUsing the `EXECUTE` method, the cache contains `872` different Adhoc plans—one\
    \ for the original creation of the stored procedure, and one for each time it\
    \ is called with a different set of parameters. The overall average CPU time for\
    \ this method is `0.112`ms per query—over ten times slower than the static solution.\n\
    \n## The final stored procedure to test is\nThe final stored procedure to test\
    \ is, of course, the `sp_executesql` solution. Once again, create a renamed version\
    \ of the stored procedure in order to differentiate it. This time, call it `GetEmployeeData_sp_executesql`:\n\
    ```sql\nCREATE PROCEDURE GetEmployeeData_sp_executesql\n    @BusinessEntityID\
    \ int = NULL,\n    @NationalIDNumber nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n    DECLARE @sql nvarchar(max);\n    SET @sql = '' +\n        'SELECT '\
    \ +\n        'LoginID, ' +\n        'JobTitle ' +\n        'FROM HumanResources.Employee\
    \ ' +\n        'WHERE 1=1 ' +\n        CASE\n            WHEN @BusinessEntityID\
    \ IS NULL THEN ''\n            ELSE 'AND BusinessEntityID = @BusinessEntityID\
    \ '\n        END +\n        CASE\n            WHEN @NationalIDNumber IS NULL THEN\
    \ ''\n            ELSE 'AND NationalIDNumber = @NationalIDNumber '\n        END;\n\
    \    EXEC sp_executesql\n        @sql,\n        N'@BusinessEntityID int, @NationalIDNumber\
    \ nvarchar(15)',\n        @BusinessEntityID,\n        @NationalIDNumber;\nEND\n\
    ```\nIn the C# code, change the `SqlCommand` text to the following:"
