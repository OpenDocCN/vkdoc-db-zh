    In a production environment, I suggest that you read this message carefully and
    follow its advice. Should the certificate become unavailable, you will be unable
    to decrypt the DEK, and all data in the associated database will be lost.


    Having created the necessary keys, TDE can be enabled using a single T-SQL statement,
    as follows: ALTER DATABASE ExpertSqlEncryption


    SET ENCRYPTION ON;


    GO


    To check the encryption status of all the databases on a server, you can query
    the


    sys.dm_database_encryption_keys view, as follows:


    SELECT


    DB_NAME(database_id) AS database_name,


    CASE encryption_state


    WHEN 0 THEN ''Unencrypted (No database encryption key present)''


    WHEN 1 THEN ''Unencrypted''


    WHEN 2 THEN ''Encryption in Progress''


    WHEN 3 THEN ''Encrypted''


    WHEN 4 THEN ''Key Change in Progress''


    WHEN 5 THEN ''Decryption in Progress''


    END AS encryption_state,


    key_algorithm,


    key_length


    FROM sys.dm_database_encryption_keys;


    GO


    The results indicate that both the ExpertSqlEncryption user database and the tempdb
    system


    database are now encrypted:


