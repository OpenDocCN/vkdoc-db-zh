    •


    PoolA now has an effective maximum CPU usage of 85 percent. The previous


    effective maximum of 90 percent must be reduced to ensure that PoolC’s


    MIN_CPU_PERCENT request of 15 percent can be granted. PoolA now receives 55


    percent of its maximum effective CPU resource from the shared resource pool.


    •


    PoolB remains unchanged, with an effective maximum of 50 percent of CPU


    resource, all of which is taken from the shared resource pool.


