  trans: '

    因此，在长距离情况下，使用 `geometry` 数据类型获得的结果将比使用 `geography` 数据类型获得的结果准确度更低。


    在全局空间应用中，`geography` 数据类型是更合适的选择，因为能够用于通用全局目的且具有足够准确度的投影坐标系很少。对于存储单个国家或更小区域内的空间数据，`geometry`
    数据类型通常能提供足够的准确度，并且相比 `geography` 类型具有更多功能带来的优势。


    ## 技术限制与性能


    `geography` 数据类型使用的椭球面计算本质上比 `geometry` 数据类型的平面计算更为复杂。这意味着，使用 `geography` 数据类型的应用程序性能可能略低于基于
    `geometry` 数据类型的应用程序，不过这种影响通常并不显著。此外，在 `geometry` 数据列上创建的索引可以指定一个明确的边界框，从而创建更精细的网格，这比
    `geography` 索引能更高效地过滤结果（因为 `geography` 索引被假定为覆盖整个地球——但稍后会详细讨论这一点）。


    然而，这两种数据类型所基于的不同模型之间还存在其他更重要的影响。第一个区别是，目前，任何 `geography` 实例都不能超过单个半球。在这里，术语 `半球`
    指的是地球表面的一半，以球面上任意一点为中心。因此，不可能有一个包含一个位于北极的点和一个位于南极的点的 `geography` `MultiPoint`
    实例。也不可能有一个从伦敦延伸到奥克兰，然后再延伸到洛杉矶的 `geography` `LineString`。为了绕过这个限制，您必须将大型 `geography`
    对象分解为几个较小的对象，每个对象都适合一个半球。相比之下，`geometry` 实例的大小没有限制，它可以在无限平面上无限延伸。


    第二个技术差异源于在曲面上工作与在平面上工作的概念差异。如前所述，`Polygon` 的外环定义了 `Polygon` 内部包含的空间区域，并且可能包含一个或多个内环来定义“孔洞”——即从
    `Polygon` 中切除的空间区域。当在平坦的纸张上绘制 `Polygon` 时，这相当直观。然而，当您尝试在连续的圆形表面（如 `geography`
    数据类型所使用的）上应用此定义时，问题就出现了，因为对于 `Polygon` 环“内部”包含的空间区域和“外部”区域的界定变得模糊不清。


    为了说明这个问题，请考虑图 10-6，它展示了一个外环是围绕赤道绘制的一组点的 `Polygon`。该 `Polygon` 包含的区域代表的是北半球还是南半球？


    *图 10-6. 对于 `geography` 数据类型，`Polygon` 环方向很重要*


    SQL Server（以及与其他一些空间系统相同）使用的解决方案是考虑 `Polygon` 的 `环方向`——即指定环上点的顺序。在定义 `geography`
    `Polygon` 时，SQL Server 将点与点之间绘制路径“左侧”的区域视为环内包含的区域，而“右侧”的点则被排除在外。因此，图 10-6 中描绘的
    `Polygon` 代表北半球。每当您定义 `geography` 多边形时，必须确保指定正确的环方向，否则您的多边形将会“内外颠倒”——排除了它们本应包含的区域，而包含了所有其他区域。在
    `geometry` 数据中，环方向并不重要，因为在平面上 `Polygon` 环内包含的区域不存在歧义。


    ## 最后的技术差异


    最后一个技术差异涉及 `无效几何体`。在理想情况下，我们总是希望空间数据是“有效”的——即符合该类型 `geometry` 的所有 OGC 规范。然而，作为开发人员，我们不得不勉强接受一个现实：空间数据与其他任何数据一样，很少能如我们所愿般完美。这意味着您会经常遇到无效数据，例如，`Polygon`
    自身相交。


    或许有些反常的是，符合 OGC 标准的 `geometry` 数据类型，也是提供了处理不符合这些标准的数据选项的数据类型。例如，`geometry` 数据类型不仅可以存储无效几何体，还提供了
    `STIsValid()` 方法来识别 `geometry` 是否有效，以及 `MakeValid()` 方法来尝试“修复”无效几何体。相比之下，所有 `geography`
    数据都被假定在任何时候都是有效的。尽管这意味着一旦 `geography` 数据进入 SQL Server，您就可以放心地使用它，因为它始终有效，但这可能会在最初导入数据时构成障碍。由于
    SQL Server 无法导入无效的 `geography` 数据，您可能不得不依赖外部工具在导入之前验证和修复任何错误数据。


    ## 创建空间数据


    对于许多刚接触 SQL Server 2008 空间功能的用户来说，面临的第一个挑战是如何将空间数据导入数据库。不幸的是，最常用的空间格式——ESRI shapefile
    格式 (SHP)——不被任何 `geography` 或 `geometry` 方法直接支持，也不被 SQL Server Integration Services
    (SSIS) 中可用的任何文件数据源支持。此外，在内部，`geography` 和 `geometry` 数据是使用专有的二进制格式存储的，这种格式相当复杂。感兴趣的读者可以在
    `http://msdn.microsoft.com/en-us/library/ee320529.aspx` 查看其结构文档，但通常您不需要担心具体细节，因为
    SQL Server 提供了静态方法，可以从三种不同的替代空间格式创建空间数据：WKT、Well-Known Binary (WKB) 和 Geography
    Markup Language (GML)。


    ## Well-Known Text


    WKT 是由 OGC 定义的一种简单的、基于文本的格式，用于交换空间信息。由于其易读性和相对简洁性，WKT 格式是一种流行的存储和共享空间数据的方式，也是本章大多数示例中使用的格式。它也是
    SQL Server 2008 联机丛书空间文档中使用的格式，网址为 `http://msdn.microsoft.com/en-us/library/ms130214.aspx`。


    以下代码清单展示了用于表示一个位于 x 坐标 258647 和 y 坐标 665289 的 `Point` 几何体的 WKT 字符串：


    ```

    POINT(258647 665289)

    ```


    基于大不列颠国家格网（这是一个由 `SRID` 27700 表示的投影坐标系），这些坐标代表了苏格兰格拉斯哥的位置。一旦我们知道 WKT 字符串和相关的 `SRID`，就可以使用
    `STPointFromText` 方法创建一个代表该城市的 `geometry` `Point` 实例，如下所示：


    ```

    DECLARE @Glasgow geometry;


    SET @Glasgow = geometry::STPointFromText(''POINT(258647 665289)'', 27700);


    GO

    ```


    为了从 WKT 创建更复杂的几何体，只需在一个逗号分隔的列表中指定每个点的坐标对，如下例所示，它创建了一个代表悉尼海港大桥两个点之间的 `LineString`：


    ```

    DECLARE @SydneyHarbourBridge geography;


    SET @SydneyHarbourBridge = geography::STLineFromText(

    ''LINESTRING(151.209 -33.855, 151.212 -33.850)'', 4326);


    GO

    ```

    '
- fmt: "# 空间数据格式与处理\n\n## WKT 格式注意事项\n\n请注意，在为地理数据类型使用 WKT（Well-Known Text）表示坐标时，如最后一个示例所示，经度坐标必须在每个坐标对中列在首位，随后是纬度坐标。这与人们日常用语中习惯的“纬度，经度”坐标对表达方式相反。\n\
    \nWKT 格式的一个缺点是，与任何基于文本的表示一样，它无法精确表示从二进制方法获得的某些浮点坐标值。\n\n尝试这样做时不可避免地引入的舍入误差将导致精度损失。\n\
    \n此外，由于 SQL Server 必须解析 WKT 表示中的文本来创建相关的空间对象，因此从 WKT 实例化对象可能比使用其他方法更慢。\n\n## WKB\
    \ 格式\n\nWKB（Well-Known Binary）格式与 WKT 格式一样，是由 OGC 定义的表示空间数据的标准化方式。与基于文本的 WKT 格式不同，WKB\
    \ 以二进制格式将几何或地理对象表示为连续的字节流。每个 WKB 表示都以一个头部部分开始，该部分指定了字节的列出顺序（大端序或小端序）、一个定义所表示几何类型的值，以及一个表示几何中每个点坐标的\
    \ 8 字节值流。\n\n以下代码演示了如何使用 `geography` 的 `STPointFromWKB()` 方法，从代表位于纬度 52.23、经度\
    \ 21.02 的波兰华沙市的 WKB 构造一个 `Point` 几何对象：\n\n```sql\nDECLARE @Warsaw geography;\n\
    SET @Warsaw = geography::STPointFromWKB(\n    0x010100000085EB51B81E0535403D0AD7A3701D4A40,\n\
    \    4326);\n```\n\n使用 WKB 的一个优点是，它比任何基于文本的格式（GML 或 WKT）处理效率更高。此外，由于它是二进制格式，WKB\
    \ 保留了从二进制运算计算出的浮点坐标值的精度，而不会引入基于文本格式的舍入误差。因此，对于在系统接口之间直接传输空间数据，其速度和精度优势显著，且缺乏人类可读性并不重要时，它是格式的最佳选择。\n\
    \n### `Note`\n\n尽管 SQL Server 以类似于 WKB 的二进制格式存储空间数据，但它并不相同。为了从 WKB 创建空间数据项，您必须将其提供给适当的\
    \ `STxxxxFromWKB()` 方法。\n\n## GML 格式\n\nGML（Geography Markup Language）是一种基于 XML\
    \ 的语言，用于表示空间信息。像所有 XML 格式一样，GML 是一种非常明确且高度结构化的层次格式。以下代码演示了位于纬度 -33.86、经度 151.21\
    \ 的点的 GML 表示示例：\n\n```xml\n<Point >\n    <pos>-33.86 151.21</pos>\n</Point>\n\
    ```\n\n与 WKT 类似，GML 具有易于阅读和理解的优点。此外，XML 结构使得通过检查关联的 GML 文档的结构来评估和查询复杂空间对象的结构变得容易。然而，它非常冗长——一个对象的\
    \ GML 表示占据的空间远大于等效的 WKT 表示，并且与 WKT 一样，它在表达二进制浮点坐标值时也会因舍入而产生精度问题。GML 最常用于基于 XML\
    \ 的环境中表示空间信息，包括通过互联网聚合空间数据。\n\n## 数据导入\n\n通常需要希望在已知的地理特征（例如政治边界、城市位置或道路和铁路路径）的背景下分析自定义定义的空间数据（例如您客户的位置）。有许多地方可以获取此类通用空间数据，来源包括各种商业和免费资源。"
  raw: 'Note that when using WKT to express coordinates for use in the geography datatype,
    as in the last example, the longitude coordinate must be listed first in each
    coordinate pair, followed by the latitude coordinate. This is in contrast to the
    expression of a “latitude, longitude” coordinate pair, which most people are familiar
    with using in everyday speech.


    One disadvantage of the WKT format is that, as with any text-based representation,
    it is not possible to precisely state the value of certain floating-point coordinate
    values obtained from binary methods.


    The inevitable rounding errors introduced when attempting to do so will lead to
    a loss of precision.


    Additionally, since SQL Server must parse the text in a WKT representation to
    create the relevant spatial object, instantiating objects from WKT can be slower
    than when using other methods.


    Well-Known Binary


    The WKB format, like the WKT format, is a standardized way of representing spatial
    data defined by the OGC. In contrast to the text-based WKT format, WKB represents
    a geometry or geography object as a contiguous stream of bytes in binary format.
    Every WKB representation begins with a header section that specifies the order
    in which the bytes are listed (big-endian or little-endian), a value defining
    the type of geometry being represented, and a stream of 8-byte values representing
    the coordinates of each point in the geometry.


    The following code demonstrates how to construct a Point geometry from WKB representing
    the


    city of Warsaw, Poland, located at latitude 52.23 and longitude 21.02, using the
    geography


    STPointFromWKB() method:


    DECLARE @Warsaw geography;


    SET @Warsaw = geography::STPointFromWKB(


    0x010100000085EB51B81E0535403D0AD7A3701D4A40,


    4326);


    One advantage of using WKB is that it can be more efficiently processed than either
    of the text-based (GML or WKT) formats. Additionally, since it is a binary format,
    WKB maintains the precision of floating-point coordinate values calculated from
    binary operations, without the rounding errors introduced in a text-based format.
    It is therefore the best choice of format for transmission of spatial data directly
    between system interfaces, where the speed and precision of this format are beneficial
    and the lack of human readability is not significant.


    „ **Note** Although SQL Server stores spatial data in a binary format similar
    to WKB, it is not the same. In order to create items of spatial data from WKB,
    you must supply it to the appropriate STxxxxFromWKB() method.


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    Geography Markup Language


    GML is an XML-based language for representing spatial information. Like all XML
    formats, GML is a very explicit and highly structured hierarchical format. The
    following code demonstrates an example of the GML representation of a point located
    at latitude –33.86 and longitude 151.21:


    <Point >


    <pos>-33.86 151.21</pos>


    </Point>


    GML, like WKT, has the advantages of being easy to read and understand. Additionally,
    the XML


    structure makes it is easy to assess and query the structure of complex spatial
    objects by examining the structure of the associated GML document. However, it
    is very verbose—the GML representation of an object occupies substantially more
    space than the equivalent WKT representation and, like WKT, it too suffers from
    precision issues caused by rounding when expressing binary floating-point coordinate
    values. GML is most commonly used for representing spatial information in an XML-based


    environment, including the syndication of spatial data over the Internet.


    Importing Data


    It is very common to want to analyze custom-defined spatial data, such as the
    locations of your customers, in the context of commonly known geographical features,
    such as political boundaries, the locations of cities, or the paths of roads and
    railways. There are lots of places to obtain such generic spatial data, from a
    variety of commercial and free sources.'
  trans: "\n# 空间数据格式与处理\n\n## WKT 格式注意事项\n\n请注意，在为地理数据类型使用 WKT（Well-Known Text）表示坐标时，如最后一个示例所示，经度坐标必须在每个坐标对中列在首位，随后是纬度坐标。这与人们日常用语中习惯的“纬度，经度”坐标对表达方式相反。\n\
    \nWKT 格式的一个缺点是，与任何基于文本的表示一样，它无法精确表示从二进制方法获得的某些浮点坐标值。\n\n尝试这样做时不可避免地引入的舍入误差将导致精度损失。\n\
    \n此外，由于 SQL Server 必须解析 WKT 表示中的文本来创建相关的空间对象，因此从 WKT 实例化对象可能比使用其他方法更慢。\n\n## WKB\
    \ 格式\n\nWKB（Well-Known Binary）格式与 WKT 格式一样，是由 OGC 定义的表示空间数据的标准化方式。与基于文本的 WKT 格式不同，WKB\
    \ 以二进制格式将几何或地理对象表示为连续的字节流。每个 WKB 表示都以一个头部部分开始，该部分指定了字节的列出顺序（大端序或小端序）、一个定义所表示几何类型的值，以及一个表示几何中每个点坐标的\
    \ 8 字节值流。\n\n以下代码演示了如何使用 `geography` 的 `STPointFromWKB()` 方法，从代表位于纬度 52.23、经度\
    \ 21.02 的波兰华沙市的 WKB 构造一个 `Point` 几何对象：\n\n```sql\nDECLARE @Warsaw geography;\n\
    SET @Warsaw = geography::STPointFromWKB(\n    0x010100000085EB51B81E0535403D0AD7A3701D4A40,\n\
    \    4326);\n```\n\n使用 WKB 的一个优点是，它比任何基于文本的格式（GML 或 WKT）处理效率更高。此外，由于它是二进制格式，WKB\
    \ 保留了从二进制运算计算出的浮点坐标值的精度，而不会引入基于文本格式的舍入误差。因此，对于在系统接口之间直接传输空间数据，其速度和精度优势显著，且缺乏人类可读性并不重要时，它是格式的最佳选择。\n\
    \n### `Note`\n\n尽管 SQL Server 以类似于 WKB 的二进制格式存储空间数据，但它并不相同。为了从 WKB 创建空间数据项，您必须将其提供给适当的\
    \ `STxxxxFromWKB()` 方法。\n\n## GML 格式\n\nGML（Geography Markup Language）是一种基于 XML\
    \ 的语言，用于表示空间信息。像所有 XML 格式一样，GML 是一种非常明确且高度结构化的层次格式。以下代码演示了位于纬度 -33.86、经度 151.21\
    \ 的点的 GML 表示示例：\n\n```xml\n<Point >\n    <pos>-33.86 151.21</pos>\n</Point>\n\
    ```\n\n与 WKT 类似，GML 具有易于阅读和理解的优点。此外，XML 结构使得通过检查关联的 GML 文档的结构来评估和查询复杂空间对象的结构变得容易。然而，它非常冗长——一个对象的\
    \ GML 表示占据的空间远大于等效的 WKT 表示，并且与 WKT 一样，它在表达二进制浮点坐标值时也会因舍入而产生精度问题。GML 最常用于基于 XML\
    \ 的环境中表示空间信息，包括通过互联网聚合空间数据。\n\n## 数据导入\n\n通常需要希望在已知的地理特征（例如政治边界、城市位置或道路和铁路路径）的背景下分析自定义定义的空间数据（例如您客户的位置）。有许多地方可以获取此类通用空间数据，来源包括各种商业和免费资源。\n"
- fmt: "# 第十章 处理空间数据\n\nSQL Server 并未提供专门用于导入预定义空间数据的工具，但可以使用一些第三方工具来实现此目的。也可以采用基于\
    \ `SqlServer.Types.dll` 库功能的编程技术，该库包含了 `geography` 和 `geometry` 数据类型本身所使用的方法。为了演示一种导入空间数据的方法，并为本章后续示例提供一些样本数据，我们将从\
    \ Geonames 网站 (www.geonames.org) 导入一个包含世界各地地理位置坐标的数据集。\n\n首先，从 Geonames 网站下载并解压主数据集，地址为：\n\
    ```\nhttp://download.geonames.org/export/dump/allCountries.zip\n```\n该压缩包包含一个制表符分隔的文本文件，其中近有\
    \ 700 万行数据，解压后占用近 800MB 空间。如果想使用更小的数据集，也可以选择下载\n```\nhttp://download.geonames.org/export/dump/cities1000.zip\n\
    ```\n这个压缩包。它使用相同的模式，但仅包含大约 80,000 条记录，代表人口超过 1,000 的城市。\n\n> **注意**：Geonames `allCountries.zip`\
    \ 导出文件是一个大文件（约 170MB），下载可能需要一些时间。\n\n要在 SQL Server 中存储 Geonames 信息，首先按如下方式创建一个新表：\n\
    \n```sql\nCREATE TABLE allCountries(\n    [geonameid] int NOT NULL,\n    [name]\
    \ nvarchar(200) NULL,\n    [asciiname] nvarchar(200) NULL,\n    [alternatenames]\
    \ nvarchar(4000) NULL,\n    [latitude] real NULL,\n    [longitude] real NULL,\n\
    \    [feature class] nvarchar(1) NULL,\n    [feature code] nvarchar(10) NULL,\n\
    \    [country code] nvarchar(2) NULL,\n    [cc2] nvarchar(60) NULL,\n    [admin1\
    \ code] nvarchar(20) NULL,\n    [admin2 code] nvarchar(80) NULL,\n    [admin3\
    \ code] nvarchar(20) NULL,\n    [admin4 code] nvarchar(20) NULL,\n    [population]\
    \ int NULL,\n    [elevation] smallint NULL,\n    [gtopo30] smallint NULL,\n  \
    \  [timezone] nvarchar(80) NULL,\n    [modification date] datetime NULL\n);\n\
    GO\n```\n\n我保留了所有列名和数据类型，完全按照 Geonames 模式中的定义，但你可能需要进行调整。我个人不喜欢包含空格的列名，例如 `[modification\
    \ date]`，但我也认为，当从外部源导入数据时，清楚地引用列的映射方式非常重要，而最简单的方法就是保持列名与源数据一致。\n\n将 Geonames 文本文件导入\
    \ `allCountries` 表有多种方法——然而在本例中，为了尽可能简单，我们将使用导入和导出向导。\n\n在 SQL Server Management\
    \ Studio 中，右键单击“对象资源管理器”窗格中创建了 `allCountries` 表的数据库名称，然后选择“任务” → “导入数据”来启动向导。当提示选择数据源时，选择“平面文件源”选项，单击“浏览”按钮，找到并选择之前下载的\
    \ `allCountries.txt` 文件。从“代码页”下拉列表中，向下滚动并选择 `65001 (UTF-8)`，然后单击左侧窗格中的“列”选项卡。\n\
    \n在“列”页面上，将“列分隔符”更改为`Tab {t}`，然后选择“刷新”以预览文件中的数据，数据应如图 10-7 所示。然后单击左侧窗格中的“高级”。\n\
    \n在“高级”窗格中，依次单击每个列名，并配置列属性以匹配表 10-1 所示的值。\n\n![图 10-7. 预览从 Geonames 网站下载的数据](index-320_1.png)\n\
    \n*图 10-7. 预览从 Geonames 网站下载的数据*\n\n*表 10-1. Geonames 数据的列属性*\n\n| **列名** | **数据类型**\
    \ | **输出列宽** |\n| :--- | :--- | :--- |\n| geonameid | 四字节有符号整数 | [DT_I4] |\n|\
    \ name | Unicode 字符串 | [DT_WSTR] |\n| asciiname | Unicode 字符串 | [DT_WSTR] |\n\
    | alternatenames | Unicode 字符串 | [DT_WSTR] |\n| latitude | 浮点数 | [DT_R4] |\n|\
    \ longitude | 浮点数 | [DT_R4] |\n| feature class | Unicode 字符串 | [DT_WSTR] |\n|\
    \ feature code | Unicode 字符串 | [DT_WSTR] |\n| country code | Unicode 字符串 | [DT_WSTR]\
    \ |\n| cc2 | Unicode 字符串 | [DT_WSTR] |\n| admin1 code | Unicode 字符串 | [DT_WSTR]\
    \ |\n| admin2 code | Unicode 字符串 | [DT_WSTR] |\n| admin3 code | Unicode 字符串 |\
    \ [DT_WSTR] |\n| admin4 code | Unicode 字符串 | [DT_WSTR] |\n| population | 四字节有符号整数\
    \ | [DT_I4] |\n| elevation | 两字节有符号整数 | [DT_I2] |\n| gtopo30 | 两字节有符号整数 | [DT_I2]\
    \ |\n| timezone | Unicode 字符串 | [DT_WSTR] |\n| modification date | 日期 | [DT_DATE]\
    \ |\n\n> **注意**：关于表 10-1 中列出的 Geonames 导出数据的列的完整说明，请查阅 `http://download.geonames.org/export/dump/readme.txt`。\n\
    \n设置好列后，单击“下一步”继续，并检查目标数据库是否已正确配置为将记录导入 `allCountries` 表。再次单击“下一步”完成导入向导。\n\n\
    在我的笔记本电脑上，导入大约需要 10 分钟，所以如果需要，可以利用这个时间活动一下腿脚，喝杯咖啡。导入向导成功完成导入操作后，Geonames 数据集中的每一列都将被导入到\
    \ `allCountries` 表中，但我们尚未利用 SQL Server 2008 的空间功能。表中的每条记录都有一个关联的纬度和经度坐标值，但这些值目前存储在不同的浮点数列中。由于\
    \ Geonames 坐标是使用 SRID 为 `4326` 的地理坐标系测量的，因此对此数据建模的最佳方式是向表中添加一个新的 `geography` 列，并使用代表每个位置的各个\
    \ `Point` 实例来填充它。以下代码清单说明了添加名为 `location` 的 `geography` 列并使用基于 `latitude` 和 `longitude`\
    \ 列中坐标值的 `Point()` 方法进行更新所需的 T-SQL：\n\n```sql\nALTER TABLE allCountries\nADD location\
    \ geography;\nGO\n\nUPDATE allCountries\nSET location = geography::Point(latitude,\
    \ longitude, 4326);\nGO\n```\n\n这里描述的方法可用于从各种表格格式（如地名志）加载空间数据。类似的方法也可以在 SSIS 包中采用，其中\
    \ `location` 列可以在加载过程中作为派生列计算出来，而不是像本例这样在之后添加。\n\n> **提示**：在填充了 `location` 列之后，如果需要，可以从\
    \ `allCountries` 表中删除 `latitude` 和 `longitude` 列——每个点关联的坐标值可以通过 `location` 列的\
    \ `Lat` 和 `Long` 属性来获取。\n\n## 查询空间数据\n\n既然我们已经导入了一个规模合适的样本数据集，就可以开始编写一些空间查询了，但在编写涉及\
    \ `geometry` 或 `geography` 数据的查询时，有几个重要的注意事项。因为空间数据类型是不可比较的，所以对它们可以使用的查询类型存在某些限制——例如：\n\
    \n*   不能对 `geometry` 或 `geography` 列使用 `ORDER BY`。\n*   不能对空间数据使用 `SELECT DISTINCT`，也不能对包含\
    \ `geography` 或 `geometry` 数据的两个结果集使用 `UNION`。但是，可以对两个数据集使用 `UNION ALL`。\n*  \
    \ 不能使用常规的查询比较运算符，例如 `WHERE t1.shape = t2.shape`，但可以使用基于 `STEquals()` 方法的谓词来测试两个形状是否相等，例如\
    \ `WHERE t1.shape.STEquals(t2.shape) = 1`。\n\n就实际对空间数据本身执行操作而言，`geography` 和 `geometry`\
    \ 数据类型都提供了一系列用于执行常见计算的方法，包括交集、距离测量以及几何图形的加减操作。"
  raw: 'SQL Server doesn’t provide any specific tools for importing predefined spatial
    data, but there are a number of third-party tools that can be used for this purpose.
    It is also possible to use programmatic techniques based on the functionality
    provided by the SqlServer.Types.dll library, which contains the methods used by
    the geography and geometry datatypes themselves. To demonstrate one method of
    importing spatial data, and to provide some sample data for use in the remaining
    examples in this chapter, we’ll import a dataset from the Geonames web site (www.geonames.org)
    containing the geographic coordinates of locations around the world.


    To begin, download and unzip the main dataset from the Geonames web site, available
    from


    http://download.geonames.org/export/dump/allCountries.zip. This archive contains
    a tab-delimited text file containing nearly 7 million rows, and when unzipped,
    occupies nearly 800MB. If you would like to use a smaller dataset, you can alternatively
    download the


    http://download.geonames.org/export/dump/cities1000.zip archive, which uses the
    same schema but contains a subset of approximately 80,000 records, representing
    only those cities with a population exceeding 1,000 inhabitants.


    „ **Caution** The Geonames allCountries.zip export is a large file (approximately
    170MB), and may take some time to download.


    To store the Geonames information in SQL Server, first create a new table as follows:


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    CREATE TABLE allCountries(


    [geonameid] int NOT NULL,


    [name] nvarchar(200) NULL,


    [asciiname] nvarchar(200) NULL,


    [alternatenames] nvarchar(4000) NULL,


    [latitude] real NULL,


    [longitude] real NULL,


    [feature class] nvarchar(1) NULL,


    [feature code] nvarchar(10) NULL,


    [country code] nvarchar(2) NULL,


    [cc2] nvarchar(60) NULL,


    [admin1 code] nvarchar(20) NULL,


    [admin2 code] nvarchar(80) NULL,


    [admin3 code] nvarchar(20) NULL,


    [admin4 code] nvarchar(20) NULL,


    [population] int NULL,


    [elevation] smallint NULL,


    [gtopo30] smallint NULL,


    [timezone] nvarchar(80) NULL,


    [modification date] datetime NULL


    );


    GO


    I’ve kept all the column names and datatypes exactly as they are defined in the
    Geonames schema, but you may want to adjust them. I personally dislike column
    names that include spaces, such as


    “modification date,” but I also think that when importing data from an external
    source, it is very important to clearly reference how the columns are mapped,
    and the easiest way of doing this is to keep the column names the same as in the
    source.


    There are a variety of methods of importing the Geonames text file into the allCountries
    table—for this example, however, we’ll keep things as simple as possible by using
    the Import and Export Wizard.


    Start the wizard from Management Studio by right-clicking in the Object Explorer
    pane on the name of the database in which you created the allCountries table,
    and select Tasks → Import Data. When prompted to choose a data source, select
    the Flat File Source option, click the Browse button, and navigate to and select
    the allCountries.txt file that you downloaded earlier. From the ‘Code page’


    drop-down, scroll down and highlight 65001 (UTF-8), and then click the Columns
    tab in the left pane.


    On the Columns page, change the Column delimiter to Tab {t}, and then select Refresh
    to preview the data in the file, which should appear as shown in Figure 10-7\.
    Then click Advanced from the left pane.


    On the Advanced pane, click each column name in turn, and configure the column
    properties to match the values shown in Table 10-1.


    ![](index-320_1.png)


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    *Figure 10-7\. Previewing data downloaded from the Geonames web site*


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    *Table 10-1\. Column Properties for Geonames Data*


    **Column Name**


    **DataType**


    **OutputColumnWidth**


    geonameid


    Four-byte signed integer


    [DT_I4]


    name


    Unicode string [DT_WSTR]


    asciiname


    Unicode string [DT_WSTR]


    alternatenames


    Unicode string [DT_WSTR]


    4 latitude


    Float


    [DT_R4]


    5 longitude Float


    [DT_R4]


    feature class


    Unicode string [DT_WSTR]


    feature code


    Unicode string [DT_WSTR]


    country code


    Unicode string [DT_WSTR]


    cc2


    Unicode string [DT_WSTR]


    admin1 code


    Unicode string [DT_WSTR]


    admin2 code


    Unicode string [DT_WSTR]


    admin3 code


    Unicode string [DT_WSTR]


    admin4 code


    Unicode string [DT_WSTR]


    population


    Four-byte signed integer


    [DT_I4]


    elevation


    Two-byte signed integer


    [DT_I2]


    gtopo30


    Two-byte signed integer


    [DT_I2]


    timezone


    Unicode string [DT_WSTR]


    modification date


    Date [DT_DATE]


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    „ **Note** For a full description of the columns available from the Geonames export
    data listed in Table 10-1, please consult http://download.geonames.org/export/dump/readme.txt.


    Once the columns are set up, click Next to proceed, and check that the destination
    database is correctly configured to import the records to the allCountries table.
    Click Next again to finish the import wizard.


    On my laptop, the import takes about 10 minutes, so take this opportunity to stretch
    your legs and get a coffee, if you wish. After the import wizard successfully
    completes the import operation, every column from the Geonames dataset will be
    imported into the allCountries table, but we are not yet making use of the spatial
    capabilities of SQL Server 2008\. Every record in the table has an associated
    latitude and longitude coordinate value, but these are currently held in separate,
    floating point, columns. Since the Geonames coordinates are measured using a geographic
    coordinate system of SRID


    4326, the best way of modeling this data is to add a new geography column to the
    table and populate it with individual Point instances representing each location.
    The following code listing illustrates the TSQL required to add a geography column
    called location, and update it using the Point() method based on the coordinate
    values held in the latitude and longitude columns for each row:


    ALTER TABLE allCountries


    ADD location geography;


    GO


    UPDATE allCountries


    SET location = geography::Point(latitude, longitude, 4326);


    GO


    The approach described here can be used to load spatial data from a variety of
    tabular formats such as gazetteers of place names. A similar method could also
    be adopted in an SSIS package, whereby the location column could be calculated
    as a derived column as part of the load, rather than added afterward as in this
    case.


    „ **Tip** Having populated the location column, the latitude and longitude columns
    could be dropped from the allCountries table if so desired—the individual coordinate
    values associated with each point can be obtained using the Lat and Long properties
    of the location column instead.


    Querying Spatial Data


    Now that we’ve imported a good-sized set of sample data, we can start to write
    some spatial queries against it, but there are a few important considerations
    when writing queries that involve geometry or 302


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    geography data. Because spatial data types are not comparable, there are certain
    restrictions placed on the types of query in which they can be used—for example:


    •


    You can’t ORDER BY a geometry or geography column.


    •


    You can’t SELECT DISTINCT spatial data, nor can you UNION two result sets


    containing geography or geometry data. However, you can UNION ALL two datasets.


    •


    You can’t use regular query comparison operators, such as WHERE t1.shape =


    t2.shape, but you can test whether two shapes are equal by using a predicate


    based on the STEquals() method, such as WHERE t1.shape.STEquals(t2.shape) =


    1.


    In terms of actually performing operations on spatial data itself, the geography
    and geometry datatypes both provide a range of methods for performing common calculations,
    including


    intersections, measuring distances, and addition and subtraction of geometries.'
  trans: "\n# 第十章 处理空间数据\n\nSQL Server 并未提供专门用于导入预定义空间数据的工具，但可以使用一些第三方工具来实现此目的。也可以采用基于\
    \ `SqlServer.Types.dll` 库功能的编程技术，该库包含了 `geography` 和 `geometry` 数据类型本身所使用的方法。为了演示一种导入空间数据的方法，并为本章后续示例提供一些样本数据，我们将从\
    \ Geonames 网站 (www.geonames.org) 导入一个包含世界各地地理位置坐标的数据集。\n\n首先，从 Geonames 网站下载并解压主数据集，地址为：\n\
    ```\nhttp://download.geonames.org/export/dump/allCountries.zip\n```\n该压缩包包含一个制表符分隔的文本文件，其中近有\
    \ 700 万行数据，解压后占用近 800MB 空间。如果想使用更小的数据集，也可以选择下载\n```\nhttp://download.geonames.org/export/dump/cities1000.zip\n\
    ```\n这个压缩包。它使用相同的模式，但仅包含大约 80,000 条记录，代表人口超过 1,000 的城市。\n\n> **注意**：Geonames `allCountries.zip`\
    \ 导出文件是一个大文件（约 170MB），下载可能需要一些时间。\n\n要在 SQL Server 中存储 Geonames 信息，首先按如下方式创建一个新表：\n\
    \n```sql\nCREATE TABLE allCountries(\n    [geonameid] int NOT NULL,\n    [name]\
    \ nvarchar(200) NULL,\n    [asciiname] nvarchar(200) NULL,\n    [alternatenames]\
    \ nvarchar(4000) NULL,\n    [latitude] real NULL,\n    [longitude] real NULL,\n\
    \    [feature class] nvarchar(1) NULL,\n    [feature code] nvarchar(10) NULL,\n\
    \    [country code] nvarchar(2) NULL,\n    [cc2] nvarchar(60) NULL,\n    [admin1\
    \ code] nvarchar(20) NULL,\n    [admin2 code] nvarchar(80) NULL,\n    [admin3\
    \ code] nvarchar(20) NULL,\n    [admin4 code] nvarchar(20) NULL,\n    [population]\
    \ int NULL,\n    [elevation] smallint NULL,\n    [gtopo30] smallint NULL,\n  \
    \  [timezone] nvarchar(80) NULL,\n    [modification date] datetime NULL\n);\n\
    GO\n```\n\n我保留了所有列名和数据类型，完全按照 Geonames 模式中的定义，但你可能需要进行调整。我个人不喜欢包含空格的列名，例如 `[modification\
    \ date]`，但我也认为，当从外部源导入数据时，清楚地引用列的映射方式非常重要，而最简单的方法就是保持列名与源数据一致。\n\n将 Geonames 文本文件导入\
    \ `allCountries` 表有多种方法——然而在本例中，为了尽可能简单，我们将使用导入和导出向导。\n\n在 SQL Server Management\
    \ Studio 中，右键单击“对象资源管理器”窗格中创建了 `allCountries` 表的数据库名称，然后选择“任务” → “导入数据”来启动向导。当提示选择数据源时，选择“平面文件源”选项，单击“浏览”按钮，找到并选择之前下载的\
    \ `allCountries.txt` 文件。从“代码页”下拉列表中，向下滚动并选择 `65001 (UTF-8)`，然后单击左侧窗格中的“列”选项卡。\n\
    \n在“列”页面上，将“列分隔符”更改为`Tab {t}`，然后选择“刷新”以预览文件中的数据，数据应如图 10-7 所示。然后单击左侧窗格中的“高级”。\n\
    \n在“高级”窗格中，依次单击每个列名，并配置列属性以匹配表 10-1 所示的值。\n\n![图 10-7. 预览从 Geonames 网站下载的数据](img/index-320_1.png)\n\
    \n*图 10-7. 预览从 Geonames 网站下载的数据*\n\n*表 10-1. Geonames 数据的列属性*\n\n| **列名** | **数据类型**\
    \ | **输出列宽** |\n| :--- | :--- | :--- |\n| geonameid | 四字节有符号整数 | [DT_I4] |\n|\
    \ name | Unicode 字符串 | [DT_WSTR] |\n| asciiname | Unicode 字符串 | [DT_WSTR] |\n\
    | alternatenames | Unicode 字符串 | [DT_WSTR] |\n| latitude | 浮点数 | [DT_R4] |\n|\
    \ longitude | 浮点数 | [DT_R4] |\n| feature class | Unicode 字符串 | [DT_WSTR] |\n|\
    \ feature code | Unicode 字符串 | [DT_WSTR] |\n| country code | Unicode 字符串 | [DT_WSTR]\
    \ |\n| cc2 | Unicode 字符串 | [DT_WSTR] |\n| admin1 code | Unicode 字符串 | [DT_WSTR]\
    \ |\n| admin2 code | Unicode 字符串 | [DT_WSTR] |\n| admin3 code | Unicode 字符串 |\
    \ [DT_WSTR] |\n| admin4 code | Unicode 字符串 | [DT_WSTR] |\n| population | 四字节有符号整数\
    \ | [DT_I4] |\n| elevation | 两字节有符号整数 | [DT_I2] |\n| gtopo30 | 两字节有符号整数 | [DT_I2]\
    \ |\n| timezone | Unicode 字符串 | [DT_WSTR] |\n| modification date | 日期 | [DT_DATE]\
    \ |\n\n> **注意**：关于表 10-1 中列出的 Geonames 导出数据的列的完整说明，请查阅 `http://download.geonames.org/export/dump/readme.txt`。\n\
    \n设置好列后，单击“下一步”继续，并检查目标数据库是否已正确配置为将记录导入 `allCountries` 表。再次单击“下一步”完成导入向导。\n\n\
    在我的笔记本电脑上，导入大约需要 10 分钟，所以如果需要，可以利用这个时间活动一下腿脚，喝杯咖啡。导入向导成功完成导入操作后，Geonames 数据集中的每一列都将被导入到\
    \ `allCountries` 表中，但我们尚未利用 SQL Server 2008 的空间功能。表中的每条记录都有一个关联的纬度和经度坐标值，但这些值目前存储在不同的浮点数列中。由于\
    \ Geonames 坐标是使用 SRID 为 `4326` 的地理坐标系测量的，因此对此数据建模的最佳方式是向表中添加一个新的 `geography` 列，并使用代表每个位置的各个\
    \ `Point` 实例来填充它。以下代码清单说明了添加名为 `location` 的 `geography` 列并使用基于 `latitude` 和 `longitude`\
    \ 列中坐标值的 `Point()` 方法进行更新所需的 T-SQL：\n\n```sql\nALTER TABLE allCountries\nADD location\
    \ geography;\nGO\n\nUPDATE allCountries\nSET location = geography::Point(latitude,\
    \ longitude, 4326);\nGO\n```\n\n这里描述的方法可用于从各种表格格式（如地名志）加载空间数据。类似的方法也可以在 SSIS 包中采用，其中\
    \ `location` 列可以在加载过程中作为派生列计算出来，而不是像本例这样在之后添加。\n\n> **提示**：在填充了 `location` 列之后，如果需要，可以从\
    \ `allCountries` 表中删除 `latitude` 和 `longitude` 列——每个点关联的坐标值可以通过 `location` 列的\
    \ `Lat` 和 `Long` 属性来获取。\n\n## 查询空间数据\n\n既然我们已经导入了一个规模合适的样本数据集，就可以开始编写一些空间查询了，但在编写涉及\
    \ `geometry` 或 `geography` 数据的查询时，有几个重要的注意事项。因为空间数据类型是不可比较的，所以对它们可以使用的查询类型存在某些限制——例如：\n\
    \n*   不能对 `geometry` 或 `geography` 列使用 `ORDER BY`。\n*   不能对空间数据使用 `SELECT DISTINCT`，也不能对包含\
    \ `geography` 或 `geometry` 数据的两个结果集使用 `UNION`。但是，可以对两个数据集使用 `UNION ALL`。\n*  \
    \ 不能使用常规的查询比较运算符，例如 `WHERE t1.shape = t2.shape`，但可以使用基于 `STEquals()` 方法的谓词来测试两个形状是否相等，例如\
    \ `WHERE t1.shape.STEquals(t2.shape) = 1`。\n\n就实际对空间数据本身执行操作而言，`geography` 和 `geometry`\
    \ 数据类型都提供了一系列用于执行常见计算的方法，包括交集、距离测量以及几何图形的加减操作。\n"
- fmt: "# CHAPTER 10 „ WORKING WITH SPATIAL DATA\n\nIt is important to notice that\
    \ the methods available in a given situation are dependent on the datatype being\
    \ used. Although in most cases there are methods to provide equivalent functionality\
    \ for all operations performed on both the `geometry` and `geography` datatypes,\
    \ there are some methods that can only be applied to one or the other. The most\
    \ noticeable example is that, although both `geometry` and `geography` support\
    \ the ability to test whether two geometries intersect (using the `STIntersects()`\
    \ method), only the `geometry` datatype provides the methods required to test\
    \ the specific *sort* of intersection—whether one geometry crosses, overlaps,\
    \ touches, or is contained within another. Some other methods provide equivalent\
    \ functionality for the two types under a different name: for example, `Lat()`\
    \ and `Long()`, which return the coordinate values of a `geography` instance,\
    \ provide equivalent functionality to `STY()` and `STX()` in the `geometry` datatype.\n\
    \nIn general, the methods available using either type can be classified into one\
    \ of two categories: Methods that adhere to the OGC specifications are prefixed\
    \ by the letters `ST` (an abbreviation for *spatiotemporal*). In general, these\
    \ methods provide basic functionality for working with spatial instances, such\
    \ as `STIntersects()`, used to determine whether one instance intersects another;\
    \ `STDistance()`, used to calculate the shortest distance between two instances;\
    \ and `STArea()`, used to calculate the area contained within a polygon instance.\n\
    \nSQL Server also provides a number of **extended methods**, which provide additional\
    \ functionality on top of the OGC standard. These include `Reduce()`, which simplifies\
    \ a `geometry`; `BufferWithTolerance()`, which applies a buffer within a given\
    \ tolerance limit; and `Filter()`, which performs an approximate test of intersection\
    \ based on a spatial index.\n\nIn this section, I won’t discuss every available\
    \ method—you can look these up on `SQL Server Books Online` (or in *Beginning\
    \ Spatial with SQL Server 2008*). Instead, I’ll examine a couple of common scenarios\
    \ and illustrate how you can combine one or more methods to solve them. Before\
    \ we begin, let’s create a clustered primary key and a basic spatial index on\
    \ the `allCountries` table to support any queries executed against it:\n\n```sql\n\
    ALTER TABLE allCountries\nADD CONSTRAINT PK_geonameid\nPRIMARY KEY (geonameid\
    \ );\nGO\n\nCREATE SPATIAL INDEX idxallCountries\nON allCountries(location) USING\
    \ GEOGRAPHY_GRID\nWITH (\n    GRIDS =(\n        LEVEL_1 = MEDIUM,\n        LEVEL_2\
    \ = MEDIUM,\n        LEVEL_3 = MEDIUM,\n        LEVEL_4 = MEDIUM),\n    CELLS_PER_OBJECT\
    \ = 16);\n```\n\nI’ll cover spatial indexes later in this chapter, so don’t worry\
    \ if you’re not familiar with the syntax used here—it will become clear soon!\n\
    \n## Nearest-Neighbor Queries\n\nPerhaps the most commonly asked question regarding\
    \ spatial data is, “Where is the closest *x* to a given location?” or in the more\
    \ general case, “How do we identify the nearest *n* features to a location?” This\
    \ type of query is generally referred to as a **nearest-neighbor** query, and\
    \ there are a number of ways of performing such a query in SQL Server 2008.\n\n\
    The simplest method that springs to mind is to order a dataset based on the result\
    \ of the `STDistance()` method, sorting all records in ascending order of distance\
    \ from the given point, so that the top *n* records can be easily identified.\
    \ This approach is demonstrated in the following query:\n\n```sql\nDECLARE @Point\
    \ geography;\nSET @Point = geography::STPointFromText('POINT(0 52)', 4326);\n\n\
    SELECT TOP 3\n    name,\n    location.STAsText() AS WKT,\n    location.STDistance(@Point)\
    \ AS Distance\nFROM\n    allCountries\nORDER BY\n    location.STDistance(@Point)\
    \ ASC;\n```\n\n**Caution** This query is perfectly valid and will lead to the\
    \ correct results being obtained. However, it will take a very long time to execute,\
    \ as will be explained in the following section. Rather than wasting time and\
    \ server resources, you might want to just take my word for it and try the next\
    \ example instead!\n\nThe preceding query defines a `geography` Point instance\
    \ located at latitude 52 degrees and longitude 0 degrees, using the spatial reference\
    \ system SRID 4326. It then orders the results of the query from the `allCountries`\
    \ table based on their distance from this point, and returns the top three results\
    \ as follows:\n\nName | WKT | Distance\n--- | --- | ---\nPeriwinkle Hill | POINT\
    \ (-0.00112 52.0055) | 616.78524720001\nBarkway | POINT (0.0166667 52) | 1144.6358911887\n\
    Reed | POINT (-0.0166667 52) | 1144.6358911887\n\nAlthough this query correctly\
    \ identifies and returns the nearest *n* results, there is a fundamental problem\
    \ with this approach; `STDistance()` is a computationally expensive method, and\
    \ the preceding query must evaluate the result of this method on every one of\
    \ the rows in the result set to order them and select the closest *n* records.\
    \ This results in a table scan of 6.9 million rows, and the spatial index doesn’t\
    \ provide any help here because every row must be evaluated before the results\
    \ can ordered.\n\nPerforming a nearest-neighbor search like this on a table containing\
    \ many rows is very slow and costly, as you will no doubt have discovered if you\
    \ tried executing the example yourself!\n\nAn alternative method for finding nearest\
    \ neighbors involves a two-stage approach. The first stage is to use the index\
    \ to identify a set of likely nearest-neighbor candidates, based on those records\
    \ that lie within a predetermined buffer around the feature in question. The size\
    \ of the buffer is chosen to be large enough so that it contains the required\
    \ number of nearest neighbors, but not so large that it includes lots of additional\
    \ rows of data that exceed the desired number of results. The second stage of\
    \ this method uses the `STDistance()` method as before, but only to calculate\
    \ the distance of those candidate records lying within the buffer area, rather\
    \ than processing and sorting the whole table. By being selective in choosing\
    \ the candidate records to sort, we can take advantage of the spatial index.\n\
    \nThe following listing demonstrates this approach, using `STBuffer(25000)` to\
    \ identify candidate records that lie within a 25km search area:\n\n```sql\nDECLARE\
    \ @Point geography;\nSET @Point = geography::STPointFromText('POINT(0 52)', 4326);\n\
    \nDECLARE @SearchArea geography;\nSET @SearchArea = @Point.STBuffer(25000); --25km\
    \ search radius\n\nDECLARE @Candidates table (\n    Name varchar(200),\n    Location\
    \ geography,\n    Distance float\n);\n\nINSERT INTO @Candidates\nSELECT\n    name,\n\
    \    location,\n    location.STDistance(@Point) AS Distance\nFROM\n    allCountries\n\
    WITH(INDEX(idxallCountries))\nWHERE\n    location.Filter(@SearchArea) = 1;\n\n\
    SELECT TOP 3 * FROM @Candidates ORDER BY Distance;\n```\n\n**Note** Notice that\
    \ in the preceding example query, I explicitly included an index hint, `WITH(INDEX(idxallCountries))`,\
    \ to ensure that the query optimizer chooses a plan using the `idxallCountries`\
    \ spatial index. The cost-based estimates for spatial queries are not always accurate,\
    \ which means that SQL Server 2008 does not always pick the optimal plan for a\
    \ query. SQL Server 2008 SP1 improves the situation, but there are still occasions\
    \ when an explicit hint is required to ensure that a spatial index is used.\n\n\
    As in the last example, this approach correctly identifies the three closest cities.\
    \ The advantage of the buffer approach is that, by first filtering the set of\
    \ candidate results to only those that lie within the vicinity of the feature,\
    \ the number of times that `STDistance()` needs to be called is reduced, and the\
    \ dataset to be sorted becomes much smaller, making the query significantly faster\
    \ than the basic nearest-neighbor approach described previously. The locations\
    \ lying within the buffer zone can be identified using a spatial index seek, as\
    \ illustrated in the execution plan shown in Figure 10-8. On my laptop, the top\
    \ three nearest neighbors are now obtained in just 33ms, whereas the time taken\
    \ to execute the first query was over an hour!"
