    ## 数据库世界的软件开发方法论


    数据库是软件。因此，数据库应用程序开发应该以与任何其他形式的软件开发相同的方式对待。然而，在开发团队讨论架构和测试计划时，数据库常常被视为次要实体，而且许多数据库开发人员仍然没有意识到或将标准的软件开发最佳实践应用于数据库应用程序。


