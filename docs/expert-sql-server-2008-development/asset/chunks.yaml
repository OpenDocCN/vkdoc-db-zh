  trans: '

    在本章中，我的目的不是提供关于数据库加密的权威指南。相反，我将提供一个实用指南，介绍如何使用 SQL Server 2008 的主要加密功能，来创建一个安全、可扩展且能够处理机密数据的数据库应用程序。显然，这样的解决方案前提是其他安全方面，包括用户访问控制和网络保护，已经得到了充分的解决。我将特别关注前文段落中指出的两个主要问题——即，如何安全地存储和管理加密密钥的访问权限，以及如何设计一个既能保护敏感数据，又能最小化对性能负面影响的数据库应用程序架构。


    ## 你真的需要加密吗？


    在着手解决如何为特定数据集实施加密之前，有必要先考虑是否真的需要加密。加密是一种保护数据的方法，因此关键问题是：你试图保护*什么*数据，以及试图防止*谁*（或什么）获取它。


    ### 什么应该被保护？


    所有数据都很重要。如果它不重要，我们一开始就不会费心将它存储在数据库中。但这并不一定意味着所有数据都需要加密。


    SQL Server 2008 中的大多数加密方法提供 `单元级加密`，它应用于单个数据项，或包含敏感信息的表列。相比之下，透明数据加密（SQL Server
    2008 的一项新功能）则应用 `数据库级加密` 到整个数据库，它通过加密文件系统上的底层数据库文件来实现。这些方法不仅在作用范围上不同，而且对于任何使用加密数据的应用程序的设计都有显著不同的影响。


    在决定加密策略之前，对数据进行分类以识别泄露风险以及泄露后果的严重性至关重要。以下是一些可能需要加密的数据类型示例：


    *   许多组织定义了一个或多个级别的 `敏感数据`——即，如果落入错误之手，可能对业务造成负面影响的信息。此类信息可能包括定价信息、利润预测或即将进行的营销计划。如果竞争对手获取了此类信息，可能对未来的销售产生严重后果。

    *   越来越多的政府正在通过法律和监管要求，规定必须实施某些最低安全标准来保护机密的客户数据，而这可能包括加密。未能满足这些标准可能导致公司面临巨额罚款，甚至被迫停止交易。

    *   某些客户可能会在客户服务级别协议中规定所需的最低保护级别。在某些情况下，详细要求会明确规定哪些数据项必须加密、使用的加密算法类型、加密密钥的最小长度以及密钥必须轮换的时间表。

    *   在许多情况下，对员工记录进行加密可能是有益的，特别是那些包含工资信息或其他个人信息的记录，以防止系统管理员或其他有权访问此类数据的用户进行随意窥探。


    对业务需求进行透彻分析，以识别所有需要保护的数据元素，并确定应如何保护这些数据，对于确保任何提出的加密解决方案在满足安全需求的同时平衡性能要求至关重要。此外，与加密相关的应用程序设计和业务流程的变更通常会产生成本，因此能够根据从加密中获得的预期收益来证明该成本的合理性非常重要。


    ### 你在防范什么？

    '
- fmt: '# CHAPTER 6 ENCRYPTION


    Perhaps the most basic protection that encryption can offer is against the risk
    posed to `data at rest`. In SQL Server, `data at rest` refers to the underlying
    database files stored on the filesystem, including transaction logs and backups.
    If an unauthorized third party could gain access to those files, it would be possible
    for them to copy and restore the database onto their own system, allowing them
    to browse through your data at their leisure. If sensitive data were stored in
    the database in an encrypted format, however, the attacker would also need to
    know the relevant keys or passwords to decrypt the stolen data, without which
    it would be worthless to them.


    Besides physical theft of database files, hackers and external threats pose a
    continuing risk to database security. Hackers are often very knowledgeable, and
    well-equipped with a range of tools to try to sniff out and exploit any weaknesses
    in your security systems. By ensuring that all data transmitted over a network
    is securely encrypted, you can be sure that it can only be understood by its intended
    recipient, reducing the chance of it being successfully intercepted and used against
    you.


    Many organizations also recognize the threat to data security arising from internal
    sources. Disgruntled DBAs and developers testing the limits of their authorization
    can access data they do not require in order to do their jobs. Such information
    could easily find its way out of the organization and into the wrong hands if
    the right price were offered. If properly designed and deployed, an encryption
    strategy can prevent this risk from occurring.


    Remember that encryption is not a replacement for other security measures, such
    as appropriate authentication and authorization procedures. However, if implemented
    correctly, it can provide an additional level of security that might be the difference
    between your data becoming exposed and remaining secret as intended.


    ## SQL Server 2008 Encryption Key Hierarchy


    All of the encryption methods in SQL Server, as in almost all civilian cryptography,
    are based on standardized, publicly available encryption algorithms. In many ways,
    this is a good thing: these algorithms have been developed by some of the world’s
    leading information theorists and, in general, have been proven to withstand concentrated,
    deliberate attack. However, this use of public knowledge places an interesting
    assumption on the design of any database application that deals with confidential
    data, namely, `The enemy knows the system`.


    Shannon’s maxim, as the preceding statement is commonly known, is a restatement
    of earlier work by the Dutch cryptographer Auguste Kerchoffs. Kerchoffs proposed
    a number of principles that, if followed, ensured that military ciphers could
    remain secure, even when some facts about the system became revealed. Originally
    published in a French journal, `le Journal des Sciences Militaires`, in 1883,
    these principles are still very relevant in modern cryptography.


    All of the SQL Server encryption methods use an algorithm based on a secret key,
    or a password from which a key is generated. If we assume that Shannon’s maxim
    holds (i.e., that the details of any encryption algorithm used are public knowledge),
    then the security of your encrypted data rests *entirely* on protection of the
    secret key that the algorithm uses to decrypt and encrypt data. Creating a safe
    environment in which to store your keys must therefore be considered a top priority
    of any encryption strategy. Indeed, the issues of secure key management and distribution
    are among the most important areas of modern cryptography, as a failure to properly
    protect encryption keys compromises your entire security strategy. Before investigating
    the different types of encryption available in SQL Server, it is first necessary
    to consider how to manage the keys on which those encryption methods are based.


    ### The Automatic Key Management Hierarchy


    The way in which SQL Server addresses the problem of secure key management is
    to implement a hierarchy of encryption keys, with each key providing protection
    for those keys below it. The `automatic key management` hierarchy is illustrated
    in Figure 6-1.


    *Figure 6-1. The default automatic key management hierarchy in SQL Server 2008*


    The main features of the automatic key management hierarchy are described under
    the headings that follow.


    #### Symmetric Keys, Asymmetric Keys, and Certificates


    At the lowest level, items of data are encrypted with a `symmetric key`, the public
    key of an `asymmetric key pair`, or a `certificate`. These keys and certificates
    are stored in the user database in which they were created. Each of these three
    methods offers different advantages and disadvantages, which will be discussed
    later in this chapter.


    The syntax for creating each type of key differs slightly, but follows the same
    basic pattern: listing the name of the key, the encryption algorithm to be used,
    the name of the database user who will own the key, and the method by which the
    key will be protected. For example, the following code listing demonstrates the
    syntax required to create an asymmetric 1,024 bit key using the Rivest, Shamir,
    and Adleman (RSA) algorithm, owned by the database user Tom:


    ```sql

    CREATE ASYMMETRIC KEY ExampleAsymKey

    AUTHORIZATION Tom

    WITH ALGORITHM = RSA_1024;

    ```


    In this example, there is no explicitly specified method of protection, so the
    key will be protected by the automatic key hierarchy. By default, this means that
    keys and certificates are protected by the `database master key` (DMK) of the
    database in which they reside.


    #### Database Master Key


    Each user database on a server can have its own DMK, which is a symmetric key
    stored in both the `master` database and the user database. The DMK is protected
    by two different forms of encryption: an encryption using the Triple DES (Data
    Encryption Standard) algorithm based on the `service master key` (SMK) of the
    server, and also encryption by a password.


    Even though protected by both the SMK *and* a password, by default SQL Server
    can automatically open the DMK when required by decrypting with the SMK alone,
    without needing to be supplied with the password. This means that users of any
    dependent private keys protected by the DMK do not need to be granted explicit
    rights to open the DMK. Users only require permissions on the individual dependent
    keys or certificates, as SQL Server will open the DMK to access those keys as
    necessary. This has some implications for protecting data from `sysadmins` and
    `db_owners`, which will be discussed later.


    A DMK can be created by running the `CREATE MASTER KEY` statement in the database
    in which the key is to be stored, as follows:


    ```sql

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''5Tr()ng_p455woRD_4_dA_DMK!!!'';

    ```


    **Note:** Each database can have only one associated DMK. If you followed the
    examples in Chapter 5, you may have already created a DMK in order to create a
    proxy database user from a certificate.


    #### Service Master Key


    The SMK is a symmetric key that sits at the top of the SQL Server encryption hierarchy,
    and is used to encrypt all DMKs stored on the server, as well as protect logins
    and credentials associated with linked servers.


    The SMK is protected by the `Data Protection API` (DPAPI) of the operating system,
    using the service account credentials and the machine credentials of the SQL Server.
    If either one of these credentials becomes invalid (such as, for example, if the
    service account is changed), SQL Server will re-create the invalid key based on
    the remaining valid key. This ensures that the SMK will remain robust from all
    but the most severe of failures. There is no command to create an SMK; it is created
    automatically the first time it is required and stored in the `master` database.'
