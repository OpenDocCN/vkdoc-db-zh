- fmt: '# CHAPTER 6：ENCRYPTION


    ## Balancing Performance and Security


    *Figure 6-6. A hybrid approach to encryption.*


    The elements of the hybrid encryption structure can be described as follows:


    *   Data is encrypted using a symmetric key, which provides the best-performing
    encryption method. I recommend encryption based on the `AES` algorithm, and choosing
    a key length appropriate for your needs. Longer keys provide more protection,
    but also require more processing overhead.


    *   The symmetric key is protected by one or more certificates, which provide
    the strength of asymmetric encryption together with additional benefits, such
    as the ability to back up and restore certificates from `T-SQL`, as well as the
    option to set explicit start and expiration dates for the validity of the certificate.
    I tend to create one certificate for each user or group of users that need access
    to the symmetric key. Those same certificates can also be used to encrypt other
    keys required by that user or group of users.


    *   Each certificate is protected with a (strong) password, so that it can only
    be accessed by individuals with knowledge of the password. This means that encrypted
    information is kept secret from sysadmins, who could otherwise use the `DMK` to
    open the certificate and underlying symmetric key.


    *   Further layers of encryption can be added to this model by protecting the
    symmetric key with further symmetric keys prior to encryption by the certificate.
    Each additional layer creates a further barrier for potential hackers to break,
    and also makes key rotation much easier to facilitate.


    To illustrate how to create the hybrid encryption model just described, first
    create two users:


    ```sql

    CREATE USER FinanceUser WITHOUT LOGIN;

    CREATE USER MarketingUser WITHOUT LOGIN;

    GO

    ```'
