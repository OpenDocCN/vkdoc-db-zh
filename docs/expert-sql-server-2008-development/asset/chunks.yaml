    \    `HMAC = HASH( “This is the original message” + “salt”)`\n3.  发送方将原始消息和 `HMAC`\
    \ 一起传输给接收方。\n4.  接收方收到消息后，会将约定的盐值附加到收到的消息上，然后自行对结果进行哈希运算。接着，他们会检查结果是否与提供的 `HMAC`\
    \ 值相同。\n\n`HMAC` 是一种相对简单但非常有效的方法，用于确保目标接收方可以验证消息的真实性。如果有人试图拦截并篡改消息，它将与提供的 `HMAC`\
    \ 值不匹配。攻击者也无法生成新的匹配 `HMAC` 值，因为他们不知道需要应用的秘密盐值。\n\n实施基于 `HMAC` 的解决方案的第一步，是定义一种安全存储盐值（或\
    \ `密钥`）的方法。在本例中，我们将盐值存储在一个单独的表中，并使用安全的非对称密钥对其进行加密。\n\n```sql\nCREATE ASYMMETRIC\
    \ KEY HMACASymKey\nWITH ALGORITHM = RSA_1024\nENCRYPTION BY PASSWORD = N'4n0th3r_5tr0ng_K4y!';\n\
    GO\n\nCREATE TABLE HMACKeys (\n    HMACKeyID int PRIMARY KEY,\n    HMACKey varbinary(255)\n\
    );\nGO\n\nINSERT INTO HMACKeys\nSELECT\n    1,\n    ENCRYPTBYASYMKEY(ASYMKEY_ID(N'HMACASymKey'),\
    \ N'-->Th15_i5_Th3_HMAC_kEy!');\nGO\n```\n\n现在我们可以基于密钥创建一个 `HMAC` 值。你可以通过在 `T-SQL`\
    \ 中简单地使用 `HASHBYTES` 并将盐值附加到原始消息后面来创建一个简单的 `HMAC`，如下所示：\n\n```sql\nDECLARE @HMAC\
    \ varbinary(max) = HASHBYTES('SHA1', 'PlainText' + 'Salt')\n```\n\n然而，这种方法可以通过多种方式得到改进：\n\
    \n*   `HASHBYTES` 函数仅基于任何输入的前 8000 字节创建哈希值。如果消息长度等于或超过此值，则附加在消息内容后的任何盐值都将被忽略。因此，最好先提供盐值，*然后*再提供要哈希的消息。\n\
    *   根据联邦信息处理标准 (`FIPS PUB 198`, `http://csrc.nist.gov/publications/fips/fips198/fips-198a.pdf`)\
    \ 定义的 `HMAC` 规范，实际上对明文进行了两次哈希运算，如下所示：\n    `HMAC = HASH(Key1 + HASH(Key2 + PlainText))`\n\
    \    根据 `FIPS` 标准，`Key1` 和 `Key2` 是通过将提供的盐值填充到哈希函数密钥的块大小来计算的。`Key1` 用字节 `0x5c`\
    \ 填充，`Key2` 用字节 `0x36` 填充。这两个值特意选择具有较大的 `汉明距离`——也就是说，生成的填充密钥将彼此显著不同，从而最大化使用两个密钥进行哈希的增强效果。\n\
    *   `HMAC` 标准并未指定使用哪种哈希算法来执行哈希运算，但最终生成的 `HMAC` 的强度与其所基于的底层哈希函数的加密强度直接相关。`HASHBYTES`\
    \ 函数仅支持使用 `MD2`、`MD4`、`MD5`、`SHA` 和 `SHA1` 算法进行哈希。相比之下，`.NET Framework` 提供的哈希方法则支持更安全的\
    \ `SHA2` 系列算法，以及 160 位的 `RIPEMD160` 算法。\n\n看来 `SQL Server` 的基础 `HASHBYTES` 函数还有待改进，但幸运的是有一个简单的解决方案。为了创建一个符合\
    \ `FIPS` 标准、基于强哈希算法的 `HMAC`，我们可以采用一个 `CLR` 用户定义函数，该函数使用 `.NET` `System.Security`\
    \ 命名空间提供的方法。以下代码清单说明了创建一个可重用类所需的 `C#` 代码，该类可用于为所有支持的哈希算法和给定密钥生成 `HMAC` 值：\n\n\
    ```csharp\n[SqlFunction(IsDeterministic = true, DataAccess = DataAccessKind.None)]\n\
    public static SqlBytes GenerateHMAC\n(\n    SqlString Algorithm,\n    SqlBytes\
    \ PlainText,\n    SqlBytes Key\n)\n{\n```\n"
