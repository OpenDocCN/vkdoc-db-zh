    ```\n\n**注意**：使用位掩码值 `1` 调用 `sp_configure 'affinity mask'` 会将所有 SQL Server 线程分配给处理器\
    \ `0`，而不管系统上有多少个 CPU 核心。设置此选项时应极其谨慎，即使在测试环境中也是如此。\n\n## 在我的系统上更改 CPU 关联掩码的结果如图\
    \ 9-4 所示。\n\n最终，我们似乎接近了预期的结果，但看到的不是资源池之间 90:10 的分割，而是看起来像 45:5——这是池之间的正确比例，但另外\
    \ 50%的资源到哪里去了？\n\n原因在于，“CPU 使用率%”性能计数器是基于服务器上的 CPU 数量进行标准化的。在这种情况下，我在一台双处理器机器上运行测试，但我刚刚将\
    \ SQL Server 关联掩码设置为仅允许 SQL Server 处理器线程在一个处理器上运行。因此，所有 CPU 使用率百分比的测量值都是其预期值的一半，最大\
    \ CPU 使用率数字为 50%。\n\n![](img/index-297_1.png)\n\n*图 9-4\\. 将 CPU 关联设置为单个处理器后资源池之间的\
    \ CPU 使用情况*\n\n## 计算有效最大值和共享最大资源分配\n\n在高并发环境中，很少有每个请求都被平等对待的情况。在许多情况下，业务要求确保某些定义的用户组或特定查询集获得优先处理，以保证快速响应时间。来自高优先级用户的查询或必须在特定时间范围内完成以确保满足客户服务级别协议的查询可能需要特殊处理。\n\
    \n到目前为止，我已经演示了资源调控器如何在某些场景下用于限制最大服务器资源使用，但更实际的情况涉及保证查询可用的*最小*资源。通过在不同的资源池的 `MAX_CPU_PERCENT`\
    \ 和 `MIN_CPU_PERCENT`（以及对应的 `MIN_MEMORY_PERCENT` 和 `MAX_MEMORY_PERCENT`）上设置适当的限制，很容易将优先请求分类到专用资源池，该池接收服务器\
    \ CPU 和内存资源的保证最小份额，同时限制给予其他池的资源。\n\n要理解不同池设置之间的相互作用，假设我们希望 `PoolA` 作为我们的优先池，`PoolB`\
    \ 作为我们的普通池。为了实现这一点，我们将规定 `PoolA` 应具有 30%的最小 CPU 资源和 90%的最大 CPU 资源。我们将规定 `PoolB`\
    \ 的 CPU 最小为 0%，最大 CPU 限制为 50%。可以使用以下 T-SQL 进行这些更改：\n\n```sql\nALTER RESOURCE POOL\
    \ PoolA\nWITH (\n    MIN_CPU_PERCENT = 30,\n    MAX_CPU_PERCENT = 90\n);\n\nALTER\
    \ RESOURCE POOL PoolB\nWITH (\n    MIN_CPU_PERCENT = 0,\n    MAX_CPU_PERCENT =\
    \ 50\n);\n\nALTER RESOURCE GOVERNOR RECONFIGURE;\nGO\n```\n\n现在，这些设置如何影响池之间的资源分配方式？\n\
    \n记住，`MAX_CPU_PERCENT` 限制仅在存在资源争用时才会强制执行。`PoolA` 指定了 30%的最小服务器 CPU 使用率。然而，由于 `PoolB`\
    \ 仅请求最多 50%的 CPU，这两个请求都可以在没有争用的情况下被满足。因此，此情况下每个池的**有效最大值** CPU 使用率与请求的最大值相同：`PoolA`\
    \ 为 90%，`PoolB` 为 50%。\n\n对于 `PoolA`，有效最大 CPU 的 30%来自专用资源，而剩余的 60%来自共享资源池，因此取决于服务器上其他请求的其他需求。`PoolB`\
    \ 没有指定最小 CPU 百分比，因此其 50%的有效最大 CPU 使用率全部来自共享资源池。\n\n**注意**：有关有效最大值限制的更多信息，请参阅以下联机丛书页面：http://msdn.microsoft.com/en-us/library/bb934084.aspx。\n\
    \n现在让我们看看，如果我们创建第三个资源池会发生什么，如下所示：\n\n```sql\nCREATE RESOURCE POOL PoolC\nWITH\
    \ (\n    MIN_CPU_PERCENT = 15,\n    MAX_CPU_PERCENT = 100\n);\n```\n\n创建这个新资源池的效果如下：\n\
    \n*   `PoolA` 现在的有效最大 CPU 使用率为 85%。必须将之前 90%的有效最大值降低，以确保可以满足 `PoolC` 15%的 `MIN_CPU_PERCENT`\
    \ 请求。`PoolA` 现在从共享资源池获取其最大有效 CPU 资源的 55%。\n*   `PoolB` 保持不变，有效最大 CPU 资源为 50%，全部取自共享资源池。\n\
    *   `PoolC` 的有效最大 CPU 资源为 70%（因为必须满足 `PoolA` 30%的最小请求），其中 55%的资源来自共享资源池。\n\n请注意，在本节中，我仅演示了使用\
    \ `MIN_CPU_PERCENT` 和 `MAX_CPU_PERCENT` 分配 CPU 资源，但相同的资源平衡规则也可以应用于使用 `MIN_MEMORY_PERCENT`\
    \ 和 `MAX_MEMORY_PERCENT` 分配给资源池的内存资源。通过为每个资源池设置适当的限制，可以在服务器上有限资源存在竞争时平衡不同类别请求的需求。请始终记住，这些不是硬性限制，而是用于在存在争用时计算资源分配方式。在没有争用时，资源池可以消耗服务器上的所有可用资源，即使其他资源池指定了最小值。\n\
    \n## 控制并发请求处理\n"
- fmt: "# 第九章 设计高并发应用程序系统\n\n虽然上一节讨论了如何更改资源调控器使用的各种资源池的可用资源量，但考虑查询请求所分配的工作负载组的配置也同样重要。在高并发环境中，一个特别值得关注的选项是\
    \ `GROUP_MAX_REQUESTS` 设置，该设置限制在给定工作负载组中将处理的并发请求数。一旦达到最大请求限制，此工作负载组的任何额外请求都将进入等待状态，直到容量可用为止。\n\
    \n在继续之前，请取消任何可能仍在运行的 `ostress` 窗口。\n\n然后通过执行以下 T-SQL 重置查询计划缓存、资源调控器统计信息以及 DMV\
    \ 表中的等待统计信息：\n\n```sql\nALTER RESOURCE GOVERNOR RESET STATISTICS;\nDBCC FREEPROCCACHE;\n\
    DBCC SQLPERF('sys.dm_os_wait_stats', CLEAR);\nGO\n```\n\n现在打开一个新的 RML 命令提示符，并使用\
    \ `ostress` 工具通过 500 个线程各执行一个简单查询 100 次，总共创建 50,000 个请求：\n\n```cmd\nostress -U\"\
    UserA\" -P\"password\" –Slocalhost -Q\"DECLARE @table TABLE (x varchar(4000));\
    \ INSERT INTO @table SELECT REPLICATE('a',4000);\" -n500 -r100 –q\n```\n\n当 `ostress`\
    \ 完成后，您将看到完成所有查询所需的总耗时。在我的笔记本电脑上，报告的时间是 00:03:23.255。\n\n回到 SQL Server Management\
    \ Studio，我们可以使用以下 T-SQL 检查这些查询的性能：\n\n```sql\nSELECT\n    total_request_count\
    \ AS requests,\n    total_queued_request_count AS queued,\n    total_lock_wait_count\
    \ AS locks,\n    CAST(total_cpu_usage_ms AS decimal(18,9)) / total_request_count\n\
    \        AS avg_cpu_time,\n    max_request_cpu_time_ms AS max_cpu_time\nFROM\n\
    \    sys.dm_resource_governor_workload_groups\nWHERE\n    name = N'GroupA';\n\
    ```\n\n```\nrequests queued locks avg cpu_time max_cpu_time\n50500    0      627216\
    \ 3.52998019801980198019801980198 80\n```\n\n现在，让我们更改资源调控器设置，将此工作负载组允许的最大并发请求数限制为三。这将创建一个队列。\n\
    \n```sql\nALTER WORKLOAD GROUP GroupA\nWITH ( GROUP_MAX_REQUESTS = 3 )\nUSING\
    \ PoolA;\nALTER RESOURCE GOVERNOR RECONFIGURE\nGO\n```\n\n在再次运行测试之前，重置统计信息表：\n\
    \n```sql\nALTER RESOURCE GOVERNOR RESET STATISTICS;\nDBCC FREEPROCCACHE;\nDBCC\
    \ SQLPERF('sys.dm_os_wait_stats', CLEAR);\nGO\n```\n\n然后完全按照之前的方式重新运行 `ostress`\
    \ 测试。这次在我的系统上，所有查询的最终执行时间是 00:03:03.257。通过限制工作组的最大并发请求数，在此示例中处理 50,000 个查询队列所花费的总时间减少了大约\
    \ 10%。\n\n尽管乍一看这个结果可能令人惊讶，但它实际上完全合理。为了理解发生了什么，请重新运行之前对 `sys.dm_resource_governor_workload_groups`\
    \ DMV 的查询。我在系统上的结果如下所示：\n\n```\nrequests queued locks avg cpu_time max_cpu_time\n\
    50500    48372 36727 3.46671287128712871287128712871 54\n```\n\n由于我们将 `GROUP_MAX_REQUESTS`\
    \ 设置为 3，正如预期的那样，发送到 `GroupA` 工作负载组的请求被迫等待，同时满足每个请求所需的总体平均 CPU 时间基本保持相似。\n\n然而，当并发请求较少时，每个查询因其他线程锁定的资源而产生的等待会显著减少。在此特定示例中，减少锁等待带来的益处超过了资源调控器限制所带来的等待时间成本。结果，不仅处理请求队列的总耗时减少了，而且完成每个查询所用时间的一致性也提高了（只有三个并发请求时最大\
    \ CPU 时间为 54ms，而之前的示例中是 80ms）。\n\n## 提示\n如果您对查找有关资源调控器所施加等待的进一步统计信息感兴趣，请尝试在 `sys.dm_os_wait_stats`\
    \ DMV 中查找 `wait_type` 为 `RESMGR_THROTTLED` 的行。\n\n## 总结\n并发性是一个复杂的主题，有许多可能的解决方案。在本章中，我介绍了从业务流程和数据碰撞角度应该考虑的各种并发模型，并解释了它们与\
    \ SQL Server 数据库引擎支持的类似命名的并发模型有何不同。悲观并发可能是最常用的形式，但其设置和维护可能很复杂。乐观并发虽然更轻量级，但可能不适用于许多业务场景；而多值并发控制虽然是一项新颖的技术，但其实现方式可能难以在提供除性能提升之外的价值的同时允许碰撞。\n\
    \n最后，我概述了在并发环境中，资源调控器如何平衡有限资源在不同竞争请求之间的分配方式。这里的讨论仅触及了这一技术潜力的皮毛，我建议对此主题感兴趣的读者花些时间进一步研究这个强大的功能。\n\
    \n# 第十章 处理空间数据\n\n空间功能的添加是 SQL Server 2008 中引入的最激动人心的新功能之一。尽管对于许多 SQL 开发人员来说，这通常是一个新概念，但处理空间数据的原理已经确立了很多年。专用的地理信息系统（GIS），例如\
    \ ESRI 的 ARC/INFO，自 1970 年代以来就已经存在。然而，直到最近，空间数据分析一直被视为一个独特、小众的主题领域，空间数据的知识和使用在很大程度上仍局限于其自身领域内，而未与主流开发集成。\n\
    \n事实上，几乎没有哪个企业数据库不存储某种形式的空间信息。客户的地址、销售区域、本地营销活动针对的区域，或者配送和物流车辆所采取的路线，都是可以在许多常见应用程序中找到的空间数据。\n\
    \n在本章中，我将首先描述处理空间数据所涉及的一些基本原理，然后讨论 `geometry` 和 `geography` 数据类型的一些重要特性，这些数据类型是\
    \ SQL Server 中用于表示空间数据和对空间数据执行操作的具体数据类型。\n\n在演示了如何使用这些方法来回答一些常见的空间问题之后，我将集中讨论创建高性能空间应用程序需要考虑的要素。\n\
    \n> **注意** 处理空间数据带来了一系列独特的挑战，并且在许多情况下，与其他传统数据类型相比，需要采用特定的技术和理解。如果您对 SQL Server\
    \ 中的空间数据更全面的介绍感兴趣，我推荐阅读我之前的另一本书《*Beginning Spatial with SQL Server 2008*》（Apress，2008）。\n\
    \n## 空间数据建模\n空间数据描述对象在空间中的位置、形状和方向。这些对象可以是具体的、物理的事物，如办公楼、铁路或山脉；也可以是抽象的特征，例如标记国家之间政治边界的想象线，或特定商店服务的区域。\n\
    \nSQL Server 采用空间数据的矢量模型，其中每个对象都使用一个或多个**几何体**来表示——这些原始形状近似于它们所代表的真实世界对象的形状。\n\
    \n`geometry` 和 `geography` 数据类型可以使用三种基本类型的几何体：点（`Point`）、线串（`LineString`）和多边形（`Polygon`）："
  raw: 'Whereas the previous section discussed changing the amount of resources available
    to various resource pools used by the Resource Governor, it is also important
    to consider the configuration of workload groups into which query requests are
    placed. One option of particular interest in a highly concurrent environment is
    the GROUP_MAX_REQUESTS setting, which limits the number of concurrent requests
    that will be processed in a given workload group. Once the maximum request limit
    has been reached, any additional requests for this workload group will be placed
    into a wait state until capacity becomes available.


    Before going any further, cancel any running ostress windows that you might still
    have running.


    Then reset the query plan cache, the Resource Governor statistics, and wait statistics
    held in the DMV


    tables by issuing the following T-SQL:


    ALTER RESOURCE GOVERNOR RESET STATISTICS;


    DBCC FREEPROCCACHE;


    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);


    GO


    Now open a new RML command prompt and use the ostress tool to execute a simple
    query 100


    times each across 500 threads, creating a total of 50,000 requests:


    ostress -U"UserA" -P"password" –Slocalhost -Q"DECLARE @table TABLE (x varchar(4000));
    INSERT INTO @table SELECT REPLICATE(''a'',4000);" -n500 -r100 –q


    When ostress is finished, you will see the total elapsed time required to complete
    all of the queries.


    On my laptop, the time reported is 00:03:23.255.


    Back in SQL Server Management Studio, we can examine the performance of these
    queries using the following T-SQL:


    SELECT


    total_request_count AS requests,


    total_queued_request_count AS queued,


    total_lock_wait_count AS locks,


    CAST(total_cpu_usage_ms AS decimal(18,9)) / total_request_count


    AS avg_cpu_time,


    max_request_cpu_time_ms AS max_cpu_time


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    FROM


    sys.dm_resource_governor_workload_groups


    WHERE


    name = N''GroupA'';


    requests queued locks avg cpu_time max_cpu_time


    50500 0 627216 3.52998019801980198019801980198 80


    Now let’s alter the resource governor settings to limit the maximum allowed number
    of concurrent requests for this workload group to three. This will create a queue.


    ALTER WORKLOAD GROUP GroupA


    WITH ( GROUP_MAX_REQUESTS = 3 )


    USING PoolA;


    ALTER RESOURCE GOVERNOR RECONFIGURE


    GO


    Before running the tests again, reset the tables:


    ALTER RESOURCE GOVERNOR RESET STATISTICS;


    DBCC FREEPROCCACHE;


    DBCC SQLPERF(''sys.dm_os_wait_stats'', CLEAR);


    GO


    Then rerun the ostress test exactly as before. This time the final execution time
    for all the queries on my system is 00:03:03.257\. By limiting the maximum number
    of concurrent requests for the workgroup, the total time taken to process a queue
    of 50,000 queries in this example has been reduced by approximately 10 percent.


    Although at first this result may surprise you, it actually makes perfect sense.
    To understand what’s occurring, rerun the previous query against the sys.dm_resource_governor_workload_groups
    DMV. The results on my system are shown following:


    requests queued locks avg cpu_time max_cpu_time


    50500 48372 36727 3.46671287128712871287128712871 54


    Since we set GROUP_MAX_REQUESTS to 3, requests issued to the GroupA workload group
    are forced to wait as expected, while overall average CPU time required to fulfill
    each request remains largely similar.


    However, when there are fewer concurrent requests, each query experiences substantially
    fewer waits on resources that are locked by other threads. In this particular
    example, the benefit of reduced lock waits outweighs the cost of waiting time
    enforced by Resource Governor throttling. As a result, not only was the overall
    elapsed time to process a queue of requests reduced, but the consistency between
    the time taken to fulfill each query was increased (with the maximum CPU time
    of 54ms when there were only three concurrent requests, compared to 80ms in the
    previous example).


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    „ **Tip** If you are interested in finding further statistics about the waits
    enforced by Resource Governor, try looking for rows in the sys.dm_os_wait_stats
    DMV where wait_type is RESMGR_THROTTLED.


    Summary


    Concurrency is a complex topic with many possible solutions. In this chapter,
    I introduced the various concurrency models that should be considered from a business
    process and data collision point of view, and explained how they differ from the
    similarly named concurrency models supported by the SQL


    Server database engine. Pessimistic concurrency is probably the most commonly
    used form, but it can be complex to set up and maintain. Optimistic concurrency,
    while more lightweight, might not be so applicable to many business scenarios,
    and multivalue concurrency control, while a novel technique, might be difficult
    to implement in such a way that allowing collisions will help deliver value other
    than a performance enhancement.


    Finally, I covered an overview of how Resource Governor can balance the way in
    which limited resources are allocated between different competing requests in
    a concurrent environment. The discussion here only scratched the surface of the
    potential for this technique, and I recommend that readers interested in the subject
    dedicate some time to further research this powerful feature.


    **C H A P T E R 10**


    „ „ „


    **Working with Spatial Data**


    The addition of spatial capabilities was one of the most exciting new features
    introduced in SQL Server 2008\. Although generally a novel concept for many SQL
    developers, the principles of working with spatial data have been well established
    for many years. Dedicated geographic information systems (GISs), such as ARC/INFO
    from ESRI, have existed since the 1970s. However, until recently, spatial data
    analysis has been regarded as a distinct, niche subject area, and knowledge and
    usage of spatial data has remained largely confined within its own realm rather
    than being integrated with mainstream


    development.


    The truth is that there is hardly any corporate database that does not store spatial
    information of some sort or other. Customers’ addresses, sales regions, the area
    targeted by a local marketing campaign, or the routes taken by delivery and logistics
    vehicles all represent spatial data that can be found in many common applications.


    In this chapter, I’ll first describe some of the fundamental principles involved
    in working with spatial data, and then discuss some of the important features
    of the geometry and geography datatypes, which are the specific datatypes used
    to represent and perform operations on spatial data in SQL Server.


    After demonstrating how to use these methods to answer some common spatial questions,
    I’ll then concentrate on the elements that need to be considered to create high-performance
    spatial applications.


    „ **Note** Working with spatial data presents a unique set of challenges, and
    in many cases requires the adoption of specific techniques and understanding compared
    to other traditional datatypes. If you’re interested in a more thorough introduction
    to spatial data in SQL Server, I recommend reading *Beginning Spatial with SQL
    Server 2008*, one of my previous books (Apress, 2008).


    Modeling Spatial Data


    Spatial data describes the position, shape, and orientation of objects in space.
    These objects might be tangible, physical things, like an office building, railroad,
    or mountain, or they might be abstract features such as the imaginary line marking
    the political boundary between countries or the area served by a particular store.


    SQL Server adopts a vector model of spatial data, in which every object is represented
    using one or more **geometries**—primitive shapes that approximate the shape of
    the real-world object they represent.


    There are three basic types of geometry that may be used with the geometry and
    geography datatypes: Point, LineString, and Polygon:


