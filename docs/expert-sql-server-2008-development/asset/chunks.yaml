    \ Integration Code Access Security` (http://msdn2.microsoft.com/en-us/library/ms345101.aspx)\n\
    \n## 对代码安全性的追求\n\n你可能想知道，既然修复异常如此简单——只需将程序集的权限级别提高到 `EXTERNAL_ACCESS` 或 `UNSAFE`，并让代码访问它需要做的事情——为什么我还要介绍\
