    Summary


    Encryption forms an important part of any security strategy, and can provide the
    crucial last line of defense in thwarting attackers from gaining access to sensitive
    or confidential data. However, it comes at a cost—encryption requires carefully
    planned strategy and security policies, and almost invariably requires design
    changes to be made at a database or application level in order to be implemented
    successfully. Added security also has a necessary negative impact on performance.


    Encrypted data that results from a nondeterministic algorithm does not exhibit
    the same structure or patterns as normal data. This means that many standard database
    tasks, such as sorting, filtering, and joining, must be redesigned in order to
    work effectively. Although there are methods to work around some of the limitations
    of dealing with encrypted data, such as searching and matching using HMACs, they
    are not satisfactory in all cases, and if possible, applications should be designed
    to avoid direct querying of encrypted data.


    **C H A P T E R 7**


    „ „ „


    **SQLCLR: Architecture and**


    **Design Considerations**


    When Microsoft first announced that SQL Server would host the .NET Common Language
    Runtime


    (CLR) back in SQL Server 2005, it created a lot of excitement in the database
    world. Some of that excitement was enthusiastic support voiced by developers who
    envisaged lots of database scenarios that could potentially benefit from the methods
    provided by the .NET Base Class Library. However, there was also considerable
    nervousness and resistance from DBAs concerned about the threats posed by the
    new technology and the rumors that rogue developers would be able to create vast
    worlds of DBA-impenetrable, compiled in-process data access code.


    When it came to it, SQLCLR integration turned out to be neither such a scary nor
    such a useful idea as many thought. Those hoping to use the SQLCLR features as
    a wholesale replacement for T-SQL were quickly put off by the fact that writing
    CLR routines generally requires more code, and performance and reliability suffer
    due to the continual cost of marshaling data across the CLR boundaries. And for
    the DBAs who were not .NET developers to begin with, there was a somewhat steep
    learning curve involved for a feature that really didn’t have a whole lot of uses.


