    | 123        | Mickey Mouse | 0x00000000000007E3 |\n| 456        | Pluto     \
    \   | 0x00000000000007E5 |\n\n重要的是要注意，表上任何已提交的更新操作都会导致 `Version` 列被更新——即使您用相同的值更新列。不要假设版本跟踪的是数据的更改；相反，它跟踪的是对行的操作。\n\
    \n使用这样的列来支持乐观方案非常直接。一个有效的初步做法是在读取时将 `Version` 列与行中的其余数据一起取回，并在写入时检查它：\n\n```sql\n\
    DECLARE\n    @CustomerIdToUpdate int = 456,\n    @Version rowversion;\n\nSET @Version\
    \ =\n    (SELECT Version\n     FROM CustomerNames\n     WHERE CustomerId = @CustomerIdToUpdate);\n\
    \nUPDATE CustomerNames\nSET CustomerName = 'Pluto'\nWHERE\n    CustomerId = @CustomerIdToUpdate\n\
    \    AND Version = @Version;\n\nIF @@ROWCOUNT = 0\n    RAISERROR('Version conflict\
    \ encountered', 16, 1);\n```\n"
- fmt: "This is a simple method of handling optimistic concurrency, but it has a couple\
    \ of problems. First of all, every update routine in the system must be made to\
    \ comply with the requirements of checking the version. As with the pessimistic\
    \ schemes described in the previous section, even one buggy module will cause\
    \ the entire system to break down—not a good thing. Secondly, this setup does\
    \ not leave you with many options when it comes to providing a nice user experience.\
    \ Getting a conflict error without any means of fixing it is not especially fun—when\
    \ possible, I prefer to send back enough data so that users can perform a merge\
    \ if they feel like it (and only if the application provides that capability,\
    \ of course).\n\n## Designing Systems for Application Concurrency\n\nThe solution\
    \ to both of these problems starts with a change to the version column’s data\
    \ type. Since columns that use the `rowversion` type are not updateable by anything\
    \ except SQL Server, it makes the system difficult to control. Therefore, my first\
    \ suggestion is to switch to either `uniqueidentifier` or `datetime`. Following\
    \ is an updated version of `CustomerNames`, which uses a `uniqueidentifier` column:\n\
    \n```sql\n-- Recreate the CustomerNames table\nCREATE TABLE CustomerNames\n(\n\
    \    CustomerId int NOT NULL PRIMARY KEY,\n    CustomerName varchar(50) NOT NULL,\n\
    \    Version uniqueidentifier NOT NULL DEFAULT (NEWID())\n);\nGO\n\n-- Populate\
    \ the new table\nINSERT INTO CustomerNames\n(\n    CustomerId,\n    CustomerName\n\
    )\nVALUES\n    (123, 'Mickey Mouse'),\n    (456, 'Minnie Mouse');\nGO\n```\n\n\
    To solve the potential problem of routines not following the rules, a trigger\
    \ can be used to enforce the optimistic scheme. This is done by requiring that\
    \ any updates to the table include an update to the `Version` column, which is\
    \ enforced by checking the `UPDATE()` function in the trigger. The column should\
    \ be set to the value of whatever version was returned when the data was read.\
    \ This way, the trigger can check the value present in the `inserted` table against\
    \ the value in the `deleted` table for each row updated. If the two don’t match,\
    \ there is a version conflict. Finally, the trigger can set a new version value\
    \ for the updated rows, thereby marking them as changed for anyone who has read\
    \ the data. Following is the definition for the trigger:\n\n```sql\nCREATE TRIGGER\
    \ tg_UpdateCustomerNames\nON CustomerNames\nFOR UPDATE AS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n    IF NOT UPDATE(Version)\n    BEGIN\n        RAISERROR('Updating the\
    \ Version column is required', 16, 1);\n        ROLLBACK;\n    END\n    IF EXISTS\n\
    \    (\n        SELECT *\n        FROM inserted i\n        JOIN deleted d ON i.CustomerId\
    \ = d.CustomerId\n        WHERE i.Version <> d.Version\n    )\n    BEGIN\n   \
    \     RAISERROR('Version conflict encountered', 16, 1);\n        ROLLBACK;\n \
    \   END\n    ELSE\n        --Set new versions for the updated rows\n        UPDATE\
    \ CustomerNames\n        SET Version = NEWID()\n        WHERE\n            CustomerId\
    \ IN\n            (\n                SELECT CustomerId\n                FROM inserted\n\
    \            );\nEND;\nGO\n```\n\nThis trigger solves the problem of version control\
    \ in an optimistic model, but it takes quite a blunt approach—simply raising an\
    \ error and rolling back the transaction if a version conflict is encountered.\n\
    \nPerhaps it would be better to extend this trigger to help provide users with\
    \ more options when they get a conflict. This is one place I find SQL Server’s\
    \ XML capabilities to be useful. To create an output document similar to an ADO.NET\
    \ XML DiffGram, modify the `IF` block of the trigger as highlighted in the following\
    \ code listing:\n\n```sql\nALTER TRIGGER tg_UpdateCustomerNames\nON CustomerNames\n\
    FOR UPDATE AS\nBEGIN\n    SET NOCOUNT ON;\n    IF NOT UPDATE(Version)\n    BEGIN\n\
    \        RAISERROR('Updating the Version column is required', 16, 1);\n      \
    \  ROLLBACK;\n    END\n    IF EXISTS\n    (\n        SELECT *\n        FROM inserted\
    \ i\n        JOIN deleted d ON i.CustomerId = d.CustomerId\n        WHERE i.Version\
    \ <> d.Version\n    )\n    BEGIN\n        SELECT\n            (\n            \
    \    SELECT\n                    ROW_NUMBER() OVER (ORDER BY CustomerId) AS [@row_number],\n\
    \                    *\n                FROM inserted\n                FOR XML\
    \ PATH('customer_name'), TYPE\n            ) new_values,\n            (\n    \
    \            SELECT\n                    ROW_NUMBER() OVER (ORDER BY CustomerId)\
    \ AS [@row_number],\n                    *\n                FROM deleted\n   \
    \             FOR XML PATH('customer_name'), TYPE\n            ) old_values\n\
    \        FOR XML PATH('customer_name_rows');\n    END\n    ELSE\n        --Set\
    \ new versions for the updated rows\n        UPDATE CustomerNames\n```"
