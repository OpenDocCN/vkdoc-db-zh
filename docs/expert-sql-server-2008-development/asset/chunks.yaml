    \n## 总结\n\nSQL Server 的模拟功能允许开发人员创建安全、细粒度的授权方案。\n\n通过保持授权分层并遵循最小权限原则，可以使数据库中的资源更加安全，要求攻击者做更多工作才能检索他们本不应访问的数据。存储过程层可用于控制安全性，根据高权限代理用户系统委派必要的权限。\n\
    \n当需要将数据库逻辑上分解为范围相似的对象组时，应使用架构。架构还可用于简化权限分配任务，因为随着架构中对象的变化，可能不需要随时间维护权限。\n\n`EXECUTE\
    \ AS`子句可能是基于存储过程传播权限的一种非常有用且简单的方法，但证书提供了更大的灵活性和控制力。也就是说，您应该尽量保持系统简单易懂，以避免造成可维护性噩梦。\n\
    \n最后一点：在安全方面不要过度。本章介绍的许多技术对于大多数应用程序可能*并非*必要。如果您的应用程序不存储敏感数据，请不要过度创建复杂的权限提升方案；它们只会让您的应用程序更难处理。\n\
    \n# 加密\n\n加密是将数据编码的过程，其方式使得除了拥有适当机密知识（**密钥**）以再次解密数据的人之外，任何人都无法使用。SQL Server 2008\
    \ 提供的加密功能是强大的特性，您应始终考虑将其作为整体安全策略的一部分。如果所有其他安全机制都失败，加密可以被证明是保护机密数据的非常有效的最后一道防线。\n\
    \n然而，不应轻率地考虑加密；这是一个复杂的主题，成功实施加密几乎总是需要在应用程序的架构和设计阶段进行一定程度的考虑。加密数据的物理行为相对简单，但如果没有适当的程序来安全管理对数据的访问以及解密它所需的密钥，任何实施加密的尝试都是徒劳的。未能正确实施加密实际上可能弊大于利，因为它会给您带来数据安全的错误感觉，而实际上数据正暴露给潜在的黑客。\n\
    \n此外，加密提供的额外保护伴随着相关的性能成本。\n\n通常，数据库必须做更多的工作来加密写入的数据，并在需要该数据时再次解密。这意味着，特别是在大规模环境中，必须仔细关注以确保加密不会对应用程序性能产生不利影响。"
- fmt: 'In this chapter I do not aim to provide a definitive guide to database encryption.
    Rather, I will provide a practical guide to using the main encryption features
    of SQL Server 2008 to create a secure, scalable database application that is capable
    of working with confidential data. Such a solution clearly assumes that other
    aspects of security, including user access control and network protection, have
    already been adequately addressed. I will particularly focus on the two main issues
    identified in the preceding paragraphs—namely, how to securely store and manage
    access to encryption keys, and how to design a database application architecture
    that protects sensitive data while minimizing the negative impact on performance.


    ## Do You Really Need Encryption?


    Before addressing the question of how to implement encryption for a given data
    set, it is necessary to consider whether encryption is required at all. Encryption
    is a method of protecting data, so the key questions to ask are *what* data are
    you trying to protect, and *who* (or what) are you trying to protect it from.


    ### What Should Be Protected?


    All data is important. If it were not, then we wouldn’t bother storing it in a
    database in the first place. But that doesn’t necessarily mean that all data needs
    to be encrypted.


    Most of the encryption methods in SQL Server 2008 provide `cell-level encryption`,
    which is applied to individual items of data, or columns of a table that contain
    sensitive information. In contrast, transparent data encryption, a new feature
    in SQL Server 2008, applies `database-level encryption` to an entire database
    by encrypting the underlying database files on the file system. Not only do these
    approaches operate at a different scope, but they have significantly different
    implications for the design of any application working with encrypted data.


    Before deciding on an encryption strategy, it is very important to classify data
    in order to identify the risk of exposure, and the severity of consequences should
    that data become exposed. Some examples of the types of data that might require
    encryption are as follows:


    *   Many organizations define one or more levels of `sensitive data`—that is,
    information that could negatively harm the business if it were allowed into the
    wrong hands. Such information might include pricing information, profit forecasts,
    or upcoming marketing plans. If a competitor were to get hold of such information,
    it could have severe consequences on future sales.

    *   Increasingly, many governments are passing laws and regulatory requirements
    specifying certain minimum levels of security that must be put in place to protect
    confidential customer data, and this can include encryption. A failure to meet
    these standards may result in a company facing severe fines, or even being forced
    to cease trading.

    *   Certain clients may specify minimum levels of protection required as part
    of a customer service level agreement. In some cases, detailed requirements specify
    exactly those data items that must be encrypted, the type of encryption algorithm
    used, the minimum length of encryption key, and the schedule by which keys must
    be rotated.

    *   In many cases it may be beneficial to encrypt employee records, particularly
    those that contain payroll information or other personal information, in order
    to prevent casual snooping by systems administrators or other users who have access
    to such data.


    Conducting a thorough analysis of business requirements to identify all data elements
    that require protection and determining how that data should be protected are
    crucial to ensure that any proposed encryption solution adequately addresses security
    requirements while balancing the need for performance. In addition, the required
    changes to application design and business processes associated with encryption
    generally come at a cost, and it is important to be able to justify that cost
    against the perceived benefits to be gained from encryption.


    ### What Are You Protecting Against?'
