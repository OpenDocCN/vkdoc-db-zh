    `T`.


    The `datetime`, `datetime2`, `smalldatetime`, and `datetimeoffset` datatypes store
    both a date and time component, whereas the `date` and `time` datatypes store
    only a date or a time, respectively. However, one important point to note is that
    whatever datatype is being used, both the time and date elements of any input
    are optional. If no time portion is provided to a datatype that records a time
    component, SQL Server will use midnight as the default; if the date portion is
    not specified in the input to one of the datatypes that records a date, SQL Server
    will use January 1, 1900. In a similar vein, if a time component is provided as
    an input to the `date` datatype, or a date is supplied to the `time` datatype,
    that value will simply be ignored.


    Each of the following are valid, unambiguous date/time formats that can be used
    when supplying inputs for any of the temporal datatypes:


    ```

    --Unseparated date and time

    20090501 13:45:03


    --Date with dashes, and time specified with T (ISO 8601)

    2009-05-01T13:45:03


    --Date only

    20090501


    --Time only

    13:45:03

    ```


    ### Caution


    If you choose to use a dash separator between the year, month, and day values
    in the ISO 8601 format, you **must** include the `T` character before the time
    component. To demonstrate the importance of this character, compare the results
    of the following:


    ```

    SET LANGUAGE British;

    SELECT CAST(''2003-12-09 00:00:00'' AS datetime), CAST(''2003-12-09T00:00:00''
    AS datetime).

    ```


    By always using one of the preceding formats—and always making sure that clients
    send dates according to that format—you can ensure that the correct dates will
    always be used by SQL Server.


    Remember that SQL Server does not store the original input date string; the date
    is converted and stored internally in a binary format. So if invalid dates do
    end up in the database, there will be no way of reconstituting them from just
    the data.


    Unfortunately, it’s not always possible to get data in exactly the right format
    before it hits the database. SQL Server provides two primary mechanisms that can
    help when dealing with nonstandard date/time formats: an extension to the `CONVERT`
    function that allows specification of a date “style,” and a runtime setting called
    `DATEFORMAT`.


    To use `CONVERT` to create an instance of date/time data from a nonstandard date,
    use the third parameter of the function to specify the date’s format. The following
    code block shows how to create a date for the British/French and US styles:


    ```

    --British/French style

    SELECT CONVERT(date, ''01/02/2003'', 103);


    --US style

    SELECT CONVERT(date, ''01/02/2003'', 101);

    ```


    Style `103` produces the date “February 1, 2003,” whereas style `101` produces
    the date, “January 2, 2003.” By using these styles, you can more easily control
    how date/time input is processed, and explicitly tell SQL Server how to handle
    input strings. There are over 20 different styles documented; see the topic “`CAST`
    and `CONVERT` (Transact-SQL)” in SQL Server 2008 Books Online for a complete list.


    The other commonly used option for controlling the format of input date strings
    is the `DATEFORMAT` setting. `DATEFORMAT` allows you to specify the order in which
    day, month, and year appear in the input date format, using the specifiers `D`,
    `M`, and `Y`. The following T-SQL is equivalent to the previous example that used
    `CONVERT`:


    ```

    --British/French style

    SET DATEFORMAT DMY;

    SELECT CONVERT(date, ''01/02/2003'');


    --US style

    SET DATEFORMAT MDY;

    SELECT CONVERT(date, ''01/02/2003'');

    ```


    There is really not much of a difference between using `DATEFORMAT` and `CONVERT`
    to correct nonstandard inputs. `DATEFORMAT` may be cleaner in some cases as it
    only needs to be specified once per connection, but `CONVERT` offers slightly
    more control due to the number of styles that are available. In the end, you should
    choose whichever option makes the particular code you’re working on more easily
    readable, testable, and maintainable.'
