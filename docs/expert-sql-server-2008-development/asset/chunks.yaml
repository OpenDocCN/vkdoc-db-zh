    In an adjacency list hierarchy, inserting new nodes is generally quite straightforward.
    Inserting a leaf node (i.e., a node with no subordinates) requires simply inserting
    a new node into the table. To insert a nonleaf node, you must also update any
    direct subordinates of the node you’re inserting under, so that they point to
    their new manager. This is effectively the same as inserting a new node and then
    relocating the old node’s subtree under the new node, which is why I’ve merged
    these two topics into one section.


    As an example, suppose that AdventureWorks has decided to hire a new CTO, to whom
    the current Vice President of Engineering (EmployeeID 12) will be reporting. To
    reflect these changes in the Employee_Temp table, first insert the new CTO node,
