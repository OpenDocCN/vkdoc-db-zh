    CHAPTER 8 „ DYNAMIC T-SQL


    LoginID,


    JobTitle


    FROM


    HumanResources.Employee


    WHERE


    BusinessEntityID = @BusinessEntityID


    AND NationalIDNumber = @NationalIDNumber;


    END


    ELSE IF (@BusinessEntityID IS NOT NULL)


    BEGIN


    SELECT


    BusinessEntityID,


    LoginID,


    JobTitle


    FROM


    HumanResources.Employee


    WHERE


    BusinessEntityID = @BusinessEntityID;


    END


    ELSE IF (@NationalIDNumber IS NOT NULL)


    BEGIN


    SELECT


    BusinessEntityID,


    LoginID,


    JobTitle


    FROM


    HumanResources.Employee


    WHERE


    NationalIDNumber = @NationalIDNumber;


    END


    ELSE


    BEGIN


    SELECT


    BusinessEntityID,


    LoginID,


    JobTitle


    FROM


    HumanResources.Employee;


    END


    END;


    GO


    Although executing this stored procedure produces the exact same query plans—and,
    therefore, the exact same performance—as the equivalent individual query created
    in the test batch, it has an unfortunate problem. Namely, taking this approach
    turns what was a very simple 10-line stored procedure into a 42-line monster.


    CHAPTER 8 „ DYNAMIC T-SQL


    Adding one more column to the SELECT list for this procedure would require a change
    to be made in four places. Now consider what would happen if a third predicate
    were needed—the number of cases would jump from four to eight, meaning that any
    change such as adding or removing a column would have to be made in eight places.
    Now consider 10 or 20 predicates, and it’s clear that this method has no place
    in the SQL Server developer’s toolbox. It is simply not a manageable solution.


    The next most common technique is one that has appeared in articles on several
    SQL Server web sites over the past few years. As a result, a lot of code has been
    written against it by developers who don’t seem to realize that they’re creating
    a performance time bomb. This technique takes advantage of the COALESCE function,
    as shown in the following rewritten version of the stored procedure:


    ALTER PROCEDURE GetEmployeeData


    @BusinessEntityID int = NULL,


    @NationalIDNumber nvarchar(15) = NULL


    AS


    BEGIN


    SET NOCOUNT ON;


    SELECT


    BusinessEntityID,


    LoginID,


    JobTitle


    FROM


    HumanResources.Employee


    WHERE


    BusinessEntityID = COALESCE(@BusinessEntityID, BusinessEntityID)


    AND NationalIDNumber = COALESCE(@NationalIDNumber, NationalIDNumber);


    END;


    GO'
  trans: "\n# 第 8 章 动态 T-SQL\n\n## 图 8-3. 基于聚集索引扫描的基础执行计划\n\n如图 8-3 所示，本例中的查询计划是一个简单的聚集索引扫描，估计开销为\
    \ 0.0080454，逻辑读取次数为 9 次。由于需要返回所有行，且没有索引覆盖所需的所有列，因此聚集索引扫描是满足此查询的最有效方式。\n\n这些基线数据将用于比较创建动态存储过程的各种方法的相对性能，这些过程返回相同的列，但可选择地根据`BusinessEntityID`和`NationalIDNumber`中的一个或两个谓词对返回的行进行过滤。首先，可以将查询包装在存储过程中：\n\
    \n```sql\nCREATE PROCEDURE GetEmployeeData\n    @BusinessEntityID int = NULL,\n\
    \    @NationalIDNumber nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n\
    \    SELECT\n        BusinessEntityID,\n        LoginID,\n        JobTitle\n \
    \   FROM\n        HumanResources.Employee\n    WHERE\n        BusinessEntityID\
    \ = @BusinessEntityID\n        AND NationalIDNumber = @NationalIDNumber;\nEND;\n\
    GO\n```\n\n此存储过程使用参数`@BusinessEntityID`和`@NationalIDNumber`来支持谓词。这两个参数都是可选的，默认值为`NULL`。然而，此存储过程并未真正可选地支持这些参数；不传递其中一个参数将意味着存储过程根本不会返回任何行，因为在谓词中与`NULL`进行任何比较都不会得出`TRUE`的结果。\n\
    \n作为使此存储过程支持可选谓词的首次尝试，开发人员可能会尝试使用控制流语句重写该过程，如下所示：\n\n```sql\nALTER PROCEDURE GetEmployeeData\n\
    \    @BusinessEntityID int = NULL,\n    @NationalIDNumber nvarchar (15) = NULL\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n\n    IF (@BusinessEntityID IS NOT NULL AND @NationalIDNumber\
    \ IS NOT NULL)\n    BEGIN\n        SELECT\n            BusinessEntityID,\n   \
    \         LoginID,\n            JobTitle\n        FROM\n            HumanResources.Employee\n\
    \        WHERE\n            BusinessEntityID = @BusinessEntityID\n           \
    \ AND NationalIDNumber = @NationalIDNumber;\n    END\n    ELSE IF (@BusinessEntityID\
    \ IS NOT NULL)\n    BEGIN\n        SELECT\n            BusinessEntityID,\n   \
    \         LoginID,\n            JobTitle\n        FROM\n            HumanResources.Employee\n\
    \        WHERE\n            BusinessEntityID = @BusinessEntityID;\n    END\n \
    \   ELSE IF (@NationalIDNumber IS NOT NULL)\n    BEGIN\n        SELECT\n     \
    \       BusinessEntityID,\n            LoginID,\n            JobTitle\n      \
    \  FROM\n            HumanResources.Employee\n        WHERE\n            NationalIDNumber\
    \ = @NationalIDNumber;\n    END\n    ELSE\n    BEGIN\n        SELECT\n       \
    \     BusinessEntityID,\n            LoginID,\n            JobTitle\n        FROM\n\
    \            HumanResources.Employee;\n    END\nEND;\nGO\n```\n\n尽管执行此存储过程产生的查询计划与测试批处理中创建的等效单独查询完全相同——因此性能也完全相同——但它存在一个不幸的问题。即，采用这种方法将原本非常简单的\
    \ 10 行存储过程变成了一个 42 行的庞然大物。\n\n为此过程的选择列表添加一个列，就需要在四个地方进行更改。现在考虑如果需要第三个谓词会发生什么——情况数量将从四个跃升至八个，这意味着任何更改（如添加或删除列）都必须在八个地方进行。现在考虑\
    \ 10 或 20 个谓词，显然这种方法在 SQL Server 开发人员的工具箱中没有立足之地。它根本不是一个可管理的解决方案。\n\n下一个最常见的技术在过去几年中出现在多个\
    \ SQL Server 网站的文章中。因此，许多开发人员基于此编写了大量代码，而他们似乎没有意识到自己正在制造一颗性能定时炸弹。此技术利用了`COALESCE`函数，如以下重写的存储过程版本所示：\n\
    \n```sql\nALTER PROCEDURE GetEmployeeData\n    @BusinessEntityID int = NULL,\n\
    \    @NationalIDNumber nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n\
    \    SELECT\n        BusinessEntityID,\n        LoginID,\n        JobTitle\n \
    \   FROM\n        HumanResources.Employee\n    WHERE\n        BusinessEntityID\
    \ = COALESCE(@BusinessEntityID, BusinessEntityID)\n        AND NationalIDNumber\
    \ = COALESCE(@NationalIDNumber, NationalIDNumber);\nEND;\nGO\n```\n"
- fmt: "This version of the stored procedure looks great and is easy to understand.\
    \ The `COALESCE` function returns the first `NULL` value passed into its parameter\
    \ list. So if either of the arguments to the stored procedure are `NULL`, the\
    \ `COALESCE` will “pass through,” comparing the value of the column to itself—and\
    \ at least in theory, that seems like it should not require any processing since\
    \ it will always be true.\n\nUnfortunately, because the `COALESCE` function uses\
    \ a column from the table as an input, it cannot be evaluated deterministically\
    \ before execution of the query. The result is that the function is evaluated\
    \ once for every row of the table, whatever combination of parameters is supplied.\
    \ This means *consistent* performance results, but probably not in a good way;\
    \ all four combinations of parameters result in the same query plan: a clustered\
    \ index scan with an estimated cost of `0.0080454` and nine logical reads. This\
    \ is over four times the I/O for the queries involving the `BusinessEntityID`\
    \ column—quite a performance drain.\n\n## Using OR\n\nSimilar to the version that\
    \ uses `COALESCE` is a version that uses `OR` to conditionally set the parameter\
    \ only if the argument is not `NULL`:\n\n```sql\nALTER PROCEDURE GetEmployeeData\n\
    \    @BusinessEntityID int = NULL,\n    @NationalIDNumber nvarchar(15) = NULL\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n\n    SELECT\n        BusinessEntityID,\n    \
    \    LoginID,\n        JobTitle\n    FROM\n        HumanResources.Employee\n \
    \   WHERE\n        (@BusinessEntityID IS NULL OR BusinessEntityID = @BusinessEntityID)\n\
    \        AND (@NationalIDNumber IS NULL OR @NationalIDNumber = NationalIDNumber);\n\
    END;\nGO\n```\n\nThis version, while similar in idea to the version that uses\
    \ `COALESCE`, has some interesting performance traits. Depending on which parameters\
    \ you use the first time you call it, you’ll see vastly different results. If\
    \ you’re lucky enough to call it the first time with no arguments, the result\
    \ will be an index scan, producing nine logical reads—and the same number of reads\
    \ will result for any combination of parameters passed in thereafter. If, however,\
    \ you first call the stored procedure using only the `@BusinessEntityID` parameter,\
    \ the resultant plan will use only four logical reads—until you happen to call\
    \ the procedure with no arguments, which will produce a massive `582` reads.\n\
    \nGiven the surprisingly huge jump in I/O that the bad plan can produce, as well\
    \ as the unpredictable nature of what performance characteristics you’ll end up\
    \ with, this is undoubtedly the worst possible choice.\n\n## Using BETWEEN and\
    \ LIKE with COALESCE\n\nThe final method that can be used is a bit more creative,\
    \ and also can result in somewhat better results. The following version of the\
    \ stored procedure shows how it is implemented:\n\n```sql\nALTER PROCEDURE GetEmployeeData\n\
    \    @BusinessEntityID int = NULL,\n    @NationalIDNumber nvarchar(15) = NULL\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n\n    SELECT\n        BusinessEntityID,\n    \
    \    LoginID,\n        JobTitle\n    FROM\n        HumanResources.Employee\n \
    \   WHERE\n        BusinessEntityID BETWEEN COALESCE(@BusinessEntityID, -2147483648)\
    \ AND\n            COALESCE(@BusinessEntityID, 2147483647)\n        AND NationalIDNumber\
    \ LIKE COALESCE(@NationalIDNumber, N'%');\nEND;\nGO\n```\n\nIf you’re a bit confused\
    \ by the logic of this stored procedure, you’re now familiar with the first reason\
    \ that I don’t recommend this technique: it’s relatively unmaintainable if you\
    \ don’t understand exactly how it works. Using it almost certainly guarantees\
    \ that you will produce stored procedures that will stump others who attempt to\
    \ maintain them in the future. And while that might be good for job security,\
    \ using it for that purpose is probably not a virtuous goal.\n\nThis stored procedure\
    \ operates by using `COALESCE` to cancel out `NULL` arguments by substituting\
    \ in minimum and maximum conditions for the integer predicate (`BusinessEntityID`)\
    \ and a `LIKE` expression that will match anything for the string predicate (`NationalIDNumber`).\
    \ This approach works as follows: If `@BusinessEntityID` is `NULL`, the `BusinessEntityID`\
    \ predicate effectively becomes `BusinessEntityID BETWEEN -2147483648 AND 2147483647`—in\
    \ other words, all possible integers. If `@BusinessEntityID` is not `NULL`, the\
    \ predicate becomes `BusinessEntityID BETWEEN @BusinessEntityID AND @BusinessEntityID`.\
    \ This is equivalent to `BusinessEntityID=@BusinessEntityID`.\n\nThe same basic\
    \ logic is true for the `NationalIDNumber` predicate, although because it’s a\
    \ string instead of an integer, `LIKE` is used instead of `BETWEEN`. If `@NationalIDNumber`\
    \ is `NULL`, the predicate becomes `NationalIDNumber LIKE N'%'`. This will match\
    \ any string in the `NationalIDNumber` column. On the other hand, if `@NationalIDNumber`\
    \ is not `NULL`, the predicate becomes `NationalIDNumber LIKE @NationalIDNumber`,\
    \ which is equivalent to `NationalIDNumber=@NationalIDNumber`—assuming that `@NationalIDNumber`\
    \ contains no string expressions. This predicate can also be written using `BETWEEN`\
    \ to avoid the string expression issue (for instance, `BETWEEN N'' AND REPLICATE(nchar(1000),\
    \ 15)`). However, that method is both more difficult to read than the `LIKE` expression\
    \ and fraught with potential problems due to collation issues (which is why I\
    \ only went up to `nchar(1000)` instead of `nchar(65535)` in the example).\n\n\
    The real question, of course, is one of performance. Unfortunately, this stored\
    \ procedure manages to confuse the query optimizer, resulting in the same plan\
    \ being generated for every invocation. The plan, in every case, involves a clustered\
    \ index seek on the table, with an estimated cost of `0.0033107`, as shown in\
    \ Figure 8-4. Unfortunately, this estimate turns out to be highly inconsistent,\
    \ as the number of actual logical reads varies widely based on the arguments passed\
    \ to the procedure.\n\n*Figure 8-4. Every set of arguments passed to the stored\
    \ procedure results in the same execution plan.*\n\nIf both arguments are passed,\
    \ or `@BusinessEntityID` is passed but `@NationalIDNumber` is not, the number\
    \ of logical reads is three. While this is much better than the nine logical reads\
    \ required by the previous version of the stored procedure, it’s still 50 percent\
    \ more I/O than the two logical reads required by the baseline in both of these\
    \ cases. This estimated plan really breaks down when passing only `@NationalIDNumber`,\
    \ since there is no way to efficiently satisfy a query on the `NationalIDNumber`\
    \ column using the clustered index. In both that case and when passing no arguments,\
    \ nine logical reads are reported. For the `NationalIDNumber` predicate this is\
    \ quite a failure, as the stored procedure does over twice as much work for the\
    \ same results as the baseline.\n\n## Going Dynamic: Using EXECUTE\n\nThe solution\
    \ to all of the aforementioned static SQL problems is, of course, to go dynamic.\
    \ Building dynamic SQL inside of a stored procedure is simple, the code is relatively\
    \ easy to understand and, as I’ll show, it can provide excellent performance.\
    \ However, there are various potential issues to note, not the least of which\
    \ being security concerns. I’ll explain how to deal with these as the examples\
    \ progress.\n\nThe real benefit of dynamic SQL is that the execution plans generated\
    \ for each invocation of the query will be optimized for only the predicates that\
    \ are actually being used at that moment. The main issue with the static SQL solutions,\
    \ aside from maintainability, was that the additional predicates confused the\
    \ query optimizer, causing it to create inefficient plans. Dynamic SQL gets around\
    \ this issue by not including anything extra in the query.\n\nThe simplest way\
    \ to implement dynamic SQL in a stored procedure is with the `EXECUTE` statement.\
    \ This statement takes a string input and executes whatever SQL the string contains.\
    \ The following batch shows this in its simplest—and least effective—form:\n\n\
    ```sql\nEXEC('SELECT\n        BusinessEntityID,\n        LoginID,\n        JobTitle\n\
    \    FROM HumanResources.Employee');\nGO\n```"
