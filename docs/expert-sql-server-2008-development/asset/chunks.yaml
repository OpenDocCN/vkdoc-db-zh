  raw: 'The typical approach using T-SQL is to make use of a self-join on the table,
    such as follows: SELECT


    T1.x,


    SUM(T2.x) AS running_x


    FROM


    T AS T1 INNER JOIN T AS T2


    ON T1.x >= T2.x


    GROUP BY


    T1.x;


    CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    Unfortunately, the process required to satisfy this query is not very efficient.
    Assuming that an index exists on the x column of the table, the preceding query
    generates the execution plan shown in Figure 7-2.


    *Figure 7-2\. A nested index seek used to create a running sum in T-SQL*


    To sum all of the previous values in the column requires a nested loop containing
    an index seek. The number of rows returned by this seek increases exponentially
    as more rows are processed. On the first row, this seek must only sum one value,
    but to find the running sum over a set of 100 rows, 5,050 total rows need to be
    read. For a set of 200 rows, the query processor needs to process 20,100 total
    rows—four times the amount of work required to satisfy the previous query. Thus,
    the performance of this approach to calculate running aggregates degrades rapidly
    as more rows are added to the table.


    An alternative solution, which can yield some significant performance benefits,
    is to make use of a cursor. There is a commonly held perception in the SQL Server
    development world that cursors are a bad thing, but they do have valid use cases,
    and this might be one of them. However, there are a number of good reasons why
    many developers are reluctant to use cursors, and I’m certainly not advocating
    their use in general.


    A better approach would be to use SQLCLR to loop through and store the running
    values using local variables, and then stream the results one row at a time via
    the SqlPipe. An example of such a solution is given in the following code listing:


    [Microsoft.SqlServer.Server.SqlProcedure]


    public static void RunningSum()


    {


    using (SqlConnection conn = new SqlConnection("context connection=true;"))


    {


    SqlCommand comm = new SqlCommand();


    comm.Connection = conn;


    comm.CommandText = "SELECT x FROM T ORDER BY x";


    SqlMetaData[] columns = new SqlMetaData[2];


    columns[0] = new SqlMetaData("Value", SqlDbType.Int);


    columns[1] = new SqlMetaData("RunningSum", SqlDbType.Int);


    int RunningSum = 0;


    SqlDataRecord record = new SqlDataRecord(columns);


    CHAPTER


    „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    SqlContext.Pipe.SendResultsStart(record);


    conn.Open();


    SqlDataReader reader = comm.ExecuteReader();


    while (reader.Read())


    {


    int Value = (int)reader[0];


    RunningSum += Value;


    record.SetInt32(0, (int)reader[0]);


    record.SetInt32(1, RunningSum);


    SqlContext.Pipe.SendResultsRow(record);


    }


    SqlContext.Pipe.SendResultsEnd();


    }


    }


    I’ve used this solution on a number of occasions and find it to be very efficient
    and maintainable, and it avoids the need for any temp tables to be used to hold
    the running sums as required by the alternatives. When testing against a table
    containing 100,000 rows, I achieve an average execution time of 2.7 seconds for
    the SQLCLR query, compared to over 5 *minutes* for the TSQL equivalent.


    String Manipulation


    To compare the performance of string-handling functions between T-SQL and SQLCLR,
    I wanted to come up with a fair, practical test. The problem is that there are
    lots of ingenious techniques for working with string data: in T-SQL, some of the
    best performing methods use one or more common table expressions (CTEs), CROSS
    APPLY operators, or number tables; or convert text strings to XML in or order
    to perform nontrivial manipulation of character data. Likewise, in SQLCLR, the
    techniques available differ considerably depending on whether you use the native
    String methods or those provided by the StringBuilder class.


    I decided that, rather than try to define a scenario that required a string-handling
    technique, the only fair test was to perform a direct comparison of two built-in
    methods that provided the equivalent functionality in either environment. I decided
    to settle on the T-SQL CHARINDEX and .NET’s


    String.IndexOf(), each of which searches for and returns the position of one string
    inside another string. For the purposes of the test, I created nvarchar(max) strings
    of different lengths, each composed entirely of the repeating character a. I then
    appended a single character x onto the end of each string, and timed the performance
    of the respective methods to find the position of that character over 10,000


    iterations.


    CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    The following code listing demonstrates the T-SQL method:


    CREATE PROCEDURE SearchCharTSQL


    (


    @needle nchar(1),


    @haystack nvarchar(max)


    )


    AS BEGIN


    PRINT CHARINDEX(@needle, @haystack);


    END;


    And here’s the() CLR equivalent:


    [SqlProcedure]


    public static void SearchCharCLR(SqlString needle, SqlString haystack)


    {


    SqlContext.Pipe.Send(


    haystack.ToString().IndexOf(needle.ToString()).ToString()


    );


    }


    Note that the starting position for CHARINDEX is 1-based, whereas the index numbering
    used by IndexOf() is 0-based. The results of each method will therefore differ,
    but they will have done the same amount of work obtaining that result. I tested
    each procedure as follows, substituting different parameter values for the REPLICATE
    method to change the length of the string to be searched: DECLARE @needle nvarchar(1)
    = ''x'';


    DECLARE @haystack nvarchar(max);


    SELECT @haystack = REPLICATE(CAST(''a'' AS varchar(max)), 8000) + ''x'';


    EXEC dbo.SearchCharTSQL @needle, @haystack;


    The execution times required for 10,000 runs of each method are shown in Figure
    7-3.


    *Figure 7-3\. Comparing performance of CHARINDEX against String. ()IndexOf()*


    CHAPTER


    „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    As with the prime number sieve example given earlier, the logic required for string
    searching, matching, and replacing is best suited to the highly efficient routines
    provided by the .NET Base Class Library. If you currently have code logic that
    relies heavily on T-SQL string functionality including CHARINDEX, PATINDEX, or
    REPLACE, I highly recommend that you investigate the alternative options available
    through SQLCLR—you might be surprised by the performance gain you achieve.


    Enhancing Service Broker Scale-Out with SQLCLR


    Having discussed some of the theory behind working with the SQLCLR and given some
    isolated


    performance comparisons, let’s now turn our attention to a more detailed example
    that puts these ideas into practice. Service Broker is frequently mentioned as
    an excellent choice for helping to scale out database services. One of the more
    compelling use cases is a Service Broker service that can be used to asynchronously
    request data from a remote system. In such a case, a request message would be
    sent to the remote data service from a local stored procedure, which could do
    some other work while waiting for the response—the requested data—to come back.


    There are many ways to architect such a system, and given that Service Broker
    allows messages to be sent either as binary or XML, I wondered which would provide
    the best overall performance and value from a code reuse perspective. In the following
    sections, I’ll guide you through my investigations into XML and binary serialization
    using SQLCLR.


    XML Serialization


    I started working with the HumanResources.Employee table from the AdventureWorks2008
    database as a sample data set, imagining a remote data service requesting a list
    of employees along with their attributes. After some experimentation, I determined
    that the FOR XML RAW option is the easiest way to serialize a table in XML format,
    and I used the ROOT option to make the XML valid:


    DECLARE @x xml;


    SET @x = (


    SELECT *


    FROM HumanResources.Employee


    FOR XML RAW, ROOT(''Employees'')


    );


    GO


    XML is, of course, known to be an extremely verbose data interchange format, and
    I was not'
  trans: "\n# 使用 T-SQL 的典型方法\n\n使用 T-SQL 的典型方法是利用表的自连接，如下所示：\n\n```sql\nSELECT\n \
    \   T1.x,\n    SUM(T2.x) AS running_x\nFROM\n    T AS T1 INNER JOIN T AS T2\n\
    \    ON T1.x >= T2.x\nGROUP BY\n    T1.x;\n```\n\n# 第 7 章：SQLCLR：架构与设计考量\n\n不幸的是，满足此查询所需的过程效率并不高。假设表的\
    \ `x` 列上存在索引，上述查询会生成如图 7-2 所示的执行计划。\n\n**图 7-2. 在 T-SQL 中用于创建累计和的嵌套索引查找**\n\n\
    要累加列中所有先前的值，需要一个包含索引查找的嵌套循环。随着处理的行数增加，此查找返回的行数呈指数级增长。在处理第一行时，此查找只需累加一个值，但要计算 100\
    \ 行数据的累计和，则需要总共读取 5,050 行。对于 200 行的数据集，查询处理器需要处理 20,100 行——这是满足前一个查询所需工作量的四倍。因此，随着表中行数的增加，这种计算累计聚合的方法性能会迅速下降。\n\
    \n一个能带来显著性能提升的替代方案是使用游标。在 SQL Server 开发界普遍存在一种看法，认为游标是糟糕的东西，但它们确实有其合理的用例，而此场景可能就是其中之一。然而，有许多充分的理由让许多开发人员不愿意使用游标，当然，我也并非在一般情况下提倡使用它们。\n\
    \n更好的方法是使用 SQLCLR 循环遍历并使用局部变量存储累计值，然后通过 `SqlPipe` 逐行流式传输结果。以下代码清单给出了这样一个解决方案的示例：\n\
    \n```csharp\n[Microsoft.SqlServer.Server.SqlProcedure]\npublic static void RunningSum()\n\
    {\n    using (SqlConnection conn = new SqlConnection(\"context connection=true;\"\
    ))\n    {\n        SqlCommand comm = new SqlCommand();\n        comm.Connection\
    \ = conn;\n        comm.CommandText = \"SELECT x FROM T ORDER BY x\";\n      \
    \  \n        SqlMetaData[] columns = new SqlMetaData[2];\n        columns[0] =\
    \ new SqlMetaData(\"Value\", SqlDbType.Int);\n        columns[1] = new SqlMetaData(\"\
    RunningSum\", SqlDbType.Int);\n        \n        int RunningSum = 0;\n       \
    \ SqlDataRecord record = new SqlDataRecord(columns);\n        \n        SqlContext.Pipe.SendResultsStart(record);\n\
    \        \n        conn.Open();\n        SqlDataReader reader = comm.ExecuteReader();\n\
    \        \n        while (reader.Read())\n        {\n            int Value = (int)reader[0];\n\
    \            RunningSum += Value;\n            \n            record.SetInt32(0,\
    \ (int)reader[0]);\n            record.SetInt32(1, RunningSum);\n            \n\
    \            SqlContext.Pipe.SendResultsRow(record);\n        }\n        \n  \
    \      SqlContext.Pipe.SendResultsEnd();\n    }\n}\n```\n\n我曾在多个场合使用此解决方案，发现它非常高效且易于维护，并且避免了像其他替代方案那样需要使用任何\
    \ `temp` 表来存储累计和。在针对包含 100,000 行的表进行测试时，SQLCLR 查询的平均执行时间为 2.7 秒，而等效的 T-SQL 查询则需要超过\
    \ 5 *分钟*。\n\n## 字符串操作\n\n为了比较 T-SQL 和 SQLCLR 之间字符串处理函数的性能，我想设计一个公平、实用的测试。问题在于，处理字符串数据有大量巧妙的技术：在\
    \ T-SQL 中，一些性能最佳的方法使用一个或多个公共表表达式 (`CTEs`)、`CROSS APPLY` 运算符或数字表；或者将文本字符串转换为 `XML`\
    \ 以执行复杂的字符数据操作。同样，在 SQLCLR 中，可用的技术差异很大，具体取决于您使用的是原生的 `String` 方法还是 `StringBuilder`\
    \ 类提供的方法。\n\n我决定，与其尝试定义一个需要特定字符串处理技术的场景，唯一公平的测试是直接比较两种环境中提供等效功能的两个内置方法。我决定选用 T-SQL\
    \ 的 `CHARINDEX` 和 .NET 的 `String.IndexOf()`，它们都在一个字符串中搜索并返回另一个字符串的位置。为了测试的目的，我创建了不同长度的\
    \ `nvarchar(max)` 字符串，每个字符串完全由重复的字符 `a` 组成。然后，我在每个字符串的末尾附加一个字符 `x`，并计时测量相应方法在\
    \ 10,000 次迭代中找到该字符位置的性能。\n\n**图 7-3. 比较 CHARINDEX 与 String.IndexOf() 的性能**\n\n\
    以下代码清单展示了 T-SQL 方法：\n\n```sql\nCREATE PROCEDURE SearchCharTSQL\n(\n    @needle\
    \ nchar(1),\n    @haystack nvarchar(max)\n)\nAS BEGIN\n    PRINT CHARINDEX(@needle,\
    \ @haystack);\nEND;\n```\n\n而这是 CLR 等效方法：\n\n```csharp\n[SqlProcedure]\npublic\
    \ static void SearchCharCLR(SqlString needle, SqlString haystack)\n{\n    SqlContext.Pipe.Send(\n\
    \        haystack.ToString().IndexOf(needle.ToString()).ToString()\n    );\n}\n\
    ```\n\n请注意，`CHARINDEX` 的起始位置是基于 1 的，而 `IndexOf()` 使用的索引编号是基于 0 的。因此，每个方法的结果会不同，但它们获得该结果所完成的工作量是相同的。我对每个存储过程进行了如下测试，通过为\
    \ `REPLICATE` 方法替换不同的参数值来更改要搜索的字符串长度：\n\n```sql\nDECLARE @needle nvarchar(1) =\
    \ 'x';\nDECLARE @haystack nvarchar(max);\n\nSELECT @haystack = REPLICATE(CAST('a'\
    \ AS varchar(max)), 8000) + 'x';\n\nEXEC dbo.SearchCharTSQL @needle, @haystack;\n\
    ```\n\n与前面给出的质数筛示例类似，字符串搜索、匹配和替换所需的逻辑最适合由 .NET 基础类库提供的高效例程来处理。如果您当前的代码逻辑严重依赖于\
    \ T-SQL 字符串功能，包括 `CHARINDEX`、`PATINDEX` 或 `REPLACE`，我强烈建议您研究一下通过 SQLCLR 可用的替代选项——您可能会对所获得的性能提升感到惊讶。\n\
    \n## 使用 SQLCLR 增强 Service Broker 横向扩展能力\n\n在讨论了使用 SQLCLR 背后的一些理论并给出了一些孤立的性能比较之后，现在让我们将注意力转向一个更详细的、将这些想法付诸实践的例子。Service\
    \ Broker 经常被提及为帮助横向扩展数据库服务的绝佳选择。其中一个更引人注目的用例是 Service Broker 服务，可用于异步地从远程系统请求数据。在这种情况下，请求消息将从本地存储过程发送到远程数据服务，该存储过程在等待响应（即请求的数据）返回的同时可以执行其他工作。\n\
    \n构建这样一个系统的方法有很多，并且考虑到 Service Broker 允许以二进制或 `XML` 格式发送消息，我想知道哪种方式能提供最佳的整体性能以及从代码复用角度看最有价值。在接下来的章节中，我将引导您了解我对使用\
    \ SQLCLR 进行 `XML` 和二进制序列化的研究。\n\n### XML 序列化\n\n我开始使用 `AdventureWorks2008` 数据库中的\
    \ `HumanResources.Employee` 表作为示例数据集，想象一个远程数据服务请求员工列表及其属性。经过一些实验，我确定 `FOR XML\
    \ RAW` 选项是将表序列化为 `XML` 格式的最简单方法，并且我使用 `ROOT` 选项使 `XML` 有效：\n\n```sql\nDECLARE\
    \ @x xml;\n\nSET @x = (\n    SELECT *\n    FROM HumanResources.Employee\n    FOR\
    \ XML RAW, ROOT('Employees')\n);\nGO\n```\n\n众所周知，`XML` 是一种极其冗长的数据交换格式，而我并未\n\n"
- fmt: "# 第七章 SQLCLR：架构与设计考量\n\n## XML 序列化问题\n\n我对结果 XML 的数据大小达到 105KB 感到惊讶，尽管 `HumanResources.Employee`\
    \ 表本身只有 56KB 的数据。我尝试设置更短的列名，但这对大小影响甚微，并且造成了我认为难以维护的代码。\n\n接下来，我设置了一个跟踪（trace）来收集\
    \ XML 序列化性能的一些概念（关于跟踪的更多信息，请参阅第三章）。跟踪结果显示，在我的系统上，前述查询的平均执行时间（在 1,000 次迭代中平均）为相当不令人满意的\
    \ 3.9095 秒每次迭代。\n\n经过一些试错，我发现通过使用 `TYPE` 指令可以提高 XML 序列化的性能，如下所示：\n\n```sql\nDECLARE\
    \ @x xml;\n\nSET @x = (\n    SELECT *\n    FROM HumanResources.Employee\n    FOR\
    \ XML RAW, ROOT('Employees'), TYPE\n);\nGO\n```\n\n这一改动将每次迭代的平均时间略微降低到 3.6687\
    \ 秒——有所改进，但仍不是一个很好的结果。\n\n## XML 反序列化\n\n尽管 XML 序列化没有产生令人印象深刻的性能，我还是决定继续测试反序列化。第一个问题是从\
    \ XML 反序列化回表所需的代码。为了还原出我开始时完全相同的表，我必须为结果集显式定义每一列；这使得代码比我预期的要复杂得多。此外，由于 `XQuery`\
    \ `value` 语法不支持 `hierarchyid` 数据类型，`OrganizationNode` 列中的值必须作为 `nvarchar` 读取，然后\
    \ `CAST` 为 `hierarchyid`。生成的代码如下：\n\n```sql\nDECLARE @x xml;\n\nSET @x = (\n \
    \   SELECT *\n    FROM HumanResources.Employee\n    FOR XML RAW, ROOT('Employees'),\
    \ TYPE\n);\n\nSELECT\n    col.value('@BusinessEntityID', 'int') AS BusinessEntityID,\n\
    \    col.value('@NationalIDNumber', 'nvarchar(15)') AS NationalIDNumber,\n   \
    \ col.value('@LoginID', 'nvarchar(256)') AS LoginID,\n    CAST(col.value('@OrganizationNode',\
    \ 'nvarchar(256)') AS hierarchyid) AS OrganizationNode,\n    col.value('@JobTitle',\
    \ 'nvarchar(50)') AS JobTitle,\n    col.value('@BirthDate', 'datetime') AS BirthDate,\n\
    \    col.value('@MaritalStatus', 'nchar(1)') AS MaritalStatus,\n    col.value('@Gender',\
    \ 'nchar(1)') AS Gender,\n    col.value('@HireDate', 'datetime') AS HireDate,\n\
    \    col.value('@SalariedFlag', 'bit') AS SalariedFlag,\n    col.value('@VacationHours',\
    \ 'smallint') AS VacationHours,\n    col.value('@SickLeaveHours', 'smallint')\
    \ AS SickLeaveHours,\n    col.value('@CurrentFlag', 'bit') AS CurrentFlag,\n \
    \   col.value('@rowguid', 'uniqueidentifier') AS rowguid,\n    col.value('@ModifiedDate',\
    \ 'datetime') AS ModifiedDate\nFROM @x.nodes('/Employees/row') x (col);\nGO\n\
    ```\n\n下一个问题是性能。当我测试使用前面的查询反序列化 `XML` 时，性能从差劲变成了极其糟糕——平均每次迭代需要 6.8157 秒。\n\n此时，我决定研究用于解决该问题的\
    \ `SQLCLR` 选项，重点关注重用潜力和性能。\n\n## 使用 SQLCLR 进行二进制序列化\n\n我的第一个想法是返回二进制序列化的 `DataTable`；为了实现这一点，我需要一种从\
    \ `CLR` 例程返回二进制格式数据的方法。这当然需要 .NET 的 `BinaryFormatter` 类，因此我创建了一个名为 `serialization_helper`\
    \ 的类，该类在 `EXTERNAL_ACCESS` 程序集中编录（这是 `System.IO` 访问所必需的）：\n\n```csharp\nusing\
    \ System;\nusing System.Data;\nusing System.Data.SqlClient;\nusing System.Data.SqlTypes;\n\
    using Microsoft.SqlServer.Server;\nusing System.Security.Permissions;\nusing System.Runtime.Serialization.Formatters.Binary;\n\
    \npublic partial class serialization_helper\n{\n    public static byte[] getBytes(object\
    \ o)\n    {\n        SecurityPermission sp =\n            new SecurityPermission(\n\
    \                SecurityPermissionFlag.SerializationFormatter);\n        sp.Assert();\n\
    \        BinaryFormatter bf = new BinaryFormatter();\n        using (System.IO.MemoryStream\
    \ ms =\n            new System.IO.MemoryStream())\n        {\n            bf.Serialize(ms,\
    \ o);\n            return(ms.ToArray());\n        }\n    }\n\n    public static\
    \ object getObject(byte[] theBytes)\n    {\n        using (System.IO.MemoryStream\
    \ ms =\n            new System.IO.MemoryStream(theBytes, false))\n        {\n\
    \            return(getObject(ms));\n        }\n    }\n\n    public static object\
    \ getObject(System.IO.Stream s)\n    {\n        SecurityPermission sp =\n    \
    \        new SecurityPermission(\n                SecurityPermissionFlag.SerializationFormatter);\n\
    \        sp.Assert();\n        BinaryFormatter bf = new BinaryFormatter();\n \
    \       return (bf.Deserialize(s));\n    }\n};\n```\n\n这个类的使用相当直接：要序列化一个对象，将其传递给\
    \ `getBytes` 方法。该方法首先使用断言（assertion）（如前所述）允许 `SAFE` 调用者使用它，然后使用二进制格式化器将对象序列化到\
    \ `Stream` 中。该流随后作为字节集合返回。\n\n反序列化可以使用 `getObject` 方法的任一重载来完成。我发现根据场景的不同，我可能直接访问\
    \ `Stream` 或字节集合，因此创建两个重载是有意义的，而不是重复代码来相互转换。反序列化在运行前也使用断言，以允许调用代码被编录为 `SAFE`。\n\
    \n我获取数据的首次尝试是简单地将输入集加载到 `DataTable` 中，然后通过 `serialization_helper` 方法运行它。以下代码实现了一个名为\
    \ `GetDataTable_Binary` 的 `UDF`，它使用此逻辑：\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction(\n\
    \    DataAccess = DataAccessKind.Read)]\npublic static SqlBytes GetDataTable_Binary(string\
    \ query)\n{\n    SqlConnection conn =\n        new SqlConnection(\"context connection\
    \ = true;\");\n    SqlCommand comm = new SqlCommand();\n    comm.Connection =\
    \ conn;\n    comm.CommandText = query;\n    SqlDataAdapter da = new SqlDataAdapter();\n\
    \    da.SelectCommand = comm;\n    DataTable dt = new DataTable();\n    da.Fill(dt);\n\
    \    // 序列化并返回输出\n    return new SqlBytes(serialization_helper.getBytes(dt));\n\
    }\n```\n\n通过传入一个查询来调用此方法，该查询对应于你希望以二进制序列化形式获取的表，如下例所示：\n\n```sql\nDECLARE @sql\
    \ nvarchar(max);\nSET @sql = 'SELECT\n    BusinessEntityID,\n    NationalIDNumber,\n\
    \    LoginID,\n    OrganizationNode.ToString(),\n    OrganizationLevel,\n    JobTitle,\n\
    \    BirthDate,\n    MaritalStatus,\n    Gender,\n    HireDate,\n    SalariedFlag,\n\
    \    VacationHours,\n    SickLeaveHours,\n    CurrentFlag,\n    rowguid,\n   \
    \ ModifiedDate\nFROM HumanResources.Employee';\n\nDECLARE @x varbinary(max);\n\
    SET @x = dbo.GetDataTable_Binary(@sql);\nGO\n```\n\n> 注意：`hierarchyid` CLR 数据类型未标记为可序列化，因此在上面的查询中，我使用\
    \ `ToString()` 方法来序列化 `OrganizationNode` 值的字符串表示形式。\n\n初步性能测试的结果非常令人鼓舞，显示平均序列化速度已降至仅\
    \ 0.1437 秒——相比 XML 序列化方法有了巨大改进。\n\n通过在序列化前将 `DataTable` 的 `RemotingFormat` 属性设置为\
    \ `Binary`，可以进一步提升二进制方法的性能：\n\n```csharp\ndt.RemotingFormat = SerializationFormat.Binary;\n\
    ```\n\n进行此更改后，性能更快——仅需 0.0576 秒。此外，生成的二进制数据大小现在仅为 68KB。\n\n首次尝试的成功鼓舞了我，我决定研究是否存在其他\
    \ `SQLCLR` 方法可以进一步提升性能。经过几次我就不赘述细节的尝试后，我决定放弃 `DataTable`，转而使用另一个类：`SqlDataReader`。我致力于将数据提取到对象集合中，初步测试显示使用\
    \ `SqlDataReader` 的序列化性能与 `DataTable` 一样好，但输出大小更小。然而，这种方法本身也并非没有困难。"
  raw: 'surprised to discover that the data size of the resultant XML is 105KB, despite
    the fact that the HumanResources.Employee table itself has only 56KB of data.
    I experimented with setting shorter column names, but it had very little effect
    on the size and created what I feel to be unmaintainable code.


    Next, I set up a trace to gather some idea of the performance of the XML serialization
    (for more information on traces, refer to Chapter 3). The trace results revealed
    that the average execution time for the preceding query on my system, averaged
    over 1,000 iterations, was a decidedly unimpressive 3.9095


    seconds per iteration.


    After some trial and error, I discovered that XML serialization could be made
    to perform better by using the TYPE directive, as follows:


    DECLARE @x xml;


    SET @x = (


    CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    SELECT *


    FROM HumanResources.Employee


    FOR XML RAW, ROOT(''Employees''), TYPE


    );


    GO


    This change brought the average time per iteration down slightly, to 3.6687 seconds—an


    improvement, but still not a very good result.


    XML Deserialization


    Even though XML serialization had not yielded impressive performance, I decided
    to carry on and test deserialization. The first problem was the code required
    to deserialize the XML back into a table. In order to get back the same table
    I started with, I had to explicitly define every column for the result set; this
    made the code quite a bit more complex than I’d hoped for. Furthermore, since
    the XQuery value syntax does not support the hierarchyid datatype, the values
    in the OrganizationNode column must be read as nvarchar and then CAST to hierarchyid.
    The resulting code is as follows:


    DECLARE @x xml;


    SET @x = (


    SELECT *


    FROM HumanResources.Employee


    FOR XML RAW, ROOT(''Employees''), TYPE


    );


    SELECT


    col.value(''@BusinessEntityID'', ''int'') AS BusinessEntityID,


    col.value(''@NationalIDNumber'', ''nvarchar(15)'') AS NationalIDNumber,


    col.value(''@LoginID'', ''nvarchar(256)'') AS LoginID,


    CAST(col.value(''@OrganizationNode'', ''nvarchar(256)'') AS hierarchyid)


    AS OrganizationNode,


    col.value(''@JobTitle'', ''nvarchar(50)'') AS JobTitle,


    col.value(''@BirthDate'', ''datetime'') AS BirthDate,


    col.value(''@MaritalStatus'', ''nchar(1)'') AS MaritalStatus,


    col.value(''@Gender'', ''nchar(1)'') AS Gender,


    col.value(''@HireDate'', ''datetime'') AS HireDate,


    col.value(''@SalariedFlag'', ''bit'') AS SalariedFlag,


    col.value(''@VacationHours'', ''smallint'') AS VacationHours,


    col.value(''@SickLeaveHours'', ''smallint'') AS SickLeaveHours,


    col.value(''@CurrentFlag'', ''bit'') AS CurrentFlag,


    col.value(''@rowguid'', ''uniqueidentifier'') AS rowguid,


    col.value(''@ModifiedDate'', ''datetime'') AS ModifiedDate


    FROM @x.nodes (''/Employees/row'') x (col);


    GO


    The next problem was performance. When I tested deserializing the XML using the
    preceding query, performance went from poor to downright abysmal—averaging 6.8157
    seconds per iteration.


    At this point, I decided to investigate SQLCLR options for solving the problem,
    focusing on both reuse potential and performance.


    CHAPTER


    „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    Binary Serialization with SQLCLR


    My first thought was to return binary serialized DataTables; in order to make
    that happen, I needed a way to return binary-formatted data from my CLR routines.
    This of course called for .NET’s


    BinaryFormatter class, so I created a class called serialization_helper, cataloged
    in an EXTERNAL_ACCESS


    assembly (required for System.IO access):


    using System;


    using System.Data;


    using System.Data.SqlClient;


    using System.Data.SqlTypes;


    using Microsoft.SqlServer.Server;


    using System.Security.Permissions;


    using System.Runtime.Serialization.Formatters.Binary;


    public partial class serialization_helper


    {


    public static byte[] getBytes(object o)


    {


    SecurityPermission sp =


    new SecurityPermission(


    SecurityPermissionFlag.SerializationFormatter);


    sp.Assert();


    BinaryFormatter bf = new BinaryFormatter();


    using (System.IO.MemoryStream ms =


    new System.IO.MemoryStream())


    {


    bf.Serialize(ms, o);


    return(ms.ToArray());


    }


    }


    public static object getObject(byte[] theBytes)


    {


    using (System.IO.MemoryStream ms =


    new System.IO.MemoryStream(theBytes, false))


    {


    return(getObject(ms));


    }


    }


    public static object getObject(System.IO.Stream s)


    {


    SecurityPermission sp =


    new SecurityPermission(


    SecurityPermissionFlag.SerializationFormatter);


    sp.Assert();


    CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    BinaryFormatter bf = new BinaryFormatter();


    return (bf.Deserialize(s));


    }


    };


    Use of this class is fairly straightforward: to serialize an object, pass it into
    the getBytes method. This method first uses an assertion, as discussed previously,
    to allow SAFE callers to use it, and then uses the binary formatter to serialize
    the object to a Stream. The stream is then returned as a collection of bytes.


    Deserialization can be done using either overload of the getObject method. I found
    that depending on the scenario, I might have ready access to either a Stream or
    a collection of bytes, so creating both overloads made sense instead of duplicating
    code to produce one from the other. Deserialization also uses an assertion before
    running, in order to allow calling code to be cataloged as SAFE.


    My first shot at getting the data was to simply load the input set into a DataTable
    and run it through the serialization_helper methods. The following code implements
    a UDF called GetDataTable_Binary, which uses this logic:


    [Microsoft.SqlServer.Server.SqlFunction(


    DataAccess = DataAccessKind.Read)]


    public static SqlBytes GetDataTable_Binary(string query)


    {


    SqlConnection conn =


    new SqlConnection("context connection = true;");


    SqlCommand comm = new SqlCommand();


    comm.Connection = conn;


    comm.CommandText = query;


    SqlDataAdapter da = new SqlDataAdapter();


    da.SelectCommand = comm;


    DataTable dt = new DataTable();


    da.Fill(dt);


    //Serialize and return the output


    return new SqlBytes(


    serialization_helper.getBytes(dt));


    }


    This method is used by passing in a query for the table that you’d like to get
    back in binary serialized form, as in the following example:


    DECLARE @sql nvarchar(max);


    SET @sql = ''SELECT


    BusinessEntityID,


    NationalIDNumber,


    LoginID,


    OrganizationNode.ToString(),


    OrganizationLevel,


    JobTitle,


    BirthDate,


    CHAPTER


    „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    MaritalStatus,


    Gender,


    HireDate,


    SalariedFlag,


    VacationHours,


    SickLeaveHours,


    CurrentFlag,


    rowguid,


    ModifiedDate


    FROM HumanResources.Employee'';


    DECLARE @x varbinary(max);


    SET @x = dbo.GetDataTable_Binary(@sql);


    GO


    „ **Note** The hierarchyid CLR datatype is not marked as serializable, so in the
    preceding query I use the ToString() method to serialize the string representation
    of the OrganizationNode value.


    The results of the initial performance test were very encouraging, revealing that
    average


    serialization speed had been reduced to just 0.1437 seconds—a massive improvement
    over the XML


    serialization method.


    The performance of the binary method could be improved yet further by setting
    the RemotingFormat property of the DataTable to Binary before serialization:


    dt.RemotingFormat = SerializationFormat.Binary;


    Making this change resulted in even faster performance—just 0.0576 seconds. What’s
    more, the resulting binary data was now only 68KB in size.


    Encouraged by the success of my first shot, I decided to investigate whether there
    were other SQLCLR methods that would improve the performance still further. After
    several more attempts that I won’t bore you with the details of, I decided to
    forgo the DataTable in favor of an alternative class: SqlDataReader. I worked
    on pulling the data out into object collections, and initial tests showed serialization
    performance with SqlDataReader to be just as good as the DataTable, but with a
    reduced output size. However, this approach was not without its own difficulties.'
  trans: "\n# 第七章 SQLCLR：架构与设计考量\n\n## XML 序列化问题\n\n我对结果 XML 的数据大小达到 105KB 感到惊讶，尽管\
    \ `HumanResources.Employee` 表本身只有 56KB 的数据。我尝试设置更短的列名，但这对大小影响甚微，并且造成了我认为难以维护的代码。\n\
    \n接下来，我设置了一个跟踪（trace）来收集 XML 序列化性能的一些概念（关于跟踪的更多信息，请参阅第三章）。跟踪结果显示，在我的系统上，前述查询的平均执行时间（在\
    \ 1,000 次迭代中平均）为相当不令人满意的 3.9095 秒每次迭代。\n\n经过一些试错，我发现通过使用 `TYPE` 指令可以提高 XML 序列化的性能，如下所示：\n\
    \n```sql\nDECLARE @x xml;\n\nSET @x = (\n    SELECT *\n    FROM HumanResources.Employee\n\
    \    FOR XML RAW, ROOT('Employees'), TYPE\n);\nGO\n```\n\n这一改动将每次迭代的平均时间略微降低到\
    \ 3.6687 秒——有所改进，但仍不是一个很好的结果。\n\n## XML 反序列化\n\n尽管 XML 序列化没有产生令人印象深刻的性能，我还是决定继续测试反序列化。第一个问题是从\
    \ XML 反序列化回表所需的代码。为了还原出我开始时完全相同的表，我必须为结果集显式定义每一列；这使得代码比我预期的要复杂得多。此外，由于 `XQuery`\
    \ `value` 语法不支持 `hierarchyid` 数据类型，`OrganizationNode` 列中的值必须作为 `nvarchar` 读取，然后\
    \ `CAST` 为 `hierarchyid`。生成的代码如下：\n\n```sql\nDECLARE @x xml;\n\nSET @x = (\n \
    \   SELECT *\n    FROM HumanResources.Employee\n    FOR XML RAW, ROOT('Employees'),\
    \ TYPE\n);\n\nSELECT\n    col.value('@BusinessEntityID', 'int') AS BusinessEntityID,\n\
    \    col.value('@NationalIDNumber', 'nvarchar(15)') AS NationalIDNumber,\n   \
    \ col.value('@LoginID', 'nvarchar(256)') AS LoginID,\n    CAST(col.value('@OrganizationNode',\
    \ 'nvarchar(256)') AS hierarchyid) AS OrganizationNode,\n    col.value('@JobTitle',\
    \ 'nvarchar(50)') AS JobTitle,\n    col.value('@BirthDate', 'datetime') AS BirthDate,\n\
    \    col.value('@MaritalStatus', 'nchar(1)') AS MaritalStatus,\n    col.value('@Gender',\
    \ 'nchar(1)') AS Gender,\n    col.value('@HireDate', 'datetime') AS HireDate,\n\
    \    col.value('@SalariedFlag', 'bit') AS SalariedFlag,\n    col.value('@VacationHours',\
    \ 'smallint') AS VacationHours,\n    col.value('@SickLeaveHours', 'smallint')\
    \ AS SickLeaveHours,\n    col.value('@CurrentFlag', 'bit') AS CurrentFlag,\n \
    \   col.value('@rowguid', 'uniqueidentifier') AS rowguid,\n    col.value('@ModifiedDate',\
    \ 'datetime') AS ModifiedDate\nFROM @x.nodes('/Employees/row') x (col);\nGO\n\
    ```\n\n下一个问题是性能。当我测试使用前面的查询反序列化 `XML` 时，性能从差劲变成了极其糟糕——平均每次迭代需要 6.8157 秒。\n\n此时，我决定研究用于解决该问题的\
    \ `SQLCLR` 选项，重点关注重用潜力和性能。\n\n## 使用 SQLCLR 进行二进制序列化\n\n我的第一个想法是返回二进制序列化的 `DataTable`；为了实现这一点，我需要一种从\
    \ `CLR` 例程返回二进制格式数据的方法。这当然需要 .NET 的 `BinaryFormatter` 类，因此我创建了一个名为 `serialization_helper`\
    \ 的类，该类在 `EXTERNAL_ACCESS` 程序集中编录（这是 `System.IO` 访问所必需的）：\n\n```csharp\nusing\
    \ System;\nusing System.Data;\nusing System.Data.SqlClient;\nusing System.Data.SqlTypes;\n\
    using Microsoft.SqlServer.Server;\nusing System.Security.Permissions;\nusing System.Runtime.Serialization.Formatters.Binary;\n\
    \npublic partial class serialization_helper\n{\n    public static byte[] getBytes(object\
    \ o)\n    {\n        SecurityPermission sp =\n            new SecurityPermission(\n\
    \                SecurityPermissionFlag.SerializationFormatter);\n        sp.Assert();\n\
    \        BinaryFormatter bf = new BinaryFormatter();\n        using (System.IO.MemoryStream\
    \ ms =\n            new System.IO.MemoryStream())\n        {\n            bf.Serialize(ms,\
    \ o);\n            return(ms.ToArray());\n        }\n    }\n\n    public static\
    \ object getObject(byte[] theBytes)\n    {\n        using (System.IO.MemoryStream\
    \ ms =\n            new System.IO.MemoryStream(theBytes, false))\n        {\n\
    \            return(getObject(ms));\n        }\n    }\n\n    public static object\
    \ getObject(System.IO.Stream s)\n    {\n        SecurityPermission sp =\n    \
    \        new SecurityPermission(\n                SecurityPermissionFlag.SerializationFormatter);\n\
    \        sp.Assert();\n        BinaryFormatter bf = new BinaryFormatter();\n \
    \       return (bf.Deserialize(s));\n    }\n};\n```\n\n这个类的使用相当直接：要序列化一个对象，将其传递给\
    \ `getBytes` 方法。该方法首先使用断言（assertion）（如前所述）允许 `SAFE` 调用者使用它，然后使用二进制格式化器将对象序列化到\
    \ `Stream` 中。该流随后作为字节集合返回。\n\n反序列化可以使用 `getObject` 方法的任一重载来完成。我发现根据场景的不同，我可能直接访问\
    \ `Stream` 或字节集合，因此创建两个重载是有意义的，而不是重复代码来相互转换。反序列化在运行前也使用断言，以允许调用代码被编录为 `SAFE`。\n\
    \n我获取数据的首次尝试是简单地将输入集加载到 `DataTable` 中，然后通过 `serialization_helper` 方法运行它。以下代码实现了一个名为\
    \ `GetDataTable_Binary` 的 `UDF`，它使用此逻辑：\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction(\n\
    \    DataAccess = DataAccessKind.Read)]\npublic static SqlBytes GetDataTable_Binary(string\
    \ query)\n{\n    SqlConnection conn =\n        new SqlConnection(\"context connection\
    \ = true;\");\n    SqlCommand comm = new SqlCommand();\n    comm.Connection =\
    \ conn;\n    comm.CommandText = query;\n    SqlDataAdapter da = new SqlDataAdapter();\n\
    \    da.SelectCommand = comm;\n    DataTable dt = new DataTable();\n    da.Fill(dt);\n\
    \    // 序列化并返回输出\n    return new SqlBytes(serialization_helper.getBytes(dt));\n\
    }\n```\n\n通过传入一个查询来调用此方法，该查询对应于你希望以二进制序列化形式获取的表，如下例所示：\n\n```sql\nDECLARE @sql\
    \ nvarchar(max);\nSET @sql = 'SELECT\n    BusinessEntityID,\n    NationalIDNumber,\n\
    \    LoginID,\n    OrganizationNode.ToString(),\n    OrganizationLevel,\n    JobTitle,\n\
    \    BirthDate,\n    MaritalStatus,\n    Gender,\n    HireDate,\n    SalariedFlag,\n\
    \    VacationHours,\n    SickLeaveHours,\n    CurrentFlag,\n    rowguid,\n   \
    \ ModifiedDate\nFROM HumanResources.Employee';\n\nDECLARE @x varbinary(max);\n\
    SET @x = dbo.GetDataTable_Binary(@sql);\nGO\n```\n\n> 注意：`hierarchyid` CLR 数据类型未标记为可序列化，因此在上面的查询中，我使用\
    \ `ToString()` 方法来序列化 `OrganizationNode` 值的字符串表示形式。\n\n初步性能测试的结果非常令人鼓舞，显示平均序列化速度已降至仅\
    \ 0.1437 秒——相比 XML 序列化方法有了巨大改进。\n\n通过在序列化前将 `DataTable` 的 `RemotingFormat` 属性设置为\
    \ `Binary`，可以进一步提升二进制方法的性能：\n\n```csharp\ndt.RemotingFormat = SerializationFormat.Binary;\n\
    ```\n\n进行此更改后，性能更快——仅需 0.0576 秒。此外，生成的二进制数据大小现在仅为 68KB。\n\n首次尝试的成功鼓舞了我，我决定研究是否存在其他\
    \ `SQLCLR` 方法可以进一步提升性能。经过几次我就不赘述细节的尝试后，我决定放弃 `DataTable`，转而使用另一个类：`SqlDataReader`。我致力于将数据提取到对象集合中，初步测试显示使用\
    \ `SqlDataReader` 的序列化性能与 `DataTable` 一样好，但输出大小更小。然而，这种方法本身也并非没有困难。\n"
- fmt: 'The advantage of a `DataTable` is that it’s one easy-to-use unit that contains
    all of the data, as well as the associated metadata. You don’t have to be concerned
    with column names, types, and sizes, as everything is automatically loaded into
    the `DataTable` for you. Working with a `SqlDataReader` requires a bit more work,
    since it can’t be serialized as a single unit, but must instead be split up into
    its component parts.


    Since the code I implemented is somewhat complex, I will walk you through it section
    by section. To begin with, I set the `DataAccessKind.Read` property on the `SqlFunctionAttribute`
    in order to allow the method to access data via the context connection. A generic
    `List` is instantiated, which will hold one `object` collection per row of data,
    in addition to one for the metadata. Finally, the `SqlConnection` is instantiated
    and the `SqlCommand` is set up and executed:


    ## CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    ```

    [Microsoft.SqlServer.Server.SqlFunction(


    DataAccess = DataAccessKind.Read)]


    public static SqlBytes GetBinaryFromQueryResult(string query)


    {


    List<object[]> theList = new List<object[]>();


    using (SqlConnection conn =


    new SqlConnection("context connection = true;"))


    {


    SqlCommand comm = new SqlCommand();


    comm.Connection = conn;


    comm.CommandText = query;


    conn.Open();


    SqlDataReader read = comm.ExecuteReader();

    ```


    The next step is to pull the metadata for each column out of the `SqlDataReader`.
    A method called `GetSchemaTable` is used to return a `DataTable` populated with
    one row per column. The available fields are documented in the MSDN Library, but
    I’m using the most common of them in the code that follows.


    After populating the `object` collection with the metadata, it is added to the
    output `List`:


    ```

    DataTable dt = read.GetSchemaTable();


    //Populate the field list from the schema table


    object[] fields = new object[dt.Rows.Count];


    for (int i = 0; i < fields.Length; i++)


    {


    object[] field = new object[5];


    field[0] = dt.Rows[i]["ColumnName"];


    field[1] = dt.Rows[i]["ProviderType"];


    field[2] = dt.Rows[i]["ColumnSize"];


    field[3] = dt.Rows[i]["NumericPrecision"];


    field[4] = dt.Rows[i]["NumericScale"];


    fields[i] = field;


    }


    //Add the collection of fields to the output list


    theList.Add(fields);

    ```


    Finally, the code loops over the rows returned by the query, using the `GetValues`
    method to pull each row out into an `object` collection that is added to the output.
    The `List` is converted into an array of `object[]` (`object[][]`, to be more
    precise), which is serialized and returned to the caller.


    ```

    //Add all of the rows to the output list


    while (read.Read())


    {


    object[] o = new object[read.FieldCount];


    read.GetValues(o);


    theList.Add(o);


    }


    }


    // CHAPTER „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    //Serialize and return the output


    return new SqlBytes(


    serialization_helper.getBytes(theList.ToArray()));


    }

    ```


    Once this function is created, calling it is almost identical to calling `GetDataTable_Binary`:


    ```

    DECLARE @sql nvarchar(max);


    SET @sql = ''SELECT BusinessEntityID,


    NationalIDNumber,


    LoginID,


    OrganizationNode.ToString(),


    OrganizationLevel,


    JobTitle,


    BirthDate,


    MaritalStatus,


    Gender,


    HireDate,


    SalariedFlag,


    VacationHours,


    SickLeaveHours,


    CurrentFlag,


    rowguid,


    ModifiedDate FROM HumanResources.Employee''


    DECLARE @x varbinary(max);


    SET @x = dbo.GetBinaryFromQueryResult(@sql);


    GO

    ```


    The result, 57KB worth of binary data, represented a 15 percent reduction in size
    compared to the `DataTable` method. If using this method to transfer data between
    broker instances on remote servers, the associated decrease in network traffic
    could make a big difference to performance. What’s more, the serialization performance
    using `SqlDataReader` was the fastest yet, with an average query execution time
    of just 0.0490 seconds.


    ### Binary Deserialization


    Pleased with the results of binary serialization using SQLCLR, I decided to go
    ahead with deserialization.'
