    ```

    LEVEL_2 = HIGH,

    LEVEL_3 = HIGH,

    LEVEL_4 = HIGH),

    CELLS_PER_OBJECT = 16);

    ```


    我们将再次使用 `sp_help_spatial_geography_index` 存储过程来检查此索引的属性：


    ```

    EXEC sp_help_spatial_geography_index

    @tabname = allCountries,

    @indexname = idxallCountriesHigh,

    @verboseoutput = 1,

    @query_sample = ''POLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))'';

    ```


    ## 索引性能对比


    不出所料，`Base_Table_Rows` 值保持不变，仍为 `6,906,119`，查询输出的总行数 `44,840` 也是如此。主筛选器选择的行数非常接近，为
    `49,157`，主筛选器效率几乎未变——从 `91.4766` 变为 `91.21793`。然而，索引之间存在一个非常重要的区别，如下列行所示：


    `Number_Of_Rows_Selected_By_Internal_Filter` `25333`

    `Number_Of_Times_Secondary_Filter_Is_Called` `23824`

    `Percentage_Of_Primary_Filter_Rows_Selected_By_Internal_Filter` `51.5348780438188`

    `Internal_Filter_Efficiency` `56.4964317573595`


    当使用 `MEDIUM` 网格分辨率时，主筛选器选择的候选行中有 `79.385%` 可以被自动包含在结果集中。因此，对于剩余的 `10,105` 行，只需调用二级筛选器。然而，当设置为
    `HIGH` 分辨率时，只有 `51.53%` 的主筛选器行能被内部筛选器预先选中。因此，昂贵的二级筛选器不得不被调用两次。


    ## 网格分辨率选择原理


    乍一想，这似乎不合逻辑。人们可能会认为，在为点表建立索引时，由于每个几何体最多只能与一个单元格相交（或者如果点位于单元格相交的角落，则最多与四个单元格相交），`HIGH`
    网格分辨率必定能提供最佳拟合。每个点几何体在索引中只需要一个单元格，而使用 `HIGH` 分辨率时，该单元格将尽可能精细。


    然而，重要的是要认识到，为了满足空间查询，用于比较几何体的空间谓词（即存储过程定义的查询样本）也必须使用与基表本身相同的索引设置进行镶嵌。在本例中，`@BoundingBox`
    是一个相当大的多边形，代表科罗拉多州，这需要大量单元格才能完全覆盖。由于这超过了 `CELLS_PER_OBJECT` 的限制，镶嵌操作被停止，其拟合效果就不如预期。在此示例中，`MEDIUM`
    分辨率网格提供的索引比 `HIGH` 分辨率网格更准确，因此性能更好。


    遗憾的是，关于确定最佳空间索引设置，几乎没有通用的规则可以遵循，因为它们很大程度上取决于相关数据的确切分布以及针对该数据运行的查询的性质。调整空间索引需要大量的试错过程，但这里介绍的存储过程可以提供宝贵的统计数据来评估索引的性能，从而辅助这一过程。


    ## 总结


    空间数据是数据库开发中一个令人兴奋且不断发展的领域。随着更多应用程序和服务具备位置感知能力，所有类型的数据都需要以结构化的、可搜索的方式与关联的空间信息一起存储。


    SQL Server 2008 中的 `geography` 和 `geometry` 数据类型提供了一种强大且符合标准的方式，可以使用平面或椭球体模型来存储、检索和对空间数据执行计算。然而，空间数据的复杂性和独特性意味着必须采取特定的方法来确保空间查询保持高性能。空间索引可用于提供数据的主筛选器以满足空间查询，从而减少执行昂贵的精确空间操作（如
    `STIntersects()`）所需的处理量。


