    DECLARE @depth int = 1;\n\nINSERT INTO @n\nSELECT\n    EmployeeID,\n    ManagerID,\n\
    \    Title,\n    @depth,\n    '0000000001/'\nFROM Employee_Temp\nWHERE ManagerID\
    \ IS NULL;\n```\n\n在第一行就位后，逻辑与 CTE 中使用的递归逻辑相同。对于每个深度层级，查找下属。唯一的区别是，这是使用 `WHILE`\
    \ 循环完成的，而不是递归 CTE：\n\n```sql\nWHILE 1=1\nBEGIN\n    INSERT INTO @n\n    SELECT\n\
    \        e.EmployeeID,\n        e.ManagerID,\n        e.Title,\n        @depth\
    \ + 1,\n        n.thePath +\n            RIGHT(\n                REPLICATE('0',\
    \ 10) +\n                CONVERT(varchar, ROW_NUMBER() OVER\n                \
    \    (PARTITION BY e.ManagerID ORDER BY e.Title)),\n                10) + '/'\n\
    \    FROM Employee_Temp e\n    JOIN @n n on n.EmployeeID = e.ManagerID\n    WHERE\
    \ n.Depth = @depth;\n\n    IF @@ROWCOUNT = 0\n        BREAK;\n\n    SET @depth\
    \ = @depth + 1;\nEND\n```\n\n最后，可以从表变量中查询输出。和之前一样，需要 `ORDER BY` 子句：\n\n```sql\n\
    SELECT\n    EmployeeID,\n    ManagerID,\n    Title,\n    thePath\nFROM @n\nORDER\
    \ BY\n    thePath;\n```\n\n此方法使用的代码比 CTE 多出 50% 以上，相当不直观，并且存在更多可能引入逻辑错误的潜在区域。然而，其性能比\
    \ CTE 好得多。在我的笔记本电脑上，针对增强型 `Employee_Temp` 表，枚举路径 CTE 执行 347,282 次读取，运行时间为 27.6\
    \ 秒。而迭代方法仅需 173,536 次读取，运行时间为 13.2 秒。\n\n尽管在此案例中性能有明显提升，但我并不建议在大多数情况下使用此方法。我认为，除了最极端的情况（如此处演示的案例），可维护性问题盖过了性能优势。因此，本章剩余的示例将使用\
    \ CTE。不过，您应该能够将任何示例转换为使用迭代逻辑。如果您决定在项目中使用此技术，可能会发现将代码封装在多语句表值 UDF 中是有益的，以提供更大的重用潜力。\n\
    \n**注意** 如果您正按照本章的示例操作，并且增加了 `Employee_Temp` 表中的行数，则应在继续本章剩余内容之前删除并重新创建它。\n\n\
    ## 向上遍历层次结构\n\n对于邻接列表，向上遍历层次结构——换句话说，查找任意给定节点到根节点的祖先路径——本质上与向下遍历层次结构相反。在递归的每个层级，不使用\
    \ `ManagerID` 作为键，而是使用 `EmployeeID`。以下 CTE 展示了如何获取从研发经理（`EmployeeID` 217）到首席执行官的路径：\n\
    \n```sql\nWITH n AS\n(\n    SELECT\n        ManagerID,\n        CONVERT(varchar(900),\n\
    \            RIGHT(\n                REPLICATE('0', 10) +\n                CONVERT(varchar,\
    \ EmployeeID) + '/', 10)\n        ) AS thePath\n    FROM Employee_Temp\n    WHERE\
    \ EmployeeID = 217\n\n    UNION ALL\n\n    SELECT\n        e.ManagerID,\n    \
    \    CONVERT(varchar(900),\n            n.thePath +\n            RIGHT(\n    \
    \            REPLICATE('0', 10) +\n                CONVERT(varchar, e.EmployeeID),\n\
    \                10) + '/'\n        ) AS thePath\n    FROM Employee_Temp e\n \
    \   JOIN n ON n.ManagerID = e.EmployeeID\n)\nSELECT *\nFROM n\nWHERE ManagerID\
    \ IS NULL;\n```\n\n此查询将从所选节点到首席执行官的路径作为员工 ID 的物化路径返回。但是，您可能更希望将结果作为员工 ID 表返回。为此，将外部查询更改为以下内容：\n\
    \n```sql\nSELECT\n    COALESCE(ManagerID, 217) AS EmployeeID\nFROM n\nORDER BY\n\
    \    CASE\n        WHEN ManagerID IS NULL THEN 0\n        ELSE 1\n    END,\n \
    \   thePath;\n```\n\n在此案例中，`SELECT` 列表中使用的 `COALESCE` 函数将首席执行官的 `ManagerID`（为\
    \ `NULL`）替换为目标 `EmployeeID`。`ORDER BY` 子句中的 `CASE` 表达式强制 `NULL` 行排在最前面，以便首先返回目标\
    \ `EmployeeID`。所有其他排序基于物化路径，这自然会将首席执行官的行排在最后。\n\n## 插入新节点和重新定位子树\n\n在邻接列表层次结构中，插入新节点通常非常简单。插入叶节点（即没有下属的节点）只需在表中插入一个新节点。要插入非叶节点，还必须更新您在其下插入节点的任何直接下属，使它们指向新的管理者。这实际上等同于插入一个新节点，然后将旧节点的子树重新定位到新节点下，这就是为什么我将这两个主题合并为一节的原因。\n\
    \n例如，假设 AdventureWorks 决定聘请一位新的首席技术官，当前的工程副总裁（`EmployeeID` 12）将向其汇报。要在 `Employee_Temp`\
    \ 表中反映这些更改，首先插入新的首席技术官节点，然后将副总裁的节点更新为向新的首席技术官汇报：\n\n```sql\nINSERT INTO Employee_Temp\n\
    (\n    EmployeeID,\n    ManagerID,\n    Title\n)\nVALUES\n(\n    999,\n    109,\n\
    \    'CTO'\n);\nGO\n\nUPDATE Employee_Temp\nSET ManagerID = 999\nWHERE EmployeeID\
    \ = 12;\nGO\n```\n\n就是这样！相同的逻辑可应用于任何子树重新定位——邻接列表相对于本章讨论的其他层次结构技术的优势之一，就是可以轻松处理此类数据修改。\n\
    \n## 删除现有节点\n\n在邻接列表中删除节点仅比插入新的非叶节点稍微复杂一点。这次，第一步是将所有下属重新定位到待删除节点之外——关键是 *下属* 是复数，因为可能不止一个。一旦这些子树被重新定位到新的管理者下，就可以简单地删除叶节点。\n\
    \n假设在新的首席技术官上班第一天，她中彩票了，并决定宁愿去玩帆船比赛也不愿继续在 AdventureWorks 工作。将她从组织层次结构中移除需要将她的下属重新定位回首席执行官，然后删除她的节点（该节点将成为叶节点）。由于表上的自引用外键，非叶节点无法被删除——这是邻接列表的另一个不错的附带好处。\n\
    \n以下 T-SQL 可用于将首席技术官的下属重新定位到她的直接管理者，然后移除首席技术官的节点：\n\n```sql\nUPDATE Employee_Temp\n\
    SET ManagerID =\n    (\n        SELECT ManagerID\n        FROM Employee_Temp\n\
    \        WHERE EmployeeID = 999\n    )\nWHERE ManagerID = 999;\n\nDELETE FROM\
    \ Employee_Temp\nWHERE EmployeeID = 999;\n```\n\n此代码通过查找待移除节点的管理者，并将该节点的所有直接下属更新为指向该管理者（换句话说，每个下属的“祖父”节点成为他们的“父”节点）来工作。更新完成后，该节点成为叶节点，因此可以被移除。\n\
    \n## 约束层次结构\n\n本章展示的每个层次结构遍历示例都对数据做出了一个非常重要的假设：理所当然地认为没有循环或其他违反有效层次结构规则的数据问题。此假设的主要好处是生成的代码可以简化很多；问题在于，如果不良数据渗入，更简单的代码容易出现各种问题——正如大多数读者无疑意识到的，如果有机会，不良数据可以也\
    \ *将* 会渗入。"
- fmt: "Simple code is a good thing, so instead of making the code more complex, we\
    \ have a choice: either cross our fingers for luck and hope that the system never\
    \ has occasion to melt down at runtime, or better, actually constrain the data\
    \ to ensure that it remains valid. From a defensive point of view, I highly recommend\
    \ the second approach.\n\nThere are two possible issues that can make life difficult\
    \ for hierarchical queries: forests and cycles.\n\n`Forests` occur when there\
    \ are multiple root nodes in the hierarchy. And although they may make sense for\
    \ some types of data, for organizational charts they do not. `Cycles` occur when,\
    \ somewhere downstream from a given node, that node is suddenly referenced again.\
    \ For example, if George manages Ed, Ed manages Steve, and Steve manages George,\
    \ a cycle has been formed—this is not only unrealistic, but also cause for a runtime\
    \ exception due to an endless loop!\n\nThe `Employee_Temp` table we’ve been working\
    \ with already has a couple of constraints that help guard against certain issues:\
    \ a primary key and a self-referencing foreign key. The primary key, which is\
    \ on the `EmployeeID` column, guards against most cycles by making it impossible\
    \ for a given employee to have more than one manager. And the self-referencing\
    \ foreign key guards against most forest issues because every node must be connected\
    \ to another node that already exists—unless it’s a root node.\n\n# CHAPTER 12\
    \ „ TREES, HIERARCHIES, AND GRAPHS\n\nThe first thing that must be constrained\
    \ against is multiple root nodes. One method that might come to mind to handle\
    \ this is using a trigger, but I find it slightly more interesting to employ an\
    \ indexed view:\n\n```sql\nCREATE VIEW OnlyOneRoot\nWITH SCHEMABINDING\nAS\nSELECT\n\
    \    ManagerID\nFROM dbo.Employee_Temp\nWHERE\n    ManagerID IS NULL;\nGO\n\n\
    CREATE UNIQUE CLUSTERED INDEX IX_OnlyOneRoot\nON OnlyOneRoot (ManagerID);\nGO\n\
    ```\n\nThe view returns all rows in the table with a `NULL` manager ID, and the\
    \ index, because it is `UNIQUE`, only allows one such row to be inserted.\n\n\
    While this approach works well to prevent multiple root nodes from being created,\
    \ it does not enforce the hierarchical condition that there should always be *exactly*\
    \ *one* root node. For example, it doesn’t stop someone from assigning a manager\
    \ to the root node (the unique constraint can only enforce rows that exist, and\
    \ by updating the table, the `NULL` manager ID would no longer exist at all).\
    \ To solve this problem, a trigger can be used to make sure that there is always\
    \ at least one `NULL` manager ID in the table:\n\n```sql\nCREATE TRIGGER tg_AtLeastOneRoot\n\
    ON Employee_Temp\nFOR UPDATE\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    IF NOT EXISTS\n\
    \    (\n        SELECT *\n        FROM Employee_Temp\n        WHERE ManagerID\
    \ IS NULL\n    )\n    BEGIN\n        RAISERROR('A root node is required', 16,\
    \ 1);\n        ROLLBACK;\n    END\nEND;\nGO\n```\n\nTo eliminate the possibility\
    \ of cycles, we need to think about what kinds of cycles can exist in the table.\
    \ To begin with, the simplest cycle—and one that’s not constrained against by\
    \ either the primary key or the foreign key—is an employee managing herself. This\
    \ is easily solved with a check constraint:\n\n```sql\nALTER TABLE Employee_Temp\n\
    ADD CONSTRAINT ck_ManagerIsNotEmployee\nCHECK (EmployeeID <> ManagerID);\nGO\n\
    ```\n\nThis constraint does nothing for deeper cycles, where an employee manages\
    \ himself one or more levels below. For instance, if George manages Ed and Ed\
    \ manages Steve, someone could issue an update to the table so that Ed manages\
    \ George. This would create a deeper cycle that the constraint would not be able\
    \ to catch. In order to solve this problem, a trigger can be employed. The trigger\
    \ should start with the updated row, traversing up the tree toward the root node.\
    \ Should it encounter the same employee a second time before hitting the root,\
    \ it is apparent that there is a cycle. Following is the code for such a trigger:\n\
    \n```sql\nCREATE TRIGGER tg_NoCycles\nON Employee_Temp\nFOR UPDATE\nAS\nBEGIN\n\
    \    SET NOCOUNT ON;\n\n    --Only check if the ManagerID column was updated\n\
    \    IF NOT UPDATE(ManagerID)\n        RETURN;\n\n    --Avoid cycles\n    DECLARE\
    \ @CycleExists bit = 0;\n\n    --Traverse up the hierarchy toward the leaf node\n\
    \    WITH e AS\n    (\n        SELECT EmployeeID, ManagerID\n        FROM inserted\n\
    \        UNION ALL\n        SELECT e.EmployeeID, et.ManagerID\n        FROM Employee_Temp\
    \ et\n        JOIN e ON e.ManagerID = et.EmployeeID\n        WHERE\n         \
    \   et.ManagerID IS NOT NULL\n            AND e.ManagerID <> e.EmployeeID\n  \
    \  )\n    SELECT @CycleExists = 1\n    FROM e\n    WHERE e.ManagerID = e.EmployeeID;\n\
    \n    IF @CycleExists = 1\n    BEGIN\n        RAISERROR('The update introduced\
    \ a cycle', 16, 1);\n        ROLLBACK;\n    END\nEND\nGO\n```\n\nThis type of\
    \ cycle can only be caused by either updates or multirow inserts, and in virtually\
    \ all of the hierarchies I’ve seen in production environments, there were no multirow\
    \ inserts. Therefore, this trigger is set to only fire on updates. Remember to\
    \ change the trigger definition if you need to work with multirow inserts in your\
    \ environment.\n\n`Caution` Excessive or inappropriate use of triggers can degrade\
    \ query performance. While the solution proposed in this section solves the problem\
    \ of cycles using triggers in the database, you might want to consider enforcing\
    \ this kind of business logic in an application layer instead, if it makes more\
    \ sense to do so.\n\n## Persisted Materialized Paths\n\nThe adjacency list model,\
    \ while both a de facto standard for modeling hierarchies and extremely easy to\
    \ work with from a data manipulation point of view, suffers from inefficiencies\
    \ due to the fact that the hierarchy must be traversed using either recursion\
    \ or iteration. In this section we’ll look at an alternative technique that avoids\
    \ this problem: `persisted materialized paths`. While this technique can act as\
    \ a stand-alone replacement for adjacency lists, I recommend using it in conjunction\
    \ with existing adjacency list hierarchies. In the following sections, I will\
    \ show you how to maintain both hierarchy types alongside each other in the `Employee_Temp`\
    \ table, using a series of triggers.\n\nIn the previous section’s examples, a\
    \ materialized path was used to provide an ordered representation of the hierarchy\
    \ for output purposes. This same path can be persisted in the table to allow you\
    \ to answer all of the same hierarchical questions as with an adjacency list,\
    \ but without the necessity for recursion or iteration.\n\nTo add and populate\
    \ a materialized path column to the `Employee_Temp` table, first add a new column\
    \ of type `varchar(900)` and then update the table using a recursive CTE used\
    \ to get the path for each node:\n\n```sql\nALTER TABLE Employee_Temp\nADD thePath\
    \ varchar(900);\nGO\n\nWITH n AS\n(\n    SELECT\n        EmployeeID,\n       \
    \ CONVERT(varchar(900),\n            '/' + CONVERT(varchar, EmployeeID) + '/'\n\
    \        ) AS thePath\n    FROM Employee_Temp\n    WHERE ManagerID IS NULL\n\n\
    \    UNION ALL\n\n    SELECT\n        e.EmployeeID,\n        CONVERT(varchar(900),\n\
    \            n.thePath +\n            CONVERT(varchar, e.EmployeeID) + '/'\n \
    \       ) AS thePath\n    FROM Employee_Temp e\n    JOIN n ON n.EmployeeID = e.ManagerID\n\
    )\nUPDATE Employee_Temp\nSET Employee_Temp.thePath = n.thePath\nFROM Employee_Temp\n\
    JOIN n ON n.EmployeeID = Employee_Temp.EmployeeID;\nGO\n```\n\n`varchar(900)`\
    \ is important in this case because the materialized path will be used as an index\
    \ key in order to allow it to be efficiently used to traverse the hierarchy. Index\
    \ keys in SQL Server are limited to 900 bytes. This is also a bit of a limitation\
    \ for persisted materialized paths; a path to navigate an especially deep hierarchy\
    \ will not be indexable and therefore will not be usable for this technique."
