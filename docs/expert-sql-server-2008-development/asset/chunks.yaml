    \    sys.dm_exec_requests er\n    JOIN sys.dm_os_tasks ot ON er.task_address =\
    \ ot.task_address\n    JOIN sys.dm_resource_governor_workload_groups rgwg\n  \
    \      ON er.group_id = rgwg.group_id\n    JOIN sys.dm_os_schedulers os ON ot.scheduler_id\
