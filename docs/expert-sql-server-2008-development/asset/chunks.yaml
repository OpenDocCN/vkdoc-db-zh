- fmt: '# CHAPTER 8: DYNAMIC T-SQL


    For example, consider the question of sorting data. In order for the database
    to sort data, the data must be queried. This means that it must be read from disk
    or memory, thereby using I/O and CPU time, filtered appropriately, and finally
    sorted and returned to the caller. Every time the data needs to be resorted a
    different way, it must be reread or sorted in memory and refiltered by the database
    engine.


    This can add up to quite a bit of load if there are hundreds or thousands of users
    all trying to sort data in different ways, and all sharing resources on the same
    database server.


    Due to this issue, if the same data is resorted again and again (for instance,
    by a user who wants to see various high or low data points), it often makes sense
    to do the work in a disconnected cache. A desktop application that uses a client-side
    data grid, for example, can load the data only once, and then sort and resort
    it using the client computer’s resources rather than the database server’s resources.
    This can take a tremendous amount of strain off the database server, meaning that
    it can use its resources for other data-intensive operations.


    Aside from the scalability concerns, it’s important to note that database-based
    solutions can be tricky and difficult to test and maintain. I offer some suggestions
    in the section “Going Dynamic: Using EXECUTE,” but keep in mind that procedural
    code may be easier to work with for these purposes than T-SQL.


    Once you’ve exhausted all other resources, *only then* should you look at the
    database as a solution for dynamic operations. In the database layer, the question
    of using dynamic SQL instead of static SQL comes down to issues of both maintainability
    and performance. The fact is, dynamic SQL can be made to perform much better than
    simple static SQL for many dynamic cases, but more complex (and difficult-to-maintain)
    static SQL will generally outperform maintainable dynamic SQL solutions. For the
    best balance of maintenance vs. performance, I always favor the dynamic SQL solution.


    # Compilation and Parameterization


    Any discussion of dynamic SQL and performance would not be complete without some
    basic background information concerning how SQL Server processes queries and caches
    their plans. To that end, I will provide a brief discussion here, with some examples
    to help you get started in investigating these behaviors within SQL Server.


    Every query executed by SQL Server goes through a compilation phase before actually
    being executed by the query processor. This compilation produces what is known
    as a `query plan`, which tells the query processor how to physically access the
    tables and indexes in the database in order to satisfy the query. However, query
    compilation can be expensive for certain queries, and when the same queries or
    types of queries are executed over and over, there is generally no reason to compile
    them each time.


    In order to save on the cost of compilation, SQL Server caches query plans in
    a memory pool called the `query plan cache`.


    The `query plan cache` uses a simple hash lookup based on the exact text of the
    query in order to find a previously compiled plan. If the exact query has already
    been compiled, there is no reason to recompile it, and SQL Server skips directly
    to the execution phase in order to get the results for the caller.


    If a compiled version of the query is not found, the first step taken is parsing
    of the query. SQL Server determines which operations are being conducted in the
    SQL, validates the syntax used, and produces a `parse tree`, which is a structure
    that contains information about the query in a normalized form. The `parse tree`
    is further validated and eventually compiled into a `query plan`, which is placed
    into the `query plan cache` for future invocations of the query.


    The effect of the `query plan cache` on execution time can be seen even with simple
    queries. To demonstrate this, first use the `DBCC FREEPROCCACHE` command to empty
    out the cache:


    ```

    DBCC FREEPROCCACHE

    ```'
