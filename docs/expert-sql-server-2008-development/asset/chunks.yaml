    \n在我看来，你只应在描述真正异常情况时引发异常。此外，由于异常可能导致中止条件，因此应谨慎使用。然而，使用异常而非错误确实有一个好处，那就是调用者更难忽略异常，因为如果未得到正确处理，它将导致代码中止。如果你正在设计一个需要确保调用者在某个条件发生时绝对能看到它的接口，那么使用异常而非错误可能是有意义的。\n\
    \n与几乎所有情况一样，这个决定很大程度上取决于你应用程序的上下文，所以不必觉得必须遵循我的意见！\n\n## SQL Server 中异常的工作原理\n\n\
    理解如何在 SQL Server 中处理错误和异常的第一步，是看看服务器本身如何处理错误条件。与许多其他编程语言不同，SQL Server 的异常模型对不同类型的异常有不同的行为。当错误条件确实发生时，这可能导致意外行为，因此在处理\
    \ T-SQL 异常时，谨慎编程至关重要。\n\n首先，考虑连接到 SQL Server 并发出一些 T-SQL。首先，你必须通过提供登录凭据来建立与服务器的`连接`。该连接还确定哪个数据库将用作作用域解析（即查找对象——稍后会详细介绍）的默认数据库。\n\
    \n一旦连接上，你就可以发出一批 T-SQL。一批由一个或多个 T-SQL`语句`组成，这些语句将被一起编译以形成一个执行计划。\n\nSQL Server\
    \ 抛出的异常行为大多遵循相同的模式：根据异常类型，一条语句、一个批处理或整个连接可能会被中止。让我们看一些实际例子来观察这种行为。\n\n## 语句级异常\n\
    \n语句级异常只中止在一批 T-SQL 中当前正在运行的语句，允许该批中的任何后续语句运行。要查看此行为，你可以使用 SQL Server Management\
    \ Studio 执行一个包含异常，后跟一条`PRINT`语句的批处理。\n\n例如：\n\n```sql\nSELECT POWER(2, 32);\n\
    PRINT 'This will print!';\nGO\n```\n\n运行此批处理会产生以下输出：\n\n```text\nMsg 232, Level\
    \ 16, State 3, Line 1\nArithmetic overflow error for type int, value = 4294967296.000000.\n\
    This will print!\n```\n\n当运行此批处理时，尝试计算`POWER(2, 32)`导致了整数溢出，从而抛出了异常。然而，只有`SELECT`语句被中止。批处理的其余部分继续运行，在本例中，这意味着`PRINT`语句仍然打印了其消息。\n\
    \n## 批处理级异常\n\n与语句级异常不同，批处理级异常不允许批处理的其余部分继续运行。引发异常的语句将被中止，批处理中剩余的任何语句都不会运行。一个批处理中止异常的例子是无效转换，如下所示：\n\
    \n```sql\nSELECT CONVERT(int, 'abc');\nPRINT 'This will NOT print!';\nGO\n```\n\
    \n此批处理的输出如下：\n\n```text\nMsg 245, Level 16, State 1, Line 1\nConversion failed\
    \ when converting the varchar value 'abc' to data type int.\n```\n\n在这种情况下，转换异常发生在`SELECT`语句中，这在该点中止了批处理。`PRINT`语句未被允许运行，尽管如果批处理在异常发生*之前*包含任何有效语句，这些语句本应已成功执行。\n\
    \n批处理级异常很容易与连接级异常（它们会断开与服务器的连接）混淆，但在批处理级异常之后，连接仍然可以自由发送其他批处理。例如：\n\n```sql\nSELECT\
    \ CONVERT(int, 'abc');\nGO\nPRINT 'This will print!';\nGO\n```\n\n在此情况下，有两个批处理被发送到\
    \ SQL Server，由批处理分隔符`GO`分隔。第一个批处理抛出了转换异常，但第二个批处理仍然运行。这导致以下输出：\n\n```text\nMsg\
    \ 245, Level 16, State 1, Line 2\nConversion failed when converting the varchar\
    \ value 'abc' to data type int.\nThis will print!\n```\n\n批处理级异常不仅影响异常发生的作用域。异常将`向上冒泡`到下一级执行，中止堆栈中的每一个调用。这可以通过创建以下存储过程来说明：\n\
    \n```sql\nCREATE PROCEDURE ConversionException\nAS\nBEGIN\n    SELECT CONVERT(int,\
    \ 'abc');\nEND;\nGO\n```\n\n运行此存储过程后跟一条`PRINT`语句表明，即使异常发生在内部作用域（存储过程中），外部批处理仍然被中止：\n\
    \n```sql\nEXEC ConversionException;\nPRINT 'This will NOT print!';\nGO\n```\n\n\
    此批处理的结果与未使用存储过程时相同：\n\n```text\nMsg 245, Level 16, State 1, Line 4\nConversion\
    \ failed when converting the varchar value 'abc' to data type int.\n```\n\n##\
    \ 解析和作用域解析异常\n\n在解析或编译的作用域解析阶段发生的异常，起初表现得与批处理级异常一模一样。然而，它们的行为实际上略有不同。如果异常与批处理的其余部分发生在同一作用域中，这些异常的行为将与批处理级异常完全一样。另一方面，如果异常发生在较低级别的作用域中，这些异常的行为将与语句级异常完全一样——至少，就外部批处理而言是这样。\n\
    \n作为一个例子，考虑以下批处理，其中包含一个格式错误的`SELECT`语句（这是一个解析异常）：\n\n```sql\nSELECTxzy FROM SomeTable;\n\
    PRINT 'This will NOT print!';\nGO\n```\n\n在这种情况下，`PRINT`语句没有运行，因为在解析阶段整个批处理被丢弃。输出是以下异常消息：\n\
    \n```text\nMsg 156, Level 15, State 1, Line 1\nIncorrect syntax near the keyword\
    \ 'FROM'.\n```\n\n要看到行为上的差异，可以使用`EXEC`函数将`SELECT`语句作为动态 SQL 执行。这导致`SELECT`语句在不同的作用域中执行，将异常行为从类似批处理变为类似语句。尝试运行以下\
    \ T-SQL 来观察变化：\n\n```sql\nEXEC('SELECTxzy FROM SomeTable');\nPRINT 'This will\
    \ print!';\nGO\n```\n\n现在，`PRINT`语句被执行了，尽管异常发生了：\n\n```text\nMsg 156, Level 15,\
    \ State 1, Line 1\nIncorrect syntax near the keyword 'FROM'.\nThis will print!\n\
    ```"
- fmt: "# CHAPTER 4：ERRORS AND EXCEPTIONS\n\nThis type of exception behavior also\
    \ occurs during `scope resolution`. Essentially, SQL Server processes queries\
    \ in two phases. The first phase parses and validates the query and ensures that\
    \ the TSQL is well formed. The second phase is the compilation phase, during which\
    \ an execution plan is built and objects referenced in the query are resolved.\
    \ If a query is submitted to SQL Server via ad hoc SQL from an application or\
    \ dynamic SQL within a stored procedure, these two phases happen together.\n\n\
    However, within the context of stored procedures, SQL Server exploits `late binding`.\
    \ This means that the parse phase happens when the stored procedure is created,\
    \ and the compile phase (and therefore scope resolution) occurs only when the\
    \ stored procedure is executed.\n\nTo see what this means, create the following\
    \ stored procedure (assuming that a table called `SomeTable` does not exist in\
    \ the current database):\n\n```sql\nCREATE PROCEDURE NonExistentTable\nAS\nBEGIN\n\
    \    SELECT xyz\n    FROM SomeTable;\nEND;\nGO\n```\n\nAlthough `SomeTable` does\
    \ not exist, the stored procedure is created—the T-SQL parses without any errors.\
    \ However, upon running the stored procedure, an exception is thrown:\n\n```sql\n\
    EXEC NonExistentTable;\nGO\n```\n\nThis leads to\n\n> Msg 208, Level 16, State\
    \ 1, Procedure NonExistentTable, Line 4\n> Invalid object name 'SomeTable'.\n\n\
    Like the parse exception, scope-resolution exceptions behave similarly to batch-level\
    \ exceptions within the same scope, and similarly to statement-level exceptions\
    \ in the outer scope. Since the stored procedure creates a new scope, hitting\
    \ this exception within the procedure aborts the rest of the procedure, but any\
    \ T-SQL encountered in the calling batch after execution of the procedure will\
    \ still run.\n\nFor instance:\n\n```sql\nEXEC NonExistentTable;\nPRINT 'This will\
    \ print!';\nGO\n```\n\nleads to the following result:\n\n> Msg 208, Level 16,\
    \ State 1, Procedure NonExistentTable, Line 4\n> Invalid object name 'SomeTable'.\n\
    > This will print!\n\n## Connection and Server-Level Exceptions\n\nSome exceptions\
    \ thrown by SQL Server can be so severe that they abort the entire connection,\
    \ or cause the server itself to crash. These types of connection- and server-level\
    \ exceptions are generally caused by internal SQL Server bugs, and are thankfully\
    \ quite rare. At the time of writing, I cannot provide any examples of these types\
    \ of exceptions, as I am not aware of any reproducible conditions in SQL Server\
    \ 2008 that cause them.\n\n## The XACT_ABORT Setting\n\nAlthough users do not\
    \ have much control over the behavior of exceptions thrown by SQL Server, there\
    \ is one setting that can be modified on a per-connection basis. Turning on the\
    \ `XACT_ABORT` setting makes all statement-level exceptions behave like batch-level\
    \ exceptions. This means that control will always be immediately returned to the\
    \ client any time an exception is thrown by SQL Server during execution of a query\
    \ (assuming the exception is not handled).\n\nTo enable `XACT_ABORT` for a connection,\
    \ the following T-SQL is used:\n\n```sql\nSET XACT_ABORT ON;\n```\n\nThis setting\
    \ will remain enabled for the entire connection—even if it was set in a lower\
    \ level of scope, such as in a stored procedure or dynamic SQL—until it is disabled\
    \ using the following T-SQL: `SET XACT_ABORT OFF;`\n\nTo illustrate the effect\
    \ of this setting on the behavior of exceptions, let’s review a couple of the\
    \ exceptions already covered. Recall that the following integer overflow exception\
    \ operates at the statement level:\n\n```sql\nSELECT POWER(2, 32);\nPRINT 'This\
    \ will print!';\nGO\n```\n\nEnabling the `XACT_ABORT` setting before running this\
    \ T-SQL changes the output, resulting in the `PRINT` statement not getting executed:\n\
    \n```sql\nSET XACT_ABORT ON;\nSELECT POWER(2, 32);\nPRINT 'This will NOT print!';\n\
    GO\n```\n\nThe output from running this batch is as follows:\n\n> Msg 232, Level\
    \ 16, State 3, Line 2\n> Arithmetic overflow error for type int, value = 4294967296.000000."
  raw: 'This type of exception behavior also occurs during **scope resolution**. Essentially,
    SQL Server processes queries in two phases. The first phase parses and validates
    the query and ensures that the TSQL is well formed. The second phase is the compilation
    phase, during which an execution plan is built and objects referenced in the query
    are resolved. If a query is submitted to SQL Server via ad hoc SQL


    from an application or dynamic SQL within a stored procedure, these two phases
    happen together.


    However, within the context of stored procedures, SQL Server exploits **late binding**.
    This means that the parse phase happens when the stored procedure is created,
    and the compile phase (and therefore scope resolution) occurs only when the stored
    procedure is executed.


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    To see what this means, create the following stored procedure (assuming that a
    table called


    SomeTable does not exist in the current database):


    CREATE PROCEDURE NonExistentTable


    AS


    BEGIN


    SELECT xyz


    FROM SomeTable;


    END;


    GO


    Although SomeTable does not exist, the stored procedure is created—the T-SQL parses
    without any errors. However, upon running the stored procedure, an exception is
    thrown:


    EXEC NonExistentTable;


    GO


    This leads to


    Msg 208, Level 16, State 1, Procedure NonExistentTable, Line 4


    Invalid object name ''SomeTable''.


    Like the parse exception, scope-resolution exceptions behave similarly to batch-level
    exceptions within the same scope, and similarly to statement-level exceptions
    in the outer scope. Since the stored procedure creates a new scope, hitting this
    exception within the procedure aborts the rest of the procedure, but any T-SQL
    encountered in the calling batch after execution of the procedure will still run.


    For instance:


    EXEC NonExistentTable;


    PRINT ''This will print!'';


    GO


    leads to the following result:


    Msg 208, Level 16, State 1, Procedure NonExistentTable, Line 4


    Invalid object name ''SomeTable''.


    This will print!


    Connection and Server-Level Exceptions


    Some exceptions thrown by SQL Server can be so severe that they abort the entire
    connection, or cause the server itself to crash. These types of connection- and
    server-level exceptions are generally caused by internal SQL Server bugs, and
    are thankfully quite rare. At the time of writing, I cannot provide any 76


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    examples of these types of exceptions, as I am not aware of any reproducible conditions
    in SQL Server 2008 that cause them.


    The XACT_ABORT Setting


    Although users do not have much control over the behavior of exceptions thrown
    by SQL Server, there is one setting that can be modified on a per-connection basis.
    Turning on the XACT_ABORT setting makes all statement-level exceptions behave
    like batch-level exceptions. This means that control will always be immediately
    returned to the client any time an exception is thrown by SQL Server during execution
    of a query (assuming the exception is not handled).


    To enable XACT_ABORT for a connection, the following T-SQL is used:


    SET XACT_ABORT ON;


    This setting will remain enabled for the entire connection—even if it was set
    in a lower level of scope, such as in a stored procedure or dynamic SQL—until
    it is disabled using the following T-SQL: SET XACT_ABORT OFF;


    To illustrate the effect of this setting on the behavior of exceptions, let’s
    review a couple of the exceptions already covered. Recall that the following integer
    overflow exception operates at the statement level:


    SELECT POWER(2, 32);


    PRINT ''This will print!'';


    GO


    Enabling the XACT_ABORT setting before running this T-SQL changes the output,
    resulting in the PRINT statement not getting executed:


    SET XACT_ABORT ON;


    SELECT POWER(2, 32);


    PRINT ''This will NOT print!'';


    GO


    The output from running this batch is as follows:


    Msg 232, Level 16, State 3, Line 2


    Arithmetic overflow error for type int, value = 4294967296.000000.'
  trans: "# 第四章：错误与异常\n\n这种类型的异常行为也会在`作用域解析`过程中发生。本质上，SQL Server 分两个阶段处理查询。第一阶段解析并验证查询，确保\
    \ T-SQL 语法正确。第二阶段是编译阶段，在此阶段构建执行计划并解析查询中引用的对象。如果查询是通过应用程序的即席 SQL 或存储过程内的动态 SQL\
    \ 提交给 SQL Server 的，这两个阶段会同时发生。\n\n然而，在存储过程的上下文中，SQL Server 采用了`后期绑定`技术。这意味着解析阶段在存储过程创建时发生，而编译阶段（因此也包括作用域解析）仅在存储过程执行时发生。\n\
    \n为了理解其含义，请创建以下存储过程（假设当前数据库中不存在名为 `SomeTable` 的表）：\n\n```sql\nCREATE PROCEDURE\
    \ NonExistentTable\nAS\nBEGIN\n    SELECT xyz\n    FROM SomeTable;\nEND;\nGO\n\
    ```\n\n尽管 `SomeTable` 不存在，该存储过程仍被成功创建——T-SQL 代码解析时没有报错。但是，当执行该存储过程时，会抛出一个异常：\n\
    \n```sql\nEXEC NonExistentTable;\nGO\n```\n\n这将导致：\n\n> 消息 208，级别 16，状态 1，过程 NonExistentTable，第\
    \ 4 行\n> 无效的对象名 'SomeTable'。\n\n与解析异常类似，作用域解析异常在同一作用域内表现类似于批处理级异常，而在外部作用域则类似于语句级异常。由于存储过程创建了一个新的作用域，在该过程内遇到此类异常会中止过程的剩余部分，但在调用批处理中，执行存储过程之后遇到的任何\
    \ T-SQL 语句仍会继续运行。\n\n例如：\n\n```sql\nEXEC NonExistentTable;\nPRINT '这将会打印！';\n\
    GO\n```\n\n会导致以下结果：\n\n> 消息 208，级别 16，状态 1，过程 NonExistentTable，第 4 行\n> 无效的对象名\
    \ 'SomeTable'。\n> 这将会打印！\n\n## 连接和服务器级异常\n\nSQL Server 抛出的某些异常可能非常严重，以至于会终止整个连接，或导致服务器本身崩溃。这些类型的连接级和服务器级异常通常由\
    \ SQL Server 内部错误引起，所幸相当罕见。在撰写本文时，我无法提供此类异常的示例，因为我不了解 SQL Server 2008 中存在任何可重现导致此类问题的条件。\n\
    \n## XACT_ABORT 设置\n\n尽管用户对 SQL Server 抛出异常的行为控制有限，但有一个设置可以按连接进行修改。启用 `XACT_ABORT`\
    \ 设置会使所有语句级异常表现得像批处理级异常。这意味着在查询执行期间，只要 SQL Server 抛出异常（且该异常未被处理），控制权总是会立即返回到客户端。\n\
    \n要为连接启用 `XACT_ABORT`，使用以下 T-SQL：\n\n```sql\nSET XACT_ABORT ON;\n```\n\n此设置将保持启用状态，直到使用以下\
    \ T-SQL 将其禁用：`SET XACT_ABORT OFF;`。即使它是在较低级别的作用域（例如在存储过程或动态 SQL 中）设置的，也会在整个连接期间保持有效。\n\
    \n为了说明此设置对异常行为的影响，让我们回顾一下已经介绍过的几个异常。回想一下，以下整数溢出异常是在语句级运行的：\n\n```sql\nSELECT POWER(2,\
    \ 32);\nPRINT '这将会打印！';\nGO\n```\n\n在运行此 T-SQL 之前启用 `XACT_ABORT` 设置会改变输出结果，导致\
    \ `PRINT` 语句不会被执行：\n\n```sql\nSET XACT_ABORT ON;\nSELECT POWER(2, 32);\nPRINT\
    \ '这将不会打印！';\nGO\n```\n\n运行此批处理的输出如下：\n\n> 消息 232，级别 16，状态 3，第 2 行\n> 针对数据类型 \"\
    int\" 的算术溢出错误，值 = 4294967296.000000。"
- fmt: '# CHAPTER 4: ERRORS AND EXCEPTIONS


    Note that `XACT_ABORT` only affects the behavior of runtime errors, not those
    generated during compilation. Recall the previous example that demonstrated a
    parsing exception occurring in a lower scope using the `EXEC` function:


    ```

    EXEC(''SELECTxzy FROM SomeTable'');

    PRINT ''This will print!'';

    GO

    ```


    The result of this code listing will remain the same, regardless of the `XACT_ABORT`
    setting, resulting in the `PRINT` statement being evaluated even after the exception
    occurs.


    In addition to controlling exception behavior, `XACT_ABORT` also modifies how
    transactions behave when exceptions occur. See the section “Transactions and Exceptions”
    later in this chapter for more information.


    ## Dissecting an Error Message


    A SQL Server exception has a few different component parts, each of which are
    represented within the text of the error message. Each exception has an associated
    error number, error level, and state. Error messages can also contain additional
    diagnostic information including line numbers and the name of the procedure in
    which the exception occurred.


    ### Error Number


    The error number of an exception is listed following the text `Msg` within the
    error text. For example, the error number of the following exception is 156:


    ```

    Msg 156, Level 15, State 1, Line 1

    Incorrect syntax near the keyword ''FROM''.

    ```


    SQL Server generally returns the error message with the exception, so having the
    error number usually doesn’t assist from a problem-solving point of view. However,
    there are times when knowing the error number can be of use. Examples include
    use of the `@@ERROR` function, or when doing specialized error handling using
    the `TRY/CATCH` syntax (see the sections “Exception ‘Handling’ Using `@@ERROR`”
    and “SQL Server’s `TRY/CATCH` Syntax” later in the chapter for details on these
    topics).


    The error number can also be used to look up the localized translation of the
    error message from the `sys.messages` catalog view. The `message_id` column contains
    the error number, and the `language_id` column can be used to get the message
    in the correct language. For example, the following T-SQL returns the English
    text for error 208:


    ```

    SELECT text

    FROM sys.messages

    WHERE

    message_id = 208

    AND language_id = 1033;

    GO

    ```


    The output of this query is an error message template, shown here:


    ```

    Invalid object name ''%.*ls''.

    ```


    See the section “SQL Server’s `RAISERROR` Function” for more information about
    error message templates.


    ### Error Level


    The `Level` tag within an error message indicates a number between 1 and 25. This
    number can sometimes be used to either classify an exception or determine its
    severity. Unfortunately, the key word is “sometimes”: the error levels assigned
    by SQL Server are highly inconsistent and should generally not be used in order
    to make decisions about how to handle exceptions.


    The following exception, based on its error message, is of error level 15:


    ```

    Msg 156, Level 15, State 1, Line 1

    Incorrect syntax near the keyword ''FROM''.

    ```


    The error levels for each exception can be queried from the `sys.messages` view,
    using the `severity` column. A severity of less than 11 indicates that a message
    is a **warning**. If severity is 11 or greater, the message is considered to be
    an **error** and can be broken down into the following documented categories:


    *   Error levels 11 through 16 are documented as “errors that can be corrected
    by the user.” The majority of exceptions thrown by SQL Server are in this range,
    including constraint violations, parsing and compilation errors, and most other
    runtime exceptions.

    *   Error levels 17 through 19 are more serious exceptions. These include out-of-memory
    exceptions, disk space exceptions, internal SQL Server errors, and other similar
    violations. Many of these are automatically logged to the SQL Server error log
    when they are thrown. You can identify those exceptions that are logged by examining
    the `is_event_logged` column of the `sys.messages` table.

    *   Error levels 20 through 25 are fatal connection and server-level exceptions.'
