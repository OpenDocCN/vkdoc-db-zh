    }


    //Add the collection of fields to the output list


    theList.Add(fields);


    Finally, the code loops over the rows returned by the query, using the GetValues
    method to pull each row out into an object collection that is added to the output.
    The List is converted into an array of object[] (object[][], to be more precise),
    which is serialized and returned to the caller.


    //Add all of the rows to the output list


    while (read.Read())


    {


    object[] o = new object[read.FieldCount];


    read.GetValues(o);


    theList.Add(o);


    }


    }


    CHAPTER


    „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    //Serialize and return the output


    return new SqlBytes(


    serialization_helper.getBytes(theList.ToArray()));


    }


    Once this function is created, calling it is almost identical to calling GetDataTable_Binary:
    DECLARE @sql nvarchar(max);


    SET @sql = ''SELECT BusinessEntityID,


    NationalIDNumber,


    LoginID,


    OrganizationNode.ToString(),


    OrganizationLevel,


    JobTitle,


    BirthDate,


    MaritalStatus,


    Gender,


    HireDate,


    SalariedFlag,


    VacationHours,


    SickLeaveHours,


    CurrentFlag,


    rowguid,


    ModifiedDate FROM HumanResources.Employee''


    DECLARE @x varbinary(max);


    SET @x = dbo.GetBinaryFromQueryResult(@sql);


    GO


    The result, 57KB worth of binary data, represented a 15 percent reduction in size
    compared to the DataTable method. If using this method to transfer data between
    broker instances on remote servers, the associated decrease in network traffic
    could make a big difference to performance. What’s more, the serialization performance
    using SqlDataReader was the fastest yet, with an average query execution time
    of just 0.0490 seconds.


    Binary Deserialization


    Pleased with the results of binary serialization using SQLCLR, I decided to go
    ahead with deserialization.'
  trans: "\n`DataTable` 的优势在于它是一个易于使用的整体单元，包含了所有数据以及相关的元数据。您无需关心列名、类型和大小，因为所有内容都会自动加载到\
    \ `DataTable` 中。而使用 `SqlDataReader` 则需要多做一些工作，因为它不能被序列化为一个单一单元，而是必须拆分成其组成部分。\n\
    \n由于我实现的代码有些复杂，我将带您逐段解读。首先，我在 `SqlFunctionAttribute` 上设置了 `DataAccessKind.Read`\
    \ 属性，以允许该方法通过上下文连接访问数据。实例化了一个泛型 `List`，它将为每一行数据保存一个 `object` 集合，此外还有一个用于元数据。最后，实例化了\
    \ `SqlConnection`，并设置和执行了 `SqlCommand`：\n\n## 第七章 „ SQLCLR：架构与设计考量\n\n```\n[Microsoft.SqlServer.Server.SqlFunction(\n\
    \    DataAccess = DataAccessKind.Read)]\npublic static SqlBytes GetBinaryFromQueryResult(string\
    \ query)\n{\n    List<object[]> theList = new List<object[]>();\n    using (SqlConnection\
    \ conn = \n        new SqlConnection(\"context connection = true;\"))\n    {\n\
    \        SqlCommand comm = new SqlCommand();\n        comm.Connection = conn;\n\
    \        comm.CommandText = query;\n        conn.Open();\n        SqlDataReader\
    \ read = comm.ExecuteReader();\n```\n\n下一步是从 `SqlDataReader` 中提取每个列的元数据。使用一个名为\
    \ `GetSchemaTable` 的方法来返回一个 `DataTable`，其中为每一列填充了一行数据。可用字段在 MSDN 文档库中有记录，但我接下来使用的代码是其中最常见的部分。\n\
    \n在用元数据填充 `object` 集合后，将其添加到输出的 `List` 中：\n\n```\n        DataTable dt = read.GetSchemaTable();\n\
    \        // 从架构表中填充字段列表\n        object[] fields = new object[dt.Rows.Count];\n\
    \        for (int i = 0; i < fields.Length; i++)\n        {\n            object[]\
    \ field = new object[5];\n            field[0] = dt.Rows[i][\"ColumnName\"];\n\
    \            field[1] = dt.Rows[i][\"ProviderType\"];\n            field[2] =\
    \ dt.Rows[i][\"ColumnSize\"];\n            field[3] = dt.Rows[i][\"NumericPrecision\"\
    ];\n            field[4] = dt.Rows[i][\"NumericScale\"];\n            fields[i]\
    \ = field;\n        }\n        // 将字段集合添加到输出列表\n        theList.Add(fields);\n\
    ```\n\n最后，代码循环遍历查询返回的行，使用 `GetValues` 方法将每一行提取到一个 `object` 集合并添加到输出中。这个 `List`\
    \ 被转换成一个 `object[]` 数组（更准确地说，是 `object[][]`），然后被序列化并返回给调用者。\n\n``\n        //\
    \ 将所有行添加到输出列表\n        while (read.Read())\n        {\n            object[] o\
    \ = new object[read.FieldCount];\n            read.GetValues(o);\n           \
    \ theList.Add(o);\n        }\n    }\n    // 第七章 „ SQLCLR：架构与设计考量\n    // 序列化并返回输出\n\
    \    return new SqlBytes(\n        serialization_helper.getBytes(theList.ToArray()));\n\
    }\n```\n\n创建好这个函数后，调用它几乎与调用 `GetDataTable_Binary` 完全相同：\n\n```\nDECLARE @sql nvarchar(max);\n\
    SET @sql = 'SELECT BusinessEntityID,\n    NationalIDNumber,\n    LoginID,\n  \
    \  OrganizationNode.ToString(),\n    OrganizationLevel,\n    JobTitle,\n    BirthDate,\n\
    \    MaritalStatus,\n    Gender,\n    HireDate,\n    SalariedFlag,\n    VacationHours,\n\
    \    SickLeaveHours,\n    CurrentFlag,\n    rowguid,\n    ModifiedDate FROM HumanResources.Employee'\n\
    \nDECLARE @x varbinary(max);\nSET @x = dbo.GetBinaryFromQueryResult(@sql);\nGO\n\
    ```\n\n结果是一个 57KB 的二进制数据，相比 `DataTable` 方法，大小减少了 15%。如果使用此方法在远程服务器上的代理实例之间传输数据，相关的网络流量减少可能对性能产生显著影响。更重要的是，使用\
    \ `SqlDataReader` 的序列化性能是迄今为止最快的，平均查询执行时间仅为 0.0490 秒。\n\n### 二进制反序列化\n\n对 SQLCLR\
    \ 二进制序列化的结果感到满意，我决定继续进行反序列化。\n"
- fmt: "# CHAPTER 7 SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS\n\nContinuing with\
    \ my stress on reuse potential, I decided that a stored procedure would be a better\
    \ choice than a UDF. A stored procedure does not have a fixed output as does a\
    \ UDF, so any input table can be deserialized and returned without worrying about\
    \ violating column list contracts.\n\nThe first part of the stored procedure follows:\n\
    \n`[Microsoft.SqlServer.Server.SqlProcedure]`\n\n```csharp\npublic static void\
    \ GetTableFromBinary(SqlBytes theTable)\n{\n    //Deserialize the input\n    object[]\
    \ dt = (object[])(\n        serialization_helper.getObject(theTable.Value));\n\
    \n    //First, get the fields\n    object[] fields = (object[])(dt[0]);\n    SqlMetaData[]\
    \ cols = new SqlMetaData[fields.Length];\n\n    //Loop over the fields and populate\
    \ SqlMetaData objects\n    for (int i = 0; i < fields.Length; i++)\n    {\n  \
    \      object[] field = (object[])(fields[i]);\n        SqlDbType dbType = (SqlDbType)field[1];\n\
    ```\n\nAfter deserializing the input bytes back into a collection of objects,\
    \ the first item in the collection—which is assumed to be the column metadata—is\
    \ converted into a collection of objects. This collection is looped over item\
    \ by item in order to create the output `SqlMetaData` objects that will be used\
    \ to stream back the data to the caller.\n\nThe trickiest part of setting this\
    \ up is the fact that each SQL Server data type requires a different `SqlMetaData`\
    \ overload. `decimal` needs a precision and scale setting; character and binary\
    \ types need a size; and for other types, size, precision, and scale are all inappropriate\
    \ inputs. The following switch statement handles creation of the `SqlMetaData`\
    \ instances:\n\n```csharp\n        //Different SqlMetaData overloads are required\n\
    \        //depending on the data type\n        switch (dbType)\n        {\n  \
    \          case SqlDbType.Decimal:\n                cols[i] = new SqlMetaData(\n\
    \                    (string)field[0],\n                    dbType,\n        \
    \            (byte)field[3],\n                    (byte)field[4]);\n         \
    \       break;\n\n            case SqlDbType.Binary:\n            case SqlDbType.Char:\n\
    \            case SqlDbType.NChar:\n            case SqlDbType.NVarChar:\n   \
    \         case SqlDbType.VarBinary:\n            case SqlDbType.VarChar:\n   \
    \             switch ((int)field[2])\n                {\n                    //If\
    \ it's a MAX type, use -1 as the size\n                    case 2147483647:\n\
    \                        cols[i] = new SqlMetaData(\n                        \
    \    (string)field[0],\n                            dbType,\n                \
    \            -1);\n                        break;\n                    default:\n\
    \                        cols[i] = new SqlMetaData(\n                        \
    \    (string)field[0],\n                            dbType,\n                \
    \            (long)((int)field[2]));\n                        break;\n       \
    \         }\n                break;\n\n            default:\n                cols[i]\
    \ = new SqlMetaData(\n                    (string)field[0],\n                \
    \    dbType);\n                break;\n        }\n    }\n```\n\nOnce population\
    \ of the columns collection has been completed, the data can be sent back to the\
    \ caller using the `SqlPipe` class’s `SendResults` methods. After starting the\
    \ stream, the remainder of the objects in the input collection are looped over,\
    \ cast to `object[]`, and sent back as `SqlDataRecords`:\n\n```csharp\n    //Start\
    \ the result stream\n    SqlDataRecord rec = new SqlDataRecord(cols);\n    SqlContext.Pipe.SendResultsStart(rec);\n\
    \n    for (int i = 1; i < dt.Length; i++)\n    {\n        rec.SetValues((object[])dt[i]);\n\
    \        SqlContext.Pipe.SendResultsRow(rec);\n    }\n\n    //End the result stream\n\
    \    SqlContext.Pipe.SendResultsEnd();\n}\n```\n\nNot only had the binary serialization\
    \ test yielded positive results, it turns out that deserialization of data prepared\
    \ in this manner is exceptionally fast compared with the alternatives. The performance\
    \ test revealed that average time for deserialization of the `SqlDataReader` data\
    \ was just `0.2666` seconds—an order of magnitude faster than deserialization\
    \ of similar XML.\n\nThe results of the fastest refinements of each of the three\
    \ methods discussed in this section are shown in Table 7-1.\n\n*Table 7-1\\. Results\
    \ of different serialization approaches*\n\n`Method`\n`Average Serialization Time`\n\
    `Average Deserialization Time`\n`Size`\n\n`XML (with TYPE)`\n`3.6687`\n`6.8157`\n\
    `105KB`\n\n`Binary (DataTable)`\n`0.0576`\n`—`\n`68KB`\n\n`Binary (SqlDataReader)`\n\
    `0.0490`\n`0.2666`\n`57KB`\n\nThe combination of better network utilization and\
    \ much faster serialization/deserialization demonstrated in this example shows\
    \ how SQLCLR can be a great technique for transferring tabular data between Service\
    \ Broker instances in scale-out and distributed processing scenarios.\n\n# Summary\n\
    \nGetting the most out of SQLCLR routines involves a bit of thought investment.\
    \ Up-front design and architecture considerations will yield great benefits in\
    \ terms of security, reliability, and performance.\n\nYou should also consider\
    \ reuse at every stage, in order to minimize the amount of work that must be done\
    \ when you need the same functionality six months or a year down the road. If\
    \ you’ve already coded it once, why code it again?\n\nTo illustrate these concepts,\
    \ I showed an example that serialized tables using the `BinaryFormatter`, which\
    \ could be used to extend SQL Server Service Broker. I used a common, core set\
    \ of more highly privileged utility assemblies in order to limit the outer surface\
    \ area, and tried to design the solution to promote flexibility and potential\
    \ for use in many projects throughout the lifetime of the code.\n\n# CHAPTER 8\
    \ Dynamic T-SQL\n\nThe general objective of any software application is to provide\
    \ consistent, reliable functionality that allows users to perform given tasks\
    \ in an effective manner. The first step in meeting this objective is therefore\
    \ to keep the application bug-free and working as designed, to expected standards.\
    \ However, once you’ve gotten past these basic requirements, the next step is\
    \ to try to create a great user experience, which raises the question, “What do\
    \ the users want?” More often than not, the answer is that users want flexible\
    \ interfaces that let them control the data the way they want to. It’s common\
    \ for software customer support teams to receive requests for slightly different\
    \ sort orders, filtering mechanisms, or outputs for data, making it imperative\
    \ that applications be designed to support extensibility along these lines.\n\n\
    As with other data-related development challenges, such requests for flexible\
    \ data output tend to fall through the application hierarchy, eventually landing\
    \ on the database (and, therefore, the database developer). This is especially\
    \ true in web-based application development, where client-side grid controls that\
    \ enable sorting and filtering are still relatively rare, and where many applications\
    \ still use a lightweight two-tier model without a dedicated business layer to\
    \ handle data caching and filtering.\n\n“Flexibility” in the database can mean\
    \ many things, and I have encountered some very interesting approaches in applications\
    \ I’ve worked with over the years, often involving creation of a multitude of\
    \ stored procedures or complex, nested control-of-flow blocks. These solutions\
    \ invariably seem to create more problems than they solve, and make application\
    \ development much more difficult than it needs to be by introducing a lot of\
    \ additional complexity in the database layer.\n\nIn this chapter, I will discuss\
    \ how dynamic SQL can be used to solve these problems as well as to create more\
    \ flexible stored procedures. Some DBAs and developers scorn dynamic SQL, often\
    \ believing that it will cause performance, security, or maintainability problems,\
    \ whereas in many cases it is simply that they don’t understand how to use it\
    \ properly. Dynamic SQL is a powerful tool that, if used correctly, is a tremendous\
    \ asset to the database developer’s toolbox. There is a lot of misinformation\
    \ floating around about what it is and when or why it should be used, and I hope\
    \ to clear up some myths and misconceptions in these pages.\n\n*Note* Throughout\
    \ this chapter, I will illustrate the discussion of various methods with performance\
    \ measures and timings recorded on my laptop. For more information on how to capture\
    \ these measures on your own system environment, please refer to the discussion\
    \ of performance monitoring tools in Chapter 3.\n\n## Dynamic T-SQL vs. Ad Hoc\
    \ T-SQL"
