    EXEC @ReturnValue = sp_getapplock


    @Resource = ''customers'',


    @LockMode = ''exclusive'',


    @LockTimeout = 2000;


    IF @ReturnValue IN (0, 1)


    PRINT ''Lock granted'';


    ELSE


    PRINT ''Lock not granted'';


    To release the lock, you can commit or roll back the active transaction, or use
    the sp_releaseapplock stored procedure, which takes the lock resource name as
    its input value:


    EXEC sp_releaseapplock


    @Resource = ''customers'';


    SQL Server’s application locks are quite useful in many scenarios, but they suffer
    from the same problems mentioned previously concerning the discrepancy between
    concurrency models offered by SQL Server and what the business might actually
    require. Application locks are held only for the duration of a transaction or
    a session, meaning that to lock a resource and perform a long-running business
    transaction based on the lock, the caller would have to hold open a connection
    to the database the entire time. This is clearly not a scalable option, so I set
    out to write a replacement, nontransactional application lock framework.


    My goal was to mimic most of the behavior of sp_getapplock, but for exclusive
    locks only—


    pessimistic locking schemes do not generally require shared locks on resources.
    I especially wanted callers to be able to queue and wait for locks to be released
    by other resources. Since this would not be a transactional lock, I also wanted
    to handle all of the caveats I’ve discussed in this section, including making
    sure that multiple callers requesting locks at the same time would not each think
    they’d been 251


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    granted the lock, returning tokens to avoid invalid lock release scenarios, and
    adding lock timeout periods to ensure that orphaned locks would not be stranded
    until an admin removed them.


    When considering the SQL Server 2008 features that would help me create this functionality,
    I immediately thought of Service Broker. Service Broker provides asynchronous
    queuing that can cross transactional and session boundaries, and the WAITFOR command
    allows callers to wait on a message without having to continually poll the queue.


    „ **Note** For a thorough background on SQL Server Service Broker, see *Pro SQL
    Server 2008 Service Broker*, by Klaus Aschenbrenner (Apress, 2008).


    The architecture I developed to solve this problem begins with a central table
    used to keep track of which locks have been taken:


    CREATE TABLE AppLocks


