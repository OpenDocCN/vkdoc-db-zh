    different scope, changing the exception behavior from batch-like to statement-like.
    Try running the following T-SQL to observe the change: EXEC(''SELECTxzy FROM SomeTable'');


    PRINT ''This will print!'';


    GO


    The PRINT statement is now executed, even though the exception occurred:


    Msg 156, Level 15, State 1, Line 1


    Incorrect syntax near the keyword ''FROM''.


    This will print!'
