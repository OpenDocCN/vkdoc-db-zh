  trans: "\n# 第 12 章 树、层次结构与图\n\n## CTE 是最佳选择吗？\n\n203 6 营销专员 0000000109/0000000006/0000000203/\n\
    269 6 营销助理 0000000109/0000000006/0000000269/\n271 6 营销专员 0000000109/0000000006/0000000271/\n\
    272 6 营销助理 0000000109/0000000006/0000000272/\n12 109 工程副总裁 0000000109/0000000012/\n\
    3 12 工程经理 0000000109/0000000012/0000000003/\n\n为了支持节点上的正确数字排序，我使用了前导零填充。这样可以确保，例如，路径\
    \ `1/2/` 不会排在路径 `1/10/` 之后。数字被填充到十位，以支持 SQL Server 的 `int` 数据类型所能支持的完整正整数范围。请注意，在此情况下，同级节点是根据其\
    \ `EmployeeID` 排序的。要更改同级节点的排序方式——例如，根据 `Title` 按字母顺序排序——需要对路径进行一些处理。\n\n不是具体化\
    \ `EmployeeID`，而是具体化一个代表当前有序同级节点的行号。这可以使用 SQL Server 的 `ROW_NUMBER` 函数完成，有时也被称为枚举路径。以下修改后的\
    \ CTE 版本枚举了路径：\n\n```sql\nWITH n AS\n(\n    SELECT\n        EmployeeID,\n    \
    \    ManagerID,\n        Title,\n        CONVERT(varchar(900), '0000000001/')\
    \ AS thePath\n    FROM Employee_Temp\n    WHERE ManagerID IS NULL\n\n    UNION\
    \ ALL\n\n    SELECT\n        e.EmployeeID,\n        e.ManagerID,\n        e.Title,\n\
    \        CONVERT(varchar(900),\n            n.thePath +\n            RIGHT(\n\
    \                REPLICATE('0', 10) +\n                CONVERT(varchar, ROW_NUMBER()\
    \ OVER (ORDER BY e.Title)),\n                10\n            ) + '/'\n       \
    \ ) AS thePath\n    FROM Employee_Temp e\n    JOIN n ON n.EmployeeID = e.ManagerID\n\
    )\nSELECT\n    n.EmployeeID,\n    n.ManagerID,\n    n.Title,\n    n.thePath\n\
    FROM n\nORDER BY n.thePath;\nGO\n```\n\n查询结果中展示了代表每个节点的枚举路径，如下所示：\n\n`EmployeeID`\
    \ `ManagerID` `Title` `thePath`\n109 NULL 首席执行官 00000001/\n140 109 首席财务官 00000001/00000001/\n\
    139 140 账户经理 00000001/00000001/00000001/\n216 139 会计师 00000001/00000001/00000001/00000001/\n\
    178 139 会计师 00000001/00000001/00000001/00000002/\n166 139 应付账款专员 00000001/00000001/00000001/00000003/\n\
    201 139 应付账款专员 00000001/00000001/00000001/00000004/\n130 139 应收账款专员 00000001/00000001/00000001/00000005/\n\
    94 139 应收账款专员 00000001/00000001/00000001/00000006/\n59 139 应收账款专员 00000001/00000001/00000001/00000007/\n\
    103 140 首席财务官助理 00000001/00000001/00000002/\n71 140 财务经理 00000001/00000001/00000003/\n\
    274 71 采购经理 00000001/00000001/00000003/00000001/\n\n„ **提示** 你不必用前导零填充节点 ID，而是可以暴露类型为\
    \ `varbinary` 的 `thePath` 列，并将 ID 转换为 `binary(4)`。出于排序目的，这将产生相同的净效果，同时占用更少的空间——因此你会看到效率上的提升，此外，你还能在每一行的路径中容纳更多的节点\
    \ ID。缺点是这让 ID 更难以可视化，因此出于本章的目的——其中视觉提示很重要——我改用前导零填充方法。\n\n使用枚举路径而非具体化路径的缺点在于，枚举版本无法轻松解构以确定所遵循的键。例如，仅查看本节第一个查询结果中的\
    \ `thePath` 列，我们可以看到工程经理（`EmployeeID` 3）的路径始于 `EmployeeID` 109，然后到 `EmployeeID`\
    \ 12，最后到达工程经理。而使用枚举路径查看同一列时，若不沿着输出在层次结构中回溯，则无法发现构成给定路径的实际 ID。\n"
- fmt: "While CTEs are possibly the most convenient way to traverse adjacency list\
    \ hierarchies in SQL Server 2008, they do not necessarily deliver the best possible\
    \ performance. Iterative methods involving temporary tables or table variables\
    \ may well outperform recursive CTEs, especially as the hierarchy grows in size.\n\
    \nTo highlight the performance difference between CTEs and iterative methods,\
    \ a larger sample hierarchy is necessary. To begin with, we can add `width` to\
    \ the `Employee_Temp` hierarchy. This means that the hierarchy will maintain the\
    \ same depth, but each level will have more siblings. To accomplish this, for\
    \ each row below a given subtree, both the employee IDs and manager IDs can be\
    \ incremented by the same known amount, thereby producing a duplicate subtree\
    \ in place. The following T-SQL accomplishes this, running in a loop five times\
    \ and doubling the width of the hierarchy on each iteration:\n\n```sql\nDECLARE\
    \ @CEO int;\n\nSELECT\n    @CEO = EmployeeID\nFROM Employee_Temp\nWHERE ManagerID\
    \ IS NULL;\n\nDECLARE @width int = 1;\n\nWHILE @width <= 16\nBEGIN\n    INSERT\
    \ INTO Employee_Temp\n    (\n        EmployeeID,\n        ManagerID,\n       \
    \ Title\n    )\n    SELECT\n        e.EmployeeID + (1000 * @width),\n        CASE\
    \ e.ManagerID\n            WHEN @CEO THEN e.ManagerID\n            ELSE e.ManagerID\
    \ + (1000 * @width)\n        END,\n        e.Title\n    FROM Employee_Temp e\n\
    \    WHERE\n        e.ManagerID IS NOT NULL;\n\n    SET @width = @width * 2;\n\
    END;\nGO\n```\n\nThere are two key factors you should pay attention to in this\
    \ example. First is the `@width` variable, which is doubled on each iteration\
    \ in order to avoid key collisions as the keys are incremented. Second, look at\
    \ the `CASE` expression in the `SELECT` list, which increments all IDs except\
    \ that of the CEO. This ensures that the duplicate subtrees will be appended to\
    \ the tree as a whole, by virtue of the roots of those subtrees being subordinates\
    \ of the CEO’s node, rather than the node at the top of each subtree becoming\
    \ an additional root node.\n\n## CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS\n\
    \nOnce this code has been run, the `Employee_Temp` hierarchy will have 9,249 nodes,\
    \ instead of the 290 that we started with. However, the hierarchy still has only\
    \ five levels. To increase the `depth`, a slightly different algorithm is required.\
    \ To add levels, find all managers except the CEO, and insert new duplicate nodes,\
    \ incrementing their employee IDs similar to before. Next, update the preexisting\
    \ managers in the table to report to the new managers. The following T-SQL does\
    \ this in a loop four times, producing a hierarchy with a depth of 50 levels and\
    \ 31,329 nodes:\n\n```sql\nDECLARE @CEO int;\n\nSELECT\n    @CEO = EmployeeID\n\
    FROM Employee_Temp\nWHERE ManagerID IS NULL;\n\nDECLARE @depth int = 32;\n\nWHILE\
    \ @depth <= 256\nBEGIN\n    DECLARE @OldManagers table\n    (\n        EmployeeID\
    \ int\n    );\n\n    --Insert intermediate managers\n    --Find all managers except\
    \ the CEO, and increment their EmployeeID by 1000\n    INSERT INTO Employee_Temp\n\
    \    (\n        EmployeeID,\n        ManagerID,\n        Title\n    )\n    OUTPUT\
    \ inserted.EmployeeID - (1000 * @depth) INTO @OldManagers\n    SELECT\n      \
    \  e.EmployeeID + (1000 * @depth) as newemp,\n        e.ManagerID,\n        'Intermediate\
    \ Manager'\n    FROM Employee_Temp e\n    WHERE\n        e.EmployeeID <> @CEO\n\
    \        AND EXISTS\n        (\n            SELECT *\n            FROM Employee_Temp\
    \ e1\n            WHERE e1.ManagerID = e.EmployeeID\n        );\n\n    --Update\
    \ existing managers to report to intermediates\n    UPDATE Employee_Temp\n   \
    \ SET ManagerID = EmployeeID + (1000 * @depth)\n    WHERE\n        EmployeeID\
    \ IN\n        (\n            SELECT EmployeeID\n            FROM @OldManagers\n\
    \        );\n\n    SET @depth = @depth * 2;\nEND;\nGO\n```\n\nBe careful when\
    \ adding additional depth to an experimental hierarchy. I’ve found that depth\
    \ has a much greater performance impact than width, and extremely deep hierarchies\
    \ are not especially common—for instance, even the largest companies do not normally\
    \ have more than 20 or 30 levels of management.\n\nTo iteratively traverse the\
    \ hierarchy using a table variable, think about what recursion does: at each level,\
    \ the employees for the previous level’s managers are found, and then that level\
    \ becomes the current level. Applying this logic iteratively requires the following\
    \ table variable:\n\n```sql\nDECLARE @n table\n(\n    EmployeeID int,\n    ManagerID\
    \ int,\n    Title nvarchar(100),\n    Depth int,\n    thePath varchar(900)\n);\n\
    ```"
  raw: 'While CTEs are possibly the most convenient way to traverse adjacency list
    hierarchies in SQL Server 2008, they do not necessarily deliver the best possible
    performance. Iterative methods involving temporary tables or table variables may
    well outperform recursive CTEs, especially as the hierarchy grows in size.


    To highlight the performance difference between CTEs and iterative methods, a
    larger sample


    hierarchy is necessary. To begin with, we can add **width** to the Employee_Temp
    hierarchy. This means that the hierarchy will maintain the same depth, but each
    level will have more siblings. To accomplish this, for each row below a given
    subtree, both the employee IDs and manager IDs can be incremented by the same
    known amount, thereby producing a duplicate subtree in place. The following T-SQL


    accomplishes this, running in a loop five times and doubling the width of the
    hierarchy on each iteration:


    DECLARE @CEO int;


    SELECT


    @CEO = EmployeeID


    FROM Employee_Temp


    WHERE ManagerID IS NULL;


    DECLARE @width int = 1;


    WHILE @width <= 16


    BEGIN


    INSERT INTO Employee_Temp


    (


    EmployeeID,


    ManagerID,


    Title


    )


    SELECT


    e.EmployeeID + (1000 * @width),


    CASE e.ManagerID


    WHEN @CEO THEN e.ManagerID


    ELSE e.ManagerID + (1000 * @width)


    END,


    e.Title


    FROM Employee_Temp e


    WHERE


    e.ManagerID IS NOT NULL;


    SET @width = @width * 2;


    END;


    GO


    There are two key factors you should pay attention to in this example. First is
    the @width variable, which is doubled on each iteration in order to avoid key
    collisions as the keys are incremented. Second, look at the CASE expression in
    the SELECT list, which increments all IDs except that of the CEO. This ensures
    that the duplicate subtrees will be appended to the tree as a whole, by virtue
    of the roots of those subtrees being subordinates of the CEO’s node, rather than
    the node at the top of each subtree becoming an additional root node.


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    Once this code has been run, the Employee_Temp hierarchy will have 9,249 nodes,
    instead of the 290


    that we started with. However, the hierarchy still has only five levels. To increase
    the **depth**, a slightly different algorithm is required. To add levels, find
    all managers except the CEO, and insert new duplicate nodes, incrementing their
    employee IDs similar to before. Next, update the preexisting managers in the table
    to report to the new managers. The following T-SQL does this in a loop four times,
    producing a hierarchy with a depth of 50 levels and 31,329 nodes:


    DECLARE @CEO int;


    SELECT


    @CEO = EmployeeID


    FROM Employee_Temp


    WHERE ManagerID IS NULL;


    DECLARE @depth int = 32;


    WHILE @depth <= 256


    BEGIN


    DECLARE @OldManagers table


    (


    EmployeeID int


    );


    --Insert intermediate managers


    --Find all managers except the CEO, and increment their EmployeeID by 1000


    INSERT INTO Employee_Temp


    (


    EmployeeID,


    ManagerID,


    Title


    )


    OUTPUT inserted.EmployeeID - (1000 * @depth) INTO @OldManagers


    SELECT


    e.EmployeeID + (1000 * @depth) as newemp,


    e.ManagerID,


    ''Intermediate Manager''


    FROM Employee_Temp e


    WHERE


    e.EmployeeID <> @CEO


    AND EXISTS


    (


    SELECT *


    FROM Employee_Temp e1


    WHERE e1.ManagerID = e.EmployeeID


    );


    --Update existing managers to report to intermediates


    UPDATE Employee_Temp


    SET ManagerID = EmployeeID + (1000 * @depth)


    WHERE


    EmployeeID IN


    (


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    SELECT EmployeeID


    FROM @OldManagers


    );


    SET @depth = @depth * 2;


    END;


    GO


    Be careful when adding additional depth to an experimental hierarchy. I’ve found
    that depth has a much greater performance impact than width, and extremely deep
    hierarchies are not especially common—for instance, even the largest companies
    do not normally have more than 20 or 30 levels of management.


    To iteratively traverse the hierarchy using a table variable, think about what
    recursion does: at each level, the employees for the previous level’s managers
    are found, and then that level becomes the current level. Applying this logic
    iteratively requires the following table variable:


    DECLARE @n table


    (


    EmployeeID int,


    ManagerID int,


    Title nvarchar(100),


    Depth int,


    thePath varchar(900),'
  trans: "\n虽然公共表表达式（CTE）可能是 SQL Server 2008 中遍历**邻接列表**层次结构最便捷的方法，但它们并不一定能提供最佳性能。涉及临时表或表变量的迭代方法很可能优于递归\
    \ CTE，尤其是当层次结构规模增长时。\n\n为了突出 CTE 与迭代方法之间的性能差异，需要一个更大的样本层次结构。首先，我们可以为 `Employee_Temp`\
    \ 层次结构添加 `width`。这意味着层次结构将保持相同的深度，但每一层将有更多的兄弟节点。为了实现这一点，对于给定子树下的每一行，可以将员工 ID 和经理\
    \ ID 增加相同的已知量，从而在原地生成一个重复的子树。以下 T-SQL 完成了这项工作，通过循环运行五次，每次迭代使层次结构的*宽度*加倍：\n\n```sql\n\
    DECLARE @CEO int;\n\nSELECT\n    @CEO = EmployeeID\nFROM Employee_Temp\nWHERE\
    \ ManagerID IS NULL;\n\nDECLARE @width int = 1;\n\nWHILE @width <= 16\nBEGIN\n\
    \    INSERT INTO Employee_Temp\n    (\n        EmployeeID,\n        ManagerID,\n\
    \        Title\n    )\n    SELECT\n        e.EmployeeID + (1000 * @width),\n \
    \       CASE e.ManagerID\n            WHEN @CEO THEN e.ManagerID\n           \
    \ ELSE e.ManagerID + (1000 * @width)\n        END,\n        e.Title\n    FROM\
    \ Employee_Temp e\n    WHERE\n        e.ManagerID IS NOT NULL;\n\n    SET @width\
    \ = @width * 2;\nEND;\nGO\n```\n\n在这个示例中，有两个关键因素需要注意。首先是 `@width` 变量，它在每次迭代时加倍，以避免在键递增时发生键冲突。其次，查看\
    \ `SELECT` 列表中的 `CASE` 表达式，它递增了除 CEO ID 以外的所有 ID。这确保了重复的子树将作为整体附加到树上，因为这些子树的根节点是\
    \ CEO 节点的下属，而不是每个子树顶部的节点成为额外的根节点。\n\n## 第 12 章 „ 树、层次结构和图\n\n运行此代码后，`Employee_Temp`\
    \ 层次结构将拥有 9,249 个节点，而不是我们开始时的 290 个。然而，该层次结构仍然只有五层。要增加 `depth`，需要一个稍有不同的算法。要添加层级，需找到除\
    \ CEO 外的所有经理，并插入新的重复节点，类似于之前那样递增其员工 ID。接下来，更新表中现有的经理，使其向新的经理汇报。以下 T-SQL 通过循环四次实现了这一点，生成了一个深度为\
    \ 50 层、包含 31,329 个节点的层次结构：\n\n```sql\nDECLARE @CEO int;\n\nSELECT\n    @CEO =\
    \ EmployeeID\nFROM Employee_Temp\nWHERE ManagerID IS NULL;\n\nDECLARE @depth int\
    \ = 32;\n\nWHILE @depth <= 256\nBEGIN\n    DECLARE @OldManagers table\n    (\n\
    \        EmployeeID int\n    );\n\n    --插入中间经理\n    --找到除 CEO 外的所有经理，并将其 EmployeeID\
    \ 增加 1000\n    INSERT INTO Employee_Temp\n    (\n        EmployeeID,\n       \
    \ ManagerID,\n        Title\n    )\n    OUTPUT inserted.EmployeeID - (1000 * @depth)\
    \ INTO @OldManagers\n    SELECT\n        e.EmployeeID + (1000 * @depth) as newemp,\n\
    \        e.ManagerID,\n        'Intermediate Manager'\n    FROM Employee_Temp\
    \ e\n    WHERE\n        e.EmployeeID <> @CEO\n        AND EXISTS\n        (\n\
    \            SELECT *\n            FROM Employee_Temp e1\n            WHERE e1.ManagerID\
    \ = e.EmployeeID\n        );\n\n    --更新现有经理，使其向中间经理汇报\n    UPDATE Employee_Temp\n\
    \    SET ManagerID = EmployeeID + (1000 * @depth)\n    WHERE\n        EmployeeID\
    \ IN\n        (\n            SELECT EmployeeID\n            FROM @OldManagers\n\
    \        );\n\n    SET @depth = @depth * 2;\nEND;\nGO\n```\n\n向实验性层次结构添加额外深度时要小心。我发现深度对性能的影响远大于宽度，而且极深的层次结构并不特别常见——例如，即使是最大的公司，通常也不会超过\
    \ 20 或 30 层的管理层级。\n\n要使用表变量迭代遍历层次结构，可以思考递归做了什么：在每一层，根据上一层的经理找到对应的员工，然后该层成为当前层。迭代应用此逻辑需要以下表变量：\n\
    \n```sql\nDECLARE @n table\n(\n    EmployeeID int,\n    ManagerID int,\n    Title\
    \ nvarchar(100),\n    Depth int,\n    thePath varchar(900)\n);\n```\n"
- fmt: "# CHAPTER 12: TREES, HIERARCHIES, AND GRAPHS\n\n## PRIMARY KEY (Depth, EmployeeID)\n\
    \nThe `Depth` column maintains the level for nodes as they are inserted. The table\
    \ is clustered on the combination of `Depth` and `EmployeeID`; at each level,\
    \ the depth will be queried first, and we know that `EmployeeID` will be unique\
    \ so we can exploit it as a method of ensuring that the key itself is unique.\n\
    \nTo start things off, prime the table variable with the node you wish to use\
    \ as the root for traversal. In this case, the CEO’s node will be used, and the\
    \ path is started with `1/`, as I’ll be implementing the enumerated path output\
    \ shown in the previous example:\n\n```sql\nDECLARE @depth int = 1;\n\nINSERT\
    \ INTO @n\nSELECT\n    EmployeeID,\n    ManagerID,\n    Title,\n    @depth,\n\
    \    '0000000001/'\nFROM Employee_Temp\nWHERE ManagerID IS NULL;\n```\n\nAfter\
    \ the first row is in place, the logic is identical to the recursive logic used\
    \ in the CTE. For each level of depth, find the subordinates. The only difference\
    \ is that this is done using a `WHILE` loop instead of a recursive CTE:\n\n```sql\n\
    WHILE 1=1\nBEGIN\n    INSERT INTO @n\n    SELECT\n        e.EmployeeID,\n    \
    \    e.ManagerID,\n        e.Title,\n        @depth + 1,\n        n.thePath +\n\
    \            RIGHT(\n                REPLICATE('0', 10) +\n                CONVERT(varchar,\
    \ ROW_NUMBER() OVER\n                    (PARTITION BY e.ManagerID ORDER BY e.Title)),\n\
    \                10) + '/'\n    FROM Employee_Temp e\n    JOIN @n n on n.EmployeeID\
    \ = e.ManagerID\n    WHERE n.Depth = @depth;\n\n    IF @@ROWCOUNT = 0\n      \
    \  BREAK;\n\n    SET @depth = @depth + 1;\nEND\n```\n\nFinally, the output can\
    \ be queried from the table variable. Like before, an `ORDER BY` clause is necessary:\n\
    \n```sql\nSELECT\n    EmployeeID,\n    ManagerID,\n    Title,\n    thePath\nFROM\
    \ @n\nORDER BY\n    thePath;\n```\n\nThis method uses over 50 percent more code\
    \ than the CTE, is quite a bit less intuitive, and has many more potential areas\
    \ in which you might introduce logic bugs. However, its performance is quite a\
    \ bit better than the CTE. The enumerated path CTE performs 347,282 reads and\
    \ runs in 27.6 seconds on my laptop against the enhanced `Employee_Temp` table.\
    \ The iterative method, on the other hand, requires only 173,536 reads and runs\
    \ in 13.2 seconds.\n\nDespite the clear performance improvement in this case,\
    \ I do not recommend this method for the majority of situations. I feel that the\
    \ maintainability issues overshadow the performance benefits in all but the most\
    \ extreme cases (such as that demonstrated here). For that reason, the remaining\
    \ examples in this chapter will use CTEs. However, you should be able to convert\
    \ any of the examples so that they use iterative logic. Should you decide to use\
    \ this technique on a project, you might find it beneficial to encapsulate the\
    \ code in a multistatement table-valued UDF to allow greater potential for reuse.\n\
    \n**Note** If you’re following along with the examples in this chapter and you\
    \ increased the number of rows in the `Employee_Temp` table, you should drop and\
    \ re-create it before continuing with the rest of the chapter.\n\n## Traversing\
    \ up the Hierarchy\n\nFor an adjacency list, traversing “up” the hierarchy—in\
    \ other words, finding any given node’s ancestry path back to the root node—is\
    \ essentially the same as traversing down the hierarchy in reverse. Instead of\
    \ using `ManagerID` as a key at each level of recursion, use `EmployeeID`. The\
    \ following CTE shows how to get the path from the Research and Development Manager,\
    \ `EmployeeID` 217, to the CEO:\n\n```sql\nWITH n AS\n(\n    SELECT\n        ManagerID,\n\
    \        CONVERT(varchar(900),\n            RIGHT(\n                REPLICATE('0',\
    \ 10) +\n                CONVERT(varchar, EmployeeID) + '/', 10)\n        ) AS\
    \ thePath\n    FROM Employee_Temp\n    WHERE EmployeeID = 217\n\n    UNION ALL\n\
    \n    SELECT\n        e.ManagerID,\n        CONVERT(varchar(900),\n          \
    \  n.thePath +\n            RIGHT(\n                REPLICATE('0', 10) +\n   \
    \             CONVERT(varchar, e.EmployeeID),\n                10) + '/'\n   \
    \     ) AS thePath\n    FROM Employee_Temp e\n    JOIN n ON n.ManagerID = e.EmployeeID\n\
    )\nSELECT *\nFROM n\nWHERE ManagerID IS NULL;\n```\n\nThis query returns the path\
    \ from the selected node to the CEO as a materialized path of employee IDs. However,\
    \ you might instead want to get the results back as a table of employee IDs. In\
    \ order to do that, change the outer query to the following:\n\n```sql\nSELECT\n\
    \    COALESCE(ManagerID, 217) AS EmployeeID\nFROM n\nORDER BY\n    CASE\n    \
    \    WHEN ManagerID IS NULL THEN 0\n        ELSE 1\n    END,\n    thePath;\n```\n\
    \nIn this case, the `COALESCE` function used in the `SELECT` list replaces the\
    \ CEO’s `ManagerID`—which is `NULL`—with the target `EmployeeID`. The `CASE` expression\
    \ in the `ORDER BY` clause forces the `NULL` row to sort at the top so that the\
    \ target `EmployeeID` is returned first. All other sorting is based on the materialized\
    \ path, which naturally returns the CEO’s row last.\n\n## Inserting New Nodes\
    \ and Relocating Subtrees\n\nIn an adjacency list hierarchy, inserting new nodes\
    \ is generally quite straightforward. Inserting a leaf node (i.e., a node with\
    \ no subordinates) requires simply inserting a new node into the table. To insert\
    \ a nonleaf node, you must also update any direct subordinates of the node you’re\
    \ inserting under, so that they point to their new manager. This is effectively\
    \ the same as inserting a new node and then relocating the old node’s subtree\
    \ under the new node, which is why I’ve merged these two topics into one section.\n\
    \nAs an example, suppose that AdventureWorks has decided to hire a new CTO, to\
    \ whom the current Vice President of Engineering (`EmployeeID` 12) will be reporting.\
    \ To reflect these changes in the `Employee_Temp` table, first insert the new\
    \ CTO node, and then update the VP’s node to report to the new CTO:\n\n```sql\n\
    INSERT INTO Employee_Temp\n(\n    EmployeeID,\n    ManagerID,\n    Title\n)\n\
    VALUES\n(\n    999,\n    109,\n    'CTO'\n);\nGO\n\nUPDATE Employee_Temp\nSET\
    \ ManagerID = 999\nWHERE EmployeeID = 12;\nGO\n```\n\nThat’s it! This same logic\
    \ can be applied for any subtree relocation—one of the advantages of adjacency\
    \ lists over the other hierarchical techniques discussed in this chapter is the\
    \ ease with which data modifications like this can be handled.\n\n## Deleting\
    \ Existing Nodes\n\nRemoving nodes in an adjacency list is only slightly trickier\
    \ than inserting a new nonleaf node. This time, the first step is to relocate\
    \ any subordinates that report to the node to be deleted—the key is that *subordinates*\
    \ is plural this time, as there may be more than one. Once those subtrees are\
    \ relocated to their new manager, the leaf node can simply be removed.\n\nSuppose\
    \ that on her first day at the office, the new CTO won the lottery and decided\
    \ that she would rather race her yacht than continue to work at AdventureWorks.\
    \ Removing her from the organizational hierarchy requires relocating her reports\
    \ back to the CEO, and then deleting her node, which will then be a leaf. Due\
    \ to the self-referencing foreign key on the table, nonleaf nodes cannot be deleted—this\
    \ is another nice fringe benefit of adjacency lists.\n\nThe following T-SQL can\
    \ be used to relocate subordinates of the CTO to her immediate manager, and then\
    \ remove the CTO’s node:\n\n```sql\nUPDATE Employee_Temp\nSET ManagerID =\n  \
    \  (\n        SELECT ManagerID\n        FROM Employee_Temp\n        WHERE EmployeeID\
    \ = 999\n    )\nWHERE ManagerID = 999;\n\nDELETE FROM Employee_Temp\nWHERE EmployeeID\
    \ = 999;\n```\n\nThis code works by finding the manager for the node to be removed,\
    \ and updating all of the node’s direct subordinates to point to that manager\
    \ (in other words, the “grandfather” node for each of the subordinates becomes\
    \ their “father” node). Once the update is complete, the node is a leaf, and so\
    \ can be removed.\n\n## Constraining the Hierarchy\n\nEach of the hierarchical\
    \ traversal examples shown in this chapter makes a very important assumption about\
    \ the data: it is taken for granted that there are no cycles or other data issues\
    \ that would breach the rules of a valid hierarchy. The main benefit of this assumption\
    \ is that the resultant code can be made a lot simpler; the problem is that the\
    \ simpler code is prone to various problems should bad data creep in—and as most\
    \ readers are no doubt aware, bad data can and *will* creep in if given the opportunity."
