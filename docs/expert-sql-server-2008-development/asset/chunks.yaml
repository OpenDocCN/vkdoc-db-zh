    are deliberately chosen to have a large **hamming distance**—that is, the resulting


    padded keys will be significantly different from each other, so that the


    strengthening effect of hashing with both keys is maximized.


    •


    The HMAC standard does not specify which hashing algorithm is used to perform


    the hashing, but the strength of the resulting HMAC is directly linked to the


    cryptographic strength of the underlying hash function on which it is based. The


    HASHBYTES function only supports hashing using the MD2, MD4, MD5, SHA, and


    SHA1 algorithms. The hashing methods provided by the .NET Framework, in


    contrast, support the more secure SHA2 family of algorithms, and also the 160-bit


    RIPEMD160 algorithm.


