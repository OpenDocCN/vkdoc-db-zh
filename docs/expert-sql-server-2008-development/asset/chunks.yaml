    identifier returned when the trace was started. This is demonstrated in the following
    code listing (in this case the trace identifier is listed as 99):


    EXEC sp_trace_setstatus @traceid=99, @status=0;


    EXEC sp_trace_setstatus @traceid=99, @status=2;


    GO


    Once the trace is stopped and closed, the sys.fn_trace_gettable function can be
    used to read the data from the trace file. This function takes two arguments:
    a full path to the trace file name—including the .trc extension automatically
    added by SQL Server—and the maximum number of rollover files to read. The following
    T-SQL would be used to read the trace file from the path C:\Traces\myTrace.trc.
    The number of rollover files is set high enough that all of the data will be read
    back, even if the trace rolled over to new files several times:


    SELECT *


    FROM sys.fn_trace_gettable(''C:\Traces\myTrace.trc'', 999);


    GO


    Once selected in this way, the trace data can be used just like any other data
    in SQL Server. It can be inserted into a table, queried, or aggregated in any
    number of ways in order to evaluate which queries are potentially causing problems.


    System Monitoring


    For a bigger-picture view of the overall performance of a server, system performance
    counters are an invaluable resource. These counters can be read using the System
    Monitor console (aka Performance Monitor, or perfmon.exe, depending on the operating
    system under which your SQL Server instance is running), although many load-testing
    tools have integrated system counter collection and reporting mechanisms. Similar
    to SQL Server trace events, there are hundreds of counters from which to choose—


    but only a handful generally need to be monitored when doing an initial performance
    evaluation of a SQL Server installation.


    The following counters are a good starting point for determining what kinds of
    performance issues to look for:


    •


    **Processor:% Processor Time** reports the total processor time with respect to
    the


    available capacity of the server. If this counter is above 70 percent during peak


    load periods, it may be worthwhile to begin investigating which routines are


    making heavy use of CPU time.


    •


    **PhysicalDisk:Avg. Disk Queue Length** indicates whether processes have to wait
    to


    use disk resources. As a disk is fulfilling requests (i.e., reading and writing
    data),


    requests that cannot be immediately filled are queued. Too many simultaneous


    requests results in wait times, which can mean query performance problems. It’s
    a


    good idea to make sure that queue lengths stay below 1 (meaning, effectively,
    that


    there is no queue) whenever possible.


    •


    **PhysicalDisk:Disk Read Bytes/sec** and **PhysicalDisk:Disk Write Bytes/sec**
    report


    the number of bytes read from and written to the disk, respectively. These figures


    are not especially interesting on their own, but coupled with Avg. Disk Queue


    Length **can help to explain problems. Slow SELECT queries coupled with high**


    **physical reads and low queue lengths can indicate that the buffer cache is not


    CHAPTER 3 „ TESTING DATABASE ROUTINES


    being effectively utilized. Slow DML queries coupled with high physical writes
