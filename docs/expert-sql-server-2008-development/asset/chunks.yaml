  trans: "\n# 第十一章 - 处理时间数据\n\n快速提示：如果某人在离职一段时间后又被同一家公司重新雇佣，此查询将无法正常工作。为了解决这个问题，可以使用类似以下的查询，其中会检查确保“前一行”（基于\
    \ `StartDate`）不包含相同的公司名称（这意味着该人更换了公司）：\n\n```sql\nSELECT\n    J1.Company,\n  \
    \  J1.StartDate AS StartDate,\n    COALESCE((\n        SELECT MIN(J2.StartDate)\n\
    \        FROM JobHistory AS J2\n        WHERE\n            J2.Company <> J1.Company\n\
    \            AND J2.StartDate > J1.StartDate),\n        CAST(GETDATE() AS date)\n\
    \    ) AS EndDate\nFROM JobHistory AS J1\nWHERE\n    J1.Company <>\n    COALESCE((\n\
    \        SELECT TOP(1)\n            J3.Company\n        FROM JobHistory J3\n \
    \       WHERE J3.StartDate < J1.StartDate\n        ORDER BY J3.StartDate DESC),\n\
    \        ''\n    )\nGROUP BY\n    J1.Company,\n    J1.StartDate\nORDER BY\n  \
    \  J1.StartDate;\n```\n\n本章为了讲解而将此示例复杂化了一些，但我认为有必要指出这种技术，以防你在生产应用程序中发现需要编写此类查询。这种模式在许多场景中都很有用，尤其是在记录自动化系统状态并试图确定停机时间统计或其他指标时。\n\
    \n回到手头的主要任务，即显示雇佣历史以及最高薪资和职位，下一步是将查找正确开始和结束日期的查询与查找最高薪资和关联职位的查询合并起来。最简单的方法是使用\
    \ `CROSS APPLY` 运算符，其行为类似于关联子查询，但返回的是表而非标量值。以下 T-SQL 展示了如何实现这一点：\n\n```sql\nSELECT\n\
    \    x.Company,\n    x.StartDate,\n    x.EndDate,\n    p.Pay,\n    p.Title\nFROM\n\
    \    (\n        SELECT\n            J1.Company,\n            MIN(J1.StartDate)\
    \ AS StartDate,\n            COALESCE((\n                SELECT MIN(J2.StartDate)\n\
    \                FROM JobHistory AS J2\n                WHERE\n              \
    \      J2.Company <> J1.Company\n                    AND J2.StartDate > MIN(J1.StartDate)),\n\
    \                CAST(GETDATE() AS date)\n            ) AS EndDate\n        FROM\
    \ JobHistory AS J1\n        GROUP BY J1.Company\n    ) x\nCROSS APPLY\n    (\n\
    \        SELECT\n            Pay,\n            Title\n        FROM JobHistory\
    \ AS J2\n        WHERE\n            J2.StartDate >= x.StartDate\n            AND\
    \ J2.StartDate < x.EndDate\n            AND J2.Pay =\n            (\n        \
    \        SELECT MAX(Pay)\n                FROM JobHistory AS J3\n            \
    \    WHERE J3.Company = J2.Company\n            )\n    ) p\nORDER BY x.StartDate;\n\
    ```\n\n此 T-SQL 使用外部查询中的 `StartDate` 和 `EndDate` 列来关联 `CROSS APPLY` 子查询，以查找与每个职位相对应的正确雇佣时间段。每个雇佣期的\
    \ `StartDate`/`EndDate` 对是一个 `半开区间`（或 `半开区间`，取决于你参考的数学教材）；`StartDate` 一端是 `闭区间`（包含端点），而\
    \ `EndDate` 是 `开区间`（不包含）。这是因为一个区间的 `EndDate` 实际上是下一个区间的 `StartDate`，并且这些区间不重叠。此查询的结果如下：\n\
    \n| Company       | StartDate  | EndDate    | Pay      | Title             |\n\
    | ------------- | ---------- | ---------- | -------- | ----------------- |\n|\
    \ Acme Corp     | 1997-06-26 | 2000-10-05 | 58000.00 | Programmer 2      |\n|\
    \ Acme Corp     | 1997-06-26 | 2000-10-05 | 58000.00 | Programmer 3      |\n|\
    \ Software Shop | 2000-10-05 | 2003-01-08 | 67000.00 | Programmer/Analyst|\n|\
    \ Better Place  | 2003-01-08 | 2007-11-14 | 87000.00 | DBA               |\n|\
    \ Enterprise    | 2007-11-14 | 2009-07-12 | 95000.00 | Database Developer|\n\n\
    虽然此查询有效，但它存在一个问题：如果在最高薪资级别发生了职位变更但未伴随薪资增长（如此数据集中所示），`CROSS APPLY` 子查询将返回多行，从而在结果中产生重复行。解决方案是通过按\
    \ `Pay` 列降序对结果排序来选择适当的行。修改后的子查询（每个职位只返回一行）如下：\n\n```sql\nSELECT TOP(1)\n    Pay,\n\
    \    Title\nFROM JobHistory AS J2\nWHERE\n    J2.StartDate >= x.StartDate\n  \
    \  AND J2.StartDate < x.EndDate\nORDER BY PAY DESC\n```\n\n我希望你能从这些示例中带走的重要信息是用于操作区间的模式，以及这样一个事实：以这种方式对区间建模可能不足以满足许多情况。\n\
    \n从查询风格的角度来看，需要注意的是，为了在逻辑上操作这些数据，必须在查询中合成某种形式的区间“结束”。每当你面对一个映射实体随时间变化但仅使用单个日期/时间列记录时间组件的表时，试着思考如何转换数据以便可以处理区间的开始和结束。这将使查询更加直接明了。\n\
    \n从建模的角度来看，这种设置显然是有缺陷的。我已经提到了序列中存在间隔（gaps）的问题，这在单列表中是无法表示的。另一个问题是重叠的区间。如果该人在与某份工作相同的时段内承担了一些业余合同工作怎么办？尝试将这些数据插入表中会让人觉得该人已经换了公司。\n\
    \n这并不是说任何区间都不应该以此方式建模。在许多情况下，间隔和重叠可能没有意义，并且用于第二列的额外字节将是一种浪费。一个主要例子是服务器正常运行时间监视器。IT\
    \ 部门经常使用的系统会定期 ping 每个被监视的服务器，并记录其状态的变化。以下是一个简化的示例表和代表两个被监视服务器状态的几行数据：\n\n```sql\n\
    CREATE TABLE ServerStatus\n(\n    ServerName varchar(50),\n    Status varchar(15),\n\
    \    StatusTime datetime\n);\nGO\n\nINSERT INTO ServerStatus\n(\n    ServerName,\n\
    \    Status,\n    StatusTime\n) VALUES\n    ('WebServer', 'Available', '2009-04-20T03:00:00.000'),\n\
    \    ('DBServer', 'Available', '2009-04-20T03:00:00.000'),\n    ('DBServer', 'Unavailable',\
    \ '2009-06-12T14:35:23.100'),\n    ('DBServer', 'Available', '2009-06-12T14:38:52.343'),\n\
    \    ('WebServer', 'Unavailable', '2009-06-15T09:16:03.593'),\n    ('WebServer',\
    \ 'Available', '2009-06-15T09:28:17.006');\nGO\n```\n\n应用与用于雇佣期开始和结束的几乎完全相同的查询，我们可以找出每台服务器不可用的区间：\n\
    \n```sql\nSELECT\n    S1.ServerName,\n    S1.StatusTime,\n    COALESCE((\n   \
    \     SELECT MIN(S2.StatusTime)\n        FROM ServerStatus AS S2\n        WHERE\n\
    \            S2.StatusTime > S1.StatusTime),\n        GETDATE()\n    ) AS EndTime\n\
    FROM ServerStatus AS S1\nWHERE S1.Status = 'Unavailable';\n```\n\n此查询的结果如下：\n\n\
    | ServerName | StatusTime             | EndTime                |\n| ----------\
    \ | ---------------------- | ---------------------- |\n| DBServer   | 2009-06-12\
    \ 14:35:23.100| 2009-06-12 14:38:52.343|\n| WebServer  | 2009-06-15 09:16:03.593|\
    \ 2009-06-15 09:28:17.007|\n\n如果系统状态未改变，某些系统会发送定期的状态更新。监视系统可能会每 30 秒或一分钟插入额外的“不可用”行，直到目标系统再次开始响应。按目前情况，此查询将每个临时状态更新报告为一个单独的区间起点。要解决此问题，可以按如下方式修改查询：\n\
    \n```sql\nSELECT\n    S1.ServerName,\n    MIN(S1.StatusTime) AS StartTime,\n \
    \   p.EndTime\nFROM ServerStatus AS S1\nCROSS APPLY\n    (\n        SELECT\n \
    \           COALESCE((\n                SELECT MIN(S2.StatusTime)\n          \
    \      FROM ServerStatus AS S2\n                WHERE\n                    S2.StatusTime\
    \ > S1.StatusTime\n                    AND S2.Status = 'Available'\n         \
    \       ),\n                GETDATE()\n            ) AS EndTime\n    ) p\nWHERE\
    \ S1.Status = 'Unavailable'\nGROUP BY\n    S1.ServerName,\n    p.EndTime;\n```\n\
    \n这个新版本查找在当前“不可用”行之后出现的第一个“可用”行；该行代表服务器宕机整个区间的实际结束时间。外部查询使用 `MIN` 聚合函数来查找每个 `ServerName`/`EndTime`\
    \ 组合报告的第一个“不可用”时间。\n\n## 对独立区间进行建模和查询\n"
- fmt: "# CHAPTER 11 „ WORKING WITH TEMPORAL DATA\n\nIn many cases, it is more appropriate\
    \ to model intervals as a start time/end time combination rather than using a\
    \ single column as used in the previous section. With both a start and end time,\
    \ no subinterval has any direct dependence on any other interval or subinterval.\
    \ Therefore, both gaps and overlaps can be represented. The remainder of this\
    \ section details how to work with intervals modeled in that way.\n\nGoing back\
    \ to the employment example, assume that a system is required for a company to\
    \ track internal employment histories. Following is a sample table, simplified\
    \ for this example:\n\n```sql\nCREATE TABLE EmploymentHistory\n(\n    Employee\
    \ varchar(50) NOT NULL,\n    Title varchar(50) NOT NULL,\n    StartDate date NOT\
    \ NULL,\n    EndDate date NULL,\n    CONSTRAINT CK_Start_End CHECK (StartDate\
    \ < EndDate)\n);\nGO\n```\n\nThe main thing I’ve left out of this example is proper\
    \ data integrity. Ignore the obvious need for a table of names and titles to avoid\
    \ duplication of that data—that would overcomplicate the example. The holes I’m\
    \ referring to deal with the employment history–specific data that the table is\
    \ intended for. The primary issue is that although I did include one `CHECK` constraint\
    \ to make sure that the `EndDate` is after the `StartDate` (we hope that the office\
    \ isn’t so bad that people are quitting on their first day), I failed to include\
    \ a primary key.\n\nDeciding what constitutes the primary key in this case requires\
    \ a bit of thought. `Employee` alone is not sufficient, as employees would not\
    \ be able to get new titles during the course of their employment (or at least\
    \ it would no longer be a “history” of those changes). The next candidate might\
    \ be `Employee` and `Title`, but this also has a problem. What if an employee\
    \ leaves the company for a while, and later comes to his senses and begs to be\
    \ rehired with the same title? The good thing about the table structure is that\
    \ such a gap *can* be represented; but constraining on both the `Employee` and\
    \ `Title` columns would prevent that situation from being allowed.\n\nAdding `StartDate`\
    \ into the mix seems like it would fix the problem, but in actuality it creates\
    \ a whole new issue. An employee cannot be in two places (or offices) at the same\
    \ time, and the combination of the three columns would allow the same employee\
    \ to start on the same day with two different titles. And although it’s common\
    \ in our industry to wear many different hats, that fact is generally not reflected\
    \ in our job title.\n\nAs it turns out, what we really need to constrain in the\
    \ primary key is an employee starting on a certain day; uniqueness of the employee’s\
    \ particular title is not important in that regard. The following key can be added:\n\
    \n```sql\nALTER TABLE EmploymentHistory\nADD PRIMARY KEY (Employee, StartDate);\n\
    ```\n\nThis primary key takes care of an employee being in two places at once\
    \ on the same day, but how about different days? Even with this constraint in\
    \ place, the following two rows would be valid:\n\n```sql\nINSERT INTO EmploymentHistory\n\
    (\n    Employee,\n    Title,\n    StartDate,\n    EndDate\n) VALUES\n('Jones',\
    \ 'Developer', '20090101', NULL),\n('Jones', 'Senior Developer', '20090601', NULL);\n\
    ```\n\nAccording to this data, Jones is *both* `Developer` and `Senior Developer`,\
    \ as of June 1, 2009—quite a bit of stress for one person! The first idea for\
    \ a solution might be to add a unique constraint on the `Employee` and `EndDate`\
    \ columns. In SQL Server, unique constraints allow for one `NULL`-valued row—so\
    \ only one `NULL` `EndDate` would be allowed per employee. That would fix the\
    \ problem with these rows, but it would still allow the following rows:\n\n```sql\n\
    INSERT INTO EmploymentHistory\n(\n    Employee,\n    Title,\n    StartDate,\n\
    \    EndDate\n) VALUES\n('Jones', 'Developer', '20090201', '20090801'),\n('Jones',\
    \ 'Senior Developer', '20090701', NULL);\n```\n\nNow, Jones was both `Developer`\
    \ and `Senior Developer` for a month. Again, this is probably not what was intended.\n\
    \nFixing this problem will require more than just a combination of primary and\
    \ unique key constraints, and a bit of background is necessary before I present\
    \ the solution. Therefore, I will return to this topic in the next section, which\
    \ covers overlapping intervals.\n\nBefore we resolve the problem of overlapping\
    \ intervals, let’s consider the other main benefit of this type of model over\
    \ the single-date model, which is the support for gaps. Ignore for a moment the\
    \ lack of proper constraints, and consider the following rows (which would be\
    \ valid even with the constraints):\n\n```sql\nINSERT INTO EmploymentHistory\n\
    (\n    Employee,\n    Title,\n    StartDate,\n    EndDate\n) VALUES\n('Jones',\
    \ 'Developer', '20070105', '20070901'),\n('Jones', 'Senior Developer', '20070901',\
    \ '20080901'),\n('Jones', 'Principal Developer', '20080901', '20081007'),\n('Jones',\
    \ 'Principal Developer', '20090206', NULL);\n```\n\nThe scenario shown here is\
    \ an employee named Jones, who started as a developer in January 2007 and was\
    \ promoted to Senior Developer later in the year. Jones was promoted again to\
    \ Principal Developer in 2008, but quit a month later. However, a few months after\
    \ that he decided to rejoin the company and has not yet left or been promoted\
    \ again.\n\nThe two main questions that can be asked when dealing with intervals\
    \ that represent gaps are “What intervals are covered by the data?” and “What\
    \ holes are present?” These types of questions are ubiquitous when working with\
    \ any kind of interval data. Real-world scenarios include such requirements as\
    \ tracking of service-level agreements for server uptime and managing worker shift\
    \ schedules—and of course, employment history.\n\nIn this case, the questions\
    \ can be phrased as “During what periods did Jones work for the firm?” and the\
    \ opposite, “During which periods was Jones *not* working for the firm?” To answer\
    \ the first question, the first requirement is to find all subinterval start dates—dates\
    \ that are not connected to a previous end date. The following T-SQL accomplishes\
    \ that goal:\n\n```sql\nSELECT\n    theStart.StartDate\nFROM EmploymentHistory\
    \ theStart\nWHERE\n    theStart.Employee = 'Jones'\n    AND NOT EXISTS\n    (\n\
    \        SELECT *\n        FROM EmploymentHistory Previous\n        WHERE\n  \
    \          Previous.EndDate = theStart.StartDate\n            AND theStart.Employee\
    \ = Previous.Employee\n    );\n```\n\nThis query finds all rows for Jones (remember,\
    \ there could be rows for other employees in the table), and then filters them\
    \ down to rows where there is no end date for a Jones subinterval that matches\
    \ the start date of the row. The start dates for these rows are the start dates\
    \ for the continuous intervals covered by Jones’s employment.\n\nThe next step\
    \ is to find the ends of the covering intervals. The end rows can be identified\
    \ similarly to the starting rows; they are rows where the end date has no corresponding\
    \ start date in any other rows.\n\nTo match the end rows to the start rows, find\
    \ the first end row that occurs after a given start row. The following T-SQL finds\
    \ start dates using the preceding query and end dates using a subquery that employs\
    \ the algorithm just described:\n\n```sql\nSELECT\n    theStart.StartDate,\n \
    \   (\n        SELECT\n            MIN(EndDate)\n        FROM EmploymentHistory\
    \ theEnd\n        WHERE\n            theEnd.EndDate > theStart.StartDate\n   \
    \         AND theEnd.Employee = theStart.Employee\n            AND NOT EXISTS\n\
    \            (\n                SELECT *\n                FROM EmploymentHistory\
    \ After\n                WHERE\n                    After.StartDate = theEnd.EndDate\n\
    \                    AND After.Employee = theEnd.Employee\n            )\n   \
    \ ) AS EndDate\nFROM EmploymentHistory theStart\nWHERE\n    theStart.Employee\
    \ = 'Jones'\n    AND NOT EXISTS\n    (\n        SELECT *\n        FROM EmploymentHistory\
    \ Previous\n        WHERE\n            Previous.EndDate = theStart.StartDate\n\
    \            AND theStart.Employee = Previous.Employee\n    );\n```"
  raw: 'In many cases, it is more appropriate to model intervals as a start time/end
    time combination rather than using a single column as used in the previous section.
    With both a start and end time, no subinterval has any direct dependence on any
    other interval or subinterval. Therefore, both gaps and overlaps can be represented.
    The remainder of this section details how to work with intervals modeled in that
    way.


    Going back to the employment example, assume that a system is required for a company
    to track internal employment histories. Following is a sample table, simplified
    for this example:


    CREATE TABLE EmploymentHistory


    (


    Employee varchar(50) NOT NULL,


    Title varchar(50) NOT NULL,


    StartDate date NOT NULL,


    EndDate date NULL,


    CONSTRAINT CK_Start_End CHECK (StartDate < EndDate)


    );


    GO


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    The main thing I’ve left out of this example is proper data integrity. Ignore
    the obvious need for a table of names and titles to avoid duplication of that
    data—that would overcomplicate the example. The holes I’m referring to deal with
    the employment history–specific data that the table is intended for. The primary
    issue is that although I did include one CHECK constraint to make sure that the
    EndDate is after the StartDate (we hope that the office isn’t so bad that people
    are quitting on their first day), I failed to include a primary key.


    Deciding what constitutes the primary key in this case requires a bit of thought.
    Employee alone is not sufficient, as employees would not be able to get new titles
    during the course of their employment (or at least it would no longer be a “history”
    of those changes). The next candidate might be Employee and Title, but this also
    has a problem. What if an employee leaves the company for a while, and later comes
    to his senses and begs to be rehired with the same title? The good thing about
    the table structure is that such a gap *can* be represented; but constraining
    on both the Employee and Title columns would prevent that situation from being
    allowed.


    Adding StartDate into the mix seems like it would fix the problem, but in actuality
    it creates a whole new issue. An employee cannot be in two places (or offices)
    at the same time, and the combination of the three columns would allow the same
    employee to start on the same day with two different titles. And although it’s
    common in our industry to wear many different hats, that fact is generally not
    reflected in our job title.


    As it turns out, what we really need to constrain in the primary key is an employee
    starting on a certain day; uniqueness of the employee’s particular title is not
    important in that regard. The following key can be added:


    ALTER TABLE EmploymentHistory


    ADD PRIMARY KEY (Employee, StartDate);


    This primary key takes care of an employee being in two places at once on the
    same day, but how about different days? Even with this constraint in place, the
    following two rows would be valid: INSERT INTO EmploymentHistory


    (


    Employee,


    Title,


    StartDate,


    EndDate


    ) VALUES


    (''Jones'', ''Developer'', ''20090101'', NULL),


    (''Jones'', ''Senior Developer'', ''20090601'', NULL);


    According to this data, Jones is *both* Developer and Senior Developer, as of
    June 1, 2009—quite a bit of stress for one person! The first idea for a solution
    might be to add a unique constraint on the Employee and EndDate columns. In SQL
    Server, unique constraints allow for one NULL-valued row—so only one NULL EndDate
    would be allowed per employee. That would fix the problem with these rows, but
    it would still allow the following rows:


    INSERT INTO EmploymentHistory


    (


    Employee,


    Title,


    StartDate,


    EndDate


    ) VALUES


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    (''Jones'', ''Developer'', ''20090201'', ''20090801''),


    (''Jones'', ''Senior Developer'', ''20090701'', NULL);


    Now, Jones was both Developer and Senior Developer for a month. Again, this is
    probably not what was intended.


    Fixing this problem will require more than just a combination of primary and unique
    key


    constraints, and a bit of background is necessary before I present the solution.
    Therefore, I will return to this topic in the next section, which covers overlapping
    intervals.


    Before we resolve the problem of overlapping intervals, let’s consider the other
    main benefit of this type of model over the single-date model, which is the support
    for gaps. Ignore for a moment the lack of proper constraints, and consider the
    following rows (which would be valid even with the constraints): INSERT INTO EmploymentHistory


    (


    Employee,


    Title,


    StartDate,


    EndDate


    ) VALUES


    (''Jones'', ''Developer'', ''20070105'', ''20070901''),


    (''Jones'', ''Senior Developer'', ''20070901'', ''20080901''),


    (''Jones'', ''Principal Developer'', ''20080901'', ''20081007''),


    (''Jones'', ''Principal Developer'', ''20090206'', NULL);


    The scenario shown here is an employee named Jones, who started as a developer
    in January 2007


    and was promoted to Senior Developer later in the year. Jones was promoted again
    to Principal Developer in 2008, but quit a month later. However, a few months
    after that he decided to rejoin the company and has not yet left or been promoted
    again.


    The two main questions that can be asked when dealing with intervals that represent
    gaps are


    “What intervals are covered by the data?” and “What holes are present?” These
    types of questions are ubiquitous when working with any kind of interval data.
    Real-world scenarios include such


    requirements as tracking of service-level agreements for server uptime and managing
    worker shift schedules—and of course, employment history.


    In this case, the questions can be phrased as “During what periods did Jones work
    for the firm?” and the opposite, “During which periods was Jones *not* working
    for the firm?” To answer the first question, the first requirement is to find
    all subinterval start dates—dates that are not connected to a previous end date.
    The following T-SQL accomplishes that goal:


    SELECT


    theStart.StartDate


    FROM EmploymentHistory theStart


    WHERE


    theStart.Employee = ''Jones''


    AND NOT EXISTS


    (


    SELECT *


    FROM EmploymentHistory Previous


    WHERE


    Previous.EndDate = theStart.StartDate


    AND theStart.Employee = Previous.Employee


    );


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    This query finds all rows for Jones (remember, there could be rows for other employees
    in the table), and then filters them down to rows where there is no end date for
    a Jones subinterval that matches the start date of the row. The start dates for
    these rows are the start dates for the continuous intervals covered by Jones’s
    employment.


    The next step is to find the ends of the covering intervals. The end rows can
    be identified similarly to the starting rows; they are rows where the end date
    has no corresponding start date in any other rows.


    To match the end rows to the start rows, find the first end row that occurs after
    a given start row. The following T-SQL finds start dates using the preceding query
    and end dates using a subquery that employs the algorithm just described:


    SELECT


    theStart.StartDate,


    (


    SELECT


    MIN(EndDate)


    FROM EmploymentHistory theEnd


    WHERE


    theEnd.EndDate > theStart.StartDate


    AND theEnd.Employee = theStart.Employee


    AND NOT EXISTS


    (


    SELECT *


    FROM EmploymentHistory After


    WHERE


    After.StartDate = theEnd.EndDate


    AND After.Employee = theEnd.Employee


    )


    ) AS EndDate


    FROM EmploymentHistory theStart


    WHERE


    theStart.Employee = ''Jones''


    AND NOT EXISTS


    (


    SELECT *


    FROM EmploymentHistory Previous


    WHERE


    Previous.EndDate = theStart.StartDate


    AND theStart.Employee = Previous.Employee


    );'
  trans: "\n# 第十一章 处理时间数据\n\n在很多情况下，将时间区间建模为开始时间/结束时间的组合，比使用上一节中采用的单列方式更为合适。同时拥有开始和结束时间后，任何子区间都不再直接依赖于其他区间或子区间。因此，既可以表示间隔，也可以表示重叠。本节剩余部分将详细说明如何使用这种方式建模的时间区间。\n\
    \n回到雇佣关系的例子，假设一个公司需要一个系统来跟踪内部的雇佣历史。下面是一个示例表，为本例进行了简化：\n\n```sql\nCREATE TABLE\
    \ EmploymentHistory\n(\n    Employee varchar(50) NOT NULL,\n    Title varchar(50)\
    \ NOT NULL,\n    StartDate date NOT NULL,\n    EndDate date NULL,\n    CONSTRAINT\
    \ CK_Start_End CHECK (StartDate < EndDate)\n);\nGO\n```\n\n这个例子中我主要忽略了完善的数据完整性。忽略为避免数据重复而明显需要的姓名和职位表——那会使例子过于复杂。我指的是针对雇佣历史特定数据的缺陷，也就是这个表旨在存储的数据。主要问题在于，虽然我确实包含了一个\
    \ `CHECK` 约束来确保 `EndDate` 在 `StartDate` 之后（我们希望办公室不至于糟糕到让员工第一天就辞职），但我忘记包含主键。\n\
    \n在这种情况下，决定什么构成主键需要一些思考。单独的 `Employee` 字段是不够的，因为员工无法在任职期间获得新职位（否则它就不再是那些变化的“历史”）。下一个候选可能是\
    \ `Employee` 和 `Title`，但这也有问题。如果员工离开公司一段时间，后来醒悟过来并恳求以相同的职位重新被录用，会怎样？表结构的*好处*在于可以表示这样的间隔；但约束\
    \ `Employee` 和 `Title` 两列将阻止这种情况发生。\n\n把 `StartDate` 加进来似乎可以解决问题，但实际上它创造了全新的问题。一个员工不能在同一时间出现在两个地方（或办公室），而这三列的组合将允许同一个员工在同一天开始拥有两个不同的职位。尽管在我们的行业中身兼数职很常见，但这个事实通常不会反映在我们的职位名称中。\n\
    \n事实证明，在主键中真正需要约束的是员工在某一天开始任职；员工特定职位的唯一性在这方面并不重要。可以添加以下键：\n\n```sql\nALTER TABLE\
    \ EmploymentHistory\nADD PRIMARY KEY (Employee, StartDate);\n```\n\n这个主键解决了员工在同一天同时出现在两个地方的问题，但不同天呢？即使有了这个约束，以下两行仍然是有效的：\n\
    \n```sql\nINSERT INTO EmploymentHistory\n(\n    Employee,\n    Title,\n    StartDate,\n\
    \    EndDate\n) VALUES\n('Jones', 'Developer', '20090101', NULL),\n('Jones', 'Senior\
    \ Developer', '20090601', NULL);\n```\n\n根据这些数据，截至 2009 年 6 月 1 日，Jones *同时*是\
    \ `Developer` 和 `Senior Developer`——对一个人来说压力太大了！第一个想到的解决方案可能是给 `Employee` 和 `EndDate`\
    \ 列添加一个唯一约束。在 SQL Server 中，唯一约束允许一个 `NULL` 值的行——因此每个员工只允许一个 `NULL` 的 `EndDate`。这将解决这些行的问题，但仍允许以下行的存在：\n\
    \n```sql\nINSERT INTO EmploymentHistory\n(\n    Employee,\n    Title,\n    StartDate,\n\
    \    EndDate\n) VALUES\n('Jones', 'Developer', '20090201', '20090801'),\n('Jones',\
    \ 'Senior Developer', '20090701', NULL);\n```\n\n现在，Jones 有一个月的时间既是 `Developer`\
    \ 又是 `Senior Developer`。同样，这可能也不是我们想要的。\n\n解决这个问题需要的不仅仅是主键和唯一键约束的组合，在我给出解决方案之前，需要一些背景知识。因此，我将在下一节中回到这个话题，该节将介绍重叠区间。\n\
    \n在我们解决重叠区间的问题之前，让我们先考虑一下这种模型相对于单日期模型的另一个主要好处，即对间隔的支持。暂时忽略缺少适当约束的问题，考虑以下行（即使有约束，这些行也是有效的）：\n\
    \n```sql\nINSERT INTO EmploymentHistory\n(\n    Employee,\n    Title,\n    StartDate,\n\
    \    EndDate\n) VALUES\n('Jones', 'Developer', '20070105', '20070901'),\n('Jones',\
    \ 'Senior Developer', '20070901', '20080901'),\n('Jones', 'Principal Developer',\
    \ '20080901', '20081007'),\n('Jones', 'Principal Developer', '20090206', NULL);\n\
    ```\n\n这里展示的场景是：一位名叫 Jones 的员工，于 2007 年 1 月作为一名开发者入职，并在同年晚些时候被提升为高级开发者。2008 年，Jones\
    \ 再次被提升为主要开发者，但一个月后辞职了。然而，几个月后，他决定重新加入公司，至今尚未离开或再次获得晋升。\n\n处理表示间隔的时间区间时，可以提出的两个主要问题是：“数据覆盖了哪些时间段？”以及“存在哪些空缺？”这类问题在处理任何类型的区间数据时都普遍存在。现实世界中的场景包括跟踪服务器正常运行时间的服务级别协议和管理员工轮班表——当然，还有雇佣历史。\n\
    \n在这个情况下，问题可以表述为“Jones 在哪些时间段为公司工作？”以及相反的问题，“Jones 在哪些时间段*没有*为公司工作？”。要回答第一个问题，首先需要找到所有子区间的开始日期——即没有与先前结束日期相连的日期。以下的\
    \ T-SQL 实现了这个目标：\n\n```sql\nSELECT\n    theStart.StartDate\nFROM EmploymentHistory\
    \ theStart\nWHERE\n    theStart.Employee = 'Jones'\n    AND NOT EXISTS\n    (\n\
    \        SELECT *\n        FROM EmploymentHistory Previous\n        WHERE\n  \
    \          Previous.EndDate = theStart.StartDate\n            AND theStart.Employee\
    \ = Previous.Employee\n    );\n```\n\n此查询查找 Jones 的所有行（记住，表中可能还有其他员工的行），然后将其过滤为那些没有其他\
    \ Jones 子区间的结束日期与此行的开始日期相匹配的行。这些行的开始日期就是 Jones 连续雇佣时间段的起始日期。\n\n下一步是找到覆盖区间的结束点。结束行可以类似开始行那样识别；它们是那些结束日期在其他行中没有对应开始日期的行。\n\
    \n为了将结束行与开始行匹配起来，需要为给定的开始行找到其后的第一个结束行。以下的 T-SQL 使用前面的查询找到开始日期，并使用一个采用上述算法的子查询找到结束日期：\n\
    \n```sql\nSELECT\n    theStart.StartDate,\n    (\n        SELECT\n           \
    \ MIN(EndDate)\n        FROM EmploymentHistory theEnd\n        WHERE\n       \
    \     theEnd.EndDate > theStart.StartDate\n            AND theEnd.Employee = theStart.Employee\n\
    \            AND NOT EXISTS\n            (\n                SELECT *\n       \
    \         FROM EmploymentHistory After\n                WHERE\n              \
    \      After.StartDate = theEnd.EndDate\n                    AND After.Employee\
    \ = theEnd.Employee\n            )\n    ) AS EndDate\nFROM EmploymentHistory theStart\n\
    WHERE\n    theStart.Employee = 'Jones'\n    AND NOT EXISTS\n    (\n        SELECT\
    \ *\n        FROM EmploymentHistory Previous\n        WHERE\n            Previous.EndDate\
    \ = theStart.StartDate\n            AND theStart.Employee = Previous.Employee\n\
    \    );\n```\n"
- fmt: "# Finding Noncovered Intervals\n\nFinding noncovered intervals (i.e., gaps\
    \ in the employment history) is a bit simpler. First, find the end date of every\
    \ subinterval using the same syntax used to find end dates in the covered intervals\
    \ query. Each of these dates marks the start of a noncovered interval. Make sure\
    \ to filter out rows where the `EndDate` is `NULL`—these subintervals have not\
    \ yet ended, so it does not make sense to include them as holes. In the subquery\
    \ to find the end of each hole, find the first start date (if one exists) after\
    \ the beginning of the hole.\n\nThe following T-SQL demonstrates this approach\
    \ to find noncovered intervals:\n\n```sql\nSELECT\n    theStart.EndDate AS StartDate,\n\
    \    (\n        SELECT MIN(theEnd.StartDate)\n        FROM EmploymentHistory theEnd\n\
    \        WHERE\n            theEnd.StartDate > theStart.EndDate\n            AND\
    \ theEnd.Employee = theStart.Employee\n    ) AS EndDate\nFROM EmploymentHistory\
    \ theStart\nWHERE\n    theStart.Employee = 'Jones'\n    AND theStart.EndDate IS\
    \ NOT NULL\n    AND NOT EXISTS\n    (\n        SELECT *\n        FROM EmploymentHistory\
    \ After\n        WHERE After.StartDate = theStart.EndDate\n    );\n```\n\n# Overlapping\
    \ Intervals\n\nThe final benefit (or drawback, depending on what’s being modeled)\
    \ of using both a start and end date for intervals that I’d like to discuss is\
    \ the ability to work with overlapping intervals. Understanding how to work with\
    \ overlaps is necessary either for performing overlap-related queries (“How many\
    \ employees worked for the firm between August 2007 and September 2008?”) or for\
    \ constraining in order to avoid overlaps, as is necessary in the single-employee\
    \ example started in the previous section.\n\n## Types of Overlaps\n\nTo begin\
    \ with, a bit of background on overlaps is necessary. Figure 11-4 shows the types\
    \ of interval overlaps that are possible. Interval A is overlapped by each of\
    \ the other intervals B through E, as follows:\n\n- Interval B starts within interval\
    \ A and ends after interval A.\n- Interval C is the opposite, starting before\
    \ interval A and ending within.\n- Interval D both starts and ends within interval\
    \ A.\n- Finally, interval E both starts before and ends after interval A.\n\n\
    Figure 11-4. The types of overlapping intervals\n\n## Generalized Overlap Algorithm\n\
    \nAssuming that each interval has a `StartTime` property and an `EndTime` property,\
    \ the relationships between each of the intervals B through E and interval A can\
    \ be formalized in SQL-like syntax as follows:\n\n```sql\nB.StartDate >= A.StartDate\
    \ AND B.StartDate < A.EndDate AND B.EndDate > A.EndDate\n\nC.StartDate < A.StartDate\
    \ AND C.EndDate > A.StartDate AND C.EndDate <= A.EndDate\n\nD.StartDate >= A.StartDate\
    \ AND D.EndDate <= A.EndDate\n\nE.StartDate < A.StartDate AND E.EndDate > A.EndDate\n\
    ```\n\nSubstituting the name `X` for all intervals B through E, we can begin to\
    \ create a generalized algorithm for detecting overlaps. Let us first consider\
    \ the situations in which an interval `X` does *not* overlap interval A. This\
    \ can happen in two cases: either `X` occurs entirely after interval A, or it\
    \ is entirely before interval A—for example:\n\n```sql\nX.StartDate > A.EndDate\
    \ OR X.EndDate < A.StartDate\n```\n\nIf the preceding condition is true for cases\
    \ where `X` does not overlap A, then the condition for an overlap must therefore\
    \ be the complement of this—in other words:\n\n```sql\nX.StartDate < A.EndDate\
    \ AND X.EndDate > A.StartDate\n```\n\nTo rephrase this condition in English, we\
    \ get “If `X` starts before A ends, and `X` ends after A starts, then `X` overlaps\
    \ A.” This is illustrated in Figure 11-5.\n\nFigure 11-5. If `X` starts before\
    \ A ends and `X` ends after A starts, the two intervals overlap.\n\n## Preventing\
    \ Overlaps with a Trigger\n\nGetting back to the `EmploymentHistory` table and\
    \ its lack of proper constraints, it’s clear that the real issue at hand is that\
    \ it is not constrained to avoid overlap. A single employee cannot have two titles\
    \ simultaneously, and the only way to ensure that does not happen is to make sure\
    \ each employee’s subintervals are unique.\n\nUnfortunately, this logic cannot\
    \ be embedded in a constraint, since in order to determine whether a row overlaps\
    \ another, all of the other rows in the set must be evaluated. The following query\
    \ finds all overlapping rows for Jones in the `EmploymentHistory` table, using\
    \ the final overlap expression:\n\n```sql\nSELECT *\nFROM EmploymentHistory E1\n\
    JOIN EmploymentHistory E2 ON\n    E1.Employee = E2.Employee\n    AND (\n     \
    \   E1.StartDate < COALESCE(E2.EndDate, '99991231')\n        AND COALESCE(E1.EndDate,\
    \ '99991231') > E2.StartDate)\n    AND E1.StartDate <> E2.StartDate\nWHERE\n \
    \   E1.Employee = 'Jones';\n```\n\nNote that in order to avoid showing rows overlapping\
    \ with themselves, the `E1.StartDate <> E2.StartDate` expression was added. Thanks\
    \ to the primary key on the `Employee` and `StartDate` columns, we know that no\
    \ two rows can share the same `StartDate`, so this does not affect the overlap\
    \ logic. In addition, in the case of open-ended (`NULL`) `EndDate` values, the\
    \ `COALESCE` statement is used to substitute the maximum possible date value.\
    \ This avoids the possibility of inserting an interval starting in the future,\
    \ while a current interval is still active.\n\nThis logic must be evaluated every\
    \ time an insert or update is done on the table, making sure that none of the\
    \ rows resulting from the insert or update operation creates any overlaps. Since\
    \ this logic can’t go into a constraint, there is only one possibility—a trigger.\
    \ The trigger logic is fairly straightforward; instead of joining `EmployeeHistory`\
    \ to itself, the base table will be joined to the `inserted` virtual table. The\
    \ following T-SQL shows the trigger:\n\n```sql\nCREATE TRIGGER No_Overlaps\nON\
    \ EmploymentHistory\nFOR UPDATE, INSERT\nAS\nBEGIN\n    IF EXISTS\n    (\n   \
    \     SELECT *\n        FROM inserted i\n        JOIN EmploymentHistory E2 ON\n\
    \            i.Employee = E2.Employee\n            AND (\n                i.StartDate\
    \ < COALESCE(E2.EndDate, '99991231')\n                AND COALESCE(i.EndDate,\
    \ '99991231') > E2.StartDate)\n            AND i.StartDate <> E2.StartDate\n \
    \   )\n    BEGIN\n        RAISERROR('Overlapping interval inserted!', 16, 1);\n\
    \        ROLLBACK;\n    END\nEND;\nGO\n```\n\n## Monitoring Concurrent Processes\n\
    \nThe final examples for this section deal with a common scenario in which you\
    \ might want to investigate overlapping intervals: when monitoring performance\
    \ of concurrent processes in a database scenario.\n\nTo start setting up this\
    \ example, load SQL Server Profiler, start a new trace, and connect to a test\
    \ server. Uncheck all of the events except for `SQL:BatchCompleted` and leave\
    \ the default columns selected.\n\nBegin the trace and then load the RML command\
    \ prompt. Enter the following query:\n\n```bash\nostress -Q\"SELECT * FROM sys.databases;\"\
    \ -q –n100 –r100\n```\n\nThe preceding code will perform 100 iterations of a query\
    \ on 100 threads. The run should take approximately 1 minute and will produce\
    \ 10,000 Profiler events—one per invocation of the query. When the `ostress` run\
    \ has finished, return to Profiler and click `File` > `Save As Trace Table`, and\
    \ save the data to the database in a new table called `Overlap_Trace`.\n\nProfiler\
    \ trace tables include two `StartTime` and `EndTime` columns, both of which are\
    \ populated for many of the events—including `SQL:BatchCompleted` and `RPC:Completed`.\
    \ By treating these columns as an interval and working with some of the following\
    \ query patterns, you can manipulate the data to do things such as correlate the\
    \ number of concurrent queries with performance degradation of the database server.\n\
    \nThe first and most basic query is to find out which time intervals represented\
    \ in the table had the most overlaps. In other words, during the runtime of a\
    \ certain query, how many other queries were run?\n\nTo answer this question,\
    \ the intervals of every query in the table must be compared against the intervals\
    \ of every other query in the table. The following T-SQL does this using the previously\
    \ discussed overlap algorithm:\n\n```sql\nSELECT\n    O1.StartTime,\n    O1.EndTime,\n\
    \    COUNT(*)\nFROM Overlap_Trace O1\nJOIN Overlap_Trace O2 ON\n    (O1.StartTime\
    \ < O2.EndTime AND O1.EndTime > O2.StartTime)\n    AND O1.SPID <> O2.SPID\nGROUP\
    \ BY\n    O1.StartTime,\n    O1.EndTime\nORDER BY COUNT(*) DESC;\n```"
