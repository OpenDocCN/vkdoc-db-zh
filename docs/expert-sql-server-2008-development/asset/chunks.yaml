  trans: "\n# 第 12 章 树、层次结构与图\n\n**注意** 如果将 `tg_AtLeastOneRoot` 触发器与 `tg_Update` 触发器结合使用，当您需要交换根节点时会遇到问题。因为要满足\
    \ `tg_AtLeastOneRoot` 触发器的逻辑，更新操作必须以一个根节点就位结束，而这将需要多行更新。幸运的是，这种情况通常不常发生，但如果您确实需要这样做，请记住在进行更改前禁用其中一个触发器，并在操作完成后立即重新启用它，以确保在此期间其他调用者不会引入数据不一致。\n\
    \n## 删除节点\n\n得益于邻接表与物化路径的结合使用，删除节点无需额外逻辑。由于邻接表上的自引用约束，只能删除叶节点。叶节点没有下属，因此无需级联操作——该行将被删除，无需进一步逻辑。这是在同一个表中保持两种层次模型的主要好处之一——每种模型都继承了对方的约束，有助于确保更高的数据完整性。\n\
    \n## 约束层次结构\n\n前一节“约束层次结构”（讨论邻接表）中提到的所有逻辑仍然适用于物化路径。然而，使用物化路径时，检测环要容易得多，因此无需使用\
    \ `tg_NoCycles` 触发器。取而代之，应使用一个简单的检查约束，确保给定员工只在路径末尾出现一次：\n\n```sql\nALTER TABLE\
    \ Employee_Temp\nADD CONSTRAINT ck_NoCycles\nCHECK\n(\n    thePath NOT LIKE\n\
    \    '%' +\n    RIGHT(REPLICATE('0', 10) + CONVERT(varchar, EmployeeID), 10) +\n\
    \    '/%/' +\n    RIGHT(REPLICATE('0', 10) + CONVERT(varchar, EmployeeID), 10)\
    \ +\n    '/'\n);\nGO\n```\n\n**注意** 这里表达的逻辑与在“遍历图”一节中用于防止无限循环的逻辑有一个微妙的区别。在那一节中，路径中的节点没有左填充零，因此必须对第一个节点进行定界，以确保能检测到涉及它的环。这样做是为了防止在路径如\
    \ `123/456/3` 的情况下出现误报。在这里，左填充意味着无法将一个 ID 的一部分误解为另一个 ID，因此我们不必修改已建立的基本路径逻辑。\n\n\
    ## hierarchyid 数据类型\n\n在上一节中，我讨论了物化路径方法的一个局限性——即字符串编码使得处理深层层次结构变得困难。幸运的是，在 SQL\
    \ Server 2008 中引入了 `hierarchyid` 数据类型，它本质上使用序列化为 CLR 数据类型的物化路径来存储层次结构数据。虽然这并没有在之前描述的物化路径方法之上提供太多额外功能，但它确实使查询层次结构数据变得更加容易，正如我将在本节中演示的那样。\n\
    \n`hierarchyid` 数据类型附带了一组预定义的用于处理层次结构数据的方法，我们感兴趣的第一个方法是 `Parse()` 方法，它根据提供的物化路径字符串表示实例化一个新的\
    \ `hierarchyid` 数据项。对我们来说幸运的是，`Parse()` 方法期望的字符串格式与我们在上一节创建的 `thePath` 列中使用的格式完全相同——使用斜杠分隔路径中的每个节点。\n\
    \n以下代码清单创建并填充了一个 `hierarchyid` 值列，该列基于现有的物化路径表示 `Employee_Temp` 表中的行。\n\n```sql\n\
    ALTER TABLE Employee_Temp\nADD hierarchy hierarchyid;\n\nUPDATE Employee_Temp\n\
    SET hierarchy = hierarchyid::Parse (thePath);\n```\n\n### 查找下属\n\n填充好 `hierarchyid`\
    \ 列后，让我们通过执行与之前其他方法相同的一组常见查询来测试它。第一个需求是识别特定经理的所有下属行。为此，我们可以使用 `IsDescendantOf()`\
    \ 方法，如下面的查询所示：\n\n```sql\nSELECT * FROM Employee_Temp\nWHERE hierarchy.IsDescendantOf('/109/6/')\
    \ = 1;\n```\n\n前面的查询返回了所有隶属于市场经理（其层次路径为 `/109/6/`）的行，如下所示：\n\n| EmployeeID | ManagerID\
    \ | Title                  | thePath              | hierarchy (binary) |\n|------------|-----------|------------------------|----------------------|--------------------|\n\
    | 2          | 6         | Marketing Assistant    | /109/6/2/            | 0xE02EE568\
    \         |\n| 6          | 109       | Marketing Manager      | /109/6/     \
    \         | 0xE02EE5           |\n| 46         | 6         | Marketing Specialist\
    \   | /109/6/46/           | 0xE02EE5CBD0       |\n| 106        | 6         |\
    \ Marketing Specialist   | /109/6/106/          | 0xE02EE5E02D40     |\n| 119\
    \        | 6         | Marketing Specialist   | /109/6/119/          | 0xE02EE5E047C0\
    \     |\n| 203        | 6         | Marketing Specialist   | /109/6/203/     \
    \     | 0xE02EE5E0EDC0     |\n| 269        | 6         | Marketing Assistant \
    \   | /109/6/269/          | 0xE02EE5E26EC0     |\n| 271        | 6         |\
    \ Marketing Specialist   | /109/6/271/          | 0xE02EE5E26FC0     |\n| 272\
    \        | 6         | Marketing Assistant    | /109/6/272/          | 0xE02EE5E28440\
    \     |\n\n关于前面查询的结果，有几点需要注意：\n\n*   注意，提供给 `IsDescendantOf()` 方法的值，与所有 `hierarchyid`\
    \ 数据的字符串表示一样，既以斜杠开头也以斜杠结尾。这种语法风格对于所有先前在 SQL Server 或其他地方使用过 XQuery 功能的开发者来说可能很熟悉。\n\
    *   `hierarchyid` 值以其本机二进制格式在结果集中返回。要获取 `hierarchyid` 值的字符串表示形式，您必须调用 `ToString()`\
    \ 方法。\n*   请注意，尽管我们试图识别市场经理的下属，但市场经理本人也在结果中返回。这是 `hierarchyid` 类型的一个有趣特性：对于任何给定节点\
    \ `x`，`x.IsDescendantOf(x) = 1`。这是设计使然，在某些情况下很有用，但可能不那么直观。\n*   `IsDescendantOf()`\
    \ 方法对给定节点的所有后代都返回 `true`，而不仅仅是直接子节点，还包括孙节点、曾孙节点等。\n\n为了将结果限制为仅返回节点的*直接*后代（并将节点本身从结果中排除），我们可以利用\
    \ `GetLevel()` 方法，该方法返回一个整数，表示节点在层次结构中的“级别”。根节点为级别 0，在根节点之下的层次结构的每一级，该值增加一。因此，给定节点的直接下属级别总是比其父级大一。以下代码演示了如何将结果限制为仅包含市场经理的直接下属：\n\
    \n```sql\nDECLARE @Parent hierarchyid = hierarchyid::Parse('/109/6/');\n\nSELECT\
    \ * FROM Employee_Temp\nWHERE hierarchy.IsDescendantOf(@Parent) = 1\nAND hierarchy.GetLevel()\
    \ = @Parent.GetLevel() + 1;\n```\n\n这是一个非常灵活的结构，可用于指定在给定节点下遍历多少级后代——例如，要返回子节点和孙节点，您可以包括所有两个级别之差小于或等于\
    \ 2 的节点。\n\n### 在层次结构中向上导航\n\n由于 `hierarchyid` 数据类型本质上只是一个序列化为 CLR 数据类型的物化路径，每个单独的\
    \ `hierarchyid` 值已经包含了返回根节点的完整路径。为了以可读格式显示此路径，我们只需调用 `ToString()` 方法。例如，考虑从 CEO\
    \ 到生产技术员（`EmployeeID` 为 100）的路径：\n\n```sql\nSELECT\n    EmployeeID,\n    ManagerID,\n\
    \    Title,\n    hierarchy.ToString() AS hierarchyPath\nFROM Employee_Temp\nWHERE\
    \ EmployeeID = 100;\n```\n\n此查询的结果如下：\n\n| EmployeeID | ManagerID | Title    \
    \                  | hierarchyPath         |\n|------------|-----------|----------------------------|-----------------------|\n\
    | 100        | 143       | Production Technician - WC20 | /109/148/21/143/100/\
    \ |\n"
- fmt: 'Notice how the path obtained from the `hierarchyid` `ToString()` method is
    exactly the same as the path we created in the `thePath` column earlier. Fortunately
    though, navigating up through this hierarchy doesn’t involve any of the string
    manipulation we had to perform previously—instead we can use the `GetAncestor()`
    method, which provides similar functionality to `IsDescendant()` but from the
    opposite point of view. Rather than returning a Boolean response indicating whether
    a given node is descended from another node, the `GetAncestor()` method is invoked
    on a child element and used to return a `hierarchyid` node representing an ancestor
    of that child. The `GetAncestor()` method can not only return the direct parent
    of a node—it accepts an argument to determine how many levels of hierarchy should
    lie between the given node and the ancestor.


    To demonstrate, the following code listing uses that `GetAncestor()` method with
    the argument `1` to determine the immediate parent of each node in the hierarchy
    column. This value is then used to return only those nodes that report directly
    to the Marketing Manager, `EmployeeID 6`:


    ```sql

    DECLARE @Parent hierarchyid;


    SELECT @Parent = hierarchy

    FROM Employee_Temp

    WHERE EmployeeID = 6;


    SELECT * FROM Employee_Temp

    WHERE hierarchy.GetAncestor(1) = @Parent;

    ```


    ## Inserting Nodes


    In order to insert a new node, we need to calculate the appropriate `hierarchyid`
    value representing the path to that node. This can be done using the `GetDescendant()`
    method on the node that is to become the parent of the newly inserted node. `GetDescendant()`
    accepts two arguments that determine the lower and upper values of the range in
    which the allocated `hierarchyid` node will lie. To demonstrate this method, suppose
    that the Shipping and Receiving Supervisor, `EmployeeID 85`, needs to hire an
    office administrator. By providing `null` values for both arguments, the following
    code uses the `GetDescendant()` method to allocate an arbitrary `hierarchyid`
    value for the new employee:


    ```sql

    DECLARE @Parent hierarchyid;


    SELECT @Parent = hierarchy

    FROM Employee_Temp

    WHERE EmployeeID = 85;


    SELECT @Parent.GetDescendant(null, null).ToString();

    ```


    The result, `/109/148/21/85/1/`, is guaranteed to be a new node that is a direct
    descendant of the supplied parent node, but the actual identity of the new node
    may vary. In some situations, this may cause problems. For example, consider instead
    what would happen if the Production Supervisor, `EmployeeID 16`, were to hire
    a new member of staff. To assign a hierarchy node for the new employee using the
    preceding pattern, we might initially try something like this:


    ```sql

    DECLARE @Parent hierarchyid;


    SELECT @Parent = hierarchy

    FROM Employee_Temp

    WHERE EmployeeID = 16;


    SELECT @Parent.GetDescendant(null, null).ToString();

    ```


    The result returned, `/109/148/21/16/1/`, is a valid node that reports to the
    Production Supervisor, but the problem is that this node already exists in the
    hierarchy. It is assigned to `EmployeeID 1`, who is a technician reporting to
    this production supervisor. In order to avoid such cases, we can supply a parameter
    value to the `GetDescendant()` method representing the minimum value that the
    newly created child node must be greater than. To do this, we will find out the
    maximum currently assigned child node for the chosen parent, as follows:


    ```sql

    DECLARE @Parent hierarchyid;


    SELECT @Parent = hierarchy

    FROM Employee_Temp

    WHERE EmployeeID = 16;


    DECLARE @MaxChild hierarchyid;


    SELECT @MaxChild = MAX(hierarchy)

    FROM Employee_Temp

    WHERE hierarchy.IsDescendantOf(@Parent) = 1;


    SELECT @Parent.GetDescendant(@MaxChild, null).ToString();

    ```


    The result, `/109/148/21/16/248/`, is now guaranteed to be a unique node in the
    hierarchy. The second parameter that can be supplied to `GetDescendant()` represents
    the maximum node value that the newly created node must lie before. In this case,
    I’ve left it `null` as I don’t want to enforce a maximum.


    Of course, in the current model, the value of each node in the materialized path
    is based on the `EmployeeID` of the associated employee. So long as the `EmployeeID`
    field remains unique, you could continue to model all individual node values based
    on that and not have to worry about the possibility of creating duplicate `hierarchyid`
    values. However, there are many other scenarios in which such an identity value
    is not available, in which case, the `GetDescendantOf()` method becomes a very
    useful way to allocate values for new child nodes. If you wanted to retain both
    the adjacency list modeled on `EmployeeID` and the `hierarchyid` model within
    the `Employee_Temp` table, you would of course need to modify the `tg_Insert`
    trigger created previously to automatically update the `hierarchy` column based
    on the `EmployeeID` of the inserted row.


    ## Relocating Subtrees


    To relocate a `hierarchyid` node, we use the `GetReparentedValue()` method. Note
    that this method doesn’t actually alter a `hierachyid` value—rather, it returns
    a node representing the new path to a node if it were to be reparented to the
    supplied new parent node. To move the node, you must then update the `hierarchyid`
    value to be equal to this result.


    To demonstrate this in action, consider what would happen if we were to remove
    one of the production supervisors, `EmployeeID 64`, from the hierarchy, and relocate
    all of their direct employees to report to one of the alternative supervisors,
    `EmployeeID 74`.


    To start with, we need to identify the nodes that represent both the old parent
    that nodes are moving from, and the new parent to which they will be reporting,
    as follows:


    ```sql

    DECLARE @FromParent hierarchyid;


    SELECT @FromParent = hierarchy

    FROM Employee_Temp

    WHERE EmployeeID = 64;


    DECLARE @ToParent hierarchyid;


    SELECT @ToParent = hierarchy

    FROM Employee_Temp

    WHERE EmployeeID = 74;

    ```


    Having identified the two parents between which nodes are to be moved, we can
    then update all those descendants of the old parent using the `GetReparentedValue()`
    method as follows:


    ```sql

    UPDATE Employee_Temp

    SET hierarchy = hierarchy.GetReparentedValue(@FromParent, @ToParent)

    WHERE

    hierarchy.IsDescendantOf(@FromParent) = 1

    AND EmployeeID <> 64;

    ```


    This query uses the `IsDescendantOf()` method to identify all those rows that
    report to the old parent, `EmployeeID 64`, and updates them to report to the new
    parent. The final condition is required to prevent the original parent node being
    moved (remember that, based on the `IsDescendantOf()` method, a node is a descendant
    of itself).


    As with row inserts, if you wanted to maintain this solution in a production environment
    alongside the adjacency list, you would need to modify the `tg_Update` procedure
    to update the `hierarchy` column when nodes were moved.


    ## Deleting Nodes


    Hierarchies modeled using the `hierarchyid` datatype do not enforce any kind of
    inherent referential integrity. As such, any node may be removed from the hierarchy,
    potentially leading to orphan nodes if the node removed is a nonleaf node. Fortunately,
    as with the string materialized path described previously, in this example we
    are using the `hierarchyid` datatype in conjunction with the constraints provided
    by the existing adjacency list on the `Employee_Temp` table. These constraints
    mean that only leaf nodes can be deleted, which reduces the chances of orphans
    or multiple root nodes being introduced into the structure of the hierarchy.


    ## Constraining the Hierarchy


    Since the `hierarchyid` datatype is essentially just a wrapper around a materialized
    path construct, the same rules apply for how to constrain the hierarchy in order
    to prevent cycles or forests. A further consideration is how best to index columns
    of `hierarchyid` data. Placing a unique index on the `hierarchy` column can prevent
    duplicate entries, as well as improve query performance against the hierarchy,
    but you should devote a little time to consider how hierarchies are ordered in
    a single index.'
