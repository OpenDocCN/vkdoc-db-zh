    \n## 查找存储过程的证书签名\n\n同样重要的是要知道如何找出哪些证书（以及因此哪些用户）与给定的存储过程相关联。可以查询 SQL Server 的目录视图来获取此信息，但要获得正确的查询并不明显。以下查询可以作为一个起点，它返回所有存储过程、对其进行签名的证书以及与证书关联的用户：\n\
    \n```sql\nSELECT\n    OBJECT_NAME(cp.major_id) AS signed_module,\n    c.name AS\
    \ certificate_name,\n    dp.name AS user_name\nFROM sys.crypt_properties AS cp\n\
    INNER JOIN sys.certificates AS c ON c.thumbprint = cp.thumbprint\nINNER JOIN sys.database_principals\
    \ dp\n    ON SUBSTRING(dp.sid, 13, 32) = c.thumbprint;\n```\n\n这个查询有些难以理解，因此值得解释一下。`sys.crypt_properties`\
    \ 视图包含有关哪些模块已由证书签名的信息。每个证书都有一个 32 字节的加密哈希值，即其*指纹*，用于通过 `sys.certificates` 视图找出是哪个证书对模块进行了签名。最后，每个数据库主体都有一个安全标识符，如果主体是基于证书创建的，则其最后\
    \ 32 字节就是该证书的指纹。\n\n执行此查询时，结果将显示刚刚创建的已签名模块，如下所示：\n\n```\nsigned_module    certificate_name\
    \    user_name\nSelectGregsData  Greg_Certificate    Greg\n```\n\n# 分配服务器级权限\n\
    \n前面的示例仅展示了如何使用证书分配数据库级权限。对存储过程进行签名也可用于传播服务器级权限，例如 `BULK INSERT` 或 `ALTER`。"
- fmt: "# SQL Server 证书、权限传播与加密\n\n## 权限传播：通过证书创建代理登录\n\n在`DATABASE`中进行权限传播需要先从证书创建代理登录，然后使用同一个证书创建数据库用户。为此，证书在创建后必须备份，并在要创建用户的数据库中还原。一旦数据库用户创建完毕，应用权限的流程就与传播数据库级别权限时相同。\n\
    \n首先，在`master`数据库中创建证书。与之前的示例不同，此证书必须用密码加密，而不是用数据库主密钥加密，以确保其私钥在从数据库中移除时保持加密状态。证书创建完成后，可以按如下方式用它来创建代理登录：\n\
    \n```sql\nUSE MASTER;\nGO\n\nCREATE CERTIFICATE alter_db_certificate\nENCRYPTION\
    \ BY PASSWORD = 'stR()Ng_PaSSWoRDs are?BeST!'\nWITH SUBJECT = 'ALTER DATABASE\
    \ permission';\nGO\n\nCREATE LOGIN alter_db_login FROM CERTIFICATE alter_db_certificate;\n\
    GO\n```\n\n顾名思义，此登录将用于传播`ALTER DATABASE`权限。下一步是向该登录授予适当的权限：\n\n```sql\nGRANT ALTER\
    \ ANY DATABASE TO alter_db_login;\nGO\n```\n\n此时，您必须将证书备份到文件。然后可以从文件将证书还原到您选择的数据库中，并从那里创建一个数据库用户，该用户将拥有与服务器登录相同的权限，因为它是使用同一个证书创建的。\n\
    \n```sql\nBACKUP CERTIFICATE alter_db_certificate\nTO FILE = 'C:\\alter_db.cer'\n\
    WITH PRIVATE KEY\n(\n    FILE = 'C:\\alter_db.pvk',\n    ENCRYPTION BY PASSWORD\
    \ = 'YeTan0tHeR$tRoNGpaSSWoRd?',\n    DECRYPTION BY PASSWORD = 'stR()Ng_PaSSWoRDs\
    \ are?BeST!'\n);\nGO\n```\n\n备份后，可以将证书还原到任何用户数据库。出于本示例的目的，我们将专门为此创建一个新的数据库：\n\n\
    ```sql\nCREATE DATABASE alter_db_example;\nGO\n\nUSE alter_db_example;\nGO\n\n\
    CREATE CERTIFICATE alter_db_certificate\nFROM FILE = 'C:\\alter_db.cer'\nWITH\
    \ PRIVATE KEY\n(\n    FILE = 'C:\\alter_db.pvk',\n    DECRYPTION BY PASSWORD =\
    \ 'YeTan0tHeR$tRoNGpaSSWoRd?',\n    ENCRYPTION BY PASSWORD = 'stR()Ng_PaSSWoRDs\
    \ are?BeST!'\n);\nGO\n```\n\n> **注意** 有关`CREATE CERTIFICATE`语句的更多信息，请参见第6章。\n\n\
    值得注意的是，此时证书的物理文件可能应该被删除或备份到安全的存储库。尽管私钥是用密码加密的，但坚定的攻击者肯定有可能通过暴力破解来破解它。而且由于证书被用来授予`ALTER\
    \ DATABASE`权限，这样的攻击最终可能会造成一些损害——所以安全地处理这些文件。\n\n在数据库中创建证书后，其余过程与之前相同。创建一个需要权限提升的存储过程（在本例中，该存储过程会将数据库设置为`MULTI_USER`访问模式），基于证书创建用户，并使用证书对存储过程进行签名：\n\
    \n```sql\nCREATE PROCEDURE SetMultiUser\nAS\nBEGIN\n    ALTER DATABASE alter_db_example\n\
    \    SET MULTI_USER;\nEND;\nGO\n\nCREATE USER alter_db_user\nFOR CERTIFICATE alter_db_certificate;\n\
    GO\n\nADD SIGNATURE TO SetMultiUser\nBY CERTIFICATE alter_db_certificate\nWITH\
    \ PASSWORD = 'stR()Ng_PaSSWoRDs are?BeST!';\nGO\n```\n\n现在可以测试权限了。为了使服务器级别权限的传播有效，执行存储过程的用户必须与有效的服务器登录相关联，并且必须模拟服务器级别的登录，而不是数据库用户。因此，这次`CREATE\
    \ USER WITHOUT LOGIN`将不起作用：\n\n```sql\nCREATE LOGIN test_alter WITH PASSWORD =\
    \ 'iWanT2ALTER!!';\nGO\n\nCREATE USER test_alter FOR LOGIN test_alter;\nGO\n\n\
    GRANT EXECUTE ON SetMultiUser TO test_alter;\nGO\n```\n\n最后，可以模拟`test_alter`登录并执行存储过程：\n\
    \n```sql\nEXECUTE AS LOGIN='test_alter';\nGO\n\nEXEC SetMultiUser;\nGO\n```\n\n\
    命令成功完成，表明`test_alter`登录能够行使通过存储过程授予的`ALTER DATABASE`权限。这个例子显然相当简单，但它应该可以作为一个基本模板，在您需要向数据库用户提供服务器级别权限提升时，可以根据需要进行调整。\n\
    \n## 总结\n\nSQL Server 的模拟功能允许开发人员创建安全、细粒度的授权方案。\n\n通过保持授权分层并遵循最小权限原则，可以使数据库中的资源更加安全，要求攻击者做更多工作才能检索他们本不应访问的数据。存储过程层可用于控制安全性，根据高权限代理用户系统委派必要的权限。\n\
    \n当需要将数据库逻辑上分解为范围相似的对象组时，应使用架构。架构还可用于简化权限分配任务，因为随着架构中对象的变化，可能不需要随时间维护权限。\n\n`EXECUTE\
    \ AS`子句可能是基于存储过程传播权限的一种非常有用且简单的方法，但证书提供了更大的灵活性和控制力。也就是说，您应该尽量保持系统简单易懂，以避免造成可维护性噩梦。\n\
    \n最后一点：在安全方面不要过度。本章介绍的许多技术对于大多数应用程序可能*并非*必要。如果您的应用程序不存储敏感数据，请不要过度创建复杂的权限提升方案；它们只会让您的应用程序更难处理。\n\
    \n# 加密\n\n加密是将数据编码的过程，其方式使得除了拥有适当机密知识（**密钥**）以再次解密数据的人之外，任何人都无法使用。SQL Server 2008\
    \ 提供的加密功能是强大的特性，您应始终考虑将其作为整体安全策略的一部分。如果所有其他安全机制都失败，加密可以被证明是保护机密数据的非常有效的最后一道防线。\n\
    \n然而，不应轻率地考虑加密；这是一个复杂的主题，成功实施加密几乎总是需要在应用程序的架构和设计阶段进行一定程度的考虑。加密数据的物理行为相对简单，但如果没有适当的程序来安全管理对数据的访问以及解密它所需的密钥，任何实施加密的尝试都是徒劳的。未能正确实施加密实际上可能弊大于利，因为它会给您带来数据安全的错误感觉，而实际上数据正暴露给潜在的黑客。\n\
    \n此外，加密提供的额外保护伴随着相关的性能成本。\n\n通常，数据库必须做更多的工作来加密写入的数据，并在需要该数据时再次解密。这意味着，特别是在大规模环境中，必须仔细关注以确保加密不会对应用程序性能产生不利影响。"
  raw: 'DATABASE. Doing so requires creation of a proxy login from a certificate,
    followed by creation of a database user using the same certificate. To accomplish
    this, the certificate must be backed up after being created, and restored in the
    database in which you are creating the user. Once the database user is created,
    the procedure to apply permissions is the same as when propagating database-level


    permissions.


    To begin with, create a certificate in the master database. Unlike previous examples,
    this certificate must be encrypted by a password rather than by the database master
    key, in order to ensure its private key remains encrypted when removed from the
    database. Once the certificate has been created, you can use it to create a proxy
    login as follows:


    USE MASTER;


    GO


    CREATE CERTIFICATE alter_db_certificate


    ENCRYPTION BY PASSWORD = ''stR()Ng_PaSSWoRDs are?BeST!''


    WITH SUBJECT = ''ALTER DATABASE permission'';


    GO


    CREATE LOGIN alter_db_login FROM CERTIFICATE alter_db_certificate;


    GO


    This login, in case you can’t tell from the name, will be used to propagate ALTER
    DATABASE


    permissions. The next step is to grant the appropriate permissions to the login:


    GRANT ALTER ANY DATABASE TO alter_db_login;


    GO


    At this point, you must back up the certificate to a file. The certificate can
    then be restored from the file into the database of your choosing, and from there
    it can be used to create a database user that will have the same permissions as
    the server login, by virtue of having been created using the same certificate.


    BACKUP CERTIFICATE alter_db_certificate


    TO FILE = ''C:\alter_db.cer''


    WITH PRIVATE KEY


    (


    FILE = ''C:\alter_db.pvk'',


    CHAPTER 5 „ PRIVILEGE AND AUTHORIZATION


    ENCRYPTION BY PASSWORD = ''YeTan0tHeR$tRoNGpaSSWoRd?'',


    DECRYPTION BY PASSWORD = ''stR()Ng_PaSSWoRDs are?BeST!''


    );


    GO


    Once backed up, the certificate can be restored to any user database. For the
    purpose of this example, we’ll create a new database specifically for this purpose:


    CREATE DATABASE alter_db_example;


    GO


    USE alter_db_example;


    GO


    CREATE CERTIFICATE alter_db_certificate


    FROM FILE = ''C:\alter_db.cer''


    WITH PRIVATE KEY


    (


    FILE = ''C:\alter_db.pvk'',


    DECRYPTION BY PASSWORD = ''YeTan0tHeR$tRoNGpaSSWoRd?'',


    ENCRYPTION BY PASSWORD = ''stR()Ng_PaSSWoRDs are?BeST!''


    );


    GO


    „ **Note** For more information on the CREATE CERTIFICATE statement, see Chapter
    6.


    It is worth noting that at this point, the certificate’s physical file should
    probably be either deleted or backed up to a safe storage repository. Although
    the private key is encrypted with the password, it would certainly be possible
    for a dedicated attacker to crack it via brute force. And since the certificate
    is being used to grant ALTER DATABASE permissions, such an attack could potentially
    end in some damage being done—so play it safe with these files.


    After the certificate has been created in the database, the rest of the process
    is just as before. Create a stored procedure that requires the privilege escalation
    (in this case, the stored procedure will set the database to MULTI_USER access
    mode), create a user based on the certificate, and sign the stored procedure with
    the certificate:


    CREATE PROCEDURE SetMultiUser


    AS


    BEGIN


    ALTER DATABASE alter_db_example


    SET MULTI_USER;


    END;


    GO


    CREATE USER alter_db_user


    FOR CERTIFICATE alter_db_certificate;


    GO


    ADD SIGNATURE TO SetMultiUser


    CHAPTER 5 „ PRIVILEGE AND AUTHORIZATION


    BY CERTIFICATE alter_db_certificate


    WITH PASSWORD = ''stR()Ng_PaSSWoRDs are?BeST!'';


    GO


    The permissions can now be tested. In order for propagation of server-level permissions
    to work, the user executing the stored procedure must be associated with a valid
    server login, and it is the server-level login that must be impersonated rather
    than the user. So this time, CREATE USER WITHOUT LOGIN will not suffice:


    CREATE LOGIN test_alter WITH PASSWORD = ''iWanT2ALTER!!'';


    GO


    CREATE USER test_alter FOR LOGIN test_alter;


    GO


    GRANT EXECUTE ON SetMultiUser TO test_alter;


    GO


    Finally, the test_alter login can be impersonated, and the stored procedure executed:


    EXECUTE AS LOGIN=''test_alter'';


    GO


    EXEC SetMultiUser;


    GO


    The command completes successfully, demonstrating that the test_alter login had
    been able to exercise the ALTER DATABASE permissions granted via the stored procedure.
    This example was obviously quite simplistic, but it should serve as a basic template
    that you can adapt as necessary when you need to provide escalation of server-level
    privilege to database users.


    Summary


    SQL Server’s impersonation features allow developers to create secure, granular
    authorization schemes.


    By keeping authorization layered and following a least-privilege mentality, resources
    in the database can be made more secure, requiring attackers to do more work in
    order to retrieve data they are not supposed to access. A stored procedure layer
    can be used to control security, delegating permissions as necessary based on
    a system of higher-privileged proxy users.


    Schemas should be used when it is necessary to logically break apart a database
    into groups of objects that are similar in scope. Schemas can also be used to
    make assignment of permissions an easier task, as permissions may not have to
    be maintained over time as the objects in the schema change.


    The EXECUTE AS clause can be a very useful and simple way of propagating permissions
    based on stored procedures, but certificates provide much more flexibility and
    control. That said, you should try to keep systems as simple and understandable
    as possible, in order to avoid creating maintainability nightmares.


    A final note along those lines: Try not to go overboard when it comes to security.
    Many of the techniques laid out in this chapter are probably *not* necessary for
    the majority of applications. If your application does not store sensitive data,
    try to not go too far in creating complex privilege escalation schemes; they will
    only make your application more difficult to deal with.


    **C H A P T E R 6**


    „ „ „


    **Encryption**


    Encryption is the process of encoding data in such a way as to render it unusable
    to anyone except those in possession of the appropriate secret knowledge (the
    **key**) required to decrypt that data again. The encryption capabilities provided
    by SQL Server 2008 are powerful features, and you should always consider using
    them as part of your overall security strategy. If all other security mechanisms
    fail, encryption can prove to be a very effective last line of defense in protecting
    confidential data.


    Encryption should not be considered lightly, however; it is a complex subject,
    and the successful implementation of encryption almost invariably requires some
    degree of consideration at the


    architecture and design phase of an application. The physical act of encrypting
    data is relatively straightforward, but without the appropriate procedures in
    place to securely manage access to that data, and the keys required to decrypt
    it, any attempt to implement encryption is worthless. A failure to implement encryption
    properly can actually do more harm than good, as it leads you into a false sense
    of security believing that your data is safe, when in fact it is exposed to potential
    hackers.


    Furthermore, the additional protection afforded by encryption has an associated
    performance cost.


    Typically, the database has to do more work to encrypt written data, and to decrypt
    it again when that data is required. This means that, particularly in large-scale
    environments, careful attention must be paid to ensure that encryption does not
    adversely affect application performance.'
