    \            CERT_ID('CreditCard_Cert'),\n            N'#Ch0o53_@_5Tr0nG_P455w0rD#',\n\
    \            CreditCardNumber_Sym) AS nvarchar(32)) AS CreditCardNumber_Decrypted\n\
    FROM CreditCards\nWHERE CreditCardNumber_HMAC = @HMACToSearch\nAND\n    CAST(\n\
    \        DECRYPTBYKEYAUTOCERT(\n            CERT_ID('CreditCard_Cert'),\n    \
    \        N'#Ch0o53_@_5Tr0nG_P455w0rD#',\n            CreditCardNumber_Sym) AS\
    \ nvarchar(32)) = @CreditCardNumberToSearch;\nGO\n```\n\nThis query generates\
    \ the HMAC hash of the supplied search value and then uses the `idxCreditCardNumberHMAC`\
    \ index to search for this value in the `CreditCardNumber_HMAC` column. Having\
    \ found a matching row, it then decrypts the value contained in the `CreditCardNumber_Sym`\
    \ column to make sure that it matches the original supplied search value (to prevent\
    \ the risk of hash collisions, where an incorrect result is returned because it\
    \ happened to share the same hash as our search string).\n\nThe execution plan\
    \ shown in Figure 6-8 illustrates that the entire query can be satisfied by a\
    \ single index seek.\n\n*Figure 6-8. Performing a clustered index seek on an HMAC\
    \ hash column*\n\nThe performance counters contained in `sys.dm_exec_query_stats`\
    \ reveal that the query is substantially more efficient than direct querying of\
    \ the `CreditCardNumber_Sym` column, taking only 253ms of CPU time and requiring\
    \ nine logical reads.\n\n### Wildcard Searches Using HMAC Substrings\n\nThere\
    \ are many occasions where a database needs to support queries that require an\
    \ element of flexibility in the search criteria. This applies to searches of encrypted\
    \ data just as with any other type of data. For example, perhaps you need to search\
    \ for all customers whose credit cards expire in a certain month, or perform a\
    \ search based on the last four digits of their social security number.\n\nThe\
    \ HMAC solution just proposed cannot be used in these cases, since the HMAC hash\
    \ values are unique to an exact value. The hash generated from a partial string\
    \ will be completely different from the hash generated from a complete string,\
    \ as demonstrated here:\n\n```sql\nSELECT\n    HASHBYTES('SHA1', 'The quick brown\
    \ fox jumped over the lazy dog')\nUNION SELECT\n    HASHBYTES('SHA1', 'The quick\
