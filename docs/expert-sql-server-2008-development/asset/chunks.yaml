  trans: "\n这是一种处理乐观并发控制的简单方法，但它存在几个问题。首先，系统中的每个更新例程都必须遵守检查版本的要求。与上一节描述的悲观方案一样，即使只有一个有问题的模块也会导致整个系统崩溃——这可不是好事。其次，这种设置在为用户提供良好体验方面留下的选择余地不大。遇到冲突错误却没有任何修复手段，这并不特别有趣——如果可能，我倾向于返回足够的数据，以便用户可以执行合并（当然，前提是应用程序提供了此功能）。\n\
    \n## 为应用并发设计系统\n\n解决这两个问题的方案始于对版本列数据类型的更改。由于使用 `rowversion` 类型的列除了 SQL Server\
    \ 外无法被任何东西更新，这使得系统难以控制。因此，我的第一个建议是切换到 `uniqueidentifier` 或 `datetime`。以下是更新后的\
    \ `CustomerNames` 表定义，它使用了一个 `uniqueidentifier` 列：\n\n```sql\n-- 重新创建 CustomerNames\
    \ 表\nCREATE TABLE CustomerNames\n(\n    CustomerId int NOT NULL PRIMARY KEY,\n\
    \    CustomerName varchar(50) NOT NULL,\n    Version uniqueidentifier NOT NULL\
    \ DEFAULT (NEWID())\n);\nGO\n\n-- 填充新表\nINSERT INTO CustomerNames\n(\n    CustomerId,\n\
    \    CustomerName\n)\nVALUES\n    (123, 'Mickey Mouse'),\n    (456, 'Minnie Mouse');\n\
    GO\n```\n\n为了解决例程不遵守规则的潜在问题，可以使用触发器来强制执行乐观方案。这是通过要求对表的任何更新都必须包含对 `Version` 列的更新来实现的，该要求通过在触发器中检查\
    \ `UPDATE()` 函数来强制执行。该列应设置为读取数据时返回的任何版本值。这样，触发器就可以将 `inserted` 表中每行更新后的值与 `deleted`\
    \ 表中的值进行比较。如果两者不匹配，则存在版本冲突。最后，触发器可以为更新的行设置一个新的版本值，从而将其标记为已被更改，供任何读取过数据的人知晓。以下是该触发器的定义：\n\
    \n```sql\nCREATE TRIGGER tg_UpdateCustomerNames\nON CustomerNames\nFOR UPDATE\
    \ AS\nBEGIN\n    SET NOCOUNT ON;\n    IF NOT UPDATE(Version)\n    BEGIN\n    \
    \    RAISERROR('Updating the Version column is required', 16, 1);\n        ROLLBACK;\n\
    \    END\n    IF EXISTS\n    (\n        SELECT *\n        FROM inserted i\n  \
    \      JOIN deleted d ON i.CustomerId = d.CustomerId\n        WHERE i.Version\
    \ <> d.Version\n    )\n    BEGIN\n        RAISERROR('Version conflict encountered',\
    \ 16, 1);\n        ROLLBACK;\n    END\n    ELSE\n        --为更新的行设置新版本\n      \
    \  UPDATE CustomerNames\n        SET Version = NEWID()\n        WHERE\n      \
    \      CustomerId IN\n            (\n                SELECT CustomerId\n     \
    \           FROM inserted\n            );\nEND;\nGO\n```\n\n这个触发器解决了乐观模型中的版本控制问题，但它采取的方法相当生硬——遇到版本冲突时只是引发错误并回滚事务。\n\
    \n也许更好地做法是扩展此触发器，以帮助为用户提供更多选择。这是我发现 SQL Server 的 XML 功能有用的一个地方。要创建一个类似于 ADO.NET\
    \ XML DiffGram 的输出文档，请按以下代码清单中高亮显示的方式修改触发器的 `IF` 块：\n\n```sql\nALTER TRIGGER tg_UpdateCustomerNames\n\
    ON CustomerNames\nFOR UPDATE AS\nBEGIN\n    SET NOCOUNT ON;\n    IF NOT UPDATE(Version)\n\
    \    BEGIN\n        RAISERROR('Updating the Version column is required', 16, 1);\n\
    \        ROLLBACK;\n    END\n    IF EXISTS\n    (\n        SELECT *\n        FROM\
    \ inserted i\n        JOIN deleted d ON i.CustomerId = d.CustomerId\n        WHERE\
    \ i.Version <> d.Version\n    )\n    BEGIN\n        SELECT\n            (\n  \
    \              SELECT\n                    ROW_NUMBER() OVER (ORDER BY CustomerId)\
    \ AS [@row_number],\n                    *\n                FROM inserted\n  \
    \              FOR XML PATH('customer_name'), TYPE\n            ) new_values,\n\
    \            (\n                SELECT\n                    ROW_NUMBER() OVER\
    \ (ORDER BY CustomerId) AS [@row_number],\n                    *\n           \
    \     FROM deleted\n                FOR XML PATH('customer_name'), TYPE\n    \
    \        ) old_values\n        FOR XML PATH('customer_name_rows');\n    END\n\
    \    ELSE\n        --为更新的行设置新版本\n        UPDATE CustomerNames\n```\n"
- fmt: "# CHAPTER „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY\n\n```sql\nSET Version\
    \ = NEWID()\nWHERE\nCustomerId IN\n(\n    SELECT CustomerId\n    FROM inserted\n\
    );\nEND;\nGO\n```\n\nAfter making this modification, let’s try updating the table\
    \ with an invalid version value, as shown in the following T-SQL:\n\n```sql\n\
    DECLARE\n    @CustomerId int = 123,\n    @Version uniqueidentifier;\n\n-- Retrieve\
    \ the current version value\nSELECT @Version = Version\nFROM CustomerNames\nWHERE\
    \ CustomerId = @CustomerId;\n\n-- Do something with the retrieved data here\n\n\
    -- Meanwhile, something else updates the version number\nUPDATE CustomerNames\n\
    SET CustomerName = 'Popeye',\n    Version = @Version\nWHERE CustomerId = @CustomerId;\n\
    \n-- Now try to write the changes back to the table\nUPDATE CustomerNames\nSET\
    \ CustomerName = 'Top Cat',\n    Version = @Version\nWHERE CustomerId = @CustomerId;\n\
    GO\n```\n\nExecuting this code will produce output similar to that shown here:\n\
    \n```xml\n<customer_name_rows>\n    <new_values>\n        <customer_name row_number=\"\
    1\">\n            <CustomerId>123</CustomerId>\n            <CustomerName>Top\
    \ Cat</CustomerName>\n            <Version>10E83AAD-B966-4250-A66D-FE0085706F9E</Version>\n\
    \        </customer_name>\n    </new_values>\n    <old_values>\n        <customer_name\
    \ row_number=\"1\">\n            <CustomerId>123</CustomerId>\n            <CustomerName>Popeye</CustomerName>\n\
    \            <Version>DDEDE0D4-44FE-42EA-B605-7431098D8A24</Version>\n       \
    \ </customer_name>\n    </old_values>\n</customer_name_rows>\n```\n\n# CHAPTER\
    \ 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY\n\nAlthough this doesn’t exactly\
    \ write the merge routine for you, I find that the XML format is very easy to\
    \ work with when it comes to doing these kinds of operations. Since the document\
    \ contains the newer version value that caused the conflict, you can let the end\
    \ user perform a merge or choose to override the other user’s change without having\
    \ to go back to the database to get the new rows a second time.\n\n## A Note on\
    \ Triggers and Performance\n\nThroughout the previous two sections, update triggers\
    \ were employed as a mechanism by which to control workflows around locking. Triggers\
    \ are a great tool because the caller has no control over them—they will fire\
    \ on any update to the table, regardless of whether it was made in a stored procedure\
    \ or an ad hoc batch, and regardless of whether the caller has bothered to follow\
    \ the locking rules. Unfortunately, triggers also cause problems: most notably,\
    \ they can have an acute effect on performance.\n\nThe major performance problems\
    \ caused by triggers generally result from lengthened transactions and the resultant\
    \ blocking that can occur when low-granularity locks are held for a long period.\
    \ In the case of these triggers, that’s not much of an issue since they use the\
    \ same rows that were already locked anyway by the updates themselves. However,\
    \ these triggers will slow down updates a bit. In SQL Server 2008, the `inserted`\
    \ and `deleted` tables are actually hidden temporary tables; the population of\
    \ these tables does not come for free—the data must be transferred into `TempDB`.\
    \ In addition, each of these triggers incurs additional index operations against\
    \ the base table that are not necessary for a simple update.\n\nIn my testing,\
    \ I’ve found that these triggers slow down updates by a factor of 2. However,\
    \ that’s generally the difference between a few milliseconds and a few more milliseconds—certainly\
    \ not a big deal, especially given the value that they bring to the application.\
    \ It’s worth testing to make sure that these triggers don’t cause severe performance\
    \ issues for your application, but at the same time remember that nothing is free—and\
    \ if it’s a question of data integrity vs. performance, I personally would always\
    \ choose the former.\n\n## Embracing Conflict: Multivalue Concurrency Control\n\
    \nWhile optimistic and pessimistic concurrency are focused on enabling long-running\
    \ business processes to work together without mangling data that happens to be\
    \ getting modified concurrently, MVCC is based around the idea that performance\
    \ is king."
