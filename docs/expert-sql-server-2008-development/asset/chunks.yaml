    VALUES


    (1001, ''Smith'', ''2009-06-13'', ''OFFSET'', -4500.00);


    Unfortunately, proper dating does not fix all of the issues—and introduces new
    ones. After properly dating the offset, a query of the data for customer Smith
    for all business done through June 12 does not include the correction. Only by
    including data from June 13 would the query return the correct data. And although
    a correlated query could be written to return the correct summary report for June
    12, the data is in a somewhat strange state when querying for ranges after June
    12 (e.g., June 13 through 15.) The offset record is orphaned if June 12 is not
    considered in a given query along with June 13.


    To get around these and similar issues, a **bitemporal** model is necessary. In
    a bitemporal table, each transaction has two dates: the actual date that the transaction
    took place and a “valid” date, which represents the date that we know the updated
    data to be correct. The following modified version of the Transactions table shows
    the new column:


    CREATE TABLE Transactions


    (


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    TransactionId int,


    Customer varchar(50),


    TransactionDate datetime,


    TransactionType varchar(50),


    TransactionAmount decimal(9,2),


    ValidDate datetime


    );


    When inserting the data for Smith on June 12, a valid date of June 12 is also
    applied:


    INSERT INTO Transactions VALUES


    (1001, ''Smith'', ''2009-06-12'', ''DEPOSIT'', 5000.00, ''2009-06-12'');


    Effectively, this row can be read as “As of June 12, we believe that transaction
    1001, dated June 12, was a deposit for $5,000.00.” On June 13, when the error
    is caught, no offset record is inserted. Instead, a corrected deposit record is
    inserted, with a new valid date:


    INSERT INTO Transactions VALUES


    (1001, ''Smith'', ''2009-06-12'', ''DEPOSIT'', 500.00, ''2009-06-13'');


    This row indicates that as of June 13, transaction 1001 has been modified. But
    the important difference is that the transaction still maintains its correct date—so
    running a report for transactions that occurred on June 13 would not return any
    rows, since the only rows we are looking at occurred on June 12 (even though one
    of them was *entered* on June 13). In addition, this model eliminates the need
    for offset transactions. Rather than use an offset, queries should always find
    the last update for any given transaction within the valid range.


    To understand this a bit more, consider a report run on August 5 that looks at
    all transactions that occurred on June 12\. The person running the report wants
    the most “correct” version of the data—that is, all available corrections should
    be applied. This is done by taking the transaction data for each transaction from
    the row with the maximum valid date:


    SELECT


    T1.TransactionId,


    T1.Customer,


    T1.TransactionType,


    T1.TransactionAmount


    FROM Transactions AS T1


    WHERE


    T1.TransactionDate = ''2009-06-12''


    AND T1.ValidDate =


    (


    SELECT MAX(ValidDate)


    FROM Transactions AS T2


    WHERE T2.TransactionId = T1.TransactionId


    );


    By modifying the subquery, it is possible to get “snapshot” reports based on data
    before updates were applied. For instance, assume that this same report was run
    on the evening of June 12\. The output for Smith would show a deposit of $5,000.00
    for transaction 1001\. To reproduce that report on August 5


    (or any day after June 12), change the ValidDate subquery:


    SELECT


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    T1.TransactionId,


    T1.Customer,


    T1.TransactionType,


    T1.TransactionAmount


    FROM Transactions AS T1


    WHERE


    T1.TransactionDate = ''2009-06-12''


    AND T1.ValidDate =


    (


    SELECT MAX(ValidDate)


    FROM Transactions AS T2


    WHERE


    T2.TransactionId = T1.TransactionId


    AND ValidDate <= ''2009-06-12''


    );


    Note that in this case, the subquery could have been eliminated altogether, and
    the search argument could have become AND T1.ValidDate = ''2009-06-12''. However,
    the subquery is needed any time you’re querying a range of dates, so it’s a good
    idea to leave it in place for ease of maintenance of the query.


    Using this same pattern, data can also be booked in the future, before it is actually
    valid. It’s common when doing wire transfers, credit card payments, and other
    kinds of electronic funds


    transactions to be able to set the posting date on which the business will actually
    be executed. By working with the valid date, Smith can make a request for an outgoing
    transfer on June 14, but ask that the transfer actually take place on June 16:


    INSERT INTO Transactions VALUES


    (1002, ''Smith'', ''2009-06-16'', ''TRANSFER'', -1000.00, ''2009-06-14'');


    Since the transaction date is June 16, a report dealing with transactions that
    occurred between June 1 and June 15 will not show the transfer. But a business
    manager can query on June 15 to find out which transactions will hit in the coming
    days or weeks, and audit when the data entered the system.


    Modeling data bitemporally allows for an auditable, accurate representation of
    historical or future knowledge as data is updated. This can be tremendously useful
    in many scenarios—especially in the realm of financial reconciliation when you
    can be forced to deal with backdated contracts that change the terms of previous
    transactions and business booked in the future to avoid certain types of auditing
    issues.


    „ **Note** When modeling bitemporal data, you may want to investigate the possibility
    of implementing cutoff date rules, after which changes to transactions cannot
    be made. For example, the system may have a policy whereby transactions are said
    to be closed after 90 days. In this case, a simple CHECK constraint would do the
    trick, to ensure that the ValidDate is within 90 days of the TransactionDate.
    Another example would be data that has been used to generate an official report,
    such as for a government agency. In that case, you’d want a rule so that no transaction
    can be backdated to before the report was run (lest it change the data in the
    report). In that case, a trigger would be needed in order to verify the date against
    a table containing the report run history.


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    Summary'
  trans: "\n# 第 11 章 处理时间数据\n\n作为对简单修正无效数据的替代方案，一些系统采用了 `抵消交易` 的概念。抵消交易利用汇总逻辑的加性本质，在原位修复数据。例如，假设某财务报告系统的一部分包含一个描述客户交易的表格。下表是此类表格的一个高度简化表示：\n\
    \n```sql\nCREATE TABLE Transactions\n(\n    TransactionId int,\n    Customer varchar(50),\n\
    \    TransactionDate datetime,\n    TransactionType varchar(50),\n    TransactionAmount\
    \ decimal(9,2)\n);\nGO\n```\n\n假设在 2009 年 6 月 12 日，客户 Smith 存入了 500 美元。然而，由于柜员输入错误未被及时发现，到报告数据加载时，进入系统的金额变成了\
    \ 5000 美元：\n\n```sql\nINSERT INTO Transactions VALUES\n(1001, 'Smith', '2009-06-12',\
    \ 'DEPOSIT', 5000.00);\n```\n\n第二天早上，错误数据被检测到。更新交易行本身会破坏审计追踪，因此必须发出一笔抵消交易。处理此场景有几种方法。\n\
    \n## 方法一：使用错误的日期\n\n第一种方法是发出一笔日期与错误交易相同的抵消交易：\n\n```sql\nINSERT INTO Transactions\
    \ VALUES\n(1001, 'Smith', '2009-06-12', 'OFFSET', -4500.00);\n```\n\n将抵消交易日期回填可以修复按任何维度（交易号、客户、日期或交易类型）分组的汇总报告中的问题，但未能跟踪错误实际是在\
    \ 6 月 13 日被发现的这一事实。\n\n## 方法二：使用正确的日期\n\n出于数据审计目的，正确标注抵消记录的日期至关重要：\n\n```sql\n\
    INSERT INTO Transactions VALUES\n(1001, 'Smith', '2009-06-13', 'OFFSET', -4500.00);\n\
    ```\n\n不幸的是，正确标注日期并不能解决所有问题——反而会引入新问题。在正确标注抵消日期后，查询客户 Smith 截至 6 月 12 日的所有业务数据将不包含更正。只有包含\
    \ 6 月 13 日的数据，查询才能返回正确数据。虽然可以编写关联查询来返回 6 月 12 日的正确汇总报告，但在查询 6 月 12 日之后的范围（例如 6\
    \ 月 13 日至 15 日）时，数据处于一种有些奇怪的状态。如果查询中没有同时考虑 6 月 12 日和 6 月 13 日，抵消记录就会成为孤立记录。\n\n\
    ## 双时态模型\n\n为了规避这些及类似问题，需要一个 `双时态` 模型。在双时态表中，每笔交易都有两个日期：交易实际发生的日期和一个“有效”日期，后者代表我们知道更新数据正确的日期。以下是修改后的\
    \ `Transactions` 表，展示了新增的列：\n\n```sql\nCREATE TABLE Transactions\n(\n    TransactionId\
    \ int,\n    Customer varchar(50),\n    TransactionDate datetime,\n    TransactionType\
    \ varchar(50),\n    TransactionAmount decimal(9,2),\n    ValidDate datetime\n\
    );\n```\n\n当插入 Smith 在 6 月 12 日的数据时，同时也应用一个 6 月 12 日的有效日期：\n\n```sql\nINSERT INTO\
    \ Transactions VALUES\n(1001, 'Smith', '2009-06-12', 'DEPOSIT', 5000.00, '2009-06-12');\n\
    ```\n\n实际上，这一行可以解读为“截至 6 月 12 日，我们相信日期为 6 月 12 日的交易 1001 是一笔 5000.00 美元的存款。” 在\
    \ 6 月 13 日，当错误被发现时，不插入抵消记录，而是插入一条更正后的存款记录，并带有新的有效日期：\n\n```sql\nINSERT INTO Transactions\
    \ VALUES\n(1001, 'Smith', '2009-06-12', 'DEPOSIT', 500.00, '2009-06-13');\n```\n\
    \n这一行表明截至 6 月 13 日，交易 1001 已被修改。但重要的区别是，交易仍保持其正确的日期——因此运行一份报告查询 6 月 13 日发生的交易时，不会返回任何行，因为我们查看的行都发生在\
    \ 6 月 12 日（尽管其中一条是在 6 月 13 日录入的）。此外，此模型消除了对抵消交易的需求。查询应始终在有效范围内查找任何给定交易的最新更新，而不是使用抵消。\n\
    \n## 查询最新版本数据\n\n为了更深入地理解这一点，考虑一份在 8 月 5 日运行的报告，查看所有发生在 6 月 12 日的交易。运行报告的人希望得到最“正确”的数据版本——即应用所有可用的更正。这是通过为每笔交易选取具有最大有效日期的行来完成的：\n\
    \n```sql\nSELECT\n    T1.TransactionId,\n    T1.Customer,\n    T1.TransactionType,\n\
    \    T1.TransactionAmount\nFROM Transactions AS T1\nWHERE\n    T1.TransactionDate\
    \ = '2009-06-12'\n    AND T1.ValidDate =\n    (\n        SELECT MAX(ValidDate)\n\
    \        FROM Transactions AS T2\n        WHERE T2.TransactionId = T1.TransactionId\n\
    \    );\n```\n\n## 查询历史快照数据\n\n通过修改子查询，可以基于更新应用前的数据获取“快照”报告。例如，假设同一份报告在 6 月 12\
    \ 日晚间运行。Smith 的输出将显示交易 1001 的存款为 5000.00 美元。要在 8 月 5 日（或 6 月 12 日之后的任何一天）重现该报告，需更改\
    \ `ValidDate` 子查询：\n\n```sql\nSELECT\n    T1.TransactionId,\n    T1.Customer,\n\
    \    T1.TransactionType,\n    T1.TransactionAmount\nFROM Transactions AS T1\n\
    WHERE\n    T1.TransactionDate = '2009-06-12'\n    AND T1.ValidDate =\n    (\n\
    \        SELECT MAX(ValidDate)\n        FROM Transactions AS T2\n        WHERE\n\
    \            T2.TransactionId = T1.TransactionId\n            AND ValidDate <=\
    \ '2009-06-12'\n    );\n```\n\n请注意，在这种情况下，本可以完全省略子查询，将搜索条件变为 `AND T1.ValidDate\
    \ = '2009-06-12'`。但是，当查询日期范围时，子查询是必需的，因此为了便于查询维护，保留它是明智的。\n\n## 预订未来交易\n\n使用相同的模式，也可以在数据实际生效前预订未来交易。在进行电汇、信用卡支付和其他类型的电子资金交易时，通常可以设置业务实际执行的记账日期。通过操作有效日期，Smith\
    \ 可以在 6 月 14 日请求一笔转出转账，但要求该转账实际在 6 月 16 日发生：\n\n```sql\nINSERT INTO Transactions\
    \ VALUES\n(1002, 'Smith', '2009-06-16', 'TRANSFER', -1000.00, '2009-06-14');\n\
    ```\n\n由于交易日期是 6 月 16 日，一份处理 6 月 1 日至 6 月 15 日之间发生的交易的报告不会显示这笔转账。但业务经理可以在 6 月\
    \ 15 日查询，以了解未来几天或几周内将发生哪些交易，并审核数据是何时进入系统的。\n\n## 总结\n\n对数据进行双时态建模，可以在数据更新时对历史或未来知识进行可审计、准确的表示。这在许多场景中非常有用——尤其是在财务对账领域，当您被迫处理回溯日期的合同（这些合同改变了先前交易的条款）以及为避免某些类型的审计问题而预订的未来业务时。\n\
    \n**注意** 在对双时态数据建模时，您可能需要研究实施截止日期规则的可能性，超过该日期后不能再对交易进行更改。例如，系统可能有政策规定交易在 90 天后视为关闭。在这种情况下，一个简单的\
    \ `CHECK` 约束就可以解决问题，以确保 `ValidDate` 在 `TransactionDate` 的 90 天内。另一个例子是已用于生成正式报告（例如提交给政府机构）的数据。在这种情况下，您会希望有一条规则，使得任何交易都不能回溯到报告运行之前的日期（以免改变报告中的数据）。这时需要一个触发器，以便根据包含报告运行历史的表来验证日期。\n\
    \n# 总结\n"
- fmt: "# Virtually all data has some form of a temporal component, and every database\
    \ developer will have to deal with times and dates again and again. Managing temporal\
    \ data successfully begins with an understanding of the different types of temporal\
    \ data: instance-based, interval-based, period-based, and bitemporal. By applying\
    \ knowledge of how SQL Server’s native date/time types work, you can intelligently\
    \ and efficiently do calculations and queries based on temporal data models.\n\
    \n## Trees, Hierarchies, and Graphs\n\nAlthough at times it may seem chaotic,\
    \ the world around us is filled with structure and order. The universe itself\
    \ is hierarchical in nature, made up of galaxies, stars, and planets. One of the\
    \ natural hierarchies here on earth is the food chain that exists in the wild;\
    \ a lion can certainly eat a zebra, but alas, a zebra will probably never dine\
    \ on lion flesh. And of course, we’re all familiar with corporate management hierarchies—which\
    \ some companies try to kill off in favor of matrixes, which are not hierarchical\
    \ at all . . . but more on that later!\n\nWe strive to describe our existence\
    \ based on connections between entities—or lack thereof—and that’s what trees,\
    \ hierarchies, and graphs help us do at the mathematical and data levels. The\
    \ majority of databases are at least mostly hierarchical, with a central table\
    \ or set of tables at the root, and all other tables branching from there via\
    \ foreign key references. However, sometimes the database hierarchy needs to be\
    \ designed at a more granular level, representing the hierarchical relationship\
    \ between records contained within a single table. For example, you wouldn’t design\
    \ a management database that required one table per employee in order to support\
    \ the hierarchy. Rather, you’d put all of the employees into a single table and\
    \ create references between the rows.\n\nThis chapter discusses three different\
    \ approaches for working with these intra-table hierarchies and graphs in SQL\
    \ Server 2008, as follows:\n\n*   Adjacency lists\n*   Materialized paths\n* \
    \  The `hierarchyid` datatype\n\nEach of these techniques has its own virtues\
    \ depending on the situation. I will describe each technique individually and\
    \ compare how it can be used to query and manage your hierarchical data.\n\n###\
    \ Terminology: Everything Is a Graph\n\nMathematically speaking, trees and hierarchies\
    \ are both different types of `graphs`. A graph is defined as a set of `nodes`\
    \ (or `vertices`) connected by `edges`. The edges in a graph can be further classified\
    \ as `directed` or `undirected`, meaning that they can be traversed in one direction\
    \ only (directed) or in both directions (undirected). If all of the edges in a\
    \ graph are directed, the graph itself is said to be directed (sometimes referred\
    \ to as a `digraph`). Graphs can also have `cycles`, sets of nodes/edges that\
    \ when traversed in order bring you back to the same initial node. A graph without\
    \ cycles is called an `acyclic` graph. Figure 12-1 shows some simple examples\
    \ of the basic types of graphs.\n\n*Figure 12-1\\. Undirected, directed, undirected\
    \ cyclic, and directed acyclic graphs*\n\nThe most immediately recognizable example\
    \ of a graph is a street map. Each intersection can be thought of as a node, and\
    \ each street an edge. One-way streets are directed edges, and if you drive around\
    \ the block, you’ve illustrated a cycle. Therefore, a street system can be said\
    \ to be a cyclic, directed graph. In the manufacturing world, a common graph structure\
    \ is a bill of materials, or parts explosion, which describes all of the necessary\
    \ component parts of a given product. And in software development, we typically\
    \ work with class and object graphs, which form the relationships between the\
    \ component parts of an object-oriented system.\n\nA `tree` is defined as an undirected,\
    \ acyclic graph in which exactly one path exists between any two nodes. Figure\
    \ 12-2 shows a simple tree.\n\n*Figure 12-2\\. Exactly one path exists between\
    \ any two nodes in a tree.*\n\n> **Note** Borrowing from the same agrarian terminology\
    \ from which the term *tree* is derived, we can refer to multiple trees as a *forest*.\n\
    \nA `hierarchy` is a special subset of a tree, and it is probably the most common\
    \ graph structure that developers need to work with. It has all of the qualities\
    \ of a tree but is also directed and `rooted`. This means that a certain node\
    \ is designated as the `root`, and all other nodes are said to be `subordinates`\
    \ (or `descendants`) of that node. In addition, each nonroot node must have exactly\
    \ one `parent` node—a node that directs into it. Multiple parents are not allowed,\
    \ nor are multiple root nodes. Hierarchies are extremely common when it comes\
    \ to describing most business relationships; manager/employee, contractor/subcontractor,\
    \ and firm/division associations all come to mind. Figure 12-3 shows a hierarchy\
    \ containing a root node and several levels of subordinates.\n\n*Figure 12-3\\\
    . A hierarchy must have exactly one root node, and each nonroot node must have\
    \ exactly one parent.*\n\nThe parent/child relationships found in hierarchies\
    \ are often classified more formally using the terms `ancestor` and `descendant`,\
    \ although this terminology can get a bit awkward in software development settings.\
    \ Another important term is `siblings`, which describes nodes that share the same\
    \ parent. Other terms used to describe familial relationships are also routinely\
    \ applied to trees and hierarchies, but I’ve personally found that it can get\
    \ confusing trying to figure out which node is the `cousin` of another, and so\
    \ have abandoned most of this extended terminology.\n\n### The Basics: Adjacency\
    \ Lists and Graphs\n\nThe most common graph data model is called an `adjacency\
    \ list`. In an adjacency list, the graph is modeled as pairs of nodes, each representing\
    \ an edge. This is an extremely flexible way of modeling a graph; any kind of\
    \ graph, hierarchy, or tree can fit into this model. However, it can be problematic\
    \ from the perspectives of query complexity, performance, and data integrity.\
    \ In this section, I will show you how to work with adjacency lists and point\
    \ out some of the issues that you should be wary of when designing solutions around\
    \ them.\n\nThe simplest of graph tables contains only two columns, `X` and `Y`:\n\
    \n```sql\nCREATE TABLE Edges\n(\n    X int NOT NULL,\n    Y int NOT NULL,\n  \
    \  PRIMARY KEY (X, Y)\n);\nGO\n```\n\nThe combination of columns `X` and `Y` constitutes\
    \ the primary key, and each row in the table represents one edge in the graph.\
    \ Note that `X` and `Y` are assumed to be references to some valid table of nodes.\
    \ This table only represents the edges that connect the nodes. It can also be\
    \ used to reference unconnected nodes; a node with a path back to itself but no\
    \ other paths can be inserted into the table for that purpose.\n\n> **Note** When\
    \ modeling unconnected nodes, some data architects prefer to use a nullable `Y`\
    \ column rather than having both columns point to the same node. The net effect\
    \ is the same, but in my opinion the nullable `Y` column makes some queries a\
    \ bit messier, as you’ll be forced to deal with the possibility of a `NULL`. The\
    \ examples in this chapter, therefore, do not follow that convention—but you can\
    \ use either approach in your production applications.\n\n### Constraining the\
    \ Edges\n\nAs-is, the `Edges` table can be used to represent any graph, but semantics\
    \ are important, and none are implied by the current structure. It’s difficult\
    \ to know whether each edge is directed or undirected. Traversing the graph, one\
    \ could conceivably go either way, so the following two rows may or may not be\
    \ logically identical:\n\n```sql\nINSERT INTO Edges VALUES (1, 2);\nINSERT INTO\
    \ Edges VALUES (2, 1);\n```"
  raw: 'Virtually all data has some form of a temporal component, and every database
    developer will have to deal with times and dates again and again. Managing temporal
    data successfully begins with an understanding of the different types of temporal
    data: instance-based, interval-based, period-based, and bitemporal. By applying
    knowledge of how SQL Server’s native date/time types work, you can


    intelligently and efficiently do calculations and queries based on temporal data
    models.


    **C H A P T E R 12**


    „ „ „


    **Trees, Hierarchies, and Graphs**


    Although at times it may seem chaotic, the world around us is filled with structure
    and order. The universe itself is hierarchical in nature, made up of galaxies,
    stars, and planets. One of the natural hierarchies here on earth is the food chain
    that exists in the wild; a lion can certainly eat a zebra, but alas, a zebra will
    probably never dine on lion flesh. And of course, we’re all familiar with corporate
    management hierarchies—which some companies try to kill off in favor of matrixes,
    which are not hierarchical at all . . . but more on that later!


    We strive to describe our existence based on connections between entities—or lack
    thereof—and that’s what trees, hierarchies, and graphs help us do at the mathematical
    and data levels. The majority of databases are at least mostly hierarchical, with
    a central table or set of tables at the root, and all other tables branching from
    there via foreign key references. However, sometimes the database hierarchy needs
    to be designed at a more granular level, representing the hierarchical relationship
    between records contained within a single table. For example, you wouldn’t design
    a management database that required one table per employee in order to support
    the hierarchy. Rather, you’d put all of the employees into a single table and
    create references between the rows.


    This chapter discusses three different approaches for working with these intra-table
    hierarchies and graphs in SQL Server 2008, as follows:


    •


    Adjacency lists


    •


    Materialized paths


    •


    The hierarchyid datatype


    Each of these techniques has its own virtues depending on the situation. I will
    describe each technique individually and compare how it can be used to query and
    manage your hierarchical data.


    Terminology: Everything Is a Graph


    Mathematically speaking, trees and hierarchies are both different types of **graphs**.
    A graph is defined as a set of **nodes** (or **vertices**) connected by **edges**.
    The edges in a graph can be further classified as **directed** or **undirected**,
    meaning that they can be traversed in one direction only (directed) or in both
    directions (undirected). If all of the edges in a graph are directed, the graph
    itself is said to be directed (sometimes referred to as a **digraph**). Graphs
    can also have **cycles**, sets of nodes/edges that when traversed in order bring
    you back to the same initial node. A graph without cycles is called an **acyclic**
    graph. Figure 12-1


    shows some simple examples of the basic types of graphs.


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    *Figure 12-1\. Undirected, directed, undirected cyclic, and directed acyclic graphs*


    The most immediately recognizable example of a graph is a street map. Each intersection
    can be thought of as a node, and each street an edge. One-way streets are directed
    edges, and if you drive around the block, you’ve illustrated a cycle. Therefore,
    a street system can be said to be a cyclic, directed graph. In the manufacturing
    world, a common graph structure is a bill of materials, or parts explosion, which
    describes all of the necessary component parts of a given product. And in software
    development, we typically work with class and object graphs, which form the relationships
    between the component parts of an object-oriented system.


    A **tree** is defined as an undirected, acyclic graph in which exactly one path
    exists between any two nodes. Figure 12-2 shows a simple tree.


    *Figure 12-2\. Exactly one path exists between any two nodes in a tree.*


    „ **Note** Borrowing from the same agrarian terminology from which the term *tree*
    is derived, we can refer to multiple trees as a *forest*.


    A **hierarchy** is a special subset of a tree, and it is probably the most common
    graph structure that developers need to work with. It has all of the qualities
    of a tree but is also directed and **rooted**. This means that a certain node
    is designated as the **root**, and all other nodes are said to be **subordinates**
    **(**or **descendants**) of that node. In addition, each nonroot node must have
    exactly one **parent** node—a node that directs into it. Multiple parents are
    not allowed, nor are multiple root nodes. Hierarchies are extremely common when
    it comes to describing most business relationships; manager/employee,


    contractor/subcontractor, and firm/division associations all come to mind. Figure
    12-3 shows a hierarchy containing a root node and several levels of subordinates.


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    *Figure 12-3\. A hierarchy must have exactly one root node, and each nonroot node
    must have exactly one* *parent.*


    The parent/child relationships found in hierarchies are often classified more
    formally using the terms **ancestor** and **descendant**, although this terminology
    can get a bit awkward in software development settings. Another important term
    is **siblings**, which describes nodes that share the same parent. Other terms
    used to describe familial relationships are also routinely applied to trees and
    hierarchies, but I’ve personally found that it can get confusing trying to figure
    out which node is the **cousin** of another, and so have abandoned most of this
    extended terminology.


    The Basics: Adjacency Lists and Graphs


    The most common graph data model is called an **adjacency list**. In an adjacency
    list, the graph is modeled as pairs of nodes, each representing an edge. This
    is an extremely flexible way of modeling a graph; any kind of graph, hierarchy,
    or tree can fit into this model. However, it can be problematic from the perspectives
    of query complexity, performance, and data integrity. In this section, I will
    show you how to work with adjacency lists and point out some of the issues that
    you should be wary of when designing solutions around them.


    The simplest of graph tables contains only two columns, X and Y:


    CREATE TABLE Edges


    (


    X int NOT NULL,


    Y int NOT NULL,


    PRIMARY KEY (X, Y)


    );


    GO


    The combination of columns X and Y constitutes the primary key, and each row in
    the table


    represents one edge in the graph. Note that X and Y are assumed to be references
    to some valid table of nodes. This table only represents the edges that connect
    the nodes. It can also be used to reference unconnected nodes; a node with a path
    back to itself but no other paths can be inserted into the table for that purpose.


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    „ **Note** When modeling unconnected nodes, some data architects prefer to use
    a nullable Y column rather than having both columns point to the same node. The
    net effect is the same, but in my opinion the nullable Y column makes some queries
    a bit messier, as you’ll be forced to deal with the possibility of a NULL. The
    examples in this chapter, therefore, do not follow that convention—but you can
    use either approach in your production applications.


    Constraining the Edges


    As-is, the Edges table can be used to represent any graph, but semantics are important,
    and none are implied by the current structure. It’s difficult to know whether
    each edge is directed or undirected.


    Traversing the graph, one could conceivably go either way, so the following two
    rows may or may not be logically identical:


    INSERT INTO Edges VALUES (1, 2);


    INSERT INTO Edges VALUES (2, 1);'
  trans: "# 几乎所有数据都带有某种形式的时间成分，每个数据库开发人员都将不得不反复处理时间和日期。成功管理时间数据始于理解不同类型的时间数据：基于实例的、基于区间的、基于时段的和双时态的。通过应用对\
    \ SQL Server 原生日期/时间类型工作方式的了解，你可以智能且高效地执行基于时间数据模型的计算和查询。\n\n## 树、层次结构与图\n\n尽管有时看起来很混乱，但我们周围的世界充满了结构和秩序。宇宙本身在本质上是层次化的，由星系、恒星和行星组成。地球上自然的层次结构之一是荒野中存在的食物链；狮子当然可以吃斑马，但唉，斑马可能永远不会以狮子肉为食。当然，我们也都熟悉公司的管理层次结构——有些公司试图废除它而\
    \ favor 矩阵结构，后者根本不是层次化的……但这一点稍后再谈！\n\n我们努力基于实体之间的连接（或缺乏连接）来描述我们的存在，而这正是树、层次结构和图在数学和数据层面帮助我们做的事情。大多数数据库至少在很大程度上是层次化的，根部有一个中心表或一组表，所有其他表通过外键引用从此分支出来。然而，有时数据库的层次结构需要在更细粒度的级别上设计，以表示单个表中记录之间的层次关系。例如，你不会为了支持层次结构而设计一个需要为每个员工使用一个表的管理数据库。相反，你会将所有员工放入一个单独的表中，并在行之间创建引用。\n\
    \n本章讨论了在 SQL Server 2008 中处理这些表内层次结构和图的三种不同方法，如下所示：\n\n*   邻接表\n*   物化路径\n*  \
    \ `hierarchyid` 数据类型\n\n根据具体情况，这些技术各有优势。我将分别描述每种技术，并比较如何使用它们来查询和管理你的层次数据。\n\n\
    ### 术语：一切都是图\n\n从数学上讲，树和层次结构都是 `图` 的不同类型。图被定义为由 `边` 连接的一组 `节点`（或 `顶点`）。图中的边可以进一步分类为\
    \ `有向` 或 `无向`，这意味着它们只能单向遍历（有向）或可以双向遍历（无向）。如果一个图中的所有边都是有向的，则该图本身被称为有向图（有时称为 `有向图`）。图还可以有\
    \ `环`，即一组节点/边，当按顺序遍历时会让你回到同一个初始节点。没有环的图称为 `无环` 图。图 12-1 显示了一些基本图类型的简单示例。\n\n*图\
    \ 12-1\\. 无向图、有向图、无环有向图和有向无环图*\n\n最直接可识别的图的例子是街道地图。每个十字路口可以被视为一个节点，每条街道是一条边。单行道是有向边，如果你开车绕着街区转一圈，就说明了一个环。因此，可以说街道系统是一个有环的有向图。在制造领域，一个常见的图结构是物料清单，或称零件展开，它描述了给定产品所有必需的组成部分。在软件开发中，我们通常使用类和对象图，它们构成了面向对象系统中各组成部分之间的关系。\n\
    \n`树` 被定义为一个无向、无环的图，其中任意两个节点之间恰好存在一条路径。图 12-2 显示了一个简单的树。\n\n*图 12-2\\. 树中任意两个节点之间恰好存在一条路径。*\n\
    \n> **注意** 借用与“树”一词相同的农业术语，我们可以将多棵树称为 `森林`。\n\n`层次结构` 是树的一个特殊子集，它可能是开发人员需要处理的最常见的图结构。它具有树的所有特性，但也是\
    \ `有向` 和 `有根` 的。这意味着某个节点被指定为 `根`，所有其他节点都被称为该节点的 `下属`（或 `后代`）。此外，每个非根节点必须恰好有一个\
    \ `父` 节点——一个指向它的节点。不允许有多个父节点，也不允许有多个根节点。在描述大多数业务关系时，层次结构极为常见；经理/员工、承包商/分包商以及公司/部门关联都会让人想到。图\
    \ 12-3 显示了一个包含根节点和若干层级下属的层次结构。\n\n*图 12-3\\. 一个层次结构必须恰好有一个根节点，并且每个非根节点必须恰好有一个父节点。*\n\
    \n层次结构中的父子关系通常使用术语 `祖先` 和 `后代` 进行更正式的分类，尽管这个术语在软件开发环境中可能有点拗口。另一个重要术语是 `兄弟节点`，它描述共享同一个父节点的节点。用于描述家族关系的其他术语也常规应用于树和层次结构，但我个人发现，试图弄清楚哪个节点是另一个节点的\
    \ `表亲` 等可能会引起混淆，因此已放弃使用大多数这种扩展术语。\n\n### 基础：邻接表与图\n\n最常见的图数据模型称为 `邻接表`。在邻接表中，图被建模为节点对，每对代表一条边。这是一种极其灵活的图建模方式；任何类型的图、层次结构或树都可以适应这个模型。然而，从查询复杂性、性能和数据完整性的角度来看，它可能会有问题。在本节中，我将向你展示如何使用邻接表，并指出在围绕它们设计解决方案时应该警惕的一些问题。\n\
    \n最简单的图表只包含两列，`X` 和 `Y`：\n\n```sql\nCREATE TABLE Edges\n(\n    X int NOT NULL,\n\
    \    Y int NOT NULL,\n    PRIMARY KEY (X, Y)\n);\nGO\n```\n\n列 `X` 和 `Y` 的组合构成了主键，表中的每一行代表图中的一条边。注意，`X`\
    \ 和 `Y` 被假定为对某个有效节点表的引用。此表仅表示连接节点的边。它也可以用来引用未连接的节点；一个有路径回到自身但没有其他路径的节点可以为此目的插入到表中。\n\
    \n> **注意** 在为未连接的节点建模时，一些数据架构师更喜欢使用可为空的 `Y` 列，而不是让两个列都指向同一个节点。最终效果是一样的，但在我看来，可为空的\
    \ `Y` 列会使某些查询变得有些混乱，因为你将被迫处理 `NULL` 的可能性。因此，本章中的示例不遵循该约定——但在你的生产应用程序中可以使用任一方法。\n\
    \n### 约束边\n\n就目前而言，`Edges` 表可以用来表示任何图，但语义很重要，而当前结构并未隐含任何语义。很难知道每条边是有向的还是无向的。遍历图时，可以想象两个方向都走得通，因此下面两行在逻辑上可能相同也可能不同：\n\
    \n```sql\nINSERT INTO Edges VALUES (1, 2);\nINSERT INTO Edges VALUES (2, 1);\n\
    ```"
- fmt: "# CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS\n\nIf the edges in this graph\
    \ are supposed to be directed, there is no problem. If you need both directions\
    \ for a certain edge, simply insert them both, and don’t insert both for directed\
    \ edges. If, on the other hand, all edges are supposed to be undirected, a constraint\
    \ is necessary in order to ensure that two logically identical paths cannot be\
    \ inserted.\n\nThe primary key is clearly not sufficient to enforce this constraint,\
    \ since it treats every combination as unique. The most obvious solution to this\
    \ problem is to create a trigger that checks the rows when inserts or updates\
    \ take place. Since the primary key already enforces that duplicate directional\
    \ paths cannot be inserted, the trigger must only check for the opposite path.\n\
    \nBefore creating the trigger, empty the `Edges` table so that it no longer contains\
    \ the duplicate undirected edges just inserted:\n\n```sql\nTRUNCATE TABLE Edges;\n\
    GO\n```\n\nThen create the trigger that will check as rows are inserted or updated\
    \ as follows:\n\n```sql\nCREATE TRIGGER CheckForDuplicates\nON Edges\nFOR INSERT,\
    \ UPDATE\nAS\nBEGIN\n    IF EXISTS\n    (\n        SELECT *\n        FROM Edges\
    \ e\n        WHERE\n            EXISTS\n            (\n                SELECT\
    \ *\n                FROM inserted i\n                WHERE\n                \
    \    i.X = e.Y\n                    AND i.Y = e.X\n            )\n    )\n    BEGIN\n\
    \        ROLLBACK;\n    END\nEND;\nGO\n```\n\nAttempting to reinsert the two rows\
    \ listed previously will now cause the trigger to end the transaction and issue\
    \ a rollback of the second row, preventing the duplicate edge from being created.\n\
    \nA slightly cleverer way of constraining the uniqueness of the paths is to make\
    \ use of an indexed view. You can take advantage of the fact that an indexed view\
    \ has a unique index, using it as a constraint in cases like this where a trigger\
    \ seems awkward. In order to create the indexed view, you will need a numbers\
    \ table (also called a tally table) with a single column, `Number`, which is the\
    \ primary key. The following code listing creates such a table, populated with\
    \ every number between 1 and 8000:\n\n```sql\nSELECT TOP (8000)\n    IDENTITY(int,\
    \ 1, 1) AS Number\nINTO Numbers\nFROM master..spt_values a\nCROSS JOIN master..spt_values\
    \ b;\n\nALTER TABLE Numbers\nADD PRIMARY KEY (Number);\nGO\n```\n\n## Note\n\n\
    We won’t actually need all 8,000 rows in the `Numbers` table (in fact, the solution\
    \ described here requires only two distinct rows), but there are lots of other\
    \ scenarios where you might need a larger table of numbers, so it doesn’t do any\
    \ harm to prime the table with additional rows now.\n\nThe `master..spt_values`\
    \ table is an arbitrary system table chosen simply because it has enough rows\
    \ that, when cross-joined with itself, the output will be more than 8,000 rows.\n\
    \nA table of numbers is incredibly useful in many cases in which you might need\
    \ to do interrow manipulation and look-ahead logic, especially when dealing with\
    \ strings. However, in this case, its utility is fairly simple: a `CROSS JOIN`\
    \ to the `Numbers` table, combined with a `WHERE` condition, will result in an\
    \ output containing two rows for each row in the `Edges` table. A `CASE` expression\
    \ will then be used to swap the `X` and `Y` column values—reversing the path direction—for\
    \ one of the rows in each duplicate pair. The following view encapsulates this\
    \ logic:\n\n```sql\nCREATE VIEW DuplicateEdges\nWITH SCHEMABINDING\nAS\nSELECT\n\
    \    CASE n.Number\n        WHEN 1 THEN e.X\n        ELSE e.Y\n    END X,\n  \
    \  CASE n.Number\n        WHEN 1 THEN e.Y\n        ELSE e.X\n    END Y\nFROM Edges\
    \ e\nCROSS JOIN Numbers n\nWHERE\n    n.Number BETWEEN 1 AND 2;\nGO\n```\n\nOnce\
    \ the view has been created, it can be indexed in order to constrain against duplicate\
    \ paths:\n\n```sql\nCREATE UNIQUE CLUSTERED INDEX IX_NoDuplicates\nON DuplicateEdges\
    \ (X,Y);\nGO\n```\n\nSince the view logically contains both paths as they were\
    \ inserted into the table, as well as the reverse paths, the unique index serves\
    \ to constrain against duplication. Both techniques have similar performance characteristics,\
    \ but there is admittedly a certain cool factor with the indexed view. It can\
    \ also double as a quick lookup for finding all paths in a directed notation."
