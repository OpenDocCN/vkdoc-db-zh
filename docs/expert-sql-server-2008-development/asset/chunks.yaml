    As an example of using the function, consider the following call:


    SELECT *


    FROM dbo.TimeSlice(''2010-01-02T12:34:45.003'', ''2010-01-02T12:34:48.100'');


    The output, shown following, contains one row per whole second range in the interval,
    with the start and endpoints constrained by the interval boundaries.


    StartDate EndDate


    2010-01-02 12:34:45.003 2010-01-02 12:34:46.000


    2010-01-02 12:34:46.000 2010-01-02 12:34:47.000


    2010-01-02 12:34:47.000 2010-01-02 12:34:48.000


    2010-01-02 12:34:48.000 2010-01-02 12:34:48.100


    To use the TimeSlice function to look at the number of overlapping queries over
    the course of the sample trace, first find the start and endpoints of the trace
    using the MIN and MAX aggregates. Then slice the interval into 1-second periods
    using the function. The following T-SQL shows how to do that: SELECT


    Slices.DisplayDate


    FROM


    (


    SELECT MIN(StartTime), MAX(EndTime)


    FROM Overlap_Trace


    ) StartEnd (StartTime, EndTime)


    CROSS APPLY


    (


    SELECT *


    FROM dbo.TimeSlice(StartEnd.StartTime, StartEnd.EndTime)


    ) Slices;


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    The output of the TimeSlice function can then be used to find the number of overlapping
    queries that were running during each period, by using the CROSS APPLY operator
    again in conjunction with the interval overlap expression:


    SELECT


    Slices.DisplayDate,


    OverLaps.thecount


    FROM


    (


    SELECT MIN(StartTime), MAX(EndTime)


    FROM Overlap_Trace


    ) StartEnd (StartTime, EndTime)


    CROSS APPLY


    (


    SELECT *


    FROM dbo.TimeSlice(StartEnd.StartTime, StartEnd.EndTime)


    ) Slices


    CROSS APPLY


    (


    SELECT COUNT(*) AS theCount


    FROM Overlap_Trace OT


    WHERE


    Slices.StartDate < OT.EndTime


    AND Slices.EndDate > OT.StartTime


    ) Overlaps;


    This data, in conjunction with a performance monitor trace, can be used to correlate
    spikes in counters at certain times to what was actually happening in the database.
    This can be especially useful for tracking sudden increases in blocking, which
    often will not correspond to increased utilization of any system resources, which
    can make them difficult to identify. By adding additional filters to the preceding
    query, you can look at concurrent runs of specific queries that are prone to blocking
    one another in order to find out whether they might be causing performance issues.


    Modeling Durations


    Durations are very similar to intervals, in that they represent a start time and
    an end time. In many cases, therefore, it makes sense to model durations as intervals
    and determine the actual duration for reporting or aggregation purposes by using
    DATEDIFF. However, in some cases, you may wish to store durations using a greater
    precision than the 100ns resolution offered by SQL Server’s datetime2 type. In
    addition, it can be difficult to format the duration calculated between two date/time
    columns for output, sometimes requiring intricate string manipulation.


    There are several examples of cases when you might want to model durations rather
    than intervals.


    Databases that store information about timed scientific trials, for example, often
    require microsecond or even nanosecond precision. Another example is data that
    may not require a date/time component at all.


    For instance, a table containing times for runners competing in the 300-yard dash
    may not need a start time. The moment at which the run took place does not matter;
    the only important fact is how long the runner took to travel the 300 yards.


    The most straightforward solution to the issue of inadequate resolution is to
    store a start date, along with an integer column to represent the actual duration
    using whatever unit of measurement is required for the accuracy of the application
    in hand:


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    CREATE TABLE Events


    (


    EventId int,


    StartTime datetime2,


    DurationInNanoseconds int


    );


    Using the Events table, it is possible to find the approximate end time of an
    event by using DATEADD


    to add the duration to the start time. SQL Server will round the duration down
    to the nearest 100ns—the lowest time resolution supported by the datetime2 type.
    For the 300-yard dash or other scenarios where starting time does not matter,
    the StartTime column can simply be dropped, and only the duration itself maintained
    (of course, the results in such cases may not require nanosecond precision as
    used here).


    What this table does not address is the issue of formatting, should you need to
    output precise data rendered as a human-readable string. Since the lowest granularity
    supported by the SQL Server types is 100ns, none of the time-formatting methods
    will help to output a time string representing nanosecond precision. As such,
    you will have to roll your own code to do so. Once again I should stress that
    formatting is best done in a client tier. However, if you do need to format data
    in the database tier (and you have a *very* good reason to do so), the best approach
    to handle this scenario would be to create a SQLCLR UDF that uses the properties
    of .NET’s TimeSpan type to build a string up to and including second precision,
    and then append the remaining nanosecond portion to the end.


    The following UDF can be used to return a duration measured in nanoseconds in
    the string format HH:MM:SS.NNNNNN (where N represents nanoseconds):


    [Microsoft.SqlServer.Server.SqlFunction]


    public static SqlString FormatDuration(SqlInt64 TimeInNanoseconds)


    {


    // Ticks = Nanoseconds / 10


    long ticks = TimeInNanoseconds.Value / 100;


    // Create the TimeSpan based on the number of ticks


    TimeSpan ts = new TimeSpan(ticks);


    // Format the output to HH:MM:SS:NNNNNN


    return new SqlString(


    ts.Hours.ToString() + ":"


    + ts.Minutes.ToString() + ":"


    + ts.Seconds.ToString() + "."


    + (TimeInNanoseconds % 1000000000)


    );


    }


    This function could easily be amended to return whatever time format is required
    for your


    particular application.


    Managing Bitemporal Data


    A central truth that all database developers must come to realize is that the
    quality of data is frequently not as great as it could be (or as we might wish
    it to be). Sometimes we’re forced to work with incomplete or incorrect data, and
    correct things later as a more complete picture of reality becomes available.


    Modifying data in the database is simple enough—a call to a DML statement and
    the work is done.


    But in systems that require advanced logging and reproducibility of reports between
    runs for auditing purposes, a straightforward UPDATE, INSERT, or DELETE may be
    counterproductive. Performing such data 366


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    modification can destroy the possibility of re-creating the same output on consecutive
    runs of the same query.'
  trans: "# 第 11 章  处理时态数据\n\n--确保匹配传入的相同起始/结束间隔\n\n```sql\nINSERT INTO @t (\n\nStartDate,\n\
    \nEndDate\n\n)\n\n-- 插入第一个间隔\n\nSELECT\n\n@StartDate,\n\nCASE\n\nWHEN DATEADD(second,\
    \ 1, @TruncatedStart) > @EndDate THEN @EndDate\n\nELSE DATEADD(second, 1, @TruncatedStart)\n\
    \nEND\n\nUNION ALL\n\n-- 插入最后一个间隔\n\nSELECT\n\nCASE\n\nWHEN @TruncatedEnd < @StartDate\
    \ THEN @StartDate\n\nELSE @TruncatedEnd\n\nEND,\n\n@EndDate;\n\nSET @TruncatedStart\
    \ = DATEADD(second, 1, @TruncatedStart);\n\n--为间隔内的每一个整秒插入一行\n\nWHILE (@TruncatedStart\
    \ < @TruncatedEnd)\n\nBEGIN\n\nINSERT INTO @t (\n\nStartDate,\n\nEndDate\n\n)\n\
    \nVALUES (\n\n@TruncatedStart,\n\nDATEADD(second, 1, @TruncatedStart)\n\n);\n\n\
    SET @TruncatedStart = DATEADD(second, 1, @TruncatedStart);\n\nEND;\n\nRETURN;\n\
    \nEND;\n```\n\n此函数目前硬编码使用秒作为子间隔长度，但通过修改 `DATEDIFF` 和 `DATEADD` 的参数，可以轻松更改为任何其他时间段。\n\
    \n## 使用 TimeSlice 函数\n\n作为使用该函数的示例，考虑以下调用：\n\n```sql\nSELECT *\n\nFROM dbo.TimeSlice('2010-01-02T12:34:45.003',\
    \ '2010-01-02T12:34:48.100');\n```\n\n如下所示的输出，包含间隔内每一个整秒范围的一行，起始点和结束点受间隔边界约束。\n\
    \n```\nStartDate                   EndDate\n2010-01-02 12:34:45.003    2010-01-02\
    \ 12:34:46.000\n2010-01-02 12:34:46.000    2010-01-02 12:34:47.000\n2010-01-02\
    \ 12:34:47.000    2010-01-02 12:34:48.000\n2010-01-02 12:34:48.000    2010-01-02\
    \ 12:34:48.100\n```\n\n要使用 `TimeSlice` 函数来查看示例跟踪过程中重叠查询的数量，首先使用 `MIN` 和 `MAX`\
    \ 聚合函数找到跟踪的起始点和结束点。然后使用该函数将间隔切分为 1 秒的时段。以下 T-SQL 展示了如何实现：\n\n```sql\nSELECT\n\n\
    \    Slices.DisplayDate\n\nFROM\n\n    (\n\n        SELECT MIN(StartTime), MAX(EndTime)\n\
    \n        FROM Overlap_Trace\n\n    ) StartEnd (StartTime, EndTime)\n\n    CROSS\
    \ APPLY\n\n    (\n\n        SELECT *\n\n        FROM dbo.TimeSlice(StartEnd.StartTime,\
    \ StartEnd.EndTime)\n\n    ) Slices;\n```\n\n`TimeSlice` 函数的输出然后可用于查找每个时段内正在运行的重叠查询数量，方法是再次结合使用\
    \ `CROSS APPLY` 操作符和间隔重叠表达式：\n\n```sql\nSELECT\n\n    Slices.DisplayDate,\n\n\
    \    OverLaps.thecount\n\nFROM\n\n    (\n\n        SELECT MIN(StartTime), MAX(EndTime)\n\
    \n        FROM Overlap_Trace\n\n    ) StartEnd (StartTime, EndTime)\n\n    CROSS\
    \ APPLY\n\n    (\n\n        SELECT *\n\n        FROM dbo.TimeSlice(StartEnd.StartTime,\
    \ StartEnd.EndTime)\n\n    ) Slices\n\n    CROSS APPLY\n\n    (\n\n        SELECT\
    \ COUNT(*) AS theCount\n\n        FROM Overlap_Trace OT\n\n        WHERE\n\n \
    \           Slices.StartDate < OT.EndTime\n\n            AND Slices.EndDate >\
    \ OT.StartTime\n\n    ) Overlaps;\n```\n\n这些数据，结合性能监视器跟踪，可用于将特定时间点的计数器峰值与数据库中实际发生的情况关联起来。这对于跟踪阻塞的突然增加尤其有用，因为阻塞的增加通常不会伴随任何系统资源利用率的提高，这使得它们难以识别。通过向前面的查询添加额外的过滤器，您可以查看那些容易相互阻塞的特定查询的并发运行情况，以找出它们是否可能导致性能问题。\n\
    \n## 对时长建模\n\n时长与间隔非常相似，因为它们都表示一个开始时间和一个结束时间。因此，在许多情况下，将时长建模为间隔，并使用 `DATEDIFF`\
    \ 来确定实际时长以用于报告或聚合目的是有意义的。然而，在某些情况下，您可能希望使用比 SQL Server 的 `datetime2` 类型提供的 100ns\
    \ 分辨率更高的精度来存储时长。此外，格式化两个日期/时间列之间计算出的时长以供输出可能很困难，有时需要复杂的字符串操作。\n\n有几个例子说明您可能希望对时长而非间隔建模。\n\
    \n例如，存储科学试验定时信息的数据库通常需要微秒甚至纳秒精度。另一个例子是可能根本不需要日期/时间组件的数据。例如，包含参加 300 码短跑的选手时间的表可能不需要开始时间。跑步发生的时刻并不重要；唯一重要的事实是选手跑完\
    \ 300 码所花的时间。\n\n对于分辨率不足的问题，最直接的解决方案是存储一个开始日期，以及一个整数列，使用所需精度的测量单位来表示实际时长：\n\n\
    ```sql\nCREATE TABLE Events\n(\n    EventId int,\n    StartTime datetime2,\n \
    \   DurationInNanoseconds int\n);\n```\n\n使用 `Events` 表，可以通过使用 `DATEADD` 将时长加到开始时间上来找到事件的近似结束时间。SQL\
    \ Server 会将时长向下舍入到最接近的 100ns——`datetime2` 类型支持的最低时间分辨率。对于 300 码短跑或其他开始时间无关紧要的场景，`StartTime`\
    \ 列可以简单地丢弃，只维护时长本身（当然，在此类情况下，结果可能不需要此处使用的纳秒精度）。\n\n此表未解决的问题是格式化问题，如果您需要将精确数据输出为人类可读的字符串。由于\
    \ SQL Server 类型支持的最低粒度是 100ns，没有任何时间格式化方法能帮助输出表示纳秒精度的时间字符串。因此，您必须编写自己的代码来完成此操作。我再次强调，格式化最好在客户端层完成。但是，如果您确实需要在数据库层格式化数据（并且您有一个*非常*充分的理由这样做），处理此场景的最佳方法是创建一个\
    \ SQLCLR UDF，该函数使用 .NET 的 `TimeSpan` 类型的属性来构建一个精确到秒的字符串，然后将剩余的纳秒部分附加到末尾。\n\n以下\
    \ UDF 可用于以 `HH:MM:SS.NNNNNN` 字符串格式（其中 `N` 代表纳秒）返回以纳秒为单位的时长：\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction]\n\
    public static SqlString FormatDuration(SqlInt64 TimeInNanoseconds)\n{\n    //\
    \ Ticks = Nanoseconds / 10\n    long ticks = TimeInNanoseconds.Value / 100;\n\
    \    // Create the TimeSpan based on the number of ticks\n    TimeSpan ts = new\
    \ TimeSpan(ticks);\n    // Format the output to HH:MM:SS:NNNNNN\n    return new\
    \ SqlString(\n        ts.Hours.ToString() + \":\"\n        + ts.Minutes.ToString()\
    \ + \":\"\n        + ts.Seconds.ToString() + \".\"\n        + (TimeInNanoseconds\
    \ % 1000000000)\n    );\n}\n```\n\n此函数可以轻松修改，以返回您的特定应用程序所需的任何时间格式。\n\n## 管理双时态数据\n\
    \n所有数据库开发人员都必须认识到的一个核心事实是，数据质量常常不如它应有的那样高（或者不如我们希望的那样高）。有时我们被迫处理不完整或不正确的数据，并在更完整的现实情况变得可用时稍后进行更正。\n\
    \n修改数据库中的数据足够简单——调用一个 DML 语句即可完成工作。但在需要高级日志记录和为了审计目的在运行之间复现报告的系统中，一个直接的 `UPDATE`、`INSERT`\
    \ 或 `DELETE` 可能适得其反。执行此类数据修改会破坏在同一查询的连续运行中重现相同输出的可能性。"
- fmt: "# CHAPTER 11 WORKING WITH TEMPORAL DATA\n\nAs an alternative to performing\
    \ a simple alteration of invalid data, some systems use the idea of `offset transactions`.\
    \ An offset transaction uses the additive nature of summarization logic to fix\
    \ the data in place. For example, assume that part of a financial reporting system\
    \ has a table that describes customer transactions. The following table is a highly\
    \ simplified representation of what such a table might look like:\n\n```sql\n\
    CREATE TABLE Transactions\n(\n    TransactionId int,\n    Customer varchar(50),\n\
    \    TransactionDate datetime,\n    TransactionType varchar(50),\n    TransactionAmount\
    \ decimal(9,2)\n);\nGO\n```\n\nLet’s suppose that on June 12, 2009, customer Smith\
    \ deposited $500. However, due to a teller’s key error that was not caught in\
    \ time, by the time the reporting data was loaded, the amount that made it into\
    \ the system was $5,000:\n\n```sql\nINSERT INTO Transactions VALUES\n(1001, 'Smith',\
    \ '2009-06-12', 'DEPOSIT', 5000.00);\n```\n\nThe next morning, the erroneous data\
    \ was detected. Updating the transaction row itself would destroy the audit trail,\
    \ so an offset transaction must be issued. There are a few ways of handling this\
    \ scenario.\n\n## 方法一：使用错误的日期\n\nThe first method is to issue an offset transaction\
    \ dated the same as the incorrect transaction:\n\n```sql\nINSERT INTO Transactions\
    \ VALUES\n(1001, 'Smith', '2009-06-12', 'OFFSET', -4500.00);\n```\n\nBackdating\
    \ the offset fixes the problem in summary reports that group any dimension (transaction\
    \ number, customer, date, or transaction type), but fails to keep track of the\
    \ fact that the error was actually caught on June 13.\n\n## 方法二：使用正确的日期\n\nProperly\
    \ dating the offset record is imperative for data auditing purposes:\n\n```sql\n\
    INSERT INTO Transactions VALUES\n(1001, 'Smith', '2009-06-13', 'OFFSET', -4500.00);\n\
    ```\n\nUnfortunately, proper dating does not fix all of the issues—and introduces\
    \ new ones. After properly dating the offset, a query of the data for customer\
    \ Smith for all business done through June 12 does not include the correction.\
    \ Only by including data from June 13 would the query return the correct data.\
    \ And although a correlated query could be written to return the correct summary\
    \ report for June 12, the data is in a somewhat strange state when querying for\
    \ ranges after June 12 (e.g., June 13 through 15). The offset record is orphaned\
    \ if June 12 is not considered in a given query along with June 13.\n\n## 双时态模型\n\
    \nTo get around these and similar issues, a `bitemporal` model is necessary. In\
    \ a bitemporal table, each transaction has two dates: the actual date that the\
    \ transaction took place and a “valid” date, which represents the date that we\
    \ know the updated data to be correct. The following modified version of the `Transactions`\
    \ table shows the new column:\n\n```sql\nCREATE TABLE Transactions\n(\n    TransactionId\
    \ int,\n    Customer varchar(50),\n    TransactionDate datetime,\n    TransactionType\
    \ varchar(50),\n    TransactionAmount decimal(9,2),\n    ValidDate datetime\n\
    );\n```\n\nWhen inserting the data for Smith on June 12, a valid date of June\
    \ 12 is also applied:\n\n```sql\nINSERT INTO Transactions VALUES\n(1001, 'Smith',\
    \ '2009-06-12', 'DEPOSIT', 5000.00, '2009-06-12');\n```\n\nEffectively, this row\
    \ can be read as “As of June 12, we believe that transaction 1001, dated June\
    \ 12, was a deposit for $5,000.00.” On June 13, when the error is caught, no offset\
    \ record is inserted. Instead, a corrected deposit record is inserted, with a\
    \ new valid date:\n\n```sql\nINSERT INTO Transactions VALUES\n(1001, 'Smith',\
    \ '2009-06-12', 'DEPOSIT', 500.00, '2009-06-13');\n```\n\nThis row indicates that\
    \ as of June 13, transaction 1001 has been modified. But the important difference\
    \ is that the transaction still maintains its correct date—so running a report\
    \ for transactions that occurred on June 13 would not return any rows, since the\
    \ only rows we are looking at occurred on June 12 (even though one of them was\
    \ entered on June 13). In addition, this model eliminates the need for offset\
    \ transactions. Rather than use an offset, queries should always find the last\
    \ update for any given transaction within the valid range.\n\n## 查询最新版本数据\n\n\
    To understand this a bit more, consider a report run on August 5 that looks at\
    \ all transactions that occurred on June 12. The person running the report wants\
    \ the most “correct” version of the data—that is, all available corrections should\
    \ be applied. This is done by taking the transaction data for each transaction\
    \ from the row with the maximum valid date:\n\n```sql\nSELECT\n    T1.TransactionId,\n\
    \    T1.Customer,\n    T1.TransactionType,\n    T1.TransactionAmount\nFROM Transactions\
    \ AS T1\nWHERE\n    T1.TransactionDate = '2009-06-12'\n    AND T1.ValidDate =\n\
    \    (\n        SELECT MAX(ValidDate)\n        FROM Transactions AS T2\n     \
    \   WHERE T2.TransactionId = T1.TransactionId\n    );\n```\n\n## 查询历史快照数据\n\n\
    By modifying the subquery, it is possible to get “snapshot” reports based on data\
    \ before updates were applied. For instance, assume that this same report was\
    \ run on the evening of June 12. The output for Smith would show a deposit of\
    \ $5,000.00 for transaction 1001. To reproduce that report on August 5 (or any\
    \ day after June 12), change the `ValidDate` subquery:\n\n```sql\nSELECT\n   \
    \ T1.TransactionId,\n    T1.Customer,\n    T1.TransactionType,\n    T1.TransactionAmount\n\
    FROM Transactions AS T1\nWHERE\n    T1.TransactionDate = '2009-06-12'\n    AND\
    \ T1.ValidDate =\n    (\n        SELECT MAX(ValidDate)\n        FROM Transactions\
    \ AS T2\n        WHERE\n            T2.TransactionId = T1.TransactionId\n    \
    \        AND ValidDate <= '2009-06-12'\n    );\n```\n\nNote that in this case,\
    \ the subquery could have been eliminated altogether, and the search argument\
    \ could have become `AND T1.ValidDate = '2009-06-12'`. However, the subquery is\
    \ needed any time you’re querying a range of dates, so it’s a good idea to leave\
    \ it in place for ease of maintenance of the query.\n\n## 预订未来交易\n\nUsing this\
    \ same pattern, data can also be booked in the future, before it is actually valid.\
    \ It’s common when doing wire transfers, credit card payments, and other kinds\
    \ of electronic funds transactions to be able to set the posting date on which\
    \ the business will actually be executed. By working with the valid date, Smith\
    \ can make a request for an outgoing transfer on June 14, but ask that the transfer\
    \ actually take place on June 16:\n\n```sql\nINSERT INTO Transactions VALUES\n\
    (1002, 'Smith', '2009-06-16', 'TRANSFER', -1000.00, '2009-06-14');\n```\n\nSince\
    \ the transaction date is June 16, a report dealing with transactions that occurred\
    \ between June 1 and June 15 will not show the transfer. But a business manager\
    \ can query on June 15 to find out which transactions will hit in the coming days\
    \ or weeks, and audit when the data entered the system.\n\n## 总结\n\nModeling data\
    \ bitemporally allows for an auditable, accurate representation of historical\
    \ or future knowledge as data is updated. This can be tremendously useful in many\
    \ scenarios—especially in the realm of financial reconciliation when you can be\
    \ forced to deal with backdated contracts that change the terms of previous transactions\
    \ and business booked in the future to avoid certain types of auditing issues.\n\
    \n**Note** When modeling bitemporal data, you may want to investigate the possibility\
    \ of implementing cutoff date rules, after which changes to transactions cannot\
    \ be made. For example, the system may have a policy whereby transactions are\
    \ said to be closed after 90 days. In this case, a simple `CHECK` constraint would\
    \ do the trick, to ensure that the `ValidDate` is within 90 days of the `TransactionDate`.\
    \ Another example would be data that has been used to generate an official report,\
    \ such as for a government agency. In that case, you’d want a rule so that no\
    \ transaction can be backdated to before the report was run (lest it change the\
    \ data in the report). In that case, a trigger would be needed in order to verify\
    \ the date against a table containing the report run history.\n\n# Summary"
