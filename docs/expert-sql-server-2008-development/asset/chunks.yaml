    \n## 空间查询中网格的应用示例\n\n为了理解数据库引擎如何使用网格来满足空间查询，请参考上一节中检索位于地图边界框内的所有点的示例：\n\n**图 10-11.\
    \ 空间索引使用的多级网格**\n\n```sql\nDECLARE @BoundingBox geography;\n\nSET @BoundingBox\
    \ = geography::STPolyFromText(\n'POLYGON ((-109 41, -109 37, -102 37, -102 41,\
    \ -109 41))',\n4326);\n\nSELECT\n    name,\n    location.STAsText()\nFROM\n  \
    \  allCountries\nWHERE\n    location.STIntersects(@BoundingBox) = 1;\n```\n\n\
    `location`列被包含在`idxallCountries`地理索引中，并且谓词`location.STIntersects(@BoundingBox)\
    \ = 1`支持使用空间索引，因此该查询的执行计划可以利用基于索引的主筛选器。为此，首先根据`location`列上`idxallCountries`索引的相同网格对`@BoundingBox`参数进行细分。然后，可以将索引中每个单元占用的网格单元与`@BoundingBox`占用的网格单元进行比较。主筛选器的结果可能导致以下三种结果之一：\n\
    \n-   如果`location`列中的某个几何体没有与`@BoundingBox`所占用单元共同的索引单元，则它可以被主筛选器丢弃，因为几何体本身不可能相交。\n\
    -   如果该几何体占据了`@BoundingBox`所占用的索引网格单元的全部，那么它肯定会与`@BoundingBox`几何体本身相交。因此，无需调用次级筛选器，此行就可以肯定地包含在结果集中。这被称为内部筛选。\n\
    -   如果该几何体仅部分占据了`@BoundingBox`所占用的网格单元，则无法确定该单元是否与`@BoundingBox`相交。在这些情况下，几何体必须传递给次级筛选器，这涉及调用`STIntersects()`方法本身。\n\
    \n为了获得最佳的空间查询性能，理想目标是让主筛选器完成尽可能多的处理，并减少需要调用次级筛选器的次数。这意味着要确保尽可能多的行要么被主筛选器完全丢弃，要么仅基于主筛选器就肯定被包含。实现这一目标需要调整网格属性，以最好地匹配底层数据集中的数据以及针对该数据运行的查询类型。\n\
    \n## 优化网格\n\n如果空间索引要有效地充当空间查询结果的主筛选器，它不仅必须快速，而且还必须最小化返回的误报结果数量。索引在实现这两个目标方面的成功程度，很大程度上取决于为其网格分辨率、边界框和每对象单元数参数选择的值。\n\
    \n每个参数的最佳值在很大程度上取决于所讨论的底层数据集的确切分布。但是，在下一节中，我将给出一些在确定空间索引设置时需要牢记的一般思路。\n"
- fmt: '**Tip** You can have up to 249 spatial indexes on the same table, and you
    may create multiple spatial indexes on the same column, using different settings
    for each index. You may find this useful in order to index unevenly distributed
    data.


    ## Grid Resolution

    Choosing the correct grid resolution—the number of cells contained at each level
    of the grid—is a matter of balancing the degree of precision offered by the index
    (the “tightness of fit” around features) with the number of grid cells required
    to obtain that precision. The resolution at each level of the grid may be set
    independently to one of three resolutions: `LOW` corresponds to a `4×4` grid,
    `MEDIUM` corresponds to an `8×8` grid, and `HIGH` corresponds to a `16×16` grid.
    If you set a low grid resolution (i.e., the index contains a small number of relatively
    large grid cells), then the primary filter may return more false positives—features
    that intersect the grid cell that don’t actually intersect the geometry in question.
    These false positives will lead to more work having to be done by the secondary
    filter, leading to query degradation. However, if you set a high grid resolution
    (i.e., the index contains a large number of grid cells, but each one is individually
    small), then the resulting index will contain more grid cell entries for each
    geometry, which may mean that it will take longer to query the index, also degrading
    query performance. Another effect of a high resolution may be that the number
    of cells required to fully tessellate the geometry exceeds the `CELLS_PER_OBJECT`
    limit, in which case tessellation will not be fully complete.


    ## Bounding Box

    The bounding box of a spatial index specifies the area of space that will be tessellated
    by the grid. Specifying a smaller bounding box but maintaining the same number
    of grid cells will lead to each individual grid cell being smaller, creating a
    more precise fit around any features and making the primary filter more accurate.
    However, if you restrict the extent of the bounding box too much, you may find
    that you exclude some outlying features from the index altogether. For the `geography`
    datatype, there is no explicit bounding box, as every `geography` index is assumed
    to cover the whole globe.


    ## Cells per Object

    The `CELLS_PER_OBJECT` parameter allows you to explicitly state the maximum number
    of grid cells that will be stored to describe each feature in the spatial index.
    The optimum number of cells per object is intricately linked to the resolution
    of the cells used at each level; a higher-resolution grid will contain smaller
    cells, which may mean that more cells are required to fully cover the object at
    a given level of the grid. If the `CELLS_PER_OBJECT` limit is set too low, then
    each index entry might not be allowed to contain the total number of cells required
    to describe a geometry, based on the deepest-cell rule and the covering rule.
    In such cases, the grid cells will not be fully subdivided and the index entry
    will not be as accurate as it can be. If the `CELLS_PER_OBJECT` limit is set too
    high, then each index entry will be allowed to grow to contain a large number
    of cells. This may lead to a more accurate index, but a slower query, thereby
    negating the purpose of using a spatial index in the first place.


    To understand the interaction between these different parameters, let’s consider
    the `idxallCountries` index created earlier this chapter. This index used the
    default parameters of `MEDIUM` grid resolution at all four levels, and 16 cells
    per object. Indexes that are tessellated using the `geography` grid do not have
    an explicit bounding box, as they implicitly cover the whole globe.


    To assess the effectiveness of the `idxallCountries` index, we could simply obtain
    some performance timings using queries with different index settings. However,
    rather than rely on this trial-and-error approach, SQL Server 2008 comes with
    two very helpful stored procedures—'
