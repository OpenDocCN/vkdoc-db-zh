    In this case, two plans have been generated: an `Adhoc` plan for the query’s exact
    text and a `Prepared` plan for the auto-parameterized version of the query. Looking
    at the text of the latter plan, notice that the query has been normalized (the
    object names are bracket-delimited, carriage returns and other extraneous whitespace
    have been removed, and so on) and that a parameter has been derived from the text
    of the query.


    The benefit of this auto-parameterization is that subsequent queries submitted
    to SQL Server that can be auto-parameterized to the same normalized form may be
    able to make use of the prepared query plan, thereby avoiding compilation overhead.


    > **Note:** The auto-parameterization examples shown here were based on the default
    settings of the `AdventureWorks2008` database, including the “simple parameterization”
    option. SQL Server 2008 includes a more powerful form of auto-parameterization,
    called “forced parameterization.” This option makes SQL Server work much harder
    to auto-parameterize queries, which means greater query compilation cost in some
    cases. This can be very beneficial to applications that use a lot of nonparameterized
    ad hoc queries, but may cause performance degradation in other cases. See http://msdn.microsoft.com/en-us/library/ms175037.aspx
    for more information on forced parameterization.


    ## Application-Level Parameterization


    Auto-parameterization is not the only way that a query can be parameterized. Other
    forms of parameterization are possible at the application level for ad hoc SQL,
    or within T-SQL when working with dynamic SQL in a stored procedure. The section
    `sp_executesql: A Better EXECUTE`, later in this chapter, describes how to parameterize
    dynamic SQL, but I will briefly discuss application-level parameterization here.


    Every query framework that can communicate with SQL Server supports the idea of
    remote procedure call (`RPC`) invocation of queries. In the case of an `RPC` call,
    parameters are bound and strongly typed, rather than encoded as strings and passed
    along with the rest of the query text.


    Parameterizing queries in this way has one key advantage from a performance standpoint:
    the application tells SQL Server what the parameters are; SQL Server does not
    need to (and will not) try to find them itself.


    To see application-level parameterization in action, the following code listing
    demonstrates the C# code required to issue a parameterized query via `ADO.NET`,
    by populating the `Parameters` collection on the `SqlCommand` object when preparing
    a query.


    ```csharp

    SqlConnection sqlConn = new SqlConnection(

    "Data Source=localhost; Initial Catalog=AdventureWorks2008; Integrated Security=SSPI");

    sqlConn.Open();

    SqlCommand cmd = new SqlCommand(

    "SELECT * FROM HumanResources.Employee WHERE BusinessEntityId IN (@Emp1, @Emp2)",
    sqlConn);

    SqlParameter param = new SqlParameter("@Emp1", SqlDbType.Int);

    param.Value = 1;

    cmd.Parameters.Add(param);

    SqlParameter param2 = new SqlParameter("@Emp2", SqlDbType.Int);

    param2.Value = 2;

    cmd.Parameters.Add(param2);

    cmd.ExecuteNonQuery();

    sqlConn.Close();

    ```


    > **Note:** You will need to change the connection string used by the `SqlConnection`
    object in the previous code listing to match your server.


    Notice that the underlying query is the same as the first query shown in this
    chapter, which, when issued as a T-SQL query via Management Studio, was unable
    to be auto-parameterized by SQL Server. However, in this case, the literal employee
    IDs have been replaced with the variables `@EmpId1` and `@EmpId2`.


    Executing this code listing and then examining the `sys.dm_exec_cached_plans`
    view once again using the query from the previous section gives the following
    results:


    ```

    objtype text

    ```'
