  trans: '

    # 第 7 章 SQLCLR：架构与设计考量


    包括字符串或 XML 数据的操作、.NET 基类库中专用方法提供的某些数学函数，以及过程式代码比基于集合的逻辑更高效的情况。为了验证这些说法的有效性，我决定设置一些简单的测试用例来比较
    T-SQL 与 SQLCLR 的相对性能，这些测试将在以下各节中描述。


    ## 创建一个用于素数的“简单筛子”


    在这个测试中，我创建了两个简单的存储过程，用于返回直到提供最大值的所有素数列表——一个用 T-SQL 实现，另一个用 SQLCLR 实现。这些测试的逻辑尽可能简化：每个过程都被提供一个最大值，该值在一个循环中递减，在循环的每次迭代中，使用模运算运算符计算该值除以每个较小数字的余数。如果除法的余数为
    0（换句话说，我们找到了一个因子），我们就知道当前值不是素数。因此，循环继续测试下一个可能的值。如果内部循环测试了所有可能的除数并且没有找到任何因子，那么我们就知道这个值一定是素数。使用这种“简单筛子”算法来寻找素数依赖于基本的数学函数和过程式逻辑，这使其成为比较
    T-SQL 和 SQLCLR 性能的一个良好测试。以下是 T-SQL 的实现：


    ```

    CREATE PROCEDURE ListPrimesTSQL (


    @Limit int


    )


    AS BEGIN


    DECLARE


    -- @n 是我们要测试是否为素数的数字


    @n int = @Limit,


    --@m 是所有可能作为 @n 因子的数字


    @m int = @Limit - 1;


    -- 循环递减测试候选素数


    WHILE (@n > 1)


    BEGIN


    -- 循环递减测试候选因子


    WHILE (@m > 0)


    BEGIN


    -- 我们已经测试到 2，并且没有找到任何因子


    IF(@m = 1)


    BEGIN


    PRINT CAST(@n AS varchar(32)) + '' 是一个素数''


    BREAK;


    END


    -- 这个 @m 是这个素数的因子吗？


    IF(@n%@m) <> 0


    BEGIN


    -- 不是因子，所以继续下一个 @m


    SET @m = @m - 1;


    CONTINUE;


    END


    CHAPTER 7 „ SQLCLR: 架构与设计考量


    ELSE BREAK;


    END


    SET @n = @n-1;


    SET @m = @n-1;


    END


    END;

    ```


    以下是使用完全相同逻辑的 SQLCLR 实现：


    ```

    [SqlProcedure]


    public static void ListPrimesCLR(SqlInt32 Limit)


    {


    int n = (int)Limit;


    int m = (int)Limit - 1;


    while(n > 1)


    {


    while(m > 0)


    {


    if(m == 1)


    {


    SqlContext.Pipe.Send(n.ToString() + " 是一个素数");


    }


    if(n%m != 0)


    {


    m = m - 1;


    continue;


    }


    else


    {


    break;


    }


    }


    n = n - 1;


    m = n - 1;


    }


    }

    ```


    `注意` 显然，如果你真的想要获取素数列表，你绝不会使用如此简单（天真的）方法。这里使用的例子旨在提供一个可以在 T-SQL 和 SQLCLR 中一致实现的简单过程。


    我对每个解决方案进行了多次测试，为循环起始的最大限制值提供了不同的数值。每个解决方案的平均执行时间如图 7-1 所示。


    *图 7-1. T-SQL 与 SQLCLR 实现的素数筛对比*


    结果应该不足为奇——由于所采用的方法依赖于迭代循环中的数学操作，SQLCLR 几乎总是比基于集合的 T-SQL 表现更优。然而，你可能会对两者之间差异的幅度感到惊讶，尤其是随着迭代次数的增加。如果我们比较简单的内联或非过程式计算，那么这两种方法之间可能不会有如此鲜明的对比。


    ## 计算运行聚合


    很少有实际的数据库应用程序需要生成素数列表——一个更常见的可能受益于使用 SQLCLR 的数学查询操作类型是，当你需要根据前几行数据的值计算当前行中的值时。这种线性查询最常见的例子是在计算聚合时，例如列的运行总和。

    '
- fmt: "# The Typical Approach Using T-SQL\n\nThe typical approach using T-SQL is\
    \ to make use of a self-join on the table, such as follows:\n\n```sql\nSELECT\n\
    \    T1.x,\n    SUM(T2.x) AS running_x\nFROM\n    T AS T1 INNER JOIN T AS T2\n\
    \    ON T1.x >= T2.x\nGROUP BY\n    T1.x;\n```\n\n# CHAPTER 7: SQLCLR: Architecture\
    \ and Design Considerations\n\nUnfortunately, the process required to satisfy\
    \ this query is not very efficient. Assuming that an index exists on the `x` column\
    \ of the table, the preceding query generates the execution plan shown in Figure\
    \ 7-2.\n\n**Figure 7-2. A nested index seek used to create a running sum in T-SQL**\n\
    \nTo sum all of the previous values in the column requires a nested loop containing\
    \ an index seek. The number of rows returned by this seek increases exponentially\
    \ as more rows are processed. On the first row, this seek must only sum one value,\
    \ but to find the running sum over a set of 100 rows, 5,050 total rows need to\
    \ be read. For a set of 200 rows, the query processor needs to process 20,100\
    \ total rows—four times the amount of work required to satisfy the previous query.\
    \ Thus, the performance of this approach to calculate running aggregates degrades\
    \ rapidly as more rows are added to the table.\n\nAn alternative solution, which\
    \ can yield some significant performance benefits, is to make use of a cursor.\
    \ There is a commonly held perception in the SQL Server development world that\
    \ cursors are a bad thing, but they do have valid use cases, and this might be\
    \ one of them. However, there are a number of good reasons why many developers\
    \ are reluctant to use cursors, and I’m certainly not advocating their use in\
    \ general.\n\nA better approach would be to use SQLCLR to loop through and store\
    \ the running values using local variables, and then stream the results one row\
    \ at a time via the `SqlPipe`. An example of such a solution is given in the following\
    \ code listing:\n\n```csharp\n[Microsoft.SqlServer.Server.SqlProcedure]\npublic\
    \ static void RunningSum()\n{\n    using (SqlConnection conn = new SqlConnection(\"\
    context connection=true;\"))\n    {\n        SqlCommand comm = new SqlCommand();\n\
    \        comm.Connection = conn;\n        comm.CommandText = \"SELECT x FROM T\
    \ ORDER BY x\";\n        \n        SqlMetaData[] columns = new SqlMetaData[2];\n\
    \        columns[0] = new SqlMetaData(\"Value\", SqlDbType.Int);\n        columns[1]\
    \ = new SqlMetaData(\"RunningSum\", SqlDbType.Int);\n        \n        int RunningSum\
    \ = 0;\n        SqlDataRecord record = new SqlDataRecord(columns);\n        \n\
    \        SqlContext.Pipe.SendResultsStart(record);\n        \n        conn.Open();\n\
    \        SqlDataReader reader = comm.ExecuteReader();\n        \n        while\
    \ (reader.Read())\n        {\n            int Value = (int)reader[0];\n      \
    \      RunningSum += Value;\n            \n            record.SetInt32(0, (int)reader[0]);\n\
    \            record.SetInt32(1, RunningSum);\n            \n            SqlContext.Pipe.SendResultsRow(record);\n\
    \        }\n        \n        SqlContext.Pipe.SendResultsEnd();\n    }\n}\n```\n\
    \nI’ve used this solution on a number of occasions and find it to be very efficient\
    \ and maintainable, and it avoids the need for any `temp` tables to be used to\
    \ hold the running sums as required by the alternatives. When testing against\
    \ a table containing 100,000 rows, I achieve an average execution time of 2.7\
    \ seconds for the SQLCLR query, compared to over 5 *minutes* for the TSQL equivalent.\n\
    \n## String Manipulation\n\nTo compare the performance of string-handling functions\
    \ between T-SQL and SQLCLR, I wanted to come up with a fair, practical test. The\
    \ problem is that there are lots of ingenious techniques for working with string\
    \ data: in T-SQL, some of the best performing methods use one or more common table\
    \ expressions (`CTEs`), `CROSS APPLY` operators, or number tables; or convert\
    \ text strings to `XML` in order to perform nontrivial manipulation of character\
    \ data. Likewise, in SQLCLR, the techniques available differ considerably depending\
    \ on whether you use the native `String` methods or those provided by the `StringBuilder`\
    \ class.\n\nI decided that, rather than try to define a scenario that required\
    \ a string-handling technique, the only fair test was to perform a direct comparison\
    \ of two built-in methods that provided the equivalent functionality in either\
    \ environment. I decided to settle on the T-SQL `CHARINDEX` and .NET’s `String.IndexOf()`,\
    \ each of which searches for and returns the position of one string inside another\
    \ string. For the purposes of the test, I created `nvarchar(max)` strings of different\
    \ lengths, each composed entirely of the repeating character `a`. I then appended\
    \ a single character `x` onto the end of each string, and timed the performance\
    \ of the respective methods to find the position of that character over 10,000\
    \ iterations.\n\n**Figure 7-3. Comparing performance of CHARINDEX against String.IndexOf()**\n\
    \nThe following code listing demonstrates the T-SQL method:\n\n```sql\nCREATE\
    \ PROCEDURE SearchCharTSQL\n(\n    @needle nchar(1),\n    @haystack nvarchar(max)\n\
    )\nAS BEGIN\n    PRINT CHARINDEX(@needle, @haystack);\nEND;\n```\n\nAnd here’s\
    \ the CLR equivalent:\n\n```csharp\n[SqlProcedure]\npublic static void SearchCharCLR(SqlString\
    \ needle, SqlString haystack)\n{\n    SqlContext.Pipe.Send(\n        haystack.ToString().IndexOf(needle.ToString()).ToString()\n\
    \    );\n}\n```\n\nNote that the starting position for `CHARINDEX` is 1-based,\
    \ whereas the index numbering used by `IndexOf()` is 0-based. The results of each\
    \ method will therefore differ, but they will have done the same amount of work\
    \ obtaining that result. I tested each procedure as follows, substituting different\
    \ parameter values for the `REPLICATE` method to change the length of the string\
    \ to be searched:\n\n```sql\nDECLARE @needle nvarchar(1) = 'x';\nDECLARE @haystack\
    \ nvarchar(max);\n\nSELECT @haystack = REPLICATE(CAST('a' AS varchar(max)), 8000)\
    \ + 'x';\n\nEXEC dbo.SearchCharTSQL @needle, @haystack;\n```\n\nAs with the prime\
    \ number sieve example given earlier, the logic required for string searching,\
    \ matching, and replacing is best suited to the highly efficient routines provided\
    \ by the .NET Base Class Library. If you currently have code logic that relies\
    \ heavily on T-SQL string functionality including `CHARINDEX`, `PATINDEX`, or\
    \ `REPLACE`, I highly recommend that you investigate the alternative options available\
    \ through SQLCLR—you might be surprised by the performance gain you achieve.\n\
    \n## Enhancing Service Broker Scale-Out with SQLCLR\n\nHaving discussed some of\
    \ the theory behind working with the SQLCLR and given some isolated performance\
    \ comparisons, let’s now turn our attention to a more detailed example that puts\
    \ these ideas into practice. Service Broker is frequently mentioned as an excellent\
    \ choice for helping to scale out database services. One of the more compelling\
    \ use cases is a Service Broker service that can be used to asynchronously request\
    \ data from a remote system. In such a case, a request message would be sent to\
    \ the remote data service from a local stored procedure, which could do some other\
    \ work while waiting for the response—the requested data—to come back.\n\nThere\
    \ are many ways to architect such a system, and given that Service Broker allows\
    \ messages to be sent either as binary or `XML`, I wondered which would provide\
    \ the best overall performance and value from a code reuse perspective. In the\
    \ following sections, I’ll guide you through my investigations into `XML` and\
    \ binary serialization using SQLCLR.\n\n### XML Serialization\n\nI started working\
    \ with the `HumanResources.Employee` table from the `AdventureWorks2008` database\
    \ as a sample data set, imagining a remote data service requesting a list of employees\
    \ along with their attributes. After some experimentation, I determined that the\
    \ `FOR XML RAW` option is the easiest way to serialize a table in `XML` format,\
