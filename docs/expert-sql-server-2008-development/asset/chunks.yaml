  trans: '

    ## 第八章 - 动态 T-SQL


    其原因在于，`EXECUTE` 运行 SQL 的上下文与其创建时的上下文不同。在运行该语句的上下文中，变量 `@String` 未被声明，因此是未知的。由于变量的值不是直接拼接进查询中，因此本节前面描述的
    SQL 注入类型在此场景下是不可能的。不过，我们需要找到另一种方法，将合法的、类型强匹配的参数传递给查询。


    解决此问题的方法是使用系统存储过程 `sp_executesql`，它允许您向动态 SQL 传递参数，就像对存储过程那样。`sp_executesql` 的参数包括：一个包含动态
    SQL 批处理的 Unicode（nvarchar 或 nchar）字符串、一个定义了动态 SQL 中引用变量数据类型的第二个 Unicode 字符串，以及一个来自调用作用域、与数据类型列表中定义的变量相对应的值或变量列表。


    以下 T-SQL 展示了如何使用 `sp_executesql` 执行 `Person.Address` 查询：


    ```sql

    DECLARE @String nvarchar(60) = ''Stone''


    DECLARE @sql nvarchar(max);


    SET @sql = '''' +

    ''SELECT AddressID '' +

    ''FROM Person.Address '' +

    ''WHERE AddressLine1 LIKE ''''%'''' + @String + ''''%''''''


    EXEC sp_executesql

    @sql,

    N''@String nvarchar(60)'',

    @String;


    GO

    ```


    运行此批处理将产生与调用 `FindAddressByString` 并传递字符串“Stone”相同的结果。传递给 `sp_executesql` 的参数用于将外部作用域的
    `@String` 变量映射到动态 SQL 执行时生成的新作用域中——无需拼接变量的字面值。


    对于使用多个参数的示例，再次考虑 `GetEmployeeData` 存储过程，现在改用 `sp_executesql` 而非 `EXECUTE` 重写：


    ```sql

    ALTER PROCEDURE GetEmployeeData

    @BusinessEntityID int = NULL,

    @NationalIDNumber nvarchar(15) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;


    DECLARE @sql nvarchar(max);


    SET @sql = '''' +

    ''SELECT '' +

    ''BusinessEntityID, '' +

    ''LoginID, '' +

    ''JobTitle '' +

    ''FROM HumanResources.Employee '' +

    ''WHERE 1=1 '' +

    CASE

    WHEN @BusinessEntityID IS NULL THEN ''''

    ELSE ''AND BusinessEntityID = @BusinessEntityID ''

    END +

    CASE

    WHEN @NationalIDNumber IS NULL THEN ''''

    ELSE ''AND NationalIDNumber = @NationalIDNumber ''

    END


    EXEC sp_executesql

    @sql,

    N''@BusinessEntityID int, @NationalIDNumber nvarchar(60)'',

    @BusinessEntityID,

    @NationalIDNumber;

    END;


    GO

    ```


    对于多个参数，只需在第二个参数中用逗号分隔它们的数据类型定义，然后根据需要传递相应数量的外部参数，以定义第二个参数中列出的每个变量。请注意，您可以为第二个参数使用字符串变量，如果您要定义一个很长的列表，这可能更合理——但我通常将列表放在字符串字面量中，这样可以轻松地将定义与从外部作用域传递进来的变量进行匹配。


    这里另一个需要注意的重要事项是，即使两个参数都是可选的，每次执行查询时它们都会被传递给查询。这完全没问题！将参数传递给 `sp_executesql` 的开销非常小，而试图绕过此问题要么会重新引入组合爆炸问题，要么需要非常有创意地使用嵌套动态
    SQL。这两种解决方案都难以维护或不值得花费时间，所以还是把精力留给更有趣的追求吧。


    为了验证 `sp_executesql` 是否真的如预期那样重用了查询计划，运行之前用于展示 `EXECUTE` 方法未重用计划的相同代码：


    ```sql

    DBCC FREEPROCCACHE;

    GO


    EXEC GetEmployeeData

    @BusinessEntityID = 1;

    GO


    EXEC GetEmployeeData

    @BusinessEntityID = 2;

    GO


    EXEC GetEmployeeData

    @BusinessEntityID = 3;

    GO

    ```


    运行此代码后，像之前一样查询 `sys.dm_exec_cached_plans` 视图。结果应显示两行，如下所示：


    ```text

    objtype      text

    Proc         CREATE PROCEDURE GetEmployeeData @BusinessEntityID int = NULL...

    Prepared     (@BusinessEntityID INT, @NationalIDNumber nvarchar(60))SELECT ...

    ```

