    \ possible, and you *absolutely* *must* support the application passing in object\
    \ names dynamically, you can at least do a bit to protect from the possibility\
    \ of SQL injection problems. SQL Server includes a function called `QUOTENAME`,\
    \ which bracket-delimits any input string such that it will be treated as an identifier\
    \ if concatenated with a SQL statement. For instance, `QUOTENAME('123')` returns\
    \ the value `[123]`.\n\nBy using `QUOTENAME`, the original version of the dynamic\
    \ table name stored procedure can be modified such that there will be no risk\
    \ of SQL injection:\n\n```sql\nALTER PROC SelectDataFromTable\n    @TableName\
    \ nvarchar(200);\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @sql nvarchar(max);\n\
    \    SET @sql = '' +\n        'SELECT ' +\n        'ColumnA, ' +\n        'ColumnB,\
    \ ' +\n        'ColumnC ' +\n        'FROM ' + QUOTENAME(@TableName);\n    EXEC(@sql);\n\
    END;\nGO\n```\n\nUnfortunately, this does nothing to fix the interface issues,\
    \ and modifying the database schema may still necessitate a modification to the\
    \ application code.\n\n## Summary\n\nDynamic SQL can be an extremely useful tool\
    \ for working with stored procedures that require flexibility. However, it is\
    \ important to make sure that you are using dynamic SQL properly in order to ensure\
    \ the best balance of performance, maintainability, and security. Make sure to\
    \ *always* parameterize queries and *never* trust any input from a caller, lest\
    \ a nasty payload is waiting, embedded in an otherwise innocent search string.\n\
    \n# Chapter 9: Designing Systems for Application Concurrency\n\nIt is hardly surprising\
    \ how well applications tend to both behave and scale when they have only one\
    \ concurrent user. Many developers are familiar with the wonderful feeling of\
    \ checking in complex code at the end of an exhaustingly long release cycle and\
    \ going home confident in the fact that everything works and performs according\
    \ to specification. Alas, that feeling can be instantly ripped away, transformed\
    \ into excruciating pain, when the multitude of actual end users start hammering\
    \ away at the system, and it becomes obvious that just a bit more testing of concurrent\
    \ utilization might have been helpful. Unless your application will be used by\
    \ only one user at a time, it simply can’t be designed and developed as though\
    \ it will be.\n\nConcurrency can be one of the toughest areas in application development,\
    \ because the problems that occur in this area often depend on extremely specific\
    \ timing. An issue that causes a test run to end with a flurry of exceptions on\
    \ one occasion may not fire any alarms on the next run because some other module\
    \ happened to take a few milliseconds longer than usual, lining up the cards just\
    \ right. Even worse is when the opposite happens, and a concurrency problem pops\
    \ up seemingly out of nowhere, at odd and irreproducible intervals (but *always*\
    \ right in the middle of an important demo).\n\nWhile it may be difficult or impossible\
    \ to completely eliminate these kinds of issues from your software, proper up-front\
    \ design can help you greatly reduce the number of incidents you see. The key\
    \ is to understand a few basic factors:\n- What kinds of actions can users perform\
    \ that might interfere with the activities of others using the system?\n- What\
    \ features of the database (or software system) will help or hinder your users\
    \ performing their work concurrently?\n- What are the business rules that must\
    \ be obeyed in order to make sure that concurrency is properly handled?\n\nThis\
    \ chapter delves into the different types of application concurrency models you\
    \ might need to implement in the database layer, the tools SQL Server offers to\
    \ help you design applications that work properly in concurrent scenarios, and\
    \ how to go beyond what SQL Server offers out of the box.\n\n## The Business Side:\
    \ What Should Happen When Processes Collide?\n\nBefore getting into the technicalities\
    \ of dealing with concurrency in SQL Server, it’s important to define both the\
    \ basic problem areas and the methods by which they are commonly handled. In the\
    \ context of a database application, problems arising as a result of concurrent\
    \ processes generally fall into one of three categories:\n\n### Overwriting\n\n\
    **Overwriting** of data occurs when two or more users edit the same data simultaneously,\
    \ and the changes made by one user are lost when replaced by the changes from\
    \ another. This can be a problem for several reasons: first of all, there is a\
    \ loss of effort, time, and data (not to mention considerable annoyance for the\
    \ user whose work is lost). Additionally, a more serious potential consequence\
    \ is that, depending on what activity the users were involved in at the time,\
    \ overwriting may result in data corruption at the database level. A simple example\
    \ is a point-of-sale application that reads a stock number from a table into a\
    \ variable, adds or subtracts an amount based on a transaction, and then writes\
    \ the updated number back to the table. If two sales terminals are running and\
    \ each processes a sale for the same product at exactly the same time, there is\
    \ a chance that both terminals will retrieve the initial value and that one terminal\
    \ will overwrite instead of update the other’s change.\n\n### Nonrepeatable Reading\n\
    \n**Nonrepeatable reading** is a situation that occurs when an application reads\
    \ a set of data from a database and performs some calculations on it, and then\
    \ needs to read the same set of data again for another purpose—but the original\
    \ set has changed in the interim. A common example of where this problem can manifest\
    \ itself is in drill-down reports presented by analytical systems. The reporting\
    \ system might present the user with an aggregate view of the data, calculated\
    \ based on an initial read. As the user clicks summarized data items on the report,\
    \ the reporting system might return to the database in order to read the corresponding\
    \ detail data. However, there is a chance that another user may have changed some\
    \ data between the initial read and the detail read, meaning that the two sets\
    \ will no longer match.\n\n### Blocking\n\n**Blocking** may occur when one process\
    \ is writing data and another tries to read or write the same data. Blocking can\
    \ be (and usually is) a good thing—it prevents many types of overwriting problems\
    \ and ensures that only consistent data is read by clients. However, excessive\
    \ blocking can greatly decrease an application’s ability to scale, and therefore\
    \ it must be carefully monitored and controlled.\n\nThere are several ways of\
    \ dealing with these issues, with varying degrees of ease of technical implementation.\
    \ But for the sake of this section, I’ll ignore the technical side for now and\
    \ keep the discussion focused on the business rules involved. There are four main\
    \ approaches to addressing database concurrency issues that should be considered:\n\
    \n- **Anarchy**: Assume that collisions and inconsistent data do not matter. Do\
    \ not block readers from reading inconsistent data, and do not worry about overwrites\
    \ or repeatable reads. This methodology is often used in applications in which\
    \ users have little or no chance of editing the same data point concurrently,\
    \ and in which repeatable read issues are unimportant.\n- **Pessimistic concurrency\
    \ control**: Assume that collisions will be frequent; stop them from being able\
    \ to occur. Block readers from reading inconsistent data, but do not necessarily\
    \ worry about repeatable reads. To avoid overwrites, do not allow anyone to begin\
    \ editing a piece of data that’s being edited by someone else.\n- **Optimistic\
    \ concurrency control**: Assume that there will occasionally be some collisions,\
    \ but that it’s OK for them to be handled when they occur. Block readers from\
    \ reading inconsistent data, and let the reader know what version of the data\
    \ is being read. This enables the reader to know when repeatable read problems\
    \ occur."
