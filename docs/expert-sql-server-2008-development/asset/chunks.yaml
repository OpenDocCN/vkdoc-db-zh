    words, come out with 2010-04-23 at midnight). The granularity used will be days,
    since that is the lowest level of granularity above the units of time (milliseconds,
    seconds, minutes, and hours). The following T-SQL can be used to determine the
    number of days between the reference date of 1900-01-01 and the input date:


    DECLARE @InputDate datetime = ''20100423 13:45:43.233'';


    SELECT DATEDIFF(day, ''19000101'', @InputDate);


    Running this T-SQL, we discover that 40289 days passed between the reference date
    and the input date. Using DATEADD, that number can be added to the reference date:


    SELECT DATEADD(day, 40289, ''19000101'');


    The result of this operation is the desired truncation: 2010-04-23 00:00:00.000\.
    Because only the number of days was added back to the reference date—with no time
    portion—the date was rounded down and the time portion eliminated. Of course,
    you don’t have to run this T-SQL step by step; in a real application, you’d probably
    combine everything into one inline statement:


    SELECT DATEADD(day, DATEDIFF(day, ''19000101'', @InputDate), ''19000101'');


    Because it is a very common requirement to round down date/time values to different
    levels of granularity—to find the first day of the week, the first day of the
    month, and so on—you might find it helpful to encapsulate this logic in a reusable
    function with common named units of time, as follows: CREATE FUNCTION DateRound
    (


    @Unit varchar(32),


    @InputDate datetime


    ) RETURNS datetime


    AS


    BEGIN


    DECLARE @RefDate datetime = ''19000101'';


    SET @Unit = UPPER(@Unit);


    RETURN


    CASE(@Unit)


    WHEN ''DAY'' THEN


    DATEADD(day, DATEDIFF(day, @RefDate, @InputDate), @RefDate)


    WHEN ''MONTH'' THEN


    DATEADD(month, DATEDIFF(month, @RefDate, @InputDate), @RefDate)


    WHEN ''YEAR'' THEN


    DATEADD(year, DATEDIFF(year, @RefDate, @InputDate), @RefDate)


    WHEN ''WEEK'' THEN


    DATEADD(week, DATEDIFF(week, @RefDate, @InputDate), @RefDate)


    WHEN ''QUARTER'' THEN


    DATEADD(quarter, DATEDIFF(quarter, @RefDate, @InputDate), @RefDate)


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    END


    END;


    GO


    The following code illustrates how the DateRound() function can be used with a
    date/time value representing 08:48 a.m. on August 20, 2009:


    SELECT


    dbo.DateRound(''Day'', ''20090820 08:48''),


    dbo.DateRound(''Month'', ''20090820 08:48''),


    dbo.DateRound(''Year'', ''20090820 08:48''),


    dbo.DateRound(''Week'', ''20090820 08:48''),


    dbo.DateRound(''Quarter'', ''20090820 08:48'');


    This code returns the following results:


    2009-08-20 00:00:00.000


    2009-08-01 00:00:00.000


    2009-01-01 00:00:00.000


    2009-08-17 00:00:00.000


    2009-07-01 00:00:00.000


    „ **Note** Developers who have experience with Oracle databases may be familiar
    with the Oracle PL/SQL TRUNC() method, which provides similar functionality to
    the DateRound function described here.


    Finding Relative Dates


    Once you understand the basic pattern for truncation described in the previous
    section, you can modify it to come up with any combination of dates. Suppose,
    for example, that you want to find the last day of the month. One method is to
    find the first day of the month, add an additional month, and then subtract one
    day:


    SELECT DATEADD(day, -1, DATEADD(month, DATEDIFF(month, ''19000101'',


    @InputDate) + 1, ''19000101''));


    An alternative method to find the last day of the month is to add a whole number
    of months to a reference date that is in itself the last day of a month. For instance,
    you can use a reference date of 190012-31:


    SELECT DATEADD(month, DATEDIFF(month, ''19001231'', @InputDate), ''19001231'');


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    Note that when using this approach, it is important to choose a month that has
    31 days; what this TSQL does is to find the same day of the month as the reference
    date, on the month in which the input date lies. But, if the month has less than
    31 days, SQL Server will automatically round down to the closest date, which will
    represent the actual last date of the month in question. Had I used February 28
    instead of December 31 for the reference date, the output any time this query
    was run would be the 28th of the month.


    Other more interesting combinations are also possible. For example, a common requirement
    in


    many applications is to perform calculations based on time periods such as “every
    day between last Friday and today.” By modifying the truncation pattern a bit,
    finding “last Friday” is fairly simple—the main trick is to choose an appropriate
    reference date. In this case, to find the nearest Friday to a supplied input date,
    the reference date should be *any* Friday. We know that the number of days between
    any Friday and any other Friday is divisible by 7, and we can use that knowledge
    to truncate the current date to the nearest Friday.


    The following T-SQL finds the number of days between the reference Friday, January
    7, 2000, and the input date, February 9, 2009:


    DECLARE @Friday date = ''20000107'';


    SELECT DATEDIFF(day, @Friday, ''20090209'');


    The result is 3321, which of course is an integer. Taking advantage of SQL Server’s
    integer math properties, dividing the result by 7, and then multiplying it by
    7 again will round it down to the nearest number divisible by seven, 3318:


    SELECT (3321 / 7) * 7;'
  trans: "\n同时需要注意的是，`DATEDIFF` 函数保持了“开始”和“结束”时间的概念，如果调换这两个时间参数，结果会发生变化。将前面的查询修改为先传入\
    \ 2 月 14 日再传入 2 月 13 日，输出结果会变成 `-24`。\n\n`DATEADD` 函数接受三个参数：时间粒度、要添加的时间量以及输入日期。例如，下面的查询将\
    \ 2010 年 2 月 13 日午夜增加 24 小时，输出结果为 `2010-01-14 00:00:00.000`：\n\n```sql\nSELECT\
    \ DATEADD(hour, 24, '20100113');\n```\n\n`DATEADD` 函数也接受负数作为时间量，这会导致相应的时间量被减去而非加上，如本例所示。\n\
    \n### 截断 `datetime` 值的时间部分\n\n在 SQL Server 2008 之前的版本中，仅提供 `datetime` 和 `smalldatetime`\
    \ 这两种有限的时间数据类型，这意味着无法存储不带关联时间部分的日期值。因此，开发人员提出了多种“截断” `datetime` 值的方法，以便在不改变底层数据类型的情况下，能够不考虑时间部分而将其作为日期进行查询。这些方法通常将\
    \ `datetime` 值的时间部分向下舍入到 `00:00:00`（午夜），使得结果唯一有效数字代表该值的日期、月份和年份。\n\n虽然随着 `date`\
    \ 数据类型的引入，不再需要执行此类截断，但所采用的“舍入”方法作为其他时间查询的基础仍然非常有用。为了演示，让我首先将截断过程分解为几个组成部分：\n\n\
    1.  首先，你必须决定要将结果舍入到的粒度级别。例如，如果你想移除时间值的秒和毫秒，可以使用分钟为单位向下舍入。同样，要移除整个时间部分，可以使用天为单位向下舍入。\n\
    2.  一旦决定了粒度级别，就选择一个参考日期/时间。我通常使用 `1900-01-01` 的午夜，但你可以使用正在使用的数据类型范围内的任何日期/时间。\n\
    3.  使用 `DATEDIFF` 函数，在所选粒度级别上，找出参考日期/时间与你想要截断的日期/时间之间的差值。\n4.  最后，使用 `DATEADD`\
    \ 将 `DATEDIFF` 函数的输出加到与你用来计算差值的相同参考日期/时间上。结果将是原始日期/时间的截断值。\n\n通过一个例子来说明应该会更清晰一些。假设你希望从\
    \ `2010-04-23 13:45:43.233` 开始，截断时间部分（换句话说，得到 `2010-04-23` 的午夜）。由于天是高于时间单位（毫秒、秒、分钟和小时）的最低粒度级别，因此将使用天作为粒度。可以使用以下\
    \ T-SQL 来确定参考日期 `1900-01-01` 与输入日期之间的天数：\n\n```sql\nDECLARE @InputDate datetime\
    \ = '20100423 13:45:43.233';\nSELECT DATEDIFF(day, '19000101', @InputDate);\n\
    ```\n\n运行此 T-SQL 后，我们发现参考日期和输入日期之间相差 40289 天。使用 `DATEADD` 可以将该数字加到参考日期上：\n\n```sql\n\
    SELECT DATEADD(day, 40289, '19000101');\n```\n\n此操作的结果就是所需的截断值：`2010-04-23 00:00:00.000`。因为只将天数加回到参考日期——没有时间部分——所以日期被向下舍入，时间部分被消除。当然，你不必一步步运行这个\
    \ T-SQL；在实际应用中，你可能会将所有内容合并到一个内联语句中：\n\n```sql\nSELECT DATEADD(day, DATEDIFF(day,\
    \ '19000101', @InputDate), '19000101');\n```\n\n由于将日期/时间值向下舍入到不同粒度级别是非常常见的需求——例如查找一周的第一天、一个月的第一天等——你可能会发现将此逻辑封装在一个具有常用命名时间单位的可重用函数中很有帮助，如下所示：\n\
    \n```sql\nCREATE FUNCTION DateRound (\n    @Unit varchar(32),\n    @InputDate\
    \ datetime\n) RETURNS datetime\nAS\nBEGIN\n    DECLARE @RefDate datetime = '19000101';\n\
    \    SET @Unit = UPPER(@Unit);\n    RETURN\n    CASE(@Unit)\n        WHEN 'DAY'\
    \ THEN\n            DATEADD(day, DATEDIFF(day, @RefDate, @InputDate), @RefDate)\n\
    \        WHEN 'MONTH' THEN\n            DATEADD(month, DATEDIFF(month, @RefDate,\
    \ @InputDate), @RefDate)\n        WHEN 'YEAR' THEN\n            DATEADD(year,\
    \ DATEDIFF(year, @RefDate, @InputDate), @RefDate)\n        WHEN 'WEEK' THEN\n\
    \            DATEADD(week, DATEDIFF(week, @RefDate, @InputDate), @RefDate)\n \
    \       WHEN 'QUARTER' THEN\n            DATEADD(quarter, DATEDIFF(quarter, @RefDate,\
    \ @InputDate), @RefDate)\n    END\nEND;\nGO\n```\n\n以下代码演示了如何将 `DateRound()` 函数与表示\
    \ 2009 年 8 月 20 日上午 08:48 的日期/时间值一起使用：\n\n```sql\nSELECT\n    dbo.DateRound('Day',\
    \ '20090820 08:48'),\n    dbo.DateRound('Month', '20090820 08:48'),\n    dbo.DateRound('Year',\
    \ '20090820 08:48'),\n    dbo.DateRound('Week', '20090820 08:48'),\n    dbo.DateRound('Quarter',\
    \ '20090820 08:48');\n```\n\n此代码返回以下结果：\n\n```\n2009-08-20 00:00:00.000\n2009-08-01\
    \ 00:00:00.000\n2009-01-01 00:00:00.000\n2009-08-17 00:00:00.000\n2009-07-01 00:00:00.000\n\
    ```\n\n`注意`：具有 Oracle 数据库经验的开发人员可能熟悉 Oracle PL/SQL 的 `TRUNC()` 方法，它提供了与此处描述的 `DateRound`\
    \ 函数类似的功能。\n\n### 查找相对日期\n\n一旦你理解了上一节描述的基本截断模式，就可以修改它来得出任何日期组合。例如，假设你想找到该月的最后一天。一种方法是找到该月的第一天，增加一个月，然后减去一天：\n\
    \n```sql\nSELECT DATEADD(day, -1, DATEADD(month, DATEDIFF(month, '19000101', @InputDate)\
    \ + 1, '19000101'));\n```\n\n另一种查找该月最后一天的方法是将整个月份添加到本身是某月最后一天的参考日期上。例如，你可以使用参考日期\
    \ `190012-31`：\n\n```sql\nSELECT DATEADD(month, DATEDIFF(month, '19001231', @InputDate),\
    \ '19001231');\n```\n\n请注意，使用这种方法时，选择一个有 31 天的月份非常重要；此 T-SQL 所做的是在输入日期所在的月份中找到与参考日期相同的月份日期。但是，如果该月份少于\
    \ 31 天，SQL Server 会自动向下舍入到最近的日期，该日期将代表所讨论月份的实际最后日期。如果我使用 2 月 28 日而不是 12 月 31 日作为参考日期，那么每次运行此查询的输出都将是该月的\
    \ 28 号。\n\n其他更有趣的组合也是可能的。例如，许多应用程序中的一个常见需求是根据“从上周五到今天之间的每一天”等时间段执行计算。通过稍微修改截断模式，查找“上周五”是相当简单的——主要技巧是选择合适的参考日期。在这种情况下，要找到与提供的输入日期最近的星期五，参考日期应该是*任何*一个星期五。我们知道任何星期五与任何其他星期五之间的天数都能被\
    \ 7 整除，我们可以利用这一知识将当前日期截断到最近的星期五。\n\n以下 T-SQL 查找参考星期五（2000 年 1 月 7 日）与输入日期（2009\
    \ 年 2 月 9 日）之间的天数：\n\n```sql\nDECLARE @Friday date = '20000107';\nSELECT DATEDIFF(day,\
    \ @Friday, '20090209');\n```\n\n结果是 `3321`，这当然是一个整数。利用 SQL Server 的整数数学特性，将结果除以\
    \ 7，然后再乘以 7，就会将其向下舍入到能被 7 整除的最近数字 `3318`：\n\n```sql\nSELECT (3321 / 7) * 7;\n\
    ```\n"
- fmt: "## Working with Temporal Data\n\nAdding 3318 days to the original reference\
    \ date of January 7, 2000 results in the desired output, the “last Friday” before\
    \ February 9, 2009, which was on February 6, 2009:\n\n```sql\nSELECT DATEADD(day,\
    \ 3318, '20000107')\n```\n\nAs with the previous example, this can be simplified\
    \ (and clarified) by combining everything inline:\n\n```sql\nDECLARE @InputDate\
    \ date = '20090209';\nDECLARE @Friday date = '20000107';\nSELECT DATEADD(day,\
    \ ((DATEDIFF(day, @Friday, @InputDate) / 7) * 7), @Friday);\n```\n\nA further\
    \ simplification to the last statement is also possible. Currently, the result\
    \ of the inner `DATEDIFF` is divided by 7 to calculate a round number of weeks,\
    \ and then multiplied by 7 again to produce the equivalent number of days to add\
    \ using the `DATEADD` method. However, it is unnecessary to perform the multiplication\
    \ to days when you can specify the amount of time to add in weeks, as follows:\n\
    \n```sql\nSELECT DATEADD(week, (DATEDIFF(day, @Friday, @InputDate) / 7), @Friday);\n\
    ```\n\nNote that, in situations where the input date is a Friday, these examples\
    \ will return the input date itself. If you really want to return the “last” Friday\
    \ every time, and never the input date itself—even if it is a Friday—a small modification\
    \ is required. To accomplish this, you must use two reference dates: one representing\
    \ any known Friday, and one that is any other day that lies within one week following\
    \ that reference Friday (I recommend the next day, for simplicity). By calculating\
    \ the number of days elapsed between this second reference date and the input\
    \ date, the rounded number of weeks will be one week lower if the input date is\
    \ a Friday, meaning that the result will always be the previous Friday. The following\
    \ T-SQL does this for a given input date:\n\n```sql\nDECLARE @InputDate date =\
    \ '20100423';\nDECLARE @Friday date = '20000107';\nDECLARE @Saturday date = DATEADD(day,\
    \ 1, @Friday);\nSELECT DATEADD(week, (DATEDIFF(day, @Saturday, @InputDate) / 7),\
    \ @Friday);\n```\n\nBy using this pattern and switching the reference date, you\
    \ can easily find the last of any day of the week given an input date. To find\
    \ the “next” one of a given day (e.g., “next Friday”), simply add one week to\
    \ the result of the inner calculation before adding it to the reference date:\n\
    \n```sql\nDECLARE @InputDate datetime = GETDATE();\nDECLARE @Friday datetime =\
    \ '2000-01-07';\nSELECT DATEADD(week, (DATEDIFF(day, @Friday, @InputDate) / 7)\
    \ +1, @Friday);\n```\n\nAs a final example of what you can do with date/time calculations,\
    \ a slightly more complex requirement is necessary. Say that you’re visiting the\
    \ Boston area and want to attend a meeting of the New England SQL Server Users\
    \ Group. The group meets on the second Thursday of each month. Given an input\
    \ date, how do you find the date of the next meeting?\n\nTo answer this question\
    \ requires a little bit of thinking about the problem. The earliest date on which\
    \ the second Thursday can fall occurs when the first day of the month is a Thursday.\
    \ In such cases, the second Thursday occurs on the eighth day of the month. The\
    \ latest date on which the second Thursday can fall occurs when the first of the\
    \ month is a Friday, in which case the second Thursday will be the 14th. So, for\
    \ any given month, the “last Thursday” (in other words, the most recent Thursday)\
    \ as of and including the 14th will be the second Thursday of the month. The following\
    \ T-SQL uses this approach:\n\n```sql\nDECLARE @InputDate date = '20100101';\n\
    DECLARE @Thursday date = '20000914';\nDECLARE @FourteenthOfMonth date = DATEADD(month,\
    \ DATEDIFF(month, @Thursday, @InputDate), @Thursday);\nSELECT DATEADD(week, (DATEDIFF(day,\
    \ @Thursday, @FourteenthOfMonth) / 7), @Thursday);\n```\n\nOf course, this doesn’t\
    \ find the *next* meeting; it finds the meeting for the month of the input date.\
    \ To find the next meeting, a `CASE` expression will be necessary, in addition\
    \ to an observation about second Thursdays: if the second Thursday of a month\
    \ falls on the eighth, ninth, or tenth, the next month’s second Thursday is five\
    \ weeks away. Otherwise, the next month’s second Thursday is four weeks away.\n\
    \nTo find the day of the month represented by a given date/time instance, use\
    \ T-SQL’s `DATEPART` function, which takes the same date granularity inputs as\
    \ `DATEADD` and `DATEDIFF`. The following T-SQL combines all of these techniques\
    \ to find the next date for a New England SQL Server Users Group meeting, given\
    \ an input date:\n\n```sql\nDECLARE @InputDate date = GETDATE();\nDECLARE @Thursday\
    \ date = '20000914';\nDECLARE @FourteenthOfMonth date = DATEADD(month, DATEDIFF(month,\
    \ @Thursday, @InputDate), @Thursday);\nDECLARE @SecondThursday date = DATEADD(week,\
    \ (DATEDIFF(day, @Thursday, @FourteenthOfMonth) / 7), @Thursday);\nSELECT\n  CASE\n\
    \    WHEN @InputDate <= @SecondThursday\n      THEN @SecondThursday\n    ELSE\n\
    \      DATEADD(\n        week,\n        CASE\n          WHEN DATEPART(day, @SecondThursday)\
    \ <= 10 THEN 5\n          ELSE 4\n        END,\n        @SecondThursday)\n  END;\n\
    ```\n\nFinding complex dates like the second Thursday of a month is not a very\
    \ common requirement unless you’re writing a scheduling application. More common\
    \ are requirements along the lines of “find all of today’s rows.” Combining the\
    \ range techniques discussed in the previous section with the date/time calculations\
    \ shown here, it becomes easy to design stored procedures that both efficiently\
    \ and dynamically query for required time periods.\n\n## How Many Candles on the\
    \ Birthday Cake?\n\nAs a final example of date/time calculations in T-SQL, consider\
    \ a seemingly simple task: finding out how many years old you are as of today.\
    \ The obvious answer is of course the following:\n\n```sql\nSELECT DATEDIFF(year,\
    \ @YourBirthday, GETDATE());\n```\n\nUnfortunately, this answer—depending on the\
    \ current day—is wrong. Consider someone born on March 25, 1965. On March 25,\
    \ 2010, that person’s 45th birthday should be celebrated. Yet according to SQL\
    \ Server, that person was already 45 on March 24, 2010:\n\n```sql\nSELECT DATEDIFF(year,\
    \ '19650325', '20100324');\n```\n\nIn fact, according to SQL Server, this person\
    \ was 45 throughout the whole of 2010, starting on January 1. Happy New Year and\
    \ happy birthday combined, thanks to the magic of SQL Server? Probably not; the\
    \ discrepancy is due to the way SQL Server calculates date differences. Only the\
    \ date/time component being differenced is considered, and any components below\
    \ are truncated. This feature makes the previous date/time truncation examples\
    \ work, but makes age calculations fail because when differencing years, days\
    \ and months are not taken into account.\n\nTo get around this problem, a `CASE`\
    \ expression must be added that subtracts one year if the day and month of the\
    \ current date is less than the day and month of the input date—in other words,\
    \ if the person has yet to celebrate their birthday in the current year. The following\
    \ T-SQL both accomplishes the primary goal, and as an added bonus, also takes\
    \ leap years into consideration:\n\n```sql\nSELECT\n  DATEDIFF(YEAR, @YourBirthday,\
    \ GETDATE()) -\n  CASE\n    WHEN 100 * MONTH(GETDATE()) + DAY(GETDATE())\n   \
    \    < 100 * MONTH(@YourBirthday) + DAY(@YourBirthday) THEN 1\n    ELSE 0\n  END;\n\
    ```\n\nNote that this T-SQL uses the `MONTH` and `DAY` functions, which are shorthand\
    \ for `DATEPART(month, <date>)` and `DATEPART(day, <date>)`, respectively.\n\n\
    ## Defining Periods Using Calendar Tables\n\nGiven the complexity of doing date/time\
    \ calculations in order to query data efficiently, it makes sense to seek alternative\
    \ techniques in some cases. For the most part, using the date/time calculation\
    \ and range-matching techniques discussed in the previous section will yield the\
    \ best possible performance."
