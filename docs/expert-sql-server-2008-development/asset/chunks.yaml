    desired, but fortunately there is an easy solution. In order to create an HMAC
    compliant with the FIPS standard, based on a strong hashing algorithm, we can
    employ a CLR user-defined function that uses methods provided by the .NET System.Security
    namespace instead. The following code listing illustrates the C# required to create
    a reusable class that can be used to generate HMAC values for all supported hash
    algorithms for a given key:


    [SqlFunction(IsDeterministic = true, DataAccess = DataAccessKind.None)]


    public static SqlBytes GenerateHMAC


    (


    SqlString Algorithm,


    SqlBytes PlainText,


    SqlBytes Key


    )


