    *Beginning Spatial With* *SQL Server 2008*


    The topics covered in this book represent interesting, sometimes complex, and
    frequently misunderstood facets of database development. Understanding these areas
    will set you apart as an expert SQL Server developer. Some of the topics are hotly
    debated in the software community, and there is not always a single “best” solution
    to any given problem. Instead, I’ll show you a variety of approaches, and give
    you the information and tools to decide which is most appropriate for your particular
    environment.


    After reading this book, you will gain an appreciation of areas such as testing
    and exception handling, to ensure your code is robust, scalable, and easy to maintain.
    You’ll learn how to create secure databases by controlling access to sensitive
    information, and you’ll find out how to encrypt data to protect it from prying
    eyes. You’ll also learn how to create flexible, high-performance applications
    using dynamic SQL and SQLCLR, and you’ll discover various models of handling concurrent
    users of a database. Finally, I’ll teach you how to deal with complex data representing
    temporal, spatial, and hierarchical information. Together, we’ll uncover some
    of the interesting issues that can arise in these situations.


    I’ve worked hard on this book, to make it useful to readers of all skill levels.
    Beginner, expert, or in between, you’ll find something of use in this book. My
    hope is that it helps you become truly an expert SQL Server developer.


    Alastair Aitchison


    Adam Machanic


    Author of *Expert SQL Server 2005 Development*


