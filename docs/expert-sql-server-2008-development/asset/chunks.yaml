    which


    by default is set to 5MB. Increasing the maximum file size will help to


    minimize the number of rollover files created during the trace. I generally set


    this to 200MB as a starting point.


    6\. Once you have finished editing, execute the script. The trace will begin


    collecting data in the background, and the generated script will return a trace


    identifier, TraceID, which you should make note of as it will be required to


    control the trace later.


    After following these steps, the trace will be running, and the output of all
    specified events will be written to the log file, so now is the time to execute
    your test suite. When you are done tracing, you must stop and close the trace
    by using the sp_trace_setstatus stored procedure, supplying the TraceID trace
    60


