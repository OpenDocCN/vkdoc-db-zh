  trans: "\n此版本的存储过程看起来很棒，也易于理解。`COALESCE` 函数会返回传入其参数列表中的第一个 `NULL` 值。因此，如果存储过程的任一参数为\
    \ `NULL`，`COALESCE` 将会“直通”，将列的值与其自身进行比较——至少在理论上，这似乎不需要任何处理，因为它总是成立的。\n\n不幸的是，由于\
    \ `COALESCE` 函数将表中的列用作输入，它无法在查询执行前进行确定性求解。结果是，无论提供何种参数组合，该函数都会针对表的每一行求解一次。这导致了*一致的*性能结果，但可能不是好的那种；所有四种参数组合都产生了相同的查询计划：一次聚集索引扫描，估计开销为\
    \ `0.0080454`，并产生九次逻辑读取。这比涉及 `BusinessEntityID` 列的查询的 I/O 高出四倍多——性能消耗相当大。\n\n\
    ## 使用 OR\n\n类似于使用 `COALESCE` 的版本，有一个版本使用 `OR` 来仅在参数不为 `NULL` 时有条件地设置参数：\n\n```sql\n\
    ALTER PROCEDURE GetEmployeeData\n    @BusinessEntityID int = NULL,\n    @NationalIDNumber\
    \ nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    SELECT\n        BusinessEntityID,\n\
    \        LoginID,\n        JobTitle\n    FROM\n        HumanResources.Employee\n\
    \    WHERE\n        (@BusinessEntityID IS NULL OR BusinessEntityID = @BusinessEntityID)\n\
    \        AND (@NationalIDNumber IS NULL OR @NationalIDNumber = NationalIDNumber);\n\
    END;\nGO\n```\n\n这个版本，虽然在思路上与使用 `COALESCE` 的版本相似，但具有一些有趣的性能特性。根据你第一次调用它时使用的参数，你会看到截然不同的结果。如果你足够幸运，第一次调用时没有参数，结果将是一次索引扫描，产生九次逻辑读取——并且之后无论传入何种参数组合，都将产生相同的读取次数。然而，如果你第一次调用存储过程时仅使用了\
    \ `@BusinessEntityID` 参数，由此产生的计划将只使用四次逻辑读取——直到你碰巧在没有任何参数的情况下调用该过程，这将产生巨大的 `582`\
    \ 次读取。\n\n鉴于糟糕计划可能导致的 I/O 令人惊讶地激增，以及你最终会得到何种性能特性的不可预测性，这无疑是最糟糕的选择。\n\n## 使用 BETWEEN\
    \ 和 LIKE 与 COALESCE\n\n可以使用的最后一种方法更具创意，也可能产生稍好的结果。以下版本的存储过程展示了其实现方式：\n\n```sql\n\
    ALTER PROCEDURE GetEmployeeData\n    @BusinessEntityID int = NULL,\n    @NationalIDNumber\
    \ nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    SELECT\n        BusinessEntityID,\n\
    \        LoginID,\n        JobTitle\n    FROM\n        HumanResources.Employee\n\
    \    WHERE\n        BusinessEntityID BETWEEN COALESCE(@BusinessEntityID, -2147483648)\
    \ AND\n            COALESCE(@BusinessEntityID, 2147483647)\n        AND NationalIDNumber\
    \ LIKE COALESCE(@NationalIDNumber, N'%');\nEND;\nGO\n```\n\n如果你对这个存储过程的逻辑感到有点困惑，那么你现在就熟悉了我不推荐这种技术的第一个原因：如果你不完全理解它是如何工作的，它的可维护性就相对较低。使用它几乎可以保证你会创建出让未来试图维护它们的其他人感到困惑的存储过程。虽然这可能对工作保障有好处，但以此为目的使用它可能并不是一个正当的目标。\n\
    \n此存储过程通过使用 `COALESCE` 来抵消 `NULL` 参数，方法是为整数谓词 (`BusinessEntityID`) 替换为最小和最大条件，并为字符串谓词\
    \ (`NationalIDNumber`) 替换一个将匹配任何内容的 `LIKE` 表达式。这种方法的运作方式如下：如果 `@BusinessEntityID`\
    \ 为 `NULL`，则 `BusinessEntityID` 谓词实际上变为 `BusinessEntityID BETWEEN -2147483648\
    \ AND 2147483647`——换句话说，即所有可能的整数。如果 `@BusinessEntityID` 不为 `NULL`，谓词则变为 `BusinessEntityID\
    \ BETWEEN @BusinessEntityID AND @BusinessEntityID`。这等价于 `BusinessEntityID=@BusinessEntityID`。\n\
    \n`NationalIDNumber` 谓词的基本逻辑相同，尽管因为它是字符串而不是整数，所以使用了 `LIKE` 而不是 `BETWEEN`。如果 `@NationalIDNumber`\
    \ 为 `NULL`，谓词变为 `NationalIDNumber LIKE N'%'`。这将匹配 `NationalIDNumber` 列中的任何字符串。另一方面，如果\
    \ `@NationalIDNumber` 不为 `NULL`，谓词变为 `NationalIDNumber LIKE @NationalIDNumber`，这等价于\
    \ `NationalIDNumber=@NationalIDNumber`——前提是 `@NationalIDNumber` 不包含字符串表达式。此谓词也可以使用\
    \ `BETWEEN` 来编写，以避免字符串表达式问题（例如，`BETWEEN N'' AND REPLICATE(nchar(1000), 15)`）。然而，这种方法不仅比\
    \ `LIKE` 表达式更难阅读，而且由于排序规则问题而充满潜在问题（这就是为什么在示例中我只用到 `nchar(1000)` 而不是 `nchar(65535)`）。\n\
    \n当然，真正的问题是性能。不幸的是，这个存储过程设法迷惑了查询优化器，导致每次调用都生成相同的计划。在每种情况下，该计划都涉及对表的聚集索引查找，估计开销为\
    \ `0.0033107`，如图 8-4 所示。不幸的是，这个估计被证明是高度不一致的，因为实际逻辑读取的数量会根据传递给过程的参数而有很大差异。\n\n\
    *图 8-4. 传递给存储过程的每组参数都会产生相同的执行计划。*\n\n如果两个参数都被传递，或者传递了 `@BusinessEntityID` 但没有传递\
    \ `@NationalIDNumber`，逻辑读取次数为三。虽然这比之前版本的存储过程所需的九次逻辑读取要好得多，但在两种情况下，它仍然比基线所需的两次逻辑读取多出\
    \ 50% 的 I/O。当仅传递 `@NationalIDNumber` 时，这个估计计划就完全失效了，因为无法使用聚集索引高效地满足对 `NationalIDNumber`\
    \ 列的查询。在那种情况和没有传递参数的情况下，都会报告九次逻辑读取。对于 `NationalIDNumber` 谓词来说，这是一个相当大的失败，因为存储过程为相同的结果所做的工作是基线的两倍多。\n\
    \n## 动态化：使用 EXECUTE\n\n当然，解决上述所有静态 SQL 问题的方法是使用动态 SQL。在存储过程中构建动态 SQL 很简单，代码相对容易理解，而且正如我将展示的，它可以提供出色的性能。然而，需要注意各种潜在问题，其中最重要的是安全问题。随着示例的进行，我将解释如何处理这些问题。\n\
    \n动态 SQL 的真正好处在于，为每次调用查询生成的执行计划将仅针对该时刻实际使用的谓词进行优化。静态 SQL 解决方案的主要问题，除了可维护性之外，是额外的谓词迷惑了查询优化器，导致它创建低效的计划。动态\
    \ SQL 通过不在查询中包含任何多余内容来解决这个问题。\n\n在存储过程中实现动态 SQL 最简单的方法是使用 `EXECUTE` 语句。该语句接受一个字符串输入并执行字符串中包含的任何\
    \ SQL。以下批处理展示了其最简单——也是效果最差——的形式：\n\n```sql\nEXEC('SELECT\n        BusinessEntityID,\n\
    \        LoginID,\n        JobTitle\n    FROM HumanResources.Employee');\nGO\n\
    ```\n"
- fmt: "## CHAPTER 8: DYNAMIC T-SQL\n\nNote that in this example (and all other examples\
    \ in this chapter), I use the truncated form of `EXECUTE`. This seems to be a\
    \ de facto standard for SQL Server code; I very rarely see code that uses the\
    \ full form with the added “UTE.” Although this is only a savings of three characters,\
    \ I am very used to seeing it, and for some reason it makes a lot more sense to\
    \ me when reading SQL than seeing the full `EXECUTE` keyword.\n\nIn this case,\
    \ a string literal is passed to `EXECUTE`, and this doesn’t really allow for anything\
    \ very “dynamic.” For instance, to add a predicate on `BusinessEntityID` to the\
    \ query, the following would not work:\n\n```sql\nDECLARE @BusinessEntityID int\
    \ = 28;\n\nEXEC('SELECT\n    BusinessEntityID,\n    LoginID,\n    JobTitle\nFROM\
    \ HumanResources.Employee\nWHERE BusinessEntityID = ' + CONVERT(varchar, @BusinessEntityID));\n\
    \nGO\n```\n\nThis fails (with an “incorrect syntax” exception) because of the\
    \ way `EXECUTE` is parsed by the SQL Server engine. SQL Server performs only one\
    \ pass to parse the syntax, and then tries to concatenate and execute the SQL\
    \ in a second step. But due to the fact that the first step does not include a\
    \ stage for inline expansion, the `CONVERT` is still a `CONVERT`, rather than\
    \ a literal, when it’s time for concatenation.\n\nThe solution to this issue is\
    \ quite simple. Define a variable and assign the dynamic SQL to it, and *then*\
    \ call `EXECUTE`:\n\n```sql\nDECLARE @BusinessEntityID int = 28;\nDECLARE @sql\
    \ nvarchar(max);\n\nSET @sql = 'SELECT\n    BusinessEntityID,\n    LoginID,\n\
    \    JobTitle\nFROM HumanResources.Employee\nWHERE BusinessEntityID = ' + CONVERT(VARCHAR,\
    \ @BusinessEntityID);\n\nEXEC (@sql);\n\nGO\n```\n\nThe string variable, `@sql`,\
    \ can be manipulated in any way in order to form the desired dynamic SQL string,\
    \ and since it’s a variable, various code paths can be created using control-of-flow\
    \ statements. In other words, forming the dynamic SQL is now limited only by the\
    \ tools available within the T-SQL language for string manipulation.\n\nA first\
    \ shot at optional inclusion of both the `BusinessEntityID` and `NationalIDNumber`\
    \ predicates follows:\n\n```sql\nDECLARE @BusinessEntityID int = 28;\nDECLARE\
    \ @NationalIDNumber nvarchar(15) = N'14417807';\nDECLARE @sql nvarchar(max);\n\
    \nSET @sql = 'SELECT\n    BusinessEntityID,\n    LoginID,\n    JobTitle\nFROM\
    \ HumanResources.Employee ';\n\nIF (@BusinessEntityID IS NOT NULL AND @NationalIDNumber\
    \ IS NOT NULL)\nBEGIN\n    SET @sql = @sql +\n        'WHERE BusinessEntityID\
    \ = ' + CONVERT(nvarchar, @BusinessEntityID) +\n        ' AND NationalIDNumber\
    \ = N''' + @NationalIDNumber + '''';\nEND\nELSE IF (@BusinessEntityID IS NOT NULL)\n\
    BEGIN\n    SET @sql = @sql +\n        'WHERE BusinessEntityID = ' +\n        CONVERT(nvarchar,\
    \ @BusinessEntityID);\nEND\nELSE IF (@NationalIDNumber IS NOT NULL)\nBEGIN\n \
    \   SET @sql = @sql +\n        'WHERE NationalIDNumber = N''' + @NationalIDNumber\
    \ + '''';\nEND\n\nEXEC(@sql);\n\nGO\n```\n\nIf this looks sickeningly familiar,\
    \ you’ve been doing a good job of paying attention as the chapter has progressed;\
    \ this example has the same maintenance issues as the first shot at a static SQL\
    \ stored procedure. Adding additional parameters will create a combinatorial explosion,\
    \ making this solution completely unmaintainable. In addition, the SQL statement\
    \ has been broken up into two component parts, making it lack a good sense of\
    \ flow. Think about how bad this might get if you had to add `ORDER BY` or `GROUP\
    \ BY` clauses.\n\nTo solve this problem, I like to concatenate my dynamic SQL\
    \ in one shot, using `CASE` expressions instead of control-of-flow statements\
    \ in order to optionally concatenate sections. The following example should serve\
    \ to illustrate how this works:\n\n```sql\nDECLARE @BusinessEntityID int = 28;\n\
    DECLARE @NationalIDNumber nvarchar(15) = N'14417807';\nDECLARE @sql nvarchar(max);\n\
    \nSET @sql = 'SELECT\n    BusinessEntityID,\n    LoginID,\n    JobTitle\nFROM\
    \ HumanResources.Employee\nWHERE 1=1' +\n    CASE\n        WHEN @BusinessEntityID\
    \ IS NULL THEN ''\n        ELSE 'AND BusinessEntityID = ' + CONVERT(nvarchar,\
    \ @BusinessEntityID)\n    END +\n    CASE\n        WHEN @NationalIDNumber IS NULL\
    \ THEN ''\n        ELSE 'AND NationalIDNumber = N''' + @NationalIDNumber + ''''\n\
    \    END;\n\nEXEC(@sql);\n\nGO\n```"
