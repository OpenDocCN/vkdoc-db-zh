    ownership chain would also fail if the execution context changed within the stored
    procedure. For example, ownership chaining will not work with dynamic SQL (for
    more information on dynamic SQL, refer to Chapter 8).


    In the case of a stored procedure in one database requesting access to an object
    in another


    database, it is possible to maintain an ownership chain, but it gets quite a bit
    more complex, and security is much more difficult to maintain. To set up **cross-database
    ownership chaining**, the user that owns the stored procedure and the referenced
    table(s) must be associated with a server-level login, and each database must
    have the DB_CHAINING property set using the ALTER DATABASE command. That


    property tells SQL Server that either database can participate in a cross-database
    ownership chain, either as source or target—but there is no way to control the
    direction of the chain, so setting the option could open up security holes inadvertently.


    I recommend that you avoid cross-database ownership chaining whenever possible,
    and instead


    call stored procedures in the remote database. Doing so will result in a more
    secure, more flexible solution. For example, moving databases to separate servers
    is much easier if they do not depend on one another for authentication. In addition,
    by using schemas appropriately, splitting objects into multiple 111


    CHAPTER 5 „ PRIVILEGE AND AUTHORIZATION


    databases is no longer as important as it once was. Consider avoiding multiple
    databases altogether, if at all possible.


    Privilege Escalation Without Ownership Chains


    Ownership chaining will not work if the object owner does not match the module
    owner, or if dynamic SQL is used. In these cases, you’ll have to use one of the
    two other kinds of privilege escalation provided by SQL Server: an extension to
    stored procedures using the EXECUTE AS clause, or module signing using certificates.


    Using the EXECUTE AS clause with stored procedures is an easy and effective method
    of escalating permissions, but is not nearly as flexible as that which can be
    achieved using certificates. With certificates, permissions are additive rather
    than impersonated—the additional permissions provided by the certificate extend
    rather than replace the permissions of the calling principal. In the following
    sections, I’ll discuss these alternative methods of privilege escalation in more
    detail.


    Stored Procedures and EXECUTE AS


    As described in a previous section in this chapter, the EXECUTE AS command can
    be used on its own in TSQL batches in order to temporarily impersonate other users.
    However, EXECUTE AS is also available for stored procedures, functions, and triggers.
    The examples in this section only focus on stored procedures, but the same principles
    can also be applied to the other object types.


    To use EXECUTE AS to change the impersonation context of an entire stored procedure,
    add it to the CREATE PROCEDURE statement as in the following example:


    CREATE PROCEDURE SelectSensitiveDataByImpersonation


    WITH EXECUTE AS ''Louis''


    AS


    BEGIN


    SET NOCOUNT ON;


    SELECT *


    FROM dbo.SensitiveData;


    END;


    GO


    When this stored procedure is executed by a user, all operations within the procedure
    will be evaluated as if they are being run by the Louis user rather than by the
    calling user (as is the default behavior). This includes any dynamic SQL operations,
    or manipulation of data in tables that the Louis user has access to. When the
    stored procedure has completed execution, context will be automatically reverted
    back to that of the caller.


    Keep in mind that use of EXECUTE AS does not break ownership chains, but rather
    can be used to add to them and create additional flexibility. For instance, consider
    the following two users and associated tables:


    CREATE USER Kevin


    WITHOUT LOGIN;


    GO


    CREATE TABLE KevinsData


    CHAPTER 5 „ PRIVILEGE AND AUTHORIZATION


    (


    SomeData int


    );


    GO'
  trans: "\n# 所有权链与权限提升\n\n如果以上任一条件不成立，所有权链就会中断，Hugo 就必须通过其他方式获得授权才能从表中查询数据。如果执行上下文在存储过程内部发生变化，所有权链也会失效。例如，所有权链不适用于动态\
    \ SQL（有关动态 SQL 的更多信息，请参见第 8 章）。\n\n## 跨数据库所有权链\n\n当一个数据库中的存储过程请求访问另一个数据库中的对象时，虽然有可能维持所有权链，但这会变得相当复杂，安全性也更难维护。要设置\
    \ `cross-database ownership chaining`，拥有存储过程和所引用表的用户必须与一个服务器级别的登录名关联，并且每个数据库都必须使用\
    \ `ALTER DATABASE` 命令将 `DB_CHAINING` 属性设置为开启。该属性告知 SQL Server，两个数据库都可以参与跨数据库所有权链，无论是作为源还是目标——但无法控制链的方向，因此启用此选项可能会无意中打开安全漏洞。\n\
    \n我建议尽可能避免使用 `cross-database ownership chaining`，而是调用远程数据库中的存储过程。这样做将产生一个更安全、更灵活的解决方案。例如，如果数据库之间不依赖彼此进行身份验证，那么将数据库移动到不同的服务器上会容易得多。此外，通过适当使用架构，将对象拆分到多个数据库中已不像过去那样重要。如有可能，请考虑完全避免使用多个数据库。\n\
    \n## 无所有权链的权限提升\n\n如果对象所有者与模块所有者不匹配，或者使用了动态 SQL，所有权链将不起作用。在这些情况下，你必须使用 SQL Server\
    \ 提供的另外两种权限提升方法之一：使用 `EXECUTE AS` 子句扩展存储过程，或使用证书进行模块签名。\n\n在存储过程中使用 `EXECUTE AS`\
    \ 子句是一种简单有效的权限提升方法，但其灵活性远不及使用证书所能达到的程度。使用证书时，权限是累加的而非模拟的——证书提供的额外权限是扩展而非替换调用主体的权限。在以下章节中，我将更详细地讨论这些替代的权限提升方法。\n\
    \n### 存储过程与 EXECUTE AS\n\n如本章前一节所述，`EXECUTE AS` 命令可以单独在 T-SQL 批处理中使用，以临时模拟其他用户。但是，`EXECUTE\
    \ AS` 也可用于存储过程、函数和触发器。本节示例仅关注存储过程，但相同原理也适用于其他对象类型。\n\n要使用 `EXECUTE AS` 更改整个存储过程的模拟上下文，请将其添加到\
    \ `CREATE PROCEDURE` 语句中，如下例所示：\n\n```\nCREATE PROCEDURE SelectSensitiveDataByImpersonation\n\
    WITH EXECUTE AS 'Louis'\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT *\n    FROM\
    \ dbo.SensitiveData;\nEND;\nGO\n```\n\n当此存储过程由用户执行时，过程内的所有操作都将被视为是由 `Louis` 用户运行，而不是由调用用户运行（这是默认行为）。这包括任何动态\
    \ SQL 操作，或对 `Louis` 用户有权访问的表中的数据进行操作。存储过程执行完成后，上下文将自动还原回调用者的上下文。\n\n请记住，使用 `EXECUTE\
    \ AS` 不会中断所有权链，而是可以用来扩展它们并创建额外的灵活性。例如，考虑以下两个用户和相关表：\n\n```\nCREATE USER Kevin\
    \ WITHOUT LOGIN;\nGO\nCREATE TABLE KevinsData ( SomeData int );\nGO\n```\n"
- fmt: "# 使用 EXECUTE AS 与所有权链结合\n\n```sql\nALTER AUTHORIZATION ON KevinsData TO Kevin;\n\
    GO\nCREATE USER Hilary\nWITHOUT LOGIN;\nGO\nCREATE TABLE HilarysData\n(\n    SomeOtherData\
    \ int\n);\nGO\nALTER AUTHORIZATION ON HilarysData TO Hilary;\nGO\n```\n\n用户 Kevin\
    \ 和 Hilary 都拥有表。可能需要创建一个访问这两个表的存储过程，但使用所有权链将不起作用：如果过程由 Kevin 拥有，所有权链只会允许执行用户访问\
    \ `KevinsData`，而不会授予对 `HilarysData` 的任何权限。同样，如果过程由 Hilary 拥有，则所有权链将不允许访问 `KevinsData`\
    \ 表。\n\n在这种情况下，一种解决方案是结合使用 `EXECUTE AS` 与所有权链，创建一个由其中一个用户拥有、但在另一个用户的上下文中执行的存储过程。以下存储过程展示了如何实现：\n\
    \n```sql\nCREATE PROCEDURE SelectKevinAndHilarysData\nWITH EXECUTE AS 'Kevin'\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT *\n    FROM KevinsData\n    UNION ALL\n\
    \    SELECT *\n    FROM HilarysData;\nEND;\nGO\nALTER AUTHORIZATION ON SelectKevinAndHilarysData\
    \ TO Hilary;\nGO\n```\n\n因为 Hilary 拥有该存储过程，所有权链将生效并允许从 `HilarysData` 表中选择行。但由于存储过程在\
    \ Kevin 用户的上下文中执行，权限也会级联到 `KevinsData` 表。通过这种方式，可以结合使用两套权限集。\n\n不幸的是，这几乎是使用 `EXECUTE\
    \ AS` 所能实现的极限。对于更复杂的权限场景，有必要考虑使用证书对存储过程进行签名。\n\n# 使用证书对存储过程签名\n\n如前所述，可以基于证书创建代理登录名和用户。\n\
    \n基于证书创建代理是应用存储过程权限最灵活的方式，因为通过证书授予的权限是**相加的**。可以使用一个或多个证书对存储过程进行签名，每个证书都会在已有的权限之上添加其权限，而不是像使用\
    \ `EXECUTE AS` 执行模拟那样替换权限。\n\n要为证书创建代理用户，必须首先确保数据库具有数据库主密钥。如果数据库中还没有主密钥，可以使用以下代码创建：\n\
    \n```sql\nCREATE MASTER KEY ENCRYPTION BY PASSWORD = '5Tr()nG_|)MK_p455woRD';\n\
    ```\n\n> **注意**：数据库主密钥是 SQL Server 加密密钥层次结构的重要组成部分，这将在下一章讨论。\n\n然后创建证书，接着使用 `FOR\
    \ CERTIFICATE` 语法创建关联的用户：\n\n```sql\nCREATE CERTIFICATE Greg_Certificate\nWITH\
    \ SUBJECT='Certificate for Greg';\nGO\nCREATE USER Greg\nFOR CERTIFICATE Greg_Certificate;\n\
    GO\n```\n\n一旦创建了代理用户，就可以像任何其他数据库用户一样，授予其对数据库中资源的权限。但基于证书创建用户的一个副作用是，证书本身也可以用于传播授予该用户的权限。这就是存储过程签名的用武之地。\n\
    \n## 证书签名的工作原理\n\n为了说明这个概念，创建一个表并授予 `Greg` 用户 `SELECT` 访问权限：\n\n```sql\nCREATE\
    \ TABLE GregsData\n(\n    DataColumn int\n);\nGO\nGRANT SELECT ON GregsData\n\
    TO Greg;\nGO\n```\n\n然后可以创建一个从 `GregsData` 表中选择的存储过程。但在这个示例中，为了打破可能因在相同默认架构中创建表和存储过程而产生的所有权链，该存储过程将由名为\
    \ Steve 的用户拥有：\n\n```sql\nCREATE PROCEDURE SelectGregsData\nAS\nBEGIN\n    SET\
    \ NOCOUNT ON;\n    SELECT *\n    FROM GregsData;\nEND;\nGO\nCREATE USER Steve\n\
    WITHOUT LOGIN;\nGO\nALTER AUTHORIZATION ON SelectGregsData TO Steve;\nGO\n```\n\
    \n请注意，此时 Steve 无法从 `GregsData` 中选择——Steve 仅仅拥有试图从该表中选择数据的存储过程。即使授予执行此存储过程的权限，任何用户（除了\
    \ `Greg`）都将无法成功执行，因为存储过程不会将权限传播到 `GregsData` 表：\n\n```sql\nCREATE USER Linchi\n\
    WITHOUT LOGIN;\nGO\nGRANT EXECUTE ON SelectGregsData TO Linchi;\nGO\nEXECUTE AS\
    \ USER='Linchi';\nGO\nEXEC SelectGregsData;\nGO\n```\n\n此尝试将失败并显示以下错误：\n\n```\n\
    Msg 229, Level 14, State 5, Procedure SelectGregsData, Line 6\nThe SELECT permission\
    \ was denied on the object 'GregsData', database\n'OwnershipChain', schema 'dbo'.\n\
    ```\n\n为了使存储过程对 `Linchi` 用户生效，必须通过存储过程将权限传播到 `GregsData` 表。这可以通过使用创建 `Greg` 用户的同一证书对过程进行签名来完成。使用\
    \ `ADD SIGNATURE` 命令对存储过程进行签名（在执行以下代码之前，请确保使用 `REVERT` 退出 `Linchi` 上下文）：\n\n```sql\n\
    ADD SIGNATURE TO SelectGregsData\nBY CERTIFICATE Greg_Certificate;\nGO\n```\n\n\
    一旦过程用证书签名，该过程就拥有与 `Greg` 用户相同的权限；在这种情况下，这意味着任何有权执行该过程的用户在运行存储过程时都将能够从 `GregsData`\
    \ 表中选择行。\n\n当考虑到可以用任意数量的证书对给定的存储过程进行签名，而每个证书又可以关联到不同的用户，从而关联到不同的权限集时，证书签名的灵活性就变得显而易见。这意味着即使在一个拥有众多安全角色的极其复杂的系统中，仍然可以编写存储过程来聚合跨越安全边界的数据。\n\
    \n使用证书时请记住，任何时候修改存储过程，SQL Server 都会自动撤销所有签名。因此，重要的是要将签名与存储过程一起编写为脚本，这样在修改过程时，可以轻松地保持权限同步。\n\
    \n## 查找存储过程的证书签名\n\n同样重要的是要知道如何找出哪些证书（以及因此哪些用户）与给定的存储过程相关联。可以查询 SQL Server 的目录视图来获取此信息，但要获得正确的查询并不明显。以下查询可以作为一个起点，它返回所有存储过程、对其进行签名的证书以及与证书关联的用户：\n\
    \n```sql\nSELECT\n    OBJECT_NAME(cp.major_id) AS signed_module,\n    c.name AS\
    \ certificate_name,\n    dp.name AS user_name\nFROM sys.crypt_properties AS cp\n\
    INNER JOIN sys.certificates AS c ON c.thumbprint = cp.thumbprint\nINNER JOIN sys.database_principals\
    \ dp\n    ON SUBSTRING(dp.sid, 13, 32) = c.thumbprint;\n```\n\n这个查询有些难以理解，因此值得解释一下。`sys.crypt_properties`\
    \ 视图包含有关哪些模块已由证书签名的信息。每个证书都有一个 32 字节的加密哈希值，即其*指纹*，用于通过 `sys.certificates` 视图找出是哪个证书对模块进行了签名。最后，每个数据库主体都有一个安全标识符，如果主体是基于证书创建的，则其最后\
    \ 32 字节就是该证书的指纹。\n\n执行此查询时，结果将显示刚刚创建的已签名模块，如下所示：\n\n```\nsigned_module    certificate_name\
    \    user_name\nSelectGregsData  Greg_Certificate    Greg\n```\n\n# 分配服务器级权限\n\
    \n前面的示例仅展示了如何使用证书分配数据库级权限。对存储过程进行签名也可用于传播服务器级权限，例如 `BULK INSERT` 或 `ALTER`。"
  raw: 'ALTER AUTHORIZATION ON KevinsData TO Kevin;


    GO


    CREATE USER Hilary


    WITHOUT LOGIN;


    GO


    CREATE TABLE HilarysData


    (


    SomeOtherData int


    );


    GO


    ALTER AUTHORIZATION ON HilarysData TO Hilary;


    GO


    Both users, Kevin and Hilary, own tables. A stored procedure might need to be
    created that accesses both tables, but using ownership chaining will not work;
    if the procedure is owned by Kevin, ownership chaining would only allow the executing
    user to access KevinsData, and would grant no permissions on HilarysData. Likewise,
    if the procedure was owned by Hilary, then ownership chaining would not permit
    access to the KevinsData table.


    One solution in this case is to combine EXECUTE AS with ownership chaining and
    create a stored procedure that is owned by one of the users, but executes under
    the context of the other. The following stored procedure shows how this might
    look:


    CREATE PROCEDURE SelectKevinAndHilarysData


    WITH EXECUTE AS ''Kevin''


    AS


    BEGIN


    SET NOCOUNT ON;


    SELECT *


    FROM KevinsData


    UNION ALL


    SELECT *


    FROM HilarysData;


    END;


    GO


    ALTER AUTHORIZATION ON SelectKevinAndHilarysData TO Hilary;


    GO


    Because Hilary owns the stored procedure, ownership chaining will kick in and
    allow selection of rows from the HilarysData table. But because the stored procedure
    is executing under the context of the 113


    CHAPTER 5 „ PRIVILEGE AND AUTHORIZATION


    Kevin user, permissions will also cascade for the KevinsData table. In this way,
    both permission sets can be used, combined within a single module.


    Unfortunately, this is about the limit of what can be achieved using EXECUTE AS.
    For more complex permissions scenarios, it is necessary to consider signing stored
    procedures using certificates.


    Stored Procedure Signing Using Certificates


    As mentioned previously in the chapter, proxy logins and users can be created
    based on certificates.


    Creating a certificate-based proxy is by far the most flexible way of applying
    permissions using a stored procedure, as permissions granted via certificate are
    **additive**. One or more certificates can be used to sign a stored procedure,
    and each certificate will apply its permissions on top of the others already present,
    rather than replacing the permissions as happens when impersonation is performed
    using EXECUTE AS.


    To create a proxy user for a certificate, you must first ensure that your database
    has a database master key (DMK). If you do not already have a DMK in your database,
    you can create one using the following code listing:


    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''5Tr()nG_|)MK_p455woRD'';


    „ **Note** The DMK forms an important part of the SQL Server encryption key hierarchy,
    which is discussed in the next chapter.


    Then create the certificate, followed by the associated user using the FOR CERTIFICATE
    syntax: CREATE CERTIFICATE Greg_Certificate


    WITH SUBJECT=''Certificate for Greg'';


    GO


    CREATE USER Greg


    FOR CERTIFICATE Greg_Certificate;


    GO


    Once the proxy user is created, it can be granted permissions to resources in
    the database, just like any other database user. But a side effect of having created
    the user based on a certificate is that the certificate itself can also be used
    to propagate permissions granted to the user. This is where stored procedure signing
    comes into play.


    CHAPTER 5 „ PRIVILEGE AND AUTHORIZATION


    To illustrate this concept, create a table and grant SELECT access to the Greg
    user, as follows: CREATE TABLE GregsData


    (


    DataColumn int


    );


    GO


    GRANT SELECT ON GregsData


    TO Greg;


    GO


    A stored procedure can then be created that selects from the GregsData table,
    but for the sake of this example, the stored procedure will be owned by a user
    called Steve, in order to break any possible ownership chain that might result
    from creating both the table and the stored procedure in the same default schema:


    CREATE PROCEDURE SelectGregsData


    AS


    BEGIN


    SET NOCOUNT ON;


    SELECT *


    FROM GregsData;


    END;


    GO


    CREATE USER Steve


    WITHOUT LOGIN;


    GO


    ALTER AUTHORIZATION ON SelectGregsData TO Steve;


    GO


    Note that at this point Steve cannot select from GregsData—Steve just owns the
    stored procedure that attempts to select data from the table. Even if granted
    permission to execute this stored procedure, any user (other than Greg) will be
    unable to do so successfully, as the stored procedure does not propagate permissions
    to the GregsData table:


    CREATE USER Linchi


    WITHOUT LOGIN;


    GO


    GRANT EXECUTE ON SelectGregsData TO Linchi;


    GO


    EXECUTE AS USER=''Linchi'';


    GO


    EXEC SelectGregsData;


    GO


    CHAPTER 5 „ PRIVILEGE AND AUTHORIZATION


    This attempt fails with the following error:


    Msg 229, Level 14, State 5, Procedure SelectGregsData, Line 6


    The SELECT permission was denied on the object ''GregsData'', database


    ''OwnershipChain'', schema ''dbo''.


    In order to make the stored procedure work for the Linchi user, permissions to
    the GregsData table must be propagated through the stored procedure. This can
    be done by signing the procedure using the same certificate that was used to create
    the Greg user. Signing a stored procedure is done using the ADD


    SIGNATURE command (be sure to REVERT back out of the Linchi context before executing
    the following listing):


    ADD SIGNATURE TO SelectGregsData


    BY CERTIFICATE Greg_Certificate;


    GO


    Once the procedure is signed with the certificate, the procedure has the same
    permissions that the Greg user has; in this case, that means that any user with
    permission to execute the procedure will be able to select rows from the GregsData
    table when running the stored procedure.


    The flexibility of certificate signing becomes apparent when you consider that
    you can sign a given stored procedure with any number of certificates, each of
    which can be associated with different users and therefore different permission
    sets. This means that even in an incredibly complex system with numerous security
    roles, it will still be possible to write stored procedures to aggregate data
    across security boundaries.


    Keep in mind when working with certificates that any time the stored procedure
    is altered, all signatures will be automatically revoked by SQL Server. Therefore,
    it is important to keep signatures scripted with stored procedures, such that
    when the procedure is modified, the permissions can be easily kept in sync.


    It is also important to know how to find out which certificates, and therefore
    which users, are associated with a given stored procedure. SQL Server’s catalog
    views can be queried to find this information, but getting the right query is
    not especially obvious. The following query, which returns all stored procedures,
    the certificates they are signed with, and the users associated with the certificates,
    can be used as a starting point:


    SELECT


    OBJECT_NAME(cp.major_id) AS signed_module,


    c.name AS certificate_name,


    dp.name AS user_name


    FROM sys.crypt_properties AS cp


    INNER JOIN sys.certificates AS c ON c.thumbprint = cp.thumbprint


    INNER JOIN sys.database_principals dp


    ON SUBSTRING(dp.sid, 13, 32) = c.thumbprint;


    This query is somewhat difficult to understand, so it is worth explaining here.
    The


    sys.crypt_properties view contains information about which modules have been signed
    by certificates.


    Each certificate has a 32-byte cryptographic hash, its *thumbprint*, which is
    used to find out which certificate was used to sign the module, via the sys.certificates
    view. Finally, each database principal 116


    CHAPTER 5 „ PRIVILEGE AND AUTHORIZATION


    has a security identifier, the final 32 bytes of which is the thumbprint if the
    principal was created from a certificate.


    When this query is executed, the results show the signed module just created as
    follows:


    signed_module certificate_name user_name


    SelectGregsData Greg_Certificate Greg


    Assigning Server-Level Permissions


    The previous example showed only how to assign database-level permissions using
    a certificate. Signing a stored procedure can also be used to propagate server-level
    permissions, such as BULK INSERT or ALTER'
