    setting also has an impact on transactions, as its name might indicate (it is
    pronounced *transact abort*). In addition to making exceptions act like batch-level
    exceptions, the setting also causes any active transactions to immediately roll
    back in the event of an exception. This means that the following T-SQL results
    in an active transaction count of 0:


    SET XACT_ABORT ON;


    BEGIN TRANSACTION;


    GO


    SELECT 1/0 AS DivideByZero;


    GO


    SELECT @@TRANCOUNT AS ActiveTransactionCount;


    GO


    The output is now


    ActiveTransactionCount


    XACT_ABORT does not create an implicit transaction within a stored procedure,
    but it *does* cause any exceptions that occur within an explicit transaction within
    a stored procedure to cause a rollback. The following T-SQL shows a much more
    atomic stored procedure behavior than the previous example:


    --Empty the table


    TRUNCATE TABLE SomeData;


    GO


    --This procedure will insert one row, then throw a divide-by-zero exception


    CREATE PROCEDURE XACT_Rollback


    AS


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    BEGIN


    SET XACT_ABORT ON;


    BEGIN TRANSACTION;


    INSERT INTO SomeData VALUES (1);


    INSERT INTO SomeData VALUES (1/0);


    COMMIT TRANSACTION;


    END;


    GO


    --Execute the procedure


    EXEC XACT_Rollback;


    GO


    --Select the rows from the table


    SELECT *


    FROM SomeData;


    GO


    This T-SQL results in the following output, which shows that no rows were inserted:


    Msg 8134, Level 16, State 1, Procedure XACT_Rollback, Line 10


    Divide by zero error encountered.


    SomeColumn


    (0 row(s) affected)


    XACT_ABORT is a very simple yet extremely effective means of ensuring that an
    exception does not result in a transaction committing with only part of its work
    done. I recommend turning this setting on in any stored procedure that uses an
    explicit transaction, in order to guarantee that it will get rolled back in case
    of an exception.


    TRY/CATCH and Doomed Transactions


    One interesting outcome of using TRY/CATCH syntax is that it is possible for transactions
    to enter a state in which they can *only* be rolled back. In this case the transaction
    is not automatically rolled back, as it is with XACT_ABORT; instead, SQL Server
    throws an exception letting the caller know that the transaction 99


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    cannot be committed, and must be manually rolled back. This condition is known
    as a **doomed** **transaction**, and the following T-SQL shows one way of producing
    it:


    BEGIN TRANSACTION;


    BEGIN TRY


    --Throw an exception on insert


    INSERT INTO SomeData VALUES (CONVERT(int, ''abc''));


    END TRY


    BEGIN CATCH


    --Try to commit...


    COMMIT TRANSACTION;


    END CATCH


    GO


    This results in the following output:


    Msg 3930, Level 16, State 1, Line 10


    The current transaction cannot be committed and cannot support


    operations that write to the log file. Roll back the transaction.


    Should a transaction enter this state, any attempt to either commit the transaction
    or roll forward (do more work) will result in the same exception. This exception
    will keep getting thrown until the transaction is rolled back.


    In order to determine whether an active transaction can be committed or rolled
    forward, check the value of the XACT_STATE function. This function returns 0 if
    there are no active transactions, 1 if the transaction is in a state in which
    more work can be done, and –1 if the transaction is doomed. It is a good idea
    to always check XACT_STATE in any CATCH block that involves an explicit transaction.


    Summary


    It’s a fact of life for every developer: sometimes things just go wrong.


    A solid understanding of how exceptions behave within SQL Server makes working
    with them much easier. Especially important is the difference between statement-level
    and batch-level exceptions, and the implications of exceptions that are thrown
    within transactions.


    SQL Server’s TRY/CATCH syntax makes dealing with exceptions much easier, but it’s
    important to use the feature wisely. Overuse can make detection and debugging
    of problems exceedingly difficult. And whenever dealing with transactions in CATCH
    blocks, make sure to check the value of XACT_STATE.


    Errors and exceptions will always occur, but by thinking carefully about how to
    handle them, you can deal with them easily and effectively.


    **C H A P T E R 5**


    „ „ „


    **Privilege and Authorization**


    SQL Server security is a broad subject area, with enough potential avenues of
    exploration that entire books have been written on the topic. This chapter’s goal
    is not to cover the whole spectrum of security knowledge necessary to create a
    product that is secure from end to end, but rather to focus on those areas that
    are most important during the software design and development process.


    Broadly speaking, data security can be broken into two areas:


    •


    **Authentication**: The act of verifying the identity of a user of a system


    •


    **Authorization**: The act of giving a user access to the resources that a system


    controls


    These two realms can be delegated separately in many cases; so long as the authentication
    piece works properly, the user can be handed off to authorization mechanisms for
    the remainder of a session.


    SQL Server authentication on its own is a big topic, with a diverse range of subtopics
    including network security, operating system security, and so-called surface area
    control over the server. While production DBAs should be very concerned with these
    sorts of issues, authentication is an area that developers can mostly ignore.
    Developers need to be much more concerned with what happens *after* authentication:
    that is, how the user is authorized for data access and how data is protected
    from unauthorized users.


    This chapter introduces some of the key issues of data privilege and authorization
    in SQL Server from a development point of view. Included here is an initial discussion
    on privileges and general guidelines and practices for securing data using SQL
    Server permissions. A related security topic is that of data encryption, which
    is covered in detail in the next chapter.


    Note that although authentication issues are generally ignored in these pages,
    you should try to not completely disregard them in your day-to-day development
    work. Development environments tend to be set up with very lax security in order
    to keep things simple, but a solid development process should include a testing
    phase during which full authentication restrictions are applied. This helps to
    ensure that rollout to a production system does not end in spectacular failure
    in which users aren’t even able to log in!


    CHAPTER 5 „ PRIVILEGE AND AUTHORIZATION


    **User VS. Application Logins**


    The topics covered in this chapter relate to various privilege and authorization
    scenarios handled within SQL Server itself. However, in many database application
    designs, authorization is handled in the application layer rather than at the
    database layer. In such applications, users typically connect and log into the
    application using their own personal credentials, but the application then connects
    to the database using a single shared application login. This login is given permission
    to execute all of the stored procedures in the database related to that application,
    and it is up to authorization routines in the application itself to determine
    those actions that can be performed by any given user.


    There are some benefits to using this approach, such as being able to take advantage
    of connection pooling between different sessions. However, it means that any features
    provided by SQL Server to handle per-user security do not apply. If a bug were
    to exist in the application, or if the credentials associated with the application
    login were to become known, it would be possible for users to execute any queries
    against the database that the application had permission to perform.'
  trans: "# 第四章 „ 错误与异常\n\n## XACT_ABORT 与事务\n\n正如在介绍 `XACT_ABORT` 及其对异常影响的部分所提到的，这个设置也会对事务产生影响——其名称可能暗示了这一点（读作\
    \ *事务中止*）。除了使异常表现为批处理级异常之外，该设置还会在发生异常时，导致任何活动事务立即回滚。这意味着以下 T-SQL 会导致活动事务计数变为 0：\n\
    \n```sql\nSET XACT_ABORT ON;\n\nBEGIN TRANSACTION;\n\nGO\n\nSELECT 1/0 AS DivideByZero;\n\
    \nGO\n\nSELECT @@TRANCOUNT AS ActiveTransactionCount;\n\nGO\n```\n\n现在的输出是\n\n\
    ```text\nActiveTransactionCount\n----------------------\n0\n```\n\n`XACT_ABORT`\
    \ 不会在存储过程中创建隐式事务，但它*确实*会导致在存储过程中显式事务内发生的任何异常引发回滚。以下 T-SQL 展示的存储过程行为比之前的示例更具原子性：\n\
    \n```sql\n--清空表\nTRUNCATE TABLE SomeData;\nGO\n\n--此过程将插入一行，然后引发除零异常\nCREATE PROCEDURE\
    \ XACT_Rollback\nAS\nBEGIN\n    SET XACT_ABORT ON;\n    BEGIN TRANSACTION;\n \
    \   INSERT INTO SomeData VALUES (1);\n    INSERT INTO SomeData VALUES (1/0);\n\
    \    COMMIT TRANSACTION;\nEND;\nGO\n\n--执行存储过程\nEXEC XACT_Rollback;\nGO\n\n--从表中选择行\n\
    SELECT *\nFROM SomeData;\nGO\n```\n\n此 T-SQL 产生如下输出，显示没有行被插入：\n\n```text\nMsg\
    \ 8134, Level 16, State 1, Procedure XACT_Rollback, Line 10\nDivide by zero error\
    \ encountered.\n\nSomeColumn\n-----------\n(0 row(s) affected)\n```\n\n`XACT_ABORT`\
    \ 是一种非常简单但极其有效的手段，用于确保异常不会导致事务在只完成部分工作的情况下提交。我建议在任何使用显式事务的存储过程中开启此设置，以保证在发生异常时事务能够回滚。\n\
    \n## TRY/CATCH 与注定失败的事务\n\n使用 `TRY/CATCH` 语法的一个有趣结果是，事务可能进入一种*只能*被回滚的状态。在这种情况下，事务不会像使用\
    \ `XACT_ABORT` 那样自动回滚；相反，SQL Server 会抛出一个异常，告知调用者该事务无法提交，必须手动回滚。这种状况被称为**注定失败的事务**，以下\
    \ T-SQL 展示了一种产生它的方法：\n\n```sql\nBEGIN TRANSACTION;\nBEGIN TRY\n    --在插入时抛出异常\n\
    \    INSERT INTO SomeData VALUES (CONVERT(int, 'abc'));\nEND TRY\nBEGIN CATCH\n\
    \    --尝试提交...\n    COMMIT TRANSACTION;\nEND CATCH\nGO\n```\n\n这会产生如下输出：\n\n```text\n\
    Msg 3930, Level 16, State 1, Line 10\nThe current transaction cannot be committed\
    \ and cannot support\noperations that write to the log file. Roll back the transaction.\n\
    ```\n\n一旦事务进入此状态，任何尝试提交事务或向前推进（做更多工作）的操作都会导致相同的异常。此异常会不断被抛出，直到事务被回滚。\n\n为了确定一个活动事务是否可以提交或向前推进，请检查\
    \ `XACT_STATE()` 函数的值。该函数在无活动事务时返回 0，事务处于可继续工作状态时返回 1，事务注定失败时返回 –1。在任何涉及显式事务的\
    \ `CATCH` 块中检查 `XACT_STATE()` 是一个好习惯。\n\n## 小结\n\n这是每个开发者都会面对的现实：有时事情就是会出错。\n\n\
    扎实理解异常在 SQL Server 中的行为方式，能使处理它们变得容易得多。尤为重要的是语句级异常与批处理级异常之间的区别，以及在事务内抛出异常的后果。\n\
    \nSQL Server 的 `TRY/CATCH` 语法让处理异常容易了许多，但明智地使用此功能很重要。过度使用会使问题的检测和调试变得异常困难。并且，每当在\
    \ `CATCH` 块中处理事务时，请务必检查 `XACT_STATE()` 的值。\n\n错误和异常总会发生，但通过仔细思考如何处理它们，你就可以轻松有效地应对。\n\
    \n# 第五章 „ 权限与授权\n\n## 概述\n\nSQL Server 安全性是一个广泛的主题领域，有足够的潜在探索途径，以至于有整本的书籍专门讨论这个话题。本章的目标不是涵盖创建端到端安全产品所必需的全部安全知识，而是聚焦于在软件设计和开发过程中最重要的那些领域。\n\
    \n广义上讲，数据安全可以分为两个领域：\n- **身份验证**：验证系统用户身份的行为。\n- **授权**：授予用户访问系统控制资源的行为。\n\n这两个领域在许多情况下可以分别委托；只要身份验证部分工作正常，用户就可以在会话的剩余部分移交给授权机制处理。\n\
    \nSQL Server 身份验证本身就是一个大课题，包含网络安全性、操作系统安全性以及所谓的服务器“表面区域控制”等多样化子主题。虽然生产环境的 DBA\
    \ 应该非常关注这类问题，但身份验证是一个开发者在很大程度上可以忽略的领域。开发者需要更关注的是身份验证*之后*发生的事情：即用户如何被授权访问数据，以及数据如何免受未授权用户的侵害。\n\
    \n本章从开发者的视角，介绍了 SQL Server 中数据权限和授权的一些关键问题。包括对权限的初步讨论，以及使用 SQL Server 权限保护数据的通用指南和实践。一个相关的安全主题是数据加密，这将在下一章详细讨论。\n\
    \n请注意，尽管本文中通常忽略身份验证问题，但在日常开发工作中，你不应完全无视它们。开发环境为了简化设置，往往安全性非常宽松，但一个扎实的开发流程应包括一个测试阶段，在此阶段应用完整的身份验证限制。这有助于确保部署到生产系统时，不会以用户甚至无法登录的惨烈失败告终！\n\
    \n## 用户登录与应用程序登录\n\n本章涵盖的主题涉及在 SQL Server 内部处理的各种权限和授权场景。然而，在许多数据库应用程序设计中，授权是在应用层而非数据库层处理的。在此类应用程序中，用户通常使用其个人凭证连接并登录应用程序，但应用程序随后使用一个共享的应用程序登录名连接到数据库。该登录名被授予执行数据库中与该应用程序相关的所有存储过程的权限，而确定任何特定用户可以执行哪些操作则由应用程序本身的授权例程决定。\n\
    \n使用这种方法有一些好处，例如能够利用不同会话之间的连接池。然而，这也意味着 SQL Server 提供的处理每用户安全性的任何功能都不适用。如果应用程序中存在错误，或者与应用程序登录名关联的凭证被泄露，用户就有可能执行应用程序有权执行的任何数据库查询。"
- fmt: '# Chapter 5: Privilege and Authorization


    For the examples in this chapter, I assume a scenario in which users are connecting
    to the database using their own personal credentials.


    ## The Principle of Least Privilege


    The key to locking down resources in any kind of system—database or otherwise—is
    quite simple in essence: any given user should have access to only the bare minimum
    set of resources required, and for only as much time as access to those resources
    is needed. Unfortunately, in practice this is more of an ideal goal than an actual
    prescription for data security; many systems do not allow for the set of permissions
    allocated to a user to be easily escalated dynamically, and the Microsoft Windows
    family of operating systems have not historically been engineered to use escalation
    of privilege as a means by which to gain additional access at runtime.


    Many multiuser operating systems implement the ability to `impersonate` other
    users when access to a resource owned by that user is required. Impersonation
    is slightly different than reauthentication; instead of logging out and resending
    credentials, thereby forcing any running processes to be stopped, impersonation
    allows a process to temporarily `escalate` its privileges, taking on the rights
    held by the impersonated principal. The most common example of this at an operating
    system level is UNIX’s `su` command, which allows a user to temporarily take on
    the identity of another user, easily reverting back when done. Windows systems
    can also handle some degree of impersonation, such as provided by the `.NET` `WindowsIdentity`
    class.


    Permissions in Windows systems are typically provided using `access control lists
    (ACLs)`. Granting permission to a resource means adding a user to the list, after
    which the user can access the resource again and again, even after logging in
    and out of the system. This kind of access control provides no additional security
    if, for instance, an attacker takes over an account in the system. By taking control
    of an account, the attacker automatically has full access to every resource that
    the account has permission to access.


    By controlling access with impersonation, the user is required to effectively
    request access to the resource dynamically, *each time access is required*. In
    addition, rights to the resource will only be maintained during the course of
    impersonation. Once the user `reverts` (i.e., turns off impersonation), the additional
    access rights are no longer granted. In effect, this means that if an account
    is compromised, the attacker will also have to compromise the impersonation context
    in order to gain access to more secure resources.


    The idea of security through `least privilege` involves creating users with few
    or no permissions, and allowing them to briefly escalate their privileges when
    greater access is required. This is generally implemented using `proxies`—users
    (or other security principals) that have access to a resource but cannot be authenticated
    externally. Use of low-privileged external users together with higher-privileged
    proxy users provides a buffer against attack, due to the fact that the only accounts
    that an attacker can directly compromise from the outside have no permissions
    directly associated with them. Accessing more valuable resources requires additional
    work on the part of the attacker, giving you that much more of a chance to detect
    problems before they occur.


    ## Creating Proxies in SQL Server


    SQL Server 2008 allows creation of security principals at both the server-level
    and database-level that can be used via proxy.


    - At the server level, proxy `logins` can be created that cannot log in.

    - At the database level, proxy `users` can be created that are not associated
    with a login.


    The only way to switch into the execution context of either of these types of
    proxy principals is via impersonation, which makes them ideal for privilege escalation
    scenarios.


    ### Server-Level Proxies'
