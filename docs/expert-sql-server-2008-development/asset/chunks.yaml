    Rerun the `SELECT` statement in the blocking window, and you’ll see the new row.
    This phenomenon is known as a `` `phantom row` ``, because the new data seems
    to appear like an apparition—out of nowhere.


    Once you’re done investigating the topic of phantom rows, make sure to issue a
    `ROLLBACK` in both windows.


    ## SERIALIZABLE Isolation


    The difference between the `REPEATABLE READ` and `SERIALIZABLE` isolation levels
    is that while the former allows phantom rows, the latter does not. Any key—existent
    or not at the time of the `SELECT`—that is within the range predicated by the
    `WHERE` clause will be locked for the duration of the transaction if the `SERIALIZABLE`
    isolation level is used. To see how this works, first run the following in the
    blocking window:

    ```sql

    SET TRANSACTION ISOLATION LEVEL SERIALIZABLE;


    BEGIN TRANSACTION;


    SELECT *

    FROM Blocker;

    ```

    Next, try either an `INSERT` or `UPDATE` in the blocked window. In either case,
    the operation will be forced to wait for the transaction in the blocking window
    to commit, since the transaction locks all rows in the table—whether or not they
    exist yet. To lock only a specific range of rows, add a `WHERE` clause to the
    blocking query, and all DML operations within the key range will be blocked for
    the duration of the transaction. When you’re done, be sure to issue a `ROLLBACK`.


    **Tip** The `REPEATABLE READ` and `SERIALIZABLE` isolation levels will hold shared
    locks for the duration of a transaction on whatever tables are queried. However,
    you might wish to selectively hold locks only on specific tables within a transaction
    in which you’re working with multiple objects. To accomplish this, you can use
    the `HOLDLOCK` table hint, applied only to the tables that you want to hold the
    locks on. In a `READ COMMITTED` transaction, this will have the same effect as
    if the isolation level had been escalated just for those tables to `REPEATABLE
    READ`. For more information on table hints, see SQL Server 2008 Books Online.


    ## Nonblocking Isolation Levels


    The nonblocking isolation levels, `READ UNCOMMITTED` and `SNAPSHOT`, each allow
    readers to read data without waiting for writing transactions to complete. This
    is great from a concurrency standpoint—no blocking means that processes spend
    less time waiting and therefore users get their data back faster—but can be disastrous
    for data consistency.


    ### READ UNCOMMITTED Isolation


    `READ UNCOMMITTED` transactions do not apply shared locks as data is read and
    do not honor locks placed by other transactions. This means that there will be
    no blocking, but the data being read might be inconsistent (not yet committed).
    To see what this means, run the following in the blocking window:

    ```sql

    BEGIN TRANSACTION;


    UPDATE Blocker

    SET Blocker_Id = 10

    WHERE Blocker_Id = 1;

    GO

    ```

    This operation will place an exclusive lock on the updated row, so any readers
    should be blocked from reading the data until the transaction completes. However,
    the following query will not be blocked if run in the blocked window:

    ```sql

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;


    SELECT *

    FROM Blocker;

    GO

    ```

    The danger here is that because the query is not blocked, a user may see data
    that is part of a transaction that later gets rolled back. This can be especially
    problematic when users are shown aggregates that do not add up based on the leaf-level
    data when reconciliation is done later. I recommend that you carefully consider
    these issues before using `READ UNCOMMITTED` (or the `NOLOCK` table hint) in your
    queries.


    ### SNAPSHOT Isolation


    An alternative to `READ UNCOMMITTED` is SQL Server 2008’s `SNAPSHOT` isolation
    level. This isolation level shares the same nonblocking characteristics as `READ
    UNCOMMITTED`, but only consistent data is shown. This is achieved by making use
    of a row-versioning technology that stores previous versions of rows in `TempDB`
    as data modifications occur in a database.


    `SNAPSHOT` almost seems like the best of both worlds: no blocking, yet no danger
    of inconsistent data. However, this isolation level is not without its problems.
    First and foremost, storing the previous row values in `TempDB` can create a huge
    amount of load, causing many problems for servers that are not properly configured
    to handle the additional strain. And secondly, for many apps, this kind of nonblocking
    read does not make sense. For example, consider an application that needs to read
    updated inventory numbers. A `SNAPSHOT` read might cause the user to receive an
    invalid quantity, because the user will not be blocked when reading data, and
    may therefore see previously committed data rather than the latest updated numbers.


    If you do decide to use either nonblocking isolation level, make sure to think
    carefully through the issues. There are many possible caveats with both approaches,
    and they are not right for every app, or perhaps even most apps.


    **Note** `SNAPSHOT` isolation is a big topic, out of the scope of this chapter,
    but there are many excellent resources available that I recommend readers investigate
    for a better understanding of the subject. One place to start is the MSDN Books
    Online article “Understanding Row Versioning-Based Isolation Levels,” available
    at http://msdn.microsoft.com/en-us/library/ms189050.aspx.


    ## From Isolation to Concurrency Control


    Some of the terminology used for the business logic methodologies mentioned in
    the previous section—particularly the adjectives *optimistic* and *pessimistic*—are
    also often used to describe the behavior of SQL Server’s own locking and isolation
    rules. However, you should understand that the behavior of the SQL Server processes
    described by these terms is not quite the same as the definition used by the associated
    business process. From SQL Server’s standpoint, the only concurrency control necessary
    is between two transactions that happen to hit the server at the same time—and
    from that point of view, its behavior works quite well. However, from a purely
    business-based perspective, there are no transactions (at least not in the sense
    of a database transaction)—there are only users and processes trying to make modifications
    to the same data. In this sense, a purely transactional mindset fails to deliver
    enough control.


    SQL Server’s default isolation level, `READ COMMITTED`, as well as its `REPEATABLE
    READ` and `SERIALIZABLE` isolation levels, can be said to support a form of pessimistic
    concurrency. When using these isolation levels, writers are not allowed to overwrite
    data in the process of being written by others. However, the moment the blocking
    transaction ends, the data is fair game, and another session can overwrite it
    without even knowing that it was modified in the interim. From a business point
    of view, this falls quite short of the pessimistic goal of keeping two end users
    from ever even beginning to edit the same data at the same time.


    The `SNAPSHOT` isolation level is said to support a form of optimistic concurrency
    control. This comparison is far easier to justify than the pessimistic concurrency
    of the other isolation levels: with `SNAPSHOT` isolation, if you read a piece
    of data in order to make edits or modifications to it, and someone else updates
    the data after you’ve read it but before you’ve had a chance to write your edits,
    you will get an exception when you try to write. This is almost a textbook definition
    of optimistic concurrency, with one slight problem: SQL Server’s isolation levels
    are *transactional*—so in order to make this work, you would have to have held
    a transaction open for the entire duration of the read, edit, and rewrite attempt.
    This doesn’t scale especially well if, for instance, the application is web-enabled
    and the user wants to spend an hour editing the document.'
  raw: 'Rerun the SELECT statement in the blocking window, and you’ll see the new
    row. This phenomenon is known as a **phantom row**, because the new data seems
    to appear like an apparition—out of nowhere.


    Once you’re done investigating the topic of phantom rows, make sure to issue a
    ROLLBACK in both windows.


    SERIALIZABLE Isolation


    The difference between the REPEATABLE READ and SERIALIZABLE isolation levels is
    that while the former allows phantom rows, the latter does not. Any key—existent
    or not at the time of the SELECT—that is within the range predicated by the WHERE
    clause will be locked for the duration of the transaction if the SERIALIZABLE
    isolation level is used. To see how this works, first run the following in the
    blocking window:


    SET TRANSACTION ISOLATION LEVEL SERIALIZABLE;


    BEGIN TRANSACTION;


    SELECT *


    FROM Blocker;


    Next, try either an INSERT or UPDATE in the blocked window. In either case, the
    operation will be forced to wait for the transaction in the blocking window to
    commit, since the transaction locks all rows in the table—whether or not they
    exist yet. To lock only a specific range of rows, add a WHERE clause to the blocking
    query, and all DML operations within the key range will be blocked for the duration
    of the transaction. When you’re done, be sure to issue a ROLLBACK.


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    „ **Tip** The REPEATABLE READ and SERIALIZABLE isolation levels will hold shared
    locks for the duration of a transaction on whatever tables are queried. However,
    you might wish to selectively hold locks only on specific tables within a transaction
    in which you’re working with multiple objects. To accomplish this, you can use
    the HOLDLOCK table hint, applied only to the tables that you want to hold the
    locks on. In a READ COMMITTED


    transaction, this will have the same effect as if the isolation level had been
    escalated just for those tables to REPEATABLE READ. For more information on table
    hints, see SQL Server 2008 Books Online.


    Nonblocking Isolation Levels


    The nonblocking isolation levels, READ UNCOMMITTED and SNAPSHOT, each allow readers
    to read data without waiting for writing transactions to complete. This is great
    from a concurrency standpoint—no blocking means that processes spend less time
    waiting and therefore users get their data back faster—


    but can be disastrous for data consistency.


    READ UNCOMMITTED Isolation


    READ UNCOMMITTED transactions do not apply shared locks as data is read and do
    not honor locks placed by other transactions. This means that there will be no
    blocking, but the data being read might be inconsistent (not yet committed). To
    see what this means, run the following in the blocking window: BEGIN TRANSACTION;


    UPDATE Blocker


    SET Blocker_Id = 10


    WHERE Blocker_Id = 1;


    GO


    This operation will place an exclusive lock on the updated row, so any readers
    should be blocked from reading the data until the transaction completes. However,
    the following query will not be blocked if run in the blocked window:


    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;


    SELECT *


    FROM Blocker;


    GO


    The danger here is that because the query is not blocked, a user may see data
    that is part of a transaction that later gets rolled back. This can be especially
    problematic when users are shown aggregates that do not add up based on the leaf-level
    data when reconciliation is done later. I recommend that you carefully consider
    these issues before using READ UNCOMMITTED (or the NOLOCK table hint) in your
    queries.


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    SNAPSHOT Isolation


    An alternative to READ UNCOMMITTED is SQL Server 2008’s SNAPSHOT isolation level.
    This isolation level shares the same nonblocking characteristics as READ UNCOMMITTED,
    but only consistent data is shown.


    This is achieved by making use of a row-versioning technology that stores previous
    versions of rows in TempDB as data modifications occur in a database.


    SNAPSHOT almost seems like the best of both worlds: no blocking, yet no danger
    of inconsistent data.


    However, this isolation level is not without its problems. First and foremost,
    storing the previous row values in TempDB can create a huge amount of load, causing
    many problems for servers that are not properly configured to handle the additional
    strain. And secondly, for many apps, this kind of nonblocking read does not make
    sense. For example, consider an application that needs to read updated inventory
    numbers. A SNAPSHOT read might cause the user to receive an invalid quantity,
    because the user will not be blocked when reading data, and may therefore see
    previously committed data rather than the latest updated numbers.


    If you do decide to use either nonblocking isolation level, make sure to think
    carefully through the issues. There are many possible caveats with both approaches,
    and they are not right for every app, or perhaps even most apps.


    „ **Note** SNAPSHOT isolation is a big topic, out of the scope of this chapter,
    but there are many excellent resources available that I recommend readers investigate
    for a better understanding of the subject. One place to start is the MSDN Books
    Online article “Understanding Row Versioning-Based Isolation Levels,” available
    at http://msdn.microsoft.com/en-us/library/ms189050.aspx.


    From Isolation to Concurrency Control


    Some of the terminology used for the business logic methodologies mentioned in
    the previous section—


    particularly the adjectives *optimistic* and *pessimistic*—are also often used
    to describe the behavior of SQL Server’s own locking and isolation rules. However,
    you should understand that the behavior of the SQL Server processes described
    by these terms is not quite the same as the definition used by the associated
    business process. From SQL Server’s standpoint, the only concurrency control necessary
    is between two transactions that happen to hit the server at the same time—and
    from that point of view, its behavior works quite well. However, from a purely
    business-based perspective, there are no transactions (at least not in the sense
    of a database transaction)—there are only users and processes trying to make modifications
    to the same data. In this sense, a purely transactional mindset fails to deliver
    enough control.


    SQL Server’s default isolation level, READ COMMITTED, as well as its REPEATABLE
    READ and SERIALIZABLE


    isolation levels, can be said to support a form of pessimistic concurrency. When
    using these isolation levels, writers are not allowed to overwrite data in the
    process of being written by others. However, the moment the blocking transaction
    ends, the data is fair game, and another session can overwrite it without even
    knowing that it was modified in the interim. From a business point of view, this
    falls quite short of the pessimistic goal of keeping two end users from ever even
    beginning to edit the same data at the same time.


    The SNAPSHOT isolation level is said to support a form of optimistic concurrency
    control. This comparison is far easier to justify than the pessimistic concurrency
    of the other isolation levels: with SNAPSHOT isolation, if you read a piece of
    data in order to make edits or modifications to it, and someone 242


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    else updates the data after you’ve read it but before you’ve had a chance to write
    your edits, you will get an exception when you try to write. This is almost a
    textbook definition of optimistic concurrency, with one slight problem: SQL Server’s
    isolation levels are *transactional*—so in order to make this work, you would
    have to have held a transaction open for the entire duration of the read, edit,
    and rewrite attempt.


    This doesn’t scale especially well if, for instance, the application is web-enabled
    and the user wants to spend an hour editing the document.'
