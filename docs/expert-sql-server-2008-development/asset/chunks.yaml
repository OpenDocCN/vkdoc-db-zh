    error number usually doesn’t assist from a problem-solving point of view. However,
    there are times when knowing the error number can be of use. Examples include
    use of the @@ERROR function, or when doing specialized error handling using the
    TRY/CATCH syntax (see the sections “Exception ‘Handling’ Using @@ERROR” and


    “SQL Server’s TRY/CATCH Syntax” later in the chapter for details on these topics).


    The error number can also be used to look up the localized translation of the
    error message from the sys.messages catalog view. The message_id column contains
    the error number, and the language_id column can be used to get the message in
    the correct language. For example, the following T-SQL


    returns the English text for error 208:


    SELECT text


    FROM sys.messages


    WHERE


    message_id = 208


    AND language_id = 1033;


    GO


    The output of this query is an error message template, shown here:


    Invalid object name ''%.*ls''.


    See the section “SQL Server’s RAISERROR Function” for more information about error
    message


    templates.


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    Error Level


    The Level tag within an error message indicates a number between 1 and 25\. This
    number can


    sometimes be used to either classify an exception or determine its severity. Unfortunately,
    the key word is “sometimes”: the error levels assigned by SQL Server are highly
    inconsistent and should generally not be used in order to make decisions about
    how to handle exceptions.


    The following exception, based on its error message, is of error level 15:


    Msg 156, Level 15, State 1, Line 1


    Incorrect syntax near the keyword ''FROM''.


    The error levels for each exception can be queried from the sys.messages view,
    using the severity column. A severity of less than 11 indicates that a message
    is a **warning**. If severity is 11 or greater, the message is considered to be
    an **error** and can be broken down into the following documented categories:


    •


    **Error levels 11 through 16** are documented as “errors that can be corrected
    by the


    user.” The majority of exceptions thrown by SQL Server are in this range,


    including constraint violations, parsing and compilation errors, and most other


    runtime exceptions.


    •


    **Error levels 17 through 19** are more serious exceptions. These include out-of-


    memory exceptions, disk space exceptions, internal SQL Server errors, and other


    similar violations. Many of these are automatically logged to the SQL Server error


    log when they are thrown. You can identify those exceptions that are logged by


    examining the is_event_logged column of the sys.messages table.


    •


    **Error levels 20 through 25** are fatal connection and server-level exceptions.
    These'
