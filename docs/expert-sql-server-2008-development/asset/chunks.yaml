- fmt: "# CHAPTER 10 „ WORKING WITH SPATIAL DATA\n\n109, this point is contained in\
    \ the map view used in this example, and we would expect it to be included in\
    \ the result set retrieved from the database. However, this is not the result\
    \ implied by the `STIntersects()` method of the `geography` datatype:\n\n```sql\n\
    DECLARE @BoundingBox geography;\n\nSET @BoundingBox = geography::STPolyFromText(\n\
    'POLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))',\n4326);\n```\n\n![](index-331_1.png)\n\
    \n```sql\nSELECT\n    name,\n    location.STAsText(),\n    location.STIntersects(@BoundingBox)\n\
    FROM\n    allCountries\nWHERE\n    geonameid = 5412070;\n```\n\nThe result 0 indicates\
    \ that, despite being contained within the map window, the location of Arboles\
    \ is not contained within the `geography` Polygon defined by the coordinates at\
    \ the corners of the map. The reason might become more obvious if we take a visual\
    \ look at what’s happening here. Execute the following code listing and then switch\
    \ to the Spatial Results tab in Management Studio:\n\n```sql\nDECLARE @BoundingBox\
    \ geography;\n\nSET @BoundingBox = geography::STPolyFromText(\n'POLYGON ((-109\
    \ 41, -109 37, -102 37, -102 41, -109 41))',\n4326);\n\nSELECT location\nFROM\
    \ allCountries\nWHERE geonameid = 5412070\n\nUNION ALL SELECT @BoundingBox;\n\
    ```\n\nThe result is illustrated in Figure 10-10.\n\n*Figure 10-10\\. The Spatial\
    \ Results tab displaying the bounding box of Colorado and the location of Arboles*\
    \ 311\n\nNotice how the top and bottom edges of the `geography` Polygon follow\
    \ the great elliptic arc that bends north away from the line of constant latitude\
    \ between the two points. The result is that the point representing Arboles falls\
    \ outside the Polygon, and is not included in the results of the `geography` `STIntersects()`\
    \ method.\n\nWhile the `geography` datatype gives the correct behavior in terms\
    \ of the area drawn on an ellipsoidal surface, it does not give us the result\
    \ we want in this case, which was to define a rectangle with “straight” lines\
    \ representing the bounding box of the map. One solution to this problem is to\
    \ create additional anchor points along the bottom and top edges of the Polygon,\
    \ which will lead to a closer approximation of the projected map view, but will\
    \ make our Polygon more complex and potentially slower to use in spatial queries.\n\
    \nAn alternative solution could be to not use the spatial datatypes at all, but\
    \ rather to create a simple numerical bounded query based on the limits defined\
    \ by the map window. In other words, execute a query directly on the latitude\
    \ and longitude columns as follows:\n\n```sql\nSELECT *\nFROM allCountries\nWHERE\n\
    \    latitude > 37 AND latitude < 41\n    AND\n    longitude > -109 AND longitude\
    \ < -102;\n```\n\nNot only will this avoid the problem of mixing flat/round data,\
    \ but it will also perform significantly faster than the previous solution using\
    \ the `geography` datatype if we were to add an index to the longitude and latitude\
    \ columns. Of course, the problem with this solution is that it is only going\
    \ to be of use in the very specific scenario used in this case—namely, when searching\
    \ for *points* that lie within a *rectangular* search area. If we wanted to extend\
    \ the application so that users could draw an irregular search area on the map,\
    \ or if we wanted to search for `LineStrings` or `Polygons` that intersected the\
    \ area, this approach would not work since we could no longer perform a query\
    \ based on simple search criteria.\n\nA better solution in this case is to store\
    \ geometries using geographic coordinates of latitude and longitude, as before,\
    \ but using the `geometry` datatype rather than the `geography` datatype. The\
    \ latitude coordinate is mapped directly to the y coordinate, and the longitude\
    \ coordinate is mapped to the x coordinate. Using this approach, the “straight”\
    \ line between two points at equal latitude will follow the constant line of latitude\
    \ between them, rather than the great elliptic arc as defined by the `geography`\
    \ datatype. To implement this approach, execute the following code listing:\n\n\
    ```sql\nALTER TABLE allCountries\nADD locationgeom geometry;\nGO\n\nUPDATE allCountries\n\
    SET locationgeom = geometry::STGeomFromWKB(location.STAsBinary(), location.STSrid);\n\
    GO\n```\n\nSelecting those `geometry` records that intersect the Polygon `POLYGON\
    \ ((-109 41, -109 37, -102 37, -102 41, -109 41))` now gives the results expected.\
    \ This is one example of a situation in which it is sometimes beneficial to break\
    \ the general rule of always only using the `geography` datatype for geographic\
    \ coordinates and the `geometry` datatype for projected coordinates. Other situations\
    \ in which this can occur are when you need to rely on a function that is only\
    \ available within the `geometry` datatype, such as `STConvexHull()` or `STRelate()`.\
    \ If the distances involved are not great, the effect of distortion caused by\
    \ the curvature of the earth can be ignored, and the greater functionality afforded\
    \ by the `geometry` datatype offsets its associated loss of accuracy.\n\nHowever,\
    \ you should exercise great caution when using the `geometry` datatype to store\
    \ geographic data in this way, because you may receive surprising results from\
    \ certain operations. Consider the fact that the `STArea()` and `STLength()` methods\
    \ of the `geometry` datatype return results in the unit of measurement in which\
    \ coordinate values were defined. If using the `geometry` datatype to store coordinate\
    \ values expressed in geographic coordinates of latitude and longitude, this means\
    \ that lengths will be measured in degrees, and areas in degrees squared, which\
    \ is almost certainly not what you want.\n\n## Spatial Indexing\n\nDevelopers\
    \ and DBAs alike know that a good index can make a significant amount of difference\
    \ to the performance of a database application. Nowhere is this truer than in\
    \ the realm of spatial indexes, where it is not uncommon to witness performance\
    \ improvements exceeding 1,000 percent by creating a spatial index on even a small\
    \ table of data. Of course, you can also get performance deterioration at the\
    \ same rate by using a poorly chosen or nonexistent index, so it pays well to\
    \ have an understanding of how spatial indexes work.\n\nSpatial indexes operate\
    \ very differently compared to the clustered and nonclustered indexes used for\
    \ more conventional datatypes. In fact, columns of `geometry` and `geography`\
    \ data can only be added to a spatial index, and spatial indexes can only be used\
    \ for those two types of data. To understand why, in this section I’ll first provide\
    \ an overview of spatial indexing, and then look at some of the ways of optimizing\
    \ a spatial index to provide optimal performance for your spatial applications.\n\
    \n### How Does a Spatial Index Work?\n\nWhen you execute a query involving a spatial\
    \ predicate, such as `STIntersects()`, the SQL Server database engine applies\
    \ that predicate in two stages:\n\n*   The **primary filter** identifies a set\
    \ of candidate results that may fulfill the required criteria. The result set\
    \ obtained from the primary filter is a superset—while it is guaranteed to contain\
    \ all of the true results, it may also contain false positives.\n*   The **secondary\
    \ filter** analyzes each of the records selected by the primary filter to determine\
    \ whether they truly meet the criteria of the query. The secondary filter is more\
    \ accurate, but slower than the primary filter.\n\nThe role of a spatial index\
    \ is to provide an approximation of the location and shape of geometries so that\
    \ they can be identified quickly in a primary filter. To do this, spatial indexes\
    \ in SQL Server utilize a multilevel grid model, with four levels of grid nested\
    \ inside each other, as illustrated in Figure 10-11."
  raw: '109, this point is contained in the map view used in this example, and we
    would expect it to be included in the result set retrieved from the database.
    However, this is not the result implied by the STIntersects() method of the geography
    datatype:


    DECLARE @BoundingBox geography;


    SET @BoundingBox = geography::STPolyFromText(


    ''POLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))'',


    4326);


    ![](index-331_1.png)


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    SELECT


    name,


    location.STAsText(),


    location.STIntersects(@BoundingBox)


    FROM


    allCountries


    WHERE


    geonameid = 5412070;


    The result 0 indicates that, despite being contained within the map window, the
    location of Arboles is not contained within the geography Polygon defined by the
    coordinates at the corners of the map. The reason might become more obvious if
    we take a visual look at what’s happening here. Execute the following code listing
    and then switch to the Spatial Results tab in Management Studio:


    DECLARE @BoundingBox geography;


    SET @BoundingBox = geography::STPolyFromText(


    ''POLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))'',


    4326);


    SELECT location


    FROM allCountries


    WHERE geonameid = 5412070


    UNION ALL SELECT @BoundingBox;


    The result is illustrated in Figure 10-10.


    *Figure 10-10\. The Spatial Results tab displaying the bounding box of Colorado
    and the location of Arboles* 311


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    Notice how the top and bottom edges of the geography Polygon follow the great
    elliptic arc that bends north away from the line of constant latitude between
    the two points. The result is that the point representing Arboles falls outside
    the Polygon, and is not included in the results of the geography STIntersects()
    method.


    While the geography datatype gives the correct behavior in terms of the area drawn
    on an ellipsoidal surface, it does not give us the result we want in this case,
    which was to define a rectangle with “straight”


    lines representing the bounding box of the map. One solution to this problem is
    to create additional anchor points along the bottom and top edges of the Polygon,
    which will lead to a closer approximation of the projected map view, but will
    make our Polygon more complex and potentially slower to use in spatial queries.


    An alternative solution could be to not use the spatial datatypes at all, but
    rather to create a simple numerical bounded query based on the limits defined
    by the map window. In other words, execute a query directly on the latitude and
    longitude columns as follows:


    SELECT *


    FROM allCountries


    WHERE


    latitude > 37 AND latitude < 41


    AND


    longitude > -109 AND longitude < -102;


    Not only will this avoid the problem of mixing flat/round data, but it will also
    perform significantly faster than the previous solution using the geography datatype
    if we were to add an index to the longitude and latitude columns. Of course, the
    problem with this solution is that it is only going to be of use in the very specific
    scenario used in this case—namely, when searching for *points* that lie within
    a *rectangular* search area. If we wanted to extend the application so that users
    could draw an irregular search area on the map, or if we wanted to search for
    LineStrings or Polygons that intersected the area, this approach would not work
    since we could no longer perform a query based on simple search criteria.


    A better solution in this case is to store geometries using geographic coordinates
    of latitude and longitude, as before, but using the geometry datatype rather than
    the geography datatype. The latitude coordinate is mapped directly to the y coordinate,
    and the longitude coordinate is mapped to the x coordinate. Using this approach,
    the “straight” line between two points at equal latitude will follow the constant
    line of latitude between them, rather than the great elliptic arc as defined by
    the geography datatype. To implement this approach, execute the following code
    listing:


    ALTER TABLE allCountries


    ADD locationgeom geometry;


    GO


    UPDATE allCountries


    SET locationgeom = geometry::STGeomFromWKB(location.STAsBinary(), location.STSrid);


    GO


    Selecting those geometry records that intersect the Polygon POLYGON ((-109 41,
    -109 37, -102 37,


    -102 41, -109 41)) now gives the results expected. This is one example of a situation
    in which it is sometimes beneficial to break the general rule of always only using
    the geography datatype for geographic coordinates and the geometry datatype for
    projected coordinates. Other situations in which this can occur are when you need
    to rely on a function that is only available within the geometry datatype, such
    as STConvexHull() or STRelate(). If the distances involved are not great, the
    effect of distortion caused by the curvature of the earth can be ignored, and
    the greater functionality afforded by the geometry datatype offsets its associated
    loss of accuracy.


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    However, you should exercise great caution when using the geometry datatype to
    store geographic data in this way, because you may receive surprising results
    from certain operations. Consider the fact that the STArea() and STLength() methods
    of the geometry datatype return results in the unit of measurement in which coordinate
    values were defined. If using the geometry datatype to store coordinate values
    expressed in geographic coordinates of latitude and longitude, this means that
    lengths will be measured in degrees, and areas in degrees squared, which is almost
    certainly not what you want.


    Spatial Indexing


    Developers and DBAs alike know that a good index can make a significant amount
    of difference to the performance of a database application. Nowhere is this truer
    than in the realm of spatial indexes, where it is not uncommon to witness performance
    improvements exceeding 1,000 percent by creating a spatial index on even a small
    table of data. Of course, you can also get performance deterioration at the same
    rate by using a poorly chosen or nonexistent index, so it pays well to have an
    understanding of how spatial indexes work.


    Spatial indexes operate very differently compared to the clustered and nonclustered
    indexes used for more conventional datatypes. In fact, columns of geometry and
    geography data can only be added to a spatial index, and spatial indexes can only
    be used for those two types of data. To understand why, in this section I’ll first
    provide an overview of spatial indexing, and then look at some of the ways of
    optimizing a spatial index to provide optimal performance for your spatial applications.


    How Does a Spatial Index Work?


    When you execute a query involving a spatial predicate, such as STIntersects(),
    the SQL Server database engine applies that predicate in two stages:


    •


    The **primary filter** identifies a set of candidate results that may fulfill
    the required criteria. The result set obtained from the primary filter is a superset—while
    it is


    guaranteed to contain all of the true results, it may also contain false positives.


    •


    The **secondary filter** analyzes each of the records selected by the primary
    filter to


    determine whether they truly meet the criteria of the query. The secondary filter
    is


    more accurate, but slower than the primary filter.


    The role of a spatial index is to provide an approximation of the location and
    shape of geometries so that they can be identified quickly in a primary filter.
    To do this, spatial indexes in SQL Server utilize a multilevel grid model, with
    four levels of grid nested inside each other, as illustrated in Figure 10-11.'
  trans: "# 第十章 处理空间数据\n\n109，该点包含在此示例所使用的地图视图中，我们预期它也应包含在从数据库检索的结果集中。然而，这并非`geography`数据类型的`STIntersects()`方法所返回的结果：\n\
    \n```sql\nDECLARE @BoundingBox geography;\n\nSET @BoundingBox = geography::STPolyFromText(\n\
    'POLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))',\n4326);\n```\n\n![](img/index-331_1.png)\n\
    \n```sql\nSELECT\n    name,\n    location.STAsText(),\n    location.STIntersects(@BoundingBox)\n\
    FROM\n    allCountries\nWHERE\n    geonameid = 5412070;\n```\n\n结果为 0，这表明尽管位于地图窗口内，但\
    \ Arboles 的位置并不在地图四角坐标定义的`geography`多边形内。如果我们直观地看一下这里发生的情况，原因可能会更明显。执行以下代码清单，然后切换到\
    \ Management Studio 中的“空间结果”选项卡：\n\n```sql\nDECLARE @BoundingBox geography;\n\n\
    SET @BoundingBox = geography::STPolyFromText(\n'POLYGON ((-109 41, -109 37, -102\
    \ 37, -102 41, -109 41))',\n4326);\n\nSELECT location\nFROM allCountries\nWHERE\
    \ geonameid = 5412070\n\nUNION ALL SELECT @BoundingBox;\n```\n\n结果如图 10-10 所示。\n\
    \n*图 10-10. 显示科罗拉多州边界框和 Arboles 位置的“空间结果”选项卡* 311\n\n请注意，`geography`多边形的顶部和底部边缘沿着大椭圆弧延伸，该弧线从两点之间的恒定纬度线向北弯曲。结果是代表\
    \ Arboles 的点落在多边形之外，因此未包含在`geography` `STIntersects()`方法的结果中。\n\n虽然`geography`数据类型在椭球面上绘制区域方面给出了正确的行为，但在当前情况下，它并未给出我们想要的结果——即使用“直线”定义一个代表地图边界框的矩形。解决此问题的一种方法是在多边形的顶部和底部边缘创建额外的锚点，这将更接近于投影地图视图的近似值，但会使我们的多边形更加复杂，并可能降低空间查询的使用速度。\n\
    \n另一种解决方案是不使用空间数据类型，而是根据地图窗口定义的限制创建一个简单的数值范围查询。换句话说，直接对纬度和经度列执行查询，如下所示：\n\n```sql\n\
    SELECT *\nFROM allCountries\nWHERE\n    latitude > 37 AND latitude < 41\n    AND\n\
    \    longitude > -109 AND longitude < -102;\n```\n\n这不仅避免了混合平面/球面数据的问题，而且如果我们为经度和纬度列添加索引，其执行速度也将比之前使用`geography`数据类型的解决方案快得多。当然，此解决方案的问题在于，它仅在此案例中使用的非常特定的场景下有用——即在*矩形*搜索区域内搜索*点*。如果我们想扩展应用程序，让用户可以在地图上绘制不规则的搜索区域，或者想搜索与该区域相交的`LineStrings`或`Polygons`，这种方法就行不通了，因为我们无法再基于简单的搜索条件执行查询。\n\
    \n在这种情况下，更好的解决方案是像之前一样使用纬度和经度的地理坐标存储几何图形，但使用`geometry`数据类型而不是`geography`数据类型。纬度坐标直接映射到\
    \ y 坐标，经度坐标映射到 x 坐标。使用这种方法，两个等纬度点之间的“直线”将遵循它们之间的恒定纬度线，而不是由`geography`数据类型定义的大椭圆弧。要实现此方法，请执行以下代码清单：\n\
    \n```sql\nALTER TABLE allCountries\nADD locationgeom geometry;\nGO\n\nUPDATE allCountries\n\
    SET locationgeom = geometry::STGeomFromWKB(location.STAsBinary(), location.STSrid);\n\
    GO\n```\n\n现在，选择那些与多边形 `POLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))`\
    \ 相交的`geometry`记录会得到预期的结果。这是有时打破“仅对地理坐标使用`geography`数据类型，对投影坐标使用`geometry`数据类型”这一通用规则有益的一个例子。其他可能发生这种情况的情况是，当你需要依赖某个仅在`geometry`数据类型中可用的函数时，例如`STConvexHull()`或`STRelate()`。如果涉及的距离不大，可以忽略地球曲率引起的变形影响，而`geometry`数据类型提供的更强大功能足以弥补其相关的精度损失。\n\
    \n但是，以这种方式使用`geometry`数据类型存储地理数据时应格外小心，因为某些操作可能会产生令人惊讶的结果。考虑这样一个事实：`geometry`数据类型的`STArea()`和`STLength()`方法以定义坐标值时所使用的度量单位返回结果。如果使用`geometry`数据类型存储以纬度和经度地理坐标表示的坐标值，这意味着长度将以度为单位测量，面积将以平方度为单位，这几乎肯定不是你想要的。\n\
    \n## 空间索引\n\n开发人员和数据库管理员都知道，一个好的索引可以显著提高数据库应用程序的性能。在空间索引领域，这一点尤为 true，即使是为小数据表创建空间索引，性能提升超过\
    \ 1000% 的情况也并不少见。当然，使用选择不当或不存在的索引也可能导致同等比例的性能下降，因此理解空间索引的工作原理非常有价值。\n\n空间索引的运作方式与用于更常规数据类型的聚集索引和非聚集索引有很大不同。实际上，`geometry`和`geography`数据列只能添加到空间索引中，并且空间索引只能用于这两种数据类型。为了理解原因，在本节中，我将首先概述空间索引，然后探讨一些优化空间索引以为你的空间应用程序提供最佳性能的方法。\n\
    \n### 空间索引如何工作？\n\n当你执行涉及空间谓词（如`STIntersects()`）的查询时，SQL Server 数据库引擎分两个阶段应用该谓词：\n\
    \n*   **主筛选器** 识别一组可能满足所需条件的候选结果。从主筛选器获得的结果集是一个超集——虽然它保证包含所有真实结果，但也可能包含错误匹配项。\n\
    *   **辅助筛选器** 分析主筛选器选择的每条记录，以确定它们是否真正满足查询条件。辅助筛选器更准确，但比主筛选器慢。\n\n空间索引的作用是提供几何图形位置和形状的近似表示，以便可以在主筛选器中快速识别它们。为此，SQL\
    \ Server 中的空间索引采用多级网格模型，内部嵌套有四级网格，如图 10-11 所示。"
- fmt: "# 空间索引网格概览\n\n网格被覆盖在索引所涵盖的空间区域上，该区域内的每个几何体随后会根据网格进行**细分**。空间索引中的每个条目并不描述关联几何体的详细形状，而是包含对一个网格单元的引用，以及与该单元相交的几何体的主键。请注意，并非几何体相交的*每个*单元都会包含在索引中——系统会应用诸如**最深单元规则**和**覆盖规则**之类的优化，以确保空间索引中的每个条目都能以最详尽的细节描述关联几何体，同时占用最少的网格单元。有关这些主题的更多信息，请参阅相关书籍或联机丛书。\n\
    \n## 空间查询中网格的应用示例\n\n为了理解数据库引擎如何使用网格来满足空间查询，请参考上一节中检索位于地图边界框内的所有点的示例：\n\n**图 10-11.\
    \ 空间索引使用的多级网格**\n\n```sql\nDECLARE @BoundingBox geography;\n\nSET @BoundingBox\
    \ = geography::STPolyFromText(\n'POLYGON ((-109 41, -109 37, -102 37, -102 41,\
    \ -109 41))',\n4326);\n\nSELECT\n    name,\n    location.STAsText()\nFROM\n  \
    \  allCountries\nWHERE\n    location.STIntersects(@BoundingBox) = 1;\n```\n\n\
    `location`列被包含在`idxallCountries`地理索引中，并且谓词`location.STIntersects(@BoundingBox)\
    \ = 1`支持使用空间索引，因此该查询的执行计划可以利用基于索引的主筛选器。为此，首先根据`location`列上`idxallCountries`索引的相同网格对`@BoundingBox`参数进行细分。然后，可以将索引中每个单元占用的网格单元与`@BoundingBox`占用的网格单元进行比较。主筛选器的结果可能导致以下三种结果之一：\n\
    \n-   如果`location`列中的某个几何体没有与`@BoundingBox`所占用单元共同的索引单元，则它可以被主筛选器丢弃，因为几何体本身不可能相交。\n\
    -   如果该几何体占据了`@BoundingBox`所占用的索引网格单元的全部，那么它肯定会与`@BoundingBox`几何体本身相交。因此，无需调用次级筛选器，此行就可以肯定地包含在结果集中。这被称为内部筛选。\n\
    -   如果该几何体仅部分占据了`@BoundingBox`所占用的网格单元，则无法确定该单元是否与`@BoundingBox`相交。在这些情况下，几何体必须传递给次级筛选器，这涉及调用`STIntersects()`方法本身。\n\
    \n为了获得最佳的空间查询性能，理想目标是让主筛选器完成尽可能多的处理，并减少需要调用次级筛选器的次数。这意味着要确保尽可能多的行要么被主筛选器完全丢弃，要么仅基于主筛选器就肯定被包含。实现这一目标需要调整网格属性，以最好地匹配底层数据集中的数据以及针对该数据运行的查询类型。\n\
    \n## 优化网格\n\n如果空间索引要有效地充当空间查询结果的主筛选器，它不仅必须快速，而且还必须最小化返回的误报结果数量。索引在实现这两个目标方面的成功程度，很大程度上取决于为其网格分辨率、边界框和每对象单元数参数选择的值。\n\
    \n每个参数的最佳值在很大程度上取决于所讨论的底层数据集的确切分布。但是，在下一节中，我将给出一些在确定空间索引设置时需要牢记的一般思路。"
  raw: 'The grid is overlaid on the area of space covered by the index, and every
    geometry lying in that area is then **tessellated** according to the grid. Rather
    than describing the detailed shape of the associated geometry, each entry in a
    spatial index comprises a reference to a grid cell, together with the primary
    key of the geometry that intersects that cell. Note that not *every* cell intersected
    by the geometry is included in the index—optimizations such as the **deepest-cell
    rule** and the **covering rule** are applied to ensure every entry in the spatial
    index describes the associated geometry in the greatest amount of detail while
    requiring the least amount of grid cells. For more information on these topics,
    please refer to a book dedicated to the subject, or refer to Books Online.


    To see how the database engine uses the grid to satisfy a spatial query, consider
    the example from the previous section to retrieve all those points contained within
    the bounding box of a map: 313


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    *Figure 10-11\. The multilevel grid used by spatial indexes*


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    DECLARE @BoundingBox geography;


    SET @BoundingBox = geography::STPolyFromText(


    ''POLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))'',


    4326);


    SELECT


    name,


    location.STAsText()


    FROM


    allCountries


    WHERE


    location.STIntersects(@BoundingBox) = 1;


    The location column is included in the idxallCountries geography index, and the
    predicate


    location.STIntersects(@BoundingBox) = 1 supports the use of a spatial index, so
    the execution plan for this query can take advantage of a primary filter based
    on the index. To do so, the @BoundingBox parameter is first tessellated according
    to the same grid as the idxallCountries index on the location column. The grid
    cells occupied by each cell in the index can then be compared to the grid cells
    occupied by the @BoundingBox. The outcome of the primary filter can lead to one
    of three results:


    •


    If a geometry in the location column has no index cells in common with the cells


    occupied by @BoundingBox, it can be discarded by the primary filter, since the


    geometries themselves cannot intersect.


    •


    If the geometry occupies the whole of a grid cell in the index occupied by


    @BoundingBox, it is certain to intersect the @BoundingBox geometry itself. This
    row


    can therefore definitely be included in the result set without need to call the


    secondary filter. This is known as internal filtering.


    •


    If the geometry only partially occupies a grid cell occupied by @BoundingBox,
    it


    cannot be determined for certain whether that cell intersects the @BoundingBox.
    In


    these cases, the geometries must be passed to the secondary filter, which involves


    calling the STIntersects() method itself.


    To get the best performance from a spatial query, the ideal goal is to get as
    much of the processing done by the primary filter, and reduce the number of times
    that the secondary filter needs to be called.


    This means ensuring that as many rows as possible are either discarded completely
    by the primary filter or definitely included based on the primary filter alone.
    Achieving this goal requires tuning the grid properties to best match the data
    in the underlying dataset and the type of queries run against that data.


    Optimizing the Grid


    If a spatial index is to be effective in acting as a primary filter for the results
    of a spatial query, not only must it be fast, but it must also minimize the number
    of false positive results returned. How well an index succeeds in meeting these
    two aims is largely determined by the values chosen for the grid resolution, the
    bounding box, and the cells per object parameters of the index.


    The optimum value for each of these parameters depends very much on the exact
    distribution of the underlying dataset in question. However, in the following
    section I’ll give you some general ideas to bear in mind when determining the
    settings for a spatial index.


    CHAPTER 10 „ WORKING WITH SPATIAL DATA'
