    针对层次结构提出的问题类型，通常与上一节探讨的图遍历示例问题有所不同。对于邻接表以及其他本章讨论的层次模型，我们将考虑如何回答以下常见问题：


    - 给定节点的**直接后代**是什么？换言之，哪些人直接向给定的管理者汇报？

    - 给定节点的*所有*后代是什么？也就是说，组织层级中最终向给定管理者汇报的所有下级有多少人？这里的挑战在于如何对输出进行排序，使其符合层次结构逻辑。

    - 从给定的子节点返回根节点的路径是什么？换言之，沿着管理路径向上追溯，谁向谁汇报？


    我还将讨论以下数据修改方面的挑战：


    - 将新节点插入层次结构，例如当新员工被聘用时。

    - 重定位子树，例如当某个部门被划归新管理者管辖时可能需要这样操作。

    - 从层次结构中删除节点，例如，可能因为人员流失而需要在组织层级中进行此操作。


    本章讨论的每种技术在解决这些问题的复杂性上略有不同的难度，我将对何时使用每种模型提出一般性建议。


    ## Finding Direct Descendants


    在邻接表层次结构中，查找给定节点的直接后代相当简单；这与在图中查找可以遍历到的可用节点相同。首先为查询选择父节点，然后选择所有以该节点为父节点的节点。要查找所有直接向首席执行官（`EmployeeID`
    109）汇报的员工，请使用以下 T-SQL：


    ```sql

    SELECT *

    FROM Employee_Temp

    WHERE ManagerID = 109;

    ```


    此查询返回的结果如下所示，显示了 AdventureWorks 的六个分支，由其高级管理团队代表——这正是我们预期的结果。


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    | EmployeeID | ManagerID | Title |

    | :--- | :--- | :--- |

    | 6 | 109 | Marketing Manager |

    | 12 | 109 | Vice President of Engineering |

    | 42 | 109 | Information Services Manager |

    | 140 | 109 | Chief Financial Officer |

    | 148 | 109 | Vice President of Production |

    | 273 | 109 | Vice President of Sales |


    然而，此查询存在一个隐藏问题：在 `Employee_Temp` 表中从一个节点遍历到另一个节点意味着基于 `ManagerID` 列进行搜索。考虑到该列未被索引，前面查询的查询计划涉及扫描也就不足为奇了，如图
    12-8 所示。


    `Figure 12-8. Querying on the ManagerID causes a table scan.`


    要消除此问题，必须在 `ManagerID` 列上创建索引。然而，为这样的表选择最佳的索引方式可能很困难。在这个小示例中，对 `ManagerID` 的聚集索引将为查询和数据更新提供最佳的整体性能组合，因为它涵盖了所有涉及遍历表的查询。但是，在实际的生产系统中，基于
    `EmployeeID` 的查询比例可能要高得多——例如，获取单个员工数据的查询——而且表中可能包含比此处用于示例目的的三个列多得多的列，这意味着聚集键查找可能代价高昂。


    在这种情况下，仔细测试哪种索引组合能为你的特定工作负载提供查询和数据修改性能的最佳平衡非常重要。


    为了在本例中展示最佳性能，请将主键更改为使用非聚集索引，并在 `ManagerID` 上创建聚集索引，如下列 T-SQL 所示：


    ```sql

    ALTER TABLE Employee_Temp

    DROP CONSTRAINT FK_Manager, PK_Employee;


    CREATE CLUSTERED INDEX IX_Manager

    ON Employee_Temp (ManagerID);


    ALTER TABLE Employee_Temp

    ADD CONSTRAINT PK_Employee

    PRIMARY KEY NONCLUSTERED (EmployeeID);

    GO

    ```'
