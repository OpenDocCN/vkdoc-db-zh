  trans: '

    请注意，从 `hierarchyid` `ToString()` 方法获取的路径与我们先前在 `thePath` 列中创建的路径完全相同。不过幸运的是，在此层次结构中向上导航并不需要像以前那样进行任何字符串操作——相反，我们可以使用
    `GetAncestor()` 方法，它提供了与 `IsDescendant()` 相似的功能，但视角相反。`GetAncestor()` 方法不是返回布尔值以指示一个给定节点是否是另一个节点的后代，而是被调用在子元素上，用于返回代表该子节点祖先的
    `hierarchyid` 节点。`GetAncestor()` 方法不仅可以返回节点的直接父节点——它还接受一个参数，用于确定给定节点与祖先之间应相隔的层级数。


    为了演示，以下代码清单使用带有参数 `1` 的 `GetAncestor()` 方法，来确定层次结构列中每个节点的直接父节点。然后，此值用于仅返回那些直接向营销经理（`EmployeeID
    6`）汇报的节点：


    ```sql

    DECLARE @Parent hierarchyid;


    SELECT @Parent = hierarchy

    FROM Employee_Temp

    WHERE EmployeeID = 6;


    SELECT * FROM Employee_Temp

    WHERE hierarchy.GetAncestor(1) = @Parent;

    ```


    ## 插入节点


    为了插入一个新节点，我们需要计算出代表通往该节点路径的适当 `hierarchyid` 值。这可以通过在将成为新插入节点父节点的节点上使用 `GetDescendant()`
    方法来完成。`GetDescendant()` 接受两个参数，用于确定分配的 `hierarchyid` 节点所在范围的下限和上限值。为了演示此方法，假设收货与发货主管（`EmployeeID
    85`）需要招聘一名办公室管理员。通过为两个参数都提供 `null` 值，以下代码使用 `GetDescendant()` 方法为新员工分配一个任意的 `hierarchyid`
    值：


    ```sql

    DECLARE @Parent hierarchyid;


    SELECT @Parent = hierarchy

    FROM Employee_Temp

    WHERE EmployeeID = 85;


    SELECT @Parent.GetDescendant(null, null).ToString();

    ```


    结果 `/109/148/21/85/1/` 保证是一个新节点，并且是所提供父节点的直接后代，但新节点的实际标识可能会有所不同。在某些情况下，这可能会导致问题。例如，考虑如果生产主管（`EmployeeID
    16`）要招聘一名新员工，使用前面的模式为这个新员工分配一个层次结构节点，我们最初可能会尝试类似这样的代码：


    ```sql

    DECLARE @Parent hierarchyid;


    SELECT @Parent = hierarchy

    FROM Employee_Temp

    WHERE EmployeeID = 16;


    SELECT @Parent.GetDescendant(null, null).ToString();

    ```


    返回的结果 `/109/148/21/16/1/` 是一个有效的节点，它向生产主管汇报，但问题是这个节点在层次结构中已经存在。它被分配给了 `EmployeeID
    1`，这是一位向该生产主管汇报的技术员。为了避免这种情况，我们可以向 `GetDescendant()` 方法提供一个参数值，代表新创建的子节点必须大于的最小值。为此，我们将找出所选父节点当前已分配的最大子节点，如下所示：


    ```sql

    DECLARE @Parent hierarchyid;


    SELECT @Parent = hierarchy

    FROM Employee_Temp

    WHERE EmployeeID = 16;


    DECLARE @MaxChild hierarchyid;


    SELECT @MaxChild = MAX(hierarchy)

    FROM Employee_Temp

    WHERE hierarchy.IsDescendantOf(@Parent) = 1;


    SELECT @Parent.GetDescendant(@MaxChild, null).ToString();

    ```


    结果 `/109/148/21/16/248/` 现在保证是层次结构中的一个唯一节点。可以提供给 `GetDescendant()` 的第二个参数代表新创建节点必须位于其之前的最大节点值。在这种情况下，我将其设为
    `null`，因为我不想强制指定上限。


    当然，在当前模型中，具体化路径中每个节点的值是基于关联员工的 `EmployeeID`。只要 `EmployeeID` 字段保持唯一，你就可以继续基于此对每个节点值建模，而不必担心创建重复
    `hierarchyid` 值的可能性。然而，还有许多其他场景下此类标识值不可用，在这些情况下，`GetDescendantOf()` 方法成为一种非常有用的为新子节点分配值的方式。如果你希望同时在
    `Employee_Temp` 表中保留基于 `EmployeeID` 建模的邻接表和 `hierarchyid` 模型，那么当然需要修改先前创建的 `tg_Insert`
    触发器，以根据插入行的 `EmployeeID` 自动更新 `hierarchy` 列。


    ## 重定位子树


    要重定位一个 `hierarchyid` 节点，我们使用 `GetReparentedValue()` 方法。请注意，此方法实际上并不更改 `hierachyid`
    值——相反，它返回一个代表节点新路径的节点（如果该节点将被重新分配到所提供的新的父节点）。要移动节点，你必须将 `hierarchyid` 值更新为等于此结果。


    为了演示其实际操作，考虑如果我们从层次结构中移除一名生产主管（`EmployeeID 64`），并将其所有直接下属员工重定位向另一名替代主管（`EmployeeID
    74`）汇报，会发生什么。


    首先，我们需要识别代表节点所来自的旧父节点和节点将要汇报的新父节点的节点，如下所示：


    ```sql

    DECLARE @FromParent hierarchyid;


    SELECT @FromParent = hierarchy

    FROM Employee_Temp

    WHERE EmployeeID = 64;


    DECLARE @ToParent hierarchyid;


    SELECT @ToParent = hierarchy

    FROM Employee_Temp

    WHERE EmployeeID = 74;

    ```


    在识别出节点将要移动于其间的两个父节点后，我们可以使用 `GetReparentedValue()` 方法更新所有旧父节点的后代，如下所示：


    ```sql

    UPDATE Employee_Temp

    SET hierarchy = hierarchy.GetReparentedValue(@FromParent, @ToParent)

    WHERE

    hierarchy.IsDescendantOf(@FromParent) = 1

    AND EmployeeID <> 64;

    ```


    此查询使用 `IsDescendantOf()` 方法来识别所有向旧父节点（`EmployeeID 64`）汇报的行，并更新它们以向新父节点汇报。最后的条件是为了防止原始父节点被移动（请记住，根据
    `IsDescendantOf()` 方法，一个节点是自身的后代）。


    与行插入类似，如果你想在生产环境中将此解决方案与邻接表一起维护，则需要修改 `tg_Update` 存储过程，以便在节点移动时更新 `hierarchy`
    列。


    ## 删除节点


    使用 `hierarchyid` 数据类型建模的层次结构不强制执行任何类型的内在引用完整性。因此，任何节点都可以从层次结构中移除，如果被移除的节点是非叶节点，可能会导致孤立节点。幸运的是，与前面描述的字符串具体化路径类似，在此示例中，我们将
    `hierarchyid` 数据类型与 `Employee_Temp` 表上现有邻接表提供的约束结合使用。这些约束意味着只有叶节点可以被删除，这减少了在层次结构结构中引入孤立节点或多根节点的机会。


    ## 约束层次结构


    由于 `hierarchyid` 数据类型本质上只是具体化路径结构的一个包装器，因此如何约束层次结构以防止循环或森林的规则同样适用。另一个考虑因素是如何最好地为
    `hierarchyid` 数据列建立索引。在 `hierarchy` 列上放置唯一索引可以防止重复条目，并提高针对层次结构的查询性能，但你应该花一点时间考虑如何在单个索引中对层次结构进行排序。

    '
- fmt: "# CHAPTER 12: TREES, HIERARCHIES, AND GRAPHS\n\nBy default, SQL Server 2008\
    \ indexes `hierarchyid` values in a `depth-first` order. That is, the nodes that\
    \ are listed down a particular path through the tree are listed next to each other.\
    \ This sort of indexing is efficient for fulfilling queries that involve traversing\
    \ up (or down) several levels of subtrees, such as “Find the managers two levels\
    \ immediately above this employee.” The following code listing creates a depth-first\
    \ index on the hierarchy column:\n\n```sql\nCREATE UNIQUE INDEX idxHierarchyDepth\n\
    ON Employee_Temp(hierarchy);\nGO\n```\n\nIt is also possible to index `hierarchyid`\
    \ data in `breadth-first` order, in which case all the siblings who are immediate\
    \ children of a particular parent node are listed next to each other in the index.\
    \ This kind of index is best suited for queries such as “Find all the employees\
    \ who report directly to this manager.” Of course, you don’t need to choose exclusively\
    \ between these two types of index—you can create both. To create a breadth-first\
    \ index, we will make use of the `GetLevel()` method once more to populate a persisted\
    \ column representing the level of each node. By including this column in the\
    \ index, we will ensure that nodes at the same level of the hierarchy are indexed\
    \ next to each other, as expected in the breadth-first index:\n\n```sql\nALTER\
    \ TABLE Employee_Temp\nADD hierarchyLevel AS hierarchy.GetLevel();\nGO\n\nCREATE\
    \ UNIQUE INDEX idxHierarchyBreadth\nON Employee_Temp(hierarchyLevel, hierarchy);\n\
    GO\n```\n\n## Summary\n\nGraphs and hierarchies are extremely common throughout\
    \ our world, and it is often necessary to represent them in databases. By utilizing\
    \ adjacency lists, you can describe virtually any graph’s form, and recursive\
    \ CTEs allow you to navigate graphs with relative ease. Hierarchies—special types\
    \ of graphs—can also be modeled using adjacency lists, but other techniques can\
    \ be employed to make querying them much more efficient, without the need for\
    \ recursion or iteration.\n\nThere are a lot of ways to solve hierarchical problems,\
    \ but in the end it comes down to the best choice for the given scenario you’re\
    \ faced with. As always, the most important thing you can do as a developer is\
    \ to carefully consider your options, and test whenever possible to find the optimal\
    \ solution.\n\n## Index\n\n`APIs` (application programming interfaces), [18](#index_split_000.html#p40)\n\
    \n### A\n\n`application lifespan`, [27](#index_split_000.html#p49)\n\napplication\
    \ locks\n    access control\n        `acquiring`, [250](#index_split_004.html#p272)\n\
    \        via `ACLs`, [102](#index_split_001.html#p124)\n        `described`, [250](#index_split_004.html#p272)\n\
    \        via `impersonation`, [102–104, 107–110](#index_split_001.html#p124)\n\
    \        drawbacks of, [251](#index_split_004.html#p273)\n    `Access Control\
    \ Lists (ACLs)`, [102](#index_split_001.html#p124)\n    `nontransactional`, [251–259](#index_split_004.html#p273)\n\
    \    `accuracy`, [294](#index_split_005.html#p316)\n    `releasing`, [250](#index_split_004.html#p272)\n\
    \n`acyclic graphs`, [371–372](#index_split_006.html#p393)\n\n`application logic`,\
    \ [12](#index_split_000.html#p34)\n\n`ad hoc SQL`, [196](#index_split_003.html#p218)\n\
    \n`application logins`, [102](#index_split_001.html#p124)\n\n`Adabas database\
    \ management system`, [9](#index_split_000.html#p31)\n\n`application programming\
    \ interfaces (APIs)`, [18](#index_split_000.html#p40)\n\n`ADD SIGNATURE command`,\
    \ [116](#index_split_002.html#p138)\n\n`application-level parameterization`, [202–203](#index_split_003.html#p224)\n\
    \n`Address column`, [30](#index_split_000.html#p52)\n\n`APTCA (AllowPartiallyTrustedCallersAttribute)`,\
    \ [178](#index_split_003.html#p200)\n\nadjacency list model (hierarchies). *See\
    \ also* `persistent materialized paths`\n    `constraining`, [374–376, 388, 402–405,\
    \ 412](#index_split_006.html#p396)\n\n`cohesion`, [2, 4–5](#index_split_000.html#p24)"
  raw: 'By default, SQL Server 2008 indexes hierarchyid values in a **depth-first**
    order. That is, the nodes that are listed down a particular path through the tree
    are listed next to each other. This sort of indexing is efficient for fulfilling
    queries that involve traversing up (or down) several levels of subtrees, such
    as “Find the managers two levels immediately above this employee.” The following
    code listing creates a depth-first index on the hierarchy column:


    CREATE UNIQUE INDEX idxHierarchyDepth


    ON Employee_Temp(hierarchy) ;


    GO


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    It is also possible to index hierarchyid data in **breadth-first** order, in which
    case all the siblings who are immediate children of a particular parent node are
    listed next to each other in the index. This kind of index is best suited for
    queries such as “Find all the employees who report directly to this manager.”
    Of course, you don’t need to choose exclusively between these two types of index—you
    can create both. To create a breadth-first index, we will make use of the GetLevel()
    method once more to populate a persisted column representing the level of each
    node. By including this column in the index, we will ensure that nodes at the
    same level of the hierarchy are indexed next to each other, as expected in the
    breadth-first index:


    ALTER TABLE Employee_Temp


    ADD hierarchyLevel AS hierarchy.GetLevel();


    GO


    CREATE UNIQUE INDEX idxHierarchyBreadth


    ON Employee_Temp(hierarchyLevel, hierarchy);


    GO


    Summary


    Graphs and hierarchies are extremely common throughout our world, and it is often
    necessary to represent them in databases. By utilizing adjacency lists, you can
    describe virtually any graph’s form, and recursive CTEs allow you to navigate
    graphs with relative ease. Hierarchies—special types of graphs—can also be modeled
    using adjacency lists, but other techniques can be employed to make querying them
    much more efficient, without the need for recursion or iteration.


    There are a lot of ways to solve hierarchical problems, but in the end it comes
    down to the best choice for the given scenario you’re faced with. As always, the
    most important thing you can do as a developer is to carefully consider your options,
    and test whenever possible to find the optimal solution.


