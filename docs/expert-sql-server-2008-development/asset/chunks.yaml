    8 字节 |

    | `datetime2` | 0001年1月1日, 00:00:00.0000000 – 9999年12月31日, 23:59:59.9999999 |
    100 纳秒（ns） | 6-8 字节 |

    | `smalldatetime` | 1900年1月1日, 00:00 – 2079年6月6日, 23:59 | 1 分钟 | 4 字节 |

    | `datetimeoffset` | 0001年1月1日, 00:00:00.0000000 – 9999年12月31日, 23:59:59.9999999
