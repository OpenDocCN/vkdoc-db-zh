    \        break;\n    case \"SHA256\":\n        HMac = new HMACSHA256(Key.Value);\n\
    \        break;\n    case \"SHA384\":\n        HMac = new HMACSHA384(Key.Value);\n\
    \        break;\n    case \"SHA512\":\n        HMac = new HMACSHA512(Key.Value);\n\
    \        break;\n    case \"RIPEMD160\":\n        HMac = new HMACRIPEMD160(Key.Value);\n\
    \        break;\n    default:\n        throw new Exception(\"Hash algorithm not\
