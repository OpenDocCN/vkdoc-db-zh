    located at latitude 37.0281 and longitude –107.419. These are the coordinates
    stored in the `allCountries` tables for the community of Arboles (geonameid 5412070),
    located at the northwest edge of Navajo Lake. Since the latitude of 37.0281 lies
    between 37 and 41, and the longitude value of –107.419 lies between –102 and –'
