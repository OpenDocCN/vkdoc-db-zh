    \   FileLines.ReadFileLines(@\"C:\\b.txt\");\n    SqlContext.Pipe.Send(\"Finished...\"\
    );\n    return;\n}\n```\n\n请注意，我将 `ReadFileLines` 方法创建在名为 `FileLines` 的类中；请根据你使用的类名适当引用你的方法。修改完成后，重新部署外部程序集，并确保它被编目为\
    \ `SAFE`。\n\n运行此存储过程的修改版本，你会发现即使跨越了程序集边界，你仍然会收到与之前相同的异常。CAS 授权并没有因为引用了更高权限的程序集而改变，这是因为栈遍历不考虑被引用程序集所持有的权限。\n\
    \n要解决此问题，需要在被引用的程序集中控制栈遍历。\n\n由于该程序集有足够的权限执行文件操作，它可以在内部要求栈遍历停止检查文件 I/O 权限，即使从另一个没有相应权限的程序集中调用也是如此。这是通过使用\
    \ .NET 的 `System.Security` 命名空间中公开的 `IStackWalk` 接口的 `Assert` 方法来完成的。\n\n再次查看前面显示的\
    \ CAS 违规，注意所需的权限是 `FileIOPermission`，它位于 `System.Security.Permissions` 命名空间中。`FileIOPermission`\
    \ 类——连同该命名空间中的其他“权限”类——实现了 `IStackWalk` 接口。为避免 CAS 异常，只需实例化 `FileIOPermission`\
    \ 类的一个实例并调用 `Assert` 方法。以下代码是使用此技术的 `ReadFileLines` 方法的修改版本：\n\n```csharp\npublic\
    \ static string[] ReadFileLines(string FilePath)\n{\n    //Assert that anything\
    \ File IO-related that this\n    //assembly has permission to do, callers can\
    \ do\n    FileIOPermission fp = new FileIOPermission(\n        PermissionState.Unrestricted);\n\
    \    fp.Assert();\n\n    List<string> theLines = new List<string>();\n    using\
    \ (System.IO.StreamReader sr =\n        new System.IO.StreamReader(FilePath))\n\
    \    {\n        string line;\n        while ((line = sr.ReadLine()) != null)\n\
    \            theLines.Add(line);\n    }\n    return (theLines.ToArray());\n}\n\
    ```\n\n此版本的方法使用 `PermissionState.Unrestricted` 枚举实例化了 `FileIOPermission` 类，从而使所有调用者能够执行该程序集有权执行的任何文件\
    \ I/O 相关活动。在此上下文中使用术语“无限制”并不像听起来那么危险；访问是无限制的，其含义是权限只允许调用者访问该程序集本身已拥有的文件系统访问级别。在此处进行修改并重新部署两个程序集后，CAS\
    \ 异常将不再是问题。\n\n为了让你能在更细的粒度上控制，`FileIOPermission` 类公开了其他具有不同选项的构造函数重载。对于本示例最有用的一个是使用名为\
    \ `FileIOPermissionAccess` 的枚举结合文件路径，允许你将授予调用者的权限限制为仅对指定文件的特定操作。例如，要限制访问，使调用者只能读取本示例中指定的文件，请使用以下构造函数：\n\
    \n```csharp\nFileIOPermission fp = new FileIOPermission(\n    FileIOPermissionAccess.Read,\n\
    \    \"C:\\b.txt\");\n```\n\n文件 I/O 只是你可能遇到 CAS 异常的多种权限之一。重要的是能够识别这个模式。在所有情况下，违规都会抛出\
    \ `SecurityException`，并引用 `System.Security.Permissions` 命名空间中的一个权限类。\n\n每个类都遵循这里概述的相同基本模式，因此你应该能够轻松使用此技术来设计任意数量的权限提升解决方案。\n\
    \n## 授予跨程序集权限\n\n前面章节中的示例进行了一些简化，以便一次将重点集中在一个问题上。在处理跨程序集调用时，还有另外两个问题需要关注：数据库可信度和强命名。\n\
    \n### 数据库可信度\n\n“可信”数据库的概念是微软近年来对安全问题认识提高的直接产物。将数据库标记为可信只需使用 `ALTER DATABASE`\
    \ 设置一个选项即可："
- fmt: "# CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS\n\n`ALTER DATABASE\
    \ AdventureWorks2008`\n\n`SET TRUSTWORTHY ON;`\n\n`GO`\n\nUnfortunately, as simple\
    \ as enabling this option is, the repercussions of this setting are far from it.\n\
    \nEffectively, it comes down to the fact that code running in the context of a\
    \ trustworthy database can access resources outside of the database more easily\
    \ than code running in a database not marked as such. This means access to the\
    \ file system, remote database servers, and even other databases on the same server—all\
    \ of this access is controlled by this one option, so be careful.\n\nTurning off\
    \ the `TRUSTWORTHY` option means that rogue code will have a much harder time\
    \ accessing resources outside of the database, but it also means that, as a developer,\
    \ you will have to spend more time dealing with security issues. That said, I\
    \ highly recommend leaving the `TRUSTWORTHY` option turned off unless you really\
    \ have a great reason to enable it. Dealing with access control in a nontrustworthy\
    \ database is not too difficult; the module-signing techniques discussed in Chapter\
    \ 5 should be applied, which puts access control squarely in your hands and does\
    \ not make life easy for code that shouldn’t have access to a given resource.\n\
    \nIn the SQLCLR world, you’ll see a deploy-time exception if you catalog an assembly\
    \ that references an assembly using the `EXTERNAL_ACCESS` or `UNSAFE` permission\
    \ sets in a nontrustworthy database.\n\nFollowing is the exception I get when\
    \ trying to catalog the assembly I created that contains the `GetConvertedAmount`\
    \ method, after setting my database to nontrustworthy mode:\n\n```\nCREATE ASSEMBLY\
    \ for assembly 'CurrencyConversion' failed because\nassembly 'SafeDictionary'\
    \ is not authorized for PERMISSION_SET = UNSAFE.\nThe assembly is authorized when\
    \ either of the following is true: the database\nowner (DBO) has UNSAFE ASSEMBLY\
    \ permission and the database has the TRUSTWORTHY\ndatabase property on; or the\
    \ assembly is signed with a certificate or an asymmetric\nkey that has a corresponding\
    \ login with UNSAFE ASSEMBLY permission.\nIf you have restored or attached this\
    \ database, make sure the database owner is\nmapped to the correct login on this\
    \ server. If not, use sp_changedbowner to fix\nthe problem.\n```\n\nThis rather\
    \ verbose exception is rare and to be treasured: it describes exactly how to solve\
    \ the problem! Following the procedure described in Chapter 5, you can grant the\
    \ `UNSAFE ASSEMBLY` permission by using certificates. To begin, create a certificate\
    \ and a corresponding login in the `master` database, and grant the login `UNSAFE\
    \ ASSEMBLY` permission:\n\n```\nUSE master;\nGO\nCREATE CERTIFICATE Assembly_Permissions_Certificate\n\
    ENCRYPTION BY PASSWORD = 'uSe_a STr()nG PaSSW0rD!'\nWITH SUBJECT = 'Certificate\
    \ used to grant assembly permission';\nGO\nCREATE LOGIN Assembly_Permissions_Login\n\
    FROM CERTIFICATE Assembly_Permissions_Certificate;\nGO\nGRANT UNSAFE ASSEMBLY\
    \ TO Assembly_Permissions_Login;\nGO\n```\n\nNext, back up the certificate to\
    \ a file:\n\n```\nBACKUP CERTIFICATE Assembly_Permissions_Certificate\nTO FILE\
    \ = 'C:\\assembly_permissions.cer'\nWITH PRIVATE KEY\n(\n    FILE = 'C:\\assembly_permissions.pvk',\n\
    \    ENCRYPTION BY PASSWORD = 'is?tHiS_a_VeRySTronGP4ssWoR|)?',\n    DECRYPTION\
    \ BY PASSWORD = 'uSe_a STr()nG PaSSW0rD!'\n);\nGO\n```\n\nNow, in the database\
    \ in which you’re working—`AdventureWorks2008`, in my case—restore the certificate\
    \ and create a local database user from it:\n\n```\nUSE AdventureWorks2008;\n\
    GO\nCREATE CERTIFICATE Assembly_Permissions_Certificate\nFROM FILE = 'C:\\assembly_permissions.cer'\n\
    WITH PRIVATE KEY\n(\n    FILE = 'C:\\assembly_permissions.pvk',\n    DECRYPTION\
    \ BY PASSWORD = 'is?tHiS_a_VeRySTronGP4ssWoR|)?',\n    ENCRYPTION BY PASSWORD\
    \ = 'uSe_a STr()nG PaSSW0rD!'\n);\nGO\nCREATE USER Assembly_Permissions_User\n\
    FOR CERTIFICATE Assembly_Permissions_Certificate;\nGO\n```\n\nFinally, sign the\
    \ assembly with the certificate, thereby granting access and allowing the assembly\
    \ to be referenced:\n\n```\nADD SIGNATURE TO ASSEMBLY::SafeDictionary\nBY CERTIFICATE\
    \ Assembly_Permissions_Certificate\nWITH PASSWORD='uSe_a STr()nG PaSSW0rD!';\n\
    GO\n```"
  raw: 'ALTER DATABASE AdventureWorks2008


    SET TRUSTWORTHY ON;


    GO


    Unfortunately, as simple as enabling this option is, the repercussions of this
    setting are far from it.


    Effectively, it comes down to the fact that code running in the context of a trustworthy
    database can access resources outside of the database more easily than code running
    in a database not marked as such. This means access to the file system, remote
    database servers, and even other databases on the same server—all of this access
    is controlled by this one option, so be careful.


    Turning off the TRUSTWORTHY option means that rogue code will have a much harder
    time accessing resources outside of the database, but it also means that, as a
    developer, you will have to spend more time dealing with security issues. That
    said, I highly recommend leaving the TRUSTWORTHY option turned off unless you
    really have a great reason to enable it. Dealing with access control in a nontrustworthy
    database is not too difficult; the module-signing techniques discussed in Chapter
    5 should be applied, which puts access control squarely in your hands and does
    not make life easy for code that shouldn’t have access to a given resource.


    In the SQLCLR world, you’ll see a deploy-time exception if you catalog an assembly
    that references an assembly using the EXTERNAL_ACCESS or UNSAFE permission sets
    in a nontrustworthy database.


    CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    Following is the exception I get when trying to catalog the assembly I created
    that contains the GetConvertedAmount method, after setting my database to nontrustworthy
    mode:


    CREATE ASSEMBLY for assembly ''CurrencyConversion'' failed because


    assembly ''SafeDictionary'' is not authorized for PERMISSION_SET = UNSAFE.


    The assembly is authorized when either of the following is true: the database


    owner (DBO) has UNSAFE ASSEMBLY permission and the database has the TRUSTWORTHY


    database property on; or the assembly is signed with a certificate or an asymmetric


    key that has a corresponding login with UNSAFE ASSEMBLY permission.


    If you have restored or attached this database, make sure the database owner is


    mapped to the correct login on this server. If not, use sp_changedbowner to fix


    the problem.


    This rather verbose exception is rare and to be treasured: it describes exactly
    how to solve the problem! Following the procedure described in Chapter 5, you
    can grant the UNSAFE ASSEMBLY


    permission by using certificates. To begin, create a certificate and a corresponding
    login in the master database, and grant the login UNSAFE ASSEMBLY permission:


    USE master;


    GO


    CREATE CERTIFICATE Assembly_Permissions_Certificate


    ENCRYPTION BY PASSWORD = ''uSe_a STr()nG PaSSW0rD!''


    WITH SUBJECT = ''Certificate used to grant assembly permission'';


    GO


    CREATE LOGIN Assembly_Permissions_Login


    FROM CERTIFICATE Assembly_Permissions_Certificate;


    GO


    GRANT UNSAFE ASSEMBLY TO Assembly_Permissions_Login;


    GO


    Next, back up the certificate to a file:


    BACKUP CERTIFICATE Assembly_Permissions_Certificate


    TO FILE = ''C:\assembly_permissions.cer''


    WITH PRIVATE KEY


    (


    FILE = ''C:\assembly_permissions.pvk'',


    ENCRYPTION BY PASSWORD = ''is?tHiS_a_VeRySTronGP4ssWoR|)?'',


    DECRYPTION BY PASSWORD = ''uSe_a STr()nG PaSSW0rD!''


    );


    GO


    Now, in the database in which you’re working—AdventureWorks2008, in my case—restore
    the


    certificate and create a local database user from it:


    USE AdventureWorks2008;


    GO


    CHAPTER


    „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    CREATE CERTIFICATE Assembly_Permissions_Certificate


    FROM FILE = ''C:\assembly_permissions.cer''


    WITH PRIVATE KEY


