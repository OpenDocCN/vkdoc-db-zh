    In order to provide a layer of abstraction between the two type paradigms, the
    .NET Framework ships with a namespace called System.Data.SqlTypes. This namespace
    includes a series of structures 160


    CHAPTER


    „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    that map SQL Server types and behaviors into .NET. Each of these structures implements
    nullability through the INullable interface, which exposes an IsNull property
    that allows callers to determine whether a given instance of the type is NULL.
    Furthermore, these types conform to the same range, precision, and operator rules
    as SQL Server’s native types.


    Properly using the SqlTypes types is, simply put, the most effective way of ensuring
    that data marshaled into and out of SQLCLR routines is handled correctly by each
    type system. It is my recommendation that, whenever possible, all methods exposed
    as SQLCLR objects use SqlTypes types as both input and output parameters, rather
    than standard .NET types. This will require a bit more development work up front,
    but it should future-proof your code to some degree and help avoid type incompatibility
    issues.


    Wrapping Code to Promote Cross-Tier Reuse


    One of the primary selling points for SQLCLR integration, especially for shops
    that use the .NET


    Framework for application development, is the ability to move or share code easily
    between tiers when it makes sense to do so. It’s not so easy, however, to realize
    that objective.


    The Problem


    Unfortunately, some of the design necessities of working in the SQLCLR environment
    do not translate well to the application tier, and vice versa. One such example
    is use of the SqlTypes described in the preceding section; although it is recommended
    that they be used for all interfaces in SQLCLR routines, that prescription does
    not make sense in the application tier, because the SqlTypes do not support the
    full range of operators and options that the native .NET types support. Using
    them in every case might make data access simple, but would rob you of the ability
    to do many complex data manipulation tasks, and would therefore be more of a hindrance
    than a helpful change.


    Rewriting code or creating multiple versions customized for different tiers simply
    does not promote maintainability. In the best-case scenario, any given piece of
    logic used by an application should be coded in exactly one place—regardless of
    how many different components use the logic or where it’s deployed. This is one
    of the central design goals of object-oriented programming, and it’s important
    to remember that it also applies to code being reused inside of SQL Server.


    One Reasonable Solution


    Instead of rewriting routines and types to make them compatible with the SqlTypes
    and implement other database-specific logic, I recommend that you get into the
    habit of designing **wrapper methods** and classes. These wrappers should map
    the SqlTypes inputs and outputs to the .NET types actually used by the original
    code, and call into the underlying routines via assembly references. Wrappers
    are also a good place to implement database-specific logic that may not exist
    in routines originally designed for the application tier.


    In addition to the maintainability benefits for the code itself, creating wrappers
    has a couple of other advantages. First of all, unit tests will not need to be
    rewritten—the same tests that work in the application tier will still apply in
    the data tier (although you may want to write secondary unit tests for the wrapper
    routines). Secondly—and perhaps more importantly—wrapping your original assemblies
    can help maintain a least-privileged coding model and enhance security, as is
    discussed later in this chapter in the sections “Working with Code Access Security
    Privileges” and “Working with Host Protection Privileges.”


    CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    A Simple Example: E-Mail Address Format Validation


    It is quite common for web forms to ask for your e-mail address, and you’ve no
    doubt encountered forms that tell you if you’ve entered an e-mail address that
    does not comply with the standard format expected. This sort of validation provides
    a quicker—but less effective—way to test an e-mail address than actually sending
    an e-mail and waiting for a response, and it gives the user immediate feedback
    if something is obviously incorrect.


    In addition to using this logic for front-end validation, it makes sense to implement
    the same approach in the database in order to drive a CHECK constraint. That way,
    any data that makes its way to the database—regardless of whether it already went
    through the check in the application—will be double-checked for correctness.


    Following is a simple .NET method that uses a regular expression to validate the
    format of an e-mail address:


    public static bool IsValidEmailAddress(string emailAddress)


    {


    //Validate the e-mail address


    Regex r =


    new Regex(@"\w+([-+.]\w+)*@\w+([-.]\w+)*\.\w+([-.]\w+)*");


    return (r.IsMatch(emailAddress));


    }


    This code could, of course, be used as-is in both SQL Server and the application
    tier—using it in SQL


    Server would simply require loading the assembly and registering the function.
    But this has some issues, the most obvious of which is the lack of proper NULL
    handling. As-is, this method will return an ArgumentException when a NULL is passed
    in. Depending on your business requirements, a better choice would probably be
    either NULL or false. Another potential issue occurs in methods that require slightly
    different logic in the database vs. the application tier. In the case of e-mail
    validation, it’s difficult to imagine how you might enhance the logic for use
    in a different tier, but for other methods, such modification would present a
    maintainability challenge.


    The solution is to catalog the assembly containing this method in SQL Server,
    but not directly expose the method as a SQLCLR UDF. Instead, create a wrapper
    method that uses the SqlTypes and internally calls the initial method. This means
    that the underlying method will not have to be modified in order to create a version
    that properly interfaces with the database, and the same assembly can be deployed
    in any tier. Following is a sample that shows a wrapper method created over the


    IsValidEmailAddress method, in order to expose a SQLCLR UDF version that properly
    supports NULL


    inputs and outputs. Assume that I’ve created the inner method in a class called
    UtilityMethods and have also included a using statement for the namespace used
    in the UtilityMethods assembly.


    [Microsoft.SqlServer.Server.SqlFunction]


    public static SqlBoolean IsValidEmailAddress(


    SqlString emailAddress)


    {


    // Return NULL on NULL input


    if (emailAddress.IsNull)


    return (SqlBoolean.Null);


    bool isValid = UtilityMethods.IsValidEmailAddress(emailAddress.Value);


    return (new SqlBoolean(isValid));


    }


    CHAPTER


    „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    Note that this technique can be used not only for loading assemblies from the
    application tier into SQL Server, but also for going the other way—migrating logic
    back out of the data tier. Given the nature of SQLCLR, the potential for code
    mobility should always be considered, and developers should consider designing
    methods using wrappers even when creating code specifically for use in the database—this
    will maximize the potential for reuse later, when or if the same logic needs to
    be migrated to another tier, or even if the logic needs to be reused more than
    once inside of the data tier itself.


    Cross-assembly references have other benefits as well, when working in the SQLCLR
    environment.


    By properly leveraging references, it is possible to create a much more robust,
    secure SQLCLR solution.'
