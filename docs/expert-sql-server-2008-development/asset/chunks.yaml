- fmt: 'As with testability, maintainability is somewhat influenced by attempts to
    create "flexible" interfaces. On one hand, flexibility of an interface can increase
    coupling between routines by requiring the caller to have too much knowledge of
    parameter combinations, overrideable options, and the like.

    On the other hand, routines with flexible interfaces can sometimes be more easily
    maintained, at least at the beginning of a project. In some cases, making routines
    as generic as possible can result in fewer total routines needed by a system,
    and therefore less code to maintain. However, as features are added, the ease
    with which these generic routines can be modified tends to break down due to the
    increased complexity that each new option or parameter brings. Oftentimes, therefore,
    it may be advantageous early in a project to aim for some flexibility, and then
    refactor later when maintainability begins to suffer.


    # CHAPTER „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    Maintainability is also tied in with testability in one other key way: the better
    a routine can be tested, the easier it will be to modify. Breaking changes are
    not as much of an issue when tests exist that can quickly validate new approaches
    to implementation.


    ## Security


    In an age in which identity theft makes the news almost every night, and a computer
    left open on the Internet will be compromised within 30 seconds, it is little
    wonder that security is considered one of the most important areas when developing
    software applications. Security is, however, also one of the most complex areas,
    and complexity can hide flaws that a trained attacker can easily exploit.

    Complex security schemes can also have a huge impact on whether a given piece
    of software is testable and maintainable. From a testing standpoint, a developer
    needs to consider whether a given security scheme will create too many variables
    to make testing feasible. For instance, if users are divided into groups and each
    group has distinct security privileges, should each set of tests be run for each
    group of users? How many test combinations are necessary to exercise before the
    application can be considered "fully" tested?

    From a maintenance point of view, complexity from a security standpoint is equally
    dangerous as complexity of any other type of implementation. The more complex
    a given routine is, the more difficult (and therefore more expensive) it will
    be to maintain.

    In a data-dependent application, much of the security responsibility will generally
    get pushed into the data tier. The security responsibilities of the data tier
    or database will generally include areas such as authentication to the application,
    authorization to view data, and availability of data. Encapsulating these security
    responsibilities in database routines can be a win from an overall application
    maintainability perspective, but care must be taken to ensure that the database
    routines do not become so bogged down that their maintainability, testability,
    or performance suffer.


    ## Allowing for Future Requirements


    In a dynamic environment, where you face ever-changing customer requirements and
    additional feature requests, it is easy to give too much attention to tomorrow''s
    enhancements, instead of concentrating on today''s bugs. Looking through many
    technical specifications and data dictionaries, it''s common to see the phrase
    "reserved for future use." Developers want to believe that adding complexity up
    front will work to their advantage by allowing less work to be done later in the
    development process. However, this approach of second-guessing future requirements
    frequently backfires, producing software full of maintenance baggage. These pieces
    of code must be carried around by the development team and kept up to date in
    order to compile the application, but often go totally unused for years at a time.

    Even SQL Server itself even suffers from these problems. For example, according
    to `Books Online`, the `NUM_INPUT_PARAMS`, `NUM_OUTPUT_PARAMS`, and `NUM_RESULT_SETS`
    returned by the `sp_stored_procedures` stored procedure in SQL Server 2008 are
    reserved for future use (`http://msdn.microsoft.com/en-us/library/ms190504.aspx`),
    just as they were in SQL Server 2005 (`http://msdn.microsoft.com/en-us/library/ms190504(SQL.90).aspx`).

    In one 15-year-old application I worked on, the initial development team had been
    especially active in prepopulating the code base with features reserved for the
    future. Alas, several years, a few rounds of layoffs, and lots of staff turnovers
    later, and no members of the original team were left. The remaining developers
    who had to deal with the 2 million–line application were afraid of removing anything
    lest it would break some long-forgotten feature that some user still relied upon.
    It was a dismal scene, to say the least, and it''s difficult to imagine just how
    much time was wasted over the years keeping all of that redundant code up to date.


    # CHAPTER 1 „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    Although that example is extreme (certainly by far the worst I''ve come across),
    it teaches us to adhere to the golden rule of software development: the `KISS`
    principle (keep it simple, stupid). Keep your software projects as straightforward
    as they can possibly be. Adding new features tomorrow should always be a secondary
    concern to delivering a robust, working product today.


    ## Summary


    Applications depend upon databases for much more than mere data persistence, and
    database developers must have an understanding of the entire application development
    process in order to create truly effective database systems.

    By understanding architectural concepts such as coupling, cohesion, and encapsulation,
    database developers can define modular data interfaces that allow for great gains
    in ongoing maintenance and testing. Database developers must also understand how
    best to map data from object-oriented systems into database structures, in order
    to effectively persist and manipulate the data.

    This chapter has provided an introduction to these ideas. The concepts presented
    here will be revisited in various examples throughout the remainder of the book.


    # CHAPTER 2 „ „ „ Best Practices for Database Programming


    Software development is not just a practical discipline performed by coders, but
    also an area of academic research and theory. There is now a great body of knowledge
    concerning software development, and lengthy academic papers have been written
    to propose, dissect, and discuss different approaches to development. Various
    methodologies have emerged, including test-driven development (`TDD`), agile and
    extreme programming (`XP`), and defensive programming, and there have been countless
    arguments concerning the benefits afforded by each of these schools of thought.

    The practices described in this chapter, and the approach taken throughout the
    rest of this book, are most closely aligned with the philosophy of defensive programming.
    However, the topics discussed here can be applied just as readily in any environment.
    While software theorists may argue the finer differences between different methodologies
    (and undoubtedly, they do differ in some respects), when it comes down to it,
    the underlying features of good programming remain the same whatever methodology
    you apply.

    I do not intend to provide an exhaustive, objective guide as to what constitutes
    best practice, but rather to highlight some of the standards that I believe demonstrate
    the level of professionalism that database developers require in order to do a
    good job. I will present the justification of each argument from a defensive point
    of view, but remember that they are generally equally valid in other environments.


    ## Defensive Programming'
