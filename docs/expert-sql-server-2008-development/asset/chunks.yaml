    The result looks good:


    ```

    POLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))

    ```


    So now, to identify all those points from the database that should be shown on
    the current map view, we can go ahead and use the `STIntersects()` method to select
    all those points from the `allCountries` table that intersect this `geography`
    `Polygon`, right? Unfortunately, there is a subtle problem here that needs to
    be resolved.


    ## Geographic vs. Projected Coordinates


    Although the coordinate values of the corner points of the map bounding box are
    expressed in geographic coordinates of latitude and longitude, the default two-dimensional
    map view presented in the browser is flat. This means, by implication, that the
    data displayed on the screen has been *projected*.


    Given a little thought, this fact should be obvious—unless you have a very clever
    monitor capable of displaying images in three-dimensional space, all geospatial
    data on a computer display must have been projected. In which case, how come the
    coordinates of the corners of the bounding box were stated using *geographic*
    coordinates of latitude and longitude? Here’s the twist: Google Maps and Microsoft
    Bing Maps actually use two coordinate systems—when supplying or retrieving data
    through the API, they use geographic coordinates of latitude and longitude based
    on WGS84, but when displaying data, they use a projected system referenced as
    `SRID 3785`.


    Unlike most projected reference systems, `SRID 3785` uses a Mercator projection
    based on a perfectly spherical model of the earth. This system has many beneficial
    properties that enable efficient tile referencing algorithms that I won’t cover
    here, but the important thing to note is that it means that maps displayed using
    this projection portray lines of constant latitude (`parallels`) as parallel horizontal
    lines, and lines of constant longitude (`meridians`) as parallel vertical lines.
    In this example, this means that every point lying along the bottom edge of the
    map, which connects the points at (37,–109) and (37,–102), all have a latitude
    of 37. However, this is not true of the points lying on the bottom edge of the
    `geography` `Polygon` `@BoundingBox` created earlier. Remember that the `geography`
    datatype operates on an ellipsoidal model, so the edge between the points (37,–109)
    and (37,–102) represents the shortest distance between those two points on the
    surface of the reference ellipsoid in question (`SRID 4326`, in this case). The
    line connecting any two points in the `geography` datatype therefore represents
    the `great elliptic arc` between those two points, and does not follow the straight
    line portrayed on a projection.


    ## The Application Problem


