    A test process that is well integrated into development finds most bugs up front,
    when they are created, rather than later on. A developer who is currently working
    on enhancing a given module has an in-depth understanding of the code at that
    moment. As soon as he or she moves on to another module, that knowledge will start
    to wane as focus moves on to other parts of the application. If defects are discovered
    and reported while the developer is still in the trenches, the developer will
    not need to relearn the code in order to fix the problem, thereby saving a lot
    of time. These time savings translate directly into increased productivity, as
    developers end up spending more time working on new features, and less on fixing
    defects.


    If management teams refuse to listen to reason and allocate additional development
    time for proper testing, try doing it anyway. Methodologies such as test-driven
    development (TDD), in which you write the tests first, and then create routines
    that pass the tests, can greatly enhance overall developer productivity. Adopting
    a testing strategy—with or without management approval—can mean better, faster
    output, which in the end will help to ensure success.


    ## Performance Monitoring Tools


    Verification using unit, functional, and regression tests is extremely important
    for thoroughly testing that an application behaves correctly, but it is performance
    testing that really gets the attention of most developers. Performance testing
    is imperative for ensuring a positive user experience. Users don’t want to wait
    any longer than absolutely necessary for data.


    Performance testing relies on collecting, reviewing, and analyzing performance
    data for different aspects of the system. Before going into details about how
    to analyze the performance of a system, it is therefore necessary to look at some
    of the tools that can be used to capture such data. `SQL Server 2008` provides
    a number of in-built tools that allow `DBA`s and developers to store or view real-time
    information about activity taking place on the server, including the following:


    *   `SQL Server Profiler`

    *   Server-side traces

    *   System Monitor console

    *   Dynamic Management Views (DMVs)

    *   Extended Events

    *   Data Collector


    There are also a number of third-party monitoring tools available that can measure,
    aggregate, and present performance data in different ways. In this section, I’ll
    discuss some of the different methods of monitoring performance, and the type
    of situations in which they can be used.


    ## Real-Time Client-Side Monitoring


    The `Profiler` tool that ships with `SQL Server 2008` is extremely useful and
    very easy to use. Simply load the `Profiler` application and point it to the instance
    of `SQL Server` that you want to monitor, and it will report real-time information
    based on around 200 different events. However, for most performance monitoring
    work, there are only a few key events that you’ll need to worry about.


    When initially baselining an application, I generally start by looking at only
    the `SQL:BatchCompleted` and `RPC:Completed` events. Each of these events fires
    on completion of queries; the only difference between them is that `RPC:Completed`
    fires on completion of a remote procedure call (`RPC`), whereas `SQL:BatchCompleted`
    fires on completion of a SQL batch—different access methods, same end result.


    The most valuable columns available for both of these events are `CPU`, `Reads`,
    `Writes`, and `Duration`:


    *   The `CPU` column reports the amount of CPU time, in milliseconds, spent parsing,
    compiling, and executing the query. Due to the fact that this column includes'
