    # 第 10 章：处理空间数据


    使用 SRID 4326 测量的纬度/经度值。因此，使用 `geography` 数据类型来表示边界框似乎是合理的。初步尝试可能如下所示：


    ```sql

    DECLARE @TopLeft geography = geography::Point(41, -109, 4326);

    DECLARE @BotRight geography = geography::Point(37, -102, 4326);

    DECLARE @BoundingBox geography;

    SET @BoundingBox = geography::STPolyFromText(''POLYGON((''

    + CAST(@TopLeft.Long AS varchar(32)) + '' ''+ CAST(@TopLeft.Lat AS varchar(32))
    + '',''

    + CAST(@TopLeft.Long AS varchar(32)) + '' ''+ CAST(@BotRight.Lat AS varchar(32))
    + '',''

    + CAST(@BotRight.Long AS varchar(32)) + '' ''+ CAST(@BotRight.Lat AS varchar(32))
    +'',''

    + CAST(@BotRight.Long AS varchar(32)) +'' '' + CAST(@TopLeft.Lat AS varchar(32))
    + '',''

    + CAST(@TopLeft.Long AS varchar(32)) + '' '' + CAST(@TopLeft.Lat AS varchar(32))

    + ''))'',

    4326);

    SELECT @BoundingBox.STAsText();

    ```


    结果看起来不错：


    ```

    POLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))

    ```


    那么现在，为了从数据库中识别所有应该显示在当前地图视图中的点，我们可以继续使用 `STIntersects()` 方法从 `allCountries` 表中选择所有与该
    `geography` `Polygon` 相交的点，对吧？不幸的是，这里有一个需要解决的微妙问题。


    ## 地理坐标 vs. 投影坐标


    尽管地图边界框的角点坐标是以纬度和经度的地理坐标表示的，但浏览器中呈现的默认二维地图视图是平面的。这意味着，隐含地，屏幕上显示的数据已经经过了*投影*。


    稍加思考，这个事实应该是显而易见的——除非你有一个非常聪明的显示器能够在三维空间中显示图像，否则计算机显示器上的所有地理空间数据都必须经过投影。这样的话，为什么边界框的角点坐标是使用纬度和经度的*地理*坐标来表示的呢？关键在于：Google
    Maps 和 Microsoft Bing Maps 实际上使用了两个坐标系——当通过 API 提供或检索数据时，它们使用基于 WGS84 的纬度和经度地理坐标，但在显示数据时，它们使用一个引用为
    `SRID 3785` 的投影坐标系。


    与大多数投影参考系不同，`SRID 3785` 使用基于完美球形地球模型的墨卡托投影。这个系统具有许多有益的特性，能够实现高效的切片引用算法（此处不赘述），但需要注意的重要一点是，这意味着使用此投影显示的地图将恒定纬度的线（*纬线*）描绘为平行的水平线，并将恒定经度的线（*经线*）描绘为平行的垂直线。在这个例子中，这意味着地图底边上的每一个点（连接点(37,–109)和(37,–102)的点），其纬度都是
    37。然而，这对于之前创建的 `geography` `Polygon` `@BoundingBox` 底边上的点来说并不成立。请记住，`geography`
    数据类型基于椭球体模型运作，因此点(37,–109)和(37,–102)之间的边代表了在相关参考椭球体（此处为`SRID 4326`）表面上这两点之间的最短距离。因此，`geography`
    数据类型中连接任意两点的线代表这两点之间的*大椭圆弧*，而不遵循投影上描绘的直线。


    ## 应用程序问题


    这一切对于本示例中的应用程序意味着什么？考虑一个位于纬度 37.0281、经度 –107.419 的点。这是 `allCountries` 表中为纳瓦霍湖西北岸的
    Arboles 社区（geonameid 5412070）存储的坐标。由于纬度 37.0281 介于 37 和 41 之间，而经度值 –107.419 介于
    –102 和 –

