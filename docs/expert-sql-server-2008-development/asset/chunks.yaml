    \        SqlDbType dbType = (SqlDbType)field[1];\n```\n\n将输入字节反序列化回对象集合后，该集合中的第一项（假定为列元数据）被转换为一个对象集合。对此集合进行逐项遍历，以创建输出的\
    \ `SqlMetaData` 对象，这些对象将用于将数据流式传输回调用方。\n\n设置过程中最棘手的部分在于，每种 SQL Server 数据类型都需要一个不同的\
    \ `SqlMetaData` 重载。`decimal` 需要精度和小数位数设置；字符和二进制类型需要大小；而对于其他类型，大小、精度和小数位数都不适用。下面的\
    \ switch 语句处理了 `SqlMetaData` 实例的创建：\n\n```csharp\n        //根据数据类型的不同，\n     \
    \   //需要不同的 SqlMetaData 重载\n        switch (dbType)\n        {\n            case\
    \ SqlDbType.Decimal:\n                cols[i] = new SqlMetaData(\n           \
    \         (string)field[0],\n                    dbType,\n                   \
    \ (byte)field[3],\n                    (byte)field[4]);\n                break;\n\
    \n            case SqlDbType.Binary:\n            case SqlDbType.Char:\n     \
    \       case SqlDbType.NChar:\n            case SqlDbType.NVarChar:\n        \
    \    case SqlDbType.VarBinary:\n            case SqlDbType.VarChar:\n        \
    \        switch ((int)field[2])\n                {\n                    //如果是\
    \ MAX 类型，则使用 -1 作为大小\n                    case 2147483647:\n                 \
    \       cols[i] = new SqlMetaData(\n                            (string)field[0],\n\
    \                            dbType,\n                            -1);\n     \
    \                   break;\n                    default:\n                   \
    \     cols[i] = new SqlMetaData(\n                            (string)field[0],\n\
    \                            dbType,\n                            (long)((int)field[2]));\n\
    \                        break;\n                }\n                break;\n\n\
    \            default:\n                cols[i] = new SqlMetaData(\n          \
    \          (string)field[0],\n                    dbType);\n                break;\n\
    \        }\n    }\n```\n\n列集合填充完成后，即可使用 `SqlPipe` 类的 `SendResults` 方法将数据发送回调用方。启动流之后，输入集合中剩余的对象会被遍历、强制转换为\
    \ `object[]`，并作为 `SqlDataRecords` 发送回去：\n\n```csharp\n    //开始结果流\n    SqlDataRecord\
    \ rec = new SqlDataRecord(cols);\n    SqlContext.Pipe.SendResultsStart(rec);\n\
    \n    for (int i = 1; i < dt.Length; i++)\n    {\n        rec.SetValues((object[])dt[i]);\n\
    \        SqlContext.Pipe.SendResultsRow(rec);\n    }\n\n    //结束结果流\n    SqlContext.Pipe.SendResultsEnd();\n\
    }\n```\n\n不仅二进制序列化测试取得了积极的结果，而且事实证明，以此方式准备的数据进行反序列化，其速度远超其他方法。性能测试显示，反序列化 `SqlDataReader`\
    \ 数据的平均时间仅为 `0.2666` 秒——比反序列化类似的 XML 数据快了一个数量级。\n\n本节讨论的三种方法各自最快优化版本的结果如表 7-1\
    \ 所示。\n\n*表 7-1. 不同序列化方法的结果*\n\n`方法`\n`平均序列化时间`\n`平均反序列化时间`\n`大小`\n\n`XML (使用\
    \ TYPE)`\n`3.6687`\n`6.8157`\n`105KB`\n\n`二进制 (DataTable)`\n`0.0576`\n`—`\n`68KB`\n\
    \n`二进制 (SqlDataReader)`\n`0.0490`\n`0.2666`\n`57KB`\n\n此示例展示了更好的网络利用率与快得多的序列化/反序列化相结合的效果，说明了在横向扩展和分布式处理场景中，SQLCLR\
    \ 如何成为在 Service Broker 实例之间传输表数据的一项出色技术。\n\n# 总结\n\n充分利用 SQLCLR 例程需要投入一些思考。前期的设计和架构考量将在安全性、可靠性和性能方面带来巨大收益。\n\
    \n在每个阶段，你也应考虑可重用性，以最小化当你在半年或一年后需要相同功能时必须完成的工作量。如果你已经编写过一次，为何还要再编写一次？\n\n为了说明这些概念，我展示了一个使用\
    \ `BinaryFormatter` 序列化表的示例，该示例可用于扩展 SQL Server Service Broker。我使用了一组通用的、核心的、更高权限的实用程序程序集，以限制外部表面面积，并尝试设计该解决方案以提升灵活性，使其能够在代码的生命周期内用于众多项目。\n\
    \n# 第 8 章 动态 T-SQL\n\n任何软件应用程序的总体目标都是提供一致、可靠的功能，使用户能够以有效的方式执行给定任务。因此，实现这一目标的第一步是保持应用程序无错误且按设计运行，达到预期标准。然而，一旦满足了这些基本要求，下一步就是尝试创造出色的用户体验，这就引出了一个问题：“用户想要什么？”答案往往是用户希望拥有灵活的界面，让他们能够以自己想要的方式控制数据。软件客户支持团队经常收到关于略微不同的排序顺序、筛选机制或数据输出的请求，这使得应用程序必须被设计为支持沿着这些方向的扩展性。\n\
    \n与其他数据相关的开发挑战一样，对灵活数据输出的此类请求往往会向下渗透到应用层次结构中，最终落到数据库（以及数据库开发人员）上。这在基于 Web 的应用程序开发中尤其如此，因为启用排序和筛选的客户端网格控件仍然相对较少，而且许多应用程序仍然使用轻量级的两层模型，没有专门的业务层来处理数据缓存和筛选。\n\
    \n数据库中的“灵活性”可以意味着许多事情，在我多年来参与的应用程序中，我遇到过一些非常有趣的方法，通常涉及创建大量的存储过程或复杂的嵌套控制流块。这些解决方案似乎总是弊大于利，并通过在数据库层引入大量额外的复杂性，使应用程序开发变得比原本困难得多。\n\
    \n在本章中，我将讨论如何使用动态 SQL 来解决这些问题，以及如何创建更灵活的存储过程。一些 DBA 和开发人员鄙视动态 SQL，通常认为它会导致性能、安全性或可维护性问题，而在许多情况下，只是因为他们不了解如何正确使用它。动态\
    \ SQL 是一个强大的工具，如果使用得当，它将是数据库开发人员工具箱中的巨大资产。关于它是什么以及何时或为何应该使用，存在很多错误信息和误解，我希望在本章中澄清一些迷思和误解。\n\
    \n*注意* 在本章中，我将用笔记本电脑上记录的性能测量和计时来说明对各种方法的讨论。有关如何在您自己的系统环境中捕获这些测量的更多信息，请参阅第 3 章中关于性能监控工具的讨论。\n\
    \n## 动态 T-SQL 与即席 T-SQL"
- fmt: '# 动态 SQL 使用探讨


    在开始深入讨论如何使用动态 SQL 之前，首先需要明确一些术语。在数据库领域，关于 SQL 的两个术语常常被混用：**dynamic**（动态）和 **ad
    hoc**（临时）。在本章中，我对这两个术语定义如下：


    *   临时 SQL（Ad hoc SQL）是在应用层生成并发送到 SQL Server 执行的任何 SQL 批处理。这包括本书中几乎所有的代码示例，这些示例都是通过
    SQL Server Management Studio 输入和提交的。

    *   另一方面，动态 SQL（Dynamic SQL）是 *在 T-SQL 中* 生成并使用 `EXECUTE` 语句执行，或者更推荐使用 `sp_executesql`
    系统存储过程（本章稍后介绍）执行的 SQL 批处理。


    本章大部分内容将重点介绍如何使用存储过程来有效利用动态 SQL。


    然而，如果你是那些使用不采用存储过程的系统的开发者之一，我建议你至少阅读“SQL 注入”和“编译与参数化”这两个部分。这两个部分无疑也适用于临时 SQL 场景，并且极其重要。


    综上所述，我不建议在应用开发中使用临时 SQL，并且认为许多潜在的问题（特别是影响应用程序安全性和性能的问题）可以通过使用存储过程来避免。


    ## 存储过程与临时 SQL 之争


    数据库开发社区成员之间似乎存在一场永无止境的争论，焦点在于数据库应用开发是否应该使用存储过程。


    这场辩论可能变得相当激烈，支持测试驱动开发（TDD）等快速软件开发方法的人声称存储过程会拖慢他们的流程，而对象关系映射（ORM）技术的拥护者则声称这些技术优于存储过程。我强烈建议你搜索网络以了解这些争论并得出你自己的结论。就我个人而言，我非常倾向于使用存储过程，原因如下，我将在此简要讨论。


    首先也是最重要的，存储过程在数据库和应用程序之间创建了一个抽象层，隐藏了模式的细节，有时也隐藏了数据的细节。将数据逻辑封装在存储过程内大大降低了数据库和应用程序之间的耦合，这意味着对数据库的维护或修改不需要相应地改变应用程序。减少这些依赖性并将数据库视为一个数据
    API，而不是一个简单的应用持久层，能够实现灵活的应用程序开发过程。通常，这可以允许数据库和应用层并行开发，而不是按顺序开发，从而在给定项目上实现更大规模的人力资源扩展。有关封装、耦合以及将数据库视为
    API等概念的更多信息，请参见第 1 章。


    如果存储过程定义得当，具有记录良好且一致的输出，测试绝不会受到阻碍——可以轻松创建单元测试（如第 3 章所示）以支持 TDD。


    此外，得益于存储过程，支持更先进的测试方法也变得更容易，而不是更困难。例如，考虑使用 **mock objects**（模拟对象）——返回特定已知值的 façade
    方法。在测试场景中，模拟对象可以替代真实方法，以便可以单独测试任何给定的方法，而无需同时测试它调用的任何方法（被测试方法内部的任何调用实际上都将是对方法的模拟版本的调用）。当使用存储过程时，这种技术实际上更容易实现，因为可以轻松创建模拟存储过程并将其换入换出，而不会中断或重新编译正在测试的应用程序代码。


    另一个重要问题是安全性。临时 SQL（以及动态 SQL）带来了各种安全挑战，包括可能打开攻击向量，以及使得以声明式而非编程方式强制执行数据访问安全性变得更加困难。这意味着，通过使用临时
    SQL，你的应用程序可能更容易被黑客攻击，并且你可能无法依赖 SQL Server 来保护数据访问。最终结果是需要进行更高程度的测试，以确保安全漏洞得到适当修补，并且用户（无论是授权用户还是未授权用户）无法访问他们本不应看到的数据。有关这些观点的进一步讨论，请参见“动态
    SQL 安全注意事项”部分。


    最后，我将讨论在线辩论似乎总是倾向于的最热门问题，当然，那就是性能问题。临时 SQL 的支持者提出了一个有效的观点，由于最新版本的 SQL Server 对查询计划缓存的支持更好，存储过程与临时查询相比不再具有显著的性能优势。虽然这听起来像是一个不使用存储过程的绝佳理由，但我个人认为这是一个不成问题的问题。在性能相当的情况下，我认为显而易见的选择是更易于维护和更安全的选项（即存储过程）。


    归根结底，存储过程与临时 SQL 的问题实际上是关于目的的问题。ORM 社区中的许多人认为数据库应该只用作一个非常简单的对象持久层，并且可能对只有一个表、只有两列（一个用于标识对象
    ID 的 GUID 和一个用于序列化对象图的 XML 列）的数据库完全满意。


    在我看来，数据库远不止是数据的集合。它还是数据规则的执行者、数据完整性的保护者，以及可以跨多个应用程序共享的中央数据资源。


    基于这些原因，我认为基于解耦的存储过程的设计是最佳选择。


    ## 为何选择动态 SQL？


    正如本章引言所述，动态 SQL 可以帮助创建更灵活的数据访问层，从而帮助实现更灵活的应用程序，这会让用户更满意。这是一个正当的目标，但事实是，动态 SQL
    只是实现预期最终结果的一种手段。在许多桌面应用程序中，直接在客户端进行动态排序和过滤是完全可能的——事实上通常是更可取的——或者在业务层（如果存在）中进行，以支持基于
    Web 或客户端-服务器风格的桌面应用程序。也可以完全不采用动态 SQL，通过支持提供可选参数的静态存储过程来实现——但这通常不被推荐，因为它可能很快导致代码非常笨拙且难以维护，正如本章后面的“通过静态
    T-SQL 实现可选参数”部分将演示的那样。


    在承诺采用任何基于数据库的解决方案之前，请确定它是否确实是正确的行动方针。请牢记性能、可维护性以及最重要的可扩展性问题。


    数据库资源通常是特定应用程序使用的任何资源中负担最重的，而数据的动态排序和过滤可能意味着给数据库带来更多负载。请记住，扩展数据库通常比扩展应用程序的其他层要昂贵得多。'
  raw: 'Before I begin a serious discussion about how dynamic SQL should be used,
    it’s first important to establish a bit of terminology. Two terms that are often
    intermingled in the database world with regard to SQL are **dynamic** and **ad
    hoc**. When referring to these terms in this chapter, I define them as follows:


    •


    Ad hoc SQL is any batch of SQL generated within an application layer and sent
    to


    SQL Server for execution. This includes almost all of the code samples in this


    book, which are entered and submitted via SQL Server Management Studio.


    •


    Dynamic SQL, on the other hand, is a batch of SQL that is generated *within T-SQL*


    and executed using the EXECUTE statement or, preferably, via the sp_executesql


    system stored procedure (which is covered later in this chapter).


    Most of this chapter focuses on how to use dynamic SQL effectively using stored
    procedures.


    However, if you are one of those working with systems that do not use stored procedures,
    I advise you to still read the “SQL Injection” and “Compilation and Parameterization”
    sections at a minimum. Both sections are definitely applicable to ad hoc scenarios
    and are extremely important.


    All of that said, I do not recommend the use of ad hoc SQL in application development,
    and feel that many potential issues, particularly those affecting application
    security and performance, can be prevented through the use of stored procedures.


    The Stored Procedure vs. Ad Hoc SQL Debate


    A seemingly never-ending battle among members of the database development community
    concerns the question of whether database application development should involve
    the use of stored procedures.


    This debate can become quite heated, with proponents of rapid software development
    methodologies such as test-driven development (TDD) claiming that stored procedures
    slow down their process, and fans of object-relational mapping (ORM) technologies
    making claims about the benefits of those technologies over stored procedures.
    I highly recommend that you search the Web to find these debates and reach your
    own conclusions. Personally, I heavily favor the use of stored procedures, for
    several reasons that I will briefly discuss here.


    First and foremost, stored procedures create an abstraction layer between the
    database and the application, hiding details about the schema and sometimes the
    data. The encapsulation of data logic within stored procedures greatly decreases
    coupling between the database and the application, meaning that maintenance of
    or modification to the database will not necessitate changing the application
    accordingly. Reducing these dependencies and thinking of the database as a data
    API rather than a simple application persistence layer enables a flexible application
    development process. Often, this can permit the database and application layers
    to be developed in parallel rather than in sequence, thereby allowing for greater
    scale-out of human resources on a given project. For more information on concepts
    such as encapsulation, coupling, and treating the database as an API, see Chapter
    1.


    If stored procedures are properly defined, with well-documented and consistent
    outputs, testing is not at all hindered—unit tests can be easily created, as shown
    in Chapter 3, in order to support TDD.


    Furthermore, support for more advanced testing methodologies also becomes easier,
    not more difficult, thanks to stored procedures. For instance, consider use of
    **mock objects**—façade methods that return specific known values. Mock objects
    can be substituted for real methods in testing scenarios so that any given method
    can be tested in isolation, without also testing any methods that it calls (any
    calls made from within the method being tested will actually be a call to a mock
    version of the method). This technique is actually much easier to implement when
    stored procedures are used, as mock stored 196


    CHAPTER 8 „ DYNAMIC T-SQL


    procedures can easily be created and swapped in and out without disrupting or
    recompiling the application code being tested.


    Another important issue is security. Ad hoc SQL (as well as dynamic SQL) presents
    various security challenges, including opening possible attack vectors and making
    data access security much more difficult to enforce declaratively, rather than
    programmatically. This means that by using ad hoc SQL, your application may be
    more vulnerable to being hacked, and you may not be able to rely on SQL


    Server to secure access to data. The end result is that a greater degree of testing
    will be required in order to ensure that security holes are properly patched and
    that users—both authorized and not—are unable to access data they’re not supposed
    to see. See the section “Dynamic SQL Security Considerations” for further discussion
    of these points.


    Finally, I will address the hottest issue that online debates always seem to gravitate
    toward, which, of course, is the question of performance. Proponents of ad hoc
    SQL make the valid claim that, thanks to better support for query plan caching
    in recent versions of SQL Server, stored procedures no longer have a significant
    performance benefit when compared to ad hoc queries. Although this sounds like
    a great argument for not having to use stored procedures, I personally believe
    that it is a nonissue. Given equivalent performance, I think the obvious choice
    is the more maintainable and secure option (i.e., stored procedures).


    In the end, the stored procedure vs. ad hoc SQL question is really one of purpose.
    Many in the ORM


    community feel that the database should be used as nothing more than a very simple
    object persistence layer, and would probably be perfectly happy with a database
    that only had a single table with only two columns: a GUID to identify an object’s
    ID and an XML column for the serialized object graph.


    In my eyes, a database is much more than just a collection of data. It is also
    an enforcer of data rules, a protector of data integrity, and a central data resource
    that can be shared among multiple applications.


    For these reasons, I believe that a decoupled, stored procedure–based design is
    the best way to go.


    Why Go Dynamic?


    As mentioned in the introduction for this chapter, dynamic SQL can help create
    more flexible data access layers, thereby helping to enable more flexible applications,
    which makes for happier users. This is a righteous goal, but the fact is that
    dynamic SQL is just one means by which to attain the desired end result. It is
    quite possible—in fact, often preferable—to do dynamic sorting and filtering directly
    on the client in many desktop applications, or in a business layer (if one exists)
    to support either a web-based or client-server–style desktop application. It is
    also possible not to go dynamic at all, by supporting static stored procedures
    that supply optional parameters—but that’s not generally recommended because it
    can quickly lead to very unwieldy code that is difficult to maintain, as will
    be demonstrated in the


    “Optional Parameters via Static T-SQL” section later in this chapter .


    Before committing to any database-based solution, determine whether it is really
    the correct course of action. Keep in mind the questions of performance, maintainability,
    and most important, scalability.


    Database resources are often the most taxed of any used by a given application,
    and dynamic sorting and filtering of data can potentially mean a lot more load
    put on the database. Remember that scaling the database can often be much more
    expensive than scaling other layers of an application.'
