- fmt: 'In order to create a proxy login (which can be used to delegate server-level
    permissions such as `BULK INSERT` or `ALTER DATABASE`), you must first create
    a certificate in the `master` database. Certificates are covered in more detail
    in Chapter 6, but for now think of a certificate as a trusted way to verify the
    identity of a principal without a password. The following syntax can be used to
    create a certificate in `master`. (Note that before a certificate can be created
    in any database, a master key must be created. Again, see Chapter 6.)


    ```sql

    USE master;

    GO


    CREATE CERTIFICATE Dinesh_Certificate

    ENCRYPTION BY PASSWORD = ''stR0n_G paSSWoRdS, pLE@sE!''

    WITH SUBJECT = ''Certificate for Dinesh'';

    GO

    ```


    Once the certificate has been created, a proxy login can be created using the
    `CREATE LOGIN FROM CERTIFICATE` syntax as follows:


    ```sql

    CREATE LOGIN Dinesh

    FROM CERTIFICATE Dinesh_Certificate;

    GO

    ```


    This login can be granted permissions, just like any other login. However, to
    use the permissions, the login must be mapped to a database user. This is done
    by creating a user using the same certificate that was used to create the login,
    using the `CREATE USER FOR CERTIFICATE` syntax. See the section “Stored Procedure
    Signing Using Certificates” later in this chapter for more information on how
    to use a proxy login for server-level permissions.


    ## Database-Level Proxies


    Proxy principals that operate at the database level can be created by adding a
    user to the database that is not associated with a server login. This is done
    using `CREATE USER WITHOUT LOGIN`, as shown in the following code listing:


    ```sql

    CREATE USER Bob

    WITHOUT LOGIN;

    GO

    ```


    This user, like any database user, can be assigned ownership and other permissions.
    However, it is impossible to log into the server and authenticate as `Bob`. Instead,
    you must log in using a valid server-level login and authenticate to the database
    with whatever database user is associated with your login. Only then can you impersonate
    `Bob`, taking on whatever permissions the user is assigned. This is discussed
    in detail in the section “Basic Impersonation Using `EXECUTE AS`” later in this
    chapter.


    ## Data Security in Layers: The Onion Model


    Generally speaking, the more levels that an attacker must penetrate in order to
    access a valuable resource, the better the chance of being able to prevent their
    attack. Developers should strive to construct multiple layers of protection for
    any sensitive data, in order to ensure that if one security measure is breached,
    other obstacles will keep an attacker at bay.


    The first layer of defense is everything outside of the database server, all of
    which falls into the realm of authentication. Once a user is authenticated, SQL
    Server’s declarative permissions system kicks in, and a login is authorized to
    access one or more databases, based on user mappings.


    From there, each user is authorized to access specific resources in the database.
    Another layer that can be added for additional security here is use of stored
    procedures. By assigning permissions only via stored procedures, it is possible
    to maintain greater control over when and why escalation should take place—but
    more on that will be covered later in this chapter.


    Of course, the stored procedure itself must have access to whatever tables and
    columns are required, and these resources can be further locked down if necessary,
    using encryption or row-level security schemes.


    Figure 5-1 shows some of the layers that should be considered when defining a
    SQL Server security scheme, in order to maximize the protection with which sensitive
    data is secured. The remainder of this chapter deals primarily with how best to
    control access to resources using stored procedures as the primary access layer
    into the data once a user is authenticated.


    A stored procedure layer provides an ideal layer of abstraction between data access
    methods and the data itself, allowing for additional security to be programmed
    in via parameters or other inline logic.'
