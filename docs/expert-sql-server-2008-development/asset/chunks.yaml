- fmt: "# CHAPTER 8 „ DYNAMIC T-SQL\n\n## Performance Comparison\n\nHaving considered\
    \ the implications for maintenance and cache plan reuse, let’s now conduct some\
    \ simple load testing to see how the three different approaches (static, `EXECUTE`,\
    \ and `sp_executesql`) compare in terms of actual performance.\n\nTo begin, create\
    \ a renamed version of the best-performing (but hardest-to-maintain) static SQL\
    \ version of the stored procedure. Call it `GetEmployeeData_Static`:\n\n```sql\n\
    CREATE PROCEDURE GetEmployeeData_Static\n    @BusinessEntityID int = NULL,\n \
    \   @NationalIDNumber nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n\
    \    IF (@BusinessEntityID IS NOT NULL AND @NationalIDNumber IS NOT NULL)\n  \
    \  BEGIN\n        SELECT\n            LoginID,\n            JobTitle\n       \
    \ FROM HumanResources.Employee\n        WHERE\n            BusinessEntityID =\
    \ @BusinessEntityID\n            AND NationalIDNumber = @NationalIDNumber;\n \
    \   END\n    ELSE IF (@BusinessEntityID IS NOT NULL)\n    BEGIN\n        SELECT\n\
    \            LoginID,\n            JobTitle\n        FROM HumanResources.Employee\n\
    \        WHERE\n            BusinessEntityID = @BusinessEntityID;\n    END\n \
    \   ELSE IF (@NationalIDNumber IS NOT NULL)\n    BEGIN\n        SELECT\n     \
    \       LoginID,\n            JobTitle\n        FROM HumanResources.Employee\n\
    \        WHERE\n            NationalIDNumber = @NationalIDNumber;\n    END\n \
    \   ELSE\n    BEGIN\n        SELECT\n            LoginID,\n            JobTitle\n\
    \        FROM HumanResources.Employee;\n    END\nEND;\nGO\n```\n\nThis version\
    \ produces the best possible query plans, but of course has the issue of being\
    \ very difficult to maintain. It also has no additional overhead associated with\
    \ context switching, which may make it slightly faster than a dynamic SQL solution\
    \ if the queries are very simple. For more complex queries that take longer to\
    \ run, any context switching overhead will be overshadowed by the actual runtime\
    \ of the query.\n\nTo test the performance of the `GetEmployeeData_Static` stored\
    \ procedure, we’ll call it from a simple C# application via ADO.NET. But first\
    \ we need to obtain a set of values to supply for the `@NationalIDNumber` and\
    \ `@BusinessEntityID` parameters. For each row in the `HumanResources.Employee`\
    \ table, we’ll call the procedure with every combination of those two parameters:\
    \ once supplying just the `BusinessEntityID`, once supplying just the `NationalIDNumber`,\
    \ once supplying both, and once providing `NULL` for both parameters. There are\
    \ 290 rows in the `HumanResources.Employee` table, so this provides `(290 x 3)\
    \ + 1 = 871` combinations. To increase the sample size, we’ll place the procedure\
    \ call in a loop that will call every combination ten times—leading to 8,710 iterations\
    \ of the query.\n\nThe following code listing illustrates the C# code required\
    \ to perform the test just described. It first fills a `DataTable` with the possible\
    \ set of parameter values, and then steps through the rows of the table, calling\
    \ the `GetEmployeeData_static` with each combination:\n\n```csharp\nSqlConnection\
    \ sqlConn = new SqlConnection(\n    \"Data Source=localhost;Initial Catalog=AdventureWorks2008;Integrated\
    \ Security=SSPI\");\nsqlConn.Open();\n\n/* Grab every combination of parameters\
    \ */\nSqlCommand cmd = new SqlCommand(@\"\n    SELECT BusinessEntityId, NationalIDNumber\
    \ FROM HumanResources.Employee\n    UNION ALL SELECT NULL, NationalIDNumber FROM\
    \ HumanResources.Employee\n    UNION ALL SELECT BusinessEntityId, NULL FROM HumanResources.Employee\n\
    \    UNION ALL SELECT NULL, NULL\", sqlConn);\nSqlDataAdapter da = new SqlDataAdapter();\n\
    da.SelectCommand = cmd;\nDataTable dt = new DataTable();\nda.Fill(dt);\n\nfor\
    \ (int i = 0; i < 10; i++)\n{\n    foreach (DataRow r in dt.Rows)\n    {\n   \
    \     SqlCommand cmd2 = new SqlCommand(\"GetEmployeeData_static\", sqlConn);\n\
    \        cmd2.CommandType = CommandType.StoredProcedure;\n\n        SqlParameter\
    \ param = new SqlParameter(\"@BusinessEntityID\", SqlDbType.Int);\n        param.Value\
