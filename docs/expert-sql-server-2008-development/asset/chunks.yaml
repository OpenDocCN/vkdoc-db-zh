- fmt: "# CHAPTER 3 TESTING DATABASE ROUTINES\n\nThere are a number of testing methodologies\
    \ within the world of quality assurance, but in general, all types of software\
    \ tests can be split into two groups:\n\n*   `Black box` testing refers to tests\
    \ that make assumptions only about inputs and outputs of the module being tested,\
    \ and as such do not validate intermediate conditions. The internal workings of\
    \ the module are not exposed to (or required by) the tester—hence they are contained\
    \ within a “black box.”\n*   `White box` testing, on the other hand, includes\
    \ any test in which the internal implementation of the routine or function being\
    \ tested is known and validated by the tester. White box testing is also called\
    \ “open-box” testing, as the tester is allowed to look inside the module to see\
    \ how it operates, rather than just examining its inputs and outputs.\n\nWithin\
    \ each of these broad divisions are a number of specific tests designed to target\
    \ different particular areas of the application in question. Examples of black\
    \ box tests include unit tests, security tests, and basic performance tests such\
    \ as stress tests and endurance tests. As the testing phase progresses, target\
    \ areas are identified that require further testing, and the types of tests performed\
    \ tend to shift from black box to white box to focus on specific internal elements.\n\
    \nFrom a database development perspective, examples of white box tests include\
    \ functional tests that validate the internal working of a module, tests that\
    \ perform data validation, and cases when performance tuning requires thorough\
    \ knowledge of data access methods. For instance, retrieving and analyzing query\
    \ plans during a performance test is an example of white box testing against a\
    \ stored procedure.\n\n## Unit and Functional Testing\n\nDeveloping software with\
    \ a specific concentration on the data tier can have a benefit when it comes to\
    \ testing: there aren’t too many types of tests that you need to be familiar with.\
    \ Arguably, the two most important types of test are those that verify that the\
    \ application behaves as it is meant to, and returns the correct results. This\
    \ is the purpose of unit tests and functional tests.\n\n`Unit tests` are black\
    \ box tests that verify the contracts exposed by interfaces. For instance, a unit\
    \ test of a stored procedure should validate that, given a certain set of inputs,\
    \ the stored procedure returns the correct set of output results, as defined by\
    \ the interface of the stored procedure being tested. The term correct as used\
    \ here is important to define carefully. It means “correct” only insofar as what\
    \ is defined as the contract for the stored procedure; the actual data returned\
    \ is not important. So, as long as the results represent valid values in the correct\
    \ format and of the correct datatypes given the interface’s contract, a unit test\
    \ should pass. Phrased another way, unit tests test the ability of interfaces\
    \ to communicate with the outside world exactly as their contracts say they will.\n\
    \n`Functional tests`, as their name implies, verify the functionality of whatever\
    \ is being tested. In testing nomenclature, the term functional test has a much\
    \ vaguer meaning than unit test. It can mean any kind of test, at any level of\
    \ an application, that tests whether that piece of the application works properly—in\
    \ other words, that it performs the appropriate sequence of operations to deliver\
    \ the correct final result as expected. For a simple stored procedure that selects\
    \ data from the database, this asks the question of whether the stored procedure\
    \ returning the correct data? Again, I will carefully define the term correct.\
    \ This time, correct means both the kind of validation done for a unit test (data\
    \ must be in the correct format), as well as a deeper validation of the accuracy\
    \ of the actual values returned. The logic required for this kind of validation\
    \ means that a functional test is a white box test in the database world, compared\
    \ to the black box of unit testing.\n\nLet’s take a look at an example to make\
    \ these ideas a bit clearer. Consider the following stored procedure, which might\
    \ be used for a banking application:\n\n```sql\nCREATE PROCEDURE GetAggregateTransactionHistory\n\
    \    @CustomerId int\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    SELECT\n        SUM\n\
    \        (\n            CASE TransactionType\n                WHEN 'Deposit' THEN\
    \ Amount\n                ELSE 0\n            END\n        ) AS TotalDeposits,\n\
    \        SUM\n        (\n            CASE TransactionType\n                WHEN\
    \ 'Withdrawal' THEN Amount\n                ELSE 0\n            END\n        )\
    \ AS TotalWithdrawals\n    FROM TransactionHistory\n    WHERE\n        CustomerId\
    \ = @CustomerId;\nEND;\n```\n\nThis stored procedure’s implied contract states\
    \ that, given the input of a customer ID into the `@CustomerId` parameter, a result\
    \ set of two columns and zero or one rows will be output (the contract does not\
    \ imply anything about invalid customer IDs or customers who have not made any\
    \ transactions).\n\nThe column names in the output result set will be `TotalDeposits`\
    \ and `TotalWithdrawals`, and the datatypes of the columns will be the same as\
    \ the datatype of the `Amount` column in the `TransactionHistory` table (we’ll\
    \ assume it’s decimal).\n\n### What if the Customer Doesn’t Exist?\n\nThe output\
    \ of the `GetAggregateTransactionHistory` stored procedure will be the same whether\
    \ you pass in a valid customer ID for a customer that happens to have had no transactions,\
    \ or an invalid customer ID. Either way, the procedure will return no rows. Depending\
    \ on the requirements of a particular situation, it might make sense to make the\
    \ interface richer by changing the rules a bit, only returning no rows if an invalid\
    \ customer ID is passed in. That way, the caller will be able to identify invalid\
    \ data and give the user an appropriate error message rather than implying that\
    \ the nonexistent customer made no transactions.\n\nA unit test against this stored\
    \ procedure should do nothing more than validate the interface. A customer ID\
    \ should be passed in, and the unit test should interrogate the output result\
    \ set (or lack thereof) to ensure that there are two columns of the correct name\
    \ and datatype and zero or one rows. No verification of data is necessary; it\
    \ would be out of scope, for instance, to find out whether the aggregate information\
    \ was accurate or not—that would be the job of a functional test.\n\nThe reason\
    \ that we draw such a distinction between unit tests and functional tests is that\
    \ when testing pure interface compliance, we want to put ourselves in the position\
    \ of someone programming against the interface from a higher layer. Is the interface\
    \ working as documented, providing the appropriate level of encapsulation and\
    \ returning data in the correct format?\n\nEach interface in the system will need\
    \ one or more of these tests (see the “How Many Tests Are Needed?” section later\
    \ in the chapter), so they need to be kept focused and lightweight. Programming\
    \ full white box tests against every interface may not be feasible, and it might\
    \ be simpler to test the validity of data at a higher layer, such as via the user\
    \ interface itself. In the case of the `GetAggregateTransactionHistory` stored\
    \ procedure, writing a functional test would essentially entail rewriting the\
    \ entire stored procedure again—hardly a good use of developer time.\n\n## Unit\
    \ Testing Frameworks\n\nUnit testing is made easier through the use of unit testing\
    \ frameworks, which provide structured programming interfaces designed to assist\
    \ with quickly testing software. These frameworks generally make use of `debug\
    \ assertions`, which allow the developer to specify those conditions that make\
    \ a test true or false.\n\nA debug assertion is a special kind of macro that is\
    \ turned on only when a piece of software is compiled in debug mode. It accepts\
    \ an expression as input and throws an exception if the expression is false; otherwise,\
    \ it returns true (or void, in some languages). For instance, the following assertion\
    \ would always throw an exception:\n\n```\nAssert(1 == 0);\n```"
