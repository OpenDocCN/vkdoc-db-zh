    additional cached plans. That means that not only will the query execution experience
    slowdown resulting from the additional compilation, but also quite a bit of RAM
    will be wasted in the query plan cache. In SQL Server 2008, queries are aged out
    of the plan cache on a least-recently-used basis, and depending on the server’s
    workload, it can take quite a bit of time for unused plans to be removed.


    In large production environments, a failure to use parameterized queries can result
    in gigabytes of RAM being wasted caching query plans that will never be used again.
    This is obviously not a good thing!


    So please—for the sake of all of that RAM—learn to use your connection library’s
    parameterized query functionality and avoid falling into this trap.


    Supporting Optional Parameters


    The most commonly cited use case for dynamic SQL is the ability to write stored
    procedures that can support optional parameters for queries in an efficient, maintainable
    manner. Although it is quite easy 205


    CHAPTER 8 „ DYNAMIC T-SQL


    to write static stored procedures that handle optional query parameters, these
    are generally grossly inefficient or highly unmaintainable—as a developer, you
    can take your pick.


    Optional Parameters via Static T-SQL


    Before presenting the dynamic SQL solution to the optional parameter problem,
    a few demonstrations are necessary to illustrate why static SQL is *not* the right
    tool for the job. There are a few different methods of creating static queries
    that support optional parameters, with varying complexity and effectiveness, but
    each of these solutions contains flaws.


    As a baseline, consider the following query, which selects one row of data from
    the


    HumanResources.Employee table in the AdventureWorks2008 database:


    SELECT


    BusinessEntityID,


    LoginID,


    JobTitle


    FROM


    HumanResources.Employee


    WHERE


    BusinessEntityID = 28


    AND NationalIDNumber = N''14417807'';


    GO


    This query uses predicates to filter on both the BusinessEntityID and NationalIDNumber
    columns.


    Executing the query produces the execution plan shown in Figure 8-1, which has
    an estimated cost of 0.0032831, and which requires two logical reads. This plan
    involves a seek of the table’s clustered index, which uses the BusinessEntityID
    column as its key.


    *Figure 8-1\. Base execution plan with seek on BusinessEntityID clustered index*


    Since the query uses the clustered index, it does not need to do a lookup to get
    any additional data.


    Furthermore, since BusinessEntityID is the primary key for the table, the NationalIDNumber
    predicate is not used when physically identifying the row. Therefore, the following
    query, which uses only the BusinessEntityId predicate, produces the exact same
    query plan with the same cost and same number of reads:


    SELECT


    BusinessEntityID,


    LoginID,


    JobTitle


    FROM


    HumanResources.Employee


    WHERE


    BusinessEntityID = 28;


    GO


    CHAPTER 8 „ DYNAMIC T-SQL


    Another form of this query involves removing BusinessEntityID and querying based
    only on


    NationalIDNumber:


    SELECT


    BusinessEntityID,


    LoginID,


    JobTitle


    FROM


    HumanResources.Employee


    WHERE


    NationalIDNumber = N''14417807'';


    GO


    This query results in a very different plan from the other two, due to the fact
    that a different index must be used to satisfy the query. Figure 8-2 shows the
    resultant plan, which involves a seek on a nonclustered index on the NationalIDNumber
    column, followed by a lookup to get the additional rows for the SELECT list. This
    plan has an estimated cost of 0.0065704, and performs four logical reads.


    *Figure 8-2\. Base execution plan with seek on NationalIDNumber nonclustered index
    followed by a lookup* *into the clustered index*


    The final form of the base query has no predicates at all:


    SELECT


