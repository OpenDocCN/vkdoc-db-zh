    \  \"WGS 84\",\n  DATUM[\n    \"World Geodetic System 1984\",\n    ELLIPSOID[\n\
    \      \"WGS 84\",\n      6378137,\n      298.257223563\n    ]\n  ],\n  PRIMEM[\"\
    Greenwich\", 0],\n  UNIT[\"Degree\", 0.0174532925199433]\n]\n```\n\n回到本章开头的例子，使用这个空间参考系统，我们可以将美国五角大楼每个角落的近似位置描述为一对经纬度坐标如下：\n\
    \n`38.870, -77.058`\n`38.869, -77.055`\n`38.871, -77.053`\n`38.873, -77.055`\n\
    `38.872, -77.058`\n\n请注意，由于我们描述的点位于本初子午线以西，因此在每种情况下经度坐标都是负数。\n\n现在让我们考虑另一个空间参考系统——通用横轴墨卡托\
    \ 18N 带系统，这是北美部分地区使用的一个投影坐标系。这个空间参考系统基于 1983 年北美基准，其参考椭球体为 6,378,137 米，扁率的倒数为`298.257222101`。这个大地测量模型使用横轴墨卡托投影，以西经\
    \ 75°经线为中心，基于投影图像的坐标以米为单位进行测量。这个系统的完整属性在 WKT 格式中表示如下：\n\n```\nPROJCS[\n  \"NAD_1983_UTM_Zone_18N\"\
    ,\n  GEOGCS[\n    \"GCS_North_American_1983\",\n    DATUM[\n      \"D_North_American_1983\"\
    ,\n      SPHEROID[\n        \"GRS_1980\",\n        6378137,\n        298.257222101\n\
    \      ]\n    ],\n    PRIMEM[\"Greenwich\",0],\n    UNIT[\"Degree\", 0.0174532925199433]\n\
    \  ],\n  PROJECTION[\"Transverse_Mercator\"],\n  PARAMETER[\"False_Easting\",\
    \ 500000.0],\n  PARAMETER[\"False_Northing\", 0.0],\n  PARAMETER[\"Central_Meridian\"\
    , -75.0],\n  PARAMETER[\"Scale_Factor\", 0.9996],\n  PARAMETER[\"Latitude_of_Origin\"\
    , 0.0],\n  UNIT[\"Meter\", 1.0]\n]\n```\n\n使用这个空间参考系统，五角大楼的相同五个点可以用以下坐标描述：\n\n\
    `321460, 4304363`\n`321718, 4304246`\n`321896, 4304464`\n`321728, 4304690`\n`321465,\
    \ 4304585`\n\n比较这些结果清楚地表明，任何坐标对只有在说明了从中获得它们的坐标系的详细信息时，才能描述地球上的唯一位置。然而，如果我们每次想引用一对坐标时都必须写出基准、本初子午线、测量单位和投影细节的完整信息，那将相当麻烦。幸运的是，有一套既定的**空间参考标识符**为每个空间参考系统提供一个唯一的整数代码。前面例子中使用的两个空间参考系统分别由`SRID\
    \ 4326`和`SRID 26918`表示。\n"
- fmt: "# CHAPTER 10 WORKING WITH SPATIAL DATA\n\nEvery time you state an item of\
    \ spatial data using the `geography` or `geometry` types in SQL Server 2008, you\
    \ *must* state the corresponding `SRID` from which the coordinate values were\
    \ obtained. What’s more, since SQL Server does not provide any mechanism for converting\
    \ between spatial reference systems, if you want to perform any calculations involving\
    \ two or more items of spatial data, each one must be defined using the same `SRID`.\n\
    \nIf you don’t know the `SRID` associated with a set of coordinates—say, you looked\
    \ up some latitude and longitude coordinates from a web site that didn’t state\
    \ the system used—the chances are more than likely that they are geographic coordinates\
    \ based on `SRID 4326`, the system used by GPSs.\n\n### Note\nTo find out the\
    \ `SRID` associated with any given spatial reference system, you can use the search\
    \ facility provided at `www.epsg-registry.org`.\n\n## Geography vs. Geometry\n\
    \nEarly Microsoft promotional material for SQL Server 2008 introduced the `geography`\
    \ datatype as suitable for “round-earth” data, whereas the `geometry` datatype\
    \ was for “flat-earth” data. These terms have since been repeated verbatim by\
    \ a number of commentators, with little regard for explaining the practical meaning\
    \ of “flat” or “round.” A simple analogy might be that, in terms of geospatial\
    \ data, the `geometry` datatype operates on a map, whereas the `geography` datatype\
    \ operates on a globe.\n\nWith that distinction in mind, one obvious difference\
    \ between the datatypes concerns the types of coordinates that can be used with\
    \ each:\n\n- The `geography` datatype requires data to be expressed using latitude\
    \ and longitude coordinates, obtained from a geographic coordinate system. Furthermore,\
    \ since SQL Server needs to know the parameters of the ellipsoidal model onto\
    \ which those coordinates should be applied, all `geography` data must be based\
    \ on one of the spatial reference systems listed in the `sys.spatial_reference_systems`\
    \ system table.\n- The `geometry` datatype operates on a flat plane, which makes\
    \ it ideal for dealing with geospatial data from projected coordinate systems,\
    \ including Universal Transverse Mercator (`UTM`) grid coordinates, national grid\
    \ coordinates, or state plane coordinates. However, there are occasions when you\
    \ may wish to store latitude and longitude coordinates using the `geometry` datatype,\
    \ as I’ll demonstrate later this chapter. The `geometry` datatype can also be\
    \ used to store any abstract nonspatial data that can be modeled as a pair of\
    \ floating point x, y coordinates, such as the nodes of a graph.\n\nThis distinction\
    \ between coordinate types is not the only property that distinguishes the two\
    \ datatypes. In the following sections I’ll analyze some of the other differences\
    \ in more detail.\n\n### Note\nBoth the flat plane used by the `geometry` datatype\
    \ and the curved ellipsoidal surface of the `geography` datatype are two-dimensional\
    \ surfaces, and a position on those surfaces can be described using exactly two\
    \ coordinates (latitude and longitude for the `geography` datatype, or x and y\
    \ for the `geometry` datatype). SQL Server 2008 also allows you to store `Z` and\
    \ `M` coordinates, which can represent two further dimensions associated with\
    \ each point (typically, `Z` is elevation above the surface, and `M` is a measure\
    \ of time). However, while these values can be stored and retrieved, none of the\
    \ methods provided by the `geography` or `geometry` datatypes account for the\
    \ value of `Z` and `M` coordinates in their calculations.\n\n## Standards Compliance\n\
    \nThe `geometry` datatype operates on a flat plane, where the two coordinate values\
    \ for each point represent the x and y position from a designated origin on the\
    \ plane. As a result, many of the standard methods provided by the `geometry`\
    \ datatype can be performed using elementary trigonometry and geometry. For example,\
    \ the following code listing demonstrates how to calculate the distance between\
    \ a `Point` located at `(50,100)` and a `Point` at `(90,130)` using the `STDistance()`\
    \ method of the `geometry` datatype:\n\n```sql\nDECLARE @point1 geometry = geometry::Point(50,\
    \ 100, 0);\nDECLARE @point2 geometry = geometry::Point(90, 130, 0);\nSELECT @point1.STDistance(@point2);\n\
    ```\n\nThe result, `50`, could have been obtained without using the `geometry`\
    \ datatype, using basic knowledge of the Pythagorean theorem, as in the following\
    \ equivalent T-SQL query:\n\n```sql\nDECLARE\n    @x1 int = 50, @y1 int = 100,\n\
    \    @x2 int = 90, @y2 int = 130;\nSELECT\n    SQRT(\n        POWER(@x2 - @x1,\
    \ 2) +\n        POWER(@y2 - @y1, 2)\n    );\n```\n\nOf course, other `geometry`\
    \ operations, such as finding whether a `Point` lies within a `Polygon`, or the\
    \ area created by the intersection of two `Polygon`s, become more involved than\
    \ the simple example given here, but they are still generally achievable using\
    \ alternative methods in T-SQL or SQLCLR. So why the fuss about the `geometry`\
    \ datatype?\n\nOne key benefit of implementing such functionality using the `geometry`\
    \ datatype instead of rolling your own code is that all the methods implemented\
    \ by the `geometry` datatype conform to the Open Geospatial Consortium (`OGC`)\
    \ Simple Features for SQL Specification v1.1.0. This is the industry standard\
    \ format for the interchange and implementation of spatial functionality. By using\
    \ the `geometry` datatype, you can be sure that the results of any spatial methods\
    \ will be the same as those obtained from any other system based on the same standards.\n\
    \nNote that although `OGC` compliance ensures *consistency* of results, the `OGC`\
    \ methods do not necessarily give predictable results, at least not in the sense\
    \ that you can reasonably guess the behavior of a method based on its name alone.\
    \ For example, consider the two `LineString`s illustrated in Figure 10-5.\n\n\
    *Figure 10-5. Two LineStrings that cross but do not touch*\n\nIn normal English\
    \ language, most people would describe these two `LineString`s as *touching*,\
    \ but not *crossing*. However, according to the `OGC` definitions, the reverse\
    \ is true. You can test this for yourself by examining the results of the `STTouches()`\
    \ and `STCrosses()` methods, as shown in the following code listing:\n\n```sql\n\
    DECLARE @x geometry = geometry::STLineFromText('LINESTRING(0 0, 0 10)', 0);\n\
    DECLARE @y geometry = geometry::STLineFromText('LINESTRING(10 0, 0 5, 10 10)',\
    \ 0);\nSELECT\n    @x.STCrosses(@y),\n    @x.STTouches(@y);\n```\n\nThe result\
    \ of the `STCrosses()` method is `1`, indicating that the `LineString` x crosses\
    \ over the `LineString` y. According to the `OGC` standards, two `LineString`s\
    \ cross each other if the geometry created by their intersection is zero-dimensional.\
    \ In this case, the two `LineString`s intersect at a single point `(5,5)`, so\
    \ they are deemed to cross. In contrast, two `LineString`s only touch each other\
    \ if the points at which they intersect lie in the boundary (i.e., the ends) of\
    \ the `LineString`. In this case, the point `(5,5)` lies in the interior of both\
    \ `LineString`s rather than in their boundary, so the result of `STTouches()`\
    \ is `0` (i.e., false). Be careful to check the documentation of any methods to\
    \ ensure that the behavior is exactly as you expect!\n\n## Accuracy\n\nThe world\
    \ is round. The `geometry` datatype, however, operates on a flat plane. By definition,\
    \ therefore, any geospatial calculations performed using the `geometry` datatype\
    \ will involve a degree of error. This is not a limitation of the `geometry` datatype\
    \ in itself, but rather of the inevitable distortions introduced when using a\
    \ projected coordinate system to represent a round model of the earth.\n\nGenerally\
    \ speaking, the effects of distortion become greater as the area of projection\
    \ is increased."
  raw: 'Every time you state an item of spatial data using the geography or geometry
    types in SQL Server 2008, you *must* state the corresponding SRID from which the
    coordinate values were obtained. What’s more, since SQL Server does not provide
    any mechanism for converting between spatial reference systems, if you want to
    perform any calculations involving two or more items of spatial data, each one
    must be defined using the same SRID.


    If you don’t know the SRID associated with a set of coordinates—say, you looked
    up some latitude and longitude coordinates from a web site that didn’t state the
    system used—the chances are more than likely that they are geographic coordinates
    based on SRID 4326, the system used by GPSs.


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    „ **Note** To find out the SRID associated with any given spatial reference system,
    you can use the search facility provided at www.epsg-registry.org.


    Geography vs. Geometry


    Early Microsoft promotional material for SQL Server 2008 introduced the geography
    datatype as suitable for “round-earth” data, whereas the geometry datatype was
    for “flat-earth” data. These terms have since been repeated verbatim by a number
    of commentators, with little regard for explaining the practical meaning of “flat”
    or “round.” A simple analogy might be that, in terms of geospatial data, the geometry
    datatype operates on a map, whereas the geography datatype operates on a globe.


    With that distinction in mind, one obvious difference between the datatypes concerns
    the types of coordinates that can be used with each:


    •


    The geography datatype requires data to be expressed using latitude and longitude


    coordinates, obtained from a geographic coordinate system. Furthermore, since


    SQL Server needs to know the parameters of the ellipsoidal model onto which


    those coordinates should be applied, all geography data must be based on one of


    the spatial reference systems listed in the sys.spatial_reference_systems system


    table.


    •


    The geometry datatype operates on a flat plane, which makes it ideal for dealing


    with geospatial data from projected coordinate systems, including Universal


    Transverse Mercator (UTM) grid coordinates, national grid coordinates, or state


    plane coordinates. However, there are occasions when you may wish to store


    latitude and longitude coordinates using the geometry datatype, as I’ll


    demonstrate later this chapter. The geometry datatype can also be used to store


    any abstract nonspatial data that can be modeled as a pair of floating point x,
    y


    coordinates, such as the nodes of a graph.


    This distinction between coordinate types is not the only property that distinguishes
    the two datatypes. In the following sections I’ll analyze some of the other differences
    in more detail.


    „ **Note** Both the flat plane used by the geometry datatype and the curved ellipsoidal
    surface of the geography datatype are two-dimensional surfaces, and a position
    on those surfaces can be described using exactly two coordinates (latitude and
    longitude for the geography datatype, or x and y for the geometry datatype). SQL
    Server 2008 also allows you to store Z and M coordinates, which can represent
    two further dimensions associated with each point (typically, Z is elevation above
    the surface, and M is a measure of time). However, while these values can be stored
    and retrieved, none of the methods provided by the geography or geometry datatypes
    account for the value of Z and M coordinates in their calculations.


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    Standards Compliance


    The geometry datatype operates on a flat plane, where the two coordinate values
    for each point represent the x and y position from a designated origin on the
    plane. As a result, many of the standard methods provided by the geometry datatype
    can be performed using elementary trigonometry and geometry. For example, the
    following code listing demonstrates how to calculate the distance between a Point
    located at (50,100) and a Point at (90,130) using the STDistance() method of the
    geometry datatype:


    DECLARE @point1 geometry = geometry::Point(50, 100, 0);


    DECLARE @point2 geometry = geometry::Point(90, 130, 0);


    SELECT @point1.STDistance(@point2);


    The result, 50, could have been obtained without using the geometry datatype,
    using basic knowledge of the Pythagorean theorem, as in the following equivalent
    T-SQL query:


    DECLARE


    @x1 int = 50, @y1 int = 100,


    @x2 int = 90, @y2 int = 130;


    SELECT


    SQRT(


    POWER(@x2 - @x1, 2) +


    POWER(@y2 - @y1, 2)


    );


    Of course, other geometry operations, such as finding whether a Point lies within
    a Polygon, or the area created by the intersection of two Polygons, become more
    involved than the simple example given here, but they are still generally achievable
    using alternative methods in T-SQL or SQLCLR. So why the fuss about the geometry
    datatype?


    One key benefit of implementing such functionality using the geometry datatype
    instead of rolling your own code is that all the methods implemented by the geometry
    datatype conform to the Open Geospatial Consortium (OGC) Simple Features for SQL
    Specification v1.1.0\. This is the industry standard format for the interchange
    and implementation of spatial functionality. By using the geometry datatype, you
    can be sure that the results of any spatial methods will be the same as those
    obtained from any other system based on the same standards.


    Note that although OGC compliance ensures *consistency* of results, the OGC methods
    do not necessarily give predictable results, at least not in the sense that you
    can reasonably guess the behavior of a method based on its name alone. For example,
    consider the two LineStrings illustrated in Figure 10-5.


    *Figure 10-5\. Two LineStrings that cross but do not touch*


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    In normal English language, most people would describe these two LineStrings as
    *touching*, but not *crossing*. However, according to the OGC definitions, the
    reverse is true. You can test this for yourself by examining the results of the
    STTouches() and STCrosses() methods, as shown in the following code listing:


    DECLARE @x geometry = geometry::STLineFromText(''LINESTRING(0 0, 0 10)'', 0);


    DECLARE @y geometry = geometry::STLineFromText(''LINESTRING(10 0, 0 5, 10 10)'',
    0);


    SELECT


    @x.STCrosses(@y),


    @x.STTouches(@y);


    The result of the STCrosses() method is 1, indicating that the LineString x crosses
    over the LineString y. According to the OGC standards, two LineStrings cross each
    other if the geometry created by their intersection is zero-dimensional. In this
    case, the two LineStrings intersect at a single point (5,5), so they are deemed
    to cross. In contrast, two LineStrings only touch each other if the points at
    which they intersect lie in the boundary (i.e., the ends) of the LineString. In
    this case, the point (5,5) lies in the interior of both LineStrings rather than
    in their boundary, so the result of STTouches() is 0 (i.e., false). Be careful
    to check the documentation of any methods to ensure that the behavior is exactly
    as you expect!


    Accuracy


    The world is round. The geometry datatype, however, operates on a flat plane.
    By definition, therefore, any geospatial calculations performed using the geometry
    datatype will involve a degree of error. This is not a limitation of the geometry
    datatype in itself, but rather of the inevitable distortions introduced when using
    a projected coordinate system to represent a round model of the earth.


    Generally speaking, the effects of distortion become greater as the area of projection
    is increased.'
  trans: "\n# 第 10 章 处理空间数据\n\n每次在 SQL Server 2008 中使用 `geography` 或 `geometry` 类型声明一项空间数据时，你都*必须*指明获取坐标值时所依据的相应\
    \ `SRID`。此外，由于 SQL Server 没提供任何在空间参考系统之间进行转换的机制，因此如果你想对两个或多个空间数据项执行任何计算，每一项都必须使用相同的\
    \ `SRID` 来定义。\n\n如果你不知道一组坐标所关联的 `SRID`——比方说，你从某个网站查询了一些经纬度坐标，但该网站未说明所使用的系统——那么这些坐标极有可能是基于\
    \ `SRID 4326` 的地理坐标，这是 GPS 设备使用的系统。\n\n### 注意\n要查找任何给定空间参考系统所关联的 `SRID`，你可以使用\
    \ `www.epsg-registry.org` 提供的搜索功能。\n\n## Geography 与 Geometry 的比较\n\n微软早期关于 SQL\
    \ Server 2008 的宣传材料将 `geography` 数据类型介绍为适用于“球面”数据，而 `geometry` 数据类型则适用于“平面”数据。这些术语随后被一些评论员原封不动地重复，却很少关注解释“平面”或“球面”的实际含义。一个简单的类比可能是：在地理空间数据方面，`geometry`\
    \ 数据类型在地图上操作，而 `geography` 数据类型则在地球仪上操作。\n\n考虑到这一区别，两种数据类型之间一个明显的差异在于它们可以使用的坐标类型：\n\
    \n- `geography` 数据类型要求数据必须使用从地理坐标系获得的经纬度坐标来表示。此外，由于 SQL Server 需要知道这些坐标应应用的椭球体模型参数，因此所有\
    \ `geography` 数据都必须基于 `sys.spatial_reference_systems` 系统表中列出的空间参考系统之一。\n- `geometry`\
    \ 数据类型在平面上操作，这使其非常适合处理来自投影坐标系的地理空间数据，包括通用横轴墨卡托（`UTM`）网格坐标、国家网格坐标或州平面坐标。不过，有时你可能希望使用\
    \ `geometry` 数据类型存储经纬度坐标，正如本章后面将演示的那样。`geometry` 数据类型也可用于存储任何可建模为一对浮点 x, y 坐标的抽象非空间数据，例如图的节点。\n\
    \n坐标类型的这种区别并不是区分这两种数据类型的唯一属性。在接下来的章节中，我将更详细地分析其他一些差异。\n\n### 注意\n`geometry` 数据类型使用的平面和\
    \ `geography` 数据类型的弯曲椭球面都是二维曲面，这些曲面上的位置可以恰好用两个坐标来描述（对于 `geography` 数据类型是纬度和经度，对于\
    \ `geometry` 数据类型是 x 和 y）。SQL Server 2008 还允许你存储 `Z` 和 `M` 坐标，它们可以表示与每个点相关的另外两个维度（通常，`Z`\
    \ 是地表上方的高程，`M` 是时间的度量）。然而，尽管可以存储和检索这些值，但 `geography` 或 `geometry` 数据类型提供的任何方法在计算中都不考虑\
    \ `Z` 和 `M` 坐标的值。\n\n## 标准符合性\n\n`geometry` 数据类型在平面上操作，其中每个点的两个坐标值代表平面上从指定原点出发的\
    \ x 和 y 位置。因此，`geometry` 数据类型提供的许多标准方法可以使用初等三角学和几何学来执行。例如，以下代码清单展示了如何使用 `geometry`\
    \ 数据类型的 `STDistance()` 方法计算位于 `(50,100)` 的 `Point` 与位于 `(90,130)` 的 `Point` 之间的距离：\n\
    \n```sql\nDECLARE @point1 geometry = geometry::Point(50, 100, 0);\nDECLARE @point2\
    \ geometry = geometry::Point(90, 130, 0);\nSELECT @point1.STDistance(@point2);\n\
    ```\n\n结果 `50` 本可以不用 `geometry` 数据类型，仅用基本的毕达哥拉斯定理知识得出，如下面的等效 T-SQL 查询所示：\n\n```sql\n\
    DECLARE\n    @x1 int = 50, @y1 int = 100,\n    @x2 int = 90, @y2 int = 130;\n\
    SELECT\n    SQRT(\n        POWER(@x2 - @x1, 2) +\n        POWER(@y2 - @y1, 2)\n\
    \    );\n```\n\n当然，其他的 `geometry` 操作，例如查找一个 `Point` 是否位于一个 `Polygon` 内，或者两个 `Polygon`\
    \ 相交所产生的面积，比这里给出的简单例子要复杂一些，但通常仍然可以使用 T-SQL 或 SQLCLR 中的替代方法来实现。那么，为什么还要对 `geometry`\
    \ 数据类型如此关注呢？\n\n使用 `geometry` 数据类型实现此类功能的一个关键好处是，`geometry` 数据类型实现的所有方法都符合开放地理空间联盟（`OGC`）的\
    \ SQL 规范简单要素 v1.1.0。这是用于空间功能交换和实施的行业标准格式。通过使用 `geometry` 数据类型，你可以确保任何空间方法的结果将与任何其他基于相同标准的系统获得的结果相同。\n\
    \n请注意，尽管 `OGC` 符合性确保了结果的*一致性*，但 `OGC` 方法并不一定能给出可预测的结果，至少不是那种你可以仅根据方法名称就能合理猜测其行为的程度。例如，考虑图\
    \ 10-5 中所示的两个 `LineString`。\n\n*图 10-5. 两条相交但不接触的 LineString*\n\n在正常的英语中，大多数人会描述这两条\
    \ `LineString` 是*接触*，而不是*相交*。然而，根据 `OGC` 的定义，情况恰恰相反。你可以通过检查 `STTouches()` 和 `STCrosses()`\
    \ 方法的结果来自行测试这一点，如下面的代码清单所示：\n\n```sql\nDECLARE @x geometry = geometry::STLineFromText('LINESTRING(0\
    \ 0, 0 10)', 0);\nDECLARE @y geometry = geometry::STLineFromText('LINESTRING(10\
    \ 0, 0 5, 10 10)', 0);\nSELECT\n    @x.STCrosses(@y),\n    @x.STTouches(@y);\n\
    ```\n\n`STCrosses()` 方法的结果是 `1`，表明 `LineString` x 跨越了 `LineString` y。根据 `OGC`\
    \ 标准，如果两个 `LineString` 相交产生的几何体是零维的，则它们彼此相交。在此例中，两条 `LineString` 相交于单点 `(5,5)`，因此它们被视为相交。相比之下，只有当两条\
    \ `LineString` 相交的点位于 `LineString` 的边界（即端点）上时，它们才被认为是接触。在此例中，点 `(5,5)` 位于两条 `LineString`\
    \ 的内部而非边界，因此 `STTouches()` 的结果是 `0`（即假）。务必仔细检查任何方法的文档，以确保其行为完全符合你的预期！\n\n## 精度\n\
    \n世界是圆的。然而，`geometry` 数据类型在平面上操作。因此，根据定义，使用 `geometry` 数据类型执行的任何地理空间计算都会涉及一定程度的误差。这本身并非\
    \ `geometry` 数据类型的一个限制，而是使用投影坐标系来表示圆形地球模型时不可避免的畸变所导致的。\n\n一般来说，随着投影区域的增大，畸变的影响也会增大。\n"
- fmt: 'For this reason, results obtained using the `geometry` datatype will become
    less accurate than results obtained using the `geography` datatype over large
    distances.


    In global spatial applications, the `geography` datatype is a more suitable choice,
    as there are few projected systems that can be used for general global purposes
    with sufficient accuracy. For storing spatial data contained within a single country
    or smaller area, the `geometry` datatype will generally provide sufficient accuracy,
    and comes with the benefits of additional functionality over the `geography` type.


    ## Technical Limitations and Performance


    The ellipsoidal calculations used by the `geography` datatype are by their nature
    more complex than the planar calculations of the `geometry` datatype. This means
    that applications using the `geography` datatype may experience slightly slower
    performance than those based on the `geometry` datatype, although the impact is
    not normally significant. Additionally, the indexes created on columns of `geometry`
    data may specify an explicit bounding box, creating a more granular grid, which
    leads to more efficient filtering of results than a `geography` index, which is
    assumed to span the entire globe (but more on that later).


    However, there are other more important implications arising between the different
    models on which the two datatypes are based. The first of these differences is
    that currently, no `geography` instance may exceed a single hemisphere. In this
    context, the term `hemisphere` means one-half of the surface of the earth, centered
    about any point on the globe. Thus, it is not possible to have a `geography` `MultiPoint`
    instance containing one `Point` at the North Pole and one at the South Pole. Nor
    is it possible to have a `geography` `LineString` that extends from London to
    Auckland and then on to Los Angeles. In order to work around this limitation,
    you must break down large `geography` objects into several smaller objects that
    each fit within a hemisphere. In contrast, there is no limit to the size of a
    `geometry` instance, which may extend indefinitely on an infinite plane.


    The second technical difference arises from the conceptual differences of working
    on a curved surface rather than a flat plane. As defined earlier, the external
    ring of a `Polygon` defines an area of space contained within the `Polygon`, and
    may also contain one or more internal rings that define “holes”—areas of space
    cut out from the `Polygon`. This is fairly straightforward to visualize when drawing
    `Polygon`s on a flat piece of paper. However, a problem occurs when you try to
    apply this definition on a continuous round surface such as used by the `geography`
    datatype, because it becomes ambiguous as to which area of space is contained
    `inside` a `Polygon` ring, and which is `outside`.


    To demonstrate this problem, consider Figure 10-6, which illustrates a `Polygon`
    whose exterior ring is a set of points drawn around the equator. Does the area
    contained within the `Polygon` represent the Northern Hemisphere or the Southern
    Hemisphere?


    *Figure 10-6. `Polygon` ring orientation is significant for the `geography` datatype*


    The solution used by SQL Server (and in common with some other spatial systems)
    is to consider the `ring orientation` of the `Polygon`—i.e., the order in which
    the points of the ring are specified. When defining a `geography` `Polygon`, SQL
    Server treats the area on the “left” of the path drawn between the points as contained
    within the ring, whereas the points on the “right” side are excluded. Thus, the
    `Polygon` depicted in Figure 10-6 represents the Northern Hemisphere. Whenever
    you define `geography` polygons, you must ensure that you specify the correct
    ring orientation or else your polygons will be “inside-out”—excluding the area
    they were intended to contain, and including everything else. In `geometry` data
    ring orientation is not significant, as there is no ambiguity as to the area contained
    within a `Polygon` ring on a flat plane.


    ## A final technical difference


    A final technical difference concerns `invalid geometries`. In an ideal world,
    we would always want our spatial data to be “valid”—that is, it meeting all the
    OGC specifications for that type of `geometry`. However, as developers we have
    to reluctantly accept that spatial data, like any other data, is rarely as perfect
    as we would like. This means that you will frequently encounter invalid data where,
    for example, `Polygon`s do self-intersect.


    Rather perversely, perhaps, the `geometry` datatype, which conforms to OGC standards,
    is also the datatype that provides options for dealing with data that fails to
    meet those standards. For example, not only can the `geometry` datatype be used
    to store invalid geometries, but it also provides the `STIsValid()` method to
    identify whether a `geometry` is valid or not, and the `MakeValid()` method to
    attempt to “fix” invalid geometries. All `geography` data, in contrast, is assumed
    to be valid at all times. Although this means that once `geography` data is in
    SQL Server, you can work with it comfortable in the knowledge that it is always
    valid, it can provide an obstacle to importing that data in the first place. Since
    SQL Server cannot import invalid `geography` data, you may have to rely on external
    tools to validate and fix any erroneous data prior to importing it.


    ## Creating Spatial Data


    The first challenge presented to many users new to the spatial features in SQL
    Server 2008 is how to get spatial data into the database. Unfortunately, the most
    commonly used spatial format, the ESRI shapefile format (SHP), is not directly
    supported by any of the `geography` or `geometry` methods, nor by any of the file
    data sources available in SQL Server Integration Services (SSIS). What’s more,
    internally, `geography` and `geometry` data is stored using a proprietary binary
    format, which is quite complex. For readers who are interested, the structure
    is documented at `http://msdn.microsoft.com/en-us/library/ee320529.aspx`, but
    in general you do not need to worry about the specifics involved, as SQL Server
    instead provides static methods to create spatial data from three different alternative
    spatial formats: WKT, Well-Known Binary (WKB), and Geography Markup Language (GML).


    ## Well-Known Text


    WKT is a simple, text-based format defined by the OGC for the exchange of spatial
    information. Owing to its easy readability and relative conciseness, the WKT format
    is a popular way of storing and sharing spatial data, and is the format used in
    most of the examples in this chapter. It is also the format used in the spatial
    documentation in SQL Server 2008 Books Online, at `http://msdn.microsoft.com/en-us/library/ms130214.aspx`.


    The following code listing demonstrates the WKT string used to represent a `Point`
    geometry located at an x coordinate of 258647 and a y coordinate of 665289:


    ```

    POINT(258647 665289)

    ```


    Based on the National Grid of Great Britain, which is a projected coordinate system
    denoted by the `SRID` 27700, these coordinates represent the location of Glasgow,
    Scotland. Once we know the WKT string and the relevant `SRID`, we can create a
    `geometry` `Point` instance representing the city using the `STPointFromText`
    method as follows:


    ```

    DECLARE @Glasgow geometry;


    SET @Glasgow = geometry::STPointFromText(''POINT(258647 665289)'', 27700);


    GO

    ```


    In order to create more complex geometries from WKT, simply specify the individual
    coordinate pairs of each point in a comma-delimited list, as shown in the following
    example, which creates a `LineString` between two points representing Sydney Harbor
    Bridge:


    ```

    DECLARE @SydneyHarbourBridge geography;


    SET @SydneyHarbourBridge = geography::STLineFromText(

    ''LINESTRING(151.209 -33.855, 151.212 -33.850)'', 4326);


    GO

    ```'
