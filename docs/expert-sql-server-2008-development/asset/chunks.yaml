    空间参考系统是一个旨在明确识别和描述空间中任何点位置的系统。这种能力对于使空间数据能够存储用于表示地球上要素的几何体坐标至关重要。


    为了描述空间中点的位置，每个空间参考系统都基于一个底层坐标系。在数学的各个领域中使用了许多不同类型的坐标系，但在 SQL Server 2008 中定义地理空间数据时，你最有可能使用基于**地理坐标系**或**投影坐标系**的空间参考系统。


    ### 地理坐标系


    在地理坐标系中，地球表面上的任何位置都可以使用两个角度坐标来定义：


    - 一个点的**纬度**坐标测量的是赤道平面与该点处垂直于地球表面的直线之间的角度。

    - **经度**坐标测量的是赤道平面内，从地球中心到该点的直线与从地球中心到**本初子午线**的直线之间的角度。


    通常，地理坐标以度为单位进行测量。因此，纬度可以在 –90°（南极）和 +90°（北极）之间变化。经度值从 –180° 延伸到 +180°。


    图 10-2 说明了如何使用地理坐标系来识别地球表面上的一个点。


    ### 投影坐标系


    与在三维的、圆形的地球模型上定义位置的地理坐标系相反，投影坐标系在平坦的二维平面（即地球表面的**投影**）上描述地球表面上的位置。简单来说，投影坐标系描述的是地图上的位置，而不是地球仪上的位置。


    如果我们认为地球表面上的所有点都位于一个平面上，我们可以使用熟悉的**x** 和 **y** 笛卡尔坐标（有时称为东向和北向）来定义该平面上的位置，它们分别代表一个点沿
    x 轴和 y 轴距离原点的距离。


    图 10-3 说明了图 10-2 中所示的同一个点如何使用投影坐标系来定义。


    图 10-2. 使用地理坐标系描述地球上的一个位置


    图 10-3. 使用投影坐标系描述地球上的一个位置


    ### 将坐标系应用于地球


    无论是来自地理坐标系还投影坐标系的一组坐标，其本身并不能唯一地标识地球上的一个位置。我们需要知道额外的信息，例如从哪里测量这些坐标、使用什么单位，以及使用什么形状来模拟地球。因此，除了指定所使用的坐标系外，每个空间参考系统还必须包含一个**基准**、一个**本初子午线**和一个**计量单位**。


    #### 基准


    基准包含有关地球大小和形状的信息。具体来说，它包含一个**参考椭球体**和一个**参考框架**的详细信息，它们用于创建一个可以应用坐标系的地球大地模型。'
- fmt: "# 第10章 处理空间数据\n\n## 参考椭球体\n\n参考椭球体是一个三维形状，用于近似表示地球的形状。尽管被称为参考椭球体，但大多数地球模型实际上是一个扁球体——一个可以精确地用两个参数来描述的扁球体：长半轴长度（代表地球赤道处的半径）和短半轴长度（地球两极处的半径），如图10-4所示。扁球体被压扁的程度可以表示为长半轴与两轴之差的比值，这被称为**扁率的倒数**。\n\
    \n不同的参考椭球体提供了对地球形状的不同近似，没有一个单一的参考椭球体能够在全球表面提供最佳拟合。因此，在区域层面运作的空间应用倾向于使用基于能够为所讨论区域提供最佳地球表面近似的参考椭球体的空间参考系统。例如，在英国，使用的是`Airy\
    \ 1830`椭球体，其长半轴为6,377,563米，短半轴为6,356,257米。在北美，最常用的是`NAD83`椭球体，其长半轴为6,378,137米，短半轴为6,356,752米。\n\
    \n参考框架定义了一组在现实世界中具有已知坐标的地点，这些坐标是相对于参考椭球体分配的。通过建立一组具有已知坐标的点，这些点可以用来正确地将坐标系与参考椭球体对齐，从而可以确定其他未知点的坐标。参考点通常是地球表面本身的位置，但也可以分配给围绕地球静止轨道运行的卫星的位置，全球定位系统使用的`WGS84`基准就是这样实现的。\n\
    \n## 本初子午线\n\n如前所述，地理坐标中的经度是从地球中心到某一点的连线与从地球中心到本初子午线的连线之间在赤道平面上的角度。因此，任何空间参考系统都必须声明其本初子午线——经度测量所依据的轴线。\n\
    \n一个常见的误解是认为存在一条基于地球某种内在基本属性的单一本初子午线。实际上，任何空间参考系统的本初子午线都是任意选择的，只是为了提供一条零度经线，所有其他经度坐标都可以从这条线开始测量。一个常用的本初子午线经过伦敦格林威治，但还有很多其他的选择。如果选择不同的本初子午线，给定空间参考系统中每个经度坐标的值都会改变。\n\
    \n*图10-4. 参考椭球体的属性*\n\n## 投影\n\n投影坐标参考系统允许你在二维平面上描述地球上的位置，这个平面是投影的结果。创建这种地图投影的方法有很多，每种方法都会产生世界的不同图像。一些常见的地图投影包括墨卡托投影、邦尼投影和等距圆柱投影，但还有更多。\n\
    \n必须认识到，为了在平面上表示地球的三维模型，*每*种地图投影都会以某种方式扭曲地球的特征。有些投影试图保持特征的相对面积，但这样做会扭曲它们的形状。其他投影保留了赤道附近特征的属性，但会严重扭曲两极附近的特征。\n\
    \n一些折衷投影试图平衡失真，以创建一张没有任何一方面失真过于显著的地图。地图上描绘的特征失真程度通常与投影区域的范围有关。因此，投影空间参考系统在仅应用于单个国家或更小区域时效果最佳，而不是用于完整的全球视图。\n\
    \n由于投影方法会影响结果地图图像上的特征，来自投影坐标系的坐标仅对给定的投影有效。\n\n## 空间参考标识符\n\n全球使用最广泛的空间参考系统是基于`WGS84`基准的地理坐标系统，其参考椭球体半径为6,378,137米，扁率的倒数为`298.257223563`。坐标以度为单位进行测量，基于格林威治本初子午线。该系统被手持GPS设备以及许多消费级地图产品（包括谷歌地球和必应地图API）所使用。\n\
    \n使用行业标准的Well-Known Text格式，这个空间参考系统的属性可以表示如下：\n\n```\nGEOGCS[\n  \"WGS 84\",\n\
    \  DATUM[\n    \"World Geodetic System 1984\",\n    ELLIPSOID[\n      \"WGS 84\"\
    ,\n      6378137,\n      298.257223563\n    ]\n  ],\n  PRIMEM[\"Greenwich\", 0],\n\
    \  UNIT[\"Degree\", 0.0174532925199433]\n]\n```\n\n回到本章开头的例子，使用这个空间参考系统，我们可以将美国五角大楼每个角落的近似位置描述为一对经纬度坐标如下：\n\
    \n`38.870, -77.058`\n`38.869, -77.055`\n`38.871, -77.053`\n`38.873, -77.055`\n\
    `38.872, -77.058`\n\n请注意，由于我们描述的点位于本初子午线以西，因此在每种情况下经度坐标都是负数。\n\n现在让我们考虑另一个空间参考系统——通用横轴墨卡托18N带系统，这是北美部分地区使用的一个投影坐标系。这个空间参考系统基于1983年北美基准，其参考椭球体为6,378,137米，扁率的倒数为`298.257222101`。这个大地测量模型使用横轴墨卡托投影，以西经75°经线为中心，基于投影图像的坐标以米为单位进行测量。这个系统的完整属性在WKT格式中表示如下：\n\
    \n```\nPROJCS[\n  \"NAD_1983_UTM_Zone_18N\",\n  GEOGCS[\n    \"GCS_North_American_1983\"\
    ,\n    DATUM[\n      \"D_North_American_1983\",\n      SPHEROID[\n        \"GRS_1980\"\
    ,\n        6378137,\n        298.257222101\n      ]\n    ],\n    PRIMEM[\"Greenwich\"\
    ,0],\n    UNIT[\"Degree\", 0.0174532925199433]\n  ],\n  PROJECTION[\"Transverse_Mercator\"\
    ],\n  PARAMETER[\"False_Easting\", 500000.0],\n  PARAMETER[\"False_Northing\"\
    , 0.0],\n  PARAMETER[\"Central_Meridian\", -75.0],\n  PARAMETER[\"Scale_Factor\"\
    , 0.9996],\n  PARAMETER[\"Latitude_of_Origin\", 0.0],\n  UNIT[\"Meter\", 1.0]\n\
    ]\n```\n\n使用这个空间参考系统，五角大楼的相同五个点可以用以下坐标描述：\n\n`321460, 4304363`\n`321718, 4304246`\n\
    `321896, 4304464`\n`321728, 4304690`\n`321465, 4304585`\n\n比较这些结果清楚地表明，任何坐标对只有在说明了从中获得它们的坐标系的详细信息时，才能描述地球上的唯一位置。然而，如果我们每次想引用一对坐标时都必须写出基准、本初子午线、测量单位和投影细节的完整信息，那将相当麻烦。幸运的是，有一套既定的**空间参考标识符**为每个空间参考系统提供一个唯一的整数代码。前面例子中使用的两个空间参考系统分别由`SRID\
    \ 4326`和`SRID 26918`表示。"
  raw: 'The reference ellipsoid is a three-dimensional shape that is used as an approximation
    of the shape of the earth. Although described as a reference *ellipsoid*, most
    models of the earth are actually an oblate spheroid—a squashed sphere that can
    be exactly mathematically described by two parameters—the length of the semimajor
    axis (which represents the radius of the earth at the equator) and the length
    of the semiminor axis (the radius of the earth at the poles), as shown in Figure
    10-4\. The degree by which the spheroid is squashed may be stated as a ratio of
    the semimajor axis to the difference between the two axes, which is known as the
    **inverse-flattening ratio**.


    Different reference ellipsoids provide different approximations of the shape of
    the earth, and there is no single reference ellipsoid that provides a best fit
    across the whole surface of the globe. For this reason, spatial applications that
    operate at a regional level tend to use a spatial reference system based on whatever
    reference ellipsoid provides the best approximation of the earth’s surface for
    the area in question. In Britain, for example, this is the Airy 1830 ellipsoid,
    which has a semimajor axis of 6,377,563m and a semiminor axis of 6,356,257m. In
    North America, the NAD83 ellipsoid is most commonly used, which has a semimajor
    axis of 6,378,137m and a semiminor axis of 6,356,752m.


    The reference frame defines a set of locations in the real world that are assigned
    known coordinates relative to the reference ellipsoid. By establishing a set of
    points with known coordinates, these points can then be used to correctly line
    up the coordinate system with the reference ellipsoid so that the coordinates
    of other, unknown points can be determined. Reference points are normally places
    on the earth’s surface itself, but they can also be assigned to the positions
    of satellites in stationary orbit around the earth, which is how the WGS84 datum
    used by global positioning system (GPS) units is realized.


    Prime Meridian


    As defined earlier, the geographic coordinate of longitude is the angle in the
    equatorial plane between the line drawn from the center of the earth to a point
    and the line drawn from the center of the earth to the prime meridian. Therefore,
    any spatial reference system must state its prime meridian—the axis from which
    the angle of longitude is measured.


    It is a common misconception to believe that there is a single prime meridian
    based on some


    inherent fundamental property of the earth. In fact, the prime meridian of any
    spatial reference system is arbitrarily chosen simply to provide a line of zero
    longitude from which all other coordinates of longitude can be measured. One commonly
    used prime meridian passes through Greenwich, London, but there are many others.
    If you were to choose a different prime meridian, the value of every longitude
    coordinate in a given spatial reference system would change.


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    *Figure 10-4\. Properties of a reference ellipsoid*


    Projection


    A projected coordinate reference system allows you to describe positions on the
    earth on a flat, two-dimensional image of the world, created as a result of projection.
    There are many ways of creating such map projections, and each one results in
    a different image of the world. Some common map projections include Mercator,
    Bonne, and equirectangular projections, but there are many more.


    It is very important to realize that, in order to represent a three-dimensional
    model of the earth on a flat plane, *every* map projection distorts the features
    of the earth in some way. Some projections attempt to preserve the relative area
    of features, but in doing so distort their shape. Other projections preserve the
    properties of features that are close to the equator, but grossly distort features
    toward the poles.


    Some compromise projections attempt to balance distortion in order to create a
    map in which no one 289


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    aspect is distorted too significantly. The magnitude of distortion of features
    portrayed on the map is normally related to the extent of the area projected.
    For this reason, projected spatial reference systems tend to work best when only
    applied to a single country or smaller area, rather than a full world view.


    Since the method of projection affects the features on the resulting map image,
    coordinates from a projected coordinate system are only valid for a given projection.


    Spatial Reference Identifiers


    The most common spatial reference system in global usage uses a geographic coordinate
    based on the WGS84 datum, which has a reference ellipsoid of radius 6,378,137m
    and an inverse-flattening ratio of 298.257223563\. Coordinates are measured in
    degrees, based on a prime meridian of Greenwich. This system is used by handheld
    GPS devices, as well as many consumer mapping products, including Google Earth
    and Bing Maps APIs.


    Using the Well-Known Text (WKT) format, which is the industry standard for such
    information (and the system SQL Server uses in the well_known_text column of the
    sys.spatial_references table), the properties of this spatial reference system
    can be expressed as follows:


    GEOGCS[


    "WGS 84",


    DATUM[


    "World Geodetic System 1984",


    ELLIPSOID[


    "WGS 84",


    6378137,


    298.257223563


    ]


    ],


    PRIMEM["Greenwich", 0],


    UNIT["Degree", 0.0174532925199433]


    ]


    Returning to the example at the beginning of this chapter, using this spatial
    reference system, we can describe the approximate location of each corner of the
    US Pentagon building as a pair of latitude and longitude coordinates as follows:


    38.870, -77.058


    38.869, -77.055


    38.871, -77.053


    38.873, -77.055


    38.872, -77.058


    Note that, since we are describing points that lie to the west of the prime meridian,
    the longitude coordinate in each case is negative.


    Now let’s consider another spatial reference system—the Universal Transverse Mercator
    (UTM)


    Zone 18N system, which is a projected coordinate system used in parts of North
    America. This spatial reference system is based on the 1983 North American datum,
    which has a reference ellipsoid of 6,378,137m and an inverse-flattening ratio
    of 298.257222101\. This geodetic model is projected using a transverse Mercator
    projection, centered on the meridian of longitude 75°W, and coordinates based
    on the projected image are measured in meters. The full properties of this system
    are expressed in WKT


    format as follows:


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    PROJCS[


    "NAD_1983_UTM_Zone_18N",


    GEOGCS[


    "GCS_North_American_1983",


    DATUM[


    "D_North_American_1983",


    SPHEROID[


    "GRS_1980",


    6378137,


    298.257222101


    ]


    ],


    PRIMEM["Greenwich",0],


    UNIT["Degree", 0.0174532925199433]


    ],


    PROJECTION["Transverse_Mercator"],


    PARAMETER["False_Easting", 500000.0],


    PARAMETER["False_Northing", 0.0],


    PARAMETER["Central_Meridian", -75.0],


    PARAMETER["Scale_Factor", 0.9996],


    PARAMETER["Latitude_of_Origin", 0.0],


    UNIT["Meter", 1.0]


    ]


    Using this spatial reference system, the same five points of the Pentagon building
    can instead be described using the following coordinates:


    321460, 4304363


    321718, 4304246


    321896, 4304464


    321728, 4304690


    321465, 4304585


    Comparing these results clearly demonstrates that any coordinate pair only describes
    a unique location on the earth when stated with the details of the coordinate
    system from which they were obtained. However, it would be quite cumbersome if
    we had to write out the full details of the datum, prime meridian, unit of measurement,
    and projection details every time we wanted to quote a pair of coordinates. Fortunately,
    there is an established set of **spatial reference identifiers** (SRIDs) that
    provide a unique integer code associated with each spatial reference system. The
    two spatial reference systems used in the preceding examples are represented by
    SRID 4326 and SRID 26918, respectively.'
