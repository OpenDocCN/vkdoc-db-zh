    „ **Caution** Adding a clustered index to the nonkey ManagerId column might result
    in the best performance for queries designed solely to determine those employees
    that report to a given manager, but it is not necessarily the best design for
    a general purpose employees table.


    Once this change has been made, rerunning the T-SQL to find the CEO’s direct reports
    produces a clustered index seek instead of a scan—a small improvement that will
    be magnified when performing queries against a table with a greater number of
    rows.


    Traversing down the Hierarchy


    Shifting from finding direct descendants of one node to traversing down the entire
    hierarchy all the way to the leaf nodes is extremely simple, just as in the case
    of general graphs. A recursive CTE is one tool that can be used for this purpose.
    The following CTE, modified from the section on graphs, traverses the Employee_Temp
    hierarchy starting from the CEO, returning all employees in the company:


    WITH n AS


    (


    SELECT


    EmployeeID,


    ManagerID,


    Title


    FROM Employee_Temp


    WHERE ManagerID IS NULL


    UNION ALL


    SELECT


    e.EmployeeID,


    e.ManagerID,


    e.Title


    FROM Employee_Temp e


    JOIN n ON n.EmployeeID = e.ManagerID


    )


    SELECT


    n.EmployeeID,


    n.ManagerID,


    n.Title


    FROM n;


    GO


    Note that this CTE returns all columns to be used by the outer query—but this
    is not the only way to write this query. The query could also be written such
    that the CTE uses and returns only the EmployeeID


    column, necessitating an additional JOIN in the outer query to get the other columns:


    WITH n AS


    (


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    SELECT


    EmployeeID


    FROM Employee_Temp


    WHERE ManagerID IS NULL


    UNION ALL


    SELECT


    e.EmployeeID


    FROM Employee_Temp e


    JOIN n ON n.EmployeeID = e.ManagerID


    )


    SELECT


    e.EmployeeID,


    e.ManagerID,


    e.Title


    FROM n


    JOIN Employee_Temp e ON e.EmployeeID = n.EmployeeID;


    GO


    I thought that this latter form might result in less I/O activity, but after testing
    several combinations of indexes against both query forms, using this table as
    well as tables with many more columns, I decided that there is no straightforward
    answer. The latter query tends to perform better as the output row size increases,
    but in the case of the small test table, the former query is much more efficient.
    Again, this is something you should test against your actual workload before deploying
    a solution.


    Ordering the Output


    Regardless of the performance of the two queries listed in the previous section,
    the fact is that we haven’t really done much yet. The output of either of these
    queries as they currently stand is logically equivalent to the output of SELECT
    * FROM Employee_Temp. In order to add value, the output should be sorted such
    that it conforms to the hierarchy represented in the table. To do this, we can
    use the same path technique described in the section “Traversing the Graph,” but
    without the need to be concerned with cycles. By ordering by the path, the output
    will follow the same nested order as the hierarchy itself. The following T-SQL
    shows how to accomplish this:


    WITH n AS


    (


    SELECT


    EmployeeID,


    ManagerID,


    Title,


    CONVERT(varchar(900),


    RIGHT(REPLICATE(''0'', 10) + CONVERT(varchar, EmployeeID), 10) + ''/''


    ) AS thePath


    FROM Employee_Temp


