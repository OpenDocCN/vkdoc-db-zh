- fmt: "# Ownership Chaining and Privilege Escalation\n\nIf either of those conditions\
    \ were not true, the ownership chain would break, and Hugo would have to be authorized\
    \ another way to select from the table. The ownership chain would also fail if\
    \ the execution context changed within the stored procedure. For example, ownership\
    \ chaining will not work with dynamic SQL (for more information on dynamic SQL,\
    \ refer to Chapter 8).\n\n## Cross-Database Ownership Chaining\n\nIn the case\
    \ of a stored procedure in one database requesting access to an object in another\
    \ database, it is possible to maintain an ownership chain, but it gets quite a\
    \ bit more complex, and security is much more difficult to maintain. To set up\
    \ `cross-database ownership chaining`, the user that owns the stored procedure\
    \ and the referenced table(s) must be associated with a server-level login, and\
    \ each database must have the `DB_CHAINING` property set using the `ALTER DATABASE`\
    \ command. That property tells SQL Server that either database can participate\
    \ in a cross-database ownership chain, either as source or target—but there is\
    \ no way to control the direction of the chain, so setting the option could open\
    \ up security holes inadvertently.\n\nI recommend that you avoid `cross-database\
    \ ownership chaining` whenever possible, and instead call stored procedures in\
    \ the remote database. Doing so will result in a more secure, more flexible solution.\
    \ For example, moving databases to separate servers is much easier if they do\
    \ not depend on one another for authentication. In addition, by using schemas\
    \ appropriately, splitting objects into multiple databases is no longer as important\
    \ as it once was. Consider avoiding multiple databases altogether, if at all possible.\n\
    \n## Privilege Escalation Without Ownership Chains\n\nOwnership chaining will\
    \ not work if the object owner does not match the module owner, or if dynamic\
    \ SQL is used. In these cases, you’ll have to use one of the two other kinds of\
    \ privilege escalation provided by SQL Server: an extension to stored procedures\
    \ using the `EXECUTE AS` clause, or module signing using certificates.\n\nUsing\
    \ the `EXECUTE AS` clause with stored procedures is an easy and effective method\
    \ of escalating permissions, but is not nearly as flexible as that which can be\
    \ achieved using certificates. With certificates, permissions are additive rather\
    \ than impersonated—the additional permissions provided by the certificate extend\
    \ rather than replace the permissions of the calling principal. In the following\
    \ sections, I’ll discuss these alternative methods of privilege escalation in\
    \ more detail.\n\n### Stored Procedures and EXECUTE AS\n\nAs described in a previous\
    \ section in this chapter, the `EXECUTE AS` command can be used on its own in\
    \ T-SQL batches in order to temporarily impersonate other users. However, `EXECUTE\
    \ AS` is also available for stored procedures, functions, and triggers. The examples\
    \ in this section only focus on stored procedures, but the same principles can\
    \ also be applied to the other object types.\n\nTo use `EXECUTE AS` to change\
    \ the impersonation context of an entire stored procedure, add it to the `CREATE\
    \ PROCEDURE` statement as in the following example:\n\n```\nCREATE PROCEDURE SelectSensitiveDataByImpersonation\n\
    WITH EXECUTE AS 'Louis'\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT *\n    FROM\
    \ dbo.SensitiveData;\nEND;\nGO\n```\n\nWhen this stored procedure is executed\
    \ by a user, all operations within the procedure will be evaluated as if they\
    \ are being run by the `Louis` user rather than by the calling user (as is the\
    \ default behavior). This includes any dynamic SQL operations, or manipulation\
    \ of data in tables that the `Louis` user has access to. When the stored procedure\
    \ has completed execution, context will be automatically reverted back to that\
    \ of the caller.\n\nKeep in mind that use of `EXECUTE AS` does not break ownership\
    \ chains, but rather can be used to add to them and create additional flexibility.\
    \ For instance, consider the following two users and associated tables:\n\n```\n\
    CREATE USER Kevin WITHOUT LOGIN;\nGO\nCREATE TABLE KevinsData ( SomeData int );\n\
    GO\n```"
