  trans: '

    # 数据库编程最佳实践


    在许多情况下，防御性编程能够提升用户体验。通过主动预见并为异常情况做好准备，错误可以在其发生*之前*就被捕获，而无需事后处理。异常情况可以被隔离并处理，从而对用户体验产生最小的负面影响，避免引发整个系统故障。即使遇到极端的意外状况，系统仍然可以**优雅降级**，并按照既定文档描述的行为运作。


    然而，如同任何思想流派一样，防御性编程也有其反对者。以下列举了对防御性编码常见的一些批评。针对每一点，我都尝试给出合理的回应。


    ## *防御性编码开发耗时更长*


    相较于遵循其他软件实践开发的应用程序，遵循防御性方法论确实可能导致前期开发时间更长。防御性编程非常强调初始的需求收集和架构设计阶段，这些阶段可能比某些方法学更长、更复杂。编码本身也需要更长时间，因为可能需要添加额外的代码路径来处理检查并断言假设。


    代码必须经过既具挑战性又彻底的广泛审查，然后还必须经过严格的测试。所有这些因素都导致防御性软件的总体开发和发布周期比其他方法更长。


    防御性编程与所谓的`敏捷`开发实践之间存在尤为鲜明的对比，后者专注于在非常快速的开发和发布周期上发布频繁的迭代变更。然而，这并不一定意味着，在考虑应用程序的整个生命周期时，防御性编码的开发时间更长。在开发初期投入的额外细致和谨慎，通常会在项目的生命周期中得到回报，因为项目一旦上线，对代码修复部署的需求就会减少。


    ## *编写能够预见和处理所有可能场景的代码会使防御性应用程序变得臃肿。*


    `代码膨胀`意味着应用程序包含了不必要的、低效的或浪费的代码。防御性代码防范的是*不太可能*发生但绝非不可能发生的事件。提前采取行动明确测试和处理异常情况，可以节省未来可能花费的大量追踪和调试时间。防御性应用程序可能包含比其他应用程序更多的总代码行数，但所有这些代码都应设计良好、目的明确。请注意，“防御性编程”这个标签有时会被误用：不加考虑或论证地在任何机会下添加不必要的检查，这*并非*防御性编程。这样的行为会导致代码既复杂又僵化。请记住，真正的防御性编程提倡简洁性、模块化和代码重用，这实际上有助于减少代码膨胀。


    ## *防御性编程隐藏了错误，导致它们得不到修复，而不是使其可见。*


    这或许是对防御性实践最常见的误解，源于未能理解防御性应用程序中对待错误的基本态度。通过明确识别和检查异常场景，防御性编程实际上采取了一种非常主动的方式来识别错误。然而，当遇到可能导致异常情况的条件时，防御性应用程序被设计为优雅地失效——也就是说，在开发阶段，识别出可能导致异常的潜在场景，并创建相应的代码路径。


    25


    # 数据库编程最佳实践

    '
- fmt: "# 数据库编程中的防御性编程实践\n\n## 示例：创建与修改存储过程\n\n考虑以下存储过程 `Divide` 的代码清单，它描述了一个简单的用于将一个数字除以另一个数字的存储过程：\n\
    \n```sql\nCREATE PROCEDURE Divide (\n    @x decimal(18,2),\n    @y decimal(18,2)\n\
    )\nAS BEGIN\n    SELECT @x / @y\nEND;\nGO\n```\n\n根据上面的代码，如果例如 `@y` 的值为 `0`，就很容易引发异常。如果只是想阻止错误消息出现，可以在\
    \ `catch` 块中捕获（或“吞掉”）该异常，如下所示：\n\n```sql\nALTER PROCEDURE Divide (\n    @x decimal(18,2),\n\
    \    @y decimal(18,2)\n)\nAS BEGIN\n    BEGIN TRY\n        SELECT @x / @y\n  \
    \  END TRY\n    BEGIN CATCH\n        /* Do Nothing */\n    END CATCH\nend;\nGO\n\
    ```\n\n然而，重要的是要意识到前面的代码清单并非防御性的——它没有做任何事情来防止异常情况的发生，其唯一效果是允许系统继续运行，假装什么坏事都没发生。像这样的**异常隐藏**非常危险，并且几乎无法确保应用程序的正确运行。防御性的方法应该是，在尝试执行除法之前，显式检查该操作成功所需的所有条件是否满足。这意味着要断言诸如确保为\
    \ `@x` 和 `@y` 提供了值（即它们不是 `NULL`）、`@y` 不等于零、所提供的值位于 `decimal(18,2)` 数据类型可以存储的范围内等等。\n\
    \n以下代码清单为同一过程提供了一种简化的防御性方法：\n\n```sql\nALTER PROCEDURE Divide (\n    @x decimal(18,2),\n\
    \    @y decimal(18,2)\n)\nAS BEGIN\n    IF @x IS NULL OR @y IS NULL\n    BEGIN\n\
    \        PRINT 'Please supply values for @x and @y';\n        RETURN;\n    END\n\
    \n    IF @y = 0\n    BEGIN\n        PRINT '@y cannot be equal to 0';\n       \
    \ RETURN;\n    END\n\n    BEGIN TRY\n        SELECT @x / @y\n    END TRY\n   \
    \ BEGIN CATCH\n        PRINT 'An unhandled exception occurred';\n    END CATCH\n\
    END;\nGO\n```\n\n对于前面的示例，每个断言都附带一条简单的 `PRINT` 语句，以通知过程执行所需的哪些条件失败了。在现实生活中，这些代码路径可能以多种方式处理此类断言——通常是记录错误、向用户报告消息，并在可能的情况下尝试继续系统操作。通过这样做，它们防止了与未预期异常相关的不可预测行为。\n\
    \n防御性编程可以与 **`fail fast`** 方法论形成对比，后者侧重于通过在异常发生时导致应用程序停止来立即识别遇到的任何错误。防御性方法并不主张敲响警钟和闪烁灯光，但这并不意味着它隐藏错误——它只是以更优雅的方式向最终用户报告错误，并在可能的情况下继续系统核心部分的运行。\n\
    \n## 为什么对数据库开发使用防御性方法？\n\n如前所述，防御性编程并非唯一可应用于数据库开发的软件开发方法论。其他常见方法包括 TDD、XP 和 fail-fast\
    \ 开发。那么，为什么我选择在本章乃至本书中专注于防御性编程呢？我相信防御性编程最适合数据库开发，原因如下：\n\n**数据库应用程序的预期寿命往往比其他软件应用程序更长。**\
    \ 虽然认为数据库专业人员是软件开发领域中谨慎、一丝不苟的人可能是一个被过度使用的刻板印象，但事实是数据库开发往往比其他技术更缓慢、更谨慎。例如，Web 应用程序可能会为了利用当时流行的技术而每年修订和重新发布。相比之下，数据库开发往往是缓慢而稳定的，数据库应用程序可能保持多年有效而无需从技术角度更新。因此，更容易证明与防御性编程相关的更高前期开发成本是合理的。可靠性和抗缺陷的好处通常将享受更长的时间。\n\
    \n**用户（和管理层）对数据库应用程序中的缺陷容忍度更低。** 大多数最终用户已经习惯甚至预期桌面和 Web 软件中的缺陷。虽然这无疑会造成挫折感，但许多人习惯于在\
    \ Web 浏览器挂起或某些应用程序无法正常关闭时，通过按下 `ctrl+Alt+Delete` 来重置机器。然而，对个人桌面软件表现出的同样的容忍度通常不会扩展到企业数据库应用程序。最近一些广为人知的丑闻，其中几个政府和大型组织的系统中的缺陷被利用，进一步加剧了公众对任何可能对数据库完整性构成风险的事情的极端敏感性。\n\
    \n**数据库应用程序中存在的任何缺陷都可能比其他软件产生更严重的后果。** 可以说，人们更担心数据库缺陷而不是其他软件缺陷是绝对正确的。桌面应用程序中的意外错误可能导致文档或文件损坏，这很麻烦并可能导致不必要的返工。但数据库中的意外错误可能导致重要的个人、机密或敏感数据面临风险，这可能带来相当严重的后果。通常存储在数据库中的数据的性质要求采用一种谨慎、彻底的开发方法，例如防御性编程所提供的方法。\n\
    \n## 为长寿命而设计\n\n消费软件应用程序的预期保质期越来越短，压缩的发布周期使得一个版本刚刚上市，前一个版本几乎就要过时。然而，情况并非必须如此。设计良好、经过防御性编程的应用程序可以持续运行多年。在我工作过的一个组织中，创建了一个战术性的短期管理信息数据存储，以便在组织系统因合并而进行整合期间，基本的业务报告功能可以继续。尽管只需要在合并后的立即期间使用，但这个（不幸命名为）短期管理信息数据库继续被使用长达十年之久，因为它比后来尝试的替代品更可靠、更健壮。\n\
    \n这是一个教训：在为数据库选择描述性名称时，要选择不会随时间推移而过时的名称！\n\n## 最佳实践 SQL 编程技术\n\n了解了不同软件方法论背后的一些理论，特别是防御性编程方法后，您现在可能想知道如何将其付诸实践。与任何方法论一样，防御性编程更关注您在开发时应具备的思维方式，而不是规定一套明确的规则来遵循。因此，本节仅提供说明所涉及整体概念的示例，不应被视为详尽无遗的列表。我会尽量让每个案例中的实际示例尽可能简单，以便您可以集中精力理解我为什么认为这些是最佳实践，而不是代码本身。\n\
    \n### 识别代码中的隐藏假设"
  raw: 'to handle them. To demonstrate this in practical terms, consider the following
    code listing, which describes a simple stored procedure to divide one number by
    another:


    CREATE PROCEDURE Divide (


    @x decimal(18,2),


    @y decimal(18,2)


    )


    AS BEGIN


    SELECT @x / @y


    END;


    GO


    Based on the code as written previously, it would be very easy to cause an exception
    using this procedure if, for example, the supplied value of @y was 0\. If you
    were simply trying to prevent the error message from occurring, it would be possible
    to consume (or “swallow”) the exception in a catch block, as follows:


    ALTER PROCEDURE Divide (


    @x decimal(18,2),


    @y decimal(18,2)


    )


    AS BEGIN


    BEGIN TRY


    SELECT @x / @y


    END TRY


    BEGIN CATCH


    /* Do Nothing */


    END CATCH


    END;


    GO


    However, it is important to realize that the preceding code listing is *not* defensive—it
    does nothing to prevent the exceptional circumstance from occurring, and its only
    effect is to allow the system to continue operating, pretending that nothing bad
    has happened. **Exception hiding** such as this can be very dangerous, and makes
    it almost impossible to ensure the correct functioning of an application. The
    defensive approach would be, before attempting to perform the division, to explicitly
    check that all the requirements for that operation to be successful are met. This
    means asserting such things as making sure that values for @x and @y are supplied
    (i.e., they are not NULL), that @y is not equal to zero, that the supplied values
    lie within the range that can be stored within the decimal(18,2) datatype, and
    so on.


    The following code listing provides a simplified defensive approach to this same
    procedure:


    ALTER PROCEDURE Divide (


    @x decimal(18,2),


    @y decimal(18,2)


    )


    AS BEGIN


    IF @x IS NULL OR @y IS NULL


    BEGIN


    PRINT ''Please supply values for @x and @y'';


    RETURN;


    END


    CHAPTER


    „ BEST PRACTICES FOR DATABASE PROGRAMMING


    IF @y = 0


    BEGIN


    PRINT ''@y cannot be equal to 0'';


    RETURN;


    END


    BEGIN TRY


    SELECT @x / @y


    END TRY


    BEGIN CATCH


    PRINT ''An unhandled exception occurred'';


    END CATCH


    END;


    GO


    For the purposes of the preceding example, each assertion was accompanied by a
    simple PRINT


    statement to advise which of the conditions necessary for the procedure to execute
    failed. In real life, these code paths may handle such assertions in a number
    of ways—typically logging the error, reporting a message to the user, and attempting
    to continue system operation if it is possible to do so. In doing so, they prevent
    the kind of unpredictable behavior associated with an exception that has not been
    expected.


    Defensive programming can be contrasted to the **fail fast** methodology, which
    focuses on immediate recognition of any errors encountered by causing the application
    to halt whenever an exception occurs. Just because the defensive approach doesn’t
    espouse ringing alarm bells and flashing lights doesn’t mean that it hides errors—it
    just reports them more elegantly to the end user and, if possible, continues operation
    of the core part of the system.


    Why Use a Defensive Approach to Database Development?


    As stated previously, defensive programming is not the only software development
    methodology that can be applied to database development. Other common approaches
    include TDD, XP, and fail-fast development. So why have I chosen to focus on just
    defensive programming in this chapter, and throughout this book in general? I
    believe that defensive programming is the most appropriate approach for database
    development for the following reasons:


    **Database applications tend to have a longer expected lifespan than other**


    **software applications**. Although it may be an overused stereotype to suggest
    that


    database professionals are the sensible, fastidious people of the software


    development world, the fact is that database development tends to be more slow-


    moving and cautious than other technologies. Web applications, for example, may


    be revised and relaunched on a nearly annual basis, in order to take advantage
    of


    whatever technology is current at the time. In contrast, database development


    tends to be slow and steady, and a database application may remain current for


    many years without any need for updating from a technological point of view. As
    a


    result, it is easier to justify the greater up-front development cost associated
    with


    defensive programming. The benefits of reliability and bug resistance will typically


    be enjoyed for a longer period.


    **Users (and management) are less tolerant of bugs in database applications**.
    Most


    end users have come to tolerate and even expect bugs in desktop and web


    software. While undoubtedly a cause of frustration, many people are routinely
    in


    CHAPTER 2 „ BEST PRACTICES FOR DATABASE PROGRAMMING


    the habit of hitting Ctrl+Alt+Delete to reset their machine when a web browser


    hangs, or because some application fails to shut down correctly. However, the


    same tolerance that is shown to personal desktop software is not typically extended


    to corporate database applications. Recent highly publicized scandals in which


    bugs have been exploited in the systems of several governments and large


    organizations have further heightened the general public’s ultrasensitivity toward


    anything that might present a risk to database integrity.


    **Any bugs that do exist in database applications can have more severe**


    **consequences than in other software**. It can be argued that people are absolutely


    right to be more worried about database bugs than bugs in other software. An


    unexpected error in a desktop application may lead to a document or file becoming


    corrupt, which is a nuisance and might lead to unnecessary rework. But an


    unexpected error in a database may lead to important personal, confidential, or


    sensitive data being placed at risk, which can have rather more serious


    consequences. The nature of data typically stored in a database warrants a


    cautious, thorough approach to development, such as defensive programming


    provides.


    **Designing for Longevity**


    Consumer software applications have an increasingly short expected shelf life,
    with compressed release cycles pushing out one release barely before the predecessor
    has hit the shelves. However, this does not have to be the case. Well-designed,
    defensively programmed applications can continue to operate for many years. In
    one organization I worked for, a short-term tactical management information data
    store was created so that essential business reporting functions could continue
    while the organization’s systems went through an integration following a merger.
    Despite only being required for an immediate post-merger period, the (rather unfortunately
    named) Short Term Management Information database continued to be used for up
    to ten years later, as it remained more reliable and robust than subsequent attempted
    replacements.


    And let that be a lesson in choosing descriptive names for your databases that
    won’t age with time!


    Best Practice SQL Programming Techniques


    Having looked at some of the theory behind different software methodologies, and
    in particular the defensive approach to programming, you’re now probably wondering
    about how to put this into


    practice. As in any methodology, defensive programming is more concerned with
    the mindset with which you should approach development than prescribing a definitive
    set of rules to follow. As a result, this section will only provide examples that
    illustrate the overall concepts involved, and should not be treated as an exhaustive
    list. I’ll try to keep the actual examples as simple as possible in every case,
    so that you can concentrate on the reasons I consider these to be best practices,
    rather than the code itself.


    CHAPTER


    „ BEST PRACTICES FOR DATABASE PROGRAMMING


    Identify Hidden Assumptions in Your Code'
  trans: "\n# 数据库编程中的防御性编程实践\n\n## 示例：创建与修改存储过程\n\n考虑以下存储过程 `Divide` 的代码清单，它描述了一个简单的用于将一个数字除以另一个数字的存储过程：\n\
    \n```sql\nCREATE PROCEDURE Divide (\n    @x decimal(18,2),\n    @y decimal(18,2)\n\
    )\nAS BEGIN\n    SELECT @x / @y\nEND;\nGO\n```\n\n根据上面的代码，如果例如 `@y` 的值为 `0`，就很容易引发异常。如果只是想阻止错误消息出现，可以在\
    \ `catch` 块中捕获（或“吞掉”）该异常，如下所示：\n\n```sql\nALTER PROCEDURE Divide (\n    @x decimal(18,2),\n\
    \    @y decimal(18,2)\n)\nAS BEGIN\n    BEGIN TRY\n        SELECT @x / @y\n  \
    \  END TRY\n    BEGIN CATCH\n        /* Do Nothing */\n    END CATCH\nend;\nGO\n\
    ```\n\n然而，重要的是要意识到前面的代码清单并非防御性的——它没有做任何事情来防止异常情况的发生，其唯一效果是允许系统继续运行，假装什么坏事都没发生。像这样的**异常隐藏**非常危险，并且几乎无法确保应用程序的正确运行。防御性的方法应该是，在尝试执行除法之前，显式检查该操作成功所需的所有条件是否满足。这意味着要断言诸如确保为\
    \ `@x` 和 `@y` 提供了值（即它们不是 `NULL`）、`@y` 不等于零、所提供的值位于 `decimal(18,2)` 数据类型可以存储的范围内等等。\n\
    \n以下代码清单为同一过程提供了一种简化的防御性方法：\n\n```sql\nALTER PROCEDURE Divide (\n    @x decimal(18,2),\n\
    \    @y decimal(18,2)\n)\nAS BEGIN\n    IF @x IS NULL OR @y IS NULL\n    BEGIN\n\
    \        PRINT '请为 @x 和 @y 提供值';\n        RETURN;\n    END\n\n    IF @y = 0\n\
    \    BEGIN\n        PRINT '@y 不能等于 0';\n        RETURN;\n    END\n\n    BEGIN\
    \ TRY\n        SELECT @x / @y\n    END TRY\n    BEGIN CATCH\n        PRINT '发生了一个未处理的异常';\n\
    \    END CATCH\nEND;\nGO\n```\n\n对于前面的示例，每个断言都附带一条简单的 `PRINT` 语句，以通知过程执行所需的哪些条件失败了。在现实生活中，这些代码路径可能以多种方式处理此类断言——通常是记录错误、向用户报告消息，并在可能的情况下尝试继续系统操作。通过这样做，它们防止了与未预期异常相关的不可预测行为。\n\
    \n防御性编程可以与 **`快速失败`** 方法论形成对比，后者侧重于通过在异常发生时导致应用程序停止来立即识别遇到的任何错误。防御性方法并不主张敲响警钟和闪烁灯光，但这并不意味着它隐藏错误——它只是以更优雅的方式向最终用户报告错误，并在可能的情况下继续系统核心部分的运行。\n\
    \n## 为什么对数据库开发使用防御性方法？\n\n如前所述，防御性编程并非唯一可应用于数据库开发的软件开发方法论。其他常见方法包括 TDD、XP 和快速失败开发。那么，为什么我选择在本章乃至本书中专注于防御性编程呢？我相信防御性编程最适合数据库开发，原因如下：\n\
    \n**数据库应用程序的预期寿命往往比其他软件应用程序更长。** 虽然认为数据库专业人员是软件开发领域中谨慎、一丝不苟的人可能是一个被过度使用的刻板印象，但事实是数据库开发往往比其他技术更缓慢、更谨慎。例如，Web\
    \ 应用程序可能会为了利用当时流行的技术而每年修订和重新发布。相比之下，数据库开发往往是缓慢而稳定的，数据库应用程序可能保持多年有效而无需从技术角度更新。因此，更容易证明与防御性编程相关的更高前期开发成本是合理的。可靠性和抗缺陷的好处通常将享受更长的时间。\n\
    \n**用户（和管理层）对数据库应用程序中的缺陷容忍度更低。** 大多数最终用户已经习惯甚至预期桌面和 Web 软件中的缺陷。虽然这无疑会造成挫折感，但许多人习惯于在\
    \ Web 浏览器挂起或某些应用程序无法正常关闭时，通过按下 `ctrl+Alt+Delete` 来重置机器。然而，对个人桌面软件表现出的同样的容忍度通常不会扩展到企业数据库应用程序。最近一些广为人知的丑闻，其中几个政府和大型组织的系统中的缺陷被利用，进一步加剧了公众对任何可能对数据库完整性构成风险的事情的极端敏感性。\n\
    \n**数据库应用程序中存在的任何缺陷都可能比其他软件产生更严重的后果。** 可以说，人们更担心数据库缺陷而不是其他软件缺陷是绝对正确的。桌面应用程序中的意外错误可能导致文档或文件损坏，这很麻烦并可能导致不必要的返工。但数据库中的意外错误可能导致重要的个人、机密或敏感数据面临风险，这可能带来相当严重的后果。通常存储在数据库中的数据的性质要求采用一种谨慎、彻底的开发方法，例如防御性编程所提供的方法。\n\
    \n## 为长寿命而设计\n\n消费软件应用程序的预期保质期越来越短，压缩的发布周期使得一个版本刚刚上市，前一个版本几乎就要过时。然而，情况并非必须如此。设计良好、经过防御性编程的应用程序可以持续运行多年。在我工作过的一个组织中，创建了一个战术性的短期管理信息数据存储，以便在组织系统因合并而进行整合期间，基本的业务报告功能可以继续。尽管只需要在合并后的立即期间使用，但这个（不幸命名为）短期管理信息数据库继续被使用长达十年之久，因为它比后来尝试的替代品更可靠、更健壮。\n\
    \n这是一个教训：在为数据库选择描述性名称时，要选择不会随时间推移而过时的名称！\n\n## 最佳实践 SQL 编程技术\n\n了解了不同软件方法论背后的一些理论，特别是防御性编程方法后，您现在可能想知道如何将其付诸实践。与任何方法论一样，防御性编程更关注您在开发时应具备的思维方式，而不是规定一套明确的规则来遵循。因此，本节仅提供说明所涉及整体概念的示例，不应被视为详尽无遗的列表。我会尽量让每个案例中的实际示例尽可能简单，以便您可以集中精力理解我为什么认为这些是最佳实践，而不是代码本身。\n\
    \n### 识别代码中的隐藏假设\n"
- fmt: "# 防御性编程原则与数据库最佳实践\n\n防御性编程的核心原则之一，是识别出你的代码能正常运行的所有隐含假设。一旦这些假设被识别出来，就可以调整函数以消除对它们的依赖，或者明确地测试每个条件，并在条件不满足时做出预案。在某些情况下，“隐藏”的假设是由于代码不够明确而产生的。\n\
    \n为了说明这个概念，请看下面的代码清单，它创建并填充了 `Customers` 和 `Orders` 两个表：\n\n```sql\nCREATE TABLE\
    \ Customers(\n    CustID int,\n    Name varchar(32),\n    Address varchar(255));\n\
    INSERT INTO Customers(CustID, Name, Address) VALUES\n    (1, 'Bob Smith', 'Flat\
    \ 1, 27 Heigham Street'),\n    (2, 'Tony James', '87 Long Road');\nGO\n\nCREATE\
    \ TABLE Orders(\n    OrderID INT,\n    CustID INT,\n    OrderDate DATE);\nINSERT\
    \ INTO Orders(OrderID, CustID, OrderDate) VALUES\n    (1, 1, '2008-01-01'),\n\
    \    (2, 1, '2008-03-04'),\n    (3, 2, '2008-03-07');\nGO\n```\n\n现在考虑以下查询，它从两个表中选取每个客户的订单列表：\n\
    \n```sql\nSELECT\n    Name,\n    Address,\n    OrderID\nFROM\n    Customers c\n\
    \    JOIN Orders o ON c.CustID = o.CustID;\nGO\n```\n\n查询成功执行，我们得到了预期的结果：\n\n\
    ```\nBob Smith Flat 1, 27 Heigham Street 1\nBob Smith Flat 1, 27 Heigham Street\
    \ 2\nTony James 87 Long Road 3\n```\n\n但隐藏的假设是什么？`SELECT` 查询中列出的列名没有用表名限定。如果将来表结构发生变化会怎样？假设向\
    \ `Orders` 表添加了一个 `Address` 列，以便为每个订单附加一个单独的送货地址，而不是依赖于 `Customers` 表中的地址：\n\n\
    ```sql\nALTER TABLE Orders ADD Address varchar(255);\nGO\n```\n\n现在，`SELECT` 查询中未限定的列名\
    \ `Address` 变得具有歧义。如果我们尝试再次运行原始查询，将会收到一个错误：\n\n```\nMsg 209, Level 16, State 1,\
    \ Line 1\nAmbiguous column name 'Address'.\n```\n\n由于没有识别并纠正原始代码中包含的隐藏假设，当向 `Orders`\
    \ 表添加新列后，查询就中断了。一个可以防止此错误的简单做法是确保所有列名都带有适当的表名或别名前缀：\n\n```sql\nSELECT\n    c.Name,\n\
    \    c.Address,\n    o.OrderID\nFROM\n    Customers c\n    JOIN Orders o ON c.CustID\
    \ = o.CustID;\nGO\n```\n\n在上面的例子中，发现隐藏假设相当容易，因为 SQL Server 给出了描述性的错误信息，使任何开发人员都能快速定位并修复损坏的代码。然而，有时你可能就没那么幸运了，如下例所示。\n\
    \n假设你有一个 `MainData` 表，包含一些简单的值，如下面的代码清单所示：\n\n```sql\nCREATE TABLE MainData(\n\
    \    ID int,\n    Value char(3));\nGO\n\nINSERT INTO MainData(ID, Value) VALUES\n\
    \    (1, 'abc'), (2, 'def'), (3, 'ghi'), (4, 'jkl');\nGO\n```\n\n现在假设对 `MainData`\
    \ 表的每一次更改都要记录在关联的 `ChangeLog` 表中。以下代码演示了这种结构，以及一个通过附加在 `MainData` 表上的 `UPDATE`\
    \ 触发器自动填充 `ChangeLog` 表的机制：\n\n```sql\nCREATE TABLE ChangeLog(\n    ChangeID int\
    \ IDENTITY(1,1),\n    RowID int,\n    OldValue char(3),\n    NewValue char(3),\n\
    \    ChangeDate datetime);\nGO\n\nCREATE TRIGGER DataUpdate ON MainData\nFOR UPDATE\n\
    AS\n    DECLARE @ID int;\n    SELECT @ID = ID FROM INSERTED;\n\n    DECLARE @OldValue\
    \ varchar(32);\n    SELECT @OldValue = Value FROM DELETED;\n\n    DECLARE @NewValue\
    \ varchar(32);\n    SELECT @NewValue = Value FROM INSERTED;\n\n    INSERT INTO\
    \ ChangeLog(RowID, OldValue, NewValue, ChangeDate)\n        VALUES(@ID, @OldValue,\
    \ @NewValue, GetDate());\nGO\n```\n\n我们可以通过对 `MainData` 表运行一个简单的 `UPDATE` 查询来测试触发器：\n\
    \n```sql\nUPDATE MainData SET Value = 'aaa' WHERE ID = 1;\nGO\n```"
  raw: 'One of the core tenets of defensive programming is to identify all of the
    assumptions that lie behind the proper functioning of your code. Once these assumptions
    have been identified, the function can either be adjusted to remove the dependency
    on them, or explicitly test each condition and make provisions should it not hold
    true. In some cases, “hidden” assumptions exist as a result of code failing to
    be sufficiently explicit.


    To demonstrate this concept, consider the following code listing, which creates
    and populates a Customers and an Orders table:


    CREATE TABLE Customers(


    CustID int,


    Name varchar(32),


    Address varchar(255));


    INSERT INTO Customers(CustID, Name, Address) VALUES


    (1, ''Bob Smith'', ''Flat 1, 27 Heigham Street''),


    (2, ''Tony James'', ''87 Long Road'');


    GO


    CREATE TABLE Orders(


    OrderID INT,


    CustID INT,


    OrderDate DATE);


    INSERT INTO Orders(OrderID, CustID, OrderDate) VALUES


    (1, 1, ''2008-01-01''),


    (2, 1, ''2008-03-04''),


    (3, 2, ''2008-03-07'');


    GO


    Now consider the following query to select a list of every customer order, which
    uses columns from both tables:


    SELECT


    Name,


    Address,


    OrderID


    FROM


    Customers c


    JOIN Orders o ON c.CustID = o.CustID;


    GO


    CHAPTER 2 „ BEST PRACTICES FOR DATABASE PROGRAMMING


    The query executes successfully and we get the results expected:


    Bob Smith Flat 1, 27 Heigham Street 1


    Bob Smith Flat 1, 27 Heigham Street 2


    Tony James 87 Long Road 3


    But what is the hidden assumption? The column names listed in the SELECT query
    were not qualified with table names, so what would happen if the table structure
    were to change in the future? Suppose that an Address column were added to the
    Orders table to enable a separate delivery address to be attached to each order,
    rather than relying on the address in the Customers table:


    ALTER TABLE Orders ADD Address varchar(255);


    GO


    The unqualified column name, Address, specified in the SELECT query, is now ambiguous,
    and if we attempt to run the original query again we receive an error:


    Msg 209, Level 16, State 1, Line 1


    Ambiguous column name ''Address''.


    By not recognizing and correcting the hidden assumption contained in the original
    code, the query subsequently broke as a result of the additional column being
    added to the Orders table. The simple practice that could have prevented this
    error would have been to ensure that all column names were prefixed with the appropriate
    table name or alias:


    SELECT


    c.Name,


    c.Address,


    o.OrderID


    FROM


    Customers c


    JOIN Orders o ON c.CustID = o.CustID;


    GO


    In the previous case, it was pretty easy to spot the hidden assumption, because
    SQL Server gave a descriptive error message that would enable any developer to
    locate and fix the broken code fairly quickly. However, sometimes you may not
    be so fortunate, as shown in the following example.


    Suppose that you had a table, MainData, containing some simple values, as shown
    in the following code listing:


    CREATE TABLE MainData(


    ID int,


    Value char(3));


    GO


    CHAPTER


    „ BEST PRACTICES FOR DATABASE PROGRAMMING


    INSERT INTO MainData(ID, Value) VALUES


    (1, ''abc''), (2, ''def''), (3, ''ghi''), (4, ''jkl'');


    GO


    Now suppose that every change made to the MainData table was to be recorded in
    an associated ChangeLog table. The following code demonstrates this structure,
    together with a mechanism to automatically populate the ChangeLog table by means
    of an UPDATE trigger attached to the MainData table: CREATE TABLE ChangeLog(


    ChangeID int IDENTITY(1,1),


    RowID int,


    OldValue char(3),


    NewValue char(3),


    ChangeDate datetime);


    GO


    CREATE TRIGGER DataUpdate ON MainData


    FOR UPDATE


    AS


    DECLARE @ID int;


    SELECT @ID = ID FROM INSERTED;


    DECLARE @OldValue varchar(32);


    SELECT @OldValue = Value FROM DELETED;


    DECLARE @NewValue varchar(32);


    SELECT @NewValue = Value FROM INSERTED;


    INSERT INTO ChangeLog(RowID, OldValue, NewValue, ChangeDate)


    VALUES(@ID, @OldValue, @NewValue, GetDate());


    GO


    We can test the trigger by running a simple UPDATE query against the MainData
    table:


    UPDATE MainData SET Value = ''aaa'' WHERE ID = 1;


    GO'
  trans: "\n# 防御性编程原则与数据库最佳实践\n\n防御性编程的核心原则之一，是识别出你的代码能正常运行的所有隐含假设。一旦这些假设被识别出来，就可以调整函数以消除对它们的依赖，或者明确地测试每个条件，并在条件不满足时做出预案。在某些情况下，“隐藏”的假设是由于代码不够明确而产生的。\n\
    \n为了说明这个概念，请看下面的代码清单，它创建并填充了 `Customers` 和 `Orders` 两个表：\n\n```sql\nCREATE TABLE\
    \ Customers(\n    CustID int,\n    Name varchar(32),\n    Address varchar(255));\n\
    INSERT INTO Customers(CustID, Name, Address) VALUES\n    (1, 'Bob Smith', 'Flat\
    \ 1, 27 Heigham Street'),\n    (2, 'Tony James', '87 Long Road');\nGO\n\nCREATE\
    \ TABLE Orders(\n    OrderID INT,\n    CustID INT,\n    OrderDate DATE);\nINSERT\
    \ INTO Orders(OrderID, CustID, OrderDate) VALUES\n    (1, 1, '2008-01-01'),\n\
    \    (2, 1, '2008-03-04'),\n    (3, 2, '2008-03-07');\nGO\n```\n\n现在考虑以下查询，它从两个表中选取每个客户的订单列表：\n\
    \n```sql\nSELECT\n    Name,\n    Address,\n    OrderID\nFROM\n    Customers c\n\
    \    JOIN Orders o ON c.CustID = o.CustID;\nGO\n```\n\n查询成功执行，我们得到了预期的结果：\n\n\
    ```\nBob Smith Flat 1, 27 Heigham Street 1\nBob Smith Flat 1, 27 Heigham Street\
    \ 2\nTony James 87 Long Road 3\n```\n\n但隐藏的假设是什么？`SELECT` 查询中列出的列名没有用表名限定。如果将来表结构发生变化会怎样？假设向\
    \ `Orders` 表添加了一个 `Address` 列，以便为每个订单附加一个单独的送货地址，而不是依赖于 `Customers` 表中的地址：\n\n\
    ```sql\nALTER TABLE Orders ADD Address varchar(255);\nGO\n```\n\n现在，`SELECT` 查询中未限定的列名\
    \ `Address` 变得具有歧义。如果我们尝试再次运行原始查询，将会收到一个错误：\n\n```\nMsg 209, Level 16, State 1,\
    \ Line 1\nAmbiguous column name 'Address'.\n```\n\n由于没有识别并纠正原始代码中包含的隐藏假设，当向 `Orders`\
    \ 表添加新列后，查询就中断了。一个可以防止此错误的简单做法是确保所有列名都带有适当的表名或别名前缀：\n\n```sql\nSELECT\n    c.Name,\n\
    \    c.Address,\n    o.OrderID\nFROM\n    Customers c\n    JOIN Orders o ON c.CustID\
    \ = o.CustID;\nGO\n```\n\n在上面的例子中，发现隐藏假设相当容易，因为 SQL Server 给出了描述性的错误信息，使任何开发人员都能快速定位并修复损坏的代码。然而，有时你可能就没那么幸运了，如下例所示。\n\
    \n假设你有一个 `MainData` 表，包含一些简单的值，如下面的代码清单所示：\n\n```sql\nCREATE TABLE MainData(\n\
    \    ID int,\n    Value char(3));\nGO\n\nINSERT INTO MainData(ID, Value) VALUES\n\
    \    (1, 'abc'), (2, 'def'), (3, 'ghi'), (4, 'jkl');\nGO\n```\n\n现在假设对 `MainData`\
    \ 表的每一次更改都要记录在关联的 `ChangeLog` 表中。以下代码演示了这种结构，以及一个通过附加在 `MainData` 表上的 `UPDATE`\
    \ 触发器自动填充 `ChangeLog` 表的机制：\n\n```sql\nCREATE TABLE ChangeLog(\n    ChangeID int\
    \ IDENTITY(1,1),\n    RowID int,\n    OldValue char(3),\n    NewValue char(3),\n\
    \    ChangeDate datetime);\nGO\n\nCREATE TRIGGER DataUpdate ON MainData\nFOR UPDATE\n\
    AS\n    DECLARE @ID int;\n    SELECT @ID = ID FROM INSERTED;\n\n    DECLARE @OldValue\
    \ varchar(32);\n    SELECT @OldValue = Value FROM DELETED;\n\n    DECLARE @NewValue\
    \ varchar(32);\n    SELECT @NewValue = Value FROM INSERTED;\n\n    INSERT INTO\
    \ ChangeLog(RowID, OldValue, NewValue, ChangeDate)\n        VALUES(@ID, @OldValue,\
    \ @NewValue, GetDate());\nGO\n```\n\n我们可以通过对 `MainData` 表运行一个简单的 `UPDATE` 查询来测试触发器：\n\
    \n```sql\nUPDATE MainData SET Value = 'aaa' WHERE ID = 1;\nGO\n```\n"
- fmt: "# CHAPTER 2: BEST PRACTICES FOR DATABASE PROGRAMMING\n\nThe query appears\
    \ to be functioning correctly—`SQL Server Management Studio` reports the following:\
    \ `(1 row(s) affected)`\n\n`(1 row(s) affected)`\n\nAnd, as expected, we find\
    \ that one row has been updated in the `MainData` table:\n\n| ID | Value |\n|----|-------|\n\
    | 1  | aaa   |\n| 2  | def   |\n| 3  | ghi   |\n| 4  | jkl   |\n\nand an associated\
    \ row has been created in the `ChangeLog` table:\n\n| ChangeID | RowID | OldValue\
    \ | NewValue | ChangeDate               |\n|----------|-------|----------|----------|--------------------------|\n\
    | 1        | 1     | abc      | aaa      | 2009-06-15 14:11:09.770 |\n\nHowever,\
    \ once again, there is a hidden assumption in the code. Within the trigger logic,\
    \ the variables `@ID`, `@OldValue`, and `@NewValue` are assigned values that will\
    \ be inserted into the `ChangeLog` table.\n\nClearly, each of these scalar variables\
    \ can only be assigned a single value, so what would happen if you were to attempt\
    \ to update two or more rows in a single statement?\n\n```sql\nUPDATE MainData\
    \ SET Value = 'zzz' WHERE ID IN (2,3,4);\nGO\n```\n\nIf you haven’t worked it\
    \ out yet, perhaps the messages reported by `SQL Server Management Studio` will\
    \ give you a clue as to the result:\n\n`(1 row(s) affected)`\n\n`(3 row(s) affected)`\n\
    \nThe result in this case is that all three rows affected by the `UPDATE` statement\
    \ have been changed in the `MainData` table:\n\n| ID | Value |\n|----|-------|\n\
    | 1  | aaa   |\n| 2  | zzz   |\n| 3  | zzz   |\n| 4  | zzz   |\n\nbut only the\
    \ first update has been logged:\n\n| ChangeID | RowID | OldValue | NewValue |\
    \ ChangeDate               |\n|----------|-------|----------|----------|--------------------------|\n\
    | 1        | 1     | abc      | aaa      | 2009-06-15 14:11:09.770 |\n| 2    \
    \    | 2     | def      | zzz      | 2009-06-15 15:18:11.007 |\n\nThe failure\
    \ to foresee the possibility of multiple rows being updated in a single statement\
    \ led to a silent failure on this occasion, which is much more dangerous than\
    \ the overt error given in the previous example. Had this scenario been actively\
    \ considered, it would have been easy to recode the procedure to deal with such\
    \ an event by making a subtle alteration to the trigger syntax, as shown here:\n\
    \n```sql\nALTER TRIGGER DataUpdate ON MainData\nFOR UPDATE\nAS\nINSERT INTO ChangeLog(RowID,\
    \ OldValue, NewValue, ChangeDate)\nSELECT i.ID, d.Value, i.Value, GetDate()\n\
    FROM INSERTED i JOIN DELETED d ON i.ID = d.ID;\nGO\n```\n\n## Don’t Take Shortcuts\n\
    \nIt is human nature to want to take shortcuts if we believe that they will allow\
    \ us to avoid work that we feel is unnecessary. In programming terms, there are\
    \ often shortcuts that provide a convenient, concise way of achieving a given\
    \ task in fewer lines of code than other, more standard methods. However, these\
    \ shortcut methods can come with associated risks. Most commonly, shortcut methods\
    \ require less code because they rely on some assumed default values rather than\
    \ those explicitly stated within the procedure. As such, they can only be applied\
    \ in situations where the conditions imposed by those default values hold true.\n\
    \nBy relying on a default value, shortcut methods may increase the rigidity of\
    \ your code and also introduce an external dependency—the default value may vary\
    \ depending on server configuration, or change between different versions of `SQL\
    \ Server`. Taking shortcuts therefore reduces the portability of code, and introduces\
    \ assumptions that can break in the future.\n\nTo demonstrate, consider what happens\
    \ when you `CAST` a value to a `varchar` datatype without explicitly declaring\
    \ the appropriate data length:\n\n```sql\nSELECT CAST ('This example seems to\
    \ work ok' AS varchar);\nGO\n```\n\nThe query appears to work correctly, and results\
    \ in the following output:\n\n```\nThis example seems to work ok\n```\n\nIt seems\
    \ to be a common misunderstanding among some developers that omitting the length\
    \ for the `varchar` type as the target of a `CAST` operation results in `SQL Server`\
    \ dynamically assigning a length sufficient to accommodate all of the characters\
    \ of the input. However, this is not the case, as demonstrated in the following\
    \ code listing:\n\n```sql\nSELECT CAST ('This demonstrates the problem of relying\
    \ on default datatype length'\nAS varchar);\nGO\n```\n\n```\nThis demonstrates\
    \ the problem\n```\n\nIf not explicitly specified, when `CAST`ing to a character\
    \ datatype, `SQL Server` defaults to a length of 30 characters. In the second\
    \ example, the input string is silently truncated to 30 characters, even though\
    \ there is no obvious indication in the code to this effect. If this was the intention,\
    \ it would have been much clearer to explicitly state `varchar(30)` to draw attention\
    \ to the fact that this was a planned truncation, rather than simply omitting\
    \ the data length.\n\nAnother example of a shortcut sometimes made is to rely\
    \ on implicit `CAST`s between datatypes. Consider the following code listing:\n\
    \n```sql\nDECLARE\n    @x int = 5,\n    @y int = 9,\n    @Rate decimal(18,2);\n\
    \nSET @Rate = 1.9 * @x / @y;\nSELECT 1000 * @Rate;\nGO\n```\n\nIn this example,\
    \ `@Rate` is a multiplicative factor whose value is determined by the ratio of\
    \ two parameters, `@x` and `@y`, multiplied by a hard-coded scale factor of 1.9.\
    \ When applied to the value 1000, as in this example, the result is as follows:\n\
    \nNow let’s suppose that management makes a decision to change the calculation\
    \ used to determine `@Rate`, and increases the scale factor from 1.9 to 2. The\
    \ obvious (but incorrect) solution would be to amend the code as follows:\n\n\
    ```sql\nDECLARE\n    @x int = 5,\n    @y int = 9,\n    @Rate decimal(18,2);\n\n\
    SET @Rate = 2 * @x / @y;\nSELECT 1000 * @Rate;\nGO\n```\n\nRather than increasing\
    \ the rate as intended, the change has actually negated the effect of applying\
    \ any rate to the supplied value of 1000. The problem now is that the sum used\
    \ to determine `@Rate` is a purely integer calculation, `2 * 5 / 9`. In integer\
    \ mathematics, this equates to 1. In the previous example, the hard-coded value\
    \ of 1.9 caused an implicit cast of both `@x` and `@y` parameters to the decimal\
    \ type, so the sum was calculated with decimal precision.\n\nThis example may\
    \ seem trivial when considered in isolation, but can be a source of unexpected\
    \ behavior and unnecessary bug-chasing when nested deep in the belly of some complex\
    \ code. To avoid these complications, it is always best to explicitly state the\
    \ type and precision of any parameters used in a calculation, and avoid implicit\
    \ `CAST`s between them.\n\nAnother problem with using shortcuts is that they can\
    \ obscure what the developer intended the purpose of the code to be. If we cannot\
    \ tell what a line of code is meant to do, it is incredibly hard to test whether\
    \ it is achieving its purpose or not. Consider the following code listing:\n\n\
    ```sql\nDECLARE @Date datetime = '03/05/1979';\nSELECT @Date + 365;\n```\n\nAt\
    \ first sight, this seems fairly innocuous: take a specific date and add 365.\
    \ But there are actually several shortcuts used here that add ambiguity as to\
    \ what the intended purpose of this code is:\n\nThe first shortcut is in the implicit\
    \ `CAST` from the string value `'03/05/1979'` to a `datetime`. As I’m sure you\
    \ know, there are numerous ways of presenting date formats around the world, and\
    \ `03/05/1979` is ambiguous. In the United Kingdom it means the 3rd of May, but\
    \ to American readers it means the 5th of March. The result of the implicit cast\
    \ will depend upon the locale of the server on which the function is performed.\n\
    \nEven if the `dd/mm/yyyy` or `mm/dd/yyyy` ordering is resolved, there is still\
    \ ambiguity regarding the input value. The datatype chosen is `datetime`, which\
    \ stores both a date and time component, but the value assigned to `@Date` does\
    \ not specify a time, so this code relies on `SQL Server`’s default value of midnight:\
    \ `00:00:00`. However, perhaps it was not the developer’s intention to specify\
    \ an instance in time, but rather the whole of a calendar day. If so, should the\
    \ original `@Date` parameter be specified using the `date` datatype instead? And\
    \ what about the result of the `SELECT` query—should that also be a `date`?\n\n\
    Finally, the code specifies the addition of the integer `365` with a `datetime`\
    \ value. When applied to a date value, the `+` operator adds the given number\
    \ of days, so this appears to be a shortcut in place of using the `DATEADD` method\
    \ to add 365 days. But,"
