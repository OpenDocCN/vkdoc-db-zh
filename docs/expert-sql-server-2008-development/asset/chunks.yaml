    CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    Summary


    Getting the most out of SQLCLR routines involves a bit of thought investment.
    Up-front design and architecture considerations will yield great benefits in terms
    of security, reliability, and performance.


    You should also consider reuse at every stage, in order to minimize the amount
    of work that must be done when you need the same functionality six months or a
    year down the road. If you’ve already coded it once, why code it again?


    To illustrate these concepts, I showed an example that serialized tables using
    the BinaryFormatter, which could be used to extend SQL Server Service Broker.
    I used a common, core set of more highly privileged utility assemblies in order
    to limit the outer surface area, and tried to design the solution to promote flexibility
    and potential for use in many projects throughout the lifetime of the code.


    **C H A P T E R 8**


    „ „ „


    **Dynamic T-SQL**


    The general objective of any software application is to provide consistent, reliable
    functionality that allows users to perform given tasks in an effective manner.
    The first step in meeting this objective is therefore to keep the application
    bug-free and working as designed, to expected standards. However, once you’ve
    gotten past these basic requirements, the next step is to try to create a great
    user experience, which raises the question, “What do the users want?” More often
    than not, the answer is that users want flexible interfaces that let them control
    the data the way they want to. It’s common for software customer support teams
    to receive requests for slightly different sort orders, filtering mechanisms,
    or outputs for data, making it imperative that applications be designed to support
    extensibility along these lines.


    As with other data-related development challenges, such requests for flexible
    data output tend to fall through the application hierarchy, eventually landing
    on the database (and, therefore, the database developer). This is especially true
    in web-based application development, where client-side grid controls that enable
    sorting and filtering are still relatively rare, and where many applications still
    use a lightweight two-tier model without a dedicated business layer to handle
    data caching and filtering.


    “Flexibility” in the database can mean many things, and I have encountered some
    very interesting approaches in applications I’ve worked with over the years, often
    involving creation of a multitude of stored procedures or complex, nested control-of-flow
    blocks. These solutions invariably seem to create more problems than they solve,
    and make application development much more difficult than it needs to be by introducing
    a lot of additional complexity in the database layer.


    In this chapter, I will discuss how dynamic SQL can be used to solve these problems
    as well as to create more flexible stored procedures. Some DBAs and developers
    scorn dynamic SQL, often believing that it will cause performance, security, or
    maintainability problems, whereas in many cases it is simply that they don’t understand
    how to use it properly. Dynamic SQL is a powerful tool that, if used correctly,
    is a tremendous asset to the database developer’s toolbox. There is a lot of misinformation
    floating around about what it is and when or why it should be used, and I hope
    to clear up some myths and misconceptions in these pages.


    „ **Note** Throughout this chapter, I will illustrate the discussion of various
    methods with performance measures and timings recorded on my laptop. For more
    information on how to capture these measures on your own system environment, please
    refer to the discussion of performance monitoring tools in Chapter 3.


    CHAPTER 8 „ DYNAMIC T-SQL


    Dynamic T-SQL vs. Ad Hoc T-SQL'
