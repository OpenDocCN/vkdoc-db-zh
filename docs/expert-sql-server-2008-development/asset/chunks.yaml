- fmt: "# CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY\n\nTo begin with,\
    \ the stored procedure exposes three parameters, each required: the name of the\
    \ resource to be locked, how long to wait for the lock in case someone else already\
    \ has it, and an output parameter—the lock key to be used later to release the\
    \ lock. Following are the first several lines of the stored procedure, ending\
    \ where the transactional part of the procedure begins:\n\n```sql\nCREATE PROC\
    \ GetAppLock\n    @AppLockName nvarchar(255),\n    @LockTimeout int,\n    @AppLockKey\
    \ uniqueidentifier = NULL OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET XACT_ABORT\
    \ ON;\n    --Make sure this variable starts NULL\n    SET @AppLockKey = NULL;\n\
    \    DECLARE @LOCK_TIMEOUT_LIFETIME int = 18000; --5 hours\n    DECLARE @startWait\
    \ datetime = GETDATE();\n    DECLARE @init_handle uniqueidentifier;\n    DECLARE\
    \ @target_handle uniqueidentifier;\n    BEGIN TRAN;\n```\n\nThe stored procedure\
    \ defines a couple of important local variables. The `@LOCK_TIMEOUT_LIFETIME`\
    \ is the amount of time to wait until expiring an orphaned lock. It is currently\
    \ hard-coded, but could easily be converted into a parameter in order to allow\
    \ callers to specify their own estimated times of completion. This might be a\
    \ more exact way of handling the lock expiration problem. The `@startWait` variable\
    \ is used in order to track lock wait time, so that the procedure does not allow\
    \ callers to wait longer than the requested lock timeout value.\n\nNext, the stored\
    \ procedure makes use of the very feature that I was attempting to supersede:\
    \ SQL Server’s native transactional application locks. There is a bit of a backstory\
    \ to why I had to use them.\n\nDuring development of this technique, I discovered\
    \ that Service Broker waits are processed according to last-in first-out (LIFO)\
    \ rules: the most recent process waiting is the first to get a message off the\
    \ queue.\n\nThis is counterintuitive if you’re used to working with first-in first-out\
    \ (FIFO) queues, but is designed to allow the minimum number of activation stored\
    \ procedures to stay alive after bursts of activity. By giving the message to\
    \ the newest waiting process, the older processes are forced to eventually time\
    \ out and expire.\n\nObviously such a scheme, while useful in the world of activation\
    \ stored procedures, does not follow the requirements of a queued lock, so I made\
    \ use of a transactional application lock in order to force serialization of the\
    \ waits. Following is the code used to take the lock:\n\n```sql\n--Get the app\
    \ lock -- start waiting\nDECLARE @RETURN int;\nEXEC @RETURN = sp_getapplock\n\
    \    @resource = @AppLockName,\n    @lockmode = 'exclusive',\n    @LockTimeout\
    \ = @LockTimeout;\nIF @RETURN NOT IN (0, 1)\nBEGIN\n    RAISERROR(\n        'Error\
    \ acquiring transactional lock for %s', 16, 1, @AppLockName);\n    ROLLBACK;\n\
    \    RETURN;\nEND\n```\n\nIf the lock is successfully granted, the code will keep\
    \ going; otherwise, it will roll back and the caller will receive an error so\
    \ that it knows it did not acquire the requested lock. Once inside the scope of\
    \ the transactional lock, it’s finally time to start thinking about the Service\
    \ Broker queues. The next thing the 254 CHAPTER „ DESIGNING SYSTEMS FOR APPLICATION\
    \ CONCURRENCY stored procedure does is get the target conversation handle, if\
    \ one exists. If so, the stored procedure starts a wait on the queue for a message:\n\
    \n```sql\n--Find out whether someone has requested this lock before\nSELECT\n\
    \    @target_handle = TargetDialogHandle\n    FROM AppLocks\n    WHERE AppLockName\
    \ = @AppLockName;\n--If we're here, we have the transactional lock\nIF @target_handle\
    \ IS NOT NULL\nBEGIN\n    --Find out whether the timeout has already expired...\n\
    \    SET @LockTimeout = @LockTimeout - DATEDIFF(ms, @startWait, GETDATE());\n\
    \    IF @LockTimeout > 0\n    BEGIN\n        --Wait for the OK message\n     \
    \   DECLARE @message_type nvarchar(255);\n        --Wait for a grant message\n\
    \        WAITFOR\n        (\n            RECEIVE\n                @message_type\
    \ = message_type_name\n                FROM AppLock_Queue\n                WHERE\
    \ conversation_handle = @target_handle\n        ), TIMEOUT @LockTimeout;\n```\n\
    \nOne thing to make note of in this section of the code is that the input lock\
    \ timeout is decremented by the length of time the stored procedure has already\
    \ been waiting, based on the `@startWait` variable."
  raw: 'To begin with, the stored procedure exposes three parameters, each required:
    the name of the resource to be locked, how long to wait for the lock in case someone
    else already has it, and an output parameter—the lock key to be used later to
    release the lock. Following are the first several lines of the stored procedure,
    ending where the transactional part of the procedure begins:


    CREATE PROC GetAppLock


    @AppLockName nvarchar(255),


    @LockTimeout int,


    @AppLockKey uniqueidentifier = NULL OUTPUT


    AS


    BEGIN


    SET NOCOUNT ON;


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    SET XACT_ABORT ON;


    --Make sure this variable starts NULL


    SET @AppLockKey = NULL;


    DECLARE @LOCK_TIMEOUT_LIFETIME int = 18000; --5 hours


    DECLARE @startWait datetime = GETDATE();


    DECLARE @init_handle uniqueidentifier;


    DECLARE @target_handle uniqueidentifier;


    BEGIN TRAN;


    The stored procedure defines a couple of important local variables. The @LOCK_TIMEOUT_LIFETIME
    is the amount of time to wait until expiring an orphaned lock. It is currently
    hard-coded, but could easily be converted into a parameter in order to allow callers
    to specify their own estimated times of completion. This might be a more exact
    way of handling the lock expiration problem. The @startWait variable is used in
    order to track lock wait time, so that the procedure does not allow callers to
    wait longer than the requested lock timeout value.


    Next, the stored procedure makes use of the very feature that I was attempting
    to supersede: SQL


    Server’s native transactional application locks. There is a bit of a backstory
    to why I had to use them.


    During development of this technique, I discovered that Service Broker waits are
    processed according to last-in first-out (LIFO) rules: the most recent process
    waiting is the first to get a message off the queue.


    This is counterintuitive if you’re used to working with first-in first-out (FIFO)
    queues, but is designed to allow the minimum number of activation stored procedures
    to stay alive after bursts of activity. By giving the message to the newest waiting
    process, the older processes are forced to eventually time out and expire.


    Obviously such a scheme, while useful in the world of activation stored procedures,
    does not follow the requirements of a queued lock, so I made use of a transactional
    application lock in order to force serialization of the waits. Following is the
    code used to take the lock:


    --Get the app lock -- start waiting


    DECLARE @RETURN int;


    EXEC @RETURN = sp_getapplock


    @resource = @AppLockName,


    @lockmode = ''exclusive'',


    @LockTimeout = @LockTimeout;


    IF @RETURN NOT IN (0, 1)


    BEGIN


    RAISERROR(


    ''Error acquiring transactional lock for %s'', 16, 1, @AppLockName);


    ROLLBACK;


    RETURN;


    END


    If the lock is successfully granted, the code will keep going; otherwise, it will
    roll back and the caller will receive an error so that it knows it did not acquire
    the requested lock. Once inside the scope of the transactional lock, it’s finally
    time to start thinking about the Service Broker queues. The next thing the 254


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    stored procedure does is get the target conversation handle, if one exists. If
    so, the stored procedure starts a wait on the queue for a message:


    --Find out whether someone has requested this lock before


    SELECT


    @target_handle = TargetDialogHandle


    FROM AppLocks


    WHERE AppLockName = @AppLockName;


    --If we''re here, we have the transactional lock


    IF @target_handle IS NOT NULL


    BEGIN


    --Find out whether the timeout has already expired...


    SET @LockTimeout = @LockTimeout - DATEDIFF(ms, @startWait, GETDATE());


    IF @LockTimeout > 0


    BEGIN


    --Wait for the OK message


    DECLARE @message_type nvarchar(255);


    --Wait for a grant message


    WAITFOR


    (


    RECEIVE


    @message_type = message_type_name


    FROM AppLock_Queue


    WHERE conversation_handle = @target_handle


    ), TIMEOUT @LockTimeout;


    One thing to make note of in this section of the code is that the input lock timeout
    is decremented by the length of time the stored procedure has already been waiting,
    based on the @startWait variable.'
  trans: "\n# 第 9 章 „ 设计应用并发系统\n\n首先，该存储过程暴露了三个必需参数：要锁定的资源名称、在他人已持锁时等待锁的时长，以及一个输出参数——用于稍后释放锁的锁键。以下是该存储过程的前几行，直至其事务部分开始处：\n\
    \n```sql\nCREATE PROC GetAppLock\n    @AppLockName nvarchar(255),\n    @LockTimeout\
    \ int,\n    @AppLockKey uniqueidentifier = NULL OUTPUT\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n    SET XACT_ABORT ON;\n    --Make sure this variable starts NULL\n   \
    \ SET @AppLockKey = NULL;\n    DECLARE @LOCK_TIMEOUT_LIFETIME int = 18000; --5\
    \ hours\n    DECLARE @startWait datetime = GETDATE();\n    DECLARE @init_handle\
    \ uniqueidentifier;\n    DECLARE @target_handle uniqueidentifier;\n    BEGIN TRAN;\n\
    ```\n\n该存储过程定义了几个重要的局部变量。`@LOCK_TIMEOUT_LIFETIME`是等待孤儿锁超时的时间长度。目前它是硬编码的，但可以轻松转换为参数，以允许调用者指定他们自己预估的完成时间。这可能是处理锁过期问题的一种更精确的方法。`@startWait`变量用于跟踪锁等待时间，使得该过程不允许调用者等待超过请求的锁超时值。\n\
    \n接下来，该存储过程利用了我试图取代的特性：SQL Server 原生的事务性应用程序锁。这背后有一些缘由。\n\n在开发这项技术期间，我发现 Service\
    \ Broker 的等待是按照后进先出（LIFO）规则处理的：最近等待的进程首先从队列中获取消息。\n\n如果你习惯于使用先进先出（FIFO）队列，这可能有些反直觉，但其设计目的是在活动突发后，让最少数量的激活存储过程保持活动状态。通过将消息传递给最新的等待进程，迫使较旧的进程最终超时并过期。\n\
    \n显然，这种方案虽然在激活存储过程的世界中有用，但不遵循队列锁的要求，因此我利用了一个事务性应用程序锁来强制等待的序列化。以下是用于获取锁的代码：\n\n\
    ```sql\n--Get the app lock -- start waiting\nDECLARE @RETURN int;\nEXEC @RETURN\
    \ = sp_getapplock\n    @resource = @AppLockName,\n    @lockmode = 'exclusive',\n\
    \    @LockTimeout = @LockTimeout;\nIF @RETURN NOT IN (0, 1)\nBEGIN\n    RAISERROR(\n\
    \        'Error acquiring transactional lock for %s', 16, 1, @AppLockName);\n\
    \    ROLLBACK;\n    RETURN;\nEND\n```\n\n如果锁成功授予，代码将继续执行；否则，它将回滚，调用方将收到错误通知，表明它未获取到请求的锁。一旦进入事务锁的作用域，就终于可以开始考虑\
    \ Service Broker 队列了。存储过程接下来要做的是获取目标对话句柄（如果存在）。如果存在，该存储过程就开始在队列上等待消息：\n\n```sql\n\
    --Find out whether someone has requested this lock before\nSELECT\n    @target_handle\
    \ = TargetDialogHandle\n    FROM AppLocks\n    WHERE AppLockName = @AppLockName;\n\
    --If we're here, we have the transactional lock\nIF @target_handle IS NOT NULL\n\
    BEGIN\n    --Find out whether the timeout has already expired...\n    SET @LockTimeout\
    \ = @LockTimeout - DATEDIFF(ms, @startWait, GETDATE());\n    IF @LockTimeout >\
    \ 0\n    BEGIN\n        --Wait for the OK message\n        DECLARE @message_type\
    \ nvarchar(255);\n        --Wait for a grant message\n        WAITFOR\n      \
    \  (\n            RECEIVE\n                @message_type = message_type_name\n\
    \                FROM AppLock_Queue\n                WHERE conversation_handle\
    \ = @target_handle\n        ), TIMEOUT @LockTimeout;\n```\n\n在这部分代码中需要注意的一点是，输入的锁超时值会根据\
    \ `@startWait` 变量，减去存储过程已经等待的时间长度。\n"
- fmt: "It's possible that a caller could specify, say, a `2500ms` wait time, and\
    \ wait `2000ms` for the transactional lock. At that point, the caller should only\
    \ be made to wait up to `500ms` for the message to come in on the queue. Therefore,\
    \ the reduced timeout is used as the `RECEIVE` timeout on the `WAITFOR` command.\n\
    \nThe procedure next checks the received message type. If it is an `AppLockGrant`\
    \ message, all is good—the lock has been successfully acquired. The timeout conversation\
    \ is started, and the lock token is set. If an unexpected message type is received,\
    \ an exception is thrown and the transaction is rolled back:\n\n```sql\nIF @message_type\
    \ = 'AppLockGrant'\nBEGIN\n    BEGIN DIALOG CONVERSATION @AppLockKey\n       \
    \ FROM SERVICE AppLockTimeout_Service\n        TO SERVICE 'AppLockTimeout_Service'\n\
    \        WITH\n            LIFETIME = @LOCK_TIMEOUT_LIFETIME,\n            ENCRYPTION\
    \ = OFF;\n\n    UPDATE AppLocks\n    SET\n        AppLockKey = @AppLockKey,\n\
    \        LastGrantedDate = GETDATE()\n    WHERE\n        AppLockName = @AppLockName;\n\
    END\nELSE IF @message_type IS NOT NULL\nBEGIN\n    RAISERROR('Unexpected message\
    \ type: %s', 16, 1, @message_type);\n    ROLLBACK;\nEND\n```\n\nCHAPTER 9 „ DESIGNING\
    \ SYSTEMS FOR APPLICATION CONCURRENCY\n\nThe next section of code deals with the\
    \ branch that occurs if the target handle acquired before entering the `IF` block\
    \ was `NULL`, meaning that no one has ever requested a lock on this resource before.\n\
    \nThe first thing this branch does is begin a dialog on the `AppLock_Service`\
    \ service. Since the target conversation handle is required for others to wait\
    \ on the resource, and since the target handle is not generated until a message\
    \ is sent, the first thing that must be done is to send a message on the dialog.\n\
    \nOnce the message has been sent, the target handle is picked up from the `sys.conversation_endpoints`\
    \ catalog view, and the sent message is picked up so that no other callers can\
    \ receive it:\n\n```sql\nELSE\nBEGIN\n    -- No one has requested this lock before\n\
    \    BEGIN DIALOG @init_handle\n        FROM SERVICE AppLock_Service\n       \
    \ TO SERVICE 'AppLock_Service'\n        ON CONTRACT AppLockContract\n        WITH\
    \ ENCRYPTION = OFF;\n\n    -- Send a throwaway message to start the dialog on\
    \ both ends\n    SEND ON CONVERSATION @init_handle\n        MESSAGE TYPE AppLockGrant;\n\
    \n    -- Get the remote handle\n    SELECT\n        @target_handle = ce2.conversation_handle\n\
    \    FROM sys.conversation_endpoints ce1\n    JOIN sys.conversation_endpoints\
    \ ce2 ON\n        ce1.conversation_id = ce2.conversation_id\n    WHERE\n     \
    \   ce1.conversation_handle = @init_handle\n        AND ce2.is_initiator = 0;\n\
    \n    -- Receive the throwaway message\n    RECEIVE\n        @target_handle =\
    \ conversation_handle\n    FROM AppLock_Queue\n    WHERE conversation_handle =\
    \ @target_handle;\n```\n\nCHAPTER „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY\n\
    \nAfter starting the lock grant dialog and initializing the target conversation\
    \ handle, the timeout/token dialog can finally be started and the lock inserted\
    \ into the `AppLocks` table. Once that's taken care of, the stored procedure checks\
    \ to find out whether the `@AppLockKey` variable was populated. If it was, the\
    \ transaction is committed. Otherwise, a timeout is assumed to have occurred,\
    \ and all work is rolled back.\n\n```sql\n    BEGIN DIALOG CONVERSATION @AppLockKey\n\
    \        FROM SERVICE AppLockTimeout_Service\n        TO SERVICE 'AppLockTimeout_Service'\n\
    \        WITH\n            LIFETIME = @LOCK_TIMEOUT_LIFETIME,\n            ENCRYPTION\
    \ = OFF;\n\n    INSERT INTO AppLocks\n        (\n            AppLockName,\n  \
    \          AppLockKey,\n            InitiatorDialogHandle,\n            TargetDialogHandle\n\
    \        )\n    VALUES\n        (\n            @AppLockName,\n            @AppLockKey,\n\
    \            @init_handle,\n            @target_handle\n        );\nEND\n\nIF\
    \ @AppLockKey IS NOT NULL\n    COMMIT;\nELSE\nBEGIN\n    RAISERROR(\n        'Timed\
    \ out waiting for lock on resource: %s', 16, 1, @AppLockName);\n    ROLLBACK;\n\
    END\nEND;\nGO\n```\n\nThe bulk of the work required to set up these locks is done\
    \ in the `GetAppLock` stored procedure.\n\nLuckily, the accompanying `ReleaseAppLock`\
    \ procedure is much simpler:\n\n```sql\nCREATE PROC ReleaseAppLock\n    @AppLockKey\
    \ uniqueidentifier\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET XACT_ABORT ON;\n \
    \   BEGIN TRAN;\n\n    DECLARE @dialog_handle uniqueidentifier;\n\n    UPDATE\
    \ AppLocks\n    SET\n        AppLockKey = NULL,\n        @dialog_handle = InitiatorDialogHandle\n\
    \    WHERE\n        AppLockKey = @AppLockKey;\n\n    IF @@ROWCOUNT = 0\n    BEGIN\n\
    \        RAISERROR('AppLockKey not found', 16, 1);\n        ROLLBACK;\n    END\n\
    \n    END CONVERSATION @AppLockKey;\n\n    -- Allow another caller to acquire\
    \ the lock\n```\n\nCHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY"
  raw: 'It’s possible that a caller could specify, say, a 2500ms wait time, and wait
