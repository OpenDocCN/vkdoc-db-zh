    How Exceptions Work in SQL Server


    The first step in understanding how to handle errors and exceptions in SQL Server
    is to take a look at how the server itself deals with error conditions. Unlike
    many other programming languages, SQL Server has an exception model that involves
    different behaviors for different types of exceptions. This can cause unexpected
    behavior when error conditions do occur, so careful programming is essential when
    dealing with T-SQL exceptions.


    To begin with, think about connecting to a SQL Server and issuing some T-SQL.
    First, you must establish a **connection** to the server by issuing login credentials.
    The connection also determines what database will be used as the default for scope
    resolution (i.e., finding objects—more on this in a bit).


    Once connected, you can issue a **batch** of T-SQL. A batch consists of one or
    more T-SQL **statements**, which will be compiled together to form an execution
    plan.


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    The behavior of the exceptions thrown by SQL Server mostly follows this same pattern:
    depending on the type of exception, a statement, a batch, or an entire connection
    may be aborted. Let’s take a look at some practical examples to see this in action.


    Statement-Level Exceptions


    A statement-level exception aborts only the current statement that is running
    within a batch of T-SQL, allowing any subsequent statements within the batch to
    run. To see this behavior, you can use SQL


    Server Management Studio to execute a batch that includes an exception, followed
    by a PRINT statement.


    For instance:


    SELECT POWER(2, 32);


    PRINT ''This will print!'';


    GO


    Running this batch results in the following output:


    Msg 232, Level 16, State 3, Line 1


    Arithmetic overflow error for type int, value = 4294967296.000000.


    This will print!


    When this batch was run, the attempt to calculate POWER(2, 32) caused an integer
    overflow, which threw the exception. However, only the SELECT statement was aborted.
    The rest of the batch continued to run, which, in this case, meant that the PRINT
    statement still printed its message.


    Batch-Level Exceptions


    Unlike a statement-level exception, a batch-level exception does not allow the
    rest of the batch to continue running. The statement that throws the exception
    will be aborted, and any remaining statements in the batch will not be run. An
    example of a batch-aborting exception is an invalid conversion, such as the following:


    SELECT CONVERT(int, ''abc'');


    PRINT ''This will NOT print!'';


    GO


    The output of this batch is as follows:


    Msg 245, Level 16, State 1, Line 1


    Conversion failed when converting the varchar value ''abc'' to data type int.


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    In this case, the conversion exception occurred in the SELECT statement, which
    aborted the batch at that point. The PRINT statement was not allowed to run, although
    if the batch had contained any valid statements *before* the exception, these
    would have been executed successfully.


    Batch-level exceptions might be easily confused with connection-level exceptions
    (which drop the connection to the server), but after a batch-level exception,
    the connection is still free to send other batches. For instance:


    SELECT CONVERT(int, ''abc'');


    GO


    PRINT ''This will print!'';


    GO


    In this case there are two batches sent to SQL Server, separated by the batch
    separator, GO. The first batch throws a conversion exception, but the second batch
    is still run. This results in the following output:


    Msg 245, Level 16, State 1, Line 2


    Conversion failed when converting the varchar value ''abc'' to data type int.


    This will print!


    Batch-level exceptions do not affect only the scope in which the exception occurs.
    The exception will **bubble up** to the next level of execution, aborting every
    call in the stack. This can be illustrated by creating the following stored procedure:


    CREATE PROCEDURE ConversionException


    AS


    BEGIN


    SELECT CONVERT(int, ''abc'');


    END;


    GO


    Running this stored procedure followed by a PRINT shows that, even when an exception
    occurs in an inner scope (within the stored procedure), the outer batch is still
    aborted:


    EXEC ConversionException;


    PRINT ''This will NOT print!'';


    GO


    The result of this batch is the same as if no stored procedure was used:


    Msg 245, Level 16, State 1, Line 4


    Conversion failed when converting the varchar value ''abc'' to data type int.


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    Parsing and Scope-Resolution Exceptions


    Exceptions that occur during parsing or during the scope-resolution phase of compilation
    appear at first to behave just like batch-level exceptions. However, they actually
    have a slightly different behavior. If the exception occurs in the same scope
    as the rest of the batch, these exceptions will behave just like a batch-level
    exception. If, on the other hand, an exception occurs in a lower level of scope,
    these exceptions will behave just like statement-level exceptions—at least, as
    far as the outer batch is concerned.


    As an example, consider the following batch, which includes a malformed SELECT
    statement (this is a parse exception):


    SELECTxzy FROM SomeTable;


    PRINT ''This will NOT print!'';


    GO


