    \ HMAC 列来支持该类型的查询。\n\n你的应用程序在搜索条件上要求的灵活性越高，此解决方案就变得越不可行，并且必须创建的附加数据列就越多。这不仅会成为维护难题，还意味着更大的存储需求，并增加了数据暴露的风险。即使在存储相对安全的\
    \ HMAC 哈希值时，每个附加列都会为黑客提供更多关于你数据的信息，这些信息可能被用于发动定向攻击。\n\n## 范围搜索\n\n本章我将考虑的最后一个搜索加密数据的场景是范围查询。例如，我们如何识别信用卡号码范围在\
    \ `4929100012347890` 和 `4999100012349999` 之间的那些数据行？\n\n这些类型的搜索可能是最难用加密数据实现的，并且没有明显的解决方案：HMAC\
    \ 解决方案或其子串衍生物在这里没有帮助——顺序的明文数字显然不会导致顺序的密文值。事实上，当你处理单元级加密时，无法避免扫描并解密表中的每一行来完成范围查询。\n\
    \n如果要搜索的范围非常有限（例如，所提供值的 +/-10），则可能可以放弃加密，并在新列中存储部分明文值，例如信用卡的最后两位。通过一些查询重设计，查询可以被设计为基于此列促进某些范围查询，但这显然涉及巨大的风险，因为它甚至披露了敏感信息的部分明文。\n\
    \n如果必须支持范围查询，唯一其他的替代方法是依赖在 I/O 级别执行的加密形式之一，例如使用 `TDE`、`EFS` 或 `Windows BitLocker`\
    \ 的数据库加密。在这种情况下，解密是在非常低的级别执行的，以至于数据库引擎可以在不考虑数据在处理前可能已受到的任何加密的情况下操作数据。\n\n## 总结\n\
    \n加密构成了任何安全策略的重要组成部分，并且可以在阻止攻击者获取敏感或机密数据方面提供关键的最后一道防线。然而，它是有代价的——加密需要精心规划的策略和安全政策，并且几乎总是需要在数据库或应用程序级别进行设计更改才能成功实施。增加的安全性也必然会对性能产生负面影响。\n\
    \n由非确定性算法产生的加密数据不具备与正常数据相同的结构或模式。这意味着许多标准的数据库任务，如排序、过滤和连接，必须重新设计才能有效工作。尽管有方法可以绕过处理加密数据的一些限制，例如使用\
    \ HMAC 进行搜索和匹配，但它们并非在所有情况下都令人满意，如果可能，应设计应用程序以避免直接查询加密数据。\n\n# 第 7 章\n\n## SQLCLR：架构与设计考量\n\
    \n当微软在 SQL Server 2005 中首次宣布 SQL Server 将托管 .NET 公共语言运行时（CLR）时，这在数据库界引起了很多兴奋。其中一部分兴奋是来自开发者的热情支持，他们设想了许多数据库场景可能从\
    \ .NET 基础类库提供的方法中受益。然而，也有相当多的紧张和抵制来自 DBAs，他们担心新技术带来的威胁，以及传言说不怀好意的开发者将能够创建大量 DBA\
    \ 无法穿透的、编译好的进程内数据访问代码。\n\n事实证明，`SQLCLR` 集成既没有许多人想象的那么可怕，也没有那么有用。那些希望将 `SQLCLR`\
    \ 特性作为 `T-T-SQL` 完全替代品的人很快就被劝退了，因为编写 `CLR` 例程通常需要更多的代码，并且由于在 `CLR` 边界上封送数据的持续成本，性能和可靠性会受到影响。而对于那些本身不是\
    \ .NET 开发者的 DBA 来说，这个其实用途不多的功能涉及一个相当陡峭的学习曲线。\n\n我们与 `SQLCLR` 一起生活了四年多，尽管看起来 `CLR`\n"
- fmt: "# CHAPTER 7 SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS\n\nIntegration\
    \ features are still not being used that heavily, their adoption is certainly\
    \ growing. SQL Server 2008 lifts the previous restriction that constrained CLR\
    \ User-Defined Types (UDTs) to hold a maximum of only 8KB of data, which seriously\
    \ crippled many potential usage scenarios; all CLR UDTs may now hold up to a maximum\
    \ 2GB of data in a single item. This opens up lots of potential avenues for new\
    \ types of complex object-based data to be stored in the database, for which `SQLCLR`\
    \ is better suited than the predominantly set-based `T-SQL` engine. Indeed, SQL\
    \ Server 2008 introduces three new system-defined datatypes (`geometry`, `geography`,\
    \ and `hierarchyid`) that provide an excellent demonstration of the ways in which\
    \ `SQLCLR` can extend SQL Server to efficiently store and query types of data\
    \ beyond the standard numeric and character-based data typically associated with\
    \ SQL databases.\n\nI will cover the system-defined CLR datatypes in detail in\
    \ Chapters 10 and 12, which discuss spatial data and hierarchical data, respectively.\
    \ This chapter, however, concentrates on design and performance considerations\
    \ for exploiting user-defined functions based on managed code in SQL Server, and\
    \ discussion of when you should consider using `SQLCLR` over more traditional\
    \ `T-SQL` methods. It is my opinion that the primary strength of `SQLCLR` integration\
    \ is in the ability to both move and share code between tiers—so this chapter’s\
    \ primary focus is on maintainability and reuse scenarios.\n\n> **Note:** This\
    \ chapter assumes that you are already familiar with basic `SQLCLR` topics, including\
    \ how to create and deploy functions and catalog new assemblies, in addition to\
    \ the C# programming language.\n\n## Bridging the SQL/CLR Gap: The SqlTypes Library\n\
    \nThe native datatypes exposed by the .NET Framework and by SQL Server are in\
    \ many cases similar, but generally incompatible. A few major issues come up when\
    \ dealing with SQL Server and .NET interoperability from the perspective of data\
    \ types:\n\n- First and foremost, all native SQL Server data types are `nullable`—that\
    \ is, an instance of any given type can either hold a valid value in the domain\
    \ of the type or represent an unknown (`NULL`). Types in .NET generally do not\
    \ support this idea (note that C#'s `null` and VB .NET's `Nothing` are not the\
    \ same as SQL Server's `NULL`). Even though the .NET Framework supports nullable\
    \ types for value type variables, these do not behave in the same way as their\
    \ SQL Server equivalents.\n- The second difference between the type systems has\
    \ to do with implementation. Format, precision, and scale of the types involved\
    \ in each system differ dramatically. For example, .NET's `DateTime` type supports\
    \ a much larger range and much greater precision than does SQL Server's `datetime`\
    \ type.\n- The third major difference has to do with runtime behavior of types\
    \ in conjunction with operators. For example, in SQL Server, virtually all operations\
    \ involving at least one `NULL` instance of a type results in `NULL`. However,\
    \ this is not the same behavior as that of an operation acting on a `null` value\
    \ in .NET. Consider the following `T-SQL`:\n\n```sql\nDECLARE @a int = 10;\nDECLARE\
    \ @b int = null;\nIF (@a != @b)\n    PRINT 'test is true';\nELSE\n    PRINT 'test\
    \ is false';\n```\n\nThe result of any comparison to a `NULL` value in `T-SQL`\
    \ is undefined, so the preceding code will print \"test is false.\" However, consider\
    \ the equivalent function implemented using nullable `int` types in C# (denoted\
    \ by the `?` character after the type declaration):\n\n```csharp\nint? a = 10;\n\
    int? b = null;\nif (a != b)\n    Console.Write(\"test is true\");\nelse\n    Console.Write(\"\
    test is false\");\n```\n\nIn .NET, the comparison between `10` and `null` takes\
    \ place, resulting in the code printing \"test is true.\" In addition to nullability,\
    \ differences may result from handling overflows, underflows, and other potential\
    \ errors inconsistently. For instance, adding `1` to a 32-bit integer with the\
    \ value of `2147483647` (the maximum 32-bit integer value) in a .NET language\
    \ may result in the value \"wrapping"
