    and extremely easy to work with from a data manipulation point of view, suffers
    from inefficiencies due to the fact that the hierarchy must be traversed using
    either recursion or iteration. In this section we’ll look at an alternative technique
    that avoids this problem: **persisted materialized paths**. While this technique
    can act as a stand-alone replacement for adjacency lists, I recommend using it
    in conjunction with existing adjacency list hierarchies. In the following sections,
    I will show you how to maintain both hierarchy types alongside each other in the
    Employee_Temp table, using a series of triggers.


