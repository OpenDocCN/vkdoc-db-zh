    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    A basic implementation of a retry loop follows:


    DECLARE @Retries int;


    SET @Retries = 3;


    WHILE @Retries > 0


    BEGIN


    BEGIN TRY


    /*


    Put deadlock-prone code here


    */


    --If execution gets here, success


    BREAK;


    END TRY


    BEGIN CATCH


    IF ERROR_NUMBER() = 1205


    BEGIN


    SET @Retries = @Retries - 1;


    IF @Retries = 0


    RAISERROR(''Could not complete transaction!'', 16, 1);


    END


    ELSE


    RAISERROR(''Non-deadlock condition encountered'', 16, 1);


    BREAK;


    END CATCH


    END;


    GO


    In this example, the deadlock-prone code is retried as many times as the value
    of @Retries. Each time through the loop, the code is tried. If it succeeds without
    an exception being thrown, the code gets to the BREAK and the loop ends. Otherwise,
    execution jumps to the CATCH block, where a check is made to ensure that the error
    number is 1205 (deadlock victim). If so, the counter is decremented so that the
    loop can be tried again. If the exception is not a deadlock, another exception
    is thrown so that the caller knows that something went wrong. It’s important to
    make sure that the wrong exception does not trigger a retry.


    **Exception Handling and Defensive Programming**


    Exception handling is extremely useful, and its use in T-SQL is absolutely invaluable.
    However, I hope that all readers keep in mind that exception handling is no substitute
    for proper checking of error conditions *before* they occur. Whenever possible,
    code defensively—proactively look for problems, and if they can be both detected
    and handled, code around them.


    Remember that it’s generally a better idea to handle exceptions rather than errors.
    If you can predict a condition and write a code path to handle it during development,
    that will usually provide a much more robust solution than trying to trap the
    exception once it occurs and handle it then.


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    Exception Handling and SQLCLR


    The .NET Framework provides its own exception-handling mechanism, which is quite
    separate from the mechanism used to deal with exceptions encountered in T-SQL.
    So, how do the two systems interact when an exception occurs in CLR code executed
    within the SQLCLR process hosted by SQL Server?


    Let’s look at an example—the following C# code illustrates a simple CLR user-defined
    function (UDF) to divide one number by another:


    [Microsoft.SqlServer.Server.SqlFunction()]


    public static SqlDecimal Divide(SqlDecimal x, SqlDecimal y)


    {


    return x / y;


    }


    When cataloged and called from SQL Server with a value of 0 for the y parameter,
    the result is as follows:


    Msg 6522, Level 16, State 2, Line 1


    A .NET Framework error occurred during execution of user-defined routine or


    aggregate "Divide":


    System.DivideByZeroException: Divide by zero error encountered.


    System.DivideByZeroException:


    at System.Data.SqlTypes.SqlDecimal.op_Division(SqlDecimal x, SqlDecimal y)


    at ExpertSQLServer.UserDefinedFunctions.Divide(SqlDecimal x, SqlDecimal y)


    .


    SQL Server automatically wraps an exception handler around any managed code executed
    from'
  trans: "# 第四章 - 错误与异常\n\n`TRY/CATCH` 可以用来完全封装异常的一个有趣例子是处理死锁。虽然尝试找到并解决死锁的根源比通过编码绕开它更好，但这通常是一项困难且耗时的任务。因此，至少在临时情况下，通过让应用程序重新发出导致死锁的请求来处理死锁是很常见的。最终，死锁条件会自行解决（即，当另一个事务完成时），而\
    \ DML 操作将按预期执行。请注意，我不推荐将此作为解决反复发生的死锁情况的长期方案！\n\n通过使用 T-SQL 的 `TRY/CATCH` 语法，应用程序不再需要重新发出请求，甚至不需要知道发生了问题。可以设置一个重试循环，其中易发生死锁的代码可以在\
    \ `TRY` 块中尝试，而死锁则在 `CATCH` 块中被捕获，以便再次尝试。\n\n下面是一个重试循环的基本实现：\n\n```sql\nDECLARE\
    \ @Retries int;\n\nSET @Retries = 3;\n\nWHILE @Retries > 0\n\nBEGIN\n\n    BEGIN\
    \ TRY\n\n        /*\n\n        将易发生死锁的代码放在这里\n\n        */\n\n        --如果执行到达这里，表示成功\n\
    \n        BREAK;\n\n    END TRY\n\n    BEGIN CATCH\n\n        IF ERROR_NUMBER()\
    \ = 1205\n\n        BEGIN\n\n            SET @Retries = @Retries - 1;\n\n    \
    \        IF @Retries = 0\n\n                RAISERROR('无法完成事务!', 16, 1);\n\n \
    \       END\n\n        ELSE\n\n            RAISERROR('遇到非死锁条件', 16, 1);\n\n  \
    \      BREAK;\n\n    END CATCH\n\nEND;\n\nGO\n```\n\n在这个例子中，易发生死锁的代码会按照 `@Retries`\
    \ 的值进行重试。每次循环中，代码都会被尝试执行。如果它成功执行而没有抛出异常，代码就会执行到 `BREAK` 语句，循环结束。否则，执行会跳转到 `CATCH`\
    \ 块，在那里会检查错误编号是否为 1205（死锁牺牲品）。如果是，计数器会递减，以便可以再次尝试循环。如果异常不是死锁，则会抛出另一个异常，以便调用者知道出了问题。确保错误的异常不会触发重试非常重要。\n\
    \n## 异常处理与防御性编程\n\n异常处理极其有用，它在 T-SQL 中的应用更是无价之宝。然而，我希望所有读者记住，异常处理不能替代在错误条件发生*之前*对其进行的适当检查。只要可能，就应编写防御性代码——主动寻找问题，如果问题既能被检测到又能被处理，就编写代码来应对它们。\n\
    \n请记住，通常处理异常比处理错误是更好的主意。如果你能在开发期间预测到一个条件并编写代码路径来处理它，这通常会提供比试图在异常发生时捕获并处理它更健壮的解决方案。\n\
    \n## 异常处理与 SQLCLR\n\n.NET Framework 提供了其自己的异常处理机制，该机制与用于处理 T-SQL 中遇到的异常的机制完全不同。那么，当在\
    \ SQL Server 托管的 SQLCLR 进程中执行的 CLR 代码发生异常时，这两个系统如何交互呢？\n\n让我们看一个例子——下面的 C# 代码展示了一个简单的\
    \ CLR 用户定义函数 (UDF)，用于将一个数除以另一个数：\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction()]\n\
    \npublic static SqlDecimal Divide(SqlDecimal x, SqlDecimal y)\n\n{\n\n    return\
    \ x / y;\n\n}\n```\n\n当编录并在 SQL Server 中被调用，且 `y` 参数值为 0 时，结果如下：\n\n```\nMsg 6522,\
    \ Level 16, State 2, Line 1\n\n在执行用户定义例程或聚合 \"Divide\" 期间发生了 .NET Framework 错误:\n\
    \nSystem.DivideByZeroException: 遇到除以零错误。\n\nSystem.DivideByZeroException:\n\n\
    \   at System.Data.SqlTypes.SqlDecimal.op_Division(SqlDecimal x, SqlDecimal y)\n\
    \n   at ExpertSQLServer.UserDefinedFunctions.Divide(SqlDecimal x, SqlDecimal y)\n\
    \n.\n```\n\nSQL Server 会自动在其进程中执行的任何托管代码周围包装一个异常处理器。"
- fmt: "# Chapter 4: Errors and Exceptions\n\nwithin SQL Server. That means that if\
    \ the managed code throws an exception, it is caught by the wrapper, which then\
    \ generates an error. The error message contains details of the original exception,\
    \ together with a stack trace of when it occurred.\n\nIn this case, the original\
    \ CLR exception, `System.DivideByZeroException`, propagated a `6522` error, which\
    \ is the generic error message for any unhandled exception that occurs within\
    \ a SQLCLR function.\n\nAs previously stated, the best approach to deal with such\
    \ exceptions is to tackle them at the lowest level possible. In the case of a\
    \ UDF such as this, the exception should be handled within the CLR code itself\
    \ (using `try…catch`, for example), in which case it never needs to be caught\
    \ at the T-SQL level.\n\nOne interesting point this raises is how to deal with\
    \ exceptions arising in system-defined CLR routines, such as any methods defined\
    \ by the `geometry`, `geography`, or `hierarchyid` types. Consider the following\
    \ example, which attempts to instantiate variables of the `hierarchyid` and `geography`\
    \ datatypes with invalid values:\n\n```sql\nDECLARE @HierarchyId hierarchyid =\
    \ '/1/1';\n\nDECLARE @Geography geography = 'POLYGON((0 51, 0 52, 1 52, 1 51 ,0\
    \ 51))';\nGO\n```\n\nBoth of these statements will lead to CLR exceptions, reported\
    \ as follows:\n\n```text\nMsg 6522, Level 16, State 2, Line 1\nA .NET Framework\
    \ error occurred during execution of user-defined routine or aggregate \"hierarchyid\"\
    :\nMicrosoft.SqlServer.Types.HierarchyIdException: 24001: SqlHierarchyId.Parse\
    \ failed because the input string '/1/1' is not a valid string representation\
    \ of a SqlHierarchyId node.\nMicrosoft.SqlServer.Types.HierarchyIdException:\n\
    \   at Microsoft.SqlServer.Types.SqlHierarchyId.Parse(SqlString input).\n\nMsg\
    \ 6522, Level 16, State 1, Line 2\nA .NET Framework error occurred during execution\
    \ of user-defined routine or aggregate \"geography\":\nMicrosoft.SqlServer.Types.GLArgumentException:\
    \ 24205: The specified input does not represent a valid geography instance because\
    \ it exceeds a single hemisphere. Each geography instance must fit inside a single\
    \ hemisphere. A common reason for this error is that a polygon has the wrong ring\
    \ orientation.\nMicrosoft.SqlServer.Types.GLArgumentException:\n   at Microsoft.SqlServer.Types.GLNativeMethods.ThrowExceptionForHr(GL_HResult\
    \ errorCode)\n   at Microsoft.SqlServer.Types.GLNativeMethods.GeodeticIsValid(GeoData\
    \ g)\n   at Microsoft.SqlServer.Types.SqlGeography.IsValidExpensive()\n   at Microsoft.SqlServer.Types.SqlGeography.ConstructGeographyFromUserInput(GeoData\
    \ g, Int32 srid)\n   at Microsoft.SqlServer.Types.SqlGeography.GeographyFromText(OpenGisType\
    \ type, SqlChars taggedText, Int32 srid)\n   at Microsoft.SqlServer.Types.SqlGeography.STGeomFromText(SqlChars\
    \ geometryTaggedText, Int32 srid)\n   at Microsoft.SqlServer.Types.SqlGeography.Parse(SqlString\
    \ s)\n```\n\n`Note` As demonstrated by the preceding example code, exceptions\
    \ generated by managed code are statement-level exceptions—the second statement\
    \ was allowed to run even after the first had generated a `6522` error.\n\nHow\
    \ do we create specific code paths to handle such exceptions? Despite the fact\
    \ that they relate to very different situations, as both exceptions occurred within\
    \ managed code, the T-SQL error generated in each case is the same—generic error\
    \ `6522`. This means that we cannot use `ERROR_NUMBER()` to differentiate between\
    \ these cases. Furthermore, we cannot easily add custom error-handling to the\
    \ original function code, since these are system-defined methods defined within\
    \ the precompiled `Microsoft.SqlServer.Types.dll` assembly.\n\nOne approach would\
    \ to be define new custom CLR methods that wrap around each of the system-defined\
    \ methods in `SqlServer.Types.dll`, which check for and handle any CLR exceptions\
    \ before passing the result back to SQL Server. An example of such a wrapper placed\
    \ around the `geography` `Parse()` method is shown in the following code listing:\n\
    \n```csharp\n[Microsoft.SqlServer.Server.SqlFunction()]\npublic static SqlGeography\
    \ GeogTryParse(SqlString Input)\n{\n    SqlGeography result = new SqlGeography();\n\
    \    try\n    {\n        result = SqlGeography.Parse(Input);\n    }\n    catch\n\
    \    {\n        // Exception Handling code here\n        // Optionally, rethrow\
    \ the exception\n        // throw new Exception(\"An exception occurred that couldn't\
    \ be handled\");\n    }\n    return result;\n}\n```\n\nAlternatively, you could\
    \ create code paths that rely on parsing the contents of `ERROR_MESSAGE()` to\
    \ identify the details of the original CLR exception specified in the stack trace.\
    \ The exceptions generated by the system-defined CLR types have five-digit exception\
    \ numbers in the range `24000` to `24999`, so can be distilled from the `ERROR_MESSSAGE()`\
    \ string using the T-SQL `PATINDEX` function. The following code listing demonstrates\
    \ this approach when applied to the `hierarchyid` example given previously:\n\n\
    ```sql\nDECLARE @errorMsg nvarchar(max);\n\nBEGIN TRY\n    SELECT hierarchyid::Parse('/1/1');\n\
    END TRY\nBEGIN CATCH\n    SELECT @errorMsg = ERROR_MESSAGE();\n    SELECT SUBSTRING(@errorMsg,\
    \ PATINDEX('%: 24[0-9][0-9][0-9]%', @errorMsg) + 2, 5);\nEND CATCH\nGO\n```\n\n\
    The resulting value, `24001`, relates to the specific CLR exception that occurred\
    \ (“the input string is not a valid string representation of a SqlHierarchyId\
    \ node”), rather than the generic T-SQL error `6522`, and can be used to write\
    \ specific code paths to deal with such an exception.\n\n## Transactions and Exceptions\n\
    \nNo discussion of exceptions in SQL Server can be complete without mentioning\
    \ the interplay between transactions and exceptions. This is a fairly simple area,\
    \ but one that often confuses developers who don’t quite understand the role that\
    \ transactions play.\n\nSQL Server is a database management system (`DBMS`), and\
    \ as such one of its main goals is management and manipulation of data. Therefore,\
    \ at the heart of every exception-handling scheme within SQL Server must live\
    \ the idea that these are not mere exceptions—they’re also data issues.\n\n###\
    \ The Myths of Transaction Abortion\n\nThe biggest mistake that some developers\
    \ make is the assumption that if an exception occurs during a transaction, that\
    \ transaction will be aborted. By default, that is almost *never* the case. Most\
    \ transactions will live on even in the face of exceptions, as running the following\
    \ T-SQL will show:\n\n```sql\nBEGIN TRANSACTION;\nGO\nSELECT 1/0 AS DivideByZero;\n\
    GO\nSELECT @@TRANCOUNT AS ActiveTransactionCount;\nGO\n```\n\nThe output from\
    \ this T-SQL is as follows:\n\n```text\nDivideByZero\nMsg 8134, Level 16, State\
    \ 1, Line 1\nDivide by zero error encountered.\n\nActiveTransactionCount\n(1 row(s)\
    \ affected)\n```\n\nAnother mistake is the belief that stored procedures represent\
    \ some sort of atomic unit of work, complete with their own implicit transaction\
    \ that will get rolled back in case of an exception. Alas, this is also not the\
    \ case, as the following T-SQL proves:\n\n```sql\n--Create a table for some data\n\
    CREATE TABLE SomeData\n(\n    SomeColumn int\n);\nGO\n\n--This procedure will\
    \ insert one row, then throw a divide-by-zero exception\nCREATE PROCEDURE NoRollback\n\
    AS\nBEGIN\n    INSERT INTO SomeData VALUES (1);\n    INSERT INTO SomeData VALUES\
    \ (1/0);\nEND;\nGO\n\n--Execute the procedure\nEXEC NoRollback;\nGO\n\n--Select\
    \ the rows from the table\nSELECT *\nFROM SomeData;\nGO\n```\n\nThe result is\
    \ that, even though there is an error, the row that didn’t throw an exception\
    \ is still in the table; there is no implicit transaction arising from the stored\
    \ procedure:\n\n```text\nSomeColumn\n-----------\n1\n```\n\nEven if an *explicit*\
    \ transaction is begun in the stored procedure before the inserts and committed\
    \ after the exception occurs, this example will still return the same output.\
    \ By default, unless a rollback is explicitly issued, in most cases an exception\
    \ will not roll anything back. It will simply serve as a message that something\
    \ went wrong.\n\n### XACT_ABORT: Turning Myth into (Semi-)Reality"
