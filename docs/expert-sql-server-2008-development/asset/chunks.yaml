    为了创建代理登录（可用于委派服务器级别的权限，如`BULK INSERT`或`ALTER DATABASE`），你必须首先在`master`数据库中创建一个证书。证书的更多细节将在第
    6 章介绍，但目前你可以将证书视为一种无需密码即可验证主体身份的可信方式。以下语法可用于在`master`中创建证书。（请注意，在任何数据库中创建证书之前，都必须先创建一个主密钥。同样，请参阅第
    6 章。）


    ```sql

    USE master;

    GO


    CREATE CERTIFICATE Dinesh_Certificate

    ENCRYPTION BY PASSWORD = ''stR0n_G paSSWoRdS, pLE@sE!''

    WITH SUBJECT = ''Certificate for Dinesh'';

    GO

    ```


    证书创建完成后，可以使用`CREATE LOGIN FROM CERTIFICATE`语法创建代理登录，如下所示：


    ```sql

    CREATE LOGIN Dinesh

    FROM CERTIFICATE Dinesh_Certificate;

    GO

    ```


    此登录可以像任何其他登录一样被授予权限。但是，要使用这些权限，登录必须映射到一个数据库用户。这是通过使用创建登录时相同的证书，使用`CREATE USER
    FOR CERTIFICATE`语法来创建用户实现的。有关如何使用代理登录获取服务器级别权限的更多信息，请参阅本章后面的“使用证书进行存储过程签名”部分。


    ## 数据库级别代理


    可以通过向数据库添加一个未与服务器登录关联的用户来创建在数据库级别运行的代理主体。这使用`CREATE USER WITHOUT LOGIN`完成，如以下代码所示：


    ```sql

    CREATE USER Bob

    WITHOUT LOGIN;

    GO

    ```


    此用户与任何数据库用户一样，可以被分配所有权和其他权限。但是，无法登录服务器并以`Bob`身份进行身份验证。相反，你必须使用有效的服务器级别登录进行登录，并使用与你的登录关联的任何数据库用户对数据库进行身份验证。只有这样，你才能模拟`Bob`，承担该用户被分配的任何权限。本章后面的“使用`EXECUTE
    AS`进行基本模拟”一节将详细讨论这一点。


    ## 分层数据安全：洋葱模型


    一般来说，攻击者为了访问有价值的资源必须穿透的层级越多，阻止其攻击的机会就越大。开发者应努力为任何敏感数据构建多层保护，以确保如果一个安全措施被攻破，其他障碍仍能阻止攻击者。


    第一道防线是数据库服务器之外的所有内容，这些都属于身份验证范畴。一旦用户通过身份验证，SQL Server 的声明式权限系统就会启动，登录根据用户映射被授权访问一个或多个数据库。


    从那里，每个用户被授权访问数据库中的特定资源。可以在此处添加另一层以增强安全性，即使用存储过程。通过仅通过存储过程分配权限，可以在权限提升发生的时间和原因上保持更大的控制权——但本章稍后将对此进行更多介绍。


    当然，存储过程本身必须能够访问所需的任何表和列，如果需要，可以使用加密或行级安全方案进一步锁定这些资源。


    图 5-1 展示了在定义 SQL Server 安全方案时应考虑的一些层级，以最大化敏感数据的保护。本章的剩余部分主要讨论在用户通过身份验证后，如何使用存储过程作为访问数据的主要层级来最好地控制对资源的访问。


    存储过程层在数据访问方法和数据本身之间提供了一个理想的抽象层，允许通过参数或其他内联逻辑编程实现额外的安全性。

    '
- fmt: '# CHAPTER 5 PRIVILEGE AND AUTHORIZATION


    *Figure 5-1. Layering security provides multiple levels of protection against
    attack.*


    ## Data Organization Using Schemas


    For instance, it is trivial to log every access to sensitive data via a stored
    procedure, by including logging code in the procedure. Likewise, a stored procedure
    might be used to force users to access data on a granular basis by requiring parameters
    that are used as predicates to filter data. These security checks are difficult
    or impossible to force on callers without using stored procedures to encapsulate
    the data access logic.


    SQL Server 2008 supports ANSI standard schemas, which provide a method by which
    tables and other objects can be segmented into logical groups. Schemas are essentially
    containers into which any database object can be placed, and certain actions or
    rules applied en masse to every item in the schema. This makes tasks such as managing
    authorization considerably easier since, by dividing your database into schemas,
    you can easily group related objects and control permissions without having to
    worry about what objects might be added or removed from that collection in the
    future. As new objects are added to a schema, existing permissions propagate,
    thereby allowing you to set up access rights for a given schema once, and not
    have to manipulate them again as the database changes.


    To create a schema, use the `CREATE SCHEMA` command. The following T-SQL creates
    a schema called `Sales`:


    ```

    CREATE SCHEMA Sales;

    GO

    ```


    Optionally you can specify a schema owner by using the `AUTHORIZATION` clause.
    If an owner is not explicitly specified, SQL Server will assign ownership to the
    user that creates the schema.


    Once a schema is created, you can begin creating database objects within the schema,
    using two-part naming as follows:


    ```

    CREATE TABLE Sales.SalesData

    (

    SaleNumber int,

    SaleDate datetime

    );

    GO

    ```


    If an object belongs to a schema, then it must be referenced with its associated
    schema name; so to select from the `SalesData` table, the following SQL is used:


    ```

    SELECT *

    FROM Sales.SalesData;

    GO

    ```


    **Caution** In previous versions of SQL Server, references to tables were prefixed
    with the name of their owner (e.g., `Owner.SalesData`). This syntax is deprecated,
    and two-part naming in SQL Server 2008 references a schema rather than an object
    owner.


    The beauty of schemas becomes obvious when it is time to apply permissions to
    the objects in the schema. Assuming that each object should be treated identically
    from a permissions point of view, only a single grant is necessary to give a user
    access to every object within a schema. For instance, after the following T-SQL
    is run, the `Alejandro` user will have access to select rows from every table
    in the `Sales` schema, even if new tables are added later:


    ```

    CREATE USER Alejandro

    WITHOUT LOGIN;

    GO


    GRANT SELECT ON SCHEMA::Sales

    TO Alejandro;

    GO

    ```


    It’s important to note that, when initially created, the owner of any object in
    a schema will be the same as the owner of the schema itself. The individual object
    owners can be changed later, but in most cases I recommend that you keep everything
    in any given schema owned by the same user. This is especially important for ownership
    chaining, covered later in this chapter. To explicitly set the owner of an object
    requires the `ALTER AUTHORIZATION` command, as shown in the following T-SQL:


    ```

    --Create a user

    CREATE USER Javier

    WITHOUT LOGIN;

    GO


    --Create a table

    CREATE TABLE JaviersData

    (

    SomeColumn int

    );

    GO


    --Set Javier as the owner of the table

    ALTER AUTHORIZATION ON JaviersData

    TO Javier;

    GO

    ```


    As a final note on schemas, there is also a command that can be used to move objects
    between them. By using `ALTER SCHEMA` with the `TRANSFER` option, you can specify
    that a table should be moved to another schema:


    ```

    --Create a new schema

    CREATE SCHEMA Purchases;

    GO


    --Move the SalesData table into the new schema

    ALTER SCHEMA Purchases

    TRANSFER Sales.SalesData;

    GO

    ```'
