  trans: "\n简洁的代码是件好事，因此，与其让代码变得更复杂，我们有一个选择：要么凭运气祈祷系统在运行时永远不会崩溃，要么更好一些，实际约束数据以确保其保持有效。从防御的角度来看，我强烈推荐第二种方法。\n\
    \n有两个可能的问题会让层次查询变得棘手：**森林** 和 **循环**。\n\n`森林` 指的是在层次结构中存在多个根节点。虽然对于某些类型的数据来说这可能是合理的，但对于组织结构图来说则不然。`循环`\
    \ 指的是在给定节点的下游某处，该节点突然又被引用。例如，如果乔治管理艾德，艾德管理史蒂夫，而史蒂夫又管理乔治，就形成了一个循环——这不仅不现实，还会因为无限循环而导致运行时异常！\n\
    \n我们一直在使用的 `Employee_Temp` 表已经具备了一些有助于防范特定问题的约束：一个主键和一个自引用外键。位于 `EmployeeID` 列上的主键通过确保一个给定的员工不可能有多个经理来防范大多数循环。而自引用外键则能防范大多数森林问题，因为每个节点都必须连接到另一个已存在的节点——除非它是根节点。\n\
    \n# 第 12 章 树、层次结构和图\n\n首先必须约束的是多个根节点。处理此问题可能想到的一种方法是使用触发器，但我发现使用索引视图更有趣：\n\n```sql\n\
    CREATE VIEW OnlyOneRoot\nWITH SCHEMABINDING\nAS\nSELECT\n    ManagerID\nFROM dbo.Employee_Temp\n\
    WHERE\n    ManagerID IS NULL;\nGO\n\nCREATE UNIQUE CLUSTERED INDEX IX_OnlyOneRoot\n\
    ON OnlyOneRoot (ManagerID);\nGO\n```\n\n该视图返回表中所有 `NULL` 经理 ID 的行，而索引因为是 `UNIQUE`\
    \ 的，所以只允许插入一行这样的记录。\n\n虽然这种方法能有效防止创建多个根节点，但它并不能强制执行层次结构应始终有 *恰好* *一个* 根节点的条件。例如，它无法阻止有人为根节点分配一个经理（唯一约束只能约束存在的行，通过更新表，`NULL`\
    \ 经理 ID 将不复存在）。为了解决这个问题，可以使用触发器来确保表中始终至少有一个 `NULL` 经理 ID：\n\n```sql\nCREATE TRIGGER\
    \ tg_AtLeastOneRoot\nON Employee_Temp\nFOR UPDATE\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n\n    IF NOT EXISTS\n    (\n        SELECT *\n        FROM Employee_Temp\n\
    \        WHERE ManagerID IS NULL\n    )\n    BEGIN\n        RAISERROR('需要根节点',\
    \ 16, 1);\n        ROLLBACK;\n    END\nEND;\nGO\n```\n\n为了消除循环的可能性，我们需要考虑表中可能存在哪些类型的循环。首先，最简单的循环——也是主键或外键都无法约束的——是员工管理自己。这可以通过一个检查约束轻松解决：\n\
    \n```sql\nALTER TABLE Employee_Temp\nADD CONSTRAINT ck_ManagerIsNotEmployee\n\
    CHECK (EmployeeID <> ManagerID);\nGO\n```\n\n这个约束对更深层次的循环无能为力，即一个员工在自己下方一层或多层管理自己。例如，如果乔治管理艾德，艾德管理史蒂夫，有人可能会更新表，让艾德管理乔治。这将产生一个更深层次的循环，而该约束将无法捕获。为了解决这个问题，可以使用触发器。触发器应该从更新的行开始，沿着树向上遍历到根节点。如果在到达根节点之前再次遇到同一个员工，就说明存在循环。以下是这样一个触发器的代码：\n\
    \n```sql\nCREATE TRIGGER tg_NoCycles\nON Employee_Temp\nFOR UPDATE\nAS\nBEGIN\n\
    \    SET NOCOUNT ON;\n\n    --仅当 ManagerID 列被更新时才检查\n    IF NOT UPDATE(ManagerID)\n\
    \        RETURN;\n\n    --避免循环\n    DECLARE @CycleExists bit = 0;\n\n    --沿着层次结构向上朝叶子节点遍历\n\
    \    WITH e AS\n    (\n        SELECT EmployeeID, ManagerID\n        FROM inserted\n\
    \        UNION ALL\n        SELECT e.EmployeeID, et.ManagerID\n        FROM Employee_Temp\
    \ et\n        JOIN e ON e.ManagerID = et.EmployeeID\n        WHERE\n         \
    \   et.ManagerID IS NOT NULL\n            AND e.ManagerID <> e.EmployeeID\n  \
    \  )\n    SELECT @CycleExists = 1\n    FROM e\n    WHERE e.ManagerID = e.EmployeeID;\n\
    \n    IF @CycleExists = 1\n    BEGIN\n        RAISERROR('该更新引入了循环', 16, 1);\n\
    \        ROLLBACK;\n    END\nEND\nGO\n```\n\n这种类型的循环只能由更新或多行插入引起，而在实际生产环境的几乎所有层次结构中，都不存在多行插入。因此，该触发器设置为仅在更新时触发。如果你的环境中需要处理多行插入，请记得修改触发器定义。\n\
    \n`注意` 过度或不恰当地使用触发器会降低查询性能。虽然本节提出的解决方案在数据库中使用触发器解决了循环问题，但如果你觉得在应用层强制执行此类业务逻辑更有意义，也可以考虑这种方式。\n\
    \n## 持久化物化路径\n\n邻接表模型虽然是建模层次结构的事实标准，并且从数据操作的角度来看极其易于使用，但由于必须使用递归或迭代来遍历层次结构，因此存在效率低下的问题。在本节中，我们将探讨一种避免此问题的替代技术：`持久化物化路径`。虽然该技术可以作为邻接表的独立替代方案，但我建议将其与现有的邻接表层次结构结合使用。在接下来的章节中，我将展示如何通过一系列触发器，在\
    \ `Employee_Temp` 表中同时维护这两种层次结构类型。\n\n在上一节的示例中，物化路径用于为输出目的提供层次结构的有序表示。相同的路径可以持久化存储在表中，使你能够回答与邻接表相同的所有层次问题，而无需递归或迭代。\n\
    \n要向 `Employee_Temp` 表添加并填充一个物化路径列，首先添加一个类型为 `varchar(900)` 的新列，然后使用递归 CTE 来获取每个节点的路径并更新表：\n\
    \n```sql\nALTER TABLE Employee_Temp\nADD thePath varchar(900);\nGO\n\nWITH n AS\n\
    (\n    SELECT\n        EmployeeID,\n        CONVERT(varchar(900),\n          \
    \  '/' + CONVERT(varchar, EmployeeID) + '/'\n        ) AS thePath\n    FROM Employee_Temp\n\
    \    WHERE ManagerID IS NULL\n\n    UNION ALL\n\n    SELECT\n        e.EmployeeID,\n\
    \        CONVERT(varchar(900),\n            n.thePath +\n            CONVERT(varchar,\
    \ e.EmployeeID) + '/'\n        ) AS thePath\n    FROM Employee_Temp e\n    JOIN\
    \ n ON n.EmployeeID = e.ManagerID\n)\nUPDATE Employee_Temp\nSET Employee_Temp.thePath\
    \ = n.thePath\nFROM Employee_Temp\nJOIN n ON n.EmployeeID = Employee_Temp.EmployeeID;\n\
    GO\n```\n\n`varchar(900)` 在这个案例中很重要，因为物化路径将被用作索引键，以便能够高效地用于遍历层次结构。SQL Server 中的索引键限制为\
    \ 900 字节。这对于持久化物化路径也是一个限制；导航特别深的层次结构的路径将无法被索引，因此无法用于此技术。\n"
- fmt: "# 物化路径（Materialized Path）的索引与查询\n\n与纯邻接表层次结构一样，持久化物化路径的最佳索引方案应通过针对特定工作负载的仔细测试来确定。尽管如此，我几乎可以保证，**聚集索引**永远不会是正确的选择。由于路径可能变得非常大，并且每个非聚集索引都会继承聚集索引的键，因此在路径上进行聚集会增大表上创建的每个索引的页面大小。路径在非索引形式下不带来任何价值，因此我不建议尝试该技术。相反，应创建一个非聚集覆盖索引，并使用\
    \ `INCLUDE` 子句来包含通常与数据的层次搜索结合使用的任何列。在 `Employee_Temp` 表的情况下，索引将包含 `Title` 和 `EmployeeID`\
    \ 列，以便可以通过物化路径最有效地生成先前显示的输出（该表聚集在 `ManagerID` 上，因此无需显式包含）：\n\n```sql\nCREATE NONCLUSTERED\
    \ INDEX IX_Employee_Temp_Path\nON Employee_Temp (thePath)\nINCLUDE (EmployeeID,\
    \ Title);\n```\n\n## 查找下属节点\n\n由于物化路径是一个字符串，我们可以利用 SQL Server 的 `LIKE` 谓词来遍历层次结构。对于作为某个节点\
    \ M 的下属的每个给定节点 N，其路径以节点 M 的路径开头。回顾上一节中枚举路径的结果，注意由于所有节点都是 EmployeeID 109（CEO）的后代，每个路径都以字符串\
    \ `109/` 开头。\n\n同样，在层次结构中向下移动时，每个下属节点都会继承其父节点的路径，并将自己的 ID 添加到末尾。\n\n因此，使用 `LIKE`\
    \ 谓词并添加通配符字符 `%`，即可简单地搜索给定员工的所有下属。以下查询使用物化路径查找工程副总裁（EmployeeID 12）的所有下属：\n\n```sql\n\
    DECLARE @Path varchar(900);\nSELECT @Path = thePath\nFROM Employee_Temp\nWHERE\
    \ EmployeeID = 12;\n\nSELECT *\nFROM Employee_Temp\nWHERE\n    thePath LIKE @Path\
    \ + '%'\nORDER BY thePath;\n```\n\n即使对于小表，此查询与 CTE 解决方案相比的性能也相当令人印象深刻。使用 CTE 查找副总裁的所有下属，查询引擎必须执行\
    \ 187 次逻辑读取。而使用物化路径仅需 6 次。\n\n仅查找给定节点的直接报告则稍微复杂一些。这次，裸通配符不起作用，因为它将返回输入节点、其子节点以及子节点的子节点。要排除输入节点，我们可以将谓词更改为\
    \ `thePath LIKE @Path + '%/'`。这对于输入节点将返回 false，因为其路径中没有额外的斜杠。然而，这仍然包括所有子节点，因为每个子节点的路径都带有斜杠后缀。要排除子节点的子节点，必须添加以下\
    \ `NOT LIKE` 谓词：`AND thePath NOT LIKE @Path + '%/%/'`。本质上，该谓词表示目标路径只能比输入路径多一个斜杠——因此，该路径深度低一级。以下\
    \ T-SQL 查找工程副总裁的直接报告：\n\n```sql\nDECLARE @Path varchar(900);\nSELECT @Path = thePath\n\
    FROM Employee_Temp\nWHERE EmployeeID = 12;\n\nSELECT *\nFROM Employee_Temp\nWHERE\n\
    \    thePath LIKE @Path + '%/'\n    AND thePath NOT LIKE @Path + '%/%/';\n```\n\
    \n## 向上遍历层次结构\n\n持久化物化路径的一个限制是，没有特别有效的方法来使用它们向上遍历层次结构以生成“我们如何从当前节点到达 CEO”的报告。然而，物化路径本身已经包含了所有必要的信息——只是需要对数据进行一些操作才能将其转换为可用的格式。"
  raw: 'As with a pure adjacency list hierarchy, the best indexing scheme for a persisted
    materialized path should be determined through careful testing of your particular
    workload. That said, I can all but guarantee that a clustered index will never
    be the right choice. Since the paths can grow quite large, and every nonclustered
    index inherits the clustered index’s keys, clustering on the path will grow the
    page sizes of every index created on the table. The path doesn’t bring any value
    in its nonindexed form, so I don’t recommend trying that technique. Instead, create
    a nonclustered covering index, and use the INCLUDE clause to bring along any columns
    that are commonly used in conjunction with hierarchical searches of the data.
    In the case of the Employee_Temp table, the index will include the Title and EmployeeID
    columns so that the same output shown before can be most efficiently produced
    via the materialized path (the table is clustered on ManagerID, so that does not
    have to be explicitly included): CREATE NONCLUSTERED INDEX IX_Employee_Temp_Path


    ON Employee_Temp (thePath)


    INCLUDE (EmployeeID, Title);


    Finding Subordinates


    Since the materialized path is a string, we can take advantage of SQL Server’s
    LIKE predicate to traverse down the hierarchy. The path for every given node N
    that is a subordinate of some node M starts with node M’s path. Looking back at
    the results of the enumerated path contained in the last section, notice that
    since all nodes are descendants of EmployeeID 109 (the CEO), every path starts
    with the string 109/.


    Likewise, moving down the hierarchy, every subordinate node inherits its parent’s
    path and adds its own ID to the end.


    Therefore, searching for all subordinates of a given employee is as simple as
    using the LIKE


    predicate and adding the wildcard character, %. The following query finds all
    subordinates of the Vice President of Engineering (EmployeeID 12), using the materialized
    path:


    DECLARE @Path varchar(900);


    SELECT @Path = thePath


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    FROM Employee_Temp


    WHERE EmployeeID = 12;


    SELECT *


    FROM Employee_Temp


    WHERE


    thePath LIKE @Path + ''%''


    ORDER BY thePath;


    Performance of this query compared to the CTE solution, even against the small
    table, is fairly impressive. To find all subordinates of the Vice President using
    the CTE, the query engine must perform 187 logical reads. To do the same thing
    using the materialized path requires only 6.


    Finding only the direct reports for a given node is just a bit trickier. This
    time, a naked wildcard does not do the trick, as it will return the input node,
    its children, and children of its children. To eliminate the input node, we can
    change the predicate to thePath LIKE @Path + ''%/''. This will return false for
    the input node, since the additional oblique stroke is not present in its path.
    However, this still includes all children nodes, as each has a path suffixed by
    a stroke. To eliminate children of children, the following NOT LIKE predicate
    must be added: AND thePath NOT LIKE @Path + ''%/%/''. Essentially, this predicate
    says that the target path can only have one more stroke than the input path—and
    therefore, that path is one level of depth below. The following T-SQL finds the
    direct reports for the Vice President of Engineering:


    DECLARE @Path varchar(900);


    SELECT @Path = thePath


    FROM Employee_Temp


    WHERE EmployeeID = 12;


    SELECT *


    FROM Employee_Temp


    WHERE


    thePath LIKE @Path + ''%/''


    AND thePath NOT LIKE @Path + ''%/%/'';


    Navigating up the Hierarchy


    One of the limitations of persisted materialized paths is that there is no especially
    efficient way to use them to navigate up the hierarchy in order to produce the
    “how do we get to the CEO from the current node” report. However, the materialized
    path itself already contains all of the information necessary—


    it’s just that the data needs to be manipulated a bit to get it into a usable
    format.'
