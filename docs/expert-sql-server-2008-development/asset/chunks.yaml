  trans: '

    防御性编程是一种软件开发中使用的方法论，它建议开发者应主动预测并为（或“防范”）不可预见的未来事件做出预案。


    防御性编程的目标是创建即使在面临意外情况时也能保持健壮和有效的应用程序。


    防御性编程本质上是对世界持悲观看法——如果某事可能出错，它就会出错：网络资源会在事务处理中途变得不可用；所需的文件可能缺失或损坏；用户输入数据的方式可能与预期有无数种不同，等等。防御性程序员不会听天由命，而是会预测到这些可能性，并编写相应的处理代码来检查和处理这些情况。这意味着潜在的错误状况可以在实际错误发生前被检测并处理。


    请注意，防御性编程不一定能使应用程序在异常情况发生时继续运行，但它确实使系统能够以一种可预测的、受控的方式运行——实现*优雅降级*，而非冒着导致未知后果的崩溃风险。在许多情况下，可能可以识别并隔离导致故障的特定组件，从而允许应用程序的其余部分继续运行。


    # 第二章：数据库编程最佳实践


    防御性编程实践并没有一个明确的列表，但普遍认为在开发中采取防御姿态包括以下原则：


    *   保持简单（或 `KISS`——保持简单，愚蠢）。应用程序的强大和有效并非源于其复杂性，而是源于其优雅的简洁。复杂性会隐藏缺陷，应在应用程序设计和编码实践中都予以避免。

    *   “即使没坏，也要修复它。”防御性编程鼓励持续、主动地进行测试，并为应用程序做未来的防护，以应对未来可能发生的破坏性变更，而不是等待东西坏掉。

    *   在所有的阶段和开发过程中都保持质疑、彻底和谨慎。应进行“如果……会怎样？”的分析，以识别在应用程序正常（和非正常）使用期间可能发生的异常场景。

    *   应与不同的同行群体（包括其他开发人员或技术团队、顾问、最终用户和管理人员）进行广泛的代码审查和测试。这些不同的群体可能有不同的隐含假设，而这些假设可能不会被封闭的开发团队考虑到。

    *   应尽可能避免假设。如果一个应用程序需要某个条件为真才能正确运行，则应有一个对此的显式断言，并且应插入相应的代码路径来根据结果进行检查并采取相应行动。

    *   应用程序应由简短、高内聚、松耦合的模块构建而成。以这种方式良好封装的模块可以被彻底地独立测试，然后可以在整个应用程序中自信地复用。复用特定的代码模块，而不是复制功能，可以减少引入新缺陷的机会。


    在本章的剩余部分，我将提供我认为是展示上述每项原则的最佳实践的简单示例，并且这些概念将在本书的后续章节中不断被重新审视。


    ## 对防御性编程的态度


    采用防御性编程方法的关键优势本质上是双重的：


    *   防御性应用程序通常健壮且稳定，需要较少的关键缺陷修复，并且更能抵御那些在其他情况下可能导致昂贵故障或崩溃的情况。因此，它们具有较长的预期寿命和相对较低的持续维护成本。

    '
- fmt: '# BEST PRACTICES FOR DATABASE PROGRAMMING


    In many cases, defensive programming can lead to an improved user experience.
    By actively foreseeing and allowing for exceptional circumstances, errors can
    be caught `before` they occur, rather than having to be handled afterward. Exceptions
    can be isolated and handled with a minimum negative effect on user experience,
    rather than propagating an entire system failure. Even in the case of extreme
    unexpected conditions being encountered, the system can still degrade gracefully
    and act according to documented behavior.


    However, as with any school of thought, defensive programming is not without its
    opponents. Some of the criticisms commonly made of defensive coding are listed
    following. In each case, I’ve tried to give a reasoned response to each criticism.


    ## *Defensive code takes longer to develop.*


    It is certainly true that following a defensive methodology can result in a longer
    up-front development time when compared to applications developed following other
    software practices. Defensive programming places a strong emphasis on the initial
    requirements-gathering and architecture design phases, which may be longer and
    more involved than in some methodologies. Coding itself takes longer because additional
    code paths may need to be added to handle checks and assertions of assumptions.


    Code must be subjected to an extensive review that is both challenging and thorough,
    and then must undergo rigorous testing. All these factors contribute to the fact
    that the overall development and release cycle for defensive software is longer
    than in other approaches.


    There is a particularly stark contrast between defensive programming and so-called
    `agile` development practices, which focus on releasing frequent iterative changes
    on a very accelerated development and release cycle. However, this does not necessarily
    mean that defensive code takes longer to develop when considered over the full
    life cycle of an application. The additional care and caution invested in code
    at the initial stages of development are typically paid back over the life of
    the project, because there is less need for code fixes to be deployed once the
    project has gone live.


    ## *Writing code that anticipates and handles every possible scenario makes defensive
    applications bloated.*


    `Code bloat` suggests that an application contains unnecessary, inefficient, or
    wasteful code. Defensive code protects against events that may be `unlikely` to
    happen, but that certainly doesn’t mean that they can’t happen. Taking actions
    to explicitly test for and handle exceptional circumstances up front can save
    lots of hours spent possibly tracing and debugging in the future. Defensive applications
    may contain more total lines of code than other applications, but all of that
    code should be well designed, with a clear purpose. Note that the label of “defensive
    programming” is sometimes misused: the addition of unnecessary checks at every
    opportunity without consideration or justification is *not* defensive programming.
    Such actions lead to code that is both complex and rigid. Remember that true defensive
    programming promotes simplicity, modularization, and code reuse, which actually
    reduces code bloat.


    ## *Defensive programming hides bugs that then go unfixed, rather than making
    them visible.*


    This is perhaps the most common misconception applied to defensive practices,
    which manifests from a failure to understand the fundamental attitude toward errors
    in defensive applications. By explicitly identifying and checking exceptional
    scenarios, defensive programming actually takes a very proactive approach to the
    identification of errors. However, having encountered a condition that could lead
    to an exceptional circumstance, defensive applications are designed to fail gracefully—that
    is, at the point of development, potential scenarios that may lead to exceptions
    are identified and code paths are created.


    25


