    JOIN sys.dm_os_schedulers os ON ot.scheduler_id = os.scheduler_id


    CROSS APPLY sys.dm_exec_sql_text(er.sql_handle) est


    WHERE


    rgwg.name IN (''GroupA'', ''GroupB'');


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    The results indicate that the two queries are being executed under different schedulers
    executing on different CPUs:


    group_name SQL scheduler_id cpu_id status


    GroupA WHILE(1=1) SELECT REPLICATE(''a''... 0 0 running


    GroupB WHILE(1=1) SELECT REPLICATE(''b''... 1 1 runnable


    Since each query is executing against a separate scheduler, once again there is
    no contention for CPU resource, and so the MAX_CPU_PERCENT limit is not enforced.


    In order to be able to demonstrate the effects of the Resource Governor more clearly,
    it is necessary to constrain the execution of SQL Server threads to a single CPU
    by setting the affinity mask as follows: sp_configure ''show advanced options'',
    1;


    RECONFIGURE;


    GO


    sp_configure ''affinity mask'', 1;


    RECONFIGURE;


    GO


    „ **Caution** Calling sp_configure ''affinity mask'' with the bitmask value 1
    will assign all SQL Server threads to Processor 0, irrespective of how many CPU
    cores are present on the system. You should exercise extreme caution when setting
    this option, even in testing environments.


    The results of changing the CPU affinity mask on my system are shown in Figure
    9-4.


