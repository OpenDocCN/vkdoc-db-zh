  trans: "\n# 第十二章 树、层次结构与图\n\n如果该图中的边被设定为有向边，则没有问题。如果你需要某条边具有两个方向，只需同时插入两个方向即可，而对于有向边则不要同时插入两者。另一方面，如果所有的边都应该是无向的，那么就需要一个约束来确保不能插入逻辑上相同的两条路径。\n\
    \n主键显然不足以实施此约束，因为它将每种组合都视为唯一的。解决此问题最明显的办法是创建一个触发器，在执行插入或更新操作时检查这些行。由于主键已经强制禁止插入重复的有向路径，该触发器只需检查其反向路径即可。\n\
    \n在创建触发器之前，请先清空 `Edges` 表，使其不再包含刚刚插入的重复无向边：\n\n```sql\nTRUNCATE TABLE Edges;\n\
    GO\n```\n\n然后创建一个触发器，该触发器将在插入或更新行时进行如下检查：\n\n```sql\nCREATE TRIGGER CheckForDuplicates\n\
    ON Edges\nFOR INSERT, UPDATE\nAS\nBEGIN\n    IF EXISTS\n    (\n        SELECT\
    \ *\n        FROM Edges e\n        WHERE\n            EXISTS\n            (\n\
    \                SELECT *\n                FROM inserted i\n                WHERE\n\
    \                    i.X = e.Y\n                    AND i.Y = e.X\n          \
    \  )\n    )\n    BEGIN\n        ROLLBACK;\n    END\nEND;\nGO\n```\n\n现在，尝试重新插入前面列出的两行数据，将会导致触发器结束事务并对第二行执行回滚，从而防止创建重复的边。\n\
    \n一个稍微巧妙一些的约束路径唯一性的方法是利用索引视图。你可以利用索引视图具有唯一索引这一特性，将其用作约束，适用于触发器显得笨拙的此类场景。为了创建索引视图，你将需要一个数字表（也称为计数表），它只包含一列\
    \ `Number`，并且该列是主键。以下代码清单创建了这样一个表，并填充了从 1 到 8000 的所有数字：\n\n```sql\nSELECT TOP\
    \ (8000)\n    IDENTITY(int, 1, 1) AS Number\nINTO Numbers\nFROM master..spt_values\
    \ a\nCROSS JOIN master..spt_values b;\n\nALTER TABLE Numbers\nADD PRIMARY KEY\
    \ (Number);\nGO\n```\n\n## 注意\n\n我们实际上并不需要 `Numbers` 表中的全部 8000 行（事实上，这里描述的解决方案只需要两个不同的行），但在许多其他场景中，你可能需要一个更大的数字表，因此现在预先用额外的行填充该表并无坏处。\n\
    \n`master..spt_values` 表是一个随意选择的系统表，仅仅是因为它有足够的行，当与自身进行交叉连接时，输出将超过 8000 行。\n\n\
    数字表在你需要进行行间操作和前瞻逻辑的许多情况下都非常有用，尤其是在处理字符串时。然而，在当前这个案例中，它的用途相当简单：与 `Numbers` 表进行\
    \ `CROSS JOIN`，结合一个 `WHERE` 条件，将产生一个输出，其中包含 `Edges` 表中每行对应的两行数据。然后，一个 `CASE` 表达式将用于交换\
    \ `X` 和 `Y` 列的值——反转路径方向——用于每对重复项中的一行。以下视图封装了此逻辑：\n\n```sql\nCREATE VIEW DuplicateEdges\n\
    WITH SCHEMABINDING\nAS\nSELECT\n    CASE n.Number\n        WHEN 1 THEN e.X\n \
    \       ELSE e.Y\n    END X,\n    CASE n.Number\n        WHEN 1 THEN e.Y\n   \
    \     ELSE e.X\n    END Y\nFROM Edges e\nCROSS JOIN Numbers n\nWHERE\n    n.Number\
    \ BETWEEN 1 AND 2;\nGO\n```\n\n视图创建后，可以为其创建索引，以约束重复路径：\n\n```sql\nCREATE UNIQUE\
    \ CLUSTERED INDEX IX_NoDuplicates\nON DuplicateEdges (X,Y);\nGO\n```\n\n由于该视图在逻辑上包含了插入表中的两条路径及其反向路径，唯一索引可用于防止重复。两种技术具有相似的性能特点，但不可否认的是，索引视图有其独特的优势。它还可以兼作快速查找，用于查找有向表示法中的所有路径。\n"
- fmt: "# CHAPTER 12: TREES, HIERARCHIES, AND GRAPHS\n\n**Note** Once you have chosen\
    \ either the trigger or the indexed view approach to prevent duplicate edges,\
    \ be sure to delete all rows from the `Edges` table again before executing any\
    \ of the remaining code listings in this chapter.\n\n## Basic Graph Queries: Who\
    \ Am I Connected To?\n\nBefore traversing the graph to answer questions, it’s\
    \ again important to discuss the differences between directed and undirected edges\
    \ and the way in which they are modeled. Figure 12-4 shows two graphs: I is undirected\
    \ and J is directed.\n\n`Figure 12-4. Directed and undirected graphs have different\
    \ connection qualities.`\n\nThe following node pairs can be used to represent\
    \ the edges whether or not the `Edges` table is considered to be directed or undirected:\n\
    \n```sql\nINSERT INTO Edges VALUES (2, 1), (1, 3);\nGO\n```\n\nNow we can answer\
    \ a simple question: starting at a specific node, what nodes can we traverse to?\n\
    \nIn the case of a directed graph, any node `Y` is accessible from another node\
    \ `X` if an edge exists that starts at `X` and ends at `Y`. This is easy enough\
    \ to represent as a query (in this case, starting at node 1):\n\n```sql\nSELECT\
    \ Y\nFROM Edges e\nWHERE X = 1;\n```\n\nFor an undirected graph, things get a\
    \ bit more complex because any given edge between two nodes can be traversed in\
    \ either direction. In that case, any node `Y` is accessible from another node\
    \ `X` if an edge is represented as either starting at `X` and ending at `Y`, or\
    \ the other way around. We need to consider all edges for which node `Y` is either\
    \ the start or endpoint, or else the graph has effectively become directed.\n\n\
    To find all nodes accessible from node 1 now requires a bit more code:\n\n```sql\n\
    SELECT\n  CASE\n    WHEN X = 1 THEN Y\n    ELSE X\n  END\nFROM Edges e\nWHERE\n\
    \  X = 1 OR Y = 1;\n```\n\nAside from the increased complexity of this code, there’s\
    \ another much more important issue: performance on larger sets will start to\
    \ suffer due to the fact that the search argument cannot be satisfied based on\
    \ an index seek because it relies on two columns with an `OR` condition. The problem\
    \ can be fixed to some degree by creating multiple indexes (one in which each\
    \ column is the first key) and using a `UNION ALL` query, as follows:\n\n```sql\n\
    SELECT Y\nFROM Edges e\nWHERE X = 1\nUNION ALL\nSELECT X\nFROM Edges e\nWHERE\
    \ Y = 1;\n```\n\nThis code is somewhat unintuitive, and because both indexes must\
    \ be maintained and the query must do two index operations to be satisfied, performance\
    \ will still suffer compared with querying the directed graph. For that reason,\
    \ I recommend generally modeling graphs as directed and dealing with inserting\
    \ both pairs of edges unless there is a compelling reason not to, such as an extremely\
    \ large undirected graph where the extra edge combinations would challenge the\
    \ server’s available disk space.\n\nThe remainder of the examples in this chapter\
    \ will assume that the graph is directed.\n\n## Traversing the Graph\n\nFinding\
    \ out which nodes a given node is directly connected to is a good start, but in\
    \ order to answer questions about the structure of the underlying data, the graph\
    \ must be traversed. For this section, a more rigorous example data set is necessary.\
    \ Figure 12-5 shows an initial sample graph representing an abbreviated portion\
    \ of a street map for an unnamed city.\n\n`Figure 12-5. An abbreviated street\
    \ map`\n\nA few tables are required to represent this map—to begin with, a table\
    \ of streets:\n\n```sql\nCREATE TABLE Streets\n(\n  StreetId int NOT NULL PRIMARY\
    \ KEY,\n  StreetName varchar(75)\n);\nGO\n\nINSERT INTO Streets VALUES\n(1, '1st\
    \ Ave'), (2, '2nd Ave'),\n(3, '3rd Ave'), (4, '4th Ave'), (5, 'Madison');\nGO\n\
    ```\n\nEach street is assigned a surrogate key so that it can be referenced easily\
    \ in other tables.\n\nThe next requirement is a table of intersections—the nodes\
    \ in the graph. This table creates a key for each intersection, which is defined\
    \ in this set of data as a collection of one or more streets:\n\n```sql\nCREATE\
    \ TABLE Intersections\n(\n  IntersectionId int NOT NULL PRIMARY KEY,\n  IntersectionName\
    \ varchar(10)\n);\nGO\n\nINSERT INTO Intersections VALUES\n(1, 'A'), (2, 'B'),\
    \ (3, 'C'), (4, 'D');\nGO\n```\n\nNext is a table called `IntersectionStreets`,\
    \ which maps streets to their respective intersections. Note that I haven’t included\
    \ any constraints on this table, as they can get quite complex. One constraint\
    \ that might be ideal would specify that any given combination of streets should\
    \ not intersect more than once. However, it’s difficult to say whether this would\
    \ apply to all cities, given that many older cities have twisting roads that may\
    \ intersect with each other at numerous points. Dealing with this issue is left\
    \ as an exercise for you to try on your own.\n\n```sql\nCREATE TABLE IntersectionStreets\n\
    (\n  IntersectionId int NOT NULL\n    REFERENCES Intersections (IntersectionId),\n\
    \  StreetId int NOT NULL\n    REFERENCES Streets (StreetId),\n  PRIMARY KEY (IntersectionId,\
    \ StreetId)\n);\nGO\n\nINSERT INTO IntersectionStreets VALUES\n(1, 1), (1, 5),\
    \ (2, 2), (2, 5), (3, 3), (3, 5), (4, 4), (4, 5);\nGO\n```\n\nThe final table\
    \ describes the edges of the graph, which in this case are segments of street\
    \ between each intersection. I’ve added a couple of constraints that might not\
    \ be so obvious at first glance: Rather than using foreign keys to the `Intersections`\
    \ table, the `StreetSegments` table references the `IntersectionStreets` table\
    \ for both the starting point and ending point. In both cases, the street is also\
    \ included in the key. The purpose of this is so that you can’t start on one street\
    \ and magically end up on another street or at an intersection that’s not even\
    \ on the street you started on.\n\nThe `CK_Intersections` constraint ensures that\
    \ the two intersections are actually different—so you can’t start at one intersection\
    \ and end up at the same place after only one move. It’s theoretically possible\
    \ that a circular street could intersect another street at only one point, in\
    \ which case traveling the entire length of the street could get you back to where\
    \ you started. However, doing so would clearly not help you traverse through the\
    \ graph to a destination, which is the situation currently being considered.\n\
    \nHere’s the T-SQL to create the street segments that constitute the edges of\
    \ the graph:\n\n```sql\nCREATE TABLE StreetSegments\n(\n  IntersectionId_Start\
    \ int NOT NULL,\n  IntersectionId_End int NOT NULL,\n  StreetId int NOT NULL,\n\
    \  CONSTRAINT FK_Start\n    FOREIGN KEY (IntersectionId_Start, StreetId)\n   \
    \ REFERENCES IntersectionStreets (IntersectionId, StreetId),\n  CONSTRAINT FK_End\n\
    \    FOREIGN KEY (IntersectionId_End, StreetId)\n    REFERENCES IntersectionStreets\
    \ (IntersectionId, StreetId),\n  CONSTRAINT CK_Intersections\n    CHECK (IntersectionId_Start\
    \ <> IntersectionId_End),\n  CONSTRAINT PK_StreetSegments\n    PRIMARY KEY (IntersectionId_Start,\
    \ IntersectionId_End)\n);\nGO\n\nINSERT INTO StreetSegments VALUES (1, 2, 5),\
    \ (2, 3, 5), (3, 4, 5);\nGO\n```\n\nIn addition to these tables, a helper function\
    \ is useful in order to make navigation easier. The `GetIntersectionId` function\
    \ returns the intersection at which the two input streets intersect. As mentioned\
    \ before, the schema used in this example assumes that each street intersects\
    \ only once with any other street, and the `GetIntersectionId` function makes\
    \ the same assumption. It works by searching for all intersections that the input\
    \ streets participate in, and then finding the one that had exactly two matches,\
    \ meaning that both input streets intersect. Following is the T-SQL for the function:\n\
    \n```sql\nCREATE FUNCTION GetIntersectionId\n(\n  @Street1 varchar(75),\n  @Street2\
    \ varchar(75)\n)\nRETURNS int\nWITH SCHEMABINDING\nAS\nBEGIN\n  RETURN\n  (\n\
    \    SELECT\n      i.IntersectionId\n    FROM dbo.IntersectionStreets i\n    WHERE\n\
    \      StreetId IN\n      (\n        SELECT StreetId\n        FROM dbo.Streets\n\
    \        WHERE StreetName IN (@Street1, @Street2)\n      )\n    GROUP BY i.IntersectionId\n\
    \    HAVING COUNT(*) = 2\n  )\nEND;\nGO\n```"
  raw: '„ **Note** Once you have chosen either the trigger or the indexed view approach
    to prevent duplicate edges, be sure to delete all rows from the Edges table again
    before executing any of the remaining code listings in this chapter.


    Basic Graph Queries: Who Am I Connected To?


    Before traversing the graph to answer questions, it’s again important to discuss
    the differences between directed and undirected edges and the way in which they
    are modeled. Figure 12-4 shows two graphs: I is undirected and J is directed.


    *Figure 12-4\. Directed and undirected graphs have different connection qualities.*


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    The following node pairs can be used to represent the edges whether or not the
    Edges table is considered to be directed or undirected:


    INSERT INTO Edges VALUES (2, 1), (1, 3);


    GO


    Now we can answer a simple question: starting at a specific node, what nodes can
    we traverse to?


    In the case of a directed graph, any node Y is accessible from another node X
    if an edge exists that starts at X and ends at Y. This is easy enough to represent
    as a query (in this case, starting at node 1): SELECT Y


    FROM Edges e


    WHERE X = 1;


    For an undirected graph, things get a bit more complex because any given edge
    between two nodes can be traversed in either direction. In that case, any node
    Y is accessible from another node X if an edge is represented as either starting
    at X and ending at Y, or the other way around. We need to consider all edges for
    which node Y is either the start or endpoint, or else the graph has effectively
    become directed.


    To find all nodes accessible from node 1 now requires a bit more code:


    SELECT


    CASE


    WHEN X = 1 THEN Y


    ELSE X


    END


    FROM Edges e


    WHERE


    X = 1 OR Y = 1;


    Aside from the increased complexity of this code, there’s another much more important
    issue: performance on larger sets will start to suffer due to the fact that the
    search argument cannot be satisfied based on an index seek because it relies on
    two columns with an OR condition. The problem can be fixed to some degree by creating
    multiple indexes (one in which each column is the first key) and using a UNION
    ALL query, as follows:


    SELECT Y


    FROM Edges e


    WHERE X = 1


    UNION ALL


    SELECT X


    FROM Edges e


    WHERE Y = 1;


    This code is somewhat unintuitive, and because both indexes must be maintained
    and the query must do two index operations to be satisfied, performance will still
    suffer compared with querying the directed graph. For that reason, I recommend
    generally modeling graphs as directed and dealing with inserting both pairs of
    edges unless there is a compelling reason not to, such as an extremely large undirected
    graph where the extra edge combinations would challenge the server’s available
    disk space.


    The remainder of the examples in this chapter will assume that the graph is directed.


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    Traversing the Graph


    Finding out which nodes a given node is directly connected to is a good start,
    but in order to answer questions about the structure of the underlying data, the
    graph must be traversed. For this section, a more rigorous example data set is
    necessary. Figure 12-5 shows an initial sample graph representing an abbreviated
    portion of a street map for an unnamed city.


    *Figure 12-5\. An abbreviated street map*


    A few tables are required to represent this map—to begin with, a table of streets:


    CREATE TABLE Streets


    (


    StreetId int NOT NULL PRIMARY KEY,


    StreetName varchar(75)


    );


    GO


    INSERT INTO Streets VALUES


    (1, ''1st Ave''), (2, ''2nd Ave''),


    (3, ''3rd Ave''), (4, ''4th Ave''), (5, ''Madison'');


    GO


    Each street is assigned a surrogate key so that it can be referenced easily in
    other tables.


    The next requirement is a table of intersections—the nodes in the graph. This
    table creates a key for each intersection, which is defined in this set of data
    as a collection of one or more streets: CREATE TABLE Intersections


    (


    IntersectionId int NOT NULL PRIMARY KEY,


    IntersectionName varchar(10)


    );


    GO


    INSERT INTO Intersections VALUES


    (1, ''A''), (2, ''B''), (3, ''C''), (4, ''D'');


    GO


    Next is a table called IntersectionStreets, which maps streets to their respective
    intersections.


    Note that I haven’t included any constraints on this table, as they can get quite
    complex. One constraint that might be ideal would specify that any given combination
    of streets should not intersect more than once. However, it’s difficult to say
    whether this would apply to all cities, given that many older cities 378


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    have twisting roads that may intersect with each other at numerous points. Dealing
    with this issue is left as an exercise for you to try on your own.


    CREATE TABLE IntersectionStreets


    (


    IntersectionId int NOT NULL


    REFERENCES Intersections (IntersectionId),


    StreetId int NOT NULL


    REFERENCES Streets (StreetId),


    PRIMARY KEY (IntersectionId, StreetId)


    );


    GO


    INSERT INTO IntersectionStreets VALUES


    (1, 1), (1, 5), (2, 2), (2, 5), (3, 3), (3, 5), (4, 4), (4, 5);


    GO


    The final table describes the edges of the graph, which in this case are segments
    of street between each intersection. I’ve added a couple of constraints that might
    not be so obvious at first glance: Rather than using foreign keys to the Intersections
    table, the StreetSegments table


    references the IntersectionStreets table for both the starting point and ending


    point. In both cases, the street is also included in the key. The purpose of this
    is so


    that you can’t start on one street and magically end up on another street or at
    an


    intersection that’s not even on the street you started on.


    The CK_Intersections constraint ensures that the two intersections are actually


    different—so you can’t start at one intersection and end up at the same place
    after


    only one move. It’s theoretically possible that a circular street could intersect


    another street at only one point, in which case traveling the entire length of
    the


    street could get you back to where you started. However, doing so would clearly
    not


    help you traverse through the graph to a destination, which is the situation


    currently being considered.


    Here’s the T-SQL to create the street segments that constitute the edges of the
    graph:


    CREATE TABLE StreetSegments


    (


    IntersectionId_Start int NOT NULL,


    IntersectionId_End int NOT NULL,


    StreetId int NOT NULL,


    CONSTRAINT FK_Start


    FOREIGN KEY (IntersectionId_Start, StreetId)


    REFERENCES IntersectionStreets (IntersectionId, StreetId),


    CONSTRAINT FK_End


    FOREIGN KEY (IntersectionId_End, StreetId)


    REFERENCES IntersectionStreets (IntersectionId, StreetId),


    CONSTRAINT CK_Intersections


    CHECK (IntersectionId_Start <> IntersectionId_End),


    CONSTRAINT PK_StreetSegments


    PRIMARY KEY (IntersectionId_Start, IntersectionId_End)


    );


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    GO


    INSERT INTO StreetSegments VALUES (1, 2, 5), (2, 3, 5), (3, 4, 5);


    GO


    In addition to these tables, a helper function is useful in order to make navigation
    easier. The GetIntersectionId function returns the intersection at which the two
    input streets intersect. As mentioned before, the schema used in this example
    assumes that each street intersects only once with any other street, and the GetIntersectionId
    function makes the same assumption. It works by searching for all intersections
    that the input streets participate in, and then finding the one that had exactly
    two matches, meaning that both input streets intersect. Following is the T-SQL
    for the function: CREATE FUNCTION GetIntersectionId


    (


    @Street1 varchar(75),


    @Street2 varchar(75)


    )


    RETURNS int


    WITH SCHEMABINDING


    AS


    BEGIN


    RETURN


    (


    SELECT


    i.IntersectionId


    FROM dbo.IntersectionStreets i


    WHERE


    StreetId IN


    (


    SELECT StreetId


    FROM dbo.Streets


    WHERE StreetName IN (@Street1, @Street2)


    )


    GROUP BY i.IntersectionId


    HAVING COUNT(*) = 2


    )


    END;


    GO'
  trans: "\n# 第 12 章：树、层次结构与图\n\n**注意** 一旦你选择了触发器或索引视图方法来防止重复边，在执行本章剩余的任何代码清单之前，务必再次清空`Edges`表中的所有行。\n\
    \n## 基础图查询：我与谁相连？\n\n在遍历图以回答问题之前，再次讨论有向边和无向边之间的区别及其建模方式仍然很重要。图 12-4 展示了两个图：I 是无向的，J\
    \ 是有向的。\n\n`图 12-4. 有向图与无向图具有不同的连接特性。`\n\n无论`Edges`表被视为有向还是无向，以下节点对都可用于表示边：\n\n\
    ```sql\nINSERT INTO Edges VALUES (2, 1), (1, 3);\nGO\n```\n\n现在我们可以回答一个简单的问题：从一个特定节点出发，我们能遍历到哪些节点？\n\
    \n在有向图的情况下，如果存在一条从`X`开始并在`Y`结束的边，则任何节点`Y`都可以从另一个节点`X`访问。这很容易用查询表示（在此例中，从节点 1 开始）：\n\
    \n```sql\nSELECT Y\nFROM Edges e\nWHERE X = 1;\n```\n\n对于无向图，情况变得稍微复杂一些，因为两个节点之间的任何给定边都可以沿任一方向遍历。在这种情况下，如果一条边被表示为要么从`X`开始并在`Y`结束，要么反过来，则任何节点`Y`都可以从另一个节点`X`访问。我们需要考虑节点`Y`是起点或终点的所有边，否则图实际上就变成了有向图。\n\
    \n现在要找到从节点 1 可达的所有节点，需要多写一些代码：\n\n```sql\nSELECT\n  CASE\n    WHEN X = 1 THEN\
    \ Y\n    ELSE X\n  END\nFROM Edges e\nWHERE\n  X = 1 OR Y = 1;\n```\n\n除了这段代码复杂性增加之外，还有一个重要得多的问题：在较大的数据集上，性能将开始下降，因为搜索条件无法通过索引查找来满足，因为它依赖于带有`OR`条件的两列。这个问题可以通过创建多个索引（每个列作为第一个键一个索引）并使用`UNION\
    \ ALL`查询在一定程度上得到解决，如下所示：\n\n```sql\nSELECT Y\nFROM Edges e\nWHERE X = 1\nUNION\
    \ ALL\nSELECT X\nFROM Edges e\nWHERE Y = 1;\n```\n\n这段代码有些不直观，并且由于必须维护两个索引，并且查询必须进行两次索引操作才能满足，与查询有向图相比，性能仍然会受到影响。因此，我建议通常将图建模为有向图，并处理插入双向边对，除非有令人信服的理由不这样做，例如一个非常大的无向图，其额外的边组合将挑战服务器可用的磁盘空间。\n\
    \n本章剩余的示例将假定图是有向图。\n\n## 遍历图\n\n找出一个给定节点直接连接到哪些节点是一个好的开始，但为了回答关于底层数据结构的问题，必须遍历图。对于本节内容，需要一个更严谨的示例数据集。图\
    \ 12-5 展示了一个初始样本图，代表了一个未命名城市的街道地图的缩略部分。\n\n`图 12-5. 一个缩略的街道地图`\n\n需要几个表来表示这个地图——首先是一个街道表：\n\
    \n```sql\nCREATE TABLE Streets\n(\n  StreetId int NOT NULL PRIMARY KEY,\n  StreetName\
    \ varchar(75)\n);\nGO\n\nINSERT INTO Streets VALUES\n(1, '1st Ave'), (2, '2nd\
    \ Ave'),\n(3, '3rd Ave'), (4, '4th Ave'), (5, 'Madison');\nGO\n```\n\n每条街道都被分配了一个代理键，以便可以在其他表中轻松引用。\n\
    \n下一个需求是一个交叉口表——图中的节点。该表为每个交叉口创建一个键，在此数据集中定义为一条或多条街道的集合：\n\n```sql\nCREATE TABLE\
    \ Intersections\n(\n  IntersectionId int NOT NULL PRIMARY KEY,\n  IntersectionName\
    \ varchar(10)\n);\nGO\n\nINSERT INTO Intersections VALUES\n(1, 'A'), (2, 'B'),\
    \ (3, 'C'), (4, 'D');\nGO\n```\n\n接下来是一个名为`IntersectionStreets`的表，它将街道映射到它们各自的交叉口。请注意，我没有在这个表上包含任何约束，因为它们可能相当复杂。一个理想的约束可能规定任何给定的街道组合不应相交超过一次。然而，很难说这是否适用于所有城市，因为许多古老城市有弯曲的道路，可能在多个点相互交叉。处理此问题留作练习供你自行尝试。\n\
    \n```sql\nCREATE TABLE IntersectionStreets\n(\n  IntersectionId int NOT NULL\n\
    \    REFERENCES Intersections (IntersectionId),\n  StreetId int NOT NULL\n   \
    \ REFERENCES Streets (StreetId),\n  PRIMARY KEY (IntersectionId, StreetId)\n);\n\
    GO\n\nINSERT INTO IntersectionStreets VALUES\n(1, 1), (1, 5), (2, 2), (2, 5),\
    \ (3, 3), (3, 5), (4, 4), (4, 5);\nGO\n```\n\n最后一个表描述了图的边，在这种情况下是每个交叉口之间的街道段。我添加了一些乍一看可能不太明显的约束：`StreetSegments`表没有使用指向`Intersections`表的外键，而是引用了`IntersectionStreets`表作为起点和终点。在两种情况下，街道也包含在键中。这样做的目的是确保你不能从一个街道开始，然后神奇地结束在另一条街道上，或者甚至结束在你起始街道根本不经过的交叉口上。\n\
    \n`CK_Intersections`约束确保两个交叉口确实不同——因此你不能从一个交叉口开始，仅移动一步后就结束在同一个地方。理论上，一条环形街道可能只与另一条街道相交于一点，在这种情况下，沿着整条街道行走可以让你回到起点。然而，这样做显然无助于你通过图遍历到目的地，而这正是当前正在考虑的情况。\n\
    \n以下是创建构成图边的街道段的 T-SQL：\n\n```sql\nCREATE TABLE StreetSegments\n(\n  IntersectionId_Start\
    \ int NOT NULL,\n  IntersectionId_End int NOT NULL,\n  StreetId int NOT NULL,\n\
    \  CONSTRAINT FK_Start\n    FOREIGN KEY (IntersectionId_Start, StreetId)\n   \
    \ REFERENCES IntersectionStreets (IntersectionId, StreetId),\n  CONSTRAINT FK_End\n\
    \    FOREIGN KEY (IntersectionId_End, StreetId)\n    REFERENCES IntersectionStreets\
    \ (IntersectionId, StreetId),\n  CONSTRAINT CK_Intersections\n    CHECK (IntersectionId_Start\
    \ <> IntersectionId_End),\n  CONSTRAINT PK_StreetSegments\n    PRIMARY KEY (IntersectionId_Start,\
    \ IntersectionId_End)\n);\nGO\n\nINSERT INTO StreetSegments VALUES (1, 2, 5),\
    \ (2, 3, 5), (3, 4, 5);\nGO\n```\n\n除了这些表之外，一个辅助函数对于使导航更容易很有用。`GetIntersectionId`函数返回两条输入街道相交的交叉口。如前所述，本示例中使用的模式假设每条街道只与任何其他街道相交一次，`GetIntersectionId`函数也做了同样的假设。它通过搜索输入街道参与的所有交叉口，然后找到恰好有两个匹配项（意味着两条输入街道都相交）的那个交叉口来工作。以下是该函数的\
    \ T-SQL：\n\n```sql\nCREATE FUNCTION GetIntersectionId\n(\n  @Street1 varchar(75),\n\
    \  @Street2 varchar(75)\n)\nRETURNS int\nWITH SCHEMABINDING\nAS\nBEGIN\n  RETURN\n\
    \  (\n    SELECT\n      i.IntersectionId\n    FROM dbo.IntersectionStreets i\n\
    \    WHERE\n      StreetId IN\n      (\n        SELECT StreetId\n        FROM\
    \ dbo.Streets\n        WHERE StreetName IN (@Street1, @Street2)\n      )\n   \
    \ GROUP BY i.IntersectionId\n    HAVING COUNT(*) = 2\n  )\nEND;\nGO\n```"
- fmt: "# CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS\n\nUsing the schema and the\
    \ function, we can start traversing the nodes. The basic technique of traversing\
    \ the graph is quite simple: find the starting intersection and all nodes that\
    \ it connects to, and iteratively or recursively move outward, using the previous\
    \ node’s ending point as the starting point for the next. This is easily accomplished\
    \ using a recursive common table expression (`CTE`). The following is a simple\
    \ initial example of a `CTE` that can be used to traverse the nodes from `Madison`\
    \ and `1st Avenue` to `Madison` and `4th Avenue`:\n\n```sql\nDECLARE\n    @Start\
    \ int = dbo.GetIntersectionId('Madison', '1st Ave'),\n    @End int = dbo.GetIntersectionId('Madison',\
    \ '4th Ave');\n\nWITH Paths\nAS\n(\n    SELECT\n        @Start AS theStart,\n\
    \        IntersectionId_End AS theEnd\n    FROM dbo.StreetSegments\n    WHERE\n\
    \        IntersectionId_Start = @Start\n\n    UNION ALL\n\n    SELECT\n      \
    \  p.theEnd,\n        ss.IntersectionId_End\n    FROM Paths p\n    JOIN dbo.StreetSegments\
    \ ss ON ss.IntersectionId_Start = p.theEnd\n    WHERE p.theEnd <> @End\n)\n\n\
    SELECT *\nFROM Paths;\nGO\n```\n\nThe anchor part of the `CTE` finds all nodes\
    \ to which the starting intersection is connected—in this case, given the data\
    \ we’ve already input, there is only one. The recursive part uses the anchor’s\
    \ output as its input, finding all connected nodes from there, and continuing\
    \ only if the endpoint of the next intersection is not equal to the end intersection.\
    \ The output for this query is as follows:\n\n```\ntheStart theEnd\n1 2\n2 3\n\
    3 4\n```\n\nWhile this output is correct and perfectly descriptive with only one\
    \ path between the two points, it has some problems. First of all, the ordering\
    \ of the output of a `CTE`—just like any other query—is not guaranteed without\
    \ an `ORDER BY` clause. In this case, the order happens to coincide with the order\
    \ of the path, but this is a very small data set, and the server on which I ran\
    \ the query has only one processor. On a bigger set of data and/or with multiple\
    \ processors, `SQL Server` could choose to process the data in a different order,\
    \ thereby destroying the implicit output order.\n\nThe second issue is that in\
    \ this case there is exactly one path between the start and endpoints. What if\
    \ there were more than one path? Figure 12-6 shows the street map with a new street,\
    \ a few new intersections, and more street segments added. The following `T-SQL`\
    \ can be used to add the new data to the appropriate tables:\n\n```sql\n--New\
    \ street\nINSERT INTO Streets VALUES (6, 'Lexington');\nGO\n\n--New intersections\n\
    INSERT INTO Intersections VALUES\n(5, 'E'), (6, 'F'), (7, 'G'), (8, 'H');\nGO\n\
    \n--New intersection/street mappings\nINSERT INTO IntersectionStreets VALUES\n\
    (5, 1), (5, 6), (6, 2), (6, 6), (7, 3), (7, 6), (8, 4), (8, 6);\nGO\n\n--North/South\
    \ segments\nINSERT INTO StreetSegments VALUES (2, 6, 2), (4, 8, 4);\nGO\n\n--East/West\
    \ segments\nINSERT INTO StreetSegments VALUES (8, 7, 6), (7, 6, 6), (6, 5, 6);\n\
    GO\n```\n\nNote that although intersections `E` and `G` have been created, their\
    \ corresponding north/south segments have not yet been inserted. This is on purpose,\
    \ as I’m going to use those segments to illustrate yet another complication.\n\
    \n*Figure 12-6. A slightly more complete version of the street map*\n\nOnce the\
    \ new data is inserted, we can try the same `CTE` as before, this time traveling\
    \ from `Madison` and `1st Avenue` to `Lexington` and `1st Avenue`. To change the\
    \ destination, modify the `DECLARE` statement that assigns the `@Start` and `@End`\
    \ variables to be as follows:\n\n```sql\nDECLARE\n    @Start int = dbo.GetIntersectionId('Madison',\
    \ '1st Ave'),\n    @End int = dbo.GetIntersectionId('Lexington', '1st Ave');\n\
    ```\n\nHaving made these changes, the output of the `CTE` query is now as follows:\n\
    \n```\ntheStart theEnd\n1 2\n2 3\n2 6\n6 5\n3 4\n4 8\n8 7\n7 6\n6 5\n```\n\nThere\
    \ are now two paths from the starting point to the ending point, but it’s impossible\
    \ to tell what they are; the intersections involved in each path are mixed up\
    \ in the output.\n\nTo solve this problem, the `CTE` will have to “remember” on\
    \ each iteration where it’s been on"
