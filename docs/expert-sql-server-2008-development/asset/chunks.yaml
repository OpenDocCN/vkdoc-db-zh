- fmt: "# CHAPTER 1: SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD\n\n\
    Given this dependency upon data and databases, the developers who specialize in\
    \ this field have no choice but to become not only competent software developers,\
    \ but also absolute experts at accessing and managing data. Data is the central,\
    \ controlling factor that dictates the value that any application can bring to\
    \ its users. Without the data, there is no need for the application.\n\nThe primary\
    \ purpose of this book is to encourage Microsoft SQL Server developers to become\
    \ more integrated with mainstream software development. These pages stress rigorous\
    \ testing, well-thought-out architectures, and careful attention to interdependencies.\
    \ Proper consideration of these areas is the hallmark of an expert software developer—and\
    \ database professionals, as core members of any software development team, simply\
    \ cannot afford to lack this expertise.\n\nIn this chapter, I will present an\
    \ overview of software development and architectural matters as they apply to\
    \ the world of database applications. Some of the topics covered are hotly debated\
    \ in the development community, and I will try to cover both sides, even when\
    \ presenting what I believe to be the most compelling argument. Still, I encourage\
    \ you to think carefully about these issues rather than taking my—or anyone else’s—word\
    \ as the absolute truth. Software architecture is a constantly changing field.\
    \ Only through careful reflection on a case-by-case basis can you hope to identify\
    \ and understand the “best” possible solution for any given situation.\n\n## Architecture\
    \ Revisited\n\nSoftware architecture is a large, complex topic, partly due to\
    \ the fact that software architects often like to make things as complex as possible.\
    \ The truth is that writing first-class software doesn’t involve nearly as much\
    \ complexity as many architects would lead you to believe. Extremely high-quality\
    \ designs are possible merely by understanding and applying a few basic principles.\
    \ The three most important concepts that every software developer must know in\
    \ order to succeed are `coupling`, `cohesion`, and `encapsulation`:\n\n- `coupling`\
    \ refers to the amount of dependency of one module within a system upon another\
    \ module in the same system. It can also refer to the amount of dependency that\
    \ exists between different systems. Modules, or systems, are said to be `tightly\
    \ coupled` when they depend on each other to such an extent that a change in one\
    \ necessitates a change to the other. This is clearly undesirable, as it can create\
    \ a complex (and, sometimes, obscure) network of dependencies between different\
    \ modules of the system, so that an apparently simple change in one module may\
    \ require identification of and associated changes made to a wide variety of disparate\
    \ modules throughout the application. Software developers should strive instead\
    \ to produce the opposite: `loosely coupled` modules and systems, which can be\
    \ easily isolated and amended without affecting the rest of the system.\n\n- `cohesion`\
    \ refers to the degree that a particular module or component provides a single,\
    \ well-defined aspect of functionality to the application as a whole. `strongly\
    \ cohesive` modules, which have only one function, are said to be more desirable\
    \ than `weakly cohesive` modules, which perform many operations and therefore\
    \ may be less maintainable and reusable.\n\n- `encapsulation` refers to how well\
    \ the underlying implementation of a module is hidden from the rest of the system.\
    \ As you will see, this concept is essentially the combination of loose coupling\
    \ and strong cohesion. Logic is said to be `encapsulated` within a module if the\
    \ module’s methods or properties do not expose design decisions about its internal\
    \ behaviors.\n\nUnfortunately, these qualitative definitions are somewhat difficult\
    \ to apply, and in real systems, there is a significant amount of subjectivity\
    \ involved in determining whether a given module is or is not tightly coupled\
    \ to some other module, whether a routine is cohesive, or whether logic is properly\
    \ encapsulated. There is no objective method of measuring these concepts within\
    \ an application.\n\nGenerally, developers will discuss these ideas using comparative\
    \ terms—for instance, a module may be said to be *less* tightly coupled to another\
    \ module than it was before its interfaces were `refactored`. But it might be\
    \ difficult to say whether or not a given module *is* tightly coupled to another,\
    \ in absolute terms, without some means of comparing the nature of its coupling.\
    \ Let’s take a look at a couple of examples to clarify things.\n\n### What is\
    \ Refactoring?\n\nRefactoring is the practice of reviewing and revising existing\
    \ code, while not adding any new features or changing functionality—essentially,\
    \ cleaning up what’s there to make it work better. This is one of those areas\
    \ that management teams tend to despise, because it adds no tangible value to\
    \ the application from a sales point of view, and entails revisiting sections\
    \ of code that had previously been considered “finished.”\n\n### Coupling\n\n\
    First, let’s look at an example that illustrates basic coupling. The following\
    \ class might be defined to model a car dealership’s stock (to keep the examples\
    \ simple, I’ll give code listings in this section based on a simplified and scaled-down\
    \ C#-like syntax):\n\n```\nclass Dealership\n{\n    // Name of the dealership\n\
    \    string Name;\n    // Address of the dealership\n    string Address;\n   \
    \ // Cars that the dealership has\n    Car[] Cars;\n\n    // Define the Car subclass\n\
    \    class Car\n    {\n        // Make of the car\n        string Make;\n    \
    \    // Model of the car\n        string Model;\n    }\n}\n```\n\nThis class has\
    \ three fields: the name of the dealership and address are both strings, but the\
    \ collection of the dealership’s cars is typed based on a subclass, `Car`. In\
    \ a world without people who are buying cars, this class works fine—but, unfortunately,\
    \ the way in which it is modeled forces us to tightly couple any class that has\
    \ a car instance to the dealer. Take the owner of a car, for example:\n\n```\n\
    class CarOwner\n{\n    // Name of the car owner\n    string name;\n    // The\
    \ car owner's cars\n    Dealership.Car[] Cars\n}\n```\n\nNotice that the `CarOwner`’s\
    \ cars are actually instances of `Dealership.Car`; in order to own a car, it seems\
    \ to be presupposed that there must have been a dealership involved. This doesn’t\
    \ leave any room for cars sold directly by their owner—or stolen cars, for that\
    \ matter! There are a variety of ways of fixing this kind of coupling, the simplest\
    \ of which would be to not define `Car` as a subclass, but rather as its own stand-alone\
    \ class. Doing so would mean that a `CarOwner` would be coupled to a `Car`, as\
    \ would a `Dealership`—but a `CarOwner` and a `Dealership` would not be coupled\
    \ at all. This makes sense and more accurately models the real world.\n\n### Cohesion\n\
    \nTo demonstrate the principle of cohesion, consider the following method that\
    \ might be defined in a banking application:\n\n```\nbool TransferFunds(\n   \
    \ Account AccountFrom,\n    Account AccountTo,\n    decimal Amount)\n{\n    if\
    \ (AccountFrom.Balance >= Amount)\n        AccountFrom.Balance -= Amount;\n  \
    \  else\n        return(false);\n\n    AccountTo.Balance += Amount;\n    return(true);\n\
    }\n```\n\nKeeping in mind that this code is highly simplified and lacks basic\
    \ error handling and other traits that would be necessary in a real banking application,\
    \ ponder the fact that what this method basically does is withdraw funds from\
    \ the `AccountFrom` account and deposit them into the `AccountTo` account."
  raw: 'Given this dependency upon data and databases, the developers who specialize
    in this field have no choice but to become not only competent software developers,
    but also absolute experts at accessing and managing data. Data is the central,
    controlling factor that dictates the value that any application can bring to its
    users. Without the data, there is no need for the application.


    The primary purpose of this book is to encourage Microsoft SQL Server developers
    to become more integrated with mainstream software development. These pages stress
    rigorous testing, well-thought-out architectures, and careful attention to interdependencies.
    Proper consideration of these areas is the hallmark of an expert software developer—and
    database professionals, as core members of any software development team, simply
    cannot afford to lack this expertise.


    In this chapter, I will present an overview of software development and architectural
    matters as they apply to the world of database applications. Some of the topics
    covered are hotly debated in the development community, and I will try to cover
    both sides, even when presenting what I believe to be the most compelling argument.
    Still, I encourage you to think carefully about these issues rather than taking
    my—or anyone else’s—word as the absolute truth. Software architecture is a constantly
    changing field. Only through careful reflection on a case-by-case basis can you
    hope to identify and understand the “best” possible solution for any given situation.


    Architecture Revisited


    Software architecture is a large, complex topic, partly due to the fact that software
    architects often like to make things as complex as possible. The truth is that
    writing first-class software doesn’t involve nearly as much complexity as many
    architects would lead you to believe. Extremely high-quality designs are 1


    CHAPTER 1 „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    possible merely by understanding and applying a few basic principles. The three
    most important concepts that every software developer must know in order to succeed
    are **coupling**, **cohesion**, and **encapsulation**:


    •


    **Coupling** refers to the amount of dependency of one module within a system


    upon another module in the same system. It can also refer to the amount of


    dependency that exists between different systems. Modules, or systems, are said


    to be **tightly coupled** when they depend on each other to such an extent that
    a


    change in one necessitates a change to the other. This is clearly undesirable,
    as it


    can create a complex (and, sometimes, obscure) network of dependencies


    between different modules of the system, so that an apparently simple change in


    one module may require identification of and associated changes made to a wide


    variety of disparate modules throughout the application. Software developers


    should strive instead to produce the opposite: **loosely coupled** modules and


    systems, which can be easily isolated and amended without affecting the rest of


    the system.


    •


    **Cohesion** refers to the degree that a particular module or component provides
    a


    single, well-defined aspect of functionality to the application as a whole. **Strongly**


    **cohesive** modules, which have only one function, are said to be more desirable


    than **weakly cohesive** modules, which perform many operations and therefore


    may be less maintainable and reusable.


    •


    **Encapsulation** refers to how well the underlying implementation of a module
    is


    hidden from the rest of the system. As you will see, this concept is essentially
    the


    combination of loose coupling and strong cohesion. Logic is said to be


    **encapsulated** within a module if the module’s methods or properties do not


    expose design decisions about its internal behaviors.


    Unfortunately, these qualitative definitions are somewhat difficult to apply,
    and in real systems, there is a significant amount of subjectivity involved in
    determining whether a given module is or is not tightly coupled to some other
    module, whether a routine is cohesive, or whether logic is properly encapsulated.
    There is no objective method of measuring these concepts within an application.


    Generally, developers will discuss these ideas using comparative terms—for instance,
    a module may be said to be *less* tightly coupled to another module than it was
    before its interfaces were **refactored**. But it might be difficult to say whether
    or not a given module *is* tightly coupled to another, in absolute terms, without
    some means of comparing the nature of its coupling. Let’s take a look at a couple
    of examples to clarify things.


    **What is Refactoring?**


    Refactoring is the practice of reviewing and revising existing code, while not
    adding any new features or changing functionality—essentially, cleaning up what’s
    there to make it work better. This is one of those areas that management teams
    tend to despise, because it adds no tangible value to the application from a sales
    point of view, and entails revisiting sections of code that had previously been
    considered “finished.”


    CHAPTER


    „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    Coupling


    First, let’s look at an example that illustrates basic coupling. The following
    class might be defined to model a car dealership’s stock (to keep the examples
    simple, I’ll give code listings in this section based on a simplified and scaled-down
    C#-like syntax):


    class Dealership


    {


    // Name of the dealership


    string Name;


    // Address of the dealership


    string Address;


    // Cars that the dealership has


    Car[] Cars;


    // Define the Car subclass


    class Car


    {


    // Make of the car


    string Make;


    // Model of the car


    string Model;


    }


    }


    This class has three fields: the name of the dealership and address are both strings,
    but the collection of the dealership’s cars is typed based on a subclass, Car.
    In a world without people who are buying cars, this class works fine—but, unfortunately,
    the way in which it is modeled forces us to tightly couple any class that has
    a car instance to the dealer. Take the owner of a car, for example: class CarOwner


    {


    // Name of the car owner


    string name;


    // The car owner''s cars


    Dealership.Car[] Cars


    }


    Notice that the CarOwner’s cars are actually instances of Dealership.Car; in order
    to own a car, it seems to be presupposed that there must have been a dealership
    involved. This doesn’t leave any room for cars sold directly by their owner—or
    stolen cars, for that matter! There are a variety of ways of fixing this kind
    of coupling, the simplest of which would be to not define Car as a subclass, but
    rather as its own stand-alone class. Doing so would mean that a CarOwner would
    be coupled to a Car, as would a Dealership—but a CarOwner and a Dealership would
    not be coupled at all. This makes sense and more accurately models the real world.


    CHAPTER 1 „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    Cohesion


    To demonstrate the principle of cohesion, consider the following method that might
    be defined in a banking application:


    bool TransferFunds(


    Account AccountFrom,


    Account AccountTo,


    decimal Amount)


    {


    if (AccountFrom.Balance >= Amount)


    AccountFrom.Balance -= Amount;


    else


    return(false);


    AccountTo.Balance += Amount;


    return(true);


    }


    Keeping in mind that this code is highly simplified and lacks basic error handling
    and other traits that would be necessary in a real banking application, ponder
    the fact that what this method basically does is withdraw funds from the AccountFrom
    account and deposit them into the AccountTo account.'
  trans: "# 第 1 章：面向数据库世界的软件开发方法论\n\n鉴于对数据和数据库的这种依赖性，专注于该领域的开发者别无选择，只能成为既胜任软件开发又精通数据访问与管理的绝对专家。数据是核心的控制性因素，决定着任何应用能为用户带来的价值。没有数据，应用便无存在必要。\n\
    \n本书的主要目的是鼓励微软 SQL Server 开发者更深入地融入主流软件开发。本书强调严谨的测试、周密的架构设计，以及对相互依赖关系的仔细考量。对这些领域的恰当重视是专业软件开发者的标志——而数据库专业人员作为任何软件开发团队的核心成员，绝对不能缺乏这种专长。\n\
    \n在本章中，我将概述适用于数据库应用领域的软件开发与架构相关事项。其中涵盖的一些主题在开发社区中备受争议，我会尝试兼顾双方观点，即便是在阐述我认为最具说服力的论点时也是如此。尽管如此，我仍鼓励你们仔细思考这些问题，而非将我的——或任何其他人的——言论奉为绝对真理。软件架构是一个不断变化的领域。只有通过针对具体情况进行仔细的反思，你才有望为任何特定情境识别并理解“最佳”可能的解决方案。\n\
    \n## 架构再探\n\n软件架构是一个庞大而复杂的主题，部分原因是软件架构师往往喜欢把事情弄得尽可能复杂。事实是，编写一流软件所需的复杂度远没有许多架构师会让你相信的那么多。仅仅通过理解并应用一些基本原则，就能实现极高质量的设计。每个软件开发者为了取得成功必须掌握的三个最重要概念是\
    \ `耦合性`、`内聚性` 和 `封装性`：\n\n- `耦合性` 指的是系统中一个模块对同一系统内另一个模块的依赖程度。它也可以指不同系统之间存在的依赖程度。当模块或系统之间的相互依赖程度达到其中一个的改变必然导致另一个也随之改变时，它们就被称为\
    \ `紧密耦合`。这显然是不希望出现的，因为它可能在系统的不同模块间形成一个复杂（有时甚至是隐晦）的依赖网络，导致一个模块中看似简单的更改可能需要识别并对整个应用程序中众多不同的模块进行关联更改。软件开发者应努力实现相反的目标：创建\
    \ `松散耦合` 的模块和系统，它们可以轻松地被隔离和修改，而不影响系统的其余部分。\n\n- `内聚性` 指的是特定模块或组件为整个应用程序提供单一、定义明确的功能方面的程度。`高内聚`\
    \ 的模块只具有单一功能，通常被认为比执行多种操作、因而可能可维护性和可重用性较低的 `低内聚` 模块更可取。\n\n- `封装性` 指的是模块的底层实现对系统其余部分隐藏的程度。正如你将看到的，这个概念本质上是松散耦合和高内聚的结合。如果一个模块的方法或属性没有暴露其内部行为的设计决策，则称该逻辑被\
    \ `封装` 在该模块内。\n\n不幸的是，这些定性的定义有些难以应用，在实际系统中，判断一个给定模块是否与另一个模块紧密耦合、一个例程是否内聚、或者逻辑是否被恰当封装，涉及大量的主观性。没有客观的方法来衡量应用程序中的这些概念。\n\
    \n通常，开发者会使用比较性术语来讨论这些概念——例如，一个模块在它的接口被 `重构` 之后，可能被认为与另一个模块的耦合性 *较之前更低*。但是，如果没有某种方法来比较其耦合的性质，可能很难绝对地说一个给定模块\
    \ *是否* 与另一个模块紧密耦合。让我们看几个例子来澄清一下。\n\n### 什么是重构？\n\n重构是在不添加任何新特性或改变功能的前提下，审查和修订现有代码的实践——本质上，是清理现有代码使其运行得更好。这是管理团队往往比较厌恶的领域之一，因为从销售的角度来看，它没有为应用程序增加有形的价值，并且需要重新审视那些之前被认为是“已完成”的代码部分。\n\
    \n### 耦合性\n\n首先，我们看一个说明基本耦合性的例子。下面这个类可能被定义为模拟一家汽车经销商的库存（为使例子简单，本节中的代码清单将使用一种简化且精简的类似\
    \ C# 的语法）：\n\n```\nclass Dealership\n{\n    // 经销商名称\n    string Name;\n    //\
    \ 经销商地址\n    string Address;\n    // 经销商拥有的汽车\n    Car[] Cars;\n\n    // 定义 Car\
    \ 子类\n    class Car\n    {\n        // 汽车品牌\n        string Make;\n        //\
    \ 汽车型号\n        string Model;\n    }\n}\n```\n\n这个类有三个字段：经销商的名称和地址都是字符串，但经销商汽车的集合是基于一个子类\
    \ `Car` 来类型的。在一个没有人的世界里，这个类工作得很好——但不幸的是，它的建模方式迫使我们将任何拥有汽车实例的类与经销商紧密耦合。以车主为例：\n\
    \n```\nclass CarOwner\n{\n    // 车主姓名\n    string name;\n    // 车主的汽车\n    Dealership.Car[]\
    \ Cars\n}\n```\n\n注意，`CarOwner` 的汽车实际上是 `Dealership.Car` 的实例；为了拥有一辆车，似乎预设了必须有一个经销商参与其中。这没有给车主直接出售的汽车——或者就此而言，被盗的汽车——留下任何空间！有多种方法可以修复这种耦合，最简单的是不将\
    \ `Car` 定义为子类，而是将其作为一个独立的类。这样做意味着 `CarOwner` 将与 `Car` 耦合，`Dealership` 也会与 `Car`\
    \ 耦合——但 `CarOwner` 和 `Dealership` 之间将完全没有耦合。这是有道理的，并且更准确地模拟了现实世界。\n\n### 内聚性\n\
    \n为了演示内聚性原则，考虑一个可能在银行应用中定义的以下方法：\n\n```\nbool TransferFunds(\n    Account AccountFrom,\n\
    \    Account AccountTo,\n    decimal Amount)\n{\n    if (AccountFrom.Balance >=\
    \ Amount)\n        AccountFrom.Balance -= Amount;\n    else\n        return(false);\n\
    \n    AccountTo.Balance += Amount;\n    return(true);\n}\n```\n\n请记住，这段代码高度简化，缺乏真实银行应用中必需的基本错误处理和其他特性，请思考这个方法的基本功能是从\
    \ `AccountFrom` 账户提取资金并将其存入 `AccountTo` 账户。"
- fmt: '# CHAPTER „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    That’s not much of a problem in itself, but now think of how much infrastructure
    (e.g., error-handling code) is missing from this method. It can probably be assumed
    that somewhere in this same banking application there are also methods called
    `Withdraw` and `Deposit`, which do the exact same things, and which would also
    require the same infrastructure code. The `TransferFunds` method has been made
    weakly cohesive because, in performing a transfer, it requires the same functionality
    as provided by the individual `Withdraw` and `Deposit` methods, only using completely
    different code.


    A more strongly cohesive version of the same method might be something along the
    lines of the following:


    ```

    bool TransferFunds(

    Account AccountFrom,

    Account AccountTo,

    decimal Amount)

    {

    bool success = false;

    success = Withdraw(AccountFrom, Amount);

    if (!success)

    return(false);

    success = Deposit(AccountTo, Amount);

    if (!success)

    return(false);

    else

    return(true);

    }

    ```


    Although I’ve already noted the lack of basic exception handling and other constructs
    that would exist in a production version of this kind of code, it’s important
    to stress that the main missing piece is some form of a transaction. Should the
    withdrawal succeed, followed by an unsuccessful deposit, this code as-is would
    result in the funds effectively vanishing into thin air. Always make sure to carefully
    test whether your mission-critical code is atomic; either everything should succeed
    or nothing should. There is no room for in-between—especially when you’re dealing
    with people’s funds!


    ## Encapsulation


    Of the three topics discussed in this section, encapsulation is probably the most
    important for a database developer to understand. Look back at the more cohesive
    version of the `TransferFunds` method, and think about what the associated `Withdraw`
    method might look like—something like this, perhaps:


    ```

    bool Withdraw(Account AccountFrom, decimal Amount)

    {

    if (AccountFrom.Balance >= Amount)

    {

    AccountFrom.Balance -= Amount;

    return(true);

    }

    else

    return(false);

    }

    ```


    In this case, the `Account` class exposes a property called `Balance`, which the
    `Withdraw` method can manipulate. But what if an error existed in `Withdraw`,
    and some code path allowed `Balance` to be manipulated without first checking
    to make sure the funds existed? To avoid this situation, it should not have been
    made possible to set the value for `Balance` from the `Withdraw` method directly.
    Instead, the `Account` class should define its own `Withdraw` method. By doing
    so, the class would control its own data and rules internally—and not have to
    rely on any consumer to properly do so. The key objective here is to implement
    the logic exactly once and reuse it as many times as necessary, instead of unnecessarily
    recoding the logic wherever it needs to be used.


    ## Interfaces


    The only purpose of a module in an application is to do something at the request
    of a consumer (i.e., another module or system). For instance, a database system
    would be worthless if there were no way to store or retrieve data. Therefore,
    a system must expose **interfaces**, well-known methods and properties that other
    modules can use to make requests. A module’s interfaces are the gateway to its
    functionality, and these are the arbiters of what goes into or comes out of the
    module.


    Interface design is where the concepts of coupling and encapsulation really take
    on meaning. If an interface fails to encapsulate enough of the module’s internal
    design, consumers may have to rely upon some knowledge of the module, thereby
    tightly coupling the consumer to the module. In such a situation, any change to
    the module’s internal implementation may require a modification to the implementation
    of the consumer.


    # CHAPTER 1 „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    ## Interfaces As Contracts


    An interface can be said to be a **contract** expressed between the module and
    its consumers. The contract states that if the consumer specifies a certain set
    of parameters to the interface, a certain set of values will be returned. Simplicity
    is usually the key here; avoid defining interfaces that change the number or type
    of values returned depending on the input. For instance, a stored procedure that
    returns additional columns if a user passes in a certain argument may be an example
    of a poorly designed interface.


    Many programming languages allow routines to define **explicit contracts**. This
    means that the input parameters are well defined, and the outputs are known at
    compile time. Unfortunately, T-SQL stored procedures in SQL Server only define
    inputs, and the procedure itself can dynamically change its defined outputs. In
    these cases, it is up to the developer to ensure that the expected outputs are
    well documented and that unit tests exist to validate them (see Chapter 3 for
    information on unit testing). Throughout this book, I refer to a contract enforced
    via documentation and testing as an **implied contract**.


    ## Interface Design


    Knowing how to measure successful interface design is a difficult question. Generally
    speaking, you should try to look at it from a maintenance point of view. If, in
    six months’ time, you were to completely rewrite the module for performance or
    other reasons, can you ensure that all inputs and outputs will remain the same?


    For example, consider the following stored procedure signature:


    ```

    CREATE PROCEDURE GetAllEmployeeData

    --Columns to order by, comma-delimited

    @OrderBy varchar(400) = NULL

    ```


    Assume that this stored procedure does exactly what its name implies—it returns
    all data from the `Employees` table, for every employee in the database. This
    stored procedure takes the `@OrderBy` parameter, which is defined (according to
    the comment) as “columns to order by,” with the additional prescription that the
    columns should be comma-delimited.


    The interface issues here are fairly significant. First of all, an interface should
    not only hide internal behavior, but also leave no question as to how a valid
    set of input arguments will alter the routine’s output. In this case, a consumer
    of this stored procedure might expect that, internally, the comma-delimited list
    will simply be appended to a dynamic SQL statement. Does that mean that changing
    the order of the column names within the list will change the outputs? And, are
    the `ASC` or `DESC` keywords acceptable? The contract defined by the interface
    is not specific enough to make that clear.


    Secondly, the consumer of this stored procedure must have a list of columns in
    the `Employees` table in order to know the valid values that may be passed in
    the comma-delimited list. Should the list of columns be hard-coded in the application,
    or retrieved in some other way? And, it is not clear if all of the columns of
    the table are valid inputs. What about a `Photo` column, defined as `varbinary(max)`,
    which contains a JPEG image of the employee’s photo? Does it make sense to allow
    a consumer to specify that column for sorting?


    These kinds of interface issues can cause real problems from a maintenance point
    of view. Consider the amount of effort that would be required to simply change
    the name of a column in the `Employees` table, if three different applications
    were all using this stored procedure and had their own hard-coded lists of sortable
    column names. And what should happen if the query is initially implemented as
    dynamic SQL, but needs to be changed later to use static SQL in order to avoid
    recompilation costs? Will it be possible to detect which applications assumed
    that the `ASC` and `DESC` keywords could be used, before they throw exceptions
    at runtime?'
