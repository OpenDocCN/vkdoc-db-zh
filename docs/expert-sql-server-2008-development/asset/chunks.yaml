    # 第五章 特权与授权


    *图 5-1. 分层安全提供针对攻击的多级保护。*


    ## 使用模式组织数据


    例如，通过在存储过程中包含日志记录代码来记录对敏感数据的每一次访问是轻而易举的。同样，存储过程可用于强制用户以细粒度的方式访问数据，方法是要求提供用作谓词来过滤数据的参数。如果不使用存储过程来封装数据访问逻辑，这些安全检查很难或不可能强制调用者执行。


    SQL Server 2008 支持 ANSI 标准模式，它提供了一种将表和其他对象分段为逻辑组的方法。模式本质上是容器，任何数据库对象都可以放入其中，并且可以对模式中的所有项目统一批量应用某些操作或规则。这使得诸如管理授权之类的任务变得相当容易，因为通过将数据库划分为模式，你可以轻松地对相关对象进行分组并控制权限，而不必担心将来可能会向该集合中添加或移除哪些对象。随着新对象添加到模式中，现有权限会传播，从而允许你为给定模式设置一次访问权限，而不必在数据库发生变化时再次操作它们。


    要创建模式，请使用 `CREATE SCHEMA` 命令。以下 T-SQL 创建了一个名为 `Sales` 的模式：


    ```

    CREATE SCHEMA Sales;

    GO

    ```


    你也可以选择使用 `AUTHORIZATION` 子句指定模式所有者。如果未显式指定所有者，SQL Server 会将所有权分配给创建该模式的用户。


    模式创建后，你就可以开始在模式内使用双部分命名法创建数据库对象，如下所示：


    ```

    CREATE TABLE Sales.SalesData

    (

    SaleNumber int,

    SaleDate datetime

    );

    GO

    ```


    如果一个对象属于某个模式，那么必须使用其关联的模式名称来引用它；因此，要从 `SalesData` 表中进行选择，需要使用以下 SQL：


    ```

    SELECT *

    FROM Sales.SalesData;

    GO

    ```


    **注意** 在早期版本的 SQL Server 中，对表的引用以其所有者名称为前缀（例如，`Owner.SalesData`）。此语法已弃用，SQL Server
    2008 中的双部分命名引用的是模式而非对象所有者。


    当需要向模式中的对象应用权限时，模式的优越性就显而易见了。假设从权限的角度来看，每个对象都应被同等对待，那么只需一次授权即可授予用户访问模式内每个对象的权限。例如，运行以下
    T-SQL 后，用户 `Alejandro` 将拥有从 `Sales` 模式中的每个表选择行的权限，即使以后添加了新表也是如此：


    ```

    CREATE USER Alejandro

    WITHOUT LOGIN;

    GO


    GRANT SELECT ON SCHEMA::Sales

    TO Alejandro;

    GO

    ```


    需要注意的是，在最初创建时，模式中任何对象的所有者都将与模式本身的所有者相同。个别对象的所有者以后可以更改，但在大多数情况下，我建议你保持给定模式中的所有内容由同一用户拥有。这对于本章稍后将介绍的所有权链尤其重要。要显式设置对象的所有者，需要使用
    `ALTER AUTHORIZATION` 命令，如以下 T-SQL 所示：


    ```

    --创建一个用户

    CREATE USER Javier

    WITHOUT LOGIN;

    GO


    --创建一个表

    CREATE TABLE JaviersData

    (

    SomeColumn int

    );

    GO


    --将 Javier 设置为该表的所有者

    ALTER AUTHORIZATION ON JaviersData

    TO Javier;

    GO

    ```


    关于模式的最后一点说明是，还有一个命令可用于在模式之间移动对象。通过将 `ALTER SCHEMA` 与 `TRANSFER` 选项一起使用，你可以指定某个表应移动到另一个模式：


    ```

    --创建一个新模式

    CREATE SCHEMA Purchases;

    GO


    --将 SalesData 表移入新模式

    ALTER SCHEMA Purchases

    TRANSFER Sales.SalesData;

    GO

    ```

    '
- fmt: "--Reference the table by its new schema name\n\n```sql\nSELECT *\nFROM Purchases.SalesData;\n\
    GO\n```\n\nSchemas are a powerful feature, and I recommend that you consider using\
    \ them any time you’re dealing with sets of tables that are tightly related to\
    \ one another. Legacy database applications that use multiple databases in order\
    \ to create logical boundaries between objects might also benefit from schemas.\
    \ The multiple databases can be consolidated to a single database that uses schemas.\
    \ The benefit is that the same logical boundaries will exist, but because the\
    \ objects are in the same database, they can participate in declarative referential\
    \ integrity and can be backed up together.\n\n## Basic Impersonation Using EXECUTE\
    \ AS\n\nSwitching to a different user’s execution context has long been possible\
    \ in SQL Server, using the `SETUSER` command, as shown in the following code listing:\n\
    \n```sql\nSETUSER 'Alejandro';\nGO\n```\n\nTo revert back to the previous context,\
    \ call `SETUSER` again without specifying a username:\n\n```sql\nSETUSER;\nGO\n\
    ```\n\nThe `SETUSER` command is only available to members of the `sysadmin` or\
    \ `db_owner` roles (at the server and database levels, respectively), and is therefore\
    \ not useful for setting up least-privilege scenarios.\n\nFurthermore, although\
    \ still implemented by SQL Server 2008, the Microsoft Books Online documentation\
    \ states that `SETUSER` may not be supported in future versions of SQL Server,\
    \ and recommends usage of the `EXECUTE AS` command instead.\n\nThe `EXECUTE AS`\
    \ command can be used by any user, and access to impersonate a given user or server\
    \ login is controlled by a permissions setting rather than a fixed role. The other\
    \ benefit over `SETUSER` is that `EXECUTE AS` automatically reverts to the original\
    \ context at the end of a module. `SETUSER`, on the other hand, leaves the impersonated\
    \ context active when control is returned to the caller. This means that it is\
    \ impossible to encapsulate impersonation within a stored procedure using `SETUSER`\
    \ and guarantee that the caller will not be able to take control of the impersonated\
    \ credentials.\n\n## CHAPTER 5 „ PRIVILEGE AND AUTHORIZATION\n\nTo show the effects\
    \ of `EXECUTE AS`, start by creating a new user and a table owned by the user:\n\
    \n```sql\nCREATE USER Tom WITHOUT LOGIN;\nGO\n\nCREATE TABLE TomsData\n(\n   \
    \ AColumn int\n);\nGO\n\nALTER AUTHORIZATION ON TomsData TO Tom;\nGO\n```\n\n\
    Once the user is created, it can be impersonated using `EXECUTE AS`, and the impersonation\
    \ context can be verified using the `USER_NAME()` function:\n\n```sql\nEXECUTE\
    \ AS USER = 'Tom';\nGO\n\nSELECT USER_NAME();\nGO\n```\n\n„ `Note` In order to\
    \ use the `EXECUTE AS` statement to impersonate another user or login, a user\
    \ must have been granted `IMPERSONATE` permissions on the specified target.\n\n\
    The `SELECT` statement returns the value `Tom`, indicating that this is the currently\
    \ impersonated user.\n\nAny action performed after running `EXECUTE AS` will use\
    \ `Tom`’s credentials. For example, the user can alter the `TomsData` table, since\
    \ `Tom` owns the table. However, an attempt to create a new table will fail, since\
    \ `Tom` does not have permission to do so:\n\n```sql\n--This statement will succeed\n\
    ALTER TABLE TomsData\nADD AnotherColumn datetime;\nGO\n\n--This statement will\
    \ fail with CREATE TABLE PERMISSION DENIED\nCREATE TABLE MoreData\n(\n    YetAnotherColumn\
    \ int\n);\nGO\n```\n\nOnce you have completed working with the database in the\
    \ context of `Tom`’s permissions, you can return to the outer context by using\
    \ the `REVERT` command. If you have impersonated another user inside of that context\
    \ (i.e., called `EXECUTE AS` more than once), `REVERT` will have to be called\
    \ multiple times in order to return context to your login. The `USER_NAME()` function\
    \ can be checked at any time to find out whose context you are executing under.\n\
    \nTo see the effects of nested impersonation, first be sure to revert back out\
    \ of `Tom`’s context, and then create a second user as shown following. The user\
    \ will be given the right to impersonate `Tom`, using `GRANT IMPERSONATE`:\n\n\
    ```sql\nCREATE USER Paul WITHOUT LOGIN;\nGO\n\nGRANT IMPERSONATE ON USER::Tom\
    \ TO Paul;\nGO\n```"
