    如果你还没有想明白，也许 `SQL Server Management Studio` 报告的消息会给你一些关于结果的线索：\n\n`(1 row(s) affected)`\n\
    \n`(3 row(s) affected)`\n\n此案例的结果是，受 `UPDATE` 语句影响的所有三行数据在 `MainData` 表中都已被更改：\n\
    \n| ID | Value |\n|----|-------|\n| 1  | aaa   |\n| 2  | zzz   |\n| 3  | zzz \
    \  |\n| 4  | zzz   |\n\n但只有第一次更新被记录了下来：\n\n| ChangeID | RowID | OldValue | NewValue\
    \ | ChangeDate               |\n|----------|-------|----------|----------|--------------------------|\n\
    | 1        | 1     | abc      | aaa      | 2009-06-15 14:11:09.770 |\n| 2    \
    \    | 2     | def      | zzz      | 2009-06-15 15:18:11.007 |\n\n未能预见到单条语句更新多行的可能性，导致了这次静默的失败，这比前一个示例中的明显错误要危险得多。如果当初积极考虑过这种场景，通过对触发器语法稍作修改，就能轻松地重新编写过程来处理此类事件，如下所示：\n\
    \n```sql\nALTER TRIGGER DataUpdate ON MainData\nFOR UPDATE\nAS\nINSERT INTO ChangeLog(RowID,\
    \ OldValue, NewValue, ChangeDate)\nSELECT i.ID, d.Value, i.Value, GetDate()\n\
    FROM INSERTED i JOIN DELETED d ON i.ID = d.ID;\nGO\n```\n\n## 不要走捷径\n\n如果我们认为捷径可以让我们避免做一些觉得不必要的工作，那么想走捷径是人的天性。在编程方面，常常存在一些捷径，它们提供了一种方便、简洁的方法，用比其他更标准的方法更少的代码行数来完成特定任务。然而，这些快捷方法可能伴随着相关风险。最常见的是，快捷方法需要更少的代码，是因为它们依赖于某些假定的默认值，而不是过程中明确声明的值。因此，它们只能应用于那些默认值所施加的条件成立的情况。\n\
    \n通过依赖默认值，快捷方法可能会增加代码的僵化性，并引入外部依赖——默认值可能因服务器配置而异，或在不同版本的 `SQL Server` 之间发生变化。因此，走捷径会降低代码的可移植性，并引入一些未来可能失效的假设。\n\
    \n为了说明这一点，考虑一下当你在不显式声明合适数据长度的情况下将值 `CAST`（转换）为 `varchar` 数据类型时会发生什么：\n\n```sql\n\
    SELECT CAST ('This example seems to work ok' AS varchar);\nGO\n```\n\n该查询似乎正确运行，并产生以下输出：\n\
    \n```\nThis example seems to work ok\n```\n\n在一些开发者中，似乎存在一个常见的误解，即省略作为 `CAST`\
    \ 操作目标的 `varchar` 类型的长度，会导致 `SQL Server` 动态分配一个足以容纳输入字符串所有字符的长度。然而，事实并非如此，如下面的代码清单所示：\n\
    \n```sql\nSELECT CAST ('This demonstrates the problem of relying on default datatype\
    \ length'\nAS varchar);\nGO\n```\n\n```\nThis demonstrates the problem\n```\n\n\
    如果没有显式指定，在 `CAST` 为字符数据类型时，`SQL Server` 默认长度为 30 个字符。在第二个示例中，输入字符串被静默截断为 30 个字符，即使代码中没有明显的迹象表明这一点。如果这是有意为之，那么明确声明为\
    \ `varchar(30)` 以突出显示这是计划内的截断，会比简单地省略数据长度清晰得多。\n\n有时会走的另一个捷径的例子是依赖数据类型之间的隐式 `CAST`。考虑下面的代码清单：\n\
    \n```sql\nDECLARE\n    @x int = 5,\n    @y int = 9,\n    @Rate decimal(18,2);\n\
    \nSET @Rate = 1.9 * @x / @y;\nSELECT 1000 * @Rate;\nGO\n```\n\n在此示例中，`@Rate` 是一个乘数因子，其值由两个参数\
    \ `@x` 和 `@y` 的比率乘以硬编码的比例因子 1.9 来确定。当应用于值 1000 时，如本例所示，结果如下：\n\n现在假设管理层决定更改用于确定\
    \ `@Rate` 的计算方法，并将比例因子从 1.9 增加到 2。一个明显（但不正确）的解决方案是按如下方式修改代码：\n\n```sql\nDECLARE\n\
    \    @x int = 5,\n    @y int = 9,\n    @Rate decimal(18,2);\n\nSET @Rate = 2 *\
    \ @x / @y;\nSELECT 1000 * @Rate;\nGO\n```\n\n这个变更并未按预期提高比率，实际上反而抵消了将任何比率应用于提供的值\
    \ 1000 的效果。现在的问题是，用于确定 `@Rate` 的求和是一个纯粹的整数计算，即 `2 * 5 / 9`。在整数运算中，这等于 1。在前面的例子中，硬编码的值\
    \ 1.9 导致 `@x` 和 `@y` 参数都隐式转换为 decimal 类型，因此求和是以十进制精度计算的。\n\n单独来看，这个例子可能显得微不足道，但当深嵌在某些复杂代码的核心部分时，它可能成为意外行为和不必要的漏洞追踪的来源。为了避免这些复杂情况，最好始终明确声明计算中使用的任何参数的类型和精度，并避免它们之间的隐式\
    \ `CAST`。\n\n使用快捷方式的另一个问题是它们可能会模糊开发者编写代码的意图。如果我们无法理解一行代码的目的是什么，就很难测试它是否达到了预期目的。考虑下面的代码清单：\n\
    \n```sql\nDECLARE @Date datetime = '03/05/1979';\nSELECT @Date + 365;\n```\n\n\
    乍一看，这似乎相当无害：取一个特定日期并加上 365。但实际上这里使用了几个快捷方式，给这段代码的预期目的带来了歧义：\n\n第一个快捷方式是从字符串值 `'03/05/1979'`\
    \ 到 `datetime` 的隐式 `CAST`。我相信你知道，世界各地有多种呈现日期格式的方式，`03/05/1979` 是有歧义的。在英国，它表示 5\
    \ 月 3 日，但对于美国读者来说，它表示 3 月 5 日。隐式转换的结果将取决于执行该函数的服务器的区域设置。\n\n即使解决了 `dd/mm/yyyy`\
    \ 或 `mm/dd/yyyy` 的顺序问题，输入值仍然存在歧义。选择的数据类型是 `datetime`，它存储日期和时间两部分，但赋给 `@Date` 的值没有指定时间，因此这段代码依赖于\
    \ `SQL Server` 的默认值午夜：`00:00:00`。然而，也许开发者的意图不是指定一个时间点，而是整个日历日。如果是这样，是否应该使用 `date`\
    \ 数据类型来指定原始的 `@Date` 参数？还有 `SELECT` 查询的结果——它是否也应该是 `date` 类型？\n\n最后，代码指定了整数 `365`\
    \ 与 `datetime` 值的加法。当应用于日期值时，`+` 运算符会增加给定的天数，因此这似乎是使用 `DATEADD` 方法来增加 365 天的一个快捷方式。但是，"
- fmt: "是*this*一个添加1年的捷径？如果是的话，这是另一个依赖于假设的捷径示例——在这种情况下，假设是该年有365天。\n\n这些因素的结合意味着，这行简单代码的真实意图尚不明确：\n\
    \n```sql\nSELECT DATEADD(DAY, 365, '1979-03-05');\n```\n\n这会导致以下结果：\n\n```\n1980-03-04\
    \ 00:00:00.000\n```\n\n还是说，这段代码是以下内容的简写：\n\n```sql\nSELECT CAST(DATEADD(YEAR,\
    \ 1, '1979-05-03') AS date);\n```\n\n这会导致一个相当不同的输出：\n\n```\n1980-05-03\n```\n\n\
    > **注意**：关于时序数据相关问题的进一步讨论，请参阅第11章。\n\n或许最广为人知的捷径方法示例是使用`SELECT *`来从表中检索所有列的数据，而不是按名称列出各个列。正如本章的第一个例子所示，这里的风险在于，未来对表结构的任何更改都将导致此查询返回的结果集结构`静默地`发生变化。往好了说，这可能导致检索到的数据列从未被使用，从而导致效率低下。往坏了说，这可能导致非常严重的错误（试想一下，如果结果中的数据列被发送到另一个按索引位置而非列名引用它们的函数时会发生什么，或者两个集合的列数和类型不匹配导致任何`UNION`查询失败的可能性）。还有很多其他原因应避免使用`SELECT\
    \ *`，例如添加不必要的行到查询中会排除使用覆盖索引的可能性，这可能导致查询性能大幅下降。\n\n## 测试\n\n防御性实践非常强调在整个开发过程中测试和代码审查的重要性。为了防御可能在实际生产环境中发生的情况，应用程序应在它将在现实世界中经历的相同条件下进行测试。事实上，防御性编程建议应在极端条件下进行测试（**压力测试**）——如果你能构建一个健壮、高性能的应用程序来应对严峻压力，那么你就可以更确定它能应对正常需求。除了性能测试，还有功能测试和单元测试需要考虑，它们确保应用程序的每个部分都按照其契约按预期行为，并执行正确的功能。这些测试将在下一章中更详细地讨论。\n\
    \n在测试应用程序时，考虑测试所基于的样本数据非常重要。你不应该人为地清洗将用于测试代码的数据，或依赖人为生成的数据。如果应用程序需要在生产数据上运行，那么就应该在具有代表性的数据上进行测试，包括其缺陷。这样做将确保应用程序能够应对所有应用程序中典型的不完美数据——缺失或不完整的值、格式错误的字符串、`NULL`等等。随机抽样方法可用于确保测试数据代表整体数据集的公平样本，但防御性测试确保应用程序针对极端边缘情况进行测试也很重要，因为正是这些异常情况可能导致异常。\n\
    \n即使创建测试数据是为了确保对真实世界数据的统计学公平代表，并且经过精心选择以包含边缘情况，但仅在相对少量的测试数据上进行测试时，应用程序能保证多大程度的防御性，仍然存在固有问题。某些特殊情况只会在全规模环境中出现。性能影响是一个明显的例子：如果你只基于几千行数据进行性能测试，那么当应用程序在实际环境中面对数百万行数据而无法运行时，请不要惊讶（你会惊讶于我曾见过多少次应用程序仅基于在数据规模急剧缩减的情况下进行的性能测试就签署通过了）。你也不应简单地假设应用程序的性能会随着涉及的数据行数而可预测地扩展。通过精心的查询设计和良好调整的索引，一些应用程序可能在大型数据集上扩展良好。然而，其他应用程序的性能可能会呈指数级下降（例如在使用表之间的`CROSS\
    \ JOIN`创建笛卡尔积时）。防御性测试不仅应考虑应用程序当前预期使用的数据量，还应考虑预期的未来增长因素。\n\n测试时的另一个考虑因素是多个用户对系统的影响。有许多功能在单独测试时，被证明能以一致的、可重复的方式通过。然而，在存在并发性的情况下——即对数据库同一资源的多个请求——这些相同的测试可能会失败。为了演示这一点，以下代码清单创建了一个简单的表，包含两个整数列`x`和`y`，以及一个`rowversion`列`v`。\n\
    \n```sql\nCREATE TABLE XandY (\n    x int,\n    y int,\n    v rowversion);\n\n\
    INSERT INTO XandY (x, y) VALUES (0, 0);\nGO\n```\n\n以下代码执行一个循环，从`XandY`表中读取当前值，将`x`的值增加1，然后将新值写回表中。循环设置为运行100,000次，并且仅当`rowversion`列`v`自上次读取以来未更改时，循环计数器才会增加。\n\
    \n```sql\nSET NOCOUNT ON;\nDECLARE\n    @x int,\n    @y int,\n    @v rowversion,\n\
    \    @success int = 0;\n\nWHILE @success < 100000\nBEGIN\n    -- Retrieve existing\
    \ values\n    SELECT\n        @x = x,\n        @y = y,\n        @v = v\n    FROM\
    \ XandY\n\n    -- Increase x by 1\n    SET @x = @x + 1;\n\n    SET TRANSACTION\
    \ ISOLATION LEVEL READ COMMITTED;\n    BEGIN TRANSACTION\n    IF EXISTS(SELECT\
    \ 1 FROM XandY WHERE v = @v)\n    BEGIN\n        UPDATE XandY\n        SET\n \
    \           x = @x,\n            y = @y\n        WHERE v = @v;\n\n        SET\
    \ @success = @success + 1;\n    END\n    COMMIT;\nEND\nGO\n```\n\n执行此代码后，正如您所预期的那样，`x`列的值增加到100,000：\n\
    \n```\nx         y         v\n100000    0         0x00000000001EA0B9\n```\n\n\
    现在，让我们尝试在并发情况下运行相同的查询。首先，让我们将表重置为初始值，如下所示：\n\n```sql\nUPDATE XandY SET x = 0;\n\
    GO\n```\n\n现在，在 SQL Server Management Studio 中打开一个新查询并输入以下代码：\n\n```sql\nSET NOCOUNT\
    \ ON;\nDECLARE\n    @x int,\n    @y int,\n    @v rowversion,\n    @success int\
    \ = 0;\n\nWHILE @success < 100000\nBEGIN\n    -- Retrieve existing values\n  \
    \  SELECT\n        @x = x,\n        @y = y,\n        @v = v\n    FROM XandY\n\n\
    \    -- Increase y by 1\n    SET @y = @y + 1;\n\n    SET TRANSACTION ISOLATION\
    \ LEVEL READ COMMITTED;\n    BEGIN TRANSACTION\n    IF EXISTS(SELECT 1 FROM XandY\
    \ WHERE v = @v)\n    BEGIN\n        UPDATE XandY\n        SET\n            x =\
    \ @x,\n            y = @y\n        WHERE v = @v;\n\n        SET @success = @success\
    \ + 1;\n    END\n    COMMIT;\nEND\nGO\n```\n\n这第二个查询在除了一点外的所有方面都与第一个查询相同：它不是将`@x`的值增加1，而是将`@y`的值增加1。然后，像之前一样，将两个值都写回表中。"
  raw: 'is *this* a shortcut to adding 1 year? If so, this is another example of a
    shortcut that relies on an assumption—in this case, that the year in question
    has 365 days.


    The combination of these factors has meant that it is unclear whether the true
    intention of this simple line of code is


    SELECT DATEADD(DAY, 365, ''1979-03-05'');


    which leads to the following result:


    1980-03-04 00:00:00.000


    or whether the code is a shortcut for the following:


    SELECT CAST(DATEADD(YEAR, 1, ''1979-05-03'') AS date);


    which would lead to a rather different output:


    1980-05-03


    „ **Note** For further discussion of issues related to temporal data, please refer
    to Chapter 11.


    Perhaps the most well-known example of a shortcut method is the use of SELECT
    * in order to


    retrieve every column of data from a table, rather than listing the individual
    columns by name. As in the first example of this chapter, the risk here is that
    any change to the table structure in the future will lead to the structure of
    the result set returned by this query *silently* changing. At best, this may result
    in columns of data being retrieved that are then never used, leading to inefficiency.
    At worst, this may lead to very serious errors (consider what would happen if
    the columns of data in the results are sent to another function that references
    them by index position rather than column name, or the possibility of the results
    of any UNION queries failing because the number and type of columns in two sets
    fail to match). There are many other reasons why SELECT * should be avoided, such
    as the addition of unnecessary rows to the query precluding the use of covering
    indexes, which may lead to a substantial degradation in query performance.


    Testing


    Defensive practice places a very strong emphasis on the importance of testing
    and code review throughout the development process. In order to defend against
    situations that might occur in a live production environment, an application should
    be tested under the same conditions that it will experience in the real world.
    In fact, defensive programming suggests that you should test under extreme conditions
    (**stress testing**)—if you can make a robust, performant application that can
    cope 36


    CHAPTER


    „ BEST PRACTICES FOR DATABASE PROGRAMMING


    with severe pressure, then you can be more certain it will cope with the normal
    demands that will be expected of it. In addition to performance testing, there
    are functional tests and unit tests to consider, which ensure that every part
    of the application is behaving as expected according to its contract, and performing
    the correct function. These tests will be discussed in more detail in the next
    chapter.


    When testing an application, it is important to consider the sample data on which
    tests will be based. You should not artificially cleanse the data on which you
    will be testing your code, or rely on artificially generated data. If the application
    is expected to perform against production data, then it should be tested against
    a fair representation of that data, warts and all. Doing so will ensure that the
    application can cope with the sorts of imperfect data typically found in all applications—missing
    or incomplete values, incorrectly formatted strings, NULLs, and so on. Random
    sampling methods can be used to ensure that the test data represents a fair sample
    of the overall data set, but it is also important for defensive testing to ensure
    that applications are tested against extreme edge cases, as it is these unusual
    conditions that may otherwise lead to exceptions.


    Even if test data is created to ensure a statistically fair representation of
    real-world data, and is carefully chosen to include edge cases, there are still
    inherent issues about how defensively guaranteed an application can be when only
    tested on a relatively small volume of test data. Some exceptional circumstances
    only arise in a full-scale environment. Performance implications are an obvious
    example: if you only conduct performance tests on the basis of a couple of thousand
    rows of data, then don’t be surprised when the application fails to perform against
    millions of rows in the live environment (you’ll be amazed at the number of times
    I’ve seen applications signed off on the basis of a performance test against a
    drastically reduced size of data). Nor should you simply assume that the performance
    of your application will scale predictably with the number of rows of data involved.
    With careful query design and well-tuned indexes, some applications may scale
    very well against large data sets. The performance of other applications, however,
    may degrade exponentially (such as when working with Cartesian products created
    from CROSS JOINs between tables). Defensive testing should be conducted with consideration
    not only of the volumes of data against which the application is expected to use
    now, but also by factoring in an allowance for expected future growth.


    Another consideration when testing is the effect of multiple users on a system.
    There are many functions that, when tested in isolation, are proven to pass in
    a consistent, repeatable manner. However, these same tests can fail in the presence
    of concurrency—that is, multiple requests for the same resource on the database.
    To demonstrate this, the following code listing creates a simple table containing
    two integer columns, x and y, and a rowversion column, v.


    CREATE TABLE XandY (


    x int,


    y int,


    v rowversion);


    INSERT INTO XandY (x, y) VALUES (0, 0);


    GO


    The following code executes a loop that reads the current values from the XandY
    table, increments the value of x by 1, and then writes the new values back to
    the table. The loop is set to run for 100,000


    iterations, and the loop counter only increments if the rowversion column, v,
    has not changed since the values were last read.


    SET NOCOUNT ON;


    DECLARE


    @x int,


    @y int,


    @v rowversion,


    CHAPTER 2 „ BEST PRACTICES FOR DATABASE PROGRAMMING


    @success int = 0;


    WHILE @success < 100000


    BEGIN


    -- Retrieve existing values


    SELECT


    @x = x,


    @y = y,


    @v = v


    FROM XandY


    -- Increase x by 1


    SET @x = @x + 1;


    SET TRANSACTION ISOLATION LEVEL READ COMMITTED;


    BEGIN TRANSACTION


    IF EXISTS(SELECT 1 FROM XandY WHERE v = @v)


    BEGIN


    UPDATE XandY


    SET


    x = @x,


    y = @y


    WHERE v = @v;


    SET @success = @success + 1;


    END


    COMMIT;


    END


    GO


    Executing this code leads, as you’d expect, to the value of the x column being
    increased to 100,000: x y v


    100000 0 0x00000000001EA0B9


    Now let’s try running the same query in a concurrent situation. First, let’s reset
    the table to its initial values, as follows:


    UPDATE XandY SET x = 0;


    GO


    Now open up a new query in SQL Server Management Studio and enter the following
    code:


    SET NOCOUNT ON;


    DECLARE


    @x int,


    @y int,


    @v rowversion,


    @success int = 0;


    CHAPTER


    „ BEST PRACTICES FOR DATABASE PROGRAMMING


    WHILE @success < 100000


    BEGIN


    -- Retrieve existing values


    SELECT


    @x = x,


    @y = y,


    @v = v


    FROM XandY


    -- Increase y by 1


    SET @y = @y + 1;


    SET TRANSACTION ISOLATION LEVEL READ COMMITTED;


    BEGIN TRANSACTION


    IF EXISTS(SELECT 1 FROM XandY WHERE v = @v)


    BEGIN


    UPDATE XandY


    SET


    x = @x,


    y = @y


    WHERE v = @v;


    SET @success = @success + 1;


    END


    COMMIT;


    END


    GO


    This second query is identical to the first in every respect except that, instead
    of incrementing the value of @x by 1, it increments the value of @y by 1\. It
    then writes both values back to the table, as before.'
  trans: "\n是*this*一个添加 1 年的捷径？如果是的话，这是另一个依赖于假设的捷径示例——在这种情况下，假设是该年有 365 天。\n\n这些因素的结合意味着，这行简单代码的真实意图尚不明确：\n\
    \n```sql\nSELECT DATEADD(DAY, 365, '1979-03-05');\n```\n\n这会导致以下结果：\n\n```\n1980-03-04\
    \ 00:00:00.000\n```\n\n还是说，这段代码是以下内容的简写：\n\n```sql\nSELECT CAST(DATEADD(YEAR,\
    \ 1, '1979-05-03') AS date);\n```\n\n这会导致一个相当不同的输出：\n\n```\n1980-05-03\n```\n\n\
    > **注意**：关于时序数据相关问题的进一步讨论，请参阅第 11 章。\n\n或许最广为人知的捷径方法示例是使用`SELECT *`来从表中检索所有列的数据，而不是按名称列出各个列。正如本章的第一个例子所示，这里的风险在于，未来对表结构的任何更改都将导致此查询返回的结果集结构`静默地`发生变化。往好了说，这可能导致检索到的数据列从未被使用，从而导致效率低下。往坏了说，这可能导致非常严重的错误（试想一下，如果结果中的数据列被发送到另一个按索引位置而非列名引用它们的函数时会发生什么，或者两个集合的列数和类型不匹配导致任何`UNION`查询失败的可能性）。还有很多其他原因应避免使用`SELECT\
    \ *`，例如添加不必要的行到查询中会排除使用覆盖索引的可能性，这可能导致查询性能大幅下降。\n\n## 测试\n\n防御性实践非常强调在整个开发过程中测试和代码审查的重要性。为了防御可能在实际生产环境中发生的情况，应用程序应在它将在现实世界中经历的相同条件下进行测试。事实上，防御性编程建议应在极端条件下进行测试（**压力测试**）——如果你能构建一个健壮、高性能的应用程序来应对严峻压力，那么你就可以更确定它能应对正常需求。除了性能测试，还有功能测试和单元测试需要考虑，它们确保应用程序的每个部分都按照其契约按预期行为，并执行正确的功能。这些测试将在下一章中更详细地讨论。\n\
    \n在测试应用程序时，考虑测试所基于的样本数据非常重要。你不应该人为地清洗将用于测试代码的数据，或依赖人为生成的数据。如果应用程序需要在生产数据上运行，那么就应该在具有代表性的数据上进行测试，包括其缺陷。这样做将确保应用程序能够应对所有应用程序中典型的不完美数据——缺失或不完整的值、格式错误的字符串、`NULL`等等。随机抽样方法可用于确保测试数据代表整体数据集的公平样本，但防御性测试确保应用程序针对极端边缘情况进行测试也很重要，因为正是这些异常情况可能导致异常。\n\
    \n即使创建测试数据是为了确保对真实世界数据的统计学公平代表，并且经过精心选择以包含边缘情况，但仅在相对少量的测试数据上进行测试时，应用程序能保证多大程度的防御性，仍然存在固有问题。某些特殊情况只会在全规模环境中出现。性能影响是一个明显的例子：如果你只基于几千行数据进行性能测试，那么当应用程序在实际环境中面对数百万行数据而无法运行时，请不要惊讶（你会惊讶于我曾见过多少次应用程序仅基于在数据规模急剧缩减的情况下进行的性能测试就签署通过了）。你也不应简单地假设应用程序的性能会随着涉及的数据行数而可预测地扩展。通过精心的查询设计和良好调整的索引，一些应用程序可能在大型数据集上扩展良好。然而，其他应用程序的性能可能会呈指数级下降（例如在使用表之间的`CROSS\
    \ JOIN`创建笛卡尔积时）。防御性测试不仅应考虑应用程序当前预期使用的数据量，还应考虑预期的未来增长因素。\n\n测试时的另一个考虑因素是多个用户对系统的影响。有许多功能在单独测试时，被证明能以一致的、可重复的方式通过。然而，在存在并发性的情况下——即对数据库同一资源的多个请求——这些相同的测试可能会失败。为了演示这一点，以下代码清单创建了一个简单的表，包含两个整数列`x`和`y`，以及一个`rowversion`列`v`。\n\
    \n```sql\nCREATE TABLE XandY (\n    x int,\n    y int,\n    v rowversion);\n\n\
    INSERT INTO XandY (x, y) VALUES (0, 0);\nGO\n```\n\n以下代码执行一个循环，从`XandY`表中读取当前值，将`x`的值增加\
    \ 1，然后将新值写回表中。循环设置为运行 100,000 次，并且仅当`rowversion`列`v`自上次读取以来未更改时，循环计数器才会增加。\n\n\
    ```sql\nSET NOCOUNT ON;\nDECLARE\n    @x int,\n    @y int,\n    @v rowversion,\n\
    \    @success int = 0;\n\nWHILE @success < 100000\nBEGIN\n    -- Retrieve existing\
    \ values\n    SELECT\n        @x = x,\n        @y = y,\n        @v = v\n    FROM\
    \ XandY\n\n    -- Increase x by 1\n    SET @x = @x + 1;\n\n    SET TRANSACTION\
    \ ISOLATION LEVEL READ COMMITTED;\n    BEGIN TRANSACTION\n    IF EXISTS(SELECT\
    \ 1 FROM XandY WHERE v = @v)\n    BEGIN\n        UPDATE XandY\n        SET\n \
    \           x = @x,\n            y = @y\n        WHERE v = @v;\n\n        SET\
    \ @success = @success + 1;\n    END\n    COMMIT;\nEND\nGO\n```\n\n执行此代码后，正如您所预期的那样，`x`列的值增加到\
    \ 100,000：\n\n```\nx         y         v\n100000    0         0x00000000001EA0B9\n\
    ```\n\n现在，让我们尝试在并发情况下运行相同的查询。首先，让我们将表重置为初始值，如下所示：\n\n```sql\nUPDATE XandY SET\
    \ x = 0;\nGO\n```\n\n现在，在 SQL Server Management Studio 中打开一个新查询并输入以下代码：\n\n```sql\n\
    SET NOCOUNT ON;\nDECLARE\n    @x int,\n    @y int,\n    @v rowversion,\n    @success\
    \ int = 0;\n\nWHILE @success < 100000\nBEGIN\n    -- Retrieve existing values\n\
    \    SELECT\n        @x = x,\n        @y = y,\n        @v = v\n    FROM XandY\n\
    \n    -- Increase y by 1\n    SET @y = @y + 1;\n\n    SET TRANSACTION ISOLATION\
    \ LEVEL READ COMMITTED;\n    BEGIN TRANSACTION\n    IF EXISTS(SELECT 1 FROM XandY\
    \ WHERE v = @v)\n    BEGIN\n        UPDATE XandY\n        SET\n            x =\
    \ @x,\n            y = @y\n        WHERE v = @v;\n\n        SET @success = @success\
    \ + 1;\n    END\n    COMMIT;\nEND\nGO\n```\n\n这第二个查询在除了一点外的所有方面都与第一个查询相同：它不是将`@x`的值增加\
    \ 1，而是将`@y`的值增加 1。然后，像之前一样，将两个值都写回表中。\n"
- fmt: "So, if we were to run both queries, we would expect the values of both `x`\
    \ and `y` to be 100,000, right? To find out, execute the first query, which updates\
    \ the value of `x`. While it is still executing, execute the second script, which\
    \ updates the value of `y`. After a few minutes, once both queries have finished,\
    \ checking the contents of the `XandY` table on my laptop gives the following\
    \ results:\n\n```\nx y v\n\n99899 99019 0x000000000021ACCC\n```\n\nDespite apparently\
    \ containing some degree of allowance for concurrency (by testing that the value\
    \ of `@rowversion` has remained unchanged before committing the update), when\
    \ tested in an environment with other concurrent queries, these queries have failed\
    \ to behave as designed. An explanation of why this has occurred, and methods\
    \ to deal with such situations, will be explained in Chapter 9.\n\n## Code Review\n\
    \nWhereas testing is generally an automated process, code review is a human-led\
    \ activity that involves peer groups manually reviewing the code behind an application.\
    \ The two activities of automated testing and human code review are complementary\
    \ and can detect different areas for code improvement. While automated test suites\
    \ can very easily check whether routines are producing the correct output in a\
    \ given number of test scenarios, it is very difficult for them to conclusively\
    \ state that a routine is coded in the most robust or efficient way, that correct\
    \ logic is being applied, or the coding standards followed best practice. In these\
    \ cases, code review is a more effective approach.\n\nConsider the following code\
    \ listing, which demonstrates a T-SQL function used to test whether a given e-mail\
    \ address is valid:\n\n```sql\nDECLARE @email_address varchar(255);\n\nIF (\n\n\
    \    CHARINDEX(' ',LTRIM(RTRIM(@email_address))) = 0\n\n    AND LEFT(LTRIM(@email_address),1)\
    \ <> '@'\n\n    AND RIGHT(RTRIM(@email_address),1) <> '.'\n\n    AND CHARINDEX('.',@email_address\
    \ ,CHARINDEX('@',@email_address)) -\n\n        CHARINDEX('@',@email_address )\
    \ > 1\n\n    AND LEN(LTRIM(RTRIM(@email_address ))) -\n\n        LEN(REPLACE(LTRIM(RTRIM(@email_address)),'@',''))\
    \ = 1\n\n    AND CHARINDEX('.',REVERSE(LTRIM(RTRIM(@email_address)))) >= 3\n\n\
    \    AND (CHARINDEX('.@',@email_address ) = 0 AND CHARINDEX('..',@email_address\
    \ ) = 0)\n\n)\n\nPRINT 'The supplied email address is valid';\n\nELSE\n\nPRINT\
    \ 'The supplied email address is not valid';\n```\n\nThis code might well pass\
    \ functional tests to suggest that, based on a set of test email addresses provided,\
    \ the function correctly identifies whether the format of a supplied e-mail address\
    \ is valid.\n\nHowever, during a code review, an experienced developer could look\
    \ at this code and point out that it could be much better implemented as a user-defined\
    \ function using the regular expression methods provided by the .NET Base Class\
    \ Library, such as shown here:\n\n```sql\nSELECT dbo.RegExMatch('\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\\
    .[A-Z]{2,4}\\b', @email_address);\n```\n\nNote that this example assumes that\
    \ you have registered a function called `RegExMatch` that implements the `Match`\
    \ method of the .NET `System.Text.RegularExpressions.Regex` class. While both\
    \ methods achieve the same end result, rewriting the code in this way creates\
    \ a routine that is more efficient and maintainable, and also promotes reusability,\
    \ since the suggested `RegExMatch` function could be used to match regular expression\
    \ patterns in other situations, such as checking whether a phone number is valid.\n\
    \nChallenging and open code review has a significant effect on improving the quality\
    \ of software code, but it can be a costly exercise, and the effort required to\
    \ conduct a thorough code review across an entire application is not warranted\
    \ in all situations. One of the advantages of well-encapsulated code is that those\
    \ modules that are most likely to benefit from the exercise can be isolated and\
    \ reviewed separately from the rest of the application.\n\n## Validate All Input\n\
    \nDefensive programming suggests that you should never trust any external input—don’t\
    \ make assumptions about its type (e.g. alphabetic or numeric), its length, its\
    \ content, or even its existence! These rules apply not just to user input sent\
    \ from an application UI or web page, but also to any external file or web resource\
    \ on which the application relies.\n\nA good defensive stance is to assume that\
    \ all input is invalid and may lead to exceptional circumstances unless proved\
    \ otherwise. There are a number of techniques that can be used to ensure that\
    \ input is valid and safe to use:\n\n*   Data can be “massaged.” For example,\
    \ bad characters can be replaced or escaped. However, there are some difficulties\
    \ associated in identifying exactly what data needs to be treated, and knowing\
    \ the best way in which to handle it. Silently modifying input affects data integrity\
    \ and is generally not recommended unless it cannot be avoided.\n*   Data can\
    \ be checked against a “blacklist” of potentially dangerous input and rejected\
    \ if it is found to contain known bad items. For example, input should not be\
    \ allowed to contain SQL keywords such as `DELETE` or `DROP`, or contain nonalphanumeric\
    \ characters.\n*   Input can be accepted only if it consists solely of content\
    \ specified by a “whitelist” of allowed content. From a UI point of view, you\
    \ can consider this as equivalent to allowing users to only select values from\
    \ a predefined drop-down list, rather than a free-text box. This is arguably the\
    \ most secure method, but is also the most rigid, and is too restrictive to be\
    \ used in many practical applications.\n\nAll of these approaches are susceptible\
    \ to flaws. For example, consider that you were using the `ISNUMERIC()` function\
    \ to test whether user input only contained numeric values. You might expect the\
    \ result of the following to reject the input:\n\n```sql\nDECLARE @Input varchar(32)\
    \ = '10E2';\n\nSELECT ISNUMERIC(@Input);\n```\n\nMost exceptions occur as the\
    \ result of unforeseen but essentially benign circumstances. However, when dealing\
    \ with user input, you should always be aware of the possibility of deliberate,\
    \ malicious attacks that are targeted to exploit any weaknesses exposed in a system\
    \ that has not been thoroughly defended. Perhaps the most widely known defensive\
    \ programming techniques concern the prevention of SQL injection attacks. That\
    \ is, when a user deliberately tries to insert and execute malicious code as part\
    \ of user input supplied to an application.\n\nSQL injection attacks typically\
    \ take advantage of poorly implemented functions that construct and execute dynamic\
    \ SQL based on unvalidated user input. Consider the following example:\n\n```sql\n\
    CREATE PROCEDURE Hackable\n    @Input varchar(32)\nAS BEGIN\n    DECLARE @sql\
    \ varchar(256) = 'SELECT status FROM sys.sysusers WHERE name = ''' + @Input +\
    \ '''';\n    EXECUTE(@sql);\nEND\n```\n\nThe intended purpose of this code is\
    \ fairly straightforward—it returns the status of the user supplied in the parameter\
    \ `@Input`. So, it could be used in the following way to find out the status of\
    \ the user John:\n\n```sql\nEXEC Hackable 'John';\nGO\n```\n\nBut what if, instead\
    \ of entering the value `John`, the user entered the input `'public'' or 1=1 --'`,\
    \ as follows?\n\n```sql\nEXEC Hackable @Input='public'' or 1=1 --';\nGO\n```\n\
    \nThis would lead to the SQL statement generated as follows:\n\n```sql\nSELECT\
    \ status FROM sys.sysusers WHERE name = 'public' OR 1 = 1;\n```\n\nThe condition\
    \ `OR 1 = 1` appended to the end of the query will always evaluate to true, so\
    \ the effect will be to make the query list every row in the `sys.sysusers` table.\n\
    \nDespite this being a simple and well-known weakness, it is still alarmingly\
    \ common. Defending against such glaring security holes can easily be achieved,\
    \ and various techniques for doing so are discussed in Chapter 6.\n\n## Future-proof\
    \ Your Code"
