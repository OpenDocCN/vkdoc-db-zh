    \ ))) -\n\n        LEN(REPLACE(LTRIM(RTRIM(@email_address)),'@','')) = 1\n\n \
    \   AND CHARINDEX('.',REVERSE(LTRIM(RTRIM(@email_address)))) >= 3\n\n    AND (CHARINDEX('.@',@email_address\
    \ ) = 0 AND CHARINDEX('..',@email_address ) = 0)\n\n)\n\nPRINT 'The supplied email\
    \ address is valid';\n\nELSE\n\nPRINT 'The supplied email address is not valid';\n\
    ```\n\n这段代码很可能通过功能测试，表明根据提供的一组测试电子邮件地址，该函数能正确识别所提供的电子邮件地址格式是否有效。\n\n然而，在代码审查过程中，有经验的开发人员查看这段代码后可能会指出，使用\
    \ .NET 基础类库提供的正则表达式方法，例如下面这样，可以更好地实现为一个用户定义函数：\n\n```sql\nSELECT dbo.RegExMatch('\\\
    b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,4}\\b', @email_address);\n```\n\n请注意，此示例假设您已注册了一个名为\
    \ `RegExMatch` 的函数，该函数实现了 .NET `System.Text.RegularExpressions.Regex` 类的 `Match`\
    \ 方法。虽然两种方法都能达到相同的最终结果，但以这种方式重写代码创建了一个更高效、更易于维护的例程，并且还促进了可重用性，因为建议的 `RegExMatch`\
    \ 函数可用于匹配其他场景中的正则表达式模式，例如检查电话号码是否有效。\n\n具有挑战性且开放的代码审查对提高软件代码质量有显著效果，但它可能是一项成本高昂的工作，而且并非所有情况都需要对整个应用程序进行彻底的代码审查所需付出的努力。封装良好的代码的优势之一在于，可以从应用程序的其余部分中分离出最有可能从该活动中受益的模块，并进行单独审查。\n\
    \n## 验证所有输入\n\n防御性编程建议你永远不要信任任何外部输入——不要对其类型（例如字母或数字）、长度、内容甚至其存在做出假设！这些规则不仅适用于从应用程序\
    \ UI 或网页发送的用户输入，也适用于应用程序所依赖的任何外部文件或网络资源。\n\n良好的防御姿态是假设所有输入都是无效的并可能导致异常情况，除非被证明是安全的。有多种技术可用于确保输入是有效且安全的：\n\
    \n*   数据可以被“调整”。例如，不良字符可以被替换或转义。然而，准确识别需要处理的数据以及知道处理它的最佳方式存在一些困难。静默修改输入会影响数据完整性，通常不推荐，除非无法避免。\n\
    *   数据可以对照潜在危险输入的“黑名单”进行检查，如果发现包含已知的不良项目，则拒绝。例如，输入不应允许包含 SQL 关键字，如 `DELETE` 或\
    \ `DROP`，或包含非字母数字字符。\n*   仅当输入完全由允许内容的“白名单”指定的内容组成时，才接受输入。从 UI 的角度来看，你可以认为这等同于允许用户仅从预定义的下拉列表中选择值，而不是在自由文本框中输入。可以说这是最安全的方法，但也是最僵化的方法，并且限制性太强，无法在许多实际应用中使用。\n\
    \n所有这些方法都容易出现缺陷。例如，假设你使用 `ISNUMERIC()` 函数来测试用户输入是否仅包含数值。你可能期望以下代码会拒绝输入：\n\n```sql\n\
    DECLARE @Input varchar(32) = '10E2';\n\nSELECT ISNUMERIC(@Input);\n```\n\n大多数异常情况是由于未预见到的但本质上是良性的环境导致的。然而，在处理用户输入时，你应始终意识到可能存在蓄意、恶意的攻击，这些攻击旨在利用未得到彻底防御的系统中暴露出的任何弱点。或许最广为人知的防御性编程技术涉及防止\
    \ SQL 注入攻击。也就是说，当用户故意尝试将恶意代码作为提供给应用程序的用户输入的一部分插入并执行时。\n\nSQL 注入攻击通常利用实现不当的函数，这些函数基于未经验证的用户输入构建并执行动态\
    \ SQL。考虑以下示例：\n\n```sql\nCREATE PROCEDURE Hackable\n    @Input varchar(32)\nAS\
    \ BEGIN\n    DECLARE @sql varchar(256) = 'SELECT status FROM sys.sysusers WHERE\
    \ name = ''' + @Input + '''';\n    EXECUTE(@sql);\nEND\n```\n\n这段代码的预期目的相当直接——它返回参数\
    \ `@Input` 中提供的用户的状态。因此，可以按如下方式使用它来查找用户 John 的状态：\n\n```sql\nEXEC Hackable 'John';\n\
    GO\n```\n\n但是，如果用户输入的不是值 `John`，而是输入了 `'public'' or 1=1 --'`，如下所示？\n\n```sql\n\
    EXEC Hackable @Input='public'' or 1=1 --';\nGO\n```\n\n这将导致生成如下 SQL 语句：\n\n```sql\n\
    SELECT status FROM sys.sysusers WHERE name = 'public' OR 1 = 1;\n```\n\n附加到查询末尾的条件\
    \ `OR 1 = 1` 将始终评估为真，因此效果将是使查询列出 `sys.sysusers` 表中的每一行。\n\n尽管这是一个简单且众所周知的弱点，但它仍然惊人地普遍。防范此类明显的安全漏洞很容易实现，第\
    \ 6 章将讨论各种相关技术。\n\n## 让代码面向未来\n"
- fmt: "# 数据库编程的最佳实践\n\n为了防止出现错误的风险，确保任何防御性代码都遵循最新标准是合理的。虽然无法保证代码始终保持弹性，但你应该养成一个习惯：重写任何依赖已弃用功能的旧代码，并且在新开发中不使用任何已弃用功能，以减少未来发生异常的可能性。\n\
    \n已弃用功能指的是那些虽然当前仍在使用，但已被替代品取代的功能。虽然它们可能仍然可用（以确保向后兼容性），但你不应该使用已知已弃用的功能来开发应用程序。考虑以下代码清单：\n\
    \n```sql\nCREATE TABLE ExpertSqlServerDevelopment.dbo.Deprecated (\n    EmployeeID\
    \ int DEFAULT 0,\n    Forename varchar(32) DEFAULT '',\n    Surname varchar(32)\
    \ DEFAULT '',\n    Photo image NULL\n);\n\nCREATE INDEX ixDeprecated ON Deprecated(EmployeeID);\n\
    \nDROP INDEX Deprecated.ixDeprecated;\n\nINSERT INTO ExpertSqlServerDevelopment.dbo.Deprecated\
    \ (\n    EmployeeID, Forename, Surname, Photo) VALUES\n    (1, 'Bob', 'Smith',\
    \ DEFAULT),\n    (2, 'Benny', 'Jackson', DEFAULT)\n\nSET ROWCOUNT 1;\n\nSELECT\
    \ 'Name' = ForeName + ' ' + Surname\nFROM ExpertSqlServerDevelopment.dbo.Deprecated\n\
    ORDER BY ExpertSqlServerDevelopment.dbo.Deprecated.EmployeeID\n\nSET ROWCOUNT\
    \ 0;\n```\n\n这个查询在 SQL Server 2008 中按预期工作，但使用了许多应该避免的已弃用功能。幸运的是，发现已弃用功能的使用很容易——`sys.dm_os_performance_counters`\
    \ 动态管理视图（DMV）会维护每个已弃用功能被使用时的计数，可以通过以下方式查询：\n\n```sql\nSELECT\n    object_name,\n\
    \    instance_name,\n    cntr_value\nFROM sys.dm_os_performance_counters\nWHERE\n\
    \    object_name = 'SQLServer:Deprecated Features'\n    AND cntr_value > 0;\n\
    ```\n\n一个相关的，或许更严重的，对防御性应用程序的威胁是依赖未记录功能的代码。SQL Server 中存在许多此类功能——例如，以下代码清单演示了未记录的\
    \ `sp_MSForEachTable` 存储过程，它可用于对数据库中的每个表执行提供的查询。\n\n```sql\nEXEC sp_MSforeachtable\
    \ \"EXEC sp_spaceused '?'\";\n```\n\n虽然可以肯定已弃用功能将在未来的某个时间点被移除，但这个时间尺度通常是已知的，并且通常有一个记录的升级路径，以确保任何先前由已弃用功能提供的功能将被替代方法所取代。相比之下，未记录功能可能在任何时间无警告地中断，并且可能没有明确的升级路径。我强烈建议你避免这种冒险（并且几乎总是不必要的）做法。\n\
    \n## 限制暴露面\n\n如果防御性编程旨在确保应用程序能够应对异常事件的发生，那么一个基本的防御技术就是限制此类事件可能发生的数量。从逻辑上讲，异常只能发生在正在运行的功能中，因此不要安装超过必要的功能——通过减少应用程序的受攻击面，你可以限制对潜在攻击的暴露。当\
    \ `SAFE` 可以满足时，不要授予程序集 `EXTERNAL_ACCESS` 权限。除非它们增加价值或应用程序严格需要，否则不要启用诸如数据库邮件之类的功能。\n\
    \n所有用户都应经过身份验证，并且仅被授权访问所需的资源，且仅在需要的时间段内。应立即删除未使用的账户，并撤销不必要的权限。这样做可以减少系统被攻击破坏的机会，这将在第\
    \ 5 章中更详细地讨论。\n\n如果系统的安全性受到破坏，采用加密可能有助于限制造成的损害。不同的加密方法将在第 6 章中讨论。\n\n## 践行良好编码规范\n\
    \n良好的编码规范——我指的是诸如清晰注释、一致布局和良好命名变量等实践——应被视为任何软件开发方法的重要组成部分，而不仅仅与防御性编程相关。我选择在这里包含它，部分是因为我认为它如此重要以至于怎么重申都不为过，但也因为防御性编程的本质比其他方法更强调这些领域，原因如下：\n\
    \n正如前面所述，防御性编程的目标是尽量减少由于未来不可预见的事件而导致错误的风险。这些未来的事件可能包括未来对代码的维护和增强。通过现在创建清晰、文档完善的代码，你可以增强其未来的可理解性，降低下次修改时意外引入错误的可能性。\n\
    \n此外，由于防御性编程旨在创建健壮、有弹性的应用程序，这些应用程序可能会在没有任何人工干预的情况下运行很长时间。当它们在几年后再次被审查时，负责的开发团队可能已经大不相同，或者最初的开发人员可能不再记得为什么采取某种方法。至关重要的是，这些信息被记录并在代码本身中清晰可见，以免引入可能损害应用程序稳定性的错误或新的假设。\n\
    \n布局良好的代码通常与经过深思熟虑的代码密不可分。通过采取简单的步骤，例如缩进代码块，你可以轻松识别循环内的步骤和循环外的步骤，防止粗心的错误。大多数 IDE\
    \ 和代码编辑器提供布局功能，可以自动应用一致的制表符、空格、大小写等格式，这些设置通常可以自定义以匹配特定组织中的任何编码标准。\n\n布局良好、注释有意义的代码将使彻底的代码审查更容易。如果需要修改代码，将更容易快速确定最佳方法。\n\
    \n最后，如果在代码的某一部分中发现错误，在一个编码良好的函数中追踪它要容易得多，从而以最小的干扰解决它。\n\n基于这些原因，我相信践行良好的编码规范是防御性编程的关键部分。在以下各节中，我将就编码规范的一些具体方面发表一些看法。\n\
    \n### 注释\n\n每个人都知道注释是任何代码的重要组成部分，但我们很少有人能像应该的那样充分注释我们的代码（一个常见的理由是开发者更喜欢编写代码，而不是写关于代码的注释）。几乎每一个关于最佳编码实践的思想流派都指出，你应该在代码中自由使用注释，防御性编程也不例外。编写良好的注释更容易说明一个函数的目标是什么以及它为什么以某种方式编写，这意味着更容易发现任何可能破坏该代码的错误或假设。\n\
    \n好的注释应该给阅读代码的人提供额外的信息——而不仅仅是指出显而易见的东西或重述可能很容易在在线书籍中找到的信息。例如，以下注释没有帮助：\n\n```sql\n\
    -- 将 x 设置为 5\nSET @x = 5;\n```\n\n一般来说，注释应该解释为什么采取某种方法以及什么..."
  raw: 'In order to prevent the risk of bugs appearing, it makes sense to ensure that
    any defensive code adheres to the latest standards. There are no ways to guarantee
    that code will remain resilient, but one habit that you should definitely adopt
    is to ensure that you rewrite any old code that relies on deprecated features,
    and do not use any deprecated features in new development in order to reduce the
    chances of


    exceptions occurring in the future.


    Deprecated features refer to features that, while still currently in use, have
    been superseded by alternative replacements. While they may still be available
    for use (to ensure backward compatibility), you should not develop applications
    using features that are known to be deprecated. Consider the following code listing:


    CREATE TABLE ExpertSqlServerDevelopment.dbo.Deprecated (


    EmployeeID int DEFAULT 0,


    Forename varchar(32) DEFAULT '''',


    Surname varchar(32) DEFAULT '''',


    Photo image NULL


    );


    CREATE INDEX ixDeprecated ON Deprecated(EmployeeID);


    DROP INDEX Deprecated.ixDeprecated;


    INSERT INTO ExpertSqlServerDevelopment.dbo.Deprecated (


    EmployeeID, Forename, Surname, Photo) VALUES


    (1, ''Bob'', ''Smith'', DEFAULT),


    (2, ''Benny'', ''Jackson'', DEFAULT)


    SET ROWCOUNT 1;


    SELECT ''Name'' = ForeName + '' '' + Surname


    FROM ExpertSqlServerDevelopment.dbo.Deprecated


    ORDER BY ExpertSqlServerDevelopment.dbo.Deprecated.EmployeeID


    SET ROWCOUNT 0;


    This query works as expected in SQL Server 2008, but makes use of a number of
    deprecated features, which should be avoided. Fortunately, spotting usage of deprecated
    features is easy—the


    CHAPTER


    „ BEST PRACTICES FOR DATABASE PROGRAMMING


    sys.dm_os_performance_counters dynamic management view (DMV) maintains a count
    of every time a deprecated feature is used, and can be interrogated as follows:


    SELECT


    object_name,


    instance_name,


    cntr_value


    FROM sys.dm_os_performance_counters


    WHERE


    object_name = ''SQLServer:Deprecated Features''


    AND cntr_value > 0;


    A related, although perhaps more serious, threat to defensive applications is
    code that relies on *undocumented* features. Many such features exist in SQL Server—the
    following code listing demonstrates the undocumented sp_MSForEachTable stored
    procedure, for example, which can be used to execute a supplied query against
    every table in a database.


    EXEC sp_MSforeachtable "EXEC sp_spaceused ''?''";


    While it is certain that deprecated features will be removed at some point in
    the future, that time scale is generally known, and there is usually a documented
    upgrade path to ensure that any


    functionality previously provided by features that are deprecated will be replaced
    by an alternative method. Undocumented features, in contrast, may break at any
    time without warning, and there may be no clear upgrade path. I strongly recommend
    that you avoid such risky (and almost always unnecessary) practices.


    Limit Your Exposure


    If defensive programming is designed to ensure that an application can cope with
    the occurrence of exceptional events, one basic defensive technique is to limit
    the number of such events that can occur. It follows logically that exceptions
    can only occur in features that are running, so don’t install more features than
    necessary—by reducing the application surface area, you limit your exposure to
    potential attacks. Don’t grant EXTERNAL_ACCESS to an assembly when SAFE will do.
    Don’t enable features such as database mail unless they add value or are strictly
    required by your application.


    All users should be authenticated, and only authorized to access those resources
    that are required, for the period of time for which they are required. Unused
    accounts should be removed immediately, and unnecessary permissions revoked. Doing
    so reduces the chance of the system being compromised by an attack, and is discussed
    in more detail in Chapter 5.


    If the security of a system is compromised, employing encryption may help to limit
    any damage caused. Different encryption methods are discussed in Chapter 6.


    Exercise Good Coding Etiquette


    Good coding etiquette, by which I refer to practices such as clearly commented
    code, consistent layout, and well-named variables, should be considered a vital
    part of *any* software development methodology, and not specifically related to
    defensive programming. I have chosen to include it here, partly because I consider
    it so vital that it can never be restated too often, but also because the nature
    of defensive programming emphasizes these areas more than other approaches, for
    the following reasons:


    CHAPTER 2 „ BEST PRACTICES FOR DATABASE PROGRAMMING


    As stated previously, the aim of defensive programming is to minimize the risk
    of


    errors occurring as a result of future unforeseen events. Those future events
    may be


    construed to include future maintenance and enhancements made to the code. By


    creating clear, well-documented code now, you enhance its future


    understandability, reducing the chances that bugs will be accidentally introduced


    when it is next addressed.


    Furthermore, since defensive programming aims to create robust, resilient


    applications, these applications may continue running for a very long duration


    without any need for manual intervention. When they are next reviewed some


    years later, the development team responsible may be very different, or the original


    developers may no longer remember why a certain approach was taken. It is vitally


    important that this information be documented and clearly visible in the code


    itself, so that errors or new assumptions are not introduced that could damage
    the


    stability of the application.


    Code that is well *laid* out often goes hand in hand with code that is well *thought*
    out. By undertaking such simple steps as indenting code blocks, for example, you


    can easily identify steps that lie within a loop, and those that are outside the
    loop,


    preventing careless mistakes. Most IDEs and code editors provide layout features


    that will automatically apply a consistent format for tabs, whitespace,


    capitalization and so on, and these settings can normally be customized to match


    whatever coding standards are in place in a given organization.


    Well-laid-out, meaningfully commented code will make it easier for thorough code


    review. If the code needs to be revised, it will be much easier to quickly establish


    the best method to do so.


    Finally, if a bug is discovered in a section of code, it is much easier to track
    down


    within a well-coded function, and hence resolved with the minimum amount of


    disruption.


    For these reasons, I believe exercising good code etiquette to be a key part of
    defensive programming. In the following sections, I’ll make a few observations
    on some specific aspects of coding etiquette.


    Comments


    Everybody knows that comments are an important part of any code, and yet few of
    us comment our code as well as we should (one reason commonly put forward is that
    developers prefer to *write* code rather than *writing* *about* code). Almost
    every school of thought on best coding practice states that you should make liberal
    use of comments in code, and defensive programming is no different. Well-written
    comments make it easier to tell what a function is aiming to achieve and why it
    has been written a certain way, which by implication means that it is easier to
    spot any bugs or assumptions made that could break that code.


    Good comments should give additional information to whoever is reading the code—not
    simply


    point out the obvious or restate information that could easily be found in Books
    Online. The following comment, for example, is not helpful:


    -- Set x to 5


    SET @x = 5;


    CHAPTER


    „ BEST PRACTICES FOR DATABASE PROGRAMMING


    In general, comments should explain why a certain approach has been taken and
    what the'
