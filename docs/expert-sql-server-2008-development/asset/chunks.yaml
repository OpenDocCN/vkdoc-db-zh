    \ 3.52998019801980198019801980198 80\n```\n\n现在，让我们更改资源调控器设置，将此工作负载组允许的最大并发请求数限制为三。这将创建一个队列。\n\
    \n```sql\nALTER WORKLOAD GROUP GroupA\nWITH ( GROUP_MAX_REQUESTS = 3 )\nUSING\
    \ PoolA;\nALTER RESOURCE GOVERNOR RECONFIGURE\nGO\n```\n\n在再次运行测试之前，重置统计信息表：\n\
    \n```sql\nALTER RESOURCE GOVERNOR RESET STATISTICS;\nDBCC FREEPROCCACHE;\nDBCC\
    \ SQLPERF('sys.dm_os_wait_stats', CLEAR);\nGO\n```\n\n然后完全按照之前的方式重新运行 `ostress`\
    \ 测试。这次在我的系统上，所有查询的最终执行时间是 00:03:03.257。通过限制工作组的最大并发请求数，在此示例中处理 50,000 个查询队列所花费的总时间减少了大约\
    \ 10%。\n\n尽管乍一看这个结果可能令人惊讶，但它实际上完全合理。为了理解发生了什么，请重新运行之前对 `sys.dm_resource_governor_workload_groups`\
    \ DMV 的查询。我在系统上的结果如下所示：\n\n```\nrequests queued locks avg cpu_time max_cpu_time\n\
    50500    48372 36727 3.46671287128712871287128712871 54\n```\n\n由于我们将 `GROUP_MAX_REQUESTS`\
    \ 设置为 3，正如预期的那样，发送到 `GroupA` 工作负载组的请求被迫等待，同时满足每个请求所需的总体平均 CPU 时间基本保持相似。\n\n然而，当并发请求较少时，每个查询因其他线程锁定的资源而产生的等待会显著减少。在此特定示例中，减少锁等待带来的益处超过了资源调控器限制所带来的等待时间成本。结果，不仅处理请求队列的总耗时减少了，而且完成每个查询所用时间的一致性也提高了（只有三个并发请求时最大\
    \ CPU 时间为 54ms，而之前的示例中是 80ms）。\n\n## 提示\n如果您对查找有关资源调控器所施加等待的进一步统计信息感兴趣，请尝试在 `sys.dm_os_wait_stats`\
    \ DMV 中查找 `wait_type` 为 `RESMGR_THROTTLED` 的行。\n\n## 总结\n并发性是一个复杂的主题，有许多可能的解决方案。在本章中，我介绍了从业务流程和数据碰撞角度应该考虑的各种并发模型，并解释了它们与\
    \ SQL Server 数据库引擎支持的类似命名的并发模型有何不同。悲观并发可能是最常用的形式，但其设置和维护可能很复杂。乐观并发虽然更轻量级，但可能不适用于许多业务场景；而多值并发控制虽然是一项新颖的技术，但其实现方式可能难以在提供除性能提升之外的价值的同时允许碰撞。\n\
    \n最后，我概述了在并发环境中，资源调控器如何平衡有限资源在不同竞争请求之间的分配方式。这里的讨论仅触及了这一技术潜力的皮毛，我建议对此主题感兴趣的读者花些时间进一步研究这个强大的功能。\n\
    \n# 第十章 处理空间数据\n\n空间功能的添加是 SQL Server 2008 中引入的最激动人心的新功能之一。尽管对于许多 SQL 开发人员来说，这通常是一个新概念，但处理空间数据的原理已经确立了很多年。专用的地理信息系统（GIS），例如\
    \ ESRI 的 ARC/INFO，自 1970 年代以来就已经存在。然而，直到最近，空间数据分析一直被视为一个独特、小众的主题领域，空间数据的知识和使用在很大程度上仍局限于其自身领域内，而未与主流开发集成。\n\
    \n事实上，几乎没有哪个企业数据库不存储某种形式的空间信息。客户的地址、销售区域、本地营销活动针对的区域，或者配送和物流车辆所采取的路线，都是可以在许多常见应用程序中找到的空间数据。\n\
    \n在本章中，我将首先描述处理空间数据所涉及的一些基本原理，然后讨论 `geometry` 和 `geography` 数据类型的一些重要特性，这些数据类型是\
    \ SQL Server 中用于表示空间数据和对空间数据执行操作的具体数据类型。\n\n在演示了如何使用这些方法来回答一些常见的空间问题之后，我将集中讨论创建高性能空间应用程序需要考虑的要素。\n\
    \n> **注意** 处理空间数据带来了一系列独特的挑战，并且在许多情况下，与其他传统数据类型相比，需要采用特定的技术和理解。如果您对 SQL Server\
    \ 中的空间数据更全面的介绍感兴趣，我推荐阅读我之前的另一本书《*Beginning Spatial with SQL Server 2008*》（Apress，2008）。\n\
    \n## 空间数据建模\n空间数据描述对象在空间中的位置、形状和方向。这些对象可以是具体的、物理的事物，如办公楼、铁路或山脉；也可以是抽象的特征，例如标记国家之间政治边界的想象线，或特定商店服务的区域。\n\
    \nSQL Server 采用空间数据的矢量模型，其中每个对象都使用一个或多个**几何体**来表示——这些原始形状近似于它们所代表的真实世界对象的形状。\n\
    \n`geometry` 和 `geography` 数据类型可以使用三种基本类型的几何体：点（`Point`）、线串（`LineString`）和多边形（`Polygon`）：\n"
- fmt: '# 第十章 处理空间数据


    `Point` 是最基本的几何类型，表示空间中的一个单独位置。`Point` 几何是零维的，这意味着它没有相关的面积或长度。


    `LineString` 由一系列两个或多个不同的点以及连接这些点的线段组成。`LineString` 有长度，但没有相关的面积。一个**简单**的 `LineString`
    是指点之间的路径不会自相交。一个**闭合**的 `LineString` 是指起点和终点是同一个点。一个既简单又闭合的 `LineString` 被称为**环**。


    `Polygon` 由一个**外环**组成，它定义了多边形所包含空间区域的边界。多边形也可以指定一个或多个**内环**，它们定义了外环内部但被多边形排除的空间区域。内环可以被看作是从多边形中“挖掉”的“洞”。多边形是二维的——它们有一个长度，测量为所有定义环的总长度，还有一个面积，测量为外环内（且未被任何内环排除）的空间。


    > **注意** 在 SQL Server 中处理空间数据时，`geometry` 一词有两种不同的含义。为了区分清楚，我将使用 `geometry`（常规字体）作为通用名称来描述点、线串和多边形，并使用
    `geometry`（代码字体）来指代 `geometry` 数据类型。


    有时，一个要素可能由多个几何体表示，这种情况下它被称为一个 `GeometryCollection`。`GeometryCollection` 可以是同构的，也可以是异构的。例如，中国的长城不是一段连续的墙；相反，它由几个不同的墙段组成。因此，它可以表示为一个
    `MultiLineString`——一个 `LineString` 几何的同构集合。同样，许多国家，如日本，可以表示为一个 `MultiPolygon`——一个由几个多边形组成的
    `GeometryCollection`，每个多边形代表一个独立的岛屿。也有可能存在一个异构的 `GeometryCollection`，例如包含一个点、三个线串和两个多边形的集合。


    图 10-1 展示了 SQL Server 2008 中使用的三种基本几何类型，以及它们通常适用的场景示例。


    在选择了合适的几何类型来表示给定要素后，我们需要一种方法将几何定义中的每个点与其所代表的相关真实世界位置关联起来。例如，要使用 `Polygon` 几何来表示美国国防部五角大楼，我们需要指定定义
    `Polygon` 几何边界的五个点与大楼五个角的位置相关联。那么我们如何做到这一点呢？


    你可能熟悉“经度”和“纬度”这些术语，因此你可能会认为这仅仅是列出几何中每个点的相应纬度和经度坐标的问题。不幸的是，事情并非如此简单。


    图 10-1. 不同类型的几何体及其常见用途


    许多人没有意识到的是，地球表面上的任何一个点，并不仅仅只有一个唯一的纬度或经度与之关联。实际上，存在许多不同的经纬度系统，给定点在地球上的坐标会因使用哪个系统而异。此外，经纬度坐标并不是表达地球上位置的唯一方式——还有其他类型的坐标可以在不使用经纬度的情况下定义物体的位置。


    为了理解如何指定几何体的坐标，我们首先需要考察不同的空间参考系统是如何工作的。


    ## 空间参考系统


    空间参考系统是一个旨在明确识别和描述空间中任何点位置的系统。这种能力对于使空间数据能够存储用于表示地球上要素的几何体坐标至关重要。


    为了描述空间中点的位置，每个空间参考系统都基于一个底层坐标系。在数学的各个领域中使用了许多不同类型的坐标系，但在 SQL Server 2008 中定义地理空间数据时，你最有可能使用基于**地理坐标系**或**投影坐标系**的空间参考系统。


    ### 地理坐标系


    在地理坐标系中，地球表面上的任何位置都可以使用两个角度坐标来定义：


    - 一个点的**纬度**坐标测量的是赤道平面与该点处垂直于地球表面的直线之间的角度。

    - **经度**坐标测量的是赤道平面内，从地球中心到该点的直线与从地球中心到**本初子午线**的直线之间的角度。


    通常，地理坐标以度为单位进行测量。因此，纬度可以在 –90°（南极）和 +90°（北极）之间变化。经度值从 –180° 延伸到 +180°。


    图 10-2 说明了如何使用地理坐标系来识别地球表面上的一个点。


    ### 投影坐标系


    与在三维的、圆形的地球模型上定义位置的地理坐标系相反，投影坐标系在平坦的二维平面（即地球表面的**投影**）上描述地球表面上的位置。简单来说，投影坐标系描述的是地图上的位置，而不是地球仪上的位置。


    如果我们认为地球表面上的所有点都位于一个平面上，我们可以使用熟悉的**x** 和 **y** 笛卡尔坐标（有时称为东向和北向）来定义该平面上的位置，它们分别代表一个点沿
    x 轴和 y 轴距离原点的距离。


    图 10-3 说明了图 10-2 中所示的同一个点如何使用投影坐标系来定义。


    图 10-2. 使用地理坐标系描述地球上的一个位置


    图 10-3. 使用投影坐标系描述地球上的一个位置


    ### 将坐标系应用于地球


    无论是来自地理坐标系还投影坐标系的一组坐标，其本身并不能唯一地标识地球上的一个位置。我们需要知道额外的信息，例如从哪里测量这些坐标、使用什么单位，以及使用什么形状来模拟地球。因此，除了指定所使用的坐标系外，每个空间参考系统还必须包含一个**基准**、一个**本初子午线**和一个**计量单位**。


    #### 基准


    基准包含有关地球大小和形状的信息。具体来说，它包含一个**参考椭球体**和一个**参考框架**的详细信息，它们用于创建一个可以应用坐标系的地球大地模型。'
  raw: 'A **Point** is the most fundamental type of geometry, representing a singular


    location in space. A Point geometry is zero-dimensional, meaning that it has no


    associated area or length.


    •


    A **LineString** is comprised of a series of two or more distinct points, together
    with


    the line segments that connect those points together. LineStrings have a length,


    but no associated area. A **simple** LineString is one in which the path drawn


    between the points does not cross itself. A **closed** LineString is one that
    starts and


    ends at the same point. A LineString that is both simple and closed is known as
    a


    **ring**.


    •


    A **Polygon** consists of an **exterior ring**, which defines the perimeter of
    the area of space contained within the polygon. A polygon may also specify one
    or more


    **internal rings**, which define areas of space contained within the external
    ring but


    excluded from the Polygon. Internal rings can be thought of as “holes” cut out
    of


    the Polygon. Polygons are two-dimensional—they have a length measured as the


    total length of all defined rings, and also an area measured as the space contained


    within the exterior ring (and not excluded by any interior rings).


    „ **Note** The word *geometry* has two distinct meanings when dealing with spatial
    data in SQL Server. To make the distinction clear, I will use the word *geometry*
    (regular font) as the generic name to describe Points, LineStrings, and Polygons,
    and geometry (code font) to refer to the geometry datatype.


    Sometimes, a single feature may be represented by more than one geometry, in which
    case it is known as a **GeometryCollection**. GeometryCollections may be homogenous
    or heterogeneous. For example, the Great Wall of China is not a single contiguous
    wall; rather, it is made up of several distinct sections of wall. As such, it
    could be represented as a MultiLineString—a homogenous collection of LineString
    geometries. Similarly, many countries, such as Japan, may be represented as a


    MultiPolygon—a GeometryCollection consisting of several polygons, each one representing
    a distinct island. It is also possible to have a heterogeneous GeometryCollection,
    such as a collection containing a Point, three LineStrings, and two Polygons.


    Figure 10-1 illustrates the three basic types of geometries used in SQL Server
    2008 and some examples of situations in which they are commonly used.


    Having chosen an appropriate type of geometry to represent a given feature, we
    need some way of relating each point in the geometry definition to the relevant
    real-world position it represents. For example, to use a Polygon geometry to represent
    the US Department of Defense Pentagon building, we need to specify that the five
    points that define the boundary of the Polygon geometry relate to the location
    of the five corners of the building. So how do we do this?


    You are probably familiar with the terms *longitude* and *latitude*, in which
    case you may be thinking that it is simply a matter of listing the relevant latitude
    and longitude coordinates for each point in the geometry. Unfortunately, it’s
    not quite that simple.


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    *Figure 10-1\. Different types of geometries and their common uses*


    What many people don’t realize is that any particular point on the earth’s surface
    does not have only one unique latitude or longitude associated with it. There
    are, in fact, many different systems of latitude and longitude, and the coordinates
    of a given point on the earth will vary depending on which system is used. Furthermore,
    latitude and longitude coordinates are not the only way of expressing positions
    on the earth—there are other types of coordinates that define the location of
    an object without using latitude and longitude at all.


    In order to understand how to specify the coordinates of a geometry, we first
    need to examine how different spatial reference systems work.


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    Spatial Reference Systems


    A spatial reference system is a system designed to unambiguously identify and
    describe the location of any point in space. This ability is essential to enable
    spatial data to store the coordinates of geometries used to represent features
    on the earth.


    To describe the positions of points in space, every spatial reference system is
    based on an


    underlying coordinate system. There are many different types of coordinate systems
    used in various fields of mathematics, but when defining geospatial data in SQL
    Server 2008, you are most likely to use a spatial reference system based on either
    a **geographic coordinate system** or a **projected coordinate** **system**.


    Geographic Coordinate Systems


    In a geographic coordinate system, any position on the earth’s surface can be
    defined using two angular coordinates:


    •


    The **latitude** coordinate of a point measures the angle between the plane of
    the


    equator and a line drawn perpendicular to the surface of the earth at that point.


    •


    The **longitude** coordinate measures the angle in the equatorial plane between
    a


    line drawn from the center of the earth to the point and a line drawn from the


    center of the earth to the **prime meridian**.


    Typically, geographic coordinates are measured in degrees. As such, latitude can
    vary between –90°


    (at the South Pole) and +90° (at the North Pole). Longitude values extend from
    –180° to +180°.


    Figure 10-2 illustrates how a geographic coordinate system can be used to identify
    a point on the earth’s surface.


    Projected Coordinate Systems


    In contrast to the geographic coordinate system, which defines positions on a
    three-dimensional, round model of the earth, a projected coordinate system describes
    positions on the earth’s surface on a flat, two-dimensional plane (i.e., a **projection**
    of the earth’s surface). In simple terms, a projected coordinate system describes
    positions on a map rather than positions on a globe.


    If we consider all of the points on the earth’s surface to lie on a flat plane,
    we can define positions on that plane using familiar Cartesian coordinates of
    **x** and **y** (sometimes referred to as Easting and Northing), which represent
    the distance of a point from an origin along the x axis and y axis, respectively.


    Figure 10-3 illustrates how the same point illustrated in Figure 10-2 could be
    defined using a projected coordinate system.


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    *Figure 10-2\. Describing a position on the earth using a geographic coordinate
    system*


    *Figure 10-3\. Describing a position on the earth using a projected coordinate
    system*


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    Applying Coordinate Systems to the Earth


    A set of coordinates from either a geographic or projected coordinate system does
    not, on its own, uniquely identify a position on the earth. We need to know additional
    information, such as where to measure those coordinates from and in what units,
    and what shape to use to model the earth. Therefore, in addition to specifying
    the coordinate system used, every spatial reference system must also contain a
    **datum**, a **prime meridian**, and a **unit of measurement**.


    Datum


    A datum contains information about the size and shape of the earth. Specifically,
    it contains the details of a **reference ellipsoid** and a **reference frame**,
    which are used to create a geodetic model of the earth onto which a coordinate
    system can be applied.'
