  trans: "\n# 查找非覆盖区间\n\n查找非覆盖区间（即就业历史中的空白期）相对简单一些。首先，使用与查找覆盖区间查询中结束日期相同的语法，找出每个子区间的结束日期。这些日期中的每一个都标志着一个非覆盖区间的开始。务必过滤掉\
    \ `EndDate` 为 `NULL` 的行——这些子区间尚未结束，因此将它们包含为空白期没有意义。在查找每个空白期结束的子查询中，找出空白期开始后出现的第一个开始日期（如果存在）。\n\
    \n以下 T-SQL 演示了这种查找非覆盖区间的方法：\n\n```sql\nSELECT\n    theStart.EndDate AS StartDate,\n\
    \    (\n        SELECT MIN(theEnd.StartDate)\n        FROM EmploymentHistory theEnd\n\
    \        WHERE\n            theEnd.StartDate > theStart.EndDate\n            AND\
    \ theEnd.Employee = theStart.Employee\n    ) AS EndDate\nFROM EmploymentHistory\
    \ theStart\nWHERE\n    theStart.Employee = 'Jones'\n    AND theStart.EndDate IS\
    \ NOT NULL\n    AND NOT EXISTS\n    (\n        SELECT *\n        FROM EmploymentHistory\
    \ After\n        WHERE After.StartDate = theStart.EndDate\n    );\n```\n\n# 重叠区间\n\
    \n我想讨论的使用开始和结束日期表示区间的最后一个好处（或缺点，取决于建模对象）是处理重叠区间的能力。理解如何处理重叠对于执行与重叠相关的查询（\"在 2007\
    \ 年 8 月至 2008 年 9 月期间，有多少员工为公司工作过？\"）或者对于施加约束以避免重叠（如前一节开始的单个员工示例中所必需的）都是必要的。\n\
    \n## 重叠类型\n\n首先，需要一些关于重叠的背景知识。图 11-4 展示了可能的区间重叠类型。区间 A 被其他区间 B 到 E 各自重叠，如下所示：\n\
    \n-   区间 B 在区间 A 内开始，并在区间 A 之后结束。\n-   区间 C 则相反，在区间 A 之前开始，并在区间 A 内结束。\n-   区间\
    \ D 在区间 A 内开始并结束。\n-   最后，区间 E 在区间 A 之前开始并在其之后结束。\n\n图 11-4. 重叠区间的类型\n\n## 广义重叠算法\n\
    \n假设每个区间都有一个 `StartTime` 属性和一个 `EndTime` 属性，那么区间 B 到 E 中每一个与区间 A 之间的关系可以用类似 SQL\
    \ 的语法形式化如下：\n\n```sql\nB.StartDate >= A.StartDate AND B.StartDate < A.EndDate\
    \ AND B.EndDate > A.EndDate\n\nC.StartDate < A.StartDate AND C.EndDate > A.StartDate\
    \ AND C.EndDate <= A.EndDate\n\nD.StartDate >= A.StartDate AND D.EndDate <= A.EndDate\n\
    \nE.StartDate < A.StartDate AND E.EndDate > A.EndDate\n```\n\n用名称 `X` 替换所有区间 B\
    \ 到 E，我们可以开始为检测重叠创建一个广义算法。让我们首先考虑区间 `X` **不** 重叠区间 A 的情况。这可能在两种情况下发生：要么 `X` 完全发生在区间\
    \ A 之后，要么它完全在区间 A 之前——例如：\n\n```sql\nX.StartDate > A.EndDate OR X.EndDate < A.StartDate\n\
    ```\n\n如果上述条件在 `X` 不重叠 A 的情况下为真，那么重叠的条件就必定是此条件的补集——换句话说：\n\n```sql\nX.StartDate\
    \ < A.EndDate AND X.EndDate > A.StartDate\n```\n\n用英语重新表述这个条件，我们得到：“如果 `X` 在 A\
    \ 结束之前开始，并且 `X` 在 A 开始之后结束，那么 `X` 与 A 重叠。” 这如图 11-5 所示。\n\n图 11-5. 如果 `X` 在 A\
    \ 结束之前开始且 `X` 在 A 开始之后结束，则两个区间重叠。\n\n## 使用触发器防止重叠\n\n回到 `EmploymentHistory` 表及其缺乏适当约束的问题，很明显，真正的问题在于它没有被约束以避免重叠。一个员工不能同时拥有两个职位，而确保这种情况不会发生的唯一方法是确保每个员工的子区间是唯一的。\n\
    \n不幸的是，这个逻辑不能嵌入到约束中，因为为了确定一行是否与另一行重叠，必须评估集合中的所有其他行。以下查询使用最终的重叠表达式，在 `EmploymentHistory`\
    \ 表中查找 Jones 的所有重叠行：\n\n```sql\nSELECT *\nFROM EmploymentHistory E1\nJOIN EmploymentHistory\
    \ E2 ON\n    E1.Employee = E2.Employee\n    AND (\n        E1.StartDate < COALESCE(E2.EndDate,\
    \ '99991231')\n        AND COALESCE(E1.EndDate, '99991231') > E2.StartDate)\n\
    \    AND E1.StartDate <> E2.StartDate\nWHERE\n    E1.Employee = 'Jones';\n```\n\
    \n注意，为了避免显示与自身重叠的行，添加了 `E1.StartDate <> E2.StartDate` 表达式。由于在 `Employee` 和 `StartDate`\
    \ 列上存在主键，我们知道没有两行可以共享相同的 `StartDate`，因此这不影响重叠逻辑。此外，在结束日期 (`EndDate`) 为开放式 (`NULL`)\
    \ 的情况下，使用 `COALESCE` 语句来替代最大可能的日期值。这避免了在插入一个未来开始的区间时，当前区间仍然有效的可能性。\n\n每次对表进行插入或更新时都必须评估此逻辑，确保插入或更新操作产生的行都不会造成任何重叠。由于此逻辑不能放入约束中，因此只有一种可能性——触发器。触发器逻辑相当简单；基础表将与\
    \ `inserted` 虚拟表连接，而不是将 `EmployeeHistory` 与自身连接。以下 T-SQL 展示了触发器：\n\n```sql\nCREATE\
    \ TRIGGER No_Overlaps\nON EmploymentHistory\nFOR UPDATE, INSERT\nAS\nBEGIN\n \
    \   IF EXISTS\n    (\n        SELECT *\n        FROM inserted i\n        JOIN\
    \ EmploymentHistory E2 ON\n            i.Employee = E2.Employee\n            AND\
    \ (\n                i.StartDate < COALESCE(E2.EndDate, '99991231')\n        \
    \        AND COALESCE(i.EndDate, '99991231') > E2.StartDate)\n            AND\
    \ i.StartDate <> E2.StartDate\n    )\n    BEGIN\n        RAISERROR('Overlapping\
    \ interval inserted!', 16, 1);\n        ROLLBACK;\n    END\nEND;\nGO\n```\n\n\
    ## 监控并发进程\n\n本节的最后一个示例涉及一个常见场景，在其中你可能希望调查重叠区间：在数据库场景中监控并发进程的性能时。\n\n要开始设置此示例，请加载\
    \ SQL Server Profiler，启动一个新跟踪，并连接到测试服务器。取消选中除 `SQL:BatchCompleted` 之外的所有事件，并保留选中的默认列。\n\
    \n开始跟踪，然后加载 RML 命令提示符。输入以下查询：\n\n```bash\nostress -Q\"SELECT * FROM sys.databases;\"\
    \ -q –n100 –r100\n```\n\n前面的代码将在 100 个线程上执行一个查询的 100 次迭代。运行大约需要 1 分钟，并将产生 10,000\
    \ 个 Profiler 事件——每次调用查询产生一个事件。当 `ostress` 运行完成后，返回到 Profiler 并点击 `File` > `Save\
    \ As Trace Table`，将数据保存到数据库中一个名为 `Overlap_Trace` 的新表中。\n\nProfiler 跟踪表包含两个 `StartTime`\
    \ 和 `EndTime` 列，许多事件（包括 `SQL:BatchCompleted` 和 `RPC:Completed`）都填充了这两个列。通过将这些列视为一个区间，并使用以下一些查询模式，你可以操作数据来完成诸如将并发查询数量与数据库服务器性能下降相关联的事情。\n\
    \n第一个也是最基本的查询是找出表中哪个时间区间表示的重叠最多。换句话说，在某个查询运行期间，有多少其他查询在运行？\n\n为了回答这个问题，表中每个查询的区间必须与表中所有其他查询的区间进行比较。以下\
    \ T-SQL 使用先前讨论的重叠算法来实现这一点：\n\n```sql\nSELECT\n    O1.StartTime,\n    O1.EndTime,\n\
    \    COUNT(*)\nFROM Overlap_Trace O1\nJOIN Overlap_Trace O2 ON\n    (O1.StartTime\
    \ < O2.EndTime AND O1.EndTime > O2.StartTime)\n    AND O1.SPID <> O2.SPID\nGROUP\
    \ BY\n    O1.StartTime,\n    O1.EndTime\nORDER BY COUNT(*) DESC;\n```\n"
- fmt: "## CHAPTER 11 „ WORKING WITH TEMPORAL DATA\n\nMuch like the `EmploymentTable`\
    \ example, we need to make sure that no false positives are generated by rows\
    \ overlapping with themselves. Since a server process can’t run two queries simultaneously,\
    \ the server process identifier (`SPID`) column works for the purpose in this\
    \ case.\n\nRunning this query on an unindexed table is a painful experience. It\
    \ is agonizingly slow, and in the sample table on my machine, it required 288,304\
    \ logical reads. Creating the following index on the table helped a small amount:\n\
    \n```sql\nCREATE NONCLUSTERED INDEX IX_StartEnd\nON Overlap_Trace (StartTime,\
    \ EndTime, SPID)\n```\n\nHowever, I noticed that the index was still not being\
    \ effectively used; examining the query plan revealed an outer table scan with\
    \ a nested loop for an inner table scan—one table scan for every row of the table.\
    \ Going back and looking at the original two algorithms before merging them, I\
    \ noticed that they return exclusive sets of data. The first algorithm returns\
    \ overlaps of intervals B and D, whereas the second algorithm returns overlaps\
    \ of intervals C and E. I also noticed that each algorithm on its own is more\
    \ index friendly than the combined version. The solution to the performance issue\
    \ is to merge the two algorithms, not into a single expression, but rather using\
    \ `UNION ALL`, as follows:\n\n```sql\nSELECT\n    x.StartTime,\n    x.EndTime,\n\
    \    SUM(x.theCount)\nFROM\n    (\n        SELECT\n            O1.StartTime,\n\
    \            O1.EndTime,\n            COUNT(*) AS theCount\n        FROM Overlap_Trace\
    \ O1\n        JOIN Overlap_Trace O2 ON\n            (O1.StartTime >= O2.StartTime\
    \ AND O1.StartTime < O2.EndTime)\n            AND O1.SPID <> O2.SPID\n       \
    \ GROUP BY\n            O1.StartTime,\n            O1.EndTime\n        UNION ALL\n\
    \        SELECT\n            O1.StartTime,\n            O1.EndTime,\n        \
    \    COUNT(*) AS theCount\n        FROM Overlap_Trace O1\n        JOIN Overlap_Trace\
    \ O2 ON\n            (O1.StartTime < O2.StartTime AND O1.EndTime > O2.StartTime)\n\
    \            AND O1.SPID <> O2.SPID\n        GROUP BY\n            O1.StartTime,\n\
    \            O1.EndTime\n    ) x\nGROUP BY\n    x.StartTime,\n    x.EndTime\n\
    ORDER BY SUM(x.theCount) DESC\nOPTION(HASH GROUP);\n```\n\nThis query is logically\
    \ identical to the previous one. It merges the two exclusive sets based on the\
    \ same intervals and sums their counts, which is the same as taking the full count\
    \ of the interval in one shot. Note that I was forced to add the `HASH GROUP`\
    \ option to the end of the query to make the query optimizer make better use of\
    \ the index. Once that hint was in place, the total number of reads done by the\
    \ query dropped to 66,780—a significant improvement.\n\n### Time Slicing\n\nAnother\
    \ way to slice and dice overlapping intervals is by splitting the data into separate\
    \ periods and looking at the activity that occurred during each. For instance,\
    \ to find out how many employees worked for a firm in each month of the year,\
    \ you could find out which employees’ work date intervals overlapped January 1\
    \ through January 31, again for February 1 through February 28, and so on.\n\n\
    Although it’s easy to answer those kinds of questions for dates by using a calendar\
    \ table, it’s a bit trickier when you need to do it with times. Prepopulating\
    \ a calendar table with every *time*, in addition to every date, for the next\
    \ ten or more years would cause a massive increase in the I/O required to read\
    \ the dates, and would therefore seriously cut down on the table’s usefulness.\
    \ Instead, I recommend dynamically generating time tables as you need them. The\
    \ following UDF takes an input start and end date and outputs periods for each\
    \ associated subinterval:\n\n```sql\nCREATE FUNCTION TimeSlice\n(\n    @StartDate\
    \ datetime,\n    @EndDate datetime\n)\nRETURNS @t TABLE\n(\n    StartDate datetime\
    \ NOT NULL,\n    EndDate datetime NOT NULL,\n    PRIMARY KEY (StartDate, EndDate)\
    \ WITH (IGNORE_DUP_KEY=ON)\n)\nWITH SCHEMABINDING\nAS\nBEGIN\n    IF (@StartDate\
    \ > @EndDate)\n        RETURN;\n\n    -- Round down start date to the nearest\
    \ second\n    DECLARE @TruncatedStart datetime;\n    SET @TruncatedStart =\n \
    \       DATEADD(second, DATEDIFF(second, '20000101', @StartDate), '20000101');\n\
    \n    -- Round down end date to the nearest second\n    DECLARE @TruncatedEnd\
    \ datetime;\n    SET @TruncatedEnd =\n        DATEADD(second, DATEDIFF(second,\
    \ '20000101', @EndDate), '20000101');\n\n    --Insert start and end date/times\
    \ first\n```"
  raw: 'Much like the EmploymentTable example, we need to make sure that no false
    positives are generated by rows overlapping with themselves. Since a server process
    can’t run two queries simultaneously, the server process identifier (SPID) column
    works for the purpose in this case.


    Running this query on an unindexed table is a painful experience. It is agonizingly
    slow, and in the sample table on my machine, it required 288,304 logical reads.
    Creating the following index on the table helped a small amount:


    CREATE NONCLUSTERED INDEX IX_StartEnd


    ON Overlap_Trace (StartTime, EndTime, SPID)


    However, I noticed that the index was still not being effectively used; examining
    the query plan revealed an outer table scan with a nested loop for an inner table
    scan—one table scan for every row of the table. Going back and looking at the
    original two algorithms before merging them, I noticed that they return exclusive
    sets of data. The first algorithm returns overlaps of intervals B and D, whereas
    the second algorithm returns overlaps of intervals C and E. I also noticed that
    each algorithm on its own is more index friendly than the combined version. The
    solution to the performance issue is to merge the two algorithms, not into a single
    expression, but rather using UNION ALL, as follows:


    SELECT


    x.StartTime,


    x.EndTime,


    SUM(x.theCount)


    FROM


    (


    SELECT


    O1.StartTime,


    O1.EndTime,


    COUNT(*) AS theCount


    FROM Overlap_Trace O1


    JOIN Overlap_Trace O2 ON


    (O1.StartTime >= O2.StartTime AND O1.StartTime < O2.EndTime)


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    AND O1.SPID <> O2.SPID


    GROUP BY


    O1.StartTime,


    O1.EndTime


    UNION ALL


    SELECT


    O1.StartTime,


    O1.EndTime,


    COUNT(*) AS theCount


    FROM Overlap_Trace O1


    JOIN Overlap_Trace O2 ON


    (O1.StartTime < O2.StartTime AND O1.EndTime > O2.StartTime)


    AND O1.SPID <> O2.SPID


    GROUP BY


    O1.StartTime,


    O1.EndTime


    ) x


    GROUP BY


    x.StartTime,


    x.EndTime


    ORDER BY SUM(x.theCount) DESC


    OPTION(HASH GROUP);


    This query is logically identical to the previous one. It merges the two exclusive
    sets based on the same intervals and sums their counts, which is the same as taking
    the full count of the interval in one shot. Note that I was forced to add the
    HASH GROUP option to the end of the query to make the query optimizer make better
    use of the index. Once that hint was in place, the total number of reads done
    by the query dropped to 66,780—a significant improvement.


    Time Slicing


    Another way to slice and dice overlapping intervals is by splitting the data into
    separate periods and looking at the activity that occurred during each. For instance,
    to find out how many employees worked for a firm in each month of the year, you
    could find out which employees’ work date intervals overlapped January 1 through
    January 31, again for February 1 through February 28, and so on.


    Although it’s easy to answer those kinds of questions for dates by using a calendar
    table, it’s a bit trickier when you need to do it with times. Prepopulating a
    calendar table with every *time*, in addition to every date, for the next ten
    or more years would cause a massive increase in the I/O required to read the dates,
    and would therefore seriously cut down on the table’s usefulness. Instead, I recommend
    dynamically generating time tables as you need them. The following UDF takes an
    input start and end date and outputs periods for each associated subinterval:


    CREATE FUNCTION TimeSlice


    (


    @StartDate datetime,


    @EndDate datetime


    )


    RETURNS @t TABLE


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    (


    StartDate datetime NOT NULL,


    EndDate datetime NOT NULL,


    PRIMARY KEY (StartDate, EndDate) WITH (IGNORE_DUP_KEY=ON)


    )


    WITH SCHEMABINDING


    AS


    BEGIN


    IF (@StartDate > @EndDate)


    RETURN;


    -- Round down start date to the nearest second


    DECLARE @TruncatedStart datetime;


    SET @TruncatedStart =


    DATEADD(second, DATEDIFF(second, ''20000101'', @StartDate), ''20000101'');


    -- Round down end date to the nearest second


    DECLARE @TruncatedEnd datetime;


    SET @TruncatedEnd =


    DATEADD(second, DATEDIFF(second, ''20000101'', @EndDate), ''20000101'');


    --Insert start and end date/times first'
  trans: "\n\n## 第 11 章 时态数据处理\n\n与 `EmploymentTable` 示例类似，我们必须确保不会因为行与自身重叠而产生误报。由于服务器进程无法同时运行两个查询，此时服务器进程标识符（`SPID`）列就能派上用场。\n\
    \n在未建索引的表上运行此查询是一种痛苦的体验。它极其缓慢，在我机器上的示例表中，它需要 288,304 次逻辑读取。在表上创建以下索引起到了一点作用：\n\
    \n```sql\nCREATE NONCLUSTERED INDEX IX_StartEnd\nON Overlap_Trace (StartTime,\
    \ EndTime, SPID)\n```\n\n然而，我注意到索引仍未被有效利用；检查查询计划发现是针对外部表的扫描，内部表则采用嵌套循环——表中的每一行都导致了一次表扫描。回顾合并前的原始两种算法，我注意到它们返回的是互斥的数据集。第一种算法返回区间\
    \ B 和 D 的重叠部分，而第二种算法返回区间 C 和 E 的重叠部分。我还注意到，每种算法单独使用时都比合并版本对索引更友好。解决性能问题的方法不是将两种算法合并为单个表达式，而是使用\
    \ `UNION ALL`，如下所示：\n\n```sql\nSELECT\n    x.StartTime,\n    x.EndTime,\n    SUM(x.theCount)\n\
    FROM\n    (\n        SELECT\n            O1.StartTime,\n            O1.EndTime,\n\
    \            COUNT(*) AS theCount\n        FROM Overlap_Trace O1\n        JOIN\
    \ Overlap_Trace O2 ON\n            (O1.StartTime >= O2.StartTime AND O1.StartTime\
    \ < O2.EndTime)\n            AND O1.SPID <> O2.SPID\n        GROUP BY\n      \
    \      O1.StartTime,\n            O1.EndTime\n        UNION ALL\n        SELECT\n\
    \            O1.StartTime,\n            O1.EndTime,\n            COUNT(*) AS theCount\n\
    \        FROM Overlap_Trace O1\n        JOIN Overlap_Trace O2 ON\n           \
    \ (O1.StartTime < O2.StartTime AND O1.EndTime > O2.StartTime)\n            AND\
    \ O1.SPID <> O2.SPID\n        GROUP BY\n            O1.StartTime,\n          \
    \  O1.EndTime\n    ) x\nGROUP BY\n    x.StartTime,\n    x.EndTime\nORDER BY SUM(x.theCount)\
    \ DESC\nOPTION(HASH GROUP);\n```\n\n此查询在逻辑上与前一个相同。它基于相同的区间合并两个互斥集并对其计数求和，这等同于一次性获取区间的完整计数。请注意，我被迫在查询末尾添加了\
    \ `HASH GROUP` 选项，以使查询优化器更好地利用索引。一旦加入该提示，查询的总读取次数降至 66,780 次——这是一个显著的改进。\n\n###\
    \ 时间切片\n\n另一种分析重叠区间的方法是将数据拆分为单独的时段，并查看每个时段内发生的活动。例如，要找出每年每月有多少员工为某家公司工作，你可以找出哪些员工的工作日期区间与\
    \ 1 月 1 日至 1 月 31 日重叠，再检查 2 月 1 日至 2 月 28 日，依此类推。\n\n虽然使用日历表很容易回答这类日期问题，但当需要处理时间时就有点棘手了。预先用未来十年或更长时间的每一个*时间点*（以及每一个日期）填充日历表，会导致读取日期所需的\
    \ I/O 大幅增加，从而严重降低该表的实用性。因此，我建议根据需要动态生成时间表。以下用户定义函数接受一个输入的开始和结束日期，并为每个关联的子区间输出周期：\n\
    \n```sql\nCREATE FUNCTION TimeSlice\n(\n    @StartDate datetime,\n    @EndDate\
    \ datetime\n)\nRETURNS @t TABLE\n(\n    StartDate datetime NOT NULL,\n    EndDate\
    \ datetime NOT NULL,\n    PRIMARY KEY (StartDate, EndDate) WITH (IGNORE_DUP_KEY=ON)\n\
    )\nWITH SCHEMABINDING\nAS\nBEGIN\n    IF (@StartDate > @EndDate)\n        RETURN;\n\
    \n    -- 将开始日期向下舍入到最近的秒\n    DECLARE @TruncatedStart datetime;\n    SET @TruncatedStart\
    \ =\n        DATEADD(second, DATEDIFF(second, '20000101', @StartDate), '20000101');\n\
    \n    -- 将结束日期向下舍入到最近的秒\n    DECLARE @TruncatedEnd datetime;\n    SET @TruncatedEnd\
    \ =\n        DATEADD(second, DATEDIFF(second, '20000101', @EndDate), '20000101');\n\
    \n    -- 首先插入开始和结束日期时间\n```\n\n"
- fmt: "# CHAPTER 11 „ WORKING WITH TEMPORAL DATA\n\n--Make sure to match the same\
    \ start/end interval passed in\n\n```sql\nINSERT INTO @t (\n\nStartDate,\n\nEndDate\n\
    \n)\n\n-- Insert the first interval\n\nSELECT\n\n@StartDate,\n\nCASE\n\nWHEN DATEADD(second,\
    \ 1, @TruncatedStart) > @EndDate THEN @EndDate\n\nELSE DATEADD(second, 1, @TruncatedStart)\n\
    \nEND\n\nUNION ALL\n\n-- Insert the last interval\n\nSELECT\n\nCASE\n\nWHEN @TruncatedEnd\
    \ < @StartDate THEN @StartDate\n\nELSE @TruncatedEnd\n\nEND,\n\n@EndDate;\n\n\
    SET @TruncatedStart = DATEADD(second, 1, @TruncatedStart);\n\n--Insert one row\
    \ for each whole second in the interval\n\nWHILE (@TruncatedStart < @TruncatedEnd)\n\
    \nBEGIN\n\nINSERT INTO @t (\n\nStartDate,\n\nEndDate\n\n)\n\nVALUES (\n\n@TruncatedStart,\n\
    \nDATEADD(second, 1, @TruncatedStart)\n\n);\n\nSET @TruncatedStart = DATEADD(second,\
    \ 1, @TruncatedStart);\n\nEND;\n\nRETURN;\n\nEND;\n```\n\nThis function is currently\
    \ hard-coded to use seconds as the subinterval length, but it can easily be changed\
    \ to any other time period by modifying the parameters to `DATEDIFF` and `DATEADD`.\n\
    \n## Using the TimeSlice Function\n\nAs an example of using the function, consider\
    \ the following call:\n\n```sql\nSELECT *\n\nFROM dbo.TimeSlice('2010-01-02T12:34:45.003',\
    \ '2010-01-02T12:34:48.100');\n```\n\nThe output, shown following, contains one\
    \ row per whole second range in the interval, with the start and endpoints constrained\
    \ by the interval boundaries.\n\n```\nStartDate                   EndDate\n2010-01-02\
    \ 12:34:45.003    2010-01-02 12:34:46.000\n2010-01-02 12:34:46.000    2010-01-02\
    \ 12:34:47.000\n2010-01-02 12:34:47.000    2010-01-02 12:34:48.000\n2010-01-02\
    \ 12:34:48.000    2010-01-02 12:34:48.100\n```\n\nTo use the `TimeSlice` function\
    \ to look at the number of overlapping queries over the course of the sample trace,\
    \ first find the start and endpoints of the trace using the `MIN` and `MAX` aggregates.\
    \ Then slice the interval into 1-second periods using the function. The following\
    \ T-SQL shows how to do that:\n\n```sql\nSELECT\n\n    Slices.DisplayDate\n\n\
    FROM\n\n    (\n\n        SELECT MIN(StartTime), MAX(EndTime)\n\n        FROM Overlap_Trace\n\
    \n    ) StartEnd (StartTime, EndTime)\n\n    CROSS APPLY\n\n    (\n\n        SELECT\
    \ *\n\n        FROM dbo.TimeSlice(StartEnd.StartTime, StartEnd.EndTime)\n\n  \
    \  ) Slices;\n```\n\nThe output of the `TimeSlice` function can then be used to\
    \ find the number of overlapping queries that were running during each period,\
    \ by using the `CROSS APPLY` operator again in conjunction with the interval overlap\
    \ expression:\n\n```sql\nSELECT\n\n    Slices.DisplayDate,\n\n    OverLaps.thecount\n\
    \nFROM\n\n    (\n\n        SELECT MIN(StartTime), MAX(EndTime)\n\n        FROM\
    \ Overlap_Trace\n\n    ) StartEnd (StartTime, EndTime)\n\n    CROSS APPLY\n\n\
    \    (\n\n        SELECT *\n\n        FROM dbo.TimeSlice(StartEnd.StartTime, StartEnd.EndTime)\n\
    \n    ) Slices\n\n    CROSS APPLY\n\n    (\n\n        SELECT COUNT(*) AS theCount\n\
    \n        FROM Overlap_Trace OT\n\n        WHERE\n\n            Slices.StartDate\
    \ < OT.EndTime\n\n            AND Slices.EndDate > OT.StartTime\n\n    ) Overlaps;\n\
    ```\n\nThis data, in conjunction with a performance monitor trace, can be used\
    \ to correlate spikes in counters at certain times to what was actually happening\
    \ in the database. This can be especially useful for tracking sudden increases\
    \ in blocking, which often will not correspond to increased utilization of any\
    \ system resources, which can make them difficult to identify. By adding additional\
    \ filters to the preceding query, you can look at concurrent runs of specific\
    \ queries that are prone to blocking one another in order to find out whether\
    \ they might be causing performance issues.\n\n## Modeling Durations\n\nDurations\
    \ are very similar to intervals, in that they represent a start time and an end\
    \ time. In many cases, therefore, it makes sense to model durations as intervals\
    \ and determine the actual duration for reporting or aggregation purposes by using\
    \ `DATEDIFF`. However, in some cases, you may wish to store durations using a\
    \ greater precision than the 100ns resolution offered by SQL Server’s `datetime2`\
    \ type. In addition, it can be difficult to format the duration calculated between\
    \ two date/time columns for output, sometimes requiring intricate string manipulation.\n\
    \nThere are several examples of cases when you might want to model durations rather\
    \ than intervals.\n\nDatabases that store information about timed scientific trials,\
    \ for example, often require microsecond or even nanosecond precision. Another\
    \ example is data that may not require a date/time component at all. For instance,\
    \ a table containing times for runners competing in the 300-yard dash may not\
    \ need a start time. The moment at which the run took place does not matter; the\
    \ only important fact is how long the runner took to travel the 300 yards.\n\n\
    The most straightforward solution to the issue of inadequate resolution is to\
    \ store a start date, along with an integer column to represent the actual duration\
    \ using whatever unit of measurement is required for the accuracy of the application\
    \ in hand:\n\n```sql\nCREATE TABLE Events\n(\n    EventId int,\n    StartTime\
    \ datetime2,\n    DurationInNanoseconds int\n);\n```\n\nUsing the `Events` table,\
    \ it is possible to find the approximate end time of an event by using `DATEADD`\
    \ to add the duration to the start time. SQL Server will round the duration down\
    \ to the nearest 100ns—the lowest time resolution supported by the `datetime2`\
    \ type. For the 300-yard dash or other scenarios where starting time does not\
    \ matter, the `StartTime` column can simply be dropped, and only the duration\
    \ itself maintained (of course, the results in such cases may not require nanosecond\
    \ precision as used here).\n\nWhat this table does not address is the issue of\
    \ formatting, should you need to output precise data rendered as a human-readable\
    \ string. Since the lowest granularity supported by the SQL Server types is 100ns,\
    \ none of the time-formatting methods will help to output a time string representing\
    \ nanosecond precision. As such, you will have to roll your own code to do so.\
    \ Once again I should stress that formatting is best done in a client tier. However,\
    \ if you do need to format data in the database tier (and you have a *very* good\
    \ reason to do so), the best approach to handle this scenario would be to create\
    \ a SQLCLR UDF that uses the properties of .NET’s `TimeSpan` type to build a string\
    \ up to and including second precision, and then append the remaining nanosecond\
    \ portion to the end.\n\nThe following UDF can be used to return a duration measured\
    \ in nanoseconds in the string format `HH:MM:SS.NNNNNN` (where `N` represents\
    \ nanoseconds):\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction]\npublic\
    \ static SqlString FormatDuration(SqlInt64 TimeInNanoseconds)\n{\n    // Ticks\
    \ = Nanoseconds / 10\n    long ticks = TimeInNanoseconds.Value / 100;\n    //\
    \ Create the TimeSpan based on the number of ticks\n    TimeSpan ts = new TimeSpan(ticks);\n\
    \    // Format the output to HH:MM:SS:NNNNNN\n    return new SqlString(\n    \
    \    ts.Hours.ToString() + \":\"\n        + ts.Minutes.ToString() + \":\"\n  \
    \      + ts.Seconds.ToString() + \".\"\n        + (TimeInNanoseconds % 1000000000)\n\
    \    );\n}\n```\n\nThis function could easily be amended to return whatever time\
    \ format is required for your particular application.\n\n## Managing Bitemporal\
    \ Data\n\nA central truth that all database developers must come to realize is\
    \ that the quality of data is frequently not as great as it could be (or as we\
    \ might wish it to be). Sometimes we’re forced to work with incomplete or incorrect\
    \ data, and correct things later as a more complete picture of reality becomes\
    \ available.\n\nModifying data in the database is simple enough—a call to a DML\
    \ statement and the work is done. But in systems that require advanced logging\
    \ and reproducibility of reports between runs for auditing purposes, a straightforward\
    \ `UPDATE`, `INSERT`, or `DELETE` may be counterproductive. Performing such data\
    \ modification can destroy the possibility of re-creating the same output on consecutive\
    \ runs of the same query."
