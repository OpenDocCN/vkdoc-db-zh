    Going Dynamic: Using EXECUTE


    The solution to all of the aforementioned static SQL problems is, of course, to
    go dynamic. Building dynamic SQL inside of a stored procedure is simple, the code
    is relatively easy to understand and, as I’ll 212


    CHAPTER 8 „ DYNAMIC T-SQL


    show, it can provide excellent performance. However, there are various potential
    issues to note, not the least of which being security concerns. I’ll explain how
