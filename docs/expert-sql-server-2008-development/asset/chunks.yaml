    you know what will happen if a janitor, while cleaning the data-center floor,
    accidentally slops some mop water into the fan enclosure of the database server?
    It might crash, or it might not; it might just cause some component to fail somewhere
    deep in the app, sending up a strange error message.


    Although most exceptions won’t be so far out of the realm of testability, it is
    certainly important to understand how to deal with them when and if they occur.
    It is also imperative that SQL Server developers understand how to work with errors—both
    those thrown by the server itself and custom errors built specifically for when
    problems occur during the runtime of an application.


    Exceptions vs. Errors


    The terms **exception** and **error**, while often used interchangeably by developers,
    actually refer to slightly different conditions:


    An **error** can occur if something goes wrong during the course of a program,
    even


    though it can be purely informational in nature. For instance, the message


    displayed by a program informing a user that a question mark is an invalid


    character for a file name is considered to be an error message. However, this
    may


    or may not mean that the program itself is in an invalid state.


    An **exception**, on the other hand, is an error that is the result of an **exceptional**


    **circumstance**. For example, if a network library is being used to send packets,
    and


    the network connection is suddenly dropped due to someone unplugging a cable,


    the library might throw an exception. An exception tells the calling code that


    something went wrong and the routine aborted unexpectedly. If the caller does
    not


    **handle** the exception (i.e., capture it), its execution will also abort. This
    process will keep repeating until the exception is handled, or until it reaches
    the highest level of


    the call stack, at which point the entire program will fail.


