    Developing software with a specific concentration on the data tier can have a
    benefit when it comes to testing: there aren’t too many types of tests that you
    need to be familiar with. Arguably, the two most important types of test are those
    that verify that the application behaves as it is meant to, and returns the correct
    results. This is the purpose of unit tests and functional tests.


    **Unit tests** are black box tests that verify the contracts exposed by interfaces.
    For


    instance, a unit test of a stored procedure should validate that, given a certain
    set of


    inputs, the stored procedure returns the correct set of output results, as defined
    by


    the interface *of the stored procedure being tested. The term *correct* as used
    here is important to define carefully. It means “correct” only insofar as what
    is defined as*


    *the contract for the stored procedure; the actual data returned is not important.
    So,


    as long as the results represent valid values in the correct format and of the
    correct


    datatypes given the interface’s contract, a unit test should pass. Phrased another


    way, unit tests test the ability of interfaces to communicate with the outside
    world


    exactly as their contracts say they will.


    **Functional tests**, as their name implies, verify the functionality of whatever
    is being tested. In testing nomenclature, the term *functional test* has a much
    vaguer


    meaning than *unit test*. It can mean any kind of test, at any level of an application,
    that tests whether that piece of the application works properly—in other words,


    that it performs the appropriate sequence of operations to deliver the correct
    final


    result as expected. For a simple stored procedure that selects data from the


    database, this asks the question of whether the stored procedure returning the


    *correct data*? Again, I will carefully define the term *correct*. This time,
    *correct* means both the kind of validation done for a unit test (data must be
    in the correct format),


    as well as a deeper validation of the accuracy of the actual values returned.
    The


    logic required for this kind of validation means that a functional test is a white
    box


    test in the database world, compared to the black box of unit testing.


    Let’s take a look at an example to make these ideas a bit clearer. Consider the
    following stored procedure, which might be used for a banking application:


    CREATE PROCEDURE GetAggregateTransactionHistory


    @CustomerId int


    AS


    BEGIN


    SET NOCOUNT ON;


    CHAPTER 3 „ TESTING DATABASE ROUTINES


    SELECT


    SUM


    (


    CASE TransactionType


    WHEN ''Deposit'' THEN Amount


    ELSE 0


    END


    ) AS TotalDeposits,


    SUM


    (


    CASE TransactionType


    WHEN ''Withdrawal'' THEN Amount


    ELSE 0


    END


    ) AS TotalWithdrawals


    FROM TransactionHistory


    WHERE


    CustomerId = @CustomerId;


    END;


    This stored procedure’s implied contract states that, given the input of a customer
    ID into the


    @CustomerId parameter, a result set of two columns and zero or one rows will be
    output (the contract does not imply anything about invalid customer IDs or customers
    who have not made any transactions).


    The column names in the output result set will be TotalDeposits and TotalWithdrawals,
    and the datatypes of the columns will be the same as the datatype of the Amount
    column in the


    TransactionHistory table (we’ll assume it’s decimal).


    **What if the Customer Doesn’t Exist?**


    The output of the GetAggregateTransactionHistory stored procedure will be the
    same whether you pass in a valid customer ID for a customer that happens to have
    had no transactions, or an invalid customer ID. Either way, the procedure will
    return no rows. Depending on the requirements of a particular situation, it might
    make sense to make the interface richer by changing the rules a bit, only returning
    no rows if an invalid customer ID is passed in. That way, the caller will be able
    to identify invalid data and give the user an appropriate error message rather
    than implying that the nonexistent customer made no transactions.


    A unit test against this stored procedure should do nothing more than validate
    the interface. A customer ID should be passed in, and the unit test should interrogate
    the output result set (or lack thereof) to ensure that there are two columns of
    the correct name and datatype and zero or one rows. No verification of data is
    necessary; it would be out of scope, for instance, to find out whether the aggregate
    information was accurate or not—that would be the job of a functional test.


    The reason that we draw such a distinction between unit tests and functional tests
    is that when testing pure interface compliance, we want to put ourselves in the
    position of someone programming against the interface from a higher layer. Is
    the interface working as documented, providing the appropriate level of encapsulation
    and returning data in the correct format?


    CHAPTER 3 „ TESTING DATABASE ROUTINES


    Each interface in the system will need one or more of these tests (see the “How
    Many Tests Are Needed?” section later in the chapter), so they need to be kept
    focused and lightweight. Programming full white box tests against every interface
    may not be feasible, and it might be simpler to test the validity of data at a
    higher layer, such as via the user interface itself. In the case of the


    GetAggregateTransactionHistory stored procedure, writing a functional test would
    essentially entail rewriting the entire stored procedure again—hardly a good use
    of developer time.


    Unit Testing Frameworks


    Unit testing is made easier through the use of unit testing frameworks, which
    provide structured programming interfaces designed to assist with quickly testing
    software. These frameworks generally make use of **debug assertions**, which allow
    the developer to specify those conditions that make a test true or false.


    A debug assertion is a special kind of macro that is turned on only when a piece
    of software is compiled in debug mode. It accepts an expression as input and throws
    an exception if the expression is false; otherwise, it returns true (or void,
    in some languages). For instance, the following assertion would always throw an
    exception:


    Assert(1 == 0);'
  trans: "# 第三章 测试数据库例程\n\n质量保证领域内存在多种测试方法，但总的来说，所有类型的软件测试都可以分为两类：\n\n*   `黑盒测试` 指的是那些只对被测模块的输入输出做出假设，而不验证中间条件的测试。测试人员无需了解（也不要求了解）模块的内部工作原理——因此它们被包含在一个“黑盒”中。\n\
    *   `白盒测试` 则恰恰相反，它包括任何测试人员知晓并验证被测例程或函数内部实现的测试。白盒测试也被称为“开盒测试”，因为测试人员被允许查看模块内部以了解其运作方式，而不仅仅是检查其输入和输出。\n\
    \n在这两大分类之下，还有许多旨在针对应用程序不同特定领域的具体测试。黑盒测试的例子包括单元测试、安全测试以及基本的性能测试，如压力测试和耐久测试。随着测试阶段的推进，会识别出需要进一步测试的领域，所执行的测试类型也倾向于从黑盒转向白盒，以专注于特定的内部元素。\n\
    \n从数据库开发的视角来看，白盒测试的例子包括：验证模块内部工作的功能测试、执行数据验证的测试，以及当性能调优需要透彻了解数据访问方法时的测试案例。例如，在性能测试期间检索和分析查询计划，就是对存储过程进行白盒测试的一个例子。\n\
    \n## 单元测试与功能测试\n\n专注于数据层的软件开发在测试方面有一个好处：需要熟悉的测试类型并不多。可以说，最重要的两类测试是那些验证应用程序行为是否符合预期，并返回正确结果的测试。这就是单元测试和功能测试的目的。\n\
    \n`单元测试` 是验证接口所公开契约的黑盒测试。例如，对存储过程的单元测试应该验证：给定一组特定的输入，存储过程返回的输出结果集是否符合被测存储过程接口所定义的正确集合。这里使用的“正确”一词需要仔细定义。它仅在存储过程契约所定义的范围内意味着“正确”；实际返回的数据本身并不重要。因此，只要结果代表了根据接口契约定义的、格式和数据类型正确的有效值，单元测试就应该通过。换句话说，单元测试测试的是接口按照其契约规定与外部世界进行通信的能力。\n\
    \n`功能测试` ，顾名思义，验证的是被测对象的功能。在测试术语中，“功能测试”一词的含义比“单元测试”模糊得多。它可以指代任何类型、在应用程序任何层级上，测试该部分应用是否正常工作的测试——换句话说，就是测试它是否执行了适当的操作序列以交付预期的正确最终结果。对于一个从数据库中选择数据的简单存储过程而言，功能测试要问的问题是：该存储过程是否返回了正确的数据？同样，我将仔细定义“正确”这个词。这一次，“正确”既包含为单元测试所做的那种验证（数据必须格式正确），也包含对返回值实际准确性的更深层次验证。进行这种验证所需的逻辑意味着，在数据库领域中，功能测试是一种白盒测试，与单元测试的黑盒性质形成对比。\n\
    \n让我们看一个例子来让这些想法更清晰一些。考虑下面这个可能用于银行应用程序的存储过程：\n\n```sql\nCREATE PROCEDURE GetAggregateTransactionHistory\n\
    \    @CustomerId int\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    SELECT\n        SUM\n\
    \        (\n            CASE TransactionType\n                WHEN 'Deposit' THEN\
    \ Amount\n                ELSE 0\n            END\n        ) AS TotalDeposits,\n\
    \        SUM\n        (\n            CASE TransactionType\n                WHEN\
    \ 'Withdrawal' THEN Amount\n                ELSE 0\n            END\n        )\
    \ AS TotalWithdrawals\n    FROM TransactionHistory\n    WHERE\n        CustomerId\
    \ = @CustomerId;\nEND;\n```\n\n这个存储过程隐含的契约表明，给定 `@CustomerId` 参数输入一个客户 ID，将输出一个包含两列、零行或一行的列结果集（该契约并未对无效的客户\
    \ ID 或没有进行过任何交易的客户做出任何暗示）。\n\n输出结果集中的列名将是 `TotalDeposits` 和 `TotalWithdrawals`，列的数据类型将与\
    \ `TransactionHistory` 表中 `Amount` 列的数据类型相同（我们假设它是 decimal 类型）。\n\n### 如果客户不存在怎么办？\n\
    \n`GetAggregateTransactionHistory` 存储过程的输出，无论你传入的是一个碰巧没有交易的有效客户 ID，还是一个无效的客户 ID，都将是相同的。无论哪种情况，该过程都将不返回任何行。根据特定情况的需求，通过稍微改变规则来使接口更丰富可能更有意义：即仅当传入无效的客户\
    \ ID 时才不返回行。这样，调用方将能够识别无效数据，并向用户提供适当的错误消息，而不是暗示不存在的客户没有进行交易。\n\n针对此存储过程的单元测试应该只做接口验证。应传入一个客户\
    \ ID，单元测试应检查输出结果集（或其缺失），以确保存在两列名称和数据类型正确的列，以及零行或一行。无需进行数据验证；例如，去核查汇总信息是否准确就超出了范围——那将是功能测试的工作。\n\
    \n我们之所以在单元测试和功能测试之间做出如此区分，是因为在测试纯粹的接口合规性时，我们希望将自己置于从更高层编程使用该接口的人的立场上。接口是否按文档工作，提供了适当级别的封装并以正确的格式返回数据？\n\
    \n系统中的每个接口都需要一个或多个此类测试（参见本章后面的“需要多少测试？”一节），因此它们需要保持专注和轻量。为每个接口编写完整的白盒测试可能不可行，而且在更高层级（例如通过用户界面本身）测试数据的有效性可能更简单。在\
    \ `GetAggregateTransactionHistory` 存储过程的例子中，编写一个功能测试本质上相当于重写整个存储过程——这绝不是开发人员时间的良好利用。\n\
    \n## 单元测试框架\n\n使用单元测试框架可以简化单元测试，这些框架提供了结构化的编程接口，旨在帮助快速测试软件。这些框架通常利用 `调试断言` ，允许开发人员指定那些使测试为真或为假的条件。\n\
    \n调试断言是一种特殊的宏，只有在软件以调试模式编译时才会被启用。它接受一个表达式作为输入，如果表达式为假则抛出异常；否则返回真（或在某些语言中返回 void）。例如，以下断言将始终抛出异常：\n\
    \n```\nAssert(1 == 0);\n```"
- fmt: "# 第三章 测试数据库例程\n\n断言允许开发者自我记录代码例程所做的假设。如果一个例程期望某个变量在特定时间处于特定状态，则可以使用断言来帮助确保随着代码的成熟，该假设得以强制执行。如果在未来的任何时间，代码的更改使该假设无效，则进行更改的开发人员在测试或调试时触发该断言将会引发异常。\n\
    \n在单元测试中，断言有着非常相似的目的。它们允许测试人员控制使单元测试返回真或假的条件。如果在单元测试中有任何断言引发异常，则整个测试被视为失败。\n\n\
    几乎每种语言和平台都有单元测试框架，包括 T-SQL（例如，可从 http://sourceforge.net/projects/tsqlunit 获取的\
    \ TSQLUnit 项目）。就个人而言，我发现与其他语言相比，在 T-SQL 中进行单元测试很麻烦，因此更喜欢使用 .NET 单元测试框架 NUnit（http://www.nunit.org）在\
    \ .NET 语言中编写测试。\n\n提供关于如何针对单元测试框架编码的深入指南超出了本书的范围，但鉴于许多开发人员对存储过程进行单元测试仍有些陌生，我将提供一套基本的遵循规则。编写存储过程单元测试时，可以遵循以下基本步骤：\n\
    \n1.  首先，确定应该对存储过程的接口做出哪些假设。将返回哪些结果集？列的数据类型是什么，会有多少列？契约是否保证了特定的行数？\n2.  接下来，编写执行待测存储过程所需的代码。如果你使用\
    \ NUnit，我发现暴露相关输出的最简单方法是使用 ADO.NET 用存储过程的结果填充一个 `DataSet`，以便随后进行检查。在此阶段要小心；你想要测试的是存储过程，而不是你的数据访问框架。你可能会忍不住使用与应用程序本身相同的方法来调用存储过程。然而，这将是一个错误，因为你最终将同时测试存储过程和该方法。鉴于你只需要填充一个\
    \ `DataSet`，在单元测试中重新编码数据访问不应是主要负担，并且可以防止你测试到你本不打算测试的代码部分。\n3.  最后，对你关于存储过程所做的每个假设使用一个断言；这意味着每个列名一个断言，每个列数据类型一个断言，必要时行数一个断言，等等。宁可多用断言——如果后来发现某个假设不正确，再将其移除，总比一开始就没有该假设，而在接口实际上工作不正确时单元测试却通过了要好。\n\
    \n以下代码清单展示了 NUnit 测试 `GetAggregateTransactionHistory` 存储过程可能的样子：\n\n```csharp\n\
    [TestMethod]\npublic void TestAggregateTransactionHistory()\n{\n    // Set up\
    \ a command object\n    SqlCommand comm = new SqlCommand();\n\n    // Set up the\
    \ connection\n    comm.Connection = new SqlConnection(\n        @\"server=serverName;\
    \ trusted_connection=true;\");\n\n    // Define the procedure call\n    comm.CommandText\
    \ = \"GetAggregateTransactionHistory\";\n    comm.CommandType = CommandType.StoredProcedure;\n\
    \    comm.Parameters.AddWithValue(\"@CustomerId\", 123);\n\n    // Create a DataSet\
    \ for the results\n    DataSet ds = new DataSet();\n\n    // Define a DataAdapter\
    \ to fill a DataSet\n    SqlDataAdapter adapter = new SqlDataAdapter();\n    adapter.SelectCommand\
    \ = comm;\n\n    try\n    {\n        // Fill the dataset\n        adapter.Fill(ds);\n\
    \    }\n    catch\n    {\n        Assert.Fail(\"Exception occurred!\");\n    }\n\
    \n    // Now we have the results -- validate them...\n\n    // There must be exactly\
    \ one returned result set\n    Assert.IsTrue(\n        ds.Tables.Count == 1,\n\
    \        \"Result set count != 1\");\n    DataTable dt = ds.Tables[0];\n\n   \
    \ // There must be exactly two columns returned\n    Assert.IsTrue(\n        dt.Columns.Count\
    \ == 2,\n        \"Column count != 2\");\n\n    // There must be columns called\
    \ TotalDeposits and TotalWithdrawals\n    Assert.IsTrue(\n        dt.Columns.IndexOf(\"\
    TotalDeposits\") > -1,\n        \"Column TotalDeposits does not exist\");\n  \
    \  Assert.IsTrue(\n        dt.Columns.IndexOf(\"TotalWithdrawals\") > -1,\n  \
    \      \"Column TotalWithdrawals does not exist\");\n\n    // Both columns must\
    \ be decimal\n    Assert.IsTrue(\n        dt.Columns[\"TotalDeposits\"].DataType\
    \ == typeof(decimal),\n        \"TotalDeposits data type is incorrect\");\n  \
    \  Assert.IsTrue(\n        dt.Columns[\"TotalWithdrawals\"].DataType == typeof(decimal),\n\
    \        \"TotalWithdrawals data type is incorrect\");\n\n    // There must be\
    \ zero or one rows returned\n    Assert.IsTrue(\n        dt.Rows.Count <= 1,\n\
    \        \"Too many rows returned\");\n}\n```\n\n尽管单元测试的代码长度是它所测试的存储过程的两倍多，这一点可能令人不安，但请记住，大部分代码可以很容易地转换为模板以便快速重用。如前所述，你可能会忍不住将通用的单元测试代码重构到一个数据访问库中，但要小心，以免你最终测试的是你的测试框架，而不是你试图测试的实际例程。在调试正常工作的代码以试图弄清楚单元测试为何失败时，可能会浪费很多时间，而这实际上是因为单元测试所依赖的某些代码的故障。\n\
    \n单元测试允许对接口进行快速、自动化的验证。本质上，它们帮助你作为开发人员保证在对系统进行更改时没有破坏任何明显的东西。从这个意义上说，它们是无价的。在具有良好建立的单元测试集的系统上进行开发是一种乐趣，因为每个开发人员不再需要担心因接口更改而破坏其他组件。如果有任何东西需要修复，单元测试将会发出警报。\n\
    \n## 回归测试\n\n当你为特定的应用程序建立一套单元测试时，这些测试最终将充当一个**回归测试套件**，这将有助于防范**回归错误**——即当开发人员破坏了原本能工作的功能时出现的错误。对接口的任何更改——无论有意与否——都会导致单元测试失败（假设测试编写正确）。对于有意的更改，解决方案是相应地重写单元测试。但正是这些无意的更改，才是我们创建单元测试的目的，也是回归测试所针对的目标。\n\
    \n经验表明，修复应用程序中的错误常常会引入其他错误。在真实的开发场景中，这种情况发生的频率可能难以证实，但有观点认为在某些情况下可能高达 50%。通过建立回归测试套件，修复这些“副作用”错误的成本大大降低。它们可以在开发阶段被发现和修复，而不是在应用程序部署后由最终用户报告。\n\
    \n回归测试也是一些较新的软件开发方法的关键，例如敏捷开发和极限编程（XP）。随着这些方法日益普及，其采用方式也渗透到数据库领域，可以预期数据库开发人员将开始更乐于采纳其中的一些技术。\n\
    \n## 实施数据库测试流程和程序的指南\n\n在构成测试策略的所有可能要素中，成功的关键其实只有一个：一致性。测试必须是可重复的，并且每次必须以相同的方式运行，只有已知的（即已理解并有文档记录的）变量发生变化。不一致性，或者对测试之间可能发生变化的变量缺乏了解，可能意味着在测试中发现的任何问题都难以追踪。"
  raw: 'Assertions allow a developer to self-document assumptions made by the code
    of a routine. If a routine expects that a variable is in a certain state at a
    certain time, an assertion can be used in order to help make sure that assumption
    is enforced as the code matures. If, at any time in the future, a change in the
    code invalidates that assumption, an exception will be thrown should the developer
    making the change hit the assertion during testing or debugging.


    In unit testing, assertions serve much the same purpose. They allow the tester
    to control what conditions make the unit test return true or false. If any assertion
    throws an exception in a unit test, the entire test is considered to have failed.


    Unit testing frameworks exist for virtually every language and platform, including
    T-SQL (for example, the TSQLUnit project available from http://sourceforge.net/projects/tsqlunit).
    Personally, I find unit testing in T-SQL to be cumbersome compared to other languages,
    and prefer to write my tests in a .NET language using the .NET unit testing framework,
    NUnit (http://www.nunit.org).


    Providing an in-depth guide to coding against unit testing frameworks is outside
    the scope of this book, but given that unit testing stored procedures is still
    somewhat of a mystery to many developers, I will provide a basic set of rules
    to follow. When writing stored procedure unit tests, the following basic steps
    can be followed:


    1\. First, determine what assumptions should be made about the stored


    procedure’s interface. What are the result sets that will be returned? What are


    the datatypes of the columns, and how many columns will there be? Does the


    contract make any guarantees about a certain number of rows?


    2\. Next, write code necessary to execute the stored procedure to be tested. If


    you’re using NUnit, I find that the easiest way of exposing the relevant output


    is to use ADO.NET to fill a DataSet with the result of the stored procedure,


    where it can subsequently be interrogated. Be careful at this stage; you want
    to


    test the stored procedure, not your data access framework. You might be


    tempted to call the stored procedure using the same method as in the


    application itself. However, this would be a mistake, as you would end up


    testing both the stored procedure and that method. Given that you only


    CHAPTER 3 „ TESTING DATABASE ROUTINES


    need to fill a DataSet, recoding the data access in the unit test should not be
    a


    major burden, and will keep you from testing parts of the code that you don’t


    intend to.


    3\. Finally, use one assertion for each assumption you’re making about the stored


    procedure; that means one assertion per column name, one per column


    datatype, one for the row count if necessary, and so on. Err on the side of using


    too many assertions—it’s better to have to remove an assumption later


    because it turns out to be incorrect than to not have had an assumption there


    to begin with and have your unit test pass when the interface is actually not


    working correctly.


    The following code listing gives an example of what an NUnit test of the


    GetAggregateTransactionHistory stored procedure might look like:


    [TestMethod]


    public void TestAggregateTransactionHistory()


    {


    // Set up a command object


    SqlCommand comm = new SqlCommand();


    // Set up the connection


    comm.Connection = new SqlConnection(


    @"server=serverName; trusted_connection=true;");


    // Define the procedure call


    comm.CommandText = "GetAggregateTransactionHistory";


    comm.CommandType = CommandType.StoredProcedure;


    comm.Parameters.AddWithValue("@CustomerId", 123);


    // Create a DataSet for the results


    DataSet ds = new DataSet();


    // Define a DataAdapter to fill a DataSet


    SqlDataAdapter adapter = new SqlDataAdapter();


    adapter.SelectCommand = comm;


    try


    {


    // Fill the dataset


    adapter.Fill(ds);


    }


    catch


    {


    Assert.Fail("Exception occurred!");


    }


    // Now we have the results -- validate them...


    // There must be exactly one returned result set


    Assert.IsTrue(


    CHAPTER 3 „ TESTING DATABASE ROUTINES


    ds.Tables.Count == 1,


    "Result set count != 1");


    DataTable dt = ds.Tables[0];


    // There must be exactly two columns returned


    Assert.IsTrue(


    dt.Columns.Count == 2,


    "Column count != 2");


    // There must be columns called TotalDeposits and TotalWithdrawals


    Assert.IsTrue(


    dt.Columns.IndexOf("TotalDeposits") > -1,


    "Column TotalDeposits does not exist");


    Assert.IsTrue(


    dt.Columns.IndexOf("TotalWithdrawals") > -1,


    "Column TotalWithdrawals does not exist");


    // Both columns must be decimal


    Assert.IsTrue(


    dt.Columns["TotalDeposits"].DataType == typeof(decimal),


    "TotalDeposits data type is incorrect");


    Assert.IsTrue(


    dt.Columns["TotalWithdrawals"].DataType == typeof(decimal),


    "TotalWithdrawals data type is incorrect");


    // There must be zero or one rows returned


    Assert.IsTrue(


    dt.Rows.Count <= 1,


    "Too many rows returned");


    }


    Although it might be disturbing to note that the unit test is over twice as long
    as the stored procedure it is testing, keep in mind that most of this code can
    be easily turned into a template for quick reuse. As noted before, you might be
    tempted to refactor common unit test code into a data access library, but be careful
    lest you end up testing your test framework instead of the actual routine you’re
    attempting to test. Many hours can be wasted debugging working code trying to
    figure out why the unit test is failing, when it’s actually the fault of some
    code the unit test is relying on to do its job.


    Unit tests allow for quick, automated verification of interfaces. In essence,
    they help you as a developer to guarantee that in making changes to a system you
    didn’t break anything obvious. In that way, they are invaluable. Developing against
    a system with a well-established set of unit tests is a joy, as each developer
    no longer needs to worry about breaking some other component due to an interface
    change. The unit tests will complain if anything needs to be fixed.


    Regression Testing


    As you build up a set of unit tests for a particular application, the tests will
    eventually come to serve as a **regression suite**, which will help to guard against
    **regression bugs**—bugs that occur when a developer 54


    CHAPTER 3 „ TESTING DATABASE ROUTINES


    breaks functionality that used to work. Any change to an interface—intentional
    or not—will cause unit tests to fail (assuming that the tests have been written
    correctly). For the intentional changes, the solution is to rewrite the unit test
    accordingly. But it is these unintentional changes for which we create unit tests,
    and which regression testing targets.


    Experience has shown that fixing bugs in an application often introduces other
    bugs. It can be difficult to substantiate how often this happens in real development
    scenarios, but it has been suggested that figures as high as 50 percent can occur
    in some cases. By building a regression suite, the cost of fixing these “side
    effect” bugs is greatly reduced. They can be discovered and mended during the
    development phase, instead of being reported by end users once the application
    has already been deployed.


    Regression testing is also the key to some newer software development methodologies,
    such as agile development and extreme programming (XP). As these methodologies
    increase in popularity, and their adoption filters through to the database world,
    it can be expected that database developers will begin to adopt some of these
    techniques more readily.


    Guidelines for Implementing Database Testing Processes


    and Procedures


    Of all the possible elements that make up a testing strategy, there is really
    only one key to success: consistency. Tests must be repeatable, and must be run
    the same way every time, with only well-known (i.e., understood and documented)
    variables changed. Inconsistency, or a lack of knowledge concerning those variables
    that might have changed between tests, can mean that any problems identified during
    testing will be difficult to trace.'
  trans: "# 第三章 测试数据库例程\n\n断言允许开发者自我记录代码例程所做的假设。如果一个例程期望某个变量在特定时间处于特定状态，则可以使用断言来帮助确保随着代码的成熟，该假设得以强制执行。如果在未来的任何时间，代码的更改使该假设无效，则进行更改的开发人员在测试或调试时触发该断言将会引发异常。\n\
    \n在单元测试中，断言有着非常相似的目的。它们允许测试人员控制使单元测试返回真或假的条件。如果在单元测试中有任何断言引发异常，则整个测试被视为失败。\n\n\
    几乎每种语言和平台都有单元测试框架，包括 T-SQL（例如，可从 http://sourceforge.net/projects/tsqlunit 获取的\
    \ TSQLUnit 项目）。就个人而言，我发现与其他语言相比，在 T-SQL 中进行单元测试很麻烦，因此更喜欢使用 .NET 单元测试框架 NUnit（http://www.nunit.org）在\
    \ .NET 语言中编写测试。\n\n提供关于如何针对单元测试框架编码的深入指南超出了本书的范围，但鉴于许多开发人员对存储过程进行单元测试仍有些陌生，我将提供一套基本的遵循规则。编写存储过程单元测试时，可以遵循以下基本步骤：\n\
    \n1.  首先，确定应该对存储过程的接口做出哪些假设。将返回哪些结果集？列的数据类型是什么，会有多少列？契约是否保证了特定的行数？\n2.  接下来，编写执行待测存储过程所需的代码。如果你使用\
    \ NUnit，我发现暴露相关输出的最简单方法是使用 ADO.NET 用存储过程的结果填充一个 `DataSet`，以便随后进行检查。在此阶段要小心；你想要测试的是存储过程，而不是你的数据访问框架。你可能会忍不住使用与应用程序本身相同的方法来调用存储过程。然而，这将是一个错误，因为你最终将同时测试存储过程和该方法。鉴于你只需要填充一个\
    \ `DataSet`，在单元测试中重新编码数据访问不应是主要负担，并且可以防止你测试到你本不打算测试的代码部分。\n3.  最后，对你关于存储过程所做的每个假设使用一个断言；这意味着每个列名一个断言，每个列数据类型一个断言，必要时行数一个断言，等等。宁可多用断言——如果后来发现某个假设不正确，再将其移除，总比一开始就没有该假设，而在接口实际上工作不正确时单元测试却通过了要好。\n\
    \n以下代码清单展示了 NUnit 测试 `GetAggregateTransactionHistory` 存储过程可能的样子：\n\n```csharp\n\
    [TestMethod]\npublic void TestAggregateTransactionHistory()\n{\n    // Set up\
    \ a command object\n    SqlCommand comm = new SqlCommand();\n\n    // Set up the\
    \ connection\n    comm.Connection = new SqlConnection(\n        @\"server=serverName;\
    \ trusted_connection=true;\");\n\n    // Define the procedure call\n    comm.CommandText\
    \ = \"GetAggregateTransactionHistory\";\n    comm.CommandType = CommandType.StoredProcedure;\n\
    \    comm.Parameters.AddWithValue(\"@CustomerId\", 123);\n\n    // Create a DataSet\
    \ for the results\n    DataSet ds = new DataSet();\n\n    // Define a DataAdapter\
    \ to fill a DataSet\n    SqlDataAdapter adapter = new SqlDataAdapter();\n    adapter.SelectCommand\
    \ = comm;\n\n    try\n    {\n        // Fill the dataset\n        adapter.Fill(ds);\n\
    \    }\n    catch\n    {\n        Assert.Fail(\"Exception occurred!\");\n    }\n\
    \n    // Now we have the results -- validate them...\n\n    // There must be exactly\
    \ one returned result set\n    Assert.IsTrue(\n        ds.Tables.Count == 1,\n\
    \        \"Result set count != 1\");\n    DataTable dt = ds.Tables[0];\n\n   \
    \ // There must be exactly two columns returned\n    Assert.IsTrue(\n        dt.Columns.Count\
    \ == 2,\n        \"Column count != 2\");\n\n    // There must be columns called\
    \ TotalDeposits and TotalWithdrawals\n    Assert.IsTrue(\n        dt.Columns.IndexOf(\"\
    TotalDeposits\") > -1,\n        \"Column TotalDeposits does not exist\");\n  \
    \  Assert.IsTrue(\n        dt.Columns.IndexOf(\"TotalWithdrawals\") > -1,\n  \
    \      \"Column TotalWithdrawals does not exist\");\n\n    // Both columns must\
    \ be decimal\n    Assert.IsTrue(\n        dt.Columns[\"TotalDeposits\"].DataType\
    \ == typeof(decimal),\n        \"TotalDeposits data type is incorrect\");\n  \
    \  Assert.IsTrue(\n        dt.Columns[\"TotalWithdrawals\"].DataType == typeof(decimal),\n\
    \        \"TotalWithdrawals data type is incorrect\");\n\n    // There must be\
    \ zero or one rows returned\n    Assert.IsTrue(\n        dt.Rows.Count <= 1,\n\
    \        \"Too many rows returned\");\n}\n```\n\n尽管单元测试的代码长度是它所测试的存储过程的两倍多，这一点可能令人不安，但请记住，大部分代码可以很容易地转换为模板以便快速重用。如前所述，你可能会忍不住将通用的单元测试代码重构到一个数据访问库中，但要小心，以免你最终测试的是你的测试框架，而不是你试图测试的实际例程。在调试正常工作的代码以试图弄清楚单元测试为何失败时，可能会浪费很多时间，而这实际上是因为单元测试所依赖的某些代码的故障。\n\
    \n单元测试允许对接口进行快速、自动化的验证。本质上，它们帮助你作为开发人员保证在对系统进行更改时没有破坏任何明显的东西。从这个意义上说，它们是无价的。在具有良好建立的单元测试集的系统上进行开发是一种乐趣，因为每个开发人员不再需要担心因接口更改而破坏其他组件。如果有任何东西需要修复，单元测试将会发出警报。\n\
    \n## 回归测试\n\n当你为特定的应用程序建立一套单元测试时，这些测试最终将充当一个**回归测试套件**，这将有助于防范**回归错误**——即当开发人员破坏了原本能工作的功能时出现的错误。对接口的任何更改——无论有意与否——都会导致单元测试失败（假设测试编写正确）。对于有意的更改，解决方案是相应地重写单元测试。但正是这些无意的更改，才是我们创建单元测试的目的，也是回归测试所针对的目标。\n\
    \n经验表明，修复应用程序中的错误常常会引入其他错误。在真实的开发场景中，这种情况发生的频率可能难以证实，但有观点认为在某些情况下可能高达 50%。通过建立回归测试套件，修复这些“副作用”错误的成本大大降低。它们可以在开发阶段被发现和修复，而不是在应用程序部署后由最终用户报告。\n\
    \n回归测试也是一些较新的软件开发方法的关键，例如敏捷开发和极限编程（XP）。随着这些方法日益普及，其采用方式也渗透到数据库领域，可以预期数据库开发人员将开始更乐于采纳其中的一些技术。\n\
    \n## 实施数据库测试流程和程序的指南\n\n在构成测试策略的所有可能要素中，成功的关键其实只有一个：一致性。测试必须是可重复的，并且每次必须以相同的方式运行，只有已知的（即已理解并有文档记录的）变量发生变化。不一致性，或者对测试之间可能发生变化的变量缺乏了解，可能意味着在测试中发现的任何问题都难以追踪。"
- fmt: "# Chapter 3: Testing Database Routines\n\nDevelopment teams should strive\
    \ to build a suite of tests that are run at least once for every release of the\
    \ application, if not more often. These tests should be automated and easy to\
    \ run. Preferably, the suite of tests should be modular, so that if a developer\
    \ is working on one part of the application, the subset of tests that apply to\
    \ only that section can be easily exercised in order to validate any changes.\n\
    \n### Continuous Testing\n\nOnce you’ve built a set of automated tests, you’re\
    \ one step away from a fully automatic testing environment. Such an environment\
    \ should retrieve the latest code from the source control repository, run appropriate\
    \ build scripts to compile a working version of the application, and run through\
    \ the entire test suite. Many software development shops use this technique to\
    \ run their tests several times a day, throwing alerts almost instantly if problem\
    \ code is checked in. This kind of rigorous automated testing is called continuous\
    \ integration, and it’s a great way to take some of the testing burden out of\
    \ the hands of developers while still making sure that all of the tests get run\
    \ as often as (or even more often than) necessary. A great free tool to help set\
    \ up continuous integration in .NET environments is `CruiseControl.NET`, available\
    \ at http://sourceforge.net/projects/ccnet.\n\nTesters must also pay particular\
    \ attention to any data used to conduct the tests. It can often be beneficial\
    \ to generate test data sets that include every possible case the application\
    \ is likely to see. Such a set of data can guarantee consistency between test\
    \ runs, as it can be restored to its original state. It can also guarantee that\
    \ rare edge cases are tested that might otherwise not be seen.\n\nIt’s also recommended\
    \ that a copy of actual production data (if available) be used for testing near\
    \ the end of any given test period, rather than relying on artificially generated\
    \ test data. Oftentimes, generated sets can lack the realism needed to bring to\
    \ light obscure issues that only real users can manage to bring out of an application.\n\
    \n## Why Is Testing Important?\n\nIt can be argued that the only purpose of software\
    \ is to be used by end users, and therefore the only purpose of testing is to\
    \ make sure that those end users don’t encounter issues. Thus, there are two important\
    \ goals that testing hopes to achieve:\n\n*   Testing finds problems that need\
    \ to be fixed.\n*   Testing ensures that no problems need to be fixed.\n\nEventually,\
    \ all software must be tested. If not fully tested by developers or a quality\
    \ assurance team, an application will be tested by the end users trying to use\
    \ the software. Unfortunately, this is a great way to lose credibility; users\
    \ are generally not pleased with buggy software.\n\nTesting by development and\
    \ quality assurance teams validates the software. Each kind of testing that is\
    \ performed validates a specific piece of the puzzle, and if a complete test suite\
    \ is used (and the tests are passed), the team can be fairly certain that the\
    \ software has a minimal number of bugs, performance defects, and other issues.\
    \ Since the database is an increasingly important component in most applications,\
    \ testing the database makes sense; if the database has problems, they will propagate\
    \ to the rest of the application.\n\n## What Kind of Testing Is Important?\n\n\
    From the perspective of a database developer, only a few types of tests are really\
    \ necessary in the majority of cases. Databases should be tested for the following\
    \ issues:\n\n*   `Interface consistency` should be validated in order to guarantee\
    \ that applications have a stable structure for data access.\n*   `Data availability`\
    \ and `authorization tests` are similar to interface consistency tests, but more\
    \ focused on *who* can get data from the database than *how* the data should be\
    \ retrieved.\n*   `Authentication tests` verify whether valid users can log in,\
    \ and whether invalid users are refused access. These kinds of tests are only\
    \ important if the database is being used for authenticating users.\n*   `Performance\
    \ tests` are important for verifying that the user experience will be positive,\
    \ and that users will not have to wait longer than necessary for data. Performance\
    \ testing may involve `load tests`, which monitor the performance of the database\
    \ under a given load; `saturation tests`, which attempt to overwhelm the system\
    \ by constantly adding load and/or removing resources from it until it breaks;\
    \ and, `endurance tests`, which place a continuous demand on the database over\
    \ a sustained period of time.\n*   `Regression testing` covers every other type\
    \ of test, but generally focuses on uncovering issues that were previously fixed.\
    \ A regression test is a test that validates that a fix still works.\n\n## How\
    \ Many Tests Are Needed?\n\nAlthough most development teams lack a sufficient\
    \ number of tests to test the application thoroughly, in some cases the opposite\
    \ is true. Too many tests can be just as much of a problem as not enough tests;\
    \ writing tests can be time-consuming, and tests must be maintained along with\
    \ the rest of the software whenever functionality changes. It’s important to balance\
    \ the need for thorough testing with the realities of time and monetary constraints.\n\
    \nA good starting point for database testing is to create one unit test per interface\
    \ parameter “class,” or group of inputs. For example, consider the following stored\
    \ procedure interface:\n\n```sql\nCREATE PROCEDURE SearchProducts\n    SearchText\
    \ varchar(100) = NULL,\n    PriceLessThan decimal = NULL,\n    ProductCategory\
    \ int = NULL\n```\n\nThis stored procedure returns data about products based on\
    \ three parameters, each of which is optional, based on the following (documented)\
    \ rules:\n\n*   A user can search for text in the product’s description.\n*  \
    \ A user can search for products where the price is less than a given input price.\n\
    *   A user can combine a text search or price search with an additional filter\
    \ on a certain product category, so that only results from that category are returned.\n\
    *   A user cannot search on both text and price simultaneously. This condition\
    \ should return an error.\n*   Any other combination of inputs should result in\
    \ an error.\n\nIn order to validate the stored procedure’s interface, one unit\
    \ test is necessary for each of these conditions. The unit tests that pass in\
    \ valid input arguments should verify that the stored procedure returns a valid\
    \ output result set per its implied contract. The unit tests for the invalid combinations\
    \ of arguments should verify that an error occurs when these combinations are\
    \ used. Known errors are part of an interface’s implied contract (see Chapter\
    \ 4 for more information on this topic).\n\nIn addition to these unit tests, an\
    \ additional regression test should be produced for each known issue that has\
    \ been fixed within the stored procedure, in order to ensure that the procedure’s\
    \ functionality does not degenerate over time.\n\nAlthough this seems like a massive\
    \ number of tests, keep in mind that these tests can—and should—share the same\
    \ base code. The individual tests will have to do nothing more than pass the correct\
    \ parameters to a parameterized base test.\n\n## Will Management Buy In?\n\nIt’s\
    \ an unfortunate fact that many management teams believe that testing is either\
    \ an unnecessary waste of time or not something that should be a well-integrated\
    \ part of the software development process at all. Many software shops, especially\
    \ smaller ones, have no dedicated quality assurance staff, and such compressed\
    \ development schedules that little testing gets done, making full functionality\
    \ testing nearly impossible.\n\nSeveral companies I’ve done work for have been\
    \ in this situation, and it never results in the time or money savings that management\
    \ thinks it will. On the contrary, time and money is actually *wasted* by lack\
    \ of testing."
