    this is a source control system, where overwritten source code might mean a lot
    of lost work. However, the best way to handle the situation for source control
    is up for debate. Two popular systems, Subversion and Visual SourceSafe, each
    handle this problem differently. Subversion uses an optimistic scheme in which
    anyone can edit a given file, but you receive a collision error when you commit
    if someone else has edited it in the interim. Visual SourceSafe, on the other
    hand, uses a pessimistic model where you must check out a given file before editing
    it, thereby restricting anyone else from doing edits until you check it back in.


    Finally, an example of a system that supports MVCC is a wiki. Although some wiki
    packages use an optimistic model, many others allow users to make edits at any
    time, simply incrementing the version number for a given page to reflect each
    change, but still saving past versions. This means that if two users are making
    simultaneous edits, some changes might get overwritten. However, users can always
    look back at the version history to restore overwritten content—in an MVCC system,
    nothing is ever actually deleted.


