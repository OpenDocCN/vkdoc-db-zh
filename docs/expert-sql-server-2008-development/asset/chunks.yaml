    2007-11-14


    Ignoring the gap, let’s see how one might answer a resume-style question using
    this data. As a modification to the previous query, suppose that we wanted to
    show the start and end date of tenure with each company, along with the maximum
    salary earned at the company, and what title was held when the highest salary
    was being earned.


    The first step commonly taken in tackling this kind of challenge is to use a correlated
    subquery to find the rows that have the maximum value per group. In this case,
    that means the maximum pay per company:


    SELECT


    Pay,


    Title


    FROM JobHistory AS J2


    WHERE


    J2.Pay =


    (


    SELECT MAX(Pay)


    FROM JobHistory AS J3


    WHERE J3.Company = J2.Company


    );


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    One key modification that must be made is to the basic query that finds start
    and end dates. Due to the fact that there are now multiple rows per job, the MIN
    aggregate will have to be employed to find the real start date, and the end date
    subquery will have to be modified to look not only at date changes, but also company
    changes. The following T-SQL finds the correct start and end dates for each company:
    SELECT


    J1.Company,


    MIN(J1.StartDate) AS StartDate,


    COALESCE((


    SELECT MIN(J2.StartDate)


    FROM JobHistory AS J2


    WHERE


    J2.Company <> J1.Company


    AND J2.StartDate > MIN(J1.StartDate)),


    CAST(GETDATE() AS date)


    ) AS EndDate


    FROM JobHistory AS J1


    GROUP BY J1.Company


    ORDER BY StartDate;'
  trans: "# 第十一章  处理时序数据\n\n处理数据库时，我们通常只关注事件的开始或结束时间，而不是完整的区间。在处理订单的数据库中，一个名为 `OrderDate`\
    \ 的列几乎是无处不在的；但这一列只存储订单结束时的日期/时间——即用户提交最终请求的时刻。它没有反映用户浏览网站、填充购物车以及输入信用卡信息所花费的时间。同样，每次我们查看电子邮件时，都会看到一个\
    \ `Sent Date` 字段，它捕捉的是发件人点击发送按钮的时刻，但无助于识别该人思考或输入电子邮件所花费的时间，而这些活动构成了“发送”过程的一部分。\n\
    \n我们不常看到这种扩展数据的原因是，它通常是不必要的。对于大多数网站来说，从订单履行的角度来看，用户浏览了多长时间并不重要（尽管该信息可能对界面设计师有用，或在考虑整体客户体验时有用）。而且，一旦电子邮件发出，发送它花费了多少精力也不那么重要。重要的是，它已经发送（并随后被接收——这是许多电子邮件客户端不暴露的另一个数据点）。\n\
    \n尽管存在这些反面例子，但对于许多应用程序来说，完整的分析需要开始和结束时间。以你的工作经历为例。当你从一个工作换到另一个工作时，你携带了你在特定时期拥有特定头衔、获得特定薪酬或承担特定工作职责的区间。未能包含这些数据的开始和结束日期可能会带来一些有趣的挑战。\n\
    \n## 建模和查询连续区间\n\n如果一个表仅使用开始时间或结束时间（而不是两者）来表示区间，那么该表中的所有行都可以被视为属于一个跨越整个时间段的连续区间。在这种情况下，每一行都代表某个状态发生变化的子区间。让我们看一些简单的例子来阐明这一点。从以下表和行开始：\n\
    \n```sql\nCREATE TABLE JobHistory\n(\n    Company varchar(100),\n    Title varchar(100),\n\
    \    Pay decimal(9, 2),\n    StartDate date\n);\nGO\n\nINSERT INTO JobHistory\n\
    (\n    Company,\n    Title,\n    Pay,\n    StartDate\n) VALUES\n('Acme Corp',\
    \ 'Programmer', 50000.00, '19970626'),\n('Software Shop', 'Programmer/Analyst',\
    \ 62000.00, '20001005'),\n('Better Place', 'Junior DBA', 82000.00, '20030108'),\n\
    ('Enterprise', 'Database Developer', 95000.00, '20071114');\nGO\n```\n\n请注意，每个日期都使用了\
    \ `date` 类型。除了最糟糕的微观管理者之外，没人会在查看工作历史记录时，关心某人是在第一天上午 8:00 还是 8:30 上班。重要的是表中的日期是开始*日期*。\n\
    \n`JobHistory` 表中的数据很容易转换成更符合逻辑的格式；为了获得完整的子区间，我们可以假设每份工作的结束日期是下一份工作的开始日期。可以假设最后一份工作的结束日期是当前日期（或者，如果你愿意，可以是\
    \ `NULL`）。根据这些规则将其转换为基于开始/结束日期的报告，需要使用类似以下的 T-SQL：\n\n```sql\nSELECT\n    J1.*,\n\
    \    COALESCE((\n        SELECT MIN(J2.StartDate)\n        FROM JobHistory AS\
    \ J2\n        WHERE J2.StartDate > J1.StartDate),\n        CAST(GETDATE() AS date)\n\
    \    ) AS EndDate\nFROM JobHistory AS J1;\n```\n\n这会产生以下结果（最终日期会变化，显示你运行查询的日期）：\n\
    \n| Company | Title | Pay | StartDate | EndDate |\n| :--- | :--- | :--- | :---\
    \ | :--- |\n| Acme Corp | Programmer | 50000.00 | 1997-06-26 | 2000-10-05 |\n\
    | Software Shop | Programmer/Analyst | 62000.00 | 2000-10-05 | 2003-01-08 |\n\
    | Better Place | Junior DBA | 82000.00 | 2003-01-08 | 2007-11-14 |\n| Enterprise\
    \ | Database Developer | 95000.00 | 2007-11-14 | 2009-07-12 |\n\n外部查询获取工作数据和开始时间，子查询找到当前行开始日期之后的第一个开始日期。如果不存在这样的开始日期，则使用当前日期。当然，这里一个明显的主要问题是缺乏对工作历史中空档期的支持。例如，这个表可能掩盖了对象在\
    \ 2002 年 7 月被 `Software Shop` 解雇的事实。这就是我为什么强调以此方式建模的数据具有连续性。\n\n尽管缺乏对空档期的支持，让我们再尝试一些数据，看看会发生什么。随着对象职业生涯的发展，他在这些不同公司的任职期间获得了各种头衔和薪酬变化，这些变化体现在以下新增行中：\n\
    \n```sql\nINSERT INTO JobHistory\n(\n    Company,\n    Title,\n    Pay,\n    StartDate\n\
    ) VALUES\n('Acme Corp', 'Programmer', 55000.00, '19980901'),\n('Acme Corp', 'Programmer\
    \ 2', 58000.00, '19990901'),\n('Acme Corp', 'Programmer 3', 58000.00, '20000901'),\n\
    ('Software Shop', 'Programmer/Analyst', 62000.00, '20001005'),\n('Software Shop',\
    \ 'Programmer/Analyst', 67000.00, '20020101'),\n('Software Shop', 'Programmer',\
    \ 40000.00, '20020301'),\n('Better Place', 'Junior DBA', 84000.00, '20040601'),\n\
    ('Better Place', 'DBA', 87000.00, '20060601');\n```\n\n`JobHistory` 表中的数据（如表 11-1\
    \ 所示）展示了对象相对职业发展道路上的历程。几次加薪和头衔调整——包括一次没有相应加薪的头衔调整——以及一次不幸的降职和随之而来的薪资缩减，刚好发生在 2002\
    \ 年被解雇之前（如前所述，这个空档期无法在此表示）。幸运的是，在解雇期间努力学习后，对象以一份好得多的薪水，当然也是一条更令人满意的职业轨迹，卷土重来！\n\
    \n### 表 11-1. 对象的完整工作历史，包含薪资和头衔调整\n\n| Company | Title | Pay | StartDate |\n|\
    \ :--- | :--- | :--- | :--- |\n| Acme Corp | Programmer | 50000.00 | 1997-06-26\
    \ |\n| Acme Corp | Programmer | 55000.00 | 1998-09-01 |\n| Acme Corp | Programmer\
    \ 2 | 58000.00 | 1999-09-01 |\n| Acme Corp | Programmer 3 | 58000.00 | 2000-09-01\
    \ |\n| Software Shop | Programmer/Analyst | 62000.00 | 2000-10-05 |\n| Software\
    \ Shop | Programmer/Analyst | 62000.00 | 2000-10-05 |\n| Software Shop | Programmer/Analyst\
    \ | 67000.00 | 2002-01-01 |\n| Software Shop | Programmer | 40000.00 | 2002-03-01\
    \ |\n| Better Place | Junior DBA | 82000.00 | 2003-01-08 |\n| Better Place | Junior\
    \ DBA | 84000.00 | 2004-06-01 |\n| Better Place | DBA | 87000.00 | 2006-06-01\
    \ |\n| Enterprise | Database Developer | 95000.00 | 2007-11-14 |\n\n忽略空档期，让我们看看如何使用这些数据来回答简历风格的问题。作为对先前查询的一个修改，假设我们想显示在每个公司的任职起始和结束日期，以及在该公司获得的最高工资，以及获得最高工资时所担任的头衔。\n\
    \n解决此类挑战通常采取的第一步是使用关联子查询来查找每组中具有最大值的行。在这种情况下，这意味着找出每家公司的最高薪酬：\n\n```sql\nSELECT\n\
    \    Pay,\n    Title\nFROM JobHistory AS J2\nWHERE\n    J2.Pay =\n    (\n    \
    \    SELECT MAX(Pay)\n        FROM JobHistory AS J3\n        WHERE J3.Company\
    \ = J2.Company\n    );\n```\n\n必须对查找开始和结束日期的基本查询进行一项关键修改。由于现在每个工作有多行，必须使用 `MIN`\
    \ 聚合函数来找到真正的开始日期，并且结束日期子查询必须修改为不仅查看日期变化，还要查看公司变化。以下 T-SQL 找到了每家公司的正确开始和结束日期：\n\
    \n```sql\nSELECT\n    J1.Company,\n    MIN(J1.StartDate) AS StartDate,\n    COALESCE((\n\
    \        SELECT MIN(J2.StartDate)\n        FROM JobHistory AS J2\n        WHERE\n\
    \            J2.Company <> J1.Company\n            AND J2.StartDate > MIN(J1.StartDate)),\n\
    \        CAST(GETDATE() AS date)\n    ) AS EndDate\nFROM JobHistory AS J1\nGROUP\
    \ BY J1.Company\nORDER BY StartDate;\n```"
- fmt: "# CHAPTER 11 - WORKING WITH TEMPORAL DATA\n\nA quick note: This query would\
    \ not work properly if the person had been hired back by the same company after\
    \ a period of absence during which he was working for another firm. To solve that\
    \ problem, you might use a query similar to the following, in which a check is\
    \ done to ensure that the “previous” row (based on `StartDate`) does not have\
    \ the same company name (meaning that the subject switched firms):\n\n```sql\n\
    SELECT\n    J1.Company,\n    J1.StartDate AS StartDate,\n    COALESCE((\n    \
    \    SELECT MIN(J2.StartDate)\n        FROM JobHistory AS J2\n        WHERE\n\
    \            J2.Company <> J1.Company\n            AND J2.StartDate > J1.StartDate),\n\
    \        CAST(GETDATE() AS date)\n    ) AS EndDate\nFROM JobHistory AS J1\nWHERE\n\
    \    J1.Company <>\n    COALESCE((\n        SELECT TOP(1)\n            J3.Company\n\
    \        FROM JobHistory J3\n        WHERE J3.StartDate < J1.StartDate\n     \
    \   ORDER BY J3.StartDate DESC),\n        ''\n    )\nGROUP BY\n    J1.Company,\n\
    \    J1.StartDate\nORDER BY\n    J1.StartDate;\n```\n\nThis example complicates\
    \ things a bit too much for the sake of this chapter, but I feel that it is important\
    \ to point this technique out in case you find it necessary to write these kinds\
    \ of queries in production applications. This pattern is useful in many scenarios,\
    \ especially when logging the status of an automated system and trying to determine\
    \ downtime statistics or other metrics.\n\nGetting back to the primary task at\
    \ hand, showing the employment history along with peak salaries and job titles,\
    \ the next step is to merge the query that finds the correct start and end dates\
    \ with the query that finds the maximum salary and associated title. The simplest\
    \ way of accomplishing this is with the `CROSS APPLY` operator, which behaves\
    \ similarly to a correlated subquery but returns a table rather than a scalar\
    \ value. The following T-SQL shows how to accomplish this:\n\n```sql\nSELECT\n\
    \    x.Company,\n    x.StartDate,\n    x.EndDate,\n    p.Pay,\n    p.Title\nFROM\n\
    \    (\n        SELECT\n            J1.Company,\n            MIN(J1.StartDate)\
    \ AS StartDate,\n            COALESCE((\n                SELECT MIN(J2.StartDate)\n\
    \                FROM JobHistory AS J2\n                WHERE\n              \
    \      J2.Company <> J1.Company\n                    AND J2.StartDate > MIN(J1.StartDate)),\n\
    \                CAST(GETDATE() AS date)\n            ) AS EndDate\n        FROM\
    \ JobHistory AS J1\n        GROUP BY J1.Company\n    ) x\nCROSS APPLY\n    (\n\
    \        SELECT\n            Pay,\n            Title\n        FROM JobHistory\
    \ AS J2\n        WHERE\n            J2.StartDate >= x.StartDate\n            AND\
    \ J2.StartDate < x.EndDate\n            AND J2.Pay =\n            (\n        \
    \        SELECT MAX(Pay)\n                FROM JobHistory AS J3\n            \
    \    WHERE J3.Company = J2.Company\n            )\n    ) p\nORDER BY x.StartDate;\n\
    ```\n\nThis T-SQL correlates the `CROSS APPLY` subquery using the `StartDate`\
    \ and `EndDate` columns from the outer query in order to find the correct employment\
    \ intervals that go along with each position. The `StartDate`/`EndDate` pair for\
    \ each period of employment is a `half-open interval` (or `semiopen`, depending\
    \ on which mathematics textbook you’re referring to); the `StartDate` end of the\
    \ interval is `closed` (inclusive of the endpoint), and the `EndDate` is `open`\
    \ (exclusive). This is because the `EndDate` for one interval is actually the\
    \ `StartDate` for the next interval, and these intervals do not overlap. The results\
    \ of this query are as follows:\n\n| Company       | StartDate  | EndDate    |\
    \ Pay      | Title             |\n| ------------- | ---------- | ---------- |\
    \ -------- | ----------------- |\n| Acme Corp     | 1997-06-26 | 2000-10-05 |\
    \ 58000.00 | Programmer 2      |\n| Acme Corp     | 1997-06-26 | 2000-10-05 |\
    \ 58000.00 | Programmer 3      |\n| Software Shop | 2000-10-05 | 2003-01-08 |\
    \ 67000.00 | Programmer/Analyst|\n| Better Place  | 2003-01-08 | 2007-11-14 |\
    \ 87000.00 | DBA               |\n| Enterprise    | 2007-11-14 | 2009-07-12 |\
    \ 95000.00 | Database Developer|\n\nAlthough the query does work, it has an issue;\
    \ the `CROSS APPLY` subquery will return more than one row if a title change was\
    \ made at the maximum pay level, without an associated pay increase (as happens\
    \ in this data set), thereby producing duplicate rows in the result. The solution\
    \ is to select the appropriate row by sorting the result by the `Pay` column,\
    \ in descending order. The modified subquery, which will return only one row per\
    \ position, is as follows:\n\n```sql\nSELECT TOP(1)\n    Pay,\n    Title\nFROM\
    \ JobHistory AS J2\nWHERE\n    J2.StartDate >= x.StartDate\n    AND J2.StartDate\
    \ < x.EndDate\nORDER BY Pay DESC\n```\n\nThe important things that I hope you\
    \ can take away from these examples are the patterns used for manipulating the\
    \ intervals, as well as the fact that modeling intervals in this way may not be\
    \ sufficient for many cases.\n\nIn terms of query style, the main thing to notice\
    \ is that in order to logically manipulate this data, some form of an “end” for\
    \ the interval must be synthesized within the query. Any time you’re faced with\
    \ a table that maps changes to an entity over time but uses only a single date/time\
    \ column to record the temporal component, try to think of how to transform the\
    \ data so that you can work with the start and end of the interval. This will\
    \ make querying much more straightforward.\n\nFrom a modeling perspective, this\
    \ setup is clearly deficient. I’ve already mentioned the issue with gaps in the\
    \ sequence, which are impossible to represent in this single-column table. Another\
    \ problem is overlapping intervals. What if the subject took on some after-hours\
    \ contract work during the same time period as one of the jobs? Trying to insert\
    \ that data into the table would make it look as though the subject had switched\
    \ companies.\n\nThis is not to say that no intervals should be modeled this way.\
    \ There are many situations in which gaps and overlaps may not make sense, and\
    \ the extra bytes needed for a second column would be a waste. A prime example\
    \ is a server uptime monitor. Systems are often used by IT departments that ping\
    \ each monitored server on a regular basis and record changes to their status.\
    \ Following is a simplified example table and a few rows of data representing\
    \ the status of two monitored servers:\n\n```sql\nCREATE TABLE ServerStatus\n\
    (\n    ServerName varchar(50),\n    Status varchar(15),\n    StatusTime datetime\n\
    );\nGO\n\nINSERT INTO ServerStatus\n(\n    ServerName,\n    Status,\n    StatusTime\n\
    ) VALUES\n    ('WebServer', 'Available', '2009-04-20T03:00:00.000'),\n    ('DBServer',\
    \ 'Available', '2009-04-20T03:00:00.000'),\n    ('DBServer', 'Unavailable', '2009-06-12T14:35:23.100'),\n\
    \    ('DBServer', 'Available', '2009-06-12T14:38:52.343'),\n    ('WebServer',\
    \ 'Unavailable', '2009-06-15T09:16:03.593'),\n    ('WebServer', 'Available', '2009-06-15T09:28:17.006');\n\
    GO\n```\n\nApplying almost the exact same query as was used for start and end\
    \ of employment periods, we can find out the intervals during which each server\
    \ was unavailable:\n\n```sql\nSELECT\n    S1.ServerName,\n    S1.StatusTime,\n\
    \    COALESCE((\n        SELECT MIN(S2.StatusTime)\n        FROM ServerStatus\
    \ AS S2\n        WHERE\n            S2.StatusTime > S1.StatusTime),\n        GETDATE()\n\
    \    ) AS EndTime\nFROM ServerStatus AS S1\nWHERE S1.Status = 'Unavailable';\n\
    ```\n\nThe results of this query are as follows:\n\n| ServerName | StatusTime\
    \             | EndTime                |\n| ---------- | ----------------------\
    \ | ---------------------- |\n| DBServer   | 2009-06-12 14:35:23.100| 2009-06-12\
    \ 14:38:52.343|\n| WebServer  | 2009-06-15 09:16:03.593| 2009-06-15 09:28:17.007|\n\
    \nSome systems will send periodic status updates if the system status does not\
    \ change. The monitoring system might insert additional “unavailable” rows every\
    \ 30 seconds or minute until the target system starts responding again. As-is,\
    \ this query reports each interim status update as a separate interval starting\
    \ point. To get around this problem, the query could be modified as follows:\n\
    \n```sql\nSELECT\n    S1.ServerName,\n    MIN(S1.StatusTime) AS StartTime,\n \
    \   p.EndTime\nFROM ServerStatus AS S1\nCROSS APPLY\n    (\n        SELECT\n \
    \           COALESCE((\n                SELECT MIN(S2.StatusTime)\n          \
    \      FROM ServerStatus AS S2\n                WHERE\n                    S2.StatusTime\
    \ > S1.StatusTime\n                    AND S2.Status = 'Available'\n         \
    \       ),\n                GETDATE()\n            ) AS EndTime\n    ) p\nWHERE\
    \ S1.Status = 'Unavailable'\nGROUP BY\n    S1.ServerName,\n    p.EndTime;\n```\n\
    \nThis new version finds the first “available” row that occurs after the current\
    \ “unavailable” row; that row represents the actual end time for the full interval\
    \ during which the server was down. The outer query uses the `MIN` aggregate to\
    \ find the first reported “unavailable” time for each `ServerName`/`EndTime` combination.\n\
    \n## Modeling and Querying Independent Intervals"
