  trans: "\n## 第 8 章：动态 T-SQL\n\n请注意，在此示例（以及本章所有其他示例）中，我使用的是 `EXECUTE` 的缩写形式。这似乎是\
    \ SQL Server 代码的一种事实标准；我很少见到使用完整“UTE”的写法。尽管这仅仅节省了三个字符，但我已非常习惯看到这种缩写，并且出于某种原因，在阅读\
    \ SQL 时，这比看到完整的 `EXECUTE` 关键字让我感觉清晰得多。\n\n在这个例子中，传递给 `EXECUTE` 的是一个字符串字面值，这确实无法实现非常“动态”的操作。例如，要在查询中添加一个针对\
    \ `BusinessEntityID` 的谓词，以下写法将不起作用：\n\n```sql\nDECLARE @BusinessEntityID int =\
    \ 28;\n\nEXEC('SELECT\n    BusinessEntityID,\n    LoginID,\n    JobTitle\nFROM\
    \ HumanResources.Employee\nWHERE BusinessEntityID = ' + CONVERT(varchar, @BusinessEntityID));\n\
    \nGO\n```\n\n这会失败（抛出“语法不正确”异常），原因是 SQL Server 引擎解析 `EXECUTE` 的方式。SQL Server 仅进行一次解析以检查语法，然后在第二个步骤中尝试拼接并执行\
    \ SQL。但由于第一步不包含内联展开的阶段，当进行拼接时，`CONVERT` 仍然是一个 `CONVERT` 函数，而不是一个字面值。\n\n解决此问题的方法非常简单。定义一个变量，将动态\
    \ SQL 赋值给它，*然后*调用 `EXECUTE`：\n\n```sql\nDECLARE @BusinessEntityID int = 28;\n\
    DECLARE @sql nvarchar(max);\n\nSET @sql = 'SELECT\n    BusinessEntityID,\n   \
    \ LoginID,\n    JobTitle\nFROM HumanResources.Employee\nWHERE BusinessEntityID\
    \ = ' + CONVERT(VARCHAR, @BusinessEntityID);\n\nEXEC (@sql);\n\nGO\n```\n\n字符串变量\
    \ `@sql` 可以以任何方式进行操作，以形成所需的动态 SQL 字符串。由于它是一个变量，可以使用流程控制语句创建不同的代码路径。换句话说，构建动态 SQL\
    \ 现在仅受限于 T-SQL 语言中用于字符串操作的工具。\n\n下面是一个初步尝试，可选择性地包含 `BusinessEntityID` 和 `NationalIDNumber`\
    \ 谓词：\n\n```sql\nDECLARE @BusinessEntityID int = 28;\nDECLARE @NationalIDNumber\
    \ nvarchar(15) = N'14417807';\nDECLARE @sql nvarchar(max);\n\nSET @sql = 'SELECT\n\
    \    BusinessEntityID,\n    LoginID,\n    JobTitle\nFROM HumanResources.Employee\
    \ ';\n\nIF (@BusinessEntityID IS NOT NULL AND @NationalIDNumber IS NOT NULL)\n\
    BEGIN\n    SET @sql = @sql +\n        'WHERE BusinessEntityID = ' + CONVERT(nvarchar,\
    \ @BusinessEntityID) +\n        ' AND NationalIDNumber = N''' + @NationalIDNumber\
    \ + '''';\nEND\nELSE IF (@BusinessEntityID IS NOT NULL)\nBEGIN\n    SET @sql =\
    \ @sql +\n        'WHERE BusinessEntityID = ' +\n        CONVERT(nvarchar, @BusinessEntityID);\n\
    END\nELSE IF (@NationalIDNumber IS NOT NULL)\nBEGIN\n    SET @sql = @sql +\n \
    \       'WHERE NationalIDNumber = N''' + @NationalIDNumber + '''';\nEND\n\nEXEC(@sql);\n\
    \nGO\n```\n\n如果这看起来令人作呕地熟悉，那么说明你在本章学习过程中注意力非常集中；此示例与第一次尝试编写的静态 SQL 存储过程存在相同的维护问题。添加更多参数将导致组合爆炸，使得此解决方案完全无法维护。此外，SQL\
    \ 语句已被拆分为两个组成部分，使其缺乏良好的流程感。想想如果必须添加 `ORDER BY` 或 `GROUP BY` 子句，情况可能会变得多糟糕。\n\n\
    为了解决这个问题，我喜欢一次性拼接动态 SQL，使用 `CASE` 表达式代替流程控制语句，以便有选择性地拼接部分内容。以下示例应能说明其工作原理：\n\n\
    ```sql\nDECLARE @BusinessEntityID int = 28;\nDECLARE @NationalIDNumber nvarchar(15)\
    \ = N'14417807';\nDECLARE @sql nvarchar(max);\n\nSET @sql = 'SELECT\n    BusinessEntityID,\n\
    \    LoginID,\n    JobTitle\nFROM HumanResources.Employee\nWHERE 1=1' +\n    CASE\n\
    \        WHEN @BusinessEntityID IS NULL THEN ''\n        ELSE 'AND BusinessEntityID\
    \ = ' + CONVERT(nvarchar, @BusinessEntityID)\n    END +\n    CASE\n        WHEN\
    \ @NationalIDNumber IS NULL THEN ''\n        ELSE 'AND NationalIDNumber = N'''\
    \ + @NationalIDNumber + ''''\n    END;\n\nEXEC(@sql);\n\nGO\n```\n"
- fmt: "# 动态SQL：可选参数与代码格式化\n\n在此示例中，`CASE`表达式会在某个参数为`NULL`时连接一个空字符串。\n\n否则，该参数将被格式化为字符串并连接到谓词之后。\n\
    \n得益于`CASE`表达式，代码变得更加紧凑，并且查询仍然大体上保持查询的格式，而非类似过程化的代码。但此处真正的技巧是在`WHERE`子句中添加`1=1`，以避免组合爆炸问题。查询优化器会“优化掉”（即丢弃）`WHERE`子句中的`1=1`，因此它对最终生成的查询计划没有影响。它的作用是允许可选谓词使用`AND`，而无需考虑其他可选谓词是否被连接。因此，每个谓词在代码中只需列出一次，组合不再是问题。\n\
    \n此代码最终的易维护性问题在于格式。我认为在处理动态SQL时，格式是极其重要的一个方面。仔细、一致的格式可能意味着快速修改存储过程与花费数小时解读混乱代码之间的区别。\n\
    \n要看到当前代码格式的问题，可以在批处理末尾添加`PRINT @sql`来查看最终字符串：\n\n```sql\nSELECT\n    BusinessEntityID,\n\
    \    LoginID,\n    JobTitle\nFROM HumanResources.Employee\nWHERE 1=1AND BusinessEntityID\
    \ = 28AND NationalIDNumber = N'14417807'\n```\n\n尽管这个SQL是有效的，并且可以毫无例外地直接执行，但由于谓词之间缺乏空格，它存在潜在问题。调试动态SQL中的空格问题可能会让人抓狂，因此我建议采用一致的格式标准来解决此问题。当我处理动态SQL时，我会单独连接每一行，确保每行以一个空格结束。这为代码增加了一点复杂性，但我发现这使调试变得容易得多。以下是我喜欢格式化动态SQL的示例：\n\
    \n```sql\nDECLARE @BusinessEntityID int = 28;\nDECLARE @NationalIDNumber nvarchar(15)\
    \ = N'14417807';\nDECLARE @sql nvarchar(max);\nSET @sql = ''\n    + 'SELECT '\n\
    \    + 'BusinessEntityID, '\n    + 'LoginID, '\n    + 'JobTitle '\n    + 'FROM\
    \ HumanResources.Employee '\n    + 'WHERE 1=1 '\n    + CASE\n        WHEN @BusinessEntityID\
    \ IS NULL THEN ''\n        ELSE 'AND BusinessEntityID = ' + CONVERT(nvarchar,\
    \ @BusinessEntityID) + ' '\n      END\n    + CASE\n        WHEN @NationalIDNumber\
    \ IS NULL THEN ''\n        ELSE 'AND NationalIDNumber = N''' + @NationalIDNumber\
    \ + ''' '\n      END;\nEXEC(@sql);\nGO\n```\n\n> **注意** 我在使用旧版本SQL Server时开发了这种风格，这些版本没有`max`数据类型，因此对变量大小有严格的限制。将所有内容切分成单个标记极大地减少了空白字符的数量，这意味着我可以在每个变量中放入更多代码。在SQL\
    \ Server 2008中，删除多余的空白字符并非必要，但我仍然认为这种技术对于确保正确的空格非常有用，既提高了可读性，又确保了一致性以实现缓存计划的重用。\n\
    \n现在代码片段已经正确格式化，可以移植到新版本的`GetEmployeeData`存储过程中：\n\n```sql\nALTER PROCEDURE GetEmployeeData\n\
    \    @BusinessEntityID int = NULL,\n    @NationalIDNumber nvarchar(15) = NULL\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @sql nvarchar(max);\n    SET @sql\
    \ = ''\n        + 'SELECT '\n        + 'BusinessEntityID, '\n        + 'LoginID,\
    \ '\n        + 'JobTitle '\n        + 'FROM HumanResources.Employee '\n      \
    \  + 'WHERE 1=1 '\n        + CASE\n            WHEN @BusinessEntityID IS NULL\
    \ THEN ''\n            ELSE 'AND BusinessEntityID = ' + CONVERT(nvarchar, @BusinessEntityID)\
    \ + ' '\n          END\n        + CASE\n            WHEN @NationalIDNumber IS\
    \ NULL THEN ''\n            ELSE 'AND NationalIDNumber = N''' + @NationalIDNumber\
    \ + ''' '\n          END\n    EXEC(@sql);\nEND;\nGO\n```\n\n所以，这就是一个具有可选参数的动态存储过程。乍一看，这似乎是一个很好的解决方案，但它仍然充满问题。"
  raw: 'In this example, the CASE expressions concatenate an empty string if one of
    the parameters is NULL.


    Otherwise, the parameter is formatted as a string and concatenated to the predicate.


    Thanks to the CASE expressions, the code is much more compact, and the query is
    still generally formatted like a query instead of like procedural code. But the
    real trick here is the addition of 1=1 to the WHERE clause, in order to avoid
    the combinatorial explosion problem. The query optimizer will “optimize out” (i.e.,
    discard) 1=1 in a WHERE clause, so it has no effect on the resultant query plan.
    What it does do is allow the optional predicates to use AND without having to
    be aware of whether other optional predicates are being concatenated. Each predicate
    can therefore be listed only once in the code, and combinations are not a problem.


    The final maintainability issue with this code is one of formatting, and this
    is an area that I feel is extremely important when working with dynamic SQL. Careful,
    consistent formatting can mean the difference between quick changes to stored
    procedures and spending several hours trying to decipher messy code.


    To see the problem with the way the code is currently formatted, add PRINT @sql
    to the end of the batch to see the final string:


    SELECT


    BusinessEntityID,


    LoginID,


    JobTitle


    CHAPTER 8 „ DYNAMIC T-SQL


    FROM HumanResources.Employee


    WHERE 1=1AND BusinessEntityID = 28AND NationalIDNumber = N''14417807''


    Although this SQL is valid and executes as-is without exception, it has the potential
    for problems due to the lack of spacing between the predicates. Debugging spacing
    issues in dynamic SQL can be maddening, so I recommend adopting a consistent formatting
    standard to combat the issue. When I am working with dynamic SQL, I concatenate
    every line separately, ensuring that each line is terminated with a space. This
    adds a bit more complexity to the code, but I’ve found that it makes it much easier
    to debug. Following is an example of how I like to format my dynamic SQL:


    DECLARE @BusinessEntityID int = 28;


    DECLARE @NationalIDNumber nvarchar(15) = N''14417807'';


    DECLARE @sql nvarchar(max);


    SET @sql = '''' +


    ''SELECT '' +


    ''BusinessEntityID, '' +


    ''LoginID, '' +


    ''JobTitle '' +


    ''FROM HumanResources.Employee '' +


    ''WHERE 1=1 '' +


    CASE


    WHEN @BusinessEntityID IS NULL THEN ''''


    ELSE ''AND BusinessEntityID = '' + CONVERT(nvarchar, @BusinessEntityID) + '' ''


    END +


    CASE


    WHEN @NationalIDNumber IS NULL THEN ''''


    ELSE ''AND NationalIDNumber = N'''''' + @NationalIDNumber + '''''' ''


    END;


    EXEC(@sql);


    GO


    „ **Note** I developed this style when working with older versions of SQL Server,
    which did not have the max data types and therefore had stringent variable size
    limitations. Cutting everything up into individual tokens greatly reduced the
    amount of whitespace, meaning that I could fit a lot more code in each variable.
    Removal of extraneous whitespace is not necessary in SQL Server 2008, but I still
    feel that this technique is great for ensuring proper spacing, which both improves
    readability and ensures consistency to enable reuse of cached plans.


    Now that the code fragment is properly formatted, it can be transferred into a
    new version of the GetEmployeeData stored procedure:


    ALTER PROCEDURE GetEmployeeData


    @BusinessEntityID int = NULL,


    @NationalIDNumber nvarchar(15) = NULL


    CHAPTER 8 „ DYNAMIC T-SQL


    AS


    BEGIN


    SET NOCOUNT ON;


    DECLARE @sql nvarchar(max);


    SET @sql = '''' +


    ''SELECT '' +


    ''BusinessEntityID, '' +


    ''LoginID, '' +


    ''JobTitle '' +


    ''FROM HumanResources.Employee '' +


    ''WHERE 1=1 '' +


    CASE


    WHEN @BusinessEntityID IS NULL THEN ''''


    ELSE ''AND BusinessEntityID = '' + CONVERT(nvarchar, @BusinessEntityID) + '' ''


    END +


    CASE


    WHEN @NationalIDNumber IS NULL THEN ''''


    ELSE ''AND NationalIDNumber = N'''''' + @NationalIDNumber + '''''' ''


    END


    EXEC(@sql);


    END;


    GO


    So that’s it—a dynamic stored procedure with optional parameters. At first glance,
    this might look like a great solution, but it is still fraught with problems.'
  trans: "# 动态 SQL：可选参数与代码格式化\n\n在此示例中，`CASE`表达式会在某个参数为`NULL`时连接一个空字符串。\n\n否则，该参数将被格式化为字符串并连接到谓词之后。\n\
    \n得益于`CASE`表达式，代码变得更加紧凑，并且查询仍然大体上保持查询的格式，而非类似过程化的代码。但此处真正的技巧是在`WHERE`子句中添加`1=1`，以避免组合爆炸问题。查询优化器会\"\
    优化掉\"（即丢弃）`WHERE`子句中的`1=1`，因此它对最终生成的查询计划没有影响。它的作用是允许可选谓词使用`AND`，而无需考虑其他可选谓词是否被连接。因此，每个谓词在代码中只需列出一次，组合不再是问题。\n\
    \n此代码最终的易维护性问题在于格式。我认为在处理动态 SQL 时，格式是极其重要的一个方面。仔细、一致的格式可能意味着快速修改存储过程与花费数小时解读混乱代码之间的区别。\n\
    \n要看到当前代码格式的问题，可以在批处理末尾添加`PRINT @sql`来查看最终字符串：\n\n```sql\nSELECT\n    BusinessEntityID,\n\
    \    LoginID,\n    JobTitle\nFROM HumanResources.Employee\nWHERE 1=1AND BusinessEntityID\
    \ = 28AND NationalIDNumber = N'14417807'\n```\n\n尽管这个 SQL 是有效的，并且可以毫无例外地直接执行，但由于谓词之间缺乏空格，它存在潜在问题。调试动态\
    \ SQL 中的空格问题可能会让人抓狂，因此我建议采用一致的格式标准来解决此问题。当我处理动态 SQL 时，我会单独连接每一行，确保每行以一个空格结束。这为代码增加了一点复杂性，但我发现这使调试变得容易得多。以下是我喜欢格式化动态\
    \ SQL 的示例：\n\n```sql\nDECLARE @BusinessEntityID int = 28;\nDECLARE @NationalIDNumber\
    \ nvarchar(15) = N'14417807';\nDECLARE @sql nvarchar(max);\nSET @sql = ''\n  \
    \  + 'SELECT '\n    + 'BusinessEntityID, '\n    + 'LoginID, '\n    + 'JobTitle\
    \ '\n    + 'FROM HumanResources.Employee '\n    + 'WHERE 1=1 '\n    + CASE\n \
    \       WHEN @BusinessEntityID IS NULL THEN ''\n        ELSE 'AND BusinessEntityID\
    \ = ' + CONVERT(nvarchar, @BusinessEntityID) + ' '\n      END\n    + CASE\n  \
    \      WHEN @NationalIDNumber IS NULL THEN ''\n        ELSE 'AND NationalIDNumber\
    \ = N''' + @NationalIDNumber + ''' '\n      END;\nEXEC(@sql);\nGO\n```\n\n> **注意**\
    \ 我在使用旧版本 SQL Server 时开发了这种风格，这些版本没有`max`数据类型，因此对变量大小有严格的限制。将所有内容切分成单个标记极大地减少了空白字符的数量，这意味着我可以在每个变量中放入更多代码。在\
    \ SQL Server 2008 中，删除多余的空白字符并非必要，但我仍然认为这种技术对于确保正确的空格非常有用，既提高了可读性，又确保了一致性以实现缓存计划的重用。\n\
    \n现在代码片段已经正确格式化，可以移植到新版本的`GetEmployeeData`存储过程中：\n\n```sql\nALTER PROCEDURE GetEmployeeData\n\
    \    @BusinessEntityID int = NULL,\n    @NationalIDNumber nvarchar(15) = NULL\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @sql nvarchar(max);\n    SET @sql\
    \ = ''\n        + 'SELECT '\n        + 'BusinessEntityID, '\n        + 'LoginID,\
    \ '\n        + 'JobTitle '\n        + 'FROM HumanResources.Employee '\n      \
    \  + 'WHERE 1=1 '\n        + CASE\n            WHEN @BusinessEntityID IS NULL\
    \ THEN ''\n            ELSE 'AND BusinessEntityID = ' + CONVERT(nvarchar, @BusinessEntityID)\
    \ + ' '\n          END\n        + CASE\n            WHEN @NationalIDNumber IS\
    \ NULL THEN ''\n            ELSE 'AND NationalIDNumber = N''' + @NationalIDNumber\
    \ + ''' '\n          END\n    EXEC(@sql);\nEND;\nGO\n```\n\n所以，这就是一个具有可选参数的动态存储过程。乍一看，这似乎是一个很好的解决方案，但它仍然充满问题。"
- fmt: "# CHAPTER 8 - DYNAMIC T-SQL\n\n## 从性能角度看\n\n从性能角度来看，这个过程在几次测试运行中表现似乎很好。每组输入参数都产生了与基线示例相同的执行计划，具有相同的估计成本和读取次数。然而，在底层，一个主要问题仍然存在：参数化并未发生。为了说明这一点，执行以下\
    \ T-SQL，它会清除查询计划缓存，然后使用相同的可选参数运行存储过程，传入三个不同的输入值：\n\n```sql\nDBCC FREEPROCCACHE;\n\
    GO\n\nEXEC GetEmployeeData @BusinessEntityID = 1;\nGO\n\nEXEC GetEmployeeData\
    \ @BusinessEntityID = 2;\nGO\n\nEXEC GetEmployeeData @BusinessEntityID = 3;\n\
    GO\n```\n\n现在，使用本章前面介绍的查询来查询 `sys.dm_exec_cached_plans` 视图，你将看到如下输出：\n\n```\n\
    objtype    text\n---------  ------------------------------------------------\n\
    Proc       CREATE PROCEDURE GetEmployeeData @BusinessEntityID int = NULL ...\n\
    Adhoc      SELECT BusinessEntityID, LoginID, JobTitle FROM HumanResources.Employee\
    \ WHERE 1=1 AND BusinessEntityID = 3\nAdhoc      SELECT BusinessEntityID, LoginID,\
    \ JobTitle FROM HumanResources.Employee WHERE 1=1 AND BusinessEntityID = 2\nAdhoc\
    \      SELECT BusinessEntityID, LoginID, JobTitle FROM HumanResources.Employee\
    \ WHERE 1=1 AND BusinessEntityID = 1\n```\n\n请注意，有一个用于存储过程本身的 `Proc` 缓存计划——这对任何存储过程来说都是预期的——以及每次调用存储过程时缓存的额外的\
    \ `Adhoc` 计划。这意味着每次传递新参数时，都会发生一次编译，这显然会严重影响性能。\n\n这个存储过程目前的另一个问题是一个严重的安全漏洞。一个与此类似但稍作修改的存储过程将打开一个简单的攻击向量，黑客可以利用它轻松地从数据库中窃取信息，甚至更糟。\n\
    \n## SQL Injection\n\n直接将 `@NationalIDNumber` 等字符串参数拼接到查询中可能会使你的应用程序面临严重问题。这个问题是一种名为\
    \ **SQL injection attack** 的黑客技术，它涉及向数据库传递半成型的 SQL 片段（通常通过网页表单中输入的值），以试图操纵另一端的动态或即席\
    \ SQL。\n\n示例 `GetEmployeeData` 存储过程本身其实问题不大，因为 `@NationalIDNumber` 只有 15 个字符长——这没有给黑客太多操作空间（但请记住，只需\
    \ 8 个字符就可以发出 `SHUTDOWN` 命令）。但如果你正在处理另一个需要更灵活一些的存储过程呢？下面的示例过程可能用于在 AdventureWorks2008\
    \ 数据库中搜索地址，它为攻击者提供了足够多的字符来造成破坏：\n\n```sql\nCREATE PROCEDURE FindAddressByString\n\
    \    @String nvarchar(60)\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @sql nvarchar(max);\n\
    \    SET @sql = '' +\n        'SELECT AddressID ' +\n        'FROM Person.Address\
    \ ' +\n        'WHERE AddressLine1 LIKE ''%' + @String + '%'''\n    EXEC(@sql);\n\
    END;\nGO\n```\n\n可以使用类似“Stone”的字符串作为参数值来执行此存储过程：\n\n```sql\nEXEC FindAddressByString\
    \ @String = 'Stone';\nGO\n```\n\n这将输出你可能预期的结果集，其中包含所有在 `AddressLine1` 列中使用该字符串的地址\
    \ ID。简化的结果列表如下：\n\n```\nAddressID\n...\n```\n\n考虑一下存储过程内部实际发生了什么。查询的 `WHERE` 子句被拼接，使其字面上变成了\
    \ `WHERE AddressLine1 LIKE '%Stone%'`。但没有任何东西可以阻止某人向存储过程传递一个具有更深远影响的字符串。例如，考虑以下情况会发生什么：\n\
    \n```sql\nEXEC FindAddressByString @String = ''' ORDER BY AddressID --';\nGO\n\
    ```\n\n拼接后，`WHERE` 子句变成了 `WHERE AddressLine1 LIKE '%' ORDER BY AddressID -- %'`。效果是过滤不再应用，并且添加了一个之前没有的\
    \ `ORDER BY` 子句。当提供此输入时，查询结果现在按顺序列出 `Person.Address` 表中的每个 `AddressID`，如下所示：\n\
    \n```\nAddressID\n...\n```\n\n这当然一个相当普通的例子。来点更有趣的如何，比如获取数据库中每位员工的完整薪酬历史？\n\n```sql\n\
    EXEC FindAddressByString @String = 'Fake address'; SELECT * FROM HumanResources.EmployeePayHistory\
    \ --';\nGO\n```\n\n假设用于查询的帐户有权访问 `HumanResources.EmployeePayHistory` 表，现在运行存储过程会产生两个结果集——第一个是来自\
    \ `Person.Address` 表的空结果集，但第二个列出了 `EmployeePayHistory` 表的所有详细信息：\n\n```\nBusinessEntityID\
    \  RateChangeDate  Rate    PayFrequency  ModifiedDate\n----------------  --------------\
    \  ------  ------------  ------------\n1                 1999-02-15      125.50\
    \  2             2004-07-31\n...\n290               2002-07-01      23.0769 2\
    \             2004-07-31\n```\n\n事实是，攻击者可以在数据库中执行其认证帐户有权执行的任何操作，并且能在 60 个字符（字符串参数的大小）内完成。这包括查看数据、删除数据和插入虚假数据。这种攻击通常可以从舒适的网页浏览器发起，并且入侵行为可能极难被检测到。\n\
    \n解决方案不是停止使用动态 SQL。而是要确保你的动态 SQL 始终是参数化的。让我重复一遍以示强调：**始终、始终、始终参数化你的动态 SQL**！下一节将向你展示如何使用\
    \ `sp_executesql` 来做到这一点。\n\n## sp_executesql: A Better EXECUTE\n\n在前面的章节中，我指出了使用\
    \ `EXECUTE` 构建和执行动态 SQL 语句的两个主要问题：首先，存在多余的编译和查询计划缓存问题（第 220 页），这会导致性能下降并消耗宝贵的系统资源。其次，也许更重要的是\
    \ SQL 注入攻击的威胁。\n\n查询参数化（本章前面在应用程序开发的上下文中提到过）是解决这两个问题的关键。参数化是一种构建查询的方式，其中任何参数都作为强类型变量传递，而不是格式化为字符串并附加到查询上。除了通过减少处理查询的工作量来带来性能优势外，参数化还有一个好处，即几乎可以消除\
    \ SQL 注入攻击。\n\n参数化查询的第一步是用变量名替换字面量。例如，上一节中易受注入攻击的查询可以重写为参数化方式（为简单起见，我删除了创建存储过程的代码）：\n\
    \n```sql\nDECLARE @String nvarchar(60) = 'Stone';\nDECLARE @sql nvarchar(max);\n\
    SET @sql = '' +\n    'SELECT AddressID ' +\n    'FROM Person.Address ' +\n   \
    \ 'WHERE AddressLine1 LIKE ''%'' + @String + ''%''';\n```\n\n与上一节的版本相比，此查询唯一的变化是添加了两个额外的单引号，使得\
    \ `@String` 的字面值不再与查询的其余部分拼接。之前，拼接后 `@sql` 的字面值如下：\n\n```sql\nSELECT AddressID\
    \ FROM Person.Address WHERE AddressLine1 LIKE '%Stone%'\n```\n\n作为此更改的结果，拼接后的字面值现在如下：\n\
    \n```sql\nSELECT AddressID FROM Person.Address WHERE AddressLine1 LIKE '%' + @String\
    \ + '%'\n```\n\n尝试使用 `EXECUTE` 执行此 SQL 会导致以下异常：\n\n```\nMsg 137, Level 15, State\
    \ 2, Line 1\nMust declare the scalar variable \"@String\".\n```"
  raw: 'From a performance point of view, this procedure appears to be great when
    taken for a few test runs. Each set of input parameters produces the same execution
    plan as the baseline examples, with the same estimated costs and number of reads.
    However, under the covers, a major issue still exists: parameterization is not
    occurring. To illustrate this, execute the following T-SQL, which clears the query
    plan cache and then runs the procedure with the same optional parameter, for three
    different input values:


    DBCC FREEPROCCACHE;


    GO


    EXEC GetEmployeeData


    @BusinessEntityID = 1;


    GO


    EXEC GetEmployeeData


    @BusinessEntityID = 2;


    GO


    EXEC GetEmployeeData


    @BusinessEntityID = 3;


    GO


    Now, query the sys.dm_exec_cached_plans view using the query introduced earlier
    this chapter, and you will see the output as follows:


    CHAPTER 8 „ DYNAMIC T-SQL


    objtype text


    Proc CREATE PROCEDURE GetEmployeeData @BusinessEntityID int = NULL ...


    Adhoc SELECT BusinessEntityID, LoginID, JobTitle FROM HumanResources.Employee


    WHERE 1=1 AND BusinessEntityID = 3


    Adhoc SELECT BusinessEntityID, LoginID, JobTitle FROM HumanResources.Employee


    WHERE 1=1 AND BusinessEntityID = 2


    Adhoc SELECT BusinessEntityID, LoginID, JobTitle FROM HumanResources.Employee


    WHERE 1=1 AND BusinessEntityID = 1


    Notice that there is one Proc cached plan for the procedure itself—which is expected
    for any stored procedure—and an additional ad hoc plan cached for each invocation
    of the stored procedure. This means that every time a new argument is passed,
    a compilation occurs, which is clearly going to kill performance.


    The other issue with this stored procedure, as it currently stands, is a serious
    security hole. A stored procedure implemented similarly to this one but with a
    minor modification would open a simple attack vector that a hacker could exploit
    to easily pull information out of the database, or worse.


    SQL Injection


    Concatenating string parameters such as @NationalIDNumber directly onto queries
    can open your applications to considerable problems. The issue is a hacking technique
    called a **SQL injection attack**, which involves passing bits of semiformed SQL
    to the database, typically via values entered in web forms, in order to try to
    manipulate dynamic or ad hoc SQL on the other side.


    The example GetEmployeeData stored procedure doesn’t actually have much of a problem
    as-is,


    because @NationalIDNumber is only 15 characters long—this doesn’t give a hacker
    much room to work with (although bear in mind that it only takes 8 characters
    to issue the SHUTDOWN command). But what if you were working with another stored
    procedure that had to be a bit more flexible? The following example procedure,
    which might be used to search for addresses in the AdventureWorks2008 database,
    gives an attacker more than enough characters to do some damage:


    CREATE PROCEDURE FindAddressByString


    @String nvarchar(60)


    AS


    BEGIN


    SET NOCOUNT ON;


    DECLARE @sql nvarchar(max);


    SET @sql = '''' +


    ''SELECT AddressID '' +


    CHAPTER 8 „ DYNAMIC T-SQL


    ''FROM Person.Address '' +


    ''WHERE AddressLine1 LIKE ''''%'' + @String + ''%''''''


    EXEC(@sql);


    END;


    GO


    This stored procedure can be executed with a string such as “Stone” used for the
    parameter value: EXEC FindAddressByString


    @String = ''Stone'';


    GO


    This outputs the result set you might expect, with all of the address IDs that
    use that string in the AddressLine1 column. The abridged list of results is as
    follows:


    AddressID


    ...


    Consider what actually happened inside of the stored procedure. The WHERE clause
    for the query was concatenated, such that it literally became WHERE AddressLine1
    LIKE ''%Stone%''. But nothing is stopping someone from passing a string into the
    stored procedure that has a more profound effect. For instance, consider what
    happens in the following case:


    EXEC FindAddressByString


    @String = '''''' ORDER BY AddressID --'';


    GO


    After concatenation, the WHERE clause reads, WHERE AddressLine1 LIKE ''%'' ORDER
    BY AddressID --


    %''. The effect is that filtering is no longer applied, and an ORDER BY clause—which
    was not there before—


    has been added to the query. When supplied with this input, the results of the
    query now list every AddressID in the Person.Address table, in order, as follows:


    CHAPTER 8 „ DYNAMIC T-SQL


    AddressID


    ...


    This is, of course, a fairly mundane example. How about something a bit more interesting,
    such as getting back the full pay history for every employee in the database?


    EXEC FindAddressByString


    @String = ''Fake address''; SELECT * FROM HumanResources.EmployeePayHistory --'';


    GO


    Assuming that the account used for the query has access to the HumanResources.EmployeePayHistory
    table, running the stored procedure now produces two result sets—the first is
    an empty result set from the Person.Address table, but the second lists all details
    from the EmployeePayHistory table: BusinessEntityID RateChangeDate Rate PayFrequency
    ModifiedDate


    1 1999-02-15 125.50 2 2004-07-31


    ...


    290 2002-07-01 23.0769 2 2004-07-31


    The fact is the attacker can do anything in the database that the authenticated
    account has access to do and that can be done in 60 characters (the size of the
    string parameter). This includes viewing data, deleting data, and inserting fake
    data. Such an attack can often be waged from the comfort of a web browser, and
    intrusion can be incredibly difficult to detect.


    The solution is not to stop using dynamic SQL. Rather, it’s to make sure that
    your dynamic SQL is always parameterized. Let me repeat that for effect: *always,
    always, always parameterize your dynamic* *SQL*! The next section shows you how
    to use sp_executesql to do just that.


    sp_executesql: A Better EXECUTE


    In the previous sections, I identified two major problems with building dynamic
    SQL statements and executing them using EXECUTE: first, there is the issue of
    extraneous compilation and query plan caching, 220


    CHAPTER 8 „ DYNAMIC T-SQL


    which makes performance drag and uses up valuable system resources. Second, and
    perhaps more important, is the threat of SQL injection attacks.


    Query parameterization, mentioned earlier in this chapter in the context of application


    development, is the key to fixing both of these problems. Parameterization is
    a way to build a query such that any parameters are passed as strongly typed variables,
    rather than formatted as strings and appended to the query. In addition to the
    performance benefits this brings by reducing the amount of work to process the
    query, parameterization also has the benefit of virtually eliminating SQL injection
    attacks.


    The first step in parameterizing a query is to replace literals with variable
    names. For instance, the injection-vulnerable query from the previous section
    could be rewritten in a parameterized manner as follows (I’ve removed the stored
    procedure–creation code for simplicity):


    DECLARE @String nvarchar(60) = ''Stone'';


    DECLARE @sql nvarchar(max);


    SET @sql = '''' +


    ''SELECT AddressID '' +


    ''FROM Person.Address '' +


    ''WHERE AddressLine1 LIKE ''''%'''' + @String + ''''%'''''';


    The only thing that has changed about this query compared to the version in the
    last section is that two additional single quotes have been added such that the
    literal value of @String is no longer concatenated with the rest of the query.
    Previously, the literal value of @sql after concatenation would have been as follows:


    SELECT AddressID FROM Person.Address WHERE AddressLine1 LIKE ''%Stone%''


    As a result of this change, the literal value after concatenation is now the following:


    SELECT AddressID FROM Person.Address WHERE AddressLine1 LIKE ''%'' + @String +
    ''%''


    Trying to execute this SQL using EXECUTE results in the following exception:


    Msg 137, Level 15, State 2, Line 1


    Must declare the scalar variable "@String".'
  trans: "# 第 8 章 - 动态 T-SQL\n\n## 从性能角度看\n\n从性能角度看，这个过程在几次测试运行中表现似乎不错。每组输入参数都产生了与基线示例相同的执行计划，具有相同的估计成本和读取次数。然而，底层存在一个主要问题：参数化并未实现。为说明这一点，请执行以下\
    \ T-SQL，它会清空查询计划缓存，然后使用相同的可选参数运行存储过程，传入三个不同的输入值：\n\n```sql\nDBCC FREEPROCCACHE;\n\
    GO\n\nEXEC GetEmployeeData @BusinessEntityID = 1;\nGO\n\nEXEC GetEmployeeData\
    \ @BusinessEntityID = 2;\nGO\n\nEXEC GetEmployeeData @BusinessEntityID = 3;\n\
    GO\n```\n\n现在，使用本章前面介绍的查询来查询 `sys.dm_exec_cached_plans` 视图，你将看到如下输出：\n\n```\n\
    objtype    text\n---------  ------------------------------------------------\n\
    Proc       CREATE PROCEDURE GetEmployeeData @BusinessEntityID int = NULL ...\n\
    Adhoc      SELECT BusinessEntityID, LoginID, JobTitle FROM HumanResources.Employee\
    \ WHERE 1=1 AND BusinessEntityID = 3\nAdhoc      SELECT BusinessEntityID, LoginID,\
    \ JobTitle FROM HumanResources.Employee WHERE 1=1 AND BusinessEntityID = 2\nAdhoc\
    \      SELECT BusinessEntityID, LoginID, JobTitle FROM HumanResources.Employee\
    \ WHERE 1=1 AND BusinessEntityID = 1\n```\n\n请注意，有一个用于存储过程本身的 `Proc` 缓存计划——这对任何存储过程来说都是预期的——以及每次调用存储过程时缓存的额外的\
    \ `Adhoc` 计划。这意味着每次传递新参数时，都会发生一次编译，这显然会严重影响性能。\n\n这个存储过程目前的另一个问题是存在一个严重的安全漏洞。一个与此类似但稍作修改的存储过程将打开一个简单的攻击向量，黑客可以利用它轻松地从数据库中窃取信息，甚至造成更严重的后果。\n\
    \n## SQL 注入\n\n直接将 `@NationalIDNumber` 等字符串参数拼接到查询中可能会使你的应用程序面临严重问题。这个问题是一种名为\
    \ **SQL 注入攻击** 的黑客技术，它涉及向数据库传递半成型的 SQL 片段（通常通过网页表单中输入的值），以试图操纵另一端的动态或即席 SQL。\n\
    \n示例 `GetEmployeeData` 存储过程本身其实问题不大，因为 `@NationalIDNumber` 只有 15 个字符长——这没有给黑客太多操作空间（但请记住，只需\
    \ 8 个字符就可以发出 `SHUTDOWN` 命令）。但如果你正在处理另一个需要更灵活一些的存储过程呢？下面的示例过程可能用于在 AdventureWorks2008\
    \ 数据库中搜索地址，它为攻击者提供了足够多的字符来造成破坏：\n\n```sql\nCREATE PROCEDURE FindAddressByString\n\
    \    @String nvarchar(60)\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @sql nvarchar(max);\n\
    \    SET @sql = '' +\n        'SELECT AddressID ' +\n        'FROM Person.Address\
    \ ' +\n        'WHERE AddressLine1 LIKE ''%' + @String + '%'''\n    EXEC(@sql);\n\
    END;\nGO\n```\n\n可以使用类似“Stone”的字符串作为参数值来执行此存储过程：\n\n```sql\nEXEC FindAddressByString\
    \ @String = 'Stone';\nGO\n```\n\n这将输出你可能预期的结果集，其中包含所有在 `AddressLine1` 列中使用该字符串的地址\
    \ ID。简化的结果列表如下：\n\n```\nAddressID\n...\n```\n\n考虑一下存储过程内部实际发生了什么。查询的 `WHERE` 子句被拼接，使其字面上变成了\
    \ `WHERE AddressLine1 LIKE '%Stone%'`。但没有任何东西可以阻止某人向存储过程传递一个具有更深远影响的字符串。例如，考虑以下情况会发生什么：\n\
    \n```sql\nEXEC FindAddressByString @String = ''' ORDER BY AddressID --';\nGO\n\
    ```\n\n拼接后，`WHERE` 子句变成了 `WHERE AddressLine1 LIKE '%' ORDER BY AddressID -- %'`。效果是过滤不再应用，并且添加了一个之前没有的\
    \ `ORDER BY` 子句。当提供此输入时，查询结果现在按顺序列出 `Person.Address` 表中的每个 `AddressID`，如下所示：\n\
    \n```\nAddressID\n...\n```\n\n这当然是一个相当普通的例子。来点更有趣的如何，比如获取数据库中每位员工的完整薪酬历史？\n\n\
    ```sql\nEXEC FindAddressByString @String = 'Fake address'; SELECT * FROM HumanResources.EmployeePayHistory\
    \ --';\nGO\n```\n\n假设用于查询的帐户有权访问 `HumanResources.EmployeePayHistory` 表，现在运行存储过程会产生两个结果集——第一个是来自\
    \ `Person.Address` 表的空结果集，但第二个列出了 `EmployeePayHistory` 表的所有详细信息：\n\n```\nBusinessEntityID\
    \  RateChangeDate  Rate    PayFrequency  ModifiedDate\n----------------  --------------\
    \  ------  ------------  ------------\n1                 1999-02-15      125.50\
    \  2             2004-07-31\n...\n290               2002-07-01      23.0769 2\
    \             2004-07-31\n```\n\n事实是，攻击者可以在数据库中执行其认证帐户有权执行的任何操作，并且能在 60 个字符（字符串参数的大小）内完成。这包括查看数据、删除数据和插入虚假数据。这种攻击通常可以从舒适的网页浏览器发起，并且入侵行为可能极难被检测到。\n\
    \n解决方案不是停止使用动态 SQL。而是要确保你的动态 SQL 始终是参数化的。让我重复一遍以示强调：**始终、始终、始终参数化你的动态 SQL**！下一节将向你展示如何使用\
    \ `sp_executesql` 来做到这一点。\n\n## sp_executesql：更好的 EXECUTE\n\n在前面的章节中，我指出了使用 `EXECUTE`\
    \ 构建和执行动态 SQL 语句的两个主要问题：首先，存在多余的编译和查询计划缓存问题（第 220 页），这会导致性能下降并消耗宝贵的系统资源。其次，也许更重要的是\
    \ SQL 注入攻击的威胁。\n\n查询参数化（本章前面在应用程序开发的上下文中提到过）是解决这两个问题的关键。参数化是一种构建查询的方式，其中任何参数都作为强类型变量传递，而不是格式化为字符串并附加到查询上。除了通过减少处理查询的工作量来带来性能优势外，参数化还有一个好处，即几乎可以消除\
    \ SQL 注入攻击。\n\n参数化查询的第一步是用变量名替换字面量。例如，上一节中易受注入攻击的查询可以重写为参数化方式（为简单起见，我删除了创建存储过程的代码）：\n\
    \n```sql\nDECLARE @String nvarchar(60) = 'Stone';\nDECLARE @sql nvarchar(max);\n\
    SET @sql = '' +\n    'SELECT AddressID ' +\n    'FROM Person.Address ' +\n   \
    \ 'WHERE AddressLine1 LIKE ''%'' + @String + ''%''';\n```\n\n与上一节的版本相比，此查询唯一的变化是添加了两个额外的单引号，使得\
    \ `@String` 的字面值不再与查询的其余部分拼接。之前，拼接后 `@sql` 的字面值如下：\n\n```sql\nSELECT AddressID\
    \ FROM Person.Address WHERE AddressLine1 LIKE '%Stone%'\n```\n\n作为此更改的结果，拼接后的字面值现在如下：\n\
    \n```sql\nSELECT AddressID FROM Person.Address WHERE AddressLine1 LIKE '%' + @String\
    \ + '%'\n```\n\n尝试使用 `EXECUTE` 执行此 SQL 会导致以下异常：\n\n```\nMsg 137, Level 15, State\
    \ 2, Line 1\nMust declare the scalar variable \"@String\".\n```"
- fmt: '## CHAPTER 8 - DYNAMIC T-SQL


    The reason for this is that `EXECUTE` runs the SQL in a different context than
    that in which it was created. In the context in which the statement is run, the
    variable `@String` has not been declared and is therefore unknown. Since the value
    of the variable is not concatenated directly into the query, the type of SQL injection
    described in the previous section is impossible in this scenario. However, we
    need to find an alternative way to pass legitimate, strongly typed parameters
    to the query.


    The solution to this problem is to use the `sp_executesql` system stored procedure,
    which allows you to pass parameters to dynamic SQL, much as you can to a stored
    procedure. The parameters for `sp_executesql` are a Unicode (nvarchar or nchar)
    string containing a dynamic SQL batch, a second Unicode string that defines the
    data types of the variables referenced in the dynamic SQL, and a list of values
    or variables from the calling scope that correspond to the variables defined in
    the data type list.


    The following T-SQL shows how to execute the `Person.Address` query using `sp_executesql`:


    ```sql

    DECLARE @String nvarchar(60) = ''Stone''


    DECLARE @sql nvarchar(max);


    SET @sql = '''' +

    ''SELECT AddressID '' +

    ''FROM Person.Address '' +

    ''WHERE AddressLine1 LIKE ''''%'''' + @String + ''''%''''''


    EXEC sp_executesql

    @sql,

    N''@String nvarchar(60)'',

    @String;


    GO

    ```


    Running this batch will produce the same results as calling `FindAddressByString`
    and passing the string “Stone.” The parameters to `sp_executesql` serve to map
    the `@String` variable from the outer scope into the new scope spawned when the
    dynamic SQL is executed—without having to concatenate the literal value of the
    variable.


    For an example that uses multiple parameters, consider again the `GetEmployeeData`
    stored procedure, now rewritten to use `sp_executesql` instead of `EXECUTE`:


    ```sql

    ALTER PROCEDURE GetEmployeeData

    @BusinessEntityID int = NULL,

    @NationalIDNumber nvarchar(15) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;


    DECLARE @sql nvarchar(max);


    SET @sql = '''' +

    ''SELECT '' +

    ''BusinessEntityID, '' +

    ''LoginID, '' +

    ''JobTitle '' +

    ''FROM HumanResources.Employee '' +

    ''WHERE 1=1 '' +

    CASE

    WHEN @BusinessEntityID IS NULL THEN ''''

    ELSE ''AND BusinessEntityID = @BusinessEntityID ''

    END +

    CASE

    WHEN @NationalIDNumber IS NULL THEN ''''

    ELSE ''AND NationalIDNumber = @NationalIDNumber ''

    END


    EXEC sp_executesql

    @sql,

    N''@BusinessEntityID int, @NationalIDNumber nvarchar(60)'',

    @BusinessEntityID,

    @NationalIDNumber;

    END;


    GO

    ```


    For multiple parameters, simply comma-delimit their data type definitions in the
    second parameter, and then pass as many outer parameters as necessary to define
    every variable listed in the second parameter. Note that you can use a string
    variable for the second parameter, which might make sense if you are defining
    a long list—but I usually keep the list in a string literal so that I can easily
    match the definitions with the variables passed in from the outer scope.


    Another important thing to note here is that even though both parameters are optional,
    they will both get passed to the query every time it is executed. This is perfectly
    OK! There is very little overhead in passing parameters into `sp_executesql`,
    and trying to work around this issue would either bring back the combinatorial
    explosion problem or require some very creative use of nested dynamic SQL. Neither
    solution is maintainable or worth the time required, so save your energy for more
    interesting pursuits.


    To verify that `sp_executesql` really is reusing query plans as expected, run
    the same code that was used to show that the `EXECUTE` method was not reusing
    plans:


    ```sql

    DBCC FREEPROCCACHE;

    GO


    EXEC GetEmployeeData

    @BusinessEntityID = 1;

    GO


    EXEC GetEmployeeData

    @BusinessEntityID = 2;

    GO


    EXEC GetEmployeeData

    @BusinessEntityID = 3;

    GO

    ```


    After running this code, query the `sys.dm_exec_cached_plans` view as before.
    The results should show two rows, as follows:


    ```text

    objtype      text

    Proc         CREATE PROCEDURE GetEmployeeData @BusinessEntityID int = NULL...

    Prepared     (@BusinessEntityID INT, @NationalIDNumber nvarchar(60))SELECT ...

    ```'
