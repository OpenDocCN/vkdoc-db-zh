- fmt: "Another form of optimistic concurrency control supported by SQL Server is\
    \ used with updateable cursors. The `OPTIMISTIC` options support a very similar\
    \ form of optimistic concurrency to that of `SNAPSHOT isolation`. However, given\
    \ the rarity with which updateable cursors are actually used in properly designed\
    \ production applications, this isn’t an option you’re likely to see very often.\n\
    \nAlthough both `SNAPSHOT isolation` and the `OPTIMISTIC WITH ROW VERSIONING`\
    \ cursor options work by holding previous versions of rows in a version store,\
    \ these should not be confused with MVCC. In both the case of the isolation level\
    \ and the cursor option, the previous versions of the rows are only held temporarily\
    \ in order to help support nonblocking reads. The rows are not available later—for\
    \ instance, as a means by which to merge changes from multiple writers—which is\
    \ a hallmark of a properly designed MVCC system.\n\nYet another isolation level\
    \ that is frequently used in SQL Server application development scenarios is `READ\
    \ UNCOMMITTED`. This isolation level implements the anarchy business methodology\
    \ mentioned in the previous section, and does it quite well—readers are not blocked\
    \ by writers, and writers are not blocked by readers, whether or not a transaction\
    \ is active.\n\nAgain, it’s important to stress that although SQL Server does\
    \ not really support concurrency properly from a business point of view, it wouldn’t\
    \ make sense for it to do so. The goal of SQL Server’s isolation levels is to\
    \ control concurrency at the transactional level, ultimately helping to keep data\
    \ in a consistent state in the database.\n\nRegardless of its inherent lack of\
    \ provision for business-compliant concurrency solutions, SQL Server provides\
    \ all of the tools necessary to easily build them yourself. The following sections\
    \ discuss how to use SQL Server in order to help define concurrency models within\
    \ database applications.\n\n## Preparing for the Worst: Pessimistic Concurrency\n\
    \nImagine for a moment that you are tasked with building a system to help a life\
    \ insurance company input data from many years of paper-based customer profile\
    \ update forms. The company sent out the forms to each of its several hundred\
    \ thousand customers on a biannual basis, in order to get the customers’ latest\
    \ information.\n\nMost of the profiles were filled in by hand, so OCR is out of\
    \ the question—they must be keyed in manually. To make matters worse, a large\
    \ percentage of the customer files were removed from the filing system by employees\
    \ and incorrectly refiled. Many were also photocopied at one time or another,\
    \ and employees often filed the photocopies in addition to the original forms,\
    \ resulting in a massive amount of duplication. The firm has tried to remove the\
    \ oldest of the forms and bring the newer ones to the top of the stack, but it’s\
    \ difficult because many customers didn’t always send back the forms each time\
    \ they were requested—for one customer, 1994 may be the newest year, whereas for\
    \ another, the latest form may be from 2009.\n\nBack to the challenge at hand—building\
    \ the data input application is fairly easy, as is finding students willing to\
    \ do the data input for fairly minimal rates. The workflow is as follows: for\
    \ each profile update form, the person doing the data input will bring up the\
    \ customer’s record based on that customer’s Social Security number or other identification\
    \ number. If the date on the profile form is more recent than the last updated\
    \ date in the system, the profile needs to be updated with the newer data. If\
    \ the dates are the same, the firm has decided that the operator should scan through\
    \ the form and make sure all of the data already entered is correct—as in all\
    \ cases of manual data entry, the firm is aware that typographical errors will\
    \ be made. Each form is several pages long, and the larger ones will take hours\
    \ to type in.\n\nAs is always the case in projects like this, time and money are\
    \ of the essence, and the firm is concerned about the tremendous amount of profile\
    \ form duplication as well as the fact that many of the forms are filed in the\
    \ wrong order. It would be a huge waste of time for the data input operators if,\
    \ for instance, one entered a customer’s 1996 update form at the same time another\
    \ happened to be entering the same customer’s 2002 form.\n\n### Progressing to\
    \ a Solution\n\nThis situation all but cries out for a solution involving pessimistic\
    \ concurrency control. Each time a customer’s Social Security number is entered\
    \ into the system, the application can check whether someone else has entered\
    \ the same number and has not yet persisted changes or sent back a message saying\
    \ there are no changes (i.e., hit the cancel button). If another operator is currently\
    \ editing that customer’s data, a message can be returned to the user telling\
    \ him or her to try again later—this profile is locked.\n\nThe problem then becomes\
    \ a question of how best to implement such a solution. A scheme I’ve seen attempted\
    \ several times is to create a table along the lines of the following:\n\n```sql\n\
    CREATE TABLE CustomerLocks\n(\n    CustomerId int NOT NULL PRIMARY KEY\n     \
    \   REFERENCES Customers (CustomerId),\n    IsLocked bit NOT NULL DEFAULT (0)\n\
    );\nGO\n```\n\nThe `IsLocked` column could instead be added to the existing `Customers`\
    \ table, but that is not recommended in a highly transactional database system.\
    \ I generally advise keeping locking constructs separate from actual data in order\
    \ to limit excessive blocking on core tables.\n\nIn this system, the general technique\
    \ employed is to populate the table with every customer ID in the system. The\
    \ table is then queried when someone needs to take a lock, using code such as\
    \ the following:\n\n```sql\nDECLARE @LockAcquired bit = 0;\nIF\n(\n    SELECT\
    \ IsLocked\n    FROM CustomerLocks\n    WHERE CustomerId = @CustomerId\n) = 0\n\
    BEGIN\n    UPDATE CustomerLocks\n    SET IsLocked = 1\n    WHERE CustomerId =\
    \ @CustomerId;\n    SET @LockAcquired = 1;\nEND\n```\n\nUnfortunately, this approach\
    \ is fraught with issues. The first and most serious problem is that between the\
    \ query in the `IF` condition that tests for the existence of a lock and the `UPDATE`,\
    \ the row’s value can be changed by another writer. If two sessions ask for the\
    \ lock at the same moment, the result may be that both writers will believe that\
    \ they hold the exclusive lock. In order to remedy this issue, the `IF` condition\
    \ should be eliminated; instead, check for the ability to take the lock at the\
    \ same time as you’re taking it, in the `UPDATE`’s `WHERE` clause:\n\n```sql\n\
    DECLARE @LockAcquired bit;\nUPDATE CustomerLocks\nSET IsLocked = 1\nWHERE\n  \
    \  CustomerId = @CustomerId\n    AND IsLocked = 0;\nSET @LockAcquired = @@ROWCOUNT;\n\
    ```\n\nThis pattern fixes the issue of two readers requesting the lock at the\
    \ same time, but leaves open a maintenance issue: my recommendation to separate\
    \ the locking from the actual table used to store customer data means that you\
    \ must now ensure that all new customer IDs are added to the locks table as they\
    \ are added to the system.\n\nTo solve this issue, avoid modeling the table as\
    \ a collection of lock statuses per customer. Instead, define the existence of\
    \ a row in the table as indication of a lock being held. Then the table becomes\
    \ as follows:\n\n```sql\nCREATE TABLE CustomerLocks\n(\n    CustomerId int NOT\
    \ NULL PRIMARY KEY\n        REFERENCES Customers (CustomerId)\n);\nGO\n```\n\n\
    To take a lock with this new table, you can attempt an `INSERT`, using a `TRY/CATCH`\
    \ block to find out whether you’ve caused a primary key violation:\n\n```sql\n\
    DECLARE @LockAcquired bit;\nBEGIN TRY\n    INSERT INTO CustomerLocks\n    (\n\
    \        CustomerId\n    )\n    VALUES\n    (\n        @CustomerId\n    )\n  \
    \  --No exception: Lock acquired\n    SET @LockAcquired = 1;\nEND TRY\nBEGIN CATCH\n\
    \    --Caught an exception: No lock acquired\n    SET @LockAcquired = 0;\nEND\
    \ CATCH\nGO\n```\n\nReleasing the lock is a simple matter of deleting the row:\n\
    \n```sql\nDELETE FROM CustomerLocks\nWHERE CustomerId = @CustomerId;\nGO\n```"
  raw: 'Another form of optimistic concurrency control supported by SQL Server is
    used with updateable cursors. The OPTIMISTIC options support a very similar form
    of optimistic concurrency to that of SNAPSHOT isolation. However, given the rarity
    with which updateable cursors are actually used in properly designed production
    applications, this isn’t an option you’re likely to see very often.


    Although both SNAPSHOT isolation and the OPTIMISTIC WITH ROW VERSIONING cursor
    options work by holding previous versions of rows in a version store, these should
    not be confused with MVCC. In both the case of the isolation level and the cursor
    option, the previous versions of the rows are only held temporarily in order to
    help support nonblocking reads. The rows are not available later—for instance,
    as a means by which to merge changes from multiple writers—which is a hallmark
    of a properly designed MVCC system.


    Yet another isolation level that is frequently used in SQL Server application
    development scenarios is READ UNCOMMITTED. This isolation level implements the
    anarchy business methodology mentioned in the previous section, and does it quite
    well—readers are not blocked by writers, and writers are not blocked by readers,
    whether or not a transaction is active.


    Again, it’s important to stress that although SQL Server does not really support
    concurrency properly from a business point of view, it wouldn’t make sense for
    it to do so. The goal of SQL Server’s isolation levels is to control concurrency
    at the transactional level, ultimately helping to keep data in a consistent state
    in the database.


    Regardless of its inherent lack of provision for business-compliant concurrency
    solutions, SQL


    Server provides all of the tools necessary to easily build them yourself. The
    following sections discuss how to use SQL Server in order to help define concurrency
    models within database applications.


    Preparing for the Worst: Pessimistic Concurrency


    Imagine for a moment that you are tasked with building a system to help a life
    insurance company input data from many years of paper-based customer profile update
    forms. The company sent out the forms to each of its several hundred thousand
    customers on a biannual basis, in order to get the customers’ latest information.


    Most of the profiles were filled in by hand, so OCR is out of the question—they
    must be keyed in manually. To make matters worse, a large percentage of the customer
    files were removed from the filing system by employees and incorrectly refiled.
    Many were also photocopied at one time or another, and employees often filed the
    photocopies in addition to the original forms, resulting in a massive amount of
    duplication. The firm has tried to remove the oldest of the forms and bring the
    newer ones to the top of the stack, but it’s difficult because many customers
    didn’t always send back the forms each time they were requested—for one customer,
    1994 may be the newest year, whereas for another, the latest form may be from
    2009.


    Back to the challenge at hand—building the data input application is fairly easy,
    as is finding students willing to do the data input for fairly minimal rates.
    The workflow is as follows: for each profile update form, the person doing the
    data input will bring up the customer’s record based on that customer’s Social
    Security number or other identification number. If the date on the profile form
    is more recent than the last updated date in the system, the profile needs to
    be updated with the newer data. If the dates are the same, the firm has decided
    that the operator should scan through the form and make sure all of the data already
    entered is correct—as in all cases of manual data entry, the firm is aware that
    243


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    typographical errors will be made. Each form is several pages long, and the larger
    ones will take hours to type in.


    As is always the case in projects like this, time and money are of the essence,
    and the firm is concerned about the tremendous amount of profile form duplication
    as well as the fact that many of the forms are filed in the wrong order. It would
    be a huge waste of time for the data input operators if, for instance, one entered
    a customer’s 1996 update form at the same time another happened to be entering
    the same customer’s 2002 form.


    Progressing to a Solution


    This situation all but cries out for a solution involving pessimistic concurrency
    control. Each time a customer’s Social Security number is entered into the system,
    the application can check whether someone else has entered the same number and
    has not yet persisted changes or sent back a message saying there are no changes
    (i.e., hit the cancel button). If another operator is currently editing that customer’s
    data, a message can be returned to the user telling him or her to try again later—this
    profile is locked.


    The problem then becomes a question of how best to implement such a solution.
    A scheme I’ve


    seen attempted several times is to create a table along the lines of the following:


    CREATE TABLE CustomerLocks


    (


    CustomerId int NOT NULL PRIMARY KEY


    REFERENCES Customers (CustomerId),


    IsLocked bit NOT NULL DEFAULT (0)


    );


    GO


    The IsLocked column could instead be added to the existing Customers table, but
    that is not


    recommended in a highly transactional database system. I generally advise keeping
    locking constructs separate from actual data in order to limit excessive blocking
    on core tables.


    In this system, the general technique employed is to populate the table with every
    customer ID in the system. The table is then queried when someone needs to take
    a lock, using code such as the following:


    DECLARE @LockAcquired bit = 0;


    IF


    (


    SELECT IsLocked


    FROM CustomerLocks


    WHERE CustomerId = @CustomerId


    ) = 0


    BEGIN


    UPDATE CustomerLocks


    SET IsLocked = 1


    WHERE CustomerId = @CustomerId;


    SET @LockAcquired = 1;


    END


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    Unfortunately, this approach is fraught with issues. The first and most serious
    problem is that between the query in the IF condition that tests for the existence
    of a lock and the UPDATE, the row’s value can be changed by another writer. If
    two sessions ask for the lock at the same moment, the result may be that both
    writers will believe that they hold the exclusive lock. In order to remedy this
    issue, the IF


    condition should be eliminated; instead, check for the ability to take the lock
    at the same time as you’re taking it, in the UPDATE’s WHERE clause:


    DECLARE @LockAcquired bit;


    UPDATE CustomerLocks


    SET IsLocked = 1


    WHERE


    CustomerId = @CustomerId


    AND IsLocked = 0;


    SET @LockAcquired = @@ROWCOUNT;


    This pattern fixes the issue of two readers requesting the lock at the same time,
    but leaves open a maintenance issue: my recommendation to separate the locking
    from the actual table used to store customer data means that you must now ensure
    that all new customer IDs are added to the locks table as they are added to the
    system.


    To solve this issue, avoid modeling the table as a collection of lock statuses
    per customer. Instead, define the existence of a row in the table as indication
    of a lock being held. Then the table becomes as follows:


    CREATE TABLE CustomerLocks


    (


    CustomerId int NOT NULL PRIMARY KEY


    REFERENCES Customers (CustomerId)


    );


    GO


    To take a lock with this new table, you can attempt an INSERT, using a TRY/CATCH
    block to find out whether you’ve caused a primary key violation:


    DECLARE @LockAcquired bit;


    BEGIN TRY


    INSERT INTO CustomerLocks


    (


    CustomerId


    )


    VALUES


    (


    @CustomerId


    )


    --No exception: Lock acquired


    SET @LockAcquired = 1;


    END TRY


    BEGIN CATCH


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    --Caught an exception: No lock acquired


    SET @LockAcquired = 0;


    END CATCH


    GO


    Releasing the lock is a simple matter of deleting the row:


    DELETE FROM CustomerLocks


    WHERE CustomerId = @CustomerId;


    GO'
  trans: "\nSQL Server 支持的另一种乐观并发控制形式用于可更新游标。`OPTIMISTIC` 选项支持一种与 `SNAPSHOT isolation`\
    \ 非常相似的乐观并发形式。然而，鉴于在设计良好的生产应用程序中，可更新游标实际使用的情况非常罕见，这不是一个你很可能会经常看到的选项。\n\n尽管 `SNAPSHOT\
    \ isolation` 和 `OPTIMISTIC WITH ROW VERSIONING` 游标选项都通过在版本存储中保存行的先前版本来工作，但这不应与\
    \ MVCC 相混淆。无论是隔离级别还是游标选项，行的先前版本都只是临时保存，以帮助支持非阻塞读取。这些行以后并不可用——例如，不能作为合并多个写入者更改的一种手段——而这是设计良好的\
    \ MVCC 系统的一个标志。\n\nSQL Server 应用程序开发场景中经常使用的另一个隔离级别是 `READ UNCOMMITTED`。这个隔离级别实现了上一节提到的“无政府”业务方法，并且做得相当好——无论事务是否处于活动状态，读取者都不会被写入者阻塞，写入者也不会被读取者阻塞。\n\
    \n需要再次强调的是，尽管从业务角度来看，SQL Server 并没有真正适当地支持并发，但它也没有理由这样做。SQL Server 隔离级别的目标是在事务级别控制并发，最终帮助保持数据库中数据的一致性状态。\n\
    \n尽管 SQL Server 本身缺乏对符合业务需求的并发解决方案的内置支持，但它提供了所有必要的工具，让您可以轻松地自行构建这些解决方案。以下部分讨论了如何使用\
    \ SQL Server 来帮助在数据库应用程序中定义并发模型。\n\n## 未雨绸缪：悲观并发\n\n想象一下，您被委以重任，要构建一个系统来帮助一家人寿保险公司录入多年积累的纸质客户档案更新表格的数据。该公司每半年向其数十万客户发送一次表格，以获取客户的最新信息。\n\
    \n大部分档案是手工填写的，因此 OCR 行不通——必须手动键入。更糟糕的是，很大一部分客户文件被员工从归档系统中取出，并错误地重新归档。许多文件还曾被多次复印，员工经常在归档原件的同时也归档复印件，导致大量重复。公司曾尝试移除最旧的表格，并将较新的表格放在文件堆的顶部，但这很困难，因为许多客户并非每次收到请求都会寄回表格——对某位客户而言，1994\
    \ 年的表格可能是最新的，而对另一位客户，最新的表格可能来自 2009 年。\n\n回到手头的挑战——构建数据输入应用程序相对容易，找到愿意以相当低廉的费用进行数据输入的学生也是如此。工作流程如下：对于每份档案更新表格，进行数据输入的人员将根据该客户的社会安全号码或其他身份证号调出其记录。如果档案表格上的日期比系统中上次更新的日期新，则需要用更新的数据更新该档案。如果日期相同，公司已决定操作员应扫描该表格并确保所有已输入的数据都是正确的——如同所有手动数据输入的情况一样，公司意识到会出现打字错误。每份表格有几页，较大的表格需要数小时才能录入。\n\
    \n如同此类项目中常见的情况一样，时间和金钱至关重要，公司对大量的档案表格重复以及许多表格顺序错误归档的事实感到担忧。如果一位操作员正在输入某客户的 1996\
    \ 年更新表，而另一位操作员碰巧正在输入同一客户的 2002 年表格，那将是对数据输入操作员时间的巨大浪费。\n\n### 推进到解决方案\n\n这种情况几乎明确呼唤一种涉及悲观并发控制的解决方案。每次在系统中输入客户的社保号码时，应用程序可以检查是否有其他人输入了相同的号码且尚未持久化更改或返回消息说没有更改（即，点击了取消按钮）。如果另一位操作员当前正在编辑该客户的数据，可以向用户返回一条消息，告知其稍后再试——此档案已被锁定。\n\
    \n那么问题就变成了如何最好地实现这样的解决方案。我曾多次尝试过一种方案，即创建一个类似如下结构的表：\n\n```sql\nCREATE TABLE CustomerLocks\n\
    (\n    CustomerId int NOT NULL PRIMARY KEY\n        REFERENCES Customers (CustomerId),\n\
    \    IsLocked bit NOT NULL DEFAULT (0)\n);\nGO\n```\n\n`IsLocked` 列也可以添加到现有的 `Customers`\
    \ 表中，但在高度事务性的数据库系统中不推荐这样做。我通常建议将锁定结构与实际数据分开，以限制对核心表的过度阻塞。\n\n在这个系统中，采用的一般技术是用系统中的每个客户\
    \ ID 填充该表。当有人需要获取锁时，会查询该表，使用如下代码：\n\n```sql\nDECLARE @LockAcquired bit = 0;\n\
    IF\n(\n    SELECT IsLocked\n    FROM CustomerLocks\n    WHERE CustomerId = @CustomerId\n\
    ) = 0\nBEGIN\n    UPDATE CustomerLocks\n    SET IsLocked = 1\n    WHERE CustomerId\
    \ = @CustomerId;\n    SET @LockAcquired = 1;\nEND\n```\n\n不幸的是，这种方法问题重重。第一个也是最严重的问题是，在测试锁是否存在的\
    \ `IF` 条件查询和 `UPDATE` 之间，该行的值可能被另一个写入者更改。如果两个会话同时请求锁，结果可能是两个写入者都认为自己持有独占锁。为了解决这个问题，应消除\
    \ `IF` 条件；改为在获取锁的同时，在 `UPDATE` 的 `WHERE` 子句中检查获取锁的权限：\n\n```sql\nDECLARE @LockAcquired\
    \ bit;\nUPDATE CustomerLocks\nSET IsLocked = 1\nWHERE\n    CustomerId = @CustomerId\n\
    \    AND IsLocked = 0;\nSET @LockAcquired = @@ROWCOUNT;\n```\n\n这个模式修复了两个读取者同时请求锁的问题，但留下了一个维护问题：我关于将锁定与存储客户数据的实际表分开的建议意味着，您现在必须确保所有新的客户\
    \ ID 在添加到系统时也添加到锁表中。\n\n为了解决这个问题，不要将表建模为每个客户的锁状态集合。相反，将表中行的存在定义为锁被持有的指示。然后该表变成如下结构：\n\
    \n```sql\nCREATE TABLE CustomerLocks\n(\n    CustomerId int NOT NULL PRIMARY KEY\n\
    \        REFERENCES Customers (CustomerId)\n);\nGO\n```\n\n要使用这个新表获取锁，您可以尝试 `INSERT`，使用\
    \ `TRY/CATCH` 块来查明是否引起了主键冲突：\n\n```sql\nDECLARE @LockAcquired bit;\nBEGIN TRY\n\
    \    INSERT INTO CustomerLocks\n    (\n        CustomerId\n    )\n    VALUES\n\
    \    (\n        @CustomerId\n    )\n    --未引发异常：锁已获取\n    SET @LockAcquired =\
    \ 1;\nEND TRY\nBEGIN CATCH\n    --捕获异常：未获取锁\n    SET @LockAcquired = 0;\nEND CATCH\n\
    GO\n```\n\n释放锁很简单，只需删除该行即可：\n\n```sql\nDELETE FROM CustomerLocks\nWHERE CustomerId\
    \ = @CustomerId;\nGO\n```\n"
- fmt: "我们正在接近一个健壮的解决方案，但尚未完全实现。想象一下，应用程序中某处存在一段有缺陷的代码，它本应调用存储过程来获取锁，却偶尔会调用另一个释放锁的存储过程。在当前设计的系统中，没有任何机制防止此类问题——无论当前哪个用户持有记录的锁，任何人都可以随时请求释放锁。这非常危险，因为它会使整个系统的锁定机制失效。此外，如图所示的系统实现方式，调用者不会知道发生了问题，也不知道锁并不存在。通过在现有框架上增加一些功能，可以解决这两个问题。\n\
    \n为了帮助防止锁被提前失效，可以颁发一个 `lock token`。\n\n这个令牌不过是一个随机生成的锁的唯一标识符，它将用作释放锁的键，而不是客户ID。要实现此解决方案，可以按如下方式更改表的定义：\n\
    \n```sql\nCREATE TABLE CustomerLocks\n(\n    CustomerId int NOT NULL PRIMARY KEY\n\
    \        REFERENCES Customers (CustomerId),\n    LockToken uniqueidentifier NOT\
    \ NULL UNIQUE\n);\nGO\n```\n\n有了这个表，用于请求锁的插入例程就变成了如下形式：\n\n```sql\nDECLARE @LockToken\
    \ uniqueidentifier\nBEGIN TRY\n    --Generate the token\n    SET @LockToken =\
    \ NEWID();\n\n    INSERT INTO CustomerLocks\n    (\n        CustomerId,\n    \
    \    LockToken\n    )\n    VALUES\n    (\n        @CustomerId,\n        @LockToken\n\
    \    )\nEND TRY\n\nBEGIN CATCH\n    --Caught an exception: No lock acquired\n\
    \    SET @LockToken = NULL;\nEND CATCH\nGO\n```\n\n现在，不再通过检查 `@LockAcquired` 是否为\
    \ 1 来确定锁是否成功获取，而是检查 `@LockToken` 是否为 `NULL`。通过使用 GUID，该系统大大降低了有缺陷的应用程序代码导致锁被不持有它的进程释放的概率。\n\
    \n获取锁后，应用程序应记住锁令牌，在需要释放锁时传递它，而不是传递客户ID：\n\n```sql\nDELETE FROM CustomerLocks\n\
    WHERE LockToken = @LockToken;\nGO\n```\n\n更好的是，用于释放锁的代码可以检查锁是否未被成功释放（或者是否一开始就没有锁），并调用方返回异常：\n\
    \n```sql\nDELETE FROM CustomerLocks\nWHERE LockToken = @LockToken;\n\nIF @@ROWCOUNT\
    \ = 0\n    RAISERROR('Lock token not found!', 16, 1);\nGO\n```\n\n调用方应在同一事务中完成对锁定资源的任何更新并请求释放锁。这样，如果调用方收到此异常，它可以采取适当的操作——回滚事务——确保数据不会最终处于无效状态。\n\
    \n几乎所有问题现在都已从该锁定方案中消除：两个进程不会错误地获得同一个锁，不存在关于保持表包含最新客户ID列表的维护问题，并且令牌极大地消除了锁释放问题的可能性。\n\
    \n最后还剩一个稍微微妙的问题：如果用户请求了一个锁，忘记点击保存按钮，然后去度两周的假怎么办？或者类似地，如果应用程序获取了一个锁，然后在 5 分钟后崩溃，从而丢失了其对令牌的引用，该怎么办？\n\
    \n不幸的是，无法用一个适用于所有场景的统一方法来解决这个问题，并且悲观方案的最大问题之一是，总会存在与释放因某些原因未得到正确处理的锁相关的管理开销。解决此问题的一般方法是在锁表中添加一个审计列，以记录锁被获取的日期和时间：\n\
    \n```sql\nCREATE TABLE CustomerLocks\n(\n    CustomerId int NOT NULL PRIMARY KEY\n\
    \        REFERENCES Customers (CustomerId),\n    LockToken uniqueidentifier NOT\
    \ NULL UNIQUE,\n    LockGrantedDate datetime NOT NULL DEFAULT (GETDATE())\n);\n\
    GO\n```\n\n已列出的代码无需修改以适应 `LockGrantedDate` 列，因为它具有默认值。必须编写一个外部作业来定期轮询该表，“过期”那些持有时间过长的锁。执行此操作的代码很简单；以下\
    \ T-SQL 删除所有超过 5 小时的锁：\n\n```sql\nDELETE FROM CustomerLocks\nWHERE LockGrantedDate\
    \ < DATEADD(hour, -5, GETDATE());\nGO\n```\n\n此代码可以在 SQL Server 代理作业中实现，设置为在一天中偶尔运行。实际间隔取决于系统经历的活跃度，但在大多数情况下，每\
    \ 20 或 30 分钟一次就足够了。\n\n尽管此过期过程在大多数情况下有效，但从管理和业务角度来看，它也是问题可能出错的地方。主要挑战是定义一个合理的超时期限。如果平均锁持有时间为\
    \ 20 分钟，但某些长时间运行的进程可能需要持有锁数小时，则重要的是定义超时以偏向于后一进程，甚至提供缓冲以确保它们的锁永远不会在不适当的时候自动过期。\n\
    \n不幸的是，无论你选择什么超时期限，它永远不会对所有人都适用。几乎可以百分之百肯定，在某个时刻，某个用户将处理一个必须快速完成的非常重要的操作，而应用程序会崩溃，使锁保持原位。用户除了呼叫管理支持或等待超时期限外别无选择——当然，如果超时被设计为偏向需要数小时的进程，这将不是一个受欢迎的选择。\n\
    \n虽然我见过这个问题在悲观并发解决方案中出现，但它通常并不十分常见，并且除了一些压力大的最终用户外，没有造成任何重大问题。我很高兴地说，我从未在凌晨 2:00\
    \ 接到用户请求释放锁的紧急电话，尽管我完全可以想象这会发生。如果这是你系统的一个担忧，解决方案是设计应用程序，使其在工作时定期向数据库发送“心跳”通知。这些通知应更新锁日期/时间列：\n\
    \n```sql\nUPDATE CustomerLocks\nSET LockGrantedDate = GETDATE()\nWHERE LockToken\
    \ = @LockToken;\n```\n\n应用程序可以被设置为在检测到用户活动期间，按需发送心跳——例如，每 5 分钟一次。即使在 Web 应用程序中，这也很容易实现，这要归功于\
    \ AJAX 和类似的异步技术。如果使用此设计，可以显著缩短超时期限，但请记住，用户在工作时偶尔可能会暂时断开连接；至少稍微缓冲超时时间，以帮助抑制与断开连接相关的超时。\n\
    \n> **提示** 作为在锁表中保留 `LockGrantedDate` 的替代方案，你可以将该列建模为 `LockExpirationDate`。通过让调用方在获取锁时请求最大持续时间，而不是被迫采用标准的过期间隔，这可能会提高系统的灵活性。当然，这有其缺点：用户可能会请求不切实际的长时间锁。如果你实施此类解决方案，请仔细监控使用情况，以确保这不会成为问题。\n\
    \n在写入时强制实施悲观锁"
  raw: 'We are now getting closer to a robust solution, but we haven’t quite gotten
    there yet. Imagine that a buggy piece of code exists somewhere in the application,
    and instead of calling the stored procedure to take a lock, it’s occasionally
    calling the other stored procedure, which releases the lock. In the system as
    it’s currently designed, there is no protection against this kind of issue—anyone
    can request a lock release at any time, whatever user holds the current lock on
    the record. This is very dangerous, as it will invalidate the entire locking scheme
    for the system. In addition, the way the system is implemented as shown, the caller
    will not know that a problem occurred and that the lock didn’t exist. Both of
    these problems can be solved with some additions to the framework in place.


    In order to help protect the locks from being prematurely invalidated, a **lock
    token** can be issued.


    This token is nothing more than a randomly generated unique identifier for the
    lock, and will be used as the key to release the lock instead of the customer
    ID. To implement this solution, the table’s definition can be changed as follows:


    CREATE TABLE CustomerLocks


    (


    CustomerId int NOT NULL PRIMARY KEY


    REFERENCES Customers (CustomerId),


    LockToken uniqueidentifier NOT NULL UNIQUE


    );


    GO


    With this table in place, the insert routine to request a lock becomes the following:


    DECLARE @LockToken uniqueidentifier


    BEGIN TRY


    --Generate the token


    SET @LockToken = NEWID();


    INSERT INTO CustomerLocks


    (


    CustomerId,


    LockToken


    )


    VALUES


    (


    @CustomerId,


    @LockToken


    )


    END TRY


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    BEGIN CATCH


    --Caught an exception: No lock acquired


    SET @LockToken = NULL;


    END CATCH


    GO


    Now, rather than checking whether @LockAcquired is 1 to find out if the lock was
    successfully taken, check whether @LockToken is NULL. By using a GUID, this system
    greatly decreases the chance that a buggy piece of application code will cause
    the lock to be released by a process that does not hold it.


    After taking the lock, the application should remember the lock token, passing
    it instead of the customer ID when it comes time to release the lock:


    DELETE FROM CustomerLocks


    WHERE LockToken = @LockToken;


    GO


    Even better, the code used to release the lock can check to find out whether the
    lock was not successfully released (or whether there was no lock to release to
    begin with) and return an exception to the caller:


    DELETE FROM CustomerLocks


    WHERE LockToken = @LockToken;


    IF @@ROWCOUNT = 0


    RAISERROR(''Lock token not found!'', 16, 1);


    GO


    The caller should do any updates to the locked resources and request the lock
    release in the same transaction. That way, if the caller receives this exception,
    it can take appropriate action—rolling back the transaction—ensuring that the
    data does not end up in an invalid state.


    Almost all of the issues have now been eliminated from this locking scheme: two
    processes will not erroneously be granted the same lock, there is no maintenance
    issue with regard to keeping the table populated with an up-to-date list of customer
    IDs, and the tokens greatly eliminate the possibility of lock release issues.


    One final, slightly subtle problem remains: what happens if a user requests a
    lock, forgets to hit the save button, and leaves for a two-week vacation? Or in
    the same vein, what should happen if the application takes a lock and then crashes
    5 minutes later, thereby losing its reference to the token?


    Solving this issue in a uniform fashion that works for all scenarios is unfortunately
    not possible, and one of the biggest problems with pessimistic schemes is that
    there will always be administrative overhead associated with releasing locks that
    for some reason did not get properly handled. The general method of solving this
    problem is to add an audit column to the locks table to record the date and time
    the lock was taken:


    CREATE TABLE CustomerLocks


    (


    CustomerId int NOT NULL PRIMARY KEY


    REFERENCES Customers (CustomerId),


    LockToken uniqueidentifier NOT NULL UNIQUE,


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    LockGrantedDate datetime NOT NULL DEFAULT (GETDATE())


    );


    GO


    None of the code already listed needs to be modified in order to accommodate the
    LockGrantedDate column, since it has a default value. An external job must be
    written to poll the table on a regular basis,


    “expiring” locks that have been held for too long. The code to do this is simple;
    the following T-SQL


    deletes all locks older than 5 hours:


    DELETE FROM CustomerLocks


    WHERE LockGrantedDate < DATEADD(hour, -5, GETDATE());


    GO


    This code can be implemented in a SQL Server agent job, set to run occasionally
    throughout the day. The actual interval depends on the amount of activity your
    system experiences, but once every 20 or 30 minutes is sufficient in most cases.


    Although this expiration process works in most cases, it’s also where things can
    break down from both administrative and business points of view. The primary challenge
    is defining a timeout period that makes sense. If the average lock is held for
    20 minutes, but there are certain long-running processes that might need to hold
    locks for hours, it’s important to define the timeout to favor the later processes,
    even providing padding to make sure that their locks will never automatically
    expire when not appropriate.


    Unfortunately, no matter what timeout period you choose, it will never work for
    everyone. There is virtually a 100 percent chance that at some point, a user will
    be working on a very high-profile action that must be completed quickly, and the
    application will crash, leaving the lock in place. The user will have no recourse
    available but to call for administrative support or wait for the timeout period—and
    of course, if it’s been designed to favor processes that take many hours, this
    will not be a popular choice.


    Although I have seen this problem manifest itself in pessimistic concurrency solutions,
    it has generally not been extremely common and hasn’t caused any major issues
    aside from a few stressed-out end users. I am happy to say that I have never received
    a panicked call at 2:00 a.m. from a user requesting a lock release, although I
    could certainly see it happening. If this is a concern for your system, the solution
    is to design the application such that it sends “heartbeat” notifications back
    to the database on a regular basis as work is being done. These notifications
    should update the lock date/time column: UPDATE CustomerLocks


    SET LockGrantedDate = GETDATE()


    WHERE LockToken = @LockToken;


    The application can be made to send a heartbeat as often as necessary—for instance,
    once every 5


    minutes—during times it detects user activity. This is easy even in web applications,
    thanks to AJAX and similar asynchronous techniques. If this design is used, the
    timeout period can be shortened considerably, but keep in mind that users may
    occasionally become temporarily disconnected while working; buffer the timeout
    at least a bit in order to help keep disconnection-related timeouts at bay.


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    „ **Tip** As an alternative to keeping the LockGrantedDate in the locks table,
    you could instead model the column as a LockExpirationDate. This might improve
    the flexibility of the system a bit by letting callers request a maximum duration
    for a lock when it is taken, rather than being forced to take the standard expiration
    interval. Of course, this has its downside: users requesting locks to be held
    for unrealistically large amounts of time. Should you implement such a solution,
    carefully monitor usage to make sure that this does not become an issue.


    Enforcing Pessimistic Locks at Write Time'
  trans: "\n我们正在接近一个健壮的解决方案，但尚未完全实现。想象一下，应用程序中某处存在一段有缺陷的代码，它本应调用存储过程来获取锁，却偶尔会调用另一个释放锁的存储过程。在当前设计的系统中，没有任何机制防止此类问题——无论当前哪个用户持有记录的锁，任何人都可以随时请求释放锁。这非常危险，因为它会使整个系统的锁定机制失效。此外，如图所示的系统实现方式，调用者不会知道发生了问题，也不知道锁并不存在。通过在现有框架上增加一些功能，可以解决这两个问题。\n\
    \n为了帮助防止锁被提前失效，可以颁发一个 `lock token`。\n\n这个令牌不过是一个随机生成的锁的唯一标识符，它将用作释放锁的键，而不是客户 ID。要实现此解决方案，可以按如下方式更改表的定义：\n\
    \n```sql\nCREATE TABLE CustomerLocks\n(\n    CustomerId int NOT NULL PRIMARY KEY\n\
    \        REFERENCES Customers (CustomerId),\n    LockToken uniqueidentifier NOT\
    \ NULL UNIQUE\n);\nGO\n```\n\n有了这个表，用于请求锁的插入例程就变成了如下形式：\n\n```sql\nDECLARE @LockToken\
    \ uniqueidentifier\nBEGIN TRY\n    --Generate the token\n    SET @LockToken =\
    \ NEWID();\n\n    INSERT INTO CustomerLocks\n    (\n        CustomerId,\n    \
    \    LockToken\n    )\n    VALUES\n    (\n        @CustomerId,\n        @LockToken\n\
    \    )\nEND TRY\n\nBEGIN CATCH\n    --Caught an exception: No lock acquired\n\
    \    SET @LockToken = NULL;\nEND CATCH\nGO\n```\n\n现在，不再通过检查 `@LockAcquired` 是否为\
    \ 1 来确定锁是否成功获取，而是检查 `@LockToken` 是否为 `NULL`。通过使用 GUID，该系统大大降低了有缺陷的应用程序代码导致锁被不持有它的进程释放的概率。\n\
    \n获取锁后，应用程序应记住锁令牌，在需要释放锁时传递它，而不是传递客户 ID：\n\n```sql\nDELETE FROM CustomerLocks\n\
    WHERE LockToken = @LockToken;\nGO\n```\n\n更好的是，用于释放锁的代码可以检查锁是否未被成功释放（或者是否一开始就没有锁），并调用方返回异常：\n\
    \n```sql\nDELETE FROM CustomerLocks\nWHERE LockToken = @LockToken;\n\nIF @@ROWCOUNT\
    \ = 0\n    RAISERROR('Lock token not found!', 16, 1);\nGO\n```\n\n调用方应在同一事务中完成对锁定资源的任何更新并请求释放锁。这样，如果调用方收到此异常，它可以采取适当的操作——回滚事务——确保数据不会最终处于无效状态。\n\
    \n几乎所有问题现在都已从该锁定方案中消除：两个进程不会错误地获得同一个锁，不存在关于保持表包含最新客户 ID 列表的维护问题，并且令牌极大地消除了锁释放问题的可能性。\n\
    \n最后还剩一个稍微微妙的问题：如果用户请求了一个锁，忘记点击保存按钮，然后去度两周的假怎么办？或者类似地，如果应用程序获取了一个锁，然后在 5 分钟后崩溃，从而丢失了其对令牌的引用，该怎么办？\n\
    \n不幸的是，无法用一个适用于所有场景的统一方法来解决这个问题，并且悲观方案的最大问题之一是，总会存在与释放因某些原因未得到正确处理的锁相关的管理开销。解决此问题的一般方法是在锁表中添加一个审计列，以记录锁被获取的日期和时间：\n\
    \n```sql\nCREATE TABLE CustomerLocks\n(\n    CustomerId int NOT NULL PRIMARY KEY\n\
    \        REFERENCES Customers (CustomerId),\n    LockToken uniqueidentifier NOT\
    \ NULL UNIQUE,\n    LockGrantedDate datetime NOT NULL DEFAULT (GETDATE())\n);\n\
    GO\n```\n\n已列出的代码无需修改以适应 `LockGrantedDate` 列，因为它具有默认值。必须编写一个外部作业来定期轮询该表，“过期”那些持有时间过长的锁。执行此操作的代码很简单；以下\
    \ T-SQL 删除所有超过 5 小时的锁：\n\n```sql\nDELETE FROM CustomerLocks\nWHERE LockGrantedDate\
    \ < DATEADD(hour, -5, GETDATE());\nGO\n```\n\n此代码可以在 SQL Server 代理作业中实现，设置为在一天中偶尔运行。实际间隔取决于系统经历的活跃度，但在大多数情况下，每\
    \ 20 或 30 分钟一次就足够了。\n\n尽管此过期过程在大多数情况下有效，但从管理和业务角度来看，它也是问题可能出错的地方。主要挑战是定义一个合理的超时期限。如果平均锁持有时间为\
    \ 20 分钟，但某些长时间运行的进程可能需要持有锁数小时，则重要的是定义超时以偏向于后一进程，甚至提供缓冲以确保它们的锁永远不会在不适当的时候自动过期。\n\
    \n不幸的是，无论你选择什么超时期限，它永远不会对所有人都适用。几乎可以百分之百肯定，在某个时刻，某个用户将处理一个必须快速完成的非常重要的操作，而应用程序会崩溃，使锁保持原位。用户除了呼叫管理支持或等待超时期限外别无选择——当然，如果超时被设计为偏向需要数小时的进程，这将不是一个受欢迎的选择。\n\
    \n虽然我见过这个问题在悲观并发解决方案中出现，但它通常并不十分常见，并且除了一些压力大的最终用户外，没有造成任何重大问题。我很高兴地说，我从未在凌晨 2:00\
    \ 接到用户请求释放锁的紧急电话，尽管我完全可以想象这会发生。如果这是你系统的一个担忧，解决方案是设计应用程序，使其在工作时定期向数据库发送“心跳”通知。这些通知应更新锁日期/时间列：\n\
    \n```sql\nUPDATE CustomerLocks\nSET LockGrantedDate = GETDATE()\nWHERE LockToken\
    \ = @LockToken;\n```\n\n应用程序可以被设置为在检测到用户活动期间，按需发送心跳——例如，每 5 分钟一次。即使在 Web 应用程序中，这也很容易实现，这要归功于\
    \ AJAX 和类似的异步技术。如果使用此设计，可以显著缩短超时期限，但请记住，用户在工作时偶尔可能会暂时断开连接；至少稍微缓冲超时时间，以帮助抑制与断开连接相关的超时。\n\
    \n> **提示** 作为在锁表中保留 `LockGrantedDate` 的替代方案，你可以将该列建模为 `LockExpirationDate`。通过让调用方在获取锁时请求最大持续时间，而不是被迫采用标准的过期间隔，这可能会提高系统的灵活性。当然，这有其缺点：用户可能会请求不切实际的长时间锁。如果你实施此类解决方案，请仔细监控使用情况，以确保这不会成为问题。\n\
    \n在写入时强制实施悲观锁\n"
- fmt: "# A Problem with Pessimistic Concurrency Solutions and a Proposed Technique\n\
    \nA problem with the solution proposed previously, and other programmatic pessimistic\
    \ concurrency schemes, is the fact that the lock is generally not enforced outside\
    \ of the application code. While that’s fine in many cases, it is important to\
    \ make sure that every data consumer follows the same set of rules with regard\
    \ to taking and releasing locks. These locks do not prevent data modification,\
    \ but rather only serve as a means by which to tell calling apps whether they\
    \ are allowed to modify data. If an application is not coded with the correct\
    \ logic, violation of core data rules may result.\n\nIt may be possible to avoid\
    \ some or all of these types of problems by double-checking locks using triggers\
    \ at write time, but this can be difficult to implement because you may not be\
    \ able to tell which user has taken which lock for a given row, let alone make\
    \ a determination about which user is doing a particular update, especially if\
    \ your application uses only a single database login.\n\nI have come up with a\
    \ technique that can help get around some of these issues. To begin with, a new\
    \ candidate key should be added to the `CustomerLocks` table, based on the `CustomerId`\
    \ and `LockToken` columns:\n\n```sql\nALTER TABLE CustomerLocks\nADD CONSTRAINT\
    \ UN_Customer_Token\nUNIQUE (CustomerId, LockToken);\nGO\n```\n\nThis key can\
    \ then be used as a reference in the `Customers` table once a `LockToken` column\
    \ is added there:\n\n```sql\nALTER TABLE Customers\nADD\nLockToken uniqueidentifier\
    \ NULL,\nCONSTRAINT FK_CustomerLocks\nFOREIGN KEY (CustomerId, LockToken)\nREFERENCES\
    \ CustomerLocks (CustomerId, LockToken);\nGO\n```\n\nSince the `LockToken` column\
    \ in the `Customers` table is nullable, it is not required to reference a valid\
    \ token at all times. However, when it is actually set to a certain value, that\
    \ value must exist in the `CustomerLocks` table, and the combination of customer\
    \ ID and token in the `Customers` table must coincide with the same combination\
    \ in the `CustomerLocks` table.\n\nOnce this is set up, enforcing the lock at\
    \ write time, for all writers, can be done using a trigger:\n\n```sql\nCREATE\
    \ TRIGGER tg_EnforceCustomerLocks\nON Customers\nFOR UPDATE\nAS\nBEGIN\n    SET\
    \ NOCOUNT ON;\n\n    IF EXISTS\n    (\n        SELECT *\n        FROM inserted\n\
    \        WHERE LockToken IS NULL\n    )\n    BEGIN\n        RAISERROR('LockToken\
    \ is a required column', 16, 1);\n        ROLLBACK;\n    END\n\n    UPDATE Customers\n\
    \    SET LockToken = NULL\n    WHERE\n        LockToken IN\n        (\n      \
    \      SELECT LockToken\n            FROM inserted\n        );\nEND\nGO\n```\n\
    \nThe foreign key constraint enforces that any non-NULL value assigned to the\
    \ `LockToken` column must be valid. However, it does not enforce NULL values;\
    \ the trigger takes care of that, forcing writers to set the lock token at write\
    \ time. If all rows qualify, the tokens are updated back to NULL so that the locks\
    \ can be released—holding a reference would mean that the rows could not be deleted\
    \ from the `CustomerLocks` table.\n\nThis technique adds a bit of overhead to\
    \ updates, as each row must be updated twice. If your application processes a\
    \ large number of transactions each day, make sure to test carefully in order\
    \ to ensure that this does not cause a performance issue.\n\n# Application Locks:\
    \ Generalizing Pessimistic Concurrency\n\nThe example shown in the previous section\
    \ can be used to pessimistically lock rows, but it requires some setup per entity\
    \ type to be locked and cannot easily be generalized to locking of resources that\
    \ span multiple rows, tables, or other levels of granularity supported within\
    \ a SQL Server database.\n\nRecognizing the need for this kind of locking construct,\
    \ Microsoft included a feature in SQL Server called application locks. Application\
    \ locks are programmatic, named locks, which behave much like other types of locks\
    \ in the database: within the scope of a session or a transaction, a caller attempting\
    \ to acquire an incompatible lock with a lock already held by another caller causes\
    \ blocking and queuing.\n\nApplication locks are acquired using the `sp_getapplock`\
    \ stored procedure. By default, the lock is tied to an active transaction, meaning\
    \ that ending the transaction releases the lock. There is also an option to tie\
    \ the lock to a session, meaning that the lock is released when the user disconnects.\
    \ To set a transactional lock, begin a transaction and request a lock name (resource,\
    \ in application lock parlance).\n\nYou can also specify a lock mode, such as\
    \ shared or exclusive. A caller can also set a wait timeout period, after which\
    \ the stored procedure will stop waiting for other callers to release the lock.\
    \ The following TSQL acquires an exclusive transactional lock on the `customers`\
    \ resource, waiting up to 2 seconds for other callers to release any locks they\
    \ hold on the resource:\n\n```sql\nBEGIN TRAN;\nEXEC sp_getapplock\n    @Resource\
    \ = 'customers',\n    @LockMode = 'exclusive',\n    @LockTimeout = 2000;\n```\n\
    \n`sp_getapplock` does not throw an exception if the lock is not successfully\
    \ acquired, but rather sets a return value. The return will be 0 if the lock was\
    \ successfully acquired without waiting, 1 if the lock was acquired after some\
    \ wait period had elapsed, and any of a number of negative values if the lock\
    \ was not successfully acquired. As a consumer of `sp_getapplock`, it’s important\
    \ to know whether or not you actually acquired the lock you asked for—so the preceding\
    \ example call is actually incomplete. The following call checks the return value\
    \ to find out whether the lock was granted:\n\n```sql\nBEGIN TRAN;\nDECLARE @ReturnValue\
    \ int;\nEXEC @ReturnValue = sp_getapplock\n    @Resource = 'customers',\n    @LockMode\
    \ = 'exclusive',\n    @LockTimeout = 2000;\n\nIF @ReturnValue IN (0, 1)\n    PRINT\
    \ 'Lock granted';\nELSE\n    PRINT 'Lock not granted';\n```\n\nTo release the\
    \ lock, you can commit or roll back the active transaction, or use the `sp_releaseapplock`\
    \ stored procedure, which takes the lock resource name as its input value:\n\n\
    ```sql\nEXEC sp_releaseapplock\n    @Resource = 'customers';\n```\n\nSQL Server’s\
    \ application locks are quite useful in many scenarios, but they suffer from the\
    \ same problems mentioned previously concerning the discrepancy between concurrency\
    \ models offered by SQL Server and what the business might actually require. Application\
    \ locks are held only for the duration of a transaction or a session, meaning\
    \ that to lock a resource and perform a long-running business transaction based\
    \ on the lock, the caller would have to hold open a connection to the database\
    \ the entire time. This is clearly not a scalable option, so I set out to write\
    \ a replacement, nontransactional application lock framework.\n\nMy goal was to\
    \ mimic most of the behavior of `sp_getapplock`, but for exclusive locks only—pessimistic\
    \ locking schemes do not generally require shared locks on resources. I especially\
    \ wanted callers to be able to queue and wait for locks to be released by other\
    \ resources. Since this would not be a transactional lock, I also wanted to handle\
    \ all of the caveats I’ve discussed in this section, including making sure that\
    \ multiple callers requesting locks at the same time would not each think they’d\
    \ been granted the lock, returning tokens to avoid invalid lock release scenarios,\
    \ and adding lock timeout periods to ensure that orphaned locks would not be stranded\
    \ until an admin removed them.\n\nWhen considering the SQL Server 2008 features\
    \ that would help me create this functionality, I immediately thought of Service\
    \ Broker. Service Broker provides asynchronous queuing that can cross transactional\
    \ and session boundaries, and the `WAITFOR` command allows callers to wait on\
    \ a message without having to continually poll the queue.\n\n> **Note** For a\
    \ thorough background on SQL Server Service Broker, see *Pro SQL Server 2008 Service\
    \ Broker*, by Klaus Aschenbrenner (Apress, 2008).\n\nThe architecture I developed\
    \ to solve this problem begins with a central table used to keep track of which\
    \ locks have been taken:\n\n```sql\nCREATE TABLE AppLocks\n(\n```"
