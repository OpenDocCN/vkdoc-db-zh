    ```sql

    DECLARE @TopLeft geography = geography::Point(41, -109, 4326);

    DECLARE @BotRight geography = geography::Point(37, -102, 4326);

    DECLARE @BoundingBox geography;

    SET @BoundingBox = geography::STPolyFromText(''POLYGON((''

