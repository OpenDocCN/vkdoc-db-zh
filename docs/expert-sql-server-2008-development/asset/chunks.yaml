    a breakpoint inside of the function and starting a debug session in Visual Studio).
    The reason that the breakpoint can’t be hit is that the permissions check was
    performed and the exception thrown immediately after just-in-time compilation.


    You should also note that the wording of the exception has a different tone than
    in the previous case. The wording of the CAS exception is a rather benign “Request
    for the permission ... failed.” On the other hand, the HPA exception carries a
    much sterner warning: “Attempted to perform an operation that was *forbidden*.”
    This difference in wording is not accidental. CAS grants are concerned with security—to
    keep code from being able to access something protected because it’s not supposed
    to have access. HPA permissions, on the other hand, are concerned with server
