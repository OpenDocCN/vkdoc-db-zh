  trans: "\n调用者可能指定了 `2500ms` 的等待时间，但实际上只等待事务锁 `2000ms`。此时，调用者应仅被允许再等待最多 `500ms` 以接收队列中的消息。因此，缩减后的超时时间被用作\
    \ `WAITFOR` 命令的 `RECEIVE` 超时。\n\n接下来，该过程检查接收到的消息类型。如果它是 `AppLockGrant` 消息，则一切顺利——锁已成功获取。超时对话被启动，锁令牌被设置。如果接收到意外的消息类型，则抛出异常并回滚事务：\n\
    \n```sql\nIF @message_type = 'AppLockGrant'\nBEGIN\n    BEGIN DIALOG CONVERSATION\
    \ @AppLockKey\n        FROM SERVICE AppLockTimeout_Service\n        TO SERVICE\
    \ 'AppLockTimeout_Service'\n        WITH\n            LIFETIME = @LOCK_TIMEOUT_LIFETIME,\n\
    \            ENCRYPTION = OFF;\n\n    UPDATE AppLocks\n    SET\n        AppLockKey\
    \ = @AppLockKey,\n        LastGrantedDate = GETDATE()\n    WHERE\n        AppLockName\
    \ = @AppLockName;\nEND\nELSE IF @message_type IS NOT NULL\nBEGIN\n    RAISERROR('Unexpected\
    \ message type: %s', 16, 1, @message_type);\n    ROLLBACK;\nEND\n```\n\n第 9 章\
    \ „ 设计应用并发系统\n\n下一段代码处理进入 `IF` 块之前获取的目标句柄为 `NULL` 的分支情况，这意味着之前从未有人请求过此资源的锁。\n\n\
    此分支做的第一件事是在 `AppLock_Service` 服务上开始一个对话。由于其他调用者需要目标对话句柄来等待资源，并且目标句柄直到发送消息后才会生成，所以必须做的第一件事就是在对话上发送一条消息。\n\
    \n消息发送后，从 `sys.conversation_endpoints` 目录视图中获取目标句柄，并获取已发送的消息，以便其他调用者无法接收它：\n\n\
    ```sql\nELSE\nBEGIN\n    -- No one has requested this lock before\n    BEGIN DIALOG\
    \ @init_handle\n        FROM SERVICE AppLock_Service\n        TO SERVICE 'AppLock_Service'\n\
    \        ON CONTRACT AppLockContract\n        WITH ENCRYPTION = OFF;\n\n    --\
    \ Send a throwaway message to start the dialog on both ends\n    SEND ON CONVERSATION\
    \ @init_handle\n        MESSAGE TYPE AppLockGrant;\n\n    -- Get the remote handle\n\
    \    SELECT\n        @target_handle = ce2.conversation_handle\n    FROM sys.conversation_endpoints\
    \ ce1\n    JOIN sys.conversation_endpoints ce2 ON\n        ce1.conversation_id\
    \ = ce2.conversation_id\n    WHERE\n        ce1.conversation_handle = @init_handle\n\
    \        AND ce2.is_initiator = 0;\n\n    -- Receive the throwaway message\n \
    \   RECEIVE\n        @target_handle = conversation_handle\n    FROM AppLock_Queue\n\
    \    WHERE conversation_handle = @target_handle;\n```\n\n第 „ 章 „ 设计应用并发系统\n\n\
    启动锁授予对话并初始化目标对话句柄后，最终可以启动超时/令牌对话并将锁插入 `AppLocks` 表。处理完毕后，存储过程检查 `@AppLockKey`\
    \ 变量是否已填充。如果已填充，则提交事务。否则，假定发生了超时，并回滚所有工作。\n\n```sql\n    BEGIN DIALOG CONVERSATION\
    \ @AppLockKey\n        FROM SERVICE AppLockTimeout_Service\n        TO SERVICE\
    \ 'AppLockTimeout_Service'\n        WITH\n            LIFETIME = @LOCK_TIMEOUT_LIFETIME,\n\
    \            ENCRYPTION = OFF;\n\n    INSERT INTO AppLocks\n        (\n      \
    \      AppLockName,\n            AppLockKey,\n            InitiatorDialogHandle,\n\
    \            TargetDialogHandle\n        )\n    VALUES\n        (\n          \
    \  @AppLockName,\n            @AppLockKey,\n            @init_handle,\n      \
    \      @target_handle\n        );\nEND\n\nIF @AppLockKey IS NOT NULL\n    COMMIT;\n\
    ELSE\nBEGIN\n    RAISERROR(\n        'Timed out waiting for lock on resource:\
    \ %s', 16, 1, @AppLockName);\n    ROLLBACK;\nEND\nEND;\nGO\n```\n\n设置这些锁所需的大部分工作都是在\
    \ `GetAppLock` 存储过程中完成的。\n\n幸运的是，配套的 `ReleaseAppLock` 过程要简单得多：\n\n```sql\nCREATE\
    \ PROC ReleaseAppLock\n    @AppLockKey uniqueidentifier\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n    SET XACT_ABORT ON;\n    BEGIN TRAN;\n\n    DECLARE @dialog_handle uniqueidentifier;\n\
    \n    UPDATE AppLocks\n    SET\n        AppLockKey = NULL,\n        @dialog_handle\
    \ = InitiatorDialogHandle\n    WHERE\n        AppLockKey = @AppLockKey;\n\n  \
    \  IF @@ROWCOUNT = 0\n    BEGIN\n        RAISERROR('AppLockKey not found', 16,\
    \ 1);\n        ROLLBACK;\n    END\n\n    END CONVERSATION @AppLockKey;\n\n   \
    \ -- Allow another caller to acquire the lock\n```\n\n第 9 章 „ 设计应用并发系统\n"
- fmt: "# 第9章 设计应用并发系统\n\n## 应用锁的实现\n\n以下T-SQL代码片段展示了通过服务中介发送消息并提交对话的过程。\n\n```sql\n\
    SEND ON CONVERSATION @dialog_handle\nMESSAGE TYPE AppLockGrant;\nCOMMIT;\nEND;\n\
    GO\n```\n\n调用方将获取的锁令牌发送给此过程，该过程首先尝试在 `AppLocks` 表中将其值置为空。如果未找到该令牌，则引发错误并回滚事务。否则，与该令牌关联的对话将被终止。最后，也是最重要的，一条\
    \ `AppLockGrant` 消息被发送到与锁关联的授权对话上。此消息将被任何其他等待该锁的进程接收，从而授予该锁。\n\n还需要一个最终的存储过程来支持此基础设施：一个激活存储过程，用于处理\
    \ `AppLockTimeout_Queue` 队列上的对话生命周期到期情况。以下 T-SQL 创建了该过程并启用了队列上的激活功能：\n\n```sql\n\
    CREATE PROC AppLockTimeout_Activation\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET\
    \ XACT_ABORT ON;\n\n    DECLARE @dialog_handle uniqueidentifier;\n\n    WHILE\
    \ 1=1\n    BEGIN\n        SET @dialog_handle = NULL;\n        BEGIN TRAN;\n  \
    \      WAITFOR\n        (\n            RECEIVE @dialog_handle = conversation_handle\n\
    \            FROM AppLockTimeout_Queue\n        ), TIMEOUT 10000;\n\n        IF\
    \ @dialog_handle IS NOT NULL\n        BEGIN\n            EXEC ReleaseAppLock @AppLockKey\
    \ = @dialog_handle;\n        END\n        COMMIT;\n    END\nEND;\nGO\n\nALTER\
    \ QUEUE AppLockTimeout_Queue\nWITH ACTIVATION\n(\n    STATUS = ON,\n    PROCEDURE_NAME\
    \ = AppLockTimeout_Activation,\n    MAX_QUEUE_READERS = 1,\n    EXECUTE AS OWNER\n\
    );\nGO\n```\n\n此过程在其循环的每次迭代中，等待长达 10 秒以获取队列中的消息。由于除了超时通知外预计不会有其他消息，因此接收到的任何消息都被假定为超时通知，并触发对\
    \ `ReleaseAppLock` 存储过程的调用。如果在 10 秒内未收到消息，激活过程将退出。\n\n一旦此系统就位，即可使用 `GetAppLock`\
    \ 存储过程请求应用锁，如下例所示：\n\n```sql\nDECLARE @AppLockKey uniqueidentifier;\nEXEC GetAppLock\n\
    \    @AppLockName = 'customers',\n    @LockTimeout = 2000,\n    @AppLockKey =\
    \ @AppLockKey OUTPUT;\nGO\n```\n\n在此示例中，存储过程将最多等待 2 秒让资源变为可用，然后返回错误。与其他悲观方案一样，应用程序必须妥善保存返回的密钥，以便稍后使用\
    \ `ReleaseAppLock` 存储过程释放锁。\n\n请注意，对此锁方法的持续维护与行级悲观锁描述的方法有些不同。锁被请求一次后，其在 `AppLocks`\
    \ 表中的行及其关联的授权对话将不会过期。我设计系统时考虑了这一点，以最小化在使用和重用大量锁的系统中设置和拆解大量对话的开销，但由于此架构，对话数量可能会随时间变得相当大。如果这成为问题，请使用\
    \ `LastGrantedDate` 列查找最近未请求的锁，并对发起方和目标句柄都调用 `END CONVERSATION`。\n\n## 乐观并发：期望最好的结果\n\
    \n与悲观并发解决方案的复杂性和开销相比，乐观方案感觉是一个绝妙的替代方案。确实，即使是“乐观”这个词也唤起了更好的感觉，这个名称也非常适合该方法论。乐观方案在读取或编辑时不使用任何锁，而是在数据实际写入表之前才检查冲突。这意味着没有管理孤儿锁或其他可能出现在悲观锁中的问题的开销，但也意味着该系统可能不适用于许多业务场景。\n\
    \n考虑“为最坏情况做准备：悲观并发”一节中描述的人寿保险公司。对于该公司来说，乐观方案意味着损失许多时间和金钱——这不是个好主意。然而，假设该公司有一个新项目：这次，公司不是要更新多年冗长的个人信息表单，而是只需将一些地址变更卡输入系统。与个人信息表单一样，这些卡片也没有得到保险公司员工的良好管理，并且存在一些重复。幸运的是，这些卡片是使用一个更新的系统归档的，数据重复不像个人信息表单那样严重。\n\
    \n在此场景中，悲观方案相关的管理开销可能不必要。碰撞的可能性远低于个人信息表单场景，如果操作员的输入恰好与另一个操作员碰撞，也只会损失几分钟的工作，而不是潜在的几个小时。\n\
    \n乐观并发的基本设置需要一个在行更新时也随之更新的列。此列用作版本标记，由客户端与其余数据一起检索。\n\n在更新时，检索到的值与更新一起发回，并检查其值以确保数据在读取时和更新时之间未更改。\n\
    \n实现此列有几种不同的选择，但首先我将讨论一个流行选项：SQL Server 的 `rowversion` 类型。`rowversion` 类型是一个 8\
    \ 字节的二进制字符串，每当表中的一行更新时，SQL Server 会自动更新它。例如，考虑以下表：\n\n```sql\nCREATE TABLE CustomerNames\n\
    (\n    CustomerId int NOT NULL PRIMARY KEY,\n    CustomerName varchar(50) NOT\
    \ NULL,\n    Version rowversion NOT NULL\n);\nGO\n```\n\n以下 T-SQL 插入两行，然后从表中检索所有行：\n\
    \n```sql\nINSERT INTO CustomerNames\n(\n    CustomerId,\n    CustomerName\n)\n\
    VALUES\n(123, 'Mickey Mouse'),\n(456, 'Minnie Mouse');\nGO\n\nSELECT *\nFROM CustomerNames;\n\
    GO\n```\n\n此查询的输出如下：\n\n| CustomerId | CustomerName | Version        |\n|------------|--------------|----------------|\n\
    | 123        | Mickey Mouse | 0x00000000000007E3 |\n| 456        | Minnie Mouse\
    \ | 0x00000000000007E4 |\n\n更新任何行都会自动更新 `rowversion` 列。以下 T-SQL 更新其中一行，然后检索表中的所有行：\n\
    \n```sql\nUPDATE CustomerNames\nSET CustomerName = 'Pluto'\nWHERE CustomerId =\
    \ 456;\nGO\n\nSELECT *\nFROM CustomerNames;\nGO\n```\n\n此查询的输出显示表中的值现在如下：\n\n\
    | CustomerId | CustomerName | Version        |\n|------------|--------------|----------------|\n\
    | 123        | Mickey Mouse | 0x00000000000007E3 |\n| 456        | Pluto     \
    \   | 0x00000000000007E5 |\n\n重要的是要注意，表上任何已提交的更新操作都会导致 `Version` 列被更新——即使您用相同的值更新列。不要假设版本跟踪的是数据的更改；相反，它跟踪的是对行的操作。\n\
    \n使用这样的列来支持乐观方案非常直接。一个有效的初步做法是在读取时将 `Version` 列与行中的其余数据一起取回，并在写入时检查它：\n\n```sql\n\
    DECLARE\n    @CustomerIdToUpdate int = 456,\n    @Version rowversion;\n\nSET @Version\
    \ =\n    (SELECT Version\n     FROM CustomerNames\n     WHERE CustomerId = @CustomerIdToUpdate);\n\
    \nUPDATE CustomerNames\nSET CustomerName = 'Pluto'\nWHERE\n    CustomerId = @CustomerIdToUpdate\n\
    \    AND Version = @Version;\n\nIF @@ROWCOUNT = 0\n    RAISERROR('Version conflict\
    \ encountered', 16, 1);\n```"
  raw: 'SEND ON CONVERSATION @dialog_handle


    MESSAGE TYPE AppLockGrant;


    COMMIT;


    END;


    GO


    The caller sends the acquired lock’s token to this procedure, which first tries
    to nullify its value in the AppLocks table. If the token is not found, an error
    is raised and the transaction rolled back. Otherwise, the conversation associated
    with the token is ended. Finally—and most importantly—an AppLockGrant message
    is sent on the grant conversation associated with the lock. This message will
    be picked up by any other process waiting for the lock, thereby granting it.


    One final stored procedure is required to support this infrastructure: an activation
    stored procedure that is used in case of dialog lifetime expirations on the AppLockTimeout_Queue
    queue. The following TSQL creates the procedure and enables activation on the
    queue:


    CREATE PROC AppLockTimeout_Activation


    AS


    BEGIN


    SET NOCOUNT ON;


    SET XACT_ABORT ON;


    DECLARE @dialog_handle uniqueidentifier;


    WHILE 1=1


    BEGIN


    SET @dialog_handle = NULL;


    BEGIN TRAN;


    WAITFOR


    (


    RECEIVE @dialog_handle = conversation_handle


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    FROM AppLockTimeout_Queue


    ), TIMEOUT 10000;


    IF @dialog_handle IS NOT NULL


    BEGIN


    EXEC ReleaseAppLock @AppLockKey = @dialog_handle;


    END


    COMMIT;


    END


    END;


    GO


    ALTER QUEUE AppLockTimeout_Queue


    WITH ACTIVATION


    (


    STATUS = ON,


    PROCEDURE_NAME = AppLockTimeout_Activation,


    MAX_QUEUE_READERS = 1,


    EXECUTE AS OWNER


    );


    GO


    This procedure waits, on each iteration of its loop, up to 10 seconds for a message
    to appear on the queue. Since no messages are expected other than timeout notifications,
    any message received is assumed to be one, and spawns a call to the ReleaseAppLock
    stored procedure. If no message is received within 10 seconds, the activation
    procedure exits.


    Once this system is in place, application locks can be requested using the GetAppLock
    stored procedure, as in the following example:


    DECLARE @AppLockKey uniqueidentifier


    EXEC GetAppLock


    @AppLockName = ''customers'',


    @LockTimeout = 2000,


    @AppLockKey = @AppLockKey OUTPUT;


    GO


    In this example, the stored procedure will wait up to 2 seconds for the resource
    to become available before returning an error. Just as with other pessimistic
    schemes, it’s important for the application to keep the returned key in order
    to release the lock later, using the ReleaseAppLock stored procedure.


    Note that ongoing maintenance of this approach to locks is somewhat different
    from the method described for row-based pessimistic locks. After a lock has been
    requested once, its row in the AppLocks table as well as its associated grant
    dialog will not expire. I designed the system this way in order to minimize setup
    and break down a large number of dialogs in a system using and reusing a lot of
    locks, but it is possible that due to this architecture, the number of dialogs
    could get quite large over time. If this should become an issue, use the LastGrantedDate
    column to find locks that have not been recently requested, and call END CONVERSATION
    for both the initiator and target handles.


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    Hoping for the Best: Optimistic Concurrency


    Compared with the complexity and overhead of pessimistic concurrency solutions,
    optimistic schemes feel like a wonderful alternative. Indeed, even the word *optimistic*
    evokes a much nicer feeling, and the name is quite appropriate to the methodology.
    Optimistic schemes use no read-time or edit-time locks, instead only checking
    for conflicts just before the data is actually written to the table. This means
    none of the administrative overhead of worrying about orphans and other issues
    that can occur with pessimistic locks, but it also means that the system may not
    be as appropriate to many business situations.


    Consider the life insurance firm described in the section “Preparing for the Worst:
    Pessimistic Concurrency.” For that firm, an optimistic scheme would mean many
    hours of lost time and money—


    not a good idea. However, suppose that the firm had a new project: this time,
    instead of updating many years’ worth of lengthy personal information forms, the
    firm merely wants some address change cards input into the system. Just like with
    the personal information forms, these cards have not been well managed by the
    employees of the insurance firm, and there is some duplication. Luckily, however,
    the cards were filed using a much newer system, and the repetition of data is
    not nearly as serious as it was for the personal information forms.


    In this scenario, the management overhead associated with a pessimistic scheme
    is probably not warranted. The chance for collision is much lower than in the
    personal information form scenario, and should an operator’s input happen to collide
    with another’s, it will only cost a few minutes’ worth of lost work, instead of
    potentially hours.


    The basic setup for optimistic concurrency requires a column that is updated whenever
    a row gets updated. This column is used as a version marker and retrieved along
    with the rest of the data by clients.


    At update time, the retrieved value is sent back along with updates, and its value
    is checked to ensure that it did not change between the time the data was read
    and the time of the update.


    There are a few different choices for implementing this column, but to begin with
    I’ll discuss a popular option: SQL Server’s rowversion type. The rowversion type
    is an 8-byte binary string that is automatically updated by SQL Server every time
    a row is updated in the table. For example, consider the following table:


    CREATE TABLE CustomerNames


    (


    CustomerId int NOT NULL PRIMARY KEY,


    CustomerName varchar(50) NOT NULL,


    Version rowversion NOT NULL


    );


    GO


    The following T-SQL inserts two rows and then retrieves all rows from the table:


    INSERT INTO CustomerNames


    (


    CustomerId,


    CustomerName


    )


    VALUES


    (123, ''Mickey Mouse''),


    (456, ''Minnie Mouse'');


    GO


    CHAPTER


    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    SELECT *


    FROM CustomerNames;


    GO


    The output of this query is as follows:


    CustomerId CustomerName Version


    123 Mickey Mouse 0x00000000000007E3


    456 Minnie Mouse 0x00000000000007E4


    Updating either row automatically updates the rowversion column. The following
    T-SQL updates one of the rows and then retrieves all of the rows in the table:


    UPDATE CustomerNames


    SET CustomerName = ''Pluto''


    WHERE CustomerId = 456;


    GO


    SELECT *


    FROM CustomerNames;


    GO


    The output of this query reveals the values in the table to be now as follows:


    CustomerId CustomerName Version


    123 Mickey Mouse 0x00000000000007E3


    456 Pluto 0x00000000000007E5


    It’s important to note that any committed update operation on the table will cause
    the Version column to get updated—even if you update a column with the same value.
    Do not assume that the version is tracking changes to the data; instead, it’s
    tracking actions on the row.


    Using a column such as this to support an optimistic scheme is quite straightforward.
    An effective first pass involves pulling back the Version column along with the
    rest of the data in the row when reading, and checking it at write time:


    DECLARE


    @CustomerIdToUpdate int = 456,


    @Version rowversion;


    SET @Version =


    (SELECT Version


    FROM CustomerNames


    WHERE CustomerId = @CustomerIdToUpdate);


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    UPDATE CustomerNames


    SET CustomerName = ''Pluto''


    WHERE


    CustomerId = @CustomerIdToUpdate


    AND Version = @Version;


    IF @@ROWCOUNT = 0


    RAISERROR(‘Version conflict encountered’, 16, 1);'
