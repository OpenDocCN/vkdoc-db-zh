    \n```\ngroup_name    SQL                                          scheduler_id\
    \    cpu_id    status\n------------  -------------------------------------------\
    \  --------------  --------  -------\nGroupA        WHILE(1=1) SELECT REPLICATE('a'...\
    \           0               0         running\nGroupB        WHILE(1=1) SELECT\
    \ REPLICATE('b'...           1               1         runnable\n```\n\n由于每个查询都在单独的调度程序上执行，因此再次没有对\
    \ CPU 资源的争用，所以 `MAX_CPU_PERCENT` 限制未被强制执行。\n\n## 为了能够更清晰地展示资源调控器的效果，有必要通过设置关联掩码将\
    \ SQL Server 线程的执行限制在单个 CPU 上，如下所示：\n\n```sql\nsp_configure 'show advanced options',\
