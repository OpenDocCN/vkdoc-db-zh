    by SQL Server, and if used correctly can serve to strengthen protection of your
    data. However, it would be a gross mistake to believe that merely by enabling
    TDE your data will be protected. Although on the surface TDE appears to simplify
    the process of encryption, in practice it hides the complexity that is necessary
    to ensure a truly secure solution.


