    UPDATE CustomerNames


    SET CustomerName = ''Top Cat'',


    Version = @Version


    WHERE CustomerId = @CustomerId;


    GO


    Executing this code will produce output similar to that shown here:


    <customer_name_rows>


    <new_values>


    <customer_name row_number="1">


    <CustomerId>123</CustomerId>


    <CustomerName>Top Cat</CustomerName>


    <Version>10E83AAD-B966-4250-A66D-FE0085706F9E</Version>


    </customer_name>


    </new_values>


    <old_values>


    <customer_name row_number="1">


    <CustomerId>123</CustomerId>


    <CustomerName>Popeye</CustomerName>


    <Version>DDEDE0D4-44FE-42EA-B605-7431098D8A24</Version>


    </customer_name>


    </old_values>


    </customer_name_rows>


    CHAPTER 9 „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    Although this doesn’t exactly write the merge routine for you, I find that the
    XML format is very easy to work with when it comes to doing these kinds of operations.


    Since the document contains the newer version value that caused the conflict,
    you can let the end user perform a merge or choose to override the other user’s
    change without having to go back to the database to get the new rows a second
    time.


    **A Note on Triggers and Performance**


    Throughout the previous two sections, update triggers were employed as a mechanism
    by which to control workflows around locking. Triggers are a great tool because
    the caller has no control over them—they will fire on any update to the table,
    regardless of whether it was made in a stored procedure or an ad hoc batch, and
    regardless of whether the caller has bothered to follow the locking rules. Unfortunately,
    triggers also cause problems: most notably, they can have an acute effect on performance.


    The major performance problems caused by triggers generally result from lengthened
    transactions and the resultant blocking that can occur when low-granularity locks
    are held for a long period. In the case of these triggers, that’s not much of
    an issue since they use the same rows that were already locked anyway by the updates
    themselves. However, these triggers will slow down updates a bit. In SQL Server
    2008, the inserted and deleted tables are actually hidden temporary tables; the
    population of these tables does not come for free—the data must be transferred
    into TempDB. In addition, each of these triggers incurs additional index operations
    against the base table that are not necessary for a simple update.


    In my testing, I’ve found that these triggers slow down updates by a factor of
    2\. However, that’s generally the difference between a few milliseconds and a
    few more milliseconds—certainly not a big deal, especially given the value that
    they bring to the application. It’s worth testing to make sure that these triggers
    don’t cause severe performance issues for your application, but at the same time
    remember that nothing is free—and if it’s a question of data integrity vs. performance,
    I personally would always choose the former.


    Embracing Conflict: Multivalue Concurrency Control


    While optimistic and pessimistic concurrency are focused on enabling long-running
    business processes to work together without mangling data that happens to be getting
    modified concurrently, MVCC is based around the idea that performance is king.'
  trans: "# 第 „ 章 设计支持应用并发的系统\n\n```sql\nSET Version = NEWID()\nWHERE\nCustomerId\
    \ IN\n(\n    SELECT CustomerId\n    FROM inserted\n);\nEND;\nGO\n```\n\n进行此修改后，让我们尝试用无效的版本值更新表，如下面的\
    \ T-SQL 所示：\n\n```sql\nDECLARE\n    @CustomerId int = 123,\n    @Version uniqueidentifier;\n\
    \n-- Retrieve the current version value\nSELECT @Version = Version\nFROM CustomerNames\n\
    WHERE CustomerId = @CustomerId;\n\n-- Do something with the retrieved data here\n\
    \n-- Meanwhile, something else updates the version number\nUPDATE CustomerNames\n\
    SET CustomerName = 'Popeye',\n    Version = @Version\nWHERE CustomerId = @CustomerId;\n\
    \n-- Now try to write the changes back to the table\nUPDATE CustomerNames\nSET\
    \ CustomerName = 'Top Cat',\n    Version = @Version\nWHERE CustomerId = @CustomerId;\n\
    GO\n```\n\n执行此代码将产生类似如下所示的输出：\n\n```xml\n<customer_name_rows>\n    <new_values>\n\
    \        <customer_name row_number=\"1\">\n            <CustomerId>123</CustomerId>\n\
    \            <CustomerName>Top Cat</CustomerName>\n            <Version>10E83AAD-B966-4250-A66D-FE0085706F9E</Version>\n\
    \        </customer_name>\n    </new_values>\n    <old_values>\n        <customer_name\
    \ row_number=\"1\">\n            <CustomerId>123</CustomerId>\n            <CustomerName>Popeye</CustomerName>\n\
    \            <Version>DDEDE0D4-44FE-42EA-B605-7431098D8A24</Version>\n       \
    \ </customer_name>\n    </old_values>\n</customer_name_rows>\n```\n\n# 第 9 章 „\
    \ 设计支持应用并发的系统\n\n虽然这并不完全是为你编写合并例程，但我发现 XML 格式在处理这类操作时非常方便。由于该文档包含了引发冲突的较新版本值，你可以让最终用户执行合并，或者选择覆盖其他用户的更改，而无需再次返回数据库获取新行。\n\
    \n## 关于触发器与性能的说明\n\n在前两节中，更新触发器被用作控制围绕锁定的工作流的机制。触发器是一个很好的工具，因为调用者无法控制它们——无论更新是发生在存储过程中还是临时批处理中，也无论调用者是否遵循了锁定规则，触发器都会在表发生任何更新时触发。不幸的是，触发器也会带来问题：最显著的是，它们可能对性能产生严重影响。\n\
    \n触发器引起的主要性能问题通常源于事务时间延长以及因此可能发生的阻塞，这是由于低粒度锁被长时间持有所致。就这些触发器而言，这并不算大问题，因为它们使用的是更新操作本身已经锁定的相同行。然而，这些触发器确实会使更新速度略微变慢。在\
    \ SQL Server 2008 中，`inserted` 和 `deleted` 表实际上是隐藏的临时表；填充这些表并非没有成本——数据必须被传输到 `TempDB`\
    \ 中。此外，每个这样的触发器都会对基表产生额外的索引操作，而这些操作对于简单的更新来说是不必要的。\n\n在我的测试中，我发现这些触发器会使更新速度降低大约一倍。然而，这通常是几毫秒和再多几毫秒之间的差别——当然不算大问题，特别是考虑到它们为应用程序带来的价值。值得进行测试以确保这些触发器不会对你的应用程序造成严重的性能问题，但同时要记住，天下没有免费的午餐——如果是在数据完整性与性能之间做选择，我个人总是会选择前者。\n\
    \n## 拥抱冲突：多版本并发控制\n\n乐观并发和悲观并发专注于使长时间运行的业务流程能够协同工作，而不会破坏恰好正在并发修改的数据，而 MVCC 则基于*性能为王*的理念。\n"
- fmt: "# CHAPTER 9 DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY\n\nMVCC is not concerned\
    \ with making sure you can’t overwrite someone else’s data, because in an MVCC\
    \ scheme there is no overwriting of data—period. Instead of updating existing\
    \ rows, every change is done as an insert. This means that there’s no reason to\
    \ check for data collisions; no data can get lost if nothing is being updated.\
    \ In an MVCC system, new rows are marked with a version number—generally a date/time\
    \ column or ascending key—so that newer versions can be readily identified and\
    \ queried by users.\n\nGenerally speaking, to benefit from MVCC, the cost of blocking\
    \ for a given set of transactions must outweigh all other resource costs, particularly\
    \ with regard to disk I/O. Since new versions of rows will be inserted as entirely\
    \ new rows, the potential for massive amounts of disk utilization is quite huge.\n\
    \nHowever, due to the fact that no updates are taking place, blocking becomes\
    \ almost nonexistent.\n\n## Illustrating Performance Gains with an Insert-Only\
    \ Architecture\n\nIllustrating the performance gains possible from an insert-only\
    \ architecture is fairly simple using a load tool. To begin with, create a table\
    \ and populate it with some sample data, as shown in the following T-SQL:\n\n\
    ```sql\nCREATE TABLE Test_Updates\n(\n    PK_Col int NOT NULL PRIMARY KEY,\n \
    \   Other_Col varchar(100) NOT NULL\n);\nGO\n\nINSERT INTO Test_Updates (\n  \
    \  PK_Col,\n    Other_Col\n)\nSELECT DISTINCT\n    Number,\n    'Original Value'\n\
    FROM master..spt_values\nWHERE number BETWEEN 1 AND 10;\n```\n\nNext, enter the\
    \ following code into a new query window:\n\n```sql\n-- Choose an abitrary row\
    \ to update\nDECLARE @PK_Col int = CEILING(RAND() * 10)\nBEGIN TRAN;\n-- Update\
    \ the table\nUPDATE Test_Updates\nSET Other_Col = 'new value set at ' + CAST(SYSDATETIME()\
    \ AS varchar(32))\nWHERE PK_Col = @PK_Col;\n-- Add a delay\nWAITFOR DELAY '00:00:00.25';\n\
    COMMIT;\n```\n\nThis code simulates an `UPDATE` followed by a quarter of a second\
    \ of other actions taking place in the same transaction. It doesn’t matter what\
    \ the other actions are; the important thing is that this is a somewhat long-running\
    \ transaction, and that the `UPDATE` will hold its locks for the duration of the\
    \ transaction, which is necessary in order to guarantee consistency of the updated\
    \ data.\n\n## Simulating a Concurrent Environment with ostress\n\nTo simulate\
    \ a concurrent environment, we will execute the preceding query simultaneously\
    \ across several parallel threads. To do this, we’ll use the `ostress` tool, which\
    \ is available as part of the Microsoft Replay Markup Language (RML) utilities\
    \ for SQL Server, downloadable from http://support.microsoft.com/default.aspx/kb/944837.\
    \ Before using the `ostress` tool, save the preceding query to a new file—I’ll\
    \ assume that you’ll save it as `c:\\update_test.sql`. To test the performance\
    \ of this query in a concurrent environment, open up the RML command prompt and\
    \ enter the following:\n\n```bash\nostress.exe -Slocalhost -dtempDB -i\"c:\\update_test.sql\"\
    \ -n25 -r100 -q\n```\n\nThis will execute the contents of the `update_test.sql`\
    \ file across 25 threads, each running the query 100 times. If necessary, you\
    \ should change the `ostress` parameters supplied as follows:\n\n*   `-S`: Server\
    \ name\n*   `-d`: Database name against which to execute the query\n*   `-U`:\
    \ Login ID (only required if not using Windows Authentication)\n*   `-P`: password\
    \ (only required if not using Windows Authentication)\n\nAfter execution, the\
    \ `ostress` tool reports the elapsed time on my system as 00:01:42.514.\n\n##\
    \ Comparing Performance with an Insert-Only Table\n\nTo compare this performance\
    \ with the relative performance of inserts in a highly concurrent scenario, create\
    \ a similar table to `Test_Updates`, this time designed to hold—and version—inserted\
    \ rows:\n\n```sql\nCREATE TABLE Test_Inserts\n(\n    PK_Col int NOT NULL,\n  \
    \  Other_Col varchar(100) NOT NULL,\n    Version int IDENTITY(1,1) NOT NULL,\n\
    \    PRIMARY KEY (PK_Col, Version)\n);\nGO\n```\n\nEdit the previous query so\
    \ that, rather than updating records, it inserts records into the new table as\
    \ follows:\n\n```sql\nDECLARE @PK_Col int = CEILING(RAND() * 10);\nBEGIN TRAN;\n\
    -- Insert the values into a new table\nINSERT INTO Test_Inserts (\n    PK_Col,\n\
    \    Other_Col\n)\nSELECT\n    @PK_Col,\n    'new value set at ' + CAST(SYSDATETIME()\
    \ AS varchar(32));\n-- Add a delay\nWAITFOR DELAY '00:00:00.25';\n```"
