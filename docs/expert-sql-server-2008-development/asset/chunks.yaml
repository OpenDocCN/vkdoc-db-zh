- fmt: "# CHAPTER 8: DYNAMIC T-SQL\n\n## 查询计划缓存与编译时间\n\n`DBCC FREEPROCCAPE;`\n\n`GO`\n\
    \n请记住，此命令会清除整个 SQL Server 实例的缓存——通常不建议在生产环境中这样做。然后，要查看查询在解析和编译阶段所花费的时间，可以打开 SQL\
    \ Server 的 `SET STATISTICS TIME` 选项，这会导致 SQL Server 输出有关解析/编译和执行所花费时间的信息性消息：\n\
    \n`SET STATISTICS TIME ON;`\n\n`GO`\n\n现在考虑以下 T-SQL，它查询 `AdventureWorks2008` 数据库中的\
    \ `HumanResources.Employee` 表：\n\n`Note`：从 SQL Server 2008 开始，SQL Server 不再附带任何示例数据库。要遵循本章中的代码清单，您需要从\
    \ CodePlex 网站（网址为 http://msftdbprodsamples.codeplex.com）下载并安装 `AdventureWorks2008`\
    \ 数据库。\n\n```sql\nSELECT *\nFROM HumanResources.Employee\nWHERE BusinessEntityId\
    \ IN (1, 2);\nGO\n```\n\n在我的系统上，在 SQL Server Management Studio 中首次运行此查询会产生以下输出消息：\n\
    \n```\nSQL Server parse and compile time:\n   CPU time = 0 ms, elapsed time =\
    \ 12 ms.\n(2 row(s) affected)\nSQL Server Execution Times:\n   CPU time = 0 ms,\
    \ elapsed time = 1 ms.\n```\n\n此查询花费了 12 毫秒进行解析和编译。但后续运行会产生以下输出，表明正在使用缓存的计划：\n\
    \n```\nSQL Server parse and compile time:\n   CPU time = 0 ms, elapsed time =\
    \ 1 ms.\n(2 row(s) affected)\nSQL Server Execution Times:\n   CPU time = 0 ms,\
    \ elapsed time = 1 ms.\n```\n\n由于缓存计划的存在，查询的每次后续调用比第一次调用少花费 11 毫秒——考虑到实际执行时间小于\
    \ 1 毫秒（时间统计报告的最低经过时间），这已经很不错了。\n\n## 自动参数化\n\n解析过程的一个重要部分（在某些情况下使查询计划缓存更高效）涉及确定查询的哪些部分符合参数的条件。如果\
    \ SQL Server 确定查询中使用的一个或多个字面量是参数，并且可能在将来对类似版本查询的调用中更改，它可以`auto-parameterize`该查询。为了理解这意味着什么，让我们首先通过\
    \ `sys.dm_exec_cached_plans` 动态管理视图和 `sys.dm_exec_sql_text` 函数查看查询计划缓存的内容。以下查询查找所有包含字符串\
    \ “HumanResources” 的缓存查询，排除那些包含 `sys.dm_exec_cached_plans` 视图名称本身的查询——第二个谓词是必要的，这样结果中就不会包含此查询本身的计划。\n\
    \n```sql\nSELECT\n   cp.objtype,\n   st.text\nFROM sys.dm_exec_cached_plans cp\n\
    CROSS APPLY sys.dm_exec_sql_text(cp.plan_handle) st\nWHERE\n   st.text LIKE '%HumanResources%'\n\
    \   AND st.text NOT LIKE '%sys.dm_exec_cached_plans%';\nGO\n```\n\n`Note`：我将在本节中多次重用此代码来检查不同类型的查询的计划缓存，因此您可能希望将其在单独的\
    \ Management Studio 选项卡中打开。\n\n在对 `HumanResources.Employee` 执行前面的查询后运行此代码清单，会得到以下结果：\n\
    \n```\nobjtype text\n------- ----\nAdhoc   SELECT * FROM HumanResources.Employee\
    \ WHERE BusinessEntityId IN (1, 2);\n```\n\n这里需要注意的重要事项是，`objtype` 列表明该查询被视为 `Adhoc`（即席查询），并且\
    \ `Text` 列显示了已执行查询的确切文本。无法自动参数化的查询被查询引擎分类为“ad hoc”（请注意，这与我使用的定义略有不同）。\n\n前面的示例查询被用来保持简单性，正是因为它不能被自动参数化。而下面的查询可以自动参数化：\n\
    \n```sql\nSELECT *\nFROM HumanResources.Employee\nWHERE BusinessEntityId = 1;\n\
    GO\n```"
  raw: 'DBCC FREEPROCCACHE;


    GO


    Keep in mind that this command clears out the cache for the entire instance of
    SQL Server—doing this is not generally recommended in production environments.
    Then, to see the amount of time spent in the parsing and compilation phase of
    a query, turn on SQL Server’s SET STATISTICS TIME option, which causes SQL Server
    to output informational messages about time spent in parsing/compilation and execution:


    SET STATISTICS TIME ON;


    GO


    CHAPTER 8 „ DYNAMIC T-SQL


    Now consider the following T-SQL, which queries the HumanResources.Employee table
    from the


    AdventureWorks2008 database:


    „ **Note** As of SQL Server 2008, SQL Server no longer ships with any included
    sample databases. To follow the code listings in this chapter, you will need to
    download and install the AdventureWorks2008 database from the CodePlex site, available
    at http://msftdbprodsamples.codeplex.com.


    SELECT *


    FROM HumanResources.Employee


    WHERE BusinessEntityId IN (1, 2);


    GO


    Executing this query in SQL Server Management Studio on my system produces the
    following


    output messages the first time the query is run:


    SQL Server parse and compile time:


    CPU time = 0 ms, elapsed time = 12 ms.


    (2 row(s) affected)


    SQL Server Execution Times:


    CPU time = 0 ms, elapsed time = 1 ms.


    This query took 12ms to parse and compile. But subsequent runs produce the following
    output, indicating that the cached plan is being used:


    CHAPTER 8 „ DYNAMIC T-SQL


    SQL Server parse and compile time:


    CPU time = 0 ms, elapsed time = 1 ms.


    (2 row(s) affected)


    SQL Server Execution Times:


    CPU time = 0 ms, elapsed time = 1 ms.


    Thanks to the cached plan, each subsequent invocation of the query takes 11ms
    less than the first invocation—not bad, when you consider that the actual execution
    time is less than 1ms (the lowest elapsed time reported by time statistics).


    Auto-Parameterization


    An important part of the parsing process that enables the query plan cache to
    be more efficient in some cases involves determination of which parts of the query
    qualify as parameters. If SQL Server determines that one or more literals used
    in the query are parameters that may be changed for future invocations of a similar
    version of the query, it can **auto-parameterize** the query. To understand what
    this means, let’s first take a glance at the contents of the query plan cache,
    via the sys.dm_exec_cached_plans dynamic management view and the sys.dm_exec_sql_text
    function. The following query finds all cached queries that contain the string
    “HumanResources,” excluding those that contain the name of the


    sys.dm_exec_cached_plans view itself—this second predicate is necessary so that
    the results do not include the plan for this query itself.


    SELECT


    cp.objtype,


    st.text


    FROM sys.dm_exec_cached_plans cp


    CROSS APPLY sys.dm_exec_sql_text(cp.plan_handle) st


    WHERE


    st.text LIKE ''%HumanResources%''


    AND st.text NOT LIKE ''%sys.dm_exec_cached_plans%'';


    GO


    „ **Note** I’ll be reusing this code several times in this section to examine
    the plan cache for different types of query, so you might want to keep it open
    in a separate Management Studio tab.


    CHAPTER 8 „ DYNAMIC T-SQL


    Running this code listing after executing the previous query against HumanResources.Employee
    gives the following results:


    objtype text


    Adhoc SELECT * FROM HumanResources.Employee WHERE BusinessEntityId IN (1, 2);


    The important things to note here are that the objtype column indicates that the
    query is being treated as Adhoc, and that the Text column shows the exact text
    of the executed query. Queries that cannot be auto-parameterized are classified
    by the query engine as “ad hoc” (note that this is a slightly different definition
    from the one I use).


    The previous example query was used to keep things simple, precisely because it
    could not be auto-parameterized. The following query, on the other hand, can be
    auto-parameterized:


    SELECT *


    FROM HumanResources.Employee


    WHERE BusinessEntityId = 1;


    GO


