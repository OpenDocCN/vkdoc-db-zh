    \ = '/1/1';\n\nDECLARE @Geography geography = 'POLYGON((0 51, 0 52, 1 52, 1 51\
    \ ,0 51))';\nGO\n```\n\n这两条语句都将导致 CLR 异常，报告如下：\n\n```text\nMsg 6522, Level 16,\
    \ State 2, Line 1\nA .NET Framework error occurred during execution of user-defined\
    \ routine or aggregate \"hierarchyid\":\nMicrosoft.SqlServer.Types.HierarchyIdException:\
    \ 24001: SqlHierarchyId.Parse failed because the input string '/1/1' is not a\
    \ valid string representation of a SqlHierarchyId node.\nMicrosoft.SqlServer.Types.HierarchyIdException:\n\
    \   at Microsoft.SqlServer.Types.SqlHierarchyId.Parse(SqlString input).\n\nMsg\
    \ 6522, Level 16, State 1, Line 2\nA .NET Framework error occurred during execution\
    \ of user-defined routine or aggregate \"geography\":\nMicrosoft.SqlServer.Types.GLArgumentException:\
    \ 24205: The specified input does not represent a valid geography instance because\
    \ it exceeds a single hemisphere. Each geography instance must fit inside a single\
    \ hemisphere. A common reason for this error is that a polygon has the wrong ring\
    \ orientation.\nMicrosoft.SqlServer.Types.GLArgumentException:\n   at Microsoft.SqlServer.Types.GLNativeMethods.ThrowExceptionForHr(GL_HResult\
    \ errorCode)\n   at Microsoft.SqlServer.Types.GLNativeMethods.GeodeticIsValid(GeoData\
    \ g)\n   at Microsoft.SqlServer.Types.SqlGeography.IsValidExpensive()\n   at Microsoft.SqlServer.Types.SqlGeography.ConstructGeographyFromUserInput(GeoData\
    \ g, Int32 srid)\n   at Microsoft.SqlServer.Types.SqlGeography.GeographyFromText(OpenGisType\
    \ type, SqlChars taggedText, Int32 srid)\n   at Microsoft.SqlServer.Types.SqlGeography.STGeomFromText(SqlChars\
    \ geometryTaggedText, Int32 srid)\n   at Microsoft.SqlServer.Types.SqlGeography.Parse(SqlString\
    \ s)\n```\n\n`注意` 如前面的示例代码所示，托管代码生成的异常是语句级异常——即使第一个语句已经产生了 `6522` 错误，第二个语句仍被允许运行。\n\
    \n我们如何创建特定的代码路径来处理此类异常？尽管它们涉及截然不同的情况，但由于两个异常都发生在托管代码内部，每种情况下生成的 T-SQL 错误是相同的——通用错误\
    \ `6522`。这意味着我们无法使用 `ERROR_NUMBER()` 来区分这些情况。此外，我们无法轻易地在原始函数代码中添加自定义错误处理，因为这些都是在预编译的\
    \ `Microsoft.SqlServer.Types.dll` 程序集中定义的系统方法。\n\n一种方法是定义新的自定义 CLR 方法，包装 `SqlServer.Types.dll`\
    \ 中的每个系统定义方法，这些方法在将结果传回 SQL Server 之前检查并处理任何 CLR 异常。以下代码清单展示了一个包装在 `geography`\
    \ `Parse()` 方法外的此类包装器示例：\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction()]\n\
    public static SqlGeography GeogTryParse(SqlString Input)\n{\n    SqlGeography\
    \ result = new SqlGeography();\n    try\n    {\n        result = SqlGeography.Parse(Input);\n\
    \    }\n    catch\n    {\n        // Exception Handling code here\n        //\
    \ Optionally, rethrow the exception\n        // throw new Exception(\"An exception\
    \ occurred that couldn't be handled\");\n    }\n    return result;\n}\n```\n\n\
    或者，您可以创建依赖于解析 `ERROR_MESSAGE()` 内容的代码路径，以识别堆栈跟踪中指定的原始 CLR 异常的详细信息。系统定义的 CLR 类型生成的异常具有\
    \ `24000` 到 `24999` 范围内的五位数异常编号，因此可以使用 T-SQL `PATINDEX` 函数从 `ERROR_MESSSAGE()`\
    \ 字符串中提取出来。以下代码清单展示了在应用于前面给出的 `hierarchyid` 示例时如何实现这种方法：\n\n```sql\nDECLARE @errorMsg\
    \ nvarchar(max);\n\nBEGIN TRY\n    SELECT hierarchyid::Parse('/1/1');\nEND TRY\n\
    BEGIN CATCH\n    SELECT @errorMsg = ERROR_MESSAGE();\n    SELECT SUBSTRING(@errorMsg,\
    \ PATINDEX('%: 24[0-9][0-9][0-9]%', @errorMsg) + 2, 5);\nEND CATCH\nGO\n```\n\n\
    得到的值 `24001` 对应于发生的具体 CLR 异常（“输入字符串不是 SqlHierarchyId 节点的有效字符串表示形式”），而不是通用的 T-SQL\
    \ 错误 `6522`，并且可用于编写特定的代码路径来处理此类异常。\n\n## 事务与异常\n\n讨论 SQL Server 中的异常时，如果不提及事务与异常之间的相互作用，讨论就不完整。这是一个相当简单的领域，但常常让那些不太理解事务作用的开发者感到困惑。\n\
    \nSQL Server 是一个数据库管理系统（`DBMS`），因此其主要目标之一是对数据进行管理和操作。因此，SQL Server 中每个异常处理方案的核心都必须考虑到：这些不仅仅是异常——它们也是数据问题。\n\
    \n### 关于事务中止的误解\n\n一些开发者犯的最大错误是假设如果在事务期间发生异常，该事务将被中止。默认情况下，这种情况几乎*从不*发生。即使在面对异常时，大多数事务也会继续存在，运行以下\
    \ T-SQL 即可证明：\n\n```sql\nBEGIN TRANSACTION;\nGO\nSELECT 1/0 AS DivideByZero;\n\
    GO\nSELECT @@TRANCOUNT AS ActiveTransactionCount;\nGO\n```\n\n此 T-SQL 的输出如下：\n\
    \n```text\nDivideByZero\nMsg 8134, Level 16, State 1, Line 1\nDivide by zero error\
    \ encountered.\n\nActiveTransactionCount\n(1 row(s) affected)\n```\n\n另一个错误是认为存储过程代表某种形式的工作原子单元，拥有自己的隐式事务，在发生异常时会回滚。唉，这也不正确，如下的\
    \ T-SQL 所证明：\n\n```sql\n--Create a table for some data\nCREATE TABLE SomeData\n\
    (\n    SomeColumn int\n);\nGO\n\n--This procedure will insert one row, then throw\
    \ a divide-by-zero exception\nCREATE PROCEDURE NoRollback\nAS\nBEGIN\n    INSERT\
    \ INTO SomeData VALUES (1);\n    INSERT INTO SomeData VALUES (1/0);\nEND;\nGO\n\
    \n--Execute the procedure\nEXEC NoRollback;\nGO\n\n--Select the rows from the\
    \ table\nSELECT *\nFROM SomeData;\nGO\n```\n\n结果是，即使有错误，没有引发异常的那一行仍然在表中；存储过程没有产生隐式事务：\n\
    \n```text\nSomeColumn\n-----------\n1\n```\n\n即使在插入之前在存储过程中开始一个*显式*事务，并在异常发生后提交，此示例仍将返回相同的输出。默认情况下，除非显式发出回滚，否则在大多数情况下，异常不会回滚任何内容。它只是作为一个消息，表明出了问题。\n\
    \n### XACT_ABORT：将误解变为（半）现实\n"
- fmt: "# CHAPTER 4 „ ERRORS AND EXCEPTIONS\n\n## XACT_ABORT and Transactions\n\n\
    As mentioned in the section on `XACT_ABORT` and its effect on exceptions, the\
    \ setting also has an impact on transactions, as its name might indicate (it is\
    \ pronounced *transact abort*). In addition to making exceptions act like batch-level\
    \ exceptions, the setting also causes any active transactions to immediately roll\
    \ back in the event of an exception. This means that the following T-SQL results\
    \ in an active transaction count of 0:\n\n```sql\nSET XACT_ABORT ON;\n\nBEGIN\
    \ TRANSACTION;\n\nGO\n\nSELECT 1/0 AS DivideByZero;\n\nGO\n\nSELECT @@TRANCOUNT\
    \ AS ActiveTransactionCount;\n\nGO\n```\n\nThe output is now\n\n```text\nActiveTransactionCount\n\
    ----------------------\n0\n```\n\n`XACT_ABORT` does not create an implicit transaction\
    \ within a stored procedure, but it *does* cause any exceptions that occur within\
    \ an explicit transaction within a stored procedure to cause a rollback. The following\
    \ T-SQL shows a much more atomic stored procedure behavior than the previous example:\n\
    \n```sql\n--Empty the table\nTRUNCATE TABLE SomeData;\nGO\n\n--This procedure\
    \ will insert one row, then throw a divide-by-zero exception\nCREATE PROCEDURE\
    \ XACT_Rollback\nAS\nBEGIN\n    SET XACT_ABORT ON;\n    BEGIN TRANSACTION;\n \
    \   INSERT INTO SomeData VALUES (1);\n    INSERT INTO SomeData VALUES (1/0);\n\
    \    COMMIT TRANSACTION;\nEND;\nGO\n\n--Execute the procedure\nEXEC XACT_Rollback;\n\
    GO\n\n--Select the rows from the table\nSELECT *\nFROM SomeData;\nGO\n```\n\n\
    This T-SQL results in the following output, which shows that no rows were inserted:\n\
    \n```text\nMsg 8134, Level 16, State 1, Procedure XACT_Rollback, Line 10\nDivide\
    \ by zero error encountered.\n\nSomeColumn\n-----------\n(0 row(s) affected)\n\
    ```\n\n`XACT_ABORT` is a very simple yet extremely effective means of ensuring\
    \ that an exception does not result in a transaction committing with only part\
    \ of its work done. I recommend turning this setting on in any stored procedure\
    \ that uses an explicit transaction, in order to guarantee that it will get rolled\
    \ back in case of an exception.\n\n## TRY/CATCH and Doomed Transactions\n\nOne\
    \ interesting outcome of using `TRY/CATCH` syntax is that it is possible for transactions\
    \ to enter a state in which they can *only* be rolled back. In this case the transaction\
    \ is not automatically rolled back, as it is with `XACT_ABORT`; instead, SQL Server\
    \ throws an exception letting the caller know that the transaction cannot be committed,\
    \ and must be manually rolled back. This condition is known as a **doomed transaction**,\
    \ and the following T-SQL shows one way of producing it:\n\n```sql\nBEGIN TRANSACTION;\n\
    BEGIN TRY\n    --Throw an exception on insert\n    INSERT INTO SomeData VALUES\
    \ (CONVERT(int, 'abc'));\nEND TRY\nBEGIN CATCH\n    --Try to commit...\n    COMMIT\
    \ TRANSACTION;\nEND CATCH\nGO\n```\n\nThis results in the following output:\n\n\
    ```text\nMsg 3930, Level 16, State 1, Line 10\nThe current transaction cannot\
    \ be committed and cannot support\noperations that write to the log file. Roll\
    \ back the transaction.\n```\n\nShould a transaction enter this state, any attempt\
    \ to either commit the transaction or roll forward (do more work) will result\
    \ in the same exception. This exception will keep getting thrown until the transaction\
    \ is rolled back.\n\nIn order to determine whether an active transaction can be\
    \ committed or rolled forward, check the value of the `XACT_STATE()` function.\
    \ This function returns 0 if there are no active transactions, 1 if the transaction\
    \ is in a state in which more work can be done, and –1 if the transaction is doomed.\
    \ It is a good idea to always check `XACT_STATE()` in any `CATCH` block that involves\
    \ an explicit transaction.\n\n## Summary\n\nIt’s a fact of life for every developer:\
    \ sometimes things just go wrong.\n\nA solid understanding of how exceptions behave\
    \ within SQL Server makes working with them much easier. Especially important\
    \ is the difference between statement-level and batch-level exceptions, and the\
    \ implications of exceptions that are thrown within transactions.\n\nSQL Server’s\
    \ `TRY/CATCH` syntax makes dealing with exceptions much easier, but it’s important\
    \ to use the feature wisely. Overuse can make detection and debugging of problems\
    \ exceedingly difficult. And whenever dealing with transactions in `CATCH` blocks,\
    \ make sure to check the value of `XACT_STATE()`.\n\nErrors and exceptions will\
    \ always occur, but by thinking carefully about how to handle them, you can deal\
    \ with them easily and effectively.\n\n# CHAPTER 5 „ PRIVILEGE AND AUTHORIZATION\n\
    \n## Overview\n\nSQL Server security is a broad subject area, with enough potential\
    \ avenues of exploration that entire books have been written on the topic. This\
    \ chapter’s goal is not to cover the whole spectrum of security knowledge necessary\
    \ to create a product that is secure from end to end, but rather to focus on those\
    \ areas that are most important during the software design and development process.\n\
    \nBroadly speaking, data security can be broken into two areas:\n- **Authentication**:\
    \ The act of verifying the identity of a user of a system.\n- **Authorization**:\
    \ The act of giving a user access to the resources that a system controls.\n\n\
    These two realms can be delegated separately in many cases; so long as the authentication\
    \ piece works properly, the user can be handed off to authorization mechanisms\
    \ for the remainder of a session.\n\nSQL Server authentication on its own is a\
    \ big topic, with a diverse range of subtopics including network security, operating\
    \ system security, and so-called surface area control over the server. While production\
    \ DBAs should be very concerned with these sorts of issues, authentication is\
    \ an area that developers can mostly ignore. Developers need to be much more concerned\
    \ with what happens *after* authentication: that is, how the user is authorized\
    \ for data access and how data is protected from unauthorized users.\n\nThis chapter\
    \ introduces some of the key issues of data privilege and authorization in SQL\
    \ Server from a development point of view. Included here is an initial discussion\
    \ on privileges and general guidelines and practices for securing data using SQL\
    \ Server permissions. A related security topic is that of data encryption, which\
    \ is covered in detail in the next chapter.\n\nNote that although authentication\
    \ issues are generally ignored in these pages, you should try to not completely\
    \ disregard them in your day-to-day development work. Development environments\
    \ tend to be set up with very lax security in order to keep things simple, but\
    \ a solid development process should include a testing phase during which full\
    \ authentication restrictions are applied. This helps to ensure that rollout to\
    \ a production system does not end in spectacular failure in which users aren’t\
    \ even able to log in!\n\n## User VS. Application Logins\n\nThe topics covered\
    \ in this chapter relate to various privilege and authorization scenarios handled\
    \ within SQL Server itself. However, in many database application designs, authorization\
    \ is handled in the application layer rather than at the database layer. In such\
    \ applications, users typically connect and log into the application using their\
    \ own personal credentials, but the application then connects to the database\
    \ using a single shared application login. This login is given permission to execute\
    \ all of the stored procedures in the database related to that application, and\
    \ it is up to authorization routines in the application itself to determine those\
    \ actions that can be performed by any given user.\n\nThere are some benefits\
    \ to using this approach, such as being able to take advantage of connection pooling\
    \ between different sessions. However, it means that any features provided by\
    \ SQL Server to handle per-user security do not apply. If a bug were to exist\
    \ in the application, or if the credentials associated with the application login\
    \ were to become known, it would be possible for users to execute any queries\
    \ against the database that the application had permission to perform."
