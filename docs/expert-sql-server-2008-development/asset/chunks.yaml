    The Quest for Code Safety


    You might be wondering why I’m covering the internals of the SQLCLR permission
    sets and how their exceptions differ, when fixing the exceptions is so easy: simply
    raise the permission level of the assemblies to EXTERNAL_ACCESS or UNSAFE and
    give the code access to do what it needs to do. The fact is, raising the permission
    levels will certainly work, but by doing so you may be circumventing the security
    policy, instead of working with it to make your system more secure.


    As mentioned in the previous section, code access permissions are granted at the
    assembly level rather than the method or line level. Therefore, raising the permission
    of a given assembly in order to make a certain module work can actually affect
    many different modules contained within the assembly, giving them all enhanced
    access. Granting additional permissions on several modules within an assembly
    can in turn create a maintenance burden: if you want to be certain that there
    are no security problems, you must review each and every line of code in every
    module in the assembly to make sure it’s not doing anything it’s not supposed
    to do—you can no longer trust the engine to check for you.


    You might now be thinking that the solution is simple: split up your methods so
    that each resides in a separate assembly, and then grant permissions that way.
    Then each method really will have its own permission set. But even in that case,
    permissions may not be granular enough to avoid code review nightmares. Consider
    a complex 5,000-line module that requires a single file I/O operation to read
    some lines from a text file. By giving the entire module EXTERNAL_ACCESS permissions,
    it can now read the lines from that file. But of course, you still have to check
    all of the 4,999 remaining code lines to make sure they’re not doing anything
    unauthorized.'
  trans: "# SQLCLR：架构与设计注意事项\n\n## 安全异常示例\n\n`Culture=neutral, PublicKeyToken=b77a5c561934e089`\
    \ 失败。\n\n```\nSystem.Security.SecurityException:\n   at System.Security.CodeAccessSecurityEngine.Check(Object\
    \ demand,\n   StackCrawlMark& stackMark, Boolean isPermSet)\n   at System.Security.CodeAccessPermission.Demand()\n\
    \   at System.IO.FileStream.Init(String path, FileMode mode, FileAccess access,\
    \ Int32 rights, Boolean useRights, FileShare share, Int32 bufferSize, FileOptions\
    \ options, SECURITY_ATTRIBUTES secAttrs, String msgPath, Boolean bFromProxy)\n\
    \   at System.IO.FileStream..ctor(String path, FileMode mode)\n   at udf_part2.CAS_Exception()\n\
    ```\n\n此情况下引发的异常是 `SecurityException`，表明这是一个 CAS 违规（`FileIOPermission` 类型）。但发生的不仅是异常；注意输出的第一行是字符串\
    \ `\"Starting...\"`，这是由存储过程第一行使用的 `SqlPipe.Send` 方法输出的。因此在遇到异常之前，方法已被进入，代码执行成功，直到尝试实际的权限违规。\n\
    \n`注意` 文件 I/O 是访问资源（本地或其他）的一个好例子，在上下文连接中是不允许的。要使用 SQLCLR 安全桶避免此特定违规，需要使用 `EXTERNAL_ACCESS`\
    \ 权限对程序集进行编录。\n\n## 主机保护异常\n\n为了了解 HPA 异常的行为，让我们重复上一节中描述的相同实验，但使用以下存储过程（同样编录为\
    \ `SAFE`）：\n\n```csharp\n[SqlProcedure]\npublic static void HPA_Exception()\n\
    {\n    SqlContext.Pipe.Send(\"Starting...\");\n    // 下一行将抛出 HPA 异常...\n    Monitor.Enter(SqlContext.Pipe);\n\
    \    // 释放锁（如果代码真的能执行到这里）...\n    Monitor.Exit(SqlContext.Pipe);\n    SqlContext.Pipe.Send(\"\
    Finished...\");\n    return;\n}\n```\n\n就像之前一样，发生了一个异常。但这次，输出有点不同：\n\n```\nMsg\
    \ 6522, Level 16, State 1, Procedure HPA_Exception, Line 0\nA .NET Framework error\
    \ occurred during execution of user-defined routine or aggregate \"HPA_Exception\"\
    :\nSystem.Security.HostProtectionException: Attempted to perform an operation\
    \ that was forbidden by the CLR host.\nThe protected resources (only available\
    \ with full trust) were: All\nThe demanded resources were: Synchronization, ExternalThreading\n\
    System.Security.HostProtectionException:\n   at System.Security.CodeAccessSecurityEngine.ThrowSecurityException(Assembly\
    \ asm, PermissionSet granted, PermissionSet refused, RuntimeMethodHandle rmh,\
    \ SecurityAction action, Object demand, IPermission permThatFailed)\n   at System.Security.CodeAccessSecurityEngine.ThrowSecurityException(Object\
    \ assemblyOrString, PermissionSet granted, PermissionSet refused, RuntimeMethodHandle\
    \ rmh, SecurityAction action, Object demand, IPermission permThatFailed)\n   at\
    \ System.Security.CodeAccessSecurityEngine.CheckSetHelper(PermissionSet grants,\
    \ PermissionSet refused, PermissionSet demands, RuntimeMethodHandle rmh, Object\
    \ assemblyOrString, SecurityAction action, Boolean throwException)\n   at System.Security.CodeAccessSecurityEngine.CheckSetHelper(CompressedStack\
    \ cs, PermissionSet grants, PermissionSet refused, PermissionSet demands, RuntimeMethodHandle\
    \ rmh, Assembly asm, SecurityAction action)\n   at udf_part2.HPA_Exception()\n\
    ```\n\n与执行 `CAS_Exception` 存储过程时不同，这次我们没有看到 `\"Starting...\"` 消息，表明在遇到异常之前 `SqlPipe.Send`\
    \ 方法未被调用。事实上，在代码执行阶段 `HPA_Exception` 方法根本没有被进入（你可以通过尝试在函数内设置断点并在 Visual Studio\
    \ 中启动调试会话来验证这一点）。断点无法命中的原因是权限检查已执行，并且在即时编译后立即抛出了异常。\n\n你还应注意，异常的措辞与之前的情况不同。CAS\
    \ 异常的措辞相当温和：“请求权限 ... 失败。”另一方面，HPA 异常带有更严厉的警告：“尝试执行被禁止的操作。”这种措辞上的差异并非偶然。CAS 授权关注的是安全性——防止代码访问某些受保护的内容，因为它不应该拥有访问权限。而\
    \ HPA 权限关注的是服务器可靠性，并保持 CLR 主机平稳高效地运行。线程和同步被认为可能威胁可靠性，因此仅限于标记为 `UNSAFE` 的程序集。\n\
    \n`注意` 使用 .NET 反编译器（例如 Red Gate Reflector, www.red-gate.com/products/reflector/），可以探索基类库以查看各种类和方法分配了哪些\
    \ HPA 属性。例如，`Monitor` 类被装饰了以下控制主机访问的属性：\n`[ComVisible(true), HostProtection(SecurityAction.LinkDemand,\
    \ Synchronization=true, ExternalThreading=true)]`。\n\n关于根据 CAS 和 HPA 模型允许什么和不允许什么的完整列表超出了本章的范围，但\
    \ Microsoft 有很好的文档记录。请参阅以下 MSDN 主题：\n- `主机保护属性与 CLR 集成编程` (http://msdn2.microsoft.com/en-us/library/ms403276.aspx)\n\
    - `CLR 集成代码访问安全性` (http://msdn2.microsoft.com/en-us/library/ms345101.aspx)\n\n\
    ## 对代码安全性的追求\n\n你可能想知道，既然修复异常如此简单——只需将程序集的权限级别提高到 `EXTERNAL_ACCESS` 或 `UNSAFE`，并让代码访问它需要做的事情——为什么我还要介绍\
    \ SQLCLR 权限集的内部结构以及它们的异常有何不同。事实是，提高权限级别肯定会起作用，但这样做你可能是在规避安全策略，而不是与之合作以使你的系统更安全。\n\
    \n如前一节所述，代码访问权限是在程序集级别而不是方法或行级别授予的。因此，为了使某个模块工作而提高给定程序集的权限，实际上会影响该程序集中包含的许多不同模块，赋予它们所有增强的访问权限。在程序集内的多个模块上授予额外权限反过来会造成维护负担：如果你希望确保没有安全问题，你必须审查程序集中每个模块的每一行代码，以确保它没有做任何不应该做的事情——你不能再信任引擎为你进行检查。\n\
    \n你现在可能在想解决方案很简单：拆分你的方法，使每个方法都位于一个独立的程序集中，然后按那种方式授予权限。这样每个方法确实将拥有自己的权限集。但即使在那种情况下，权限可能仍然不够细化以避免代码审查的噩梦。考虑一个复杂的\
    \ 5000 行模块，它需要一个单一的文件 I/O 操作来从文本文件中读取一些行。通过给予整个模块 `EXTERNAL_ACCESS` 权限，它现在可以从该文件读取行。但当然，你仍然必须检查剩余的\
    \ 4999 行代码，以确保它们没有做任何未经授权的事情。"
- fmt: "# SQLCLR 架构与设计考量：通过程序集引用实现选择性权限提升\n\n## 手动代码审查的有效性疑问\n然后是对**手动代码审查有效性**的疑问。对于任何代码变更，每次都进行严格的审查是否足以确保代码不会引发问题？如果代码被标记为`SAFE`，引擎本应能检测到这些问题。此外，你真的*希望*每次任何变更部署前都必须进行严格审查吗？在接下来的部分，我将展示如何通过利用`SQLCLR`环境中的程序集依赖关系来消除许多此类问题。\n\
    \n## 通过程序集引用实现选择性权限提升\n在理想情况下，`SQLCLR`模块的权限可以像第5章描述的`T-SQL`模块权限那样工作：外部模块被授予尽可能少的权限，但能够为了执行某些需要更多访问权限的操作而选择性地、临时地提升其权限。这将显著减少特权暴露区域，这意味着对于构成给定系统大部分代码的外层（权限较低）模块层，进行严格安全审查的必要性会降低——引擎将确保它们的行为符合预期。\n\
    \n解决此问题的通用方案是根据权限需求将代码拆分到不同的程序集中，但不能忽视维护开销和重用性。\n\n例如，考虑上一节提到的需要从文本文件中读取几行的5000行模块。可以授予整个模块足够高的权限来读取文件，也可以将读取文件的代码提取出来放到它自己的程序集中。这个外部程序集将暴露一个方法，该方法以文件名作为输入并返回一个行的集合。正如我将在后续章节中展示的，此解决方案可以让你将大部分代码编目为`SAFE`，同时仍然执行文件I/O操作。此外，未来需要从文本文件读取行的模块可以引用同一个程序集，因此不必重新实现此逻辑。\n\
    \n可惜的是，封装过程并不像创建一个包含必要逻辑的新程序集并引用它那样简单。由于`CAS`（代码访问安全）和`HPA`（宿主保护属性）异常行为的差异，你可能需要进行一些代码分析，以便正确封装内部模块的权限。在接下来的部分中，我将分别介绍每种权限类型，以说明如何设计解决方案。\n\
    \n## 使用宿主保护权限\n一个相当常见的`SQLCLR`模式是创建可以被调用者共享的静态集合。然而，与任何共享数据集一样，如果需要在初始加载后更新部分数据，适当的同步是至关重要的。从`SQLCLR`的角度来看，这变得棘手，因为线程和同步需要`UNSAFE`访问权限——授予如此开放级别的权限并非小事。\n\
    \n考虑一个可能使用静态集合的场景示例：一个用于基于汇率计算货币转换的`SQLCLR`用户定义函数：\n\n```csharp\n[SqlFunction]\n\
    public static SqlDecimal GetConvertedAmount(\n    SqlDecimal InputAmount,\n  \
    \  SqlString InCurrency,\n    SqlString OutCurrency)\n{\n    //Convert the input\
    \ amount to the base\n    decimal BaseAmount =\n        GetRate(InCurrency.Value)\
    \ *\n        InputAmount.Value;\n    //Return the converted base amount\n    return\
    \ (new SqlDecimal(\n        GetRate(OutCurrency.Value) * BaseAmount));\n}\n```\n\
    \n`GetConvertedAmount`方法内部使用了另一个方法`GetRate`：\n\n```csharp\nprivate static decimal\
    \ GetRate(string Currency)\n{\n    decimal theRate;\n    rwl.AcquireReaderLock(100);\n\
    \    try\n    {\n        theRate = rates[Currency];\n    }\n    finally\n    {\n\
    \        rwl.ReleaseLock();\n    }\n    return (theRate);\n}\n```\n\n`GetRate`在`rates`（一个`Dictionary<string,\
    \ decimal>`的静态泛型实例）中执行查找。此集合包含系统中给定货币的汇率。为了防止另一个线程恰好正在更新`rates`时会发生的问题，同步是使用`rwl`（一个`ReaderWriterLock`的静态实例）来处理的。字典和`ReaderWriterLock`都在类的方法首次被调用时实例化，并且都被标记为`readonly`，以避免在实例化后被覆盖：\n\
    \n```csharp\nstatic readonly Dictionary<string, decimal>\n    rates = new Dictionary<string,\
    \ decimal>();\nstatic readonly ReaderWriterLock\n    rwl = new ReaderWriterLock();\n\
    ```\n\n如果使用`SAFE`或`EXTERNAL_ACCESS`权限集进行编目，此代码会因使用同步机制（`ReaderWriterLock`）而失败，运行它会产生`HostProtectionException`。解决方案是将受影响的代码移动到它自己的程序集中，并编目为`UNSAFE`。因为宿主保护检查是在程序集中方法即时编译时评估的，而不是在方法运行动态进行的，检查是在跨越程序集边界时完成的。这意味着外部方法可以被标记为`SAFE`，并通过调用`UNSAFE`核心来临时提升其权限。\n\
    \n> **注意**：你可能会对这个示例的有效性产生疑问，因为使用纯`T-SQL`可以轻松实现此系统，从而彻底消除权限问题。我确实认为这是一个现实的例子，特别是如果系统需要在任何给定日期进行大量货币转换。`SQLCLR`代码即使对于简单的数学工作通常也优于`T-SQL`，并且将数据缓存在共享集合中而不是每次调用都从数据库读取，是一个巨大的效率提升。我确信这个解决方案会轻松优于任何纯`T-SQL`等效方案。\n\
    \n在设计`UNSAFE`程序集时，从重用的角度仔细分析应该公开哪些功能是很重要的。在此情况下，导致问题的并不是字典的使用——抛出实际异常的是通过`ReaderWriterLock`的同步。然而，仅仅围绕`ReaderWriterLock`包装一个方法可能不会促进太多重用。我认为更好的策略是将`Dictionary`和`ReaderWriterLock`包装在一起，创建一个新的`ThreadSafeDictionary`类。这个类可以在任何需要共享数据缓存的场景中使用。\n\
    \n以下是我的`ThreadSafeDictionary`实现；我没有实现泛型`Dictionary`类公开的所有方法，而只实现了我常用的那些——即`Add`、`Remove`和`ContainsKey`：\n\
    \n```csharp\nusing System;\nusing System.Collections.Generic;\nusing System.Text;\n\
    using System.Threading;\n\nnamespace SafeDictionary\n{\n    public class ThreadSafeDictionary<K,\
    \ V>\n    {\n        private readonly Dictionary<K, V> dict = new Dictionary<K,V>();\n\
    \        private readonly ReaderWriterLock theLock = new ReaderWriterLock();\n\
    \n        public void Add(K key, V value)\n        {\n            theLock.AcquireWriterLock(2000);\n\
    \            try\n            {\n                dict.Add(key, value);\n     \
    \       }\n            finally\n            {\n                theLock.ReleaseLock();\n\
    \            }\n        }\n\n        public V this[K key]\n        {\n       \
    \     get\n            {\n                theLock.AcquireReaderLock(2000);\n \
    \               try\n                {\n                    return (this.dict[key]);\n\
    \                }\n                finally\n                {\n             \
    \       theLock.ReleaseLock();\n                }\n            }\n           \
    \ set\n            {\n                theLock.AcquireWriterLock(2000);\n     \
    \           try\n                {\n                    dict[key] = value;\n \
    \               }\n                finally\n                {\n              \
    \      theLock.ReleaseLock();\n                }\n            }\n        }\n\n\
    \        public bool Remove(K key)\n        {\n            theLock.AcquireWriterLock(2000);\n\
    \            try\n            {\n                return (dict.Remove(key));\n\
    \            }\n            finally\n            {\n                theLock.ReleaseLock();\n\
    \            }\n        }\n\n        public bool ContainsKey(K key)\n        {\n\
    \            theLock.AcquireReaderLock(2000);\n            try\n            {\n\
    \                return (dict.ContainsKey(key));\n            }\n            finally\n\
    \            {\n                theLock.ReleaseLock();\n            }\n      \
    \  }\n    }\n}\n```"
  raw: 'Then there is the question of the effectiveness of manual code review. Is
    doing a stringent review every time any change is made enough to ensure that the
    code won’t cause problems that would be detected by the engine if the code was
    marked SAFE? And do you really *want* to have to do a stringent review before
    deployment every time any change is made? In the following section, I will show
    you how to eliminate many of these problems by taking advantage of assembly dependencies
    in your SQLCLR


    environment.


    Selective Privilege Escalation via Assembly References


    In an ideal world, SQLCLR module permissions could be made to work like T-SQL
    module permissions as described in Chapter 5: outer modules would be granted the
    least possible privileges, but would be able to selectively and temporarily escalate
    their privileges in order to perform certain operations that require more access.
    This would lessen the privileged surface area significantly, which would mean
    that there would be less need to do a stringent security review on outer (less-privileged)
    module layers, which undoubtedly constitute the majority of code written for a
    given system—the engine would make sure they behave.


    The general solution to this problem is to split up code into separate assemblies
    based on


    permissions requirements, but not to do so without regard for both maintenance
    overhead and reuse.


    For example, consider the 5,000-line module mentioned in the previous section,
    which needs to read a few lines from a text file. The entire module could be granted
    a sufficiently high level of privileges to read the file, or the code to read
    the file could be taken out and placed into its own assembly. This external assembly
    would expose a method that takes a file name as input and returns a collection
    of lines. As I’ll show in the following sections, this solution would let you
    catalog the bulk of the code as SAFE yet still do the file I/O operation. Plus,
    future modules that need to read lines from text files could reference the same
    assembly, and therefore not have to reimplement this logic.


    The encapsulation story is, alas, not quite as straightforward as creating a new
    assembly with the necessary logic and referencing it. Due to the different behavior
    of CAS and HPA exceptions, you might have to perform some code analysis in order
    to properly encapsulate the permissions of the inner 168


    CHAPTER


    „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    modules. In the following sections, I’ll cover each of the permission types separately
    in order to illustrate how to design a solution.


    Working with Host Protection Privileges


    A fairly common SQLCLR pattern is to create static collections that can be shared
    among callers.


    However, as with any shared data set, proper synchronization is essential in case
    you need to update some of the data after its initial load. From a SQLCLR standpoint,
    this gets dicey due to the fact that threading and synchronization require UNSAFE
    access—granting such an open level of permission is not something to be taken
    lightly.


    For an example of a scenario that might make use of a static collection, consider
    a SQLCLR UDF


    used to calculate currency conversions based on exchange rates:


    [SqlFunction]


    public static SqlDecimal GetConvertedAmount(


    SqlDecimal InputAmount,


    SqlString InCurrency,


    SqlString OutCurrency)


    {


    //Convert the input amount to the base


    decimal BaseAmount =


    GetRate(InCurrency.Value) *


    InputAmount.Value;


    //Return the converted base amount


    return (new SqlDecimal(


    GetRate(OutCurrency.Value) * BaseAmount));


    }


    The GetConvertedAmount method internally makes use of another method, GetRate:


    private static decimal GetRate(string Currency)


    {


    decimal theRate;


    rwl.AcquireReaderLock(100);


    try


    {


    theRate = rates[Currency];


    }


    finally


    {


    rwl.ReleaseLock();


    }


    return (theRate);


    }


    GetRate performs a lookup in a static generic instance of Dictionary<string, decimal>,
    called rates. This collection contains exchange rates for the given currencies
    in the system. In order to protect 169


    CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    against problems that will occur if another thread happens to be updating the
    rates, synchronization is handled using a static instance of ReaderWriterLock,
    called rwl. Both the dictionary and the ReaderWriterLock are instantiated when
    a method on the class is first called, and both are marked readonly in order to
    avoid being overwritten after instantiation:


    static readonly Dictionary<string, decimal>


    rates = new Dictionary<string, decimal>();


    static readonly ReaderWriterLock


    rwl = new ReaderWriterLock();


    If cataloged using either the SAFE or EXTERNAL_ACCESS permission sets, this code
    fails due to its use of synchronization (the ReaderWriterLock), and running it
    produces a HostProtectionException. The solution is to move the affected code
    into its own assembly, cataloged as UNSAFE. Because the host protection check
    is evaluated at the moment of just-in-time compilation of a method in an assembly,
    rather than dynamically as the method is running, the check is done as the assembly
    boundary is being crossed. This means that an outer method can be marked SAFE
    and temporarily escalate its permissions by calling into an UNSAFE core.


    „ **Note** You might be wondering about the validity of this example, given the
    ease with which this system could be implemented in pure T-SQL, which would eliminate
    the permissions problem outright. I do feel that this is a realistic example,
    especially if the system needs to do a large number of currency translations on
    any given day.


    SQLCLR code will generally outperform T-SQL for even simple mathematical work,
    and caching the data in a shared collection rather than reading it from the database
    on every call is a huge efficiency win. I’m confident that this solution would
    easily outperform any pure T-SQL equivalent.


    When designing the UNSAFE assembly, it is important from a reuse point of view
    to carefully analyze what functionality should be made available. In this case,
    it’s not the use of the dictionary that is causing the problem—synchronization
    via the ReaderWriterLock is throwing the actual exception. However, a wrapping
    method placed solely around a ReaderWriterLock would probably not promote very
    much reuse. A better tactic, in my opinion, is to wrap the Dictionary and the
    ReaderWriterLock together, creating a new ThreadSafeDictionary class. This class
    could be used in any scenario in which a shared data cache is required.


    Following is my implementation of the ThreadSafeDictionary; I have not implemented
    all of the methods that the generic Dictionary class exposes, but rather only
    those I commonly use—namely, Add, Remove, and ContainsKey:


    using System;


    using System.Collections.Generic;


    using System.Text;


    using System.Threading;


    namespace SafeDictionary


    {


    public class ThreadSafeDictionary<K, V>


    {


    CHAPTER


    „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    private readonly Dictionary<K, V> dict = new Dictionary<K,V>();


    private readonly ReaderWriterLock theLock = new ReaderWriterLock();


    public void Add(K key, V value)


    {


    theLock.AcquireWriterLock(2000);


    try


    {


    dict.Add(key, value);


    }


    finally


    {


    theLock.ReleaseLock();


    }


    }


    public V this[K key]


    {


    get


    {


    theLock.AcquireReaderLock(2000);


    try


    {


    return (this.dict[key]);


    }


    finally


    {


    theLock.ReleaseLock();


    }


    }


    set


    {


    theLock.AcquireWriterLock(2000);


    try


    {


    dict[key] = value;


    }


    finally


    {


    theLock.ReleaseLock();


    }


    }


    }


    public bool Remove(K key)


    {


    theLock.AcquireWriterLock(2000);


    try


    {


    return (dict.Remove(key));


    CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    }


    finally


    {


    theLock.ReleaseLock();


    }


    }


    public bool ContainsKey(K key)


    {


    theLock.AcquireReaderLock(2000);


    try


    {


    return (dict.ContainsKey(key));


    }


    finally


    {


    theLock.ReleaseLock();


    }


    }


    }


    }'
  trans: "\n# SQLCLR 架构与设计考量：通过程序集引用实现选择性权限提升\n\n## 手动代码审查的有效性疑问\n首先是对**手动代码审查有效性**的疑问。对于任何代码变更，每次都进行严格的审查是否足以确保代码不会引发问题？如果代码被标记为`SAFE`，引擎本应能检测到这些问题。此外，你真的*希望*每次任何变更部署前都必须进行严格审查吗？在接下来的部分，我将展示如何通过利用`SQLCLR`环境中的程序集依赖关系来消除许多此类问题。\n\
    \n## 通过程序集引用实现选择性权限提升\n在理想情况下，`SQLCLR`模块的权限可以像第 5 章描述的`T-SQL`模块权限那样工作：外部模块被授予尽可能少的权限，但能够为了执行某些需要更多访问权限的操作而选择性地、临时地提升其权限。这将显著减少特权暴露区域，这意味着对于构成给定系统大部分代码的外层（权限较低）模块层，进行严格安全审查的必要性会降低——引擎将确保它们的行为符合预期。\n\
    \n解决此问题的通用方案是根据权限需求将代码拆分到不同的程序集中，但不能忽视维护开销和重用性。\n\n例如，考虑上一节提到的需要从文本文件中读取几行的 5000\
    \ 行模块。可以授予整个模块足够高的权限来读取文件，也可以将读取文件的代码提取出来放到它自己的程序集中。这个外部程序集将暴露一个方法，该方法以文件名作为输入并返回一个行的集合。正如我将在后续章节中展示的，此解决方案可以让你将大部分代码编目为`SAFE`，同时仍然执行文件\
    \ I/O 操作。此外，未来需要从文本文件读取行的模块可以引用同一个程序集，因此不必重新实现此逻辑。\n\n可惜的是，封装过程并不像创建一个包含必要逻辑的新程序集并引用它那样简单。由于`CAS`（代码访问安全）和`HPA`（宿主保护属性）异常行为的差异，你可能需要进行一些代码分析，以便正确封装内部模块的权限。在接下来的部分中，我将分别介绍每种权限类型，以说明如何设计解决方案。\n\
    \n## 使用宿主保护权限\n一个相当常见的`SQLCLR`模式是创建可以被调用者共享的静态集合。然而，与任何共享数据集一样，如果需要在初始加载后更新部分数据，适当的同步是至关重要的。从`SQLCLR`的角度来看，这变得棘手，因为线程和同步需要`UNSAFE`访问权限——授予如此开放级别的权限并非小事。\n\
    \n考虑一个可能使用静态集合的场景示例：一个用于基于汇率计算货币转换的`SQLCLR`用户定义函数：\n\n```csharp\n[SqlFunction]\n\
    public static SqlDecimal GetConvertedAmount(\n    SqlDecimal InputAmount,\n  \
    \  SqlString InCurrency,\n    SqlString OutCurrency)\n{\n    //Convert the input\
    \ amount to the base\n    decimal BaseAmount =\n        GetRate(InCurrency.Value)\
    \ *\n        InputAmount.Value;\n    //Return the converted base amount\n    return\
    \ (new SqlDecimal(\n        GetRate(OutCurrency.Value) * BaseAmount));\n}\n```\n\
    \n`GetConvertedAmount`方法内部使用了另一个方法`GetRate`：\n\n```csharp\nprivate static decimal\
    \ GetRate(string Currency)\n{\n    decimal theRate;\n    rwl.AcquireReaderLock(100);\n\
    \    try\n    {\n        theRate = rates[Currency];\n    }\n    finally\n    {\n\
    \        rwl.ReleaseLock();\n    }\n    return (theRate);\n}\n```\n\n`GetRate`在`rates`（一个`Dictionary<string,\
    \ decimal>`的静态泛型实例）中执行查找。此集合包含系统中给定货币的汇率。为了防止另一个线程恰好正在更新`rates`时会发生的问题，同步是使用`rwl`（一个`ReaderWriterLock`的静态实例）来处理的。字典和`ReaderWriterLock`都在类的方法首次被调用时实例化，并且都被标记为`readonly`，以避免在实例化后被覆盖：\n\
    \n```csharp\nstatic readonly Dictionary<string, decimal>\n    rates = new Dictionary<string,\
    \ decimal>();\nstatic readonly ReaderWriterLock\n    rwl = new ReaderWriterLock();\n\
    ```\n\n如果使用`SAFE`或`EXTERNAL_ACCESS`权限集进行编目，此代码会因使用同步机制（`ReaderWriterLock`）而失败，运行它会产生`HostProtectionException`。解决方案是将受影响的代码移动到它自己的程序集中，并编目为`UNSAFE`。因为宿主保护检查是在程序集中方法即时编译时评估的，而不是在方法运行动态进行的，检查是在跨越程序集边界时完成的。这意味着外部方法可以被标记为`SAFE`，并通过调用`UNSAFE`核心来临时提升其权限。\n\
    \n> **注意**：你可能会对这个示例的有效性产生疑问，因为使用纯`T-SQL`可以轻松实现此系统，从而彻底消除权限问题。我确实认为这是一个现实的例子，特别是如果系统需要在任何给定日期进行大量货币转换。`SQLCLR`代码即使对于简单的数学工作通常也优于`T-SQL`，并且将数据缓存在共享集合中而不是每次调用都从数据库读取，是一个巨大的效率提升。我确信这个解决方案会轻松优于任何纯`T-SQL`等效方案。\n\
    \n在设计`UNSAFE`程序集时，从重用的角度仔细分析应该公开哪些功能是很重要的。在此情况下，导致问题的并不是字典的使用——抛出实际异常的是通过`ReaderWriterLock`的同步。然而，仅仅围绕`ReaderWriterLock`包装一个方法可能不会促进太多重用。我认为更好的策略是将`Dictionary`和`ReaderWriterLock`包装在一起，创建一个新的`ThreadSafeDictionary`类。这个类可以在任何需要共享数据缓存的场景中使用。\n\
    \n以下是我的`ThreadSafeDictionary`实现；我没有实现泛型`Dictionary`类公开的所有方法，而只实现了我常用的那些——即`Add`、`Remove`和`ContainsKey`：\n\
    \n```csharp\nusing System;\nusing System.Collections.Generic;\nusing System.Text;\n\
    using System.Threading;\n\nnamespace SafeDictionary\n{\n    public class ThreadSafeDictionary<K,\
    \ V>\n    {\n        private readonly Dictionary<K, V> dict = new Dictionary<K,V>();\n\
    \        private readonly ReaderWriterLock theLock = new ReaderWriterLock();\n\
    \n        public void Add(K key, V value)\n        {\n            theLock.AcquireWriterLock(2000);\n\
    \            try\n            {\n                dict.Add(key, value);\n     \
    \       }\n            finally\n            {\n                theLock.ReleaseLock();\n\
    \            }\n        }\n\n        public V this[K key]\n        {\n       \
    \     get\n            {\n                theLock.AcquireReaderLock(2000);\n \
    \               try\n                {\n                    return (this.dict[key]);\n\
    \                }\n                finally\n                {\n             \
    \       theLock.ReleaseLock();\n                }\n            }\n           \
    \ set\n            {\n                theLock.AcquireWriterLock(2000);\n     \
    \           try\n                {\n                    dict[key] = value;\n \
    \               }\n                finally\n                {\n              \
    \      theLock.ReleaseLock();\n                }\n            }\n        }\n\n\
    \        public bool Remove(K key)\n        {\n            theLock.AcquireWriterLock(2000);\n\
    \            try\n            {\n                return (dict.Remove(key));\n\
    \            }\n            finally\n            {\n                theLock.ReleaseLock();\n\
    \            }\n        }\n\n        public bool ContainsKey(K key)\n        {\n\
    \            theLock.AcquireReaderLock(2000);\n            try\n            {\n\
    \                return (dict.ContainsKey(key));\n            }\n            finally\n\
    \            {\n                theLock.ReleaseLock();\n            }\n      \
    \  }\n    }\n}\n```\n"
- fmt: "# SQLCLR: Architecture and Design Considerations\n\n## Note\n\nDepending on\
    \ whether your database has the `TRUSTWORTHY` option enabled and whether your\
    \ assemblies are strongly named, things may not be quite as simple as I’ve implied\
    \ here. The examples in both this and the next section may fail either at deployment\
    \ time, if your core assembly doesn’t have the correct permissions; or at runtime,\
    \ if you’ve decided to go with a strongly named assembly. See the section “Granting\
    \ Cross-Assembly Privileges” later in this chapter for more information. In the\
    \ meantime, if you’re following along, work in a database with the `TRUSTWORTHY`\
    \ option turned on, and forgo the strong naming for now.\n\n## Working with Code\
    \ Access Security Privileges\n\nHPA-protected resources are quite easy to encapsulate,\
    \ thanks to the fact that permissions for a given method are checked when the\
    \ method is just-in-time compiled. Alas, things are not quite so simple when working\
    \ with CAS-protected resources, due to the fact that grants are checked dynamically\
    \ at runtime via a stack walk. This means that simply referencing a second assembly\
    \ is not enough—the entire stack is walked each time, without regard to assembly\
    \ boundaries.\n\nTo illustrate this issue, create a new assembly containing the\
    \ following method, which reads all of the lines from a text file and returns\
    \ them as a collection of strings:\n\n```csharp\npublic static string[] ReadFileLines(string\
    \ FilePath)\n{\n    List<string> theLines = new List<string>();\n    using (System.IO.StreamReader\
    \ sr =\n        new System.IO.StreamReader(FilePath))\n    {\n        string line;\n\
    \        while ((line = sr.ReadLine()) != null)\n            theLines.Add(line);\n\
    \    }\n    return (theLines.ToArray());\n}\n```\n\nCatalog the assembly in SQL\
    \ Server with the `EXTERNAL_ACCESS` permission set. Now let’s revisit the `CAS_Exception`\
    \ stored procedure created earlier this chapter, which was contained in a `SAFE`\
    \ assembly, and threw an exception when used to access a local file resource.\
    \ Edit the `CAS_Exception` assembly to include a reference to the assembly containing\
    \ the `ReadFileLines` method, and modify the stored procedure as follows:\n\n\
    ```csharp\n[SqlProcedure]\npublic static void CAS_Exception()\n{\n    SqlContext.Pipe.Send(\"\
    Starting...\");\n    string[] theLines =\n        FileLines.ReadFileLines(@\"\
    C:\\b.txt\");\n    SqlContext.Pipe.Send(\"Finished...\");\n    return;\n}\n```\n\
    \nNote that I created my `ReadFileLines` method inside a class called `FileLines`;\
    \ reference yours appropriately depending on what class name you used. Once you’ve\
    \ finished the modifications, redeploy the outer assembly, making sure that it\
    \ is cataloged as `SAFE`.\n\nRunning the modified version of this stored procedure,\
    \ you’ll find that even though an assembly boundary is crossed, you will receive\
    \ the same exception as before. The CAS grant did not change simply because a\
    \ more highly privileged assembly was referenced, due to the fact that the stack\
    \ walk does not take into account permissions held by referenced assemblies.\n\
    \nWorking around this issue requires taking control of the stack walk within the\
    \ referenced assembly.\n\nSince the assembly has enough privilege to do file operations,\
    \ it can internally demand that the stack walk discontinue checks for file I/O\
    \ permissions, even when called from another assembly that does not have the requisite\
    \ permissions. This is done by using the `Assert` method of the `IStackWalk` interface,\
    \ exposed in .NET’s `System.Security` namespace.\n\nTaking a second look at the\
    \ CAS violation shown previously, note that the required permission is `FileIOPermission`,\
    \ which is in the `System.Security.Permissions` namespace. The `FileIOPermission`\
    \ class—in addition to other “permission” classes in that namespace—implements\
    \ the `IStackWalk` interface. To avoid the CAS exception, simply instantiate an\
    \ instance of the `FileIOPermission` class and call the `Assert` method. The following\
    \ code is a modified version of the `ReadFileLines` method that uses this technique:\n\
    \n```csharp\npublic static string[] ReadFileLines(string FilePath)\n{\n    //Assert\
    \ that anything File IO-related that this\n    //assembly has permission to do,\
    \ callers can do\n    FileIOPermission fp = new FileIOPermission(\n        PermissionState.Unrestricted);\n\
    \    fp.Assert();\n\n    List<string> theLines = new List<string>();\n    using\
    \ (System.IO.StreamReader sr =\n        new System.IO.StreamReader(FilePath))\n\
    \    {\n        string line;\n        while ((line = sr.ReadLine()) != null)\n\
    \            theLines.Add(line);\n    }\n    return (theLines.ToArray());\n}\n\
    ```\n\nThis version of the method instantiates the `FileIOPermission` class with\
    \ the `PermissionState.Unrestricted` enumeration, thereby enabling all callers\
    \ to do whatever file I/O–related activities the assembly has permission to do.\
    \ The use of the term “unrestricted” in this context is not as dangerous as it\
    \ sounds; the access is unrestricted in the sense that permission is allowed for\
    \ only as much access as the assembly already has to the file system. After making\
    \ the modifications shown here and redeploying both assemblies, the CAS exception\
    \ will no longer be an issue.\n\nTo allow you to control things on a more granular\
    \ level, the `FileIOPermission` class exposes other constructor overloads with\
    \ different options. The most useful of these for this example uses an enumeration\
    \ called `FileIOPermissionAccess` in conjunction with the path to a file, allowing\
    \ you to limit the permissions granted to the caller to only specific operations\
    \ on a named file. For instance, to limit access so that the caller can only read\
    \ the file specified in this example, use the following constructor:\n\n```csharp\n\
    FileIOPermission fp = new FileIOPermission(\n    FileIOPermissionAccess.Read,\n\
    \    \"C:\\b.txt\");\n```\n\nFile I/O is only one of many kinds of permissions\
    \ for which you might see a CAS exception. The important thing is being able to\
    \ identify the pattern. In all cases, violations will throw a `SecurityException`\
    \ and reference a permission class in the `System.Security.Permissions` namespace.\n\
    \nEach class follows the same basic pattern outlined here, so you should be able\
    \ to easily use this technique in order to design any number of privilege escalation\
    \ solutions.\n\n## Granting Cross-Assembly Privileges\n\nThe examples in the preceding\
    \ sections were simplified a bit in order to focus the text on a single issue\
    \ at a time. There are two other issues you need to be concerned with when working\
    \ with cross-assembly calls: database trustworthiness and strong naming.\n\n###\
    \ Database Trustworthiness\n\nThe idea of a “trustworthy” database is a direct\
    \ offshoot of Microsoft’s heightened awareness of security issues in recent years.\
    \ Marking a database as trustworthy is a simple matter of setting an option using\
    \ `ALTER DATABASE`:"
  raw: 'This class should be placed into a new assembly, which should then be compiled
    and cataloged in SQL Server as UNSAFE. A reference to the UNSAFE assembly should
    be used in the exchange rates conversion assembly, after which a few lines of
    the previous example code will have to change. First of all, the only static object
    that must be created is an instance of ThreadSafeDictionary:


    static readonly ThreadSafeDictionary<string, decimal> rates =


    new ThreadSafeDictionary<string, decimal>();


    Since the ThreadSafeDictionary is already thread safe, the GetRate method no longer
    needs to be concerned with synchronization. Without this requirement, its code
    becomes greatly simplified: private static decimal GetRate(string Currency)


    {


    return (rates[Currency]);


    }


    The exchange rates conversion assembly can still be marked SAFE, and can now make
    use of the encapsulated synchronization code without throwing a HostProtectionException.
    And none of the code actually contained in the assembly will be able to use resources
    that violate the permissions allowed by the SAFE bucket—quite an improvement over
    the initial implementation, from a security perspective.


    CHAPTER


    „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    „ **Note** Depending on whether your database has the TRUSTWORTHY option enabled
    and whether your assemblies are strongly named, things may not be *quite* as simple
    as I’ve implied here. The examples in both this and the next section may fail
    either at deployment time, if your core assembly doesn’t have the correct permissions;
    or at runtime, if you’ve decided to go with a strongly named assembly. See the
    section “Granting Cross-Assembly Privileges” later in this chapter for more information.
    In the meantime, if you’re following along, work in a database with the TRUSTWORTHY
    option turned on, and forgo the strong naming for now.


    Working with Code Access Security Privileges


    HPA-protected resources are quite easy to encapsulate, thanks to the fact that
    permissions for a given method are checked when the method is just-in-time compiled.
    Alas, things are not quite so simple when working with CAS-protected resources,
    due to the fact that grants are checked dynamically at runtime via a stack walk.
    This means that simply referencing a second assembly is not enough—the entire
    stack is walked each time, without regard to assembly boundaries.


    To illustrate this issue, create a new assembly containing the following method,
    which reads all of the lines from a text file and returns them as a collection
    of strings:


    public static string[] ReadFileLines(string FilePath)


    {


    List<string> theLines = new List<string>();


    using (System.IO.StreamReader sr =


    new System.IO.StreamReader(FilePath))


    {


    string line;


    while ((line = sr.ReadLine()) != null)


    theLines.Add(line);


    }


    return (theLines.ToArray());


    }


    Catalog the assembly in SQL Server with the EXTERNAL_ACCESS permission set. Now
    let’s revisit the CAS_Exception stored procedure created earlier this chapter,
    which was contained in a SAFE assembly, and threw an exception when used to access
    a local file resource. Edit the CAS_Exception assembly to include a reference
    to the assembly containing the ReadFileLines method, and modify the stored procedure
    as follows:


    [SqlProcedure]


    public static void CAS_Exception()


    {


    SqlContext.Pipe.Send("Starting...");


    CHAPTER 7 „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    string[] theLines =


    FileLines.ReadFileLines(@"C:\b.txt");


    SqlContext.Pipe.Send("Finished...");


    return;


    }


    Note that I created my ReadFileLines method inside a class called FileLines; reference
    yours appropriately depending on what class name you used. Once you’ve finished
    the modifications, redeploy the outer assembly, making sure that it is cataloged
    as SAFE.


    Running the modified version of this stored procedure, you’ll find that even though
    an assembly boundary is crossed, you will receive the same exception as before.
    The CAS grant did not change simply because a more highly privileged assembly
    was referenced, due to the fact that the stack walk does not take into account
    permissions held by referenced assemblies.


    Working around this issue requires taking control of the stack walk within the
    referenced assembly.


    Since the assembly has enough privilege to do file operations, it can internally
    demand that the stack walk discontinue checks for file I/O permissions, even when
    called from another assembly that does not have the requisite permissions. This
    is done by using the Assert method of the IStackWalk interface, exposed in .NET’s
    System.Security namespace.


    Taking a second look at the CAS violation shown previously, note that the required
    permission is FileIOPermission, which is in the System.Security.Permissions namespace.
    The FileIOPermission class—in addition to other “permission” classes in that namespace—implements
    the IStackWalk


    interface. To avoid the CAS exception, simply instantiate an instance of the FileIOPermission
    class and call the Assert method. The following code is a modified version of
    the ReadFileLines method that uses this technique:


    public static string[] ReadFileLines(string FilePath)


    {


    //Assert that anything File IO-related that this


    //assembly has permission to do, callers can do


    FileIOPermission fp = new FileIOPermission(


    PermissionState.Unrestricted);


    fp.Assert();


    List<string> theLines = new List<string>();


    using (System.IO.StreamReader sr =


    new System.IO.StreamReader(FilePath))


    {


    string line;


    while ((line = sr.ReadLine()) != null)


    theLines.Add(line);


    }


    return (theLines.ToArray());


    }


    This version of the method instantiates the FileIOPermission class with the


    PermissionState.Unrestricted enumeration, thereby enabling all callers to do whatever
    file I/O–related activities the assembly has permission to do. The use of the
    term “unrestricted” in this context is not as 174


    CHAPTER


    „ SQLCLR: ARCHITECTURE AND DESIGN CONSIDERATIONS


    dangerous as it sounds; the access is unrestricted in the sense that permission
    is allowed for only as much access as the assembly already has to the file system.
    After making the modifications shown here and redeploying both assemblies, the
    CAS exception will no longer be an issue.


    To allow you to control things on a more granular level, the FileIOPermission
    class exposes other constructor overloads with different options. The most useful
    of these for this example uses an enumeration called FileIOPermissionAccess in
    conjunction with the path to a file, allowing you to limit the permissions granted
    to the caller to only specific operations on a named file. For instance, to limit
    access so that the caller can only read the file specified in this example, use
    the following constructor: FileIOPermission fp = new FileIOPermission(


    FileIOPermissionAccess.Read,


    "C:\b.txt");


    File I/O is only one of many kinds of permissions for which you might see a CAS
    exception. The important thing is being able to identify the pattern. In all cases,
    violations will throw a SecurityException and reference a permission class in
    the System.Security.Permissions namespace.


    Each class follows the same basic pattern outlined here, so you should be able
    to easily use this technique in order to design any number of privilege escalation
    solutions.


    Granting Cross-Assembly Privileges


    The examples in the preceding sections were simplified a bit in order to focus
    the text on a single issue at a time. There are two other issues you need to be
    concerned with when working with cross-assembly calls: **database trustworthiness**
    and **strong naming**.


    Database Trustworthiness


    The idea of a “trustworthy” database is a direct offshoot of Microsoft’s heightened
    awareness of security issues in recent years. Marking a database as trustworthy
    is a simple matter of setting an option using ALTER DATABASE:'
