    \n> **重要提示**：一旦激活`Resource Governor`，分类器函数将运行以分类*每一个*传入服务器的连接，并管理该会话可用的资源。因此，至关重要的是确保此函数经过彻底测试和优化，否则可能会危及你的系统。\n\
    \n> **提示**：所有通过专用管理员连接（DAC）发出的查询都在内部工作负载组和资源池中运行，不受分类约束。如果分类器函数出现问题，你可能会发现需要通过\
    \ DAC 连接到`SQL Server 2008`来调查和修复问题。\n\n## 激活资源调控器\n\n最后，将`Resource Governor`绑定到分类器函数并激活，如下所示：\n\
    \n```sql\nALTER RESOURCE GOVERNOR\nWITH ( CLASSIFIER_FUNCTION = dbo.RGClassifier\
    \ );\nGO\n\nALTER RESOURCE GOVERNOR RECONFIGURE;\n\nGO\n```\n\n## 监控性能\n\n既然我们已经设置了基本的资源调控器基础设施，就需要某种方法来监控高并发环境下的性能影响。为此，打开系统性能监视器控制台（`perfmon.exe`）。右键单击性能图，然后选择“添加计数器”菜单选项。向下滚动可用计数器列表，当看到`SQL\
    \ Server:Workload Group Stats`标题时，单击为`GroupA`和`GroupB`添加`CPU Usage %`度量。这些步骤如图\
    \ 9-1 所示。\n\n**图 9-1. 为 GroupA 和 GroupB 添加 CPU 使用率百分比性能计数器**\n\n## 控制资源分配\n\n\
    `Resource Governor`最基本的用途之一是为分配给不同资源池的 CPU 和服务器内存设置明确的最小和最大级别。为了演示应用这些限制的效果，我们首先需要在服务器上施加一些负载。打开\
    \ RML 命令提示符，使用`ostress`工具设置由`UserA`发出的查询，如下所示：\n\n```\nostress -U\"UserA\" -P\"\
    password\" -Q\"WHILE(1=1) SELECT REPLICATE('a',4000);\" -n5 –q\n```\n\n接下来，打开第二个\
    \ RML 命令提示符并输入以下由`UserB`发出的请求：\n\n```\nostress -U\"UserB\" -P\"password\" -Q\"\
    WHILE(1=1) SELECT REPLICATE('b',4000);\" -n5 -q -o\"C:\\UserB\"\n```\n\n每个查询都将发出一个循环的、相对\
    \ CPU 密集型的查询，该查询将跨五个独立线程无限重复。我们可以通过检查`sys.dm_resource_governor_workload_groups`\
    \ DMV 来确认分类器函数是否正常工作，如下列代码清单所示：\n\n```sql\nSELECT\n    name,\n    total_request_count\n\
    FROM\n    sys.dm_resource_governor_workload_groups\nWHERE\n    name IN ('GroupA',\
    \ 'GroupB');\n```\n\n结果显示，每个工作负载组下都有五个正在运行的请求。现在检查性能监视器图。在我的系统上，这如图 9-2 所示。\n\n\
    **图 9-2. 两个默认工作负载组的平衡性能**\n\n## 调整 CPU 限制\n\n正如我们保留了所有资源调控器设置为默认值所预期的那样，图中显示两个工作负载之间的\
    \ CPU 使用率百分比大致均等。那么现在让我们尝试改变一下。首先，我们将尝试限制分配给两个资源池的 CPU 资源：\n\n```sql\nALTER RESOURCE\
    \ POOL PoolA\nWITH ( MAX_CPU_PERCENT = 10 );\n\nALTER RESOURCE POOL PoolB\nWITH\
    \ ( MAX_CPU_PERCENT = 10 );\n\nALTER RESOURCE GOVERNOR RECONFIGURE;\n\nGO\n```\n\
    \n执行此代码后，你可能会惊讶地发现，图表没有任何变化。那么为什么`Resource Governor`似乎忽略了我们指定的`MAX_CPU_PERCENT`，并且未能将两个资源池限制在\
    \ 10%的 CPU 呢？这说明了`Resource Governor`分配资源的方式的一个重要点——`MAX_CPU_PERCENT`值并非规定 CPU\
    \ 使用的硬性限制，而是在*资源存在争用时*用于平衡竞争请求。\n\n在这种情况下，由于所有资源池的声明性`MAX_CPU_PERCENT`总和小于 100%，因此不存在争用。SQL\
    \ Server OS 总是会尝试最大化 CPU 资源使用率，因此如果有空闲 CPU 可用，它将在可用池之间分配。资源池的`MAX_CPU_PERCENT`仅在超出该限制会阻止另一个资源池被授予其请求的最大\
    \ CPU 设置的情况下强制执行。\n\n> **注意**：在测试使用限制为`MAX_CPU_PERCENT`的资源池执行的应用程序时，重要的是要记住，仅当存在来自其他资源池对该\
    \ CPU 资源的争用时，该限制才会被强制执行。因此，你应该始终在具有竞争性并发进程的环境中进行测试。\n\n考虑到这一点，让我们现在尝试另一个例子。在此示例中，我们将确保两个资源池的`MAX_CPU_PERCENT`总和为\
    \ 100%，这样任何一个都不允许超过该限制（否则另一个将被拒绝 CPU 资源）：\n\n```sql\nALTER RESOURCE POOL PoolA\n\
    WITH ( MAX_CPU_PERCENT = 90 );\n\nALTER RESOURCE POOL PoolB\nWITH ( MAX_CPU_PERCENT\
    \ = 10 );\n\nALTER RESOURCE GOVERNOR RECONFIGURE;\n\nGO\n```\n\n遵循前面解释的规则，你现在可能期望`PoolA`和`PoolB`之间的\
    \ CPU 使用率按 90:10 的比例分配，并且根据你的系统，这可能是你现在在性能监视器图上观察到的结果。然而，我的系统上的图表*仍然*显示两个工作负载组之间几乎没有可察觉的差异，如图\
    \ 9-3 所示。\n\n**图 9-3. CPU 使用率百分比**\n"
- fmt: "# CHAPTER 9: DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY\n\n## The explanation\
    \ of the behavior shown in Figure 9-3 is that the `MAX_CPU_PERCENT` limit (and\
    \ other resource pool options) used by the Resource Governor are specified at\
    \ a *per scheduler* level. In other words, the `MAX_CPU_PERCENT` setting is used\
    \ to allocate the amount of CPU resource granted to a resource pool, as a percent\
    \ of the CPU on which the process is running. I’m running these tests on a multiprocessor\
    \ computer, which means that the queries under each workload group are split across\
    \ separate CPUs. I can confirm this by executing the following:\n\n```sql\nSELECT\n\
    \    rgwg.name AS group_name,\n    est.text AS SQL,\n    ot.scheduler_id,\n  \
    \  cpu_id,\n    er.status\nFROM\n    sys.dm_exec_requests er\n    JOIN sys.dm_os_tasks\
    \ ot ON er.task_address = ot.task_address\n    JOIN sys.dm_resource_governor_workload_groups\
    \ rgwg\n        ON er.group_id = rgwg.group_id\n    JOIN sys.dm_os_schedulers\
    \ os ON ot.scheduler_id = os.scheduler_id\n    CROSS APPLY sys.dm_exec_sql_text(er.sql_handle)\
    \ est\nWHERE\n    rgwg.name IN ('GroupA', 'GroupB');\n```\n\nThe results indicate\
    \ that the two queries are being executed under different schedulers executing\
    \ on different CPUs:\n\n```\ngroup_name    SQL                               \
    \           scheduler_id    cpu_id    status\n------------  -------------------------------------------\
    \  --------------  --------  -------\nGroupA        WHILE(1=1) SELECT REPLICATE('a'...\
    \           0               0         running\nGroupB        WHILE(1=1) SELECT\
    \ REPLICATE('b'...           1               1         runnable\n```\n\nSince\
    \ each query is executing against a separate scheduler, once again there is no\
    \ contention for CPU resource, and so the `MAX_CPU_PERCENT` limit is not enforced.\n\
    \n## In order to be able to demonstrate the effects of the Resource Governor more\
    \ clearly, it is necessary to constrain the execution of SQL Server threads to\
    \ a single CPU by setting the affinity mask as follows:\n\n```sql\nsp_configure\
    \ 'show advanced options', 1;\nRECONFIGURE;\nGO\n\nsp_configure 'affinity mask',\
    \ 1;\nRECONFIGURE;\nGO\n```\n\n**Caution**: Calling `sp_configure 'affinity mask'`\
    \ with the bitmask value `1` will assign all SQL Server threads to Processor `0`,\
    \ irrespective of how many CPU cores are present on the system. You should exercise\
    \ extreme caution when setting this option, even in testing environments.\n\n\
    ## The results of changing the CPU affinity mask on my system are shown in Figure\
    \ 9-4.\n\nFinally, it appears that we are close to the result we were expecting,\
    \ but rather than seeing the split between the resource pools as 90:10, it appears\
    \ to be 45:5—this is the correct ratio between the pools, but what has happened\
    \ to the other 50 percent of resource?\n\nThe reason for this is that the “CPU\
    \ usage %” performance counter is normalized based on the number of CPUs on the\
    \ server. In this case, I am running the tests on a dual-processor machine, but\
    \ I’ve just set the SQL Server affinity mask to only allow SQL Server processor\
    \ threads on one processor. As a result, all measurements for CPU usage percentage\
    \ are half their expected value, with a maximum CPU usage figure of 50 percent.\n\
    \n![](index-297_1.png)\n\n*Figure 9-4\\. CPU usage between resource pools after\
    \ setting CPU affinity to a single processor*\n\n## Calculating Effective and\
    \ Shared Maximum Resource Allocation\n\nIn a highly concurrent environment, it\
    \ is rare for every request to be treated equally. In many cases, it is a business\
    \ requirement to ensure that certain defined groups of users or specific sets\
    \ of queries receive preferential treatment to guarantee fast response times.\
    \ Special treatment may be required for queries from high-priority users or queries\
    \ that must be completed within a certain timeframe in order to ensure that customer\
    \ service level agreements are met.\n\nSo far, I have demonstrated how the Resource\
    \ Governor can be used to limit the maximum server resource usage in certain scenarios,\
    \ but a more practical situation involves guaranteeing the *minimum* resource\
    \ available to a query. By setting appropriate limits on the `MAX_CPU_PERCENT`\
    \ and `MIN_CPU_PERCENT` of different resource pools (and the corresponding `MIN_MEMORY_PERCENT`\
    \ and `MAX_MEMORY_PERCENT`), it is easy to classify preferential requests to a\
    \ dedicated resource pool that receives a guaranteed minimum share of the server\
    \ CPU and memory resource while capping the resource given to other pools.\n\n\
    To understand the interplay between settings of different pools, suppose that\
    \ we want `PoolA` to be our preferential pool and `PoolB` to be our normal pool.\
    \ To achieve this, we will state that `PoolA` should have a minimum CPU resource\
    \ of 30 percent and a maximum of 90 percent. We will state a minimum of 0 percent\
    \ CPU for `PoolB`, and a maximum CPU limit of 50 percent. These changes can be\
    \ made using the following T-SQL:\n\n```sql\nALTER RESOURCE POOL PoolA\nWITH (\n\
    \    MIN_CPU_PERCENT = 30,\n    MAX_CPU_PERCENT = 90\n);\n\nALTER RESOURCE POOL\
    \ PoolB\nWITH (\n    MIN_CPU_PERCENT = 0,\n    MAX_CPU_PERCENT = 50\n);\n\nALTER\
    \ RESOURCE GOVERNOR RECONFIGURE;\nGO\n```\n\nNow, how do these settings affect\
    \ the way in which resources are allocated between the pools?\n\nRemember that\
    \ the `MAX_CPU_PERCENT` limit is only enforced when there is contention for resource.\
    \ `PoolA` specifies a minimum server CPU usage of 30 percent. However, since `PoolB`\
    \ only requests a maximum of 50 percent of CPU, both of these requests can be\
    \ granted without contention. The **effective maximum** CPU usage of each pool\
    \ in this case is therefore the same as the requested max: 90 percent for `PoolA`\
    \ and 50 percent for `PoolB`.\n\nFor `PoolA`, 30 percent of the effective maximum\
    \ CPU comes from dedicated resource, while the remaining 60 percent comes from\
    \ the shared resource pool, and is therefore dependent on other demands of other\
    \ requests on the server. `PoolB` has no stated minimum CPU percent, so all of\
    \ the effective maximum CPU usage of 50 percent comes from the shared resource\
    \ pool.\n\n**Note**: For more information on effective maximum limits, see the\
    \ following Books Online page: http://msdn.microsoft.com/en-us/library/bb934084.aspx.\n\
    \nLet’s now see what would happen if we were to create a third resource pool,\
    \ as follows:\n\n```sql\nCREATE RESOURCE POOL PoolC\nWITH (\n    MIN_CPU_PERCENT\
    \ = 15,\n    MAX_CPU_PERCENT = 100\n);\n```\n\nThe effect of creating this new\
    \ resource pool is as follows:\n\n*   `PoolA` now has an effective maximum CPU\
    \ usage of 85 percent. The previous effective maximum of 90 percent must be reduced\
    \ to ensure that `PoolC`’s `MIN_CPU_PERCENT` request of 15 percent can be granted.\
    \ `PoolA` now receives 55 percent of its maximum effective CPU resource from the\
    \ shared resource pool.\n*   `PoolB` remains unchanged, with an effective maximum\
    \ of 50 percent of CPU resource, all of which is taken from the shared resource\
    \ pool.\n*   `PoolC` has an effective maximum of 70 percent of CPU resource (since\
    \ `PoolA`’s minimum request of 30 percent must be granted), with 55 percent of\
    \ this resource coming from the shared resource pool.\n\nNote that in this section\
    \ I have only demonstrated the allocation of CPU resource using `MIN_CPU_PERCENT`\
    \ and `MAX_CPU_PERCENT`, but the same resource-balancing rules can be applied\
    \ to memory resource assigned to resource pools using `MIN_MEMORY_PERCENT` and\
    \ `MAX_MEMORY_PERCENT`. By setting appropriate limits for each resource pool,\
    \ it is possible to balance the requirements of different categories of requests\
    \ when there is competition for limited resources on the server. Always remember\
    \ that these are not hard limits, but are used to calculate how resources are\
    \ allocated when there is contention. When there is no contention, a resource\
    \ pool may consume all of the available resources on the server, even if other\
    \ resource pools have specified minimum values.\n\n## Controlling Concurrent Request\
    \ Processing"
