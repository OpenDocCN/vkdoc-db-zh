    \n*图 3-1. 服务器活动收集报告*\n\n## 分析性能数据\n\n在上一节中，我讨论了如何使用多种不同的工具和技术捕获 SQL Server 性能数据。在本节中，让我们考虑应该监控哪些数据，以及如何分析这些数据以构建数据库性能概况。\n\
