    The types of questions generally posed against a hierarchy are somewhat different
    from the example graph traversal questions examined in the previous section. For
    adjacency lists as well as the other hierarchical models discussed in this chapter,
    we’ll consider how to answer the following common questions:


    •


    What are the **direct descendants** of a given node? In other words, who are the


    people who directly report to a given manager?


    •


    What are *all* of the descendants of a given node? Which is to say, how many people


    all the way down the organizational hierarchy ultimately report up to a given


    manager? The challenge here is how to sort the output so that it makes sense with


    regard to the hierarchy.


    •


    What is the path from a given child node back to the root node? In other words,


    following the management path up instead of down, who reports to whom?


    I will also discuss the following data modification challenges:


    •


    Inserting a new node into the hierarchy, as when a new employee is hired


    •


    Relocating a subtree, such as might be necessary if a division gets moved under
    a


    new manager


    •


    Deleting a node from the hierarchy, which might, for example, need to happen in


    an organizational hierarchy due to attrition


    Each of the techniques discussed in this chapter have slightly different levels
    of difficulty with regard to the complexity of solving these problems, and I will
    make general suggestions on when to use each model.


    Finding Direct Descendants


    Finding the direct descendants of a given node is quite straightforward in an
    adjacency list hierarchy; it’s the same as finding the available nodes to which
    you can traverse in a graph. Start by choosing the parent node for your query,
    and select all nodes for which that node is the parent. To find all employees
    that report directly to the CEO (EmployeeID 109), use the following T-SQL:


    SELECT *


    FROM Employee_Temp


    WHERE ManagerID = 109;


    This query returns the results shown following, showing the six branches of AdventureWorks,


    represented by its upper management team—exactly the results that we expected.


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    EmployeeID ManagerID Title


    6 109 Marketing Manager


    12 109 Vice President of Engineering


    42 109 Information Services Manager


    140 109 Chief Financial Officer


    148 109 Vice President of Production


    273 109 Vice President of Sales


    However, this query has a hidden problem: traversing from node to node in the
    Employee_Temp table means searching based on the ManagerID column. Considering
    that this column is not indexed, it should come as no surprise that the query
    plan for the preceding query involves a scan, as shown in Figure 12-8.


    *Figure 12-8\. Querying on the ManagerID causes a table scan.*


    To eliminate this issue, an index on the ManagerID column must be created. However,
    choosing exactly how best to index a table such as this one can be difficult.
    In the case of this small example, a clustered index on ManagerID would yield
    the best overall mix of performance for both querying and data updates, by covering
    all queries that involve traversing the table. However, in an actual production
    system, there might be a much higher percentage of queries based on the EmployeeID—for
    instance, queries to get a single employee’s data—and there would probably be
    a lot more columns in the table than the three used here for example purposes,
    meaning that clustered key lookups could be expensive.


    In such a case, it is important to test carefully which combination of indexes
    delivers the best balance of query and data modification performance for your
    particular workload.


    In order to show the best possible performance in this case, change the primary
    key to use a nonclustered index and create a clustered index on ManagerID, as
    shown in the following T-SQL: ALTER TABLE Employee_Temp


    DROP CONSTRAINT FK_Manager, PK_Employee;


    CREATE CLUSTERED INDEX IX_Manager


    ON Employee_Temp (ManagerID);


    ALTER TABLE Employee_Temp


    ADD CONSTRAINT PK_Employee


    PRIMARY KEY NONCLUSTERED (EmployeeID);


    GO'
