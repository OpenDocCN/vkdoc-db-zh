- fmt: 'Defensive programming is a methodology used in software development that suggests
    that developers should proactively anticipate and make allowances for (or “defend
    against”) unforeseen future events.


    The objective of defensive programming is to create applications that can remain
    robust and effective, even when faced with unexpected situations.


    Defensive programming essentially involves taking a pessimistic view of the world—if
    something can go wrong, it will: network resources will become unavailable halfway
    through a transaction; required files will be absent or corrupt; users will input
    data in any number of ways different from that expected, and so on. Rather than
    leave anything to chance, a defensive programmer will have predicted the possibility
    of these eventualities, and will have written appropriate handling code to check
    for and deal with these situations. This means that potential error conditions
    can be detected and handled before an actual error occurs.


    Note that defensive programming does not necessarily enable an application to
    continue when exceptional circumstances occur, but it does make it possible for
    the system to behave in a predictable, controlled way—degrading gracefully, rather
    than risking a crash with unknown consequences. In many cases, it may be possible
    to identify and isolate a particular component responsible for a failure, allowing
    the rest of the application to continue functioning.


    # CHAPTER 2: BEST PRACTICES FOR DATABASE PROGRAMMING


    There is no definitive list of defensive programming practices, but adopting a
    defensive stance to development is generally agreed to include the following principles:


    *   Keep things simple (or `KISS`—keep it simple, stupid). Applications are not
    made powerful and effective by their complexity, but by their elegant simplicity.
    Complexity allows bugs to be concealed, and should be avoided in both application
    design and in coding practice itself.

    *   “If it ain’t broke, fix it anyway.” Rather than waiting for things to break,
    defensive programming encourages continuous, proactive testing and future-proofing
    of an application against possible breaking changes in the future.

    *   Be challenging, thorough, and cautious at all stages and development. “What
    if?” analyses should be conducted in order to identify possible exceptional scenarios
    that might occur during normal (and abnormal) application usage.

    *   Extensive code reviews and testing should be conducted with different peer
    groups, including other developers or technical teams, consultants, end users,
    and management. Each of these different groups may have different implicit assumptions
    that might not be considered by a closed development team.

    *   Assumptions should be avoided wherever possible. If an application requires
    a certain condition to be true in order to function correctly, there should be
    an explicit assertion to this effect, and relevant code paths should be inserted
    to check and act accordingly based on the result.

    *   Applications should be built from short, highly cohesive, loosely coupled
    modules. Modules that are well encapsulated in this way can be thoroughly tested
    in isolation, and then confidently reused throughout the application. Reusing
    specific code modules, rather than duplicating functionality, reduces the chances
    of introducing new bugs.


    Throughout the remainder of this chapter, I''ll be providing simple examples of
    what I believe to be best practices demonstrating each of these principles, and
    these concepts will be continually reexamined in later chapters of this book.


    ## Attitudes to Defensive Programming


    The key advantages of taking a defensive approach to programming are essentially
    twofold:


    *   Defensive applications are typically robust and stable, require fewer essential
    bug fixes, and are more resilient to situations that may otherwise lead to expensive
    failures or crashes. As a result, they have a long expected lifespan, and relatively
    cheap ongoing maintenance costs.'
  raw: 'Defensive programming is a methodology used in software development that suggests
    that developers should proactively anticipate and make allowances for (or “defend
    against”) unforeseen future events.


    The objective of defensive programming is to create applications that can remain
    robust and effective, even when faced with unexpected situations.


    Defensive programming essentially involves taking a pessimistic view of the world—if
    something can go wrong, it will: network resources will become unavailable halfway
    through a transaction; required files will be absent or corrupt; users will input
    data in any number of ways different from that expected, and so on. Rather than
    leave anything to chance, a defensive programmer will have predicted the possibility
    of these eventualities, and will have written appropriate handling code to check
    for and deal with these situations. This means that potential error conditions
    can be detected and handled before an actual error occurs.


    Note that defensive programming does not necessarily enable an application to
    continue when


    exceptional circumstances occur, but it does make it possible for the system to
    behave in a predictable, controlled way—degrading gracefully, rather than risking
    a crash with unknown consequences. In many 23


    CHAPTER 2 „ BEST PRACTICES FOR DATABASE PROGRAMMING


    cases, it may be possible to identify and isolate a particular component responsible
    for a failure, allowing the rest of the application to continue functioning.


    There is no definitive list of defensive programming practices, but adopting a
    defensive stance to development is generally agreed to include the following principles:


    •


    Keep things simple (or KISS—keep it simple, stupid). Applications are not made


    powerful and effective by their complexity, but by their elegant simplicity.


    Complexity allows bugs to be concealed, and should be avoided in both


    application design and in coding practice itself.


    •


    “If it ain’t broke, fix it anyway.” Rather than waiting for things to break, defensive


    programming encourages continuous, proactive testing and future-proofing of an


    application against possible breaking changes in the future.


    •


    Be challenging, thorough, and cautious at all stages and development. “What if?”


    analyses should be conducted in order to identify possible exceptional scenarios


    that might occur during normal (and abnormal) application usage.


    •


    Extensive code reviews and testing should be conducted with different peer


    groups, including other developers or technical teams, consultants, end users,
    and


    management. Each of these different groups may have different implicit


    assumptions that might not be considered by a closed development team.


    •


    Assumptions should be avoided wherever possible. If an application requires a


    certain condition to be true in order to function correctly, there should be an


    explicit assertion to this effect, and relevant code paths should be inserted
    to


    check and act accordingly based on the result.


    •


    Applications should be built from short, highly cohesive, loosely coupled modules.


    Modules that are well encapsulated in this way can be thoroughly tested in


    isolation, and then confidently reused throughout the application. Reusing


    specific code modules, rather than duplicating functionality, reduces the chances


    of introducing new bugs.


    Throughout the remainder of this chapter, I''ll be providing simple examples of
    what I believe to be best practices demonstrating each of these principles, and
    these concepts will be continually reexamined in later chapters of this book.


