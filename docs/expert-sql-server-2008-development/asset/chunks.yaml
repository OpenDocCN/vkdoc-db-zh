    „ DESIGNING SYSTEMS FOR APPLICATION CONCURRENCY


    •


    PoolC has an effective maximum of 70 percent of CPU resource (since PoolA’s


    minimum request of 30 percent must be granted), with 55 percent of this resource


    coming from the shared resource pool.


    Note that in this section I have only demonstrated the allocation of CPU resource
    using


    MIN_CPU_PERCENT and MAX_CPU_PERCENT, but the same resource-balancing rules can
    be applied to memory resource assigned to resource pools using MIN_MEMORY_PERCENT
    and MAX_MEMORY_PERCENT. By setting appropriate limits for each resource pool,
    it is possible to balance the requirements of different categories of requests
    when there is competition for limited resources on the server. Always remember
    that these are not hard limits, but are used to calculate how resources are allocated
    when there is contention. When there is no contention, a resource pool may consume
