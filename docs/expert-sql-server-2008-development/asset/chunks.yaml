    # 第四章：错误与异常


    请注意，`XACT_ABORT` 仅影响运行时错误的行为，对编译期间生成的错误无效。回顾之前的示例，该示例演示了使用 `EXEC` 函数在较低作用域中引发的解析异常：


    ```

    EXEC(''SELECTxzy FROM SomeTable'');

    PRINT ''This will print!'';

    GO

    ```


    无论 `XACT_ABORT` 设置如何，此代码清单的结果都将保持不变，导致即使在异常发生后，`PRINT` 语句仍会被执行。


    除了控制异常行为，`XACT_ABORT` 还会修改异常发生时事务的行为方式。有关更多信息，请参阅本章后面的“事务与异常”部分。


    ## 剖析错误消息


    SQL Server 异常有几个不同的组成部分，每个部分都在错误消息文本中有所体现。每个异常都有一个关联的错误号、错误级别和状态。错误消息还可能包含其他诊断信息，包括行号和发生异常的过程名称。


    ### 错误号


    异常的错误号列在错误文本中的 `Msg` 之后。例如，以下异常的错误号为 156：


    ```

    Msg 156, Level 15, State 1, Line 1

    Incorrect syntax near the keyword ''FROM''.

    ```


    SQL Server 通常随异常一起返回错误消息，因此从解决问题的角度来看，拥有错误号通常没有额外帮助。然而，在某些情况下，知道错误号会很有用。例如，在使用
    `@@ERROR` 函数时，或在使用 `TRY/CATCH` 语法进行专门的错误处理时（有关这些主题的详细信息，请参阅本章后面的“使用 `@@ERROR`
    进行异常‘处理’”和“SQL Server 的 `TRY/CATCH` 语法”部分）。


    错误号也可用于从 `sys.messages` 目录视图中查找错误消息的本地化翻译。`message_id` 列包含错误号，`language_id` 列可用于获取正确语言的消息。例如，以下
    T-SQL 返回错误 208 的英文文本：


    ```

    SELECT text

    FROM sys.messages

    WHERE

    message_id = 208

    AND language_id = 1033;

    GO

    ```


    此查询的输出是一个错误消息模板，如下所示：


    ```

    Invalid object name ''%.*ls''.

    ```


    有关错误消息模板的更多信息，请参阅“SQL Server 的 `RAISERROR` 函数”部分。


    ### 错误级别


    错误消息中的 `Level` 标签表示一个介于 1 到 25 之间的数字。这个数字有时可用于对异常进行分类或确定其严重性。不幸的是，关键词是“有时”：SQL
    Server 分配的错误级别高度不一致，通常不应将其用于决定如何处理异常。


    根据其错误消息，以下异常的错误级别为 15：


    ```

    Msg 156, Level 15, State 1, Line 1

    Incorrect syntax near the keyword ''FROM''.

    ```


    每个异常的错误级别可以从 `sys.messages` 视图中查询，使用 `severity` 列。严重性小于 11 表示消息是**警告**。如果严重性大于或等于
    11，则该消息被视为**错误**，并可分为以下有文档记录的类别：


    *   错误级别 11 到 16 被文档记录为“用户可纠正的错误”。SQL Server 抛出的大多数异常都在此范围内，包括约束违规、解析和编译错误以及大多数其他运行时异常。

    *   错误级别 17 到 19 是更严重的异常。这些包括内存不足异常、磁盘空间异常、内部 SQL Server 错误及其他类似违规。其中许多在抛出时会自动记录到
    SQL Server 错误日志中。您可以通过检查 `sys.messages` 表中的 `is_event_logged` 列来识别那些被记录的异常。

    *   错误级别 20 到 25 是致命的连接和服务器级别异常。

