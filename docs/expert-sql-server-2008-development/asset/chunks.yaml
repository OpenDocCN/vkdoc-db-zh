  trans: '

    **提示** 你可以在同一张表上创建最多 249 个空间索引，并且可以在同一列上创建多个空间索引，为每个索引使用不同的设置。你可能会发现这对于索引分布不均匀的数据很有用。


    ## 网格分辨率

    选择正确的网格分辨率——即网格每个级别包含的单元格数量——是一个在索引提供的精度（即“围绕要素的贴合紧密度”）与获取该精度所需的网格单元格数量之间进行权衡的问题。网格每一级的分辨率可以独立设置为三种分辨率之一：`LOW`
    对应一个 `4×4` 网格，`MEDIUM` 对应一个 `8×8` 网格，`HIGH` 对应一个 `16×16` 网格。如果你设置一个低网格分辨率（即，索引包含数量较少、相对较大的网格单元格），那么主筛选器可能会返回更多的误报——即那些与网格单元格相交但并未实际与所讨论几何体相交的要素。这些误报将导致次级筛选器需要完成更多工作，从而导致查询性能下降。然而，如果你设置一个高网格分辨率（即，索引包含大量网格单元格，但每个单元格本身很小），那么生成的索引将为每个几何体包含更多的网格单元格条目，这可能意味着查询索引所需的时间更长，同样会降低查询性能。高分辨率的另一个影响可能是，完全镶嵌几何体所需的单元格数量超过了
    `CELLS_PER_OBJECT` 限制，在这种情况下，镶嵌将无法完全完成。


    ## 边界框

    空间索引的边界框指定了将被网格镶嵌的空间区域。指定一个更小的边界框但保持相同数量的网格单元格，将导致每个单独的网格单元格变小，从而在任何要素周围形成更精确的贴合，并使主筛选器更准确。但是，如果你过度限制边界框的范围，你可能会发现你将一些离群要素完全排除在索引之外。对于
    `geography` 数据类型，没有显式边界框，因为每个 `geography` 索引都被假定为覆盖整个地球。


    ## 每对象单元格数

    `CELLS_PER_OBJECT` 参数允许你明确指定将存储多少网格单元格来描述空间索引中的每个要素。每个对象的最佳单元格数量与每一级别所用单元格的分辨率密切相关；更高分辨率的网格将包含更小的单元格，这可能意味着在给定网格级别下，需要更多单元格才能完全覆盖对象。如果
    `CELLS_PER_OBJECT` 限制设置得太低，那么根据最深单元格规则和覆盖规则，每个索引条目可能不允许包含描述一个几何体所需的总单元格数。在这种情况下，网格单元格将不会被完全细分，索引条目将无法达到其应有的准确性。如果
    `CELLS_PER_OBJECT` 限制设置得太高，那么每个索引条目将被允许增长到包含大量单元格。这可能导致更精确的索引，但查询速度变慢，从而违背了最初使用空间索引的目的。


    为了理解这些不同参数之间的相互作用，让我们考虑本章前面创建的 `idxallCountries` 索引。该索引使用了所有四个级别均为 `MEDIUM` 网格分辨率的默认参数，以及每个对象
    16 个单元格。使用 `geography` 网格进行镶嵌的索引没有显式边界框，因为它们隐式覆盖了整个地球。


    为了评估 `idxallCountries` 索引的有效性，我们本可以简单地获取一些使用不同索引设置的查询的性能计时。然而，与其依赖这种试错方法，SQL Server
    2008 附带了两个非常有用的存储过程——

    '
- fmt: "`sp_help_spatial_geometry_index` 和 `sp_help_spatial_geography_index`——它们提供各种有用信息，帮助诊断空间索引的工作方式。\n\
    \n要使用这些存储过程之一，您需要提供要测试的表和索引名称的参数，以及一个`query sample`——一个地理或几何实例，将根据索引使用的设置进行镶嵌。由于`idxallCountries`索引使用了`geography`数据类型的`location`列，我们将使用相应的`sp_help_spatial_geography_index`过程，并提供之前创建的地理边界框作为查询示例，如以下代码清单所示：\n\
    \n```\nEXEC sp_help_spatial_geography_index\n   @tabname = allCountries,\n   @indexname\
    \ = idxallCountries,\n   @verboseoutput = 1,\n   @query_sample = 'POLYGON ((-109\
    \ 41, -109 37, -102 37, -102 41, -109 41))';\n```\n\n输出中有很多详细行，但从性能角度来看，我们只关注一些重要的行：\n\
    \n`Base_Table_Rows` 6906119\n\n这个值简单地告诉我们基础表中的总行数，就像`SELECT COUNT(*) FROM allCountries`会报告的那样。重要的是要记住，如果没有这个表上的空间索引，要找出哪些行位于所选查询样本内的查询将必须对这690万行中的每一行调用`STIntersects()`方法。幸运的是，情况并非如此，因为空间索引可以提供这些记录的主要过滤器，如过程返回的以下行所示：\n\
    \n`Number_Of_Rows_Selected_By_Primary_Filter` 49018\n`Number_Of_Rows_Selected_By_Internal_Filter`\
    \ 38913\n`Number_Of_Times_Secondary_Filter_Is_Called` 10105\n\n基于表的主要过滤器，49,018条记录被选为此查询示例的候选。这少于表中总行数的0.71%。在这些候选行中，38,913行可以直接被选为确定结果，而无需调用二级过滤器。\n\
    \n例如，在交集谓词的情况下，如果一个点位于完全被查询样本覆盖的网格单元中，则该点肯定与该几何体相交，因此永远不需要使用`STIntersects()`方法。仅基于主要过滤器选择的输出行被称为`internal\
    \ filter`。在这种情况下，主要过滤器行的79.385%可以由内部过滤器选择。\n\n## 第10章 ··· 处理空间数据\n\n剩余的10,105条由主要过滤器选择的记录位于索引单元中，这些单元仅部分被查询样本中指定的几何体相交，因此必须依赖二级过滤器来确认是否应选择它们。\n\
    \n在应用主要和二级过滤器之后，确认的`Number_Of_Rows_Output`为44,840。注意，最终的行输出数少于最初由主要过滤器选择的行数，因为其中一些行可能是假阳性，然后被二级过滤器消除。\n\
    \n`Number_Of_Rows_Output` 44840\n`Internal_Filter_Efficiency` 86.7818911685995\n\
    `Primary_Filter_Efficiency` 91.4766004324942\n\n重要的是要记住，无论您有什么索引设置（包括无索引），对于给定的空间查询，您总是会得到相同的最终结果。唯一的区别在于这些行是如何被识别的。在这种情况下，`Primary_Filter_Efficiency`指标表示主要过滤器选择的行中有91.476%被包含在最终结果中。`Internal_Filter_Efficiency`为86.78%，表示仅从内部过滤器选择的输出行的百分比。调整空间索引时的目标是最大化这两个指标。\n\
    \n现在，让我们考虑当我们创建一个新索引时会发生什么，使用高分辨率在所有四个网格级别：\n\n```\nCREATE SPATIAL INDEX idxallCountriesHigh\n\
    \   ON allCountries(location) USING GEOGRAPHY_GRID\n   WITH (\n      GRIDS =(\n\
    \         LEVEL_1 = HIGH,\n```"
  raw: 'sp_help_spatial_geometry_index and sp_help_spatial_geography_index—which provide
    a variety of useful information to help diagnose how a spatial index is working.


    To use either of these procedures, you supply parameters for the table and index
    name to be tested, together with a **query sample**—a geography or geometry instance
    that will be tessellated according to the settings used by the index. Since the
    idxallCountries index uses the location column of the geography datatype, we will
    use the corresponding sp_help_geography_index procedure, supplying the geography
    bounding box created earlier as a query sample, as shown in the following code
    listing:


    EXEC sp_help_spatial_geography_index


    @tabname = allCountries,


    @indexname = idxallCountries,


    @verboseoutput = 1,


    @query_sample = ''POLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))'';


    There are lots of rows of detail in the output, but let’s just focus on some of
    the important ones from a performance point of view:


    Base_Table_Rows 6906119


    This value very simply tells us the total number of rows in the base table, just
    as would be reported by SELECT COUNT(*) FROM allCountries. The important thing
    to bear in mind is that, without a spatial index on this table, a query to find
    out which rows lie within the chosen query sample would have to call the STIntersects()
    method on every one of these 6.9 million rows. Fortunately, this is not the case,
    because the spatial index can provide a primary filter of these records, as shown
    in the following rows returned by the procedure:


    Number_Of_Rows_Selected_By_Primary_Filter 49018


    Number_Of_Rows_Selected_By_Internal_Filter 38913


    Number_Of_Times_Secondary_Filter_Is_Called 10105


    Based on the primary filter of the table, 49,018 records were selected as candidates
    for this query sample. This is less than 0.71 percent of the total number of rows
    in the table. Of these candidate rows, 38,913 rows could be selected as certain
    results straight away without need to call the secondary filter.


    For example, in the case of an intersection predicate, if a point lies in a grid
    cell that is completely covered by the query sample, the point is certain to be
    intersected by that geometry, and so the STIntersects() method need never be used.
    The inclusion of output rows that can be selected based on the primary filter
    alone is known as an **internal filter**. In this case, 79.385 percent of the
    primary filter rows could be selected by the internal filter.


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    The remaining 10,105 records selected by the primary filter lay in index cells
    that were only partially intersected by the geometry specified in the query sample,
    and so had to rely on the secondary filter to confirm whether they should be selected
    or not.


    After applying both the primary and secondary filters, the confirmed Number_Of_Rows_Output
    was 44,840\. Note that the final number-of-rows output is less than the number
    of rows initially selected by the primary filter, as some of those rows would
    have been false positives that were then eliminated by the secondary filter.


    Number_Of_Rows_Output 44840


    Internal_Filter_Efficiency 86.7818911685995


    Primary_Filter_Efficiency 91.4766004324942


    The important thing to bear in mind is that, whatever index settings you have
    (including none), you will always get the same final results from a given spatial
    query. The only difference is in how those rows are identified. In this case,
    the Primary_Filter_Efficiency measure indicates that 91.476 percent of rows selected
    by the primary filter were included in the final results. The Internal_Filter_Efficiency
    was 86.78 percent, indicating the percentage of output rows selected just from
    the internal filter. The objective when tuning a spatial index is to maximize
    both of these measures.


    Now let’s consider what happens when we create a new index, using HIGH resolution
    at all four grid levels:


    CREATE SPATIAL INDEX idxallCountriesHigh


    ON allCountries(location) USING GEOGRAPHY_GRID


    WITH (


    GRIDS =(


    LEVEL_1 = HIGH,'
