    这本身不算大问题，但请设想一下该方法缺失了多少基础架构（例如错误处理代码）。可以合理推测，在这个银行应用程序的其他部分，很可能也存在名为 `Withdraw`
    和 `Deposit` 的方法，它们执行完全相同的操作，同样需要这些基础架构代码。`TransferFunds` 方法之所以呈现**弱内聚性**，是因为在执行转账操作时，它需要的功能与单独的
    `Withdraw` 和 `Deposit` 方法所提供的功能相同，却使用了完全不同的代码。


    一个内聚性更强的同一方法可能类似于以下形式：


    ```

    bool TransferFunds(

    Account AccountFrom,

    Account AccountTo,

    decimal Amount)

    {

    bool success = false;

    success = Withdraw(AccountFrom, Amount);

    if (!success)

    return(false);

    success = Deposit(AccountTo, Amount);

    if (!success)

    return(false);

    else

    return(true);

    }

    ```


    尽管我已经指出这类生产环境代码会缺少基础异常处理和其他结构，但必须强调，主要缺失的是某种形式的**事务**处理。如果取款成功，但随后的存款失败，当前代码将导致资金实际上凭空消失。务必仔细测试你的关键任务代码是否具有**原子性**；要么全部成功，要么全部不成功。没有中间地带——尤其是在处理人们的资金时！


    ## 封装


    在本节讨论的三个主题中，对于数据库开发人员来说，**封装**可能是最重要的一个。回顾一下那个内聚性更强的 `TransferFunds` 方法，并思考一下与之关联的
    `Withdraw` 方法可能是什么样子——或许是这样的：


    ```

    bool Withdraw(Account AccountFrom, decimal Amount)

    {

    if (AccountFrom.Balance >= Amount)

    {

    AccountFrom.Balance -= Amount;

    return(true);

    }

    else

    return(false);

    }

    ```


    在这个例子中，`Account` 类公开了一个名为 `Balance` 的属性，`Withdraw` 方法可以操作它。但是，如果 `Withdraw` 方法中存在错误，并且某条代码路径允许在未首先检查资金是否充足的情况下就操纵
    `Balance`，该怎么办？为了避免这种情况，就不应该允许从 `Withdraw` 方法直接设置 `Balance` 的值。相反，`Account` 类应该定义自己的
    `Withdraw` 方法。通过这样做，该类将在内部控制其数据和规则——而不必依赖任何外部使用者来正确执行。这里的关键目标是**将逻辑精确实现一次，并根据需要重复使用多次**，而不是在每次需要使用该逻辑的地方都重新编码。


    ## 接口


    应用程序中模块的唯一目的，就是根据使用者（即另一个模块或系统）的请求执行某些操作。例如，如果无法存储或检索数据，数据库系统将毫无价值。因此，一个系统必须公开**接口**——其他模块可用于提出请求的、广为人知的方法和属性。模块的接口是通往其功能的网关，也是决定什么信息进入或离开模块的仲裁者。


    接口设计是耦合和封装概念真正获得意义的地方。如果一个接口未能封装足够多的模块内部设计，使用者可能不得不依赖一些关于该模块的内部知识，从而与该模块**紧密耦合**。在这种情况下，模块内部实现的任何更改都可能需要修改使用者的实现。


    # CHAPTER 1 „ 面向数据库世界的软件开发方法论


    ## 接口即契约


    可以说，接口是模块与其使用者之间表达的一种**契约**。该契约声明，如果使用者向接口指定了一组特定的参数，则将返回一组特定的值。**简单性**通常是这里的关键；避免定义那些根据输入改变返回值数量或类型的接口。例如，一个存储过程，如果用户传入特定参数就返回额外的列，这可能就是一个设计不佳接口的例子。


    许多编程语言允许例程定义**显式契约**。这意味着输入参数是明确定义的，输出在编译时是已知的。不幸的是，SQL Server 中的 T-SQL 存储过程只定义输入，而过程本身可以动态改变其定义的输出。在这些情况下，开发人员有责任确保预期的输出有完善的文档记录，并且存在单元测试来验证它们（有关单元测试的信息，请参见第
    3 章）。在本书中，我将通过文档和测试强制执行的契约称为**隐式契约**。


    ## 接口设计


    如何衡量接口设计的成功与否是一个难题。一般来说，你应该尝试从维护的角度来看待它。如果六个月后，你因为性能或其他原因要完全重写该模块，你能保证所有的输入和输出都保持不变吗？


    例如，考虑以下存储过程签名：


    ```

    CREATE PROCEDURE GetAllEmployeeData

    --用于排序的列，以逗号分隔

    @OrderBy varchar(400) = NULL

    ```


    假设这个存储过程完全按照其名称的含义行事——它返回数据库中每个员工的 `Employees` 表的所有数据。这个存储过程接受 `@OrderBy` 参数，根据注释，该参数定义为“用于排序的列”，并附加规定列应以逗号分隔。


    这里的接口问题相当严重。首先，一个接口不仅要隐藏内部行为，还必须明确说明一组有效的输入参数将如何改变例程的输出。在这种情况下，该存储过程的使用者可能会认为，在内部，逗号分隔的列表将被简单地附加到一条动态
    SQL 语句中。这是否意味着改变列表中列名的顺序会改变输出？另外，`ASC` 或 `DESC` 关键字是否可以接受？接口定义的契约不够具体，无法明确这一点。


    其次，该存储过程的使用者必须拥有 `Employees` 表的列列表，才能知道可以在逗号分隔列表中传入的有效值。列列表应该硬编码在应用程序中，还是通过其他方式检索？而且，表的所有列是否都是有效的输入，这并不清楚。像
    `Photo` 这样定义为 `varbinary(max)`、包含员工照片 JPEG 图像的列怎么办？允许使用者指定该列进行排序是否有意义？


    从维护的角度来看，这类接口问题可能导致真正的问题。想象一下，如果三个不同的应用程序都在使用这个存储过程，并且都有自己的可排序列名硬编码列表，那么仅仅更改 `Employees`
    表中一个列名需要付出多少努力。如果查询最初实现为动态 SQL，但后来需要更改为静态 SQL 以避免重编译成本，该怎么办？在那些假定可以使用 `ASC` 和
    `DESC` 关键字的应用程序抛出运行时异常之前，我们是否有可能检测出它们是哪些应用程序？'
- fmt: '# The Central Message on Flexibility and Interfaces


    The central message I hope to have conveyed here is that extreme flexibility and
    solid, maintainable interfaces may not go hand in hand in many situations. If
    your goal is to develop truly robust software, you will often find that flexibility
    must be cut back. But remember that in most cases there are perfectly sound workarounds
    that do not sacrifice any of the real flexibility intended by the original interface.
    For instance, in this example, the interface could be rewritten in a number of
    ways to maintain all of the possible functionality. One such version follows:


    ```sql

    CREATE PROCEDURE GetAllEmployeeData

    @OrderByName int = 0,

    @OrderByNameASC bit = 1,

    @OrderBySalary int = 0,

    @OrderBySalaryASC bit = 1,

    -- Other columns ...

    ```


    In this modified version of the interface, each column that a consumer can select
    for ordering has two associated parameters: one parameter specifying the order
    in which to sort the columns, and a second parameter that specifies whether to
    order ascending or descending. So if a consumer passes a value of 2 for the `@OrderByName`
    parameter and a value of 1 for the `@OrderBySalary` parameter, the result will
    be sorted first by salary, and then by name. A consumer can further modify the
    sort by manipulating the `@OrderByNameASC` and `@OrderBySalaryASC` parameters
    to specify the sort direction for each column.


    This version of the interface exposes nothing about the internal implementation
    of the stored procedure. The developer is free to use any technique he or she
    chooses in order to return the correct results in the most effective manner. In
    addition, the consumer has no need for knowledge of the actual column names of
    the `Employees` table. The column containing an employee’s name may be called
    `Name` or may be called `EmpName`. Or, there may be two columns, one containing
    a first name and one a last name. Since the consumer requires no knowledge of
    these names, they can be modified as necessary as the data changes, and since
    the consumer is not coupled to the routine-based knowledge of the column name,
    no change to the consumer will be necessary. Note that this same reasoning can
    also be applied to suggest that end users and applications should only access
    data exposed as a view rather than directly accessing base tables in the database.
    Views can provide a layer of abstraction that enable changes to be made to the
    underlying tables, while the properties of the view are maintained.


    Note that this example only discussed inputs to the interface. Keep in mind that
    outputs (e.g., result sets) are just as important, and these should also be documented
    in the contract. I recommend always using the `AS` keyword to create column aliases
    as necessary, so that interfaces can continue to return the same outputs even
    if there are changes to the underlying tables. As mentioned before, I also recommend
    that developers avoid returning extra data, such as additional columns or result
    sets, based on input arguments. Doing so can create stored procedures that are
    difficult to test and maintain.


    # CHAPTER 1 — SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    ## Exceptions are a Vital Part of Any Interface


    One important type of output, which developers often fail to consider when thinking
    about implied contracts, are the exceptions that a given method can throw should
    things go awry. Many methods throw well-defined exceptions in certain situations,
    but if these exceptions are not adequately documented, their well-intended purpose
    becomes rather wasted. By making sure to properly document exceptions, you enable
    clients to catch and handle the exceptions you’ve foreseen, in addition to helping
    developers understand what can go wrong and code defensively against possible
    issues. It is almost always better to follow a code path around a potential problem
    than to have to deal with an exception.


    ## Integrating Databases and Object-Oriented Systems


    A major issue that seems to make database development a lot more difficult than
    it should be isn’t development-related at all, but rather a question of architecture.
    Object-oriented frameworks and database systems generally do not play well together,
    primarily because they have a different set of core goals. Object-oriented systems
    are designed to model business entities from an action standpoint—what can the
    business entity do, and what can other entities do to or with it? Databases, on
    the other hand, are more concerned with relationships between entities, and much
    less concerned with the activities in which they are involved.


    It’s clear that we have two incompatible paradigms for modeling business entities.
    Yet both are necessary components of almost every application and must be leveraged
    together toward the common goal: serving the user. To that end, it’s important
    that database developers know what belongs where, and when to pass the buck back
    up to their application developer brethren. Unfortunately, the question of how
    to appropriately model the parts of any given business process can quickly drive
    one into a gray area. How should you decide between implementation in the database
    vs. implementation in the application?


    The central argument on many a database forum since time immemorial (or at least
    since the dawn of the Internet) has been what to do with that ever-present required
    “logic.” Sadly, try as we might, developers have still not figured out how to
    develop an application without the need to implement business requirements. And
    so the debate rages on. Does “business logic” belong in the database? In the application
    tier? What about the user interface? And what impact do newer application architectures
    have on this age-old question?


    ## A Brief History of Logic Placement


    Once upon a time, computers were simply called “computers.” They spent their days
    and nights serving up little bits of data to “dumb” terminals. Back then there
    wasn’t much of an difference between an application and its data, so there were
    few questions to ask, and fewer answers to give, about the architectural issues
    we debate today.


    But, over time, the winds of change blew through the air-conditioned data centers
    of the world, and the systems previously called “computers” became known as “mainframes”—the
    new computer on the rack in the mid-1960s was the “minicomputer.” Smaller and
    cheaper than the mainframes, the “minis” quickly grew in popularity. Their relative
    low cost compared to the mainframes meant that it was now fiscally possible to
    scale out applications by running them on multiple machines. Plus, these machines
    were inexpensive enough that they could even be used directly by end users as
    an alternative to the previously ubiquitous dumb terminals. During this same period
    we also saw the first commercially available database systems, such as the `Adabas`
    database management system (`DBMS`).


    The advent of the minis signaled multiple changes in the application architecture
    landscape. In addition to the multiserver scale-out alternatives, the fact that
    end users were beginning to run machines more powerful than terminals meant that
    some of an application’s work could be offloaded to the user-interface (UI) tier
    in certain cases. Instead of harnessing only the power of one server, workloads
    could now be distributed in order to create more scalable applications.


    As time went on, the “microcomputers” (ancestors of today’s Intel- and AMD-based
    systems) started getting more and more powerful, and eventually the minis disappeared.
    However, the client/server-based architecture that had its genesis during the
    minicomputer era did not die; application developers found that it could be much
    cheaper to offload work to clients than to purchase bigger servers.'
