    \ CLR 代码本身内部处理（例如使用 `try…catch`），这样就无需在 T-SQL 层级捕获它。\n\n这引发了一个有趣的点：如何处理系统定义的 CLR\
    \ 例程中产生的异常，例如由 `geometry`、`geography` 或 `hierarchyid` 类型定义的任何方法。考虑以下示例，该示例尝试使用无效值实例化\
