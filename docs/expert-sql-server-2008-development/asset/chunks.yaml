- fmt: 'It''s probably fair to say that time is a critical piece of information in
    almost every useful database.


    Imagining a database that lacks a time component is tantamount to imagining life
    without time passing; it simply doesn''t make sense. Without a time axis, it is
    impossible to describe the number of purchases made last month, the average overnight
    temperature of the warehouse, or the maximum duration that callers were required
    to hold the line when calling in for technical support.


    Although utterly important to our data, few developers commit to really thinking
    in depth about the intricacies required to process temporal data successfully,
    which in many cases require more thought than at first you might imagine.


    In this chapter, I will delve into the ins and outs of dealing with time in SQL
    Server. I will explain some of the different types of temporal requirements you
    might encounter and describe how best to tackle some common—and surprisingly complex—temporal
    queries.


    ## Modeling Time-Based Information


    When thinking of "temporal" data in SQL Server, the scenario that normally springs
    to mind is a `datetime` column representing the time that some action took place,
    or is due to take place in the future.


    However, a `datetime` column is only one of several possible ways that temporal
    data can be implemented. Some of the categories of time-based information that
    may be modeled in SQL Server are as follows:


    *   **Instance-based data** is concerned with recording the instant in time at
    which an event occurs. As in the example described previously, instance-based
    data is typically recorded using a single column of `datetime` values, although
    alternative datatypes, including the `datetime2` and `datetimeoffset` types introduced
    in `SQL Server 2008`, may also be used to record instance data at different levels
    of granularity. Scenarios in which you might model an instance include the moment
    a user logs into a system, the moment a customer makes a purchase, and the exact
    time any other kind of event takes place that you might need to record in the
    database. The key factor to recognize is that you''re describing a specific instant
    in time, based on the precision of the data type you use.

    *   **Interval-based data** extends on the idea of an instance by describing the
    period of time between a specified start point and an endpoint. Depending on your
    requirements, intervals may be modeled using two temporal columns (for example,
    using the `datetime` type), or a single temporal column together with another
    column (usually numeric) that represents the amount of time that passed since
    that time. A subset of interval-based data is the idea of `duration`, which records
    only the length of time for which an event lasts, irrespective of when it occurred.
    Durations may be modeled using a single numeric column.

    *   **Period-based data** is similar to interval-based data, but it is generally
    used to answer slightly different sorts of questions. When working with an interval
    or duration, the question is "How long?" whereas for a period, the question is
    "When?" Examples of periods include "next month," "yesterday," "New Year''s Eve,"
    and "the holiday season." Although these are similar to—and can be represented
    by—intervals, the mindset of working with periods is slightly different, and it
    is therefore important to realize that other options exist for modeling them.
    For more information on periods, see the section "Defining Periods Using Calendar
    Tables" later in this chapter.

    *   **Bitemporal data** is temporal data that falls into any of the preceding
    categories, but also includes an additional time component (known as a `valid
    time`, or more loosely, an `as-of date`) indicating when the data was considered
    to be valid. This data pattern is commonly used in data warehouses, both for slowly
    changing dimensions and for updating semiadditive fact data. When querying the
    database bitemporally, the question transforms from "On a certain day, what happened?"'
