    Although the error levels that make up each range are individually documented
    in Books Online (http://msdn2.microsoft.com/en-us/library/ms164086.aspx), this
    information is inconsistent or incorrect in many cases. For instance, according
    to documentation, severity level 11 indicates errors where “the given object or
    entity does not exist.” However, error 208, “Invalid object name,” is a level-16


    exception. Many other errors have equally unpredictable levels, and it is recommended
    that you do not program client software to rely on the error levels for handling
    logic.


    In addition to inconsistency regarding the relative severity of different errors,
    there is, for the most part, no discernable pattern regarding the severity level
    of an error and whether that error will behave on the statement or batch level.
    For instance, both errors 245 (“Conversion failed”) and 515 (“Cannot insert the
    value NULL . . . column does not allow nulls”) are level-16 exceptions. However,
    245 is a batch-level exception, whereas 515 acts at the statement level.


    Error State


    Each exception has a State tag, which contains information about the exception
    that is used internally by SQL Server. The values that SQL Server uses for this
    tag are not documented, so this tag is generally not helpful. The following exception
    has a state of 1:


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    Msg 156, Level 15, State 1, Line 1


    Incorrect syntax near the keyword ''FROM''.


    Additional Information


    In addition to the error number, level, and state, many errors also carry additional
    information about the line number on which the exception occurred and the procedure
    in which it occurred, if relevant. The following error message indicates that
    an invalid object name was referenced on line 4 of the procedure NonExistentTable:


    Msg 208, Level 16, State 1, Procedure NonExistentTable, Line 4


    Invalid object name ''SomeTable''.


    If an exception does not occur within a procedure, the line number refers to the
    line in the batch in which the statement that caused the exception was sent.


    Be careful not to confuse batches separated with GO with a single batch. Consider
    the following TSQL:


    SELECT 1;


    GO


    SELECT 2;


    GO


    SELECT 1/0;


    GO


    In this case, although a divide-by-zero exception occurs on line 5 of the code
    listing itself, the exception message will report that the exception was encountered
    on line 1:


    (1 row(s) affected)


    (1 row(s) affected)


    Msg 8134, Level 16, State 1, Line 1


    Divide by zero error encountered.


    The reason for the reset of the line number is that GO is not actually a T-SQL
    command. GO is an identifier recognized by SQL Server client tools (e.g., SQL
    Server Management Studio and SQLCMD) that tells the client to separate the query
    into batches, sending each to SQL Server one after another. This seemingly erroneous
    line number reported in the previous example occurs because each batch is sent
    separately to the query engine. SQL Server does not know that on the client (e.g.,
    in SQL Server Management Studio) these batches are all displayed together on the
    screen. As far as SQL Server is 80


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    concerned, these are three completely separate units of T-SQL that happen to be
    sent on the same connection.


    SQL Server’s RAISERROR Function


    In addition to the exceptions that SQL Server itself throws, users can raise exceptions
    within T-SQL by using a function called RAISERROR. The general form for this function
    is as follows:


    RAISERROR ( { msg_id | msg_str | @local_variable }


    { ,severity ,state }


    [ ,argument [ ,...n ] ] )


    [ WITH option [ ,...n ] ]


    The first argument can be an ad hoc message in the form of a string or variable,
    or a valid error number from the message_id column of sys.messages. If a string
    is specified, it can include format designators that can then be filled using
    the optional arguments specified at the end of the function call.'
  trans: "\n## 第四章：错误与异常\n\n包含各种类型的数据损坏、网络、日志记录及其他关键错误。此层级的几乎所有异常都会被自动记录。\n\n虽然构成每个范围的错误级别在联机丛书（http://msdn2.microsoft.com/en-us/library/ms164086.aspx）中有单独说明，但这些信息在许多情况下不一致或错误。例如，根据文档，严重级别\
    \ 11 表示“给定对象或实体不存在”的错误。然而，错误 208“对象名无效”是一个级别 16 的异常。许多其他错误也具有同样不可预测的级别，建议不要在客户端软件编程中依赖错误级别来处理逻辑。\n\
    \n除了不同错误的相对严重性存在不一致外，大多数情况下，错误的严重级别与该错误是在语句级还是批处理级行为之间，也没有可辨别的模式。例如，错误 245（“转换失败”）和错误\
    \ 515（“无法将值 NULL 插入...列不允许 NULL 值”）都是级别 16 的异常。然而，245 是一个批处理级异常，而 515 则在语句级行为。\n\
    \n## 错误状态\n\n每个异常都有一个 `State` 标签，其中包含有关该异常的信息，供 SQL Server 内部使用。SQL Server 为此标签使用的值未被记录，因此该标签通常没有帮助。以下异常的状态为\
    \ 1：\n\n```sql\nMsg 156, Level 15, State 1, Line 1\n关键字 'FROM' 附近的语法不正确。\n```\n\
    \n## 附加信息\n\n除了错误号、级别和状态外，许多错误还带有附加信息，包括异常发生的行号以及（如果相关）发生异常的过程。以下错误消息表明在过程 `NonExistentTable`\
    \ 的第 4 行引用了一个无效的对象名：\n\n```sql\nMsg 208, Level 16, State 1, Procedure NonExistentTable,\
    \ Line 4\n对象名 'SomeTable' 无效。\n```\n\n如果异常不是发生在过程中，行号指的是导致异常的语句所在的批处理中的行号。\n\n\
    注意不要将用 `GO` 分隔的批处理与单个批处理混淆。考虑以下 TSQL：\n\n```sql\nSELECT 1;\nGO\nSELECT 2;\nGO\n\
    SELECT 1/0;\nGO\n```\n\n在此情况下，尽管除零异常发生在代码清单本身的第 5 行，但异常消息将报告异常发生在第 1 行：\n\n```sql\n\
    (1 行受影响)\n(1 行受影响)\nMsg 8134, Level 16, State 1, Line 1\n遇到除以零的错误。\n```\n\n行号重置的原因在于，`GO`\
    \ 实际上并非 T-SQL 命令。`GO` 是 SQL Server 客户端工具（例如，SQL Server Management Studio 和 `SQLCMD`）识别的标识符，用于告诉客户端将查询拆分为批处理，并依次将每个批处理发送给\
    \ SQL Server。前面示例中报告的看似错误的行号，是因为每个批处理被单独发送到查询引擎。SQL Server 不知道在客户端（例如，在 SQL Server\
    \ Management Studio 中）这些批处理都在屏幕上一起显示。就 SQL Server 而言，这是三个完全独立的 T-SQL 单元，只是碰巧通过同一连接发送。\n\
    \n## SQL Server 的 `RAISERROR` 函数\n\n除了 SQL Server 自身抛出的异常外，用户还可以在 T-SQL 中使用名为\
    \ `RAISERROR` 的函数来引发异常。该函数的通用形式如下：\n\n```sql\nRAISERROR ( { msg_id | msg_str |\
    \ @local_variable }\n    { ,severity ,state }\n    [ ,argument [ ,...n ] ] )\n\
    \    [ WITH option [ ,...n ] ]\n```\n\n第一个参数可以是字符串或变量形式的临时消息，也可以是来自 `sys.messages`\
    \ 表中 `message_id` 列的有效错误号。如果指定了字符串，它可以包含格式说明符，然后可以使用函数调用末尾指定的可选参数来填充这些说明符。\n"
- fmt: "# 第四章：错误与异常\n\n第二个参数 `severity` 可用于对异常的行为实施某种程度的控制，类似于 SQL Server 使用错误级别的方式。在大多数情况下，适用相同的异常范围：级别在\
    \ 1 到 10 之间的异常产生警告，级别在 11 到 18 之间的异常被视为普通用户错误，而级别高于 18 的异常被视为严重异常，只能由 `sysadmin`\
    \ 固定服务器角色的成员引发。用户引发的超过级别 20 的异常，就像 SQL Server 引发的异常一样，会导致连接中断。除了这些范围之外，用户引发的异常没有真正的控制权，所有异常都被视为语句级别——即使设置了\
    \ `XACT_ABORT` 也是如此。\n\n**注意** `XACT_ABORT` 不会影响 `RAISERROR` 语句的行为。\n\n`state`\
    \ 参数可以是 1 到 127 之间的任何值，对异常的行为没有影响。它可用于向异常添加额外的编码信息——但在大多数情况下，将这些数据添加到错误消息本身可能同样简单。\n\
    \n使用 `RAISERROR` 的最简单方法是传入包含错误消息的字符串，并设置适当的错误级别和状态。对于一般异常，我通常使用严重级别 16 和状态值 1：\n\
    \n```sql\nRAISERROR('General exception', 16, 1);\n```\n\n这会产生以下输出：\n\n```\nMsg\
    \ 50000, Level 16, State 1, Line 1\nGeneral exception\n```\n\n请注意，此情况下生成的错误号是\
    \ 50000，这是当向 `RAISERROR` 的第一个参数传入字符串时将使用的通用用户定义错误号。\n\n**注意** 先前版本的 SQL Server\
    \ 允许使用如下语法指定错误号和消息号：`RAISERROR 50000 'General exception'`。此语法在 SQL Server 2008\
    \ 中已弃用，不应再使用。\n\n## 格式化错误消息\n\n定义错误消息时，通常以某种方式格式化文本是有用的。例如，思考一下你可能会如何编写代码，在循环中处理动态检索到的多个产品\
    \ ID。\n\n你可能有一个名为 `@ProductId` 的局部变量，其中包含代码当前正在处理的产品 ID。如果是这样，你可能希望定义一个在发生问题时应引发的自定义异常——并且很可能最好随错误消息一起返回\
    \ `@ProductId` 的当前值。\n\n在这种情况下，有几种方法可以将数据随异常一起发回。第一种是动态构建错误消息字符串：\n\n```sql\n\
    DECLARE @ProductId int;\nSET @ProductId = 100;\n/* ... problem occurs ... */\n\
    DECLARE @ErrorMessage varchar(200);\nSET @ErrorMessage =\n    'Problem with ProductId\
    \ ' + CONVERT(varchar, @ProductId);\nRAISERROR(@ErrorMessage, 16, 1);\n```\n\n\
    执行此批处理会产生以下输出：\n\n```\nMsg 50000, Level 16, State 1, Line 10\nProblem with ProductId\
    \ 100\n```\n\n虽然这在此情况下有效，但动态构建错误消息并不是最优雅的开发实践。更好的方法是使用格式设计符并将 `@ProductId` 作为可选参数传递，如下面的代码清单所示：\n\
    \n```sql\nDECLARE @ProductId int;\nSET @ProductId = 100;\n/* ... problem occurs\
    \ ... */\nRAISERROR('Problem with ProductId %i', 16, 1, @ProductId);\n```\n\n\
    执行此批处理会产生与之前相同的输出，但所需的代码量大大减少，并且你不必担心定义额外变量或构建繁琐的转换代码。嵌入在错误消息中的 `%i` 是一个格式设计符，表示“整数”。另一个最常用的格式设计符是\
    \ `%s`，表示“字符串”。\n\n你可以在错误消息中嵌入任意数量的设计符，它们将按照附加可选参数的顺序进行替换。例如：\n\n```sql\nDECLARE\
    \ @ProductId1 int;\nSET @ProductId1 = 100;\nDECLARE @ProductId2 int;\nSET @ProductId2\
    \ = 200;\nDECLARE @ProductId3 int;\nSET @ProductId3 = 300;\n/* ... problem occurs\
    \ ... */\nRAISERROR('Problem with ProductIds %i, %i, %i',\n    16, 1, @ProductId1,\
    \ @ProductId2, @ProductId3);\n```\n\n这会产生以下输出：\n\n```\nMsg 50000, Level 16, State\
    \ 1, Line 12\nProblem with ProductIds 100, 200, 300\n```\n\n**注意** 熟悉 C 编程的读者会注意到，`RAISERROR`\
    \ 使用的格式设计符与 C 语言的 `printf` 函数使用的相同。有关支持的设计符的完整列表，请参阅 SQL Server 2008 联机丛书中的“RAISERROR\
    \ (Transact-SQL)”主题。\n\n## 创建持久的自定义错误消息\n\n使用格式设计符格式化消息而不是动态构建字符串是朝着正确方向迈出的一步，但它没有解决最后一个关键问题：如果你需要在多个地方使用相同的错误消息怎么办？你可以在需要该异常的每个例程中简单地使用完全相同的参数调用\
    \ `RAISERROR`，但如果你需要更改错误消息，这可能会导致维护难题。此外，每个异常都将只能使用默认的用户定义错误号 50000，这使得针对这些自定义异常的编程变得更加困难。\n\
    \n幸运的是，SQL Server 很好地解决了这些问题，它提供了一种机制，可以将自定义错误消息添加到 `sys.messages`。然后，可以使用 `RAISERROR`\
    \ 并传入自定义错误号作为第一个参数来引发使用这些错误消息的异常。\n\n要创建持久的自定义错误消息，请使用存储过程 `sp_addmessage`。此存储过程允许用户为大于\
    \ 50000 的消息编号指定自定义消息。除了错误消息外，用户还可以指定默认严重级别。使用 `sp_addmessage` 添加的消息的作用域是服务器级别，因此如果你在同一服务器上托管多个应用程序，请注意它们是否定义了自定义消息以及是否存在任何重叠——你可能需要为一个或多个应用程序设置新的\
    \ SQL Server 实例，以允许它们创建自己的异常。在开发使用自定义消息的新应用程序时，请尝试选择一个定义明确的范围来创建你的消息，以避免在共享环境中与其他应用程序重叠。\n\
    \n请记住，你可以使用 50000 到 2147483647 之间的任何数字，不必局限于 50000 范围。\n\n添加自定义消息就像调用 `sp_addmessage`\
    \ 并定义消息编号和消息文本一样简单。以下 T-SQL 将上一节中的消息定义为错误消息编号 50005：\n\n```sql\nEXEC sp_addmessage\n\
    \    @msgnum = 50005,\n    @severity = 16,\n    @msgtext = 'Problem with ProductIds\
    \ %i, %i, %i';\nGO\n```\n\n一旦执行此 T-SQL，就可以通过使用适当的错误号调用 `RAISERROR` 来引发使用此错误消息的异常：\n\
    \n```sql\nRAISERROR(50005, 15, 1, 100, 200, 300);\n```\n\n这会导致以下输出被发送回客户端：\n\n\
    ```\nMsg 50005, Level 15, State 1, Line 1\nProblem with ProductIds 100, 200, 300\n\
    ```\n\n请注意，在这种情况下调用 `RAISERROR` 时指定了严重级别 15，尽管自定义错误最初定义为严重级别 16。这引出了关于自定义错误严重级别的一点重要说明：在调用\
    \ `RAISERROR` 时指定的任何严重级别都将覆盖为该错误定义的严重级别。但是，如果你向 `RAISERROR` 的该参数传递一个负值，则将使用默认严重级别：\n\
    \n```sql\nRAISERROR(50005, -1, 1, 100, 200, 300);\n```\n\n这会产生以下输出（请注意，`Level`\
    \ 现在是 16，与创建错误消息时定义的一致）：\n\n```\nMsg 50005, Level 16, State 1, Line 1\nProblem\
    \ with ProductIds 100, 200, 300\n```\n\n建议，除非有特定原因需要覆盖严重级别，否则在引发自定义异常时，始终对严重性参数使用\
    \ -1。"
  raw: 'The second argument, severity, can be used to enforce some level of control
    over the behavior of the exception, similar to the way in which SQL Server uses
    error levels. For the most part, the same exception ranges apply: exception levels
    between 1 and 10 result in a warning, levels between 11 and 18


    are considered normal user errors, and those above 18 are considered serious and
    can only be raised by members of the sysadmin fixed-server role. User exceptions
    raised over level 20, just like those raised by SQL Server, cause the connection
    to break. Beyond these ranges, there is no real control afforded to user-raised
    exceptions, and all are considered to be statement level—this is even true with
    XACT_ABORT


    set.


    „ **Note** XACT_ABORT does not impact the behavior of the RAISERROR statement.


    The state argument can be any value between 1 and 127, and has no effect on the
    behavior of the exception. It can be used to add additional coded information
    to be carried by the exception—but it’s probably just as easy to add that data
    to the error message itself in most cases.


    The simplest way to use RAISERROR is to pass in a string containing an error message,
    and set the appropriate error level and state. For general exceptions, I usually
    use severity 16 and a value of 1 for state:


    RAISERROR(''General exception'', 16, 1);


    This results in the following output:


    Msg 50000, Level 16, State 1, Line 1


    General exception


    Note that the error number generated in this case is 50000, which is the generic
    user-defined error number that will be used whenever passing in a string for the
    first argument to RAISERROR.


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    „ **Caution** Previous versions of SQL Server allowed RAISERROR syntax specifying
    the error number and message number as follows: RAISERROR 50000 ''General exception''.
    This syntax is deprecated in SQL Server 2008 and should not be used.


    Formatting Error Messages


    When defining error messages, it is generally useful to format the text in some
    way. For example, think about how you might write code to work with a number of
    product IDs, dynamically retrieved, in a loop.


    You might have a local variable called @ProductId, which contains the ID of the
    product that the code is currently working with. If so, you might wish to define
    a custom exception that should be thrown when a problem occurs—and it would probably
    be a good idea to return the current value of @ProductId along with the error
    message.


    In this case, there are a couple of ways of sending back the data with the exception.
    The first is to dynamically build an error message string:


    DECLARE @ProductId int;


    SET @ProductId = 100;


    /* ... problem occurs ... */


    DECLARE @ErrorMessage varchar(200);


    SET @ErrorMessage =


    ''Problem with ProductId '' + CONVERT(varchar, @ProductId);


    RAISERROR(@ErrorMessage, 16, 1);


    Executing this batch results in the following output:


    Msg 50000, Level 16, State 1, Line 10


    Problem with ProductId 100


    While this works for this case, dynamically building up error messages is not
    the most elegant development practice. A better approach is to make use of a format
    designator and to pass @ProductId as an optional parameter, as shown in the following
    code listing:


    DECLARE @ProductId int;


    SET @ProductId = 100;


    /* ... problem occurs ... */


    RAISERROR(''Problem with ProductId %i'', 16, 1, @ProductId);


    Executing this batch results in the same output as before, but requires quite
    a bit less code, and you don’t have to worry about defining extra variables or
    building up messy conversion code. The %i 82


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    embedded in the error message is a format designator that means “integer.” The
    other most commonly used format designator is %s, for “string.”


    You can embed as many designators as necessary in an error message, and they will
    be substituted in the order in which optional arguments are appended. For example:


    DECLARE @ProductId1 int;


    SET @ProductId1 = 100;


    DECLARE @ProductId2 int;


    SET @ProductId2 = 200;


    DECLARE @ProductId3 int;


    SET @ProductId3 = 300;


    /* ... problem occurs ... */


    RAISERROR(''Problem with ProductIds %i, %i, %i'',


    16, 1, @ProductId1, @ProductId2, @ProductId3);


    This results in the following output:


    Msg 50000, Level 16, State 1, Line 12


    Problem with ProductIds 100, 200, 300


    „ **Note** Readers familiar with C programming will notice that the format designators
    used by RAISERROR are the same as those used by the C language’s printf function.
    For a complete list of the supported designators, see the


    “RAISERROR (Transact-SQL)” topic in SQL Server 2008 Books Online.


    Creating Persistent Custom Error Messages


    Formatting messages using format designators instead of building up strings dynamically
    is a step in the right direction, but it does not solve one final problem: what
    if you need to use the same error message in multiple places? You could simply
    use the same exact arguments to RAISERROR in each routine in which the exception
    is needed, but that might cause a maintenance headache if you ever needed to change
    the error message. In addition, each of the exceptions would only be able to use
    the default user-defined error number, 50000, making programming against these
    custom exceptions much more


    difficult.


    Luckily, SQL Server takes care of these problems quite nicely, by providing a
    mechanism by which custom error messages can be added to sys.messages. Exceptions
    using these error messages can then be raised by using RAISERROR and passing in
    the custom error number as the first parameter.


    To create a persistent custom error message, use the sp_addmessage stored procedure.
    This stored procedure allows the user to specify custom messages for message numbers
    over 50000\. In addition to an error message, users can specify a default severity.
    Messages added using sp_addmessage are scoped at the server level, so if you have
    multiple applications hosted on the same server, be aware of whether 83


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    they define custom messages and whether there is any overlap—you may need to set
    up a new instance of SQL Server for one or more of the applications in order to
    allow them to create their exceptions. When developing new applications that use
    custom messages, try to choose a well-defined range in which to create your messages,
    in order to avoid overlaps with other applications in shared environments.


    Remember that you can use any number between 50000 and 2147483647, and you don’t
    need to stay in the 50000 range.


    Adding a custom message is as easy as calling sp_addmessage and defining a message
    number and the message text. The following T-SQL defines the message from the
    previous section as error message number 50005:


    EXEC sp_addmessage


    @msgnum = 50005,


    @severity = 16,


    @msgtext = ''Problem with ProductIds %i, %i, %i'';


    GO


    Once this T-SQL is executed, an exception can be raised using this error message,
    by calling RAISERROR with the appropriate error number:


    RAISERROR(50005, 15, 1, 100, 200, 300);


    This causes the following output to be sent back to the client:


    Msg 50005, Level 15, State 1, Line 1


    Problem with ProductIds 100, 200, 300


    Note that when calling RAISERROR in this case, severity 15 was specified, even
    though the custom error was originally defined as severity level 16\. This brings
    up an important point about severities of custom errors: whatever severity is
    specified in the call to RAISERROR will override the severity that was defined
    for the error. However, the default severity will be used if you pass a negative
    value for that argument to RAISERROR:


    RAISERROR(50005, -1, 1, 100, 200, 300);


    This produces the following output (notice that Level is now 16, as was defined
    when the error message was created):


    Msg 50005, Level 16, State 1, Line 1


    Problem with ProductIds 100, 200, 300


    It is recommended that, unless you are overriding the severity for a specific
    reason, you always use -


    1 for the severity argument when raising a custom exception.'
  trans: "\n# 第四章：错误与异常\n\n第二个参数 `severity` 可用于对异常的行为实施某种程度的控制，类似于 SQL Server 使用错误级别的方式。在大多数情况下，适用相同的异常范围：级别在\
    \ 1 到 10 之间的异常产生警告，级别在 11 到 18 之间的异常被视为普通用户错误，而级别高于 18 的异常被视为严重异常，只能由 `sysadmin`\
    \ 固定服务器角色的成员引发。用户引发的超过级别 20 的异常，就像 SQL Server 引发的异常一样，会导致连接中断。除了这些范围之外，用户引发的异常没有真正的控制权，所有异常都被视为语句级别——即使设置了\
    \ `XACT_ABORT` 也是如此。\n\n**注意** `XACT_ABORT` 不会影响 `RAISERROR` 语句的行为。\n\n`state`\
    \ 参数可以是 1 到 127 之间的任何值，对异常的行为没有影响。它可用于向异常添加额外的编码信息——但在大多数情况下，将这些数据添加到错误消息本身可能同样简单。\n\
    \n使用 `RAISERROR` 的最简单方法是传入包含错误消息的字符串，并设置适当的错误级别和状态。对于一般异常，我通常使用严重级别 16 和状态值 1：\n\
    \n```sql\nRAISERROR('General exception', 16, 1);\n```\n\n这会产生以下输出：\n\n```\nMsg\
    \ 50000, Level 16, State 1, Line 1\nGeneral exception\n```\n\n请注意，此情况下生成的错误号是\
    \ 50000，这是当向 `RAISERROR` 的第一个参数传入字符串时将使用的通用用户定义错误号。\n\n**注意** 先前版本的 SQL Server\
    \ 允许使用如下语法指定错误号和消息号：`RAISERROR 50000 'General exception'`。此语法在 SQL Server 2008\
    \ 中已弃用，不应再使用。\n\n## 格式化错误消息\n\n定义错误消息时，通常以某种方式格式化文本是有用的。例如，思考一下你可能会如何编写代码，在循环中处理动态检索到的多个产品\
    \ ID。\n\n你可能有一个名为 `@ProductId` 的局部变量，其中包含代码当前正在处理的产品 ID。如果是这样，你可能希望定义一个在发生问题时应引发的自定义异常——并且很可能最好随错误消息一起返回\
    \ `@ProductId` 的当前值。\n\n在这种情况下，有几种方法可以将数据随异常一起发回。第一种是动态构建错误消息字符串：\n\n```sql\n\
    DECLARE @ProductId int;\nSET @ProductId = 100;\n/* ... 问题出现 ... */\nDECLARE @ErrorMessage\
    \ varchar(200);\nSET @ErrorMessage =\n    'Problem with ProductId ' + CONVERT(varchar,\
    \ @ProductId);\nRAISERROR(@ErrorMessage, 16, 1);\n```\n\n执行此批处理会产生以下输出：\n\n```\n\
    Msg 50000, Level 16, State 1, Line 10\nProblem with ProductId 100\n```\n\n虽然这在此情况下有效，但动态构建错误消息并不是最优雅的开发实践。更好的方法是使用格式设计符并将\
    \ `@ProductId` 作为可选参数传递，如下面的代码清单所示：\n\n```sql\nDECLARE @ProductId int;\nSET @ProductId\
    \ = 100;\n/* ... 问题出现 ... */\nRAISERROR('Problem with ProductId %i', 16, 1, @ProductId);\n\
    ```\n\n执行此批处理会产生与之前相同的输出，但所需的代码量大大减少，并且你不必担心定义额外变量或构建繁琐的转换代码。嵌入在错误消息中的 `%i` 是一个格式设计符，表示“整数”。另一个最常用的格式设计符是\
    \ `%s`，表示“字符串”。\n\n你可以在错误消息中嵌入任意数量的设计符，它们将按照附加可选参数的顺序进行替换。例如：\n\n```sql\nDECLARE\
    \ @ProductId1 int;\nSET @ProductId1 = 100;\nDECLARE @ProductId2 int;\nSET @ProductId2\
    \ = 200;\nDECLARE @ProductId3 int;\nSET @ProductId3 = 300;\n/* ... 问题出现 ... */\n\
    RAISERROR('Problem with ProductIds %i, %i, %i',\n    16, 1, @ProductId1, @ProductId2,\
    \ @ProductId3);\n```\n\n这会产生以下输出：\n\n```\nMsg 50000, Level 16, State 1, Line 12\n\
    Problem with ProductIds 100, 200, 300\n```\n\n**注意** 熟悉 C 编程的读者会注意到，`RAISERROR`\
    \ 使用的格式设计符与 C 语言的 `printf` 函数使用的相同。有关支持的设计符的完整列表，请参阅 SQL Server 2008 联机丛书中的“[RAISERROR\
    \ (Transact-SQL)](https://docs.microsoft.com/en-us/sql/t-sql/language-elements/raiserror-transact-sql)”主题。\n\
    \n## 创建持久的自定义错误消息\n\n使用格式设计符格式化消息而不是动态构建字符串是朝着正确方向迈出的一步，但它没有解决最后一个关键问题：如果你需要在多个地方使用相同的错误消息怎么办？你可以在需要该异常的每个例程中简单地使用完全相同的参数调用\
    \ `RAISERROR`，但如果你需要更改错误消息，这可能会导致维护难题。此外，每个异常都将只能使用默认的用户定义错误号 50000，这使得针对这些自定义异常的编程变得更加困难。\n\
    \n幸运的是，SQL Server 很好地解决了这些问题，它提供了一种机制，可以将自定义错误消息添加到 `sys.messages`。然后，可以使用 `RAISERROR`\
    \ 并传入自定义错误号作为第一个参数来引发使用这些错误消息的异常。\n\n要创建持久的自定义错误消息，请使用存储过程 `sp_addmessage`。此存储过程允许用户为大于\
    \ 50000 的消息编号指定自定义消息。除了错误消息外，用户还可以指定默认严重级别。使用 `sp_addmessage` 添加的消息的作用域是服务器级别，因此如果你在同一服务器上托管多个应用程序，请注意它们是否定义了自定义消息以及是否存在任何重叠——你可能需要为一个或多个应用程序设置新的\
    \ SQL Server 实例，以允许它们创建自己的异常。在开发使用自定义消息的新应用程序时，请尝试选择一个定义明确的范围来创建你的消息，以避免在共享环境中与其他应用程序重叠。\n\
    \n请记住，你可以使用 50000 到 2147483647 之间的任何数字，不必局限于 50000 范围。\n\n添加自定义消息就像调用 `sp_addmessage`\
    \ 并定义消息编号和消息文本一样简单。以下 T-SQL 将上一节中的消息定义为错误消息编号 50005：\n\n```sql\nEXEC sp_addmessage\n\
    \    @msgnum = 50005,\n    @severity = 16,\n    @msgtext = 'Problem with ProductIds\
    \ %i, %i, %i';\nGO\n```\n\n一旦执行此 T-SQL，就可以通过使用适当的错误号调用 `RAISERROR` 来引发使用此错误消息的异常：\n\
    \n```sql\nRAISERROR(50005, 15, 1, 100, 200, 300);\n```\n\n这会导致以下输出被发送回客户端：\n\n\
    ```\nMsg 50005, Level 15, State 1, Line 1\nProblem with ProductIds 100, 200, 300\n\
    ```\n\n请注意，在这种情况下调用 `RAISERROR` 时指定了严重级别 15，尽管自定义错误最初定义为严重级别 16。这引出了关于自定义错误严重级别的一点重要说明：在调用\
    \ `RAISERROR` 时指定的任何严重级别都将覆盖为该错误定义的严重级别。但是，如果你向 `RAISERROR` 的该参数传递一个负值，则将使用默认严重级别：\n\
    \n```sql\nRAISERROR(50005, -1, 1, 100, 200, 300);\n```\n\n这会产生以下输出（请注意，`Level`\
    \ 现在是 16，与创建错误消息时定义的一致）：\n\n```\nMsg 50005, Level 16, State 1, Line 1\nProblem\
    \ with ProductIds 100, 200, 300\n```\n\n建议，除非有特定原因需要覆盖严重级别，否则在引发自定义异常时，始终对严重性参数使用\
    \ -1。\n"
- fmt: "# CHAPTER 4: ERRORS AND EXCEPTIONS\n\n## Logging User-Thrown Exceptions\n\n\
    Changing the text of an exception once defined is also easy using `sp_addmessage`.\
    \ To do so, pass the optional `@Replace` argument, setting its value to `'Replace'`,\
    \ as in the following T-SQL:\n\n```sql\nEXEC sp_addmessage\n    @msgnum = 50005,\n\
    \    @severity = 16,\n    @msgtext = 'Problem with ProductId numbers %i, %i, %i',\n\
    \    @Replace = 'Replace';\nGO\n```\n\n> **Note:** In addition to being able to\
    \ add a message and set a severity, `sp_addmessage` supports localization of messages\
    \ for different languages. The examples here do not show localization; instead,\
    \ messages will be created for the user’s default language. For details on localized\
    \ messages, refer to SQL Server 2008 Books Online.\n\nAnother useful feature of\
    \ `RAISERROR` is the ability to log messages to SQL Server’s error log. This can\
    \ come in handy especially when working with automated code, such as T-SQL run\
    \ via a SQL Server agent job.\n\nIn order to log any exception, use the `WITH\
    \ LOG` option of the `RAISERROR` function, as in the following T-SQL:\n\n```sql\n\
    RAISERROR('This will be logged.', 16, 1) WITH LOG;\n```\n\nNote that specific\
    \ access rights are required to log an error. The user executing the `RAISERROR`\
    \ function must either be a member of the `sysadmin` fixed server role or have\
    \ `ALTER TRACE` permissions.\n\n## Monitoring Exception Events with Traces\n\n\
    Some application developers go too far in handling exceptions, and end up creating\
    \ applications that hide problems by catching every exception that occurs and\
    \ not reporting it. In such cases it can be extremely difficult to debug issues\
    \ without knowing whether an exception is being thrown. Should you find yourself\
    \ in this situation, you can use a Profiler trace to monitor for exceptions occurring\
    \ in SQL Server.\n\nIn order to monitor for exceptions, start a trace and select\
    \ the `Exception` and `User Error Message` events. For most exceptions with a\
    \ severity greater than 10, both events will fire. The `Exception` event will\
    \ contain all of the data associated with the exception except for the actual\
    \ message. This includes the error number, severity, state, and line number. The\
    \ `User Error Message` event will contain the formatted error message as it was\
    \ sent to the client.\n\nFor warnings (messages with a severity of less than 11),\
    \ only the `User Error Message` event will fire.\n\nYou may also notice error\
    \ 208 exceptions (“Object not found”) without corresponding error message events.\
    \ These exceptions are used internally by the SQL Server query optimizer during\
    \ the scope-resolution phase of compilation, and can be safely ignored.\n\n##\
    \ Exception Handling\n\nUnderstanding when, why, and how SQL Server throws exceptions\
    \ is great, but the real goal is to actually *do something* when an exception\
    \ occurs. **Exception handling** refers to the ability to **catch** an exception\
    \ when it occurs, rather than simply letting it bubble up to the next level of\
    \ scope.\n\n### Why Handle Exceptions in T-SQL?\n\nException handling in T-SQL\
    \ should be thought of as no different from exception handling in any other language.\
    \ A generally accepted programming practice is to handle exceptions at the *lowest\
    \ possible scope*, in order to keep them from interacting with higher levels of\
    \ the application. If an exception can be caught at a lower level and dealt with\
    \ there, higher-level modules will not require special code to handle the exception,\
    \ and therefore can concentrate on whatever their purpose is. This means that\
    \ every routine in the application becomes simpler, more maintainable, and therefore\
    \ quite possibly more robust.\n\nPut another way, exceptions should be *encapsulated*\
    \ as much as possible—knowledge of the internal exceptions of other modules is\
    \ yet another form of coupling, not so different from some of the types discussed\
    \ in the first chapter of this book.\n\nKeep in mind that encapsulation of exceptions\
    \ is really something that must be handled on a case-by-case basis. But the basic\
    \ rule is, if you can “fix” the exception one way or another without letting the\
    \ caller ever know it even occurred, that is probably a good place to encapsulate.\n\
    \n### Exception “Handling” Using @@ERROR\n\nVersions of SQL Server prior to SQL\
    \ Server 2005 did not have true exception-handling capabilities. Any exception\
    \ that occurred would be passed back to the caller, regardless of any action taken\
    \ by the code of the stored procedure or query in which it was thrown. Although\
    \ for the most part SQL Server 2008 now provides better alternatives, the general\
    \ method used to “handle” errors in those earlier versions of SQL Server is still\
    \ useful in some cases—and a lot of legacy code will be around for quite a while—so\
    \ a quick review is definitely warranted.\n\n> **Note:** If you’re following the\
    \ examples in this chapter in order, make sure that you have turned off the `XACT_ABORT`\
    \ setting before trying the following examples.\n\nThe `@@ERROR` function is quite\
    \ simple: it returns `0` if the last statement in the batch did not throw an error\
    \ of severity 11 or greater. If the last statement did throw an error, it returns\
    \ the error number. For example, consider the following T-SQL:\n\n```sql\nSELECT\
    \ 1/0 AS DivideByZero;\nSELECT @@ERROR AS ErrorNumber;\nGO\n```\n\nThe first statement\
    \ returns the following message:\n\n```\nMsg 8134, Level 16, State 1, Line 1\n\
    Divide by zero error encountered.\n```\n\nand the second statement returns a result\
    \ set containing a single value, containing the error number associated with the\
    \ previous error:\n\n```\nErrorNumber\n-----------\n8134\n```\n\nBy checking to\
    \ see whether the value of `@@ERROR` is nonzero, it is possible to perform some\
    \ very primitive error handling. Unfortunately, this is also quite error prone\
    \ due to the nature of `@@ERROR` and the fact that it only operates on the *last\
    \ statement* executed in the batch. Many developers new to T-SQL are quite surprised\
    \ by the output of the following batch:\n\n```sql\nSELECT 1/0 AS DivideByZero;\n\
    IF @@ERROR <> 0\n    SELECT @@ERROR AS ErrorNumber;\nGO\n```\n\nThe first line\
    \ of this code produces the same error message as before, but on this occasion,\
    \ the result of `SELECT @@ERROR` is:\n\n```\nErrorNumber\n-----------\n0\n```\n\
    \nThe reason is that the statement executed immediately preceding `@@ERROR` was\
    \ not the divide by zero, but rather the line `IF @@ERROR <> 0`, which did not\
    \ generate an error. The solution to this problem is to set a variable to the\
    \ value of `@@ERROR` after every statement in a batch that requires error handling,\
    \ and then check that variable rather than the value of `@@ERROR` itself. Of course,\
    \ if even a single statement is missed, holes may be left in the strategy, and\
    \ some errors may escape notice.\n\nEven with these problems, `@@ERROR` arguably\
    \ still has a place in SQL Server 2008. It is a simple, lightweight alternative\
    \ to the full-blown exception-handling capabilities that have been added more\
    \ recently to the T-SQL language, and it has the additional benefit of *not* catching\
    \ the exception. In some cases, full encapsulation is not the best option, and\
    \ using `@@ERROR` will allow the developer to take some action—for instance, logging\
    \ of the exception—while still passing it back to the caller.\n\n### SQL Server’s\
    \ TRY/CATCH Syntax\n\nThe standard error-handling construct in many programming\
    \ languages, including T-SQL, is known as *try/catch*. The idea behind this construct\
    \ is to set up two sections (aka **blocks**) of code. The first section, the **try\
    \ block**, contains exception-prone code to be “tried.” The second section contains\
    \ code that should be executed in the event that the code in the try block fails,\
    \ and an exception occurs. This is called the **catch block**. As soon as any\
    \ exception occurs within the try block, code execution immediately jumps into\
    \ the catch block. This is also known as **catching** an exception.\n\nIn T-SQL,\
    \ `try/catch` is implemented using the following basic form:\n\n```sql\nBEGIN\
    \ TRY\n    -- Code to try here\nEND TRY\nBEGIN CATCH\n    -- Code to execute if\
    \ an exception was thrown here\nEND CATCH\nGO\n```"
  raw: 'Changing the text of an exception once defined is also easy using sp_addmessage.
    To do so, pass the optional @Replace argument, setting its value to ''Replace'',
    as in the following T-SQL:


    EXEC sp_addmessage


    @msgnum = 50005,


    @severity = 16,


    @msgtext = ''Problem with ProductId numbers %i, %i, %i'',


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    @Replace = ''Replace'';


    GO


    „ **Note** In addition to being able to add a message and set a severity, sp_addmessage
    supports localization of messages for different languages. The examples here do
    not show localization; instead, messages will be created for the user’s default
    language. For details on localized messages, refer to SQL Server 2008 Books Online.


    Logging User-Thrown Exceptions


    Another useful feature of RAISERROR is the ability to log messages to SQL Server’s
    error log. This can come in handy especially when working with automated code,
    such as T-SQL run via a SQL Server agent job.


    In order to log any exception, use the WITH LOG option of the RAISERROR function,
    as in the following TSQL:


    RAISERROR(''This will be logged.'', 16, 1) WITH LOG;


    Note that specific access rights are required to log an error. The user executing
    the RAISERROR


    function must either be a member of the sysadmin fixed server role or have ALTER
    TRACE permissions.


    Monitoring Exception Events with Traces


    Some application developers go too far in handling exceptions, and end up creating
    applications that hide problems by catching every exception that occurs and not
    reporting it. In such cases it can be extremely difficult to debug issues without
    knowing whether an exception is being thrown. Should you find yourself in this
    situation, you can use a Profiler trace to monitor for exceptions occurring in
    SQL


    Server.


    In order to monitor for exceptions, start a trace and select the Exception and
    User Error Message events. For most exceptions with a severity greater than 10,
    both events will fire. The Exception event will contain all of the data associated
    with the exception except for the actual message. This includes the error number,
    severity, state, and line number. The User Error Message event will contain the
    formatted error message as it was sent to the client.


    For warnings (messages with a severity of less than 11), only the User Error Message
    event will fire.


    You may also notice error 208 exceptions (“Object not found”) without corresponding
    error message events. These exceptions are used internally by the SQL Server query
    optimizer during the scope-resolution phase of compilation, and can be safely
    ignored.


    Exception Handling


    Understanding when, why, and how SQL Server throws exceptions is great, but the
    real goal is to actually *do something* when an exception occurs. **Exception
    handling** refers to the ability to **catch** an exception when it occurs, rather
    than simply letting it bubble up to the next level of scope.


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    Why Handle Exceptions in T-SQL?


    Exception handling in T-SQL should be thought of as no different from exception
    handling in any other language. A generally accepted programming practice is to
    handle exceptions at the *lowest possible* *scope*, in order to keep them from
    interacting with higher levels of the application. If an exception can be caught
    at a lower level and dealt with there, higher-level modules will not require special
    code to handle the exception, and therefore can concentrate on whatever their
    purpose is. This means that every routine in the application becomes simpler,
    more maintainable, and therefore quite possibly more robust.


    Put another way, exceptions should be *encapsulated* as much as possible—knowledge
    of the internal exceptions of other modules is yet another form of coupling, not
    so different from some of the types discussed in the first chapter of this book.


    Keep in mind that encapsulation of exceptions is really something that must be
    handled on a case-by-case basis. But the basic rule is, if you can “fix” the exception
    one way or another without letting the caller ever know it even occurred, that
    is probably a good place to encapsulate.


    Exception “Handling” Using @@ERROR


    Versions of SQL Server prior to SQL Server 2005 did not have true exception-handling
    capabilities. Any exception that occurred would be passed back to the caller,
    regardless of any action taken by the code of the stored procedure or query in
    which it was thrown. Although for the most part SQL Server 2008 now provides better
    alternatives, the general method used to “handle” errors in those earlier versions
    of SQL


    Server is still useful in some cases—and a lot of legacy code will be around for
    quite a while—so a quick review is definitely warranted.


    „ **Note** If you’re following the examples in this chapter in order, make sure
    that you have turned off the XACT_ABORT setting before trying the following examples.


    The @@ERROR function is quite simple: it returns 0 if the last statement in the
    batch did not throw an error of severity 11 or greater. If the last statement
    did throw an error, it returns the error number. For example, consider the following
    T-SQL:


    SELECT 1/0 AS DivideByZero;


    SELECT @@ERROR AS ErrorNumber;


    GO


    The first statement returns the following message:


    Msg 8134, Level 16, State 1, Line 1


    Divide by zero error encountered.


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    and the second statement returns a result set containing a single value, containing
    the error number associated with the previous error:


    ErrorNumber


    By checking to see whether the value of @@ERROR is nonzero, it is possible to
    perform some very primitive error handling. Unfortunately, this is also quite
    error prone due to the nature of @@ERROR and the fact that it only operates on
    the *last statement* executed in the batch. Many developers new to T-SQL


    are quite surprised by the output of the following batch:


    SELECT 1/0 AS DivideByZero;


    IF @@ERROR <> 0


    SELECT @@ERROR AS ErrorNumber;


    GO


    The first line of this code produces the same error message as before, but on
    this occasion, the result of SELECT @@ERROR is


    ErrorNumber


    The reason is that the statement executed immediately preceding @@ERROR was not
    the divide by zero, but rather the line IF @@ERROR <> 0, which did not generate
    an error. The solution to this problem is to set a variable to the value of @@ERROR
    after every statement in a batch that requires error handling, and then check
    that variable rather than the value of @@ERROR itself. Of course, if even a single
    statement is missed, holes may be left in the strategy, and some errors may escape
    notice.


    Even with these problems, @@ERROR arguably still has a place in SQL Server 2008\.
    It is a simple, lightweight alternative to the full-blown exception-handling capabilities
    that have been added more recently to the T-SQL language, and it has the additional
    benefit of *not* catching the exception. In some cases, full encapsulation is
    not the best option, and using @@ERROR will allow the developer to take some action—for
    instance, logging of the exception—while still passing it back to the caller.


    SQL Server’s TRY/CATCH Syntax


    The standard error-handling construct in many programming languages, including
    T-SQL, is known as *try/catch*. The idea behind this construct is to set up two
    sections (aka **blocks**) *of code. The first section, the **try block**, contains
    exception-prone code to be “tried.” The second section contains code that should
    be executed in the event that the code in the try block fails, and an exception
    occurs. This is called the **catch block**. As soon as any exception occurs within
    the try block, code execution immediately jumps into the catch block. This is
    also known as **catching** an exception.*


    *In T-SQL, try/catch is implemented using the following basic form:


    BEGIN TRY


    --Code to try here


    END TRY


    CHAPTER 4 „ ERRORS AND EXCEPTIONS


    BEGIN CATCH'
  trans: "\n# 第四章：错误与异常\n\n## 记录用户抛出的异常\n\n一旦定义了异常文本后，使用 `sp_addmessage` 也很容易进行修改。操作时，可传入可选参数\
    \ `@Replace`，并将其值设为 `'Replace'`，如下列 T-SQL 所示：\n\n```sql\nEXEC sp_addmessage\n\
    \    @msgnum = 50005,\n    @severity = 16,\n    @msgtext = 'Problem with ProductId\
    \ numbers %i, %i, %i',\n    @Replace = 'Replace';\nGO\n```\n\n> **注意：** 除了能够添加消息和设置严重级别外，`sp_addmessage`\
    \ 还支持为不同语言本地化消息。此处的示例未显示本地化；相反，消息将为用户的默认语言创建。有关本地化消息的详细信息，请参阅 SQL Server 2008\
    \ 联机丛书。\n\n`RAISERROR` 另一个有用的功能是能够将消息记录到 SQL Server 的错误日志中。这在处理自动化代码时尤其方便，例如通过\
    \ SQL Server 代理作业运行的 T-SQL。\n\n为了记录任何异常，需要使用 `RAISERROR` 函数的 `WITH LOG` 选项，如下列\
    \ T-SQL 所示：\n\n```sql\nRAISERROR('This will be logged.', 16, 1) WITH LOG;\n```\n\
    \n请注意，记录错误需要特定的访问权限。执行 `RAISERROR` 函数的用户必须是 `sysadmin` 固定服务器角色的成员，或者具有 `ALTER\
    \ TRACE` 权限。\n\n## 使用跟踪监控异常事件\n\n一些应用程序开发人员在处理异常时做得太过头，最终创建的应用程序通过捕获发生的每个异常并且不报告来隐藏问题。在这种情况下，如果不了解是否抛出了异常，调试问题可能极其困难。如果您发现自己处于这种情况，可以使用\
    \ Profiler 跟踪来监控 SQL Server 中发生的异常。\n\n为了监控异常，需要启动一个跟踪并选择 `Exception` 和 `User\
    \ Error Message` 事件。对于大多数严重级别大于 10 的异常，这两个事件都会触发。`Exception` 事件将包含与该异常关联的所有数据，但实际的消息除外。这包括错误号、严重级别、状态和行号。`User\
    \ Error Message` 事件将包含发送给客户端的格式化错误消息。\n\n对于警告（严重级别小于 11 的消息），只会触发 `User Error\
    \ Message` 事件。\n\n您可能还会注意到错误 208 异常（“找不到对象”）而没有相应的错误消息事件。这些异常是 SQL Server 查询优化器在编译的作用域解析阶段内部使用的，可以安全地忽略。\n\
    \n## 异常处理\n\n理解 SQL Server 何时、为何以及如何抛出异常固然很好，但真正的目标是在异常发生时实际*做一些事情*。**异常处理**指的是在异常发生时能够**捕获**它，而不是简单地让它冒泡到下一级作用域的能力。\n\
    \n### 为什么要在 T-SQL 中处理异常？\n\nT-SQL 中的异常处理应被视为与其他任何语言中的异常处理没有不同。一个普遍接受的编程实践是在*尽可能低的范围*处理异常，以防止它们与更高层的应用程序交互。如果异常可以在较低层次被捕获并在那里处理，较高层的模块将不需要特殊代码来处理该异常，因此可以专注于它们自身的功能。这意味着应用程序中的每个例程都变得更简单、更易于维护，因而很可能也更健壮。\n\
    \n换句话说，异常应该尽可能地*封装*起来——了解其他模块的内部异常是另一种形式的耦合，与本书第一章讨论的某些类型没有太大不同。\n\n请记住，异常的封装确实需要根据具体情况处理。但基本规则是，如果您能够以某种方式“修复”异常而不让调用者知道它曾经发生过，那可能就是一个适合封装的地方。\n\
    \n### 使用 @@ERROR 进行异常“处理”\n\nSQL Server 2005 之前的版本没有真正的异常处理能力。发生的任何异常都会被传递回调用者，无论存储过程或查询的代码采取了何种操作（即使它抛出了异常）。尽管\
    \ SQL Server 2008 现在大多提供了更好的替代方案，但在早期版本的 SQL Server 中用于“处理”错误的一般方法在某些情况下仍然有用——而且大量遗留代码还将存在相当长一段时间——因此快速回顾一下绝对有必要。\n\
    \n> **注意：** 如果您正在按顺序尝试本章中的示例，请确保在尝试以下示例之前已关闭 `XACT_ABORT` 设置。\n\n`@@ERROR` 函数非常简单：如果批处理中的最后一条语句没有抛出严重级别为\
    \ 11 或更高的错误，则返回 `0`。如果最后一条语句确实抛出了错误，则返回错误号。例如，考虑以下 T-SQL：\n\n```sql\nSELECT 1/0\
    \ AS DivideByZero;\nSELECT @@ERROR AS ErrorNumber;\nGO\n```\n\n第一条语句返回以下消息：\n\n\
    ```\nMsg 8134, Level 16, State 1, Line 1\nDivide by zero error encountered.\n\
    ```\n\n第二条语句返回一个包含单个值的结果集，该值是与上一个错误相关的错误号：\n\n```\nErrorNumber\n-----------\n\
    8134\n```\n\n通过检查 `@@ERROR` 的值是否非零，可以执行一些非常初级的错误处理。不幸的是，由于 `@@ERROR` 的特性以及它仅作用于批处理中*最后一条*执行的语句，这种方法也相当容易出错。许多刚接触\
    \ T-SQL 的开发人员对以下批处理的输出感到非常惊讶：\n\n```sql\nSELECT 1/0 AS DivideByZero;\nIF @@ERROR\
    \ <> 0\n    SELECT @@ERROR AS ErrorNumber;\nGO\n```\n\n此代码的第一行产生了与之前相同的错误消息，但在此时，`SELECT\
    \ @@ERROR` 的结果是：\n\n```\nErrorNumber\n-----------\n0\n```\n\n原因是紧接在 `@@ERROR`\
    \ 之前执行的语句不是除零错误，而是 `IF @@ERROR <> 0` 这一行，它没有产生错误。解决此问题的方法是在批处理中每个需要错误处理的语句之后，将\
    \ `@@ERROR` 的值赋给一个变量，然后检查该变量而不是 `@@ERROR` 本身的值。当然，即使只遗漏了一条语句，策略中也可能留下漏洞，一些错误可能会逃脱注意。\n\
    \n即使存在这些问题，`@@ERROR` 在 SQL Server 2008 中可以说仍然占有一席之地。它是最近添加到 T-SQL 语言中的完整异常处理能力的一个简单、轻量级的替代方案，并且它还有一个额外的好处，即*不*捕获异常。在某些情况下，完全封装并非最佳选择，使用\
    \ `@@ERROR` 将允许开发人员采取一些操作（例如，记录异常），同时仍然将其传递回调用者。\n\n### SQL Server 的 TRY/CATCH\
    \ 语法\n\n包括 T-SQL 在内的许多编程语言中，标准的错误处理结构被称为 *try/catch*。这种结构背后的思想是设置两个代码部分（也称为**块**）。第一部分，即\
    \ **try 块**，包含要“尝试”的可能引发异常的代码。第二部分包含在 try 块中的代码失败并发生异常时应执行的代码。这被称为 **catch 块**。一旦\
    \ try 块内发生任何异常，代码执行立即跳转到 catch 块。这也被称为**捕获**异常。\n\n在 T-SQL 中，`try/catch` 使用以下基本形式实现：\n\
    \n```sql\nBEGIN TRY\n    -- 此处放置要尝试的代码\nEND TRY\nBEGIN CATCH\n    -- 如果抛出异常，则在此处执行代码\n\
    END CATCH\nGO\n```\n"
- fmt: "# 第4章 错误与异常\n\n在`BEGIN TRY`和`END TRY`之间发生的任何类型异常——连接或服务器级别异常除外——都将导致`BEGIN\
    \ CATCH`和`END CATCH`之间的代码立即执行，绕过`TRY`块中剩余的任何代码。\n\n作为第一个示例，考虑以下T-SQL：\n\n```sql\n\
    BEGIN TRY\n    SELECT 1/0 AS DivideByZero;\nEND TRY\nBEGIN CATCH\n    SELECT 'Exception\
    \ Caught!' AS CatchMessage;\nEND CATCH\n```\n\n运行此批处理会产生以下输出：\n\n```\nDivideByZero\n\
    CatchMessage\nException Caught!\n```\n\n这里需要注意的是，首先，没有报告异常。我们可以看到发生了异常，因为代码执行跳到了`CATCH`块，但异常被成功处理了，客户端并不知道发生了异常。其次，请注意导致异常的`SELECT`语句返回了一个空结果集。如果异常没有被处理，则不会返回任何结果集。通过返回空结果集，`SELECT`语句的隐含契约得到了履行（或多或少，取决于客户端实际期望什么）。\n\
    \n虽然已经提到过，但需要强调的是，当使用`TRY/CATCH`时，在`TRY`块中遇到的所有异常都将立即中止`TRY`块剩余部分的执行。\n\n因此，以下T-SQL的输出与上一个示例完全相同：\n\
    \n```sql\nBEGIN TRY\n    SELECT 1/0 AS DivideByZero;\n    SELECT 1 AS NoError;\n\
    END TRY\nBEGIN CATCH\n    SELECT 'Exception Caught!' AS CatchMessage;\nEND CATCH\n\
    ```\n\n## 获取`CATCH`块中的扩展错误信息\n\n除了能够捕获异常之外，SQL Server 2008还提供了一系列可在`CATCH`块中使用的附加函数。这些函数（列表如下）使开发人员能够编写代码来检索`TRY`块中发生的异常的信息。\n\
    \n- `ERROR_MESSAGE`\n- `ERROR_NUMBER`\n- `ERROR_SEVERITY`\n- `ERROR_STATE`\n-\
    \ `ERROR_LINE`\n- `ERROR_PROCEDURE`\n\n这些函数不接受输入参数，并且根据其名称来看，其含义相当直观。\n\n然而，重要的是要指出，与`@@ERROR`不同，这些函数返回的值在每个语句之后不会被重置。它们在整个`CATCH`块中是持久的。因此，以下T-SQL中使用的逻辑是有效的：\n\
    \n```sql\nBEGIN TRY\n    SELECT CONVERT(int, 'ABC') AS ConvertException;\nEND\
    \ TRY\nBEGIN CATCH\n    IF ERROR_NUMBER() = 123\n        SELECT 'Error 123';\n\
    \    ELSE\n        SELECT ERROR_NUMBER() AS ErrorNumber;\nEND CATCH\n```\n\n正如预期的那样，在这种情况下，错误编号被正确报告：\n\
    \n```\nConvertException\nErrorNumber\n```\n\n这些函数，特别是`ERROR_NUMBER`，允许为某些异常编写特定的代码路径。\n\
    \n例如，如果开发人员知道某段代码可能会引发可以程序化修复的异常，则可以在`CATCH`块中检查该异常编号。\n\n## 重新抛出异常\n\n大多数具有`try/catch`功能的编程语言中有一个常见特性，即能够从`catch`块中`rethrow`异常。这意味着最初在`try`块中发生的异常将被再次引发，就像它根本没有被处理一样。当你需要对异常进行一些处理，但同时也要让调用者知道例程中出现了问题时，这很有用。\n\
    \nT-SQL不包含任何内置的`rethrow`功能。然而，基于`CATCH`块错误函数，结合`RAISERROR`，很容易创建这种行为。以下示例展示了T-SQL中`rethrow`的基本实现：\n\
    \n```sql\nBEGIN TRY\n    SELECT CONVERT(int, 'ABC') AS ConvertException;\nEND\
    \ TRY\nBEGIN CATCH\n    DECLARE\n        @ERROR_SEVERITY int = ERROR_SEVERITY(),\n\
    \        @ERROR_STATE int = ERROR_STATE(),\n        @ERROR_NUMBER int = ERROR_NUMBER(),\n\
    \        @ERROR_LINE int = ERROR_LINE(),\n        @ERROR_MESSAGE varchar(245)\
    \ = ERROR_MESSAGE();\n    RAISERROR('Msg %d, Line %d: %s',\n              @ERROR_SEVERITY,\n\
    \              @ERROR_STATE,\n              @ERROR_NUMBER,\n              @ERROR_LINE,\n\
    \              @ERROR_MESSAGE);\nEND CATCH\nGO\n```\n\n由于`RAISERROR`不能用于抛出低于13000的异常，在这种情况下“重新抛出”异常需要引发一个用户定义的异常，并将数据以特殊格式的错误消息发回。由于函数不允许在`RAISERROR`的调用中使用，因此必须在调用`RAISERROR`重新抛出异常之前定义变量并赋值错误函数的值。以下是此T-SQL的输出消息：\n\
    \n```\n(0 row(s) affected)\nMsg 50000, Level 16, State 1, Line 19\nMsg 245, Line\
    \ 2: Conversion failed when converting the varchar value 'ABC'\nto data type int.\n\
    ```\n\n请记住，根据你的接口需求，你可能并不总是希望重新抛出最初捕获的相同异常。在许多情况下，捕获初始异常，然后抛出一个对调用者更相关（或更有帮助）的新异常可能更有意义。\n\
    \n例如，如果你正在使用链接服务器，并且该服务器由于某种原因没有响应，你的代码将抛出超时异常。传回一个通用的“数据不可用”异常可能比向调用者暴露问题的实际原因更有意义。这应该根据具体情况决定，以便你为存储过程接口设计出最佳方案。\n\
    \n## 何时应该使用`TRY/CATCH`？\n\n如前所述，在T-SQL例程（例如存储过程中）处理异常的一般用例是，尽可能在较低级别进行封装，以简化应用程序的整体代码。这方面的一个主要例子是记录数据库异常。与其将无法正确处理的异常发送回应用层（在那里它将被记录回数据库），不如在数据库例程的范围内记录它，这样可能更有意义。\n\
    \n另一个用例涉及对源于应用程序代码的问题进行临时修复。例如，应用程序可能由于一个错误，偶尔向存储过程传递无效的键，而该存储过程本应将它们插入表中。通过在数据库中简单地捕获异常，而不是将其抛回给应用程序导致用户收到错误消息，来*临时*“修复”问题，可能更简单。将此类快速修复到位通常比重建和重新部署整个应用程序要便宜得多。\n\
    \n考虑何时*不*封装异常也很重要。确保不要过度处理安全问题、严重的数据错误以及其他应用程序——最终是用户——可能应该被告知的异常。绝对存在“过度处理异常”这种事，陷入这个陷阱可能意味着问题会被隐藏，直到它们引起足够的骚动而变得无法忽视。\n\
