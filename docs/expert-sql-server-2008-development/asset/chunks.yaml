    \ AS` 语句模拟另一个用户或登录名，必须授予用户对指定目标的 `IMPERSONATE` 权限。\n\n`SELECT` 语句返回值 `Tom`，表明这是当前被模拟的用户。\n\
    \n执行 `EXECUTE AS` 之后进行的任何操作都将使用 `Tom` 的凭据。例如，该用户可以修改 `TomsData` 表，因为 `Tom` 拥有该表。但是，尝试创建新表将会失败，因为\
    \ `Tom` 没有执行此操作的权限：\n\n```sql\n--此语句将成功\nALTER TABLE TomsData\nADD AnotherColumn\
    \ datetime;\nGO\n\n--此语句将因“CREATE TABLE 权限被拒绝”而失败\nCREATE TABLE MoreData\n(\n\
    \    YetAnotherColumn int\n);\nGO\n```\n\n在 `Tom` 权限上下文中完成数据库操作后，可以使用 `REVERT`\
    \ 命令返回到外部上下文。如果在该上下文中模拟了另一个用户（即多次调用了 `EXECUTE AS`），则需要多次调用 `REVERT` 才能将上下文返回到你的登录名。可以随时检查\
    \ `USER_NAME()` 函数，以了解你正在谁的上下文中执行。\n\n要查看嵌套模拟的效果，首先确保从 `Tom` 的上下文中恢复出来，然后按如下所示创建第二个用户。将使用\
    \ `GRANT IMPERSONATE` 授予该用户模拟 `Tom` 的权利：\n\n```sql\nCREATE USER Paul WITHOUT LOGIN;\n\
    GO\n\nGRANT IMPERSONATE ON USER::Tom TO Paul;\nGO\n```\n"
- fmt: 'If `Paul` is impersonated, the session will have no privileges to select rows
    from the `TomsData` table. In order to get those permissions, `Tom` must be impersonated
    from within `Paul`’s context:


    ```

    EXECUTE AS USER=''Paul'';


    GO


    --Fails


    SELECT *


    FROM TomsData;


    GO


    EXECUTE AS USER=''Tom'';


    GO


    --Succeeds


    SELECT *


    FROM TomsData;


    GO


    REVERT;


    GO


    --Returns ''Paul'' -- REVERT must be called again to fully revert


    SELECT USER_NAME();


    GO


    REVERT;


    GO

    ```


    The most important thing to understand is that when `EXECUTE AS` is called, all
    operations will run as if you are logged in as the impersonated user. You will
    lose any permissions that the outer user has that the impersonated user does not
    have, in addition to gaining any permissions that the impersonated user has that
    the outer user lacks.


    For logging purposes, it is sometimes important to record the actual logged-in
    principal. Since both the `USER_NAME()` function and the `SUSER_NAME()` function
    will return the names associated with the impersonated user, the `ORIGINAL_LOGIN()`
    function must be used to return the name of the outermost server login. Use of
    `ORIGINAL_LOGIN()` will allow you to get the name of the logged-in server principal,
    no matter how nested their impersonation scope is.


    # CHAPTER 5 „ PRIVILEGE AND AUTHORIZATION


    ## What is a module?


    Each of the privilege escalation examples that follow use stored procedures to
    demonstrate a particular element of functionality. However, please be aware that
    these methods work for any kind of module that `SQL Server` supports, not just
    stored procedures. A module is defined as any kind of code container that can
    be created inside of `SQL Server`: a stored procedure, view, user-defined function,
    trigger, or CLR assembly.


    Ownership Chaining


    The most common method of securing `SQL Server` resources is to deny database
    users any direct access to `SQL Server` resources and provide access only via
    stored procedures or views. If a database user has access to execute a stored
    procedure, and the stored procedure is owned by the same database user that owns
    a resource being referenced within the stored procedure, the user executing the
    stored procedure will be given access to the resource via the stored procedure.
    This is called an ownership chain.


    To illustrate, start by creating and switching to a new database:


    ```

    CREATE DATABASE OwnershipChain;


    GO


    USE OwnershipChain;


    GO

    ```


    Now create two database users, `Louis` and `Hugo`:


    ```

    CREATE USER Louis


    WITHOUT LOGIN;


    GO


    CREATE USER Hugo


    WITHOUT LOGIN;


    GO

    ```


    Note For this and subsequent examples in this chapter, you should connect to `SQL
    Server` using a login that is a member of the `sysadmin` server role.


    Note that both of these users are created using the `WITHOUT LOGIN` option, meaning
    that although these users exist in the database, they are not tied to a `SQL Server`
    login, and therefore no one can authenticate as one of them by logging into the
    server. This option is one way of creating the kind of proxy users mentioned previously.


    Once the users have been created, create a table owned by `Louis`:


    ```

    CREATE TABLE SensitiveData


    (


    IntegerData int


    );


    GO


    ALTER AUTHORIZATION ON SensitiveData TO Louis;


    GO

    ```


    At this point, `Hugo` has no access to the table. To create an access path without
    granting direct permissions to the table, a stored procedure could be created,
    also owned by `Louis`:


    ```

    CREATE PROCEDURE SelectSensitiveData


    AS


    BEGIN


    SET NOCOUNT ON;


    SELECT *


    FROM dbo.SensitiveData;


    END;


    GO


    ALTER AUTHORIZATION ON SelectSensitiveData TO Louis;


    GO

    ```


    `Hugo` still has no permissions on the table at this point; the user needs to
    be given permission to execute the stored procedure:


    ```

    GRANT EXECUTE ON SelectSensitiveData TO Hugo;

    ```


    At this point `Hugo` can execute the `SelectSensitiveData` stored procedure, thereby
    selecting from the `SensitiveData` table. However, this only works when the following
    conditions are met:


    1. The table and the stored procedure are both owned by the same user (in this
    case, `Louis`).


    2. The table and the stored procedure are both in the same database.'
