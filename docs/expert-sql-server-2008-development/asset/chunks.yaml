  raw: 'Once you have set up performance counters and traces, you are ready to begin
    actual performance testing. But this raises the question, “Where to begin?” Especially
    in a large legacy application, running an end-to-end performance test can be a
    daunting task.


    A first step is to determine what kinds of unit and functional tests exist, and
    evaluate whether they can be used as starting points for performance tests. Some
    load testing tools, such as Microsoft’s Visual Studio Team System 2008, have the
    ability to directly load-test prebuilt unit tests. However, most commercial load
    tools are designed to exercise applications or web code directly. Try to collect
    as many tests as possible to cover the most-used parts of the application. Absolute
    coverage is nice, but is unrealistic in many cases.


    The next step is to implement a load testing suite using the prebuilt unit and
    functional tests.


    Depending on which load tool you are using, this can take some time. The key is
    to make sure that the load tool passes random or semirandom inputs into any function
    that goes back to the database, in order to simulate real traffic and make sure
    that caching does not play too big a part in skewing numbers. Nonrandom inputs
    can mask disk I/O issues caused by buffer cache recycling.


    Set goals for the test to determine what level of load you need to test at. If
    you are testing on a system that mirrors the application’s production environment,
    try to test at a load equal to that which the application encounters during peak
    periods. If the test servers are less powerful than the production systems, scale
    back appropriately. Note that it can be difficult to test against servers that
    aren’t scaled the same as production systems. For instance, if the production
    database system has eight processors and is attached to a dedicated storage area
    network (SAN), and the test database system has four processors and internal drives,
    there may be an I/O mismatch. In this situation it might be advisable to modify
    SQL Server’s processor affinity on the test system such that less processor power
    is available, which will make the available processor to available disk I/O ratio
    fall into line with the actual environment in which code needs to run.


    In addition to making sure that the test and production systems are scaled similarly,
    make sure that the SQL Server configurations in both systems are similar. For
    example, ensure that the maximum degree of parallelism is set similarly so that
    processors will be used the same way in queries on both the test and production
    systems. Likewise, you should monitor the RAM options to ensure that they are
    configured to equivalent percentages on both systems—so if your production system
    has 16GB of RAM


    but SQL Server’s maximum server memory setting is 12GB, you’ll want to set your
    test system to use 75


    percent of the available RAM as well.


    Once user goals are set, load tests should generally be configured to step up
    load slowly, rather than immediately hit the server with the peak number of users.
    Gradually increasing load during the test creates a more accurate simulation of
    a typical production environment, in which a server may get rebooted during a
    maintenance period, then slowly accept user requests and warm up its caches before
    encountering a larger number of requests during more active times of the day.
    Note that step testing may not be an accurate figure if you’re testing a situation
    such as a cluster failover, in which a server may be subjected to a full load
    immediately upon starting up.


    The goal of a big-picture test is to see how the system scales overall. Try to
    look at general trends in the performance counters to determine whether the system
    can handle load spikes, or generally sustained load over long periods of time
    (again, depending on actual application usage patterns, if possible). Data captured
    during this period can be used later for more granular analysis of specific components.


    Granular Analysis


    If the results of a big-picture test show that certain areas need work, a more
    granular investigation into specific routines will generally be necessary. Using
    aggregated trace data collected from a full system 68


    CHAPTER 3 „ TESTING DATABASE ROUTINES


    test, it’s important to evaluate both individual queries and *groups* of queries
    that are long-running or resource intensive.


    While it is often tempting to look only at the worst offending queries—for instance,
    those with the maximum duration—this may not tell the complete story. For instance,
    you may notice that certain stored procedures are taking longer than others to
    run during peak load. These procedures may be responsible for longer user interface
    wait times, but the individual stored procedure with the longest duration may
    not necessarily indicate the single longest user interface wait time. This is
    due to the fact that many applications call more than one stored procedure every
    time the interface needs to be updated with additional data. In these cases it
    is important to group procedures that are called together and aggregate their
    total resource utilization.


    When aggregating the combined performance impact of a group of queries, it is
    important to


    consider the way in which those procedures are called:


    •


    If stored procedures are called sequentially, their individual durations should
    be


    added together in order to determine the total user wait time for that group,
    and


    the maximum resource utilization of any procedure in the group should be


    recorded.


    •


    If, on the other hand, all of the procedures are called simultaneously in parallel


    (for instance, on different connections), resource utilization should be totaled
    in


    order to determine the group’s overall impact on the system, and the duration
    of


    the longest-running individual query should be noted.


    For example, assume that in a given system, whenever a user logs in, three different
    stored


    procedures are called to get data for the first screen. Table 3-1 shows the average
    data collected for these stored procedures.


    *Table 3-1\. Stored Procedures Called After Login, with Averaged Data*


    **Stored**


    **Procedure Duration**


    **(ms) CPU Reads Writes**


    LogSessionStart


    422 10


    GetSessionData


    224 210


    GetUserInfo


    305 166


    If the system calls these stored procedures sequentially, the total duration that
    should be recorded for this group is 951 ms (422 + 224 + 305). Since each is called
    individually, total system impact at any given time will only be as much as the
    maximum values for each of the given columns. So we record 210


    for CPU, 6408 for Reads, and 1 for Writes.


    On the other hand, if these stored procedures are called simultaneously, the impact
    will be much different. Total duration will only be as much as the longest running
    of the three—422ms (assuming, of course, that the system has enough resources
    available to handle all three requests at the same time).


    However, CPU time during the run should be recorded as 386, Reads as 9932, and
    Writes as 1.


    By grouping stored procedures in this way, the total impact for a given feature
    can be assessed. It may be the case that individually long-running stored procedures
    are not the primary performance culprits, and are actually being overshadowed
    by groups of seemingly less resource-intensive stored procedures. This can also
    be an issue with cursors that are doing a large number of very small fetch 69


    CHAPTER 3 „ TESTING DATABASE ROUTINES


    operations. Each individual fetch may fall under the radar, but taken as a whole,
    it may become clear that the cursor is using a lot of resources.


    Another benefit of this kind of grouping is that further aggregation is possible.
    For instance, given these figures, it is possible to determine how much impact
    a certain number of users logging in simultaneously would have on the system.
    That information can be useful when trying to reach specific scalability goals.


    Fixing Problems: Is It Sufficient to Focus on the Obvious?'
  trans: '# 性能测试：从何处开始


    一旦设置好了性能计数器和跟踪，你就准备好开始实际的性能测试了。但这引出了一个问题，“从哪里开始？”尤其是在一个大型遗留应用程序中，运行端到端的性能测试可能是一项艰巨的任务。


    第一步是确定存在哪些类型的单元测试和功能测试，并评估它们是否可以作为性能测试的起点。一些负载测试工具，例如 Microsoft 的 `Visual Studio
    Team System 2008`，能够直接对预构建的单元测试进行负载测试。然而，大多数商业负载工具是为直接操作应用程序或 Web 代码而设计的。尝试收集尽可能多的测试，以覆盖应用程序最常用的部分。绝对覆盖固然好，但在许多情况下是不现实的。


    下一步是使用预构建的单元测试和功能测试来实现一个负载测试套件。这可能会花费一些时间，具体取决于你使用的负载工具。关键是要确保负载工具向任何返回数据库的函数传递随机或半随机的输入，以模拟真实流量，并确保缓存不会对数字产生过大影响而扭曲结果。非随机输入可能会掩盖由缓冲区缓存回收引起的磁盘
    I/O 问题。


    ## 设置目标


    为测试设定目标，以确定你需要测试的负载水平。如果你在一个镜像应用程序生产环境的系统上进行测试，尝试在等于应用程序在高峰时段遇到的负载水平下进行测试。如果测试服务器的性能不如生产系统，则应相应地降低负载水平。请注意，在服务器规模与生产系统不同的情况下进行测试可能很困难。例如，如果生产数据库系统有八个处理器并连接到专用存储区域网络（`SAN`），而测试数据库系统有四个处理器和内部驱动器，则可能会出现
    I/O 不匹配。在这种情况下，建议修改测试系统上 `SQL Server` 的处理器亲和性，使可用的处理器功率减少，从而使可用处理器与可用磁盘 I/O 的比率与代码需要运行的实际环境保持一致。


    除了确保测试和生产系统规模相似外，还要确保两个系统中的 `SQL Server` 配置相似。例如，确保 `maximum degree of parallelism`
    设置相似，以便在测试和生产系统上查询对处理器的使用方式相同。同样，你应该监控 `RAM` 选项，以确保它们在两个系统上配置为等效的百分比——因此，如果你的生产系统有
    `16GB` 的 `RAM`，但 `SQL Server` 的 `maximum server memory` 设置是 `12GB`，你也会希望将测试系统设置为使用
    `75%` 的可用 `RAM`。


    ## 执行测试


    一旦用户目标设定，负载测试通常应配置为缓慢增加负载，而不是立即用峰值用户数冲击服务器。在测试期间逐渐增加负载可以更准确地模拟典型的生产环境，在这种环境中，服务器可能在维护期间重启，然后在遇到更活跃时段的更多请求之前，缓慢接受用户请求并预热其缓存。请注意，如果你正在测试诸如集群故障转移之类的情况，逐步测试可能不是一个准确的描绘，在那种情况下，服务器可能在启动后立即承受满负荷。


    整体测试的目标是查看系统整体扩展情况。尝试查看性能计数器的总体趋势，以确定系统是否能处理负载峰值，或者通常能承受长期持续的负载（再次强调，如果可能，应根据实际的应用程序使用模式）。在此期间捕获的数据可用于以后对特定组件进行更细致的分析。


    ## 细致分析


    如果整体测试的结果显示某些领域需要改进，通常需要对特定例程进行更细致的调查。使用从全系统测试收集的聚合跟踪数据，评估单个查询和作为一组的长时间运行或资源密集型查询是很重要的。


    虽然通常很容易只看最糟糕的查询——例如，那些持续时间最长的查询——但这可能无法说明全部情况。例如，你可能会注意到在高峰负载期间某些存储过程比其他过程运行时间更长。这些过程可能导致更长的用户界面等待时间，但持续时间最长的单个存储过程不一定表示单个最长的用户界面等待时间。这是因为许多应用程序在界面需要更新附加数据时会调用多个存储过程。在这些情况下，将同时调用的过程分组并聚合它们的总体资源利用率非常重要。


    在聚合一组查询的综合性能影响时，考虑这些过程的调用方式很重要：


    *   如果存储过程是按顺序调用的，则应将其各自的持续时间相加，以确定该组的总用户等待时间，并记录组中任何过程的最大资源利用率。

    *   另一方面，如果所有过程都是同时并行调用的（例如，在不同的连接上），则应总计资源利用率，以确定该组对系统的总体影响，并记录运行时间最长的单个查询的持续时间。


    例如，假设在一个给定的系统中，每当用户登录时，都会调用三个不同的存储过程来获取第一个屏幕的数据。表 3-1 显示了为这些存储过程收集的平均数据。


    *表 3-1. 登录后调用的存储过程及其平均数据*


    | 存储过程 | 持续时间 (ms) | CPU | 读取 | 写入 |

    | :--- | :--- | :--- | :--- | :--- |

    | LogSessionStart | 422 | 10 | ... | ... |

    | GetSessionData | 224 | 210 | ... | ... |

    | GetUserInfo | 305 | 166 | ... | ... |


    如果系统按顺序调用这些存储过程，则应为该组记录的总持续时间为 `951` ms (`422 + 224 + 305`)。由于每个都是单独调用的，因此在任何给定时间，对系统的总影响将仅达到给定列中的最大值。因此，我们记录
    `CPU` 为 `210`，`Reads` 为 `6408`，`Writes` 为 `1`。


    另一方面，如果这些存储过程是同时调用的，影响将会大不相同。总持续时间将仅为三个过程中运行时间最长的那个——`422`ms（当然，假设系统有足够的资源来同时处理所有三个请求）。然而，运行期间的
    `CPU` 时间应记录为 `386`，`Reads` 为 `9932`，`Writes` 为 `1`。


    通过对存储过程进行分组，可以评估特定功能的总体影响。可能的情况是，单个长时间运行的存储过程并非主要的性能罪魁祸首，而实际上被一组看似资源密集度较低的存储过程所掩盖。对于执行大量非常小的
    `fetch` 操作的游标来说，这也可能是一个问题。每个单独的 `fetch` 可能难以察觉，但作为一个整体来看，可能会清楚地看到该游标正在使用大量资源。


    这种分组的另一个好处是可以进行进一步的聚合。例如，给定这些数据，可以确定一定数量的用户同时登录对系统的影响有多大。在尝试达到特定的可扩展性目标时，这些信息可能很有用。


    ## 解决问题：关注显而易见的部分就足够了吗？'
- fmt: 'When evaluating the performance of a system and trying to determine where
    to look to fix problems, it can be tempting to focus on the obvious worst offenders
    first. However, some care should be taken to make effective use of your time;
    in many cases what appear to be the obvious problems are actually side effects
    of other, more subtle issues.


    Looking at `Duration` alone is often the easiest mistake to make when analyzing
    performance issues.


    `Duration` tells a major part of the story, but it does not necessarily indicate
    a performance problem with that `stored procedure`. It may indicate that the query
    had to wait for some other query—or queries—to complete, or that the query was
    competing with other queries for resources. When performance tuning, it is best
    to be suspicious of long-running queries with very low reported resource utilization.
    These are often not the real culprits at all.


    By using the granular analysis technique and aggregating, it is often possible
    to find the real offenders more easily. For instance, in one fairly high-transaction
    system, a `procedure` was getting called from time to time that was writing `10MB`
    of data to the disk. This `procedure` reported a high `Duration`, which was interpreted
    as a possible performance problem. Unfortunately there wasn’t much to tune in
    that `stored procedure`, but further aggregate analysis revealed another `stored
    procedure` in the system that was getting called over `1,000` times a minute and
    writing as much as `50KB` to the disk each time it was called. Each call to the
    second `stored procedure` reported a small enough `Duration` that it did not appear
    to be causing performance problems, yet as it turned out it was causing issues
    in other areas. By tuning it and reducing the amount of data it was writing on
    each call, the average `Duration` of the first `stored procedure` was reduced
    dramatically.


    ## Summary


    Software testing is a complex field, but it is necessary that developers understand
    enough of it to make the development process more effective. By implementing testing
    processes during development, more robust software can be delivered with less
    expense.


    Database developers, like application developers, must learn to exploit unit tests
    in order to increase software project success rates. Database routines will definitely
    benefit from unit testing, although performance testing is extremely important
    as well—and much more popular with management teams.


    During performance testing, make sure to carefully analyze the data. By recombining
    the numbers in various ways based on application usage patterns, it is often possible
    to discover performance issues that are not obvious from the raw numbers. `SQL
    Server 2008` ships with a variety of methods for collecting and presenting performance
    counters, and I’ll be using these to analyze the relative performance of different
    approaches taken in later chapters throughout the book.


    Testing is one of the important factors that helps differentiate good developers
    from truly great ones. If you’re not already testing your software during the
    development process, the methodologies presented here can help you to implement
    a set of procedures that will get you closer to the next level.


    # C H A P T E R 4


    ## Errors and Exceptions


    As software developers, we often daydream of a Utopian world of bug-free software—developed
    under the shade of a palm tree on a remote island while sipping a long, fruity
    cocktail. But, alas, back in the real world, hordes of developers sit in cubicle
    farms gulping acrid coffee, fighting bugs that are not always their fault or under
    their control in any way.


    Exceptions can occur in even the most stringently tested software, simply because
    it is not possible to check every error condition in advance. For instance, do
    you know what will happen if a janitor, while cleaning the data-center floor,
    accidentally slops some mop water into the fan enclosure of the database server?
    It might crash, or it might not; it might just cause some component to fail somewhere
    deep in the app, sending up a strange error message.


    Although most exceptions won’t be so far out of the realm of testability, it is
    certainly important to understand how to deal with them when and if they occur.
    It is also imperative that `SQL Server` developers understand how to work with
    errors—both those thrown by the server itself and custom errors built specifically
    for when problems occur during the runtime of an application.


    ### Exceptions vs. Errors


    The terms `exception` and `error`, while often used interchangeably by developers,
    actually refer to slightly different conditions:


    An `error` can occur if something goes wrong during the course of a program, even
    though it can be purely informational in nature. For instance, the message displayed
    by a program informing a user that a question mark is an invalid character for
    a file name is considered to be an error message. However, this may or may not
    mean that the program itself is in an invalid state.


    An `exception`, on the other hand, is an error that is the result of an `exceptional
    circumstance`. For example, if a network library is being used to send packets,
    and the network connection is suddenly dropped due to someone unplugging a cable,
    the library might throw an exception. An exception tells the calling code that
    something went wrong and the routine aborted unexpectedly. If the caller does
    not `handle` the exception (i.e., capture it), its execution will also abort.
    This process will keep repeating until the exception is handled, or until it reaches
    the highest level of the call stack, at which point the entire program will fail.


    Another way to think about exceptions and errors is to think of errors as occurrences
    that are `expected` by the program. The error message that is displayed when a
    file name contains an invalid character is informational in nature because the
    developer of the program predicted that such an event would occur and created
    a code path specifically to deal with it. A dropped network connection, on the
    other hand, could be caused by any number of circumstances and therefore is much
    more difficult to handle specifically. Instead, the solution is to raise an exception
    and fail. The exception can then be handled by a routine higher in the call stack,
    which can decide what course of action to take in order to solve the problem.


    ### What Defines an "Exceptional" Circumstance?


    There is some debate in the software community as to whether exceptions should
    really be used only for exceptional circumstances, or whether it is acceptable
    to use them as part of the regular operation of a program. For example, some programmers
    choose to define a large number of different custom'
