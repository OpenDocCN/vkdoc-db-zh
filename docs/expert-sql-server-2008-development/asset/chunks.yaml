    will stump others who attempt to maintain them in the future. And while that might
    be good for job security, using it for that purpose is probably not a virtuous
    goal.


    This stored procedure operates by using COALESCE to cancel out NULL arguments
    by substituting in minimum and maximum conditions for the integer predicate (BusinessEntityID)
    and a LIKE expression that will match anything for the string predicate (NationalIDNumber).
    This approach works as follows: If @BusinessEntityID is NULL, the BusinessEntityID
    predicate effectively becomes


    BusinessEntityID BETWEEN -2147483648 AND 2147483647—in other words, all


    possible integers. If @BusinessEntityID is not NULL, the predicate becomes


    BusinessEntityID BETWEEN @BusinessEntityID AND @BusinessEntityID. This is


    equivalent to BusinessEntityID=@BusinessEntityID.


    The same basic logic is true for the NationalIDNumber predicate, although because


    it’s a string instead of an integer, LIKE is used instead of BETWEEN. If


    @NationalIDNumber is NULL, the predicate becomes NationalIDNumber LIKE N''%''.


    This will match any string in the NationalIDNumber column. On the other hand,
    if


    @NationalIDNumber is not NULL, the predicate becomes NationalIDNumber LIKE


