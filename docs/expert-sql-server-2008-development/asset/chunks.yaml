    at node A.


    As new nodes are visited, their IDs will be appended to the list, producing a
    “breadcrumb” trail of all visited nodes. Note that the columns in both the anchor
    and recursive members are CAST to make sure their data types are identical. This
    is required because the varchar size changes due to concatenation, and all columns
    exposed by the anchor and recursive members must have identical types. The output
    of the CTE after making these modifications is as follows:


    theStart theEnd thePath


    1 2 /1/2/


    2 3 /1/2/3/


    2 6 /1/2/6/


    6 5 /1/2/6/5/


    3 4 /1/2/3/4/


    4 8 /1/2/3/4/8/


    8 7 /1/2/3/4/8/7/


    7 6 /1/2/3/4/8/7/6/


    6 5 /1/2/3/4/8/7/6/5/


    The output now includes the complete paths to the endpoints, but it still includes
    all subpaths visited along the way. To finish, add the following to the outermost
    query:


    WHERE theEnd = @End


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    This will limit the results to only paths that actually end at the specified endpoint—in
    this case, node E (IntersectionId 5). After making that addition, only the two
    paths that actually visit both the start and end nodes are shown.


    The CTE still has one major problem as-is. Figure 12-7 shows a completed version
    of the map, with the final two street segments filled in. The following T-SQL
    can be used to populate the StreetSegments table with the new data:


    INSERT INTO StreetSegments VALUES (5, 1, 1), (7, 3, 3);


    GO


    *Figure 12-7\. A version of the map with all segments filled in*


    Rerunning the CTE after introducing the new segments results in the following
    partial output (abbreviated for brevity):


    theStart theEnd thePath


    6 5 /1/2/6/5/


    6 5 /1/2/3/4/8/7/6/5/


    6 5 /1/2/3/4/8/7/3/4/8/7/6/5/


    6 5 /1/2/3/4/8/7/3/4/8/7/3/4/8/7/6/5/


    6 5 /1/2/3/4/8/7/3/4/8/7/3/4/8/7/3/4/8/7/6/5/


    6 5 /1/2/3/4/8/7/3/4/8/7/3/4/8/7/3/4/8/7/3/4/8/7/6/5/


    6 5 /1/2/3/4/8/7/3/4/8/7/3/4/8/7/3/4/8/7/3/4/8/7/3/4/8/7/6/5/


    6 5 /1/2/3/4/8/7/3/4/8/7/3/4/8/7/3/4/8/7/3/4/8/7/3/4/8/7/3/4/8/7/6/5/


    ...


    along with the following error:


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    Msg 530, Level 16, State 1, Line 9


    The statement terminated.


    The maximum recursion 100 has been exhausted before statement completion.


    The issue is that these new intersections create cycles in the graph. The problem
    can be seen to start at the fourth line of the output, when the recursion first
    visits node G (IntersectionId 7). From there, one can go one of two ways: west
    to node F (IntersectionId 6) or north to node C (IntersectionId 3).


    Following the first route, the recursion eventually completes. But following the
    second route, the recursion will keep coming back to node G again and again, following
    the same two branches.


    Eventually, the default recursive limit of 100 is reached and execution ends with
    an error. Note that this default limit can be overridden using the OPTION (MAXRECURSION
    N) query hint, where N is the maximum recursive depth you’d like to use. In this
    case, 100 is a good limit because it quickly tells us that there is a major problem!


    Fixing this issue, luckily, is quite simple: check the path to find out whether
    the next node has already been visited, and if so, do not visit it again. Since
    the path is a string, this can be accomplished using a LIKE predicate by adding
    the following argument to the recursive member’s WHERE clause: AND p.thePath NOT
    LIKE ''%/'' + CONVERT(varchar, ss.IntersectionId_End) + ''/%''


    This predicate checks to make sure that the ending IntersectionId, delimited by
    / on both sides, does not yet appear in the path—in other words, has not yet been
    visited. This will make it impossible for the recursion to fall into a cycle.


    Running the CTE after adding this fix eliminates the cycle issue. The full code
    for the fixed CTE


    follows:


    DECLARE


    @Start int = dbo.GetIntersectionId(''Madison'', ''1st Ave''),


    @End int = dbo.GetIntersectionId(''Lexington'', ''1st Ave'');


    WITH Paths


    AS


    (


    SELECT


    @Start AS theStart,


    IntersectionId_End AS theEnd,


    CAST(''/'' +


    CAST(@Start AS varchar(255)) + ''/'' +


    CAST(IntersectionId_End AS varchar(255)) + ''/''


    AS varchar(255) ) AS thePath


    FROM dbo.StreetSegments


    WHERE


    IntersectionId_Start = @Start


    UNION ALL


    SELECT


    p.theEnd,


    ss.IntersectionId_End,


    CAST(p.ThePath +


    CAST(IntersectionId_End AS varchar(255)) + ''/''


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    AS varchar(255)


    )


    FROM Paths p


    JOIN dbo.StreetSegments ss ON ss.IntersectionId_Start = p.theEnd


    WHERE p.theEnd <> @End


    AND p.thePath NOT LIKE ''%/'' + CONVERT(varchar, ss.IntersectionId_End) + ''/%''


    )


    SELECT *


    FROM Paths;


    GO


    This concludes this chapter’s coverage on general graphs. The remainder of the
    chapter deals with modeling and querying of hierarchies. Although hierarchies
    are much more specialized than graphs, they tend to be more typically seen in
    software projects than general graphs, and developers must consider slightly different
    issues when modeling them.


    **Advanced routing**


    The example shown in this section is highly simplified, and it is designed to
    teach the basics of querying graphs rather than serve as a complete routing solution.
    I have had the pleasure of working fairly extensively with a production system
    designed to traverse actual street routes and will briefly share some of the insights
    I have gained in case you are interested in these kinds of problems.


    The first issue with the solution shown here is that of scalability. A big city
    has tens of thousands of street segments, and determining a route from one end
    of the city to another using this method will create a combinatorial explosion
    of possibilities. In order to reduce the number of combinations, a few things
    can be done.


    First of all, each segment can be weighted, and a score tallied along the way
    as you recurse over the possible paths. If the score gets too high, you can terminate
    the recursion. For example, in the system I worked on, weighting was done based
    on distance traveled. The algorithm used was fairly complex, but essentially,
    if a destination was 2 miles away and the route went over 3 miles, recursion would
    be terminated for that branch. This scoring also lets the system determine the
    shortest possible routes.'
  trans: "\n# 第 12 章：树、层次结构与图\n\n之前的迭代。由于公用表表达式的每个迭代只能访问前一次迭代的数据——而非所有先前迭代的全部数据——每一行都必须以行内方式保存自己的记录。这可以通过使用**物化路径**表示法来实现，其中每个先前访问过的节点都会被附加到一个持续更新的列表中。这需要在公用表表达式中添加一个新列，如以下代码清单中以粗体突出显示的部分所示：\n\
    \n```sql\nDECLARE\n    @Start int = dbo.GetIntersectionId('Madison', '1st Ave'),\n\
    \    @End int = dbo.GetIntersectionId('Lexington', '1st Ave');\n\nWITH Paths\n\
    AS\n(\n    SELECT\n        @Start AS theStart,\n        IntersectionId_End AS\
    \ theEnd,\n        CAST('/' +\n             CAST(@Start AS varchar(255)) + '/'\
    \ +\n             CAST(IntersectionId_End AS varchar(255)) + '/'\n           \
    \  AS varchar(255) ) AS thePath\n    FROM dbo.StreetSegments\n    WHERE\n    \
    \    IntersectionId_Start = @Start\n    UNION ALL\n    SELECT\n        p.theEnd,\n\
    \        ss.IntersectionId_End,\n        CAST(p.ThePath +\n             CAST(IntersectionId_End\
    \ AS varchar(255)) + '/'\n             AS varchar(255)\n        )\n    FROM Paths\
    \ p\n    JOIN dbo.StreetSegments ss ON ss.IntersectionId_Start = p.theEnd\n  \
    \  WHERE p.theEnd <> @End\n)\nSELECT *\nFROM Paths;\nGO\n```\n\n这段代码将开始形成一个已访问节点的列表。如果将节点\
    \ A（IntersectionId 1）指定为起点，则此列在锚定成员中的输出将是`/1/2/`，因为节点 B（IntersectionId 2）是唯一一个参与从节点\
    \ A 开始的街道段的节点。\n\n随着新节点被访问，它们的 ID 将被追加到列表中，生成一个所有已访问节点的“面包屑”轨迹。请注意，锚定成员和递归成员中的列都被`CAST`转换，以确保它们的数据类型完全相同。这是必需的，因为由于连接操作，`varchar`的大小会发生变化，并且锚定成员和递归成员公开的所有列必须具有相同的类型。进行这些修改后，公用表表达式的输出如下：\n\
    \n```\ntheStart theEnd thePath\n1        2      /1/2/\n2        3      /1/2/3/\n\
    2        6      /1/2/6/\n6        5      /1/2/6/5/\n3        4      /1/2/3/4/\n\
    4        8      /1/2/3/4/8/\n8        7      /1/2/3/4/8/7/\n7        6      /1/2/3/4/8/7/6/\n\
    6        5      /1/2/3/4/8/7/6/5/\n```\n\n输出现在包含了到达终点的完整路径，但它仍然包含了沿途访问的所有子路径。为了完成，向最外层查询添加以下内容：\n\
    \n```sql\nWHERE theEnd = @End\n```\n\n这将把结果限制为仅那些实际终止于指定终点的路径——在本例中是节点 E（IntersectionId\
    \ 5）。添加此条件后，只会显示真正访问了起点和终点的两条路径。\n\n目前的公用表表达式仍有一个主要问题。图 12-7 显示了地图的完整版本，其中填充了最后两个街道段。以下\
    \ T-SQL 可用于使用新数据填充`StreetSegments`表：\n\n```sql\nINSERT INTO StreetSegments VALUES\
    \ (5, 1, 1), (7, 3, 3);\nGO\n```\n\n**图 12-7. 填充了所有路段的地图版本**\n\n引入新路段后重新运行公用表表达式，得到以下部分输出（为简洁起见进行了缩写）：\n\
    \n```\ntheStart theEnd thePath\n6        5      /1/2/6/5/\n6        5      /1/2/3/4/8/7/6/5/\n\
    6        5      /1/2/3/4/8/7/3/4/8/7/6/5/\n6        5      /1/2/3/4/8/7/3/4/8/7/3/4/8/7/6/5/\n\
    ...\n```\n\n并伴随以下错误：\n\n```\nMsg 530, Level 16, State 1, Line 9\nThe statement\
    \ terminated.\nThe maximum recursion 100 has been exhausted before statement completion.\n\
    ```\n\n问题在于这些新的交叉点在图中创建了循环。问题可以从输出的第四行开始看出，当递归首次访问节点 G（IntersectionId 7）时。从那里，可以选择两条路径：向西到节点\
    \ F（IntersectionId 6）或向北到节点 C（IntersectionId 3）。\n\n遵循第一条路径，递归最终会完成。但遵循第二条路径，递归将不断地回到节点\
    \ G，一次又一次地沿着相同的两个分支前进。\n\n最终，达到默认的递归限制 100，执行以错误结束。请注意，可以使用`OPTION (MAXRECURSION\
    \ N)`查询提示来覆盖此默认限制，其中`N`是你希望使用的最大递归深度。在这种情况下，100 是一个很好的限制，因为它能迅速告诉我们存在一个重大问题！\n\
    \n幸运的是，解决这个问题很简单：检查路径以查明下一个节点是否已经被访问过，如果是，则不再访问它。由于路径是一个字符串，这可以通过使用`LIKE`谓词来实现，向递归成员的`WHERE`子句添加以下参数：`AND\
    \ p.thePath NOT LIKE '%/' + CONVERT(varchar, ss.IntersectionId_End) + '/%'`\n\n\
    此谓词检查确保以`/`分隔的结尾`IntersectionId`尚未出现在路径中——换句话说，尚未被访问。这将使递归不可能陷入循环。\n\n添加此修复后运行公用表表达式，消除了循环问题。修复后的公用表表达式的完整代码如下：\n\
    \n```sql\nDECLARE\n    @Start int = dbo.GetIntersectionId('Madison', '1st Ave'),\n\
    \    @End int = dbo.GetIntersectionId('Lexington', '1st Ave');\n\nWITH Paths\n\
    AS\n(\n    SELECT\n        @Start AS theStart,\n        IntersectionId_End AS\
    \ theEnd,\n        CAST('/' +\n             CAST(@Start AS varchar(255)) + '/'\
    \ +\n             CAST(IntersectionId_End AS varchar(255)) + '/'\n           \
    \  AS varchar(255) ) AS thePath\n    FROM dbo.StreetSegments\n    WHERE\n    \
    \    IntersectionId_Start = @Start\n    UNION ALL\n    SELECT\n        p.theEnd,\n\
    \        ss.IntersectionId_End,\n        CAST(p.ThePath +\n             CAST(IntersectionId_End\
    \ AS varchar(255)) + '/'\n             AS varchar(255)\n        )\n    FROM Paths\
    \ p\n    JOIN dbo.StreetSegments ss ON ss.IntersectionId_Start = p.theEnd\n  \
    \  WHERE p.theEnd <> @End\n      AND p.thePath NOT LIKE '%/' + CONVERT(varchar,\
    \ ss.IntersectionId_End) + '/%'\n)\nSELECT *\nFROM Paths;\nGO\n```\n\n至此，本章关于通用图的介绍就结束了。本章剩余部分将讨论层次结构的建模和查询。尽管层次结构比通用图更为专门化，但它们在软件项目中往往比通用图更常见，开发人员在建模时必须考虑略有不同的问题。\n\
    \n## 高级路由\n\n本节所示的示例是高度简化的，旨在教授查询图的基础知识，而非作为一个完整的路由解决方案。我曾有幸广泛参与一个设计用于遍历实际街道路线的生产系统，并将简要分享我获得的一些见解，以防你对这类问题感兴趣。\n\
    \n此处展示的解决方案的首要问题是可扩展性。一个大城市拥有数万个街道段，使用此方法确定从城市一端到另一端的路线将导致可能性的组合爆炸。为了减少组合数量，可以采取一些措施。\n\
    \n首先，可以为每个路段分配权重，并在遍历可能路径时累计评分。如果得分过高，可以终止递归。例如，在我参与的系统中，权重是根据行驶距离确定的。使用的算法相当复杂，但本质上，如果目的地在\
    \ 2 英里外，而路线超过了 3 英里，则终止该分支的递归。这种评分还使系统能够确定最短的可能路线。\n"
- fmt: "# CHAPTER 12: TREES, HIERARCHIES, AND GRAPHS\n\nAnother method used to greatly\
    \ decrease the number of combinations was an analysis of the input set of streets,\
    \ and a determination made of major routes between certain locations. For instance,\
    \ traveling from one end of the city to another is usually most direct on a freeway.\
    \ If the system determines that a freeway route is appropriate, it breaks the\
    \ routing problem down into two sections: first, find the shortest route from\
    \ the starting point to a freeway on-ramp, and then find the shortest route from\
    \ the endpoint to a freeway exit. Put these routes together, including the freeway\
    \ travel, and you have an optimized path from the starting point to the ending\
    \ point. Major routes—like freeways—can be underweighted in order to make them\
    \ appear higher in the scoring rank.\n\nIf you’d like to try working with real\
    \ street data, you can download US geographical shape files (including streets\
    \ as well as various natural formations) for free from the US Census Bureau. The\
    \ data, called `TIGER/Line`, is available from `www.census.gov/geo/www/tiger/index.html`.\
    \ Be warned: this data is not easy to work with and requires a lot of cleanup\
    \ to get it to the point where it can be easily queried.\n\n## Adjacency List\
    \ Hierarchies\n\nAs mentioned previously, any kind of graph can be modeled using\
    \ an adjacency list. This of course includes hierarchies, which are nothing more\
    \ than rooted, directed, acyclic graphs with exactly one path between any two\
    \ nodes (irrespective of direction). Adjacency list hierarchies are very easy\
    \ to model, visualize, and understand, but can be tricky or inefficient to query\
    \ in some cases since they require iteration or recursion, as I’ll discuss shortly.\n\
    \nTraversing an adjacency list hierarchy is virtually identical to traversing\
    \ an adjacency list graph, but since hierarchies don’t have cycles, you don’t\
    \ need to worry about them in your code. This is a nice feature, since it makes\
    \ your code shorter, easier to understand, and more efficient. However, being\
    \ able to make the assumption that your data really does follow a hierarchical\
    \ structure—and not a general graph—takes a bit of work up front. See “Constraining\
    \ the Hierarchy” later in this section for information on how to make sure that\
    \ your hierarchies don’t end up with cycles, multiple roots, or disconnected subtrees.\n\
    \nThe most commonly recognizable example of an adjacency list hierarchy is a self-referential\
    \ personnel table that models employees and their managers. Since it’s such a\
    \ common and easily understood example, this is the scenario that will be used\
    \ for this section and the rest of this chapter.\n\nTo start, we’ll create an\
    \ simple adjacency list based on three columns of data from the `HumanResources.Employee`\
    \ table of the `AdventureWorks` database. The columns used will be as follows:\n\
    \n*   `EmployeeID` is the primary key for each row of the table. Most of the time,\
    \ adjacency list hierarchies are modeled in a node-centric rather than edge-centric\
    \ way; that is, the primary key of the hierarchy is the key for a given node,\
    \ rather than a key representing an edge. This makes sense because each node in\
    \ a hierarchy can only have one direct ancestor.\n*   `ManagerID` is the key for\
    \ the employee that each row reports to in the same table. If `ManagerID` is `NULL`,\
    \ that employee is the root node in the tree (i.e., the head of the company).\
    \ It’s common when modeling adjacency list hierarchies to use either `NULL` or\
    \ an identical key to the row’s primary key to represent root nodes.\n*   Finally,\
    \ the `Title` column, representing employees’ job titles, will be used to make\
    \ the output easier to read.\n\nYou can use the following `T-SQL` to create a\
    \ table based on these columns:\n\n```\nUSE AdventureWorks;\nGO\nCREATE TABLE\
    \ Employee_Temp\n(\n    EmployeeID int NOT NULL\n        CONSTRAINT PK_Employee\
    \ PRIMARY KEY,\n    ManagerID int NULL\n        CONSTRAINT FK_Manager REFERENCES\
    \ Employee_Temp (EmployeeID),\n    Title nvarchar(100)\n);\nGO\nINSERT INTO Employee_Temp\n\
    (\n    EmployeeID,\n    ManagerID,\n    Title\n)\nSELECT\n    EmployeeID,\n  \
    \  ManagerID,\n```"
  raw: 'Another method used to greatly decrease the number of combinations was an
    analysis of the input set of streets, and a determination made of major routes
    between certain locations. For instance, traveling from one end of the city to
    another is usually most direct on a freeway. If the system determines that a freeway
    route is appropriate, it breaks the routing problem down into two sections: first,
    find the shortest route from the starting point to a freeway on-ramp, and then
    find the shortest route from the endpoint to a freeway exit. Put these routes
    together, including the freeway travel, and you have an optimized path from the
    starting point to the ending point. Major routes—like freeways—can be underweighted
    in order to make them appear higher in the scoring rank.


    If you’d like to try working with real street data, you can download US geographical
    shape files (including streets as well as various natural formations) for free
    from the US Census Bureau. The data, called TIGER/Line, is available from www.census.gov/geo/www/tiger/index.html.
    Be warned: this data is not easy to work with and requires a lot of cleanup to
    get it to the point where it can be easily queried.


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    Adjacency List Hierarchies


    As mentioned previously, any kind of graph can be modeled using an adjacency list.
    This of course includes hierarchies, which are nothing more than rooted, directed,
    acyclic graphs with exactly one path between any two nodes (irrespective of direction).
    Adjacency list hierarchies are very easy to model, visualize, and understand,
    but can be tricky or inefficient to query in some cases since they require iteration
    or recursion, as I’ll discuss shortly.


    Traversing an adjacency list hierarchy is virtually identical to traversing an
    adjacency list graph, but since hierarchies don’t have cycles, you don’t need
    to worry about them in your code. This is a nice feature, since it makes your
    code shorter, easier to understand, and more efficient. However, being able to
    make the assumption that your data really does follow a hierarchical structure—and
    not a general graph—takes a bit of work up front. See “Constraining the Hierarchy”
    later in this section for information on how to make sure that your hierarchies
    don’t end up with cycles, multiple roots, or disconnected subtrees.


    The most commonly recognizable example of an adjacency list hierarchy is a self-referential


    personnel table that models employees and their managers. Since it’s such a common
    and easily understood example, this is the scenario that will be used for this
    section and the rest of this chapter.


    To start, we’ll create an simple adjacency list based on three columns of data
    from the


    HumanResources.Employee table of the AdventureWorks database. The columns used
    will be as follows:


    •


    EmployeeID is the primary key for each row of the table. Most of the time,


    adjacency list hierarchies are modeled in a node-centric rather than edge-centric


    way; that is, the primary key of the hierarchy is the key for a given node, rather


    than a key representing an edge. This makes sense because each node in a


    hierarchy can only have one direct ancestor.


    •


    ManagerID is the key for the employee that each row reports to in the same table.
    If


    ManagerID is NULL, that employee is the root node in the tree (i.e., the head
    of the


    company). It’s common when modeling adjacency list hierarchies to use either


    NULL or an identical key to the row’s primary key to represent root nodes.


    •


    Finally, the Title column, representing employees’ job titles, will be used to
    make


    the output easier to read.


    You can use the following T-SQL to create a table based on these columns:


    USE AdventureWorks;


    GO


    CREATE TABLE Employee_Temp


    (


    EmployeeID int NOT NULL


    CONSTRAINT PK_Employee PRIMARY KEY,


    ManagerID int NULL


    CONSTRAINT FK_Manager REFERENCES Employee_Temp (EmployeeID),


    Title nvarchar(100)


    );


    GO


    INSERT INTO Employee_Temp


    (


    EmployeeID,


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    ManagerID,


    Title


    )


    SELECT


    EmployeeID,


    ManagerID,'
  trans: "\n# 第 12 章：树、层次结构与图\n\n另一种能大幅减少组合数量的方法是分析街道输入集，并确定某些地点之间的主要路线。例如，从城市一端到另一端，通常最直接的方式是走高速公路。如果系统判断高速公路路线是合适的，它会将路线规划问题分解为两部分：首先，找到从起点到高速公路入口匝道的最短路线；然后，找到从终点到高速公路出口的最短路线。将这些路段（包括高速公路行驶路段）组合起来，你就得到了一条从起点到终点的优化路径。像高速公路这样的主要路线，可以被降低权重（underweighted），以便它们在评分排名中显得更靠前。\n\
    \n如果你想尝试使用真实的街道数据，你可以从美国人口普查局免费下载美国地理形状文件（包括街道和各种自然地貌）。这些数据名为 `TIGER/Line`，可从\
    \ `www.census.gov/geo/www/tiger/index.html` 获取。需要提醒的是：这些数据处理起来并不容易，需要大量清理工作才能使其达到易于查询的状态。\n\
    \n## 邻接列表层次结构\n\n如前所述，任何类型的图都可以使用邻接列表来建模。这当然也包括层次结构，它不过是有根、有向、无环图的一种特殊形式，其中任意两个节点之间恰好只有一条路径（不考虑方向）。邻接列表层次结构非常易于建模、可视化和理解，但在某些情况下查询起来可能比较棘手或效率低下，因为它们需要迭代或递归，这一点我稍后会讨论。\n\
    \n遍历一个邻接列表层次结构实际上与遍历邻接列表图几乎相同，但由于层次结构中没有环，你不需要在代码中担心环的问题。这是一个很好的特性，因为它使你的代码更短、更易于理解、更高效。然而，要能够假设你的数据确实遵循层次结构而非一般图的结构，前期需要做一点工作。关于如何确保你的层次结构最终不会出现环、多个根节点或断开的子树，请参阅本节后面的“约束层次结构”部分。\n\
    \n邻接列表层次结构最常见的、易于识别的例子是一个自引用的员工表，用于建模员工及其经理。由于这是一个如此常见且易于理解的例子，本节及本章剩余部分都将使用这个场景。\n\
    \n首先，我们将基于 `AdventureWorks` 数据库的 `HumanResources.Employee` 表中的三列数据创建一个简单的邻接列表。使用的列如下：\n\
    \n*   `EmployeeID` 是表中每一行的主键。大多数情况下，邻接列表层次结构是以节点为中心而非以边为中心的方式建模的；也就是说，层次结构的主键是给定节点的键，而不是表示边的键。这是合理的，因为层次结构中的每个节点只能有一个直接祖先。\n\
    *   `ManagerID` 是同一表中每一行所汇报的员工的键。如果 `ManagerID` 为 `NULL`，则该员工是树中的根节点（即公司负责人）。在为邻接列表层次结构建模时，通常使用\
    \ `NULL` 或与该行主键相同的键来表示根节点。\n*   最后，`Title` 列代表员工的职位，将用于使输出更易于阅读。\n\n你可以使用以下 `T-SQL`\
    \ 基于这些列创建一个表：\n\n```\nUSE AdventureWorks;\nGO\nCREATE TABLE Employee_Temp\n(\n\
    \    EmployeeID int NOT NULL\n        CONSTRAINT PK_Employee PRIMARY KEY,\n  \
    \  ManagerID int NULL\n        CONSTRAINT FK_Manager REFERENCES Employee_Temp\
    \ (EmployeeID),\n    Title nvarchar(100)\n);\nGO\nINSERT INTO Employee_Temp\n\
    (\n    EmployeeID,\n    ManagerID,\n    Title\n)\nSELECT\n    EmployeeID,\n  \
    \  ManagerID,\n```\n"
