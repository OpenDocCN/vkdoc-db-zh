    Clear the query plan cache and run the tests. When finished, check the performance
    results one last time. The results from my system are as follows:


    type plans execution_count avg_CPU_ms


    Adhoc 1 1 3.00000000000000000000000000000


    Prepared 4 8710 0.09541297359357060849598163030


    Interestingly, the results of the two dynamic SQL solutions are very close, with
    the sp_executesql solution only just beating the EXECUTE solution, even given
    the benefits of parameterization for performance. Runs with fewer iterations or
    against stored procedures that are more expensive for SQL


    Server to compile will highlight the benefits more clearly.


    CHAPTER 8 „ DYNAMIC T-SQL


    The static SQL version, as expected, still wins from a performance point of view
    (although all three are extremely fast). Again, more complex stored procedures
    with longer runtimes will naturally overshadow the difference between the dynamic
    SQL and static SQL solutions, leaving the dynamic SQL


    vs. static SQL question purely one of maintenance.


    „ **Note** When running these tests on my system, I restarted my SQL Server service
    between each run in order to ensure absolute consistency. Although this may be
    overkill for this case, you may find it interesting to experiment on your end
    with how restarting the service affects performance. This kind of test can also
    be useful for general scalability testing, especially in clustered environments.
    Restarting the service before testing is a technique that you can use to simulate
    how the application will behave if a failover occurs, without requiring a clustered
    testing environment.


    **Output Parameters**


    Although it is somewhat of an aside to this discussion, I would like to point
    out one other feature that sp_executesql brings to the table as compared to EXECUTE—one
    that is often overlooked by users who are just getting started using it. sp_executesql
    allows you to pass parameters to dynamic SQL just like to a stored procedure—and
    this includes output parameters.


    Output parameters become quite useful when you need to use the output of a dynamic
    SQL statement that perhaps only returns a single scalar value. An output parameter
    is a much cleaner solution than having to insert the value into a table and then
    read it back into a variable.


    To define an output parameter, simply append the OUTPUT keyword in both the parameter
    definition list and the parameter list itself. The following T-SQL shows how to
    use an output parameter with sp_executesql:


    DECLARE @SomeVariable int;


    EXEC sp_executesql


    N''SET @SomeVariable = 123'',


    N''@SomeVariable int OUTPUT'',


    @SomeVariable OUTPUT;


    As a result of this T-SQL, the @SomeVariable variable will have a value of 123.


    Since this is an especially contrived example, I will add that in practice I often
    use output parameters with sp_executesql in stored procedures that perform searches
    with optional parameters. A common user interface requirement is to return the
    number of total rows found by the selected search criteria, and an output parameter
    is a quick way to get the data back to the caller.


    CHAPTER 8 „ DYNAMIC T-SQL


    Dynamic SQL Security Considerations


    To finish up this chapter, a few words on security are important. Aside from the
    SQL injection example shown in a previous section, there are a couple of other
    security topics that are important to consider. In this section, I will briefly
    discuss permissions issues and a few interface rules to help you stay out of trouble
    when working with dynamic SQL.


    Permissions to Referenced Objects


    As mentioned a few times throughout this chapter, dynamic SQL is invoked in a
    different scope than static SQL. This is extremely important from an authorization
    perspective, because upon execution, permissions for all objects referenced in
    the dynamic SQL will be checked. Therefore, in order for the dynamic SQL to run
    without throwing an authorization exception, the user executing the dynamic SQL


    must either have access directly to the referenced objects or be impersonating
    a user with access to the objects.


    This creates a slightly different set of challenges from those you get when working
    with static SQL


    stored procedures, due to the fact that the change of context that occurs when
    invoking dynamic SQL


    breaks any ownership chain that has been established. If you need to manage a
    permissions hierarchy such that users should have access to stored procedures
    that use dynamic SQL, but not to the base tables they reference, make sure to
    become intimately familiar with certificate signing and the EXECUTE AS


    clause, both described in detail in Chapter 4.


    Interface Rules


    This chapter has focused on optional parameters of the type you might pass to
    enable or disable a certain predicate for a query. However, there are other types
    of optional parameters that developers often try to use with dynamic SQL. These
    parameters involve passing table names, column lists, ORDER


    BY lists, and other modifications to the query itself into a stored procedure
    for concatenation.


    If you’ve read Chapter 1 of this book, you know that these practices are incredibly
    dangerous from a software development perspective, leading to tight coupling between
    the database and the application, in addition to possibly distorting stored procedures’
    implied output contracts, therefore making testing and maintenance extremely arduous.


    As a general rule, you should never pass any database object name from an application
    into a stored procedure (and the application should not know the object names
    anyway). If you absolutely must modify a table or some other object name in a
    stored procedure, try to encapsulate the name via a set of parameters instead
    of allowing the application to dictate.


    For instance, assume you were working with the following stored procedure:


    CREATE PROC SelectDataFromTable


    @TableName nvarchar(200)


    AS


    BEGIN


    SET NOCOUNT ON;


    DECLARE @sql nvarchar(max);


    SET @sql = '''' +


    ''SELECT '' +


    CHAPTER 8 „ DYNAMIC T-SQL


    ''ColumnA, '' +


    ''ColumnB, '' +


    ''ColumnC '' +


    ''FROM '' + @TableName;


    EXEC(@sql);


    END;


    GO


    Table names cannot be parameterized, meaning that using sp_executesql in this
    case would not help in any way. However, in virtually all cases, there is a limited
    subset of table names that can (or will) realistically be passed into the stored
    procedure. If you know in advance that this stored procedure will only ever use
    tables TableA, TableB, and TableC, you can rewrite the stored procedure to keep
    those table names out of the application while still providing the same functionality.


    The following code listing provides an example of how you might alter the previous
    stored


    procedure to provide dynamic table functionality while abstracting the names somewhat
    to avoid coupling issues:


    ALTER PROC SelectDataFromTable


    @UseTableA bit = 0,


    @UseTableB bit = 0,


    @UseTableC bit = 0


    AS


    BEGIN


    SET NOCOUNT ON;


    IF (


    CONVERT(tinyint, COALESCE(@UseTableA, 0)) +


    CONVERT(tinyint, COALESCE(@UseTableB, 0)) +


    CONVERT(tinyint, COALESCE(@UseTableC, 0))


    ) <> 1


    BEGIN


    RAISERROR(''Must specify exactly one table'', 16, 1);


    RETURN;


    END


    DECLARE @sql nvarchar(max);


    SET @sql = '''' +


    ''SELECT '' +


    ''ColumnA, '' +


    ''ColumnB, '' +


    ''ColumnC '' +


    ''FROM '' +


    CASE


    WHEN @UseTableA = 1 THEN ''TableA''


    WHEN @UseTableB = 1 THEN ''TableB''


    WHEN @UseTableC = 1 THEN ''TableC''


    END


    CHAPTER 8 „ DYNAMIC T-SQL


    EXEC(@sql);


    END;


    GO


    This version of the stored procedure is obviously quite a bit more complex, but
    it is still relatively easy to understand. The IF block validates that exactly
    one table is selected (i.e., the value of the parameter corresponding to the table
    is set to 1), and the CASE expression handles the actual dynamic selection of
    the table name.'
