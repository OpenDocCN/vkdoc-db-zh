- fmt: "# Expert SQL Server 2008 Development\n\n![](cover.jpeg)\n\n## Dear Reader,\n\
    \nThere are already many books written about `SQL Server`, so why did I choose\
    \ to help write yet another one? What makes this any different to the rest? The\
    \ answer is that *Expert SQL Server 2008 Development*, unlike most books on the\
    \ subject, is not intended to provide a comprehensive reference to the features\
    \ available in `SQL Server 2008`. Such information is available in *Microsoft\
    \ Books Online*, and has been repeated in many books already. Instead, my aim\
    \ is to share knowledge and skills required to create first-class database applications,\
    \ which exemplify best practices in database development.\n\nThe topics covered\
    \ in this book represent interesting, sometimes complex, and frequently misunderstood\
    \ facets of database development. Understanding these areas will set you apart\
    \ as an expert `SQL Server` developer. Some of the topics are hotly debated in\
    \ the software community, and there is not always a single “best” solution to\
    \ any given problem. Instead, I’ll show you a variety of approaches, and give\
    \ you the information and tools to decide which is most appropriate for your particular\
    \ environment.\n\nAfter reading this book, you will gain an appreciation of areas\
    \ such as testing and exception handling, to ensure your code is robust, scalable,\
    \ and easy to maintain. You’ll learn how to create secure databases by controlling\
    \ access to sensitive information, and you’ll find out how to encrypt data to\
    \ protect it from prying eyes. You’ll also learn how to create flexible, high-performance\
    \ applications using dynamic `SQL` and `SQLCLR`, and you’ll discover various models\
    \ of handling concurrent users of a database. Finally, I’ll teach you how to deal\
    \ with complex data representing temporal, spatial, and hierarchical information.\
    \ Together, we’ll uncover some of the interesting issues that can arise in these\
    \ situations.\n\nI’ve worked hard on this book, to make it useful to readers of\
    \ all skill levels. Beginner, expert, or in between, you’ll find something of\
    \ use in this book. My hope is that it helps you become truly an expert `SQL Server`\
    \ developer.\n\nAlastair Aitchison\n\n## Author Information\n\n**Alastair Aitchison,**\
    \  \nAuthor of *Beginning Spatial With SQL Server 2008*\n\n**Adam Machanic,**\
    \  \nAuthor of *Expert SQL Server 2005 Development*\n\n## The Apress Roadmap\n\
    \n*Pro T-SQL 2008 Programmer’s Guide*  \n*Beginning T-SQL 2008*  \n*Accelerated\
    \ SQL Server 2008*  \n*Transact-SQL Recipes*  \n**Expert SQL Server 2008 Development**\n\
    \nSee last page for details on $10 eBook version\n\n## Source Code\n\n**SOURCE\
    \ CODE ONLINE**\n\n## Book Details\n\nISBN 978-1-4302-7213-7  \n**US $49.99**\n\
    \nShelve in: Databases / `SQL Server`  \nUser level: Intermediate / Advanced\n\
    \n## Production Details\n\n5 49 9 9  \n9 781430 272137  \nCompanion eBook Available\
    \  \n**this print for content only—size & color not accurate**  \n**trim = 7.5\"\
    \ x 9.25\" spine = 0.84375\" 456 page count**"
