    SQL Server 解决方案，并结合了基于 Microsoft 商业智能堆栈的报告和分析功能。Alastair 对空间数据分析有特别的兴趣，是 *Beginning
    Spatial with SQL Server 2008*（Apress，2009）一书的作者。他在用户组和会议上发表演讲，并且是多个在线支持社区（包括 Microsoft
    SQL Server Developer Center 论坛）的非常活跃的贡献者。


    xvi


    ![](index-19_1.png)


    # 技术审稿人


    **Evan Terry** 是 The Clegg Company 的首席技术顾问，专注于数据管理、信息与数据架构、数据库系统和商业智能。他过去和现在的客户包括爱达荷州、Albertsons、American
    Honda Motors 和 Toyota Motor Sales, USA。他是 *Beginning Relational Data Modeling*
    的合著者，在 DM Review 上发表过多篇文章，并在行业会议上做过演讲，还就数据和信息质量、信息管理等主题举办过私人研讨会。他还担任过几本与 SQL Server
    数据库相关的 Apress 图书的技术审稿人。如有问题或咨询需求，可通过 evan_terry@cleggcompany.com 联系 Evan。


    xvii


    # 致谢


    当我被邀请撰写本书时，我欣然接受了再次与 Apress 优秀团队合作的机会。我特别幸运能再次得到 Jonathan Gennick 和 Evan Terry
    这两位才华横溢的人士的协助。作为我的编辑，Jonathan 在整个写作过程中鼓励、教导和指导我，即使在遇到困难时（就像任何出版时间表一样，有时确实会遇到！）他也从未动摇过他的支持。Evan
    不仅提供了他丰富的技术知识，还有他的写作专业知识，有时他只是提供了一个理智的声音，所有这些都极大地帮助了本书的改进。我还要感谢 Mary Tobin，她负责跟踪所有的截止日期和项目管理问题；感谢
    Damon Larson，他纠正了我对英语语言的随意使用；以及所有其他帮助将本书呈现在您手中的个人。谢谢大家。


    我的家人再次忍受了我长时间在键盘上打字的时光，我感谢他们的宽容、耐心和支持。没有他们，我什么都做不了。


    最后，感谢您——读者——购买本书。我希望您发现内容有趣、有用，并且最重要的是，阅读愉快。


    xviii


    # 前言


    我使用 Microsoft SQL Server 已近十年，自 SQL Server 2008 的第一个公开预览版可用起便开始使用它。我注意到的一点是，随着每一个新版本的发布，SQL
    Server 变得越来越强大，也越来越复杂。现在有大量功能远远超出了数据库系统预期的核心功能，并且由于需要涵盖如此多的不同方面，要成为一名 SQL Server
    “专家”变得越来越难。SQL Server 开发人员不再仅仅需要精通编写 `T-SQL` 代码，还需要精通 `XML` 和 `SQLCLR`（并知道何时使用每种技术）。您不再只是从一个孤立的数据库执行查询以获得单个结果集，而是要处理源自分布式服务器查询的多个活动结果集。现代数据库中存储的信息类型不仅代表字符、数字和二进制数据，还代表复杂数据，如空间、层次结构和
    `filestream` 数据。


    试图全面涵盖这些主题中的任何一个，都足以轻松填满整本书，所以我甚至不会尝试这样做。相反，我将根据我自己的实践经验，专注于我认为您需要了解的内容来创建高质量的数据库应用程序。我不会浪费篇幅讨论一些晦涩或很少使用的功能的细节，除非我能向您展示它的真正用例。我也不会通过费力地解释基础知识来侮辱您的智力——我会假设您已经熟悉
    `Books Online` 中涵盖的简单示例，并且现在希望进一步拓展您的知识。


    本书中的所有示例都基于我遇到的真实场景，它们向您展示了如何处理在大多数典型 SQL Server 环境中可能面临的问题。我保证不会向您展示看似完美的解决方案，然后您发现它们只在经过人为净化的“`AdventureWorks`”世界中有效；作为开发人员，我们处理的是不完美的数据，我会尽量向您展示包含所有缺陷的示例。这些代码示例是使用安装了
    Service Pack 1 的 SQL Server 2008 Developer Edition 测试的，但除非另有说明，否则应适用于 SQL Server
    2008 的所有版本。


    最后，我希望您喜欢阅读本书并思考所讨论的问题。我喜欢数据库开发的原因是它提出了一个永无止境的需要解决的谜题——即使您认为已经找到了问题的最佳答案，未来总是有可能找到更好的解决方案。虽然您不应让这种对完美的追求分散您对当前工作的注意力（有时，“足够好”就是您所需要的），但总有新的技术要学习，其他的方法要探索。我希望您能在接下来的页面中学到其中的一些。


    xix


    # 第一章


    ## 数据库世界的软件开发方法论


    数据库是软件。因此，数据库应用程序开发应该以与任何其他形式的软件开发相同的方式对待。然而，在开发团队讨论架构和测试计划时，数据库常常被视为次要实体，而且许多数据库开发人员仍然没有意识到或将标准的软件开发最佳实践应用于数据库应用程序。


    几乎每个软件应用程序都需要某种形式的数据存储。许多开发人员不仅仅满足于持久化应用程序数据，而是创建**数据驱动**的应用程序。数据驱动的应用程序是指其设计能够根据数据动态改变其行为的应用程序——事实上，一个更好的术语可能是**数据依赖**。'
