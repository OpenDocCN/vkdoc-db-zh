- fmt: "# CHAPTER 8 DYNAMIC T-SQL\n\n## Figure 8-3. Base execution plan with scan\
    \ on the clustered index\n\nAs shown in Figure 8-3, the query plan in this case\
    \ is a simple clustered index scan, with an estimated cost of 0.0080454, and nine\
    \ logical reads. Since all of the rows need to be returned and no index covers\
    \ every column required, a clustered index scan is the most efficient way to satisfy\
    \ this query.\n\nThese baseline figures will be used to compare the relative performance\
    \ of various methods of creating a dynamic stored procedure that returns the same\
    \ columns, but that optionally filters the rows returned based on one or both\
    \ predicates of `BusinessEntityID` and `NationalIDNumber`. To begin with, the\
    \ query can be wrapped in a stored procedure:\n\n```sql\nCREATE PROCEDURE GetEmployeeData\n\
    \    @BusinessEntityID int = NULL,\n    @NationalIDNumber nvarchar(15) = NULL\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n\n    SELECT\n        BusinessEntityID,\n    \
    \    LoginID,\n        JobTitle\n    FROM\n        HumanResources.Employee\n \
    \   WHERE\n        BusinessEntityID = @BusinessEntityID\n        AND NationalIDNumber\
    \ = @NationalIDNumber;\nEND;\nGO\n```\n\nThis stored procedure uses the parameters\
    \ `@BusinessEntityID` and `@NationalIDNumber` to support the predicates. Both\
    \ of these parameters are optional, with `NULL` default values. However, this\
    \ stored procedure does not really support the parameters optionally; not passing\
    \ one of the parameters will mean that no rows will be returned by the stored\
    \ procedure at all, since any comparison with `NULL` in a predicate will not result\
    \ in a true answer.\n\nAs a first shot at making this stored procedure enable\
    \ the optional predicates, a developer might try to rewrite the procedure using\
    \ control-of-flow statements as follows:\n\n```sql\nALTER PROCEDURE GetEmployeeData\n\
    \    @BusinessEntityID int = NULL,\n    @NationalIDNumber nvarchar (15) = NULL\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n\n    IF (@BusinessEntityID IS NOT NULL AND @NationalIDNumber\
    \ IS NOT NULL)\n    BEGIN\n        SELECT\n            BusinessEntityID,\n   \
    \         LoginID,\n            JobTitle\n        FROM\n            HumanResources.Employee\n\
    \        WHERE\n            BusinessEntityID = @BusinessEntityID\n           \
    \ AND NationalIDNumber = @NationalIDNumber;\n    END\n    ELSE IF (@BusinessEntityID\
    \ IS NOT NULL)\n    BEGIN\n        SELECT\n            BusinessEntityID,\n   \
    \         LoginID,\n            JobTitle\n        FROM\n            HumanResources.Employee\n\
    \        WHERE\n            BusinessEntityID = @BusinessEntityID;\n    END\n \
    \   ELSE IF (@NationalIDNumber IS NOT NULL)\n    BEGIN\n        SELECT\n     \
    \       BusinessEntityID,\n            LoginID,\n            JobTitle\n      \
    \  FROM\n            HumanResources.Employee\n        WHERE\n            NationalIDNumber\
    \ = @NationalIDNumber;\n    END\n    ELSE\n    BEGIN\n        SELECT\n       \
    \     BusinessEntityID,\n            LoginID,\n            JobTitle\n        FROM\n\
    \            HumanResources.Employee;\n    END\nEND;\nGO\n```\n\nAlthough executing\
    \ this stored procedure produces the exact same query plans—and, therefore, the\
    \ exact same performance—as the equivalent individual query created in the test\
    \ batch, it has an unfortunate problem. Namely, taking this approach turns what\
    \ was a very simple 10-line stored procedure into a 42-line monster.\n\nAdding\
    \ one more column to the `SELECT` list for this procedure would require a change\
    \ to be made in four places. Now consider what would happen if a third predicate\
    \ were needed—the number of cases would jump from four to eight, meaning that\
    \ any change such as adding or removing a column would have to be made in eight\
    \ places. Now consider 10 or 20 predicates, and it’s clear that this method has\
    \ no place in the SQL Server developer’s toolbox. It is simply not a manageable\
    \ solution.\n\nThe next most common technique is one that has appeared in articles\
    \ on several SQL Server web sites over the past few years. As a result, a lot\
    \ of code has been written against it by developers who don’t seem to realize\
    \ that they’re creating a performance time bomb. This technique takes advantage\
    \ of the `COALESCE` function, as shown in the following rewritten version of the\
    \ stored procedure:\n\n```sql\nALTER PROCEDURE GetEmployeeData\n    @BusinessEntityID\
    \ int = NULL,\n    @NationalIDNumber nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n\n    SELECT\n        BusinessEntityID,\n        LoginID,\n        JobTitle\n\
    \    FROM\n        HumanResources.Employee\n    WHERE\n        BusinessEntityID\
    \ = COALESCE(@BusinessEntityID, BusinessEntityID)\n        AND NationalIDNumber\
    \ = COALESCE(@NationalIDNumber, NationalIDNumber);\nEND;\nGO\n```"
