    或许可以公允地说，时间信息在几乎所有有用的数据库中都是关键组成部分。


    想象一个缺少时间组件的数据库，无异于想象没有时间流逝的生活；这根本说不通。没有时间轴，就不可能描述上个月的购买次数、仓库的夜间平均温度，或呼叫者拨打技术支持电话时被要求等待的最长时间。


    尽管时间数据对我们的数据至关重要，但很少有开发者愿意真正深入思考成功处理时态数据所需的复杂性，这在许多情况下需要的思考量可能超出你最初的想象。


    在本章中，我将深入探讨在 SQL Server 中处理时间的方方面面。我会解释你可能遇到的一些不同类型的时间处理需求，并描述如何最好地应对一些常见——且出奇复杂——的时间查询。


    ## 对基于时间的信息进行建模


    当在 SQL Server 中思考"时态"数据时，通常想到的场景是一个 `datetime` 列，代表某个动作发生或未来计划发生的时间。


    然而，`datetime` 列只是实现时态数据的几种可能方式之一。可以在 SQL Server 中建模的一些基于时间的信息类别如下：


    *   **基于实例的数据** 关注于记录事件发生的时间点。如前面描述的例子所示，基于实例的数据通常使用单个 `datetime` 值列来记录，但也可以使用其他数据类型，包括
    `SQL Server 2008` 引入的 `datetime2` 和 `datetimeoffset` 类型，以不同的精度级别记录实例数据。你可能为其建模实例的场景包括：用户登录系统的时刻、客户进行购买的时刻，以及任何其他可能需要记录在数据库中的事件发生的准确时间。关键是要认识到，你是在描述一个特定的时间点，这基于你所使用的数据类型的精度。

    *   **基于区间的数据** 扩展了实例的概念，描述了一个指定起点和终点之间的时间段。根据你的需求，区间可以使用两个时间列（例如，使用 `datetime`
    类型）建模，也可以使用单个时间列加上另一个列（通常是数值列）来建模，该列代表自该时间点以来经过的时间量。基于区间数据的一个子集是 **持续时间** 的概念，它只记录事件持续的时间长度，而不考虑其发生的时间点。持续时间可以使用单个数值列来建模。

    *   **基于周期的数据** 与基于区间的数据类似，但它通常用于回答稍有不同的问题。处理区间或持续时间时，问题是"多长时间？"，而对于周期，问题是"什么时候？"。周期的例子包括"下个月"、"昨天"、"除夕夜"和"假日季"。虽然这些与区间相似——并且可以用区间表示——但处理周期的思维方式略有不同，因此重要的是要认识到存在其他建模选项。有关周期的更多信息，请参阅本章后面的"使用日历表定义周期"一节。

    *   **双时态数据** 是属于上述任何一类的时态数据，但还包括一个额外的时间组成部分（称为**有效时间**，或更宽松地称为**截止日期**），指明数据被认为有效的时间。这种数据模式常用于数据仓库，既用于缓慢变化的维度，也用于更新半加法性的事实数据。当以双时态方式查询数据库时，问题就从"在某一天，发生了什么？"转变...

    '
- fmt: '## 关于时间数据的思维方式


    “As of a certain day, what did we think happened on a certain (other) day?” 这个问题也可以表述为“What
    is the most recent idea we have of what happened on a certain day?”。要真正理解这种思维方式可能需要一点思考；更多信息请参阅本章后面的“管理双时态数据”部分。


    ## SQL Server 的日期/时间数据类型


    在 SQL Server 中成功处理时态数据的第一个要求是理解数据库管理系统（DBMS）提供了哪些原生的日期/时间数据类型。在 SQL Server 2008
    之前，当需要在 SQL Server 中存储时态数据时，实际上没有太多选择——唯一可用的时间数据类型是 `datetime` 和 `smalldatetime`。在实践中，即使
    `smalldatetime` 需要的存储空间更少，也很少有开发人员使用它，因为它的精度和值范围较小。


    SQL Server 2008 仍然支持 `datetime` 和 `smalldatetime`，但也提供了一系列新的时间数据类型。支持的完整时间数据类型列表见表
    11-1。


