    are dependent on the datatype being used. Although in most cases there are methods
    to provide equivalent functionality for all operations performed on both the geometry
    and geography datatypes, there are some methods that can only be applied to one
    or the other. The most noticeable example is that, although both geometry and
    geography support the ability to test whether two geometries intersect (using
    the STIntersects() method), only the geometry datatype provides the methods required
    to test the specific *sort* of intersection—whether one geometry crosses, overlaps,
    touches, or is contained within another. Some other methods provide equivalent
    functionality for the two types under a different name: for example, Lat and Long,
    which return the coordinate values of a geography instance, provide equivalent
    functionality to STY and STX in the geometry datatype.


    In general, the methods available using either type can be classified into one
    of two categories: Methods that adhere to the OGC specifications are prefixed
    by the letters ST (an


    abbreviation for *spatiotemporal*). In general, these methods provide basic


    functionality for working with spatial instances, such a STIntersects(), used
    to


    determine whether one instance intersects another; STDistance(), used to


    calculate the shortest distance between two instances; and STArea(), used to


    calculate the area contained within a polygon instance.


    SQL Server also provides a number of **extended methods**, which provide additional


    functionality on top of the OGC standard. These include Reduce(), which simplifies


    a geometry; BufferWithTolerance(), which applies a buffer within a given tolerance


    limit; and Filter(), which performs an approximate test of intersection based
    on a


    spatial index.


    In this section, I won’t discuss every available method—you can look these up
    on SQL Server Books Online (or in *Beginning Spatial with SQL Server 2008*). Instead,
    I’ll examine a couple of common scenarios and illustrate how you can combine one
    or more methods to solve them. Before we begin, let’s create a clustered primary
    key and a basic spatial index on the allCountries table to support any queries
    executed against it:


    ALTER TABLE allCountries


    ADD CONSTRAINT PK_geonameid


    PRIMARY KEY (geonameid );


    GO


    CREATE SPATIAL INDEX idxallCountries


    ON allCountries(location) USING GEOGRAPHY_GRID


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    WITH (


    GRIDS =(


    LEVEL_1 = MEDIUM,


    LEVEL_2 = MEDIUM,


    LEVEL_3 = MEDIUM,


    LEVEL_4 = MEDIUM),


    CELLS_PER_OBJECT = 16);


    I’ll cover spatial indexes later in this chapter, so don’t worry if you’re not
    familiar with the syntax used here—it will become clear soon!


    Nearest-Neighbor Queries


    Perhaps the most commonly asked question regarding spatial data is, “Where is
    the closest *x* to a given location?” or in the more general case, “How do we
    identify the nearest *n* features to a location?” This type of query is generally
    referred to as a **nearest-neighbor** query, and there are a number of ways of
    performing such a query in SQL Server 2008.


    The simplest method that springs to mind is to order a dataset based on the result
    of the


    STDistance() method, sorting all records in ascending order of distance from the
    given point, so that the top *n* records can be easily identified. This approach
    is demonstrated in the following query: DECLARE @Point geography;


    SET @Point = geography::STPointFromText(''POINT(0 52)'', 4326);


    SELECT TOP 3


    name,


    location.STAsText() AS WKT,


    location.STDistance(@Point) AS Distance


    FROM


    allCountries


    ORDER BY


    location.STDistance(@Point) ASC;


    „ **Caution** This query is perfectly valid and will lead to the correct results
    being obtained. However, it will take a very long time to execute, as will be
    explained in the following section. Rather than wasting time and server resources,
    you might want to just take my word for it and try the next example instead!


    The preceding query defines a geography Point instance located at latitude 52
    degrees and longitude 0


    degrees, using the spatial reference system SRID 4326\. It then orders the results
    of the query from the allCountries table based on their distance from this point,
    and returns the top three results as follows: 304


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    Name WKT Distance


    Periwinkle Hill POINT (-0.00112 52.0055) 616.78524720001


    Barkway POINT (0.0166667 52) 1144.6358911887


    Reed POINT (-0.0166667 52) 1144.6358911887


    Although this query correctly identifies and returns the nearest *n* results,
    there is a fundamental problem with this approach; STDistance() is a computationally
    expensive method, and the preceding query must evaluate the result of this method
    on every one of the rows in the result set to order them and select the closest
    *n* records. This results in a table scan of 6.9 million rows, and the spatial
    index doesn’t provide any help here because every row must be evaluated before
    the results can ordered.


    Performing a nearest-neighbor search like this on a table containing many rows
    is very slow and costly, as you will no doubt have discovered if you tried executing
    the example yourself!


    An alternative method for finding nearest neighbors involves a two-stage approach.
    The first stage is to use the index to identify a set of likely nearest-neighbor
    candidates, based on those records that lie within a predetermined buffer around
    the feature in question. The size of the buffer is chosen to be large enough so
    that it contains the required number of nearest neighbors, but not so large that
    it includes lots of additional rows of data that exceed the desired number of
    results. The second stage of this method uses the STDistance() method as before,
    but only to calculate the distance of those candidate records lying within the
    buffer area, rather than processing and sorting the whole table. By being selective
    in choosing the candidate records to sort, we can take advantage of the spatial
    index.


    The following listing demonstrates this approach, using STBuffer(25000) to identify
    candidate records that lie within a 25km search area:


    DECLARE @Point geography;


    SET @Point = geography::STPointFromText(''POINT(0 52)'', 4326);


    DECLARE @SearchArea geography;


    SET @SearchArea = @Point.STBuffer(25000); --25km search radius


    DECLARE @Candidates table (


    Name varchar(200),


    Location geography,


    Distance float


    );


    INSERT INTO @Candidates


    SELECT


    name,


    location,


    location.STDistance(@Point) AS Distance


    FROM


    allCountries


    WITH(INDEX(idxallCountries))


    WHERE


    location.Filter(@SearchArea) = 1;


    SELECT TOP 3 * FROM @Candidates ORDER BY Distance;


    CHAPTER 10 „ WORKING WITH SPATIAL DATA


    „**Note** Notice that in the preceding example query, I explicitly included an
    index hint, WITH(INDEX(idxallCountries)), to ensure that the query optimizer chooses
    a plan using the idxallCountries spatial index. The cost-based estimates for spatial
    queries are not always accurate, which means that SQL Server 2008 does not always
    pick the optimal plan for a query. SQL Server 2008 SP1 improves the situation,
    but there are still occasions when an explicit hint is required to ensure that
    a spatial index is used.


    As in the last example, this approach correctly identifies the three closest cities.
    The advantage of the buffer approach is that, by first filtering the set of candidate
    results to only those that lie within the vicinity of the feature, the number
    of times that STDistance() needs to be called is reduced, and the dataset to be
    sorted becomes much smaller, making the query significantly faster than the basic
    nearest-neighbor approach described previously. The locations lying within the
    buffer zone can be identified using a spatial index seek, as illustrated in the
    execution plan shown in Figure 10-8\. On my laptop, the top three nearest neighbors
    are now obtained in just 33ms, whereas the time taken to execute the first query
    was over an hour!'
  trans: "\n# 第 10 章 处理空间数据\n\n需要注意的是，可用方法在给定场景下取决于所使用的数据类型。尽管大多数情况下，`geometry` 和\
    \ `geography` 数据类型都提供了执行所有操作的等效功能方法，但有些方法只能应用于其中一种类型。最明显的例子是，虽然 `geometry` 和 `geography`\
    \ 都支持测试两个几何图形是否相交（使用 `STIntersects()` 方法），但只有 `geometry` 数据类型提供了测试具体*相交类型*所需的方法——即判断一个几何图形是否穿过、重叠、接触或包含于另一个几何图形中。另一些方法以不同的名称为两种类型提供了等效功能：例如，`Lat()`\
    \ 和 `Long()` 方法返回 `geography` 实例的坐标值，其功能等同于 `geometry` 数据类型中的 `STY()` 和 `STX()`。\n\
    \n一般来说，使用任一类型可用的方法可分为两类：遵循 OGC 规范的方法以字母 `ST`（*spatiotemporal* 时空的缩写）为前缀。这些方法通常提供处理空间实例的基础功能，例如\
    \ `STIntersects()` 用于判断一个实例是否与另一个相交；`STDistance()` 用于计算两个实例之间的最短距离；以及 `STArea()`\
    \ 用于计算多边形实例所围成的面积。\n\nSQL Server 还提供了许多**扩展方法**，这些方法在 OGC 标准之上提供了额外功能。其中包括 `Reduce()`（用于简化\
    \ `geometry`）、`BufferWithTolerance()`（在给定容差限制内应用缓冲区）以及 `Filter()`（基于空间索引执行近似的相交测试）。\n\
    \n在本节中，我不会讨论每一个可用的方法——你可以查阅 `SQL Server 联机丛书`（或《*Beginning Spatial with SQL Server\
    \ 2008*》）。相反，我将研究几个常见场景，并说明如何组合使用一个或多个方法来解决它们。在开始之前，让我们在 `allCountries` 表上创建一个聚集主键和一个基础的空间索引，以支持对其执行的任何查询：\n\
    \n```sql\nALTER TABLE allCountries\nADD CONSTRAINT PK_geonameid\nPRIMARY KEY (geonameid\
    \ );\nGO\n\nCREATE SPATIAL INDEX idxallCountries\nON allCountries(location) USING\
    \ GEOGRAPHY_GRID\nWITH (\n    GRIDS =(\n        LEVEL_1 = MEDIUM,\n        LEVEL_2\
    \ = MEDIUM,\n        LEVEL_3 = MEDIUM,\n        LEVEL_4 = MEDIUM),\n    CELLS_PER_OBJECT\
    \ = 16);\n```\n\n我将在本章后面介绍空间索引，所以如果你不熟悉这里使用的语法也不用担心——很快就会清楚了！\n\n## 最近邻查询\n\n\
    关于空间数据最常被问到的问题或许是：“给定位置最近的 *x* 在哪里？”或者更一般地说，“我们如何识别一个位置最近的 *n* 个要素？”这类查询通常被称为**最近邻**查询，在\
    \ SQL Server 2008 中有多种方法可以执行此类查询。\n\n最先想到的最简单方法是根据 `STDistance()` 方法的结果对数据集进行排序，将所有记录按与给定点的距离升序排列，从而轻松识别出前\
    \ *n* 条记录。下面的查询演示了这种方法：\n\n```sql\nDECLARE @Point geography;\nSET @Point = geography::STPointFromText('POINT(0\
    \ 52)', 4326);\n\nSELECT TOP 3\n    name,\n    location.STAsText() AS WKT,\n \
    \   location.STDistance(@Point) AS Distance\nFROM\n    allCountries\nORDER BY\n\
    \    location.STDistance(@Point) ASC;\n```\n\n**注意** 该查询完全有效，并且会得到正确的结果。但是，它需要很长的执行时间，原因将在下一节解释。与其浪费时间和服务器资源，你可能更愿意相信我的话，直接尝试下一个示例！\n\
    \n前面的查询定义了一个位于纬度 52 度、经度 0 度的 `geography` Point 实例，使用空间引用系统 SRID 4326。然后，它根据 `allCountries`\
    \ 表中的记录与该点的距离对查询结果进行排序，并返回前三个结果，如下所示：\n\n名称 | WKT | 距离\n--- | --- | ---\nPeriwinkle\
    \ Hill | POINT (-0.00112 52.0055) | 616.78524720001\nBarkway | POINT (0.0166667\
    \ 52) | 1144.6358911887\nReed | POINT (-0.0166667 52) | 1144.6358911887\n\n虽然此查询正确识别并返回了最近的\
    \ *n* 个结果，但这种方法存在一个根本性问题：`STDistance()` 是一个计算成本高昂的方法，并且前面的查询必须对结果集中的每一行计算此方法的结果，才能对它们进行排序并选择最近的\
    \ *n* 条记录。这导致对包含 690 万行的表进行表扫描，而且空间索引在这里没有任何帮助，因为在排序结果之前必须对每一行进行计算。\n\n在包含大量行的表上执行这样的最近邻搜索非常缓慢且成本高昂，如果你自己尝试执行了这个示例，无疑已经发现了这一点！\n\
    \n另一种寻找最近邻的方法涉及一个两阶段的方法。第一阶段是使用索引识别一组可能的最近邻候选对象，这些候选对象位于预定特征周围的缓冲区内。缓冲区的大小选择要足够大以包含所需数量的最近邻，但又不能太大以至于包含大量超出所需结果数量的额外数据行。此方法的第二阶段像之前一样使用\
    \ `STDistance()` 方法，但仅计算那些位于缓冲区域内的候选记录的距离，而不是处理和排序整个表。通过有选择性地选择要排序的候选记录，我们可以利用空间索引。\n\
    \n下面的代码清单演示了这种方法，使用 `STBuffer(25000)` 来识别位于 25 公里搜索区域内的候选记录：\n\n```sql\nDECLARE\
    \ @Point geography;\nSET @Point = geography::STPointFromText('POINT(0 52)', 4326);\n\
    \nDECLARE @SearchArea geography;\nSET @SearchArea = @Point.STBuffer(25000); --25km\
    \ search radius\n\nDECLARE @Candidates table (\n    Name varchar(200),\n    Location\
    \ geography,\n    Distance float\n);\n\nINSERT INTO @Candidates\nSELECT\n    name,\n\
    \    location,\n    location.STDistance(@Point) AS Distance\nFROM\n    allCountries\n\
    WITH(INDEX(idxallCountries))\nWHERE\n    location.Filter(@SearchArea) = 1;\n\n\
    SELECT TOP 3 * FROM @Candidates ORDER BY Distance;\n```\n\n**注意** 请注意，在上面的示例查询中，我显式包含了索引提示\
    \ `WITH(INDEX(idxallCountries))`，以确保查询优化器选择使用 `idxallCountries` 空间索引的计划。空间查询的基于成本的估计并不总是准确的，这意味着\
    \ SQL Server 2008 并不总是为查询选择最优计划。SQL Server 2008 SP1 改善了这种情况，但有时仍然需要显式提示来确保使用空间索引。\n\
    \n与上一个示例一样，这种方法正确识别出了三个最近的城市。缓冲区方法的优势在于，通过首先将候选结果集筛选为仅那些位于特征附近的记录，减少了需要调用 `STDistance()`\
    \ 的次数，并且待排序的数据集变得小得多，使得该查询比前面描述的基础最近邻方法显著更快。位于缓冲区内的位置可以使用空间索引查找来识别，如图 10-8 所示的执行计划所示。在我的笔记本电脑上，现在只需\
    \ 33 毫秒即可获得前三个最近邻，而执行第一个查询所需的时间超过一个小时！\n"
- fmt: "# CHAPTER 10 „ WORKING WITH SPATIAL DATA\n\nFigure 10-8. A query to identify\
    \ nearest-neighbor candidates within a buffer zone can utilize a clustered spatial\
    \ index seek.\n\nHowever, the main problem with this approach is that it relies\
    \ on an appropriate buffer size in which to search for candidate results. If you\
    \ set the buffer too large, then there will be too many possible candidates returned\
    \ and the filter will not be efficient. If you set the buffer size too small,\
    \ then there is a risk that the search area will not contain *any* candidates,\
    \ resulting in the query failing to identify any nearest neighbors at all.\n\n\
    The buffer search zone approach is most useful in situations where you are able\
    \ to reliably set an appropriate buffer size in which to select a set of candidate\
    \ nearest neighbors. This might be based on a known, uniform distribution of your\
    \ data—for example, you know that any item in the dataset will never lie more\
    \ than 25km from its nearest neighbor. Alternatively, you might want to obtain\
    \ nearest neighbors in combination with an additional distance constraint—for\
    \ example, “Show me the three closest gas stations to this location, but only\
    \ if they are within 10 miles.”\n\nRather than identifying candidates that lie\
    \ within a fixed search zone (which faces the risk of failing to find any nearest\
    \ neighbors at all), a better approach is to create a query that identifies candidates\
    \ within an expanding search range. The search for candidate results can be initially\
    \ limited to a close vicinity to the chosen location, but gradually increased\
    \ until at least the required number of nearest neighbors is found. These candidate\
    \ results can then be sorted in the second stage to find the true *n* nearest\
    \ neighbors.\n\nA query that identifies nearest neighbors based on expanding search\
    \ ranges requires the use of a `numbers table`. If you don’t already have a numbers\
    \ table, you can create one and populate it with the integers between 0 and 1,000\
    \ using the following code:\n\n```sql\nCREATE TABLE Numbers (\n    Number int\
    \ PRIMARY KEY CLUSTERED\n);\n\nDECLARE @i int = 0;\n\nWHILE @i <= 1000\nBEGIN\n\
    \    INSERT INTO Numbers VALUES (@i);\n    SET @i = @i + 1;\nEND;\nGO\n```\n\n\
    The `Numbers` table will be joined to the `allCountries` table to create a series\
    \ of expanding search ranges. The distance to which each successive search extends\
    \ increases exponentially until a search area of sufficient size is found that\
    \ contains the requisite number of nearest neighbors. All of the features in this\
    \ search area are returned as candidates, and then the `TOP 3` syntax is used\
    \ to select the three true nearest neighbors. This approach is demonstrated in\
    \ the following code listing:\n\n```sql\nDECLARE @Point geography;\nSET @Point\
    \ = geography::STPointFromText('POINT(0 52)', 4326);\n\nDECLARE @Candidates table\
    \ (\n    Name varchar(200),\n    Location geography,\n    Distance float,\n  \
    \  Range int\n);\n\nINSERT INTO @Candidates\nSELECT TOP 3 WITH TIES\n    Name,\n\
    \    Location,\n    Location.STDistance(@Point) AS Distance,\n    1000*POWER(2,\
    \ Number) AS Range\nFROM\n    allCountries\n    WITH(INDEX(idxallCountries))\n\
    \    INNER JOIN Numbers\n    ON allCountries.Location.STDistance(@Point) < 1000*POWER(2,Numbers.Number)\n\
    ORDER BY Number;\n\nSELECT TOP 3 * FROM @Candidates ORDER BY Range DESC, Distance\
    \ ASC;\n```\n\nThis code might not seem that intuitive, so let’s step through\
    \ it. Remember that the `Numbers` table contains consecutive integers, starting\
    \ at zero. So the condition `allCountries.Location.STDistance(@Point) < 1000*POWER(2,Numbers.Number)`\
    \ specifies that the initial criterion for a feature to be considered a nearest-neighbor\
    \ candidate is that the distance between that feature and `@Point` is less than\
    \ `1000 * 2^0`. Since the EPSG:4326 spatial reference system defines distances\
    \ in meters, this equates to a 1km search area—if you want to specify an alternative\
    \ starting search radius, you may do so by changing the value of `1000` to another\
    \ value (remember to use the unit of measure appropriate to the datatype and SRID\
    \ of the data in question).\n\nIf the requisite number of neighbors (in this case,\
    \ we are searching for the top three) is not found within the specified distance,\
    \ then the search range is increased in size. Successive search ranges are obtained\
    \ by raising `2` to the power of the next number in the `Numbers` table. Thus,\
    \ the first range extends to 1km around the point, the second range extends to\
    \ 2km—then 4km, 8km, 16km, and so on. By adopting an exponential growth model,\
    \ this method is guaranteed to find the nearest neighbor within a relatively short\
    \ number of iterations, however dispersed the distribution of the underlying features\
    \ is.\n\nOnce the search range has been sufficiently increased to contain at least\
    \ the required number of candidate nearest neighbors, *all* of the features lying\
    \ within that range are selected as candidates, by using a `SELECT` statement\
    \ with the `WITH TIES` argument. Finally, the candidates are sorted by ascending\
    \ distance from the point, and the `TOP 3` records are selected as the true nearest\
    \ neighbors. The `Range` column returned in the results states the distance to\
    \ which the search range was extended to find the nearest neighbor.\n\nOn my laptop,\
    \ this approach identifies the three nearest neighbors in 45ms. While it is slightly\
    \ more complex, this last approach provides the most flexible solution for implementing\
    \ a nearest-neighbor query. It is significantly faster than the basic approach,\
    \ and although not quite as fast as the fixed search area technique, it does not\
    \ suffer from the limitations associated with having to specify a fixed search\
    \ radius. To enhance the performance of this query further, we’ll need to look\
    \ at the matter of spatial indexes, which is covered later in this chapter.\n\n\
    ## Finding Locations Within a Given Bounding Box\n\nOver the past few years, there\
    \ has been a huge growth in the adoption of web-mapping services, including Google\
    \ Maps, Yahoo Maps, and Microsoft Bing Maps. Whereas once considered gimmicks\
    \ and eye candy with little real value, these tools are now being used in increasingly\
    \ important applications, including for disaster response planning, logistics,\
    \ epidemiology, and other health-reporting scenarios.\n\nTypically, these web-mapping\
    \ applications are used as dynamic front-end interfaces to spatial data held in\
    \ a database. Users pan and zoom the map to display a particular area of interest,\
    \ and any data contained within the visible map view is retrieved from the database\
    \ to be plotted on the map. In this section, we’ll look at a scenario that uses\
    \ Microsoft Bing Maps as an interface to spatial data held in SQL Server 2008,\
    \ although the same approach could be applied to most map interfaces.\n\nThe first\
    \ requirement is to identify the area visible within a given map view—in other\
    \ words, the `bounding box` of the map. Typically, the bounding box of a map view\
    \ can be described using only two pairs of coordinate values, representing the\
    \ points at opposite corners of the map. Unfortunately, these is no standardized\
    \ view of which two corners to use: the `GetMapView()` method in Bing Maps returns\
    \ the coordinates of the points at the top-left and bottom-right corners of the\
    \ map, whereas the equivalent `getBounds()` method used by Google Maps returns\
    \ the points at the southwest and northeast corners.\n\nAlthough these differences\
    \ are easily handled, it’s something to be aware of as you develop your code.\n\
    \nHaving identified the coordinate of two opposing points, we next need to construct\
    \ a `Polygon` representing the bounding box enclosed by those points. To illustrate\
    \ this, consider the map view shown in Figure 10-9, which is centered on the state\
    \ of Colorado. The coordinate values of the top-left and bottom-right corners\
    \ of the map are (41,–109) and (37,–102), respectively.\n\n![](index-329_1.png)\n\
    \n*Figure 10-9. Typical viewport of a web-mapping application*\n\nThe coordinates\
    \ of the bounding box returned from Bing Maps/Google Maps are expressed using"
