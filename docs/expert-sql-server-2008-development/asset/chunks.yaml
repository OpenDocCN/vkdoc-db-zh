    ensure that it remains valid. From a defensive point of view, I highly recommend
    the second approach.


    There are two possible issues that can make life difficult for hierarchical queries:
    forests and cycles.


    **Forests** occur when there are multiple root nodes in the hierarchy. And although
    they may make sense for some types of data, for organizational charts they do
    not. **Cycles** occur when, somewhere downstream from a given node, that node
    is suddenly referenced again. For example, if George manages Ed, Ed manages Steve,
    and Steve manages George, a cycle has been formed—this is not only unrealistic,
    but also cause for a runtime exception due to an endless loop!


    The Employee_Temp table we’ve been working with already has a couple of constraints
    that help guard against certain issues: a primary key and a self-referencing foreign
    key. The primary key, which is 402


    CHAPTER 12 „ TREES, HIERARCHIES, AND GRAPHS


    on the EmployeeID column, guards against most cycles by making it impossible for
    a given employee to have more than one manager. And the self-referencing foreign
    key guards against most forest issues because every node must be connected to
    another node that already exists—unless it’s a root node.


    The first thing that must be constrained against is multiple root nodes. One method
    that might come to mind to handle this is using a trigger, but I find it slightly
    more interesting to employ an indexed view:


    CREATE VIEW OnlyOneRoot


    WITH SCHEMABINDING


    AS


    SELECT


    ManagerID


    FROM dbo.Employee_Temp


    WHERE


    ManagerID IS NULL;


    GO


    CREATE UNIQUE CLUSTERED INDEX IX_OnlyOneRoot


    ON OnlyOneRoot (ManagerID);


    GO


