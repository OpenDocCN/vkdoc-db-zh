  trans: "\n这里需要注意的关键点是，数据的**对象表示**可能与其在数据库中的**建模方式**毫无关联，反之亦然。面向对象的世界和关系型世界各有其目标与达成目标的手段，开发者不应试图强行将两者糅合在一起，否则可能会导致功能受损。\n\
    \n## 表真的只是伪装的类吗？\n\n一些入门级的数据库教材有时会提到，可以将表比作类，将行比作类的实例（即对象）。初看之下，这很有道理；表和类一样，为实体定义了一组属性（称为列）。它们也可以（粗略地）为实体定义一组方法，其形式是触发器。\n\
    \n然而，相似之处到此为止。面向对象系统的关键基础是**继承**和**多态**，这两者在 SQL 数据库中即使不是完全无法表示，也是极其困难的。此外，数据库和面向对象系统中访问相关信息的路径也大相径庭。面向对象系统中的一个实体可以“拥有”一个子实体，通常使用“点”符号来访问。例如，一个书店对象可能拥有一个书籍集合：\n\
    \n```sql\nBooks = BookStore.Books;\n```\n\n在这个面向对象的例子中，书店“拥有”书籍。但在 SQL 数据库中，这种实体间的关系是通过**键**来维持的，其中子实体指向其父实体。关系并非书店拥有书籍，而是反过来：书籍通过一个外键指向书店：\n\
    \n```sql\nCREATE TABLE BookStores\n(\n    BookStoreId int PRIMARY KEY\n);\n\n\
    CREATE TABLE Books\n(\n    BookStoreId int REFERENCES BookStores (BookStoreId),\n\
    \    BookName varchar(50),\n    Quantity int,\n    PRIMARY KEY (BookStoreId, BookName)\n\
    );\n```\n\n虽然面向对象和 SQL 表示法可以存储相同的信息，但其实现方式差异如此之大，以至于说一个表代表一个类（至少在当前的 SQL 数据库中）是不合理的。\n\
    \n## 对继承建模\n\n在面向对象设计中，对象之间可以存在两种基本关系：“**有-一个**”关系，即一个对象“拥有”另一个对象的实例（例如，书店拥有书籍）；以及“**是-一个**”关系，即一个对象的类型是另一个对象的子类型（或*子类*）（例如，书店是一种商店）。在\
    \ SQL 数据库中，“有-一个”关系很常见，而“是-一个”关系则可能难以实现。\n\n考虑一个名为“Products”的表，它可能代表某公司所有可供销售产品的实体类。该表可能包含通常属于产品的列（属性），如“价格”、“重量”和“UPC”。这些通用属性适用于该公司销售的所有产品。然而，公司可能销售许多产品子类，每个子类都有自己特定的额外属性集。例如，如果公司同时销售书籍和\
    \ DVD，书籍可能具有“页数”属性，而 DVD 则可能具有“时长”和“格式”属性。\n\n在面向对象的世界中，子类化是通过继承模型实现的，这些模型在诸如\
    \ C#等语言中实现。在这些模型中，一个给定的实体可以是一个子类的成员，同时在处理该层级的代码中，它仍被普遍视为*超类*的成员。这使得在销售点应用程序的结账部分，可以无缝地处理书籍和\
    \ DVD，同时为每个子类保留独立的属性，以供应用程序的其他需要部分使用。\n\n在 SQL 数据库中，对继承建模可能很棘手。下面的代码清单展示了一种可行的方法：\n\
    \n```sql\nCREATE TABLE Products\n(\n    UPC int NOT NULL PRIMARY KEY,\n    Weight\
    \ decimal NOT NULL,\n    Price decimal NOT NULL\n);\n\nCREATE TABLE Books\n(\n\
    \    UPC int NOT NULL PRIMARY KEY\n        REFERENCES Products (UPC),\n    PageCount\
    \ int NOT NULL\n);\n\nCREATE TABLE DVDs\n(\n    UPC int NOT NULL PRIMARY KEY\n\
    \        REFERENCES Products (UPC),\n    LengthInMinutes decimal NOT NULL,\n \
    \   Format varchar(4) NOT NULL\n        CHECK (Format IN ('NTSC', 'PAL'))\n);\n\
    ```\n\n使用此代码清单创建的数据库结构如图 1-2 所示。\n\n*图 1-2\\. 在 SQL 数据库中对继承建模*\n\n尽管该模型成功地将书籍和\
    \ DVD 确立为产品的子类型，但它存在几个严重问题。首先，就目前情况而言，该模型无法强制子类型的唯一性。单个 UPC 可以同时属于 Books 和 DVDs\
    \ 两个子类型。这在现实世界的大多数情况下都显得不太合理（尽管可能有一本书附带一张 DVD，那样的话这个模型或许说得通）。\n\n另一个问题是属性的访问。在面向对象系统中，子类自动继承其超类的所有属性；一个书籍实体将包含书籍和通用产品的所有属性。然而，在此处提出的模型中情况并非如此。要获取书籍或\
    \ DVD 的通用产品属性，需要连接回`Products`表。这实际上破坏了处理子类型的完整意义。\n\n解决这些问题并非不可能，但需要费些功夫。保证子类型唯一性的一种方法是在超类型中填充一个额外的属性来标识每个实例的子类型。下表展示了如何实现此解决方案：\n\
    \n```sql\nCREATE TABLE Products\n(\n    UPC int NOT NULL PRIMARY KEY,\n    Weight\
    \ decimal NOT NULL,\n    Price decimal NOT NULL,\n    ProductType char(1) NOT\
    \ NULL\n        CHECK (ProductType IN ('B', 'D')),\n    UNIQUE (UPC, ProductType)\n\
    );\n\nCREATE TABLE Books\n(\n    UPC int NOT NULL PRIMARY KEY,\n    ProductType\
    \ char(1) NOT NULL\n        CHECK (ProductType = 'B'),\n    PageCount int NOT\
    \ NULL,\n    FOREIGN KEY (UPC, ProductType) REFERENCES Products (UPC, ProductType)\n\
    );\n\nCREATE TABLE DVDs\n(\n    UPC int NOT NULL PRIMARY KEY,\n    ProductType\
    \ char(1) NOT NULL\n        CHECK (ProductType = 'D'),\n    LengthInMinutes decimal\
    \ NOT NULL,\n    Format varchar(4) NOT NULL\n        CHECK (Format IN ('NTSC',\
    \ 'PAL')),\n    FOREIGN KEY (UPC, ProductType) REFERENCES Products (UPC, ProductType)\n\
    );\n```\n\n通过将子类型定义为超类型的一部分，可以创建一个`UNIQUE`约束，使 SQL Server 能够强制每个超类型实例只允许存在一个子类型。在每个子类型表中，通过`ProductType`列上的`CHECK`约束进一步强化了这种关系，确保只允许插入正确的产品类型。\n\
    \n通过使用索引视图和`INSTEAD OF`触发器，可以进一步扩展此方法。可以为每个子类型创建一个视图，该视图封装了检索超类型属性所需的连接。通过创建视图来隐藏连接，使用者无需感知子类型/超类型关系，从而解决了属性访问问题。索引有助于提高性能，而触发器则允许视图可更新。\n\
    \n在 SQL 数据库中，几乎可以表示任何能在面向对象系统中体现的关系，但数据库开发者理解其中的复杂性至关重要。将面向对象数据（正确地）映射到数据库通常并非易事，对于复杂的对象图来说，这可能是一个相当大的挑战。\n\
    \n## “大量空列”继承模型\n"
- fmt: '# „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    ## ORM: A Solution That Creates Many Problems


    An all-too-common design for modeling inheritance in the database is to create
    a single table with all of the columns for the supertype in addition to all of
    the columns for each subtype, the latter nullable. This design is fraught with
    issues and should be avoided. The basic problem is that the attributes that constitute
    a subtype become mixed, and therefore confused. For example, it is impossible
    to look at the table and find out what attributes belong to a book instead of
    a DVD. The only way to make the determination is to look it up in the documentation
    (if it exists) or evaluate the code. Furthermore, data integrity is all but lost.
    It becomes difficult to enforce that only certain attributes should be non-NULL
    for certain subtypes, and even more difficult to figure out what to do in the
    event that an attribute that should be NULL isn’t—what does NTSC format mean for
    a book? Was it populated due to a bug in the code, or does this book really have
    a playback format? In a properly modeled system, this question would be impossible
    to ask.


    One solution to overcoming the problems that exist between relationship and object-oriented
    systems is to turn to tools known as `object-relational mappers (ORMs)`, which
    attempt to automatically map objects to databases.


    Many of these tools exist, including the open source `nHibernate` project, and
    `Microsoft`’s own `Entity Framework`. Each of these tools comes with its own features
    and functions, but the basic idea is the same in most cases: the developer “plugs”
    the `ORM` tool into an existing object-oriented system and tells the tool which
    columns in the database map to each field of each class. The `ORM` tool interrogates
    the object system as well as the database to figure out how to write `SQL` to
    retrieve the data into object form and persist it back to the database if it changes.
    This is all done automatically and somewhat seamlessly.


    Some tools go one step further, creating a database for the preexisting objects,
    if one does not already exist. These tools work based on the assumption that classes
    and tables can be mapped in one-to-one correspondence in most cases, which, as
    previously mentioned, is generally *not* true. Therefore these tools often end
    up producing incredibly flawed database designs.


    One company I did some work for had used a popular `Java`-based `ORM` tool for
    its e-commerce application. The tool mapped “has-a” relationships from an object-centric
    rather than table-centric point of view, and as a result the database had a `Products`
    table with a foreign key to an `Orders` table. The `Java` developers working for
    the company were forced to insert fake orders into the system in order to allow
    the firm to sell new products.


    While `ORM` does have some benefits, and the abstraction from any specific database
    can aid in creating portable code, I believe that the current set of available
    tools do not work well enough to make them viable for enterprise software development.
    Aside from the issues with the tools that create database tables based on classes,
    the two primary issues that concern me are both performance related: First of
    all, `ORM` tools tend to think in terms of objects rather than collections of
    related data (i.e., tables). Each class has its own data access methods produced
    by the `ORM` tool, and each time data is needed, these methods query the database
    on a granular level for just the rows necessary. This means that (depending on
    how connection pooling is handled) a lot of database connections are opened and
    closed on a regular basis, and the overall interface to retrieve the data is quite
    “chatty.” `SQL` `DBMS`s tend to be much more efficient at returning data in bulk
    than a row at a time; it’s generally better to query for a product and all of
    its related data at once than to ask for the product, and then request related
    data in a separate query.


    Second, query tuning may be difficult if `ORM` tools are relied upon too heavily.
    In `SQL` databases, there are often many logically equivalent ways of writing
    any given query, each of which may have distinct performance characteristics.
    The current crop of `ORM` tools does not intelligently monitor for and automatically
    fix possible issues with poorly written queries, and developers using these tools
    are often taken by surprise when the system fails to scale because of improperly
    written queries.


    `ORM` tools have improved dramatically over the last couple of years, and will
    undoubtedly continue to do so as time goes on. However, even in the most recent
    version of the `Microsoft` `Entity Framework` (`.NET 4.0 Beta 1`), there are substantial
    deficiencies in the `SQL` code generated that lead to database queries that are
    ugly at best, and frequently suboptimal. I feel that any such automatically generated
    `ORM` code will never be able to compete performance-wise with manually crafted
    queries, and a better return on investment can be made by carefully designing
    object-database interfaces by hand.


    ## Introducing the Database-As-API Mindset


    By far the most important issue to be wary of when writing data interchange interfaces
    between object systems and database systems is coupling. Object systems and the
    databases they use as back ends should be carefully partitioned in order to ensure
    that, in most cases, changes to one layer do not necessitate changes to the other
    layer. This is important in both worlds; if a change to the database requires
    an application change, it can often be expensive to recompile and redeploy the
    application.


    Likewise, if application logic changes necessitate database changes, it can be
    difficult to know how changing the data structures or constraints will affect
    other applications that may need the same data.


    To combat these issues, database developers must resolve to adhere rigidly to
    a solid set of encapsulated interfaces between the database system and the objects.
    I call this the `database-as-API` mindset.


    An `application programming interface (API)` is a set of interfaces that allows
    a system to interact with another system. An `API` is intended to be a complete
    access methodology for the system it exposes.


    In database terms, this means that an `API` would expose public interfaces for
    retrieving data from, inserting data into, and updating data in the database.


    A set of database interfaces should comply with the same basic design rule as
    other interfaces: well-known, standardized sets of inputs that result in well-known,
    standardized sets of outputs. This set of interfaces should completely encapsulate
    all implementation details, including table and column names, keys, indexes, and
    queries. An application that uses the data from a database should not require
    knowledge of internal information—the application should only need to know that
    data can be retrieved and persisted using certain methods.


    In order to define such an interface, the first step is to define stored procedures
    for all external database access. Table-direct access to data is clearly a violation
    of proper encapsulation and interface design, and views may or may not suffice.
    Stored procedures are the only construct available in `SQL Server` that can provide
    the type of interfaces necessary for a comprehensive data `API`.


    `Web Services as a Standard API Layer`'
