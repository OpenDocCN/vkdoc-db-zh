  trans: "\n# 如果发现自己处于一种连此技术都无法使用、而你又*绝对**必须*支持应用程序以动态方式传递对象名称的情况，你至少可以做些事情来防范可能发生的\
    \ SQL 注入问题。SQL Server 提供了一个名为 `QUOTENAME` 的函数，它可以给任何输入字符串加上方括号分隔符，这样在与 SQL 语句拼接时，它会被视为标识符。例如，`QUOTENAME('123')`\
    \ 会返回值 `[123]`。\n\n通过使用 `QUOTENAME`，可以修改原本的动态表名存储过程，从而消除 SQL 注入的风险：\n\n```sql\n\
    ALTER PROC SelectDataFromTable\n    @TableName nvarchar(200);\nAS\nBEGIN\n   \
    \ SET NOCOUNT ON;\n    DECLARE @sql nvarchar(max);\n    SET @sql = '' +\n    \
    \    'SELECT ' +\n        'ColumnA, ' +\n        'ColumnB, ' +\n        'ColumnC\
    \ ' +\n        'FROM ' + QUOTENAME(@TableName);\n    EXEC(@sql);\nEND;\nGO\n```\n\
    \n不幸的是，这并没有解决接口问题，并且修改数据库模式可能仍然需要对应用程序代码进行修改。\n\n## 总结\n\n动态 SQL 对于处理需要灵活性的存储过程来说，可能是一个极其有用的工具。然而，确保你正确地使用动态\
    \ SQL 以达成性能、可维护性和安全性之间的最佳平衡至关重要。请确保*始终*对查询进行参数化，并且*永远*不要信任调用者提供的任何输入，以防一个恶意的有效载荷正潜伏在一个看似无辜的搜索字符串中。\n\
    \n# 第九章：为应用并发设计系统\n\n当应用程序只有一个并发用户时，其行为和扩展性往往表现得极好，这毫不奇怪。许多开发者都熟悉那种在漫长而疲惫的发布周期结束时，提交复杂代码并自信地回家，确信一切都能按照规范运行和扩展的美妙感觉。唉，当大量实际用户开始猛烈敲击系统时，这种感觉可能会瞬间被撕裂，转化为剧痛，并且变得显而易见：如果当初能对并发使用情况再多做一点测试可能会很有帮助。除非你的应用程序一次只供一个用户使用，否则它根本不能被设计和开发得好像只会被一个用户使用一样。\n\
    \n并发可能是应用程序开发中最棘手的领域之一，因为在此领域出现的问题往往依赖于极其特定的时机。某个导致测试运行以一连串异常结束的问题，在下一次运行时可能不会触发任何警报，因为某个其他模块碰巧比平时多花了几个毫秒，恰好对齐了“牌局”。更糟糕的是相反的情况，并发问题似乎凭空出现，在奇怪且无法复现的时间间隔发生（但*总是*发生在某个重要演示的中间）。\n\
    \n虽然完全消除你软件中的这类问题可能很困难或不可能，但恰当的前期设计可以极大地帮助你减少看到问题的次数。关键在于理解几个基本因素：\n- 用户可能执行哪些会干扰系统中其他用户活动的操作？\n\
    - 数据库（或软件系统）的哪些特性会帮助或妨碍你的用户并发地执行工作？\n- 为了确保并发得到妥善处理，必须遵守哪些业务规则？\n\n本章将深入探讨你可能需要在数据库层实现的不同类型的应用并发模型，SQL\
    \ Server 提供的工具以帮助你设计在并发场景下正常工作的应用程序，以及如何超越 SQL Server 开箱即用的功能。\n\n## 业务层面：当进程冲突时应该发生什么？\n\
    \n在深入探讨 SQL Server 中处理并发的技术细节之前，定义基本的问题领域以及通常处理这些问题的方法是很重要的。在数据库应用程序的上下文中，并发进程引发的问题通常归为以下三类之一：\n\
    \n### 覆盖\n\n当两个或更多用户同时编辑相同的数据，并且一个用户的更改被另一个用户的更改替换而丢失时，就发生了**覆盖**。这可能成为问题，原因有几个：首先，是努力、时间和数据的损失（更不用说工作被丢失的用户会感到相当恼火）。此外，一个更严重的潜在后果是，根据用户当时参与的活动，覆盖可能导致数据库级别的数据损坏。一个简单的例子是销售点应用程序，它将库存数量从表中读入一个变量，根据交易增加或减少数量，然后将更新后的数字写回表中。如果有两个销售终端在运行，并且每个终端同时处理同一产品的销售，那么两个终端都可能检索到初始值，并且一个终端可能会覆盖另一个终端的更改，而不是进行更新。\n\
    \n### 不可重复读\n\n**不可重复读**发生在应用程序从数据库读取一组数据并对其执行一些计算，然后需要为了另一个目的再次读取同一组数据——但原始数据集在此期间已经发生了变化。这个问题可能显现的一个常见例子是分析系统提供的向下钻取报告。报告系统可能向用户展示一个基于初始读取计算得出的汇总数据视图。当用户点击报告上的汇总数据项时，报告系统可能会返回数据库以读取相应的详细数据。然而，在初始读取和详细读取之间，有可能另一个用户已经更改了一些数据，这意味着两组数据将不再匹配。\n\
    \n### 阻塞\n\n当一个进程正在写入数据，而另一个进程试图读取或写入相同的数据时，可能会发生**阻塞**。阻塞可以是（并且通常是）一件好事——它能防止多种覆盖问题，并确保客户端只读取到一致的数据。然而，过度的阻塞会极大地降低应用程序的扩展能力，因此必须仔细监控和控制。\n\
    \n有几种处理这些问题的方法，技术实现的难易程度各不相同。但就本节而言，我将暂时忽略技术层面，让讨论聚焦于所涉及的业务规则。解决数据库并发问题主要有四种方法值得考虑：\n\
    \n- **无政府状态**：假设冲突和数据不一致无关紧要。不阻止读取者读取不一致的数据，也不担心覆盖或重复读。这种方法常用于用户几乎没有机会并发编辑同一数据点，以及重复读问题不重要的应用程序中。\n\
    - **悲观并发控制**：假设冲突会很频繁；阻止它们发生。阻止读取者读取不一致的数据，但不一定担心重复读。为了避免覆盖，不允许任何人开始编辑其他人正在编辑的数据。\n\
    - **乐观并发控制**：假设偶尔会发生一些冲突，但在发生时处理它们是可以接受的。阻止读取者读取不一致的数据，并告知读取者正在读取的数据版本。这使得读取者能够知道何时发生了重复读问题。\n"
- fmt: "(but not avoid them). To avoid overwrites, do not allow any process to overwrite\
    \ a piece of data if it has been changed in the time since it was first read for\
    \ editing by that process.\n\n`Multivalue concurrency control (MVCC)`: Assume\
    \ that there will be collisions, but that they should be treated as new versions\
    \ rather than as collisions. Block readers both from reading inconsistent data\
    \ and encountering repeatable read problems by letting the reader know what version\
    \ of the data is being read and allowing the reader to reread the same version\
    \ multiple times. To avoid overwrites, create a new version of the data each time\
    \ it is saved, keeping the old version in place.\n\nEach of these methodologies\
    \ represents a different user experience, and the choice must be made based on\
    \ the necessary functionality of the application at hand. For instance, a message\
    \ board application might use a more-or-less anarchic approach to concurrency,\
    \ since it’s unlikely or impossible that two users would be editing the same message\
    \ at the same time—overwrites and inconsistent reads are acceptable.\n\nOn the\
    \ other hand, many applications cannot bear overwrites. A good example of this\
    \ is a source control system, where overwritten source code might mean a lot of\
    \ lost work. However, the best way to handle the situation for source control\
    \ is up for debate. Two popular systems, Subversion and Visual SourceSafe, each\
    \ handle this problem differently. Subversion uses an optimistic scheme in which\
    \ anyone can edit a given file, but you receive a collision error when you commit\
    \ if someone else has edited it in the interim. Visual SourceSafe, on the other\
    \ hand, uses a pessimistic model where you must check out a given file before\
    \ editing it, thereby restricting anyone else from doing edits until you check\
    \ it back in.\n\nFinally, an example of a system that supports `MVCC` is a wiki.\
    \ Although some wiki packages use an optimistic model, many others allow users\
    \ to make edits at any time, simply incrementing the version number for a given\
    \ page to reflect each change, but still saving past versions. This means that\
    \ if two users are making simultaneous edits, some changes might get overwritten.\
    \ However, users can always look back at the version history to restore overwritten\
    \ content—in an `MVCC` system, nothing is ever actually deleted.\n\nIn later sections\
    \ of this chapter I will describe solutions based on each of these methodologies\
    \ in greater detail.\n\n## Isolation Levels and Transactional Behavior\n\nThis\
    \ chapter assumes that you have some background in working with SQL Server transactions\
    \ and isolation levels, but in case you’re not familiar with some of the terminology,\
    \ this section presents a very basic introduction to the topic.\n\n`Isolation\
    \ levels` are set in SQL Server in order to tell the database engine how to handle\
    \ locking and blocking when multiple transactions collide, trying to read and\
    \ write the same data. Selecting the correct isolation level for a transaction\
    \ is extremely important in many business cases, especially those that require\
    \ consistency when reading the same data multiple times.\n\nSQL Server’s isolation\
    \ levels can be segmented into two basic classes: those in which readers are blocked\
    \ by writers, and those in which blocking of readers does not occur. The `READ\
    \ COMMITTED`, `REPEATABLE READ`, and `SERIALIZABLE` isolation levels are all in\
    \ this first category, whereas `READ UNCOMMITTED` and `SNAPSHOT` fall into the\
    \ latter group. A special subclass of the `SNAPSHOT` isolation level, `READ COMMITTED\
    \ SNAPSHOT`, is also included in this second, nonblocking class.\n\nAll transactions,\
    \ regardless of the isolation level used, take exclusive locks on data being updated.\n\
    \nTransaction isolation levels do not change the behavior of locks taken at write\
    \ time, but rather only those taken or honored by readers.\n\nIn order to see\
    \ how the isolation levels work, create a table that will be accessed by multiple\
    \ concurrent transactions. The following T-SQL creates a table called `Blocker`\
