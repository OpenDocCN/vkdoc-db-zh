    Although I’ve already noted the lack of basic exception handling and other constructs
    that would exist in a production version of this kind of code, it’s important
    to stress that the main missing piece is some form of a transaction. Should the
    withdrawal succeed, followed by an unsuccessful deposit, this code as-is would
    result in the funds effectively vanishing into thin air. Always make sure to carefully
    test whether your mission-critical code is atomic; either everything should succeed
    or nothing should. There is no room for in-between—especially when you’re dealing
    with people’s funds!


    Encapsulation


    Of the three topics discussed in this section, encapsulation is probably the most
    important for a database developer to understand. Look back at the more cohesive
    version of the TransferFunds method, and think about what the associated Withdraw
    method might look like—something like this, perhaps:


    bool Withdraw(Account AccountFrom, decimal Amount)


    {


    if (AccountFrom.Balance >= Amount)


    {


    AccountFrom.Balance -= Amount;


    return(true);


    }


    else


    return(false);


    }


    In this case, the Account class exposes a property called Balance, which the Withdraw
    method can manipulate. But what if an error existed in Withdraw, and some code
    path allowed Balance to be manipulated without first checking to make sure the
    funds existed? To avoid this situation, it should not have been made possible
    to set the value for Balance from the Withdraw method directly. Instead, the Account
    class should define its *own* Withdraw method. By doing so, the class would control
    its own data and rules internally—and not have to rely on any consumer to properly
    do so. The key objective here is to implement the logic exactly once and reuse
    it as many times as necessary, instead of unnecessarily recoding the logic wherever
    it needs to be used.


    Interfaces


    The only purpose of a module in an application is to do something at the request
    of a consumer (i.e., another module or system). For instance, a database system
    would be worthless if there were no way to store or retrieve data. Therefore,
    a system must expose **interfaces**, well-known methods and properties that other
    modules can use to make requests. A module’s interfaces are the gateway to its
    functionality, and these are the arbiters of what goes into or comes out of the
    module.


    Interface design is where the concepts of coupling and encapsulation really take
    on meaning. If an interface fails to encapsulate enough of the module’s internal
    design, consumers may have to rely upon some knowledge of the module, thereby
    tightly coupling the consumer to the module. In such a situation, any change to
    the module’s internal implementation may require a modification to the implementation
    of the consumer.


    CHAPTER 1 „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    Interfaces As Contracts


    An interface can be said to be a **contract** expressed between the module and
    its consumers. The contract states that if the consumer specifies a certain set
    of parameters to the interface, a certain set of values will be returned. Simplicity
    is usually the key here; avoid defining interfaces that change the number or type
    of values returned depending on the input. For instance, a stored procedure that
    returns additional columns if a user passes in a certain argument may be an example
    of a poorly designed interface.


    Many programming languages allow routines to define **explicit contracts**. This
    means that the input parameters are well defined, and the outputs are known at
    compile time. Unfortunately, T-SQL stored procedures in SQL Server only define
    inputs, and the procedure itself can dynamically change its defined outputs. In
    these cases, it is up to the developer to ensure that the expected outputs are
    well documented and that unit tests exist to validate them (see Chapter 3 for
    information on unit testing).Throughout this book, I refer to a contract enforced
    via documentation and testing as an **implied contract**.


    Interface Design


    Knowing how to measure successful interface design is a difficult question. Generally
    speaking, you should try to look at it from a maintenance point of view. If, in
    six months’ time, you were to completely rewrite the module for performance or
    other reasons, can you ensure that all inputs and outputs will remain the same?


    For example, consider the following stored procedure signature:


    CREATE PROCEDURE GetAllEmployeeData


    --Columns to order by, comma-delimited


    @OrderBy varchar(400) = NULL


    Assume that this stored procedure does exactly what its name implies—it returns
    all data from the Employees table, for every employee in the database. This stored
    procedure takes the @OrderBy parameter, which is defined (according to the comment)
    as “columns to order by,” with the additional prescription that the columns should
    be comma-delimited.


    The interface issues here are fairly significant. First of all, an interface should
    not only hide internal behavior, but also leave no question as to how a valid
    set of input arguments will alter the routine’s output. In this case, a consumer
    of this stored procedure might expect that, internally, the comma-delimited list
    will simply be appended to a dynamic SQL statement. Does that mean that changing
    the order of the column names within the list will change the outputs? And, are
    the ASC or DESC keywords acceptable? The contract defined by the interface is
    not specific enough to make that clear.


    Secondly, the consumer of this stored procedure must have a list of columns in
    the Employees table in order to know the valid values that may be passed in the
    comma-delimited list. Should the list of columns be hard-coded in the application,
    or retrieved in some other way? And, it is not clear if all of the columns of
    the table are valid inputs. What about a Photo column, defined as varbinary(max),
    which contains a JPEG image of the employee’s photo? Does it make sense to allow
    a consumer to specify that column for sorting?


    These kinds of interface issues can cause real problems from a maintenance point
    of view. Consider the amount of effort that would be required to simply change
    the name of a column in the Employees table, if three different applications were
    all using this stored procedure and had their own hard-coded lists of sortable
    column names. And what should happen if the query is initially implemented as
    dynamic SQL, but needs to be changed later to use static SQL in order to avoid
    recompilation costs? Will 6


    CHAPTER


    „ SOFTWARE DEVELOPMENT METHODOLOGIES FOR THE DATABASE WORLD


    it be possible to detect which applications assumed that the ASC and DESC keywords
    could be used, before they throw exceptions at runtime?'
