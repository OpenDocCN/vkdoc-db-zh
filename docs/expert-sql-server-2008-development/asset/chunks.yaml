    database_name encryption_state key_algorithm key_length


    tempdb Encrypted AES 256


    ExpertSqlEncryption Encrypted AES 128


    This demonstrates an important point: since tempdb is a shared system resource
    utilized by all user databases, if *any* user database on a SQL Server instance
    is encrypted with TDE, then the tempdb database must also be encrypted, as in
    this case.


    Disabling TDE is as simple as the process to enable it:


    ALTER DATABASE ExpertSqlEncryption


    SET ENCRYPTION OFF;


    GO


    Note that, even after TDE has been turned off all user databases, the tempdb database
    will remain encrypted until it is re-created, such as when the server is next
    restarted.


    „ **Note** For more information on the columns available in sys.dm_database_encryption_keys,
    please consult http://msdn.microsoft.com/en-us/library/bb677274.aspx.


    The benefits of TDE are as follows:


    •


    Data at rest is encrypted (well, not quite *all* data at rest; see the following
    section).


    If your primary goal is to prevent physical theft of your data, TDE ensures that


    your database files (including transaction logs and backups) cannot be stolen
    and


    restored onto another machine without the necessary DKM.


    •


    TDE can be applied to existing databases without requiring any application


    recoding. As a result, TDE can be applied in cases where it would not be viable
    to


    redesign existing production applications to incorporate cell-level encryption.


    •


    Performing encryption and decryption at the I/O level is efficient, and the overall


    impact on database performance is small. Microsoft estimates average


    performance degradation as a result of enabling TDE to be in the region of 3 to
    5


    percent.


