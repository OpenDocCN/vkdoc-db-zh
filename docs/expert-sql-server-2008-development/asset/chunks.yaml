    Overlapping Intervals


    The final benefit (or drawback, depending on what’s being modeled) of using both
    a start and end date for intervals that I’d like to discuss is the ability to
    work with overlapping intervals. Understanding how to work with overlaps is necessary
    either for performing overlap-related queries (“How many employees worked for
    the firm between August 2007 and September 2008?”) or for constraining in order
    to avoid overlaps, as is necessary in the single-employee example started in the
    previous section.


    To begin with, a bit of background on overlaps is necessary. Figure 11-4 shows
    the types of interval overlaps that are possible. Interval A is overlapped by
    each of the other intervals B through E, as follows:


    •


    Interval B starts within interval A and ends after interval A.


    •


    Interval C is the opposite, starting before interval A and ending within.


    •


    Interval D both starts and ends within interval A.


    •


    Finally, interval E both starts before and ends after interval A.


    *Figure 11-4\. The types of overlapping intervals*


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    Assuming that each interval has a StartTime property and an EndTime property,
    the relationships between each of the intervals B through E and interval A can
    be formalized in SQL-like syntax as follows: B.StartDate >= A.StartDate AND B.StartDate
    < A.EndDate AND B.EndDate > A.EndDate


    C.StartDate < A.StartDate AND C.EndDate > A.StartDate AND C.EndDate <= A.EndDate


    D.StartDate >= A.StartDate AND D.EndDate <= A.EndDate


    E.StartDate < A.StartDate AND E.EndDate > A.EndDate


    Substituting the name X for all intervals B through E, we can begin to create
    a generalized algorithm for detecting overlaps. Let us first consider the situations
    in which an interval X does *not* overlap interval A. This can happen in two cases:
    either X occurs entirely after interval A, or it is entirely before interval A—


    for example:


    X.StartDate > A.EndDate OR X.EndDate < A.StartDate


    If the preceding condition is true for cases where X does not overlap A, then
    the condition for an overlap must therefore be the complement of this—in other
    words:


    X.StartDate < A.EndDate AND X.EndDate > A.StartDate


    To rephrase this condition in English, we get “If X starts before A ends, and
    X ends after A starts, then X overlaps A.” This is illustrated in Figure 11-5.


    *Figure 11-5\. If X starts before A ends and X ends after A starts, the two intervals
    overlap.*


    Getting back to the EmploymentHistory table and its lack of proper constraints,
    it’s clear that the real issue at hand is that it is not constrained to avoid
    overlap. A single employee cannot have two titles simultaneously, and the only
    way to ensure that does not happen is to make sure each employee’s subintervals
    are unique.


    Unfortunately, this logic cannot be embedded in a constraint, since in order to
    determine whether a row overlaps another, all of the other rows in the set must
    be evaluated. The following query finds all overlapping rows for Jones in the
    EmploymentHistory table, using the final overlap expression: SELECT *


    FROM EmploymentHistory E1


    JOIN EmploymentHistory E2 ON


    E1.Employee = E2.Employee


    AND (


    E1.StartDate < COALESCE(E2.EndDate, ''99991231'')


    AND COALESCE(E1.EndDate, ''99991231'') > E2.StartDate)


    AND E1.StartDate <> E2.StartDate


    WHERE


    E1.Employee = ''Jones'';


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    Note that in order to avoid showing rows overlapping with themselves, the E1.StartDate
    <> E2.StartDate expression was added. Thanks to the primary key on the Employee
    and StartDate columns, we know that no two rows can share the same StartDate,
    so this does not affect the overlap logic. In addition, in the case of open-ended
    (NULL) EndDate values, the COALESCE statement is used to substitute the maximum
    possible date value. This avoids the possibility of inserting an interval starting
    in the future, while a current interval is still active.


    This logic must be evaluated every time an insert or update is done on the table,
    making sure that none of the rows resulting from the insert or update operation
    creates any overlaps. Since this logic can’t go into a constraint, there is only
    one possibility—a trigger. The trigger logic is fairly straightforward; instead
    of joining EmployeeHistory to itself, the base table will be joined to the inserted
    virtual table. The following T-SQL shows the trigger:


    CREATE TRIGGER No_Overlaps


    ON EmploymentHistory


    FOR UPDATE, INSERT


    AS


    BEGIN


    IF EXISTS


    (


    SELECT *


    FROM inserted i


    JOIN EmploymentHistory E2 ON


    i.Employee = E2.Employee


    AND (


    i.StartDate < COALESCE(E2.EndDate, ''99991231'')


    AND COALESCE(i.EndDate, ''99991231'') > E2.StartDate)


    AND i.StartDate <> E2.StartDate


    )


    BEGIN


    RAISERROR(''Overlapping interval inserted!'', 16, 1);


    ROLLBACK;


    END


    END;


    GO


    The final examples for this section deal with a common scenario in which you might
    want to


    investigate overlapping intervals: when monitoring performance of concurrent processes
    in a database scenario.


    To start setting up this example, load SQL Server Profiler, start a new trace,
    and connect to a test server. Uncheck all of the events except for SQL:BatchCompleted
    and leave the default columns selected.


    Begin the trace and then load the RML command prompt. Enter the following query:


    ostress -Q"SELECT * FROM sys.databases;" -q –n100 –r100


    The preceding code will perform 100 iterations of a query on 100 threads. The
    run should take approximately 1 minute and will produce 10,000 Profiler events—one
    per invocation of the query. When the ostress run has finished, return to Profiler
    and click File ~TRA Save As Trace Table, and save the data to the database in
    a new table called Overlap_Trace.


    Profiler trace tables include two StartTime and EndTime columns, both of which
    are populated for many of the events—including SQL:BatchCompleted and RPC:Completed.
    By treating these columns as an interval and working with some of the following
    query patterns, you can manipulate the data to do 360


    CHAPTER 11 „ WORKING WITH TEMPORAL DATA


    things such as correlate the number of concurrent queries with performance degradation
    of the database server.


    The first and most basic query is to find out which time intervals represented
    in the table had the most overlaps. In other words, during the runtime of a certain
    query, how many other queries were run?


    To answer this question, the intervals of every query in the table must be compared
    against the intervals of every other query in the table. The following T-SQL does
    this using the previously discussed overlap algorithm:


    SELECT


    O1.StartTime,


    O1.EndTime,


    COUNT(*)


    FROM Overlap_Trace O1


    JOIN Overlap_Trace O2 ON


    (O1.StartTime < O2.EndTime AND O1.EndTime > O2.StartTime)


    AND O1.SPID <> O2.SPID


    GROUP BY


    O1.StartTime,


    O1.EndTime


