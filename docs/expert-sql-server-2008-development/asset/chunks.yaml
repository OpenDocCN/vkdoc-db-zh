  raw: 'One plan is cached for the procedure itself, and one is cached for the invocation
    of the dynamic query with the @BusinessEntityID parameter. Invoking the query
    with a different combination of parameters will result in creation of more cached
    plans, because the resultant query text will be different. However, the maximum
    number of plans that can be cached for the stored procedure is five: one for the
    procedure itself and one for each possible combination of parameters.


    Performance Comparison


    Having considered the implications for maintenance and cache plan reuse, let’s
    now conduct some simple load testing to see how the three different approaches
    (static, EXECUTE, and sp_executesql) compare in terms of actual performance.


    CHAPTER 8 „ DYNAMIC T-SQL


    To begin, create a renamed version of the best-performing (but hardest-to-maintain)
    static SQL


    version of the stored procedure. Call it GetEmployeeData_Static:


    CREATE PROCEDURE GetEmployeeData_Static


    @BusinessEntityID int = NULL,


    @NationalIDNumber nvarchar(15) = NULL


    AS


    BEGIN


    SET NOCOUNT ON;


    IF (@BusinessEntityID IS NOT NULL AND @NationalIDNumber IS NOT NULL)


    BEGIN


    SELECT


    LoginID,


    JobTitle


    FROM HumanResources.Employee


    WHERE


    BusinessEntityID = @BusinessEntityID


    AND NationalIDNumber = @NationalIDNumber;


    END


    ELSE IF (@BusinessEntityID IS NOT NULL)


    BEGIN


    SELECT


    LoginID,


    JobTitle


    FROM HumanResources.Employee


    WHERE


    BusinessEntityID = @BusinessEntityID;


    END


    ELSE IF (@NationalIDNumber IS NOT NULL)


    BEGIN


    SELECT


    LoginID,


    JobTitle


    FROM HumanResources.Employee


    WHERE


    NationalIDNumber = @NationalIDNumber;


    END


    ELSE


    BEGIN


    SELECT


    LoginID,


    JobTitle


    FROM HumanResources.Employee;


    END


    END;


    GO


    CHAPTER 8 „ DYNAMIC T-SQL


    This version produces the best possible query plans, but of course has the issue
    of being very difficult to maintain. It also has no additional overhead associated
    with context switching, which may make it slightly faster than a dynamic SQL solution
    if the queries are very simple. For more complex queries that take longer to run,
    any context switching overhead will be overshadowed by the actual runtime of the
    query.


    To test the performance of the GetEmployeeData_Static stored procedure, we’ll
    call it from a simple C# application via ADO.NET. But first we need to obtain
    a set of values to supply for the


    @NationalIDNumber and @BusinessEntityID parameters. For each row in the HumanResources.Employee
    table, we’ll call the procedure with every combination of those two parameters:
    once supplying just the BusinessEntityID, once supplying just the NationalIDNumber,
    once supplying both, and once providing NULL for both parameters. There are 290
    rows in the HumanResources.Employee table, so this provides (290


    x 3) + 1 = 871 combinations. To increase the sample size, we’ll place the procedure
    call in a loop that will call every combination ten times—leading to 8,710 iterations
    of the query.


    The following code listing illustrates the C# code required to perform the test
    just described. It first fills a DataTable with the possible set of parameter
    values, and then steps through the rows of the table, calling the GetEmployeeData_static
    with each combination:


    SqlConnection sqlConn = new SqlConnection(


    "Data Source=localhost;


    Initial Catalog=AdventureWorks2008;


    Integrated Security=SSPI");


    sqlConn.Open();


    /* Grab every combination of parameters */


    SqlCommand cmd = new SqlCommand(@"


    SELECT BusinessEntityId, NationalIDNumber FROM HumanResources.Employee


    UNION ALL SELECT NULL, NationalIDNumber FROM HumanResources.Employee


    UNION ALL SELECT BusinessEntityId, NULL FROM HumanResources.Employee


    UNION ALL SELECT NULL, NULL", sqlConn);


    SqlDataAdapter da = new SqlDataAdapter();


    da.SelectCommand = cmd;


    DataTable dt = new DataTable();


    da.Fill(dt);


    for (int i = 0; i < 10; i++)


    {


    foreach (DataRow r in dt.Rows)


    {


    SqlCommand cmd2 = new SqlCommand("GetEmployeeData_static", sqlConn);


    cmd2.CommandType = CommandType.StoredProcedure;


    SqlParameter param = new SqlParameter("@BusinessEntityID", SqlDbType.Int);


    param.Value = r[0];


    cmd2.Parameters.Add(param);'
  trans: "# 第八章 动态 T-SQL\n\n## 性能比较\n\n在考虑了维护和计划缓存重用的影响之后，我们现在来进行一些简单的负载测试，看看三种不同方法（静态\
    \ SQL、`EXECUTE` 和 `sp_executesql`）在实际性能方面有何不同。\n\n首先，创建性能最佳（但最难维护）的存储过程的静态 SQL\
    \ 版本的重命名版本。将其命名为 `GetEmployeeData_Static`：\n\n```sql\nCREATE PROCEDURE GetEmployeeData_Static\n\
    \    @BusinessEntityID int = NULL,\n    @NationalIDNumber nvarchar(15) = NULL\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n\n    IF (@BusinessEntityID IS NOT NULL AND @NationalIDNumber\
    \ IS NOT NULL)\n    BEGIN\n        SELECT\n            LoginID,\n            JobTitle\n\
    \        FROM HumanResources.Employee\n        WHERE\n            BusinessEntityID\
    \ = @BusinessEntityID\n            AND NationalIDNumber = @NationalIDNumber;\n\
    \    END\n    ELSE IF (@BusinessEntityID IS NOT NULL)\n    BEGIN\n        SELECT\n\
    \            LoginID,\n            JobTitle\n        FROM HumanResources.Employee\n\
    \        WHERE\n            BusinessEntityID = @BusinessEntityID;\n    END\n \
    \   ELSE IF (@NationalIDNumber IS NOT NULL)\n    BEGIN\n        SELECT\n     \
    \       LoginID,\n            JobTitle\n        FROM HumanResources.Employee\n\
    \        WHERE\n            NationalIDNumber = @NationalIDNumber;\n    END\n \
    \   ELSE\n    BEGIN\n        SELECT\n            LoginID,\n            JobTitle\n\
    \        FROM HumanResources.Employee;\n    END\nEND;\nGO\n```\n\n这个版本能产生最佳的查询计划，但当然存在难以维护的问题。它也没有与上下文切换相关的额外开销，如果查询非常简单，这可能使其比动态\
    \ SQL 解决方案稍快。对于运行时间更长的更复杂查询，任何上下文切换开销都会被查询的实际运行时间所掩盖。\n\n为了测试 `GetEmployeeData_Static`\
    \ 存储过程的性能，我们将通过 ADO.NET 从一个简单的 C# 应用程序中调用它。但首先我们需要获取一组用于提供给 `@NationalIDNumber`\
    \ 和 `@BusinessEntityID` 参数的值。对于 `HumanResources.Employee` 表中的每一行，我们将使用这两个参数的每一种组合来调用该过程：一次只提供\
    \ `BusinessEntityID`，一次只提供 `NationalIDNumber`，一次同时提供两者，以及一次为两个参数都提供 `NULL`。`HumanResources.Employee`\
    \ 表中有 290 行，因此这提供了 `(290 x 3) + 1 = 871` 种组合。为了增加样本量，我们将把过程调用放在一个循环中，该循环将每种组合调用十次——从而产生\
    \ 8,710 次查询迭代。\n\n下面的代码清单说明了执行上述测试所需的 C# 代码。它首先用可能的参数值集合填充一个 `DataTable`，然后遍历该表的行，用每种组合调用\
    \ `GetEmployeeData_static`：\n\n```csharp\nSqlConnection sqlConn = new SqlConnection(\n\
    \    \"Data Source=localhost;Initial Catalog=AdventureWorks2008;Integrated Security=SSPI\"\
    );\nsqlConn.Open();\n\n/* Grab every combination of parameters */\nSqlCommand\
    \ cmd = new SqlCommand(@\"\n    SELECT BusinessEntityId, NationalIDNumber FROM\
    \ HumanResources.Employee\n    UNION ALL SELECT NULL, NationalIDNumber FROM HumanResources.Employee\n\
