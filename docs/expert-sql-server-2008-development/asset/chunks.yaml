    \ `PRINT` statement is not run, because the whole batch is discarded during the\
    \ parse phase. The output is the following exception message:\n\n```text\nMsg\
    \ 156, Level 15, State 1, Line 1\nIncorrect syntax near the keyword 'FROM'.\n\
    ```\n\nTo see the difference in behavior, the `SELECT` statement can be executed\
    \ as dynamic SQL using the `EXEC` function. This causes the `SELECT` statement\
    \ to execute in a different scope, changing the exception behavior from batch-like\
    \ to statement-like. Try running the following T-SQL to observe the change:\n\n\
    ```sql\nEXEC('SELECTxzy FROM SomeTable');\nPRINT 'This will print!';\nGO\n```\n\
    \nThe `PRINT` statement is now executed, even though the exception occurred:\n\
    \n```text\nMsg 156, Level 15, State 1, Line 1\nIncorrect syntax near the keyword\
    \ 'FROM'.\nThis will print!\n```"
