- fmt: "## CHAPTER 4: ERRORS AND EXCEPTIONS\n\ninclude various types of data corruption,\
    \ network, logging, and other critical errors. Virtually all of the exceptions\
    \ at this level are automatically logged.\n\nAlthough the error levels that make\
    \ up each range are individually documented in Books Online (http://msdn2.microsoft.com/en-us/library/ms164086.aspx),\
    \ this information is inconsistent or incorrect in many cases. For instance, according\
    \ to documentation, severity level 11 indicates errors where “the given object\
    \ or entity does not exist.” However, error 208, “Invalid object name,” is a level-16\
    \ exception. Many other errors have equally unpredictable levels, and it is recommended\
    \ that you do not program client software to rely on the error levels for handling\
    \ logic.\n\nIn addition to inconsistency regarding the relative severity of different\
    \ errors, there is, for the most part, no discernable pattern regarding the severity\
    \ level of an error and whether that error will behave on the statement or batch\
    \ level. For instance, both errors 245 (“Conversion failed”) and 515 (“Cannot\
    \ insert the value NULL . . . column does not allow nulls”) are level-16 exceptions.\
    \ However, 245 is a batch-level exception, whereas 515 acts at the statement level.\n\
    \n## Error State\n\nEach exception has a `State` tag, which contains information\
    \ about the exception that is used internally by SQL Server. The values that SQL\
    \ Server uses for this tag are not documented, so this tag is generally not helpful.\
    \ The following exception has a state of 1:\n\n```sql\nMsg 156, Level 15, State\
    \ 1, Line 1\nIncorrect syntax near the keyword 'FROM'.\n```\n\n## Additional Information\n\
    \nIn addition to the error number, level, and state, many errors also carry additional\
    \ information about the line number on which the exception occurred and the procedure\
    \ in which it occurred, if relevant. The following error message indicates that\
    \ an invalid object name was referenced on line 4 of the procedure `NonExistentTable`:\n\
    \n```sql\nMsg 208, Level 16, State 1, Procedure NonExistentTable, Line 4\nInvalid\
    \ object name 'SomeTable'.\n```\n\nIf an exception does not occur within a procedure,\
    \ the line number refers to the line in the batch in which the statement that\
    \ caused the exception was sent.\n\nBe careful not to confuse batches separated\
    \ with `GO` with a single batch. Consider the following TSQL:\n\n```sql\nSELECT\
    \ 1;\nGO\nSELECT 2;\nGO\nSELECT 1/0;\nGO\n```\n\nIn this case, although a divide-by-zero\
    \ exception occurs on line 5 of the code listing itself, the exception message\
    \ will report that the exception was encountered on line 1:\n\n```sql\n(1 row(s)\
    \ affected)\n(1 row(s) affected)\nMsg 8134, Level 16, State 1, Line 1\nDivide\
    \ by zero error encountered.\n```\n\nThe reason for the reset of the line number\
    \ is that `GO` is not actually a T-SQL command. `GO` is an identifier recognized\
    \ by SQL Server client tools (e.g., SQL Server Management Studio and `SQLCMD`)\
    \ that tells the client to separate the query into batches, sending each to SQL\
    \ Server one after another. This seemingly erroneous line number reported in the\
    \ previous example occurs because each batch is sent separately to the query engine.\
    \ SQL Server does not know that on the client (e.g., in SQL Server Management\
    \ Studio) these batches are all displayed together on the screen. As far as SQL\
    \ Server is concerned, these are three completely separate units of T-SQL that\
    \ happen to be sent on the same connection.\n\n## SQL Server’s `RAISERROR` Function\n\
    \nIn addition to the exceptions that SQL Server itself throws, users can raise\
    \ exceptions within T-SQL by using a function called `RAISERROR`. The general\
    \ form for this function is as follows:\n\n```sql\nRAISERROR ( { msg_id | msg_str\
    \ | @local_variable }\n    { ,severity ,state }\n    [ ,argument [ ,...n ] ] )\n\
    \    [ WITH option [ ,...n ] ]\n```\n\nThe first argument can be an ad hoc message\
    \ in the form of a string or variable, or a valid error number from the `message_id`\
    \ column of `sys.messages`. If a string is specified, it can include format designators\
    \ that can then be filled using the optional arguments specified at the end of\
    \ the function call."
