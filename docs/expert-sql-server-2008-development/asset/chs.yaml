  \n    This is shared information accessible to finance and marketing\n\n## 扩展混合模型\n\
  \n为了进一步扩展此示例，假设除了存储财务和营销之间共享的加密数据外，`Confidential`表还保存着只应授予财务用户访问权限的数据。使用此处描述的混合模型，这很容易实现——只需创建一个新的对称密钥，由现有的财务证书保护，并授予财务用户对该密钥的权限。\n\
