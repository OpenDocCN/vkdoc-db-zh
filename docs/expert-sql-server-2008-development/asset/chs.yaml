- "# 数据库编程中的防御性编程实践\n\n## 示例：创建与修改存储过程\n\n考虑以下存储过程 `Divide` 的代码清单，它描述了一个简单的用于将一个数字除以另一个数字的存储过程：\n\
  \n```sql\nCREATE PROCEDURE Divide (\n    @x decimal(18,2),\n    @y decimal(18,2)\n\
  )\nAS BEGIN\n    SELECT @x / @y\nEND;\nGO\n```\n\n根据上面的代码，如果例如 `@y` 的值为 `0`，就很容易引发异常。如果只是想阻止错误消息出现，可以在\
  \ `catch` 块中捕获（或“吞掉”）该异常，如下所示：\n\n```sql\nALTER PROCEDURE Divide (\n    @x decimal(18,2),\n\
  \    @y decimal(18,2)\n)\nAS BEGIN\n    BEGIN TRY\n        SELECT @x / @y\n    END\
  \ TRY\n    BEGIN CATCH\n        /* Do Nothing */\n    END CATCH\nend;\nGO\n```\n\
  \n然而，重要的是要意识到前面的代码清单并非防御性的——它没有做任何事情来防止异常情况的发生，其唯一效果是允许系统继续运行，假装什么坏事都没发生。像这样的**异常隐藏**非常危险，并且几乎无法确保应用程序的正确运行。防御性的方法应该是，在尝试执行除法之前，显式检查该操作成功所需的所有条件是否满足。这意味着要断言诸如确保为\
  \ `@x` 和 `@y` 提供了值（即它们不是 `NULL`）、`@y` 不等于零、所提供的值位于 `decimal(18,2)` 数据类型可以存储的范围内等等。\n\
  \n以下代码清单为同一过程提供了一种简化的防御性方法：\n\n```sql\nALTER PROCEDURE Divide (\n    @x decimal(18,2),\n\
  \    @y decimal(18,2)\n)\nAS BEGIN\n    IF @x IS NULL OR @y IS NULL\n    BEGIN\n\
  \        PRINT '请为 @x 和 @y 提供值';\n        RETURN;\n    END\n\n    IF @y = 0\n  \
  \  BEGIN\n        PRINT '@y 不能等于 0';\n        RETURN;\n    END\n\n    BEGIN TRY\n\
  \        SELECT @x / @y\n    END TRY\n    BEGIN CATCH\n        PRINT '发生了一个未处理的异常';\n\
  \    END CATCH\nEND;\nGO\n```\n\n对于前面的示例，每个断言都附带一条简单的 `PRINT` 语句，以通知过程执行所需的哪些条件失败了。在现实生活中，这些代码路径可能以多种方式处理此类断言——通常是记录错误、向用户报告消息，并在可能的情况下尝试继续系统操作。通过这样做，它们防止了与未预期异常相关的不可预测行为。\n\
  \n防御性编程可以与 **`快速失败`** 方法论形成对比，后者侧重于通过在异常发生时导致应用程序停止来立即识别遇到的任何错误。防御性方法并不主张敲响警钟和闪烁灯光，但这并不意味着它隐藏错误——它只是以更优雅的方式向最终用户报告错误，并在可能的情况下继续系统核心部分的运行。\n\
  \n## 为什么对数据库开发使用防御性方法？\n\n如前所述，防御性编程并非唯一可应用于数据库开发的软件开发方法论。其他常见方法包括 TDD、XP 和快速失败开发。那么，为什么我选择在本章乃至本书中专注于防御性编程呢？我相信防御性编程最适合数据库开发，原因如下：\n\
  \n**数据库应用程序的预期寿命往往比其他软件应用程序更长。** 虽然认为数据库专业人员是软件开发领域中谨慎、一丝不苟的人可能是一个被过度使用的刻板印象，但事实是数据库开发往往比其他技术更缓慢、更谨慎。例如，Web\
  \ 应用程序可能会为了利用当时流行的技术而每年修订和重新发布。相比之下，数据库开发往往是缓慢而稳定的，数据库应用程序可能保持多年有效而无需从技术角度更新。因此，更容易证明与防御性编程相关的更高前期开发成本是合理的。可靠性和抗缺陷的好处通常将享受更长的时间。\n\
  \n**用户（和管理层）对数据库应用程序中的缺陷容忍度更低。** 大多数最终用户已经习惯甚至预期桌面和 Web 软件中的缺陷。虽然这无疑会造成挫折感，但许多人习惯于在\
  \ Web 浏览器挂起或某些应用程序无法正常关闭时，通过按下 `ctrl+Alt+Delete` 来重置机器。然而，对个人桌面软件表现出的同样的容忍度通常不会扩展到企业数据库应用程序。最近一些广为人知的丑闻，其中几个政府和大型组织的系统中的缺陷被利用，进一步加剧了公众对任何可能对数据库完整性构成风险的事情的极端敏感性。\n\
  \n**数据库应用程序中存在的任何缺陷都可能比其他软件产生更严重的后果。** 可以说，人们更担心数据库缺陷而不是其他软件缺陷是绝对正确的。桌面应用程序中的意外错误可能导致文档或文件损坏，这很麻烦并可能导致不必要的返工。但数据库中的意外错误可能导致重要的个人、机密或敏感数据面临风险，这可能带来相当严重的后果。通常存储在数据库中的数据的性质要求采用一种谨慎、彻底的开发方法，例如防御性编程所提供的方法。\n\
  \n## 为长寿命而设计\n\n消费软件应用程序的预期保质期越来越短，压缩的发布周期使得一个版本刚刚上市，前一个版本几乎就要过时。然而，情况并非必须如此。设计良好、经过防御性编程的应用程序可以持续运行多年。在我工作过的一个组织中，创建了一个战术性的短期管理信息数据存储，以便在组织系统因合并而进行整合期间，基本的业务报告功能可以继续。尽管只需要在合并后的立即期间使用，但这个（不幸命名为）短期管理信息数据库继续被使用长达十年之久，因为它比后来尝试的替代品更可靠、更健壮。\n\
  \n这是一个教训：在为数据库选择描述性名称时，要选择不会随时间推移而过时的名称！\n\n## 最佳实践 SQL 编程技术\n\n了解了不同软件方法论背后的一些理论，特别是防御性编程方法后，您现在可能想知道如何将其付诸实践。与任何方法论一样，防御性编程更关注您在开发时应具备的思维方式，而不是规定一套明确的规则来遵循。因此，本节仅提供说明所涉及整体概念的示例，不应被视为详尽无遗的列表。我会尽量让每个案例中的实际示例尽可能简单，以便您可以集中精力理解我为什么认为这些是最佳实践，而不是代码本身。\n\
  \n### 识别代码中的隐藏假设\n\n\n\n"
- "# 防御性编程原则与数据库最佳实践\n\n防御性编程的核心原则之一，是识别出你的代码能正常运行的所有隐含假设。一旦这些假设被识别出来，就可以调整函数以消除对它们的依赖，或者明确地测试每个条件，并在条件不满足时做出预案。在某些情况下，“隐藏”的假设是由于代码不够明确而产生的。\n\
  \n为了说明这个概念，请看下面的代码清单，它创建并填充了 `Customers` 和 `Orders` 两个表：\n\n```sql\nCREATE TABLE\
  \ Customers(\n    CustID int,\n    Name varchar(32),\n    Address varchar(255));\n\
  INSERT INTO Customers(CustID, Name, Address) VALUES\n    (1, 'Bob Smith', 'Flat\
  \ 1, 27 Heigham Street'),\n    (2, 'Tony James', '87 Long Road');\nGO\n\nCREATE\
  \ TABLE Orders(\n    OrderID INT,\n    CustID INT,\n    OrderDate DATE);\nINSERT\
  \ INTO Orders(OrderID, CustID, OrderDate) VALUES\n    (1, 1, '2008-01-01'),\n  \
  \  (2, 1, '2008-03-04'),\n    (3, 2, '2008-03-07');\nGO\n```\n\n现在考虑以下查询，它从两个表中选取每个客户的订单列表：\n\
  \n```sql\nSELECT\n    Name,\n    Address,\n    OrderID\nFROM\n    Customers c\n\
  \    JOIN Orders o ON c.CustID = o.CustID;\nGO\n```\n\n查询成功执行，我们得到了预期的结果：\n\n```\n\
  Bob Smith Flat 1, 27 Heigham Street 1\nBob Smith Flat 1, 27 Heigham Street 2\nTony\
  \ James 87 Long Road 3\n```\n\n但隐藏的假设是什么？`SELECT` 查询中列出的列名没有用表名限定。如果将来表结构发生变化会怎样？假设向\
  \ `Orders` 表添加了一个 `Address` 列，以便为每个订单附加一个单独的送货地址，而不是依赖于 `Customers` 表中的地址：\n\n```sql\n\
  ALTER TABLE Orders ADD Address varchar(255);\nGO\n```\n\n现在，`SELECT` 查询中未限定的列名 `Address`\
  \ 变得具有歧义。如果我们尝试再次运行原始查询，将会收到一个错误：\n\n```\nMsg 209, Level 16, State 1, Line 1\nAmbiguous\
  \ column name 'Address'.\n```\n\n由于没有识别并纠正原始代码中包含的隐藏假设，当向 `Orders` 表添加新列后，查询就中断了。一个可以防止此错误的简单做法是确保所有列名都带有适当的表名或别名前缀：\n\
  \n```sql\nSELECT\n    c.Name,\n    c.Address,\n    o.OrderID\nFROM\n    Customers\
  \ c\n    JOIN Orders o ON c.CustID = o.CustID;\nGO\n```\n\n在上面的例子中，发现隐藏假设相当容易，因为\
  \ SQL Server 给出了描述性的错误信息，使任何开发人员都能快速定位并修复损坏的代码。然而，有时你可能就没那么幸运了，如下例所示。\n\n假设你有一个\
  \ `MainData` 表，包含一些简单的值，如下面的代码清单所示：\n\n```sql\nCREATE TABLE MainData(\n    ID int,\n\
  \    Value char(3));\nGO\n\nINSERT INTO MainData(ID, Value) VALUES\n    (1, 'abc'),\
  \ (2, 'def'), (3, 'ghi'), (4, 'jkl');\nGO\n```\n\n现在假设对 `MainData` 表的每一次更改都要记录在关联的\
  \ `ChangeLog` 表中。以下代码演示了这种结构，以及一个通过附加在 `MainData` 表上的 `UPDATE` 触发器自动填充 `ChangeLog`\
  \ 表的机制：\n\n```sql\nCREATE TABLE ChangeLog(\n    ChangeID int IDENTITY(1,1),\n  \
  \  RowID int,\n    OldValue char(3),\n    NewValue char(3),\n    ChangeDate datetime);\n\
  GO\n\nCREATE TRIGGER DataUpdate ON MainData\nFOR UPDATE\nAS\n    DECLARE @ID int;\n\
  \    SELECT @ID = ID FROM INSERTED;\n\n    DECLARE @OldValue varchar(32);\n    SELECT\
  \ @OldValue = Value FROM DELETED;\n\n    DECLARE @NewValue varchar(32);\n    SELECT\
  \ @NewValue = Value FROM INSERTED;\n\n    INSERT INTO ChangeLog(RowID, OldValue,\
  \ NewValue, ChangeDate)\n        VALUES(@ID, @OldValue, @NewValue, GetDate());\n\
  GO\n```\n\n我们可以通过对 `MainData` 表运行一个简单的 `UPDATE` 查询来测试触发器：\n\n```sql\nUPDATE MainData\
  \ SET Value = 'aaa' WHERE ID = 1;\nGO\n```\n\n\n"
- "# 第 2 章：数据库编程最佳实践\n\n该查询似乎运行正确——`SQL Server Management Studio` 报告如下：`(1 row(s)\
  \ affected)`\n\n`(1 row(s) affected)`\n\n并且，正如预期的那样，我们发现 `MainData` 表中有一行已被更新：\n\
  \n| ID | Value |\n|----|-------|\n| 1  | aaa   |\n| 2  | def   |\n| 3  | ghi   |\n\
  | 4  | jkl   |\n\n同时在 `ChangeLog` 表中创建了一条关联记录：\n\n| ChangeID | RowID | OldValue\
  \ | NewValue | ChangeDate               |\n|----------|-------|----------|----------|--------------------------|\n\
  | 1        | 1     | abc      | aaa      | 2009-06-15 14:11:09.770 |\n\n然而，再次强调，代码中存在一个隐藏的假设。在触发器逻辑中，变量\
  \ `@ID`、`@OldValue` 和 `@NewValue` 被赋值，这些值将插入到 `ChangeLog` 表中。\n\n显然，这些标量变量中的每一个都只能被赋予一个值，那么如果你试图在单条语句中更新两行或多行数据会发生什么？\n\
  \n```sql\nUPDATE MainData SET Value = 'zzz' WHERE ID IN (2,3,4);\nGO\n```\n\n如果你还没有想明白，也许\
  \ `SQL Server Management Studio` 报告的消息会给你一些关于结果的线索：\n\n`(1 row(s) affected)`\n\n\
  `(3 row(s) affected)`\n\n此案例的结果是，受 `UPDATE` 语句影响的所有三行数据在 `MainData` 表中都已被更改：\n\n\
  | ID | Value |\n|----|-------|\n| 1  | aaa   |\n| 2  | zzz   |\n| 3  | zzz   |\n\
  | 4  | zzz   |\n\n但只有第一次更新被记录了下来：\n\n| ChangeID | RowID | OldValue | NewValue |\
  \ ChangeDate               |\n|----------|-------|----------|----------|--------------------------|\n\
  | 1        | 1     | abc      | aaa      | 2009-06-15 14:11:09.770 |\n| 2      \
  \  | 2     | def      | zzz      | 2009-06-15 15:18:11.007 |\n\n未能预见到单条语句更新多行的可能性，导致了这次静默的失败，这比前一个示例中的明显错误要危险得多。如果当初积极考虑过这种场景，通过对触发器语法稍作修改，就能轻松地重新编写过程来处理此类事件，如下所示：\n\
  \n```sql\nALTER TRIGGER DataUpdate ON MainData\nFOR UPDATE\nAS\nINSERT INTO ChangeLog(RowID,\
  \ OldValue, NewValue, ChangeDate)\nSELECT i.ID, d.Value, i.Value, GetDate()\nFROM\
  \ INSERTED i JOIN DELETED d ON i.ID = d.ID;\nGO\n```\n\n### 不要走捷径\n\n如果我们认为捷径可以让我们避免做一些觉得不必要的工作，那么想走捷径是人的天性。在编程方面，常常存在一些捷径，它们提供了一种方便、简洁的方法，用比其他更标准的方法更少的代码行数来完成特定任务。然而，这些快捷方法可能伴随着相关风险。最常见的是，快捷方法需要更少的代码，是因为它们依赖于某些假定的默认值，而不是过程中明确声明的值。因此，它们只能应用于那些默认值所施加的条件成立的情况。\n\
  \n通过依赖默认值，快捷方法可能会增加代码的僵化性，并引入外部依赖——默认值可能因服务器配置而异，或在不同版本的 `SQL Server` 之间发生变化。因此，走捷径会降低代码的可移植性，并引入一些未来可能失效的假设。\n\
  \n为了说明这一点，考虑一下当你在不显式声明合适数据长度的情况下将值 `CAST`（转换）为 `varchar` 数据类型时会发生什么：\n\n```sql\n\
  SELECT CAST ('This example seems to work ok' AS varchar);\nGO\n```\n\n该查询似乎正确运行，并产生以下输出：\n\
  \n```\nThis example seems to work ok\n```\n\n在一些开发者中，似乎存在一个常见的误解，即省略作为 `CAST` 操作目标的\
  \ `varchar` 类型的长度，会导致 `SQL Server` 动态分配一个足以容纳输入字符串所有字符的长度。然而，事实并非如此，如下面的代码清单所示：\n\
  \n```sql\nSELECT CAST ('This demonstrates the problem of relying on default datatype\
  \ length'\nAS varchar);\nGO\n```\n\n```\nThis demonstrates the problem\n```\n\n\
  如果没有显式指定，在 `CAST` 为字符数据类型时，`SQL Server` 默认长度为 30 个字符。在第二个示例中，输入字符串被静默截断为 30 个字符，即使代码中没有明显的迹象表明这一点。如果这是有意为之，那么明确声明为\
  \ `varchar(30)` 以突出显示这是计划内的截断，会比简单地省略数据长度清晰得多。\n\n有时会走的另一个捷径的例子是依赖数据类型之间的隐式 `CAST`。考虑下面的代码清单：\n\
  \n```sql\nDECLARE\n    @x int = 5,\n    @y int = 9,\n    @Rate decimal(18,2);\n\n\
  SET @Rate = 1.9 * @x / @y;\nSELECT 1000 * @Rate;\nGO\n```\n\n在此示例中，`@Rate` 是一个乘数因子，其值由两个参数\
  \ `@x` 和 `@y` 的比率乘以硬编码的比例因子 1.9 来确定。当应用于值 1000 时，如本例所示，结果如下：\n\n现在假设管理层决定更改用于确定\
  \ `@Rate` 的计算方法，并将比例因子从 1.9 增加到 2。一个明显（但不正确）的解决方案是按如下方式修改代码：\n\n```sql\nDECLARE\n\
  \    @x int = 5,\n    @y int = 9,\n    @Rate decimal(18,2);\n\nSET @Rate = 2 * @x\
  \ / @y;\nSELECT 1000 * @Rate;\nGO\n```\n\n这个变更并未按预期提高比率，实际上反而抵消了将任何比率应用于提供的值 1000\
  \ 的效果。现在的问题是，用于确定 `@Rate` 的求和是一个纯粹的整数计算，即 `2 * 5 / 9`。在整数运算中，这等于 1。在前面的例子中，硬编码的值\
  \ 1.9 导致 `@x` 和 `@y` 参数都隐式转换为 decimal 类型，因此求和是以十进制精度计算的。\n\n单独来看，这个例子可能显得微不足道，但当深嵌在某些复杂代码的核心部分时，它可能成为意外行为和不必要的漏洞追踪的来源。为了避免这些复杂情况，最好始终明确声明计算中使用的任何参数的类型和精度，并避免它们之间的隐式\
  \ `CAST`。\n\n使用快捷方式的另一个问题是它们可能会模糊开发者编写代码的意图。如果我们无法理解一行代码的目的是什么，就很难测试它是否达到了预期目的。考虑下面的代码清单：\n\
  \n```sql\nDECLARE @Date datetime = '03/05/1979';\nSELECT @Date + 365;\n```\n\n乍一看，这似乎相当无害：取一个特定日期并加上\
  \ 365。但实际上这里使用了几个快捷方式，给这段代码的预期目的带来了歧义：\n\n第一个快捷方式是从字符串值 `'03/05/1979'` 到 `datetime`\
  \ 的隐式 `CAST`。我相信你知道，世界各地有多种呈现日期格式的方式，`03/05/1979` 是有歧义的。在英国，它表示 5 月 3 日，但对于美国读者来说，它表示\
  \ 3 月 5 日。隐式转换的结果将取决于执行该函数的服务器的区域设置。\n\n即使解决了 `dd/mm/yyyy` 或 `mm/dd/yyyy` 的顺序问题，输入值仍然存在歧义。选择的数据类型是\
  \ `datetime`，它存储日期和时间两部分，但赋给 `@Date` 的值没有指定时间，因此这段代码依赖于 `SQL Server` 的默认值午夜：`00:00:00`。然而，也许开发者的意图不是指定一个时间点，而是整个日历日。如果是这样，是否应该使用\
  \ `date` 数据类型来指定原始的 `@Date` 参数？还有 `SELECT` 查询的结果——它是否也应该是 `date` 类型？\n\n最后，代码指定了整数\
  \ `365` 与 `datetime` 值的加法。当应用于日期值时，`+` 运算符会增加给定的天数，因此这似乎是使用 `DATEADD` 方法来增加 365\
  \ 天的一个快捷方式。但是，\n\n\n是*this*一个添加 1 年的捷径？如果是的话，这是另一个依赖于假设的捷径示例——在这种情况下，假设是该年有 365\
  \ 天。\n\n这些因素的结合意味着，这行简单代码的真实意图尚不明确：\n\n```sql\nSELECT DATEADD(DAY, 365, '1979-03-05');\n\
  ```\n\n这会导致以下结果：\n\n```\n1980-03-04 00:00:00.000\n```\n\n还是说，这段代码是以下内容的简写：\n\n```sql\n\
  SELECT CAST(DATEADD(YEAR, 1, '1979-05-03') AS date);\n```\n\n这会导致一个相当不同的输出：\n\n\
  ```\n1980-05-03\n```\n\n> **注意**：关于时序数据相关问题的进一步讨论，请参阅第 11 章。\n\n或许最广为人知的捷径方法示例是使用`SELECT\
  \ *`来从表中检索所有列的数据，而不是按名称列出各个列。正如本章的第一个例子所示，这里的风险在于，未来对表结构的任何更改都将导致此查询返回的结果集结构`静默地`发生变化。往好了说，这可能导致检索到的数据列从未被使用，从而导致效率低下。往坏了说，这可能导致非常严重的错误（试想一下，如果结果中的数据列被发送到另一个按索引位置而非列名引用它们的函数时会发生什么，或者两个集合的列数和类型不匹配导致任何`UNION`查询失败的可能性）。还有很多其他原因应避免使用`SELECT\
  \ *`，例如添加不必要的行到查询中会排除使用覆盖索引的可能性，这可能导致查询性能大幅下降。\n\n### 测试\n\n防御性实践非常强调在整个开发过程中测试和代码审查的重要性。为了防御可能在实际生产环境中发生的情况，应用程序应在它将在现实世界中经历的相同条件下进行测试。事实上，防御性编程建议应在极端条件下进行测试（**压力测试**）——如果你能构建一个健壮、高性能的应用程序来应对严峻压力，那么你就可以更确定它能应对正常需求。除了性能测试，还有功能测试和单元测试需要考虑，它们确保应用程序的每个部分都按照其契约按预期行为，并执行正确的功能。这些测试将在下一章中更详细地讨论。\n\
  \n在测试应用程序时，考虑测试所基于的样本数据非常重要。你不应该人为地清洗将用于测试代码的数据，或依赖人为生成的数据。如果应用程序需要在生产数据上运行，那么就应该在具有代表性的数据上进行测试，包括其缺陷。这样做将确保应用程序能够应对所有应用程序中典型的不完美数据——缺失或不完整的值、格式错误的字符串、`NULL`等等。随机抽样方法可用于确保测试数据代表整体数据集的公平样本，但防御性测试确保应用程序针对极端边缘情况进行测试也很重要，因为正是这些异常情况可能导致异常。\n\
  \n即使创建测试数据是为了确保对真实世界数据的统计学公平代表，并且经过精心选择以包含边缘情况，但仅在相对少量的测试数据上进行测试时，应用程序能保证多大程度的防御性，仍然存在固有问题。某些特殊情况只会在全规模环境中出现。性能影响是一个明显的例子：如果你只基于几千行数据进行性能测试，那么当应用程序在实际环境中面对数百万行数据而无法运行时，请不要惊讶（你会惊讶于我曾见过多少次应用程序仅基于在数据规模急剧缩减的情况下进行的性能测试就签署通过了）。你也不应简单地假设应用程序的性能会随着涉及的数据行数而可预测地扩展。通过精心的查询设计和良好调整的索引，一些应用程序可能在大型数据集上扩展良好。然而，其他应用程序的性能可能会呈指数级下降（例如在使用表之间的`CROSS\
  \ JOIN`创建笛卡尔积时）。防御性测试不仅应考虑应用程序当前预期使用的数据量，还应考虑预期的未来增长因素。\n\n测试时的另一个考虑因素是多个用户对系统的影响。有许多功能在单独测试时，被证明能以一致的、可重复的方式通过。然而，在存在并发性的情况下——即对数据库同一资源的多个请求——这些相同的测试可能会失败。为了演示这一点，以下代码清单创建了一个简单的表，包含两个整数列`x`和`y`，以及一个`rowversion`列`v`。\n\
  \n```sql\nCREATE TABLE XandY (\n    x int,\n    y int,\n    v rowversion);\n\nINSERT\
  \ INTO XandY (x, y) VALUES (0, 0);\nGO\n```\n\n以下代码执行一个循环，从`XandY`表中读取当前值，将`x`的值增加\
  \ 1，然后将新值写回表中。循环设置为运行 100,000 次，并且仅当`rowversion`列`v`自上次读取以来未更改时，循环计数器才会增加。\n\n```sql\n\
  SET NOCOUNT ON;\nDECLARE\n    @x int,\n    @y int,\n    @v rowversion,\n    @success\
  \ int = 0;\n\nWHILE @success < 100000\nBEGIN\n    -- Retrieve existing values\n\
  \    SELECT\n        @x = x,\n        @y = y,\n        @v = v\n    FROM XandY\n\n\
  \    -- Increase x by 1\n    SET @x = @x + 1;\n\n    SET TRANSACTION ISOLATION LEVEL\
  \ READ COMMITTED;\n    BEGIN TRANSACTION\n    IF EXISTS(SELECT 1 FROM XandY WHERE\
  \ v = @v)\n    BEGIN\n        UPDATE XandY\n        SET\n            x = @x,\n \
  \           y = @y\n        WHERE v = @v;\n\n        SET @success = @success + 1;\n\
  \    END\n    COMMIT;\nEND\nGO\n```\n\n执行此代码后，正如您所预期的那样，`x`列的值增加到 100,000：\n\n```\n\
  x         y         v\n100000    0         0x00000000001EA0B9\n```\n\n现在，让我们尝试在并发情况下运行相同的查询。首先，让我们将表重置为初始值，如下所示：\n\
  \n```sql\nUPDATE XandY SET x = 0;\nGO\n```\n\n现在，在 SQL Server Management Studio\
  \ 中打开一个新查询并输入以下代码：\n\n```sql\nSET NOCOUNT ON;\nDECLARE\n    @x int,\n    @y int,\n\
  \    @v rowversion,\n    @success int = 0;\n\nWHILE @success < 100000\nBEGIN\n \
  \   -- Retrieve existing values\n    SELECT\n        @x = x,\n        @y = y,\n\
  \        @v = v\n    FROM XandY\n\n    -- Increase y by 1\n    SET @y = @y + 1;\n\
  \n    SET TRANSACTION ISOLATION LEVEL READ COMMITTED;\n    BEGIN TRANSACTION\n \
  \   IF EXISTS(SELECT 1 FROM XandY WHERE v = @v)\n    BEGIN\n        UPDATE XandY\n\
  \        SET\n            x = @x,\n            y = @y\n        WHERE v = @v;\n\n\
  \        SET @success = @success + 1;\n    END\n    COMMIT;\nEND\nGO\n```\n\n这第二个查询在除了一点外的所有方面都与第一个查询相同：它不是将`@x`的值增加\
  \ 1，而是将`@y`的值增加 1。然后，像之前一样，将两个值都写回表中。\n\n\n\n因此，如果我们运行这两个查询，我们期望 `x` 和 `y` 的值都会是\
  \ 100,000，对吗？为了找出答案，我们先执行第一个查询，它会更新 `x` 的值。在它仍在执行时，执行第二个脚本，它会更新 `y` 的值。几分钟后，当两个查询都完成后，在我的笔记本电脑上检查\
  \ `XandY` 表的内容，得到如下结果：\n\n```\nx y v\n\n99899 99019 0x000000000021ACCC\n```\n\n\
  尽管这些查询显然通过（在提交更新前测试 `@rowversion` 的值是否保持不变）包含了一定程度的并发处理能力，但在存在其他并发查询的环境中进行测试时，它们未能按预期方式运行。关于为何会发生这种情况的解释，以及处理此类情况的方法，将在第\
  \ 9 章中阐述。\n\n### 代码审查\n\n测试通常是一个自动化过程，而代码审查则是由人主导的活动，涉及同行小组手动审查应用程序背后的代码。自动化测试和人工代码审查这两种活动是相辅相成的，能够发现代码改进的不同方面。自动化测试套件可以非常轻松地检查例程在给定数量的测试场景中是否产生了正确的输出，但要让它们明确断言一个例程是以最健壮或最高效的方式编码的、应用了正确的逻辑、或编码标准遵循了最佳实践，则非常困难。在这些情况下，代码审查是更有效的方法。\n\
  \n请考虑以下代码清单，它展示了一个用于测试给定电子邮件地址是否有效的 T-SQL 函数：\n\n```sql\nDECLARE @email_address\
  \ varchar(255);\n\nIF (\n\n    CHARINDEX(' ',LTRIM(RTRIM(@email_address))) = 0\n\
  \n    AND LEFT(LTRIM(@email_address),1) <> '@'\n\n    AND RIGHT(RTRIM(@email_address),1)\
  \ <> '.'\n\n    AND CHARINDEX('.',@email_address ,CHARINDEX('@',@email_address))\
  \ -\n\n        CHARINDEX('@',@email_address ) > 1\n\n    AND LEN(LTRIM(RTRIM(@email_address\
  \ ))) -\n\n        LEN(REPLACE(LTRIM(RTRIM(@email_address)),'@','')) = 1\n\n   \
  \ AND CHARINDEX('.',REVERSE(LTRIM(RTRIM(@email_address)))) >= 3\n\n    AND (CHARINDEX('.@',@email_address\
  \ ) = 0 AND CHARINDEX('..',@email_address ) = 0)\n\n)\n\nPRINT 'The supplied email\
  \ address is valid';\n\nELSE\n\nPRINT 'The supplied email address is not valid';\n\
  ```\n\n这段代码很可能通过功能测试，表明根据提供的一组测试电子邮件地址，该函数能正确识别所提供的电子邮件地址格式是否有效。\n\n然而，在代码审查过程中，有经验的开发人员查看这段代码后可能会指出，使用\
  \ .NET 基础类库提供的正则表达式方法，例如下面这样，可以更好地实现为一个用户定义函数：\n\n```sql\nSELECT dbo.RegExMatch('\\\
  b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,4}\\b', @email_address);\n```\n\n请注意，此示例假设您已注册了一个名为\
  \ `RegExMatch` 的函数，该函数实现了 .NET `System.Text.RegularExpressions.Regex` 类的 `Match`\
  \ 方法。虽然两种方法都能达到相同的最终结果，但以这种方式重写代码创建了一个更高效、更易于维护的例程，并且还促进了可重用性，因为建议的 `RegExMatch`\
  \ 函数可用于匹配其他场景中的正则表达式模式，例如检查电话号码是否有效。\n\n具有挑战性且开放的代码审查对提高软件代码质量有显著效果，但它可能是一项成本高昂的工作，而且并非所有情况都需要对整个应用程序进行彻底的代码审查所需付出的努力。封装良好的代码的优势之一在于，可以从应用程序的其余部分中分离出最有可能从该活动中受益的模块，并进行单独审查。\n\
  \n### 验证所有输入\n\n防御性编程建议你永远不要信任任何外部输入——不要对其类型（例如字母或数字）、长度、内容甚至其存在做出假设！这些规则不仅适用于从应用程序\
  \ UI 或网页发送的用户输入，也适用于应用程序所依赖的任何外部文件或网络资源。\n\n良好的防御姿态是假设所有输入都是无效的并可能导致异常情况，除非被证明是安全的。有多种技术可用于确保输入是有效且安全的：\n\
  \n*   数据可以被“调整”。例如，不良字符可以被替换或转义。然而，准确识别需要处理的数据以及知道处理它的最佳方式存在一些困难。静默修改输入会影响数据完整性，通常不推荐，除非无法避免。\n\
  *   数据可以对照潜在危险输入的“黑名单”进行检查，如果发现包含已知的不良项目，则拒绝。例如，输入不应允许包含 SQL 关键字，如 `DELETE` 或 `DROP`，或包含非字母数字字符。\n\
  *   仅当输入完全由允许内容的“白名单”指定的内容组成时，才接受输入。从 UI 的角度来看，你可以认为这等同于允许用户仅从预定义的下拉列表中选择值，而不是在自由文本框中输入。可以说这是最安全的方法，但也是最僵化的方法，并且限制性太强，无法在许多实际应用中使用。\n\
  \n所有这些方法都容易出现缺陷。例如，假设你使用 `ISNUMERIC()` 函数来测试用户输入是否仅包含数值。你可能期望以下代码会拒绝输入：\n\n```sql\n\
  DECLARE @Input varchar(32) = '10E2';\n\nSELECT ISNUMERIC(@Input);\n```\n\n大多数异常情况是由于未预见到的但本质上是良性的环境导致的。然而，在处理用户输入时，你应始终意识到可能存在蓄意、恶意的攻击，这些攻击旨在利用未得到彻底防御的系统中暴露出的任何弱点。或许最广为人知的防御性编程技术涉及防止\
  \ SQL 注入攻击。也就是说，当用户故意尝试将恶意代码作为提供给应用程序的用户输入的一部分插入并执行时。\n\nSQL 注入攻击通常利用实现不当的函数，这些函数基于未经验证的用户输入构建并执行动态\
  \ SQL。考虑以下示例：\n\n```sql\nCREATE PROCEDURE Hackable\n    @Input varchar(32)\nAS BEGIN\n\
  \    DECLARE @sql varchar(256) = 'SELECT status FROM sys.sysusers WHERE name = '''\
  \ + @Input + '''';\n    EXECUTE(@sql);\nEND\n```\n\n这段代码的预期目的相当直接——它返回参数 `@Input`\
  \ 中提供的用户的状态。因此，可以按如下方式使用它来查找用户 John 的状态：\n\n```sql\nEXEC Hackable 'John';\nGO\n\
  ```\n\n但是，如果用户输入的不是值 `John`，而是输入了 `'public'' or 1=1 --'`，如下所示？\n\n```sql\nEXEC Hackable\
  \ @Input='public'' or 1=1 --';\nGO\n```\n\n这将导致生成如下 SQL 语句：\n\n```sql\nSELECT status\
  \ FROM sys.sysusers WHERE name = 'public' OR 1 = 1;\n```\n\n附加到查询末尾的条件 `OR 1 = 1`\
  \ 将始终评估为真，因此效果将是使查询列出 `sys.sysusers` 表中的每一行。\n\n尽管这是一个简单且众所周知的弱点，但它仍然惊人地普遍。防范此类明显的安全漏洞很容易实现，第\
  \ 6 章将讨论各种相关技术。\n\n## 让代码面向未来\n\n\n\n"
- "# 数据库编程的最佳实践\n\n为了防止出现错误的风险，确保任何防御性代码都遵循最新标准是合理的。虽然无法保证代码始终保持弹性，但你应该养成一个习惯：重写任何依赖已弃用功能的旧代码，并且在新开发中不使用任何已弃用功能，以减少未来发生异常的可能性。\n\
  \n已弃用功能指的是那些虽然当前仍在使用，但已被替代品取代的功能。虽然它们可能仍然可用（以确保向后兼容性），但你不应该使用已知已弃用的功能来开发应用程序。考虑以下代码清单：\n\
  \n```sql\nCREATE TABLE ExpertSqlServerDevelopment.dbo.Deprecated (\n    EmployeeID\
  \ int DEFAULT 0,\n    Forename varchar(32) DEFAULT '',\n    Surname varchar(32)\
  \ DEFAULT '',\n    Photo image NULL\n);\n\nCREATE INDEX ixDeprecated ON Deprecated(EmployeeID);\n\
  \nDROP INDEX Deprecated.ixDeprecated;\n\nINSERT INTO ExpertSqlServerDevelopment.dbo.Deprecated\
  \ (\n    EmployeeID, Forename, Surname, Photo) VALUES\n    (1, 'Bob', 'Smith', DEFAULT),\n\
  \    (2, 'Benny', 'Jackson', DEFAULT)\n\nSET ROWCOUNT 1;\n\nSELECT 'Name' = ForeName\
  \ + ' ' + Surname\nFROM ExpertSqlServerDevelopment.dbo.Deprecated\nORDER BY ExpertSqlServerDevelopment.dbo.Deprecated.EmployeeID\n\
  \nSET ROWCOUNT 0;\n```\n\n这个查询在 SQL Server 2008 中按预期工作，但使用了许多应该避免的已弃用功能。幸运的是，发现已弃用功能的使用很容易——`sys.dm_os_performance_counters`\
  \ 动态管理视图（DMV）会维护每个已弃用功能被使用时的计数，可以通过以下方式查询：\n\n```sql\nSELECT\n    object_name,\n\
  \    instance_name,\n    cntr_value\nFROM sys.dm_os_performance_counters\nWHERE\n\
  \    object_name = 'SQLServer:Deprecated Features'\n    AND cntr_value > 0;\n```\n\
  \n一个相关的，或许更严重的，对防御性应用程序的威胁是依赖未记录功能的代码。SQL Server 中存在许多此类功能——例如，以下代码清单演示了未记录的 `sp_MSForEachTable`\
  \ 存储过程，它可用于对数据库中的每个表执行提供的查询。\n\n```sql\nEXEC sp_MSforeachtable \"EXEC sp_spaceused\
  \ '?'\";\n```\n\n虽然可以肯定已弃用功能将在未来的某个时间点被移除，但这个时间尺度通常是已知的，并且通常有一个记录的升级路径，以确保任何先前由已弃用功能提供的功能将被替代方法所取代。相比之下，未记录功能可能在任何时间无警告地中断，并且可能没有明确的升级路径。我强烈建议你避免这种冒险（并且几乎总是不必要的）做法。\n\
  \n## 限制暴露面\n\n如果防御性编程旨在确保应用程序能够应对异常事件的发生，那么一个基本的防御技术就是限制此类事件可能发生的数量。从逻辑上讲，异常只能发生在正在运行的功能中，因此不要安装超过必要的功能——通过减少应用程序的受攻击面，你可以限制对潜在攻击的暴露。当\
  \ `SAFE` 可以满足时，不要授予程序集 `EXTERNAL_ACCESS` 权限。除非它们增加价值或应用程序严格需要，否则不要启用诸如数据库邮件之类的功能。\n\
  \n所有用户都应经过身份验证，并且仅被授权访问所需的资源，且仅在需要的时间段内。应立即删除未使用的账户，并撤销不必要的权限。这样做可以减少系统被攻击破坏的机会，这将在第\
  \ 5 章中更详细地讨论。\n\n如果系统的安全性受到破坏，采用加密可能有助于限制造成的损害。不同的加密方法将在第 6 章中讨论。\n\n## 践行良好编码规范\n\
  \n良好的编码规范——我指的是诸如清晰注释、一致布局和良好命名变量等实践——应被视为任何软件开发方法的重要组成部分，而不仅仅与防御性编程相关。我选择在这里包含它，部分是因为我认为它如此重要以至于怎么重申都不为过，但也因为防御性编程的本质比其他方法更强调这些领域，原因如下：\n\
  \n正如前面所述，防御性编程的目标是尽量减少由于未来不可预见的事件而导致错误的风险。这些未来的事件可能包括未来对代码的维护和增强。通过现在创建清晰、文档完善的代码，你可以增强其未来的可理解性，降低下次修改时意外引入错误的可能性。\n\
  \n此外，由于防御性编程旨在创建健壮、有弹性的应用程序，这些应用程序可能会在没有任何人工干预的情况下运行很长时间。当它们在几年后再次被审查时，负责的开发团队可能已经大不相同，或者最初的开发人员可能不再记得为什么采取某种方法。至关重要的是，这些信息被记录并在代码本身中清晰可见，以免引入可能损害应用程序稳定性的错误或新的假设。\n\
  \n布局良好的代码通常与经过深思熟虑的代码密不可分。通过采取简单的步骤，例如缩进代码块，你可以轻松识别循环内的步骤和循环外的步骤，防止粗心的错误。大多数 IDE\
  \ 和代码编辑器提供布局功能，可以自动应用一致的制表符、空格、大小写等格式，这些设置通常可以自定义以匹配特定组织中的任何编码标准。\n\n布局良好、注释有意义的代码将使彻底的代码审查更容易。如果需要修改代码，将更容易快速确定最佳方法。\n\
  \n最后，如果在代码的某一部分中发现错误，在一个编码良好的函数中追踪它要容易得多，从而以最小的干扰解决它。\n\n基于这些原因，我相信践行良好的编码规范是防御性编程的关键部分。在以下各节中，我将就编码规范的一些具体方面发表一些看法。\n\
  \n#### 注释\n\n每个人都知道注释是任何代码的重要组成部分，但我们很少有人能像应该的那样充分注释我们的代码（一个常见的理由是开发者更喜欢编写代码，而不是写关于代码的注释）。几乎每一个关于最佳编码实践的思想流派都指出，你应该在代码中自由使用注释，防御性编程也不例外。编写良好的注释更容易说明一个函数的目标是什么以及它为什么以某种方式编写，这意味着更容易发现任何可能破坏该代码的错误或假设。\n\
  \n好的注释应该给阅读代码的人提供额外的信息——而不仅仅是指出显而易见的东西或重述可能很容易在在线书籍中找到的信息。例如，以下注释没有帮助：\n\n```sql\n\
  -- 将 x 设置为 5\nSET @x = 5;\n```\n\n一般来说，注释应该解释为什么采取某种方法以及什么...\n\n\n"
- "# 注释与代码清晰性\n\n开发者试图实现的目标。使用注释描述*预期*行为，能更容易识别*意外*情况。一般来说，没有必要简单地注释内置函数的作用，但也有例外。例如，你能一眼看出下面代码预期的结果是什么吗？\n\
  \n```sql\nDECLARE @y int = 2010, @c int, @n int, @k int, @i int, @j int, @l int,\
  \ @m int,\n@d int;\n\nSET @c = (@y / 100);\nSET @n = @y - 19 * (@y / 19);\nSET @k\
  \ = (@c - 17) / 25;\nSET @i = @c - @c / 4 - ( @c - @k) / 3 + 19 * @n + 15;\nSET\
  \ @i = @i - 30 * (@i / 30);\nSET @i = @i - (@i / 28) * (1 - (@i / 28) * (29 / (@i\
  \ + 1)) * ((21 - @n) / 11));\nSET @j = @y + @y / 4 + @i + 2 - @c + @c / 4;\nSET\
  \ @j = @j - 7 * (@j / 7);\nSET @l = @i - @j;\nSET @m = 3 + (@l + 40) / 44;\nSET\
  \ @d = @l + 28 - 31 * ( @m / 4 );\n\nSELECT CAST(CONVERT(char(4),@y) + '-' + RIGHT('0'\
  \ + CONVERT(varchar(2),@m),2) + '-'\n+ RIGHT('0' + CONVERT(varchar(2),@d),2) AS\
  \ DateTime);\n```\n\n我曾在生产应用中遇到过前面的函数，它被用来确定员工是否因在公共假期工作而有资格获得奖金。如果你还没弄明白，这个结果会返回任意给定年份（通过变量`@y`指定）的复活节星期日日期。代码确实完成了它的目的，但没有任何注释，我花了很长时间才弄清楚这个目的是什么！\n\
  \n在许多情况下，你可以通过使用**自文档化**的代码——选择命名良好的变量、列别名和表别名——来避免编写显式注释。考虑以下代码：\n\n```sql\nSELECT\
  \ DATEPART(Y, '20090617');\n```\n\n在大多数编程语言中，日期格式函数中使用的字符`Y`表示与日期相关的年份。因此，你可能期望前面的代码返回所提供日期的完整年份`2009`，或者可能只是年份的最后一位数字`9`。要解释实际结果为`168`，代码本可以通过用`DAYOFYEAR`（它是其缩写）替换`Y`，从而轻松实现自文档化：\n\
  \n```sql\nSELECT DATEPART(DAYOFYEAR, '20090617');\n```\n\n## 代码缩进与语句块\n\n代码缩进和大量使用空白有助于识别逻辑代码块、循环和批处理，从而创建可理解、易于维护且未来引入错误可能性更低的代码。然而，这些实践对代码本身的执行显然没有直接影响。因此，至关重要的是代码的视觉布局要强化其逻辑行为，因为格式不佳的代码实际上可能具有误导性。考虑以下例子：\n\
  \n```sql\nIF 1 = 1\n    PRINT 'True';\nELSE\n    PRINT 'False';\n    PRINT 'Then\
  \ Print this';\n```\n\n在这种情况下，最后一行代码的缩进使其看起来像是`ELSE`子句的一部分，但事实并非如此，无论测试结果如何，`Then\
  \ Print this`都会被打印出来。\n\n为了避免这种误导性情况，我总是建议大量使用由`BEGIN`和`END`标记的语句块，即使块只包含一个语句，如下所示：\n\
  \n```sql\nIF 1 = 1\nBEGIN\n    PRINT 'True';\nEND\nELSE\nBEGIN\n    PRINT 'False';\n\
  END\n\nPRINT 'Then Print This';\n```\n\n另一个可以轻松避免的误导性做法是未能使用括号来显式展示查询组件被解析的顺序。考虑以下代码清单：\n\
  \n```sql\nDECLARE @Table TABLE (x int, y int);\nINSERT INTO @Table VALUES (1,1),\
  \ (1,2), (2,1), (2,2), (3,1), (3,2);\n\nSELECT *\nFROM @Table\nWHERE\n    x = 1\
  \ AND\n    y = 1 OR y = 2;\nGO\n```\n\n在这种情况下，和之前一样，代码缩进实际上损害了代码的真实逻辑，即选择所有`x=1\
  \ AND y=1`，或`y=2`的行。\n\n## 如果其他方法都失败了……\n\n防御性编程的一个基本特性是进行断言以确保异常情况不会发生。可以说，如果防御性编程的理想状态真的实现了，就没有必要实现异常处理代码，因为任何可能导致异常的情况在被允许发生之前都已被识别和处理。\n\
  \n不幸的是，显式测试所有异常场景在实际上是不可能的，在现实世界中，异常和错误处理仍然是任何软件应用程序中非常重要的一部分。有关 SQL Server 中异常和错误处理的详细讨论，请参阅第\
  \ 4 章。\n\n### 创建健康的开发环境\n\n最好的应用程序并非由一两个程序员的个人才华创造，而是由开发团队协调、有效的协作创造。当编码成为一项共享、开放的活动时，成功的防御性开发最有可能发生。\n\
  \n协作编码的好处在于，你可以利用共享的技术知识和资源池，确保编码彻底而准确。不同的人能够从多个不同的批判性视角审视代码，这有助于识别可能被单个开发者忽视的任何假设。\n\
  \n如果开发者孤立工作，他们可能会引入依赖关系，这会给代码未来的可维护性带来风险。如果只有一个开发者了解某段特别复杂代码的细节，然后该开发者离职或无法联系上，将来你可能会遇到维护该代码的困难。事实上，开发者之间的个人竞争可能导致开发者*故意*给应用程序增加复杂性。编码者可能会试图确保只有他们自己理解某段复杂代码的工作原理，无论是作为炫耀其技术知识的一种方式，出于个人自豪感，还是作为制造对其依赖的一种手段——使他们自己变得不可或缺并确保未来的工作保障。所有这些都创造了一个不健康的开发环境，并可能对所产生代码的质量产生负面影响。\n\
  \n负责开发团队的管理者应努力营造一个持续专业发展的环境，其中共享学习和最佳实践是关键。软件开发是一个不断变化的领域——现在被认为是最佳实践的东西可能在几年内就过时了。为了确保应用程序保持前沿，应促进和鼓励开发者的个人培训和同行之间的知识共享。\n\
  \n实施防御性开发的成功与否也可能受到更广泛公司决策的影响，包括奖励制度。例如，公司可能实施一项奖励计划，为任何在生产应用中发现并解决错误的开发者支付个人奖金。虽然其初衷可能是提高软件质量，但效果可能恰恰相反——毕竟，如果防御性编码（在错误发生前预防）消除了开发者\
  \ later 个人获得修复错误奖励的机会，那么进行防御性编码的动力是什么？此类政策可能会鼓励竞争性的、个人主义的行为，开发者只为自己考虑，而不是基于项目的最佳利益采取行动。\n\
  \n\n"
- '# 第二章 „ 数据库编程的最佳实践


  影响防御性开发成功的另一个因素是预算和项目截止日期的管理方式。软件项目交付若超出截止日期通常会产生罚款。不幸的是，当截止日期提前或预算被大幅削减时，管理层往往认为防御性实践（如严格测试）是非必要的，并且这些实践会最先被从项目范围中剔除。


  要求基于不切实际的短期时间表提供快速修复解决方案的管理者，很可能会鼓励零散的编码实践，从而产生漏洞。这类代码不太可能采用防御性编程，也无法经受严格的测试。软件开发需要耐心和细致地雕琢，然而管理要求常常迫使团队必须走捷径，真正采用防御性编程的项目很少能够善始善终。基于这些原因，真正的防御性编程可能被视为一种理想，而非一个可实现的目标。


  ## 总结


  防御性编程实践旨在提高软件应用程序在面对未预见情况时的韧性和可靠性。考虑到数据库应用程序的典型预期寿命，以及发生缺陷可能导致的严重后果，采用防御性方法以确保应用程序在长期内保持健壮，并将持续维护的需求降至最低，是合乎情理的。


  在本章中，我展示了一些我认为是 `SQL` 编程最佳实践的简单示例，并说明了它们与防御性编程方法论的关系。


  在本书后续部分，我将继续更详细地展示如何在一系列开发场景中采取防御性立场。


  '
- '# 第三章 „ „ „ 测试数据库例程


  什么定义了伟大的开发者？是快速准确地编写复杂例程的能力吗？是在预算内按时正确实现业务需求的能力？或者，也许是通过开发者能多快地追踪并修复应用程序中的缺陷来定义——或者反过来，开发者代码中缺乏缺陷？


  所有这些无疑都是伟大开发者的特质，但在大多数情况下，它们并非仅仅源于原始技能就能显现。真正伟大开发者的标志，也是让这些品质得以闪耀的原因，在于对测试重要性的透彻理解。


  通过在开发过程早期创建 `单元测试`，开发者可以持续验证接口并测试异常和回归。精心设计的 `功能测试` 确保符合业务需求。而性能测试——这种似乎总是最受关注的测试类型——可以用来查明应用程序是否真的能够处理预期的流量。


  不幸的是，就像在应用开发社区中已更好确立的其他各种实践一样，测试在数据库专业人士中尚未广泛普及。尽管一些开发团队会对存储过程和其他数据库代码进行性能测试，但很少看到数据库开发者编写数据特定的
  `单元测试`。


  数据库开发者没有理由不编写与应用程序开发者同等数量——甚至更多——的测试。测试一个数据驱动的应用程序而不验证驱动应用程序组件的数据部分，这是毫无意义的！


  本章简要介绍了软件测试领域，以及如何在数据库开发场景中应用测试技术。软件测试是一个庞大的领域，有其自身的大量术语，因此我的意图是只专注于那些我认为对数据库开发者最重要的领域。


  ## 测试方法



  '
- "# 第三章 测试数据库例程\n\n质量保证领域内存在多种测试方法，但总的来说，所有类型的软件测试都可以分为两类：\n\n*   `黑盒测试` 指的是那些只对被测模块的输入输出做出假设，而不验证中间条件的测试。测试人员无需了解（也不要求了解）模块的内部工作原理——因此它们被包含在一个“黑盒”中。\n\
  *   `白盒测试` 则恰恰相反，它包括任何测试人员知晓并验证被测例程或函数内部实现的测试。白盒测试也被称为“开盒测试”，因为测试人员被允许查看模块内部以了解其运作方式，而不仅仅是检查其输入和输出。\n\
  \n在这两大分类之下，还有许多旨在针对应用程序不同特定领域的具体测试。黑盒测试的例子包括单元测试、安全测试以及基本的性能测试，如压力测试和耐久测试。随着测试阶段的推进，会识别出需要进一步测试的领域，所执行的测试类型也倾向于从黑盒转向白盒，以专注于特定的内部元素。\n\
  \n从数据库开发的视角来看，白盒测试的例子包括：验证模块内部工作的功能测试、执行数据验证的测试，以及当性能调优需要透彻了解数据访问方法时的测试案例。例如，在性能测试期间检索和分析查询计划，就是对存储过程进行白盒测试的一个例子。\n\
  \n### 单元测试与功能测试\n\n专注于数据层的软件开发在测试方面有一个好处：需要熟悉的测试类型并不多。可以说，最重要的两类测试是那些验证应用程序行为是否符合预期，并返回正确结果的测试。这就是单元测试和功能测试的目的。\n\
  \n`单元测试` 是验证接口所公开契约的黑盒测试。例如，对存储过程的单元测试应该验证：给定一组特定的输入，存储过程返回的输出结果集是否符合被测存储过程接口所定义的正确集合。这里使用的“正确”一词需要仔细定义。它仅在存储过程契约所定义的范围内意味着“正确”；实际返回的数据本身并不重要。因此，只要结果代表了根据接口契约定义的、格式和数据类型正确的有效值，单元测试就应该通过。换句话说，单元测试测试的是接口按照其契约规定与外部世界进行通信的能力。\n\
  \n`功能测试` ，顾名思义，验证的是被测对象的功能。在测试术语中，“功能测试”一词的含义比“单元测试”模糊得多。它可以指代任何类型、在应用程序任何层级上，测试该部分应用是否正常工作的测试——换句话说，就是测试它是否执行了适当的操作序列以交付预期的正确最终结果。对于一个从数据库中选择数据的简单存储过程而言，功能测试要问的问题是：该存储过程是否返回了正确的数据？同样，我将仔细定义“正确”这个词。这一次，“正确”既包含为单元测试所做的那种验证（数据必须格式正确），也包含对返回值实际准确性的更深层次验证。进行这种验证所需的逻辑意味着，在数据库领域中，功能测试是一种白盒测试，与单元测试的黑盒性质形成对比。\n\
  \n让我们看一个例子来让这些想法更清晰一些。考虑下面这个可能用于银行应用程序的存储过程：\n\n```sql\nCREATE PROCEDURE GetAggregateTransactionHistory\n\
  \    @CustomerId int\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    SELECT\n        SUM\n\
  \        (\n            CASE TransactionType\n                WHEN 'Deposit' THEN\
  \ Amount\n                ELSE 0\n            END\n        ) AS TotalDeposits,\n\
  \        SUM\n        (\n            CASE TransactionType\n                WHEN\
  \ 'Withdrawal' THEN Amount\n                ELSE 0\n            END\n        ) AS\
  \ TotalWithdrawals\n    FROM TransactionHistory\n    WHERE\n        CustomerId =\
  \ @CustomerId;\nEND;\n```\n\n这个存储过程隐含的契约表明，给定 `@CustomerId` 参数输入一个客户 ID，将输出一个包含两列、零行或一行的列结果集（该契约并未对无效的客户\
  \ ID 或没有进行过任何交易的客户做出任何暗示）。\n\n输出结果集中的列名将是 `TotalDeposits` 和 `TotalWithdrawals`，列的数据类型将与\
  \ `TransactionHistory` 表中 `Amount` 列的数据类型相同（我们假设它是 decimal 类型）。\n\n### 如果客户不存在怎么办？\n\
  \n`GetAggregateTransactionHistory` 存储过程的输出，无论你传入的是一个碰巧没有交易的有效客户 ID，还是一个无效的客户 ID，都将是相同的。无论哪种情况，该过程都将不返回任何行。根据特定情况的需求，通过稍微改变规则来使接口更丰富可能更有意义：即仅当传入无效的客户\
  \ ID 时才不返回行。这样，调用方将能够识别无效数据，并向用户提供适当的错误消息，而不是暗示不存在的客户没有进行交易。\n\n针对此存储过程的单元测试应该只做接口验证。应传入一个客户\
  \ ID，单元测试应检查输出结果集（或其缺失），以确保存在两列名称和数据类型正确的列，以及零行或一行。无需进行数据验证；例如，去核查汇总信息是否准确就超出了范围——那将是功能测试的工作。\n\
  \n我们之所以在单元测试和功能测试之间做出如此区分，是因为在测试纯粹的接口合规性时，我们希望将自己置于从更高层编程使用该接口的人的立场上。接口是否按文档工作，提供了适当级别的封装并以正确的格式返回数据？\n\
  \n系统中的每个接口都需要一个或多个此类测试（参见本章后面的“需要多少测试？”一节），因此它们需要保持专注和轻量。为每个接口编写完整的白盒测试可能不可行，而且在更高层级（例如通过用户界面本身）测试数据的有效性可能更简单。在\
  \ `GetAggregateTransactionHistory` 存储过程的例子中，编写一个功能测试本质上相当于重写整个存储过程——这绝不是开发人员时间的良好利用。\n\
  \n### 单元测试框架\n\n使用单元测试框架可以简化单元测试，这些框架提供了结构化的编程接口，旨在帮助快速测试软件。这些框架通常利用 `调试断言` ，允许开发人员指定那些使测试为真或为假的条件。\n\
  \n调试断言是一种特殊的宏，只有在软件以调试模式编译时才会被启用。它接受一个表达式作为输入，如果表达式为假则抛出异常；否则返回真（或在某些语言中返回 void）。例如，以下断言将始终抛出异常：\n\
  \n```\nAssert(1 == 0);\n```\n\n"
- "# 第三章 测试数据库例程\n\n断言允许开发者自我记录代码例程所做的假设。如果一个例程期望某个变量在特定时间处于特定状态，则可以使用断言来帮助确保随着代码的成熟，该假设得以强制执行。如果在未来的任何时间，代码的更改使该假设无效，则进行更改的开发人员在测试或调试时触发该断言将会引发异常。\n\
  \n在单元测试中，断言有着非常相似的目的。它们允许测试人员控制使单元测试返回真或假的条件。如果在单元测试中有任何断言引发异常，则整个测试被视为失败。\n\n几乎每种语言和平台都有单元测试框架，包括\
  \ T-SQL（例如，可从 http://sourceforge.net/projects/tsqlunit 获取的 TSQLUnit 项目）。就个人而言，我发现与其他语言相比，在\
  \ T-SQL 中进行单元测试很麻烦，因此更喜欢使用 .NET 单元测试框架 NUnit（http://www.nunit.org）在 .NET 语言中编写测试。\n\
  \n提供关于如何针对单元测试框架编码的深入指南超出了本书的范围，但鉴于许多开发人员对存储过程进行单元测试仍有些陌生，我将提供一套基本的遵循规则。编写存储过程单元测试时，可以遵循以下基本步骤：\n\
  \n1.  首先，确定应该对存储过程的接口做出哪些假设。将返回哪些结果集？列的数据类型是什么，会有多少列？契约是否保证了特定的行数？\n2.  接下来，编写执行待测存储过程所需的代码。如果你使用\
  \ NUnit，我发现暴露相关输出的最简单方法是使用 ADO.NET 用存储过程的结果填充一个 `DataSet`，以便随后进行检查。在此阶段要小心；你想要测试的是存储过程，而不是你的数据访问框架。你可能会忍不住使用与应用程序本身相同的方法来调用存储过程。然而，这将是一个错误，因为你最终将同时测试存储过程和该方法。鉴于你只需要填充一个\
  \ `DataSet`，在单元测试中重新编码数据访问不应是主要负担，并且可以防止你测试到你本不打算测试的代码部分。\n3.  最后，对你关于存储过程所做的每个假设使用一个断言；这意味着每个列名一个断言，每个列数据类型一个断言，必要时行数一个断言，等等。宁可多用断言——如果后来发现某个假设不正确，再将其移除，总比一开始就没有该假设，而在接口实际上工作不正确时单元测试却通过了要好。\n\
  \n以下代码清单展示了 NUnit 测试 `GetAggregateTransactionHistory` 存储过程可能的样子：\n\n```csharp\n\
  [TestMethod]\npublic void TestAggregateTransactionHistory()\n{\n    // Set up a\
  \ command object\n    SqlCommand comm = new SqlCommand();\n\n    // Set up the connection\n\
  \    comm.Connection = new SqlConnection(\n        @\"server=serverName; trusted_connection=true;\"\
  );\n\n    // Define the procedure call\n    comm.CommandText = \"GetAggregateTransactionHistory\"\
  ;\n    comm.CommandType = CommandType.StoredProcedure;\n    comm.Parameters.AddWithValue(\"\
  @CustomerId\", 123);\n\n    // Create a DataSet for the results\n    DataSet ds\
  \ = new DataSet();\n\n    // Define a DataAdapter to fill a DataSet\n    SqlDataAdapter\
  \ adapter = new SqlDataAdapter();\n    adapter.SelectCommand = comm;\n\n    try\n\
  \    {\n        // Fill the dataset\n        adapter.Fill(ds);\n    }\n    catch\n\
  \    {\n        Assert.Fail(\"Exception occurred!\");\n    }\n\n    // Now we have\
  \ the results -- validate them...\n\n    // There must be exactly one returned result\
  \ set\n    Assert.IsTrue(\n        ds.Tables.Count == 1,\n        \"Result set count\
  \ != 1\");\n    DataTable dt = ds.Tables[0];\n\n    // There must be exactly two\
  \ columns returned\n    Assert.IsTrue(\n        dt.Columns.Count == 2,\n       \
  \ \"Column count != 2\");\n\n    // There must be columns called TotalDeposits and\
  \ TotalWithdrawals\n    Assert.IsTrue(\n        dt.Columns.IndexOf(\"TotalDeposits\"\
  ) > -1,\n        \"Column TotalDeposits does not exist\");\n    Assert.IsTrue(\n\
  \        dt.Columns.IndexOf(\"TotalWithdrawals\") > -1,\n        \"Column TotalWithdrawals\
  \ does not exist\");\n\n    // Both columns must be decimal\n    Assert.IsTrue(\n\
  \        dt.Columns[\"TotalDeposits\"].DataType == typeof(decimal),\n        \"\
  TotalDeposits data type is incorrect\");\n    Assert.IsTrue(\n        dt.Columns[\"\
  TotalWithdrawals\"].DataType == typeof(decimal),\n        \"TotalWithdrawals data\
  \ type is incorrect\");\n\n    // There must be zero or one rows returned\n    Assert.IsTrue(\n\
  \        dt.Rows.Count <= 1,\n        \"Too many rows returned\");\n}\n```\n\n尽管单元测试的代码长度是它所测试的存储过程的两倍多，这一点可能令人不安，但请记住，大部分代码可以很容易地转换为模板以便快速重用。如前所述，你可能会忍不住将通用的单元测试代码重构到一个数据访问库中，但要小心，以免你最终测试的是你的测试框架，而不是你试图测试的实际例程。在调试正常工作的代码以试图弄清楚单元测试为何失败时，可能会浪费很多时间，而这实际上是因为单元测试所依赖的某些代码的故障。\n\
  \n单元测试允许对接口进行快速、自动化的验证。本质上，它们帮助你作为开发人员保证在对系统进行更改时没有破坏任何明显的东西。从这个意义上说，它们是无价的。在具有良好建立的单元测试集的系统上进行开发是一种乐趣，因为每个开发人员不再需要担心因接口更改而破坏其他组件。如果有任何东西需要修复，单元测试将会发出警报。\n\
  \n### 回归测试\n\n当你为特定的应用程序建立一套单元测试时，这些测试最终将充当一个**回归测试套件**，这将有助于防范**回归错误**——即当开发人员破坏了原本能工作的功能时出现的错误。对接口的任何更改——无论有意与否——都会导致单元测试失败（假设测试编写正确）。对于有意的更改，解决方案是相应地重写单元测试。但正是这些无意的更改，才是我们创建单元测试的目的，也是回归测试所针对的目标。\n\
  \n经验表明，修复应用程序中的错误常常会引入其他错误。在真实的开发场景中，这种情况发生的频率可能难以证实，但有观点认为在某些情况下可能高达 50%。通过建立回归测试套件，修复这些“副作用”错误的成本大大降低。它们可以在开发阶段被发现和修复，而不是在应用程序部署后由最终用户报告。\n\
  \n回归测试也是一些较新的软件开发方法的关键，例如敏捷开发和极限编程（XP）。随着这些方法日益普及，其采用方式也渗透到数据库领域，可以预期数据库开发人员将开始更乐于采纳其中的一些技术。\n\
  \n## 实施数据库测试流程和程序的指南\n\n在构成测试策略的所有可能要素中，成功的关键其实只有一个：一致性。测试必须是可重复的，并且每次必须以相同的方式运行，只有已知的（即已理解并有文档记录的）变量发生变化。不一致性，或者对测试之间可能发生变化的变量缺乏了解，可能意味着在测试中发现的任何问题都难以追踪。\n\
  \n"
- "# 第三章：测试数据库例程\n\n开发团队应努力建立一套测试套件，至少在每次应用程序发布时运行一次，如果可能则运行更频繁。这些测试应自动化且易于执行。理想情况下，测试套件应是模块化的，这样当开发人员负责应用程序的某一部分时，可以轻松运行仅适用于该部分的测试子集，以验证任何更改。\n\
  \n### 持续测试\n\n一旦建立了一套自动化测试，距离全自动测试环境就仅一步之遥了。这样的环境应能从源代码控制仓库中获取最新代码，运行相应的构建脚本来编译可工作的应用程序版本，并执行整个测试套件。许多软件开发团队使用这种技术每天多次运行测试，如果提交了有问题的代码，几乎能立即发出警报。这种严格的自动化测试被称为**持续集成**，它是将部分测试负担从开发人员手中转移出去、同时确保所有测试按需（甚至更频繁地）运行的绝佳方式。一个帮助在\
  \ .NET 环境中建立持续集成的优秀免费工具是 `CruiseControl.NET`，可在 http://sourceforge.net/projects/ccnet\
  \ 获取。\n\n测试人员还必须特别注意用于执行测试的任何数据。生成包含应用程序可能遇到的所有可能情况的测试数据集通常是有益的。这样的数据集可以保证测试运行之间的一致性，因为它可以恢复到其原始状态。它还可以保证测试到那些原本可能不会遇到的罕见边界情况。\n\
  \n还建议在任何给定测试周期接近尾声时，使用实际生产数据的副本（如果可用）进行测试，而不是依赖人工生成的测试数据。通常，生成的数据集可能缺乏真实性，无法揭示只有真实用户才能从应用程序中引出的隐蔽问题。\n\
  \n#### 为什么测试很重要？\n\n可以说，软件的唯一目的是被最终用户使用，因此测试的唯一目的是确保这些最终用户不会遇到问题。因此，测试希望实现两个重要目标：\n\
  \n*   测试发现需要修复的问题。\n*   测试确保没有需要修复的问题。\n\n最终，所有软件都必须经过测试。如果开发人员或质量保证团队没有进行充分测试，应用程序将被试图使用该软件的最终用户测试。不幸的是，这是失去可信度的好方法；用户通常对存在缺陷的软件感到不满。\n\
  \n开发和质量保证团队进行的测试验证了软件。执行的每一种测试都验证了难题的特定部分，如果使用了完整的测试套件（并且测试通过），团队可以相当确定软件具有最少的错误、性能缺陷和其他问题。由于数据库在大多数应用程序中是日益重要的组件，测试数据库是有意义的；如果数据库有问题，它们会传播到应用程序的其他部分。\n\
  \n## 哪种测试重要？\n\n从数据库开发人员的角度来看，在大多数情况下，只有少数几种测试是真正必要的。数据库应针对以下问题进行测试：\n\n*   应验证\
  \ `接口一致性`，以保证应用程序具有稳定的数据访问结构。\n*   `数据可用性` 和 `授权测试` 类似于接口一致性测试，但更侧重于*谁*可以从数据库获取数据，而不是*如何*检索数据。\n\
  *   `身份验证测试` 验证有效用户是否可以登录，以及无效用户是否被拒绝访问。只有当数据库用于验证用户身份时，这类测试才重要。\n*   `性能测试` 对于验证用户体验是否积极以及用户是否不必为数据等待超过必要时间至关重要。性能测试可能涉及\
  \ `负载测试`（监控数据库在给定负载下的性能）、`饱和测试`（通过不断增加负载和/或移除资源直到系统崩溃来试图使系统不堪重负）以及 `耐力测试`（在持续时间内对数据库施加持续需求）。\n\
  *   `回归测试` 涵盖了所有其他类型的测试，但通常侧重于发现先前已修复的问题。回归测试是验证修复是否仍然有效的测试。\n\n#### 需要多少测试？\n\n\
  尽管大多数开发团队缺乏足够数量的测试来彻底测试应用程序，但在某些情况下，情况恰恰相反。测试过多可能与测试不足一样是个问题；编写测试可能很耗时，并且每当功能发生变化时，测试必须与软件的其余部分一起维护。在彻底测试的需求与时间和金钱限制的现实之间取得平衡非常重要。\n\
  \n数据库测试的一个良好起点是为每个接口参数“类”或输入组创建一个单元测试。例如，考虑以下存储过程接口：\n\n```sql\nCREATE PROCEDURE\
  \ SearchProducts\n    SearchText varchar(100) = NULL,\n    PriceLessThan decimal\
  \ = NULL,\n    ProductCategory int = NULL\n```\n\n此存储过程根据三个参数返回有关产品的数据，每个参数都是可选的，基于以下（已记录的）规则：\n\
  \n*   用户可以搜索产品描述中的文本。\n*   用户可以搜索价格低于给定输入价格的产品。\n*   用户可以将文本搜索或价格搜索与特定产品类别的额外过滤器结合使用，以便仅返回该类别的结果。\n\
  *   用户不能同时搜索文本和价格。此条件应返回错误。\n*   任何其他输入组合都应导致错误。\n\n为了验证存储过程的接口，需要为上述每个条件编写一个单元测试。传递有效输入参数的单元测试应验证存储过程根据其隐式契约返回有效的输出结果集。针对无效参数组合的单元测试应验证在使用这些组合时会发生错误。已知错误是接口隐式契约的一部分（有关此主题的更多信息，请参见第\
  \ 4 章）。\n\n除了这些单元测试之外，还应为存储过程内已修复的每个已知问题生成一个额外的回归测试，以确保该过程的功能不会随时间推移而退化。\n\n尽管这看起来像是大量的测试，但请记住，这些测试可以——并且应该——共享相同的基础代码。各个测试只需将正确的参数传递给参数化的基础测试即可。\n\
  \n## 管理层会支持吗？\n\n一个不幸的事实是，许多管理团队认为测试要么是不必要的时间浪费，要么根本不应该是软件开发过程中一个整合良好的部分。许多软件公司，尤其是规模较小的公司，没有专门的质量保证人员，而且开发进度如此紧张，以至于几乎没有进行测试，这使得完整的功能测试几乎不可能。\n\
  \n我曾合作过的几家公司都处于这种情况，而这从未带来管理层所认为的时间或金钱节省。相反，缺乏测试实际上*浪费*了时间和金钱。\n\n\n"
- "# 第三章 „ 测试数据库例程\n\n„ **注意** `在许多组织中，访问性能监控工具的权限仅限于数据库或系统管理员。然而，本节描述的大多数工具都允许保存性能日志，因此，如果你的权限不足以监控性能，另一位拥有足够权限的用户可以对服务器进行性能剖析，并将结果导出给你。`\n\
  \n一个与开发过程良好整合的测试流程，能在大多数缺陷产生之初就发现它们，而不是留到以后。一名正在增强某个特定模块的开发人员，在那一刻对代码有着深刻的理解。一旦他或她转向另一个模块，随着注意力转移到应用程序的其他部分，这种理解就会开始减弱。如果在开发人员仍在\"\
  战壕\"中时就发现并报告缺陷，他们就无需为了修复问题而重新学习代码，从而节省大量时间。这些时间节省直接转化为生产力的提升，因为开发人员最终能将更多时间用于开发新功能，而花在修复缺陷上的时间则更少。\n\
  \n如果管理团队拒绝听取合理建议，不愿为进行适当的测试而分配额外的开发时间，那么无论如何也要尝试去做。诸如测试驱动开发（TDD）之类的方法——你先编写测试，然后创建能通过测试的例程——可以极大地提高整体开发人员的生产力。无论是否获得管理层的批准，采用测试策略都可能意味着更好、更快的产出，最终将有助于确保成功。\n\
  \n## 性能监控工具\n\n使用单元测试、功能测试和回归测试进行验证，对于彻底测试应用程序行为是否正确极为重要，但真正吸引大多数开发人员注意力的还是性能测试。性能测试对于确保积极的用户体验至关重要。用户不希望等待超过绝对必要的时间来获取数据。\n\
  \n性能测试依赖于收集、审查和分析系统不同方面的性能数据。因此，在深入探讨如何分析系统性能之前，有必要先了解一些可用于捕获此类数据的工具。`SQL Server\
  \ 2008` 提供了许多内置工具，允许 `DBA` 和开发人员存储或查看关于服务器上活动的实时信息，包括以下工具：\n\n*   `SQL Server Profiler`\n\
  *   服务器端跟踪\n*   系统监视器控制台\n*   动态管理视图 (DMVs)\n*   扩展事件\n*   数据收集器\n\n此外，还有许多第三方监控工具可用，它们可以以不同的方式测量、聚合和呈现性能数据。在本节中，我将讨论一些不同的性能监控方法，以及它们可以适用的情况。\n\
  \n### 实时客户端监控\n\n随 `SQL Server 2008` 提供的 `Profiler` 工具非常有用且易于使用。只需加载 `Profiler`\
  \ 应用程序并将其指向你想要监控的 `SQL Server` 实例，它就会基于大约 200 种不同事件报告实时信息。然而，对于大多数性能监控工作，你只需要关注少数几个关键事件。\n\
  \n在最初为应用程序建立基线时，我通常从只查看 `SQL:BatchCompleted` 和 `RPC:Completed` 事件开始。这两个事件都在查询完成时触发；它们之间的唯一区别是，`RPC:Completed`\
  \ 在远程过程调用 (`RPC`) 完成时触发，而 `SQL:BatchCompleted` 在 SQL 批处理完成时触发——不同的访问方法，相同的结果。\n\n\
  对于这两个事件，最有价值的列是 `CPU`、`Reads`、`Writes` 和 `Duration`：\n\n*   `CPU` 列报告用于解析、编译和执行查询的\
  \ CPU 时间（以毫秒为单位）。由于该列包含\n\n\n\n进入`compilation time`阶段，通常可以观察到报告的时间在连续查询中呈下降趋势，这得益于计划缓存。\n\
  \n- `Reads`列报告查询执行的`logical`读取次数。`logical` I/O 发生在 SQL Server 的查询引擎请求数据时，无论是从物理磁盘还是从缓冲区缓存获取。如果在此列中看到高数值，不一定表示性能问题，因为大多数数据可能从缓存中读取。然而，即使从内存中读取数据也会消耗服务器的\
  \ CPU 时间，因此最好尽量减少任何类型的读取。\n- `Writes`列报告查询执行的`physical`写入次数。这意味着只有在查询过程中实际持久化到磁盘的写入操作才会被报告。\n\
  - `Duration`列报告调用总耗时，以毫秒为单位。查询的持续时间直接反映了用户体验，因此通常从此入手分析。如果应用程序运行缓慢，您可以使用此列找到性能最差的查询。\n\
  \n通过查看这些列中包含的高层级信息，您可以识别出值得进一步调查的潜在候选对象。首先，考虑系统中任何给定查询需要设定的限制。查询允许运行的最长时间是多少？平均运行时间应该是多少？通过对`Duration`列进行聚合分析，您可以确定这些时间限制是否已被超出。\n\
  \n一旦您隔离了可能的问题区域（请参阅本章后面的“Granular Analysis”部分），您可以使用更详细的事件集进行深入探究。例如，`Scan:Started`事件可用于识别可能未有效使用索引并因此可能导致\
  \ I/O 问题的查询。另一方面，`SP:Recompile`事件表示查询被查询优化器重新编译，因此可能消耗了比必要更多的 CPU 时间。\n\n## 第三章：测试数据库例程\n\
  \n### 服务器端跟踪\n\n虽然 SQL Server Profiler 是一个方便且有用的工具，但它有一些限制。主要问题是，为了便于实时数据收集和显示，SQL\
  \ Server 需要持续将数据流式传输回该工具——这样做会产生开销。因此，尝试监控性能的行为可能对被测量系统的性能产生负面影响，导致结果出现偏差（即“观察者效应”）。\n\
  \n在高事务吞吐量的性能测试中，您应该通过使用`server-side traces`而不是 Profiler 工具来最小化监控对测试结果的影响。`server-side\
  \ trace`在 SQL Server 后台运行，将其结果保存到服务器上的本地文件，而不是流式传输到客户端。\n\n可以手动在 T-SQL 中定义`server-side\
  \ trace`的参数，但这样做是一个繁琐且不必要的过程。更好的方法是基于从 SQL Server Profiler 工具导出的跟踪定义来创建`server-side\
  \ trace`，如以下步骤所述：\n\n1.  首先，使用 SQL Server Profiler 定义跟踪所需的事件、列和筛选器。\n2.  选择 File\
  \ > Export > Script Trace Definition > For SQL Server 2005 – 2008，并选择文件名以保存脚本。\n\
  3.  保存脚本后，在 SQL Server Management Studio 中打开它。此文件包含基于提供的参数启动跟踪所需的 T-SQL 代码。\n4.\
  \  编辑脚本的以下行，通过指定跟踪结果的有效输出路径和文件名：\n   ```\n   exec @rc = sp_trace_create @TraceID\
  \ output, 0, N'InsertFileNameHere', @maxfilesize, NULL\n   ```\n\n**注意** 指定的文件名不应包含任何类型的扩展名。跟踪将自动添加一个。\n\
  \n\n\n## 3.1 操作追踪脚本\n\n5.  你可能还需要修改`@maxfilesize`参数的值，该参数默认设置为 5MB。增加最大文件大小有助于最小化在追踪期间创建的滚动文件数量。我通常将其设置为\
  \ 200MB 作为起点。\n6.  完成编辑后，执行脚本。追踪将在后台开始收集数据，生成的脚本将返回一个追踪标识符`TraceID`，你应该记下它，因为稍后控制追踪时将需要它。\n\
  \n按照这些步骤操作后，追踪将会运行，所有指定事件的输出都将被写入日志文件，所以现在是执行你的测试套件的时候了。当你完成追踪后，必须使用`sp_trace_setstatus`存储过程停止并关闭追踪，该过程需要提供启动追踪时返回的`TraceID`追踪标识符。以下代码清单演示了这一点（此例中追踪标识符列为\
  \ 99）：\n\n```sql\nEXEC sp_trace_setstatus @traceid=99, @status=0;\nEXEC sp_trace_setstatus\
  \ @traceid=99, @status=2;\nGO\n```\n\n一旦追踪被停止并关闭，就可以使用`sys.fn_trace_gettable`函数从追踪文件中读取数据。此函数接受两个参数：追踪文件名的完整路径（包括\
  \ SQL Server 自动添加的`.trc`扩展名），以及要读取的最大滚动文件数。以下 T-SQL 将用于从路径`C:\\Traces\\myTrace.trc`读取追踪文件。滚动文件的数量设置得足够高，以便即使追踪多次滚动到新文件，也能读回所有数据：\n\
  \n```sql\nSELECT *\nFROM sys.fn_trace_gettable('C:\\Traces\\myTrace.trc', 999);\n\
  GO\n```\n\n以这种方式选中后，追踪数据可以像 SQL Server 中的任何其他数据一样使用。它可以被插入到表中、查询或以多种方式进行聚合，以评估哪些查询可能正在引发问题。\n\
  \n## 3.2 系统监控\n\n要从更宏观的角度了解服务器的整体性能，系统性能计数器是一种宝贵的资源。可以使用“系统监视器”控制台（也称为“性能监视器”或`perfmon.exe`，具体取决于你的\
  \ SQL Server 实例运行的操作系统）来读取这些计数器，尽管许多负载测试工具集成了系统计数器收集和报告机制。与 SQL Server 追踪事件类似，有数百个计数器可供选择——但在对\
  \ SQL Server 安装进行初步性能评估时，通常只需要监控其中少数几个。\n\n以下计数器是确定应关注何种性能问题的良好起点：\n\n*   `Processor:%\
  \ Processor Time`：报告相对于服务器可用容量的总处理器时间。如果此计数器在高峰负载期间高于 70%，可能值得开始调查哪些例程大量使用了 CPU\
  \ 时间。\n*   `PhysicalDisk:Avg. Disk Queue Length`：指示进程是否必须等待使用磁盘资源。当磁盘正在处理请求（即读写数据）时，无法立即满足的请求会被排队。过多的并发请求会导致等待时间，这可能意味着查询性能问题。尽可能确保队列长度保持在\
  \ 1 以下（这实际上意味着没有队列）是个好主意。\n*   `PhysicalDisk:Disk Read Bytes/sec` 和 `PhysicalDisk:Disk\
  \ Write Bytes/sec`：分别报告从磁盘读取和写入磁盘的字节数。这些数字本身并不特别有趣，但结合`Avg. Disk Queue Length`**可以帮助解释问题。缓慢的`SELECT`查询伴随着高物理读取和低队列长度，可能表明缓冲区缓存未得到有效利用。缓慢的\
  \ DML 查询伴随着高物理写入和...\n\n\n"
- "# 第三章 测试数据库例程\n\n-   队列长度过长是磁盘争用的典型表现，也是一个明确信号，表明您可能需要评估如何减少索引碎片，以降低插入和更新操作的时间。\n\
  \n-   `SQLServer:Locks:Average Wait Time (ms)` 报告查询等待锁的平均时长。减少锁争用可能颇具挑战，但在某些情况下可以通过使用脏读（`READ\
  \ UNCOMMITTED` 隔离级别）或行版本控制（`SNAPSHOT` 隔离级别）来解决。有关这些及其他选项的讨论，请参见第 9 章。\n\n-   `SQLServer:Buffer\
  \ Manager:Page life expectancy` 指页面从磁盘读入后，在缓冲区缓存内存中保留的平均时间（以秒为单位）。该计数器与 Disk Read\
  \ Bytes/sec 结合使用，有助于指示磁盘瓶颈发生的位置——或者，它也可能只是表明您的服务器需要更多内存。无论哪种情况，低于 300（即 5 分钟）的值可能表明您在此方面存在问题。\n\
  \n-   `SQLServer:Plan Cache:Cache Hit Ratio` 和 `SQLServer:Plan Cache:Cached Pages`\
  \ 是处理查询计划缓存的计数器。缓存命中率计数器是缓存命中数与查找数的比率——换句话说，就是已发出查询中已在缓存中的百分比。在性能运行期间，此数字通常应开始时较低（假设您在运行前已重启\
  \ SQL 服务器以使其处于一致状态），并在运行过程中逐渐上升。接近尾声时，您应该看到此数字相当接近 100，表明几乎所有查询都已被缓存。缓存页计数器指示有多少\
  \ 8KB 的内存页正用于过程缓存。低缓存命中率结合高缓存页值意味着您需要考虑修复系统所使用的动态 SQL。有关解决动态 SQL 问题的技术信息，请参见第 8\
  \ 章。\n\n**提示** SQL Server Profiler 能够导入已保存的性能计数器日志，以便将其与跟踪关联起来。这对于帮助精确定位诸如 CPU 时间和磁盘利用率等区域中特别大的峰值原因非常有用。\n\
  \n## 动态管理视图\n\nSQL Server 2008 暴露的动态管理视图包含各种服务器级和数据库级信息，可用于辅助性能测量。`sys.dm_os_performance_counters`\
  \ DMV 包含服务器维护的超过 1000 行的高级性能计数器，包括有关 I/O、锁、缓冲区和日志使用情况的常见度量。查询此 DMV 提供了一种替代方法，用于收集通过性能监控控制台暴露的许多相同数据。\n\
  \n除了 `sys.dm_os_performance_counters`，还有许多其他 DMV 包含对性能监控目的有用的信息。以下列表显示了我发现对性能测量和调优最有帮助的几个\
  \ DMV：\n\n-   `sys.dm_exec_query_stats`：为当前计划在缓存中的查询提供性能统计信息。通过与 `sys.dm_exec_sql_text`\
  \ 和 `sys.dm_exec_query_plan` 连接，可以分析个别有问题的批处理与其 SQL 和查询计划相关的性能。\n-   `sys.dm_db_index_usage_stats`、`sys.dm_db_index_physical_stats`\
  \ 和 `sys.dm_db_index_operational_stats`：这三个视图显示对索引调优有用的信息，包括报告针对每个索引执行的查找和扫描次数、索引碎片程度以及可能的索引争用和阻塞问题。\n\
  -   `sys.dm_os_wait_stats`：此视图记录有关被迫等待的请求的信息——换句话说，任何由于 I/O 或 CPU 资源不可用而无法立即由服务器满足的请求。\n\
  -   `sys.dm_os_waiting_tasks` 和 `sys.dm_tran_locks`：分别包含在这两个表中的关于等待任务和锁的信息，可以结合起来帮助识别阻塞情况。\n\
  \n**注意** DMV 通常报告以微秒（1/1,000,000 秒）为单位测量的任何计时，而大多数其他性能测量工具则以毫秒（1/1,000 秒）为单位报告计时。\n\
  \n分析这些 DMV 中包含的详细信息，可以让您了解许多性能问题的根本原因，并确定纠正这些问题的适当措施。例如，假设一台性能不佳的服务器上的 `sys.dm_os_wait_stats`\
  \ 显示有大量的 I/O 等待（例如，`PAGEIOLATCH`、`LOGMGR` 或 `IO_COMPLETION` 的值很高），但几乎没有 CPU 资源等待。显然，在这种情况下，性能问题不会通过升级服务器\
  \ CPU 来解决——存在 I/O 瓶颈，适当的解决方案涉及找到缩短 I/O 响应时间的方法，或者减少查询的 I/O 需求。\n\n**注意** DMV 存储的是自服务器上次重启以来的预聚合累积统计信息。为了在运行性能测试前重置等待统计信息，您可以使用带有\
  \ CLEAR 选项的 `DBCC SQLPERF`——例如，`DBCC SQLPERF ('sys.dm_os_wait_stats', CLEAR);`。\n\
  \n### 扩展事件\n\n扩展事件是 SQL Server 2008 中引入的一种灵活、多用途的事件系统，可用于各种场景，包括性能测试。有超过 250 个预定义事件，其中一些镜像了传统的跟踪事件触发器，包括\
  \ `RPC:Completed`、`sp_completed` 和 `lock_timeout`，但还有许多其他事件。事件触发时收集的有效载荷（即数据列）随后可以传递到各种同步和异步目标。这种用于处理扩展事件的灵活框架允许您构建一个定制的性能监控系统，该系统收集非常具体的测量值，并以各种格式传递它们，以满足您的监控要求。\n\
  \n前面介绍的监控工具的一个缺点是，它们倾向于收集在预定义级别聚合的性能指标。例如，在 `sys.dm_os_wait_stats` 中暴露的等待统计信息可能表明在服务器范围内发生了\
  \ I/O 瓶颈。然而，仅凭这些信息，我们无法判断哪些查询或会话受到影响，或者它们被强制等待了多久。通过利用诸如 `sqlos.wait_info` 和 `sqlos.wait_info_external`\
  \ 之类的扩展事件，可以在会话或语句级别收集特定的等待统计信息。使用扩展事件收集的性能统计信息可以通过添加谓词来进一步细化，这些谓词指定例如仅收集特定类型的等待信息、发生一定次数的等待或超过最小等待时间的等待。\n\
  \n以下代码清单说明了如何创建一个新的扩展事件会话，该会话记录所有遇到等待的语句（由 `sqlos.wait_info` 事件触发），并将其保存到服务器上的日志文件中：\n\
  \n```\nCREATE EVENT SESSION WaitMonitor ON SERVER\nADD EVENT sqlos.wait_info(\n\
  \    ACTION(\n        sqlserver.sql_text,\n        sqlserver.plan_handle)\n    WHERE\
  \ total_duration > 0\n)\nADD TARGET package0.asynchronous_file_target(\n    SET\
  \ filename = N'c:\\wait.xel',\n    metadatafile = N'c:\\wait.xem');\nGO\n```\n\n\
  当您准备好启动日志时，运行以下命令：\n\n```\nALTER EVENT SESSION WaitMonitor ON SERVER\nSTATE = start;\n\
  GO\n```\n\n## 停止扩展事件会话\n\n要停止 `WaitMonitor` 会话，请执行以下代码清单：\n\n```sql\nALTER EVENT\
  \ SESSION WaitMonitor ON SERVER\nSTATE = stop;\nGO\n```\n\n扩展事件会话捕获的有效负载以 XML 格式保存到文件目标中。要分析此文件中包含的数据，可以使用\
  \ `sys.fn_xe_file_target_read_file` 方法将其加载回 SQL Server，然后使用 XQuery 语法进行查询，如以下查询所示：\n\
  \n```sql\nSELECT\n    xe_data.value('(/event/action[@name=''sql_text'']/value)[1]','varchar(max)')\
  \ AS sql_text,\n    xe_data.value('(/event/@timestamp)[1]','datetime') AS timestamp,\n\
  \    xe_data.value('(/event/data[@name=''wait_type'']/text)[1]','varchar(50)') AS\
  \ wait_type,\n    xe_data.value('(/event/data[@name=''total_duration'']/value)[1]','int')\
  \ AS total_duration,\n    xe_data.value('(/event/data[@name=''signal_duration'']/value)[1]','int')\
  \ AS signal_duration\nFROM (\n    SELECT CAST(event_data AS xml) AS xe_data\n  \
  \  FROM sys.fn_xe_file_target_read_file('c:\\wait_*.xel', 'c:\\wait_*.xem', null,\
  \ null)\n) x;\nGO\n```\n\n`注意` 扩展事件可以用于比此处展示的简单示例更多的场景。有关更多信息和其他可能用途的示例，请参阅在线手册：`http://msdn.microsoft.com/en-us/library/bb630354.aspx`。\n\
  \n### 数据收集器\n\n数据收集器允许您根据指定的计划，自动从 DMV 和某些系统性能计数器收集性能数据，并将其上传到中央管理数据仓库（MDW）。SQL\
  \ Server 附带了三个预定义的系统收集集，其中从性能调整的角度来看，最有用的是 `server activity collection set`。`server\
  \ activity collection set` 结合了来自 `sys.dm_os_wait_stats`、`sys.dm_exec_sessions`、`sys.dm_exec_requests`\
  \ 和 `sys.dm_os_waiting_tasks` 等 DMV 的信息，以及各种 SQL Server 和 OS 性能计数器，提供了服务器上 CPU、磁盘\
  \ I/O、内存和网络资源使用的概览。默认情况下，每项指标每 60 秒采样一次，收集的数据每 15 分钟上传到 MDW 一次，数据在 MDW 中保留 14 天后被清除。如果需要，您可以基于性能计数器的收集器类型创建自己的自定义数据收集集，以调整收集计数器的定义、频率和持续时间。\n\
  \n之前讨论的其他分析工具主要用于针对特定目标区域的短期诊断和测试，而数据收集器是监控长期性能趋势的有用工具。历史性能数据可以长期收集和保留，并可以比较服务器在几个月甚至几年内的相对性能。数据收集器还提供了预先格式化的、可向下钻取的表格报告和图表，使得一眼就能相对容易地识别主要问题区域。图\
  \ 3-1 展示了从 `server activity collection set` 生成的默认报告。\n\n![](img/index-88_1.png)\n\
  \n*图 3-1. 服务器活动收集报告*\n\n## 分析性能数据\n\n在上一节中，我讨论了如何使用多种不同的工具和技术捕获 SQL Server 性能数据。在本节中，让我们考虑应该监控哪些数据，以及如何分析这些数据以构建数据库性能概况。\n\
  \n请注意，此处讨论的技术可能帮助您识别瓶颈和其他性能问题，但它们不涉及如何解决这些问题。在本书的其余部分，各种示例将讨论如何从性能角度审视代码以及如何解决某些问题，但请记住，本书并非旨在作为查询性能调整的全面指南。我强烈建议寻找更详细指南的读者投资一本专门讨论该主题的书籍，例如\
  \ Grant Fritchey 和 Sajal Dam 所著的《*SQL Server 2008 Query Performance Tuning Distilled*》（Apress，2009）。\n\
  \n## 捕获基线指标\n\n与单元测试和功能测试一样，在进行性能评估时，建立一个整体流程非常重要。性能测试应该是可重复的，并且应该在可以回滚的环境中进行，以便为多次测试运行复制相同的条件。\n\
  \n请记住，应用程序中的任何组件都可能以某种方式影响性能，因此每次从相同的起点开始至关重要。我建议使用一个测试数据库，该数据库可以在每次测试前恢复到其原始状态，并且在测试运行开始前重启所有涉及的服务器，以确保每次测试都从相同的初始条件开始。另一个可能比备份和恢复测试数据库更简单的选择是使用\
  \ SQL Server 2008 的数据库快照功能，或者如果您使用虚拟化环境，则从虚拟机映像恢复保存的状态。在您自己的环境中尝试每种技术，以确定哪种最适合您的测试系统。\n\
  \n除了确保服务器处于相同状态外，您还应该以完全相同的方式为每次测试运行收集完全相同的性能计数器、查询跟踪数据和其他指标。一致性是验证变更是否有效以及衡量其有效程度的关键。\n\
  \n在测试过程中，第一次运行的测试应用作为 `baseline`。基线测试期间捕获的指标将用于与后续运行的结果进行比较。当问题得到解决，或者测试条件发生变化时（例如，如果需要在某个领域收集更多性能计数器），您应该建立一个新的基线以继续进行。请记住，修复应用程序某个领域的问题可能会对另一个领域的性能产生影响。例如，某个给定的查询可能是\
  \ I/O 密集型的，而另一个可能是 CPU 密集型的。通过修复第一个查询的 I/O 问题，您可能会引入更高的 CPU 利用率，如果它们同时运行，反过来会导致另一个查询性能下降。\n\
  \n在数据库环境中建立基线指标通常是一个相当直接的过程。应使用服务器端跟踪来捕获性能数据，包括查询持续时间和使用的资源。然后可以聚合这些数据以确定查询的最小、最大和平均统计信息。为了确定哪些资源匮乏，可以使用性能计数器来跟踪服务器利用率。在进行更改以修复性能问题时，可以将基线数据与其他测试数据进行分析，以确定性能趋势。\n\
  \n## 全局分析\n\n"
- '# 性能测试：从何处开始


  一旦设置好了性能计数器和跟踪，你就准备好开始实际的性能测试了。但这引出了一个问题，“从哪里开始？”尤其是在一个大型遗留应用程序中，运行端到端的性能测试可能是一项艰巨的任务。


  第一步是确定存在哪些类型的单元测试和功能测试，并评估它们是否可以作为性能测试的起点。一些负载测试工具，例如 Microsoft 的 `Visual Studio
  Team System 2008`，能够直接对预构建的单元测试进行负载测试。然而，大多数商业负载工具是为直接操作应用程序或 Web 代码而设计的。尝试收集尽可能多的测试，以覆盖应用程序最常用的部分。绝对覆盖固然好，但在许多情况下是不现实的。


  下一步是使用预构建的单元测试和功能测试来实现一个负载测试套件。这可能会花费一些时间，具体取决于你使用的负载工具。关键是要确保负载工具向任何返回数据库的函数传递随机或半随机的输入，以模拟真实流量，并确保缓存不会对数字产生过大影响而扭曲结果。非随机输入可能会掩盖由缓冲区缓存回收引起的磁盘
  I/O 问题。


  ## 设置目标


  为测试设定目标，以确定你需要测试的负载水平。如果你在一个镜像应用程序生产环境的系统上进行测试，尝试在等于应用程序在高峰时段遇到的负载水平下进行测试。如果测试服务器的性能不如生产系统，则应相应地降低负载水平。请注意，在服务器规模与生产系统不同的情况下进行测试可能很困难。例如，如果生产数据库系统有八个处理器并连接到专用存储区域网络（`SAN`），而测试数据库系统有四个处理器和内部驱动器，则可能会出现
  I/O 不匹配。在这种情况下，建议修改测试系统上 `SQL Server` 的处理器亲和性，使可用的处理器功率减少，从而使可用处理器与可用磁盘 I/O 的比率与代码需要运行的实际环境保持一致。


  除了确保测试和生产系统规模相似外，还要确保两个系统中的 `SQL Server` 配置相似。例如，确保 `maximum degree of parallelism`
  设置相似，以便在测试和生产系统上查询对处理器的使用方式相同。同样，你应该监控 `RAM` 选项，以确保它们在两个系统上配置为等效的百分比——因此，如果你的生产系统有
  `16GB` 的 `RAM`，但 `SQL Server` 的 `maximum server memory` 设置是 `12GB`，你也会希望将测试系统设置为使用
  `75%` 的可用 `RAM`。


  ## 执行测试


  一旦用户目标设定，负载测试通常应配置为缓慢增加负载，而不是立即用峰值用户数冲击服务器。在测试期间逐渐增加负载可以更准确地模拟典型的生产环境，在这种环境中，服务器可能在维护期间重启，然后在遇到更活跃时段的更多请求之前，缓慢接受用户请求并预热其缓存。请注意，如果你正在测试诸如集群故障转移之类的情况，逐步测试可能不是一个准确的描绘，在那种情况下，服务器可能在启动后立即承受满负荷。


  整体测试的目标是查看系统整体扩展情况。尝试查看性能计数器的总体趋势，以确定系统是否能处理负载峰值，或者通常能承受长期持续的负载（再次强调，如果可能，应根据实际的应用程序使用模式）。在此期间捕获的数据可用于以后对特定组件进行更细致的分析。


  ## 细致分析


  如果整体测试的结果显示某些领域需要改进，通常需要对特定例程进行更细致的调查。使用从全系统测试收集的聚合跟踪数据，评估单个查询和作为一组的长时间运行或资源密集型查询是很重要的。


  虽然通常很容易只看最糟糕的查询——例如，那些持续时间最长的查询——但这可能无法说明全部情况。例如，你可能会注意到在高峰负载期间某些存储过程比其他过程运行时间更长。这些过程可能导致更长的用户界面等待时间，但持续时间最长的单个存储过程不一定表示单个最长的用户界面等待时间。这是因为许多应用程序在界面需要更新附加数据时会调用多个存储过程。在这些情况下，将同时调用的过程分组并聚合它们的总体资源利用率非常重要。


  在聚合一组查询的综合性能影响时，考虑这些过程的调用方式很重要：


  *   如果存储过程是按顺序调用的，则应将其各自的持续时间相加，以确定该组的总用户等待时间，并记录组中任何过程的最大资源利用率。

  *   另一方面，如果所有过程都是同时并行调用的（例如，在不同的连接上），则应总计资源利用率，以确定该组对系统的总体影响，并记录运行时间最长的单个查询的持续时间。


  例如，假设在一个给定的系统中，每当用户登录时，都会调用三个不同的存储过程来获取第一个屏幕的数据。表 3-1 显示了为这些存储过程收集的平均数据。


  *表 3-1. 登录后调用的存储过程及其平均数据*


  | 存储过程 | 持续时间 (ms) | CPU | 读取 | 写入 |

  | :--- | :--- | :--- | :--- | :--- |

  | LogSessionStart | 422 | 10 | ... | ... |

  | GetSessionData | 224 | 210 | ... | ... |

  | GetUserInfo | 305 | 166 | ... | ... |


  如果系统按顺序调用这些存储过程，则应为该组记录的总持续时间为 `951` ms (`422 + 224 + 305`)。由于每个都是单独调用的，因此在任何给定时间，对系统的总影响将仅达到给定列中的最大值。因此，我们记录
  `CPU` 为 `210`，`Reads` 为 `6408`，`Writes` 为 `1`。


  另一方面，如果这些存储过程是同时调用的，影响将会大不相同。总持续时间将仅为三个过程中运行时间最长的那个——`422`ms（当然，假设系统有足够的资源来同时处理所有三个请求）。然而，运行期间的
  `CPU` 时间应记录为 `386`，`Reads` 为 `9932`，`Writes` 为 `1`。


  通过对存储过程进行分组，可以评估特定功能的总体影响。可能的情况是，单个长时间运行的存储过程并非主要的性能罪魁祸首，而实际上被一组看似资源密集度较低的存储过程所掩盖。对于执行大量非常小的
  `fetch` 操作的游标来说，这也可能是一个问题。每个单独的 `fetch` 可能难以察觉，但作为一个整体来看，可能会清楚地看到该游标正在使用大量资源。


  这种分组的另一个好处是可以进行进一步的聚合。例如，给定这些数据，可以确定一定数量的用户同时登录对系统的影响有多大。在尝试达到特定的可扩展性目标时，这些信息可能很有用。


  ## 解决问题：关注显而易见的部分就足够了吗？



  当评估系统性能并试图确定从何处着手解决问题时，人们往往倾向于先关注那些最明显的“罪魁祸首”。然而，为了有效利用时间，应保持一定的审慎；在许多情况下，那些看似显而易见的问题，实际上是其他更微妙问题的副作用。


  在分析性能问题时，仅看 `Duration` 通常是最容易犯的错误。


  `Duration` 讲述了故事的主要部分，但它不一定表明该 `stored procedure`（存储过程）本身存在性能问题。它可能意味着该查询不得不等待其他一个或多个查询完成，或者该查询正在与其他查询竞争资源。进行性能调优时，最好对那些运行时间长但报告的资源利用率非常低的查询保持怀疑。这些往往根本不是真正的元凶。


  通过使用细粒度分析技术和聚合方法，通常更容易找到真正的罪魁祸首。例如，在一个交易量相当高的系统中，有一个 `procedure`（过程）会不时地被调用，向磁盘写入
  `10MB` 数据。该 `procedure` 报告了较高的 `Duration`，这被解读为可能的性能问题。不幸的是，该 `stored procedure`
  本身并没有太多可调优之处，但进一步的聚合分析揭示了系统中另一个 `stored procedure`，它每分钟被调用超过 `1,000` 次，每次调用向磁盘写入多达
  `50KB` 的数据。对第二个 `stored procedure` 的每次调用所报告的 `Duration` 都很小，似乎并未引起性能问题，但事实证明它在其他区域引发了问题。通过对其进行调优并减少每次调用写入的数据量，第一个
  `stored procedure` 的平均 `Duration` 显著降低了。


  ## 总结


  软件测试是一个复杂的领域，但开发人员有必要充分了解它，以使开发过程更有效。通过在开发过程中实施测试流程，可以用更低的成本交付更健壮的软件。


  与应用程序开发人员一样，数据库开发人员必须学会利用单元测试来提高软件项目的成功率。数据库例程无疑将从单元测试中受益，尽管性能测试也极其重要——而且更受管理团队的青睐。


  在性能测试期间，务必仔细分析数据。通过基于应用程序使用模式以各种方式重新组合数字，通常可以发现原始数据中并不明显的性能问题。`SQL Server 2008`
  提供了多种收集和呈现性能计数器的方法，我将在本书后面的章节中使用这些方法来分析不同方法所采取的相对性能。


  测试是区分优秀开发者和真正卓越开发者的重要因素之一。如果你尚未在开发过程中测试你的软件，那么本文介绍的方法论可以帮助你实施一套流程，让你更接近下一个层次。


