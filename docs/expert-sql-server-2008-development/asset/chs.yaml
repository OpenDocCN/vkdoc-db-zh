  \ conn = \n        new SqlConnection(\"context connection = true;\"))\n    {\n \
  \       SqlCommand comm = new SqlCommand();\n        comm.Connection = conn;\n \
  \       comm.CommandText = query;\n        conn.Open();\n        SqlDataReader read\
  \ = comm.ExecuteReader();\n```\n\n下一步是从 `SqlDataReader` 中提取每个列的元数据。使用一个名为 `GetSchemaTable`\
  \ 的方法来返回一个 `DataTable`，其中为每一列填充了一行数据。可用字段在 MSDN 文档库中有记录，但我接下来使用的代码是其中最常见的部分。\n\n\
  在用元数据填充 `object` 集合后，将其添加到输出的 `List` 中：\n\n```\n        DataTable dt = read.GetSchemaTable();\n\
  \        // 从架构表中填充字段列表\n        object[] fields = new object[dt.Rows.Count];\n\
  \        for (int i = 0; i < fields.Length; i++)\n        {\n            object[]\
  \ field = new object[5];\n            field[0] = dt.Rows[i][\"ColumnName\"];\n \
  \           field[1] = dt.Rows[i][\"ProviderType\"];\n            field[2] = dt.Rows[i][\"\
  ColumnSize\"];\n            field[3] = dt.Rows[i][\"NumericPrecision\"];\n     \
  \       field[4] = dt.Rows[i][\"NumericScale\"];\n            fields[i] = field;\n\
  \        }\n        // 将字段集合添加到输出列表\n        theList.Add(fields);\n```\n\n最后，代码循环遍历查询返回的行，使用\
  \ `GetValues` 方法将每一行提取到一个 `object` 集合并添加到输出中。这个 `List` 被转换成一个 `object[]` 数组（更准确地说，是\
  \ `object[][]`），然后被序列化并返回给调用者。\n\n``\n        // 将所有行添加到输出列表\n        while (read.Read())\n\
  \        {\n            object[] o = new object[read.FieldCount];\n            read.GetValues(o);\n\
  \            theList.Add(o);\n        }\n    }\n    // 第七章 „ SQLCLR：架构与设计考量\n  \
  \  // 序列化并返回输出\n    return new SqlBytes(\n        serialization_helper.getBytes(theList.ToArray()));\n\
  }\n```\n\n创建好这个函数后，调用它几乎与调用 `GetDataTable_Binary` 完全相同：\n\n```\nDECLARE @sql nvarchar(max);\n\
  SET @sql = 'SELECT BusinessEntityID,\n    NationalIDNumber,\n    LoginID,\n    OrganizationNode.ToString(),\n\
  \    OrganizationLevel,\n    JobTitle,\n    BirthDate,\n    MaritalStatus,\n   \
  \ Gender,\n    HireDate,\n    SalariedFlag,\n    VacationHours,\n    SickLeaveHours,\n\
  \    CurrentFlag,\n    rowguid,\n    ModifiedDate FROM HumanResources.Employee'\n\
  \nDECLARE @x varbinary(max);\nSET @x = dbo.GetBinaryFromQueryResult(@sql);\nGO\n\
  ```\n\n结果是一个 57KB 的二进制数据，相比 `DataTable` 方法，大小减少了 15%。如果使用此方法在远程服务器上的代理实例之间传输数据，相关的网络流量减少可能对性能产生显著影响。更重要的是，使用\
  \ `SqlDataReader` 的序列化性能是迄今为止最快的，平均查询执行时间仅为 0.0490 秒。\n\n### 二进制反序列化\n\n对 SQLCLR\
  \ 二进制序列化的结果感到满意，我决定继续进行反序列化。\n\n\n# 第 7 章 SQLCLR：架构与设计考量\n\n延续我对可重用潜力的强调，我认为存储过程会是比用户定义函数（UDF）更好的选择。存储过程不像\
  \ UDF 那样有固定的输出，因此任何输入表都可以被反序列化并返回，而无需担心违反列列表约定。\n\n存储过程的前半部分如下：\n\n`[Microsoft.SqlServer.Server.SqlProcedure]`\n\
  \n```csharp\npublic static void GetTableFromBinary(SqlBytes theTable)\n{\n    //反序列化输入\n\
  \    object[] dt = (object[])(\n        serialization_helper.getObject(theTable.Value));\n\
  \n    //首先，获取字段\n    object[] fields = (object[])(dt[0]);\n    SqlMetaData[] cols\
  \ = new SqlMetaData[fields.Length];\n\n    //遍历字段并填充 SqlMetaData 对象\n    for (int\
  \ i = 0; i < fields.Length; i++)\n    {\n        object[] field = (object[])(fields[i]);\n\
  \        SqlDbType dbType = (SqlDbType)field[1];\n```\n\n将输入字节反序列化回对象集合后，该集合中的第一项（假定为列元数据）被转换为一个对象集合。对此集合进行逐项遍历，以创建输出的\
  \ `SqlMetaData` 对象，这些对象将用于将数据流式传输回调用方。\n\n设置过程中最棘手的部分在于，每种 SQL Server 数据类型都需要一个不同的\
  \ `SqlMetaData` 重载。`decimal` 需要精度和小数位数设置；字符和二进制类型需要大小；而对于其他类型，大小、精度和小数位数都不适用。下面的\
  \ switch 语句处理了 `SqlMetaData` 实例的创建：\n\n```csharp\n        //根据数据类型的不同，\n       \
  \ //需要不同的 SqlMetaData 重载\n        switch (dbType)\n        {\n            case SqlDbType.Decimal:\n\
  \                cols[i] = new SqlMetaData(\n                    (string)field[0],\n\
  \                    dbType,\n                    (byte)field[3],\n            \
  \        (byte)field[4]);\n                break;\n\n            case SqlDbType.Binary:\n\
  \            case SqlDbType.Char:\n            case SqlDbType.NChar:\n         \
  \   case SqlDbType.NVarChar:\n            case SqlDbType.VarBinary:\n          \
  \  case SqlDbType.VarChar:\n                switch ((int)field[2])\n           \
  \     {\n                    //如果是 MAX 类型，则使用 -1 作为大小\n                    case\
  \ 2147483647:\n                        cols[i] = new SqlMetaData(\n            \
  \                (string)field[0],\n                            dbType,\n      \
  \                      -1);\n                        break;\n                  \
  \  default:\n                        cols[i] = new SqlMetaData(\n              \
  \              (string)field[0],\n                            dbType,\n        \
  \                    (long)((int)field[2]));\n                        break;\n \
  \               }\n                break;\n\n            default:\n            \
  \    cols[i] = new SqlMetaData(\n                    (string)field[0],\n       \
  \             dbType);\n                break;\n        }\n    }\n```\n\n列集合填充完成后，即可使用\
  \ `SqlPipe` 类的 `SendResults` 方法将数据发送回调用方。启动流之后，输入集合中剩余的对象会被遍历、强制转换为 `object[]`，并作为\
  \ `SqlDataRecords` 发送回去：\n\n```csharp\n    //开始结果流\n    SqlDataRecord rec = new\
  \ SqlDataRecord(cols);\n    SqlContext.Pipe.SendResultsStart(rec);\n\n    for (int\
  \ i = 1; i < dt.Length; i++)\n    {\n        rec.SetValues((object[])dt[i]);\n \
  \       SqlContext.Pipe.SendResultsRow(rec);\n    }\n\n    //结束结果流\n    SqlContext.Pipe.SendResultsEnd();\n\
  }\n```\n\n不仅二进制序列化测试取得了积极的结果，而且事实证明，以此方式准备的数据进行反序列化，其速度远超其他方法。性能测试显示，反序列化 `SqlDataReader`\
  \ 数据的平均时间仅为 `0.2666` 秒——比反序列化类似的 XML 数据快了一个数量级。\n\n本节讨论的三种方法各自最快优化版本的结果如表 7-1 所示。\n\
  \n*表 7-1. 不同序列化方法的结果*\n\n`方法`\n`平均序列化时间`\n`平均反序列化时间`\n`大小`\n\n`XML (使用 TYPE)`\n\
  `3.6687`\n`6.8157`\n`105KB`\n\n`二进制 (DataTable)`\n`0.0576`\n`—`\n`68KB`\n\n`二进制\
  \ (SqlDataReader)`\n`0.0490`\n`0.2666`\n`57KB`\n\n此示例展示了更好的网络利用率与快得多的序列化/反序列化相结合的效果，说明了在横向扩展和分布式处理场景中，SQLCLR\
  \ 如何成为在 Service Broker 实例之间传输表数据的一项出色技术。\n\n## 总结\n\n充分利用 SQLCLR 例程需要投入一些思考。前期的设计和架构考量将在安全性、可靠性和性能方面带来巨大收益。\n\
  \n在每个阶段，你也应考虑可重用性，以最小化当你在半年或一年后需要相同功能时必须完成的工作量。如果你已经编写过一次，为何还要再编写一次？\n\n为了说明这些概念，我展示了一个使用\
  \ `BinaryFormatter` 序列化表的示例，该示例可用于扩展 SQL Server Service Broker。我使用了一组通用的、核心的、更高权限的实用程序程序集，以限制外部表面面积，并尝试设计该解决方案以提升灵活性，使其能够在代码的生命周期内用于众多项目。\n\
  \n# 第 8 章 动态 T-SQL\n\n任何软件应用程序的总体目标都是提供一致、可靠的功能，使用户能够以有效的方式执行给定任务。因此，实现这一目标的第一步是保持应用程序无错误且按设计运行，达到预期标准。然而，一旦满足了这些基本要求，下一步就是尝试创造出色的用户体验，这就引出了一个问题：“用户想要什么？”答案往往是用户希望拥有灵活的界面，让他们能够以自己想要的方式控制数据。软件客户支持团队经常收到关于略微不同的排序顺序、筛选机制或数据输出的请求，这使得应用程序必须被设计为支持沿着这些方向的扩展性。\n\
  \n与其他数据相关的开发挑战一样，对灵活数据输出的此类请求往往会向下渗透到应用层次结构中，最终落到数据库（以及数据库开发人员）上。这在基于 Web 的应用程序开发中尤其如此，因为启用排序和筛选的客户端网格控件仍然相对较少，而且许多应用程序仍然使用轻量级的两层模型，没有专门的业务层来处理数据缓存和筛选。\n\
  \n数据库中的“灵活性”可以意味着许多事情，在我多年来参与的应用程序中，我遇到过一些非常有趣的方法，通常涉及创建大量的存储过程或复杂的嵌套控制流块。这些解决方案似乎总是弊大于利，并通过在数据库层引入大量额外的复杂性，使应用程序开发变得比原本困难得多。\n\
  \n在本章中，我将讨论如何使用动态 SQL 来解决这些问题，以及如何创建更灵活的存储过程。一些 DBA 和开发人员鄙视动态 SQL，通常认为它会导致性能、安全性或可维护性问题，而在许多情况下，只是因为他们不了解如何正确使用它。动态\
  \ SQL 是一个强大的工具，如果使用得当，它将是数据库开发人员工具箱中的巨大资产。关于它是什么以及何时或为何应该使用，存在很多错误信息和误解，我希望在本章中澄清一些迷思和误解。\n\
  \n*注意* 在本章中，我将用笔记本电脑上记录的性能测量和计时来说明对各种方法的讨论。有关如何在您自己的系统环境中捕获这些测量的更多信息，请参阅第 3 章中关于性能监控工具的讨论。\n\
  \n## 动态 T-SQL 与即席 T-SQL\n\n\n# 动态 SQL 使用探讨\n\n在开始深入讨论如何使用动态 SQL 之前，首先需要明确一些术语。在数据库领域，关于\
  \ SQL 的两个术语常常被混用：**dynamic**（动态）和 **ad hoc**（临时）。在本章中，我对这两个术语定义如下：\n\n*   临时 SQL（Ad\
  \ hoc SQL）是在应用层生成并发送到 SQL Server 执行的任何 SQL 批处理。这包括本书中几乎所有的代码示例，这些示例都是通过 SQL Server\
  \ Management Studio 输入和提交的。\n*   另一方面，动态 SQL（Dynamic SQL）是 *在 T-SQL 中* 生成并使用 `EXECUTE`\
  \ 语句执行，或者更推荐使用 `sp_executesql` 系统存储过程（本章稍后介绍）执行的 SQL 批处理。\n\n本章大部分内容将重点介绍如何使用存储过程来有效利用动态\
  \ SQL。\n\n然而，如果你是那些使用不采用存储过程的系统的开发者之一，我建议你至少阅读“SQL 注入”和“编译与参数化”这两个部分。这两个部分无疑也适用于临时\
  \ SQL 场景，并且极其重要。\n\n综上所述，我不建议在应用开发中使用临时 SQL，并且认为许多潜在的问题（特别是影响应用程序安全性和性能的问题）可以通过使用存储过程来避免。\n\
  \n## 存储过程与临时 SQL 之争\n\n数据库开发社区成员之间似乎存在一场永无止境的争论，焦点在于数据库应用开发是否应该使用存储过程。\n\n这场辩论可能变得相当激烈，支持测试驱动开发（TDD）等快速软件开发方法的人声称存储过程会拖慢他们的流程，而对象关系映射（ORM）技术的拥护者则声称这些技术优于存储过程。我强烈建议你搜索网络以了解这些争论并得出你自己的结论。就我个人而言，我非常倾向于使用存储过程，原因如下，我将在此简要讨论。\n\
  \n首先也是最重要的，存储过程在数据库和应用程序之间创建了一个抽象层，隐藏了模式的细节，有时也隐藏了数据的细节。将数据逻辑封装在存储过程内大大降低了数据库和应用程序之间的耦合，这意味着对数据库的维护或修改不需要相应地改变应用程序。减少这些依赖性并将数据库视为一个数据\
  \ API，而不是一个简单的应用持久层，能够实现灵活的应用程序开发过程。通常，这可以允许数据库和应用层并行开发，而不是按顺序开发，从而在给定项目上实现更大规模的人力资源扩展。有关封装、耦合以及将数据库视为\
  \ API 等概念的更多信息，请参见第 1 章。\n\n如果存储过程定义得当，具有记录良好且一致的输出，测试绝不会受到阻碍——可以轻松创建单元测试（如第 3 章所示）以支持\
  \ TDD。\n\n此外，得益于存储过程，支持更先进的测试方法也变得更容易，而不是更困难。例如，考虑使用 **mock objects**（模拟对象）——返回特定已知值的\
  \ façade 方法。在测试场景中，模拟对象可以替代真实方法，以便可以单独测试任何给定的方法，而无需同时测试它调用的任何方法（被测试方法内部的任何调用实际上都将是对方法的模拟版本的调用）。当使用存储过程时，这种技术实际上更容易实现，因为可以轻松创建模拟存储过程并将其换入换出，而不会中断或重新编译正在测试的应用程序代码。\n\
  \n另一个重要问题是安全性。临时 SQL（以及动态 SQL）带来了各种安全挑战，包括可能打开攻击向量，以及使得以声明式而非编程方式强制执行数据访问安全性变得更加困难。这意味着，通过使用临时\
  \ SQL，你的应用程序可能更容易被黑客攻击，并且你可能无法依赖 SQL Server 来保护数据访问。最终结果是需要进行更高程度的测试，以确保安全漏洞得到适当修补，并且用户（无论是授权用户还是未授权用户）无法访问他们本不应看到的数据。有关这些观点的进一步讨论，请参见“动态\
  \ SQL 安全注意事项”部分。\n\n最后，我将讨论在线辩论似乎总是倾向于的最热门问题，当然，那就是性能问题。临时 SQL 的支持者提出了一个有效的观点，由于最新版本的\
  \ SQL Server 对查询计划缓存的支持更好，存储过程与临时查询相比不再具有显著的性能优势。虽然这听起来像是一个不使用存储过程的绝佳理由，但我个人认为这是一个不成问题的问题。在性能相当的情况下，我认为显而易见的选择是更易于维护和更安全的选项（即存储过程）。\n\
  \n归根结底，存储过程与临时 SQL 的问题实际上是关于目的的问题。ORM 社区中的许多人认为数据库应该只用作一个非常简单的对象持久层，并且可能对只有一个表、只有两列（一个用于标识对象\
  \ ID 的 GUID 和一个用于序列化对象图的 XML 列）的数据库完全满意。\n\n在我看来，数据库远不止是数据的集合。它还是数据规则的执行者、数据完整性的保护者，以及可以跨多个应用程序共享的中央数据资源。\n\
  \n基于这些原因，我认为基于解耦的存储过程的设计是最佳选择。\n\n## 为何选择动态 SQL？\n\n正如本章引言所述，动态 SQL 可以帮助创建更灵活的数据访问层，从而帮助实现更灵活的应用程序，这会让用户更满意。这是一个正当的目标，但事实是，动态\
  \ SQL 只是实现预期最终结果的一种手段。在许多桌面应用程序中，直接在客户端进行动态排序和过滤是完全可能的——事实上通常是更可取的——或者在业务层（如果存在）中进行，以支持基于\
  \ Web 或客户端-服务器风格的桌面应用程序。也可以完全不采用动态 SQL，通过支持提供可选参数的静态存储过程来实现——但这通常不被推荐，因为它可能很快导致代码非常笨拙且难以维护，正如本章后面的“通过静态\
  \ T-SQL 实现可选参数”部分将演示的那样。\n\n在承诺采用任何基于数据库的解决方案之前，请确定它是否确实是正确的行动方针。请牢记性能、可维护性以及最重要的可扩展性问题。\n\
  \n数据库资源通常是特定应用程序使用的任何资源中负担最重的，而数据的动态排序和过滤可能意味着给数据库带来更多负载。请记住，扩展数据库通常比扩展应用程序的其他层要昂贵得多。\n\
  \n\n\n# 第八章：动态 T-SQL\n\n例如，考虑数据排序的问题。为了使数据库能够排序数据，必须先查询数据。这意味着数据必须从磁盘或内存中读取，从而使用\
  \ I/O 和 CPU 时间，经过适当筛选，最后排序并返回给调用者。每次需要以不同方式重新排序数据时，都必须重新读取或在内存中重新排序，并由数据库引擎重新筛选。\n\
  \n如果有成百上千的用户都试图以不同方式排序数据，并且共享同一数据库服务器上的资源，这些操作累积起来可能会造成相当大的负载。\n\n由于这个问题，如果相同的数据被反复重新排序（例如，一个用户想要查看各种高点或低点数据），在**断开连接的缓存**中完成这项工作通常是有意义的。例如，一个使用客户端数据网格的桌面应用程序，可以只加载一次数据，然后使用客户端计算机的资源进行排序和重新排序，而不是使用数据库服务器的资源。这可以大大减轻数据库服务器的压力，意味着它可以将资源用于其他数据密集型操作。\n\
  \n除了可扩展性问题之外，重要的是要注意，基于数据库的解决方案可能很棘手，且难以测试和维护。我在“走向动态：使用 EXECUTE”一节中提供了一些建议，但请记住，对于这些目的，过程式代码可能比\
  \ T-SQL 更容易处理。\n\n一旦你用尽了所有其他资源，*只有那时*才应将数据库视为动态操作的解决方案。在数据库层，使用动态 SQL 还是静态 SQL 的问题，归根结底是可维护性和性能两方面的问题。事实上，对于许多动态案例，动态\
  \ SQL 可以比简单的静态 SQL 表现出更好的性能，但更复杂（且更难维护）的静态 SQL 通常会比可维护的动态 SQL 解决方案性能更优。为了在维护和性能之间取得最佳平衡，我总是倾向于选择动态\
  \ SQL 解决方案。\n\n## 编译与参数化\n\n任何关于动态 SQL 和性能的讨论，如果不包含关于 SQL Server 如何处理查询并缓存其计划的基本背景信息，都是不完整的。为此，我将在此简要讨论一下，并提供一些示例，帮助你开始在\
  \ SQL Server 中研究这些行为。\n\nSQL Server 执行的每个查询在查询处理器实际执行之前，都会经历一个编译阶段。此编译会产生所谓的`查询计划`，它告诉查询处理器如何物理访问数据库中的表和索引以满足查询。然而，对于某些查询，查询编译可能代价高昂，当相同的查询或查询类型被反复执行时，通常没有理由每次都进行编译。\n\
  \n为了节省编译成本，SQL Server 将查询计划缓存到一个名为`查询计划缓存`的内存池中。\n\n`查询计划缓存`使用基于查询确切文本的简单哈希查找，以找到先前已编译的计划。如果确切的查询已经被编译过，则没有理由重新编译，SQL\
  \ Server 会直接跳到执行阶段，以便为调用者获取结果。\n\n如果未找到查询的已编译版本，则采取的第一步是解析查询。SQL Server 确定 SQL 中正在执行哪些操作，验证使用的语法，并生成`解析树`，这是一种以规范化形式包含查询信息的结构。`解析树`会进一步被验证，并最终编译成一个`查询计划`，该计划被放入`查询计划缓存`中，供查询的未来调用使用。\n\
  \n`查询计划缓存`对执行时间的影响即使在简单查询中也能看到。为了演示这一点，首先使用`DBCC FREEPROCCACHE`命令清空缓存：\n\n```\n\
  DBCC FREEPROCCACHE\n```\n\n\n# 第八章：动态 T-SQL\n\n## 查询计划缓存与编译时间\n\n`DBCC FREEPROCCACHE;`\n\
  \n`GO`\n\n请记住，此命令会清除整个 SQL Server 实例的缓存——通常不建议在生产环境中这样做。然后，要查看查询在解析和编译阶段所花费的时间，可以打开\
  \ SQL Server 的 `SET STATISTICS TIME` 选项，这会导致 SQL Server 输出有关解析/编译和执行所花费时间的信息性消息：\n\
  \n`SET STATISTICS TIME ON;`\n\n`GO`\n\n现在考虑以下 T-SQL，它查询 `AdventureWorks2008` 数据库中的\
  \ `HumanResources.Employee` 表：\n\n`注意`：从 SQL Server 2008 开始，SQL Server 不再附带任何示例数据库。要遵循本章中的代码清单，您需要从\
  \ CodePlex 网站（网址为 http://msftdbprodsamples.codeplex.com）下载并安装 `AdventureWorks2008`\
  \ 数据库。\n\n```sql\nSELECT *\nFROM HumanResources.Employee\nWHERE BusinessEntityId\
  \ IN (1, 2);\nGO\n```\n\n在我的系统上，在 SQL Server Management Studio 中首次运行此查询会产生以下输出消息：\n\
  \n```\nSQL Server parse and compile time:\n   CPU time = 0 ms, elapsed time = 12\
  \ ms.\n(2 row(s) affected)\nSQL Server Execution Times:\n   CPU time = 0 ms, elapsed\
  \ time = 1 ms.\n```\n\n此查询花费了 12 毫秒进行解析和编译。但后续运行会产生以下输出，表明正在使用缓存的计划：\n\n```\nSQL\
  \ Server parse and compile time:\n   CPU time = 0 ms, elapsed time = 1 ms.\n(2 row(s)\
  \ affected)\nSQL Server Execution Times:\n   CPU time = 0 ms, elapsed time = 1 ms.\n\
  ```\n\n由于缓存计划的存在，查询的每次后续调用比第一次调用少花费 11 毫秒——考虑到实际执行时间小于 1 毫秒（时间统计报告的最低耗时），这已经很不错了。\n\
  \n## 自动参数化\n\n解析过程的一个重要部分（在某些情况下使查询计划缓存更高效）涉及确定查询的哪些部分符合参数的条件。如果 SQL Server 确定查询中使用的一个或多个字面量是参数，并且可能在将来对类似版本查询的调用中更改，它可以\
  \ `自动参数化` 该查询。为了理解这意味着什么，让我们首先通过 `sys.dm_exec_cached_plans` 动态管理视图和 `sys.dm_exec_sql_text`\
  \ 函数查看查询计划缓存的内容。以下查询查找所有包含字符串 “HumanResources” 的缓存查询，排除那些包含 `sys.dm_exec_cached_plans`\
  \ 视图名称本身的查询——第二个谓词是必要的，这样结果中就不会包含此查询本身的计划。\n\n```sql\nSELECT\n   cp.objtype,\n \
  \  st.text\nFROM sys.dm_exec_cached_plans cp\nCROSS APPLY sys.dm_exec_sql_text(cp.plan_handle)\
  \ st\nWHERE\n   st.text LIKE '%HumanResources%'\n   AND st.text NOT LIKE '%sys.dm_exec_cached_plans%';\n\
  GO\n```\n\n`注意`：我将在本节中多次重用此代码来检查不同类型的查询的计划缓存，因此您可能希望将其在单独的 Management Studio 选项卡中打开。\n\
  \n在对 `HumanResources.Employee` 执行前面的查询后运行此代码清单，会得到以下结果：\n\n```\nobjtype text\n-------\
  \ ----\nAdhoc   SELECT * FROM HumanResources.Employee WHERE BusinessEntityId IN\
  \ (1, 2);\n```\n\n这里需要注意的重要事项是，`objtype` 列表明该查询被视为 `Adhoc`（即席查询），并且 `Text` 列显示了已执行查询的确切文本。无法自动参数化的查询被查询引擎分类为“ad\
  \ hoc”（即席查询，请注意，这与我使用的定义略有不同）。\n\n前面的示例查询被用来保持简单性，正是因为它不能被自动参数化。而下面的查询可以自动参数化：\n\
  \n```sql\nSELECT *\nFROM HumanResources.Employee\nWHERE BusinessEntityId = 1;\n\
  GO\n```\n\n\n# 第 8 章 - 动态 T-SQL\n\n`sys.dm_exec_cached_plans` 如前所述，其输出结果如下所示：\n\n\
  ```\nobjtype text\nAdhoc SELECT * FROM HumanResources.Employee WHERE BusinessEntityId\
  \ = 1;\nPrepared (@1 tinyint)SELECT * FROM [HumanResources].[Employee] WHERE [BusinessEntityId]=@1\n\
  ```\n\n在这种情况下，已生成两个计划：一个是针对查询确切文本的 `Adhoc` 计划，另一个是针对该查询自动参数化版本的 `Prepared` 计划。查看后一个计划的文本，可以注意到查询已被规范化（对象名称用方括号限定，删除了回车符和其他多余的空白等），并且已从查询文本中推导出一个参数。\n\
  \n这种自动参数化的好处在于，随后提交给 SQL Server 的、能够自动参数化为相同规范化形式的查询，可能能够利用已准备好的查询计划，从而避免编译开销。\n\
  \n> **注意：** 此处展示的自动参数化示例基于 `AdventureWorks2008` 数据库的默认设置，包括“简单参数化”选项。SQL Server\
  \ 2008 包含一种更强大的自动参数化形式，称为“强制参数化”。此选项使 SQL Server 尽可能地尝试自动参数化查询，这意味着在某些情况下查询编译成本会更高。这对于使用大量未参数化即席查询的应用程序可能非常有益，但在其他情况下可能导致性能下降。有关强制参数化的更多信息，请参见\
  \ http://msdn.microsoft.com/en-us/library/ms175037.aspx。\n\n## 应用程序级参数化\n\n自动参数化并不是查询可以参数化的唯一方式。对于即席\
  \ SQL，在应用程序级别可能存在其他形式的参数化；或者在存储过程中使用动态 SQL 时，在 T-SQL 内部也可能实现参数化。本章稍后的章节 `sp_executesql：更优的\
  \ EXECUTE` 描述了如何对动态 SQL 进行参数化，但这里我将简要讨论应用程序级参数化。\n\n每个能够与 SQL Server 通信的查询框架都支持远程过程调用（`RPC`）的概念来调用查询。在\
  \ `RPC` 调用的情况下，参数是绑定且强类型的，而不是编码为字符串并与查询文本的其余部分一起传递。\n\n从性能角度来看，以这种方式对查询进行参数化有一个关键优势：应用程序告诉\
  \ SQL Server 参数是什么；SQL Server 不需要（也不会）自己尝试去寻找它们。\n\n要查看实际的程序级参数化，以下代码清单演示了如何通过 `ADO.NET`\
  \ 发出参数化查询所需的 C# 代码，方法是在准备查询时填充 `SqlCommand` 对象上的 `Parameters` 集合。\n\n```csharp\n\
  SqlConnection sqlConn = new SqlConnection(\n\"Data Source=localhost; Initial Catalog=AdventureWorks2008;\
  \ Integrated Security=SSPI\");\nsqlConn.Open();\nSqlCommand cmd = new SqlCommand(\n\
  \"SELECT * FROM HumanResources.Employee WHERE BusinessEntityId IN (@Emp1, @Emp2)\"\
  , sqlConn);\nSqlParameter param = new SqlParameter(\"@Emp1\", SqlDbType.Int);\n\
  param.Value = 1;\ncmd.Parameters.Add(param);\nSqlParameter param2 = new SqlParameter(\"\
  @Emp2\", SqlDbType.Int);\nparam2.Value = 2;\ncmd.Parameters.Add(param2);\ncmd.ExecuteNonQuery();\n\
  sqlConn.Close();\n```\n\n> **注意：** 您需要更改上述代码清单中 `SqlConnection` 对象使用的连接字符串，以匹配您的服务器。\n\
  \n请注意，基础查询与本章展示的第一个查询相同，该查询在通过 Management Studio 作为 T-SQL 查询发出时，无法被 SQL Server 自动参数化。然而，在此情况下，字面量员工\
  \ ID 已被替换为变量 `@EmpId1` 和 `@EmpId2`。\n\n执行此代码清单，然后使用上一节的查询再次检查 `sys.dm_exec_cached_plans`\
  \ 视图，将得到以下结果：\n\n```\nobjtype text\n```\n\n\n# 动态 T-SQL\n\n## 预编译查询与执行计划标准化\n\n\
  ```\nPrepared (@Emp1 int,@Emp2 int)SELECT * FROM HumanResources.Employee\n\nWHERE\
  \ BusinessEntityId IN (@Emp1, @Emp2)\n```\n\n与自动参数化查询类似，该执行计划是预编译的，且查询文本前缀了参数。但是，请注意，查询的文本并未被标准化。对象名称没有方括号界定，而且虽然可能不明显，但空白符也未被移除。这一点至关重要！如果你运行同一个查询但使用了稍微不同的格式，你将会得到第二个执行计划——因此，在使用参数化查询时，请确保生成查询的应用程序每次都产生完全相同的格式。否则，你最终将浪费不必要的编译所需的\
  \ CPU 周期以及用于缓存额外计划的内存。\n\n> **`注意`** 空白符并非唯一能影响执行计划重用的格式类型。缓存查找机制不过是对查询文本进行简单的哈希运算，并且它是大小写敏感的。因此，一个大小写不同的相同查询被提交两次，在缓存看来会被视为两个不同的查询——即使是在大小写不敏感的服务器上。在使用\
  \ SQL Server 时，尽量保持大小写和格式的一致性始终是一个好主意。这不仅使你的代码更具可读性，还可能最终提升性能！\n\n## 参数化与缓存的性能影响\n\
  \n既然所有背景信息都已介绍完毕，那个迫切的问题便可以得到解答：你为何应该关心，以及这一切与动态 SQL 有何关联？答案当然是，如果你关心性能（以及其他问题，我们很快会讲到），那么这与动态\
  \ SQL 有着莫大的关系。\n\n例如，假设我们将之前的应用程序代码放入一个循环中——调用同一个查询 2,000 次，并且每次迭代只更改提供的参数值：\n\n\
  ```\nSqlConnection sqlConn = new SqlConnection(\n    \"Data Source=localhost;\"\
  \ +\n    \"Initial Catalog=AdventureWorks2008;\" +\n    \"Integrated Security=SSPI\"\
  );\n\nsqlConn.Open();\n\nfor (int i = 1; i <= 2000; i++)\n{\n    SqlCommand cmd\
  \ = new SqlCommand(\n        \"SELECT * FROM HumanResources.Employee \" +\n    \
  \    \"WHERE BusinessEntityId IN (@Emp1, @Emp2)\",\n        sqlConn);\n\n    SqlParameter\
  \ param = new SqlParameter(\"@Emp1\", SqlDbType.Int);\n    param.Value = i;\n  \
  \  cmd.Parameters.Add(param);\n\n    SqlParameter param2 = new SqlParameter(\"@Emp2\"\
  , SqlDbType.Int);\n    param2.Value = i + 1;\n    cmd.Parameters.Add(param2);\n\n\
  \    cmd.ExecuteNonQuery();\n}\n\nsqlConn.Close();\n```\n\n再次回到 SQL Server Management\
  \ Studio 并查询 `sys.dm_exec_cached_plans` 视图，你会发现结果并未改变。尽管这个查询刚刚以不同的参数值运行了 2,000 次，但缓存中针对此形式的查询只有一个执行计划：\n\
  \n```\nobjtype text\n------- -----------------------------------------------------------------\n\
  Prepared (@Emp1 int,@Emp2 int)SELECT * FROM HumanResources.Employee\n          \
  \                    WHERE BusinessEntityId IN (@Emp1, @Emp2)\n```\n\n这个结果表明参数化正在生效，服务器不需要在每次提交一个形式略有不同的查询时都进行额外的编译工作。\n\
  \n既然已经建立了积极的基准线，现在让我们来研究一下当查询*没有*被正确参数化时会发生什么。考虑一下，如果我们把应用程序代码循环设计成如下形式，将会发生什么：\n\
  \n```\nSqlConnection sqlConn = new SqlConnection(\n    \"Data Source=localhost;\"\
  \ +\n    \"Initial Catalog=AdventureWorks2008;\" +\n    \"Integrated Security=SSPI\"\
  );\n\nsqlConn.Open();\n\nfor (int i = 1; i < 2000; i++)\n{\n    SqlCommand cmd =\
  \ new SqlCommand(\n        \"SELECT * FROM HumanResources.Employee \" +\n      \
  \  \"WHERE BusinessEntityId IN (\" + i + \", \" + (i+1) + \")\",\n        sqlConn);\n\
  \n    cmd.ExecuteNonQuery();\n}\n\nsqlConn.Close();\n```\n\n运行此代码后，查询执行计划缓存的简化结果如下所示：\n\
  \n```\nobjtype text\n------- -----------------------------------------------------------------------------------------\n\
  Adhoc   SELECT * FROM HumanResources.Employee WHERE BusinessEntityId IN (1, 2)\n\
  Adhoc   SELECT * FROM HumanResources.Employee WHERE BusinessEntityId IN (2, 3)\n\
  ```\n\n\n# 非参数化查询的性能与资源问题\n\n`Adhoc SELECT * FROM HumanResources.Employee WHERE\
  \ BusinessEntityId IN (3, 4)`\n\n...1,995 行之后...\n\n`Adhoc SELECT * FROM HumanResources.Employee\
  \ WHERE BusinessEntityId IN (1998...`\n\n`Adhoc SELECT * FROM HumanResources.Employee\
  \ WHERE BusinessEntityId IN (1999...`\n\n运行 2,000 个带有不同参数的非参数化即席查询会导致生成 2,000 个额外的缓存计划。这意味着查询执行不仅会因为额外的编译而经历性能下降，而且查询计划缓存中还会浪费相当多的\
  \ RAM。在 SQL Server 2008 中，查询计划会按照最近最少使用（LRU）的原则从计划缓存中老化退出，而根据服务器的工作负载情况，未使用的计划可能需要很长时间才能被清除。\n\
  \n在大型生产环境中，不使用参数化查询可能导致数 GB 的 RAM 被浪费在缓存那些永远不会再被使用的查询计划上。这显然不是件好事！\n\n所以，为了那些宝贵的\
  \ RAM——请学会使用你的连接库的参数化查询功能，避免陷入这个陷阱。\n\n## 支持可选参数\n\n动态 SQL 最常被引用的用例是能够以高效、可维护的方式编写支持可选查询参数的存储过程。尽管编写处理可选查询参数的静态存储过程相当容易，但这些过程通常要么效率极差，要么难以维护——作为开发者，你只能二选一。\n\
  \n## 通过静态 T-SQL 处理可选参数\n\n在介绍可选参数问题的动态 SQL 解决方案之前，有必要通过几个演示来说明为什么静态 SQL 并`不是`完成这项工作的合适工具。有几种不同的方法可以创建支持可选参数的静态查询，其复杂性和有效性各不相同，但每种解决方案都存在缺陷。\n\
  \n作为基准，考虑以下查询，它从 AdventureWorks2008 数据库的 `HumanResources.Employee` 表中选择一行数据：\n\n\
  ```sql\nSELECT\n    BusinessEntityID,\n    LoginID,\n    JobTitle\nFROM\n    HumanResources.Employee\n\
  WHERE\n    BusinessEntityID = 28\n    AND NationalIDNumber = N'14417807';\nGO\n\
  ```\n\n该查询使用谓词对 `BusinessEntityID` 和 `NationalIDNumber` 两列进行筛选。\n\n执行该查询会产生如图 8-1\
  \ 所示的执行计划，其估计开销为 0.0032831，并且需要两次逻辑读取。该计划涉及对表聚集索引的搜索，该索引使用 `BusinessEntityID` 列作为其键。\n\
  \n*图 8-1. 在 `BusinessEntityID` 聚集索引上进行搜索的基础执行计划*\n\n由于查询使用了聚集索引，因此不需要进行查找来获取任何额外数据。此外，由于\
  \ `BusinessEntityID` 是表的主键，在物理识别行时并不使用 `NationalIDNumber` 谓词。因此，仅使用 `BusinessEntityId`\
  \ 谓词的以下查询会产生完全相同的查询计划，具有相同的开销和读取次数：\n\n```sql\nSELECT\n    BusinessEntityID,\n \
  \   LoginID,\n    JobTitle\nFROM\n    HumanResources.Employee\nWHERE\n    BusinessEntityID\
  \ = 28;\nGO\n```\n\n这种查询的另一种形式是移除 `BusinessEntityID`，仅基于 `NationalIDNumber` 进行查询：\n\
  \n```sql\nSELECT\n    BusinessEntityID,\n    LoginID,\n    JobTitle\nFROM\n    HumanResources.Employee\n\
  WHERE\n    NationalIDNumber = N'14417807';\nGO\n```\n\n由于必须使用不同的索引来满足查询，此查询产生的计划与前两个非常不同。图\
  \ 8-2 显示了结果计划，该计划涉及对 `NationalIDNumber` 列上非聚集索引的搜索，然后进行查找以获取 `SELECT` 列表所需的额外行。该计划的估计开销为\
  \ 0.0065704，并执行四次逻辑读取。\n\n*图 8-2. 在 `NationalIDNumber` 非聚集索引上进行搜索，然后在聚集索引中进行查找的基础执行计划*\n\
  \n基础查询的最后一种形式没有任何谓词：\n\n```sql\nSELECT\n    BusinessEntityID,\n    LoginID,\n```\n\
  \n\n\n# 第 8 章 动态 T-SQL\n\n## 图 8-3. 基于聚集索引扫描的基础执行计划\n\n如图 8-3 所示，本例中的查询计划是一个简单的聚集索引扫描，估计开销为\
  \ 0.0080454，逻辑读取次数为 9 次。由于需要返回所有行，且没有索引覆盖所需的所有列，因此聚集索引扫描是满足此查询的最有效方式。\n\n这些基线数据将用于比较创建动态存储过程的各种方法的相对性能，这些过程返回相同的列，但可选择地根据`BusinessEntityID`和`NationalIDNumber`中的一个或两个谓词对返回的行进行过滤。首先，可以将查询包装在存储过程中：\n\
  \n```sql\nCREATE PROCEDURE GetEmployeeData\n    @BusinessEntityID int = NULL,\n\
  \    @NationalIDNumber nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n \
  \   SELECT\n        BusinessEntityID,\n        LoginID,\n        JobTitle\n    FROM\n\
  \        HumanResources.Employee\n    WHERE\n        BusinessEntityID = @BusinessEntityID\n\
  \        AND NationalIDNumber = @NationalIDNumber;\nEND;\nGO\n```\n\n此存储过程使用参数`@BusinessEntityID`和`@NationalIDNumber`来支持谓词。这两个参数都是可选的，默认值为`NULL`。然而，此存储过程并未真正可选地支持这些参数；不传递其中一个参数将意味着存储过程根本不会返回任何行，因为在谓词中与`NULL`进行任何比较都不会得出`TRUE`的结果。\n\
  \n作为使此存储过程支持可选谓词的首次尝试，开发人员可能会尝试使用控制流语句重写该过程，如下所示：\n\n```sql\nALTER PROCEDURE GetEmployeeData\n\
  \    @BusinessEntityID int = NULL,\n    @NationalIDNumber nvarchar (15) = NULL\n\
  AS\nBEGIN\n    SET NOCOUNT ON;\n\n    IF (@BusinessEntityID IS NOT NULL AND @NationalIDNumber\
  \ IS NOT NULL)\n    BEGIN\n        SELECT\n            BusinessEntityID,\n     \
  \       LoginID,\n            JobTitle\n        FROM\n            HumanResources.Employee\n\
  \        WHERE\n            BusinessEntityID = @BusinessEntityID\n            AND\
  \ NationalIDNumber = @NationalIDNumber;\n    END\n    ELSE IF (@BusinessEntityID\
  \ IS NOT NULL)\n    BEGIN\n        SELECT\n            BusinessEntityID,\n     \
  \       LoginID,\n            JobTitle\n        FROM\n            HumanResources.Employee\n\
  \        WHERE\n            BusinessEntityID = @BusinessEntityID;\n    END\n   \
  \ ELSE IF (@NationalIDNumber IS NOT NULL)\n    BEGIN\n        SELECT\n         \
  \   BusinessEntityID,\n            LoginID,\n            JobTitle\n        FROM\n\
  \            HumanResources.Employee\n        WHERE\n            NationalIDNumber\
  \ = @NationalIDNumber;\n    END\n    ELSE\n    BEGIN\n        SELECT\n         \
  \   BusinessEntityID,\n            LoginID,\n            JobTitle\n        FROM\n\
  \            HumanResources.Employee;\n    END\nEND;\nGO\n```\n\n尽管执行此存储过程产生的查询计划与测试批处理中创建的等效单独查询完全相同——因此性能也完全相同——但它存在一个不幸的问题。即，采用这种方法将原本非常简单的\
  \ 10 行存储过程变成了一个 42 行的庞然大物。\n\n为此过程的选择列表添加一个列，就需要在四个地方进行更改。现在考虑如果需要第三个谓词会发生什么——情况数量将从四个跃升至八个，这意味着任何更改（如添加或删除列）都必须在八个地方进行。现在考虑\
  \ 10 或 20 个谓词，显然这种方法在 SQL Server 开发人员的工具箱中没有立足之地。它根本不是一个可管理的解决方案。\n\n下一个最常见的技术在过去几年中出现在多个\
  \ SQL Server 网站的文章中。因此，许多开发人员基于此编写了大量代码，而他们似乎没有意识到自己正在制造一颗性能定时炸弹。此技术利用了`COALESCE`函数，如以下重写的存储过程版本所示：\n\
  \n```sql\nALTER PROCEDURE GetEmployeeData\n    @BusinessEntityID int = NULL,\n \
  \   @NationalIDNumber nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n  \
  \  SELECT\n        BusinessEntityID,\n        LoginID,\n        JobTitle\n    FROM\n\
  \        HumanResources.Employee\n    WHERE\n        BusinessEntityID = COALESCE(@BusinessEntityID,\
  \ BusinessEntityID)\n        AND NationalIDNumber = COALESCE(@NationalIDNumber,\
  \ NationalIDNumber);\nEND;\nGO\n```\n\n\n\n此版本的存储过程看起来很棒，也易于理解。`COALESCE` 函数会返回传入其参数列表中的第一个\
  \ `NULL` 值。因此，如果存储过程的任一参数为 `NULL`，`COALESCE` 将会“直通”，将列的值与其自身进行比较——至少在理论上，这似乎不需要任何处理，因为它总是成立的。\n\
  \n不幸的是，由于 `COALESCE` 函数将表中的列用作输入，它无法在查询执行前进行确定性求解。结果是，无论提供何种参数组合，该函数都会针对表的每一行求解一次。这导致了*一致的*性能结果，但可能不是好的那种；所有四种参数组合都产生了相同的查询计划：一次聚集索引扫描，估计开销为\
  \ `0.0080454`，并产生九次逻辑读取。这比涉及 `BusinessEntityID` 列的查询的 I/O 高出四倍多——性能消耗相当大。\n\n##\
  \ 使用 OR\n\n类似于使用 `COALESCE` 的版本，有一个版本使用 `OR` 来仅在参数不为 `NULL` 时有条件地设置参数：\n\n```sql\n\
  ALTER PROCEDURE GetEmployeeData\n    @BusinessEntityID int = NULL,\n    @NationalIDNumber\
  \ nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    SELECT\n        BusinessEntityID,\n\
  \        LoginID,\n        JobTitle\n    FROM\n        HumanResources.Employee\n\
  \    WHERE\n        (@BusinessEntityID IS NULL OR BusinessEntityID = @BusinessEntityID)\n\
  \        AND (@NationalIDNumber IS NULL OR @NationalIDNumber = NationalIDNumber);\n\
  END;\nGO\n```\n\n这个版本，虽然在思路上与使用 `COALESCE` 的版本相似，但具有一些有趣的性能特性。根据你第一次调用它时使用的参数，你会看到截然不同的结果。如果你足够幸运，第一次调用时没有参数，结果将是一次索引扫描，产生九次逻辑读取——并且之后无论传入何种参数组合，都将产生相同的读取次数。然而，如果你第一次调用存储过程时仅使用了\
  \ `@BusinessEntityID` 参数，由此产生的计划将只使用四次逻辑读取——直到你碰巧在没有任何参数的情况下调用该过程，这将产生巨大的 `582`\
  \ 次读取。\n\n鉴于糟糕计划可能导致的 I/O 令人惊讶地激增，以及你最终会得到何种性能特性的不可预测性，这无疑是最糟糕的选择。\n\n## 使用 BETWEEN\
  \ 和 LIKE 与 COALESCE\n\n可以使用的最后一种方法更具创意，也可能产生稍好的结果。以下版本的存储过程展示了其实现方式：\n\n```sql\n\
  ALTER PROCEDURE GetEmployeeData\n    @BusinessEntityID int = NULL,\n    @NationalIDNumber\
  \ nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    SELECT\n        BusinessEntityID,\n\
  \        LoginID,\n        JobTitle\n    FROM\n        HumanResources.Employee\n\
  \    WHERE\n        BusinessEntityID BETWEEN COALESCE(@BusinessEntityID, -2147483648)\
  \ AND\n            COALESCE(@BusinessEntityID, 2147483647)\n        AND NationalIDNumber\
  \ LIKE COALESCE(@NationalIDNumber, N'%');\nEND;\nGO\n```\n\n如果你对这个存储过程的逻辑感到有点困惑，那么你现在就熟悉了我不推荐这种技术的第一个原因：如果你不完全理解它是如何工作的，它的可维护性就相对较低。使用它几乎可以保证你会创建出让未来试图维护它们的其他人感到困惑的存储过程。虽然这可能对工作保障有好处，但以此为目的使用它可能并不是一个正当的目标。\n\
  \n此存储过程通过使用 `COALESCE` 来抵消 `NULL` 参数，方法是为整数谓词 (`BusinessEntityID`) 替换为最小和最大条件，并为字符串谓词\
  \ (`NationalIDNumber`) 替换一个将匹配任何内容的 `LIKE` 表达式。这种方法的运作方式如下：如果 `@BusinessEntityID`\
  \ 为 `NULL`，则 `BusinessEntityID` 谓词实际上变为 `BusinessEntityID BETWEEN -2147483648 AND\
  \ 2147483647`——换句话说，即所有可能的整数。如果 `@BusinessEntityID` 不为 `NULL`，谓词则变为 `BusinessEntityID\
  \ BETWEEN @BusinessEntityID AND @BusinessEntityID`。这等价于 `BusinessEntityID=@BusinessEntityID`。\n\
  \n`NationalIDNumber` 谓词的基本逻辑相同，尽管因为它是字符串而不是整数，所以使用了 `LIKE` 而不是 `BETWEEN`。如果 `@NationalIDNumber`\
  \ 为 `NULL`，谓词变为 `NationalIDNumber LIKE N'%'`。这将匹配 `NationalIDNumber` 列中的任何字符串。另一方面，如果\
  \ `@NationalIDNumber` 不为 `NULL`，谓词变为 `NationalIDNumber LIKE @NationalIDNumber`，这等价于\
  \ `NationalIDNumber=@NationalIDNumber`——前提是 `@NationalIDNumber` 不包含字符串表达式。此谓词也可以使用\
  \ `BETWEEN` 来编写，以避免字符串表达式问题（例如，`BETWEEN N'' AND REPLICATE(nchar(1000), 15)`）。然而，这种方法不仅比\
  \ `LIKE` 表达式更难阅读，而且由于排序规则问题而充满潜在问题（这就是为什么在示例中我只用到 `nchar(1000)` 而不是 `nchar(65535)`）。\n\
  \n当然，真正的问题是性能。不幸的是，这个存储过程设法迷惑了查询优化器，导致每次调用都生成相同的计划。在每种情况下，该计划都涉及对表的聚集索引查找，估计开销为\
  \ `0.0033107`，如图 8-4 所示。不幸的是，这个估计被证明是高度不一致的，因为实际逻辑读取的数量会根据传递给过程的参数而有很大差异。\n\n*图\
  \ 8-4. 传递给存储过程的每组参数都会产生相同的执行计划。*\n\n如果两个参数都被传递，或者传递了 `@BusinessEntityID` 但没有传递 `@NationalIDNumber`，逻辑读取次数为三。虽然这比之前版本的存储过程所需的九次逻辑读取要好得多，但在两种情况下，它仍然比基线所需的两次逻辑读取多出\
  \ 50% 的 I/O。当仅传递 `@NationalIDNumber` 时，这个估计计划就完全失效了，因为无法使用聚集索引高效地满足对 `NationalIDNumber`\
  \ 列的查询。在那种情况和没有传递参数的情况下，都会报告九次逻辑读取。对于 `NationalIDNumber` 谓词来说，这是一个相当大的失败，因为存储过程为相同的结果所做的工作是基线的两倍多。\n\
  \n## 动态化：使用 EXECUTE\n\n当然，解决上述所有静态 SQL 问题的方法是使用动态 SQL。在存储过程中构建动态 SQL 很简单，代码相对容易理解，而且正如我将展示的，它可以提供出色的性能。然而，需要注意各种潜在问题，其中最重要的是安全问题。随着示例的进行，我将解释如何处理这些问题。\n\
  \n动态 SQL 的真正好处在于，为每次调用查询生成的执行计划将仅针对该时刻实际使用的谓词进行优化。静态 SQL 解决方案的主要问题，除了可维护性之外，是额外的谓词迷惑了查询优化器，导致它创建低效的计划。动态\
  \ SQL 通过不在查询中包含任何多余内容来解决这个问题。\n\n在存储过程中实现动态 SQL 最简单的方法是使用 `EXECUTE` 语句。该语句接受一个字符串输入并执行字符串中包含的任何\
  \ SQL。以下批处理展示了其最简单——也是效果最差——的形式：\n\n```sql\nEXEC('SELECT\n        BusinessEntityID,\n\
  \        LoginID,\n        JobTitle\n    FROM HumanResources.Employee');\nGO\n```\n\
  \n\n\n# 第 8 章：动态 T-SQL\n\n请注意，在此示例（以及本章所有其他示例）中，我使用的是 `EXECUTE` 的缩写形式。这似乎是 SQL Server\
  \ 代码的一种事实标准；我很少见到使用完整“UTE”的写法。尽管这仅仅节省了三个字符，但我已非常习惯看到这种缩写，并且出于某种原因，在阅读 SQL 时，这比看到完整的\
  \ `EXECUTE` 关键字让我感觉清晰得多。\n\n在这个例子中，传递给 `EXECUTE` 的是一个字符串字面值，这确实无法实现非常“动态”的操作。例如，要在查询中添加一个针对\
  \ `BusinessEntityID` 的谓词，以下写法将不起作用：\n\n```sql\nDECLARE @BusinessEntityID int = 28;\n\
  \nEXEC('SELECT\n    BusinessEntityID,\n    LoginID,\n    JobTitle\nFROM HumanResources.Employee\n\
  WHERE BusinessEntityID = ' + CONVERT(varchar, @BusinessEntityID));\n\nGO\n```\n\n\
  这会失败（抛出“语法不正确”异常），原因是 SQL Server 引擎解析 `EXECUTE` 的方式。SQL Server 仅进行一次解析以检查语法，然后在第二个步骤中尝试拼接并执行\
  \ SQL。但由于第一步不包含内联展开的阶段，当进行拼接时，`CONVERT` 仍然是一个 `CONVERT` 函数，而不是一个字面值。\n\n解决此问题的方法非常简单。定义一个变量，将动态\
  \ SQL 赋值给它，*然后*调用 `EXECUTE`：\n\n```sql\nDECLARE @BusinessEntityID int = 28;\nDECLARE\
  \ @sql nvarchar(max);\n\nSET @sql = 'SELECT\n    BusinessEntityID,\n    LoginID,\n\
  \    JobTitle\nFROM HumanResources.Employee\nWHERE BusinessEntityID = ' + CONVERT(VARCHAR,\
  \ @BusinessEntityID);\n\nEXEC (@sql);\n\nGO\n```\n\n字符串变量 `@sql` 可以以任何方式进行操作，以形成所需的动态\
  \ SQL 字符串。由于它是一个变量，可以使用流程控制语句创建不同的代码路径。换句话说，构建动态 SQL 现在仅受限于 T-SQL 语言中用于字符串操作的工具。\n\
  \n下面是一个初步尝试，可选择性地包含 `BusinessEntityID` 和 `NationalIDNumber` 谓词：\n\n```sql\nDECLARE\
  \ @BusinessEntityID int = 28;\nDECLARE @NationalIDNumber nvarchar(15) = N'14417807';\n\
  DECLARE @sql nvarchar(max);\n\nSET @sql = 'SELECT\n    BusinessEntityID,\n    LoginID,\n\
  \    JobTitle\nFROM HumanResources.Employee ';\n\nIF (@BusinessEntityID IS NOT NULL\
  \ AND @NationalIDNumber IS NOT NULL)\nBEGIN\n    SET @sql = @sql +\n        'WHERE\
  \ BusinessEntityID = ' + CONVERT(nvarchar, @BusinessEntityID) +\n        ' AND NationalIDNumber\
  \ = N''' + @NationalIDNumber + '''';\nEND\nELSE IF (@BusinessEntityID IS NOT NULL)\n\
  BEGIN\n    SET @sql = @sql +\n        'WHERE BusinessEntityID = ' +\n        CONVERT(nvarchar,\
  \ @BusinessEntityID);\nEND\nELSE IF (@NationalIDNumber IS NOT NULL)\nBEGIN\n   \
  \ SET @sql = @sql +\n        'WHERE NationalIDNumber = N''' + @NationalIDNumber\
  \ + '''';\nEND\n\nEXEC(@sql);\n\nGO\n```\n\n如果这看起来令人作呕地熟悉，那么说明你在本章学习过程中注意力非常集中；此示例与第一次尝试编写的静态\
  \ SQL 存储过程存在相同的维护问题。添加更多参数将导致组合爆炸，使得此解决方案完全无法维护。此外，SQL 语句已被拆分为两个组成部分，使其缺乏良好的流程感。想想如果必须添加\
  \ `ORDER BY` 或 `GROUP BY` 子句，情况可能会变得多糟糕。\n\n为了解决这个问题，我喜欢一次性拼接动态 SQL，使用 `CASE` 表达式代替流程控制语句，以便有选择性地拼接部分内容。以下示例应能说明其工作原理：\n\
  \n```sql\nDECLARE @BusinessEntityID int = 28;\nDECLARE @NationalIDNumber nvarchar(15)\
  \ = N'14417807';\nDECLARE @sql nvarchar(max);\n\nSET @sql = 'SELECT\n    BusinessEntityID,\n\
  \    LoginID,\n    JobTitle\nFROM HumanResources.Employee\nWHERE 1=1' +\n    CASE\n\
  \        WHEN @BusinessEntityID IS NULL THEN ''\n        ELSE 'AND BusinessEntityID\
  \ = ' + CONVERT(nvarchar, @BusinessEntityID)\n    END +\n    CASE\n        WHEN\
  \ @NationalIDNumber IS NULL THEN ''\n        ELSE 'AND NationalIDNumber = N''' +\
  \ @NationalIDNumber + ''''\n    END;\n\nEXEC(@sql);\n\nGO\n```\n\n\n# 动态 SQL：可选参数与代码格式化\n\
  \n在此示例中，`CASE`表达式会在某个参数为`NULL`时连接一个空字符串。\n\n否则，该参数将被格式化为字符串并连接到谓词之后。\n\n得益于`CASE`表达式，代码变得更加紧凑，并且查询仍然大体上保持查询的格式，而非类似过程化的代码。但此处真正的技巧是在`WHERE`子句中添加`1=1`，以避免组合爆炸问题。查询优化器会\"\
  优化掉\"（即丢弃）`WHERE`子句中的`1=1`，因此它对最终生成的查询计划没有影响。它的作用是允许可选谓词使用`AND`，而无需考虑其他可选谓词是否被连接。因此，每个谓词在代码中只需列出一次，组合不再是问题。\n\
  \n此代码最终的易维护性问题在于格式。我认为在处理动态 SQL 时，格式是极其重要的一个方面。仔细、一致的格式可能意味着快速修改存储过程与花费数小时解读混乱代码之间的区别。\n\
  \n要看到当前代码格式的问题，可以在批处理末尾添加`PRINT @sql`来查看最终字符串：\n\n```sql\nSELECT\n    BusinessEntityID,\n\
  \    LoginID,\n    JobTitle\nFROM HumanResources.Employee\nWHERE 1=1AND BusinessEntityID\
  \ = 28AND NationalIDNumber = N'14417807'\n```\n\n尽管这个 SQL 是有效的，并且可以毫无例外地直接执行，但由于谓词之间缺乏空格，它存在潜在问题。调试动态\
  \ SQL 中的空格问题可能会让人抓狂，因此我建议采用一致的格式标准来解决此问题。当我处理动态 SQL 时，我会单独连接每一行，确保每行以一个空格结束。这为代码增加了一点复杂性，但我发现这使调试变得容易得多。以下是我喜欢格式化动态\
  \ SQL 的示例：\n\n```sql\nDECLARE @BusinessEntityID int = 28;\nDECLARE @NationalIDNumber\
  \ nvarchar(15) = N'14417807';\nDECLARE @sql nvarchar(max);\nSET @sql = ''\n    +\
  \ 'SELECT '\n    + 'BusinessEntityID, '\n    + 'LoginID, '\n    + 'JobTitle '\n\
  \    + 'FROM HumanResources.Employee '\n    + 'WHERE 1=1 '\n    + CASE\n       \
  \ WHEN @BusinessEntityID IS NULL THEN ''\n        ELSE 'AND BusinessEntityID = '\
  \ + CONVERT(nvarchar, @BusinessEntityID) + ' '\n      END\n    + CASE\n        WHEN\
  \ @NationalIDNumber IS NULL THEN ''\n        ELSE 'AND NationalIDNumber = N''' +\
  \ @NationalIDNumber + ''' '\n      END;\nEXEC(@sql);\nGO\n```\n\n> **注意** 我在使用旧版本\
  \ SQL Server 时开发了这种风格，这些版本没有`max`数据类型，因此对变量大小有严格的限制。将所有内容切分成单个标记极大地减少了空白字符的数量，这意味着我可以在每个变量中放入更多代码。在\
  \ SQL Server 2008 中，删除多余的空白字符并非必要，但我仍然认为这种技术对于确保正确的空格非常有用，既提高了可读性，又确保了一致性以实现缓存计划的重用。\n\
  \n现在代码片段已经正确格式化，可以移植到新版本的`GetEmployeeData`存储过程中：\n\n```sql\nALTER PROCEDURE GetEmployeeData\n\
  \    @BusinessEntityID int = NULL,\n    @NationalIDNumber nvarchar(15) = NULL\n\
  AS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @sql nvarchar(max);\n    SET @sql =\
  \ ''\n        + 'SELECT '\n        + 'BusinessEntityID, '\n        + 'LoginID, '\n\
  \        + 'JobTitle '\n        + 'FROM HumanResources.Employee '\n        + 'WHERE\
  \ 1=1 '\n        + CASE\n            WHEN @BusinessEntityID IS NULL THEN ''\n  \
  \          ELSE 'AND BusinessEntityID = ' + CONVERT(nvarchar, @BusinessEntityID)\
  \ + ' '\n          END\n        + CASE\n            WHEN @NationalIDNumber IS NULL\
  \ THEN ''\n            ELSE 'AND NationalIDNumber = N''' + @NationalIDNumber + '''\
  \ '\n          END\n    EXEC(@sql);\nEND;\nGO\n```\n\n所以，这就是一个具有可选参数的动态存储过程。乍一看，这似乎是一个很好的解决方案，但它仍然充满问题。\n\
  \n# 第 8 章 - 动态 T-SQL\n\n## 从性能角度看\n\n从性能角度看，这个过程在几次测试运行中表现似乎不错。每组输入参数都产生了与基线示例相同的执行计划，具有相同的估计成本和读取次数。然而，底层存在一个主要问题：参数化并未实现。为说明这一点，请执行以下\
  \ T-SQL，它会清空查询计划缓存，然后使用相同的可选参数运行存储过程，传入三个不同的输入值：\n\n```sql\nDBCC FREEPROCCACHE;\n\
  GO\n\nEXEC GetEmployeeData @BusinessEntityID = 1;\nGO\n\nEXEC GetEmployeeData @BusinessEntityID\
  \ = 2;\nGO\n\nEXEC GetEmployeeData @BusinessEntityID = 3;\nGO\n```\n\n现在，使用本章前面介绍的查询来查询\
  \ `sys.dm_exec_cached_plans` 视图，你将看到如下输出：\n\n```\nobjtype    text\n---------  ------------------------------------------------\n\
  Proc       CREATE PROCEDURE GetEmployeeData @BusinessEntityID int = NULL ...\nAdhoc\
  \      SELECT BusinessEntityID, LoginID, JobTitle FROM HumanResources.Employee WHERE\
  \ 1=1 AND BusinessEntityID = 3\nAdhoc      SELECT BusinessEntityID, LoginID, JobTitle\
  \ FROM HumanResources.Employee WHERE 1=1 AND BusinessEntityID = 2\nAdhoc      SELECT\
  \ BusinessEntityID, LoginID, JobTitle FROM HumanResources.Employee WHERE 1=1 AND\
  \ BusinessEntityID = 1\n```\n\n请注意，有一个用于存储过程本身的 `Proc` 缓存计划——这对任何存储过程来说都是预期的——以及每次调用存储过程时缓存的额外的\
  \ `Adhoc` 计划。这意味着每次传递新参数时，都会发生一次编译，这显然会严重影响性能。\n\n这个存储过程目前的另一个问题是存在一个严重的安全漏洞。一个与此类似但稍作修改的存储过程将打开一个简单的攻击向量，黑客可以利用它轻松地从数据库中窃取信息，甚至造成更严重的后果。\n\
  \n## SQL 注入\n\n直接将 `@NationalIDNumber` 等字符串参数拼接到查询中可能会使你的应用程序面临严重问题。这个问题是一种名为 **SQL\
  \ 注入攻击** 的黑客技术，它涉及向数据库传递半成型的 SQL 片段（通常通过网页表单中输入的值），以试图操纵另一端的动态或即席 SQL。\n\n示例 `GetEmployeeData`\
  \ 存储过程本身其实问题不大，因为 `@NationalIDNumber` 只有 15 个字符长——这没有给黑客太多操作空间（但请记住，只需 8 个字符就可以发出\
  \ `SHUTDOWN` 命令）。但如果你正在处理另一个需要更灵活一些的存储过程呢？下面的示例过程可能用于在 AdventureWorks2008 数据库中搜索地址，它为攻击者提供了足够多的字符来造成破坏：\n\
  \n```sql\nCREATE PROCEDURE FindAddressByString\n    @String nvarchar(60)\nAS\nBEGIN\n\
  \    SET NOCOUNT ON;\n    DECLARE @sql nvarchar(max);\n    SET @sql = '' +\n   \
  \     'SELECT AddressID ' +\n        'FROM Person.Address ' +\n        'WHERE AddressLine1\
  \ LIKE ''%' + @String + '%'''\n    EXEC(@sql);\nEND;\nGO\n```\n\n可以使用类似“Stone”的字符串作为参数值来执行此存储过程：\n\
  \n```sql\nEXEC FindAddressByString @String = 'Stone';\nGO\n```\n\n这将输出你可能预期的结果集，其中包含所有在\
  \ `AddressLine1` 列中使用该字符串的地址 ID。简化的结果列表如下：\n\n```\nAddressID\n...\n```\n\n考虑一下存储过程内部实际发生了什么。查询的\
  \ `WHERE` 子句被拼接，使其字面上变成了 `WHERE AddressLine1 LIKE '%Stone%'`。但没有任何东西可以阻止某人向存储过程传递一个具有更深远影响的字符串。例如，考虑以下情况会发生什么：\n\
  \n```sql\nEXEC FindAddressByString @String = ''' ORDER BY AddressID --';\nGO\n```\n\
  \n拼接后，`WHERE` 子句变成了 `WHERE AddressLine1 LIKE '%' ORDER BY AddressID -- %'`。效果是过滤不再应用，并且添加了一个之前没有的\
  \ `ORDER BY` 子句。当提供此输入时，查询结果现在按顺序列出 `Person.Address` 表中的每个 `AddressID`，如下所示：\n\n\
  ```\nAddressID\n...\n```\n\n这当然是一个相当普通的例子。来点更有趣的如何，比如获取数据库中每位员工的完整薪酬历史？\n\n```sql\n\
  EXEC FindAddressByString @String = 'Fake address'; SELECT * FROM HumanResources.EmployeePayHistory\
  \ --';\nGO\n```\n\n假设用于查询的帐户有权访问 `HumanResources.EmployeePayHistory` 表，现在运行存储过程会产生两个结果集——第一个是来自\
  \ `Person.Address` 表的空结果集，但第二个列出了 `EmployeePayHistory` 表的所有详细信息：\n\n```\nBusinessEntityID\
  \  RateChangeDate  Rate    PayFrequency  ModifiedDate\n----------------  --------------\
  \  ------  ------------  ------------\n1                 1999-02-15      125.50\
  \  2             2004-07-31\n...\n290               2002-07-01      23.0769 2  \
  \           2004-07-31\n```\n\n事实是，攻击者可以在数据库中执行其认证帐户有权执行的任何操作，并且能在 60 个字符（字符串参数的大小）内完成。这包括查看数据、删除数据和插入虚假数据。这种攻击通常可以从舒适的网页浏览器发起，并且入侵行为可能极难被检测到。\n\
  \n解决方案不是停止使用动态 SQL。而是要确保你的动态 SQL 始终是参数化的。让我重复一遍以示强调：**始终、始终、始终参数化你的动态 SQL**！下一节将向你展示如何使用\
  \ `sp_executesql` 来做到这一点。\n\n## sp_executesql：更好的 EXECUTE\n\n在前面的章节中，我指出了使用 `EXECUTE`\
  \ 构建和执行动态 SQL 语句的两个主要问题：首先，存在多余的编译和查询计划缓存问题（第 220 页），这会导致性能下降并消耗宝贵的系统资源。其次，也许更重要的是\
  \ SQL 注入攻击的威胁。\n\n查询参数化（本章前面在应用程序开发的上下文中提到过）是解决这两个问题的关键。参数化是一种构建查询的方式，其中任何参数都作为强类型变量传递，而不是格式化为字符串并附加到查询上。除了通过减少处理查询的工作量来带来性能优势外，参数化还有一个好处，即几乎可以消除\
  \ SQL 注入攻击。\n\n参数化查询的第一步是用变量名替换字面量。例如，上一节中易受注入攻击的查询可以重写为参数化方式（为简单起见，我删除了创建存储过程的代码）：\n\
  \n```sql\nDECLARE @String nvarchar(60) = 'Stone';\nDECLARE @sql nvarchar(max);\n\
  SET @sql = '' +\n    'SELECT AddressID ' +\n    'FROM Person.Address ' +\n    'WHERE\
  \ AddressLine1 LIKE ''%'' + @String + ''%''';\n```\n\n与上一节的版本相比，此查询唯一的变化是添加了两个额外的单引号，使得\
  \ `@String` 的字面值不再与查询的其余部分拼接。之前，拼接后 `@sql` 的字面值如下：\n\n```sql\nSELECT AddressID FROM\
  \ Person.Address WHERE AddressLine1 LIKE '%Stone%'\n```\n\n作为此更改的结果，拼接后的字面值现在如下：\n\
  \n```sql\nSELECT AddressID FROM Person.Address WHERE AddressLine1 LIKE '%' + @String\
  \ + '%'\n```\n\n尝试使用 `EXECUTE` 执行此 SQL 会导致以下异常：\n\n```\nMsg 137, Level 15, State\
  \ 2, Line 1\nMust declare the scalar variable \"@String\".\n```\n\n\n## 第八章 - 动态\
  \ T-SQL\n\n其原因在于，`EXECUTE` 运行 SQL 的上下文与其创建时的上下文不同。在运行该语句的上下文中，变量 `@String` 未被声明，因此是未知的。由于变量的值不是直接拼接进查询中，因此本节前面描述的\
  \ SQL 注入类型在此场景下是不可能的。不过，我们需要找到另一种方法，将合法的、类型强匹配的参数传递给查询。\n\n解决此问题的方法是使用系统存储过程 `sp_executesql`，它允许您向动态\
  \ SQL 传递参数，就像对存储过程那样。`sp_executesql` 的参数包括：一个包含动态 SQL 批处理的 Unicode（nvarchar 或 nchar）字符串、一个定义了动态\
  \ SQL 中引用变量数据类型的第二个 Unicode 字符串，以及一个来自调用作用域、与数据类型列表中定义的变量相对应的值或变量列表。\n\n以下 T-SQL\
  \ 展示了如何使用 `sp_executesql` 执行 `Person.Address` 查询：\n\n```sql\nDECLARE @String nvarchar(60)\
  \ = 'Stone'\n\nDECLARE @sql nvarchar(max);\n\nSET @sql = '' +\n'SELECT AddressID\
  \ ' +\n'FROM Person.Address ' +\n'WHERE AddressLine1 LIKE ''%'' + @String + ''%'''\n\
  \nEXEC sp_executesql\n@sql,\nN'@String nvarchar(60)',\n@String;\n\nGO\n```\n\n运行此批处理将产生与调用\
  \ `FindAddressByString` 并传递字符串“Stone”相同的结果。传递给 `sp_executesql` 的参数用于将外部作用域的 `@String`\
  \ 变量映射到动态 SQL 执行时生成的新作用域中——无需拼接变量的字面值。\n\n对于使用多个参数的示例，再次考虑 `GetEmployeeData` 存储过程，现在改用\
  \ `sp_executesql` 而非 `EXECUTE` 重写：\n\n```sql\nALTER PROCEDURE GetEmployeeData\n\
  @BusinessEntityID int = NULL,\n@NationalIDNumber nvarchar(15) = NULL\nAS\nBEGIN\n\
  SET NOCOUNT ON;\n\nDECLARE @sql nvarchar(max);\n\nSET @sql = '' +\n'SELECT ' +\n\
  'BusinessEntityID, ' +\n'LoginID, ' +\n'JobTitle ' +\n'FROM HumanResources.Employee\
  \ ' +\n'WHERE 1=1 ' +\nCASE\nWHEN @BusinessEntityID IS NULL THEN ''\nELSE 'AND BusinessEntityID\
  \ = @BusinessEntityID '\nEND +\nCASE\nWHEN @NationalIDNumber IS NULL THEN ''\nELSE\
  \ 'AND NationalIDNumber = @NationalIDNumber '\nEND\n\nEXEC sp_executesql\n@sql,\n\
  N'@BusinessEntityID int, @NationalIDNumber nvarchar(60)',\n@BusinessEntityID,\n\
  @NationalIDNumber;\nEND;\n\nGO\n```\n\n对于多个参数，只需在第二个参数中用逗号分隔它们的数据类型定义，然后根据需要传递相应数量的外部参数，以定义第二个参数中列出的每个变量。请注意，您可以为第二个参数使用字符串变量，如果您要定义一个很长的列表，这可能更合理——但我通常将列表放在字符串字面量中，这样可以轻松地将定义与从外部作用域传递进来的变量进行匹配。\n\
  \n这里另一个需要注意的重要事项是，即使两个参数都是可选的，每次执行查询时它们都会被传递给查询。这完全没问题！将参数传递给 `sp_executesql` 的开销非常小，而试图绕过此问题要么会重新引入组合爆炸问题，要么需要非常有创意地使用嵌套动态\
  \ SQL。这两种解决方案都难以维护或不值得花费时间，所以还是把精力留给更有趣的追求吧。\n\n为了验证 `sp_executesql` 是否真的如预期那样重用了查询计划，运行之前用于展示\
  \ `EXECUTE` 方法未重用计划的相同代码：\n\n```sql\nDBCC FREEPROCCACHE;\nGO\n\nEXEC GetEmployeeData\n\
  @BusinessEntityID = 1;\nGO\n\nEXEC GetEmployeeData\n@BusinessEntityID = 2;\nGO\n\
  \nEXEC GetEmployeeData\n@BusinessEntityID = 3;\nGO\n```\n\n运行此代码后，像之前一样查询 `sys.dm_exec_cached_plans`\
  \ 视图。结果应显示两行，如下所示：\n\n```text\nobjtype      text\nProc         CREATE PROCEDURE\
  \ GetEmployeeData @BusinessEntityID int = NULL...\nPrepared     (@BusinessEntityID\
  \ INT, @NationalIDNumber nvarchar(60))SELECT ...\n```\n\n\n# 第八章 动态 T-SQL\n\n##\
  \ 性能比较\n\n在考虑了维护和计划缓存重用的影响之后，我们现在来进行一些简单的负载测试，看看三种不同方法（静态 SQL、`EXECUTE` 和 `sp_executesql`）在实际性能方面有何不同。\n\
  \n首先，创建性能最佳（但最难维护）的存储过程的静态 SQL 版本的重命名版本。将其命名为 `GetEmployeeData_Static`：\n\n```sql\n\
  CREATE PROCEDURE GetEmployeeData_Static\n    @BusinessEntityID int = NULL,\n   \
  \ @NationalIDNumber nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    IF\
  \ (@BusinessEntityID IS NOT NULL AND @NationalIDNumber IS NOT NULL)\n    BEGIN\n\
  \        SELECT\n            LoginID,\n            JobTitle\n        FROM HumanResources.Employee\n\
  \        WHERE\n            BusinessEntityID = @BusinessEntityID\n            AND\
  \ NationalIDNumber = @NationalIDNumber;\n    END\n    ELSE IF (@BusinessEntityID\
  \ IS NOT NULL)\n    BEGIN\n        SELECT\n            LoginID,\n            JobTitle\n\
  \        FROM HumanResources.Employee\n        WHERE\n            BusinessEntityID\
  \ = @BusinessEntityID;\n    END\n    ELSE IF (@NationalIDNumber IS NOT NULL)\n \
  \   BEGIN\n        SELECT\n            LoginID,\n            JobTitle\n        FROM\
  \ HumanResources.Employee\n        WHERE\n            NationalIDNumber = @NationalIDNumber;\n\
  \    END\n    ELSE\n    BEGIN\n        SELECT\n            LoginID,\n          \
  \  JobTitle\n        FROM HumanResources.Employee;\n    END\nEND;\nGO\n```\n\n这个版本能产生最佳的查询计划，但当然存在难以维护的问题。它也没有与上下文切换相关的额外开销，如果查询非常简单，这可能使其比动态\
  \ SQL 解决方案稍快。对于运行时间更长的更复杂查询，任何上下文切换开销都会被查询的实际运行时间所掩盖。\n\n为了测试 `GetEmployeeData_Static`\
  \ 存储过程的性能，我们将通过 ADO.NET 从一个简单的 C# 应用程序中调用它。但首先我们需要获取一组用于提供给 `@NationalIDNumber`\
  \ 和 `@BusinessEntityID` 参数的值。对于 `HumanResources.Employee` 表中的每一行，我们将使用这两个参数的每一种组合来调用该过程：一次只提供\
  \ `BusinessEntityID`，一次只提供 `NationalIDNumber`，一次同时提供两者，以及一次为两个参数都提供 `NULL`。`HumanResources.Employee`\
  \ 表中有 290 行，因此这提供了 `(290 x 3) + 1 = 871` 种组合。为了增加样本量，我们将把过程调用放在一个循环中，该循环将每种组合调用十次——从而产生\
  \ 8,710 次查询迭代。\n\n下面的代码清单说明了执行上述测试所需的 C# 代码。它首先用可能的参数值集合填充一个 `DataTable`，然后遍历该表的行，用每种组合调用\
  \ `GetEmployeeData_static`：\n\n```csharp\nSqlConnection sqlConn = new SqlConnection(\n\
  \    \"Data Source=localhost;Initial Catalog=AdventureWorks2008;Integrated Security=SSPI\"\
  );\nsqlConn.Open();\n\n/* Grab every combination of parameters */\nSqlCommand cmd\
  \ = new SqlCommand(@\"\n    SELECT BusinessEntityId, NationalIDNumber FROM HumanResources.Employee\n\
  \    UNION ALL SELECT NULL, NationalIDNumber FROM HumanResources.Employee\n    UNION\
  \ ALL SELECT BusinessEntityId, NULL FROM HumanResources.Employee\n    UNION ALL\
  \ SELECT NULL, NULL\", sqlConn);\nSqlDataAdapter da = new SqlDataAdapter();\nda.SelectCommand\
  \ = cmd;\nDataTable dt = new DataTable();\nda.Fill(dt);\n\nfor (int i = 0; i < 10;\
  \ i++)\n{\n    foreach (DataRow r in dt.Rows)\n    {\n        SqlCommand cmd2 =\
  \ new SqlCommand(\"GetEmployeeData_static\", sqlConn);\n        cmd2.CommandType\
  \ = CommandType.StoredProcedure;\n\n        SqlParameter param = new SqlParameter(\"\
  @BusinessEntityID\", SqlDbType.Int);\n        param.Value = r[0];\n        cmd2.Parameters.Add(param);\n\
  ```\n\n\n# 第 8 章 动态 T-SQL\n\n## 运行代码前\n在运行代码之前，请务必通过执行以下命令清空存储过程缓存：\n```sql\nDBCC\
  \ FREEPROCCACHE;\nGO\n```\n然后执行 C#代码，在循环中调用静态存储过程。运行完成后，我们将通过再次查询系统动态管理视图（DMV）来研究性能。这次，我们将修改原始的缓存计划查询，加入来自\
  \ `sys.dm_exec_query_stats` 视图的性能计数器列，如下所示：\n```sql\nSELECT\n    cp.objtype AS type,\n\
  \    COUNT(DISTINCT st.text) AS plans,\n    SUM(qs.execution_count) AS execution_count,\n\
  \    CAST(SUM(qs.total_worker_time) AS decimal(18,9)) / SUM(qs.execution_count)\n\
  \    / 1000 AS avg_CPU_ms\nFROM sys.dm_exec_query_stats qs\nJOIN sys.dm_exec_cached_plans\
  \ cp ON cp.plan_handle = qs.plan_handle\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle)\
  \ st\nWHERE\n    st.text LIKE '%HumanResources.Employee%'\n    AND st.text NOT LIKE\
  \ '%sys.dm_exec_sql_text%'\nGROUP BY\n    cp.objtype\n```\n\n## 获得的结果\n我在笔记本电脑上运行此查询后，得到的结果如下：\n\
  ```\ntype        plans   execution_count     avg_CPU_ms\nAdhoc       1       1 \
  \                  3.00000000000000000000000000000\nProc        1       8710   \
  \             0.08829402985074626865671641791\n```\n如预期所料，缓存中包含一个执行计划，该计划编译一次后，被所有\
  \ `8,710` 次查询重复使用。每个静态查询的平均运行时间为 `0.08829` 毫秒。表现不错。\n\n## 接下来，创建一个重命名的版本\n接下来，为\
  \ `EXECUTE` 解决方案创建一个重命名的版本，名为 `GetEmployeeData_Execute`：\n```sql\nCREATE PROCEDURE\
  \ GetEmployeeData_Execute\n    @BusinessEntityID int = NULL,\n    @NationalIDNumber\
  \ nvarchar(15) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @sql nvarchar(max);\n\
  \    SET @sql = '' +\n        'SELECT ' +\n        'LoginID, ' +\n        'JobTitle\
  \ ' +\n        'FROM HumanResources.Employee ' +\n        'WHERE 1=1 ' +\n     \
  \   CASE\n            WHEN @BusinessEntityID IS NULL THEN ''\n            ELSE\n\
  \                'AND BusinessEntityID = ' +\n                CONVERT(nvarchar,\
  \ @BusinessEntityID) + ' '\n        END +\n        CASE\n            WHEN @NationalIDNumber\
  \ IS NULL THEN ''\n            ELSE\n                'AND NationalIDNumber = N'''\
  \ +\n                @NationalIDNumber + ''' '\n        END;\n    EXEC(@sql);\n\
  END\n```\n\n## 测试此存储过程\n将此存储过程与静态解决方案进行测试，然后再与 `sp_executesql` 解决方案进行测试，这将创建一个很好的方法来比较静态\
  \ SQL 与参数化和非参数化的动态 SQL，并将展示参数化对性能的影响。回到 C#应用程序，更改 `SqlCommand` 以反映新过程的名称，如下所示：\n\
  ```csharp\nSqlCommand cmd2 = new SqlCommand(\"GetEmployeeData_execute\", sqlConn);\n\
  ```\n进行此更改后，再次调用 `DBCC FREEPROCCACHE` 清除存储过程缓存，然后重新运行测试。在测试运行后，在我的系统上查询 DMV 表得到以下结果：\n\
  ```\ntype        plans   execution_count     avg_CPU_ms\nAdhoc       872     8711\
  \                0.11204224543680404086786821260\n```\n使用 `EXECUTE` 方法时，缓存中包含 `872`\
  \ 个不同的 Adhoc 计划——一个是存储过程最初创建时生成的，其余每个都是使用不同参数集调用时生成的。此方法的总体平均 CPU 时间为每次查询 `0.112`\
  \ 毫秒——比静态解决方案慢了十倍以上。\n\n## 最后要测试的存储过程是\n最后要测试的存储过程当然是 `sp_executesql` 解决方案。再次创建一个存储过程的重命名版本以示区别。这次，将其命名为\
  \ `GetEmployeeData_sp_executesql`：\n```sql\nCREATE PROCEDURE GetEmployeeData_sp_executesql\n\
  \    @BusinessEntityID int = NULL,\n    @NationalIDNumber nvarchar(15) = NULL\n\
  AS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @sql nvarchar(max);\n    SET @sql =\
  \ '' +\n        'SELECT ' +\n        'LoginID, ' +\n        'JobTitle ' +\n    \
  \    'FROM HumanResources.Employee ' +\n        'WHERE 1=1 ' +\n        CASE\n \
  \           WHEN @BusinessEntityID IS NULL THEN ''\n            ELSE 'AND BusinessEntityID\
  \ = @BusinessEntityID '\n        END +\n        CASE\n            WHEN @NationalIDNumber\
  \ IS NULL THEN ''\n            ELSE 'AND NationalIDNumber = @NationalIDNumber '\n\
  \        END;\n    EXEC sp_executesql\n        @sql,\n        N'@BusinessEntityID\
  \ int, @NationalIDNumber nvarchar(15)',\n        @BusinessEntityID,\n        @NationalIDNumber;\n\
  END\n```\n在 C#代码中，将 `SqlCommand` 文本更改为以下内容：\n\n\n# 第八章：动态 T-SQL\n\n```sql\nSqlCommand\
  \ cmd2 = new SqlCommand(\"GetEmployeeData_sp_executesql\", sqlConn);\n```\n\n清除查询计划缓存并运行测试。完成后，最后检查一次性能结果。我系统上的结果如下：\n\
  \n| 类型       | 计划数 | 执行次数 | 平均 CPU 时间（毫秒） |\n|------------|--------|----------|----------------------|\n\
  | 即席       | 1      | 1        | 3.0000000000000000   |\n| 预处理     | 4      | 8710\
  \     | 0.0954129735935706   |\n\n有趣的是，两种动态 SQL 解决方案的结果非常接近，`sp_executesql` 解决方案仅以微弱优势击败了\
  \ `EXECUTE` 解决方案，即使考虑到参数化对性能的好处也是如此。运行次数较少或针对 SQL Server 编译成本更高的存储过程进行的测试将更清楚地突出这些好处。\n\
  \n## 静态 SQL 与动态 SQL\n\n正如预期的那样，静态 SQL 版本在性能方面仍然胜出（尽管三者都极快）。同样，运行时间更长、更复杂的存储过程自然会掩盖动态\
  \ SQL 和静态 SQL 解决方案之间的差异，使得动态 SQL 与静态 SQL 的问题纯粹变为维护问题。\n\n> **注意**：在我的系统上运行这些测试时，我在每次运行之间重启了\
  \ SQL Server 服务以确保绝对一致。尽管对于这个案例来说可能有些小题大做，但你可能会发现，亲自试验一下重启服务如何影响性能是很有意思的。这种测试对于一般的可扩展性测试也很有用，尤其是在集群环境中。在测试前重启服务是一种技术，你可以用来模拟应用程序在发生故障转移时的行为，而无需集群测试环境。\n\
  \n### 输出参数\n\n虽然有点偏离当前讨论的主题，但我想指出 `sp_executesql` 相比 `EXECUTE` 带来的另一个功能——一个刚入门的用户经常忽视的功能。`sp_executesql`\
  \ 允许你像向存储过程传递参数一样向动态 SQL 传递参数——这包括输出参数。\n\n当你需要使用可能仅返回单个标量值的动态 SQL 语句的输出时，输出参数变得非常有用。相比于必须将值插入表中然后再将其读回变量，输出参数是一种更简洁的解决方案。\n\
  \n要定义输出参数，只需在参数定义列表和参数列表本身中追加 `OUTPUT` 关键字。以下 T-SQL 展示了如何与 `sp_executesql` 一起使用输出参数：\n\
  \n```sql\nDECLARE @SomeVariable int;\n\nEXEC sp_executesql\n    N'SET @SomeVariable\
  \ = 123',\n    N'@SomeVariable int OUTPUT',\n    @SomeVariable OUTPUT;\n```\n\n\
  执行此 T-SQL 后，`@SomeVariable` 变量的值将为 123。\n\n由于这是一个特意构造的例子，我要补充一点，在实践中，我经常在具有可选参数的搜索存储过程里，将输出参数与\
  \ `sp_executesql` 一起使用。一个常见的用户界面需求是返回所选搜索条件找到的总行数，而输出参数是将数据返回给调用方的快速方法。\n\n## 动态\
  \ SQL 安全性考虑\n\n作为本章的结束，谈谈安全性是很重要的。除了前面一节展示的 SQL 注入示例外，还有一些其他重要的安全主题需要考虑。在本节中，我将简要讨论权限问题以及一些接口规则，以帮助你在使用动态\
  \ SQL 时避免麻烦。\n\n### 引用对象的权限\n\n正如本章多次提到的，动态 SQL 在不同于静态 SQL 的作用域中调用。从授权的角度来看，这是极其重要的，因为在执行时，将检查动态\
  \ SQL 中引用的所有对象的权限。因此，为了使动态 SQL 能够运行而不抛出授权异常，执行动态 SQL 的用户必须直接拥有对引用对象的访问权限，或者模拟一个拥有该对象访问权限的用户。\n\
  \n这与使用静态 SQL 存储过程时遇到的挑战略有不同，这是因为调用动态 SQL 时发生的上下文更改会破坏已建立的所有权链。如果你需要管理权限层次结构，例如用户应该有权使用动态\
  \ SQL 的存储过程，但无权访问它们引用的基础表，请务必深入了解证书签名和 `EXECUTE AS` 子句，两者在第四章中有详细描述。\n\n### 接口规则\n\
  \n本章重点介绍了你可能传递以启用或禁用查询中某个谓词的可选参数。然而，还有其他类型的可选参数，开发人员经常尝试将其与动态 SQL 一起使用。这些参数涉及将表名、列列表、`ORDER\
  \ BY` 列表以及其他对查询本身的修改传递到存储过程中进行拼接。\n\n如果你阅读过本书的第一章，你就知道从软件开发的角度来看，这些实践是极其危险的，会导致数据库和应用程序之间的紧密耦合，此外还可能扭曲存储过程隐含的输出契约，从而使测试和维护变得极其困难。\n\
  \n作为一般规则，你应该永远不要将任何数据库对象名从应用程序传递到存储过程（而且应用程序也不应该知道对象名）。如果你绝对必须在存储过程中修改表或其他对象的名称，尝试通过一组参数来封装该名称，而不是允许应用程序来指定。\n\
  \n例如，假设你正在使用以下存储过程：\n\n```sql\nCREATE PROC SelectDataFromTable\n    @TableName nvarchar(200)\n\
  AS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @sql nvarchar(max);\n    SET @sql =\
  \ '' +\n        'SELECT ' +\n        'ColumnA, ' +\n        'ColumnB, ' +\n    \
  \    'ColumnC ' +\n        'FROM ' + @TableName;\n    EXEC(@sql);\nEND;\nGO\n```\n\
  \n表名无法参数化，这意味着在这种情况下使用 `sp_executesql` 没有任何帮助。然而，实际上在几乎所有情况下，可以（或者将会）实际传递到存储过程的表名是一个有限的子集。如果你事先知道此存储过程只会使用表\
  \ `TableA`、`TableB` 和 `TableC`，你可以重写存储过程，将这些表名排除在应用程序之外，同时仍提供相同的功能。\n\n以下代码列表提供了一个示例，说明如何修改先前的存储过程以提供动态表功能，同时将名称进行一定程度的抽象以避免耦合问题：\n\
  \n```sql\nALTER PROC SelectDataFromTable\n    @UseTableA bit = 0,\n    @UseTableB\
  \ bit = 0,\n    @UseTableC bit = 0\nAS\nBEGIN\n    SET NOCOUNT ON;\n    IF (\n \
  \       CONVERT(tinyint, COALESCE(@UseTableA, 0)) +\n        CONVERT(tinyint, COALESCE(@UseTableB,\
  \ 0)) +\n        CONVERT(tinyint, COALESCE(@UseTableC, 0))\n    ) <> 1\n    BEGIN\n\
  \        RAISERROR('Must specify exactly one table', 16, 1);\n        RETURN;\n\
  \    END\n    DECLARE @sql nvarchar(max);\n    SET @sql = '' +\n        'SELECT\
  \ ' +\n        'ColumnA, ' +\n        'ColumnB, ' +\n        'ColumnC ' +\n    \
  \    'FROM ' +\n        CASE\n            WHEN @UseTableA = 1 THEN 'TableA'\n  \
  \          WHEN @UseTableB = 1 THEN 'TableB'\n            WHEN @UseTableC = 1 THEN\
  \ 'TableC'\n        END\n    EXEC(@sql);\nEND;\nGO\n```\n\n这个版本的存储过程显然复杂了不少，但仍然相对容易理解。`IF`\
  \ 块验证是否恰好选择了一个表（即，对应于该表的参数值设置为 1），而 `CASE` 表达式处理表名的实际动态选择。\n\n\n# 如果发现自己处于一种连此技术都无法使用、而你又*绝对**必须*支持应用程序以动态方式传递对象名称的情况，你至少可以做些事情来防范可能发生的\
  \ SQL 注入问题。SQL Server 提供了一个名为 `QUOTENAME` 的函数，它可以给任何输入字符串加上方括号分隔符，这样在与 SQL 语句拼接时，它会被视为标识符。例如，`QUOTENAME('123')`\
  \ 会返回值 `[123]`。\n\n通过使用 `QUOTENAME`，可以修改原本的动态表名存储过程，从而消除 SQL 注入的风险：\n\n```sql\n\
  ALTER PROC SelectDataFromTable\n    @TableName nvarchar(200);\nAS\nBEGIN\n    SET\
  \ NOCOUNT ON;\n    DECLARE @sql nvarchar(max);\n    SET @sql = '' +\n        'SELECT\
  \ ' +\n        'ColumnA, ' +\n        'ColumnB, ' +\n        'ColumnC ' +\n    \
  \    'FROM ' + QUOTENAME(@TableName);\n    EXEC(@sql);\nEND;\nGO\n```\n\n不幸的是，这并没有解决接口问题，并且修改数据库模式可能仍然需要对应用程序代码进行修改。\n\
  \n## 总结\n\n动态 SQL 对于处理需要灵活性的存储过程来说，可能是一个极其有用的工具。然而，确保你正确地使用动态 SQL 以达成性能、可维护性和安全性之间的最佳平衡至关重要。请确保*始终*对查询进行参数化，并且*永远*不要信任调用者提供的任何输入，以防一个恶意的有效载荷正潜伏在一个看似无辜的搜索字符串中。\n\
  \n# 第九章：为应用并发设计系统\n\n当应用程序只有一个并发用户时，其行为和扩展性往往表现得极好，这毫不奇怪。许多开发者都熟悉那种在漫长而疲惫的发布周期结束时，提交复杂代码并自信地回家，确信一切都能按照规范运行和扩展的美妙感觉。唉，当大量实际用户开始猛烈敲击系统时，这种感觉可能会瞬间被撕裂，转化为剧痛，并且变得显而易见：如果当初能对并发使用情况再多做一点测试可能会很有帮助。除非你的应用程序一次只供一个用户使用，否则它根本不能被设计和开发得好像只会被一个用户使用一样。\n\
  \n并发可能是应用程序开发中最棘手的领域之一，因为在此领域出现的问题往往依赖于极其特定的时机。某个导致测试运行以一连串异常结束的问题，在下一次运行时可能不会触发任何警报，因为某个其他模块碰巧比平时多花了几个毫秒，恰好对齐了“牌局”。更糟糕的是相反的情况，并发问题似乎凭空出现，在奇怪且无法复现的时间间隔发生（但*总是*发生在某个重要演示的中间）。\n\
  \n虽然完全消除你软件中的这类问题可能很困难或不可能，但恰当的前期设计可以极大地帮助你减少看到问题的次数。关键在于理解几个基本因素：\n- 用户可能执行哪些会干扰系统中其他用户活动的操作？\n\
  - 数据库（或软件系统）的哪些特性会帮助或妨碍你的用户并发地执行工作？\n- 为了确保并发得到妥善处理，必须遵守哪些业务规则？\n\n本章将深入探讨你可能需要在数据库层实现的不同类型的应用并发模型，SQL\
  \ Server 提供的工具以帮助你设计在并发场景下正常工作的应用程序，以及如何超越 SQL Server 开箱即用的功能。\n\n## 业务层面：当进程冲突时应该发生什么？\n\
  \n在深入探讨 SQL Server 中处理并发的技术细节之前，定义基本的问题领域以及通常处理这些问题的方法是很重要的。在数据库应用程序的上下文中，并发进程引发的问题通常归为以下三类之一：\n\
  \n### 覆盖\n\n当两个或更多用户同时编辑相同的数据，并且一个用户的更改被另一个用户的更改替换而丢失时，就发生了**覆盖**。这可能成为问题，原因有几个：首先，是努力、时间和数据的损失（更不用说工作被丢失的用户会感到相当恼火）。此外，一个更严重的潜在后果是，根据用户当时参与的活动，覆盖可能导致数据库级别的数据损坏。一个简单的例子是销售点应用程序，它将库存数量从表中读入一个变量，根据交易增加或减少数量，然后将更新后的数字写回表中。如果有两个销售终端在运行，并且每个终端同时处理同一产品的销售，那么两个终端都可能检索到初始值，并且一个终端可能会覆盖另一个终端的更改，而不是进行更新。\n\
  \n### 不可重复读\n\n**不可重复读**发生在应用程序从数据库读取一组数据并对其执行一些计算，然后需要为了另一个目的再次读取同一组数据——但原始数据集在此期间已经发生了变化。这个问题可能显现的一个常见例子是分析系统提供的向下钻取报告。报告系统可能向用户展示一个基于初始读取计算得出的汇总数据视图。当用户点击报告上的汇总数据项时，报告系统可能会返回数据库以读取相应的详细数据。然而，在初始读取和详细读取之间，有可能另一个用户已经更改了一些数据，这意味着两组数据将不再匹配。\n\
  \n### 阻塞\n\n当一个进程正在写入数据，而另一个进程试图读取或写入相同的数据时，可能会发生**阻塞**。阻塞可以是（并且通常是）一件好事——它能防止多种覆盖问题，并确保客户端只读取到一致的数据。然而，过度的阻塞会极大地降低应用程序的扩展能力，因此必须仔细监控和控制。\n\
  \n有几种处理这些问题的方法，技术实现的难易程度各不相同。但就本节而言，我将暂时忽略技术层面，让讨论聚焦于所涉及的业务规则。解决数据库并发问题主要有四种方法值得考虑：\n\
  \n- **无政府状态**：假设冲突和数据不一致无关紧要。不阻止读取者读取不一致的数据，也不担心覆盖或重复读。这种方法常用于用户几乎没有机会并发编辑同一数据点，以及重复读问题不重要的应用程序中。\n\
  - **悲观并发控制**：假设冲突会很频繁；阻止它们发生。阻止读取者读取不一致的数据，但不一定担心重复读。为了避免覆盖，不允许任何人开始编辑其他人正在编辑的数据。\n\
  - **乐观并发控制**：假设偶尔会发生一些冲突，但在发生时处理它们是可以接受的。阻止读取者读取不一致的数据，并告知读取者正在读取的数据版本。这使得读取者能够知道何时发生了重复读问题。\n\
  \n\n\n（但并非避免它们）。为避免覆盖，如果自该进程首次读取数据以进行编辑以来数据已被更改，则不允许任何进程覆盖该数据片段。\n\n`多值并发控制（MVCC）`：假设会发生冲突，但应将其视为新版本而非冲突。通过让读者知晓正在读取的数据版本，并允许读者多次重读相同版本，既阻止读者读取不一致的数据，也避免其遇到可重复读问题。为避免覆盖，每次保存数据时都创建一个新版本，同时保留旧版本。\n\
  \n这些方法论各自代表不同的用户体验，必须根据当前应用程序所需的功能进行选择。例如，留言板应用程序可能采用近乎无政府状态的并发处理方法，因为两个用户同时编辑同一条消息的可能性很小或不可能——覆盖和不一致读取是可以接受的。\n\
  \n另一方面，许多应用程序无法承受覆盖。源代码控制系统就是一个很好的例子，被覆盖的源代码可能意味着大量工作成果的丢失。然而，处理源代码控制系统中这种情况的最佳方式尚有争议。两个流行的系统——Subversion\
  \ 和 Visual SourceSafe——各自以不同的方式处理此问题。Subversion 使用一种乐观方案，任何人都可以编辑给定文件，但若在您提交期间其他人已编辑过该文件，则会收到冲突错误。而\
  \ Visual SourceSafe 则使用一种悲观模型，在编辑前您必须签出给定文件，从而在您签回之前限制任何其他人进行编辑。\n\n最后，支持 `MVCC`\
  \ 的系统的一个例子是维基。尽管一些维基软件包使用乐观模型，但许多其他维基允许用户随时进行编辑，只是为每个给定页面的更改递增版本号，但仍会保存过去的版本。这意味着如果两个用户同时进行编辑，某些更改可能会被覆盖。然而，用户总是可以查看版本历史记录以恢复被覆盖的内容——在\
  \ `MVCC` 系统中，没有任何内容会被真正删除。\n\n在本章后面的章节中，我将更详细地描述基于这些方法论的解决方案。\n\n## 隔离级别与事务行为\n\n\
  本章假设您具有使用 SQL Server 事务和隔离级别的背景知识，但如果您不熟悉某些术语，本节将对该主题做一个非常基础的介绍。\n\n`隔离级别` 在 SQL\
  \ Server 中设置，用于告知数据库引擎在多个事务发生碰撞、试图读取和写入相同数据时，如何处理锁定和阻塞。在许多业务案例中，为事务选择正确的隔离级别极其重要，特别是那些需要多次读取相同数据时保持一致性的案例。\n\
  \nSQL Server 的隔离级别可以分为两大类：读者被写者阻塞的类别，以及读者不会被阻塞的类别。`READ COMMITTED`、`REPEATABLE READ`\
  \ 和 `SERIALIZABLE` 隔离级别都属于第一类，而 `READ UNCOMMITTED` 和 `SNAPSHOT` 则属于后一组。`SNAPSHOT`\
  \ 隔离级别的一个特殊子类 `READ COMMITTED SNAPSHOT` 也属于这第二类——非阻塞类。\n\n所有事务，无论使用何种隔离级别，都会对正在更新的数据采取排他锁。\n\
  \n事务隔离级别不会改变在写入时采取的锁的行为，而只会改变读者采取或遵循的锁的行为。\n\n为了了解隔离级别的工作原理，请创建一个将由多个并发事务访问的表。以下\
  \ T-SQL 在 `TempDB` 中创建了一个名为 `Blocker` 的表，并用三行数据填充它：\n\n```sql\nUSE TempDB;\nGO\n\
  \nCREATE TABLE Blocker\n(\n    Blocker_Id int NOT NULL PRIMARY KEY\n);\nGO\n\nINSERT\
  \ INTO Blocker VALUES (1), (2), (3);\nGO\n```\n\n表创建后，打开两个 SQL Server Management\
  \ Studio 查询窗口。此后，我将分别称这两个窗口为 `阻塞窗口` 和 `被阻塞窗口`。\n\n在三个阻塞型隔离级别中，读者都将被写者阻塞。为了观察其表现，请在\
  \ `阻塞窗口` 中运行以下 T-SQL：\n\n```sql\nBEGIN TRANSACTION;\nUPDATE Blocker\nSET Blocker_Id\
  \ = Blocker_Id + 1;\n```\n\n现在在 `被阻塞窗口` 中运行以下语句：\n\n```sql\nSELECT *\nFROM Blocker;\n\
  ```\n\n这个第二个查询将不会返回任何结果，直到在 `阻塞窗口` 中启动的事务被提交或回滚。为了释放锁，请在 `阻塞窗口` 中运行以下语句来回滚事务：\n\n\
  ```sql\nROLLBACK;\n```\n\n在下一节中，我将演示指定不同隔离级别对阻塞查询与被阻塞查询之间交互的影响。\n\n### 阻塞型隔离级别\n\
  \n使用阻塞型隔离级别的事务在读取数据时会采取共享锁，从而在读取过程中阻止任何其他人尝试更新相同数据。这三种隔离级别的主要区别在于它们所采取共享锁的粒度和行为，这会改变哪些写入操作会被阻塞以及何时被阻塞。\n\
  \n#### READ COMMITTED 隔离\n\nSQL Server 使用的默认隔离级别是 `READ COMMITTED`。在此隔离级别下，读者仅在执行读取的语句持续期间持有锁，即使在显式事务内部也是如此。为了说明这一点，请在\
  \ `阻塞窗口` 中运行以下语句：\n\n```sql\nBEGIN TRANSACTION;\nSELECT *\nFROM Blocker;\n```\n\n\
  现在在 `被阻塞窗口` 中运行以下语句：\n\n```sql\nBEGIN TRANSACTION;\nUPDATE Blocker\nSET Blocker_Id\
  \ = Blocker_Id + 1;\n```\n\n在这种情况下，即使 `阻塞窗口` 中的事务仍处于活动状态，更新操作也能运行而不被阻塞。原因是 `SELECT`\
  \ 语句一结束，它持有的锁就被释放了。当您观察完此行为后，别忘了在每个窗口中执行 `ROLLBACK` 语句来回滚已启动的事务。\n\n#### REPEATABLE\
  \ READ 隔离\n\n`REPEATABLE READ` 和 `SERIALIZABLE` 隔离级别都会在显式事务的持续期间持有锁。不同之处在于，`REPEATABLE\
  \ READ` 事务采取的锁粒度级别确保已读取的数据不能被其他事务更新，但允许其他事务插入会改变结果的数据。另一方面，`SERIALIZABLE` 事务采取的锁粒度级别更高，使得在锁定范围内既不能更新数据，也不能插入数据。\n\
  \n要观察 `REPEATABLE READ` 事务的行为，首先在 `阻塞窗口` 中运行以下 T-SQL：\n\n```sql\nSET TRANSACTION\
  \ ISOLATION LEVEL REPEATABLE READ;\nBEGIN TRANSACTION;\nSELECT *\nFROM Blocker;\n\
  GO\n```\n\n在 `被阻塞窗口` 中运行以下更新将导致阻塞行为——查询将等待，直到 `阻塞窗口` 的事务完成：\n\n```sql\nBEGIN TRANSACTION;\n\
  UPDATE Blocker\nSET Blocker_Id = Blocker_Id + 1;\n```\n\n更新和删除操作都将被该查询采取的锁阻塞。然而，类似下面的插入操作不会被阻塞：\n\
  \n```sql\nBEGIN TRANSACTION;\nINSERT INTO Blocker VALUES (4);\nCOMMIT;\n```\n\n\n\
  \n# 事务隔离级别与并发控制\n\n在阻塞窗口中重新运行 `SELECT` 语句，你将看到新的一行。这种现象被称为 **`幻影行`**，因为新数据就像幽灵一样凭空出现。\n\
  \n一旦你完成对幻影行主题的研究，请务必在两个窗口中都执行 `ROLLBACK`。\n\n## 可序列化隔离\n\n`可重复读` 与 `可序列化` 隔离级别的区别在于，前者允许幻影行，而后者不允许。如果使用\
  \ `可序列化` 隔离级别，则任何在 `WHERE` 子句限定范围内的键——无论当时是否存在——都将在事务期间被锁定。要查看其工作原理，首先在阻塞窗口中运行以下命令：\n\
  ```sql\nSET TRANSACTION ISOLATION LEVEL SERIALIZABLE;\n\nBEGIN TRANSACTION;\n\n\
  SELECT *\nFROM Blocker;\n```\n接下来，尝试在阻塞窗口中执行 `INSERT` 或 `UPDATE`。无论哪种情况，操作都将被迫等待阻塞窗口中的事务提交，因为该事务锁定了表中的所有行——无论它们是否实际存在。若要仅锁定特定行范围，请在阻塞查询中添加\
  \ `WHERE` 子句，所有在该键范围内的 DML 操作都将在事务期间被阻塞。完成后，请务必执行 `ROLLBACK`。\n\n**提示** `可重复读` 和\
  \ `可序列化` 隔离级别将在查询涉及的表上持有共享锁直至事务结束。然而，在涉及多个对象的事务中，你可能希望仅选择性地对特定表持锁。为此，可以使用 `HOLDLOCK`\
  \ 表提示，仅将其应用于你希望持锁的表。在 `已提交读` 事务中，这将产生与仅为这些表将隔离级别提升至 `可重复读` 相同的效果。有关表提示的更多信息，请参阅\
  \ SQL Server 2008 联机丛书。\n\n## 非阻塞隔离级别\n\n非阻塞隔离级别，`未提交读` 和 `快照`，都允许读取器在无需等待写入事务完成的情况下读取数据。从并发性角度来看，这很棒——无阻塞意味着进程等待时间减少，因此用户能更快地获取数据——但这可能对数据一致性造成灾难性影响。\n\
  \n### 未提交读隔离\n\n`未提交读` 事务在读取数据时不施加共享锁，也不理会其他事务放置的锁。这意味着不会发生阻塞，但正在读取的数据可能不一致（尚未提交）。要理解这意味着什么，请在阻塞窗口中运行以下命令：\n\
  ```sql\nBEGIN TRANSACTION;\n\nUPDATE Blocker\nSET Blocker_Id = 10\nWHERE Blocker_Id\
  \ = 1;\nGO\n```\n此操作将对更新行施加排他锁，因此任何读取器在事务完成前都应被阻塞，无法读取数据。但是，如果在阻塞窗口中运行以下查询，则不会被阻塞：\n\
  ```sql\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\n\nSELECT *\nFROM Blocker;\n\
  GO\n```\n这里的危险在于，由于查询未被阻塞，用户可能看到属于某个事务的数据，而该事务稍后可能被回滚。当稍后进行对账时，如果用户看到的汇总数据与底层明细数据不匹配，这可能会带来特别严重的问题。我建议你在查询中使用\
  \ `未提交读`（或 `NOLOCK` 表提示）之前，仔细权衡这些问题。\n\n#### 快照隔离\n\n`未提交读` 的一种替代方案是 SQL Server\
  \ 2008 的 `快照` 隔离级别。该隔离级别与 `未提交读` 具有相同的非阻塞特性，但仅显示一致的数据。这是通过利用行版本控制技术实现的，该技术会在数据库中发生数据修改时，将行的先前版本存储在\
  \ `TempDB` 中。\n\n`快照` 似乎两全其美：既无阻塞，又无数据不一致的风险。然而，此隔离级别并非没有问题。首先，将行的先前值存储在 `TempDB`\
  \ 中会产生巨大负载，给未正确配置以处理额外压力的服务器带来许多问题。其次，对于许多应用程序来说，这种非阻塞读取没有意义。例如，考虑一个需要读取更新后库存数量的应用程序。`快照`\
  \ 读取可能导致用户收到无效的数量，因为读取数据时用户不会被阻塞，因此可能看到的是先前提交的数据，而非最新的更新数字。\n\n如果你确实决定使用任何非阻塞隔离级别，请务必仔细思考相关问题。两种方法都存在许多潜在的注意事项，它们并非适用于每个应用程序，甚至可能不适用于大多数应用程序。\n\
  \n**注意** `快照` 隔离是一个很大的主题，超出了本章范围，但有许多优秀的资源可供读者参考，以更好地理解该主题。一个起点是 MSDN 联机丛书文章 “Understanding\
  \ Row Versioning-Based Isolation Levels”，网址为 http://msdn.microsoft.com/en-us/library/ms189050.aspx。\n\
  \n## 从业务隔离到并发控制\n\n上一节提到的业务逻辑方法论中使用的部分术语——特别是形容词 **乐观** 和 **悲观**——也常用于描述 SQL Server\
  \ 自身的锁定和隔离规则行为。然而，你应该理解，这些术语所描述的 SQL Server 进程行为与相关业务流程中使用的定义并不完全相同。从 SQL Server\
  \ 的角度来看，唯一必要的并发控制是发生在两个同时访问服务器的事务之间——从这个角度来看，其行为运行良好。但是，从业务角度来看，并不存在事务（至少不是数据库事务意义上的）——只有用户和进程试图修改相同的数据。从这个意义上说，纯粹的事务性思维无法提供足够的控制。\n\
  \nSQL Server 的默认隔离级别 `已提交读`，以及其 `可重复读` 和 `可序列化` 隔离级别，可以说支持一种形式的**悲观并发控制**。使用这些隔离级别时，写入器不允许覆盖其他写入器正在写入的数据。然而，一旦阻塞事务结束，数据就变得任人宰割，另一个会话甚至可以在不知道其已被修改的情况下覆盖它。从业务角度来看，这离悲观并发控制的目标——阻止两个终端用户同时开始编辑同一数据——相去甚远。\n\
  \n`快照` 隔离级别据说支持一种形式的**乐观并发控制**。这种比较比其他隔离级别的悲观并发更容易证明其合理性：使用 `快照` 隔离时，如果你读取了一条数据以便对其进行编辑或修改，而其他人恰好在你读取之后、但在你有机会写入编辑之前更新了该数据，那么当你尝试写入时，将会收到一个异常。这几乎是乐观并发控制的教科书式定义，只有一个轻微的问题：SQL\
  \ Server 的隔离级别是 **事务性** 的——因此，为了实现这一点，你必须在整个读取、编辑和重写尝试过程中保持一个事务开放。如果应用程序是 Web 级的，并且用户希望花费一个小时编辑文档，这就无法很好地扩展。\n\
  \n\n\nSQL Server 支持的另一种乐观并发控制形式用于可更新游标。`OPTIMISTIC` 选项支持一种与 `SNAPSHOT isolation`\
  \ 非常相似的乐观并发形式。然而，鉴于在设计良好的生产应用程序中，可更新游标实际使用的情况非常罕见，这不是一个你很可能会经常看到的选项。\n\n尽管 `SNAPSHOT\
  \ isolation` 和 `OPTIMISTIC WITH ROW VERSIONING` 游标选项都通过在版本存储中保存行的先前版本来工作，但这不应与 MVCC\
  \ 相混淆。无论是隔离级别还是游标选项，行的先前版本都只是临时保存，以帮助支持非阻塞读取。这些行以后并不可用——例如，不能作为合并多个写入者更改的一种手段——而这是设计良好的\
  \ MVCC 系统的一个标志。\n\nSQL Server 应用程序开发场景中经常使用的另一个隔离级别是 `READ UNCOMMITTED`。这个隔离级别实现了上一节提到的“无政府”业务方法，并且做得相当好——无论事务是否处于活动状态，读取者都不会被写入者阻塞，写入者也不会被读取者阻塞。\n\
  \n需要再次强调的是，尽管从业务角度来看，SQL Server 并没有真正适当地支持并发，但它也没有理由这样做。SQL Server 隔离级别的目标是在事务级别控制并发，最终帮助保持数据库中数据的一致性状态。\n\
  \n尽管 SQL Server 本身缺乏对符合业务需求的并发解决方案的内置支持，但它提供了所有必要的工具，让您可以轻松地自行构建这些解决方案。以下部分讨论了如何使用\
  \ SQL Server 来帮助在数据库应用程序中定义并发模型。\n\n## 未雨绸缪：悲观并发\n\n想象一下，您被委以重任，要构建一个系统来帮助一家人寿保险公司录入多年积累的纸质客户档案更新表格的数据。该公司每半年向其数十万客户发送一次表格，以获取客户的最新信息。\n\
  \n大部分档案是手工填写的，因此 OCR 行不通——必须手动键入。更糟糕的是，很大一部分客户文件被员工从归档系统中取出，并错误地重新归档。许多文件还曾被多次复印，员工经常在归档原件的同时也归档复印件，导致大量重复。公司曾尝试移除最旧的表格，并将较新的表格放在文件堆的顶部，但这很困难，因为许多客户并非每次收到请求都会寄回表格——对某位客户而言，1994\
  \ 年的表格可能是最新的，而对另一位客户，最新的表格可能来自 2009 年。\n\n回到手头的挑战——构建数据输入应用程序相对容易，找到愿意以相当低廉的费用进行数据输入的学生也是如此。工作流程如下：对于每份档案更新表格，进行数据输入的人员将根据该客户的社会安全号码或其他身份证号调出其记录。如果档案表格上的日期比系统中上次更新的日期新，则需要用更新的数据更新该档案。如果日期相同，公司已决定操作员应扫描该表格并确保所有已输入的数据都是正确的——如同所有手动数据输入的情况一样，公司意识到会出现打字错误。每份表格有几页，较大的表格需要数小时才能录入。\n\
  \n如同此类项目中常见的情况一样，时间和金钱至关重要，公司对大量的档案表格重复以及许多表格顺序错误归档的事实感到担忧。如果一位操作员正在输入某客户的 1996\
  \ 年更新表，而另一位操作员碰巧正在输入同一客户的 2002 年表格，那将是对数据输入操作员时间的巨大浪费。\n\n### 推进到解决方案\n\n这种情况几乎明确呼唤一种涉及悲观并发控制的解决方案。每次在系统中输入客户的社保号码时，应用程序可以检查是否有其他人输入了相同的号码且尚未持久化更改或返回消息说没有更改（即，点击了取消按钮）。如果另一位操作员当前正在编辑该客户的数据，可以向用户返回一条消息，告知其稍后再试——此档案已被锁定。\n\
  \n那么问题就变成了如何最好地实现这样的解决方案。我曾多次尝试过一种方案，即创建一个类似如下结构的表：\n\n```sql\nCREATE TABLE CustomerLocks\n\
  (\n    CustomerId int NOT NULL PRIMARY KEY\n        REFERENCES Customers (CustomerId),\n\
  \    IsLocked bit NOT NULL DEFAULT (0)\n);\nGO\n```\n\n`IsLocked` 列也可以添加到现有的 `Customers`\
  \ 表中，但在高度事务性的数据库系统中不推荐这样做。我通常建议将锁定结构与实际数据分开，以限制对核心表的过度阻塞。\n\n在这个系统中，采用的一般技术是用系统中的每个客户\
  \ ID 填充该表。当有人需要获取锁时，会查询该表，使用如下代码：\n\n```sql\nDECLARE @LockAcquired bit = 0;\nIF\n\
  (\n    SELECT IsLocked\n    FROM CustomerLocks\n    WHERE CustomerId = @CustomerId\n\
  ) = 0\nBEGIN\n    UPDATE CustomerLocks\n    SET IsLocked = 1\n    WHERE CustomerId\
  \ = @CustomerId;\n    SET @LockAcquired = 1;\nEND\n```\n\n不幸的是，这种方法问题重重。第一个也是最严重的问题是，在测试锁是否存在的\
  \ `IF` 条件查询和 `UPDATE` 之间，该行的值可能被另一个写入者更改。如果两个会话同时请求锁，结果可能是两个写入者都认为自己持有独占锁。为了解决这个问题，应消除\
  \ `IF` 条件；改为在获取锁的同时，在 `UPDATE` 的 `WHERE` 子句中检查获取锁的权限：\n\n```sql\nDECLARE @LockAcquired\
  \ bit;\nUPDATE CustomerLocks\nSET IsLocked = 1\nWHERE\n    CustomerId = @CustomerId\n\
  \    AND IsLocked = 0;\nSET @LockAcquired = @@ROWCOUNT;\n```\n\n这个模式修复了两个读取者同时请求锁的问题，但留下了一个维护问题：我关于将锁定与存储客户数据的实际表分开的建议意味着，您现在必须确保所有新的客户\
  \ ID 在添加到系统时也添加到锁表中。\n\n为了解决这个问题，不要将表建模为每个客户的锁状态集合。相反，将表中行的存在定义为锁被持有的指示。然后该表变成如下结构：\n\
  \n```sql\nCREATE TABLE CustomerLocks\n(\n    CustomerId int NOT NULL PRIMARY KEY\n\
  \        REFERENCES Customers (CustomerId)\n);\nGO\n```\n\n要使用这个新表获取锁，您可以尝试 `INSERT`，使用\
  \ `TRY/CATCH` 块来查明是否引起了主键冲突：\n\n```sql\nDECLARE @LockAcquired bit;\nBEGIN TRY\n\
  \    INSERT INTO CustomerLocks\n    (\n        CustomerId\n    )\n    VALUES\n \
  \   (\n        @CustomerId\n    )\n    --未引发异常：锁已获取\n    SET @LockAcquired = 1;\n\
  END TRY\nBEGIN CATCH\n    --捕获异常：未获取锁\n    SET @LockAcquired = 0;\nEND CATCH\nGO\n\
  ```\n\n释放锁很简单，只需删除该行即可：\n\n```sql\nDELETE FROM CustomerLocks\nWHERE CustomerId =\
  \ @CustomerId;\nGO\n```\n\n\n\n我们正在接近一个健壮的解决方案，但尚未完全实现。想象一下，应用程序中某处存在一段有缺陷的代码，它本应调用存储过程来获取锁，却偶尔会调用另一个释放锁的存储过程。在当前设计的系统中，没有任何机制防止此类问题——无论当前哪个用户持有记录的锁，任何人都可以随时请求释放锁。这非常危险，因为它会使整个系统的锁定机制失效。此外，如图所示的系统实现方式，调用者不会知道发生了问题，也不知道锁并不存在。通过在现有框架上增加一些功能，可以解决这两个问题。\n\
  \n为了帮助防止锁被提前失效，可以颁发一个 `lock token`。\n\n这个令牌不过是一个随机生成的锁的唯一标识符，它将用作释放锁的键，而不是客户 ID。要实现此解决方案，可以按如下方式更改表的定义：\n\
  \n```sql\nCREATE TABLE CustomerLocks\n(\n    CustomerId int NOT NULL PRIMARY KEY\n\
  \        REFERENCES Customers (CustomerId),\n    LockToken uniqueidentifier NOT\
  \ NULL UNIQUE\n);\nGO\n```\n\n有了这个表，用于请求锁的插入例程就变成了如下形式：\n\n```sql\nDECLARE @LockToken\
  \ uniqueidentifier\nBEGIN TRY\n    --Generate the token\n    SET @LockToken = NEWID();\n\
  \n    INSERT INTO CustomerLocks\n    (\n        CustomerId,\n        LockToken\n\
  \    )\n    VALUES\n    (\n        @CustomerId,\n        @LockToken\n    )\nEND\
  \ TRY\n\nBEGIN CATCH\n    --Caught an exception: No lock acquired\n    SET @LockToken\
  \ = NULL;\nEND CATCH\nGO\n```\n\n现在，不再通过检查 `@LockAcquired` 是否为 1 来确定锁是否成功获取，而是检查\
  \ `@LockToken` 是否为 `NULL`。通过使用 GUID，该系统大大降低了有缺陷的应用程序代码导致锁被不持有它的进程释放的概率。\n\n获取锁后，应用程序应记住锁令牌，在需要释放锁时传递它，而不是传递客户\
  \ ID：\n\n```sql\nDELETE FROM CustomerLocks\nWHERE LockToken = @LockToken;\nGO\n\
  ```\n\n更好的是，用于释放锁的代码可以检查锁是否未被成功释放（或者是否一开始就没有锁），并调用方返回异常：\n\n```sql\nDELETE FROM\
  \ CustomerLocks\nWHERE LockToken = @LockToken;\n\nIF @@ROWCOUNT = 0\n    RAISERROR('Lock\
  \ token not found!', 16, 1);\nGO\n```\n\n调用方应在同一事务中完成对锁定资源的任何更新并请求释放锁。这样，如果调用方收到此异常，它可以采取适当的操作——回滚事务——确保数据不会最终处于无效状态。\n\
  \n几乎所有问题现在都已从该锁定方案中消除：两个进程不会错误地获得同一个锁，不存在关于保持表包含最新客户 ID 列表的维护问题，并且令牌极大地消除了锁释放问题的可能性。\n\
  \n最后还剩一个稍微微妙的问题：如果用户请求了一个锁，忘记点击保存按钮，然后去度两周的假怎么办？或者类似地，如果应用程序获取了一个锁，然后在 5 分钟后崩溃，从而丢失了其对令牌的引用，该怎么办？\n\
  \n不幸的是，无法用一个适用于所有场景的统一方法来解决这个问题，并且悲观方案的最大问题之一是，总会存在与释放因某些原因未得到正确处理的锁相关的管理开销。解决此问题的一般方法是在锁表中添加一个审计列，以记录锁被获取的日期和时间：\n\
  \n```sql\nCREATE TABLE CustomerLocks\n(\n    CustomerId int NOT NULL PRIMARY KEY\n\
  \        REFERENCES Customers (CustomerId),\n    LockToken uniqueidentifier NOT\
  \ NULL UNIQUE,\n    LockGrantedDate datetime NOT NULL DEFAULT (GETDATE())\n);\n\
  GO\n```\n\n已列出的代码无需修改以适应 `LockGrantedDate` 列，因为它具有默认值。必须编写一个外部作业来定期轮询该表，“过期”那些持有时间过长的锁。执行此操作的代码很简单；以下\
  \ T-SQL 删除所有超过 5 小时的锁：\n\n```sql\nDELETE FROM CustomerLocks\nWHERE LockGrantedDate\
  \ < DATEADD(hour, -5, GETDATE());\nGO\n```\n\n此代码可以在 SQL Server 代理作业中实现，设置为在一天中偶尔运行。实际间隔取决于系统经历的活跃度，但在大多数情况下，每\
  \ 20 或 30 分钟一次就足够了。\n\n尽管此过期过程在大多数情况下有效，但从管理和业务角度来看，它也是问题可能出错的地方。主要挑战是定义一个合理的超时期限。如果平均锁持有时间为\
  \ 20 分钟，但某些长时间运行的进程可能需要持有锁数小时，则重要的是定义超时以偏向于后一进程，甚至提供缓冲以确保它们的锁永远不会在不适当的时候自动过期。\n\n\
  不幸的是，无论你选择什么超时期限，它永远不会对所有人都适用。几乎可以百分之百肯定，在某个时刻，某个用户将处理一个必须快速完成的非常重要的操作，而应用程序会崩溃，使锁保持原位。用户除了呼叫管理支持或等待超时期限外别无选择——当然，如果超时被设计为偏向需要数小时的进程，这将不是一个受欢迎的选择。\n\
  \n虽然我见过这个问题在悲观并发解决方案中出现，但它通常并不十分常见，并且除了一些压力大的最终用户外，没有造成任何重大问题。我很高兴地说，我从未在凌晨 2:00\
  \ 接到用户请求释放锁的紧急电话，尽管我完全可以想象这会发生。如果这是你系统的一个担忧，解决方案是设计应用程序，使其在工作时定期向数据库发送“心跳”通知。这些通知应更新锁日期/时间列：\n\
  \n```sql\nUPDATE CustomerLocks\nSET LockGrantedDate = GETDATE()\nWHERE LockToken\
  \ = @LockToken;\n```\n\n应用程序可以被设置为在检测到用户活动期间，按需发送心跳——例如，每 5 分钟一次。即使在 Web 应用程序中，这也很容易实现，这要归功于\
  \ AJAX 和类似的异步技术。如果使用此设计，可以显著缩短超时期限，但请记住，用户在工作时偶尔可能会暂时断开连接；至少稍微缓冲超时时间，以帮助抑制与断开连接相关的超时。\n\
  \n> **提示** 作为在锁表中保留 `LockGrantedDate` 的替代方案，你可以将该列建模为 `LockExpirationDate`。通过让调用方在获取锁时请求最大持续时间，而不是被迫采用标准的过期间隔，这可能会提高系统的灵活性。当然，这有其缺点：用户可能会请求不切实际的长时间锁。如果你实施此类解决方案，请仔细监控使用情况，以确保这不会成为问题。\n\
  \n在写入时强制实施悲观锁\n\n\n\n# 悲观并发解决方案的一个问题及一项提议的技术\n\n先前提出的解决方案以及其他程序化的悲观并发方案存在一个问题，即锁通常在应用程序代码之外不被强制实施。尽管在许多情况下这没有问题，但确保每个数据使用者在获取和释放锁时遵循相同的规则集至关重要。这些锁并不阻止数据修改，而仅作为一种手段来告知调用应用程序是否允许修改数据。如果应用程序的编码逻辑不正确，则可能导致核心数据规则被违反。\n\
  \n通过在写入时使用触发器对锁进行双重检查，可能避免部分或所有此类问题，但这可能难以实现，因为您可能无法确定哪个用户为特定行获取了哪个锁，更不用说判断是哪个用户在进行特定更新，特别是在您的应用程序仅使用单个数据库登录的情况下。\n\
  \n我提出了一种技术，可以帮助规避其中一些问题。首先，应基于 `CustomerId` 和 `LockToken` 列，为 `CustomerLocks` 表添加一个新的候选键：\n\
  \n```sql\nALTER TABLE CustomerLocks\nADD CONSTRAINT UN_Customer_Token\nUNIQUE (CustomerId,\
  \ LockToken);\nGO\n```\n\n然后，在 `Customers` 表中添加 `LockToken` 列后，此键可用作引用：\n\n```sql\n\
  ALTER TABLE Customers\nADD\nLockToken uniqueidentifier NULL,\nCONSTRAINT FK_CustomerLocks\n\
  FOREIGN KEY (CustomerId, LockToken)\nREFERENCES CustomerLocks (CustomerId, LockToken);\n\
  GO\n```\n\n由于 `Customers` 表中的 `LockToken` 列是可为空的，因此不需要始终引用有效的令牌。但是，当它实际设置为某个值时，该值必须存在于\
  \ `CustomerLocks` 表中，并且 `Customers` 表中的客户 ID 和令牌组合必须与 `CustomerLocks` 表中的相同组合一致。\n\
  \n一旦设置完成，就可以使用触发器为所有写入者在写入时强制实施锁：\n\n```sql\nCREATE TRIGGER tg_EnforceCustomerLocks\n\
  ON Customers\nFOR UPDATE\nAS\nBEGIN\n    SET NOCOUNT ON;\n\n    IF EXISTS\n    (\n\
  \        SELECT *\n        FROM inserted\n        WHERE LockToken IS NULL\n    )\n\
  \    BEGIN\n        RAISERROR('LockToken is a required column', 16, 1);\n      \
  \  ROLLBACK;\n    END\n\n    UPDATE Customers\n    SET LockToken = NULL\n    WHERE\n\
  \        LockToken IN\n        (\n            SELECT LockToken\n            FROM\
  \ inserted\n        );\nEND\nGO\n```\n\n外键约束强制分配给 `LockToken` 列的任何非 NULL 值必须有效。但是，它不强制\
  \ NULL 值；触发器处理这种情况，强制写入者在写入时设置锁令牌。如果所有行都符合条件，则令牌会更新回 NULL，以便锁可以被释放——保持引用将意味着无法从\
  \ `CustomerLocks` 表中删除这些行。\n\n此技术为更新增加了一些开销，因为每行必须更新两次。如果您的应用程序每天处理大量事务，请务必仔细测试，以确保这不会导致性能问题。\n\
  \n# 应用锁：推广悲观并发\n\n上一节中的示例可用于悲观地锁定行，但它需要为每种要锁定的实体类型进行一些设置，并且不容易推广到跨多行、表或 SQL Server\
  \ 数据库支持的其他粒度级别的资源锁定。\n\n认识到对这种锁定结构的需求，Microsoft 在 SQL Server 中包含了一项名为应用锁的功能。应用锁是程序化的、命名的锁，其行为类似于数据库中的其他类型的锁：在会话或事务范围内，调用者尝试获取与另一个调用者已持有的锁不兼容的锁会导致阻塞和排队。\n\
  \n使用 `sp_getapplock` 存储过程获取应用锁。默认情况下，锁绑定到活动事务，这意味着结束事务会释放锁。还有一个选项可以将锁绑定到会话，这意味着用户断开连接时会释放锁。要设置事务锁，请开始一个事务并请求一个锁名称（在应用锁术语中称为资源）。\n\
  \n您还可以指定锁模式，例如共享或独占。调用者还可以设置等待超时时间，之后存储过程将停止等待其他调用者释放锁。以下 TSQL 获取对 `customers` 资源的独占事务锁，最多等待\
  \ 2 秒让其他调用者释放他们持有的任何锁：\n\n```sql\nBEGIN TRAN;\nEXEC sp_getapplock\n    @Resource\
  \ = 'customers',\n    @LockMode = 'exclusive',\n    @LockTimeout = 2000;\n```\n\n\
  `sp_getapplock` 如果锁未成功获取，不会引发异常，而是设置一个返回值。如果锁无需等待就成功获取，返回值将为 0；如果锁在等待一段时间后获取，返回值将为\
  \ 1；如果锁未成功获取，返回值将为多个负值中的任何一个。作为 `sp_getapplock` 的使用者，了解您是否实际获取了您请求的锁非常重要——因此前面的示例调用实际上是不完整的。以下调用检查返回值以了解锁是否被授予：\n\
  \n```sql\nBEGIN TRAN;\nDECLARE @ReturnValue int;\nEXEC @ReturnValue = sp_getapplock\n\
  \    @Resource = 'customers',\n    @LockMode = 'exclusive',\n    @LockTimeout =\
  \ 2000;\n\nIF @ReturnValue IN (0, 1)\n    PRINT 'Lock granted';\nELSE\n    PRINT\
  \ 'Lock not granted';\n```\n\n要释放锁，您可以提交或回滚活动事务，或者使用 `sp_releaseapplock` 存储过程，该过程将锁资源名称作为其输入值：\n\
  \n```sql\nEXEC sp_releaseapplock\n    @Resource = 'customers';\n```\n\nSQL Server\
  \ 的应用锁在许多场景中非常有用，但它们存在与之前提到的相同问题，即 SQL Server 提供的并发模型与业务实际需求之间存在差异。应用锁仅在事务或会话的持续时间内持有，这意味着要锁定资源并基于该锁执行长时间运行的业务事务，调用者必须在整个时间内保持与数据库的连接。这显然不是一个可扩展的选项，因此我着手编写一个替代的、非事务性的应用锁框架。\n\
  \n我的目标是模拟 `sp_getapplock` 的大部分行为，但仅针对独占锁——悲观锁定方案通常不需要资源上的共享锁。我特别希望调用者能够排队并等待其他资源释放锁。由于这不是事务锁，我还希望处理我在本节中讨论的所有注意事项，包括确保同时请求锁的多个调用者不会都认为锁已授予他们，返回令牌以避免无效的锁释放场景，以及添加锁超时时间以确保孤立锁不会滞留直到管理员移除它们。\n\
  \n在考虑有助于我创建此功能的 SQL Server 2008 功能时，我立即想到了 Service Broker。Service Broker 提供可跨事务和会话边界的异步排队，而\
  \ `WAITFOR` 命令允许调用者等待消息，而无需持续轮询队列。\n\n> **注意** 有关 SQL Server Service Broker 的详细背景，请参阅\
  \ Klaus Aschenbrenner 所著的 *Pro SQL Server 2008 Service Broker*（Apress, 2008）。\n\n\
  我开发用于解决此问题的架构始于一个中央表，用于跟踪已获取的锁：\n\n```sql\nCREATE TABLE AppLocks\n(\n```\n\n\n###\
  \ **设计系统以实现应用并发性**\n\n`AppLockName` `nvarchar(255)` `NOT NULL`,\n`AppLockKey` `uniqueidentifier`\
  \ `NULL`,\n`InitiatorDialogHandle` `uniqueidentifier` `NOT NULL`,\n`TargetDialogHandle`\
  \ `uniqueidentifier` `NOT NULL`,\n`LastGrantedDate` `datetime` `NOT NULL` `DEFAULT`(`GETDATE()`),\n\
  `PRIMARY KEY` (`AppLockName`)\n);\n`GO`\n\n`AppLockName` 列存储用户请求的锁的名称，`AppLockKey`\
  \ 充当锁令牌。该令牌恰好也是一个 Service Broker 对话的对话句柄，我稍后会详细说明。`InitiatorDialogHandle` 和 `TargetDialogHandle`\
  \ 列是另一个 Service Broker 对话的对话句柄，我也会在后面解释。最后，`LastGrantedDate` 列的用法与之前的示例相同，用于跟踪表中每个锁的使用时间。如你所见，此列在此方案中比在之前的情况下更为重要，因为锁是被重用而非删除的。\n\
  \n为了支持 Service Broker 服务，我创建了一种消息类型和一个契约：\n\n```sql\nCREATE MESSAGE TYPE AppLockGrant\n\
  VALIDATION = EMPTY;\nGO\n\nCREATE CONTRACT AppLockContract (\nAppLockGrant SENT\
  \ BY INITIATOR\n);\nGO\n```\n\n如果你好奇为什么有一种用于授予锁的消息却没有用于请求它们的消息，那是因为此解决方案不使用锁请求服务。使用\
  \ Service Broker 仅仅是因为它恰好提供了我所需的排队、等待和超时功能——这与大多数 Service Broker 示例有所不同。\n\n我创建了两个队列和两个服务来支持此基础设施。接下来我们将深入了解系统的核心部分：\n\
  \n```sql\nCREATE QUEUE AppLock_Queue;\nGO\n\nCREATE SERVICE AppLock_Service\nON\
  \ QUEUE AppLock_Queue (AppLockContract);\nGO\n\nCREATE QUEUE AppLockTimeout_Queue;\n\
  GO\n\nCREATE SERVICE AppLockTimeout_Service\nON QUEUE AppLockTimeOut_Queue;\nGO\n\
  ```\n\n`AppLock_Queue` 队列及其关联服务的使用方式如下：当调用方请求对给定资源的锁时，如果以前从未有人请求过该资源的锁，则会在 `AppLock_Service`\
  \ 服务与其自身之间启动一个对话。该对话的发起方和目标对话句柄分别用于填充 `InitiatorDialogHandle` 和 `TargetDialogHandle`\
  \ 列。之后，当该调用方释放其锁时，会使用表中存储的发起方对话句柄在队列上发送一条 `AppLockGrant` 消息。当另一个调用方想要获取同一资源上的锁时，它会从表中获取目标对话句柄并在其上等待。这样，调用方就可以在不进行轮询的情况下等待锁被释放，并且如果在释放时正好在等待，就能立即获取它。\n\
  \n`AppLockTimeout_Queue` 的用法略有不同。你可能会注意到其关联服务使用了默认契约。这是因为除了 Service Broker 系统消息外，将不会有其他消息从它发出或发送给它。每当授予一个锁时，就会在服务与其自身之间启动一个新的对话，该对话的发起方对话句柄成为锁令牌。\n\
  \n除了用作锁令牌外，该对话还有另一个目的：启动时会为其设置一个生命周期。对话生命周期是一个计时器，在设定的时间段后，会向对话中所有活动的参与方发送一条消息——在此情况下，由于没有发送过消息，只有发起方会收到消息。收到消息后，将使用一个激活存储过程来释放锁。我发现这比使用\
  \ SQL Server 代理作业（如上一节示例所示）更能精细地控制锁的过期。每当调用方释放锁时，对话就会结束，从而清除其生命周期计时器。\n\n为了允许调用方请求锁，我创建了一个名为\
  \ `GetAppLock` 的存储过程。由于此存储过程相当长，我将分节介绍它，以便更彻底地解释细节。\n\n\n# 第 9 章 „ 设计应用并发系统\n\n\
  首先，该存储过程暴露了三个必需参数：要锁定的资源名称、在他人已持锁时等待锁的时长，以及一个输出参数——用于稍后释放锁的锁键。以下是该存储过程的前几行，直至其事务部分开始处：\n\
  \n```sql\nCREATE PROC GetAppLock\n    @AppLockName nvarchar(255),\n    @LockTimeout\
  \ int,\n    @AppLockKey uniqueidentifier = NULL OUTPUT\nAS\nBEGIN\n    SET NOCOUNT\
  \ ON;\n    SET XACT_ABORT ON;\n    --Make sure this variable starts NULL\n    SET\
  \ @AppLockKey = NULL;\n    DECLARE @LOCK_TIMEOUT_LIFETIME int = 18000; --5 hours\n\
  \    DECLARE @startWait datetime = GETDATE();\n    DECLARE @init_handle uniqueidentifier;\n\
  \    DECLARE @target_handle uniqueidentifier;\n    BEGIN TRAN;\n```\n\n该存储过程定义了几个重要的局部变量。`@LOCK_TIMEOUT_LIFETIME`是等待孤儿锁超时的时间长度。目前它是硬编码的，但可以轻松转换为参数，以允许调用者指定他们自己预估的完成时间。这可能是处理锁过期问题的一种更精确的方法。`@startWait`变量用于跟踪锁等待时间，使得该过程不允许调用者等待超过请求的锁超时值。\n\
  \n接下来，该存储过程利用了我试图取代的特性：SQL Server 原生的事务性应用程序锁。这背后有一些缘由。\n\n在开发这项技术期间，我发现 Service\
  \ Broker 的等待是按照后进先出（LIFO）规则处理的：最近等待的进程首先从队列中获取消息。\n\n如果你习惯于使用先进先出（FIFO）队列，这可能有些反直觉，但其设计目的是在活动突发后，让最少数量的激活存储过程保持活动状态。通过将消息传递给最新的等待进程，迫使较旧的进程最终超时并过期。\n\
  \n显然，这种方案虽然在激活存储过程的世界中有用，但不遵循队列锁的要求，因此我利用了一个事务性应用程序锁来强制等待的序列化。以下是用于获取锁的代码：\n\n```sql\n\
  --Get the app lock -- start waiting\nDECLARE @RETURN int;\nEXEC @RETURN = sp_getapplock\n\
  \    @resource = @AppLockName,\n    @lockmode = 'exclusive',\n    @LockTimeout =\
  \ @LockTimeout;\nIF @RETURN NOT IN (0, 1)\nBEGIN\n    RAISERROR(\n        'Error\
  \ acquiring transactional lock for %s', 16, 1, @AppLockName);\n    ROLLBACK;\n \
  \   RETURN;\nEND\n```\n\n如果锁成功授予，代码将继续执行；否则，它将回滚，调用方将收到错误通知，表明它未获取到请求的锁。一旦进入事务锁的作用域，就终于可以开始考虑\
  \ Service Broker 队列了。存储过程接下来要做的是获取目标对话句柄（如果存在）。如果存在，该存储过程就开始在队列上等待消息：\n\n```sql\n\
  --Find out whether someone has requested this lock before\nSELECT\n    @target_handle\
  \ = TargetDialogHandle\n    FROM AppLocks\n    WHERE AppLockName = @AppLockName;\n\
  --If we're here, we have the transactional lock\nIF @target_handle IS NOT NULL\n\
  BEGIN\n    --Find out whether the timeout has already expired...\n    SET @LockTimeout\
  \ = @LockTimeout - DATEDIFF(ms, @startWait, GETDATE());\n    IF @LockTimeout > 0\n\
  \    BEGIN\n        --Wait for the OK message\n        DECLARE @message_type nvarchar(255);\n\
  \        --Wait for a grant message\n        WAITFOR\n        (\n            RECEIVE\n\
  \                @message_type = message_type_name\n                FROM AppLock_Queue\n\
  \                WHERE conversation_handle = @target_handle\n        ), TIMEOUT\
  \ @LockTimeout;\n```\n\n在这部分代码中需要注意的一点是，输入的锁超时值会根据 `@startWait` 变量，减去存储过程已经等待的时间长度。\n\
  \n\n\n调用者可能指定了 `2500ms` 的等待时间，但实际上只等待事务锁 `2000ms`。此时，调用者应仅被允许再等待最多 `500ms` 以接收队列中的消息。因此，缩减后的超时时间被用作\
  \ `WAITFOR` 命令的 `RECEIVE` 超时。\n\n接下来，该过程检查接收到的消息类型。如果它是 `AppLockGrant` 消息，则一切顺利——锁已成功获取。超时对话被启动，锁令牌被设置。如果接收到意外的消息类型，则抛出异常并回滚事务：\n\
  \n```sql\nIF @message_type = 'AppLockGrant'\nBEGIN\n    BEGIN DIALOG CONVERSATION\
  \ @AppLockKey\n        FROM SERVICE AppLockTimeout_Service\n        TO SERVICE 'AppLockTimeout_Service'\n\
  \        WITH\n            LIFETIME = @LOCK_TIMEOUT_LIFETIME,\n            ENCRYPTION\
  \ = OFF;\n\n    UPDATE AppLocks\n    SET\n        AppLockKey = @AppLockKey,\n  \
  \      LastGrantedDate = GETDATE()\n    WHERE\n        AppLockName = @AppLockName;\n\
  END\nELSE IF @message_type IS NOT NULL\nBEGIN\n    RAISERROR('Unexpected message\
  \ type: %s', 16, 1, @message_type);\n    ROLLBACK;\nEND\n```\n\n第 9 章 „ 设计应用并发系统\n\
  \n下一段代码处理进入 `IF` 块之前获取的目标句柄为 `NULL` 的分支情况，这意味着之前从未有人请求过此资源的锁。\n\n此分支做的第一件事是在 `AppLock_Service`\
  \ 服务上开始一个对话。由于其他调用者需要目标对话句柄来等待资源，并且目标句柄直到发送消息后才会生成，所以必须做的第一件事就是在对话上发送一条消息。\n\n消息发送后，从\
  \ `sys.conversation_endpoints` 目录视图中获取目标句柄，并获取已发送的消息，以便其他调用者无法接收它：\n\n```sql\nELSE\n\
  BEGIN\n    -- No one has requested this lock before\n    BEGIN DIALOG @init_handle\n\
  \        FROM SERVICE AppLock_Service\n        TO SERVICE 'AppLock_Service'\n  \
  \      ON CONTRACT AppLockContract\n        WITH ENCRYPTION = OFF;\n\n    -- Send\
  \ a throwaway message to start the dialog on both ends\n    SEND ON CONVERSATION\
  \ @init_handle\n        MESSAGE TYPE AppLockGrant;\n\n    -- Get the remote handle\n\
  \    SELECT\n        @target_handle = ce2.conversation_handle\n    FROM sys.conversation_endpoints\
  \ ce1\n    JOIN sys.conversation_endpoints ce2 ON\n        ce1.conversation_id =\
  \ ce2.conversation_id\n    WHERE\n        ce1.conversation_handle = @init_handle\n\
  \        AND ce2.is_initiator = 0;\n\n    -- Receive the throwaway message\n   \
  \ RECEIVE\n        @target_handle = conversation_handle\n    FROM AppLock_Queue\n\
  \    WHERE conversation_handle = @target_handle;\n```\n\n第 „ 章 „ 设计应用并发系统\n\n启动锁授予对话并初始化目标对话句柄后，最终可以启动超时/令牌对话并将锁插入\
  \ `AppLocks` 表。处理完毕后，存储过程检查 `@AppLockKey` 变量是否已填充。如果已填充，则提交事务。否则，假定发生了超时，并回滚所有工作。\n\
  \n```sql\n    BEGIN DIALOG CONVERSATION @AppLockKey\n        FROM SERVICE AppLockTimeout_Service\n\
  \        TO SERVICE 'AppLockTimeout_Service'\n        WITH\n            LIFETIME\
  \ = @LOCK_TIMEOUT_LIFETIME,\n            ENCRYPTION = OFF;\n\n    INSERT INTO AppLocks\n\
  \        (\n            AppLockName,\n            AppLockKey,\n            InitiatorDialogHandle,\n\
  \            TargetDialogHandle\n        )\n    VALUES\n        (\n            @AppLockName,\n\
  \            @AppLockKey,\n            @init_handle,\n            @target_handle\n\
  \        );\nEND\n\nIF @AppLockKey IS NOT NULL\n    COMMIT;\nELSE\nBEGIN\n    RAISERROR(\n\
  \        'Timed out waiting for lock on resource: %s', 16, 1, @AppLockName);\n \
  \   ROLLBACK;\nEND\nEND;\nGO\n```\n\n设置这些锁所需的大部分工作都是在 `GetAppLock` 存储过程中完成的。\n\n\
  幸运的是，配套的 `ReleaseAppLock` 过程要简单得多：\n\n```sql\nCREATE PROC ReleaseAppLock\n    @AppLockKey\
  \ uniqueidentifier\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET XACT_ABORT ON;\n   \
  \ BEGIN TRAN;\n\n    DECLARE @dialog_handle uniqueidentifier;\n\n    UPDATE AppLocks\n\
  \    SET\n        AppLockKey = NULL,\n        @dialog_handle = InitiatorDialogHandle\n\
  \    WHERE\n        AppLockKey = @AppLockKey;\n\n    IF @@ROWCOUNT = 0\n    BEGIN\n\
  \        RAISERROR('AppLockKey not found', 16, 1);\n        ROLLBACK;\n    END\n\
  \n    END CONVERSATION @AppLockKey;\n\n    -- Allow another caller to acquire the\
  \ lock\n```\n\n第 9 章 „ 设计应用并发系统\n\n\n\n# 第 9 章 设计应用并发系统\n\n## 应用锁的实现\n\n以下 T-SQL\
  \ 代码片段展示了通过服务中介发送消息并提交对话的过程。\n\n```sql\nSEND ON CONVERSATION @dialog_handle\nMESSAGE\
  \ TYPE AppLockGrant;\nCOMMIT;\nEND;\nGO\n```\n\n调用方将获取的锁令牌发送给此过程，该过程首先尝试在 `AppLocks`\
  \ 表中将其值置为空。如果未找到该令牌，则引发错误并回滚事务。否则，与该令牌关联的对话将被终止。最后，也是最重要的，一条 `AppLockGrant` 消息被发送到与锁关联的授权对话上。此消息将被任何其他等待该锁的进程接收，从而授予该锁。\n\
  \n还需要一个最终的存储过程来支持此基础设施：一个激活存储过程，用于处理 `AppLockTimeout_Queue` 队列上的对话生命周期到期情况。以下 T-SQL\
  \ 创建了该过程并启用了队列上的激活功能：\n\n```sql\nCREATE PROC AppLockTimeout_Activation\nAS\nBEGIN\n\
  \    SET NOCOUNT ON;\n    SET XACT_ABORT ON;\n\n    DECLARE @dialog_handle uniqueidentifier;\n\
  \n    WHILE 1=1\n    BEGIN\n        SET @dialog_handle = NULL;\n        BEGIN TRAN;\n\
  \        WAITFOR\n        (\n            RECEIVE @dialog_handle = conversation_handle\n\
  \            FROM AppLockTimeout_Queue\n        ), TIMEOUT 10000;\n\n        IF\
  \ @dialog_handle IS NOT NULL\n        BEGIN\n            EXEC ReleaseAppLock @AppLockKey\
  \ = @dialog_handle;\n        END\n        COMMIT;\n    END\nEND;\nGO\n\nALTER QUEUE\
  \ AppLockTimeout_Queue\nWITH ACTIVATION\n(\n    STATUS = ON,\n    PROCEDURE_NAME\
  \ = AppLockTimeout_Activation,\n    MAX_QUEUE_READERS = 1,\n    EXECUTE AS OWNER\n\
  );\nGO\n```\n\n此过程在其循环的每次迭代中，等待长达 10 秒以获取队列中的消息。由于除了超时通知外预计不会有其他消息，因此接收到的任何消息都被假定为超时通知，并触发对\
  \ `ReleaseAppLock` 存储过程的调用。如果在 10 秒内未收到消息，激活过程将退出。\n\n一旦此系统就位，即可使用 `GetAppLock`\
  \ 存储过程请求应用锁，如下例所示：\n\n```sql\nDECLARE @AppLockKey uniqueidentifier;\nEXEC GetAppLock\n\
  \    @AppLockName = 'customers',\n    @LockTimeout = 2000,\n    @AppLockKey = @AppLockKey\
  \ OUTPUT;\nGO\n```\n\n在此示例中，存储过程将最多等待 2 秒让资源变为可用，然后返回错误。与其他悲观方案一样，应用程序必须妥善保存返回的密钥，以便稍后使用\
  \ `ReleaseAppLock` 存储过程释放锁。\n\n请注意，对此锁方法的持续维护与行级悲观锁描述的方法有些不同。锁被请求一次后，其在 `AppLocks`\
  \ 表中的行及其关联的授权对话将不会过期。我设计系统时考虑了这一点，以最小化在使用和重用大量锁的系统中设置和拆解大量对话的开销，但由于此架构，对话数量可能会随时间变得相当大。如果这成为问题，请使用\
  \ `LastGrantedDate` 列查找最近未请求的锁，并对发起方和目标句柄都调用 `END CONVERSATION`。\n\n## 乐观并发：期望最好的结果\n\
  \n与悲观并发解决方案的复杂性和开销相比，乐观方案感觉是一个绝妙的替代方案。确实，即使是“乐观”这个词也唤起了更好的感觉，这个名称也非常适合该方法论。乐观方案在读取或编辑时不使用任何锁，而是在数据实际写入表之前才检查冲突。这意味着没有管理孤儿锁或其他可能出现在悲观锁中的问题的开销，但也意味着该系统可能不适用于许多业务场景。\n\
  \n考虑“为最坏情况做准备：悲观并发”一节中描述的人寿保险公司。对于该公司来说，乐观方案意味着损失许多时间和金钱——这不是个好主意。然而，假设该公司有一个新项目：这次，公司不是要更新多年冗长的个人信息表单，而是只需将一些地址变更卡输入系统。与个人信息表单一样，这些卡片也没有得到保险公司员工的良好管理，并且存在一些重复。幸运的是，这些卡片是使用一个更新的系统归档的，数据重复不像个人信息表单那样严重。\n\
  \n在此场景中，悲观方案相关的管理开销可能不必要。碰撞的可能性远低于个人信息表单场景，如果操作员的输入恰好与另一个操作员碰撞，也只会损失几分钟的工作，而不是潜在的几个小时。\n\
  \n乐观并发的基本设置需要一个在行更新时也随之更新的列。此列用作版本标记，由客户端与其余数据一起检索。\n\n在更新时，检索到的值与更新一起发回，并检查其值以确保数据在读取时和更新时之间未更改。\n\
  \n实现此列有几种不同的选择，但首先我将讨论一个流行选项：SQL Server 的 `rowversion` 类型。`rowversion` 类型是一个 8 字节的二进制字符串，每当表中的一行更新时，SQL\
  \ Server 会自动更新它。例如，考虑以下表：\n\n```sql\nCREATE TABLE CustomerNames\n(\n    CustomerId\
  \ int NOT NULL PRIMARY KEY,\n    CustomerName varchar(50) NOT NULL,\n    Version\
  \ rowversion NOT NULL\n);\nGO\n```\n\n以下 T-SQL 插入两行，然后从表中检索所有行：\n\n```sql\nINSERT\
  \ INTO CustomerNames\n(\n    CustomerId,\n    CustomerName\n)\nVALUES\n(123, 'Mickey\
  \ Mouse'),\n(456, 'Minnie Mouse');\nGO\n\nSELECT *\nFROM CustomerNames;\nGO\n```\n\
  \n此查询的输出如下：\n\n| CustomerId | CustomerName | Version        |\n|------------|--------------|----------------|\n\
  | 123        | Mickey Mouse | 0x00000000000007E3 |\n| 456        | Minnie Mouse\
  \ | 0x00000000000007E4 |\n\n更新任何行都会自动更新 `rowversion` 列。以下 T-SQL 更新其中一行，然后检索表中的所有行：\n\
  \n```sql\nUPDATE CustomerNames\nSET CustomerName = 'Pluto'\nWHERE CustomerId = 456;\n\
  GO\n\nSELECT *\nFROM CustomerNames;\nGO\n```\n\n此查询的输出显示表中的值现在如下：\n\n| CustomerId\
  \ | CustomerName | Version        |\n|------------|--------------|----------------|\n\
  | 123        | Mickey Mouse | 0x00000000000007E3 |\n| 456        | Pluto       \
  \ | 0x00000000000007E5 |\n\n重要的是要注意，表上任何已提交的更新操作都会导致 `Version` 列被更新——即使您用相同的值更新列。不要假设版本跟踪的是数据的更改；相反，它跟踪的是对行的操作。\n\
  \n使用这样的列来支持乐观方案非常直接。一个有效的初步做法是在读取时将 `Version` 列与行中的其余数据一起取回，并在写入时检查它：\n\n```sql\n\
  DECLARE\n    @CustomerIdToUpdate int = 456,\n    @Version rowversion;\n\nSET @Version\
  \ =\n    (SELECT Version\n     FROM CustomerNames\n     WHERE CustomerId = @CustomerIdToUpdate);\n\
  \nUPDATE CustomerNames\nSET CustomerName = 'Pluto'\nWHERE\n    CustomerId = @CustomerIdToUpdate\n\
  \    AND Version = @Version;\n\nIF @@ROWCOUNT = 0\n    RAISERROR('Version conflict\
  \ encountered', 16, 1);\n```\n\n\n\n这是一种处理乐观并发控制的简单方法，但它存在几个问题。首先，系统中的每个更新例程都必须遵守检查版本的要求。与上一节描述的悲观方案一样，即使只有一个有问题的模块也会导致整个系统崩溃——这可不是好事。其次，这种设置在为用户提供良好体验方面留下的选择余地不大。遇到冲突错误却没有任何修复手段，这并不特别有趣——如果可能，我倾向于返回足够的数据，以便用户可以执行合并（当然，前提是应用程序提供了此功能）。\n\
  \n## 为应用并发设计系统\n\n解决这两个问题的方案始于对版本列数据类型的更改。由于使用 `rowversion` 类型的列除了 SQL Server 外无法被任何东西更新，这使得系统难以控制。因此，我的第一个建议是切换到\
  \ `uniqueidentifier` 或 `datetime`。以下是更新后的 `CustomerNames` 表定义，它使用了一个 `uniqueidentifier`\
  \ 列：\n\n```sql\n-- 重新创建 CustomerNames 表\nCREATE TABLE CustomerNames\n(\n    CustomerId\
  \ int NOT NULL PRIMARY KEY,\n    CustomerName varchar(50) NOT NULL,\n    Version\
  \ uniqueidentifier NOT NULL DEFAULT (NEWID())\n);\nGO\n\n-- 填充新表\nINSERT INTO CustomerNames\n\
  (\n    CustomerId,\n    CustomerName\n)\nVALUES\n    (123, 'Mickey Mouse'),\n  \
  \  (456, 'Minnie Mouse');\nGO\n```\n\n为了解决例程不遵守规则的潜在问题，可以使用触发器来强制执行乐观方案。这是通过要求对表的任何更新都必须包含对\
  \ `Version` 列的更新来实现的，该要求通过在触发器中检查 `UPDATE()` 函数来强制执行。该列应设置为读取数据时返回的任何版本值。这样，触发器就可以将\
  \ `inserted` 表中每行更新后的值与 `deleted` 表中的值进行比较。如果两者不匹配，则存在版本冲突。最后，触发器可以为更新的行设置一个新的版本值，从而将其标记为已被更改，供任何读取过数据的人知晓。以下是该触发器的定义：\n\
  \n```sql\nCREATE TRIGGER tg_UpdateCustomerNames\nON CustomerNames\nFOR UPDATE AS\n\
  BEGIN\n    SET NOCOUNT ON;\n    IF NOT UPDATE(Version)\n    BEGIN\n        RAISERROR('Updating\
  \ the Version column is required', 16, 1);\n        ROLLBACK;\n    END\n    IF EXISTS\n\
  \    (\n        SELECT *\n        FROM inserted i\n        JOIN deleted d ON i.CustomerId\
  \ = d.CustomerId\n        WHERE i.Version <> d.Version\n    )\n    BEGIN\n     \
  \   RAISERROR('Version conflict encountered', 16, 1);\n        ROLLBACK;\n    END\n\
  \    ELSE\n        --为更新的行设置新版本\n        UPDATE CustomerNames\n        SET Version\
  \ = NEWID()\n        WHERE\n            CustomerId IN\n            (\n         \
  \       SELECT CustomerId\n                FROM inserted\n            );\nEND;\n\
  GO\n```\n\n这个触发器解决了乐观模型中的版本控制问题，但它采取的方法相当生硬——遇到版本冲突时只是引发错误并回滚事务。\n\n也许更好地做法是扩展此触发器，以帮助为用户提供更多选择。这是我发现\
  \ SQL Server 的 XML 功能有用的一个地方。要创建一个类似于 ADO.NET XML DiffGram 的输出文档，请按以下代码清单中高亮显示的方式修改触发器的\
  \ `IF` 块：\n\n```sql\nALTER TRIGGER tg_UpdateCustomerNames\nON CustomerNames\nFOR\
  \ UPDATE AS\nBEGIN\n    SET NOCOUNT ON;\n    IF NOT UPDATE(Version)\n    BEGIN\n\
  \        RAISERROR('Updating the Version column is required', 16, 1);\n        ROLLBACK;\n\
  \    END\n    IF EXISTS\n    (\n        SELECT *\n        FROM inserted i\n    \
  \    JOIN deleted d ON i.CustomerId = d.CustomerId\n        WHERE i.Version <> d.Version\n\
  \    )\n    BEGIN\n        SELECT\n            (\n                SELECT\n     \
  \               ROW_NUMBER() OVER (ORDER BY CustomerId) AS [@row_number],\n    \
  \                *\n                FROM inserted\n                FOR XML PATH('customer_name'),\
  \ TYPE\n            ) new_values,\n            (\n                SELECT\n     \
  \               ROW_NUMBER() OVER (ORDER BY CustomerId) AS [@row_number],\n    \
  \                *\n                FROM deleted\n                FOR XML PATH('customer_name'),\
  \ TYPE\n            ) old_values\n        FOR XML PATH('customer_name_rows');\n\
  \    END\n    ELSE\n        --为更新的行设置新版本\n        UPDATE CustomerNames\n```\n\n\n\
  # 第 „ 章 设计支持应用并发的系统\n\n```sql\nSET Version = NEWID()\nWHERE\nCustomerId IN\n(\n\
  \    SELECT CustomerId\n    FROM inserted\n);\nEND;\nGO\n```\n\n进行此修改后，让我们尝试用无效的版本值更新表，如下面的\
  \ T-SQL 所示：\n\n```sql\nDECLARE\n    @CustomerId int = 123,\n    @Version uniqueidentifier;\n\
  \n-- Retrieve the current version value\nSELECT @Version = Version\nFROM CustomerNames\n\
  WHERE CustomerId = @CustomerId;\n\n-- Do something with the retrieved data here\n\
  \n-- Meanwhile, something else updates the version number\nUPDATE CustomerNames\n\
  SET CustomerName = 'Popeye',\n    Version = @Version\nWHERE CustomerId = @CustomerId;\n\
  \n-- Now try to write the changes back to the table\nUPDATE CustomerNames\nSET CustomerName\
  \ = 'Top Cat',\n    Version = @Version\nWHERE CustomerId = @CustomerId;\nGO\n```\n\
  \n执行此代码将产生类似如下所示的输出：\n\n```xml\n<customer_name_rows>\n    <new_values>\n       \
  \ <customer_name row_number=\"1\">\n            <CustomerId>123</CustomerId>\n \
  \           <CustomerName>Top Cat</CustomerName>\n            <Version>10E83AAD-B966-4250-A66D-FE0085706F9E</Version>\n\
  \        </customer_name>\n    </new_values>\n    <old_values>\n        <customer_name\
  \ row_number=\"1\">\n            <CustomerId>123</CustomerId>\n            <CustomerName>Popeye</CustomerName>\n\
  \            <Version>DDEDE0D4-44FE-42EA-B605-7431098D8A24</Version>\n        </customer_name>\n\
  \    </old_values>\n</customer_name_rows>\n```\n\n# 第 9 章 „ 设计支持应用并发的系统\n\n虽然这并不完全是为你编写合并例程，但我发现\
  \ XML 格式在处理这类操作时非常方便。由于该文档包含了引发冲突的较新版本值，你可以让最终用户执行合并，或者选择覆盖其他用户的更改，而无需再次返回数据库获取新行。\n\
  \n## 关于触发器与性能的说明\n\n在前两节中，更新触发器被用作控制围绕锁定的工作流的机制。触发器是一个很好的工具，因为调用者无法控制它们——无论更新是发生在存储过程中还是临时批处理中，也无论调用者是否遵循了锁定规则，触发器都会在表发生任何更新时触发。不幸的是，触发器也会带来问题：最显著的是，它们可能对性能产生严重影响。\n\
  \n触发器引起的主要性能问题通常源于事务时间延长以及因此可能发生的阻塞，这是由于低粒度锁被长时间持有所致。就这些触发器而言，这并不算大问题，因为它们使用的是更新操作本身已经锁定的相同行。然而，这些触发器确实会使更新速度略微变慢。在\
  \ SQL Server 2008 中，`inserted` 和 `deleted` 表实际上是隐藏的临时表；填充这些表并非没有成本——数据必须被传输到 `TempDB`\
  \ 中。此外，每个这样的触发器都会对基表产生额外的索引操作，而这些操作对于简单的更新来说是不必要的。\n\n在我的测试中，我发现这些触发器会使更新速度降低大约一倍。然而，这通常是几毫秒和再多几毫秒之间的差别——当然不算大问题，特别是考虑到它们为应用程序带来的价值。值得进行测试以确保这些触发器不会对你的应用程序造成严重的性能问题，但同时要记住，天下没有免费的午餐——如果是在数据完整性与性能之间做选择，我个人总是会选择前者。\n\
  \n## 拥抱冲突：多版本并发控制\n\n乐观并发和悲观并发专注于使长时间运行的业务流程能够协同工作，而不会破坏恰好正在并发修改的数据，而 MVCC 则基于*性能为王*的理念。\n\
  \n\n\n# 第九章 设计面向应用并发的系统\n\nMVCC 并不关心如何防止覆盖他人数据，因为在 MVCC 方案中根本不存在数据覆盖——完全不存在。MVCC\
  \ 不更新现有行，而是将每次变更都作为插入操作完成。这意味着无需检查数据冲突；只要没有数据被更新，就不会有数据丢失。在 MVCC 系统中，新行会标记版本号——通常是日期时间列或递增键——以便用户能轻松识别和查询最新版本。\n\
  \n一般而言，要从 MVCC 中获益，特定事务集的阻塞成本必须超过所有其他资源成本，尤其是磁盘 I/O 方面。由于行的新版本将作为完整新行插入，磁盘空间大量消耗的可能性相当大。\n\
  \n然而，由于没有实际更新操作发生，阻塞现象几乎不复存在。\n\n## 展示仅插入架构的性能提升\n\n使用负载工具展示仅插入架构可能带来的性能提升相当简单。首先，创建一个表并填充示例数据，如下方\
  \ T-SQL 所示：\n\n```sql\nCREATE TABLE Test_Updates\n(\n    PK_Col int NOT NULL PRIMARY\
  \ KEY,\n    Other_Col varchar(100) NOT NULL\n);\nGO\n\nINSERT INTO Test_Updates\
  \ (\n    PK_Col,\n    Other_Col\n)\nSELECT DISTINCT\n    Number,\n    'Original\
  \ Value'\nFROM master..spt_values\nWHERE number BETWEEN 1 AND 10;\n```\n\n接着，在新查询窗口中输入以下代码：\n\
  \n```sql\n-- 选择任意一行进行更新\nDECLARE @PK_Col int = CEILING(RAND() * 10)\nBEGIN TRAN;\n\
  -- 更新表格\nUPDATE Test_Updates\nSET Other_Col = 'new value set at ' + CAST(SYSDATETIME()\
  \ AS varchar(32))\nWHERE PK_Col = @PK_Col;\n-- 添加延迟\nWAITFOR DELAY '00:00:00.25';\n\
  COMMIT;\n```\n\n此代码模拟了一个`UPDATE`操作后，同一事务中继续执行四分之一秒的其他操作。其他操作的具体内容无关紧要；关键在于这是个稍长的事务，且`UPDATE`会在事务期间保持锁定——这对于保证更新数据的一致性是必要的。\n\
  \n## 使用 ostress 模拟并发环境\n\n为模拟并发环境，我们将通过多个并行线程同时执行前述查询。为此，我们将使用`ostress`工具，它是 Microsoft\
  \ Replay Markup Language (RML) Utilities for SQL Server 套件的一部分，可从 http://support.microsoft.com/default.aspx/kb/944837\
  \ 下载。使用`ostress`工具前，请将前述查询保存至新文件——我假设您保存为 `c:\\update_test.sql`。要测试此查询在并发环境中的性能，请打开\
  \ RML 命令提示符并输入：\n\n```bash\nostress.exe -Slocalhost -dtempDB -i\"c:\\update_test.sql\"\
  \ -n25 -r100 -q\n```\n\n这将通过 25 个线程执行`update_test.sql`文件内容，每个线程运行查询 100 次。如有必要，您应调整所提供的`ostress`参数如下：\n\
  \n*   `-S`：服务器名称\n*   `-d`：执行查询的目标数据库名称\n*   `-U`：登录 ID（仅当不使用 Windows 身份验证时需要）\n\
  *   `-P`：密码（仅当不使用 Windows 身份验证时需要）\n\n执行后，`ostress`工具在我系统上报告的耗时为 00:01:42.514。\n\
  \n## 与仅插入表格的性能对比\n\n要将此性能与高并发场景下插入操作的相对性能进行比较，请创建一个类似于`Test_Updates`的表格，这次设计用于存储——并进行版本化——插入的行：\n\
  \n```sql\nCREATE TABLE Test_Inserts\n(\n    PK_Col int NOT NULL,\n    Other_Col\
  \ varchar(100) NOT NULL,\n    Version int IDENTITY(1,1) NOT NULL,\n    PRIMARY KEY\
  \ (PK_Col, Version)\n);\nGO\n```\n\n修改先前的查询，使其不再更新记录，而是将记录插入新表，如下所示：\n\n```sql\n\
  DECLARE @PK_Col int = CEILING(RAND() * 10);\nBEGIN TRAN;\n-- 将值插入新表\nINSERT INTO\
  \ Test_Inserts (\n    PK_Col,\n    Other_Col\n)\nSELECT\n    @PK_Col,\n    'new\
  \ value set at ' + CAST(SYSDATETIME() AS varchar(32));\n-- 添加延迟\nWAITFOR DELAY '00:00:00.25';\n\
  ```\n\n\nCOMMIT;\n\n将此查询保存为 `insert_test.sql`，并使用与之前相同的 `ostress` 设置执行。在我的笔记本电脑上运行此测试的耗时为\
  \ 00:00:29.184——不到等效更新测试所用时间的三分之一。\n\n结果相当清晰：在模拟大规模阻塞场景时，插入操作明显优于更新操作，这得益于进程不会因尝试写入相同行而互相阻塞。\n\
  \n诚然，这个例子是刻意设计的，但它应足以说明 MVCC 作为一种并发技术的所谓优势。\n\n## 第九章 „ 设计支持应用并发的系统\n\n当然，MVCC 不仅仅是使用插入代替更新的概念。你还需要能够检索数据的一致视图。可以使用如下查询来获取\
  \ `Test_Inserts` 表中每一行的最新版本：\n\n```sql\nSELECT\n    ti.PK_Col,\n    ti.Other_Col,\n\
  \    ti.Version\nFROM Test_Inserts ti\nWHERE\n    Version =\n    (\n        SELECT\
  \ MAX(ti1.Version)\n        FROM Test_Inserts ti1\n        WHERE\n            ti1.PK_Col\
  \ = ti.PK_Col\n    );\n```\n\n本节我不会广泛涵盖 MVCC 查询——相反，我会建议你参考[第 11 章](http://example.com/chapter11)，该章涵盖了时态数据。其中讨论的双时态技术与\
  \ MVCC 有许多相似之处，但由于它们同时利用了时间和版本控制，因此总体价值主张更大，允许你基于时间而不仅仅是版本回溯数据的一致视图。\n\n正如你可能猜测的那样，MVCC\
  \ 虽然是一个有趣的概念，但如上所述，它无法直接应用于许多现实世界的应用程序。将 MVCC 概念与双时态数据模型相结合，可以使这项技术对高并发应用更具吸引力，在这些场景中，数据冲突的版本控制是有意义的。\n\
  \n### 在并发用户之间共享资源\n\n到目前为止，在本章中，我们已经探讨了用于保护数据完整性的业务规则——防止覆盖并最小化阻塞的发生——以及对不同并发模型性能影响的简要考量。然而，我尚未解决一个重要问题，即如何在并发环境中平衡对有限资源的竞争需求。\n\
  \n默认情况下，当向 SQL Server 实例发出多个请求时，数据库引擎会在所有并发用户之间平均共享资源。结果，每个请求都将面临更多的 CPU、内存和 I/O\
  \ 资源争用，导致平均查询时间更长，发生阻塞场景的风险更大。然而，在实践中，所有查询同等重要是罕见的。有些请求可能基于数据需求的紧迫性或请求用户的资历被归类为高优先级。相比之下，维护任务有时应仅在后台运行，即在有空闲资源时才执行。通过使用\
  \ **Resource Governor**（SQL Server 2008 的 Developer 和 Enterprise 版本中引入的一项新功能），可以对传入的连接进行分类和优先级排序，以确定资源如何在它们之间分配。\n\
  \n我不打算在本文中涵盖 Resource Governor 的所有方面：对于不熟悉该主题的读者，我建议阅读联机丛书上关于 Resource Governor\
  \ 的介绍：`http://msdn.microsoft.com/en-us/library/bb895232.aspx`。在本节中，我将集中演示一些可将 Resource\
  \ Governor 应用于高并发环境以提升性能的方法。\n\n### 第九章 „ 设计支持应用并发的系统\n\n在继续之前，创建一个新数据库并向该数据库添加两个新用户，用于接下来的示例：\n\
  \n```sql\n-- 创建并切换到新数据库\nCREATE DATABASE ResourceGovernor;\nGO\nUSE ResourceGovernor;\n\
  GO\n\n-- 为每个用户创建 DB 登录和用户\nCREATE LOGIN UserA\nWITH\n    PASSWORD = 'password',\n\
  \    CHECK_POLICY = OFF;\nCREATE USER UserA FROM LOGIN UserA;\nGO\nCREATE LOGIN\
  \ UserB WITH\n```\n\n\n# 设计应用并发系统\n\n## 设置用户与资源组\n\n首先，创建用户并授予其数据库所有者权限。\n\n```sql\n\
  PASSWORD='password',\nCHECK_POLICY = OFF;\n\nCREATE USER UserB FROM LOGIN UserB;\n\
  \nGO\n\n-- 为简化起见，使两个用户都成为 db_owner\nEXEC sp_addrolemember 'db_owner', 'UserA';\n\
  EXEC sp_addrolemember 'db_owner', 'UserB';\n\nGO\n```\n\n为简化示例，来自这些数据库用户的请求将被映射到它们各自的工作负载组，每个组又有其专用的资源池，如下所示：\n\
  \n```sql\nUSE master;\n\nGO\n\nALTER RESOURCE GOVERNOR RECONFIGURE;\n\nGO\n\n--\
  \ 使用默认设置创建两个资源池\nCREATE RESOURCE POOL PoolA;\nCREATE RESOURCE POOL PoolB;\n\nGO\n\
  \n-- 创建两个工作负载组\nCREATE WORKLOAD GROUP GroupA USING PoolA;\nCREATE WORKLOAD GROUP\
  \ GroupB USING PoolB;\n\nGO\n```\n\n## 创建分类器函数\n\n接下来，必须创建用于分配传入请求所属工作负载组的分类器函数。在此示例中，我们将所有来自`UserA`的请求分类到`GroupA`工作负载组，所有来自`UserB`的请求分类到`GroupB`工作负载组，如下所示：\n\
  \n```sql\nCREATE FUNCTION dbo.RGClassifier()\nRETURNS sysname WITH SCHEMABINDING\n\
  AS\nBEGIN\n    DECLARE @grp_name AS sysname = N'default';\n    DECLARE @login_name\
  \ AS sysname = SUSER_NAME();\n    IF @login_name = N'UserA'\n        SET @grp_name\
  \ = N'GroupA';\n    ELSE IF @login_name = N'UserB'\n        SET @grp_name = N'GroupB';\n\
  \    RETURN @grp_name;\nEND;\n\nGO\n```\n\n为便于演示，我仅根据发出请求的用户登录名对每个传入连接请求进行分类。所有来自`UserA`的请求被分类到`GroupA`工作组，所有来自`UserB`的请求将被分类到`GroupB`工作组。所有其他请求将使用默认组。\n\
  \n也可以基于其他因素进行分类决策，包括连接字符串中提供的主机或应用程序名称（分别使用`HOST_NAME()`和`APP_NAME()`检索），以及用户是否是特定角色或组的成员。\n\
  \n> **重要提示**：一旦激活`Resource Governor`，分类器函数将运行以分类*每一个*传入服务器的连接，并管理该会话可用的资源。因此，至关重要的是确保此函数经过彻底测试和优化，否则可能会危及你的系统。\n\
  \n> **提示**：所有通过专用管理员连接（DAC）发出的查询都在内部工作负载组和资源池中运行，不受分类约束。如果分类器函数出现问题，你可能会发现需要通过 DAC\
  \ 连接到`SQL Server 2008`来调查和修复问题。\n\n## 激活资源调控器\n\n最后，将`Resource Governor`绑定到分类器函数并激活，如下所示：\n\
  \n```sql\nALTER RESOURCE GOVERNOR\nWITH ( CLASSIFIER_FUNCTION = dbo.RGClassifier\
  \ );\nGO\n\nALTER RESOURCE GOVERNOR RECONFIGURE;\n\nGO\n```\n\n## 监控性能\n\n既然我们已经设置了基本的资源调控器基础设施，就需要某种方法来监控高并发环境下的性能影响。为此，打开系统性能监视器控制台（`perfmon.exe`）。右键单击性能图，然后选择“添加计数器”菜单选项。向下滚动可用计数器列表，当看到`SQL\
  \ Server:Workload Group Stats`标题时，单击为`GroupA`和`GroupB`添加`CPU Usage %`度量。这些步骤如图 9-1\
  \ 所示。\n\n**图 9-1. 为 GroupA 和 GroupB 添加 CPU 使用率百分比性能计数器**\n\n### 控制资源分配\n\n`Resource\
  \ Governor`最基本的用途之一是为分配给不同资源池的 CPU 和服务器内存设置明确的最小和最大级别。为了演示应用这些限制的效果，我们首先需要在服务器上施加一些负载。打开\
  \ RML 命令提示符，使用`ostress`工具设置由`UserA`发出的查询，如下所示：\n\n```\nostress -U\"UserA\" -P\"\
  password\" -Q\"WHILE(1=1) SELECT REPLICATE('a',4000);\" -n5 –q\n```\n\n接下来，打开第二个\
  \ RML 命令提示符并输入以下由`UserB`发出的请求：\n\n```\nostress -U\"UserB\" -P\"password\" -Q\"WHILE(1=1)\
  \ SELECT REPLICATE('b',4000);\" -n5 -q -o\"C:\\UserB\"\n```\n\n每个查询都将发出一个循环的、相对\
  \ CPU 密集型的查询，该查询将跨五个独立线程无限重复。我们可以通过检查`sys.dm_resource_governor_workload_groups`\
  \ DMV 来确认分类器函数是否正常工作，如下列代码清单所示：\n\n```sql\nSELECT\n    name,\n    total_request_count\n\
  FROM\n    sys.dm_resource_governor_workload_groups\nWHERE\n    name IN ('GroupA',\
  \ 'GroupB');\n```\n\n结果显示，每个工作负载组下都有五个正在运行的请求。现在检查性能监视器图。在我的系统上，这如图 9-2 所示。\n\n\
  **图 9-2. 两个默认工作负载组的平衡性能**\n\n## 调整 CPU 限制\n\n正如我们保留了所有资源调控器设置为默认值所预期的那样，图中显示两个工作负载之间的\
  \ CPU 使用率百分比大致均等。那么现在让我们尝试改变一下。首先，我们将尝试限制分配给两个资源池的 CPU 资源：\n\n```sql\nALTER RESOURCE\
  \ POOL PoolA\nWITH ( MAX_CPU_PERCENT = 10 );\n\nALTER RESOURCE POOL PoolB\nWITH\
  \ ( MAX_CPU_PERCENT = 10 );\n\nALTER RESOURCE GOVERNOR RECONFIGURE;\n\nGO\n```\n\
  \n执行此代码后，你可能会惊讶地发现，图表没有任何变化。那么为什么`Resource Governor`似乎忽略了我们指定的`MAX_CPU_PERCENT`，并且未能将两个资源池限制在\
  \ 10%的 CPU 呢？这说明了`Resource Governor`分配资源的方式的一个重要点——`MAX_CPU_PERCENT`值并非规定 CPU 使用的硬性限制，而是在*资源存在争用时*用于平衡竞争请求。\n\
  \n在这种情况下，由于所有资源池的声明性`MAX_CPU_PERCENT`总和小于 100%，因此不存在争用。SQL Server OS 总是会尝试最大化 CPU\
  \ 资源使用率，因此如果有空闲 CPU 可用，它将在可用池之间分配。资源池的`MAX_CPU_PERCENT`仅在超出该限制会阻止另一个资源池被授予其请求的最大\
  \ CPU 设置的情况下强制执行。\n\n> **注意**：在测试使用限制为`MAX_CPU_PERCENT`的资源池执行的应用程序时，重要的是要记住，仅当存在来自其他资源池对该\
  \ CPU 资源的争用时，该限制才会被强制执行。因此，你应该始终在具有竞争性并发进程的环境中进行测试。\n\n考虑到这一点，让我们现在尝试另一个例子。在此示例中，我们将确保两个资源池的`MAX_CPU_PERCENT`总和为\
  \ 100%，这样任何一个都不允许超过该限制（否则另一个将被拒绝 CPU 资源）：\n\n```sql\nALTER RESOURCE POOL PoolA\n\
  WITH ( MAX_CPU_PERCENT = 90 );\n\nALTER RESOURCE POOL PoolB\nWITH ( MAX_CPU_PERCENT\
  \ = 10 );\n\nALTER RESOURCE GOVERNOR RECONFIGURE;\n\nGO\n```\n\n遵循前面解释的规则，你现在可能期望`PoolA`和`PoolB`之间的\
  \ CPU 使用率按 90:10 的比例分配，并且根据你的系统，这可能是你现在在性能监视器图上观察到的结果。然而，我的系统上的图表*仍然*显示两个工作负载组之间几乎没有可察觉的差异，如图\
  \ 9-3 所示。\n\n**图 9-3. CPU 使用率百分比**\n\n\n\n# 第 9 章：为应用程序并发设计系统\n\n## 对图 9-3 所示行为的解释是，资源调控器使用的\
  \ `MAX_CPU_PERCENT` 限制（以及其他资源池选项）是在 *每个调度程序* 级别指定的。换句话说，`MAX_CPU_PERCENT` 设置用于分配授予资源池的\
  \ CPU 资源量，以运行该进程的 CPU 的百分比表示。我在一个多处理器计算机上运行这些测试，这意味着每个工作负荷组下的查询被分配到不同的 CPU 上。我可以通过执行以下命令来确认这一点：\n\
  \n```sql\nSELECT\n    rgwg.name AS group_name,\n    est.text AS SQL,\n    ot.scheduler_id,\n\
  \    cpu_id,\n    er.status\nFROM\n    sys.dm_exec_requests er\n    JOIN sys.dm_os_tasks\
  \ ot ON er.task_address = ot.task_address\n    JOIN sys.dm_resource_governor_workload_groups\
  \ rgwg\n        ON er.group_id = rgwg.group_id\n    JOIN sys.dm_os_schedulers os\
  \ ON ot.scheduler_id = os.scheduler_id\n    CROSS APPLY sys.dm_exec_sql_text(er.sql_handle)\
  \ est\nWHERE\n    rgwg.name IN ('GroupA', 'GroupB');\n```\n\n结果表明，两个查询是在运行于不同 CPU\
  \ 的不同调度程序上执行的：\n\n```\ngroup_name    SQL                                       \
  \   scheduler_id    cpu_id    status\n------------  -------------------------------------------\
  \  --------------  --------  -------\nGroupA        WHILE(1=1) SELECT REPLICATE('a'...\
  \           0               0         running\nGroupB        WHILE(1=1) SELECT REPLICATE('b'...\
  \           1               1         runnable\n```\n\n由于每个查询都在单独的调度程序上执行，因此再次没有对\
  \ CPU 资源的争用，所以 `MAX_CPU_PERCENT` 限制未被强制执行。\n\n## 为了能够更清晰地展示资源调控器的效果，有必要通过设置关联掩码将\
  \ SQL Server 线程的执行限制在单个 CPU 上，如下所示：\n\n```sql\nsp_configure 'show advanced options',\
  \ 1;\nRECONFIGURE;\nGO\n\nsp_configure 'affinity mask', 1;\nRECONFIGURE;\nGO\n```\n\
  \n**注意**：使用位掩码值 `1` 调用 `sp_configure 'affinity mask'` 会将所有 SQL Server 线程分配给处理器 `0`，而不管系统上有多少个\
  \ CPU 核心。设置此选项时应极其谨慎，即使在测试环境中也是如此。\n\n## 在我的系统上更改 CPU 关联掩码的结果如图 9-4 所示。\n\n最终，我们似乎接近了预期的结果，但看到的不是资源池之间\
  \ 90:10 的分割，而是看起来像 45:5——这是池之间的正确比例，但另外 50%的资源到哪里去了？\n\n原因在于，“CPU 使用率%”性能计数器是基于服务器上的\
  \ CPU 数量进行标准化的。在这种情况下，我在一台双处理器机器上运行测试，但我刚刚将 SQL Server 关联掩码设置为仅允许 SQL Server 处理器线程在一个处理器上运行。因此，所有\
  \ CPU 使用率百分比的测量值都是其预期值的一半，最大 CPU 使用率数字为 50%。\n\n![](img/index-297_1.png)\n\n*图 9-4\\\
  . 将 CPU 关联设置为单个处理器后资源池之间的 CPU 使用情况*\n\n## 计算有效最大值和共享最大资源分配\n\n在高并发环境中，很少有每个请求都被平等对待的情况。在许多情况下，业务要求确保某些定义的用户组或特定查询集获得优先处理，以保证快速响应时间。来自高优先级用户的查询或必须在特定时间范围内完成以确保满足客户服务级别协议的查询可能需要特殊处理。\n\
  \n到目前为止，我已经演示了资源调控器如何在某些场景下用于限制最大服务器资源使用，但更实际的情况涉及保证查询可用的*最小*资源。通过在不同的资源池的 `MAX_CPU_PERCENT`\
  \ 和 `MIN_CPU_PERCENT`（以及对应的 `MIN_MEMORY_PERCENT` 和 `MAX_MEMORY_PERCENT`）上设置适当的限制，很容易将优先请求分类到专用资源池，该池接收服务器\
  \ CPU 和内存资源的保证最小份额，同时限制给予其他池的资源。\n\n要理解不同池设置之间的相互作用，假设我们希望 `PoolA` 作为我们的优先池，`PoolB`\
  \ 作为我们的普通池。为了实现这一点，我们将规定 `PoolA` 应具有 30%的最小 CPU 资源和 90%的最大 CPU 资源。我们将规定 `PoolB`\
  \ 的 CPU 最小为 0%，最大 CPU 限制为 50%。可以使用以下 T-SQL 进行这些更改：\n\n```sql\nALTER RESOURCE POOL\
  \ PoolA\nWITH (\n    MIN_CPU_PERCENT = 30,\n    MAX_CPU_PERCENT = 90\n);\n\nALTER\
  \ RESOURCE POOL PoolB\nWITH (\n    MIN_CPU_PERCENT = 0,\n    MAX_CPU_PERCENT = 50\n\
  );\n\nALTER RESOURCE GOVERNOR RECONFIGURE;\nGO\n```\n\n现在，这些设置如何影响池之间的资源分配方式？\n\n\
  记住，`MAX_CPU_PERCENT` 限制仅在存在资源争用时才会强制执行。`PoolA` 指定了 30%的最小服务器 CPU 使用率。然而，由于 `PoolB`\
  \ 仅请求最多 50%的 CPU，这两个请求都可以在没有争用的情况下被满足。因此，此情况下每个池的**有效最大值** CPU 使用率与请求的最大值相同：`PoolA`\
  \ 为 90%，`PoolB` 为 50%。\n\n对于 `PoolA`，有效最大 CPU 的 30%来自专用资源，而剩余的 60%来自共享资源池，因此取决于服务器上其他请求的其他需求。`PoolB`\
  \ 没有指定最小 CPU 百分比，因此其 50%的有效最大 CPU 使用率全部来自共享资源池。\n\n**注意**：有关有效最大值限制的更多信息，请参阅以下联机丛书页面：http://msdn.microsoft.com/en-us/library/bb934084.aspx。\n\
  \n现在让我们看看，如果我们创建第三个资源池会发生什么，如下所示：\n\n```sql\nCREATE RESOURCE POOL PoolC\nWITH (\n\
  \    MIN_CPU_PERCENT = 15,\n    MAX_CPU_PERCENT = 100\n);\n```\n\n创建这个新资源池的效果如下：\n\
  \n*   `PoolA` 现在的有效最大 CPU 使用率为 85%。必须将之前 90%的有效最大值降低，以确保可以满足 `PoolC` 15%的 `MIN_CPU_PERCENT`\
  \ 请求。`PoolA` 现在从共享资源池获取其最大有效 CPU 资源的 55%。\n*   `PoolB` 保持不变，有效最大 CPU 资源为 50%，全部取自共享资源池。\n\
  *   `PoolC` 的有效最大 CPU 资源为 70%（因为必须满足 `PoolA` 30%的最小请求），其中 55%的资源来自共享资源池。\n\n请注意，在本节中，我仅演示了使用\
  \ `MIN_CPU_PERCENT` 和 `MAX_CPU_PERCENT` 分配 CPU 资源，但相同的资源平衡规则也可以应用于使用 `MIN_MEMORY_PERCENT`\
  \ 和 `MAX_MEMORY_PERCENT` 分配给资源池的内存资源。通过为每个资源池设置适当的限制，可以在服务器上有限资源存在竞争时平衡不同类别请求的需求。请始终记住，这些不是硬性限制，而是用于在存在争用时计算资源分配方式。在没有争用时，资源池可以消耗服务器上的所有可用资源，即使其他资源池指定了最小值。\n\
  \n### 控制并发请求处理\n\n\n\n# 第九章 设计高并发应用程序系统\n\n虽然上一节讨论了如何更改资源调控器使用的各种资源池的可用资源量，但考虑查询请求所分配的工作负载组的配置也同样重要。在高并发环境中，一个特别值得关注的选项是\
  \ `GROUP_MAX_REQUESTS` 设置，该设置限制在给定工作负载组中将处理的并发请求数。一旦达到最大请求限制，此工作负载组的任何额外请求都将进入等待状态，直到容量可用为止。\n\
  \n在继续之前，请取消任何可能仍在运行的 `ostress` 窗口。\n\n然后通过执行以下 T-SQL 重置查询计划缓存、资源调控器统计信息以及 DMV 表中的等待统计信息：\n\
  \n```sql\nALTER RESOURCE GOVERNOR RESET STATISTICS;\nDBCC FREEPROCCACHE;\nDBCC SQLPERF('sys.dm_os_wait_stats',\
  \ CLEAR);\nGO\n```\n\n现在打开一个新的 RML 命令提示符，并使用 `ostress` 工具通过 500 个线程各执行一个简单查询 100\
  \ 次，总共创建 50,000 个请求：\n\n```cmd\nostress -U\"UserA\" -P\"password\" –Slocalhost -Q\"\
  DECLARE @table TABLE (x varchar(4000)); INSERT INTO @table SELECT REPLICATE('a',4000);\"\
  \ -n500 -r100 –q\n```\n\n当 `ostress` 完成后，您将看到完成所有查询所需的总耗时。在我的笔记本电脑上，报告的时间是 00:03:23.255。\n\
  \n回到 SQL Server Management Studio，我们可以使用以下 T-SQL 检查这些查询的性能：\n\n```sql\nSELECT\n\
  \    total_request_count AS requests,\n    total_queued_request_count AS queued,\n\
  \    total_lock_wait_count AS locks,\n    CAST(total_cpu_usage_ms AS decimal(18,9))\
  \ / total_request_count\n        AS avg_cpu_time,\n    max_request_cpu_time_ms AS\
  \ max_cpu_time\nFROM\n    sys.dm_resource_governor_workload_groups\nWHERE\n    name\
  \ = N'GroupA';\n```\n\n```\nrequests queued locks avg cpu_time max_cpu_time\n50500\
  \    0      627216 3.52998019801980198019801980198 80\n```\n\n现在，让我们更改资源调控器设置，将此工作负载组允许的最大并发请求数限制为三。这将创建一个队列。\n\
  \n```sql\nALTER WORKLOAD GROUP GroupA\nWITH ( GROUP_MAX_REQUESTS = 3 )\nUSING PoolA;\n\
  ALTER RESOURCE GOVERNOR RECONFIGURE\nGO\n```\n\n在再次运行测试之前，重置统计信息表：\n\n```sql\nALTER\
  \ RESOURCE GOVERNOR RESET STATISTICS;\nDBCC FREEPROCCACHE;\nDBCC SQLPERF('sys.dm_os_wait_stats',\
  \ CLEAR);\nGO\n```\n\n然后完全按照之前的方式重新运行 `ostress` 测试。这次在我的系统上，所有查询的最终执行时间是 00:03:03.257。通过限制工作组的最大并发请求数，在此示例中处理\
  \ 50,000 个查询队列所花费的总时间减少了大约 10%。\n\n尽管乍一看这个结果可能令人惊讶，但它实际上完全合理。为了理解发生了什么，请重新运行之前对\
  \ `sys.dm_resource_governor_workload_groups` DMV 的查询。我在系统上的结果如下所示：\n\n```\nrequests\
  \ queued locks avg cpu_time max_cpu_time\n50500    48372 36727 3.46671287128712871287128712871\
  \ 54\n```\n\n由于我们将 `GROUP_MAX_REQUESTS` 设置为 3，正如预期的那样，发送到 `GroupA` 工作负载组的请求被迫等待，同时满足每个请求所需的总体平均\
  \ CPU 时间基本保持相似。\n\n然而，当并发请求较少时，每个查询因其他线程锁定的资源而产生的等待会显著减少。在此特定示例中，减少锁等待带来的益处超过了资源调控器限制所带来的等待时间成本。结果，不仅处理请求队列的总耗时减少了，而且完成每个查询所用时间的一致性也提高了（只有三个并发请求时最大\
  \ CPU 时间为 54ms，而之前的示例中是 80ms）。\n\n## 提示\n如果您对查找有关资源调控器所施加等待的进一步统计信息感兴趣，请尝试在 `sys.dm_os_wait_stats`\
  \ DMV 中查找 `wait_type` 为 `RESMGR_THROTTLED` 的行。\n\n## 总结\n并发性是一个复杂的主题，有许多可能的解决方案。在本章中，我介绍了从业务流程和数据碰撞角度应该考虑的各种并发模型，并解释了它们与\
  \ SQL Server 数据库引擎支持的类似命名的并发模型有何不同。悲观并发可能是最常用的形式，但其设置和维护可能很复杂。乐观并发虽然更轻量级，但可能不适用于许多业务场景；而多值并发控制虽然是一项新颖的技术，但其实现方式可能难以在提供除性能提升之外的价值的同时允许碰撞。\n\
  \n最后，我概述了在并发环境中，资源调控器如何平衡有限资源在不同竞争请求之间的分配方式。这里的讨论仅触及了这一技术潜力的皮毛，我建议对此主题感兴趣的读者花些时间进一步研究这个强大的功能。\n\
  \n# 第十章 处理空间数据\n\n空间功能的添加是 SQL Server 2008 中引入的最激动人心的新功能之一。尽管对于许多 SQL 开发人员来说，这通常是一个新概念，但处理空间数据的原理已经确立了很多年。专用的地理信息系统（GIS），例如\
  \ ESRI 的 ARC/INFO，自 1970 年代以来就已经存在。然而，直到最近，空间数据分析一直被视为一个独特、小众的主题领域，空间数据的知识和使用在很大程度上仍局限于其自身领域内，而未与主流开发集成。\n\
  \n事实上，几乎没有哪个企业数据库不存储某种形式的空间信息。客户的地址、销售区域、本地营销活动针对的区域，或者配送和物流车辆所采取的路线，都是可以在许多常见应用程序中找到的空间数据。\n\
  \n在本章中，我将首先描述处理空间数据所涉及的一些基本原理，然后讨论 `geometry` 和 `geography` 数据类型的一些重要特性，这些数据类型是\
  \ SQL Server 中用于表示空间数据和对空间数据执行操作的具体数据类型。\n\n在演示了如何使用这些方法来回答一些常见的空间问题之后，我将集中讨论创建高性能空间应用程序需要考虑的要素。\n\
  \n> **注意** 处理空间数据带来了一系列独特的挑战，并且在许多情况下，与其他传统数据类型相比，需要采用特定的技术和理解。如果您对 SQL Server 中的空间数据更全面的介绍感兴趣，我推荐阅读我之前的另一本书《*Beginning\
  \ Spatial with SQL Server 2008*》（Apress，2008）。\n\n## 空间数据建模\n空间数据描述对象在空间中的位置、形状和方向。这些对象可以是具体的、物理的事物，如办公楼、铁路或山脉；也可以是抽象的特征，例如标记国家之间政治边界的想象线，或特定商店服务的区域。\n\
  \nSQL Server 采用空间数据的矢量模型，其中每个对象都使用一个或多个**几何体**来表示——这些原始形状近似于它们所代表的真实世界对象的形状。\n\n\
  `geometry` 和 `geography` 数据类型可以使用三种基本类型的几何体：点（`Point`）、线串（`LineString`）和多边形（`Polygon`）：\n\
  \n\n好的，作为您的高级文档工程师和翻译员，我将严格遵循您提供的注意事项和格式要求，将这份关于空间数据的技术文档从英文翻译为中文。\n\n# 第十章 处理空间数据\n\
  \n`Point` 是最基本的几何类型，表示空间中的一个单独位置。`Point` 几何是零维的，这意味着它没有相关的面积或长度。\n\n`LineString`\
  \ 由一系列两个或多个不同的点以及连接这些点的线段组成。`LineString` 有长度，但没有相关的面积。一个**简单**的 `LineString` 是指点之间的路径不会自相交。一个**闭合**的\
  \ `LineString` 是指起点和终点是同一个点。一个既简单又闭合的 `LineString` 被称为**环**。\n\n`Polygon` 由一个**外环**组成，它定义了多边形所包含空间区域的边界。多边形也可以指定一个或多个**内环**，它们定义了外环内部但被多边形排除的空间区域。内环可以被看作是从多边形中“挖掉”的“洞”。多边形是二维的——它们有一个长度，测量为所有定义环的总长度，还有一个面积，测量为外环内（且未被任何内环排除）的空间。\n\
  \n> **注意** 在 SQL Server 中处理空间数据时，`geometry` 一词有两种不同的含义。为了区分清楚，我将使用 `geometry`（常规字体）作为通用名称来描述点、线串和多边形，并使用\
  \ `geometry`（代码字体）来指代 `geometry` 数据类型。\n\n有时，一个要素可能由多个几何体表示，这种情况下它被称为一个 `GeometryCollection`。`GeometryCollection`\
  \ 可以是同构的，也可以是异构的。例如，中国的长城不是一段连续的墙；相反，它由几个不同的墙段组成。因此，它可以表示为一个 `MultiLineString`——一个\
  \ `LineString` 几何的同构集合。同样，许多国家，如日本，可以表示为一个 `MultiPolygon`——一个由几个多边形组成的 `GeometryCollection`，每个多边形代表一个独立的岛屿。也有可能存在一个异构的\
  \ `GeometryCollection`，例如包含一个点、三个线串和两个多边形的集合。\n\n图 10-1 展示了 SQL Server 2008 中使用的三种基本几何类型，以及它们通常适用的场景示例。\n\
  \n在选择了合适的几何类型来表示给定要素后，我们需要一种方法将几何定义中的每个点与其所代表的相关真实世界位置关联起来。例如，要使用 `Polygon` 几何来表示美国国防部五角大楼，我们需要指定定义\
  \ `Polygon` 几何边界的五个点与大楼五个角的位置相关联。那么我们如何做到这一点呢？\n\n你可能熟悉“经度”和“纬度”这些术语，因此你可能会认为这仅仅是列出几何中每个点的相应纬度和经度坐标的问题。不幸的是，事情并非如此简单。\n\
  \n图 10-1. 不同类型的几何体及其常见用途\n\n许多人没有意识到的是，地球表面上的任何一个点，并不仅仅只有一个唯一的纬度或经度与之关联。实际上，存在许多不同的经纬度系统，给定点在地球上的坐标会因使用哪个系统而异。此外，经纬度坐标并不是表达地球上位置的唯一方式——还有其他类型的坐标可以在不使用经纬度的情况下定义物体的位置。\n\
  \n为了理解如何指定几何体的坐标，我们首先需要考察不同的空间参考系统是如何工作的。\n\n## 空间参考系统\n\n空间参考系统是一个旨在明确识别和描述空间中任何点位置的系统。这种能力对于使空间数据能够存储用于表示地球上要素的几何体坐标至关重要。\n\
  \n为了描述空间中点的位置，每个空间参考系统都基于一个底层坐标系。在数学的各个领域中使用了许多不同类型的坐标系，但在 SQL Server 2008 中定义地理空间数据时，你最有可能使用基于**地理坐标系**或**投影坐标系**的空间参考系统。\n\
  \n### 地理坐标系\n\n在地理坐标系中，地球表面上的任何位置都可以使用两个角度坐标来定义：\n\n- 一个点的**纬度**坐标测量的是赤道平面与该点处垂直于地球表面的直线之间的角度。\n\
  - **经度**坐标测量的是赤道平面内，从地球中心到该点的直线与从地球中心到**本初子午线**的直线之间的角度。\n\n通常，地理坐标以度为单位进行测量。因此，纬度可以在\
  \ –90°（南极）和 +90°（北极）之间变化。经度值从 –180° 延伸到 +180°。\n\n图 10-2 说明了如何使用地理坐标系来识别地球表面上的一个点。\n\
  \n### 投影坐标系\n\n与在三维的、圆形的地球模型上定义位置的地理坐标系相反，投影坐标系在平坦的二维平面（即地球表面的**投影**）上描述地球表面上的位置。简单来说，投影坐标系描述的是地图上的位置，而不是地球仪上的位置。\n\
  \n如果我们认为地球表面上的所有点都位于一个平面上，我们可以使用熟悉的**x** 和 **y** 笛卡尔坐标（有时称为东向和北向）来定义该平面上的位置，它们分别代表一个点沿\
  \ x 轴和 y 轴距离原点的距离。\n\n图 10-3 说明了图 10-2 中所示的同一个点如何使用投影坐标系来定义。\n\n图 10-2. 使用地理坐标系描述地球上的一个位置\n\
  \n图 10-3. 使用投影坐标系描述地球上的一个位置\n\n### 将坐标系应用于地球\n\n无论是来自地理坐标系还投影坐标系的一组坐标，其本身并不能唯一地标识地球上的一个位置。我们需要知道额外的信息，例如从哪里测量这些坐标、使用什么单位，以及使用什么形状来模拟地球。因此，除了指定所使用的坐标系外，每个空间参考系统还必须包含一个**基准**、一个**本初子午线**和一个**计量单位**。\n\
  \n### 基准\n\n基准包含有关地球大小和形状的信息。具体来说，它包含一个**参考椭球体**和一个**参考框架**的详细信息，它们用于创建一个可以应用坐标系的地球大地模型。\n\
  \n\n# 第 10 章 处理空间数据\n\n## 参考椭球体\n\n参考椭球体是一个三维形状，用于近似表示地球的形状。尽管被称为参考椭球体，但大多数地球模型实际上是一个扁球体——一个可以精确地用两个参数来描述的扁球体：长半轴长度（代表地球赤道处的半径）和短半轴长度（地球两极处的半径），如图\
  \ 10-4 所示。扁球体被压扁的程度可以表示为长半轴与两轴之差的比值，这被称为**扁率的倒数**。\n\n不同的参考椭球体提供了对地球形状的不同近似，没有一个单一的参考椭球体能够在全球表面提供最佳拟合。因此，在区域层面运作的空间应用倾向于使用基于能够为所讨论区域提供最佳地球表面近似的参考椭球体的空间参考系统。例如，在英国，使用的是`Airy\
  \ 1830`椭球体，其长半轴为 6,377,563 米，短半轴为 6,356,257 米。在北美，最常用的是`NAD83`椭球体，其长半轴为 6,378,137\
  \ 米，短半轴为 6,356,752 米。\n\n参考框架定义了一组在现实世界中具有已知坐标的地点，这些坐标是相对于参考椭球体分配的。通过建立一组具有已知坐标的点，这些点可以用来正确地将坐标系与参考椭球体对齐，从而可以确定其他未知点的坐标。参考点通常是地球表面本身的位置，但也可以分配给围绕地球静止轨道运行的卫星的位置，全球定位系统使用的`WGS84`基准就是这样实现的。\n\
  \n## 本初子午线\n\n如前所述，地理坐标中的经度是从地球中心到某一点的连线与从地球中心到本初子午线的连线之间在赤道平面上的角度。因此，任何空间参考系统都必须声明其本初子午线——经度测量所依据的轴线。\n\
  \n一个常见的误解是认为存在一条基于地球某种内在基本属性的单一本初子午线。实际上，任何空间参考系统的本初子午线都是任意选择的，只是为了提供一条零度经线，所有其他经度坐标都可以从这条线开始测量。一个常用的本初子午线经过伦敦格林威治，但还有很多其他的选择。如果选择不同的本初子午线，给定空间参考系统中每个经度坐标的值都会改变。\n\
  \n*图 10-4. 参考椭球体的属性*\n\n## 投影\n\n投影坐标参考系统允许你在二维平面上描述地球上的位置，这个平面是投影的结果。创建这种地图投影的方法有很多，每种方法都会产生世界的不同图像。一些常见的地图投影包括墨卡托投影、邦尼投影和等距圆柱投影，但还有更多。\n\
  \n必须认识到，为了在平面上表示地球的三维模型，*每*种地图投影都会以某种方式扭曲地球的特征。有些投影试图保持特征的相对面积，但这样做会扭曲它们的形状。其他投影保留了赤道附近特征的属性，但会严重扭曲两极附近的特征。\n\
  \n一些折衷投影试图平衡失真，以创建一张没有任何一方面失真过于显著的地图。地图上描绘的特征失真程度通常与投影区域的范围有关。因此，投影空间参考系统在仅应用于单个国家或更小区域时效果最佳，而不是用于完整的全球视图。\n\
  \n由于投影方法会影响结果地图图像上的特征，来自投影坐标系的坐标仅对给定的投影有效。\n\n## 空间参考标识符\n\n全球使用最广泛的空间参考系统是基于`WGS84`基准的地理坐标系统，其参考椭球体半径为\
  \ 6,378,137 米，扁率的倒数为`298.257223563`。坐标以度为单位进行测量，基于格林威治本初子午线。该系统被手持 GPS 设备以及许多消费级地图产品（包括谷歌地球和必应地图\
  \ API）所使用。\n\n使用行业标准的 Well-Known Text 格式，这个空间参考系统的属性可以表示如下：\n\n```\nGEOGCS[\n  \"\
  WGS 84\",\n  DATUM[\n    \"World Geodetic System 1984\",\n    ELLIPSOID[\n     \
  \ \"WGS 84\",\n      6378137,\n      298.257223563\n    ]\n  ],\n  PRIMEM[\"Greenwich\"\
  , 0],\n  UNIT[\"Degree\", 0.0174532925199433]\n]\n```\n\n回到本章开头的例子，使用这个空间参考系统，我们可以将美国五角大楼每个角落的近似位置描述为一对经纬度坐标如下：\n\
  \n`38.870, -77.058`\n`38.869, -77.055`\n`38.871, -77.053`\n`38.873, -77.055`\n`38.872,\
  \ -77.058`\n\n请注意，由于我们描述的点位于本初子午线以西，因此在每种情况下经度坐标都是负数。\n\n现在让我们考虑另一个空间参考系统——通用横轴墨卡托\
  \ 18N 带系统，这是北美部分地区使用的一个投影坐标系。这个空间参考系统基于 1983 年北美基准，其参考椭球体为 6,378,137 米，扁率的倒数为`298.257222101`。这个大地测量模型使用横轴墨卡托投影，以西经\
  \ 75°经线为中心，基于投影图像的坐标以米为单位进行测量。这个系统的完整属性在 WKT 格式中表示如下：\n\n```\nPROJCS[\n  \"NAD_1983_UTM_Zone_18N\"\
  ,\n  GEOGCS[\n    \"GCS_North_American_1983\",\n    DATUM[\n      \"D_North_American_1983\"\
  ,\n      SPHEROID[\n        \"GRS_1980\",\n        6378137,\n        298.257222101\n\
  \      ]\n    ],\n    PRIMEM[\"Greenwich\",0],\n    UNIT[\"Degree\", 0.0174532925199433]\n\
  \  ],\n  PROJECTION[\"Transverse_Mercator\"],\n  PARAMETER[\"False_Easting\", 500000.0],\n\
  \  PARAMETER[\"False_Northing\", 0.0],\n  PARAMETER[\"Central_Meridian\", -75.0],\n\
  \  PARAMETER[\"Scale_Factor\", 0.9996],\n  PARAMETER[\"Latitude_of_Origin\", 0.0],\n\
  \  UNIT[\"Meter\", 1.0]\n]\n```\n\n使用这个空间参考系统，五角大楼的相同五个点可以用以下坐标描述：\n\n`321460, 4304363`\n\
  `321718, 4304246`\n`321896, 4304464`\n`321728, 4304690`\n`321465, 4304585`\n\n比较这些结果清楚地表明，任何坐标对只有在说明了从中获得它们的坐标系的详细信息时，才能描述地球上的唯一位置。然而，如果我们每次想引用一对坐标时都必须写出基准、本初子午线、测量单位和投影细节的完整信息，那将相当麻烦。幸运的是，有一套既定的**空间参考标识符**为每个空间参考系统提供一个唯一的整数代码。前面例子中使用的两个空间参考系统分别由`SRID\
  \ 4326`和`SRID 26918`表示。\n\n\n\n# 第 10 章 处理空间数据\n\n每次在 SQL Server 2008 中使用 `geography`\
  \ 或 `geometry` 类型声明一项空间数据时，你都*必须*指明获取坐标值时所依据的相应 `SRID`。此外，由于 SQL Server 没提供任何在空间参考系统之间进行转换的机制，因此如果你想对两个或多个空间数据项执行任何计算，每一项都必须使用相同的\
  \ `SRID` 来定义。\n\n如果你不知道一组坐标所关联的 `SRID`——比方说，你从某个网站查询了一些经纬度坐标，但该网站未说明所使用的系统——那么这些坐标极有可能是基于\
  \ `SRID 4326` 的地理坐标，这是 GPS 设备使用的系统。\n\n### 注意\n要查找任何给定空间参考系统所关联的 `SRID`，你可以使用 `www.epsg-registry.org`\
  \ 提供的搜索功能。\n\n## Geography 与 Geometry 的比较\n\n微软早期关于 SQL Server 2008 的宣传材料将 `geography`\
  \ 数据类型介绍为适用于“球面”数据，而 `geometry` 数据类型则适用于“平面”数据。这些术语随后被一些评论员原封不动地重复，却很少关注解释“平面”或“球面”的实际含义。一个简单的类比可能是：在地理空间数据方面，`geometry`\
  \ 数据类型在地图上操作，而 `geography` 数据类型则在地球仪上操作。\n\n考虑到这一区别，两种数据类型之间一个明显的差异在于它们可以使用的坐标类型：\n\
  \n- `geography` 数据类型要求数据必须使用从地理坐标系获得的经纬度坐标来表示。此外，由于 SQL Server 需要知道这些坐标应应用的椭球体模型参数，因此所有\
  \ `geography` 数据都必须基于 `sys.spatial_reference_systems` 系统表中列出的空间参考系统之一。\n- `geometry`\
  \ 数据类型在平面上操作，这使其非常适合处理来自投影坐标系的地理空间数据，包括通用横轴墨卡托（`UTM`）网格坐标、国家网格坐标或州平面坐标。不过，有时你可能希望使用\
  \ `geometry` 数据类型存储经纬度坐标，正如本章后面将演示的那样。`geometry` 数据类型也可用于存储任何可建模为一对浮点 x, y 坐标的抽象非空间数据，例如图的节点。\n\
  \n坐标类型的这种区别并不是区分这两种数据类型的唯一属性。在接下来的章节中，我将更详细地分析其他一些差异。\n\n### 注意\n`geometry` 数据类型使用的平面和\
  \ `geography` 数据类型的弯曲椭球面都是二维曲面，这些曲面上的位置可以恰好用两个坐标来描述（对于 `geography` 数据类型是纬度和经度，对于\
  \ `geometry` 数据类型是 x 和 y）。SQL Server 2008 还允许你存储 `Z` 和 `M` 坐标，它们可以表示与每个点相关的另外两个维度（通常，`Z`\
  \ 是地表上方的高程，`M` 是时间的度量）。然而，尽管可以存储和检索这些值，但 `geography` 或 `geometry` 数据类型提供的任何方法在计算中都不考虑\
  \ `Z` 和 `M` 坐标的值。\n\n## 标准符合性\n\n`geometry` 数据类型在平面上操作，其中每个点的两个坐标值代表平面上从指定原点出发的\
  \ x 和 y 位置。因此，`geometry` 数据类型提供的许多标准方法可以使用初等三角学和几何学来执行。例如，以下代码清单展示了如何使用 `geometry`\
  \ 数据类型的 `STDistance()` 方法计算位于 `(50,100)` 的 `Point` 与位于 `(90,130)` 的 `Point` 之间的距离：\n\
  \n```sql\nDECLARE @point1 geometry = geometry::Point(50, 100, 0);\nDECLARE @point2\
  \ geometry = geometry::Point(90, 130, 0);\nSELECT @point1.STDistance(@point2);\n\
  ```\n\n结果 `50` 本可以不用 `geometry` 数据类型，仅用基本的毕达哥拉斯定理知识得出，如下面的等效 T-SQL 查询所示：\n\n```sql\n\
  DECLARE\n    @x1 int = 50, @y1 int = 100,\n    @x2 int = 90, @y2 int = 130;\nSELECT\n\
  \    SQRT(\n        POWER(@x2 - @x1, 2) +\n        POWER(@y2 - @y1, 2)\n    );\n\
  ```\n\n当然，其他的 `geometry` 操作，例如查找一个 `Point` 是否位于一个 `Polygon` 内，或者两个 `Polygon` 相交所产生的面积，比这里给出的简单例子要复杂一些，但通常仍然可以使用\
  \ T-SQL 或 SQLCLR 中的替代方法来实现。那么，为什么还要对 `geometry` 数据类型如此关注呢？\n\n使用 `geometry` 数据类型实现此类功能的一个关键好处是，`geometry`\
  \ 数据类型实现的所有方法都符合开放地理空间联盟（`OGC`）的 SQL 规范简单要素 v1.1.0。这是用于空间功能交换和实施的行业标准格式。通过使用 `geometry`\
  \ 数据类型，你可以确保任何空间方法的结果将与任何其他基于相同标准的系统获得的结果相同。\n\n请注意，尽管 `OGC` 符合性确保了结果的*一致性*，但 `OGC`\
  \ 方法并不一定能给出可预测的结果，至少不是那种你可以仅根据方法名称就能合理猜测其行为的程度。例如，考虑图 10-5 中所示的两个 `LineString`。\n\
  \n*图 10-5. 两条相交但不接触的 LineString*\n\n在正常的英语中，大多数人会描述这两条 `LineString` 是*接触*，而不是*相交*。然而，根据\
  \ `OGC` 的定义，情况恰恰相反。你可以通过检查 `STTouches()` 和 `STCrosses()` 方法的结果来自行测试这一点，如下面的代码清单所示：\n\
  \n```sql\nDECLARE @x geometry = geometry::STLineFromText('LINESTRING(0 0, 0 10)',\
  \ 0);\nDECLARE @y geometry = geometry::STLineFromText('LINESTRING(10 0, 0 5, 10\
  \ 10)', 0);\nSELECT\n    @x.STCrosses(@y),\n    @x.STTouches(@y);\n```\n\n`STCrosses()`\
  \ 方法的结果是 `1`，表明 `LineString` x 跨越了 `LineString` y。根据 `OGC` 标准，如果两个 `LineString`\
  \ 相交产生的几何体是零维的，则它们彼此相交。在此例中，两条 `LineString` 相交于单点 `(5,5)`，因此它们被视为相交。相比之下，只有当两条 `LineString`\
  \ 相交的点位于 `LineString` 的边界（即端点）上时，它们才被认为是接触。在此例中，点 `(5,5)` 位于两条 `LineString` 的内部而非边界，因此\
  \ `STTouches()` 的结果是 `0`（即假）。务必仔细检查任何方法的文档，以确保其行为完全符合你的预期！\n\n## 精度\n\n世界是圆的。然而，`geometry`\
  \ 数据类型在平面上操作。因此，根据定义，使用 `geometry` 数据类型执行的任何地理空间计算都会涉及一定程度的误差。这本身并非 `geometry` 数据类型的一个限制，而是使用投影坐标系来表示圆形地球模型时不可避免的畸变所导致的。\n\
  \n一般来说，随着投影区域的增大，畸变的影响也会增大。\n\n\n\n因此，在长距离情况下，使用 `geometry` 数据类型获得的结果将比使用 `geography`\
  \ 数据类型获得的结果准确度更低。\n\n在全局空间应用中，`geography` 数据类型是更合适的选择，因为能够用于通用全局目的且具有足够准确度的投影坐标系很少。对于存储单个国家或更小区域内的空间数据，`geometry`\
  \ 数据类型通常能提供足够的准确度，并且相比 `geography` 类型具有更多功能带来的优势。\n\n## 技术限制与性能\n\n`geography` 数据类型使用的椭球面计算本质上比\
  \ `geometry` 数据类型的平面计算更为复杂。这意味着，使用 `geography` 数据类型的应用程序性能可能略低于基于 `geometry` 数据类型的应用程序，不过这种影响通常并不显著。此外，在\
  \ `geometry` 数据列上创建的索引可以指定一个明确的边界框，从而创建更精细的网格，这比 `geography` 索引能更高效地过滤结果（因为 `geography`\
  \ 索引被假定为覆盖整个地球——但稍后会详细讨论这一点）。\n\n然而，这两种数据类型所基于的不同模型之间还存在其他更重要的影响。第一个区别是，目前，任何 `geography`\
  \ 实例都不能超过单个半球。在这里，术语 `半球` 指的是地球表面的一半，以球面上任意一点为中心。因此，不可能有一个包含一个位于北极的点和一个位于南极的点的 `geography`\
  \ `MultiPoint` 实例。也不可能有一个从伦敦延伸到奥克兰，然后再延伸到洛杉矶的 `geography` `LineString`。为了绕过这个限制，您必须将大型\
  \ `geography` 对象分解为几个较小的对象，每个对象都适合一个半球。相比之下，`geometry` 实例的大小没有限制，它可以在无限平面上无限延伸。\n\
  \n第二个技术差异源于在曲面上工作与在平面上工作的概念差异。如前所述，`Polygon` 的外环定义了 `Polygon` 内部包含的空间区域，并且可能包含一个或多个内环来定义“孔洞”——即从\
  \ `Polygon` 中切除的空间区域。当在平坦的纸张上绘制 `Polygon` 时，这相当直观。然而，当您尝试在连续的圆形表面（如 `geography`\
  \ 数据类型所使用的）上应用此定义时，问题就出现了，因为对于 `Polygon` 环“内部”包含的空间区域和“外部”区域的界定变得模糊不清。\n\n为了说明这个问题，请考虑图\
  \ 10-6，它展示了一个外环是围绕赤道绘制的一组点的 `Polygon`。该 `Polygon` 包含的区域代表的是北半球还是南半球？\n\n*图 10-6.\
  \ 对于 `geography` 数据类型，`Polygon` 环方向很重要*\n\nSQL Server（以及与其他一些空间系统相同）使用的解决方案是考虑 `Polygon`\
  \ 的 `环方向`——即指定环上点的顺序。在定义 `geography` `Polygon` 时，SQL Server 将点与点之间绘制路径“左侧”的区域视为环内包含的区域，而“右侧”的点则被排除在外。因此，图\
  \ 10-6 中描绘的 `Polygon` 代表北半球。每当您定义 `geography` 多边形时，必须确保指定正确的环方向，否则您的多边形将会“内外颠倒”——排除了它们本应包含的区域，而包含了所有其他区域。在\
  \ `geometry` 数据中，环方向并不重要，因为在平面上 `Polygon` 环内包含的区域不存在歧义。\n\n## 最后的技术差异\n\n最后一个技术差异涉及\
  \ `无效几何体`。在理想情况下，我们总是希望空间数据是“有效”的——即符合该类型 `geometry` 的所有 OGC 规范。然而，作为开发人员，我们不得不勉强接受一个现实：空间数据与其他任何数据一样，很少能如我们所愿般完美。这意味着您会经常遇到无效数据，例如，`Polygon`\
  \ 自身相交。\n\n或许有些反常的是，符合 OGC 标准的 `geometry` 数据类型，也是提供了处理不符合这些标准的数据选项的数据类型。例如，`geometry`\
  \ 数据类型不仅可以存储无效几何体，还提供了 `STIsValid()` 方法来识别 `geometry` 是否有效，以及 `MakeValid()` 方法来尝试“修复”无效几何体。相比之下，所有\
  \ `geography` 数据都被假定在任何时候都是有效的。尽管这意味着一旦 `geography` 数据进入 SQL Server，您就可以放心地使用它，因为它始终有效，但这可能会在最初导入数据时构成障碍。由于\
  \ SQL Server 无法导入无效的 `geography` 数据，您可能不得不依赖外部工具在导入之前验证和修复任何错误数据。\n\n## 创建空间数据\n\
  \n对于许多刚接触 SQL Server 2008 空间功能的用户来说，面临的第一个挑战是如何将空间数据导入数据库。不幸的是，最常用的空间格式——ESRI shapefile\
  \ 格式 (SHP)——不被任何 `geography` 或 `geometry` 方法直接支持，也不被 SQL Server Integration Services\
  \ (SSIS) 中可用的任何文件数据源支持。此外，在内部，`geography` 和 `geometry` 数据是使用专有的二进制格式存储的，这种格式相当复杂。感兴趣的读者可以在\
  \ `http://msdn.microsoft.com/en-us/library/ee320529.aspx` 查看其结构文档，但通常您不需要担心具体细节，因为\
  \ SQL Server 提供了静态方法，可以从三种不同的替代空间格式创建空间数据：WKT、Well-Known Binary (WKB) 和 Geography\
  \ Markup Language (GML)。\n\n## Well-Known Text\n\nWKT 是由 OGC 定义的一种简单的、基于文本的格式，用于交换空间信息。由于其易读性和相对简洁性，WKT\
  \ 格式是一种流行的存储和共享空间数据的方式，也是本章大多数示例中使用的格式。它也是 SQL Server 2008 联机丛书空间文档中使用的格式，网址为 `http://msdn.microsoft.com/en-us/library/ms130214.aspx`。\n\
  \n以下代码清单展示了用于表示一个位于 x 坐标 258647 和 y 坐标 665289 的 `Point` 几何体的 WKT 字符串：\n\n```\nPOINT(258647\
  \ 665289)\n```\n\n基于大不列颠国家格网（这是一个由 `SRID` 27700 表示的投影坐标系），这些坐标代表了苏格兰格拉斯哥的位置。一旦我们知道\
  \ WKT 字符串和相关的 `SRID`，就可以使用 `STPointFromText` 方法创建一个代表该城市的 `geometry` `Point` 实例，如下所示：\n\
  \n```\nDECLARE @Glasgow geometry;\n\nSET @Glasgow = geometry::STPointFromText('POINT(258647\
  \ 665289)', 27700);\n\nGO\n```\n\n为了从 WKT 创建更复杂的几何体，只需在一个逗号分隔的列表中指定每个点的坐标对，如下例所示，它创建了一个代表悉尼海港大桥两个点之间的\
  \ `LineString`：\n\n```\nDECLARE @SydneyHarbourBridge geography;\n\nSET @SydneyHarbourBridge\
  \ = geography::STLineFromText(\n'LINESTRING(151.209 -33.855, 151.212 -33.850)',\
  \ 4326);\n\nGO\n```\n\n\n\n# 空间数据格式与处理\n\n## WKT 格式注意事项\n\n请注意，在为地理数据类型使用 WKT（Well-Known\
  \ Text）表示坐标时，如最后一个示例所示，经度坐标必须在每个坐标对中列在首位，随后是纬度坐标。这与人们日常用语中习惯的“纬度，经度”坐标对表达方式相反。\n\
  \nWKT 格式的一个缺点是，与任何基于文本的表示一样，它无法精确表示从二进制方法获得的某些浮点坐标值。\n\n尝试这样做时不可避免地引入的舍入误差将导致精度损失。\n\
  \n此外，由于 SQL Server 必须解析 WKT 表示中的文本来创建相关的空间对象，因此从 WKT 实例化对象可能比使用其他方法更慢。\n\n## WKB\
  \ 格式\n\nWKB（Well-Known Binary）格式与 WKT 格式一样，是由 OGC 定义的表示空间数据的标准化方式。与基于文本的 WKT 格式不同，WKB\
  \ 以二进制格式将几何或地理对象表示为连续的字节流。每个 WKB 表示都以一个头部部分开始，该部分指定了字节的列出顺序（大端序或小端序）、一个定义所表示几何类型的值，以及一个表示几何中每个点坐标的\
  \ 8 字节值流。\n\n以下代码演示了如何使用 `geography` 的 `STPointFromWKB()` 方法，从代表位于纬度 52.23、经度 21.02\
  \ 的波兰华沙市的 WKB 构造一个 `Point` 几何对象：\n\n```sql\nDECLARE @Warsaw geography;\nSET @Warsaw\
  \ = geography::STPointFromWKB(\n    0x010100000085EB51B81E0535403D0AD7A3701D4A40,\n\
  \    4326);\n```\n\n使用 WKB 的一个优点是，它比任何基于文本的格式（GML 或 WKT）处理效率更高。此外，由于它是二进制格式，WKB\
  \ 保留了从二进制运算计算出的浮点坐标值的精度，而不会引入基于文本格式的舍入误差。因此，对于在系统接口之间直接传输空间数据，其速度和精度优势显著，且缺乏人类可读性并不重要时，它是格式的最佳选择。\n\
  \n### `Note`\n\n尽管 SQL Server 以类似于 WKB 的二进制格式存储空间数据，但它并不相同。为了从 WKB 创建空间数据项，您必须将其提供给适当的\
  \ `STxxxxFromWKB()` 方法。\n\n## GML 格式\n\nGML（Geography Markup Language）是一种基于 XML\
  \ 的语言，用于表示空间信息。像所有 XML 格式一样，GML 是一种非常明确且高度结构化的层次格式。以下代码演示了位于纬度 -33.86、经度 151.21\
  \ 的点的 GML 表示示例：\n\n```xml\n<Point >\n    <pos>-33.86 151.21</pos>\n</Point>\n```\n\
  \n与 WKT 类似，GML 具有易于阅读和理解的优点。此外，XML 结构使得通过检查关联的 GML 文档的结构来评估和查询复杂空间对象的结构变得容易。然而，它非常冗长——一个对象的\
  \ GML 表示占据的空间远大于等效的 WKT 表示，并且与 WKT 一样，它在表达二进制浮点坐标值时也会因舍入而产生精度问题。GML 最常用于基于 XML 的环境中表示空间信息，包括通过互联网聚合空间数据。\n\
  \n## 数据导入\n\n通常需要希望在已知的地理特征（例如政治边界、城市位置或道路和铁路路径）的背景下分析自定义定义的空间数据（例如您客户的位置）。有许多地方可以获取此类通用空间数据，来源包括各种商业和免费资源。\n\
  \n\n\n# 第十章 处理空间数据\n\nSQL Server 并未提供专门用于导入预定义空间数据的工具，但可以使用一些第三方工具来实现此目的。也可以采用基于\
  \ `SqlServer.Types.dll` 库功能的编程技术，该库包含了 `geography` 和 `geometry` 数据类型本身所使用的方法。为了演示一种导入空间数据的方法，并为本章后续示例提供一些样本数据，我们将从\
  \ Geonames 网站 (www.geonames.org) 导入一个包含世界各地地理位置坐标的数据集。\n\n首先，从 Geonames 网站下载并解压主数据集，地址为：\n\
  ```\nhttp://download.geonames.org/export/dump/allCountries.zip\n```\n该压缩包包含一个制表符分隔的文本文件，其中近有\
  \ 700 万行数据，解压后占用近 800MB 空间。如果想使用更小的数据集，也可以选择下载\n```\nhttp://download.geonames.org/export/dump/cities1000.zip\n\
  ```\n这个压缩包。它使用相同的模式，但仅包含大约 80,000 条记录，代表人口超过 1,000 的城市。\n\n> **注意**：Geonames `allCountries.zip`\
  \ 导出文件是一个大文件（约 170MB），下载可能需要一些时间。\n\n要在 SQL Server 中存储 Geonames 信息，首先按如下方式创建一个新表：\n\
  \n```sql\nCREATE TABLE allCountries(\n    [geonameid] int NOT NULL,\n    [name]\
  \ nvarchar(200) NULL,\n    [asciiname] nvarchar(200) NULL,\n    [alternatenames]\
  \ nvarchar(4000) NULL,\n    [latitude] real NULL,\n    [longitude] real NULL,\n\
  \    [feature class] nvarchar(1) NULL,\n    [feature code] nvarchar(10) NULL,\n\
  \    [country code] nvarchar(2) NULL,\n    [cc2] nvarchar(60) NULL,\n    [admin1\
  \ code] nvarchar(20) NULL,\n    [admin2 code] nvarchar(80) NULL,\n    [admin3 code]\
  \ nvarchar(20) NULL,\n    [admin4 code] nvarchar(20) NULL,\n    [population] int\
  \ NULL,\n    [elevation] smallint NULL,\n    [gtopo30] smallint NULL,\n    [timezone]\
  \ nvarchar(80) NULL,\n    [modification date] datetime NULL\n);\nGO\n```\n\n我保留了所有列名和数据类型，完全按照\
  \ Geonames 模式中的定义，但你可能需要进行调整。我个人不喜欢包含空格的列名，例如 `[modification date]`，但我也认为，当从外部源导入数据时，清楚地引用列的映射方式非常重要，而最简单的方法就是保持列名与源数据一致。\n\
  \n将 Geonames 文本文件导入 `allCountries` 表有多种方法——然而在本例中，为了尽可能简单，我们将使用导入和导出向导。\n\n在 SQL\
  \ Server Management Studio 中，右键单击“对象资源管理器”窗格中创建了 `allCountries` 表的数据库名称，然后选择“任务”\
  \ → “导入数据”来启动向导。当提示选择数据源时，选择“平面文件源”选项，单击“浏览”按钮，找到并选择之前下载的 `allCountries.txt` 文件。从“代码页”下拉列表中，向下滚动并选择\
  \ `65001 (UTF-8)`，然后单击左侧窗格中的“列”选项卡。\n\n在“列”页面上，将“列分隔符”更改为`Tab {t}`，然后选择“刷新”以预览文件中的数据，数据应如图\
  \ 10-7 所示。然后单击左侧窗格中的“高级”。\n\n在“高级”窗格中，依次单击每个列名，并配置列属性以匹配表 10-1 所示的值。\n\n![图 10-7.\
  \ 预览从 Geonames 网站下载的数据](img/index-320_1.png)\n\n*图 10-7. 预览从 Geonames 网站下载的数据*\n\
  \n*表 10-1. Geonames 数据的列属性*\n\n| **列名** | **数据类型** | **输出列宽** |\n| :--- | :--- |\
  \ :--- |\n| geonameid | 四字节有符号整数 | [DT_I4] |\n| name | Unicode 字符串 | [DT_WSTR] |\n\
  | asciiname | Unicode 字符串 | [DT_WSTR] |\n| alternatenames | Unicode 字符串 | [DT_WSTR]\
  \ |\n| latitude | 浮点数 | [DT_R4] |\n| longitude | 浮点数 | [DT_R4] |\n| feature class\
  \ | Unicode 字符串 | [DT_WSTR] |\n| feature code | Unicode 字符串 | [DT_WSTR] |\n| country\
  \ code | Unicode 字符串 | [DT_WSTR] |\n| cc2 | Unicode 字符串 | [DT_WSTR] |\n| admin1\
  \ code | Unicode 字符串 | [DT_WSTR] |\n| admin2 code | Unicode 字符串 | [DT_WSTR] |\n\
  | admin3 code | Unicode 字符串 | [DT_WSTR] |\n| admin4 code | Unicode 字符串 | [DT_WSTR]\
  \ |\n| population | 四字节有符号整数 | [DT_I4] |\n| elevation | 两字节有符号整数 | [DT_I2] |\n|\
  \ gtopo30 | 两字节有符号整数 | [DT_I2] |\n| timezone | Unicode 字符串 | [DT_WSTR] |\n| modification\
  \ date | 日期 | [DT_DATE] |\n\n> **注意**：关于表 10-1 中列出的 Geonames 导出数据的列的完整说明，请查阅 `http://download.geonames.org/export/dump/readme.txt`。\n\
  \n设置好列后，单击“下一步”继续，并检查目标数据库是否已正确配置为将记录导入 `allCountries` 表。再次单击“下一步”完成导入向导。\n\n在我的笔记本电脑上，导入大约需要\
  \ 10 分钟，所以如果需要，可以利用这个时间活动一下腿脚，喝杯咖啡。导入向导成功完成导入操作后，Geonames 数据集中的每一列都将被导入到 `allCountries`\
  \ 表中，但我们尚未利用 SQL Server 2008 的空间功能。表中的每条记录都有一个关联的纬度和经度坐标值，但这些值目前存储在不同的浮点数列中。由于 Geonames\
  \ 坐标是使用 SRID 为 `4326` 的地理坐标系测量的，因此对此数据建模的最佳方式是向表中添加一个新的 `geography` 列，并使用代表每个位置的各个\
  \ `Point` 实例来填充它。以下代码清单说明了添加名为 `location` 的 `geography` 列并使用基于 `latitude` 和 `longitude`\
  \ 列中坐标值的 `Point()` 方法进行更新所需的 T-SQL：\n\n```sql\nALTER TABLE allCountries\nADD location\
  \ geography;\nGO\n\nUPDATE allCountries\nSET location = geography::Point(latitude,\
  \ longitude, 4326);\nGO\n```\n\n这里描述的方法可用于从各种表格格式（如地名志）加载空间数据。类似的方法也可以在 SSIS 包中采用，其中\
  \ `location` 列可以在加载过程中作为派生列计算出来，而不是像本例这样在之后添加。\n\n> **提示**：在填充了 `location` 列之后，如果需要，可以从\
  \ `allCountries` 表中删除 `latitude` 和 `longitude` 列——每个点关联的坐标值可以通过 `location` 列的 `Lat`\
  \ 和 `Long` 属性来获取。\n\n## 查询空间数据\n\n既然我们已经导入了一个规模合适的样本数据集，就可以开始编写一些空间查询了，但在编写涉及 `geometry`\
  \ 或 `geography` 数据的查询时，有几个重要的注意事项。因为空间数据类型是不可比较的，所以对它们可以使用的查询类型存在某些限制——例如：\n\n*\
  \   不能对 `geometry` 或 `geography` 列使用 `ORDER BY`。\n*   不能对空间数据使用 `SELECT DISTINCT`，也不能对包含\
  \ `geography` 或 `geometry` 数据的两个结果集使用 `UNION`。但是，可以对两个数据集使用 `UNION ALL`。\n*   不能使用常规的查询比较运算符，例如\
  \ `WHERE t1.shape = t2.shape`，但可以使用基于 `STEquals()` 方法的谓词来测试两个形状是否相等，例如 `WHERE t1.shape.STEquals(t2.shape)\
  \ = 1`。\n\n就实际对空间数据本身执行操作而言，`geography` 和 `geometry` 数据类型都提供了一系列用于执行常见计算的方法，包括交集、距离测量以及几何图形的加减操作。\n\
  \n\n\n# 第 10 章 处理空间数据\n\n需要注意的是，可用方法在给定场景下取决于所使用的数据类型。尽管大多数情况下，`geometry` 和 `geography`\
  \ 数据类型都提供了执行所有操作的等效功能方法，但有些方法只能应用于其中一种类型。最明显的例子是，虽然 `geometry` 和 `geography` 都支持测试两个几何图形是否相交（使用\
  \ `STIntersects()` 方法），但只有 `geometry` 数据类型提供了测试具体*相交类型*所需的方法——即判断一个几何图形是否穿过、重叠、接触或包含于另一个几何图形中。另一些方法以不同的名称为两种类型提供了等效功能：例如，`Lat()`\
  \ 和 `Long()` 方法返回 `geography` 实例的坐标值，其功能等同于 `geometry` 数据类型中的 `STY()` 和 `STX()`。\n\
  \n一般来说，使用任一类型可用的方法可分为两类：遵循 OGC 规范的方法以字母 `ST`（*spatiotemporal* 时空的缩写）为前缀。这些方法通常提供处理空间实例的基础功能，例如\
  \ `STIntersects()` 用于判断一个实例是否与另一个相交；`STDistance()` 用于计算两个实例之间的最短距离；以及 `STArea()`\
  \ 用于计算多边形实例所围成的面积。\n\nSQL Server 还提供了许多**扩展方法**，这些方法在 OGC 标准之上提供了额外功能。其中包括 `Reduce()`（用于简化\
  \ `geometry`）、`BufferWithTolerance()`（在给定容差限制内应用缓冲区）以及 `Filter()`（基于空间索引执行近似的相交测试）。\n\
  \n在本节中，我不会讨论每一个可用的方法——你可以查阅 `SQL Server 联机丛书`（或《*Beginning Spatial with SQL Server\
  \ 2008*》）。相反，我将研究几个常见场景，并说明如何组合使用一个或多个方法来解决它们。在开始之前，让我们在 `allCountries` 表上创建一个聚集主键和一个基础的空间索引，以支持对其执行的任何查询：\n\
  \n```sql\nALTER TABLE allCountries\nADD CONSTRAINT PK_geonameid\nPRIMARY KEY (geonameid\
  \ );\nGO\n\nCREATE SPATIAL INDEX idxallCountries\nON allCountries(location) USING\
  \ GEOGRAPHY_GRID\nWITH (\n    GRIDS =(\n        LEVEL_1 = MEDIUM,\n        LEVEL_2\
  \ = MEDIUM,\n        LEVEL_3 = MEDIUM,\n        LEVEL_4 = MEDIUM),\n    CELLS_PER_OBJECT\
  \ = 16);\n```\n\n我将在本章后面介绍空间索引，所以如果你不熟悉这里使用的语法也不用担心——很快就会清楚了！\n\n### 最近邻查询\n\n关于空间数据最常被问到的问题或许是：“给定位置最近的\
  \ *x* 在哪里？”或者更一般地说，“我们如何识别一个位置最近的 *n* 个要素？”这类查询通常被称为**最近邻**查询，在 SQL Server 2008\
  \ 中有多种方法可以执行此类查询。\n\n最先想到的最简单方法是根据 `STDistance()` 方法的结果对数据集进行排序，将所有记录按与给定点的距离升序排列，从而轻松识别出前\
  \ *n* 条记录。下面的查询演示了这种方法：\n\n```sql\nDECLARE @Point geography;\nSET @Point = geography::STPointFromText('POINT(0\
  \ 52)', 4326);\n\nSELECT TOP 3\n    name,\n    location.STAsText() AS WKT,\n   \
  \ location.STDistance(@Point) AS Distance\nFROM\n    allCountries\nORDER BY\n  \
  \  location.STDistance(@Point) ASC;\n```\n\n**注意** 该查询完全有效，并且会得到正确的结果。但是，它需要很长的执行时间，原因将在下一节解释。与其浪费时间和服务器资源，你可能更愿意相信我的话，直接尝试下一个示例！\n\
  \n前面的查询定义了一个位于纬度 52 度、经度 0 度的 `geography` Point 实例，使用空间引用系统 SRID 4326。然后，它根据 `allCountries`\
  \ 表中的记录与该点的距离对查询结果进行排序，并返回前三个结果，如下所示：\n\n名称 | WKT | 距离\n--- | --- | ---\nPeriwinkle\
  \ Hill | POINT (-0.00112 52.0055) | 616.78524720001\nBarkway | POINT (0.0166667\
  \ 52) | 1144.6358911887\nReed | POINT (-0.0166667 52) | 1144.6358911887\n\n虽然此查询正确识别并返回了最近的\
  \ *n* 个结果，但这种方法存在一个根本性问题：`STDistance()` 是一个计算成本高昂的方法，并且前面的查询必须对结果集中的每一行计算此方法的结果，才能对它们进行排序并选择最近的\
  \ *n* 条记录。这导致对包含 690 万行的表进行表扫描，而且空间索引在这里没有任何帮助，因为在排序结果之前必须对每一行进行计算。\n\n在包含大量行的表上执行这样的最近邻搜索非常缓慢且成本高昂，如果你自己尝试执行了这个示例，无疑已经发现了这一点！\n\
  \n另一种寻找最近邻的方法涉及一个两阶段的方法。第一阶段是使用索引识别一组可能的最近邻候选对象，这些候选对象位于预定特征周围的缓冲区内。缓冲区的大小选择要足够大以包含所需数量的最近邻，但又不能太大以至于包含大量超出所需结果数量的额外数据行。此方法的第二阶段像之前一样使用\
  \ `STDistance()` 方法，但仅计算那些位于缓冲区域内的候选记录的距离，而不是处理和排序整个表。通过有选择性地选择要排序的候选记录，我们可以利用空间索引。\n\
  \n下面的代码清单演示了这种方法，使用 `STBuffer(25000)` 来识别位于 25 公里搜索区域内的候选记录：\n\n```sql\nDECLARE\
  \ @Point geography;\nSET @Point = geography::STPointFromText('POINT(0 52)', 4326);\n\
  \nDECLARE @SearchArea geography;\nSET @SearchArea = @Point.STBuffer(25000); --25km\
  \ search radius\n\nDECLARE @Candidates table (\n    Name varchar(200),\n    Location\
  \ geography,\n    Distance float\n);\n\nINSERT INTO @Candidates\nSELECT\n    name,\n\
  \    location,\n    location.STDistance(@Point) AS Distance\nFROM\n    allCountries\n\
  WITH(INDEX(idxallCountries))\nWHERE\n    location.Filter(@SearchArea) = 1;\n\nSELECT\
  \ TOP 3 * FROM @Candidates ORDER BY Distance;\n```\n\n**注意** 请注意，在上面的示例查询中，我显式包含了索引提示\
  \ `WITH(INDEX(idxallCountries))`，以确保查询优化器选择使用 `idxallCountries` 空间索引的计划。空间查询的基于成本的估计并不总是准确的，这意味着\
  \ SQL Server 2008 并不总是为查询选择最优计划。SQL Server 2008 SP1 改善了这种情况，但有时仍然需要显式提示来确保使用空间索引。\n\
  \n与上一个示例一样，这种方法正确识别出了三个最近的城市。缓冲区方法的优势在于，通过首先将候选结果集筛选为仅那些位于特征附近的记录，减少了需要调用 `STDistance()`\
  \ 的次数，并且待排序的数据集变得小得多，使得该查询比前面描述的基础最近邻方法显著更快。位于缓冲区内的位置可以使用空间索引查找来识别，如图 10-8 所示的执行计划所示。在我的笔记本电脑上，现在只需\
  \ 33 毫秒即可获得前三个最近邻，而执行第一个查询所需的时间超过一个小时！\n\n\n\n# 第十章 处理空间数据\n\n图 10-8. 在缓冲区内识别最近邻候选者的查询可以利用聚集空间索引查找。\n\
  \n然而，这种方法的主要问题在于它依赖于一个合适的缓冲区大小来搜索候选结果。如果设置的缓冲区太大，返回的可能候选者就会太多，导致过滤效率低下。如果设置的缓冲区太小，则搜索区域可能不包含*任何*候选者，从而导致查询完全无法识别出任何最近邻。\n\
  \n缓冲区搜索区域方法在您能够可靠地设定一个合适的缓冲区大小以选择一组候选最近邻的情况下最为有用。这可能基于您数据的已知、均匀分布——例如，您知道数据集中的任何项目与其最近邻的距离永远不会超过\
  \ 25 公里。或者，您可能希望结合额外的距离约束来获取最近邻——例如，“显示距离此位置最近的三个加油站，但前提是它们在 10 英里范围内。”\n\n与其识别位于固定搜索区域内的候选者（这面临着完全找不到任何最近邻的风险），更好的方法是创建一个在不断扩大的搜索范围内识别候选者的查询。对候选结果的搜索最初可以限制在所选位置的邻近区域，然后逐渐扩大范围，直到找到至少所需数量的最近邻。然后可以在第二阶段对这些候选结果进行排序，以找出真正的*n*个最近邻。\n\
  \n基于扩大搜索范围识别最近邻的查询需要使用一个`数字表`。如果您还没有数字表，可以使用以下代码创建一个，并用 0 到 1,000 之间的整数填充它：\n\n\
  ```sql\nCREATE TABLE Numbers (\n    Number int PRIMARY KEY CLUSTERED\n);\n\nDECLARE\
  \ @i int = 0;\n\nWHILE @i <= 1000\nBEGIN\n    INSERT INTO Numbers VALUES (@i);\n\
  \    SET @i = @i + 1;\nEND;\nGO\n```\n\n`Numbers`表将与`allCountries`表连接，以创建一系列不断扩大的搜索范围。每次连续搜索的范围距离呈指数增长，直到找到足够大、包含所需数量最近邻的搜索区域。该搜索区域中的所有要素都作为候选者返回，然后使用`TOP\
  \ 3`语法选出三个真正的最近邻。以下代码清单演示了这种方法：\n\n```sql\nDECLARE @Point geography;\nSET @Point\
  \ = geography::STPointFromText('POINT(0 52)', 4326);\n\nDECLARE @Candidates table\
  \ (\n    Name varchar(200),\n    Location geography,\n    Distance float,\n    Range\
  \ int\n);\n\nINSERT INTO @Candidates\nSELECT TOP 3 WITH TIES\n    Name,\n    Location,\n\
  \    Location.STDistance(@Point) AS Distance,\n    1000*POWER(2, Number) AS Range\n\
  FROM\n    allCountries\n    WITH(INDEX(idxallCountries))\n    INNER JOIN Numbers\n\
  \    ON allCountries.Location.STDistance(@Point) < 1000*POWER(2,Numbers.Number)\n\
  ORDER BY Number;\n\nSELECT TOP 3 * FROM @Candidates ORDER BY Range DESC, Distance\
  \ ASC;\n```\n\n这段代码可能不那么直观，让我们逐步分析。记住，`Numbers`表包含从零开始的连续整数。因此，条件`allCountries.Location.STDistance(@Point)\
  \ < 1000*POWER(2,Numbers.Number)`指定了一个要素被视为最近邻候选者的初始标准是：该要素与`@Point`之间的距离小于`1000\
  \ * 2⁰`。由于 EPSG:4326 空间参考系统以米为单位定义距离，这相当于 1 公里的搜索区域——如果您想指定一个不同的起始搜索半径，可以将`1000`的值更改为另一个值（请记住使用适合数据类型的单位和问题数据的\
  \ SRID 的度量单位）。\n\n如果在指定距离内没有找到所需数量的邻居（在本例中，我们搜索前三名），则搜索范围的大小会增加。连续的搜索范围是通过将`2`提升到`Numbers`表中下一个数的幂次获得的。因此，第一个范围扩展到点周围\
  \ 1 公里，第二个范围扩展到 2 公里——然后是 4 公里、8 公里、16 公里，依此类推。通过采用指数增长模型，无论底层要素的分布如何分散，此方法都能保证在相对较少的迭代次数内找到最近邻。\n\
  \n一旦搜索范围扩大到足以包含至少所需数量的候选最近邻，通过使用带`WITH TIES`参数的`SELECT`语句，*所有*位于该范围内的要素都被选为候选者。最后，候选者按距离点的升序排序，并选择`TOP\
  \ 3`记录作为真正的最近邻。结果中返回的`Range`列说明了为找到最近邻而扩展搜索范围的距离。\n\n在我的笔记本电脑上，这种方法能在 45 毫秒内识别出三个最近邻。虽然稍微复杂一些，但这最后一种方法为实现最近邻查询提供了最灵活的解决方案。它比基本方法快得多，虽然不如固定搜索区域技术快，但它没有必须指定固定搜索半径的限制。为了进一步增强此查询的性能，我们需要研究空间索引的问题，这将在本章后面介绍。\n\
  \n### 查找给定边界框内的位置\n\n在过去几年中，网络地图服务的应用得到了巨大增长，包括谷歌地图、雅虎地图和微软必应地图。这些工具曾经被认为是缺乏真正价值的噱头和花哨装饰，现在却被用于越来越重要的应用程序中，包括灾害响应规划、物流学、流行病学和其他健康报告场景。\n\
  \n通常，这些网络地图应用程序被用作存储在数据库中的空间数据的动态前端界面。用户平移和缩放地图以显示特定感兴趣的区域，可见地图视图中的任何数据都会从数据库中检索并绘制在地图上。在本节中，我们将探讨一个使用微软必应地图作为\
  \ SQL Server 2008 中存储的空间数据的接口的场景，尽管同样的方法可以应用于大多数地图接口。\n\n第一个需求是识别给定地图视图中的可见区域——换句话说，就是地图的`边界框`。通常，地图视图的边界框可以仅使用两对坐标值来描述，它们代表地图对角的两个点。不幸的是，对于使用哪两个角并没有标准化的视图：必应地图中的`GetMapView()`方法返回地图左上角和右下角的坐标，而谷歌地图使用的等效`getBounds()`方法则返回西南角和东北角的坐标。\n\
  \n虽然这些差异很容易处理，但在开发代码时需要注意这一点。\n\n确定了两个对角的坐标后，我们接下来需要构造一个表示由这些点围成的边界框的`多边形`。为了说明这一点，请考虑图\
  \ 10-9 所示的地图视图，其中心位于科罗拉多州。地图左上角和右下角的坐标值分别为(41,–109)和(37,–102)。\n\n![](img/index-329_1.png)\n\
  \n*图 10-9. 网络地图应用程序的典型视窗*\n\n从必应地图/谷歌地图返回的边界框坐标使用\n\n\n\n# 第 10 章：处理空间数据\n\n使用 SRID\
  \ 4326 测量的纬度/经度值。因此，使用 `geography` 数据类型来表示边界框似乎是合理的。初步尝试可能如下所示：\n\n```sql\nDECLARE\
  \ @TopLeft geography = geography::Point(41, -109, 4326);\nDECLARE @BotRight geography\
  \ = geography::Point(37, -102, 4326);\nDECLARE @BoundingBox geography;\nSET @BoundingBox\
  \ = geography::STPolyFromText('POLYGON(('\n+ CAST(@TopLeft.Long AS varchar(32))\
  \ + ' '+ CAST(@TopLeft.Lat AS varchar(32)) + ','\n+ CAST(@TopLeft.Long AS varchar(32))\
  \ + ' '+ CAST(@BotRight.Lat AS varchar(32)) + ','\n+ CAST(@BotRight.Long AS varchar(32))\
  \ + ' '+ CAST(@BotRight.Lat AS varchar(32)) +','\n+ CAST(@BotRight.Long AS varchar(32))\
  \ +' ' + CAST(@TopLeft.Lat AS varchar(32)) + ','\n+ CAST(@TopLeft.Long AS varchar(32))\
  \ + ' ' + CAST(@TopLeft.Lat AS varchar(32))\n+ '))',\n4326);\nSELECT @BoundingBox.STAsText();\n\
  ```\n\n结果看起来不错：\n\n```\nPOLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))\n\
  ```\n\n那么现在，为了从数据库中识别所有应该显示在当前地图视图中的点，我们可以继续使用 `STIntersects()` 方法从 `allCountries`\
  \ 表中选择所有与该 `geography` `Polygon` 相交的点，对吧？不幸的是，这里有一个需要解决的微妙问题。\n\n## 地理坐标 vs. 投影坐标\n\
  \n尽管地图边界框的角点坐标是以纬度和经度的地理坐标表示的，但浏览器中呈现的默认二维地图视图是平面的。这意味着，隐含地，屏幕上显示的数据已经经过了*投影*。\n\
  \n稍加思考，这个事实应该是显而易见的——除非你有一个非常聪明的显示器能够在三维空间中显示图像，否则计算机显示器上的所有地理空间数据都必须经过投影。这样的话，为什么边界框的角点坐标是使用纬度和经度的*地理*坐标来表示的呢？关键在于：Google\
  \ Maps 和 Microsoft Bing Maps 实际上使用了两个坐标系——当通过 API 提供或检索数据时，它们使用基于 WGS84 的纬度和经度地理坐标，但在显示数据时，它们使用一个引用为\
  \ `SRID 3785` 的投影坐标系。\n\n与大多数投影参考系不同，`SRID 3785` 使用基于完美球形地球模型的墨卡托投影。这个系统具有许多有益的特性，能够实现高效的切片引用算法（此处不赘述），但需要注意的重要一点是，这意味着使用此投影显示的地图将恒定纬度的线（*纬线*）描绘为平行的水平线，并将恒定经度的线（*经线*）描绘为平行的垂直线。在这个例子中，这意味着地图底边上的每一个点（连接点(37,–109)和(37,–102)的点），其纬度都是\
  \ 37。然而，这对于之前创建的 `geography` `Polygon` `@BoundingBox` 底边上的点来说并不成立。请记住，`geography`\
  \ 数据类型基于椭球体模型运作，因此点(37,–109)和(37,–102)之间的边代表了在相关参考椭球体（此处为`SRID 4326`）表面上这两点之间的最短距离。因此，`geography`\
  \ 数据类型中连接任意两点的线代表这两点之间的*大椭圆弧*，而不遵循投影上描绘的直线。\n\n## 应用程序问题\n\n这一切对于本示例中的应用程序意味着什么？考虑一个位于纬度\
  \ 37.0281、经度 –107.419 的点。这是 `allCountries` 表中为纳瓦霍湖西北岸的 Arboles 社区（geonameid 5412070）存储的坐标。由于纬度\
  \ 37.0281 介于 37 和 41 之间，而经度值 –107.419 介于 –102 和 –\n\n\n# 第十章 处理空间数据\n\n109，该点包含在此示例所使用的地图视图中，我们预期它也应包含在从数据库检索的结果集中。然而，这并非`geography`数据类型的`STIntersects()`方法所返回的结果：\n\
  \n```sql\nDECLARE @BoundingBox geography;\n\nSET @BoundingBox = geography::STPolyFromText(\n\
  'POLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))',\n4326);\n```\n\n![](img/index-331_1.png)\n\
  \n```sql\nSELECT\n    name,\n    location.STAsText(),\n    location.STIntersects(@BoundingBox)\n\
  FROM\n    allCountries\nWHERE\n    geonameid = 5412070;\n```\n\n结果为 0，这表明尽管位于地图窗口内，但\
  \ Arboles 的位置并不在地图四角坐标定义的`geography`多边形内。如果我们直观地看一下这里发生的情况，原因可能会更明显。执行以下代码清单，然后切换到\
  \ Management Studio 中的“空间结果”选项卡：\n\n```sql\nDECLARE @BoundingBox geography;\n\n\
  SET @BoundingBox = geography::STPolyFromText(\n'POLYGON ((-109 41, -109 37, -102\
  \ 37, -102 41, -109 41))',\n4326);\n\nSELECT location\nFROM allCountries\nWHERE\
  \ geonameid = 5412070\n\nUNION ALL SELECT @BoundingBox;\n```\n\n结果如图 10-10 所示。\n\
  \n*图 10-10. 显示科罗拉多州边界框和 Arboles 位置的“空间结果”选项卡* 311\n\n请注意，`geography`多边形的顶部和底部边缘沿着大椭圆弧延伸，该弧线从两点之间的恒定纬度线向北弯曲。结果是代表\
  \ Arboles 的点落在多边形之外，因此未包含在`geography` `STIntersects()`方法的结果中。\n\n虽然`geography`数据类型在椭球面上绘制区域方面给出了正确的行为，但在当前情况下，它并未给出我们想要的结果——即使用“直线”定义一个代表地图边界框的矩形。解决此问题的一种方法是在多边形的顶部和底部边缘创建额外的锚点，这将更接近于投影地图视图的近似值，但会使我们的多边形更加复杂，并可能降低空间查询的使用速度。\n\
  \n另一种解决方案是不使用空间数据类型，而是根据地图窗口定义的限制创建一个简单的数值范围查询。换句话说，直接对纬度和经度列执行查询，如下所示：\n\n```sql\n\
  SELECT *\nFROM allCountries\nWHERE\n    latitude > 37 AND latitude < 41\n    AND\n\
  \    longitude > -109 AND longitude < -102;\n```\n\n这不仅避免了混合平面/球面数据的问题，而且如果我们为经度和纬度列添加索引，其执行速度也将比之前使用`geography`数据类型的解决方案快得多。当然，此解决方案的问题在于，它仅在此案例中使用的非常特定的场景下有用——即在*矩形*搜索区域内搜索*点*。如果我们想扩展应用程序，让用户可以在地图上绘制不规则的搜索区域，或者想搜索与该区域相交的`LineStrings`或`Polygons`，这种方法就行不通了，因为我们无法再基于简单的搜索条件执行查询。\n\
  \n在这种情况下，更好的解决方案是像之前一样使用纬度和经度的地理坐标存储几何图形，但使用`geometry`数据类型而不是`geography`数据类型。纬度坐标直接映射到\
  \ y 坐标，经度坐标映射到 x 坐标。使用这种方法，两个等纬度点之间的“直线”将遵循它们之间的恒定纬度线，而不是由`geography`数据类型定义的大椭圆弧。要实现此方法，请执行以下代码清单：\n\
  \n```sql\nALTER TABLE allCountries\nADD locationgeom geometry;\nGO\n\nUPDATE allCountries\n\
  SET locationgeom = geometry::STGeomFromWKB(location.STAsBinary(), location.STSrid);\n\
  GO\n```\n\n现在，选择那些与多边形 `POLYGON ((-109 41, -109 37, -102 37, -102 41, -109 41))`\
  \ 相交的`geometry`记录会得到预期的结果。这是有时打破“仅对地理坐标使用`geography`数据类型，对投影坐标使用`geometry`数据类型”这一通用规则有益的一个例子。其他可能发生这种情况的情况是，当你需要依赖某个仅在`geometry`数据类型中可用的函数时，例如`STConvexHull()`或`STRelate()`。如果涉及的距离不大，可以忽略地球曲率引起的变形影响，而`geometry`数据类型提供的更强大功能足以弥补其相关的精度损失。\n\
  \n但是，以这种方式使用`geometry`数据类型存储地理数据时应格外小心，因为某些操作可能会产生令人惊讶的结果。考虑这样一个事实：`geometry`数据类型的`STArea()`和`STLength()`方法以定义坐标值时所使用的度量单位返回结果。如果使用`geometry`数据类型存储以纬度和经度地理坐标表示的坐标值，这意味着长度将以度为单位测量，面积将以平方度为单位，这几乎肯定不是你想要的。\n\
  \n## 空间索引\n\n开发人员和数据库管理员都知道，一个好的索引可以显著提高数据库应用程序的性能。在空间索引领域，这一点尤为 true，即使是为小数据表创建空间索引，性能提升超过\
  \ 1000% 的情况也并不少见。当然，使用选择不当或不存在的索引也可能导致同等比例的性能下降，因此理解空间索引的工作原理非常有价值。\n\n空间索引的运作方式与用于更常规数据类型的聚集索引和非聚集索引有很大不同。实际上，`geometry`和`geography`数据列只能添加到空间索引中，并且空间索引只能用于这两种数据类型。为了理解原因，在本节中，我将首先概述空间索引，然后探讨一些优化空间索引以为你的空间应用程序提供最佳性能的方法。\n\
  \n### 空间索引如何工作？\n\n当你执行涉及空间谓词（如`STIntersects()`）的查询时，SQL Server 数据库引擎分两个阶段应用该谓词：\n\
  \n*   **主筛选器** 识别一组可能满足所需条件的候选结果。从主筛选器获得的结果集是一个超集——虽然它保证包含所有真实结果，但也可能包含错误匹配项。\n\
  *   **辅助筛选器** 分析主筛选器选择的每条记录，以确定它们是否真正满足查询条件。辅助筛选器更准确，但比主筛选器慢。\n\n空间索引的作用是提供几何图形位置和形状的近似表示，以便可以在主筛选器中快速识别它们。为此，SQL\
  \ Server 中的空间索引采用多级网格模型，内部嵌套有四级网格，如图 10-11 所示。\n\n\n# 空间索引网格概览\n\n网格被覆盖在索引所涵盖的空间区域上，该区域内的每个几何体随后会根据网格进行**细分**。空间索引中的每个条目并不描述关联几何体的详细形状，而是包含对一个网格单元的引用，以及与该单元相交的几何体的主键。请注意，并非几何体相交的*每个*单元都会包含在索引中——系统会应用诸如**最深单元规则**和**覆盖规则**之类的优化，以确保空间索引中的每个条目都能以最详尽的细节描述关联几何体，同时占用最少的网格单元。有关这些主题的更多信息，请参阅相关书籍或联机丛书。\n\
  \n## 空间查询中网格的应用示例\n\n为了理解数据库引擎如何使用网格来满足空间查询，请参考上一节中检索位于地图边界框内的所有点的示例：\n\n**图 10-11.\
  \ 空间索引使用的多级网格**\n\n```sql\nDECLARE @BoundingBox geography;\n\nSET @BoundingBox =\
  \ geography::STPolyFromText(\n'POLYGON ((-109 41, -109 37, -102 37, -102 41, -109\
  \ 41))',\n4326);\n\nSELECT\n    name,\n    location.STAsText()\nFROM\n    allCountries\n\
  WHERE\n    location.STIntersects(@BoundingBox) = 1;\n```\n\n`location`列被包含在`idxallCountries`地理索引中，并且谓词`location.STIntersects(@BoundingBox)\
  \ = 1`支持使用空间索引，因此该查询的执行计划可以利用基于索引的主筛选器。为此，首先根据`location`列上`idxallCountries`索引的相同网格对`@BoundingBox`参数进行细分。然后，可以将索引中每个单元占用的网格单元与`@BoundingBox`占用的网格单元进行比较。主筛选器的结果可能导致以下三种结果之一：\n\
  \n-   如果`location`列中的某个几何体没有与`@BoundingBox`所占用单元共同的索引单元，则它可以被主筛选器丢弃，因为几何体本身不可能相交。\n\
  -   如果该几何体占据了`@BoundingBox`所占用的索引网格单元的全部，那么它肯定会与`@BoundingBox`几何体本身相交。因此，无需调用次级筛选器，此行就可以肯定地包含在结果集中。这被称为内部筛选。\n\
  -   如果该几何体仅部分占据了`@BoundingBox`所占用的网格单元，则无法确定该单元是否与`@BoundingBox`相交。在这些情况下，几何体必须传递给次级筛选器，这涉及调用`STIntersects()`方法本身。\n\
  \n为了获得最佳的空间查询性能，理想目标是让主筛选器完成尽可能多的处理，并减少需要调用次级筛选器的次数。这意味着要确保尽可能多的行要么被主筛选器完全丢弃，要么仅基于主筛选器就肯定被包含。实现这一目标需要调整网格属性，以最好地匹配底层数据集中的数据以及针对该数据运行的查询类型。\n\
  \n### 优化网格\n\n如果空间索引要有效地充当空间查询结果的主筛选器，它不仅必须快速，而且还必须最小化返回的误报结果数量。索引在实现这两个目标方面的成功程度，很大程度上取决于为其网格分辨率、边界框和每对象单元数参数选择的值。\n\
  \n每个参数的最佳值在很大程度上取决于所讨论的底层数据集的确切分布。但是，在下一节中，我将给出一些在确定空间索引设置时需要牢记的一般思路。\n\n\n\n**提示**\
  \ 你可以在同一张表上创建最多 249 个空间索引，并且可以在同一列上创建多个空间索引，为每个索引使用不同的设置。你可能会发现这对于索引分布不均匀的数据很有用。\n\
  \n## 网格分辨率\n选择正确的网格分辨率——即网格每个级别包含的单元格数量——是一个在索引提供的精度（即“围绕要素的贴合紧密度”）与获取该精度所需的网格单元格数量之间进行权衡的问题。网格每一级的分辨率可以独立设置为三种分辨率之一：`LOW`\
  \ 对应一个 `4×4` 网格，`MEDIUM` 对应一个 `8×8` 网格，`HIGH` 对应一个 `16×16` 网格。如果你设置一个低网格分辨率（即，索引包含数量较少、相对较大的网格单元格），那么主筛选器可能会返回更多的误报——即那些与网格单元格相交但并未实际与所讨论几何体相交的要素。这些误报将导致次级筛选器需要完成更多工作，从而导致查询性能下降。然而，如果你设置一个高网格分辨率（即，索引包含大量网格单元格，但每个单元格本身很小），那么生成的索引将为每个几何体包含更多的网格单元格条目，这可能意味着查询索引所需的时间更长，同样会降低查询性能。高分辨率的另一个影响可能是，完全镶嵌几何体所需的单元格数量超过了\
  \ `CELLS_PER_OBJECT` 限制，在这种情况下，镶嵌将无法完全完成。\n\n## 边界框\n空间索引的边界框指定了将被网格镶嵌的空间区域。指定一个更小的边界框但保持相同数量的网格单元格，将导致每个单独的网格单元格变小，从而在任何要素周围形成更精确的贴合，并使主筛选器更准确。但是，如果你过度限制边界框的范围，你可能会发现你将一些离群要素完全排除在索引之外。对于\
  \ `geography` 数据类型，没有显式边界框，因为每个 `geography` 索引都被假定为覆盖整个地球。\n\n## 每对象单元格数\n`CELLS_PER_OBJECT`\
  \ 参数允许你明确指定将存储多少网格单元格来描述空间索引中的每个要素。每个对象的最佳单元格数量与每一级别所用单元格的分辨率密切相关；更高分辨率的网格将包含更小的单元格，这可能意味着在给定网格级别下，需要更多单元格才能完全覆盖对象。如果\
  \ `CELLS_PER_OBJECT` 限制设置得太低，那么根据最深单元格规则和覆盖规则，每个索引条目可能不允许包含描述一个几何体所需的总单元格数。在这种情况下，网格单元格将不会被完全细分，索引条目将无法达到其应有的准确性。如果\
  \ `CELLS_PER_OBJECT` 限制设置得太高，那么每个索引条目将被允许增长到包含大量单元格。这可能导致更精确的索引，但查询速度变慢，从而违背了最初使用空间索引的目的。\n\
  \n为了理解这些不同参数之间的相互作用，让我们考虑本章前面创建的 `idxallCountries` 索引。该索引使用了所有四个级别均为 `MEDIUM` 网格分辨率的默认参数，以及每个对象\
  \ 16 个单元格。使用 `geography` 网格进行镶嵌的索引没有显式边界框，因为它们隐式覆盖了整个地球。\n\n为了评估 `idxallCountries`\
  \ 索引的有效性，我们本可以简单地获取一些使用不同索引设置的查询的性能计时。然而，与其依赖这种试错方法，SQL Server 2008 附带了两个非常有用的存储过程——\n\
  \n\n\n`sp_help_spatial_geometry_index` 和 `sp_help_spatial_geography_index`——它们提供各种有用信息，帮助诊断空间索引的工作方式。\n\
  \n要使用这些存储过程之一，您需要提供要测试的表和索引名称的参数，以及一个`query sample`——一个地理或几何实例，将根据索引使用的设置进行镶嵌。由于`idxallCountries`索引使用了`geography`数据类型的`location`列，我们将使用相应的`sp_help_spatial_geography_index`过程，并提供之前创建的地理边界框作为查询示例，如以下代码清单所示：\n\
  \n```\nEXEC sp_help_spatial_geography_index\n   @tabname = allCountries,\n   @indexname\
  \ = idxallCountries,\n   @verboseoutput = 1,\n   @query_sample = 'POLYGON ((-109\
  \ 41, -109 37, -102 37, -102 41, -109 41))';\n```\n\n输出中有很多详细行，但从性能角度来看，我们只关注一些重要的行：\n\
  \n`Base_Table_Rows` 6906119\n\n这个值简单地告诉我们基础表中的总行数，就像`SELECT COUNT(*) FROM allCountries`会报告的那样。重要的是要记住，如果没有这个表上的空间索引，要找出哪些行位于所选查询样本内的查询将必须对这\
  \ 690 万行中的每一行调用`STIntersects()`方法。幸运的是，情况并非如此，因为空间索引可以提供这些记录的主要过滤器，如过程返回的以下行所示：\n\
  \n`Number_Of_Rows_Selected_By_Primary_Filter` 49018\n`Number_Of_Rows_Selected_By_Internal_Filter`\
  \ 38913\n`Number_Of_Times_Secondary_Filter_Is_Called` 10105\n\n基于表的主要过滤器，49,018\
  \ 条记录被选为此查询示例的候选。这少于表中总行数的 0.71%。在这些候选行中，38,913 行可以直接被选为确定结果，而无需调用二级过滤器。\n\n例如，在交集谓词的情况下，如果一个点位于完全被查询样本覆盖的网格单元中，则该点肯定与该几何体相交，因此永远不需要使用`STIntersects()`方法。仅基于主要过滤器选择的输出行被称为`internal\
  \ filter`。在这种情况下，主要过滤器行的 79.385%可以由内部过滤器选择。\n\n## 第 10 章 ··· 处理空间数据\n\n剩余的 10,105\
  \ 条由主要过滤器选择的记录位于索引单元中，这些单元仅部分被查询样本中指定的几何体相交，因此必须依赖二级过滤器来确认是否应选择它们。\n\n在应用主要和二级过滤器之后，确认的`Number_Of_Rows_Output`为\
  \ 44,840。注意，最终的行输出数少于最初由主要过滤器选择的行数，因为其中一些行可能是假阳性，然后被二级过滤器消除。\n\n`Number_Of_Rows_Output`\
  \ 44840\n`Internal_Filter_Efficiency` 86.7818911685995\n`Primary_Filter_Efficiency`\
  \ 91.4766004324942\n\n重要的是要记住，无论您有什么索引设置（包括无索引），对于给定的空间查询，您总是会得到相同的最终结果。唯一的区别在于这些行是如何被识别的。在这种情况下，`Primary_Filter_Efficiency`指标表示主要过滤器选择的行中有\
  \ 91.476%被包含在最终结果中。`Internal_Filter_Efficiency`为 86.78%，表示仅从内部过滤器选择的输出行的百分比。调整空间索引时的目标是最大化这两个指标。\n\
  \n现在，让我们考虑当我们创建一个新索引时会发生什么，使用高分辨率在所有四个网格级别：\n\n```\nCREATE SPATIAL INDEX idxallCountriesHigh\n\
  \   ON allCountries(location) USING GEOGRAPHY_GRID\n   WITH (\n      GRIDS =(\n\
  \         LEVEL_1 = HIGH,\n```\n\n\n\n# 第十章：处理空间数据\n\n```\nLEVEL_2 = HIGH,\nLEVEL_3\
  \ = HIGH,\nLEVEL_4 = HIGH),\nCELLS_PER_OBJECT = 16);\n```\n\n我们将再次使用 `sp_help_spatial_geography_index`\
  \ 存储过程来检查此索引的属性：\n\n```\nEXEC sp_help_spatial_geography_index\n@tabname = allCountries,\n\
  @indexname = idxallCountriesHigh,\n@verboseoutput = 1,\n@query_sample = 'POLYGON\
  \ ((-109 41, -109 37, -102 37, -102 41, -109 41))';\n```\n\n## 索引性能对比\n\n不出所料，`Base_Table_Rows`\
  \ 值保持不变，仍为 `6,906,119`，查询输出的总行数 `44,840` 也是如此。主筛选器选择的行数非常接近，为 `49,157`，主筛选器效率几乎未变——从\
  \ `91.4766` 变为 `91.21793`。然而，索引之间存在一个非常重要的区别，如下列行所示：\n\n`Number_Of_Rows_Selected_By_Internal_Filter`\
  \ `25333`\n`Number_Of_Times_Secondary_Filter_Is_Called` `23824`\n`Percentage_Of_Primary_Filter_Rows_Selected_By_Internal_Filter`\
  \ `51.5348780438188`\n`Internal_Filter_Efficiency` `56.4964317573595`\n\n当使用 `MEDIUM`\
  \ 网格分辨率时，主筛选器选择的候选行中有 `79.385%` 可以被自动包含在结果集中。因此，对于剩余的 `10,105` 行，只需调用二级筛选器。然而，当设置为\
  \ `HIGH` 分辨率时，只有 `51.53%` 的主筛选器行能被内部筛选器预先选中。因此，昂贵的二级筛选器不得不被调用两次。\n\n## 网格分辨率选择原理\n\
  \n乍一想，这似乎不合逻辑。人们可能会认为，在为点表建立索引时，由于每个几何体最多只能与一个单元格相交（或者如果点位于单元格相交的角落，则最多与四个单元格相交），`HIGH`\
  \ 网格分辨率必定能提供最佳拟合。每个点几何体在索引中只需要一个单元格，而使用 `HIGH` 分辨率时，该单元格将尽可能精细。\n\n然而，重要的是要认识到，为了满足空间查询，用于比较几何体的空间谓词（即存储过程定义的查询样本）也必须使用与基表本身相同的索引设置进行镶嵌。在本例中，`@BoundingBox`\
  \ 是一个相当大的多边形，代表科罗拉多州，这需要大量单元格才能完全覆盖。由于这超过了 `CELLS_PER_OBJECT` 的限制，镶嵌操作被停止，其拟合效果就不如预期。在此示例中，`MEDIUM`\
  \ 分辨率网格提供的索引比 `HIGH` 分辨率网格更准确，因此性能更好。\n\n遗憾的是，关于确定最佳空间索引设置，几乎没有通用的规则可以遵循，因为它们很大程度上取决于相关数据的确切分布以及针对该数据运行的查询的性质。调整空间索引需要大量的试错过程，但这里介绍的存储过程可以提供宝贵的统计数据来评估索引的性能，从而辅助这一过程。\n\
  \n## 总结\n\n空间数据是数据库开发中一个令人兴奋且不断发展的领域。随着更多应用程序和服务具备位置感知能力，所有类型的数据都需要以结构化的、可搜索的方式与关联的空间信息一起存储。\n\
  \nSQL Server 2008 中的 `geography` 和 `geometry` 数据类型提供了一种强大且符合标准的方式，可以使用平面或椭球体模型来存储、检索和对空间数据执行计算。然而，空间数据的复杂性和独特性意味着必须采取特定的方法来确保空间查询保持高性能。空间索引可用于提供数据的主筛选器以满足空间查询，从而减少执行昂贵的精确空间操作（如\
  \ `STIntersects()`）所需的处理量。\n\n# 第十一章：处理时态数据\n\n\n\n或许可以公允地说，时间信息在几乎所有有用的数据库中都是关键组成部分。\n\
  \n想象一个缺少时间组件的数据库，无异于想象没有时间流逝的生活；这根本说不通。没有时间轴，就不可能描述上个月的购买次数、仓库的夜间平均温度，或呼叫者拨打技术支持电话时被要求等待的最长时间。\n\
  \n尽管时间数据对我们的数据至关重要，但很少有开发者愿意真正深入思考成功处理时态数据所需的复杂性，这在许多情况下需要的思考量可能超出你最初的想象。\n\n在本章中，我将深入探讨在\
  \ SQL Server 中处理时间的方方面面。我会解释你可能遇到的一些不同类型的时间处理需求，并描述如何最好地应对一些常见——且出奇复杂——的时间查询。\n\n\
  ## 对基于时间的信息进行建模\n\n当在 SQL Server 中思考\"时态\"数据时，通常想到的场景是一个 `datetime` 列，代表某个动作发生或未来计划发生的时间。\n\
  \n然而，`datetime` 列只是实现时态数据的几种可能方式之一。可以在 SQL Server 中建模的一些基于时间的信息类别如下：\n\n*   **基于实例的数据**\
  \ 关注于记录事件发生的时间点。如前面描述的例子所示，基于实例的数据通常使用单个 `datetime` 值列来记录，但也可以使用其他数据类型，包括 `SQL Server\
  \ 2008` 引入的 `datetime2` 和 `datetimeoffset` 类型，以不同的精度级别记录实例数据。你可能为其建模实例的场景包括：用户登录系统的时刻、客户进行购买的时刻，以及任何其他可能需要记录在数据库中的事件发生的准确时间。关键是要认识到，你是在描述一个特定的时间点，这基于你所使用的数据类型的精度。\n\
  *   **基于区间的数据** 扩展了实例的概念，描述了一个指定起点和终点之间的时间段。根据你的需求，区间可以使用两个时间列（例如，使用 `datetime`\
  \ 类型）建模，也可以使用单个时间列加上另一个列（通常是数值列）来建模，该列代表自该时间点以来经过的时间量。基于区间数据的一个子集是 **持续时间** 的概念，它只记录事件持续的时间长度，而不考虑其发生的时间点。持续时间可以使用单个数值列来建模。\n\
  *   **基于周期的数据** 与基于区间的数据类似，但它通常用于回答稍有不同的问题。处理区间或持续时间时，问题是\"多长时间？\"，而对于周期，问题是\"什么时候？\"\
  。周期的例子包括\"下个月\"、\"昨天\"、\"除夕夜\"和\"假日季\"。虽然这些与区间相似——并且可以用区间表示——但处理周期的思维方式略有不同，因此重要的是要认识到存在其他建模选项。有关周期的更多信息，请参阅本章后面的\"\
  使用日历表定义周期\"一节。\n*   **双时态数据** 是属于上述任何一类的时态数据，但还包括一个额外的时间组成部分（称为**有效时间**，或更宽松地称为**截止日期**），指明数据被认为有效的时间。这种数据模式常用于数据仓库，既用于缓慢变化的维度，也用于更新半加法性的事实数据。当以双时态方式查询数据库时，问题就从\"\
  在某一天，发生了什么？\"转变...\n\n\n## 关于时间数据的思维方式\n\n“截至某一天，我们认为在某个（其他）日期发生了什么？”这个问题也可以表述为“我们对某一天发生事件的最新认识是什么？”。要真正理解这种思维方式可能需要一点思考；更多信息请参阅本章后面的“管理双时态数据”部分。\n\
  \n## SQL Server 的日期/时间数据类型\n\n在 SQL Server 中成功处理时态数据的第一个要求是理解数据库管理系统（DBMS）提供了哪些原生的日期/时间数据类型。在\
  \ SQL Server 2008 之前，当需要在 SQL Server 中存储时态数据时，实际上没有太多选择——唯一可用的时间数据类型是 `datetime`\
  \ 和 `smalldatetime`。在实践中，即使 `smalldatetime` 需要的存储空间更少，也很少有开发人员使用它，因为它的精度和值范围较小。\n\
  \nSQL Server 2008 仍然支持 `datetime` 和 `smalldatetime`，但也提供了一系列新的时间数据类型。支持的完整时间数据类型列表见表\
  \ 11-1。\n\n**表 11-1. SQL Server 2008 支持的日期/时间数据类型**\n\n| 数据类型（Datatype） | 范围（Range）\
  \ | 精度（Resolution） | 存储空间（Storage） |\n| :--- | :--- | :--- | :--- |\n| `datetime`\
  \ | 1753 年 1 月 1 日, 00:00:00.000 – 9999 年 12 月 31 日, 23:59:59.997 | 3.33 毫秒 | 8\
  \ 字节 |\n| `datetime2` | 0001 年 1 月 1 日, 00:00:00.0000000 – 9999 年 12 月 31 日, 23:59:59.9999999\
  \ | 100 纳秒（ns） | 6-8 字节 |\n| `smalldatetime` | 1900 年 1 月 1 日, 00:00 – 2079 年 6\
  \ 月 6 日, 23:59 | 1 分钟 | 4 字节 |\n| `datetimeoffset` | 0001 年 1 月 1 日, 00:00:00.0000000\
  \ – 9999 年 12 月 31 日, 23:59:59.9999999 | 100 纳秒（ns） | 8-10 字节 |\n| `date` | 0001\
  \ 年 1 月 1 日 – 9999 年 12 月 31 日 | 1 天 | 3 字节 |\n| `time` | 00:00:00.0000000 – 23:59:59.9999999\
  \ | 100 纳秒（ns） | 3-5 字节 |\n\n了解每种数据类型的日期范围和存储需求是很好的；然而，处理时态数据涉及的远不止这些。开发人员在使用 SQL\
  \ Server 的日期/时间类型时，真正需要理解的是应该使用什么输入和输出格式，以及如何操作这些类型以创建各种常用的查询。本节将涵盖这两个问题。\n\n##\
  \ 输入日期格式\n\n在使用 SQL Server 的日期/时间类型时，实际上只需要记住一条规则：当从客户端接收数据时，**务必**避免使用模糊的日期格式！一个不幸的事实是，根据书写方式的不同，同一个日期可能被不同的人解读为不同的含义。\n\
  \n例如，非常幸运的是，我恰好在 2009 年 8 月 7 日编写本章。当时差不多是中午 12:35。为什么这特别有趣？因为如果我写下当前的时间和日期，它会形成一个升序的数字序列，如下所示：\n\
  \n```\n12:34:56 07/08/09\n```\n\n我住在英格兰，所以我倾向于使用 `dd/mm/yy` 格式来书写和思考日期，就像上面的例子一样。然而，美国的人们早在上个月，7\
  \ 月 8 日，就已经享受过这个相当整齐的时间模式了。如果你来自某些亚洲国家（比如日本），你可能在大约两年前的 2007 年 8 月 9 日就见过这个序列。就像这些地区的居民一样，SQL\
  \ Server 在处理输入日期字符串时会尝试遵循本地的格式规范，这意味着用户有时无法从给定的输入中得到他们期望的日期。\n\n幸运的是，有一个解决方案可以解决这个问题。就像许多其他因缺乏标准化而产生的问题一样，国际标准化组织（ISO）选择介入。\n\
  \n**ISO 8601** 是一个国际标准的日期/时间格式，SQL Server（以及其他软件）会自动检测并使用它，而不受本地服务器设置的影响。完整的 ISO\
  \ 格式指定如下：\n\n```\nyyyy-mm-ddThh:mi:ss.mmm\n```\n\n`yyyy` 是四位数的年份，这是该格式的关键；任何时候 SQL\
  \ Server 首先看到一个四位数的年份，它就会假定正在使用的是 ISO 格式。`mm` 和 `dd` 分别是月份和日期，`hh`、`mi`、`ss` 和 `mmm`\
  \ 分别是小时、分钟、秒和毫秒。根据标准，连字符和 `T` 是分隔符。\n\n\n两者都是可选的，但如果你包含了连字符，则**必须**同时包含 `T`。\n\n\
  `datetime`、`datetime2`、`smalldatetime` 和 `datetimeoffset` 数据类型同时存储日期和时间部分，而 `date`\
  \ 和 `time` 数据类型则分别只存储日期或时间。然而，需要注意的一个重要点是，无论使用何种数据类型，任何输入的时间和日期元素都是可选的。如果为记录时间成分的数据类型未提供时间部分，SQL\
  \ Server 将使用午夜作为默认值；如果为记录日期成分的数据类型未在输入中指定日期部分，SQL Server 将使用 1900 年 1 月 1 日。类似地，如果为\
  \ `date` 数据类型提供了时间成分作为输入，或者为 `time` 数据类型提供了日期，该值将被简单地忽略。\n\n以下每一种都是有效、明确的日期/时间格式，可用于为任何时间数据类型提供输入：\n\
  \n```\n--无分隔符的日期和时间\n20090501 13:45:03\n\n--带连字符的日期，并用 T 指定时间 (ISO 8601)\n2009-05-01T13:45:03\n\
  \n--仅日期\n20090501\n\n--仅时间\n13:45:03\n```\n\n### 注意\n\n如果你选择在 ISO 8601 格式中使用连字符分隔年、月、日值，则**必须**在时间部分之前包含\
  \ `T` 字符。为了演示此字符的重要性，请比较以下结果：\n\n```\nSET LANGUAGE British;\nSELECT CAST('2003-12-09\
  \ 00:00:00' AS datetime), CAST('2003-12-09T00:00:00' AS datetime).\n```\n\n始终使用前述格式之一——并始终确保客户端按该格式发送日期——你可以确保\
  \ SQL Server 将始终使用正确的日期。\n\n请记住，SQL Server 不存储原始的输入日期字符串；日期会被转换并以二进制格式在内部存储。因此，如果无效的日期最终进入了数据库，将无法仅从数据中将其还原。\n\
  \n不幸的是，在数据到达数据库之前，总是不一定能使其恰好处于正确的格式。SQL Server 提供了两种主要机制，可在处理非标准日期/时间格式时提供帮助：一是对\
  \ `CONVERT` 函数的扩展，允许指定日期“样式”；二是称为 `DATEFORMAT` 的运行时设置。\n\n要使用 `CONVERT` 从非标准日期创建日期/时间数据实例，请使用该函数的第三个参数来指定日期的格式。以下代码块展示了如何为英式/法式和美式样式创建日期：\n\
  \n```\n--英式/法式风格\nSELECT CONVERT(date, '01/02/2003', 103);\n\n--美式风格\nSELECT CONVERT(date,\
  \ '01/02/2003', 101);\n```\n\n样式 `103` 生成日期“2003 年 2 月 1 日”，而样式 `101` 生成日期“2003\
  \ 年 1 月 2 日”。通过使用这些样式，你可以更轻松地控制日期/时间输入的处理方式，并明确告知 SQL Server 如何处理输入字符串。文档中记录了 20\
  \ 多种不同的样式；有关完整列表，请参阅 SQL Server 2008 联机丛书中主题“`CAST` 和 `CONVERT` (Transact-SQL)”。\n\
  \n另一个常用于控制输入日期字符串格式的选项是 `DATEFORMAT` 设置。`DATEFORMAT` 允许你使用说明符 `D`、`M` 和 `Y` 来指定日、月、年在输入日期格式中出现的顺序。以下\
  \ T-SQL 等效于前面使用 `CONVERT` 的示例：\n\n```\n--英式/法式风格\nSET DATEFORMAT DMY;\nSELECT CONVERT(date,\
  \ '01/02/2003');\n\n--美式风格\nSET DATEFORMAT MDY;\nSELECT CONVERT(date, '01/02/2003');\n\
  ```\n\n使用 `DATEFORMAT` 和 `CONVERT` 来纠正非标准输入之间其实没有太大区别。`DATEFORMAT` 在某些情况下可能更简洁，因为它只需要为每个连接指定一次，但\
  \ `CONVERT` 由于可用的样式更多，提供了略多的控制。最终，你应该选择能使你正在处理的特定代码更易于阅读、测试和维护的选项。\n\n\n# 第 11 章\
  \ 处理时间数据\n\n`注意` 在存储过程中使用 `SET DATEFORMAT` 会导致每次执行该过程时都发生重新编译。这在某些情况下可能会引发性能问题，因此在将解决方案部署到生产环境之前，请务必进行仔细测试。\n\
  \n## 输出日期格式化\n\n`CONVERT` 函数不仅可用于指定输入的日期/时间字符串格式，它也常用于格式化日期以供输出。\n\n在继续之前，我觉得有必要快速声明一点：在数据库中进行格式化工作通常不是个好主意。通过在数据层将日期格式化为字符串，你可能会降低存储过程的可重用性。因为这可能会迫使需要不同日期/时间格式的应用程序将字符串转换回本机日期/时间对象，然后再将其重新格式化为字符串。应用程序方面这种额外的工作很可能没有必要，而且真正需要以字符串格式将日期发送回应用程序的情况少之又少。我能想到的一个例子是在进行数据绑定到网格或其他不支持所需日期格式的对象时——但这种情况很少见。\n\
  \n与处理输入格式化时一样，用于日期/时间输出格式化的主要 T-SQL 函数也是 `CONVERT`。可用于输入的同样一组样式代码，也可用于输出格式；唯一的区别是该函数是从日期/时间类型的实例转换为字符串，而不是相反。以下\
  \ T-SQL 展示了如何将当前日期格式化为美式和英式/法式风格的字符串：\n\n```sql\n--英式/法式风格\nSELECT CONVERT(varchar(50),\
  \ GETDATE(), 103);\n\n--美式风格\nSELECT CONVERT(varchar(50), GETDATE(), 101);\n```\n\
  \n`CONVERT` 函数可用的样式集有些有限，可能不足以应对所有情况。幸运的是，SQL Server 的 CLR 集成为此问题提供了解决方案。.NET 的\
  \ `System.DateTime` 类包含了极其灵活的字符串格式化功能，可以通过 CLR 标量用户定义函数（UDF）来利用。以下方法公开了必要的功能：\n\n\
  ```csharp\npublic static SqlString FormatDate(\n    SqlDateTime Date,\n    SqlString\
  \ FormatString)\n{\n    DateTime theDate = Date.Value;\n    return new SqlString(theDate.ToString(FormatString.ToString()));\n\
  }\n```\n\n此 UDF 将 `SqlDateTime` 实例转换为 `System.DateTime` 的实例，然后使用重载的 `ToString` 方法将日期/时间格式化为字符串。该方法接受广泛的格式化指令，所有这些指令在微软\
  \ MSDN 库中都有完整记录。作为一个快速示例，以下方法调用将当前日期/时间格式化为月在前，然后是四位数的年份，最后是日：`SELECT dbo.FormatDate(GETDATE(),\
  \ 'MM yyyy dd');`\n\n请记住，`ToString` 方法的格式化重载是区分大小写的。例如，`MM` 和 `mm` 不同，如果不小心，可能会得到意想不到的结果。\n\
  \n## 高效查询日期/时间列\n\n知道如何格式化输入和输出日期是良好的第一步，但任何数据库系统的真正目标是允许用户查询数据以解答业务问题。在 SQL Server\
  \ 中查询日期/时间数据有一些有趣的陷阱，但如果你理解 DBMS 如何处理时间数据，这些陷阱在大多数情况下都很容易避免。\n\n首先，创建下表：\n\n```sql\n\
  CREATE TABLE VariousDates\n(\n    ADate datetime NOT NULL,\n    PRIMARY KEY (ADate)\
  \ WITH (IGNORE_DUP_KEY = ON)\n);\nGO\n```\n\n现在，我们将向表中插入一些数据。以下 T-SQL 将向表中插入 85,499\
  \ 行，日期范围从 2010 年 2 月到 11 月：\n\n```sql\nWITH Numbers\nAS\n(\n    SELECT DISTINCT\
  \ number\n    FROM master..spt_values\n    WHERE number BETWEEN 1001 AND 1256\n\
  )\nINSERT INTO VariousDates ( ADate )\nSELECT\n    CASE x.n\n        WHEN 1 THEN\n\
  ```\n\n\n# 第 11 章 处理时态数据\n\n## SQL 查询示例\n\n```sql\nDATEADD(millisecond,\n    POWER(a.number,\
  \ 2) * b.number,\n    DATEADD(day, a.number-1000, '20100201'))\nWHEN 2 THEN\nDATEADD(millisecond,\n\
  \    b.number-1001,\n    DATEADD(day, a.number-1000, '20100213'))\nEND\nFROM Numbers\
  \ a, Numbers b\nCROSS JOIN\n(\n    SELECT 1\n    UNION ALL\n    SELECT 2\n) x (n);\n\
  GO\n```\n\n## 查询数据与最小日期\n\n数据插入后，下一个合乎逻辑的步骤自然是查询它。你可能首先想问“表中的最小日期值是多少？”以下查询使用`MIN`聚合函数来回答这个问题：\n\
  \n```sql\nSELECT MIN(ADate)\nFROM VariousDates;\nGO\n```\n\n这个查询返回一行，值为`2010-02-13\
  \ 14:36:43.000`。但或许你想知道表中还有哪些来自`2010`年`2`月`13`日的时间。第一次尝试这个查询可能如下：\n\n```sql\nSELECT\
  \ *\nFROM VariousDates\nWHERE ADate = '20100213';\nGO\n```\n\n如果你运行这个查询，可能会惊讶地发现，返回的并不是`2010`年`2`月`13`日的所有行，而是零行。原因在于`ADate`列使用的是`datetime`类型，如前所述，它同时包含日期和时间部分。当此查询被评估，且搜索参数`ADate\
  \ = '20100213'`被处理时，SQL Server 看到`datetime`类型的`ADate`列正与`varchar`字符串`'20100213'`进行比较。根据\
  \ SQL Server 的数据类型优先级规则，该字符串在比较前会被转换为`datetime`；由于该字符串不包含时间部分，因此使用默认时间`00:00:00.000`。要查看此转换过程，请尝试以下\
  \ T-SQL：\n\n```sql\nSELECT CONVERT(datetime, '20100213');\nGO\n```\n\n当此代码运行时，会自动添加默认时间部分，此`SELECT`语句的输出为值`2010-02-13\
  \ 00:00:00.000`。显然，基于此字符串与`datetime`类型之间隐式转换的查询是无效的——除非你只想要午夜时刻的值。\n\n## 解决方案：日期转换与索引利用\n\
  \n此问题有很多潜在解决方案。当然，我们可以修改表结构，将`ADate`列的类型从`datetime`改为`date`。这样做将便于对特定日期进行查询，但会丢失与每条记录关联的时间元素。因此，这个解决方案只适用于你永远不需要知道记录发生的具体时间，只需知道其发生日期的场景。\n\
  \n一个更好的解决方案是以稍有不同的方式尝试控制从`datetime`到`date`的转换。\n\n许多开发人员的第一反应是尝试完全避免字符串到`datetime`实例的转换，通过转换`ADate`列本身并使用能消除时间部分的转换样式。以下查询是这样一个示例：\n\
  \n```sql\nSELECT *\nFROM VariousDates\nWHERE CONVERT(varchar(20), ADate, 112) =\
  \ '20100213';\n```\n\n运行此查询，你会发现返回了正确的数据；你将看到所有来自`2010`年`2`月`13`日的行。虽然获得正确结果是件好事，但不幸的是，这里存在一个在本例使用的少量样本数据中可能不太明显的主要问题。表中`ADate`列上的索引是基于其原生类型——即`datetime`——构建的。该表并没有一个用于将`ADate`转换为使用样式`112`（或任何其他样式）的`varchar(20)`的索引。因此，此查询无法利用索引查找，SQL\
  \ Server 被迫扫描表的每一行，将每个`ADate`值转换为字符串，然后与日期字符串进行比较。这会产生如图 11-1 所示的执行计划，其估计成本为`0.229923`。\n\
  \n*图 11-1. 将日期/时间列转换为字符串不会产生良好的执行计划。*\n\n任何试图使用字符串操作函数截断`datetime`字符串末尾时间部分的方法都会导致类似问题。\n\
  \n一般来说，在查询中对列进行计算或转换会妨碍使用该列上的任何索引。然而，此规则有一个例外：对于`datetime`、`datetime2`或`datetimeoffset`类型的查询谓词被转换（或`CAST`）为`date`的特殊情况，查询优化器仍然可以依赖索引顺序来满足查询。\n\
  \n为了演示这种不寻常但非常有用的行为，我们可以将之前的查询重写如下：\n\n```sql\nSELECT *\nFROM VariousDates\nWHERE\
  \ CAST(ADate AS date) = '20100213';\n```\n\n此查询性能好得多，产生了如图 11-2 所示的执行计划，其中包含一个估计成本为`0.0032831`的聚集索引查找（成本仅为前一版本的`1/68`！）。\n\
  \n*图 11-2. 查询将日期/时间列`CAST`为`date`类型允许查询引擎利用索引查找。*\n\n## 时间范围查询\n\n将`datetime`转换为`date`对于查询`datetime`范围内的特定日期非常有效，但如果我们想查询一个不代表整天数的连续时间范围呢？例如，假设我们将每天划分为两个`12`小时的班次：一个从午夜到中午，另一个从中午到午夜。基于此数据的查询可能如下所示：\n\
  \n```sql\nSELECT *\nFROM VariousDates\nWHERE ADate BETWEEN '20100213 12:00:00' AND\
  \ '20100214 00:00:00';\n```\n\n此查询与上一个类似，能够使用高效的聚集索引查找，但它有一个问题。`BETWEEN`操作符在两端都是包含性的，这意味着`X\
  \ BETWEEN Y AND Z`展开为`X >= Y AND X <= Z`。如果恰好有一行数据是`2010`年`2`月`14`日午夜的（示例表中的数据确实包含这样一行），那么该行将同时包含在此查询和返回下一个班次数据的查询的结果中。幸运的是，解决这个问题很容易；在对时间数据执行范围查询时，不要使用`BETWEEN`。而是始终使用完全展开的版本，包含区间的起始值，但*排除*结束值：\n\
  \n```sql\nSELECT *\nFROM VariousDates\nWHERE\nADate >= '20100213 12:00:00'\nAND\
  \ ADate < '20100214 00:00:00';\n```\n\n此模式可用于查询任何类型的日期和时间范围，并且实际上非常灵活。在下一节中，你将学习如何扩展此模式以查找所有“今天”的行、“本月”的行以及其他类似的需求。\n\
  \n## 日期/时间计算\n\n上一节中用于返回给定日期所有行的查询模式有效且能返回正确结果，但目前来看过于静态。期望所有日期范围查询都对输入日期进行硬编码，这既不现实，也不是一个易于维护的解决方案。通过使用\
  \ SQL Server 的日期计算函数，可以操作输入日期以动态生成给定查询所需的任何范围。\n\n常用于执行日期/时间计算的两个主要函数是`DATEDIFF`和`DATEADD`。第一个返回两个日期之间的差值；第二个从现有日期中添加（或减去）时间。这些函数中的每一个都接受粒度（`granularity`）作为参数，并且可以在毫秒到年之间的任何级别上操作。\n\
  \n`DATEDIFF`接受三个参数：用于比较两个输入日期的时间粒度、开始日期和结束日期。例如，要找出`2010`年`2`月`13`日午夜到`2010`年`2`月`14`日午夜之间经过了多少小时，可以使用以下查询：\n\
  \n```sql\nSELECT DATEDIFF(hour, '20100113', '20100114');\n```\n\n结果，正如你所料，是`24`。请注意，我提到此查询比较的是两个日期（均在午夜），即使两个输入字符串都不包含时间。再次强调，我想强调的是，每当你将字符串用作日期/时间类型的输入时，它都会被\
  \ SQL Server 隐式转换。\n\n\n\n同时需要注意的是，`DATEDIFF` 函数保持了“开始”和“结束”时间的概念，如果调换这两个时间参数，结果会发生变化。将前面的查询修改为先传入\
  \ 2 月 14 日再传入 2 月 13 日，输出结果会变成 `-24`。\n\n`DATEADD` 函数接受三个参数：时间粒度、要添加的时间量以及输入日期。例如，下面的查询将\
  \ 2010 年 2 月 13 日午夜增加 24 小时，输出结果为 `2010-01-14 00:00:00.000`：\n\n```sql\nSELECT DATEADD(hour,\
  \ 24, '20100113');\n```\n\n`DATEADD` 函数也接受负数作为时间量，这会导致相应的时间量被减去而非加上，如本例所示。\n\n###\
  \ 截断 `datetime` 值的时间部分\n\n在 SQL Server 2008 之前的版本中，仅提供 `datetime` 和 `smalldatetime`\
  \ 这两种有限的时间数据类型，这意味着无法存储不带关联时间部分的日期值。因此，开发人员提出了多种“截断” `datetime` 值的方法，以便在不改变底层数据类型的情况下，能够不考虑时间部分而将其作为日期进行查询。这些方法通常将\
  \ `datetime` 值的时间部分向下舍入到 `00:00:00`（午夜），使得结果唯一有效数字代表该值的日期、月份和年份。\n\n虽然随着 `date`\
  \ 数据类型的引入，不再需要执行此类截断，但所采用的“舍入”方法作为其他时间查询的基础仍然非常有用。为了演示，让我首先将截断过程分解为几个组成部分：\n\n1.\
  \  首先，你必须决定要将结果舍入到的粒度级别。例如，如果你想移除时间值的秒和毫秒，可以使用分钟为单位向下舍入。同样，要移除整个时间部分，可以使用天为单位向下舍入。\n\
  2.  一旦决定了粒度级别，就选择一个参考日期/时间。我通常使用 `1900-01-01` 的午夜，但你可以使用正在使用的数据类型范围内的任何日期/时间。\n\
  3.  使用 `DATEDIFF` 函数，在所选粒度级别上，找出参考日期/时间与你想要截断的日期/时间之间的差值。\n4.  最后，使用 `DATEADD` 将\
  \ `DATEDIFF` 函数的输出加到与你用来计算差值的相同参考日期/时间上。结果将是原始日期/时间的截断值。\n\n通过一个例子来说明应该会更清晰一些。假设你希望从\
  \ `2010-04-23 13:45:43.233` 开始，截断时间部分（换句话说，得到 `2010-04-23` 的午夜）。由于天是高于时间单位（毫秒、秒、分钟和小时）的最低粒度级别，因此将使用天作为粒度。可以使用以下\
  \ T-SQL 来确定参考日期 `1900-01-01` 与输入日期之间的天数：\n\n```sql\nDECLARE @InputDate datetime\
  \ = '20100423 13:45:43.233';\nSELECT DATEDIFF(day, '19000101', @InputDate);\n```\n\
  \n运行此 T-SQL 后，我们发现参考日期和输入日期之间相差 40289 天。使用 `DATEADD` 可以将该数字加到参考日期上：\n\n```sql\n\
  SELECT DATEADD(day, 40289, '19000101');\n```\n\n此操作的结果就是所需的截断值：`2010-04-23 00:00:00.000`。因为只将天数加回到参考日期——没有时间部分——所以日期被向下舍入，时间部分被消除。当然，你不必一步步运行这个\
  \ T-SQL；在实际应用中，你可能会将所有内容合并到一个内联语句中：\n\n```sql\nSELECT DATEADD(day, DATEDIFF(day,\
  \ '19000101', @InputDate), '19000101');\n```\n\n由于将日期/时间值向下舍入到不同粒度级别是非常常见的需求——例如查找一周的第一天、一个月的第一天等——你可能会发现将此逻辑封装在一个具有常用命名时间单位的可重用函数中很有帮助，如下所示：\n\
  \n```sql\nCREATE FUNCTION DateRound (\n    @Unit varchar(32),\n    @InputDate datetime\n\
  ) RETURNS datetime\nAS\nBEGIN\n    DECLARE @RefDate datetime = '19000101';\n   \
  \ SET @Unit = UPPER(@Unit);\n    RETURN\n    CASE(@Unit)\n        WHEN 'DAY' THEN\n\
  \            DATEADD(day, DATEDIFF(day, @RefDate, @InputDate), @RefDate)\n     \
  \   WHEN 'MONTH' THEN\n            DATEADD(month, DATEDIFF(month, @RefDate, @InputDate),\
  \ @RefDate)\n        WHEN 'YEAR' THEN\n            DATEADD(year, DATEDIFF(year,\
  \ @RefDate, @InputDate), @RefDate)\n        WHEN 'WEEK' THEN\n            DATEADD(week,\
  \ DATEDIFF(week, @RefDate, @InputDate), @RefDate)\n        WHEN 'QUARTER' THEN\n\
  \            DATEADD(quarter, DATEDIFF(quarter, @RefDate, @InputDate), @RefDate)\n\
  \    END\nEND;\nGO\n```\n\n以下代码演示了如何将 `DateRound()` 函数与表示 2009 年 8 月 20 日上午 08:48\
  \ 的日期/时间值一起使用：\n\n```sql\nSELECT\n    dbo.DateRound('Day', '20090820 08:48'),\n\
  \    dbo.DateRound('Month', '20090820 08:48'),\n    dbo.DateRound('Year', '20090820\
  \ 08:48'),\n    dbo.DateRound('Week', '20090820 08:48'),\n    dbo.DateRound('Quarter',\
  \ '20090820 08:48');\n```\n\n此代码返回以下结果：\n\n```\n2009-08-20 00:00:00.000\n2009-08-01\
  \ 00:00:00.000\n2009-01-01 00:00:00.000\n2009-08-17 00:00:00.000\n2009-07-01 00:00:00.000\n\
  ```\n\n`注意`：具有 Oracle 数据库经验的开发人员可能熟悉 Oracle PL/SQL 的 `TRUNC()` 方法，它提供了与此处描述的 `DateRound`\
  \ 函数类似的功能。\n\n### 查找相对日期\n\n一旦你理解了上一节描述的基本截断模式，就可以修改它来得出任何日期组合。例如，假设你想找到该月的最后一天。一种方法是找到该月的第一天，增加一个月，然后减去一天：\n\
  \n```sql\nSELECT DATEADD(day, -1, DATEADD(month, DATEDIFF(month, '19000101', @InputDate)\
  \ + 1, '19000101'));\n```\n\n另一种查找该月最后一天的方法是将整个月份添加到本身是某月最后一天的参考日期上。例如，你可以使用参考日期\
  \ `190012-31`：\n\n```sql\nSELECT DATEADD(month, DATEDIFF(month, '19001231', @InputDate),\
  \ '19001231');\n```\n\n请注意，使用这种方法时，选择一个有 31 天的月份非常重要；此 T-SQL 所做的是在输入日期所在的月份中找到与参考日期相同的月份日期。但是，如果该月份少于\
  \ 31 天，SQL Server 会自动向下舍入到最近的日期，该日期将代表所讨论月份的实际最后日期。如果我使用 2 月 28 日而不是 12 月 31 日作为参考日期，那么每次运行此查询的输出都将是该月的\
  \ 28 号。\n\n其他更有趣的组合也是可能的。例如，许多应用程序中的一个常见需求是根据“从上周五到今天之间的每一天”等时间段执行计算。通过稍微修改截断模式，查找“上周五”是相当简单的——主要技巧是选择合适的参考日期。在这种情况下，要找到与提供的输入日期最近的星期五，参考日期应该是*任何*一个星期五。我们知道任何星期五与任何其他星期五之间的天数都能被\
  \ 7 整除，我们可以利用这一知识将当前日期截断到最近的星期五。\n\n以下 T-SQL 查找参考星期五（2000 年 1 月 7 日）与输入日期（2009 年\
  \ 2 月 9 日）之间的天数：\n\n```sql\nDECLARE @Friday date = '20000107';\nSELECT DATEDIFF(day,\
  \ @Friday, '20090209');\n```\n\n结果是 `3321`，这当然是一个整数。利用 SQL Server 的整数数学特性，将结果除以\
  \ 7，然后再乘以 7，就会将其向下舍入到能被 7 整除的最近数字 `3318`：\n\n```sql\nSELECT (3321 / 7) * 7;\n```\n\
  \n\n## 处理时间数据\n\n将 3318 天添加到原始参考日期 2000 年 1 月 7 日，即可得到所需输出，即 2009 年 2 月 9 日之前的“最后一个星期五”，该日期为\
  \ 2009 年 2 月 6 日：\n\n```sql\nSELECT DATEADD(day, 3318, '20000107')\n```\n\n与上一个示例类似，可以通过将所有内容合并到一行来简化（并明确）表达：\n\
  \n```sql\nDECLARE @InputDate date = '20090209';\nDECLARE @Friday date = '20000107';\n\
  SELECT DATEADD(day, ((DATEDIFF(day, @Friday, @InputDate) / 7) * 7), @Friday);\n\
  ```\n\n还可以对最后一条语句进行进一步简化。目前，内部`DATEDIFF`的结果除以 7 以计算整周数，然后再乘以 7 以生成使用`DATEADD`方法添加的等效天数。但是，如果您可以直接指定以周为单位的添加时间量，则无需执行乘法转换为天，如下所示：\n\
  \n```sql\nSELECT DATEADD(week, (DATEDIFF(day, @Friday, @InputDate) / 7), @Friday);\n\
  ```\n\n请注意，在输入日期是星期五的情况下，这些示例将返回输入日期本身。如果您希望每次都返回“上一个”星期五，而绝不返回输入日期本身——即使输入日期就是星期五——则需要进行小幅修改。为此，您必须使用两个参考日期：一个代表任意已知的星期五，另一个代表该参考星期五之后一周内的任意一天（为简单起见，我推荐第二天）。通过计算这第二个参考日期与输入日期之间经过的天数，如果输入日期是星期五，四舍五入后的周数将减少一周，这意味着结果将始终是上一个星期五。以下\
  \ T-SQL 代码针对给定输入日期实现了这一点：\n\n```sql\nDECLARE @InputDate date = '20100423';\nDECLARE\
  \ @Friday date = '20000107';\nDECLARE @Saturday date = DATEADD(day, 1, @Friday);\n\
  SELECT DATEADD(week, (DATEDIFF(day, @Saturday, @InputDate) / 7), @Friday);\n```\n\
  \n通过使用此模式并切换参考日期，您可以轻松地根据输入日期找到任意星期几的“上一个”日期。要找到给定日期的“下一个”日期（例如“下一个星期五”），只需在将内部计算结果添加到参考日期之前，为其加上一周：\n\
  \n```sql\nDECLARE @InputDate datetime = GETDATE();\nDECLARE @Friday datetime = '2000-01-07';\n\
  SELECT DATEADD(week, (DATEDIFF(day, @Friday, @InputDate) / 7) +1, @Friday);\n```\n\
  \n作为日期/时间计算的最后一个示例，这里有一个稍微复杂些的需求。假设您正在访问波士顿地区，并想参加新英格兰 SQL Server 用户组的会议。该小组在每月的第二个星期四举行会议。给定一个输入日期，您如何找到下一次会议的日期？\n\
  \n回答这个问题需要对问题进行一点思考。第二个星期四可能出现的最早日期是当月的第一天是星期四。在这种情况下，第二个星期四出现在当月的第八天。第二个星期四可能出现的最晚日期是当月的第一天是星期五，此时第二个星期四是\
  \ 14 号。因此，对于任何给定月份，截至并包括 14 号的“上一个星期四”（换句话说，最近的星期四）将是该月的第二个星期四。以下 T-SQL 使用了这种方法：\n\
  \n```sql\nDECLARE @InputDate date = '20100101';\nDECLARE @Thursday date = '20000914';\n\
  DECLARE @FourteenthOfMonth date = DATEADD(month, DATEDIFF(month, @Thursday, @InputDate),\
  \ @Thursday);\nSELECT DATEADD(week, (DATEDIFF(day, @Thursday, @FourteenthOfMonth)\
  \ / 7), @Thursday);\n```\n\n当然，这并不是在寻找*下一次*会议；它找到的是输入日期所在月份的会议。要找到下一次会议，除了观察第二个星期四的特性外，还需要使用`CASE`表达式：如果某个月的第二个星期四落在\
  \ 8 号、9 号或 10 号，那么下个月的第二个星期四就在五周之后。否则，下个月的第二个星期四就在四周之后。\n\n要找出给定日期/时间实例所代表的月份中的日期，请使用\
  \ T-SQL 的`DATEPART`函数，该函数接受与`DATEADD`和`DATEDIFF`相同的日期粒度输入。以下 T-SQL 结合了所有这些技术，根据输入日期找出新英格兰\
  \ SQL Server 用户组会议的下一次日期：\n\n```sql\nDECLARE @InputDate date = GETDATE();\nDECLARE\
  \ @Thursday date = '20000914';\nDECLARE @FourteenthOfMonth date = DATEADD(month,\
  \ DATEDIFF(month, @Thursday, @InputDate), @Thursday);\nDECLARE @SecondThursday date\
  \ = DATEADD(week, (DATEDIFF(day, @Thursday, @FourteenthOfMonth) / 7), @Thursday);\n\
  SELECT\n  CASE\n    WHEN @InputDate <= @SecondThursday\n      THEN @SecondThursday\n\
  \    ELSE\n      DATEADD(\n        week,\n        CASE\n          WHEN DATEPART(day,\
  \ @SecondThursday) <= 10 THEN 5\n          ELSE 4\n        END,\n        @SecondThursday)\n\
  \  END;\n```\n\n查找诸如某月第二个星期四之类的复杂日期并不是一个非常常见的需求，除非您正在编写日程安排应用程序。更常见的需求是类似于“查找今天的所有记录”这样的查询。结合上一节讨论的范围技术和此处展示的日期/时间计算，可以轻松设计出既高效又能动态查询所需时间段的存储过程。\n\
  \n### 生日蛋糕上有多少根蜡烛？\n\n作为 T-SQL 中日期/时间计算的最后一个示例，考虑一个看似简单的任务：计算截至今天您是多少岁。显而易见的答案当然是以下语句：\n\
  \n```sql\nSELECT DATEDIFF(year, @YourBirthday, GETDATE());\n```\n\n不幸的是，这个答案——取决于当前日期——是错误的。考虑一个出生于\
  \ 1965 年 3 月 25 日的人。在 2010 年 3 月 25 日，应该庆祝这个人的 45 岁生日。然而，根据 SQL Server，这个人在 2010\
  \ 年 3 月 24 日就已经是 45 岁了：\n\n```sql\nSELECT DATEDIFF(year, '19650325', '20100324');\n\
  ```\n\n事实上，根据 SQL Server，这个人在整个 2010 年，从 1 月 1 日开始，都是 45 岁。新年快乐加上生日快乐，多亏了 SQL Server\
  \ 的魔力？可能并非如此；这种差异源于 SQL Server 计算日期差异的方式。它只考虑正在比较的日期/时间组件，任何更小的组件都被截断。这一特性使得前面的日期/时间截断示例能够工作，但会使年龄计算失败，因为在比较年份时，天数和月份没有被考虑进去。\n\
  \n为了解决这个问题，必须添加一个`CASE`表达式，如果当前日期的月和日小于输入日期的月和日——换句话说，如果该人在当前年份尚未庆祝其生日——则减去一岁。以下\
  \ T-SQL 既实现了主要目标，还有一个额外好处，即也考虑到了闰年：\n\n```sql\nSELECT\n  DATEDIFF(YEAR, @YourBirthday,\
  \ GETDATE()) -\n  CASE\n    WHEN 100 * MONTH(GETDATE()) + DAY(GETDATE())\n     \
  \  < 100 * MONTH(@YourBirthday) + DAY(@YourBirthday) THEN 1\n    ELSE 0\n  END;\n\
  ```\n\n请注意，此 T-SQL 使用了`MONTH`和`DAY`函数，它们分别是`DATEPART(month, <date>)`和`DATEPART(day,\
  \ <date>)`的简写形式。\n\n### 使用日历表定义周期\n\n考虑到为了高效查询数据而进行日期/时间计算的复杂性，在某些情况下寻求替代技术是合理的。在大多数情况下，使用前一节讨论的日期/时间计算和范围匹配技术将产生最佳性能。\n\
  \n\n然而，在某些情况下，用户交互的便利性可能比性能更重要。很可能是那些更具技术背景的业务用户会请求直接访问以查询关键业务数据库，但他们精通 T-SQL 足以完成复杂的日期/时间计算的可能性非常低。\n\
  \n在这些情况下，以及本节将讨论的其他一些情况下，预定义将被查询的时间段是有意义的。可以创建一个查找表，允许用户轻松地从当前日期派生任意数量的命名周期。这些表，不足为奇地，被称为\
  \ `calendar tables`，它们可能非常有用。\n\n基本的日历表有一个充当主键的日期列，以及几个描述时间段的列。日历覆盖的日期范围内的每个日期都将在表中插入一行，可用于引用所有关联的时间段。一个标准示例可以使用以下代码清单创建：\n\
  \n```sql\nCREATE TABLE Calendar\n(\n    DateKey date PRIMARY KEY,\n    DayOfWeek\
  \ tinyint,\n    DayName nvarchar(10),\n    DayOfMonth tinyint,\n    DayOfYear smallint,\n\
  \    WeekOfYear tinyint,\n    MonthNumber tinyint,\n    MonthName nvarchar(10),\n\
  \    Quarter tinyint,\n    Year smallint\n);\nGO\n\nSET NOCOUNT ON;\nDECLARE @Date\
  \ date = '19900101';\nWHILE @Date < '20250101'\nBEGIN\n    INSERT INTO Calendar\n\
  \    SELECT\n        @Date AS DateKey,\n        DATEPART(dw, @Date) AS DayOfWeek,\n\
  \        DATENAME(dw, @Date) AS DayName,\n        DATEPART(dd, @Date) AS DayOfMonth,\n\
  \        DATEPART(dy, @Date) AS DayOfYear,\n        DATEPART(ww, @Date) as WeekOfYear,\n\
  \        DATEPART(mm, @Date) AS MonthNumber,\n        DATENAME(mm, @Date) AS MonthName,\n\
  \        DATEPART(qq, @Date) AS Quarter,\n        YEAR(@Date) AS Year;\n    SET\
  \ @Date = DATEADD(d, 1, @Date);\nEND\nGO\n```\n\n此表为 1990 年 1 月 1 日至 2025 年 1 月\
  \ 1 日之间的每一天创建一行。我建议回溯到您将处理的数据所涉及的最早日期，并至少向前展望十年。虽然这听起来可能会产生很多行，但请记住，每十年的数据只需要大约\
  \ 3,652 行。考虑到数据库表中包含数亿行的情况很常见，这么小的数字应该很容易管理。\n\n在 `Calendar` 表中定义的列代表用户希望查找和处理的时间段。由于添加额外列不会为表增加太多空间，因此偏向于过多而不是过少可能不是个坏主意。例如，您可能希望添加列来记录财政年度、周开始和结束日期或节假日。但是，请记住，额外的列可能会使技术背景较弱的用户感到困惑。\n\
  \n一旦创建了日历表，它就可以用于上一节涵盖的许多相同计算，以及许多其他用途。首先，让我们尝试查找关于“今日行”的信息：\n\n```sql\nSELECT *\n\
  FROM Calendar AS Today\nWHERE Today.DateKey = CAST(GETDATE() AS date);\n```\n\n\
  一旦确定了“今天”，就很容易找到其他日期。例如，“上周五”是 `DateKey` 值小于今天的最接近的星期五：\n\n```sql\nSELECT TOP(1)\
  \ *\nFROM Calendar LastFriday\nWHERE\n    LastFriday.DateKey < GETDATE()\n    AND\
  \ LastFriday.DayOfWeek = 6\nORDER BY DateKey DESC;\n```\n\n请注意，在创建日历时我选择了默认设置，将星期日作为一周的第一天，因此对于任何星期五，`DayOfWeek`\
  \ 都将为 6。如果您选择了一周的第一天不同，您将必须更改指定的 `DayOfWeek` 值。当然，您也可以使用 `DayName` 列进行过滤，这样用户就不必知道该使用哪个数字；他们可以基于名称进行查询。`DayName`\
  \ 列是使用 `DATENAME` 函数填充的，该函数返回表示日期名称的本地化字符串（即，英语中的“Friday”）。请记住，在区域设置不同的服务器上运行此代码可能会产生不同的结果。\n\
  \n由于日历表包含定义各种周期的列，例如当前年份和一年中的第几周，因此很容易回答诸如“本周发生了什么？”之类的问题。要查找“本周”的第一天和最后一天，可以使用以下查询：\n\
  \n```sql\nSELECT\n    MIN(ThisWeek.DateKey) AS FirstDayOfWeek,\n    MAX(ThisWeek.DateKey)\
  \ AS LastDayOfWeek\nFROM Calendar AS Today\nJOIN Calendar AS ThisWeek ON\n    ThisWeek.Year\
  \ = Today.Year\n    AND ThisWeek.WeekOfYear = Today.WeekOfYear\nWHERE\n    Today.DateKey\
  \ = CAST(GETDATE() AS date);\n```\n\n一个类似的问题可能涉及相邻的周。例如，您可能希望确定“上周的星期五”。以下查询是此操作的首次尝试：\n\
  \n```sql\nSELECT FridayLastWeek.*\nFROM Calendar AS Today\nJOIN Calendar AS FridayLastWeek\
  \ ON\n    Today.Year = FridayLastWeek.Year\n    AND Today.WeekOfYear - 1 = FridayLastWeek.WeekOfYear\n\
  WHERE\n    Today.DateKey = CAST(GETDATE() AS date)\n    AND FridayLastWeek.DayName\
  \ = 'Friday';\n```\n\n不幸的是，这段代码存在一个边界问题，在某些情况下（例如在新年伊始附近）会导致其功能部分失效。问题在于，`WeekOfYear`\
  \ 值在新年的第一天重置为 1，无论它是星期几。该查询还在 `Year` 列上进行联接，使情况变得加倍复杂。\n\n使用 `CASE` 表达式解决这个问题可能是可行的，但会很困难，而日历表的目标是简化事情。一个好的替代解决方案是添加一个\
  \ `WeekNumber` 列，该列在整个日历所代表的时间段内为每一周连续编号。执行此操作的第一步是修改表并添加列，如下面的 T-SQL 所示：\n\n```sql\n\
  ALTER TABLE Calendar\nADD WeekNumber int NULL;\n```\n\n接下来，可以使用以下 T-SQL 创建一个包含所有周编号的临时表：\n\
  \n```sql\nWITH StartOfWeek (DateKey) AS\n(\n    SELECT MIN(DateKey)\n    FROM Calendar\n\
  \    UNION\n    SELECT DateKey\n    FROM Calendar\n    WHERE DayOfWeek = 1\n),\n\
  EndOfWeek (DateKey) AS\n(\n    SELECT DateKey\n    FROM Calendar\n    WHERE DayOfWeek\
  \ = 7\n    UNION\n    SELECT MAX(DateKey)\n    FROM Calendar\n)\nSELECT\n    StartOfWeek.DateKey\
  \ AS StartDate,\n    (\n        SELECT TOP(1)\n        EndOfWeek.DateKey\n     \
  \   FROM EndOfWeek\n        WHERE EndOfWeek.DateKey >= StartOfWeek.DateKey\n   \
  \     ORDER BY EndOfWeek.DateKey\n    ) AS EndDate,\n    ROW_NUMBER() OVER (ORDER\
  \ BY StartOfWeek.DateKey) AS WeekNumber\nINTO #WeekNumbers\nFROM StartOfWeek;\n\
  ```\n\n这段 T-SQL 的逻辑需要稍作解释。`StartOfWeek` 公用表表达式 (CTE) 从日历表中选择一周的第一天（`DayOfWeek =\
  \ 1`）的所有日期，此外还选择表中的最早日期（以防该日不是一周的第一天）。`EndOfWeek` CTE 使用类似的逻辑来查找每周的最后一天，以及表中的最后一天。`SELECT`\
  \ 列表包括 `StartOfWeek` CTE 每一行所代表的 `DateKey`、`EndOfWeek` CTE 中大于 `StartOfWeek` 值的最小\
  \ `DateKey` 值（即该周的结束日期），以及使用 `ROW_NUMBER` 函数生成的周编号。查询的结果被插入到一个名为 `#WeekNumbers`\
  \ 的临时表中。\n\n一旦运行了此 T-SQL，就可以使用以下代码填充日历表的新列（并将其设置为不可为 `NULL`）：\n\n```sql\nUPDATE\
  \ Calendar\nSET WeekNumber =\n(\n    SELECT WN.WeekNumber\n    FROM #WeekNumbers\
  \ AS WN\n    WHERE\n        Calendar.DateKey BETWEEN WN.StartDate AND WN.EndDate\n\
  );\n\nALTER TABLE Calendar\nALTER COLUMN WeekNumber int NOT NULL;\n```\n\n现在，使用新的\
  \ `WeekNumber` 列，查找“上周的星期五”变得几乎轻而易举：\n\n```sql\nSELECT FridayLastWeek.*\nFROM Calendar\
  \ AS Today\nJOIN Calendar AS FridayLastWeek ON\n    Today.WeekNumber = FridayLastWeek.WeekNumber\
  \ + 1\nWHERE\n    Today.DateKey = CAST(GETDATE() AS date)\n    AND FridayLastWeek.DayName\
  \ = 'Friday';\n```\n\n\n\n# 第 11 章 处理时间数据\n\n当然，一个关键问题仍然存在：找出新英格兰 SQL Server 用户组下一次会议的日期，该会议在每月的第二个星期四举行。有几种方法可以利用日历来解决这个难题。第一种方法，当然是直接查询日历表。以下\
  \ T-SQL 代码展示了一种实现方式：\n\n```sql\nWITH NextTwoMonths AS\n(\n    SELECT\n        Year,\n\
  \        MonthNumber\n    FROM Calendar\n    WHERE\n        DateKey IN (\n     \
  \       CAST(GETDATE() AS date),\n            DATEADD(month, 1, CAST(GETDATE() AS\
  \ date)))\n),\nNumberedThursdays AS\n(\n    SELECT\n        Thursdays.*,\n     \
  \   ROW_NUMBER() OVER (PARTITION BY Thursdays.MonthNumber ORDER BY DateKey) AS ThursdayNumber\n\
  \    FROM Calendar Thursdays\n    JOIN NextTwoMonths ON\n        NextTwoMonths.Year\
  \ = Thursdays.Year\n        AND NextTwoMonths.MonthNumber = Thursdays.MonthNumber\n\
  \    WHERE\n        Thursdays.DayName = 'Thursday'\n)\nSELECT TOP(1)\n    NumberedThursdays.*\n\
  FROM NumberedThursdays\nWHERE\n    NumberedThursdays.DateKey >= CAST(GETDATE() AS\
  \ date)\n    AND NumberedThursdays.ThursdayNumber = 2\nORDER BY NumberedThursdays.DateKey;\n\
  ```\n\n如果你觉得这段 T-SQL 代码有点令人困惑，别担心！它是这样工作的：首先，代码使用 `NextTwoMonths` 公共表表达式 (CTE) 找出当前月份和下个月的年份与月份。接着，在\
  \ `NumberedThursdays` CTE 中，这两个月中的每个星期四都被识别出来并按顺序编号。最后，返回日期在“今天”或之后、且编号为 2（表示是第二个星期四）的最早的星期四。\n\
  \n幸运的是，像这样复杂的 T-SQL 代码通常可以通过日历表变得过时。这里演示的日历表已经包含了各种通用的命名日期和时间段。当然，没有理由阻止你添加自己的列，以创建符合你业务需求的特定命名时间段。如果有一个预先填充的列来表示用户组会议日，那么询问下一个第二个星期四就会容易得多。\n\
  \n## 计算工作日\n\n一个更常见的需求是弄清楚哪些天是工作日。这对于确定工作时间表、与服务水平协议相关的度量以及其他常见的业务需求至关重要。虽然你可以简单地数出周末天数，但这将无法考虑国家法定假日、你的企业可能遵守的州和地方假日，以及可能特定于你公司的团队建设日或其他休假。\n\
  \n为了同时解决所有这些问题，只需在表中添加一个名为 `HolidayDescription` 的列：\n\n```sql\nALTER TABLE Calendar\n\
  ADD HolidayDescription varchar(50) NULL;\n```\n\n这个列可以为任何假日填充，无论是国家的、地方的、公司特有的，还是周末日。\n\
  \n如果你不需要为每个假日记录完整的描述，那么你可以改用一组简单的标志值来填充该列，代表不同类型的假日。这使得回答诸如“我们这个月有多少个工作日？”这样的问题变得容易。以下\
  \ T-SQL 回答了这个问题：\n\n```sql\nSELECT COUNT(*)\nFROM Calendar AS ThisMonth\nWHERE\n\
  \    HolidayDescription IS NULL\n    AND EXISTS\n    (\n        SELECT *\n     \
  \   FROM Calendar AS Today\n        WHERE\n            Today.DateKey = CAST(GETDATE()\
  \ as date)\n            AND Today.Year = ThisMonth.Year\n            AND Today.MonthNumber\
  \ = ThisMonth.MonthNumber\n    );\n```\n\n此查询统计当前月份中未被标记为假日的天数。如果你只想计算工作日（周一至周五），可以在\
  \ `WHERE` 子句中添加一个额外条件，以排除 `DayName` 为 `Saturday` 或 `Sunday` 的行。\n\n## 处理季节性时段\n\n\
  如果你的业务受季节影响，可以尝试添加一个列，帮助你识别各种季节性时段，例如“早春”、“仲夏”或“节假日季”，以协助基于这些时段的分析查询。或者，你可能会发现需要几个额外的列来反映对你的查询重要的所有时间段。\n\
  \n\n\n# 第十一章：处理时间数据\n\n使用日历表可以让面向时间段的查询更容易执行，但要记住它们需要持续维护。务必记录流程，以保持已定义时间段的最新状态，并向日历中添加额外的日期，以确保你的数据不会超出可用日期的范围。你可能希望每年的第一天增加一年的日期，以维持一个恒定的十年的缓冲期。\n\
  \n## 处理时区\n\n进入全球经济的后果之一是，与不同地区的人们开展业务带来的复杂性。抛开语言障碍不谈，最重要的问题之一源于时差问题。本质上，任何需要与同时身处不同地区的人们打交道的系统，都必须能够正确处理这样一个事实：那些人的手表设置并不都相同。\n\
  \n1884 年，在华盛顿特区召开的国际子午线会议上，与会代表们定义了 24 个标准时区。每个时区代表一个小时的偏移量，该偏移量是相对于格林威治（英国）所在的时区——本初子午线——来确定的。这个中心时区被称为`GMT`（格林威治标准时间）或`UTC`（Universel\
  \ Temps Coordonné，法语“协调世界时”）。标准时区如图 11-3 所示。\n\n*图 11-3. 世界标准时区*\n\n定义这些标准时区的关键好处在于，如果两个人知道对方所在时区的偏移量，并且他们的时钟都与同一个`UTC`时钟同步，那么无论他们在地球上的哪个位置，都可以确定对方的时间。\n\
  \n在我写下这些文字时，英格兰刚过上午 8:15，但由于我们目前使用的是英国夏令时（`BST`），这个时间代表的是`UTC + 1 小时`。北半球许多其他实行夏令时的国家目前也比其正常时间提前\
  \ 1 小时。\n\n例如，美国东部通常是`UTC – 5`，但现在实际上是`UTC – 4`，即凌晨 3:15。\n\n**注意：** 不同国家切换到和退出夏令时的时间不同：例如，英国和智利本土之间的时间差可能是三、四或五小时，具体取决于一年中的时间。\n\
  \n在世界其他地方，我可以立即推断出泰国曼谷的当地时间是下午 2:15，该地使用`UTC + 7`的偏移量。不幸的是，并非世界上所有国家都使用标准时区。例如，印度孟买现在是下午\
  \ 12:45；印度使用非标准偏移量`UTC + 5.5`。事实证明，时区既是关于政治边界的问题，也是关于在全球保持正确时间的问题。\n\n编写特定于时区的软件时，有三个核心问题需要担心：\n\
  \n当用户看到应用程序呈现的数据时，除非另有说明，否则任何日期都应以用户的当地时区（如果已知）呈现。在另有说明的情况下，数据通常应以`UTC`呈现，以避免混淆。\n\
  \n当用户提交新数据或更新现有数据，从而更改数据库中的日期/时间数据时，数据库应将数据从用户的时区转换为标准时区（同样，通常是`UTC`）。数据库中的所有日期/时间数据都应标准化到特定时区，以便基于已知偏移量，可以轻松地将其转换为用户的当地时间。为了更好地控制和审计，存储事件发生时的原始时区和当地时间也很重要。有各种方法可以对此类数据建模，我稍后会讨论。鉴于夏令时的开始和结束日期偶尔会发生变化，如果时间仅以`UTC`存储或仅带有偏移量，可能很难从中推导出原始的当地时间。如果你需要根据事件发生的当地时间进行报告或查询，除了将时间标准化存储为`UTC`外，还请考虑将原始时间按原样持久化。\n\
  \n当用户提出一个基于时间的问题时，重要的是要决定用于提问的日期是按原样使用（可能是用户的当地时间），还是先转换为标准时区。考虑一个在纽约的用户提出这样的问题：“今天下午\
  \ 2:00 到 5:00 之间发生了什么？”如果数据库中的日期/时间数据都基于`UTC`时区，就不清楚用户指的是东部标准时间（`EST`）的下午 2:00 到\
  \ 5:00，还是`UTC`的下午 2:00 到 5:00——这可是非常不同的问题！这里实际的需求会根据业务需求而变化，但最好在任何可能出现此问题的界面上添加注释，以提醒用户注意。\n\
  \n处理这些问题实际上并不太难，但它确实需要相当的条理性和对细节的关注，更不用说还需要一些关于不同时区偏移和夏令时变化的数据了。尽可能多地在应用层处理这些工作是个好主意，但部分（或有时全部）责任自然也会延伸到数据层。那么，我们该如何在数据库中处理多时区问题呢？在接下来的章节中，我将讨论两种处理此问题的可能模型。\n\
  \n### 存储 UTC 时间\n\n为全球应用程序存储时间数据的基本技术是：维护系统中每个用户的时区设置，以便在他们登录时，你可以知道应该将其数据视为源自哪个时区。每当需要向用户显示日期和时间时，将其转换为用户的当地时间；每当用户输入日期或时间到应用程序中用于搜索或作为数据点时，在数据进入数据库之前将其转换为`UTC`。\n\
  \n这种方法需要对数据库代码进行一些更改。例如，每当使用`GETDATE()`函数插入数据时，应改用`GETUTCDATE()`函数，该函数返回格林威治的当前日期/时间。然而，这条规则仅无条件适用于插入操作；如果你正在将数据库从本地时间转换为`UTC`，盲目地进行从`GETDATE()`到`GETUTCDATE()`的查找/替换式转换可能不会产生预期的结果。例如，考虑下面这个存储过程，它从`AdventureWorks`数据库的`Sales.SalesOrderHeader`表中选择“今日”订单：\n\
  \n```sql\nCREATE PROCEDURE GetTodaysOrders\nAS\nBEGIN\n    SET NOCOUNT ON\n\n  \
  \  SELECT\n        OrderDate,\n        SalesOrderNumber,\n        AccountNumber,\n\
  \        TotalDue\n    FROM Sales.SalesOrderHeader\n    WHERE\n        CAST(OrderDate\
  \ as date) = CAST(GETDATE() AS date)\nEND;\n```\n\n假设`Sales.SalesOrderHeader`表包含定义为`UTC`的日期/时间值，将此代码中的`GETDATE()`调用更改为`GETUTCDATE()`似乎是自然而然的下一步。但是，如果你的应用程序托管在纽约，并且你的大多数用户习惯于看到和处理与东部标准时间（`EST`）同步的时间呢？在这种情况下，“今日订单”的定义就变得模糊了，取决于“今天”是按`EST`还是`UTC`来衡量。尽管在大多数情况下`CAST(GETDATE()\
  \ AS date)`会返回与`CAST(GETUTCDATE() AS date)`相同的结果，但每天有 4 个小时（有时是 5 个小时，取决于夏令时设置），按`UTC`衡量的日期会比按`EST`衡量的日期提前一天。如果在此查询在`EST`时间晚上\
  \ 7:00 或 8:00 之后（同样，取决于一年中的时间）被调用，`GETUTCDATE()`将返回一个对美国东部的人来说是“明天”的日期/时间。时间部分将被截断，查询根本不会返回任何“今日”数据——至少如果你期望按`EST`规则工作的话是不会的。\n\
  \n\n\n要纠正这些问题，请使用 `GETUTCDATE` 查找格林尼治的当前日期/时间，并将其转换为用户的本地时间。转换为本地时间后，*再*截断时间部分。最后，将日期转换回\
  \ UTC，并使用得到的日期/时间来搜索 UTC 值表。根据您是否已在应用程序代码中处理，可能还需要对 `SELECT` 列表中的 `OrderDate` 列进行进一步修改，以便以用户的本地时区返回数据。\n\
  \n每当您的应用程序需要处理相对日期时，例如“今天”、“明天”或“上周”，您应始终使其对提交查询的用户的时区敏感，并在查询中处理与 UTC 的来回转换。\n\n\
  ## 使用 `datetimeoffset` 类型\n\n新的 `datetimeoffset` 数据类型是 SQL Server 2008 中功能最全的时间数据类型。它不仅匹配\
  \ `datetime2` 数据类型的精度和范围，还允许您指定一个偏移量，表示给定时间值与 UTC 之间的差异。因此，单个值可以包含表达本地时间和相应 UTC\
  \ 时间所需的所有信息。\n\n乍看之下，这似乎是解决跨不同时区处理数据问题的理想方案。对 `datetimeoffset` 值的计算会同时考虑时间成分和偏移量。\n\
  \n考虑以下示例：\n\n```sql\nDECLARE @LondonMidday datetimeoffset = '2009-07-15 12:00 +0:00';\n\
  DECLARE @MoscowMidday datetimeoffset = '2009-07-15 12:00 +3:00';\nSELECT DATEDIFF(hour,\
  \ @LondonMidday, @MoscowMidday);\n```\n\n莫斯科的时区比伦敦早 3 小时，因此此代码的结果是 `-3`。换句话说，莫斯科的中午发生在伦敦中午之前\
  \ 3 小时。\n\n使用 `datetimeoffset` 可以轻松比较中央存储的、表示不同区域存储时间的值。考虑以下：\n\n```sql\nCREATE\
  \ TABLE TimeAndPlace (\n    Place varchar(32),\n    Time datetimeoffset\n);\nGO\n\
  \nINSERT INTO TimeAndPlace (Place, Time) VALUES\n('London', '2009-07-15 08:15:00\
  \ +0:00'),\n('Paris', '2009-07-15 08:30:00 +1:00'),\n('Zurich', '2009-07-15 09:05:00\
  \ +2:00'),\n('Dubai', '2009-07-15 10:30:00 +3:00');\nGO\n```\n\n要找出哪个事件最先发生，我们可以在\
  \ `SELECT` 查询中使用简单的 `ORDER BY` 语句——输出将根据其偏移量对结果进行排序：\n\n```sql\nSELECT\n    Place,\n\
  \    Time\nFROM TimeAndPlace\nWHERE Time BETWEEN '20090715 07:30' AND '20090715\
  \ 08:30'\nORDER BY Time ASC;\n```\n\n结果如下：\n\n```\nPlace       Time\nParis     \
  \  2009-07-15 08:30:00.0000000 +01:00\nDubai       2009-07-15 10:30:00.0000000 +03:00\n\
  London      2009-07-15 08:15:00.0000000 +00:00\n```\n\n请注意，行是根据其发生的 UTC 时间而非本地时间进行过滤和排序的。以\
  \ UTC 时间计，苏黎世的时间对应于上午 7:05，这超出了查询条件的范围，因此未包含在结果中。迪拜和巴黎都对应于上午 7:30，而伦敦对应于上午 8:15。\n\
  \n### 局限性与时区感知\n\n`datetimeoffset` 类型具有许多优点，如本文所示，但重要的是要注意它并不“感知时区”——它只是基于与一个一致定义（UTC）的时间的偏移量进行计算。应用程序仍然需要告诉数据库时间定义所在时区的正确偏移量。\n\
  \n许多操作系统允许用户从地点列表中选择操作时区。例如，我的操作系统报告我当前的时区为“(GMT) 格林尼治标准时间 : 都柏林、爱丁堡、里斯本、伦敦”。向用户提供此类地点选择并不困难，并将相应的时区持久化在数据库中，以便可以使用正确的偏移量创建\
  \ `datetimeoffset` 值。此类信息可以从基于系统注册表的查找表中提取，较新的操作系统可以识别并正确处理夏令时，在需要时自动调整系统时钟。\n\n\
  例如，在前端的 .NET 应用程序中，您可以使用 `TimeZoneInfo.Local.Id` 检索用户本地时区的 ID，然后使用 `TimeZoneInfo.FindSystemTimeZoneById`\
  \ 方法将其转换为 `TimeZoneInfo` 对象。每个 `TimeZoneInfo` 都有一个关联的与 UTC 的偏移量，可以通过 `BaseUtcOffset`\
  \ 属性访问，以获取数据库中相应 `datetimeoffset` 实例的正确偏移量。\n\n然而，即使这可以解决在不同时区*创建*时间数据的问题，在对这些数据进行计算时仍然会出现问题。例如，假设您想知道\
  \ 2010 年 3 月 27 日凌晨 1:30 给定时间之后 24 小时在伦敦的时间：\n\n```sql\nDECLARE @LondonTime datetimeoffset\
  \ = '20100327 01:30:00 +0:00';\nSELECT DATEADD(hour, 24, @LondonTime);\n```\n\n\
  此代码将给出结果 `2010-03-28 01:30:00.0000000 +00:00`，这在技术上是正确的——这是基于与提供的 `datetimeoffset`\
  \ 值相同的偏移量计算出的 24 小时后的时间。然而，在 3 月 28 日星期日凌晨 1:00，英国的时钟会拨快 1 小时至凌晨 2:00，以应对从 GMT 到\
  \ BST（英国夏令时）的变化。提供输入 24 小时后伦敦的实际时间将是 `2010-03-28 02:30:00.0000000 +01:00`。尽管这与获得的结果对应的\
  \ UTC 时间相同，但任何仅向用户显示本地时间的应用程序都会显得不正确。\n\n更重要的是，与给定时间区对应的偏移量并非一成不变。例如，在 2007 年 12\
  \ 月，总统乌戈·查韦斯为委内瑞拉创建了一个新的时区，将全国时间调慢半小时，使其比 UTC 晚 4.5 小时。您实现的任何从时区到偏移量的转换方案都需要考虑此类变化。\n\
  \n时区问题可能变得相当复杂，但可以通过仔细评估代码所需的更改，并在实施更改后更加仔细地测试来解决。\n\n### 一致性是关键\n\n需要记住的最重要的一点是，在处理时间标准化数据时，一致性是关键；数据修改例程中的任何漏洞插入了非标准化数据，都可能导致无法修复的歧义。一旦插入，就无法询问数据库某个时间应该是\
  \ UTC 还是本地时区。\n\n## 处理时间间隔\n\n现实世界中很少有事件发生在单一时刻。时间是连续的，任何给定的状态变化通常都有明确定义的开始时间和结束时间。例如，您可能会说，“我在\
  \ 10:00 从斯托克布里奇开车到波士顿。”但您并非真的只在 10:00 开车，除非您恰好拥有某种未来主义的时空折叠技术（这显然超出了本章的范围）。\n\n\n\
  # 第十一章  处理时序数据\n\n处理数据库时，我们通常只关注事件的开始或结束时间，而不是完整的区间。在处理订单的数据库中，一个名为 `OrderDate`\
  \ 的列几乎是无处不在的；但这一列只存储订单结束时的日期/时间——即用户提交最终请求的时刻。它没有反映用户浏览网站、填充购物车以及输入信用卡信息所花费的时间。同样，每次我们查看电子邮件时，都会看到一个\
  \ `Sent Date` 字段，它捕捉的是发件人点击发送按钮的时刻，但无助于识别该人思考或输入电子邮件所花费的时间，而这些活动构成了“发送”过程的一部分。\n\
  \n我们不常看到这种扩展数据的原因是，它通常是不必要的。对于大多数网站来说，从订单履行的角度来看，用户浏览了多长时间并不重要（尽管该信息可能对界面设计师有用，或在考虑整体客户体验时有用）。而且，一旦电子邮件发出，发送它花费了多少精力也不那么重要。重要的是，它已经发送（并随后被接收——这是许多电子邮件客户端不暴露的另一个数据点）。\n\
  \n尽管存在这些反面例子，但对于许多应用程序来说，完整的分析需要开始和结束时间。以你的工作经历为例。当你从一个工作换到另一个工作时，你携带了你在特定时期拥有特定头衔、获得特定薪酬或承担特定工作职责的区间。未能包含这些数据的开始和结束日期可能会带来一些有趣的挑战。\n\
  \n### 建模和查询连续区间\n\n如果一个表仅使用开始时间或结束时间（而不是两者）来表示区间，那么该表中的所有行都可以被视为属于一个跨越整个时间段的连续区间。在这种情况下，每一行都代表某个状态发生变化的子区间。让我们看一些简单的例子来阐明这一点。从以下表和行开始：\n\
  \n```sql\nCREATE TABLE JobHistory\n(\n    Company varchar(100),\n    Title varchar(100),\n\
  \    Pay decimal(9, 2),\n    StartDate date\n);\nGO\n\nINSERT INTO JobHistory\n\
  (\n    Company,\n    Title,\n    Pay,\n    StartDate\n) VALUES\n('Acme Corp', 'Programmer',\
  \ 50000.00, '19970626'),\n('Software Shop', 'Programmer/Analyst', 62000.00, '20001005'),\n\
  ('Better Place', 'Junior DBA', 82000.00, '20030108'),\n('Enterprise', 'Database\
  \ Developer', 95000.00, '20071114');\nGO\n```\n\n请注意，每个日期都使用了 `date` 类型。除了最糟糕的微观管理者之外，没人会在查看工作历史记录时，关心某人是在第一天上午\
  \ 8:00 还是 8:30 上班。重要的是表中的日期是开始*日期*。\n\n`JobHistory` 表中的数据很容易转换成更符合逻辑的格式；为了获得完整的子区间，我们可以假设每份工作的结束日期是下一份工作的开始日期。可以假设最后一份工作的结束日期是当前日期（或者，如果你愿意，可以是\
  \ `NULL`）。根据这些规则将其转换为基于开始/结束日期的报告，需要使用类似以下的 T-SQL：\n\n```sql\nSELECT\n    J1.*,\n\
  \    COALESCE((\n        SELECT MIN(J2.StartDate)\n        FROM JobHistory AS J2\n\
  \        WHERE J2.StartDate > J1.StartDate),\n        CAST(GETDATE() AS date)\n\
  \    ) AS EndDate\nFROM JobHistory AS J1;\n```\n\n这会产生以下结果（最终日期会变化，显示你运行查询的日期）：\n\
  \n| Company | Title | Pay | StartDate | EndDate |\n| :--- | :--- | :--- | :--- |\
  \ :--- |\n| Acme Corp | Programmer | 50000.00 | 1997-06-26 | 2000-10-05 |\n| Software\
  \ Shop | Programmer/Analyst | 62000.00 | 2000-10-05 | 2003-01-08 |\n| Better Place\
  \ | Junior DBA | 82000.00 | 2003-01-08 | 2007-11-14 |\n| Enterprise | Database Developer\
  \ | 95000.00 | 2007-11-14 | 2009-07-12 |\n\n外部查询获取工作数据和开始时间，子查询找到当前行开始日期之后的第一个开始日期。如果不存在这样的开始日期，则使用当前日期。当然，这里一个明显的主要问题是缺乏对工作历史中空档期的支持。例如，这个表可能掩盖了对象在\
  \ 2002 年 7 月被 `Software Shop` 解雇的事实。这就是我为什么强调以此方式建模的数据具有连续性。\n\n尽管缺乏对空档期的支持，让我们再尝试一些数据，看看会发生什么。随着对象职业生涯的发展，他在这些不同公司的任职期间获得了各种头衔和薪酬变化，这些变化体现在以下新增行中：\n\
  \n```sql\nINSERT INTO JobHistory\n(\n    Company,\n    Title,\n    Pay,\n    StartDate\n\
  ) VALUES\n('Acme Corp', 'Programmer', 55000.00, '19980901'),\n('Acme Corp', 'Programmer\
  \ 2', 58000.00, '19990901'),\n('Acme Corp', 'Programmer 3', 58000.00, '20000901'),\n\
  ('Software Shop', 'Programmer/Analyst', 62000.00, '20001005'),\n('Software Shop',\
  \ 'Programmer/Analyst', 67000.00, '20020101'),\n('Software Shop', 'Programmer',\
  \ 40000.00, '20020301'),\n('Better Place', 'Junior DBA', 84000.00, '20040601'),\n\
  ('Better Place', 'DBA', 87000.00, '20060601');\n```\n\n`JobHistory` 表中的数据（如表 11-1\
  \ 所示）展示了对象相对职业发展道路上的历程。几次加薪和头衔调整——包括一次没有相应加薪的头衔调整——以及一次不幸的降职和随之而来的薪资缩减，刚好发生在 2002\
  \ 年被解雇之前（如前所述，这个空档期无法在此表示）。幸运的是，在解雇期间努力学习后，对象以一份好得多的薪水，当然也是一条更令人满意的职业轨迹，卷土重来！\n\n\
  ### 表 11-1. 对象的完整工作历史，包含薪资和头衔调整\n\n| Company | Title | Pay | StartDate |\n| :---\
  \ | :--- | :--- | :--- |\n| Acme Corp | Programmer | 50000.00 | 1997-06-26 |\n|\
  \ Acme Corp | Programmer | 55000.00 | 1998-09-01 |\n| Acme Corp | Programmer 2 |\
  \ 58000.00 | 1999-09-01 |\n| Acme Corp | Programmer 3 | 58000.00 | 2000-09-01 |\n\
  | Software Shop | Programmer/Analyst | 62000.00 | 2000-10-05 |\n| Software Shop\
  \ | Programmer/Analyst | 62000.00 | 2000-10-05 |\n| Software Shop | Programmer/Analyst\
  \ | 67000.00 | 2002-01-01 |\n| Software Shop | Programmer | 40000.00 | 2002-03-01\
  \ |\n| Better Place | Junior DBA | 82000.00 | 2003-01-08 |\n| Better Place | Junior\
  \ DBA | 84000.00 | 2004-06-01 |\n| Better Place | DBA | 87000.00 | 2006-06-01 |\n\
  | Enterprise | Database Developer | 95000.00 | 2007-11-14 |\n\n忽略空档期，让我们看看如何使用这些数据来回答简历风格的问题。作为对先前查询的一个修改，假设我们想显示在每个公司的任职起始和结束日期，以及在该公司获得的最高工资，以及获得最高工资时所担任的头衔。\n\
  \n解决此类挑战通常采取的第一步是使用关联子查询来查找每组中具有最大值的行。在这种情况下，这意味着找出每家公司的最高薪酬：\n\n```sql\nSELECT\n\
  \    Pay,\n    Title\nFROM JobHistory AS J2\nWHERE\n    J2.Pay =\n    (\n      \
  \  SELECT MAX(Pay)\n        FROM JobHistory AS J3\n        WHERE J3.Company = J2.Company\n\
  \    );\n```\n\n必须对查找开始和结束日期的基本查询进行一项关键修改。由于现在每个工作有多行，必须使用 `MIN` 聚合函数来找到真正的开始日期，并且结束日期子查询必须修改为不仅查看日期变化，还要查看公司变化。以下\
  \ T-SQL 找到了每家公司的正确开始和结束日期：\n\n```sql\nSELECT\n    J1.Company,\n    MIN(J1.StartDate)\
  \ AS StartDate,\n    COALESCE((\n        SELECT MIN(J2.StartDate)\n        FROM\
  \ JobHistory AS J2\n        WHERE\n            J2.Company <> J1.Company\n      \
  \      AND J2.StartDate > MIN(J1.StartDate)),\n        CAST(GETDATE() AS date)\n\
  \    ) AS EndDate\nFROM JobHistory AS J1\nGROUP BY J1.Company\nORDER BY StartDate;\n\
  ```\n\n\n# 第十一章 - 处理时间数据\n\n快速提示：如果某人在离职一段时间后又被同一家公司重新雇佣，此查询将无法正常工作。为了解决这个问题，可以使用类似以下的查询，其中会检查确保“前一行”（基于\
  \ `StartDate`）不包含相同的公司名称（这意味着该人更换了公司）：\n\n```sql\nSELECT\n    J1.Company,\n    J1.StartDate\
  \ AS StartDate,\n    COALESCE((\n        SELECT MIN(J2.StartDate)\n        FROM\
  \ JobHistory AS J2\n        WHERE\n            J2.Company <> J1.Company\n      \
  \      AND J2.StartDate > J1.StartDate),\n        CAST(GETDATE() AS date)\n    )\
  \ AS EndDate\nFROM JobHistory AS J1\nWHERE\n    J1.Company <>\n    COALESCE((\n\
  \        SELECT TOP(1)\n            J3.Company\n        FROM JobHistory J3\n   \
  \     WHERE J3.StartDate < J1.StartDate\n        ORDER BY J3.StartDate DESC),\n\
  \        ''\n    )\nGROUP BY\n    J1.Company,\n    J1.StartDate\nORDER BY\n    J1.StartDate;\n\
  ```\n\n本章为了讲解而将此示例复杂化了一些，但我认为有必要指出这种技术，以防你在生产应用程序中发现需要编写此类查询。这种模式在许多场景中都很有用，尤其是在记录自动化系统状态并试图确定停机时间统计或其他指标时。\n\
  \n回到手头的主要任务，即显示雇佣历史以及最高薪资和职位，下一步是将查找正确开始和结束日期的查询与查找最高薪资和关联职位的查询合并起来。最简单的方法是使用 `CROSS\
  \ APPLY` 运算符，其行为类似于关联子查询，但返回的是表而非标量值。以下 T-SQL 展示了如何实现这一点：\n\n```sql\nSELECT\n  \
  \  x.Company,\n    x.StartDate,\n    x.EndDate,\n    p.Pay,\n    p.Title\nFROM\n\
  \    (\n        SELECT\n            J1.Company,\n            MIN(J1.StartDate) AS\
  \ StartDate,\n            COALESCE((\n                SELECT MIN(J2.StartDate)\n\
  \                FROM JobHistory AS J2\n                WHERE\n                \
  \    J2.Company <> J1.Company\n                    AND J2.StartDate > MIN(J1.StartDate)),\n\
  \                CAST(GETDATE() AS date)\n            ) AS EndDate\n        FROM\
  \ JobHistory AS J1\n        GROUP BY J1.Company\n    ) x\nCROSS APPLY\n    (\n \
  \       SELECT\n            Pay,\n            Title\n        FROM JobHistory AS\
  \ J2\n        WHERE\n            J2.StartDate >= x.StartDate\n            AND J2.StartDate\
  \ < x.EndDate\n            AND J2.Pay =\n            (\n                SELECT MAX(Pay)\n\
  \                FROM JobHistory AS J3\n                WHERE J3.Company = J2.Company\n\
  \            )\n    ) p\nORDER BY x.StartDate;\n```\n\n此 T-SQL 使用外部查询中的 `StartDate`\
  \ 和 `EndDate` 列来关联 `CROSS APPLY` 子查询，以查找与每个职位相对应的正确雇佣时间段。每个雇佣期的 `StartDate`/`EndDate`\
  \ 对是一个 `半开区间`（或 `半开区间`，取决于你参考的数学教材）；`StartDate` 一端是 `闭区间`（包含端点），而 `EndDate` 是 `开区间`（不包含）。这是因为一个区间的\
  \ `EndDate` 实际上是下一个区间的 `StartDate`，并且这些区间不重叠。此查询的结果如下：\n\n| Company       | StartDate\
  \  | EndDate    | Pay      | Title             |\n| ------------- | ---------- |\
  \ ---------- | -------- | ----------------- |\n| Acme Corp     | 1997-06-26 | 2000-10-05\
  \ | 58000.00 | Programmer 2      |\n| Acme Corp     | 1997-06-26 | 2000-10-05 |\
  \ 58000.00 | Programmer 3      |\n| Software Shop | 2000-10-05 | 2003-01-08 | 67000.00\
  \ | Programmer/Analyst|\n| Better Place  | 2003-01-08 | 2007-11-14 | 87000.00 |\
  \ DBA               |\n| Enterprise    | 2007-11-14 | 2009-07-12 | 95000.00 | Database\
  \ Developer|\n\n虽然此查询有效，但它存在一个问题：如果在最高薪资级别发生了职位变更但未伴随薪资增长（如此数据集中所示），`CROSS APPLY`\
  \ 子查询将返回多行，从而在结果中产生重复行。解决方案是通过按 `Pay` 列降序对结果排序来选择适当的行。修改后的子查询（每个职位只返回一行）如下：\n\n\
  ```sql\nSELECT TOP(1)\n    Pay,\n    Title\nFROM JobHistory AS J2\nWHERE\n    J2.StartDate\
  \ >= x.StartDate\n    AND J2.StartDate < x.EndDate\nORDER BY PAY DESC\n```\n\n我希望你能从这些示例中带走的重要信息是用于操作区间的模式，以及这样一个事实：以这种方式对区间建模可能不足以满足许多情况。\n\
  \n从查询风格的角度来看，需要注意的是，为了在逻辑上操作这些数据，必须在查询中合成某种形式的区间“结束”。每当你面对一个映射实体随时间变化但仅使用单个日期/时间列记录时间组件的表时，试着思考如何转换数据以便可以处理区间的开始和结束。这将使查询更加直接明了。\n\
  \n从建模的角度来看，这种设置显然是有缺陷的。我已经提到了序列中存在间隔（gaps）的问题，这在单列表中是无法表示的。另一个问题是重叠的区间。如果该人在与某份工作相同的时段内承担了一些业余合同工作怎么办？尝试将这些数据插入表中会让人觉得该人已经换了公司。\n\
  \n这并不是说任何区间都不应该以此方式建模。在许多情况下，间隔和重叠可能没有意义，并且用于第二列的额外字节将是一种浪费。一个主要例子是服务器正常运行时间监视器。IT\
  \ 部门经常使用的系统会定期 ping 每个被监视的服务器，并记录其状态的变化。以下是一个简化的示例表和代表两个被监视服务器状态的几行数据：\n\n```sql\n\
  CREATE TABLE ServerStatus\n(\n    ServerName varchar(50),\n    Status varchar(15),\n\
  \    StatusTime datetime\n);\nGO\n\nINSERT INTO ServerStatus\n(\n    ServerName,\n\
  \    Status,\n    StatusTime\n) VALUES\n    ('WebServer', 'Available', '2009-04-20T03:00:00.000'),\n\
  \    ('DBServer', 'Available', '2009-04-20T03:00:00.000'),\n    ('DBServer', 'Unavailable',\
  \ '2009-06-12T14:35:23.100'),\n    ('DBServer', 'Available', '2009-06-12T14:38:52.343'),\n\
  \    ('WebServer', 'Unavailable', '2009-06-15T09:16:03.593'),\n    ('WebServer',\
  \ 'Available', '2009-06-15T09:28:17.006');\nGO\n```\n\n应用与用于雇佣期开始和结束的几乎完全相同的查询，我们可以找出每台服务器不可用的区间：\n\
  \n```sql\nSELECT\n    S1.ServerName,\n    S1.StatusTime,\n    COALESCE((\n     \
  \   SELECT MIN(S2.StatusTime)\n        FROM ServerStatus AS S2\n        WHERE\n\
  \            S2.StatusTime > S1.StatusTime),\n        GETDATE()\n    ) AS EndTime\n\
  FROM ServerStatus AS S1\nWHERE S1.Status = 'Unavailable';\n```\n\n此查询的结果如下：\n\n\
  | ServerName | StatusTime             | EndTime                |\n| ---------- |\
  \ ---------------------- | ---------------------- |\n| DBServer   | 2009-06-12 14:35:23.100|\
  \ 2009-06-12 14:38:52.343|\n| WebServer  | 2009-06-15 09:16:03.593| 2009-06-15 09:28:17.007|\n\
  \n如果系统状态未改变，某些系统会发送定期的状态更新。监视系统可能会每 30 秒或一分钟插入额外的“不可用”行，直到目标系统再次开始响应。按目前情况，此查询将每个临时状态更新报告为一个单独的区间起点。要解决此问题，可以按如下方式修改查询：\n\
  \n```sql\nSELECT\n    S1.ServerName,\n    MIN(S1.StatusTime) AS StartTime,\n   \
  \ p.EndTime\nFROM ServerStatus AS S1\nCROSS APPLY\n    (\n        SELECT\n     \
  \       COALESCE((\n                SELECT MIN(S2.StatusTime)\n                FROM\
  \ ServerStatus AS S2\n                WHERE\n                    S2.StatusTime >\
  \ S1.StatusTime\n                    AND S2.Status = 'Available'\n             \
  \   ),\n                GETDATE()\n            ) AS EndTime\n    ) p\nWHERE S1.Status\
  \ = 'Unavailable'\nGROUP BY\n    S1.ServerName,\n    p.EndTime;\n```\n\n这个新版本查找在当前“不可用”行之后出现的第一个“可用”行；该行代表服务器宕机整个区间的实际结束时间。外部查询使用\
  \ `MIN` 聚合函数来查找每个 `ServerName`/`EndTime` 组合报告的第一个“不可用”时间。\n\n## 对独立区间进行建模和查询\n\n\
  \n\n# 第十一章 处理时间数据\n\n在很多情况下，将时间区间建模为开始时间/结束时间的组合，比使用上一节中采用的单列方式更为合适。同时拥有开始和结束时间后，任何子区间都不再直接依赖于其他区间或子区间。因此，既可以表示间隔，也可以表示重叠。本节剩余部分将详细说明如何使用这种方式建模的时间区间。\n\
  \n回到雇佣关系的例子，假设一个公司需要一个系统来跟踪内部的雇佣历史。下面是一个示例表，为本例进行了简化：\n\n```sql\nCREATE TABLE EmploymentHistory\n\
  (\n    Employee varchar(50) NOT NULL,\n    Title varchar(50) NOT NULL,\n    StartDate\
  \ date NOT NULL,\n    EndDate date NULL,\n    CONSTRAINT CK_Start_End CHECK (StartDate\
  \ < EndDate)\n);\nGO\n```\n\n这个例子中我主要忽略了完善的数据完整性。忽略为避免数据重复而明显需要的姓名和职位表——那会使例子过于复杂。我指的是针对雇佣历史特定数据的缺陷，也就是这个表旨在存储的数据。主要问题在于，虽然我确实包含了一个\
  \ `CHECK` 约束来确保 `EndDate` 在 `StartDate` 之后（我们希望办公室不至于糟糕到让员工第一天就辞职），但我忘记包含主键。\n\n\
  在这种情况下，决定什么构成主键需要一些思考。单独的 `Employee` 字段是不够的，因为员工无法在任职期间获得新职位（否则它就不再是那些变化的“历史”）。下一个候选可能是\
  \ `Employee` 和 `Title`，但这也有问题。如果员工离开公司一段时间，后来醒悟过来并恳求以相同的职位重新被录用，会怎样？表结构的*好处*在于可以表示这样的间隔；但约束\
  \ `Employee` 和 `Title` 两列将阻止这种情况发生。\n\n把 `StartDate` 加进来似乎可以解决问题，但实际上它创造了全新的问题。一个员工不能在同一时间出现在两个地方（或办公室），而这三列的组合将允许同一个员工在同一天开始拥有两个不同的职位。尽管在我们的行业中身兼数职很常见，但这个事实通常不会反映在我们的职位名称中。\n\
  \n事实证明，在主键中真正需要约束的是员工在某一天开始任职；员工特定职位的唯一性在这方面并不重要。可以添加以下键：\n\n```sql\nALTER TABLE\
  \ EmploymentHistory\nADD PRIMARY KEY (Employee, StartDate);\n```\n\n这个主键解决了员工在同一天同时出现在两个地方的问题，但不同天呢？即使有了这个约束，以下两行仍然是有效的：\n\
  \n```sql\nINSERT INTO EmploymentHistory\n(\n    Employee,\n    Title,\n    StartDate,\n\
  \    EndDate\n) VALUES\n('Jones', 'Developer', '20090101', NULL),\n('Jones', 'Senior\
  \ Developer', '20090601', NULL);\n```\n\n根据这些数据，截至 2009 年 6 月 1 日，Jones *同时*是 `Developer`\
  \ 和 `Senior Developer`——对一个人来说压力太大了！第一个想到的解决方案可能是给 `Employee` 和 `EndDate` 列添加一个唯一约束。在\
  \ SQL Server 中，唯一约束允许一个 `NULL` 值的行——因此每个员工只允许一个 `NULL` 的 `EndDate`。这将解决这些行的问题，但仍允许以下行的存在：\n\
  \n```sql\nINSERT INTO EmploymentHistory\n(\n    Employee,\n    Title,\n    StartDate,\n\
  \    EndDate\n) VALUES\n('Jones', 'Developer', '20090201', '20090801'),\n('Jones',\
  \ 'Senior Developer', '20090701', NULL);\n```\n\n现在，Jones 有一个月的时间既是 `Developer`\
  \ 又是 `Senior Developer`。同样，这可能也不是我们想要的。\n\n解决这个问题需要的不仅仅是主键和唯一键约束的组合，在我给出解决方案之前，需要一些背景知识。因此，我将在下一节中回到这个话题，该节将介绍重叠区间。\n\
  \n在我们解决重叠区间的问题之前，让我们先考虑一下这种模型相对于单日期模型的另一个主要好处，即对间隔的支持。暂时忽略缺少适当约束的问题，考虑以下行（即使有约束，这些行也是有效的）：\n\
  \n```sql\nINSERT INTO EmploymentHistory\n(\n    Employee,\n    Title,\n    StartDate,\n\
  \    EndDate\n) VALUES\n('Jones', 'Developer', '20070105', '20070901'),\n('Jones',\
  \ 'Senior Developer', '20070901', '20080901'),\n('Jones', 'Principal Developer',\
  \ '20080901', '20081007'),\n('Jones', 'Principal Developer', '20090206', NULL);\n\
  ```\n\n这里展示的场景是：一位名叫 Jones 的员工，于 2007 年 1 月作为一名开发者入职，并在同年晚些时候被提升为高级开发者。2008 年，Jones\
  \ 再次被提升为主要开发者，但一个月后辞职了。然而，几个月后，他决定重新加入公司，至今尚未离开或再次获得晋升。\n\n处理表示间隔的时间区间时，可以提出的两个主要问题是：“数据覆盖了哪些时间段？”以及“存在哪些空缺？”这类问题在处理任何类型的区间数据时都普遍存在。现实世界中的场景包括跟踪服务器正常运行时间的服务级别协议和管理员工轮班表——当然，还有雇佣历史。\n\
  \n在这个情况下，问题可以表述为“Jones 在哪些时间段为公司工作？”以及相反的问题，“Jones 在哪些时间段*没有*为公司工作？”。要回答第一个问题，首先需要找到所有子区间的开始日期——即没有与先前结束日期相连的日期。以下的\
  \ T-SQL 实现了这个目标：\n\n```sql\nSELECT\n    theStart.StartDate\nFROM EmploymentHistory\
  \ theStart\nWHERE\n    theStart.Employee = 'Jones'\n    AND NOT EXISTS\n    (\n\
  \        SELECT *\n        FROM EmploymentHistory Previous\n        WHERE\n    \
  \        Previous.EndDate = theStart.StartDate\n            AND theStart.Employee\
  \ = Previous.Employee\n    );\n```\n\n此查询查找 Jones 的所有行（记住，表中可能还有其他员工的行），然后将其过滤为那些没有其他\
  \ Jones 子区间的结束日期与此行的开始日期相匹配的行。这些行的开始日期就是 Jones 连续雇佣时间段的起始日期。\n\n下一步是找到覆盖区间的结束点。结束行可以类似开始行那样识别；它们是那些结束日期在其他行中没有对应开始日期的行。\n\
  \n为了将结束行与开始行匹配起来，需要为给定的开始行找到其后的第一个结束行。以下的 T-SQL 使用前面的查询找到开始日期，并使用一个采用上述算法的子查询找到结束日期：\n\
  \n```sql\nSELECT\n    theStart.StartDate,\n    (\n        SELECT\n            MIN(EndDate)\n\
  \        FROM EmploymentHistory theEnd\n        WHERE\n            theEnd.EndDate\
  \ > theStart.StartDate\n            AND theEnd.Employee = theStart.Employee\n  \
  \          AND NOT EXISTS\n            (\n                SELECT *\n           \
  \     FROM EmploymentHistory After\n                WHERE\n                    After.StartDate\
  \ = theEnd.EndDate\n                    AND After.Employee = theEnd.Employee\n \
  \           )\n    ) AS EndDate\nFROM EmploymentHistory theStart\nWHERE\n    theStart.Employee\
  \ = 'Jones'\n    AND NOT EXISTS\n    (\n        SELECT *\n        FROM EmploymentHistory\
  \ Previous\n        WHERE\n            Previous.EndDate = theStart.StartDate\n \
  \           AND theStart.Employee = Previous.Employee\n    );\n```\n\n\n\n# 查找非覆盖区间\n\
  \n查找非覆盖区间（即就业历史中的空白期）相对简单一些。首先，使用与查找覆盖区间查询中结束日期相同的语法，找出每个子区间的结束日期。这些日期中的每一个都标志着一个非覆盖区间的开始。务必过滤掉\
  \ `EndDate` 为 `NULL` 的行——这些子区间尚未结束，因此将它们包含为空白期没有意义。在查找每个空白期结束的子查询中，找出空白期开始后出现的第一个开始日期（如果存在）。\n\
  \n以下 T-SQL 演示了这种查找非覆盖区间的方法：\n\n```sql\nSELECT\n    theStart.EndDate AS StartDate,\n\
  \    (\n        SELECT MIN(theEnd.StartDate)\n        FROM EmploymentHistory theEnd\n\
  \        WHERE\n            theEnd.StartDate > theStart.EndDate\n            AND\
  \ theEnd.Employee = theStart.Employee\n    ) AS EndDate\nFROM EmploymentHistory\
  \ theStart\nWHERE\n    theStart.Employee = 'Jones'\n    AND theStart.EndDate IS\
  \ NOT NULL\n    AND NOT EXISTS\n    (\n        SELECT *\n        FROM EmploymentHistory\
  \ After\n        WHERE After.StartDate = theStart.EndDate\n    );\n```\n\n### 重叠区间\n\
  \n我想讨论的使用开始和结束日期表示区间的最后一个好处（或缺点，取决于建模对象）是处理重叠区间的能力。理解如何处理重叠对于执行与重叠相关的查询（\"在 2007\
  \ 年 8 月至 2008 年 9 月期间，有多少员工为公司工作过？\"）或者对于施加约束以避免重叠（如前一节开始的单个员工示例中所必需的）都是必要的。\n\n\
  ## 重叠类型\n\n首先，需要一些关于重叠的背景知识。图 11-4 展示了可能的区间重叠类型。区间 A 被其他区间 B 到 E 各自重叠，如下所示：\n\n\
  -   区间 B 在区间 A 内开始，并在区间 A 之后结束。\n-   区间 C 则相反，在区间 A 之前开始，并在区间 A 内结束。\n-   区间 D 在区间\
  \ A 内开始并结束。\n-   最后，区间 E 在区间 A 之前开始并在其之后结束。\n\n图 11-4. 重叠区间的类型\n\n## 广义重叠算法\n\n\
  假设每个区间都有一个 `StartTime` 属性和一个 `EndTime` 属性，那么区间 B 到 E 中每一个与区间 A 之间的关系可以用类似 SQL 的语法形式化如下：\n\
  \n```sql\nB.StartDate >= A.StartDate AND B.StartDate < A.EndDate AND B.EndDate >\
  \ A.EndDate\n\nC.StartDate < A.StartDate AND C.EndDate > A.StartDate AND C.EndDate\
  \ <= A.EndDate\n\nD.StartDate >= A.StartDate AND D.EndDate <= A.EndDate\n\nE.StartDate\
  \ < A.StartDate AND E.EndDate > A.EndDate\n```\n\n用名称 `X` 替换所有区间 B 到 E，我们可以开始为检测重叠创建一个广义算法。让我们首先考虑区间\
  \ `X` **不** 重叠区间 A 的情况。这可能在两种情况下发生：要么 `X` 完全发生在区间 A 之后，要么它完全在区间 A 之前——例如：\n\n```sql\n\
  X.StartDate > A.EndDate OR X.EndDate < A.StartDate\n```\n\n如果上述条件在 `X` 不重叠 A 的情况下为真，那么重叠的条件就必定是此条件的补集——换句话说：\n\
  \n```sql\nX.StartDate < A.EndDate AND X.EndDate > A.StartDate\n```\n\n用英语重新表述这个条件，我们得到：“如果\
  \ `X` 在 A 结束之前开始，并且 `X` 在 A 开始之后结束，那么 `X` 与 A 重叠。” 这如图 11-5 所示。\n\n图 11-5. 如果 `X`\
  \ 在 A 结束之前开始且 `X` 在 A 开始之后结束，则两个区间重叠。\n\n## 使用触发器防止重叠\n\n回到 `EmploymentHistory`\
  \ 表及其缺乏适当约束的问题，很明显，真正的问题在于它没有被约束以避免重叠。一个员工不能同时拥有两个职位，而确保这种情况不会发生的唯一方法是确保每个员工的子区间是唯一的。\n\
  \n不幸的是，这个逻辑不能嵌入到约束中，因为为了确定一行是否与另一行重叠，必须评估集合中的所有其他行。以下查询使用最终的重叠表达式，在 `EmploymentHistory`\
  \ 表中查找 Jones 的所有重叠行：\n\n```sql\nSELECT *\nFROM EmploymentHistory E1\nJOIN EmploymentHistory\
  \ E2 ON\n    E1.Employee = E2.Employee\n    AND (\n        E1.StartDate < COALESCE(E2.EndDate,\
  \ '99991231')\n        AND COALESCE(E1.EndDate, '99991231') > E2.StartDate)\n  \
  \  AND E1.StartDate <> E2.StartDate\nWHERE\n    E1.Employee = 'Jones';\n```\n\n\
  注意，为了避免显示与自身重叠的行，添加了 `E1.StartDate <> E2.StartDate` 表达式。由于在 `Employee` 和 `StartDate`\
  \ 列上存在主键，我们知道没有两行可以共享相同的 `StartDate`，因此这不影响重叠逻辑。此外，在结束日期 (`EndDate`) 为开放式 (`NULL`)\
  \ 的情况下，使用 `COALESCE` 语句来替代最大可能的日期值。这避免了在插入一个未来开始的区间时，当前区间仍然有效的可能性。\n\n每次对表进行插入或更新时都必须评估此逻辑，确保插入或更新操作产生的行都不会造成任何重叠。由于此逻辑不能放入约束中，因此只有一种可能性——触发器。触发器逻辑相当简单；基础表将与\
  \ `inserted` 虚拟表连接，而不是将 `EmployeeHistory` 与自身连接。以下 T-SQL 展示了触发器：\n\n```sql\nCREATE\
  \ TRIGGER No_Overlaps\nON EmploymentHistory\nFOR UPDATE, INSERT\nAS\nBEGIN\n   \
  \ IF EXISTS\n    (\n        SELECT *\n        FROM inserted i\n        JOIN EmploymentHistory\
  \ E2 ON\n            i.Employee = E2.Employee\n            AND (\n             \
  \   i.StartDate < COALESCE(E2.EndDate, '99991231')\n                AND COALESCE(i.EndDate,\
  \ '99991231') > E2.StartDate)\n            AND i.StartDate <> E2.StartDate\n   \
  \ )\n    BEGIN\n        RAISERROR('Overlapping interval inserted!', 16, 1);\n  \
  \      ROLLBACK;\n    END\nEND;\nGO\n```\n\n## 监控并发进程\n\n本节的最后一个示例涉及一个常见场景，在其中你可能希望调查重叠区间：在数据库场景中监控并发进程的性能时。\n\
  \n要开始设置此示例，请加载 SQL Server Profiler，启动一个新跟踪，并连接到测试服务器。取消选中除 `SQL:BatchCompleted`\
  \ 之外的所有事件，并保留选中的默认列。\n\n开始跟踪，然后加载 RML 命令提示符。输入以下查询：\n\n```bash\nostress -Q\"SELECT\
  \ * FROM sys.databases;\" -q –n100 –r100\n```\n\n前面的代码将在 100 个线程上执行一个查询的 100 次迭代。运行大约需要\
  \ 1 分钟，并将产生 10,000 个 Profiler 事件——每次调用查询产生一个事件。当 `ostress` 运行完成后，返回到 Profiler 并点击\
  \ `File` > `Save As Trace Table`，将数据保存到数据库中一个名为 `Overlap_Trace` 的新表中。\n\nProfiler\
  \ 跟踪表包含两个 `StartTime` 和 `EndTime` 列，许多事件（包括 `SQL:BatchCompleted` 和 `RPC:Completed`）都填充了这两个列。通过将这些列视为一个区间，并使用以下一些查询模式，你可以操作数据来完成诸如将并发查询数量与数据库服务器性能下降相关联的事情。\n\
  \n第一个也是最基本的查询是找出表中哪个时间区间表示的重叠最多。换句话说，在某个查询运行期间，有多少其他查询在运行？\n\n为了回答这个问题，表中每个查询的区间必须与表中所有其他查询的区间进行比较。以下\
  \ T-SQL 使用先前讨论的重叠算法来实现这一点：\n\n```sql\nSELECT\n    O1.StartTime,\n    O1.EndTime,\n\
  \    COUNT(*)\nFROM Overlap_Trace O1\nJOIN Overlap_Trace O2 ON\n    (O1.StartTime\
  \ < O2.EndTime AND O1.EndTime > O2.StartTime)\n    AND O1.SPID <> O2.SPID\nGROUP\
  \ BY\n    O1.StartTime,\n    O1.EndTime\nORDER BY COUNT(*) DESC;\n```\n\n\n\n\n\
  ## 第 11 章 时态数据处理\n\n与 `EmploymentTable` 示例类似，我们必须确保不会因为行与自身重叠而产生误报。由于服务器进程无法同时运行两个查询，此时服务器进程标识符（`SPID`）列就能派上用场。\n\
  \n在未建索引的表上运行此查询是一种痛苦的体验。它极其缓慢，在我机器上的示例表中，它需要 288,304 次逻辑读取。在表上创建以下索引起到了一点作用：\n\n\
  ```sql\nCREATE NONCLUSTERED INDEX IX_StartEnd\nON Overlap_Trace (StartTime, EndTime,\
  \ SPID)\n```\n\n然而，我注意到索引仍未被有效利用；检查查询计划发现是针对外部表的扫描，内部表则采用嵌套循环——表中的每一行都导致了一次表扫描。回顾合并前的原始两种算法，我注意到它们返回的是互斥的数据集。第一种算法返回区间\
  \ B 和 D 的重叠部分，而第二种算法返回区间 C 和 E 的重叠部分。我还注意到，每种算法单独使用时都比合并版本对索引更友好。解决性能问题的方法不是将两种算法合并为单个表达式，而是使用\
  \ `UNION ALL`，如下所示：\n\n```sql\nSELECT\n    x.StartTime,\n    x.EndTime,\n    SUM(x.theCount)\n\
  FROM\n    (\n        SELECT\n            O1.StartTime,\n            O1.EndTime,\n\
  \            COUNT(*) AS theCount\n        FROM Overlap_Trace O1\n        JOIN Overlap_Trace\
  \ O2 ON\n            (O1.StartTime >= O2.StartTime AND O1.StartTime < O2.EndTime)\n\
  \            AND O1.SPID <> O2.SPID\n        GROUP BY\n            O1.StartTime,\n\
  \            O1.EndTime\n        UNION ALL\n        SELECT\n            O1.StartTime,\n\
  \            O1.EndTime,\n            COUNT(*) AS theCount\n        FROM Overlap_Trace\
  \ O1\n        JOIN Overlap_Trace O2 ON\n            (O1.StartTime < O2.StartTime\
  \ AND O1.EndTime > O2.StartTime)\n            AND O1.SPID <> O2.SPID\n        GROUP\
  \ BY\n            O1.StartTime,\n            O1.EndTime\n    ) x\nGROUP BY\n   \
  \ x.StartTime,\n    x.EndTime\nORDER BY SUM(x.theCount) DESC\nOPTION(HASH GROUP);\n\
  ```\n\n此查询在逻辑上与前一个相同。它基于相同的区间合并两个互斥集并对其计数求和，这等同于一次性获取区间的完整计数。请注意，我被迫在查询末尾添加了 `HASH\
  \ GROUP` 选项，以使查询优化器更好地利用索引。一旦加入该提示，查询的总读取次数降至 66,780 次——这是一个显著的改进。\n\n### 时间切片\n\
  \n另一种分析重叠区间的方法是将数据拆分为单独的时段，并查看每个时段内发生的活动。例如，要找出每年每月有多少员工为某家公司工作，你可以找出哪些员工的工作日期区间与\
  \ 1 月 1 日至 1 月 31 日重叠，再检查 2 月 1 日至 2 月 28 日，依此类推。\n\n虽然使用日历表很容易回答这类日期问题，但当需要处理时间时就有点棘手了。预先用未来十年或更长时间的每一个*时间点*（以及每一个日期）填充日历表，会导致读取日期所需的\
  \ I/O 大幅增加，从而严重降低该表的实用性。因此，我建议根据需要动态生成时间表。以下用户定义函数接受一个输入的开始和结束日期，并为每个关联的子区间输出周期：\n\
  \n```sql\nCREATE FUNCTION TimeSlice\n(\n    @StartDate datetime,\n    @EndDate datetime\n\
  )\nRETURNS @t TABLE\n(\n    StartDate datetime NOT NULL,\n    EndDate datetime NOT\
  \ NULL,\n    PRIMARY KEY (StartDate, EndDate) WITH (IGNORE_DUP_KEY=ON)\n)\nWITH\
  \ SCHEMABINDING\nAS\nBEGIN\n    IF (@StartDate > @EndDate)\n        RETURN;\n\n\
  \    -- 将开始日期向下舍入到最近的秒\n    DECLARE @TruncatedStart datetime;\n    SET @TruncatedStart\
  \ =\n        DATEADD(second, DATEDIFF(second, '20000101', @StartDate), '20000101');\n\
  \n    -- 将结束日期向下舍入到最近的秒\n    DECLARE @TruncatedEnd datetime;\n    SET @TruncatedEnd\
  \ =\n        DATEADD(second, DATEDIFF(second, '20000101', @EndDate), '20000101');\n\
  \n    -- 首先插入开始和结束日期时间\n```\n\n\n\n# 第 11 章  处理时态数据\n\n--确保匹配传入的相同起始/结束间隔\n\n```sql\n\
  INSERT INTO @t (\n\nStartDate,\n\nEndDate\n\n)\n\n-- 插入第一个间隔\n\nSELECT\n\n@StartDate,\n\
  \nCASE\n\nWHEN DATEADD(second, 1, @TruncatedStart) > @EndDate THEN @EndDate\n\n\
  ELSE DATEADD(second, 1, @TruncatedStart)\n\nEND\n\nUNION ALL\n\n-- 插入最后一个间隔\n\n\
  SELECT\n\nCASE\n\nWHEN @TruncatedEnd < @StartDate THEN @StartDate\n\nELSE @TruncatedEnd\n\
  \nEND,\n\n@EndDate;\n\nSET @TruncatedStart = DATEADD(second, 1, @TruncatedStart);\n\
  \n--为间隔内的每一个整秒插入一行\n\nWHILE (@TruncatedStart < @TruncatedEnd)\n\nBEGIN\n\nINSERT\
  \ INTO @t (\n\nStartDate,\n\nEndDate\n\n)\n\nVALUES (\n\n@TruncatedStart,\n\nDATEADD(second,\
  \ 1, @TruncatedStart)\n\n);\n\nSET @TruncatedStart = DATEADD(second, 1, @TruncatedStart);\n\
  \nEND;\n\nRETURN;\n\nEND;\n```\n\n此函数目前硬编码使用秒作为子间隔长度，但通过修改 `DATEDIFF` 和 `DATEADD`\
  \ 的参数，可以轻松更改为任何其他时间段。\n\n## 使用 TimeSlice 函数\n\n作为使用该函数的示例，考虑以下调用：\n\n```sql\nSELECT\
  \ *\n\nFROM dbo.TimeSlice('2010-01-02T12:34:45.003', '2010-01-02T12:34:48.100');\n\
  ```\n\n如下所示的输出，包含间隔内每一个整秒范围的一行，起始点和结束点受间隔边界约束。\n\n```\nStartDate               \
  \    EndDate\n2010-01-02 12:34:45.003    2010-01-02 12:34:46.000\n2010-01-02 12:34:46.000\
  \    2010-01-02 12:34:47.000\n2010-01-02 12:34:47.000    2010-01-02 12:34:48.000\n\
  2010-01-02 12:34:48.000    2010-01-02 12:34:48.100\n```\n\n要使用 `TimeSlice` 函数来查看示例跟踪过程中重叠查询的数量，首先使用\
  \ `MIN` 和 `MAX` 聚合函数找到跟踪的起始点和结束点。然后使用该函数将间隔切分为 1 秒的时段。以下 T-SQL 展示了如何实现：\n\n```sql\n\
  SELECT\n\n    Slices.DisplayDate\n\nFROM\n\n    (\n\n        SELECT MIN(StartTime),\
  \ MAX(EndTime)\n\n        FROM Overlap_Trace\n\n    ) StartEnd (StartTime, EndTime)\n\
  \n    CROSS APPLY\n\n    (\n\n        SELECT *\n\n        FROM dbo.TimeSlice(StartEnd.StartTime,\
  \ StartEnd.EndTime)\n\n    ) Slices;\n```\n\n`TimeSlice` 函数的输出然后可用于查找每个时段内正在运行的重叠查询数量，方法是再次结合使用\
  \ `CROSS APPLY` 操作符和间隔重叠表达式：\n\n```sql\nSELECT\n\n    Slices.DisplayDate,\n\n  \
  \  OverLaps.thecount\n\nFROM\n\n    (\n\n        SELECT MIN(StartTime), MAX(EndTime)\n\
  \n        FROM Overlap_Trace\n\n    ) StartEnd (StartTime, EndTime)\n\n    CROSS\
  \ APPLY\n\n    (\n\n        SELECT *\n\n        FROM dbo.TimeSlice(StartEnd.StartTime,\
  \ StartEnd.EndTime)\n\n    ) Slices\n\n    CROSS APPLY\n\n    (\n\n        SELECT\
  \ COUNT(*) AS theCount\n\n        FROM Overlap_Trace OT\n\n        WHERE\n\n   \
  \         Slices.StartDate < OT.EndTime\n\n            AND Slices.EndDate > OT.StartTime\n\
  \n    ) Overlaps;\n```\n\n这些数据，结合性能监视器跟踪，可用于将特定时间点的计数器峰值与数据库中实际发生的情况关联起来。这对于跟踪阻塞的突然增加尤其有用，因为阻塞的增加通常不会伴随任何系统资源利用率的提高，这使得它们难以识别。通过向前面的查询添加额外的过滤器，您可以查看那些容易相互阻塞的特定查询的并发运行情况，以找出它们是否可能导致性能问题。\n\
  \n## 对时长建模\n\n时长与间隔非常相似，因为它们都表示一个开始时间和一个结束时间。因此，在许多情况下，将时长建模为间隔，并使用 `DATEDIFF` 来确定实际时长以用于报告或聚合目的是有意义的。然而，在某些情况下，您可能希望使用比\
  \ SQL Server 的 `datetime2` 类型提供的 100ns 分辨率更高的精度来存储时长。此外，格式化两个日期/时间列之间计算出的时长以供输出可能很困难，有时需要复杂的字符串操作。\n\
  \n有几个例子说明您可能希望对时长而非间隔建模。\n\n例如，存储科学试验定时信息的数据库通常需要微秒甚至纳秒精度。另一个例子是可能根本不需要日期/时间组件的数据。例如，包含参加\
  \ 300 码短跑的选手时间的表可能不需要开始时间。跑步发生的时刻并不重要；唯一重要的事实是选手跑完 300 码所花的时间。\n\n对于分辨率不足的问题，最直接的解决方案是存储一个开始日期，以及一个整数列，使用所需精度的测量单位来表示实际时长：\n\
  \n```sql\nCREATE TABLE Events\n(\n    EventId int,\n    StartTime datetime2,\n \
  \   DurationInNanoseconds int\n);\n```\n\n使用 `Events` 表，可以通过使用 `DATEADD` 将时长加到开始时间上来找到事件的近似结束时间。SQL\
  \ Server 会将时长向下舍入到最接近的 100ns——`datetime2` 类型支持的最低时间分辨率。对于 300 码短跑或其他开始时间无关紧要的场景，`StartTime`\
  \ 列可以简单地丢弃，只维护时长本身（当然，在此类情况下，结果可能不需要此处使用的纳秒精度）。\n\n此表未解决的问题是格式化问题，如果您需要将精确数据输出为人类可读的字符串。由于\
  \ SQL Server 类型支持的最低粒度是 100ns，没有任何时间格式化方法能帮助输出表示纳秒精度的时间字符串。因此，您必须编写自己的代码来完成此操作。我再次强调，格式化最好在客户端层完成。但是，如果您确实需要在数据库层格式化数据（并且您有一个*非常*充分的理由这样做），处理此场景的最佳方法是创建一个\
  \ SQLCLR UDF，该函数使用 .NET 的 `TimeSpan` 类型的属性来构建一个精确到秒的字符串，然后将剩余的纳秒部分附加到末尾。\n\n以下 UDF\
  \ 可用于以 `HH:MM:SS.NNNNNN` 字符串格式（其中 `N` 代表纳秒）返回以纳秒为单位的时长：\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction]\n\
  public static SqlString FormatDuration(SqlInt64 TimeInNanoseconds)\n{\n    // Ticks\
  \ = Nanoseconds / 10\n    long ticks = TimeInNanoseconds.Value / 100;\n    // Create\
  \ the TimeSpan based on the number of ticks\n    TimeSpan ts = new TimeSpan(ticks);\n\
  \    // Format the output to HH:MM:SS:NNNNNN\n    return new SqlString(\n      \
  \  ts.Hours.ToString() + \":\"\n        + ts.Minutes.ToString() + \":\"\n      \
  \  + ts.Seconds.ToString() + \".\"\n        + (TimeInNanoseconds % 1000000000)\n\
  \    );\n}\n```\n\n此函数可以轻松修改，以返回您的特定应用程序所需的任何时间格式。\n\n## 管理双时态数据\n\n所有数据库开发人员都必须认识到的一个核心事实是，数据质量常常不如它应有的那样高（或者不如我们希望的那样高）。有时我们被迫处理不完整或不正确的数据，并在更完整的现实情况变得可用时稍后进行更正。\n\
  \n修改数据库中的数据足够简单——调用一个 DML 语句即可完成工作。但在需要高级日志记录和为了审计目的在运行之间复现报告的系统中，一个直接的 `UPDATE`、`INSERT`\
  \ 或 `DELETE` 可能适得其反。执行此类数据修改会破坏在同一查询的连续运行中重现相同输出的可能性。\n\n\n# 第 11 章 处理时间数据\n\n作为对简单修正无效数据的替代方案，一些系统采用了\
  \ `抵消交易` 的概念。抵消交易利用汇总逻辑的加性本质，在原位修复数据。例如，假设某财务报告系统的一部分包含一个描述客户交易的表格。下表是此类表格的一个高度简化表示：\n\
  \n```sql\nCREATE TABLE Transactions\n(\n    TransactionId int,\n    Customer varchar(50),\n\
  \    TransactionDate datetime,\n    TransactionType varchar(50),\n    TransactionAmount\
  \ decimal(9,2)\n);\nGO\n```\n\n假设在 2009 年 6 月 12 日，客户 Smith 存入了 500 美元。然而，由于柜员输入错误未被及时发现，到报告数据加载时，进入系统的金额变成了\
  \ 5000 美元：\n\n```sql\nINSERT INTO Transactions VALUES\n(1001, 'Smith', '2009-06-12',\
  \ 'DEPOSIT', 5000.00);\n```\n\n第二天早上，错误数据被检测到。更新交易行本身会破坏审计追踪，因此必须发出一笔抵消交易。处理此场景有几种方法。\n\
  \n## 方法一：使用错误的日期\n\n第一种方法是发出一笔日期与错误交易相同的抵消交易：\n\n```sql\nINSERT INTO Transactions\
  \ VALUES\n(1001, 'Smith', '2009-06-12', 'OFFSET', -4500.00);\n```\n\n将抵消交易日期回填可以修复按任何维度（交易号、客户、日期或交易类型）分组的汇总报告中的问题，但未能跟踪错误实际是在\
  \ 6 月 13 日被发现的这一事实。\n\n## 方法二：使用正确的日期\n\n出于数据审计目的，正确标注抵消记录的日期至关重要：\n\n```sql\nINSERT\
  \ INTO Transactions VALUES\n(1001, 'Smith', '2009-06-13', 'OFFSET', -4500.00);\n\
  ```\n\n不幸的是，正确标注日期并不能解决所有问题——反而会引入新问题。在正确标注抵消日期后，查询客户 Smith 截至 6 月 12 日的所有业务数据将不包含更正。只有包含\
  \ 6 月 13 日的数据，查询才能返回正确数据。虽然可以编写关联查询来返回 6 月 12 日的正确汇总报告，但在查询 6 月 12 日之后的范围（例如 6 月\
  \ 13 日至 15 日）时，数据处于一种有些奇怪的状态。如果查询中没有同时考虑 6 月 12 日和 6 月 13 日，抵消记录就会成为孤立记录。\n\n##\
  \ 双时态模型\n\n为了规避这些及类似问题，需要一个 `双时态` 模型。在双时态表中，每笔交易都有两个日期：交易实际发生的日期和一个“有效”日期，后者代表我们知道更新数据正确的日期。以下是修改后的\
  \ `Transactions` 表，展示了新增的列：\n\n```sql\nCREATE TABLE Transactions\n(\n    TransactionId\
  \ int,\n    Customer varchar(50),\n    TransactionDate datetime,\n    TransactionType\
  \ varchar(50),\n    TransactionAmount decimal(9,2),\n    ValidDate datetime\n);\n\
  ```\n\n当插入 Smith 在 6 月 12 日的数据时，同时也应用一个 6 月 12 日的有效日期：\n\n```sql\nINSERT INTO Transactions\
  \ VALUES\n(1001, 'Smith', '2009-06-12', 'DEPOSIT', 5000.00, '2009-06-12');\n```\n\
  \n实际上，这一行可以解读为“截至 6 月 12 日，我们相信日期为 6 月 12 日的交易 1001 是一笔 5000.00 美元的存款。” 在 6 月 13\
  \ 日，当错误被发现时，不插入抵消记录，而是插入一条更正后的存款记录，并带有新的有效日期：\n\n```sql\nINSERT INTO Transactions\
  \ VALUES\n(1001, 'Smith', '2009-06-12', 'DEPOSIT', 500.00, '2009-06-13');\n```\n\
  \n这一行表明截至 6 月 13 日，交易 1001 已被修改。但重要的区别是，交易仍保持其正确的日期——因此运行一份报告查询 6 月 13 日发生的交易时，不会返回任何行，因为我们查看的行都发生在\
  \ 6 月 12 日（尽管其中一条是在 6 月 13 日录入的）。此外，此模型消除了对抵消交易的需求。查询应始终在有效范围内查找任何给定交易的最新更新，而不是使用抵消。\n\
  \n## 查询最新版本数据\n\n为了更深入地理解这一点，考虑一份在 8 月 5 日运行的报告，查看所有发生在 6 月 12 日的交易。运行报告的人希望得到最“正确”的数据版本——即应用所有可用的更正。这是通过为每笔交易选取具有最大有效日期的行来完成的：\n\
  \n```sql\nSELECT\n    T1.TransactionId,\n    T1.Customer,\n    T1.TransactionType,\n\
  \    T1.TransactionAmount\nFROM Transactions AS T1\nWHERE\n    T1.TransactionDate\
  \ = '2009-06-12'\n    AND T1.ValidDate =\n    (\n        SELECT MAX(ValidDate)\n\
  \        FROM Transactions AS T2\n        WHERE T2.TransactionId = T1.TransactionId\n\
  \    );\n```\n\n## 查询历史快照数据\n\n通过修改子查询，可以基于更新应用前的数据获取“快照”报告。例如，假设同一份报告在 6 月 12 日晚间运行。Smith\
  \ 的输出将显示交易 1001 的存款为 5000.00 美元。要在 8 月 5 日（或 6 月 12 日之后的任何一天）重现该报告，需更改 `ValidDate`\
  \ 子查询：\n\n```sql\nSELECT\n    T1.TransactionId,\n    T1.Customer,\n    T1.TransactionType,\n\
  \    T1.TransactionAmount\nFROM Transactions AS T1\nWHERE\n    T1.TransactionDate\
  \ = '2009-06-12'\n    AND T1.ValidDate =\n    (\n        SELECT MAX(ValidDate)\n\
  \        FROM Transactions AS T2\n        WHERE\n            T2.TransactionId =\
  \ T1.TransactionId\n            AND ValidDate <= '2009-06-12'\n    );\n```\n\n请注意，在这种情况下，本可以完全省略子查询，将搜索条件变为\
  \ `AND T1.ValidDate = '2009-06-12'`。但是，当查询日期范围时，子查询是必需的，因此为了便于查询维护，保留它是明智的。\n\n\
  ## 预订未来交易\n\n使用相同的模式，也可以在数据实际生效前预订未来交易。在进行电汇、信用卡支付和其他类型的电子资金交易时，通常可以设置业务实际执行的记账日期。通过操作有效日期，Smith\
  \ 可以在 6 月 14 日请求一笔转出转账，但要求该转账实际在 6 月 16 日发生：\n\n```sql\nINSERT INTO Transactions\
  \ VALUES\n(1002, 'Smith', '2009-06-16', 'TRANSFER', -1000.00, '2009-06-14');\n```\n\
  \n由于交易日期是 6 月 16 日，一份处理 6 月 1 日至 6 月 15 日之间发生的交易的报告不会显示这笔转账。但业务经理可以在 6 月 15 日查询，以了解未来几天或几周内将发生哪些交易，并审核数据是何时进入系统的。\n\
  \n## 总结\n\n对数据进行双时态建模，可以在数据更新时对历史或未来知识进行可审计、准确的表示。这在许多场景中非常有用——尤其是在财务对账领域，当您被迫处理回溯日期的合同（这些合同改变了先前交易的条款）以及为避免某些类型的审计问题而预订的未来业务时。\n\
  \n**注意** 在对双时态数据建模时，您可能需要研究实施截止日期规则的可能性，超过该日期后不能再对交易进行更改。例如，系统可能有政策规定交易在 90 天后视为关闭。在这种情况下，一个简单的\
  \ `CHECK` 约束就可以解决问题，以确保 `ValidDate` 在 `TransactionDate` 的 90 天内。另一个例子是已用于生成正式报告（例如提交给政府机构）的数据。在这种情况下，您会希望有一条规则，使得任何交易都不能回溯到报告运行之前的日期（以免改变报告中的数据）。这时需要一个触发器，以便根据包含报告运行历史的表来验证日期。\n\
  \n## 总结\n\n\n# 几乎所有数据都带有某种形式的时间成分，每个数据库开发人员都将不得不反复处理时间和日期。成功管理时间数据始于理解不同类型的时间数据：基于实例的、基于区间的、基于时段的和双时态的。通过应用对\
  \ SQL Server 原生日期/时间类型工作方式的了解，你可以智能且高效地执行基于时间数据模型的计算和查询。\n\n## 树、层次结构与图\n\n尽管有时看起来很混乱，但我们周围的世界充满了结构和秩序。宇宙本身在本质上是层次化的，由星系、恒星和行星组成。地球上自然的层次结构之一是荒野中存在的食物链；狮子当然可以吃斑马，但唉，斑马可能永远不会以狮子肉为食。当然，我们也都熟悉公司的管理层次结构——有些公司试图废除它而\
  \ favor 矩阵结构，后者根本不是层次化的……但这一点稍后再谈！\n\n我们努力基于实体之间的连接（或缺乏连接）来描述我们的存在，而这正是树、层次结构和图在数学和数据层面帮助我们做的事情。大多数数据库至少在很大程度上是层次化的，根部有一个中心表或一组表，所有其他表通过外键引用从此分支出来。然而，有时数据库的层次结构需要在更细粒度的级别上设计，以表示单个表中记录之间的层次关系。例如，你不会为了支持层次结构而设计一个需要为每个员工使用一个表的管理数据库。相反，你会将所有员工放入一个单独的表中，并在行之间创建引用。\n\
  \n本章讨论了在 SQL Server 2008 中处理这些表内层次结构和图的三种不同方法，如下所示：\n\n*   邻接表\n*   物化路径\n*   `hierarchyid`\
  \ 数据类型\n\n根据具体情况，这些技术各有优势。我将分别描述每种技术，并比较如何使用它们来查询和管理你的层次数据。\n\n## 术语：一切都是图\n\n从数学上讲，树和层次结构都是\
  \ `图` 的不同类型。图被定义为由 `边` 连接的一组 `节点`（或 `顶点`）。图中的边可以进一步分类为 `有向` 或 `无向`，这意味着它们只能单向遍历（有向）或可以双向遍历（无向）。如果一个图中的所有边都是有向的，则该图本身被称为有向图（有时称为\
  \ `有向图`）。图还可以有 `环`，即一组节点/边，当按顺序遍历时会让你回到同一个初始节点。没有环的图称为 `无环` 图。图 12-1 显示了一些基本图类型的简单示例。\n\
  \n*图 12-1\\. 无向图、有向图、无环有向图和有向无环图*\n\n最直接可识别的图的例子是街道地图。每个十字路口可以被视为一个节点，每条街道是一条边。单行道是有向边，如果你开车绕着街区转一圈，就说明了一个环。因此，可以说街道系统是一个有环的有向图。在制造领域，一个常见的图结构是物料清单，或称零件展开，它描述了给定产品所有必需的组成部分。在软件开发中，我们通常使用类和对象图，它们构成了面向对象系统中各组成部分之间的关系。\n\
  \n`树` 被定义为一个无向、无环的图，其中任意两个节点之间恰好存在一条路径。图 12-2 显示了一个简单的树。\n\n*图 12-2\\. 树中任意两个节点之间恰好存在一条路径。*\n\
  \n> **注意** 借用与“树”一词相同的农业术语，我们可以将多棵树称为 `森林`。\n\n`层次结构` 是树的一个特殊子集，它可能是开发人员需要处理的最常见的图结构。它具有树的所有特性，但也是\
  \ `有向` 和 `有根` 的。这意味着某个节点被指定为 `根`，所有其他节点都被称为该节点的 `下属`（或 `后代`）。此外，每个非根节点必须恰好有一个 `父`\
  \ 节点——一个指向它的节点。不允许有多个父节点，也不允许有多个根节点。在描述大多数业务关系时，层次结构极为常见；经理/员工、承包商/分包商以及公司/部门关联都会让人想到。图\
  \ 12-3 显示了一个包含根节点和若干层级下属的层次结构。\n\n*图 12-3\\. 一个层次结构必须恰好有一个根节点，并且每个非根节点必须恰好有一个父节点。*\n\
  \n层次结构中的父子关系通常使用术语 `祖先` 和 `后代` 进行更正式的分类，尽管这个术语在软件开发环境中可能有点拗口。另一个重要术语是 `兄弟节点`，它描述共享同一个父节点的节点。用于描述家族关系的其他术语也常规应用于树和层次结构，但我个人发现，试图弄清楚哪个节点是另一个节点的\
  \ `表亲` 等可能会引起混淆，因此已放弃使用大多数这种扩展术语。\n\n## 基础：邻接表与图\n\n最常见的图数据模型称为 `邻接表`。在邻接表中，图被建模为节点对，每对代表一条边。这是一种极其灵活的图建模方式；任何类型的图、层次结构或树都可以适应这个模型。然而，从查询复杂性、性能和数据完整性的角度来看，它可能会有问题。在本节中，我将向你展示如何使用邻接表，并指出在围绕它们设计解决方案时应该警惕的一些问题。\n\
  \n最简单的图表只包含两列，`X` 和 `Y`：\n\n```sql\nCREATE TABLE Edges\n(\n    X int NOT NULL,\n\
  \    Y int NOT NULL,\n    PRIMARY KEY (X, Y)\n);\nGO\n```\n\n列 `X` 和 `Y` 的组合构成了主键，表中的每一行代表图中的一条边。注意，`X`\
  \ 和 `Y` 被假定为对某个有效节点表的引用。此表仅表示连接节点的边。它也可以用来引用未连接的节点；一个有路径回到自身但没有其他路径的节点可以为此目的插入到表中。\n\
  \n> **注意** 在为未连接的节点建模时，一些数据架构师更喜欢使用可为空的 `Y` 列，而不是让两个列都指向同一个节点。最终效果是一样的，但在我看来，可为空的\
  \ `Y` 列会使某些查询变得有些混乱，因为你将被迫处理 `NULL` 的可能性。因此，本章中的示例不遵循该约定——但在你的生产应用程序中可以使用任一方法。\n\
  \n### 约束边\n\n就目前而言，`Edges` 表可以用来表示任何图，但语义很重要，而当前结构并未隐含任何语义。很难知道每条边是有向的还是无向的。遍历图时，可以想象两个方向都走得通，因此下面两行在逻辑上可能相同也可能不同：\n\
  \n```sql\nINSERT INTO Edges VALUES (1, 2);\nINSERT INTO Edges VALUES (2, 1);\n```\n\
  \n\n# 第十二章 树、层次结构与图\n\n如果该图中的边被设定为有向边，则没有问题。如果你需要某条边具有两个方向，只需同时插入两个方向即可，而对于有向边则不要同时插入两者。另一方面，如果所有的边都应该是无向的，那么就需要一个约束来确保不能插入逻辑上相同的两条路径。\n\
  \n主键显然不足以实施此约束，因为它将每种组合都视为唯一的。解决此问题最明显的办法是创建一个触发器，在执行插入或更新操作时检查这些行。由于主键已经强制禁止插入重复的有向路径，该触发器只需检查其反向路径即可。\n\
  \n在创建触发器之前，请先清空 `Edges` 表，使其不再包含刚刚插入的重复无向边：\n\n```sql\nTRUNCATE TABLE Edges;\nGO\n\
  ```\n\n然后创建一个触发器，该触发器将在插入或更新行时进行如下检查：\n\n```sql\nCREATE TRIGGER CheckForDuplicates\n\
  ON Edges\nFOR INSERT, UPDATE\nAS\nBEGIN\n    IF EXISTS\n    (\n        SELECT *\n\
  \        FROM Edges e\n        WHERE\n            EXISTS\n            (\n      \
  \          SELECT *\n                FROM inserted i\n                WHERE\n  \
  \                  i.X = e.Y\n                    AND i.Y = e.X\n            )\n\
  \    )\n    BEGIN\n        ROLLBACK;\n    END\nEND;\nGO\n```\n\n现在，尝试重新插入前面列出的两行数据，将会导致触发器结束事务并对第二行执行回滚，从而防止创建重复的边。\n\
  \n一个稍微巧妙一些的约束路径唯一性的方法是利用索引视图。你可以利用索引视图具有唯一索引这一特性，将其用作约束，适用于触发器显得笨拙的此类场景。为了创建索引视图，你将需要一个数字表（也称为计数表），它只包含一列\
  \ `Number`，并且该列是主键。以下代码清单创建了这样一个表，并填充了从 1 到 8000 的所有数字：\n\n```sql\nSELECT TOP (8000)\n\
  \    IDENTITY(int, 1, 1) AS Number\nINTO Numbers\nFROM master..spt_values a\nCROSS\
  \ JOIN master..spt_values b;\n\nALTER TABLE Numbers\nADD PRIMARY KEY (Number);\n\
  GO\n```\n\n## 注意\n\n我们实际上并不需要 `Numbers` 表中的全部 8000 行（事实上，这里描述的解决方案只需要两个不同的行），但在许多其他场景中，你可能需要一个更大的数字表，因此现在预先用额外的行填充该表并无坏处。\n\
  \n`master..spt_values` 表是一个随意选择的系统表，仅仅是因为它有足够的行，当与自身进行交叉连接时，输出将超过 8000 行。\n\n数字表在你需要进行行间操作和前瞻逻辑的许多情况下都非常有用，尤其是在处理字符串时。然而，在当前这个案例中，它的用途相当简单：与\
  \ `Numbers` 表进行 `CROSS JOIN`，结合一个 `WHERE` 条件，将产生一个输出，其中包含 `Edges` 表中每行对应的两行数据。然后，一个\
  \ `CASE` 表达式将用于交换 `X` 和 `Y` 列的值——反转路径方向——用于每对重复项中的一行。以下视图封装了此逻辑：\n\n```sql\nCREATE\
  \ VIEW DuplicateEdges\nWITH SCHEMABINDING\nAS\nSELECT\n    CASE n.Number\n     \
  \   WHEN 1 THEN e.X\n        ELSE e.Y\n    END X,\n    CASE n.Number\n        WHEN\
  \ 1 THEN e.Y\n        ELSE e.X\n    END Y\nFROM Edges e\nCROSS JOIN Numbers n\n\
  WHERE\n    n.Number BETWEEN 1 AND 2;\nGO\n```\n\n视图创建后，可以为其创建索引，以约束重复路径：\n\n```sql\n\
  CREATE UNIQUE CLUSTERED INDEX IX_NoDuplicates\nON DuplicateEdges (X,Y);\nGO\n```\n\
  \n由于该视图在逻辑上包含了插入表中的两条路径及其反向路径，唯一索引可用于防止重复。两种技术具有相似的性能特点，但不可否认的是，索引视图有其独特的优势。它还可以兼作快速查找，用于查找有向表示法中的所有路径。\n\
  \n\n\n# 第 12 章：树、层次结构与图\n\n**注意** 一旦你选择了触发器或索引视图方法来防止重复边，在执行本章剩余的任何代码清单之前，务必再次清空`Edges`表中的所有行。\n\
  \n## 基础图查询：我与谁相连？\n\n在遍历图以回答问题之前，再次讨论有向边和无向边之间的区别及其建模方式仍然很重要。图 12-4 展示了两个图：I 是无向的，J\
  \ 是有向的。\n\n`图 12-4. 有向图与无向图具有不同的连接特性。`\n\n无论`Edges`表被视为有向还是无向，以下节点对都可用于表示边：\n\n\
  ```sql\nINSERT INTO Edges VALUES (2, 1), (1, 3);\nGO\n```\n\n现在我们可以回答一个简单的问题：从一个特定节点出发，我们能遍历到哪些节点？\n\
  \n在有向图的情况下，如果存在一条从`X`开始并在`Y`结束的边，则任何节点`Y`都可以从另一个节点`X`访问。这很容易用查询表示（在此例中，从节点 1 开始）：\n\
  \n```sql\nSELECT Y\nFROM Edges e\nWHERE X = 1;\n```\n\n对于无向图，情况变得稍微复杂一些，因为两个节点之间的任何给定边都可以沿任一方向遍历。在这种情况下，如果一条边被表示为要么从`X`开始并在`Y`结束，要么反过来，则任何节点`Y`都可以从另一个节点`X`访问。我们需要考虑节点`Y`是起点或终点的所有边，否则图实际上就变成了有向图。\n\
  \n现在要找到从节点 1 可达的所有节点，需要多写一些代码：\n\n```sql\nSELECT\n  CASE\n    WHEN X = 1 THEN Y\n\
  \    ELSE X\n  END\nFROM Edges e\nWHERE\n  X = 1 OR Y = 1;\n```\n\n除了这段代码复杂性增加之外，还有一个重要得多的问题：在较大的数据集上，性能将开始下降，因为搜索条件无法通过索引查找来满足，因为它依赖于带有`OR`条件的两列。这个问题可以通过创建多个索引（每个列作为第一个键一个索引）并使用`UNION\
  \ ALL`查询在一定程度上得到解决，如下所示：\n\n```sql\nSELECT Y\nFROM Edges e\nWHERE X = 1\nUNION ALL\n\
  SELECT X\nFROM Edges e\nWHERE Y = 1;\n```\n\n这段代码有些不直观，并且由于必须维护两个索引，并且查询必须进行两次索引操作才能满足，与查询有向图相比，性能仍然会受到影响。因此，我建议通常将图建模为有向图，并处理插入双向边对，除非有令人信服的理由不这样做，例如一个非常大的无向图，其额外的边组合将挑战服务器可用的磁盘空间。\n\
  \n本章剩余的示例将假定图是有向图。\n\n### 遍历图\n\n找出一个给定节点直接连接到哪些节点是一个好的开始，但为了回答关于底层数据结构的问题，必须遍历图。对于本节内容，需要一个更严谨的示例数据集。图\
  \ 12-5 展示了一个初始样本图，代表了一个未命名城市的街道地图的缩略部分。\n\n`图 12-5. 一个缩略的街道地图`\n\n需要几个表来表示这个地图——首先是一个街道表：\n\
  \n```sql\nCREATE TABLE Streets\n(\n  StreetId int NOT NULL PRIMARY KEY,\n  StreetName\
  \ varchar(75)\n);\nGO\n\nINSERT INTO Streets VALUES\n(1, '1st Ave'), (2, '2nd Ave'),\n\
  (3, '3rd Ave'), (4, '4th Ave'), (5, 'Madison');\nGO\n```\n\n每条街道都被分配了一个代理键，以便可以在其他表中轻松引用。\n\
  \n下一个需求是一个交叉口表——图中的节点。该表为每个交叉口创建一个键，在此数据集中定义为一条或多条街道的集合：\n\n```sql\nCREATE TABLE\
  \ Intersections\n(\n  IntersectionId int NOT NULL PRIMARY KEY,\n  IntersectionName\
  \ varchar(10)\n);\nGO\n\nINSERT INTO Intersections VALUES\n(1, 'A'), (2, 'B'), (3,\
  \ 'C'), (4, 'D');\nGO\n```\n\n接下来是一个名为`IntersectionStreets`的表，它将街道映射到它们各自的交叉口。请注意，我没有在这个表上包含任何约束，因为它们可能相当复杂。一个理想的约束可能规定任何给定的街道组合不应相交超过一次。然而，很难说这是否适用于所有城市，因为许多古老城市有弯曲的道路，可能在多个点相互交叉。处理此问题留作练习供你自行尝试。\n\
  \n```sql\nCREATE TABLE IntersectionStreets\n(\n  IntersectionId int NOT NULL\n \
  \   REFERENCES Intersections (IntersectionId),\n  StreetId int NOT NULL\n    REFERENCES\
  \ Streets (StreetId),\n  PRIMARY KEY (IntersectionId, StreetId)\n);\nGO\n\nINSERT\
  \ INTO IntersectionStreets VALUES\n(1, 1), (1, 5), (2, 2), (2, 5), (3, 3), (3, 5),\
  \ (4, 4), (4, 5);\nGO\n```\n\n最后一个表描述了图的边，在这种情况下是每个交叉口之间的街道段。我添加了一些乍一看可能不太明显的约束：`StreetSegments`表没有使用指向`Intersections`表的外键，而是引用了`IntersectionStreets`表作为起点和终点。在两种情况下，街道也包含在键中。这样做的目的是确保你不能从一个街道开始，然后神奇地结束在另一条街道上，或者甚至结束在你起始街道根本不经过的交叉口上。\n\
  \n`CK_Intersections`约束确保两个交叉口确实不同——因此你不能从一个交叉口开始，仅移动一步后就结束在同一个地方。理论上，一条环形街道可能只与另一条街道相交于一点，在这种情况下，沿着整条街道行走可以让你回到起点。然而，这样做显然无助于你通过图遍历到目的地，而这正是当前正在考虑的情况。\n\
  \n以下是创建构成图边的街道段的 T-SQL：\n\n```sql\nCREATE TABLE StreetSegments\n(\n  IntersectionId_Start\
  \ int NOT NULL,\n  IntersectionId_End int NOT NULL,\n  StreetId int NOT NULL,\n\
  \  CONSTRAINT FK_Start\n    FOREIGN KEY (IntersectionId_Start, StreetId)\n    REFERENCES\
  \ IntersectionStreets (IntersectionId, StreetId),\n  CONSTRAINT FK_End\n    FOREIGN\
  \ KEY (IntersectionId_End, StreetId)\n    REFERENCES IntersectionStreets (IntersectionId,\
  \ StreetId),\n  CONSTRAINT CK_Intersections\n    CHECK (IntersectionId_Start <>\
  \ IntersectionId_End),\n  CONSTRAINT PK_StreetSegments\n    PRIMARY KEY (IntersectionId_Start,\
  \ IntersectionId_End)\n);\nGO\n\nINSERT INTO StreetSegments VALUES (1, 2, 5), (2,\
  \ 3, 5), (3, 4, 5);\nGO\n```\n\n除了这些表之外，一个辅助函数对于使导航更容易很有用。`GetIntersectionId`函数返回两条输入街道相交的交叉口。如前所述，本示例中使用的模式假设每条街道只与任何其他街道相交一次，`GetIntersectionId`函数也做了同样的假设。它通过搜索输入街道参与的所有交叉口，然后找到恰好有两个匹配项（意味着两条输入街道都相交）的那个交叉口来工作。以下是该函数的\
  \ T-SQL：\n\n```sql\nCREATE FUNCTION GetIntersectionId\n(\n  @Street1 varchar(75),\n\
  \  @Street2 varchar(75)\n)\nRETURNS int\nWITH SCHEMABINDING\nAS\nBEGIN\n  RETURN\n\
  \  (\n    SELECT\n      i.IntersectionId\n    FROM dbo.IntersectionStreets i\n \
  \   WHERE\n      StreetId IN\n      (\n        SELECT StreetId\n        FROM dbo.Streets\n\
  \        WHERE StreetName IN (@Street1, @Street2)\n      )\n    GROUP BY i.IntersectionId\n\
  \    HAVING COUNT(*) = 2\n  )\nEND;\nGO\n```\n\n\n# 第 12 章 树、层次结构与图\n\n利用模式和函数，我们可以开始遍历节点。图遍历的基本技术非常简单：找到起始交叉点及其连接的所有节点，然后迭代或递归地向外移动，将前一个节点的终点作为下一个节点的起点。这可以通过递归公用表表达式（`CTE`）轻松实现。以下是一个简单的初始\
  \ `CTE` 示例，可用于从 `Madison` 和 `1st Avenue` 遍历节点到 `Madison` 和 `4th Avenue`：\n\n```sql\n\
  DECLARE\n    @Start int = dbo.GetIntersectionId('Madison', '1st Ave'),\n    @End\
  \ int = dbo.GetIntersectionId('Madison', '4th Ave');\n\nWITH Paths\nAS\n(\n    SELECT\n\
  \        @Start AS theStart,\n        IntersectionId_End AS theEnd\n    FROM dbo.StreetSegments\n\
  \    WHERE\n        IntersectionId_Start = @Start\n\n    UNION ALL\n\n    SELECT\n\
  \        p.theEnd,\n        ss.IntersectionId_End\n    FROM Paths p\n    JOIN dbo.StreetSegments\
  \ ss ON ss.IntersectionId_Start = p.theEnd\n    WHERE p.theEnd <> @End\n)\n\nSELECT\
  \ *\nFROM Paths;\nGO\n```\n\n该 `CTE` 的锚点部分找到了起始交叉点连接的所有节点——在此情况下，根据我们已经输入的数据，只有一个。递归部分使用锚点的输出作为其输入，从那里查找所有连接的节点，并且仅当下一个交叉点的终点不等于终点交叉点时才继续。此查询的输出如下：\n\
  \n```\ntheStart theEnd\n1 2\n2 3\n3 4\n```\n\n虽然这个输出是正确的，并且在两点之间只有一条路径的情况下描述得很清晰，但它存在一些问题。首先，`CTE`\
  \ 的输出顺序——就像任何其他查询一样——如果没有 `ORDER BY` 子句是无法保证的。在此情况下，顺序恰好与路径的顺序一致，但这只是一个非常小的数据集，而且我运行查询的服务器只有一个处理器。在更大的数据集上和/或使用多个处理器时，`SQL\
  \ Server` 可能会选择以不同的顺序处理数据，从而破坏隐含的输出顺序。\n\n第二个问题是，在这种情况下，起点和终点之间恰好有一条路径。如果有多条路径怎么办？图\
  \ 12-6 展示了添加了一条新街道、几个新交叉点和更多路段后的街道地图。以下 `T-SQL` 可用于将新数据添加到相应的表中：\n\n```sql\n--New\
  \ street\nINSERT INTO Streets VALUES (6, 'Lexington');\nGO\n\n--New intersections\n\
  INSERT INTO Intersections VALUES\n(5, 'E'), (6, 'F'), (7, 'G'), (8, 'H');\nGO\n\n\
  --New intersection/street mappings\nINSERT INTO IntersectionStreets VALUES\n(5,\
  \ 1), (5, 6), (6, 2), (6, 6), (7, 3), (7, 6), (8, 4), (8, 6);\nGO\n\n--North/South\
  \ segments\nINSERT INTO StreetSegments VALUES (2, 6, 2), (4, 8, 4);\nGO\n\n--East/West\
  \ segments\nINSERT INTO StreetSegments VALUES (8, 7, 6), (7, 6, 6), (6, 5, 6);\n\
  GO\n```\n\n请注意，虽然交叉点 `E` 和 `G` 已创建，但它们对应的南北路段尚未插入。这是有意为之，因为我将使用这些路段来说明另一个复杂情况。\n\
  \n*图 12-6. 一个更完整的街道地图版本*\n\n新数据插入后，我们可以尝试与之前相同的 `CTE`，这次从 `Madison` 和 `1st Avenue`\
  \ 遍历到 `Lexington` 和 `1st Avenue`。要更改目的地，请修改分配 `@Start` 和 `@End` 变量的 `DECLARE` 语句，如下所示：\n\
  \n```sql\nDECLARE\n    @Start int = dbo.GetIntersectionId('Madison', '1st Ave'),\n\
  \    @End int = dbo.GetIntersectionId('Lexington', '1st Ave');\n```\n\n进行这些更改后，`CTE`\
  \ 查询的输出现在如下：\n\n```\ntheStart theEnd\n1 2\n2 3\n2 6\n6 5\n3 4\n4 8\n8 7\n7 6\n6\
  \ 5\n```\n\n现在从起点到终点有两条路径，但无法分辨它们是什么；每条路径涉及的交叉点在输出中混在了一起。\n\n为了解决这个问题，`CTE` 必须在每次迭代时“记住”它已经遍历过的\n\
  \n\n\n# 第 12 章：树、层次结构与图\n\n之前的迭代。由于公用表表达式的每个迭代只能访问前一次迭代的数据——而非所有先前迭代的全部数据——每一行都必须以行内方式保存自己的记录。这可以通过使用**物化路径**表示法来实现，其中每个先前访问过的节点都会被附加到一个持续更新的列表中。这需要在公用表表达式中添加一个新列，如以下代码清单中以粗体突出显示的部分所示：\n\
  \n```sql\nDECLARE\n    @Start int = dbo.GetIntersectionId('Madison', '1st Ave'),\n\
  \    @End int = dbo.GetIntersectionId('Lexington', '1st Ave');\n\nWITH Paths\nAS\n\
  (\n    SELECT\n        @Start AS theStart,\n        IntersectionId_End AS theEnd,\n\
  \        CAST('/' +\n             CAST(@Start AS varchar(255)) + '/' +\n       \
  \      CAST(IntersectionId_End AS varchar(255)) + '/'\n             AS varchar(255)\
  \ ) AS thePath\n    FROM dbo.StreetSegments\n    WHERE\n        IntersectionId_Start\
  \ = @Start\n    UNION ALL\n    SELECT\n        p.theEnd,\n        ss.IntersectionId_End,\n\
  \        CAST(p.ThePath +\n             CAST(IntersectionId_End AS varchar(255))\
  \ + '/'\n             AS varchar(255)\n        )\n    FROM Paths p\n    JOIN dbo.StreetSegments\
  \ ss ON ss.IntersectionId_Start = p.theEnd\n    WHERE p.theEnd <> @End\n)\nSELECT\
  \ *\nFROM Paths;\nGO\n```\n\n这段代码将开始形成一个已访问节点的列表。如果将节点 A（IntersectionId 1）指定为起点，则此列在锚定成员中的输出将是`/1/2/`，因为节点\
  \ B（IntersectionId 2）是唯一一个参与从节点 A 开始的街道段的节点。\n\n随着新节点被访问，它们的 ID 将被追加到列表中，生成一个所有已访问节点的“面包屑”轨迹。请注意，锚定成员和递归成员中的列都被`CAST`转换，以确保它们的数据类型完全相同。这是必需的，因为由于连接操作，`varchar`的大小会发生变化，并且锚定成员和递归成员公开的所有列必须具有相同的类型。进行这些修改后，公用表表达式的输出如下：\n\
  \n```\ntheStart theEnd thePath\n1        2      /1/2/\n2        3      /1/2/3/\n\
  2        6      /1/2/6/\n6        5      /1/2/6/5/\n3        4      /1/2/3/4/\n\
  4        8      /1/2/3/4/8/\n8        7      /1/2/3/4/8/7/\n7        6      /1/2/3/4/8/7/6/\n\
  6        5      /1/2/3/4/8/7/6/5/\n```\n\n输出现在包含了到达终点的完整路径，但它仍然包含了沿途访问的所有子路径。为了完成，向最外层查询添加以下内容：\n\
  \n```sql\nWHERE theEnd = @End\n```\n\n这将把结果限制为仅那些实际终止于指定终点的路径——在本例中是节点 E（IntersectionId\
  \ 5）。添加此条件后，只会显示真正访问了起点和终点的两条路径。\n\n目前的公用表表达式仍有一个主要问题。图 12-7 显示了地图的完整版本，其中填充了最后两个街道段。以下\
  \ T-SQL 可用于使用新数据填充`StreetSegments`表：\n\n```sql\nINSERT INTO StreetSegments VALUES\
  \ (5, 1, 1), (7, 3, 3);\nGO\n```\n\n**图 12-7. 填充了所有路段的地图版本**\n\n引入新路段后重新运行公用表表达式，得到以下部分输出（为简洁起见进行了缩写）：\n\
  \n```\ntheStart theEnd thePath\n6        5      /1/2/6/5/\n6        5      /1/2/3/4/8/7/6/5/\n\
  6        5      /1/2/3/4/8/7/3/4/8/7/6/5/\n6        5      /1/2/3/4/8/7/3/4/8/7/3/4/8/7/6/5/\n\
  ...\n```\n\n并伴随以下错误：\n\n```\nMsg 530, Level 16, State 1, Line 9\nThe statement terminated.\n\
  The maximum recursion 100 has been exhausted before statement completion.\n```\n\
  \n问题在于这些新的交叉点在图中创建了循环。问题可以从输出的第四行开始看出，当递归首次访问节点 G（IntersectionId 7）时。从那里，可以选择两条路径：向西到节点\
  \ F（IntersectionId 6）或向北到节点 C（IntersectionId 3）。\n\n遵循第一条路径，递归最终会完成。但遵循第二条路径，递归将不断地回到节点\
  \ G，一次又一次地沿着相同的两个分支前进。\n\n最终，达到默认的递归限制 100，执行以错误结束。请注意，可以使用`OPTION (MAXRECURSION\
  \ N)`查询提示来覆盖此默认限制，其中`N`是你希望使用的最大递归深度。在这种情况下，100 是一个很好的限制，因为它能迅速告诉我们存在一个重大问题！\n\n\
  幸运的是，解决这个问题很简单：检查路径以查明下一个节点是否已经被访问过，如果是，则不再访问它。由于路径是一个字符串，这可以通过使用`LIKE`谓词来实现，向递归成员的`WHERE`子句添加以下参数：`AND\
  \ p.thePath NOT LIKE '%/' + CONVERT(varchar, ss.IntersectionId_End) + '/%'`\n\n\
  此谓词检查确保以`/`分隔的结尾`IntersectionId`尚未出现在路径中——换句话说，尚未被访问。这将使递归不可能陷入循环。\n\n添加此修复后运行公用表表达式，消除了循环问题。修复后的公用表表达式的完整代码如下：\n\
  \n```sql\nDECLARE\n    @Start int = dbo.GetIntersectionId('Madison', '1st Ave'),\n\
  \    @End int = dbo.GetIntersectionId('Lexington', '1st Ave');\n\nWITH Paths\nAS\n\
  (\n    SELECT\n        @Start AS theStart,\n        IntersectionId_End AS theEnd,\n\
  \        CAST('/' +\n             CAST(@Start AS varchar(255)) + '/' +\n       \
  \      CAST(IntersectionId_End AS varchar(255)) + '/'\n             AS varchar(255)\
  \ ) AS thePath\n    FROM dbo.StreetSegments\n    WHERE\n        IntersectionId_Start\
  \ = @Start\n    UNION ALL\n    SELECT\n        p.theEnd,\n        ss.IntersectionId_End,\n\
  \        CAST(p.ThePath +\n             CAST(IntersectionId_End AS varchar(255))\
  \ + '/'\n             AS varchar(255)\n        )\n    FROM Paths p\n    JOIN dbo.StreetSegments\
  \ ss ON ss.IntersectionId_Start = p.theEnd\n    WHERE p.theEnd <> @End\n      AND\
  \ p.thePath NOT LIKE '%/' + CONVERT(varchar, ss.IntersectionId_End) + '/%'\n)\n\
  SELECT *\nFROM Paths;\nGO\n```\n\n至此，本章关于通用图的介绍就结束了。本章剩余部分将讨论层次结构的建模和查询。尽管层次结构比通用图更为专门化，但它们在软件项目中往往比通用图更常见，开发人员在建模时必须考虑略有不同的问题。\n\
  \n## 高级路由\n\n本节所示的示例是高度简化的，旨在教授查询图的基础知识，而非作为一个完整的路由解决方案。我曾有幸广泛参与一个设计用于遍历实际街道路线的生产系统，并将简要分享我获得的一些见解，以防你对这类问题感兴趣。\n\
  \n此处展示的解决方案的首要问题是可扩展性。一个大城市拥有数万个街道段，使用此方法确定从城市一端到另一端的路线将导致可能性的组合爆炸。为了减少组合数量，可以采取一些措施。\n\
  \n首先，可以为每个路段分配权重，并在遍历可能路径时累计评分。如果得分过高，可以终止递归。例如，在我参与的系统中，权重是根据行驶距离确定的。使用的算法相当复杂，但本质上，如果目的地在\
  \ 2 英里外，而路线超过了 3 英里，则终止该分支的递归。这种评分还使系统能够确定最短的可能路线。\n\n\n\n# 第 12 章：树、层次结构与图\n\n\
  另一种能大幅减少组合数量的方法是分析街道输入集，并确定某些地点之间的主要路线。例如，从城市一端到另一端，通常最直接的方式是走高速公路。如果系统判断高速公路路线是合适的，它会将路线规划问题分解为两部分：首先，找到从起点到高速公路入口匝道的最短路线；然后，找到从终点到高速公路出口的最短路线。将这些路段（包括高速公路行驶路段）组合起来，你就得到了一条从起点到终点的优化路径。像高速公路这样的主要路线，可以被降低权重（underweighted），以便它们在评分排名中显得更靠前。\n\
  \n如果你想尝试使用真实的街道数据，你可以从美国人口普查局免费下载美国地理形状文件（包括街道和各种自然地貌）。这些数据名为 `TIGER/Line`，可从 `www.census.gov/geo/www/tiger/index.html`\
  \ 获取。需要提醒的是：这些数据处理起来并不容易，需要大量清理工作才能使其达到易于查询的状态。\n\n## 邻接列表层次结构\n\n如前所述，任何类型的图都可以使用邻接列表来建模。这当然也包括层次结构，它不过是有根、有向、无环图的一种特殊形式，其中任意两个节点之间恰好只有一条路径（不考虑方向）。邻接列表层次结构非常易于建模、可视化和理解，但在某些情况下查询起来可能比较棘手或效率低下，因为它们需要迭代或递归，这一点我稍后会讨论。\n\
  \n遍历一个邻接列表层次结构实际上与遍历邻接列表图几乎相同，但由于层次结构中没有环，你不需要在代码中担心环的问题。这是一个很好的特性，因为它使你的代码更短、更易于理解、更高效。然而，要能够假设你的数据确实遵循层次结构而非一般图的结构，前期需要做一点工作。关于如何确保你的层次结构最终不会出现环、多个根节点或断开的子树，请参阅本节后面的“约束层次结构”部分。\n\
  \n邻接列表层次结构最常见的、易于识别的例子是一个自引用的员工表，用于建模员工及其经理。由于这是一个如此常见且易于理解的例子，本节及本章剩余部分都将使用这个场景。\n\
  \n首先，我们将基于 `AdventureWorks` 数据库的 `HumanResources.Employee` 表中的三列数据创建一个简单的邻接列表。使用的列如下：\n\
  \n*   `EmployeeID` 是表中每一行的主键。大多数情况下，邻接列表层次结构是以节点为中心而非以边为中心的方式建模的；也就是说，层次结构的主键是给定节点的键，而不是表示边的键。这是合理的，因为层次结构中的每个节点只能有一个直接祖先。\n\
  *   `ManagerID` 是同一表中每一行所汇报的员工的键。如果 `ManagerID` 为 `NULL`，则该员工是树中的根节点（即公司负责人）。在为邻接列表层次结构建模时，通常使用\
  \ `NULL` 或与该行主键相同的键来表示根节点。\n*   最后，`Title` 列代表员工的职位，将用于使输出更易于阅读。\n\n你可以使用以下 `T-SQL`\
  \ 基于这些列创建一个表：\n\n```\nUSE AdventureWorks;\nGO\nCREATE TABLE Employee_Temp\n(\n \
  \   EmployeeID int NOT NULL\n        CONSTRAINT PK_Employee PRIMARY KEY,\n    ManagerID\
  \ int NULL\n        CONSTRAINT FK_Manager REFERENCES Employee_Temp (EmployeeID),\n\
  \    Title nvarchar(100)\n);\nGO\nINSERT INTO Employee_Temp\n(\n    EmployeeID,\n\
  \    ManagerID,\n    Title\n)\nSELECT\n    EmployeeID,\n    ManagerID,\n```\n\n\n\
  # 标题\n\n```sql\nFROM HumanResources.Employee;\nGO\n```\n\n针对层次结构提出的问题类型，通常与上一节探讨的图遍历示例问题有所不同。对于邻接表以及其他本章讨论的层次模型，我们将考虑如何回答以下常见问题：\n\
  \n-   给定节点的**直接后代**是什么？换言之，哪些人直接向给定的管理者汇报？\n-   给定节点的*所有*后代是什么？也就是说，组织层级中最终向给定管理者汇报的所有下级有多少人？这里的挑战在于如何对输出进行排序，使其符合层次结构逻辑。\n\
  -   从给定的子节点返回根节点的路径是什么？换言之，沿着管理路径向上追溯，谁向谁汇报？\n\n我还将讨论以下数据修改方面的挑战：\n\n-   将新节点插入层次结构，例如当新员工被聘用时。\n\
  -   重定位子树，例如当某个部门被划归新管理者管辖时可能需要这样操作。\n-   从层次结构中删除节点，例如，可能因为人员流失而需要在组织层级中进行此操作。\n\
  \n本章讨论的每种技术在解决这些问题的复杂性上略有不同的难度，我将对何时使用每种模型提出一般性建议。\n\n### 查找直接后代\n\n在邻接表层次结构中，查找给定节点的直接后代相当简单；这与在图中查找可以遍历到的可用节点相同。首先为查询选择父节点，然后选择所有以该节点为父节点的节点。要查找所有直接向首席执行官（`EmployeeID`\
  \ 109）汇报的员工，请使用以下 T-SQL：\n\n```sql\nSELECT *\nFROM Employee_Temp\nWHERE ManagerID\
  \ = 109;\n```\n\n此查询返回的结果如下所示，显示了 AdventureWorks 的六个分支，由其高级管理团队代表——这正是我们预期的结果。\n\
  \n第 12 章 „ 树、层次结构与图\n\n| EmployeeID | ManagerID | 职务 |\n| :--- | :--- | :--- |\n\
  | 6 | 109 | 市场部经理 |\n| 12 | 109 | 工程部副总裁 |\n| 42 | 109 | 信息服务部经理 |\n| 140 | 109\
  \ | 首席财务官 |\n| 148 | 109 | 生产部副总裁 |\n| 273 | 109 | 销售部副总裁 |\n\n然而，此查询存在一个隐藏问题：在\
  \ `Employee_Temp` 表中从一个节点遍历到另一个节点意味着基于 `ManagerID` 列进行搜索。考虑到该列未被索引，前面查询的查询计划涉及扫描也就不足为奇了，如图\
  \ 12-8 所示。\n\n`图 12-8. 对 ManagerID 进行查询导致表扫描。`\n\n要消除此问题，必须在 `ManagerID` 列上创建索引。然而，为这样的表选择最佳的索引方式可能很困难。在这个小示例中，对\
  \ `ManagerID` 的聚集索引将为查询和数据更新提供最佳的整体性能组合，因为它涵盖了所有涉及遍历表的查询。但是，在实际的生产系统中，基于 `EmployeeID`\
  \ 的查询比例可能要高得多——例如，获取单个员工数据的查询——而且表中可能包含比此处用于示例目的的三个列多得多的列，这意味着聚集键查找可能代价高昂。\n\n在这种情况下，仔细测试哪种索引组合能为你的特定工作负载提供查询和数据修改性能的最佳平衡非常重要。\n\
  \n为了在本例中展示最佳性能，请将主键更改为使用非聚集索引，并在 `ManagerID` 上创建聚集索引，如下列 T-SQL 所示：\n\n```sql\nALTER\
  \ TABLE Employee_Temp\nDROP CONSTRAINT FK_Manager, PK_Employee;\n\nCREATE CLUSTERED\
  \ INDEX IX_Manager\nON Employee_Temp (ManagerID);\n\nALTER TABLE Employee_Temp\n\
  ADD CONSTRAINT PK_Employee\nPRIMARY KEY NONCLUSTERED (EmployeeID);\nGO\n```\n\n\n\
  # 第 12 章 树、层次结构与图形\n\n> **注意：** 为非键列 `ManagerId` 添加聚集索引，可能对专门查询“哪些员工向特定经理汇报”的查询产生最佳性能，但这不一定是通用员工表的最佳设计。\n\
  \n一旦完成此更改，重新运行用于查找 CEO 直属下属的 T-SQL 语句，将产生聚集索引寻址而非扫描——这是一次小幅改进，当对行数更多的表执行查询时，此改进效果将被放大。\n\
  \n### 向下遍历层次结构\n\n从查找单个节点的直接子节点转向向下遍历整个层次结构直至叶节点，这极其简单，与处理通用图的情况一样。递归公共表表达式（CTE）是可用于此目的的工具之一。以下\
  \ CTE（由图形部分的代码修改而来）从 CEO 开始遍历 `Employee_Temp` 层次结构，返回公司中的所有员工：\n\n```sql\nWITH n\
  \ AS\n(\n    SELECT\n        EmployeeID,\n        ManagerID,\n        Title\n  \
  \  FROM Employee_Temp\n    WHERE ManagerID IS NULL\n    UNION ALL\n    SELECT\n\
  \        e.EmployeeID,\n        e.ManagerID,\n        e.Title\n    FROM Employee_Temp\
  \ e\n    JOIN n ON n.EmployeeID = e.ManagerID\n)\nSELECT\n    n.EmployeeID,\n  \
  \  n.ManagerID,\n    n.Title\nFROM n;\nGO\n```\n\n请注意，此 CTE 返回所有列以供外部查询使用——但这并非编写此查询的唯一方式。也可以将查询编写为\
  \ CTE 仅使用并返回 `EmployeeID` 列，从而需要在外部查询中进行额外的 `JOIN` 操作以获取其他列：\n\n```sql\nWITH n AS\n\
  (\n    SELECT\n        EmployeeID\n    FROM Employee_Temp\n    WHERE ManagerID IS\
  \ NULL\n    UNION ALL\n    SELECT\n        e.EmployeeID\n    FROM Employee_Temp\
  \ e\n    JOIN n ON n.EmployeeID = e.ManagerID\n)\nSELECT\n    e.EmployeeID,\n  \
  \  e.ManagerID,\n    e.Title\nFROM n\nJOIN Employee_Temp e ON e.EmployeeID = n.EmployeeID;\n\
  GO\n```\n\n我认为后一种形式可能会减少 I/O 活动，但在针对此表以及具有更多列的表测试了索引与查询形式的几种组合后，我得出的结论是：没有直接的答案。随着输出行大小的增加，后一种查询往往表现更好，但在小型测试表的情况下，前一种查询则高效得多。再次强调，在部署解决方案前，您应该针对实际工作负载对此进行测试。\n\
  \n## 输出排序\n\n无论上一节中两个查询的性能如何，事实是我们尚未真正做太多工作。这两个查询目前的输出在逻辑上等价于 `SELECT * FROM Employee_Temp`\
  \ 的输出。为了增加价值，输出应进行排序，以符合表中所表示的层次结构。为此，我们可以使用“遍历图形”部分描述的相同路径技术，但无需担心循环。通过对路径进行排序，输出将遵循与层次结构本身相同的嵌套顺序。以下\
  \ T-SQL 展示了如何实现此目的：\n\n```sql\nWITH n AS\n(\n    SELECT\n        EmployeeID,\n \
  \       ManagerID,\n        Title,\n        CONVERT(varchar(900),\n            RIGHT(REPLICATE('0',\
  \ 10) + CONVERT(varchar, EmployeeID), 10) + '/'\n        ) AS thePath\n    FROM\
  \ Employee_Temp\n    WHERE ManagerID IS NULL\n    UNION ALL\n    SELECT\n      \
  \  e.EmployeeID,\n        e.ManagerID,\n        e.Title,\n        CONVERT(varchar(900),\n\
  \            n.thePath +\n            RIGHT(REPLICATE('0', 10) + CONVERT(varchar,\
  \ e.EmployeeID), 10) + '/'\n        ) AS thePath\n    FROM Employee_Temp e\n   \
  \ JOIN n ON n.EmployeeID = e.ManagerID\n)\nSELECT\n    n.EmployeeID,\n    n.ManagerID,\n\
  \    n.Title,\n    n.thePath\nFROM n\nORDER BY n.thePath;\nGO\n```\n\n运行此查询将产生如下所示的输出（为简洁起见已截断）：\n\
  \n| EmployeeID | ManagerID | Title                  | thePath                  \
  \        |\n| ---------- | --------- | ---------------------- | --------------------------------\
  \ |\n| 109        | NULL      | Chief Executive Officer | 0000000109/          \
  \            |\n| 6          | 109       | Marketing Manager      | 0000000109/0000000006/\
  \           |\n| 2          | 6         | Marketing Assistant    | 0000000109/0000000006/0000000002/\
  \ |\n| 46         | 6         | Marketing Specialist   | 0000000109/0000000006/0000000046/\
  \ |\n| 106        | 6         | Marketing Specialist   | 0000000109/0000000006/0000000106/\
  \ |\n| 119        | 6         | Marketing Specialist   | 0000000109/0000000006/0000000119/\
  \ |\n\n\n\n# 第 12 章 树、层次结构与图\n\n### CTE 是最佳选择吗？\n\n203 6 营销专员 0000000109/0000000006/0000000203/\n\
  269 6 营销助理 0000000109/0000000006/0000000269/\n271 6 营销专员 0000000109/0000000006/0000000271/\n\
  272 6 营销助理 0000000109/0000000006/0000000272/\n12 109 工程副总裁 0000000109/0000000012/\n\
  3 12 工程经理 0000000109/0000000012/0000000003/\n\n为了支持节点上的正确数字排序，我使用了前导零填充。这样可以确保，例如，路径\
  \ `1/2/` 不会排在路径 `1/10/` 之后。数字被填充到十位，以支持 SQL Server 的 `int` 数据类型所能支持的完整正整数范围。请注意，在此情况下，同级节点是根据其\
  \ `EmployeeID` 排序的。要更改同级节点的排序方式——例如，根据 `Title` 按字母顺序排序——需要对路径进行一些处理。\n\n不是具体化 `EmployeeID`，而是具体化一个代表当前有序同级节点的行号。这可以使用\
  \ SQL Server 的 `ROW_NUMBER` 函数完成，有时也被称为枚举路径。以下修改后的 CTE 版本枚举了路径：\n\n```sql\nWITH\
  \ n AS\n(\n    SELECT\n        EmployeeID,\n        ManagerID,\n        Title,\n\
  \        CONVERT(varchar(900), '0000000001/') AS thePath\n    FROM Employee_Temp\n\
  \    WHERE ManagerID IS NULL\n\n    UNION ALL\n\n    SELECT\n        e.EmployeeID,\n\
  \        e.ManagerID,\n        e.Title,\n        CONVERT(varchar(900),\n       \
  \     n.thePath +\n            RIGHT(\n                REPLICATE('0', 10) +\n  \
  \              CONVERT(varchar, ROW_NUMBER() OVER (ORDER BY e.Title)),\n       \
  \         10\n            ) + '/'\n        ) AS thePath\n    FROM Employee_Temp\
  \ e\n    JOIN n ON n.EmployeeID = e.ManagerID\n)\nSELECT\n    n.EmployeeID,\n  \
  \  n.ManagerID,\n    n.Title,\n    n.thePath\nFROM n\nORDER BY n.thePath;\nGO\n\
  ```\n\n查询结果中展示了代表每个节点的枚举路径，如下所示：\n\n`EmployeeID` `ManagerID` `Title` `thePath`\n\
  109 NULL 首席执行官 00000001/\n140 109 首席财务官 00000001/00000001/\n139 140 账户经理 00000001/00000001/00000001/\n\
  216 139 会计师 00000001/00000001/00000001/00000001/\n178 139 会计师 00000001/00000001/00000001/00000002/\n\
  166 139 应付账款专员 00000001/00000001/00000001/00000003/\n201 139 应付账款专员 00000001/00000001/00000001/00000004/\n\
  130 139 应收账款专员 00000001/00000001/00000001/00000005/\n94 139 应收账款专员 00000001/00000001/00000001/00000006/\n\
  59 139 应收账款专员 00000001/00000001/00000001/00000007/\n103 140 首席财务官助理 00000001/00000001/00000002/\n\
  71 140 财务经理 00000001/00000001/00000003/\n274 71 采购经理 00000001/00000001/00000003/00000001/\n\
  \n„ **提示** 你不必用前导零填充节点 ID，而是可以暴露类型为 `varbinary` 的 `thePath` 列，并将 ID 转换为 `binary(4)`。出于排序目的，这将产生相同的净效果，同时占用更少的空间——因此你会看到效率上的提升，此外，你还能在每一行的路径中容纳更多的节点\
  \ ID。缺点是这让 ID 更难以可视化，因此出于本章的目的——其中视觉提示很重要——我改用前导零填充方法。\n\n使用枚举路径而非具体化路径的缺点在于，枚举版本无法轻松解构以确定所遵循的键。例如，仅查看本节第一个查询结果中的\
  \ `thePath` 列，我们可以看到工程经理（`EmployeeID` 3）的路径始于 `EmployeeID` 109，然后到 `EmployeeID`\
  \ 12，最后到达工程经理。而使用枚举路径查看同一列时，若不沿着输出在层次结构中回溯，则无法发现构成给定路径的实际 ID。\n\n\n\n虽然公共表表达式（CTE）可能是\
  \ SQL Server 2008 中遍历**邻接列表**层次结构最便捷的方法，但它们并不一定能提供最佳性能。涉及临时表或表变量的迭代方法很可能优于递归 CTE，尤其是当层次结构规模增长时。\n\
  \n为了突出 CTE 与迭代方法之间的性能差异，需要一个更大的样本层次结构。首先，我们可以为 `Employee_Temp` 层次结构添加 `width`。这意味着层次结构将保持相同的深度，但每一层将有更多的兄弟节点。为了实现这一点，对于给定子树下的每一行，可以将员工\
  \ ID 和经理 ID 增加相同的已知量，从而在原地生成一个重复的子树。以下 T-SQL 完成了这项工作，通过循环运行五次，每次迭代使层次结构的*宽度*加倍：\n\
  \n```sql\nDECLARE @CEO int;\n\nSELECT\n    @CEO = EmployeeID\nFROM Employee_Temp\n\
  WHERE ManagerID IS NULL;\n\nDECLARE @width int = 1;\n\nWHILE @width <= 16\nBEGIN\n\
  \    INSERT INTO Employee_Temp\n    (\n        EmployeeID,\n        ManagerID,\n\
  \        Title\n    )\n    SELECT\n        e.EmployeeID + (1000 * @width),\n   \
  \     CASE e.ManagerID\n            WHEN @CEO THEN e.ManagerID\n            ELSE\
  \ e.ManagerID + (1000 * @width)\n        END,\n        e.Title\n    FROM Employee_Temp\
  \ e\n    WHERE\n        e.ManagerID IS NOT NULL;\n\n    SET @width = @width * 2;\n\
  END;\nGO\n```\n\n在这个示例中，有两个关键因素需要注意。首先是 `@width` 变量，它在每次迭代时加倍，以避免在键递增时发生键冲突。其次，查看\
  \ `SELECT` 列表中的 `CASE` 表达式，它递增了除 CEO ID 以外的所有 ID。这确保了重复的子树将作为整体附加到树上，因为这些子树的根节点是\
  \ CEO 节点的下属，而不是每个子树顶部的节点成为额外的根节点。\n\n## 第 12 章 „ 树、层次结构和图\n\n运行此代码后，`Employee_Temp`\
  \ 层次结构将拥有 9,249 个节点，而不是我们开始时的 290 个。然而，该层次结构仍然只有五层。要增加 `depth`，需要一个稍有不同的算法。要添加层级，需找到除\
  \ CEO 外的所有经理，并插入新的重复节点，类似于之前那样递增其员工 ID。接下来，更新表中现有的经理，使其向新的经理汇报。以下 T-SQL 通过循环四次实现了这一点，生成了一个深度为\
  \ 50 层、包含 31,329 个节点的层次结构：\n\n```sql\nDECLARE @CEO int;\n\nSELECT\n    @CEO = EmployeeID\n\
  FROM Employee_Temp\nWHERE ManagerID IS NULL;\n\nDECLARE @depth int = 32;\n\nWHILE\
  \ @depth <= 256\nBEGIN\n    DECLARE @OldManagers table\n    (\n        EmployeeID\
  \ int\n    );\n\n    --插入中间经理\n    --找到除 CEO 外的所有经理，并将其 EmployeeID 增加 1000\n   \
  \ INSERT INTO Employee_Temp\n    (\n        EmployeeID,\n        ManagerID,\n  \
  \      Title\n    )\n    OUTPUT inserted.EmployeeID - (1000 * @depth) INTO @OldManagers\n\
  \    SELECT\n        e.EmployeeID + (1000 * @depth) as newemp,\n        e.ManagerID,\n\
  \        'Intermediate Manager'\n    FROM Employee_Temp e\n    WHERE\n        e.EmployeeID\
  \ <> @CEO\n        AND EXISTS\n        (\n            SELECT *\n            FROM\
  \ Employee_Temp e1\n            WHERE e1.ManagerID = e.EmployeeID\n        );\n\n\
  \    --更新现有经理，使其向中间经理汇报\n    UPDATE Employee_Temp\n    SET ManagerID = EmployeeID\
  \ + (1000 * @depth)\n    WHERE\n        EmployeeID IN\n        (\n            SELECT\
  \ EmployeeID\n            FROM @OldManagers\n        );\n\n    SET @depth = @depth\
  \ * 2;\nEND;\nGO\n```\n\n向实验性层次结构添加额外深度时要小心。我发现深度对性能的影响远大于宽度，而且极深的层次结构并不特别常见——例如，即使是最大的公司，通常也不会超过\
  \ 20 或 30 层的管理层级。\n\n要使用表变量迭代遍历层次结构，可以思考递归做了什么：在每一层，根据上一层的经理找到对应的员工，然后该层成为当前层。迭代应用此逻辑需要以下表变量：\n\
  \n```sql\nDECLARE @n table\n(\n    EmployeeID int,\n    ManagerID int,\n    Title\
  \ nvarchar(100),\n    Depth int,\n    thePath varchar(900)\n);\n```\n\n\n# 第 12\
  \ 章：树、层次结构与图表\n\n## 主键（深度，员工 ID）\n\n`Depth` 列在插入节点时维护其层级。表按 `Depth` 和 `EmployeeID`\
  \ 的组合进行聚集；在每个层级，将首先查询深度，并且我们知道 `EmployeeID` 将是唯一的，因此可以利用它来确保键本身是唯一的。\n\n首先，用您希望作为遍历根的节点初始化表变量。这里将使用首席执行官节点，路径以\
  \ `1/` 开始，因为将实现前一示例中所示的枚举路径输出：\n\n```sql\nDECLARE @depth int = 1;\n\nINSERT INTO\
  \ @n\nSELECT\n    EmployeeID,\n    ManagerID,\n    Title,\n    @depth,\n    '0000000001/'\n\
  FROM Employee_Temp\nWHERE ManagerID IS NULL;\n```\n\n在第一行就位后，逻辑与 CTE 中使用的递归逻辑相同。对于每个深度层级，查找下属。唯一的区别是，这是使用\
  \ `WHILE` 循环完成的，而不是递归 CTE：\n\n```sql\nWHILE 1=1\nBEGIN\n    INSERT INTO @n\n   \
  \ SELECT\n        e.EmployeeID,\n        e.ManagerID,\n        e.Title,\n      \
  \  @depth + 1,\n        n.thePath +\n            RIGHT(\n                REPLICATE('0',\
  \ 10) +\n                CONVERT(varchar, ROW_NUMBER() OVER\n                  \
  \  (PARTITION BY e.ManagerID ORDER BY e.Title)),\n                10) + '/'\n  \
  \  FROM Employee_Temp e\n    JOIN @n n on n.EmployeeID = e.ManagerID\n    WHERE\
  \ n.Depth = @depth;\n\n    IF @@ROWCOUNT = 0\n        BREAK;\n\n    SET @depth =\
  \ @depth + 1;\nEND\n```\n\n最后，可以从表变量中查询输出。和之前一样，需要 `ORDER BY` 子句：\n\n```sql\nSELECT\n\
  \    EmployeeID,\n    ManagerID,\n    Title,\n    thePath\nFROM @n\nORDER BY\n \
  \   thePath;\n```\n\n此方法使用的代码比 CTE 多出 50% 以上，相当不直观，并且存在更多可能引入逻辑错误的潜在区域。然而，其性能比 CTE\
  \ 好得多。在我的笔记本电脑上，针对增强型 `Employee_Temp` 表，枚举路径 CTE 执行 347,282 次读取，运行时间为 27.6 秒。而迭代方法仅需\
  \ 173,536 次读取，运行时间为 13.2 秒。\n\n尽管在此案例中性能有明显提升，但我并不建议在大多数情况下使用此方法。我认为，除了最极端的情况（如此处演示的案例），可维护性问题盖过了性能优势。因此，本章剩余的示例将使用\
  \ CTE。不过，您应该能够将任何示例转换为使用迭代逻辑。如果您决定在项目中使用此技术，可能会发现将代码封装在多语句表值 UDF 中是有益的，以提供更大的重用潜力。\n\
  \n**注意** 如果您正按照本章的示例操作，并且增加了 `Employee_Temp` 表中的行数，则应在继续本章剩余内容之前删除并重新创建它。\n\n###\
  \ 向上遍历层次结构\n\n对于邻接列表，向上遍历层次结构——换句话说，查找任意给定节点到根节点的祖先路径——本质上与向下遍历层次结构相反。在递归的每个层级，不使用\
  \ `ManagerID` 作为键，而是使用 `EmployeeID`。以下 CTE 展示了如何获取从研发经理（`EmployeeID` 217）到首席执行官的路径：\n\
  \n```sql\nWITH n AS\n(\n    SELECT\n        ManagerID,\n        CONVERT(varchar(900),\n\
  \            RIGHT(\n                REPLICATE('0', 10) +\n                CONVERT(varchar,\
  \ EmployeeID) + '/', 10)\n        ) AS thePath\n    FROM Employee_Temp\n    WHERE\
  \ EmployeeID = 217\n\n    UNION ALL\n\n    SELECT\n        e.ManagerID,\n      \
  \  CONVERT(varchar(900),\n            n.thePath +\n            RIGHT(\n        \
  \        REPLICATE('0', 10) +\n                CONVERT(varchar, e.EmployeeID),\n\
  \                10) + '/'\n        ) AS thePath\n    FROM Employee_Temp e\n   \
  \ JOIN n ON n.ManagerID = e.EmployeeID\n)\nSELECT *\nFROM n\nWHERE ManagerID IS\
  \ NULL;\n```\n\n此查询将从所选节点到首席执行官的路径作为员工 ID 的物化路径返回。但是，您可能更希望将结果作为员工 ID 表返回。为此，将外部查询更改为以下内容：\n\
  \n```sql\nSELECT\n    COALESCE(ManagerID, 217) AS EmployeeID\nFROM n\nORDER BY\n\
  \    CASE\n        WHEN ManagerID IS NULL THEN 0\n        ELSE 1\n    END,\n   \
  \ thePath;\n```\n\n在此案例中，`SELECT` 列表中使用的 `COALESCE` 函数将首席执行官的 `ManagerID`（为 `NULL`）替换为目标\
  \ `EmployeeID`。`ORDER BY` 子句中的 `CASE` 表达式强制 `NULL` 行排在最前面，以便首先返回目标 `EmployeeID`。所有其他排序基于物化路径，这自然会将首席执行官的行排在最后。\n\
  \n### 插入新节点和重新定位子树\n\n在邻接列表层次结构中，插入新节点通常非常简单。插入叶节点（即没有下属的节点）只需在表中插入一个新节点。要插入非叶节点，还必须更新您在其下插入节点的任何直接下属，使它们指向新的管理者。这实际上等同于插入一个新节点，然后将旧节点的子树重新定位到新节点下，这就是为什么我将这两个主题合并为一节的原因。\n\
  \n例如，假设 AdventureWorks 决定聘请一位新的首席技术官，当前的工程副总裁（`EmployeeID` 12）将向其汇报。要在 `Employee_Temp`\
  \ 表中反映这些更改，首先插入新的首席技术官节点，然后将副总裁的节点更新为向新的首席技术官汇报：\n\n```sql\nINSERT INTO Employee_Temp\n\
  (\n    EmployeeID,\n    ManagerID,\n    Title\n)\nVALUES\n(\n    999,\n    109,\n\
  \    'CTO'\n);\nGO\n\nUPDATE Employee_Temp\nSET ManagerID = 999\nWHERE EmployeeID\
  \ = 12;\nGO\n```\n\n就是这样！相同的逻辑可应用于任何子树重新定位——邻接列表相对于本章讨论的其他层次结构技术的优势之一，就是可以轻松处理此类数据修改。\n\
  \n### 删除现有节点\n\n在邻接列表中删除节点仅比插入新的非叶节点稍微复杂一点。这次，第一步是将所有下属重新定位到待删除节点之外——关键是 *下属* 是复数，因为可能不止一个。一旦这些子树被重新定位到新的管理者下，就可以简单地删除叶节点。\n\
  \n假设在新的首席技术官上班第一天，她中彩票了，并决定宁愿去玩帆船比赛也不愿继续在 AdventureWorks 工作。将她从组织层次结构中移除需要将她的下属重新定位回首席执行官，然后删除她的节点（该节点将成为叶节点）。由于表上的自引用外键，非叶节点无法被删除——这是邻接列表的另一个不错的附带好处。\n\
  \n以下 T-SQL 可用于将首席技术官的下属重新定位到她的直接管理者，然后移除首席技术官的节点：\n\n```sql\nUPDATE Employee_Temp\n\
  SET ManagerID =\n    (\n        SELECT ManagerID\n        FROM Employee_Temp\n \
  \       WHERE EmployeeID = 999\n    )\nWHERE ManagerID = 999;\n\nDELETE FROM Employee_Temp\n\
  WHERE EmployeeID = 999;\n```\n\n此代码通过查找待移除节点的管理者，并将该节点的所有直接下属更新为指向该管理者（换句话说，每个下属的“祖父”节点成为他们的“父”节点）来工作。更新完成后，该节点成为叶节点，因此可以被移除。\n\
  \n### 约束层次结构\n\n本章展示的每个层次结构遍历示例都对数据做出了一个非常重要的假设：理所当然地认为没有循环或其他违反有效层次结构规则的数据问题。此假设的主要好处是生成的代码可以简化很多；问题在于，如果不良数据渗入，更简单的代码容易出现各种问题——正如大多数读者无疑意识到的，如果有机会，不良数据可以也\
  \ *将* 会渗入。\n\n\n简洁的代码是件好事，因此，与其让代码变得更复杂，我们有一个选择：要么凭运气祈祷系统在运行时永远不会崩溃，要么更好一些，实际约束数据以确保其保持有效。从防御的角度来看，我强烈推荐第二种方法。\n\
  \n有两个可能的问题会让层次查询变得棘手：**森林** 和 **循环**。\n\n`森林` 指的是在层次结构中存在多个根节点。虽然对于某些类型的数据来说这可能是合理的，但对于组织结构图来说则不然。`循环`\
  \ 指的是在给定节点的下游某处，该节点突然又被引用。例如，如果乔治管理艾德，艾德管理史蒂夫，而史蒂夫又管理乔治，就形成了一个循环——这不仅不现实，还会因为无限循环而导致运行时异常！\n\
  \n我们一直在使用的 `Employee_Temp` 表已经具备了一些有助于防范特定问题的约束：一个主键和一个自引用外键。位于 `EmployeeID` 列上的主键通过确保一个给定的员工不可能有多个经理来防范大多数循环。而自引用外键则能防范大多数森林问题，因为每个节点都必须连接到另一个已存在的节点——除非它是根节点。\n\
  \n# 第 12 章 树、层次结构和图\n\n首先必须约束的是多个根节点。处理此问题可能想到的一种方法是使用触发器，但我发现使用索引视图更有趣：\n\n```sql\n\
  CREATE VIEW OnlyOneRoot\nWITH SCHEMABINDING\nAS\nSELECT\n    ManagerID\nFROM dbo.Employee_Temp\n\
  WHERE\n    ManagerID IS NULL;\nGO\n\nCREATE UNIQUE CLUSTERED INDEX IX_OnlyOneRoot\n\
  ON OnlyOneRoot (ManagerID);\nGO\n```\n\n该视图返回表中所有 `NULL` 经理 ID 的行，而索引因为是 `UNIQUE`\
  \ 的，所以只允许插入一行这样的记录。\n\n虽然这种方法能有效防止创建多个根节点，但它并不能强制执行层次结构应始终有 *恰好* *一个* 根节点的条件。例如，它无法阻止有人为根节点分配一个经理（唯一约束只能约束存在的行，通过更新表，`NULL`\
  \ 经理 ID 将不复存在）。为了解决这个问题，可以使用触发器来确保表中始终至少有一个 `NULL` 经理 ID：\n\n```sql\nCREATE TRIGGER\
  \ tg_AtLeastOneRoot\nON Employee_Temp\nFOR UPDATE\nAS\nBEGIN\n    SET NOCOUNT ON;\n\
  \n    IF NOT EXISTS\n    (\n        SELECT *\n        FROM Employee_Temp\n     \
  \   WHERE ManagerID IS NULL\n    )\n    BEGIN\n        RAISERROR('需要根节点', 16, 1);\n\
  \        ROLLBACK;\n    END\nEND;\nGO\n```\n\n为了消除循环的可能性，我们需要考虑表中可能存在哪些类型的循环。首先，最简单的循环——也是主键或外键都无法约束的——是员工管理自己。这可以通过一个检查约束轻松解决：\n\
  \n```sql\nALTER TABLE Employee_Temp\nADD CONSTRAINT ck_ManagerIsNotEmployee\nCHECK\
  \ (EmployeeID <> ManagerID);\nGO\n```\n\n这个约束对更深层次的循环无能为力，即一个员工在自己下方一层或多层管理自己。例如，如果乔治管理艾德，艾德管理史蒂夫，有人可能会更新表，让艾德管理乔治。这将产生一个更深层次的循环，而该约束将无法捕获。为了解决这个问题，可以使用触发器。触发器应该从更新的行开始，沿着树向上遍历到根节点。如果在到达根节点之前再次遇到同一个员工，就说明存在循环。以下是这样一个触发器的代码：\n\
  \n```sql\nCREATE TRIGGER tg_NoCycles\nON Employee_Temp\nFOR UPDATE\nAS\nBEGIN\n\
  \    SET NOCOUNT ON;\n\n    --仅当 ManagerID 列被更新时才检查\n    IF NOT UPDATE(ManagerID)\n\
  \        RETURN;\n\n    --避免循环\n    DECLARE @CycleExists bit = 0;\n\n    --沿着层次结构向上朝叶子节点遍历\n\
  \    WITH e AS\n    (\n        SELECT EmployeeID, ManagerID\n        FROM inserted\n\
  \        UNION ALL\n        SELECT e.EmployeeID, et.ManagerID\n        FROM Employee_Temp\
  \ et\n        JOIN e ON e.ManagerID = et.EmployeeID\n        WHERE\n           \
  \ et.ManagerID IS NOT NULL\n            AND e.ManagerID <> e.EmployeeID\n    )\n\
  \    SELECT @CycleExists = 1\n    FROM e\n    WHERE e.ManagerID = e.EmployeeID;\n\
  \n    IF @CycleExists = 1\n    BEGIN\n        RAISERROR('该更新引入了循环', 16, 1);\n  \
  \      ROLLBACK;\n    END\nEND\nGO\n```\n\n这种类型的循环只能由更新或多行插入引起，而在实际生产环境的几乎所有层次结构中，都不存在多行插入。因此，该触发器设置为仅在更新时触发。如果你的环境中需要处理多行插入，请记得修改触发器定义。\n\
  \n`注意` 过度或不恰当地使用触发器会降低查询性能。虽然本节提出的解决方案在数据库中使用触发器解决了循环问题，但如果你觉得在应用层强制执行此类业务逻辑更有意义，也可以考虑这种方式。\n\
  \n## 持久化物化路径\n\n邻接表模型虽然是建模层次结构的事实标准，并且从数据操作的角度来看极其易于使用，但由于必须使用递归或迭代来遍历层次结构，因此存在效率低下的问题。在本节中，我们将探讨一种避免此问题的替代技术：`持久化物化路径`。虽然该技术可以作为邻接表的独立替代方案，但我建议将其与现有的邻接表层次结构结合使用。在接下来的章节中，我将展示如何通过一系列触发器，在\
  \ `Employee_Temp` 表中同时维护这两种层次结构类型。\n\n在上一节的示例中，物化路径用于为输出目的提供层次结构的有序表示。相同的路径可以持久化存储在表中，使你能够回答与邻接表相同的所有层次问题，而无需递归或迭代。\n\
  \n要向 `Employee_Temp` 表添加并填充一个物化路径列，首先添加一个类型为 `varchar(900)` 的新列，然后使用递归 CTE 来获取每个节点的路径并更新表：\n\
  \n```sql\nALTER TABLE Employee_Temp\nADD thePath varchar(900);\nGO\n\nWITH n AS\n\
  (\n    SELECT\n        EmployeeID,\n        CONVERT(varchar(900),\n            '/'\
  \ + CONVERT(varchar, EmployeeID) + '/'\n        ) AS thePath\n    FROM Employee_Temp\n\
  \    WHERE ManagerID IS NULL\n\n    UNION ALL\n\n    SELECT\n        e.EmployeeID,\n\
  \        CONVERT(varchar(900),\n            n.thePath +\n            CONVERT(varchar,\
  \ e.EmployeeID) + '/'\n        ) AS thePath\n    FROM Employee_Temp e\n    JOIN\
  \ n ON n.EmployeeID = e.ManagerID\n)\nUPDATE Employee_Temp\nSET Employee_Temp.thePath\
  \ = n.thePath\nFROM Employee_Temp\nJOIN n ON n.EmployeeID = Employee_Temp.EmployeeID;\n\
  GO\n```\n\n`varchar(900)` 在这个案例中很重要，因为物化路径将被用作索引键，以便能够高效地用于遍历层次结构。SQL Server 中的索引键限制为\
  \ 900 字节。这对于持久化物化路径也是一个限制；导航特别深的层次结构的路径将无法被索引，因此无法用于此技术。\n\n\n\n# 物化路径的索引与查询\n\n\
  与纯邻接表层次结构一样，持久化物化路径的最佳索引方案应通过针对特定工作负载的仔细测试来确定。尽管如此，我几乎可以保证，**聚集索引**永远不会是正确的选择。由于路径可能变得非常大，并且每个非聚集索引都会继承聚集索引的键，因此在路径上进行聚集会增大表上创建的每个索引的页面大小。路径在非索引形式下不带来任何价值，因此我不建议尝试该技术。相反，应创建一个非聚集覆盖索引，并使用\
  \ `INCLUDE` 子句来包含通常与数据的层次搜索结合使用的任何列。在 `Employee_Temp` 表的情况下，索引将包含 `Title` 和 `EmployeeID`\
  \ 列，以便可以通过物化路径最有效地生成先前显示的输出（该表聚集在 `ManagerID` 上，因此无需显式包含）：\n\n```sql\nCREATE NONCLUSTERED\
  \ INDEX IX_Employee_Temp_Path\nON Employee_Temp (thePath)\nINCLUDE (EmployeeID,\
  \ Title);\n```\n\n## 查找下属节点\n\n由于物化路径是一个字符串，我们可以利用 SQL Server 的 `LIKE` 谓词来遍历层次结构。对于作为某个节点\
  \ M 的下属的每个给定节点 N，其路径以节点 M 的路径开头。回顾上一节中枚举路径的结果，注意由于所有节点都是 EmployeeID 109（CEO）的后代，每个路径都以字符串\
  \ `109/` 开头。\n\n同样，在层次结构中向下移动时，每个下属节点都会继承其父节点的路径，并将自己的 ID 添加到末尾。\n\n因此，使用 `LIKE`\
  \ 谓词并添加通配符字符 `%`，即可简单地搜索给定员工的所有下属。以下查询使用物化路径查找工程副总裁（EmployeeID 12）的所有下属：\n\n```sql\n\
  DECLARE @Path varchar(900);\nSELECT @Path = thePath\nFROM Employee_Temp\nWHERE EmployeeID\
  \ = 12;\n\nSELECT *\nFROM Employee_Temp\nWHERE\n    thePath LIKE @Path + '%'\nORDER\
  \ BY thePath;\n```\n\n即使对于小表，此查询与 CTE 解决方案相比的性能也相当令人印象深刻。使用 CTE 查找副总裁的所有下属，查询引擎必须执行\
  \ 187 次逻辑读取。而使用物化路径仅需 6 次。\n\n仅查找给定节点的直接报告则稍微复杂一些。这次，裸通配符不起作用，因为它将返回输入节点、其子节点以及子节点的子节点。要排除输入节点，我们可以将谓词更改为\
  \ `thePath LIKE @Path + '%/'`。这对于输入节点将返回 false，因为其路径中没有额外的斜杠。然而，这仍然包括所有子节点，因为每个子节点的路径都带有斜杠后缀。要排除子节点的子节点，必须添加以下\
  \ `NOT LIKE` 谓词：`AND thePath NOT LIKE @Path + '%/%/'`。本质上，该谓词表示目标路径只能比输入路径多一个斜杠——因此，该路径深度低一级。以下\
  \ T-SQL 查找工程副总裁的直接报告：\n\n```sql\nDECLARE @Path varchar(900);\nSELECT @Path = thePath\n\
  FROM Employee_Temp\nWHERE EmployeeID = 12;\n\nSELECT *\nFROM Employee_Temp\nWHERE\n\
  \    thePath LIKE @Path + '%/'\n    AND thePath NOT LIKE @Path + '%/%/';\n```\n\n\
  ### 向上遍历层次结构\n\n持久化物化路径的一个限制是，没有特别有效的方法来使用它们向上遍历层次结构以生成“我们如何从当前节点到达 CEO”的报告。然而，物化路径本身已经包含了所有必要的信息——只是需要对数据进行一些操作才能将其转换为可用的格式。\n\
  \n\n\n# 树、层次结构与图形\n\n## 每位员工的路径都是一个由斜杠分隔的有序节点列表，该列表从根节点开始，延伸到给定的员工。为了从该列表生成一个表，必须根据其分隔符进行拆分。这可以通过递归使用\
  \ `SUBSTRING` 函数来完成。通过将此逻辑置于递归公用表表达式 (CTE) 中，我们可以在每次迭代时提取路径中每个节点的子字符串。同时，我们可以记住列表中节点的顺序，以便能够正确地对输出进行排序。下面的\
  \ CTE 从研发部经理开始，寻找通往 CEO 的路径：\n\n```sql\nWITH n AS\n(\n    SELECT\n        CONVERT(int,\n\
  \            SUBSTRING(thePath, 2, CHARINDEX('/', thePath, 2) -2)) AS EmployeeID,\n\
  \        SUBSTRING(thePath, CHARINDEX('/', thePath, 2), LEN(thePath)) AS thePath,\n\
  \        1 AS theLevel\n    FROM Employee_Temp\n    WHERE EmployeeID = 217\n\n \
  \   UNION ALL\n\n    SELECT\n        CONVERT(int,\n            SUBSTRING(thePath,\
  \ 2, CHARINDEX('/', thePath, 2) -2)),\n        SUBSTRING(thePath, CHARINDEX('/',\
  \ thePath, 2), LEN(thePath)),\n        theLevel + 1\n    FROM n\n    WHERE thePath\
  \ LIKE '/%/'\n)\n\nSELECT *\nFROM n\nORDER BY theLevel;\n```\n\n该查询的输出如下：\n\n| EmployeeID\
  \ | thePath | theLevel |\n| :--- | :--- | :--- |\n| 109 | /12/3/158/217/ | 1 |\n\
  | 12 | /3/158/217/ | 2 |\n| 3 | /158/217/ | 3 |\n| 158 | /217/ | 4 |\n| 217 | |\
  \ 5 |\n\n除了用于提取当前第一个节点的表达式之外，我在锚定成员和递归成员中使用的另一个表达式，从路径中切掉了第一个节点，这样随着 CTE 在每一层级递归，路径会逐渐缩短。这一次，切分从第一个分隔符之后开始——并取路径的剩余全部内容。\n\
  \n虽然 `EmployeeID` 列可能是输出中唯一必需的列，但我保留了其他列，以便您可以看到路径如何受到 CTE 在每一层级逻辑的影响。\n\n### 插入节点\n\
  \n每当向层次结构添加一个新的叶节点时，必须确定其父节点的路径，并将新节点附加到该路径后面。此逻辑可以封装在触发器中，以便每当新节点被插入到邻接表中时，它们的路径会自动更新。以下触发器处理此逻辑：\n\
  \n```sql\nCREATE TRIGGER tg_Insert\nON Employee_Temp\nFOR INSERT\nAS\nBEGIN\n  \
  \  SET NOCOUNT ON;\n\n    IF @@ROWCOUNT > 1\n    BEGIN\n        RAISERROR('Only\
  \ one node can be inserted at a time', 16, 1);\n        ROLLBACK;\n    END\n\n \
  \   UPDATE e\n    SET e.thePath =\n        Managers.thePath +\n        RIGHT(\n\
  \            REPLICATE('0', 10) + CONVERT(varchar, i.EmployeeID),\n            10)\
  \ + '/'\n    FROM Employee_Temp e\n    JOIN inserted i ON i.EmployeeID = e.EmployeeID\n\
  \    JOIN Employee_Temp Managers ON Managers.EmployeeID = e.ManagerID;\nEND;\nGO\n\
  ```\n\n这个触发器的逻辑相对简单：通过连接 `Employee_Temp` 表和 `inserted` 虚拟表的 `EmployeeID` 列来找到要更新的行，然后连接回\
  \ `Employee_Temp` 表以获取经理的路径。最后，将员工的 ID 连接到路径的末尾。\n\n关于这个触发器，最重要的是要提到它在处理多行插入时的局限性。由于\
  \ SQL Server 无法保证更新顺序，因此同时插入两个节点可能会创建无效的路径。例如，尝试禁用行数检查，并在同一条语句中先插入一个下属，然后再插入一个经理：\n\
  \n```sql\nINSERT INTO Employee_Temp\n(\n    EmployeeID,\n    ManagerID,\n    Title\n\
  )\nVALUES\n    (1000, 999, 'Subordinate'),\n    (999, 109, 'Manager');\n```\n\n\
  由于 `UPDATE` 处理行的顺序无法保证，此操作的结果是非确定性的。因此，下属最终可能得到一个 `NULL` 路径，因为在更新它的行时，经理的路径可能尚未被处理。通过使用游标遍历\
  \ `inserted` 表中存在的任何层次结构，或许可以解决这个问题，但我决定不尝试这样做，因为我从未在真实项目中遇到过此限制会成为障碍的情况。\n\n###\
  \ 重新定位子树\n\n数据修改是这种持久化物化路径技术的真正缺点。任何时候影响节点的路径，都必须将新路径级联到其所有下属。这可能意味着某些更新极其昂贵——如果某位副总裁接替了\
  \ CEO，层次结构中的每个节点都必须更新！幸运的是，平均成本并不高；以下 T-SQL 查询在 `Employee_Temp` 层次结构中查找 `` `管理幅度`\
  \ `` 或平均下属数量——结果发现是四：\n\n```sql\nSELECT AVG(NumberOfSubordinates)\nFROM\n(\n   \
  \ SELECT COUNT(*) AS NumberOfSubordinates\n    FROM Employee_Temp e\n    JOIN Employee_Temp\
  \ e2 ON e2.thePath LIKE e.thePath + '%'\n    GROUP BY e.EmployeeID\n) x;\n```\n\n\
  重新定位物化路径的子树涉及找到新经理的路径，并在更新的节点及其所有子节点中替换它。通过例子可以看得更清楚，因此考虑一下如果工程经理（`EmployeeID` 为\
  \ 3）得到晋升并现在直接向 CEO 汇报会发生什么。她的路径将变为 CEO 的路径，并在其末尾连接她的员工 ID：`0000000109/0000000003/`。此操作还将使设计工程师和高级工具设计师的路径失效，这两者的路径都依赖于工程经理的路径。因此，同样的操作——替换路径的开头部分——必须对所有三个节点执行。对于他们的任何下属，也必须执行此操作，一直向下到树的底部，因为每个下属都继承其经理的路径。\n\
  \n同样，可以利用触发器在基于邻接表重新定位子树时自动执行此更新。以下触发器处理该逻辑：\n\n```sql\nCREATE TRIGGER tg_Update\n\
  ON Employee_Temp\nFOR UPDATE\nAS\nBEGIN\n    DECLARE @n int = @@ROWCOUNT;\n\n  \
  \  IF UPDATE(thePath)\n    BEGIN\n        RAISERROR('Direct updates to the path\
  \ are not allowed', 16, 1);\n        ROLLBACK;\n    END\n\n    IF UPDATE(ManagerID)\n\
  \    BEGIN\n        IF @n > 1\n        BEGIN\n            RAISERROR('Only update\
  \ one node''s manager at a time', 16, 1);\n            ROLLBACK;\n        END\n\n\
  \        --Update all nodes using the new manager's path\n        UPDATE e\n   \
  \     SET e.thePath =\n            REPLACE(e.thePath, i.thePath,\n             \
  \   Managers.thePath +\n                RIGHT(\n                    REPLICATE('0',\
  \ 10) + CONVERT(varchar, i.EmployeeID),\n                    10) + '/'\n       \
  \     )\n        FROM Employee_Temp e\n        JOIN inserted i ON e.thePath LIKE\
  \ i.thePath + '%'\n        JOIN Employee_Temp Managers ON Managers.EmployeeID =\
  \ i.ManagerID\n    END\nEND\nGO\n```\n\n这个触发器中有几点需要讨论。从顶部开始，触发器首先获取更新操作影响的行数。就像处理插入新节点一样，重新定位子树必须序列化为一次一个节点，以避免逻辑上的歧义。\n\
  \n然而，在这种情况下，并不会立即抛出错误；可能有人正在更新表中的其他列，例如将所有“Production Technicians”更改为“Production\
  \ Specialists”。只要更新不是针对层次结构的，当然允许多行更新。\n\n首先进行的错误检查是针对对路径的直接更新——这是不允许的，因为这是触发器的职责。接下来，触发器检查\
  \ `ManagerID` 列是否正在被更新。如果不是，它就无事可做。如果是，并且影响了多个行，则抛出错误。最后，如果没有问题，则基于新经理的路径更新受影响节点及其所有下属的路径。所使用的逻辑是找到更新节点的先前路径——使用\
  \ `inserted` 虚拟表，因为它仍然包含原始路径（因为直接对路径的更新是不允许的）——并在所有节点中将其替换为新路径。\n\n和之前一样，这个触发器可能可以通过使用游标来处理多行更新，但我认为实现这样一个解决方案所需的努力并不值得。\n\
  \n\n\n\n# 第 12 章 树、层次结构与图\n\n**注意** 如果将 `tg_AtLeastOneRoot` 触发器与 `tg_Update` 触发器结合使用，当您需要交换根节点时会遇到问题。因为要满足\
  \ `tg_AtLeastOneRoot` 触发器的逻辑，更新操作必须以一个根节点就位结束，而这将需要多行更新。幸运的是，这种情况通常不常发生，但如果您确实需要这样做，请记住在进行更改前禁用其中一个触发器，并在操作完成后立即重新启用它，以确保在此期间其他调用者不会引入数据不一致。\n\
  \n### 删除节点\n\n得益于邻接表与物化路径的结合使用，删除节点无需额外逻辑。由于邻接表上的自引用约束，只能删除叶节点。叶节点没有下属，因此无需级联操作——该行将被删除，无需进一步逻辑。这是在同一个表中保持两种层次模型的主要好处之一——每种模型都继承了对方的约束，有助于确保更高的数据完整性。\n\
  \n### 约束层次结构\n\n前一节“约束层次结构”（讨论邻接表）中提到的所有逻辑仍然适用于物化路径。然而，使用物化路径时，检测环要容易得多，因此无需使用 `tg_NoCycles`\
  \ 触发器。取而代之，应使用一个简单的检查约束，确保给定员工只在路径末尾出现一次：\n\n```sql\nALTER TABLE Employee_Temp\n\
  ADD CONSTRAINT ck_NoCycles\nCHECK\n(\n    thePath NOT LIKE\n    '%' +\n    RIGHT(REPLICATE('0',\
  \ 10) + CONVERT(varchar, EmployeeID), 10) +\n    '/%/' +\n    RIGHT(REPLICATE('0',\
  \ 10) + CONVERT(varchar, EmployeeID), 10) +\n    '/'\n);\nGO\n```\n\n**注意** 这里表达的逻辑与在“遍历图”一节中用于防止无限循环的逻辑有一个微妙的区别。在那一节中，路径中的节点没有左填充零，因此必须对第一个节点进行定界，以确保能检测到涉及它的环。这样做是为了防止在路径如\
  \ `123/456/3` 的情况下出现误报。在这里，左填充意味着无法将一个 ID 的一部分误解为另一个 ID，因此我们不必修改已建立的基本路径逻辑。\n\n\
  ## hierarchyid 数据类型\n\n在上一节中，我讨论了物化路径方法的一个局限性——即字符串编码使得处理深层层次结构变得困难。幸运的是，在 SQL Server\
  \ 2008 中引入了 `hierarchyid` 数据类型，它本质上使用序列化为 CLR 数据类型的物化路径来存储层次结构数据。虽然这并没有在之前描述的物化路径方法之上提供太多额外功能，但它确实使查询层次结构数据变得更加容易，正如我将在本节中演示的那样。\n\
  \n`hierarchyid` 数据类型附带了一组预定义的用于处理层次结构数据的方法，我们感兴趣的第一个方法是 `Parse()` 方法，它根据提供的物化路径字符串表示实例化一个新的\
  \ `hierarchyid` 数据项。对我们来说幸运的是，`Parse()` 方法期望的字符串格式与我们在上一节创建的 `thePath` 列中使用的格式完全相同——使用斜杠分隔路径中的每个节点。\n\
  \n以下代码清单创建并填充了一个 `hierarchyid` 值列，该列基于现有的物化路径表示 `Employee_Temp` 表中的行。\n\n```sql\n\
  ALTER TABLE Employee_Temp\nADD hierarchy hierarchyid;\n\nUPDATE Employee_Temp\n\
  SET hierarchy = hierarchyid::Parse (thePath);\n```\n\n### 查找下属\n\n填充好 `hierarchyid`\
  \ 列后，让我们通过执行与之前其他方法相同的一组常见查询来测试它。第一个需求是识别特定经理的所有下属行。为此，我们可以使用 `IsDescendantOf()`\
  \ 方法，如下面的查询所示：\n\n```sql\nSELECT * FROM Employee_Temp\nWHERE hierarchy.IsDescendantOf('/109/6/')\
  \ = 1;\n```\n\n前面的查询返回了所有隶属于市场经理（其层次路径为 `/109/6/`）的行，如下所示：\n\n| EmployeeID | ManagerID\
  \ | Title                  | thePath              | hierarchy (binary) |\n|------------|-----------|------------------------|----------------------|--------------------|\n\
  | 2          | 6         | Marketing Assistant    | /109/6/2/            | 0xE02EE568\
  \         |\n| 6          | 109       | Marketing Manager      | /109/6/       \
  \       | 0xE02EE5           |\n| 46         | 6         | Marketing Specialist\
  \   | /109/6/46/           | 0xE02EE5CBD0       |\n| 106        | 6         | Marketing\
  \ Specialist   | /109/6/106/          | 0xE02EE5E02D40     |\n| 119        | 6 \
  \        | Marketing Specialist   | /109/6/119/          | 0xE02EE5E047C0     |\n\
  | 203        | 6         | Marketing Specialist   | /109/6/203/          | 0xE02EE5E0EDC0\
  \     |\n| 269        | 6         | Marketing Assistant    | /109/6/269/       \
  \   | 0xE02EE5E26EC0     |\n| 271        | 6         | Marketing Specialist   |\
  \ /109/6/271/          | 0xE02EE5E26FC0     |\n| 272        | 6         | Marketing\
  \ Assistant    | /109/6/272/          | 0xE02EE5E28440     |\n\n关于前面查询的结果，有几点需要注意：\n\
  \n*   注意，提供给 `IsDescendantOf()` 方法的值，与所有 `hierarchyid` 数据的字符串表示一样，既以斜杠开头也以斜杠结尾。这种语法风格对于所有先前在\
  \ SQL Server 或其他地方使用过 XQuery 功能的开发者来说可能很熟悉。\n*   `hierarchyid` 值以其本机二进制格式在结果集中返回。要获取\
  \ `hierarchyid` 值的字符串表示形式，您必须调用 `ToString()` 方法。\n*   请注意，尽管我们试图识别市场经理的下属，但市场经理本人也在结果中返回。这是\
  \ `hierarchyid` 类型的一个有趣特性：对于任何给定节点 `x`，`x.IsDescendantOf(x) = 1`。这是设计使然，在某些情况下很有用，但可能不那么直观。\n\
  *   `IsDescendantOf()` 方法对给定节点的所有后代都返回 `true`，而不仅仅是直接子节点，还包括孙节点、曾孙节点等。\n\n为了将结果限制为仅返回节点的*直接*后代（并将节点本身从结果中排除），我们可以利用\
  \ `GetLevel()` 方法，该方法返回一个整数，表示节点在层次结构中的“级别”。根节点为级别 0，在根节点之下的层次结构的每一级，该值增加一。因此，给定节点的直接下属级别总是比其父级大一。以下代码演示了如何将结果限制为仅包含市场经理的直接下属：\n\
  \n```sql\nDECLARE @Parent hierarchyid = hierarchyid::Parse('/109/6/');\n\nSELECT\
  \ * FROM Employee_Temp\nWHERE hierarchy.IsDescendantOf(@Parent) = 1\nAND hierarchy.GetLevel()\
  \ = @Parent.GetLevel() + 1;\n```\n\n这是一个非常灵活的结构，可用于指定在给定节点下遍历多少级后代——例如，要返回子节点和孙节点，您可以包括所有两个级别之差小于或等于\
  \ 2 的节点。\n\n### 在层次结构中向上导航\n\n由于 `hierarchyid` 数据类型本质上只是一个序列化为 CLR 数据类型的物化路径，每个单独的\
  \ `hierarchyid` 值已经包含了返回根节点的完整路径。为了以可读格式显示此路径，我们只需调用 `ToString()` 方法。例如，考虑从 CEO\
  \ 到生产技术员（`EmployeeID` 为 100）的路径：\n\n```sql\nSELECT\n    EmployeeID,\n    ManagerID,\n\
  \    Title,\n    hierarchy.ToString() AS hierarchyPath\nFROM Employee_Temp\nWHERE\
  \ EmployeeID = 100;\n```\n\n此查询的结果如下：\n\n| EmployeeID | ManagerID | Title      \
  \                | hierarchyPath         |\n|------------|-----------|----------------------------|-----------------------|\n\
  | 100        | 143       | Production Technician - WC20 | /109/148/21/143/100/ |\n\
  \n\n\n请注意，从 `hierarchyid` `ToString()` 方法获取的路径与我们先前在 `thePath` 列中创建的路径完全相同。不过幸运的是，在此层次结构中向上导航并不需要像以前那样进行任何字符串操作——相反，我们可以使用\
  \ `GetAncestor()` 方法，它提供了与 `IsDescendant()` 相似的功能，但视角相反。`GetAncestor()` 方法不是返回布尔值以指示一个给定节点是否是另一个节点的后代，而是被调用在子元素上，用于返回代表该子节点祖先的\
  \ `hierarchyid` 节点。`GetAncestor()` 方法不仅可以返回节点的直接父节点——它还接受一个参数，用于确定给定节点与祖先之间应相隔的层级数。\n\
  \n为了演示，以下代码清单使用带有参数 `1` 的 `GetAncestor()` 方法，来确定层次结构列中每个节点的直接父节点。然后，此值用于仅返回那些直接向营销经理（`EmployeeID\
  \ 6`）汇报的节点：\n\n```sql\nDECLARE @Parent hierarchyid;\n\nSELECT @Parent = hierarchy\n\
  FROM Employee_Temp\nWHERE EmployeeID = 6;\n\nSELECT * FROM Employee_Temp\nWHERE\
  \ hierarchy.GetAncestor(1) = @Parent;\n```\n\n### 插入节点\n\n为了插入一个新节点，我们需要计算出代表通往该节点路径的适当\
  \ `hierarchyid` 值。这可以通过在将成为新插入节点父节点的节点上使用 `GetDescendant()` 方法来完成。`GetDescendant()`\
  \ 接受两个参数，用于确定分配的 `hierarchyid` 节点所在范围的下限和上限值。为了演示此方法，假设收货与发货主管（`EmployeeID 85`）需要招聘一名办公室管理员。通过为两个参数都提供\
  \ `null` 值，以下代码使用 `GetDescendant()` 方法为新员工分配一个任意的 `hierarchyid` 值：\n\n```sql\nDECLARE\
  \ @Parent hierarchyid;\n\nSELECT @Parent = hierarchy\nFROM Employee_Temp\nWHERE\
  \ EmployeeID = 85;\n\nSELECT @Parent.GetDescendant(null, null).ToString();\n```\n\
  \n结果 `/109/148/21/85/1/` 保证是一个新节点，并且是所提供父节点的直接后代，但新节点的实际标识可能会有所不同。在某些情况下，这可能会导致问题。例如，考虑如果生产主管（`EmployeeID\
  \ 16`）要招聘一名新员工，使用前面的模式为这个新员工分配一个层次结构节点，我们最初可能会尝试类似这样的代码：\n\n```sql\nDECLARE @Parent\
  \ hierarchyid;\n\nSELECT @Parent = hierarchy\nFROM Employee_Temp\nWHERE EmployeeID\
  \ = 16;\n\nSELECT @Parent.GetDescendant(null, null).ToString();\n```\n\n返回的结果 `/109/148/21/16/1/`\
  \ 是一个有效的节点，它向生产主管汇报，但问题是这个节点在层次结构中已经存在。它被分配给了 `EmployeeID 1`，这是一位向该生产主管汇报的技术员。为了避免这种情况，我们可以向\
  \ `GetDescendant()` 方法提供一个参数值，代表新创建的子节点必须大于的最小值。为此，我们将找出所选父节点当前已分配的最大子节点，如下所示：\n\
  \n```sql\nDECLARE @Parent hierarchyid;\n\nSELECT @Parent = hierarchy\nFROM Employee_Temp\n\
  WHERE EmployeeID = 16;\n\nDECLARE @MaxChild hierarchyid;\n\nSELECT @MaxChild = MAX(hierarchy)\n\
  FROM Employee_Temp\nWHERE hierarchy.IsDescendantOf(@Parent) = 1;\n\nSELECT @Parent.GetDescendant(@MaxChild,\
  \ null).ToString();\n```\n\n结果 `/109/148/21/16/248/` 现在保证是层次结构中的一个唯一节点。可以提供给 `GetDescendant()`\
  \ 的第二个参数代表新创建节点必须位于其之前的最大节点值。在这种情况下，我将其设为 `null`，因为我不想强制指定上限。\n\n当然，在当前模型中，具体化路径中每个节点的值是基于关联员工的\
  \ `EmployeeID`。只要 `EmployeeID` 字段保持唯一，你就可以继续基于此对每个节点值建模，而不必担心创建重复 `hierarchyid`\
  \ 值的可能性。然而，还有许多其他场景下此类标识值不可用，在这些情况下，`GetDescendantOf()` 方法成为一种非常有用的为新子节点分配值的方式。如果你希望同时在\
  \ `Employee_Temp` 表中保留基于 `EmployeeID` 建模的邻接表和 `hierarchyid` 模型，那么当然需要修改先前创建的 `tg_Insert`\
  \ 触发器，以根据插入行的 `EmployeeID` 自动更新 `hierarchy` 列。\n\n## 重定位子树\n\n要重定位一个 `hierarchyid`\
  \ 节点，我们使用 `GetReparentedValue()` 方法。请注意，此方法实际上并不更改 `hierachyid` 值——相反，它返回一个代表节点新路径的节点（如果该节点将被重新分配到所提供的新的父节点）。要移动节点，你必须将\
  \ `hierarchyid` 值更新为等于此结果。\n\n为了演示其实际操作，考虑如果我们从层次结构中移除一名生产主管（`EmployeeID 64`），并将其所有直接下属员工重定位向另一名替代主管（`EmployeeID\
  \ 74`）汇报，会发生什么。\n\n首先，我们需要识别代表节点所来自的旧父节点和节点将要汇报的新父节点的节点，如下所示：\n\n```sql\nDECLARE\
  \ @FromParent hierarchyid;\n\nSELECT @FromParent = hierarchy\nFROM Employee_Temp\n\
  WHERE EmployeeID = 64;\n\nDECLARE @ToParent hierarchyid;\n\nSELECT @ToParent = hierarchy\n\
  FROM Employee_Temp\nWHERE EmployeeID = 74;\n```\n\n在识别出节点将要移动于其间的两个父节点后，我们可以使用 `GetReparentedValue()`\
  \ 方法更新所有旧父节点的后代，如下所示：\n\n```sql\nUPDATE Employee_Temp\nSET hierarchy = hierarchy.GetReparentedValue(@FromParent,\
  \ @ToParent)\nWHERE\nhierarchy.IsDescendantOf(@FromParent) = 1\nAND EmployeeID <>\
  \ 64;\n```\n\n此查询使用 `IsDescendantOf()` 方法来识别所有向旧父节点（`EmployeeID 64`）汇报的行，并更新它们以向新父节点汇报。最后的条件是为了防止原始父节点被移动（请记住，根据\
  \ `IsDescendantOf()` 方法，一个节点是自身的后代）。\n\n与行插入类似，如果你想在生产环境中将此解决方案与邻接表一起维护，则需要修改 `tg_Update`\
  \ 存储过程，以便在节点移动时更新 `hierarchy` 列。\n\n### 删除节点\n\n使用 `hierarchyid` 数据类型建模的层次结构不强制执行任何类型的内在引用完整性。因此，任何节点都可以从层次结构中移除，如果被移除的节点是非叶节点，可能会导致孤立节点。幸运的是，与前面描述的字符串具体化路径类似，在此示例中，我们将\
  \ `hierarchyid` 数据类型与 `Employee_Temp` 表上现有邻接表提供的约束结合使用。这些约束意味着只有叶节点可以被删除，这减少了在层次结构结构中引入孤立节点或多根节点的机会。\n\
  \n### 约束层次结构\n\n由于 `hierarchyid` 数据类型本质上只是具体化路径结构的一个包装器，因此如何约束层次结构以防止循环或森林的规则同样适用。另一个考虑因素是如何最好地为\
  \ `hierarchyid` 数据列建立索引。在 `hierarchy` 列上放置唯一索引可以防止重复条目，并提高针对层次结构的查询性能，但你应该花一点时间考虑如何在单个索引中对层次结构进行排序。\n\
  \n\n# 第 12 章：树、层次结构与图\n\n默认情况下，SQL Server 2008 以 `深度优先` 顺序索引 `hierarchyid` 值。也就是说，沿着树中特定路径列出的节点彼此相邻列出。这种索引方式对于执行涉及向上（或向下）遍历若干级子树的查询非常高效，例如“查找此员工正上方两级的管理者”。以下代码清单在层次结构列上创建了一个深度优先索引：\n\
  \n```sql\nCREATE UNIQUE INDEX idxHierarchyDepth\nON Employee_Temp(hierarchy);\n\
  GO\n```\n\n也可以按 `广度优先` 顺序索引 `hierarchyid` 数据，在这种情况下，作为特定父节点直接子节点的所有兄弟节点在索引中彼此相邻列出。此类索引最适合诸如“查找所有直接向此管理者汇报的员工”之类的查询。当然，你无需在这两种索引类型中二选一——你可以两者都创建。要创建广度优先索引，我们将再次利用\
  \ `GetLevel()` 方法来填充一个表示每个节点级别的持久化列。通过将此列包含在索引中，我们将确保层次结构中同一级别的节点按预期在广度优先索引中相邻索引：\n\
  \n```sql\nALTER TABLE Employee_Temp\nADD hierarchyLevel AS hierarchy.GetLevel();\n\
  GO\n\nCREATE UNIQUE INDEX idxHierarchyBreadth\nON Employee_Temp(hierarchyLevel,\
  \ hierarchy);\nGO\n```\n\n## 总结\n\n图和层次结构在我们的世界中极为常见，通常需要在数据库中表示它们。通过利用邻接表，你几乎可以描述任何图的形式，而递归\
  \ CTE 可以让你相对轻松地遍历图。层次结构——特殊类型的图——也可以使用邻接表来建模，但可以采用其他技术来使查询它们高效得多，而无需递归或迭代。\n\n解决层次结构问题的方法有很多，但归根结底，要根据你所面临的具体场景选择最佳方案。一如既往，作为开发人员，你能做的最重要的事情就是仔细考虑你的选项，并尽可能进行测试以找到最优解决方案。\n\
