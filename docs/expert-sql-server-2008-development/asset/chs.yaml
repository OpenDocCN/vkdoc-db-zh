- '# 第一章


  ## 数据库世界的软件开发方法论


  数据库是软件。因此，数据库应用程序开发应该以与任何其他形式的软件开发相同的方式对待。然而，在开发团队讨论架构和测试计划时，数据库常常被视为次要实体，而且许多数据库开发人员仍然没有意识到或将标准的软件开发最佳实践应用于数据库应用程序。


  几乎每个软件应用程序都需要某种形式的数据存储。许多开发人员不仅仅满足于持久化应用程序数据，而是创建**数据驱动**的应用程序。数据驱动的应用程序是指其设计能够根据数据动态改变其行为的应用程序——事实上，一个更好的术语可能是**数据依赖**。


  '
- "# 第 1 章：面向数据库世界的软件开发方法论\n\n鉴于对数据和数据库的这种依赖性，专注于该领域的开发者别无选择，只能成为既胜任软件开发又精通数据访问与管理的绝对专家。数据是核心的控制性因素，决定着任何应用能为用户带来的价值。没有数据，应用便无存在必要。\n\
  \n本书的主要目的是鼓励微软 SQL Server 开发者更深入地融入主流软件开发。本书强调严谨的测试、周密的架构设计，以及对相互依赖关系的仔细考量。对这些领域的恰当重视是专业软件开发者的标志——而数据库专业人员作为任何软件开发团队的核心成员，绝对不能缺乏这种专长。\n\
  \n在本章中，我将概述适用于数据库应用领域的软件开发与架构相关事项。其中涵盖的一些主题在开发社区中备受争议，我会尝试兼顾双方观点，即便是在阐述我认为最具说服力的论点时也是如此。尽管如此，我仍鼓励你们仔细思考这些问题，而非将我的——或任何其他人的——言论奉为绝对真理。软件架构是一个不断变化的领域。只有通过针对具体情况进行仔细的反思，你才有望为任何特定情境识别并理解“最佳”可能的解决方案。\n\
  \n## 架构再探\n\n软件架构是一个庞大而复杂的主题，部分原因是软件架构师往往喜欢把事情弄得尽可能复杂。事实是，编写一流软件所需的复杂度远没有许多架构师会让你相信的那么多。仅仅通过理解并应用一些基本原则，就能实现极高质量的设计。每个软件开发者为了取得成功必须掌握的三个最重要概念是\
  \ `耦合性`、`内聚性` 和 `封装性`：\n\n- `耦合性` 指的是系统中一个模块对同一系统内另一个模块的依赖程度。它也可以指不同系统之间存在的依赖程度。当模块或系统之间的相互依赖程度达到其中一个的改变必然导致另一个也随之改变时，它们就被称为\
  \ `紧密耦合`。这显然是不希望出现的，因为它可能在系统的不同模块间形成一个复杂（有时甚至是隐晦）的依赖网络，导致一个模块中看似简单的更改可能需要识别并对整个应用程序中众多不同的模块进行关联更改。软件开发者应努力实现相反的目标：创建\
  \ `松散耦合` 的模块和系统，它们可以轻松地被隔离和修改，而不影响系统的其余部分。\n\n- `内聚性` 指的是特定模块或组件为整个应用程序提供单一、定义明确的功能方面的程度。`高内聚`\
  \ 的模块只具有单一功能，通常被认为比执行多种操作、因而可能可维护性和可重用性较低的 `低内聚` 模块更可取。\n\n- `封装性` 指的是模块的底层实现对系统其余部分隐藏的程度。正如你将看到的，这个概念本质上是松散耦合和高内聚的结合。如果一个模块的方法或属性没有暴露其内部行为的设计决策，则称该逻辑被\
  \ `封装` 在该模块内。\n\n不幸的是，这些定性的定义有些难以应用，在实际系统中，判断一个给定模块是否与另一个模块紧密耦合、一个例程是否内聚、或者逻辑是否被恰当封装，涉及大量的主观性。没有客观的方法来衡量应用程序中的这些概念。\n\
  \n通常，开发者会使用比较性术语来讨论这些概念——例如，一个模块在它的接口被 `重构` 之后，可能被认为与另一个模块的耦合性 *较之前更低*。但是，如果没有某种方法来比较其耦合的性质，可能很难绝对地说一个给定模块\
  \ *是否* 与另一个模块紧密耦合。让我们看几个例子来澄清一下。\n\n### 什么是重构？\n\n重构是在不添加任何新特性或改变功能的前提下，审查和修订现有代码的实践——本质上，是清理现有代码使其运行得更好。这是管理团队往往比较厌恶的领域之一，因为从销售的角度来看，它没有为应用程序增加有形的价值，并且需要重新审视那些之前被认为是“已完成”的代码部分。\n\
  \n### 耦合性\n\n首先，我们看一个说明基本耦合性的例子。下面这个类可能被定义为模拟一家汽车经销商的库存（为使例子简单，本节中的代码清单将使用一种简化且精简的类似\
  \ C# 的语法）：\n\n```\nclass Dealership\n{\n    // 经销商名称\n    string Name;\n    // 经销商地址\n\
  \    string Address;\n    // 经销商拥有的汽车\n    Car[] Cars;\n\n    // 定义 Car 子类\n   \
  \ class Car\n    {\n        // 汽车品牌\n        string Make;\n        // 汽车型号\n   \
  \     string Model;\n    }\n}\n```\n\n这个类有三个字段：经销商的名称和地址都是字符串，但经销商汽车的集合是基于一个子类 `Car`\
  \ 来类型的。在一个没有人的世界里，这个类工作得很好——但不幸的是，它的建模方式迫使我们将任何拥有汽车实例的类与经销商紧密耦合。以车主为例：\n\n```\n\
  class CarOwner\n{\n    // 车主姓名\n    string name;\n    // 车主的汽车\n    Dealership.Car[]\
  \ Cars\n}\n```\n\n注意，`CarOwner` 的汽车实际上是 `Dealership.Car` 的实例；为了拥有一辆车，似乎预设了必须有一个经销商参与其中。这没有给车主直接出售的汽车——或者就此而言，被盗的汽车——留下任何空间！有多种方法可以修复这种耦合，最简单的是不将\
  \ `Car` 定义为子类，而是将其作为一个独立的类。这样做意味着 `CarOwner` 将与 `Car` 耦合，`Dealership` 也会与 `Car`\
  \ 耦合——但 `CarOwner` 和 `Dealership` 之间将完全没有耦合。这是有道理的，并且更准确地模拟了现实世界。\n\n### 内聚性\n\n\
  为了演示内聚性原则，考虑一个可能在银行应用中定义的以下方法：\n\n```\nbool TransferFunds(\n    Account AccountFrom,\n\
  \    Account AccountTo,\n    decimal Amount)\n{\n    if (AccountFrom.Balance >=\
  \ Amount)\n        AccountFrom.Balance -= Amount;\n    else\n        return(false);\n\
  \n    AccountTo.Balance += Amount;\n    return(true);\n}\n```\n\n请记住，这段代码高度简化，缺乏真实银行应用中必需的基本错误处理和其他特性，请思考这个方法的基本功能是从\
  \ `AccountFrom` 账户提取资金并将其存入 `AccountTo` 账户。\n\n"
- '# CHAPTER „ 面向数据库世界的软件开发方法论


  这本身不算大问题，但请设想一下该方法缺失了多少基础架构（例如错误处理代码）。可以合理推测，在这个银行应用程序的其他部分，很可能也存在名为 `Withdraw`
  和 `Deposit` 的方法，它们执行完全相同的操作，同样需要这些基础架构代码。`TransferFunds` 方法之所以呈现**弱内聚性**，是因为在执行转账操作时，它需要的功能与单独的
  `Withdraw` 和 `Deposit` 方法所提供的功能相同，却使用了完全不同的代码。


  一个内聚性更强的同一方法可能类似于以下形式：


  ```

  bool TransferFunds(

  Account AccountFrom,

  Account AccountTo,

  decimal Amount)

  {

  bool success = false;

  success = Withdraw(AccountFrom, Amount);

  if (!success)

  return(false);

  success = Deposit(AccountTo, Amount);

  if (!success)

  return(false);

  else

  return(true);

  }

  ```


  尽管我已经指出这类生产环境代码会缺少基础异常处理和其他结构，但必须强调，主要缺失的是某种形式的**事务**处理。如果取款成功，但随后的存款失败，当前代码将导致资金实际上凭空消失。务必仔细测试你的关键任务代码是否具有**原子性**；要么全部成功，要么全部不成功。没有中间地带——尤其是在处理人们的资金时！


  ### 封装


  在本节讨论的三个主题中，对于数据库开发人员来说，**封装**可能是最重要的一个。回顾一下那个内聚性更强的 `TransferFunds` 方法，并思考一下与之关联的
  `Withdraw` 方法可能是什么样子——或许是这样的：


  ```

  bool Withdraw(Account AccountFrom, decimal Amount)

  {

  if (AccountFrom.Balance >= Amount)

  {

  AccountFrom.Balance -= Amount;

  return(true);

  }

  else

  return(false);

  }

  ```


  在这个例子中，`Account` 类公开了一个名为 `Balance` 的属性，`Withdraw` 方法可以操作它。但是，如果 `Withdraw` 方法中存在错误，并且某条代码路径允许在未首先检查资金是否充足的情况下就操纵
  `Balance`，该怎么办？为了避免这种情况，就不应该允许从 `Withdraw` 方法直接设置 `Balance` 的值。相反，`Account` 类应该定义自己的
  `Withdraw` 方法。通过这样做，该类将在内部控制其数据和规则——而不必依赖任何外部使用者来正确执行。这里的关键目标是**将逻辑精确实现一次，并根据需要重复使用多次**，而不是在每次需要使用该逻辑的地方都重新编码。


  ### 接口


  应用程序中模块的唯一目的，就是根据使用者（即另一个模块或系统）的请求执行某些操作。例如，如果无法存储或检索数据，数据库系统将毫无价值。因此，一个系统必须公开**接口**——其他模块可用于提出请求的、广为人知的方法和属性。模块的接口是通往其功能的网关，也是决定什么信息进入或离开模块的仲裁者。


  接口设计是耦合和封装概念真正获得意义的地方。如果一个接口未能封装足够多的模块内部设计，使用者可能不得不依赖一些关于该模块的内部知识，从而与该模块**紧密耦合**。在这种情况下，模块内部实现的任何更改都可能需要修改使用者的实现。


  '
- '# CHAPTER 1 „ 面向数据库世界的软件开发方法论


  ### 接口即契约


  可以说，接口是模块与其使用者之间表达的一种**契约**。该契约声明，如果使用者向接口指定了一组特定的参数，则将返回一组特定的值。**简单性**通常是这里的关键；避免定义那些根据输入改变返回值数量或类型的接口。例如，一个存储过程，如果用户传入特定参数就返回额外的列，这可能就是一个设计不佳接口的例子。


  许多编程语言允许例程定义**显式契约**。这意味着输入参数是明确定义的，输出在编译时是已知的。不幸的是，SQL Server 中的 T-SQL 存储过程只定义输入，而过程本身可以动态改变其定义的输出。在这些情况下，开发人员有责任确保预期的输出有完善的文档记录，并且存在单元测试来验证它们（有关单元测试的信息，请参见第
  3 章）。在本书中，我将通过文档和测试强制执行的契约称为**隐式契约**。


  ### 接口设计


  如何衡量接口设计的成功与否是一个难题。一般来说，你应该尝试从维护的角度来看待它。如果六个月后，你因为性能或其他原因要完全重写该模块，你能保证所有的输入和输出都保持不变吗？


  例如，考虑以下存储过程签名：


  ```

  CREATE PROCEDURE GetAllEmployeeData

  --用于排序的列，以逗号分隔

  @OrderBy varchar(400) = NULL

  ```


  假设这个存储过程完全按照其名称的含义行事——它返回数据库中每个员工的 `Employees` 表的所有数据。这个存储过程接受 `@OrderBy` 参数，根据注释，该参数定义为“用于排序的列”，并附加规定列应以逗号分隔。


  这里的接口问题相当严重。首先，一个接口不仅要隐藏内部行为，还必须明确说明一组有效的输入参数将如何改变例程的输出。在这种情况下，该存储过程的使用者可能会认为，在内部，逗号分隔的列表将被简单地附加到一条动态
  SQL 语句中。这是否意味着改变列表中列名的顺序会改变输出？另外，`ASC` 或 `DESC` 关键字是否可以接受？接口定义的契约不够具体，无法明确这一点。


  其次，该存储过程的使用者必须拥有 `Employees` 表的列列表，才能知道可以在逗号分隔列表中传入的有效值。列列表应该硬编码在应用程序中，还是通过其他方式检索？而且，表的所有列是否都是有效的输入，这并不清楚。像
  `Photo` 这样定义为 `varbinary(max)`、包含员工照片 JPEG 图像的列怎么办？允许使用者指定该列进行排序是否有意义？


  从维护的角度来看，这类接口问题可能导致真正的问题。想象一下，如果三个不同的应用程序都在使用这个存储过程，并且都有自己的可排序列名硬编码列表，那么仅仅更改 `Employees`
  表中一个列名需要付出多少努力。如果查询最初实现为动态 SQL，但后来需要更改为静态 SQL 以避免重编译成本，该怎么办？在那些假定可以使用 `ASC` 和 `DESC`
  关键字的应用程序抛出运行时异常之前，我们是否有可能检测出它们是哪些应用程序？


  '
- '# 关于灵活性与接口的核心要义


  我希望在此传达的核心信息是，在许多情况下，极致的灵活性与稳固、可维护的接口可能无法并行不悖。如果你的目标是开发真正健壮的软件，你往往会发现必须削减灵活性。但请记住，在大多数情况下，都存在完全合理的变通方案，而无需牺牲原始接口所预期的任何真实灵活性。例如，在这个例子中，可以通过多种方式重写接口以保留所有可能的功能。其中一个版本如下所示：


  ```sql

  CREATE PROCEDURE GetAllEmployeeData

  @OrderByName int = 0,

  @OrderByNameASC bit = 1,

  @OrderBySalary int = 0,

  @OrderBySalaryASC bit = 1,

  -- 其他列 ...

  ```


  在这个修改后的接口版本中，使用者可以选择用于排序的每个列都有两个相关联的参数：一个参数指定列的排序顺序，第二个参数指定是升序还是降序排序。因此，如果使用者为 `@OrderByName`
  参数传递值 2，并为 `@OrderBySalary` 参数传递值 1，结果将首先按工资排序，然后按姓名排序。使用者可以通过操作 `@OrderByNameASC`
  和 `@OrderBySalaryASC` 参数来进一步修改排序，为每个列指定排序方向。


  这个版本的接口没有暴露关于存储过程内部实现的任何信息。开发者可以自由使用他或她选择的任何技术，以最有效的方式返回正确的结果。此外，使用者无需了解 `Employees`
  表的实际列名。包含员工姓名的列可能叫 `Name`，也可能叫 `EmpName`。或者，可能有两列，一列包含名字，一列包含姓氏。由于使用者不需要知道这些名称，它们可以根据数据变化进行必要的修改，并且由于使用者并不耦合于基于例程的列名知识，因此无需对使用者进行任何更改。请注意，同样的推理也可以用来建议，最终用户和应用程序应该只访问作为视图公开的数据，而不是直接访问数据库中的基表。视图可以提供一个抽象层，使得可以对底层表进行更改，同时保持视图的属性不变。


  请注意，此示例仅讨论了接口的输入。请记住，输出（例如，结果集）同样重要，这些也应该在契约中记录。我建议始终根据需要使用 `AS` 关键字创建列别名，以便即使底层表发生变化，接口也能继续返回相同的输出。如前所述，我还建议开发者避免根据输入参数返回额外数据，例如额外的列或结果集。这样做可能会产生难以测试和维护的存储过程。


  '
- '# 第一章 — 数据库世界的软件开发方法论


  ## 异常是任何接口的重要组成部分


  在思考隐含契约时，开发者经常未能考虑到的一种重要输出类型是，当事情出错时，给定方法可能抛出的异常。许多方法在某些情况下会抛出明确定义的异常，但如果这些异常没有得到充分记录，它们原本良好的意图就会变得相当浪费。通过确保正确记录异常，你不仅能让客户端捕获并处理你已预见的异常，还能帮助开发者理解哪些地方可能出错，并针对可能的问题进行防御性编码。通常，围绕潜在问题遵循代码路径几乎总是比不得不处理异常要好。


  ## 集成数据库与面向对象系统


  一个似乎使数据库开发变得比其应有的难度大得多的主要问题，其实与开发本身无关，而是一个架构问题。面向对象框架和数据库系统通常不能很好地协同工作，主要是因为它们有一套不同的核心目标。面向对象系统旨在从行为的角度对业务实体进行建模——业务实体能做什么，其他实体能对它做什么或者能与它一起做什么？另一方面，数据库更关心实体之间的关系，而较少关心它们所参与的活动。


  显然，我们有两个不兼容的范式来对业务实体建模。然而，两者都是几乎每个应用程序的必要组成部分，必须为了共同的目标——服务用户——而一起被利用。为此，数据库开发者需要知道什么属于哪里，以及何时将责任交还给他们的应用程序开发者同行，这一点很重要。不幸的是，如何为任何给定的业务流程的各个部分进行适当建模的问题，可能会迅速让人陷入一个灰色地带。你应该如何决定是在数据库中实现还是在应用程序中实现？


  自古以来（或至少自互联网诞生以来），许多数据库论坛上的核心争论一直围绕着如何处理那始终存在的必需“逻辑”。可悲的是，尽管我们努力尝试，开发者们仍然没有想出如何在不需要实现业务需求的情况下开发应用程序。因此，争论仍在激烈进行。“业务逻辑”属于数据库？属于应用层？用户界面呢？较新的应用程序架构对这个古老的问题有何影响？


  ## 逻辑放置的简史


  从前，计算机只是被称为“计算机”。它们日夜不停地为“哑”终端提供少量数据。那时，应用程序和数据之间没有太大区别，因此对于我们今天争论的架构问题，几乎没什么问题可问，也没什么答案可给。


  但是，随着时间的推移，变革之风吹遍了世界各地装有空调的数据中心，以前被称为“计算机”的系统变成了“大型机”——1960 年代中期机架上的新计算机是“小型机”。比大型机更小更便宜的“小型机”迅速流行起来。它们相对于大型机较低的成本意味着，现在通过将应用程序运行在多台机器上来实现横向扩展在财政上成为可能。此外，这些机器足够便宜，甚至可以直接被最终用户用作之前无处不在的哑终端的替代品。在同一时期，我们也看到了第一批商业上可用的数据库系统，例如
  `Adabas` 数据库管理系统（`DBMS`）。


  小型机的出现标志着应用程序架构领域的多重变化。除了多服务器横向扩展的替代方案外，最终用户开始使用比终端更强大的机器这一事实意味着，在某些情况下，应用程序的部分工作可以卸载到用户界面（UI）层。工作负载现在可以进行分配以创建更具可扩展性的应用程序，而不再仅仅利用一台服务器的能力。


  随着时间的推移，“微型计算机”（当今基于英特尔和 AMD 的系统的祖先）变得越来越强大，最终小型机消失了。然而，在小型机时代诞生的基于客户端/服务器的架构并没有消亡；应用程序开发者发现，将工作卸载到客户端可能比购买更大的服务器便宜得多。



  '
- '# 软件开发方法论与数据库世界


  20 世纪 90 年代末期，架构趋势发生了又一次范式转变——奇怪的是，它又回到了大型机和哑终端的世界。Web 服务器取代了大型机系统，成为集中的数据和 UI 系统，而浏览器则扮演了先前由终端承担的角色。本质上，这使应用程序架构经历了一个轮回，但有一个关键区别：现代基于
  Web 的数据中心的特征是“**商用服务器**”**集群——廉价、标准化且易于更换的硬件，而不是单一的大型机。


  云计算这一最新趋势，似乎将对传统的架构设计决策观点构成另一项严峻挑战。在基于云的模型中，应用程序使用共享的、虚拟化的服务器资源，这些资源通常由第三方通过互联网以服务的形式提供。


  亚马逊、谷歌和微软等供应商已经提供了基于云的数据库服务，但在撰写本文时，这些服务仍处于非常初级的阶段。例如，当前的 SQL Server 数据服务的实现，在带宽和存储方面有严重限制，这意味着在大多数情况下，它无法替代专用数据中心。然而，向云端迁移的动力日益增强，未来几年它将如何影响数据架构决策，值得关注。


  在思考这些问题时，需要记住的一个重要点是：单个数据库可能被多个应用程序共享，这些应用程序又可能暴露多个用户界面，如图 1-1 所示。


  数据库开发人员必须努力确保数据被充分封装，以允许其在多个应用程序之间共享，同时确保不同应用程序的逻辑不会冲突，从而使整个数据库陷入不一致的状态。达到这种程度的封装需要仔细划分逻辑，尤其是数据验证规则。


  规则和逻辑可以划分为三个基本组：


  *   数据逻辑

  *   业务逻辑

  *   应用逻辑


  *图 1-1. 数据库应用层级*


  设计应用程序时，重要的是理解这些划分，并考虑在应用层级中，任何给定的逻辑片段应放置在何处，以确保其可重用性。


  ### 数据逻辑


  `Data logic`定义了数据库中的数据必须满足的条件，以保持一致、未损坏的状态。数据库开发人员无疑熟悉以主键和外键约束、检查约束、触发器等形式实现这些规则。数据规则并不规定*如何*操作数据或*何时*操作数据；相反，数据规则规定的是任何过程完成后数据必须处于的状态。


  重要的是要记住，在大多数应用程序中，数据不仅仅是“数据”——相反，数据库中的数据是对实际业务的建模。因此，数据规则必须反映驱动业务本身的所有规则。例如，如果你正在设计一个支持银行应用程序的数据库，可能会遇到一项业务规则，规定某些类型的账户不允许透支。


  为了对当前应用程序和所有可能的未来应用程序正确实施此规则，必须在数据本身的层面集中实施。如果数据保证是一致的，那么应用程序只需担心对数据*做什么*。


  作为一般准则，你应尝试实施尽可能多的数据规则，以避免出现数据质量问题的可能性。数据库是数据的持有者，因此应充当数据是否有资格被持久化的最终仲裁者。任何对业务至关重要的验证规则，对数据也同样至关重要，反之亦然。在我参与众多数据库支持的应用程序的工作过程中，我从未见过数据规则过多的数据库；但我经常看到数据库因缺乏足够的规则而导致数据完整性问题。


  #### 数据规则到底属于哪里？


  许多面向对象的狂热者会争辩说，正确的解决方案根本不是数据库，而是一个接口总线，它充当数据库之上的外观，并控制所有进出数据库的通信。虽然这种方法在理论上可行，但存在几个问题。首先，这种方法完全忽略了数据库强制数据完整性的概念，并将数据库层变成了一个纯粹的存储容器，未能利用几乎所有现代数据库为此目的而内置的任何特性。此外，这样的接口层仍然必须与数据库通信，因此无论如何都必须在某个层面编写数据库代码。编写这样的接口层可能会消除一些数据库代码，但这只是推迟了与数据库打交道的必要性。最后，以我相当主观的观点来看，在许多情况下，应用层不如数据库稳定或持久。虽然应用程序和应用架构来来去去，但数据库似乎在企业中拥有极长的生命周期。同样的规则也适用于一个无所不包的接口总线。所有这些问题可能是一个重要原因，尽管我多年来听到架构师们争论这个问题，但我从未见过这样的系统被实现。


  ### 业务逻辑


  `Business logic`这个术语在软件开发圈中通常被用作一个模糊的统称，指代应用程序所做的任何与 UI 无关、且涉及至少一个条件分支的事情。换句话说，这个术语被过度使用，没有真正的含义。


  幸运的是，软件开发是一个不断变化的领域，我们不必坚持这种公认的缺乏定义的状态。就本文而言，`Business logic`被定义为任何规定如何或何时操作数据以改变其状态，但不规定如何持久化或验证数据的规则或过程。这方面的一个例子是将原始数据渲染成适合最终用户的报告所需的逻辑。我们假设已经应用了数据逻辑规则的原始数据，可以通过`Business
  logic`来确定适当的聚合和分析，以回答最终用户可能提出的问题。如果这些数据需要以其新形式持久化在数据库中，则必须再次应用数据规则；请记住，数据库应始终对任何给定数据是否允许拥有最终决定权。


  那么，业务逻辑属于数据库吗？答案是明确的“可能”。作为一名数据库开发人员，你的主要关注点往往围绕着数据完整性和性能。抛开其他因素（如整体应用架构）不谈，这意味着在一般实践中，你应该尝试将`Business
  logic`放在能提供最佳性能的层中，或者放在最易于重用的层中。例如，如果许多应用程序共享相同的数据，并且每个应用程序都有类似的报告需求，那么设计存储过程来将数据渲染成正确的报告格式，可能比在每个应用程序中实现类似的报告更有意义。




  '
- "# 第一章 数据库世界的软件开发方法论\n\n## 性能 vs. 设计 vs. 现实\n\n架构纯粹主义者可能会争辩说，性能不应影响应用程序设计；它只是一个实现细节，可以在代码层面解决。但我们这些曾在一线奋战、不得不面对设计糟糕的架构所带来的现实的人知道，事实并非如此。\n\
  \n事实上，性能在几乎所有应用中都与设计密不可分。试想那些发送过多数据或需要太多客户端请求才能将所需信息填满用户屏幕的“过于絮叨的”接口，或者那些每次用户请求都必须返回中央服务器以执行关键功能的应用。在许多情况下，这些性能缺陷可以在设计阶段就被识别并修复，从而避免它们在日后显现。然而，重要的是不要在这方面走得太远：设计不应为了规避可能永远不会发生的预期“性能问题”而变得过度扭曲。\n\
  \n### 应用逻辑\n\n如果说数据逻辑*绝对*属于数据库，业务逻辑*可能*在数据库中占有一席之地，那么应用逻辑就是应该尽可能远离核心数据的一套规则。构成应用逻辑的规则包括诸如用户界面行为、字符串和数字格式化规则、本地化以及其他通常与用户界面相关的问题。考虑到前面讨论的应用层次结构（一个数据库可能被多个应用共享，而这些应用又可能被多个用户界面共享），很明显，将用户界面数据与应用程序或核心业务数据混在一起会引发严重的耦合问题，并最终降低数据共享的可能性。\n\
  \n请注意，我并不是说总是应该避免在数据库中持久化与用户界面相关的实体。对于许多应用来说，这样做当然有其道理。我所警告的是，未能清晰区分用户界面元素与应用程序其余数据所带来的风险。\n\
  \n在可能的情况下，务必创建不同的表（最好放在不同的模式中，甚至完全不同的数据库中），以存储纯粹与应用相关的数据。这将使你能够尽可能保持应用与数据的解耦。\n\n\
  ### “对象-关系阻抗不匹配”\n\n使得信息在面向对象系统和关系数据库之间难以迁移的主要障碍在于，从基本设计的角度来看，这两种系统类型是不兼容的。关系数据库采用规范化规则设计，通过将信息拆分成由键相互关联的表来帮助确保数据完整性。而面向对象系统在这方面则往往宽松得多。对象中包含的数据虽然相关，但可能不会在数据库的单个表中建模，这种情况相当常见。\n\
  \n例如，考虑下面这个零售系统中产品的类：\n\n```\nclass Product\n{\n    string UPC;\n    string Name;\n\
  \    string Description;\n    decimal Price;\n    datetime UpdatedDate;\n}\n```\n\
  \n乍一看，这个类中定义的字段似乎彼此紧密相关，人们可能会期望它们总是属于数据库中的单个表。然而，这个产品类可能仅代表了某个产品在最后更新日期那一刻的视图。\n\
  \n在数据库中，数据可能建模如下：\n\n```\nCREATE TABLE Products\n(\n    UPC varchar(20) PRIMARY\
  \ KEY,\n    Name varchar(50)\n);\n\nCREATE TABLE ProductHistory\n(\n    UPC varchar(20)\
  \ FOREIGN KEY REFERENCES Products (UPC),\n    Description varchar(100),\n    Price\
  \ decimal,\n    UpdatedDate datetime,\n    PRIMARY KEY (UPC, UpdatedDate)\n);\n\
  ```\n\n\n\n这里需要注意的关键点是，数据的**对象表示**可能与其在数据库中的**建模方式**毫无关联，反之亦然。面向对象的世界和关系型世界各有其目标与达成目标的手段，开发者不应试图强行将两者糅合在一起，否则可能会导致功能受损。\n\
  \n## 表真的只是伪装的类吗？\n\n一些入门级的数据库教材有时会提到，可以将表比作类，将行比作类的实例（即对象）。初看之下，这很有道理；表和类一样，为实体定义了一组属性（称为列）。它们也可以（粗略地）为实体定义一组方法，其形式是触发器。\n\
  \n然而，相似之处到此为止。面向对象系统的关键基础是**继承**和**多态**，这两者在 SQL 数据库中即使不是完全无法表示，也是极其困难的。此外，数据库和面向对象系统中访问相关信息的路径也大相径庭。面向对象系统中的一个实体可以“拥有”一个子实体，通常使用“点”符号来访问。例如，一个书店对象可能拥有一个书籍集合：\n\
  \n```sql\nBooks = BookStore.Books;\n```\n\n在这个面向对象的例子中，书店“拥有”书籍。但在 SQL 数据库中，这种实体间的关系是通过**键**来维持的，其中子实体指向其父实体。关系并非书店拥有书籍，而是反过来：书籍通过一个外键指向书店：\n\
  \n```sql\nCREATE TABLE BookStores\n(\n    BookStoreId int PRIMARY KEY\n);\n\nCREATE\
  \ TABLE Books\n(\n    BookStoreId int REFERENCES BookStores (BookStoreId),\n   \
  \ BookName varchar(50),\n    Quantity int,\n    PRIMARY KEY (BookStoreId, BookName)\n\
  );\n```\n\n虽然面向对象和 SQL 表示法可以存储相同的信息，但其实现方式差异如此之大，以至于说一个表代表一个类（至少在当前的 SQL 数据库中）是不合理的。\n\
  \n## 对继承建模\n\n在面向对象设计中，对象之间可以存在两种基本关系：“**有-一个**”关系，即一个对象“拥有”另一个对象的实例（例如，书店拥有书籍）；以及“**是-一个**”关系，即一个对象的类型是另一个对象的子类型（或*子类*）（例如，书店是一种商店）。在\
  \ SQL 数据库中，“有-一个”关系很常见，而“是-一个”关系则可能难以实现。\n\n考虑一个名为“Products”的表，它可能代表某公司所有可供销售产品的实体类。该表可能包含通常属于产品的列（属性），如“价格”、“重量”和“UPC”。这些通用属性适用于该公司销售的所有产品。然而，公司可能销售许多产品子类，每个子类都有自己特定的额外属性集。例如，如果公司同时销售书籍和\
  \ DVD，书籍可能具有“页数”属性，而 DVD 则可能具有“时长”和“格式”属性。\n\n在面向对象的世界中，子类化是通过继承模型实现的，这些模型在诸如 C#等语言中实现。在这些模型中，一个给定的实体可以是一个子类的成员，同时在处理该层级的代码中，它仍被普遍视为*超类*的成员。这使得在销售点应用程序的结账部分，可以无缝地处理书籍和\
  \ DVD，同时为每个子类保留独立的属性，以供应用程序的其他需要部分使用。\n\n在 SQL 数据库中，对继承建模可能很棘手。下面的代码清单展示了一种可行的方法：\n\
  \n```sql\nCREATE TABLE Products\n(\n    UPC int NOT NULL PRIMARY KEY,\n    Weight\
  \ decimal NOT NULL,\n    Price decimal NOT NULL\n);\n\nCREATE TABLE Books\n(\n \
  \   UPC int NOT NULL PRIMARY KEY\n        REFERENCES Products (UPC),\n    PageCount\
  \ int NOT NULL\n);\n\nCREATE TABLE DVDs\n(\n    UPC int NOT NULL PRIMARY KEY\n \
  \       REFERENCES Products (UPC),\n    LengthInMinutes decimal NOT NULL,\n    Format\
  \ varchar(4) NOT NULL\n        CHECK (Format IN ('NTSC', 'PAL'))\n);\n```\n\n使用此代码清单创建的数据库结构如图\
  \ 1-2 所示。\n\n*图 1-2\\. 在 SQL 数据库中对继承建模*\n\n尽管该模型成功地将书籍和 DVD 确立为产品的子类型，但它存在几个严重问题。首先，就目前情况而言，该模型无法强制子类型的唯一性。单个\
  \ UPC 可以同时属于 Books 和 DVDs 两个子类型。这在现实世界的大多数情况下都显得不太合理（尽管可能有一本书附带一张 DVD，那样的话这个模型或许说得通）。\n\
  \n另一个问题是属性的访问。在面向对象系统中，子类自动继承其超类的所有属性；一个书籍实体将包含书籍和通用产品的所有属性。然而，在此处提出的模型中情况并非如此。要获取书籍或\
  \ DVD 的通用产品属性，需要连接回`Products`表。这实际上破坏了处理子类型的完整意义。\n\n解决这些问题并非不可能，但需要费些功夫。保证子类型唯一性的一种方法是在超类型中填充一个额外的属性来标识每个实例的子类型。下表展示了如何实现此解决方案：\n\
  \n```sql\nCREATE TABLE Products\n(\n    UPC int NOT NULL PRIMARY KEY,\n    Weight\
  \ decimal NOT NULL,\n    Price decimal NOT NULL,\n    ProductType char(1) NOT NULL\n\
  \        CHECK (ProductType IN ('B', 'D')),\n    UNIQUE (UPC, ProductType)\n);\n\
  \nCREATE TABLE Books\n(\n    UPC int NOT NULL PRIMARY KEY,\n    ProductType char(1)\
  \ NOT NULL\n        CHECK (ProductType = 'B'),\n    PageCount int NOT NULL,\n  \
  \  FOREIGN KEY (UPC, ProductType) REFERENCES Products (UPC, ProductType)\n);\n\n\
  CREATE TABLE DVDs\n(\n    UPC int NOT NULL PRIMARY KEY,\n    ProductType char(1)\
  \ NOT NULL\n        CHECK (ProductType = 'D'),\n    LengthInMinutes decimal NOT\
  \ NULL,\n    Format varchar(4) NOT NULL\n        CHECK (Format IN ('NTSC', 'PAL')),\n\
  \    FOREIGN KEY (UPC, ProductType) REFERENCES Products (UPC, ProductType)\n);\n\
  ```\n\n通过将子类型定义为超类型的一部分，可以创建一个`UNIQUE`约束，使 SQL Server 能够强制每个超类型实例只允许存在一个子类型。在每个子类型表中，通过`ProductType`列上的`CHECK`约束进一步强化了这种关系，确保只允许插入正确的产品类型。\n\
  \n通过使用索引视图和`INSTEAD OF`触发器，可以进一步扩展此方法。可以为每个子类型创建一个视图，该视图封装了检索超类型属性所需的连接。通过创建视图来隐藏连接，使用者无需感知子类型/超类型关系，从而解决了属性访问问题。索引有助于提高性能，而触发器则允许视图可更新。\n\
  \n在 SQL 数据库中，几乎可以表示任何能在面向对象系统中体现的关系，但数据库开发者理解其中的复杂性至关重要。将面向对象数据（正确地）映射到数据库通常并非易事，对于复杂的对象图来说，这可能是一个相当大的挑战。\n\
  \n## “大量空列”继承模型\n\n\n\n"
- '# 面向数据库世界的软件开发方法论


  ### ORM：一个制造诸多问题的解决方案


  数据库中建模继承的一种极其常见的设计是：创建一个单一表，其中包含超类型的所有列，再加上每个子类型的所有列（后者可为空）。这种设计问题重重，应当避免。根本问题在于，构成子类型的属性会混杂在一起，从而导致混淆。例如，仅查看表无法分辨哪些属性属于书籍而非
  DVD。唯一的确定方法是查阅文档（如果存在的话）或评估代码。此外，数据完整性几乎丧失殆尽。难以强制规定某些子类型的特定属性必须非空，而在应该为空的属性实际非空时，要弄清楚如何处理则更加困难——例如，NTSC
  制式对一本书意味着什么？这是由于代码缺陷导致的错误填充，还是这本书真的拥有播放制式？在一个建模得当的系统中，这个问题本不应存在。


  克服关系型系统与面向对象系统之间问题的一个解决方案是转向称为`对象关系映射器（ORMs）`的工具，它们试图自动将对象映射到数据库。


  此类工具众多，包括开源的`nHibernate`项目和`微软`自家的`Entity Framework`。这些工具各有其特性和功能，但在大多数情况下基本思路相同：开发者将`ORM`工具"插入"现有的面向对象系统，并告知工具数据库中的哪些列映射到每个类的每个字段。`ORM`工具会审视对象系统以及数据库，以弄清楚如何编写`SQL`将数据以对象形式检索出来，并在数据变更时将其持久化回数据库。这一切都是自动完成的，并且在一定程度上是无缝的。


  有些工具更进一步，如果数据库尚不存在，则会为已有对象创建一个数据库。这些工具基于这样的假设运作：在大多数情况下，类与表可以一一对应映射，但正如前文所述，这通常*并非*事实。因此，这些工具最终往往会产生极其糟糕的数据库设计。


  我曾合作过的一家公司，在其电子商务应用中使用了一款流行的基于`Java`的`ORM`工具。该工具从对象中心而非表中心的角度来映射"拥有"关系，结果导致数据库中`Products`表包含一个指向`Orders`表的外键。为该公司工作的`Java`开发者被迫在系统中插入虚假订单，以允许公司销售新产品。


  尽管`ORM`确实有一些优点，并且脱离任何特定数据库的抽象有助于创建可移植代码，但我认为当前可用的工具集尚不够成熟，不足以使其成为企业软件开发的可行选择。除了那些根据类创建数据库表的工具存在的问题之外，我最关心的两个主要问题都与性能有关：首先，`ORM`工具倾向于从对象而非相关数据的集合（即表）角度思考。每个类都有由`ORM`工具生成的自己的数据访问方法，每次需要数据时，这些方法都会在细粒度级别上查询仅必要的行。这意味着（取决于连接池的处理方式）大量数据库连接会定期打开和关闭，而检索数据的整体接口相当"零碎化"。`SQL`
  `DBMS`在批量返回数据方面往往比逐行返回高效得多；通常，一次性查询一个产品及其所有相关数据，比先请求产品，再通过单独查询请求相关数据要好得多。


  其次，如果过度依赖`ORM`工具，查询调优可能会很困难。在`SQL`数据库中，编写任何给定的查询通常有多种逻辑上等效的方式，每种方式可能具有截然不同的性能特征。当前这代`ORM`工具并未智能地监控并自动修复由编写不当的查询可能引起的问题，使用这些工具的开发者常常因为系统因编写不当的查询而无法扩展而措手不及。


  `ORM`工具在过去几年中已经有了显著改进，并且随着时间的推移无疑将继续如此。然而，即使在最新的`微软` `Entity Framework`（`.NET 4.0
  Beta 1`）版本中，其生成的`SQL`代码也存在大量缺陷，导致数据库查询充其量是糟糕的，并且常常不是最优的。我认为，任何此类自动生成的`ORM`代码在性能上永远无法与手动精心编写的查询相媲美，通过手工仔细设计对象-数据库接口可以获得更好的投资回报。


  ## 引入数据库即 API 的思维模式


  在编写对象系统与数据库系统之间的数据交换接口时，迄今为止最需要警惕的问题是耦合。对象系统及其用作后端的数据库应仔细分区，以确保在大多数情况下，对一层的更改不会强制要求对另一层进行更改。这在两个领域都很重要；如果数据库的更改需要应用程序更改，重新编译和重新部署应用程序的成本通常很高。


  同样，如果应用程序逻辑的更改需要数据库更改，那么更改数据结构或约束可能对其他可能需要相同数据的应用程序产生何种影响，可能很难预知。


  为了应对这些问题，数据库开发者必须决心严格遵守一套在数据库系统与对象之间封装的稳固接口。我称之为`数据库即 API`的思维模式。


  `应用程序编程接口（API）`是一组允许一个系统与另一个系统交互的接口。`API`旨在成为其所暴露系统的完整访问方法。


  在数据库术语中，这意味着`API`将公开用于从数据库检索数据、向数据库插入数据以及在数据库中更新数据的公共接口。


  一套数据库接口应遵循与其他接口相同的基本设计规则：已知的、标准化的输入集，产生已知的、标准化的输出集。这套接口应完全封装所有实现细节，包括表和列名、键、索引和查询。使用数据库数据的应用程序不应需要了解内部信息——应用程序只需知道可以使用某些方法检索和持久化数据。


  为了定义这样的接口，第一步是为所有外部数据库访问定义存储过程。直接访问表的数据显然违反了正确的封装和接口设计原则，而视图可能够用也可能不够用。在`SQL Server`中，存储过程是唯一能够提供全面数据`API`所需类型接口的构造。


  `Web 服务作为标准 API 层`




  '
- '# 数据库世界的软件开发方法论


  ## 重大的平衡之举


  归根结底，软件开发的真正目标是生产出客户愿意使用的可工作软件，同时，该软件应能随着时间推移和需求变化而易于修复或扩展。然而，在开发软件时，存在限制实际可实现成果的硬性约束。没有任何项目拥有无限的时间或金钱，因此通常需要在一个领域做出牺牲，以便优先满足另一个领域更高的要求。


  在大多数情况下，数据库是其驱动的应用程序的核心。数据在很大程度上控制着应用程序，没有数据，应用程序的价值将大打折扣。


  同样，数据库也常常是应用程序在性能、可维护性和其他关键成功因素方面面临真正挑战的地方。应用程序开发人员通常倾向于将这些问题尽可能推到数据层去解决。在没有数据架构师的情况下，数据库开发人员就成了负责平衡整个应用程序需求的人。


  要试图取得恰当的平衡，通常需要在以下几个领域进行权衡取舍：


  -   性能

  -   可测试性

  -   可维护性

  -   安全性

  -   为未来需求预留空间


  平衡这些相互竞争方面的要求并非易事。接下来，我将对这些问题提出一些初步思考；本书其余部分的示例将更详细地阐释这些内容。


  ### 性能


  我们生活在一个越来越缺乏耐心的社会。客户和管理层的要求必须*立刻*（或者有时是昨天）得到满足。我们想要快餐、快车和快捷的服务，并一直在寻求各种即时满足。这种对速度的需求无疑适用于数据库开发领域。用户似乎持续不断地感觉应用程序的性能未达到应有的水平，即使这些应用程序正在执行大量的工作。有时感觉用户似乎更愿意以尽可能快的速度获取*任何*数据，而不是在需要稍等片刻的情况下获取*正确的*数据。


  当然，问题在于性能并非易事，并且可能打破整个平衡。


  构建一个真正高性能的应用程序通常需要牺牲。功能可能需要削减（应用程序需要做的工作越少，速度就会越快），安全性可能需要降低（更少的授权循环意味着更少的工作），或者低效的代码可能需要用晦涩、难以维护的方式重写，以便从服务器中榨取每一个
  CPU 周期。


  那么，我们如何调和这种对极致性能的需求——许多人似乎只关心这个而忽略其他一切——与对开发最佳实践的需求呢？不幸的是，答案是有时我们只能尽力而为。大多数时候，如果我们发现自己处于用户抱怨性能的境地，并且如果不解决就会损失金钱或工作，用户不想听到为什么修复性能问题会增加耦合度和降低可维护性。用户只想要软件运行得快——而我们别无选择，只能交付。


  坚持最佳实践的一个幸运事实是，出于多种原因，它们通常被认为是处理事情的最佳方式。在开发周期中密切关注耦合、内聚和正确封装等问题，不仅可以减少性能问题的发生，还会使修复大多数问题变得容易得多。而在那些你需要打破一些“完美”代码以使其达到必要速度的少数情况下，请知道这不是你的错——是社会把你置于这种境地！


  ### 可测试性


  不经过彻底测试就发布任何产品，至少可以说不是明智之举。然而，开发人员利用反模式导致难以或无法进行适当测试的情况很常见。许多这类问题源于试图创建“灵活”模块或接口的尝试——与其正确划分功能并密切关注内聚性，有时人们会忍不住创建“包罗万象”、单体的例程，试图包办一切。


  开发这类例程会产生永远无法完全测试的软件。单个例程可能用例的组合爆炸可能非常巨大——尽管在大多数情况下，应用程序用户实际使用的组合要有限得多。


  在仅仅为了灵活性而实施灵活的解决方案之前，请仔细考虑。它真的需要那么灵活吗？这些功能是会立即被完全利用，还是可以以后根据需要慢慢扩展？


  ### 可维护性


  在应用程序的整个生命周期中，各种模块和例程都需要以增强和错误修复的形式进行维护和修订。影响例程可维护性高低的问题与影响可测试性的问题相似，但也有一些不同之处。


  在确定给定例程的可测试性时，我们通常只关心接口是否足够稳定以允许编写测试用例。而在确定可维护性水平时，我们也关心暴露的接口，但原因略有不同。从可维护性的角度来看，最重要的接口问题是耦合。紧密耦合的例程往往具有更高的维护成本，因为任何更改都必须传播到多个例程，而不是在一个地方进行更改。


  可维护性的问题也超出了接口，延伸到实际的实现。一个例程可能拥有稳定、简单的接口，但其实现却可能复杂、缺乏文档，难以处理。一般来说，例程中的代码行数越多，维护就越困难；但由于大型例程也可能预示着内聚性问题，如果开发人员在设计过程中有所留意，这类问题应该能在早期被发现。


  值得注意的是，我所提出的“数据库即 API”思维方式要求使用存储过程作为数据的接口，但并不涉及你使用何种协议来访问这些存储过程的细节。许多软件公司发现，Web
  服务是提供标准、跨平台接口层的好方法，例如使用 `ADO.NET data services` 基于 `entity data model` 生成 `RESTful
  web service`。使用 Web 服务是否优于其他协议，必须视具体情况而定；像任何其他技术一样，它们当然也可能被错误地使用或在错误的场景中使用。请记住，Web
  服务需要更多的网络带宽，并且遵循与 `SQL Server` 支持的其他协议不同的身份验证规则——它们的使用最终可能带来的问题比解决的更多。


  通过使用具有正确定义接口和完全信息封装的存储过程，应用程序与数据库之间的耦合将大大降低，从而形成一个更易于随时间维护和演进的数据库系统。


  仅用几段话很难强调存储过程在一个设计良好的 `SQL Server` 数据库系统中扮演的重要性。为了强化数据库必须被视为 API 而非仅仅是持久层的观点，本书将在后续章节中结合处理外部系统接口的示例，重新审视这个主题。




  正如可测试性一样，可维护性在某种程度上也受到创建“灵活”接口尝试的影响。一方面，接口的灵活性可能通过要求调用者过多了解参数组合、可重写选项等，而增加例程之间的耦合度。

  另一方面，具有灵活接口的例程有时可能更容易维护——至少在项目初期是如此。在某些情况下，使例程尽可能通用化，可能导致系统所需的总例程数量减少，从而需要维护的代码量也随之减少。然而，随着功能的增加，这些通用例程易于修改的特性往往会因每个新选项或参数带来的复杂度增加而减弱。因此，在项目早期旨在实现一定灵活性，然后在可维护性开始下降时再进行重构，通常是有利的。


  '
- '# 第 章 „ 面向数据库世界的软件开发方法论


  可维护性还与可测试性在另一个关键方面相关联：一个例程越容易测试，就越容易修改。当存在能够快速验证新实现方法的测试时，破坏性变更就不再是大问题。


  ### 安全性


  在一个身份盗窃几乎每晚都会上新闻、一台连接到互联网且未设防的计算机将在 30 秒内被入侵的时代，安全性被视为开发软件应用程序最重要的领域之一也就不足为奇了。然而，安全性也是最复杂的领域之一，而复杂性可能隐藏着经过训练的攻击者可以轻易利用的缺陷。

  复杂的安全方案也会对特定软件的可测试性和可维护性产生巨大影响。从测试的角度来看，开发人员需要考虑给定的安全方案是否会创造出过多的变量，从而使测试变得不可行。例如，如果用户被分成不同的组，每个组拥有不同的安全权限，那么是否需要为每个用户组运行每组测试？在应用程序可以被视为“完全”测试之前，需要执行多少测试组合？

  从维护的角度来看，安全方面的复杂性与任何其他类型实现的复杂性同样危险。一个给定的例程越复杂，维护起来就越困难（因此也越昂贵）。

  在数据依赖型应用程序中，大部分安全责任通常会被推到数据层。数据层或数据库的安全责任通常包括诸如应用程序认证、数据查看授权和数据可用性等领域。将这些安全责任封装在数据库例程中，从整体应用程序可维护性的角度来看可能是有益的，但必须小心确保数据库例程不会变得如此不堪重负，以至于其可维护性、可测试性或性能受到影响。


  ## 为未来需求留有余地


  在一个动态环境中，你面临不断变化的客户需求和额外的功能请求，很容易过多地关注明天的增强功能，而不是专注于今天的缺陷。浏览许多技术规范和数据字典时，常见到“为将来使用保留”这一短语。开发者倾向于相信，预先增加复杂性会通过减少后期开发工作量来带来优势。然而，这种猜测未来需求的方法常常适得其反，产生充满维护负担的软件。这些代码片段必须由开发团队携带并保持最新，以便编译应用程序，但它们通常在多年内完全未被使用。

  甚至 SQL Server 本身也会遇到这些问题。例如，根据 `Books Online`，SQL Server 2008 中 `sp_stored_procedures`
  存储过程返回的 `NUM_INPUT_PARAMS`、`NUM_OUTPUT_PARAMS` 和 `NUM_RESULT_SETS` 被保留供将来使用 (`http://msdn.microsoft.com/en-us/library/ms190504.aspx`)，正如它们在
  SQL Server 2005 中一样 (`http://msdn.microsoft.com/en-us/library/ms190504(SQL.90).aspx`)。

  在我参与过的一个有 15 年历史的应用程序中，最初的开发团队特别热衷于在代码库中预先填充为未来保留的功能。唉，经过几年、几轮裁员和大量人员流动后，原始团队成员已无一人留下。不得不处理这个
  200 万行应用程序的剩余开发人员，不敢移除任何东西，生怕破坏某个早已被遗忘但仍被某个用户依赖的功能。至少可以这么说，这是一个惨淡的景象，很难想象这些年来为了保持所有冗余代码的更新浪费了多少时间。


  '
- '# 第 1 章 „ 面向数据库世界的软件开发方法论


  虽然这个例子很极端（无疑是我迄今为止遇到过最糟糕的），但它教导我们坚持软件开发的黄金法则：`KISS` 原则（保持简单，愚蠢）。让你的软件项目尽可能直接明了。明天添加新功能应该始终是次要关注点，首要的是在今天交付一个稳健、可用的产品。


  ## 总结


  应用程序对数据库的依赖远不止于单纯的数据持久化，数据库开发者必须理解整个应用程序开发过程，才能创建真正有效的数据库系统。

  通过理解诸如耦合、内聚和封装等架构概念，数据库开发者可以定义模块化的数据接口，从而在持续维护和测试中获得巨大收益。数据库开发者还必须理解如何最好地将数据从面向对象系统映射到数据库结构，以便有效地持久化和操作数据。

  本章介绍了这些概念。这里提出的概念将在本书后续章节的各种例子中再次讨论。


  '
- '# 第 2 章 „ „ „ 数据库编程最佳实践


  软件开发不仅仅是编码员执行的一门实践学科，也是学术研究和理论的领域。现在有大量关于软件开发的知识体系，并且已经撰写了冗长的学术论文来提出、剖析和讨论不同的开发方法。各种方法论已经出现，包括测试驱动开发
  (`TDD`)、敏捷和极限编程 (`XP`) 以及防御性编程，关于这些思想流派所提供好处的争论不计其数。

  本章描述的实践，以及本书其余部分所采用的方法，与防御性编程的理念最为契合。然而，这里讨论的主题同样可以轻松应用于任何环境。虽然软件理论家可能会争论不同方法论之间的细微差别（无疑，它们在某些方面确实不同），但归根结底，无论你采用哪种方法论，良好编程的基本特征始终如一。

  我无意提供一份关于什么构成最佳实践的详尽、客观的指南，而是旨在强调一些我认为能够体现数据库开发者为做好工作所需专业水准的标准。我将从防御性角度来阐述每个论点的理由，但请记住，这些论点通常在其他环境中也同样有效。


  ## 防御性编程




  防御性编程是一种软件开发中使用的方法论，它建议开发者应主动预测并为（或“防范”）不可预见的未来事件做出预案。


  防御性编程的目标是创建即使在面临意外情况时也能保持健壮和有效的应用程序。


  防御性编程本质上是对世界持悲观看法——如果某事可能出错，它就会出错：网络资源会在事务处理中途变得不可用；所需的文件可能缺失或损坏；用户输入数据的方式可能与预期有无数种不同，等等。防御性程序员不会听天由命，而是会预测到这些可能性，并编写相应的处理代码来检查和处理这些情况。这意味着潜在的错误状况可以在实际错误发生前被检测并处理。


  请注意，防御性编程不一定能使应用程序在异常情况发生时继续运行，但它确实使系统能够以一种可预测的、受控的方式运行——实现*优雅降级*，而非冒着导致未知后果的崩溃风险。在许多情况下，可能可以识别并隔离导致故障的特定组件，从而允许应用程序的其余部分继续运行。


  '
- '# 第二章：数据库编程最佳实践


  防御性编程实践并没有一个明确的列表，但普遍认为在开发中采取防御姿态包括以下原则：


  *   保持简单（或 `KISS`——保持简单，愚蠢）。应用程序的强大和有效并非源于其复杂性，而是源于其优雅的简洁。复杂性会隐藏缺陷，应在应用程序设计和编码实践中都予以避免。

  *   “即使没坏，也要修复它。”防御性编程鼓励持续、主动地进行测试，并为应用程序做未来的防护，以应对未来可能发生的破坏性变更，而不是等待东西坏掉。

  *   在所有的阶段和开发过程中都保持质疑、彻底和谨慎。应进行“如果……会怎样？”的分析，以识别在应用程序正常（和非正常）使用期间可能发生的异常场景。

  *   应与不同的同行群体（包括其他开发人员或技术团队、顾问、最终用户和管理人员）进行广泛的代码审查和测试。这些不同的群体可能有不同的隐含假设，而这些假设可能不会被封闭的开发团队考虑到。

  *   应尽可能避免假设。如果一个应用程序需要某个条件为真才能正确运行，则应有一个对此的显式断言，并且应插入相应的代码路径来根据结果进行检查并采取相应行动。

  *   应用程序应由简短、高内聚、松耦合的模块构建而成。以这种方式良好封装的模块可以被彻底地独立测试，然后可以在整个应用程序中自信地复用。复用特定的代码模块，而不是复制功能，可以减少引入新缺陷的机会。


  在本章的剩余部分，我将提供我认为是展示上述每项原则的最佳实践的简单示例，并且这些概念将在本书的后续章节中不断被重新审视。


  ## 对防御性编程的态度


  采用防御性编程方法的关键优势本质上是双重的：


  *   防御性应用程序通常健壮且稳定，需要较少的关键缺陷修复，并且更能抵御那些在其他情况下可能导致昂贵故障或崩溃的情况。因此，它们具有较长的预期寿命和相对较低的持续维护成本。




  '
- '# 数据库编程最佳实践


  在许多情况下，防御性编程能够提升用户体验。通过主动预见并为异常情况做好准备，错误可以在其发生*之前*就被捕获，而无需事后处理。异常情况可以被隔离并处理，从而对用户体验产生最小的负面影响，避免引发整个系统故障。即使遇到极端的意外状况，系统仍然可以**优雅降级**，并按照既定文档描述的行为运作。


  然而，如同任何思想流派一样，防御性编程也有其反对者。以下列举了对防御性编码常见的一些批评。针对每一点，我都尝试给出合理的回应。


  ## *防御性编码开发耗时更长*


  相较于遵循其他软件实践开发的应用程序，遵循防御性方法论确实可能导致前期开发时间更长。防御性编程非常强调初始的需求收集和架构设计阶段，这些阶段可能比某些方法学更长、更复杂。编码本身也需要更长时间，因为可能需要添加额外的代码路径来处理检查并断言假设。


  代码必须经过既具挑战性又彻底的广泛审查，然后还必须经过严格的测试。所有这些因素都导致防御性软件的总体开发和发布周期比其他方法更长。


  防御性编程与所谓的`敏捷`开发实践之间存在尤为鲜明的对比，后者专注于在非常快速的开发和发布周期上发布频繁的迭代变更。然而，这并不一定意味着，在考虑应用程序的整个生命周期时，防御性编码的开发时间更长。在开发初期投入的额外细致和谨慎，通常会在项目的生命周期中得到回报，因为项目一旦上线，对代码修复部署的需求就会减少。


  ## *编写能够预见和处理所有可能场景的代码会使防御性应用程序变得臃肿。*


  `代码膨胀`意味着应用程序包含了不必要的、低效的或浪费的代码。防御性代码防范的是*不太可能*发生但绝非不可能发生的事件。提前采取行动明确测试和处理异常情况，可以节省未来可能花费的大量追踪和调试时间。防御性应用程序可能包含比其他应用程序更多的总代码行数，但所有这些代码都应设计良好、目的明确。请注意，“防御性编程”这个标签有时会被误用：不加考虑或论证地在任何机会下添加不必要的检查，这*并非*防御性编程。这样的行为会导致代码既复杂又僵化。请记住，真正的防御性编程提倡简洁性、模块化和代码重用，这实际上有助于减少代码膨胀。


  ## *防御性编程隐藏了错误，导致它们得不到修复，而不是使其可见。*


  这或许是对防御性实践最常见的误解，源于未能理解防御性应用程序中对待错误的基本态度。通过明确识别和检查异常场景，防御性编程实际上采取了一种非常主动的方式来识别错误。然而，当遇到可能导致异常情况的条件时，防御性应用程序被设计为优雅地失效——也就是说，在开发阶段，识别出可能导致异常的潜在场景，并创建相应的代码路径。


