  ### 异常与错误


  术语 `exception`（异常）和 `error`（错误）虽然经常被开发人员互换使用，但实际上指的是略有不同的情况：


  `error` 可能在程序运行过程中出现问题时发生，即使它本质上可以是纯信息性的。例如，程序显示消息告知用户问号是文件名的无效字符，这被视为错误消息。然而，这可能意味着也可能不意味着程序本身处于无效状态。


  另一方面，`exception` 是由 `异常情况` 导致的错误。例如，如果正在使用一个网络库来发送数据包，而网络连接因有人拔掉网线而突然断开，该库可能会抛出一个异常。异常告知调用代码某处出错了，例程意外中止。如果调用者不
  `handle`（处理）该异常（即捕获它），其执行也将中止。这个过程将不断重复，直到异常被处理，或者它到达调用栈的最高层，此时整个程序将失败。


  另一种思考异常和错误的方式，是将错误视为程序 `预期` 会发生的情况。当文件名包含无效字符时显示的错误消息本质上是信息性的，因为程序的开发者预测到会发生此类事件，并专门创建了一条代码路径来处理它。另一方面，网络连接中断可能由无数种情况引起，因此更难以具体处理。相反，解决方案是引发一个异常并失败。然后，该异常可以由调用栈中更高级别的例程处理，该例程可以决定采取何种行动方案来解决问题。


  ### 什么定义了“异常”情况？


  软件社区中存在一些争论，即异常是否真的应该仅用于异常情况，还是可以作为程序常规操作的一部分而接受使用它们。例如，一些程序员选择定义大量不同的自定义



  '
- "# 第四章 错误与异常\n\n异常，然后有意引发这些异常，以此作为控制应用程序流程的一种方法。这种方法有一些可能的好处：引发异常是立即跳出例程（无论该例程在调用栈中嵌套得多深）的有效方式；而且，异常可用于描述那些用方法的正常返回值难以表达的情况。然而，尽管在这些场景中使用异常似乎很方便，但它们显然滥用了异常处理代码的预期目的（请记住，其目的是处理*异常*情况）。此外，大量调用异常会使你的代码难以阅读，并且可能使调试变得更加困难，因为调试器通常在遇到异常时会实现特殊行为。因此，与依赖更标准控制流结构的代码相比，充满异常的代码更难以维护。\n\
  \n在我看来，你只应在描述真正异常情况时引发异常。此外，由于异常可能导致中止条件，因此应谨慎使用。然而，使用异常而非错误确实有一个好处，那就是调用者更难忽略异常，因为如果未得到正确处理，它将导致代码中止。如果你正在设计一个需要确保调用者在某个条件发生时绝对能看到它的接口，那么使用异常而非错误可能是有意义的。\n\
  \n与几乎所有情况一样，这个决定很大程度上取决于你应用程序的上下文，所以不必觉得必须遵循我的意见！\n\n## SQL Server 中异常的工作原理\n\n\
  理解如何在 SQL Server 中处理错误和异常的第一步，是看看服务器本身如何处理错误条件。与许多其他编程语言不同，SQL Server 的异常模型对不同类型的异常有不同的行为。当错误条件确实发生时，这可能导致意外行为，因此在处理\
  \ T-SQL 异常时，谨慎编程至关重要。\n\n首先，考虑连接到 SQL Server 并发出一些 T-SQL。首先，你必须通过提供登录凭据来建立与服务器的`连接`。该连接还确定哪个数据库将用作作用域解析（即查找对象——稍后会详细介绍）的默认数据库。\n\
  \n一旦连接上，你就可以发出一批 T-SQL。一批由一个或多个 T-SQL`语句`组成，这些语句将被一起编译以形成一个执行计划。\n\nSQL Server 抛出的异常行为大多遵循相同的模式：根据异常类型，一条语句、一个批处理或整个连接可能会被中止。让我们看一些实际例子来观察这种行为。\n\
  \n### 语句级异常\n\n语句级异常只中止在一批 T-SQL 中当前正在运行的语句，允许该批中的任何后续语句运行。要查看此行为，你可以使用 SQL Server\
  \ Management Studio 执行一个包含异常，后跟一条`PRINT`语句的批处理。\n\n例如：\n\n```sql\nSELECT POWER(2,\
  \ 32);\nPRINT 'This will print!';\nGO\n```\n\n运行此批处理会产生以下输出：\n\n```text\nMsg 232,\
  \ Level 16, State 3, Line 1\nArithmetic overflow error for type int, value = 4294967296.000000.\n\
  This will print!\n```\n\n当运行此批处理时，尝试计算`POWER(2, 32)`导致了整数溢出，从而抛出了异常。然而，只有`SELECT`语句被中止。批处理的其余部分继续运行，在本例中，这意味着`PRINT`语句仍然打印了其消息。\n\
  \n### 批处理级异常\n\n与语句级异常不同，批处理级异常不允许批处理的其余部分继续运行。引发异常的语句将被中止，批处理中剩余的任何语句都不会运行。一个批处理中止异常的例子是无效转换，如下所示：\n\
  \n```sql\nSELECT CONVERT(int, 'abc');\nPRINT 'This will NOT print!';\nGO\n```\n\n\
  此批处理的输出如下：\n\n```text\nMsg 245, Level 16, State 1, Line 1\nConversion failed when\
  \ converting the varchar value 'abc' to data type int.\n```\n\n在这种情况下，转换异常发生在`SELECT`语句中，这在该点中止了批处理。`PRINT`语句未被允许运行，尽管如果批处理在异常发生*之前*包含任何有效语句，这些语句本应已成功执行。\n\
  \n批处理级异常很容易与连接级异常（它们会断开与服务器的连接）混淆，但在批处理级异常之后，连接仍然可以自由发送其他批处理。例如：\n\n```sql\nSELECT\
  \ CONVERT(int, 'abc');\nGO\nPRINT 'This will print!';\nGO\n```\n\n在此情况下，有两个批处理被发送到\
  \ SQL Server，由批处理分隔符`GO`分隔。第一个批处理抛出了转换异常，但第二个批处理仍然运行。这导致以下输出：\n\n```text\nMsg 245,\
  \ Level 16, State 1, Line 2\nConversion failed when converting the varchar value\
  \ 'abc' to data type int.\nThis will print!\n```\n\n批处理级异常不仅影响异常发生的作用域。异常将`向上冒泡`到下一级执行，中止堆栈中的每一个调用。这可以通过创建以下存储过程来说明：\n\
  \n```sql\nCREATE PROCEDURE ConversionException\nAS\nBEGIN\n    SELECT CONVERT(int,\
  \ 'abc');\nEND;\nGO\n```\n\n运行此存储过程后跟一条`PRINT`语句表明，即使异常发生在内部作用域（存储过程中），外部批处理仍然被中止：\n\
  \n```sql\nEXEC ConversionException;\nPRINT 'This will NOT print!';\nGO\n```\n\n\
  此批处理的结果与未使用存储过程时相同：\n\n```text\nMsg 245, Level 16, State 1, Line 4\nConversion failed\
  \ when converting the varchar value 'abc' to data type int.\n```\n\n## 解析和作用域解析异常\n\
  \n在解析或编译的作用域解析阶段发生的异常，起初表现得与批处理级异常一模一样。然而，它们的行为实际上略有不同。如果异常与批处理的其余部分发生在同一作用域中，这些异常的行为将与批处理级异常完全一样。另一方面，如果异常发生在较低级别的作用域中，这些异常的行为将与语句级异常完全一样——至少，就外部批处理而言是这样。\n\
  \n作为一个例子，考虑以下批处理，其中包含一个格式错误的`SELECT`语句（这是一个解析异常）：\n\n```sql\nSELECTxzy FROM SomeTable;\n\
  PRINT 'This will NOT print!';\nGO\n```\n\n在这种情况下，`PRINT`语句没有运行，因为在解析阶段整个批处理被丢弃。输出是以下异常消息：\n\
  \n```text\nMsg 156, Level 15, State 1, Line 1\nIncorrect syntax near the keyword\
  \ 'FROM'.\n```\n\n要看到行为上的差异，可以使用`EXEC`函数将`SELECT`语句作为动态 SQL 执行。这导致`SELECT`语句在不同的作用域中执行，将异常行为从类似批处理变为类似语句。尝试运行以下\
  \ T-SQL 来观察变化：\n\n```sql\nEXEC('SELECTxzy FROM SomeTable');\nPRINT 'This will print!';\n\
  GO\n```\n\n现在，`PRINT`语句被执行了，尽管异常发生了：\n\n```text\nMsg 156, Level 15, State 1, Line\
  \ 1\nIncorrect syntax near the keyword 'FROM'.\nThis will print!\n```\n\n"
- "# 第四章：错误与异常\n\n这种类型的异常行为也会在`作用域解析`过程中发生。本质上，SQL Server 分两个阶段处理查询。第一阶段解析并验证查询，确保\
  \ T-SQL 语法正确。第二阶段是编译阶段，在此阶段构建执行计划并解析查询中引用的对象。如果查询是通过应用程序的即席 SQL 或存储过程内的动态 SQL 提交给\
  \ SQL Server 的，这两个阶段会同时发生。\n\n然而，在存储过程的上下文中，SQL Server 采用了`后期绑定`技术。这意味着解析阶段在存储过程创建时发生，而编译阶段（因此也包括作用域解析）仅在存储过程执行时发生。\n\
  \n为了理解其含义，请创建以下存储过程（假设当前数据库中不存在名为 `SomeTable` 的表）：\n\n```sql\nCREATE PROCEDURE NonExistentTable\n\
  AS\nBEGIN\n    SELECT xyz\n    FROM SomeTable;\nEND;\nGO\n```\n\n尽管 `SomeTable`\
  \ 不存在，该存储过程仍被成功创建——T-SQL 代码解析时没有报错。但是，当执行该存储过程时，会抛出一个异常：\n\n```sql\nEXEC NonExistentTable;\n\
  GO\n```\n\n这将导致：\n\n> 消息 208，级别 16，状态 1，过程 NonExistentTable，第 4 行\n> 无效的对象名 'SomeTable'。\n\
  \n与解析异常类似，作用域解析异常在同一作用域内表现类似于批处理级异常，而在外部作用域则类似于语句级异常。由于存储过程创建了一个新的作用域，在该过程内遇到此类异常会中止过程的剩余部分，但在调用批处理中，执行存储过程之后遇到的任何\
  \ T-SQL 语句仍会继续运行。\n\n例如：\n\n```sql\nEXEC NonExistentTable;\nPRINT '这将会打印！';\nGO\n\
  ```\n\n会导致以下结果：\n\n> 消息 208，级别 16，状态 1，过程 NonExistentTable，第 4 行\n> 无效的对象名 'SomeTable'。\n\
  > 这将会打印！\n\n### 连接和服务器级异常\n\nSQL Server 抛出的某些异常可能非常严重，以至于会终止整个连接，或导致服务器本身崩溃。这些类型的连接级和服务器级异常通常由\
  \ SQL Server 内部错误引起，所幸相当罕见。在撰写本文时，我无法提供此类异常的示例，因为我不了解 SQL Server 2008 中存在任何可重现导致此类问题的条件。\n\
  \n## XACT_ABORT 设置\n\n尽管用户对 SQL Server 抛出异常的行为控制有限，但有一个设置可以按连接进行修改。启用 `XACT_ABORT`\
  \ 设置会使所有语句级异常表现得像批处理级异常。这意味着在查询执行期间，只要 SQL Server 抛出异常（且该异常未被处理），控制权总是会立即返回到客户端。\n\
  \n要为连接启用 `XACT_ABORT`，使用以下 T-SQL：\n\n```sql\nSET XACT_ABORT ON;\n```\n\n此设置将保持启用状态，直到使用以下\
  \ T-SQL 将其禁用：`SET XACT_ABORT OFF;`。即使它是在较低级别的作用域（例如在存储过程或动态 SQL 中）设置的，也会在整个连接期间保持有效。\n\
  \n为了说明此设置对异常行为的影响，让我们回顾一下已经介绍过的几个异常。回想一下，以下整数溢出异常是在语句级运行的：\n\n```sql\nSELECT POWER(2,\
  \ 32);\nPRINT '这将会打印！';\nGO\n```\n\n在运行此 T-SQL 之前启用 `XACT_ABORT` 设置会改变输出结果，导致 `PRINT`\
  \ 语句不会被执行：\n\n```sql\nSET XACT_ABORT ON;\nSELECT POWER(2, 32);\nPRINT '这将不会打印！';\n\
  GO\n```\n\n运行此批处理的输出如下：\n\n> 消息 232，级别 16，状态 3，第 2 行\n> 针对数据类型 \"int\" 的算术溢出错误，值\
  \ = 4294967296.000000。\n\n\n"
- "# 第四章：错误与异常\n\n请注意，`XACT_ABORT` 仅影响运行时错误的行为，对编译期间生成的错误无效。回顾之前的示例，该示例演示了使用 `EXEC`\
  \ 函数在较低作用域中引发的解析异常：\n\n```\nEXEC('SELECTxzy FROM SomeTable');\nPRINT 'This will\
  \ print!';\nGO\n```\n\n无论 `XACT_ABORT` 设置如何，此代码清单的结果都将保持不变，导致即使在异常发生后，`PRINT` 语句仍会被执行。\n\
  \n除了控制异常行为，`XACT_ABORT` 还会修改异常发生时事务的行为方式。有关更多信息，请参阅本章后面的“事务与异常”部分。\n\n## 剖析错误消息\n\
  \nSQL Server 异常有几个不同的组成部分，每个部分都在错误消息文本中有所体现。每个异常都有一个关联的错误号、错误级别和状态。错误消息还可能包含其他诊断信息，包括行号和发生异常的过程名称。\n\
  \n### 错误号\n\n异常的错误号列在错误文本中的 `Msg` 之后。例如，以下异常的错误号为 156：\n\n```\nMsg 156, Level 15,\
  \ State 1, Line 1\nIncorrect syntax near the keyword 'FROM'.\n```\n\nSQL Server\
  \ 通常随异常一起返回错误消息，因此从解决问题的角度来看，拥有错误号通常没有额外帮助。然而，在某些情况下，知道错误号会很有用。例如，在使用 `@@ERROR`\
  \ 函数时，或在使用 `TRY/CATCH` 语法进行专门的错误处理时（有关这些主题的详细信息，请参阅本章后面的“使用 `@@ERROR` 进行异常‘处理’”和“SQL\
  \ Server 的 `TRY/CATCH` 语法”部分）。\n\n错误号也可用于从 `sys.messages` 目录视图中查找错误消息的本地化翻译。`message_id`\
  \ 列包含错误号，`language_id` 列可用于获取正确语言的消息。例如，以下 T-SQL 返回错误 208 的英文文本：\n\n```\nSELECT\
  \ text\nFROM sys.messages\nWHERE\nmessage_id = 208\nAND language_id = 1033;\nGO\n\
  ```\n\n此查询的输出是一个错误消息模板，如下所示：\n\n```\nInvalid object name '%.*ls'.\n```\n\n有关错误消息模板的更多信息，请参阅“SQL\
  \ Server 的 `RAISERROR` 函数”部分。\n\n### 错误级别\n\n错误消息中的 `Level` 标签表示一个介于 1 到 25 之间的数字。这个数字有时可用于对异常进行分类或确定其严重性。不幸的是，关键词是“有时”：SQL\
  \ Server 分配的错误级别高度不一致，通常不应将其用于决定如何处理异常。\n\n根据其错误消息，以下异常的错误级别为 15：\n\n```\nMsg 156,\
  \ Level 15, State 1, Line 1\nIncorrect syntax near the keyword 'FROM'.\n```\n\n\
  每个异常的错误级别可以从 `sys.messages` 视图中查询，使用 `severity` 列。严重性小于 11 表示消息是**警告**。如果严重性大于或等于\
  \ 11，则该消息被视为**错误**，并可分为以下有文档记录的类别：\n\n*   错误级别 11 到 16 被文档记录为“用户可纠正的错误”。SQL Server\
  \ 抛出的大多数异常都在此范围内，包括约束违规、解析和编译错误以及大多数其他运行时异常。\n*   错误级别 17 到 19 是更严重的异常。这些包括内存不足异常、磁盘空间异常、内部\
  \ SQL Server 错误及其他类似违规。其中许多在抛出时会自动记录到 SQL Server 错误日志中。您可以通过检查 `sys.messages` 表中的\
  \ `is_event_logged` 列来识别那些被记录的异常。\n*   错误级别 20 到 25 是致命的连接和服务器级别异常。\n\n\n\n## 第四章：错误与异常\n\
  \n包含各种类型的数据损坏、网络、日志记录及其他关键错误。此层级的几乎所有异常都会被自动记录。\n\n虽然构成每个范围的错误级别在联机丛书（http://msdn2.microsoft.com/en-us/library/ms164086.aspx）中有单独说明，但这些信息在许多情况下不一致或错误。例如，根据文档，严重级别\
  \ 11 表示“给定对象或实体不存在”的错误。然而，错误 208“对象名无效”是一个级别 16 的异常。许多其他错误也具有同样不可预测的级别，建议不要在客户端软件编程中依赖错误级别来处理逻辑。\n\
  \n除了不同错误的相对严重性存在不一致外，大多数情况下，错误的严重级别与该错误是在语句级还是批处理级行为之间，也没有可辨别的模式。例如，错误 245（“转换失败”）和错误\
  \ 515（“无法将值 NULL 插入...列不允许 NULL 值”）都是级别 16 的异常。然而，245 是一个批处理级异常，而 515 则在语句级行为。\n\
  \n### 错误状态\n\n每个异常都有一个 `State` 标签，其中包含有关该异常的信息，供 SQL Server 内部使用。SQL Server 为此标签使用的值未被记录，因此该标签通常没有帮助。以下异常的状态为\
  \ 1：\n\n```sql\nMsg 156, Level 15, State 1, Line 1\n关键字 'FROM' 附近的语法不正确。\n```\n\n\
  ### 附加信息\n\n除了错误号、级别和状态外，许多错误还带有附加信息，包括异常发生的行号以及（如果相关）发生异常的过程。以下错误消息表明在过程 `NonExistentTable`\
  \ 的第 4 行引用了一个无效的对象名：\n\n```sql\nMsg 208, Level 16, State 1, Procedure NonExistentTable,\
  \ Line 4\n对象名 'SomeTable' 无效。\n```\n\n如果异常不是发生在过程中，行号指的是导致异常的语句所在的批处理中的行号。\n\n注意不要将用\
  \ `GO` 分隔的批处理与单个批处理混淆。考虑以下 TSQL：\n\n```sql\nSELECT 1;\nGO\nSELECT 2;\nGO\nSELECT\
  \ 1/0;\nGO\n```\n\n在此情况下，尽管除零异常发生在代码清单本身的第 5 行，但异常消息将报告异常发生在第 1 行：\n\n```sql\n(1\
  \ 行受影响)\n(1 行受影响)\nMsg 8134, Level 16, State 1, Line 1\n遇到除以零的错误。\n```\n\n行号重置的原因在于，`GO`\
  \ 实际上并非 T-SQL 命令。`GO` 是 SQL Server 客户端工具（例如，SQL Server Management Studio 和 `SQLCMD`）识别的标识符，用于告诉客户端将查询拆分为批处理，并依次将每个批处理发送给\
  \ SQL Server。前面示例中报告的看似错误的行号，是因为每个批处理被单独发送到查询引擎。SQL Server 不知道在客户端（例如，在 SQL Server\
  \ Management Studio 中）这些批处理都在屏幕上一起显示。就 SQL Server 而言，这是三个完全独立的 T-SQL 单元，只是碰巧通过同一连接发送。\n\
  \n## SQL Server 的 `RAISERROR` 函数\n\n除了 SQL Server 自身抛出的异常外，用户还可以在 T-SQL 中使用名为 `RAISERROR`\
  \ 的函数来引发异常。该函数的通用形式如下：\n\n```sql\nRAISERROR ( { msg_id | msg_str | @local_variable\
  \ }\n    { ,severity ,state }\n    [ ,argument [ ,...n ] ] )\n    [ WITH option\
  \ [ ,...n ] ]\n```\n\n第一个参数可以是字符串或变量形式的临时消息，也可以是来自 `sys.messages` 表中 `message_id`\
  \ 列的有效错误号。如果指定了字符串，它可以包含格式说明符，然后可以使用函数调用末尾指定的可选参数来填充这些说明符。\n\n\n\n"
- "# 第四章：错误与异常\n\n第二个参数 `severity` 可用于对异常的行为实施某种程度的控制，类似于 SQL Server 使用错误级别的方式。在大多数情况下，适用相同的异常范围：级别在\
  \ 1 到 10 之间的异常产生警告，级别在 11 到 18 之间的异常被视为普通用户错误，而级别高于 18 的异常被视为严重异常，只能由 `sysadmin`\
  \ 固定服务器角色的成员引发。用户引发的超过级别 20 的异常，就像 SQL Server 引发的异常一样，会导致连接中断。除了这些范围之外，用户引发的异常没有真正的控制权，所有异常都被视为语句级别——即使设置了\
  \ `XACT_ABORT` 也是如此。\n\n**注意** `XACT_ABORT` 不会影响 `RAISERROR` 语句的行为。\n\n`state` 参数可以是\
  \ 1 到 127 之间的任何值，对异常的行为没有影响。它可用于向异常添加额外的编码信息——但在大多数情况下，将这些数据添加到错误消息本身可能同样简单。\n\n\
  使用 `RAISERROR` 的最简单方法是传入包含错误消息的字符串，并设置适当的错误级别和状态。对于一般异常，我通常使用严重级别 16 和状态值 1：\n\n\
  ```sql\nRAISERROR('General exception', 16, 1);\n```\n\n这会产生以下输出：\n\n```\nMsg 50000,\
  \ Level 16, State 1, Line 1\nGeneral exception\n```\n\n请注意，此情况下生成的错误号是 50000，这是当向\
  \ `RAISERROR` 的第一个参数传入字符串时将使用的通用用户定义错误号。\n\n**注意** 先前版本的 SQL Server 允许使用如下语法指定错误号和消息号：`RAISERROR\
  \ 50000 'General exception'`。此语法在 SQL Server 2008 中已弃用，不应再使用。\n\n### 格式化错误消息\n\n\
  定义错误消息时，通常以某种方式格式化文本是有用的。例如，思考一下你可能会如何编写代码，在循环中处理动态检索到的多个产品 ID。\n\n你可能有一个名为 `@ProductId`\
  \ 的局部变量，其中包含代码当前正在处理的产品 ID。如果是这样，你可能希望定义一个在发生问题时应引发的自定义异常——并且很可能最好随错误消息一起返回 `@ProductId`\
  \ 的当前值。\n\n在这种情况下，有几种方法可以将数据随异常一起发回。第一种是动态构建错误消息字符串：\n\n```sql\nDECLARE @ProductId\
  \ int;\nSET @ProductId = 100;\n/* ... 问题出现 ... */\nDECLARE @ErrorMessage varchar(200);\n\
  SET @ErrorMessage =\n    'Problem with ProductId ' + CONVERT(varchar, @ProductId);\n\
  RAISERROR(@ErrorMessage, 16, 1);\n```\n\n执行此批处理会产生以下输出：\n\n```\nMsg 50000, Level\
  \ 16, State 1, Line 10\nProblem with ProductId 100\n```\n\n虽然这在此情况下有效，但动态构建错误消息并不是最优雅的开发实践。更好的方法是使用格式设计符并将\
  \ `@ProductId` 作为可选参数传递，如下面的代码清单所示：\n\n```sql\nDECLARE @ProductId int;\nSET @ProductId\
  \ = 100;\n/* ... 问题出现 ... */\nRAISERROR('Problem with ProductId %i', 16, 1, @ProductId);\n\
  ```\n\n执行此批处理会产生与之前相同的输出，但所需的代码量大大减少，并且你不必担心定义额外变量或构建繁琐的转换代码。嵌入在错误消息中的 `%i` 是一个格式设计符，表示“整数”。另一个最常用的格式设计符是\
  \ `%s`，表示“字符串”。\n\n你可以在错误消息中嵌入任意数量的设计符，它们将按照附加可选参数的顺序进行替换。例如：\n\n```sql\nDECLARE\
  \ @ProductId1 int;\nSET @ProductId1 = 100;\nDECLARE @ProductId2 int;\nSET @ProductId2\
  \ = 200;\nDECLARE @ProductId3 int;\nSET @ProductId3 = 300;\n/* ... 问题出现 ... */\n\
  RAISERROR('Problem with ProductIds %i, %i, %i',\n    16, 1, @ProductId1, @ProductId2,\
  \ @ProductId3);\n```\n\n这会产生以下输出：\n\n```\nMsg 50000, Level 16, State 1, Line 12\n\
  Problem with ProductIds 100, 200, 300\n```\n\n**注意** 熟悉 C 编程的读者会注意到，`RAISERROR`\
  \ 使用的格式设计符与 C 语言的 `printf` 函数使用的相同。有关支持的设计符的完整列表，请参阅 SQL Server 2008 联机丛书中的“[RAISERROR\
  \ (Transact-SQL)](https://docs.microsoft.com/en-us/sql/t-sql/language-elements/raiserror-transact-sql)”主题。\n\
  \n## 创建持久的自定义错误消息\n\n使用格式设计符格式化消息而不是动态构建字符串是朝着正确方向迈出的一步，但它没有解决最后一个关键问题：如果你需要在多个地方使用相同的错误消息怎么办？你可以在需要该异常的每个例程中简单地使用完全相同的参数调用\
  \ `RAISERROR`，但如果你需要更改错误消息，这可能会导致维护难题。此外，每个异常都将只能使用默认的用户定义错误号 50000，这使得针对这些自定义异常的编程变得更加困难。\n\
  \n幸运的是，SQL Server 很好地解决了这些问题，它提供了一种机制，可以将自定义错误消息添加到 `sys.messages`。然后，可以使用 `RAISERROR`\
  \ 并传入自定义错误号作为第一个参数来引发使用这些错误消息的异常。\n\n要创建持久的自定义错误消息，请使用存储过程 `sp_addmessage`。此存储过程允许用户为大于\
  \ 50000 的消息编号指定自定义消息。除了错误消息外，用户还可以指定默认严重级别。使用 `sp_addmessage` 添加的消息的作用域是服务器级别，因此如果你在同一服务器上托管多个应用程序，请注意它们是否定义了自定义消息以及是否存在任何重叠——你可能需要为一个或多个应用程序设置新的\
  \ SQL Server 实例，以允许它们创建自己的异常。在开发使用自定义消息的新应用程序时，请尝试选择一个定义明确的范围来创建你的消息，以避免在共享环境中与其他应用程序重叠。\n\
  \n请记住，你可以使用 50000 到 2147483647 之间的任何数字，不必局限于 50000 范围。\n\n添加自定义消息就像调用 `sp_addmessage`\
  \ 并定义消息编号和消息文本一样简单。以下 T-SQL 将上一节中的消息定义为错误消息编号 50005：\n\n```sql\nEXEC sp_addmessage\n\
  \    @msgnum = 50005,\n    @severity = 16,\n    @msgtext = 'Problem with ProductIds\
  \ %i, %i, %i';\nGO\n```\n\n一旦执行此 T-SQL，就可以通过使用适当的错误号调用 `RAISERROR` 来引发使用此错误消息的异常：\n\
  \n```sql\nRAISERROR(50005, 15, 1, 100, 200, 300);\n```\n\n这会导致以下输出被发送回客户端：\n\n```\n\
  Msg 50005, Level 15, State 1, Line 1\nProblem with ProductIds 100, 200, 300\n```\n\
  \n请注意，在这种情况下调用 `RAISERROR` 时指定了严重级别 15，尽管自定义错误最初定义为严重级别 16。这引出了关于自定义错误严重级别的一点重要说明：在调用\
  \ `RAISERROR` 时指定的任何严重级别都将覆盖为该错误定义的严重级别。但是，如果你向 `RAISERROR` 的该参数传递一个负值，则将使用默认严重级别：\n\
  \n```sql\nRAISERROR(50005, -1, 1, 100, 200, 300);\n```\n\n这会产生以下输出（请注意，`Level` 现在是\
  \ 16，与创建错误消息时定义的一致）：\n\n```\nMsg 50005, Level 16, State 1, Line 1\nProblem with\
  \ ProductIds 100, 200, 300\n```\n\n建议，除非有特定原因需要覆盖严重级别，否则在引发自定义异常时，始终对严重性参数使用 -1。\n\
  \n\n\n"
- "# 第四章：错误与异常\n\n### 记录用户抛出的异常\n\n一旦定义了异常文本后，使用 `sp_addmessage` 也很容易进行修改。操作时，可传入可选参数\
  \ `@Replace`，并将其值设为 `'Replace'`，如下列 T-SQL 所示：\n\n```sql\nEXEC sp_addmessage\n  \
  \  @msgnum = 50005,\n    @severity = 16,\n    @msgtext = 'Problem with ProductId\
  \ numbers %i, %i, %i',\n    @Replace = 'Replace';\nGO\n```\n\n> **注意：** 除了能够添加消息和设置严重级别外，`sp_addmessage`\
  \ 还支持为不同语言本地化消息。此处的示例未显示本地化；相反，消息将为用户的默认语言创建。有关本地化消息的详细信息，请参阅 SQL Server 2008 联机丛书。\n\
  \n`RAISERROR` 另一个有用的功能是能够将消息记录到 SQL Server 的错误日志中。这在处理自动化代码时尤其方便，例如通过 SQL Server\
  \ 代理作业运行的 T-SQL。\n\n为了记录任何异常，需要使用 `RAISERROR` 函数的 `WITH LOG` 选项，如下列 T-SQL 所示：\n\n\
  ```sql\nRAISERROR('This will be logged.', 16, 1) WITH LOG;\n```\n\n请注意，记录错误需要特定的访问权限。执行\
  \ `RAISERROR` 函数的用户必须是 `sysadmin` 固定服务器角色的成员，或者具有 `ALTER TRACE` 权限。\n\n### 使用跟踪监控异常事件\n\
  \n一些应用程序开发人员在处理异常时做得太过头，最终创建的应用程序通过捕获发生的每个异常并且不报告来隐藏问题。在这种情况下，如果不了解是否抛出了异常，调试问题可能极其困难。如果您发现自己处于这种情况，可以使用\
  \ Profiler 跟踪来监控 SQL Server 中发生的异常。\n\n为了监控异常，需要启动一个跟踪并选择 `Exception` 和 `User Error\
  \ Message` 事件。对于大多数严重级别大于 10 的异常，这两个事件都会触发。`Exception` 事件将包含与该异常关联的所有数据，但实际的消息除外。这包括错误号、严重级别、状态和行号。`User\
  \ Error Message` 事件将包含发送给客户端的格式化错误消息。\n\n对于警告（严重级别小于 11 的消息），只会触发 `User Error Message`\
  \ 事件。\n\n您可能还会注意到错误 208 异常（“找不到对象”）而没有相应的错误消息事件。这些异常是 SQL Server 查询优化器在编译的作用域解析阶段内部使用的，可以安全地忽略。\n\
  \n## 异常处理\n\n理解 SQL Server 何时、为何以及如何抛出异常固然很好，但真正的目标是在异常发生时实际*做一些事情*。**异常处理**指的是在异常发生时能够**捕获**它，而不是简单地让它冒泡到下一级作用域的能力。\n\
  \n### 为什么要在 T-SQL 中处理异常？\n\nT-SQL 中的异常处理应被视为与其他任何语言中的异常处理没有不同。一个普遍接受的编程实践是在*尽可能低的范围*处理异常，以防止它们与更高层的应用程序交互。如果异常可以在较低层次被捕获并在那里处理，较高层的模块将不需要特殊代码来处理该异常，因此可以专注于它们自身的功能。这意味着应用程序中的每个例程都变得更简单、更易于维护，因而很可能也更健壮。\n\
  \n换句话说，异常应该尽可能地*封装*起来——了解其他模块的内部异常是另一种形式的耦合，与本书第一章讨论的某些类型没有太大不同。\n\n请记住，异常的封装确实需要根据具体情况处理。但基本规则是，如果您能够以某种方式“修复”异常而不让调用者知道它曾经发生过，那可能就是一个适合封装的地方。\n\
  \n### 使用 @@ERROR 进行异常“处理”\n\nSQL Server 2005 之前的版本没有真正的异常处理能力。发生的任何异常都会被传递回调用者，无论存储过程或查询的代码采取了何种操作（即使它抛出了异常）。尽管\
  \ SQL Server 2008 现在大多提供了更好的替代方案，但在早期版本的 SQL Server 中用于“处理”错误的一般方法在某些情况下仍然有用——而且大量遗留代码还将存在相当长一段时间——因此快速回顾一下绝对有必要。\n\
  \n> **注意：** 如果您正在按顺序尝试本章中的示例，请确保在尝试以下示例之前已关闭 `XACT_ABORT` 设置。\n\n`@@ERROR` 函数非常简单：如果批处理中的最后一条语句没有抛出严重级别为\
  \ 11 或更高的错误，则返回 `0`。如果最后一条语句确实抛出了错误，则返回错误号。例如，考虑以下 T-SQL：\n\n```sql\nSELECT 1/0\
  \ AS DivideByZero;\nSELECT @@ERROR AS ErrorNumber;\nGO\n```\n\n第一条语句返回以下消息：\n\n\
  ```\nMsg 8134, Level 16, State 1, Line 1\nDivide by zero error encountered.\n```\n\
  \n第二条语句返回一个包含单个值的结果集，该值是与上一个错误相关的错误号：\n\n```\nErrorNumber\n-----------\n8134\n```\n\
  \n通过检查 `@@ERROR` 的值是否非零，可以执行一些非常初级的错误处理。不幸的是，由于 `@@ERROR` 的特性以及它仅作用于批处理中*最后一条*执行的语句，这种方法也相当容易出错。许多刚接触\
  \ T-SQL 的开发人员对以下批处理的输出感到非常惊讶：\n\n```sql\nSELECT 1/0 AS DivideByZero;\nIF @@ERROR\
  \ <> 0\n    SELECT @@ERROR AS ErrorNumber;\nGO\n```\n\n此代码的第一行产生了与之前相同的错误消息，但在此时，`SELECT\
  \ @@ERROR` 的结果是：\n\n```\nErrorNumber\n-----------\n0\n```\n\n原因是紧接在 `@@ERROR` 之前执行的语句不是除零错误，而是\
  \ `IF @@ERROR <> 0` 这一行，它没有产生错误。解决此问题的方法是在批处理中每个需要错误处理的语句之后，将 `@@ERROR` 的值赋给一个变量，然后检查该变量而不是\
  \ `@@ERROR` 本身的值。当然，即使只遗漏了一条语句，策略中也可能留下漏洞，一些错误可能会逃脱注意。\n\n即使存在这些问题，`@@ERROR` 在 SQL\
  \ Server 2008 中可以说仍然占有一席之地。它是最近添加到 T-SQL 语言中的完整异常处理能力的一个简单、轻量级的替代方案，并且它还有一个额外的好处，即*不*捕获异常。在某些情况下，完全封装并非最佳选择，使用\
  \ `@@ERROR` 将允许开发人员采取一些操作（例如，记录异常），同时仍然将其传递回调用者。\n\n### SQL Server 的 TRY/CATCH 语法\n\
  \n包括 T-SQL 在内的许多编程语言中，标准的错误处理结构被称为 *try/catch*。这种结构背后的思想是设置两个代码部分（也称为**块**）。第一部分，即\
  \ **try 块**，包含要“尝试”的可能引发异常的代码。第二部分包含在 try 块中的代码失败并发生异常时应执行的代码。这被称为 **catch 块**。一旦\
  \ try 块内发生任何异常，代码执行立即跳转到 catch 块。这也被称为**捕获**异常。\n\n在 T-SQL 中，`try/catch` 使用以下基本形式实现：\n\
  \n```sql\nBEGIN TRY\n    -- 此处放置要尝试的代码\nEND TRY\nBEGIN CATCH\n    -- 如果抛出异常，则在此处执行代码\n\
  END CATCH\nGO\n```\n\n\n\n"
- "# 第 4 章 错误与异常\n\n在`BEGIN TRY`和`END TRY`之间发生的任何类型异常——连接或服务器级别异常除外——都将导致`BEGIN CATCH`和`END\
  \ CATCH`之间的代码立即执行，绕过`TRY`块中剩余的任何代码。\n\n作为第一个示例，考虑以下 T-SQL：\n\n```sql\nBEGIN TRY\n\
  \    SELECT 1/0 AS DivideByZero;\nEND TRY\nBEGIN CATCH\n    SELECT 'Exception Caught!'\
  \ AS CatchMessage;\nEND CATCH\n```\n\n运行此批处理会产生以下输出：\n\n```\nDivideByZero\nCatchMessage\n\
  Exception Caught!\n```\n\n这里需要注意的是，首先，没有报告异常。我们可以看到发生了异常，因为代码执行跳到了`CATCH`块，但异常被成功处理了，客户端并不知道发生了异常。其次，请注意导致异常的`SELECT`语句返回了一个空结果集。如果异常没有被处理，则不会返回任何结果集。通过返回空结果集，`SELECT`语句的隐含契约得到了履行（或多或少，取决于客户端实际期望什么）。\n\
  \n虽然已经提到过，但需要强调的是，当使用`TRY/CATCH`时，在`TRY`块中遇到的所有异常都将立即中止`TRY`块剩余部分的执行。\n\n因此，以下 T-SQL\
  \ 的输出与上一个示例完全相同：\n\n```sql\nBEGIN TRY\n    SELECT 1/0 AS DivideByZero;\n    SELECT\
  \ 1 AS NoError;\nEND TRY\nBEGIN CATCH\n    SELECT 'Exception Caught!' AS CatchMessage;\n\
  END CATCH\n```\n\n## 获取`CATCH`块中的扩展错误信息\n\n除了能够捕获异常之外，SQL Server 2008 还提供了一系列可在`CATCH`块中使用的附加函数。这些函数（列表如下）使开发人员能够编写代码来检索`TRY`块中发生的异常的信息。\n\
  \n- `ERROR_MESSAGE`\n- `ERROR_NUMBER`\n- `ERROR_SEVERITY`\n- `ERROR_STATE`\n- `ERROR_LINE`\n\
  - `ERROR_PROCEDURE`\n\n这些函数不接受输入参数，并且根据其名称来看，其含义相当直观。\n\n然而，重要的是要指出，与`@@ERROR`不同，这些函数返回的值在每个语句之后不会被重置。它们在整个`CATCH`块中是持久的。因此，以下\
  \ T-SQL 中使用的逻辑是有效的：\n\n```sql\nBEGIN TRY\n    SELECT CONVERT(int, 'ABC') AS ConvertException;\n\
  END TRY\nBEGIN CATCH\n    IF ERROR_NUMBER() = 123\n        SELECT 'Error 123';\n\
  \    ELSE\n        SELECT ERROR_NUMBER() AS ErrorNumber;\nEND CATCH\n```\n\n正如预期的那样，在这种情况下，错误编号被正确报告：\n\
  \n```\nConvertException\nErrorNumber\n```\n\n这些函数，特别是`ERROR_NUMBER`，允许为某些异常编写特定的代码路径。\n\
  \n例如，如果开发人员知道某段代码可能会引发可以程序化修复的异常，则可以在`CATCH`块中检查该异常编号。\n\n#### 重新抛出异常\n\n大多数具有`try/catch`功能的编程语言中有一个常见特性，即能够从`catch`块中`rethrow`异常。这意味着最初在`try`块中发生的异常将被再次引发，就像它根本没有被处理一样。当你需要对异常进行一些处理，但同时也要让调用者知道例程中出现了问题时，这很有用。\n\
  \nT-SQL 不包含任何内置的`rethrow`功能。然而，基于`CATCH`块错误函数，结合`RAISERROR`，很容易创建这种行为。以下示例展示了 T-SQL\
  \ 中`rethrow`的基本实现：\n\n```sql\nBEGIN TRY\n    SELECT CONVERT(int, 'ABC') AS ConvertException;\n\
  END TRY\nBEGIN CATCH\n    DECLARE\n        @ERROR_SEVERITY int = ERROR_SEVERITY(),\n\
  \        @ERROR_STATE int = ERROR_STATE(),\n        @ERROR_NUMBER int = ERROR_NUMBER(),\n\
  \        @ERROR_LINE int = ERROR_LINE(),\n        @ERROR_MESSAGE varchar(245) =\
  \ ERROR_MESSAGE();\n    RAISERROR('Msg %d, Line %d: %s',\n              @ERROR_SEVERITY,\n\
  \              @ERROR_STATE,\n              @ERROR_NUMBER,\n              @ERROR_LINE,\n\
  \              @ERROR_MESSAGE);\nEND CATCH\nGO\n```\n\n由于`RAISERROR`不能用于抛出低于 13000\
  \ 的异常，在这种情况下“重新抛出”异常需要引发一个用户定义的异常，并将数据以特殊格式的错误消息发回。由于函数不允许在`RAISERROR`的调用中使用，因此必须在调用`RAISERROR`重新抛出异常之前定义变量并赋值错误函数的值。以下是此\
  \ T-SQL 的输出消息：\n\n```\n(0 row(s) affected)\nMsg 50000, Level 16, State 1, Line 19\n\
  Msg 245, Line 2: Conversion failed when converting the varchar value 'ABC'\nto data\
  \ type int.\n```\n\n请记住，根据你的接口需求，你可能并不总是希望重新抛出最初捕获的相同异常。在许多情况下，捕获初始异常，然后抛出一个对调用者更相关（或更有帮助）的新异常可能更有意义。\n\
  \n例如，如果你正在使用链接服务器，并且该服务器由于某种原因没有响应，你的代码将抛出超时异常。传回一个通用的“数据不可用”异常可能比向调用者暴露问题的实际原因更有意义。这应该根据具体情况决定，以便你为存储过程接口设计出最佳方案。\n\
  \n## 何时应该使用`TRY/CATCH`？\n\n如前所述，在 T-SQL 例程（例如存储过程中）处理异常的一般用例是，尽可能在较低级别进行封装，以简化应用程序的整体代码。这方面的一个主要例子是记录数据库异常。与其将无法正确处理的异常发送回应用层（在那里它将被记录回数据库），不如在数据库例程的范围内记录它，这样可能更有意义。\n\
  \n另一个用例涉及对源于应用程序代码的问题进行临时修复。例如，应用程序可能由于一个错误，偶尔向存储过程传递无效的键，而该存储过程本应将它们插入表中。通过在数据库中简单地捕获异常，而不是将其抛回给应用程序导致用户收到错误消息，来*临时*“修复”问题，可能更简单。将此类快速修复到位通常比重建和重新部署整个应用程序要便宜得多。\n\
  \n考虑何时*不*封装异常也很重要。确保不要过度处理安全问题、严重的数据错误以及其他应用程序——最终是用户——可能应该被告知的异常。绝对存在“过度处理异常”这种事，陷入这个陷阱可能意味着问题会被隐藏，直到它们引起足够的骚动而变得无法忽视。\n\
  \n隐藏在异常处理器背后的长期问题通常会以无法修复的数据损坏形式暴露出来。这些情况通常因缺乏可行的备份而凸显，因为问题已经存在了很长时间，并不可避免地以业务损失和开发人员更新简历寻找工作而告终。幸运的是，避免这个问题相当容易。只需运用一点常识，不要为了压制所有异常而走向极端。\n\
  \n## 使用`TRY/CATCH`构建重试逻辑\n\n\n"
- "# 第四章 - 错误与异常\n\n`TRY/CATCH` 可以用来完全封装异常的一个有趣例子是处理死锁。虽然尝试找到并解决死锁的根源比通过编码绕开它更好，但这通常是一项困难且耗时的任务。因此，至少在临时情况下，通过让应用程序重新发出导致死锁的请求来处理死锁是很常见的。最终，死锁条件会自行解决（即，当另一个事务完成时），而\
  \ DML 操作将按预期执行。请注意，我不推荐将此作为解决反复发生的死锁情况的长期方案！\n\n通过使用 T-SQL 的 `TRY/CATCH` 语法，应用程序不再需要重新发出请求，甚至不需要知道发生了问题。可以设置一个重试循环，其中易发生死锁的代码可以在\
  \ `TRY` 块中尝试，而死锁则在 `CATCH` 块中被捕获，以便再次尝试。\n\n下面是一个重试循环的基本实现：\n\n```sql\nDECLARE @Retries\
  \ int;\n\nSET @Retries = 3;\n\nWHILE @Retries > 0\n\nBEGIN\n\n    BEGIN TRY\n\n\
  \        /*\n\n        将易发生死锁的代码放在这里\n\n        */\n\n        --如果执行到达这里，表示成功\n\n\
  \        BREAK;\n\n    END TRY\n\n    BEGIN CATCH\n\n        IF ERROR_NUMBER() =\
  \ 1205\n\n        BEGIN\n\n            SET @Retries = @Retries - 1;\n\n        \
  \    IF @Retries = 0\n\n                RAISERROR('无法完成事务!', 16, 1);\n\n       \
  \ END\n\n        ELSE\n\n            RAISERROR('遇到非死锁条件', 16, 1);\n\n        BREAK;\n\
  \n    END CATCH\n\nEND;\n\nGO\n```\n\n在这个例子中，易发生死锁的代码会按照 `@Retries` 的值进行重试。每次循环中，代码都会被尝试执行。如果它成功执行而没有抛出异常，代码就会执行到\
  \ `BREAK` 语句，循环结束。否则，执行会跳转到 `CATCH` 块，在那里会检查错误编号是否为 1205（死锁牺牲品）。如果是，计数器会递减，以便可以再次尝试循环。如果异常不是死锁，则会抛出另一个异常，以便调用者知道出了问题。确保错误的异常不会触发重试非常重要。\n\
  \n## 异常处理与防御性编程\n\n异常处理极其有用，它在 T-SQL 中的应用更是无价之宝。然而，我希望所有读者记住，异常处理不能替代在错误条件发生*之前*对其进行的适当检查。只要可能，就应编写防御性代码——主动寻找问题，如果问题既能被检测到又能被处理，就编写代码来应对它们。\n\
  \n请记住，通常处理异常比处理错误是更好的主意。如果你能在开发期间预测到一个条件并编写代码路径来处理它，这通常会提供比试图在异常发生时捕获并处理它更健壮的解决方案。\n\
  \n### 异常处理与 SQLCLR\n\n.NET Framework 提供了其自己的异常处理机制，该机制与用于处理 T-SQL 中遇到的异常的机制完全不同。那么，当在\
  \ SQL Server 托管的 SQLCLR 进程中执行的 CLR 代码发生异常时，这两个系统如何交互呢？\n\n让我们看一个例子——下面的 C# 代码展示了一个简单的\
  \ CLR 用户定义函数 (UDF)，用于将一个数除以另一个数：\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction()]\n\
  \npublic static SqlDecimal Divide(SqlDecimal x, SqlDecimal y)\n\n{\n\n    return\
  \ x / y;\n\n}\n```\n\n当编录并在 SQL Server 中被调用，且 `y` 参数值为 0 时，结果如下：\n\n```\nMsg 6522,\
  \ Level 16, State 2, Line 1\n\n在执行用户定义例程或聚合 \"Divide\" 期间发生了 .NET Framework 错误:\n\
  \nSystem.DivideByZeroException: 遇到除以零错误。\n\nSystem.DivideByZeroException:\n\n  \
  \ at System.Data.SqlTypes.SqlDecimal.op_Division(SqlDecimal x, SqlDecimal y)\n\n\
  \   at ExpertSQLServer.UserDefinedFunctions.Divide(SqlDecimal x, SqlDecimal y)\n\
  \n.\n```\n\nSQL Server 会自动在其进程中执行的任何托管代码周围包装一个异常处理器。\n\n\n"
- "# 第 4 章：错误与异常\n\n在 SQL Server 内部。这意味着，如果托管代码抛出异常，它会被包装器捕获，然后生成一个错误。该错误消息包含原始异常的详细信息，以及其发生时的堆栈跟踪。\n\
  \n在这种情况下，原始 CLR 异常 `System.DivideByZeroException` 引发了一个 `6522` 错误，这是任何发生在 SQLCLR\
  \ 函数内部的未处理异常的通用错误消息。\n\n如前所述，处理此类异常的最佳方法是尽可能在最低层级解决。对于像本例中的用户定义函数（UDF）这样的情况，异常应该在\
  \ CLR 代码本身内部处理（例如使用 `try…catch`），这样就无需在 T-SQL 层级捕获它。\n\n这引发了一个有趣的点：如何处理系统定义的 CLR\
  \ 例程中产生的异常，例如由 `geometry`、`geography` 或 `hierarchyid` 类型定义的任何方法。考虑以下示例，该示例尝试使用无效值实例化\
  \ `hierarchyid` 和 `geography` 数据类型的变量：\n\n```sql\nDECLARE @HierarchyId hierarchyid\
  \ = '/1/1';\n\nDECLARE @Geography geography = 'POLYGON((0 51, 0 52, 1 52, 1 51 ,0\
  \ 51))';\nGO\n```\n\n这两条语句都将导致 CLR 异常，报告如下：\n\n```text\nMsg 6522, Level 16, State\
  \ 2, Line 1\nA .NET Framework error occurred during execution of user-defined routine\
  \ or aggregate \"hierarchyid\":\nMicrosoft.SqlServer.Types.HierarchyIdException:\
  \ 24001: SqlHierarchyId.Parse failed because the input string '/1/1' is not a valid\
  \ string representation of a SqlHierarchyId node.\nMicrosoft.SqlServer.Types.HierarchyIdException:\n\
  \   at Microsoft.SqlServer.Types.SqlHierarchyId.Parse(SqlString input).\n\nMsg 6522,\
  \ Level 16, State 1, Line 2\nA .NET Framework error occurred during execution of\
  \ user-defined routine or aggregate \"geography\":\nMicrosoft.SqlServer.Types.GLArgumentException:\
  \ 24205: The specified input does not represent a valid geography instance because\
  \ it exceeds a single hemisphere. Each geography instance must fit inside a single\
  \ hemisphere. A common reason for this error is that a polygon has the wrong ring\
  \ orientation.\nMicrosoft.SqlServer.Types.GLArgumentException:\n   at Microsoft.SqlServer.Types.GLNativeMethods.ThrowExceptionForHr(GL_HResult\
  \ errorCode)\n   at Microsoft.SqlServer.Types.GLNativeMethods.GeodeticIsValid(GeoData\
  \ g)\n   at Microsoft.SqlServer.Types.SqlGeography.IsValidExpensive()\n   at Microsoft.SqlServer.Types.SqlGeography.ConstructGeographyFromUserInput(GeoData\
  \ g, Int32 srid)\n   at Microsoft.SqlServer.Types.SqlGeography.GeographyFromText(OpenGisType\
  \ type, SqlChars taggedText, Int32 srid)\n   at Microsoft.SqlServer.Types.SqlGeography.STGeomFromText(SqlChars\
  \ geometryTaggedText, Int32 srid)\n   at Microsoft.SqlServer.Types.SqlGeography.Parse(SqlString\
  \ s)\n```\n\n`注意` 如前面的示例代码所示，托管代码生成的异常是语句级异常——即使第一个语句已经产生了 `6522` 错误，第二个语句仍被允许运行。\n\
  \n我们如何创建特定的代码路径来处理此类异常？尽管它们涉及截然不同的情况，但由于两个异常都发生在托管代码内部，每种情况下生成的 T-SQL 错误是相同的——通用错误\
  \ `6522`。这意味着我们无法使用 `ERROR_NUMBER()` 来区分这些情况。此外，我们无法轻易地在原始函数代码中添加自定义错误处理，因为这些都是在预编译的\
  \ `Microsoft.SqlServer.Types.dll` 程序集中定义的系统方法。\n\n一种方法是定义新的自定义 CLR 方法，包装 `SqlServer.Types.dll`\
  \ 中的每个系统定义方法，这些方法在将结果传回 SQL Server 之前检查并处理任何 CLR 异常。以下代码清单展示了一个包装在 `geography` `Parse()`\
  \ 方法外的此类包装器示例：\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction()]\npublic\
  \ static SqlGeography GeogTryParse(SqlString Input)\n{\n    SqlGeography result\
  \ = new SqlGeography();\n    try\n    {\n        result = SqlGeography.Parse(Input);\n\
  \    }\n    catch\n    {\n        // Exception Handling code here\n        // Optionally,\
  \ rethrow the exception\n        // throw new Exception(\"An exception occurred\
  \ that couldn't be handled\");\n    }\n    return result;\n}\n```\n\n或者，您可以创建依赖于解析\
  \ `ERROR_MESSAGE()` 内容的代码路径，以识别堆栈跟踪中指定的原始 CLR 异常的详细信息。系统定义的 CLR 类型生成的异常具有 `24000`\
  \ 到 `24999` 范围内的五位数异常编号，因此可以使用 T-SQL `PATINDEX` 函数从 `ERROR_MESSSAGE()` 字符串中提取出来。以下代码清单展示了在应用于前面给出的\
  \ `hierarchyid` 示例时如何实现这种方法：\n\n```sql\nDECLARE @errorMsg nvarchar(max);\n\nBEGIN\
  \ TRY\n    SELECT hierarchyid::Parse('/1/1');\nEND TRY\nBEGIN CATCH\n    SELECT\
  \ @errorMsg = ERROR_MESSAGE();\n    SELECT SUBSTRING(@errorMsg, PATINDEX('%: 24[0-9][0-9][0-9]%',\
  \ @errorMsg) + 2, 5);\nEND CATCH\nGO\n```\n\n得到的值 `24001` 对应于发生的具体 CLR 异常（“输入字符串不是\
  \ SqlHierarchyId 节点的有效字符串表示形式”），而不是通用的 T-SQL 错误 `6522`，并且可用于编写特定的代码路径来处理此类异常。\n\n\
  ## 事务与异常\n\n讨论 SQL Server 中的异常时，如果不提及事务与异常之间的相互作用，讨论就不完整。这是一个相当简单的领域，但常常让那些不太理解事务作用的开发者感到困惑。\n\
  \nSQL Server 是一个数据库管理系统（`DBMS`），因此其主要目标之一是对数据进行管理和操作。因此，SQL Server 中每个异常处理方案的核心都必须考虑到：这些不仅仅是异常——它们也是数据问题。\n\
  \n### 关于事务中止的误解\n\n一些开发者犯的最大错误是假设如果在事务期间发生异常，该事务将被中止。默认情况下，这种情况几乎*从不*发生。即使在面对异常时，大多数事务也会继续存在，运行以下\
  \ T-SQL 即可证明：\n\n```sql\nBEGIN TRANSACTION;\nGO\nSELECT 1/0 AS DivideByZero;\nGO\n\
  SELECT @@TRANCOUNT AS ActiveTransactionCount;\nGO\n```\n\n此 T-SQL 的输出如下：\n\n```text\n\
  DivideByZero\nMsg 8134, Level 16, State 1, Line 1\nDivide by zero error encountered.\n\
  \nActiveTransactionCount\n(1 row(s) affected)\n```\n\n另一个错误是认为存储过程代表某种形式的工作原子单元，拥有自己的隐式事务，在发生异常时会回滚。唉，这也不正确，如下的\
  \ T-SQL 所证明：\n\n```sql\n--Create a table for some data\nCREATE TABLE SomeData\n\
  (\n    SomeColumn int\n);\nGO\n\n--This procedure will insert one row, then throw\
  \ a divide-by-zero exception\nCREATE PROCEDURE NoRollback\nAS\nBEGIN\n    INSERT\
  \ INTO SomeData VALUES (1);\n    INSERT INTO SomeData VALUES (1/0);\nEND;\nGO\n\n\
  --Execute the procedure\nEXEC NoRollback;\nGO\n\n--Select the rows from the table\n\
  SELECT *\nFROM SomeData;\nGO\n```\n\n结果是，即使有错误，没有引发异常的那一行仍然在表中；存储过程没有产生隐式事务：\n\n\
  ```text\nSomeColumn\n-----------\n1\n```\n\n即使在插入之前在存储过程中开始一个*显式*事务，并在异常发生后提交，此示例仍将返回相同的输出。默认情况下，除非显式发出回滚，否则在大多数情况下，异常不会回滚任何内容。它只是作为一个消息，表明出了问题。\n\
  \n### XACT_ABORT：将误解变为（半）现实\n\n\n"
- "# 第四章 „ 错误与异常\n\n## XACT_ABORT 与事务\n\n正如在介绍 `XACT_ABORT` 及其对异常影响的部分所提到的，这个设置也会对事务产生影响——其名称可能暗示了这一点（读作\
  \ *事务中止*）。除了使异常表现为批处理级异常之外，该设置还会在发生异常时，导致任何活动事务立即回滚。这意味着以下 T-SQL 会导致活动事务计数变为 0：\n\
  \n```sql\nSET XACT_ABORT ON;\n\nBEGIN TRANSACTION;\n\nGO\n\nSELECT 1/0 AS DivideByZero;\n\
  \nGO\n\nSELECT @@TRANCOUNT AS ActiveTransactionCount;\n\nGO\n```\n\n现在的输出是\n\n```text\n\
  ActiveTransactionCount\n----------------------\n0\n```\n\n`XACT_ABORT` 不会在存储过程中创建隐式事务，但它*确实*会导致在存储过程中显式事务内发生的任何异常引发回滚。以下\
  \ T-SQL 展示的存储过程行为比之前的示例更具原子性：\n\n```sql\n--清空表\nTRUNCATE TABLE SomeData;\nGO\n\n\
  --此过程将插入一行，然后引发除零异常\nCREATE PROCEDURE XACT_Rollback\nAS\nBEGIN\n    SET XACT_ABORT\
  \ ON;\n    BEGIN TRANSACTION;\n    INSERT INTO SomeData VALUES (1);\n    INSERT\
  \ INTO SomeData VALUES (1/0);\n    COMMIT TRANSACTION;\nEND;\nGO\n\n--执行存储过程\nEXEC\
  \ XACT_Rollback;\nGO\n\n--从表中选择行\nSELECT *\nFROM SomeData;\nGO\n```\n\n此 T-SQL 产生如下输出，显示没有行被插入：\n\
  \n```text\nMsg 8134, Level 16, State 1, Procedure XACT_Rollback, Line 10\nDivide\
  \ by zero error encountered.\n\nSomeColumn\n-----------\n(0 row(s) affected)\n```\n\
  \n`XACT_ABORT` 是一种非常简单但极其有效的手段，用于确保异常不会导致事务在只完成部分工作的情况下提交。我建议在任何使用显式事务的存储过程中开启此设置，以保证在发生异常时事务能够回滚。\n\
  \n### TRY/CATCH 与注定失败的事务\n\n使用 `TRY/CATCH` 语法的一个有趣结果是，事务可能进入一种*只能*被回滚的状态。在这种情况下，事务不会像使用\
  \ `XACT_ABORT` 那样自动回滚；相反，SQL Server 会抛出一个异常，告知调用者该事务无法提交，必须手动回滚。这种状况被称为**注定失败的事务**，以下\
  \ T-SQL 展示了一种产生它的方法：\n\n```sql\nBEGIN TRANSACTION;\nBEGIN TRY\n    --在插入时抛出异常\n\
  \    INSERT INTO SomeData VALUES (CONVERT(int, 'abc'));\nEND TRY\nBEGIN CATCH\n\
  \    --尝试提交...\n    COMMIT TRANSACTION;\nEND CATCH\nGO\n```\n\n这会产生如下输出：\n\n```text\n\
  Msg 3930, Level 16, State 1, Line 10\nThe current transaction cannot be committed\
  \ and cannot support\noperations that write to the log file. Roll back the transaction.\n\
  ```\n\n一旦事务进入此状态，任何尝试提交事务或向前推进（做更多工作）的操作都会导致相同的异常。此异常会不断被抛出，直到事务被回滚。\n\n为了确定一个活动事务是否可以提交或向前推进，请检查\
  \ `XACT_STATE()` 函数的值。该函数在无活动事务时返回 0，事务处于可继续工作状态时返回 1，事务注定失败时返回 –1。在任何涉及显式事务的 `CATCH`\
  \ 块中检查 `XACT_STATE()` 是一个好习惯。\n\n## 小结\n\n这是每个开发者都会面对的现实：有时事情就是会出错。\n\n扎实理解异常在 SQL\
  \ Server 中的行为方式，能使处理它们变得容易得多。尤为重要的是语句级异常与批处理级异常之间的区别，以及在事务内抛出异常的后果。\n\nSQL Server\
  \ 的 `TRY/CATCH` 语法让处理异常容易了许多，但明智地使用此功能很重要。过度使用会使问题的检测和调试变得异常困难。并且，每当在 `CATCH` 块中处理事务时，请务必检查\
  \ `XACT_STATE()` 的值。\n\n错误和异常总会发生，但通过仔细思考如何处理它们，你就可以轻松有效地应对。\n\n"
- '# 第五章 „ 权限与授权


  ## 概述


  SQL Server 安全性是一个广泛的主题领域，有足够的潜在探索途径，以至于有整本的书籍专门讨论这个话题。本章的目标不是涵盖创建端到端安全产品所必需的全部安全知识，而是聚焦于在软件设计和开发过程中最重要的那些领域。


  广义上讲，数据安全可以分为两个领域：

  - **身份验证**：验证系统用户身份的行为。

  - **授权**：授予用户访问系统控制资源的行为。


  这两个领域在许多情况下可以分别委托；只要身份验证部分工作正常，用户就可以在会话的剩余部分移交给授权机制处理。


  SQL Server 身份验证本身就是一个大课题，包含网络安全性、操作系统安全性以及所谓的服务器“表面区域控制”等多样化子主题。虽然生产环境的 DBA 应该非常关注这类问题，但身份验证是一个开发者在很大程度上可以忽略的领域。开发者需要更关注的是身份验证*之后*发生的事情：即用户如何被授权访问数据，以及数据如何免受未授权用户的侵害。


  本章从开发者的视角，介绍了 SQL Server 中数据权限和授权的一些关键问题。包括对权限的初步讨论，以及使用 SQL Server 权限保护数据的通用指南和实践。一个相关的安全主题是数据加密，这将在下一章详细讨论。


  请注意，尽管本文中通常忽略身份验证问题，但在日常开发工作中，你不应完全无视它们。开发环境为了简化设置，往往安全性非常宽松，但一个扎实的开发流程应包括一个测试阶段，在此阶段应用完整的身份验证限制。这有助于确保部署到生产系统时，不会以用户甚至无法登录的惨烈失败告终！


  ## 用户登录与应用程序登录


  本章涵盖的主题涉及在 SQL Server 内部处理的各种权限和授权场景。然而，在许多数据库应用程序设计中，授权是在应用层而非数据库层处理的。在此类应用程序中，用户通常使用其个人凭证连接并登录应用程序，但应用程序随后使用一个共享的应用程序登录名连接到数据库。该登录名被授予执行数据库中与该应用程序相关的所有存储过程的权限，而确定任何特定用户可以执行哪些操作则由应用程序本身的授权例程决定。


  使用这种方法有一些好处，例如能够利用不同会话之间的连接池。然而，这也意味着 SQL Server 提供的处理每用户安全性的任何功能都不适用。如果应用程序中存在错误，或者与应用程序登录名关联的凭证被泄露，用户就有可能执行应用程序有权执行的任何数据库查询。



  '
- '# 第 5 章：特权与授权


  在本章的示例中，我假设用户使用其个人凭证连接到数据库的场景。


  ## 最小权限原则


  在任何系统（无论是数据库还是其他类型）中锁定资源的关键，其本质非常简单：任何给定用户只应访问其所需的最少资源集合，并且仅在访问这些资源所需的时间内拥有访问权限。遗憾的是，在实践中，这更像是一个理想目标，而非数据安全的实际处方；许多系统不允许为用户分配的权限集被轻松地动态提升，而且从历史上看，微软
  Windows 系列操作系统并未被设计为利用权限提升作为在运行时获取额外访问权限的手段。


  许多多用户操作系统实现了当需要访问某用户拥有的资源时，能够`模拟`该用户的能力。模拟与重新认证略有不同；它不是注销并重新发送凭证（从而导致任何正在运行的进程被停止），而是允许一个进程临时`提升`其权限，承担被模拟主体所拥有的权利。在操作系统层面最常见的例子是
  UNIX 的 `su` 命令，它允许用户临时采用另一个用户的身份，并在完成后轻松恢复。Windows 系统也能处理一定程度的模拟，例如由 `.NET` 的 `WindowsIdentity`
  类提供的功能。


  Windows 系统中的权限通常使用`访问控制列表（ACLs）`来提供。授予对资源的权限意味着将用户添加到列表中，之后该用户可以一次又一次地访问该资源，即使是在系统注销和登录之后。如果攻击者接管了系统中的一个账户，这种访问控制就不会提供额外的安全性。通过控制一个账户，攻击者自动拥有该账户有权访问的每个资源的完全访问权限。


  通过使用模拟来控制访问，用户被要求在*每次需要访问时*动态地请求对资源的访问。此外，对资源的权利仅在模拟过程中保持。一旦用户`恢复`（即关闭模拟），额外的访问权限就不再被授予。实际上，这意味着如果一个账户被攻陷，攻击者还必须攻陷模拟上下文才能访问更安全的资源。


  通过`最小权限`实现安全的理念涉及创建具有很少或没有权限的用户，并允许他们在需要更多访问权限时短暂提升其权限。这通常通过`代理`实现——这些是拥有资源访问权限但无法从外部进行身份验证的用户（或其他安全主体）。使用低权限的外部用户与高权限的代理用户相结合，提供了抵御攻击的缓冲，因为攻击者从外部可以直接攻陷的账户，本身没有任何直接关联的权限。访问更有价值的资源需要攻击者付出额外的努力，这为您提供了更多的机会在问题发生之前检测到它们。


  ## 在 SQL Server 中创建代理


  SQL Server 2008 允许在服务器级别和数据库级别创建安全主体，这些主体可以通过代理使用。


  - 在服务器级别，可以创建无法登录的代理`登录名`。

  - 在数据库级别，可以创建与登录名无关的代理`用户`。


  切换到这两种代理主体的执行上下文的唯一方法是通过模拟，这使得它们非常适合权限提升场景。


  ### 服务器级别代理




  为了创建代理登录（可用于委派服务器级别的权限，如`BULK INSERT`或`ALTER DATABASE`），你必须首先在`master`数据库中创建一个证书。证书的更多细节将在第
  6 章介绍，但目前你可以将证书视为一种无需密码即可验证主体身份的可信方式。以下语法可用于在`master`中创建证书。（请注意，在任何数据库中创建证书之前，都必须先创建一个主密钥。同样，请参阅第
  6 章。）


  ```sql

  USE master;

  GO


  CREATE CERTIFICATE Dinesh_Certificate

  ENCRYPTION BY PASSWORD = ''stR0n_G paSSWoRdS, pLE@sE!''

  WITH SUBJECT = ''Certificate for Dinesh'';

  GO

  ```


  证书创建完成后，可以使用`CREATE LOGIN FROM CERTIFICATE`语法创建代理登录，如下所示：


  ```sql

  CREATE LOGIN Dinesh

  FROM CERTIFICATE Dinesh_Certificate;

  GO

  ```


  此登录可以像任何其他登录一样被授予权限。但是，要使用这些权限，登录必须映射到一个数据库用户。这是通过使用创建登录时相同的证书，使用`CREATE USER FOR
  CERTIFICATE`语法来创建用户实现的。有关如何使用代理登录获取服务器级别权限的更多信息，请参阅本章后面的“使用证书进行存储过程签名”部分。


  ### 数据库级别代理


  可以通过向数据库添加一个未与服务器登录关联的用户来创建在数据库级别运行的代理主体。这使用`CREATE USER WITHOUT LOGIN`完成，如以下代码所示：


  ```sql

  CREATE USER Bob

  WITHOUT LOGIN;

  GO

  ```


  此用户与任何数据库用户一样，可以被分配所有权和其他权限。但是，无法登录服务器并以`Bob`身份进行身份验证。相反，你必须使用有效的服务器级别登录进行登录，并使用与你的登录关联的任何数据库用户对数据库进行身份验证。只有这样，你才能模拟`Bob`，承担该用户被分配的任何权限。本章后面的“使用`EXECUTE
  AS`进行基本模拟”一节将详细讨论这一点。


  ## 分层数据安全：洋葱模型


  一般来说，攻击者为了访问有价值的资源必须穿透的层级越多，阻止其攻击的机会就越大。开发者应努力为任何敏感数据构建多层保护，以确保如果一个安全措施被攻破，其他障碍仍能阻止攻击者。


  第一道防线是数据库服务器之外的所有内容，这些都属于身份验证范畴。一旦用户通过身份验证，SQL Server 的声明式权限系统就会启动，登录根据用户映射被授权访问一个或多个数据库。


  从那里，每个用户被授权访问数据库中的特定资源。可以在此处添加另一层以增强安全性，即使用存储过程。通过仅通过存储过程分配权限，可以在权限提升发生的时间和原因上保持更大的控制权——但本章稍后将对此进行更多介绍。


  当然，存储过程本身必须能够访问所需的任何表和列，如果需要，可以使用加密或行级安全方案进一步锁定这些资源。


  图 5-1 展示了在定义 SQL Server 安全方案时应考虑的一些层级，以最大化敏感数据的保护。本章的剩余部分主要讨论在用户通过身份验证后，如何使用存储过程作为访问数据的主要层级来最好地控制对资源的访问。


  存储过程层在数据访问方法和数据本身之间提供了一个理想的抽象层，允许通过参数或其他内联逻辑编程实现额外的安全性。




