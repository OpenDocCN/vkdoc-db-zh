- "# 第五章 特权与授权\n\n*图 5-1. 分层安全提供针对攻击的多级保护。*\n\n## 使用模式组织数据\n\n例如，通过在存储过程中包含日志记录代码来记录对敏感数据的每一次访问是轻而易举的。同样，存储过程可用于强制用户以细粒度的方式访问数据，方法是要求提供用作谓词来过滤数据的参数。如果不使用存储过程来封装数据访问逻辑，这些安全检查很难或不可能强制调用者执行。\n\
  \nSQL Server 2008 支持 ANSI 标准模式，它提供了一种将表和其他对象分段为逻辑组的方法。模式本质上是容器，任何数据库对象都可以放入其中，并且可以对模式中的所有项目统一批量应用某些操作或规则。这使得诸如管理授权之类的任务变得相当容易，因为通过将数据库划分为模式，你可以轻松地对相关对象进行分组并控制权限，而不必担心将来可能会向该集合中添加或移除哪些对象。随着新对象添加到模式中，现有权限会传播，从而允许你为给定模式设置一次访问权限，而不必在数据库发生变化时再次操作它们。\n\
  \n要创建模式，请使用 `CREATE SCHEMA` 命令。以下 T-SQL 创建了一个名为 `Sales` 的模式：\n\n```\nCREATE SCHEMA\
  \ Sales;\nGO\n```\n\n你也可以选择使用 `AUTHORIZATION` 子句指定模式所有者。如果未显式指定所有者，SQL Server 会将所有权分配给创建该模式的用户。\n\
  \n模式创建后，你就可以开始在模式内使用双部分命名法创建数据库对象，如下所示：\n\n```\nCREATE TABLE Sales.SalesData\n(\n\
  SaleNumber int,\nSaleDate datetime\n);\nGO\n```\n\n如果一个对象属于某个模式，那么必须使用其关联的模式名称来引用它；因此，要从\
  \ `SalesData` 表中进行选择，需要使用以下 SQL：\n\n```\nSELECT *\nFROM Sales.SalesData;\nGO\n```\n\
  \n**注意** 在早期版本的 SQL Server 中，对表的引用以其所有者名称为前缀（例如，`Owner.SalesData`）。此语法已弃用，SQL Server\
  \ 2008 中的双部分命名引用的是模式而非对象所有者。\n\n当需要向模式中的对象应用权限时，模式的优越性就显而易见了。假设从权限的角度来看，每个对象都应被同等对待，那么只需一次授权即可授予用户访问模式内每个对象的权限。例如，运行以下\
  \ T-SQL 后，用户 `Alejandro` 将拥有从 `Sales` 模式中的每个表选择行的权限，即使以后添加了新表也是如此：\n\n```\nCREATE\
  \ USER Alejandro\nWITHOUT LOGIN;\nGO\n\nGRANT SELECT ON SCHEMA::Sales\nTO Alejandro;\n\
  GO\n```\n\n需要注意的是，在最初创建时，模式中任何对象的所有者都将与模式本身的所有者相同。个别对象的所有者以后可以更改，但在大多数情况下，我建议你保持给定模式中的所有内容由同一用户拥有。这对于本章稍后将介绍的所有权链尤其重要。要显式设置对象的所有者，需要使用\
  \ `ALTER AUTHORIZATION` 命令，如以下 T-SQL 所示：\n\n```\n--创建一个用户\nCREATE USER Javier\n\
  WITHOUT LOGIN;\nGO\n\n--创建一个表\nCREATE TABLE JaviersData\n(\nSomeColumn int\n);\n\
  GO\n\n--将 Javier 设置为该表的所有者\nALTER AUTHORIZATION ON JaviersData\nTO Javier;\nGO\n\
  ```\n\n关于模式的最后一点说明是，还有一个命令可用于在模式之间移动对象。通过将 `ALTER SCHEMA` 与 `TRANSFER` 选项一起使用，你可以指定某个表应移动到另一个模式：\n\
  \n```\n--创建一个新模式\nCREATE SCHEMA Purchases;\nGO\n\n--将 SalesData 表移入新模式\nALTER SCHEMA\
  \ Purchases\nTRANSFER Sales.SalesData;\nGO\n```\n\n\n\n--通过其新架构名称引用表\n\n```sql\n\
  SELECT *\nFROM Purchases.SalesData;\nGO\n```\n\n架构是一项强大的功能，我建议你在处理彼此紧密相关的表集合时，考虑使用它们。那些使用多个数据库来在对象之间创建逻辑边界的旧式数据库应用程序也可能从架构中受益。可以将这些多个数据库整合为一个使用架构的单个数据库。好处在于，相同的逻辑边界依然存在，但由于对象位于同一数据库中，它们可以参与声明式引用完整性，并且可以一起进行备份。\n\
  \n## 使用 EXECUTE AS 进行基本模拟\n\n在 SQL Server 中，切换到不同用户的执行上下文早已成为可能，可以使用 `SETUSER` 命令，如下面的代码清单所示：\n\
  \n```sql\nSETUSER 'Alejandro';\nGO\n```\n\n要恢复到之前的上下文，再次调用 `SETUSER` 但不指定用户名：\n\n\
  ```sql\nSETUSER;\nGO\n```\n\n`SETUSER` 命令仅对 `sysadmin` 或 `db_owner` 角色的成员（分别在服务器和数据库级别）可用，因此对于设置最低权限场景并不实用。\n\
  \n此外，尽管 SQL Server 2008 仍然实现了该命令，但 Microsoft 联机丛书文档指出，未来版本的 SQL Server 可能不再支持 `SETUSER`，并建议改用\
  \ `EXECUTE AS` 命令。\n\n`EXECUTE AS` 命令可供任何用户使用，并且模拟给定用户或服务器登录名的访问权限由权限设置控制，而非固定角色。与\
  \ `SETUSER` 相比的另一个好处是，`EXECUTE AS` 会在模块结束时自动恢复到原始上下文。而 `SETUSER` 则在控制权返回给调用者时，使模拟的上下文保持活动状态。这意味着无法使用\
  \ `SETUSER` 在存储过程内封装模拟操作，并保证调用者无法接管模拟的凭据。\n\n## 第 5 章 „ 特权与授权\n\n为了展示 `EXECUTE AS`\
  \ 的效果，首先创建一个新用户和一个由该用户拥有的表：\n\n```sql\nCREATE USER Tom WITHOUT LOGIN;\nGO\n\nCREATE\
  \ TABLE TomsData\n(\n    AColumn int\n);\nGO\n\nALTER AUTHORIZATION ON TomsData\
  \ TO Tom;\nGO\n```\n\n创建用户后，可以使用 `EXECUTE AS` 模拟它，并可以使用 `USER_NAME()` 函数验证模拟上下文：\n\
  \n```sql\nEXECUTE AS USER = 'Tom';\nGO\n\nSELECT USER_NAME();\nGO\n```\n\n„ `注意`\
  \ 要使用 `EXECUTE AS` 语句模拟另一个用户或登录名，必须授予用户对指定目标的 `IMPERSONATE` 权限。\n\n`SELECT` 语句返回值\
  \ `Tom`，表明这是当前被模拟的用户。\n\n执行 `EXECUTE AS` 之后进行的任何操作都将使用 `Tom` 的凭据。例如，该用户可以修改 `TomsData`\
  \ 表，因为 `Tom` 拥有该表。但是，尝试创建新表将会失败，因为 `Tom` 没有执行此操作的权限：\n\n```sql\n--此语句将成功\nALTER\
  \ TABLE TomsData\nADD AnotherColumn datetime;\nGO\n\n--此语句将因“CREATE TABLE 权限被拒绝”而失败\n\
  CREATE TABLE MoreData\n(\n    YetAnotherColumn int\n);\nGO\n```\n\n在 `Tom` 权限上下文中完成数据库操作后，可以使用\
  \ `REVERT` 命令返回到外部上下文。如果在该上下文中模拟了另一个用户（即多次调用了 `EXECUTE AS`），则需要多次调用 `REVERT` 才能将上下文返回到你的登录名。可以随时检查\
  \ `USER_NAME()` 函数，以了解你正在谁的上下文中执行。\n\n要查看嵌套模拟的效果，首先确保从 `Tom` 的上下文中恢复出来，然后按如下所示创建第二个用户。将使用\
  \ `GRANT IMPERSONATE` 授予该用户模拟 `Tom` 的权利：\n\n```sql\nCREATE USER Paul WITHOUT LOGIN;\n\
  GO\n\nGRANT IMPERSONATE ON USER::Tom TO Paul;\nGO\n```\n\n\n\n如果模拟了`Paul`，则会话将没有权限从`TomsData`表中选择行。为了获得这些权限，必须在`Paul`的上下文中模拟`Tom`：\n\
  \n```\nEXECUTE AS USER='Paul';\n\nGO\n\n--Fails\n\nSELECT *\n\nFROM TomsData;\n\n\
  GO\n\nEXECUTE AS USER='Tom';\n\nGO\n\n--Succeeds\n\nSELECT *\n\nFROM TomsData;\n\
  \nGO\n\nREVERT;\n\nGO\n\n--Returns 'Paul' -- REVERT must be called again to fully\
  \ revert\n\nSELECT USER_NAME();\n\nGO\n\nREVERT;\n\nGO\n```\n\n最重要的是要理解，当调用`EXECUTE\
  \ AS`时，所有操作都将如同你以被模拟用户身份登录一样运行。除了获得被模拟用户拥有而外部用户所缺乏的权限外，你还将失去外部用户拥有而被模拟用户所缺乏的权限。\n\
  \n出于日志记录目的，有时记录实际登录的主体非常重要。由于`USER_NAME()`函数和`SUSER_NAME()`函数都将返回与被模拟用户关联的名称，因此必须使用`ORIGINAL_LOGIN()`函数来返回最外层服务器登录的名称。使用`ORIGINAL_LOGIN()`将允许你获取登录的服务器主体的名称，无论其模拟作用域嵌套多深。\n\
  \n"
- '# 第五章：权限与授权


  ## 什么是模块？


  接下来的每个权限提升示例都使用存储过程来演示特定的功能元素。但是，请注意，这些方法适用于`SQL Server`支持的任何类型的模块，而不仅仅是存储过程。模块被定义为可以在`SQL
  Server`内部创建的任何类型的代码容器：存储过程、视图、用户定义函数、触发器或 CLR 程序集。


  ## 所有权链


  保护`SQL Server`资源的最常见方法是拒绝数据库用户对`SQL Server`资源的任何直接访问，仅通过存储过程或视图提供访问权限。如果数据库用户有权执行某个存储过程，并且该存储过程的所有者与存储过程中引用的资源的所有者是同一个数据库用户，那么执行该存储过程的用户将通过该存储过程获得对该资源的访问权限。这被称为所有权链。


  为了说明，首先创建并切换到一个新数据库：


  ```

  CREATE DATABASE OwnershipChain;


  GO


  USE OwnershipChain;


  GO

  ```


  现在创建两个数据库用户`Louis`和`Hugo`：


  ```

  CREATE USER Louis


  WITHOUT LOGIN;


  GO


  CREATE USER Hugo


  WITHOUT LOGIN;


  GO

  ```


  > **注意**：对于本章此后续示例，你应该使用属于`sysadmin`服务器角色成员的登录名连接到`SQL Server`。


  请注意，这两个用户都是使用`WITHOUT LOGIN`选项创建的，这意味着尽管这些用户存在于数据库中，但它们不与任何`SQL Server`登录绑定，因此无法通过登录服务器来以他们中的任何一个身份进行身份验证。此选项是创建前述代理用户的一种方法。


  创建用户后，创建一个由`Louis`拥有的表：


  ```

  CREATE TABLE SensitiveData


  (


  IntegerData int


  );


  GO


  ALTER AUTHORIZATION ON SensitiveData TO Louis;


  GO

  ```


  此时，`Hugo`无法访问该表。为了在不授予对该表的直接权限的情况下创建访问路径，可以创建一个同样由`Louis`拥有的存储过程：


  ```

  CREATE PROCEDURE SelectSensitiveData


  AS


  BEGIN


  SET NOCOUNT ON;


  SELECT *


  FROM dbo.SensitiveData;


  END;


  GO


  ALTER AUTHORIZATION ON SelectSensitiveData TO Louis;


  GO

  ```


  此时，`Hugo`对该表仍然没有任何权限；需要授予该用户执行存储过程的权限：


  ```

  GRANT EXECUTE ON SelectSensitiveData TO Hugo;

  ```


  此时，`Hugo`可以执行`SelectSensitiveData`存储过程，从而从`SensitiveData`表中进行选择。然而，这仅在满足以下条件时才有效：


  1.  表和存储过程都由同一用户（本例中为`Louis`）拥有。

  2.  表和存储过程位于同一数据库中。




  '
- "# 所有权链与权限提升\n\n如果以上任一条件不成立，所有权链就会中断，Hugo 就必须通过其他方式获得授权才能从表中查询数据。如果执行上下文在存储过程内部发生变化，所有权链也会失效。例如，所有权链不适用于动态\
  \ SQL（有关动态 SQL 的更多信息，请参见第 8 章）。\n\n## 跨数据库所有权链\n\n当一个数据库中的存储过程请求访问另一个数据库中的对象时，虽然有可能维持所有权链，但这会变得相当复杂，安全性也更难维护。要设置\
  \ `cross-database ownership chaining`，拥有存储过程和所引用表的用户必须与一个服务器级别的登录名关联，并且每个数据库都必须使用\
  \ `ALTER DATABASE` 命令将 `DB_CHAINING` 属性设置为开启。该属性告知 SQL Server，两个数据库都可以参与跨数据库所有权链，无论是作为源还是目标——但无法控制链的方向，因此启用此选项可能会无意中打开安全漏洞。\n\
  \n我建议尽可能避免使用 `cross-database ownership chaining`，而是调用远程数据库中的存储过程。这样做将产生一个更安全、更灵活的解决方案。例如，如果数据库之间不依赖彼此进行身份验证，那么将数据库移动到不同的服务器上会容易得多。此外，通过适当使用架构，将对象拆分到多个数据库中已不像过去那样重要。如有可能，请考虑完全避免使用多个数据库。\n\
  \n## 无所有权链的权限提升\n\n如果对象所有者与模块所有者不匹配，或者使用了动态 SQL，所有权链将不起作用。在这些情况下，你必须使用 SQL Server\
  \ 提供的另外两种权限提升方法之一：使用 `EXECUTE AS` 子句扩展存储过程，或使用证书进行模块签名。\n\n在存储过程中使用 `EXECUTE AS`\
  \ 子句是一种简单有效的权限提升方法，但其灵活性远不及使用证书所能达到的程度。使用证书时，权限是累加的而非模拟的——证书提供的额外权限是扩展而非替换调用主体的权限。在以下章节中，我将更详细地讨论这些替代的权限提升方法。\n\
  \n### 存储过程与 EXECUTE AS\n\n如本章前一节所述，`EXECUTE AS` 命令可以单独在 T-SQL 批处理中使用，以临时模拟其他用户。但是，`EXECUTE\
  \ AS` 也可用于存储过程、函数和触发器。本节示例仅关注存储过程，但相同原理也适用于其他对象类型。\n\n要使用 `EXECUTE AS` 更改整个存储过程的模拟上下文，请将其添加到\
  \ `CREATE PROCEDURE` 语句中，如下例所示：\n\n```\nCREATE PROCEDURE SelectSensitiveDataByImpersonation\n\
  WITH EXECUTE AS 'Louis'\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT *\n    FROM\
  \ dbo.SensitiveData;\nEND;\nGO\n```\n\n当此存储过程由用户执行时，过程内的所有操作都将被视为是由 `Louis` 用户运行，而不是由调用用户运行（这是默认行为）。这包括任何动态\
  \ SQL 操作，或对 `Louis` 用户有权访问的表中的数据进行操作。存储过程执行完成后，上下文将自动还原回调用者的上下文。\n\n请记住，使用 `EXECUTE\
  \ AS` 不会中断所有权链，而是可以用来扩展它们并创建额外的灵活性。例如，考虑以下两个用户和相关表：\n\n```\nCREATE USER Kevin WITHOUT\
  \ LOGIN;\nGO\nCREATE TABLE KevinsData ( SomeData int );\nGO\n```\n\n\n"
- "# 使用 EXECUTE AS 与所有权链结合\n\n```sql\nALTER AUTHORIZATION ON KevinsData TO Kevin;\n\
  GO\nCREATE USER Hilary\nWITHOUT LOGIN;\nGO\nCREATE TABLE HilarysData\n(\n    SomeOtherData\
  \ int\n);\nGO\nALTER AUTHORIZATION ON HilarysData TO Hilary;\nGO\n```\n\n用户 Kevin\
  \ 和 Hilary 都拥有表。可能需要创建一个访问这两个表的存储过程，但使用所有权链将不起作用：如果过程由 Kevin 拥有，所有权链只会允许执行用户访问 `KevinsData`，而不会授予对\
  \ `HilarysData` 的任何权限。同样，如果过程由 Hilary 拥有，则所有权链将不允许访问 `KevinsData` 表。\n\n在这种情况下，一种解决方案是结合使用\
  \ `EXECUTE AS` 与所有权链，创建一个由其中一个用户拥有、但在另一个用户的上下文中执行的存储过程。以下存储过程展示了如何实现：\n\n```sql\n\
  CREATE PROCEDURE SelectKevinAndHilarysData\nWITH EXECUTE AS 'Kevin'\nAS\nBEGIN\n\
  \    SET NOCOUNT ON;\n    SELECT *\n    FROM KevinsData\n    UNION ALL\n    SELECT\
  \ *\n    FROM HilarysData;\nEND;\nGO\nALTER AUTHORIZATION ON SelectKevinAndHilarysData\
  \ TO Hilary;\nGO\n```\n\n因为 Hilary 拥有该存储过程，所有权链将生效并允许从 `HilarysData` 表中选择行。但由于存储过程在\
  \ Kevin 用户的上下文中执行，权限也会级联到 `KevinsData` 表。通过这种方式，可以结合使用两套权限集。\n\n不幸的是，这几乎是使用 `EXECUTE\
  \ AS` 所能实现的极限。对于更复杂的权限场景，有必要考虑使用证书对存储过程进行签名。\n\n### 使用证书对存储过程签名\n\n如前所述，可以基于证书创建代理登录名和用户。\n\
  \n基于证书创建代理是应用存储过程权限最灵活的方式，因为通过证书授予的权限是**相加的**。可以使用一个或多个证书对存储过程进行签名，每个证书都会在已有的权限之上添加其权限，而不是像使用\
  \ `EXECUTE AS` 执行模拟那样替换权限。\n\n要为证书创建代理用户，必须首先确保数据库具有数据库主密钥。如果数据库中还没有主密钥，可以使用以下代码创建：\n\
  \n```sql\nCREATE MASTER KEY ENCRYPTION BY PASSWORD = '5Tr()nG_|)MK_p455woRD';\n\
  ```\n\n> **注意**：数据库主密钥是 SQL Server 加密密钥层次结构的重要组成部分，这将在下一章讨论。\n\n然后创建证书，接着使用 `FOR\
  \ CERTIFICATE` 语法创建关联的用户：\n\n```sql\nCREATE CERTIFICATE Greg_Certificate\nWITH SUBJECT='Certificate\
  \ for Greg';\nGO\nCREATE USER Greg\nFOR CERTIFICATE Greg_Certificate;\nGO\n```\n\
  \n一旦创建了代理用户，就可以像任何其他数据库用户一样，授予其对数据库中资源的权限。但基于证书创建用户的一个副作用是，证书本身也可以用于传播授予该用户的权限。这就是存储过程签名的用武之地。\n\
  \n## 证书签名的工作原理\n\n为了说明这个概念，创建一个表并授予 `Greg` 用户 `SELECT` 访问权限：\n\n```sql\nCREATE TABLE\
  \ GregsData\n(\n    DataColumn int\n);\nGO\nGRANT SELECT ON GregsData\nTO Greg;\n\
  GO\n```\n\n然后可以创建一个从 `GregsData` 表中选择的存储过程。但在这个示例中，为了打破可能因在相同默认架构中创建表和存储过程而产生的所有权链，该存储过程将由名为\
  \ Steve 的用户拥有：\n\n```sql\nCREATE PROCEDURE SelectGregsData\nAS\nBEGIN\n    SET NOCOUNT\
  \ ON;\n    SELECT *\n    FROM GregsData;\nEND;\nGO\nCREATE USER Steve\nWITHOUT LOGIN;\n\
  GO\nALTER AUTHORIZATION ON SelectGregsData TO Steve;\nGO\n```\n\n请注意，此时 Steve 无法从\
  \ `GregsData` 中选择——Steve 仅仅拥有试图从该表中选择数据的存储过程。即使授予执行此存储过程的权限，任何用户（除了 `Greg`）都将无法成功执行，因为存储过程不会将权限传播到\
  \ `GregsData` 表：\n\n```sql\nCREATE USER Linchi\nWITHOUT LOGIN;\nGO\nGRANT EXECUTE\
  \ ON SelectGregsData TO Linchi;\nGO\nEXECUTE AS USER='Linchi';\nGO\nEXEC SelectGregsData;\n\
  GO\n```\n\n此尝试将失败并显示以下错误：\n\n```\nMsg 229, Level 14, State 5, Procedure SelectGregsData,\
  \ Line 6\nThe SELECT permission was denied on the object 'GregsData', database\n\
  'OwnershipChain', schema 'dbo'.\n```\n\n为了使存储过程对 `Linchi` 用户生效，必须通过存储过程将权限传播到 `GregsData`\
  \ 表。这可以通过使用创建 `Greg` 用户的同一证书对过程来完成。使用 `ADD SIGNATURE` 命令对存储过程进行签名（在执行以下代码之前，请确保使用\
  \ `REVERT` 退出 `Linchi` 上下文）：\n\n```sql\nADD SIGNATURE TO SelectGregsData\nBY CERTIFICATE\
  \ Greg_Certificate;\nGO\n```\n\n一旦过程用证书签名，该过程就拥有与 `Greg` 用户相同的权限；在这种情况下，这意味着任何有权执行该过程的用户在运行存储过程时都将能够从\
  \ `GregsData` 表中选择行。\n\n当考虑到可以用任意数量的证书对给定的存储过程进行签名，而每个证书又可以关联到不同的用户，从而关联到不同的权限集时，证书签名的灵活性就变得显而易见。这意味着即使在一个拥有众多安全角色的极其复杂的系统中，仍然可以编写存储过程来聚合跨越安全边界的数据。\n\
  \n使用证书时请记住，任何时候修改存储过程，SQL Server 都会自动撤销所有签名。因此，重要的是要将签名与存储过程一起编写为脚本，这样在修改过程时，可以轻松地保持权限同步。\n\
  \n## 查找存储过程的证书签名\n\n同样重要的是要知道如何找出哪些证书（以及因此哪些用户）与给定的存储过程相关联。可以查询 SQL Server 的目录视图来获取此信息，但要获得正确的查询并不明显。以下查询可以作为一个起点，它返回所有存储过程、对其进行签名的证书以及与证书关联的用户：\n\
  \n```sql\nSELECT\n    OBJECT_NAME(cp.major_id) AS signed_module,\n    c.name AS\
  \ certificate_name,\n    dp.name AS user_name\nFROM sys.crypt_properties AS cp\n\
  INNER JOIN sys.certificates AS c ON c.thumbprint = cp.thumbprint\nINNER JOIN sys.database_principals\
  \ dp\n    ON SUBSTRING(dp.sid, 13, 32) = c.thumbprint;\n```\n\n这个查询有些难以理解，因此值得解释一下。`sys.crypt_properties`\
  \ 视图包含有关哪些模块已由证书签名的信息。每个证书都有一个 32 字节的加密哈希值，即其*指纹*，用于通过 `sys.certificates` 视图找出是哪个证书对模块进行了签名。最后，每个数据库主体都有一个安全标识符，如果主体是基于证书创建的，则其最后\
  \ 32 字节就是该证书的指纹。\n\n执行此查询时，结果将显示刚刚创建的已签名模块，如下所示：\n\n```\nsigned_module    certificate_name\
  \    user_name\nSelectGregsData  Greg_Certificate    Greg\n```\n\n"
- '# 分配服务器级权限


  前面的示例仅展示了如何使用证书分配数据库级权限。对存储过程进行签名也可用于传播服务器级权限，例如 `BULK INSERT` 或 `ALTER`。


  '
- "# SQL Server 证书、权限传播与加密\n\n## 权限传播：通过证书创建代理登录\n\n在`DATABASE`中进行权限传播需要先从证书创建代理登录，然后使用同一个证书创建数据库用户。为此，证书在创建后必须备份，并在要创建用户的数据库中还原。一旦数据库用户创建完毕，应用权限的流程就与传播数据库级别权限时相同。\n\
  \n首先，在`master`数据库中创建证书。与之前的示例不同，此证书必须用密码加密，而不是用数据库主密钥加密，以确保其私钥在从数据库中移除时保持加密状态。证书创建完成后，可以按如下方式用它来创建代理登录：\n\
  \n```sql\nUSE MASTER;\nGO\n\nCREATE CERTIFICATE alter_db_certificate\nENCRYPTION\
  \ BY PASSWORD = 'stR()Ng_PaSSWoRDs are?BeST!'\nWITH SUBJECT = 'ALTER DATABASE permission';\n\
  GO\n\nCREATE LOGIN alter_db_login FROM CERTIFICATE alter_db_certificate;\nGO\n```\n\
  \n顾名思义，此登录将用于传播`ALTER DATABASE`权限。下一步是向该登录授予适当的权限：\n\n```sql\nGRANT ALTER ANY DATABASE\
  \ TO alter_db_login;\nGO\n```\n\n此时，您必须将证书备份到文件。然后可以从文件将证书还原到您选择的数据库中，并从那里创建一个数据库用户，该用户将拥有与服务器登录相同的权限，因为它是使用同一个证书创建的。\n\
  \n```sql\nBACKUP CERTIFICATE alter_db_certificate\nTO FILE = 'C:\\alter_db.cer'\n\
  WITH PRIVATE KEY\n(\n    FILE = 'C:\\alter_db.pvk',\n    ENCRYPTION BY PASSWORD\
  \ = 'YeTan0tHeR$tRoNGpaSSWoRd?',\n    DECRYPTION BY PASSWORD = 'stR()Ng_PaSSWoRDs\
  \ are?BeST!'\n);\nGO\n```\n\n备份后，可以将证书还原到任何用户数据库。出于本示例的目的，我们将专门为此创建一个新的数据库：\n\n\
  ```sql\nCREATE DATABASE alter_db_example;\nGO\n\nUSE alter_db_example;\nGO\n\nCREATE\
  \ CERTIFICATE alter_db_certificate\nFROM FILE = 'C:\\alter_db.cer'\nWITH PRIVATE\
  \ KEY\n(\n    FILE = 'C:\\alter_db.pvk',\n    DECRYPTION BY PASSWORD = 'YeTan0tHeR$tRoNGpaSSWoRd?',\n\
  \    ENCRYPTION BY PASSWORD = 'stR()Ng_PaSSWoRDs are?BeST!'\n);\nGO\n```\n\n> **注意**\
  \ 有关`CREATE CERTIFICATE`语句的更多信息，请参见第 6 章。\n\n值得注意的是，此时证书的物理文件可能应该被删除或备份到安全的存储库。尽管私钥是用密码加密的，但坚定的攻击者肯定有可能通过暴力破解来破解它。而且由于证书被用来授予`ALTER\
  \ DATABASE`权限，这样的攻击最终可能会造成一些损害——所以安全地处理这些文件。\n\n在数据库中创建证书后，其余过程与之前相同。创建一个需要权限提升的存储过程（在本例中，该存储过程会将数据库设置为`MULTI_USER`访问模式），基于证书创建用户，并使用证书对存储过程进行签名：\n\
  \n```sql\nCREATE PROCEDURE SetMultiUser\nAS\nBEGIN\n    ALTER DATABASE alter_db_example\n\
  \    SET MULTI_USER;\nEND;\nGO\n\nCREATE USER alter_db_user\nFOR CERTIFICATE alter_db_certificate;\n\
  GO\n\nADD SIGNATURE TO SetMultiUser\nBY CERTIFICATE alter_db_certificate\nWITH PASSWORD\
  \ = 'stR()Ng_PaSSWoRDs are?BeST!';\nGO\n```\n\n现在可以测试权限了。为了使服务器级别权限的传播有效，执行存储过程的用户必须与有效的服务器登录相关联，并且必须模拟服务器级别的登录，而不是数据库用户。因此，这次`CREATE\
  \ USER WITHOUT LOGIN`将不起作用：\n\n```sql\nCREATE LOGIN test_alter WITH PASSWORD = 'iWanT2ALTER!!';\n\
  GO\n\nCREATE USER test_alter FOR LOGIN test_alter;\nGO\n\nGRANT EXECUTE ON SetMultiUser\
  \ TO test_alter;\nGO\n```\n\n最后，可以模拟`test_alter`登录并执行存储过程：\n\n```sql\nEXECUTE AS\
  \ LOGIN='test_alter';\nGO\n\nEXEC SetMultiUser;\nGO\n```\n\n命令成功完成，表明`test_alter`登录能够行使通过存储过程授予的`ALTER\
  \ DATABASE`权限。这个例子显然相当简单，但它应该可以作为一个基本模板，在您需要向数据库用户提供服务器级别权限提升时，可以根据需要进行调整。\n\n##\
  \ 总结\n\nSQL Server 的模拟功能允许开发人员创建安全、细粒度的授权方案。\n\n通过保持授权分层并遵循最小权限原则，可以使数据库中的资源更加安全，要求攻击者做更多工作才能检索他们本不应访问的数据。存储过程层可用于控制安全性，根据高权限代理用户系统委派必要的权限。\n\
  \n当需要将数据库逻辑上分解为范围相似的对象组时，应使用架构。架构还可用于简化权限分配任务，因为随着架构中对象的变化，可能不需要随时间维护权限。\n\n`EXECUTE\
  \ AS`子句可能是基于存储过程传播权限的一种非常有用且简单的方法，但证书提供了更大的灵活性和控制力。也就是说，您应该尽量保持系统简单易懂，以避免造成可维护性噩梦。\n\
  \n最后一点：在安全方面不要过度。本章介绍的许多技术对于大多数应用程序可能*并非*必要。如果您的应用程序不存储敏感数据，请不要过度创建复杂的权限提升方案；它们只会让您的应用程序更难处理。\n\
  \n"
- '# 加密


  加密是将数据编码的过程，其方式使得除了拥有适当机密知识（**密钥**）以再次解密数据的人之外，任何人都无法使用。SQL Server 2008 提供的加密功能是强大的特性，您应始终考虑将其作为整体安全策略的一部分。如果所有其他安全机制都失败，加密可以被证明是保护机密数据的非常有效的最后一道防线。


  然而，不应轻率地考虑加密；这是一个复杂的主题，成功实施加密几乎总是需要在应用程序的架构和设计阶段进行一定程度的考虑。加密数据的物理行为相对简单，但如果没有适当的程序来安全管理对数据的访问以及解密它所需的密钥，任何实施加密的尝试都是徒劳的。未能正确实施加密实际上可能弊大于利，因为它会给您带来数据安全的错误感觉，而实际上数据正暴露给潜在的黑客。


  此外，加密提供的额外保护伴随着相关的性能成本。


  通常，数据库必须做更多的工作来加密写入的数据，并在需要该数据时再次解密。这意味着，特别是在大规模环境中，必须仔细关注以确保加密不会对应用程序性能产生不利影响。



  在本章中，我的目的不是提供关于数据库加密的权威指南。相反，我将提供一个实用指南，介绍如何使用 SQL Server 2008 的主要加密功能，来创建一个安全、可扩展且能够处理机密数据的数据库应用程序。显然，这样的解决方案前提是其他安全方面，包括用户访问控制和网络保护，已经得到了充分的解决。我将特别关注前文段落中指出的两个主要问题——即，如何安全地存储和管理加密密钥的访问权限，以及如何设计一个既能保护敏感数据，又能最小化对性能负面影响的数据库应用程序架构。


  ## 你真的需要加密吗？


  在着手解决如何为特定数据集实施加密之前，有必要先考虑是否真的需要加密。加密是一种保护数据的方法，因此关键问题是：你试图保护*什么*数据，以及试图防止*谁*（或什么）获取它。


  ### 什么应该被保护？


  所有数据都很重要。如果它不重要，我们一开始就不会费心将它存储在数据库中。但这并不一定意味着所有数据都需要加密。


  SQL Server 2008 中的大多数加密方法提供 `单元级加密`，它应用于单个数据项，或包含敏感信息的表列。相比之下，透明数据加密（SQL Server
  2008 的一项新功能）则应用 `数据库级加密` 到整个数据库，它通过加密文件系统上的底层数据库文件来实现。这些方法不仅在作用范围上不同，而且对于任何使用加密数据的应用程序的设计都有显著不同的影响。


  在决定加密策略之前，对数据进行分类以识别泄露风险以及泄露后果的严重性至关重要。以下是一些可能需要加密的数据类型示例：


  *   许多组织定义了一个或多个级别的 `敏感数据`——即，如果落入错误之手，可能对业务造成负面影响的信息。此类信息可能包括定价信息、利润预测或即将进行的营销计划。如果竞争对手获取了此类信息，可能对未来的销售产生严重后果。

  *   越来越多的政府正在通过法律和监管要求，规定必须实施某些最低安全标准来保护机密的客户数据，而这可能包括加密。未能满足这些标准可能导致公司面临巨额罚款，甚至被迫停止交易。

  *   某些客户可能会在客户服务级别协议中规定所需的最低保护级别。在某些情况下，详细要求会明确规定哪些数据项必须加密、使用的加密算法类型、加密密钥的最小长度以及密钥必须轮换的时间表。

  *   在许多情况下，对员工记录进行加密可能是有益的，特别是那些包含工资信息或其他个人信息的记录，以防止系统管理员或其他有权访问此类数据的用户进行随意窥探。


  对业务需求进行透彻分析，以识别所有需要保护的数据元素，并确定应如何保护这些数据，对于确保任何提出的加密解决方案在满足安全需求的同时平衡性能要求至关重要。此外，与加密相关的应用程序设计和业务流程的变更通常会产生成本，因此能够根据从加密中获得的预期收益来证明该成本的合理性非常重要。


  ### 你在防范什么？



  '
- '# 第六章 加密


  加密所能提供的最基本保护或许是针对**静态数据**面临的风险。在 SQL Server 中，`静态数据`指的是存储在文件系统上的底层数据库文件，包括事务日志和备份。如果未经授权的第三方能够访问这些文件，他们就有可能将数据库复制并还原到自己的系统上，从而可以从容地浏览您的数据。然而，如果数据库中的敏感数据以加密格式存储，攻击者还需要知道相关的密钥或密码才能解密被盗数据，否则这些数据对他们毫无价值。


  除了数据库文件的物理盗窃外，黑客和外部威胁也对数据库安全构成持续风险。黑客通常知识渊博，并配备了各种工具来探测和利用您安全系统中的任何弱点。通过确保所有通过网络传输的数据都经过安全加密，您可以确保只有预期的接收方才能理解这些数据，从而降低数据被成功拦截并用于对付您的可能性。


  许多组织也认识到内部来源对数据安全构成的威胁。心怀不满的 DBA 和试图试探其授权极限的开发人员可能会访问其工作不需要的数据。如果有合适的价码，此类信息很容易流出组织，落入不法分子之手。如果设计和部署得当，加密策略可以防止此类风险发生。


  请记住，加密不能替代其他安全措施，例如适当的身份验证和授权程序。但是，如果实施正确，它可以提供额外的安全级别，这可能是您的数据暴露还是按预期保密的关键区别。


  ## SQL Server 2008 加密密钥层次结构


  与几乎所有民用密码学一样，SQL Server 中的所有加密方法都基于标准化的、公开可用的加密算法。在许多方面，这是一件好事：这些算法由世界上一些顶尖的信息理论家开发，并且通常已被证明能够经受住集中、蓄意的攻击。然而，这种公开知识的使用对任何处理机密数据的数据库应用程序设计提出了一个有趣的假设，即`敌人知道系统`。


  香农格言（即上述陈述的普遍称呼）是对荷兰密码学家奥古斯特·克尔克霍夫斯早期工作的重述。克尔克霍夫斯提出了一些原则，如果遵循这些原则，就能确保军事密码在部分系统事实被泄露的情况下仍能保持安全。这些原则最初于
  1883 年发表在法国期刊`le Journal des Sciences Militaires`上，在现代密码学中仍然非常适用。


  所有 SQL Server 加密方法都使用基于密钥或从中生成密钥的密码的算法。如果我们假设香农格言成立（即所使用的任何加密算法的细节都是公开知识），那么您的加密数据的安全性就*完全*依赖于保护算法用于解密和加密数据的密钥。因此，必须为存储密钥创建一个安全环境，这必须被视为任何加密策略的首要任务。事实上，安全密钥管理和分发问题是现代密码学中最重要的领域之一，因为未能正确保护加密密钥会危及您的整个安全策略。在研究
  SQL Server 中可用的不同类型加密之前，首先有必要考虑如何管理这些加密方法所基于的密钥。


  ### 自动密钥管理层次结构


  SQL Server 解决安全密钥管理问题的方法是实现一个加密密钥层次结构，每个密钥为低于它的密钥提供保护。`自动密钥管理`层次结构如图 6-1 所示。


  *图 6-1. SQL Server 2008 中的默认自动密钥管理层次结构*


  自动密钥管理层次结构的主要特点将在以下标题下描述。


  #### 对称密钥、非对称密钥和证书


  在最低级别，数据项使用`对称密钥`、`非对称密钥对`的公钥或`证书`进行加密。这些密钥和证书存储在创建它们的用户数据库中。这三种方法各有优缺点，将在本章后面讨论。


  创建每种类型密钥的语法略有不同，但遵循相同的基本模式：列出密钥名称、要使用的加密算法、将拥有该密钥的数据库用户名以及保护密钥的方法。例如，以下代码清单演示了使用
  Rivest、Shamir 和 Adleman (RSA) 算法创建由数据库用户 Tom 拥有的 1,024 位非对称密钥所需的语法：


  ```sql

  CREATE ASYMMETRIC KEY ExampleAsymKey

  AUTHORIZATION Tom

  WITH ALGORITHM = RSA_1024;

  ```


  在此示例中，没有显式指定保护方法，因此密钥将受自动密钥层次结构保护。默认情况下，这意味着密钥和证书受其所在数据库的`数据库主密钥` (DMK) 保护。


  #### 数据库主密钥


  服务器上的每个用户数据库都可以有自己的 DMK，这是一个对称密钥，存储在`master`数据库和用户数据库中。DMK 受两种不同形式的加密保护：一种是使用基于服务器的`服务主密钥`
  (SMK) 的三重 DES（数据加密标准）算法进行的加密，另一种是使用密码进行的加密。


  即使同时受 SMK *和*密码保护，默认情况下，SQL Server 在需要时可以通过仅使用 SMK 解密来自动打开 DMK，而无需提供密码。这意味着受 DMK
  保护的任何依赖私钥的用户不需要被授予打开 DMK 的显式权限。用户只需要对各个依赖密钥或证书拥有权限，因为 SQL Server 将在必要时打开 DMK 以访问这些密钥。这对于保护数据免受`sysadmins`和`db_owners`的访问具有一些影响，将在后面讨论。


  可以通过在要存储密钥的数据库中运行`CREATE MASTER KEY`语句来创建 DMK，如下所示：


  ```sql

  CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''5Tr()ng_p455woRD_4_dA_DMK!!!'';

  ```


  **注意：** 每个数据库只能关联一个 DMK。如果您遵循了第 5 章中的示例，您可能已经为了从证书创建代理数据库用户而创建了一个 DMK。


  #### 服务主密钥


  SMK 是位于 SQL Server 加密层次结构顶部的对称密钥，用于加密服务器上存储的所有 DMK，并保护与链接服务器关联的登录名和凭据。


  SMK 受操作系统的`数据保护 API` (DPAPI) 保护，使用 SQL Server 的服务账户凭据和计算机凭据。如果这些凭据中的任何一个失效（例如，如果服务账户被更改），SQL
  Server 将基于剩余的有效密钥重新创建失效的密钥。这确保了 SMK 能够抵御除最严重故障之外的所有问题。没有创建 SMK 的命令；它在首次需要时自动创建并存储在`master`数据库中。



  SMK 提供了 SQL Server 2008 中自动密钥层次结构所包含的所有加密密钥的顶层控制。该 SMK 保护的层次结构为大多数情况提供了足够的安全性，并使密钥访问相对容易：使用
  `GRANT` 命令将层次结构中各个密钥或密钥子树的使用权授予个人或组，授权用户可以根据需要打开和使用这些密钥。


  ### 替代加密管理结构


  有些情况下，你可能希望使用替代方法来增强或替换默认的自动密钥管理，以保护你的加密密钥。SQL Server 2008 灵活的加密密钥管理结构提供了几种实现方式，我将在接下来的内容中讨论。


  ### 对称密钥分层与轮换


  数据库内的对称密钥本身可以被**分层**以提供额外的层次级别。


  例如，一个对称密钥可以被另一个对称密钥加密，而后者又由受 DMK 保护的证书进行保护。以这种方式对密钥进行分层可以提供额外的控制和安全性，并且更容易实现**密钥轮换**，即可以更改中间层密钥，而无需解密和重新加密所有底层数据。


  在仅基于单个加密密钥的扁平模型中进行密钥轮换是非常繁琐的。


  要理解原因，假设你有大量的数据被单个对称密钥加密。现在假设，由于新的客户端要求，该加密密钥必须每月轮换一次。轮换将需要使用新密钥解密和重新加密所有数据，这可能需要大量的工作，并且可能要求数据在用新密钥重新加密之前至少暂时进入未加密状态。在分层模型中，你可以非常轻松地轮换更高层的密钥，因为它们包含的唯一加密数据是下一层加密使用的对称密钥。


  并非所有密钥都需要同时轮换；轮换层次结构中的任何密钥都会重新加密所有依赖的密钥，这使得任何暴力攻击破解你的加密层次结构并获取敏感数据的难度显著增加。但是，请记住，尽管正确处理的密钥轮换通常会提高安全性，但密钥轮换确实涉及一定程度的固有风险。例如，存储在磁带备份上的存档加密数据，将其留在物理安全的位置可能比为了用新密钥重新加密数据而取回磁带更安全。


  在创建额外的密钥层时，你应该尝试确保更高层密钥的加密强度与其所保护的密钥相同或更高。用较弱的密钥保护一个强密钥不会为系统增加任何额外的安全性。


  ### 从自动加密层次结构中移除密钥


  当 DMK 同时受 SMK 和密码保护时（如默认层次结构中那样），你无需显式提供密码即可打开 DMK；当具有适当权限的用户请求受 DMK 保护的密钥时，SQL
  Server 会自动使用 SMK 打开 DMK 以访问所需的依赖密钥。此行为的一个有趣特点是，拥有数据库 `GRANT` 权限的系统管理员或 `db_owner`
  角色中的 DBA 因此有权查看层次结构中的*所有*依赖密钥。


  在你希望限制这些角色中的个人访问加密数据的情况下，必须删除对 DMK 的 SMK 保护，这将强制改为使用密码进行 DMK 保护。以下 T-SQL 语句在用户具有
  `CONTROL` 权限的数据库中运行时，将删除与该数据库关联的 DMK 的 SMK 保护：


  ```

  ALTER MASTER KEY DROP ENCRYPTION BY SERVICE MASTER KEY;

  ```


  当仅受密码保护时，DMK 会从默认的自动密钥管理层次结构中移除，并且每次需要时都必须由具有适当密码的用户显式打开：


  ```

  OPEN MASTER KEY DECRYPTION BY PASSWORD = ''5Tr()ng_p455woRD_4_dA_DMK!!!'';


  -- Perform some action on properties dependent on the DMK


  CLOSE MASTER KEY;

  ```


  单独的对称密钥、非对称密钥和证书也可以通过密码进行保护，以防止它们在每次需要时未提供适当密码的情况下被打开。


  将密钥从自动密钥层次结构中移除的问题在于，随后就需要有一个保护这些密钥密码的系统。除非*此*系统设计有充分的安全措施，否则使用密码保护密钥的加密数据并不会比在自动密钥管理下加密时更安全（甚至可能更不安全）。


  ### 可扩展密钥管理


  SQL Server 2008 支持通过可扩展密钥管理（EKM）方法管理加密密钥。EKM 使用外部硬件安全模块（HSM）在 SQL Server 之外保存对称或非对称密钥，并将这些密钥的管理委托给
  HSM。


  以下代码清单说明了在 SQL Server 中创建映射到存储在 EKM 设备上的密钥的非对称所需的语法：


  ```

  CREATE ASYMMETRIC KEY EKMAsymKey

  FROM PROVIDER EKM_Provider

  WITH

  ALGORITHM = RSA_1024,

  CREATION_DISPOSITION = OPEN_EXISTING,

  PROVIDER_KEY_NAME = ''EKMKey1'';

  GO

  ```


  EKM 使用专用硬件提供完整的加密管理解决方案，这意味着 SQL Server 可以将加密过程留给 HSM，而专注于其他任务。实现 EKM 涉及使用供应商特定的库来配置
  SQL Server 和 HSM 单元之间的连接，本章不予涵盖。


  图 6-2 说明了本节讨论的不同加密配置，这些配置提供了默认自动密钥管理层次结构的替代方案。


  这些可能的加密配置中的每一种对提供的安全级别、密钥管理的难易程度以及访问和操作底层数据的性能影响都有不同的影响。要了解这些差异，有必要更详细地审视加密各个数据项的各种方法，这将在本章的下一部分中介绍。


  在继续之前，请运行以下代码清单以创建一个新的数据库和关联的 DMK：


  ```

  CREATE DATABASE ExpertSqlEncryption;

  GO

  USE ExpertSqlEncryption;

  GO

  CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''-=+I_aM-tH3-DMK_P45sW0rd+=-'';

  GO

  ```


  本章后续的所有示例都将使用此数据库。


  图 6-2\. 替代加密密钥管理结构（从左至右）：通过 EKM 保护的对称密钥；分层对称密钥；由受密码保护的证书加密的对称密钥；受密码而非 SMK 保护的 DMK


  ## 数据保护与加密方法


  SQL Server 2008 提供了一系列加密方法，这些方法提供不同级别的保护，同时具有不同的相关性能和架构影响。我在此不试图详细描述每种方法的全部细节；对每种方法的详细描述感兴趣的读者应查阅专门讨论该主题的书籍，例如
  *Expert SQL Server 2008 Encryption*，作者 Michael Coles（Apress，2009）。不过，我将简要概述以下方法：


  - 哈希

  - 对称密钥加密

  - 非对称密钥加密

  - 透明数据加密


  ### 哈希


  哈希函数允许你对任何数据执行**单向**加密，并产生确定性的结果。



