  \ FinanceSymKey;\n\nREVERT;\nGO\n```\n\n`Confidential`表现在包含两行数据：一行使用共享对称密钥`SharedSymKey`加密，`MarketingUser`和`FinanceUser`都可以访问；第二行使用`FinanceSymKey`加密，只有`FinanceUser`可以访问。\n\
  \n这种方法的妙处在于，由于某个用户有权访问的所有密钥都由单一证书保护，因此可以使用`DECRYPTBYKEYAUTOCERT`方法解密整列数据，无论单个值是用哪个密钥加密的。\n\
  \n例如，以下代码清单演示了`FinanceUser`如何通过结合使用`DECRYPTBYKEYAUTOCERT`和`FinanceCertificate`来自动解密`EncryptedData`列中的所有值：\n\
  \n```sql\nEXECUTE AS USER = 'FinanceUser';\n\nSELECT\n    CAST(\n        DECRYPTBYKEYAUTOCERT(\n\
  \            CERT_ID(N'FinanceCertificate'),\n            N'#F1n4nc3_P455w()rD#',\n\
  \            EncryptedData\n        ) AS nvarchar(255))\nFROM Confidential;\n\n\
  REVERT;\nGO\n```\n\n结果显示，`FinanceUser`可以使用`DECRYPTBYKEYAUTOCERT`解密由`FinanceSymKey`和`SharedSymKey`加密的值，因为它们都受同一个`FinanceCertificate`保护：\n\
  \n    This is shared information accessible to finance and marketing\n    This information\
  \ is only accessible to finance\n\n如果`MarketingUser`尝试使用`MarketingCertificate`执行完全相同的查询，他们将只能解密那些使用`SharedSymKey`加密的值；尝试解密使用`FinanceSymKey`加密的值的结果将是`NULL`：\n\
  \n```sql\nEXECUTE AS USER = 'MarketingUser';\n\nSELECT\n    CAST(\n        DECRYPTBYKEYAUTOCERT(\n\
  \            CERT_ID(N'MarketingCertificate'),\n            N'-+M@Rket1ng-P@s5w0rD!+-',\n\
  \            EncryptedData) AS nvarchar(255))\nFROM Confidential;\n\nREVERT;\nGO\n\
  ```\n\n    This is shared information accessible to finance and marketing\n    NULL\n\
  \n我希望这已经展示了加密混合模型如何在大多数需要加密的场景中实现安全性与可维护性之间的平衡，以及如何扩展它以应对各种不同的使用场景。\n\n在下一节中，我将向您展示如何针对以此模型保存的加密数据编写高效查询。\n\
  \n## 加密对查询设计的影响\n\n讨论了不同加密架构决策的相对优劣之后，本章剩余部分将重点介绍优化处理加密数据应用程序性能的方法。\n\n加密的安全性总是伴随着相关的性能成本。如前所述，加密数据的读写操作资源消耗更大，通常需要更长时间执行。然而，加密数据的特殊性质带来的影响范围超出了简单的性能下降，需要特别注意任何涉及对加密数据进行排序、筛选或连接的操作。\n\
  \n\n"
- "# 第 6 章 加密\n\n索引、排序和筛选数据依赖于识别数据内部的有序模式。大多数数据可以被赋予逻辑顺序：例如，`varchar` 或 `char` 数据可以按字母顺序排列；`datetime`\
  \ 数据可以按时间顺序排列；而 `int`、`decimal`、`float` 和 `money` 数据可以按数字顺序排列。然而，加密的根本目的正是要消除任何可能暴露底层数据信息的逻辑模式，这就使得为加密数据分配顺序变得非常棘手。这给高效的查询设计带来了一些问题。\n\
  \n为了演示这些问题，让我们创建一个包含一些示例机密数据的表。下面的代码清单将创建一个表并填充 100,000 行随机生成的 16 位数字，代表虚拟信用卡号。\n\
  \n在随机数据中，我们还将插入一个预定值，代表信用卡号 `4005-5500-0000-0019`。我们将使用这个已知值来测试在加密数据中搜索值的各种方法。\n\
  \n```sql\nCREATE TABLE CreditCards (\n    CreditCardID int IDENTITY(1,1) NOT NULL,\n\
  \    CreditCardNumber_Plain nvarchar(32)\n);\nGO\n\nWITH RandomCreditCards AS (\n\
  \    SELECT\n        CAST(9E+15 * RAND(CHECKSUM(NEWID())) + 1E+15 AS bigint) AS\
  \ CardNumber\n)\nINSERT INTO CreditCards (CreditCardNumber_Plain)\nSELECT TOP 100000\n\
  \    CardNumber\nFROM\n    RandomCreditCards,\n    MASTER..spt_values a,\n    MASTER..spt_values\
  \ b\nUNION ALL SELECT\n    '4005550000000019' AS CardNumber;\nGO\n```\n\n**注意**\
  \ 在您冲出去疯狂购物之前，我很遗憾地告诉您，本示例中列出的信用卡号 `4005-5500-0000-0019` 是 VISA 用于测试支付处理系统的测试卡号，不能用于购买商品。当然，那\
  \ 100,000 行随机生成的数据*可能*碰巧包含有效的信用卡详细信息，但祝您好运能找到它们！\n\n为了保护这些信息，我们将遵循前一节描述的混合加密模型。为此，首先需要创建一个由密码加密的证书：\n\
  \n```sql\nCREATE CERTIFICATE CreditCard_Cert\nENCRYPTION BY PASSWORD = '#Ch0o53_@_5Tr0nG_P455w0rD#'\n\
  WITH SUBJECT = 'Secure Certificate for Credit Card Information',\nEXPIRY_DATE =\
  \ '20101031';\nGO\n```\n\n然后创建一个由该证书保护的对称密钥：\n\n```sql\nCREATE SYMMETRIC KEY CreditCard_SymKey\n\
  WITH ALGORITHM = AES_256\nENCRYPTION BY CERTIFICATE CreditCard_Cert;\nGO\n```\n\n\
  由于我们只关心测试不同方法的性能，这次我们不必费心创建具有密钥访问权限的不同用户——我们将以 `dbo` 用户身份完成所有操作。\n\n首先，向 `CreditCards`\
  \ 表添加一个新列 `CreditCardNumber_Sym`，并使用 `CreditCard_SymKey` 对称密钥加密的值来填充它：\n\n```sql\n\
  ALTER TABLE CreditCards ADD CreditCardNumber_Sym varbinary(100);\nGO\n\nOPEN SYMMETRIC\
  \ KEY CreditCard_SymKey\nDECRYPTION BY CERTIFICATE CreditCard_Cert\nWITH PASSWORD\
  \ = '#Ch0o53_@_5Tr0nG_P455w0rD#';\n\nUPDATE CreditCards\nSET CreditCardNumber_Sym\
  \ =\n    ENCRYPTBYKEY(KEY_GUID('CreditCard_SymKey'),CreditCardNumber_Plain);\n\n\
  CLOSE SYMMETRIC KEY CreditCard_SymKey;\nGO\n```\n\n现在，假设我们正在设计一个需要搜索 `CreditCardNumber_Sym`\
  \ 列中已加密的特定信用卡号的应用程序。首先，让我们创建一个索引来支持搜索：\n\n```sql\nCREATE NONCLUSTERED INDEX idxCreditCardNumber_Sym\n\
  ON CreditCards (CreditCardNumber_Sym);\nGO\n```\n\n让我们尝试对加密数据执行一个简单的搜索。我们将通过解密 `CreditCardNumber_Sym`\
  \ 列并将结果与搜索字符串进行比较来搜索我们选定的信用卡号：\n\n```sql\nDECLARE @CreditCardNumberToSearch nvarchar(32)\
  \ = '4005550000000019';\n\nSELECT * FROM CreditCards\nWHERE DECRYPTBYKEYAUTOCERT(\n\
  \    CERT_ID('CreditCard_Cert'),\n    N'#Ch0o53_@_5Tr0nG_P455w0rD#',\n    CreditCardNumber_Sym)\
  \ = @CreditCardNumberToSearch;\nGO\n```\n\n快速浏览一下*图 6-7* 所示的执行计划就会发现，尽管存在索引，但查询必须扫描整个表，解密每一行以查看它是否满足谓词条件。\n\
  \n*图 6-7. 在加密数据上执行的查询扫描*\n\n需要全表扫描的原因在于加密数据的非确定性本质。由于 `CreditCard_Sym` 列中的值是加密的，我们无法在不解密每个值的情况下判断哪些行匹配搜索条件。我们也不能简单地加密搜索值\
  \ `4005550000000019` 并在 `CreditCard_Sym` 列中搜索相应的加密值，因为结果是非确定性的，每次都会不同。\n\n即使我们使用的是对称加密（更快的单元格加密和解密方法），但需要进行整个表扫描意味着该查询的性能不佳。我们可以通过检查\
  \ `sys.dm_exec_query_stats` 来快速评估整体性能，如下所示：\n\n```sql\nSELECT\n    st.text,\n  \
  \  CAST(qs.total_worker_time AS decimal(18,9)) / qs.execution_count / 1000\n   \
  \     AS Avg_CPU_Time_ms,\n    qs.total_logical_reads\nFROM\n    sys.dm_exec_query_stats\
  \ qs\n    CROSS APPLY sys.dm_exec_sql_text(qs.plan_handle) st\nWHERE\n    st.text\
  \ LIKE '%CreditCardNumberToSearch%';\n```\n\n我得到的结果如下：\n\n```\ntext            \
  \                            Avg_CPU_Time_ms  total_logical_reads\nDECLARE @CreditCardNumberToSearch\
  \ nvarchar(32)\n    = '4005550000000019'; --*SELECT------------- 1389.079      \
  \   71623\n```\n\n该 `SELECT` 查询仅查询 100,000 行加密数据就花费了近 1.5 秒的 CPU 时间。另请注意，`sys.dm_exec_sql_text`\
  \ 的 `text` 列中包含的查询文本被清空了，所有引用加密对象的查询都是如此。\n\n解决加密数据搜索问题的适当解决方案因数据的查询方式而异——无论是搜索与搜索字符串完全匹配的单行（相等匹配）、使用通配符的模式匹配（即\
  \ `LIKE %`），还是范围搜索（即使用 `BETWEEN`、`>` 或 `<` 运算符）。\n\n## 使用哈希消息认证码进行相等匹配\n\n一种促进高效搜索和过滤加密数据单行的方法是利用哈希消息认证码，它是由哈希函数创建的，如本章前面所述。请记住，哈希函数的输出是确定性的——任何给定的输入总是导致相同的输出，这是允许对加密数据高效搜索任何给定搜索值的关键属性。存储在数据库中的二进制哈希值可以被索引，并且可以通过创建搜索条件的哈希值并在包含预计算哈希值的列中搜索该值来执行数据过滤。\n\
  \n但是，我们不想存储由 `HASHBYTES` 返回的每个信用卡号的简单哈希值——如前所述，哈希值可以使用字典或彩虹表进行攻击，特别是当它们（如信用卡号的情况）遵循预定格式时。这将削弱使用对称加密实现的现有解决方案的强度。\n\
  \nHMAC 设计用于验证消息的真实性，它通过将哈希函数与密钥（盐值）结合来克服这个问题。通过在哈希前将明文与强盐值组合，得到的哈希值几乎可以免疫字典攻击，因为任何查找都必须将每个可能的源值与每个可能的盐值组合，从而产生一个黑客必须与之比较的、不可行的庞杂可能哈希值列表。\n\
  \n**消息认证码**\n\nHMAC 是一种验证消息真实性以证明其在传输过程中未被篡改的方法。其工作原理如下：\n\n1.  发送方和接收方约定一个只有他们知道的秘密值。例如，假设他们约定单词\
  \ `salt`。\n\n\n\n## 第 6 章 „ 加密\n\n2.  发送方创建消息时，他们会将秘密值附加到消息末尾。然后，他们会对组合了盐值的消息进行哈希运算：\n\
  \    `HMAC = HASH( “This is the original message” + “salt”)`\n3.  发送方将原始消息和 `HMAC`\
  \ 一起传输给接收方。\n4.  接收方收到消息后，会将约定的盐值附加到收到的消息上，然后自行对结果进行哈希运算。接着，他们会检查结果是否与提供的 `HMAC`\
  \ 值相同。\n\n`HMAC` 是一种相对简单但非常有效的方法，用于确保目标接收方可以验证消息的真实性。如果有人试图拦截并篡改消息，它将与提供的 `HMAC`\
  \ 值不匹配。攻击者也无法生成新的匹配 `HMAC` 值，因为他们不知道需要应用的秘密盐值。\n\n实施基于 `HMAC` 的解决方案的第一步，是定义一种安全存储盐值（或\
  \ `密钥`）的方法。在本例中，我们将盐值存储在一个单独的表中，并使用安全的非对称密钥对其进行加密。\n\n```sql\nCREATE ASYMMETRIC\
  \ KEY HMACASymKey\nWITH ALGORITHM = RSA_1024\nENCRYPTION BY PASSWORD = N'4n0th3r_5tr0ng_K4y!';\n\
  GO\n\nCREATE TABLE HMACKeys (\n    HMACKeyID int PRIMARY KEY,\n    HMACKey varbinary(255)\n\
  );\nGO\n\nINSERT INTO HMACKeys\nSELECT\n    1,\n    ENCRYPTBYASYMKEY(ASYMKEY_ID(N'HMACASymKey'),\
  \ N'-->Th15_i5_Th3_HMAC_kEy!');\nGO\n```\n\n现在我们可以基于密钥创建一个 `HMAC` 值。你可以通过在 `T-SQL`\
  \ 中简单地使用 `HASHBYTES` 并将盐值附加到原始消息后面来创建一个简单的 `HMAC`，如下所示：\n\n```sql\nDECLARE @HMAC\
  \ varbinary(max) = HASHBYTES('SHA1', 'PlainText' + 'Salt')\n```\n\n然而，这种方法可以通过多种方式得到改进：\n\
  \n*   `HASHBYTES` 函数仅基于任何输入的前 8000 字节创建哈希值。如果消息长度等于或超过此值，则附加在消息内容后的任何盐值都将被忽略。因此，最好先提供盐值，*然后*再提供要哈希的消息。\n\
  *   根据联邦信息处理标准 (`FIPS PUB 198`, `http://csrc.nist.gov/publications/fips/fips198/fips-198a.pdf`)\
  \ 定义的 `HMAC` 规范，实际上对明文进行了两次哈希运算，如下所示：\n    `HMAC = HASH(Key1 + HASH(Key2 + PlainText))`\n\
  \    根据 `FIPS` 标准，`Key1` 和 `Key2` 是通过将提供的盐值填充到哈希函数密钥的块大小来计算的。`Key1` 用字节 `0x5c` 填充，`Key2`\
  \ 用字节 `0x36` 填充。这两个值特意选择具有较大的 `汉明距离`——也就是说，生成的填充密钥将彼此显著不同，从而最大化使用两个密钥进行哈希的增强效果。\n\
  *   `HMAC` 标准并未指定使用哪种哈希算法来执行哈希运算，但最终生成的 `HMAC` 的强度与其所基于的底层哈希函数的加密强度直接相关。`HASHBYTES`\
  \ 函数仅支持使用 `MD2`、`MD4`、`MD5`、`SHA` 和 `SHA1` 算法进行哈希。相比之下，`.NET Framework` 提供的哈希方法则支持更安全的\
  \ `SHA2` 系列算法，以及 160 位的 `RIPEMD160` 算法。\n\n看来 `SQL Server` 的基础 `HASHBYTES` 函数还有待改进，但幸运的是有一个简单的解决方案。为了创建一个符合\
  \ `FIPS` 标准、基于强哈希算法的 `HMAC`，我们可以采用一个 `CLR` 用户定义函数，该函数使用 `.NET` `System.Security`\
  \ 命名空间提供的方法。以下代码清单说明了创建一个可重用类所需的 `C#` 代码，该类可用于为所有支持的哈希算法和给定密钥生成 `HMAC` 值：\n\n```csharp\n\
  [SqlFunction(IsDeterministic = true, DataAccess = DataAccessKind.None)]\npublic\
  \ static SqlBytes GenerateHMAC\n(\n    SqlString Algorithm,\n    SqlBytes PlainText,\n\
  \    SqlBytes Key\n)\n{\n```\n\n\n\n## 第 6 章 - 加密\n\n```csharp\nif (Algorithm.IsNull\
  \ || PlainText.IsNull || Key.IsNull) {\n    return SqlBytes.Null;\n}\n\nHMAC HMac\
  \ = null;\n\nswitch (Algorithm.Value) {\n    case \"MD5\":\n        HMac = new HMACMD5(Key.Value);\n\
  \        break;\n    case \"SHA1\":\n        HMac = new HMACSHA1(Key.Value);\n \
  \       break;\n    case \"SHA256\":\n        HMac = new HMACSHA256(Key.Value);\n\
  \        break;\n    case \"SHA384\":\n        HMac = new HMACSHA384(Key.Value);\n\
  \        break;\n    case \"SHA512\":\n        HMac = new HMACSHA512(Key.Value);\n\
  \        break;\n    case \"RIPEMD160\":\n        HMac = new HMACRIPEMD160(Key.Value);\n\
  \        break;\n    default:\n        throw new Exception(\"Hash algorithm not\
  \ recognised\");\n}\n\nbyte[] HMacBytes = HMac.ComputeHash(PlainText.Value);\nreturn\
  \ new SqlBytes(HMacBytes);\n```\n\n**注意**：为求完整，`GenerateHMAC`函数支持`Security.Cryptography`命名空间内所有可用的哈希算法。实际上，不建议在生产应用中使用`MD5`算法，因为它已被证明易受哈希碰撞攻击。\n\
  \n生成程序集并在 SQL Server 中注册。然后，在`CreditCards`表中创建一个新列，并使用`GenerateHMAC`函数填充`HMAC-SHA1`值。我将`HMAC`列创建为`varbinary(255)`类型——存储在此列中的`HMAC`值的实际长度将取决于所使用的哈希算法：`MD5`为\
  \ 128 位（16 字节）；`RIPEMD160`和`SHA1`为 160 位（20 字节）；`SHA512`最长可达 64 字节。以下代码清单演示了这些步骤：\n\
  \n```sql\nALTER TABLE CreditCards\nADD CreditCardNumber_HMAC varbinary(255);\nGO\n\
  \n-- 从 MACKeys 表中检索 HMAC 盐值\nDECLARE @salt varbinary(255);\nSET @salt = (\n    SELECT\
  \ DECRYPTBYASYMKEY(\n        ASYMKEY_ID('HMACASymKey'),\n        HMACKey,\n    \
  \    N'4n0th3r_5tr0ng_K4y!'\n    )\n    FROM HMACKeys\n    WHERE HMACKeyID = 1\n\
  );\n\n-- 使用盐值更新 HMAC 值\nUPDATE CreditCards\nSET CreditCardNumber_HMAC = (\n    SELECT\
  \ dbo.GenerateHMAC(\n        'SHA256',\n        CAST(CreditCardNumber_Plain AS varbinary(max)),\n\
  \        @salt\n    )\n);\nGO\n```\n\n**注意**：如果您在生产应用中实现此处提出的`HMAC`解决方案，您需要创建触发器以确保在对`CreditCards`表进行`INSERT`和`UPDATE`操作时，`CreditCardNumber_HMAC`列的完整性得以维护。由于我仅专注于评估`HMAC`的性能，因此不会进行此步骤。\n\
  \n我们现在可以发出基于`HMAC`搜索信用卡的查询；但在执行之前，让我们创建一个索引来帮助支持搜索。针对`CreditCards`表发出的查询将根据`CreditCardNumber_HMAC`列过滤行，但我们希望返回`CreditCardNumber_Sym`列，以便解密原始信用卡号。\n\
  \n为确保这些查询能被索引覆盖，我们将基于`CreditCardNumber_HMAC`创建一个新的非聚集索引，并将`CreditCard_Sym`作为非键列包含在索引中。\n\
  \n```sql\nCREATE NONCLUSTERED INDEX idxCreditCardNumberHMAC\nON CreditCards (CreditCardNumber_HMAC)\n\
  INCLUDE (CreditCardNumber_Sym);\nGO\n```\n\n**注意**：一个**覆盖索引**在一个索引中包含了查询所需的所有列。这意味着数据库引擎可以仅基于索引就满足查询，而无需再对数据页执行额外的查找或查找操作以检索其他列。\n\
  \n让我们通过搜索`CreditCards`表中已知的信用卡来测试新的基于`HMAC`的解决方案的性能：\n\n```sql\n-- 选择要搜索的信用卡\nDECLARE\
  \ @CreditCardNumberToSearch nvarchar(32) = '4005550000000019';\n\n-- 检索秘密盐值\nDECLARE\
  \ @salt varbinary(255);\nSET @salt = (\n    SELECT DECRYPTBYASYMKEY(\n        ASYMKEY_ID('HMACASymKey'),\n\
  \        MACKey,\n        N'4n0th3r_5tr0ng_K4y!'\n    )\n    FROM MACKeys\n);\n\n\
  -- 生成要搜索的信用卡的 HMAC\nDECLARE @HMACToSearch varbinary(255);\nSET @HMACToSearch = dbo.GenerateHMAC(\n\
  \    'SHA256',\n    CAST(@CreditCardNumberToSearch AS varbinary(max)),\n    @salt\n\
  );\n\n-- 从 CreditCards 表中检索匹配的行\nSELECT\n    CAST(\n        DECRYPTBYKEYAUTOCERT(\n\
  \            CERT_ID('CreditCard_Cert'),\n            N'#Ch0o53_@_5Tr0nG_P455w0rD#',\n\
  \            CreditCardNumber_Sym\n        ) AS nvarchar(max)\n    ) AS CreditCardNumber\n\
  FROM CreditCards\nWHERE CreditCardNumber_HMAC = @HMACToSearch;\n```\n\n\n## 第 6\
  \ 章 „ 加密\n\n```sql\nSELECT\n    CAST(\n        DECRYPTBYKEYAUTOCERT(\n         \
  \   CERT_ID('CreditCard_Cert'),\n            N'#Ch0o53_@_5Tr0nG_P455w0rD#',\n  \
  \          CreditCardNumber_Sym) AS nvarchar(32)) AS CreditCardNumber_Decrypted\n\
  FROM CreditCards\nWHERE CreditCardNumber_HMAC = @HMACToSearch\nAND\n    CAST(\n\
  \        DECRYPTBYKEYAUTOCERT(\n            CERT_ID('CreditCard_Cert'),\n      \
  \      N'#Ch0o53_@_5Tr0nG_P455w0rD#',\n            CreditCardNumber_Sym) AS nvarchar(32))\
  \ = @CreditCardNumberToSearch;\nGO\n```\n\n此查询先为提供的搜索值生成 HMAC 哈希，然后使用 `idxCreditCardNumberHMAC`\
  \ 索引在 `CreditCardNumber_HMAC` 列中搜索该值。找到匹配行后，它会解密 `CreditCardNumber_Sym` 列中的值，以确保该值与最初提供的搜索值相匹配（以防止哈希冲突的风险，即由于某个错误结果恰好与我们的搜索字符串具有相同的哈希值而被返回的情况）。\n\
  \n图 6-8 所示的执行计划表明，整个查询可以通过单次索引查找完成。\n\n*图 6-8. 在 HMAC 哈希列上执行聚集索引查找*\n\n`sys.dm_exec_query_stats`\
  \ 中包含的性能计数器显示，该查询比直接查询 `CreditCardNumber_Sym` 列的效率显著提高，仅消耗 253 毫秒的 CPU 时间，并且只需要九次逻辑读取。\n\
  \n### 使用 HMAC 子串进行通配符搜索\n\n在许多情况下，数据库需要支持搜索条件具有一定灵活性的查询。这适用于加密数据的搜索，也适用于任何其他类型的数据。例如，您可能需要搜索所有信用卡在特定月份到期的客户，或者基于其社会安全号码的后四位数字进行搜索。\n\
  \n前面提出的 HMAC 解决方案无法用于这些情况，因为 HMAC 哈希值对于精确值是唯一的。由部分字符串生成的哈希将与由完整字符串生成的哈希完全不同，如下所示：\n\
  \n```sql\nSELECT\n    HASHBYTES('SHA1', 'The quick brown fox jumped over the lazy\
  \ dog')\nUNION SELECT\n    HASHBYTES('SHA1', 'The quick brown fox jumped over the\
  \ lazy dogs');\n```\n\n尽管输入字符串仅相差一个字符，但生成的哈希值却大不相同：\n\n`0xF6513640F3045E9768B239785625CAA6A2588842`\n\
  `0xFBADA4676477322FB3E2AE6353E8BD32B6D0B49C`\n\n为了支持部分字符串的模式匹配，我们仍然可以使用 HMAC，但我们需要基于字符串中某个在所有搜索中保持一致的片段来创建哈希。换句话说，要支持查找\
  \ `LIKE 'The quick brown fox jumped over the lazy%'` 值的查询，就需要搜索所有与截断字符串 `The quick\
  \ brown fox jumped over the lazy` 的哈希值相匹配的行。这个确切的子字符串必须在所有查询中一致使用，并且它应具有足够的选择性以确保查询效率。\n\
  \n回到本章使用的示例，假设我们想要创建一种方法，允许用户基于信用卡号的后四位数字搜索 `CreditCards` 表中的一行数据。为此，我们将在表中添加一个新列，并使用\
  \ `GenerateHMAC` 函数填充该列，该函数基于每个信用卡号的后四位创建 HMAC。这个新列 `CreditCardNumber_Last4HMAC`\
  \ 将仅用于支持通配符搜索，而现有的 `CreditCardNumber_HMAC` 列将继续用于对整个信用卡号的等值搜索。\n\n首先，让我们向 `HMACKeys`\
  \ 表添加一个新密钥：\n\n```sql\nCREATE ASYMMETRIC KEY HMACSubStringASymKey\n    WITH ALGORITHM\
  \ = RSA_1024\n    ENCRYPTION BY PASSWORD = N'~Y3T_an0+h3r_5tR()ng_K4y~';\nGO\n\n\
  INSERT INTO HMACKeys\nSELECT\n    2,\n    ENCRYPTBYASYMKEY(\n        ASYMKEY_ID(N'HMACSubStringASymKey'),\n\
  \        N'->Th15_i$_Th3_HMAC_Sub5Tr1ng_k3y');\nGO\n```\n\n现在，让我们使用新密钥为每个信用卡号的后四位字符创建一个\
  \ HMAC：\n\n```sql\nALTER TABLE CreditCards\nADD CreditCardNumber_Last4HMAC varbinary(255);\n\
  GO\n\n-- 从 MACKeys 表中检索 HMAC 盐值\n```\n\n\n"
- "# 第 6 章 „ 加密\n\nDECLARE `@salt` varbinary(255);\n\nSET `@salt` = (\n\nSELECT `DECRYPTBYASYMKEY`(\n\
  \n`ASYMKEY_ID`('HMACSubStringASymKey'),\n\n`HMACKey`,\n\nN'~Y3T_an0+h3r_5tR()ng_K4y~'\n\
  \n)\n\nFROM `HMACKeys`\n\nWHERE `HMACKeyID` = 2);\n\n-- 使用盐值更新 Last4HMAC 值\n\nUPDATE\
  \ `CreditCards`\n\nSET `CreditCardNumber_Last4HMAC` = (SELECT `dbo.GenerateHMAC`(\n\
  \n'SHA256',\n\nCAST(RIGHT(`CreditCardNumber_Plain`, 4) AS varbinary(max)), `@salt`));\n\
  \nGO\n\n并且，为了支持针对新子串 HMAC 的查询，我们将添加一个新的索引：\n\n```sql\nCREATE NONCLUSTERED INDEX\
  \ idxCreditCardNumberLast4HMAC\nON CreditCards (CreditCardNumber_Last4HMAC)\nINCLUDE\
  \ (CreditCardNumber_Sym);\n```\n\nGO\n\n假设我们想要查询所有以数字 `0019` 结尾的信用卡。这种模式匹配查询现在可以通过比较这些数字的\
  \ HMAC 与存储在 `CreditCardNumber_Last4HMAC` 列中的 HMAC 值来发出，如下所示：\n\n```sql\n-- 选择要搜索的信用卡后\
  \ 4 位\nDECLARE @CreditCardLast4ToSearch nchar(4) = '0019';\n\n-- 检索秘密盐值\nDECLARE\
  \ @salt varbinary(255);\nSET @salt = (\n    SELECT DECRYPTBYASYMKEY(\n        ASYMKEY_ID('HMACSubStringASymKey'),\n\
  \        HMACKey,\n        N'~Y3T_an0+h3r_5tR()ng_K4y~'\n    )\n    FROM HMACKeys\n\
  \    WHERE HMACKeyID = 2\n);\n\n-- 生成要搜索的后 4 位的 HMAC\nDECLARE @HMACToSearch varbinary(255);\n\
  SET @HMACToSearch = dbo.GenerateHMAC(\n    'SHA256',\n    CAST(@CreditCardLast4ToSearch\
  \ AS varbinary(max)),\n    @salt\n);\n\n-- 从 CreditCards 表中检索匹配的行\nSELECT\n    CAST(\n\
  \        DECRYPTBYKEYAUTOCERT(\n            CERT_ID('CreditCard_Cert'),\n      \
  \      N'#Ch0o53_@_5Tr0nG_P455w0rD#',\n            CreditCardNumber_Sym\n      \
  \  )\n        AS nvarchar(32)\n    ) AS CreditCardNumber_Decrypted\nFROM\n    CreditCards\n\
  WHERE\n    CreditCardNumber_Last4HMAC = @HMACToSearch\n    AND\n    CAST(\n    \
  \    DECRYPTBYKEYAUTOCERT(\n            CERT_ID('CreditCard_Cert'),\n          \
  \  N'#Ch0o53_@_5Tr0nG_P455w0rD#',\n            CreditCardNumber_Sym\n        )\n\
  \        AS nvarchar(32)\n    ) LIKE '%' + @CreditCardLast4ToSearch;\n```\n\nGO\n\
  \n在我的系统上获得的结果列出了以下十张信用卡，包括我们最初搜索的信用卡号码 `4005550000000019`（你的列表会有所不同，因为 `CreditCards`\
  \ 表中的记录是随机生成的，但你应该仍然能找到预期的匹配值）：\n\n对如图 6-9 所示的查询执行计划的检查表明，只要所选的子串具有足够的选择性（如此例中所示），则可以使用高效的索引查找（index\
  \ seek）来实现对加密数据的通配符搜索。\n\n**图 6-9. HMAC 子串的索引查找**\n\n在我的机器上，此查询的性能与针对 `CreditCard_HMAC`\
  \ 列的完全相等匹配几乎相同，耗时 `301ms` 的 CPU 时间，需要九次逻辑读取。\n\n虽然此技术展示了可以对加密数据执行通配符搜索，但它不是一个非常灵活的解决方案。本例中使用的\
  \ `CreditCardNumber_Last4HMAC` 列只能用于满足指定信用卡最后四位的查询。如果你想搜索信用卡号码的最后六位，例如，你将需要创建一个全新的\
  \ HMAC 列来支持该类型的查询。\n\n你的应用程序在搜索条件上要求的灵活性越高，此解决方案就变得越不可行，并且必须创建的附加数据列就越多。这不仅会成为维护难题，还意味着更大的存储需求，并增加了数据暴露的风险。即使在存储相对安全的\
  \ HMAC 哈希值时，每个附加列都会为黑客提供更多关于你数据的信息，这些信息可能被用于发动定向攻击。\n\n### 范围搜索\n\n本章我将考虑的最后一个搜索加密数据的场景是范围查询。例如，我们如何识别信用卡号码范围在\
  \ `4929100012347890` 和 `4999100012349999` 之间的那些数据行？\n\n这些类型的搜索可能是最难用加密数据实现的，并且没有明显的解决方案：HMAC\
  \ 解决方案或其子串衍生物在这里没有帮助——顺序的明文数字显然不会导致顺序的密文值。事实上，当你处理单元级加密时，无法避免扫描并解密表中的每一行来完成范围查询。\n\
  \n如果要搜索的范围非常有限（例如，所提供值的 +/-10），则可能可以放弃加密，并在新列中存储部分明文值，例如信用卡的最后两位。通过一些查询重设计，查询可以被设计为基于此列促进某些范围查询，但这显然涉及巨大的风险，因为它甚至披露了敏感信息的部分明文。\n\
  \n如果必须支持范围查询，唯一其他的替代方法是依赖在 I/O 级别执行的加密形式之一，例如使用 `TDE`、`EFS` 或 `Windows BitLocker`\
  \ 的数据库加密。在这种情况下，解密是在非常低的级别执行的，以至于数据库引擎可以在不考虑数据在处理前可能已受到的任何加密的情况下操作数据。\n\n## 总结\n\
  \n加密构成了任何安全策略的重要组成部分，并且可以在阻止攻击者获取敏感或机密数据方面提供关键的最后一道防线。然而，它是有代价的——加密需要精心规划的策略和安全政策，并且几乎总是需要在数据库或应用程序级别进行设计更改才能成功实施。增加的安全性也必然会对性能产生负面影响。\n\
  \n由非确定性算法产生的加密数据不具备与正常数据相同的结构或模式。这意味着许多标准的数据库任务，如排序、过滤和连接，必须重新设计才能有效工作。尽管有方法可以绕过处理加密数据的一些限制，例如使用\
  \ HMAC 进行搜索和匹配，但它们并非在所有情况下都令人满意，如果可能，应设计应用程序以避免直接查询加密数据。\n\n"
- '# 第 7 章


  ## SQLCLR：架构与设计考量


  当微软在 SQL Server 2005 中首次宣布 SQL Server 将托管 .NET 公共语言运行时（CLR）时，这在数据库界引起了很多兴奋。其中一部分兴奋是来自开发者的热情支持，他们设想了许多数据库场景可能从
  .NET 基础类库提供的方法中受益。然而，也有相当多的紧张和抵制来自 DBAs，他们担心新技术带来的威胁，以及传言说不怀好意的开发者将能够创建大量 DBA 无法穿透的、编译好的进程内数据访问代码。


  事实证明，`SQLCLR` 集成既没有许多人想象的那么可怕，也没有那么有用。那些希望将 `SQLCLR` 特性作为 `T-T-SQL` 完全替代品的人很快就被劝退了，因为编写
  `CLR` 例程通常需要更多的代码，并且由于在 `CLR` 边界上封送数据的持续成本，性能和可靠性会受到影响。而对于那些本身不是 .NET 开发者的 DBA 来说，这个其实用途不多的功能涉及一个相当陡峭的学习曲线。


  我们与 `SQLCLR` 一起生活了四年多，尽管看起来 `CLR`




  '
- "# 第 7 章 SQLCLR：架构与设计考量\n\n集成特性虽尚未被大规模使用，但其采用率确实在稳步增长。SQL Server 2008 解除了先前的限制，该限制曾将\
  \ CLR 用户定义类型（UDT）的数据容量约束为最大仅 8KB，这严重制约了许多潜在应用场景；现在，所有 CLR UDT 单个项最多可容纳 2GB 数据。这为在数据库中存储更多新型复杂对象数据开辟了众多潜在途径，而\
  \ `SQLCLR` 比主要基于集合的 `T-SQL` 引擎更胜任此任务。实际上，SQL Server 2008 引入了三种新的系统定义数据类型（`geometry`、`geography`\
  \ 和 `hierarchyid`），它们出色地展示了 `SQLCLR` 如何扩展 SQL Server，以高效存储和查询超出 SQL 数据库通常关联的标准数值和字符型数据之外的数据类型。\n\
  \n我将在第 10 章和第 12 章详细阐述系统定义的 CLR 数据类型，这两章将分别讨论空间数据和层次数据。然而，本章重点聚焦于在 SQL Server 中利用基于托管代码的用户定义函数的设计与性能考量，以及讨论何时应考虑使用\
  \ `SQLCLR` 而非更传统的 `T-SQL` 方法。我认为，`SQLCLR` 集成的主要优势在于能够在各层之间移动和共享代码——因此本章的主要关注点在于可维护性和重用场景。\n\
  \n> **注意：** 本章假设你已熟悉基本的 `SQLCLR` 主题，包括如何创建和部署函数、注册新程序集，以及 C# 编程语言。\n\n## 弥合 SQL/CLR\
  \ 差距：SqlTypes 库\n\n.NET Framework 和 SQL Server 暴露的原生数据类型在许多情况下相似，但通常不兼容。从数据类型角度看，处理\
  \ SQL Server 和 .NET 互操作性时，会出现几个主要问题：\n\n- 首要的是，所有原生 SQL Server 数据类型都是 `可为空` 的——即，任何给定类型的实例可以包含该类型域内的有效值，也可以表示未知（`NULL`）。.NET\
  \ 中的类型通常不支持这一概念（注意 C# 的 `null` 和 VB .NET 的 `Nothing` 与 SQL Server 的 `NULL` 不同）。尽管\
  \ .NET Framework 为值类型变量支持可为空类型，但它们的行为方式与 SQL Server 中的对应类型并不相同。\n- 类型系统之间的第二个差异与实现有关。两个系统中涉及的类型的格式、精度和标度差异巨大。例如，.NET\
  \ 的 `DateTime` 类型支持的范围和精度远大于 SQL Server 的 `datetime` 类型。\n- 第三个主要差异与类型结合运算符时的运行时行为有关。例如，在\
  \ SQL Server 中，几乎所有涉及至少一个 `NULL` 类型实例的操作都会产生 `NULL`。然而，这与 .NET 中作用于 `null` 值的操作行为并不相同。考虑以下\
  \ `T-SQL`：\n\n```sql\nDECLARE @a int = 10;\nDECLARE @b int = null;\nIF (@a != @b)\n\
  \    PRINT 'test is true';\nELSE\n    PRINT 'test is false';\n```\n\n在 `T-SQL` 中，任何与\
  \ `NULL` 值的比较结果都是未定义的，因此前面的代码将打印 \"test is false\"。然而，考虑使用 C# 中可为空的 `int` 类型（在类型声明后用\
  \ `?` 字符表示）实现的等效函数：\n\n```csharp\nint? a = 10;\nint? b = null;\nif (a != b)\n  \
  \  Console.Write(\"test is true\");\nelse\n    Console.Write(\"test is false\");\n\
  ```\n\n在 .NET 中，会进行 `10` 和 `null` 的比较，导致代码打印 \"test is true\"。除了可空性之外，处理溢出、下溢和其他潜在错误的不一致性也可能导致差异。例如，在\
  \ .NET 语言中，向值为 `2147483647`（32 位整数最大值）的 32 位整数加 `1` 可能导致值“回绕\n\n\n\n"
- "# SQLCLR：架构与设计考量\n\n在 .NET 的 `Int32` 类型中，类似 `checked { return x * -1; }` 这样的操作，如果\
  \ x 为 `-2147483648`，会因溢出而\"环绕\"，产生 `-2147483648`。在 SQL Server 中，这种行为永远不会发生——相反，会引发溢出异常。\n\
  \n为了在这两种类型范式之间提供一层抽象，.NET Framework 附带了一个名为 `System.Data.SqlTypes` 的命名空间。该命名空间包含一系列结构，这些结构将\
  \ SQL Server 类型和行为映射到 .NET 中。这些结构中的每一个都通过 `INullable` 接口实现可空性，该接口公开了一个 `IsNull`\
  \ 属性，允许调用者确定给定类型的实例是否为 `NULL`。此外，这些类型遵循与 SQL Server 原生类型相同的范围、精度和运算符规则。\n\n简单地说，正确使用\
  \ `SqlTypes` 类型是确保进出 SQLCLR 例程的数据由每个类型系统正确处理的最有效方法。我的建议是，只要可能，所有作为 SQLCLR 对象公开的方法都应使用\
  \ `SqlTypes` 类型作为输入和输出参数，而不是标准的 .NET 类型。这需要前期更多的开发工作，但它应该能在一定程度上使你的代码适应未来，并有助于避免类型兼容性问题。\n\
  \n## 封装代码以促进跨层重用\n\nSQLCLR 集成的一个主要卖点，特别是对于使用 .NET Framework 进行应用程序开发的商店来说，是能够在有意义时轻松地在各层之间移动或共享代码。然而，实现这一目标并不那么容易。\n\
  \n### 问题\n\n不幸的是，在 SQLCLR 环境中工作的一些设计必要性不能很好地转化到应用层，反之亦然。其中一个例子就是前一节描述的 `SqlTypes`\
  \ 的使用；尽管建议在 SQLCLR 例程的所有接口中使用它们，但这个规定在应用层没有意义，因为 `SqlTypes` 不支持原生 .NET 类型支持的全部运算符和选项。在每种情况下都使用它们可能会使数据访问变得简单，但会剥夺你执行许多复杂数据操作任务的能力，因此与其说是有益的改变，不如说是一种阻碍。\n\
  \n重写代码或创建为不同层定制的多个版本根本不能促进可维护性。在最佳情况下，应用程序使用的任何给定逻辑片段都应该只在一个地方编码——无论有多少不同的组件使用该逻辑或其部署在何处。这是面向对象编程的核心设计目标之一，重要的是要记住，它也适用于在\
  \ SQL Server 内部重用的代码。\n\n### 一个合理的解决方案\n\n与其重写例程和类型以使它们与 `SqlTypes` 兼容并实现其他特定于数据库的逻辑，我建议你养成设计\
  \ **包装器方法** 和类的习惯。这些包装器应该将 `SqlTypes` 的输入和输出映射到原始代码实际使用的 .NET 类型，并通过程序集引用调用到底层例程。包装器也是实现特定于数据库的逻辑的好地方，这些逻辑在最初为应用层设计的例程中可能不存在。\n\
  \n除了代码本身可维护性的好处外，创建包装器还有其他几个优点。首先，单元测试不需要重写——在应用层工作的相同测试在数据层仍然适用（尽管你可能想为包装器例程编写辅助的单元测试）。其次——也许更重要的是——封装原始程序集有助于维护最低权限的编码模型并增强安全性，正如本章后面“使用代码访问安全权限”和“使用宿主保护权限”部分所讨论的那样。\n\
  \n## 一个简单的例子：电子邮件地址格式验证\n\n网页表单要求提供电子邮件地址是很常见的，你无疑遇到过这样的表单，它们会告诉你输入的电子邮件地址是否不符合预期的标准格式。这种验证提供了一种比实际发送电子邮件并等待回复更快——但效果较差——的测试电子邮件地址的方法，并且如果某些内容明显不正确，它会立即给用户反馈。\n\
  \n除了在前端验证中使用此逻辑外，在数据库中实现相同的方法以驱动 `CHECK` 约束也是有意义的。这样，任何到达数据库的数据——无论它是否已经通过了应用程序中的检查——都将被再次检查正确性。\n\
  \n以下是一个简单的 .NET 方法，它使用正则表达式验证电子邮件地址的格式：\n\n```\npublic static bool IsValidEmailAddress(string\
  \ emailAddress)\n{\n    //Validate the e-mail address\n    Regex r =\n        new\
  \ Regex(@\"\\w+([-+.]\\w+)*@\\w+([-.]\\w+)*\\.\\w+([-.]\\w+)*\");\n    return (r.IsMatch(emailAddress));\n\
  }\n```\n\n当然，这段代码可以在 SQL Server 和应用层中直接使用——在 SQL Server 中使用它只需要加载程序集并注册函数。但这有一些问题，最明显的是缺少正确的\
  \ `NULL` 处理。照现在这样，当传入 `NULL` 时，此方法将引发 `ArgumentException`。根据你的业务需求，更好的选择可能是返回 `NULL`\
  \ 或 `false`。另一个潜在问题发生在需要数据库与应用层逻辑略有不同的方法中。对于电子邮件验证的情况，很难想象如何为不同的层增强逻辑，但对于其他方法，这样的修改会带来可维护性挑战。\n\
  \n解决方案是在 SQL Server 中编录包含此方法的程序集，但不直接将该方法作为 SQLCLR UDF 公开。而是创建一个使用 `SqlTypes` 并在内部调用初始方法的包装器方法。这意味着底层方法不需要修改就能创建一个与数据库正确交互的版本，并且相同的程序集可以部署在任何层。下面是一个示例，展示了在\
  \ `IsValidEmailAddress` 方法之上创建的包装器方法，以暴露一个正确支持 `NULL` 输入和输出的 SQLCLR UDF 版本。假设我在一个名为\
  \ `UtilityMethods` 的类中创建了内部方法，并且也包含了对 `UtilityMethods` 程序集所用命名空间的 `using` 语句。\n\n\
  ```\n[Microsoft.SqlServer.Server.SqlFunction]\npublic static SqlBoolean IsValidEmailAddress(\n\
  \    SqlString emailAddress)\n{\n    // Return NULL on NULL input\n    if (emailAddress.IsNull)\n\
  \        return (SqlBoolean.Null);\n\n    bool isValid = UtilityMethods.IsValidEmailAddress(emailAddress.Value);\n\
  \n    return (new SqlBoolean(isValid));\n}\n```\n\n请注意，此技术不仅可用于将应用程序层中的程序集加载到 SQL\
  \ Server 中，也可用于反向操作——将逻辑从数据层迁移出来。鉴于 SQLCLR 的性质，应始终考虑代码移动性的潜力，开发人员即使在创建专门用于数据库的代码时，也应考虑使用包装器来设计方法——这将最大限度地提高以后重用的潜力，当或如果相同的逻辑需要迁移到另一层，甚至如果逻辑需要在数据层内部重用多次。\n\
  \n在 SQLCLR 环境中工作时，跨程序集引用还有其他好处。通过正确利用引用，可以创建更健壮、更安全的 SQLCLR 解决方案。\n\n\n\n"
- "# SQLCLR：架构与设计考量\n\n## SQLCLR 安全与可靠性特性\n\n与存储过程、触发器、UDF（用户定义函数）以及其他可暴露在 SQL Server\
  \ 中的代码模块不同，特定的 SQLCLR 例程并非直接与数据库关联，而是与数据库内**编录**的程序集相关联。程序集的编录是使用 SQL Server 的 `CREATE\
  \ ASSEMBLY` 语句完成的，并且与它们的 T-SQL 等价物不同，SQLCLR 模块获得其第一个安全限制并非通过授权，而是在其程序集被编录的同时进行。`CREATE\
  \ ASSEMBLY` 语句允许数据库管理员或开发人员指定三种安全与可靠性**权限集**之一，这些权限集决定了程序集中的代码被允许做什么。\n\n允许的权限集是\
  \ `SAFE`、`EXTERNAL_ACCESS` 和 `UNSAFE`。每个越来越宽松的级别都包含并扩展了较低权限集授予的权限。为 `SAFE` 程序集允许的受限权限集包括对数学和字符串函数的有限访问，以及通过上下文连接对宿主数据库的数据访问。`EXTERNAL_ACCESS`\
  \ 权限集增加了与 SQL Server 实例外部通信的能力，可连接到其他数据库服务器、文件服务器、Web 服务器等。而 `UNSAFE` 权限集赋予程序集几乎可以做任何事情的能力——包括运行非托管代码。\n\
  \n尽管表面上只是一个用户可控的设置，但在内部，每个权限集的实际权利实际上由两种不同的方法强制执行：\n\n-   分配给每个权限集的程序集通过 .NET 的**代码访问安全**（`Code\
  \ Access Security`，`CAS`）技术被*授予*执行某些操作的访问权限。\n-   同时，根据对一个名为 `HostProtectionAttribute`（`HPA`）的\
  \ .NET 3.5 属性的检查，某些操作的访问被*拒绝*。\n\n表面上看，`HPA` 和 `CAS` 的区别在于它们是对立面：`CAS` 权限规定了一个程序集可以做什么，而\
  \ `HPA` 权限规定了一个程序集不能做什么。`CAS` 授予的所有内容与 `HPA` 拒绝的所有内容的组合构成了三个权限集中的每一个。\n\n在这个基本区别之外，是这两种访问控制方法之间更重要的区分。尽管违反由任一方法强制执行的权限都会导致运行时异常，但实际的检查是在非常不同的时间进行的。`CAS`\
  \ 授权在代码执行期间通过堆栈遍历在运行时动态检查。另一方面，`HPA` 权限在即时编译时检查——就在调用被引用的方法*之前*。\n\n要观察这些差异如何影响代码运行方式，需要一些测试用例，这些将在以下部分描述。\n\
  \n## 安全异常\n\n首先，让我们看看 `CAS` 异常是如何工作的。创建一个包含以下 CLR 存储过程的新程序集：\n\n```\n[SqlProcedure]\n\
  public static void CAS_Exception()\n{\n    SqlContext.Pipe.Send(\"Starting...\"\
  );\n    using (FileStream fs = new FileStream(@\"c:\\b.txt\", FileMode.Open))\n\
  \    {\n        //Do nothing...\n    }\n    SqlContext.Pipe.Send(\"Finished...\"\
  );\n    return;\n}\n```\n\n将程序集编录为 `SAFE` 并执行该存储过程。这将导致以下输出：\n\n```\nStarting...\n\
  Msg 6522, Level 16, State 1, Procedure CAS_Exception, Line 0\nA .NET Framework error\
  \ occurred during execution of user-defined routine or aggregate \"CAS_Exception\"\
  :\nSystem.Security.SecurityException: Request for the permission of type 'System.Security.Permissions.FileIOPermission,\
  \ mscorlib, Version=2.0.0.0, ...\n```\n\n\n"
- "# SQLCLR：架构与设计注意事项\n\n## 安全异常示例\n\n`Culture=neutral, PublicKeyToken=b77a5c561934e089`\
  \ 失败。\n\n```\nSystem.Security.SecurityException:\n   at System.Security.CodeAccessSecurityEngine.Check(Object\
  \ demand,\n   StackCrawlMark& stackMark, Boolean isPermSet)\n   at System.Security.CodeAccessPermission.Demand()\n\
  \   at System.IO.FileStream.Init(String path, FileMode mode, FileAccess access,\
  \ Int32 rights, Boolean useRights, FileShare share, Int32 bufferSize, FileOptions\
  \ options, SECURITY_ATTRIBUTES secAttrs, String msgPath, Boolean bFromProxy)\n \
  \  at System.IO.FileStream..ctor(String path, FileMode mode)\n   at udf_part2.CAS_Exception()\n\
  ```\n\n此情况下引发的异常是 `SecurityException`，表明这是一个 CAS 违规（`FileIOPermission` 类型）。但发生的不仅是异常；注意输出的第一行是字符串\
  \ `\"Starting...\"`，这是由存储过程第一行使用的 `SqlPipe.Send` 方法输出的。因此在遇到异常之前，方法已被进入，代码执行成功，直到尝试实际的权限违规。\n\
  \n`注意` 文件 I/O 是访问资源（本地或其他）的一个好例子，在上下文连接中是不允许的。要使用 SQLCLR 安全桶避免此特定违规，需要使用 `EXTERNAL_ACCESS`\
  \ 权限对程序集进行编录。\n\n## 主机保护异常\n\n为了了解 HPA 异常的行为，让我们重复上一节中描述的相同实验，但使用以下存储过程（同样编录为 `SAFE`）：\n\
  \n```csharp\n[SqlProcedure]\npublic static void HPA_Exception()\n{\n    SqlContext.Pipe.Send(\"\
  Starting...\");\n    // 下一行将抛出 HPA 异常...\n    Monitor.Enter(SqlContext.Pipe);\n\
  \    // 释放锁（如果代码真的能执行到这里）...\n    Monitor.Exit(SqlContext.Pipe);\n    SqlContext.Pipe.Send(\"\
  Finished...\");\n    return;\n}\n```\n\n就像之前一样，发生了一个异常。但这次，输出有点不同：\n\n```\nMsg 6522,\
  \ Level 16, State 1, Procedure HPA_Exception, Line 0\nA .NET Framework error occurred\
  \ during execution of user-defined routine or aggregate \"HPA_Exception\":\nSystem.Security.HostProtectionException:\
  \ Attempted to perform an operation that was forbidden by the CLR host.\nThe protected\
  \ resources (only available with full trust) were: All\nThe demanded resources were:\
  \ Synchronization, ExternalThreading\nSystem.Security.HostProtectionException:\n\
  \   at System.Security.CodeAccessSecurityEngine.ThrowSecurityException(Assembly\
  \ asm, PermissionSet granted, PermissionSet refused, RuntimeMethodHandle rmh, SecurityAction\
  \ action, Object demand, IPermission permThatFailed)\n   at System.Security.CodeAccessSecurityEngine.ThrowSecurityException(Object\
  \ assemblyOrString, PermissionSet granted, PermissionSet refused, RuntimeMethodHandle\
  \ rmh, SecurityAction action, Object demand, IPermission permThatFailed)\n   at\
  \ System.Security.CodeAccessSecurityEngine.CheckSetHelper(PermissionSet grants,\
  \ PermissionSet refused, PermissionSet demands, RuntimeMethodHandle rmh, Object\
  \ assemblyOrString, SecurityAction action, Boolean throwException)\n   at System.Security.CodeAccessSecurityEngine.CheckSetHelper(CompressedStack\
  \ cs, PermissionSet grants, PermissionSet refused, PermissionSet demands, RuntimeMethodHandle\
  \ rmh, Assembly asm, SecurityAction action)\n   at udf_part2.HPA_Exception()\n```\n\
  \n与执行 `CAS_Exception` 存储过程时不同，这次我们没有看到 `\"Starting...\"` 消息，表明在遇到异常之前 `SqlPipe.Send`\
  \ 方法未被调用。事实上，在代码执行阶段 `HPA_Exception` 方法根本没有被进入（你可以通过尝试在函数内设置断点并在 Visual Studio 中启动调试会话来验证这一点）。断点无法命中的原因是权限检查已执行，并且在即时编译后立即抛出了异常。\n\
  \n你还应注意，异常的措辞与之前的情况不同。CAS 异常的措辞相当温和：“请求权限 ... 失败。”另一方面，HPA 异常带有更严厉的警告：“尝试执行被禁止的操作。”这种措辞上的差异并非偶然。CAS\
  \ 授权关注的是安全性——防止代码访问某些受保护的内容，因为它不应该拥有访问权限。而 HPA 权限关注的是服务器可靠性，并保持 CLR 主机平稳高效地运行。线程和同步被认为可能威胁可靠性，因此仅限于标记为\
  \ `UNSAFE` 的程序集。\n\n`注意` 使用 .NET 反编译器（例如 Red Gate Reflector, www.red-gate.com/products/reflector/），可以探索基类库以查看各种类和方法分配了哪些\
  \ HPA 属性。例如，`Monitor` 类被装饰了以下控制主机访问的属性：\n`[ComVisible(true), HostProtection(SecurityAction.LinkDemand,\
  \ Synchronization=true, ExternalThreading=true)]`。\n\n关于根据 CAS 和 HPA 模型允许什么和不允许什么的完整列表超出了本章的范围，但\
  \ Microsoft 有很好的文档记录。请参阅以下 MSDN 主题：\n- `主机保护属性与 CLR 集成编程` (http://msdn2.microsoft.com/en-us/library/ms403276.aspx)\n\
  - `CLR 集成代码访问安全性` (http://msdn2.microsoft.com/en-us/library/ms345101.aspx)\n\n###\
  \ 对代码安全性的追求\n\n你可能想知道，既然修复异常如此简单——只需将程序集的权限级别提高到 `EXTERNAL_ACCESS` 或 `UNSAFE`，并让代码访问它需要做的事情——为什么我还要介绍\
  \ SQLCLR 权限集的内部结构以及它们的异常有何不同。事实是，提高权限级别肯定会起作用，但这样做你可能是在规避安全策略，而不是与之合作以使你的系统更安全。\n\
  \n如前一节所述，代码访问权限是在程序集级别而不是方法或行级别授予的。因此，为了使某个模块工作而提高给定程序集的权限，实际上会影响该程序集中包含的许多不同模块，赋予它们所有增强的访问权限。在程序集内的多个模块上授予额外权限反过来会造成维护负担：如果你希望确保没有安全问题，你必须审查程序集中每个模块的每一行代码，以确保它没有做任何不应该做的事情——你不能再信任引擎为你进行检查。\n\
  \n你现在可能在想解决方案很简单：拆分你的方法，使每个方法都位于一个独立的程序集中，然后按那种方式授予权限。这样每个方法确实将拥有自己的权限集。但即使在那种情况下，权限可能仍然不够细化以避免代码审查的噩梦。考虑一个复杂的\
  \ 5000 行模块，它需要一个单一的文件 I/O 操作来从文本文件中读取一些行。通过给予整个模块 `EXTERNAL_ACCESS` 权限，它现在可以从该文件读取行。但当然，你仍然必须检查剩余的\
  \ 4999 行代码，以确保它们没有做任何未经授权的事情。\n\n\n"
- "# SQLCLR 架构与设计考量：通过程序集引用实现选择性权限提升\n\n## 手动代码审查的有效性疑问\n首先是对**手动代码审查有效性**的疑问。对于任何代码变更，每次都进行严格的审查是否足以确保代码不会引发问题？如果代码被标记为`SAFE`，引擎本应能检测到这些问题。此外，你真的*希望*每次任何变更部署前都必须进行严格审查吗？在接下来的部分，我将展示如何通过利用`SQLCLR`环境中的程序集依赖关系来消除许多此类问题。\n\
  \n## 通过程序集引用实现选择性权限提升\n在理想情况下，`SQLCLR`模块的权限可以像第 5 章描述的`T-SQL`模块权限那样工作：外部模块被授予尽可能少的权限，但能够为了执行某些需要更多访问权限的操作而选择性地、临时地提升其权限。这将显著减少特权暴露区域，这意味着对于构成给定系统大部分代码的外层（权限较低）模块层，进行严格安全审查的必要性会降低——引擎将确保它们的行为符合预期。\n\
  \n解决此问题的通用方案是根据权限需求将代码拆分到不同的程序集中，但不能忽视维护开销和重用性。\n\n例如，考虑上一节提到的需要从文本文件中读取几行的 5000\
  \ 行模块。可以授予整个模块足够高的权限来读取文件，也可以将读取文件的代码提取出来放到它自己的程序集中。这个外部程序集将暴露一个方法，该方法以文件名作为输入并返回一个行的集合。正如我将在后续章节中展示的，此解决方案可以让你将大部分代码编目为`SAFE`，同时仍然执行文件\
  \ I/O 操作。此外，未来需要从文本文件读取行的模块可以引用同一个程序集，因此不必重新实现此逻辑。\n\n可惜的是，封装过程并不像创建一个包含必要逻辑的新程序集并引用它那样简单。由于`CAS`（代码访问安全）和`HPA`（宿主保护属性）异常行为的差异，你可能需要进行一些代码分析，以便正确封装内部模块的权限。在接下来的部分中，我将分别介绍每种权限类型，以说明如何设计解决方案。\n\
  \n## 使用宿主保护权限\n一个相当常见的`SQLCLR`模式是创建可以被调用者共享的静态集合。然而，与任何共享数据集一样，如果需要在初始加载后更新部分数据，适当的同步是至关重要的。从`SQLCLR`的角度来看，这变得棘手，因为线程和同步需要`UNSAFE`访问权限——授予如此开放级别的权限并非小事。\n\
  \n考虑一个可能使用静态集合的场景示例：一个用于基于汇率计算货币转换的`SQLCLR`用户定义函数：\n\n```csharp\n[SqlFunction]\n\
  public static SqlDecimal GetConvertedAmount(\n    SqlDecimal InputAmount,\n    SqlString\
  \ InCurrency,\n    SqlString OutCurrency)\n{\n    //Convert the input amount to\
  \ the base\n    decimal BaseAmount =\n        GetRate(InCurrency.Value) *\n    \
  \    InputAmount.Value;\n    //Return the converted base amount\n    return (new\
  \ SqlDecimal(\n        GetRate(OutCurrency.Value) * BaseAmount));\n}\n```\n\n`GetConvertedAmount`方法内部使用了另一个方法`GetRate`：\n\
  \n```csharp\nprivate static decimal GetRate(string Currency)\n{\n    decimal theRate;\n\
  \    rwl.AcquireReaderLock(100);\n    try\n    {\n        theRate = rates[Currency];\n\
  \    }\n    finally\n    {\n        rwl.ReleaseLock();\n    }\n    return (theRate);\n\
  }\n```\n\n`GetRate`在`rates`（一个`Dictionary<string, decimal>`的静态泛型实例）中执行查找。此集合包含系统中给定货币的汇率。为了防止另一个线程恰好正在更新`rates`时会发生的问题，同步是使用`rwl`（一个`ReaderWriterLock`的静态实例）来处理的。字典和`ReaderWriterLock`都在类的方法首次被调用时实例化，并且都被标记为`readonly`，以避免在实例化后被覆盖：\n\
  \n```csharp\nstatic readonly Dictionary<string, decimal>\n    rates = new Dictionary<string,\
  \ decimal>();\nstatic readonly ReaderWriterLock\n    rwl = new ReaderWriterLock();\n\
  ```\n\n如果使用`SAFE`或`EXTERNAL_ACCESS`权限集进行编目，此代码会因使用同步机制（`ReaderWriterLock`）而失败，运行它会产生`HostProtectionException`。解决方案是将受影响的代码移动到它自己的程序集中，并编目为`UNSAFE`。因为宿主保护检查是在程序集中方法即时编译时评估的，而不是在方法运行动态进行的，检查是在跨越程序集边界时完成的。这意味着外部方法可以被标记为`SAFE`，并通过调用`UNSAFE`核心来临时提升其权限。\n\
  \n> **注意**：你可能会对这个示例的有效性产生疑问，因为使用纯`T-SQL`可以轻松实现此系统，从而彻底消除权限问题。我确实认为这是一个现实的例子，特别是如果系统需要在任何给定日期进行大量货币转换。`SQLCLR`代码即使对于简单的数学工作通常也优于`T-SQL`，并且将数据缓存在共享集合中而不是每次调用都从数据库读取，是一个巨大的效率提升。我确信这个解决方案会轻松优于任何纯`T-SQL`等效方案。\n\
  \n在设计`UNSAFE`程序集时，从重用的角度仔细分析应该公开哪些功能是很重要的。在此情况下，导致问题的并不是字典的使用——抛出实际异常的是通过`ReaderWriterLock`的同步。然而，仅仅围绕`ReaderWriterLock`包装一个方法可能不会促进太多重用。我认为更好的策略是将`Dictionary`和`ReaderWriterLock`包装在一起，创建一个新的`ThreadSafeDictionary`类。这个类可以在任何需要共享数据缓存的场景中使用。\n\
  \n以下是我的`ThreadSafeDictionary`实现；我没有实现泛型`Dictionary`类公开的所有方法，而只实现了我常用的那些——即`Add`、`Remove`和`ContainsKey`：\n\
  \n```csharp\nusing System;\nusing System.Collections.Generic;\nusing System.Text;\n\
  using System.Threading;\n\nnamespace SafeDictionary\n{\n    public class ThreadSafeDictionary<K,\
  \ V>\n    {\n        private readonly Dictionary<K, V> dict = new Dictionary<K,V>();\n\
  \        private readonly ReaderWriterLock theLock = new ReaderWriterLock();\n\n\
  \        public void Add(K key, V value)\n        {\n            theLock.AcquireWriterLock(2000);\n\
  \            try\n            {\n                dict.Add(key, value);\n       \
  \     }\n            finally\n            {\n                theLock.ReleaseLock();\n\
  \            }\n        }\n\n        public V this[K key]\n        {\n         \
  \   get\n            {\n                theLock.AcquireReaderLock(2000);\n     \
  \           try\n                {\n                    return (this.dict[key]);\n\
  \                }\n                finally\n                {\n               \
  \     theLock.ReleaseLock();\n                }\n            }\n            set\n\
  \            {\n                theLock.AcquireWriterLock(2000);\n             \
  \   try\n                {\n                    dict[key] = value;\n           \
  \     }\n                finally\n                {\n                    theLock.ReleaseLock();\n\
  \                }\n            }\n        }\n\n        public bool Remove(K key)\n\
  \        {\n            theLock.AcquireWriterLock(2000);\n            try\n    \
  \        {\n                return (dict.Remove(key));\n            }\n        \
  \    finally\n            {\n                theLock.ReleaseLock();\n          \
  \  }\n        }\n\n        public bool ContainsKey(K key)\n        {\n         \
  \   theLock.AcquireReaderLock(2000);\n            try\n            {\n         \
  \       return (dict.ContainsKey(key));\n            }\n            finally\n  \
  \          {\n                theLock.ReleaseLock();\n            }\n        }\n\
  \    }\n}\n```\n\n\n"
- "# SQLCLR：架构与设计考量\n\n## 注意\n\n根据你的数据库是否启用了 `TRUSTWORTHY` 选项，以及你的程序集是否进行了强命名，情况可能并不像我在此暗示的那么简单。如果核心程序集没有正确的权限，本节及下一节中的示例可能会在部署时失败；或者如果你选择使用强命名程序集，也可能在运行时失败。有关更多信息，请参阅本章后面的“授予跨程序集权限”一节。与此同时，如果你正在跟着操作，请在一个启用了\
  \ `TRUSTWORTHY` 选项的数据库中工作，并暂时不要进行强命名。\n\n## 使用代码访问安全性权限\n\n受 HPA 保护的资源非常容易封装，因为给定方法的权限是在方法即时编译时检查的。唉，在处理受\
  \ CAS 保护的资源时，事情就没那么简单了，因为授权是在运行时通过栈遍历动态检查的。这意味着仅仅引用第二个程序集是不够的——每次都会遍历整个栈，而不考虑程序集边界。\n\
  \n为了说明这个问题，请创建一个包含以下方法的新程序集，该方法读取文本文件的所有行并将其作为字符串集合返回：\n\n```csharp\npublic static\
  \ string[] ReadFileLines(string FilePath)\n{\n    List<string> theLines = new List<string>();\n\
  \    using (System.IO.StreamReader sr =\n        new System.IO.StreamReader(FilePath))\n\
  \    {\n        string line;\n        while ((line = sr.ReadLine()) != null)\n \
  \           theLines.Add(line);\n    }\n    return (theLines.ToArray());\n}\n```\n\
  \n将此程序集在 SQL Server 中编目，权限集设为 `EXTERNAL_ACCESS`。现在让我们重新审视本章前面创建的 `CAS_Exception`\
  \ 存储过程，它包含在一个 `SAFE` 程序集中，当用于访问本地文件资源时会抛出异常。编辑 `CAS_Exception` 程序集以包含对包含 `ReadFileLines`\
  \ 方法的程序集的引用，并按如下方式修改存储过程：\n\n```csharp\n[SqlProcedure]\npublic static void CAS_Exception()\n\
  {\n    SqlContext.Pipe.Send(\"Starting...\");\n    string[] theLines =\n       \
  \ FileLines.ReadFileLines(@\"C:\\b.txt\");\n    SqlContext.Pipe.Send(\"Finished...\"\
  );\n    return;\n}\n```\n\n请注意，我将 `ReadFileLines` 方法创建在名为 `FileLines` 的类中；请根据你使用的类名适当引用你的方法。修改完成后，重新部署外部程序集，并确保它被编目为\
  \ `SAFE`。\n\n运行此存储过程的修改版本，你会发现即使跨越了程序集边界，你仍然会收到与之前相同的异常。CAS 授权并没有因为引用了更高权限的程序集而改变，这是因为栈遍历不考虑被引用程序集所持有的权限。\n\
  \n要解决此问题，需要在被引用的程序集中控制栈遍历。\n\n由于该程序集有足够的权限执行文件操作，它可以在内部要求栈遍历停止检查文件 I/O 权限，即使从另一个没有相应权限的程序集中调用也是如此。这是通过使用\
  \ .NET 的 `System.Security` 命名空间中公开的 `IStackWalk` 接口的 `Assert` 方法来完成的。\n\n再次查看前面显示的\
  \ CAS 违规，注意所需的权限是 `FileIOPermission`，它位于 `System.Security.Permissions` 命名空间中。`FileIOPermission`\
  \ 类——连同该命名空间中的其他“权限”类——实现了 `IStackWalk` 接口。为避免 CAS 异常，只需实例化 `FileIOPermission` 类的一个实例并调用\
  \ `Assert` 方法。以下代码是使用此技术的 `ReadFileLines` 方法的修改版本：\n\n```csharp\npublic static string[]\
  \ ReadFileLines(string FilePath)\n{\n    //Assert that anything File IO-related\
  \ that this\n    //assembly has permission to do, callers can do\n    FileIOPermission\
  \ fp = new FileIOPermission(\n        PermissionState.Unrestricted);\n    fp.Assert();\n\
  \n    List<string> theLines = new List<string>();\n    using (System.IO.StreamReader\
  \ sr =\n        new System.IO.StreamReader(FilePath))\n    {\n        string line;\n\
  \        while ((line = sr.ReadLine()) != null)\n            theLines.Add(line);\n\
  \    }\n    return (theLines.ToArray());\n}\n```\n\n此版本的方法使用 `PermissionState.Unrestricted`\
  \ 枚举实例化了 `FileIOPermission` 类，从而使所有调用者能够执行该程序集有权执行的任何文件 I/O 相关活动。在此上下文中使用术语“无限制”并不像听起来那么危险；访问是无限制的，其含义是权限只允许调用者访问该程序集本身已拥有的文件系统访问级别。在此处进行修改并重新部署两个程序集后，CAS\
  \ 异常将不再是问题。\n\n为了让你能在更细的粒度上控制，`FileIOPermission` 类公开了其他具有不同选项的构造函数重载。对于本示例最有用的一个是使用名为\
  \ `FileIOPermissionAccess` 的枚举结合文件路径，允许你将授予调用者的权限限制为仅对指定文件的特定操作。例如，要限制访问，使调用者只能读取本示例中指定的文件，请使用以下构造函数：\n\
  \n```csharp\nFileIOPermission fp = new FileIOPermission(\n    FileIOPermissionAccess.Read,\n\
  \    \"C:\\b.txt\");\n```\n\n文件 I/O 只是你可能遇到 CAS 异常的多种权限之一。重要的是能够识别这个模式。在所有情况下，违规都会抛出\
  \ `SecurityException`，并引用 `System.Security.Permissions` 命名空间中的一个权限类。\n\n每个类都遵循这里概述的相同基本模式，因此你应该能够轻松使用此技术来设计任意数量的权限提升解决方案。\n\
  \n### 授予跨程序集权限\n\n前面章节中的示例进行了一些简化，以便一次将重点集中在一个问题上。在处理跨程序集调用时，还有另外两个问题需要关注：数据库可信度和强命名。\n\
  \n### 数据库可信度\n\n“可信”数据库的概念是微软近年来对安全问题认识提高的直接产物。将数据库标记为可信只需使用 `ALTER DATABASE` 设置一个选项即可：\n\
  \n\n"
- "# 第 7 章 SQLCLR：架构与设计考虑\n\n`ALTER DATABASE AdventureWorks2008`\n\n`SET TRUSTWORTHY\
  \ ON;`\n\n`GO`\n\n遗憾的是，尽管启用此选项的操作很简单，但其带来的影响却远非如此。\n\n本质上，这意味着在可信数据库上下文中运行的代码，比在未标记为可信的数据库中运行的代码，能更轻松地访问数据库外部的资源。这包括访问文件系统、远程数据库服务器，甚至同一服务器上的其他数据库——所有这些访问都受控于这一个选项，因此请务必谨慎。\n\
  \n关闭 `TRUSTWORTHY` 选项意味着恶意代码将更难访问数据库外部的资源，但这也意味着，作为开发人员，你将不得不花费更多时间处理安全问题。话虽如此，我强烈建议除非有非常充分的理由，否则应保持\
  \ `TRUSTWORTHY` 选项处于关闭状态。在非可信数据库中处理访问控制并非难事；应采用第 5 章讨论的模块签名技术，这样访问控制权就完全掌握在你手中，而不应获得特定资源访问权限的代码也就无法轻易得逞。\n\
  \n在 SQLCLR 环境中，如果你在非可信数据库中注册一个使用 `EXTERNAL_ACCESS` 或 `UNSAFE` 权限集引用了另一个程序集的程序集，将会看到部署时异常。\n\
  \n以下是我尝试注册包含 `GetConvertedAmount` 方法的程序集时遇到的异常（在此前，我已将数据库设置为非可信模式）：\n\n```\nCREATE\
  \ ASSEMBLY for assembly 'CurrencyConversion' failed because\nassembly 'SafeDictionary'\
  \ is not authorized for PERMISSION_SET = UNSAFE.\nThe assembly is authorized when\
  \ either of the following is true: the database\nowner (DBO) has UNSAFE ASSEMBLY\
  \ permission and the database has the TRUSTWORTHY\ndatabase property on; or the\
  \ assembly is signed with a certificate or an asymmetric\nkey that has a corresponding\
  \ login with UNSAFE ASSEMBLY permission.\nIf you have restored or attached this\
  \ database, make sure the database owner is\nmapped to the correct login on this\
  \ server. If not, use sp_changedbowner to fix\nthe problem.\n```\n\n这段相当详细的异常信息实属难得，值得珍视：它确切地描述了如何解决问题！遵循第\
  \ 5 章描述的流程，你可以使用证书来授予 `UNSAFE ASSEMBLY` 权限。首先，在 `master` 数据库中创建一个证书和对应的登录名，并授予该登录名\
  \ `UNSAFE ASSEMBLY` 权限：\n\n```\nUSE master;\nGO\nCREATE CERTIFICATE Assembly_Permissions_Certificate\n\
  ENCRYPTION BY PASSWORD = 'uSe_a STr()nG PaSSW0rD!'\nWITH SUBJECT = 'Certificate\
  \ used to grant assembly permission';\nGO\nCREATE LOGIN Assembly_Permissions_Login\n\
  FROM CERTIFICATE Assembly_Permissions_Certificate;\nGO\nGRANT UNSAFE ASSEMBLY TO\
  \ Assembly_Permissions_Login;\nGO\n```\n\n接下来，将证书备份到文件：\n\n```\nBACKUP CERTIFICATE\
  \ Assembly_Permissions_Certificate\nTO FILE = 'C:\\assembly_permissions.cer'\nWITH\
  \ PRIVATE KEY\n(\n    FILE = 'C:\\assembly_permissions.pvk',\n    ENCRYPTION BY\
  \ PASSWORD = 'is?tHiS_a_VeRySTronGP4ssWoR|)?',\n    DECRYPTION BY PASSWORD = 'uSe_a\
  \ STr()nG PaSSW0rD!'\n);\nGO\n```\n\n现在，在你正在工作的数据库中（我的例子中是 `AdventureWorks2008`）恢复证书并基于它创建一个本地数据库用户：\n\
  \n```\nUSE AdventureWorks2008;\nGO\nCREATE CERTIFICATE Assembly_Permissions_Certificate\n\
  FROM FILE = 'C:\\assembly_permissions.cer'\nWITH PRIVATE KEY\n(\n    FILE = 'C:\\\
  assembly_permissions.pvk',\n    DECRYPTION BY PASSWORD = 'is?tHiS_a_VeRySTronGP4ssWoR|)?',\n\
  \    ENCRYPTION BY PASSWORD = 'uSe_a STr()nG PaSSW0rD!'\n);\nGO\nCREATE USER Assembly_Permissions_User\n\
  FOR CERTIFICATE Assembly_Permissions_Certificate;\nGO\n```\n\n最后，用证书对程序集进行签名，从而授予访问权限并允许引用该程序集：\n\
  \n```\nADD SIGNATURE TO ASSEMBLY::SafeDictionary\nBY CERTIFICATE Assembly_Permissions_Certificate\n\
  WITH PASSWORD='uSe_a STr()nG PaSSW0rD!';\nGO\n```\n\n\n### 强命名\n\n你可能遇到的另一个问题与强命名程序集有关。强命名是一项\
  \ .NET 安全特性，允许你对程序集进行数字签名，分配版本号，并向用户确保其有效性。对于大多数 SQLCLR 代码来说，强命名可能有些过度——在安全、受管理的数据库中运行的代码可能不需要强命名提供的额外保证。然而，对于考虑分发包含\
  \ SQLCLR 组件的应用程序的供应商来说，他们绝对会希望研究强命名。\n\n在对包含 `ReadFileLines` 方法的程序集进行签名，并重新部署它和包含\
  \ `CAS_Exception` 存储过程的程序集之后，当我调用该过程时，我收到了以下错误：\n\n```\nMsg 6522, Level 16, State\
  \ 1, Procedure CAS_Exception, Line 0\nA .NET Framework error occurred during execution\
  \ of user-defined routine or\naggregate \"CAS_Exception\":\nSystem.Security.SecurityException:\
  \ That assembly does not allow partially trusted\ncallers.\nSystem.Security.SecurityException:\n\
  at System.Security.CodeAccessSecurityEngine.ThrowSecurityException(Assembly asm,\n\
  PermissionSet granted, PermissionSet refused, RuntimeMethodHandle rmh,\nSecurityAction\
  \ action, Object demand, IPermission permThatFailed)\nat udf_part2.CAS_Exception()\n\
  .\n```\n\n解决方案是在代码中添加一个 `AllowPartiallyTrustedCallersAttribute`（在文章中常简称为 APTCA）。这个特性应该被添加到程序集中的一个单独文件中，位于\
  \ `using` 声明之后，在任何类或命名空间定义之前。在 `FileLines` 程序集的例子中，添加该特性后的文件如下所示：\n\n```\nusing\
  \ System;\nusing System.Data;\nusing System.Data.SqlClient;\nusing System.Data.SqlTypes;\n\
  using Microsoft.SqlServer.Server;\nusing System.Collections.Generic;\nusing System.Security.Permissions;\n\
  \n[assembly: System.Security.AllowPartiallyTrustedCallers]\n\npublic partial class\
  \ FileLines\n{\n```\n\n一旦添加了这个特性，任何调用者都可以使用 `FileLines` 类中的方法，而不会收到异常。请记住，指定此特性是有原因的，使用它你可能允许调用者绕过安全检查。如果程序集执行的操作不应被所有用户访问，请确保实施其他安全措施，例如创建具有不同所有者的程序集组，以确保非组内程序集无法引用敏感方法。\n\
  \n"
- '# 性能比较：SQLCLR 与 TSQL


  讨论了实现基于 SQLCLR 的解决方案背后的一些安全和架构考虑后，你可能想知道哪些情况实际上可以从使用 SQLCLR 中受益。


  重要的是要认识到，SQLCLR 不是，也从来无意成为 T-SQL 的替代品作为 SQL Server 中的数据操作语言。为了从数据库读取数据以及执行大多数标准数据操作，T-SQL
  是唯一的选择。此外，虽然我强调了创建易于在各层之间移动和共享的可移植代码的重要性，但你不应尝试使用 SQLCLR 将本应属于应用程序的逻辑移入数据库。虽然允许在层之间进行代码重用可能有好处，但请记住，数据库服务器通常是成本最高的扩展层，因此将过多逻辑移入数据库是对宝贵数据库资源的低效使用，而这些资源本可以由一个便宜得多的应用程序服务器来提供。关于数据和应用逻辑正确放置位置的进一步讨论，请回顾第
  1 章。


  以下是一些常被提及的、SQLCLR 可能是比 TSQL 更好选择的情况。



  '
- '# 第 7 章 SQLCLR：架构与设计考量


  包括字符串或 XML 数据的操作、.NET 基类库中专用方法提供的某些数学函数，以及过程式代码比基于集合的逻辑更高效的情况。为了验证这些说法的有效性，我决定设置一些简单的测试用例来比较
  T-SQL 与 SQLCLR 的相对性能，这些测试将在以下各节中描述。


  ## 创建一个用于素数的“简单筛子”


  在这个测试中，我创建了两个简单的存储过程，用于返回直到提供最大值的所有素数列表——一个用 T-SQL 实现，另一个用 SQLCLR 实现。这些测试的逻辑尽可能简化：每个过程都被提供一个最大值，该值在一个循环中递减，在循环的每次迭代中，使用模运算运算符计算该值除以每个较小数字的余数。如果除法的余数为
  0（换句话说，我们找到了一个因子），我们就知道当前值不是素数。因此，循环继续测试下一个可能的值。如果内部循环测试了所有可能的除数并且没有找到任何因子，那么我们就知道这个值一定是素数。使用这种“简单筛子”算法来寻找素数依赖于基本的数学函数和过程式逻辑，这使其成为比较
  T-SQL 和 SQLCLR 性能的一个良好测试。以下是 T-SQL 的实现：


  ```

  CREATE PROCEDURE ListPrimesTSQL (


  @Limit int


  )


  AS BEGIN


  DECLARE


  -- @n 是我们要测试是否为素数的数字


  @n int = @Limit,


  --@m 是所有可能作为 @n 因子的数字


  @m int = @Limit - 1;


  -- 循环递减测试候选素数


  WHILE (@n > 1)


  BEGIN


  -- 循环递减测试候选因子


  WHILE (@m > 0)


  BEGIN


  -- 我们已经测试到 2，并且没有找到任何因子


  IF(@m = 1)


  BEGIN


  PRINT CAST(@n AS varchar(32)) + '' 是一个素数''


  BREAK;


  END


  -- 这个 @m 是这个素数的因子吗？


  IF(@n%@m) <> 0


  BEGIN


  -- 不是因子，所以继续下一个 @m


  SET @m = @m - 1;


  CONTINUE;


  END


  CHAPTER 7 „ SQLCLR: 架构与设计考量


  ELSE BREAK;


  END


  SET @n = @n-1;


  SET @m = @n-1;


  END


  END;

  ```


  以下是使用完全相同逻辑的 SQLCLR 实现：


  ```

  [SqlProcedure]


  public static void ListPrimesCLR(SqlInt32 Limit)


  {


  int n = (int)Limit;


  int m = (int)Limit - 1;


  while(n > 1)


  {


  while(m > 0)


  {


  if(m == 1)


  {


  SqlContext.Pipe.Send(n.ToString() + " 是一个素数");


  }


  if(n%m != 0)


  {


  m = m - 1;


  continue;


  }


  else


  {


  break;


  }


  }


  n = n - 1;


  m = n - 1;


  }


  }

  ```


  `注意` 显然，如果你真的想要获取素数列表，你绝不会使用如此简单（天真的）方法。这里使用的例子旨在提供一个可以在 T-SQL 和 SQLCLR 中一致实现的简单过程。


  我对每个解决方案进行了多次测试，为循环起始的最大限制值提供了不同的数值。每个解决方案的平均执行时间如图 7-1 所示。


  *图 7-1. T-SQL 与 SQLCLR 实现的素数筛对比*


  结果应该不足为奇——由于所采用的方法依赖于迭代循环中的数学操作，SQLCLR 几乎总是比基于集合的 T-SQL 表现更优。然而，你可能会对两者之间差异的幅度感到惊讶，尤其是随着迭代次数的增加。如果我们比较简单的内联或非过程式计算，那么这两种方法之间可能不会有如此鲜明的对比。


  ### 计算运行聚合


  很少有实际的数据库应用程序需要生成素数列表——一个更常见的可能受益于使用 SQLCLR 的数学查询操作类型是，当你需要根据前几行数据的值计算当前行中的值时。这种线性查询最常见的例子是在计算聚合时，例如列的运行总和。




  '
- "# 使用 T-SQL 的典型方法\n\n使用 T-SQL 的典型方法是利用表的自连接，如下所示：\n\n```sql\nSELECT\n    T1.x,\n\
  \    SUM(T2.x) AS running_x\nFROM\n    T AS T1 INNER JOIN T AS T2\n    ON T1.x >=\
  \ T2.x\nGROUP BY\n    T1.x;\n```\n\n"
- "# 第 7 章：SQLCLR：架构与设计考量\n\n不幸的是，满足此查询所需的过程效率并不高。假设表的 `x` 列上存在索引，上述查询会生成如图 7-2 所示的执行计划。\n\
  \n**图 7-2. 在 T-SQL 中用于创建累计和的嵌套索引查找**\n\n要累加列中所有先前的值，需要一个包含索引查找的嵌套循环。随着处理的行数增加，此查找返回的行数呈指数级增长。在处理第一行时，此查找只需累加一个值，但要计算\
  \ 100 行数据的累计和，则需要总共读取 5,050 行。对于 200 行的数据集，查询处理器需要处理 20,100 行——这是满足前一个查询所需工作量的四倍。因此，随着表中行数的增加，这种计算累计聚合的方法性能会迅速下降。\n\
  \n一个能带来显著性能提升的替代方案是使用游标。在 SQL Server 开发界普遍存在一种看法，认为游标是糟糕的东西，但它们确实有其合理的用例，而此场景可能就是其中之一。然而，有许多充分的理由让许多开发人员不愿意使用游标，当然，我也并非在一般情况下提倡使用它们。\n\
  \n更好的方法是使用 SQLCLR 循环遍历并使用局部变量存储累计值，然后通过 `SqlPipe` 逐行流式传输结果。以下代码清单给出了这样一个解决方案的示例：\n\
  \n```csharp\n[Microsoft.SqlServer.Server.SqlProcedure]\npublic static void RunningSum()\n\
  {\n    using (SqlConnection conn = new SqlConnection(\"context connection=true;\"\
  ))\n    {\n        SqlCommand comm = new SqlCommand();\n        comm.Connection\
  \ = conn;\n        comm.CommandText = \"SELECT x FROM T ORDER BY x\";\n        \n\
  \        SqlMetaData[] columns = new SqlMetaData[2];\n        columns[0] = new SqlMetaData(\"\
  Value\", SqlDbType.Int);\n        columns[1] = new SqlMetaData(\"RunningSum\", SqlDbType.Int);\n\
  \        \n        int RunningSum = 0;\n        SqlDataRecord record = new SqlDataRecord(columns);\n\
  \        \n        SqlContext.Pipe.SendResultsStart(record);\n        \n       \
  \ conn.Open();\n        SqlDataReader reader = comm.ExecuteReader();\n        \n\
  \        while (reader.Read())\n        {\n            int Value = (int)reader[0];\n\
  \            RunningSum += Value;\n            \n            record.SetInt32(0,\
  \ (int)reader[0]);\n            record.SetInt32(1, RunningSum);\n            \n\
  \            SqlContext.Pipe.SendResultsRow(record);\n        }\n        \n    \
  \    SqlContext.Pipe.SendResultsEnd();\n    }\n}\n```\n\n我曾在多个场合使用此解决方案，发现它非常高效且易于维护，并且避免了像其他替代方案那样需要使用任何\
  \ `temp` 表来存储累计和。在针对包含 100,000 行的表进行测试时，SQLCLR 查询的平均执行时间为 2.7 秒，而等效的 T-SQL 查询则需要超过\
  \ 5 *分钟*。\n\n### 字符串操作\n\n为了比较 T-SQL 和 SQLCLR 之间字符串处理函数的性能，我想设计一个公平、实用的测试。问题在于，处理字符串数据有大量巧妙的技术：在\
  \ T-SQL 中，一些性能最佳的方法使用一个或多个公共表表达式 (`CTEs`)、`CROSS APPLY` 运算符或数字表；或者将文本字符串转换为 `XML`\
  \ 以执行复杂的字符数据操作。同样，在 SQLCLR 中，可用的技术差异很大，具体取决于您使用的是原生的 `String` 方法还是 `StringBuilder`\
  \ 类提供的方法。\n\n我决定，与其尝试定义一个需要特定字符串处理技术的场景，唯一公平的测试是直接比较两种环境中提供等效功能的两个内置方法。我决定选用 T-SQL\
  \ 的 `CHARINDEX` 和 .NET 的 `String.IndexOf()`，它们都在一个字符串中搜索并返回另一个字符串的位置。为了测试的目的，我创建了不同长度的\
  \ `nvarchar(max)` 字符串，每个字符串完全由重复的字符 `a` 组成。然后，我在每个字符串的末尾附加一个字符 `x`，并计时测量相应方法在 10,000\
  \ 次迭代中找到该字符位置的性能。\n\n**图 7-3. 比较 CHARINDEX 与 String.IndexOf() 的性能**\n\n以下代码清单展示了\
  \ T-SQL 方法：\n\n```sql\nCREATE PROCEDURE SearchCharTSQL\n(\n    @needle nchar(1),\n\
  \    @haystack nvarchar(max)\n)\nAS BEGIN\n    PRINT CHARINDEX(@needle, @haystack);\n\
  END;\n```\n\n而这是 CLR 等效方法：\n\n```csharp\n[SqlProcedure]\npublic static void SearchCharCLR(SqlString\
  \ needle, SqlString haystack)\n{\n    SqlContext.Pipe.Send(\n        haystack.ToString().IndexOf(needle.ToString()).ToString()\n\
  \    );\n}\n```\n\n请注意，`CHARINDEX` 的起始位置是基于 1 的，而 `IndexOf()` 使用的索引编号是基于 0 的。因此，每个方法的结果会不同，但它们获得该结果所完成的工作量是相同的。我对每个存储过程进行了如下测试，通过为\
  \ `REPLICATE` 方法替换不同的参数值来更改要搜索的字符串长度：\n\n```sql\nDECLARE @needle nvarchar(1) = 'x';\n\
  DECLARE @haystack nvarchar(max);\n\nSELECT @haystack = REPLICATE(CAST('a' AS varchar(max)),\
  \ 8000) + 'x';\n\nEXEC dbo.SearchCharTSQL @needle, @haystack;\n```\n\n与前面给出的质数筛示例类似，字符串搜索、匹配和替换所需的逻辑最适合由\
  \ .NET 基础类库提供的高效例程来处理。如果您当前的代码逻辑严重依赖于 T-SQL 字符串功能，包括 `CHARINDEX`、`PATINDEX` 或 `REPLACE`，我强烈建议您研究一下通过\
  \ SQLCLR 可用的替代选项——您可能会对所获得的性能提升感到惊讶。\n\n## 使用 SQLCLR 增强 Service Broker 横向扩展能力\n\n\
  在讨论了使用 SQLCLR 背后的一些理论并给出了一些孤立的性能比较之后，现在让我们将注意力转向一个更详细的、将这些想法付诸实践的例子。Service Broker\
  \ 经常被提及为帮助横向扩展数据库服务的绝佳选择。其中一个更引人注目的用例是 Service Broker 服务，可用于异步地从远程系统请求数据。在这种情况下，请求消息将从本地存储过程发送到远程数据服务，该存储过程在等待响应（即请求的数据）返回的同时可以执行其他工作。\n\
  \n构建这样一个系统的方法有很多，并且考虑到 Service Broker 允许以二进制或 `XML` 格式发送消息，我想知道哪种方式能提供最佳的整体性能以及从代码复用角度看最有价值。在接下来的章节中，我将引导您了解我对使用\
  \ SQLCLR 进行 `XML` 和二进制序列化的研究。\n\n### XML 序列化\n\n我开始使用 `AdventureWorks2008` 数据库中的\
  \ `HumanResources.Employee` 表作为示例数据集，想象一个远程数据服务请求员工列表及其属性。经过一些实验，我确定 `FOR XML RAW`\
  \ 选项是将表序列化为 `XML` 格式的最简单方法，并且我使用 `ROOT` 选项使 `XML` 有效：\n\n```sql\nDECLARE @x xml;\n\
  \nSET @x = (\n    SELECT *\n    FROM HumanResources.Employee\n    FOR XML RAW, ROOT('Employees')\n\
  );\nGO\n```\n\n众所周知，`XML` 是一种极其冗长的数据交换格式，而我并未\n\n\n\n\n"
- "# 第七章 SQLCLR：架构与设计考量\n\n## XML 序列化问题\n\n我对结果 XML 的数据大小达到 105KB 感到惊讶，尽管 `HumanResources.Employee`\
  \ 表本身只有 56KB 的数据。我尝试设置更短的列名，但这对大小影响甚微，并且造成了我认为难以维护的代码。\n\n接下来，我设置了一个跟踪（trace）来收集\
  \ XML 序列化性能的一些概念（关于跟踪的更多信息，请参阅第三章）。跟踪结果显示，在我的系统上，前述查询的平均执行时间（在 1,000 次迭代中平均）为相当不令人满意的\
  \ 3.9095 秒每次迭代。\n\n经过一些试错，我发现通过使用 `TYPE` 指令可以提高 XML 序列化的性能，如下所示：\n\n```sql\nDECLARE\
  \ @x xml;\n\nSET @x = (\n    SELECT *\n    FROM HumanResources.Employee\n    FOR\
  \ XML RAW, ROOT('Employees'), TYPE\n);\nGO\n```\n\n这一改动将每次迭代的平均时间略微降低到 3.6687 秒——有所改进，但仍不是一个很好的结果。\n\
  \n### XML 反序列化\n\n尽管 XML 序列化没有产生令人印象深刻的性能，我还是决定继续测试反序列化。第一个问题是从 XML 反序列化回表所需的代码。为了还原出我开始时完全相同的表，我必须为结果集显式定义每一列；这使得代码比我预期的要复杂得多。此外，由于\
  \ `XQuery` `value` 语法不支持 `hierarchyid` 数据类型，`OrganizationNode` 列中的值必须作为 `nvarchar`\
  \ 读取，然后 `CAST` 为 `hierarchyid`。生成的代码如下：\n\n```sql\nDECLARE @x xml;\n\nSET @x = (\n\
  \    SELECT *\n    FROM HumanResources.Employee\n    FOR XML RAW, ROOT('Employees'),\
  \ TYPE\n);\n\nSELECT\n    col.value('@BusinessEntityID', 'int') AS BusinessEntityID,\n\
  \    col.value('@NationalIDNumber', 'nvarchar(15)') AS NationalIDNumber,\n    col.value('@LoginID',\
  \ 'nvarchar(256)') AS LoginID,\n    CAST(col.value('@OrganizationNode', 'nvarchar(256)')\
  \ AS hierarchyid) AS OrganizationNode,\n    col.value('@JobTitle', 'nvarchar(50)')\
  \ AS JobTitle,\n    col.value('@BirthDate', 'datetime') AS BirthDate,\n    col.value('@MaritalStatus',\
  \ 'nchar(1)') AS MaritalStatus,\n    col.value('@Gender', 'nchar(1)') AS Gender,\n\
  \    col.value('@HireDate', 'datetime') AS HireDate,\n    col.value('@SalariedFlag',\
  \ 'bit') AS SalariedFlag,\n    col.value('@VacationHours', 'smallint') AS VacationHours,\n\
  \    col.value('@SickLeaveHours', 'smallint') AS SickLeaveHours,\n    col.value('@CurrentFlag',\
  \ 'bit') AS CurrentFlag,\n    col.value('@rowguid', 'uniqueidentifier') AS rowguid,\n\
  \    col.value('@ModifiedDate', 'datetime') AS ModifiedDate\nFROM @x.nodes('/Employees/row')\
  \ x (col);\nGO\n```\n\n下一个问题是性能。当我测试使用前面的查询反序列化 `XML` 时，性能从差劲变成了极其糟糕——平均每次迭代需要 6.8157\
  \ 秒。\n\n此时，我决定研究用于解决该问题的 `SQLCLR` 选项，重点关注重用潜力和性能。\n\n### 使用 SQLCLR 进行二进制序列化\n\n\
  我的第一个想法是返回二进制序列化的 `DataTable`；为了实现这一点，我需要一种从 `CLR` 例程返回二进制格式数据的方法。这当然需要 .NET 的 `BinaryFormatter`\
  \ 类，因此我创建了一个名为 `serialization_helper` 的类，该类在 `EXTERNAL_ACCESS` 程序集中编录（这是 `System.IO`\
  \ 访问所必需的）：\n\n```csharp\nusing System;\nusing System.Data;\nusing System.Data.SqlClient;\n\
  using System.Data.SqlTypes;\nusing Microsoft.SqlServer.Server;\nusing System.Security.Permissions;\n\
  using System.Runtime.Serialization.Formatters.Binary;\n\npublic partial class serialization_helper\n\
  {\n    public static byte[] getBytes(object o)\n    {\n        SecurityPermission\
  \ sp =\n            new SecurityPermission(\n                SecurityPermissionFlag.SerializationFormatter);\n\
  \        sp.Assert();\n        BinaryFormatter bf = new BinaryFormatter();\n   \
  \     using (System.IO.MemoryStream ms =\n            new System.IO.MemoryStream())\n\
  \        {\n            bf.Serialize(ms, o);\n            return(ms.ToArray());\n\
  \        }\n    }\n\n    public static object getObject(byte[] theBytes)\n    {\n\
  \        using (System.IO.MemoryStream ms =\n            new System.IO.MemoryStream(theBytes,\
  \ false))\n        {\n            return(getObject(ms));\n        }\n    }\n\n \
  \   public static object getObject(System.IO.Stream s)\n    {\n        SecurityPermission\
  \ sp =\n            new SecurityPermission(\n                SecurityPermissionFlag.SerializationFormatter);\n\
  \        sp.Assert();\n        BinaryFormatter bf = new BinaryFormatter();\n   \
  \     return (bf.Deserialize(s));\n    }\n};\n```\n\n这个类的使用相当直接：要序列化一个对象，将其传递给 `getBytes`\
  \ 方法。该方法首先使用断言（assertion）（如前所述）允许 `SAFE` 调用者使用它，然后使用二进制格式化器将对象序列化到 `Stream` 中。该流随后作为字节集合返回。\n\
  \n反序列化可以使用 `getObject` 方法的任一重载来完成。我发现根据场景的不同，我可能直接访问 `Stream` 或字节集合，因此创建两个重载是有意义的，而不是重复代码来相互转换。反序列化在运行前也使用断言，以允许调用代码被编录为\
  \ `SAFE`。\n\n我获取数据的首次尝试是简单地将输入集加载到 `DataTable` 中，然后通过 `serialization_helper` 方法运行它。以下代码实现了一个名为\
  \ `GetDataTable_Binary` 的 `UDF`，它使用此逻辑：\n\n```csharp\n[Microsoft.SqlServer.Server.SqlFunction(\n\
  \    DataAccess = DataAccessKind.Read)]\npublic static SqlBytes GetDataTable_Binary(string\
  \ query)\n{\n    SqlConnection conn =\n        new SqlConnection(\"context connection\
  \ = true;\");\n    SqlCommand comm = new SqlCommand();\n    comm.Connection = conn;\n\
  \    comm.CommandText = query;\n    SqlDataAdapter da = new SqlDataAdapter();\n\
  \    da.SelectCommand = comm;\n    DataTable dt = new DataTable();\n    da.Fill(dt);\n\
  \    // 序列化并返回输出\n    return new SqlBytes(serialization_helper.getBytes(dt));\n\
  }\n```\n\n通过传入一个查询来调用此方法，该查询对应于你希望以二进制序列化形式获取的表，如下例所示：\n\n```sql\nDECLARE @sql nvarchar(max);\n\
  SET @sql = 'SELECT\n    BusinessEntityID,\n    NationalIDNumber,\n    LoginID,\n\
  \    OrganizationNode.ToString(),\n    OrganizationLevel,\n    JobTitle,\n    BirthDate,\n\
  \    MaritalStatus,\n    Gender,\n    HireDate,\n    SalariedFlag,\n    VacationHours,\n\
  \    SickLeaveHours,\n    CurrentFlag,\n    rowguid,\n    ModifiedDate\nFROM HumanResources.Employee';\n\
  \nDECLARE @x varbinary(max);\nSET @x = dbo.GetDataTable_Binary(@sql);\nGO\n```\n\
  \n> 注意：`hierarchyid` CLR 数据类型未标记为可序列化，因此在上面的查询中，我使用 `ToString()` 方法来序列化 `OrganizationNode`\
  \ 值的字符串表示形式。\n\n初步性能测试的结果非常令人鼓舞，显示平均序列化速度已降至仅 0.1437 秒——相比 XML 序列化方法有了巨大改进。\n\n\
  通过在序列化前将 `DataTable` 的 `RemotingFormat` 属性设置为 `Binary`，可以进一步提升二进制方法的性能：\n\n```csharp\n\
  dt.RemotingFormat = SerializationFormat.Binary;\n```\n\n进行此更改后，性能更快——仅需 0.0576 秒。此外，生成的二进制数据大小现在仅为\
  \ 68KB。\n\n首次尝试的成功鼓舞了我，我决定研究是否存在其他 `SQLCLR` 方法可以进一步提升性能。经过几次我就不赘述细节的尝试后，我决定放弃 `DataTable`，转而使用另一个类：`SqlDataReader`。我致力于将数据提取到对象集合中，初步测试显示使用\
  \ `SqlDataReader` 的序列化性能与 `DataTable` 一样好，但输出大小更小。然而，这种方法本身也并非没有困难。\n\n\n\n`DataTable`\
  \ 的优势在于它是一个易于使用的整体单元，包含了所有数据以及相关的元数据。您无需关心列名、类型和大小，因为所有内容都会自动加载到 `DataTable` 中。而使用\
  \ `SqlDataReader` 则需要多做一些工作，因为它不能被序列化为一个单一单元，而是必须拆分成其组成部分。\n\n由于我实现的代码有些复杂，我将带您逐段解读。首先，我在\
  \ `SqlFunctionAttribute` 上设置了 `DataAccessKind.Read` 属性，以允许该方法通过上下文连接访问数据。实例化了一个泛型\
  \ `List`，它将为每一行数据保存一个 `object` 集合，此外还有一个用于元数据。最后，实例化了 `SqlConnection`，并设置和执行了 `SqlCommand`：\n\
  \n## 第七章 „ SQLCLR：架构与设计考量\n\n```\n[Microsoft.SqlServer.Server.SqlFunction(\n   \
  \ DataAccess = DataAccessKind.Read)]\npublic static SqlBytes GetBinaryFromQueryResult(string\
