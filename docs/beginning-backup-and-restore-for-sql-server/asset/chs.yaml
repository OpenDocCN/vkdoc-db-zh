- "# 3. 事务日志备份\n\n在本章中，我们将重点讨论备份事务日志的不同技术。这是一个完整备份解决方案（由完整备份、差异备份和事务日志备份组成）的最后一块拼图。这一部分很重要，因为如果没有事务日志备份，就无法进行时间点恢复。事实上，除了上次差异备份中的内容之外，无法进行任何恢复，而自上次差异备份以来提交到数据库的任何数据都将永久丢失，因为这些数据仅存在于事务日志中。因此，事务日志通常被视为灾难恢复中最重要的部分，因为它们提供了自上次差异备份以来缺失的数据片段。\n\
  \n如果没有事务日志备份，我们将无法执行除完整或差异备份之外的任何备份（不考虑本书未讨论的备份类型，包括文件和文件组备份、镜像备份、部分备份和仅复制备份）。虽然这看起来可能不太糟糕，但重要的是要记住，必须定期备份事务日志才能保持数据库以最佳状态运行。\n\
  \n#### 什么是事务日志？\n\n事务日志是一个文件，包含所有数据库事务中所有已更改或更新数据的日志。每当由于数据修改而导致数据库状态改变时，与数据库的交互都会被记录在日志中。日志中的事务按接收顺序写入，因此所有事务都是顺序的。考虑到这一点，可以根据特定的时间范围“倒回”数据库事务的状态，直到达到所需状态。这被称为时间点恢复。\n\
  \n注意：时间点恢复可能非常耗时，但优点是事务日志的粒度使得可以针对单个事务进行操作以实现所需结果。\n\n事务日志还具有在相对较短的时间内变得非常大的独特特性。例如，一旦运行了差异备份，该备份就不会继续增长。类似地，事务日志将一直增长，直到它被备份。然后，这些事务日志备份将在指定的备份间隔内持续进行，只要有磁盘空间或直到它们被关闭。每个事务日志都能够恢复到最后一个差异备份，而不能恢复到任何其他备份。因此，为了确保数据损失最小化，所有备份——完整备份、差异备份和事务日志备份——必须\
  \ 100% 正常运行。如果不验证我们的事务日志备份是否正常运行，随着时间的推移，事务日志最终将占据整个磁盘。显然，让事务日志占据整个存储卷不是任何人所认为的理想解决方案，因此，我们需要确保备份平稳且正确地运行。为了帮助实现这一目标，下一节将向我们展示如何正确查看\
  \ SQL Server 中驻留的事务日志状态。\n\n\n#### 查看事务日志状态\n\n有几种不同的方法可以查看系统中每个数据库的事务日志的状态或大小。最常见的查看状态的方法是运行一个简单的查询。在\
  \ `SSMS` 中打开一个新查询窗口并输入以下查询：\n\n```\nDBCC SQLPERF(LOGSPACE);\n```\n\n运行该查询将返回如图 3-1\
  \ 所示的结果。\n\n![A436605_1_En_3_Fig1_HTML.jpg](img/A436605_1_En_3_Fig1_HTML.jpg)\n\n\
  图 3-1 SQLPERF 结果\n\n该查询返回的列如下：\n\n*   `Database Name`：正在分析的数据库的名称\n*   `Log Size\
  \ (MB)`：事务日志的大小\n*   `Log Space Used (%)`：日志已使用的分配空间百分比\n*   `Status`：此列始终返回 0\n\
  \n另一种查看事务日志当前大小的方法是：在 `SSMS` 中右键单击数据库名称，选择“属性”，然后从左侧菜单中选择“文件”。此时将打开一个屏幕，如图 3-2 所示。\n\
  \n![A436605_1_En_3_Fig2_HTML.jpg](img/A436605_1_En_3_Fig2_HTML.jpg)\n\n图 3-2 文件选项\n\
  \n从这里我们可以看到，“初始大小”列的值与图 3-1 中的查询结果相同。这是因为我们还没有备份事务日志，所以显示的初始大小就是当前值。一旦备份了日志，我们就可以回到此屏幕，看到一个小得多的初始值。\n\
  \n因此，我们也可以直接查看文件系统来近似了解事务日志的大小。只需导航到保存日志的位置（对我来说是 `E:\\SQL Server\\Logs`），你应该会看到与图\
  \ 3-3 类似的内容。\n\n![A436605_1_En_3_Fig3_HTML.jpg](img/A436605_1_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3 文件系统视图\n\n正如我所说，这更像是一种近似值，因为文件大小中存在一些开销，正如你所见。\n\n回顾一下，无论是完整备份、差异备份还是事务日志备份，备份的目的都是能够将数据恢复到先前的状态。最基本地说，一个适当的备份策略通过以下步骤完成：\n\
  \n*   规划备份策略\n*   实施备份策略\n*   验证备份策略\n\n换句话说，首先你必须通过确定所需的数据可用性级别来规划备份策略。然后，你必须在\
  \ `SQL Server` 中实施该策略。最后，你必须验证备份策略是否正常运行，以及在紧急情况下备份是否可以按预期恢复。\n\n对于事务日志备份，验证的原则比完整或差异备份更为突出，因为事务日志是灾难恢复的关键。因此，我个人倾向于稍微更多地关注事务日志，而不是完整或差异备份。这并非贬低完整或差异备份的重要性，但事务日志作为数据库中事务的直接记录，在我看来似乎重要得多。\n\
  \n##### 备份事务日志\n\n正如预期的那样，我们可以通过几种方式来运行事务日志备份：编写自定义 `SQL` 脚本，或使用熟悉的 `SSMS` 界面。在本节中，我将详细介绍这两种场景的不同部分，并将其留作练习，让读者自行决定哪种方法适合他们的特定应用。需要记住的重要一点是，这些技术既可以作为维护计划的一部分使用，也可以作为提供更高数据安全级别的定制方法。不过，我始终建议使用\
  \ `SQL Server Agent` 来管理你的备份，通过一个经过适当规划和管理的维护计划来实现。\n\n图 3-2 显示了事务日志的初始大小为 `584MB`。在定期安排的事务日志备份后，初始大小现在为\
  \ `24MB`，如图 3-4 所示。\n\n![A436605_1_En_3_Fig4_HTML.jpg](img/A436605_1_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4 初始大小已改变\n\n让我们看看获取事务日志备份的不同方法。\n\n##### 通过脚本进行事务日志备份\n\n如果我们没有在维护计划中安排备份，或者即使安排了但我们只想再创建一个事务日志备份，我们可以通过使用以下脚本手动运行事务日志备份：\n\
  \n```\nBACKUP LOG backrecTestDB\nTO DISK = 'E:\\SQL Server\\Logs\\backrecTestDB.trn'\n\
  ```\n\n只需在脚本的首尾部分填入你的数据库名称，你就可以手动发出你自己的备份命令。如果你遇到事务日志在自动备份计划运行前不知何故已填满的问题，此脚本特别有用。\n\
  \n对于此脚本，可以在 `TO DISK` 之后添加属性。它们是：\n\n*   `WITH PASSWORD = 'password'`\n    *   将\
  \ `password` 替换为你选择的密码。恢复此备份时必须输入此密码。\n*   `WITH STATS = X`\n    *   将 `X` 替换为你选择的整数。这是已完成进度的百分比间隔。例如，`WITH\
  \ STATS = 5` 将在每完成 `5%` 后显示进度。\n*   `WITH DESCRIPTION = 'text'`\n    *   将 `text`\
  \ 替换为你希望的描述文本。\n\n##### 通过 SSMS 进行事务日志备份\n\n通过 `SSMS` 备份事务日志是一个稍微复杂一些的过程，但最终给我们相同的结果。这些方法之间没有根本性的区别，因为它们都实现了事务日志备份的相同目标，所以实际上这将取决于你的偏好以及根据你已有的任何业务规则对你的环境来说什么是理想的。\n\
  \n要在 `SSMS` 中启动事务日志备份，首先你需要右键单击数据库名称，将鼠标悬停在“任务”上，然后深入选择“备份”选项，如图 3-5 所示。\n\n![A436605_1_En_3_Fig5_HTML.jpg](img/A436605_1_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5 备份选项\n\n如图 3-6 所示，初始屏幕标题为“常规”。此页面左侧菜单中还有两个选项，分别名为“介质选项”和“备份选项”。让我们快速浏览一下这些菜单选项以及它们各自区域内的可用选择。\n\
  \n\n###### 备份数据库—常规\n\n选择此菜单选项将打开“备份数据库”窗口的“常规”页面，如图 3-6 所示。\n\n![A436605_1_En_3_Fig6_HTML.jpg](img/A436605_1_En_3_Fig6_HTML.jpg)\n\
  \n#### 图 3-6\n\n#### 常规窗口\n\n此界面允许我们为事务日志备份定义各种“常规”组成部分。此处可用的选项有：\n\n*   `源`\n \
  \   *   `数据库`：此选项允许您从可用的数据库中选择要备份的数据库。\n    *   `恢复模型`：此选项将始终默认为所选数据库当前使用的恢复模型。要测试这一点，请选择`master`数据库，您将看到恢复模型从`FULL`更改为`SIMPLE`。\n\
  \    *   `备份类型`：此选项允许您选择要备份的内容。当恢复模型设置为`FULL`时，您可以选择完整、差异或事务日志备份，或者选择与您特定恢复模型相关的任何备份类型。您在这里还有一个`仅复制备份`复选框。这是什么？仅复制备份在您想要备份数据库中的数据，但不想中断正常的备份计划，同时也不想使用最新备份（例如，它可能是一个差异备份）时非常有用，您不想花时间先运行完整备份再运行差异备份。当您希望为开发人员提供当前数据的备份以在开发网络中使用时，此选项特别有用。可以将其视为一次非顺序的完整备份。\n\
  \    *   `备份组件`\n        *   `数据库`\n        *   `文件和文件组`\n*   `目标`\n    *   `备份到`：此区域中的选项当前为`磁盘`或`URL`。选择`磁盘`选项可将备份保存在您连接的网络上某个物理驱动器中，使用`URL`选项可保存到在线存储系统或\
  \ Azure 实例。选择其中一项后，您可以通过单击此窗口右下角的`添加`或`删除`按钮来选择位置。\n\n对于本例，在进入`介质选项`子菜单之前，我们需要从`备份类型`下拉菜单中选择`事务日志`。界面的最终状态如图\
  \ 3-7 所示。\n\n![A436605_1_En_3_Fig7_HTML.jpg](img/A436605_1_En_3_Fig7_HTML.jpg)\n\
  \n#### 图 3-7\n\n#### 更新后的常规窗口\n\n###### 备份数据库—介质选项\n\n选择此选项将显示以下界面，如图 3-8 所示。\n\n\
  ![A436605_1_En_3_Fig8_HTML.jpg](img/A436605_1_En_3_Fig8_HTML.jpg)\n\n#### 图 3-8\n\
  \n#### 介质选项窗口\n\n此屏幕允许您选择处理备份物理存储方式的选项。此屏幕中包含的选项如下：\n\n*   `覆盖介质`\n    *   `备份到现有介质集`：此选项允许您将备份添加到现有备份中，这样在需要恢复时，您就可以决定要恢复哪个备份。\n\
  \        *   `追加到现有备份集`：如果您想如上所述将其添加到集合中，请选择此选项。\n        *   `覆盖所有现有备份集`：如果您希望用即将运行的新备份覆盖选定的备份集，请选择此选项。\n\
  \        *   `检查介质集名称和备份集有效期`：这不是必需的，根据我的经验也不常用，但如果您想验证备份集的名称和有效期，可以选择此项。\n    \
  \    *   `介质集名称`\n    *   `备份到新介质集，并擦除所有现有备份集`：此选项与前一个选项不同。前一个选项会备份到现有备份集；此选项允许您创建一个全新的备份集，然后将备份保存到该备份集。此外，此选项会删除所有以前的备份集，因此请谨慎使用此选项。\n\
  \        *   `新介质集名称`：新备份集的名称。\n        *   `新介质集描述`：备份集的可选描述。\n*   `可靠性`\n    *\
  \   `完成后验证备份`\n    *   `写入介质前执行校验和`\n    *   `出错时继续`\n*   `事务日志`\n    *   `截断事务日志`\n\
  \    *   `备份日志尾部，并使数据库处于还原状态`\n*   `磁带驱动器`\n    *   `备份后卸载磁带`\n    *   `卸载前倒带`\n\
  \n让我们稍作停顿，回顾一下刚刚介绍的两个事务日志选项之间的区别。在引用事务日志备份时，有两点很重要：事务日志可以被截断，或者可以备份事务日志的尾部。那么区别是什么？\n\
  \n第一个选项，`截断事务日志`，专门处理截断日志，仅此而已。截断事务日志并不会减小物理事务日志文件的大小。这个概念起初对我来说似乎违反直觉，但后来我意识到，要减小日志文件的大小，您必须收缩日志文件。截断只是删除日志文件中未使用的部分；收缩日志文件才是实际使日志变小的操作。另外需要记住的重要一点是，截断会在检查点之后（在简单恢复模型中）以及日志备份之后（在完整或大容量日志恢复模型中）自动发生。这意味着，如果已经正确建立了备份过程，截断将作为常规备份过程的一部分自动发生。如果没有正确建立备份过程，那么您的事务日志将永远不会被截断（除非手动操作），并且最终会增长到存储介质的整个大小。\n\
  \n第二个选项，`备份日志尾部，并使数据库处于还原状态`，是两个选项中更强大、更有用的一个。此选项允许您备份尚未备份的最新事务，然后使数据库准备就绪，以便在必要时立即还原。这被称为尾日志备份。\n\
  \n出于本示例的目的，请确保选择第一个选项`截断事务日志`以及`完成后验证备份`。\n\n最终界面如图 3-9 所示。\n\n![A436605_1_En_3_Fig9_HTML.jpg](img/A436605_1_En_3_Fig9_HTML.jpg)\n\
  \n#### 图 3-9\n\n#### 更新后的介质选项窗口\n\n\n\n###### 备份数据库 — 备份选项\n\n选择此选项将显示以下界面，如图 3-10\
  \ 所示。\n\n![A436605_1_En_3_Fig10_HTML.jpg](img/A436605_1_En_3_Fig10_HTML.jpg)\n\n\
  图 3-10\n\n**备份选项**\n\n此屏幕用于定义在上一菜单选项中定义的介质集的实际标准。此屏幕上的选项包括：\n\n*   备份集\n    *  \
  \ 名称：备份集的名称。\n    *   说明：备份集的可选说明。\n    *   备份集将过期：\n        *   在以下天数后：备份保持“新鲜”的天数；超过此值后，备份过期且不再有效。\n\
  \        *   在以下日期：数据过期的日期。\n*   压缩\n    *   设置备份压缩：如果要压缩备份，请选择此选项。压缩并非在所有情况下都是必需的，但在处理非常大的数据库时，通常为了节省空间限制而这样做是明智的。请注意，压缩仅在\
  \ `SQL Server 2016` 的企业版、标准版和开发版中可用。\n*   加密\n    *   加密备份\n        *   算法\n   \
  \     *   证书或非对称密钥\n\n我们不会在此屏幕上更改任何内容，因为这些默认选项正是我们所需要的。请注意，仅当在“介质选项”子菜单中选择了“备份到新介质集”选项时，“加密”选项才可用。这在图\
  \ 3-8 所示的实际界面中也有说明。\n\n一旦进入此最终屏幕并准备好开始备份，请单击“确定”按钮。希望你会看到一个很短时间后打开的窗口，说明备份成功。此窗口如图\
  \ 3-11 所示。\n\n![A436605_1_En_3_Fig11_HTML.jpg](img/A436605_1_En_3_Fig11_HTML.jpg)\n\
  \n图 3-11\n\n**备份成功**\n\n当我查看创建的备份文件的属性时，我看到如图 3-12 所示的内容。\n\n![A436605_1_En_3_Fig12_HTML.jpg](img/A436605_1_En_3_Fig12_HTML.jpg)\n\
  \n图 3-12\n\n**事务日志属性**\n\n我想要检查的字段是“创建时间”和“修改时间”。“创建时间”显示该文件是在 50 分钟前创建的；这是正确的，因为我运行此备份的时间是上午\
  \ 11:50，而日志是作为常规备份序列的一部分在上午 11:00 创建的。它是在 3 分钟前修改的，那正是将备份的日志添加到当前备份集的时间。我们还可以查看备份的大小，并估计它应该大约是原来的两倍，因为自动备份序列几乎就要运行了。\n\
  \n至此，我们可以假设事务日志已被安全正确地备份。现在，如果数据库发生任何事情我们需要恢复，我们至少可以恢复到这一点，考虑到我们有差异备份和完整备份。从事务日志的角度来看，我们已经全部设置好了。\n\
  \n#### 总结\n\n在本章中，我们了解了什么是事务日志、它们如何工作、它们与数据库的关系，以及如何从脚本和 GUI 实际备份它们。在下一章中，我将把前三章的内容整合到一个完整的数据库备份解决方案中。\n\
  \n### 第四章 备份方案示例\n\n本章将作为第一章（关于完整备份）、第二章（关于差异备份）和第三章（关于事务日志备份）的总结。我们将首先深入探讨如何创建一个可持续的维护计划，使用一组预设的时间表在一个主要区域集中管理我们的备份，而不是手动运行备份，或者让完整、差异或事务日志备份在不同时间运行，然后我们将运行该计划并进行审查。\n\
  \n#### 设置维护计划\n\n为了自动化备份，我们需要让 `SQL Server Agent` 知道需要运行的例程以及何时运行。这是通过维护计划实现的。自动化备份计划的每个方面都可以在维护计划中进行配置，所以让我们逐步了解一个可靠备份计划的内部运作机制。\n\
  \n\n##### 完整备份配置\n\n首先，启动 SSMS 并展开 Management 节点。接着，右键单击 Maintenance Plans 并选择 Maintenance\
  \ Plan Wizard。我们看到的第一个界面标题为 Select Plan Properties。在 Name 框中输入 `Backup Maintenance\
  \ Plan`，并添加简要描述。同时，选择 Separate schedules for each task 单选按钮。图 4-1 显示了您应看到的界面。准备就绪后，点击\
  \ Next 继续。\n\n![A436605_1_En_4_Fig1_HTML.jpg](img/A436605_1_En_4_Fig1_HTML.jpg)\n\
  \n*图 4-1：选择计划属性*\n\n下一个屏幕让我们选择要在此计划中运行的维护任务。我们需要选择与备份相关的三个任务：Back Up Database (Full)、Back\
  \ Up Database (Differential) 和 Back Up Database (Transaction Log)。这些选择如图 4-2 所示。\n\
  \n![A436605_1_En_4_Fig2_HTML.jpg](img/A436605_1_En_4_Fig2_HTML.jpg)\n\n*图 4-2：选择维护任务*\n\
  \n现在，点击 Next，我们将选择备份的三个部分的执行顺序，如图 4-3 所示。由于我们将在不同时间表上执行这些任务，而不会将它们链接在同一个计划中（即我们不会同时运行完整备份、差异备份或事务日志备份），我们可以跳过此页。准备好后，点击\
  \ Next 按钮继续。\n\n![A436605_1_En_4_Fig3_HTML.jpg](img/A436605_1_En_4_Fig3_HTML.jpg)\n\
  \n*图 4-3：选择维护任务*\n\n由于我们在上一屏幕保留了默认顺序，接下来出现的第一个界面是 Define Back Up Database (Full)\
  \ Task 屏幕。此屏幕有三个选项卡：General、Destination 和 Options，默认显示 General 选项卡。图 4-4 显示了这个初始界面。\n\
  \n![A436605_1_En_4_Fig4_HTML.jpg](img/A436605_1_En_4_Fig4_HTML.jpg)\n\n*图 4-4：定义\
  \ Back Up Database (Full) 任务，常规选项卡*\n\n下拉 `Database(s)` 菜单并选择您想要备份的数据库。只要是设置了完整恢复模型的数据库都可以。选择数据库后，图\
  \ 4-5 显示了主屏幕上应该看到的内容。\n\n![A436605_1_En_4_Fig5_HTML.jpg](img/A436605_1_En_4_Fig5_HTML.jpg)\n\
  \n*图 4-5：定义 Back Up Database (Full) 任务，常规选项卡（已更新）*\n\n请注意，此时 `Database` 单选按钮已被选中。这是因为检测到了数据库，并且它现在是此任务的对象。因此，如果您想备份单个文件，也可以选择\
  \ `Files and filegroups` 单选按钮。\n\n在此屏幕上，还有一个标记为 `Back up to:` 的新选项，这是 SQL Server\
  \ 2016 的新功能。以前，我们没有备份到 URL 的选项，但现在有了，这要归功于 Microsoft 将 SQL Server 集成到基于云的基础设施（如\
  \ Microsoft Azure）的创新。深入探讨 Azure 的具体细节超出了本书范围，但这是这个强大平台的一个极好的补充。对于大多数情况，可以保留为 `Disk`，但您可以根据具体情况进行更改。\n\
  \n此屏幕底部有 Schedule 选项。在我们首先设置三个不同选项卡中的所有选项之前，暂时不必担心它。准备好后，点击 Destination 选项卡继续。\n\
  \n图 4-6 显示了 Destination 选项卡的初始视图。此选项卡让我们定义备份应存储的位置。\n\n![A436605_1_En_4_Fig6_HTML.jpg](img/A436605_1_En_4_Fig6_HTML.jpg)\n\
  \n*图 4-6：定义 Back Up Database (Full) 任务，目标选项卡*\n\n需要注意的是，此界面会根据在 General 选项卡中 `Back\
  \ up to:` 字段的选择而变化。\n\n请注意标记为 `Create a backup file for every database` 的单选按钮。由于我们专门为此配置数据库的完整备份设置，请单击此选项下的\
  \ `Create a sub-directory for each database` 复选框。这意味着，对于您选择备份的每个数据库，其备份将保存在一个以该数据库名称命名的目录中。\n\
  \n准备好继续后，点击 Options 选项卡。图 4-7 是您接下来将看到的内容。\n\n![A436605_1_En_4_Fig7_HTML.jpg](img/A436605_1_En_4_Fig7_HTML.jpg)\n\
  \n*图 4-7：定义 Back Up Database (Full) 任务，选项选项卡*\n\n在这里，我们可以设置该任务的其他各种设置。从图中可以看到，我们有关于压缩、备份过期和加密的选项。在本演示中，我们将保留这些选项，不进行压缩或加密。在此屏幕上我唯一想更改的是勾选\
  \ `Verify backup integrity` 复选框。如果您的数据库已经运行过完整性检查，这并非 100%必要，但为了以防万一，我希望确保选择了此选项。安全总比后悔好，尤其是在您可能因为未选择此选项而面临备份失败的情况下。\n\
  \n在屏幕底部，单击 `Change…` 按钮为此任务设置计划。\n\n让我们花点时间定义我们的备份计划应该是什么样子以及何时运行。假设我们希望备份在 24 小时窗口内运行，以最小化数据中断。如果完整备份设置在午夜，那么第一个差异备份也将设置在午夜，第一个事务日志备份也是如此。然后每六小时运行一次新的差异备份。在这些时间点之间，事务日志备份每小时运行一次。表\
  \ 4-1 是对我所描述时间段的一个相当准确的表示。\n\n*表 4-1：24 小时备份计划示例*\n\n| 时间 | 完整备份？ | 差异备份？ | 事务日志？\
  \ |\n| --- | --- | --- | --- |\n| 凌晨 12:00 | X | X | X |\n| 凌晨 1:00 |   |   | X\
  \ |\n| 凌晨 2:00 |   |   | X |\n| 凌晨 3:00 |   |   | X |\n| 凌晨 4:00 |   |   | X |\n\
  | 凌晨 5:00 |   |   | X |\n| 早上 6:00 |   | X | X |\n| 早上 7:00 |   |   | X |\n| 早上\
  \ 8:00 |   |   | X |\n| 早上 9:00 |   |   | X |\n| 早上 10:00 |   |   | X |\n| 早上 11:00\
  \ |   |   | X |\n| 中午 12:00 |   | X | X |\n| 下午 1:00 |   |   | X |\n| 下午 2:00 |\
  \   |   | X |\n| 下午 3:00 |   |   | X |\n| 下午 4:00 |   |   | X |\n| 下午 5:00 |   |\
  \   | X |\n| 晚上 6:00 |   | X | X |\n| 晚上 7:00 |   |   | X |\n| 晚上 8:00 |   |   |\
  \ X |\n| 晚上 9:00 |   |   | X |\n| 晚上 10:00 |   |   | X |\n| 晚上 11:00 |   |   | X\
  \ |\n\n使用此模型，我们可以恢复到给定日期的任何一小时，这意味着我们将丢失的最多数据是 1 小时。如果可以接受，我们可以继续。如果不能，我们可以调整备份之间的时间。不过，我们现在将坚持这个计划。图\
  \ 4-8 显示了更新后的界面应是什么样子。\n\n![A436605_1_En_4_Fig8_HTML.jpg](img/A436605_1_En_4_Fig8_HTML.jpg)\n\
  \n*图 4-8：新建作业计划*\n\n您需要做的就是下拉 `Occurs` 菜单并选择 `Daily`。就是这样。注意 `Summary` 字段中的文本现在显示\
  \ `Occurs every day at 12:00:00 am. Schedule will be used starting on [DATE]`。点击\
  \ OK 保存此计划，并注意我们刚刚读到的相同摘要已传输到界面上的 Schedule 块，如图 4-9 所示。\n\n![A436605_1_En_4_Fig9_HTML.jpg](img/A436605_1_En_4_Fig9_HTML.jpg)\n\
  \n*图 4-9：已更新的计划信息*\n\n现在，我们已经完成了计划中完整备份部分的设置，让我们继续差异备份部分。点击 Next 按钮继续。图 4-10 显示了下一个屏幕。\n\
  \n![A436605_1_En_4_Fig10_HTML.jpg](img/A436605_1_En_4_Fig10_HTML.jpg)\n\n*图 4-10*\n\
  \n\n##### 定义备份数据库（差异）任务\n\n单击**下一步**继续设置计划。\n\n##### 差异备份配置\n\n接下来，将显示“定义备份数据库（差异）任务”界面。图\
  \ 4-11 显示，初始界面与之前的界面几乎完全相同，同样包含用于不同菜单选项的三个选项卡。我们现在所在的第一个选项卡标题为**常规**，那么现在就来看一下这些选项。\n\
  \n![A436605_1_En_4_Fig11_HTML.jpg](img/A436605_1_En_4_Fig11_HTML.jpg)\n\n图 4-11：定义备份数据库（差异）任务，常规选项卡\n\
  \n就像我们在完整备份部分所做的那样，我们将从标记为 `数据库(s)` 的下拉菜单中选择数据库，然后单击**目标**选项卡。图 4-12 显示了该选项卡的初始视图。\n\
  \n![A436605_1_En_4_Fig12_HTML.jpg](img/A436605_1_En_4_Fig12_HTML.jpg)\n\n图 4-12：定义备份数据库（差异）任务，目标选项卡\n\
  \n请记住，在继续操作之前，我们需要勾选 `为每个数据库创建子目录` 复选框。另请注意，备份位置设置为我们的默认备份位置，该位置最初是在我安装 SQL Server\
  \ 时定义的。\n\n单击**选项**选项卡将显示如图 4-13 所示的内容。同样，这与最初看到的内容完全相同。只需确保在继续操作之前勾选 `验证备份完整性`\
  \ 复选框。\n\n![A436605_1_En_4_Fig13_HTML.jpg](img/A436605_1_En_4_Fig13_HTML.jpg)\n\n\
  图 4-13：定义备份数据库（差异）任务，选项选项卡\n\n一旦一切看起来都没问题，您需要单击此屏幕底部的 `更改…` 按钮，以便我们可以定义此任务的计划。图\
  \ 4-14 显示了计划的初始界面。\n\n![A436605_1_En_4_Fig14_HTML.jpg](img/A436605_1_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14：新建作业计划\n\n`发生` 值应更改为**每天**，并且应选择 `每隔` 单选按钮，选定值为**6 小时**。完成后，其外观应如图 4-15\
  \ 所示。\n\n![A436605_1_En_4_Fig15_HTML.jpg](img/A436605_1_En_4_Fig15_HTML.jpg)\n\n\
  图 4-15：新建作业计划（已更新）\n\n这意味着我们的差异备份现在将每天每六小时运行一次。完成后单击**确定**，然后单击**下一步**。\n\n#####\
  \ 事务日志备份配置\n\n打开的下一个屏幕是“定义备份数据库（事务日志）任务”屏幕，如图 4-16 所示。\n\n![A436605_1_En_4_Fig16_HTML.jpg](img/A436605_1_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16：定义备份数据库（事务日志）任务，常规选项卡\n\n此区域具有与前两个**常规**选项卡相同的基本设置：从 `数据库(s)` 菜单中选择数据库，并确保在\
  \ `备份到：` 下拉菜单中选择了**磁盘**。请注意，在此界面中，**数据库**单选按钮已禁用？这是因为我们不是在备份数据库，而是在备份事务日志。在其他界面上，此选项是可选的，您可以在备份数据库或备份文件和文件组之间进行选择。\n\
  \n完成后单击**目标**选项卡，然后您应该会看到如图 4-17 所示的内容。\n\n![A436605_1_En_4_Fig17_HTML.jpg](img/A436605_1_En_4_Fig17_HTML.jpg)\n\
  \n图 4-17：定义备份数据库（事务日志）任务，目标选项卡\n\n确保 `为每个数据库创建子目录` 选项已勾选，此屏幕即完成。准备好后单击**选项**选项卡，将显示图\
  \ 4-18。\n\n![A436605_1_En_4_Fig18_HTML.jpg](img/A436605_1_En_4_Fig18_HTML.jpg)\n\
  \n图 4-18：定义备份数据库（事务日志）任务，选项选项卡\n\n请确保此处 `验证备份完整性` 复选框已勾选，并单击屏幕底部的 `更改…` 按钮，以便我们可以设置事务日志备份的计划。图\
  \ 4-19 显示了更新计划后您的屏幕应有的外观。\n\n![A436605_1_En_4_Fig19_HTML.jpg](img/A436605_1_En_4_Fig19_HTML.jpg)\n\
  \n图 4-19：新建作业计划\n\n准备好继续后，单击**确定**按钮关闭“计划”窗口，然后单击界面上的**下一步**按钮。\n\n接下来是如图 4-20 所示的屏幕，**选择报告选项**。\n\
  \n![A436605_1_En_4_Fig20_HTML.jpg](img/A436605_1_En_4_Fig20_HTML.jpg)\n\n图 4-20：选择报告选项\n\
  \n现在，这相当一目了然。如果您希望将报告写入文本文件并放入文件系统，请勾选此框。请注意，我选择了**备份**目录，而不是**日志**目录？这是因为我想将**日志**目录保留用于我的事务日志。**备份**目录可用于存储维护文本文件，而**备份**目录内的各个文件夹将存储实际的\
  \ `.bak` 文件，以防我们需要还原数据库。\n\n您也可以选择通过电子邮件接收报告，但必须已定义操作员。如果已定义操作员，请在此处选择他/她以接收电子邮件。这将让您通过电子邮件了解维护计划何时运行以及结果如何。目前，我们将仅保留报告选择。单击**下一步**继续。\n\
  \n在如图 4-21 所示的标题为**完成向导**的屏幕上，您将看到我们所做工作的摘要。展开界面中的选项将显示我们所做工作的完整细节，如图 4-21 所示。\n\
  \n![A436605_1_En_4_Fig21_HTML.jpg](img/A436605_1_En_4_Fig21_HTML.jpg)\n\n图 4-21：完成向导\n\
  \n请注意，这些选项尚未保存。您可以在此处单击**取消**并销毁我们迄今为止完成的所有工作，但我们不要那样做。相反，请查看我们所做的工作，准备好后，单击**完成**。图\
  \ 4-22 显示了在创建维护计划时您应该看到的内容。\n\n![A436605_1_En_4_Fig22_HTML.jpg](img/A436605_1_En_4_Fig22_HTML.jpg)\n\
  \n图 4-22：维护计划向导进度\n\n始终是个好迹象！准备好后单击**关闭**，并注意 **备份维护计划** 现在出现在 SSMS 的“维护计划”区域中。它现已启用，并将按我们定义的计划运行。\n\
  \n\n\n#### 配置作业\n\n请注意，现在在 `SQL Server 代理` 的“作业”文件夹中有若干作业。这些名字不太有描述性，对吧？哪个是哪个？让我们现在就来修正这一点。双击\
  \ `Subplan_1` 并更新您的信息，使其大致与图 4-23 所示匹配。您需要在“`名称`”字段中填写一个大致与当前任务相匹配的名称，因此请尽量不要在该字段中输入随机内容。相反，给它一个描述性名称。请注意，我将我的命名为“`backrecTestDB.完整备份`。”\n\
  \n![A436605_1_En_4_Fig23_HTML.jpg](img/A436605_1_En_4_Fig23_HTML.jpg)\n\n图 4-23\
  \ 作业属性，常规选项卡\n\n请注意，作业的“`类别`”选项被设置为“`数据库维护`”。这很棒，因为这正是我们正在做的事情。确保“`已启用`”复选框被勾选，此屏幕就设置好了。\n\
  \n我跳过的一点是“`所有者`”选择。这通常应设置为数据库的所有者，尽管我们这里具体指的是任务的所有者，而非数据库的所有者。因此，它应设置为在数据库中具有较高权限的任何用户。\n\
  \n另外请注意，左侧有菜单选项。您当前处于“`常规`”选项。如果单击“`步骤`”选项，您将看到图 4-24 所示的内容。\n\n![A436605_1_En_4_Fig24_HTML.jpg](img/A436605_1_En_4_Fig24_HTML.jpg)\n\
  \n图 4-24 作业属性，步骤选项卡\n\n如果您是首次设置，您会注意到菜单栏尚未显示您的新名称。我的正在更新，因为我展示的是操作结果。要更新您的计划名称，请双击文本\
  \ `Subplan_1`（与我在图 4-24 中显示的“完整备份”相对）。“`作业步骤属性`”窗口将打开，因此将“`步骤名称`”框更改为“完整备份”，如图 4-25\
  \ 所示。\n\n![A436605_1_En_4_Fig25_HTML.jpg](img/A436605_1_En_4_Fig25_HTML.jpg)\n\n\
  图 4-25 作业属性，步骤选项卡，常规选项\n\n暂时不要触碰此屏幕上的其他任何内容，只需单击左侧的“`高级`”选项。将此屏幕调整为如图 4-26 所示的设置。\n\
  \n![A436605_1_En_4_Fig26_HTML.jpg](img/A436605_1_En_4_Fig26_HTML.jpg)\n\n图 4-26\
  \ 作业属性，步骤选项卡，高级选项\n\n我在这里所做的只是勾选了“`将步骤输出包括在历史记录中`”复选框。如果您已设置一个表来将维护计划结果记录到数据库中的表，则可以选择“`记录到表`”复选框。此外，您还可以通过向“`输出文件`”框输入文件位置，将操作结果输出到文件。\n\
  \n完成后单击“`确定`”，您将返回到“`作业属性`”屏幕，此时文本“完整备份”已取代 `Subplan_1`。图 4-27 是您现在应该看到的内容。\n\n\
  ![A436605_1_En_4_Fig27_HTML.jpg](img/A436605_1_En_4_Fig27_HTML.jpg)\n\n图 4-27 作业属性，步骤选项卡\n\
  \n单击左侧的“`计划`”选项，注意我们的计划就在其中，并且它已启用，如图 4-28 所示。\n\n![A436605_1_En_4_Fig28_HTML.jpg](img/A436605_1_En_4_Fig28_HTML.jpg)\n\
  \n图 4-28 作业属性，计划选项卡\n\n单击“`警报`”选项，您将看到一个空白屏幕。目前这没关系。\n\n单击“`通知`”选项，您将看到图 4-29 所示的内容。\n\
  \n![A436605_1_En_4_Fig29_HTML.jpg](img/A436605_1_En_4_Fig29_HTML.jpg)\n\n图 4-29\
  \ 作业属性，通知选项卡\n\n如果您已设置“`操作员`”并且之前已配置“`数据库邮件`”，请在“`电子邮件`”框中选择该“`操作员`”。目前，我们将保留“`写入\
  \ Windows 应用程序事件日志`”选项为选中状态，但我们会将下拉菜单更改为“`当作业完成时`”；这样我们将始终知道我们的作业发生了什么。\n\n单击“`目标`”选项也将显示空白屏幕。这也没关系，因为我们尚未定义任何目标。\n\
  \n在完成“`目标`”选项并遵循了此区域的指示后，单击“`确定`”。\n\n如果您查看 `SQL Server 代理` 的“作业”文件夹，您将看到此作业已被重命名并保存为\
  \ `full backup`。请按照前面列出的相同步骤处理另外两个作业，并相应地标记它们。请记住，我们将 `full backup` 定义为第一个任务，`differential\
  \ backup` 为第二个任务，`transaction log` 为第三个任务。这些与这里的子计划标识相对应。完成时，您应该得到如图 4-30 所示的内容。\n\
  \n![A436605_1_En_4_Fig30_HTML.jpg](img/A436605_1_En_4_Fig30_HTML.jpg)\n\n图 4-30\
  \ 已完成的 SQL Server 代理作业\n\n`syspolicy_purge_history` 也在里面，这没关系。那是 SQL Server 自己执行的一个作业。\n\
  \n#### 总结\n\n在本章中，我们探讨了设置完整备份、差异备份和事务日志备份计划的最终步骤。这些备份计划完全取决于相关数据库的恢复模式，并且必须设置为完整或大容量日志模式，因为简单模式不允许进行事务日志备份。\n\
  \n我们了解了运行经过完整性验证的备份的重要性，以及每次创建备份时未验证备份完整性可能带来的风险。\n\n我们根据特定环境的需求，清晰且正确地定义了备份计划，并将这些需求转化为可量化的时间表，从而按预期创建备份。\n\
  \n最后，我们学习了如何使最终的备份维护计划更易于人类阅读，同时保持任务的复杂性。\n\n我们将继续进入第 5 章，探讨与我们在第 1 章创建的备份场景相对应的还原场景。这是备份场景的逻辑延伸，因为如果无法还原备份，那么拥有备份就没有意义。\n\
  \n"
