  \n#### 更新 SQL Server Agent 作业\n\n现在我们可以看到新的 `Differential Backup` 作业，我们需要对其进行配置。我们将遵循作业的\
  \ `Full Backup` 部分中的大部分指示，但有一些细微的变化，如下节所述。\n\n\n\n##### 常规选项卡\n\n此选项卡无需更改。我们保留了从作业创建的维护计划部分继承的默认设置，因此目前可以直接使用这些设置。图\
  \ 10-13 显示了带有默认值的“常规”选项卡。\n\n![A436605_1_En_10_Fig13_HTML.jpg](img/A436605_1_En_10_Fig13_HTML.jpg)\n\
  图 10-13 作业属性，常规选项卡\n\n点击左侧的“步骤”菜单选项以继续。\n\n##### 步骤选项卡\n\n“步骤”选项卡的默认设置也很好（图 10-14）。我们可以保持这些设置不变，因为它们正是我们需要的配置方式。请注意，我们目前不会深入探讨该步骤的具体细节。如果您需要关于此步骤可执行的各种选项的更多解释，请参阅第\
  \ 9 章，我在其中详细介绍了此区域内的每一个选项。\n\n![A436605_1_En_10_Fig14_HTML.jpg](img/A436605_1_En_10_Fig14_HTML.jpg)\n\
