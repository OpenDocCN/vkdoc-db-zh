- "# 5. 完整还原\n\n按照前面章节的格式，我们将通过深入探讨本书的第二部分，继续备份与还原之旅。第一部分，包含第 1 至 4 章，涵盖了备份部分；这第二部分，包含第\
  \ 5 至 8 章，将涵盖还原部分。\n\n至此，我们认识到数据库备份是整个数据恢复过程的基础。没有备份，就不可能有还原。因此，确保所执行的备份是正确的至关重要，这一点我们之前已经讨论过。现在，基于这些基础知识，我们将进一步探讨执行完整数据库备份还原的各种方法。\n\
  \n需要重点指出的是，数据库还原主要在 `SQL Server Management Studio` 中完成。我想在这里强调“主要”这个术语，因为它并非还原数据的唯一方式。例如，如果您的\
  \ `master` 数据库已损坏，则必须在 SQL Server 正确启动之前从完整备份中还原它。这是因为 `master` 存储了 SQL Server 的所有配置信息。`master`\
  \ 数据库损坏带来的一个主要问题，除了明显的 SQL Server 无法启动之外，还在于所有其他系统数据库（`msdb` 和 `model`）都依赖于 `master`\
  \ 才能正常运行。如果 `master` 损坏严重到一定程度，那么将需要单独重建系统表，这是一件非常麻烦的事情。\n\n\n\n#### 什么是完全恢复？\n\n\
  简而言之，完全恢复正如其名，但又并非完全如此；它恢复的是先前执行的完整数据库备份中包含的所有数据，但并不恢复整个数据库。回想一下，完整数据库备份只备份数据，而不备份系统设置。数据库备份中只包含指定数据库的表数据。\n\
  \n注意\n\n如果你需要备份与 SQL Server 安装相关的系统设置，你必须拥有 `master`、`msdb` 和 `model` 数据库的当前备份。这些是系统数据库，对于\
  \ SQL Server 的平稳运行极其重要。\n\n我刚开始接触 SQL Server 时，正值 SQL Server 7 和 SQL Server 2000\
  \ 之间。我多少已经习惯了 MySQL 在界面和可用性方面的工作方式，所以一开始切换过来有点困难，但我逐渐掌握了窍门。MySQL 有一点我非常喜欢，那就是它们的“备份”就是巨大的\
  \ `.sql` 文件，里面包含大量的 `INSERT` 命令。没错，整个数据库的内容都被按顺序导出；先是针对某张表的 `DROP` 和 `CREATE` 命令，然后是该表中所有数据的单独\
  \ `INSERT` 语句。在有些人看来，这似乎是浪费空间，但要我说，精妙之处就在于细节。这样，时间充裕的数据库管理员就可以仔细检查那个备份，并在 SQL Server\
  \ 中无法实现的细粒度级别上，实际掌控数据的插入。我的意思是，SQL Server 不会以这种格式创建备份；SQL Server 中的备份是专门为 SQL Server\
  \ 引擎执行而创建的，不是为了方便人类阅读。是的，在 SQL Server 备份中，数据当然在那里，但无法通过在记事本中打开等方式读取。\n\n完全恢复的另一个方面是，它们可用于创建现有数据库的完美副本。在开发环境中能够拥有这种功能对我来说绝对非常宝贵，因为我可以轻松地创建一个基于生产数据库的完整开发数据库，主要用于测试。然后，我可以创建另一个数据库，它是开发数据库的完全复制品，但将其命名为不同的名称。之后，如果我需要恢复数据，我可以轻松地在第一个开发数据库中\
  \ `TRUNCATE` 任何表，并使用 `INSERT INTO` 语句快速替换数据，其中第二个开发数据库作为源，第一个开发数据库作为目标。我将在本章后面详细展示如何操作。\n\
  \n首先，让我们暂时将注意力转向系统数据库。有三个主要的系统数据库，名为 `master`、`msdb` 和 `model`。这三个数据库承载着你的 SQL Server\
  \ 安装的配置信息，因此它们对于整个安装的健康状况至关重要。从技术上讲，还有第四个名为 `tempdb` 的系统数据库，但此数据库在每次为特定 SQL Server\
  \ 实例创建该实例时都会被销毁和创建，因此无需担心备份它。\n\n#### 恢复 Master 数据库\n\n如果你不得不恢复 `master` 数据库或任何系统数据库，我真诚地希望这不是因为严重的损坏问题。我可以亲口告诉你，这是一项重大的任务，必须极其谨慎和细致地完成。本节将展示从完整数据库备份恢复\
  \ `master` 数据库的各个步骤和说明。这些步骤可应用于恢复任何系统数据库，但现在，我将只关注 `master` 数据库。\n\n本节依赖于存在一个当前的\
  \ `master` 数据库备份。通常，最好在每次更改表的结构或数据库的基础架构时都对 `master` 数据库进行一次备份。备份 `master` 数据库并确保在紧急情况下可用，将缓解未来的许多问题，我建议将这些系统数据库的备份作为你正常备份维护计划的一部分。我在前面讨论备份的章节中没有涉及这一点，因为本书的内容是基于单个数据库备份，而不是更高级别的数据库管理，在后者中我们也会处理系统数据库的备份。继续之前，请快速运行一次\
  \ `master` 数据库的备份，或使用你已准备好的备份。\n\n要恢复 `master` 数据库，我们必须做的第一件事是在单用户模式下启动 SQL Server。对于不熟悉此操作的用户来说，单用户模式以有限的连接数（一个）启动\
  \ SQL Server，以便可以在不给服务器增加额外负担的情况下进行紧急工作。\n\n\n##### 以单用户模式启动 SQL Server\n\n以下是将\
  \ SQL Server 置于单用户模式的逐步说明：\n\n*   打开 **SQL Server 配置管理器**，或者如果你使用的是 Windows 10，则打开开始菜单并输入\
  \ `sqlservermanager13.msc`，按 Enter 键，然后在右窗格中找到 `SQL Server (MSSQLSERVER)` 项。\n*\
  \   右键单击并选择 **属性**，然后选择 **启动参数** 选项卡。\n*   在 **指定启动参数** 字段中输入 `-m`。\n*   单击 **添加**\
  \ 按钮。\n*   单击 **应用**，你会注意到出现一条消息，告诉我们更改在重启服务后才会生效。我们将立即重启服务。在此消息上单击 **确定**，然后在 `SQL\
  \ Server (MSSQLSERVER) 属性` 窗口上单击 **确定** 将其关闭。\n*   单击 **SQL Server Agent** 项，然后在工具栏中单击\
  \ **停止服务** 按钮。\n*   重启 `SQL Server (MSSQLSERVER)` 服务。\n\n这些步骤将我们的 SQL Server 实例设置为单用户模式。不过，让我们更深入地了解这些步骤的细节，以便真正理解我们的操作目标。\n\
  \n要让 SQL Server 以单用户模式启动，我们必须打开 **SQL Server 配置管理器**。这有点难找，但如果你使用的是 SQL Server 2016\
  \ 和 Windows 10，只需打开开始菜单并输入 `sqlservermanager13.msc` 然后按 Enter。图 5-1 显示了此时你应该看到的屏幕。\n\
  \n![A436605_1_En_5_Fig1_HTML.jpg](img/A436605_1_En_5_Fig1_HTML.jpg)\n\n**图 5-1 用户帐户控制**\n\
  \n我们希望在这里单击 **是** 以继续。打开的下一个屏幕是 **SQL Server 配置管理器**，如图 5-2 所示。\n\n![A436605_1_En_5_Fig2_HTML.jpg](img/A436605_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2 SQL Server 配置管理器**\n\n如果你不熟悉 **SQL Server 配置管理器** 界面，建议你花点时间在这里看看。此部分有非常多的配置选项。\n\
  \n要继续操作，我们需要右键单击 `SQL Server (MSSQLSERVER)` 实例（或者你想要以单用户模式启动的任何实例），然后选择 **属性**。默认界面如图\
  \ 5-3 所示。\n\n![A436605_1_En_5_Fig3_HTML.jpg](img/A436605_1_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3 SQL Server (MSSQLSERVER) 属性，登录选项卡**\n\n请注意，默认选中的选项卡名为 **登录**。我们需要单击屏幕顶部的\
  \ **启动参数** 选项卡，打开如图 5-4 所示的屏幕。\n\n![A436605_1_En_5_Fig4_HTML.jpg](img/A436605_1_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4 SQL Server (MSSQLSERVER) 属性，启动参数选项卡**\n\n标有 **指定启动参数** 的文本框是我们要输入文本 `-m`\
  \ 的地方。这是以单用户模式启动 SQL Server 所需的启动参数。输入该值并单击 **添加** 按钮（一旦在参数字段中输入参数，该按钮就会启用）。图 5-5\
  \ 显示了在启动参数字段中输入 `-m` 后你应该看到的内容。\n\n![A436605_1_En_5_Fig5_HTML.jpg](img/A436605_1_En_5_Fig5_HTML.jpg)\n\
  \n**图 5-5 已输入 -m 启动参数**\n\n此时，我们需要单击 **应用** 保存更改，然后会立即弹出如图 5-6 所示的对话框。\n\n![A436605_1_En_5_Fig6_HTML.jpg](img/A436605_1_En_5_Fig6_HTML.jpg)\n\
  \n**图 5-6 警告**\n\n该消息提示我们需要重启 SQL Server 服务，所以这里单击 **确定**，然后在 `SQL Server (MSSQLSERVER)\
  \ 属性` 窗口上单击 **确定**。这应该会将我们带回到图 5-2 中看到的 **SQL Server 配置管理器** 界面。\n\n在 **SQL Server\
  \ 配置管理器** 界面中，确保你在左侧的 **SQL Server 服务** 部分中，然后右键单击右侧面板中的 `SQL Server (MSSQLSERVER)`\
  \ 项并选择 **重启**。\n\n接下来，我们需要停止 SQL Server Agent 服务，所以右键单击 `SQL Server Agent` 并选择 **停止**。原因在于，如果\
  \ SQL Server Agent 正在运行，它将占用数据库可用的唯一连接。\n\n至此，我们的 SQL Server 实例已在单用户模式下运行，且没有活动连接。启动\
  \ **SSMS**，你会看到常规的登录屏幕。像往常一样在此处连接，你应该会进入启动 SSMS 后看到的常规界面。我的界面如图 5-7 所示。\n\n![A436605_1_En_5_Fig7_HTML.jpg](img/A436605_1_En_5_Fig7_HTML.jpg)\n\
  \n**图 5-7 我的 SSMS 界面**\n\n关于这个初始屏幕，有两点要提一下：第一，没有明显的迹象表明我处于单用户模式；第二，SQL Server Agent\
  \ 显示为禁用。那么，我们如何知道自己处于单用户模式呢？很简单。我们知道单用户模式意味着一次只能有一个用户登录到数据库引擎，对吧？那么，你认为如果我们使用当前已登录的同一账户再次登录会发生什么？\n\
  \n单击 **对象资源管理器** 窗格中的 **连接** 下拉菜单。选择 **数据库引擎…**，你将看到正常的登录屏幕。正常登录，你看到了什么？图 5-8 展示了\
  \ SQL Server 返回给我的信息。\n\n![A436605_1_En_5_Fig8_HTML.jpg](img/A436605_1_En_5_Fig8_HTML.jpg)\n\
  \n**图 5-8 连接到服务器**\n\n就在那黑色和浅灰色的文字中，解释了我们当前处于单用户模式。单击 **确定**，然后单击 **取消** 返回常规的 SSMS\
  \ 屏幕。打开一个新的查询窗口，注意你连接的是 `master` 数据库。我们可以在这里开始正常工作，明显的例外是 SQL Server Agent 不会运行，因此我们无法执行任何需要\
  \ SQL Server Agent 的操作。清单 5-1 展示了一个用于备份系统数据库的简单脚本。\n\n```sql\nUSE master\nGO\n--\
  \ 备份 model 数据库\nBACKUP DATABASE Model\nTO DISK = 'E:\\SQL Server\\Backup\\Model.BAK'\n\
  WITH INIT\nGO\n-- 备份 master 数据库\nBACKUP DATABASE Master\nTO DISK = 'E:\\SQL Server\\\
  Backup\\Master.BAK'\nWITH INIT\nGO\n-- 备份 msdb 数据库\nBACKUP DATABASE MSDB\nTO DISK\
  \ = 'E:\\SQL Server\\Backup\\MSDB.BAK'\nWITH INIT\nGO\n-- 清单 5-1\n-- 系统数据库备份脚本\n\
  ```\n\n这将为我们恢复这些数据库提供一个良好的起点。恢复系统数据库的脚本如清单 5-2 所示。\n\n```sql\nRESTORE DATABASE master\
  \ FROM DISK = 'E:\\SQL Server\\Backup\\Master.BAK' WITH REPLACE;\nRESTORE DATABASE\
  \ model FROM DISK = 'E:\\SQL Server\\Backup\\Model.BAK' WITH REPLACE;\nRESTORE DATABASE\
  \ msdb FROM DISK = 'E:\\SQL Server\\Backup\\MSDB.BAK' WITH REPLACE;\n-- 清单 5-2\n\
  -- 系统数据库恢复脚本\n```\n\nMicrosoft 通常建议使用 `sqlcmd` 实用程序来恢复系统数据库，所以让我们打开命令提示符，输入 `sqlcmd`，然后按\
  \ Enter。图 5-9 显示了我尝试启动 `sqlcmd` 时发生的情况。\n\n![A436605_1_En_5_Fig9_HTML.jpg](img/A436605_1_En_5_Fig9_HTML.jpg)\n\
  \n**图 5-9 尝试启动 sqlcmd**\n\n又看到了我们的“错误”。这其实不是错误，更像是一个恼人的提醒，告知我们处于单用户模式。不过没问题；我们只需关闭\
  \ SSMS 并重新运行 `sqlcmd` 命令。它现在应该可以正常工作了；如果不行，请重启 SQL Server 服务并重新运行该命令。然后我们将看到图 5-10\
  \ 所示的内容。\n\n![A436605_1_En_5_Fig10_HTML.jpg](img/A436605_1_En_5_Fig10_HTML.jpg)\n\
  \n**图 5-10 sqlcmd**\n\n\n##### 还原主数据库\n\n我们可以看到 `sqlcmd` 实用工具已启动，因为现在 `sqlcmd` 命令下的第一行显示提示符\
  \ `1>`。这意味着 `sqlcmd` 正在等待命令。在此提示符下，键入 `RESTORE DATABASE master FROM DISK = 'E:\\\
  SQL Server\\Backup\\Master.BAK' WITH REPLACE;` 并按 Enter 键。然后您将看到提示符 `2>`。您只需在此处键入\
  \ `GO` 并按 Enter 键。您的屏幕应与图 5-11 所示非常相似。\n\n![A436605_1_En_5_Fig11_HTML.jpg](img/A436605_1_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11\n\n操作完成\n\n这显示主数据库已成功还原，并且进程已正常终止。在我们完成之前，需要重启 SQL Server 服务，因此请打开“服务”并重新启动\
  \ `SQL Server (MSSQLSERVER)` 服务（或您正在使用的任何命名实例）。在服务器重启或服务重启之前，您将无法重新连接到数据库实例。\n\n\
  ##### 将 SQL Server 恢复为多用户模式\n\n在我看来，恢复 SQL Server 的访问权限比限制访问更容易。将 SQL Server 恢复到其原始状态（即多用户模式）的分步说明如下：\n\
  \n*   再次打开 `sqlservermanager13.msc`，并在右窗格中找到 `SQL Server (MSSQLSERVER)` 项。\n*  \
  \ 右键单击并选择 `属性`，然后选择 `启动参数` 选项卡。\n*   突出显示 `-m` 条目，然后单击 `删除` 按钮。\n*   单击 `应用`，请注意会出现一条消息，提示我们重新启动\
  \ SQL Server 服务。单击此消息上的 `确定`，然后在 `SQL Server (MSSQLSERVER) 属性` 窗口上单击 `确定` 以关闭它。\n\
  *   单击 `SQL Server Agent` 项，然后按工具栏中的 `启动服务` 按钮。\n*   再次单击 `SQL Server (MSSQLSERVER)`\
  \ 项，然后按工具栏中的 `重新启动服务` 按钮。\n\n这些步骤将我们的 SQL Server 实例设置回多用户模式。恭喜！您刚刚已将 SQL Server\
  \ 设置为单用户模式、还原了 master 数据库，并将 SQL Server 恢复为多用户模式。\n\n#### 从完整备份还原\n\n到本章此处为止，您可能已经对如何从完整备份还原数据库有了很好的了解。我认识的每一个\
  \ DBA 都曾不得不在某个时候运行还原操作，因此这应该不是什么新鲜事。万一这是新内容，本节不仅将介绍如何使用 SSMS 和 T-SQL 从完整备份还原，还将介绍一些还原数据的要点，例如还原到日志备份中的特定点（称为时间点还原）。\n\
  \n##### 使用 SSMS 执行完整还原\n\n还原数据库最常用的方法是使用与 SQL Server 最常关联的图形界面。SQL Server Management\
  \ Studio 提供了大量可用于操作和管数据库的工具，因此它几乎是每位 SQL Server 管理员的首选。请注意，我这里说的是“几乎”；因为任何规则都有明显的例外，这绝不是侮辱或嘲笑。例如，我曾见过\
  \ SQL Server 管理员使用旧版 SSDT，因为他们获得了与数据库的（大部分）相同交互，并且额外获得了可用于编写 DTSX 包或任何他们需要增强界面来完成的任务的\
  \ Visual Studio 界面。\n\n我们首先要做的就是找到最新的备份集。如果您像我一样设置了目录，那么它们位于 `E:\\SQL Server\\Backup`。\n\
  \n接下来，启动 SSMS 并展开 `数据库`。在 `数据库` 菜单内，您将找到您的用户数据库，以及 `ReportServer` 和 `ReportServerTempDB`（如果您安装了\
  \ SQL Server Reporting Services）。找到您要处理的数据库（本例中为 `backrecTestDB`），右键单击它，将鼠标悬停在 `任务`\
  \ 上，然后将鼠标悬停在 `还原` 上，并查看我们可用的选项。图 5-12 显示了此时的界面。\n\n![A436605_1_En_5_Fig12_HTML.jpg](img/A436605_1_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12\n\nSSMS 还原菜单\n\n在 `还原` 菜单内，我们可以看到列出了四个选项。这些选项是\n\n*   `数据库`\n*   `文件和文件组`\n\
  *   `事务日志`\n*   `页面`\n\n首先，为什么事务日志选项是禁用的？它只能在数据库是使用完整备份还原的，并且在还原时启用了 `RESTORE WITH\
  \ STANDBY` 的情况下启用。然后数据库将处于待机状态（在 `RecoveryPending` 模式下），等待事务日志尾部的还原。如果您使用 `RESTORE\
  \ WITH STANDBY` 恢复了一个数据库，然后想要还原事务日志，那么事务日志选项将是唯一可用的选项，其他三个选项将被禁用。\n\n我们希望选择 `数据库`\
  \ 选项，因此单击此项，您将看到与图 5-13 所示类似的内容。\n\n![A436605_1_En_5_Fig13_HTML.jpg](img/A436605_1_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13\n\n还原数据库窗口，常规选项卡\n\n请注意，`要还原的备份集:` 部分已经启用了最新的备份集并准备进行还原。从上到下，我们可以看到有一个完整备份、一个差异备份和四个事务日志备份可用于还原我们的数据库。另请注意，左侧有复选框，因此我们可以选择要还原哪组数据。您可以看到取消选中差异选项不会取消选中事务日志选项，而选中事务日志选项会自动选中差异选项。\n\
  \n您需要还原到所需时间点的确切文件组合完全取决于您。您可以使用任意数量的备份集。\n\n对于本示例，参考图 5-13，我们可以看到只有几个文件被选中用于还原到最后一个事务日志备份。要还原到此时间点，我们需要按顺序还原最新的完整备份和差异备份，然后是事务日志。假设我们希望还原到前一天。我的备份设置方式使得我只需要还原最多七个文件。原因在表\
  \ 5-1 中有解释，该表引用自第 4 章。\n\n表 5-1\n\n我的 24 小时备份计划\n\n\n\n| 时间 | 完全备份？ | 差异备份？ | 事务日志备份？\
