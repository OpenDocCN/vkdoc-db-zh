  | 5:00 am |   |   | X |\n| 6:00 am |   | X | X |\n| 7:00 am |   |   | X |\n| 8:00\
  \ am |   |   | X |\n| 9:00 am |   |   | X |\n| 10:00 am |   |   | X |\n| 11:00 am\
  \ |   |   | X |\n| 12:00 pm |   | X | X |\n| 1:00 pm |   |   | X |\n| 2:00 pm |\
  \   |   | X |\n| 3:00 pm |   |   | X |\n| 4:00 pm |   |   | X |\n| 5:00 pm |   |\
