  \n回到我们在 `图 [5-13]` 中看到的内容，这告诉我，我正在从可用的最新数据库备份中恢复。这可能是最常见的恢复操作，因为我们希望恢复到最近过去的某个时间点。但情况并非总是如此，我们可以选择是否使用\
  \ `图 [5-13]` 的 `源` 部分中为我们呈现的默认最新备份，或者选择过去的一组备份，这些备份不会显示在 `图 [5-13]` 底部的 `要还原的备份集:`\
  \ 部分。顶部标记为 `源` 的部分有两个选项：\n\n*   `数据库`：允许您恢复到最新的备份集，该备份集包含完全备份、差异备份以及任何适用的日志备份，具体取决于启动恢复的时间。\n\
  *   `设备`：允许您从文件系统中选择任何备份集进行恢复。如果所选部分中的备份集由于某种原因无法恢复，SQL Server 会通知您。\n\n`源` 部分中选择了\
  \ `数据库` 选项。`源` 下方是 `目标` 部分。此部分允许您选择要恢复到的数据库，以及要恢复到的时间点。我们将在下一节更深入地介绍时间点恢复。适用的完全备份、差异备份和事务日志备份显示在界面的\
  \ `恢复计划` 部分。在 `还原数据库` 窗口的左侧，我们可以看到三个菜单选项：`常规`、`文件` 和 `选项`。现在，让我们先不理会 `常规` 选项卡，点击左侧的\
  \ `文件` 菜单部分。`图 [5-14]` 显示了 `文件` 部分。\n\n![A436605_1_En_5_Fig14_HTML.jpg](img/A436605_1_En_5_Fig14_HTML.jpg)\n\
  图 5-14\n还原数据库窗口，文件选项卡\n\n这些信息来自您安装的默认设置。请注意，已经为我选择了默认文件位置。如您所见，除非在 `还原为` 字段（界面下部最右侧的字段）中输入了新位置，否则恢复过程会将新文件写入指定位置。选择左侧的\
  \ `选项` 菜单项以转到下一节。`图 [5-15]` 显示了此默认界面的样子。\n\n![A436605_1_En_5_Fig15_HTML.jpg](img/A436605_1_En_5_Fig15_HTML.jpg)\n\
  图 5-15\n还原数据库窗口，选项选项卡\n\n对于常规恢复，我通常选择 `覆盖现有数据库 (WITH REPLACE)` 并取消选择 `将源数据库保持为还原状态\
  \ (WITH NORECOVERY)` 选项，其余保留默认设置。这让我可以覆盖数据库中直至故障发生前的所有内容，并且不会使我的数据库保持锁定且无法恢复，以防发生另一起灾难性事件。当您为场景选择所需的选项后，按\
  \ `确定` 按钮。`图 [5-16]` 显示了点击 `确定` 后您应该看到的内容。\n\n![A436605_1_En_5_Fig16_HTML.jpg](img/A436605_1_En_5_Fig16_HTML.jpg)\n\
  图 5-16\n还原数据库，正在还原操作\n\n这需要一段时间才能完成，具体取决于备份的大小。我的备份大约需要 20 秒完成，因为我没有大量的数据需要恢复。最终，您应该会看到\
  \ `图 [5-17]` 中所示的内容。\n\n![A436605_1_En_5_Fig17_HTML.jpg](img/A436605_1_En_5_Fig17_HTML.jpg)\n\
  图 5-17\n还原成功\n\n成功！这条消息显然意味着我们的数据库已成功恢复。要检查此操作是否成功（遵循“信任，但要验证”的格言），只需运行 `清单 [5-3]`\
  \ 中的代码。\n\n```sql\nSELECT RH.[destination_database_name] as 'Database',\n      \
  \ RH.[restore_date] as 'Restore Date',\n       BS.[backup_start_date] as 'Backup\
  \ Start Date',\n       BS.[backup_finish_date] as 'Backup Finish Date',\n      \
  \ BS.[database_name] as 'Source Database',\n       BMF.[physical_device_name] as\
  \ 'Backup Filename'\nFROM [msdb].[dbo].[restorehistory] RH\nINNER JOIN [msdb].[dbo].[backupset]\
  \ BS\n ON RH.[backup_set_id] = BS.[backup_set_id]\nINNER JOIN [msdb].[dbo].[backupmediafamily]\
  \ BMF\n ON BS.[media_set_id] = BMF.[media_set_id]\nWHERE( MONTH([restore_date])\
  \ = MONTH(getDate())\n  AND DAY([restore_date]) = DAY(getDate())\n  AND YEAR([restore_date])\
  \ = YEAR(getDate()))\nORDER BY RH.[restore_date]\n```\n清单 5-3\n信任，但要验证\n\n运行此代码将显示\
  \ `图 [5-18]` 中所示的内容。请注意，您的结果可能会因恢复日期、文件名和数据库名称而异。\n\n![A436605_1_En_5_Fig18_HTML.jpg](img/A436605_1_En_5_Fig18_HTML.jpg)\n\
  图 5-18\n信任，但要验证的结果\n\n有证据表明我们的备份是完整的，并且恢复成功。另请注意，列出的六个文件按顺序排列，与我们之前在 `图 [5-1]` 的\
  \ `常规` 选项卡中看到的相同。请翻回该图，并将 `图 [5-13]` 中的文件名与 `图 [5-18]` 中的文件名进行比较。它们是相同的，这再次证明了我们的操作是成功的。\n\
  \n\n###### 时间点恢复\n\n如果你的数据库未曾遭遇过灾难性故障，那真要恭喜你了。我一只手就能数出自己不得不花一整天时间搜索日志文件并应用备份的次数，而且有时候，这些备份要么过时了，要么已损坏。“沮丧”这个词根本不足以形容我当时的心情；我觉得“愤怒”可能更为贴切。\n\
  \n很可能，你总会遇到需要恢复到某个特定时间点的情况，并且必须迅速行动以恢复必要的数据。在这种情况下，有几种不同的处理方法：一种是按照这些指导进行时间点恢复；另一种是将数据库完整恢复到另一个数据库实例，然后从辅助数据库中恢复的表里提取你需要的数据。本章后面的“紧急完整恢复示例”一节对此有详细描述。现在，我们将专注于时间点恢复。\n\
  \n让我们先来彻底搞乱我们的数据库，好吗？让我们删除 `users1` 表。这应该能在我们的事务日志尾部生成一个相当大的、需要恢复的事务。为了在恢复操作完成后进行比较，我们的初始记录数是\
  \ 20030001 行。只需在“新建查询”窗口中键入以下内容，然后按 F5 或工具栏上的“执行”按钮来运行查询：\n\n```\nDROP TABLE users1;\n\
  ```\n\n接下来，执行以下语句：\n\n```\nSELECT count(*) as cnt FROM users1;\n```\n\n你将收到消息 `Invalid\
  \ object name 'users1'`。我们也可以在“对象资源管理器”中刷新“表”，并确认 `users1` 表现在确实已消失。\n\n要继续操作，请右键单击你的数据库（在我的例子中是\
  \ backrecTestDB），展开“任务”，然后展开“恢复”，你应该会看到如图 5-19 所示的内容。\n\n![A436605_1_En_5_Fig19_HTML.jpg](img/A436605_1_En_5_Fig19_HTML.jpg)\n\
  图 5-19: “恢复”菜单位置\n\n单击“数据库”，你将看到一个类似于图 5-20 的界面。这也类似于我们之前在图 5-13 中看到的。\n\n![A436605_1_En_5_Fig20_HTML.jpg](img/A436605_1_En_5_Fig20_HTML.jpg)\n\
  图 5-20: “还原数据库”屏幕\n\n现在你对这个页面应该已经很熟悉了。我们将按下界面右侧的“时间线”按钮继续。按下“时间线”按钮后，你会看到如图 5-21\
  \ 所示的内容。\n\n![A436605_1_En_5_Fig21_HTML.jpg](img/A436605_1_En_5_Fig21_HTML.jpg)\n\
  图 5-21: 备份时间线，上次备份\n\n默认选项是“上次备份”。这与在之前的屏幕上直接按“确定”完全一样；它仅根据可用的备份文件进行恢复，仅此而已。\n\n\
  我们需要点击“特定日期和时间”单选按钮，以查看我们可以恢复到什么时间点。注意界面如何变更为图 5-22 所示。\n\n![A436605_1_En_5_Fig22_HTML.jpg](img/A436605_1_En_5_Fig22_HTML.jpg)\n\
  图 5-22: 备份时间线，特定日期和时间\n\n看到“时间间隔”值如何变化以包含事务日志的尾部了吗？这是因为我们包含了尚未备份的那部分事务日志。通常，截止时间将是该事务日志的结尾，并且由于我的事务日志备份每小时运行一次，我最多只会丢失一个小时的数据（假设事务日志损坏）。你可以随意在此处查看而不按“确定”按钮。例如，你可以将“时间间隔”从“天”更改为“小时”、“六小时”或“周”，看看这如何影响你可以恢复的数据。在这个区域，粒度可以极其精细，通过一个简单的下拉选择就可以扩展到非常高的程度。\n\
  \n一旦你准备好继续，请将“时间间隔”下的滑块条移动到你希望恢复到的所需时间点，然后按“确定”。对于本示例，我将恢复到 2017 年 10 月 9 日晚上 6:40:31，因为我知道那是在我删除\
  \ `users1` 表之前。我不需要在“常规”选项卡上做任何其他事情，“文件”选项卡也没问题。跳转到“选项”选项卡，在这里我们需要勾选“覆盖现有数据库（`WITH\
  \ REPLACE`）”选项，并在按“确定”开始恢复过程之前，取消选中“使源数据库处于还原状态（`WITH NORECOVERY`）”复选框。如果我想要在此组恢复操作之后恢复更多文件，我会希望保持“使源数据库处于还原状态（`WITH\
  \ NORECOVERY`）”复选框为选中状态，但既然我不想再恢复其他内容，我将保持其未选中状态。请注意，除非取消选中“恢复前进行尾日志备份”复选框，否则将进行尾日志备份。在这种情况下，我将保持“恢复前进行尾日志备份”选项为选中状态。一旦所有设置都符合我的要求，我将点击“确定”。按下“确定”后，我看到如图\
  \ 5-23 所示的内容，大约一分钟后，我看到如图 5-24 所示的内容。\n\n![A436605_1_En_5_Fig24_HTML.jpg](img/A436605_1_En_5_Fig24_HTML.jpg)\n\
  图 5-24: 恢复成功\n\n![A436605_1_En_5_Fig23_HTML.jpg](img/A436605_1_En_5_Fig23_HTML.jpg)\n\
  图 5-23: 还原数据库\n\n此时，我知道我的数据库已成功恢复。但是，我仍然想验证 SQL Server 是否确实执行了它应该做的事情（记住，“信任但要核实”）。让我们运行之前运行的简单脚本：\n\
  \n```\nSELECT count(*) as cnt FROM users1;\n```\n\n并查看结果。查询运行了几秒钟，然后返回值 20030001。和我们最初的值完全一样！因此，我们可以有把握地假设，该数据库已完全恢复到我们在时间线区域所选的时间点。\n\
  \n\n##### 紧急全量恢复示例\n\n最近，我有一个具体的实例，因为一个脚本中的错误，我不得不恢复生产数据。让我们假设你有一个包含数百条记录的表，每条记录都有一个唯一标识符。这些记录中的每一条都涉及一组特定的数据，这些数据对于特定项目通过工作流的正常运行至关重要。让我们进一步假设，在生产实例上运行的更新脚本没有定义\
  \ `WHERE` 子句。我相信你能看出问题出在哪里……我将表中所有行更新为了一个特定值，而不是仅仅更新我需要更新的那一行。现在，在这个例子中，有很多种方法可以恢复数据，但我选择了最快，而不一定是最干净的方法。该方法包含以下步骤：\n\
  \n*   定位最新的备份集（完整备份、差异备份和事务日志备份）\n*   将最新的完整备份还原到一个名为 `fixYourMistake` 的新数据库\n*\
  \   将最新的差异备份还原到 `fixYourMistake` 数据库\n*   将自差异备份以来的所有事务日志备份还原到 `fixYourMistake`\
  \ 数据库\n*   在生产数据库中创建一个名为 `(tablename)_archive` 的备用表，其中 `(tablename)` 是我的表名\n*  \
  \ 编写一条 `INSERT INTO…SELECT` 语句，将原始表 `(tablename)` 的内容写入归档表\n*   编写一条 `TRUNCATE`\
  \ 语句来清空原始表\n*   编写一条 `INSERT INTO…SELECT` 语句，将 `fixYourMistake` 数据库中已恢复的数据插入到生产数据库\n\
  \n你可能会问自己，为什么我没有直接将最新的事务日志还原到生产数据库以更快地完成操作。我之所以没有这样做，是因为我不确定数据库是否还会有其他残留的损害，所以我想要有一个可靠的备份以便恢复，以防万一。我也不想还原整个数据库，因为在此期间还有关键操作正在录入。在我还原了有问题的表并验证数据恢复正确且没有其他损坏后，我在数据库服务器上还有一点清理工作要做。为了在这次恢复后进行清理，我只需要\
  \ `DROP` 掉 `fixYourMistake` 数据库和之前创建的归档表。之后，数据库就愉快地运行起来了，信不信由你，除了我自己，甚至没有人意识到数据库曾出过问题。\n\
  \n我想指出，如果没有一个可靠的备份和恢复结构，这是不可能做到的。如果没有先前的备份来恢复数据，我就无法还原到上一个事务日志，这意味着我将丢失自上次完整备份以来——在一个生产环境中的数据。这是非常非常糟糕的消息，我认为不言而喻，自那以后，在生产环境上执行的脚本都受到了更为严格的审查。所以，我想你可以说，当这一切发生时，我既是自己最大的敌人，同时也是自己最好的朋友。在未来，我想少一些“敌人”会是件好事。\n\
  \n#### 总结\n\n在本章中，我们学习了向数据库恢复完整备份的精髓。我们回顾了在数据库中采用完整恢复模式的重要性，这样我们才能使用 SQL Server\
  \ 中提供的全套备份和恢复功能。\n\n我们研究了时间点恢复，并介绍了 SSMS “恢复”部分中各种界面的基础知识。这些不同的部分包含了大量信息，我鼓励你在 SSMS\
  \ 中创建一个备用数据库，恢复到这个新数据库，并尝试各种设置，直到你熟悉各种设置和选项在幕后实际所做的事情。\n\n我们在这里学到的原理大部分可以迁移到差异备份和事务日志恢复领域，只是由于备份本身的特性而略有变化。例如，选择差异备份的过程在界面上是相似的，但其功能和目的与其他两种恢复类型完全不同。\n\
  \n## 6. 差异备份恢复\n\n回到第 2 章，我们介绍了差异备份的基础知识，以及差异基准对整个恢复策略的重要性。这些同样的原则也适用于差异恢复，只不过我们现在可以说是在处理交易的另一端。恢复模式的选择是决定可用恢复方法有效性的最重要方面。回想一下，我们的测试数据库使用了完整恢复模型；这意味着我们可以使用数据库的全套备份和恢复功能。如果我们选择了大容量日志恢复模型，我们将获得大部分相同的功能，但如果事务日志中有大容量日志事务，我们将牺牲像第\
  \ 5 章中那样进行时间点恢复的能力。大容量日志恢复模型将只允许我们恢复到备份的末尾；换句话说，每个备份都必须完整恢复，否则根本不会进行任何数据恢复。\n\n\
  在 SQL Server 中从差异备份恢复数据与从完整备份恢复数据几乎相同，但有一些明显的区别。首先，最明显的一点是，差异备份只能还原到对应的完整备份。这是因为差异备份是从上一次完整备份（在第\
  \ 2 章中称为“基准”）以来，从已备份的事务日志和更改数据中获取的最后一组数据。因此，如果你尝试按错误顺序还原差异备份，它将失败。数据的序列将无法对齐，SQL\
  \ Server 将停止恢复操作。其次，数据库必须处于 `NORECOVERY` 或 `STANDBY` 模式才能还原差异备份。这样做的原因是数据库只能将差异备份还原到完整备份；如果不先还原完整备份，就无法单独还原差异备份。一旦完整备份被还原，数据库就可以被置于\
  \ `NORECOVERY` 或 `STANDBY` 模式。\n\n让我们简要回顾一下在恢复数据库时可用的恢复状态选项。这些选项控制恢复完成后数据库的状态，并且可以随着每次恢复类型而变化。\n\
  \n*   `RESTORE WITH RECOVERY`：这是默认选项，意味着数据库在恢复过程完成后立即可供使用。这意味着整个数据库恢复操作已完成，意味着无法再恢复额外的事务日志。\n\
  *   `RESTORE WITH NORECOVERY`：此选项不会使数据库处于就绪状态，这意味着在恢复操作完成后数据库不可操作。使用此选项，可以继续正常恢复事务日志。在对数据库执行使用\
  \ `WITH RECOVERY` 选项的最终命令之前，数据库无法进入就绪状态。\n*   `RESTORE WITH STANDBY`：最后，此选项使数据库处于待机模式，本质上是只读的。任何尚未提交到事务日志的事务都将被撤销，并且撤销操作保存在一个待机文件中。\n\
  \n还记得第 5 章中我们如何勾选了 `将源数据库保持为还原状态 (WITH NORECOVERY)` 选项吗？这使我们仍然可以选择恢复更多备份，特别是差异备份和任何后续的事务日志备份，我们将在第\
  \ 7 章中介绍这些内容。\n\n\n\n#### 什么是差异还原？\n\n简而言之，差异还原就是从差异备份中恢复数据。我们知道，差异备份仅包含自上次完整备份以来发生变化的数据，因此它的文件比完整备份要小。\n\
  \n那么，这如何融入我们的备份策略呢？我们的完整备份在每天凌晨 12:00 运行，差异备份每六小时运行一次，事务日志备份则每小时运行一次。换句话说，我个人认为这是一个相当稳健的备份计划。使用完整或简单恢复模型，以及实施差异备份和还原，有以下几个非常显著的意义：\n\
  \n*   我们可以拥有更少的事务日志，从而在备份计划中总体文件更少，因为我们可以删除最后一次完整备份之前的所有事务日志，前提是这些事务日志中的数据已经包含在差异备份中。\n\
  *   我们拥有更多的恢复点，或者说，我们可以还原到的位置更多了。\n*   备份可以在白天进行，而无需每次都运行完整备份。这将减少服务器 CPU 时间并节省空间。\n\
  \n我们可以看到，在我们的常规数据库恢复计划中使用差异备份和还原，对于我们之前确定的理想恢复场景来说是最佳选择。\n\n#### 使用 SSMS 进行还原\n\n\
  我希望到目前为止，我们都对使用 SQL Server Management Studio 进行数据库还原有了一点经验。如果你读过我的第一本书，我严重依赖维护计划的创建来处理日常数据库维护的全部工作。这包括一种最终可用于数据恢复的备份方法，包含完整备份、差异备份和事务日志备份。我们现在还不想走得那么远，因为这是我们将在后续章节中整合所有内容时才会涉及的，但我们确实想看看如何在\
  \ SQL Server Management Studio 中处理差异还原。\n\n如果还没有启动 `SSMS`，请现在开始。你应该会看到左侧有对象资源管理器的界面，而主区域是空的。我通常会在主区域保持一个“新建查询”窗口打开，但这不是必须的。一旦你打开了\
  \ `SSMS` 并准备好继续，请展开 `数据库`，右键单击你的测试数据库名称（我的是 `backrecTestDB`），将鼠标悬停在 `任务` 上，然后选择\
  \ `还原`，最后选择 `数据库…` 以继续。图 6-1 显示了该菜单项的位置。\n\n![A436605_1_En_6_Fig1_HTML.jpg](img/A436605_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1：数据库菜单位置\n\n如图 6-1 所示选择 `数据库` 后，你将看到如图 6-2 所示的屏幕。\n\n![A436605_1_En_6_Fig2_HTML.jpg](img/A436605_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2：还原数据库\n\n这是每次我们想要还原数据库时之前都见过的常规屏幕。请注意，如图 6-2 所示，该数据库的所有可用备份都显示出来了，我删除了文件系统中的几个备份以使界面更清晰。\n\
  \n在你的界面中，验证列出的三个备份（或你拥有并想要还原的任意数量的备份）旁边的所有复选框是否都已选中。由于我们要还原差异备份，我们必须先还原完整备份，并且为了能够继续还原差异备份和事务日志，我们必须将数据库保持在\
  \ `正在还原` 状态。如果你取消选中所有恢复选项，你将看到可以在此数据库内完成的可用还原组合。这些组合如下：\n\n*   完整备份\n*   完整备份 +\
  \ 差异备份\n*   完整备份 + 事务日志\n*   完整备份 + 差异备份 + 事务日志\n\n换句话说，当我们使用 `SSMS` 时，每次想要执行还原操作都必须从完整备份开始。可以这样想：如果下午\
  \ 3:05 你的数据库出现错误，在我的当前备份计划下，你需要还原当天早上的最后一个完整备份，然后是中午 12:00 的差异备份，最后是每小时的事务日志，直到恢复到你需要的数据位置。\n\
  \n请注意，我们位于 `还原数据库` 屏幕的 `常规` 选项卡上。我们已经浏览过这些选项卡中的各种选项，所以不需要再重复一遍。请注意，我们还将备份事务日志的尾部，这是一个默认选项，以便运行还原过程的事务保存在新的事务日志中，而之前的事务则保存在新备份的事务日志尾部。\n\
  \n由于我们要还原差异备份，我们只需确保在 `常规` 选项卡上选中了完整备份和差异备份选项，然后按 `OK`。然后我们会等待几秒钟，或者可能更长时间，然后看到如图\
  \ 6-3 所示的内容。\n\n![A436605_1_En_6_Fig3_HTML.jpg](img/A436605_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3：正在进行的还原数据库\n\n希望我们最终会看到一条成功消息。点击此消息上的 `OK`，`还原数据库` 屏幕就会消失。这表明我们的数据库已还原到与差异备份相关的数据状态。\n\
  \n#### 使用 T-SQL 进行还原\n\n使用 `T-SQL` 还原差异备份的过程出奇地简单。到目前为止，我并没有包含大量的 `SQL` 代码，因为我希望这些书籍更侧重于数据库管理的可视化方面，但我认为这里值得花一点时间。\n\
  \n使用 `T-SQL` 的真正优势，除了自动化目的之外，在于如果你无法访问 `SQL` 界面但仍然可以访问数据库服务器，你可以使用 `sqlcmd` 来执行\
  \ `SQL` 语句。\n\n使用逻辑备份设备且没有其他文件需要还原时，进行差异还原的基本语法如清单 6-1 所示。\n\n```sql\nRESTORE DATABASE\
  \ backrecTestDB\nFROM backrecTestDB\nWITH NORECOVERY\n清单 6-1：RESTORE DATABASE SQL\
  \ 脚本\n```\n\n没有定义备份设备，或者当你需要从文件系统而非逻辑备份设备还原，并且没有其他文件需要还原时，进行差异还原的基本语法如清单 6-2 所示。\n\
  \n```sql\nRESTORE DATABASE backrecTestDB\nFROM DISK = 'E:\\SQL Server\\Backup\\\
  backrecTestDB\\backrecTestDB_DIFF.bak'\nWITH NORECOVERY\n清单 6-2：RESTORE DATABASE\
  \ SQL 脚本\n```\n\n请记住，在还原差异备份时，当我们指定 `NORECOVERY`，我们表达的意思是我们希望先还原最后一个完整备份，然后再还原差异备份。这样做的原因在于，正如我们之前讨论的，所有还原都必须有一个逻辑起点，而唯一能做到这一点的地方就是最后一个完整备份，它是该时间段内的最高级别还原。从这一点出发，我们就可以筛选差异备份，最后进入事务日志，以到达数据还原的确切位置。如果我们还有额外的事务日志需要还原，我们也希望指定\
  \ `NORECOVERY`；否则，我们将指定 `RECOVERY`。\n\n如果你执行清单 6-1 中的代码，考虑到你已经定义了一个逻辑备份设备，并且没有其他文件需要还原（即额外的事务日志），你将得到与我们之前执行差异还原相同的结果。清单\
  \ 6-2 也会产生相同的结果，如果你需要从文件系统而非逻辑备份设备还原。\n\n\n#### 摘要\n\n本章是本书中最简短的一章，原因很简单：差异恢复的概念是建立在先前完整备份的基础之上的。换言之，只要你拥有完整备份，你就能希望开始恢复所需的数据，无论该数据是位于差异备份还是事务日志中。恢复差异备份可以被视为恢复完整备份的逻辑延伸，因为差异恢复的存在以完整备份已先被恢复为前提；但正如我们之前提到的，如果你需要的是事务日志中的数据，你随时可以改为从事务日志恢复。\n\
  \n我们介绍了如何通过 `SSMS` 和直接使用 `SQL` 语句来恢复差异备份，并简要概述了与此类恢复相关的不同选项。请确保在你所需编写的恢复脚本中，包含我们在清单\
  \ 6-1 和清单 6-2 中介绍的语法。\n\n下一章，我们将探讨如何恢复事务日志，以及在此领域可以启用或禁用的不同选项。\n\n"
- "# 7. 事务日志恢复\n\n在 `SQL Server` 中恢复事务日志可能出乎意料地简单。然而，在尝试恢复事务日志之前，有几件事需要考虑，例如以下问题：\n\
  *   你是否需要恢复到某个特定的时间点？\n*   你是否正试图从灾难性的数据库故障中恢复？\n*   你甚至是否有可恢复的事务日志？\n这些问题，有时还有更多问题，都需要得到解答，以便引导你走上正确的事务日志恢复路径。我曾多次收到所属某个数据库发生事故的警报，当时并未停下来考虑该采取哪条路径：我只是径直踏上了“恢复某某东西”这条照明不佳的道路。换句话说，我知道我需要恢复一些数据，但并不确切知道具体需要恢复什么数据。我不知道哪些表（如果有的话）受到了影响，或者某个时间点之后的所有内容是否都受到了影响。\n\
  \n因此，最好永远考虑以下这条免费建议：在尝试恢复事务日志之前，花尽可能多的时间收集正确信息并制定可行计划。请相信我，恢复“错误”的数据可能会让你的情况变得糟糕得多。\n\
  \n**提示**\n你的数据库必须启用完整恢复模式或大容量日志恢复模式，才能拥有可供恢复的事务日志。\n\n#### 事务日志恢复基础\n\n在处理本章节语境下的事务日志恢复时，有一些基本事项我们需要先澄清。首先，我不会深入探讨事务日志是什么、它们如何工作、哪个比特位存储了什么数据以及为何这很重要这些细节。对我来说，这个主题或许最好不放在本书中讨论，因为我希望本书更侧重于解决问题，而非学习问题的微妙之处。话虽如此，让我们还是回顾几个我认为重要的小主题（或许还有几个虽不重要但仍可能与事务日志恢复这个整体问题相关）。\n\
  \n恢复事务日志有两种方式：使用 `SSMS`，或者使用 `Transact-SQL`。是的，可以说两种方式都使用了 `Transact-SQL`，因为那是 `SQL\
  \ Server` 的语言，但我特指的是使用 `SQL Server Management Studio` 来创建 `SQL Server Agent` 作业以自动化恢复过程，或者手动从\
  \ `CLI` 或也在 `SSMS` 内部使用 `Transact-SQL`。\n\n对于下一节，我在 `SSMS` 中执行了清单 7-1 所示的代码。\n\n\
  ```sql\nDECLARE @cnt INT;\nSET @cnt = 0;\nWHILE @cnt <= 1000\nBEGIN\nINSERT INTO\
  \ users1 SELECT * FROM users2;\nSET @cnt = @cnt + 1;\nEND;\nSELECT count(*) as cnt\
  \ FROM users1;\n```\n**清单 7-1** 为数据库创建更多数据\n\n这是我们早在第 1 章创建的 `CreateTestData.sql`\
  \ 的一个片段。运行此片段前我的记录数是 `10,020,000`，运行此片段后的记录数是 `20,030,000`。这应该会导致事务日志大小产生相当显著的差异。\n\
  \n我想做的是将数据库恢复到记录数为 `10,020,000` 的先前版本。下一节将详细说明如何在 `SQL Server Management Studio`\
  \ 中使用“文件和文件组”界面完成此操作，然后使用“还原数据库”界面进行时间点恢复。\n\n\n#### 使用 SSMS 进行恢复\n\n执行恢复操作最简单的方式很可能是通过图形界面。我确信会有一些老派的命令行高手指出我方法的错误，对此我只想说：“嘿，哇，你在控制台里做的和我在\
  \ GUI 里做的本质上是同样的事情……很棒。” 仅此而已。我不是那种规定必须使用特定方法论的开发者，无论是 GUI（在 `SSMS` 中）还是 `CLI`（使用\
  \ `Transact-SQL`）。我倾向于使用手头可用的任何工具，并且真的不太关心陷入“你应该用这个工具因为它太棒了，其他任何方式都很糟糕”这种二元对立的争论中。例如，我在\
  \ `Dreamweaver` 中编写 `ColdFusion`。我不使用专门为 `ColdFusion` 开发构建的 `IDE`——`ColdFusion Builder`。为什么？因为我最初就更喜欢\
  \ `Dreamweaver` 的布局和结构，即使过了这么多年，我仍然如此。这并不意味着 `ColdFusion Builder` 比 `Dreamweaver`\
  \ 差或好；这只是意味着我个人的偏好是其中一个而非另一个，而且我确信在对某些软件工具的偏好上，我并非个例。\n\n如果你直接进入菜单结构，心里想着“我想恢复一个事务日志”，你可能会在右键单击数据库名称后，从\
  \ `Tasks`（任务）菜单选项开始。图 7-1 展示了这个起点。\n\n![A436605_1_En_7_Fig1_HTML.jpg](img/A436605_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1：`Tasks`（任务）子菜单\n\n从这里，逻辑上你会指向右侧的 `Restore`（恢复）区域，并从那里继续。这是正确的，但接下来的部分可能会让人困惑。图\
  \ 7-2 显示了 `Restore`（恢复）选择的展开菜单。\n\n![A436605_1_En_7_Fig2_HTML.jpg](img/A436605_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2：`Restore`（恢复）菜单选项\n\n此菜单有四个选项。这些选项如下：\n\n*   `Database`（数据库）：此选项允许你从完整或差异备份还原数据库。此选项不允许你还原事务日志。\n\
  *   `Files and Filegroups`（文件和文件组）：此选项允许你将一组文件还原到新的或现有数据库。你可以选择完整或差异备份，相应的事务日志将被选中用于还原操作。因此，你可以选择单个事务日志进行还原，并且你的选择将自动包含自上次完整或差异备份以来的每个事务日志。请注意，所有当前备份都包含在此界面中，因此在还原数据时要非常小心。\n\
  *   `Transaction Log`（事务日志）：此选项通常不可用，只有在少数特定情况下才可用。当数据库已使用完整备份还原，并且选择了 `RESTORE\
  \ WITH STANDBY`（使用 STANDBY 还原）作为还原选项时，数据库将保持在 `RecoveryPending`（恢复挂起）模式，直到事务日志的尾部被还原。有趣的是，当此选项启用时，意味着数据库当前正处于等待还原事务日志尾部的状态，此区域中所有其余三个选项都会被禁用。此外，当数据库已使用\
  \ `NORECOVERY`（无恢复）还原，并且数据库当前处于 `Restoring…`（正在还原…）模式时，此选项可用，意味着你可以继续还原事务日志。\n*\
  \   `Page`（页面）：此选项将让你检查数据库页面是否存在可能的损坏，并允许你从最新的完整、差异和事务日志备份集中还原。你的选择必须包含一个完整的备份集，这将代表一个完整的还原解决方案。\n\
  \n出于本次演示的目的，我们将选择 `Files and Filegroups`（文件和文件组）选项。这将为我们提供还原事务日志所需的一些选项。你可以通过右键单击要操作的数据库并导航到\
  \ `Tasks`（任务）➤ `Restore`（恢复）➤ `File and Filegroups`（文件和文件组）来打开 `Files and Filegroups`（文件和文件组）窗口。图\
  \ 7-3 显示了此菜单选项的位置。\n\n![A436605_1_En_7_Fig3_HTML.jpg](img/A436605_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3：`Files and Filegroups`（文件和文件组）菜单位置\n\n##### 还原文件和文件组 — 常规\n\n图 7-4 显示了 `Restore\
  \ Files and Filegroups`（还原文件和文件组）部分的初始界面。请注意，默认情况下，选中的是左侧界面指示的 `General`（常规）页面。\n\
  \n![A436605_1_En_7_Fig4_HTML.jpg](img/A436605_1_En_7_Fig4_HTML.jpg)\n\n图 7-4：`Restore\
  \ Files and Filegroups`（还原文件和文件组），`General`（常规）页面\n\n让我们花点时间熟悉一下这个屏幕。`常规`界面与 `SQL\
  \ Server` 中许多其他常规界面几乎相同，意味着有一个 `目标`（destination）字段和一个 `源`（source）字段。这告诉用户通常有等式的两边需要填写，如果这个等式要平衡并产生预期的结果，两组数据都必须填写正确。\n\
  \n第一部分，`还原的目标`（Destination to restore），包含具有完整或大容量日志恢复模型的数据库名称。你的数据库应该默认被选中。\n\n\
  第二部分，`还原的源`（Source for restore），包含具有可用于还原的有效备份的数据库名称。\n\n在这两个选项下方，显示了备份集。初始布局显示以下列：\n\
  \n*   `还原`（Restore）：是/否的复选框值；勾选表示是，未勾选表示否。\n*   `名称`（Name）：备份文件的名称。请注意，此视图中不包含文件扩展名。\n\
  *   `文件类型`（File Type）：此值对于完整或差异备份是“行数据”（Rows Data），对于事务日志备份则为空白。\n*   `类型`（Type）：备份的类型；值为\
  \ `完整`（full）、`差异`（differential）或 `事务日志`（transaction log）。\n*   `文件逻辑名称`（File Logical\
  \ Name）：文件的逻辑名称，独立于 `名称`（Name）字段。\n*   `服务器`（Server）：运行备份的 `SQL Server` 实例的名称。\n\
  *   `数据库`（Database）：备份来源的 `SQL Server` 数据库的名称。\n*   `开始日期`（Start Date）：备份操作开始的日期和时间。\n\
  *   `完成日期`（Finish Date）：备份操作完成的日期和时间。\n*   `大小`（Size）：备份的大小。\n*   `用户名`（Username）：用于生成备份的账户的用户名。\n\
  \n你将使用这些列来确切确定要还原哪些备份以及还原它们的顺序。幸运的是，`SSMS` 为你简化了这项工作。\n\n滚动到 `选择要还原的备份集:`（Select\
  \ the backup sets to restore:）区域的底部。此区域列出的最后一项应该是事务日志备份。如果事务日志没有列在最后，请向上移动列表，或在时间上更早地找到最近的事务日志备份。勾选\
  \ `还原`（Restore）复选框，并注意自上次差异备份以来的所有其他事务日志，以及最后一次差异备份都会被选中。这是因为 `SQL Server` 知道它需要首先还原完整备份，然后是差异备份，最后是事务日志，并按正确的时间顺序进行，才能成功将数据库还原到特定时间点。此时，你应该看到类似图\
  \ 7-5 所示的内容。\n\n![A436605_1_En_7_Fig5_HTML.jpg](img/A436605_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5：选中了最后一个事务日志\n\n请注意，选中的选项是四个事务日志备份和一个差异备份，如 `类型`（Type）列所示。\n\n\n##### 还原文件和文件组—选项\n\
  \n![A436605_1_En_7_Fig6_HTML.jpg](img/A436605_1_En_7_Fig6_HTML.jpg)\n\n*图 7-6：还原文件和文件组，选项页*\n\
  \n从图 7-6 所示界面左侧导航引用的第二页，标题为**选项**。\n\n###### 界面概览\n\n在此区域中，我们看到一些选项，如果您还不熟悉它们，可能会感到有些困惑。在继续之前，让我们先了解一下。\n\
  \n此界面分为两个主要部分：**还原选项**和**恢复状态**。**还原选项**部分允许您（DBA）在数据还原过程开始前以及过程中自定义各种可用选项；而**恢复状态**部分则允许您定义数据还原后将发生的情况。\n\
  \n###### 还原选项\n\n在**还原选项**部分，有三个复选框，标题如下：\n\n*   覆盖现有数据库 (`WITH REPLACE`)\n*   还原每个备份前提示\n\
  *   限制对还原数据库的访问 (`WITH RESTRICTED_USER`)\n\n请注意，括号内的部分是如果您使用 Transact-SQL 还原备份时需要记住的代码，这将在下一节讨论。\n\
  \n###### 恢复状态\n\n在**恢复状态**部分，有三个单选按钮，标题如下：\n\n*   通过回滚未提交的事务使数据库处于可用状态。无法还原其他事务日志。(`RESTORE\
  \ WITH RECOVERY`)\n    *   此选项默认选中。原因是这是备份恢复最常见的用途；通过回滚任何未提交的事务，使数据库立即可供运行。\n* \
  \  使数据库处于不可用状态，并且不回滚未提交的事务。可以还原其他事务日志。(`RESTORE WITH NONRECOVERY`)\n    *   这是最具破坏性的选项。老实说，我无法想象在什么情况下我会希望生产数据库处于不可用状态，除非我们正在处理故障转移或负载均衡。在那种情况下，是的，我可以想象这对修复数据库实例有用，但除此之外，正如我所说，它具有破坏性，因为数据库将保持不可用状态，直到显式将其恢复联机。\n\
  *   使数据库处于只读模式。回滚未提交的事务，但将回滚操作保存在一个文件中，以便可以撤销恢复效果。(`RECOVERY WITH STANDBY`)\n  \
  \  *   此选项实质上允许您“暂停”数据库并将其置于只读模式。未提交的事务会被回滚，但回滚操作会被保存，以便以后可以撤销（如果需要）。例如，这对于确保数据库中一切按预期工作是一个好选项。\n\
  \    *   选择此选项后，您可以选择回滚撤销文件的存放位置。\n\n###### 恢复策略\n\n对于“常规”备份，即您只想将数据还原到上一次事务日志备份点，您只需要还原最近的差异备份，然后按顺序还原事务日志，直到您需要访问数据的时间点。对于绝大多数恢复情况，都是如此。\n\
  \n您很少会想要恢复到许多天前的某个特定时间点，并冒着丢失该点之后累积的所有数据的风险，换句话说。不过，确实存在一些特定情况正是如此，在这种情况下，我强烈建议在对生产或开发数据库进行任何操作之前，先运行一次当前数据库的备份。备份运行并验证后，再按照您选择的任何路径继续进行数据库恢复。根据我的经验，我发现将完整备份、差异备份和事务日志备份恢复到辅助数据库，对于验证所寻求的数据是有益的。找到数据后，我再创建\
  \ `INSERT INTO… SELECT` 脚本，从辅助数据库更新我的主数据库。更新完成并确认数据已成功恢复后，我可以删除辅助数据库，然后继续处理其他事务。我唯一需要强调的注意事项是，确保\
  \ `INSERT INTO… SELECT` 语句编写正确，以便能从辅助数据库正确更新主数据库；否则，您只是在给自己制造更多的工作。\n\n我发现这是一个极好的方法，可以确保正在恢复的主数据库和辅助数据库表之间的数据正确无误，因为我是在当前主数据库之外，但基于过去某个时间点的精确副本来处理辅助数据库。\n\
  \n###### 完成还原\n\n要继续操作，只需确保勾选了**覆盖现有数据库 (`WITH REPLACE`)** 选项，并选择了数据更新之前的事务日志（回滚至上一次完整备份），然后单击**确定**按钮。图\
  \ 7-7 显示了一个窗口，告诉我们数据库已成功还原。\n\n![A436605_1_En_7_Fig7_HTML.jpg](img/A436605_1_En_7_Fig7_HTML.jpg)\n\
  \n*图 7-7：数据库成功还原*\n\n在此窗口上单击**确定**，请注意我们的主**还原文件和文件组**窗口已关闭。回到 SSMS 并运行以下查询：\n\n\
  ```sql\nSELECT count(*) as cnt FROM users1\n```\n\n您的结果应为 `10,020,000`。恭喜！\n\n#####\
  \ 时间点还原/恢复\n\n要还原事务日志，我们首先需要还原一个完整备份，并可选地还原一个差异备份。你是否曾在数据库卡在 `正在还原` 模式时，在 `SSMS`\
  \ 中见过数据库的状态？正如我在本章前面提到的，当使用 `RESTORE WITH STANDBY` 或 `RESTORE WITH NORECOVERY` 选项还原完整或差异备份时，就会发生这种情况。数据库将保持\
  \ `正在还原` 状态，直到事务日志尾部被还原，或者 `RESTORE WITH RECOVERY` 语句作为还原过程的一部分被执行。让我们在实践中看一下。\n\
  \n在 SQL Server Management Studio 中，右键单击你的数据库（我的数据库名为 `backrecTestDB`），然后导航到 **任务**\
  \ ➤ **还原** ➤ **数据库…** 以继续。图 7-8 显示了此菜单项的位置。\n\n![A436605_1_En_7_Fig8_HTML.jpg](img/A436605_1_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8\n\n还原数据库菜单位置\n\n打开的界面标题为 **还原数据库**。请注意，左侧有三个选项卡：**常规**、**文件**和**选项**，对应于此界面中的不同页面。默认选择是**常规**，这正是我们在图\
  \ 7-9 中看到的。\n\n![A436605_1_En_7_Fig9_HTML.jpg](img/A436605_1_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9\n\n还原数据库界面\n\n此页面向我们展示了**源**、**目标**和**还原计划**部分。这些部分定义如下：\n\n*   **源**：要从中还原的源文件的位置。可以是包含备份文件的现有数据库，也可以是包含备份文件的本地或网络存储位置。\n\
  *   **目标**：要还原到的数据库的位置。此处的`还原到`字段的默认值是最后一个备份集，但可以通过单击**时间线…**按钮并选择要还原的时间范围来进行调整。这被称为时间点还原。\n\
  *   **还原计划**：该部分详细说明了将要还原的文件，以及即将介绍的**要还原的备份集：**部分。\n\n假设我想将我的数据库还原到今天早上 8:00 的状态。界面的这个部分就是你想要去的地方，因为它允许你精确定位要从中还原数据的特定时间和数据。\n\
  \n点击图 7-9 所示界面中**目标**部分的**时间线**按钮。将打开一个屏幕，如图 7-10 所示，标题为**备份时间线 : backrecTestDB**（或你的数据库名称）。\n\
  \n![A436605_1_En_7_Fig10_HTML.jpg](img/A436605_1_En_7_Fig10_HTML.jpg)\n\n图 7-10\n\
  \n备份时间线: backrecTestDB\n\n请注意，初始配置是**最近一次备份**。在这种情况下，最近一次备份的时间是晚上 7:00。这对你来说可能很理想，但我想还原到早上\
  \ 8:00，记得吗？点击**特定日期和时间**的单选按钮，并选择你想要还原到的日期。图 7-11 显示了我更新后的界面。\n\n![A436605_1_En_7_Fig11_HTML.jpg](img/A436605_1_En_7_Fig11_HTML.jpg)\n\
  \n图 7-11\n\n备份时间线: backrecTestDB, 已更新\n\n请注意，`时间线间隔`字段设置为**天**。此下拉菜单中还有其他选项，其值包括**小时**、**六小时**和**周**。如果你愿意，可以随意选择这些选项，但你刚刚所做的选择值可能会发生变化。你还可以在时间线视图底部、图例上方移动滑块以获得更精确的时间线定位。当你选择了想要还原到的正确时间后，单击**确定**按钮返回**还原数据库**屏幕。\n\
  \n一旦你返回到**还原数据库**界面，请注意**要还原的备份集：**部分已更新，显示了相关的待还原备份集。通常，此区域将填充与选定的需要还原事务的时间范围相关的完整备份和差异备份。图\
  \ 7-12 显示了**要还原的备份集：**部分重新填充后的我的屏幕。\n\n![A436605_1_En_7_Fig12_HTML.jpg](img/A436605_1_En_7_Fig12_HTML.jpg)\n\
  \n图 7-12\n\n还原数据库, 已更新\n\n此时，我们可以看到列表顶部是完整备份，然后是差异备份，底部是两个事务日志备份。如果需要验证介质，请点击**验证备份介质**按钮；我通常在看到此按钮时都会点击，以防万一。\n\
  \n左侧的**文件**选项卡现在可以保持原样。你通常在此处定义还原文件的存储位置和名称，但我们不打算更改此设置。\n\n**选项**选项卡需要一些解释。请导航到那里，并注意该界面包含以下部分和选项：\n\
  \n*   **还原选项**\n    *   **覆盖现有数据库 (WITH REPLACE)**：此选项将覆盖所选数据库的数据库文件。这是一个破坏性很强的选项，请自行承担使用风险。\n\
  \    *   **保留复制设置 (WITH KEEP_REPLICATION)**：如果为数据库定义了复制设置，则保留它们。此选项专门用于需要将已发布到不同于备份数据库的服务器的数据库进行还原的情况。\n\
  \    *   **限制对还原数据库的访问 (WITH RESTRICTED_USER)**：数据库还原后，只有 `db_owner`、`dbcreator`\
  \ 和 `sysadmin` 的成员可以访问。\n*   **恢复状态**\n    *   **RESTORE WITH RECOVERY**：此选项将还原所有备份集作为默认操作。\n\
  \    *   **RESTORE WITH NORECOVERY**：此选项将使数据库保持前面讨论的`正在还原…`状态。一旦事务日志尾部被还原，数据库将转入正常状态。\n\
  \    *   **RESTORE WITH STANDBY**：此选项将使数据库处于只读状态。如果选择此选项，则必须指定一个备用文件。\n    *   **备用文件**：此文件将撤消恢复操作。\n\
  *   **尾部日志备份**（包含先前未备份的事务日志部分或活动部分的备份）\n    *   **还原前进行尾部日志备份**：指定你希望备份事务日志的尾部。\n\
  \    *   **使源数据库保持在还原状态 (WITH NORECOVERY)**：与前面列出的选项相同；数据库将保持在`正在还原…`状态。\n    *\
  \   **备份文件**：事务日志尾部备份文件的位置。\n*   **服务器连接**\n    *   **关闭到目标数据库的现有连接**：基本上，此选项将数据库置于单用户模式，并关闭所有从\
  \ `SSMS` 到数据库引擎的连接。还原过程完成后，数据库将恢复为多用户模式，连接再次可用。\n*   **提示**\n    *   **还原每个备份前进行提示**：此选项将显示一个弹出窗口，询问是否要继续每次还原操作。\n\
  \n对于此**选项**选项卡，我只想勾选**覆盖现有数据库**并取消选中**使源数据库保持在还原状态**。此屏幕上的其他所有内容都可以保持不变（图 7-13）。\n\
  \n![A436605_1_En_7_Fig13_HTML.jpg](img/A436605_1_En_7_Fig13_HTML.jpg)\n\n图 7-13\n\
  \n还原数据库, 选项选项卡\n\n准备就绪后，单击屏幕底部的**确定**按钮。你应该会看到界面顶部的“正在还原”状态部分，以及一个递增至 100% 的进度百分比，直到成功完成。\n\
  \n接下来，回到 `SSMS` 并运行以下查询：\n\n```sql\nSELECT count(*) as cnt FROM users1\n```\n\n\
  你的结果应该是 20030000。恭喜你！\n\n在第一部分中，我们已成功通过 `SQL Server Management Studio` 以两种不同方式还原了事务日志。\n\
  \n#### 使用 Transact-SQL 还原\n\n这种方法稍微简单一些。在 `SQL Server Management Studio` 的下载中，有一个名为\
  \ `模板浏览器` 的侧边栏可用。如果你没有立即看到它，请按 `Ctrl+Alt+T`，或在 `SSMS` 中转到 `视图` ➤ `模板资源管理器`。该侧边栏应在主窗口右侧打开。向下滚动到\
  \ `还原` 子菜单并展开它。你应该会看到 `还原数据库` 和 `还原文件和文件组` 作为 `还原` 子菜单下的文件。这看起来应该很熟悉，因为我们在上一节中刚刚处理过这些界面。\n\
  \n基本思路是这样的：双击你想要编辑的任何模板，该模板就会作为新查询在 `SSMS` 主窗口中打开。然后，你可以对此文件进行任何所需的更改，并将其作为全新的脚本保存到本地文件系统。\n\
  \n##### 还原文件和文件组模板\n\n这个模板比稍后介绍的 `还原数据库` 模板稍微复杂一些，这是有充分理由的。该模板涉及还原单个文件，而 `还原数据库`\
  \ 模板只是简单地还原数据库，仅此而已。首先也是最重要的；我们需要删除模板中要求我们创建数据库、备份数据库和备份事务日志的部分。这实质上意味着我们将删除第 5\
  \ 行到第 41 行（含）。这意味着我们应该剩下四条语句，每条都以 `RESTORE` 开头。接下来，我们想删除其中一条 `RESTORE` 语句。原因是，我们假设我们将还原一个完整备份，然后是一个差异备份，最后是事务日志。\n\
  \n在继续之前，让我们通过运行清单 7-2 中所示的脚本来向数据库添加更多数据。请注意，这与清单 7-1 的脚本完全相同。\n\n```sql\nDECLARE\
  \ @cnt INT;\nSET @cnt = 0;\nWHILE @cnt <= 1000\nBEGIN\nINSERT INTO users1 SELECT\
  \ * FROM users2;\nSET @cnt = @cnt + 1;\nEND;\n-- 清单 7-2\n-- 为数据库创建更多数据\n```\n\n\
  运行此脚本之前的记录数是 20030000，运行脚本后的记录数是 30040000。现在数据已在表中，继续使用你应在第 1 章创建的 `SQL Server Agent`\
  \ 作业运行完整备份和差异备份。\n\n接下来，你应该将你的脚本修改为如清单 7-3 所示的样子。\n\n```sql\nUSE master\n-- 完整数据库还原\n\
  RESTORE DATABASE backrecTestDB\nFROM DISK = N'E:\\SQL Server\\Backup\\backrecTestDB_FULL.bak'\n\
  WITH NORECOVERY, REPLACE\n-- 差异数据库还原\nRESTORE DATABASE backrecTestDB\nFROM DISK\
  \ = N'E:\\SQL Server\\Backup\\backrecTestDB_DIFFERENTIAL.bak'\nWITH NORECOVERY\n\
  -- 还原日志\n-- 还原上午 7 点的日志\nRESTORE LOG backrecTestDB\nFROM DISK = N'E:\\SQL Server\\\
  Logs\\backrecTestDB_7AM.trn'\nWITH NORECOVERY\n-- 还原上午 8 点的日志\nRESTORE LOG backrecTestDB\n\
  FROM DISK = N'E:\\SQL Server\\Logs\\backrecTestDB_8AM.trn'\nWITH NORECOVERY\nRESTORE\
  \ DATABASE backrecTestDB WITH RECOVERY\n-- 清单 7-3\n-- 还原脚本\n```\n\n在 `SQL Server\
  \ Management Studio` 中执行清单 7-3 所示的脚本将显示如图 7-14 所示的内容。\n\n![脚本结果](img/A436605_1_En_7_Fig14_HTML.jpg)\n\
  \n*图 7-14：脚本结果*\n\n我们可以看到，完整备份、差异备份和事务日志备份已成功还原。运行此脚本之前的记录数是 30,040,000，运行脚本后的记录数是\
  \ 20,030,000。\n\n那么，我们做到了！我们已成功使用 `SQL Server Management Studio` 和 `Transact-SQL`\
  \ 还原了事务日志。\n\n#### 总结\n\n在本章中，我们学习了 `SQL Server` 中还原过程的各个部分如何协同工作，为恢复数据创建一个可行的解决方案。我们研究了在\
  \ `SQL Server Management Studio` 中完成此任务所需的界面的不同部分。\n\n用于事务日志还原的最终脚本作为 `TransactionLogRestore.sql`\
  \ 在本书的下载中提供。\n\n在下一章中，我们将把第 5 章到第 8 章学到的所有还原原理整合到一个巨大的还原脚本中。\n\n"
- "# 8. 还原方案示例\n\n本章中，我们将把第 5 章到第 7 章学到的内容整合成一个连贯的结构，用于创建一个典型的还原场景。请注意，在之前的章节中我们并未涉及数据还原的所有概念；这将在本章中弥补，因为我将更侧重于介绍\
  \ SSMS 中各种屏幕上显示以及通过使用 `sqlcmd` 可用的各种条件和选项。因此，本章将是对 SQL Server 中数据还原的各个角度的一次全面审视，从基本的完整还原到事务日志还原的精确时间点。\n\
  \n建立还原场景时，要牢记的最重要的事情之一是，在将其投入生产环境之前，你需要**练习实施**。你应该有关于如何执行还原的分步说明，并且这些说明应足够简单，以便非\
  \ DBA 人员也能坐在服务器控制台前成功执行还原场景。我知道这看起来像是一项艰巨的任务，但本章末尾我将帮助你编写此流程。\n\n执行还原场景必须做的第一件事是定义还原标准。我们需要列出一系列需要还原的情况，然后为每种情况定义最适合的还原类型。直接说还原到事务日志的最新点很容易，因为对于我们\
  \ DBA 来说，大约 99% 的情况可能都是如此。但有些情况下这并不是最佳方法，而这正是我们需要为之准备的。\n\n让我们定义几种情况，然后是每种情况所需的适当还原类型。在这些场景中，我们希望：\n\
  \n-   将生产数据库转移到开发环境进行测试\n-   从前一天晚上的未知时间点发生的灾难性错误中恢复\n-   恢复 15 分钟前被覆盖的数据\n-   在常规备份计划之外进行一次备份，作为“已知良好的起点”\n\
  \n正如你所见，对于至少一半的情况，我们只需从事务日志的最后一次备份进行还原即可完成。这就是数据还原的优势（除了实际恢复数据之外）；在大多数情况下，数据还原确实不需要太多预先规划。你知道数据存在于备份中，所以还原备份就行了。非常直接，从那里开始，我们可以根据需要保持简单或使其变得复杂。\n\
  \n在开始构建完整的还原场景之前，让我们先回顾一些在前几章中不太适合讨论、但在讨论数据还原时绝对值得一席之地的主题。并非所有的还原都是通过对象资源管理器中的数据库选项完成的（即右键单击数据库名称，悬停在“任务”上，然后选择“还原”，再选择“数据库”选项）。此菜单中还有两个我们尚未讨论的选项，即“文件和文件组”以及“页面”。这意味着我们不仅可以从数据库还原，还可以还原单个文件和文件组，或者细化到页面级别。\n\
  \n#### 页面还原\n\n对于页面还原，要记住的重要一点是，`msdb` 数据库中的 `suspect_pages` 表是可能的损坏信息所在的位置。该表的结构如表\
  \ 8-1 所示。\n\n表 8-1 `msdb..suspect_pages` 结构\n\n| 列名 | 描述 |\n| --- | --- |\n| `database_id`\
  \ | 发生损坏的数据库的 ID。 |\n| `file_id` | 损坏数据库中文件的 ID。 |\n| `page_id` | 疑似损坏的页面的 ID。 |\n\
  | `event_type` | 表示错误类型的数字。可能的值如下：这是一个错误值的“全能”类型。这意味着发生了 823 错误（由于硬件故障）或 824 错误（其他数据库损坏）。校验和不正确。页面已损坏（torn\
  \ page）。已还原的页面（被标记为可疑之后）。已由 DBCC 修复（被标记为可疑之后）。已由 DBCC 释放（被标记为可疑之后）。 |\n| `error_count`\
  \ | 错误发生的次数。 |\n| `last_update_date` | 条目的日期和时间。 |\n\n在想要执行页面还原时，有几件事需要牢记。例如，你只能还原数据库页面。这可能看起来很明显，但其含义是你不能还原事务日志或任何“特殊”页面：特别是分配页、全局分配映射页、共享全局分配映射页和页面可用空间页。微软在\
  \ [`https://docs.microsoft.com/en-us/sql/relational-databases/backup-restore/restore-pages-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/backup-restore/restore-pages-sql-server)\
  \ 上说“仅限数据库页面”时使用了非常精确的语言。\n\n##### 查询 msdb..suspect_pages\n\n`msdb..suspect_pages`\
  \ 表是告诉你哪些页面被怀疑损坏的关键，希望这能引导你制定一个可靠的计划来还原那些损坏的页面。换句话说，可能还没有什么真正具有破坏性的事情发生，但未来可能会有。很多时候，可以通过常规的数据库恢复操作来修复数据库，这些操作默认会覆盖页面。在数据库被还原的情况下，重要的是要认识到，如果损坏的页面已经被备份到正在还原的备份集中，那么损坏的数据将一直存在，直到被修复。\n\
  \n打开一个新的查询窗口，输入 `SELECT * FROM msdb..suspect_pages;` 并按键盘上的 F5。当我运行此查询时，返回了零个结果，这是件好事。如果我得到了任何结果，我会立即采取表\
  \ 8-2 中所示的行动。\n\n表 8-2 页面还原操作\n\n| 步骤 | 描述 |\n| --- | --- |\n| 1 | 从 `msdb..suspect_pages`\
  \ 查询输出中获取损坏页面的 `page_id`。 |\n| 2 | 使用包含相应损坏页面的完整备份、文件备份或文件组备份开始页面还原。如果从 T-SQL 而非\
  \ SSMS 运行，请使用以下语法：`RESTORE DATABASE <database_id> PAGE = '<file_id: page_id>' FROM\
  \ <backup device or file> WITH NORECOVERY` 请注意，`database_id`、`file_id` 和 `page_id`\
  \ 值均来自先前运行的 `msdb..suspect_pages` 查询。 |\n| 3 | 还原最新的差异备份。 |\n| 4 | 还原相关的事务日志备份。\
  \ |\n| 5 | 备份事务日志的尾部。 |\n| 6 | 还原步骤 5 中的事务日志。 |\n\n按照这些步骤操作，你就可以在 T-SQL 中安全地还原页面了。\n\
  \n\n#### 使用 T-SQL 完成数据库完整恢复\n\n回想一下，由于我们是在完整恢复模型下工作，因此拥有更多用于备份和恢复数据的功能可供使用。特别是，我们能根据当前情况，对需要恢复的数据量进行精细控制。完整恢复模型允许我们在需要时恢复整个数据库，更重要的是，正如我们在第\
  \ 5 章所见，它可以恢复到特定时间点。\n\n在完整恢复模型下恢复数据库时，需要遵循一组基本操作步骤。通用步骤如清单 8-1 所示。\n\n##### 清单\
  \ 8-1. 数据库恢复操作步骤\n\n*   切换到 master 数据库。\n*   使用 `BACKUP LOG backrecTestDB TO DISK\
  \ = 'E:\\SQL Server\\Logs\\backrecTestDB_TLOG_TAIL.bak' WITH NORECOVERY;` 创建尾日志备份。\n\
  \    *   SSMS 响应：`为数据库 'backrecTestDB' 的文件 'backrecTestDB_log' 处理了 18 页。BACKUP LOG\
  \ 成功处理了 18 页，耗时 0.069 秒（1.981 MB/秒）。`\n*   使用 `RESTORE DATABASE backrecTestDB FROM\
  \ DISK = 'E:\\SQL Server\\Backup\\backrecTestDB_FULL.BAK' WITH NORECOVERY;` 恢复最新的完整备份。\n\
  \    *   SSMS 响应：`为数据库 'backrecTestDB' 的文件 'backrecTestDB' 处理了 107968 页。为数据库 'backrecTestDB'\
  \ 的文件 'backrecTestDB_log' 处理了 2 页。RESTORE DATABASE 成功处理了 107970 页，耗时 21.669 秒（38.927\
  \ MB/秒）。`\n*   使用 `RESTORE DATABASE backrecTestDB FROM DISK = 'E:\\SQL Server\\\
  Backup\\backrecTestDB_DIFF.BAK' WITH NORECOVERY;` 恢复最新的差异备份。\n    *   SSMS 响应：`为数据库\
  \ 'backrecTestDB' 的文件 'backrecTestDB' 处理了 136 页。为数据库 'backrecTestDB' 的文件 'backrecTestDB_log'\
  \ 处理了 2 页。RESTORE DATABASE 成功处理了 138 页，耗时 0.283 秒（3.795 MB/秒）。`\n*   使用 `RESTORE\
  \ LOG backrecTestDB FROM DISK = 'E:\\SQL Server\\Logs\\backrecTestDB_backup_2017_10_16_190004_6842741.trn'\
  \ WITH NORECOVERY;` 恢复自最新差异备份以来最早的事务日志备份。\n    *   SSMS 响应：`为数据库 'backrecTestDB'\
  \ 的文件 'backrecTestDB' 处理了 0 页。为数据库 'backrecTestDB' 的文件 'backrecTestDB_log' 处理了 16\
  \ 页。RESTORE LOG 成功处理了 16 页，耗时 0.059 秒（2.118 MB/秒）。`\n*   继续恢复事务日志备份，直至恢复到故障发生点。\n\
  \    *   SSMS 响应：`为数据库 'backrecTestDB' 的文件 'backrecTestDB' 处理了 0 页。为数据库 'backrecTestDB'\
  \ 的文件 'backrecTestDB_log' 处理了 8 页。RESTORE LOG 成功处理了 8 页，耗时 0.047 秒（1.329 MB/秒）。`\n\
  *   使用 `RESTORE DATABASE backrecTestDB WITH RECOVERY;` 恢复数据库。\n    *   SSMS 响应：`RESTORE\
  \ DATABASE 成功处理了 0 页，耗时 0.873 秒（0.000 MB/秒）。`\n\n请注意，我在这些命令的 `DISK` 属性中使用了虚构的名称。这样做是为了让您更容易理解我在一组备份中要查找的是哪个备份。\n\
  \n如果您注意清单 8-1 中的 SSMS 响应要点，在事务日志恢复部分，我在恢复差异备份之后恢复了第一个日志，然后恢复了之后的下一个日志，此时我收到了处理了\
  \ `0` 页的消息，这意味着我已经到达了适用事务日志的末尾。在此日志恢复后，可能还有更多需要恢复的日志，但在本例中，这就是需要恢复的数据的终点。在实际场景中，您可能需要在一天中的特定时间恢复数据，因此请记住，您可能需要恢复比本示例所示更多的日志。只需为您需要的事务日志恢复重写脚本即可。\n\
  \n考虑到这些操作步骤，可以组合出一个良好的恢复脚本，如清单 8-2 所示。\n\n##### 清单 8-2. 恢复脚本\n\n```sql\n-- 切换到 master\
  \ 数据库\nUSE master\nGO\n-- 备份日志尾部\nBACKUP LOG backrecTestDB\nTO DISK = 'E:\\SQL Server\\\
  Logs\\backrecTestDB_TLOG_TAIL.bak'\nWITH NORECOVERY;\nGO\n-- 恢复完整备份\nRESTORE DATABASE\
  \ backrecTestDB FROM DISK = 'E:\\SQL Server\\Backup\\backrecTestDB_backup_2017_10_16_000002_2492163.bak'\n\
  WITH NORECOVERY;\nGO\n-- 恢复差异备份\nRESTORE DATABASE backrecTestDB FROM DISK = 'E:\\\
  SQL Server\\Backup\\backrecTestDB_backup_2017_10_16_180001_7394135.bak'\nWITH NORECOVERY;\n\
  GO\n-- 恢复事务日志备份\nRESTORE LOG backrecTestDB FROM DISK = 'E:\\SQL Server\\Logs\\backrecTestDB_backup_2017_10_16_190004_6842741.trn'\n\
  WITH NORECOVERY;\nGO\nRESTORE LOG backrecTestDB FROM DISK = 'E:\\SQL Server\\Logs\\\
  backrecTestDB_backup_2017_10_16_200001_9609626.trn'\nWITH NORECOVERY;\nGO\nRESTORE\
  \ DATABASE backrecTestDB WITH RECOVERY;\nGO\n```\n\n运行清单 8-2 所示的脚本后，您始终可以运行清单 8-3\
  \ 所示的脚本来验证您的数据库是否已重新联机。\n\n##### 清单 8-3. 数据库状态验证\n\n```sql\nSELECT databasepropertyex\
  \ ('backrecTestDB', 'Status');\n```\n\n这应该在 SSMS 的结果窗格中仅返回值 `ONLINE`。一旦看到这个，您就可以放心，所有内容都已成功恢复，并且您的数据库正在平稳运行。\n\
  \n\n\n#### 使用 SSMS 完成数据库完整恢复\n\n使用 SSMS 恢复数据库的过程与使用 T-SQL 完全相同；只是我们不再编写代码来执行操作，而是让图形界面为我们完成工作。\n\
  \n图 8-1 展示了在我们进行任何操作之前，对象资源管理器窗格中我的表的样子。\n\n![A436605_1_En_8_Fig1_HTML.jpg](img/A436605_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1. 当前表\n\n我们想要做的是创造一个需要恢复整个数据库的场景，然后按顺序从完整备份、差异备份到事务日志备份，逐步完成恢复过程。一个有趣的方法是直接删除一两个表。这几乎是一个执行恢复操作的绝佳理由，对吧？当你准备好后，首先确认你有一组当前可用的、确实可以从中恢复的数据库备份。接着，右键单击一两个表并选择“删除”。该窗口如图\
  \ 8-2 所示。\n\n![A436605_1_En_8_Fig2_HTML.jpg](img/A436605_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2. 删除对象窗口\n\n这个窗口只有一个名为“常规”的选项卡。在中间窗格中，我们可以看到我选择了要删除的 `users1` 表。准备好后，只需单击“确定”，表就会被删除。\n\
  \n请注意我的对象资源管理器窗口不再显示 `users1` 表，并且我也无法再查询该表。图 8-3 展示了我更新后的对象资源管理器。\n\n![A436605_1_En_8_Fig3_HTML.jpg](img/A436605_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3. 更新后的对象资源管理器\n\n##### 恢复序列\n\n我们将使用与使用 T-SQL 恢复时相同的事件序列。该序列如清单 8-1 所示，其简化版本在清单\
  \ 8-4 中重复。\n\n```\n清单 8-4. 恢复序列\n*   切换到 master 数据库\n*   创建尾日志备份\n*   恢复最新的完整备份\n\
  *   恢复最新的差异备份\n*   恢复来自最新差异备份的最旧事务日志备份\n*   继续恢复事务日志备份，直到你恢复到故障发生点\n*   恢复数据库\n\
  ```\n\n请注意，我已省略了具体的 SQL 语句，因为在 SSMS 中我们不需要它们。\n\n##### 连接到 master 数据库\n\n我们需要连接到\
  \ `master` 数据库以继续。我们可以打开一个新的查询窗口，然后从“可用数据库”菜单中选择 `master`（或按 Ctrl+U 以及上下箭头键），或者我们也可以在登录时确认我们正在连接到\
  \ `master` 数据库。如果你在登录时没有连接到 `master`，你可能应该考虑更改。你可以在如图 8-4 所示的“连接到服务器”对话框中更改你的默认数据库。\n\
  \n![A436605_1_En_8_Fig4_HTML.jpg](img/A436605_1_En_8_Fig4_HTML.jpg)\n\n图 8-4. 连接到服务器\n\
  \n单击“选项 >>”按钮，你将看到一个扩展的界面，如图 8-5 所示。\n\n![A436605_1_En_8_Fig5_HTML.jpg](img/A436605_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5. 扩展的连接到服务器界面\n\n下拉“连接到数据库”旁边的下拉菜单，然后选择“浏览服务器”。会弹出一条简短的消息请求连接到服务器，所以当你看到此消息时，单击“是”按钮。然后会显示“浏览服务器数据库”窗口，如图\
  \ 8-6 所示。\n\n![A436605_1_En_8_Fig6_HTML.jpg](img/A436605_1_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6. 浏览服务器数据库\n\n我们在这里需要做的只是选择 `master` 并单击“确定”，然后在“连接到服务器”窗口中，`master` 将显示出来以替代“默认值”。图\
  \ 8-7 显示了我在选择 `master` 后的更新界面。\n\n![A436605_1_En_8_Fig7_HTML.jpg](img/A436605_1_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7. 更新后的连接到服务器界面\n\n我已将此选项卡和其他选项卡中的其余值保留为其默认值。一旦我按下“连接”，我默认就连接到了 `master` 数据库。\n\
  \n\n\n下一步是备份事务日志。操作方法是右键单击数据库名称，将鼠标悬停在 `Tasks`（任务）上，然后选择 `Back Up`（备份）。此菜单位置如图 8-8\
  \ 所示。\n\n![A436605_1_En_8_Fig8_HTML.jpg](img/A436605_1_En_8_Fig8_HTML.jpg)\n\n图\
  \ 8-8：`Back Up`（备份）位置。\n\n这将打开 `Back Up Database`（备份数据库）屏幕，如图 8-9 所示。如果我想执行完整备份（如备份类型选项\
  \ `full` 所示），那么这个默认屏幕将是理想的选择，但我目前不想这样做。\n\n![A436605_1_En_8_Fig9_HTML.jpg](img/A436605_1_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9：`Back Up Database`（备份数据库）。\n\n由于我不想运行完整备份，我需要下拉该菜单并选择 `transaction log`（事务日志）代替。做出此更改后，你将看到如图\
  \ 8-10 所示的内容。\n\n![A436605_1_En_8_Fig10_HTML.jpg](img/A436605_1_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10：已选择 `Transaction Log`（事务日志）。\n\n这为我们备份事务日志做好了准备，但我们还没有完成。如果我们此时按下 `OK`（确定），我们将使用其他选项卡上的默认值，而我们还没有查看那些选项。\n\
  \n单击左侧的 `Media Options`（介质选项）标签以显示 `Media Options`（介质选项）屏幕。图 8-11 显示了此屏幕的默认值。\n\n\
  ![A436605_1_En_8_Fig11_HTML.jpg](img/A436605_1_En_8_Fig11_HTML.jpg)\n\n图 8-11：`Back\
  \ Up Database`（备份数据库），`Media Options`（介质选项）选项卡。\n\n请注意，在 `transaction log`（事务日志）部分中，`Truncate\
  \ the transaction log`（截断事务日志）单选按钮已被选中。这意味着默认选项只是截断事务日志，并留下该不规则边缘作为事务日志的新尾部。我们希望保持此选项不变。这是因为我们希望保持数据库联机，而不处于\
  \ `restoring`（还原）状态。选择指定的选项并按 `OK`（确定）继续。我们不需要担心 `Backup Options`（备份选项）选项卡中的默认值，因为那些默认值正是我们需要的。\n\
  \n应该会迅速出现一条成功消息，告知我们备份已成功完成。看到此消息时单击 `OK`（确定），`Back Up Database`（备份数据库）屏幕将会关闭。\n\
  \n现在，如预期所示，我们的数据库如图 8-12 所示已恢复联机。\n\n![A436605_1_En_8_Fig12_HTML.jpg](img/A436605_1_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12：数据库已联机。\n\n一旦我们到达这里，我们就可以进行操作的下一步并开始数据还原。\n\n##### 还原数据库\n\n要开始完整数据库还原，我们开始时的步骤与之前类似，只是菜单位置略有不同，如图\
  \ 8-13 所示。\n\n![A436605_1_En_8_Fig13_HTML.jpg](img/A436605_1_En_8_Fig13_HTML.jpg)\n\
  \n图 8-13：数据库菜单位置。\n\n我们将右键单击我们的数据库，将鼠标悬停在 `Tasks`（任务）上，然后是 `Restore`（还原），最后选择 `Database`（数据库）。\n\
  \n默认屏幕如图 8-14 所示。请注意，此屏幕将根据所选数据库的最新备份自动填充 `Restore Plan`（还原计划）。\n\n![A436605_1_En_8_Fig14_HTML.jpg](img/A436605_1_En_8_Fig14_HTML.jpg)\n\
  \n图 8-14：`Restore Database`（还原数据库）。\n\n你可以自由选择 `Database`（数据库）下拉菜单中的任何选项，并观察 `backup\
  \ sets`（备份集）值如何随每个选择而变化。\n\n**注意：** 请注意 `Name`（名称）字段如何默认显示完整备份，然后是差异备份，接着是自上次差异备份以来的事务日志备份。\n\
  \n我们希望默认选择此区域中的选项，因为我们希望按界面中显示的顺序还原完整备份、差异备份和事务日志备份。我们希望确保既回滚事务日志，又在 `Timeline`（时间线）区域选择一个时间点，或者忽略整个事务日志。我将还原到上一个事务日志，因为我知道数据驻留在该备份中。\n\
  \n`Files`（文件）选项卡中的值默认是合适的，因为我们不想重命名任何文件。换句话说，它们将按默认位置存放。\n\n在 `Options`（选项）选项卡上，我们要确保\
  \ `tail-log backup`（尾日志备份）部分两个选项都被选中（默认如此），当我们准备好时，按下 `OK`（确定）按钮。大约一分钟后，你应该会收到显示数据库已成功还原的消息。单击此处的\
  \ `OK`（确定）完成此操作，然后按 `F5` 刷新 `SSMS` 界面。\n\n信任但要验证，对吧？继续展开我们数据库下的 `Tables`（表），你应该看到如图\
  \ 8-15 所示的内容。\n\n![A436605_1_En_8_Fig15_HTML.jpg](img/A436605_1_En_8_Fig15_HTML.jpg)\n\
  \n图 8-15：`users1` 表回来了！\n\n所以，你看到了：使用 `SSMS` 完成的数据库完整还原。\n\n#### 数据库快照\n\n快速还原整个数据库的一个好方法是使用数据库快照。这是数据库在特定时间点的真实快照，并且与该时间点的实际数据库一致。这意味着快照充当了一种复制的数据库，因为当源数据库更新时，快照也会更新。从拍摄快照的那一刻起，每个后续事务都会在快照和源数据库中捕获。你还可以为同一数据库创建多个快照，这是一个特别好的做法。如果管理得当，这可以成为管理数据恢复的好方法。例如，如果快照存在很长时间且未被删除，它将继续增长，直到消耗掉它所在的磁盘空间。这显然不理想，因此必须维护快照。\n\
  \n让我在这里停一下，提请注意：数据库快照绝不能用于替代备份和还原场景。如果我们不应该将它们用于备份或恢复，那么它们的目的是什么？使用数据库快照的主要目的是为了让\
  \ `DBA` 能够快速拍摄其数据库的快照，对数据库执行可能搞砸的操作，然后测试以确保数据库更改实际有效。如果无效，那么 `DBA` 只需还原快照，他们就回到了几分钟前的状态。执行此操作的时间通常比计划还原操作、执行所有还原步骤以及确定要恢复哪些事务日志要少得多。只需还原快照，工作就完成了。\n\
  \n数据库快照的另一个好用途是用于报告。使用我们的命名约定，我们可以创建一个基于一天中不同时间拍摄的快照数据的标准报告。这可以用于诸如跟踪销售量或监控数据库中随时间记录的各种美元交易等目的。报告服务将获得一个滚动的\
  \ 24 小时数据窗口，并将此数据量化为管理层易于阅读的仪表盘是数据库快照的一个绝佳用途。`SQL Server` 中的报告主题略微超出了本书的范围，因此我建议阅读\
  \ Kathi Kellenberger 的 *Beginning SQL Server Reporting Services*，可在 [`www.apress.com/us/book/9781484219898`](http://www.apress.com/us/book/9781484219898)\
  \ 获取。对于那些正涉足 `SQL Server` 报告服务世界但不太知道从何开始的 `DBA` 来说，这是一本绝对的必备书。\n\n##### 数据库快照如何工作？\n\
  \n数据库快照的概念对不熟悉的用户来说可能有些令人生畏。我听过最好的解释是，它们在理论上最接近静态完整数据库备份。创建时存在的整个数据库作为只读副本驻留在此快照中，并且该快照保持为源数据库的只读副本，直到快照被删除为止。\n\
  \n\n\n##### 创建数据库快照\n\n假设您有一个 SQL Server Agent 作业，它将每小时创建一个数据库快照，并且在创建一定数量的快照后，最旧的快照将被删除。这可能是最常见的用例，因为它限制了存储在快照中的数据量，同时仍然提供可靠的快照结构。\n\
  \n创建数据库快照的语法您应该很熟悉，因为它本质上是一个 `CREATE DATABASE` 语句，如清单 8-5 所示。\n\n```sql\nCREATE\
  \ DATABASE backrecTestDB_snapshot_12AM ON (\nNAME = backrecTestDB,\nFILENAME = 'E:\\\
  SQL Server\\Data\\backrecTestDB_data_12AM')\nAS SNAPSHOT OF backrecTestDB;\n-- 清单\
  \ 8-5\n-- 创建数据库快照语法\n```\n\n语句 `CREATE DATABASE backrecTestDB_snapshot_12AM ON (`\
  \ 表示我们要创建一个名为 `backrecTestDB_snapshot_12AM` 的新数据库快照。在 SSMS 中查看时，这也是快照的名称。`ON` 关键字的存在意味着它基于一个现有文件。在此情况下，`NAME\
  \ =` 属性保存了您在“数据库属性”窗口中找到的数据库文件的逻辑名称，如图 8-16 所示。您可以通过右键单击数据库名称，选择“属性”，然后单击左侧的“文件”菜单选项来打开“文件”选项卡，找到此信息。\n\
  \n![A436605_1_En_8_Fig16_HTML.jpg](img/A436605_1_En_8_Fig16_HTML.jpg)\n\n*图 8-16\
  \ 逻辑名称位置*\n\n`FILENAME = 'E:\\SQL Server\\Data\\backrecTestDB_data_12AM'` 这行代码让我们声明要保存在文件系统中的文件名。最后，`)\
  \ AS SNAPSHOT OF backrecTestDB;` 这行代码让我们明确定义我们要创建的是一个快照，而不是一个“常规”数据库。将清单 8-5 复制到“新建查询”窗口，并在将我的数据库名称更新为您自己的之后，按\
  \ F5 运行脚本。接下来，转到“对象资源管理器”，在工具栏中单击“刷新”按钮，并展开“数据库”下的“数据库快照”选项。如果清单 8-5 中的脚本运行正确，并且数据库快照已创建，您将看到图\
  \ 8-17 所示的内容。\n\n![A436605_1_En_8_Fig17_HTML.jpg](img/A436605_1_En_8_Fig17_HTML.jpg)\n\
  \n*图 8-17 数据库快照创建成功*\n\n干得好！现在我们可以看到我们有一个快照，如果您展开 `backrecTestDB_snapshot_12AM`\
  \ 选项，您将看到拍摄快照时 `backrecTestDB` 数据库的确切内容。\n\n##### 查询数据库快照\n\n查询数据库快照的方式与查询源数据库的方式相同。清单\
  \ 8-6 展示了两种语法。\n\n```sql\nSELECT count(*) as cnt FROM [backrecTestDB_snapshot_12AM].dbo.users2\n\
  SELECT count(*) as cnt FROM [backrecTestDB].dbo.users2\n-- 清单 8-6\n-- 查询源数据库和快照\n\
  ```\n\n运行后，我们看到每个表都有 10,000 行。这是预料之中的，也是好的，因为它表明我们的数据到目前为止是一致的。我们现在想做的是从源数据库中删除一些数据，然后再次比较两个行数。我使用的查询在清单\
  \ 8-7 中。\n\n```sql\nDELETE FROM [backrecTestDB].dbo.users2 WHERE fname = 'Bradley'\n\
  -- 清单 8-7\n-- DELETE 代码片段\n```\n\n执行此代码将从 `backrecTestDB` 数据库的 `users2` 表中删除 1000\
  \ 行。\n\n如果我们执行清单 8-6 所示的代码，我们会看到快照中有 10,000 行，而源数据库中有 9000 行。\n\n如果此时我们再拍摄一个快照，然后从\
  \ `users2` 表中删除另一组数据或进行任何其他任意更改，那么我们将拥有三个独立且不同的数据集，我们可以从中恢复。\n\n使用此示例，您可以看到为什么我之前提到将快照用作报告源。将数据作为冻结的时间点利用，可以为报告开辟很多可能性。\n\
  \n##### 恢复数据库快照\n\n现在我们看到有两个不同的数据库，包含两组不完全相同的数据，我们可以开始将快照恢复到源数据库之上的过程，基本上撤销自拍摄快照以来所做的任何操作。\n\
  \n为了恢复数据库快照，我们必须执行一个 `RESTORE DATABASE` 命令，类似于清单 8-8 所示。\n\n```sql\nRESTORE DATABASE\
  \ backrecTestDB\nFROM DATABASE_SNAPSHOT = 'backrecTestDB_snapshot_12AM'\n-- 清单 8-8\n\
  -- RESTORE DATABASE 语法\n```\n\n在我们运行这个命令之前，让我们先了解一下此操作的几个注意事项。\n\n*   只要没有到数据库实例的开放连接，代码就会运行。如果有开放连接，请运行以下代码关闭连接，然后再运行清单\
  \ 8-8 中的代码：\n    ```sql\n    ALTER DATABASE backrecTestDB\n    SET SINGLE_USER WITH\n\
  \    ROLLBACK IMMEDIATE\n    ```\n*   我们必须知道我们恢复的数据版本是否正确。是的，这就是我们创建命名约定的原因，但只需花一分钟查询快照并确保所需数据肯定在那里。当然，除非您只有一个快照，并且您创建它就是为了恢复。\n\
  *   当您验证数据正确后，您必须删除源数据库的任何其他快照。除非只有一个快照，否则恢复操作将无法继续。\n*   我们无法使用快照进行时间点恢复。您得到的就是数据库中的内容，仅此而已。因此，您必须确保要恢复的是正确的数据版本。\n\
  \n请继续执行清单 8-8 中的代码，然后立即执行清单 8-6 中的代码。看！我们成功地将 `users2` 表恢复回了 10000 行，因为我们成功恢复了数据库快照。\n\
  \n#### 查看备份和还原历史记录\n\n是否曾想了解备份和还原操作背后发生的情况？翻阅数据库表格可能很单调，相信我。幸运的是，SQL Server 内置了相当多的报告，其中一个专门可以帮助您查看备份和还原事件的报告称为“备份和还原事件”；多么方便！此报告对于定位备份和还原操作期间可能发生的任何错误非常有用。\n\
  \n要运行此报告，请右键单击您的数据库名称（对我来说是 `backrecTestDB`），将鼠标悬停在“报表”上，然后将鼠标悬停在“标准报表”上，并选择“备份和还原事件”。图\
  \ 8-18 显示了初始报告屏幕的样子。\n\n![A436605_1_En_8_Fig18_HTML.jpg](img/A436605_1_En_8_Fig18_HTML.jpg)\n\
  \n*图 8-18 备份和还原事件报告*\n\n此报告中有四个主要标题。它们如下：\n\n*   备份操作的平均耗时\n    *   平均持续时间是使用在此数据库上执行的各种类型备份操作的历史记录计算的。\n\
  *   成功的备份操作\n    *   显示过去在此数据库上执行的成功备份操作的详细信息。\n*   备份操作错误\n    *   显示过去导致备份操作失败的错误的详细信息。\n\
  *   成功的还原操作\n    *   显示过去在此数据库上执行的成功还原操作的详细信息。\n\n此报告非常易于浏览。您只需单击小加号即可展开表格。在内部，您将看到表格按最新记录在顶部进行排序。\n\
  \n\n#### 总结\n\n本章我们终于完成了恢复操作，并学习了对备份和恢复操作至关重要的各种数据恢复选项。我们了解了如何恢复页面，以及 `msdb..suspect_pages`\
  \ 表对于发现数据库中可疑页面损坏的价值。我们探讨了从数据库快照恢复及其涉及的所有内容。最后，我们学习了如何查看备份和恢复的历史记录。本章结束了关于备份与恢复操作中“恢复”方面的这一部分。在下一部分中，我们将开始把所有内容整合到一个独立的备份与恢复计划中。\n\
  \n## 第三部分\n### 完整解决方案\n\n## 9. 完整备份与恢复解决方案\n\n在“现实世界”中，业务上绝对有需要能够随时提供可靠备份。数据损坏的可能性几乎是必然存在的，因此经验丰富的数据库管理员必须确保其数据库能够快速、正确地恢复。备份的可用性和可靠性至关重要，无论备份是存储在远程位置，还是存储在数据库服务器本地。在我们的备份和恢复实践中，我们经常需要处理服务级别协议，或称为\
  \ SLA。这类文档涉及广泛的细节，例如备份运行的频率、数据恢复的条件以及如何恢复数据。您可能在一个不涉及这些内容的地方工作，这也没问题。例如，如果您是作为网络托管套餐的一部分提供数据库存储即服务，那么您很可能会受到一份\
  \ SLA 的约束，该 SLA 描述了该系统的可用性细节。无论您作为数据库管理员的日常职责是否受到 SLA 的约束，有一件事是不变的，那就是您对数据库及其所承载数据的健康所负有的责任。在我迄今为止所写的每一本书中，我都试图传达一个信息，本书也不例外：作为数据库管理员，我们最大的责任莫过于保护我们的数据。\n\
  \n根据我的个人经验，我能想到的完全使用 T-SQL 编写完整备份场景的数据库管理员，总共只有一个。此人的理由是，SQL 可以从 SSMS 外部运行，因此在 SSMS\
  \ 之外可用是理想的。虽然我部分同意这一点，但另一方面我认为，我们应该利用我们掌握的工具，包括（尤其是）那些可以用于自动化任务（如备份）的工具。对我来说，让 SSMS\
  \ 完成大部分工作是有意义的，但仍然准备好 T-SQL 代码，以备不时之需，比如当我们需要备份或恢复数据库而 SSMS 因故不可用时，像我那位 DBA 朋友一样的代码爱好者可以使用。因此，本章我们将重点介绍如何在\
  \ SQL Server Management Studio 中创建一个用于完整备份的维护计划，然后编写相应的 T-SQL，以备需要时使用。需要理解的是，这并不是说\
  \ T-SQL 作为经验丰富的或初级的数据库管理员的主要脚本工具没有其用武之地；相反的说法是没有意义的，因为 T-SQL 是数据库管理员与数据库通信的基础语言。通过简单的谷歌搜索可以找到许多\
  \ T-SQL 解决方案，其中特别值得一提的是 Ola Hallengren 的备份脚本解决方案，位于 [`https://ola.hallengren.com/`](https://ola.hallengren.com/)。\n\
  \n到目前为止，我们一直专注于备份与恢复之间的区别，并通过不同的章节在我们的脑海中将它们区分开来。现在我们需要开始将这些不同的概念连接成一个连贯的整体，而我能想到的最好方法是创建两个独立的维护计划，一个用于备份，一个用于恢复，来管理计划的不同部分。拥有独立维护计划的明显含义是，每个备份部分将有不同的时间表。\n\
  \n本章，我们将学习如何为完整备份创建维护计划。显然，我们不希望将恢复序列作为备份场景的一部分。原因在于，那样做无非就是运行一个完整数据库备份，然后立即将该备份还原到我们刚刚备份的数据库之上。清单\
  \ 9-1 展示了我们将在本章构建的内容。\n\n**清单 9-1. 待办事项列表**\n```\n* 在 SSMS 中创建完整备份维护计划\n    * 根据我们之前的计划，每\
  \ 24 小时进行一次完整备份\n    * 备份必须存储在与 SQL Server 安装位置不同的物理磁盘上\n* 在 SSMS 中创建完整恢复维护计划\n\
  \    * 不设置计划，但作为 SQL Server Integration Services (SSIS) 包在 SSMS 中可用\n* 使用 T-SQL\
  \ 创建完整备份维护计划\n    * 不设置计划，可在必要时通过 `sqlcmd` 运行\n* 使用 T-SQL 创建完整恢复维护计划\n    * 不设置计划，可在必要时通过\
  \ `sqlcmd` 运行\n```\n这看起来是本章一个相当不错的开始。接下来的两章中，我们将为差异备份和事务日志备份构建本质上相同的内容。\n\n####\
  \ SSMS 中的完整备份计划\n\n一旦启动 `SSMS`，将焦点置于 `对象资源管理器`，我们需要展开 `管理`，然后展开 `维护计划`。如果我们有任何维护计划，它们将位于此区域。它们也会作为独立的作业出现在\
  \ `SQL Server 代理` 的 `作业` 菜单中，但我们将在创建维护计划后查看该区域。\n\n右键单击 `维护计划` 并选择 `新建维护计划`。当您看到如图\
  \ 9-1 所示的 `新建维护计划` 窗口时，为其命名为 `Backup Plan` 并按 `确定`。\n\n![A436605_1_En_9_Fig1_HTML.jpg](img/A436605_1_En_9_Fig1_HTML.jpg)\n\
  图 9-1. 新建维护计划窗口\n\n一旦您为其命名，一个标题为 `备份计划 [设计]` 的窗口将在主工作区打开。图 9-2 显示了此窗口的默认值。\n\n![A436605_1_En_9_Fig2_HTML.jpg](img/A436605_1_En_9_Fig2_HTML.jpg)\n\
  图 9-2. 备份计划 [设计] 窗口\n\n接下来，我们需要通过点击位于 `对象资源管理器` 左侧、界面边缘的浮动 `工具箱` 菜单来打开我们的 `工具箱`。或者，您可以在\
  \ `SQL Server Management Studio` 屏幕内的任意位置按下 `Ctrl+Alt+X`，该菜单将作为覆盖层出现在左侧的 `对象资源管理器`\
  \ 之上。要隐藏 `工具箱`，只需再次点击 `工具箱` 浮动菜单，它就会消失，仅显示 `对象资源管理器`。\n\n工具箱中有相当多的项目，我在我的第一本书 *SQL\
  \ Server 中的实用维护计划* ([`www.apress.com/us/book/9781484218945`](http://www.apress.com/us/book/9781484218945))\
  \ 中进行了详细探讨。从图 9-3 的粗略浏览中我们可以看到，我们需要的选项就在最上面；我们需要的是 `备份数据库任务`。\n\n![A436605_1_En_9_Fig3_HTML.jpg](img/A436605_1_En_9_Fig3_HTML.jpg)\n\
  图 9-3. 工具箱\n\n单击并将 `备份数据库任务` 从 `工具箱` 拖到主工作区的灰色区域。图 9-4 显示了该任务在工作区中应放置的大致位置，但放在工作区内的任何地方都可以。工作区充当维护计划各个部分的逻辑容器，它们的顺序完全无关紧要。唯一能将这些部分互连起来的是我们可以放在每个后续项目上的优先级约束，这样我们就可以将事件链接起来，使维护计划比单纯的预定任务块更具过程性。\n\
  \n将 `备份数据库任务` 拖到工作区后，您将看到它如图 9-4 所示出现。请注意，红色的 `X` 表示此项需要配置。\n\n![A436605_1_En_9_Fig4_HTML.jpg](img/A436605_1_En_9_Fig4_HTML.jpg)\n\
  图 9-4. 备份数据库任务\n\n如果您将鼠标悬停在红色的 `X` 上，您会看到消息“未指定连接管理器。”双击该任务，`备份数据库任务` 窗口将出现，如图 9-5\
  \ 所示。\n\n![A436605_1_En_9_Fig5_HTML.jpg](img/A436605_1_En_9_Fig5_HTML.jpg)\n图 9-5.\
  \ 备份数据库任务窗口\n\n对于那些从之前版本的 `SQL Server` 熟悉此区域的人来说，您会注意到此界面在当前版本的 `SQL Server Management\
  \ Studio` 中进行了轻微升级。一旦 `SQL Server Management Studio` 再次更新，它甚至可能会有所不同，因为 `SSMS` 现在是独立于\
  \ `SQL Server` 下载的，因此其更新周期独立于 Microsoft 发布的服务包。\n\n##### 定义备份数据库任务选项\n\n请注意，我们位于\
  \ `常规` 选项卡。这是我们指定清单 9-2 所示项目以准备此区域的地方。\n\n**清单 9-2.** 待办事项列表\n\n- `备份类型`\n    -\
  \ 我们必须从 `完整`、`差异` 或 `事务日志` 中选择。在本例中，我们将选择 `完整`。\n- `数据库`\n    - 我们必须至少选择一个数据库。请注意，如果从\
  \ `备份类型` 选项中选择 `事务日志`，则简单恢复模式数据库将被移除。在本例中，我们将选择我们一直在使用的数据库 `backrecTestDB`。\n- `备份组件`\n\
  \    - 我们可以从 `数据库` 或 `文件和文件组` 中选择。在本例中，我们将选择 `数据库`。如果我们的数据库有多个文件组，我们可以选择 `文件和文件组`，但我只设置了\
  \ `PRIMARY` 文件组。\n    - **注意** 如果您的场景中有多个文件组，则可以设置多个完整备份任务，以便按您期望的顺序或计划备份每个文件组。\n\
  - `备份到`\n    - 我们必须从 `磁带`、`磁盘` 或 `URL` 中选择。在本例中，请保持设置为 `磁盘`。\n\n在 `常规` 选项卡上方，我们可以看到\
  \ `连接` 下拉菜单。此选项默认为“本地服务器连接”，在此过程中需要保持此设置。\n\n一旦您按照清单 9-2 中的说明进行更改，您的窗口应类似于图 9-6\
  \ 所示。\n\n![A436605_1_En_9_Fig6_HTML.jpg](img/A436605_1_En_9_Fig6_HTML.jpg)\n图 9-6.\
  \ 备份数据库任务（已更新）\n\n请注意，当选择了一个数据库时，`数据库` 区域会变为文本“特定数据库”。\n\n当您准备好后，请选择 `目标` 选项卡以继续。图\
  \ 9-7 显示了此选项卡的默认设置。\n\n![A436605_1_En_9_Fig7_HTML.jpg](img/A436605_1_En_9_Fig7_HTML.jpg)\n\
  图 9-7. 备份数据库任务，目标选项卡\n\n此选项卡比 `常规` 选项卡稍复杂。在这里，我们有清单 9-3 中详述的选项。\n\n**清单 9-3.** 目标选项卡选项\n\
  \n- `在跨一个或多个文件备份数据库`\n    - 此选项存在是为了让我们可以创建同一数据库的多个备份文件。我们可以在此区域添加任意多个不同的文件名，但请注意，条目过多会导致性能问题。\n\
  - `为每个数据库创建备份文件`\n    - 这可能是最常见的选项，因为它让我们可以为每个选定的数据库创建单个备份文件。您还可以选择为每个数据库创建子目录，这也是一个非常方便的功能。`文件夹`\
  \ 位置是数据库备份将放置的位置，除非勾选了 `子目录` 选项，在这种情况下，数据库名称将成为文件夹名称，备份将放置在该文件夹内。我们希望选择此选项，并同时勾选\
  \ `为每个数据库创建子目录` 复选框。保持 `文件夹` 值不变，因为备份的默认值是一个唯一的日期/时间字符串。\n\n请注意，在清单 9-3 的选项下方还有另一个部分，其定义如清单\
  \ 9-4 所示。这些选项仅在您选择了图 9-5 所示的 `常规` 选项卡中的 `URL` 选项时才可用。否则，它们默认是禁用的。\n\n**清单 9-4.**\
  \ Azure 选项\n\n\n##### 目标配签设置\n\n配置备份任务时，在 **目标** 选项卡上提供了几个关键选项。\n\n*   **SQL 凭据**\n\
  \    *   这是用于连接到 Azure 数据库的 `SQL 凭据` 账户。\n*   **Azure 存储容器**\n    *   `Azure 存储容器`\
  \ 就像一块存储区域，你可以用于几乎任何你想做的事情。在这里，我们特指数据库备份，但它并不是直接备份到 Azure 实例；而是仅将文件备份到基于云的存储中。\n\
  *   **URL 前缀**\n    *   `URL 前缀` 对每个账户是唯一的。当你注册 Azure 时，会从 Microsoft 获得一个存储账户名称，该存储账户名称将成为\
  \ URL 中的前缀。\n\n在这些选项之后，最后一项是 **备份文件扩展名**，默认为 `bak`。你可以将其更改为任何你想要的扩展名，但我建议保持原样，接受默认值。图\
  \ 9-8 显示了已更新的“目标”选项卡的值。\n\n![A436605_1_En_9_Fig8_HTML.jpg](img/A436605_1_En_9_Fig8_HTML.jpg)\n\
  \n**图 9-8.** 备份数据库任务，目标选项卡，已更新\n\n当你准备好继续时，单击 **选项** 选项卡，你将看到如图 9-9 所示的默认值。\n\n\
  ![A436605_1_En_9_Fig9_HTML.jpg](img/A436605_1_En_9_Fig9_HTML.jpg)\n\n**图 9-9.**\
  \ 备份数据库任务，选项选项卡\n\n##### 选项选项卡\n\n默认情况下，这些选项都是可以的。但是，让我们按照清单 9-5 逐步查看它们，以便我们理解正在查看的内容。\n\
  \n**清单 9-5.** 选项选项卡...选项？\n\n*   **设置备份压缩**\n    *   允许你为备份设置压缩类型。三个选项如下：\n    \
  \    *   `使用默认服务器设置`\n        *   `压缩备份`\n        *   `不压缩备份`\n*   **备份集将过期**\n\
  \    *   你可以选择在一定天数后或在特定日期使备份过期。\n*   **仅复制备份**\n    *   这种备份类型可以被视为一种非顺序备份。通常，备份是按特定顺序进行的，并且必须按其进行的顺序恢复；这就是为什么你必须按事务日志创建的顺序来还原它们。此选项允许你仅创建数据库的副本。\n\
  *   **执行校验和 (新)**\n    *   校验和用于检测数据中的错误或不一致。在此上下文中，会对新生成的备份文件执行校验和，以确保其与预期生成的内容一致。\n\
  *   **验证备份完整性**\n    *   此选项等同于在备份文件位置运行 `RESTORE VERIFYONLY` 命令。简单语法是 `RESTORE\
  \ VERIFYONLY FROM DISK = <备份文件位置和名称>`。其目的是验证新生成的备份文件的完整性（这句话是多余的！）。\n*   **发生错误时继续\
  \ (新)**\n    *   简单来说，就是忽略任何错误并继续执行...除非发生致命错误，这会阻止程序执行。\n*   **备份加密**\n    *  \
  \ 在此区域，你可以选择用于解密的算法、证书或非对称密钥。请非常小心此区域，因为如果希望以后能还原生成的备份，必须使用相同的证书或非对称密钥。如果证书或密钥丢失，备份将无法成功还原。\n\
  *   **对于可用性数据库，忽略备份的副本优先级和在主副本上备份设置**\n    *   在处理 `AlwaysOn` 和 `可用性组` 时，我总是会参考我的好朋友\
  \ Peter Carter 的优秀著作 *SQL Server AlwaysOn Revealed* ( [`www.apress.com/us/book/9781484217634`](http://www.apress.com/us/book/9781484217634)\
  \ )。此选项允许我们告诉可用性数据库，使用数据库的主副本设置来备份数据库实例。\n*   **块大小 (新)**\n    *   此选项允许你以字节为单位指定物理块大小，而不是让\
  \ `SQL Server` 资源调控器使用默认选项处理备份。将此设置为较低的值会对备份操作产生不利影响，但会写入较小的数据块而不是大块。\n*   **最大传输大小\
  \ (新)**\n    *   此选项允许你指定 `SQL Server` 与备份介质之间使用的最大传输单元（以字节为单位）。\n\n\n\n###### 理解\
  \ SQL Server 备份中的块大小与最大传输大小\n\n块大小和最大传输大小这两个选项听起来非常相似，不是吗？它们的区别在于，`块大小` 选项允许你告诉\
  \ SQL Server：“我知道你通常取一定数量的字节，但我希望你取不同数量的字节并将它们放入备份位置。”而 `最大传输大小` 选项则允许你告诉 SQL Server：“当你将字节移动到备份位置时，我希望那个数据块是一个特定的大小。你可以在该传输大小中打包任意多的块，但一旦达到我设定的限制，你就需要再跑一趟。”\
  \ 换句话说，可以将 `块大小` 想象成单个火车车厢，而 `最大传输大小` 则是整列火车。因此，`最大传输大小` 选项总是大于 `块大小` 选项。\n\n例如，勾选\
  \ `块大小` 和 `最大传输大小` 复选框。然后在 `块大小` 下拉菜单中选择 `4096`。接下来，在 `最大传输大小` 区域输入一个数值；我选择了 `512`。最后，按\
  \ `Tab` 键移出 `最大传输大小` 区域。你看到数值变回 `65536` 了吗？接着，点击 `最大传输大小` 区域的向上箭头，它会变为 `131072`。再点击向下箭头两次，它将默认变回\
  \ `65536`，但不会变得更低。\n\n在我们继续之前，请确保你取消勾选了 `块大小` 和 `最大传输大小` 复选框。保持它们被勾选可能不会造成太大麻烦，但我不想引入任何可能导致错误的东西。我在这里选择的选项是\
  \ `验证备份完整性` 和 `执行校验和`。图 9-10 显示了更新后的 `选项` 选项卡界面。\n\n![A436605_1_En_9_Fig10_HTML.jpg](img/A436605_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10. 备份数据库任务，选项选项卡，已更新\n\n以上就是我进行完整备份选项时，在这个区域需要设置的所有选项。在我们继续之前，我想查看一下此计划生成的\
  \ `T-SQL`，所以请点击 `查看 T-SQL` 按钮，你将看到与清单 9-6 所示类似的内容。\n\n```\nEXECUTE master.dbo.xp_create_subdir\
  \ N'E:\\SQL Server\\Backup\\backrecTestDB'\nGO\nBACKUP DATABASE [backrecTestDB]\
  \ TO DISK = N'E:\\SQL Server\\Backup\\backrecTestDB\\backrecTestDB_backup_2017_10_26_223559_7118287.bak'\
  \ WITH NOFORMAT, NOINIT,  NAME = N'backrecTestDB_backup_2017_10_26_223559_7118287',\
  \ SKIP, REWIND, NOUNLOAD,  STATS = 10, CHECKSUM\nGO\ndeclare @backupSetId as int\n\
  select @backupSetId = position from msdb..backupset where database_name=N'backrecTestDB'\
  \ and backup_set_id=(select max(backup_set_id) from msdb..backupset where database_name=N'backrecTestDB')\n\
  if @backupSetId is null begin raiserror(N'Verify failed. Backup information for\
  \ database ''backrecTestDB'' not found.', 16, 1) end\nRESTORE VERIFYONLY FROM DISK\
  \ = N'E:\\SQL Server\\Backup\\backrecTestDB\\backrecTestDB_backup_2017_10_26_223559_7118287.bak'\
  \ WITH  FILE = @backupSetId,  NOUNLOAD,  NOREWIND\n```\n\n清单 9-6. 以 T-SQL 表示的完整备份\n\
  \n请注意，备份文件的名称将与此处显示的不同。这是因为文件名是根据当前时间自动生成的，所以相隔一秒点击 `查看 T-SQL` 按钮会生成两个不同的文件名。此清单应作为模板使用，将你想要备份的备份名称以及备份后想要验证的内容粘贴进去。不要仅仅保存此脚本就期望它能在你的机器上运行；我保证它会运行失败。\n\
  \n准备就绪后，点击 `OK` 继续。注意红色的 `X` 现在消失了，我们剩下如图 9-11 所示的内容。\n\n![A436605_1_En_9_Fig11_HTML.jpg](img/A436605_1_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11. 备份计划 [设计]，已更新\n\n#### 计划完整备份\n\n现在我们已经设置了计划，我们需要设置一个时间表。通常，我在家和工作中使用的时间表几乎相同：午夜进行一次完整备份，每六小时进行一次差异备份，每小时进行一次事务日志备份。在某些情况下，我甚至会每半小时运行一次事务日志备份，但这会引入更多需要从中恢复的文件，同时将数据丢失的最大时间减少一半。\n\
  \n从我们离开的地方开始，我们现在可以看到如图 9-12 所示的内容。\n\n![A436605_1_En_9_Fig12_HTML.jpg](img/A436605_1_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12. 备份计划 [设计] 阶段\n\n注意，我们现在在舞台上方的区域中有一个名为 `Subplan_1` 的子计划。这是完整备份的计划，但我们需要给它一个更好的名称。双击\
  \ `子计划`、`描述` 或 `计划` 列以打开如图 9-13 所示的 `子计划属性` 窗口。\n\n![A436605_1_En_9_Fig13_HTML.jpg](img/A436605_1_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13. 子计划属性\n\n我们希望将默认值更改为清单 9-7 中所示的值。\n\n清单 9-7. 子计划属性值\n\n*   `名称`\n    *\
  \   “完整备份”\n*   `描述`\n    *   “这是备份维护计划中的完整备份部分”\n*   `计划`\n    *   我们将在另一个区域设置此选项，所以暂时忽略它\n\
  *   `运行身份`\n    *   保持默认值\n\n更新这些值后，单击 `OK` 关闭该窗口，你将返回到主舞台。图 9-14 显示了 `子计划属性` 窗口中应更新后的值，图\
  \ 9-15 也显示了此时更新后的舞台。\n\n![A436605_1_En_9_Fig15_HTML.jpg](img/A436605_1_En_9_Fig15_HTML.jpg)\n\
  \n图 9-15. 更新后的舞台\n\n![A436605_1_En_9_Fig14_HTML.jpg](img/A436605_1_En_9_Fig14_HTML.jpg)\n\
  \n图 9-14. 子计划属性，已更新\n\n我们可以在图 9-15 中看到，`子计划` 行中的值已更新为我们输入的值。对于计划，我们选择稍后再设置，所以现在让我们看看如何设置。\n\
  \n单击 `计划` 列旁边行中的日历图标。图 9-16 显示了 `新建作业计划` 屏幕的初始界面。\n\n![A436605_1_En_9_Fig16_HTML.jpg](img/A436605_1_En_9_Fig16_HTML.jpg)\n\
  \n图 9-16. 新建作业计划\n\n清单 9-8 将逐步介绍此屏幕上的所有选项，以便我们决定要执行的时间表。\n\n清单 9-8. 新建作业计划选项\n\n\
  \n\n#### 更新 SQL Server 代理作业\n\n现在维护计划已经设置完成，我们可以置之不理，让它正常运行。但是，SQL Server 代理作业需要进行更新。为什么呢？因为出于某些原因，该作业并不会继承维护计划的所有值，我们必须进入作业中手动补充填写这些作业值。希望在未来的\
  \ SSMS 版本中这个问题能得到解决。\n\n在“对象资源管理器”中展开 SQL Server 代理菜单，然后展开“作业”。图 9-18 显示了此菜单项的位置。\n\
  \n![A436605_1_En_9_Fig18_HTML.jpg](img/A436605_1_En_9_Fig18_HTML.jpg)\n\n图 9-18\n\
  SQL Server 代理、作业的位置\n\n请注意，这里有一个名为 `syspolicy_purge_history` 的默认作业。我们不需要它，所以它留在原处即可。我们关心的是名为\
  \ `Backup Plan.Subplan_1` 的作业。我们在图 9-14 的“子计划属性”窗口中更改了这个值，但它并未同步过滤到此区域，所以现在让我们来更新它。\n\
  \n##### 常规选项卡\n\n双击作业名称，将出现“作业属性”窗口，如图 9-19 所示。此选项卡的目的是提供作业的顶层或“常规”设置。不过，不要认为这个区域不重要，因为如果填写不正确，可能会导致很多问题。例如，`启用`\
  \ 复选框需要保持选中状态，所有者需要保持为具有数据库权限的账户，或者是数据库属性窗口中的数据库所有者。\n\n注意：右键单击数据库名称并选择 `属性`。从这里，你可以查看数据库的所有者。请不要将其与\
  \ `dbo` 角色混淆。\n\n根据我的经验，这两个值需要匹配。如果不匹配，正如我所说，那么此值需要是一个对数据库有访问权限的用户。\n\n![A436605_1_En_9_Fig19_HTML.jpg](img/A436605_1_En_9_Fig19_HTML.jpg)\n\
  \n图 9-19\n“作业属性”窗口，常规选项卡\n\n如你所见，我们在前一节设置的一些选项并未传递到这个作业中，例如 `名称` 和描述。将 `名称` 字段更新为\
  \ `完整备份`，并输入简短描述以完成常规选项卡上的项目。请注意，`类别` 选项可以下拉选择不同的选项。这样做的目的是允许你将不同的作业划分到不同的类别中，然后利用这些不同类别进行日志检查或报告。不过，它默认是\
  \ `数据库维护`，所以最好保持原样。\n\n当你对此区域的设置满意后，单击 `步骤` 选项卡。\n\n##### 步骤选项卡\n\n下一个选项卡（来自左侧窗格）是\
  \ `步骤`。图 9-20 显示了此页面的默认设置。\n\n![A436605_1_En_9_Fig20_HTML.jpg](img/A436605_1_En_9_Fig20_HTML.jpg)\n\
  \n图 9-20\n“作业属性”窗口，步骤选项卡\n\n如果此作业有多个步骤，它们将显示在这里。或者，我们也可以在此处添加一些超出我们之前创建的维护计划范围的作业。我们现在不想这样做，但这是你在制定自己的计划时，如果必要，可以考虑的一个选项。\n\
  \n再次注意，名称不同了吗？所以，我们同样需要双击该行并更新那些值。图 9-21 显示了“作业步骤属性 – Subplan_1”窗口的初始值。\n\n######\
  \ 作业步骤属性 - Subplan_1 (常规选项卡)\n\n![A436605_1_En_9_Fig21_HTML.jpg](img/A436605_1_En_9_Fig21_HTML.jpg)\n\
  \n图 9-21\n“作业步骤属性 – Subplan_1”，常规选项卡\n\n在这个区域要非常小心。你可能会在此处对此作业和你的数据库造成严重损害。这个区域本质上允许你为创建此作业后将生成的\
  \ SSIS 包设置属性和值。\n\n清单 9-9 显示了此选项卡中的可用选项。\n\n清单 9-9. 作业步骤属性 - Subplan_1 选项\n\n\n\n\
  *   `Step name`\n    *   步骤的名称。\n*   `Type`\n    *   正在创建的作业类型。其中包含许多与我们当前创建内容完全无关的选项，因此请务必不要更改任何设置。\n\
  *   `Run as`\n    *   用于执行该程序包的帐户。默认值始终为 `SQL Server Agent`，因为此帐户默认拥有执行 SSIS 程序包的权限。\n\
  *   `Package`\n    *   此子选项卡允许定义基本的程序包特征，例如：\n        *   `Package source`\n   \
  \         *   程序包将创建的位置：`SQL Server`、`File System`、`SSIS Package Store` 或 `SSIS\
  \ Catalog`。\n        *   `Server`\n            *   用于部署 SSIS 程序包的目标服务器。\n      \
  \  *   `Log on to the server`\n            *   用于手动执行程序包的登录信息。\n        *   `Package`\n\
  \            *   保存程序包的默认位置。此值由“程序包源”下拉菜单中选择的值决定。例如，不能为 `SQL Server` 选项指定 Windows\
  \ 文件夹位置，因为 `SQL Server` 选项期望程序包驻留在如 `Maintenance Plans\\Backup Plan` 所示的 SQL Server\
  \ 逻辑树中。\n*   `Configurations`\n    *   如果有任何配置文件，将在此区域添加。\n*   `Command files`\n\
  \    *   如果有任何命令文件，将在此区域添加。\n*   `Data sources`\n    *   如果需要添加与当前数据源分离且不同的数据源，可以在此处添加。\n\
  *   `Execution options`\n    *   根据所选选项，这些选项可在程序包执行前或执行期间使用。可用选项包括：\n        * \
  \  `Fail the package on validation warnings [DURING]`：在程序包执行时触发，以便在出现任何警告时使程序包失败。\n\
  \        *   `Validate package without executing [BEFORE]`：程序包将不会执行，仅进行验证。\n   \
  \     *   `Override MaxConcurrentExecutables property [BEFORE]`：此选项用于确保不会有过多的可执行文件争夺\
  \ CPU 时间。\n        *   `Enable package checkpoints [DURING]`：如果启用，程序包将在每个步骤发送状态更新。\n\
  \        *   `Use 32-bit runtime [BEFORE]`：此选项定义是否在 32 位运行时或默认的 64 位运行时中执行此程序包。\n\
  *   `Logging`\n    *   这是很多人甚至都不知道的一个绝妙选项，即此区域内置的日志记录功能。SSIS 有一个默认的日志提供程序，可用选项包括\
  \ SSIS 日志提供程序，适用于：\n        *   `SSIS log provider for text files`\n        *  \
  \ `SSIS log provider for SQL Server`\n        *   `SSIS log provider for Windows\
  \ event log`\n        *   `SSIS log provider for SQL server profiler`\n        *\
  \   `SSIS log provider for XML files`\n*   `Set values`\n    *   如果有任何需要为程序包设置的值，可以在此处添加。\n\
  *   `Verification`\n    *   这有点像是前面执行选项的延伸。此区域更多是从安全角度对程序包进行验证。这里的可用选项包括：\n    \
  \    *   `Execute only signed packages`\n        *   `Verify package build`\n  \
  \      *   `Verify package ID`\n        *   `Verify version ID`\n*   `Command line`\n\
  \    *   任何命令行选项都可以添加在这里，它们将在执行程序包的用户上下文中添加。请绝对确保，如果您更改了此区域，`Run as` 帐户必须具有执行此区域中指定命令的权限。\n\
  \n此处唯一需要更新的是 `Step name`（如果需要）。所有其他设置都已默认为我们所需的位置。更新了 `Step name` 值后，点击 `Advanced`\
  \ 选项卡。\n\n###### 作业步骤属性 - Subplan_1（高级选项卡）\n\n`Advanced` 选项卡包含报告和日志记录操作的选项。图 9-22\
  \ 显示了此区域的默认值，这些值对于我们的需求来说大部分是正确的。\n\n![A436605_1_En_9_Fig22_HTML.jpg](img/A436605_1_En_9_Fig22_HTML.jpg)\n\
  \n图 9-22\n\n作业步骤属性 – Subplan_1，`Advanced` 选项卡\n\n请注意，默认选项正是您所期望的；当程序包成功执行时，它会以成功状态退出作业。如果失败，则以失败状态退出作业。让我们仔细看看这些选项及其真正含义。清单\
  \ 9-10 详细分解了这些选项。\n\n清单 9-10. `Advanced` 选项卡选项\n\n*   `On success action`\n    *\
  \   当步骤成功完成时，程序包应该做什么？这里的可用选项包括：\n        *   `Go to the next step`\n          \
  \  *   如果此程序包中还有另一个步骤，则执行该下一步。\n        *   `Quit the job reporting success`\n \
  \           *   默认选项。\n        *   `Quit the job reporting failure`\n          \
  \  *   对成功执行的作业报告失败有点像是沟通不畅，所以我能想到这个选项的唯一用途是程序包执行本意是返回失败。\n*   `Retry attempts`\n\
  \    *   此程序包允许的重试次数。\n*   `Retry interval (minutes)`\n    *   程序包重试之间的等待时间。\n*\
  \   `On failure action`\n    *   与前面相同的选项，除了 `Quit the job reporting success` 选项的逻辑是相反的。\n\
  *   `Output file`\n    *   执行 SSIS 程序包时，会生成一个输出日志文件。可以在此处输入路径以供以后查看。\n*   `Log to\
  \ table`\n    *   选中此选项允许将程序包执行结果记录到 `msdb` 数据库中的 `sysjobstepslogs` 表。\n*   `Include\
  \ step output in history`\n    *   此选项允许在 SQL Server Agent 日志中更准确地记录程序包执行情况。\n\n\
  请注意，我之前说这些设置只是“大部分”正确。我们想要勾选 `Log to table` 和 `Include step output in history` 复选框，这是我们在此处要做的唯一更改。图\
  \ 9-23 显示了此屏幕更新后的值，因此请更新您的屏幕，准备好后单击 `OK` 按钮关闭此窗口，保存设置，并返回到作业属性窗口。\n\n![A436605_1_En_9_Fig23_HTML.jpg](img/A436605_1_En_9_Fig23_HTML.jpg)\n\
  \n图 9-23\n\n作业步骤属性 – Subplan_1，`Advanced` 选项卡，已更新\n\n回到“作业属性”窗口后，我们可以看到作业的名称已更新。请注意，“起始步骤”值显示为\
  \ `Subplan_1` 而不是 `Full Backup`。原因是作业尚未保存，尽管这些值在此界面中显示。\n\n一旦我们在此屏幕上单击 `OK`，这些值将会更新。但我们暂时还不打算这么做，所以请继续点击左侧的\
  \ `Schedules` 选项卡。\n\n##### 计划选项卡\n\n当您点击 `Schedules` 选项卡时，应该会看到一个空的界面；此区域中不应有计划。这很完美，因为我们是通过维护计划而不是\
  \ SSIS 程序包来安排此作业的。点击 `Alerts` 选项卡继续。\n\n##### 警报选项卡\n\n我们没有为此作业设置任何警报，但如果您想拥有警报，可以在此处设置。此上下文中的警报意味着当发生错误或事件时\
  \ SQL Server 会提醒您。SQL Server 还可以生成数据库响应、通过电子邮件或寻呼任何操作员，甚至发送 `NET SEND` 消息。我们不会对此区域进行任何操作，因为我们将在下一个选项卡（巧合的是，标题为\
  \ `Notifications`）中处理此作业的通知。点击 `Notifications` 选项卡继续。\n\n\n\n##### 通知选项卡\n\n此屏幕的初始界面如图\
  \ 9-24 所示。请注意，这里唯一选中的选项是`写入 Windows 应用程序事件日志`。这很好，但我们需要的不仅仅是某处日志中的一个条目——我们还得去搜索它，然后尝试确定错误的确切原因。相反，我们可以利用此区域为此作业的任何失败设置实时通知。\n\
  \n![A436605_1_En_9_Fig24_HTML.jpg](img/A436605_1_En_9_Fig24_HTML.jpg)\n\n图 9-24\n\
  \n作业步骤属性 – Subplan_1，通知选项卡\n\n清单 9-11 展示了此区域的各种选项和值。要使用`电子邮件`、`寻呼`和`Net send`选项，您必须已经建立了一个`操作员`。由于我们将使用此功能，我将在下一节介绍如何设置`操作员`。\n\
  \n清单 9-11. 通知选项\n\n*   `电子邮件`\n    *   这可能是使用最多的选项，因为电子邮件非常普遍。只需选择一个拥有已验证电子邮件的`操作员`，然后从下拉菜单中选择条件。\n\
  *   `寻呼`\n    *   对于仍在使用寻呼机的数据中心，这是保持联系的好方法。或者，如果某人没有寻呼机，您也可以将给他们发短信视为等同于寻呼。\n*\
  \   `Net send`\n    *   如果您的个人电脑和数据库服务器位于同一网络上，并且您的个人电脑与数据库服务器有直接连接，那么您可以使用`Net\
  \ send`从数据库服务器直接向您的个人电脑发送消息。此消息将以模式对话框的形式出现在您的个人电脑上。\n*   `写入 Windows 应用程序事件日志`\n\
  \    *   此区域中默认唯一选中的选项。保持勾选此项是个不错的主意。\n*   `自动删除作业`\n    *   和之前一样，我无法想象会在作业完成后想要删除它的实例，主要是因为该作业的历史记录要么被删除，要么变得难以解读，这样我们就失去了可能需要的任何取证信息。\n\
  \n对于这些选项中的每一个，右侧的下拉菜单都有以下三个选项：\n\n*   `作业成功时`\n    *   整个作业必须成功。\n*   `作业失败时`\n\
  \    *   整个作业必须失败。\n*   `作业完成时`\n    *   整个作业只需完成即可，无论成功还是失败。\n\n本节内容已完成，因此单击`确定`按钮保存更改并再次返回到设计器。请注意，在`对象资源管理器`的`SQL\
  \ Server 代理`菜单的`作业`子菜单中，作业名称现已更新为`完整备份`。我们将在完成`操作员`的设置后，再回到此`通知`选项卡。\n\n###### 设置操作员\n\
  \n在我的第一本书《SQL Server 中的实用维护计划》中，我详细介绍了如何使用警报选项卡设置新的`操作员`。在该部分有一种添加新`操作员`的方法，但我想专门在本节中介绍如何使用`对象资源管理器`中`SQL\
  \ Server 代理`菜单下的`操作员`子菜单。\n\n在此上下文中，`操作员`是指负责在事件发生时接收有关数据库状态信息的人员。他们不一定是能够缓解情况的人，但他们是能够触发行动以促成改变的人。例如，一位高管可能希望在备份失败时得到通知，以便他们了解情况，但我非常怀疑这位高管是否能够解决这个问题。\n\
  \n此时，您的`SQL Server 代理`菜单应如图 9-25 所示，特别是在作业名称已更新的部分。\n\n![A436605_1_En_9_Fig25_HTML.jpg](img/A436605_1_En_9_Fig25_HTML.jpg)\n\
  \n图 9-25\n\nSQL Server 代理菜单\n\n右键单击`操作员`并选择`新建操作员…`以继续。初始界面如图 9-26 所示。\n\n![A436605_1_En_9_Fig26_HTML.jpg](img/A436605_1_En_9_Fig26_HTML.jpg)\n\
  \n图 9-26\n\n新建操作员\n\n我们将在`名称`字段中输入将接收通知的人员的实际姓名，并在其`电子邮件名称`字段中输入他们的电子邮件地址。如果您有一个`NET\
  \ SEND`地址，可以在此处输入。寻呼机信息也是如此；如果您有此信息，请在此处输入。如果您没有此信息或不需要使用，可以将其留空。\n\n输入此信息后，您的界面应与图\
  \ 9-27 所示非常相似。\n\n![A436605_1_En_9_Fig27_HTML.jpg](img/A436606_1_En_9_Fig27_HTML.jpg)\n\
  \n图 9-27\n\n新建操作员，已更新\n\n接下来，我们想查看`通知`选项卡，尽管在此区域我们暂时无法操作，因为我们是首次创建此用户。如果此用户已存在一段时间，那么这里会有一些我们可以查看的信息，详细说明发送给此用户的通知。例如，如果有用户对收到通知提出异议，这将是有用的。\n\
  \n请单击`确定`按钮继续创建此`操作员`。请注意，我们的`操作员`子菜单现在包含了我们刚刚创建的用户名条目。这意味着该用户现在可以在作业内被指定为`操作员`，因此请再次双击`完整备份作业`并单击`通知`选项卡。这将调出如图\
  \ 9-24 所示的窗口，只是我们现在可以添加我们的`操作员`了。图 9-28 显示了作业属性窗口的`通知`选项卡中此选项可用。\n\n![A436605_1_En_9_Fig28_HTML.jpg](img/A436605_1_En_9_Fig28_HTML.jpg)\n\
  \n图 9-28\n\n操作员可用\n\n我选择了我的新`操作员`，将事件下拉菜单保持设置为`作业失败时`，然后单击`确定`。这便将我的`操作员`用户添加到了`通知`选项卡，这意味着如果此作业失败，我将收到电子邮件。\n\
  \n设置维护计划到此就完成了。我们已经定义了任务的实际参数，并设置并启用了一个`操作员`来接收失败通知。接下来，我们需要测试此计划，以确保其正常执行。\n\n\n\
  #### 测试完整备份计划\n\n为了正确判断我们的计划是否运行正常，我们需要为该计划定义退出标准。在此示例中，清单 9-12 详细说明了我们将作为退出标准查看的内容。\n\
  \n清单 9-12. 退出标准\n\n*   作业正确启动且无错误\n*   备份文件在正确的位置创建\n*   发生错误时发送通知\n*   Windows\
  \ 事件日志记录备份操作\n*   作业正确退出且无错误\n\n这些项目的成功完成将决定整个计划的成功与否。我将手动启动作业，而不是等到午夜让它自动运行。我可以随时通过右键单击作业并选择\
  \ `在此步骤启动作业…` 选项来启动作业。或者，如果我想运行整个维护计划，我可以右键单击维护计划名称并选择 `执行` 选项。我只想先检查作业，因此如前所述，右键单击该作业并执行它。它运行了几秒钟，然后我们可以看到在\
  \ `E:\\SQL Server\\Backup` 中创建了一个名为 `backrecTestDB` 的新目录，并且一个新的备份文件被放置在该目录中。我们还在图\
  \ 9-29 所示的对话框窗口中看到了一条成功消息。\n\n![A436605_1_En_9_Fig29_HTML.jpg](img/A436605_1_En_9_Fig29_HTML.jpg)\n\
  \n图 9-29\n\n成功消息\n\n如果我们打开 Windows 事件日志并转到应用程序日志，我们将看到图 9-30 所示的内容，这确认了 Windows\
  \ 将我们的备份操作视为成功的任务。\n\n![A436605_1_En_9_Fig30_HTML.jpg](img/A436605_1_En_9_Fig30_HTML.jpg)\n\
  \n图 9-30\n\nWindows 应用程序事件日志\n\n我们此时唯一没有测试的是“通知”选项，由于没有发生故障，该选项未触发。\n\n#### SSMS\
  \ 中的完整恢复计划\n\n本节将详细介绍如何从可用的备份文件中制定一个可靠的恢复计划。本节的好处在于，它完全依赖于存在可恢复的备份数据集；如果没有可恢复的备份，我们就无法恢复任何数据。\n\
  \n在 SSMS 中，没有我们可以运行的“还原数据库”任务。相反，我们需要使用用于还原数据库的 T-SQL 命令，并将该命令包装在我们能够按需执行的 SQL Server\
  \ 代理作业中。我们计划实现此目标的基本结构很简单，如清单 9-13 所示。\n\n清单 9-13. 数据恢复结构\n\n*   使用第 5 章中已知可用的 `RESTORE\
  \ DATABASE` 命令作为 T-SQL 语法的基础\n*   创建一个 T-SQL 类型的 SQL Server 代理作业\n*   创建当前完整备份的副本并将其重命名为\
  \ `backrecTestDB.bak`\n*   正常恢复数据\n\n我想在这里暂停一下，并快速说明一点：我们复制和重命名备份文件的原因是因为我不想破坏维护计划已建立的恢复链。我想使用相同的数据，但脚本必须在恢复脚本中引用一个静态的文件名，这就是我选择复制和重命名文件的原因。我确定处理这一方面有不同的方法，如果你有不同的处理方法，那非常好！\n\
  \n#### T-SQL 恢复命令\n\n参考第 5 章，我们用来恢复数据的命令是\n\n```\nRESTORE DATABASE backrecTestDB\n\
  FROM DISK = 'E:\\SQL Server\\Backup\\backrecTestDB\\backrecTestDB.bak'\nWITH REPLACE\n\
  GO\n```\n\n我们将在恢复作业中使用相同的命令，因此请记下 `FROM DISK` 的位置，因为我们在本节重命名文件时需要使用该位置。\n\n#####\
  \ SQL Server 代理恢复作业\n\n要开始本节，我们需要在不先创建维护计划的情况下创建一个 SQL Server 代理作业。展开 SQL Server\
  \ 代理，右键单击 `作业`，然后选择 `新建作业…` 继续。新建作业窗口打开，如图 9-31 所示；请注意，它与我们之前看到的窗口略有不同，该窗口中的一些信息是从维护计划中引用的。\n\
  \n![A436605_1_En_9_Fig31_HTML.jpg](img/A436605_1_En_9_Fig31_HTML.jpg)\n\n图 9-31\n\
  \n新建作业窗口，常规选项卡\n\n这是一个完全空白的画布，供我们创建任何想要的内容。在此屏幕上，我们希望更新清单 9-14 中的以下值。\n\n清单 9-14.\
  \ 新建作业的值\n\n*   名称\n    *   更新为“完整恢复”\n*   所有者\n    *   这应该是 SQL Server 中的 `sa`（主要管理员）帐户，或自定义的服务器代理服务帐户，而不是普通用户帐户\n\
  *   类别\n    *   将其更改为“数据库维护”\n*   说明\n    *   输入类似“这是完整恢复计划中完整恢复部分”的内容\n\n此外，我们要确保“已启用”复选框保持选中状态。接下来，我们要选择左侧的“步骤”选项卡。此时会打开一个空白窗口，如图\
  \ 9-32 所示。\n\n![A436605_1_En_9_Fig32_HTML.jpg](img/A436605_1_En_9_Fig32_HTML.jpg)\n\
  \n图 9-32\n\n新建作业窗口，步骤选项卡\n\n对于此页面，我们将单击屏幕底部的 `新建…` 按钮，然后看到如图 9-33 所示的新建作业步骤屏幕。\n\
  \n![A436605_1_En_9_Fig33_HTML.jpg](img/A436605_1_En_9_Fig33_HTML.jpg)\n\n图 9-33\n\
  \n新建作业步骤，常规选项卡\n\n这又是一个我们不熟悉的界面。我们可能习惯于看到从维护计划预先填充了信息的此屏幕，但这实际上非常简单。接下来，我们需要更新清单\
  \ 9-15 中所示的值。\n\n清单 9-15. 常规选项卡选项\n\n*   步骤名称\n    *   完整恢复 T-SQL 命令\n*   类型\n \
  \   *   Transact-SQL 脚本 (T-SQL)\n*   运行身份\n    *   （此值尚无法更新）\n*   数据库\n    *   Master\n\
  *   命令\n    *   粘贴“T-SQL 恢复命令”部分中的 T-SQL 脚本\n\n请注意，我们目前还无法更新 `运行身份:` 值。这暂时没问题，因为我们必须先保存这些值，然后再返回此屏幕。您现在应该会看到如图\
  \ 9-34 所示的内容。\n\n![A436605_1_En_9_Fig34_HTML.jpg](img/A436605_1_En_9_Fig34_HTML.jpg)\n\
  \n图 9-34\n\n新建作业步骤，常规选项卡（已更新）\n\n所有内容填写完毕后，单击“确定”按钮以创建初步作业。立即再次双击该作业，您将看到 `运行身份:`\
  \ 下拉菜单现已启用。但是，没有可选择的值。换句话说，我们无法选择以 SQL Server 代理身份运行此作业。\n\n单击“高级”选项卡，您将看到如图 9-35\
  \ 所示的屏幕。\n\n![A436605_1_En_9_Fig35_HTML.jpg](img/A436605_1_En_9_Fig35_HTML.jpg)\n\
  \n图 9-35\n\n作业步骤属性，高级选项卡\n\n同样，我们需要将这些选项更新为清单 9-16 中所示的值。\n\n清单 9-16. 高级选项卡选项\n\n\
  *   成功时的操作\n    *   保留默认值。\n*   重试次数\n    *   保留默认值。\n*   重试间隔（分钟）\n    *   保留默认值。\n\
  *   失败时的操作\n    *   保留默认值。\n*   输出文件\n    *   除非你想创建输出文件，否则保留空白。我不创建它们，因为我在表中创建了条目，并且步骤输出在历史记录中，但你可以自由选择。\n\
  *   记录到表\n    *   选择此选项。\n*   在历史记录中包括步骤输出\n    *   选择此选项。\n*   以用户身份运行\n    * \
  \  保留空白。当我们这样做时，作业将强制以 SQL Server 代理服务帐户身份运行。\n\n\n当您完成操作后，您的界面应如图 9-36 所示。\n\n\
  ![A436605_1_En_9_Fig36_HTML.jpg](img/A436605_1_En_9_Fig36_HTML.jpg)\n\n图 9-36\n\n\
  作业步骤属性，高级选项卡（已更新）\n\n这些值都是正确的，因此请继续单击“确定”按钮以保存这些配置设置。然后我们会返回到“新建作业”界面，只是“作业步骤列表”字段中的值已更新。请注意，“开始步骤”值也已更新为我们刚刚创建的步骤名称。图\
  \ 9-37 显示了此更新后的界面。\n\n![A436605_1_En_9_Fig37_HTML.jpg](img/A436605_1_En_9_Fig37_HTML.jpg)\n\
  \n图 9-37\n\n新建作业，已更新\n\n我们不打算计划此作业，也不需要为其设置警报。但是，我们确实希望确保“通知”选项卡已选中“写入 Windows 应用程序事件日志”，并且我们希望向我们的操作员发送电子邮件，通知作业已完成——不是失败也不是成功，而是已完成。这样，无论哪种情况我们都会收到状态更新。图\
  \ 9-38 显示了“通知”选项卡更新后的界面。\n\n![A436605_1_En_9_Fig38_HTML.jpg](img/A436605_1_En_9_Fig38_HTML.jpg)\n\
  \n图 9-38\n\n新建作业，通知选项卡（已更新）\n\n这就是配置此作业所需做的全部工作。单击“确定”按钮保存它，并返回到 `SSMS` 主屏幕，此时 `SQL\
  \ Server 代理`的“作业”子菜单中会显示更新后的作业。图 9-39 显示了此更新后的界面。\n\n![A436605_1_En_9_Fig39_HTML.jpg](img/A436605_1_En_9_Fig39_HTML.jpg)\n\
  \n图 9-39\n\n`SQL Server 代理`，已更新\n\n因此，在本节中，我们从头开始创建了一个完整的还原作业；再次说明，我们之所以必须这样做，是因为\
  \ `SQL Server` 没有在工具箱中为我们提供还原数据库工具，因此我们不得不将 `RESTORE DATABASE` 命令包装在 `SQL Server\
  \ 代理`作业中。正如我之前所说，如果您能使用替代方法达到最终结果，那非常好！\n\n##### 复制并重命名当前备份文件\n\n接下来，我们只需要复制本章前面运行的完整备份。此数据库的默认备份位置是\
  \ `E:\\SQL Server\\Backup\\backrecTestDB`，但您的可能不同。无论如何，选择备份位置，如前面所示复制并重命名文件。就我而言，我将我的文件重命名为\
  \ `E:\\SQL Server\\Backup\\backrecTestDB\\backrecTestDB.bak`。完成后，我们就可以进入下一节。\n\n\
  ##### 还原数据\n\n对于本节，我们要做的就是右键单击“完整还原作业”并选择 `从步骤开始作业…` 来运行该作业。请注意，我们需要删除任何数据库快照才能还原数据库，因此在尝试继续之前，请从\
  \ `SSMS` 界面删除您可能有的任何快照。\n\n一旦我们运行该作业，它需要一点时间来完成，然后我们应该看到如图 9-40 所示的内容。\n\n![A436605_1_En_9_Fig40_HTML.jpg](img/A436605_1_En_9_Fig40_HTML.jpg)\n\
  \n图 9-40\n\n成功还原数据库\n\n接下来，您可以运行“备份和还原事件”报告来查看数据库是否确实已还原。您也可以检查 Windows 应用程序事件日志中的条目，如图\
  \ 9-41 所示。\n\n![A436605_1_En_9_Fig41_HTML.jpg](img/A436605_1_En_9_Fig41_HTML.jpg)\n\
  \n图 9-41\n\nWindows 应用程序事件日志条目\n\n所以，您已经拥有了它。一个完整的完整还原作业，我们现在可以在需要时用来还原数据库。只需按照本节中的说明操作，您就会一切顺利。\n\
  \n#### 总结\n\n在本章中，我们根据本书过程中收集的需求，将完整备份维护计划拼凑完整。\n\n我们学习了 `SSMS` 维护计划区域中的许多各种配置选项。\n\
  \n我们还学习了 `SQL Server 代理` 作业区域中的配置选项。\n\n我们学习了如何设置一个操作员，以便在作业失败时接收电子邮件。\n\n这是创建整个备份场景所需的三部分中的第一部分。当我们完成整个场景后，我们将对其进行广泛测试，以确保每个事件都能正确通知操作员，因此不必担心我们尚未测试电子邮件接收。我们会在本书结束前完成这一点。\n\
  \n我们还拼凑了完整还原计划的各个部分，测试了完整还原 `SQL Server 代理` 作业，然后通过“备份和还原事件”报告和 Windows 应用程序事件日志验证了结果。\n\
  \n在第 10 章中，我们将把差异备份添加到“备份计划”维护计划中，并像配置完整备份计划一样配置它。我们还将创建一个差异还原 `SQL Server 代理` 作业。\n\
  \n在第 11 章中，我们将讨论如何将事务日志备份添加到“备份计划”维护计划，并创建一个事务日志还原 `SQL Server 代理` 作业。\n\n本书将以一个完整的测试计划、一个关于如何测试计划是否成功的指南，以及我们可以用来减轻有害情况或包执行中错误的故障排除提示和技巧作为结尾。\n\
  \n"
- "# 10. 差异备份和还原解决方案\n\n既然我们在第 9 章中详细介绍了功能正常的完整备份和完整还原 `SQL Server 代理` 作业，我们需要拼凑出差异备份和差异还原部分。我们将借鉴第\
  \ 2 章和第 6 章的内容来完成本章，但我们将着眼于为我们现有的“备份计划”维护计划添加略有不同的功能和定制。\n\n我们想要做的是修改备份计划以包含备份的差异部分，然后创建一个新的差异还原\
  \ `SQL Server 代理` 作业，以便手动运行或与完整还原 `SQL Server 代理` 作业结合运行。在本章结束时，我们将为现有计划创建一个附加部分，测试我们目前为该计划创建的内容，并验证预期操作的预期结果。\n\
  \n最近，我接到任务，要在我的工作区域创建一个相同的开发环境。您可能明白我的意思了；由于事情的偶然性，我能够将我们现在所做的应用到真实场景中，并且它奏效了。我可以将完整数据库备份还原到一个全新的\
  \ `SQL Server` 实例，没有任何麻烦，不仅如此，我还能将差异和事务日志备份也还原到新服务器上，因此在迁移到开发服务器时基本上实现了零数据丢失。知道我能够快速、正确地备份和还原我负责保护的数据，让我感到非常安心。\n\
  \n我经常发现自己会构思一些“噩梦场景”，这会迫使我快速而正确地思考和行动。显然，这些场景存在局限性；它们必须完全植根于我可以影响或控制结果的情况。例如，服务器宕机的场景完全超出了我的责任范围，因为我需要依赖其他人来解决这种情况。但是，例如，如果不小心运行了一个查询并删除了一个表，或者我的数据库遭受了\
  \ `SQL` 注入攻击（它不会，但请记住这是一个噩梦场景），或者其他与 `SQL Server` 相关的问题出现，我需要知道我有技术能力来回答我需要回答的问题。在我看来，我们可以采取不同的步骤来减轻这些噩梦场景，我们希望最终能在本章中解决这些问题。\n\
  \n现在，让我们专注于将差异备份添加到我们在第 9 章开始的“备份计划”维护计划中。\n\n\n\n#### 在 SSMS 中添加差异备份\n\n我们首先需要做的是打开维护计划进行编辑。在对象资源管理器中，展开\
  \ `Management` 菜单，然后双击 `Backup Plan`。这将打开维护计划，以便我们可以配置其中的任何选项。图 10-1 显示了打开维护计划时您应该看到的初始屏幕。\n\
  \n![A436605_1_En_10_Fig1_HTML.jpg](img/A436605_1_En_10_Fig1_HTML.jpg)\n\n图 10-1：备份计划主舞台\n\
  \n我们需要打开 `Toolbox`，因此可以单击左侧的 `Toolbox` 浮动菜单，或者按 `Ctrl+Alt+X` 来打开 `Toolbox`。接下来，我们要将另一个\
  \ `Back Up Database Task` 拖到主舞台上，位于现有 `Back Up Database Task` 的右侧。图 10-2 显示了新任务的大致位置。\n\
  \n![A436605_1_En_10_Fig2_HTML.jpg](img/A436605_1_En_10_Fig2_HTML.jpg)\n\n图 10-2：新任务\n\
  \n放在舞台上的任何位置都可以，但我把它放在那里是为了在脑海中将其区分为层次结构；左侧的项目是最高级别，右侧的项目是左侧项目的下一级别。\n\n请注意，新任务上还有一个红色的\
  \ `X` 需要处理。我们在第 9 章中遇到过同样的情况，我们这次也将像当时那样处理。我们可以从双击刚刚放置的新任务开始，图 10-3 显示了默认界面。\n\n\
  ![A436605_1_En_10_Fig3_HTML.jpg](img/A436605_1_En_10_Fig3_HTML.jpg)\n\n图 10-3：`Back\
  \ Up Database Task`，`General` 选项卡\n\n对于此区域，我们需要按照清单 10-1 所示进行设置，以配置此区域中的各种选项。\n\n\
  **清单 10-1. 待办事项列表**\n\n*   `Backup type`\n    *   我们必须从 `full`、`differential` 或\
  \ `transaction log` 中选择。在本例中，我们将选择 `differential`。\n*   `Databases`\n    *   我们必须至少选择一个数据库。请注意，如果从备份类型选项中选择\
  \ `transaction log`，则 `simple` 恢复模型的数据库将被移除。在本例中，我们将选择我们一直在使用的数据库 `backrecTestDB`。\n\
  *   `Backup component`\n    *   我们可以从 `database` 或 `files and filegroups` 中选择。在本例中，我们将选择\
  \ `database`。\n*   `Back up to`\n    *   我们必须从 `disk`、`tape` 或 `URL` 中选择。在本例中，保持设置为\
  \ `disk`。\n\n请注意，这些设置与第 9 章中的设置几乎相同。我们所做的唯一更改是在 `Backup type` 字段中选择了 `differential`\
  \ 而不是 `full`。您的屏幕现在应该如图 10-4 所示。\n\n![A436605_1_En_10_Fig4_HTML.jpg](img/A436605_1_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4：`Back Up Database Task`，`General` 选项卡，已更新\n\n接下来，我们想单击窗口顶部的 `Destination`\
  \ 选项卡。确保选中 `Create a sub-directory for each database` 复选框，这就是我们对此选项卡需要做的全部。图 10-5\
  \ 显示了完成的界面。\n\n![A436605_1_En_10_Fig5_HTML.jpg](img/A436605_1_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5：`Back Up Database Task`，`Destination` 选项卡\n\n接下来单击 `Options` 选项卡。再次强调，类似于自定义维护计划的\
  \ `Full Backup` 部分，我们将在此选项卡上选中 `Verify backup integrity` 和 `Perform checksum` 复选框。图\
  \ 10-6 显示了完成的界面。\n\n![A436605_1_En_10_Fig6_HTML.jpg](img/A436605_1_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6：`Back Up Database Task`，`Options` 选项卡\n\n干得漂亮！信不信由你，这部分已经完成了。接下来，我们需要计划此部分的任务（此处巧妙引用了\
  \ Dan Fogelberg）。继续并单击 `OK` 按钮以添加此部分任务，并注意红色 `X` 已经消失了。但是，看到我们有两个任务在同一个舞台上吗？让我们更高效地操作。在舞台顶部，有一个标为\
  \ `Add Subplan` 的按钮。继续单击该按钮，您将看到如图 10-7 所示的内容。\n\n![A436605_1_En_10_Fig7_HTML.jpg](img/A436605_1_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7：子计划属性\n\n将 `Name` 字段更改为 `Differential Backup`，并添加描述“这是备份维护计划的差异备份部分”。完成后单击\
  \ `OK`，您将看到更新后的界面，如图 10-8 所示。\n\n![A436605_1_En_10_Fig8_HTML.jpg](img/A436605_1_En_10_Fig8_HTML.jpg)\n\
  \n图 10-8：更新后的主舞台\n\n现在舞台上没有任何东西，因为尚未向子计划添加任何内容。单击屏幕顶部的 `Full Backup` 子计划，单击我们刚刚创建的子计划，按\
