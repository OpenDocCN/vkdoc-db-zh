  图 10-16 作业属性，通知选项卡\n\n这就是本节的结尾。我们已成功设置了差异备份作业。请继续点击“确定”以进入下一节。\n\n#### 测试差异备份计划\n\
  \n第 9 章让我们创建了完整备份计划，然后进行了测试。如果您跟随操作，您的计划应该也已成功测试。接下来，我们只想运行计划中的差异备份部分，但在开始之前，我们需要确定计划的退出标准。在此示例中，清单\
  \ 10-2 详细说明了我们将要寻找的退出标准。\n\n清单 10-2. 退出标准\n*   作业正确启动且无错误\n*   备份文件创建在正确位置\n*  \
  \ 如果发生错误，则发送通知\n*   Windows 事件日志记录了备份操作\n*   作业正确退出且无错误\n\n考虑到这一点，请右键单击 `备份计划.差异备份\
  \ SQL Server 代理作业`（记住，我们稍后会更改名称）并选择 `从步骤开始作业…` 来运行作业。您也可以打开文件位置，以验证文件是否按预期写入，并同时打开事件查看器，以便查看\
  \ Windows 事件日志中是否添加了新条目。\n\n最终，会出现如图 10-17 所示的窗口，显示我们的作业已成功。\n\n![A436605_1_En_10_Fig17_HTML.jpg](img/A436605_1_En_10_Fig17_HTML.jpg)\n\
  图 10-17 启动作业成功\n\n我还在 Windows 事件查看器的应用程序日志中收到了一个条目，其详细信息如图 10-18 所示。\n\n![A436605_1_En_10_Fig18_HTML.jpg](img/A436605_1_En_10_Fig18_HTML.jpg)\n\
  图 10-18 事件属性\n\n我还检查了文件位置，新的差异备份已创建。因此，我们可以安全地认为该计划运行正常。\n\n#### 在 SSMS 中创建差异还原计划\n\
  \n我们将使用 SQL Server Agent 在 SSMS 中创建差异还原计划，就像我们在第 9 章中处理完整还原计划一样。我们将遵循相同的基本指令集，只是在涉及还原类型的地方有所不同。清单\
  \ 10-3 将详细说明我们需要采取的步骤，以确保我们的差异还原计划正确执行。\n\n我们计划实施此操作的基本结构很简单，如清单 9-12 所示。\n\n清单\
  \ 10-3. 还原数据的结构\n*   配置 `RESTORE DATABASE` 命令\n*   创建 T-SQL 类型的 SQL Server Agent\
  \ 作业\n*   创建自上次完整备份以来最新的差异备份副本，并将其重命名为 `backrecTestDB_DIFFERENTIAL.bak`\n*   正常还原数据\n\
  \n现在我们有了如何推进的计划，让我们开始创建此计划。\n\n##### T-SQL 还原命令\n\n在此示例中，我们将使用清单 10-4 中所示的 T-SQL\
  \ 命令。\n\n```sql\nRESTORE DATABASE backrecTestDB\nFROM DISK = N'E:\\SQL Server\\\
  Backup\\backrecTestDB_FULL.bak'\nWITH NORECOVERY, REPLACE;\nRESTORE DATABASE backrecTestDB\n\
  FROM DISK = N'E:\\SQL Server\\Backup\\backrecTestDB_DIFFERENTIAL.bak'\nWITH RECOVERY;\n\
  ```\n清单 10-4 `RESTORE DATABASE` 命令\n\n回想一下，`NORECOVERY` 属性允许我们指定正在还原最后一个完整备份，然后是差异备份。如果不首先还原最近的完整备份，就无法还原差异备份，因此我们需要先运行完整还原，然后再运行差异还原。为此，我们包含了清单\
  \ 10-4 中所示的完整还原语法以及差异还原语法，以正确还原数据库。请注意，这两条命令由分号分隔；这表示我们将在两个独立的 SQL Server Agent\
  \ 作业步骤中使用这些命令，如下一节所示。\n\n\n##### SQL Server 代理恢复作业\n\n在本节中，我们将从创建一个新的 SQL Server\
  \ 代理作业开始。展开 `SQL Server 代理`，右键单击 `作业`，然后选择 `新建作业…` 以继续。新建作业窗口打开后，请根据图 10-19 所示的值更新窗口。\n\
  \n![A436605_1_En_10_Fig19_HTML.jpg](img/A436605_1_En_10_Fig19_HTML.jpg)\n\n图 10-19：新建作业，常规选项卡\n\
  \n我想重申一下，就所有者这个值而言，你的设置将与我的不同。很可能在很多情况下，你的特定用户账户会与我的不同，因此我给出的指导应概念性地理解，而非字面照搬。这对大多数人来说可能显而易见，但以防有任何混淆，我想在此说明清楚。\n\
  \n接下来，我们要选择 `步骤` 选项卡。在此区域中，我们单击 `新建…` 按钮以打开“新建作业步骤”屏幕，并为作业创建一个新步骤。我们需要创建的第一个步骤是完整还原任务，第二个任务是差异还原。如图\
  \ 10-20 所示更新“新建作业步骤”屏幕，以创建计划的完整还原部分。\n\n![A436605_1_En_10_Fig20_HTML.jpg](img/A436605_1_En_10_Fig20_HTML.jpg)\n\
  \n图 10-20：新建作业步骤，常规选项卡\n\n接着，单击 `高级` 选项卡以显示该区域的选项。我们这里只想勾选 `记录到表` 和 `将步骤输出包含在历史记录中`\
  \ 复选框；其余选项可以保持默认设置。图 10-21 屏幕显示了更新值后应有的样子。\n\n![A436605_1_En_10_Fig21_HTML.jpg](img/A436605_1_En_10_Fig21_HTML.jpg)\n\
  \n图 10-21：新建作业步骤，高级选项卡\n\n设置好这些值后，单击 `确定` 按钮关闭此窗口并返回到“新建作业”窗口。我们现在可以看到完整还原步骤已列为步骤\
  \ 1。\n\n我们现在需要创建差异还原步骤，因此再次单击 `新建…` 按钮，打开一个新的“新建作业步骤”窗口实例。在此屏幕上，我们将输入如图 10-22 所示的信息以设置差异步骤。\n\
  \n![A436605_1_En_10_Fig22_HTML.jpg](img/A436605_1_En_10_Fig22_HTML.jpg)\n\n图 10-22：新建作业步骤，常规选项卡\n\
  \n这与我们之前引用的 T-SQL 命令相同，因此我们可以确信它将成功执行。\n\n注意：请注意，对于完整备份步骤，我们使用了 `WITH NORECOVERY`\
  \ 命令，而对于差异备份步骤，我们使用了 `WITH RECOVERY` 命令。这是因为完整备份步骤之后将立即执行差异备份步骤，我们告诉数据库希望将数据库保持在\
  \ `正在还原…` 状态，直到我们还原差异备份步骤，然后在差异备份步骤中使用 `WITH RECOVERY` 命令使数据库重新上线。\n\n现在单击 `高级`\
  \ 选项卡，并像之前在图 10-21 中那样进行更新。用这些选项更新完高级选项卡后，请单击 `确定` 按钮返回到图 10-23 所示的“新建作业”屏幕。\n\n\
  ![A436605_1_En_10_Fig23_HTML.jpg](img/A436605_1_En_10_Fig23_HTML.jpg)\n\n图 10-23：新建作业，已更新\n\
  \n我们现在可以看到，完整还原作业是步骤 1，差异还原是步骤 2。我们还可以看到步骤 1 将在成功时转到步骤 2，这也是我们希望的操作方式。这样，作业就会继续执行，而无需依赖人工干预。毕竟，这些练习的重点是增加\
  \ `SQL Server` 内部的自动化，而不是让我们的工作变得更繁琐。\n\n我们不需要访问 `计划` 或 `警报` 选项卡，所以下一步直接跳到 `通知`\
  \ 选项卡。我们要勾选 `电子邮件` 和 `写入 Windows 应用程序事件日志` 复选框，然后在与 `电子邮件` 复选框相邻的下拉菜单中，选择您应该已设置好的操作员。完成的设置值如图\
  \ 10-24 所示。\n\n![A436605_1_En_10_Fig24_HTML.jpg](img/A436605_1_En_10_Fig24_HTML.jpg)\n\
  \n图 10-24：新建作业，通知选项卡\n\n当您的屏幕与图 10-24 所示一致时，只需单击 `确定` 按钮即可返回到 SSMS 主窗口。`SQL Server\
  \ 代理` 作业已成功创建，对象资源管理器中 `SQL Server 代理` 下的 `作业` 子菜单现已更新，如图 10-25 所示。\n\n![A436605_1_En_10_Fig25_HTML.jpg](img/A436605_1_En_10_Fig25_HTML.jpg)\n\
  \n图 10-25：作业子菜单\n\n我们现在准备进入下一节。\n\n##### 复制并重命名当前备份\n\n我的备份位置 `E:\\SQL Server\\\
  Backup` 已经保持不变好几年了，而且很可能在我停止使用 `SQL Server` 之前都会保持不变。我想原因在于，将备份存储在 `C:` 盘上从来都不是一个好主意，而\
  \ `D` 盘通常是 `CD-ROM` 或 `DVD` 驱动器，因此我可用的物理存储是 `E:` 盘。无论你的情况如何，请确保不要将备份存储在启动盘上，这样就没问题了。\n\
  \n导航到你的备份位置，并找到最新的差异备份文件。我们需要复制此文件并将其重命名为 `backrecTestDB_DIFFERENTIAL.bak`。复制并重命名该备份后，我们就可以执行备份并查看它是否有效。\n\
  \n让我们对数据库做一个快速更改，以便有数据可恢复。还记得我们删除了 `users1` 表吗？让我们再做一次。这将为我们提供相当数量的数据用于恢复。请注意，我通常建议使用事务日志还原来恢复这些数据，但我们还没讲到那里，而且就我们需要演示的内容而言，这个方法是可行的。\n\
  \n##### 恢复数据\n\n右键单击 `差异还原` `SQL Server 代理` 作业，然后选择 `从步骤开始作业…` 来执行该作业。此时会弹出一个窗口，如图\
  \ 10-26 所示。\n\n![A436605_1_En_10_Fig26_HTML.jpg](img/A436605_1_En_10_Fig26_HTML.jpg)\n\
  \n图 10-26：从步骤开始作业…屏幕\n\n选择第一步 `完整还原`，然后单击 `开始` 按钮。最终，我们会看到如图 10-27 所示的成功消息。\n\n\
  ![A436605_1_En_10_Fig27_HTML.jpg](img/A436605_1_En_10_Fig27_HTML.jpg)\n\n图 10-27：开始作业成功\n\
  \n此时，我们的数据库已应用了完整备份和差异备份。接下来，我们需要验证该计划是否正确恢复了数据，因此运行我们之前运行的“备份和还原事件”报告进行验证。要运行此报告，请右键单击你的数据库，转到\
  \ `报告`，然后单击 `备份和还原事件` 项。在那里，你应该看到与图 10-28 非常相似的前两个条目。\n\n![A436605_1_En_10_Fig28_HTML.jpg](img/A436605_1_En_10_Fig28_HTML.jpg)\n\
  \n图 10-28：成功的还原操作\n\n这告诉我们，第一个操作是最下面的那个，最后一个操作是最上面的那个。第一个操作是完整还原（我们可以判断，因为它显示模式为“无恢复”），第二个操作是差异还原。\n\
  \n我能判断数据库已正确恢复的另一种方式是，`users1` 表已还原到表列表中。应用程序事件日志也显示了该条目，因此我假设差异还原操作已成功。\n\n\n####\
  \ 摘要\n\n在本章中，我们了解了如何使用 SQL Server Management Studio 备份和还原差异数据的基础知识。我们学习了 `RESTORE\
  \ DATABASE` 命令的 T-SQL 部分，以及 `WITH NORECOVERY` 和 `WITH RECOVERY` 命令的作用。我们回顾了使用最新的差异备份来还原差异数据的步骤，并学习了如何验证差异还原是否已成功完成。\n\
  \n在下一章中，我们将探讨事务日志备份和还原解决方案，这将增强我们在本书中一直在构建的“备份计划”维护计划。在该章结束时，您将对如何从 SQL Server 备份数据有很好的理解，更重要的是，您将了解如何将该数据还原到\
  \ SQL Server，然后验证数据是否已按预期正确还原。\n\n"
- "# 11. 事务日志备份和还原解决方案\n\n在本书的这一部分，我们研究了针对完整和差异类型的完整备份和还原解决方案。我们看到了差异还原类型如何使用完整还原类型作为还原的基础，然后还原到进行差异备份的时间点。在本章中，我们将探讨如何完成单个备份和还原计划的第三部分，即事务日志。\n\
  \n我们分别在第 3 章和第 7 章中研究了事务日志及其工作原理。事务日志的明显目的是记录事务日志，但它们还用于定义事务所在的可量化时间段。换句话说，它不仅仅是一堆杂乱无章的随机数据；它是数据库视角下按时间顺序排列的事件精确记录。这就是我们能够将数据库回滚到特定事务，或者将某个时间段内的所有更改应用到差异或完整还原操作的方式。除非您极其幸运，恰好能够还原到完整或差异备份被还原的确切时间点，否则这种精确度是无法以任何方式实现的。否则，您将仅限于完整或差异还原操作中存储的数据，这无法提供还原到特定时间点所需的精确度。然而，发生这种情况的可能性非常、非常低，因此，我们依赖事务日志来帮助我们非常准确地将重要数据还原到应用程序或我们的\
  \ SLA 所要求的点。\n\n在本节之前的章节中，我们基本上是以完整还原或差异还原的形式恢复了一大块数据。曾经有一位讲师告诉我所在的班级，还原方法就像生日蛋糕；有很多层，但实际上只有两个主要部分：绝大部分数据（烤好的蛋糕部分）和数据的细枝末节（糖霜）。换句话说，没有糖霜，您当然也可以有一个很棒的蛋糕，但糖霜非常美味，而且确实能为蛋糕增色。这也许不是最好的类比，但在我脑海中是有道理的，因为我可以想象一个没有糖霜的蛋糕仍然是一个蛋糕，但并不完整；而一个有糖霜的蛋糕……那才叫蛋糕！\n\
  \n作为本章的开始，我们再次需要清楚地了解我们想要完成什么。通常，我们可以在很短的时间内准备好一个备份例程。真正的困难出现在我们必须处理还原事务日志的时候。因此，我们需要以与过去进行完整和差异备份略有不同的方式来进行备份。清单\
  \ 11-1 展示了我们将要采取的创建事务日志备份的步骤。这是一个简单的过程，特别是因为我们已经在第 3 章中完成了大部分步骤，所以现在我们需要将该章所学内容增强为一个可工作的解决方案，以便与我们的完整备份计划一起使用。回到第\
  \ 3 章，我们确定希望每小时运行一次事务日志备份，这样我们可能丢失的最大数据量是最小的。当我们还原事务日志时，请记住，我们可以选择备份日志尾部，其中包含最近的事务，因此我们可以使用时间点还原功能还原到故障发生的精确点。\n\
  \n\n#### 在 SSMS 中添加事务日志备份\n\n我想，读到这里你可能已经开始觉得有些熟悉了。我们将把事务日志备份的部分，添加到我们现有的“备份计划”维护计划中。回顾一下，我们的维护计划中已经有了完整备份和差异备份部分，因此这将是完成整个备份计划所需的最后一块拼图。我在清单\
  \ 11-1 中概述了一些需要牢记的重要事项。\n\n清单 11-1. 待办事项清单\n\n*   事务日志备份将每小时执行一次，准点运行\n*   在差异备份之间，我们最多只能恢复五个事务日志\n\
  \n我将这些事项标记为本节的“待办事项清单”，因为我们需要确保在完成本节之前满足这些目标。\n\n要为维护计划添加事务日志部分，请在对象资源管理器中打开“备份计划”维护计划，使该计划显示在\
  \ SQL Server Management Studio 的主界面中，如图 11-1 所示。\n\n![A436605_1_En_11_Fig1_HTML.jpg](img/A436605_1_En_11_Fig1_HTML.jpg)\n\
  图 11-1：备份计划\n\n接下来，我们需要单击屏幕顶部显示的“添加子计划”按钮。当“子计划属性”窗口出现时，在适用字段中添加以下值：\n*   名称：`Transaction\
  \ log backup`\n*   说明：这是备份维护计划的事务日志备份部分。\n\n目前我们不想更改计划或“作为运行”选项，因为我们稍后会处理它们。此时，你应该在“子计划属性”窗口中看到如图\
  \ 11-2 所示的内容。\n\n![A436605_1_En_11_Fig2_HTML.jpg](img/A436605_1_En_11_Fig2_HTML.jpg)\n\
  图 11-2：子计划属性\n\n输入此信息后单击“确定”。请注意，主界面会更新，如图 11-3 所示，将事务日志备份添加为新的子计划。另请注意，事务日志备份子计划已被选中，但主界面中还没有任何内容，因为这是维护计划的一个全新部分。\n\
  \n![A436605_1_En_11_Fig3_HTML.jpg](img/A436605_1_En_11_Fig3_HTML.jpg)\n图 11-3：更新后的备份计划\n\
  \n现在我们有了一个可以操作的空白区域，通过单击左侧的浮动菜单或按 `Ctrl+Alt+X` 打开工具箱，然后将一个“备份数据库任务”项拖到主界面。现在我们会看到熟悉的带有红色\
  \ X 的界面，如图 11-4 所示，因此双击该任务进行编辑。\n\n![A436605_1_En_11_Fig4_HTML.jpg](img/A436605_1_En_11_Fig4_HTML.jpg)\n\
  图 11-4：备份数据库任务\n\n一旦“备份数据库任务”窗口打开，你需要在备份类型下拉菜单中选择 `transaction log`。接下来，你需要从“数据库”下拉菜单中选择\
  \ `backrecTestDB`（或你的数据库）。你也可以在此区域选择任何其他数据库，但此时我们专门处理我们的数据库。选择所需数据库后，单击“确定”按钮返回主“备份数据库任务”窗口。此选项卡上的最后一个选项“备份到”应保留为默认选项，即\
  \ `Disk`。完成的界面如图 11-5 所示。\n\n![A436605_1_En_11_Fig5_HTML.jpg](img/A436605_1_En_11_Fig5_HTML.jpg)\n\
  图 11-5：备份数据库任务，“常规”选项卡，已完成\n\n你是否注意到，一旦选择了数据库，“备份组件”选择就变为禁用状态？这是因为你选择了 `transaction\
  \ log` 选项，因此显然无法选择事务日志以外的备份组件。\n\n在此窗口中选择“目标”选项卡以继续。我们在下一个屏幕上要做的全部操作就是勾选“为每个数据库创建子目录”选项。此选项卡的完成界面如图\
  \ 11-6 所示。\n\n![A436605_1_En_11_Fig6_HTML.jpg](img/A436605_1_En_11_Fig6_HTML.jpg)\n\
  图 11-6：备份数据库任务，“目标”选项卡，已完成\n\n这个简单的选择告诉 SQL Server，我们不希望将事务日志全部放入一个文件夹；相反，我们希望它们按数据库名称分开存放。这将使需要时的恢复和管理更加容易。\n\
  \n接下来选择“选项”选项卡，并回想一下我们要选择的选项如下：\n*   `Verify integrity`\n*   `Perform checksum`\n\
  \n这些选项将确保我们正在验证备份，并确保将对备份进行错误检查。图 11-7 显示了此选项卡的完成界面。\n\n![A436605_1_En_11_Fig7_HTML.jpg](img/A436605_1_En_11_Fig7_HTML.jpg)\n\
  图 11-7：备份数据库任务，“选项”选项卡，已完成\n\n更新此选项卡后，单击“确定”按钮关闭此窗口并返回主界面。请注意，主界面上我们的“备份数据库任务”项中的红色\
  \ X 消失了。这表明该任务已消除了基本错误，这些错误在之前红色 X 存在时会阻碍成功启动。\n\n接下来，我们需要设置此任务的计划。\n\n#### 计划事务日志备份\n\
  \n就像我们在第 9 章和第 10 章中设置的先前子计划一样，我们需要单击我们要更新的子计划所在行的日历图标。在本例中，我们将选择事务日志备份子计划上的日历图标。这将打开之前章节中看到的“新建作业计划”窗口。要更新此界面并将备份间隔设置为一小时，请确保你的屏幕与图\
  \ 11-8 所示的内容匹配。\n\n![A436605_1_En_11_Fig8_HTML.jpg](img/A436605_1_En_11_Fig8_HTML.jpg)\n\
  图 11-8：新建作业计划，已完成\n\n为了完成此界面，我在“发生”下拉菜单中选择了“每天”选项，然后选择“发生间隔”单选按钮并保留默认值 `1 hour(s)`。这就是完成此屏幕所需的全部操作。更新此界面后，单击“确定”按钮关闭此窗口并再次返回主界面。图\
  \ 11-9 显示了我们更新后的维护计划的样子。\n\n![A436605_1_En_11_Fig9_HTML.jpg](img/A436605_1_En_11_Fig9_HTML.jpg)\n\
  图 11-9：更新后的备份计划\n\n请注意事务日志备份子计划条目中添加的计划信息。这表明我们的计划信息已被维护计划输入并保留。\n\n#### 更新 SQL\
  \ Server Agent 作业\n\n一旦我们在 SSMS 中完成维护计划主要部分的设置，我们需要在 SQL Server Agent 的“作业”部分中更新一些功能，因此在对象资源管理器中展开\
  \ `SQL Server Agent`，然后展开 `Jobs`，再双击 `Backup Plan.Transaction Log Backup`。\n\n#####\
  \ 常规选项卡\n\n我们从“常规”选项卡开始，因此如图 11-10 所示进行更新。\n\n![A436605_1_En_11_Fig10_HTML.jpg](img/A436605_1_En_11_Fig10_HTML.jpg)\n\
  图 11-10：作业属性，“常规”选项卡\n\n我在这里所做的就是更新 `Description` 字段并验证 `Enabled` 复选框已被勾选。这就是我们完成此选项卡所需的全部操作。单击“步骤”选项卡继续。\n\
  \n\n##### 步骤选项卡\n\n此选项卡在作业步骤列表区域中已经存在事务日志备份作业。不过我们需要更新此作业，因此请双击作业名称，然后单击“高级”选项卡。图\
  \ 11-11 显示了更新后的“高级”选项卡；请注意，“常规”选项卡是默认界面，但我们无需在此选项卡上更新任何内容。\n\n![A436605_1_En_11_Fig11_HTML.jpg](img/A436605_1_En_11_Fig11_HTML.jpg)\n\
  \n图 11-11\n\n作业步骤属性，高级选项卡\n\n在此选项卡上，我勾选了底部的三个复选框以启用日志记录和历史步骤信息的收集。此屏幕中的其他所有设置保持不变，因此单击“确定”继续。您将最终返回到“步骤”选项卡的默认视图。\n\
  \n由于我们不打算配置“计划”和“警报”选项卡，因此可以跳过它们。接下来，请单击“通知”选项卡继续。\n\n##### 通知选项卡\n\n此选项卡中默认选中的选项是写入\
  \ `Windows 应用程序事件日志`。这是一个好的开始，但我们希望在作业失败时通过电子邮件收到通知。为此，请选中“电子邮件”复选框，然后选择操作员（该操作员应已预先设置好）。图\
  \ 11-12 显示了“通知”选项卡更新后的界面。\n\n![A436605_1_En_11_Fig12_HTML.jpg](img/A436605_1_En_11_Fig12_HTML.jpg)\n\
  \n图 11-12\n\n作业属性，通知选项卡\n\n如此设置此选项卡后，如果作业失败，我们将通过电子邮件收到通知，同时信息也会记录到 `Windows 应用程序事件日志`中。这将完成本节配置，因此请继续并按“确定”按钮继续。我们将返回到主舞台，已完成的维护计划就位于此舞台中。现在请将您的工作保存到维护计划中。\n\
  \n#### 测试事务日志备份计划\n\n要测试事务日志备份计划，我们需要右键单击 `Backup Plan.Transaction Log Backup Job`，然后选择\
  \ `在步骤启动作业…` 来触发该作业。它的运行时间应该非常短，然后会显示一个类似图 11-13 所示的完成状态窗口。\n\n![A436605_1_En_11_Fig13_HTML.jpg](img/A436605_1_En_11_Fig13_HTML.jpg)\n\
  \n图 11-13\n\n成功启动作业\n\n事务日志中实际上没有太多需要备份的内容，这就是为什么它的运行时间非常短。一旦看到如图 11-13 所示的屏幕，您就可以放心地认为，备份计划维护计划中的事务日志备份部分已经正确配置。通过检查您的备份文件夹（我的是\
  \ `E:\\SQL Server\\Backup\\backrecTestDB`）中是否存在 `.trn` 文件来验证备份是否已创建。如果文件位于该位置，那么您就完成了。如果没有，则可能需要返回本章的第一部分，验证您是否将事务日志备份创建到了正确的目录。\n\
  \n#### 在 SSMS 中进行事务日志恢复\n\n我们将在 `SSMS` 中使用 `SQL Server Agent` 来创建事务日志 `还原` 计划，就像我们在第\
  \ 9 章介绍的完整 `还原` 计划和第 10 章介绍的差异 `还原` 计划一样。不过，对于事务日志还原，我们将遵循稍有不同的操作说明。清单 11-2 将详细说明我们需要采取的步骤，以确保我们的事务日志\
  \ `还原` 计划能够正确执行。\n\n清单 11-2. 还原数据的结构\n\n*   创建一个可跟踪的数据轨迹，以便我们知道还原了哪些数据\n*   运行 `Backup\
  \ Plan.Transaction Log Backup` `SQL Server Agent` 作业\n*   复制并重命名备份文件\n*   配置 `RESTORE\
  \ DATABASE` 命令\n*   还原最近的完整备份\n*   还原最近的差异备份\n*   按顺序还原事务日志，直至所需的时间点\n\n在此场景中，我们需要先还原完整备份，然后是差异备份，最后按顺序还原事务日志备份。这将使我们能够还原所需的数据，这些数据包含在当前已备份的事务日志中。我们可以使用\
  \ `T-SQL` 通过 `RESTORE DATABASE` 命令中的 `STOPAT` 属性来还原到特定时间点。我们将很快介绍此命令的语法。\n\n根据我在本书中一直强调的备份场景，请注意，鉴于我们每六小时执行一次差异备份，每个还原序列最多只需还原五个事务日志。因此，正如我们在清单\
  \ 11-1 中指出的，当我们像上一节那样实施事务日志备份时，需要确保它们按照前面提到的顺序运行（即每小时整点运行一次事务日志备份）。利用此顺序，我们可以最多还原五个事务日志，而无需转到下一个按时间顺序的完整或差异备份进行还原。\n\
  \n既然我们已经有了如何继续的计划，那么就开始创建这个计划吧。\n\n##### 创建测试数据\n\n我们要做的是对其中一个表进行一些更改，以便查看将数据库还原到某个时间点时会发生什么。为此，我们需要向\
  \ `users2` 表中插入一些假数据。清单 11-3 展示了我们将用于实现此目的的 `T-SQL`。\n\n```\nINSERT INTO users2\n\
  SELECT TOP 1000 * FROM users2\n```\n\n清单 11-3 创建测试数据\n\n运行清单 11-3 中的命令时，请密切关注时间，因为我们将在成功添加大量数据之前再运行几次相同的代码。这将确保我们能还原到正确的时间点。\n\
  \n作为参考，运行清单 11-3 中的脚本之前，行数为 10000。运行一次脚本后，行数变为 11000。每次额外运行脚本都会使行数增加 1000 行，因此请确保您留意时间和最终的行数。当我完成记录插入时，我的\
  \ `users2` 表中最终有 29000 条记录，比原来的 10000 条有所增加。不过，我只想要 16000 条记录，并且我知道我在晚上 9:22 时拥有这个数量的记录，因此我需要将我的事务日志还原到晚上\
  \ 9:22。\n\n##### 备份事务日志\n\n接下来，我们需要备份事务日志，以便我们刚刚执行的事务可供我们使用。撰写本文时的时间是晚上 9:30，因此我需要还原晚上\
  \ 7:00、8:00 和 9:00 的事务日志，以及我们即将创建的那个事务日志。右键单击您的 `Backup Plan.Transaction Log Restore`\
  \ `SQL Server Agent` 作业，然后选择 `在步骤启动作业…` 来执行该作业。它运行了一秒钟，然后成功完成。完成后单击“关闭”按钮，您将返回到主\
  \ `SSMS` 舞台。\n\n\n\n#### 复制和重命名备份文件\n\n复制和重命名备份文件的目的在于避免覆盖我们原始的备份数据。说实话，除此之外确实没有其他原因。我希望能尽可能谨慎地处理我的备份，因此我总是会保留原始文件，并在适用时进行复制和重命名。\n\
  \n回想一下，在这种情况下，我的备份目录位于 `E:\\SQL Server\\Backup\\backrecTestDB`。当我导航到该目录时，我可以看到我的备份文件，包括我刚刚备份的事务日志。我想复制我之前记录的日志，并将它们重命名为按时间顺序排列的名称，格式为\
  \ `backrecTestDB_1.trn`、`backrecTestDB_2.trn` 和 `backrecTestDB_3.trn`。这三个文件将代表我们需要恢复的三个独立的事务日志。\n\
  \n最终，我复制并重命名了六个文件，如清单 11-4 所示。\n\n清单 11-4. 复制和重命名文件\n\n*   完整备份\n    *   `backrecTestDB_FULL.bak`\n\
  *   差异备份\n    *   `backrecTestDB_DIFF.bak`\n*   事务日志备份\n    *   `backrecTestDB_1.trn`\n\
  \    *   `backrecTestDB_2.trn`\n    *   `backrecTestDB_3.trn`\n    *   `backrecTestDB_922PM.trn`\n\
  \n在 Windows 资源管理器中，我的文件如图 11-14 所示。\n\n![A436605_1_En_11_Fig14_HTML.jpg](img/A436605_1_En_11_Fig14_HTML.jpg)\n\
  \n图 11-14\n\n文件的 Windows 列表\n\n注意最后一个事务日志；看到它比其他的要大很多吗？这是我们从清单 11-3 刚刚做的所有更改的日志。接下来，我们将把命令组合在一起来恢复我们的数据。\n\
  \n#### T-SQL 恢复命令\n\n回到第 7 章，我们在清单 7-3 中查看了一个 T-SQL 命令，它允许我们按时间顺序恢复完整备份、差异备份和事务日志备份，直到完成。恢复数据唯一真正棘手的部分是要时刻注意是否需要使用\
  \ `WITH RECOVERY` 或 `WITH NORECOVERY`。\n\n那么如何知道何时使用 `WITH RECOVERY` 或 `WITH NORECOVERY`\
  \ 呢？你首先需要确定你需要恢复什么。\n\n##### 场景 1：完整恢复\n\n例如，如果你正在恢复一个完整的备份，那么你应该使用 `WITH RECOVERY`，因为此命令恢复数据库然后将数据库带出还原状态。\n\
  \n##### 场景 2：完整和差异恢复\n\n如果你正在恢复一个完整备份和一个差异备份，那么你希望在完整恢复时使用 `WITH NORECOVERY`，这会使数据库保持在还原状态并准备好恢复更多数据，然后在差异恢复时使用\
  \ `WITH RECOVERY`，这将使数据库脱离还原数据库状态，恢复为常规使用状态。\n\n##### 场景 3：完整、差异和事务日志恢复\n\n这可能是最常见的情况。在这种情况下，你希望在所有的恢复操作上使用\
  \ `WITH NORECOVERY`：完整、差异和事务日志。在 T-SQL 脚本的末尾，你可以使用 `RESTORE DATABASE backrecTestDB\
  \ WITH RECOVERY` 命令行将数据库恢复在线并使其脱离还原状态，或者你可以在最后一个事务日志恢复语句中使用 `WITH RECOVERY`。\n\n\
  清单 11-5 展示了我们将用来从完整备份恢复到差异备份，最后恢复到事务日志的基本 T-SQL 命令。请注意，清单 11-5 中列出的代码与清单 7-3 几乎相同，我们很快将对其进行定制以更好地满足我们的需求。\n\
  \n```\nUSE master\n-- full database restore\nRESTORE DATABASE backrecTestDB\nFROM\
  \ DISK = N'E:\\SQL Server\\Backup\\backrecTestDB\\backrecTestDB_FULL.bak'\nWITH\
  \ NORECOVERY, REPLACE\n-- differential database restore\nRESTORE DATABASE backrecTestDB\n\
  FROM DISK = N'E:\\SQL Server\\Backup\\backrecTestDB\\backrecTestDB_DIFF.bak'\nWITH\
  \ NORECOVERY\n-- 7:00PM log restore\nRESTORE LOG backrecTestDB\nFROM DISK = N'E:\\\
  SQL Server\\Logs\\backrecTestDB\\backrecTestDB_1.trn'\nWITH NORECOVERY\n-- 8:00PM\
  \ log restore\nRESTORE LOG backrecTestDB\nFROM DISK = N'E:\\SQL Server\\Logs\\backrecTestDB\\\
  backrecTestDB_2.trn'\nWITH NORECOVERY\n-- 9:00PM log restore\nRESTORE LOG backrecTestDB\n\
  FROM DISK = N'E:\\SQL Server\\Logs\\backrecTestDB\\backrecTestDB_3.trn'\nWITH NORECOVERY\n\
  -- final log restore\nRESTORE LOG backrecTestDB\nFROM DISK = N'E:\\SQL Server\\\
  Logs\\backrecTestDB\\backrecTestDB_922PM.trn'\nWITH RECOVERY,\nSTOPAT = 'Nov 15,\
  \ 2017 09:22:00 PM'\n```\n清单 11-5\n初始的 RESTORE 脚本\n\n使用这个脚本，我们重命名了备份目录中的一些文件，然后使用这些重命名的文件成功恢复了数据库。我们在\
  \ `RESTORE LOG` 脚本中使用了 `STOPAT` 属性，成功恢复到事务日志中的某个时间点。\n\n在 SSMS 中运行清单 11-5 所示的脚本后，我确实得到了\
  \ 16000 条记录，正如我所期望的那样。图 11-15 显示了在将数据恢复到晚上 9:22 之前和之后的 users2 表的行数。\n\n![A436605_1_En_11_Fig15_HTML.jpg](img/A436605_1_En_11_Fig15_HTML.jpg)\n\
  \n图 11-15\n\n恢复前后的行数\n\n成功！我们现在能够在不使用向导的情况下，通过 SSMS 将数据库恢复到某个时间点。请注意，你可以通过添加相关的\
  \ `RESTORE LOG` 命令，并确保 `WITH RECOVERY` 语句仅出现在最后一个恢复语句中，将清单 11-5 中所示的脚本用于任意数量的事务日志恢复（直到下一个差异恢复之前）。\n\
  \n\n\n#### 总结\n\n本章为这一节，也为全书画上了句号。我们成功地通过 SQL Server Management Studio 中的 T-SQL\
  \ 将事务日志恢复到了特定时间点，学习了如何创建测试数据，并了解了 `WITH NORECOVERY` 和 `WITH RECOVERY`。\n\n我真诚地希望您跟随本书一路学来，并在此过程中有所收获。本书所涵盖的内容当然并非\
  \ SQL Server 中备份和恢复数据的全部，但我相信，本书为您精通如何制定有效的备份与恢复策略提供了一个极佳的起点。在备份或恢复数据领域，还有许多概念本书未曾涉及；它们固然重要，但我未将其纳入，是因为我认为它们会使我试图阐述的主题变得复杂。我希望将本书做得尽可能易于跟随，并且在这个过程中不想让内容过于深奥，因此，如果内容稍显浅显，我在此致歉。不过，本书中的概念可以关联到开发或生产环境，而且我认为，在介绍更高级的主题之前，牢固掌握备份和恢复数据的基础知识至关重要。我相信，通过阅读本书，您在此主题上的知识已经增长到足以让您舒适地继续阅读一本更高级的书籍，并能轻松跟上进度。\n\
  \n我鼓励您采纳这些示例，并将其应用到您的工作开发环境中，同时专注于利用此处的内容，通过自动化等手段使其变得更加完善。本书中提到了许多优秀的示例，特别是 Ola\
  \ Hallengren 的维护脚本。本书的第二版将专门用一整章来详细介绍这个脚本，解析其所有独立的部分，因为它确实值得单独讨论；它确实非常出色。\n\n恭喜您读完本书！现在，您可以将所学付诸实践了。我祝愿您，亲爱的读者，在个人和职业生活中一切顺利。\n\
