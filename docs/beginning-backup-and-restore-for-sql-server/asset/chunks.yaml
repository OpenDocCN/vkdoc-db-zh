  trans: "### 还原文件和文件组—选项\n\n![A436605_1_En_7_Fig6_HTML.jpg](img/A436605_1_En_7_Fig6_HTML.jpg)\n\
    \n*图 7-6：还原文件和文件组，选项页*\n\n从图 7-6 所示界面左侧导航引用的第二页，标题为**选项**。\n\n#### 界面概览\n\n在此区域中，我们看到一些选项，如果您还不熟悉它们，可能会感到有些困惑。在继续之前，让我们先了解一下。\n\
    \n此界面分为两个主要部分：**还原选项**和**恢复状态**。**还原选项**部分允许您（DBA）在数据还原过程开始前以及过程中自定义各种可用选项；而**恢复状态**部分则允许您定义数据还原后将发生的情况。\n\
    \n#### 还原选项\n\n在**还原选项**部分，有三个复选框，标题如下：\n\n*   覆盖现有数据库 (`WITH REPLACE`)\n*   还原每个备份前提示\n\
    *   限制对还原数据库的访问 (`WITH RESTRICTED_USER`)\n\n请注意，括号内的部分是如果您使用 Transact-SQL 还原备份时需要记住的代码，这将在下一节讨论。\n\
    \n#### 恢复状态\n\n在**恢复状态**部分，有三个单选按钮，标题如下：\n\n*   通过回滚未提交的事务使数据库处于可用状态。无法还原其他事务日志。(`RESTORE\
    \ WITH RECOVERY`)\n    *   此选项默认选中。原因是这是备份恢复最常见的用途；通过回滚任何未提交的事务，使数据库立即可供运行。\n\
    *   使数据库处于不可用状态，并且不回滚未提交的事务。可以还原其他事务日志。(`RESTORE WITH NONRECOVERY`)\n    *   这是最具破坏性的选项。老实说，我无法想象在什么情况下我会希望生产数据库处于不可用状态，除非我们正在处理故障转移或负载均衡。在那种情况下，是的，我可以想象这对修复数据库实例有用，但除此之外，正如我所说，它具有破坏性，因为数据库将保持不可用状态，直到显式将其恢复联机。\n\
    *   使数据库处于只读模式。回滚未提交的事务，但将回滚操作保存在一个文件中，以便可以撤销恢复效果。(`RECOVERY WITH STANDBY`)\n\
    \    *   此选项实质上允许您“暂停”数据库并将其置于只读模式。未提交的事务会被回滚，但回滚操作会被保存，以便以后可以撤销（如果需要）。例如，这对于确保数据库中一切按预期工作是一个好选项。\n\
    \    *   选择此选项后，您可以选择回滚撤销文件的存放位置。\n\n#### 恢复策略\n\n对于“常规”备份，即您只想将数据还原到上一次事务日志备份点，您只需要还原最近的差异备份，然后按顺序还原事务日志，直到您需要访问数据的时间点。对于绝大多数恢复情况，都是如此。\n\
    \n您很少会想要恢复到许多天前的某个特定时间点，并冒着丢失该点之后累积的所有数据的风险，换句话说。不过，确实存在一些特定情况正是如此，在这种情况下，我强烈建议在对生产或开发数据库进行任何操作之前，先运行一次当前数据库的备份。备份运行并验证后，再按照您选择的任何路径继续进行数据库恢复。根据我的经验，我发现将完整备份、差异备份和事务日志备份恢复到辅助数据库，对于验证所寻求的数据是有益的。找到数据后，我再创建\
    \ `INSERT INTO… SELECT` 脚本，从辅助数据库更新我的主数据库。更新完成并确认数据已成功恢复后，我可以删除辅助数据库，然后继续处理其他事务。我唯一需要强调的注意事项是，确保\
    \ `INSERT INTO… SELECT` 语句编写正确，以便能从辅助数据库正确更新主数据库；否则，您只是在给自己制造更多的工作。\n\n我发现这是一个极好的方法，可以确保正在恢复的主数据库和辅助数据库表之间的数据正确无误，因为我是在当前主数据库之外，但基于过去某个时间点的精确副本来处理辅助数据库。\n\
    \n#### 完成还原\n\n要继续操作，只需确保勾选了**覆盖现有数据库 (`WITH REPLACE`)** 选项，并选择了数据更新之前的事务日志（回滚至上一次完整备份），然后单击**确定**按钮。图\
    \ 7-7 显示了一个窗口，告诉我们数据库已成功还原。\n\n![A436605_1_En_7_Fig7_HTML.jpg](img/A436605_1_En_7_Fig7_HTML.jpg)\n\
    \n*图 7-7：数据库成功还原*\n\n在此窗口上单击**确定**，请注意我们的主**还原文件和文件组**窗口已关闭。回到 SSMS 并运行以下查询：\n\
    \n```sql\nSELECT count(*) as cnt FROM users1\n```\n\n您的结果应为 `10,020,000`。恭喜！"
- fmt: "### Point-in-Time Restore/Recovery\n\nIn order to restore a transaction log,\
    \ we first need to restore a full backup and optionally a differential backup.\
    \ Have you ever seen the state of a database in `SSMS` when a database is stuck\
    \ in `Restoring` mode? As I noted earlier in this chapter, that happens when a\
    \ database has been restored with a full or differential backup with the `RESTORE\
    \ WITH STANDBY` or `RESTORE WITH NORECOVERY` option selected. It will stay in\
    \ the `Restoring` state until the tail of the transaction log is restored or the\
    \ `RESTORE WITH RECOVERY` statement is executed as part of a restore process.\
    \ Let’s take a look at this in practice.\n\nIn SQL Server Management Studio, right-click\
    \ your database (mine is named `backrecTestDB`) and navigate to **Tasks** ➤ **Restore**\
    \ ➤ **Database…** to continue. Figure [7-8](#A436605_1_En_7_Chapter.html#Fig8)\
    \ shows the location of this menu item.\n\n![A436605_1_En_7_Fig8_HTML.jpg](A436605_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8\n\nRestore Database menu location\n\nThe interface that opens is\
    \ titled **Restore Database**. Note that there are three tabs on the left titled\
    \ **General**, **Files**, and **Options** for different pages within this interface.\
    \ The default selection is **General**, which is what we see in Figure [7-9](#A436605_1_En_7_Chapter.html#Fig9).\n\
    \n![A436605_1_En_7_Fig9_HTML.jpg](A436605_1_En_7_Fig9_HTML.jpg)\n\nFigure 7-9\n\
    \nRestore Database interface\n\nThis page shows us a **Source**, a **Destination**,\
    \ and a **Restore plan** section. These sections are defined as follows:\n\n*\
    \   **Source**: The location of the source files to restore from. This can be\
    \ either an existing database with backup files or a local or network storage\
    \ location containing backup files.\n*   **Destination**: The location of the\
    \ database to restore to. The default for the `Restore to` field here is for the\
    \ last backup set, but that can be adjusted by clicking the **Timeline…** button\
    \ and choosing a timeframe to restore from. This is referred to as a point-in-time\
    \ restore.\n*   **Restore plan**: The section details the files that will be restored,\
    \ and the **Backup sets to restore:** section, which is covered shortly.\n\nLet’s\
    \ say that I wanted to restore my database to the state it was in at 8:00 this\
    \ morning. This section of the interface is where you want to go for that, because\
    \ this section allows you to pinpoint a specific time and data to restore data\
    \ from.\n\nClick the **Timeline** button shown in the **Destination** section\
    \ of the interface shown in Figure [7-9](#A436605_1_En_7_Chapter.html#Fig9). A\
    \ screen opens as shown in Figure [7-10](#A436605_1_En_7_Chapter.html#Fig10) that\
    \ is titled **Backup Timeline : backrecTestDB** (or whatever your database is\
    \ named).\n\n![A436605_1_En_7_Fig10_HTML.jpg](A436605_1_En_7_Fig10_HTML.jpg)\n\
    \nFigure 7-10\n\nBackup Timeline: backrecTestDB\n\nNotice that the initial configuration\
    \ is for **Last backup taken**. In this case, the time of the last backup taken\
    \ was 7:00 pm. This might be ideal for you, but I want to restore to 8:00 am,\
    \ remember? Click the radio button for **Specific date and time** and select the\
    \ date you want to restore to. Figure [7-11](#A436605_1_En_7_Chapter.html#Fig11)\
    \ shows my updated interface.\n\n![A436605_1_En_7_Fig11_HTML.jpg](A436605_1_En_7_Fig11_HTML.jpg)\n\
    \nFigure 7-11\n\nBackup Timeline: backrecTestDB, updated\n\nNotice that the `Timeline\
    \ Interval` field is set to **Day**. There are other options in this drop-down\
    \ menu with the values **Hour**, **Six hour**, and **Week** as well. Feel free\
    \ to select any of these options, if you would like, but the value of the selection\
    \ you just made will probably change. You can also move the slider at the bottom\
    \ of the timeline view but above the legend for a more precise timeline location.\
    \ When you have selected the right time you would like to restore to, click the\
    \ **OK** button to return to the **Restore Database** screen.\n\nOnce you return\
    \ to the **Restore Database**, notice that the **Backup sets to restore:** section\
    \ has updated to show the relevant backup sets to restore. Typically, this area\
    \ will be populated by the full and differential backups which relate to the selected\
    \ timeframe of the transactions needing to be restored. Figure [7-12](#A436605_1_En_7_Chapter.html#Fig12)\
    \ shows my screen after the **Backup sets to restore:** section has been repopulated.\n\
    \n![A436605_1_En_7_Fig12_HTML.jpg](A436605_1_En_7_Fig12_HTML.jpg)\n\nFigure 7-12\n\
    \nRestore Database, updated\n\nAt this point, we can see the full backup at the\
    \ top of the list, followed by the differential backup, and the two transaction\
    \ log backups at the bottom. Click the **Verify Backup Media** button if you would\
    \ like to verify the media; I generally click this button anytime I see it, just\
    \ in case.\n\nThe **Files** tab on the left can be left alone for now. This is\
    \ where you would normally define where the restored files will be stored and\
    \ what their names will be, but we are not going to change this setting.\n\nThe\
    \ **Options** tab needs some explanation. Go ahead and navigate there, and notice\
    \ that the interface has the following sections and selections:\n\n*   **Restore\
    \ options**\n    *   **Overwrite the existing database (WITH REPLACE)**: This\
    \ option overwrites the database files for the selected database. This is a very\
    \ destructive option, so use it at your own risk.\n    *   **Preserve the replication\
    \ settings (WITH KEEP_REPLICATION)**: If there are replication settings defined\
    \ for the database, then keep them. This option specifically addresses the instance\
    \ when you need to restore a database which has been published to a different\
    \ server than the server the database was backed up on.\n    *   **Restrict access\
    \ to the restored database (WITH RESTRICTED_USER)**: Once the database is restored,\
    \ only the members of `db_owner`, `dbcreator`, and `sysadmin` can access.\n* \
    \  **Recovery state**\n    *   **RESTORE WITH RECOVERY**: This option will restore\
    \ all the backup sets as the default.\n    *   **RESTORE WITH NORECOVERY**: This\
    \ option will leave the database in the `Restoring…` state discussed earlier.\
    \ Once the tail of the transaction log has been restored, the database will then\
    \ move to a normal state.\n    *   **RESTORE WITH STANDBY**: This option will\
    \ leave the database in a read-only state. If this option is chosen, you must\
    \ specify a Standby file.\n    *   **Standby file**: This file will reverse the\
    \ recovery effort.\n*   **Tail-log backup** (a backup that contains the portion\
    \ of the transaction log not previously backed up, or the active portion of the\
    \ transaction log)\n    *   **Take tail-log backup before restore**: Specifies\
    \ that you would like to back up the tail of the transaction log.\n    *   **Leave\
    \ source database in the restoring state (WITH NORECOVERY)**: Same as the option\
    \ listed previously; the database will be left in the `Restoring…` state.\n  \
    \  *   **Backup file**: The location of the backup file for the tail of the transaction\
    \ log.\n*   **Server connections**\n    *   **Close existing connections to destination\
    \ database**: Basically, this option puts the database into single-user mode and\
    \ closes all connections to the database engine from `SSMS`. Once the restore\
    \ process is complete, the database is put back to multiuser mode and connections\
    \ are made available again.\n*   **Prompt**\n    *   **Prompt before restoring\
    \ each backup**: This option will show a pop-up window asking if you want to proceed\
    \ with each restore.\n\nFor this **Options** tab, I only want to check **Overwrite\
    \ the existing database** and uncheck **Leave source database in the restoring\
    \ state**. Everything else can stay the same on this screen (Figure [7-13](#A436605_1_En_7_Chapter.html#Fig13)).\n\
    \n![A436605_1_En_7_Fig13_HTML.jpg](A436605_1_En_7_Fig13_HTML.jpg)\n\nFigure 7-13\n\
    \nRestore Database, Options tab\n\nWhen you are ready, click the **OK** button\
    \ at the bottom of the screen. You should see the standard “Restoring” section\
    \ at the top of the interface and a progressive percentage going up to 100% until\
    \ it successfully completes."
