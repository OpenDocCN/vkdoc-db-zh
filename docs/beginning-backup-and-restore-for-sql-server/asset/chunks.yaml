    \nGeneral window\n\nThis interface allows us to define the various “general” pieces\
    \ of the puzzle for transaction log backups. The options available here are\n\n\
    *   Source\n    *   Database: This option allows you to choose which database\
    \ you would like to back up from your available databases.\n    *   Recovery model:\
    \ This option will always default to the recovery model currently in use by the\
    \ selected database. To test this, select the `master` database and you will see\
    \ the recovery model change from FULL to SIMPLE.\n    *   Backup type: This option\
    \ allows you to choose what you want to back up. You can choose from a full, differential,\
    \ or transaction log backup when the recovery model is set to FULL, or whichever\
    \ backup types relate to your particular recovery model. You also have the copy-only\
    \ backup check box here. What is this? A copy-only backup is useful when you want\
    \ a backup of the data in the database, but you don’t want to interrupt the normal\
    \ backup schedule and you also don’t want to use the latest backup; it may be\
    \ a differential backup, for example, and you don’t want to take the time to run\
    \ a full and then the differential. This option is particularly useful when you\
    \ want to have a backup of current data for the developers to use in the development\
    \ network. Think of it as an out-of-sequence complete backup.\n    *   Backup\
    \ component\n        *   Database\n        *   Files and filegroups\n*   Destination\n\
    \    *   Back up to: The options in this area are currently disk or URL. Select\
    \ the disk option to save the backup in a physical drive somewhere on your connected\
    \ network, and use the URL option to save to an online storage system or an Azure\
    \ instance. Choosing one of these options gives you the ability to select the\
    \ location by clicking the Add or Remove buttons on the bottom right-hand side\
    \ of this window.\n\nFor this example, we want to choose transaction log from\
    \ the Backup type drop-down menu before moving to the Media Options submenu. The\
