- fmt: '# Restoring the Master Database


    We can see that the `sqlcmd` utility has started because we now have the first
    line under the `sqlcmd` command showing a prompt of `1>`. This means that `sqlcmd`
    is awaiting a command. At this prompt, type `RESTORE DATABASE master FROM DISK
    = ''E:\SQL Server\Backup\Master.BAK'' WITH REPLACE;` and press Enter. You will
    then have a prompt of `2>`. All you need to type here is `GO` and press Enter.
    Your screen should closely resemble what is shown in Figure [5-11](#A436605_1_En_5_Chapter.html#Fig11).


    ![A436605_1_En_5_Fig11_HTML.jpg](A436605_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Operation complete


    That shows us that the master database was successfully restored, and that the
    process was terminated normally. Before we are done, we need to bounce the SQL
    Server service, so open up Services and restart the `SQL Server (MSSQLSERVER)`
    service (or whichever named instance you are working in). You will not be able
    to reconnect to the database instance until the server is rebooted or the service
    is bounced.


    ## Restore SQL Server to Multiuser Mode


    In my opinion, restoring access to SQL Server is easier than restricting access.
    Step-by-step instructions to restore SQL Server back to its original state (i.e.,
    multiuser mode) are as follows:


    *   Open up `sqlservermanager13.msc` again and look for the `SQL Server (MSSQLSERVER)`
    item in the right pane.

    *   Right-click and select `Properties`, then select the `Startup Parameters`
    tab.

    *   Highlight the `–m` entry and click the `Remove` button.

    *   Click `Apply` and notice that a message appears that prompts us to restart
    the SQL Server service. Click `OK` on this message, and then click `OK` on the
    `SQL Server (MSSQLSERVER) Properties` window to close it.

    *   Click the `SQL Server Agent` item and press the `Start Service` button in
    the toolbar.

    *   Click the `SQL Server (MSSQLSERVER)` item again and press the `Restart Service`
    button in the toolbar.


    These directions set our instance of SQL Server back to multiuser mode. Congratulations!
    You have just set SQL Server to single-user mode, restored the master database,
    and restored SQL Server to multiuser mode.


    # Restoring from a Full Backup


    By now in this chapter, you’ve probably gotten a pretty good idea of how to restore
    a database from a full backup. Every single DBA that I know has had to run a restore
    at one point or another, so this shouldn’t be anything new. In case this is new
    territory, this section will cover not only how to restore from a full backup
    using SSMS and T-SQL, but also some of the finer points of restoring data, such
    as restoring to a specific point within a log backup (called a point-in-time restore).


    ## Full Restores with SSMS


    The most common way to restore a database is by using the graphical interface
    that is most commonly associated with SQL Server. SQL Server Management Studio
    offers a vast array of tools that can be used to manipulate and administer a database,
    and for this reason, it is easily the go-to choice for nearly every SQL Server
    administrator. Notice that I say “nearly” here; that’s because there are obvious
    exceptions to every rule, and this is not an insult or derision in any way. I
    have seen SQL Server administrators using legacy SSDT, for example, because they
    got (most) of the same interaction with the database, with the added value of
    having the interface for Visual Studio available to them for writing DTSX packages
    or whatever else they would have needed the enhanced interface to accomplish.


    The first thing we want to do is locate our latest backup set. If you have your
    directories set up like mine, then they are in `E:\SQL Server\Backup`.


    Next, fire up SSMS and expand `Databases`. Inside of the `Databases` menu, you
    will find your user databases, along with `ReportServer` and `ReportServerTempDB`,
    if you have installed SQL Server reporting services. Find the database you want
    to work with (in this case, `backrecTestDB`), right-click it, hover over `Tasks`,
    then hover over `Restore`, and look at the options available to us. Figure [5-12](#A436605_1_En_5_Chapter.html#Fig12)
    shows the interface at this point.


    ![A436605_1_En_5_Fig12_HTML.jpg](A436605_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    SSMS Restore menu


    Inside the `Restore` menu, we can see four options listed. Those options are


    *   `Database`

    *   `Files and filegroups`

    *   `Transaction log`

    *   `Page`


    First off, why is the transaction log option disabled? It can only be enabled
    when the database was restored using a full backup and `RESTORE WITH STANDBY`
    was enabled at the point of restore. The database would then be standing by (in
    `RecoveryPending` mode), waiting for the restoration of the tail of the transaction
    log. If you were to recover a database using `RESTORE WITH STANDBY`, and then
    want to restore the transaction log, the transaction log option would be the only
    available option, and the other three options would be disabled.


    We want to select the `database` option, so click this and you will see something
    similar to what is shown in Figure [5-13](#A436605_1_En_5_Chapter.html#Fig13).


    ![A436605_1_En_5_Fig13_HTML.jpg](A436605_1_En_5_Fig13_HTML.jpg)


    Figure 5-13


    Restore Database window, General tab


    Notice that the `Backup sets to restore:` section already has the latest backup
    sets enabled and ready to be restored. From top to bottom, we can see that there
    is one full, one differential, and four transaction log backups that we can use
    to restore our database. Also note that there are check boxes to the left so we
    can choose which set of data to restore. You can see how deselecting the differential
    option will not deselect the transaction log options, and selecting a transaction
    log option automatically selects the differential option.


    The exact combination of files you will need to restore to the point you are looking
    for is entirely up to you. You can use as many or as few backup sets as you would
    like.


    For this example, referring to Figure [5-13](#A436605_1_En_5_Chapter.html#Fig13),
    we can see that there are only a few files selected for the restore to the last
    transaction log backup. To restore to this point, we need to restore the latest
    full and differential backups, then the transaction logs, in order. Let’s say
    that we want to restore back to the previous day though. The way that I have my
    backups set up is such that I will only ever need to restore up to seven files.
    The reason for this is explained in Table [5-1](#A436605_1_En_5_Chapter.html#Tab1),
    which is referenced from Chapter [4](#A436605_1_En_4_Chapter.html).


