  trans: "\n# 理解 SQL Server 备份中的块大小与最大传输大小\n\n块大小和最大传输大小这两个选项听起来非常相似，不是吗？它们的区别在于，`块大小`\
    \ 选项允许你告诉 SQL Server：“我知道你通常取一定数量的字节，但我希望你取不同数量的字节并将它们放入备份位置。”而 `最大传输大小` 选项则允许你告诉\
    \ SQL Server：“当你将字节移动到备份位置时，我希望那个数据块是一个特定的大小。你可以在该传输大小中打包任意多的块，但一旦达到我设定的限制，你就需要再跑一趟。”\
    \ 换句话说，可以将 `块大小` 想象成单个火车车厢，而 `最大传输大小` 则是整列火车。因此，`最大传输大小` 选项总是大于 `块大小` 选项。\n\n\
    例如，勾选 `块大小` 和 `最大传输大小` 复选框。然后在 `块大小` 下拉菜单中选择 `4096`。接下来，在 `最大传输大小` 区域输入一个数值；我选择了\
    \ `512`。最后，按 `Tab` 键移出 `最大传输大小` 区域。你看到数值变回 `65536` 了吗？接着，点击 `最大传输大小` 区域的向上箭头，它会变为\
    \ `131072`。再点击向下箭头两次，它将默认变回 `65536`，但不会变得更低。\n\n在我们继续之前，请确保你取消勾选了 `块大小` 和 `最大传输大小`\
    \ 复选框。保持它们被勾选可能不会造成太大麻烦，但我不想引入任何可能导致错误的东西。我在这里选择的选项是 `验证备份完整性` 和 `执行校验和`。图 9-10\
    \ 显示了更新后的 `选项` 选项卡界面。\n\n![A436605_1_En_9_Fig10_HTML.jpg](img/A436605_1_En_9_Fig10_HTML.jpg)\n\
    \n图 9-10. 备份数据库任务，选项选项卡，已更新\n\n以上就是我进行完整备份选项时，在这个区域需要设置的所有选项。在我们继续之前，我想查看一下此计划生成的\
    \ `T-SQL`，所以请点击 `查看 T-SQL` 按钮，你将看到与清单 9-6 所示类似的内容。\n\n```\nEXECUTE master.dbo.xp_create_subdir\
    \ N'E:\\SQL Server\\Backup\\backrecTestDB'\nGO\nBACKUP DATABASE [backrecTestDB]\
    \ TO DISK = N'E:\\SQL Server\\Backup\\backrecTestDB\\backrecTestDB_backup_2017_10_26_223559_7118287.bak'\
    \ WITH NOFORMAT, NOINIT,  NAME = N'backrecTestDB_backup_2017_10_26_223559_7118287',\
    \ SKIP, REWIND, NOUNLOAD,  STATS = 10, CHECKSUM\nGO\ndeclare @backupSetId as int\n\
    select @backupSetId = position from msdb..backupset where database_name=N'backrecTestDB'\
    \ and backup_set_id=(select max(backup_set_id) from msdb..backupset where database_name=N'backrecTestDB')\n\
    if @backupSetId is null begin raiserror(N'Verify failed. Backup information for\
    \ database ''backrecTestDB'' not found.', 16, 1) end\nRESTORE VERIFYONLY FROM\
    \ DISK = N'E:\\SQL Server\\Backup\\backrecTestDB\\backrecTestDB_backup_2017_10_26_223559_7118287.bak'\
    \ WITH  FILE = @backupSetId,  NOUNLOAD,  NOREWIND\n```\n\n清单 9-6. 以 T-SQL 表示的完整备份\n\
    \n请注意，备份文件的名称将与此处显示的不同。这是因为文件名是根据当前时间自动生成的，所以相隔一秒点击 `查看 T-SQL` 按钮会生成两个不同的文件名。此清单应作为模板使用，将你想要备份的备份名称以及备份后想要验证的内容粘贴进去。不要仅仅保存此脚本就期望它能在你的机器上运行；我保证它会运行失败。\n\
    \n准备就绪后，点击 `OK` 继续。注意红色的 `X` 现在消失了，我们剩下如图 9-11 所示的内容。\n\n![A436605_1_En_9_Fig11_HTML.jpg](img/A436605_1_En_9_Fig11_HTML.jpg)\n\
    \n图 9-11. 备份计划 [设计]，已更新\n\n## 计划完整备份\n\n现在我们已经设置了计划，我们需要设置一个时间表。通常，我在家和工作中使用的时间表几乎相同：午夜进行一次完整备份，每六小时进行一次差异备份，每小时进行一次事务日志备份。在某些情况下，我甚至会每半小时运行一次事务日志备份，但这会引入更多需要从中恢复的文件，同时将数据丢失的最大时间减少一半。\n\
    \n从我们离开的地方开始，我们现在可以看到如图 9-12 所示的内容。\n\n![A436605_1_En_9_Fig12_HTML.jpg](img/A436605_1_En_9_Fig12_HTML.jpg)\n\
    \n图 9-12. 备份计划 [设计] 阶段\n\n注意，我们现在在舞台上方的区域中有一个名为 `Subplan_1` 的子计划。这是完整备份的计划，但我们需要给它一个更好的名称。双击\
    \ `子计划`、`描述` 或 `计划` 列以打开如图 9-13 所示的 `子计划属性` 窗口。\n\n![A436605_1_En_9_Fig13_HTML.jpg](img/A436605_1_En_9_Fig13_HTML.jpg)\n\
    \n图 9-13. 子计划属性\n\n我们希望将默认值更改为清单 9-7 中所示的值。\n\n清单 9-7. 子计划属性值\n\n*   `名称`\n  \
    \  *   “完整备份”\n*   `描述`\n    *   “这是备份维护计划中的完整备份部分”\n*   `计划`\n    *   我们将在另一个区域设置此选项，所以暂时忽略它\n\
    *   `运行身份`\n    *   保持默认值\n\n更新这些值后，单击 `OK` 关闭该窗口，你将返回到主舞台。图 9-14 显示了 `子计划属性`\
    \ 窗口中应更新后的值，图 9-15 也显示了此时更新后的舞台。\n\n![A436605_1_En_9_Fig15_HTML.jpg](img/A436605_1_En_9_Fig15_HTML.jpg)\n\
    \n图 9-15. 更新后的舞台\n\n![A436605_1_En_9_Fig14_HTML.jpg](img/A436605_1_En_9_Fig14_HTML.jpg)\n\
    \n图 9-14. 子计划属性，已更新\n\n我们可以在图 9-15 中看到，`子计划` 行中的值已更新为我们输入的值。对于计划，我们选择稍后再设置，所以现在让我们看看如何设置。\n\
    \n单击 `计划` 列旁边行中的日历图标。图 9-16 显示了 `新建作业计划` 屏幕的初始界面。\n\n![A436605_1_En_9_Fig16_HTML.jpg](img/A436605_1_En_9_Fig16_HTML.jpg)\n\
    \n图 9-16. 新建作业计划\n\n清单 9-8 将逐步介绍此屏幕上的所有选项，以便我们决定要执行的时间表。\n\n清单 9-8. 新建作业计划选项\n"
- fmt: '## Updating the SQL Server Agent Job


    Now that we have the maintenance plan set up, we could leave it alone and have
    it run normally. However, the SQL Server Agent job needs to be updated. Why? Because
    for some reason, the job doesn’t inherit all of the values from the maintenance
    plan, and we have to go in and backfill the job values. This will hopefully change
    in future versions of SSMS.


    Expand the SQL Server Agent menu from Object Explorer, and then expand Jobs. Figure
    [9-18](#A436605_1_En_9_Chapter.html#Fig18) shows the location of this menu item.


    ![A436605_1_En_9_Fig18_HTML.jpg](A436605_1_En_9_Fig18_HTML.jpg)


    Figure 9-18

    SQL Server Agent, Jobs location


    Notice that we have a defaulted job titled `syspolicy_purge_history`. We don’t
    need it, so it can stay where it is. The job we are concerned about is the one
    titled `Backup Plan.Subplan_1`. We changed this value in the Subplan Properties
    window in Figure [9-14](#A436605_1_En_9_Chapter.html#Fig14), but it did not filter
    over to this area, so let’s update that now.


    ### General Tab


    Double-click the job name and the Job Properties window will appear as shown in
    Figure [9-19](#A436605_1_En_9_Chapter.html#Fig19). The purpose of this tab is
    to give the top-level, or “General,” settings for the job. Don’t think that this
    area is not important though, because a lot can go wrong if it is not filled out
    correctly. For example, the `Enabled` check box needs to stay checked, and the
    owner needs to stay as an account with permission to the database, or the database
    owner from the Properties window of the database.


    Note: Right-click the database name and select `Properties`. From here, you can
    view the owner of the database. This is not to be confused with the `dbo` role.


    In my experience, those two values need to match. If they don’t, as I said, then
    this value needs to be of a user with access to the database.


    ![A436605_1_En_9_Fig19_HTML.jpg](A436605_1_En_9_Fig19_HTML.jpg)


    Figure 9-19

    Job Properties window, General tab


    As you can see, a few of the options we set in the previous section didn’t transfer
    to this job, such as the `Name` and the description. Update the `Name` field to
    say `Full Backup` and enter a short description to complete the items on the General
    tab. Notice that the `Category` option can be pulled down and different options
    can be selected. The purpose of this is to allow you to segregate different jobs
    into different categories, and then use those different categories for log checking
    or reporting purposes. It defaults to `Database Maintenance` though, so it’s best
    to keep it there.


    When you are satisfied with your settings in this area, click the `Steps` tab.


    ### Steps Tab


    The next tab (from the pane on the left) is `Steps`. Figure [9-20](#A436605_1_En_9_Chapter.html#Fig20)
    shows the default settings in this page.


    ![A436605_1_En_9_Fig20_HTML.jpg](A436605_1_En_9_Fig20_HTML.jpg)


    Figure 9-20

    Job Properties window, Steps tab


    If we had multiple steps in this job, they would be shown here. Alternately, we
    could add some jobs in here that are outside of the maintenance plan creation
    we did earlier. We don’t want to do that right now, but it is an option to think
    about for your own plans, if necessary.


    Notice again that the name is different? So, again, we need to double-click that
    row and update those values. Figure [9-21](#A436605_1_En_9_Chapter.html#Fig21)
    shows the initial values for the Job Step Properties – Subplan_1 window.


    #### Job Step Properties - Subplan_1 (General Tab)


    ![A436605_1_En_9_Fig21_HTML.jpg](A436605_1_En_9_Fig21_HTML.jpg)


    Figure 9-21

    Job Step Properties – Subplan_1, General tab


    Be very careful in this area. You could really do some damage in here to both
    this job and your database. This area essentially lets you set up the properties
    and values for the SSIS package that will be created as a result of creating this
    job.


    Listing [9-9](#A436605_1_En_9_Chapter.html#Par151) shows the available options
    in this tab.


    Listing 9-9. Job Step Properties - Subplan_1 Options'
