    *   `数据库`

    *   `文件和文件组`

    *   `事务日志`

    *   `页面`


    首先，为什么事务日志选项是禁用的？它只能在数据库是使用完整备份还原的，并且在还原时启用了 `RESTORE WITH STANDBY` 的情况下启用。然后数据库将处于待机状态（在
    `RecoveryPending` 模式下），等待事务日志尾部的还原。如果您使用 `RESTORE WITH STANDBY` 恢复了一个数据库，然后想要还原事务日志，那么事务日志选项将是唯一可用的选项，其他三个选项将被禁用。


    我们希望选择 `数据库` 选项，因此单击此项，您将看到与图 5-13 所示类似的内容。


