  trans: '

    ## 什么是差异还原？


    简而言之，差异还原就是从差异备份中恢复数据。我们知道，差异备份仅包含自上次完整备份以来发生变化的数据，因此它的文件比完整备份要小。


    那么，这如何融入我们的备份策略呢？我们的完整备份在每天凌晨 12:00 运行，差异备份每六小时运行一次，事务日志备份则每小时运行一次。换句话说，我个人认为这是一个相当稳健的备份计划。使用完整或简单恢复模型，以及实施差异备份和还原，有以下几个非常显著的意义：


    *   我们可以拥有更少的事务日志，从而在备份计划中总体文件更少，因为我们可以删除最后一次完整备份之前的所有事务日志，前提是这些事务日志中的数据已经包含在差异备份中。

    *   我们拥有更多的恢复点，或者说，我们可以还原到的位置更多了。

    *   备份可以在白天进行，而无需每次都运行完整备份。这将减少服务器 CPU 时间并节省空间。


    我们可以看到，在我们的常规数据库恢复计划中使用差异备份和还原，对于我们之前确定的理想恢复场景来说是最佳选择。


    ## 使用 SSMS 进行还原


    我希望到目前为止，我们都对使用 SQL Server Management Studio 进行数据库还原有了一点经验。如果你读过我的第一本书，我严重依赖维护计划的创建来处理日常数据库维护的全部工作。这包括一种最终可用于数据恢复的备份方法，包含完整备份、差异备份和事务日志备份。我们现在还不想走得那么远，因为这是我们将在后续章节中整合所有内容时才会涉及的，但我们确实想看看如何在
    SQL Server Management Studio 中处理差异还原。


    如果还没有启动 `SSMS`，请现在开始。你应该会看到左侧有对象资源管理器的界面，而主区域是空的。我通常会在主区域保持一个“新建查询”窗口打开，但这不是必须的。一旦你打开了
    `SSMS` 并准备好继续，请展开 `数据库`，右键单击你的测试数据库名称（我的是 `backrecTestDB`），将鼠标悬停在 `任务` 上，然后选择
    `还原`，最后选择 `数据库…` 以继续。图 6-1 显示了该菜单项的位置。


    ![A436605_1_En_6_Fig1_HTML.jpg](img/A436605_1_En_6_Fig1_HTML.jpg)


    图 6-1：数据库菜单位置


    如图 6-1 所示选择 `数据库` 后，你将看到如图 6-2 所示的屏幕。


    ![A436605_1_En_6_Fig2_HTML.jpg](img/A436605_1_En_6_Fig2_HTML.jpg)


    图 6-2：还原数据库


    这是每次我们想要还原数据库时之前都见过的常规屏幕。请注意，如图 6-2 所示，该数据库的所有可用备份都显示出来了，我删除了文件系统中的几个备份以使界面更清晰。


    在你的界面中，验证列出的三个备份（或你拥有并想要还原的任意数量的备份）旁边的所有复选框是否都已选中。由于我们要还原差异备份，我们必须先还原完整备份，并且为了能够继续还原差异备份和事务日志，我们必须将数据库保持在
    `正在还原` 状态。如果你取消选中所有恢复选项，你将看到可以在此数据库内完成的可用还原组合。这些组合如下：


    *   完整备份

    *   完整备份 + 差异备份

    *   完整备份 + 事务日志

    *   完整备份 + 差异备份 + 事务日志


    换句话说，当我们使用 `SSMS` 时，每次想要执行还原操作都必须从完整备份开始。可以这样想：如果下午 3:05 你的数据库出现错误，在我的当前备份计划下，你需要还原当天早上的最后一个完整备份，然后是中午
    12:00 的差异备份，最后是每小时的事务日志，直到恢复到你需要的数据位置。


    请注意，我们位于 `还原数据库` 屏幕的 `常规` 选项卡上。我们已经浏览过这些选项卡中的各种选项，所以不需要再重复一遍。请注意，我们还将备份事务日志的尾部，这是一个默认选项，以便运行还原过程的事务保存在新的事务日志中，而之前的事务则保存在新备份的事务日志尾部。


    由于我们要还原差异备份，我们只需确保在 `常规` 选项卡上选中了完整备份和差异备份选项，然后按 `OK`。然后我们会等待几秒钟，或者可能更长时间，然后看到如图
    6-3 所示的内容。


    ![A436605_1_En_6_Fig3_HTML.jpg](img/A436605_1_En_6_Fig3_HTML.jpg)


    图 6-3：正在进行的还原数据库


    希望我们最终会看到一条成功消息。点击此消息上的 `OK`，`还原数据库` 屏幕就会消失。这表明我们的数据库已还原到与差异备份相关的数据状态。


    ## 使用 T-SQL 进行还原


    使用 `T-SQL` 还原差异备份的过程出奇地简单。到目前为止，我并没有包含大量的 `SQL` 代码，因为我希望这些书籍更侧重于数据库管理的可视化方面，但我认为这里值得花一点时间。


    使用 `T-SQL` 的真正优势，除了自动化目的之外，在于如果你无法访问 `SQL` 界面但仍然可以访问数据库服务器，你可以使用 `sqlcmd` 来执行
    `SQL` 语句。


    使用逻辑备份设备且没有其他文件需要还原时，进行差异还原的基本语法如清单 6-1 所示。


    ```sql

    RESTORE DATABASE backrecTestDB

    FROM backrecTestDB

    WITH NORECOVERY

    清单 6-1：RESTORE DATABASE SQL 脚本

    ```


    没有定义备份设备，或者当你需要从文件系统而非逻辑备份设备还原，并且没有其他文件需要还原时，进行差异还原的基本语法如清单 6-2 所示。


    ```sql

    RESTORE DATABASE backrecTestDB

    FROM DISK = ''E:\SQL Server\Backup\backrecTestDB\backrecTestDB_DIFF.bak''

    WITH NORECOVERY

    清单 6-2：RESTORE DATABASE SQL 脚本

    ```


    请记住，在还原差异备份时，当我们指定 `NORECOVERY`，我们表达的意思是我们希望先还原最后一个完整备份，然后再还原差异备份。这样做的原因在于，正如我们之前讨论的，所有还原都必须有一个逻辑起点，而唯一能做到这一点的地方就是最后一个完整备份，它是该时间段内的最高级别还原。从这一点出发，我们就可以筛选差异备份，最后进入事务日志，以到达数据还原的确切位置。如果我们还有额外的事务日志需要还原，我们也希望指定
    `NORECOVERY`；否则，我们将指定 `RECOVERY`。


    如果你执行清单 6-1 中的代码，考虑到你已经定义了一个逻辑备份设备，并且没有其他文件需要还原（即额外的事务日志），你将得到与我们之前执行差异还原相同的结果。清单
    6-2 也会产生相同的结果，如果你需要从文件系统而非逻辑备份设备还原。

    '
- fmt: '## Summary


    This is the shortest chapter in this book, simply because the concept of differential
    restores is based on the preceding full backup. In other words, if you have the
    full backup, then you can hopefully start restoring the data that you need whether
    that data resides in the differential backup or the transaction logs. Restoring
    the differential backup could be thought of as a logical extension of restoring
    the full backup, since the existence of the differential restore is predicated
    on the existence of the full backup already having been restored, but as we noted
    before, you could always restore from the transaction log instead, if that is
    the data that you need.

    We went over how to restore a differential backup from both `SSMS` and straight
    `SQL`, and briefly went over the different options relevant to this type of restore.
    Be sure to include the syntax that we went over in Listing [6-1](#A436605_1_En_6_Chapter.html#Par30)
    and Listing [6-2](#A436605_1_En_6_Chapter.html#Par32) for your situation in the
    restore script that you need to write.

    In the next chapter, we will go over how to restore transaction logs and the different
    options that can be enabled or disabled in this area.


    # 7. Transaction Log Restores


    Restoring a transaction log in `SQL Server` can be surprisingly painless. There
    are a few things to consider before you attempt to restore your transaction log
    though, such as the following:

    *   Do you need to restore to a specific point in time?

    *   Are you attempting to recover from a catastrophic database failure?

    *   Do you even have transaction logs to restore?

    These questions, and sometimes many more, need to be addressed in order to lead
    you down the correct path of transaction log restoration. There have been lots
    of times that I was alerted to an incident within one of my databases, and I didn’t
    stop to consider which route I needed to take: I just took off down the ill-lighted
    path of “restore something or other.” In other words, I knew that I needed to
    restore some data, but I didn’t really know specifically what data needed to be
    restored. I didn’t know which tables were affected, if any, or if everything after
    a certain point in time was affected.

    For this reason, it is always best to consider the following bit of free advice:
    take as much time as you need to gather the correct information and formulate
    a workable plan before attempting to restore your transaction logs. You can make
    your situation a whole lot worse by restoring the “wrong” data, trust me.

    **Tip**

    Your database must have either full recovery model or bulk-logged recovery model
    enabled in order to have transaction logs to restore.


    ## Transaction Log Restore Fundamentals


    There are a few basic things that we need to get out of the way when dealing with
    transaction log restores in the context of this chapter. First of all, I am not
    going to get into the weeds of what transaction logs are and how they work or
    what data is present at which bit and why that is important. To me, that is a
    subject is probably best left out of this particular book, because I want this
    book to be more closely related to solving a problem as opposed to learning the
    subtleties of a problem. Having said that, let’s just go over a few small topics
    that I feel are important (and maybe a few that aren’t but could still relate
    to the overall issue of transaction log restorations).

    There are two ways to restore a transaction log: either using `SSMS`, or using
    `Transact-SQL`. Yes, it could be argued that both ways use `Transact-SQL`, since
    that is the language of `SQL Server`, but I am referring specifically to using
    `SQL Server Management Studio` to create a `SQL Server Agent` job to automate
    the restoration, or manually using `Transact-SQL` either from a `CLI` or also
    within `SSMS`.

    For the next section, I executed what is shown in Listing [7-1](#A436605_1_En_7_Chapter.html#Par11)
    in `SSMS`.


    ```sql

    DECLARE @cnt INT;

    SET @cnt = 0;

    WHILE @cnt <= 1000

    BEGIN

    INSERT INTO users1 SELECT * FROM users2;

    SET @cnt = @cnt + 1;

    END;

    SELECT count(*) as cnt FROM users1;

    ```

    **Listing 7-1** Create More Data for the Database


    This is an excerpt of `CreateTestData.sql` that we created back in Chapter [1](#A436605_1_En_1_Chapter.html).
    My record count before I ran this excerpt was `10,020,000`, and the record count
    after I ran this excerpt was `20,030,000`. That should make for a pretty substantial
    difference in size of the transaction log.

    What I want to do is restore to the previous version of the database, where the
    record count was `10,020,000`. The next section will detail how to do this in
    `SQL Server Management Studio` using the Files and Filegroups interface, and then
    a point-in-time restore using the Restore Database interface.'
