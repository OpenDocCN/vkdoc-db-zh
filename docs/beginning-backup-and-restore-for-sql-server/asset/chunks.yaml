    ## Introduction to Backup and Restore Methodologies\n\nAs database administrators,\
    \ our primary duty is to protect the data in the databases we are responsible\
    \ for. This data represents the heart and soul of the company employing us, and\
    \ could destroy a business if not maintained properly. In this context, the proper\
    \ application of a sound backup and restore solution is absolutely necessary to\
    \ provide another level of data security in the event of a catastrophe. We need\
    \ to be able to ensure that data can be restored in the case of an emergency,\
    \ and the only way to ensure a smooth restoration of data is to ensure that there\
    \ has been a correct backup of the data needing to be restored.\n\nThere is no\
    \ way to restore data that has not been backed up in some form. Luckily, there\
    \ are quite a few ways that data can be backed up, both inside of and outside\
    \ of `SQL Server`. For this book, we will be dealing strictly with the `SQL Server`\
    \ administrator aspect of backing up and restoring data, and not viewing this\
    \ topic from the `Windows Server` administrator point of view. Additionally, we\
    \ will not be getting very deeply into advanced practices beyond `SQL Server Management\
    \ Studio`. The reason for this is because I want to keep as much attention on\
    \ the actual tool used for development and maintenance as possible. In order to\
    \ do that, I need to make as much of the book as possible directly related to\
    \ `SSMS`. Please note that this does not mean that you are forever married to\
    \ the concept of only using `SQL Server Management Studio` to manage your database\
    \ backups; that is not the case. Rather, I want to introduce concepts in this\
    \ book that will hopefully expand your understanding of what backups and restores\
    \ are and how they can be properly maintained in the context of `SQL Server`.\
    \ This does mean, however, that we are going to stay well within the confines\
    \ of `SQL Server`. To be absolutely clear, we are not going to get into different\
    \ storage techniques separate from how `SQL Server` prepares and delivers a backup\
    \ solution to a predefined storage location, and then how `SQL Server` retrieves\
    \ that backup solution in order to restore damaged, missing, or corrupted data.\
    \ Instead, we are going to focus on the myriad of different settings and techniques\
    \ that can be employed to make sure that the backup set you get is what is expected.\
    \ Consequently, we will also be looking at various different restoration techniques\
    \ available within `SQL Server` as well.\n\n**Note**  \nWhen a backup is created\
    \ by `SQL Server`, you can choose from a variety of options to detail exactly\
    \ what data to include in a backup. When a backup is created by `Windows`, the\
    \ entire database file is backed up along with the file system. This can be advantageous,\
    \ but it is also a waste of space and sometimes impossible to restore, if encrypted.\n\
    \nSpecifically, this book will address the following items, among many other topics:\n\
    \n*   Advantages/disadvantages and proper usage of the three main backup types\n\
    \    *   **Full**: a backup of the entire database\n    *   **Differential**:\
    \ a backup of the changed information since the last full backup\n    *   **Transaction\
    \ log**: the log of transactions since the last backup\n*   Different backup methodologies\
    \ used for different-sized organizations\n    *   Onsite vs. offsite storage\n\
    \    *   Data retention periods\n    *   Storage mediums and inherent differences\
    \ (tapes vs. `USB` vs. `DVD`)\n*   Compression types for backups\n*   Encryption\
    \ types for backups\n\nIt is important to note that we will be preparing many\
    \ backup solutions in the course of this book, and the solutions we create will\
    \ be on a single physical hard drive partitioned into multiple logical hard drives.\
    \ If you have read any of my other books, you will know that I have a specific\
    \ way of setting up my `SQL Server` file locations, as shown in Listing 1. To\
    \ me, this helps to organize the folder structure logically, as opposed to diving\
    \ into the quagmire of nested folders to reach the default file and folder locations.\n\
    \n```\nFolder Location            Purpose\nE:\\SQL Server\\Backups      Backup\
    \ (`.bak`) files\nE:\\SQL Server\\Data         Data (`.mdf`) files\nE:\\SQL Server\\\
    Logs         Log (`.ldf` and `.trn`) files\nE:\\SQL Server\\Temp         Any other\
    \ file type\n```\n**Listing 1** File Locations\n\nYou are free to have your system\
    \ set up however you would like, of course."
