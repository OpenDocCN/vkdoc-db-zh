    \ and the backup media."
  trans: "\n### 目标配签设置\n\n配置备份任务时，在 **目标** 选项卡上提供了几个关键选项。\n\n*   **SQL 凭据**\n    *\
    \   这是用于连接到 Azure 数据库的 `SQL 凭据` 账户。\n*   **Azure 存储容器**\n    *   `Azure 存储容器`\
    \ 就像一块存储区域，你可以用于几乎任何你想做的事情。在这里，我们特指数据库备份，但它并不是直接备份到 Azure 实例；而是仅将文件备份到基于云的存储中。\n\
    *   **URL 前缀**\n    *   `URL 前缀` 对每个账户是唯一的。当你注册 Azure 时，会从 Microsoft 获得一个存储账户名称，该存储账户名称将成为\
    \ URL 中的前缀。\n\n在这些选项之后，最后一项是 **备份文件扩展名**，默认为 `bak`。你可以将其更改为任何你想要的扩展名，但我建议保持原样，接受默认值。图\
    \ 9-8 显示了已更新的“目标”选项卡的值。\n\n![A436605_1_En_9_Fig8_HTML.jpg](img/A436605_1_En_9_Fig8_HTML.jpg)\n\
    \n**图 9-8.** 备份数据库任务，目标选项卡，已更新\n\n当你准备好继续时，单击 **选项** 选项卡，你将看到如图 9-9 所示的默认值。\n\n\
    ![A436605_1_En_9_Fig9_HTML.jpg](img/A436605_1_En_9_Fig9_HTML.jpg)\n\n**图 9-9.**\
    \ 备份数据库任务，选项选项卡\n\n### 选项选项卡\n\n默认情况下，这些选项都是可以的。但是，让我们按照清单 9-5 逐步查看它们，以便我们理解正在查看的内容。\n\
    \n**清单 9-5.** 选项选项卡...选项？\n\n*   **设置备份压缩**\n    *   允许你为备份设置压缩类型。三个选项如下：\n  \
    \      *   `使用默认服务器设置`\n        *   `压缩备份`\n        *   `不压缩备份`\n*   **备份集将过期**\n\
    \    *   你可以选择在一定天数后或在特定日期使备份过期。\n*   **仅复制备份**\n    *   这种备份类型可以被视为一种非顺序备份。通常，备份是按特定顺序进行的，并且必须按其进行的顺序恢复；这就是为什么你必须按事务日志创建的顺序来还原它们。此选项允许你仅创建数据库的副本。\n\
    *   **执行校验和 (新)**\n    *   校验和用于检测数据中的错误或不一致。在此上下文中，会对新生成的备份文件执行校验和，以确保其与预期生成的内容一致。\n\
    *   **验证备份完整性**\n    *   此选项等同于在备份文件位置运行 `RESTORE VERIFYONLY` 命令。简单语法是 `RESTORE\
    \ VERIFYONLY FROM DISK = <备份文件位置和名称>`。其目的是验证新生成的备份文件的完整性（这句话是多余的！）。\n*   **发生错误时继续\
    \ (新)**\n    *   简单来说，就是忽略任何错误并继续执行...除非发生致命错误，这会阻止程序执行。\n*   **备份加密**\n    *\
    \   在此区域，你可以选择用于解密的算法、证书或非对称密钥。请非常小心此区域，因为如果希望以后能还原生成的备份，必须使用相同的证书或非对称密钥。如果证书或密钥丢失，备份将无法成功还原。\n\
    *   **对于可用性数据库，忽略备份的副本优先级和在主副本上备份设置**\n    *   在处理 `AlwaysOn` 和 `可用性组` 时，我总是会参考我的好朋友\
    \ Peter Carter 的优秀著作 *SQL Server AlwaysOn Revealed* ( [`www.apress.com/us/book/9781484217634`](http://www.apress.com/us/book/9781484217634)\
    \ )。此选项允许我们告诉可用性数据库，使用数据库的主副本设置来备份数据库实例。\n*   **块大小 (新)**\n    *   此选项允许你以字节为单位指定物理块大小，而不是让\
    \ `SQL Server` 资源调控器使用默认选项处理备份。将此设置为较低的值会对备份操作产生不利影响，但会写入较小的数据块而不是大块。\n*   **最大传输大小\
    \ (新)**\n    *   此选项允许你指定 `SQL Server` 与备份介质之间使用的最大传输单元（以字节为单位）。\n"
- fmt: "# Understanding Block Size and Max Transfer Size in SQL Server Backups\n\n\
    The block size and max transfer size options sound very similar, don’t you think?\
    \ The difference between them is that the `block size` option allows you to say\
    \ to SQL Server, “I know you usually take a certain number of bytes, but I want\
    \ you to take a different number of bytes and put them in the backup location.”\
    \ The `max transfer size` option allows you to say to SQL Server, “When you move\
    \ bytes to the backup location, I want that chunk to be a specific size. You can\
    \ pack as many blocks into that transfer size that you want, but once you reach\
    \ the limit I set, you need to make another trip.” In other words, think of `block\
    \ size` as the individual train car and the `max transfer size` as the entire\
    \ train. Therefore, the `max transfer size` option is always larger than the `block\
    \ size` option.\n\nFor example, check the `block size` and `max transfer size`\
    \ check boxes. Then choose `4096` in the `block size` drop-down menu. Next, type\
    \ in an amount in the `max transfer size` area; I chose `512`. Finally, press\
    \ `Tab` to move out of the `max transfer size` area. Did you see the value change\
    \ back to `65536`? Next, click the up arrow on the `max transfer size` area, and\
    \ it will change to `131072`. Click the down arrow twice, and it will default\
    \ to `65536`, but it will not go lower.\n\nBefore we continue, make sure you uncheck\
    \ the `block size` and `max transfer size` check boxes. Leaving them checked probably\
    \ wouldn’t cause a lot of headache, but I don’t want to introduce anything into\
    \ the mix that would possibly cause an error. The options I selected in here were\
    \ `Verify backup integrity` and `Perform checksum`. Figure 9-10 shows the updated\
    \ interface for the `Options` tab.\n\n![A436605_1_En_9_Fig10_HTML.jpg](A436605_1_En_9_Fig10_HTML.jpg)\n\
    \nFigure 9-10. Back Up Database Task, Options tab, updated\n\nThat’s all the options\
    \ in this area that I needed to have for the full backup option. Before we move\
    \ on, I want to look at the generated `T-SQL` from this plan, so click the `View\
    \ T-SQL` button, and you will see something similar to what is shown in Listing\
    \ 9-6.\n\n```\nEXECUTE master.dbo.xp_create_subdir N'E:\\SQL Server\\Backup\\\
    backrecTestDB'\nGO\nBACKUP DATABASE [backrecTestDB] TO DISK = N'E:\\SQL Server\\\
    Backup\\backrecTestDB\\backrecTestDB_backup_2017_10_26_223559_7118287.bak' WITH\
    \ NOFORMAT, NOINIT,  NAME = N'backrecTestDB_backup_2017_10_26_223559_7118287',\
    \ SKIP, REWIND, NOUNLOAD,  STATS = 10, CHECKSUM\nGO\ndeclare @backupSetId as int\n\
    select @backupSetId = position from msdb..backupset where database_name=N'backrecTestDB'\
    \ and backup_set_id=(select max(backup_set_id) from msdb..backupset where database_name=N'backrecTestDB')\n\
    if @backupSetId is null begin raiserror(N'Verify failed. Backup information for\
    \ database ''backrecTestDB'' not found.', 16, 1) end\nRESTORE VERIFYONLY FROM\
    \ DISK = N'E:\\SQL Server\\Backup\\backrecTestDB\\backrecTestDB_backup_2017_10_26_223559_7118287.bak'\
    \ WITH  FILE = @backupSetId,  NOUNLOAD,  NOREWIND\n```\n\nListing 9-6. Full Backup\
    \ in T-SQL\n\nNote that the names of the backup files will be different from what\
    \ is shown here. This is because the file names are automatically generated based\
    \ on the current time, so clicking the `View T-SQL` button one second apart will\
    \ generate two different file names. This listing should be used as a template\
    \ to paste in the backup name that you want to backup AND what you want to verify\
    \ after backup. Do not just save this script and expect it to run on your machine;\
    \ I guarantee you that it will fail spectacularly.\n\nWhen you are ready, click\
    \ `OK` to continue. Notice that the red `X` goes away now, and we are left with\
    \ what is shown in Figure 9-11.\n\n![A436605_1_En_9_Fig11_HTML.jpg](A436605_1_En_9_Fig11_HTML.jpg)\n\
    \nFigure 9-11. Backup Plan [Design] , updated\n\n## Scheduling the Full Backup\n\
    \nNow that we have our plan set up, we need to set up a schedule. Typically, the\
    \ schedule I employ at home and at work is almost the same; a full backup at midnight,\
    \ a differential backup every six hours, and a transaction log backup every hour.\
    \ There are some instances where I would even run the transaction log backups\
    \ every half-hour, but this would introduce a lot more files to have to restore\
    \ from, while cutting the maximum time for data loss in half.\n\nStarting from\
    \ where we left off, we can now see what is shown in Figure 9-12.\n\n![A436605_1_En_9_Fig12_HTML.jpg](A436605_1_En_9_Fig12_HTML.jpg)\n\
    \nFigure 9-12. Backup Plan [Design] stage\n\nNotice that we now have a subplan\
    \ named `Subplan_1` in the section above the stage. This is the plan for the full\
    \ backup, but we need to give it a better name. Double-click the `Subplan`, `Description`,\
    \ or `Schedule` column to open the `Subplan Properties` window shown in Figure\
    \ 9-13.\n\n![A436605_1_En_9_Fig13_HTML.jpg](A436605_1_En_9_Fig13_HTML.jpg)\n\n\
    Figure 9-13. Subplan Properties\n\nWe want to change the default values to the\
    \ values shown in Listing 9-7.\n\nListing 9-7. Subplan Properties Values\n\n*\
    \   `Name`\n    *   “Full Backup”\n*   `Description`\n    *   “This is the full\
    \ backup portion of the backup maintenance plan”\n*   `Schedule`\n    *   We will\
    \ set this up in a different area, so ignore this for now\n*   `Run as`\n    *\
    \   Keep this as the default\n\nOnce you have updated those values, click `OK`\
    \ to close that window and you will be returned to the main stage. Figure 9-14\
    \ shows the updated values in the `Subplan Properties` window that you should\
    \ see, and Figure 9-15 shows the updated stage at this point as well.\n\n![A436605_1_En_9_Fig15_HTML.jpg](A436605_1_En_9_Fig15_HTML.jpg)\n\
    \nFigure 9-15. Updated stage\n\n![A436605_1_En_9_Fig14_HTML.jpg](A436605_1_En_9_Fig14_HTML.jpg)\n\
    \nFigure 9-14. Subplan Properties, updated\n\nWe can see in Figure 9-15 that our\
    \ values have been updated in the `Subplan` row to the values we entered. For\
    \ the schedule, we opted to wait until a bit later, so let’s look at that now.\n\
    \nClick the calendar icon in the row next to the `Schedule` column. Figure 9-16\
    \ shows the initial interface for the `New Job Schedule` screen.\n\n![A436605_1_En_9_Fig16_HTML.jpg](A436605_1_En_9_Fig16_HTML.jpg)\n\
    \nFigure 9-16. New Job Schedule\n\nListing 9-8 will step through all the options\
    \ on this screen so we can decide what schedule we want to enforce.\n\nListing\
    \ 9-8. New Job Schedule Options"
