    ## 配置作业


    请注意，现在在 `SQL Server 代理` 的“作业”文件夹中有若干作业。这些名字不太有描述性，对吧？哪个是哪个？让我们现在就来修正这一点。双击 `Subplan_1`
    并更新您的信息，使其大致与图 4-23 所示匹配。您需要在“`名称`”字段中填写一个大致与当前任务相匹配的名称，因此请尽量不要在该字段中输入随机内容。相反，给它一个描述性名称。请注意，我将我的命名为“`backrecTestDB.完整备份`。”


    ![A436605_1_En_4_Fig23_HTML.jpg](img/A436605_1_En_4_Fig23_HTML.jpg)


    图 4-23 作业属性，常规选项卡


    请注意，作业的“`类别`”选项被设置为“`数据库维护`”。这很棒，因为这正是我们正在做的事情。确保“`已启用`”复选框被勾选，此屏幕就设置好了。


    我跳过的一点是“`所有者`”选择。这通常应设置为数据库的所有者，尽管我们这里具体指的是任务的所有者，而非数据库的所有者。因此，它应设置为在数据库中具有较高权限的任何用户。


    另外请注意，左侧有菜单选项。您当前处于“`常规`”选项。如果单击“`步骤`”选项，您将看到图 4-24 所示的内容。


    ![A436605_1_En_4_Fig24_HTML.jpg](img/A436605_1_En_4_Fig24_HTML.jpg)


    图 4-24 作业属性，步骤选项卡


    如果您是首次设置，您会注意到菜单栏尚未显示您的新名称。我的正在更新，因为我展示的是操作结果。要更新您的计划名称，请双击文本 `Subplan_1`（与我在图
    4-24 中显示的“完整备份”相对）。“`作业步骤属性`”窗口将打开，因此将“`步骤名称`”框更改为“完整备份”，如图 4-25 所示。


    ![A436605_1_En_4_Fig25_HTML.jpg](img/A436605_1_En_4_Fig25_HTML.jpg)


    图 4-25 作业属性，步骤选项卡，常规选项


    暂时不要触碰此屏幕上的其他任何内容，只需单击左侧的“`高级`”选项。将此屏幕调整为如图 4-26 所示的设置。


    ![A436605_1_En_4_Fig26_HTML.jpg](img/A436605_1_En_4_Fig26_HTML.jpg)


    图 4-26 作业属性，步骤选项卡，高级选项


    我在这里所做的只是勾选了“`将步骤输出包括在历史记录中`”复选框。如果您已设置一个表来将维护计划结果记录到数据库中的表，则可以选择“`记录到表`”复选框。此外，您还可以通过向“`输出文件`”框输入文件位置，将操作结果输出到文件。


    完成后单击“`确定`”，您将返回到“`作业属性`”屏幕，此时文本“完整备份”已取代 `Subplan_1`。图 4-27 是您现在应该看到的内容。


    ![A436605_1_En_4_Fig27_HTML.jpg](img/A436605_1_En_4_Fig27_HTML.jpg)


    图 4-27 作业属性，步骤选项卡


    单击左侧的“`计划`”选项，注意我们的计划就在其中，并且它已启用，如图 4-28 所示。


    ![A436605_1_En_4_Fig28_HTML.jpg](img/A436605_1_En_4_Fig28_HTML.jpg)


    图 4-28 作业属性，计划选项卡


    单击“`警报`”选项，您将看到一个空白屏幕。目前这没关系。


    单击“`通知`”选项，您将看到图 4-29 所示的内容。


    ![A436605_1_En_4_Fig29_HTML.jpg](img/A436605_1_En_4_Fig29_HTML.jpg)


    图 4-29 作业属性，通知选项卡


    如果您已设置“`操作员`”并且之前已配置“`数据库邮件`”，请在“`电子邮件`”框中选择该“`操作员`”。目前，我们将保留“`写入 Windows 应用程序事件日志`”选项为选中状态，但我们会将下拉菜单更改为“`当作业完成时`”；这样我们将始终知道我们的作业发生了什么。


    单击“`目标`”选项也将显示空白屏幕。这也没关系，因为我们尚未定义任何目标。


    在完成“`目标`”选项并遵循了此区域的指示后，单击“`确定`”。


    如果您查看 `SQL Server 代理` 的“作业”文件夹，您将看到此作业已被重命名并保存为 `full backup`。请按照前面列出的相同步骤处理另外两个作业，并相应地标记它们。请记住，我们将
    `full backup` 定义为第一个任务，`differential backup` 为第二个任务，`transaction log` 为第三个任务。这些与这里的子计划标识相对应。完成时，您应该得到如图
    4-30 所示的内容。


    ![A436605_1_En_4_Fig30_HTML.jpg](img/A436605_1_En_4_Fig30_HTML.jpg)


    图 4-30 已完成的 SQL Server 代理作业


    `syspolicy_purge_history` 也在里面，这没关系。那是 SQL Server 自己执行的一个作业。


    ## 总结


    在本章中，我们探讨了设置完整备份、差异备份和事务日志备份计划的最终步骤。这些备份计划完全取决于相关数据库的恢复模式，并且必须设置为完整或大容量日志模式，因为简单模式不允许进行事务日志备份。


    我们了解了运行经过完整性验证的备份的重要性，以及每次创建备份时未验证备份完整性可能带来的风险。


    我们根据特定环境的需求，清晰且正确地定义了备份计划，并将这些需求转化为可量化的时间表，从而按预期创建备份。


    最后，我们学习了如何使最终的备份维护计划更易于人类阅读，同时保持任务的复杂性。


    我们将继续进入第 5 章，探讨与我们在第 1 章创建的备份场景相对应的还原场景。这是备份场景的逻辑延伸，因为如果无法还原备份，那么拥有备份就没有意义。


    # 第二部分


    还原


    # 5. 完整还原


    按照前面章节的格式，我们将通过深入探讨本书的第二部分，继续备份与还原之旅。第一部分，包含第 1 至 4 章，涵盖了备份部分；这第二部分，包含第 5 至 8
    章，将涵盖还原部分。


    至此，我们认识到数据库备份是整个数据恢复过程的基础。没有备份，就不可能有还原。因此，确保所执行的备份是正确的至关重要，这一点我们之前已经讨论过。现在，基于这些基础知识，我们将进一步探讨执行完整数据库备份还原的各种方法。


    需要重点指出的是，数据库还原主要在 `SQL Server Management Studio` 中完成。我想在这里强调“主要”这个术语，因为它并非还原数据的唯一方式。例如，如果您的
    `master` 数据库已损坏，则必须在 SQL Server 正确启动之前从完整备份中还原它。这是因为 `master` 存储了 SQL Server 的所有配置信息。`master`
    数据库损坏带来的一个主要问题，除了明显的 SQL Server 无法启动之外，还在于所有其他系统数据库（`msdb` 和 `model`）都依赖于 `master`
    才能正常运行。如果 `master` 损坏严重到一定程度，那么将需要单独重建系统表，这是一件非常麻烦的事情。

    '
- fmt: '## What Is a Full Restore?


    Simply put, a full restore is exactly what it sounds like, and yet not what it
    sounds like at all; it restores all of the data contained in a previously run
    full database backup, but it does not restore the entire database. Recall that
    the full database backup only backs up the data, and not the system settings.
    Only the table data for the specified database will be contained in the database
    backup.


    Note


    If you need a backup of the system settings as related to the installation of
    SQL Server, you must have a current backup of the `master`, `msdb`, and `model`
    databases. These are system databases and are extremely important to the smooth
    operation of SQL Server.


    When I first started working in SQL Server, it was between SQL Server 7 and SQL
    Server 2000\. I was sort of used to how MySQL worked as far as interface and usability,
    so the switch was a little hard at first, but I gradually got the hang of it.
    One of the things about MySQL that I really liked was that their “backups” were
    just huge `.sql` files with a ton of `INSERT` commands. That’s right, the entirety
    of the database was dumped in sequence; first, the `DROP` and `CREATE` commands
    for a table, then the individual `INSERT` statements for all the data in that
    table. This may seem like a waste of space to some, but the brilliance is in the
    detail, if you ask me. A DBA with enough time on their hands could then pick through
    that backup and literally control the insertion of data at a granular level not
    seen in SQL Server. What I mean by that is that SQL Server does not make backups
    in this format; backups in SQL Server are made specifically for the SQL Server
    engine to execute, not for human readability. Yes, in a SQL Server backup, the
    data is there (obviously), but it can’t be read by opening it in Notepad, for
    example.


    Another aspect of full restores is that they can be used to create perfect copies
    of existing databases. Being able to have this sort of functionality available
    to me in a development environment is absolutely invaluable, because I can easily
    create an entire development database based on a production database that I use
    primarily for testing. I can then create another database, an exact duplicate
    of the development database, but name it something different. Then, if I ever
    need to restore the data, I can easily `TRUNCATE` any table in the first development
    database and replace the data quickly with an `INSERT INTO` statement using the
    second development database as the source and the first development database as
    the destination. I will show exactly how this is done later in this chapter.


    First, let’s switch our focus momentarily to the system databases. There are three
    main system databases, named `master`, `msdb`, and `model`. These three databases
    carry the configuration information for your SQL Server installation, so they
    are extremely important to the overall health of your entire installation. Technically,
    there is a fourth system database named `tempdb`, but this database is destroyed
    and created every time an instance of SQL Server is created for that particular
    instance of SQL Server, so it’s not necessary to worry about backing it up.


    ## Restoring the Master Database


    If you ever have to restore the `master` database, or any of the system databases,
    I sincerely hope it is not because of a major corruption issue. I can tell you
    first-hand that this is a major undertaking, and must be done with the utmost
    care and attention to detail. This section will show the individual steps and
    instructions for restoring the `master` database from a full database backup.
    The steps can be applied to restore any system database, but for now, I will only
    focus on the `master` database.


    This section is dependent on the presence of a current backup of the `master`
    database. It is usually best to make a backup of the `master` database every time
    that a change is made to the structure of the tables or to the underlying architecture
    of the database. Backing up the `master` database and having it available in case
    of emergency will alleviate a lot of problems in the future, and I would recommend
    backing up these system databases as part of your normal backup maintenance plan.
    I didn’t cover this in the previous chapters dealing with backups because the
    content for this book is based on your individual database backups, and not the
    next level of database administration, where we would be dealing with the backups
    of the system databases as well. To continue, run a quick backup of the `master`
    database, or use one that you have already prepared.


    The first thing that we have to do to restore the `master` database is start SQL
    Server in single-user mode. For those that are new to this operation, single-user
    mode starts SQL Server with a limited number of connections (one) so that emergency
    work can be done without additional burden to the server.'
