  trans: "## 总结\n\n本章我们终于完成了恢复操作，并学习了对备份和恢复操作至关重要的各种数据恢复选项。我们了解了如何恢复页面，以及 `msdb..suspect_pages`\
    \ 表对于发现数据库中可疑页面损坏的价值。我们探讨了从数据库快照恢复及其涉及的所有内容。最后，我们学习了如何查看备份和恢复的历史记录。本章结束了关于备份与恢复操作中“恢复”方面的这一部分。在下一部分中，我们将开始把所有内容整合到一个独立的备份与恢复计划中。\n\
    \n## 第三部分\n### 完整解决方案\n\n## 9. 完整备份与恢复解决方案\n\n在“现实世界”中，业务上绝对有需要能够随时提供可靠备份。数据损坏的可能性几乎是必然存在的，因此经验丰富的数据库管理员必须确保其数据库能够快速、正确地恢复。备份的可用性和可靠性至关重要，无论备份是存储在远程位置，还是存储在数据库服务器本地。在我们的备份和恢复实践中，我们经常需要处理服务级别协议，或称为\
    \ SLA。这类文档涉及广泛的细节，例如备份运行的频率、数据恢复的条件以及如何恢复数据。您可能在一个不涉及这些内容的地方工作，这也没问题。例如，如果您是作为网络托管套餐的一部分提供数据库存储即服务，那么您很可能会受到一份\
    \ SLA 的约束，该 SLA 描述了该系统的可用性细节。无论您作为数据库管理员的日常职责是否受到 SLA 的约束，有一件事是不变的，那就是您对数据库及其所承载数据的健康所负有的责任。在我迄今为止所写的每一本书中，我都试图传达一个信息，本书也不例外：作为数据库管理员，我们最大的责任莫过于保护我们的数据。\n\
    \n根据我的个人经验，我能想到的完全使用 T-SQL 编写完整备份场景的数据库管理员，总共只有一个。此人的理由是，SQL 可以从 SSMS 外部运行，因此在\
    \ SSMS 之外可用是理想的。虽然我部分同意这一点，但另一方面我认为，我们应该利用我们掌握的工具，包括（尤其是）那些可以用于自动化任务（如备份）的工具。对我来说，让\
    \ SSMS 完成大部分工作是有意义的，但仍然准备好 T-SQL 代码，以备不时之需，比如当我们需要备份或恢复数据库而 SSMS 因故不可用时，像我那位 DBA\
    \ 朋友一样的代码爱好者可以使用。因此，本章我们将重点介绍如何在 SQL Server Management Studio 中创建一个用于完整备份的维护计划，然后编写相应的\
    \ T-SQL，以备需要时使用。需要理解的是，这并不是说 T-SQL 作为经验丰富的或初级的数据库管理员的主要脚本工具没有其用武之地；相反的说法是没有意义的，因为\
    \ T-SQL 是数据库管理员与数据库通信的基础语言。通过简单的谷歌搜索可以找到许多 T-SQL 解决方案，其中特别值得一提的是 Ola Hallengren\
    \ 的备份脚本解决方案，位于 [`https://ola.hallengren.com/`](https://ola.hallengren.com/)。\n\
    \n到目前为止，我们一直专注于备份与恢复之间的区别，并通过不同的章节在我们的脑海中将它们区分开来。现在我们需要开始将这些不同的概念连接成一个连贯的整体，而我能想到的最好方法是创建两个独立的维护计划，一个用于备份，一个用于恢复，来管理计划的不同部分。拥有独立维护计划的明显含义是，每个备份部分将有不同的时间表。\n\
    \n本章，我们将学习如何为完整备份创建维护计划。显然，我们不希望将恢复序列作为备份场景的一部分。原因在于，那样做无非就是运行一个完整数据库备份，然后立即将该备份还原到我们刚刚备份的数据库之上。清单\
    \ 9-1 展示了我们将在本章构建的内容。\n\n**清单 9-1. 待办事项列表**\n```\n* 在 SSMS 中创建完整备份维护计划\n    *\
    \ 根据我们之前的计划，每 24 小时进行一次完整备份\n    * 备份必须存储在与 SQL Server 安装位置不同的物理磁盘上\n* 在 SSMS\
    \ 中创建完整恢复维护计划\n    * 不设置计划，但作为 SQL Server Integration Services (SSIS) 包在 SSMS\
    \ 中可用\n* 使用 T-SQL 创建完整备份维护计划\n    * 不设置计划，可在必要时通过 `sqlcmd` 运行\n* 使用 T-SQL 创建完整恢复维护计划\n\
    \    * 不设置计划，可在必要时通过 `sqlcmd` 运行\n```\n这看起来是本章一个相当不错的开始。接下来的两章中，我们将为差异备份和事务日志备份构建本质上相同的内容。"
- fmt: "## Full Backup Plan in SSMS\n\nOnce we start up `SSMS`, with the focus on\
    \ `Object Explorer`, we need to expand `Management`, and then expand `Maintenance\
    \ Plans`. If we had any maintenance plans, they would be in this area. They would\
    \ also be in the `Jobs` menu of `SQL Server Agent` as individual jobs, but we\
    \ will take a look at that area once we create the maintenance plan.\n\nRight-click\
    \ `Maintenance Plans` and select `New Maintenance Plan`. When you see the `New\
    \ Maintenance Plan` window shown in Figure 9-1, give it a name of `Backup Plan`\
    \ and press `OK`.\n\n![A436605_1_En_9_Fig1_HTML.jpg](A436605_1_En_9_Fig1_HTML.jpg)\n\
    Figure 9-1. New Maintenance Plan window\n\nOnce you give it a name, a window titled\
    \ `Backup Plan [Design]` is opened in the main stage area. Figure 9-2 shows the\
    \ default values for this window.\n\n![A436605_1_En_9_Fig2_HTML.jpg](A436605_1_En_9_Fig2_HTML.jpg)\n\
    Figure 9-2. Backup Plan [Design] window\n\nNext, we need to open up our `Toolbox`\
    \ by clicking the `Toolbox` hovering menu located to the left of `Object Explorer`\
    \ against the side of the interface. Alternately, you can press `Ctrl+Alt+X` anywhere\
    \ within the `SQL Server Management Studio` screen and the menu will appear on\
    \ the left as an overlay on top of `Object Explorer`. To hide the `Toolbar`, just\
    \ click the `Toolbar` hovering menu again and it will disappear, leaving `Object\
    \ Explorer` in view.\n\nThe toolbox has quite a few items that I explored at great\
    \ length in my first book, *Practical Maintenance Plans in SQL Server* ([`www.apress.com/us/book/9781484218945`](http://www.apress.com/us/book/9781484218945)).\
    \ We can see from a cursory glance at Figure 9-3 that the option we want is right\
    \ there on top; we want the `Back Up Database Task`.\n\n![A436605_1_En_9_Fig3_HTML.jpg](A436605_1_En_9_Fig3_HTML.jpg)\n\
    Figure 9-3. Toolbox\n\nClick and drag the `Back Up Database Task` from the `Toolbox`\
    \ to the gray area of the main stage. Figure 9-4 shows approximately where the\
    \ task should end up in the stage, but just anywhere inside of the stage is fine.\
    \ The stage area acts as the logical container for the pieces of the maintenance\
    \ plan, and the order they are in doesn’t matter in the slightest. The only thing\
    \ that can interconnect these pieces is the precedence constraints that we could\
    \ put on each successive item, so that we can chain events together and make the\
    \ maintenance plan a bit more procedural than just a scheduled lump of tasks.\n\
    \nOnce you drag the `Back Up Database Task` onto the stage, you will see it appear\
    \ as shown in Figure 9-4. Note that the red `X` signifies that this item needs\
    \ to be configured.\n\n![A436605_1_En_9_Fig4_HTML.jpg](A436605_1_En_9_Fig4_HTML.jpg)\n\
    Figure 9-4. Back Up Database Task\n\nIf you were to mouse over the red `X`, you\
    \ would see the message “No connection manager is specified.” Double-click the\
    \ task and the `Back Up Database Task` window appears, as shown in Figure 9-5.\n\
    \n![A436605_1_En_9_Fig5_HTML.jpg](A436605_1_En_9_Fig5_HTML.jpg)\nFigure 9-5. Back\
    \ Up Database Task window\n\nFor those that are familiar with this area from previous\
    \ versions of `SQL Server`, you will notice that this interface got a slight upgrade\
    \ in this version of `SQL Server Management Studio`. It may even be different\
    \ once `SQL Server Management Studio` is updated again, since `SSMS` is now a\
    \ separate download from `SQL Server` and therefore subject to an update cycle\
    \ outside of the service pack issuance by Microsoft.\n\n### Defining the Back\
    \ Up Database Task Options\n\nNote that we are on the `General` tab. This is where\
    \ we are going to specify the items shown in Listing 9-2 in order to get this\
    \ area prepared.\n\n**Listing 9-2.** To-Do List\n\n- `Backup type`\n    - We must\
    \ choose from `full`, `differential`, or `transaction log`. In this case, we are\
    \ going to choose `full`.\n- `Databases`\n    - We must choose at least one database.\
    \ Note that simple recovery model databases are removed if `transaction log` is\
    \ chosen from the `backup type` option. In this case, we are going to choose the\
    \ database we have been working in, `backrecTestDB`.\n- `Backup component`\n \
    \   - We can choose from `database` or `files and filegroups`. In this case, we\
    \ are going to choose `database`. We could choose `files and filegroups` if we\
    \ had multiple filegroups for our database, but I only set up the `PRIMARY` filegroup.\n\
    \    - **Note** If you have multiple filegroups in your scenario, then you can\
    \ setup multiple full backup tasks to backup each filegroup in the order or schedule\
    \ you desire.\n- `Back up to`\n    - We must choose from `disk`, `tape`, or `URL`.\
    \ In this case, keep it set to `disk`.\n\nAbove the `General` tab, we can see\
    \ the `Connection` drop-down menu. This defaults to “Local server connection”\
    \ and it needs to stay there for this procedure.\n\nOnce you make the changes\
    \ noted in Listing 9-2, your window should look similar to what is shown in Figure\
    \ 9-6.\n\n![A436605_1_En_9_Fig6_HTML.jpg](A436605_1_En_9_Fig6_HTML.jpg)\nFigure\
    \ 9-6. Back Up Database Task, updated\n\nNote that the `Databases` area changes\
    \ to the text “Specific databases” when a database is selected.\n\nWhen you are\
    \ ready, select the `Destination` tab to proceed. Figure 9-7 shows the default\
    \ settings for this tab.\n\n![A436605_1_En_9_Fig7_HTML.jpg](A436605_1_En_9_Fig7_HTML.jpg)\n\
    Figure 9-7. Back Up Database Task, Destination tab\n\nThis tab is slightly more\
    \ complicated than the `General` tab. In here, we have the options detailed in\
    \ Listing 9-3.\n\n**Listing 9-3.** Destination Tab Options\n\n- `Back up databases\
    \ across one or more files`\n    - This option exists in case we want to create\
    \ multiple backup files of the same database. We can add as many different file\
    \ names in this area as we would like, but note that there will be performance\
    \ issues with too many entries.\n- `Create a backup file for every database`\n\
    \    - This is probably the most common option, since it lets us have a single\
    \ backup file of every selected database. You can also select to create a subdirectory\
    \ for each database, which is a very handy feature as well. The `folder` location\
    \ is where the database backup will be placed, unless the `subdirectory` option\
    \ is checked, in which case, the database name will become a folder name, and\
    \ the backup will be placed inside that folder. We want to choose this option,\
    \ and check the `Create a subdirectory for each database` check box as well. Leave\
    \ the `folder` value as is, since the default value for backups is a unique date/time\
    \ string.\n\nNotice that there is another section under Listing 9-3 options that\
    \ are defined as shown in Listing 9-4. These options are only available if you\
    \ chose the `URL` option in the `General` tab shown in Figure 9-5. Otherwise,\
    \ they are disabled by default.\n\n**Listing 9-4.** Azure Options"
  raw: "## Full Backup Plan in SSMS\n\nOnce we start up SSMS, with the focus on Object\
    \ Explorer, we need to expand Management, and then expand Maintenance Plans. If\
    \ we had any maintenance plans, they would be in this area. They would also be\
    \ in the Jobs menu of SQL Server Agent as individual jobs, but we will take a\
    \ look at that area once we create the maintenance plan.\n\nRight-click Maintenance\
    \ Plans and select New Maintenance Plan. When you see the New Maintenance Plan\
    \ window shown in Figure [9-1](#A436605_1_En_9_Chapter.html#Fig1), give it a name\
    \ of Backup Plan and press OK.\n\n![A436605_1_En_9_Fig1_HTML.jpg](A436605_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\n\nNew Maintenance Plan window\n\nOnce you give it a name, a window\
    \ titled Backup Plan [Design] is opened in the main stage area. Figure [9-2](#A436605_1_En_9_Chapter.html#Fig2)\
    \ shows the default values for this window.\n\n![A436605_1_En_9_Fig2_HTML.jpg](A436605_1_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2\n\nBackup Plan [Design] window\n\nNext, we need to open up our Toolbox\
    \ by clicking the Toolbox hovering menu located to the left of Object Explorer\
    \ against the side of the interface. Alternately, you can press Ctrl+Alt+X anywhere\
    \ within the SQL Server Management Studio screen and the menu will appear on the\
    \ left as an overlay on top of Object Explorer. To hide the Toolbar, just click\
    \ the Toolbar hovering menu again and it will disappear, leaving Object Explorer\
    \ in view.\n\nThe toolbox has quite a few items that I explored at great length\
    \ in my first book, Practical Maintenance Plans in SQL Server ( [`www.apress.com/us/book/9781484218945`](http://www.apress.com/us/book/9781484218945)\
    \ ). We can see from a cursory glance at Figure [9-3](#A436605_1_En_9_Chapter.html#Fig3)\
    \ that the option we want is right there on top; we want the Back Up Database\
    \ Task.\n\n![A436605_1_En_9_Fig3_HTML.jpg](A436605_1_En_9_Fig3_HTML.jpg)\n\nFigure\
    \ 9-3\n\nToolbox\n\nClick and drag the Back Up Database Task from the Toolbox\
    \ to the gray area of the main stage. Figure [9-4](#A436605_1_En_9_Chapter.html#Fig4)\
    \ shows approximately where the task should end up in the stage, but just anywhere\
    \ inside of the stage is fine. The stage area acts as the logical container for\
    \ the pieces of the maintenance plan, and the order they are in doesn’t matter\
    \ in the slightest. The only thing that can interconnect these pieces is the precedence\
    \ constraints that we could put on each successive item, so that we can chain\
    \ events together and make the maintenance plan a bit more procedural than just\
    \ a scheduled lump of tasks.\n\nOnce you drag the Back Up Database Task onto the\
    \ stage, you will see it appear as shown in Figure [9-4](#A436605_1_En_9_Chapter.html#Fig4).\
    \ Note that the red X signifies that this item needs to be configured.\n\n![A436605_1_En_9_Fig4_HTML.jpg](A436605_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4\n\nBack Up Database Task\n\nIf you were to mouse over the red X,\
    \ you would see the message “No connection manager is specified.” Double-click\
    \ the task and the Back Up Database Task window appears, as shown in Figure [9-5](#A436605_1_En_9_Chapter.html#Fig5).\n\
    \n![A436605_1_En_9_Fig5_HTML.jpg](A436605_1_En_9_Fig5_HTML.jpg)\n\nFigure 9-5\n\
    \nBack Up Database Task window\n\nFor those that are familiar with this area from\
    \ previous versions of SQL Server, you will notice that this interface got a slight\
    \ upgrade in this version of SQL Server Management Studio. It may even be different\
    \ once SQL Server Management Studio is updated again, since SSMS is now a separate\
    \ download from SQL Server and therefore subject to an update cycle outside of\
    \ the service pack issuance by Microsoft.\n\n## Defining the Back Up Database\
    \ Task Options\n\nNote that we are on the General tab. This is where we are going\
    \ to specify the items shown in Listing [9-2](#A436605_1_En_9_Chapter.html#Par27)\
    \ in order to get this area prepared.\n\nListing 9-2. To-Do List\n\n*   Backup\
    \ type\n    *   We must choose from full, differential, or transaction log. In\
    \ this case, we are going to choose full.\n*   Databases\n    *   We must choose\
    \ at least one database. Note that simple recovery model databases are removed\
    \ if transaction log is chosen from the backup type option. In this case, we are\
    \ going to choose the database we have been working in, backrecTestDB.\n*   Backup\
    \ component\n    *   We can choose from database or files and filegroups. In this\
    \ case, we are going to choose database. We could choose files and filegroups\
    \ if we had multiple filegroups for our database, but I only set up the PRIMARY\
    \ filegroup.Note If you have multiple filegroups in your scenario, then you can\
    \ setup multiple full backup tasks to backup each filegroup in the order or schedule\
    \ you desire.\n*   Back up to\n    *   We must choose from disk, tape, or URL.\
    \ In this case, keep it set to disk.\n\nAbove the General tab, we can see the\
    \ Connection drop-down menu. This defaults to “Local server connection” and it\
    \ needs to stay there for this procedure.\n\nOnce you make the changes noted in\
    \ Listing [9-2](#A436605_1_En_9_Chapter.html#Par27), your window should look similar\
    \ to what is shown in Figure [9-6](#A436605_1_En_9_Chapter.html#Fig6).\n\n![A436605_1_En_9_Fig6_HTML.jpg](A436605_1_En_9_Fig6_HTML.jpg)\n\
    \nFigure 9-6\n\nBack Up Database Task, updated\n\nNote that the Databases area\
    \ changes to the text “Specific databases” when a database is selected.\n\nWhen\
    \ you are ready, select the Destination tab to proceed. Figure [9-7](#A436605_1_En_9_Chapter.html#Fig7)\
    \ shows the default settings for this tab.\n\n![A436605_1_En_9_Fig7_HTML.jpg](A436605_1_En_9_Fig7_HTML.jpg)\n\
    \nFigure 9-7\n\nBack Up Database Task, Destination tab\n\nThis tab is slightly\
    \ more complicated than the General tab. In here, we have the options detailed\
    \ in Listing [9-3](#A436605_1_En_9_Chapter.html#Par42).\n\nListing 9-3. Destination\
    \ Tab Options\n\n*   Back up databases across one or more files\n    *   This\
    \ option exists in case we want to create multiple backup files of the same database.\
    \ We can add as many different file names in this area as we would like, but note\
    \ that there will be performance issues with too many entries.\n*   Create a backup\
    \ file for every database\n    *   This is probably the most common option, since\
    \ it lets us have a single backup file of every selected database. You can also\
    \ select to create a subdirectory for each database, which is a very handy feature\
    \ as well. The folder location is where the database backup will be placed, unless\
    \ the subdirectory option is checked, in which case, the database name will become\
    \ a folder name, and the backup will be placed inside that folder. We want to\
    \ choose this option, and check the Create a subdirectory for each database check\
    \ box as well. Leave the folder value as is, since the default value for backups\
    \ is a unique date/time string.\n\nNotice that there is another section under\
    \ Listing [9-3](#A436605_1_En_9_Chapter.html#Par42) options that are defined as\
    \ shown in Listing [9-4](#A436605_1_En_9_Chapter.html#Par48). These options are\
    \ only available if you chose the URL option in the General tab shown in Figure\
    \ [9-5](#A436605_1_En_9_Chapter.html#Fig5). Otherwise, they are disabled by default.\n\
    \nListing 9-4. Azure Options"
  trans: "## SSMS 中的完整备份计划\n\n一旦启动 `SSMS`，将焦点置于 `对象资源管理器`，我们需要展开 `管理`，然后展开 `维护计划`。如果我们有任何维护计划，它们将位于此区域。它们也会作为独立的作业出现在\
    \ `SQL Server 代理` 的 `作业` 菜单中，但我们将在创建维护计划后查看该区域。\n\n右键单击 `维护计划` 并选择 `新建维护计划`。当您看到如图\
    \ 9-1 所示的 `新建维护计划` 窗口时，为其命名为 `Backup Plan` 并按 `确定`。\n\n![A436605_1_En_9_Fig1_HTML.jpg](img/A436605_1_En_9_Fig1_HTML.jpg)\n\
    图 9-1. 新建维护计划窗口\n\n一旦您为其命名，一个标题为 `备份计划 [设计]` 的窗口将在主工作区打开。图 9-2 显示了此窗口的默认值。\n\n\
    ![A436605_1_En_9_Fig2_HTML.jpg](img/A436605_1_En_9_Fig2_HTML.jpg)\n图 9-2. 备份计划\
    \ [设计] 窗口\n\n接下来，我们需要通过点击位于 `对象资源管理器` 左侧、界面边缘的浮动 `工具箱` 菜单来打开我们的 `工具箱`。或者，您可以在\
    \ `SQL Server Management Studio` 屏幕内的任意位置按下 `Ctrl+Alt+X`，该菜单将作为覆盖层出现在左侧的 `对象资源管理器`\
    \ 之上。要隐藏 `工具箱`，只需再次点击 `工具箱` 浮动菜单，它就会消失，仅显示 `对象资源管理器`。\n\n工具箱中有相当多的项目，我在我的第一本书\
    \ *SQL Server 中的实用维护计划* ([`www.apress.com/us/book/9781484218945`](http://www.apress.com/us/book/9781484218945))\
    \ 中进行了详细探讨。从图 9-3 的粗略浏览中我们可以看到，我们需要的选项就在最上面；我们需要的是 `备份数据库任务`。\n\n![A436605_1_En_9_Fig3_HTML.jpg](img/A436605_1_En_9_Fig3_HTML.jpg)\n\
    图 9-3. 工具箱\n\n单击并将 `备份数据库任务` 从 `工具箱` 拖到主工作区的灰色区域。图 9-4 显示了该任务在工作区中应放置的大致位置，但放在工作区内的任何地方都可以。工作区充当维护计划各个部分的逻辑容器，它们的顺序完全无关紧要。唯一能将这些部分互连起来的是我们可以放在每个后续项目上的优先级约束，这样我们就可以将事件链接起来，使维护计划比单纯的预定任务块更具过程性。\n\
    \n将 `备份数据库任务` 拖到工作区后，您将看到它如图 9-4 所示出现。请注意，红色的 `X` 表示此项需要配置。\n\n![A436605_1_En_9_Fig4_HTML.jpg](img/A436605_1_En_9_Fig4_HTML.jpg)\n\
    图 9-4. 备份数据库任务\n\n如果您将鼠标悬停在红色的 `X` 上，您会看到消息“未指定连接管理器。”双击该任务，`备份数据库任务` 窗口将出现，如图\
    \ 9-5 所示。\n\n![A436605_1_En_9_Fig5_HTML.jpg](img/A436605_1_En_9_Fig5_HTML.jpg)\n\
    图 9-5. 备份数据库任务窗口\n\n对于那些从之前版本的 `SQL Server` 熟悉此区域的人来说，您会注意到此界面在当前版本的 `SQL Server\
    \ Management Studio` 中进行了轻微升级。一旦 `SQL Server Management Studio` 再次更新，它甚至可能会有所不同，因为\
    \ `SSMS` 现在是独立于 `SQL Server` 下载的，因此其更新周期独立于 Microsoft 发布的服务包。\n\n### 定义备份数据库任务选项\n\
    \n请注意，我们位于 `常规` 选项卡。这是我们指定清单 9-2 所示项目以准备此区域的地方。\n\n**清单 9-2.** 待办事项列表\n\n- `备份类型`\n\
    \    - 我们必须从 `完整`、`差异` 或 `事务日志` 中选择。在本例中，我们将选择 `完整`。\n- `数据库`\n    - 我们必须至少选择一个数据库。请注意，如果从\
    \ `备份类型` 选项中选择 `事务日志`，则简单恢复模式数据库将被移除。在本例中，我们将选择我们一直在使用的数据库 `backrecTestDB`。\n\
    - `备份组件`\n    - 我们可以从 `数据库` 或 `文件和文件组` 中选择。在本例中，我们将选择 `数据库`。如果我们的数据库有多个文件组，我们可以选择\
    \ `文件和文件组`，但我只设置了 `PRIMARY` 文件组。\n    - **注意** 如果您的场景中有多个文件组，则可以设置多个完整备份任务，以便按您期望的顺序或计划备份每个文件组。\n\
    - `备份到`\n    - 我们必须从 `磁带`、`磁盘` 或 `URL` 中选择。在本例中，请保持设置为 `磁盘`。\n\n在 `常规` 选项卡上方，我们可以看到\
    \ `连接` 下拉菜单。此选项默认为“本地服务器连接”，在此过程中需要保持此设置。\n\n一旦您按照清单 9-2 中的说明进行更改，您的窗口应类似于图 9-6\
    \ 所示。\n\n![A436605_1_En_9_Fig6_HTML.jpg](img/A436605_1_En_9_Fig6_HTML.jpg)\n图\
    \ 9-6. 备份数据库任务（已更新）\n\n请注意，当选择了一个数据库时，`数据库` 区域会变为文本“特定数据库”。\n\n当您准备好后，请选择 `目标`\
    \ 选项卡以继续。图 9-7 显示了此选项卡的默认设置。\n\n![A436605_1_En_9_Fig7_HTML.jpg](img/A436605_1_En_9_Fig7_HTML.jpg)\n\
    图 9-7. 备份数据库任务，目标选项卡\n\n此选项卡比 `常规` 选项卡稍复杂。在这里，我们有清单 9-3 中详述的选项。\n\n**清单 9-3.**\
    \ 目标选项卡选项\n\n- `在跨一个或多个文件备份数据库`\n    - 此选项存在是为了让我们可以创建同一数据库的多个备份文件。我们可以在此区域添加任意多个不同的文件名，但请注意，条目过多会导致性能问题。\n\
    - `为每个数据库创建备份文件`\n    - 这可能是最常见的选项，因为它让我们可以为每个选定的数据库创建单个备份文件。您还可以选择为每个数据库创建子目录，这也是一个非常方便的功能。`文件夹`\
    \ 位置是数据库备份将放置的位置，除非勾选了 `子目录` 选项，在这种情况下，数据库名称将成为文件夹名称，备份将放置在该文件夹内。我们希望选择此选项，并同时勾选\
    \ `为每个数据库创建子目录` 复选框。保持 `文件夹` 值不变，因为备份的默认值是一个唯一的日期/时间字符串。\n\n请注意，在清单 9-3 的选项下方还有另一个部分，其定义如清单\
    \ 9-4 所示。这些选项仅在您选择了图 9-5 所示的 `常规` 选项卡中的 `URL` 选项时才可用。否则，它们默认是禁用的。\n\n**清单 9-4.**\
    \ Azure 选项"
- fmt: "### Destination Tab Settings\n\nWhen configuring the backup task, several\
    \ key options are available on the **Destination** tab.\n\n*   **SQL Credential**\n\
    \    *   This is the `SQL Credential` account used to connect to the Azure database.\n\
    *   **Azure storage container**\n    *   An `Azure storage container` is like\
    \ a block of storage that you can use for just about anything you want. In this\
    \ instance, we are specifically referring to a database backup, but it isn’t backing\
    \ up directly to an Azure instance; instead, it is just backing up the file to\
    \ cloud-based storage.\n*   **URL prefix**\n    *   The `URL prefix` is unique\
    \ to each account. You get a storage account name from Microsoft when you sign\
    \ up for Azure, and the storage account name will be the prefix in the URL.\n\n\
    After these options, the last item is **Backup file extension**, which is defaulted\
    \ to `bak`. This can be changed to whatever extension you desire, but I would\
    \ leave this alone and accept the default value. Figure 9-8 shows the updated\
    \ values for the Destination tab.\n\n![A436605_1_En_9_Fig8_HTML.jpg](A436605_1_En_9_Fig8_HTML.jpg)\n\
    \n**Figure 9-8.** Back Up Database Task, Destination tab, updated\n\nWhen you\
    \ are ready to move on, click the **Options** tab and you will see the default\
    \ values shown in Figure 9-9.\n\n![A436605_1_En_9_Fig9_HTML.jpg](A436605_1_En_9_Fig9_HTML.jpg)\n\
    \n**Figure 9-9.** Back Up Database Task, Options tab\n\n### Options Tab\n\nBy\
    \ default, these options are all okay. However, let’s step through them in Listing\
    \ 9-5 so that we understand what we are looking at.\n\n**Listing 9-5.** Options\
    \ Tab… Options?\n\n*   **Set backup compression**\n    *   Allows you to set the\
    \ compression type for the backup. The three options are as follows:\n       \
    \ *   `Use the default server setting`\n        *   `Compress backup`\n      \
    \  *   `Do not compress backup`\n*   **Backup set will expire**\n    *   You can\
    \ choose to set the backup to expire after a certain number of days or on a specific\
    \ date.\n*   **Copy-only backup**\n    *   This backup type can be thought of\
    \ as an out-of-sequence backup. Generally, backups are taken in a specific sequence,\
    \ and must be restored in the order they are taken; this is why you must restore\
    \ the transaction logs in the order they were created. This option allows you\
    \ to only create a copy of the database.\n*   **Perform checksum (New)**\n   \
    \ *   A checksum is used to detect errors or inconsistencies in data. In this\
    \ context, a checksum is done on the newly generated backup file to ensure that\
    \ it is consistent with what was believed to be produced.\n*   **Verify backup\
    \ integrity**\n    *   This option is the same as running a `RESTORE VERIFYONLY`\
    \ command on your backup file location. The simple syntax is `RESTORE VERIFYONLY\
    \ FROM DISK = <backup file location and name>`. Its purpose is to verify the integrity\
    \ of the newly generated backup file (that was redundant!).\n*   **Continue on\
    \ error (New)**\n    *   Simply put, to ignore any errors and keep hammering away…\
    \ unless a fatal error occurs, which would stop the program from executing.\n\
    *   **Backup encryption**\n    *   In this area, you can choose the algorithm\
    \ and certificate or asymmetric key for decryption. Be very careful with this\
    \ area, because the same certificate or asymmetric key must be used if you ever\
    \ want to restore the generated backup. If the certificate or key is lost, the\
    \ backup cannot be restored successfully.\n*   **For availability databases, ignore\
    \ replica priority for backup and backup on primary settings**\n    *   When dealing\
    \ with `AlwaysOn` and `Availability Groups`, I always default to my good friend\
    \ Peter Carter’s excellent book *SQL Server AlwaysOn Revealed* ( [`www.apress.com/us/book/9781484217634`](http://www.apress.com/us/book/9781484217634)\
    \ ). This option allows us to tell the availability databases to back up the database\
    \ instance using the primary settings for the database.\n*   **Block size (New)**\n\
    \    *   This option allows you to specify the physical block size in bytes, as\
    \ opposed to allowing the `SQL Server` resource governor to handle the backup\
    \ using the default options. Setting this to a lower value would have an adverse\
    \ effect on backup operations, but smaller chunks of data would be written instead\
    \ of large chunks.\n*   **Max transfer size (New)**\n    *   This option allows\
    \ you to specify the largest unit of transfer in bytes to be used between `SQL\
    \ Server` and the backup media."
