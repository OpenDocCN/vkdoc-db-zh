  trans: '接下来，回到 `SSMS` 并运行以下查询：


    ```sql

    SELECT count(*) as cnt FROM users1

    ```


    你的结果应该是 20030000。恭喜你！


    在第一部分中，我们已成功通过 `SQL Server Management Studio` 以两种不同方式还原了事务日志。


    ## 使用 Transact-SQL 还原


    这种方法稍微简单一些。在 `SQL Server Management Studio` 的下载中，有一个名为 `模板浏览器` 的侧边栏可用。如果你没有立即看到它，请按
    `Ctrl+Alt+T`，或在 `SSMS` 中转到 `视图` ➤ `模板资源管理器`。该侧边栏应在主窗口右侧打开。向下滚动到 `还原` 子菜单并展开它。你应该会看到
    `还原数据库` 和 `还原文件和文件组` 作为 `还原` 子菜单下的文件。这看起来应该很熟悉，因为我们在上一节中刚刚处理过这些界面。


    基本思路是这样的：双击你想要编辑的任何模板，该模板就会作为新查询在 `SSMS` 主窗口中打开。然后，你可以对此文件进行任何所需的更改，并将其作为全新的脚本保存到本地文件系统。


    ### 还原文件和文件组模板


    这个模板比稍后介绍的 `还原数据库` 模板稍微复杂一些，这是有充分理由的。该模板涉及还原单个文件，而 `还原数据库` 模板只是简单地还原数据库，仅此而已。首先也是最重要的；我们需要删除模板中要求我们创建数据库、备份数据库和备份事务日志的部分。这实质上意味着我们将删除第
    5 行到第 41 行（含）。这意味着我们应该剩下四条语句，每条都以 `RESTORE` 开头。接下来，我们想删除其中一条 `RESTORE` 语句。原因是，我们假设我们将还原一个完整备份，然后是一个差异备份，最后是事务日志。


    在继续之前，让我们通过运行清单 7-2 中所示的脚本来向数据库添加更多数据。请注意，这与清单 7-1 的脚本完全相同。


    ```sql

    DECLARE @cnt INT;

    SET @cnt = 0;

    WHILE @cnt <= 1000

    BEGIN

    INSERT INTO users1 SELECT * FROM users2;

    SET @cnt = @cnt + 1;

    END;

    -- 清单 7-2

    -- 为数据库创建更多数据

    ```


    运行此脚本之前的记录数是 20030000，运行脚本后的记录数是 30040000。现在数据已在表中，继续使用你应在第 1 章创建的 `SQL Server
    Agent` 作业运行完整备份和差异备份。


    接下来，你应该将你的脚本修改为如清单 7-3 所示的样子。


    ```sql

    USE master

    -- 完整数据库还原

    RESTORE DATABASE backrecTestDB

    FROM DISK = N''E:\SQL Server\Backup\backrecTestDB_FULL.bak''

    WITH NORECOVERY, REPLACE

    -- 差异数据库还原

    RESTORE DATABASE backrecTestDB

    FROM DISK = N''E:\SQL Server\Backup\backrecTestDB_DIFFERENTIAL.bak''

    WITH NORECOVERY

    -- 还原日志

    -- 还原上午 7 点的日志

    RESTORE LOG backrecTestDB

    FROM DISK = N''E:\SQL Server\Logs\backrecTestDB_7AM.trn''

    WITH NORECOVERY

    -- 还原上午 8 点的日志

    RESTORE LOG backrecTestDB

    FROM DISK = N''E:\SQL Server\Logs\backrecTestDB_8AM.trn''

    WITH NORECOVERY

    RESTORE DATABASE backrecTestDB WITH RECOVERY

    -- 清单 7-3

    -- 还原脚本

    ```


    在 `SQL Server Management Studio` 中执行清单 7-3 所示的脚本将显示如图 7-14 所示的内容。


    ![脚本结果](img/A436605_1_En_7_Fig14_HTML.jpg)


    *图 7-14：脚本结果*


    我们可以看到，完整备份、差异备份和事务日志备份已成功还原。运行此脚本之前的记录数是 30,040,000，运行脚本后的记录数是 20,030,000。


    那么，我们做到了！我们已成功使用 `SQL Server Management Studio` 和 `Transact-SQL` 还原了事务日志。


    ## 总结


    在本章中，我们学习了 `SQL Server` 中还原过程的各个部分如何协同工作，为恢复数据创建一个可行的解决方案。我们研究了在 `SQL Server Management
    Studio` 中完成此任务所需的界面的不同部分。


    用于事务日志还原的最终脚本作为 `TransactionLogRestore.sql` 在本书的下载中提供。


    在下一章中，我们将把第 5 章到第 8 章学到的所有还原原理整合到一个巨大的还原脚本中。'
- fmt: '# 8. Restore Solution Examples


    In this chapter, we will tie together what we have learned from Chapters [5](#A436605_1_En_5_Chapter.html)
    through [7](#A436605_1_En_7_Chapter.html) into a cohesive structure that we can
    use to create a typical restore scenario. Note that we have not yet touched on
    all concepts of restoring data in the previous chapters; that will be remedied
    in this chapter, since I will focus more on the various conditions and options
    that are shown on the various screens in SSMS and that are available from using
    `sqlcmd`. This chapter will therefore be more of an all-encompassing look at every
    angle of restoring data within SQL Server, from the basic full restore to the
    exact point in time of the transaction log restore.


    One of the most important things to keep in mind when setting up a restore scenario
    is that you need to practice implementing it before it gets put into a production
    environment. You should have step-by-step instructions on how to execute the restore,
    and they should be simple enough that a non-DBA will be able to sit down at a
    server console and successfully execute the restore scenario. I know that this
    seems like a daunting task, but I will help you write this procedure at the end
    of this chapter.


    The first thing that we must do to enforce a restore scenario is define the criteria
    for restoration. We need to come up with a set of situations which would require
    a restore, and then define which type of restore would be best suited to that
    situation. It’s very easy to just say to restore to the latest point in the transaction
    log, because this is probably true for 99% of the situations that we will encounter
    as DBAs. There are situations when this is not the best approach though, and that
    is what we need to prepare for.


    Let’s define a few situations and then the appropriate restore types that we need
    for each situation. In these scenarios, we want to


    - transfer the production database to the development environment for testing

    - recover from a catastrophic error at an unknown point in the previous evening

    - recover data that was overwritten 15 minutes ago

    - make a backup outside of the regular backup schedule that we can use as a “known
    good starting point”


    As you can see, for at least half of these, we can just restore from the last
    transaction log and be done with it. That is the advantage of restoring data (besides
    actually getting your data restored); for the most part, there really isn’t a
    lot of forethought required to restore data. You know that the data resides in
    the backups, so restore the backups. Pretty straightforward, and from there, we
    can keep it as simple or make it as complicated as we need it to be.


    Before we get into building a complete restore scenario, let’s go over some topics
    that didn’t really fit into the previous chapters and certainly deserve a spot
    when discussing restoration of data. Not all restorations are done from the database
    option in Object Explorer, when we would right-click the database name, hover
    over Tasks, then Restore, then select the database option. There are two other
    options in this menu that we haven’t discussed, and those options are “Files and
    Filegroups” and “Page.” What this means is that we can not only restore from the
    database, but also restore the individual files and filegroups, or down to the
    page level.


    ## Page Restores


    With page restores, the important thing to remember is that the `suspect_pages`
    table in the `msdb` database is where the possible corruption information lives.
    The structure of this table is shown in Table [8-1](#A436605_1_En_8_Chapter.html#Tab1).


    Table 8-1 `msdb..suspect_pages` Structure


    | Column Name | Description |

    | --- | --- |

    | `database_id` | ID of the database with the corruption. |

    | `file_id` | ID of the file in the corrupted database. |

    | `page_id` | ID of the page that is suspected to be corrupted. |

    | `event_type` | Number which represents the type of error. Possible values are
    as follows: This is the “catch-all” of error values. This means either an 823
    (due to hardware fault) or 824 error (other database corruption) has occurred.
    Incorrect checksum. Torn page. Restored page (after being flagged as suspect).
    Repaired by DBCC (after being flagged as suspect). Deallocated by DBCC (after
    being flagged as suspect) |

    | `error_count` | Count of the times that the error occurred. |

    | `last_update_date` | Date and time of the entry. |


    There are a few things to keep in mind when wanting to perform page restores.
    For example, you can only restore database pages. That may seem obvious, but the
    implication is that you cannot restore transaction logs or any of the “special”
    pages: specifically, allocation pages, global allocation map pages, shared global
    allocation map pages, and page free space pages. Microsoft uses very precise language
    when they say “only database pages” at [`https://docs.microsoft.com/en-us/sql/relational-databases/backup-restore/restore-pages-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/backup-restore/restore-pages-sql-server),
    in other words.


    ### Querying msdb..suspect_pages


    The `msdb..suspect_pages` table holds the key to telling you which pages are suspected
    to be corrupt, which will hopefully lead you to a solid plan to restore those
    corrupted pages. There probably isn’t anything really damaging yet, but there
    could be in the future, in other words. A lot of times, the database can be repaired
    by general database restore operations, which overwrite pages by default. In the
    case of a database being restored, it is important to realize that, if the corrupted
    page has been backed up to the backup set being restored, then the corrupted data
    will remain until it is fixed.


    Open up a New Query window and type `SELECT * FROM msdb..suspect_pages;` and press
    F5 on your keyboard. When I run this query, I get zero results returned, which
    is a good thing. If I had gotten any results, I would take immediate action as
    shown in Table [8-2](#A436605_1_En_8_Chapter.html#Tab2).


    Table 8-2 Page Restore Actions


    | Step | Description |

    | --- | --- |

    | 1 | Get the `page_id` of the corrupted pages from the `msdb..suspect_pages`
    query output. |

    | 2 | Start a page restore using a full backup, file backup, or filegroup backup
    which contains the corresponding corrupted page. If running from T-SQL and not
    SSMS, use the following syntax: `RESTORE DATABASE <database_id> PAGE = ''<file_id:
    page_id>'' FROM <backup device or file> WITH NORECOVERY` Note that the `database_id`,
    `file_id`, and `page_id` values all come from the `msdb..suspect_pages` query
    run earlier. |

    | 3 | Restore the latest differential backup. |

    | 4 | Restore the relevant transaction log backups. |

    | 5 | Back up the tail of the transaction log. |

    | 6 | Restore the transaction log from Step 5. |


    Following those steps will let you restore the page safely within T-SQL.'
  raw: '# 8. Restore Solution Examples


    In this chapter, we will tie together what we have learned from Chapters [5](#A436605_1_En_5_Chapter.html)
    through [7](#A436605_1_En_7_Chapter.html) into a cohesive structure that we can
    use to create a typical restore scenario. Note that we have not yet touched on
    all concepts of restoring data in the previous chapters; that will be remedied
    in this chapter, since I will focus more on the various conditions and options
    that are shown on the various screens in SSMS and that are available from using
    `sqlcmd`. This chapter will therefore be more of an all-encompassing look at every
    angle of restoring data within SQL Server, from the basic full restore to the
    exact point in time of the transaction log restore.


    One of the most important things to keep in mind when setting up a restore scenario
    is that you need to practice implementing it before it gets put into a production
    environment. You should have step-by-step instructions on how to execute the restore,
    and they should be simple enough that a non-DBA will be able to sit down at a
    server console and successfully execute the restore scenario. I know that this
    seems like a daunting task, but I will help you write this procedure at the end
    of this chapter.


    The first thing that we must do to enforce a restore scenario is define the criteria
    for restoration. We need to come up with a set of situations which would require
    a restore, and then define which type of restore would be best suited to that
    situation. It’s very easy to just say to restore to the latest point in the transaction
    log, because this is probably true for 99% of the situations that we will encounter
    as DBAs. There are situations when this is not the best approach though, and that
    is what we need to prepare for.


    Let’s define a few situations and then the appropriate restore types that we need
    for each situation. In these scenarios, we want to


    *   transfer the production database to the development environment for testing

    *   recover from a catastrophic error at an unknown point in the previous evening

    *   recover data that was overwritten 15 minutes ago

    *   make a backup outside of the regular backup schedule that we can use as a
    “known good starting point”


    As you can see, for at least half of these, we can just restore from the last
    transaction log and be done with it. That is the advantage of restoring data (besides
    actually getting your data restored); for the most part, there really isn’t a
    lot of forethought required to restore data. You know that the data resides in
    the backups, so restore the backups. Pretty straightforward, and from there, we
    can keep it as simple or make it as complicated as we need it to be.


    Before we get into building a complete restore scenario, let’s go over some topics
    that didn’t really fit into the previous chapters and certainly deserve a spot
    when discussing restoration of data. Not all restorations are done from the database
    option in Object Explorer, when we would right-click the database name, hover
    over Tasks, then Restore, then select the database option. There are two other
    options in this menu that we haven’t discussed, and those options are “Files and
    Filegroups” and “Page.” What this means is that we can not only restore from the
    database, but also restore the individual files and filegroups, or down to the
    page level.


    ## Page Restores


    With page restores , the important thing to remember is that the `suspect_pages`
    table in the `msdb` database is where the possible corruption information lives.
    The structure of this table is shown in Table [8-1](#A436605_1_En_8_Chapter.html#Tab1).


    Table 8-1


    msdb..suspect_pages Structure


    | Column Name | Description |

    | --- | --- |

    | database_id | ID of the database with the corruption. |

    | file_id | ID of the file in the corrupted database. |

    | page_id | ID of the page that is suspected to be corrupted. |

    | event_type | Number which represents the type of error. Possible values are
    as follows: This is the “catch-all” of error values. This means either an 823
    (due to hardware fault) or 824 error (other database corruption) has occurred.
    Incorrect checksum. Torn page. Restored page (after being flagged as suspect).
    Repaired by DBCC (after being flagged as suspect). Deallocated by DBCC (after
    being flagged as suspect) |

    | error_count | Count of the times that the error occurred. |

    | last_update_date | Date and time of the entry. |


    There are a few things to keep in mind when wanting to perform page restores.
    For example, you can only restore database pages. That may seem obvious, but the
    implication is that you cannot restore transaction logs or any of the “special”
    pages: specifically, allocation pages, global allocation map pages, shared global
    allocation map pages, and page free space pages. Microsoft uses very precise language
    when they say “only database pages” at [`https://docs.microsoft.com/en-us/sql/relational-databases/backup-restore/restore-pages-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/backup-restore/restore-pages-sql-server)
    , in other words.


    ### Querying msdb..suspect_pages


    The `msdb..suspect``_pages` table holds the key to telling you which pages are
    suspected to be corrupt, which will hopefully lead you to a solid plan to restore
    those corrupted pages. There probably isn’t anything really damaging yet, but
    there could be in the future, in other words. A lot of times, the database can
    be repaired by general database restore operations, which overwrite pages by default.
    In the case of a database being restored, it is important to realize that, if
    the corrupted page has been backed up to the backup set being restored, then the
    corrupted data will remain until it is fixed.


    Open up a New Query window and type `SELECT * FROM msdb..suspect_pages;` and press
    F5 on your keyboard. When I run this query, I get zero results returned, which
    is a good thing. If I had gotten any results, I would take immediate action as
    shown in Table [8-2](#A436605_1_En_8_Chapter.html#Tab2).


    Table 8-2


    Page Restore Actions


    | Step | Description |

    | --- | --- |

    | 1 | Get the page_id of the corrupted pages from the `msdb..suspect_pages` query
    output. |

    | 2 | Start a page restore using a full backup, file backup, or filegroup backup
    which contains the corresponding corrupted page. If running from T-SQL and not
    SSMS, use the following syntax: `RESTORE DATABASE <database_id>` `PAGE = ''<file_id:
    page_id>''` `FROM <backup device or file>` `WITH NORECOVERY` Note that the `database_id`,
    `file_id`, and `page_id` values all come from the `msdb..suspect_pages` query
    run earlier. |

    | 3 | Restore the latest differential backup. |

    | 4 | Restore the relevant transaction log backups. |

    | 5 | Back up the tail of the transaction log. |

    | 6 | Restore the transaction log from Step 5. |


    Following those steps will let you restore the page safely within T-SQL.'
  trans: '# 8. 还原方案示例


    本章中，我们将把第 5 章到第 7 章学到的内容整合成一个连贯的结构，用于创建一个典型的还原场景。请注意，在之前的章节中我们并未涉及数据还原的所有概念；这将在本章中弥补，因为我将更侧重于介绍
    SSMS 中各种屏幕上显示以及通过使用 `sqlcmd` 可用的各种条件和选项。因此，本章将是对 SQL Server 中数据还原的各个角度的一次全面审视，从基本的完整还原到事务日志还原的精确时间点。


    建立还原场景时，要牢记的最重要的事情之一是，在将其投入生产环境之前，你需要**练习实施**。你应该有关于如何执行还原的分步说明，并且这些说明应足够简单，以便非
    DBA 人员也能坐在服务器控制台前成功执行还原场景。我知道这看起来像是一项艰巨的任务，但本章末尾我将帮助你编写此流程。


    执行还原场景必须做的第一件事是定义还原标准。我们需要列出一系列需要还原的情况，然后为每种情况定义最适合的还原类型。直接说还原到事务日志的最新点很容易，因为对于我们
    DBA 来说，大约 99% 的情况可能都是如此。但有些情况下这并不是最佳方法，而这正是我们需要为之准备的。


    让我们定义几种情况，然后是每种情况所需的适当还原类型。在这些场景中，我们希望：


    -   将生产数据库转移到开发环境进行测试

    -   从前一天晚上的未知时间点发生的灾难性错误中恢复

    -   恢复 15 分钟前被覆盖的数据

    -   在常规备份计划之外进行一次备份，作为“已知良好的起点”


    正如你所见，对于至少一半的情况，我们只需从事务日志的最后一次备份进行还原即可完成。这就是数据还原的优势（除了实际恢复数据之外）；在大多数情况下，数据还原确实不需要太多预先规划。你知道数据存在于备份中，所以还原备份就行了。非常直接，从那里开始，我们可以根据需要保持简单或使其变得复杂。


    在开始构建完整的还原场景之前，让我们先回顾一些在前几章中不太适合讨论、但在讨论数据还原时绝对值得一席之地的主题。并非所有的还原都是通过对象资源管理器中的数据库选项完成的（即右键单击数据库名称，悬停在“任务”上，然后选择“还原”，再选择“数据库”选项）。此菜单中还有两个我们尚未讨论的选项，即“文件和文件组”以及“页面”。这意味着我们不仅可以从数据库还原，还可以还原单个文件和文件组，或者细化到页面级别。


    ## 页面还原


    对于页面还原，要记住的重要一点是，`msdb` 数据库中的 `suspect_pages` 表是可能的损坏信息所在的位置。该表的结构如表 8-1 所示。


    表 8-1 `msdb..suspect_pages` 结构


    | 列名 | 描述 |

    | --- | --- |

    | `database_id` | 发生损坏的数据库的 ID。 |

    | `file_id` | 损坏数据库中文件的 ID。 |

    | `page_id` | 疑似损坏的页面的 ID。 |

    | `event_type` | 表示错误类型的数字。可能的值如下：这是一个错误值的“全能”类型。这意味着发生了 823 错误（由于硬件故障）或 824 错误（其他数据库损坏）。校验和不正确。页面已损坏（torn
    page）。已还原的页面（被标记为可疑之后）。已由 DBCC 修复（被标记为可疑之后）。已由 DBCC 释放（被标记为可疑之后）。 |

    | `error_count` | 错误发生的次数。 |

    | `last_update_date` | 条目的日期和时间。 |


    在想要执行页面还原时，有几件事需要牢记。例如，你只能还原数据库页面。这可能看起来很明显，但其含义是你不能还原事务日志或任何“特殊”页面：特别是分配页、全局分配映射页、共享全局分配映射页和页面可用空间页。微软在
    [`https://docs.microsoft.com/en-us/sql/relational-databases/backup-restore/restore-pages-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/backup-restore/restore-pages-sql-server)
    上说“仅限数据库页面”时使用了非常精确的语言。


    ### 查询 msdb..suspect_pages


    `msdb..suspect_pages` 表是告诉你哪些页面被怀疑损坏的关键，希望这能引导你制定一个可靠的计划来还原那些损坏的页面。换句话说，可能还没有什么真正具有破坏性的事情发生，但未来可能会有。很多时候，可以通过常规的数据库恢复操作来修复数据库，这些操作默认会覆盖页面。在数据库被还原的情况下，重要的是要认识到，如果损坏的页面已经被备份到正在还原的备份集中，那么损坏的数据将一直存在，直到被修复。


    打开一个新的查询窗口，输入 `SELECT * FROM msdb..suspect_pages;` 并按键盘上的 F5。当我运行此查询时，返回了零个结果，这是件好事。如果我得到了任何结果，我会立即采取表
    8-2 中所示的行动。


    表 8-2 页面还原操作


    | 步骤 | 描述 |

    | --- | --- |

    | 1 | 从 `msdb..suspect_pages` 查询输出中获取损坏页面的 `page_id`。 |

    | 2 | 使用包含相应损坏页面的完整备份、文件备份或文件组备份开始页面还原。如果从 T-SQL 而非 SSMS 运行，请使用以下语法：`RESTORE DATABASE
    <database_id> PAGE = ''<file_id: page_id>'' FROM <backup device or file> WITH
    NORECOVERY` 请注意，`database_id`、`file_id` 和 `page_id` 值均来自先前运行的 `msdb..suspect_pages`
    查询。 |

    | 3 | 还原最新的差异备份。 |

    | 4 | 还原相关的事务日志备份。 |

    | 5 | 备份事务日志的尾部。 |

    | 6 | 还原步骤 5 中的事务日志。 |


    按照这些步骤操作，你就可以在 T-SQL 中安全地还原页面了。'
- fmt: "## Complete Database Restore Using T-SQL\n\nRecall that since we are working\
    \ in the full recovery model, we have a lot more functionality at our disposal\
    \ for backing up and restoring data. Particularly, we have granular control over\
    \ how much or how little data we want to restore based on the current situation.\
    \ The full recovery model allows us to restore the entire database, if needed,\
    \ and more importantly, it can be restored to a specific point in time, as we\
    \ saw in Chapter [5](#A436605_1_En_5_Chapter.html).\n\nThere is a basic set of\
    \ instructions to follow when restoring a database in the full recovery model.\
    \ The general set of instructions is shown in Listing [8-1](#A436605_1_En_8_Chapter.html#Par18).\n\
    \n### Listing 8-1. Database Restore Instructions\n\n*   Switch to the master database.\n\
    *   Create a tail-log backup using `BACKUP LOG backrecTestDB TO DISK = 'E:\\SQL\
    \ Server\\Logs\\backrecTestDB_TLOG_TAIL.bak' WITH NORECOVERY;`\n    *   SSMS Response:\
    \ `Processed 18 pages for database 'backrecTestDB', file 'backrecTestDB_log' on\
    \ file 1. BACKUP LOG successfully processed 18 pages in 0.069 seconds (1.981 MB/sec).`\n\
    *   Restore the latest full backup using `RESTORE DATABASE backrecTestDB FROM\
    \ DISK = 'E:\\SQL Server\\Backup\\backrecTestDB_FULL.BAK' WITH NORECOVERY;`\n\
    \    *   SSMS Response: `Processed 107968 pages for database 'backrecTestDB',\
    \ file 'backrecTestDB' on file 1. Processed 2 pages for database 'backrecTestDB',\
    \ file 'backrecTestDB_log' on file 1. RESTORE DATABASE successfully processed\
    \ 107970 pages in 21.669 seconds (38.927 MB/sec).`\n*   Restore the latest differential\
    \ backup using `RESTORE DATABASE backrecTestDB FROM DISK = 'E:\\SQL Server\\Backup\\\
    backrecTestDB_DIFF.BAK' WITH NORECOVERY;`\n    *   SSMS Response: `Processed 136\
    \ pages for database 'backrecTestDB', file 'backrecTestDB' on file 1. Processed\
    \ 2 pages for database 'backrecTestDB', file 'backrecTestDB_log' on file 1. RESTORE\
    \ DATABASE successfully processed 138 pages in 0.283 seconds (3.795 MB/sec).`\n\
    *   Restore the oldest transaction log backup from the latest differential backup\
    \ using `RESTORE LOG backrecTestDB FROM DISK = 'E:\\SQL Server\\Logs\\backrecTestDB_backup_2017_10_16_190004_6842741.trn'\
    \ WITH NORECOVERY;`\n    *   SSMS Response: `Processed 0 pages for database 'backrecTestDB',\
    \ file 'backrecTestDB' on file 1. Processed 16 pages for database 'backrecTestDB',\
    \ file 'backrecTestDB_log' on file 1. RESTORE LOG successfully processed 16 pages\
    \ in 0.059 seconds (2.118 MB/sec).`\n*   Continue restoring transaction log backups\
    \ until you recover to the point of failure.\n    *   SSMS Response: `Processed\
    \ 0 pages for database 'backrecTestDB', file 'backrecTestDB' on file 1. Processed\
    \ 8 pages for database 'backrecTestDB', file 'backrecTestDB_log' on file 1. RESTORE\
    \ LOG successfully processed 8 pages in 0.047 seconds (1.329 MB/sec).`\n*   Recover\
    \ the database using `RESTORE DATABASE backrecTestDB WITH RECOVERY;`\n    *  \
    \ SSMS Response: `RESTORE DATABASE successfully processed 0 pages in 0.873 seconds\
    \ (0.000 MB/sec).`\n\nNote that I am using false names in the `DISK` attributes\
    \ of these instructions. This is so it is easier for you to understand which backup\
    \ I am looking for in a set of backups.\n\nIf you notice in the SSMS Response\
    \ bullets in Listing [8-1](#A436605_1_En_8_Chapter.html#Par18), in the transaction\
    \ log restore portion, I restored the first log after the differential backup\
    \ was restored, and then I restored the next log after that, which is when I got\
    \ the message that `0` pages were processed, which means that I’m at the end of\
    \ the applicable transaction logs. Now, there could be more to be restored after\
    \ this log was restored, but in this case, that is the end of the data that needed\
    \ to be restored. In a real-world scenario, you would have a specific time of\
    \ day that you would need to restore data to so keep in mind that you may need\
    \ to restore more logs than are shown in the example. Simply rewrite the script\
    \ for the transaction log restores that you need.\n\nWith these instructions in\
    \ mind, a good restore script can be pieced together as shown in Listing [8-2](#A436605_1_En_8_Chapter.html#Par35).\n\
    \n### Listing 8-2. Restore Script\n\n```sql\n-- switch to master database\nUSE\
    \ master\nGO\n-- backup the tail of the log\nBACKUP LOG backrecTestDB\nTO DISK\
    \ = 'E:\\SQL Server\\Logs\\backrecTestDB_TLOG_TAIL.bak'\nWITH NORECOVERY;\nGO\n\
    -- restore the Full backup\nRESTORE DATABASE backrecTestDB FROM DISK = 'E:\\SQL\
    \ Server\\Backup\\backrecTestDB_backup_2017_10_16_000002_2492163.bak'\nWITH NORECOVERY;\n\
    GO\n-- restore the Differential backup\nRESTORE DATABASE backrecTestDB FROM DISK\
    \ = 'E:\\SQL Server\\Backup\\backrecTestDB_backup_2017_10_16_180001_7394135.bak'\n\
    WITH NORECOVERY;\nGO\n-- restore the Transaction Log backups\nRESTORE LOG backrecTestDB\
    \ FROM DISK = 'E:\\SQL Server\\Logs\\backrecTestDB_backup_2017_10_16_190004_6842741.trn'\n\
    WITH NORECOVERY;\nGO\nRESTORE LOG backrecTestDB FROM DISK = 'E:\\SQL Server\\\
    Logs\\backrecTestDB_backup_2017_10_16_200001_9609626.trn'\nWITH NORECOVERY;\n\
    GO\nRESTORE DATABASE backrecTestDB WITH RECOVERY;\nGO\n```\n\nOnce you have run\
    \ the script shown in Listing [8-2](#A436605_1_En_8_Chapter.html#Par35), you can\
    \ always run the script shown in Listing [8-3](#A436605_1_En_8_Chapter.html#Par37)\
    \ to verify that your database is back online.\n\n### Listing 8-3. Database Status\
    \ Verification\n\n```sql\nSELECT databasepropertyex ('backrecTestDB', 'Status');\n\
    ```\n\nThat should return just the value `ONLINE` in the Results page of SSMS.\
    \ Once you see this, then you can be assured that everything has been restored\
    \ successfully and your database is running smoothly."
