    ## 什么是差异备份？


    差异备份捕获自上次执行完整备份（也称为 `differential base`）以来数据库中所有已更改的数据。与完整备份类似，差异备份包含事务日志数据，可以备份整个数据库，或者备份特定文件和文件组。与完整备份不同的是，差异备份要成功执行，必须满足对其他备份类型的依赖条件。


    多年来，我有不少同事将差异备份与增量备份混为一谈；这是一个常见的误解，并且可能给数据库管理员带来麻烦。一般来说，增量备份是自上次任何类型备份（完整或差异）以来已更改数据的备份。差异备份则是自上次基准备份以来已更改数据的备份。区别在哪里？在这个语境中，“基准”这个词至关重要。增量备份会备份自上次备份（无论是完整备份还是增量备份）以来任何更改的数据。差异备份则持续捕获自上次**完整备份**以来所有已更改的数据，无论中间执行了多少次差异备份。考虑到这一点，我们来看看差异备份的依赖关系。


    ### 差异备份的依赖关系


    差异备份有一个主要的依赖项——完整备份。如果在差异备份之前未成功执行完整备份，那么差异备份将无法执行。


    **注意**

    `COPY_ONLY` 备份的执行无法满足完整备份的依赖项。只有在差异备份之前进行的传统完整备份才有效。这并非说传统完整备份完成后不能进行 `COPY_ONLY`
    备份，而是说传统完整备份是必需的。


    ## 为何使用差异备份？


    当我实施一个使用差异备份的备份策略时，通常会被问到的第一个问题是：“既然有事务日志备份，差异备份的意义何在？它不是只会占用更多磁盘空间吗？” 这个问题通常来自基础设施团队的成员；往往是存储区域网络管理员。我提到这个并不是要为难他们，提出这些问题是他们的职责；我提及此事是为了说明，你的备份策略在某个时候总会受到质疑，人们会问你为何选择这条路径。


    不过，核心问题仍然是：为何要使用差异备份，而不是完全依赖事务日志备份？答案可以用一个词概括……风险。


    我认为，数据库管理员最重要的职责就是保护数据。当然，性能、安全和维护都非常重要，不容忽视。然而，对于任何现代组织的成功而言，数据的完整性和可恢复性至关重要。这正是差异备份提供最大价值的地方——降低数据恢复的风险。我在我的每一本书中都强调了这一点，仅仅是因为作为数据库管理员，没有比这更重要的任务了；如果不严格遵守备份和恢复实践，我们的数据将完全处于脆弱和暴露的状态。这不是一种可接受的方法。为了降低这种风险，我们需要为不可避免的事情做好准备，而最好的方法就是制定一个可靠的备份和恢复计划。


    差异备份通过简化备份链来降低风险。每次执行差异备份时，你都无需再处理自上次完整备份以来到执行差异备份之间所产生的所有事务日志备份。恢复过程中每一个必需的文件，都意味着多一个出错的机会。


    ### 无差异备份的场景


    让我们回顾一个未部署差异备份的场景。在此场景中，你是一个数据库管理员，所在环境的最大数据丢失容忍时间为 30 分钟。处理此问题的最简单方法是设置一个事务日志备份（详见第
    3 章），在每晚的完整备份之后每 30 分钟执行一次，如图 2-1 所示。


    ![A436605_1_En_2_Fig1_HTML.jpg](img/A436605_1_En_2_Fig1_HTML.jpg)

    *图 2-1：无差异备份的备份策略*


    继续前面的场景，想象在晚上 11:47，当天最后一次事务日志备份完成后，数据库服务器崩溃了。重启后，SQL 实例恢复正常运行，但你发现数据库处于不可恢复的状态，剩下的唯一选择是从备份中恢复数据库。看起来很简单，对吧？你首先恢复完整备份，然后开始恢复
    47 个事务日志备份文件。但在处理第 27 号文件（下午 1:31 的备份）时遇到了错误；该文件已损坏，无法恢复。这导致超过十小时的数据无法恢复并丢失。


    ### 运行差异备份的场景


    现在让我们回顾一个部署了差异备份的场景，使用与之前相同的条件。基于相同的场景，使用差异备份，你设置一个事务日志备份（同样，详见第 3 章），在每晚完整备份之后每
    30 分钟执行一次。此外，你还添加了一个每三小时执行一次的差异备份，如图 2-2 所示。


    ![A436605_1_En_2_Fig2_HTML.jpg](img/A436605_1_En_2_Fig2_HTML.jpg)

    *图 2-2：包含差异备份的备份策略*


    遵循相同的场景，数据库服务器在晚上 11:47 当天最后一次事务日志备份完成后崩溃。重启后，SQL 实例恢复运行，但你发现数据库处于不可恢复的状态，剩下的唯一选择是从备份中恢复数据库。这一次，你的工作轻松多了：你首先恢复完整备份，然后恢复晚上
    9:01 执行的差异备份，接着只需恢复五个事务日志备份文件。结果是数据库完全恢复，仅丢失了两分钟的数据。这是因为能够跳过晚上 9:01 差异备份之前的整个事务日志文件。这意味着损坏的数据被排除在外，我们得到了一个干净的数据库副本，更重要的是，数据库没有损坏，并且数据损失量大大减少。


    **注意**

    我们将在第 5、6 和 7 章详细介绍如何恢复数据库。

    '
- fmt: '# Adding Differential Backups to a Backup Solution


    Adding differential backups to an existing backup solution is as easy as adding
    a single additional step to an existing backup solution. The frequency of the
    differential backup will depend on a number of factors; examples of such factors
    include how much your database relies on transactional data, whether these transactions
    contain changes to data, the frequency of your transaction log backups, and the
    frequency of your full backups. As you can see, this is a fairly complex topic,
    and will be covered in Part III of this book; however, for the sake of simplicity,
    we will use the scenarios in the previous section as the basis for sample backup
    strategies highlighting the difference between having differential backups in
    a backup solution. Table [2-1](#A436605_1_En_2_Chapter.html#Tab1) shows the breakdown
    of a simple backup strategy without differentials, and Table [2-2](#A436605_1_En_2_Chapter.html#Tab2)
    shows the same time frame with differentials.


    Table 2-2

    Sample Backup Strategy with Differentials


    |   | Start Time | Frequency | Total Files (24 hours) |

    | --- | --- | --- | --- |

    | Full Backup | Every 24 hours | Every 24 hours | 1 |

    | Diff Backup | 3:01 am | Every 3 hours | 7 |

    | T-Log Backup | 12:15 am | Every 30 minutes | 48 |


    Table 2-1

    Sample Backup Strategy without Differentials


    |   | Start Time | Frequency | Total Files (24 hours) |

    | --- | --- | --- | --- |

    | Full Backup | Every 24 hours | Every 24 hours | 1 |

    | T-Log Backup | 12:30 am | Every 30 minutes | 47 |


    As I stressed previously, adding differential backups to a backup strategy reduces
    risk at the expense of disk space. Let’s look at some file and data loss comparisons
    using the two preceding solutions.


    Table [2-3](#A436605_1_En_2_Chapter.html#Tab3) shows a comparison of the two basic
    backup solutions detailed previously. This figure compares the number of files
    required to restore the database to the latest point in time possible, in addition
    to giving the amount of data loss in minutes.


    Table 2-3

    Required Files for Restore


    | Differential Backups without Differentials |

    | --- |

    | Outage Time | Full File(s) | Diff File(s) | T-Log File(s) | Total Files | Data
    Loss (m) |

    | --- | --- | --- | --- | --- | --- |

    | 2:00 am | 1 | 0 | 3 | 4 | 29 |

    | 6:00 am | 1 | 0 | 11 | 12 | 29 |

    | 12:30 pm | 1 | 0 | 24 | 25 | 29 |

    | 11:57 pm | 1 | 0 | 47 | 48 | 26 |

    | Differential Backups with Differentials |

    | Outage Time | Full File(s) | Diff File(s) | T-Log File(s) | Total Files | Data
    Loss (m) |

    | 2:00 am | 1 | 0 | 4 | 5 | 15 |

    | 6:00 am | 1 | 1 | 6 | 8 | 15 |

    | 12:30 pm | 1 | 1 | 1 | 3 | 15 |

    | 11:57 pm | 1 | 1 | 6 | 8 | 12 |


    As you can see, by adding differentials into the backup solution, the number of
    files required will never exceed eight (one full, one diff, and six transaction
    logs). So an outage late in the day would have an 83% reduction in require files
    for a restore, reducing your overall risk significantly.


    It is important to note that if one of the differential backups becomes corrupted
    at this point, we can still use the transaction logs to restore to the same point
    in time.


    # Preparing for a Differential Backup


    Continuing to use the database we created in Chapter [1](#A436605_1_En_1_Chapter.html),
    `backrecTestDB`, lets prepare for a differential backup. Because this is a test
    database and has had no data change for quite a while, kicking off a differential
    backup right now will have very little effect. It would create a 1KB backup file
    that could be restored; however, for testing purposes, that is not very useful.
    So instead, let’s create a quick script that creates a new table and copies a
    few rows into it.


    The new table can be created by running the following script:


    ```sql

    SELECT TOP 500000 * INTO [users_DiffTestData]

    FROM [users1]

    ```


    When the script completes, you should see the following output:


    ```

    (500000 row(s) affected)

    ```


    Finally, the last thing we want to do is validate that the table we created is
    correct. Of course, we could have specified the database in the `SELECT INTO`
    script; however, for this test, I would rather us check by hand.


    In the object viewer panel, right-click the `backrecTestDB` and select `Refresh`.
    Next, expand the database, followed by expanding tables. You should see three
    tables listed, as shown in Figure [2-3](#A436605_1_En_2_Chapter.html#Fig3).


    ![A436605_1_En_2_Fig3_HTML.jpg](A436605_1_En_2_Fig3_HTML.jpg)

    Figure 2-3

    Object Explorer showing tables Note


    The previous step assumes you followed the steps in Chapter [1](#A436605_1_En_1_Chapter.html):
    created the test database, built the tables and inserted data, and took a full
    backup. If any of those steps were skipped, you must turn back to Chapter [1](#A436605_1_En_1_Chapter.html)
    and complete them prior to running the preceding script.


    Once this script is complete and we have validated that the new table exists,
    we are ready to kick off a differential backup.


    # Running a Differential Backup


    Like most things in Microsoft’s world, there are numerous ways you can execute
    a differential backup. If the backup was part of your backup strategy, the execution
    of the differential backup would be part of the solution (e.g., part of the SQL
    maintenance plan or a separate stand-alone `SQL Server Agent` job). If you were
    manually executing the backup, you could fire it off from within the `GUI` of
    `SQL Server Management Studio (SSMS)`, use `T-SQL` and script it out, or even
    use `PowerShell` to start the backup.


    In this chapter, I am going to walk you through using the `GUI` in `SSMS` and
    using `T-SQL`. The end result will be the same in both cases: we will end up with
    a differential backup that can be restored to the database successfully. Using
    `PowerShell` here would be a great idea; however, it is a topic of its own and
    deserves far more attention than I can give it here.


    ## Taking a Backup via the GUI in SSMS


    Taking a differential backup with `SSMS` via the `GUI` is identical to taking
    a full backup. Because of this, I will not go over all the options in the `GUI`;
    instead I will cover just the differences required to change the backup from a
    full to a differential.


    A differential backup can be completed in six easy steps:


    *   Right-click `backrecTestDB`

    *   Hover over `Tasks` and click `Back Up…`

    *   On the `General` screen click, the `Backup Type` drop-down and select `Differential`

    *   Under `Destination`, click `Remove`, then `Add`

    *   In the `File Name` text box, enter `“E:\SQL Server\Backup\backrecTestDB_diff.bak”`
    and click `OK`

    *   Back on the `General` tab, click `OK`


    Figure [2-4](#A436605_1_En_2_Chapter.html#Fig4) shows the backup `General` tab
    configured for a differential backup set with the correct configuration.


    ![A436605_1_En_2_Fig4_HTML.jpg](A436605_1_En_2_Fig4_HTML.jpg)

    Figure 2-4

    Differential backup settings


    Once the final `OK` is pressed, you will see a progress percentage on the bottom
    left of the `“Back Up Database”` window. Because we only duplicated 500,000 rows
    into the new table, the backup will complete in a few seconds. A completion window
    will pop up, confirming that the backup was successful, as in Figure [2-5](#A436605_1_En_2_Chapter.html#Fig5).


    ![A436605_1_En_2_Fig5_HTML.jpg](A436605_1_En_2_Fig5_HTML.jpg)

    Figure 2-5

    Backup complete window'
