  trans: '

    ### 常规选项卡


    此选项卡无需更改。我们保留了从作业创建的维护计划部分继承的默认设置，因此目前可以直接使用这些设置。图 10-13 显示了带有默认值的“常规”选项卡。


    ![A436605_1_En_10_Fig13_HTML.jpg](img/A436605_1_En_10_Fig13_HTML.jpg)

    图 10-13 作业属性，常规选项卡


    点击左侧的“步骤”菜单选项以继续。


    ### 步骤选项卡


    “步骤”选项卡的默认设置也很好（图 10-14）。我们可以保持这些设置不变，因为它们正是我们需要的配置方式。请注意，我们目前不会深入探讨该步骤的具体细节。如果您需要关于此步骤可执行的各种选项的更多解释，请参阅第
    9 章，我在其中详细介绍了此区域内的每一个选项。


    ![A436605_1_En_10_Fig14_HTML.jpg](img/A436605_1_En_10_Fig14_HTML.jpg)

    图 10-14 作业属性，步骤选项卡


    点击“计划”选项卡以继续。


    ### 计划选项卡


    此选项卡允许我们为作业设置计划。幸运的是，此区域也已经设置好了！图 10-15 显示了此屏幕的默认设置。


    ![A436605_1_En_10_Fig15_HTML.jpg](img/A436605_1_En_10_Fig15_HTML.jpg)

    图 10-15 作业属性，计划选项卡


    接下来点击“警报”选项卡以检查这些设置。


    ### 警报选项卡


    此选项卡为空白，因为我们没有为此作业使用任何警报。请直接跳转到下一个“通知”选项卡。


    ### 通知选项卡


    与完整备份计划类似，我希望如果此计划失败，我能收到电子邮件通知。为了实现这一点，我首先需要设置一个操作员，然后必须在此区域启用并正确配置通知。图 10-16
    显示了您所在区域应更新的值。


    ![A436605_1_En_10_Fig16_HTML.jpg](img/A436605_1_En_10_Fig16_HTML.jpg)

    图 10-16 作业属性，通知选项卡


    这就是本节的结尾。我们已成功设置了差异备份作业。请继续点击“确定”以进入下一节。


    ## 测试差异备份计划


    第 9 章让我们创建了完整备份计划，然后进行了测试。如果您跟随操作，您的计划应该也已成功测试。接下来，我们只想运行计划中的差异备份部分，但在开始之前，我们需要确定计划的退出标准。在此示例中，清单
    10-2 详细说明了我们将要寻找的退出标准。


    清单 10-2. 退出标准

    *   作业正确启动且无错误

    *   备份文件创建在正确位置

    *   如果发生错误，则发送通知

    *   Windows 事件日志记录了备份操作

    *   作业正确退出且无错误


    考虑到这一点，请右键单击 `备份计划.差异备份 SQL Server 代理作业`（记住，我们稍后会更改名称）并选择 `从步骤开始作业…` 来运行作业。您也可以打开文件位置，以验证文件是否按预期写入，并同时打开事件查看器，以便查看
    Windows 事件日志中是否添加了新条目。


    最终，会出现如图 10-17 所示的窗口，显示我们的作业已成功。


    ![A436605_1_En_10_Fig17_HTML.jpg](img/A436605_1_En_10_Fig17_HTML.jpg)

    图 10-17 启动作业成功


    我还在 Windows 事件查看器的应用程序日志中收到了一个条目，其详细信息如图 10-18 所示。


    ![A436605_1_En_10_Fig18_HTML.jpg](img/A436605_1_En_10_Fig18_HTML.jpg)

    图 10-18 事件属性


    我还检查了文件位置，新的差异备份已创建。因此，我们可以安全地认为该计划运行正常。


    ## 在 SSMS 中创建差异还原计划


    我们将使用 SQL Server Agent 在 SSMS 中创建差异还原计划，就像我们在第 9 章中处理完整还原计划一样。我们将遵循相同的基本指令集，只是在涉及还原类型的地方有所不同。清单
    10-3 将详细说明我们需要采取的步骤，以确保我们的差异还原计划正确执行。


    我们计划实施此操作的基本结构很简单，如清单 9-12 所示。


    清单 10-3. 还原数据的结构

    *   配置 `RESTORE DATABASE` 命令

    *   创建 T-SQL 类型的 SQL Server Agent 作业

    *   创建自上次完整备份以来最新的差异备份副本，并将其重命名为 `backrecTestDB_DIFFERENTIAL.bak`

    *   正常还原数据


    现在我们有了如何推进的计划，让我们开始创建此计划。


    ### T-SQL 还原命令


    在此示例中，我们将使用清单 10-4 中所示的 T-SQL 命令。


    ```sql

    RESTORE DATABASE backrecTestDB

    FROM DISK = N''E:\SQL Server\Backup\backrecTestDB_FULL.bak''

    WITH NORECOVERY, REPLACE;

    RESTORE DATABASE backrecTestDB

    FROM DISK = N''E:\SQL Server\Backup\backrecTestDB_DIFFERENTIAL.bak''

    WITH RECOVERY;

    ```

    清单 10-4 `RESTORE DATABASE` 命令


    回想一下，`NORECOVERY` 属性允许我们指定正在还原最后一个完整备份，然后是差异备份。如果不首先还原最近的完整备份，就无法还原差异备份，因此我们需要先运行完整还原，然后再运行差异还原。为此，我们包含了清单
    10-4 中所示的完整还原语法以及差异还原语法，以正确还原数据库。请注意，这两条命令由分号分隔；这表示我们将在两个独立的 SQL Server Agent
    作业步骤中使用这些命令，如下一节所示。

    '
- fmt: '### SQL Server Agent Restore Job


    For this section, we will start by creating a new SQL Server Agent job. Expand
    `SQL Server Agent` and right-click `Jobs`, then select `New Job…` to continue.
    Once the New Job window opens, update the window with the values shown in Figure
    [10-19](#A436605_1_En_10_Chapter.html#Fig19).


    ![A436605_1_En_10_Fig19_HTML.jpg](A436605_1_En_10_Fig19_HTML.jpg)


    Figure 10-19: New Job, General tab


    I want to reiterate that your values will be different from mine, as far as the
    owner value goes, in this instance. There are probably a lot of instances where
    your specific user accounts will be different from mine, so the instructions I
    give should be used conceptually and not in the literal sense. This may be obvious
    to most, but I wanted to spell that out in case there was any confusion.


    Next, we want to select the `Steps` tab. In this area, we want to click the `New…`
    button to open the New Job Step screen and create a new step for the job. The
    first step that we need to create is the full restore task, and the second task
    we need is the differential restore. Update the New Job Step screen as shown in
    Figure [10-20](#A436605_1_En_10_Chapter.html#Fig20) to create the full restore
    portion of the plan.


    ![A436605_1_En_10_Fig20_HTML.jpg](A436605_1_En_10_Fig20_HTML.jpg)


    Figure 10-20: New Job Step, General tab


    Next, click the `Advanced` tab to show the options in that area. We only want
    to select the `Log to table` and `Include step output in history` check boxes
    here; the rest of the options can stay as they are by default. Figure [10-21](#A436605_1_En_10_Chapter.html#Fig21)
    shows the screen as it should look with updated values.


    ![A436605_1_En_10_Fig21_HTML.jpg](A436605_1_En_10_Fig21_HTML.jpg)


    Figure 10-21: New Job Step, Advanced tab


    When you have those values set, click the `OK` button to close this window and
    return you to the New Job window. We can now see the full restore step listed
    as Step 1.


    We need to create the differential restore step now, so click the `New…` button
    again to open a fresh instance of the New Job Step window. On this screen, we
    are going to enter the information as shown in Figure [10-22](#A436605_1_En_10_Chapter.html#Fig22)
    to get the differential step set up.


    ![A436605_1_En_10_Fig22_HTML.jpg](A436605_1_En_10_Fig22_HTML.jpg)


    Figure 10-22: New Job Step, General tab


    That is the same T-SQL command that we referenced earlier, so we can safely assume
    that it will execute successfully.


    Note: Notice that we are using the `WITH NORECOVERY` command for the full backup
    step and the `WITH RECOVERY` command for the differential backup step. This is
    because the full backup step is going to be immediately followed by the differential
    backup step, and we are telling the database that we want to keep the database
    in the `Restoring…` state until we restore the differential backup step, and then
    put the database back online with the `WITH RECOVERY` command in the differential
    backup step.


    Click the `Advanced` tab now, and update it just as we did in Figure [10-21](#A436605_1_En_10_Chapter.html#Fig21)
    earlier. When you have updated the Advanced tab with these options, go ahead and
    click the `OK` button to return to the New Job screen shown in Figure [10-23](#A436605_1_En_10_Chapter.html#Fig23).


    ![A436605_1_En_10_Fig23_HTML.jpg](A436605_1_En_10_Fig23_HTML.jpg)


    Figure 10-23: New Job, updated


    We can now see that the full restore job is step 1, and the differential restore
    is step 2. We can also see that step 1 will move to step 2 on success, which is
    what we wanted to do as well. That way, the job continues instead of relying on
    human interaction. After all, the point of these exercises is to increase automation
    within `SQL Server`, not to make our jobs more cumbersome.


    We don’t need to access the `Schedules` or `Alerts` tabs, so skip over to the
    `Notifications` tab next. We want to select the `E-mail` and `Write to the Windows
    Application event log` check boxes, and then choose the Operator you should have
    set up in the drop-down menu next to the `E-mail` check box. The completed values
    are shown in Figure [10-24](#A436605_1_En_10_Chapter.html#Fig24).


    ![A436605_1_En_10_Fig24_HTML.jpg](A436605_1_En_10_Fig24_HTML.jpg)


    Figure 10-24: New Job, Notifications tab


    When your screen matches what is shown in Figure [10-24](#A436605_1_En_10_Chapter.html#Fig24),
    just click the `OK` button to return to the main SSMS window. The `SQL Server
    Agent` Job has been successfully created, and the `Jobs` submenu under `SQL Server
    Agent` in Object Explorer has now been updated as shown in Figure [10-25](#A436605_1_En_10_Chapter.html#Fig25).


    ![A436605_1_En_10_Fig25_HTML.jpg](A436605_1_En_10_Fig25_HTML.jpg)


    Figure 10-25: Jobs submenu


    We are now ready to move on to the next section.


    ### Copy and Rename Current Backup


    My backup location, `E:\SQL Server\Backup`, has stayed the same for quite a few
    years, and will probably stay the same until I stop using `SQL Server`. I suppose
    the reason for this is because it is never really a good idea to store backups
    on the `C:` drive, and the `D` drive was usually a `CD-ROM` or `DVD` drive, so
    the physical storage I had available was the `E:` drive. However this works out
    for you, just be sure that you are not storing your backups on the boot drive
    and you’ll be fine.


    Navigate to your backup location and find the latest differential backup taken.
    We need to make a copy of this file and rename it to `backrecTestDB_DIFFERENTIAL.bak`.
    Once you have copied and renamed that backup, we are ready to execute the backup
    and see if it works.


    Let’s make a quick change to the database so that we have something to restore.
    Remember when we dropped the `users1` table? Let’s do that again. That should
    give us a decent amount of data to restore. Note that I would normally recommend
    that we use transaction log restores to get this data back, but we aren’t quite
    there yet, and this method will work for what we need to have demonstrated.


    ### Restore Data


    Right-click the `Differential Restore` `SQL Server Agent` job and select `Start
    Job at Step…` to execute the job. We are presented with a window shown in Figure
    [10-26](#A436605_1_En_10_Chapter.html#Fig26).


    ![A436605_1_En_10_Fig26_HTML.jpg](A436605_1_En_10_Fig26_HTML.jpg)


    Figure 10-26: Start Job at Step… screen


    Select the first step, `Full Restore`, and click the `Start` button. Eventually,
    we are shown the success message shown in Figure [10-27](#A436605_1_En_10_Chapter.html#Fig27).


    ![A436605_1_En_10_Fig27_HTML.jpg](A436605_1_En_10_Fig27_HTML.jpg)


    Figure 10-27: Start Jobs success


    At this point, our database has had the full backup and differential backup applied.
    Next, we need to verify that the plan restored data correctly, so run the Backup
    and Restore Events report that we ran earlier to verify. To run this report, right-click
    your database, go to `Reports`, and then click the `Backup and Restore Events`
    item. Once there, you should see the top two items very similar to what is shown
    in Figure [10-28](#A436605_1_En_10_Chapter.html#Fig28).


    ![A436605_1_En_10_Fig28_HTML.jpg](A436605_1_En_10_Fig28_HTML.jpg)


    Figure 10-28: Successful restore operations


    This tells us that the first operation was the bottom one, and the last operation
    was the top one. The first operation was the full restore (we can tell because
    it says the Mode was “No recovery”) and the second operation was the differential
    restore.


    Another way that I can tell that the database was restored correctly is that the
    `users1` table has been restored to the Tables list. The Application event log
    also shows the entry, so I am assuming that the differential restore operation
    was a success.'
