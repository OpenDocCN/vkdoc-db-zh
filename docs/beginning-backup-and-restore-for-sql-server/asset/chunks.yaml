    ![A436605_1_En_1_Fig5_HTML.jpg](A436605_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Shrink Files option


    Initially, you should see what is shown in Figure [1-6](#A436605_1_En_1_Chapter.html#Fig6).


    ![A436605_1_En_1_Fig6_HTML.jpg](A436605_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Shrink File (Data)


    This page shows us that we can select the file type, the filegroup, and the file
    name for our backup. What is important is that this isn’t the transaction log
    though; this is for the .mdf file, which is the master data file.


    Pull down the File type menu and select Log from the options. The interface changes
    slightly and you are then shown what is in Figure [1-7](#A436605_1_En_1_Chapter.html#Fig7).


    ![A436605_1_En_1_Fig7_HTML.jpg](A436605_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Shrink File (Log)


    Now, we can see that this is the transaction log. This interface tells us that
    we have 584MB currently allocated for the transaction log, with 178.11MB available.
    That means that around 406MB is being used by the transaction log right now. That’s
    not enormous, but it does leave only 30% of the currently allocated space for
    the transaction log to grow.


    At this point, we can do one of two things: we could run a full backup, which
    will shrink the transaction log, or we could run a transaction log backup, which
    will also obviously back up the transaction log. For the purpose of this demonstration,
    I am going to run a full backup on the database and show what happens to the size
    of this transaction log.


    #### Manually Backing Up the Database


    Keep the screen shown in Figure [1-7](#A436605_1_En_1_Chapter.html#Fig7) open
    for now, but switch back to the Back Up Database screen last shown in Figure [1-4](#A436605_1_En_1_Chapter.html#Fig4).
    Here, we can see that the full backup type is selected, and the recovery model
    is set to FULL as well, with this option unavailable to change. We also have the
    backup component option, which lets us choose between backing up the database
    or just the files or filegroups. Leave the default option of Database selected
    here. Next, we have the option to back up to either disk or URL.


    Note


    The Back Up to URL option is new in SQL Server 2016, and is specifically for connectivity
    either to an Azure instance or to a remote URL for backup storage.


    Note that the Disk option is selected by default, and the default location is
    automatically filled in for us here. That’s because, when I installed SQL Server
    2016, I defined the locations for the logs and backups. Take the time during installation
    to take care of all that, and it works out much better for you in the long run.
    The location specified in the location window is a valid location, and there is
    not a backup with that name in the file location, so this is going to be a brand-new
    backup; we aren’t appending to an existing backup, in other words. You could click
    the Add button and choose another name, or click the Remove button to clear out
    the current option, but we’ll keep it just like it is now and click OK. The options
    on the other tabs here aren’t particularly relevant at this point, but they could
    be used later on for specific purposes as needed for your installation.


    Once you click OK, a progress bar gives a percent status until we finally see
    what is shown in Figure [1-8](#A436605_1_En_1_Chapter.html#Fig8).


    ![A436605_1_En_1_Fig8_HTML.jpg](A436605_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Backup successful


    Now, let’s go back to the Shrink File screen we had up a bit ago, as shown in
    Figure [1-7](#A436605_1_En_1_Chapter.html#Fig7). Click the File type menu again,
    choose Data, and then choose Log from the same menu again. This basically refreshes
    the data; I suppose you could accomplish this same result by closing and reopening
    this window. Once the interface refreshes, we can see what is shown in Figure
    [1-9](#A436605_1_En_1_Chapter.html#Fig9).


    ![A436605_1_En_1_Fig9_HTML.jpg](A436605_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Transaction log shrunk


    The value for available free space has gone up to 569.27MB, or 97% available.
    That means that this single backup operation freed up 67% of our available space
    for the transaction log.


    ## Summary


    This chapter walked us through an introduction to full backups, and then gave
    a brief demonstration of how to manually run a full backup of a database.


    We can clearly see the advantage that the full backup gives us; not only does
    it give us an expected backup solution, but it also gives us a (mostly) fresh
    transaction log to work with as well. We saw how a full backup affects not only
    the backup being created, but also how it helps maintain the size of the transaction
    log so the transaction log doesn’t grow out of control.


    If you don’t currently have a backup solution in place in your environment, these
    first four chapters will hopefully play an integral and essential role in your
    successful implementation of an extremely powerful and reliable backup system.


    # 2. Differential Backups


    Setting up a structured, recurring backup does not stop with just a scheduled
    full backup. That is only half the battle; to be honest, a third of the battle.
    A good backup strategy reduces the overall risk to the data stored in the database.
    One of the most effective ways to reduce risk is by decreasing the total number
    of “links” in your backup chain (i.e., the total number of files you have to restore
    in the case of a disaster). Every file that gets created during a backup has a
    chance of being corrupted. If you have a large number of backups in a restoration,
    you run a greater risk of having corrupted data somewhere for that restoration
    cycle; the longer the chain, the greater the risk. This is where differential
    backups enter the backup strategy.'
