  trans: '## 摘要


    本章是本书中最简短的一章，原因很简单：差异恢复的概念是建立在先前完整备份的基础之上的。换言之，只要你拥有完整备份，你就能希望开始恢复所需的数据，无论该数据是位于差异备份还是事务日志中。恢复差异备份可以被视为恢复完整备份的逻辑延伸，因为差异恢复的存在以完整备份已先被恢复为前提；但正如我们之前提到的，如果你需要的是事务日志中的数据，你随时可以改为从事务日志恢复。


    我们介绍了如何通过 `SSMS` 和直接使用 `SQL` 语句来恢复差异备份，并简要概述了与此类恢复相关的不同选项。请确保在你所需编写的恢复脚本中，包含我们在清单
    6-1 和清单 6-2 中介绍的语法。


    下一章，我们将探讨如何恢复事务日志，以及在此领域可以启用或禁用的不同选项。


    # 7. 事务日志恢复


    在 `SQL Server` 中恢复事务日志可能出乎意料地简单。然而，在尝试恢复事务日志之前，有几件事需要考虑，例如以下问题：

    *   你是否需要恢复到某个特定的时间点？

    *   你是否正试图从灾难性的数据库故障中恢复？

    *   你甚至是否有可恢复的事务日志？

    这些问题，有时还有更多问题，都需要得到解答，以便引导你走上正确的事务日志恢复路径。我曾多次收到所属某个数据库发生事故的警报，当时并未停下来考虑该采取哪条路径：我只是径直踏上了“恢复某某东西”这条照明不佳的道路。换句话说，我知道我需要恢复一些数据，但并不确切知道具体需要恢复什么数据。我不知道哪些表（如果有的话）受到了影响，或者某个时间点之后的所有内容是否都受到了影响。


    因此，最好永远考虑以下这条免费建议：在尝试恢复事务日志之前，花尽可能多的时间收集正确信息并制定可行计划。请相信我，恢复“错误”的数据可能会让你的情况变得糟糕得多。


    **提示**

    你的数据库必须启用完整恢复模式或大容量日志恢复模式，才能拥有可供恢复的事务日志。


    ## 事务日志恢复基础


    在处理本章节语境下的事务日志恢复时，有一些基本事项我们需要先澄清。首先，我不会深入探讨事务日志是什么、它们如何工作、哪个比特位存储了什么数据以及为何这很重要这些细节。对我来说，这个主题或许最好不放在本书中讨论，因为我希望本书更侧重于解决问题，而非学习问题的微妙之处。话虽如此，让我们还是回顾几个我认为重要的小主题（或许还有几个虽不重要但仍可能与事务日志恢复这个整体问题相关）。


    恢复事务日志有两种方式：使用 `SSMS`，或者使用 `Transact-SQL`。是的，可以说两种方式都使用了 `Transact-SQL`，因为那是 `SQL
    Server` 的语言，但我特指的是使用 `SQL Server Management Studio` 来创建 `SQL Server Agent` 作业以自动化恢复过程，或者手动从
    `CLI` 或也在 `SSMS` 内部使用 `Transact-SQL`。


    对于下一节，我在 `SSMS` 中执行了清单 7-1 所示的代码。


    ```sql

    DECLARE @cnt INT;

    SET @cnt = 0;

    WHILE @cnt <= 1000

    BEGIN

    INSERT INTO users1 SELECT * FROM users2;

    SET @cnt = @cnt + 1;

    END;

    SELECT count(*) as cnt FROM users1;

    ```

    **清单 7-1** 为数据库创建更多数据


    这是我们早在第 1 章创建的 `CreateTestData.sql` 的一个片段。运行此片段前我的记录数是 `10,020,000`，运行此片段后的记录数是
    `20,030,000`。这应该会导致事务日志大小产生相当显著的差异。


    我想做的是将数据库恢复到记录数为 `10,020,000` 的先前版本。下一节将详细说明如何在 `SQL Server Management Studio`
    中使用“文件和文件组”界面完成此操作，然后使用“还原数据库”界面进行时间点恢复。'
- fmt: '## Restoring Using SSMS


    The simplest way to run a restoration is probably graphically. I’m sure there
    will be some old-school command-line gurus that will point out the error in my
    ways, and to them I simply say, “Hey, wow, you did essentially the same thing
    in a console that I did in a GUI… sweet.” And that’s about it. I’m not one of
    those developers that prescribes to a specific methodology, whether GUI (in `SSMS`)
    or `CLI` (using `Transact-SQL`). I prefer to use whatever tool is available and
    I don’t really care to get too far into the dichotomy of “you should use this
    tool because it’s so fantastic and any other way is terrible.” For example, I
    write `ColdFusion` in `Dreamweaver`. I don’t use `ColdFusion Builder`, the `IDE`
    specifically built for `ColdFusion` development. Why? Because I initially preferred
    the layout and structure of `Dreamweaver` over `CF Builder`, and even after all
    these years, I still do. That doesn’t mean that `ColdFusion Builder` is any worse
    or better than `Dreamweaver`; it just means that my personal preference is for
    one over the other, and I am sure I am not alone when having preferences for certain
    software tools over others.


    If you were to go straight into the menu structure with the thought in mind that
    “I want to restore a transaction log,” you may start with the `Tasks` menu option
    after right-clicking the database name. Figure [7-1](#A436605_1_En_7_Chapter.html#Fig1)
    shows this starting point.


    ![A436605_1_En_7_Fig1_HTML.jpg](A436605_1_En_7_Fig1_HTML.jpg)


    Figure 7-1: `Tasks` submenu


    From here, it is a logical assumption that you would point to the `Restore` area
    to the right, and proceed from there. This is correct, but the next part is where
    it could be confusing. Figure [7-2](#A436605_1_En_7_Chapter.html#Fig2) shows the
    expanded menu of the `Restore` selection.


    ![A436605_1_En_7_Fig2_HTML.jpg](A436605_1_En_7_Fig2_HTML.jpg)


    Figure 7-2: `Restore` menu selections


    This menu has four options. Those options are as follows:


    *   `Database`: This option will allow you to restore a database from either a
    full or a differential backup. This option will not allow you to restore a transaction
    log.

    *   `Files and Filegroups`: This option will allow you to restore a group of files
    to a new or existing database. You have the option of selecting a full or differential
    backup, and the corresponding transaction logs will be selected for the restore
    operation. Consequently, you can choose an individual transaction log to restore,
    and your selection will automatically include every transaction log since the
    last full or differential backup. Note that all current backups are included in
    this interface, so be very careful when restoring data.

    *   `Transaction Log`: This option is generally unavailable, except in a few certain
    situations. When a database has been restored using a full backup and `RESTORE
    WITH STANDBY` was selected as an option for the restoration, the database will
    stay in `RecoveryPending` mode until the tail of the transaction log is restored.
    It is interesting to note that, when this option is enabled, meaning that the
    database is currently in a state awaiting restoration of the tail of the transaction
    log, all three remaining options in this area are disabled. Also, when a database
    has been restored with `NORECOVERY` and the database is currently in the `Restoring…`
    mode, this option is available and means that you can continue to restore transaction
    logs.

    *   `Page`: This option will let you check your database pages for possible corruption,
    and also let you restore from the most current backup set of full, differential,
    and transaction log backups. Your selection must comprise a complete backup set,
    which will represent a complete restore solution.


    For the purpose of this demonstration, we are going to choose the `Files and Filegroups`
    option. This will give us some options we need to restore our transaction log.
    You can open the `Files and Filegroups` window by right-clicking the database
    you want to work with and navigating to `Tasks` ➤ `Restore` ➤ `File and Filegroups`.
    Figure [7-3](#A436605_1_En_7_Chapter.html#Fig3) shows the location of this menu
    option.


    ![A436605_1_En_7_Fig3_HTML.jpg](A436605_1_En_7_Fig3_HTML.jpg)


    Figure 7-3: `Files and Filegroups` menu location


    ### Restore Files and Filegroups—General


    Figure [7-4](#A436605_1_En_7_Chapter.html#Fig4) shows the initial interface for
    the `Restore Files and Filegroups` section. Notice that, by default, the selected
    page is `General`, as indicated on the left of the interface.


    ![A436605_1_En_7_Fig4_HTML.jpg](A436605_1_En_7_Fig4_HTML.jpg)


    Figure 7-4: `Restore Files and Filegroups`, `General` page


    Let’s take a minute to get familiar with this screen. The `general` interface
    is nearly the same as quite a few other general screens in `SQL Server`, meaning
    that there is a `destination` field along with a `source` field. This tells the
    user that there are generally both sides of the equation to fill in, and both
    sets of data have to be filled out and correct if the equation is going to balance
    out and render the expected results.


    The first section, `Destination to restore`, carries the names of the databases
    with full or bulk-logged recovery models. Your database should be selected by
    default.


    The second section, `Source for restore`, carries the names of the databases that
    have viable backups available for restoring.


    Underneath these two options, the backup sets are shown. The initial layout has
    the following columns shown:


    *   `Restore`: Check box value for yes or no; checked for yes, unchecked for no.

    *   `Name`: The name of the backup file. Note that the file extension is not included
    in this view.

    *   `File Type`: This value is “Rows Data” for either full or differential backups,
    or blank for transaction log backups.

    *   `Type`: The type of the backup; values are `full`, `differential`, or `transaction
    log`.

    *   `File Logical Name`: The logical name of the file, apart from the `Name` field.

    *   `Server`: This is the name of the `SQL Server` instance the backup was run
    from.

    *   `Database`: This is the name of the `SQL Server` database that the backup
    originated from.

    *   `Start Date`: The date and time when the backup operation started.

    *   `Finish Date`: The date and time the backup operation finished.

    *   `Size`: The size of the backup.

    *   `Username`: The username of the account used to generate the backup.


    You will use these columns to determine exactly which backups to restore and the
    order in which to restore them. Luckily, `SSMS` makes this easy for you.


    Scroll down to the bottom of the `Select the backup sets to restore:` area. The
    last item listed in this area should be a transaction log backup. If a transaction
    log isn’t listed last, then move up the list, or earlier in time, to the last
    transaction log backup. Check the `Restore` check box and notice that all the
    other transaction logs since the last differential backup become selected, along
    with the last differential backup. This is because `SQL Server` is aware that
    it needs to restore a full backup first, then the differential backup, and then
    the transaction logs, in the correct time order, in order to successfully restore
    the database to the point in time. You should see something similar to what is
    shown in Figure [7-5](#A436605_1_En_7_Chapter.html#Fig5) at this point.


    ![A436605_1_En_7_Fig5_HTML.jpg](A436605_1_En_7_Fig5_HTML.jpg)


    Figure 7-5: Last transaction log selected


    Notice that the options selected are four transaction log backups and one differential
    backup, as indicated by the `Type` column.'
