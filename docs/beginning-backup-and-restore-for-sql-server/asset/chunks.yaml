- fmt: '## What Is a Differential Backup?


    A differential backup captures all data residing in the database that has changed
    since the last full backup (also known as the `differential base`) was taken.
    Like the full backup, the differential backup contains transaction log data, and
    can back up the database as whole or specific files and filegroups. Unlike the
    full backup, for a differential backup to successfully execute, dependencies on
    other backup types have to be met.


    Over the years, I have had a number of coworkers refer to differential backups
    synonymously as incremental backups; this is a common misconception, and one that
    can cause a DBA some trouble. In general, incremental backups are backups of changed
    data since the last backup of any type (full or differential). Differential backups
    are backups of changed data since the last base. What is the difference? The word
    “base,” in this context, makes all the difference. An incremental backup will
    back up any data that changed since the last backup, whether it is a full or an
    incremental backup. The differential backup will continue to grab any data that
    has changed since the last full backup, regardless of how many differential backups
    have run. With this in mind, let’s look at differential backup dependency.


    ### Differential Backup Dependency


    A differential backup has one primary dependency—a full backup. If a full backup
    is not successfully executed before a differential backup, then the differential
    backup will fail to execute.


    **Note**

    The full backup dependency will not be met by the execution of a `COPY_ONLY` backup.
    Only a traditional full backup prior to a differential backup will work. This
    is not to say you cannot take a `COPY_ONLY` backup once the traditional back is
    complete, only that the traditional is required.


    ## Why Use Differential Backups?


    The first question I will usually get asked when I implement a backup strategy
    that uses differential backups is, “What is the point of a differential when you
    have transactional backups? Isn’t it just using more disk space?” This question
    often comes from someone on the infrastructure team; typically, a SAN administrator.
    I am not saying this to give them a hard time, as it is their job to ask these
    questions; I mention this to demonstrate that you will get questioned at some
    point on your backup strategy and why you went down the path you did.


    Again, though, the question is why use differentials and not rely completely on
    transaction log backups. The answer can be summed up in a single word… risk.


    It is my belief that the single most important responsibility a DBA has is protecting
    the data. Sure, performance, security, and maintenance are all very important
    and should not be overlooked. Nevertheless, the integrity and recoverability of
    data are paramount to any modern organization’s success. This is where differentials
    offer their greatest value, risk mitigation for data recovery. I have stressed
    this point throughout each of my books, simply because there is no greater assignment
    that we have as DBA; without proper adherence to backup and restore practices,
    our data is completely vulnerable and exposed. This is not an acceptable methodology.
    To mitigate that risk, we need to prepare for the inevitable, and the best way
    to do that is to have a solid backup and Restore plan in place.


    Differential backups reduce risk by simplifying the backup chain. Every time you
    execute a differential backup, you remove the need for all transaction log backups
    taken between the time the last full was taken and the time the differential was
    taken. Every file that is required for a restore in order to bring a database
    back online is another opportunity for something to go wrong.


    ### Scenario Without Differential Backups


    Let’s review a scenario where you do not have differential backups in place. In
    this scenario, you are a DBA in an environment that has a maximum data loss acceptance
    of 30 minutes. The easiest way to handle this is to set up a transactional log
    backup (covered in detail in Chapter [3](#A436605_1_En_3_Chapter.html)) that occurs
    every 30 minutes after a nightly full, as shown in Figure [2-1](#A436605_1_En_2_Chapter.html#Fig1).


    ![A436605_1_En_2_Fig1_HTML.jpg](A436605_1_En_2_Fig1_HTML.jpg)

    *Figure 2-1: Backup strategy without differential backups*


    Continuing with the preceding scenario, imagine the database server crashed at
    11:47 pm after the last transaction log backup completed for the day. After a
    reboot, the SQL instance is up and running, but you find the database is in an
    unrecoverable state and the only option left is to recover the database from a
    backup. Easy enough, right? You first restore the full backup and begin restoring
    the 47 transaction log backup files. But you hit an error at file number 27, the
    1:31 pm backup; it is corrupt and will not restore. This results in more than
    ten hours of data that is unrecoverable and now lost.


    ### Scenario Running Differential Backups


    Now let’s review a scenario where you have differential backups in place, using
    the same scenario as before. With this same scenario in mind, and using differential
    backups, you setup a transactional log backup (again, covered in detail in Chapter
    [3](#A436605_1_En_3_Chapter.html)) that occurs every 30 minutes after a nightly
    full. In addition, you add in a differential backup that occurs every three hours,
    as shown in Figure [2-2](#A436605_1_En_2_Chapter.html#Fig2).


    ![A436605_1_En_2_Fig2_HTML.jpg](A436605_1_En_2_Fig2_HTML.jpg)

    *Figure 2-2: Backup strategy with differential backups*


    Following the same scenario, the database server crashed at 11:47 pm after the
    last transaction log backup completed for the day. After a reboot, the SQL instance
    is up and running but you find the database is in an unrecoverable state and the
    only option left is to recover the database from a backup. This time, your job
    is much easier, you first restore the full backup, then the differential taken
    at 9:01 pm, and followed by only five transaction log backup files. The outcome
    results in a completely restored database with only two minutes of lost data.
    This is due to being able to skip the entire transaction log file prior to the
    9:01 pm differential. This means that the corrupted data was left out, and we
    are left with a fresh copy of the database, and more importantly, that the database
    is free from corruption with a much smaller amount of data loss.


    **Note**

    We will cover restoring a database in detail in Chapters [5](#A436605_1_En_5_Chapter.html),
    [6](#A436605_1_En_6_Chapter.html), and [7](#A436605_1_En_7_Chapter.html).'
