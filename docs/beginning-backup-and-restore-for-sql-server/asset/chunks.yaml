- fmt: "## Back Up Database—General\n\nSelecting this menu option opens up the General\
    \ page of the Back Up Database window, as shown in Figure [3-6](#A436605_1_En_3_Chapter.html#Fig6).\n\
    \n![A436605_1_En_3_Fig6_HTML.jpg](A436605_1_En_3_Fig6_HTML.jpg)\n\n#### Figure\
    \ 3-6\n\n#### General window\n\nThis interface allows us to define the various\
    \ “general” pieces of the puzzle for transaction log backups. The options available\
    \ here are:\n\n*   `Source`\n    *   `Database`: This option allows you to choose\
    \ which database you would like to back up from your available databases.\n  \
    \  *   `Recovery model`: This option will always default to the recovery model\
    \ currently in use by the selected database. To test this, select the `master`\
    \ database and you will see the recovery model change from `FULL` to `SIMPLE`.\n\
    \    *   `Backup type`: This option allows you to choose what you want to back\
    \ up. You can choose from a full, differential, or transaction log backup when\
    \ the recovery model is set to `FULL`, or whichever backup types relate to your\
    \ particular recovery model. You also have the `copy-only backup` check box here.\
    \ What is this? A copy-only backup is useful when you want a backup of the data\
    \ in the database, but you don’t want to interrupt the normal backup schedule\
    \ and you also don’t want to use the latest backup; it may be a differential backup,\
    \ for example, and you don’t want to take the time to run a full and then the\
    \ differential. This option is particularly useful when you want to have a backup\
    \ of current data for the developers to use in the development network. Think\
    \ of it as an out-of-sequence complete backup.\n    *   `Backup component`\n \
    \       *   `Database`\n        *   `Files and filegroups`\n*   `Destination`\n\
    \    *   `Back up to`: The options in this area are currently `disk` or `URL`.\
    \ Select the `disk` option to save the backup in a physical drive somewhere on\
    \ your connected network, and use the `URL` option to save to an online storage\
    \ system or an Azure instance. Choosing one of these options gives you the ability\
    \ to select the location by clicking the `Add` or `Remove` buttons on the bottom\
    \ right-hand side of this window.\n\nFor this example, we want to choose `transaction\
    \ log` from the `Backup type` drop-down menu before moving to the `Media Options`\
    \ submenu. The final state of the interface is shown in Figure [3-7](#A436605_1_En_3_Chapter.html#Fig7).\n\
    \n![A436605_1_En_3_Fig7_HTML.jpg](A436605_1_En_3_Fig7_HTML.jpg)\n\n#### Figure\
    \ 3-7\n\n#### General window, updated\n\n## Back Up Database—Media Options\n\n\
    Choosing this option will show the following interface, as shown in Figure [3-8](#A436605_1_En_3_Chapter.html#Fig8).\n\
    \n![A436605_1_En_3_Fig8_HTML.jpg](A436605_1_En_3_Fig8_HTML.jpg)\n\n#### Figure\
    \ 3-8\n\n#### Media Options window\n\nThis screen lets you choose the options\
    \ that deal with how the physical storage of the backup is to be handled. Included\
    \ in this screen are the following options:\n\n*   `Overwrite media`\n    *  \
    \ `Back up to the existing media set`: This option lets you add a backup to an\
    \ existing backup, which will then let you decide which backup want to restore,\
    \ in the case of restoration.\n        *   `Append to the existing backup set`:\
    \ If you want to add it to the set as mentioned in the preceding, select this\
    \ option.\n        *   `Overwrite all existing backup sets`: If you would rather\
    \ overwrite the selected backup set with the new backup you are about to run,\
    \ select this option.\n        *   `Check media set name and backup set expiration`:\
    \ This isn’t necessary, and isn’t used often in my experience, but it can be selected\
    \ if you want to verify the name and expiration of the backup set.\n        *\
    \   `Media set name`\n    *   `Back up to a new media set, and erase all existing\
    \ backup sets`: This is different from the previous option. The previous option\
    \ would back up to the existing backup set; this option lets you create an entirely\
    \ new backup set, and then save the backup to that backup set. Also, this option\
    \ deletes any previous backup sets, so use this option carefully.\n        * \
    \  `New media set name`: The name of the new backup set.\n        *   `New media\
    \ set description`: An optional description of the backup set.\n*   `Reliability`\n\
    \    *   `Verify backup when finished`\n    *   `Perform checksum before writing\
    \ to media`\n    *   `Continue on error`\n*   `Transaction log`\n    *   `Truncate\
    \ the transaction log`\n    *   `Back up the tail of the log, and leave the database\
    \ in the restoring state`\n*   `Tape drive`\n    *   `Unload the tape after backup`\n\
    \    *   `Rewind the tape before unloading`\n\nLet’s stop for a moment and go\
    \ over the differences between the two transaction log options just introduced.\
    \ When referencing the backup of a transaction log, two things are important:\
    \ the transaction log can be truncated, or the tail of the transaction log can\
    \ be backed up. So what’s the difference?\n\nThe first option, `Truncate the transaction\
    \ log`, deals specifically with truncating the log and that’s it. Truncating the\
    \ transaction log does not reduce the size of the physical transaction log file.\
    \ This concept seemed counterintuitive to me at first, but then I realized that\
    \ in order to reduce the size of the log file, you have to shrink the log file.\
    \ Truncation simply removes the parts of the log file that aren’t being used;\
    \ shrinking the log file is what actually makes the log smaller. Also important\
    \ to remember is that truncation automatically happens after a checkpoint (in\
    \ the simple recovery model) and after a log backup (in the full or bulk-logged\
    \ recovery model). This means that truncation will automatically happen as part\
    \ of the regular backup procedure, if a procedure has been properly established.\
    \ If a procedure has not been properly established, then your transaction log\
    \ will never be truncated (unless manually) and will eventually grow to the entire\
    \ size of the storage media.\n\nThe second option, `Back up the tail of the log,\
    \ and leave the database in the restoring state`, is the more robust and useful\
    \ of the two options. This option allows you to back up the latest transactions\
    \ that haven’t been backed up, and then leave the database ready to immediately\
    \ restore, if necessary. This is known as the tail-log backup.\n\nFor the purpose\
    \ of this example, make sure that this first option, `Truncate the transaction\
    \ log`, is selected, along with `Verify backup when finished`.\n\nThe final interface\
    \ is shown in Figure [3-9](#A436605_1_En_3_Chapter.html#Fig9).\n\n![A436605_1_En_3_Fig9_HTML.jpg](A436605_1_En_3_Fig9_HTML.jpg)\n\
    \n#### Figure 3-9\n\n#### Media Options window, updated"
  raw: "#### Back Up Database—General\n\nSelecting this menu option opens up the General\
