  trans: '

    ## 通过 SSMS 的图形界面验证备份


    通过图形界面在 SSMS 中验证备份可以在多个位置完成。查看活动备份最简便的位置是“还原数据库”界面。由于本章旨在回顾如何执行差异备份而非还原它们，我仅会简要介绍如何检查数据库的备份状态。我们将在本书第二部分详细讨论数据库还原。


    要访问“还原数据库”界面，您将遵循与进入“备份”界面类似的步骤。


    -   右键单击 `backrecTestDB`。

    -   将鼠标悬停在“任务”上，接着是“还原”，然后单击“数据库”。


    一旦“还原数据库”界面加载完成，请查看“还原计划”窗口：您应该能看到两个数据库备份。在“类型”列下，您会看到一个列为完整备份，另一个列为差异备份，如图 2-6
    所示。


    ![A436605_1_En_2_Fig6_HTML.jpg](img/A436605_1_En_2_Fig6_HTML.jpg)

    *图 2-6：还原数据库窗口*


    这可以被视为备份按预期进行并准备好从此界面进行恢复的“生命迹象”。再次强调，我们将在本书后面部分讨论此操作的还原方面。目前，您可以确信备份已准备好进行还原。


    ## 通过 T-SQL 执行差异备份


    通过 T-SQL 执行差异备份相当简单。可以传递许多参数到脚本中；然而，对于此示例，我们将保持脚本简单。


    在 SQL Studio Manager 中，运行以下脚本：


    ```

    BACKUP DATABASE [backrecTestDB]

    TO DISK = N''E:\SQL Server\Backup\backrecTestDB_diff.bak''

    WITH DIFFERENTIAL

    ```


    如果您熟悉 `BACKUP DATABASE` 命令，您会注意到差异备份只有一个区别，即添加了 `WITH DIFFERENTIAL`。


    当脚本完成时，您将看到类似以下的输出：


    ```

    已为数据库 ''backrecTestDB'' 处理了 52688 页，文件 ''backrecTestDB'' 位于文件 1 上。

    已为数据库 ''backrecTestDB'' 处理了 2 页，文件 ''backrecTestDB_log'' 位于文件 1 上。

    BACKUP DATABASE WITH DIFFERENTIAL 已成功处理 52690 页，耗时 9.620 秒 (42.790 MB/秒)。

    ```


    就是这样！您现在拥有了 `backrecTestDB` 的一个差异备份。


    ## 小结


    本章带我们了解了差异备份的基础知识及其重要性。它向我们展示了差异备份如何通过减少数据库恢复所需的文件数量来降低数据恢复的总体风险。


    第 3 章将涵盖事务日志，这是最后一种备份类型。第 4 章将引导您设置一个完整的备份解决方案，并详细回顾有关备份的适用行业标准或最佳实践。


    完成第 4 章后，第一部分也将完成。届时，您应该对备份各个部分如何协同工作和独立工作有一个粗略的理解。然后，我们将运用这些知识在第二部分中构建备份/还原过程的第二部分，重点在于还原已备份的数据。最后，在第三部分中，我们将把各部分整合到一个界面中，然后使用
    SQL Server 代理实现自动化。


    # 3. 事务日志备份


    在本章中，我们将重点讨论备份事务日志的不同技术。这是一个完整备份解决方案（由完整备份、差异备份和事务日志备份组成）的最后一块拼图。这一部分很重要，因为如果没有事务日志备份，就无法进行时间点恢复。事实上，除了上次差异备份中的内容之外，无法进行任何恢复，而自上次差异备份以来提交到数据库的任何数据都将永久丢失，因为这些数据仅存在于事务日志中。因此，事务日志通常被视为灾难恢复中最重要的部分，因为它们提供了自上次差异备份以来缺失的数据片段。


    如果没有事务日志备份，我们将无法执行除完整或差异备份之外的任何备份（不考虑本书未讨论的备份类型，包括文件和文件组备份、镜像备份、部分备份和仅复制备份）。虽然这看起来可能不太糟糕，但重要的是要记住，必须定期备份事务日志才能保持数据库以最佳状态运行。


    ## 什么是事务日志？


    事务日志是一个文件，包含所有数据库事务中所有已更改或更新数据的日志。每当由于数据修改而导致数据库状态改变时，与数据库的交互都会被记录在日志中。日志中的事务按接收顺序写入，因此所有事务都是顺序的。考虑到这一点，可以根据特定的时间范围“倒回”数据库事务的状态，直到达到所需状态。这被称为时间点恢复。


    注意：时间点恢复可能非常耗时，但优点是事务日志的粒度使得可以针对单个事务进行操作以实现所需结果。


    事务日志还具有在相对较短的时间内变得非常大的独特特性。例如，一旦运行了差异备份，该备份就不会继续增长。类似地，事务日志将一直增长，直到它被备份。然后，这些事务日志备份将在指定的备份间隔内持续进行，只要有磁盘空间或直到它们被关闭。每个事务日志都能够恢复到最后一个差异备份，而不能恢复到任何其他备份。因此，为了确保数据损失最小化，所有备份——完整备份、差异备份和事务日志备份——必须
    100% 正常运行。如果不验证我们的事务日志备份是否正常运行，随着时间的推移，事务日志最终将占据整个磁盘。显然，让事务日志占据整个存储卷不是任何人所认为的理想解决方案，因此，我们需要确保备份平稳且正确地运行。为了帮助实现这一目标，下一节将向我们展示如何正确查看
    SQL Server 中驻留的事务日志状态。

    '
- fmt: "## 查看事务日志状态\n\n有几种不同的方法可以查看系统中每个数据库的事务日志的状态或大小。最常见的查看状态的方法是运行一个简单的查询。在 `SSMS`\
    \ 中打开一个新查询窗口并输入以下查询：\n\n```\nDBCC SQLPERF(LOGSPACE);\n```\n\n运行该查询将返回如图 [3-1](#A436605_1_En_3_Chapter.html#Fig1)\
    \ 所示的结果。\n\n![A436605_1_En_3_Fig1_HTML.jpg](A436605_1_En_3_Fig1_HTML.jpg)\n\n\
    图 3-1 SQLPERF 结果\n\n该查询返回的列如下：\n\n*   `Database Name`：正在分析的数据库的名称\n*   `Log Size\
    \ (MB)`：事务日志的大小\n*   `Log Space Used (%)`：日志已使用的分配空间百分比\n*   `Status`：此列始终返回 0\n\
    \n另一种查看事务日志当前大小的方法是：在 `SSMS` 中右键单击数据库名称，选择“属性”，然后从左侧菜单中选择“文件”。此时将打开一个屏幕，如图 [3-2](#A436605_1_En_3_Chapter.html#Fig2)\
    \ 所示。\n\n![A436605_1_En_3_Fig2_HTML.jpg](A436605_1_En_3_Fig2_HTML.jpg)\n\n图 3-2\
    \ 文件选项\n\n从这里我们可以看到，“初始大小”列的值与图 [3-1](#A436605_1_En_3_Chapter.html#Fig1) 中的查询结果相同。这是因为我们还没有备份事务日志，所以显示的初始大小就是当前值。一旦备份了日志，我们就可以回到此屏幕，看到一个小得多的初始值。\n\
    \n因此，我们也可以直接查看文件系统来近似了解事务日志的大小。只需导航到保存日志的位置（对我来说是 `E:\\SQL Server\\Logs`），你应该会看到与图\
    \ [3-3](#A436605_1_En_3_Chapter.html#Fig3) 类似的内容。\n\n![A436605_1_En_3_Fig3_HTML.jpg](A436605_1_En_3_Fig3_HTML.jpg)\n\
    \n图 3-3 文件系统视图\n\n正如我所说，这更像是一种近似值，因为文件大小中存在一些开销，正如你所见。\n\n回顾一下，无论是完整备份、差异备份还是事务日志备份，备份的目的都是能够将数据恢复到先前的状态。最基本地说，一个适当的备份策略通过以下步骤完成：\n\
    \n*   规划备份策略\n*   实施备份策略\n*   验证备份策略\n\n换句话说，首先你必须通过确定所需的数据可用性级别来规划备份策略。然后，你必须在\
    \ `SQL Server` 中实施该策略。最后，你必须验证备份策略是否正常运行，以及在紧急情况下备份是否可以按预期恢复。\n\n对于事务日志备份，验证的原则比完整或差异备份更为突出，因为事务日志是灾难恢复的关键。因此，我个人倾向于稍微更多地关注事务日志，而不是完整或差异备份。这并非贬低完整或差异备份的重要性，但事务日志作为数据库中事务的直接记录，在我看来似乎重要得多。\n\
    \n## 备份事务日志\n\n正如预期的那样，我们可以通过几种方式来运行事务日志备份：编写自定义 `SQL` 脚本，或使用熟悉的 `SSMS` 界面。在本节中，我将详细介绍这两种场景的不同部分，并将其留作练习，让读者自行决定哪种方法适合他们的特定应用。需要记住的重要一点是，这些技术既可以作为维护计划的一部分使用，也可以作为提供更高数据安全级别的定制方法。不过，我始终建议使用\
    \ `SQL Server Agent` 来管理你的备份，通过一个经过适当规划和管理的维护计划来实现。\n\n图 [3-2](#A436605_1_En_3_Chapter.html#Fig2)\
    \ 显示了事务日志的初始大小为 `584MB`。在定期安排的事务日志备份后，初始大小现在为 `24MB`，如图 [3-4](#A436605_1_En_3_Chapter.html#Fig4)\
    \ 所示。\n\n![A436605_1_En_3_Fig4_HTML.jpg](A436605_1_En_3_Fig4_HTML.jpg)\n\n图 3-4\
    \ 初始大小已改变\n\n让我们看看获取事务日志备份的不同方法。\n\n### 通过脚本进行事务日志备份\n\n如果我们没有在维护计划中安排备份，或者即使安排了但我们只想再创建一个事务日志备份，我们可以通过使用以下脚本手动运行事务日志备份：\n\
    \n```\nBACKUP LOG backrecTestDB\nTO DISK = 'E:\\SQL Server\\Logs\\backrecTestDB.trn'\n\
    ```\n\n只需在脚本的首尾部分填入你的数据库名称，你就可以手动发出你自己的备份命令。如果你遇到事务日志在自动备份计划运行前不知何故已填满的问题，此脚本特别有用。\n\
    \n对于此脚本，可以在 `TO DISK` 之后添加属性。它们是：\n\n*   `WITH PASSWORD = 'password'`\n    * \
    \  将 `password` 替换为你选择的密码。恢复此备份时必须输入此密码。\n*   `WITH STATS = X`\n    *   将 `X`\
    \ 替换为你选择的整数。这是已完成进度的百分比间隔。例如，`WITH STATS = 5` 将在每完成 `5%` 后显示进度。\n*   `WITH DESCRIPTION\
    \ = 'text'`\n    *   将 `text` 替换为你希望的描述文本。\n\n### 通过 SSMS 进行事务日志备份\n\n通过 `SSMS`\
    \ 备份事务日志是一个稍微复杂一些的过程，但最终给我们相同的结果。这些方法之间没有根本性的区别，因为它们都实现了事务日志备份的相同目标，所以实际上这将取决于你的偏好以及根据你已有的任何业务规则对你的环境来说什么是理想的。\n\
    \n要在 `SSMS` 中启动事务日志备份，首先你需要右键单击数据库名称，将鼠标悬停在“任务”上，然后深入选择“备份”选项，如图 [3-5](#A436605_1_En_3_Chapter.html#Fig5)\
    \ 所示。\n\n![A436605_1_En_3_Fig5_HTML.jpg](A436605_1_En_3_Fig5_HTML.jpg)\n\n图 3-5\
    \ 备份选项\n\n如图 [3-6](#A436605_1_En_3_Chapter.html#Fig6) 所示，初始屏幕标题为“常规”。此页面左侧菜单中还有两个选项，分别名为“介质选项”和“备份选项”。让我们快速浏览一下这些菜单选项以及它们各自区域内的可用选择。"
  raw: "### Viewing Transaction Log Status\n\nThere are a few different ways that\
    \ you can view the status, or size, of the transaction log for each database in\
    \ your system. The most common way of viewing the status is to run a simple query.\
    \ Open up a new query in SSMS and type in this query:\n\n```\nDBCC SQLPERF(LOGSPACE);\n\
    ```\n\nRunning that query will return what is shown in Figure [3-1](#A436605_1_En_3_Chapter.html#Fig1).\n\
    \n![A436605_1_En_3_Fig1_HTML.jpg](A436605_1_En_3_Fig1_HTML.jpg)\n\nFigure 3-1\n\
    \nSQLPERF results\n\nThe columns returned from this query are as follows:\n\n\
    *   Database Name: the name of the database being analyzed\n*   Log Size (MB):\
    \ the size of the transaction log\n*   Log Space Used (%): percentage of allocated\
    \ space being used by the log\n*   Status: this column always returns 0\n\nAnother\
    \ way to view the current size of the transaction log is to right-click the database\
    \ name in SSMS and select Properties, and then choose Files from the left menu.\
    \ A screen opens, which is shown in Figure [3-2](#A436605_1_En_3_Chapter.html#Fig2).\n\
    \n![A436605_1_En_3_Fig2_HTML.jpg](A436605_1_En_3_Fig2_HTML.jpg)\n\nFigure 3-2\n\
    \nFiles options\n\nFrom here, we can see that the Initial Size column is the same\
    \ size as the value from the query in Figure [3-1](#A436605_1_En_3_Chapter.html#Fig1).\
    \ This is because I have not yet backed up my transaction log, so the initial\
    \ size is shown to be the current value. Once I back up the log, I will be able\
    \ to go back to this screen and see a much smaller initial value.\n\nConsequently,\
    \ we could also just look in the file system for an approximation of size for\
    \ the transaction log. Simply navigate to where you are saving your logs (E:\\\
    SQL Server\\Logs for me) and you should see something similar to what is shown\
    \ in Figure [3-3](#A436605_1_En_3_Chapter.html#Fig3).\n\n![A436605_1_En_3_Fig3_HTML.jpg](A436605_1_En_3_Fig3_HTML.jpg)\n\
    \nFigure 3-3\n\nFile system view\n\nLike I said, that’s more of an approximation\
    \ because there is some overhead in the file size, as you can see.\n\nRecall that\
    \ the purpose of a backup, whether a full, differential, or transaction log, is\
    \ to be able to restore data to a previous state. At its most basic level, a proper\
    \ backup strategy is accomplished through the following steps:\n\n*   Planning\
    \ a backup strategy\n*   Implementing the backup strategy\n*   Verifying the backup\
    \ strategy\n\nIn other words, first you must plan the strategy for the backup\
    \ by determining what level of data availability you would like. Then, you must\
    \ implement that strategy in SQL Server. Finally, you must verify that the backup\
    \ strategy is functioning correctly and that the backups can be restored as expected\
    \ in the case of emergency.\n\nIn the case of transaction log backups, the principle\
    \ of verification becomes highlighted somewhat more than in full or differential\
    \ backups, because the transaction log is the key to disaster recovery. For this\
    \ reason, I personally tend to focus slightly more on transaction logs than on\
    \ full or differential backups. Not to diminish the importance of the full or\
    \ differential backups at all, but the transaction log, being the literal log\
    \ of transactions in the database, seems much more important in my mind.\n\n##\
    \ Backing Up a Transaction Log\n\nAs to be expected, there are a few ways that\
    \ we can run backups of the transaction log: either by writing a custom SQL script,\
    \ or by using the familiar SSMS interface. In this section, I will detail the\
    \ different pieces of each of these two scenarios, and leave it as an exercise\
    \ to the student to decide which method works for their particular application.\
    \ What is important to remember is that these techniques can be used either as\
    \ part of a maintenance plan or as bespoke methods to provide a heightened level\
    \ of data security. I will always recommend using SQL Server Agent to manage your\
    \ backups through the use of a properly planned and managed maintenance plan though.\n\
    \nFigure [3-2](#A436605_1_En_3_Chapter.html#Fig2) showed the initial size of the\
    \ transaction log as 584MB. After a regularly scheduled transaction log backup,\
    \ the initial size is now 24MB, as shown in Figure [3-4](#A436605_1_En_3_Chapter.html#Fig4).\n\
    \n![A436605_1_En_3_Fig4_HTML.jpg](A436605_1_En_3_Fig4_HTML.jpg)\n\nFigure 3-4\n\
    \nInitial size changed\n\nLet’s look at the different ways of getting our transaction\
    \ log backed up.\n\n### Transaction Log Backups via Script\n\nIf we didn’t have\
    \ a backup scheduled in a maintenance plan, or even if we did and we just wanted\
    \ another backup of the transaction log, we could have run a backup of the transaction\
    \ log manually by using the following script:\n\n```\nBACKUP LOG backrecTestDB\n\
    TO DISK = 'E:\\SQL Server\\Logs\\backrecTestDB.trn'\n```\n\nJust fill in your\
    \ database name in the first and last parts of that script, and you can issue\
    \ your own backup command manually. This script is particularly useful if you\
    \ ever come across an issue where the transaction log has somehow filled up before\
    \ it has been scheduled to back up automatically.\n\nWith this script, there are\
    \ attributes that can be added after `TO DISK`. Those are\n\n*   `WITH PASSWORD\
    \ = 'password'`\n    *   Replace `password` with a password of your choice. This\
    \ password must be entered in order to restore this backup.\n*   `WITH STATS =\
    \ X`\n    *   Replace X with an integer of your choice. This is the interval in\
    \ percent that has been completed. For example, `WITH STATS = 5` will show progress\
    \ after every 5% of completion.\n*   `WITH DESCRIPTION = 'text'`\n    *   Replace\
    \ `text` with whatever you want the description to be.\n\n### Transaction Log\
    \ Backups via SSMS\n\nBacking up the transaction log via SSMS is a bit more involved\
    \ of a process, but ultimately gives us the same result. There isn’t a major fundamental\
    \ difference in these methods, since they accomplish the same goal of a transaction\
    \ log backup, so it really is going to come down to what you prefer and what is\
    \ ideal for your environment according to any business rules you have in place.\n\
    \nTo start a transaction log backup in SSMS, first you need to right-click the\
    \ database name and hover on Tasks, and drill down into the Backup option, as\
    \ shown in Figure [3-5](#A436605_1_En_3_Chapter.html#Fig5).\n\n![A436605_1_En_3_Fig5_HTML.jpg](A436605_1_En_3_Fig5_HTML.jpg)\n\
    \nFigure 3-5\n\nBack Up option\n\nThe initial screen, as shown in Figure [3-6](#A436605_1_En_3_Chapter.html#Fig6),\
    \ is titled General. There are two more options on this page in the left-hand\
    \ menu titled Media Options and Backup Options. Let’s take a quick look at these\
    \ menu options and what choices they have within their respective areas."
