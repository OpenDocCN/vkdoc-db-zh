    ## 总结


    在本章中，我们根据本书过程中收集的需求，将完整备份维护计划拼凑完整。


    我们学习了 `SSMS` 维护计划区域中的许多各种配置选项。


    我们还学习了 `SQL Server 代理` 作业区域中的配置选项。


    我们学习了如何设置一个操作员，以便在作业失败时接收电子邮件。


    这是创建整个备份场景所需的三部分中的第一部分。当我们完成整个场景后，我们将对其进行广泛测试，以确保每个事件都能正确通知操作员，因此不必担心我们尚未测试电子邮件接收。我们会在本书结束前完成这一点。


    我们还拼凑了完整还原计划的各个部分，测试了完整还原 `SQL Server 代理` 作业，然后通过“备份和还原事件”报告和 Windows 应用程序事件日志验证了结果。


    在第 10 章中，我们将把差异备份添加到“备份计划”维护计划中，并像配置完整备份计划一样配置它。我们还将创建一个差异还原 `SQL Server 代理` 作业。


    在第 11 章中，我们将讨论如何将事务日志备份添加到“备份计划”维护计划，并创建一个事务日志还原 `SQL Server 代理` 作业。


    本书将以一个完整的测试计划、一个关于如何测试计划是否成功的指南，以及我们可以用来减轻有害情况或包执行中错误的故障排除提示和技巧作为结尾。


    # 10. 差异备份和还原解决方案


    既然我们在第 9 章中详细介绍了功能正常的完整备份和完整还原 `SQL Server 代理` 作业，我们需要拼凑出差异备份和差异还原部分。我们将借鉴第 2
    章和第 6 章的内容来完成本章，但我们将着眼于为我们现有的“备份计划”维护计划添加略有不同的功能和定制。


    我们想要做的是修改备份计划以包含备份的差异部分，然后创建一个新的差异还原 `SQL Server 代理` 作业，以便手动运行或与完整还原 `SQL Server
    代理` 作业结合运行。在本章结束时，我们将为现有计划创建一个附加部分，测试我们目前为该计划创建的内容，并验证预期操作的预期结果。


    最近，我接到任务，要在我的工作区域创建一个相同的开发环境。您可能明白我的意思了；由于事情的偶然性，我能够将我们现在所做的应用到真实场景中，并且它奏效了。我可以将完整数据库备份还原到一个全新的
    `SQL Server` 实例，没有任何麻烦，不仅如此，我还能将差异和事务日志备份也还原到新服务器上，因此在迁移到开发服务器时基本上实现了零数据丢失。知道我能够快速、正确地备份和还原我负责保护的数据，让我感到非常安心。


    我经常发现自己会构思一些“噩梦场景”，这会迫使我快速而正确地思考和行动。显然，这些场景存在局限性；它们必须完全植根于我可以影响或控制结果的情况。例如，服务器宕机的场景完全超出了我的责任范围，因为我需要依赖其他人来解决这种情况。但是，例如，如果不小心运行了一个查询并删除了一个表，或者我的数据库遭受了
    `SQL` 注入攻击（它不会，但请记住这是一个噩梦场景），或者其他与 `SQL Server` 相关的问题出现，我需要知道我有技术能力来回答我需要回答的问题。在我看来，我们可以采取不同的步骤来减轻这些噩梦场景，我们希望最终能在本章中解决这些问题。


    现在，让我们专注于将差异备份添加到我们在第 9 章开始的“备份计划”维护计划中。

