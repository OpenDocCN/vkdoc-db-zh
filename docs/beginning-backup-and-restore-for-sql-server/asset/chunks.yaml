    \ 348-4505，电邮：`orders-ny@springer-sbm.com`，网址：`www.springeronline.com`）向全球图书贸易发行。Apress\
    \ Media, LLC 是一家位于加利福尼亚州的有限责任公司，其唯一成员（所有者）是 Springer Science + Business Media\
    \ Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是一家特拉华州的公司。\n\n献给金和扎莉亚，梅丽丝和布莱克，我所有的家人和朋友，以及最重要的……你们。\n\
    \n## 备份与恢复方法论导言\n\n作为数据库管理员，我们的主要职责是保护所负责数据库中的数据。这些数据代表着雇佣我们的企业赖以生存的核心，如果维护不当，可能会摧毁一家企业。在此背景下，正确应用一个健全的备份和恢复解决方案对于在灾难发生时提供另一层数据安全至关重要。我们需要能够确保在紧急情况下数据可以被恢复，而确保数据能够顺利恢复的唯一方法，就是确保对需要恢复的数据进行了正确的备份。\n\
    \n对于未以任何形式备份的数据，是无法恢复的。幸运的是，有相当多的方法可以备份数据，既可以在 `SQL Server` 内部，也可以在其外部。在本书中，我们将严格从\
    \ `SQL Server` 管理员的角度来处理备份和恢复数据的问题，而不会从 `Windows Server` 管理员的视角来看待这一主题。此外，我们也不会深入探讨\
    \ `SQL Server Management Studio` 之外的高级实践。这样做是因为我希望尽可能将注意力集中在用于开发和维护的实际工具上。为此，我需要让本书的大部分内容与\
    \ `SSMS` 直接相关。请注意，这并不意味着你永远只能使用 `SQL Server Management Studio` 来管理数据库备份；事实并非如此。相反，我希望在本书中介绍一些概念，希望能扩展你对备份和恢复是什么的理解，以及在\
    \ `SQL Server` 的背景下如何正确维护它们。然而，这确实意味着我们将严格保持在 `SQL Server` 的范围内。需要绝对清楚的是，我们不会涉及与\
    \ `SQL Server` 如何准备并将备份解决方案传送到预定义存储位置不同的存储技术，也不会探讨 `SQL Server` 如何检索该备份解决方案以恢复损坏、丢失或受损的数据。相反，我们将专注于可用于确保你获得的备份集符合预期的各种不同设置和技术。因此，我们也将研究\
    \ `SQL Server` 中可用的各种不同恢复技术。\n\n**注意**  \n当备份由 `SQL Server` 创建时，你可以从多种选项中选择，以详细指定备份中要包含哪些数据。当备份由\
    \ `Windows` 创建时，整个数据库文件会连同文件系统一起备份。这可能是有利的，但也是对空间的浪费，有时如果经过加密，则可能无法恢复。\n\n具体来说，本书将涵盖以下项目（以及其他许多主题）：\n\
    \n*   三种主要备份类型的优缺点及正确用法\n    *   **完整备份**：整个数据库的备份\n    *   **差异备份**：自上次完整备份以来发生变化的信息的备份\n\
    \    *   **事务日志备份**：自上次备份以来的事务日志\n*   用于不同规模组织的不同备份方法论\n    *   本地存储与异地存储\n  \
    \  *   数据保留期限\n    *   存储介质及其固有差异（磁带 vs. `USB` vs. `DVD`）\n*   备份的压缩类型\n*   备份的加密类型\n\
    \n需要注意的是，在本书的课程中，我们将准备许多备份解决方案，而我们创建的解决方案将位于单个物理硬盘驱动器上，该驱动器被分区为多个逻辑驱动器。如果你读过我的其他书籍，你会知道我有一个特定的方式来设置我的\
    \ `SQL Server` 文件位置，如清单 1 所示。对我来说，这有助于以逻辑方式组织文件夹结构，而不是陷入嵌套文件夹的泥潭才能到达默认的文件和文件夹位置。\n\
    \n```\n文件夹位置                 用途\nE:\\SQL Server\\Backups      备份（`.bak`）文件\nE:\\\
    SQL Server\\Data         数据（`.mdf`）文件\nE:\\SQL Server\\Logs         日志（`.ldf`\
    \ 和 `.trn`）文件\nE:\\SQL Server\\Temp         任何其他文件类型\n```\n**清单 1** 文件位置\n\n当然，你可以按照你希望的任何方式设置你的系统。\n"
- fmt: '# SQL Server备份与恢复指南


    在本书中，我们将专注于各种备份类型、不同的恢复过程（使用事务日志进行时间点恢复与加载完整备份），以及每个过程的组成部分。我们不会讨论将备份文件保存到指定备份文件夹（参见清单[1](#A436605_1_En_BookFrontmatter_OnlinePDF.html#Par16)）以外的任何位置。您的具体场景可以根据需要进行调整，但这些章节中的说明将为您提供一个可行的备份和恢复解决方案的分步指南。简而言之，本书希望能解决几乎所有与备份或恢复数据相关的问题，如果它不能完全解答您的疑问，那么它或许能为您自己的解决方案指明正确的方向。


    我们将从一个全新的 `SQL Server 2016` 和 `SQL Server Management Studio` 安装开始。我不会包含 `SQL Server`
    或 `SSMS` 的安装说明，因为假设您已经有一个数据库在运行，并且希望为其启动一个备份/恢复解决方案，或增强您当前的备份/恢复场景。


    一如既往，我强烈建议建立一个您可用于测试的开发环境。`SQL Server Express` 对开发者是免费的，因此这是一个很好的选择。如果您没有本地数据库可供使用，`Microsoft
    Azure` 也提供了一些极好的存储交易，而且物有所值。最新版本的 `SQL Server Management Studio` 将只连接到最“现代”版本的
    `SQL Server` 引擎，因此请记住，它可以连接到任何先前版本的 `SQL Server`，如下所示：

    *   `SQL Server 2008`

    *   `SQL Server 2008 R2`

    *   `SQL Server 2012`

    *   `SQL Server 2014`

    *   `SQL Server 2016`

    *   `SQL Server 2017`

    *   `Microsoft Azure`


    几乎任何开放数据库连接 (`ODBC`) 数据源都可以通过 `SSMS` 访问，但如果我是您，我会坚持使用 `Microsoft` 的产品。为了本书的练习和大部分内容，如果您决定使用
    `SQL Server` 或 `Azure` 以外的其他产品，您将很难完全跟随示例进行操作。


    ## 备份基础


    在我们开始学习 `SQL Server` 内可用的备份和恢复方法类型之前，我们需要了解备份和恢复的各个部分，无论是单独还是结合起来，以便真正知道我们想从一个备份/恢复解决方案中实现什么。您的数据库很可能在其整个生命周期内平稳运行，您永远不需要恢复备份。我相信这对大多数数据库管理员来说是乌托邦，而且我想不起有谁曾经真正遇到过这种情况。大多数时候，墨菲定律会发生作用，它确保您要么有一个随时可用的备份可以恢复，要么您就从为什么要有一个可靠的备份解决方案这个问题上学到一个非常惨痛的教训。不幸的是，我们大多数人都属于这一类；那些数据库管理员可能因为时间限制或懒惰而放弃了备份解决方案的便利，并在后来遭受了后果。如果这是您，请理解您并不孤单。在您作为数据库管理员的职业生涯早期，犯一些新手错误是很容易的，但期望您从这些错误中学习，这样它们就不会再发生。这就是我认为本书可以发挥作用的地方。


    在处理数据恢复时，很容易说备份应该总是可用的，但知道如何实际构建您需要的备份解决方案，并在需要时让该解决方案可用，则完全是另一回事。因此，`Microsoft`
    在 `SQL Server` 的背景下提供了不同的备份数据的方式。让我们看看备份和恢复的各种方法，以及它们如何相互关联。


    ### 恢复模型


    在 `SQL Server` 中，有三种不同的恢复模型可用：

    *   `Full`

    *   `Bulk-logged`

    *   `Simple`


    这些模型的目的是为您，即数据库管理员，提供关于您希望如何交付备份数据的不同选项。您不能为一个数据库选择多个选项，并且您受限于每种恢复模型可用的备份类型。因此，应非常谨慎地选择恢复模型。


    可以将恢复模型视为容器，备份类型及随后的备份都位于其中。如果恢复模型不适合您的需求，那么您将永远无法获得所需的备份和恢复解决方案。


    选择一个恢复模型实际上非常简单；只需决定在您的情况下可接受多少数据丢失，场景基本上就自己构建好了。如果您希望数据丢失非常少，那么简单恢复模型选项就被排除了。这就留下了完整和大容量日志恢复模型。这两种模型之间的区别是什么？基本上，完整恢复模型允许进行时间点恢复，而大容量日志恢复模型只允许备份从上次恢复点开始的数据。在这两个选项之间做出决定，那就是您期望的恢复模型。


    这三种不同的恢复模型在第 [1](#A436605_1_En_1_Chapter.html) 章中有详细讨论。'
  raw: 'For the purposes of this book, we are going to concentrate on various backup
    types, different restore procedures (point in time using transaction logs vs.
    loading a complete backup), and what components make up each procedure. We are
    not going to get into saving the backup files to any location other than the backups
    folder specified in Listing [1](#A436605_1_En_BookFrontmatter_OnlinePDF.html#Par16)
    . Your specific scenario can be adjusted to fit your need, but the instructions
    in these chapters will provide you with a step-by-step instruction guide to a
    workable backup and restore solution. In short, this book will hopefully address
    nearly every issue related to backing up or restoring data, and if it doesn’t
    completely answer the question, then it will possibly be able to point you in
    the right direction for your own solution.


    We are going to start with a completely fresh installation of SQL Server 2016
    and SQL Server Management Studio. I am not going to include SQL Server or SSMS
    installation instructions, since it is assumed that you already have a database
    up and running and that you would like to either start a backup/restore solution
    for it, or enhance your current backup/restore scenario.


    As always, I strongly recommend setting up a development environment that you
    can use to test with. SQL Server Express is free for developers, so that’s a great
    option. Microsoft also has some fantastic deals on Azure storage, if you don’t
    have a local database to play with, and they are really well priced for what you
    get. The newest release of SQL Server Management Studio will only connect to the
    most “modern” version of the SQL Server engine, so keep in mind that you can connect
    to any previous version of SQL Server shown:


    *   SQL Server 2008

    *   SQL Server 2008 R2

    *   SQL Server 2012

    *   SQL Server 2014

    *   SQL Server 2016

    *   SQL Server 2017

    *   Microsoft Azure


    Just about any Open Database Connectivity (ODBC) data source can be accessed through
    SSMS, but I would stick with Microsoft if I were you. For the sake of the exercises
    and the large part of the content in this book, if you decide to use something
    other than SQL Server or Azure, it’s going to be difficult for you to follow along
    with exactly what is being shown.


    ## Backup Fundamentals


    Before we get started with learning about the types of backup and restore methodologies
    available within SQL Server, we need to understand the various parts of a backup
    and restore, separately and conjoined, in order to really know what we want to
    achieve from a backup/restore solution. It is entirely possible that your database
    could run smoothly for its entire life, and you will never need to restore a backup.
    I believe this would be the utopia for most database administrators, and I can’t
    think of a single person that has ever had this happen for them. Most times, Murphy’s
    Law steps in and makes sure that you either have a readily available backup to
    restore from, or you learn a very hard lesson in why you should have a reliable
    backup solution. Most of us, unfortunately, fall into this group; those database
    administrators that have maybe forgone the luxury of a backup solution due to
    time constraints or laziness, and have suffered the consequences later. If this
    is you, please understand that you are in good company. It is very easy to make
    rookie mistakes early on in your career as a database administrator, but it is
    expected that you learn from those mistakes so they don’t happen again. That’s
    where I would like to think that this book comes in.


    When dealing with recovery of data, it is very easy to say that backups should
    always be available, but it is another thing altogether to know how to actually
    build the backup solution that you need, and have that solution available when
    needed. For this reason, Microsoft offers different ways of backing up data within
    the context of SQL Server. Let’s take a look at the various pieces of backup and
    restore methodologies, and how they relate to each other.


    ### Recovery Models


    In SQL Server, there are three different recovery models available:


    *   Full

    *   Bulk-logged

    *   Simple


    The purpose of these models is to give you, the database administrator, different
    options for how you want the backup data to be delivered. You cannot choose more
    than one option for one database, and you are confined to what backup type is
    available for each recovery model. For this reason, a recovery model should be
    chosen very carefully.


    Think of a recovery model as the container in which the backup type, and the subsequent
    backup, reside. If the recovery model does not fit your needs, then you will never
    get the backup and restore solution you need.


    Picking a recovery model is actually very simple; just decide how much data loss
    is acceptable for your situation, and the scenario basically builds itself. If
    you want very little data loss, then the simple recovery model option is discarded.
    This leaves the full and bulk-logged recovery models. What is the difference between
    these two models? Basically, the full recovery model allows for point-in-time
    restores, which the bulk-logged recovery model allows for backups of data only
    from the last restore point. Decide between those two options, and that is your
    desired recovery model.


    The three different recovery models are discussed at length in Chapter [1](#A436605_1_En_1_Chapter.html)
    .'
