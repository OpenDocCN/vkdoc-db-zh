  raw: '## Summary


    This chapter brought this section, and the book, to a close. We were able to successfully
    restore transaction logs to a point in time using T-SQL within SQL Server Management
    Studio, we saw how to create test data, and we learned about `WITH NORECOVERY`
    and `WITH RECOVERY`.


    I sincerely hope that you have followed along in this book and have learned something
    new along the way. The lessons in this book are certainly not the entirety of
    backing up and restoring data within SQL Server, but I believe this book gives
    you an excellent starting point in becoming more adept at creating an effective
    backup and restore strategy. There are a lot of concepts in the realm of backing
    up or restoring data that I didn’t touch on in this book; while they are important,
    I didn’t include them because I believe that they would have convoluted the topics
    I was trying to present. I wanted to make this book the absolute easiest to follow
    as I could, and I didn’t want to talk over anybody’s head in the process, so if
    the content was a bit light, I do apologize. The concepts in this book can be
    related to either development or production environments though, and I thought
    it was most important to have a very firm foundation in the rudimentary knowledge
    of backing up and restoring data before more advanced topics were introduced.
    I believe that, through the course of this book, your knowledge on the topic has
    grown to the point where you could continue on comfortably with a more advanced
    book on this topic and be able to follow along easily.


    I encourage you to take these examples and apply them in your work development
    environment, and concentrate on taking what is here and making it better than
    it is through automation, for example. There are plenty of great examples that
    I mentioned in this book, specifically the maintenance script from Ola Hallengren.
    The second edition of this book will have a comprehensive chapter on this script
    alone, detailing all the separate pieces to it, since it does merit its own separate
    section; it really is pretty spectacular.


    Congratulations for finishing this book! Now you get to apply what you have learned.
    I wish you, the reader, all the best in your personal and professional life.


