- fmt: '## Configuring the Jobs


    Notice that there are now jobs in the Jobs folder inside of `SQL Server Agent`.
    These aren’t very descriptive, are they? Which is which? Let’s fix this right
    now. Double-click `Subplan_1` and update your information to match generally what
    is shown in Figure [4-23](#A436605_1_En_4_Chapter.html#Fig23). You are going to
    want to have something in the `Name` field which generally matches the task at
    hand, so try not to put something random in that field. Instead, give it a descriptive
    name. Notice that I have named mine “`backrecTestDB.Full Backup`.”


    ![A436605_1_En_4_Fig23_HTML.jpg](A436605_1_En_4_Fig23_HTML.jpg)


    Figure 4-23 Job Properties, General tab


    Notice that the job is set to `Database Maintenance` in the `Category` option.
    This is great, because this is what we are doing. Ensure that the `Enabled` check
    box is checked, and this screen is all set.


    One thing I skipped over is the `Owner` selection. This typically should be set
    to the owner of the database, although we are specifically referring to the owner
    of the task, and not the owner of the database. For that reason, it should be
    set to any user with heightened permissions in the database.


    Also notice that on the left, there are menu options. You are currently on the
    `General` option. If you click the `Steps` option, you will see what is shown
    in Figure [4-24](#A436605_1_En_4_Chapter.html#Fig24).


    ![A436605_1_En_4_Fig24_HTML.jpg](A436605_1_En_4_Fig24_HTML.jpg)


    Figure 4-24 Job Properties, Steps tab


    If you’re setting this up for the first time, you will notice that the menu bar
    does not show your new name yet. Mine is updating because I’m showing the result
    of the operation. To update your plan name, double-click the text `Subplan_1`
    (as opposed to what I show as full backup in Figure [4-24](#A436605_1_En_4_Chapter.html#Fig24)).
    The `Job Step Properties` window opens, so change the `Step name` box to “Full
    Backup,” as shown in Figure [4-25](#A436605_1_En_4_Chapter.html#Fig25).


    ![A436605_1_En_4_Fig25_HTML.jpg](A436605_1_En_4_Fig25_HTML.jpg)


    Figure 4-25 Job Properties, Steps tab, General option


    Don’t touch anything else on this screen just yet, except for clicking the `Advanced`
    option on the left. Adjust this screen to the settings shown in Figure [4-26](#A436605_1_En_4_Chapter.html#Fig26).


    ![A436605_1_En_4_Fig26_HTML.jpg](A436605_1_En_4_Fig26_HTML.jpg)


    Figure 4-26 Job Properties, Steps tab, Advanced option


    All I did here was click the `Include step output in history` check box. If you
    have a table set up to log maintenance plan results to a table in your database,
    then you could select the `Log to table` check box. Additionally, you could also
    output the results of the operation to a file by entering in a file location to
    the `Output file` box.


    Click `OK` when this is done, and you will go back to the `Job Properties` screen,
    with the text “Full Backup” now replacing `Subplan_1`. Figure [4-27](#A436605_1_En_4_Chapter.html#Fig27)
    is what you should see now.


    ![A436605_1_En_4_Fig27_HTML.jpg](A436605_1_En_4_Fig27_HTML.jpg)


    Figure 4-27 Job Properties, Steps tab


    Click the `Schedules` option on the left and notice that our schedule is in there,
    and that it is enabled, as shown in Figure [4-28](#A436605_1_En_4_Chapter.html#Fig28).


    ![A436605_1_En_4_Fig28_HTML.jpg](A436605_1_En_4_Fig28_HTML.jpg)


    Figure 4-28 Job Properties, Schedules tab


    Click the `Alerts` option, and you will see a blank screen. This is fine, for
    now.


    Click the `Notifications` option, and you will see what is shown in Figure [4-29](#A436605_1_En_4_Chapter.html#Fig29).


    ![A436605_1_En_4_Fig29_HTML.jpg](A436605_1_En_4_Fig29_HTML.jpg)


    Figure 4-29 Job Properties, Notifications tab


    If you have an `Operator` set up and have previously configured `Database Mail`
    already, select the `Operator` in the `E-mail` box. For the time being, we are
    going to keep the `Write to the Windows Application event log` option selected,
    but we are going to change the drop-down to `When the job completes`; that way
    we will always know what happened with our job.


    Clicking the `Targets` option will show a blank screen as well. This is fine,
    since we haven’t defined any targets.


    Click `OK` when you are through with the `Targets` option, and have followed the
    directions for this area.


    If you look in the `Jobs` folder of `SQL Server Agent`, you will see that this
    job is renamed and saved as `full backup`. Do the same things listed previously
    for the other two and label them accordingly. Remember that we defined the `full
    backup` as the first task, `differential backup` as the second task, and the `transaction
    log` as the third task. Those line up with the subplan designations here. You
    should end up with what is shown in Figure [4-30](#A436605_1_En_4_Chapter.html#Fig30)
    when you are finished.


    ![A436605_1_En_4_Fig30_HTML.jpg](A436605_1_En_4_Fig30_HTML.jpg)


    Figure 4-30 Completed SQL Server Agent jobs


    It’s okay that `syspolicy_purge_history` is in there too. That’s a job that SQL
    Server does on its own.


    ## Summary


    In this chapter, we went over the culmination of setting up a backup plan for
    full, differential, and transaction log backups. These backup plans are entirely
    dependent upon the recovery model of the database in question, and must be set
    to either full or bulk-logged models, since simple does not allow for transaction
    log backups.


    We learned the importance of running backups that have verified integrity, and
    the possible risk we run when not having the backup integrity verified each time
    it is created.


    We clearly and properly defined our backup schedule, based on the needs of a particular
    environment, and translated those needs into a quantifiable time schedule that
    creates backups as expected.


    Finally, we learned how to make the final backup maintenance plan more easily
    readable to humans, while maintaining the complexity of the tasks.


    We are going to continue into Chapter [5](#A436605_1_En_5_Chapter.html) with the
    restore equivalent to the backup scenario that we created in Chapter [1](#A436605_1_En_1_Chapter.html).
    This is the logical extension of the backup scenario, since there is no point
    in having a backup if you have no means of restoring that backup.


    # Part II


    Restores


    # 5. Full Restores


    Following the format of the previous chapters, we are going to continue on in
    the journey of backups and restores by delving into the second section of this
    book. The first section, comprised of Chapters [1](#A436605_1_En_1_Chapter.html)–[4](#A436605_1_En_4_Chapter.html),
    covered the backup portion; this second section, comprised of Chapters [5](#A436605_1_En_5_Chapter.html)–[8](#A436605_1_En_8_Chapter.html),
    is going to cover the restore portion.


    At this point, we realize that a database backup is fundamental to the entire
    data recovery process. Without a backup, there can be no restore. For that reason,
    it is vital that the backups taken are correct, which we covered earlier. Now,
    going further with that rudimentary knowledge, we are going to look at various
    ways to do a restore of a full database backup.


    It is important to point out that database restores are mostly done within `SQL
    Server Management Studio`. I would like to stress the term “mostly” here, because
    it is not the only way to restore data. For example, if your `master` database
    has become corrupted, then it must be restored from a full backup before SQL Server
    will start correctly. This is because `master` holds all of the configuration
    information for SQL Server. A major problem with a corrupt `master` database,
    beyond the obvious issue of SQL Server not starting, is that all the other system
    databases (`msdb` and `model`) depend on `master` to function correctly. If `master`
    is corrupted badly enough, then the system tables will need to be rebuilt individually,
    and that is a major headache.'
