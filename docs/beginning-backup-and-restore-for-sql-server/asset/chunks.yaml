    \ `选项` 菜单项以转到下一节。`图 [5-15]` 显示了此默认界面的样子。\n\n![A436605_1_En_5_Fig15_HTML.jpg](img/A436605_1_En_5_Fig15_HTML.jpg)\n\
    图 5-15\n还原数据库窗口，选项选项卡\n\n对于常规恢复，我通常选择 `覆盖现有数据库 (WITH REPLACE)` 并取消选择 `将源数据库保持为还原状态\
    \ (WITH NORECOVERY)` 选项，其余保留默认设置。这让我可以覆盖数据库中直至故障发生前的所有内容，并且不会使我的数据库保持锁定且无法恢复，以防发生另一起灾难性事件。当您为场景选择所需的选项后，按\
    \ `确定` 按钮。`图 [5-16]` 显示了点击 `确定` 后您应该看到的内容。\n\n![A436605_1_En_5_Fig16_HTML.jpg](img/A436605_1_En_5_Fig16_HTML.jpg)\n\
    图 5-16\n还原数据库，正在还原操作\n\n这需要一段时间才能完成，具体取决于备份的大小。我的备份大约需要 20 秒完成，因为我没有大量的数据需要恢复。最终，您应该会看到\
    \ `图 [5-17]` 中所示的内容。\n\n![A436605_1_En_5_Fig17_HTML.jpg](img/A436605_1_En_5_Fig17_HTML.jpg)\n\
    图 5-17\n还原成功\n\n成功！这条消息显然意味着我们的数据库已成功恢复。要检查此操作是否成功（遵循“信任，但要验证”的格言），只需运行 `清单 [5-3]`\
    \ 中的代码。\n\n```sql\nSELECT RH.[destination_database_name] as 'Database',\n    \
    \   RH.[restore_date] as 'Restore Date',\n       BS.[backup_start_date] as 'Backup\
    \ Start Date',\n       BS.[backup_finish_date] as 'Backup Finish Date',\n    \
    \   BS.[database_name] as 'Source Database',\n       BMF.[physical_device_name]\
    \ as 'Backup Filename'\nFROM [msdb].[dbo].[restorehistory] RH\nINNER JOIN [msdb].[dbo].[backupset]\
    \ BS\n ON RH.[backup_set_id] = BS.[backup_set_id]\nINNER JOIN [msdb].[dbo].[backupmediafamily]\
    \ BMF\n ON BS.[media_set_id] = BMF.[media_set_id]\nWHERE( MONTH([restore_date])\
    \ = MONTH(getDate())\n  AND DAY([restore_date]) = DAY(getDate())\n  AND YEAR([restore_date])\
    \ = YEAR(getDate()))\nORDER BY RH.[restore_date]\n```\n清单 5-3\n信任，但要验证\n\n运行此代码将显示\
    \ `图 [5-18]` 中所示的内容。请注意，您的结果可能会因恢复日期、文件名和数据库名称而异。\n\n![A436605_1_En_5_Fig18_HTML.jpg](img/A436605_1_En_5_Fig18_HTML.jpg)\n\
    图 5-18\n信任，但要验证的结果\n\n有证据表明我们的备份是完整的，并且恢复成功。另请注意，列出的六个文件按顺序排列，与我们之前在 `图 [5-1]`\
    \ 的 `常规` 选项卡中看到的相同。请翻回该图，并将 `图 [5-13]` 中的文件名与 `图 [5-18]` 中的文件名进行比较。它们是相同的，这再次证明了我们的操作是成功的。\n"
- fmt: '### Restoring to a Point in Time


    You can consider yourself extremely fortunate if you have not had a catastrophic
    failure in your database. I can count on one hand the number of times that I have
    had to spend a day searching for log files and applying backups, and sometimes,
    those backups were either outdated or corrupt. “Frustrating” doesn’t really begin
    to describe how I felt at those times; I think “enraged” is probably a more apt
    description.


    More than likely, there will come a time when you will need to restore to a particular
    point in time, and you are going to need to act quickly to restore the necessary
    data. In situations like this, there are a few different ways that you can approach
    the situation: one way is to follow these directions for a point-in-time restore,
    and another is to fully restore the database to another database instance and
    restore the data you need from the restored tables in the secondary database.
    I describe this at length in the section titled “Emergency Full Restore Example”
    in this chapter. For now, we will focus on point-in-time restores.


    Let’s start by really messing up our database, shall we? Let’s drop our `users1`
    table. That should let us generate a fairly sizeable transaction in the tail of
    our transaction log to recover from. Our starting record count is 20030001 rows,
    just for comparison purposes after the restore operation is complete. Simply type
    the following in a New Query window and press F5 or the Execute button in the
    toolbar to execute the query:


    ```

    DROP TABLE users1;

    ```


    Next, execute the statement:


    ```

    SELECT count(*) as cnt FROM users1;

    ```


    and you will get the message `Invalid object name ''users1''`. We can also refresh
    our Tables in Object Explorer and verify that `users1` is definitely gone now.


    To continue, right-click your database (backrecTestDB, in my case), expand Tasks,
    and then expand Restore, and you should see what is shown in Figure 5-19.


    ![A436605_1_En_5_Fig19_HTML.jpg](A436605_1_En_5_Fig19_HTML.jpg)

    Figure 5-19: Location of Restore menu items


    Click Database, and you will be shown an interface similar to Figure 5-20. This
    is also similar to what we saw earlier in Figure 5-13.


    ![A436605_1_En_5_Fig20_HTML.jpg](A436605_1_En_5_Fig20_HTML.jpg)

    Figure 5-20: Restore Database screen


    This page should be familiar to you by now. We are going to press the Timeline
    button on the right side of the interface to continue. After pressing the Timeline
    button, you will see what is shown in Figure 5-21.


    ![A436605_1_En_5_Fig21_HTML.jpg](A436605_1_En_5_Fig21_HTML.jpg)

    Figure 5-21: Backup Timeline, Last backup taken


    The default option is Last backup taken. This is exactly the same as just pressing
    OK on the previous screen; it restores based on what files are available to be
    restored, and that’s all.


    We want to click the Specific date and time radio button in order to see what
    we can restore. Notice how the interface changes to what is shown in Figure 5-22.


    ![A436605_1_En_5_Fig22_HTML.jpg](A436605_1_En_5_Fig22_HTML.jpg)

    Figure 5-22: Backup Timeline, Specific date and time


    See how the Timeline Interval value has changed to include the tail of the transaction
    log? That is because we are including the part of the transaction log that has
    not been backed up yet. Normally, the cutoff time would be the end of that transaction
    log, and because I have my transaction log backups running every hour, I can only
    lose an hour’s worth of data (with a corrupted transaction log). Feel free to
    look around in here without pressing the OK button. For example, you can change
    the Timeline Interval from Day to Hour, Six Hour, or Week and see how that affects
    the data that you can restore. There is an extremely small degree of granularity
    in this area, which can be expanded to a very high degree with a simple drop-down
    selection.


    Once you are ready to continue on, move the slider bar under the Timeline Interval
    to the desired point in time you wish to restore to, and press OK. For this example,
    I am going to restore to 6:40:31 pm on 10/9/2017, since I know that was before
    I dropped my `users1` table. I do not need to do anything else on the General
    tab, and the Files tab is okay as well. Skip over to the Options tab, where we
    want to check the Overwrite the existing database (`WITH REPLACE`) option and
    uncheck the Leave source database in the restoring state (`WITH NORECOVERY`) check
    box before pressing OK to begin the restore process. I would want to leave the
    Leave source database in the restoring state (`WITH NORECOVERY`) check box checked
    if I wanted to restore more files after this set of restore operations, but since
    I don’t want to restore anything else, I am going to leave this unchecked. Note
    that a tail-log backup will be taken unless the Take tail-log backup before restore
    check box is unchecked. In this case, I am going to leave the Take tail-log backup
    before restore option selected. Once all my settings are how I want them, I am
    going to click OK. After I press OK, I am presented with what is shown in Figure
    5-23, and after about a minute, I am presented with what is shown in Figure 5-24.


    ![A436605_1_En_5_Fig24_HTML.jpg](A436605_1_En_5_Fig24_HTML.jpg)

    Figure 5-24: Restore successful


    ![A436605_1_En_5_Fig23_HTML.jpg](A436605_1_En_5_Fig23_HTML.jpg)

    Figure 5-23: Restore Database


    At this point, I know that my database has restored successfully. However, I still
    want to verify that SQL Server actually did what it was supposed to do (remember,
    Trust but Verify). Let’s run the simple script we ran before:


    ```

    SELECT count(*) as cnt FROM users1;

    ```


    and view the results. The query runs for a few seconds, and then returns the value
    20030001. Exactly as we had initially! Therefore, we can safely assume that this
    database has been completely restored as of the time that we selected in the Timeline
    area.'
