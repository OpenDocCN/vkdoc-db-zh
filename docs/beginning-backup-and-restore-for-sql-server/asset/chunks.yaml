- fmt: "### Notifications Tab\n\nThe initial interface for this screen is shown in\
    \ Figure 9-24. Note that the only option selected here is `Write to the Windows\
    \ Application event log`. That is good, but we need more notification than just\
    \ an entry in a log somewhere that we have to go and search for, and then try\
    \ and figure out the exact cause of the error. Instead, we can use this area to\
    \ set up real-time notifications for any failures of this job.\n\n![A436605_1_En_9_Fig24_HTML.jpg](A436605_1_En_9_Fig24_HTML.jpg)\n\
    \nFigure 9-24\n\nJob Step Properties – Subplan_1, Notifications tab\n\nListing\
    \ 9-11 shows the various options and values in this area. To use the `E-mail`,\
    \ `Page`, and `Net send` options, you must already have an `Operator` established.\
    \ I will go into how to set up an `Operator` in the next section, since we will\
    \ be using this functionality.\n\nListing 9-11. Notifications Options\n\n*   `E-mail`\n\
    \    *   This is probably the most used option, since e-mail is so prevalent.\
    \ Just select the `Operator` with a verified e-mail, and then select the condition\
    \ from the drop-down menu.\n*   `Page`\n    *   For those datacenters that still\
    \ use pagers, this is a great way to keep in contact. Alternatively, you can think\
    \ of texting someone as the functional equivalent of paging someone if they do\
    \ not have a pager.\n*   `Net send`\n    *   If your PC and the database server\
    \ are on the same network and your PC has a direct connection to the database\
    \ server, then you can use `Net send` to send a message directly to your PC from\
    \ the database server. This message appears as a modal dialog box on your PC.\n\
    *   `Write to the Windows Application event log`\n    *   The only selected option\
    \ by default in this area. Not a bad idea to keep this checked.\n*   `Automatically\
    \ delete job`\n    *   As with before, I can’t imagine an instance when I would\
    \ want to delete a job after it finishes, mainly because the history for the job\
    \ is either deleted or obfuscated, and there goes any forensic information we\
    \ may need for the job.\n\nFor each of these options, the drop-down menu on the\
    \ right has the following three options:\n\n*   `When the job succeeds`\n    *\
    \   The entire job must be a success.\n*   `When the job fails`\n    *   The entire\
    \ job must be a failure.\n*   `When the job completes`\n    *   The entire job\
    \ simply must complete, whether a success or failure.\n\nThis section is complete,\
    \ so click the `OK` button to save changes and return to the stage once again.\
    \ Notice that the job name is now updated to `Full Backup` in the `Jobs` submenu\
    \ of the `SQL Server Agent` menu in `Object Explorer`. We will return to this\
    \ `Notifications` tab after we finish setting up an `Operator`.\n\n#### Setting\
    \ Up an Operator\n\nIn my first book, Practical Maintenance Plans in SQL Server,\
    \ I detailed how to set up a new `Operator` using the Alerts tab. There is a method\
    \ to add a new `Operator` in that section, but I wanted to devote this section\
    \ to using the `Operators` submenu from the `SQL Server Agent` menu in `Object\
    \ Explorer`.\n\nAn `Operator` in this context is a person responsible for receiving\
    \ information about the state of the database at the time that events occur. They\
    \ may not necessarily be the person that can mitigate the circumstance, but they\
    \ are a person that can trigger an action to encourage the change. For example,\
    \ an executive might want to be notified when a backup fails for their own edification,\
    \ but I seriously doubt that this executive will be able to fix the issue.\n\n\
    At this point, your `SQL Server Agent` menu should appear as shown in Figure 9-25,\
    \ specifically in regards to the updated job name.\n\n![A436605_1_En_9_Fig25_HTML.jpg](A436605_1_En_9_Fig25_HTML.jpg)\n\
    \nFigure 9-25\n\nSQL Server Agent menu\n\nRight-click `Operators` and choose `New\
    \ Operator…` to continue. The initial interface is shown in Figure 9-26.\n\n![A436605_1_En_9_Fig26_HTML.jpg](A436605_1_En_9_Fig26_HTML.jpg)\n\
    \nFigure 9-26\n\nNew Operator\n\nWe are going to enter the actual name of the\
    \ person that will be receiving the notifications in the `Name` field, and their\
    \ e-mail in the `E-mail name` field. If you have a `NET SEND` address, you can\
    \ enter it here. Same thing with the pager information; if you have this info,\
    \ enter it here. If you don’t have this info or don’t need to use it, then you\
    \ can just leave it blank.\n\nOnce you have entered this information, you should\
    \ have an interface very similar to what is shown in Figure 9-27.\n\n![A436605_1_En_9_Fig27_HTML.jpg](A436605_1_En_9_Fig27_HTML.jpg)\n\
    \nFigure 9-27\n\nNew Operator, updated\n\nNext, we want to take a look at the\
    \ `Notifications` tab, although there is nothing we can do in this area since\
    \ we are creating this user for the first time. If this user had existed for a\
    \ while, then there would be information in here that we can view that would detail\
    \ the notifications sent to this user. This would be advantageous if there were\
    \ an instance when a user disputed the receipt of a notification, for instance.\n\
    \nGo ahead and click the `OK` button to proceed with creating this `Operator`.\
    \ Notice that our `Operators` submenu now has the entry of the username we just\
    \ created. This means that this user is now available to be assigned as an `Operator`\
    \ within the job, so double-click `Full Backup Job` again and click the `Notifications`\
    \ tab. This will bring up the window shown in Figure 9-24, except we can now add\
    \ our `Operator`. Figure 9-28 shows this option available in the `Notifications`\
    \ tab of the Job Properties window.\n\n![A436605_1_En_9_Fig28_HTML.jpg](A436605_1_En_9_Fig28_HTML.jpg)\n\
    \nFigure 9-28\n\nOperator available\n\nI chose my new `Operator`, kept the event\
    \ drop-down menu set to `When the job fails`, and then clicked `OK`. This added\
    \ my `Operator` user to the `Notifications` tab, which means that I will be receiving\
    \ e-mails if this job fails.\n\nThat’s all for setting up the maintenance plan.\
    \ We have defined the actual parameters of the task, and set up and enabled an\
    \ `Operator` to receive notifications of failure. Next, we need to test this plan\
    \ to make sure that it is executing properly."
  raw: "### Notifications Tab\n\nThe initial interface for this screen is shown in\
    \ Figure [9-24](#A436605_1_En_9_Chapter.html#Fig24). Note that the only option\
    \ selected here is Write to the Windows Application event log. That is good, but\
    \ we need more notification than just an entry in a log somewhere that we have\
    \ to go and search for, and then try and figure out the exact cause of the error.\
    \ Instead, we can use this area to set up real-time notifications for any failures\
    \ of this job.\n\n![A436605_1_En_9_Fig24_HTML.jpg](A436605_1_En_9_Fig24_HTML.jpg)\n\
    \nFigure 9-24\n\nJob Step Properties – Subplan_1, Notifications tab\n\nListing\
    \ [9-11](#A436605_1_En_9_Chapter.html#Par229) shows the various options and values\
    \ in this area. To use the E-mail, Page, and Net send options, you must already\
    \ have an Operator established. I will go into how to set up an Operator in the\
    \ next section, since we will be using this functionality.\n\nListing 9-11. Notifications\
    \ Options\n\n*   E-mail\n    *   This is probably the most used option, since\
    \ e-mail is so prevalent. Just select the Operator with a verified e-mail, and\
    \ then select the condition from the drop-down menu.\n*   Page\n    *   For those\
    \ datacenters that still use pagers, this is a great way to keep in contact. Alternatively,\
    \ you can think of texting someone as the functional equivalent of paging someone\
    \ if they do not have a pager.\n*   Net send\n    *   If your PC and the database\
    \ server are on the same network and your PC has a direct connection to the database\
    \ server, then you can use Net send to send a message directly to your PC from\
    \ the database server. This message appears as a modal dialog box on your PC.\n\
    *   Write to the Windows Application event log\n    *   The only selected option\
    \ by default in this area. Not a bad idea to keep this checked.\n*   Automatically\
    \ delete job\n    *   As with before, I can’t imagine an instance when I would\
    \ want to delete a job after it finishes, mainly because the history for the job\
    \ is either deleted or obfuscated, and there goes any forensic information we\
    \ may need for the job.\n\nFor each of these options, the drop-down menu on the\
    \ right has the following three options:\n\n*   When the job succeeds\n    * \
    \  The entire job must be a success.\n*   When the job fails\n    *   The entire\
    \ job must be a failure.\n*   When the job completes\n    *   The entire job simply\
    \ must complete, whether a success or failure.\n\nThis section is complete, so\
    \ click the OK button to save changes and return to the stage once again. Notice\
    \ that the job name is now updated to Full Backup in the Jobs submenu of the SQL\
    \ Server Agent menu in Object Explorer. We will return to this Notifications tab\
    \ after we finish setting up an Operator.\n\n#### Setting Up an Operator\n\nIn\
    \ my first book, Practical Maintenance Plans in SQL Server, I detailed how to\
    \ set up a new Operator using the Alerts tab. There is a method to add a new Operator\
    \ in that section, but I wanted to devote this section to using the Operators\
    \ submenu from the SQL Server Agent menu in Object Explorer.\n\nAn Operator in\
    \ this context is a person responsible for receiving information about the state\
    \ of the database at the time that events occur. They may not necessarily be the\
    \ person that can mitigate the circumstance, but they are a person that can trigger\
    \ an action to encourage the change. For example, an executive might want to be\
    \ notified when a backup fails for their own edification, but I seriously doubt\
    \ that this executive will be able to fix the issue.\n\nAt this point, your SQL\
    \ Server Agent menu should appear as shown in Figure [9-25](#A436605_1_En_9_Chapter.html#Fig25),\
    \ specifically in regards to the updated job name.\n\n![A436605_1_En_9_Fig25_HTML.jpg](A436605_1_En_9_Fig25_HTML.jpg)\n\
    \nFigure 9-25\n\nSQL Server Agent menu\n\nRight-click Operators and choose New\
    \ Operator… to continue. The initial interface is shown in Figure [9-26](#A436605_1_En_9_Chapter.html#Fig26).\n\
    \n![A436605_1_En_9_Fig26_HTML.jpg](A436605_1_En_9_Fig26_HTML.jpg)\n\nFigure 9-26\n\
    \nNew Operator\n\nWe are going to enter the actual name of the person that will\
    \ be receiving the notifications in the Name field, and their e-mail in the E-mail\
    \ name field. If you have a NET SEND address, you can enter it here. Same thing\
    \ with the pager information; if you have this info, enter it here. If you don’t\
    \ have this info or don’t need to use it, then you can just leave it blank.\n\n\
    Once you have entered this information, you should have an interface very similar\
    \ to what is shown in Figure [9-27](#A436605_1_En_9_Chapter.html#Fig27).\n\n![A436605_1_En_9_Fig27_HTML.jpg](A436605_1_En_9_Fig27_HTML.jpg)\n\
    \nFigure 9-27\n\nNew Operator, updated\n\nNext, we want to take a look at the\
    \ Notifications tab, although there is nothing we can do in this area since we\
    \ are creating this user for the first time. If this user had existed for a while,\
    \ then there would be information in here that we can view that would detail the\
    \ notifications sent to this user. This would be advantageous if there were an\
    \ instance when a user disputed the receipt of a notification, for instance.\n\
    \nGo ahead and click the OK button to proceed with creating this Operator. Notice\
    \ that our Operators submenu now has the entry of the username we just created.\
    \ This means that this user is now available to be assigned as an Operator within\
    \ the job, so double-click Full Backup Job again and click the Notifications tab.\
    \ This will bring up the window shown in Figure [9-24](#A436605_1_En_9_Chapter.html#Fig24),\
    \ except we can now add our Operator. Figure [9-28](#A436605_1_En_9_Chapter.html#Fig28)\
    \ shows this option available in the Notifications tab of the Job Properties window.\n\
    \n![A436605_1_En_9_Fig28_HTML.jpg](A436605_1_En_9_Fig28_HTML.jpg)\n\nFigure 9-28\n\
    \nOperator available\n\nI chose my new Operator, kept the event drop-down menu\
    \ set to When the job fails, and then clicked OK. This added my Operator user\
    \ to the Notifications tab, which means that I will be receiving e-mails if this\
    \ job fails.\n\nThat’s all for setting up the maintenance plan. We have defined\
    \ the actual parameters of the task, and set up and enabled an Operator to receive\
    \ notifications of failure. Next, we need to test this plan to make sure that\
    \ it is executing properly."
  trans: "\n### 通知选项卡\n\n此屏幕的初始界面如图 9-24 所示。请注意，这里唯一选中的选项是`写入 Windows 应用程序事件日志`。这很好，但我们需要的不仅仅是某处日志中的一个条目——我们还得去搜索它，然后尝试确定错误的确切原因。相反，我们可以利用此区域为此作业的任何失败设置实时通知。\n\
    \n![A436605_1_En_9_Fig24_HTML.jpg](img/A436605_1_En_9_Fig24_HTML.jpg)\n\n图 9-24\n\
    \n作业步骤属性 – Subplan_1，通知选项卡\n\n清单 9-11 展示了此区域的各种选项和值。要使用`电子邮件`、`寻呼`和`Net send`选项，您必须已经建立了一个`操作员`。由于我们将使用此功能，我将在下一节介绍如何设置`操作员`。\n\
    \n清单 9-11. 通知选项\n\n*   `电子邮件`\n    *   这可能是使用最多的选项，因为电子邮件非常普遍。只需选择一个拥有已验证电子邮件的`操作员`，然后从下拉菜单中选择条件。\n\
    *   `寻呼`\n    *   对于仍在使用寻呼机的数据中心，这是保持联系的好方法。或者，如果某人没有寻呼机，您也可以将给他们发短信视为等同于寻呼。\n\
    *   `Net send`\n    *   如果您的个人电脑和数据库服务器位于同一网络上，并且您的个人电脑与数据库服务器有直接连接，那么您可以使用`Net\
    \ send`从数据库服务器直接向您的个人电脑发送消息。此消息将以模式对话框的形式出现在您的个人电脑上。\n*   `写入 Windows 应用程序事件日志`\n\
    \    *   此区域中默认唯一选中的选项。保持勾选此项是个不错的主意。\n*   `自动删除作业`\n    *   和之前一样，我无法想象会在作业完成后想要删除它的实例，主要是因为该作业的历史记录要么被删除，要么变得难以解读，这样我们就失去了可能需要的任何取证信息。\n\
    \n对于这些选项中的每一个，右侧的下拉菜单都有以下三个选项：\n\n*   `作业成功时`\n    *   整个作业必须成功。\n*   `作业失败时`\n\
    \    *   整个作业必须失败。\n*   `作业完成时`\n    *   整个作业只需完成即可，无论成功还是失败。\n\n本节内容已完成，因此单击`确定`按钮保存更改并再次返回到设计器。请注意，在`对象资源管理器`的`SQL\
    \ Server 代理`菜单的`作业`子菜单中，作业名称现已更新为`完整备份`。我们将在完成`操作员`的设置后，再回到此`通知`选项卡。\n\n#### 设置操作员\n\
    \n在我的第一本书《SQL Server 中的实用维护计划》中，我详细介绍了如何使用警报选项卡设置新的`操作员`。在该部分有一种添加新`操作员`的方法，但我想专门在本节中介绍如何使用`对象资源管理器`中`SQL\
    \ Server 代理`菜单下的`操作员`子菜单。\n\n在此上下文中，`操作员`是指负责在事件发生时接收有关数据库状态信息的人员。他们不一定是能够缓解情况的人，但他们是能够触发行动以促成改变的人。例如，一位高管可能希望在备份失败时得到通知，以便他们了解情况，但我非常怀疑这位高管是否能够解决这个问题。\n\
    \n此时，您的`SQL Server 代理`菜单应如图 9-25 所示，特别是在作业名称已更新的部分。\n\n![A436605_1_En_9_Fig25_HTML.jpg](img/A436605_1_En_9_Fig25_HTML.jpg)\n\
    \n图 9-25\n\nSQL Server 代理菜单\n\n右键单击`操作员`并选择`新建操作员…`以继续。初始界面如图 9-26 所示。\n\n![A436605_1_En_9_Fig26_HTML.jpg](img/A436605_1_En_9_Fig26_HTML.jpg)\n\
    \n图 9-26\n\n新建操作员\n\n我们将在`名称`字段中输入将接收通知的人员的实际姓名，并在其`电子邮件名称`字段中输入他们的电子邮件地址。如果您有一个`NET\
    \ SEND`地址，可以在此处输入。寻呼机信息也是如此；如果您有此信息，请在此处输入。如果您没有此信息或不需要使用，可以将其留空。\n\n输入此信息后，您的界面应与图\
    \ 9-27 所示非常相似。\n\n![A436605_1_En_9_Fig27_HTML.jpg](img/A436606_1_En_9_Fig27_HTML.jpg)\n\
    \n图 9-27\n\n新建操作员，已更新\n\n接下来，我们想查看`通知`选项卡，尽管在此区域我们暂时无法操作，因为我们是首次创建此用户。如果此用户已存在一段时间，那么这里会有一些我们可以查看的信息，详细说明发送给此用户的通知。例如，如果有用户对收到通知提出异议，这将是有用的。\n\
    \n请单击`确定`按钮继续创建此`操作员`。请注意，我们的`操作员`子菜单现在包含了我们刚刚创建的用户名条目。这意味着该用户现在可以在作业内被指定为`操作员`，因此请再次双击`完整备份作业`并单击`通知`选项卡。这将调出如图\
    \ 9-24 所示的窗口，只是我们现在可以添加我们的`操作员`了。图 9-28 显示了作业属性窗口的`通知`选项卡中此选项可用。\n\n![A436605_1_En_9_Fig28_HTML.jpg](img/A436605_1_En_9_Fig28_HTML.jpg)\n\
    \n图 9-28\n\n操作员可用\n\n我选择了我的新`操作员`，将事件下拉菜单保持设置为`作业失败时`，然后单击`确定`。这便将我的`操作员`用户添加到了`通知`选项卡，这意味着如果此作业失败，我将收到电子邮件。\n\
    \n设置维护计划到此就完成了。我们已经定义了任务的实际参数，并设置并启用了一个`操作员`来接收失败通知。接下来，我们需要测试此计划，以确保其正常执行。\n"
- fmt: "## Testing the Full Backup Plan\n\nIn order to properly determine if our plan\
    \ is working correctly, we need to define exit criteria for the plan. In this\
    \ instance, Listing [9-12](#A436605_1_En_9_Chapter.html#Par259) details what we\
    \ will be looking for as exit criteria.\n\nListing 9-12. Exit Criteria\n\n*  \
    \ Job starts correctly and without error\n*   Backup file is created in the correct\
    \ location\n*   Notification sent if an error occurs\n*   Windows event log keeps\
    \ a log of the backup operation\n*   Job exits correctly and without error\n\n\
    The successful completion of these items will determine the overall success of\
    \ the plan. I am going to manually start the job instead of waiting until midnight\
    \ for it run automatically. I can start the job at any time by right-clicking\
    \ the job and selecting the `Start Job at Step…` option. Alternatively, if I wanted\
    \ to run the entire maintenance plan, I could right-click the maintenance plan\
    \ name and select the `Execute` option. I just want to check the job first, so\
    \ right-click the job and execute it as noted previously. It runs for a few seconds,\
    \ and then we can see that a new directory was created in `E:\\SQL Server\\Backup`\
    \ named `backrecTestDB`, and a new backup file was placed in the directory. We\
    \ also see a success message in a dialog window shown in Figure [9-29](#A436605_1_En_9_Chapter.html#Fig29).\n\
    \n![A436605_1_En_9_Fig29_HTML.jpg](A436605_1_En_9_Fig29_HTML.jpg)\n\nFigure 9-29\n\
    \nSuccess message\n\nIf we open up the Windows event log and go to the Application\
    \ log, we will see what is shown in Figure [9-30](#A436605_1_En_9_Chapter.html#Fig30),\
    \ which is confirmation that Windows sees our backup action as a successful task.\n\
    \n![A436605_1_En_9_Fig30_HTML.jpg](A436605_1_En_9_Fig30_HTML.jpg)\n\nFigure 9-30\n\
    \nWindows Application event log\n\nThe only thing we didn’t test at this point\
    \ is the Notifications option, which did not fire because it did not fail.\n\n\
    ## Full Restore Plan in SSMS\n\nThis section will detail how to get a solid Restore\
    \ plan from available backup files. The good thing about this section is that\
    \ it is dependent solely upon there being a backup set of data to restore; if\
    \ there is not a backup to restore from, then we cannot restore any data.\n\n\
    In SSMS, there is not a restore database task that we can run. Instead, we need\
    \ to use the T-SQL commands for restoring the database, and wrap that command\
    \ inside of a SQL Server Agent job that we can execute on demand. The basic structure\
    \ for how we plan to implement this is simple, as shown in Listing [9-13](#A436605_1_En_9_Chapter.html#Par270).\n\
    \nListing 9-13. Structure for Restoring Data\n\n*   Use known-good `RESTORE DATABASE`\
    \ command from Chapter [5](#A436605_1_En_5_Chapter.html) as basis for T-SQL syntax\n\
    *   Create SQL Server Agent job with T-SQL type\n*   Create a copy of the current\
    \ full backup and rename it `backrecTestDB.bak`\n*   Restore data normally\n\n\
    I want to pause right here and make a quick point: the reason that we are copying\
    \ and renaming our backup file is because I do not want to break the restore chain\
    \ that is in place by the maintenance plan. I want to use the same data, but the\
    \ script must have a static file name to reference in the restore script, which\
    \ is why I chose to copy and rename the file. I’m sure there are different ways\
    \ to handle this aspect, and if you have a different way of handling this, excellent!\n\
    \n### T-SQL Restore Command\n\nReferencing back to Chapter [5](#A436605_1_En_5_Chapter.html),\
    \ the command that we used to restore the data was\n\n```\nRESTORE DATABASE backrecTestDB\n\
    FROM DISK = 'E:\\SQL Server\\Backup\\backrecTestDB\\backrecTestDB.bak'\nWITH REPLACE\n\
    GO\n```\n\nWe will use this same command in our restore job, so make a note of\
    \ the `FROM DISK` location because we will need to use that location when we rename\
    \ our file in this section.\n\n### SQL Server Agent Restore Job\n\nTo start this\
    \ section off, we need to create a SQL Server Agent job without first creating\
    \ a maintenance plan. Expand SQL Server Agent and right-click `Jobs`, then select\
    \ `New Job…` to continue. The New Job window opens as shown in Figure [9-31](#A436605_1_En_9_Chapter.html#Fig31);\
    \ note that it is slightly different from the window we saw earlier that had some\
    \ of the information referenced from the maintenance plan.\n\n![A436605_1_En_9_Fig31_HTML.jpg](A436605_1_En_9_Fig31_HTML.jpg)\n\
    \nFigure 9-31\n\nNew Job window, General tab\n\nIt’s a literal blank slate for\
    \ us to create whatever we want. On this screen, we want to update the following\
    \ values in Listing [9-14](#A436605_1_En_9_Chapter.html#Par281).\n\nListing 9-14. New\
    \ Job Values\n\n*   Name\n    *   Update to full restore\n*   Owner\n    *   This\
    \ should either be the `sa` (main admin) account in SQL Server, or a custom server\
    \ agent service account, not a regular user account\n*   Category\n    *   Change\
    \ this to database maintenance\n*   Description\n    *   Enter something like\
    \ “This is the full restore portion of the full Restore plan”\n\nAlso, we want\
    \ to make sure that the Enabled check box stays checked. Next, we want to select\
    \ the Steps tab on the left. A blank window opens as shown in Figure [9-32](#A436605_1_En_9_Chapter.html#Fig32).\n\
    \n![A436605_1_En_9_Fig32_HTML.jpg](A436605_1_En_9_Fig32_HTML.jpg)\n\nFigure 9-32\n\
    \nNew Job window, Steps tab\n\nFor this page, we are going to click the `New…`\
    \ button on the bottom of the screen and see the New Job Step screen shown in\
    \ Figure [9-33](#A436605_1_En_9_Chapter.html#Fig33).\n\n![A436605_1_En_9_Fig33_HTML.jpg](A436605_1_En_9_Fig33_HTML.jpg)\n\
    \nFigure 9-33\n\nNew Job Step, General tab\n\nAgain, this is a new interface for\
    \ us. We may be used to seeing this screen with information prepopulated from\
    \ a maintenance plan, but this is actually very easy. Next, we need to update\
    \ the values shown in Listing [9-15](#A436605_1_En_9_Chapter.html#Par293).\n\n\
    Listing 9-15. General Tab Options\n\n*   Step name\n    *   Full Restore T-SQL\
    \ Command\n*   Type\n    *   Transact-SQL script (T-SQL)\n*   Run as\n    *  \
    \ (This value cannot be updated yet)\n*   Database\n    *   Master\n*   Command\n\
    \    *   Paste the T-SQL script from the T-SQL Restore Command section.\n\nNotice\
    \ that we can’t update the `Run as:` value yet. This is okay for now, since we\
    \ have to save these values and then come back to this screen again. You should\
    \ see what is in Figure [9-34](#A436605_1_En_9_Chapter.html#Fig34) now.\n\n![A436605_1_En_9_Fig34_HTML.jpg](A436605_1_En_9_Fig34_HTML.jpg)\n\
    \nFigure 9-34\n\nNew Job Step, General tab (updated)\n\nOnce this is all filled\
    \ out, click the OK button to create the preliminary job. Immediately double-click\
    \ the job again and you will see that the `Run as:` drop-down menu is now enabled.\
    \ However, there is no selectable value. We cannot choose to run this job as SQL\
    \ Server Agent, in other words.\n\nClick the Advanced tab and you will see the\
    \ screen shown in Figure [9-35](#A436605_1_En_9_Chapter.html#Fig35).\n\n![A436605_1_En_9_Fig35_HTML.jpg](A436605_1_En_9_Fig35_HTML.jpg)\n\
    \nFigure 9-35\n\nJob Step Properties, Advanced tab\n\nAgain, we need to update\
    \ these options to the values shown in Listing [9-16](#A436605_1_En_9_Chapter.html#Par308).\n\
    \nListing 9-16. Advanced Tab Options\n\n*   On success action\n    *   Keep this\
    \ as the default value.\n*   Retry attempts\n    *   Keep this as the default\
    \ value.\n*   Retry interval (minutes)\n    *   Keep this as the default value.\n\
    *   On failure action\n    *   Keep this as the default value.\n*   Output file\n\
    \    *   Keep this blank, unless you want to create an output file. I don’t create\
    \ them because I am creating the entries in the table and the step output in history,\
    \ but you are free to do as you wish.\n*   Log to table\n    *   Select this option.\n\
    *   Include step output in history\n    *   Select this option.\n*   Run as user\n\
    \    *   Leave this blank. When we do this, the job is forced to run as SQL Server\
    \ Agent service account."
  raw: "## Testing the Full Backup Plan\n\nIn order to properly determine if our plan\
    \ is working correctly, we need to define exit criteria for the plan. In this\
    \ instance, Listing [9-12](#A436605_1_En_9_Chapter.html#Par259) details what we\
    \ will be looking for as exit criteria.\n\nListing 9-12. Exit Criteria\n\n*  \
    \ Job starts correctly and without error\n*   Backup file is created in the correct\
    \ location\n*   Notification sent if an error occurs\n*   Windows event log keeps\
    \ a log of the backup operation\n*   Job exits correctly and without error\n\n\
    The successful completion of these items will determine the overall success of\
    \ the plan. I am going to manually start the job instead of waiting until midnight\
    \ for it run automatically. I can start the job at any time by right-clicking\
    \ the job and selecting the Start Job at Step… option. Alternatively, if I wanted\
    \ to run the entire maintenance plan, I could right-click the maintenance plan\
    \ name and select the Execute option. I just want to check the job first, so right-click\
    \ the job and execute it as noted previously. It runs for a few seconds, and then\
    \ we can see that a new directory was created in E:\\SQL Server\\Backup named\
    \ backrecTestDB, and a new backup file was placed in the directory. We also see\
    \ a success message in a dialog window shown in Figure [9-29](#A436605_1_En_9_Chapter.html#Fig29).\n\
    \n![A436605_1_En_9_Fig29_HTML.jpg](A436605_1_En_9_Fig29_HTML.jpg)\n\nFigure 9-29\n\
    \nSuccess message\n\nIf we open up the Windows event log and go to the Application\
    \ log, we will see what is shown in Figure [9-30](#A436605_1_En_9_Chapter.html#Fig30),\
    \ which is confirmation that Windows sees our backup action as a successful task.\n\
    \n![A436605_1_En_9_Fig30_HTML.jpg](A436605_1_En_9_Fig30_HTML.jpg)\n\nFigure 9-30\n\
    \nWindows Application event log\n\nThe only thing we didn’t test at this point\
    \ is the Notifications option, which did not fire because it did not fail.\n\n\
    ## Full Restore Plan in SSMS\n\nThis section will detail how to get a solid Restore\
    \ plan from available backup files. The good thing about this section is that\
    \ it is dependent solely upon there being a backup set of data to restore; if\
    \ there is not a backup to restore from, then we cannot restore any data.\n\n\
    In SSMS, there is not a restore database task that we can run. Instead, we need\
    \ to use the T-SQL commands for restoring the database, and wrap that command\
    \ inside of a SQL Server Agent job that we can execute on demand. The basic structure\
    \ for how we plan to implement this is simple, as shown in Listing [9-13](#A436605_1_En_9_Chapter.html#Par270).\n\
    \nListing 9-13. Structure for Restoring Data\n\n*   Use known-good RESTORE DATABASE\
    \ command from Chapter [5](#A436605_1_En_5_Chapter.html) as basis for T-SQL syntax\n\
    *   Create SQL Server Agent job with T-SQL type\n*   Create a copy of the current\
    \ full backup and rename it backrecTestDB.bak\n*   Restore data normally\n\nI\
    \ want to pause right here and make a quick point: the reason that we are copying\
    \ and renaming our backup file is because I do not want to break the restore chain\
    \ that is in place by the maintenance plan. I want to use the same data, but the\
    \ script must have a static file name to reference in the restore script, which\
    \ is why I chose to copy and rename the file. I’m sure there are different ways\
    \ to handle this aspect, and if you have a different way of handling this, excellent!\n\
    \n### T-SQL Restore Command\n\nReferencing back to Chapter [5](#A436605_1_En_5_Chapter.html),\
    \ the command that we used to restore the data was\n\n```\nRESTORE DATABASE backrecTestDB\n\
    FROM DISK = 'E:\\SQL Server\\Backup\\backrecTestDB\\backrecTestDB.bak'\nWITH REPLACE\n\
    GO\n```\n\nWe will use this same command in our restore job, so make a note of\
    \ the `FROM DISK` location because we will need to use that location when we rename\
    \ our file in this section.\n\n### SQL Server Agent Restore Job\n\nTo start this\
    \ section off, we need to create a SQL Server Agent job without first creating\
    \ a maintenance plan. Expand SQL Server Agent and right-click Jobs, then select\
    \ New Job… to continue. The New Job window opens as shown in Figure [9-31](#A436605_1_En_9_Chapter.html#Fig31);\
    \ note that it is slightly different from the window we saw earlier that had some\
    \ of the information referenced from the maintenance plan.\n\n![A436605_1_En_9_Fig31_HTML.jpg](A436605_1_En_9_Fig31_HTML.jpg)\n\
    \nFigure 9-31\n\nNew Job window, General tab\n\nIt’s a literal blank slate for\
    \ us to create whatever we want. On this screen, we want to update the following\
    \ values in Listing [9-14](#A436605_1_En_9_Chapter.html#Par281).\n\nListing 9-14. New\
    \ Job Values\n\n*   Name\n    *   Update to full restore\n*   Owner\n    *   This\
    \ should either be the sa (main admin) account in SQL Server, or a custom server\
    \ agent service account, not a regular user account\n*   Category\n    *   Change\
    \ this to database maintenance\n*   Description\n    *   Enter something like\
    \ “This is the full restore portion of the full Restore plan”\n\nAlso, we want\
    \ to make sure that the Enabled check box stays checked. Next, we want to select\
    \ the Steps tab on the left. A blank window opens as shown in Figure [9-32](#A436605_1_En_9_Chapter.html#Fig32).\n\
    \n![A436605_1_En_9_Fig32_HTML.jpg](A436605_1_En_9_Fig32_HTML.jpg)\n\nFigure 9-32\n\
    \nNew Job window, Steps tab\n\nFor this page, we are going to click the New… button\
    \ on the bottom of the screen and see the New Job Step screen shown in Figure\
    \ [9-33](#A436605_1_En_9_Chapter.html#Fig33).\n\n![A436605_1_En_9_Fig33_HTML.jpg](A436605_1_En_9_Fig33_HTML.jpg)\n\
    \nFigure 9-33\n\nNew Job Step, General tab\n\nAgain, this is a new interface for\
    \ us. We may be used to seeing this screen with information prepopulated from\
    \ a maintenance plan, but this is actually very easy. Next, we need to update\
    \ the values shown in Listing [9-15](#A436605_1_En_9_Chapter.html#Par293).\n\n\
    Listing 9-15. General Tab Options\n\n*   Step name\n    *   Full Restore T-SQL\
    \ Command\n*   Type\n    *   Transact-SQL script (T-SQL)\n*   Run as\n    *  \
    \ (This value cannot be updated yet)\n*   Database\n    *   Master\n*   Command\n\
    \    *   Paste the T-SQL script from the T-SQL Restore Command section.\n\nNotice\
    \ that we can’t update the Run as: value yet. This is okay for now, since we have\
    \ to save these values and then come back to this screen again. You should see\
    \ what is in Figure [9-34](#A436605_1_En_9_Chapter.html#Fig34) now.\n\n![A436605_1_En_9_Fig34_HTML.jpg](A436605_1_En_9_Fig34_HTML.jpg)\n\
    \nFigure 9-34\n\nNew Job Step, General tab (updated)\n\nOnce this is all filled\
    \ out, click the OK button to create the preliminary job. Immediately double-click\
    \ the job again and you will see that the Run as: drop-down menu is now enabled.\
    \ However, there is no selectable value. We cannot choose to run this job as SQL\
    \ Server Agent, in other words.\n\nClick the Advanced tab and you will see the\
    \ screen shown in Figure [9-35](#A436605_1_En_9_Chapter.html#Fig35).\n\n![A436605_1_En_9_Fig35_HTML.jpg](A436605_1_En_9_Fig35_HTML.jpg)\n\
    \nFigure 9-35\n\nJob Step Properties, Advanced tab\n\nAgain, we need to update\
    \ these options to the values shown in Listing [9-16](#A436605_1_En_9_Chapter.html#Par308).\n\
    \nListing 9-16. Advanced Tab Options\n\n*   On success action\n    *   Keep this\
    \ as the default value.\n*   Retry attempts\n    *   Keep this as the default\
    \ value.\n*   Retry interval (minutes)\n    *   Keep this as the default value.\n\
    *   On failure action\n    *   Keep this as the default value.\n*   Output file\n\
    \    *   Keep this blank, unless you want to create an output file. I don’t create\
    \ them because I am creating the entries in the table and the step output in history,\
    \ but you are free to do as you wish.\n*   Log to table\n    *   Select this option.\n\
    *   Include step output in history\n    *   Select this option.\n*   Run as user\n\
    \    *   Leave this blank. When we do this, the job is forced to run as SQL Server\
    \ Agent service account."
  trans: "## 测试完整备份计划\n\n为了正确判断我们的计划是否运行正常，我们需要为该计划定义退出标准。在此示例中，清单 9-12 详细说明了我们将作为退出标准查看的内容。\n\
    \n清单 9-12. 退出标准\n\n*   作业正确启动且无错误\n*   备份文件在正确的位置创建\n*   发生错误时发送通知\n*   Windows\
    \ 事件日志记录备份操作\n*   作业正确退出且无错误\n\n这些项目的成功完成将决定整个计划的成功与否。我将手动启动作业，而不是等到午夜让它自动运行。我可以随时通过右键单击作业并选择\
    \ `在此步骤启动作业…` 选项来启动作业。或者，如果我想运行整个维护计划，我可以右键单击维护计划名称并选择 `执行` 选项。我只想先检查作业，因此如前所述，右键单击该作业并执行它。它运行了几秒钟，然后我们可以看到在\
    \ `E:\\SQL Server\\Backup` 中创建了一个名为 `backrecTestDB` 的新目录，并且一个新的备份文件被放置在该目录中。我们还在图\
    \ 9-29 所示的对话框窗口中看到了一条成功消息。\n\n![A436605_1_En_9_Fig29_HTML.jpg](img/A436605_1_En_9_Fig29_HTML.jpg)\n\
    \n图 9-29\n\n成功消息\n\n如果我们打开 Windows 事件日志并转到应用程序日志，我们将看到图 9-30 所示的内容，这确认了 Windows\
    \ 将我们的备份操作视为成功的任务。\n\n![A436605_1_En_9_Fig30_HTML.jpg](img/A436605_1_En_9_Fig30_HTML.jpg)\n\
    \n图 9-30\n\nWindows 应用程序事件日志\n\n我们此时唯一没有测试的是“通知”选项，由于没有发生故障，该选项未触发。\n\n## SSMS\
    \ 中的完整恢复计划\n\n本节将详细介绍如何从可用的备份文件中制定一个可靠的恢复计划。本节的好处在于，它完全依赖于存在可恢复的备份数据集；如果没有可恢复的备份，我们就无法恢复任何数据。\n\
    \n在 SSMS 中，没有我们可以运行的“还原数据库”任务。相反，我们需要使用用于还原数据库的 T-SQL 命令，并将该命令包装在我们能够按需执行的 SQL\
    \ Server 代理作业中。我们计划实现此目标的基本结构很简单，如清单 9-13 所示。\n\n清单 9-13. 数据恢复结构\n\n*   使用第 5\
    \ 章中已知可用的 `RESTORE DATABASE` 命令作为 T-SQL 语法的基础\n*   创建一个 T-SQL 类型的 SQL Server 代理作业\n\
    *   创建当前完整备份的副本并将其重命名为 `backrecTestDB.bak`\n*   正常恢复数据\n\n我想在这里暂停一下，并快速说明一点：我们复制和重命名备份文件的原因是因为我不想破坏维护计划已建立的恢复链。我想使用相同的数据，但脚本必须在恢复脚本中引用一个静态的文件名，这就是我选择复制和重命名文件的原因。我确定处理这一方面有不同的方法，如果你有不同的处理方法，那非常好！\n\
    \n### T-SQL 恢复命令\n\n参考第 5 章，我们用来恢复数据的命令是\n\n```\nRESTORE DATABASE backrecTestDB\n\
    FROM DISK = 'E:\\SQL Server\\Backup\\backrecTestDB\\backrecTestDB.bak'\nWITH REPLACE\n\
    GO\n```\n\n我们将在恢复作业中使用相同的命令，因此请记下 `FROM DISK` 的位置，因为我们在本节重命名文件时需要使用该位置。\n\n###\
    \ SQL Server 代理恢复作业\n\n要开始本节，我们需要在不先创建维护计划的情况下创建一个 SQL Server 代理作业。展开 SQL Server\
    \ 代理，右键单击 `作业`，然后选择 `新建作业…` 继续。新建作业窗口打开，如图 9-31 所示；请注意，它与我们之前看到的窗口略有不同，该窗口中的一些信息是从维护计划中引用的。\n\
    \n![A436605_1_En_9_Fig31_HTML.jpg](img/A436605_1_En_9_Fig31_HTML.jpg)\n\n图 9-31\n\
    \n新建作业窗口，常规选项卡\n\n这是一个完全空白的画布，供我们创建任何想要的内容。在此屏幕上，我们希望更新清单 9-14 中的以下值。\n\n清单 9-14.\
    \ 新建作业的值\n\n*   名称\n    *   更新为“完整恢复”\n*   所有者\n    *   这应该是 SQL Server 中的 `sa`（主要管理员）帐户，或自定义的服务器代理服务帐户，而不是普通用户帐户\n\
    *   类别\n    *   将其更改为“数据库维护”\n*   说明\n    *   输入类似“这是完整恢复计划中完整恢复部分”的内容\n\n此外，我们要确保“已启用”复选框保持选中状态。接下来，我们要选择左侧的“步骤”选项卡。此时会打开一个空白窗口，如图\
    \ 9-32 所示。\n\n![A436605_1_En_9_Fig32_HTML.jpg](img/A436605_1_En_9_Fig32_HTML.jpg)\n\
    \n图 9-32\n\n新建作业窗口，步骤选项卡\n\n对于此页面，我们将单击屏幕底部的 `新建…` 按钮，然后看到如图 9-33 所示的新建作业步骤屏幕。\n\
    \n![A436605_1_En_9_Fig33_HTML.jpg](img/A436605_1_En_9_Fig33_HTML.jpg)\n\n图 9-33\n\
    \n新建作业步骤，常规选项卡\n\n这又是一个我们不熟悉的界面。我们可能习惯于看到从维护计划预先填充了信息的此屏幕，但这实际上非常简单。接下来，我们需要更新清单\
    \ 9-15 中所示的值。\n\n清单 9-15. 常规选项卡选项\n\n*   步骤名称\n    *   完整恢复 T-SQL 命令\n*   类型\n\
    \    *   Transact-SQL 脚本 (T-SQL)\n*   运行身份\n    *   （此值尚无法更新）\n*   数据库\n    *\
    \   Master\n*   命令\n    *   粘贴“T-SQL 恢复命令”部分中的 T-SQL 脚本\n\n请注意，我们目前还无法更新 `运行身份:`\
    \ 值。这暂时没问题，因为我们必须先保存这些值，然后再返回此屏幕。您现在应该会看到如图 9-34 所示的内容。\n\n![A436605_1_En_9_Fig34_HTML.jpg](img/A436605_1_En_9_Fig34_HTML.jpg)\n\
    \n图 9-34\n\n新建作业步骤，常规选项卡（已更新）\n\n所有内容填写完毕后，单击“确定”按钮以创建初步作业。立即再次双击该作业，您将看到 `运行身份:`\
    \ 下拉菜单现已启用。但是，没有可选择的值。换句话说，我们无法选择以 SQL Server 代理身份运行此作业。\n\n单击“高级”选项卡，您将看到如图 9-35\
    \ 所示的屏幕。\n\n![A436605_1_En_9_Fig35_HTML.jpg](img/A436605_1_En_9_Fig35_HTML.jpg)\n\
    \n图 9-35\n\n作业步骤属性，高级选项卡\n\n同样，我们需要将这些选项更新为清单 9-16 中所示的值。\n\n清单 9-16. 高级选项卡选项\n\
    \n*   成功时的操作\n    *   保留默认值。\n*   重试次数\n    *   保留默认值。\n*   重试间隔（分钟）\n    *  \
    \ 保留默认值。\n*   失败时的操作\n    *   保留默认值。\n*   输出文件\n    *   除非你想创建输出文件，否则保留空白。我不创建它们，因为我在表中创建了条目，并且步骤输出在历史记录中，但你可以自由选择。\n\
    *   记录到表\n    *   选择此选项。\n*   在历史记录中包括步骤输出\n    *   选择此选项。\n*   以用户身份运行\n    *\
    \   保留空白。当我们这样做时，作业将强制以 SQL Server 代理服务帐户身份运行。"
- fmt: 'When you are done, your interface should appear as shown in Figure [9-36](#A436605_1_En_9_Chapter.html#Fig36).


    ![A436605_1_En_9_Fig36_HTML.jpg](A436605_1_En_9_Fig36_HTML.jpg)


    Figure 9-36


    Job Step Properties, Advanced tab (updated)


    These values are all correct, so go ahead and click the OK button to save these
    configuration settings. We are then returned back to the New Job screen, except
    with an updated value in the Job step list field. Notice that the Start step value
    is also updated with the name of the step we just created. Figure [9-37](#A436605_1_En_9_Chapter.html#Fig37)
    shows this updated interface.


    ![A436605_1_En_9_Fig37_HTML.jpg](A436605_1_En_9_Fig37_HTML.jpg)


    Figure 9-37


    New Job, updated


    We aren’t going to schedule this job, and we don’t need to set an alert for it
    either. However, we do want to ensure that the Notifications tab has Write to
    Windows Application event log checked, and we want to e-mail our Operator that
    the job was completed—not that it failed and not that is succeeded, but that it
    completed. This way, we will get the status update either way. Figure [9-38](#A436605_1_En_9_Chapter.html#Fig38)
    shows the updated interface for the Notifications tab.


    ![A436605_1_En_9_Fig38_HTML.jpg](A436605_1_En_9_Fig38_HTML.jpg)


    Figure 9-38


    New Job, Notifications tab (updated)


    That is all we need to do to configure this job. Click the OK button to save it
    and return to the main `SSMS` screen with the updated job shown in the Jobs submenu
    of `SQL Server Agent`. Figure [9-39](#A436605_1_En_9_Chapter.html#Fig39) shows
    this updated interface.


    ![A436605_1_En_9_Fig39_HTML.jpg](A436605_1_En_9_Fig39_HTML.jpg)


    Figure 9-39


    `SQL Server Agent`, updated


    So in this section, we created an entire restore job from scratch; again, the
    reason we had to do it like this is because `SQL Server` does not offer us a restore
    database tool from the toolbox, so we had to wrap up a `RESTORE DATABASE` command
    inside a `SQL Server Agent` job. Like I said before, if you can get to the end
    result using an alternate method, excellent!


    ### Copy and Rename Current Backup File


    Next, we just need to make a copy of our full backup run previously in this chapter.
    My default backup location for this database is `E:\SQL Server\Backup\backrecTestDB`,
    but yours may be different. In any event, select the backup location and copy
    and rename the file as shown earlier. In my case, I am going to rename my file
    to `E:\SQL Server\Backup\backrecTestDB\backrecTestDB.bak`. Once that is done,
    we can move to the next section.


    ### Restore Data


    For this section, all we want to do is right-click the Full Restore Job and select
    `Start Job at Step…` to run the job. Note that we need to delete any database
    snapshots in order to restore the database, so delete any you may have from the
    `SSMS` interface before trying to proceed.


    Once we run the job, it takes a little while to complete, and then we should see
    what is shown in Figure [9-40](#A436605_1_En_9_Chapter.html#Fig40).


    ![A436605_1_En_9_Fig40_HTML.jpg](A436605_1_En_9_Fig40_HTML.jpg)


    Figure 9-40


    Successfully restored the database


    Next, you can run the Backup and Restore Events report to view that the database
    was actually restored. You could also check the Windows Application event log
    for entries, which is shown in Figure [9-41](#A436605_1_En_9_Chapter.html#Fig41).


    ![A436605_1_En_9_Fig41_HTML.jpg](A436605_1_En_9_Fig41_HTML.jpg)


    Figure 9-41


    Windows Application event log entry


    So there you have it. A complete full restore job that we can now use to restore
    our database whenever we need. Just follow the directions in this section and
    you will be in good shape.


    ## Summary


    In this chapter, we pieced together our full backup maintenance plan from what
    we gathered as requirements throughout the course of this book.


    We learned about the many various configuration options in the `SSMS` maintenance
    plan area.


    We also learned about the configuration options in the `SQL Server Agent` job
    area.


    We learned how to set up an Operator to receive e-mails in the event of a job
    failure.


    This is the first part of the three parts needed to create an entire backup scenario.
    When we are finished with the scenario, we will test it extensively to ensure
    that every event notifies the Operators correctly, so don’t worry that we didn’t
    test for the e-mail receipt yet. We will get to this before the book is through.


    We also put together the various pieces of the full Restore plan, tested the Full
    Restore `SQL Server Agent` job, and then verified the results from the Backup
    and Restore Events report and the Windows Application event log.


    In Chapter [10](#A436605_1_En_10_Chapter.html), we are going to add the differential
    backups to the Backup Plan maintenance plan, and configure it like we configured
    the full backup plan. We will also create a Differential Restore `SQL Server Agent`
    job.


    In Chapter [11](#A436605_1_En_11_Chapter.html), we will go over how to add the
    transaction log backups to the Backup Plan maintenance plan, and also create a
    Transaction Log Restore `SQL Server Agent` job.


    The book will conclude with an entire test plan, a guide on how to test the plan
    for success, and troubleshooting hints and tips that we can use to mitigate harmful
    situations or errors in our package execution.


    # 10. Differential Backup and Restore Solutions


    Now that we have functional full backup and full restore `SQL Server Agent` jobs
    detailed in Chapter [9](#A436605_1_En_9_Chapter.html), we need to piece together
    the differential backup and differential restore parts. We are going to draw from
    Chapter [2](#A436605_1_En_2_Chapter.html) and Chapter [6](#A436605_1_En_6_Chapter.html)
    for this chapter, but we will be looking at adding slightly different functionality
    and customization to our existing Backup Plan maintenance plan.


    What we want to do is rework the backup plan to include the differential portion
    of the backup, and then create a new Differential Restore `SQL Server Agent` job
    to be run manually or in conjunction with the Full Restore `SQL Server Agent`
    job. At the end of this chapter, we will have created an addition to our existing
    plan, tested what we have created so far for that plan, and verified the expected
    results of the intended operation.


    Recently, I was tasked with creating an identical development environment in my
    work area. You can probably see where I am going with this; because of the serendipitous
    nature of things, I was able to apply what we are doing now in a real-world scenario,
    and it worked. I could restore a full database backup to a completely fresh instance
    of `SQL Server` with zero trouble, and not only that, I was also able to restore
    the differential and transaction log backups to the new server as well, so I essentially
    had zero data loss when transferring to the development server. I find it very
    reassuring to know that I can quickly and correctly back up and restore the data
    I am responsible for protecting.


    Oftentimes, I find myself coming up with “nightmare scenarios” which would force
    me to think and act quickly and correctly. Now, clearly, there are limitations
    to these scenarios; they must be squarely rooted in situations where I can influence
    or control the outcome, for example. A scenario with a down server, for example,
    is squarely out of my responsibility since I rely on someone else to remedy the
    situation. But, for instance, if I ran a query on accident and wiped out or dropped
    a table, or my database suffered a `SQL` injection attack (it can’t, but remember
    this is a nightmare scenario), or some other `SQL Server`–related issue arose,
    I need to know that I have the technical acumen to answer the questions that I
    need to answer. In my mind, there are different steps that we can take to mitigate
    these nightmare scenarios, and we will hopefully end up addressing these in this
    chapter.


    For now, let’s concentrate on adding the differential backup to the Backup Plan
    maintenance plan we started in Chapter [9](#A436605_1_En_9_Chapter.html).'
