  trans: '

    ## 紧急全量恢复示例


    最近，我有一个具体的实例，因为一个脚本中的错误，我不得不恢复生产数据。让我们假设你有一个包含数百条记录的表，每条记录都有一个唯一标识符。这些记录中的每一条都涉及一组特定的数据，这些数据对于特定项目通过工作流的正常运行至关重要。让我们进一步假设，在生产实例上运行的更新脚本没有定义
    `WHERE` 子句。我相信你能看出问题出在哪里……我将表中所有行更新为了一个特定值，而不是仅仅更新我需要更新的那一行。现在，在这个例子中，有很多种方法可以恢复数据，但我选择了最快，而不一定是最干净的方法。该方法包含以下步骤：


    *   定位最新的备份集（完整备份、差异备份和事务日志备份）

    *   将最新的完整备份还原到一个名为 `fixYourMistake` 的新数据库

    *   将最新的差异备份还原到 `fixYourMistake` 数据库

    *   将自差异备份以来的所有事务日志备份还原到 `fixYourMistake` 数据库

    *   在生产数据库中创建一个名为 `(tablename)_archive` 的备用表，其中 `(tablename)` 是我的表名

    *   编写一条 `INSERT INTO…SELECT` 语句，将原始表 `(tablename)` 的内容写入归档表

    *   编写一条 `TRUNCATE` 语句来清空原始表

    *   编写一条 `INSERT INTO…SELECT` 语句，将 `fixYourMistake` 数据库中已恢复的数据插入到生产数据库


    你可能会问自己，为什么我没有直接将最新的事务日志还原到生产数据库以更快地完成操作。我之所以没有这样做，是因为我不确定数据库是否还会有其他残留的损害，所以我想要有一个可靠的备份以便恢复，以防万一。我也不想还原整个数据库，因为在此期间还有关键操作正在录入。在我还原了有问题的表并验证数据恢复正确且没有其他损坏后，我在数据库服务器上还有一点清理工作要做。为了在这次恢复后进行清理，我只需要
    `DROP` 掉 `fixYourMistake` 数据库和之前创建的归档表。之后，数据库就愉快地运行起来了，信不信由你，除了我自己，甚至没有人意识到数据库曾出过问题。


    我想指出，如果没有一个可靠的备份和恢复结构，这是不可能做到的。如果没有先前的备份来恢复数据，我就无法还原到上一个事务日志，这意味着我将丢失自上次完整备份以来——在一个生产环境中的数据。这是非常非常糟糕的消息，我认为不言而喻，自那以后，在生产环境上执行的脚本都受到了更为严格的审查。所以，我想你可以说，当这一切发生时，我既是自己最大的敌人，同时也是自己最好的朋友。在未来，我想少一些“敌人”会是件好事。


    ## 总结


    在本章中，我们学习了向数据库恢复完整备份的精髓。我们回顾了在数据库中采用完整恢复模式的重要性，这样我们才能使用 SQL Server 中提供的全套备份和恢复功能。


    我们研究了时间点恢复，并介绍了 SSMS “恢复”部分中各种界面的基础知识。这些不同的部分包含了大量信息，我鼓励你在 SSMS 中创建一个备用数据库，恢复到这个新数据库，并尝试各种设置，直到你熟悉各种设置和选项在幕后实际所做的事情。


    我们在这里学到的原理大部分可以迁移到差异备份和事务日志恢复领域，只是由于备份本身的特性而略有变化。例如，选择差异备份的过程在界面上是相似的，但其功能和目的与其他两种恢复类型完全不同。


    ## 6. 差异备份恢复


    回到第 2 章，我们介绍了差异备份的基础知识，以及差异基准对整个恢复策略的重要性。这些同样的原则也适用于差异恢复，只不过我们现在可以说是在处理交易的另一端。恢复模式的选择是决定可用恢复方法有效性的最重要方面。回想一下，我们的测试数据库使用了完整恢复模型；这意味着我们可以使用数据库的全套备份和恢复功能。如果我们选择了大容量日志恢复模型，我们将获得大部分相同的功能，但如果事务日志中有大容量日志事务，我们将牺牲像第
    5 章中那样进行时间点恢复的能力。大容量日志恢复模型将只允许我们恢复到备份的末尾；换句话说，每个备份都必须完整恢复，否则根本不会进行任何数据恢复。


    在 SQL Server 中从差异备份恢复数据与从完整备份恢复数据几乎相同，但有一些明显的区别。首先，最明显的一点是，差异备份只能还原到对应的完整备份。这是因为差异备份是从上一次完整备份（在第
    2 章中称为“基准”）以来，从已备份的事务日志和更改数据中获取的最后一组数据。因此，如果你尝试按错误顺序还原差异备份，它将失败。数据的序列将无法对齐，SQL
    Server 将停止恢复操作。其次，数据库必须处于 `NORECOVERY` 或 `STANDBY` 模式才能还原差异备份。这样做的原因是数据库只能将差异备份还原到完整备份；如果不先还原完整备份，就无法单独还原差异备份。一旦完整备份被还原，数据库就可以被置于
    `NORECOVERY` 或 `STANDBY` 模式。


    让我们简要回顾一下在恢复数据库时可用的恢复状态选项。这些选项控制恢复完成后数据库的状态，并且可以随着每次恢复类型而变化。


    *   `RESTORE WITH RECOVERY`：这是默认选项，意味着数据库在恢复过程完成后立即可供使用。这意味着整个数据库恢复操作已完成，意味着无法再恢复额外的事务日志。

    *   `RESTORE WITH NORECOVERY`：此选项不会使数据库处于就绪状态，这意味着在恢复操作完成后数据库不可操作。使用此选项，可以继续正常恢复事务日志。在对数据库执行使用
    `WITH RECOVERY` 选项的最终命令之前，数据库无法进入就绪状态。

    *   `RESTORE WITH STANDBY`：最后，此选项使数据库处于待机模式，本质上是只读的。任何尚未提交到事务日志的事务都将被撤销，并且撤销操作保存在一个待机文件中。


    还记得第 5 章中我们如何勾选了 `将源数据库保持为还原状态 (WITH NORECOVERY)` 选项吗？这使我们仍然可以选择恢复更多备份，特别是差异备份和任何后续的事务日志备份，我们将在第
    7 章中介绍这些内容。

    '
- fmt: '## What Is a Differential Restore?


    Simply put, a differential restore is the restoration of data from a differential
    backup. We know that a differential backup is only the changed data since the
    last full backup, so it is a smaller file than a full backup.


    So how does this fit into our backup strategy? Our full backups run every morning
    at 12:00 am, our differential backups run every six hours, and our transaction
    log backups run every hour. In other words, I personally think it is a pretty
    solid backup schedule. The usage of the full or simple recovery models, and of
    implementing differential backups and restores, has a few very distinct implications:


    *   We can have fewer transaction logs and therefore fewer overall files in our
    backup plan, since we can delete all transaction logs before the last full backup
    was taken, assuming that the data from these transaction logs is already resident
    in the differential backups.

    *   We have a lot more recovery points, or places that we can restore to, available
    to us.

    *   Backups can take place during the day without having to run a full backup
    every time. This will cut down on server CPU time and require less space.


    We can see that using differential backups and restores as part of our normal
    database recovery plan is the best way to go for what we decided was our ideal
    recovery scenario.


    ## Restoring Using SSMS


    I hope that by now, we all have a little bit of experience doing database restores
    using SQL Server Management Studio. If you read my first book, I relied heavily
    on maintenance plan creation to handle the entirety of daily database maintenance.
    This included a backup method that could eventually be used for restoring data,
    complete with full, differential, and transaction log backups. We don’t want to
    go quite that far yet, since that is what we will cover in later chapters once
    we tie everything together, but we do want to look at how differential restores
    are handled in SQL Server Management Studio.


    Go ahead and start `SSMS`, if you haven’t already. You should see the interface
    with Object Explorer to the left and nothing in the stage. I generally keep a
    New Query window open in the main stage, but it’s not necessary. Once you have
    `SSMS` open and are ready to move on, expand `Databases`, right-click your test
    database name (mine is `backrecTestDB`), and hover over `Tasks`, then `Restore`,
    and finally, select `Database…` to continue. Figure [6-1](#A436605_1_En_6_Chapter.html#Fig1)
    shows the location of this menu item.


    ![A436605_1_En_6_Fig1_HTML.jpg](A436605_1_En_6_Fig1_HTML.jpg)


    Figure 6-1: Database menu item location


    After selecting `Database` as shown in Figure [6-1](#A436605_1_En_6_Chapter.html#Fig1),
    you will see the screen shown in Figure [6-2](#A436605_1_En_6_Chapter.html#Fig2).


    ![A436605_1_En_6_Fig2_HTML.jpg](A436605_1_En_6_Fig2_HTML.jpg)


    Figure 6-2: Restore Database


    This is the regular screen that we have seen before each time we want to restore
    our database. Note that all available backups for this database are available
    as shown in Figure [6-2](#A436605_1_En_6_Chapter.html#Fig2), and I have deleted
    a few backups from the file system to make the interface a bit cleaner.


    Verify in your interface that all check boxes next to the three backups listed
    (or however many you have and want to restore) are checked. Since we want to restore
    our differential backup, we must restore the full backup first, and we must keep
    the database in the `restoring` state in order to continue restoring our differential
    backups and our transaction logs. If you were to uncheck all the recovery options,
    you would view the available combinations of restorations that can be done within
    the database. Those combinations are as follows:


    *   Full

    *   Full + differential

    *   Full + transaction log

    *   Full + differential + transaction log


    In other words, when we’re dealing with `SSMS`, we must start with a full backup
    every single time we want to run a restore operation. Think of it like this: if
    you have an error in your database at 3:05 pm, under my current backup schedule,
    then you would need to restore the last full backup from that morning, then the
    12:00 pm differential backup, and finally, each hourly transaction log until you
    recover the data you need.


    Notice that we are on the `General` tab of the `Restore Database` screen. We have
    already gone through the various options in these tabs, so we don’t need to go
    through them again. Note that we will be taking a backup of the tail of the transaction
    log as well, which is a default option so that the transaction to run the restore
    procedure is kept in a fresh transaction log, and the previous transactions are
    kept in the newly backed-up transaction log tail.


    Since we are restoring the differential backup, we just need to make sure that
    the full and differential backup options are selected on the `General` tab, and
    then press `OK`. We will then wait for a few seconds, or possibly longer, and
    see what is shown in Figure [6-3](#A436605_1_En_6_Chapter.html#Fig3).


    ![A436605_1_En_6_Fig3_HTML.jpg](A436605_1_En_6_Fig3_HTML.jpg)


    Figure 6-3: Restore Database in progress


    Hopefully, we will see a success message eventually. Click `OK` on this message,
    and the `Restore Database` screen goes away. This signifies that our database
    has been restored to the data relevant to the differential backup.


    ## Restoring Using T-SQL


    The process for restoring a differential backup using `T-SQL` is surprisingly
    easy. Up until this point, I didn’t include a whole lot of `SQL` because I wanted
    to make these books geared more toward the visual aspect of database administration,
    but I think that this warrants a bit of time.


    The real strength of using `T-SQL`, apart from automation purposes, is that you
    can use `sqlcmd` to execute the `SQL` statements if you cannot get to the interface
    for `SQL` but still have access to the database server.


    The basic syntax for a differential restore with a logical backup device and no
    other files to restore is shown in Listing [6-1](#A436605_1_En_6_Chapter.html#Par30).


    ```sql

    RESTORE DATABASE backrecTestDB

    FROM backrecTestDB

    WITH NORECOVERY

    Listing 6-1: RESTORE DATABASE SQL Script

    ```


    The basic syntax for a differential restore without a defined backup device, or
    when you need to restore from the file system and not a logical backup device
    and there are no other files to restore, is shown in Listing [6-2](#A436605_1_En_6_Chapter.html#Par32).


    ```sql

    RESTORE DATABASE backrecTestDB

    FROM DISK = ''E:\SQL Server\Backup\backrecTestDB\backrecTestDB_DIFF.bak''

    WITH NORECOVERY

    Listing 6-2: RESTORE DATABASE SQL Script

    ```


    Keep in mind that when restoring a differential backup, when we specify `NORECOVERY`,
    what we are saying is that we want to restore the last full backup, and then the
    differential backup. The reason for this is because, as we discussed earlier,
    we must have a logical starting point for all restores, and the only place to
    do that is with the last full backup, which is the highest level of restore for
    the period. From that point, we can then filter down the differential backups,
    and finally, into the transaction logs to get to the precise location of the data
    restoration. We also want to specify `NORECOVERY` if we have additional transaction
    logs to restore; otherwise, we would specify `RECOVERY` instead.


    If you were to execute the code in Listing [6-1](#A436605_1_En_6_Chapter.html#Par30),
    considering that you had a logical backup device defined and didn’t have any other
    files to restore (i.e., additional transaction logs), you would end up with the
    same result as executing a differential restore as we did previously. The same
    result would happen with Listing [6-2](#A436605_1_En_6_Chapter.html#Par32), if
    you needed to restore from the file system and not from a logical backup device.'
