    and after about a minute, I am presented with what is shown in Figure [5-24](#A436605_1_En_5_Chapter.html#Fig24).


    ![A436605_1_En_5_Fig24_HTML.jpg](A436605_1_En_5_Fig24_HTML.jpg)


    Figure 5-24


    Restore successful


    ![A436605_1_En_5_Fig23_HTML.jpg](A436605_1_En_5_Fig23_HTML.jpg)


    Figure 5-23


    Restore Database


    At this point, I know that my database has restored successfully. However, I still
    want to verify that SQL Server actually did what it was supposed to do (remember,
    Trust but Verify). Let’s run the simple script we ran before, `SELECT count(*)
    as cnt FROM users1;`, and view the results. The query runs for a few seconds,
    and then returns the value 20030001\. Exactly as we had initially! Therefore,
    we can safely assume that this database has been completely restored as of the
    time that we selected in the Timeline area.'
  trans: '### 时间点恢复


    如果你的数据库未曾遭遇过灾难性故障，那真要恭喜你了。我一只手就能数出自己不得不花一整天时间搜索日志文件并应用备份的次数，而且有时候，这些备份要么过时了，要么已损坏。“沮丧”这个词根本不足以形容我当时的心情；我觉得“愤怒”可能更为贴切。


    很可能，你总会遇到需要恢复到某个特定时间点的情况，并且必须迅速行动以恢复必要的数据。在这种情况下，有几种不同的处理方法：一种是按照这些指导进行时间点恢复；另一种是将数据库完整恢复到另一个数据库实例，然后从辅助数据库中恢复的表里提取你需要的数据。本章后面的“紧急完整恢复示例”一节对此有详细描述。现在，我们将专注于时间点恢复。


    让我们先来彻底搞乱我们的数据库，好吗？让我们删除 `users1` 表。这应该能在我们的事务日志尾部生成一个相当大的、需要恢复的事务。为了在恢复操作完成后进行比较，我们的初始记录数是
    20030001 行。只需在“新建查询”窗口中键入以下内容，然后按 F5 或工具栏上的“执行”按钮来运行查询：


    ```

    DROP TABLE users1;

    ```


    接下来，执行以下语句：


    ```

    SELECT count(*) as cnt FROM users1;

    ```


    你将收到消息 `Invalid object name ''users1''`。我们也可以在“对象资源管理器”中刷新“表”，并确认 `users1` 表现在确实已消失。


    要继续操作，请右键单击你的数据库（在我的例子中是 backrecTestDB），展开“任务”，然后展开“恢复”，你应该会看到如图 5-19 所示的内容。


    ![A436605_1_En_5_Fig19_HTML.jpg](img/A436605_1_En_5_Fig19_HTML.jpg)

    图 5-19: “恢复”菜单位置


    单击“数据库”，你将看到一个类似于图 5-20 的界面。这也类似于我们之前在图 5-13 中看到的。


    ![A436605_1_En_5_Fig20_HTML.jpg](img/A436605_1_En_5_Fig20_HTML.jpg)

    图 5-20: “还原数据库”屏幕


    现在你对这个页面应该已经很熟悉了。我们将按下界面右侧的“时间线”按钮继续。按下“时间线”按钮后，你会看到如图 5-21 所示的内容。


    ![A436605_1_En_5_Fig21_HTML.jpg](img/A436605_1_En_5_Fig21_HTML.jpg)

    图 5-21: 备份时间线，上次备份


    默认选项是“上次备份”。这与在之前的屏幕上直接按“确定”完全一样；它仅根据可用的备份文件进行恢复，仅此而已。


    我们需要点击“特定日期和时间”单选按钮，以查看我们可以恢复到什么时间点。注意界面如何变更为图 5-22 所示。


    ![A436605_1_En_5_Fig22_HTML.jpg](img/A436605_1_En_5_Fig22_HTML.jpg)

    图 5-22: 备份时间线，特定日期和时间


    看到“时间间隔”值如何变化以包含事务日志的尾部了吗？这是因为我们包含了尚未备份的那部分事务日志。通常，截止时间将是该事务日志的结尾，并且由于我的事务日志备份每小时运行一次，我最多只会丢失一个小时的数据（假设事务日志损坏）。你可以随意在此处查看而不按“确定”按钮。例如，你可以将“时间间隔”从“天”更改为“小时”、“六小时”或“周”，看看这如何影响你可以恢复的数据。在这个区域，粒度可以极其精细，通过一个简单的下拉选择就可以扩展到非常高的程度。


    一旦你准备好继续，请将“时间间隔”下的滑块条移动到你希望恢复到的所需时间点，然后按“确定”。对于本示例，我将恢复到 2017 年 10 月 9 日晚上 6:40:31，因为我知道那是在我删除
    `users1` 表之前。我不需要在“常规”选项卡上做任何其他事情，“文件”选项卡也没问题。跳转到“选项”选项卡，在这里我们需要勾选“覆盖现有数据库（`WITH
    REPLACE`）”选项，并在按“确定”开始恢复过程之前，取消选中“使源数据库处于还原状态（`WITH NORECOVERY`）”复选框。如果我想要在此组恢复操作之后恢复更多文件，我会希望保持“使源数据库处于还原状态（`WITH
    NORECOVERY`）”复选框为选中状态，但既然我不想再恢复其他内容，我将保持其未选中状态。请注意，除非取消选中“恢复前进行尾日志备份”复选框，否则将进行尾日志备份。在这种情况下，我将保持“恢复前进行尾日志备份”选项为选中状态。一旦所有设置都符合我的要求，我将点击“确定”。按下“确定”后，我看到如图
    5-23 所示的内容，大约一分钟后，我看到如图 5-24 所示的内容。


    ![A436605_1_En_5_Fig24_HTML.jpg](img/A436605_1_En_5_Fig24_HTML.jpg)

    图 5-24: 恢复成功


    ![A436605_1_En_5_Fig23_HTML.jpg](img/A436605_1_En_5_Fig23_HTML.jpg)

    图 5-23: 还原数据库


    此时，我知道我的数据库已成功恢复。但是，我仍然想验证 SQL Server 是否确实执行了它应该做的事情（记住，“信任但要核实”）。让我们运行之前运行的简单脚本：


    ```

    SELECT count(*) as cnt FROM users1;

    ```


    并查看结果。查询运行了几秒钟，然后返回值 20030001。和我们最初的值完全一样！因此，我们可以有把握地假设，该数据库已完全恢复到我们在时间线区域所选的时间点。'
- fmt: '## Emergency Full Restore Example


    Recently, I had a specific instance where I had to restore production data because
    of an error in a script. Let’s assume that you have a table with hundreds of records,
    each with a unique identifier. Each of these records dealt with a specific set
    of data that was vital to the normal operation of particular items through a workflow.
    Let’s further assume that the update script that was run on the production instance
    did not have a `WHERE` clause defined. I’m sure you can see where everything went
    sideways… I updated a table to a specific value for all rows instead of just the
    one row that I needed to update. Now, in this instance, there are lot of different
    ways that I could have recovered the data, but I chose the quickest and not necessarily
    the cleanest way. That method consisted of the following steps:


    *   Locate the latest backup set (full, differential, and transaction log)

    *   Restore the latest full backup to a new database called `fixYourMistake`

    *   Restore the latest differential backup to the `fixYourMistake` database

    *   Restore the transaction log backups since the differential back to the `fixYourMistake`
    database

    *   Create an alternate table in the production database called `(tablename)_archive`,
    where `(tablename)` is the name of my table

    *   Write an `INSERT INTO…SELECT` statement to write the contents of the original
    `(tablename)` into the archive table

    *   Write a `TRUNCATE` statement to clear the original table

    *   Write an `INSERT INTO…SELECT` statement to insert the restored data from the
    `fixYourMistake` database into the production database


    You may be asking yourself why I didn’t just restore the latest transaction log
    to the production database to complete the operation quicker. I didn’t do this
    because I wasn’t sure if there was going to be any other residual damage to the
    database, so I wanted to have a solid backup to restore from, just in case. I
    also did not want to restore the entire database since there were critical operations
    being entered as this was going on. After I restored the table in question and
    verified that the data recovery was correct with no other corruption, I had a
    small amount of cleanup to do on the database server. To clean up after this recovery,
    I just had to `DROP` the `fixYourMistake` database and `DROP` the archive table
    that I created earlier. After that, the database was humming along happily, and
    believe it or not, no one except me was even aware that there was a problem with
    the database.


    I would like to point out that this would not have been possible without a solid
    backup and restore structure in place. I could not have restored to the last transaction
    log without a previous backup to recover the data to, and that means that I would
    have lost data—in a production environment—since the last full backup. That is
    very, very bad news and I think it goes without saying that scripts being executed
    on the production environment have been much more highly scrutinized since then.
    So, I guess you could say that, when this was going on, I was both my own worst
    enemy and my own best friend at the same time. In the future, I think fewer enemies
    would be a good thing.


    ## Summary


    In this chapter, we learned about the essence of restoring a full backup to a
    database. We reviewed the importance of having the full recovery model in our
    databases so that we have access to the full range of backup and restore functionality
    available within SQL Server.


    We looked at point-in-time restores, and covered the basics of the various interfaces
    in the Restore section of SSMS. There is a wealth of information in these various
    sections, and I encourage you to create a spare database in SSMS, restore to this
    new database, and play with the settings until you are comfortable with what the
    various settings and options are really doing behind the scenes.


    The principles we have picked up here can be mostly transferred to the differential
    and transaction log restore areas, with slight changes due to the nature of the
    backups themselves. For example, the process to select a differential backup is
    similar as far as the interface is concerned, but the functionality and purpose
    are completely different from the other two restore types.


    ## 6. Differential Restores


    Back in Chapter [2](#A436605_1_En_2_Chapter.html), we went over the fundamentals
    of differential backups and how important the differential base is to the overall
    recovery strategy. Those same principals apply to differential restores, except
    that we are now dealing with the other end of the transaction, so to speak. The
    choice of recovery models is the single most important aspect to determining the
    efficacy of the restore methods that are available to you. Recall that we used
    the full recovery model for our test database; this means that we have access
    to the full range of backup and restore functionality for our database. Had we
    chosen the bulk-logged recovery model, we would have gotten most of the same functionality,
    but if we had bulk-logged transactions in the transaction log, we would have sacrificed
    the capability to restore to a point in time as we did in Chapter [5](#A436605_1_En_5_Chapter.html).
    A bulk-logged recovery model would allow us to recover only to the end of a backup;
    in other words, every backup must be fully recovered, or no data restore will
    take place at all.


    Restoring data in SQL Server from a differential backup is almost the same as
    restoring data from a full backup, with a few obvious differences. First, the
    most obvious point to make is that a differential backup can only be restored
    to the corresponding full backup. This is because the differential backup is the
    last set of data taken from the backed-up transaction logs and changed data since
    the last full backup, referred to as the “base” back in Chapter [2](#A436605_1_En_2_Chapter.html).
    So, if you try to restore a differential backup out of sequence, it will fail.
    The sequence of data will not line up, and SQL Server will halt the restore operation.
    Second, the database must be in the `NORECOVERY` or `STANDBY` mode to restore
    a differential backup. The reason for this is because the database can only restore
    a differential backup to a full backup; it cannot restore just a differential
    backup without first restoring the full backup. Once the full backup is restored,
    then the database can be placed into `NORECOVERY` or `STANDBY` mode.


    Let’s briefly go over the recovery state options that are available when restoring
    a database. These options control the state of the database after the restore
    has completed and can change with each restore type.


    *   `RESTORE WITH RECOVERY`: This is the default and means that the database is
    ready for use immediately after the recovery process is complete. The implication
    is that the entire database restore operation is complete, meaning that additional
    transaction logs cannot be restored.

    *   `RESTORE WITH NORECOVERY`: This option does not leave the database in a ready
    state, which means it is not operational after the restore operation is complete.
    With this option, transaction logs can continue to be restored normally. The database
    cannot be put into the ready state until a final command using the `WITH RECOVERY`
    option is executed against the database.

    *   `RESTORE WITH STANDBY`: Finally, this option leaves the database in the standby
    mode, which is essentially read-only. Any transaction that has not been committed
    to the transaction log is undone, and the undo actions are saved in a standby
    file.


    Remember in Chapter [5](#A436605_1_En_5_Chapter.html) how we checked the `Leave
    source database in the restoring state (WITH NORECOVERY)` option checked? That
    allowed us to still have the option to restore more backups, specifically the
    differential and any subsequent transaction log backups, which we will get to
    in Chapter [7](#A436605_1_En_7_Chapter.html).'
