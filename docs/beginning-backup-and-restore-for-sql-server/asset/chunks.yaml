  trans: '

    ## 什么是完全恢复？


    简而言之，完全恢复正如其名，但又并非完全如此；它恢复的是先前执行的完整数据库备份中包含的所有数据，但并不恢复整个数据库。回想一下，完整数据库备份只备份数据，而不备份系统设置。数据库备份中只包含指定数据库的表数据。


    注意


    如果你需要备份与 SQL Server 安装相关的系统设置，你必须拥有 `master`、`msdb` 和 `model` 数据库的当前备份。这些是系统数据库，对于
    SQL Server 的平稳运行极其重要。


    我刚开始接触 SQL Server 时，正值 SQL Server 7 和 SQL Server 2000 之间。我多少已经习惯了 MySQL 在界面和可用性方面的工作方式，所以一开始切换过来有点困难，但我逐渐掌握了窍门。MySQL
    有一点我非常喜欢，那就是它们的“备份”就是巨大的 `.sql` 文件，里面包含大量的 `INSERT` 命令。没错，整个数据库的内容都被按顺序导出；先是针对某张表的
    `DROP` 和 `CREATE` 命令，然后是该表中所有数据的单独 `INSERT` 语句。在有些人看来，这似乎是浪费空间，但要我说，精妙之处就在于细节。这样，时间充裕的数据库管理员就可以仔细检查那个备份，并在
    SQL Server 中无法实现的细粒度级别上，实际掌控数据的插入。我的意思是，SQL Server 不会以这种格式创建备份；SQL Server 中的备份是专门为
    SQL Server 引擎执行而创建的，不是为了方便人类阅读。是的，在 SQL Server 备份中，数据当然在那里，但无法通过在记事本中打开等方式读取。


    完全恢复的另一个方面是，它们可用于创建现有数据库的完美副本。在开发环境中能够拥有这种功能对我来说绝对非常宝贵，因为我可以轻松地创建一个基于生产数据库的完整开发数据库，主要用于测试。然后，我可以创建另一个数据库，它是开发数据库的完全复制品，但将其命名为不同的名称。之后，如果我需要恢复数据，我可以轻松地在第一个开发数据库中
    `TRUNCATE` 任何表，并使用 `INSERT INTO` 语句快速替换数据，其中第二个开发数据库作为源，第一个开发数据库作为目标。我将在本章后面详细展示如何操作。


    首先，让我们暂时将注意力转向系统数据库。有三个主要的系统数据库，名为 `master`、`msdb` 和 `model`。这三个数据库承载着你的 SQL Server
    安装的配置信息，因此它们对于整个安装的健康状况至关重要。从技术上讲，还有第四个名为 `tempdb` 的系统数据库，但此数据库在每次为特定 SQL Server
    实例创建该实例时都会被销毁和创建，因此无需担心备份它。


    ## 恢复 Master 数据库


    如果你不得不恢复 `master` 数据库或任何系统数据库，我真诚地希望这不是因为严重的损坏问题。我可以亲口告诉你，这是一项重大的任务，必须极其谨慎和细致地完成。本节将展示从完整数据库备份恢复
    `master` 数据库的各个步骤和说明。这些步骤可应用于恢复任何系统数据库，但现在，我将只关注 `master` 数据库。


    本节依赖于存在一个当前的 `master` 数据库备份。通常，最好在每次更改表的结构或数据库的基础架构时都对 `master` 数据库进行一次备份。备份 `master`
    数据库并确保在紧急情况下可用，将缓解未来的许多问题，我建议将这些系统数据库的备份作为你正常备份维护计划的一部分。我在前面讨论备份的章节中没有涉及这一点，因为本书的内容是基于单个数据库备份，而不是更高级别的数据库管理，在后者中我们也会处理系统数据库的备份。继续之前，请快速运行一次
    `master` 数据库的备份，或使用你已准备好的备份。


    要恢复 `master` 数据库，我们必须做的第一件事是在单用户模式下启动 SQL Server。对于不熟悉此操作的用户来说，单用户模式以有限的连接数（一个）启动
    SQL Server，以便可以在不给服务器增加额外负担的情况下进行紧急工作。

    '
- fmt: '# 以单用户模式启动 SQL Server


    以下是将 SQL Server 置于单用户模式的逐步说明：


    *   打开 **SQL Server Configuration Manager**，或者如果你使用的是 Windows 10，则打开开始菜单并输入 `sqlservermanager13.msc`，按
    Enter 键，然后在右窗格中找到 `SQL Server (MSSQLSERVER)` 项。

    *   右键单击并选择 **属性**，然后选择 **启动参数** 选项卡。

    *   在 **指定启动参数** 字段中输入 `–m`。

    *   单击 **添加** 按钮。

    *   单击 **应用**，你会注意到出现一条消息，告诉我们更改在重启服务后才会生效。我们将立即重启服务。在此消息上单击 **确定**，然后在 `SQL Server
    (MSSQLSERVER) 属性` 窗口上单击 **确定** 将其关闭。

    *   单击 **SQL Server Agent** 项，然后在工具栏中单击 **停止服务** 按钮。

    *   重启 `SQL Server (MSSQLSERVER)` 服务。


    这些步骤将我们的 SQL Server 实例设置为单用户模式。不过，让我们更深入地了解这些步骤的细节，以便真正理解我们的操作目标。


    要让 SQL Server 以单用户模式启动，我们必须打开 **SQL Server Configuration Manager**。这有点难找，但如果你使用的是
    SQL Server 2016 和 Windows 10，只需打开开始菜单并输入 `sqlservermanager13.msc` 然后按 Enter。图
    [5-1](#A436605_1_En_5_Chapter.html#Fig1) 显示了此时你应该看到的屏幕。


    ![A436605_1_En_5_Fig1_HTML.jpg](A436605_1_En_5_Fig1_HTML.jpg)


    **图 5-1 用户帐户控制**


    我们希望在这里单击 **是** 以继续。打开的下一个屏幕是 **SQL Server Configuration Manager**，如图 [5-2](#A436605_1_En_5_Chapter.html#Fig2)
    所示。


    ![A436605_1_En_5_Fig2_HTML.jpg](A436605_1_En_5_Fig2_HTML.jpg)


    **图 5-2 SQL Server Configuration Manager**


    如果你不熟悉 **SQL Server Configuration Manager** 界面，建议你花点时间在这里看看。此部分有非常多的配置选项。


    要继续操作，我们需要右键单击 `SQL Server (MSSQLSERVER)` 实例（或者你想要以单用户模式启动的任何实例），然后选择 **属性**。默认界面如图
    [5-3](#A436605_1_En_5_Chapter.html#Fig3) 所示。


    ![A436605_1_En_5_Fig3_HTML.jpg](A436605_1_En_5_Fig3_HTML.jpg)


    **图 5-3 SQL Server (MSSQLSERVER) 属性，登录选项卡**


    请注意，默认选中的选项卡名为 **登录**。我们需要单击屏幕顶部的 **启动参数** 选项卡，打开如图 [5-4](#A436605_1_En_5_Chapter.html#Fig4)
    所示的屏幕。


    ![A436605_1_En_5_Fig4_HTML.jpg](A436605_1_En_5_Fig4_HTML.jpg)


    **图 5-4 SQL Server (MSSQLSERVER) 属性，启动参数选项卡**


    标有 **指定启动参数** 的文本框是我们要输入文本 `–m` 的地方。这是以单用户模式启动 SQL Server 所需的启动参数。输入该值并单击 **添加**
    按钮（一旦在参数字段中输入参数，该按钮就会启用）。图 [5-5](#A436605_1_En_5_Chapter.html#Fig5) 显示了在启动参数字段中输入
    `–m` 后你应该看到的内容。


    ![A436605_1_En_5_Fig5_HTML.jpg](A436605_1_En_5_Fig5_HTML.jpg)


    **图 5-5 已输入 -m 启动参数**


    此时，我们需要单击 **应用** 保存更改，然后会立即弹出如图 [5-6](#A436605_1_En_5_Chapter.html#Fig6) 所示的对话框。


    ![A436605_1_En_5_Fig6_HTML.jpg](A436605_1_En_5_Fig6_HTML.jpg)


    **图 5-6 警告**


    该消息提示我们需要重启 SQL Server 服务，所以这里单击 **确定**，然后在 `SQL Server (MSSQLSERVER) 属性` 窗口上单击
    **确定**。这应该会将我们带回到图 [5-2](#A436605_1_En_5_Chapter.html#Fig2) 中看到的 **SQL Server
    Configuration Manager** 界面。


    在 **SQL Server Configuration Manager** 界面中，确保你在左侧的 **SQL Server 服务** 部分中，然后右键单击右侧面板中的
    `SQL Server (MSSQLSERVER)` 项并选择 **重启**。


    接下来，我们需要停止 SQL Server Agent 服务，所以右键单击 `SQL Server Agent` 并选择 **停止**。原因在于，如果 SQL
    Server Agent 正在运行，它将占用数据库可用的唯一连接。


    至此，我们的 SQL Server 实例已在单用户模式下运行，且没有活动连接。启动 **SSMS**，你会看到常规的登录屏幕。像往常一样在此处连接，你应该会进入启动
    SSMS 后看到的常规界面。我的界面如图 [5-7](#A436605_1_En_5_Chapter.html#Fig7) 所示。


    ![A436605_1_En_5_Fig7_HTML.jpg](A436605_1_En_5_Fig7_HTML.jpg)


    **图 5-7 我的 SSMS 界面**


    关于这个初始屏幕，有两点要提一下：第一，没有明显的迹象表明我处于单用户模式；第二，SQL Server Agent 显示为禁用。那么，我们如何知道自己处于单用户模式呢？很简单。我们知道单用户模式意味着一次只能有一个用户登录到数据库引擎，对吧？那么，你认为如果我们使用当前已登录的同一账户再次登录会发生什么？


    单击 **对象资源管理器** 窗格中的 **连接** 下拉菜单。选择 **数据库引擎…**，你将看到正常的登录屏幕。正常登录，你看到了什么？图 [5-8](#A436605_1_En_5_Chapter.html#Fig8)
    展示了 SQL Server 返回给我的信息。


    ![A436605_1_En_5_Fig8_HTML.jpg](A436605_1_En_5_Fig8_HTML.jpg)


    **图 5-8 连接到服务器**


    就在那黑色和浅灰色的文字中，解释了我们当前处于单用户模式。单击 **确定**，然后单击 **取消** 返回常规的 SSMS 屏幕。打开一个新的查询窗口，注意你连接的是
    `master` 数据库。我们可以在这里开始正常工作，明显的例外是 SQL Server Agent 不会运行，因此我们无法执行任何需要 SQL Server
    Agent 的操作。清单 [5-1](#A436605_1_En_5_Chapter.html#Par35) 展示了一个用于备份系统数据库的简单脚本。


    ```sql

    USE master

    GO

    -- 备份 model 数据库

    BACKUP DATABASE Model

    TO DISK = ''E:\SQL Server\Backup\Model.BAK''

    WITH INIT

    GO

    -- 备份 master 数据库

    BACKUP DATABASE Master

    TO DISK = ''E:\SQL Server\Backup\Master.BAK''

    WITH INIT

    GO

    -- 备份 msdb 数据库

    BACKUP DATABASE MSDB

    TO DISK = ''E:\SQL Server\Backup\MSDB.BAK''

    WITH INIT

    GO

    -- 清单 5-1

    -- 系统数据库备份脚本

    ```


    这将为我们恢复这些数据库提供一个良好的起点。恢复系统数据库的脚本如清单 [5-2](#A436605_1_En_5_Chapter.html#Par37)
    所示。


    ```sql

    RESTORE DATABASE master FROM DISK = ''E:\SQL Server\Backup\Master.BAK'' WITH REPLACE;

    RESTORE DATABASE model FROM DISK = ''E:\SQL Server\Backup\Model.BAK'' WITH REPLACE;

    RESTORE DATABASE msdb FROM DISK = ''E:\SQL Server\Backup\MSDB.BAK'' WITH REPLACE;

    -- 清单 5-2

    -- 系统数据库恢复脚本

    ```


    Microsoft 通常建议使用 `sqlcmd` 实用程序来恢复系统数据库，所以让我们打开命令提示符，输入 `sqlcmd`，然后按 Enter。图 [5-9](#A436605_1_En_5_Chapter.html#Fig9)
    显示了我尝试启动 `sqlcmd` 时发生的情况。


    ![A436605_1_En_5_Fig9_HTML.jpg](A436605_1_En_5_Fig9_HTML.jpg)


    **图 5-9 尝试启动 sqlcmd**


    又看到了我们的“错误”。这其实不是错误，更像是一个恼人的提醒，告知我们处于单用户模式。不过没问题；我们只需关闭 SSMS 并重新运行 `sqlcmd` 命令。它现在应该可以正常工作了；如果不行，请重启
    SQL Server 服务并重新运行该命令。然后我们将看到图 [5-10](#A436605_1_En_5_Chapter.html#Fig10) 所示的内容。


    ![A436605_1_En_5_Fig10_HTML.jpg](A436605_1_En_5_Fig10_HTML.jpg)


    **图 5-10 sqlcmd**'
  raw: '### Start SQL Server in Single-User Mode


    Step-by-step instructions to put SQL Server into single-user mode are as follows.


    *   Open up SQL Server Configuration Manager or, if you’re on Windows 10, open
    the Start menu and type sqlservermanager13.msc, press Enter, and look for the
    SQL Server (MSSQLSERVER) item in the right pane.

    *   Right-click and select Properties, then select the Startup Parameters tab.

    *   Type `–m` in the Specify a startup parameter field.

    *   Click the Add button.

    *   Click Apply and notice that a message appears that tells us that our changes
    will not take effect until you restart the service. We will restart the service
    momentarily. Click OK on this message, and then click OK on the SQL Server (MSSQLSERVER)
    Properties window to close it.

    *   Click the SQL Server Agent item and press the Stop Service button in the toolbar.

    *   Restart the SQL Server (MSSQLSERVER) service.


    These directions set our instance of SQL Server to single-user mode. Let’s get
    into the details of these directions a lot deeper though, so we really know what
    we’re working toward.


    To get SQL Server started in single-user mode, we have to open up our SQL Server
    Configuration Manager. This is somewhat hard to find, but if you’re on SQL Server
    2016 and Windows 10, just open the Start menu and type sqlservermanager13.msc
    and press Enter. Figure [5-1](#A436605_1_En_5_Chapter.html#Fig1) shows the screen
    you should see at this point.


    ![A436605_1_En_5_Fig1_HTML.jpg](A436605_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    User Account Control


    We want to click Yes here in order to proceed. The next screen that opens is the
    SQL Server Configuration Manager, as shown in Figure [5-2](#A436605_1_En_5_Chapter.html#Fig2).


    ![A436605_1_En_5_Fig2_HTML.jpg](A436605_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    SQL Server Configuration Manager


    If you aren’t familiar with the SQL Server Configuration Manager interface, I
    would spend a little time in here. There are an awful lot of configuration options
    in this section.


    To proceed, we want to right-click the SQL Server (MSSQLSERVER) instance, or whichever
    instance you want to start in single-user mode, and select Properties. The default
    interface is shown in Figure [5-3](#A436605_1_En_5_Chapter.html#Fig3).


    ![A436605_1_En_5_Fig3_HTML.jpg](A436605_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    SQL Server (MSSQLSERVER) Properties, Log On tab


    Note that the default tab selected is named Log On. We want to click the Startup
    Parameters tab at the top of the screen to open the screen shown in Figure [5-4](#A436605_1_En_5_Chapter.html#Fig4).


    ![A436605_1_En_5_Fig4_HTML.jpg](A436605_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    SQL Server (MSSQLSERVER) Properties, Startup Parameters tab


    The text box labeled Specify a startup parameter is where we are going to enter
    the text `–m`. That is the startup parameter needed to start SQL Server in single-user
    mode. Enter that value and click the Add button, which will become enabled once
    a parameter has been entered into the parameter field. Figure [5-5](#A436605_1_En_5_Chapter.html#Fig5)
    shows what you should see after entering `–m` in the startup parameter field.


    ![A436605_1_En_5_Fig5_HTML.jpg](A436605_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    -m startup parameter entered


    At this point, we want to click Apply to save the changes, and we are immediately
    presented with the dialog box shown in Figure [5-6](#A436605_1_En_5_Chapter.html#Fig6).


    ![A436605_1_En_5_Fig6_HTML.jpg](A436605_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Warning


    That message is telling us that we need to bounce the SQL Server service, so click
    OK here, and then click OK on the SQL Server (MSSQLSERVER) Properties window.
    That should bring us back to the SQL Server Configuration Manager interface we
    saw in Figure [5-2](#A436605_1_En_5_Chapter.html#Fig2).


    In the SQL Server Configuration Manager interface, make sure that you are in the
    SQL Server Services section on the left-hand side and right-click the SQL Server
    (MSSQLSERVER) item in the right-hand panel and select Restart.


    Next, we want to stop the SQL Server Agent service, so right-click SQL Server
    Agent and select Stop. The reason for this is because SQL Server Agent will take
    the single connection that is available to the database if it is running.


    At this point, our instance of SQL Server is running in single-user mode without
    an active connection. Start SSMS and you will see your regular login screen. Connect
    as normal here, and you should proceed to the regular interface you see once starting
    SSMS. My interface is shown in Figure [5-7](#A436605_1_En_5_Chapter.html#Fig7).


    ![A436605_1_En_5_Fig7_HTML.jpg](A436605_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    My SSMS interface


    There are two things that I want to bring up about this initial screen: first,
    there isn’t an obvious indication that I am in single-user mode, and second, the
    SQL Server Agent is shown as disabled. So how do we know that we are in single-user
    mode? Simple. We know that single-user mode means that only a single user can
    log in to the database engine at a time, right? So what do you think would happen
    if we were to log in again using the same account we are already logged in with?


    Click the Connect drop-down in the Object Explorer pane. Choose Database Engine…
    and you will see the normal login screen. Log in normally, and what do you see?
    Figure [5-8](#A436605_1_En_5_Chapter.html#Fig8) details my response from SQL Server.


    ![A436605_1_En_5_Fig8_HTML.jpg](A436605_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Connect to Server


    Right there in black and light gray is the explanation that we are currently in
    single-user mode. Click OK and then click Cancel to get back to the regular SSMS
    screen. Open up a New Query window and notice that you are connected to the `master`
    database. We could begin to work normally here, with the obvious exception that
    SQL Server Agent will not be running, so we can’t do anything that requires SQL
    Server Agent. A simple script to create a backup of the system databases is shown
    in Listing [5-1](#A436605_1_En_5_Chapter.html#Par35).


    ```

    USE master

    GO

    -- Back up the model database

    BACKUP DATABASE Model

    TO DISK = ''E:\SQL Server\Backup\Model.BAK''

    WITH INIT

    GO

    -- Back up the master database

    BACKUP DATABASE Master

    TO DISK = ''E:\SQL Server\Backup\Master.BAK''

    WITH INIT

    GO

    -- Back up the msdb database

    BACKUP DATABASE MSDB

    TO DISK = ''E:\SQL Server\Backup\MSDB.BAK''

    WITH INIT

    GO

    Listing 5-1

    Backup Script for System Databases

    ```


    That will give us a good starting point for restoring those databases. The script
    to restore the system databases is shown in Listing [5-2](#A436605_1_En_5_Chapter.html#Par37).


    ```

    RESTORE DATABASE master FROM DISK = ''E:\SQL Server\Backup\Master.BAK'' WITH REPLACE;

    RESTORE DATABASE model FROM DISK = ''E:\SQL Server\Backup\Model.BAK'' WITH REPLACE;

    RESTORE DATABASE msdb FROM DISK = ''E:\SQL Server\Backup\MSDB.BAK'' WITH REPLACE;

    Listing 5-2

    Restore Script for System Databases

    ```


    Microsoft generally recommends that the `sqlcmd` utility is used for restoring
    system databases, so let’s open a command prompt, type `sqlcmd`, and press Enter.
    Figure [5-9](#A436605_1_En_5_Chapter.html#Fig9) shows what happened what I tried
    to start `sqlcmd`.


    ![A436605_1_En_5_Fig9_HTML.jpg](A436605_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Trying to start sqlcmd


    There’s our “error” again. It’s not really an error, but more of an annoying reminder
    that we are in single-user mode. Not a problem though; we just need to close SSMS
    and rerun the `sqlcmd` command. It should work for you now; if it doesn’t, restart
    the SQL Server service and rerun the command. We will then see what is shown in
    Figure [5-10](#A436605_1_En_5_Chapter.html#Fig10).


    ![A436605_1_En_5_Fig10_HTML.jpg](A436605_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    sqlcmd'
