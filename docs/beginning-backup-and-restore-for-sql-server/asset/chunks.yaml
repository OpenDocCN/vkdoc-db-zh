- fmt: '## Validating a Backup via the GUI in SSMS


    Validating the backup in SSMS via the GUI can be accomplished in numerous places.
    The easiest place to see your active backups is in the Restore Database screen.
    As this chapter is intended to review executing differential backups and not restoring
    them, I am only going to skim over how to check the backup status of a database.
    We will cover restoring databases in detail in Part II of this book.


    To access the Restore Database screen, you will follow similar steps you would
    use to get into the Backup screen.


    - Right-click `backrecTestDB`.

    - Hover over Tasks, followed by Restore, and click Database.


    Once the Restore Database screen loads, look at the Restore Plan window: you should
    see two database backups. Under the Type column, you should see a backup listed
    as a full and differential, as shown in Figure [2-6](#A436605_1_En_2_Chapter.html#Fig6).


    ![A436605_1_En_2_Fig6_HTML.jpg](A436605_1_En_2_Fig6_HTML.jpg)

    *Figure 2-6: Restore Database window*


    This can be considered “proof of life” that the backup proceeded as intended,
    and is ready for recovery from this interface. Again, we will get into the restoring
    aspect of this operation later in this book. For now, you can be assured that
    the backups are ready to be restored though.


    ## Taking a Differential Backup via T-SQL


    Executing a differential backup via T-SQL is quite easy. There are a number of
    arguments that can be passed with the script; however, for this example, we are
    going to keep this script simple.


    In SQL Studio Manager, run the following script:


    ```

    BACKUP DATABASE [backrecTestDB]

    TO DISK = N''E:\SQL Server\Backup\backrecTestDB_diff.bak''

    WITH DIFFERENTIAL

    ```


    If you are familiar with the `BACKUP DATABASE` command, you will notice that there
    is only one difference for a differential backup, the addition of `WITH DIFFERENTIAL`.


    When the script completes, you will see an output similar to this:


    ```

    Processed 52688 pages for database ''backrecTestDB'', file ''backrecTestDB'' on
    file 1.

    Processed 2 pages for database ''backrecTestDB'', file ''backrecTestDB_log'' on
    file 1.

    BACKUP DATABASE WITH DIFFERENTIAL successfully processed 52690 pages in 9.620
    seconds (42.790 MB/sec).

    ```


    That’s it! You now have a differential backup of the `backrecTestDB`.


    ## Summary


    This chapter walked us though the basics of differential backups and why they
    are important. It showed us how differential backups can reduce overall risk to
    data recovery by reducing the number of files required for a database recovery.


    Chapter [3](#A436605_1_En_3_Chapter.html) will cover transaction logs, the last
    backup type. Chapter [4](#A436605_1_En_4_Chapter.html) will walk you through setting
    up a complete backup solution and review in detail the applicable industry standards
    or best practices regarding backups.


    After Chapter [4](#A436605_1_En_4_Chapter.html) is complete, Part I will be complete
    as well. At that point, you should have a cursory understanding of how the different
    parts of the backup work, together and separately. We will then use that knowledge
    to build the second part of the backup/restore procedure in Part II, where we
    focus on restoring data that has been backed up. Finally, Part III will have us
    tie the parts together into one interface, and then automate it using SQL Server
    Agent.


    # 3. Transaction Log Backups


    In this chapter, we will be focusing on the different techniques behind backing
    up transaction logs. This is the last piece of the puzzle as far as a complete
    backup solution, which consists of full, differential, and transaction log backups.
    This particular piece is important because, without transaction log backups, there
    can be no point-in-time restorations. In fact, there can be no restorations beyond
    what was in the last differential backup, and any data committed to the database
    since the last differential backup will be permanently lost since this data is
    resident only in the transaction log. For this reason, transaction logs are often
    viewed as the single most important piece of disaster recovery since they provide
    the missing pieces of data since the last differential backup.


    Without the transaction log backups, we would not be able to perform any backups
    outside of full or differential backups (not taking into account the backup types
    not discussed in this book, including file and filegroup backups, mirror backups,
    partial backups, and copy-only backups). While this may not seem too bad, it is
    important to remember that the transaction log must be backed up regularly in
    order to keep the database running optimally.


    ## What Is a Transaction Log?


    The transaction log is a file that contains a log of all of the changed or updated
    data from all database transactions. Every time the database state changes because
    of a modification to the data, the interaction with the database is kept in a
    log. The transactions in the log are written in the order they are received, so
    the transactions are all sequential. With this in mind, it is possible to “rewind”
    the state of the database transaction by transaction according to a specific timeframe,
    until reaching the desired state. This is known as a point-in-time restore.


    Note: A point-in-time restore can be extremely time-consuming, but the advantage
    is that the granularity of the transaction log is such that individual transactions
    can be targeted to achieve the desired results.


    Transaction logs also have the unique characteristic of growing extremely large
    over a relatively short period of time. For example, once a differential backup
    is run, that backup does not continue to grow. Similarly, a transaction log will
    continue to grow until it is backed up. These transaction log backups will then
    continue in the specified backup intervals for as long as there is disk space
    or until they are turned off. Each of these transaction logs will be able to restore
    to the last differential backup, and they cannot restore to any other backup.
    For this reason, all of the backups—full, differential, and transaction log—must
    be functioning 100% correctly in order for there to be the minimal amount of data
    loss. Without verifying that our transaction log backups are running correctly,
    the transaction log, over time, will eventually take over the entire disk. Obviously,
    allowing a transaction log to take over the entirety of a storage volume is not
    what anyone would call an ideal solution, and for that reason, we need to ensure
    that our backups are running smoothly and correctly. To help facilitate that goal,
    the next section will show us how to properly view the status of the transaction
    logs resident in SQL Server.'
