- fmt: "## 创建数据库快照\n\n假设您有一个 SQL Server Agent 作业，它将每小时创建一个数据库快照，并且在创建一定数量的快照后，最旧的快照将被删除。这可能是最常见的用例，因为它限制了存储在快照中的数据量，同时仍然提供可靠的快照结构。\n\
    \n创建数据库快照的语法您应该很熟悉，因为它本质上是一个 `CREATE DATABASE` 语句，如清单 [8-5](#A436605_1_En_8_Chapter.html#Par84)\
    \ 所示。\n\n```sql\nCREATE DATABASE backrecTestDB_snapshot_12AM ON (\nNAME = backrecTestDB,\n\
    FILENAME = 'E:\\SQL Server\\Data\\backrecTestDB_data_12AM')\nAS SNAPSHOT OF backrecTestDB;\n\
    -- Listing 8-5\n-- Create Database Snapshot Syntax\n```\n\n语句 `CREATE DATABASE\
    \ backrecTestDB_snapshot_12AM ON (` 表示我们要创建一个名为 `backrecTestDB_snapshot_12AM`\
    \ 的新数据库快照。在 SSMS 中查看时，这也是快照的名称。`ON` 关键字的存在意味着它基于一个现有文件。在此情况下，`NAME =` 属性保存了您在“数据库属性”窗口中找到的数据库文件的逻辑名称，如图\
    \ [8-16](#A436605_1_En_8_Chapter.html#Fig16) 所示。您可以通过右键单击数据库名称，选择“属性”，然后单击左侧的“文件”菜单选项来打开“文件”选项卡，找到此信息。\n\
    \n![A436605_1_En_8_Fig16_HTML.jpg](A436605_1_En_8_Fig16_HTML.jpg)\n\n*图 8-16 逻辑名称位置*\n\
    \n`FILENAME = 'E:\\SQL Server\\Data\\backrecTestDB_data_12AM'` 这行代码让我们声明要保存在文件系统中的文件名。最后，`)\
    \ AS SNAPSHOT OF backrecTestDB;` 这行代码让我们明确定义我们要创建的是一个快照，而不是一个“常规”数据库。将清单 [8-5](#A436605_1_En_8_Chapter.html#Par84)\
    \ 复制到“新建查询”窗口，并在将我的数据库名称更新为您自己的之后，按 F5 运行脚本。接下来，转到“对象资源管理器”，在工具栏中单击“刷新”按钮，并展开“数据库”下的“数据库快照”选项。如果清单\
    \ [8-5](#A436605_1_En_8_Chapter.html#Par84) 中的脚本运行正确，并且数据库快照已创建，您将看到图 [8-17](#A436605_1_En_8_Chapter.html#Fig17)\
    \ 所示的内容。\n\n![A436605_1_En_8_Fig17_HTML.jpg](A436605_1_En_8_Fig17_HTML.jpg)\n\n\
    *图 8-17 数据库快照创建成功*\n\n干得好！现在我们可以看到我们有一个快照，如果您展开 `backrecTestDB_snapshot_12AM`\
    \ 选项，您将看到拍摄快照时 `backrecTestDB` 数据库的确切内容。\n\n## 查询数据库快照\n\n查询数据库快照的方式与查询源数据库的方式相同。清单\
    \ [8-6](#A436605_1_En_8_Chapter.html#Par89) 展示了两种语法。\n\n```sql\nSELECT count(*)\
    \ as cnt FROM [backrecTestDB_snapshot_12AM].dbo.users2\nSELECT count(*) as cnt\
    \ FROM [backrecTestDB].dbo.users2\n-- Listing 8-6\n-- Querying Source Databases\
    \ and Snapshots\n```\n\n运行后，我们看到每个表都有 10,000 行。这是预料之中的，也是好的，因为它表明我们的数据到目前为止是一致的。我们现在想做的是从源数据库中删除一些数据，然后再次比较两个行数。我使用的查询在清单\
    \ [8-7](#A436605_1_En_8_Chapter.html#Par91) 中。\n\n```sql\nDELETE FROM [backrecTestDB].dbo.users2\
    \ WHERE fname = 'Bradley'\n-- Listing 8-7\n-- DELETE Snippet\n```\n\n执行此代码将从 `backrecTestDB`\
    \ 数据库的 `users2` 表中删除 1000 行。\n\n如果我们执行清单 [8-6](#A436605_1_En_8_Chapter.html#Par89)\
    \ 所示的代码，我们会看到快照中有 10,000 行，而源数据库中有 9000 行。\n\n如果此时我们再拍摄一个快照，然后从 `users2` 表中删除另一组数据或进行任何其他任意更改，那么我们将拥有三个独立且不同的数据集，我们可以从中恢复。\n\
    \n使用此示例，您可以看到为什么我之前提到将快照用作报告源。将数据作为冻结的时间点利用，可以为报告开辟很多可能性。\n\n## 恢复数据库快照\n\n现在我们看到有两个不同的数据库，包含两组不完全相同的数据，我们可以开始将快照恢复到源数据库之上的过程，基本上撤销自拍摄快照以来所做的任何操作。\n\
    \n为了恢复数据库快照，我们必须执行一个 `RESTORE DATABASE` 命令，类似于清单 [8-8](#A436605_1_En_8_Chapter.html#Par98)\
    \ 所示。\n\n```sql\nRESTORE DATABASE backrecTestDB\nFROM DATABASE_SNAPSHOT = 'backrecTestDB_snapshot_12AM'\n\
    -- Listing 8-8\n-- RESTORE DATABASE Syntax\n```\n\n在我们运行这个命令之前，让我们先了解一下此操作的几个注意事项。\n\
    \n*   只要没有到数据库实例的开放连接，代码就会运行。如果有开放连接，请运行以下代码关闭连接，然后再运行清单 [8-8](#A436605_1_En_8_Chapter.html#Par98)\
    \ 中的代码：\n    ```sql\n    ALTER DATABASE backrecTestDB\n    SET SINGLE_USER WITH\n\
    \    ROLLBACK IMMEDIATE\n    ```\n*   我们必须知道我们恢复的数据版本是否正确。是的，这就是我们创建命名约定的原因，但只需花一分钟查询快照并确保所需数据肯定在那里。当然，除非您只有一个快照，并且您创建它就是为了恢复。\n\
    *   当您验证数据正确后，您必须删除源数据库的任何其他快照。除非只有一个快照，否则恢复操作将无法继续。\n*   我们无法使用快照进行时间点恢复。您得到的就是数据库中的内容，仅此而已。因此，您必须确保要恢复的是正确的数据版本。\n\
    \n请继续执行清单 [8-8](#A436605_1_En_8_Chapter.html#Par98) 中的代码，然后立即执行清单 [8-6](#A436605_1_En_8_Chapter.html#Par89)\
    \ 中的代码。看！我们成功地将 `users2` 表恢复回了 10000 行，因为我们成功恢复了数据库快照。\n\n## 查看备份和还原历史记录\n\n是否曾想了解备份和还原操作背后发生的情况？翻阅数据库表格可能很单调，相信我。幸运的是，SQL\
    \ Server 内置了相当多的报告，其中一个专门可以帮助您查看备份和还原事件的报告称为“备份和还原事件”；多么方便！此报告对于定位备份和还原操作期间可能发生的任何错误非常有用。\n\
    \n要运行此报告，请右键单击您的数据库名称（对我来说是 `backrecTestDB`），将鼠标悬停在“报表”上，然后将鼠标悬停在“标准报表”上，并选择“备份和还原事件”。图\
    \ [8-18](#A436605_1_En_8_Chapter.html#Fig18) 显示了初始报告屏幕的样子。\n\n![A436605_1_En_8_Fig18_HTML.jpg](A436605_1_En_8_Fig18_HTML.jpg)\n\
    \n*图 8-18 备份和还原事件报告*\n\n此报告中有四个主要标题。它们如下：\n\n*   备份操作的平均耗时\n    *   平均持续时间是使用在此数据库上执行的各种类型备份操作的历史记录计算的。\n\
    *   成功的备份操作\n    *   显示过去在此数据库上执行的成功备份操作的详细信息。\n*   备份操作错误\n    *   显示过去导致备份操作失败的错误的详细信息。\n\
    *   成功的还原操作\n    *   显示过去在此数据库上执行的成功还原操作的详细信息。\n\n此报告非常易于浏览。您只需单击小加号即可展开表格。在内部，您将看到表格按最新记录在顶部进行排序。"
  raw: "#### Creating a Database Snapshot\n\nLet’s say that you have a SQL Server\
    \ Agent job that will create a database snapshot every hour, and the oldest snapshot\
    \ will be deleted after a certain number of snapshots is created. This is probably\
    \ the most common usage scenario, because it limits the amount of data that is\
    \ being stored in the snapshots, while still providing a reliable snapshot structure.\n\
    \nThe syntax to create a database snapshot will be familiar to you, since it is\
    \ essentially a CREATE DATABASE statement as shown in Listing [8-5](#A436605_1_En_8_Chapter.html#Par84).\n\
    \n```\nCREATE DATABASE backrecTestDB_snapshot_12AM ON (\nNAME = backrecTestDB,\n\
    FILENAME = 'E:\\SQL Server\\Data\\backrecTestDB_data_12AM')\nAS SNAPSHOT OF backrecTestDB;\n\
    Listing 8-5\nCreate Database Snapshot Syntax\n```\n\nThe statement `CREATE DATABASE\
    \ backrecTestDB_snapshot_12AM ON (` is saying that we want to create a new database\
    \ snapshot called `backrecTestDB_snapshot_12AM`. This is also the name of the\
    \ snapshot when viewed within SSMS. The presence of the `ON` keyword means that\
    \ it is based on an existing file. In this case, the `NAME =` attribute holds\
    \ the logical name of the database file as found in your Database Properties window,\
    \ as shown in Figure [8-16](#A436605_1_En_8_Chapter.html#Fig16). You can find\
    \ this information by right-clicking your database name, choosing Properties,\
    \ and then clicking the Files menu option on the left to open the Files tab.\n\
    \n![A436605_1_En_8_Fig16_HTML.jpg](A436605_1_En_8_Fig16_HTML.jpg)\n\nFigure 8-16\n\
    \nLogical Name location\n\nThe line `FILENAME = 'E:\\SQL Server\\Data\\backrecTestDB_data_12AM'`\
    \ lets us declare the name of the file to be saved in the file system. Finally,\
    \ the line `) AS SNAPSHOT OF backrecTestDB;` lets us specifically define that\
    \ we want to create a snapshot, and not a “regular” database. Copy Listing [8-5](#A436605_1_En_8_Chapter.html#Par84)\
    \ into a New Query window and press F5 to run the script, after you have updated\
    \ your database name for what I have. Next, switch over to Object Explorer and\
    \ press the Refresh button in the toolbar and expand the Database Snapshots option\
    \ underneath Databases. If the script in Listing [8-5](#A436605_1_En_8_Chapter.html#Par84)\
    \ runs correctly, and the database snapshot was created, you will see what is\
    \ shown in Figure [8-17](#A436605_1_En_8_Chapter.html#Fig17).\n\n![A436605_1_En_8_Fig17_HTML.jpg](A436605_1_En_8_Fig17_HTML.jpg)\n\
    \nFigure 8-17\n\nDatabase snapshot created successfully\n\nGood job! So now we\
    \ can see that we have a snapshot, and if you were to expand the backrecTestDB_snapshot_12AM\
    \ option, you would see the exact contents of the backrecTestDB database at the\
    \ time that the snapshot was taken.\n\n#### Querying a Database Snapshot\n\nYou\
    \ would query a database snapshot the same way you would query the source database.\
    \ Listing [8-6](#A436605_1_En_8_Chapter.html#Par89) shows both syntaxes.\n\n```\n\
    SELECT count(*) as cnt FROM [backrecTestDB_snapshot_12AM].dbo.users2\nSELECT count(*)\
    \ as cnt FROM [backrecTestDB].dbo.users2\nListing 8-6\nQuerying Source Databases\
    \ and Snapshots\n```\n\nOnce we run that, we see that we are at 10,000 rows in\
    \ each table. This is to be expected, and is good because it shows that our data\
    \ is consistent so far. What we want to do now is delete some data out of the\
    \ source database and compare the two row counts again. The query I used is in\
    \ Listing [8-7](#A436605_1_En_8_Chapter.html#Par91).\n\n```\nDELETE FROM [backrecTestDB].dbo.users2\
    \ WHERE fname = 'Bradley'\nListing 8-7\nDELETE Snippet\n```\n\nExecuting this\
    \ code deletes 1000 rows out of the `users2` table in the `backrecTestDB` database.\n\
    \nIf we execute the code shown in Listing [8-6](#A436605_1_En_8_Chapter.html#Par89),\
    \ we see there are 10,000 rows in the snapshot, and 9000 rows in the source database.\n\
    \nIf we were to take another snapshot at this point, and then delete another set\
    \ of data from the users2 table or make any other arbitrary change, then we would\
    \ have three separate and distinct sets of data that we could restore from.\n\n\
    Using this example, you can see why I mentioned earlier about using snapshots\
    \ as sources for reporting. Utilizing the data as a frozen point in time can open\
    \ up a lot of possibilities within reporting.\n\n#### Restoring a Database Snapshot\n\
    \nNow that we can see that I have two different databases with two sets of data\
    \ that are not exactly the same, we can begin the process of restoring the snapshot\
    \ on top of the source database, essentially undoing any operations done since\
    \ the snapshot was taken.\n\nIn order to restore the database snapshot, we have\
    \ to execute a RESTORE DATABASE command similar to what is shown in Listing [8-8](#A436605_1_En_8_Chapter.html#Par98).\n\
    \n```\nRESTORE DATABASE backrecTestDB\nFROM DATABASE_SNAPSHOT = 'backrecTestDB_snapshot_12AM'\n\
    Listing 8-8\nRESTORE DATABASE Syntax\n```\n\nBefore we run this, let’s go over\
    \ a couple of caveats about this operation.\n\n*   The code will run as long as\
    \ there are no open connections to the database instance. If there are open connections,\
    \ run the following code to close the connections before running the code in Listing\
    \ [8-8](#A436605_1_En_8_Chapter.html#Par98):\n\n    ```\n    ALTER DATABASE backrecTestDB\n\
    \    SET SINGLE_USER WITH\n    ROLLBACK IMMEDIATE\n    ```\n\n*   We have to know\
    \ that what we are restoring is the correct version of the data. Yes, that is\
    \ why we created the naming convention, but it takes just a minute to query the\
    \ snapshot and ensure that the data we need is definitely there. Unless, of course,\
    \ you only have a single snapshot and you just made it specifically to restore\
    \ from.\n*   When you have verified that the data is correct, then you must drop\
    \ any other snapshots of the source database. The restore operation will not continue\
    \ unless there is only a single snapshot.\n*   We cannot do point-in-time restores\
    \ with snapshots. You get what is in the database, and that’s it. For this reason,\
    \ you must ensure that you are restoring the correct version of the data to be\
    \ restored.\n\nGo ahead and execute the code in Listing [8-8](#A436605_1_En_8_Chapter.html#Par98),\
    \ and then immediately execute the code in Listing [8-6](#A436605_1_En_8_Chapter.html#Par89).\
    \ Look at that; we are back to 10000 rows in the users2 database because we successfully\
    \ restored the database snapshot.\n\n## Viewing Backup and Restore History\n\n\
    Ever wanted to see what is happening under the covers with your backup and restore\
    \ operations? Poring through database tables can be monotonous, trust me. Luckily,\
    \ SQL Server has quite a few reports built in, and one specifically that can help\
    \ you with viewing backup and restore events is called Backup and Restore Events;\
    \ how convenient! This report can be extremely useful in pinpointing any errors\
    \ that may happen during backup and restore operations.\n\nTo run this report,\
    \ right-click your database name (backrecTestDB, for me) and hover over Reports,\
    \ then hover over Standard Reports, and select Backup and Restore Events. Figure\
    \ [8-18](#A436605_1_En_8_Chapter.html#Fig18) shows what the initial report screen\
    \ looks like.\n\n![A436605_1_En_8_Fig18_HTML.jpg](A436605_1_En_8_Fig18_HTML.jpg)\n\
    \nFigure 8-18\n\nBackup and Restore Events report\n\nThere are four main headings\
    \ in this report. They are as follows:\n\n*   Average Time Taken for Backup Operations\n\
    \    *   The average duration is calculated using the history of various types\
    \ of backup operations performed on this database.\n*   Successful Backup Operations\n\
    \    *   Shows details of the successful backup operations performed on this database\
    \ in the past.\n*   Backup Operation Errors\n    *   Shows details of the errors\
    \ which caused the backup operations failure in the past.\n*   Successful Restore\
    \ Operations\n    *   Shows details of the successful restore operations performed\
    \ on this database in the past.\n\nThis report is very easy to navigate. All you\
    \ need to do is click the little plus sign to expand the table. Inside, you will\
    \ see that the table is sorted with the newest records on top."
  trans: "\n## 创建数据库快照\n\n假设您有一个 SQL Server Agent 作业，它将每小时创建一个数据库快照，并且在创建一定数量的快照后，最旧的快照将被删除。这可能是最常见的用例，因为它限制了存储在快照中的数据量，同时仍然提供可靠的快照结构。\n\
    \n创建数据库快照的语法您应该很熟悉，因为它本质上是一个 `CREATE DATABASE` 语句，如清单 8-5 所示。\n\n```sql\nCREATE\
    \ DATABASE backrecTestDB_snapshot_12AM ON (\nNAME = backrecTestDB,\nFILENAME =\
    \ 'E:\\SQL Server\\Data\\backrecTestDB_data_12AM')\nAS SNAPSHOT OF backrecTestDB;\n\
    -- 清单 8-5\n-- 创建数据库快照语法\n```\n\n语句 `CREATE DATABASE backrecTestDB_snapshot_12AM\
    \ ON (` 表示我们要创建一个名为 `backrecTestDB_snapshot_12AM` 的新数据库快照。在 SSMS 中查看时，这也是快照的名称。`ON`\
    \ 关键字的存在意味着它基于一个现有文件。在此情况下，`NAME =` 属性保存了您在“数据库属性”窗口中找到的数据库文件的逻辑名称，如图 8-16 所示。您可以通过右键单击数据库名称，选择“属性”，然后单击左侧的“文件”菜单选项来打开“文件”选项卡，找到此信息。\n\
    \n![A436605_1_En_8_Fig16_HTML.jpg](img/A436605_1_En_8_Fig16_HTML.jpg)\n\n*图 8-16\
    \ 逻辑名称位置*\n\n`FILENAME = 'E:\\SQL Server\\Data\\backrecTestDB_data_12AM'` 这行代码让我们声明要保存在文件系统中的文件名。最后，`)\
    \ AS SNAPSHOT OF backrecTestDB;` 这行代码让我们明确定义我们要创建的是一个快照，而不是一个“常规”数据库。将清单 8-5 复制到“新建查询”窗口，并在将我的数据库名称更新为您自己的之后，按\
    \ F5 运行脚本。接下来，转到“对象资源管理器”，在工具栏中单击“刷新”按钮，并展开“数据库”下的“数据库快照”选项。如果清单 8-5 中的脚本运行正确，并且数据库快照已创建，您将看到图\
    \ 8-17 所示的内容。\n\n![A436605_1_En_8_Fig17_HTML.jpg](img/A436605_1_En_8_Fig17_HTML.jpg)\n\
    \n*图 8-17 数据库快照创建成功*\n\n干得好！现在我们可以看到我们有一个快照，如果您展开 `backrecTestDB_snapshot_12AM`\
    \ 选项，您将看到拍摄快照时 `backrecTestDB` 数据库的确切内容。\n\n## 查询数据库快照\n\n查询数据库快照的方式与查询源数据库的方式相同。清单\
    \ 8-6 展示了两种语法。\n\n```sql\nSELECT count(*) as cnt FROM [backrecTestDB_snapshot_12AM].dbo.users2\n\
    SELECT count(*) as cnt FROM [backrecTestDB].dbo.users2\n-- 清单 8-6\n-- 查询源数据库和快照\n\
    ```\n\n运行后，我们看到每个表都有 10,000 行。这是预料之中的，也是好的，因为它表明我们的数据到目前为止是一致的。我们现在想做的是从源数据库中删除一些数据，然后再次比较两个行数。我使用的查询在清单\
    \ 8-7 中。\n\n```sql\nDELETE FROM [backrecTestDB].dbo.users2 WHERE fname = 'Bradley'\n\
    -- 清单 8-7\n-- DELETE 代码片段\n```\n\n执行此代码将从 `backrecTestDB` 数据库的 `users2` 表中删除 1000\
    \ 行。\n\n如果我们执行清单 8-6 所示的代码，我们会看到快照中有 10,000 行，而源数据库中有 9000 行。\n\n如果此时我们再拍摄一个快照，然后从\
    \ `users2` 表中删除另一组数据或进行任何其他任意更改，那么我们将拥有三个独立且不同的数据集，我们可以从中恢复。\n\n使用此示例，您可以看到为什么我之前提到将快照用作报告源。将数据作为冻结的时间点利用，可以为报告开辟很多可能性。\n\
    \n## 恢复数据库快照\n\n现在我们看到有两个不同的数据库，包含两组不完全相同的数据，我们可以开始将快照恢复到源数据库之上的过程，基本上撤销自拍摄快照以来所做的任何操作。\n\
    \n为了恢复数据库快照，我们必须执行一个 `RESTORE DATABASE` 命令，类似于清单 8-8 所示。\n\n```sql\nRESTORE DATABASE\
    \ backrecTestDB\nFROM DATABASE_SNAPSHOT = 'backrecTestDB_snapshot_12AM'\n-- 清单\
    \ 8-8\n-- RESTORE DATABASE 语法\n```\n\n在我们运行这个命令之前，让我们先了解一下此操作的几个注意事项。\n\n*   只要没有到数据库实例的开放连接，代码就会运行。如果有开放连接，请运行以下代码关闭连接，然后再运行清单\
    \ 8-8 中的代码：\n    ```sql\n    ALTER DATABASE backrecTestDB\n    SET SINGLE_USER\
    \ WITH\n    ROLLBACK IMMEDIATE\n    ```\n*   我们必须知道我们恢复的数据版本是否正确。是的，这就是我们创建命名约定的原因，但只需花一分钟查询快照并确保所需数据肯定在那里。当然，除非您只有一个快照，并且您创建它就是为了恢复。\n\
    *   当您验证数据正确后，您必须删除源数据库的任何其他快照。除非只有一个快照，否则恢复操作将无法继续。\n*   我们无法使用快照进行时间点恢复。您得到的就是数据库中的内容，仅此而已。因此，您必须确保要恢复的是正确的数据版本。\n\
    \n请继续执行清单 8-8 中的代码，然后立即执行清单 8-6 中的代码。看！我们成功地将 `users2` 表恢复回了 10000 行，因为我们成功恢复了数据库快照。\n\
    \n## 查看备份和还原历史记录\n\n是否曾想了解备份和还原操作背后发生的情况？翻阅数据库表格可能很单调，相信我。幸运的是，SQL Server 内置了相当多的报告，其中一个专门可以帮助您查看备份和还原事件的报告称为“备份和还原事件”；多么方便！此报告对于定位备份和还原操作期间可能发生的任何错误非常有用。\n\
    \n要运行此报告，请右键单击您的数据库名称（对我来说是 `backrecTestDB`），将鼠标悬停在“报表”上，然后将鼠标悬停在“标准报表”上，并选择“备份和还原事件”。图\
    \ 8-18 显示了初始报告屏幕的样子。\n\n![A436605_1_En_8_Fig18_HTML.jpg](img/A436605_1_En_8_Fig18_HTML.jpg)\n\
    \n*图 8-18 备份和还原事件报告*\n\n此报告中有四个主要标题。它们如下：\n\n*   备份操作的平均耗时\n    *   平均持续时间是使用在此数据库上执行的各种类型备份操作的历史记录计算的。\n\
    *   成功的备份操作\n    *   显示过去在此数据库上执行的成功备份操作的详细信息。\n*   备份操作错误\n    *   显示过去导致备份操作失败的错误的详细信息。\n\
    *   成功的还原操作\n    *   显示过去在此数据库上执行的成功还原操作的详细信息。\n\n此报告非常易于浏览。您只需单击小加号即可展开表格。在内部，您将看到表格按最新记录在顶部进行排序。\n"
- fmt: "## Summary\n\nThis chapter saw us finally wrapping up the restore operations\
    \ and learning about the different options of restoring data that are vital to\
    \ the backup and restore operations. We learned about restoring pages and the\
    \ value of `msdb..suspect_pages` to find out about suspected corruption of the\
    \ pages in the database. We went over restoring from a database snapshot and all\
    \ that entails. And finally, we learned about viewing the history of the backup\
    \ and restore history. This chapter concludes this section on the restore aspect\
    \ of the backup and restore operation. In the next section, we will start getting\
    \ everything put together into a single separate backup and Restore plan.\n\n\
    ## Part III\n### Complete Solutions\n\n## 9. Full Backup and Restore Solutions\n\
    \nIn the “real world,” there is a definite business need to have reliable backups\
    \ available at a moment’s notice. The eventuality of data corruption is almost\
    \ a guarantee, so the seasoned DBA must know that their database can be restored\
    \ quickly and correctly. The availability and reliability of the backup is of\
    \ utmost importance, whether backups are stored in a remote location or they are\
    \ stored local to the database server. We often deal with service-level agreements,\
    \ or SLAs, in our backup and recovery practices. This sort of document deals with\
    \ a wide range of specifics, such as how often the backups are to be run, the\
    \ conditions for restoring data, and how to restore the data. You may work in\
    \ a place that doesn’t deal with these, and that is fine also. For instance, if\
    \ you are providing database storage as a service as part of a web hosting package,\
    \ then you will more than likely be bound with an SLA which describes the specifics\
    \ of the availability of that system. Whether or not you are bound by an SLA in\
    \ your daily responsibilities as a DBA, the one thing that will not change is\
    \ your responsibility to the well-being of the database and the data it houses.\
    \ I have tried to get one message across in every book I have written so far,\
    \ and this book is no different: there is no greater responsibility we have as\
    \ DBAs than the protection of our data.\n\nIn my personal experience, I can think\
    \ of a grand total of one DBA that I know that has a complete backup scenario\
    \ completely in T-SQL. This person’s justification was that SQL could be run from\
    \ outside of SSMS, so having it available outside of SSMS was ideal. While a part\
    \ of me agrees with this, another part of me says that we should be leveraging\
    \ the tools we have at our disposal, including (and especially) ones that we can\
    \ use automate tasks such as backups. To me, it makes sense to have the bulk of\
    \ the work done by SSMS, but still have the T-SQL available for the code hounds\
    \ like my DBA friend in case we need to back up or restore the database and SSMS\
    \ is not available to us for some reason. For this reason, we are going to focus\
    \ this chapter on creating a maintenance plan for a full backup in SQL Server\
    \ Management Studio, and then working up the corresponding T-SQL, in case we need\
    \ it. Understand that this is not to say that T-SQL does not have its place as\
    \ the main scripting tool for the seasoned or beginning DBA; to suggest otherwise\
    \ makes no sense, since T-SQL is the underlying language that DBAs use to communicate\
    \ with the database. There are many T-SQL solutions available on a simple Google\
    \ search, and the one worth really mentioning is Ola Hallengren’s backup script\
    \ solution, located at [`https://ola.hallengren.com/`](https://ola.hallengren.com/).\n\
    \nUp until now, we have concentrated on the differences between backups and restores\
    \ and kept them separated in our minds through the different chapters. We need\
    \ to start to join those disparate concepts together now into a cohesive unit,\
    \ and the best way that I can think of to do that is by creating two separate\
    \ maintenance plans, one for backups and one for restores, to manage the different\
    \ parts of the plan. The obvious implication of having separate maintenance plans\
    \ is that there will be a different schedule in place for each backup portion.\n\
    \nFor this chapter, we will go through how to create a maintenance plan for full\
    \ backups. Now, clearly, we don’t want to have the restore sequence as part of\
    \ the backup scenario. The reason for this is because all we would be doing is\
    \ running a full database backup, and then restoring that backup right on top\
    \ of the database that we just backed up. Listing [9-1](#A436605_1_En_9_Chapter.html#Par6)\
    \ shows what we will build in this chapter.\n\n**Listing 9-1. To-Do List**\n```\n\
    * Full backup maintenance plan in SSMS\n    * Based on our previous schedule,\
    \ one full backup every 24 hours\n    * Backups must be on a separate physical\
    \ disk than the installation of SQL Server\n* Full restore maintenance plan in\
    \ SSMS\n    * Not scheduled, but available to SSMS as an SQL Server Integration\
    \ Services (SSIS) package\n* Full backup maintenance plan in T-SQL\n    * Not\
    \ scheduled and can be run from `sqlcmd` when necessary\n* Full restore maintenance\
    \ plan in T-SQL\n    * Not scheduled and can be run from `sqlcmd` when necessary\n\
    ```\nThat seems like a pretty good start for this chapter. In the two chapters\
    \ following this one, we will essentially build the same thing for our differential\
    \ and transaction log backups."
