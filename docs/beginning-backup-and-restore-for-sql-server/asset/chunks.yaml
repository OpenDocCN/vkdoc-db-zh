  raw: '### Backup Types


    Separate from recovery models are the three different backup types. Those types
    are as follows:


    *   Full: a backup of the entire database

    *   Differential: a backup of the changed information since the last full backup

    *   Transaction log: the log of transactions since the last backup


    These backup types were introduced earlier in this chapter as well, and are discussed
    at length throughout the entirety of this book. For that reason, I won’t get into
    the specifics of the backup types just yet, and will let the individual chapters
    for these areas detail the relevant information about the different types.


    Note


    The main idea of recovery models and backup types is that certain recovery models
    can only work with certain backup types, so the choice of the recovery model is
    the first step in designing an effective backup solution.


    Keeping in mind the relationship between recovery models and backup types is important,
    as you can tell. The focus of this book is to reinforce that knowledge, and build
    on it to create a greater understanding of what we can do to create an effective
    backup strategy that will help mitigate disaster in the future.


    Acknowledgments


    Thanks to Jonathan and Jill at Apress for letting me write another book.


    Thanks to my “newly retired” parents for everything.


    Finally, thanks to my wife and kids for understanding.


