  trans: "### 时间点还原/恢复\n\n要还原事务日志，我们首先需要还原一个完整备份，并可选地还原一个差异备份。你是否曾在数据库卡在 `正在还原` 模式时，在\
    \ `SSMS` 中见过数据库的状态？正如我在本章前面提到的，当使用 `RESTORE WITH STANDBY` 或 `RESTORE WITH NORECOVERY`\
    \ 选项还原完整或差异备份时，就会发生这种情况。数据库将保持 `正在还原` 状态，直到事务日志尾部被还原，或者 `RESTORE WITH RECOVERY`\
    \ 语句作为还原过程的一部分被执行。让我们在实践中看一下。\n\n在 SQL Server Management Studio 中，右键单击你的数据库（我的数据库名为\
    \ `backrecTestDB`），然后导航到 **任务** ➤ **还原** ➤ **数据库…** 以继续。图 7-8 显示了此菜单项的位置。\n\n\
    ![A436605_1_En_7_Fig8_HTML.jpg](img/A436605_1_En_7_Fig8_HTML.jpg)\n\n图 7-8\n\n\
    还原数据库菜单位置\n\n打开的界面标题为 **还原数据库**。请注意，左侧有三个选项卡：**常规**、**文件**和**选项**，对应于此界面中的不同页面。默认选择是**常规**，这正是我们在图\
    \ 7-9 中看到的。\n\n![A436605_1_En_7_Fig9_HTML.jpg](img/A436605_1_En_7_Fig9_HTML.jpg)\n\
    \n图 7-9\n\n还原数据库界面\n\n此页面向我们展示了**源**、**目标**和**还原计划**部分。这些部分定义如下：\n\n*   **源**：要从中还原的源文件的位置。可以是包含备份文件的现有数据库，也可以是包含备份文件的本地或网络存储位置。\n\
    *   **目标**：要还原到的数据库的位置。此处的`还原到`字段的默认值是最后一个备份集，但可以通过单击**时间线…**按钮并选择要还原的时间范围来进行调整。这被称为时间点还原。\n\
    *   **还原计划**：该部分详细说明了将要还原的文件，以及即将介绍的**要还原的备份集：**部分。\n\n假设我想将我的数据库还原到今天早上 8:00\
    \ 的状态。界面的这个部分就是你想要去的地方，因为它允许你精确定位要从中还原数据的特定时间和数据。\n\n点击图 7-9 所示界面中**目标**部分的**时间线**按钮。将打开一个屏幕，如图\
    \ 7-10 所示，标题为**备份时间线 : backrecTestDB**（或你的数据库名称）。\n\n![A436605_1_En_7_Fig10_HTML.jpg](img/A436605_1_En_7_Fig10_HTML.jpg)\n\
    \n图 7-10\n\n备份时间线: backrecTestDB\n\n请注意，初始配置是**最近一次备份**。在这种情况下，最近一次备份的时间是晚上 7:00。这对你来说可能很理想，但我想还原到早上\
    \ 8:00，记得吗？点击**特定日期和时间**的单选按钮，并选择你想要还原到的日期。图 7-11 显示了我更新后的界面。\n\n![A436605_1_En_7_Fig11_HTML.jpg](img/A436605_1_En_7_Fig11_HTML.jpg)\n\
    \n图 7-11\n\n备份时间线: backrecTestDB, 已更新\n\n请注意，`时间线间隔`字段设置为**天**。此下拉菜单中还有其他选项，其值包括**小时**、**六小时**和**周**。如果你愿意，可以随意选择这些选项，但你刚刚所做的选择值可能会发生变化。你还可以在时间线视图底部、图例上方移动滑块以获得更精确的时间线定位。当你选择了想要还原到的正确时间后，单击**确定**按钮返回**还原数据库**屏幕。\n\
    \n一旦你返回到**还原数据库**界面，请注意**要还原的备份集：**部分已更新，显示了相关的待还原备份集。通常，此区域将填充与选定的需要还原事务的时间范围相关的完整备份和差异备份。图\
    \ 7-12 显示了**要还原的备份集：**部分重新填充后的我的屏幕。\n\n![A436605_1_En_7_Fig12_HTML.jpg](img/A436605_1_En_7_Fig12_HTML.jpg)\n\
    \n图 7-12\n\n还原数据库, 已更新\n\n此时，我们可以看到列表顶部是完整备份，然后是差异备份，底部是两个事务日志备份。如果需要验证介质，请点击**验证备份介质**按钮；我通常在看到此按钮时都会点击，以防万一。\n\
    \n左侧的**文件**选项卡现在可以保持原样。你通常在此处定义还原文件的存储位置和名称，但我们不打算更改此设置。\n\n**选项**选项卡需要一些解释。请导航到那里，并注意该界面包含以下部分和选项：\n\
    \n*   **还原选项**\n    *   **覆盖现有数据库 (WITH REPLACE)**：此选项将覆盖所选数据库的数据库文件。这是一个破坏性很强的选项，请自行承担使用风险。\n\
    \    *   **保留复制设置 (WITH KEEP_REPLICATION)**：如果为数据库定义了复制设置，则保留它们。此选项专门用于需要将已发布到不同于备份数据库的服务器的数据库进行还原的情况。\n\
    \    *   **限制对还原数据库的访问 (WITH RESTRICTED_USER)**：数据库还原后，只有 `db_owner`、`dbcreator`\
    \ 和 `sysadmin` 的成员可以访问。\n*   **恢复状态**\n    *   **RESTORE WITH RECOVERY**：此选项将还原所有备份集作为默认操作。\n\
    \    *   **RESTORE WITH NORECOVERY**：此选项将使数据库保持前面讨论的`正在还原…`状态。一旦事务日志尾部被还原，数据库将转入正常状态。\n\
    \    *   **RESTORE WITH STANDBY**：此选项将使数据库处于只读状态。如果选择此选项，则必须指定一个备用文件。\n    * \
    \  **备用文件**：此文件将撤消恢复操作。\n*   **尾部日志备份**（包含先前未备份的事务日志部分或活动部分的备份）\n    *   **还原前进行尾部日志备份**：指定你希望备份事务日志的尾部。\n\
    \    *   **使源数据库保持在还原状态 (WITH NORECOVERY)**：与前面列出的选项相同；数据库将保持在`正在还原…`状态。\n   \
    \ *   **备份文件**：事务日志尾部备份文件的位置。\n*   **服务器连接**\n    *   **关闭到目标数据库的现有连接**：基本上，此选项将数据库置于单用户模式，并关闭所有从\
    \ `SSMS` 到数据库引擎的连接。还原过程完成后，数据库将恢复为多用户模式，连接再次可用。\n*   **提示**\n    *   **还原每个备份前进行提示**：此选项将显示一个弹出窗口，询问是否要继续每次还原操作。\n\
    \n对于此**选项**选项卡，我只想勾选**覆盖现有数据库**并取消选中**使源数据库保持在还原状态**。此屏幕上的其他所有内容都可以保持不变（图 7-13）。\n\
    \n![A436605_1_En_7_Fig13_HTML.jpg](img/A436605_1_En_7_Fig13_HTML.jpg)\n\n图 7-13\n\
    \n还原数据库, 选项选项卡\n\n准备就绪后，单击屏幕底部的**确定**按钮。你应该会看到界面顶部的“正在还原”状态部分，以及一个递增至 100% 的进度百分比，直到成功完成。"
- fmt: 'Next, go back over to `SSMS` and run the following query:


    ```sql

    SELECT count(*) as cnt FROM users1

    ```


    Your result should be 20030000. Congratulations!


    In this first section, we have successfully restored transaction logs two different
    ways within `SQL Server Management Studio`.


    ## Restoring Using Transact-SQL


    This method is a bit easier. In the download of `SQL Server Management Studio`,
    there is a sidebar available titled `Template Browser`. If you don’t see it immediately
    available, press `Ctrl+Alt+T`, or go to `View` ➤ `Template Explorer` in `SSMS`.
    The sidebar should open to the right of the main window. Scroll down to the `Restore`
    submenu and expand it. You should see `Restore Database` and `Restore Files and
    Filegroups` as files under the `Restore` submenu. This should look familiar, because
    we just dealt with these interfaces in the previous section.


    The general idea goes like this: you double-click whichever template you want
    to edit, and the template opens up as a new query in the main `SSMS` window. You
    can then make whatever changes you want to this file and save it to your local
    file system as a brand-new script.


    ### Restore File and Filegroups Template


    This template is a bit more involved than the `Restore Database` template introduced
    shortly, and for good reason. This template deals with restoring individual files,
    whereas the `Restore Database` template simply restores the database and that’s
    it. First things first; we need to delete the portion of the template that wants
    us to create a database, back up the database, and back up the transaction log.
    This essentially means that we are going to delete lines 5 through 41, inclusive.
    That means we should be left with four statements, each beginning with `RESTORE`.
    Next, we want to delete one of these `RESTORE` statements. The reason for this
    is because we are assuming that we are going to restore a full backup, then a
    differential backup, and then the transaction log.


    Before we go any further, let’s add some more data to the database by running
    the script shown in Listing 7-2. Note that this is exactly the same script as
    Listing 7-1.


    ```sql

    DECLARE @cnt INT;

    SET @cnt = 0;

    WHILE @cnt <= 1000

    BEGIN

    INSERT INTO users1 SELECT * FROM users2;

    SET @cnt = @cnt + 1;

    END;

    -- Listing 7-2

    -- Create More Data for the Database

    ```


    The record count before running this script was 20030000, and the record count
    after running the script is 30040000. Now that this data is in the table, go ahead
    and run a full backup and a differential backup using the `SQL Server Agent` jobs
    you should have created in Chapter 1.


    Next, you should modify your script to look like what is shown in Listing 7-3.


    ```sql

    USE master

    -- full database restore

    RESTORE DATABASE backrecTestDB

    FROM DISK = N''E:\SQL Server\Backup\backrecTestDB_FULL.bak''

    WITH NORECOVERY, REPLACE

    -- differential database restore

    RESTORE DATABASE backrecTestDB

    FROM DISK = N''E:\SQL Server\Backup\backrecTestDB_DIFFERENTIAL.bak''

    WITH NORECOVERY

    -- Restore logs

    -- restore 7 AM log

    RESTORE LOG backrecTestDB

    FROM DISK = N''E:\SQL Server\Logs\backrecTestDB_7AM.trn''

    WITH NORECOVERY

    -- restore 8 AM log

    RESTORE LOG backrecTestDB

    FROM DISK = N''E:\SQL Server\Logs\backrecTestDB_8AM.trn''

    WITH NORECOVERY

    RESTORE DATABASE backrecTestDB WITH RECOVERY

    -- Listing 7-3

    -- Restore Script

    ```


    Executing the script shown in Listing 7-2 in `SQL Server Management Studio` will
    render what is shown in Figure 7-14.


    ![Script results](A436605_1_En_7_Fig14_HTML.jpg)


    *Figure 7-14: Script results*


    We can see there that the full, differential, and transaction log backups have
    been successfully restored. The record count before running this script was 30,040,000,
    and the record count after running the script is 20,030,000.


    So there we have it! We have successfully restored transaction logs using `SQL
    Server Management Studio` and `Transact-SQL`.


    ## Summary


    In this chapter, we have learned how the various parts of the restoration process
    within `SQL Server` work together to create a viable solution for restoring data.
    We looked at the different parts of the interfaces necessary within `SQL Server
    Management Studio` to complete the task.


    The final script for the transaction log restore is available as `TransactionLogRestore.sql`
    in the download for this book.


    In the next chapter, we are going to tie together all of the restoration principles
    we have learned in Chapters 5 through 8 into one giant restoration script.'
