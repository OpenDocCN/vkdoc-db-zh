  trans: '

    ## 摘要


    在本章中，我们了解了如何使用 SQL Server Management Studio 备份和还原差异数据的基础知识。我们学习了 `RESTORE DATABASE`
    命令的 T-SQL 部分，以及 `WITH NORECOVERY` 和 `WITH RECOVERY` 命令的作用。我们回顾了使用最新的差异备份来还原差异数据的步骤，并学习了如何验证差异还原是否已成功完成。


    在下一章中，我们将探讨事务日志备份和还原解决方案，这将增强我们在本书中一直在构建的“备份计划”维护计划。在该章结束时，您将对如何从 SQL Server 备份数据有很好的理解，更重要的是，您将了解如何将该数据还原到
    SQL Server，然后验证数据是否已按预期正确还原。


    # 11. 事务日志备份和还原解决方案


    在本书的这一部分，我们研究了针对完整和差异类型的完整备份和还原解决方案。我们看到了差异还原类型如何使用完整还原类型作为还原的基础，然后还原到进行差异备份的时间点。在本章中，我们将探讨如何完成单个备份和还原计划的第三部分，即事务日志。


    我们分别在第 3 章和第 7 章中研究了事务日志及其工作原理。事务日志的明显目的是记录事务日志，但它们还用于定义事务所在的可量化时间段。换句话说，它不仅仅是一堆杂乱无章的随机数据；它是数据库视角下按时间顺序排列的事件精确记录。这就是我们能够将数据库回滚到特定事务，或者将某个时间段内的所有更改应用到差异或完整还原操作的方式。除非您极其幸运，恰好能够还原到完整或差异备份被还原的确切时间点，否则这种精确度是无法以任何方式实现的。否则，您将仅限于完整或差异还原操作中存储的数据，这无法提供还原到特定时间点所需的精确度。然而，发生这种情况的可能性非常、非常低，因此，我们依赖事务日志来帮助我们非常准确地将重要数据还原到应用程序或我们的
    SLA 所要求的点。


    在本节之前的章节中，我们基本上是以完整还原或差异还原的形式恢复了一大块数据。曾经有一位讲师告诉我所在的班级，还原方法就像生日蛋糕；有很多层，但实际上只有两个主要部分：绝大部分数据（烤好的蛋糕部分）和数据的细枝末节（糖霜）。换句话说，没有糖霜，您当然也可以有一个很棒的蛋糕，但糖霜非常美味，而且确实能为蛋糕增色。这也许不是最好的类比，但在我脑海中是有道理的，因为我可以想象一个没有糖霜的蛋糕仍然是一个蛋糕，但并不完整；而一个有糖霜的蛋糕……那才叫蛋糕！


    作为本章的开始，我们再次需要清楚地了解我们想要完成什么。通常，我们可以在很短的时间内准备好一个备份例程。真正的困难出现在我们必须处理还原事务日志的时候。因此，我们需要以与过去进行完整和差异备份略有不同的方式来进行备份。清单
    11-1 展示了我们将要采取的创建事务日志备份的步骤。这是一个简单的过程，特别是因为我们已经在第 3 章中完成了大部分步骤，所以现在我们需要将该章所学内容增强为一个可工作的解决方案，以便与我们的完整备份计划一起使用。回到第
    3 章，我们确定希望每小时运行一次事务日志备份，这样我们可能丢失的最大数据量是最小的。当我们还原事务日志时，请记住，我们可以选择备份日志尾部，其中包含最近的事务，因此我们可以使用时间点还原功能还原到故障发生的精确点。

    '
- fmt: '## 在 SSMS 中添加事务日志备份


    我可以想象，在这一点上你开始觉得有点熟悉了。我们将把事务日志备份部分添加到我们现有的“备份计划”维护计划中。回想一下，我们已经有了维护计划的完整备份和差异备份部分，因此这将是完成备份计划所需的最后一部分。我在清单
    [11-1](#A436605_1_En_11_Chapter.html#Par6) 中概述了一些需要记住的重要事项。


    清单 11-1. 待办事项清单


    *   事务日志备份将每小时执行一次，准点运行

    *   在差异备份之间，我们最多只能恢复五个事务日志


    我将这些项目标记为本节的“待办事项清单”，因为我们需要确保在完成本节之前满足这些目标。


    要添加维护计划的事务日志部分，请在对象资源管理器中打开“备份计划”维护计划，使该计划显示在 SQL Server Management Studio 的主界面中，如图
    [11-1](#A436605_1_En_11_Chapter.html#Fig1) 所示。


    ![A436605_1_En_11_Fig1_HTML.jpg](A436605_1_En_11_Fig1_HTML.jpg)

    图 11-1：备份计划


    接下来，我们想单击屏幕顶部显示的“添加子计划”按钮。当“子计划属性”窗口出现时，在适用字段中添加以下值：

    *   名称：`Transaction log backup`

    *   说明：这是备份维护计划的事务日志备份部分。


    此时我们不想更改计划或“作为运行”选项，因为我们稍后会处理这些。此时，你应该在“子计划属性”窗口中看到如图 [11-2](#A436605_1_En_11_Chapter.html#Fig2)
    所示的内容。


    ![A436605_1_En_11_Fig2_HTML.jpg](A436605_1_En_11_Fig2_HTML.jpg)

    图 11-2：子计划属性


    输入此信息后单击“确定”。请注意，主界面会更新，如图 [11-3](#A436605_1_En_11_Chapter.html#Fig3) 所示，将事务日志备份添加为新的子计划。另请注意，事务日志备份子计划被选中，但主界面中没有任何内容，因为这是维护计划的一个全新部分。


    ![A436605_1_En_11_Fig3_HTML.jpg](A436605_1_En_11_Fig3_HTML.jpg)

    图 11-3：更新后的备份计划


    现在我们有一个空白区域可以操作，通过单击左侧的浮动菜单或按 `Ctrl+Alt+X` 打开工具箱，并将一个“备份数据库任务”项拖到主界面。我们现在看到了熟悉的带有红色
    X 的界面，如图 [11-4](#A436605_1_En_11_Chapter.html#Fig4) 所示，因此双击该任务进行编辑。


    ![A436605_1_En_11_Fig4_HTML.jpg](A436605_1_En_11_Fig4_HTML.jpg)

    图 11-4：备份数据库任务


    一旦“备份数据库任务”窗口打开，你需要在备份类型下拉菜单中选择 `transaction log`。接下来，你需要从“数据库”下拉菜单中选择 `backrecTestDB`（或你的数据库）。你也可以在此区域选择任何其他数据库，但此时我们专门处理我们的数据库。选择所需数据库后，单击“确定”按钮返回主“备份数据库任务”窗口。此选项卡上的最后一个选项“备份到”应保留为默认选项，即
    `Disk`。完成的界面如图 [11-5](#A436605_1_En_11_Chapter.html#Fig5) 所示。


    ![A436605_1_En_11_Fig5_HTML.jpg](A436605_1_En_11_Fig5_HTML.jpg)

    图 11-5：备份数据库任务，“常规”选项卡，已完成


    你是否注意到，一旦选择了数据库，“备份组件”选择就变为禁用状态？这是因为你选择了 `transaction log` 选项，因此显然无法选择事务日志以外的备份组件。


    在此窗口中选择“目标”选项卡以继续。我们在下一个屏幕上要做的全部操作就是勾选“为每个数据库创建子目录”选项。此选项卡的完成界面如图 [11-6](#A436605_1_En_11_Chapter.html#Fig6)
    所示。


    ![A436605_1_En_11_Fig6_HTML.jpg](A436605_1_En_11_Fig6_HTML.jpg)

    图 11-6：备份数据库任务，“目标”选项卡，已完成


    这个简单的选择告诉 SQL Server，我们不希望将事务日志全部放入一个文件夹；相反，我们希望它们按数据库名称分开存放。这将使需要时的恢复和管理更加容易。


    接下来选择“选项”选项卡，并回想一下我们要选择的选项如下：

    *   `Verify integrity`

    *   `Perform checksum`


    这些选项将确保我们正在验证备份，并确保将对备份进行错误检查。图 [11-7](#A436605_1_En_11_Chapter.html#Fig7) 显示了此选项卡的完成界面。


    ![A436605_1_En_11_Fig7_HTML.jpg](A436605_1_En_11_Fig7_HTML.jpg)

    图 11-7：备份数据库任务，“选项”选项卡，已完成


    更新此选项卡后，单击“确定”按钮关闭此窗口并返回主界面。请注意，主界面上我们的“备份数据库任务”项中的红色 X 消失了。这表明该任务已消除了基本错误，这些错误在之前红色
    X 存在时会阻碍成功启动。


    接下来，我们需要设置此任务的计划。


    ## 计划事务日志备份


    就像我们在第 [9](#A436605_1_En_9_Chapter.html) 章和第 [10](#A436605_1_En_10_Chapter.html)
    章中设置的先前子计划一样，我们需要单击我们要更新的子计划所在行的日历。在本例中，我们将选择事务日志备份子计划上的日历。这将打开之前章节中看到的“新建作业计划”窗口。要更新此界面并将备份间隔设置为一小时，请确保你的屏幕与图
    [11-8](#A436605_1_En_11_Chapter.html#Fig8) 所示的内容匹配。


    ![A436605_1_En_11_Fig8_HTML.jpg](A436605_1_En_11_Fig8_HTML.jpg)

    图 11-8：新建作业计划，已完成


    为了完成此界面，我在“发生”下拉菜单中选择了“每天”选项，然后选择“发生间隔”单选按钮并保留默认值 `1 hour(s)`。这就是完成此屏幕所需的全部操作。更新此界面后，单击“确定”按钮关闭此窗口并再次返回主界面。图
    [11-9](#A436605_1_En_11_Chapter.html#Fig9) 显示了我们更新后的维护计划的样子。


    ![A436605_1_En_11_Fig9_HTML.jpg](A436605_1_En_11_Fig9_HTML.jpg)

    图 11-9：更新后的备份计划


    请注意事务日志备份子计划条目中添加的计划信息。这表明我们的计划信息已被维护计划输入并保留。


    ## 更新 SQL Server Agent 作业


    一旦我们在 SSMS 中完成维护计划主要部分的设置，我们需要在 SQL Server Agent 的“作业”部分中更新一些功能，因此在对象资源管理器中展开
    `SQL Server Agent`，然后展开 `Jobs`，再双击 `Backup Plan.Transaction Log Backup`。


    ### 常规选项卡


    我们从“常规”选项卡开始，因此如图 [11-10](#A436605_1_En_11_Chapter.html#Fig10) 所示进行更新。


    ![A436605_1_En_11_Fig10_HTML.jpg](A436605_1_En_11_Fig10_HTML.jpg)

    图 11-10：作业属性，“常规”选项卡


    我在这里所做的就是更新 `Description` 字段并验证 `Enabled` 复选框已被勾选。这就是我们完成此选项卡所需的全部操作。单击“步骤”选项卡继续。'
  raw: '## Adding a Transaction Log Backup in SSMS


    I can imagine that this is starting to look a bit familiar at this point. We are
    going to add the transaction log portion to our existing Backup Plan maintenance
    plan. Recall that we already have the full and differential portions of the maintenance
    plan, so this will be the last part that needs to be added in order to complete
    our backup plan. I have outlined a few important things in Listing [11-1](#A436605_1_En_11_Chapter.html#Par6)
    to keep in mind for this section.


    Listing 11-1. To-Do List


    *   Transaction log backups are going to be run every hour, on the hour

    *   We will only have a maximum of five transaction logs that can be restored
    between differential backups


    These items I have labeled as our “to-do list” for this section because we need
    to ensure that we are meeting these goalposts before we can accept the section
    as complete.


    To add the transaction log portion of the maintenance plan, open up the Backup
    Plan maintenance plan in Object Explorer so that the plan is displayed in the
    main stage of SQL Server Management Studio, as shown in Figure [11-1](#A436605_1_En_11_Chapter.html#Fig1).


    ![A436605_1_En_11_Fig1_HTML.jpg](A436605_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Backup Plan


    Next, we want to click the Add Subplan button shown at the top of the screen.
    When the Subplan Properties window appears, add the following values in the applicable
    fields:


    *   Name: Transaction log backup

    *   Description: This is the transaction log backup portion of the backup maintenance
    plan.


    We don’t want to alter the schedule or the Run as options at this time, since
    we will get to that shortly. You should now see what is shown in Figure [11-2](#A436605_1_En_11_Chapter.html#Fig2)
    in the Subplan Properties window.


    ![A436605_1_En_11_Fig2_HTML.jpg](A436605_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Subplan Properties


    Click OK after this information is entered. Notice that the main stage updates
    as shown in Figure [11-3](#A436605_1_En_11_Chapter.html#Fig3) to add the transaction
    log backup as a new subplan. Also notice that the transaction log backup subplan
    is selected and there is nothing in the main stage, since this is an entirely
    new portion of the maintenance plan.


    ![A436605_1_En_11_Fig3_HTML.jpg](A436605_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Backup Plan, updated


    Now that we have a blank space to work with, open the Toolbox by clicking the
    floating menu on the left or pressing Ctrl+Alt+X and dragging a Back Up Database
    Task item to the main stage. We now see the familiar interface with the red X
    shown in Figure [11-4](#A436605_1_En_11_Chapter.html#Fig4), so double-click the
    task to edit it.


    ![A436605_1_En_11_Fig4_HTML.jpg](A436605_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Back Up Database Task


    Once the Back Up Database Task window opens, you will need to choose transaction
    log in the backup type drop-down menu. Next, you need to select backrecTestDB
    (or your database) from the Database(s) drop-down menu. You can also choose to
    select any other databases in this area as well, but we are dealing specifically
    with our database at this point. Once you have selected the databases you need,
    click the OK button to return to the main Back Up Database Task window. The last
    option on this tab, Back up to, should be left as the default option, which is
    Disk. The completed interface is shown in Figure [11-5](#A436605_1_En_11_Chapter.html#Fig5).


    ![A436605_1_En_11_Fig5_HTML.jpg](A436605_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


    Back Up Database Task, General tab, completed


    Did you notice that once you chose a database, the Backup component selections
    become disabled? This is because you have selected the transaction log option,
    so you clearly cannot select a backup component other than the transaction log.


    Select the Destination tab in this window to continue. All we want to do in this
    next screen is check the Create a sub-directory for each database option. The
    completed interface for this tab is shown in Figure [11-6](#A436605_1_En_11_Chapter.html#Fig6).


    ![A436605_1_En_11_Fig6_HTML.jpg](A436605_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    Back Up Database Task, Destination tab, completed


    This simple selection tells SQL Server that we do not want our transaction logs
    thrown into a single folder; instead, we want them segregated by the name of the
    database. This is going to make it easier to restore and manage, when needed.


    Select the Options tab next, and recall that the options we want to select are
    as follows:


    *   Verify integrity

    *   Perform checksum


    These options will ensure that we are verifying our backup and making sure that
    the backup is going to be checked for errors. Figure [11-7](#A436605_1_En_11_Chapter.html#Fig7)
    shows the completed interface for this tab.


    ![A436605_1_En_11_Fig7_HTML.jpg](A436605_1_En_11_Fig7_HTML.jpg)


    Figure 11-7


    Back Up Database Task, Options tab, completed


    Once you have updated this tab, click the OK button to close this window and return
    to the main stage. Notice that the red X disappears from our Back Up Database
    Task item on the main stage. This indicates that this task is free from the basic
    errors that would have impeded a successful launch earlier when the red X was
    present.


    Next, we need to set up the schedule for this task.


    ## Scheduling the Transaction Log Backup


    Just like with the previous subplans we set up in Chapters [9](#A436605_1_En_9_Chapter.html)
    and [10](#A436605_1_En_10_Chapter.html), we need to click the calendar on the
    line of the subplan that we want to update. In this case, we are going to choose
    the calendar on the transaction log backup subplan. This opens the New Job Schedule
    window seen in previous chapters. To update this interface and set the backup
    interval to one hour, ensure that your screen matches what is shown in Figure
    [11-8](#A436605_1_En_11_Chapter.html#Fig8).


    ![A436605_1_En_11_Fig8_HTML.jpg](A436605_1_En_11_Fig8_HTML.jpg)


    Figure 11-8


    New Job Schedule, completed


    To complete this interface, I selected the Daily option in the Occurs drop-down
    menu, then chose the Occurs every radio button and left the default to 1 hour(s).
    That is all that is required to complete this screen. Once you have updated this
    interface, click the OK button to close this window and be taken back to the main
    stage once again. Figure [11-9](#A436605_1_En_11_Chapter.html#Fig9) shows what
    our updated maintenance plan looks like.


    ![A436605_1_En_11_Fig9_HTML.jpg](A436605_1_En_11_Fig9_HTML.jpg)


    Figure 11-9


    Backup Plan, updated


    Notice the addition of the Schedule information in the transaction log backup
    subplan entry. That indicates that our schedule information has been entered and
    retained by the maintenance plan.


    ## Updating the SQL Server Agent Job


    Once we finish setting up the main portion of the maintenance plan in SSMS, we
    need to update a few features in the Jobs section of SQL Server Agent, so expand
    SQL Server Agent in Object Explorer, then expand Jobs, then double-click Backup
    Plan.Transaction Log Backup.


    ### General Tab


    We start on the General tab, so update it as shown in Figure [11-10](#A436605_1_En_11_Chapter.html#Fig10).


    ![A436605_1_En_11_Fig10_HTML.jpg](A436605_1_En_11_Fig10_HTML.jpg)


    Figure 11-10


    Job Properties, General tab


    All I really did here was update the Description field and verify that the Enabled
    check box is checked. That’s all we need to do to complete this tab. Click the
    Steps tab to continue.'
  trans: '## 在 SSMS 中添加事务日志备份


    我想，读到这里你可能已经开始觉得有些熟悉了。我们将把事务日志备份的部分，添加到我们现有的“备份计划”维护计划中。回顾一下，我们的维护计划中已经有了完整备份和差异备份部分，因此这将是完成整个备份计划所需的最后一块拼图。我在清单
    11-1 中概述了一些需要牢记的重要事项。


    清单 11-1. 待办事项清单


    *   事务日志备份将每小时执行一次，准点运行

    *   在差异备份之间，我们最多只能恢复五个事务日志


    我将这些事项标记为本节的“待办事项清单”，因为我们需要确保在完成本节之前满足这些目标。


    要为维护计划添加事务日志部分，请在对象资源管理器中打开“备份计划”维护计划，使该计划显示在 SQL Server Management Studio 的主界面中，如图
    11-1 所示。


    ![A436605_1_En_11_Fig1_HTML.jpg](img/A436605_1_En_11_Fig1_HTML.jpg)

    图 11-1：备份计划


    接下来，我们需要单击屏幕顶部显示的“添加子计划”按钮。当“子计划属性”窗口出现时，在适用字段中添加以下值：

    *   名称：`Transaction log backup`

    *   说明：这是备份维护计划的事务日志备份部分。


    目前我们不想更改计划或“作为运行”选项，因为我们稍后会处理它们。此时，你应该在“子计划属性”窗口中看到如图 11-2 所示的内容。


    ![A436605_1_En_11_Fig2_HTML.jpg](img/A436605_1_En_11_Fig2_HTML.jpg)

    图 11-2：子计划属性


    输入此信息后单击“确定”。请注意，主界面会更新，如图 11-3 所示，将事务日志备份添加为新的子计划。另请注意，事务日志备份子计划已被选中，但主界面中还没有任何内容，因为这是维护计划的一个全新部分。


    ![A436605_1_En_11_Fig3_HTML.jpg](img/A436605_1_En_11_Fig3_HTML.jpg)

    图 11-3：更新后的备份计划


    现在我们有了一个可以操作的空白区域，通过单击左侧的浮动菜单或按 `Ctrl+Alt+X` 打开工具箱，然后将一个“备份数据库任务”项拖到主界面。现在我们会看到熟悉的带有红色
    X 的界面，如图 11-4 所示，因此双击该任务进行编辑。


    ![A436605_1_En_11_Fig4_HTML.jpg](img/A436605_1_En_11_Fig4_HTML.jpg)

    图 11-4：备份数据库任务


    一旦“备份数据库任务”窗口打开，你需要在备份类型下拉菜单中选择 `transaction log`。接下来，你需要从“数据库”下拉菜单中选择 `backrecTestDB`（或你的数据库）。你也可以在此区域选择任何其他数据库，但此时我们专门处理我们的数据库。选择所需数据库后，单击“确定”按钮返回主“备份数据库任务”窗口。此选项卡上的最后一个选项“备份到”应保留为默认选项，即
    `Disk`。完成的界面如图 11-5 所示。


    ![A436605_1_En_11_Fig5_HTML.jpg](img/A436605_1_En_11_Fig5_HTML.jpg)

    图 11-5：备份数据库任务，“常规”选项卡，已完成


    你是否注意到，一旦选择了数据库，“备份组件”选择就变为禁用状态？这是因为你选择了 `transaction log` 选项，因此显然无法选择事务日志以外的备份组件。


    在此窗口中选择“目标”选项卡以继续。我们在下一个屏幕上要做的全部操作就是勾选“为每个数据库创建子目录”选项。此选项卡的完成界面如图 11-6 所示。


    ![A436605_1_En_11_Fig6_HTML.jpg](img/A436605_1_En_11_Fig6_HTML.jpg)

    图 11-6：备份数据库任务，“目标”选项卡，已完成


    这个简单的选择告诉 SQL Server，我们不希望将事务日志全部放入一个文件夹；相反，我们希望它们按数据库名称分开存放。这将使需要时的恢复和管理更加容易。


    接下来选择“选项”选项卡，并回想一下我们要选择的选项如下：

    *   `Verify integrity`

    *   `Perform checksum`


    这些选项将确保我们正在验证备份，并确保将对备份进行错误检查。图 11-7 显示了此选项卡的完成界面。


    ![A436605_1_En_11_Fig7_HTML.jpg](img/A436605_1_En_11_Fig7_HTML.jpg)

    图 11-7：备份数据库任务，“选项”选项卡，已完成


    更新此选项卡后，单击“确定”按钮关闭此窗口并返回主界面。请注意，主界面上我们的“备份数据库任务”项中的红色 X 消失了。这表明该任务已消除了基本错误，这些错误在之前红色
    X 存在时会阻碍成功启动。


    接下来，我们需要设置此任务的计划。


    ## 计划事务日志备份


    就像我们在第 9 章和第 10 章中设置的先前子计划一样，我们需要单击我们要更新的子计划所在行的日历图标。在本例中，我们将选择事务日志备份子计划上的日历图标。这将打开之前章节中看到的“新建作业计划”窗口。要更新此界面并将备份间隔设置为一小时，请确保你的屏幕与图
    11-8 所示的内容匹配。


    ![A436605_1_En_11_Fig8_HTML.jpg](img/A436605_1_En_11_Fig8_HTML.jpg)

    图 11-8：新建作业计划，已完成


    为了完成此界面，我在“发生”下拉菜单中选择了“每天”选项，然后选择“发生间隔”单选按钮并保留默认值 `1 hour(s)`。这就是完成此屏幕所需的全部操作。更新此界面后，单击“确定”按钮关闭此窗口并再次返回主界面。图
    11-9 显示了我们更新后的维护计划的样子。


    ![A436605_1_En_11_Fig9_HTML.jpg](img/A436605_1_En_11_Fig9_HTML.jpg)

    图 11-9：更新后的备份计划


    请注意事务日志备份子计划条目中添加的计划信息。这表明我们的计划信息已被维护计划输入并保留。


    ## 更新 SQL Server Agent 作业


    一旦我们在 SSMS 中完成维护计划主要部分的设置，我们需要在 SQL Server Agent 的“作业”部分中更新一些功能，因此在对象资源管理器中展开
    `SQL Server Agent`，然后展开 `Jobs`，再双击 `Backup Plan.Transaction Log Backup`。


    ### 常规选项卡


    我们从“常规”选项卡开始，因此如图 11-10 所示进行更新。


    ![A436605_1_En_11_Fig10_HTML.jpg](img/A436605_1_En_11_Fig10_HTML.jpg)

    图 11-10：作业属性，“常规”选项卡


    我在这里所做的就是更新 `Description` 字段并验证 `Enabled` 复选框已被勾选。这就是我们完成此选项卡所需的全部操作。单击“步骤”选项卡继续。'
- fmt: '### Steps Tab


    This tab already has the transaction log backup job in the job step list area.
    We need to update the job though, so double-click the name of the job and click
    the Advanced tab. Figure [11-11](#A436605_1_En_11_Chapter.html#Fig11) shows the
    updated Advanced tab; note that the General tab is the default interface, but
    we don’t need to update anything on this tab.


    ![A436605_1_En_11_Fig11_HTML.jpg](A436605_1_En_11_Fig11_HTML.jpg)


    Figure 11-11


    Job Step Properties, Advanced tab


    On this tab, I checked the bottom three check boxes to enable logging and collection
    of historical step information. Everything else stays the same in this screen,
    so click OK to continue. You will end up back at the default view of the Steps
    tab.


    We can bypass the Schedules and Alerts tabs since we aren’t going to configure
    these options. Instead, click the Notifications tab to continue.


    ### Notifications Tab


    The default option selected in this tab is to write to the `Windows Application
    event log`. That is a good start, but we want to be notified by e-mail if the
    job fails. To enable this, select the E-mail check box, and then select the Operator
    (which should have been set up already). Figure [11-12](#A436605_1_En_11_Chapter.html#Fig12)
    shows the updated interface for the Notifications tab.


    ![A436605_1_En_11_Fig12_HTML.jpg](A436605_1_En_11_Fig12_HTML.jpg)


    Figure 11-12


    Job Properties, Notifications tab


    Setting this tab up like this will let us be notified by e-mail if the job fails,
    and also with an entry to `Windows Application event log`. This will complete
    this section, so go ahead and press the OK button to continue on. We are returned
    to the main stage, with our completed backup plan in the stage. Save your work
    to the maintenance plan now.


    ## Testing the Transaction Log Backup Plan


    To test the transaction log backup plan, we want to right-click the `Backup Plan.Transaction
    Log Backup Job` and select `Start Job at Step…` to fire the job. It should take
    a very short amount of time to run, and then show a completed status window like
    the one shown in Figure [11-13](#A436605_1_En_11_Chapter.html#Fig13).


    ![A436605_1_En_11_Fig13_HTML.jpg](A436605_1_En_11_Fig13_HTML.jpg)


    Figure 11-13


    Start Jobs Success


    There really isn’t a lot to back up from the transaction log, which is why it
    takes a very short amount of time to run. Once you see the screen shown in Figure
    [11-13](#A436605_1_En_11_Chapter.html#Fig13), you can safely assume that the transaction
    log backup portion of the Backup Plan maintenance plan has been configured correctly.
    Verify that a backup was created by checking your backups folder (mine is `E:\SQL
    Server\Backup\backrecTestDB`) for the `.trn` files to be present. If they are
    in that location, then you are done. If not, then you may need to go back through
    this first section of this chapter and verify that you created the transaction
    log backups to be placed in the correct directory.


    ## Transaction Log Restore in SSMS


    We are going to use `SQL Server Agent` to create the transaction log `Restore`
    plan in `SSMS`, just like we did with the full `Restore` plan we covered in Chapter
    [9](#A436605_1_En_9_Chapter.html) and the differential `Restore` plan we covered
    in Chapter [10](#A436605_1_En_10_Chapter.html). However, we are going to follow
    a slightly altered set of instructions for the transaction log restores. Listing
    [11-2](#A436605_1_En_11_Chapter.html#Par41) will detail the steps we need to take
    to ensure our transaction log `Restore` plan executes correctly.


    Listing 11-2. Structure for Restoring Data


    *   Create a trackable trail of data so that we know what data was restored

    *   Run the `Backup Plan.Transaction Log Backup` `SQL Server Agent` job

    *   Copy and rename backup files

    *   Configure `RESTORE DATABASE` command(s)

    *   Restore the most recent full backup

    *   Restore the most recent differential backup

    *   Restore the transaction logs in order, to the desired point in time


    In this scenario, we need to first restore our full backup, then our differential
    backup, and finally, our transaction log backups in order. This will allow us
    to restore the data that we need and that is contained within the transaction
    logs currently backed up. We can use `T-SQL` to restore to a point in time using
    our transaction logs by utilizing the `STOPAT` attribute in our `RESTORE DATABASE`
    command. We will go over the syntax for this command very shortly.


    Given the backup scenario that I have been pushing throughout this book, it is
    important to note that we will only ever have to restore a maximum of five transaction
    logs for each restore sequence, given that we run differential backups every six
    hours. For this reason, as we noted in Listing [11-1](#A436605_1_En_11_Chapter.html#Par6),
    we need to make sure that when we implement the transaction log backups like we
    did in the previous section, they are run in the sequence noted earlier (i.e.,
    one transaction log backup is run every hour, on the hour). Utilizing this sequence
    will allow us to have a maximum of five transaction logs that we can restore without
    moving to the next chronological full or differential backup to restore from.


    Now that we have a plan on how to move forward, let’s get started on creating
    this plan.


    ### Creating Test Data


    What we want to do is make some changes to one of our tables so we can see what
    happens when we restore the database to a point in time. To do this, we need to
    insert some fake data into our `users2` table. Listing [11-3](#A436605_1_En_11_Chapter.html#Par53)
    shows the `T-SQL` that we will use to accomplish this.


    ```

    INSERT INTO users2

    SELECT TOP 1000 * FROM users2

    ```


    Listing 11-3 Create Test Data


    Keep a close eye on the time when you run the command in Listing [11-3](#A436605_1_En_11_Chapter.html#Par53),
    because we are going to run that same code a few more times until we have successfully
    added a substantial amount of data. This will ensure that we are restoring to
    the correct point in time.


    As a point of reference, the row count before running the script in Listing [11-3](#A436605_1_En_11_Chapter.html#Par53)
    was 10000. After running the script one time, it was 11000. Running the script
    each additional time increased the row count by 1000 rows, so just make sure that
    you keep an eye on the time and your final row count. When I was done inserting
    records, I ended up with 29000 records in my `users2` table, up from 10000. I
    only wanted 16000 records though, and I know I had this number of records at 9:22
    pm, so I need to restore my transaction logs up to 9:22 pm.


    ### Back Up the Transaction Log


    Next, we need to back up the transaction so that the transactions we just carried
    out are available to us. The time as of this writing is 9:30 pm, so I need to
    restore the 7:00 pm, 8:00 pm, and 9:00 pm transaction logs, along with the transaction
    log that we are about to create. Right-click your `Backup Plan.Transaction Log
    Restore` `SQL Server Agent` Job and select `Start Job at Step…` to execute the
    job. It runs for a second, and then successfully completes. Click the Close button
    once it completes, and you are returned to the main `SSMS` stage.'
