    当您完成操作后，您的界面应如图 9-36 所示。


    ![A436605_1_En_9_Fig36_HTML.jpg](img/A436605_1_En_9_Fig36_HTML.jpg)


    图 9-36


    作业步骤属性，高级选项卡（已更新）


    这些值都是正确的，因此请继续单击“确定”按钮以保存这些配置设置。然后我们会返回到“新建作业”界面，只是“作业步骤列表”字段中的值已更新。请注意，“开始步骤”值也已更新为我们刚刚创建的步骤名称。图
    9-37 显示了此更新后的界面。


    ![A436605_1_En_9_Fig37_HTML.jpg](img/A436605_1_En_9_Fig37_HTML.jpg)


    图 9-37


    新建作业，已更新


    我们不打算计划此作业，也不需要为其设置警报。但是，我们确实希望确保“通知”选项卡已选中“写入 Windows 应用程序事件日志”，并且我们希望向我们的操作员发送电子邮件，通知作业已完成——不是失败也不是成功，而是已完成。这样，无论哪种情况我们都会收到状态更新。图
    9-38 显示了“通知”选项卡更新后的界面。


    ![A436605_1_En_9_Fig38_HTML.jpg](img/A436605_1_En_9_Fig38_HTML.jpg)


    图 9-38


    新建作业，通知选项卡（已更新）


    这就是配置此作业所需做的全部工作。单击“确定”按钮保存它，并返回到 `SSMS` 主屏幕，此时 `SQL Server 代理`的“作业”子菜单中会显示更新后的作业。图
    9-39 显示了此更新后的界面。


    ![A436605_1_En_9_Fig39_HTML.jpg](img/A436605_1_En_9_Fig39_HTML.jpg)


    图 9-39


    `SQL Server 代理`，已更新


    因此，在本节中，我们从头开始创建了一个完整的还原作业；再次说明，我们之所以必须这样做，是因为 `SQL Server` 没有在工具箱中为我们提供还原数据库工具，因此我们不得不将
    `RESTORE DATABASE` 命令包装在 `SQL Server 代理`作业中。正如我之前所说，如果您能使用替代方法达到最终结果，那非常好！


    ### 复制并重命名当前备份文件


    接下来，我们只需要复制本章前面运行的完整备份。此数据库的默认备份位置是 `E:\SQL Server\Backup\backrecTestDB`，但您的可能不同。无论如何，选择备份位置，如前面所示复制并重命名文件。就我而言，我将我的文件重命名为
    `E:\SQL Server\Backup\backrecTestDB\backrecTestDB.bak`。完成后，我们就可以进入下一节。


