- fmt: "### Restore Files and Filegroups—Options\n\n![A436605_1_En_7_Fig6_HTML.jpg](A436605_1_En_7_Fig6_HTML.jpg)\n\
    \n*Figure 7-6: Restore Files and Filegroups, Options page*\n\nThe second page,\
    \ referenced from the left of the interface shown in Figure 7-6, is titled **Options**.\n\
    \n#### Interface Overview\n\nIn this area, we see a few options that can be a\
    \ bit offputting if you aren’t already familiar with them. Let’s go over them\
    \ before we move on.\n\nThere are two main sections of this interface: **Restore\
    \ options** and **Recovery state**. The **Restore options** section allows you\
    \ to customize the various options available to you, the DBA, before the data\
    \ restore process begins and while the process executes, while the **Recovery\
    \ state** section allows you to define what happens after the data has been restored.\n\
    \n#### Restore Options\n\nIn the **Restore options** section, there are three\
    \ check boxes, titled as follows:\n\n*   Overwrite the existing database (`WITH\
    \ REPLACE`)\n*   Prompt before restoring each backup\n*   Restrict access to the\
    \ restored database (`WITH RESTRICTED_USER`)\n\nIt is important to note that the\
    \ parts in the parentheses are the pieces to remember if you ever restore a backup\
    \ using Transact-SQL, which is discussed in the next section.\n\n#### Recovery\
    \ State\n\nIn the **Recovery state** section, there are three radio buttons, titled\
    \ as follows:\n\n*   Leave the database ready for use by rolling back the uncommitted\
    \ transactions. Additional transaction logs cannot be restored. (`RESTORE WITH\
    \ RECOVERY`)\n    *   This option is selected by default. The reason is because\
    \ this is the most common use for backup recovery; to leave the database ready\
    \ to run immediately by rolling back any uncommitted transactions.\n*   Leave\
    \ the database nonoperational and don’t roll back the uncommitted transactions.\
    \ Additional transaction logs can be restored. (`RESTORE WITH NONRECOVERY`)\n\
    \    *   This is the most destructive option. I honestly can’t imagine a scenario\
    \ where I would want a production database nonoperational, unless we’re dealing\
    \ with failovers or load balancing. In that case, yes, I could imagine this being\
    \ useful to repair the database instance, but other than that, like I said, it’s\
    \ destructive because the database is left nonoperational until the database is\
    \ explicitly brought back online.\n*   Leave the database in read-only mode. Roll\
    \ back the uncommitted transactions but save the rollback operation in a file\
    \ so the recovery effects can be undone. (`RECOVERY WITH STANDBY`)\n    *   This\
    \ option lets you essentially “pause” the database and put it in read-only mode.\
    \ The uncommitted transactions get rolled back, but the rollbacks are saved so\
    \ that they can be undone later, if needed. This would be a good option for ensuring\
    \ that everything is working as intended in the database, for example.\n    *\
    \   Choosing this option lets you select a location for a rollback undo file.\n\
    \n#### Restoration Strategy\n\nFor a “regular” backup, meaning that you just want\
    \ to restore data to the last transaction log backup, all you need to restore\
    \ is the last differential backup, and then the transaction logs, in order, up\
    \ to the point in time that you need to access data from. For the large majority\
    \ of restores, this is the case.\n\nIt is very rare that you will want to restore\
    \ to a specific point in time many days ago, and run the risk of losing all data\
    \ accumulated after that point, in other words. There have been specific instances\
    \ where this is exactly the case though, and in this case, I would strongly recommend\
    \ running a current backup of the database before doing anything to a production\
    \ or development database. After a backup has run and has been verified, then\
    \ proceed with whatever path you want to take to restore the database. In my experience,\
    \ I have found that it is beneficial to restore the full, differential, and transaction\
    \ log backups to a secondary database for verification of the data being sought.\
    \ Once the data is found, I then create `INSERT INTO… SELECT` scripts to update\
    \ my primary database from my secondary database. Once the update is complete\
    \ and I have verified that my data has been recovered successfully, I can drop\
    \ the secondary database and continue on with my day. The only caveat I have to\
    \ stress is to ensure that the `INSERT INTO… SELECT` statements are properly written\
    \ to update the primary database from the secondary database correctly; otherwise,\
    \ you’re just creating more work for yourself.\n\nI find this to be a fantastic\
    \ method to ensure that the data between the primary and secondary database tables\
    \ being restored is correct, since I am outside of the current primary database\
    \ but working on an exact duplicate in the secondary database from a point in\
    \ time.\n\n#### Completing the Restore\n\nTo continue, just ensure that the **Overwrite\
    \ the existing database (`WITH REPLACE`)** option is checked and that the transaction\
    \ log (roll up to the previous full backup) before the data update is selected,\
    \ and click the **OK** button. Figure 7-7 shows the window that tells us that\
    \ our database was successfully restored.\n\n![A436605_1_En_7_Fig7_HTML.jpg](A436605_1_En_7_Fig7_HTML.jpg)\n\
    \n*Figure 7-7: Database restored successfully*\n\nClick **OK** on this window\
    \ and notice that our main **Restore Files and Filegroups** window has closed.\
    \ Go back over to SSMS and run the following query:\n\n```sql\nSELECT count(*)\
    \ as cnt FROM users1\n```\n\nYour result should be `10,020,000`. Congratulations!"
