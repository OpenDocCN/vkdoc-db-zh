  trans: "\n## 备份数据库—常规\n\n选择此菜单选项将打开“备份数据库”窗口的“常规”页面，如图 3-6 所示。\n\n![A436605_1_En_3_Fig6_HTML.jpg](img/A436605_1_En_3_Fig6_HTML.jpg)\n\
    \n#### 图 3-6\n\n#### 常规窗口\n\n此界面允许我们为事务日志备份定义各种“常规”组成部分。此处可用的选项有：\n\n*   `源`\n\
    \    *   `数据库`：此选项允许您从可用的数据库中选择要备份的数据库。\n    *   `恢复模型`：此选项将始终默认为所选数据库当前使用的恢复模型。要测试这一点，请选择`master`数据库，您将看到恢复模型从`FULL`更改为`SIMPLE`。\n\
    \    *   `备份类型`：此选项允许您选择要备份的内容。当恢复模型设置为`FULL`时，您可以选择完整、差异或事务日志备份，或者选择与您特定恢复模型相关的任何备份类型。您在这里还有一个`仅复制备份`复选框。这是什么？仅复制备份在您想要备份数据库中的数据，但不想中断正常的备份计划，同时也不想使用最新备份（例如，它可能是一个差异备份）时非常有用，您不想花时间先运行完整备份再运行差异备份。当您希望为开发人员提供当前数据的备份以在开发网络中使用时，此选项特别有用。可以将其视为一次非顺序的完整备份。\n\
    \    *   `备份组件`\n        *   `数据库`\n        *   `文件和文件组`\n*   `目标`\n    *   `备份到`：此区域中的选项当前为`磁盘`或`URL`。选择`磁盘`选项可将备份保存在您连接的网络上某个物理驱动器中，使用`URL`选项可保存到在线存储系统或\
    \ Azure 实例。选择其中一项后，您可以通过单击此窗口右下角的`添加`或`删除`按钮来选择位置。\n\n对于本例，在进入`介质选项`子菜单之前，我们需要从`备份类型`下拉菜单中选择`事务日志`。界面的最终状态如图\
    \ 3-7 所示。\n\n![A436605_1_En_3_Fig7_HTML.jpg](img/A436605_1_En_3_Fig7_HTML.jpg)\n\
    \n#### 图 3-7\n\n#### 更新后的常规窗口\n\n## 备份数据库—介质选项\n\n选择此选项将显示以下界面，如图 3-8 所示。\n\n\
    ![A436605_1_En_3_Fig8_HTML.jpg](img/A436605_1_En_3_Fig8_HTML.jpg)\n\n#### 图 3-8\n\
    \n#### 介质选项窗口\n\n此屏幕允许您选择处理备份物理存储方式的选项。此屏幕中包含的选项如下：\n\n*   `覆盖介质`\n    *   `备份到现有介质集`：此选项允许您将备份添加到现有备份中，这样在需要恢复时，您就可以决定要恢复哪个备份。\n\
    \        *   `追加到现有备份集`：如果您想如上所述将其添加到集合中，请选择此选项。\n        *   `覆盖所有现有备份集`：如果您希望用即将运行的新备份覆盖选定的备份集，请选择此选项。\n\
    \        *   `检查介质集名称和备份集有效期`：这不是必需的，根据我的经验也不常用，但如果您想验证备份集的名称和有效期，可以选择此项。\n  \
    \      *   `介质集名称`\n    *   `备份到新介质集，并擦除所有现有备份集`：此选项与前一个选项不同。前一个选项会备份到现有备份集；此选项允许您创建一个全新的备份集，然后将备份保存到该备份集。此外，此选项会删除所有以前的备份集，因此请谨慎使用此选项。\n\
    \        *   `新介质集名称`：新备份集的名称。\n        *   `新介质集描述`：备份集的可选描述。\n*   `可靠性`\n  \
    \  *   `完成后验证备份`\n    *   `写入介质前执行校验和`\n    *   `出错时继续`\n*   `事务日志`\n    *   `截断事务日志`\n\
    \    *   `备份日志尾部，并使数据库处于还原状态`\n*   `磁带驱动器`\n    *   `备份后卸载磁带`\n    *   `卸载前倒带`\n\
    \n让我们稍作停顿，回顾一下刚刚介绍的两个事务日志选项之间的区别。在引用事务日志备份时，有两点很重要：事务日志可以被截断，或者可以备份事务日志的尾部。那么区别是什么？\n\
    \n第一个选项，`截断事务日志`，专门处理截断日志，仅此而已。截断事务日志并不会减小物理事务日志文件的大小。这个概念起初对我来说似乎违反直觉，但后来我意识到，要减小日志文件的大小，您必须收缩日志文件。截断只是删除日志文件中未使用的部分；收缩日志文件才是实际使日志变小的操作。另外需要记住的重要一点是，截断会在检查点之后（在简单恢复模型中）以及日志备份之后（在完整或大容量日志恢复模型中）自动发生。这意味着，如果已经正确建立了备份过程，截断将作为常规备份过程的一部分自动发生。如果没有正确建立备份过程，那么您的事务日志将永远不会被截断（除非手动操作），并且最终会增长到存储介质的整个大小。\n\
    \n第二个选项，`备份日志尾部，并使数据库处于还原状态`，是两个选项中更强大、更有用的一个。此选项允许您备份尚未备份的最新事务，然后使数据库准备就绪，以便在必要时立即还原。这被称为尾日志备份。\n\
    \n出于本示例的目的，请确保选择第一个选项`截断事务日志`以及`完成后验证备份`。\n\n最终界面如图 3-9 所示。\n\n![A436605_1_En_3_Fig9_HTML.jpg](img/A436605_1_En_3_Fig9_HTML.jpg)\n\
    \n#### 图 3-9\n\n#### 更新后的介质选项窗口\n"
- fmt: "#### 备份数据库 — 备份选项\n\n选择此选项将显示以下界面，如图 [3-10](#A436605_1_En_3_Chapter.html#Fig10)\
    \ 所示。\n\n![A436605_1_En_3_Fig10_HTML.jpg](A436605_1_En_3_Fig10_HTML.jpg)\n\n图\
    \ 3-10\n\n**备份选项**\n\n此屏幕用于定义在上一菜单选项中定义的介质集的实际标准。此屏幕上的选项包括：\n\n*   备份集\n    *\
    \   名称：备份集的名称。\n    *   说明：备份集的可选说明。\n    *   备份集将过期：\n        *   在以下天数后：备份保持“新鲜”的天数；超过此值后，备份过期且不再有效。\n\
    \        *   在以下日期：数据过期的日期。\n*   压缩\n    *   设置备份压缩：如果要压缩备份，请选择此选项。压缩并非在所有情况下都是必需的，但在处理非常大的数据库时，通常为了节省空间限制而这样做是明智的。请注意，压缩仅在\
    \ `SQL Server 2016` 的企业版、标准版和开发版中可用。\n*   加密\n    *   加密备份\n        *   算法\n \
    \       *   证书或非对称密钥\n\n我们不会在此屏幕上更改任何内容，因为这些默认选项正是我们所需要的。请注意，仅当在“介质选项”子菜单中选择了“备份到新介质集”选项时，“加密”选项才可用。这在图\
    \ [3-8](#A436605_1_En_3_Chapter.html#Fig8) 所示的实际界面中也有说明。\n\n一旦进入此最终屏幕并准备好开始备份，请单击“确定”按钮。希望你会看到一个很短时间后打开的窗口，说明备份成功。此窗口如图\
    \ [3-11](#A436605_1_En_3_Chapter.html#Fig11) 所示。\n\n![A436605_1_En_3_Fig11_HTML.jpg](A436605_1_En_3_Fig11_HTML.jpg)\n\
    \n图 3-11\n\n**备份成功**\n\n当我查看创建的备份文件的属性时，我看到如图 [3-12](#A436605_1_En_3_Chapter.html#Fig12)\
    \ 所示的内容。\n\n![A436605_1_En_3_Fig12_HTML.jpg](A436605_1_En_3_Fig12_HTML.jpg)\n\n\
    图 3-12\n\n**事务日志属性**\n\n我想要检查的字段是“创建时间”和“修改时间”。“创建时间”显示该文件是在50分钟前创建的；这是正确的，因为我运行此备份的时间是上午11:50，而日志是作为常规备份序列的一部分在上午11:00创建的。它是在3分钟前修改的，那正是将备份的日志添加到当前备份集的时间。我们还可以查看备份的大小，并估计它应该大约是原来的两倍，因为自动备份序列几乎就要运行了。\n\
    \n至此，我们可以假设事务日志已被安全正确地备份。现在，如果数据库发生任何事情我们需要恢复，我们至少可以恢复到这一点，考虑到我们有差异备份和完整备份。从事务日志的角度来看，我们已经全部设置好了。\n\
    \n## 总结\n\n在本章中，我们了解了什么是事务日志、它们如何工作、它们与数据库的关系，以及如何从脚本和 GUI 实际备份它们。在下一章中，我将把前三章的内容整合到一个完整的数据库备份解决方案中。\n\
    \n### 第四章 备份方案示例\n\n本章将作为第一章（关于完整备份）、第二章（关于差异备份）和第三章（关于事务日志备份）的总结。我们将首先深入探讨如何创建一个可持续的维护计划，使用一组预设的时间表在一个主要区域集中管理我们的备份，而不是手动运行备份，或者让完整、差异或事务日志备份在不同时间运行，然后我们将运行该计划并进行审查。\n\
    \n#### 设置维护计划\n\n为了自动化备份，我们需要让 `SQL Server Agent` 知道需要运行的例程以及何时运行。这是通过维护计划实现的。自动化备份计划的每个方面都可以在维护计划中进行配置，所以让我们逐步了解一个可靠备份计划的内部运作机制。"
  raw: "#### Back Up Database—Backup Options\n\nChoosing this option will show the\
    \ following interface, as shown in Figure [3-10](#A436605_1_En_3_Chapter.html#Fig10).\n\
    \n![A436605_1_En_3_Fig10_HTML.jpg](A436605_1_En_3_Fig10_HTML.jpg)\n\nFigure 3-10\n\
    \nBackup Options\n\nThis screen lets you define the actual criteria of the media\
    \ sets defined in the previous menu option. The options on this screen are\n\n\
    *   Backup set\n    *   Name: The name of the backup set.\n    *   Description:\
    \ The optional description of the backup set.\n    *   Backup set will expire:\n\
    \        *   After: The number of days that the backup will stay “fresh”; after\
    \ this value has passed, the backup expires and is no longer valid.\n        *\
    \   On: The date that the data expires.\n*   Compression\n    *   Set backup compression:\
    \ If you want to compress the backup, choose this option. Compression is not necessary\
    \ in all cases, but is generally a good idea just to save on space constraints\
    \ when you are dealing with very large databases. Note that compression is only\
    \ available on SQL Server 2016 Enterprise, Standard, and Developer versions.\n\
    *   Encryption\n    *   Encrypt backup\n        *   Algorithm\n        *   Certificate\
    \ or asymmetric key\n\nWe aren’t going to change anything on this screen, since\
    \ these default options are what we need. Note that the Encryption option is only\
    \ available when the Back up to a new media set option is selected in the Media\
    \ Options submenu. This is also explained on the actual interface shown in Figure\
    \ [3-8](#A436605_1_En_3_Chapter.html#Fig8).\n\nOnce you get to this final screen\
    \ and are ready to begin your backup, click the OK button. Hopefully, you will\
    \ see a window which opens after a very short time and explains that the backup\
    \ was successful. This window is shown in Figure [3-11](#A436605_1_En_3_Chapter.html#Fig11).\n\
    \n![A436605_1_En_3_Fig11_HTML.jpg](A436605_1_En_3_Fig11_HTML.jpg)\n\nFigure 3-11\n\
    \nBackup successful\n\nWhen I view the properties on the created backup file,\
    \ I see what is shown in Figure [3-12](#A436605_1_En_3_Chapter.html#Fig12).\n\n\
    ![A436605_1_En_3_Fig12_HTML.jpg](A436605_1_En_3_Fig12_HTML.jpg)\n\nFigure 3-12\n\
    \nTransaction log properties\n\nThe fields I want to check are the Created and\
    \ Modified fields. Created shows that the file was created 50 minutes ago; that\
    \ is correct, because the time I ran this backup was 11:50 am, and the log was\
    \ created at 11:00 am as part of my regular backup sequence. It was modified 3\
    \ minutes ago, which was when the backed-up log was added to the current backup\
    \ set. We could also look at the size of the backup, and estimate that it should\
    \ be roughly twice as big since it is nearly time for the automated backup sequence\
    \ to run.\n\nAt this point, we can assume that the transaction log has been safely\
    \ and correctly backed up. Now, if something were to happen to the database and\
    \ we need to restore, we can at least restore to this point, considering that\
    \ we have the differential and full backups. From a transaction log point of view,\
    \ we are all set up though.\n\n## Summary\n\nIn this chapter, we learned a bit\
    \ about what transaction logs are, how they work, how they relate to the database,\
    \ and how to actually back them up from script and from a GUI. In the next chapter,\
    \ I will tie these first three chapters together into a complete solution for\
    \ backing up a database.\n\n# 4. Backup Solution Examples\n\nThis chapter is going\
    \ to serve as the culmination of Chapter [1](#A436605_1_En_1_Chapter.html) (on\
    \ full backups), Chapter [2](#A436605_1_En_2_Chapter.html) (on differential backups),\
    \ and Chapter [3](#A436605_1_En_3_Chapter.html) (on transaction log backups).\
    \ We will first get into the creation of a sustainable maintenance plan to manage\
    \ our backups all together in one main area using a set schedule, as opposed to\
    \ manually running backups or having full, differential, or transaction log backups\
    \ running at different times, and then we will run that plan and review.\n\n##\
    \ Setting Up the Maintenance Plan\n\nIn order to automate the backups, we need\
    \ to have SQL Server Agent aware of the routines that need to be run, and when\
    \ to run them. This is accomplished through the use of maintenance plans. Every\
    \ aspect of an automated backup plan can be configured within a maintenance plan,\
    \ so let’s step through the various inner workings of a solid backup plan."
  trans: "\n#### 备份数据库 — 备份选项\n\n选择此选项将显示以下界面，如图 3-10 所示。\n\n![A436605_1_En_3_Fig10_HTML.jpg](img/A436605_1_En_3_Fig10_HTML.jpg)\n\
    \n图 3-10\n\n**备份选项**\n\n此屏幕用于定义在上一菜单选项中定义的介质集的实际标准。此屏幕上的选项包括：\n\n*   备份集\n   \
    \ *   名称：备份集的名称。\n    *   说明：备份集的可选说明。\n    *   备份集将过期：\n        *   在以下天数后：备份保持“新鲜”的天数；超过此值后，备份过期且不再有效。\n\
    \        *   在以下日期：数据过期的日期。\n*   压缩\n    *   设置备份压缩：如果要压缩备份，请选择此选项。压缩并非在所有情况下都是必需的，但在处理非常大的数据库时，通常为了节省空间限制而这样做是明智的。请注意，压缩仅在\
    \ `SQL Server 2016` 的企业版、标准版和开发版中可用。\n*   加密\n    *   加密备份\n        *   算法\n \
    \       *   证书或非对称密钥\n\n我们不会在此屏幕上更改任何内容，因为这些默认选项正是我们所需要的。请注意，仅当在“介质选项”子菜单中选择了“备份到新介质集”选项时，“加密”选项才可用。这在图\
    \ 3-8 所示的实际界面中也有说明。\n\n一旦进入此最终屏幕并准备好开始备份，请单击“确定”按钮。希望你会看到一个很短时间后打开的窗口，说明备份成功。此窗口如图\
    \ 3-11 所示。\n\n![A436605_1_En_3_Fig11_HTML.jpg](img/A436605_1_En_3_Fig11_HTML.jpg)\n\
    \n图 3-11\n\n**备份成功**\n\n当我查看创建的备份文件的属性时，我看到如图 3-12 所示的内容。\n\n![A436605_1_En_3_Fig12_HTML.jpg](img/A436605_1_En_3_Fig12_HTML.jpg)\n\
    \n图 3-12\n\n**事务日志属性**\n\n我想要检查的字段是“创建时间”和“修改时间”。“创建时间”显示该文件是在 50 分钟前创建的；这是正确的，因为我运行此备份的时间是上午\
    \ 11:50，而日志是作为常规备份序列的一部分在上午 11:00 创建的。它是在 3 分钟前修改的，那正是将备份的日志添加到当前备份集的时间。我们还可以查看备份的大小，并估计它应该大约是原来的两倍，因为自动备份序列几乎就要运行了。\n\
    \n至此，我们可以假设事务日志已被安全正确地备份。现在，如果数据库发生任何事情我们需要恢复，我们至少可以恢复到这一点，考虑到我们有差异备份和完整备份。从事务日志的角度来看，我们已经全部设置好了。\n\
    \n## 总结\n\n在本章中，我们了解了什么是事务日志、它们如何工作、它们与数据库的关系，以及如何从脚本和 GUI 实际备份它们。在下一章中，我将把前三章的内容整合到一个完整的数据库备份解决方案中。\n\
    \n### 第四章 备份方案示例\n\n本章将作为第一章（关于完整备份）、第二章（关于差异备份）和第三章（关于事务日志备份）的总结。我们将首先深入探讨如何创建一个可持续的维护计划，使用一组预设的时间表在一个主要区域集中管理我们的备份，而不是手动运行备份，或者让完整、差异或事务日志备份在不同时间运行，然后我们将运行该计划并进行审查。\n\
    \n#### 设置维护计划\n\n为了自动化备份，我们需要让 `SQL Server Agent` 知道需要运行的例程以及何时运行。这是通过维护计划实现的。自动化备份计划的每个方面都可以在维护计划中进行配置，所以让我们逐步了解一个可靠备份计划的内部运作机制。\n"
- fmt: '### Full Backup Configuration


    首先，启动SSMS并展开Management节点。接着，右键单击Maintenance Plans并选择Maintenance Plan Wizard。我们看到的第一个界面标题为Select
    Plan Properties。在Name框中输入`Backup Maintenance Plan`，并添加简要描述。同时，选择Separate schedules
    for each task单选按钮。图[4-1](#A436605_1_En_4_Chapter.html#Fig1)显示了您应看到的界面。准备就绪后，点击Next继续。


    ![A436605_1_En_4_Fig1_HTML.jpg](A436605_1_En_4_Fig1_HTML.jpg)


    *图 4-1：Select Plan Properties*


    下一个屏幕让我们选择要在此计划中运行的维护任务。我们需要选择与备份相关的三个任务：Back Up Database (Full)、Back Up Database
    (Differential) 和 Back Up Database (Transaction Log)。这些选择如图[4-2](#A436605_1_En_4_Chapter.html#Fig2)所示。


    ![A436605_1_En_4_Fig2_HTML.jpg](A436605_1_En_4_Fig2_HTML.jpg)


    *图 4-2：Select Maintenance Tasks*


    现在，点击Next，我们将选择备份的三个部分的执行顺序，如图[4-3](#A436605_1_En_4_Chapter.html#Fig3)所示。由于我们将在不同时间表上执行这些任务，而不会将它们链接在同一个计划中（即我们不会同时运行完整备份、差异备份或事务日志备份），我们可以跳过此页。准备好后，点击Next按钮继续。


    ![A436605_1_En_4_Fig3_HTML.jpg](A436605_1_En_4_Fig3_HTML.jpg)


    *图 4-3：Select Maintenance Task*


    由于我们在上一屏幕保留了默认顺序，接下来出现的第一个界面是Define Back Up Database (Full) Task屏幕。此屏幕有三个选项卡：General、Destination和Options，默认显示General选项卡。图[4-4](#A436605_1_En_4_Chapter.html#Fig4)显示了这个初始界面。


    ![A436605_1_En_4_Fig4_HTML.jpg](A436605_1_En_4_Fig4_HTML.jpg)


    *图 4-4：Define Back Up Database (Full) Task, General tab*


    下拉`Database(s)`菜单并选择您想要备份的数据库。只要是设置了完整恢复模型的数据库都可以。选择数据库后，图[4-5](#A436605_1_En_4_Chapter.html#Fig5)显示了主屏幕上应该看到的内容。


    ![A436605_1_En_4_Fig5_HTML.jpg](A436605_1_En_4_Fig5_HTML.jpg)


    *图 4-5：Define Back Up Database (Full) Task, General tab (updated)*


    请注意，此时`Database`单选按钮已被选中。这是因为检测到了数据库，并且它现在是此任务的对象。因此，如果您想备份单个文件，也可以选择`Files and
    filegroups`单选按钮。


    在此屏幕上，还有一个标记为`Back up to:`的新选项，这是SQL Server 2016的新功能。以前，我们没有备份到URL的选项，但现在有了，这要归功于Microsoft将SQL
    Server集成到基于云的基础设施（如Microsoft Azure）的创新。深入探讨Azure的具体细节超出了本书范围，但这是这个强大平台的一个极好的补充。对于大多数情况，可以保留为`Disk`，但您可以根据具体情况进行更改。


    此屏幕底部有Schedule选项。在我们首先设置三个不同选项卡中的所有选项之前，暂时不必担心它。准备好后，点击Destination选项卡继续。


    图[4-6](#A436605_1_En_4_Chapter.html#Fig6)显示了Destination选项卡的初始视图。此选项卡让我们定义备份应存储的位置。


    ![A436605_1_En_4_Fig6_HTML.jpg](A436605_1_En_4_Fig6_HTML.jpg)


    *图 4-6：Define Back Up Database (Full) Task, Destination tab*


    需要注意的是，此界面会根据在General选项卡中`Back up to:`字段的选择而变化。


    请注意标记为`Create a backup file for every database`的单选按钮。由于我们专门为此配置数据库的完整备份设置，请单击此选项下的`Create
    a sub-directory for each database`复选框。这意味着，对于您选择备份的每个数据库，其备份将保存在一个以该数据库名称命名的目录中。


    准备好继续后，点击Options选项卡。图[4-7](#A436605_1_En_4_Chapter.html#Fig7)是您接下来将看到的内容。


    ![A436605_1_En_4_Fig7_HTML.jpg](A436605_1_En_4_Fig7_HTML.jpg)


    *图 4-7：Define Back Up Database (Full) Task, Options tab*


    在这里，我们可以设置该任务的其他各种设置。从图中可以看到，我们有关于压缩、备份过期和加密的选项。在本演示中，我们将保留这些选项，不进行压缩或加密。在此屏幕上我唯一想更改的是勾选`Verify
    backup integrity`复选框。如果您的数据库已经运行过完整性检查，这并非100%必要，但为了以防万一，我希望确保选择了此选项。安全总比后悔好，尤其是在您可能因为未选择此选项而面临备份失败的情况下。


    在屏幕底部，单击`Change…`按钮为此任务设置计划。


    让我们花点时间定义我们的备份计划应该是什么样子以及何时运行。假设我们希望备份在24小时窗口内运行，以最小化数据中断。如果完整备份设置在午夜，那么第一个差异备份也将设置在午夜，第一个事务日志备份也是如此。然后每六小时运行一次新的差异备份。在这些时间点之间，事务日志备份每小时运行一次。表[4-1](#A436605_1_En_4_Chapter.html#Tab1)是对我所描述时间段的一个相当准确的表示。


    *表 4-1：24小时备份计划示例*


    | 时间 | 完整备份？ | 差异备份？ | 事务日志？ |

    | --- | --- | --- | --- |

    | 12:00 am | X | X | X |

    | 1:00 am |   |   | X |

    | 2:00 am |   |   | X |

    | 3:00 am |   |   | X |

    | 4:00 am |   |   | X |

    | 5:00 am |   |   | X |

    | 6:00 am |   | X | X |

    | 7:00 am |   |   | X |

    | 8:00 am |   |   | X |

    | 9:00 am |   |   | X |

    | 10:00 am |   |   | X |

    | 11:00 am |   |   | X |

    | 12:00 pm |   | X | X |

    | 1:00 pm |   |   | X |

    | 2:00 pm |   |   | X |

    | 3:00 pm |   |   | X |

    | 4:00 pm |   |   | X |

    | 5:00 pm |   |   | X |

    | 6:00 pm |   | X | X |

    | 7:00 pm |   |   | X |

    | 8:00 pm |   |   | X |

    | 9:00 pm |   |   | X |

    | 10:00 pm |   |   | X |

    | 11:00 pm |   |   | X |


    使用此模型，我们可以恢复到给定日期的任何一小时，这意味着我们将丢失的最多数据是1小时。如果可以接受，我们可以继续。如果不能，我们可以调整备份之间的时间。不过，我们现在将坚持这个计划。图[4-8](#A436605_1_En_4_Chapter.html#Fig8)显示了更新后的界面应是什么样子。


    ![A436605_1_En_4_Fig8_HTML.jpg](A436605_1_En_4_Fig8_HTML.jpg)


    *图 4-8：New Job Schedule*


    您需要做的就是下拉`Occurs`菜单并选择`Daily`。就是这样。注意`Summary`字段中的文本现在显示`Occurs every day at 12:00:00
    am. Schedule will be used starting on [DATE]`。点击OK保存此计划，并注意我们刚刚读到的相同摘要已传输到界面上的Schedule块，如图[4-9](#A436605_1_En_4_Chapter.html#Fig9)所示。


    ![A436605_1_En_4_Fig9_HTML.jpg](A436605_1_En_4_Fig9_HTML.jpg)


    *图 4-9：Updated schedule information*


    现在，我们已经完成了计划中完整备份部分的设置，让我们继续差异备份部分。点击Next按钮继续。图[4-10](#A436605_1_En_4_Chapter.html#Fig10)显示了下一个屏幕。


    ![A436605_1_En_4_Fig10_HTML.jpg](A436605_1_En_4_Fig10_HTML.jpg)


    *图 4-10*'
  raw: '### Full Backup Configuration


    To start, go to SSMS and expand the Management node. Next, right-click Maintenance
    Plans and choose Maintenance Plan Wizard. The first interface we see is titled
    Select Plan Properties. Enter a name of Backup Maintenance Plan in the Name box,
    and a brief description as well. Click the radio button for Separate schedules
    for each task also. Figure [4-1](#A436605_1_En_4_Chapter.html#Fig1) shows what
    you should see. When you are ready, click Next to continue.


    ![A436605_1_En_4_Fig1_HTML.jpg](A436605_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Select Plan Properties


    The next screen lets us select which maintenance tasks we want to run in this
    plan. We want to choose the three tasks related to backups: specifically, Back
    Up Database (Full), Back Up Database (Differential), and Back Up Database (Transaction
    Log). These selections are shown as part of Figure [4-2](#A436605_1_En_4_Chapter.html#Fig2).


    ![A436605_1_En_4_Fig2_HTML.jpg](A436605_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Select Maintenance Tasks


    Now, click Next and we will choose the order of the three parts of the backup,
    as shown in Figure [4-3](#A436605_1_En_4_Chapter.html#Fig3). Since we are going
    to be executing these on different schedules and not chaining them together in
    the same plan (i.e., we are not going to run all three at the same time under
    the heading of full, differential, or transaction log), we can bypass this page.
    Click the Next button when you are ready to proceed.


    ![A436605_1_En_4_Fig3_HTML.jpg](A436605_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Select Maintenance Task


    Because we left the default order in place on the previous screen, the first interface
    that comes up is the Define Back Up Database (Full) Task screen. There are three
    tabs on this screen titled General, Destination, and Options, with the default
    screen being General. Figure [4-4](#A436605_1_En_4_Chapter.html#Fig4) shows this
    initial interface.


    ![A436605_1_En_4_Fig4_HTML.jpg](A436605_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Define Back Up Database (Full) Task, General tab


    Pull down the Database(s) menu and select the databases you would like to back
    up. It can be any database you like, as long as it has been set up with the full
    recovery model. Once a database is selected, Figure [4-5](#A436605_1_En_4_Chapter.html#Fig5)
    shows what should be seen in the main screen.


    ![A436605_1_En_4_Fig5_HTML.jpg](A436605_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Define Back Up Database (Full) Task, General tab (updated)


    Note that the Database radio button is now selected. This is because a database
    has been detected and is now the subject of this task. Consequently, you could
    also choose the Files and filegroups radio button if you want to run backups of
    individual files.


    On this screen, there is also an option labeled Back up to: that is new for SQL
    Server 2016\. Previously, we did not have the option to back up to a URL, but
    we do now, thanks to the innovations that Microsoft has made with the integration
    of SQL Server into cloud-based infrastructure such as Microsoft Azure. Getting
    into the specifics of Azure is out of the scope of this book, but this is a fantastic
    addition to an already powerful platform. For most purposes, this can be kept
    at Disk, although it can change for your particular situation.


    The bottom of this screen has the Schedule option. We won’t worry about this until
    we have set all of the options in the three different tabs first, so don’t worry
    about that just yet. Click the Destination tab when you are ready to continue.


    Figure [4-6](#A436605_1_En_4_Chapter.html#Fig6) shows the initial view of the
    Destination tab. This tab lets us define where the backups should be stored.


    ![A436605_1_En_4_Fig6_HTML.jpg](A436605_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Define Back Up Database (Full) Task, Destination tab


    It is important to note that this interface changes depending on the selection
    of the Back up to: field in the General tab.


    Notice the radio button labeled Create a backup file for every database. Since
    we are using this specifically for configuring the setting for a full backup of
    the database, click the check box under this option for Create a sub-directory
    for each database. This means that, for every database you choose to back up,
    those backups are going to be kept in a directory with the name of the database
    as the name of the directory.


    When you’re ready to move on, click the Options tab. Figure [4-7](#A436605_1_En_4_Chapter.html#Fig7)
    will be what you see next.


    ![A436605_1_En_4_Fig7_HTML.jpg](A436605_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Define Back Up Database (Full) Task, Options tab


    This is where we can set the other various settings for the task. From the figure,
    you can see that we have options for compression, backup expiration, and encryption.
    For this demonstration, we are going to keep these options just as they are without
    compression or encryption. The only thing I want to change on this screen is to
    check the check box for Verify backup integrity. This isn’t 100% necessary if
    your database has already had integrity checks run against it, but just in case,
    I want to make sure that this option is selected. Better safe than sorry, especially
    when you are on the receiving end of a failed backup that might have been avoided
    if this option were selected.


    At the bottom of the screen, click the Change… button to set up the schedule for
    this task.


    Let’s take a minute and define what our backup schedule should look like and when
    it should run. Let’s assume that we want our backups to run in a 24-hour window,
    so there is minimal interruption of data. If the full backup is set at midnight,
    then the first differential would be set at midnight also, followed by the first
    transaction log backup as well. Then every six hours, a new differential backup
    will run. Inside of those, transaction log backups will run every hour. Table
    [4-1](#A436605_1_En_4_Chapter.html#Tab1) is a fairly accurate representation of
    the time block I am describing.


    Table 4-1


    24-Hour Backup Schedule Example


    | Time | Full? | Differential? | Transaction Log? |

    | --- | --- | --- | --- |

    | 12:00 am | X | X | X |

    | 1:00 am |   |   | X |

    | 2:00 am |   |   | X |

    | 3:00 am |   |   | X |

    | 4:00 am |   |   | X |

    | 5:00 am |   |   | X |

    | 6:00 am |   | X | X |

    | 7:00 am |   |   | X |

    | 8:00 am |   |   | X |

    | 9:00 am |   |   | X |

    | 10:00 am |   |   | X |

    | 11:00 am |   |   | X |

    | 12:00 pm |   | X | X |

    | 1:00 pm |   |   | X |

    | 2:00 pm |   |   | X |

    | 3:00 pm |   |   | X |

    | 4:00 pm |   |   | X |

    | 5:00 pm |   |   | X |

    | 6:00 pm |   | X | X |

    | 7:00 pm |   |   | X |

    | 8:00 pm |   |   | X |

    | 9:00 pm |   |   | X |

    | 10:00 pm |   |   | X |

    | 11:00 pm |   |   | X |


    Using this model, we can restore to any hour in a given day, meaning that the
    most data we will lose is 1 hour. If this is acceptable, we can move on. If not,
    then we can adjust the time between backups. We will stay with this schedule for
    now though. Figure [4-8](#A436605_1_En_4_Chapter.html#Fig8) shows what the updated
    interface should look like.


    ![A436605_1_En_4_Fig8_HTML.jpg](A436605_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    New Job Schedule


    All you need to do is to pull down the Occurs menu and choose Daily. That’s it.
    Notice the text in the Summary field now reads Occurs every day at 12:00:00 am.
    Schedule will be used starting on [DATE]. Click OK here to save this schedule,
    and notice that the same summary we just read has been transferred to the Schedule
    block on the interface, as shown in Figure [4-9](#A436605_1_En_4_Chapter.html#Fig9).


    ![A436605_1_En_4_Fig9_HTML.jpg](A436605_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Updated schedule information


    Now that we are done setting up the full backup portion of the plan, let’s move
    on to the differential portion. Click the Next button to move on. Figure [4-10](#A436605_1_En_4_Chapter.html#Fig10)
    shows the next screen.


    ![A436605_1_En_4_Fig10_HTML.jpg](A436605_1_En_4_Fig10_HTML.jpg)


    Figure 4-10'
  trans: '### 完整备份配置


    首先，启动 SSMS 并展开 Management 节点。接着，右键单击 Maintenance Plans 并选择 Maintenance Plan Wizard。我们看到的第一个界面标题为
    Select Plan Properties。在 Name 框中输入 `Backup Maintenance Plan`，并添加简要描述。同时，选择 Separate
    schedules for each task 单选按钮。图 4-1 显示了您应看到的界面。准备就绪后，点击 Next 继续。


    ![A436605_1_En_4_Fig1_HTML.jpg](img/A436605_1_En_4_Fig1_HTML.jpg)


    *图 4-1：选择计划属性*


    下一个屏幕让我们选择要在此计划中运行的维护任务。我们需要选择与备份相关的三个任务：Back Up Database (Full)、Back Up Database
    (Differential) 和 Back Up Database (Transaction Log)。这些选择如图 4-2 所示。


    ![A436605_1_En_4_Fig2_HTML.jpg](img/A436605_1_En_4_Fig2_HTML.jpg)


    *图 4-2：选择维护任务*


    现在，点击 Next，我们将选择备份的三个部分的执行顺序，如图 4-3 所示。由于我们将在不同时间表上执行这些任务，而不会将它们链接在同一个计划中（即我们不会同时运行完整备份、差异备份或事务日志备份），我们可以跳过此页。准备好后，点击
    Next 按钮继续。


    ![A436605_1_En_4_Fig3_HTML.jpg](img/A436605_1_En_4_Fig3_HTML.jpg)


    *图 4-3：选择维护任务*


    由于我们在上一屏幕保留了默认顺序，接下来出现的第一个界面是 Define Back Up Database (Full) Task 屏幕。此屏幕有三个选项卡：General、Destination
    和 Options，默认显示 General 选项卡。图 4-4 显示了这个初始界面。


    ![A436605_1_En_4_Fig4_HTML.jpg](img/A436605_1_En_4_Fig4_HTML.jpg)


    *图 4-4：定义 Back Up Database (Full) 任务，常规选项卡*


    下拉 `Database(s)` 菜单并选择您想要备份的数据库。只要是设置了完整恢复模型的数据库都可以。选择数据库后，图 4-5 显示了主屏幕上应该看到的内容。


    ![A436605_1_En_4_Fig5_HTML.jpg](img/A436605_1_En_4_Fig5_HTML.jpg)


    *图 4-5：定义 Back Up Database (Full) 任务，常规选项卡（已更新）*


    请注意，此时 `Database` 单选按钮已被选中。这是因为检测到了数据库，并且它现在是此任务的对象。因此，如果您想备份单个文件，也可以选择 `Files
    and filegroups` 单选按钮。


    在此屏幕上，还有一个标记为 `Back up to:` 的新选项，这是 SQL Server 2016 的新功能。以前，我们没有备份到 URL 的选项，但现在有了，这要归功于
    Microsoft 将 SQL Server 集成到基于云的基础设施（如 Microsoft Azure）的创新。深入探讨 Azure 的具体细节超出了本书范围，但这是这个强大平台的一个极好的补充。对于大多数情况，可以保留为
    `Disk`，但您可以根据具体情况进行更改。


    此屏幕底部有 Schedule 选项。在我们首先设置三个不同选项卡中的所有选项之前，暂时不必担心它。准备好后，点击 Destination 选项卡继续。


    图 4-6 显示了 Destination 选项卡的初始视图。此选项卡让我们定义备份应存储的位置。


    ![A436605_1_En_4_Fig6_HTML.jpg](img/A436605_1_En_4_Fig6_HTML.jpg)


    *图 4-6：定义 Back Up Database (Full) 任务，目标选项卡*


    需要注意的是，此界面会根据在 General 选项卡中 `Back up to:` 字段的选择而变化。


    请注意标记为 `Create a backup file for every database` 的单选按钮。由于我们专门为此配置数据库的完整备份设置，请单击此选项下的
    `Create a sub-directory for each database` 复选框。这意味着，对于您选择备份的每个数据库，其备份将保存在一个以该数据库名称命名的目录中。


    准备好继续后，点击 Options 选项卡。图 4-7 是您接下来将看到的内容。


    ![A436605_1_En_4_Fig7_HTML.jpg](img/A436605_1_En_4_Fig7_HTML.jpg)


    *图 4-7：定义 Back Up Database (Full) 任务，选项选项卡*


    在这里，我们可以设置该任务的其他各种设置。从图中可以看到，我们有关于压缩、备份过期和加密的选项。在本演示中，我们将保留这些选项，不进行压缩或加密。在此屏幕上我唯一想更改的是勾选
    `Verify backup integrity` 复选框。如果您的数据库已经运行过完整性检查，这并非 100%必要，但为了以防万一，我希望确保选择了此选项。安全总比后悔好，尤其是在您可能因为未选择此选项而面临备份失败的情况下。


    在屏幕底部，单击 `Change…` 按钮为此任务设置计划。


    让我们花点时间定义我们的备份计划应该是什么样子以及何时运行。假设我们希望备份在 24 小时窗口内运行，以最小化数据中断。如果完整备份设置在午夜，那么第一个差异备份也将设置在午夜，第一个事务日志备份也是如此。然后每六小时运行一次新的差异备份。在这些时间点之间，事务日志备份每小时运行一次。表
    4-1 是对我所描述时间段的一个相当准确的表示。


    *表 4-1：24 小时备份计划示例*


    | 时间 | 完整备份？ | 差异备份？ | 事务日志？ |

    | --- | --- | --- | --- |

    | 凌晨 12:00 | X | X | X |

    | 凌晨 1:00 |   |   | X |

    | 凌晨 2:00 |   |   | X |

    | 凌晨 3:00 |   |   | X |

    | 凌晨 4:00 |   |   | X |

    | 凌晨 5:00 |   |   | X |

    | 早上 6:00 |   | X | X |

    | 早上 7:00 |   |   | X |

    | 早上 8:00 |   |   | X |

    | 早上 9:00 |   |   | X |

    | 早上 10:00 |   |   | X |

    | 早上 11:00 |   |   | X |

    | 中午 12:00 |   | X | X |

    | 下午 1:00 |   |   | X |

    | 下午 2:00 |   |   | X |

    | 下午 3:00 |   |   | X |

    | 下午 4:00 |   |   | X |

    | 下午 5:00 |   |   | X |

    | 晚上 6:00 |   | X | X |

    | 晚上 7:00 |   |   | X |

    | 晚上 8:00 |   |   | X |

    | 晚上 9:00 |   |   | X |

    | 晚上 10:00 |   |   | X |

    | 晚上 11:00 |   |   | X |


    使用此模型，我们可以恢复到给定日期的任何一小时，这意味着我们将丢失的最多数据是 1 小时。如果可以接受，我们可以继续。如果不能，我们可以调整备份之间的时间。不过，我们现在将坚持这个计划。图
    4-8 显示了更新后的界面应是什么样子。


    ![A436605_1_En_4_Fig8_HTML.jpg](img/A436605_1_En_4_Fig8_HTML.jpg)


    *图 4-8：新建作业计划*


    您需要做的就是下拉 `Occurs` 菜单并选择 `Daily`。就是这样。注意 `Summary` 字段中的文本现在显示 `Occurs every day
    at 12:00:00 am. Schedule will be used starting on [DATE]`。点击 OK 保存此计划，并注意我们刚刚读到的相同摘要已传输到界面上的
    Schedule 块，如图 4-9 所示。


    ![A436605_1_En_4_Fig9_HTML.jpg](img/A436605_1_En_4_Fig9_HTML.jpg)


    *图 4-9：已更新的计划信息*


    现在，我们已经完成了计划中完整备份部分的设置，让我们继续差异备份部分。点击 Next 按钮继续。图 4-10 显示了下一个屏幕。


    ![A436605_1_En_4_Fig10_HTML.jpg](img/A436605_1_En_4_Fig10_HTML.jpg)


    *图 4-10*'
- fmt: '# Define Back Up Database (Differential) Task


    Click **Next** to continue setting up the plan.


    ## Differential Backup Configuration


    Next, the Define Back Up Database (Differential) Task interface is displayed.
    Figure [4-11](#A436605_1_En_4_Chapter.html#Fig11) shows that the initial interface
    is nearly exactly like the previous interface, complete with the same three tabs
    for different menu options. The first tab that we are on now is titled **General**,
    so let’s look at those options now.


    ![A436605_1_En_4_Fig11_HTML.jpg](A436605_1_En_4_Fig11_HTML.jpg)


    Figure 4-11: Define Back Up Database (Differential) Task, General tab


    Just like we did for the full backup section, we are going to choose our database
    from the drop-down menu labeled `Database(s)`, and click the **Destination** tab.
    Figure [4-12](#A436605_1_En_4_Chapter.html#Fig12) shows the initial view of this
    tab.


    ![A436605_1_En_4_Fig12_HTML.jpg](A436605_1_En_4_Fig12_HTML.jpg)


    Figure 4-12: Define Back Up Database (Differential) Task, Destination tab


    Remember that we need to check the `Create a sub-directory for each database`
    check box before moving on. Also note that the backup location is set to our default
    backup location, which was originally defined when I installed SQL Server.


    Clicking the **Options** tab shows you what is shown in Figure [4-13](#A436605_1_En_4_Chapter.html#Fig13).
    Again, this is identical to what was originally seen. Just be sure to check the
    `Verify backup integrity` check box before moving on.


    ![A436605_1_En_4_Fig13_HTML.jpg](A436605_1_En_4_Fig13_HTML.jpg)


    Figure 4-13: Define Back Up Database (Differential) Task, Options tab


    Once everything looks good, you want to click the `Change…` button on the bottom
    of this screen so that we can define the schedule for this task. Figure [4-14](#A436605_1_En_4_Chapter.html#Fig14)
    shows the initial interface for the schedule.


    ![A436605_1_En_4_Fig14_HTML.jpg](A436605_1_En_4_Fig14_HTML.jpg)


    Figure 4-14: New Job Schedule


    The `Occurs` value should be changed to **Daily**, and the `Occurs every` radio
    button should be selected with **6 hours** being the chosen value. It should look
    like Figure [4-15](#A436605_1_En_4_Chapter.html#Fig15) when you are done.


    ![A436605_1_En_4_Fig15_HTML.jpg](A436605_1_En_4_Fig15_HTML.jpg)


    Figure 4-15: New Job Schedule, updated


    This means that our differential backup will now run every six hours every day.
    Click **OK** when you are done, and then click **Next**.


    ## Transaction Log Backup Configuration


    The next screen that opens up is the Define Back Up Database (Transaction Log)
    Task screen, as shown in Figure [4-16](#A436605_1_En_4_Chapter.html#Fig16).


    ![A436605_1_En_4_Fig16_HTML.jpg](A436605_1_En_4_Fig16_HTML.jpg)


    Figure 4-16: Define Back Up Database (Transaction Log) Task, General tab


    This area has the same basic setting as the two previous **General** tabs: pick
    the database from the `Database(s)` menu and ensure that **Disk** is selected
    in the `Back up to:` drop-down menu. Notice that, in this interface, the **Database**
    radio button is disabled? This is because we aren’t backing up the database, but
    we are backing up the transaction log. On the other interfaces, this option was
    selectable, and you could choose between backing up the database or the files
    and filegroups.


    Click the **Destination** tab when you are done, and you should then see what
    is shown in Figure [4-17](#A436605_1_En_4_Chapter.html#Fig17).


    ![A436605_1_En_4_Fig17_HTML.jpg](A436605_1_En_4_Fig17_HTML.jpg)


    Figure 4-17: Define Back Up Database (Transaction Log) Task, Destination tab


    Make sure that the `Create a sub-directory for each database` option is checked,
    and this screen is done. Click the **Options** tab when you’re ready, and Figure
    [4-18](#A436605_1_En_4_Chapter.html#Fig18) will be shown.


    ![A436605_1_En_4_Fig18_HTML.jpg](A436605_1_En_4_Fig18_HTML.jpg)


    Figure 4-18: Define Back Up Database (Transaction Log) Task, Options tab


    Ensure that the `Verify backup integrity` check box is checked here, and click
    the `Change…` button at the bottom of the screen so we can set up our schedule
    for transaction log backups. Figure [4-19](#A436605_1_En_4_Chapter.html#Fig19)
    shows what your screen should look like after updating the schedule.


    ![A436605_1_En_4_Fig19_HTML.jpg](A436605_1_En_4_Fig19_HTML.jpg)


    Figure 4-19: New Job Schedule


    When you are ready to move on, click the **OK** button to close the Schedule window,
    and then click the **Next** button on the interface.


    Next comes the screen shown in Figure [4-20](#A436605_1_En_4_Chapter.html#Fig20),
    **Select Report Options**.


    ![A436605_1_En_4_Fig20_HTML.jpg](A436605_1_En_4_Fig20_HTML.jpg)


    Figure 4-20: Select Report Options


    Now, this is fairly self-explanatory. If you want a report written to text file
    and popped into the file system, click the box. Notice that I have chosen the
    **Backup** directory, and not the **Logs** directory? This is because I want to
    keep the **Logs** directory for my transaction logs. The **Backup** directory
    can be used to store the maintenance text files, while the individual folders
    inside of the **Backup** directory will store the actual `.bak` files in case
    we ever need to restore the database.


    You can also get the report e-mailed to you, but you have to have an Operator
    defined. If you have an Operator defined, select it here to receive the e-mail.
    This will let you know, by e-mail, when the maintenance plan runs and what the
    result was. For now, we will leave only the report selection. Click **Next** to
    move on.


    On the screen shown in Figure [4-21](#A436605_1_En_4_Chapter.html#Fig21), titled
    **Complete the Wizard**, you will see a summary of what we did. Expanding the
    options in the interface will show the complete details of what we did, as shown
    in Figure [4-21](#A436605_1_En_4_Chapter.html#Fig21).


    ![A436605_1_En_4_Fig21_HTML.jpg](A436605_1_En_4_Fig21_HTML.jpg)


    Figure 4-21: Complete the Wizard


    Note that these options have not been saved yet. You could click **Cancel** right
    here and destroy all of the work we did thus far, but let’s not do that. Instead,
    review what we did and, when you’re ready, click **Finish**. Figure [4-22](#A436605_1_En_4_Chapter.html#Fig22)
    shows what you should see as the maintenance plan is being created.


    ![A436605_1_En_4_Fig22_HTML.jpg](A436605_1_En_4_Fig22_HTML.jpg)


    Figure 4-22: Maintenance Plan Wizard Progress


    Always a good sign! Click **Close** when you are ready, and notice that **Backup
    Maintenance Plan** now appears in the Maintenance Plans area of SSMS. It is now
    enabled, and will run on the schedule we defined.'
