- fmt: "## 复制和重命名备份文件\n\n复制和重命名备份文件的目的是为了不覆盖我们原始的备份数据。说实话，真的没有其他原因。我想尽可能谨慎地处理我的备份，因此我会始终保留原始文件，并在适用时进行复制和重命名。\n\
    \n回想一下，在这种情况下，我的备份目录位于 `E:\\SQL Server\\Backup\\backrecTestDB`。当我导航到该目录时，我可以看到我的备份文件，包括我刚刚备份的事务日志。我想复制我之前记录的日志，并将它们重命名为按时间顺序排列的名称，格式为\
    \ `backrecTestDB_1.trn`、`backrecTestDB_2.trn` 和 `backrecTestDB_3.trn`。这三个文件将代表我们需要恢复的三个独立的事务日志。\n\
    \n最终，我复制并重命名了六个文件，如清单 [11-4](#A436605_1_En_11_Chapter.html#Par60) 所示。\n\n清单 11-4.\
    \ 复制和重命名文件\n\n*   完整备份\n    *   `backrecTestDB_FULL.bak`\n*   差异备份\n    *   `backrecTestDB_DIFF.bak`\n\
    *   事务日志备份\n    *   `backrecTestDB_1.trn`\n    *   `backrecTestDB_2.trn`\n   \
    \ *   `backrecTestDB_3.trn`\n    *   `backrecTestDB_922PM.trn`\n\n在 Windows 资源管理器中，我的文件如图\
    \ [11-14](#A436605_1_En_11_Chapter.html#Fig14) 所示。\n\n![A436605_1_En_11_Fig14_HTML.jpg](A436605_1_En_11_Fig14_HTML.jpg)\n\
    \n图 11-14\n\n文件的 Windows 列表\n\n注意最后一个事务日志；看到它比其他的要大很多吗？这是我们从清单 [11-3](#A436605_1_En_11_Chapter.html#Par53)\
    \ 刚刚做的所有更改的日志。接下来，我们将把命令组合在一起来恢复我们的数据。\n\n## T-SQL 恢复命令\n\n回到第 [7](#A436605_1_En_7_Chapter.html)\
    \ 章，我们在清单 [7-3](#A436605_1_En_7_Chapter.html#Par110) 中查看了一个 T-SQL 命令，它允许我们按时间顺序恢复完整备份、差异备份和事务日志备份，直到完成。恢复数据唯一真正棘手的部分是要时刻注意是否需要使用\
    \ `WITH RECOVERY` 或 `WITH NORECOVERY`。\n\n那么如何知道何时使用 `WITH RECOVERY` 或 `WITH NORECOVERY`\
    \ 呢？你首先需要确定你需要恢复什么。\n\n### 场景 1：完整恢复\n\n例如，如果你正在恢复一个完整的备份，那么你应该使用 `WITH RECOVERY`，因为此命令恢复数据库然后将数据库带出还原状态。\n\
    \n### 场景 2：完整和差异恢复\n\n如果你正在恢复一个完整备份和一个差异备份，那么你希望在完整恢复时使用 `WITH NORECOVERY`，这会使数据库保持在还原状态并准备好恢复更多数据，然后在差异恢复时使用\
    \ `WITH RECOVERY`，这将使数据库脱离还原数据库状态，恢复为常规使用状态。\n\n### 场景 3：完整、差异和事务日志恢复\n\n这可能是最常见的情况。在这种情况下，你希望在所有的恢复操作上使用\
    \ `WITH NORECOVERY`：完整、差异和事务日志。在 T-SQL 脚本的末尾，你可以使用 `RESTORE DATABASE backrecTestDB\
    \ WITH RECOVERY` 命令行将数据库恢复在线并使其脱离还原状态，或者你可以在最后一个事务日志恢复语句中使用 `WITH RECOVERY`。\n\
    \n清单 [11-5](#A436605_1_En_11_Chapter.html#Par78) 展示了我们将用来从完整备份恢复到差异备份，最后恢复到事务日志的基本\
    \ T-SQL 命令。请注意，清单 [11-5](#A436605_1_En_11_Chapter.html#Par78) 中列出的代码与清单 [7-3](#A436605_1_En_7_Chapter.html#Par110)\
    \ 几乎相同，我们很快将对其进行定制以更好地满足我们的需求。\n\n```\nUSE master\n-- full database restore\n\
    RESTORE DATABASE backrecTestDB\nFROM DISK = N'E:\\SQL Server\\Backup\\backrecTestDB\\\
    backrecTestDB_FULL.bak'\nWITH NORECOVERY, REPLACE\n-- differential database restore\n\
    RESTORE DATABASE backrecTestDB\nFROM DISK = N'E:\\SQL Server\\Backup\\backrecTestDB\\\
    backrecTestDB_DIFF.bak'\nWITH NORECOVERY\n-- 7:00PM log restore\nRESTORE LOG backrecTestDB\n\
    FROM DISK = N'E:\\SQL Server\\Logs\\backrecTestDB\\backrecTestDB_1.trn'\nWITH\
    \ NORECOVERY\n-- 8:00PM log restore\nRESTORE LOG backrecTestDB\nFROM DISK = N'E:\\\
    SQL Server\\Logs\\backrecTestDB\\backrecTestDB_2.trn'\nWITH NORECOVERY\n-- 9:00PM\
    \ log restore\nRESTORE LOG backrecTestDB\nFROM DISK = N'E:\\SQL Server\\Logs\\\
    backrecTestDB\\backrecTestDB_3.trn'\nWITH NORECOVERY\n-- final log restore\nRESTORE\
    \ LOG backrecTestDB\nFROM DISK = N'E:\\SQL Server\\Logs\\backrecTestDB\\backrecTestDB_922PM.trn'\n\
    WITH RECOVERY,\nSTOPAT = 'Nov 15, 2017 09:22:00 PM'\n```\n清单 11-5\n初始的 RESTORE\
    \ 脚本\n\n使用这个脚本，我们重命名了备份目录中的一些文件，然后使用这些重命名的文件成功恢复了数据库。我们在 `RESTORE LOG` 脚本中使用了\
    \ `STOPAT` 属性，成功恢复到事务日志中的某个时间点。\n\n在 SSMS 中运行清单 [11-5](#A436605_1_En_11_Chapter.html#Par78)\
    \ 所示的脚本后，我确实得到了 16000 条记录，正如我所期望的那样。图 [11-15](#A436605_1_En_11_Chapter.html#Fig15)\
    \ 显示了在将数据恢复到晚上 9:22 之前和之后的 users2 表的行数。\n\n![A436605_1_En_11_Fig15_HTML.jpg](A436605_1_En_11_Fig15_HTML.jpg)\n\
    \n图 11-15\n\n恢复前后的行数\n\n成功！我们现在能够在不使用向导的情况下，通过 SSMS 将数据库恢复到某个时间点。请注意，你可以通过添加相关的\
    \ `RESTORE LOG` 命令，并确保 `WITH RECOVERY` 语句仅出现在最后一个恢复语句中，将清单 [11-5](#A436605_1_En_11_Chapter.html#Par78)\
    \ 中所示的脚本用于任意数量的事务日志恢复（直到下一个差异恢复之前）。"
  raw: "### Copy and Rename Backup Files\n\nThe purpose of copying and renaming our\
    \ backup files is so we don’t overwrite our original backup data. There really\
    \ is no other reason, to be honest. I want to be as careful as possible with my\
    \ backups, so I will always leave the original file in place and copy and rename\
    \ when applicable.\n\nRecall that my backup directory is located at E:\\SQL Server\\\
    Backup\\backrecTestDB, in this situation. When I navigate to that directory, I\
    \ can see my backup files, including the transaction log I just backed up. I want\
    \ to copy the logs I noted previously and rename them to chronological names in\
    \ the format `backrecTestDB_1.trn`, `backrecTestDB_2.trn`, and `backrecTestDB_3.trn`.\
    \ These three files will represent our three separate transaction logs that we\
    \ need to restore.\n\nIn the end, I have copied and renamed six files, as shown\
    \ in Listing [11-4](#A436605_1_En_11_Chapter.html#Par60).\n\nListing 11-4\\. Copy\
    \ and Rename Files\n\n*   Full backup\n    *   `backrecTestDB_FULL.bak`\n*   Differential\
    \ backup\n    *   `backrecTestDB_DIFF.bak`\n*   Transaction log backups\n    *\
    \   `backrecTestDB_1.trn`\n    *   `backrecTestDB_2.trn`\n    *   `backrecTestDB_3.trn`\n\
    \    *   `backrecTestDB_922PM.trn`\n\nIn Windows Explorer, my files appeared as\
    \ shown in Figure [11-14](#A436605_1_En_11_Chapter.html#Fig14).\n\n![A436605_1_En_11_Fig14_HTML.jpg](A436605_1_En_11_Fig14_HTML.jpg)\n\
    \nFigure 11-14\n\nWindows listing of files\n\nNote the last transaction log; see\
    \ how it is much larger than the others? This is the log with all the changes\
    \ that we just made from Listing [11-3](#A436605_1_En_11_Chapter.html#Par53).\
    \ Next, we will put the commands together to restore our data.\n\n### T-SQL Restore\
    \ Command\n\nBack in Chapter [7](#A436605_1_En_7_Chapter.html), we looked at a\
    \ T-SQL command in Listing [7-3](#A436605_1_En_7_Chapter.html#Par110) that allowed\
    \ us to restore a full backup, then a differential backup, and then the transaction\
    \ log backups, in chronological order, until completion. The only real tricky\
    \ part with restoring data is to keep aware of whether or not you need to use\
    \ `WITH RECOVERY` or `WITH NORECOVERY`.\n\nSo how do you know when to use `WITH\
    \ RECOVERY` or `WITH NORECOVERY`? You first have to determine what you need to\
    \ restore.\n\n#### Scenario 1: Full Restore\n\nIf you’re restoring a single full\
    \ backup, for example, then you should use `WITH RECOVERY` because this command\
    \ restores the database and then brings the database out of the restoring state.\n\
    \n#### Scenario 2: Full and Differential Restore\n\nIf you are restoring a full\
    \ backup and a differential backup, then you want to use `WITH NORECOVERY` on\
    \ the full restore, which leaves the database in the restoring state and ready\
    \ to restore more data, and then use `WITH RECOVERY` on the differential restore,\
    \ which takes the database out of the restoring database and back ready for regular\
    \ use.\n\n#### Scenario 3: Full, Differential, and Transaction Log Restore\n\n\
    This is probably the most common scenario. In this situation, you want to use\
    \ `WITH NORECOVERY` on all of the restores: full, differential, and transaction\
    \ log. At the end of the T-SQL script, you can either have the line `RESTORE DATABASE\
    \ backrecTestDB WITH RECOVERY` to put the database back online and take it out\
    \ of the restoring state, or you can use `WITH RECOVERY` in the final transaction\
    \ log restore statement.\n\nListing [11-5](#A436605_1_En_11_Chapter.html#Par78)\
    \ shows the basic T-SQL command that we are going to use to restore the database\
    \ from the full to the differential and finally to the transaction log. Note that\
    \ the code listed in Listing [11-5](#A436605_1_En_11_Chapter.html#Par78) is almost\
    \ identical to Listing [7-3](#A436605_1_En_7_Chapter.html#Par110), and we will\
    \ be customizing it to better fit our needs shortly.\n\n```\nUSE master\n-- full\
    \ database restore\nRESTORE DATABASE backrecTestDB\nFROM DISK = N'E:\\SQL Server\\\
    Backup\\backrecTestDB\\backrecTestDB_FULL.bak'\nWITH NORECOVERY, REPLACE\n-- differential\
    \ database restore\nRESTORE DATABASE backrecTestDB\nFROM DISK = N'E:\\SQL Server\\\
    Backup\\backrecTestDB\\backrecTestDB_DIFF.bak'\nWITH NORECOVERY\n-- 7:00PM log\
    \ restore\nRESTORE LOG backrecTestDB\nFROM DISK = N'E:\\SQL Server\\Logs\\backrecTestDB\\\
    backrecTestDB_1.trn'\nWITH NORECOVERY\n-- 8:00PM log restore\nRESTORE LOG backrecTestDB\n\
    FROM DISK = N'E:\\SQL Server\\Logs\\backrecTestDB\\backrecTestDB_2.trn'\nWITH\
    \ NORECOVERY\n-- 9:00PM log restore\nRESTORE LOG backrecTestDB\nFROM DISK = N'E:\\\
    SQL Server\\Logs\\backrecTestDB\\backrecTestDB_3.trn'\nWITH NORECOVERY\n-- final\
    \ log restore\nRESTORE LOG backrecTestDB\nFROM DISK = N'E:\\SQL Server\\Logs\\\
    backrecTestDB\\backrecTestDB_922PM.trn'\nWITH RECOVERY,\nSTOPAT = 'Nov 15, 2017\
    \ 09:22:00 PM'\nListing 11-5\nInitial RESTORE Script\n```\n\nWith this script,\
    \ we renamed some files in our backup directory, and then restored the database\
    \ successfully using these renamed files. We utilized the `STOPAT` attribute in\
    \ our `RESTORE LOG` script to successfully restore to a point in time within our\
    \ transaction log.\n\nAfter running the script shown in Listing [11-5](#A436605_1_En_11_Chapter.html#Par78)\
    \ in SSMS, I was indeed left with 16000 records, just as I intended. Figure [11-15](#A436605_1_En_11_Chapter.html#Fig15)\
    \ shows the row count for the users2 table before the restoration of the data\
    \ to 9:22 pm, and after.\n\n![A436605_1_En_11_Fig15_HTML.jpg](A436605_1_En_11_Fig15_HTML.jpg)\n\
    \nFigure 11-15\n\nRow count before and after\n\nSuccess! We have now been able\
    \ to restore the database to a point in time from within SSMS without using the\
    \ wizard. Note that you can use the script shown in Listing [11-5](#A436605_1_En_11_Chapter.html#Par78)\
    \ for any number of transaction log restores (up until the next differential restore)\
    \ by adding the relevant `RESTORE LOG` command and ensuring that the `WITH` `RECOVERY`\
    \ statement is only shown in the last restore statement."
