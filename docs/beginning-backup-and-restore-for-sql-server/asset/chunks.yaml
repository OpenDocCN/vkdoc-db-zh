    | 12:00 pm |   | X | X |

    | 1:00 pm |   |   | X |

    | 2:00 pm |   |   | X |

    | 3:00 pm |   |   | X |

    | 4:00 pm |   |   | X |

    | 5:00 pm |   |   | X |

    | 6:00 pm |   | X | X |

    | 7:00 pm |   |   | X |

    | 8:00 pm |   |   | X |

    | 9:00 pm |   |   | X |

    | 10:00 pm |   |   | X |

    | 11:00 pm |   |   | X |


    You can see from this schedule that, as I said earlier, I will only ever need
    to restore a maximum of seven files; one full backup, one differential backup,
    and five transaction log backups. This schedule also implies that I will only
    lose, at a maximum, one hour’s worth of data. That will only be the case when
    data loss occurs immediately after a transaction log is run, so the transactions
    for the next hour are deemed suspect, because the transaction log may not restore
    correctly.


    Going back to what we see in Figure [5-13](#A436605_1_En_5_Chapter.html#Fig13),
    that tells me that I am restoring from the latest database backup available. This
    is probably the most common restore, since we want to recover to a certain point
    in the recent past. This isn’t always the case though, and we can specify whether
    we want to use the default, latest backups presented to us from within the Source
    section of Figure [5-13](#A436605_1_En_5_Chapter.html#Fig13) or whether we want
    to choose a set of backups from the past that are not shown in the Backup sets
    to restore: section at the bottom of Figure [5-13](#A436605_1_En_5_Chapter.html#Fig13).
    The top section, labeled Source, has two options:


    *   Database: Allows you to restore to the latest backup set consisting of full,
    differential, and any applicable transaction log backups, depending on the time
    the restore is started.

    *   Device: Allows you to pick any backup set from the file system to restore
    from. SQL Server will let you know if the backup set selected in this section
    is unable to be restored for some reason.


    The database option is selected in the Source section. Beneath the Source is the
    Destination section. This section lets you pick the database to restore to, and
    a point in time to restore to as well. We will get into point-in-time restores
    more deeply in the next section. The applicable full, differential, and transaction
    log backups are shown in the Restore plan section of the interface. On the left
    side of the Restore Database window, we can see that there are three menu options:
    General, Files, and Options. For now, let’s leave the General tab alone and click
    the Files menu section on the left. Figure [5-14](#A436605_1_En_5_Chapter.html#Fig14)
    shows the Files section.


    ![A436605_1_En_5_Fig14_HTML.jpg](A436605_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Restore Database window, Files tab


    This information comes from the default settings for your installation. Notice
    that my default file locations are already selected for me. As you can see, the
    restore process is going to write new files to the locations specified, unless
    new locations are entered in the Restore As field (the rightmost field in the
    lower part of the interface). Select the Options menu item on the left to move
    to the next section. Figure [5-15](#A436605_1_En_5_Chapter.html#Fig15) shows what
    this default interface looks like.


    ![A436605_1_En_5_Fig15_HTML.jpg](A436605_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Restore Database window, Options tab


    For a general restore, I usually select the Overwrite the existing database (WITH
    REPLACE) and deselect the Leave source database in the restoring state (WITH NORECOVERY)
    option and leave the rest as default. This lets me overwrite everything in the
    database up to the point of failure, and does not keep my database locked and
    unable to be recovered, just in case of another catastrophic event. When you have
    chosen the options that you need for your scenario, press the OK button. Figure
    [5-16](#A436605_1_En_5_Chapter.html#Fig16) shows what you should see after clicking
    OK.


    ![A436605_1_En_5_Fig16_HTML.jpg](A436605_1_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Restore Database, Restoring action


    This will take a little while to run, depending on the size of your backups. Mine
    took about 20 seconds to complete, since I didn’t have a huge amount of data to
    restore. Eventually, you should see what is shown in Figure [5-17](#A436605_1_En_5_Chapter.html#Fig17).


    ![A436605_1_En_5_Fig17_HTML.jpg](A436605_1_En_5_Fig17_HTML.jpg)


    Figure 5-17


    Restore successful


    Success! This message obviously means that our database was restored successfully.
    To check that this operation was successful (employ the adage of “Trust, but Verify”),
    simply run the code in Listing [5-3](#A436605_1_En_5_Chapter.html#Par73).


    ```

    SELECT RH.[destination_database_name] as ''Database'',

    RH.[restore_date] as ''Restore Date'',

    BS.[backup_start_date] as ''Backup Start Date'',

    BS.[backup_finish_date] as ''Backup Finish Date'',

    BS.[database_name] as ''Source Database'',

    BMF.[physical_device_name] as ''Backup Filename''

    FROM [msdb].[dbo].[restorehistory] RH

    INNER JOIN [msdb].[dbo].[backupset] BS

    ON RH.[backup_set_id] = BS.[backup_set_id]

    INNER JOIN [msdb].[dbo].[backupmediafamily] BMF

    ON BS.[media_set_id] = BMF.[media_set_id]

    WHERE( MONTH([restore_date]) = MONTH(getDate())

    AND DAY([restore_date]) = DAY(getDate())

    AND YEAR([restore_date]) = YEAR(getDate()))

    ORDER BY RH.[restore_date]

    Listing 5-3

    Trust, but Verify

    ```


    Running this code will show us what is shown in Figure [5-18](#A436605_1_En_5_Chapter.html#Fig18).
    Note that your results may vary, depending on the restore dates, file names, and
    database name.


    ![A436605_1_En_5_Fig18_HTML.jpg](A436605_1_En_5_Fig18_HTML.jpg)


    Figure 5-18


    Trust, but Verify results


    There is proof that our backup was complete, and the restore was successful. Also
    note that there are the same six files listed, in order, that we previously saw
    in the General tab in Figure [5-1](#A436605_1_En_5_Chapter.html#Fig1). Go ahead
    and flip back to that figure and check the file name in Figure [5-13](#A436605_1_En_5_Chapter.html#Fig13)
    against the file name in Figure [5-18](#A436605_1_En_5_Chapter.html#Fig18). They
    are identical, which again proves that our operation was a success.'
