- fmt: "## Adding a Differential Backup in SSMS\n\nThe first things that we need to\
    \ do is open our maintenance plan for editing. In Object Explorer, expand the\
    \ `Management` menu and double-click `Backup Plan`. This opens the maintenance\
    \ plan, so we can configure any options in the plan. Figure [10-1](#A436605_1_En_10_Chapter.html#Fig1)\
    \ shows the initial screen you should see when opening the maintenance plan.\n\
    \n![A436605_1_En_10_Fig1_HTML.jpg](A436605_1_En_10_Fig1_HTML.jpg)\n\nFigure 10-1:\
    \ Backup plan main stage\n\nWe need to open up our `Toolbox`, so either click\
    \ the `Toolbox` floating menu on the left or press `Ctrl+Alt+X` to open your `Toolbox`.\
    \ Next, we want to drag another `Back Up Database Task` to the main stage, to\
    \ the right of the existing `Back Up Database Task`. Figure [10-2](#A436605_1_En_10_Chapter.html#Fig2)\
    \ shows the approximate location of the new task.\n\n![A436605_1_En_10_Fig2_HTML.jpg](A436605_1_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2: New task\n\nJust anywhere on the stage is fine, but I put mine\
    \ there so I can draw the distinction in my mind as a hierarchy; the item to the\
    \ left is the highest level, and the item to the right is the next level down\
    \ from the item to the left.\n\nNotice that we have another red `X` on the task\
    \ that we need to contend with. We had this same situation in Chapter [9](#A436605_1_En_9_Chapter.html),\
    \ and we are going to deal with it just like we did then as well. We can start\
    \ by double-clicking the new task we just put down, and Figure [10-3](#A436605_1_En_10_Chapter.html#Fig3)\
    \ shows the default interface.\n\n![A436605_1_En_10_Fig3_HTML.jpg](A436605_1_En_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3: `Back Up Database Task`, `General` tab\n\nFor this area, we need\
    \ to follow what is shown in Listing [10-1](#A436605_1_En_10_Chapter.html#Par11)\
    \ in order to set up the various options in this area.\n\n**Listing 10-1. To-Do\
    \ List**\n\n*   `Backup type`\n    *   We must choose from `full`, `differential`,\
    \ or `transaction log`. In this case, we are going to choose `differential`.\n\
    *   `Databases`\n    *   We must choose at least one database. Note that `simple`\
    \ recovery model databases are removed if `transaction log` is chosen from the\
    \ backup type option. In this case, we are going to choose the database we have\
    \ been working in, `backrecTestDB`.\n*   `Backup component`\n    *   We can choose\
    \ from `database` or `files and filegroups`. In this case, we are going to choose\
    \ `database`.\n*   `Back up to`\n    *   We must choose from `disk`, `tape`, or\
    \ `URL`. In this case, keep it set to `disk`.\n\nNotice that these settings are\
    \ nearly identical to those from Chapter [9](#A436605_1_En_9_Chapter.html). The\
    \ only change we made was to select `differential` instead of `full` in the `Backup\
    \ type` field. Your screen should now look like Figure [10-4](#A436605_1_En_10_Chapter.html#Fig4).\n\
    \n![A436605_1_En_10_Fig4_HTML.jpg](A436605_1_En_10_Fig4_HTML.jpg)\n\nFigure 10-4:\
    \ `Back Up Database Task`, `General` tab, updated\n\nNext, we want to click the\
    \ `Destination` tab at the top of the window. Ensure that the `Create a sub-directory\
    \ for each database` check box is checked, and that is all we need to do to this\
    \ tab. Figure [10-5](#A436605_1_En_10_Chapter.html#Fig5) shows the completed interface.\n\
    \n![A436605_1_En_10_Fig5_HTML.jpg](A436605_1_En_10_Fig5_HTML.jpg)\n\nFigure 10-5:\
    \ `Back Up Database Task`, `Destination` tab\n\nClick the `Options` tab next.\
    \ Again, much like customizing the `Full Backup` portion of the maintenance plan,\
    \ we are going to select the `Verify backup integrity` and `Perform checksum`\
    \ check boxes on this tab. Figure [10-6](#A436605_1_En_10_Chapter.html#Fig6) shows\
    \ the completed interface.\n\n![A436605_1_En_10_Fig6_HTML.jpg](A436605_1_En_10_Fig6_HTML.jpg)\n\
    \nFigure 10-6: `Back Up Database Task`, `Options` tab\n\nNicely done! Believe\
    \ it or not, this is already complete. Next, we need to schedule this part of\
    \ the plan (sly reference to Dan Fogelberg there). Go ahead and click the `OK`\
    \ button to add this part of the task, and notice that the red `X` has gone away.\
    \ However, see how we have both tasks in the same stage? Let’s do that more efficiently.\
    \ At the top of the stage, there is a button labeled `Add Subplan`. Go ahead and\
    \ click that button, and you will see what is shown in Figure [10-7](#A436605_1_En_10_Chapter.html#Fig7).\n\
    \n![A436605_1_En_10_Fig7_HTML.jpg](A436605_1_En_10_Fig7_HTML.jpg)\n\nFigure 10-7:\
    \ Subplan Properties\n\nChange the `Name` field to `Differential Backup` and add\
    \ a description of \"This is the Differential Backup portion of the backup maintenance\
    \ plan.\" Click `OK` when you are done with this, and you will see an updated\
    \ interface as shown in Figure [10-8](#A436605_1_En_10_Chapter.html#Fig8).\n\n\
    ![A436605_1_En_10_Fig8_HTML.jpg](A436605_1_En_10_Fig8_HTML.jpg)\n\nFigure 10-8:\
    \ Updated main stage\n\nNothing is on the stage right now, because nothing has\
    \ been added to the subplan. Click back on the `Full Backup` subplan from the\
    \ upper portion of the screen, click the subplan we just created, press `Ctrl+X`\
    \ to cut the task, select the `Differential Backup` subplan again, click inside\
    \ the stage, and press `Ctrl+V` to paste the task. This will transfer the entirety\
    \ of the task from the `Full Backup` subplan to the `Differential Backup` subplan.\
    \ Figure [10-9](#A436605_1_En_10_Chapter.html#Fig9) shows what your updated interface\
    \ should look like at this point.\n\n![A436605_1_En_10_Fig9_HTML.jpg](A436605_1_En_10_Fig9_HTML.jpg)\n\
    \nFigure 10-9: Updated main stage\n\nSo there we go; we have our tasks in the\
    \ correct subplans, where they belong. You can also long press on the text `Back\
    \ Up Database Task 1` in this screen to change the name of the task. I did this,\
    \ and changed the task title to simply read `Differential Backup Task`.\n\nOne\
    \ thing I found interesting about this section was that the full backup schedule\
    \ did not seem to be retained. Referring back to our original plan for the backups,\
    \ we need to set the full backup schedule to run at 12:00 am, and our differential\
    \ backups need to run every six hours.\n\n## Scheduling the Differential Backup\n\
    \nWith the `Differential Backup` subplan selected in the top area, we want to\
    \ click either the calendar in the menu bar or the calendar in the `Differential\
    \ Backup` row. Whichever one you pick will open the same interface. Figure [10-10](#A436605_1_En_10_Chapter.html#Fig10)\
    \ shows the initial `New Job Schedule` window.\n\n![A436605_1_En_10_Fig10_HTML.jpg](A436605_1_En_10_Fig10_HTML.jpg)\n\
    \nFigure 10-10: New Job Schedule\n\nI explained these options in detail in Chapter\
    \ [9](#A436605_1_En_9_Chapter.html), so I don’t need to repeat them here. Instead,\
    \ you should update your settings to those shown in Figure [10-11](#A436605_1_En_10_Chapter.html#Fig11),\
    \ which is to run the differential backup every six hours of every day.\n\n![A436605_1_En_10_Fig11_HTML.jpg](A436605_1_En_10_Fig11_HTML.jpg)\n\
    \nFigure 10-11: New Job Schedule, updated\n\nWhen you have these settings complete,\
    \ click the `OK` button. Your `Schedule` column changes to the summary of the\
    \ schedule as shown in the `Description` box of Figure [10-11](#A436605_1_En_10_Chapter.html#Fig11).\
    \ Once you get back to the main stage, save your work and notice that we have\
    \ new `SQL Server Agent` job names, even for the items we already saved once before.\
    \ Figure [10-12](#A436605_1_En_10_Chapter.html#Fig12) shows what this section\
    \ looks like now.\n\n![A436605_1_En_10_Fig12_HTML.jpg](A436605_1_En_10_Fig12_HTML.jpg)\n\
    \nFigure 10-12: SQL Server Agent, updated\n\nLet’s keep the given names for now,\
    \ but we will change them later.\n\nNotice that the `Full Restore` job was not\
    \ changed? This is because we created this job exclusively within `SQL Server\
    \ Agent`, and not from the maintenance plan stage or interface, so this interface\
    \ did not factor into the naming process of the `SQL Server Agent` job.\n\n##\
    \ Updating the SQL Server Agent Job\n\nNow that we can see our new `Differential\
    \ Backup` job, we need to configure it. We will follow most of the directions\
    \ from the `Full Backup` portion of the job, with some slight changes, as noted\
    \ in the following sections."
  raw: "## Adding a Differential Backup in SSMS\n\nThe first things that we need to\
    \ do is open our maintenance plan for editing. In Object Explorer, expand the\
    \ Management menu and double-click Backup Plan. This opens the maintenance plan,\
    \ so we can configure any options in the plan. Figure [10-1](#A436605_1_En_10_Chapter.html#Fig1)\
    \ shows the initial screen you should see when opening the maintenance plan.\n\
    \n![A436605_1_En_10_Fig1_HTML.jpg](A436605_1_En_10_Fig1_HTML.jpg)\n\nFigure 10-1\n\
    \nBackup plan main stage\n\nWe need to open up our Toolbox, so either click the\
    \ Toolbox floating menu on the left or press Ctrl+Alt+X to open your Toolbox.\
    \ Next, we want to drag another Back Up Database Task to the main stage, to the\
    \ right of the existing Back Up Database Task. Figure [10-2](#A436605_1_En_10_Chapter.html#Fig2)\
    \ shows the approximate location of the new task.\n\n![A436605_1_En_10_Fig2_HTML.jpg](A436605_1_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2\n\nNew task\n\nJust anywhere on the stage is fine, but I put mine\
    \ there so I can draw the distinction in my mind as a hierarchy; the item to the\
    \ left is the highest level, and the item to the right is the next level down\
    \ from the item to the left.\n\nNotice that we have another red X on the task\
    \ that we need to contend with. We had this same situation in Chapter [9](#A436605_1_En_9_Chapter.html),\
    \ and we are going to deal with it just like we did then as well. We can start\
    \ by double-clicking the new task we just put down, and Figure [10-3](#A436605_1_En_10_Chapter.html#Fig3)\
    \ shows the default interface.\n\n![A436605_1_En_10_Fig3_HTML.jpg](A436605_1_En_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3\n\nBack Up Database Task, General tab\n\nFor this area, we need\
    \ to follow what is shown in Listing [10-1](#A436605_1_En_10_Chapter.html#Par11)\
    \ in order to set up the various options in this area.\n\nListing 10-1. To-Do\
    \ List\n\n*   Backup type\n    *   We must choose from full, differential, or\
    \ transaction log. In this case, we are going to choose differential.\n*   Databases\n\
    \    *   We must choose at least one database. Note that simple recovery model\
    \ databases are removed if transaction log is chosen from the backup type option.\
    \ In this case, we are going to choose the database we have been working in, backrecTestDB.\n\
    *   Backup component\n    *   We can choose from database or files and filegroups.\
    \ In this case, we are going to choose database.\n*   Back up to\n    *   We must\
    \ choose from disk, tape, or URL. In this case, keep it set to disk.\n\nNotice\
    \ that these settings are nearly identical to those from Chapter [9](#A436605_1_En_9_Chapter.html).\
    \ The only change we made was to select differential instead of full in the Backup\
    \ type field. Your screen should now look like Figure [10-4](#A436605_1_En_10_Chapter.html#Fig4).\n\
    \n![A436605_1_En_10_Fig4_HTML.jpg](A436605_1_En_10_Fig4_HTML.jpg)\n\nFigure 10-4\n\
    \nBack Up Database Task, General tab, updated\n\nNext, we want to click the Destination\
    \ tab at the top of the window. Ensure that the Create a sub-directory for each\
    \ database check box is checked, and that is all we need to do to this tab. Figure\
    \ [10-5](#A436605_1_En_10_Chapter.html#Fig5) shows the completed interface.\n\n\
    ![A436605_1_En_10_Fig5_HTML.jpg](A436605_1_En_10_Fig5_HTML.jpg)\n\nFigure 10-5\n\
    \nBack Up Database Task, Destination tab\n\nClick the Options tab next. Again,\
    \ much like customizing the Full Backup portion of the maintenance plan, we are\
    \ going to select the Verify backup integrity and Perform checksum check boxes\
    \ on this tab. Figure [10-6](#A436605_1_En_10_Chapter.html#Fig6) shows the completed\
    \ interface.\n\n![A436605_1_En_10_Fig6_HTML.jpg](A436605_1_En_10_Fig6_HTML.jpg)\n\
    \nFigure 10-6\n\nBack Up Database Task, Options tab\n\nNicely done! Believe it\
    \ or not, this is already complete. Next, we need to schedule this part of the\
    \ plan (sly reference to Dan Fogelberg there). Go ahead and click the OK button\
    \ to add this part of the task, and notice that the red X has gone away. However,\
    \ see how we have both tasks in the same stage? Let’s do that more efficiently.\
    \ At the top of the stage, there is a button labeled Add Subplan. Go ahead and\
    \ click that button, and you will see what is shown in Figure [10-7](#A436605_1_En_10_Chapter.html#Fig7).\n\
    \n![A436605_1_En_10_Fig7_HTML.jpg](A436605_1_En_10_Fig7_HTML.jpg)\n\nFigure 10-7\n\
    \nSubplan Properties\n\nChange the Name field to Differential Backup and add a\
    \ description of “This is the Differential Backup portion of the backup maintenance\
    \ plan.” Click OK when you are done with this, and you will see an updated interface\
    \ as shown in Figure [10-8](#A436605_1_En_10_Chapter.html#Fig8).\n\n![A436605_1_En_10_Fig8_HTML.jpg](A436605_1_En_10_Fig8_HTML.jpg)\n\
    \nFigure 10-8\n\nUpdated main stage\n\nNothing is on the stage right now, because\
    \ nothing has been added to the subplan. Click back on the Full Backup subplan\
    \ from the upper portion of the screen, click the subplan we just created, press\
    \ Ctrl+X to cut the task, select the Differential Backup subplan again, click\
    \ inside the stage, and press Ctrl+V to paste the task. This will transfer the\
    \ entirety of the task from the Full Backup subplan to the Differential Backup\
    \ subplan. Figure [10-9](#A436605_1_En_10_Chapter.html#Fig9) shows what your updated\
    \ interface should look like at this point.\n\n![A436605_1_En_10_Fig9_HTML.jpg](A436605_1_En_10_Fig9_HTML.jpg)\n\
    \nFigure 10-9\n\nUpdated main stage\n\nSo there we go; we have our tasks in the\
    \ correct subplans, where they belong. You can also long press on the text Back\
    \ Up Database Task 1 in this screen to change the name of the task. I did this,\
    \ and changed the task title to simply read Differential Backup Task.\n\nOne thing\
    \ I found interesting about this section was that the full backup schedule did\
    \ not seem to be retained. Referring back to our original plan for the backups,\
    \ we need to set the full backup schedule to run at 12:00 am, and our differential\
    \ backups need to run every six hours.\n\n## Scheduling the Differential Backup\n\
    \nWith the Differential Backup subplan selected in the top area, we want to click\
    \ either the calendar in the menu bar or the calendar in the Differential Backup\
    \ row. Whichever one you pick will open the same interface. Figure [10-10](#A436605_1_En_10_Chapter.html#Fig10)\
    \ shows the initial New Job Schedule window.\n\n![A436605_1_En_10_Fig10_HTML.jpg](A436605_1_En_10_Fig10_HTML.jpg)\n\
    \nFigure 10-10\n\nNew Job Schedule\n\nI explained these options in detail in Chapter\
    \ [9](#A436605_1_En_9_Chapter.html), so I don’t need to repeat them here. Instead,\
    \ you should update your settings to those shown in Figure [10-11](#A436605_1_En_10_Chapter.html#Fig11),\
    \ which is to run the differential backup every six hours of every day.\n\n![A436605_1_En_10_Fig11_HTML.jpg](A436605_1_En_10_Fig11_HTML.jpg)\n\
    \nFigure 10-11\n\nNew Job Schedule, updated\n\nWhen you have these settings complete,\
    \ click the OK button. Your Schedule column changes to the summary of the schedule\
    \ as shown in the Description box of Figure [10-11](#A436605_1_En_10_Chapter.html#Fig11).\
    \ Once you get back to the main stage, save your work and notice that we have\
    \ new SQL Server Agent job names, even for the items we already saved once before.\
    \ Figure [10-12](#A436605_1_En_10_Chapter.html#Fig12) shows what this section\
    \ looks like now.\n\n![A436605_1_En_10_Fig12_HTML.jpg](A436605_1_En_10_Fig12_HTML.jpg)\n\
    \nFigure 10-12\n\nSQL Server Agent, updated\n\nLet’s keep the given names for\
    \ now, but we will change them later.\n\nNotice that the Full Restore job was\
    \ not changed? This is because we created this job exclusively within SQL Server\
    \ Agent, and not from the maintenance plan stage or interface, so this interface\
    \ did not factor into the naming process of the SQL Server Agent job.\n\n## Updating\
    \ the SQL Server Agent Job\n\nNow that we can see our new Differential Backup\
    \ job, we need to configure it. We will follow most of the directions from the\
