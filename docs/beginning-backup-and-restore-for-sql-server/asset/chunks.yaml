    下一步是备份事务日志。操作方法是右键单击数据库名称，将鼠标悬停在 `Tasks`（任务）上，然后选择 `Back Up`（备份）。此菜单位置如图 8-8 所示。


    ![A436605_1_En_8_Fig8_HTML.jpg](img/A436605_1_En_8_Fig8_HTML.jpg)


    图 8-8：`Back Up`（备份）位置。


    这将打开 `Back Up Database`（备份数据库）屏幕，如图 8-9 所示。如果我想执行完整备份（如备份类型选项 `full` 所示），那么这个默认屏幕将是理想的选择，但我目前不想这样做。


    ![A436605_1_En_8_Fig9_HTML.jpg](img/A436605_1_En_8_Fig9_HTML.jpg)


    图 8-9：`Back Up Database`（备份数据库）。


    由于我不想运行完整备份，我需要下拉该菜单并选择 `transaction log`（事务日志）代替。做出此更改后，你将看到如图 8-10 所示的内容。


    ![A436605_1_En_8_Fig10_HTML.jpg](img/A436605_1_En_8_Fig10_HTML.jpg)


    图 8-10：已选择 `Transaction Log`（事务日志）。


    这为我们备份事务日志做好了准备，但我们还没有完成。如果我们此时按下 `OK`（确定），我们将使用其他选项卡上的默认值，而我们还没有查看那些选项。


    单击左侧的 `Media Options`（介质选项）标签以显示 `Media Options`（介质选项）屏幕。图 8-11 显示了此屏幕的默认值。


    ![A436605_1_En_8_Fig11_HTML.jpg](img/A436605_1_En_8_Fig11_HTML.jpg)


    图 8-11：`Back Up Database`（备份数据库），`Media Options`（介质选项）选项卡。


    请注意，在 `transaction log`（事务日志）部分中，`Truncate the transaction log`（截断事务日志）单选按钮已被选中。这意味着默认选项只是截断事务日志，并留下该不规则边缘作为事务日志的新尾部。我们希望保持此选项不变。这是因为我们希望保持数据库联机，而不处于
    `restoring`（还原）状态。选择指定的选项并按 `OK`（确定）继续。我们不需要担心 `Backup Options`（备份选项）选项卡中的默认值，因为那些默认值正是我们需要的。


    应该会迅速出现一条成功消息，告知我们备份已成功完成。看到此消息时单击 `OK`（确定），`Back Up Database`（备份数据库）屏幕将会关闭。


    现在，如预期所示，我们的数据库如图 8-12 所示已恢复联机。


    ![A436605_1_En_8_Fig12_HTML.jpg](img/A436605_1_En_8_Fig12_HTML.jpg)


    图 8-12：数据库已联机。


    一旦我们到达这里，我们就可以进行操作的下一步并开始数据还原。


    ## 还原数据库


    要开始完整数据库还原，我们开始时的步骤与之前类似，只是菜单位置略有不同，如图 8-13 所示。


    ![A436605_1_En_8_Fig13_HTML.jpg](img/A436605_1_En_8_Fig13_HTML.jpg)


    图 8-13：数据库菜单位置。


    我们将右键单击我们的数据库，将鼠标悬停在 `Tasks`（任务）上，然后是 `Restore`（还原），最后选择 `Database`（数据库）。


    默认屏幕如图 8-14 所示。请注意，此屏幕将根据所选数据库的最新备份自动填充 `Restore Plan`（还原计划）。


    ![A436605_1_En_8_Fig14_HTML.jpg](img/A436605_1_En_8_Fig14_HTML.jpg)


    图 8-14：`Restore Database`（还原数据库）。


    你可以自由选择 `Database`（数据库）下拉菜单中的任何选项，并观察 `backup sets`（备份集）值如何随每个选择而变化。


    **注意：** 请注意 `Name`（名称）字段如何默认显示完整备份，然后是差异备份，接着是自上次差异备份以来的事务日志备份。


    我们希望默认选择此区域中的选项，因为我们希望按界面中显示的顺序还原完整备份、差异备份和事务日志备份。我们希望确保既回滚事务日志，又在 `Timeline`（时间线）区域选择一个时间点，或者忽略整个事务日志。我将还原到上一个事务日志，因为我知道数据驻留在该备份中。


    `Files`（文件）选项卡中的值默认是合适的，因为我们不想重命名任何文件。换句话说，它们将按默认位置存放。


    在 `Options`（选项）选项卡上，我们要确保 `tail-log backup`（尾日志备份）部分两个选项都被选中（默认如此），当我们准备好时，按下
    `OK`（确定）按钮。大约一分钟后，你应该会收到显示数据库已成功还原的消息。单击此处的 `OK`（确定）完成此操作，然后按 `F5` 刷新 `SSMS` 界面。


    信任但要验证，对吧？继续展开我们数据库下的 `Tables`（表），你应该看到如图 8-15 所示的内容。


    ![A436605_1_En_8_Fig15_HTML.jpg](img/A436605_1_En_8_Fig15_HTML.jpg)


    图 8-15：`users1` 表回来了！


    所以，你看到了：使用 `SSMS` 完成的数据库完整还原。


    ## 数据库快照


    快速还原整个数据库的一个好方法是使用数据库快照。这是数据库在特定时间点的真实快照，并且与该时间点的实际数据库一致。这意味着快照充当了一种复制的数据库，因为当源数据库更新时，快照也会更新。从拍摄快照的那一刻起，每个后续事务都会在快照和源数据库中捕获。你还可以为同一数据库创建多个快照，这是一个特别好的做法。如果管理得当，这可以成为管理数据恢复的好方法。例如，如果快照存在很长时间且未被删除，它将继续增长，直到消耗掉它所在的磁盘空间。这显然不理想，因此必须维护快照。


    让我在这里停一下，提请注意：数据库快照绝不能用于替代备份和还原场景。如果我们不应该将它们用于备份或恢复，那么它们的目的是什么？使用数据库快照的主要目的是为了让
    `DBA` 能够快速拍摄其数据库的快照，对数据库执行可能搞砸的操作，然后测试以确保数据库更改实际有效。如果无效，那么 `DBA` 只需还原快照，他们就回到了几分钟前的状态。执行此操作的时间通常比计划还原操作、执行所有还原步骤以及确定要恢复哪些事务日志要少得多。只需还原快照，工作就完成了。


    数据库快照的另一个好用途是用于报告。使用我们的命名约定，我们可以创建一个基于一天中不同时间拍摄的快照数据的标准报告。这可以用于诸如跟踪销售量或监控数据库中随时间记录的各种美元交易等目的。报告服务将获得一个滚动的
    24 小时数据窗口，并将此数据量化为管理层易于阅读的仪表盘是数据库快照的一个绝佳用途。`SQL Server` 中的报告主题略微超出了本书的范围，因此我建议阅读
    Kathi Kellenberger 的 *Beginning SQL Server Reporting Services*，可在 [`www.apress.com/us/book/9781484219898`](http://www.apress.com/us/book/9781484219898)
    获取。对于那些正涉足 `SQL Server` 报告服务世界但不太知道从何开始的 `DBA` 来说，这是一本绝对的必备书。


    ### 数据库快照如何工作？


    数据库快照的概念对不熟悉的用户来说可能有些令人生畏。我听过最好的解释是，它们在理论上最接近静态完整数据库备份。创建时存在的整个数据库作为只读副本驻留在此快照中，并且该快照保持为源数据库的只读副本，直到快照被删除为止。

