    \n图 3-2 文件选项\n\n从这里我们可以看到，“初始大小”列的值与图 3-1 中的查询结果相同。这是因为我们还没有备份事务日志，所以显示的初始大小就是当前值。一旦备份了日志，我们就可以回到此屏幕，看到一个小得多的初始值。\n\
    \n因此，我们也可以直接查看文件系统来近似了解事务日志的大小。只需导航到保存日志的位置（对我来说是 `E:\\SQL Server\\Logs`），你应该会看到与图\
    \ 3-3 类似的内容。\n\n![A436605_1_En_3_Fig3_HTML.jpg](img/A436605_1_En_3_Fig3_HTML.jpg)\n\
