    \  \n**美国国会图书馆控制号：** 2018947418\n\n© 布拉德利·比尔德 2018\n\n本作品受版权保护。出版者保留所有权利，无论涉及材料的全部或部分，具体包括翻译权、转载权、图表的重复使用权、朗诵权、广播权、缩微胶片或其他物理方式的复制权，以及信息存储与检索、电子改编、计算机软件方面的传播权，或任何目前已知或未来开发的类似或相异方法。本书可能出现商标名称、标识和图像。我们并非在每次出现商标名称、标识和图像时都使用商标符号，而是仅以编辑方式并为了商标所有者的利益而使用这些名称、标识和图像，绝无侵犯商标权之意。本书中使用的商品名称、商标、服务标识及类似术语，即使未特别标识，也不应被视为表达了它们是否受专有权利约束的意见。尽管本书中的建议和信息在出版时被认为是真实准确的，但作者、编辑或出版者均不对可能出现的任何错误或遗漏承担法律责任。出版者对本出版物所含材料不作任何明示或暗示的担保。\n\
