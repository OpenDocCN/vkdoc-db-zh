  trans: '

    ## 使用 SSMS 完成数据库完整恢复


    使用 SSMS 恢复数据库的过程与使用 T-SQL 完全相同；只是我们不再编写代码来执行操作，而是让图形界面为我们完成工作。


    图 8-1 展示了在我们进行任何操作之前，对象资源管理器窗格中我的表的样子。


    ![A436605_1_En_8_Fig1_HTML.jpg](img/A436605_1_En_8_Fig1_HTML.jpg)


    图 8-1. 当前表


    我们想要做的是创造一个需要恢复整个数据库的场景，然后按顺序从完整备份、差异备份到事务日志备份，逐步完成恢复过程。一个有趣的方法是直接删除一两个表。这几乎是一个执行恢复操作的绝佳理由，对吧？当你准备好后，首先确认你有一组当前可用的、确实可以从中恢复的数据库备份。接着，右键单击一两个表并选择“删除”。该窗口如图
    8-2 所示。


    ![A436605_1_En_8_Fig2_HTML.jpg](img/A436605_1_En_8_Fig2_HTML.jpg)


    图 8-2. 删除对象窗口


    这个窗口只有一个名为“常规”的选项卡。在中间窗格中，我们可以看到我选择了要删除的 `users1` 表。准备好后，只需单击“确定”，表就会被删除。


    请注意我的对象资源管理器窗口不再显示 `users1` 表，并且我也无法再查询该表。图 8-3 展示了我更新后的对象资源管理器。


    ![A436605_1_En_8_Fig3_HTML.jpg](img/A436605_1_En_8_Fig3_HTML.jpg)


    图 8-3. 更新后的对象资源管理器


    ### 恢复序列


    我们将使用与使用 T-SQL 恢复时相同的事件序列。该序列如清单 8-1 所示，其简化版本在清单 8-4 中重复。


    ```

    清单 8-4. 恢复序列

    *   切换到 master 数据库

    *   创建尾日志备份

    *   恢复最新的完整备份

    *   恢复最新的差异备份

    *   恢复来自最新差异备份的最旧事务日志备份

    *   继续恢复事务日志备份，直到你恢复到故障发生点

    *   恢复数据库

    ```


    请注意，我已省略了具体的 SQL 语句，因为在 SSMS 中我们不需要它们。


    ### 连接到 master 数据库


    我们需要连接到 `master` 数据库以继续。我们可以打开一个新的查询窗口，然后从“可用数据库”菜单中选择 `master`（或按 Ctrl+U 以及上下箭头键），或者我们也可以在登录时确认我们正在连接到
    `master` 数据库。如果你在登录时没有连接到 `master`，你可能应该考虑更改。你可以在如图 8-4 所示的“连接到服务器”对话框中更改你的默认数据库。


    ![A436605_1_En_8_Fig4_HTML.jpg](img/A436605_1_En_8_Fig4_HTML.jpg)


    图 8-4. 连接到服务器


    单击“选项 >>”按钮，你将看到一个扩展的界面，如图 8-5 所示。


    ![A436605_1_En_8_Fig5_HTML.jpg](img/A436605_1_En_8_Fig5_HTML.jpg)


    图 8-5. 扩展的连接到服务器界面


    下拉“连接到数据库”旁边的下拉菜单，然后选择“浏览服务器”。会弹出一条简短的消息请求连接到服务器，所以当你看到此消息时，单击“是”按钮。然后会显示“浏览服务器数据库”窗口，如图
    8-6 所示。


    ![A436605_1_En_8_Fig6_HTML.jpg](img/A436605_1_En_8_Fig6_HTML.jpg)


    图 8-6. 浏览服务器数据库


    我们在这里需要做的只是选择 `master` 并单击“确定”，然后在“连接到服务器”窗口中，`master` 将显示出来以替代“默认值”。图 8-7 显示了我在选择
    `master` 后的更新界面。


    ![A436605_1_En_8_Fig7_HTML.jpg](img/A436605_1_En_8_Fig7_HTML.jpg)


    图 8-7. 更新后的连接到服务器界面


    我已将此选项卡和其他选项卡中的其余值保留为其默认值。一旦我按下“连接”，我默认就连接到了 `master` 数据库。

    '
- fmt: 'The next step is to take a backup of the transaction log. This is done by
    right-clicking the database name, hovering over `Tasks`, and then selecting `Back
    Up`. The location of this menu item is shown in Figure [8-8](#A436605_1_En_8_Chapter.html#Fig8).


    ![A436605_1_En_8_Fig8_HTML.jpg](A436605_1_En_8_Fig8_HTML.jpg)


    Figure 8-8: `Back Up` location.


    This opens up the `Back Up Database` screen, as shown in Figure [8-9](#A436605_1_En_8_Chapter.html#Fig9).
    This default screen would be ideal if I wanted to run a full backup, as indicated
    by the backup type option of `full`, but I do not want to do this at this time.


    ![A436605_1_En_8_Fig9_HTML.jpg](A436605_1_En_8_Fig9_HTML.jpg)


    Figure 8-9: `Back Up Database`.


    Since I don’t want to run a full backup, I need to pull that menu down and select
    `transaction log` instead. Once you make this change, you will see what is shown
    in Figure [8-10](#A436605_1_En_8_Chapter.html#Fig10).


    ![A436605_1_En_8_Fig10_HTML.jpg](A436605_1_En_8_Fig10_HTML.jpg)


    Figure 8-10: `Transaction Log` selected.


    This sets us up to back up our transaction log, but we aren’t done yet. If we
    were to press `OK` here, we would be selecting the default values on the other
    tabs, and we haven’t looked at those options yet.


    Click the `Media Options` label on the left to show the `Media Options` screen.
    Figure [8-11](#A436605_1_En_8_Chapter.html#Fig11) shows the default values for
    this screen.


    ![A436605_1_En_8_Fig11_HTML.jpg](A436605_1_En_8_Fig11_HTML.jpg)


    Figure 8-11: `Back Up Database`, `Media Options` tab.


    Note that the `Truncate the transaction log` radio button is selected in the `transaction
    log` section. This means that the default option is just to truncate and leave
    that ragged edge as the new tail of the transaction log. We want to leave this
    option as is. This is because we want to leave the database online and not in
    the `restoring` state. Select the specified option and press `OK` to continue.
    We don’t need to worry about the default values in the `Backup Options` tab, since
    those default values are what we need.


    A success message should quickly appear, letting us know that our backup has completed
    successfully. Click `OK` when you see this, and the `Back Up Database` screen
    will close.


    Now, our database is shown in Figure [8-12](#A436605_1_En_8_Chapter.html#Fig12)
    as back online, as expected.


    ![A436605_1_En_8_Fig12_HTML.jpg](A436605_1_En_8_Fig12_HTML.jpg)


    Figure 8-12: Database is online.


    Once we get here, we are ready to move to the next step in the operation and start
    the restoration of the data.


    ## Restore Database


    To begin a full database restore, we start much like before except with a slightly
    different menu location, as shown in Figure [8-13](#A436605_1_En_8_Chapter.html#Fig13).


    ![A436605_1_En_8_Fig13_HTML.jpg](A436605_1_En_8_Fig13_HTML.jpg)


    Figure 8-13: Database menu location.


    We are going to right-click our database and hover over `Tasks`, then `Restore`,
    and finally, select `Database`.


    The default screen is shown in Figure [8-14](#A436605_1_En_8_Chapter.html#Fig14).
    Note that this screen will automatically populate with a `Restore Plan` based
    on the latest backups of the selected database.


    ![A436605_1_En_8_Fig14_HTML.jpg](A436605_1_En_8_Fig14_HTML.jpg)


    Figure 8-14: `Restore Database`.


    You can freely choose any of the options in the `Database` drop-down menu and
    watch how the `backup sets` values change with each selection.


    **Note:** Notice how the `Name` field automatically defaults to show the full
    backup, then the differential backup, and then the transaction log backups since
    the last differential backup.


    We want to choose the options in this area by default, since we want to restore
    the full, differential, and transaction log backups in the order they are shown
    in the interface. We want to be sure that we both wind back the transaction log
    and choose a point in time in the `Timeline` area or discount an entire transaction
    log. I am going to restore to the previous transaction log, since I know the data
    is resident in that backup.


    The values in the `Files` tab are fine by default, since we don’t want to rename
    any files. They are staying where they are going by default, in other words.


    Over on the `Options` tab, we want to be sure that the `tail-log backup` section
    has both options selected (as is the default), and when we are ready, press the
    `OK` button. After a minute or so, you should get the message showing that the
    database was successfully restored. Click `OK` here to complete this operation,
    and then press `F5` to refresh the `SSMS` interface.


    Trust but verify, right? Go ahead and expand `Tables` under our database, and
    you should see what is shown in Figure [8-15](#A436605_1_En_8_Chapter.html#Fig15).


    ![A436605_1_En_8_Fig15_HTML.jpg](A436605_1_En_8_Fig15_HTML.jpg)


    Figure 8-15: `users1` returns!


    So there you have it: a complete restore of a database using `SSMS`.


    ## Database Snapshots


    A great way to restore an entire database quickly is with database snapshots.
    This is a literal snapshot of a database at a particular moment in time, and is
    consistent with the actual database as of that moment in time. This means that
    the snapshot acts as a sort of duplicated database, because as the source database
    is updated, so is the snapshot. From the moment that the snapshot is taken, every
    subsequent transaction is captured in the snapshot as well as in the source database.
    You can also have multiple snapshots of the same database, which is a particularly
    good idea. This can be a great way to manage restoration of data, if managed correctly.
    For example, if the snapshot exists for a long time and is not dropped, it will
    continue to grow until it consumes the disk it resides on. This is clearly not
    ideal, and for this reason, snapshots must be maintained.


    Let me pause here and mention that database snapshots are never to be used in
    place of a backup and restore scenario. If we aren’t supposed to use them for
    backup or recovery, then what is their purpose? The main purpose for using database
    snapshots is for the `DBA` that wants to take a quick snapshot of their database,
    do something to the database that might mess up, and then test to make sure that
    the database change actually works. If it doesn’t, then the `DBA` just restores
    the snapshot, and they are right back where they were a few minutes ago. The time
    to do this is generally much less than planning a restore operation and having
    to go through all the restore steps and figuring out which transaction logs to
    recover. Instead, just restore the snapshot and the job is complete.


    Another good use for database snapshots is for reporting. With our naming convention,
    we can create a standard report that is based on data from the different snapshots
    taken during the day. This could be used for such purposes as tracking volume
    in sales, or monitoring the various transactions in dollars being recorded in
    the database throughout time. A rolling 24-hour window of data will be available
    to the reporting service, and quantifying this data into a dashboard for easy
    readability by management is a fantastic use of database snapshots. The topic
    of reporting in `SQL Server` is slightly outside of the scope of this book, so
    I recommend picking up Kathi Kellenberger’s *Beginning SQL Server Reporting Services*,
    available at [`www.apress.com/us/book/9781484219898`](http://www.apress.com/us/book/9781484219898).
    This is an absolute necessity for those `DBA`s that are branching out into the
    world of `SQL Server` reporting services and don’t quite know where to start.


    ### How Does a Database Snapshot Work?


    The concept of database snapshots can be somewhat intimidating to an unfamiliar
    user. The best way that I’ve heard it explained was that they are most closely
    related, in theory, to a static full database backup. The entire database as it
    existed at the time of creation resides as a read-only copy in this snapshot,
    and that one snapshot remains a read-only copy of the source database, up to the
    point that the snapshot is dropped.'
