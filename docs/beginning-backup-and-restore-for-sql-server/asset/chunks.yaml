- fmt: "# Part I\nBackups\n\n# 1. Full Backups\n\nThe concept of backing up data is\
    \ one of those things that should be extremely intuitive, but is often implemented\
    \ poorly, if at all. I know quite a few database administrators (DBAs) that don’t\
    \ worry about regular, structured backups because their database server is on\
    \ a SAN (storage area network) and the data is therefore backed up regularly.\
    \ To me, this makes no sense at all, since there is absolutely no contingency\
    \ for point-in-time restoration of data, outside of what happened to have been\
    \ backed up as part of a complete Windows backup solution. If there were a catastrophic\
    \ failure, and the DBA had to rebuild the database to the point of failure, it\
    \ could not be easily done. The reason is because the entire Windows image would\
    \ have to be rebuilt from the last Windows backup, which means that the database\
    \ will only be current to that particular point of time, and not the desired point\
    \ of time. For example, if the Windows image is run nightly, but the database\
    \ backups are run hourly, then you will have a perfect set of hourly backups up\
    \ to the point where the Windows backup is run. If Windows fails at 11:59 pm,\
    \ then that entire days’ worth of database backups has been lost. The rule of\
    \ thumb, generally, is to put backup files on a separate drive than the OS. This\
    \ alleviates the issue outlined in the preceding, as long as the backup drive\
    \ is not corrupted.\n\nIn the realm of database administration, I think it is\
    \ best to imagine that your database server is a stand-alone system. This means\
    \ to imagine that there is no SAN, no Windows backup solution, nothing like that\
    \ at all. You must be able to manage the entire universe of your data as it pertains\
    \ to your server. What does this entail, exactly? That’s what this book will address;\
    \ how to back up and restore your most important asset—the data you are responsible\
    \ for.\n\nNote\nWe will also briefly cover data storage techniques in this book,\
    \ although that will not be a main focus. This is because, although we will highlight\
    \ specific techniques for storage, it is ultimately your decision whether or not\
    \ to implement storage techniques outside of what is available from your local\
    \ file system.\n\n## What Is a Full Backup?\n\nA full backup is the entirety of\
    \ the data within a database from the point in time that the backup was run. Part\
    \ of the transaction log is also backed up in a full backup; this is done so a\
    \ successful restore can eventually be run using the backed-up data. A backup\
    \ can be saved to local disk, an available network share, or even in Windows Azure\
    \ blob storage (if you’re running SQL Server 2012 or later). The full backup type\
    \ provides the starting point for a full restore, and also the starting point\
    \ for a differential restore (covered in Chapter [6](#A436605_1_En_6_Chapter.html))\
    \ and a transaction log restore (covered in Chapter [7](#A436605_1_En_7_Chapter.html)).\
    \ In other words, without a full backup, neither a differential nor a transaction\
    \ log backup can be successfully restored.\n\nIn my first book, Practical Maintenance\
    \ Plans in SQL Server (available from Apress), I briefly discussed the concept\
    \ of backups in Chapter [1](#A436605_1_En_1_Chapter.html), titled “Backing Up\
    \ a Database.” In that chapter, I went over recovery models and backup types,\
    \ and then explained how to set up the maintenance task to perform these jobs\
    \ automatically. For the purpose of this book, I don’t think we need to go over\
    \ the job creation part, but we will go over recovery models and backup types.\n\
    \n### Recovery Models\n\nA recovery model is how SQL Server is told to recover\
    \ data. Figure [1-1](#A436605_1_En_1_Chapter.html#Fig1) shows where to look to\
    \ find the recovery model configuration area. This is found by right-clicking\
    \ an existing database and choosing `Properties`, then selecting `Options` from\
    \ the left menu. In the example shown, I have chosen to create a new database,\
    \ so the screen you see in the figure is the New Database screen.\n\n![A436605_1_En_1_Fig1_HTML.jpg](A436605_1_En_1_Fig1_HTML.jpg)\n\
    Figure 1-1. Recovery models location in New Database screen\n\nI am going to name\
    \ this database `backrecTestDB`, and this is the database that we will be using\
    \ throughout this book. Obviously, you will have your own databases that you will\
    \ maintain separately, but this is what we will use as a reference.\n\nNotice\
    \ that we are on the `General` tab, as shown in the left pane of the preceding\
    \ figure. Click `Options`, and you should see what is shown in Figure [1-2](#A436605_1_En_1_Chapter.html#Fig2).\n\
    \n![A436605_1_En_1_Fig2_HTML.jpg](A436605_1_En_1_Fig2_HTML.jpg)\nFigure 1-2. Options\n\
    \nThe initial interface for the `Options` area is now visible.\n\nNote\nRecall\
    \ that I am using SQL Server Management Studio (`SSMS`), which is available as\
    \ a separate download from Microsoft, to administer my SQL Server 2016 instance.\n\
    \nAt the very top of this screen, the second option down is for recovery model.\
    \ You have three options for recovery models. Those options are as follows:\n\n\
    *   `Full`: This option lets the database recover to nearly any point in time,\
    \ and is the clear choice of many DBAs.\n*   `Bulk-logged`: Similar to full recovery,\
    \ but this scenario allows for logging to be minimized for bulk operations (copying,\
    \ specifically).\n*   `Simple`: This is the choice for smaller, non–mission-critical\
    \ databases. It does not allow for point-in-time restores like full, or bulk operations\
    \ like bulk-logged. It simply allows for recovery using the last backup.\n\nWe\
    \ are going to keep the `Full` option selected here, because we want to be able\
    \ to look at point-in-time restores later on in this book.\n\n### Backup Types\n\
    \nSQL Server has three unique backup types, which are discussed in later chapters.\
    \ They each perform differently, and they can either work together or separately\
    \ to provide a backup solution for your data. The backup types that are available\
    \ to you are also entirely dependent upon the recovery model used for your database.\
    \ We will get more into this shortly. For now, let’s take a look at Listing [1-1](#A436605_1_En_1_Chapter.html#Par17),\
    \ which outlines the different backup types.\n\nListing 1-1. Backup Types\n\n\
    *   Full backups\n    *   A full backup will back up the entire database, which\
    \ includes the transaction log. Using this method, anything can be restored up\
    \ to the point in time when the backup was run.\n*   Differential backups\n  \
    \  *   A differential backup contains any data not backed up since the last full\
    \ backup.\n*   Transaction log backups\n    *   A transaction log backup will\
    \ contain the individual transactions that affect the current state of the database\
    \ since the last backup.\n\nThere are a few things to note about these different\
    \ yet similar backup types.\n\nFirst, a full backup is different from a transaction\
    \ log backup, in that the full backup type has the entirety of the actual data\
    \ within the database, while the transaction log backup only has the individual\
    \ transactions through time that affected the data contained within the database.\n\
    \nSecond, a differential backup is useless without the last full backup. The differential\
    \ backup is applied to the full backup, which creates the point-in-time restore\
    \ for that particular differential backup set. One important thing to remember\
    \ about differential backups is that they do not contain the transaction log,\
    \ so any data beyond the differential backup will not be restored without restoring\
    \ the transaction log backups.\n\nFinally, it is important to remember that when\
    \ backing up the transaction log, this releases a large chunk of memory back to\
    \ the operating system, and keeps your log running smoothly. If the transaction\
    \ log were never backed up, it is possible that you could have one log file that\
    \ is the entire size of the hard drive the log is located on. For this reason,\
    \ we can easily see that backing up the transaction log is obviously important."
  raw: "# Part I\nBackups\n\n# 1. Full Backups\n\nThe concept of backing up data is\
    \ one of those things that should be extremely intuitive, but is often implemented\
    \ poorly, if at all. I know quite a few database administrators (DBAs) that don’t\
    \ worry about regular, structured backups because their database server is on\
    \ a SAN (storage area network) and the data is therefore backed up regularly.\
    \ To me, this makes no sense at all, since there is absolutely no contingency\
    \ for point-in-time restoration of data, outside of what happened to have been\
    \ backed up as part of a complete Windows backup solution. If there were a catastrophic\
    \ failure, and the DBA had to rebuild the database to the point of failure, it\
    \ could not be easily done. The reason is because the entire Windows image would\
    \ have to be rebuilt from the last Windows backup, which means that the database\
    \ will only be current to that particular point of time, and not the desired point\
    \ of time. For example, if the Windows image is run nightly, but the database\
    \ backups are run hourly, then you will have a perfect set of hourly backups up\
    \ to the point where the Windows backup is run. If Windows fails at 11:59 pm,\
    \ then that entire days’ worth of database backups has been lost. The rule of\
    \ thumb, generally, is to put backup files on a separate drive than the OS. This\
    \ alleviates the issue outlined in the preceding, as long as the backup drive\
    \ is not corrupted.\n\nIn the realm of database administration, I think it is\
    \ best to imagine that your database server is a stand-alone system. This means\
    \ to imagine that there is no SAN, no Windows backup solution, nothing like that\
    \ at all. You must be able to manage the entire universe of your data as it pertains\
    \ to your server. What does this entail, exactly? That’s what this book will address;\
    \ how to back up and restore your most important asset—the data you are responsible\
    \ for.\n\nNote\n\nWe will also briefly cover data storage techniques in this book,\
    \ although that will not be a main focus. This is because, although we will highlight\
    \ specific techniques for storage, it is ultimately your decision whether or not\
    \ to implement storage techniques outside of what is available from your local\
    \ file system.\n\n## What Is a Full Backup?\n\nA full backup is the entirety of\
    \ the data within a database from the point in time that the backup was run. Part\
    \ of the transaction log is also backed up in a full backup; this is done so a\
    \ successful restore can eventually be run using the backed-up data. A backup\
    \ can be saved to local disk, an available network share, or even in Windows Azure\
    \ blob storage (if you’re running SQL Server 2012 or later). The full backup type\
    \ provides the starting point for a full restore, and also the starting point\
    \ for a differential restore (covered in Chapter [6](#A436605_1_En_6_Chapter.html))\
    \ and a transaction log restore (covered in Chapter [7](#A436605_1_En_7_Chapter.html)).\
    \ In other words, without a full backup, neither a differential nor a transaction\
    \ log backup can be successfully restored.\n\nIn my first book, Practical Maintenance\
    \ Plans in SQL Server (available from Apress), I briefly discussed the concept\
    \ of backups in Chapter [1](#A436605_1_En_1_Chapter.html), titled “Backing Up\
    \ a Database.” In that chapter, I went over recovery models and backup types,\
    \ and then explained how to set up the maintenance task to perform these jobs\
    \ automatically. For the purpose of this book, I don’t think we need to go over\
    \ the job creation part, but we will go over recovery models and backup types.\n\
    \n### Recovery Models\n\nA recovery model is how SQL Server is told to recover\
    \ data. Figure [1-1](#A436605_1_En_1_Chapter.html#Fig1) shows where to look to\
    \ find the recovery model configuration area. This is found by right-clicking\
    \ an existing database and choosing Properties, then selecting Options from the\
    \ left menu. In the example shown, I have chosen to create a new database, so\
    \ the screen you see in the figure is the New Database screen.\n\n![A436605_1_En_1_Fig1_HTML.jpg](A436605_1_En_1_Fig1_HTML.jpg)\n\
    \nFigure 1-1\n\nRecovery models location in New Database screen\n\nI am going\
    \ to name this database backrecTestDB, and this is the database that we will be\
    \ using throughout this book. Obviously, you will have your own databases that\
    \ you will maintain separately, but this is what we will use as a reference.\n\
    \nNotice that we are on the General tab, as shown in the left pane of the preceding\
    \ figure. Click Options, and you should see what is shown in Figure [1-2](#A436605_1_En_1_Chapter.html#Fig2).\n\
    \n![A436605_1_En_1_Fig2_HTML.jpg](A436605_1_En_1_Fig2_HTML.jpg)\n\nFigure 1-2\n\
    \nOptions\n\nThe initial interface for the Options area is now visible.\n\nNote\n\
    \nRecall that I am using SQL Server Management Studio (SSMS), which is available\
    \ as a separate download from Microsoft, to administer my SQL Server 2016 instance.\n\
    \nAt the very top of this screen, the second option down is for recovery model.\
    \ You have three options for recovery models. Those options are as follows:\n\n\
    *   Full: This option lets the database recover to nearly any point in time, and\
    \ is the clear choice of many DBAs.\n*   Bulk-logged: Similar to full recovery,\
    \ but this scenario allows for logging to be minimized for bulk operations (copying,\
    \ specifically).\n*   Simple: This is the choice for smaller, non–mission-critical\
    \ databases. It does not allow for point-in-time restores like full, or bulk operations\
    \ like bulk-logged. It simply allows for recovery using the last backup.\n\nWe\
    \ are going to keep the full option selected here, because we want to be able\
    \ to look at point-in-time restores later on in this book.\n\n### Backup Types\n\
    \nSQL Server has three unique backup types, which are discussed in later chapters.\
    \ They each perform differently, and they can either work together or separately\
    \ to provide a backup solution for your data. The backup types that are available\
    \ to you are also entirely dependent upon the recovery model used for your database.\
    \ We will get more into this shortly. For now, let’s take a look at Listing [1-1](#A436605_1_En_1_Chapter.html#Par17),\
    \ which outlines the different backup types.\n\nListing 1-1. Backup Types\n\n\
    *   Full backups\n    *   A full backup will back up the entire database, which\
    \ includes the transaction log. Using this method, anything can be restored up\
    \ to the point in time when the backup was run.\n*   Differential backups\n  \
    \  *   A differential backup contains any data not backed up since the last full\
    \ backup.\n*   Transaction log backups\n    *   A transaction log backup will\
    \ contain the individual transactions that affect the current state of the database\
    \ since the last backup.\n\nThere are a few things to note about these different\
    \ yet similar backup types.\n\nFirst, a full backup is different from a transaction\
    \ log backup, in that the full backup type has the entirety of the actual data\
    \ within the database, while the transaction log backup only has the individual\
    \ transactions through time that affected the data contained within the database.\n\
    \nSecond, a differential backup is useless without the last full backup. The differential\
    \ backup is applied to the full backup, which creates the point-in-time restore\
    \ for that particular differential backup set. One important thing to remember\
    \ about differential backups is that they do not contain the transaction log,\
    \ so any data beyond the differential backup will not be restored without restoring\
    \ the transaction log backups.\n\nFinally, it is important to remember that when\
    \ backing up the transaction log, this releases a large chunk of memory back to\
    \ the operating system, and keeps your log running smoothly. If the transaction\
    \ log were never backed up, it is possible that you could have one log file that\
    \ is the entire size of the hard drive the log is located on. For this reason,\
    \ we can easily see that backing up the transaction log is obviously important."
  trans: "\n# 第一部分\n备份\n\n# 1. 完整备份\n\n数据备份的概念本应极其直观，但在实践中却常常执行不力，甚至被完全忽视。我认识不少数据库管理员（DBA），他们并不担心定期、结构化的备份，因为他们的数据库服务器位于\
    \ SAN（存储区域网络）上，因此数据会自动定期备份。在我看来，这完全没有道理，因为除了恰好作为完整 Windows 备份方案一部分被备份的数据外，完全没有针对数据时间点恢复的应急措施。如果发生灾难性故障，DBA\
    \ 必须将数据库重建到故障发生点，这将难以轻松完成。原因在于，必须从最后一次 Windows 备份重建整个 Windows 映像，这意味着数据库只能恢复到该特定时间点，而非所需的时间点。例如，如果\
    \ Windows 映像每晚运行，但数据库备份每小时运行一次，那么你将拥有一套完美的每小时备份集，直到 Windows 备份运行的时间点。如果 Windows\
    \ 在晚上 11:59 分故障，那么当天所有的数据库备份都将丢失。通常的经验法则是将备份文件放在与操作系统不同的驱动器上。只要备份驱动器未损坏，这可以缓解前述问题。\n\
    \n在数据库管理领域，我认为最好将你的数据库服务器想象成一个独立的系统。这意味着想象没有 SAN、没有 Windows 备份方案，完全没有诸如此类的东西。你必须能够管理与你的服务器相关的整个数据宇宙。这具体意味着什么？这正是本书将要探讨的内容；如何备份和恢复你最重要的资产——你所负责的数据。\n\
    \n注意\n我们也将简要介绍数据存储技术，尽管这不是主要重点。这是因为，虽然我们会重点介绍特定的存储技术，但最终是否实施本地文件系统可用技术之外的存储技术，取决于你的决定。\n\
    \n## 什么是完整备份？\n\n完整备份是指备份运行时数据库内的全部数据。完整备份也包含部分事务日志；这样做是为了最终能够使用备份的数据成功运行恢复。备份可以保存到本地磁盘、可用的网络共享，甚至\
    \ Windows Azure Blob 存储中（如果你运行的是 SQL Server 2012 或更高版本）。完整备份类型为完整恢复提供了起点，也为差异恢复（在第\
    \ 6 章介绍）和事务日志恢复（在第 7 章介绍）提供了起点。换句话说，没有完整备份，既无法成功恢复差异备份，也无法成功恢复事务日志备份。\n\n在我的第一本书《SQL\
    \ Server 中的实用维护计划》（Apress 出版）中，我在第 1 章“备份数据库”中简要讨论了备份的概念。在该章中，我介绍了恢复模式和备份类型，然后解释了如何设置维护任务以自动执行这些作业。出于本书的目的，我认为我们不需要再回顾作业创建部分，但我们将介绍恢复模式和备份类型。\n\
    \n### 恢复模式\n\n恢复模式是告诉 SQL Server 如何恢复数据的方式。图 1-1 显示了查找恢复模式配置区域的位置。可以通过右键单击现有数据库并选择`属性`，然后从左侧菜单中选择`选项`来找到它。在所示示例中，我选择创建一个新数据库，因此你在图中看到的是“新建数据库”屏幕。\n\
    \n![A436605_1_En_1_Fig1_HTML.jpg](img/A436605_1_En_1_Fig1_HTML.jpg)\n图 1-1. 新建数据库屏幕中的恢复模式位置\n\
    \n我将这个数据库命名为`backrecTestDB`，这将是我们贯穿本书使用的数据库。显然，你将维护你自己独立的数据库，但这将作为我们的参考。\n\n请注意，我们位于`常规`选项卡上，如前面图中的左窗格所示。点击`选项`，你应该能看到如图\
    \ 1-2 所示的内容。\n\n![A436605_1_En_1_Fig2_HTML.jpg](img/A436605_1_En_1_Fig2_HTML.jpg)\n\
    图 1-2. 选项\n\n`选项`区域的初始界面现在可见。\n\n注意\n请记住，我使用 SQL Server Management Studio (`SSMS`)来管理我的\
    \ SQL Server 2016 实例，该工具可从 Microsoft 单独下载。\n\n在此屏幕的最顶部，第二个选项是恢复模式。恢复模式有三个选项。这些选项如下：\n\
    \n*   `完整`：此选项允许数据库恢复到几乎任何时间点，是许多 DBA 的明确选择。\n*   `大容量日志`：与完整恢复类似，但此方案允许对大容量操作（特别是复制）进行最小化日志记录。\n\
    *   `简单`：这是针对小型、非关键任务数据库的选择。它不允许像完整恢复那样的时间点恢复，也不支持像大容量日志那样的大容量操作。它仅允许使用最后一次备份进行恢复。\n\
    \n我们将在这里保留`完整`选项，因为我们希望能在本书后面部分查看时间点恢复。\n\n### 备份类型\n\nSQL Server 有三种独特的备份类型，将在后面的章节中讨论。它们各自表现不同，可以协同工作或单独工作，为你的数据提供备份解决方案。可供你使用的备份类型也完全取决于为数据库使用的恢复模式。我们稍后会更详细地讨论这一点。现在，让我们看一下清单\
    \ 1-1，它概述了不同的备份类型。\n\n清单 1-1. 备份类型\n\n*   完整备份\n    *   完整备份将备份整个数据库，包括事务日志。使用此方法，可以恢复备份运行时间点之前的任何数据。\n\
    *   差异备份\n    *   差异备份包含自上次完整备份以来未备份的任何数据。\n*   事务日志备份\n    *   事务日志备份将包含自上次备份以来影响数据库当前状态的单个交易。\n\
    \n关于这些不同但相似的备份类型，有几点需要注意。\n\n首先，完整备份与事务日志备份不同，完整备份类型包含数据库内的全部实际数据，而事务日志备份仅包含随时间推移影响数据库内数据的单个交易。\n\
    \n其次，没有最近的完整备份，差异备份就毫无用处。差异备份应用于完整备份，从而为该特定差异备份集创建时间点恢复。关于差异备份需要记住的一个重要点是，它们不包含事务日志，因此，如果不恢复事务日志备份，差异备份之后的任何数据都将无法恢复。\n\
    \n最后，重要的是要记住，备份事务日志时，会释放一大块内存返回给操作系统，并保持日志运行顺畅。如果事务日志从未备份，那么可能会有一个日志文件占据整个日志所在硬盘的大小。因此，我们可以很容易地看出，备份事务日志显然很重要。\n"
- fmt: '# How Do Recovery Models Affect the Backup Types?


    Recovery models and backup types are very closely related, meaning that the choice
    of recovery model will determine your available options for backup types. Consider
    the information shown in Table 1-1.


    Table 1-1

    Recovery Models and Backup Types


    |     | Full Recovery Model | Bulk-Logged Recovery Model | Simple Recovery Model
    |

    | --- | --- | --- | --- |

    | Backup Types | Full Differential Transaction log | Full Differential Transaction
    log | Full |

    | Data Restore | Specific point in time | End of any backup | End of any backup
    |

    | Data Loss | Next to none | Next to none | Since last backup |


    The essence here is that the full and bulk-logged recovery models can use any
    backup type, while the simple recovery model can only use a full backup type.
    The reason for this is because the simple recovery model does not support transaction
    log backups, which are necessary for differential backups. This obviously negates
    the other two backup types, leaving only the full backup type for the simple recovery
    model.


    In terms of data restoration, the full recovery model gives the greatest level
    of granularity, while bulk-logged and simple both offer restoration to the end
    of any full or differential backup.


    Finally, when dealing with data loss, we can see that full and bulk-logged recovery
    models offer the lowest possible loss, while simple will include data loss since
    the last backup.


    # Preparing for a Full Backup


    Going back to what we saw in Figure 1-2 earlier, we can see that we have kept
    the recovery model at full. The rest of the settings on this page are fine to
    keep how they are for now, unless your particular circumstance dictates otherwise.


    Since this is a new database, we don’t have any tables that we can back up yet.
    Not to worry! Let’s create some dummy data that we can use for demonstration purposes
    in showing how to back up data. It is safe to say that this is going to be different
    from your environment, because these tables and data we are going to create are
    not going to be business essential.


    What we want to do is in four steps:


    - Create tables for small bits of data

    - Insert dummy data into those tables

    - Use the `SELECT * INTO` statement to insert the data from the tables into a
    different table using `CROSS JOIN`

    - Delete the original tables that held the small bits of data and just keep the
    master table


    To create the tables, use the following script:


    ```sql

    CREATE TABLE [fname] (fname [varchar](10));

    CREATE TABLE [lname] (lname [varchar](10));

    CREATE TABLE [animal] (animal [varchar](10));

    CREATE TABLE [language] ([language] [varchar](10));

    CREATE TABLE [users1] ([fname] [varchar](10), [lname] [varchar](10), [animal]
    [varchar](10), [language] [varchar](10));

    CREATE TABLE [users2] ([fname] [varchar](10), [lname] [varchar](10), [animal]
    [varchar](10), [language] [varchar](10));

    ```


    Note that we are creating two users tables here. I will get into why I am doing
    it like this very shortly.


    Next, we want to populate those tables with dummy data. This is fairly easy, so
    if you have a preferred method of doing this, or are working from a backup of
    regular data, that is perfectly fine. We need to have ten rows of data in each
    table in order for this generate a decent set of data, so you can use the following
    code, or you can use your own.


    ```sql

    INSERT INTO [fname] VALUES (''Bradley'');

    INSERT INTO [fname] VALUES (''Jessica'');

    INSERT INTO [fname] VALUES (''Josh'');

    INSERT INTO [fname] VALUES (''Kaylee'');

    INSERT INTO [fname] VALUES (''Matthew'');

    INSERT INTO [fname] VALUES (''Emma'');

    INSERT INTO [fname] VALUES (''Sommer'');

    INSERT INTO [fname] VALUES (''Tommy'');

    INSERT INTO [fname] VALUES (''Emily'');

    INSERT INTO [fname] VALUES (''Courtney'');

    INSERT INTO [lname] VALUES (''Beard'');

    INSERT INTO [lname] VALUES (''Jackson'');

    INSERT INTO [lname] VALUES (''Joseph'');

    INSERT INTO [lname] VALUES (''Dun'');

    INSERT INTO [lname] VALUES (''Hexum'');

    INSERT INTO [lname] VALUES (''Martinez'');

    INSERT INTO [lname] VALUES (''Mercury'');

    INSERT INTO [lname] VALUES (''May'');

    INSERT INTO [lname] VALUES (''Taylor'');

    INSERT INTO [lname] VALUES (''Deacon'');

    INSERT INTO [animal] VALUES (''Cat'');

    INSERT INTO [animal] VALUES (''Dog'');

    INSERT INTO [animal] VALUES (''Fish'');

    INSERT INTO [animal] VALUES (''Horse'');

    INSERT INTO [animal] VALUES (''Pig'');

    INSERT INTO [animal] VALUES (''Turtle'');

    INSERT INTO [animal] VALUES (''Guinea Pig'');

    INSERT INTO [animal] VALUES (''Hamster'');

    INSERT INTO [animal] VALUES (''Rat'');

    INSERT INTO [animal] VALUES (''Mouse'');

    INSERT INTO [language] VALUES (''English'');

    INSERT INTO [language] VALUES (''Spanish'');

    INSERT INTO [language] VALUES (''French'');

    INSERT INTO [language] VALUES (''Portuguese'');

    INSERT INTO [language] VALUES (''German'');

    INSERT INTO [language] VALUES (''Russian'');

    INSERT INTO [language] VALUES (''Slovakian'');

    INSERT INTO [language] VALUES (''Afrikaans'');

    INSERT INTO [language] VALUES (''Hindi'');

    INSERT INTO [language] VALUES (''Urdu'');

    ```


    That gives us four tables populated with ten rows of data in each table. Simple
    math tells us that, with a `CROSS JOIN`, we will end up with 10,000 records fairly
    quickly. Yes, we are breaking one of the cardinal rules of database administration
    and intentionally creating a Cartesian product, but it is for the purposes of
    creating this test data. Surely the DBA overseers will let it slide just this
    once.


    Now that we have our data, we need to combine it into our users tables we created
    earlier. To do this, simply run these statements:


    ```sql

    INSERT INTO users1 SELECT * FROM [fname] CROSS JOIN [lname] CROSS JOIN [animal]
    CROSS JOIN [language];

    INSERT INTO users2 SELECT * FROM [fname] CROSS JOIN [lname] CROSS JOIN [animal]
    CROSS JOIN [language];

    ```


    That will insert 10,000 records into each table.


    To clean up (delete) the original tables, run the following code:


    ```sql

    DROP TABLE [fname];

    DROP TABLE [lname];

    DROP TABLE [animal];

    DROP TABLE [language];

    ```


    That leaves us with just the users table left now. The next bit of code is going
    to run a `WHILE` loop 100 times and insert the values of `users2` into `users1`
    during each pass of the loop. The code looks like this:


    ```sql

    DECLARE @cnt INT;

    SET @cnt = 0;

    WHILE @cnt <= 1000

    BEGIN

    INSERT INTO users1 SELECT * FROM users2;

    SET @cnt = @cnt + 1;

    END;

    ```


    Basically, we are declaring a variable `@cnt`, then immediately setting it to
    0. Then we set up our `WHILE` loop and say that as long as `@cnt` is less than
    or equal to 1000, we want to insert the values of `users2` into `users1` and then
    increment our counter. This is going to give us a ton of fake data, as you will
    see shortly.


    Once that is complete, and it takes a few seconds to run, we need to verify that
    we actually have data in there that we can use, so you can easily get the count
    of the table by running the following script:


    ```sql

    SELECT count(*) as cnt FROM users1;

    ```


    That should show you that there are 10,020,000 records in the table now.


    Note

    The entire procedure for creating test data is available as a download with this
    book, and is titled `CreateTestData.sql`.


    Now that we have a nice, big table to deal with, let’s look at how we want to
    set up the full backup of the data.


    Right-click the database name, hover over `Tasks`, and select `Back Up`, as shown
    in Figure 1-3.


    ![A436605_1_En_1_Fig3_HTML.jpg](A436605_1_En_1_Fig3_HTML.jpg)

    Figure 1-3

    Location of Back Up option


    Another screen opens which will allow you to manually back up a database. This
    screen is fairly important, so let’s go over the features on each of the screens
    in this area.'
  raw: '### How Do Recovery Models Affect the Backup Types?


    Recovery models and backup types are very closely related, meaning that the choice
    of recovery model will determine your available options for backup types. Consider
    the information shown in Table [1-1](#A436605_1_En_1_Chapter.html#Tab1).


    Table 1-1


    Recovery Models and Backup Types


    |   | Full Recovery Model | Bulk-Logged Recovery Model | Simple Recovery Model
    |

    | --- | --- | --- | --- |

    | Backup Types | Full Differential Transaction log | Full Differential Transaction
    log | Full |

    | Data Restore | Specific point in time | End of any backup | End of any backup
    |

    | Data Loss | Next to none | Next to none | Since last backup |


    The essence here is that the full and bulk-logged recovery models can use any
    backup type, while the simple recovery model can only use a full backup type.
    The reason for this is because the simple recovery model does not support transaction
    log backups, which are necessary for differential backups. This obviously negates
    the other two backup types, leaving only the full backup type for the simple recovery
    model.


    In terms of data restoration, the full recovery model gives the greatest level
    of granularity, while bulk-logged and simple both offer restoration to the end
    of any full or differential backup.


    Finally, when dealing with data loss, we can see that full and bulk-logged recovery
    models offer the lowest possible loss, while simple will include data loss since
    the last backup.


    ## Preparing for a Full Backup


    Going back to what we saw in Figure [1-2](#A436605_1_En_1_Chapter.html#Fig2) earlier,
    we can see that we have kept the recovery model at full. The rest of the settings
    on this page are fine to keep how they are for now, unless your particular circumstance
    dictates otherwise.


    Since this is a new database, we don’t have any tables that we can back up yet.
    Not to worry! Let’s create some dummy data that we can use for demonstration purposes
    in showing how to back up data. It is safe to say that this is going to be different
    from your environment, because these tables and data we are going to create are
    not going to be business essential.


    What we want to do is in four steps:


    *   Create tables for small bits of data

    *   Insert dummy data into those tables

    *   Use the `SELECT * INTO` statement to insert the data from the tables into
    a different table using `CROSS JOIN`

    *   Delete the original tables that held the small bits of data and just keep
    the master table


    To create the tables, use the following script:


    ```

    CREATE TABLE [fname] (fname [varchar](10));

    CREATE TABLE [lname] (lname [varchar](10));

    CREATE TABLE [animal] (animal [varchar](10));

    CREATE TABLE [language] ([language] [varchar](10));

    CREATE TABLE [users1] ([fname] [varchar](10), [lname] [varchar](10), [animal]
    [varchar](10), [language] [varchar](10));

    CREATE TABLE [users2] ([fname] [varchar](10), [lname] [varchar](10), [animal]
    [varchar](10), [language] [varchar](10));

    ```


    Note that we are creating two users tables here. I will get into why I am doing
    it like this very shortly.


    Next, we want to populate those tables with dummy data. This is fairly easy, so
    if you have a preferred method of doing this, or are working from a backup of
    regular data, that is perfectly fine. We need to have ten rows of data in each
    table in order for this generate a decent set of data, so you can use the following
    code, or you can use your own.


    ```

    INSERT INTO [fname] VALUES (''Bradley'');

    INSERT INTO [fname] VALUES (''Jessica'');

    INSERT INTO [fname] VALUES (''Josh'');

    INSERT INTO [fname] VALUES (''Kaylee'');

    INSERT INTO [fname] VALUES (''Matthew'');

    INSERT INTO [fname] VALUES (''Emma'');

    INSERT INTO [fname] VALUES (''Sommer'');

    INSERT INTO [fname] VALUES (''Tommy'');

    INSERT INTO [fname] VALUES (''Emily'');

    INSERT INTO [fname] VALUES (''Courtney'');

    INSERT INTO [lname] VALUES (''Beard'');

    INSERT INTO [lname] VALUES (''Jackson'');

    INSERT INTO [lname] VALUES (''Joseph'');

    INSERT INTO [lname] VALUES (''Dun'');

    INSERT INTO [lname] VALUES (''Hexum'');

    INSERT INTO [lname] VALUES (''Martinez'');

    INSERT INTO [lname] VALUES (''Mercury'');

    INSERT INTO [lname] VALUES (''May'');

    INSERT INTO [lname] VALUES (''Taylor'');

    INSERT INTO [lname] VALUES (''Deacon'');

    INSERT INTO [animal] VALUES (''Cat'');

    INSERT INTO [animal] VALUES (''Dog'');

    INSERT INTO [animal] VALUES (''Fish'');

    INSERT INTO [animal] VALUES (''Horse'');

    INSERT INTO [animal] VALUES (''Pig'');

    INSERT INTO [animal] VALUES (''Turtle'');

    INSERT INTO [animal] VALUES (''Guinea Pig'');

    INSERT INTO [animal] VALUES (''Hamster'');

    INSERT INTO [animal] VALUES (''Rat'');

    INSERT INTO [animal] VALUES (''Mouse'');

    INSERT INTO [language] VALUES (''English'');

    INSERT INTO [language] VALUES (''Spanish'');

    INSERT INTO [language] VALUES (''French'');

    INSERT INTO [language] VALUES (''Portuguese'');

    INSERT INTO [language] VALUES (''German'');

    INSERT INTO [language] VALUES (''Russian'');

    INSERT INTO [language] VALUES (''Slovakian'');

    INSERT INTO [language] VALUES (''Afrikaans'');

    INSERT INTO [language] VALUES (''Hindi'');

    INSERT INTO [language] VALUES (''Urdu'');

    ```


    That gives us four tables populated with ten rows of data in each table. Simple
    math tells us that, with a `CROSS JOIN`, we will end up with 10,000 records fairly
    quickly. Yes, we are breaking one of the cardinal rules of database administration
    and intentionally creating a Cartesian product, but it is for the purposes of
    creating this test data. Surely the DBA overseers will let it slide just this
    once.


    Now that we have our data, we need to combine it into our users tables we created
    earlier. To do this, simply run these statements:


    ```

    INSERT INTO users1 SELECT * FROM [fname] CROSS JOIN [lname] CROSS JOIN [animal]
    CROSS JOIN [language];

    INSERT INTO users2 SELECT * FROM [fname] CROSS JOIN [lname] CROSS JOIN [animal]
    CROSS JOIN [language];

    ```


    That will insert 10,000 records into each table.


    To clean up (delete) the original tables, run the following code:


    ```

    DROP TABLE [fname];

    DROP TABLE [lname];

    DROP TABLE [animal];

    DROP TABLE [language];

    ```


    That leaves us with just the users table left now. The next bit of code is going
    to run a WHILE loop 100 times and insert the values of users2 into users1 during
    each pass of the loop. The code looks like this:


    ```

    DECLARE @cnt INT;

    SET @cnt = 0;

    WHILE @cnt <= 1000

    BEGIN

    INSERT INTO users1 SELECT * FROM users2;

    SET @cnt = @cnt + 1;

    END;

    ```


    Basically, we are declaring a variable @cnt, then immediately setting it to 0\.
    Then we set up our WHILE loop and say that as long as @cnt is less than or equal
    to 1000, we want to insert the values of users2 into users1 and then increment
    our counter. This is going to give us a ton of fake data, as you will see shortly.


    Once that is complete, and it takes a few seconds to run, we need to verify that
    we actually have data in there that we can use, so you can easily get the count
    of the table by running the following script:


    ```

    SELECT count(*) as cnt FROM users1;

    ```


    That should show you that there are 10,020,000 records in the table now.


    Note


    The entire procedure for creating test data is available as a download with this
    book, and is titled CreateTestData.sql.


    Now that we have a nice, big table to deal with, let’s look at how we want to
    set up the full backup of the data.


    Right-click the database name, hover over Tasks, and select Back Up, as shown
    in Figure [1-3](#A436605_1_En_1_Chapter.html#Fig3).


    ![A436605_1_En_1_Fig3_HTML.jpg](A436605_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Location of Back Up option


    Another screen opens which will allow you to manually back up a database. This
    screen is fairly important, so let’s go over the features on each of the screens
    in this area.'
  trans: '# 恢复模型如何影响备份类型？


    恢复模型与备份类型密切相关，这意味着选择哪种恢复模型将决定可用的备份类型选项。请参考表 1-1 中展示的信息。


    表 1-1

    恢复模型与备份类型


    |     | 完全恢复模型 | 大容量日志恢复模型 | 简单恢复模型 |

    | --- | --- | --- | --- |

    | 备份类型 | 完全、差异、事务日志 | 完全、差异、事务日志 | 完全 |

    | 数据恢复 | 特定时间点 | 任意备份的结尾 | 任意备份的结尾 |

    | 数据丢失 | 几乎没有 | 几乎没有 | 自上次备份以来的所有数据 |


    这里的关键在于，完全恢复模型和大容量日志恢复模型可以使用任何备份类型，而简单恢复模型只能使用完全备份类型。其原因在于简单恢复模型不支持事务日志备份，而事务日志备份是进行差异备份所必需的。这显然排除了其他两种备份类型，使得简单恢复模型仅剩下完全备份类型。


    在数据恢复方面，完全恢复模型提供了最高级别的恢复粒度，而大容量日志和简单恢复模型都只能恢复到任何完全备份或差异备份的结尾。


    最后，在处理数据丢失问题时，我们可以看到完全和大容量日志恢复模型提供了最低可能的数据丢失风险，而简单恢复模型则会包含自上次备份以来丢失的所有数据。


    # 准备进行完全备份


    回顾一下我们之前在图 1-2 中看到的内容，可以看到我们已将恢复模型保持为“完全”。目前，此页面上的其余设置可以保持原样，除非您的特定情况要求做出更改。


    由于这是一个新数据库，我们还没有任何可以备份的表。别担心！让我们创建一些虚拟数据，用于演示如何备份数据。可以肯定地说，这将与您的环境有所不同，因为我们将要创建的这些表和数据并非业务核心数据。


    我们希望分四个步骤完成此操作：


    -   为少量数据创建表

    -   将虚拟数据插入这些表中

    -   使用 `SELECT * INTO` 语句，通过 `CROSS JOIN` 将数据从表中插入到另一个不同的表中

    -   删除保存少量原始数据的表，仅保留主表


    要创建表，请使用以下脚本：


    ```sql

    CREATE TABLE [fname] (fname varchar);

    CREATE TABLE [lname] (lname varchar);

    CREATE TABLE [animal] (animal varchar);

    CREATE TABLE [language] ([language] varchar);

    CREATE TABLE [users1] ([fname] varchar, [lname] varchar, [animal] varchar, [language]
    varchar);

    CREATE TABLE [users2] ([fname] varchar, [lname] varchar, [animal] varchar, [language]
    varchar);

    ```


    请注意，我们在这里创建了两个用户表。我很快会解释为什么这样做。


    接下来，我们要用虚拟数据填充这些表。这相当简单，所以如果您有自己喜欢的填充方法，或者使用常规数据的备份，那完全没问题。我们需要每个表中有十行数据，以便生成一组像样的数据，因此您可以使用以下代码，或者使用您自己的代码。


    ```sql

    INSERT INTO [fname] VALUES (''Bradley'');

    INSERT INTO [fname] VALUES (''Jessica'');

    INSERT INTO [fname] VALUES (''Josh'');

    INSERT INTO [fname] VALUES (''Kaylee'');

    INSERT INTO [fname] VALUES (''Matthew'');

    INSERT INTO [fname] VALUES (''Emma'');

    INSERT INTO [fname] VALUES (''Sommer'');

    INSERT INTO [fname] VALUES (''Tommy'');

    INSERT INTO [fname] VALUES (''Emily'');

    INSERT INTO [fname] VALUES (''Courtney'');

    INSERT INTO [lname] VALUES (''Beard'');

    INSERT INTO [lname] VALUES (''Jackson'');

    INSERT INTO [lname] VALUES (''Joseph'');

    INSERT INTO [lname] VALUES (''Dun'');

    INSERT INTO [lname] VALUES (''Hexum'');

    INSERT INTO [lname] VALUES (''Martinez'');

    INSERT INTO [lname] VALUES (''Mercury'');

    INSERT INTO [lname] VALUES (''May'');

    INSERT INTO [lname] VALUES (''Taylor'');

    INSERT INTO [lname] VALUES (''Deacon'');

    INSERT INTO [animal] VALUES (''Cat'');

    INSERT INTO [animal] VALUES (''Dog'');

    INSERT INTO [animal] VALUES (''Fish'');

    INSERT INTO [animal] VALUES (''Horse'');

    INSERT INTO [animal] VALUES (''Pig'');

    INSERT INTO [animal] VALUES (''Turtle'');

    INSERT INTO [animal] VALUES (''Guinea Pig'');

    INSERT INTO [animal] VALUES (''Hamster'');

    INSERT INTO [animal] VALUES (''Rat'');

    INSERT INTO [animal] VALUES (''Mouse'');

    INSERT INTO [language] VALUES (''English'');

    INSERT INTO [language] VALUES (''Spanish'');

    INSERT INTO [language] VALUES (''French'');

    INSERT INTO [language] VALUES (''Portuguese'');

    INSERT INTO [language] VALUES (''German'');

    INSERT INTO [language] VALUES (''Russian'');

    INSERT INTO [language] VALUES (''Slovakian'');

    INSERT INTO [language] VALUES (''Afrikaans'');

    INSERT INTO [language] VALUES (''Hindi'');

    INSERT INTO [language] VALUES (''Urdu'');

    ```


    这样我们就得到了四个表，每个表中填充了十行数据。简单的数学计算告诉我们，通过 `CROSS JOIN`，我们将很快得到 10,000 条记录。是的，我们正在打破数据库管理的一条基本原则，故意创建笛卡尔积，但这是为了创建此测试数据的目的。数据库管理员监督者肯定会允许我们破例这一次。


    现在我们已经有了数据，需要将其合并到我们之前创建的用户表中。为此，只需运行以下语句：


    ```sql

    INSERT INTO users1 SELECT * FROM [fname] CROSS JOIN [lname] CROSS JOIN [animal]
    CROSS JOIN [language];

    INSERT INTO users2 SELECT * FROM [fname] CROSS JOIN [lname] CROSS JOIN [animal]
    CROSS JOIN [language];

    ```


    这将向每个表中插入 10,000 条记录。


    要清理（删除）原始表，请运行以下代码：


    ```sql

    DROP TABLE [fname];

    DROP TABLE [lname];

    DROP TABLE [animal];

    DROP TABLE [language];

    ```


    这样我们就只剩下了 users 表。接下来的代码将运行一个 `WHILE` 循环 100 次，并在每次循环中将 `users2` 的值插入到 `users1`
    中。代码如下：


    ```sql

    DECLARE @cnt INT;

    SET @cnt = 0;

    WHILE @cnt <= 1000

    BEGIN

    INSERT INTO users1 SELECT * FROM users2;

    SET @cnt = @cnt + 1;

    END;

    ```


    基本上，我们声明了一个变量 `@cnt`，然后立即将其设置为 0。接着我们设置 `WHILE` 循环，只要 `@cnt` 小于或等于 1000，我们就将 `users2`
    的值插入到 `users1` 中，然后增加我们的计数器。这将为我们生成大量假数据，您很快就会看到。


    一旦完成（这需要几秒钟运行），我们需要验证其中确实有我们可以使用的数据，因此您可以通过运行以下脚本轻松获取表的计数：


    ```sql

    SELECT count(*) as cnt FROM users1;

    ```


    这应该会显示表中现在有 10,020,000 条记录。


    注意

    创建测试数据的整个过程可作为本书的下载内容提供，文件名为 `CreateTestData.sql`。


    现在我们有了一个漂亮的大表可供处理，让我们看看如何设置数据的完全备份。


    右键单击数据库名称，将鼠标悬停在 `任务` 上，然后选择 `备份`，如图 1-3 所示。


    ![A436605_1_En_1_Fig3_HTML.jpg](img/A436605_1_En_1_Fig3_HTML.jpg)

    图 1-3

    “备份”选项的位置


    将打开另一个屏幕，允许您手动备份数据库。这个屏幕相当重要，所以让我们逐一介绍此区域中每个屏幕上的功能。'
- fmt: '## Back Up Database: General Tab


    Initially, the `General` tab is shown when selecting the `Back Up` option, as
    shown in Figure [1-3](#A436605_1_En_1_Chapter.html#Fig3). This tab has selections
    that can be made at the highest level, with each subsequent tab from the leftmost
    menu drilling further into the options with more detail. Figure [1-4](#A436605_1_En_1_Chapter.html#Fig4)
    shows the default settings of the `General` tab in my database.


    ![A436605_1_En_1_Fig4_HTML.jpg](A436605_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    General tab


    First, let’s take a look at how our transaction log is running. A full transaction
    log is one of those things that will bring a database screeching to a halt, and
    the cause may be hard to determine unless you know what to look for. Periodic
    backups will keep your database running smoothly, from the point of view of the
    transaction log, and will also allow you to provide a heightened level of data
    integrity and security, which is never a bad thing.


    #### Transaction Log Examination


    Right-click the database again and select `Tasks`, then hover over `Shrink`, and
    finally, select the `Files` option. This is shown in Figure [1-5](#A436605_1_En_1_Chapter.html#Fig5).


    ![A436605_1_En_1_Fig5_HTML.jpg](A436605_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Shrink Files option


    Initially, you should see what is shown in Figure [1-6](#A436605_1_En_1_Chapter.html#Fig6).


    ![A436605_1_En_1_Fig6_HTML.jpg](A436605_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Shrink File (Data)


    This page shows us that we can select the file type, the filegroup, and the file
    name for our backup. What is important is that this isn’t the transaction log
    though; this is for the `.mdf` file, which is the master data file.


    Pull down the `File type` menu and select `Log` from the options. The interface
    changes slightly and you are then shown what is in Figure [1-7](#A436605_1_En_1_Chapter.html#Fig7).


    ![A436605_1_En_1_Fig7_HTML.jpg](A436605_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Shrink File (Log)


    Now, we can see that this is the transaction log. This interface tells us that
    we have `584MB` currently allocated for the transaction log, with `178.11MB` available.
    That means that around `406MB` is being used by the transaction log right now.
    That’s not enormous, but it does leave only 30% of the currently allocated space
    for the transaction log to grow.


    At this point, we can do one of two things: we could run a full backup, which
    will shrink the transaction log, or we could run a transaction log backup, which
    will also obviously back up the transaction log. For the purpose of this demonstration,
    I am going to run a full backup on the database and show what happens to the size
    of this transaction log.


    #### Manually Backing Up the Database


    Keep the screen shown in Figure [1-7](#A436605_1_En_1_Chapter.html#Fig7) open
    for now, but switch back to the `Back Up Database` screen last shown in Figure
    [1-4](#A436605_1_En_1_Chapter.html#Fig4). Here, we can see that the full backup
    type is selected, and the recovery model is set to `FULL` as well, with this option
    unavailable to change. We also have the backup component option, which lets us
    choose between backing up the database or just the files or filegroups. Leave
    the default option of `Database` selected here. Next, we have the option to back
    up to either `Disk` or `URL`.


    > **Note**

    > The `Back Up to URL` option is new in `SQL Server 2016`, and is specifically
    for connectivity either to an Azure instance or to a remote URL for backup storage.


    Note that the `Disk` option is selected by default, and the default location is
    automatically filled in for us here. That’s because, when I installed `SQL Server
    2016`, I defined the locations for the logs and backups. Take the time during
    installation to take care of all that, and it works out much better for you in
    the long run. The location specified in the location window is a valid location,
    and there is not a backup with that name in the file location, so this is going
    to be a brand-new backup; we aren’t appending to an existing backup, in other
    words. You could click the `Add` button and choose another name, or click the
    `Remove` button to clear out the current option, but we’ll keep it just like it
    is now and click `OK`. The options on the other tabs here aren’t particularly
    relevant at this point, but they could be used later on for specific purposes
    as needed for your installation.


    Once you click `OK`, a progress bar gives a percent status until we finally see
    what is shown in Figure [1-8](#A436605_1_En_1_Chapter.html#Fig8).


    ![A436605_1_En_1_Fig8_HTML.jpg](A436605_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Backup successful


    Now, let’s go back to the `Shrink File` screen we had up a bit ago, as shown in
    Figure [1-7](#A436605_1_En_1_Chapter.html#Fig7). Click the `File type` menu again,
    choose `Data`, and then choose `Log` from the same menu again. This basically
    refreshes the data; I suppose you could accomplish this same result by closing
    and reopening this window. Once the interface refreshes, we can see what is shown
    in Figure [1-9](#A436605_1_En_1_Chapter.html#Fig9).


    ![A436605_1_En_1_Fig9_HTML.jpg](A436605_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Transaction log shrunk


    The value for available free space has gone up to `569.27MB`, or 97% available.
    That means that this single backup operation freed up 67% of our available space
    for the transaction log.


    ## Summary


    This chapter walked us through an introduction to full backups, and then gave
    a brief demonstration of how to manually run a full backup of a database.


    We can clearly see the advantage that the full backup gives us; not only does
    it give us an expected backup solution, but it also gives us a (mostly) fresh
    transaction log to work with as well. We saw how a full backup affects not only
    the backup being created, but also how it helps maintain the size of the transaction
    log so the transaction log doesn’t grow out of control.


    If you don’t currently have a backup solution in place in your environment, these
    first four chapters will hopefully play an integral and essential role in your
    successful implementation of an extremely powerful and reliable backup system.


    # 2. Differential Backups


    Setting up a structured, recurring backup does not stop with just a scheduled
    full backup. That is only half the battle; to be honest, a third of the battle.
    A good backup strategy reduces the overall risk to the data stored in the database.
    One of the most effective ways to reduce risk is by decreasing the total number
    of “links” in your backup chain (i.e., the total number of files you have to restore
    in the case of a disaster). Every file that gets created during a backup has a
    chance of being corrupted. If you have a large number of backups in a restoration,
    you run a greater risk of having corrupted data somewhere for that restoration
    cycle; the longer the chain, the greater the risk. This is where differential
    backups enter the backup strategy.'
  raw: '### Back Up Database: General Tab


    Initially, the General tab is shown when selecting the Back Up option, as shown
    in Figure [1-3](#A436605_1_En_1_Chapter.html#Fig3). This tab has selections that
    can be made at the highest level, with each subsequent tab from the leftmost menu
    drilling further into the options with more detail. Figure [1-4](#A436605_1_En_1_Chapter.html#Fig4)
    shows the default settings of the General tab in my database.


    ![A436605_1_En_1_Fig4_HTML.jpg](A436605_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    General tab


