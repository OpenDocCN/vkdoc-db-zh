    Next, we want to select the Steps tab. In this area, we want to click the New…
    button to open the New Job Step screen and create a new step for the job. The
    first step that we need to create is the full restore task, and the second task
    we need is the differential restore. Update the New Job Step screen as shown in
    Figure [10-20](#A436605_1_En_10_Chapter.html#Fig20) to create the full restore
    portion of the plan.


    ![A436605_1_En_10_Fig20_HTML.jpg](A436605_1_En_10_Fig20_HTML.jpg)


    Figure 10-20


    New Job Step, General tab


    Next, click the Advanced tab to show the options in that area. We only want to
    select the Log to table and Include step output in history check boxes here; the
    rest of the options can stay as they are by default. Figure [10-21](#A436605_1_En_10_Chapter.html#Fig21)
    shows the screen as it should look with updated values.


    ![A436605_1_En_10_Fig21_HTML.jpg](A436605_1_En_10_Fig21_HTML.jpg)


    Figure 10-21


    New Job Step, Advanced tab


    When you have those values set, click the OK button to close this window and return
    you to the New Job window. We can now see the full restore step listed as Step
    1.


    We need to create the differential restore step now, so click the New… button
    again to open a fresh instance of the New Job Step window. On this screen, we
    are going to enter the information as shown in Figure [10-22](#A436605_1_En_10_Chapter.html#Fig22)
    to get the differential step set up.


    ![A436605_1_En_10_Fig22_HTML.jpg](A436605_1_En_10_Fig22_HTML.jpg)


    Figure 10-22


    New Job Step, General tab


    That is the same T-SQL command that we referenced earlier, so we can safely assume
    that it will execute successfully.


    Note


    Notice that we are using the WITH NORECOVERY command for the full backup step
    and the WITH RECOVERY command for the differential backup step. This is because
    the full backup step is going to be immediately followed by the differential backup
    step, and we are telling the database that we want to keep the database in the
    Restoring… state until we restore the differential backup step, and then put the
    database back online with the WITH RECOVERY command in the differential backup
    step.


    Click the Advanced tab now, and update it just as we did in Figure [10-21](#A436605_1_En_10_Chapter.html#Fig21)
    earlier. When you have updated the Advanced tab with these options, go ahead and
    click the OK button to return to the New Job screen shown in Figure [10-23](#A436605_1_En_10_Chapter.html#Fig23).


    ![A436605_1_En_10_Fig23_HTML.jpg](A436605_1_En_10_Fig23_HTML.jpg)


    Figure 10-23


    New Job, updated


    We can now see that the full restore job is step 1, and the differential restore
    is step 2\. We can also see that step 1 will move to step 2 on success, which
    is what we wanted to do as well. That way, the job continues instead of relying
    on human interaction. After all, the point of these exercises is to increase automation
    within SQL Server, not to make our jobs more cumbersome.


    We don’t need to access the Schedules or Alerts tabs, so skip over to the Notifications
    tab next. We want to select the E-mail and Write to the Windows Application event
    log check boxes, and then choose the Operator you should have set up in the drop-down
    menu next to the E-mail check box. The completed values are shown in Figure [10-24](#A436605_1_En_10_Chapter.html#Fig24).


    ![A436605_1_En_10_Fig24_HTML.jpg](A436605_1_En_10_Fig24_HTML.jpg)


    Figure 10-24


    New Job, Notifications tab


    When your screen matches what is shown in Figure [10-24](#A436605_1_En_10_Chapter.html#Fig24),
    just click the OK button to return to the main SSMS window. The SQL Server Agent
    Job has been successfully created, and the Jobs submenu under SQL Server Agent
    in Object Explorer has now been updated as shown in Figure [10-25](#A436605_1_En_10_Chapter.html#Fig25).


    ![A436605_1_En_10_Fig25_HTML.jpg](A436605_1_En_10_Fig25_HTML.jpg)


    Figure 10-25


    Jobs submenu


    We are now ready to move on to the next section.


    ### Copy and Rename Current Backup


    My backup location, E:\SQL Server\Backup, has stayed the same for quite a few
    years, and will probably stay the same until I stop using SQL Server. I suppose
    the reason for this is because it is never really a good idea to store backups
    on the C: drive, and the D drive was usually a CD-ROM or DVD drive, so the physical
    storage I had available was the E: drive. However this works out for you, just
    be sure that you are not storing your backups on the boot drive and you’ll be
    fine.


    Navigate to your backup location and find the latest differential backup taken.
    We need to make a copy of this file and rename it to backrecTestDB_DIFFERENTIAL.bak.
    Once you have copied and renamed that backup, we are ready to execute the backup
    and see if it works.


    Let’s make a quick change to the database so that we have something to restore.
    Remember when we dropped the users1 table? Let’s do that again. That should give
    us a decent amount of data to restore. Note that I would normally recommend that
    we use transaction log restores to get this data back, but we aren’t quite there
    yet, and this method will work for what we need to have demonstrated.


    ### Restore Data


    Right-click the Differential Restore SQL Server Agent job and select Start Job
    at Step… to execute the job. We are presented with a window shown in Figure [10-26](#A436605_1_En_10_Chapter.html#Fig26).


    ![A436605_1_En_10_Fig26_HTML.jpg](A436605_1_En_10_Fig26_HTML.jpg)


    Figure 10-26


    Start Job at Step… screen


    Select the first step, Full Restore, and click the Start button. Eventually, we
    are shown the success message shown in Figure [10-27](#A436605_1_En_10_Chapter.html#Fig27).


    ![A436605_1_En_10_Fig27_HTML.jpg](A436605_1_En_10_Fig27_HTML.jpg)


    Figure 10-27


    Start Jobs success


    At this point, our database has had the full backup and differential backup applied.
    Next, we need to verify that the plan restored data correctly, so run the Backup
    and Restore Events report that we ran earlier to verify. To run this report, right-click
    your database, go to Reports, and then click the Backup and Restore Events item.
    Once there, you should see the top two items very similar to what is shown in
    Figure [10-28](#A436605_1_En_10_Chapter.html#Fig28).


    ![A436605_1_En_10_Fig28_HTML.jpg](A436605_1_En_10_Fig28_HTML.jpg)


    Figure 10-28


    Successful restore operations


    This tells us that the first operation was the bottom one, and the last operation
    was the top one. The first operation was the full restore (we can tell because
    it says the Mode was “No recovery”) and the second operation was the differential
    restore.


    Another way that I can tell that the database was restored correctly is that the
    users1 table has been restored to the Tables list. The Application event log also
    shows the entry, so I am assuming that the differential restore operation was
    a success.'
  trans: '### SQL Server 代理恢复作业


    在本节中，我们将从创建一个新的 SQL Server 代理作业开始。展开 `SQL Server 代理`，右键单击 `作业`，然后选择 `新建作业…` 以继续。新建作业窗口打开后，请根据图
    10-19 所示的值更新窗口。


    ![A436605_1_En_10_Fig19_HTML.jpg](img/A436605_1_En_10_Fig19_HTML.jpg)


    图 10-19：新建作业，常规选项卡


    我想重申一下，就所有者这个值而言，你的设置将与我的不同。很可能在很多情况下，你的特定用户账户会与我的不同，因此我给出的指导应概念性地理解，而非字面照搬。这对大多数人来说可能显而易见，但以防有任何混淆，我想在此说明清楚。


    接下来，我们要选择 `步骤` 选项卡。在此区域中，我们单击 `新建…` 按钮以打开“新建作业步骤”屏幕，并为作业创建一个新步骤。我们需要创建的第一个步骤是完整还原任务，第二个任务是差异还原。如图
    10-20 所示更新“新建作业步骤”屏幕，以创建计划的完整还原部分。


    ![A436605_1_En_10_Fig20_HTML.jpg](img/A436605_1_En_10_Fig20_HTML.jpg)


    图 10-20：新建作业步骤，常规选项卡


    接着，单击 `高级` 选项卡以显示该区域的选项。我们这里只想勾选 `记录到表` 和 `将步骤输出包含在历史记录中` 复选框；其余选项可以保持默认设置。图 10-21
    屏幕显示了更新值后应有的样子。


    ![A436605_1_En_10_Fig21_HTML.jpg](img/A436605_1_En_10_Fig21_HTML.jpg)


    图 10-21：新建作业步骤，高级选项卡


    设置好这些值后，单击 `确定` 按钮关闭此窗口并返回到“新建作业”窗口。我们现在可以看到完整还原步骤已列为步骤 1。


    我们现在需要创建差异还原步骤，因此再次单击 `新建…` 按钮，打开一个新的“新建作业步骤”窗口实例。在此屏幕上，我们将输入如图 10-22 所示的信息以设置差异步骤。


    ![A436605_1_En_10_Fig22_HTML.jpg](img/A436605_1_En_10_Fig22_HTML.jpg)


    图 10-22：新建作业步骤，常规选项卡


    这与我们之前引用的 T-SQL 命令相同，因此我们可以确信它将成功执行。


    注意：请注意，对于完整备份步骤，我们使用了 `WITH NORECOVERY` 命令，而对于差异备份步骤，我们使用了 `WITH RECOVERY` 命令。这是因为完整备份步骤之后将立即执行差异备份步骤，我们告诉数据库希望将数据库保持在
    `正在还原…` 状态，直到我们还原差异备份步骤，然后在差异备份步骤中使用 `WITH RECOVERY` 命令使数据库重新上线。


    现在单击 `高级` 选项卡，并像之前在图 10-21 中那样进行更新。用这些选项更新完高级选项卡后，请单击 `确定` 按钮返回到图 10-23 所示的“新建作业”屏幕。


    ![A436605_1_En_10_Fig23_HTML.jpg](img/A436605_1_En_10_Fig23_HTML.jpg)


    图 10-23：新建作业，已更新


    我们现在可以看到，完整还原作业是步骤 1，差异还原是步骤 2。我们还可以看到步骤 1 将在成功时转到步骤 2，这也是我们希望的操作方式。这样，作业就会继续执行，而无需依赖人工干预。毕竟，这些练习的重点是增加
    `SQL Server` 内部的自动化，而不是让我们的工作变得更繁琐。


    我们不需要访问 `计划` 或 `警报` 选项卡，所以下一步直接跳到 `通知` 选项卡。我们要勾选 `电子邮件` 和 `写入 Windows 应用程序事件日志`
    复选框，然后在与 `电子邮件` 复选框相邻的下拉菜单中，选择您应该已设置好的操作员。完成的设置值如图 10-24 所示。


    ![A436605_1_En_10_Fig24_HTML.jpg](img/A436605_1_En_10_Fig24_HTML.jpg)


    图 10-24：新建作业，通知选项卡


    当您的屏幕与图 10-24 所示一致时，只需单击 `确定` 按钮即可返回到 SSMS 主窗口。`SQL Server 代理` 作业已成功创建，对象资源管理器中
    `SQL Server 代理` 下的 `作业` 子菜单现已更新，如图 10-25 所示。


    ![A436605_1_En_10_Fig25_HTML.jpg](img/A436605_1_En_10_Fig25_HTML.jpg)


    图 10-25：作业子菜单


    我们现在准备进入下一节。


    ### 复制并重命名当前备份


    我的备份位置 `E:\SQL Server\Backup` 已经保持不变好几年了，而且很可能在我停止使用 `SQL Server` 之前都会保持不变。我想原因在于，将备份存储在
    `C:` 盘上从来都不是一个好主意，而 `D` 盘通常是 `CD-ROM` 或 `DVD` 驱动器，因此我可用的物理存储是 `E:` 盘。无论你的情况如何，请确保不要将备份存储在启动盘上，这样就没问题了。


    导航到你的备份位置，并找到最新的差异备份文件。我们需要复制此文件并将其重命名为 `backrecTestDB_DIFFERENTIAL.bak`。复制并重命名该备份后，我们就可以执行备份并查看它是否有效。


    让我们对数据库做一个快速更改，以便有数据可恢复。还记得我们删除了 `users1` 表吗？让我们再做一次。这将为我们提供相当数量的数据用于恢复。请注意，我通常建议使用事务日志还原来恢复这些数据，但我们还没讲到那里，而且就我们需要演示的内容而言，这个方法是可行的。


    ### 恢复数据


    右键单击 `差异还原` `SQL Server 代理` 作业，然后选择 `从步骤开始作业…` 来执行该作业。此时会弹出一个窗口，如图 10-26 所示。


    ![A436605_1_En_10_Fig26_HTML.jpg](img/A436605_1_En_10_Fig26_HTML.jpg)


    图 10-26：从步骤开始作业…屏幕


    选择第一步 `完整还原`，然后单击 `开始` 按钮。最终，我们会看到如图 10-27 所示的成功消息。


    ![A436605_1_En_10_Fig27_HTML.jpg](img/A436605_1_En_10_Fig27_HTML.jpg)


    图 10-27：开始作业成功


    此时，我们的数据库已应用了完整备份和差异备份。接下来，我们需要验证该计划是否正确恢复了数据，因此运行我们之前运行的“备份和还原事件”报告进行验证。要运行此报告，请右键单击你的数据库，转到
    `报告`，然后单击 `备份和还原事件` 项。在那里，你应该看到与图 10-28 非常相似的前两个条目。


    ![A436605_1_En_10_Fig28_HTML.jpg](img/A436605_1_En_10_Fig28_HTML.jpg)


    图 10-28：成功的还原操作


    这告诉我们，第一个操作是最下面的那个，最后一个操作是最上面的那个。第一个操作是完整还原（我们可以判断，因为它显示模式为“无恢复”），第二个操作是差异还原。


    我能判断数据库已正确恢复的另一种方式是，`users1` 表已还原到表列表中。应用程序事件日志也显示了该条目，因此我假设差异还原操作已成功。'
- fmt: '## Summary


    In this chapter, we went over the basics of how to back up and restore differential
    data from SQL Server Management Studio. We learned the T-SQL portion of the `RESTORE
    DATABASE` command and what the `WITH NORECOVERY` and `WITH RECOVERY` commands
    do. We went over the steps to restore differential data using the most current
    differential backup, and we also learned how to verify that the differential restore
    was completed successfully.


    In the next chapter, we are going to go over transaction log backup and restore
    solutions, which will enhance the Backup Plan maintenance plan that we have been
    building throughout this book. At the conclusion of that chapter, you will have
    a very good understanding of how to back up data from SQL Server, and more importantly,
    how to restore that data to SQL Server and then verify that the data was restored
    correctly and as expected.


    # 11. Transaction Log Backup and Restore Solutions


    In this section of the book, we have looked at complete backup and restore solutions
    for full and differential types. We saw how the differential restore type used
    the full restore type as the base for the restore, and then restored up to the
    point that the differential backup was taken. In this chapter, we will go over
    how to complete the third part of the individual backup and restore plans, the
    transaction log.


    We looked at transaction logs and how they work in Chapters [3](#A436605_1_En_3_Chapter.html)
    and [7](#A436605_1_En_7_Chapter.html), respectively. The obvious purpose of transaction
    logs is to keep a log of transactions, but they are also used to define a quantifiable
    section of time in which transactions are located. It is more than just a cluttered
    stash of random data, in other words; it is a precise record of events as seen
    by the database, in chronological order. This is how we can rewind the database
    back to a specific transaction, or apply all changes between certain hours to
    a differential or full restore operation. This precision is not possible in any
    way unless you are extremely lucky and happen to be able to restore exactly to
    the point that a full or differential backup is restored. Otherwise, you will
    be limited to only the data stored as a part of the full or differential restore
    operation, which does not give us the precision that is needed to restore to a
    specific point in time. The chances of this happening are very, very low though,
    and for that reason, we rely on transaction logs to help us restore important
    data with great accuracy to the point that is required for our application or
    our SLA.


    In our previous chapters in this section, we basically restored a huge chunk of
    data in the form of either a full restore or a differential restore. I had an
    instructor one time tell the class I was in that restore methodologies are like
    a birthday cake; lots of layers, but really just two main parts: the very large
    majority of the data (the baked cake portion), and the minutiae of the data (the
    frosting). In other words, you can certainly have a great cake without frosting,
    but frosting is so good and really complements the cake. It may not be the best
    analogy, but it makes sense in my mind because I can visualize a cake without
    frosting as still a cake, but not really complete; whereas, a cake with frosting…
    now that’s a cake!


    To begin this chapter, we again need to have a clear understanding of what we
    want to accomplish. Typically, we can have a backup routine ready to go in a very
    short amount of time. The real difficulty comes when we have to deal with restoring
    the transaction log. For this reason, we need to go about the backup slightly
    differently than we have in the past with the full and differential backups. Listing
    [11-1](#A436605_1_En_11_Chapter.html#Par6) shows the steps we are going to take
    to create the transaction log backups. This is an easy process, especially since
    we have already done most of the steps in Chapter [3](#A436605_1_En_3_Chapter.html),
    so now we need to enhance what we learned in that chapter into a workable solution
    that we can use with our full backup plan. Back in Chapter [3](#A436605_1_En_3_Chapter.html),
    we determined that we want to have transaction log backups run every hour, so
    that the maximum amount of data that we can lose is minimal. When we restore the
    transaction log, remember that we have the option of backing up the tail of the
    log, which contains the most recent transactions, so we could use the point-in-time
    restore feature to restore up to the exact point of failure.'
