    ## 使用 SSMS 进行恢复


    执行恢复操作最简单的方式很可能是通过图形界面。我确信会有一些老派的命令行高手指出我方法的错误，对此我只想说：“嘿，哇，你在控制台里做的和我在 GUI 里做的本质上是同样的事情……很棒。”
    仅此而已。我不是那种规定必须使用特定方法论的开发者，无论是 GUI（在 `SSMS` 中）还是 `CLI`（使用 `Transact-SQL`）。我倾向于使用手头可用的任何工具，并且真的不太关心陷入“你应该用这个工具因为它太棒了，其他任何方式都很糟糕”这种二元对立的争论中。例如，我在
    `Dreamweaver` 中编写 `ColdFusion`。我不使用专门为 `ColdFusion` 开发构建的 `IDE`——`ColdFusion Builder`。为什么？因为我最初就更喜欢
    `Dreamweaver` 的布局和结构，即使过了这么多年，我仍然如此。这并不意味着 `ColdFusion Builder` 比 `Dreamweaver`
    差或好；这只是意味着我个人的偏好是其中一个而非另一个，而且我确信在对某些软件工具的偏好上，我并非个例。


    如果你直接进入菜单结构，心里想着“我想恢复一个事务日志”，你可能会在右键单击数据库名称后，从 `Tasks`（任务）菜单选项开始。图 7-1 展示了这个起点。


    ![A436605_1_En_7_Fig1_HTML.jpg](img/A436605_1_En_7_Fig1_HTML.jpg)


    图 7-1：`Tasks`（任务）子菜单


    从这里，逻辑上你会指向右侧的 `Restore`（恢复）区域，并从那里继续。这是正确的，但接下来的部分可能会让人困惑。图 7-2 显示了 `Restore`（恢复）选择的展开菜单。


    ![A436605_1_En_7_Fig2_HTML.jpg](img/A436605_1_En_7_Fig2_HTML.jpg)


    图 7-2：`Restore`（恢复）菜单选项


    此菜单有四个选项。这些选项如下：


    *   `Database`（数据库）：此选项允许你从完整或差异备份还原数据库。此选项不允许你还原事务日志。

    *   `Files and Filegroups`（文件和文件组）：此选项允许你将一组文件还原到新的或现有数据库。你可以选择完整或差异备份，相应的事务日志将被选中用于还原操作。因此，你可以选择单个事务日志进行还原，并且你的选择将自动包含自上次完整或差异备份以来的每个事务日志。请注意，所有当前备份都包含在此界面中，因此在还原数据时要非常小心。

    *   `Transaction Log`（事务日志）：此选项通常不可用，只有在少数特定情况下才可用。当数据库已使用完整备份还原，并且选择了 `RESTORE
    WITH STANDBY`（使用 STANDBY 还原）作为还原选项时，数据库将保持在 `RecoveryPending`（恢复挂起）模式，直到事务日志的尾部被还原。有趣的是，当此选项启用时，意味着数据库当前正处于等待还原事务日志尾部的状态，此区域中所有其余三个选项都会被禁用。此外，当数据库已使用
    `NORECOVERY`（无恢复）还原，并且数据库当前处于 `Restoring…`（正在还原…）模式时，此选项可用，意味着你可以继续还原事务日志。

    *   `Page`（页面）：此选项将让你检查数据库页面是否存在可能的损坏，并允许你从最新的完整、差异和事务日志备份集中还原。你的选择必须包含一个完整的备份集，这将代表一个完整的还原解决方案。


    出于本次演示的目的，我们将选择 `Files and Filegroups`（文件和文件组）选项。这将为我们提供还原事务日志所需的一些选项。你可以通过右键单击要操作的数据库并导航到
    `Tasks`（任务）➤ `Restore`（恢复）➤ `File and Filegroups`（文件和文件组）来打开 `Files and Filegroups`（文件和文件组）窗口。图
    7-3 显示了此菜单选项的位置。


    ![A436605_1_En_7_Fig3_HTML.jpg](img/A436605_1_En_7_Fig3_HTML.jpg)


    图 7-3：`Files and Filegroups`（文件和文件组）菜单位置


    ### 还原文件和文件组 — 常规


    图 7-4 显示了 `Restore Files and Filegroups`（还原文件和文件组）部分的初始界面。请注意，默认情况下，选中的是左侧界面指示的
    `General`（常规）页面。


    ![A436605_1_En_7_Fig4_HTML.jpg](img/A436605_1_En_7_Fig4_HTML.jpg)


    图 7-4：`Restore Files and Filegroups`（还原文件和文件组），`General`（常规）页面


    让我们花点时间熟悉一下这个屏幕。`常规`界面与 `SQL Server` 中许多其他常规界面几乎相同，意味着有一个 `目标`（destination）字段和一个
    `源`（source）字段。这告诉用户通常有等式的两边需要填写，如果这个等式要平衡并产生预期的结果，两组数据都必须填写正确。


    第一部分，`还原的目标`（Destination to restore），包含具有完整或大容量日志恢复模型的数据库名称。你的数据库应该默认被选中。


    第二部分，`还原的源`（Source for restore），包含具有可用于还原的有效备份的数据库名称。


    在这两个选项下方，显示了备份集。初始布局显示以下列：


    *   `还原`（Restore）：是/否的复选框值；勾选表示是，未勾选表示否。

    *   `名称`（Name）：备份文件的名称。请注意，此视图中不包含文件扩展名。

    *   `文件类型`（File Type）：此值对于完整或差异备份是“行数据”（Rows Data），对于事务日志备份则为空白。

    *   `类型`（Type）：备份的类型；值为 `完整`（full）、`差异`（differential）或 `事务日志`（transaction log）。

    *   `文件逻辑名称`（File Logical Name）：文件的逻辑名称，独立于 `名称`（Name）字段。

    *   `服务器`（Server）：运行备份的 `SQL Server` 实例的名称。

    *   `数据库`（Database）：备份来源的 `SQL Server` 数据库的名称。

    *   `开始日期`（Start Date）：备份操作开始的日期和时间。

    *   `完成日期`（Finish Date）：备份操作完成的日期和时间。

    *   `大小`（Size）：备份的大小。

    *   `用户名`（Username）：用于生成备份的账户的用户名。


    你将使用这些列来确切确定要还原哪些备份以及还原它们的顺序。幸运的是，`SSMS` 为你简化了这项工作。


    滚动到 `选择要还原的备份集:`（Select the backup sets to restore:）区域的底部。此区域列出的最后一项应该是事务日志备份。如果事务日志没有列在最后，请向上移动列表，或在时间上更早地找到最近的事务日志备份。勾选
    `还原`（Restore）复选框，并注意自上次差异备份以来的所有其他事务日志，以及最后一次差异备份都会被选中。这是因为 `SQL Server` 知道它需要首先还原完整备份，然后是差异备份，最后是事务日志，并按正确的时间顺序进行，才能成功将数据库还原到特定时间点。此时，你应该看到类似图
    7-5 所示的内容。


    ![A436605_1_En_7_Fig5_HTML.jpg](img/A436605_1_En_7_Fig5_HTML.jpg)


    图 7-5：选中了最后一个事务日志


    请注意，选中的选项是四个事务日志备份和一个差异备份，如 `类型`（Type）列所示。

