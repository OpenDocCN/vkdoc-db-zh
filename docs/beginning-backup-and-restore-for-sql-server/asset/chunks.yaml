  trans: '

    # 为备份解决方案添加差异备份


    为现有的备份解决方案添加差异备份，就像在现有解决方案中增加一个额外的步骤一样简单。差异备份的频率取决于多个因素；例如，您的数据库对事务数据的依赖程度、这些事务是否包含数据更改、事务日志备份的频率以及完整备份的频率。如您所见，这是一个相当复杂的主题，将在本书第三部分详细讨论；然而，为了简单起见，我们将使用前一节的场景作为基础，通过示例备份策略来突出在备份解决方案中包含差异备份所带来的差异。表
    2-1 展示了一个不含差异备份的简单备份策略的分解情况，表 2-2 则展示了包含差异备份的相同时间段。


    表 2-2

    包含差异备份的示例备份策略


    |   | 开始时间 | 频率 | 总文件数 (24 小时) |

    | --- | --- | --- | --- |

    | 完整备份 | 每 24 小时 | 每 24 小时 | 1 |

    | 差异备份 | 凌晨 3:01 | 每 3 小时 | 7 |

    | 事务日志备份 | 凌晨 12:15 | 每 30 分钟 | 48 |


    表 2-1

    不含差异备份的示例备份策略


    |   | 开始时间 | 频率 | 总文件数 (24 小时) |

    | --- | --- | --- | --- |

    | 完整备份 | 每 24 小时 | 每 24 小时 | 1 |

    | 事务日志备份 | 凌晨 12:30 | 每 30 分钟 | 47 |


    正如我之前强调的，在备份策略中添加差异备份会以磁盘空间为代价来降低风险。让我们使用前面两个解决方案，比较一下文件数量和数据丢失情况。


    表 2-3 对前面详述的两个基本备份解决方案进行了比较。此表比较了将数据库恢复到可能的最晚时间点所需的文件数量，同时还给出了数据丢失的分钟数。


    表 2-3

    恢复所需文件数


    | 不含差异备份的备份方案 |

    | --- |

    | 停机时间 | 完整文件数 | 差异文件数 | 事务日志文件数 | 总文件数 | 数据丢失 (分钟) |

    | --- | --- | --- | --- | --- | --- |

    | 凌晨 2:00 | 1 | 0 | 3 | 4 | 29 |

    | 早上 6:00 | 1 | 0 | 11 | 12 | 29 |

    | 中午 12:30 | 1 | 0 | 24 | 25 | 29 |

    | 晚上 11:57 | 1 | 0 | 47 | 48 | 26 |

    | 包含差异备份的备份方案 |

    | 停机时间 | 完整文件数 | 差异文件数 | 事务日志文件数 | 总文件数 | 数据丢失 (分钟) |

    | 凌晨 2:00 | 1 | 0 | 4 | 5 | 15 |

    | 早上 6:00 | 1 | 1 | 6 | 8 | 15 |

    | 中午 12:30 | 1 | 1 | 1 | 3 | 15 |

    | 晚上 11:57 | 1 | 1 | 6 | 8 | 12 |


    如您所见，通过在备份解决方案中加入差异备份，所需文件数量永远不会超过八个（一个完整备份，一个差异备份和六个事务日志备份）。因此，一天晚些时候发生的停机，其恢复所需文件将减少
    83%，从而显著降低您的总体风险。


    需要重点注意的是，如果此时某个差异备份损坏，我们仍然可以使用事务日志恢复到相同的时间点。


    # 为差异备份做准备


    继续使用我们在第 1 章创建的数据库 `backrecTestDB`，让我们为差异备份做准备。由于这是一个测试数据库，并且已经很长时间没有数据变更，现在立即启动差异备份效果甚微。它只会创建一个
    1KB 的可恢复备份文件；然而，出于测试目的，这用处不大。因此，我们改为创建一个快速脚本，用于创建一个新表并复制几行数据进去。


    可以通过运行以下脚本创建新表：


    ```sql

    SELECT TOP 500000 * INTO [users_DiffTestData]

    FROM [users1]

    ```


    脚本完成后，您应该看到以下输出：


    ```

    (500000 row(s) affected)

    ```


    最后，我们要做的最后一件事是验证我们创建的表是否正确。当然，我们本可以在 `SELECT INTO` 脚本中指定数据库；然而，对于本次测试，我更愿意我们手动检查。


    在对象资源管理器面板中，右键单击 `backrecTestDB` 并选择 `刷新`。接下来，展开数据库，然后展开表。您应该看到列出了三个表，如图 2-3 所示。


    ![A436605_1_En_2_Fig3_HTML.jpg](img/A436605_1_En_2_Fig3_HTML.jpg)

    图 2-3

    对象资源管理器显示表

    注意


    上一步假设您遵循了第 1 章的步骤：创建了测试数据库，构建了表并插入了数据，并进行了完整备份。如果跳过了其中任何步骤，您必须返回第 1 章并完成它们，然后才能运行上述脚本。


    一旦此脚本完成，并且我们已确认新表存在，我们就准备好启动差异备份了。


    # 执行差异备份


    与微软世界中的大多数事情一样，有多种方法可以执行差异备份。如果备份是您备份策略的一部分，差异备份的执行将是解决方案的一部分（例如，SQL 维护计划的一部分或一个独立的
    `SQL Server Agent` 作业）。如果您是手动执行备份，则可以从 `SQL Server Management Studio (SSMS)` 的
    `GUI` 中启动它，使用 `T-SQL` 编写脚本，甚至使用 `PowerShell` 来启动备份。


    在本章中，我将引导您使用 `SSMS` 中的 `GUI` 和 `T-SQL`。两种情况下的最终结果是相同的：我们将成功生成一个可以恢复到数据库的差异备份。在这里使用
    `PowerShell` 会是个好主意；然而，这本身就是一个值得更多关注的独立主题。


    ## 通过 SSMS 的 GUI 进行备份


    通过 `SSMS` 的 `GUI` 进行差异备份与进行完整备份完全相同。因此，我不会介绍 `GUI` 中的所有选项；只介绍将备份从完整类型更改为差异类型所需的不同之处。


    差异备份可以通过六个简单的步骤完成：


    *   右键单击 `backrecTestDB`

    *   将鼠标悬停在 `任务` 上，然后单击 `备份…`

    *   在 `常规` 屏幕上，单击 `备份类型` 下拉菜单并选择 `差异`

    *   在 `目标` 下，单击 `删除`，然后单击 `添加`

    *   在 `文件名` 文本框中，输入 `“E:\SQL Server\Backup\backrecTestDB_diff.bak”` 并单击 `确定`

    *   返回 `常规` 选项卡，单击 `确定`


    图 2-4 显示了为差异备份集配置正确的备份 `常规` 选项卡。


    ![A436605_1_En_2_Fig4_HTML.jpg](img/A436605_1_En_2_Fig4_HTML.jpg)

    图 2-4

    差异备份设置


    按下最后一个 `确定` 后，您将在 `“备份数据库”` 窗口的左下角看到一个进度百分比。因为我们只向新表复制了 500,000 行数据，所以备份将在几秒钟内完成。将弹出一个完成窗口，确认备份成功，如图
    2-5 所示。


    ![A436605_1_En_2_Fig5_HTML.jpg](img/A436605_1_En_2_Fig5_HTML.jpg)

    图 2-5

    备份完成窗口

