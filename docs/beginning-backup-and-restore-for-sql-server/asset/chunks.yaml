    \ after this log was restored, but in this case, that is the end of the data that\
    \ needed to be restored. In a real-world scenario, you would have a specific time\
    \ of day that you would need to restore data to so keep in mind that you may need\
    \ to restore more logs than are shown in the example. Simply rewrite the script\
    \ for the transaction log restores that you need.\n\nWith these instructions in\
    \ mind, a good restore script can be pieced together as shown in Listing [8-2](#A436605_1_En_8_Chapter.html#Par35).\n\
    \n```\n-- switch to master database\nUSE master\nGO\n-- backup the tail of the\
    \ log\nBACKUP LOG backrecTestDB\nTO DISK = 'E:\\SQL Server\\Logs\\backrecTestDB_TLOG_TAIL.bak'\n\
    WITH NORECOVERY;\nGO\n-- restore the Full backup\nRESTORE DATABASE backrecTestDB\
    \ FROM DISK = 'E:\\SQL Server\\Backup\\backrecTestDB_backup_2017_10_16_000002_2492163.bak'\n\
    WITH NORECOVERY;\nGO\n-- restore the Differential backup\nRESTORE DATABASE backrecTestDB\
    \ FROM DISK = 'E:\\SQL Server\\Backup\\backrecTestDB_backup_2017_10_16_180001_7394135.bak'\n\
    WITH NORECOVERY;\nGO\n-- restore the Transaction Log backups\nRESTORE LOG backrecTestDB\
    \ FROM DISK = 'E:\\SQL Server\\Logs\\backrecTestDB_backup_2017_10_16_190004_6842741.trn'\n\
    WITH NORECOVERY;\nGO\nRESTORE LOG backrecTestDB FROM DISK = 'E:\\SQL Server\\\
    Logs\\backrecTestDB_backup_2017_10_16_200001_9609626.trn'\nWITH NORECOVERY;\n\
    GO\nRESTORE DATABASE backrecTestDB WITH RECOVERY;\nGO\nListing 8-2\nRestore Script\n\
    ```\n\nOnce you have run the script shown in Listing [8-2](#A436605_1_En_8_Chapter.html#Par35),\
    \ you can always run the script shown in Listing [8-3](#A436605_1_En_8_Chapter.html#Par37)\
    \ to verify that your database is back online.\n\n```\nSELECT databasepropertyex\
    \ ('backrecTestDB', 'Status');\nListing 8-3\nDatabase Status Verification\n```\n\
    \nThat should return just the value ONLINE in the Results page of SSMS. Once you\
    \ see this, then you can be assured that everything has been restored successfully\
    \ and your database is running smoothly."
  trans: "\n## 使用 T-SQL 完成数据库完整恢复\n\n回想一下，由于我们是在完整恢复模型下工作，因此拥有更多用于备份和恢复数据的功能可供使用。特别是，我们能根据当前情况，对需要恢复的数据量进行精细控制。完整恢复模型允许我们在需要时恢复整个数据库，更重要的是，正如我们在第\
    \ 5 章所见，它可以恢复到特定时间点。\n\n在完整恢复模型下恢复数据库时，需要遵循一组基本操作步骤。通用步骤如清单 8-1 所示。\n\n### 清单\
    \ 8-1. 数据库恢复操作步骤\n\n*   切换到 master 数据库。\n*   使用 `BACKUP LOG backrecTestDB TO DISK\
    \ = 'E:\\SQL Server\\Logs\\backrecTestDB_TLOG_TAIL.bak' WITH NORECOVERY;` 创建尾日志备份。\n\
    \    *   SSMS 响应：`为数据库 'backrecTestDB' 的文件 'backrecTestDB_log' 处理了 18 页。BACKUP\
    \ LOG 成功处理了 18 页，耗时 0.069 秒（1.981 MB/秒）。`\n*   使用 `RESTORE DATABASE backrecTestDB\
    \ FROM DISK = 'E:\\SQL Server\\Backup\\backrecTestDB_FULL.BAK' WITH NORECOVERY;`\
    \ 恢复最新的完整备份。\n    *   SSMS 响应：`为数据库 'backrecTestDB' 的文件 'backrecTestDB' 处理了 107968\
    \ 页。为数据库 'backrecTestDB' 的文件 'backrecTestDB_log' 处理了 2 页。RESTORE DATABASE 成功处理了\
    \ 107970 页，耗时 21.669 秒（38.927 MB/秒）。`\n*   使用 `RESTORE DATABASE backrecTestDB\
    \ FROM DISK = 'E:\\SQL Server\\Backup\\backrecTestDB_DIFF.BAK' WITH NORECOVERY;`\
    \ 恢复最新的差异备份。\n    *   SSMS 响应：`为数据库 'backrecTestDB' 的文件 'backrecTestDB' 处理了 136\
    \ 页。为数据库 'backrecTestDB' 的文件 'backrecTestDB_log' 处理了 2 页。RESTORE DATABASE 成功处理了\
    \ 138 页，耗时 0.283 秒（3.795 MB/秒）。`\n*   使用 `RESTORE LOG backrecTestDB FROM DISK\
    \ = 'E:\\SQL Server\\Logs\\backrecTestDB_backup_2017_10_16_190004_6842741.trn'\
    \ WITH NORECOVERY;` 恢复自最新差异备份以来最早的事务日志备份。\n    *   SSMS 响应：`为数据库 'backrecTestDB'\
    \ 的文件 'backrecTestDB' 处理了 0 页。为数据库 'backrecTestDB' 的文件 'backrecTestDB_log' 处理了\
    \ 16 页。RESTORE LOG 成功处理了 16 页，耗时 0.059 秒（2.118 MB/秒）。`\n*   继续恢复事务日志备份，直至恢复到故障发生点。\n\
    \    *   SSMS 响应：`为数据库 'backrecTestDB' 的文件 'backrecTestDB' 处理了 0 页。为数据库 'backrecTestDB'\
    \ 的文件 'backrecTestDB_log' 处理了 8 页。RESTORE LOG 成功处理了 8 页，耗时 0.047 秒（1.329 MB/秒）。`\n\
    *   使用 `RESTORE DATABASE backrecTestDB WITH RECOVERY;` 恢复数据库。\n    *   SSMS 响应：`RESTORE\
    \ DATABASE 成功处理了 0 页，耗时 0.873 秒（0.000 MB/秒）。`\n\n请注意，我在这些命令的 `DISK` 属性中使用了虚构的名称。这样做是为了让您更容易理解我在一组备份中要查找的是哪个备份。\n\
    \n如果您注意清单 8-1 中的 SSMS 响应要点，在事务日志恢复部分，我在恢复差异备份之后恢复了第一个日志，然后恢复了之后的下一个日志，此时我收到了处理了\
    \ `0` 页的消息，这意味着我已经到达了适用事务日志的末尾。在此日志恢复后，可能还有更多需要恢复的日志，但在本例中，这就是需要恢复的数据的终点。在实际场景中，您可能需要在一天中的特定时间恢复数据，因此请记住，您可能需要恢复比本示例所示更多的日志。只需为您需要的事务日志恢复重写脚本即可。\n\
    \n考虑到这些操作步骤，可以组合出一个良好的恢复脚本，如清单 8-2 所示。\n\n### 清单 8-2. 恢复脚本\n\n```sql\n-- 切换到 master\
    \ 数据库\nUSE master\nGO\n-- 备份日志尾部\nBACKUP LOG backrecTestDB\nTO DISK = 'E:\\SQL\
    \ Server\\Logs\\backrecTestDB_TLOG_TAIL.bak'\nWITH NORECOVERY;\nGO\n-- 恢复完整备份\n\
    RESTORE DATABASE backrecTestDB FROM DISK = 'E:\\SQL Server\\Backup\\backrecTestDB_backup_2017_10_16_000002_2492163.bak'\n\
    WITH NORECOVERY;\nGO\n-- 恢复差异备份\nRESTORE DATABASE backrecTestDB FROM DISK = 'E:\\\
    SQL Server\\Backup\\backrecTestDB_backup_2017_10_16_180001_7394135.bak'\nWITH\
    \ NORECOVERY;\nGO\n-- 恢复事务日志备份\nRESTORE LOG backrecTestDB FROM DISK = 'E:\\SQL\
    \ Server\\Logs\\backrecTestDB_backup_2017_10_16_190004_6842741.trn'\nWITH NORECOVERY;\n\
    GO\nRESTORE LOG backrecTestDB FROM DISK = 'E:\\SQL Server\\Logs\\backrecTestDB_backup_2017_10_16_200001_9609626.trn'\n\
    WITH NORECOVERY;\nGO\nRESTORE DATABASE backrecTestDB WITH RECOVERY;\nGO\n```\n\
    \n运行清单 8-2 所示的脚本后，您始终可以运行清单 8-3 所示的脚本来验证您的数据库是否已重新联机。\n\n### 清单 8-3. 数据库状态验证\n\
    \n```sql\nSELECT databasepropertyex ('backrecTestDB', 'Status');\n```\n\n这应该在\
    \ SSMS 的结果窗格中仅返回值 `ONLINE`。一旦看到这个，您就可以放心，所有内容都已成功恢复，并且您的数据库正在平稳运行。\n"
- fmt: '## Complete Database Restore Using SSMS


    The process for restoring a database using SSMS is exactly the same as using T-SQL;
    we just aren’t going to write the code to do it. We are going to let the interface
    do the work for us.


    Figure 8-1 shows what my tables look like in Object Explorer pane before we do
    anything.


    ![A436605_1_En_8_Fig1_HTML.jpg](A436605_1_En_8_Fig1_HTML.jpg)


    Figure 8-1. Current tables


    What we want to do is create a situation where I need to restore the entire database,
    and then walk through the process of restoring the backups in order from full
    to differential to transaction logs. A fun way to do this is to just drop a table
    or two. That’s pretty much a great reason to run a restore operation, right? When
    you’re ready, first verify that you have a current set of database backups that
    you can definitely restore from. Next, right-click a table or two and select Delete.
    This window is shown in Figure 8-2.


    ![A436605_1_En_8_Fig2_HTML.jpg](A436605_1_En_8_Fig2_HTML.jpg)


    Figure 8-2. Delete Object window


    There is only the one tab labeled General in this window. In the center pane,
    we can see that I have selected the `users1` table to be deleted. When ready,
    just click OK and the table will be deleted.


    Notice how my Object Explorer window no longer shows the `users1` table, and I
    cannot query the table as well. Figure 8-3 shows my updated Object Explorer.


    ![A436605_1_En_8_Fig3_HTML.jpg](A436605_1_En_8_Fig3_HTML.jpg)


    Figure 8-3. Object Explorer, updated


    ### Restore Sequence


    We are going to use the same sequence of events as when we restored using T-SQL.
    That sequence is shown in Listing 8-1 and an abbreviated version is repeated in
    Listing 8-4.


    ```

    Listing 8-4. Restore Sequence

    *   Switch to the master database

    *   Create a tail-log backup

    *   Restore the latest full backup

    *   Restore the latest differential backup

    *   Restore the oldest transaction log backup from the latest differential backup

    *   Continue restoring transaction log backups until you recover to the point
    of failure

    *   Recover the database

    ```


    Note that I have left out the specific SQL statements, since we won’t need them
    in SSMS.


    ### Connecting to the master Database


    We need to connect to the `master` database to continue. We can either open a
    New Query window and select `master` from the Available Databases menu (or press
    Ctrl+U and the up and down arrow keys), or we can verify that we are connecting
    to the `master` database when we log in. If you are not connecting to `master`
    when you log in, you probably should consider changing. You can change your default
    database in the Connect to Server dialog shown in Figure 8-4.


    ![A436605_1_En_8_Fig4_HTML.jpg](A436605_1_En_8_Fig4_HTML.jpg)


    Figure 8-4. Connect to Server


    Click the Options ➤ button and you will get an expanded interface, as shown in
    Figure 8-5.


    ![A436605_1_En_8_Fig5_HTML.jpg](A436605_1_En_8_Fig5_HTML.jpg)


    Figure 8-5. Connect to server, expanded


    Pull down the drop-down menu next to Connect to database and select Browse server.
    A brief message pops up asking to connect to the server, so click the Yes button
    when you see this message. You are then shown the Browse Server for Database window,
    as shown in Figure 8-6.


    ![A436605_1_En_8_Fig6_HTML.jpg](A436605_1_En_8_Fig6_HTML.jpg)


    Figure 8-6. Browse Server for Database


    All we need to do here is select `master` and click OK, and `master` then shows
    instead of default in the Connect to Server window. Figure 8-7 shows my updated
    interface after choosing `master`.


    ![A436605_1_En_8_Fig7_HTML.jpg](A436605_1_En_8_Fig7_HTML.jpg)


    Figure 8-7. Connect to Server, updated


    I have kept the rest of values in this and the other tabs at their default values.
    Once I press connect, I am then connected to the `master` database by default.'
