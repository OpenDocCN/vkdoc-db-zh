  trans: '

    ### 步骤选项卡


    此选项卡在作业步骤列表区域中已经存在事务日志备份作业。不过我们需要更新此作业，因此请双击作业名称，然后单击“高级”选项卡。图 11-11 显示了更新后的“高级”选项卡；请注意，“常规”选项卡是默认界面，但我们无需在此选项卡上更新任何内容。


    ![A436605_1_En_11_Fig11_HTML.jpg](img/A436605_1_En_11_Fig11_HTML.jpg)


    图 11-11


    作业步骤属性，高级选项卡


    在此选项卡上，我勾选了底部的三个复选框以启用日志记录和历史步骤信息的收集。此屏幕中的其他所有设置保持不变，因此单击“确定”继续。您将最终返回到“步骤”选项卡的默认视图。


    由于我们不打算配置“计划”和“警报”选项卡，因此可以跳过它们。接下来，请单击“通知”选项卡继续。


    ### 通知选项卡


    此选项卡中默认选中的选项是写入 `Windows 应用程序事件日志`。这是一个好的开始，但我们希望在作业失败时通过电子邮件收到通知。为此，请选中“电子邮件”复选框，然后选择操作员（该操作员应已预先设置好）。图
    11-12 显示了“通知”选项卡更新后的界面。


    ![A436605_1_En_11_Fig12_HTML.jpg](img/A436605_1_En_11_Fig12_HTML.jpg)


    图 11-12


    作业属性，通知选项卡


    如此设置此选项卡后，如果作业失败，我们将通过电子邮件收到通知，同时信息也会记录到 `Windows 应用程序事件日志`中。这将完成本节配置，因此请继续并按“确定”按钮继续。我们将返回到主舞台，已完成的维护计划就位于此舞台中。现在请将您的工作保存到维护计划中。


    ## 测试事务日志备份计划


    要测试事务日志备份计划，我们需要右键单击 `Backup Plan.Transaction Log Backup Job`，然后选择 `在步骤启动作业…`
    来触发该作业。它的运行时间应该非常短，然后会显示一个类似图 11-13 所示的完成状态窗口。


    ![A436605_1_En_11_Fig13_HTML.jpg](img/A436605_1_En_11_Fig13_HTML.jpg)


    图 11-13


    成功启动作业


    事务日志中实际上没有太多需要备份的内容，这就是为什么它的运行时间非常短。一旦看到如图 11-13 所示的屏幕，您就可以放心地认为，备份计划维护计划中的事务日志备份部分已经正确配置。通过检查您的备份文件夹（我的是
    `E:\SQL Server\Backup\backrecTestDB`）中是否存在 `.trn` 文件来验证备份是否已创建。如果文件位于该位置，那么您就完成了。如果没有，则可能需要返回本章的第一部分，验证您是否将事务日志备份创建到了正确的目录。


    ## 在 SSMS 中进行事务日志恢复


    我们将在 `SSMS` 中使用 `SQL Server Agent` 来创建事务日志 `还原` 计划，就像我们在第 9 章介绍的完整 `还原` 计划和第 10
    章介绍的差异 `还原` 计划一样。不过，对于事务日志还原，我们将遵循稍有不同的操作说明。清单 11-2 将详细说明我们需要采取的步骤，以确保我们的事务日志
    `还原` 计划能够正确执行。


    清单 11-2. 还原数据的结构


    *   创建一个可跟踪的数据轨迹，以便我们知道还原了哪些数据

    *   运行 `Backup Plan.Transaction Log Backup` `SQL Server Agent` 作业

    *   复制并重命名备份文件

    *   配置 `RESTORE DATABASE` 命令

    *   还原最近的完整备份

    *   还原最近的差异备份

    *   按顺序还原事务日志，直至所需的时间点


    在此场景中，我们需要先还原完整备份，然后是差异备份，最后按顺序还原事务日志备份。这将使我们能够还原所需的数据，这些数据包含在当前已备份的事务日志中。我们可以使用
    `T-SQL` 通过 `RESTORE DATABASE` 命令中的 `STOPAT` 属性来还原到特定时间点。我们将很快介绍此命令的语法。


    根据我在本书中一直强调的备份场景，请注意，鉴于我们每六小时执行一次差异备份，每个还原序列最多只需还原五个事务日志。因此，正如我们在清单 11-1 中指出的，当我们像上一节那样实施事务日志备份时，需要确保它们按照前面提到的顺序运行（即每小时整点运行一次事务日志备份）。利用此顺序，我们可以最多还原五个事务日志，而无需转到下一个按时间顺序的完整或差异备份进行还原。


    既然我们已经有了如何继续的计划，那么就开始创建这个计划吧。


    ### 创建测试数据


    我们要做的是对其中一个表进行一些更改，以便查看将数据库还原到某个时间点时会发生什么。为此，我们需要向 `users2` 表中插入一些假数据。清单 11-3
    展示了我们将用于实现此目的的 `T-SQL`。


    ```

    INSERT INTO users2

    SELECT TOP 1000 * FROM users2

    ```


    清单 11-3 创建测试数据


    运行清单 11-3 中的命令时，请密切关注时间，因为我们将在成功添加大量数据之前再运行几次相同的代码。这将确保我们能还原到正确的时间点。


    作为参考，运行清单 11-3 中的脚本之前，行数为 10000。运行一次脚本后，行数变为 11000。每次额外运行脚本都会使行数增加 1000 行，因此请确保您留意时间和最终的行数。当我完成记录插入时，我的
    `users2` 表中最终有 29000 条记录，比原来的 10000 条有所增加。不过，我只想要 16000 条记录，并且我知道我在晚上 9:22 时拥有这个数量的记录，因此我需要将我的事务日志还原到晚上
    9:22。


    ### 备份事务日志


    接下来，我们需要备份事务日志，以便我们刚刚执行的事务可供我们使用。撰写本文时的时间是晚上 9:30，因此我需要还原晚上 7:00、8:00 和 9:00 的事务日志，以及我们即将创建的那个事务日志。右键单击您的
    `Backup Plan.Transaction Log Restore` `SQL Server Agent` 作业，然后选择 `在步骤启动作业…` 来执行该作业。它运行了一秒钟，然后成功完成。完成后单击“关闭”按钮，您将返回到主
    `SSMS` 舞台。

