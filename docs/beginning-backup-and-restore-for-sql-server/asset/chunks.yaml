    # 从完整备份还原


    到本章此处为止，您可能已经对如何从完整备份还原数据库有了很好的了解。我认识的每一个 DBA 都曾不得不在某个时候运行还原操作，因此这应该不是什么新鲜事。万一这是新内容，本节不仅将介绍如何使用
    SSMS 和 T-SQL 从完整备份还原，还将介绍一些还原数据的要点，例如还原到日志备份中的特定点（称为时间点还原）。


    ## 使用 SSMS 执行完整还原


    还原数据库最常用的方法是使用与 SQL Server 最常关联的图形界面。SQL Server Management Studio 提供了大量可用于操作和管数据库的工具，因此它几乎是每位
    SQL Server 管理员的首选。请注意，我这里说的是“几乎”；因为任何规则都有明显的例外，这绝不是侮辱或嘲笑。例如，我曾见过 SQL Server 管理员使用旧版
    SSDT，因为他们获得了与数据库的（大部分）相同交互，并且额外获得了可用于编写 DTSX 包或任何他们需要增强界面来完成的任务的 Visual Studio
    界面。


    我们首先要做的就是找到最新的备份集。如果您像我一样设置了目录，那么它们位于 `E:\SQL Server\Backup`。


    接下来，启动 SSMS 并展开 `数据库`。在 `数据库` 菜单内，您将找到您的用户数据库，以及 `ReportServer` 和 `ReportServerTempDB`（如果您安装了
    SQL Server Reporting Services）。找到您要处理的数据库（本例中为 `backrecTestDB`），右键单击它，将鼠标悬停在 `任务`
    上，然后将鼠标悬停在 `还原` 上，并查看我们可用的选项。图 5-12 显示了此时的界面。


    ![A436605_1_En_5_Fig12_HTML.jpg](img/A436605_1_En_5_Fig12_HTML.jpg)


