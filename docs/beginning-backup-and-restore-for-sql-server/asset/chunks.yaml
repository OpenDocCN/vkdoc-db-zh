  trans: '

    ## 更新 SQL Server 代理作业


    现在维护计划已经设置完成，我们可以置之不理，让它正常运行。但是，SQL Server 代理作业需要进行更新。为什么呢？因为出于某些原因，该作业并不会继承维护计划的所有值，我们必须进入作业中手动补充填写这些作业值。希望在未来的
    SSMS 版本中这个问题能得到解决。


    在“对象资源管理器”中展开 SQL Server 代理菜单，然后展开“作业”。图 9-18 显示了此菜单项的位置。


    ![A436605_1_En_9_Fig18_HTML.jpg](img/A436605_1_En_9_Fig18_HTML.jpg)


    图 9-18

    SQL Server 代理、作业的位置


    请注意，这里有一个名为 `syspolicy_purge_history` 的默认作业。我们不需要它，所以它留在原处即可。我们关心的是名为 `Backup
    Plan.Subplan_1` 的作业。我们在图 9-14 的“子计划属性”窗口中更改了这个值，但它并未同步过滤到此区域，所以现在让我们来更新它。


    ### 常规选项卡


    双击作业名称，将出现“作业属性”窗口，如图 9-19 所示。此选项卡的目的是提供作业的顶层或“常规”设置。不过，不要认为这个区域不重要，因为如果填写不正确，可能会导致很多问题。例如，`启用`
    复选框需要保持选中状态，所有者需要保持为具有数据库权限的账户，或者是数据库属性窗口中的数据库所有者。


    注意：右键单击数据库名称并选择 `属性`。从这里，你可以查看数据库的所有者。请不要将其与 `dbo` 角色混淆。


    根据我的经验，这两个值需要匹配。如果不匹配，正如我所说，那么此值需要是一个对数据库有访问权限的用户。


    ![A436605_1_En_9_Fig19_HTML.jpg](img/A436605_1_En_9_Fig19_HTML.jpg)


    图 9-19

    “作业属性”窗口，常规选项卡


    如你所见，我们在前一节设置的一些选项并未传递到这个作业中，例如 `名称` 和描述。将 `名称` 字段更新为 `完整备份`，并输入简短描述以完成常规选项卡上的项目。请注意，`类别`
    选项可以下拉选择不同的选项。这样做的目的是允许你将不同的作业划分到不同的类别中，然后利用这些不同类别进行日志检查或报告。不过，它默认是 `数据库维护`，所以最好保持原样。


    当你对此区域的设置满意后，单击 `步骤` 选项卡。


    ### 步骤选项卡


    下一个选项卡（来自左侧窗格）是 `步骤`。图 9-20 显示了此页面的默认设置。


    ![A436605_1_En_9_Fig20_HTML.jpg](img/A436605_1_En_9_Fig20_HTML.jpg)


    图 9-20

    “作业属性”窗口，步骤选项卡


    如果此作业有多个步骤，它们将显示在这里。或者，我们也可以在此处添加一些超出我们之前创建的维护计划范围的作业。我们现在不想这样做，但这是你在制定自己的计划时，如果必要，可以考虑的一个选项。


    再次注意，名称不同了吗？所以，我们同样需要双击该行并更新那些值。图 9-21 显示了“作业步骤属性 – Subplan_1”窗口的初始值。


    #### 作业步骤属性 - Subplan_1 (常规选项卡)


    ![A436605_1_En_9_Fig21_HTML.jpg](img/A436605_1_En_9_Fig21_HTML.jpg)


    图 9-21

    “作业步骤属性 – Subplan_1”，常规选项卡


    在这个区域要非常小心。你可能会在此处对此作业和你的数据库造成严重损害。这个区域本质上允许你为创建此作业后将生成的 SSIS 包设置属性和值。


    清单 9-9 显示了此选项卡中的可用选项。


    清单 9-9. 作业步骤属性 - Subplan_1 选项

    '
- fmt: "*   `Step name`\n    *   步骤的名称。\n*   `Type`\n    *   正在创建的作业类型。这里面有很多选项与我们正在创建的内容完全无关，因此请确保不要更改任何内容。\n\
    *   `Run as`\n    *   用于执行该包的帐户。默认值始终是 `SQL Server Agent`，因为此帐户默认具有执行 SSIS 包的权限。\n\
    *   `Package`\n    *   此子选项卡允许定义基本的包特征，例如：\n        *   `Package source`\n   \
    \         *   包将创建的位置：`SQL Server`、`File System`、`SSIS Package Store` 或 `SSIS\
    \ Catalog`。\n        *   `Server`\n            *   用于部署 SSIS 包的目标服务器。\n      \
    \  *   `Log on to the server`\n            *   用于手动执行包的登录信息。\n        *   `Package`\n\
    \            *   保存包的默认位置。此值由在“包源”下拉菜单中选择的值确定。例如，不能为 `SQL Server` 选项指定 Windows\
    \ 文件夹位置，因为 `SQL Server` 选项期望包驻留在 `Maintenance Plans\\Backup Plan` 所示的 SQL Server\
    \ 逻辑树中。\n*   `Configurations`\n    *   如果有任何配置文件，将在此区域添加。\n*   `Command files`\n\
    \    *   如果有任何命令文件，将在此区域添加。\n*   `Data sources`\n    *   如果需要添加与当前数据源分离且不同的数据源，则可以在此处添加。\n\
    *   `Execution options`\n    *   根据所选选项，这些选项可在包执行前或执行期间使用。可用选项包括：\n        * \
    \  `Fail the package on validation warnings [DURING]`：在包执行时触发，以便在出现任何警告时使包失败。\n\
    \        *   `Validate package without executing [BEFORE]`：包将不会执行，仅进行验证。\n   \
    \     *   `Override MaxConcurrentExecutables property [BEFORE]`：此选项用于确保不会有过多的可执行文件争夺\
    \ CPU 时间。\n        *   `Enable package checkpoints [DURING]`：如果启用，包将在每个步骤发送状态更新。\n\
    \        *   `Use 32-bit runtime [BEFORE]`：此选项定义是否在 32 位运行时或默认的 64 位运行时中执行此包。\n\
    *   `Logging`\n    *   很多人甚至不知道的一个绝妙选项是此区域内置的日志记录功能。SSIS 有一个默认的日志提供程序，可用选项包括 SSIS\
    \ 日志提供程序，适用于：\n        *   `SSIS log provider for text files`\n        *   `SSIS\
    \ log provider for SQL Server`\n        *   `SSIS log provider for Windows event\
    \ log`\n        *   `SSIS log provider for SQL server profiler`\n        *   `SSIS\
    \ log provider for XML files`\n*   `Set values`\n    *   如果有任何要为包设置的值，可以在此处添加。\n\
    *   `Verification`\n    *   这有点像是对前面执行选项的延伸。此区域更多是从安全角度对包进行验证。这里的可用选项包括：\n   \
    \     *   `Execute only signed packages`\n        *   `Verify package build`\n\
    \        *   `Verify package ID`\n        *   `Verify version ID`\n*   `Command\
    \ line`\n    *   任何命令行选项都可以添加在这里，它们将在执行包的用户上下文中添加。请绝对确保，如果您更改了此区域，`Run as` 帐户必须具有执行此区域中指定命令的权限。\n\
    \n此处唯一需要更新的是 `Step name`（如果需要）。所有其他设置都已默认为我们所需的位置。更新了 `Step name` 值后，点击 `Advanced`\
    \ 选项卡。\n\n#### Job Step Properties - Subplan_1 (Advanced Tab)\n\n`Advanced` 选项卡包含报告和日志记录操作的选项。图\
    \ [9-22](#A436605_1_En_9_Chapter.html#Fig22) 显示了此区域的默认值，这些值对于我们的需求来说大部分是正确的。\n\
    \n![A436605_1_En_9_Fig22_HTML.jpg](A436605_1_En_9_Fig22_HTML.jpg)\n\n图 9-22\n\n\
    作业步骤属性 – Subplan_1，`Advanced` 选项卡\n\n请注意，默认选项正是您所期望的；当包成功执行时，它会以成功状态退出作业。如果失败，则以失败状态退出作业。让我们仔细看看这些选项及其真正含义。清单\
    \ [9-10](#A436605_1_En_9_Chapter.html#Par201) 详细分解了这些选项。\n\n清单 9-10. `Advanced`\
    \ 选项卡选项\n\n*   `On success action`\n    *   当步骤成功完成时，包应该做什么？这里的可用选项包括：\n     \
    \   *   `Go to the next step`\n            *   如果此包中还有另一个步骤，则执行该下一步。\n       \
    \ *   `Quit the job reporting success`\n            *   默认。\n        *   `Quit\
    \ the job reporting failure`\n            *   对成功执行的作业报告失败有点像是沟通不畅，所以我能想到这个选项的唯一用途是包执行本意是返回失败。\n\
    *   `Retry attempts`\n    *   此包允许的重试次数。\n*   `Retry interval (minutes)`\n   \
    \ *   包重试之间的等待时间。\n*   `On failure action`\n    *   与前面相同的选项，除了 `Quit the job\
    \ reporting success` 选项的逻辑是相反的。\n*   `Output file`\n    *   执行 SSIS 包时，会生成一个输出日志文件。可以在此处输入以供以后查看。\n\
    *   `Log to table`\n    *   选中此选项允许将包执行结果记录到 `msdb` 数据库中的 `sysjobstepslogs` 表。\n\
    *   `Include step output in history`\n    *   此选项允许在 SQL Server Agent 日志中更准确地记录包执行情况。\n\
    \n请注意，我之前说这些设置只是“大部分”正确。我们想要勾选 `Log to table` 和 `Include step output in history`\
    \ 复选框，这是我们在此处要做的唯一更改。图 [9-23](#A436605_1_En_9_Chapter.html#Fig23) 显示了此屏幕更新后的值，因此请更新您的屏幕，准备好后单击\
    \ `OK` 按钮关闭此窗口，保存设置，并返回到作业属性窗口。\n\n![A436605_1_En_9_Fig23_HTML.jpg](A436605_1_En_9_Fig23_HTML.jpg)\n\
    \n图 9-23\n\n作业步骤属性 – Subplan_1，`Advanced` 选项卡，已更新\n\n回到“作业属性”窗口后，我们可以看到作业的名称已更新。请注意，“起始步骤”值显示为\
    \ `Subplan_1` 而不是 `Full Backup`。原因是作业尚未保存，尽管这些值在此界面中显示。\n\n一旦我们在此屏幕上单击 `OK`，这些值将会更新。但我们暂时还不打算这么做，所以请继续点击左侧的\
    \ `Schedules` 选项卡。\n\n### Schedules Tab\n\n当您点击 `Schedules` 选项卡时，应该会看到一个空的界面；此区域中不应有计划。这很完美，因为我们是通过维护计划而不是\
    \ SSIS 包来安排此作业的。点击 `Alerts` 选项卡继续。\n\n### Alerts Tab\n\n我们没有为此作业设置任何警报，但如果您想拥有警报，可以在此处设置。此上下文中的警报意味着当发生错误或事件时\
    \ SQL Server 会提醒您。SQL Server 还可以生成数据库响应、通过电子邮件或寻呼任何操作员，甚至发送 `NET SEND` 消息。我们不会对此区域进行任何操作，因为我们将在下一个选项卡（巧合的是，标题为\
    \ `Notifications`）中处理此作业的通知。点击 `Notifications` 选项卡继续。"
  raw: "*   Step name\n    *   The name of the step.\n*   Type\n    *   The type of\
    \ job being created. There are quite a few options in here that have absolutely\
    \ nothing to do with what we are creating, so be sure to not change anything.\n\
    *   Run as\n    *   The account to use to execute the package. The default value\
    \ is always going to be SQL Server Agent because this account has permission to\
    \ execute SSIS packages by default.\n*   Package\n    *   This subtab lets you\
    \ define basic package characteristics, such as\n        *   Package source\n\
    \            *   Where the package will be created: SQL Server, File System, SSIS\
    \ Package Store, or SSIS Catalog.\n        *   Server\n            *   The target\
    \ server for the deployment of the SSIS package.\n        *   Log on to the server\n\
    \            *   Login information for manual execution of the package.\n    \
    \    *   Package\n            *   The default location for saving the package.\
    \ This value is determined by the value selected in the Package source drop-down\
    \ menu. For example, you cannot specify a Windows folder location and the SQL\
    \ Server option, because the SQL Server option expects the package to reside within\
    \ the SQL Server logical tree shown as Maintenance Plans\\Backup Plan.\n*   Configurations\n\
    \    *   If there are any configuration files, they would be added in this area.\n\
    *   Command files\n    *   If there are any command files, they would be added\
    \ in this area.\n*   Data sources\n    *   If a data source needs to be added\
    \ that is separate and distinct from the current data source, then it can be added\
    \ here.\n*   Execution options\n    *   Depending on the option selected, these\
    \ options can be available before or during package execution. The available options\
    \ are\n        *   Fail the package on validation warnings [DURING]: This will\
    \ fire when the package is executing in order to fail the package on any warnings.\n\
    \        *   Validate package without executing [BEFORE]: The package will not\
    \ execute, and only be validated.\n        *   Override MaxConcurrentExecutables\
    \ property [BEFORE]: This option is to make sure that too many executables aren’t\
    \ jockeying for CPU time.\n        *   Enable package checkpoints [DURING]: If\
    \ enabled, the package will send status updates at every step.\n        *   Use\
    \ 32-bit runtime [BEFORE]: This option defines whether or not to execute this\
    \ package in a 32-bit runtime or the default 64-bit runtime.\n*   Logging\n  \
    \  *   A fantastic option that a lot of people don’t even know about it the built-in\
    \ logging available in this area. SSIS has a default log provider, and those available\
    \ options are SSIS log provider for\n        *   SSIS log provider for text files\n\
    \        *   SSIS log provider for SQL Server\n        *   SSIS log provider for\
    \ Windows event log\n        *   SSIS log provider for SQL server profiler\n \
    \       *   SSIS log provider for XML files\n*   Set values\n    *   If you have\
    \ any values that you want to set for the package, you can add them here.\n* \
    \  Verification\n    *   This is sort of a step beyond the options in the preceding\
    \ execution options. This area is more for the verification of the package from\
    \ a security point of view. Available options in here are\n        *   Execute\
    \ only signed packages\n        *   Verify package build\n        *   Verify package\
    \ ID\n        *   Verify version ID\n*   Command line\n    *   Any command-line\
    \ options can be added here, and they will be added in the context of the user\
    \ executing the package. Make absolutely sure that if you change this area, the\
    \ Run as account has permission to execute the specified commands in this area.\n\
    \nThe only thing you want to update here is the Step name, if required. All of\
    \ the other settings are defaulted to where we need them to be. When you have\
    \ updated the Step name value, click the Advanced tab.\n\n#### Job Step Properties\
    \ - Subplan_1 (Advanced Tab)\n\nThe Advanced tab holds the options for the reporting\
    \ and logging actions. Figure [9-22](#A436605_1_En_9_Chapter.html#Fig22) shows\
    \ the default values in this area, which are mostly correct for what we need.\n\
    \n![A436605_1_En_9_Fig22_HTML.jpg](A436605_1_En_9_Fig22_HTML.jpg)\n\nFigure 9-22\n\
    \nJob Step Properties – Subplan_1, Advanced tab\n\nNotice that the default options\
    \ are exactly what you would expect; when the package executes successfully, it\
    \ quits the job reporting a success. If it fails, it quits the job reporting a\
    \ failure. Let’s take a closer look at these options and what they really mean.\
    \ Listing [9-10](#A436605_1_En_9_Chapter.html#Par201) breaks down these options.\n\
    \nListing 9-10. Advanced Tab Options\n\n*   On success action\n    *   When the\
    \ step completes successfully, what should the package do? Available options here\
    \ are\n        *   Go to the next step\n            *   If there is another step\
    \ in this package, go do that next step.\n        *   Quit the job reporting success\n\
    \            *   Default.\n        *   Quit the job reporting failure\n      \
    \      *   It’s sort of a matter of miscommunication to report a failure for a\
    \ successfully executed job, so the only thing I can think that this option would\
    \ be for would be if the package execution was intended to return a failure.\n\
    *   Retry attempts\n    *   The number of retry attempts that this package is\
    \ allowed.\n*   Retry interval (minutes)\n    *   The amount of time to wait in\
    \ between package retries.\n*   On failure action\n    *   Same options as previously,\
    \ except the logic for the Quit the job reporting success option is reversed.\n\
    *   Output file\n    *   When the SSIS package is executed, then an output log\
    \ file is generated. It can be entered here for later review.\n*   Log to table\n\
    \    *   Checking this option allows you to log the results of the package execution\
    \ to the `sysjobstepslogs` table in the `msdb` database.\n*   Include step output\
    \ in history\n    *   This option allows for greater accuracy in the SQL Server\
    \ Agent logs of package execution.\n\nNotice I said that these settings were only\
    \ mostly correct. We want to check the Log to table and Include step output in\
    \ history check boxes, and that’s the only change we want to make here. Figure\
    \ [9-23](#A436605_1_En_9_Chapter.html#Fig23) shows the updated values for this\
    \ screen, so update your screen and, when you’re ready, click the OK button to\
    \ close this window, save the settings, and return to the Job Properties window.\n\
    \n![A436605_1_En_9_Fig23_HTML.jpg](A436605_1_En_9_Fig23_HTML.jpg)\n\nFigure 9-23\n\
    \nJob Step Properties – Subplan_1, Advanced tab, updated\n\nOnce we get back to\
    \ the Job Properties window, we can see that the name of the job has been updated.\
    \ Note that the Start step value is shown as Subplan_1 and not Full Backup. The\
    \ reason for this is because the job hasn’t been saved yet, although the values\
    \ are shown in this interface.\n\nOnce we click OK on this screen, these values\
    \ will be updated. We aren’t going to do that yet though, so go ahead and click\
    \ the Schedules tab on the left.\n\n### Schedules Tab\n\nWhen you click the Schedules\
    \ tab, you should see an empty interface; there should not be a schedule in this\
    \ area. This is perfect, because we are scheduling this through the maintenance\
    \ plan and not the SSIS package. Click the Alerts tab to continue.\n\n### Alerts\
    \ Tab\n\nWe don’t have any alerts set up for this job, but if you would like to\
    \ have an alert, you can set it up here. An alert in this context means that SQL\
    \ Server will alert you when an error or event occurs. SQL Server can also generate\
    \ a response from the database, e-mail or page any Operators, and even send a\
    \ NET SEND message. We aren’t going to do anything to this area, because we are\
    \ going to handle the notifications for this job in the next tab, coincidentally\
    \ titled Notifications. Click the Notifications tab to continue."
