    \ sections."
  trans: "\n## 在 SSMS 中添加差异备份\n\n我们首先需要做的是打开维护计划进行编辑。在对象资源管理器中，展开 `Management` 菜单，然后双击\
    \ `Backup Plan`。这将打开维护计划，以便我们可以配置其中的任何选项。图 10-1 显示了打开维护计划时您应该看到的初始屏幕。\n\n![A436605_1_En_10_Fig1_HTML.jpg](img/A436605_1_En_10_Fig1_HTML.jpg)\n\
    \n图 10-1：备份计划主舞台\n\n我们需要打开 `Toolbox`，因此可以单击左侧的 `Toolbox` 浮动菜单，或者按 `Ctrl+Alt+X`\
    \ 来打开 `Toolbox`。接下来，我们要将另一个 `Back Up Database Task` 拖到主舞台上，位于现有 `Back Up Database\
    \ Task` 的右侧。图 10-2 显示了新任务的大致位置。\n\n![A436605_1_En_10_Fig2_HTML.jpg](img/A436605_1_En_10_Fig2_HTML.jpg)\n\
    \n图 10-2：新任务\n\n放在舞台上的任何位置都可以，但我把它放在那里是为了在脑海中将其区分为层次结构；左侧的项目是最高级别，右侧的项目是左侧项目的下一级别。\n\
    \n请注意，新任务上还有一个红色的 `X` 需要处理。我们在第 9 章中遇到过同样的情况，我们这次也将像当时那样处理。我们可以从双击刚刚放置的新任务开始，图\
    \ 10-3 显示了默认界面。\n\n![A436605_1_En_10_Fig3_HTML.jpg](img/A436605_1_En_10_Fig3_HTML.jpg)\n\
    \n图 10-3：`Back Up Database Task`，`General` 选项卡\n\n对于此区域，我们需要按照清单 10-1 所示进行设置，以配置此区域中的各种选项。\n\
    \n**清单 10-1. 待办事项列表**\n\n*   `Backup type`\n    *   我们必须从 `full`、`differential`\
    \ 或 `transaction log` 中选择。在本例中，我们将选择 `differential`。\n*   `Databases`\n    * \
    \  我们必须至少选择一个数据库。请注意，如果从备份类型选项中选择 `transaction log`，则 `simple` 恢复模型的数据库将被移除。在本例中，我们将选择我们一直在使用的数据库\
    \ `backrecTestDB`。\n*   `Backup component`\n    *   我们可以从 `database` 或 `files\
    \ and filegroups` 中选择。在本例中，我们将选择 `database`。\n*   `Back up to`\n    *   我们必须从\
    \ `disk`、`tape` 或 `URL` 中选择。在本例中，保持设置为 `disk`。\n\n请注意，这些设置与第 9 章中的设置几乎相同。我们所做的唯一更改是在\
    \ `Backup type` 字段中选择了 `differential` 而不是 `full`。您的屏幕现在应该如图 10-4 所示。\n\n![A436605_1_En_10_Fig4_HTML.jpg](img/A436605_1_En_10_Fig4_HTML.jpg)\n\
    \n图 10-4：`Back Up Database Task`，`General` 选项卡，已更新\n\n接下来，我们想单击窗口顶部的 `Destination`\
    \ 选项卡。确保选中 `Create a sub-directory for each database` 复选框，这就是我们对此选项卡需要做的全部。图 10-5\
    \ 显示了完成的界面。\n\n![A436605_1_En_10_Fig5_HTML.jpg](img/A436605_1_En_10_Fig5_HTML.jpg)\n\
    \n图 10-5：`Back Up Database Task`，`Destination` 选项卡\n\n接下来单击 `Options` 选项卡。再次强调，类似于自定义维护计划的\
    \ `Full Backup` 部分，我们将在此选项卡上选中 `Verify backup integrity` 和 `Perform checksum`\
    \ 复选框。图 10-6 显示了完成的界面。\n\n![A436605_1_En_10_Fig6_HTML.jpg](img/A436605_1_En_10_Fig6_HTML.jpg)\n\
    \n图 10-6：`Back Up Database Task`，`Options` 选项卡\n\n干得漂亮！信不信由你，这部分已经完成了。接下来，我们需要计划此部分的任务（此处巧妙引用了\
    \ Dan Fogelberg）。继续并单击 `OK` 按钮以添加此部分任务，并注意红色 `X` 已经消失了。但是，看到我们有两个任务在同一个舞台上吗？让我们更高效地操作。在舞台顶部，有一个标为\
    \ `Add Subplan` 的按钮。继续单击该按钮，您将看到如图 10-7 所示的内容。\n\n![A436605_1_En_10_Fig7_HTML.jpg](img/A436605_1_En_10_Fig7_HTML.jpg)\n\
    \n图 10-7：子计划属性\n\n将 `Name` 字段更改为 `Differential Backup`，并添加描述“这是备份维护计划的差异备份部分”。完成后单击\
    \ `OK`，您将看到更新后的界面，如图 10-8 所示。\n\n![A436605_1_En_10_Fig8_HTML.jpg](img/A436605_1_En_10_Fig8_HTML.jpg)\n\
    \n图 10-8：更新后的主舞台\n\n现在舞台上没有任何东西，因为尚未向子计划添加任何内容。单击屏幕顶部的 `Full Backup` 子计划，单击我们刚刚创建的子计划，按\
    \ `Ctrl+X` 剪切任务，再次选择 `Differential Backup` 子计划，单击舞台内部，然后按 `Ctrl+V` 粘贴任务。这将把整个任务从\
    \ `Full Backup` 子计划转移到 `Differential Backup` 子计划。图 10-9 显示了此时您的更新界面应有的样子。\n\n\
    ![A436605_1_En_10_Fig9_HTML.jpg](img/A436605_1_En_10_Fig9_HTML.jpg)\n\n图 10-9：更新后的主舞台\n\
    \n好了，我们已经将任务放在了正确的子计划中，它们各归其位。您也可以在此屏幕上长按文本 `Back Up Database Task 1` 来更改任务名称。我这样做了，并将任务标题简单地改为\
    \ `Differential Backup Task`。\n\n关于这部分，我发现一个有趣的地方是完整备份计划似乎没有被保留。回顾我们最初的备份计划，我们需要将完整备份计划设置为在上午\
    \ 12:00 运行，而我们的差异备份需要每六小时运行一次。\n\n## 计划差异备份\n\n在顶部区域选中 `Differential Backup` 子计划后，我们想单击菜单栏中的日历或\
    \ `Differential Backup` 行中的日历。无论您选择哪一个，都会打开相同的界面。图 10-10 显示了初始的 `New Job Schedule`\
    \ 窗口。\n\n![A436605_1_En_10_Fig10_HTML.jpg](img/A436605_1_En_10_Fig10_HTML.jpg)\n\
    \n图 10-10：新建作业计划\n\n我在第 9 章中详细解释了这些选项，因此这里不需要重复。相反，您应该将您的设置更新为如图 10-11 所示，即每天每六小时运行一次差异备份。\n\
    \n![A436605_1_En_10_Fig11_HTML.jpg](img/A436605_1_En_10_Fig11_HTML.jpg)\n\n图 10-11：新建作业计划，已更新\n\
    \n完成这些设置后，单击 `OK` 按钮。您的 `Schedule` 列将更改为计划的摘要，如图 10-11 的 `Description` 框所示。一旦回到主舞台，请保存您的工作，并注意我们有了新的\
    \ `SQL Server Agent` 作业名称，即使是我们之前已经保存过的项目也是如此。图 10-12 显示了此部分现在的样子。\n\n![A436605_1_En_10_Fig12_HTML.jpg](img/A436605_1_En_10_Fig12_HTML.jpg)\n\
    \n图 10-12：SQL Server Agent，已更新\n\n我们暂时保留给定的名称，但稍后会更改它们。\n\n请注意 `Full Restore`\
    \ 作业没有改变？这是因为我们是在 `SQL Server Agent` 中专门创建此作业的，而不是从维护计划舞台或界面创建的，因此此界面未参与 `SQL\
    \ Server Agent` 作业的命名过程。\n\n## 更新 SQL Server Agent 作业\n\n现在我们可以看到新的 `Differential\
    \ Backup` 作业，我们需要对其进行配置。我们将遵循作业的 `Full Backup` 部分中的大部分指示，但有一些细微的变化，如下节所述。\n"
- fmt: '### General Tab


    Nothing needs to be changed on this tab. We have the default settings that carried
    over from the maintenance plan portion of the job creation, so we can just use
    those for now. Figure [10-13](#A436605_1_En_10_Chapter.html#Fig13) shows the General
    tab with the default values.


    ![A436605_1_En_10_Fig13_HTML.jpg](A436605_1_En_10_Fig13_HTML.jpg)

    Figure 10-13 Job Properties, General tab


    Click the Steps menu option on the left to continue.


    ### Steps Tab


    The default settings for the Steps tab also are good (Figure [10-14](#A436605_1_En_10_Chapter.html#Fig14)).
    We can leave these alone, since they are how we need them to be set. Notice that
    we aren’t going to get into the specifics of the step at this point. If you need
    more explanation about the various options that this step can perform, then consult
    Chapter [9](#A436605_1_En_9_Chapter.html), where I detailed every single option
    inside this area.


    ![A436605_1_En_10_Fig14_HTML.jpg](A436605_1_En_10_Fig14_HTML.jpg)

    Figure 10-14 Job Properties, Steps tab


    Click the Schedules tab to continue.


    ### Schedules Tab


    This tab lets us set up the schedule for the job. Fortunately, this area is already
    set up as well! Figure [10-15](#A436605_1_En_10_Chapter.html#Fig15) shows the
    default settings for this screen.


    ![A436605_1_En_10_Fig15_HTML.jpg](A436605_1_En_10_Fig15_HTML.jpg)

    Figure 10-15 Job Properties, Schedules tab


    Click the Alerts tab to check those settings next.


    ### Alerts Tab


    This tab is blank, because we aren’t using any alerts for this job. Go ahead and
    skip over to the Notifications tab next.


    ### Notifications Tab


    Much like for the full backup plan, I want to be e-mailed if this plan ever fails.
    In order to accomplish that, I first need to have an Operator set up, and then
    I must have the notifications enabled and configured correctly in this area. Figure
    [10-16](#A436605_1_En_10_Chapter.html#Fig16) shows the updated values that should
    be present in your area.


    ![A436605_1_En_10_Fig16_HTML.jpg](A436605_1_En_10_Fig16_HTML.jpg)

    Figure 10-16 Job Properties, Notifications tab


    That is the conclusion to this section. We have successfully set up the Differential
    Backup job. Go ahead and click OK to continue with the next section.


    ## Testing the Differential Backup Plan


    Chapter [9](#A436605_1_En_9_Chapter.html) had us create the Full Backup plan,
    and then test it. If you followed along, your plan should have tested successfully
    as well. Next, we only want to run the Differential Backup portion of the plan,
    but before we get to that point, we need to determine the exit criteria for the
    plan. In this instance, Listing [10-2](#A436605_1_En_10_Chapter.html#Par44) details
    what we will be looking for as exit criteria.


    Listing 10-2. Exit Criteria

    *   Job starts correctly and without error

    *   Backup file is created in the correct location

    *   Notification sent if an error occurs

    *   Windows event log keeps a log of the backup operation

    *   Job exits correctly and without error


    With this in mind, go ahead and right-click the `Backup Plan.Differential Backup
    SQL Server Agent Job` (remember, we will change the names later) and choose `Start
    Job at Step…` to run the job. You can also open your file location, to verify
    that the file was written as expected, and also open up the Event Viewer so we
    can see if a new entry was added to the Windows event log.


    Eventually, a window appears as shown in Figure [10-17](#A436605_1_En_10_Chapter.html#Fig17),
    which shows us that our job was successful.


    ![A436605_1_En_10_Fig17_HTML.jpg](A436605_1_En_10_Fig17_HTML.jpg)

    Figure 10-17 Start Jobs success


    I also got an entry in the Application log of Windows Event Viewer, the details
    of which can be seen in Figure [10-18](#A436605_1_En_10_Chapter.html#Fig18).


    ![A436605_1_En_10_Fig18_HTML.jpg](A436605_1_En_10_Fig18_HTML.jpg)

    Figure 10-18 Event Properties


    I also checked the file location, and the new differential backup was created.
    We can therefore safely assume that the plan is working correctly.


    ## Differential Restore Plan in SSMS


    We are going to use SQL Server Agent to create the Differential Restore plan in
    SSMS, just like we did with the Full Restore plan we covered in Chapter [9](#A436605_1_En_9_Chapter.html).
    We are going to follow the same basic set of instructions, except where the type
    of restore is referenced. Listing [10-3](#A436605_1_En_10_Chapter.html#Par56)
    will detail the steps we need to take to ensure our Differential Restore plan
    executes correctly.


    The basic structure for how we plan to implement this is simple, as shown in Listing
    [9-12](#A436605_1_En_9_Chapter.html#Par259).


    Listing 10-3. Structure for Restoring Data

    *   Configure `RESTORE DATABASE` command(s)

    *   Create SQL Server Agent Job with T-SQL type

    *   Create a copy of the most recent differential backup since the last full backup
    and rename it `backrecTestDB_DIFFERENTIAL.bak`

    *   Restore data normally


    Now that we have a plan on how to move forward, let’s get started on creating
    this plan.


    ### T-SQL Restore Command


    In this instance, we are going to use the T-SQL command shown in Listing [10-4](#A436605_1_En_10_Chapter.html#Par63).


    ```sql

    RESTORE DATABASE backrecTestDB

    FROM DISK = N''E:\SQL Server\Backup\backrecTestDB_FULL.bak''

    WITH NORECOVERY, REPLACE;

    RESTORE DATABASE backrecTestDB

    FROM DISK = N''E:\SQL Server\Backup\backrecTestDB_DIFFERENTIAL.bak''

    WITH RECOVERY;

    ```

    Listing 10-4 `RESTORE DATABASE` Commands


    Recall that the `NORECOVERY` attribute lets us specify that we are restoring the
    last full backup and then the differential backup. We cannot restore a differential
    backup without first restoring the most recent full backup, so we need to run
    a full restore first, and then a differential restore. For this reason, we are
    including the full restore syntax shown in Listing [10-4](#A436605_1_En_10_Chapter.html#Par63)
    along with the differential restore syntax to restore the database correctly.
    Note that these two commands are separated by a semicolon; this denotes that we
    are going to use the commands in two separate SQL Server Agent job steps, as shown
    in the next section.'
