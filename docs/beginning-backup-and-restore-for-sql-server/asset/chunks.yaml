    That is all we need to do to configure this job. Click the OK button to save it
    and return to the main SSMS screen with the updated job shown in the Jobs submenu
    of SQL Server Agent. Figure [9-39](#A436605_1_En_9_Chapter.html#Fig39) shows this
    updated interface.


