  \ 菜单。从下拉列表中选择 `FileName` 变量。图 3-22 展示了变量映射菜单。点击 `OK` 完成设置。\n\n![A435478_1_En_3_Fig22_HTML.jpg](img/A435478_1_En_3_Fig22_HTML.jpg)\n\
