- '# 8. 构造 JSON


  欢迎阅读本书第二部分。第二部分将介绍 SQL Server 中的 JSON，该功能于 SQL Server 2016 引入。JSON 与 XML 有许多相似之处，但它们并不相同。JSON
  可以被视为 XML 的“无脂”版本。要运行第二部分的示例，请确保 SQL Server 2016 中的数据库兼容级别设置为 130。第二部分的示例数据库是 WideWorldImporters。请使用以下链接下载数据库：[`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0?utm_source=MyTechMantra.com`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0?utm_source=MyTechMantra.com)
  。


  ### 解决方案


  您可以为选择性 XML 索引添加或删除路径。清单 7-25 创建了我们之前在解决方案 7-5 中创建的演示表。它用 XML 数据填充该表，并在表上创建了一个选择性
  XML 索引。这是此解决方案的先决条件。


  ```sql

  -- These settings are important when creating a table with XML columns and XML indexes

  SET NUMERIC_ROUNDABORT OFF;

  SET ARITHABORT ON;

  SET ANSI_NULLS ON;

  SET ANSI_PADDING ON;

  SET ANSI_WARNINGS ON;

  SET CONCAT_NULL_YIELDS_NULL ON;

  SET QUOTED_IDENTIFIER ON;

  GO

  -- Drop table SQL Server 2016 syntax

  DROP TABLE IF EXISTS dbo.ProductXML

  -- Create demo table with an XML column

  CREATE TABLE dbo.ProductXML

  (

  ProductID INT NOT NULL,

  Name NVARCHAR(50) NOT NULL,

  ProductNumber NVARCHAR(25) NOT NULL,

  ProductDetails XML NULL

  CONSTRAINT PK_ProductXML_ProductID PRIMARY KEY CLUSTERED

  (

  ProductID ASC

  )

  );

  GO

  -- Populate table with sample XML data

  INSERT INTO dbo.ProductXML

  (

  ProductID,

  Name,

  Number,

  ProductDetails

  )

  SELECT Product2.ProductId,

  Product2.Name,

  Product2.ProductNumber,

  (

  SELECT ProductCategory.Name AS "Category/CategoryName",

  (

  SELECT DISTINCT Location.Name "text()", '', cost rate $'',

  Location.CostRate "text()"

  FROM Production.ProductInventory Inventory

  INNER JOIN Production.Location Location

  ON Inventory.LocationID = Location.LocationID

  WHERE Product.ProductID = Inventory.ProductID

  FOR XML PATH(''LocationName''), TYPE

  ) AS "Locations/node()",

  Subcategory.Name AS "Category/Subcategory/SubcategoryName",

  Product.Name AS "Category/Subcategory/Product/ProductName",

  Product.Color AS "Category/Subcategory/Product/Color",

  Inventory.Shelf AS "Category/Subcategory/Product/ProductLocation/Shelf",

  Inventory.Bin AS "Category/Subcategory/Product/ProductLocation/Bin",

  Inventory.Quantity AS "Category/Subcategory/Product/ProductLocation/Quantity"

  FROM Production.Product Product

  LEFT JOIN Production.ProductInventory Inventory

  ON Product.ProductID = Inventory.ProductID

  LEFT JOIN Production.ProductSubcategory Subcategory

  ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

  LEFT JOIN Production.ProductCategory

  ON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID

  WHERE Product.ProductID = Product2.ProductId

  ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name

  FOR XML PATH(''Categories''), ROOT(''Products''), ELEMENTS, TYPE

  )

  FROM Production.Product Product2;

  GO

  -- Create the selective XML index

  CREATE SELECTIVE XML INDEX IX_SELECTIVE_XML_ProductXML

  ON dbo.ProductXML

  (

  ProductDetails

  )

  FOR

  (

  Quantity = ''/Products/Categories/Category/Subcategory/Product/ProductLocation/Quantity'',

  ProductName = ''/Products/Categories/Category/Subcategory/Product/ProductName''

  );

  GO

  ```


  清单 7-25.

  创建带有选择性 XML 索引的演示表


  清单 7-26 演示了如何从此索引中移除 `Quantity` 路径并添加 `CategoryName` 路径。


  ```sql

  ALTER INDEX IX_SELECTIVE_XML_ProductXML

  ON dbo.ProductXML

  FOR

  (

  ADD CategoryName = ''/Products/Categories/Category/CategoryName'',

  REMOVE Quantity

  );

  ```


  清单 7-26.

  更改选择性 XML 索引


  ### 工作原理


  `ALTER INDEX` 语句可用于选择性 XML 索引来更改索引内容。可以使用 `REMOVE` 关键字删除现有路径，并可以在 `FOR()` 子句中使用
  `ADD` 关键字添加新路径，如清单 7-26 所示。您可以像在清单 7-26 中那样组合使用 `ADD` 和 `REMOVE` 关键字，也可以在单独的 `ALTER
  INDEX` 语句中发出，如清单 7-27 所示。


  ```sql

  ALTER INDEX IX_SELECTIVE_XML_ProductXML

  ON dbo.ProductXML

  FOR

  (

  ADD CategoryName = ''/Products/Categories/Category/CategoryName''

  );

  GO

  ALTER INDEX IX_SELECTIVE_XML_ProductXML

  ON ProductXML

  FOR

  (

  REMOVE Quantity

  );

  GO

  ```


  清单 7-27.

  使用单独的 `ALTER INDEX` 语句更改选择性索引


  每个 `ALTER INDEX` 语句都会重建整个索引。因此，出于效率考虑，在一个 `ALTER INDEX` 语句中实现更改列表比多次运行 `ALTER INDEX`
  语句更实用。


  要删除选择性 XML 索引，请使用 `DROP INDEX` 语句，如清单 7-28 所示。


  ```sql

  DROP INDEX IX_SELECTIVE_XML_ProductXML

  ON dbo.ProductModelXML;

  ```


  清单 7-28.

  删除选择性 XML 索引


  > **注意**

  >

  > 请记住，与主 XML 索引类似，当选择性 XML 索引被删除时，所有关联的辅助选择性 XML 索引也会自动被删除。


  ## 总结


  本章完成了本书的 XML 部分。我希望你从 XML 部分提供的解决方案中学到了很多。


  如果你实践了 XML 章节中的解决方案，那么你应该能够构建 XML、分解 XML 实例、从不同来源加载 XML 文档、通过 `XQuery` 语句利用基于 XML
  的搜索，以及创建 XML 索引。


  接下来的部分将介绍 JSON，并演示 SQL Server 2016 与新的 JSON 功能的集成。




  '
- '# JSON 简介


  JSON 是 "JavaScript Object Notation" 的首字母缩写，发音为 "Jason"。它旨在成为一种更易于解读和紧凑的解决方案，用于表示复杂的数据结构并促进系统间的数据交换。


  将 JSON 与 XML 比较时，选择 JSON 有许多优势：


  *   与 XML 不同，JSON 不使用完整的标记结构，这使其更紧凑。

  *   JSON 不是一种数据类型（至少对于 SQL Server 2016 而言）。SQL Server 将 JSON 表示为类似于 `nvarchar(max)`
  的字符串。Microsoft 建议将 JSON 存储为 `nvarchar(max)`。

  *   JSON 易于解析和构建。

  *   JSON 数据结构易于理解。

  *   JSON 是 NoSQL 数据库（如 CouchDB、MongoDB 等）的原生文件结构。


  JSON 模型格式有两个块：


  *   对象（Objects） - 用大括号 `{}` 包裹。一个空对象 `{}` 被视为有效的 JSON 数据。列表 8-1：`TopObject` 是一个对象块。

  *   数组（Arrays） - 用方括号 `[]` 包裹。一个空数组 `[]` 也被视为有效的 JSON 数据。列表 8-1：`arrayOfObjects`
  和 `arrayOfValues` 是数组块。


  ```

  {

  "TopObject": {

  "numericKey": 2016,

  "stringKey": "a text value",

  "nullKey": null,

  "booleanKey": true,

  "dateKey": "2017-11-14"

  },

  "arrayOfObjects": [

  {"item": 1},

  {"item": 2},

  {"item": 3}

  ] ,

  "arrayOfValues": [

  "SQL",

  "XML",

  "JSON"

  ]

  }

  清单 8-1.

  展示 JSON 结构

  ```


  一个 JSON 成员由一个键值对 `{"key": "value"}` 表示。成员的键必须包含在双引号内。键在对象的结构中必须是唯一的。成员的字符串类型和日期类型值需要包含在双引号内。布尔值和数值不应包含在双引号内。但是，当布尔值使用
  `true` 或 `false` 字面量时，这些值应为小写。表 8-1 演示了 SQL Server 数据类型与 JSON 之间的数据类型转换。


  带有前导零的数字被视为字符串。因此，它们必须包含在双引号内。对象的每个成员和数组的每个值后面都必须跟一个逗号，但最后一个键值对除外。


  表 8-1.


  展示从 SQL Server 到 JSON 的数据类型转换


  | 类别 | SQL 类型 | JSON 类型 |

  | --- | --- | --- |

  | `字符和字符串类型` | `nvarchar, varchar, nchar, char` | `string` |

  | `数值类型` | `int, bigint, float, decimal, numeric` | `number` |

  | `位类型` | `bit` | `Boolean (true or false)` |

  | `日期和时间类型` | `date, datetime, datetime2, time, datetimeoffset` | `string` |

  | `CLR 类型` | `geometry, geography (except hierarchyid)` | `不支持。这些类型会返回错误。将数据转换或转换为受支持的
  JSON 类型，或在 SELECT 列表中使用 CLR 属性或方法 – 例如，任何 CLR 类型的 `ToString()`，或 `geometry` 类型的
  `STAsText()`。数据类型 `hierarchyid` 不需要显式转换。` |

  | `其他类型` | `uniqueidentifier, money, varbinary, binary, timestamp, rowversion` |
  `string` |


  表 8-2 展示了 XML 和 JSON 数据及其解析方法的并排比较。


  表 8-2.


  比较 XML 和 JSON


  | XML 示例 | JSON 示例 |

  | --- | --- |

  | `<employees>` `<employee>` `<firstName>Bill</firstName>` `<lastName>Adams</lastName>`
  `</employee>` `<employee>` `<firstName>John</firstName>` `<lastName>Smith</lastName>`
  `</employee>` `<employee>` `<firstName>Peter</firstName>` `<lastName>White</lastName>`
  `</employee>` `</employees>` | `{"employees":` `[` `{"firstName":"Bill", "lastName":"Adams"},`
  `{"firstName":"John", "lastName":"Smith"},` `{"firstName":"Peter", "lastName":"White"}`
  `]` `}` |

  | `XML 解析方法` | `JSON 解析方法` |

  | `Declare @x XML =` `''<employees>` `<employee>` `<firstName>Bill</firstName>`
  `<lastName>Adams</lastName>` `</employee>` `<employee>` `<firstName>John</firstName>`
  `<lastName>Smith</lastName>` `</employee>` `<employee>` `<firstName>Peter</firstName>`
  `<lastName>White</lastName>` `</employee>` `</employees>'';` `SELECT` `c.value(''firstName[1]'',
  ''varchar(30)'')  AS firstName` `,c.value(''lastName[1]'', ''varchar(30)'') AS lastName`
  `FROM @x.nodes(''//employee'') t(c);` | `declare @j nvarchar(max) =` `''{"employees":`
  `[` `{"firstName":"Bill", "lastName":"Adams"},` `{"firstName":"John", "lastName":"Smith"},`
  `{"firstName":"Peter", "lastName":"White"}` `]` `}'';` `SELECT firstName, lastName`
  `FROM OPENJSON (@j, ''$.employees'')` `WITH` `(` `firstName varchar(30),` `lastName
  varchar(30)` `);` |

  | `XML 结果` | `JSON 结果` |

  | ![A435478_1_En_8_Figa_HTML.jpg](img/A435478_1_En_8_Figa_HTML.jpg) | ![A435478_1_En_8_Figb_HTML.jpg](img/A435478_1_En_8_Figb_HTML.jpg)
  |


  SQL Server 提供了四个内置函数和 `SELECT` 查询的 `FOR JSON` 子句来处理和创建 JSON 文档，如表 8-3 所示。


  与 XML 方法不同，JSON 函数不区分键（key）。但是，当在 JSON 函数以及 `ToString()` 和 `STAsText()` CLR 函数中引用时，键成员仍然是区分大小写的。


  表 8-3.


  描述 JSON 内置函数


  | JSON 过程 | 过程类型 | 描述 |

  | --- | --- | --- |

  | `FOR JSON` | 子句 | 构建 JSON 文档。 |

  | `ISJSON()` | 函数 | 验证字符串是否具有有效的 JSON。 |

  | `JSON_VALUE()` | 函数 | 从 JSON 文档中检索标量值。 |

  | `JSON_QUERY()` | 函数 | 从 JSON 文档中检索对象或数组。 |

  | `JSON_MODIFY()` | 函数 | 修改 JSON 文档。 |

  | `OPENJSON()` | 表值函数 | 将 JSON 文档转换为包含行和列的表格式。 |


  本书第二部分提供了适用于 SQL Server 的 JSON 食谱。


  ## 8-1. 使用 AUTO 模式构建 JSON


  ### 问题


  你想要自动构建 JSON 格式的结果。


  ### 解决方案


  `FOR JSON` 子句的 `AUTO` 模式返回 JSON 格式的行。清单 8-2 展示了一个来自单个对象的 `FOR JSON` 子句的 `AUTO` 模式。图
  8-1 显示了一个返回的 JSON 行。清单 8-3 展示了来自查询结果的格式化 JSON。


  ![A435478_1_En_8_Fig1_HTML.jpg](img/A435478_1_En_8_Fig1_HTML.jpg)


  图 8-1.


  在网格中显示 JSON 结果


  ```

  SELECT TOP (2) CustomerName

  ,PrimaryContact

  ,AlternateContact

  ,PhoneNumber

  FROM WideWorldImporters.Website.Customers

  FOR JSON AUTO;

  清单 8-2.

  显示

  ```


  ```

  [

  {

  "CustomerName":"Tailspin Toys (Head Office)",

  "PrimaryContact":"Waldemar Fisar",

  "AlternateContact":"Laimonis Berzins",

  "PhoneNumber":"(308) 555-0100"

  },

  {

  "CustomerName":"Tailspin Toys (Sylvanite, MT)",

  "PrimaryContact":"Lorena Cindric",

  "AlternateContact":"Hung Van Groesen",

  "PhoneNumber":"(406) 555-0100"

  }

  ]

  清单 8-3.

  显示格式化的 JSON 结果

  ```



  ### 工作原理


  `FOR JSON`子句在`AUTO`模式下会将输出格式化为 JSON 结果集。`AUTO`模式会根据`FROM`和`SELECT`子句中涉及的表（或多张表）自动确定
  JSON 格式。清单 8-3 返回了一个简单的 JSON 输出，因为其结果基于单一的`Website.Customers`表。默认情况下，结果在 SSMS 网格中显示为超链接。用户点击结果时，JSON
  会在 XML 编辑器中打开。然而，结果将以未格式化的单行字符串形式加载。图 8-2 展示了在 XML 编辑器中未格式化的结果。


  ![A435478_1_En_8_Fig2_HTML.jpg](img/A435478_1_En_8_Fig2_HTML.jpg)


  图 8-2.


  在 XML 编辑器中显示 JSON 结果


  因此，较小的 JSON 结果可以手动格式化，如清单 8-3 所示。然而，对于较大的 JSON，手动格式化可能需要花费大量时间来完成此任务。


  有几个网站提供验证 JSON 并将未格式化的 JSON 值转换为格式化 JSON 数据的功能。我偏好的 JSON 格式化工具之一是 JSONFormatter，其
  URL 如下：[`https://jsonformatter.curiousconcept.com/`](https://jsonformatter.curiousconcept.com/)。该程序易于操作：


  ![A435478_1_En_8_Fig4_HTML.jpg](img/A435478_1_En_8_Fig4_HTML.jpg)


  图 8-4.


  显示格式化 JSON 数据窗口


  ![A435478_1_En_8_Fig3_HTML.jpg](img/A435478_1_En_8_Fig3_HTML.jpg)


  图 8-3.


  显示 JSONFormatter 界面


  1.  从 XML 编辑器获取 JSON 结果。

  2.  粘贴到 JSONFormatter 验证窗口中，如图 8-3 所示。

  3.  点击`Process`按钮。

  4.  有效的 JSON 将显示在格式化 JSON 数据窗口中，如图 8-4 所示。


  注意


  作为 JSONFormatter 的替代方案，JSON Editor Online 是另一个格式化应用程序；URL：[`http://www.jsoneditoronline.org/`](http://www.jsoneditoronline.org/)。我更喜欢
  JSONFormatter，因为该应用程序会保留所有提交的 JSON 代码。因此，当我需要回溯到某些结果时，无需重新提交 JSON 代码。


  当在`FROM`子句中处理多个表以返回 JSON 数据时，必须记住表和列别名会影响 JSON 输出。例如，清单 8-4 演示了使用未为表和列设置别名的查询构建的
  JSON。对于此类`db_name()`函数，只会创建一个数据库别名。清单 8-5 在 JSON 输出中显示了查询结果。


  ```

  SELECT db_name() as [Database],

  sys.schemas.name,

  sys.objects.name,

  sys.columns.name

  FROM sys.objects

  JOIN sys.schemas on sys.objects.schema_id = sys.schemas.schema_id

  JOIN sys.columns ON sys.columns.object_id = sys.objects.object_id

  JOIN ( SELECT TOP (1) o.object_id, count(c.name) [name]

  FROM sys.columns c

  JOIN sys.objects o ON c.object_id = o.object_id WHERE type = ''u''

  GROUP BY o.object_id HAVING COUNT(c.name) < 6

  )  countCol

  ON countCol.object_id = sys.objects.object_id

  WHERE type = ''u''

  FOR JSON AUTO;

  清单 8-4.

  显示使用原始表名的 SQL

  ```


  ```

  {   "Database":"WideWorldImporters",

  "name":"Purchasing",

  "sys.objects":[

  {   "name":"SupplierCategories",

  "sys.columns":[

  {

  "name":"SupplierCategoryID"

  },

  {

  "name":"SupplierCategoryName"

  },

  {

  "name":"LastEditedBy"

  },

  {

  "name":"ValidFrom"

  },

