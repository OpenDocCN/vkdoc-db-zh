- '# 8-7. 处理 CLR 数据类型


  ### 问题


  你希望在 JSON 输出中包含 CLR 数据类型。


  ### 解决方案


  `ToString()` 函数将 CLR 数据类型值转换为 `nvarchar` 数据类型。代码清单 8-28 演示了一个查询，其中 `Customers.DeliveryLocation`
  `geography` 数据类型列是 JSON 输出的一部分。代码清单 8-29 显示了 JSON 输出。


  ```sql

  SELECT TOP (2) Customers.CustomerName,

  People.FullName AS PrimaryContact,

  ap.FullName AS AlternateContact,

  Customers.PhoneNumber,

  Cities.CityName AS CityName,

  Customers.DeliveryLocation.ToString() AS DeliveryLocation

  FROM Sales.Customers AS Customers

  JOIN [Application].People AS People

  ON Customers.PrimaryContactPersonID = People.PersonID

  JOIN [Application].People AS ap

  ON Customers.AlternateContactPersonID = ap.PersonID

  JOIN [Application].Cities AS Cities

  ON Customers.DeliveryCityID = Cities.CityID

  FOR JSON PATH, ROOT(''Customers'');

  代码清单 8-28. 将 CLR 值转换为字符串

  ```


  ```json

  {"Customers": [

  {

  "CustomerName": "Tailspin Toys (Head Office)",

  "PrimaryContact": "Waldemar Fisar",

  "AlternateContact": "Laimonis Berzins",

  "PhoneNumber": "(308) 555-0100",

  "CityName": "Lisco",

  "DeliveryLocation": "POINT (-102.6201979 41.4972022)"

  },

  {

  "CustomerName": "Tailspin Toys (Sylvanite, MT)",

  "PrimaryContact": "Lorena Cindric",

  "AlternateContact": "Hung Van Groesen",

  "PhoneNumber": "(406) 555-0100",

  "CityName": "Sylvanite",

  "DeliveryLocation": "POINT (-115.8743507 48.7163356)"

  }

  ]

  }

  代码清单 8-29. 在 JSON 输出中显示

  ```


  ### 工作原理


  `ToString()` 函数隐式地将 CLR 数据类型 `geography`、`geometry` 和 `hierarchyid` 转换为 `nvarchar`
  数据类型。`ToString()` 函数的默认输出如表 8-5 所示。


  **表 8-5.** 显示 `ToString()` 函数转换输出


  | 数据类型 | 转换为数据类型 |

  | --- | --- |

  | `hierarchyid` | `nvarchar(4000)` |

  | `geography` | `nvarchar(max)` |

  | `geometry` | `nvarchar(max)` |


  > **注意**

  > `hierarchyid` 数据类型是此限制的一个例外。当包含 `hierarchyid` 数据类型的列是 JSON 输出的一部分时，`FOR JSON`
  子句不会引发错误。


  当 `FOR JSON` 子句引用未转换的 `geography` 和 `geometry` 数据类型时，SQL Server 会引发如代码清单 8-30 所示的错误。


  ```text

  Msg 13604, Level 16, State 1, Line 1

  FOR JSON cannot serialize CLR objects. Cast CLR types explicitly into one of the
  supported types in FOR JSON queries.

  代码清单 8-30. 显示未转换 CLR 时的错误

  ```


  `ToString()` 函数区分大小写，这对于大多数 SQL Server 内置函数来说并不常见。因此，任何与正确大小写的 `ToString()` 函数不同的拼写都会引发错误。例如，当函数拼写为
  `tostring()` 时，SQL Server 会引发错误。代码清单 8-31 演示了错误消息。


  ```text

  Msg 6506, Level 16, State 10, Line 5 Could not find method ''tostring'' for type
  ''Microsoft.SqlServer.Types.SqlGeography'' in assembly ''Microsoft.SqlServer.Types''

  代码清单 8-31. 显示 `ToString()` 函数拼写错误时的错误消息

  ```


  作为替代方案，`CAST()` 和 `CONVERT()` 函数可以显式地将 `geography` 和 `geometry` 转换为 `nvarchar` 和
  `varchar` 数据类型。代码清单 8-32 演示了一个查询，其中使用 `CAST()` 函数将具有 `geography` 数据类型的列 `Customers.DeliveryLocation`
  显式转换为 `nvarchar(1000)`。


  ```sql

  SELECT TOP (2) Customers.CustomerName,

  People.FullName AS PrimaryContact,

  ap.FullName AS AlternateContact,

  Customers.PhoneNumber,

  Cities.CityName AS CityName,

  CAST(Customers.DeliveryLocation as nvarchar(1000)) AS DeliveryLocation

  FROM Sales.Customers AS Customers

  JOIN Application.People AS People

  ON Customers.PrimaryContactPersonID = People.PersonID

  JOIN Application.People AS ap

  ON Customers.AlternateContactPersonID = ap.PersonID

  JOIN Application.Cities AS Cities

  ON Customers.DeliveryCityID = Cities.CityID

  FOR JSON PATH, ROOT(''Customers'');

  代码清单 8-32. 使用 `CAST()` 函数处理具有 geography 数据类型的列

  ```


  ## 总结


  SQL Server 2016 引入了 JSON 集成功能。本章介绍了如何构建高效且有效的 JSON 输出。这是专门讨论 JSON 的第一章，你可以看到 `FOR
  JSON` 子句与 `FOR XML` 子句有许多相似之处。两者都有 `AUTO` 和 `PATH` 模式。`FOR JSON` 子句中的 `ROOT` 选项与
  `FOR XML` 子句中的相同。根据经验，如果你熟悉 XML，那么学习 JSON 应该会很简单。


  下一章将介绍如何将 JSON 值转换为行和列。




  '
- "# 9. 将 JSON 转换为行集\n\n在本章中，我们将讨论一些方法，演示如何检测 JSON 文档、不同的 JSON 解构方式，以及在需要筛选 JSON 文档时如何提高性能。SQL\
  \ Server 的 JSON 集成功能提供了全面的覆盖，可以将 JSON 文档转换为标量值和行-列集。您将找到各种经过测试的示例和可能的场景，以帮助您为任务找到最合适的解决方案。\n\
  \n## 9-1. 检测包含 JSON 的列\n\n### 问题\n\n您希望检测数据库中所有包含 JSON 数据的列。\n\n### 解决方案\n\n`ISJSON()`\
  \ 函数用于检测数据是否为有效的 JSON。清单 9-1 演示了如何在数据库中检测 JSON 文档的过程。图 9-1 展示了 SQL 脚本的结果。\n\n![A435478_1_En_9_Fig1_HTML.jpg](img/A435478_1_En_9_Fig1_HTML.jpg)\n\
  \n*图 9-1. 显示已检测到的包含 JSON 数据的表和列*\n\n```sql\nSET NOCOUNT ON;\nDECLARE @SQL nvarchar(1000)\n\
  IF (OBJECT_ID('tempdb.dbo.#Result')) IS NOT NULL\nDROP TABLE #Result\nCREATE TABLE\
  \ #Result (tblName nvarchar(200),\nclmnName nvarchar(100),\nDateType nvarchar(100),\n\
  JSONDoc nvarchar(MAX),)\nDECLARE cur CURSOR\nFOR\nSELECT 'SELECT TOP (1) ''' + QUOTENAME(s.name)\
  \ +'.' + QUOTENAME(o.name) + ''' as TblName, '''\n+ QUOTENAME(c.name)  + ''' as\
  \ ClmName, '''\n+ t.name  + QUOTENAME(case c.max_length when -1 then 'MAX' ELSE\
  \ cast(c.max_length as varchar(5)) END , ')') + ''' as DataType, '\n+ QUOTENAME(c.name)\
  \  + ' FROM '\n+ QUOTENAME(s.name) +'.' + QUOTENAME(o.name) +\n' WHERE ISJSON('\
  \ + QUOTENAME(c.name)  + ') = 1;'\nFROM sys.columns c\nJOIN sys.types t on c.system_type_id\
  \ = t.system_type_id\nJOIN sys.objects o ON c.object_id = o.object_id AND o.type\
  \ = 'u'\nJOIN sys.schemas s ON s.schema_id = o.schema_id\nWHERE t.name IN('varchar',\
  \ 'nvarchar')\nAND (c.max_length = -1 OR c.max_length > 100)\nOPEN cur\nFETCH NEXT\
  \ FROM cur INTO @SQL\nWHILE @@FETCH_STATUS = 0\nBEGIN\nprint @SQL\nINSERT #Result\n\
  EXEC(@SQL)\nFETCH NEXT FROM cur INTO @SQL\nEND\nDEALLOCATE cur;\nSELECT JSONDoc,tblName,clmnName,DateType\n\
  FROM #Result\nORDER BY tblName, clmnName\nDROP TABLE #Result\nSET NOCOUNT OFF;\n\
  ```\n\n*清单 9-1. 检测 JSON 数据*\n\n### 工作原理\n\n`ISJSON()` 函数验证字符串类型的值是否为有效的 JSON。`ISJSON()`\
  \ 函数返回：\n\n*   1 表示该字符串是有效的 JSON 文档。\n*   0 表示该字符串是无效的 JSON 文档。\n*   NULL 表达式为 NULL\
  \ 值。\n\n空的花括号 `{}` 和空的方括号 `[]` 被视为有效的 JSON，因此，`ISJSON()` 函数对这些值返回 1。`ISJSON()` 函数将用于检测\
  \ JSON 文档，并建立一个游标来构建动态 SQL，如清单 9-2 所示。\n\n```sql\nDECLARE cur CURSOR\nFOR\nSELECT\
  \ 'SELECT TOP (1) ''' + QUOTENAME(s.name) +'.' + QUOTENAME(o.name) + ''' as TblName,\
  \ '''\n+ QUOTENAME(c.name)  + ''' as ClmName, '''\n+ t.name  + QUOTENAME(case c.max_length\
  \ when -1 then 'MAX' ELSE cast(c.max_length as varchar(5)) END , ')') + ''' as DataType,\
  \ '\n+ QUOTENAME(c.name)  + ' FROM '\n+ QUOTENAME(s.name) +'.' + QUOTENAME(o.name)\
  \ +\n' WHERE ISJSON(' + QUOTENAME(c.name)  + ') = 1;'\nFROM sys.columns c\nJOIN\
  \ sys.types t on c.system_type_id = t.system_type_id\nJOIN sys.objects o ON c.object_id\
  \ = o.object_id AND o.type = 'u'\nJOIN sys.schemas s ON s.schema_id = o.schema_id\n\
  WHERE t.name IN('varchar', 'nvarchar')\nAND (c.max_length = -1 OR c.max_length >\
  \ 100);\n```\n\n*清单 9-2. 构建动态 SQL 以检测 JSON 文档*\n\n存储 JSON 的列具有 `nvarchar` 和 `varchar`\
  \ 数据类型。理论上，`nchar` 和 `char` 数据类型的列也可以存储 JSON；但是，固定长度的数据类型并不适合 JSON。错误的设计考虑可能会在二进制数据类型（例如用于\
  \ JSON 文档的 `varbinary` 和 `image`）中实现。\n\n**注意**\n\nMicrosoft 推荐使用 `nvarchar(max)`\
  \ 作为存储 JSON 文档的标准数据类型，正如在 WideWorldImporters 示例数据库（图 9-1）中所实现的那样。所有存储 JSON 的列都具有\
  \ `nvarchar(max)` 数据类型。\n\n因此，用于游标的动态 SQL（清单 9-1）筛选了表 `sys.types`，并将列名筛选为 '`varchar`'、'`nvarchar`'。在第\
  \ 4 章中，方法 4-7 演示了当数据类型筛选器包含另外四种数据类型：`varbinary`、`image`、`text` 和 `ntext` 时，如何检测\
  \ XML 列。此外，列长度小于 100 时存储 JSON 的可能性较小。因此，对来自表 `sys.columns` 的 `max_length` 列按 -1（即\
  \ `MAX`）或大于 100 进行了筛选。\n\n游标的 `SELECT` 语句生成的动态 SQL 输出如下：\n\n1.  `Schema.TableName`\
  \ – 定义架构和表\n2.  `ColumnName` – 定义列名\n3.  `DataType(data length)` – 定义数据类型\n4.  列名\
  \ – 定义返回的 JSON 文档\n\n`WHERE` 子句使用列名作为参数实现 `ISJSON()`。动态 SQL 行的输出如清单 9-3 所示。动态 SQL\
  \ 的结果如图 9-2 所示。\n\n![A435478_1_En_9_Fig2_HTML.jpg](img/A435478_1_En_9_Fig2_HTML.jpg)\n\
  \n*图 9-2. 显示清单 9-3 的输出*\n\n```sql\nSELECT TOP (1) '[Application].[People]' as TblName,\n\
  '[CustomFields]' as ClmName,\n'nvarchar(MAX)' as DataType,\n[CustomFields]\nFROM\
  \ [Application].[People]\nWHERE ISJSON([CustomFields]) = 1;\n```\n\n*清单 9-3. 动态\
  \ SQL 生成的代码*\n\n循环遍历动态 SQL 的每一行，并检查每列中是否存在潜在的 JSON 文档。当 `ISJSON()` 返回值 1（表示 TRUE）时，该\
  \ SQL 的输出将被记录到临时表 `#Result` 中，该表在游标声明之前创建。当游标遍历完成后，临时表 `#Result` 将返回所有已记录的行。\n\n\
  ## 9-2. 返回 JSON 文档的子集\n\n### 问题\n\n您希望从 JSON 文档中返回一个对象或数组。\n\n### 解决方案\n\n`JSON_QUERY()`\
  \ 函数从包含 JSON 文档的变量或列中返回一个子集（对象或数组）。清单 9-4 演示了如何从存储在 `Sales.Invoices` 表 `ReturnedDeliveryData`\
  \ 列中的 JSON 文档中返回 `Events` 数组对象（其中的两个）。结果如清单 9-5 所示。\n\n```sql\nSELECT TOP (1) JSON_QUERY([ReturnedDeliveryData],\
  \ '$.Events')\nFROM [Sales].[Invoices];\n```\n\n*清单 9-4. 返回 Events 数组*\n\n```json\n\
  [\n{\n\"Event\":\"Ready for collection\",\n\"EventTime\":\"2013-01-01T12:00:00\"\
  ,\n\"ConNote\":\"EAN-125-1051\"\n},\n{\n\"Event\":\"DeliveryAttempt\",\n\"EventTime\"\
  :\"2013-01-02T07:05:00\",\n\"ConNote\":\"EAN-125-1051\",\n\"DriverID\":15,\n\"Latitude\"\
  :41.3617214,\n\"Longitude\":-81.4695602,\n\"Status\":\"Delivered\"\n}\n]\n```\n\n\
  *清单 9-5. 清单 [9-4] 的结果*\n\n\n\n### 工作原理\n\n`JSON_QUERY()` 函数有两个参数：\n\n1.  **Expression**\
  \ – 一个必需的参数，期望来自列名或变量的 JSON 文档。\n2.  **Path** – 一个可选的参数，提供到 JSON 对象部分的文档路径。\n\n\
  > **注意**\n>\n> 路径参数中的美元符号 (`$`) 表示 JSON 上下文，可以将其视为顶级对象。\n\n示例方案演示的 JSON 文档存储在 `Sales.Invoices`\
  \ 表的 `ReturnedDeliveryData` 列中。例如，清单 9-6 中显示的完整 JSON 文档有两个额外的键元素 `DeliveredWhen`\
  \ 和 `ReceivedBy`，它们不属于 `JSON_QUERY()` 结果的一部分，因为路径参数被设置为包含两个子数组的对象 `Events`。\n\n\
  ```json\n{\n\"Events\":[\n{\n\"Event\":\"Ready for collection\",\n\"EventTime\"\
  :\"2013-01-01T12:00:00\",\n\"ConNote\":\"EAN-125-1051\"\n},\n{\n\"Event\":\"DeliveryAttempt\"\
  ,\n\"EventTime\":\"2013-01-02T07:05:00\",\n\"ConNote\":\"EAN-125-1051\",\n\"DriverID\"\
  :15,\n\"Latitude\":41.3617214,\n\"Longitude\":-81.4695602,\n\"Status\":\"Delivered\"\
  \n}\n],\n\"DeliveredWhen\":\"2013-01-02T07:05:00\",\n\"ReceivedBy\":\"Aakriti Byrraju\"\
  \n}\n```\n**清单 9-6.** 显示完整的 JSON 文档\n\n要返回单个数组对象，路径参数需要指定一个数组索引，如清单 9-7 所示。清单 9-8\
  \ 展示了单个数组对象的 JSON 输出。\n\n```sql\nSELECT TOP (1) JSON_QUERY([ReturnedDeliveryData],\
  \ '$.Events[0]')\nFROM [Sales].[Invoices];\n```\n**清单 9-7.** 引用单个 JSON 数组对象\n\n\
  ```json\n{\n\"Event\":\"Ready for collection\",\n\"EventTime\":\"2013-01-01T12:00:00\"\
  ,\n\"ConNote\":\"EAN-125-1051 \"\n}\n```\n**清单 9-8.** 显示数组输出\n\n> **警告**\n>\n> 与基于\
  \ 1 的起始索引的 XML 单例不同，JSON 数组是基于 0 的。因此，要引用第一个数组对象或数组值，索引必须是 0，而不是 1。\n\n当 `JSON_QUERY()`\
  \ 函数未设置路径参数时，该函数返回完整的 JSON 文档。\n\n## 9-3. 从 JSON 返回标量值\n\n### 问题\n\n你想从 JSON 文档中返回一个标量值。\n\
  \n### 解决方案\n\n`JSON_VALUE()` 函数从 JSON 文档中提取标量值，如清单 9-9 所示。查询结果如图 9-3 所示。\n\n![A435478_1_En_9_Fig3_HTML.jpg](img/A435478_1_En_9_Fig3_HTML.jpg)\n\
  **图 9-3.** 显示查询结果\n\n```sql\nSELECT TOP (1) JSON_value([ReturnedDeliveryData], '$.ReceivedBy')\
  \ ReceivedBy\n,JSON_value([ReturnedDeliveryData], '$.Events[0].Event') FirstEvent\n\
  ,JSON_value([ReturnedDeliveryData], '$.Events[0].EventTime') EventTime\n,JSON_value([ReturnedDeliveryData],\
  \ '$.Events[1].Event') LastEvent\n,JSON_value([ReturnedDeliveryData], '$.Events[1].Status')\
  \ [Status]\nFROM [Sales].[Invoices];\n```\n**清单 9-9.** 返回标量值\n\n### 工作原理\n\n`JSON_VALUE()`\
  \ 函数有两个必需参数：\n\n1.  **Expression** – 期望来自列名或变量的 JSON 文档。\n2.  **Path** – 到 JSON\
  \ 标量值的 JSON 文档路径。\n\n与返回对象和数组的 `JSON_QUERY()` 函数不同，`JSON_VALUE()` 函数返回 JSON 标量值。如果您尝试使用\
  \ `JSON_QUERY()` 函数返回标量值，将返回 `NULL`。`JSON_VALUE()` 函数则相反——当路径引用对象或数组而不是键时，它返回 `NULL`。例如，清单\
  \ 9-10 中的查询演示了在 `JSON_VALUE()` 和 `JSON_QUERY()` 函数之间翻转对象和值引用。图 9-4 显示了当引用标量值的 `JSON_VALUE()`\
  \ 返回 `ReceivedBy` 值而引用标量值的 `JSON_QUERY()` 返回 `NULL` 时的结果。在接下来的两列中，引用数组的 `JSON_VALUE()`\
  \ 返回 `NULL` 值，而引用数组的 `JSON_QUERY()` 返回一个 JSON 片段。\n\n![A435478_1_En_9_Fig4_HTML.jpg](img/A435478_1_En_9_Fig4_HTML.jpg)\n\
  **图 9-4.** 显示查询结果\n\n```sql\nSELECT TOP (1) JSON_VALUE([ReturnedDeliveryData], '$.ReceivedBy')\
  \ ScalarValue\n,JSON_QUERY([ReturnedDeliveryData], '$.ReceivedBy') ScalarQuery\n\
  ,JSON_VALUE([ReturnedDeliveryData], '$.Events[0]') ObjectValue\n,JSON_QUERY([ReturnedDeliveryData],\
  \ '$.Events[0]') ObjectQuery\nFROM [Sales].[Invoices];\n```\n**清单 9-10.** 演示 `JSON_VALUE()`\
  \ 和 `JSON_QUERY()` 函数\n\n`JSON_VALUE()` 函数为标量值返回 `nvarchar(4000)` 数据类型。清单 9-11 演示了如何验证\
  \ `JSON_VALUE()` 函数返回的数据类型。图 9-5 显示了返回的结果。\n\n![A435478_1_En_9_Fig5_HTML.jpg](img/A435478_1_En_9_Fig5_HTML.jpg)\n\
  **图 9-5.** 验证代码的输出结果\n\n```sql\nDECLARE @Value sql_variant\nSELECT @Value =\n(\n\
  SELECT TOP (1) JSON_value([ReturnedDeliveryData], '$.\"ReceivedBy\"')\nFROM [Sales].[Invoices]\n\
  );\nSELECT SQL_VARIANT_PROPERTY(@Value,'BaseType') BaseType,\nCAST(SQL_VARIANT_PROPERTY(@Value,\
  \ 'MaxLength')as int) /\nCASE SQL_VARIANT_PROPERTY(@Value,'BaseType') WHEN 'nvarchar'\n\
  THEN 2 ELSE 1 END TypeLength,\nSQL_VARIANT_PROPERTY(@Value,'TotalBytes') TotalBytes;\n\
  ```\n**清单 9-11.** 通过 `JSON_VALUE()` 函数验证返回的数据类型\n\n当标量值大于 4000 个字符时，该函数返回 `NULL`。清单\
  \ 9-12 演示了当标量值 `LongText` 包含 5,009 个字符并由 `JSON_VALUE()` 函数处理时的 JSON 文档。查询结果如图 9-6\
  \ 所示。\n\n![A435478_1_En_9_Fig6_HTML.jpg](img/A435478_1_En_9_Fig6_HTML.jpg)\n**图\
  \ 9-6.** 显示查询结果\n\n```sql\ndeclare @json nvarchar(max) = '\n{\n\"RegularText\":\"\
  Regular Text\",\n\"LongText\":\"Long Text' + REPLICATE(' too long ', 500) + '\"\n\
  }'\nSELECT JSON_VALUE(@json, '$.RegularText') RegularText ,\nJSON_VALUE(@json, '$.LongText')\
  \ LongText\n```\n**清单 9-12.** 演示超出字符限制的文本如何影响 `JSON_VALUE()` 函数输出\n\n> **注意**\n\
  >\n> 当 JSON 键包含无效字符（如空格）时，键必须用双引号 (`“”`) 括起来。例如，当键是 `Last Name` 时，路径参数将是：\n> ```sql\n\
  > SELECT JSON_VALUE(@json, '$.\"Last Name\"')\n> ```\n\n## 9-4. 对返回的 NULL 进行故障排除\n\
  \n### 问题\n\n你想对 JSON 标量值为 `NULL` 的原因进行故障排除。\n\n### 解决方案\n\n在 JSON 函数中实现严格模式（strict\
  \ mode）会在返回 `NULL` 时引发错误。清单 9-13 演示了严格模式下的查询。错误消息如清单 9-14 所示。\n\n```sql\nSELECT\
  \ JSON_VALUE([ReturnedDeliveryData], 'strict $.receivedby') ReceivedBy\nFROM [Sales].[Invoices];\n\
  ```\n**清单 9-13.** 强制 `JSON_VALUE()` 函数引发错误\n\n```text\nMsg 13608, Level 16, State\
  \ 5, Line 1\nProperty cannot be found on the specified JSON path.\n```\n**清单 9-14.**\
  \ 显示错误消息\n\n\n\n## 9-4. 为 JSON 路径实现严格模式\n\n### 工作原理\n\n支持 `path` 参数的 JSON 函数可以实现**严格模式**，以强制在返回的标量值为\
  \ `NULL` 时抛出错误。这些函数包括：\n\n*   `JSON_VALUE()`\n*   `JSON_QUERY()`\n*   `JSON_MODIFY()`\n\
  *   `OPENJSON()`\n\n对于支持路径参数的函数，其路径参数可以在两种模式下运行：\n\n*   `lax` 模式（默认），JSON 函数返回标量\
  \ `NULL` 值\n*   `strict` 模式，JSON 函数返回错误而非 `NULL` 值\n\n**注意**\n\n`lax` 和 `strict`\
  \ 关键字都是**区分大小写**的；因此，实现时必须全部使用小写。\n\n清单 9-15 展示了在严格模式下执行代码时，如何检测 `JSON_VALUE()`\
  \ 函数标量输出的问题。清单 9-16 展示了错误消息。\n\n```sql\ndeclare @json nvarchar(max) = '\n{\n\"RegularText\"\
  :\"Regular Text\",\n\"LongText\":\"Long Text' + REPLICATE(' too long ', 500) + '\"\
  \n}'\nSELECT JSON_VALUE(@json, 'strict $.LongText') LongText\n```\n\n*清单 9-15. 实现严格模式*\n\
  \n```sql\nMsg 13625, Level 16, State 1, Line 7\nString value in the specified JSON\
  \ path would be truncated.\n```\n\n*清单 9-16. 显示错误消息*\n\n清单 9-16 中的错误消息通知文本超过了最大\
  \ 4,000 个字符的限制。然而，`OPENJSON()` 函数（我们将在下一个配方中介绍）可以解决这个问题。\n\n## 9-5. 将 JSON 转换为表\n\
  \n### 问题\n\n你希望将一个 JSON 文档转换为行列格式。\n\n### 解决方案\n\n`OPENJSON()` 表值函数可拆分 JSON 文档并以行列格式返回结果集。清单\
  \ 9-17 拆分了来自表 `[Application].[People]`、列 `[UserPreferences]` 的 JSON 文档。图 9-7 显示了查询结果。\n\
  \n![A435478_1_En_9_Fig7_HTML.jpg](img/A435478_1_En_9_Fig7_HTML.jpg)\n\n*图 9-7. 显示查询结果*\n\
  \n```sql\nSELECT UserPref.theme,\n       UserPref.[dateFormat],\n       UserPref.timeZone,\n\
  \       UserPref.pagingType,\n       UserPref.pageLength,\n       UserPref.favoritesOnDashboard\n\
  FROM [Application].[People]\nCROSS APPLY OPENJSON([UserPreferences])\nWITH\n(\n\
  \   theme         varchar(20) '$.theme',\n   [dateFormat]  varchar(20) '$.dateFormat',\n\
  \   timeZone      varchar(10) '$.timeZone',\n   pagingType    varchar(20) '$.table.pagingType',\n\
  \   pageLength    int         '$.table.pageLength',\n   favoritesOnDashboard bit\
  \  '$.favoritesOnDashboard'\n) AS UserPref;\n```\n\n*清单 9-17. 将 JSON 转换为表结构*\n\n\
  ### 工作原理\n\n`OPENJSON()` 表值函数拆分并将 JSON 文档转换为行集。由于 `OPENJSON()` 函数返回一个行集，因此可以使用 `CROSS\
  \ APPLY` 和 `OUTER APPLY` 运算符在 `FROM` 子句中使用它。\n\n`OPENJSON()` 函数由两个参数和一个 `WITH` 子句组成：\n\
  \n*   `jsonExpression`（必需）– 有效的 JSON 列或变量\n*   `path`（可选）– JSON 对象或数组路径\n*   `WITH`\
  \ 子句（可选）– 显式定义输出表；因此，需要为每一列指定名称和数据类型。可选地，`WITH` 子句可以引用对象或数组，如清单 9-18 所示。\n\n在我们查看清单\
  \ 9-17 中的查询细节之前，我们将讨论来自 `[Application].[People]` 表、列 `[UserPreferences]` 的一个 JSON\
  \ 文档，如清单 9-18 所示。\n\n```json\n{\n  \"theme\": \"blitzer\",\n  \"dateFormat\": \"\
  yy-mm-dd\",\n  \"timeZone\": \"PST\",\n  \"table\": {\n    \"pagingType\": \"full_numbers\"\
  ,\n    \"pageLength\": 25\n  },\n  \"favoritesOnDashboard\": true\n}\n```\n\n*清单\
  \ 9-18. 显示 JSON 文档*\n\n该文档有四个被视为第一级的键值对元素：\n\n*   `theme`\n*   `dateFormat`\n* \
  \  `timeZone`\n*   `favoritesOnDashboard`\n\n此外，子对象 `table` 还包含另外两个键值对元素：\n\n* \
  \  `pagingType`\n*   `pageLength`\n\n解决方案部分（清单 9-17）中的 `OPENJSON()` 函数仅实现了必需的参数，即\
  \ `UserPreferences` 列，例如：`OPENJSON([UserPreferences])`。对于提供的解决方案，无需指定路径参数，因为所有 JSON\
  \ 键都在 `WITH` 子句中显式定义了，例如：\n\n```sql\nCROSS APPLY OPENJSON([UserPreferences])\nWITH\n\
  (\n   theme        varchar(20) '$.theme',\n   [dateFormat] varchar(20) '$.dateFormat',\n\
  \   timeZone     varchar(10) '$.timeZone',\n   pagingType   varchar(20) '$.table.pagingType',\n\
  \   pageLength   int         '$.table.pageLength',\n   favoritesOnDashboard bit\
  \ '$.favoritesOnDashboard'\n) AS UserPref\n```\n\n`OPENJSON()` 函数默认可以定义为处理所有第一级键。例如，当\
  \ `WITH` 子句没有为第一级键指定显式路径时，`OPENJSON()` 函数会返回相同的输出，如清单 9-19 所示。\n\n```sql\nSELECT\
  \ UserPref.theme,\n       UserPref.[dateFormat],\n       UserPref.timeZone,\n  \
  \     UserPref.pagingType,\n       UserPref.pageLength,\n       UserPref.favoritesOnDashboard\n\
  FROM [Application].[People]\nCROSS APPLY OPENJSON([UserPreferences])\nWITH\n(\n\
  \   theme        varchar(20),\n   [dateFormat] varchar(20),\n   timeZone     varchar(10),\n\
  \   pagingType   varchar(20) '$.table.pagingType',\n   pageLength   int        \
  \ '$.table.pageLength',\n   favoritesOnDashboard bit\n) AS UserPref;\n```\n\n*清单\
  \ 9-19. 使用默认的第一级键拆分 JSON 文档*\n\n这种实现方式有一个注意事项：`WITH` 子句中的所有第一级键必须与 JSON 文档名称匹配，并且名称**区分大小写**。子对象\
  \ `table` 由于是第二级 JSON，仍然需要路径规范。\n\n当 `OPENJSON()` 函数完全使用默认值（即，没有路径参数且没有 `WITH` 子句）时，该函数返回三列：\n\
  \n| Type 列值 | JSON 数据类型描述 |\n| --- | --- |\n| 0 | `NULL` |\n| 1 | `string` |\n|\
  \ 2 | `int` |\n| 3 | `boolean` (true/false) |\n| 4 | `array` |\n| 5 | `object` |\n\
  \n*   `Key` – `nvarchar(4000)`，返回一个 JSON 键、对象或数组名称。\n*   `Value` – `nvarchar(max)`，返回一个\
  \ JSON 属性值。\n*   `Type` – `int`，返回 JSON 属性值的类型。类型描述如表 9-1 所示。\n\n清单 9-20 使用了清单 9-18\
  \ 中的 JSON 数据，将变量中的 JSON 文档表示为表结构。图 9-8 展示了来自 JSON 变量的结果。\n\n![A435478_1_En_9_Fig8_HTML.jpg](img/A435478_1_En_9_Fig8_HTML.jpg)\n\
  \n*图 9-8. 显示 OPENJSON() 函数结果*\n\n```sql\ndeclare @json varchar(max) =\n'{\n  \"\
  theme\": \"blitzer\",\n  \"dateFormat\": \"yy-mm-dd\",\n  \"timeZone\": \"PST\"\
  ,\n  \"table\": {\n    \"pagingType\": \"full_numbers\",\n    \"pageLength\": 25\n\
  \  },\n  \"favoritesOnDashboard\": true\n}'\nSELECT [key], [value], [type]\nFROM\
  \ OPENJSON(@json);\n```\n\n*清单 9-20. 运行不带可选参数或 WITH 子句的 OPENJSON() 函数*\n\n## 9-6.\
  \ 处理 JSON 嵌套子对象\n\n### 问题\n\n你希望拆分具有多个嵌套级别的 JSON。\n\n\n## 9-6. 处理多级 JSON\n\n###\
  \ 解决方案\n\n要切分（shred）一个子对象，你需要在一个父级`OPENJSON(…) WITH(…)`块中设置对该子对象的引用。新的 JSON 实例将作为一个独立的子对象\
  \ JSON 存在。演示的解决方案是一个与数据库无关的过程，可以在任何兼容级别（`COMPATIBILITY_LEVEL`）为 130 或更高的数据库上运行。完整的解决方案在`清单\
  \ 9-21`中展示。最终的查询结果如图`9-9`所示。\n\n![A435478_1_En_9_Fig9_HTML.jpg](img/A435478_1_En_9_Fig9_HTML.jpg)\n\
  图 9-9：显示最终结果\n\n```sql\nSET NOCOUNT ON;\nDECLARE @JSON nvarchar(MAX),\n@schema nvarchar(30),\n\
  @tbl nvarchar(128),\n@objID int\nDROP TABLE IF EXISTS dbo.Table_Info_JSON;\nCREATE\
  \ TABLE Table_Info_JSON (\nTableID int PRIMARY KEY,\nDBName nvarchar(128),\n[SchemaName]\
  \ nvarchar(30),\ntblName nvarchar(128),\nJSONDoc nvarchar(MAX)\n);\nDECLARE cur\
  \ CURSOR FOR\nSELECT object_id, [Schema].name, [Table].name\nFROM sys.objects [Table]\n\
  JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id\nWHERE type\
  \ = 'u';\nOPEN cur ;\nFETCH NEXT FROM cur INTO @objID, @schema, @tbl;\nWHILE @@FETCH_STATUS\
  \ = 0\nBEGIN\nSELECT @JSON = (\nSELECT db_name() as 'Database',\n[Schema].name as\
  \ 'Tables.SchemaName',\n[Table].name as 'Tables.TableName',\n(SELECT [Column].name\
  \ ColumnName FROM sys.columns [Column]\nWHERE [Column].object_id = [Table].object_id\
  \ FOR JSON AUTO\n) AS 'Tables.Columns'\nFROM sys.objects [Table]\nJOIN sys.schemas\
  \ [Schema] on [Table].schema_id = [Schema].schema_id\nWHERE [Table].object_id =\
  \ @objID\nFOR JSON PATH, WITHOUT_ARRAY_WRAPPER\n);\nINSERT Table_Info_JSON\nSELECT\
  \ @objID, DB_NAME(), @schema, @tbl, @JSON;\nFETCH NEXT FROM cur INTO @objID, @schema,\
  \ @tbl;\nEND;\nDEALLOCATE cur;\nSET NOCOUNT OFF;\nSELECT db.[Database]    -- first\
  \ level\n, tbl.SchemaName -- second level\n, tbl.TableName  -- second level\n, clmn.ColumnName\
  \ -- third level\nFROM dbo.Table_Info_JSON\nCROSS APPLY OPENJSON (JSONDoc)\nWITH\n\
  (\n[Database] varchar(30),\n[Tables] nvarchar(MAX) AS JSON\n) as db\nCROSS APPLY\
  \ OPENJSON ([Tables])\nWITH\n(\nTableName varchar(30),\nSchemaName varchar(30),\n\
  [Columns] nvarchar(MAX) AS JSON\n) as tbl\nCROSS APPLY OPENJSON ([Columns])\nWITH\n\
  (\nColumnName varchar(30)\n) as clmn;\n```\n`清单 9-21`：切分多个 JSON 子对象的解决方案\n\n###\
  \ 工作原理\n\n切分多级子对象 JSON 数据的机制是基于一个父子对象的引用集。要理解其工作原理，我们需要仔细查看`清单 9-22`中来自`Table_Info_JSON`表的\
  \ JSON 文档。\n\n```json\n{\n\"Database\": \"WideWorldImporters\",\n\"Tables\": {\n\
  \"SchemaName\": \"Warehouse\",\n\"TableName\": \"Colors\",\n\"Columns\": [\n{ \"\
  ColumnName\": \"ColorID\" },\n{ \"ColumnName\": \"ColorName\" },\n{ \"ColumnName\"\
  : \"LastEditedBy\" },\n{ \"ColumnName\": \"ValidFrom\" },\n{ \"ColumnName\": \"\
  ValidTo\" }\n]\n}\n}\n```\n`清单 9-22`：显示 JSON 文档\n\n示例`9-9`中显示的 JSON 文档有三个层级：\n*\
  \   顶级（Level 1）– 键 `\"Database\"`\n*   子级（Level 2）– 对象 `\"Tables\"`\n*   子级（Level\
  \ 3）– 数组 `\"Columns\"`\n\n因此，在`FROM`子句中反映出的 JSON 结构如`清单 9-23`所示：\n\n```sql\nFROM\
  \ dbo.Table_Info_JSON\nCROSS APPLY OPENJSON (JSONDoc) <- reference to the table\
  \ column\nWITH\n(\n[Database] varchar(30),\n[Tables] nvarchar(MAX) AS JSON\n) as\
  \ db\nCROSS APPLY OPENJSON ([Tables]) <- reference to [Tables] JSON object\nWITH\n\
  (\nTableName varchar(30),\nSchemaName varchar(30),\n[Columns] nvarchar(MAX) AS JSON\n\
  ) as tbl\nCROSS APPLY OPENJSON ([Columns]) <- reference to [Columns] JSON array\n\
  WITH\n(\nColumnName varchar(30)\n) as clmn\n```\n`清单 9-23`：显示`FROM`子句\n\n在`OPENJSON`函数的`WITH`子句中引用子级集合。子对象名称必须是`nvarchar(MAX)`数据类型，并设置为`AS\
  \ JSON`对象。例如：`[Tables] nvarchar(MAX) AS JSON`。\n\n`SELECT`子句使用在`FROM`子句中创建的别名来交付结果：\n\
  \n```sql\nSELECT db.[Database]    -- first level\n, tbl.SchemaName -- second level\n\
  , tbl.TableName  -- second level\n, clmn.ColumnName -- third level\n```\n\n## 9-7.\
  \ JSON 索引\n\n### 问题\n\n你想要通过索引来改进 JSON 过滤性能。\n\n### 解决方案\n\n要为 JSON 文档创建索引，你需要为\
  \ JSON 标量值添加一个计算列，然后在此列上创建索引。`清单 9-24`演示了如何向现有表添加针对 JSON 值的索引。该索引是针对图`9-10`中所示的\
  \ JSON 值创建的。\n\n![A435478_1_En_9_Fig10_HTML.jpg](img/A435478_1_En_9_Fig10_HTML.jpg)\n\
  图 9-10：显示 JSON 索引\n\n```sql\nUSE [WideWorldImporters];\nSET ANSI_NULLS ON;\nALTER\
  \ TABLE [Sales].[Invoices] ADD ConNote AS\nCAST(JSON_VALUE([ReturnedDeliveryData],\
  \ '$.Events[0].ConNote') AS varchar(20)) PERSISTED\nCREATE  INDEX IX_Sales_Invoices_ConNote\n\
  ON [Sales].[Invoices]\n(\n[ConNote]\n)INCLUDE(\n[InvoiceDate]\n,[DeliveryInstructions]\n\
  ,[TotalDryItems]\n,[TotalChillerItems]\n,[ConfirmedDeliveryTime]\n,[ConfirmedReceivedBy]\n\
  );\n```\n`清单 9-24`：为 JSON 键值`ConNote`创建索引\n\n\n### 工作原理\n\n在 SQL Server 中，JSON 并不像\
  \ XML 那样被视为一种数据类型。它更类似于一个包含多个值的结构化字符串，并以 `nvarchar(max)` 数据类型存储（如果你遵循 Microsoft\
  \ 的建议）。因此，存储 JSON 文档的列无法像标量值表列那样拥有传统索引。然而，可以通过 `JSON_VALUE()` 标量函数获取一个标量 JSON 值，这正是为\
  \ JSON 文档创建索引的关键。\n\n为 JSON 文档创建索引机制包含两个步骤：\n\n1.  使用 `JSON_VALUE()` 函数向表添加一个计算列，该函数从\
  \ JSON 文档中返回一个标量值。计算列必须使用 `PERSISTED` 选项。另外，你需要记住 `JSON_VALUE()` 函数返回的数据类型是 `nvarchar(4000)`。因此，我建议将\
  \ `JSON_VALUE()` 函数返回的数据长度转换为更接近原始数据的长度。例如：\n    ```sql\n    CAST(JSON_VALUE([ReturnedDeliveryData],\
  \ '$.Events[0].ConNote') AS varchar(20)) PERSISTED\n    ```\n\n2.  在你的计算列上创建索引。根据需要，索引可以包含\
  \ `INCLUDE` 子句来创建一个完全覆盖的索引。\n\n为 JSON 文档创建索引可以极大地提升性能。清单 9-25 展示了一个查询，该查询对 JSON\
  \ 键元素 `ConNote` 上的计算列应用了筛选器。\n\n```sql\nSET STATISTICS IO,TIME ON;\nSELECT [InvoiceDate]\n\
  ,[DeliveryInstructions]\n,[TotalDryItems]\n,[TotalChillerItems]\n,[ConfirmedDeliveryTime]\n\
  ,[ConfirmedReceivedBy]\n,[ConNote]\nFROM [Sales].[Invoices]\nWHERE [ConNote] = 'EAN-125-1051';\n\
  SET STATISTICS IO,TIME OFF;\n```\n*清单 9-25. 筛选 ConNote 列*\n\n图 9-11 展示了该查询的 \"STATISTICS\
  \ IO, TIME\" 结果和执行计划。清单 9-26 是该查询在索引创建前后的比较。\n\n![A435478_1_En_9_Figa_HTML.jpg](img/A435478_1_En_9_Figa_HTML.jpg)\n\
  \n```sql\n---- 无索引\nSQL Server parse and compile time:\nCPU time = 0 ms, elapsed\
  \ time = 0 ms.\n(1 row(s) affected)\nTable 'Invoices'. Scan count 9, logical reads\
  \ 8843, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\nTable 'Worktable'. Scan count 0, logical reads\
  \ 0, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads\
  \ 0, lob read-ahead reads 0.\n(1 row(s) affected)\nSQL Server Execution Times:\n\
  CPU time = 94 ms,  elapsed time = 60 ms.\n```\n*清单 9-26. 比较索引创建前后的查询*\n\n![A435478_1_En_9_Fig11_HTML.jpg](img/A435478_1_En_9_Fig11_HTML.jpg)\n\
  *图 9-11. 比较索引创建前后的执行计划和 STATISTICS 结果*\n\n```sql\n---- 无索引\nSQL Server parse and\
  \ compile time:\nCPU time = 0 ms, elapsed time = 0 ms.\n(1 row(s) affected)\nTable\
  \ 'Invoices'. Scan count 9, logical reads 8843, physical reads 0, read-ahead reads\
  \ 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'Worktable'.\
  \ Scan count 0, logical reads 0, physical reads 0, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\n(1 row(s) affected)\n\
  SQL Server Execution Times:\nCPU time = 94 ms,  elapsed time = 60 ms.\n---- 有索引\n\
  SQL Server parse and compile time:\nCPU time = 0 ms, elapsed time = 0 ms.\n(1 row(s)\
  \ affected)\nTable 'Invoices'. Scan count 1, logical reads 3, physical reads 0,\
  \ read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
  \ reads 0.\n(1 row(s) affected)\nSQL Server Execution Times:\nCPU time = 0 ms, \
  \ elapsed time = 33 ms.\n```\n\n如你所见，使用索引筛选后性能得到了显著提升。\n\n## 总结\n\nSQL Server 2016\
  \ 引入了 JSON 集成，与最新技术配合良好。第 9 章“将 JSON 转换为行集”介绍了完整的 SQL Server 函数集以及大量用于分解和交付 JSON\
  \ 文档结果的示例。\n\n下一章将演示如何修改 JSON 文档，并最终比较 JSON 和 XML 的性能。\n\n"
- '# 10. 修改 JSON


  为了在 JSON 文档中插入、删除和更新数据，SQL Server 2016 引入了 `JSON_MODIFY()` 函数，用于更新 JSON 字符串值。与 XML
  的 `modify()` 方法相比，此函数仅支持追加模式，而 XML 方法则提供了插入、删除和替换模式。第 10 章“修改 JSON”将演示许多配方，解释如何更新
  JSON 文档。在本章最后一节，我将比较 XML 和 JSON 之间的性能。


  ## 10-1. 向 JSON 添加新的键值对


  ### 问题


  你想向 JSON 文档添加一个新的键值对。


  ### 解决方案


  当第二个参数路径值在 JSON 文档中不存在时，`JSON_MODIFY()` 函数会添加一个新的键值对。清单 10-1 展示了使用 `JSON_MODIFY()`
  函数修改 `InvoiceDate` 列的查询，向 JSON 文档添加了一个新键 "SentBy"，其值为 "John Smith"。图 10-1 显示了包含原始
  (`InvoiceDate`) 和修改后的 JSON 文档 (`NewInvoice`) 列的结果。


  ![A435478_1_En_10_Fig1_HTML.jpg](img/A435478_1_En_10_Fig1_HTML.jpg)

  *图 10-1. 显示查询结果*


  ```sql

  SELECT CustomerName

  , PrimaryContact

  , AlternateContact

  , PhoneNumber

  , InvoiceDate

  , JSON_MODIFY(InvoiceDate,''$.SentBy'', ''John Smith'') NewInvoice

  FROM [dbo].[CustomerInvoice];

  ```

  *清单 10-1. 向 JSON 文档添加新的键值对*


  ### 工作原理


  `JSON_MODIFY()` 函数返回更新后的 JSON 文档。它有三个必需参数：


  1.  **表达式** – 列、变量或有效的硬编码 JSON 的名称。

  2.  **路径** – 指向值的键路径。仅支持追加模式。对于其他操作，如插入和更新，函数在自定义模式下工作。

  3.  **新值** – 替换现有值或作为新值添加到 JSON 的值。


  要添加新的键值对，你不需要指定特殊模式。例如，要插入一个新值，你可以使用 `JSON_MODIFY()` 函数，它是自定义的，这意味着如果路径包含一个现有的键，则更新其值。当键不存在时，一个新的键值对会被添加到
  JSON 字符串中。


  在“解决方案”部分，清单 10-1 中，首先使用 `JSON_MODIFY()` 函数检查 `InvoiceDate` 列中是否存在键 "SentBy"。例如：`JSON_MODIFY(InvoiceDate,''$.SentBy'',
  ''John Smith'')`。在该列中未找到此键。因此，该函数添加了一个新键 "SentBy"，其值为 "John Smith"。


  ## 10-2. 更新现有的 JSON


  ### 问题


  你想更改现有键的值。


  ### 解决方案


  `JSON_MODIFY()` 函数的 `Path` 参数必须存在于 JSON 文档中。清单 10-2 演示了将键 "Title" 和值 "Team Member"
  修改为 "Manager" 的查询。图 10-2 显示了原始和修改后的 JSON 文档。


  ![A435478_1_En_10_Fig2_HTML.jpg](img/A435478_1_En_10_Fig2_HTML.jpg)

  *图 10-2. 比较查询输出*


  ```sql

  SELECT CustomFields

  ,JSON_MODIFY(CustomFields,''$.Title'', ''Manager'') NewCustomFields

  FROM [Application].[People]

  WHERE FullName = ''Hudson Onslow'';

  ```

  *清单 10-2. 修改 JSON 文档*





  ### 工作原理


  `JSON_MODIFY()` 函数是自定义的，如前面的配方 10-1 所解释。`CustomFields` 列中的 JSON 文档包含键“Title”。因此，当通过
  JSON 字符串检测到键路径时，`JSON_MODIFY()` 函数会更新其值属性。此概念将在解决方案部分的列表 10-2 中演示。


  ## 10-3. 从 JSON 中删除


  ### 问题


  你想从 JSON 文档中删除一个键值对。


  ### 解决方案


  如果需要删除键值对，请将 `JSON_MODIFY()` 函数的第三个参数 `NewValue` 设置为 `NULL`，如列表 10-3 所示。图 10-3 显示了原始和修改后的
  JSON。


  ![A435478_1_En_10_Fig3_HTML.jpg](img/A435478_1_En_10_Fig3_HTML.jpg)


  图 10-3.


  比较删除键“Title”后的查询输出


  ```sql

  SELECT CustomFields

  ,JSON_MODIFY(CustomFields,''$.Title'', NULL) NewCustomFields

  FROM [Application].[People]

  WHERE FullName = ''Hudson Onslow'';

  ```

  列表 10-3.

  使用值 `NULL` 删除键“Title”


  ### 工作原理


  当 `JSON_MODIFY()` 函数的第三个参数 (`NewValue`) 为 `NULL` 时，该键值对将从 JSON 中删除。此概念适用于键、对象和数组。列表
  10-4 演示了如何从 JSON 变量 `@j` 中删除数组“OtherLanguages”。表 10-1 对比了原始 JSON 和经过 `JSON_MODIFY()`
  函数处理后的 JSON。


  表 10-1.


  并排比较结果


  | 原始 JSON | 删除了数组 OtherLanguages 的 JSON |

  | --- | --- |

  | `{` `"OtherLanguages": [` `"Polish",` `"Chinese",` `"Japanese"` `],` `"HireDate":
  "2008-04-19T00:00:00",` `"Title": "Team Member",` `"PrimarySalesTerritory": "Plains",`
  `"CommissionRate": "0.98"` `}` | `{` `"HireDate": "2008-04-19T00:00:00",` `"Title":
  "Team Member",` `"PrimarySalesTerritory": "Plains",` `"CommissionRate": "0.98"`
  `}` |


  ```sql

  declare @j as nvarchar(MAX) =

  N''{

  "OtherLanguages": [

  "Polish",

  "Chinese",

  "Japanese"

  ],

  "HireDate": "2008-04-19T00:00:00",

  "Title": "Team Member",

  "PrimarySalesTerritory": "Plains",

  "CommissionRate": "0.98"

  }'';

  SELECT JSON_MODIFY(@j,''$.OtherLanguages'', NULL) DeletedOtherLanguages;

  ```

  列表 10-4.

  删除数组


  另一个例子演示了从分配给变量 `@j` 的 JSON 文档中删除对象“table”，如列表 10-5 所示。表 10-2 对比了原始 JSON 和经过 `JSON_MODIFY()`
  函数处理后的 JSON。


  表 10-2.


  并排比较结果


  | 原始 JSON | 删除了对象 table 的 JSON |

  | --- | --- |

  | `{` `"theme": "humanity",` `"dateFormat": "dd/mm/yy",` `"timeZone": "PST",` `"table":
  {` `"pagingType": "full",` `"pageLength": 50` `},` `"favoritesOnDashboard": true`
  `}` | `{` `"theme": "humanity",` `"dateFormat": "dd/mm/yy",` `"timeZone": "PST",`
  `"favoritesOnDashboard": true` `}` |


  ```sql

  declare @j nvarchar(MAX) =

  N''{

  "theme": "humanity",

  "dateFormat": "dd/mm/yy",

  "timeZone": "PST",

  "table": {

  "pagingType": "full",

  "pageLength": 50

  },

  "favoritesOnDashboard": true

  }'';

  SELECT JSON_MODIFY(@j,''$.table'', NULL) Delete_table;

  ```

  列表 10-5.

  从 JSON 文档中删除对象 “table”


  所有示例都展示了使用 `JSON_MODIFY()` 函数从 JSON 字符串中删除键、对象和数组是多么容易。


  ## 10-4. 追加 JSON 属性


  ### 问题


  你想向现有数组添加一个新值。


  ### 解决方案


  `JSON_MODIFY()` 函数的追加模式指定需要将新值添加到现有的数组列表中。列表 10-6 演示了如何向“OtherLanguages”数组添加新语言。带有
  JSON 输出的返回结果的“前后”对比显示在图 10-4 中。


  ![A435478_1_En_10_Fig4_HTML.jpg](img/A435478_1_En_10_Fig4_HTML.jpg)


  图 10-4.


  显示新语言追加到 JSON 数组


  ```sql

  SELECT CustomFields

  ,JSON_MODIFY(CustomFields,''append $.OtherLanguages'', ''Greek'') AS

  AppendOtherLanguagesArray

  FROM [Application].[People]

  WHERE FullName = ''Isabella Rupp'';

  ```

  列表 10-6.

  将希腊语追加到 JSON 数组


  ### 工作原理


  `JSON_MODIFY()` 函数提供了一个可选的追加模式。追加模式指定了路径参数，并指示 `JSON_MODIFY()` 函数向现有列表添加新值。当指定了追加模式但键路径不存在时，`JSON_MODIFY()`
  函数会创建一个新的键值对。例如，如果列表 10-6 中的解决方案查询在“OtherLanguages”数组以小写拼写时执行，如列表 10-7 所示。此时，`JSON_MODIFY()`
  函数会创建一个新的“otherlanguages”数组。结果如图 10-5 所示。


  ![A435478_1_En_10_Fig5_HTML.jpg](img/A435478_1_En_10_Fig5_HTML.jpg)


  图 10-5.


  显示带有重复数组的 JSON


  ```sql

  SELECT CustomFields

  ,JSON_MODIFY(CustomFields,''append $.otherlanguages'', ''Greek'') AS

  AppendOtherLanguagesArray

  FROM [Application].[People]

  WHERE FullName = ''Isabella Rupp'';

  ```

  列表 10-7.

  追加一个不存在的数组


  为避免此类错误，请确保为 `JSON_MODIFY()` 函数路径参数提供了正确的 JSON 路径。


  ## 10-5. 使用多重操作进行修改


  ### 问题


  你想对 JSON 字符串应用多个值更改。


  ### 解决方案


  使用提供的参数为 `JSON_MODIFY()` 函数创建多个内联引用。列表 10-8 演示了多次调用 `JSON_MODIFY()` 函数。以下内容被依次更改：


  1.  将值“Greek”追加到“OtherLanguages”数组。

  2.  将“Title”:“Team Member”更新为“Title”:“Manager”。

  3.  插入“CommissionRate”:“1.19”键值对。


  表 10-3 对比了原始 JSON 和经过 `JSON_MODIFY()` 函数处理后的 JSON。


  表 10-3.


  并排比较结果


  | 原始 JSON | 修改后的 JSON |

  | --- | --- |

  | `{` `"OtherLanguages": [` `"Turkish",` `"Slovenian"` `],` `"HireDate": "2010-08-24T00:00:00",`
  `"Title": "Team Member"` `}` | `{ "OtherLanguages": [` `"Turkish",` `"Slovenian",`
  `"Greek"` `],` `"HireDate": "2010-08-24T00:00:00",` `"Title": "Manager",` `"CommissionRate":
  "1.19"` `}` |


  ```sql

  SELECT CustomFields

  ,JSON_MODIFY(

  JSON_MODIFY(

  JSON_MODIFY(CustomFields,''append $.OtherLanguages'', ''Greek'')

  , ''$.Title'', ''Manager'')

  ,''$.CommissionRate'', ''1.19'') AS Multi_Changes

  FROM [Application].[People]

  WHERE FullName = ''Isabella Rupp'';

  ```

  列表 10-8.

  演示多次调用 `JSON_MODIFY()` 函数


  ### 工作原理


  `JSON_MODIFY()` 函数能够通过连续的内联调用进行多重修改。`JSON_MODIFY()` 函数返回修改后的 JSON。因此，每个返回的 JSON
  字符串都可以被连续处理以进行另一次修改。


  ## 10-6. 重命名 JSON 键


  ### 问题


  你想重命名一个 JSON 键。





  ## 10-7\. 修改 JSON 对象


  ### 问题


  你需要替换 JSON 数组对象中的所有值。


  ### 解决方案


  `JSON_MODIFY()` 函数通过指定的 `Path` 和 `NewValue` 参数来替换 JSON 数组中的所有值。代码清单 10-10 展示了替换
  JSON 数组的解决方案部分。表 10-5 对原始和修改后的 JSON 数组进行了并排比较。


  表 10-5.

  JSON 结果的并排比较


  | 原始 JSON | 修改后的 JSON |

  | --- | --- |

  | `{` `"OtherLanguages": [` `"Turkish", "Slovenian"` `],` `"HireDate": "2010-08-24T00:00:00",`
  `"Title": "Team Member"` `}` | `{` `"OtherLanguages": [` `"Dutch", "Latvian", "Lithuanian"`
  `],` `"HireDate": "2010-08-24T00:00:00",` `"Title": "Team Member"` `}` |


  ```sql

  SELECT CustomFields, JSON_MODIFY(CustomFields, ''$.OtherLanguages'',

  JSON_QUERY(''["Dutch","Latvian","Lithuanian"]'')) OtherLanguages

  FROM [Application].[People]

  WHERE FullName = ''Isabella Rupp'';

  ```

  代码清单 10-10.

  替换 JSON 数组


  ### 工作原理


  要替换 JSON 数组，`JSON_MODIFY()` 函数会检测并验证参数路径，然后将 `newValue` 参数应用于 JSON。`NewValue` 参数必须是一个有效的
  JSON 数组或对象部分。例如，`["Dutch", "Latvian", "Lithuanian"]` 就是代码清单 10-10 中使用的 `NewValue`
  参数的一个有效数组部分。


  `JSON_MODIFY()` 函数的行为特性在于，`newValue` 参数中的值会被视为字符串处理。因此，所有特殊字符（例如：双引号、正斜杠和反斜杠）都会使用反斜杠
  `"\\"` 进行转义。这就是为什么 `NewValue` 参数需要用 `JSON_QUERY()` 函数包裹起来以移除转义字符的原因。


  解决方案部分提供了一个用于创建 JSON 数组的查询。然而，代码清单 10-11 展示了一个用于替换 JSON 对象的类似方案。提醒一下：数组由方括号包围，包含同一属性和类型的值列表。而当对象由花括号
  `{}` 包围时，它可以包含具有不同属性和类型的键值对列表。表 10-6 对原始和修改后的 JSON 对象进行了并排比较。


  表 10-6.

  JSON 结果的并排比较


  | 原始 JSON | 修改后的 JSON |

  | --- | --- |

  | `{` `"theme": "ui-darkness",` `"dateFormat": "dd/mm/yy",` `"timeZone": "PST",`
  `"table": {` `"pagingType": "simple",` `"pageLength": 10` `},` `"favoritesOnDashboard":
  true` `}` | `{` `"theme": "ui-darkness",` `"dateFormat": "dd/mm/yy",` `"timeZone":
  "PST",` `"table": {` `"pagingType": "full",` `"pageLength": 25,` `"pageScope": "private"`
  `},` `"favoritesOnDashboard": true` `}` |


  ```sql

  SELECT [UserPreferences],

  JSON_MODIFY([UserPreferences], ''$.table'',

  JSON_QUERY(''{"pagingType":"full","pageLength":25,"pageScope":"private"}'')   )
  AS ModifiedUserPreferences

  FROM [Application].[People]

  WHERE FullName = ''Isabella Rupp'';

  ```

  代码清单 10-11.

  替换 JSON 对象


  另一种解决方案可以是：

  1.  删除 `OtherLanguages` 数组。

  2.  使用新内容重新插入 `OtherLanguages` 数组。


  该技术的代码展示在代码清单 10-12 中。代码的执行结果如图 10-7 所示。


  ![A435478_1_En_10_Fig7_HTML.jpg](img/A435478_1_En_10_Fig7_HTML.jpg)

  图 10-7.

  显示查询输出


  ```sql

  SELECT CustomFields,

  JSON_MODIFY(

  JSON_MODIFY(CustomFields, ''$.OtherLanguages'', NULL), ''$.OtherLanguages'', JSON_QUERY(''["Dutch","Latvian","Lithuanian"]''))
  OtherLanguages

  FROM [Application].[People]

  WHERE FullName = ''Isabella Rupp'';

  ```

  代码清单 10-12.

  演示删除并重新插入的查询


  这种技术的低效之处（我倾向于不使用“有问题”这个词，因为代码返回了正确的结果）在于：

  *   `OtherLanguages` 数组会移动到 JSON 的最后位置，因此该数组会丢失其在 JSON 文档中的原始位置。

  *   你需要额外实现一个 `JSON_MODIFY()` 函数。


  我不推荐使用这种技术来替换对象或数组。


  ## 10-8\. 比较 XML 与 JSON


  ### 问题


  你想比较 XML 和 JSON 的性能。


  ### 解决方案


  该解决方案分几个步骤实现。代码清单 10-13 展示了该过程的 T-SQL 代码。表 10-7 对 JSON 和 XML 进行了并排比较。


  比较步骤：

  1.  创建两个表，一个用于 JSON 字符串，另一个用于 XML 实例。

  2.  创建一个插入过程，将相同的数据转换为 JSON 和 XML。

  3.  运行 XML 分解（shredding）。

  4.  运行 JSON 分解（shredding）。

  5.  比较结果（将在“工作原理”部分进行回顾）


  表 10-7.

  JSON 文档与 XML 实例的并排比较


  | JSON 文档 | XML 实例 |

  | --- | --- |

  | `{` `"Database": "WideWorldImporters",` `"Tables": {` `"SchemaName": "Warehouse",`
  `"TableName": "Colors",` `"Columns": [` `{"ColumnName": "ColorID"},` `{"ColumnName":
  "ColorName"},` `{"ColumnName": "LastEditedBy"},` `{"ColumnName": "ValidFrom"},`
  `{"ColumnName": "ValidTo"}` `]` `}` `}` | `<TableInfo>` `<Database>WideWorldImporters</Database>`
  `<Tables>` `<SchemaName>Warehouse</SchemaName>` `<TableName>Colors</TableName>`
  `<Columns>` `<Column ColumnName="ColorID" />` `<Column ColumnName="ColorName" />`
  `<Column ColumnName="LastEditedBy" />` `<Column ColumnName="ValidFrom" />` `<Column
  ColumnName="ValidTo" />` `</Columns>` `</Tables>` `</TableInfo>` |




  ## XML 插入

  ```

  SET NOCOUNT ON;

  DECLARE @XML XML,

  @schema nvarchar(30),

  @tbl nvarchar(128),

  @objID int,

  @time datetime2;

  DROP TABLE IF EXISTS dbo.Table_Info_XML;

  CREATE TABLE Table_Info_XML (

  TableID int PRIMARY KEY,

  DBName nvarchar(128),

  [SchemaName] nvarchar(30),

  tblName nvarchar(128),

  XMLDoc XML

  );

  DECLARE cur CURSOR FOR

  SELECT object_id, [Schema].name, [Table].name

  FROM sys.objects [Table]

  JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

  WHERE type = ''u'';

  OPEN cur;

  FETCH NEXT FROM cur INTO @objID, @schema, @tbl;

  SET @time = GETDATE();

  WHILE @@FETCH_STATUS = 0

  BEGIN

  SELECT @XML = (

  SELECT db_name() as ''Database'',

  [Schema].name as ''Tables/SchemaName'',

  [Table].name as ''Tables/TableName'',

  (SELECT name as ColumnName FROM sys.columns [Column]

  WHERE [Column].object_id = [Table].object_id FOR XML AUTO, TYPE

  ) AS ''Tables/Columns''

  FROM sys.objects [Table]

  JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

  WHERE [Table].object_id = @objID

  FOR XML PATH(''TableInfo'')

  );

  INSERT Table_Info_XML

  SELECT @objID, DB_NAME(), @schema, @tbl, @XML;

  FETCH NEXT FROM cur INTO @objID, @schema, @tbl;

  END;

  DEALLOCATE cur ;

  SELECT DATEDIFF(MILLISECOND, @time, GETDATE()) as XML_TIME;

  SET NOCOUNT OFF;

  GO

  ```

  ## JSON 插入

  ```

  SET NOCOUNT ON;

  DECLARE @JSON nvarchar(MAX),

  @schema nvarchar(30),

  @tbl nvarchar(128),

  @objID int,

  @time datetime2

  DROP TABLE IF EXISTS dbo.Table_Info_JSON;

  CREATE TABLE Table_Info_JSON (

  TableID int PRIMARY KEY,

  DBName nvarchar(128),

  [SchemaName] nvarchar(30),

  tblName nvarchar(128),

  JSONDoc nvarchar(MAX)

  );

  DECLARE cur CURSOR FOR

  SELECT object_id, [Schema].name, [Table].name

  FROM sys.objects [Table]

  JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

  WHERE type = ''u'';

  OPEN cur;

  FETCH NEXT FROM cur INTO @objID, @schema, @tbl;

  SET @time = GETDATE();

  WHILE @@FETCH_STATUS = 0

  BEGIN

  SELECT @JSON = (

  SELECT db_name() as ''Database'',

  [Schema].name as ''Tables.SchemaName'',

  [Table].name as ''Tables.TableName'',

  (SELECT [Column].name ColumnName FROM sys.columns [Column]

  WHERE [Column].object_id = [Table].object_id FOR JSON AUTO

  ) AS ''Tables.Columns''

  FROM sys.objects [Table]

  JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

  WHERE [Table].object_id = @objID

  FOR JSON PATH, WITHOUT_ARRAY_WRAPPER

  );

  INSERT Table_Info_JSON

  SELECT @objID, DB_NAME(), @schema, @tbl, @JSON;

  FETCH NEXT FROM cur INTO @objID, @schema, @tbl;

  END;

  DEALLOCATE cur ;

  SELECT DATEDIFF(MILLISECOND, @time, GETDATE()) as JSON_TIME;

  SET NOCOUNT OFF;

  GO

  ```

  ## 切分 XML

  ```

  SET STATISTICS TIME ON;

  SELECT clm.value(''../../../Database[1]'', ''varchar(50)'') as [Database]

  ,clm.value(''../../SchemaName[1]'', ''varchar(50)'') as SchemaName

  ,clm.value(''../../TableName[1]'', ''varchar(50)'') as TableName

  ,clm.value(''@ColumnName'', ''varchar(50)'') as ColumnName

  FROM dbo.Table_Info_XML

  CROSS APPLY XMLDoc.nodes(''TableInfo/Tables/Columns/Column'') as tbl(clm);

  SET STATISTICS TIME OFF;

  ```

  ## 切分 JSON

  ```

  SET STATISTICS TIME ON;

  SELECT db.[Database]

  , tbl.SchemaName

  , tbl.TableName

  , clmn.ColumnName

  FROM dbo.Table_Info_JSON

  CROSS APPLY OPENJSON (JSONDoc)

  WITH

  (

  [Database] varchar(30),

  [Tables] nvarchar(MAX) AS JSON

  ) as db

  CROSS APPLY OPENJSON ([Tables])

  WITH

  (

  TableName varchar(30),

  SchemaName varchar(30),

  [Columns] nvarchar(MAX) AS JSON

  ) as tbl

  CROSS APPLY OPENJSON ([Columns])

  WITH

  (

  ColumnName varchar(30)

  ) as clmn

  SET STATISTICS TIME OFF ;

  ```

  *清单 10-13. 演示 T-SQL 代码*


  ### 工作原理

  比较 XML 和 JSON 的五步机制已在“解决方案”部分列出，同时列出了用于创建表、建立并运行游标以使用 `FOR XML` 子句加载 XML 和使用 `FOR
  JSON` 子句加载 JSON 的 T-SQL 代码（清单 10-13）；最后一步是将 XML 和 JSON 列切分为行集。到目前为止，您应该对这段代码很熟悉了，因为本例的代码与前面几个配方中的代码非常相似。


  该比较在 WideWorldImporters 数据库上运行。但是，该代码与数据库无关，可以在兼容级别为 130 或更高的任何数据库上运行。在“工作原理”部分，我想比较两个过程的性能数字。插入运行时间（以毫秒为单位）如表
  10-8 所示。在 `Table_Info_JSON` 和 `Table_Info_XML` 表中，都插入了 573 行。测量是通过 `DATEDIFF()`
  函数对 JSON 和 XML 插入分别进行的。在游标启动之前将开始时间分配给一个变量，并在游标释放之后执行函数调用。


  **表 10-8. 并排比较插入时间**


  | JSON 插入 | XML 插入 |

  | --- | --- |

  | 20 毫秒 | 26 毫秒 |


  切分操作通过启用 `STATISTICS TIME` 进行测量。每个切分过程单独运行，并使用 SSMS 选项“结果到文本”（“结果到网格”返回的数字略高）。


  JSON 切分记录：

  ```

  (573 行受影响)

  SQL Server 执行时间:

  CPU 时间 = 0 ms， 已用时间 = 14 ms。

  ```


  XML 切分记录：

  ```

  (573 行受影响)

  SQL Server 执行时间:

  CPU 时间 = 15 ms， 已用时间 = 21 ms。

  ```


  > **注意**

  >

  > 在您的电脑上，输出的性能数字可能有所不同。


  总而言之，在插入和切分过程中，JSON 的性能明显略优于 XML。然而，这并不意味着您需要立即实施 JSON！每种技术都有其优缺点。例如，JSON 比 XML
  更轻量，处理速度更快，因此对于相对较小且没有深层父子结构的文档来说可能是一个不错的选择。然而，截至目前，JSON 是字符串数据格式，无法与稳固的 XML 数据类型竞争，后者实际上是一种语言。有许多选项使
  XML 不可替代：XML Schema、属性和命名空间等。我建议不要采取极端行动。任何技术都应结合最佳实用性能来使用，即根据具体情况选择更合适的方案。



