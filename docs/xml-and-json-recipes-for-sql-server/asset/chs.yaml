  \ 说明了如何为变量设置表达式。\n\n## 显示脚本任务管理器属性\n\n脚本任务“创建 XML 文件”，顾名思义，将 XML 文件写入目标文件路径，该路径通过\
  \ SSIS 包的 `FileDestinationPath` 变量分配，该变量具有公共接口，在包外部可见。脚本任务是一个编程模块，开发人员可以在其中使用 C#\
  \ 和 VB.NET 语言编写实现功能的代码，这使得脚本任务在 SQL Server 开发人员中非常受欢迎。然而，脚本任务可以简化并扩展 SSIS 包的功能。对于脚本任务“创建\
  \ XML 文件”，需要使用几行代码来完成该过程。要配置该任务：\n\n*   从工具箱中将“脚本任务”拖到开发区域。\n*   将名称更改为“创建 XML 文件”。\n\
  *   将“获取 XML 内容”任务与“创建 XML 文件”任务链接起来。单击“获取 XML 内容”任务，抓住绿色箭头，拖动到“创建 XML 文件”任务上，然后释放鼠标。这将在两个任务之间创建一个优先级约束（此包不需要配置优先级约束）。参见图\
  \ 3-11，说明了优先级约束的初始化。\n\n![A435478_1_En_3_Fig11_HTML.jpg](img/A435478_1_En_3_Fig11_HTML.jpg)\n\
  \n**图 3-11. 在任务之间创建优先级约束**\n\n*   要加载脚本任务管理器，请双击“创建 XML 文件”任务。\n*   默认情况下，脚本任务管理器的\
  \ `ScriptLanguage` 设置为 `Microsoft Visual C# 2015`（Microsoft Visual Basic 2015 是另一个选项；但是，本示例将使用\
  \ C#），并且在脚本任务编辑器中 `EntryPoint` 属性设置为 `“Main”`（脚本首先执行的函数名）。\n*   此任务中的变量无需更改。因此，单击\
  \ `ReadOnlyVariables` 属性以将变量绑定到任务。在属性的右侧，单击按钮以加载包变量列表。在变量 `User::FileDestinationPath`、`User::TimeStamp`、`User::XMLData_Content`\
  \ 旁边放置一个勾选标记，然后单击“确定”。\n*   单击“编辑脚本…”按钮以加载编程模块。图 3-12 说明了脚本任务管理器属性。\n\n**提示**\n\n\
  在单击“编辑脚本…”按钮之前，请高亮显示并复制所有已选择的变量。您稍后在代码模块中将需要它们。另外，请记住，在代码中引用变量名时，它们是区分大小写的。\n\n\
  当脚本编辑器窗口加载后，转到 `Main()` 函数。默认情况下，`Main()` 包含清单 3-4 中所示的代码。\n\n```csharp\npublic\
  \ void Main()\n{\n    // TODO: Add your code here\n    Dts.TaskResult = (int)ScriptResults.Success;\n\
  }\n```\n\n**清单 3-4. 显示 Main() 函数的默认代码**\n\n首先，将值 `“TODO: Add your code here”` 替换为已保存的变量列表。保留\
  \ `“//”`，因为它表示注释。接下来，声明两个字符串变量并重新分配包变量的值（使用您保存的变量引用）。`Main()` 函数变量 `strFilePath`\
  \ 的结果将是 XML 文件路径；因此，包变量 `FileDestinationPath` 被硬编码为 `“Categories_”` 加上包变量 `TimeStamp`\
  \ 和 `“.xml”` 作为文件扩展名，指示 XML 文件的目标路径。\n\n`Main()` 函数的第二部分实际将 XML 文件写入存储。我们需要创建一个\
  \ `StreamWriter` 对象的实例。`StreamWriter` 类属于 `System.IO` 命名空间，该命名空间不是编程模块的默认命名空间的一部分，这意味着我们有两种选择：在代码中添加\
  \ `“using System.IO;”` 语句，或者使用 `System.IO` 命名空间作为完全限定符来引用 `StreamWriter` 类。因此，我们只需要一行代码来实例化\
  \ `StreamWriter` 类。在下面的例子中，我们将在 `Main()` 函数的代码中使用第二个选项。清单 3-5 中的代码演示了用于写入文件的 C#\
  \ 代码。\n\n```csharp\npublic void Main()\n{\n    // User::FileDestinationPath,User::TimeStamp,User::XMLData_Content\n\
  \    string strFilePath = Dts.Variables[\"User::FileDestinationPath\"].Value.ToString()\
  \ + @\"\\\\Categories_\" + Dts.Variables[\"User::TimeStamp\"].Value.ToString() +\
  \ \".xml\";\n    string strXML = Dts.Variables[\"User::XMLData_Content\"].Value.ToString();\n\
  \    System.IO.StreamWriter file = new System.IO.StreamWriter(strFilePath);\n  \
  \  file.Write(strXML);\n    file.Close();\n    Dts.TaskResult = (int)ScriptResults.Success;\n\
  }\n```\n\n**清单 3-5. 用于写入 XML 文件的函数编码**\n\n要完成脚本任务，请保存并关闭脚本编辑器窗口。单击脚本任务的“确定”按钮。您的\
  \ SSIS 包现在可以进行测试了。\n\n## 测试 SSIS 包\n\n要测试 SSIS 包，请按“开始”按钮。当 SSIS 成功完成时，每个任务上都会显示带有复选标记的绿色圆圈。图\
  \ 3-13 说明了 SSIS 包成功完成的情况。\n\n![A435478_1_En_3_Fig13_HTML.jpg](img/A435478_1_En_3_Fig13_HTML.jpg)\n\
  \n**图 3-13. 测试 SSIS 包**\n\n\n要停止 SSIS 包，请按红色方块按钮，或单击包底部的“Package execution completed\
  \ with success”链接。图 3-14 说明了停止包的选项。\n\n![A435478_1_En_3_Fig14_HTML.jpg](img/A435478_1_En_3_Fig14_HTML.jpg)\n\
  \n图 3-14. 显示切换包到设计模式的选项\n\n至此，SSIS 包开发完成，XML 文件已在指定目标文件夹 `C:\\TEMP` 中创建。\n\n###\
  \ 工作原理\n\nSSIS 包 `Get XML Content` 中的 `Execute SQL Task` 向 SQL Server 提交查询。`Connection\
  \ Manager` 提供对 SQL Server 实例和数据库名称的引用，必要时还包括连接凭据。查询结果被赋值给包级变量 `XMLData_Content`。`TimeStamp`\
  \ 变量的表达式计算日期和时间，以提供唯一性并防止文件冲突。\n\n`Create XML File` `Script Task` 执行 C# 代码，将 XML\
  \ 结果写入文件。包变量提供文件内容和 XML 文件路径。\n\n## 3-3. 从存储过程加载 XML\n\n### 问题\n\n你想利用 T-SQL 从一个或多个源位置读取\
  \ XML 文件。\n\n### 解决方案\n\nSQL Server 能够读取 XML 文件内容并将 XML 写入表中。将文件写入存储与从存储将 XML 数据写入表（加载\
  \ XML）的机制是不同的。当文件写入存储时，我们处理的是每个文件一个 XML 输出。然而，当加载文件时，源位置可能有一个或多个文件。因此，T-SQL 代码需要解决以下问题：\n\
  \n*   获取符合特定条件的文件名；例如，所有扩展名为 `.xml` 的文件。\n*   访问每个文件并读取文件内容。\n*   将文件内容加载（`INSERT`）到表中。\n\
  \n代码清单 3-6 演示了此问题的解决方案。\n\n```sql\nCREATE PROCEDURE dbo.usp_LoadXMLFromFile\n@FilePath\
  \ nvarchar(100)\nAS\nBEGIN\nSET NOCOUNT ON;\n-- Prepare log table\nDECLARE @cmd\
  \ TABLE\n(\nname NVARCHAR(35),\nminimum INT,\nmaximum INT,\nconfig_value INT,\n\
  run_value INT\n);\nDECLARE @run_value        INT;\n-- Save original configuration\
  \ set\nINSERT @cmd\n(\nname,\nminimum,\nmaximum,\nconfig_value,\nrun_value\n)\n\
  EXEC sp_configure 'xp_cmdshell';\nSELECT @run_value = run_value\nFROM @cmd;\nIF\
  \ @run_value = 0\nBEGIN\n-- Enable xp_cmdshell\nEXEC sp_configure 'xp_cmdshell',\
  \ 1;\nRECONFIGURE;\nEND;\nIF NOT EXISTS\n(\nSELECT *\nFROM sys.objects\nWHERE object_id\
  \ = OBJECT_ID(N'[dbo].[_XML]') AND type in (N'U')\n)\nCREATE TABLE dbo._XML\n(\n\
  ID INT NOT NULL IDENTITY(1,1) PRIMARY KEY,\nXMLFileName NVARCHAR(300),\nXML_LOAD\
  \ XML,\nCreated DATETIME\n)\nELSE\nTRUNCATE TABLE dbo._XML;\nDECLARE @DOS NVARCHAR(300)\
  \ = N'',\n@DirBaseLocation NVARCHAR(500),\n@FileName NVARCHAR(300),\n@SQL NVARCHAR(1000)\
  \ = N'';\nDECLARE @files TABLE\n(\ntID INT IDENTITY(1,1) NOT NULL PRIMARY KEY,\n\
  XMLFile NVARCHAR(300)\n);\n-- Verify that last character is \\\nSET @DirBaseLocation\
  \ = IIF(RIGHT(@FilePath, 1) = '\\', @FilePath, @FilePath + '\\');\nSET @DOS = 'dir\
  \ /B /O:-D ' + @DirBaseLocation;\nINSERT @files\n(\nXMLFile\n)\nEXEC master..xp_cmdshell\
  \ @DOS;\nIF @run_value = 0\nBEGIN\n-- Disable xp_cmdshell\nEXECUTE sp_configure\
  \ 'xp_cmdshell', 0;\nRECONFIGURE;\nEND;\nDECLARE cur CURSOR\nFOR          SELECT\
  \ XMLFile\nFROM @files\nWHERE XMLFile like '%.xml';\nOPEN cur;\nFETCH NEXT\nFROM\
  \ cur\nINTO @FileName;\nWHILE @@FETCH_STATUS = 0\nBEGIN\nBEGIN TRY\nSET @SQL = 'INSERT\
  \ INTO _XML SELECT ''' + @DirBaseLocation + @FileName\n+ ''', X, GETDATE()  FROM\
  \ OPENROWSET(BULK N''' + @DirBaseLocation + @FileName\n+ ''', SINGLE_BLOB) as tempXML(X)';\n\
  EXECUTE sp_executesql @SQL;\nFETCH NEXT\nFROM cur\nINTO @FileName;\nEND TRY\nBEGIN\
  \ CATCH\nSELECT @SQL, ERROR_MESSAGE();\nEND CATCH\nEND;\nCLOSE cur;\nDEALLOCATE\
  \ cur;\nSET NOCOUNT OFF;\nEND;\nGO\n```\n代码清单 3-6. 演示存储过程 usp_LoadXMLFromFile\n\n\
  \n\n### 工作原理\n\n存储过程 `usp_LoadXMLFromFile`（如清单 3-6 所示）提供了一种从一个或多个文件加载 XML 数据的解决方案。该存储过程有一个输入参数\
  \ `@FilePath`，数据类型为 `nvarchar(100)`。此参数用于指定 XML 源文件的位置。\n\n1.  启用/禁用扩展存储过程 `xp_cmdshell`\
  \ 的机制在配方 3-1 中有描述。此过程对于存储过程 `usp_LoadXMLFromFile` 是相同的。\n2.  我们需要确保目标表 `_XML` 存在。如果数据库中没有该表，则需要创建它。如果表已存在，根据业务需求，可以截断数据或保留历史数据。以下示例展示了如何截断表：\n\
  \n    ```\n    IF NOT EXISTS (SELECT * FROM sys.objects\n    WHERE object_id = OBJECT_ID(N'[dbo].[_XML]')\
  \ AND type in (N'U'))\n    CREATE TABLE _XML\n    (\n    ID int IDENTITY(1,1) PRIMARY\
  \ KEY\n    ,XMLFileName nvarchar(300)\n    ,XML_LOAD XML, Created datetime\n   \
  \ )\n    ELSE\n    TRUNCATE TABLE _XML\n    ```\n\n3.  为处理需求声明多个变量：\n\n    ```\n\
  \    @DOS nvarchar(300) = '' – 准备 DOS 命令。\n    @DirBaseLocation nvarchar(500) –\
  \ 验证并格式化源路径。\n    @FileName nvarchar(300) – 用于获取文件名。\n    @SQL nvarchar(1000) =\
  \ '' – 准备用于 INSERT 过程的 SQL。\n    @files TABLE – 用于从源位置获取所有文件名。\n    ```\n\n4.  验证最后一个字符是反斜杠\
  \ (`\\`)。我们需要确保存储过程接收到以 `\\` 结尾的有效路径。如果缺少最后一个反斜杠，则需要向提供的路径添加一个反斜杠。例如：\n\n    ```\n\
  \    IIF(RIGHT(@FilePath, 1) = '\\', @FilePath, @FilePath + '\\');\n    ```\n\n\
  \    `IIF` 函数由 SQL Server 2012 版引入。该函数有三个参数：\n    1.  条件 - `RIGHT(@FilePath, 1)\
  \ = '\\'` 用于检查最后一个字符是否为 `\\`。\n    2.  真值结果 - 当找到该字符时，不执行任何操作。\n    3.  假值结果 - 当未找到时，向参数添加\
  \ `\\`。\n5.  准备 Windows 命令解释器命令，以从源位置获取所有文件的列表。Windows 命令解释器命令 `dir` 返回指定路径下的所有文件和子目录。但是，`dir`\
  \ 命令除了文件名外还返回其他信息。`\"/B\"` 表示使用裸格式（仅文件名），`\"/O:-D\"` 指定按创建日期降序排序。\n\n    ```\n \
  \   SET @DOS = 'dir /B /O:-D ' + @DirBaseLocation  ;\n    ```\n\n6.  扩展存储过程 `xp_cmdshell`\
  \ 执行 Windows 命令解释器命令，并将源位置的所有可用文件插入。\n\n    ```\n    INSERT @files\n    EXEC master..xp_cmdshell\
  \ @DOS;\n    ```\n\n7.  接下来，我们需要遍历扩展名为 `\".xml\"` 的每个文件。这可以通过为表变量声明游标并在游标上建立循环来完成。\n\
  \n    ```\n    DECLARE cur CURSOR\n    FOR     SELECT XMLFile\n    FROM @files\n\
  \    WHERE XMLFile like '%.xml';\n    OPEN cur;\n    FETCH NEXT\n    FROM cur\n\
  \    INTO @FileName;\n    WHILE @@FETCH_STATUS = 0\n    ```\n\n8.  在 `WHILE` 循环内，我们需要为每个文件组合\
  \ `INSERT` 语句，该语句读取文件内容并将 XML 插入 `_XML` 表。例如：\n\n    ```\n    INSERT INTO _XML\n\
  \    SELECT 'C:\\TEMP\\Categories.xml', X, GETDATE()\n    FROM OPENROWSET(BULK N'C:\\\
  TEMP\\Categories.xml', SINGLE_BLOB) AS tempXML(X);\n    ```\n\n    上述 SQL 代码的关键是\
  \ `OPENROWSET()` 函数。`BULK` 选项指定我们将从源文件中批量读取所有内容。然后是 `BULK` 后面的一个空格，接着是文件位置。`SINGLE_BLOB`\
  \ 选项指定文件内容作为单列返回，数据类型为 `VARBINARY(MAX)`，这非常适合 XML 数据。别名语法 `AS tempXML(X)` 必须是 `table(column)`\
  \ 格式：\n    *   `tempXML` – 表别名\n    *   `X` – 列别名\n    其他 `OPENROWSET` 选项 `SINGLE_CLOB`（返回\
  \ `varchar(max)`）和 `SINGLE_NCLOB`（返回 `nvarchar(max)`）不适合 XML 导入数据，因为只有 `SINGLE_BLOB`\
  \ 支持所有 Windows 编码转换。\n9.  系统存储过程 `sp_executesql` 执行组合好的 SQL。\n\n    ```\n    EXECUTE\
  \ sp_executesql @SQL ;\n    ```\n\n10. 错误处理程序允许进程运行，并返回有问题的 SQL 的错误详情。可选地，您可以创建一个表来记录错误。运行存储过程的代码示例：\n\
  \n    ```\n    EXEC dbo.usp_LoadXMLFromFile 'C:\\Temp'\n    ```\n\n但是，缺点是您将丢失错误处理程序日志记录，并且如果正在加载的其中一个文件失败，则该文件将不会被加载。\n\
  \n## 3-4. 从 SSIS 包加载 XML\n\n### 问题\n\n您希望使用一个 SSIS ETL 包将一个或多个 XML 文件加载到数据库中。\n\n\
  \n\n### 解决方案\n\nSSIS 提供了一套全面的工具，用于从指定目录加载 XML 文件。\n\n一个用于加载多个 XML 文件的 SSIS 包，比配方\
  \ 3-2 “从 SSIS 包创建 XML” 中展示的写入 XML 文件的 SSIS 包更复杂。`LoadXMLFromFile` 这个 SSIS 包是基于以下业务规则创建的：\n\
  \n1.  检查源目录中是否存在 `.xml` 文件。\n2.  如果在源位置未找到文件，则停止包执行。\n3.  如果找到匹配的文件，则截断目标表。\n4.\
  \  从所有可用的 `.xml` 扩展名文件加载 XML 内容。\n5.  将所有已处理的文件移动到 Archive 文件夹。\n\n`LoadXMLFromFile`\
  \ SSIS 包由以下部分组成：\n\n![A435478_1_En_3_Fig15_HTML.jpg](img/A435478_1_En_3_Fig15_HTML.jpg)\n\
  *图 3-15. 展示设计模式下的 `LoadXMLFromFile` SSIS 包*\n\n1.  一个“Check If File Exists”脚本任务，它使用\
  \ C# 代码来验证源位置是否存在任何 XML 文件。\n2.  优先级约束（在“Check If File Exists”和“Truncate Table”之间的绿色箭头）公式有条件地验证\
  \ `FlagIsFileExist` 变量，并扮演“停止”或“继续”的角色。\n3.  一个执行 SQL 任务“Truncate Table”，有条件地执行\
  \ T-SQL 代码来创建或截断表。\n4.  “Load XML Content” 循环容器遍历 XML 文件。\n5.  “Insert XML Data”\
  \ 执行 SQL 任务执行一条 T-SQL 语句，将 XML 文件内容插入到 `_XML` 表中。\n6.  “Archive File” 文件系统任务将 XML\
  \ 文件移动到 Archive 文件夹。图 3-15 展示了该 SSIS 包。\n\n创建了以下 SSIS 包变量以提供包的灵活性和功能：\n\n1.  `ArchiveFile`\
  \ – 为文件系统任务“Archive File”提供 `DestinationVariable` 属性。使用表达式 `@[User::ArchiveLocation]\
  \ + @[User::FileName]` 创建。\n2.  `ArchiveLocation` – 提供存档文件夹的目标路径。\n3.  `FileName`\
  \ – 映射到循环容器“Load XML Content”。从每次迭代中获取 XML 文件名。\n4.  `FlagIsFileExist` – 被赋予 `true`\
  \ 或 `false` 值，并控制优先级约束表达式。\n5.  `SourceFile` – 为文件系统任务“Archive File”提供 `SourceVariable`。创建表达式\
  \ `@[User::SourceLocation] + @[User::FileName]`。\n6.  `SourceLocation` – 提供源文件夹的源路径。\n\
  7.  `SQLScript` – 组合 T-SQL 以将 XML 内容插入到 `_XML` 表中，使用以下表达式：\n\n```sql\n\"INSERT INTO\
  \ _XML\nSELECT '\" + @[User::SourceLocation]  + @[User::FileName] + \"', X, GETDATE()\n\
  FROM OPENROWSET(BULK N'\" + @[User::SourceLocation]  + @[User::FileName] + \"',\
  \ SINGLE_BLOB) as tempXML(X)\"\n```\n\n图 3-16 展示了变量列表。\n\n![A435478_1_En_3_Fig16_HTML.jpg](img/A435478_1_En_3_Fig16_HTML.jpg)\n\
  *图 3-16. 展示 SSIS 包变量列表*\n\n现在我们将讨论任务的配置。在本教程中，我不会深入太多细节，因为配方 3-2 已经详细涵盖了这个主题。\n\n\
  1.  **脚本任务 “Check If File Exists”。** 这次，脚本任务检查源位置是否有扩展名为 `.xml` 的文件。没有其他任务能提供此功能。两个变量被映射到该任务：\n\
  \n![A435478_1_En_3_Fig17_HTML.jpg](img/A435478_1_En_3_Fig17_HTML.jpg)\n*图 3-17.\
  \ 演示脚本任务变量映射*\n    *   `SourceLocation` – `ReadOnlyVariable`。\n    *   `FlagIsFileExist`\
  \ – `ReadWriteVariable`。代码可以修改该变量值。图 3-17 展示了变量。点击 `Edit Script` 命令按钮。将以下代码添加到 `Main()`\
