  dd\", GETDATE()),2)  + \"_\" +\nRIGHT(\"0\" + (DT_STR, 2, 1252) DATEPART(\"hh\"\
  , GETDATE()),2)  +\nRIGHT(\"0\" + (DT_STR, 2, 1252) DATEPART(\"mi\", GETDATE()),2)\
