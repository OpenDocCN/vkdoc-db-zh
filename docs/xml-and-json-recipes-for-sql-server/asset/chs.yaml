- "# 第一部分\nSQL Server 中的 XML\n\n## 1. XML 简介\n\n欢迎并感谢您阅读 *SQL Server 的 XML 和 JSON\
  \ 配方*。在信息技术的现代世界中，可靠且高效地存储和操作数据是首要任务之一。在过去十年中，SQL Server 已发展成为一个复杂的企业关系数据库管理系统工具，并且通过提供更多功能来可靠地存储和操作数据，它仍在不断发展。可扩展标记语言（XML）是\
  \ SQL Server 实现的技术之一，不仅用于数据操作，还用于许多内部用途，例如执行计划、扩展事件、DDL 触发器 `EventData()` 函数，以及\
  \ SQL Server 商业智能工具（`SSIS`、`SSRS`、`SSAS`）背后的构建基础。在本书的第一部分中，我将介绍并提供关于如何使用 SQL Server\
  \ `XML` 数据类型的配方；讨论并演示加载、构建和分解 XML 的真实场景；并展示如何通过应用 XML 技术简化日常任务。在本书中，我将主要关注技术而非理论。\n\
  \n### 踏入 XML 之门\n\n要使用 XML，我们需要理解这项技术，尤其是对于 SQL Server 而言。XML 类似于 HTML（超文本标记语言）。XML\
  \ 和 HTML 都包含标记元素来描述文件或页面（对于 HTML）的内容。它们之间最大的区别在于，HTML 包含预定义的元素（标签），而 XML 的元素和属性不是预定义的，而是基于文件内描述的数据。\n\
  \nHTML 和 XML 之间还有几个更重要的区别：\n\n*   XML 区分大小写，而 HTML 不区分。\n*   XML 的打开元素必须关闭。HTML\
  \ 可以有打开的元素而没有关闭元素。例如，`<DATA>Display Text` 在 HTML 中可以编译，但在 XML 中会返回错误。\n\n**注意**\n\
  \n默认情况下，SQL Server 不区分大小写。但是，XML 区分大小写，所有 XQuery 路径语言（XPath）函数和节点测试都区分大小写（全部小写）。如果输入时使用了小写以外的任何大小写形式，它们将返回错误。\n\
  \n### 示例数据库\n\n除非另有说明或在文中单独引用，本书第一部分的所有代码示例均使用 SQL Server AdventureWorks 示例数据库。AdventureWorks\
  \ 数据库的 URL 是 [`https://github.com/Microsoft/sql-server-samples/releases/tag/adventureworks2014`](https://github.com/Microsoft/sql-server-samples/releases/tag/adventureworks2014)。我强烈建议您下载并安装\
  \ AdventureWorks 示例数据库来运行提供的示例。\n\n### 理解 XML\n\n在使用 XML 之前，我们需要解释 SQL Server 支持的两种以节点为中心的\
  \ XML 格式之间的区别：\n\n1.  以元素为中心\n2.  以属性为中心\n\n元素和属性都可以包含数据。然而，SQL Server 针对每种格式的生成或分解（分解是将\
  \ XML 转换为行-列格式的过程）提供了专门的功能和特性。在以元素为中心的格式中，值包含在元素的开始和结束标签内，例如 `<元素名>`。以属性为中心的格式依赖于元素开始标签中元素的属性。它们通过等号分配值，并用双引号将值括起来，例如\
  \ `<元素名 属性=“值”>`。例如，清单 1 中的示例 SQL 查询返回两行，结果如图 1 所示。\n\n![A435478_1_En_1_Fig1_HTML.jpg](img/A435478_1_En_1_Fig1_HTML.jpg)\n\
  图 1-1. 来自示例 SQL 查询的结果数据集\n\n```sql\nSELECT TOP (2) Category.Name AS CategoryName,\n\
  Subcategory.Name AS SubcategoryName,\nProduct.Name,\nProduct.ProductNumber AS Number,\n\
  Product.ListPrice AS Price\nFROM  Production.Product Product\nINNER JOIN Production.ProductSubcategory\
  \ Subcategory\nON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\n\
  LEFT JOIN Production.ProductCategory Category\nON Subcategory.ProductCategoryID\
  \ = Category.ProductCategoryID\nWHERE Product.ListPrice > 0\nAND Product.SellEndDate\
  \ IS NULL\nORDER BY CategoryName, SubcategoryName;\n```\n清单 1-1. 简单的 SQL 查询\n\n\
  这是一个示例，展示了图 1 中的关系数据在以元素为中心的 XML 格式中可能的样子。请注意，在此格式中，所有值都表示为 XML 元素，如清单 2 所示。\n\n\
  ```xml\n<ProductCategory>\n  <Name>Accessories</Name>\n  <ProductSubcategory>\n\
  \    <Name>Bike Racks</Name>\n    <Product>\n      <Name>Hitch Rack - 4-Bike</Name>\n\
  \      <ProductNumber>RA-H123</ProductNumber>\n      <ListPrice>120.0000</ListPrice>\n\
  \    </Product>\n    <Product>\n      <Name>Bike Stands</Name>\n      <ProductNumber>ST-1401</ProductNumber>\n\
  \      <ListPrice>159.0000</ListPrice>\n    </Product>\n  </ProductSubcategory>\n\
  </ProductCategory>\n```\n清单 1-2. 显示以元素为中心的 XML\n\n从图 1 转换的关系数据可能看起来像清单 3 中所示的以属性为中心的\
  \ XML 格式。\n\n```xml\n<ProductCategory Name=\"Accessories\">\n  <ProductSubcategory\
  \ Name=\"Bike Racks\">\n    <Product Name=\"Hitch Rack - 4-Bike\" ProductNumber=\"\
  RA-H123\" ListPrice=\"120.0000\"/>\n    <Product Name=\"Bike Stands\" ProductNumber=\"\
  ST-1401\" ListPrice=\"159.0000\"/>\n  </ProductSubcategory>\n</ProductCategory>\n\
  ```\n清单 1-3. 显示以属性为中心的 XML\n\n比较清单 2 中的以元素为中心的 XML 数据与清单 3 中的以属性为中心的 XML 数据，可以明确界定几个区别：\n\
  \n*   `以元素为中心的 XML` 比 `以属性为中心的 XML` 更大（以字符数计）。\n*   `以元素为中心的 XML` 支持元素层次结构。\n* \
  \  `以元素为中心的 XML` 可以使用 `xsi:nil` 属性表示 `SQL NULL`（`xsi:nil` 将在第 2 章的配方 2-5“处理具有 NULL\
  \ 值的元素”中介绍）。\n\n我们将在第 2 章“构建 XML”中提供更深入的分析，并展示更多的区别、用例和演示。\n\n### XML 字符实体化\n\n\
  XML 元素由左右尖括号（小于号和大于号，“<”和“>”）定义。XML 属性值用双引号括起来。包含这些特殊字符（它们不是 XML 标记的一部分）的数据可能会在\
  \ XML 解析期间导致问题。为了解决这些潜在的冲突，XML 定义了一组特殊的字符序列，称为预定义实体，所有 XML 解析器都必须遵守。这些字符序列，包括双引号、和号、撇号、小于号和大于号，以及它们关联的\
  \ XML 实体，列在表 1 中。\n\n表 1-1. 列出 XML 中的预定义实体\n\n| 字符 | 实体引用 | 描述 |\n| --- | --- |\
  \ --- |\n| `\"` | `&quot;` | 双引号 |\n| `&` | `&amp;` | 和号 |\n| `'` | `&apos;` | 撇号（单引号）\
  \ |\n| `<` | `&lt;` | 小于号 |\n| `>` | `&gt;` | 大于号 |\n\n当预定义实体被实体引用替换的过程称为实体化。为了演示实体化，我获取了清单\
  \ 4 中的 XML，然后键入（复制/粘贴）到记事本中。\n\n```xml\n<Catalog>\n  <Product id=\"1\" name=\"Product\
  \ 1 &quot;Super&quot;\">\n    <Price>12.99</Price>\n    <Description>An item with\
  \ \"quotes\" and an & ampersand.</Description>\n  </Product>\n</Catalog>\n```\n\
  清单 1-4. 包含预定义实体的示例 XML\n\n然后，我将文件保存为 .xml 扩展名。例如，我将文件命名为 `XML_Entity.xml`。创建文件后，我只需双击该文件或在\
  \ Internet Explorer 中打开它。结果，实体引用将显示为正常字符，如图 2 所示。\n\n![A435478_1_En_1_Fig2_HTML.jpg](img/A435478_1_En_1_Fig2_HTML.jpg)\n\
  图 1-2. 展开 XML 实体后的示例\n\n\n\n"
- "# 探索 XML 数据类型\n\nMicrosoft SQL Server 数据库中的 XML 支持首次引入于 SQL Server 2000。XML 可能包含非常长的数据字符串；因此，很少会遇到无法放入\
  \ `VARCHAR(8000)` 或 `NVARCHAR(4000)` Unicode 列的 XML 数据。由于许多 XML 数据无法放入这些数据类型，SQL\
  \ Server 2000 建议 DBA 和开发人员使用 `TEXT`，在某些情况下使用 `IMAGE` 数据类型。许多人发现处理这些数据类型是一场噩梦，因为它们难以使用。此外，在\
  \ 2000 版处理 XML 时，你必须使用基于 COM 的存储过程。\n\n随着 SQL Server 2005 的发布，提供了 `XML` 数据类型，这使得处理\
  \ XML 数据变得显著更容易，并且 XML 数据可以以其原生格式存储。当在 SSMS 中将输出设置为“结果到网格”时，`XML` 数据类型的输出会返回可点击的超链接格式。要查看\
  \ XML 内容，只需点击超链接，SSMS 就会在单独的 XML 文档选项卡中显示 XML 结果。XML 文档选项卡不允许你连接到 SQL Server 实例或执行任何\
  \ SQL 语句。\n\n`XML` 数据类型是一种便捷且设计良好的数据类型，允许你以 XML 格式存储数据和文档。在某些情况下，可以使用其他大型 SQL Server\
  \ 数据类型来存储 XML 数据，例如 `NVARCHAR(MAX)`、`VARCHAR(MAX)` 或 `VARBINARY(MAX)`。旧的数据类型 `IMAGE`、`NTEXT`\
  \ 和 `TEXT` 也能完成这项工作，但使用起来不那么用户友好。\n\n例如，当 XML 数据作为文档存储，并且你不需要整体查询这些数据时，你可以使用 `NVARCHAR(MAX)`、`VARCHAR(MAX)`、`VARBINARY(MAX)`。使用\
  \ LOB 数据类型存储 XML 的最佳理由是当你需要存储 XML 的精确表示时，因为 `XML` 数据类型会存储你提供的内容，但它可能会更改不重要的空白，并且不能保证属性的顺序。看看\
  \ `msdb.dbo.sysssispackages` 表，其中的 `packagedata` 列存储了服务器端的 SSIS 包。SQL Server 使用\
  \ `IMAGE` 数据类型（在此情况下我不建议效仿 Microsoft）来存储 SSIS 包代码。对于那些从未看过 SSIS 代码的人来说，它是 XML 数据。因此，当我需要查询\
  \ SSIS 时（我有过几次这样的合理请求），我将 `packagedata` 列转换为 `VARBINARY(MAX)`，然后将其转换为 `XML` 数据类型实例，如代码清单\
  \ 1-5 所示。\n\n```sql\nSELECT CAST(CAST(packagedata as VARBINARY(MAX)) AS XML) AS\
  \ SSISPackage\nFROM msdb.dbo.sysssispackages;\n```\n代码清单 1-5. 将 IMAGE 数据类型转换为 XML\
  \ 数据类型\n\n**注意**\n\n不应考虑将旧式大型对象二进制数据类型 `IMAGE`、`NTEXT` 和 `TEXT` 用于任何列的实现。联机丛书中没有引用这些数据类型，因为它们已弃用。但是，一些系统表仍然包含它们；甚至\
  \ Microsoft 早在 2008 年就宣布 `IMAGE`、`NTEXT` 和 `TEXT` 数据类型将被弃用。\n\n`XML` 数据类型具有以下限制：\n\
  \n*   存储限制为 2.1 GB。\n*   不能用作表的主键。\n*   不能通过 `ORDER BY` 子句进行排序。\n*   不能在 `WHERE`\
  \ 子句中进行比较。\n*   不能用于 `GROUP BY` 子句。\n*   除了 `ISNULL()`、`COALESCE()`、`DATALENGTH()`、`CAST()`、`TRY_CAST()`、`CONVERT()`、`CHOOSE()`\
  \ 和 `IIF()` 函数外，不能作为任何标量内置函数的参数。\n*   具有 `XML` 数据类型的列不能是链接服务器查询的一部分。\n*   XML 列只能通过\
  \ XML 索引进行索引；对于聚集和非聚集表索引，XML 列可以通过 `INCLUDE` 子句包含。\n\nXML 数据类型有两种形式：\n\n*   非类型化\
  \ XML（默认），是未关联 XML 架构的 `XML` 数据类型实例。\n*   类型化 XML 是绑定了 XML 架构的 `XML` 数据类型实例。\n\n\
  ## 1-1. 创建非类型化 XML 列\n\n### 问题\n\n你想在表中定义一个非类型化 XML 列。\n\n### 解决方案\n\n在创建时将指定列定义为\
  \ `XML` 数据类型。代码清单 1-6 中的示例演示了如何创建一个简单的非类型化 XML 列的语法。\n\n```sql\nCREATE TABLE dbo.UntypedXML\n\
  (\n    UntypedXML_ID INT IDENTITY(1, 1) NOT NULL PRIMARY KEY,\n    UntypedXMLData\
  \ XML\n);\n```\n代码清单 1-6. 创建非类型化 XML 列的语法\n\n代码清单 1-7 中的示例演示了如何向我们在代码清单 1-6 中创建的表插入新行。\n\
  \n```sql\nINSERT INTO dbo.UntypedXML\n(\n    UntypedXMLData\n)\nSELECT N'\n<ProductCategory>\n\
  \    <ProductCategoryID>3</ProductCategoryID>\n    <Name>Accessories</Name>\n  \
  \  <Products>\n        <Product>\n            <Name>Bike Racks</Name>\n        \
  \    <ProductID>100</ProductID>\n            <ProductSubcategory>\n            \
  \    <Name>Hitch Rack - 4-Bike</Name>\n                <ProductNumber>RA-H123</ProductNumber>\n\
  \                <ListPrice>120.0000</ListPrice>\n            </ProductSubcategory>\n\
  \        </Product>\n        <Product>\n            <Name>Bike Stands</Name>\n \
  \           <ProductID>101</ProductID>\n            <ProductSubcategory>\n     \
  \           <Name>All-Purpose Bike Stand</Name>\n                <ProductNumber>ST-1401</ProductNumber>\n\
  \                <ListPrice>159.0000</ListPrice>\n            </ProductSubcategory>\n\
  \        </Product>\n    </Products>\n</ProductCategory>';\n```\n代码清单 1-7. 插入包含\
  \ XML 数据的新行\n\n代码清单 1-8 中的示例演示了如何声明一个 `XML` 数据类型变量，然后将其插入我们先前创建的表中。\n\n```sql\n\
  DECLARE @xml XML = N'\n<ProductCategory>\n    <Name>Accessories</Name>\n</ProductCategory>';\n\
  INSERT INTO dbo.UntypedXML\n(\n    UntypedXMLData\n)\nSELECT @xml;\n```\n代码清单 1-8.\
  \ 通过 XML 变量插入新行\n\n**注意** 当我们将变量声明为 `XML` 数据类型然后为其赋值 XML 时，SQL Server 会隐式地将字符数据转换为\
  \ `XML` 数据类型。这适用于 `VARCHAR`、`NVARCHAR` 和 `VARBINARY` 数据类型。\n\n代码清单 1-9 中的示例演示了如何创建一个带有\
  \ `XML` 数据类型参数的存储过程，该过程在被调用时向表中插入数据。\n\n```sql\nCREATE PROCEDURE dbo.usp_Insert_UntypedXML\n\
  \    @UntypedXML XML\nAS\nINSERT INTO dbo.UntypedXML\n(\n    UntypedXMLData\n)\n\
  SELECT @UntypedXML;\nGO\n```\n代码清单 1-9. 将 XML 数据插入表的存储过程\n\n### 工作原理\n\n当没有 XML\
  \ 架构绑定到列、变量或存储过程参数时，所创建的对象是非类型化 XML。然而，非类型化 XML 实例仍然要求其包含的 XML 数据遵循 W3C 标准的 XML\
  \ 格式。当列被创建为非类型化 XML 实例时，解析器将验证传入数据，以确保 XML 数据是“格式良好”的，或者是（没有根元素的）片段，但其他方面符合格式良好的规则。例如，所有打开的元素都被关闭，打开和关闭的元素彼此匹配，并且未发现无效字符。在以下情况下，非类型化\
  \ XML 对象非常有用：\n\n*   没有适用于该数据的 XML 架构。\n*   XML 文档和数据由不同的元素和属性组成，但仍需要存储在同一个启用 XML\
  \ 的列中。代码清单 1-7 和 1-8 展示了这种情况。\n*   应用程序验证然后发送格式良好的 XML 或 XML 片段到表中。\n\n创建具有非类型化\
  \ XML 列的表后，你可以在“对象资源管理器”中展开该表，然后展开列。列列表会出现，显示 `XML` 数据类型，其括号内带有一个点，表明这是一个非类型化 XML\
  \ 列，如图 1-3 所示。\n\n![A435478_1_En_1_Fig3_HTML.jpg](img/A435478_1_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3. 表设计器中的非类型化 XML 列\n\n## 1-2. 在 Visual Studio 中创建 XML 架构\n\n### 问题\n\n你想获取或生成一个\
  \ XML 架构来约束类型化 `XML` 列中的数据。\n\n\n"
- "# 使用 Visual Studio 和 SSMS 生成 XML 架构\n\n### 解决方案\n\n要使用 Microsoft Visual Studio\
  \ 生成 XML 架构，你需要使用 2008 或更新的版本。SQL Server Data Tools 也能完成此任务，因为它使用了 Microsoft Visual\
  \ Studio Shell。此外，你还需要一个 XML 文件。如果你的 XML 数据是作为 `FOR XML` 子句的结果创建的（更多内容见第 2 章），请将\
  \ XML 数据保存为扩展名为 `.xml` 的文件。\n\n要加载 XML 文件：\n\n1.  启动 MS Visual Studio。\n2.  转到文件菜单。\n\
  3.  选择“打开”选项。\n4.  单击“文件”（快捷键 CTRL + O）。“打开文件”对话框将出现。\n5.  导航到 XML 文件的存储位置。\n6.\
  \  单击“打开”按钮，如图 1-4 所示。\n\n    ![A435478_1_En_1_Fig4_HTML.jpg](img/A435478_1_En_1_Fig4_HTML.jpg)\n\
  \n    图 1-4. 在 Visual Studio 中打开 XML 文件\n\n文件加载后，Visual Studio 会识别 XML 文件格式，并更改菜单选项以添加\
  \ XML 菜单选项。要生成 XML 架构，请完成以下步骤：\n\n1.  选择 XML 菜单。\n2.  单击“创建架构”选项，如图 1-5 所示。\n\n\
  \    ![A435478_1_En_1_Fig5_HTML.jpg](img/A435478_1_En_1_Fig5_HTML.jpg)\n\n    图\
  \ 1-5. 创建 XML 架构\n\nXML 架构将在一个单独的选项卡中创建。你可以复制 XML 架构内容，或保存 `.xsd` 文件（快捷键 CTRL +\
  \ S）以备将来使用，如图 1-6 所示。\n\n![A435478_1_En_1_Fig6_HTML.jpg](img/A435478_1_En_1_Fig6_HTML.jpg)\n\
  \n图 1-6. 将 XML 架构保存为 .xsd 文件\n\n### 工作原理\n\n在我看来，手动创建 XML 架构的时代已经结束。有很多方法可以自动生成\
  \ XML 架构。在这个教程中，我演示了两种自动创建 XML 架构的方法。这两种方法都基于 Microsoft 产品：\n\n*   MS Visual Studio（2008\
  \ 及以上版本）\n*   MS SQL Server（2005 及以上版本）\n\n为简单起见，我重用了清单 1-2 中的 XML 数据，如清单 1-10 所示。\n\
  \n```xml\n\nAccessories\n\nBike Racks\n\nHitch Rack - 4-Bike\nRA-H123\n120.0000\n\
  \nBike Stands\n\nAll-Purpose Bike Stand\nST-1401\n159.0000\n\n```\n清单 1-10. 示例 XML\n\
  \n当你有一个 XML 文件并需要为其创建 XML 架构时，完成此任务最简单、最方便的方法是使用 Microsoft Visual Studio，如解决方案中所演示的那样。根据示例数据生成的\
  \ XML 架构如清单 1-11 所示。\n\n```xml\n\n```\n清单 1-11. 由 Visual Studio 生成的 XML 架构\n\n##\
  \ 1-3. 从 SSMS 创建 XML 架构\n\n### 问题\n\n你想从 SQL Server Management Studio (SSMS) 内部生成一个\
  \ XML 架构。\n\n### 解决方案\n\n创建 XML 架构的另一种方法是使用 SQL Server 的 `FOR XML` 子句配合 `XMLSCHEMA`\
  \ 指令。演示此选项的目的是展示一种利用 `FOR XML` 子句结果生成 XML 架构的替代方法。\n\n要在 SQL Server 中生成内联 XSD (XML\
  \ Schema Definition) 架构，你需要在查询中添加带有 `XMLSCHEMA` 关键字的 `FOR XML` 子句（`FOR XML` 子句将在第\
  \ 2 章“构建 XML”中更详细地介绍）。可选地，可以在 XMLSCHEMA 关键字的括号内指定架构名称。例如，要将 ProductSchema 架构添加到你的\
  \ XSD 架构中，指定如下：`XMLSCHEMA(' [`http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema`](http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema)\
  \ ')`，如清单 1-12 所示。\n\n```sql\nSELECT TOP (2) Category.Name AS CategoryName,\nSubcategory.Name\
  \ AS SubcategoryName,\nProduct.Name,\nProduct.ProductNumber AS Number,\nProduct.ListPrice\
  \ AS Price\nFROM  Production.Product Product\nINNER JOIN Production.ProductSubcategory\
  \ Subcategory\nON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\n\
  LEFT JOIN Production.ProductCategory Category\nON Subcategory.ProductCategoryID\
  \ = Category.ProductCategoryID\nWHERE Product.ListPrice > 0\nAND Product.SellEndDate\
  \ IS NULL\nORDER BY CategoryName, SubcategoryName\nFOR XML AUTO, ELEMENTS, XMLSCHEMA('http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema'),\
  \ ROOT('Category');\n```\n清单 1-12. 创建 XML 架构的查询\n\n要提取 XSD 架构，你需要执行以下步骤：\n\n![A435478_1_En_1_Fig7_HTML.jpg](img/A435478_1_En_1_Fig7_HTML.jpg)\n\
  \n图 1-7. 在 XML 编辑器中显示结果\n\n![A435478_1_En_1_Fig8_HTML.jpg](img/A435478_1_En_1_Fig8_HTML.jpg)\n\
  \n图 1-8. 提取 XSD 架构部分\n\n*   运行带有 `XMLSCHEMA` 关键字的 SQL 语句。\n*   单击查询结果以在 XML 编辑器中打开带有架构的\
  \ XML，如图 1-7 所示。\n*   XML 编辑器将显示 XSD 部分和 XML 部分。我们将重点关注 `<xsd:schema>` 元素。\n*  \
  \ 从开始的 `<xsd:schema>` 标签复制到结束的 `</xsd:schema>` 标签。\n*   打开一个新的 SSMS 窗口，粘贴复制的部分，如图\
  \ 1-8 所示。\n\n### 工作原理\n\n带有 `XMLSCHEMA` 关键字的 `FOR XML` 子句提供了一种将 XML 架构添加到 XML 结果的机制。当需要将命名空间与\
  \ XML 结果关联时，应在 XMLSCHEMA 关键字后的括号中指定命名空间声明。例如：\n\n```sql\nXMLSCHEMA('http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema'),\
  \ ROOT('Category')\n```\n\n从清单 1-13 生成的 XML 结果中复制并粘贴内联 XML 架构后，最终的 XML 架构如清单 1-14\
  \ 所示。\n\n```xml\n\n```\n清单 1-13. 从 FOR XML 子句结果得到的 XML 架构\n\n你可能已经注意到通过 Visual Studio\
  \ 和 SQL Server Management Studio 生成的 XML 架构及其内容的差异。通过 SQL Server 创建的 XML 架构往往要大得多。然而，两种变体都提供了一个可以与\
  \ XML 架构集合 (XML Schema Collection) 一起使用以验证 XML 数据的 XML 架构。\n\n## 1-4. 将 XML 绑定到架构集合\n\
  \n### 问题\n\n你有一个 XML 架构，想要将其绑定到表的列以创建类型化的 XML 列。\n\n### 解决方案\n\n要使 XML 架构有资格绑定到表的列、XML\
  \ 变量或 XML 存储过程参数，需要创建 XML 架构集合，如清单 1-14 所示。为了演示此过程，我重用了清单 1-11 中的 XML 架构。\n\n```sql\n\
  CREATE XML SCHEMA COLLECTION dbo.TypedXML_VisualStudio\nAS\nN'\n\n';\nGO\n```\n\
  清单 1-14. 创建 XML 架构集合\n\n\n### 工作原理\n\n创建 XML 架构集合的语法相当简单。生成 XML 架构后，需要将架构内容添加到 SQL\
  \ Server XML 架构集合对象中。创建架构集合的语法（如代码清单 1-14 所示）包含几个组成部分：\n*   `CREATE XML SCHEMA COLLECTION`\
  \ - 声明性语句\n*   `dbo` – 关系架构（如果未提供，则将使用 SQL Server 默认值）\n*   XML 架构集合名称 – 任何 SQL\
  \ Server 有效的唯一名称\n*   `AS <schema_contents>` - XML 架构内容，可以是常量，也可以是 `xml`、`nvarchar`、`varchar`\
  \ 或 `varbinary` 数据类型的标量变量\n\n要创建 XML 架构集合，需要具备以下服务器级或数据库级权限之一：\n*   `CONTROL`（服务器级）\n\
  *   `ALTER ANY DATABASE`（服务器级）\n*   `ALTER`（数据库级）\n*   `CONTROL`（数据库级）\n*   `ALTER\
  \ ANY SCHEMA` 和 `CREATE XML SCHEMA COLLECTION`（数据库级）\n\n成功创建后，您可以在 SSMS 对象资源管理器中，在“可编程性”、“类型”、“XML\
  \ 架构集合”下找到您新建的 XML 架构集合，如图 1-9 所示。\n\n![A435478_1_En_1_Fig9_HTML.jpg](img/A435478_1_En_1_Fig9_HTML.jpg)\n\
  图 1-9. 查找 XML 架构集合\n\n注意：当 XML 架构集合绑定到一个或多个列时，无法对其应用任何更改。要修改或删除 XML 架构集合，您需要首先将其从列上解除绑定。\n\
  \n## 1-5. 创建类型化 XML 列\n\n### 问题\n\n您已经创建了一个 XML 架构集合，现在希望将其绑定到一个列以创建类型化 XML 列。\n\
  \n### 解决方案\n\n当 XML 架构集合成功创建后，将 XML 架构绑定到新创建表的代码如代码清单 1-15 所示。\n\n```sql\nCREATE\
  \ TABLE dbo.TypedXML_VS\n(\nTypedXML_ID INT IDENTITY(1, 1) NOT NULL PRIMARY KEY,\n\
  TypedXMLData XML(TypedXML_VisualStudio)\n);\nGO\n代码清单 1-15. 创建带有类型化 XML 列的新表\n```\n\
  \n您可以使用 `ALTER TABLE … ALTER COLUMN` 语句将 XML 架构集合绑定到现有的 `XML` 列，如代码清单 1-16 所示。\n\
  \n```sql\nALTER TABLE TypedXML_VS\nALTER COLUMN TypedXMLData XML (TypedXML_VisualStudio);\n\
  代码清单 1-16. 将 XML 架构集合绑定到列\n```\n\n### 工作原理\n\n将 XML 架构集合绑定到 XML 列的机制很简单。需要将 XML\
  \ 架构集合名称作为 `XML` 数据类型的一部分（在括号内）指定。语法为：`column_name XML (XML_SCHEMA_COLLECTION_NAME)`。对于新表，可以在\
  \ `CREATE TABLE` DDL 命令中将 XML 架构集合绑定到列（代码清单 1-15）。当表包含非类型化 XML 列时，`ALTER TABLE`\
  \ 命令将完成此任务（代码清单 1-16）。\n\n当 XML 架构集合绑定到列后，XSD 本身无法修改或删除。但是，可以删除包含类型化 XML 列的表。要将\
  \ XSD 与列断开连接，您需要执行一个 `ALTER TABLE` DDL 命令，其中 `XML` 数据类型不带括号，如代码清单 1-17 所示。\n\n```sql\n\
  ALTER TABLE TypedXML_VS\nALTER COLUMN TypedXMLData XML;\n代码清单 1-17. 将 XSD 与列断开连接\n\
  ```\n\nXSD 解除绑定后，XML 列变为非类型化。\n\n以下是关于类型化 XML 的几个问答。\n\n我为什么要这样做，有什么好处？\n*   能够根据\
  \ XML 架构验证 XML 数据。\n*   利用基于类型信息的存储和查询优化。\n*   在查询编译过程中更好地利用类型信息。\n\n我插入到类型化 XML\
  \ 列中的 XML 数据会发生什么？\n*   每次插入都会根据 XML 架构进行验证；如果验证失败，则 SQL Server 会引发错误并且插入失败。\n\n\
  如果我的表中已存在 XML 数据，然后对其应用 XML 架构会怎样？\n*   如果包含 XML 列的表已有 XML 数据，并且该 XML 不符合 XML 架构，则将\
  \ XML 架构绑定到表的操作会失败。\n\n## 总结\n\nSQL Server 2000 首次在 SQL 数据库中引入了 XML 功能。从那时起，XML\
  \ 技术已发展成为一个全面的信息技术平台。SQL Server 2005 交付了 `XML` 数据类型。在本章中，您接触了 XML 的入门知识。我解释了元素和属性之间的区别，这对于后续章节非常重要。我定义并解释了\
  \ XML 架构，并介绍了两种生成 XML 架构的方法。在我看来，有了现代技术的支持，无需手动创建 XML 架构，因为它是一个复杂且耗时的过程。节省您的时间，如果您使用的是\
  \ Microsoft 工具 `MS Visual Studio`、`SQL Server Data Tools` 和 `SSMS`，其中任何一个都可以自动生成\
  \ XML 架构。\n\n本书下一章将演示如何从结果集构建 XML。\n\n\n\n"
- '# 2. 构建 XML


  XML 在 SQL Server 中通过一种复杂的数据类型来表示，它拥有特殊的语法和定义明确的格式。当我们需要构建 XML 格式的输出或将现有的 XML 拆分（shred）成关系格式时，就可以使用它。在本章中，我将提供一些方法，用于基于一张或多张表的结果集来构建
  XML，并将结果格式化并呈现为 XML 输出。


  `FOR XML` 子句自 SQL Server 2000 引入以来，已经历了显著的发展，成为构建 XML 输出的综合解决方案。`FOR XML` 必须是 `SELECT`
  语句中的最后一个子句，并且当排序在查询中占有位置时，它必须出现在 `ORDER BY` 子句之后。


  `FOR XML` 子句有以下几种模式：


  *   `RAW` – 从一张或多张表中返回简单的 XML，其中每一行由一个 `<row>` 元素表示。默认生成属性中心（attribute-centric）的
  XML，这意味着行中每个非空列值都表示为 `<row>` 元素的属性。但是，如果您指定了 `ELEMENTS` 指令，则行中每个列表示为嵌套在 `<row>`
  元素内的一个元素。`RAW` 模式不支持嵌套元素结构。

  *   `AUTO` – 从一张或多张表中返回简单的 XML 结构。`AUTO` 模式类似于 `RAW` 模式，不同之处在于，当查询的 `FROM` 子句中连接了两个或更多表时，它支持嵌套元素。

  *   `EXPLICIT` – 允许您显式地构建 XML。`EXPLICIT` 模式在后台通过通用表格式访问 XML。这是一种定义明确的行集格式，与拆分后的
  XML 非常相似。使用 `EXPLICIT` 模式构建 XML 需要特定的语法来定义 XML 结果的“形状”；因此，这种模式使用起来可能很复杂。SQL Server
  2008 引入了 `PATH` 模式作为 `EXPLICIT` 模式的简化替代方案。

  *   `PATH` – 提供了一种更简单的方式来显式构建包含元素和属性混合的 XML。这是 `EXPLICIT` 模式的一个绝佳替代方案。


  当您指定 `FOR XML` 子句时，您还可以提供以下指令，这些指令控制 `FOR XML` 子句模式的格式化选项：


  *   `ELEMENTS` – 返回元素中心（element-centric）的 XML。默认结果是属性中心的，此选项仅适用于 `RAW`、`AUTO` 和
  `PATH` 模式。

  *   `BINARY BASE64` - 以 Base-64 编码格式检索二进制数据。

  *   `TYPE` - 将结果作为 XML 数据类型实例返回。

  *   `ROOT` – 为 XML 结果添加顶级（根）元素，这是“格式良好” XML 的要求。

  *   `XSINIL` - 当值为 `NULL` 时，在 XML 结果中返回元素名。该元素会带有一个设置为 "true" 的 `xsi:nil` 属性返回，如下所示：`<element
  xsi:nil = "true"/>`。

  *   `ABSENT` – 与 `XSINIL` 指令相反。`ABSENT` 指令是默认值。使用时，它指定应从 XML 结果中消除 `NULL` 值。

  *   `XMLSCHEMA` – 为 XML 结果添加一个内联的 W3C XML 架构 (XSD)。


  ## 修复“无法显示 XML”错误


  要在 SQL Server Management Studio (SSMS) 中查看查询的 XML 结果，您只需单击结果窗格中显示为超链接的 XML 结果。XML
  结果将在新的 SSMS XML 编辑器窗口中显示。但是，当我们处理非常大的结果集时，XML 可能会超过 XML 数据的默认限制（2 MB），并抛出带有“无法显示
  XML”消息的 `System.OutOfMemoryException`，如图 2-1 所示。


  ![A435478_1_En_2_Fig1_HTML.jpg](img/A435478_1_En_2_Fig1_HTML.jpg)


  图 2-1. “无法显示 XML”错误消息


  错误消息建议增加从服务器检索的 XML 数据字符数。如所述，此选项可在“工具”菜单的“选项”项中找到。XML 数据的默认最大值为 2 MB。要更改此设置，请转到菜单栏中的
  `工具`，然后在菜单上选择 `选项...`。进入“选项”对话框后，请执行以下操作：


  1.  展开 `查询结果`。

  2.  展开 `SQL Server`。

  3.  单击 `结果到网格`。

  4.  在右侧窗格中，使用下拉菜单更改 XML 数据的 `检索到的最大字符数`。可用设置为：1 MB、2 MB、5 MB 或 `无限制`。

  5.  单击 `确定` 保存您的设置。图 2-2 显示了“选项”对话框。


  ![A435478_1_En_2_Fig2_HTML.jpg](img/A435478_1_En_2_Fig2_HTML.jpg)


  图 2-2. 更改 XML 数据设置


  如果您只想更改当前查询的 XML 结果最大大小，而不希望永久保存 SSMS 设置，请单击 `查询` 菜单并选择 `查询选项...`。导航到 `结果` 下的 `网格`
  设置，并按照前面的方法更改 `检索到的最大字符数` XML 数据选项。


  ## 2-1. 将关系数据转换为简单 XML 格式


  ### 问题


  您希望将查询结果集转换为简单的 XML 格式。


  ### 解决方案


  SQL Server 提供了 `FOR XML` 子句，用于将查询结果格式化为 XML 数据。`RAW` 模式生成简单的 XML 格式。例如，代码清单 2-1
  展示了 `FOR XML` 子句中的 `RAW` 模式。


  ```sql

  SELECT Category.Name AS CategoryName,

  Subcategory.Name AS SubcategoryName,

  Product.Name,

  Product.ProductNumber AS Number,

  Product.ListPrice AS Price

  FROM  Production.Product Product

  INNER JOIN Production.ProductSubcategory Subcategory

  ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

  LEFT JOIN Production.ProductCategory Category

  ON Subcategory.ProductCategoryID = Category.ProductCategoryID

  WHERE Product.ListPrice > 0

  AND Product.SellEndDate IS NULL

  ORDER BY CategoryName, SubcategoryName

  FOR XML RAW;

  ```


  代码清单 2-1. 在 `FOR XML` 子句中演示 `RAW` 模式



  ### 工作原理


  `RAW` 模式将查询结果集中的每一行转换为一个简单的、结构化的 XML 元素。默认情况下，`RAW` 模式为每个数据行返回一个 `<row>` 元素，所有值都映射到与源
  SQL 查询中相同的列名（或列别名，如果指定了）作为属性。这种 XML 结构通常被称为以属性为中心的 XML。清单 2-2 展示了 `RAW` 模式输出的示例。


  ```

  清单 2-2.

  RAW 模式输出示例

  ```


  注意


  以属性为中心的 XML 有一个限制，它要求每个元素的属性名称必须是唯一的。因此，SQL 查询必须为每一列提供一个唯一的名称，这与创建 SQL 视图时必须提供唯一列名的方式非常相似。然而，以元素为中心的
  XML 则没有这个限制。


  在生产环境中，默认的 `<row>` 元素通常不适合或不适用于在 XML 数据中发送给客户端。为了将 `<row>` 元素替换为另一个在生成的 XML 数据中更友好、更符合业务逻辑的元素名称，`RAW`
  模式可以接受用户定义的元素名称（行标签名称）。您可以在 `FOR XML RAW` 子句后的括号中指定此行标签名称，例如：`FOR XML RAW(''ElementName'')`。清单
  2-3 展示了如何将默认元素名称替换为用户定义的名称，清单 2-4 展示了 XML 结果。


  ```sql

  SELECT Category.Name AS CategoryName,

  Subcategory.Name AS SubcategoryName,

  Product.Name,

  Product.ProductNumber AS Number,

  Product.ListPrice AS Price

  FROM  Production.Product Product

  INNER JOIN Production.ProductSubcategory Subcategory

  ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

  LEFT JOIN Production.ProductCategory Category

  ON Subcategory.ProductCategoryID = Category.ProductCategoryID

  WHERE Product.ListPrice > 0

  AND Product.SellEndDate IS NULL

  ORDER BY CategoryName, SubcategoryName

  FOR XML RAW(''Product'');

  清单 2-3.

  演示 FOR XML RAW 子句的行标签名称选项

  ```


  ```

  清单 2-4.

  指定了行标签名称的 FOR XML RAW 查询的结果

  ```


  '
- '# 2-2\. 使用表名作为元素名称生成 XML 数据


  ### 问题


  您希望简单地从单表构建 XML 结果，其中 XML 结果中的元素名称指示源表。


  ### 解决方案


  当源查询引用单个表时，`AUTO` 模式在功能上与 `RAW` 模式非常相似。唯一的区别是，`AUTO` 模式使用源查询中指定的表名来命名表示每一行的元素。也就是说，当查询包含模式和表名时，例如
  `Production.Product`，每个行元素将是 `<Production.Product>`。清单 2-5 展示了针对单表的 `AUTO` 模式。


  ```sql

  SELECT Product.Name,

  Product.ProductNumber AS Number,

  Product.ListPrice AS Price

  FROM  Production.Product

  WHERE Product.ListPrice > 0

  AND Product.SellEndDate IS NULL

  ORDER BY Product.Name

  FOR XML AUTO;

  清单 2-5.

  为单表构建 XML 的 FOR XML AUTO 查询

  ```


  清单 2-6 展示了此查询的 XML 结果。


  ```

  清单 2-6.

  单表 FOR XML AUTO 查询的结果

  ```


  注意


  W3C XML 标准允许在元素和属性名称中使用句点 (.)。


  与 `RAW` 模式不同，`AUTO` 模式不支持行标签名称选项。因此，您必须提供表别名来更改行标签元素名称。清单 2-7 展示了如何在 `AUTO` 模式下使用别名来更改元素名称。


  ```sql

  SELECT Product.Name,

  Product.ProductNumber AS Number,

  Product.ListPrice AS Price

  FROM  Production.Product AS Product

  WHERE Product.ListPrice > 0

  AND Product.SellEndDate IS NULL

  ORDER BY Product.Name

  FOR XML AUTO;

  清单 2-7.

  通过给表取别名来使用 FOR XML AUTO 更改元素名称

  ```


  清单 2-8 展示了使用带别名的源表名执行 `FOR XML AUTO` 查询的 XML 结果。


  ```

  清单 2-8.

  源表取了别名的单表 FOR XML AUTO 查询结果

  ```


  当 `FOR XML AUTO` 查询的源查询中连接两个或更多表时，XML 呈现不同的形状。XML 结果会嵌套多层，每一层嵌套节点的名称按照 `FROM` 子句中表的命名顺序命名。如清单
  2-9 所示，基于三个表构建 XML。


  ```sql

  SELECT Category.Name AS CategoryName,

  Subcategory.Name AS SubcategoryName,

  Product.Name,

  Product.ProductNumber AS Number,

  Product.ListPrice AS Price,

  SellEndDate

  FROM  Production.Product Product

  INNER JOIN Production.ProductSubcategory Subcategory

  ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

  LEFT JOIN Production.ProductCategory Category

  ON Subcategory.ProductCategoryID = Category.ProductCategoryID

  WHERE Product.ListPrice > 0

  AND Product.SellEndDate IS NULL

  ORDER BY CategoryName, SubcategoryName

  FOR XML AUTO;

  清单 2-9.

  使用 FOR XML AUTO 子句构建多个连接表的 XML 数据

  ```


  此查询的 XML 结果格式如下：


  1.  `<Category>` 是顶级元素。

  2.  `<Subcategory>` 是 `<Category>` 元素的子元素。

  3.  `<Product>` 是 `<Subcategory>` 元素的子元素。


  应用于查询中多个连接表的 `FOR XML AUTO` 模式的分层 XML 结果如图 2-3 所示。


  ![A435478_1_En_2_Fig3_HTML.jpg](img/A435478_1_En_2_Fig3_HTML.jpg)


  图 2-3.


  当 `FOR XML AUTO` 模式应用于查询中的多个连接表时的分层 XML 结果


  ### 工作原理


  `AUTO` 模式提供了一种构建 XML 的简单方法。SQL 查询引擎分析您的查询结构，并使用查询中提供的名称构建层次结构来生成元素和属性名称——这就是此模式被称为“`AUTO`”的原因。如解决方案部分所示，当实施
  `FOR XML AUTO` 时，SQL Server 引擎返回分层的 XML。


  '
- "# 2-3\\. 生成以元素为中心的 XML\n\n### 问题\n\n`RAW` 和 `AUTO` 模式默认都返回以属性为中心的 XML。但是，当业务规则需要时，您希望生成以元素为中心的\
  \ XML 数据。\n\n### 解决方案\n\n带有 `ELEMENTS` 选项的 `FOR XML` 子句以以元素为中心的格式返回 XML 结果。清单 2-10\
  \ 展示了如何向 `FOR XML AUTO` 子句添加 `ELEMENTS` 指令。\n\n```sql\nSELECT Product.Name,\nProduct.ProductNumber\
  \ AS Number,\nProduct.ListPrice AS Price\nFROM  Production.Product AS Product\n\
  WHERE Product.ListPrice > 0\nAND Product.SellEndDate IS NULL\nORDER BY Product.Name\n\
  FOR XML AUTO, ELEMENTS;\n清单 2-10.\n带有 ELEMENTS 指令的 FOR XML AUTO 查询\n```\n\n带有 `ELEMENTS`\
  \ 指令的 `FOR XML AUTO` 查询的结果如清单 2-11 所示。\n\n```xml\n<Product>\n  <Name>Chain</Name>\n\
  \  <Number>CH-0234</Number>\n  <Price>20.2400</Price>\n</Product>\n<Product>\n \
  \ <Name>Classic Vest, L</Name>\n  <Number>VE-C304-L</Number>\n  <Price>63.5000</Price>\n\
  </Product>\n清单 2-11.\n带有 ELEMENTS 指令的 FOR XML AUTO 查询的结果\n```\n\n### 工作原理\n\n`ELEMENTS`\
  \ 选项将您的 XML 结果格式化，将列作为每个行元素的子元素进行嵌套。这种格式被称为以元素为中心的 XML。`ELEMENTS` 选项可以与 `FOR XML`\
  \ 子句的 `RAW`、`AUTO` 和 `PATH` 模式一起指定。`FOR XML EXPLICIT` 模式不支持 `ELEMENTS` 指令。\n\n`ELEMENTS`\
  \ 指令必须与 `RAW`、`AUTO` 和 `PATH` 模式关键字用逗号分隔。例如：`FOR XML AUTO, ELEMENTS`。\n\n这个简单的更改允许您以以元素为中心的格式返回\
  \ XML，而不是默认的以属性为中心的格式。\n\n"
- "# 2-4\\. 添加根元素\n\n### 问题\n\n您希望为生成的 XML 添加一个根（顶级）元素。\n\n### 解决方案\n\n`ROOT`选项会将你的\
  \ XML 结果包装在一个你选择的顶级根元素中。清单 2-12 演示了如何向查询中添加`ROOT`指令。\n\n```sql\nSELECT Product.Name,\n\
  Product.ProductNumber AS Number,\nProduct.ListPrice AS Price\nFROM  Production.Product\
  \ AS Product\nWHERE Product.ListPrice > 0\nAND Product.SellEndDate IS NULL\nORDER\
  \ BY Product.Name\nFOR XML AUTO, ELEMENTS, ROOT;\n```\n清单 2-12.\n向`FOR XML AUTO`查询添加`ROOT`指令\n\
  \n清单 2-13 展示了同时使用`ELEMENTS`和`ROOT`指令的`FOR XML AUTO`查询结果。\n\n```xml\n<root>\n  <Product>\n\
  \    <Name>All-Purpose Bike Stand</Name>\n    <Number>ST-1401</Number>\n    <Price>159.0000</Price>\n\
  \  </Product>\n  <Product>\n    <Name>AWC Logo Cap</Name>\n    <Number>CA-1098</Number>\n\
  \    <Price>8.9900</Price>\n  </Product>\n  <Product>\n    <Name>Bike Wash - Dissolver</Name>\n\
  \    <Number>CL-9009</Number>\n    <Price>7.9500</Price>\n  </Product>\n  ...\n\
  </root>\n```\n清单 2-13.\n使用`ELEMENTS`和`ROOT`指令生成的格式良好 XML 片段\n\n### 工作原理\n\n`ROOT`选项指定你的\
  \ XML 结果将被包装在一个单独的顶级根元素中。默认情况下，`ROOT`指令生成一个名为`<root>`的顶级元素。然而，默认名称`<root>`也可以通过在括号中指定用户定义的值来替换。例如：`FOR\
  \ XML AUTO, ELEMENTS, ROOT('Products')`。当指定了根元素名称时，XML 结果将使用你指定的名称作为顶级根元素。在前面的例子中，根元素将被命名为`<Products>`。\n\
  \n## 2-5. 在 XML 数据中包含值为 NULL 的元素\n\n### 问题\n\n默认情况下，SQL Server 生成的 XML 会排除任何包含`NULL`的列。你希望特别包含那些包含`NULL`的列。\n\
  \n### 解决方案\n\n`ELEMENTS`指令的`XSINIL`选项强制 XML 结果包含那些源列包含`NULL`的元素。清单 2-14 演示了如何向你的查询添加`XSINIL`选项。\n\
  \n```sql\nSELECT Product.Name,\nProduct.ProductNumber AS Number,\nProduct.ListPrice\
  \ AS Price,\nSellEndDate\nFROM  Production.Product AS Product\nWHERE Product.ListPrice\
  \ > 0\nORDER BY Product.Name\nFOR XML AUTO, ELEMENTS XSINIL, ROOT('Products');\n\
  ```\n清单 2-14.\n向`FOR XML`查询添加`XSINIL`选项\n\n清单 2-15 展示了使用`XSINIL`选项的结果。\n\n```xml\n\
  ...\n<Product>\n  <Name>Bike Wash - Dissolver</Name>\n  <Number>CL-9009</Number>\n\
  \  <Price>7.9500</Price>\n  <SellEndDate xsi:nil=\"true\"/>\n</Product>\n<Product>\n\
  \  <Name>Cable Lock</Name>\n  <Number>LO-C100</Number>\n  <Price>25.0000</Price>\n\
  \  <SellEndDate>2013-05-29T00:00:00</SellEndDate>\n</Product>\n...\n```\n清单 2-15.\n\
  `XSINIL`选项查询结果的片段\n\n在示例结果中，产品编号`CL-9009`在数据库中的`SellEndDate`为`NULL`，因此它用一个设置为“true”的`xsi:nil`属性来表示。然而，产品编号`LO-C100`有一个非`NULL`的`SellEndDate`值，所以它没有`xsi:nil`属性。\n\
  \n### 工作原理\n\n`ELEMENTS`指令支持两个选项：\n1.  `XSINIL` – 此选项强制 XML 结果为源数据中的`NULL`值生成元素。\n\
  2.  `ABSENT` – 此选项将源数据中包含`NULL`值的任何元素排除在你的 XML 结果之外。这是`ELEMENTS`指令的默认选项，无需显式指定。\n\
  \n`XSINIL`和`ABSENT`选项被视为`ELEMENTS`指令的一部分，并且在需要时可以这样指定。因此，与指令不同，`XSINIL`和`ABSENT`选项与其`ELEMENTS`指令之间用空格分隔，而不是逗号。\n\
  \n## 2-6. 在 XML 中包含二进制数据\n\n### 问题\n\n你希望将二进制列的内容包含在你的 XML 数据中。\n\n### 解决方案\n\n\
  你可能会遇到查询包含二进制数据的列的情况，并且你希望将这些二进制数据包含在你的 XML 结果中。考虑清单 2-16，这是一个试图以 XML 格式返回二进制数据的查询。\n\
  \n```sql\nSELECT LargePhotoFileName,\nLargePhoto\nFROM  Production.ProductPhoto\n\
  FOR XML AUTO, ELEMENTS;\n```\n清单 2-16.\n检索 XML 格式二进制数据的失败查询\n\n当你尝试执行此查询时，它会引发错误：\n\
  \n`FOR XML AUTO requires primary keys to create references for 'LargePhoto'. Select\
  \ primary keys, or use BINARY BASE64 to obtain binary data in encoded form if no\
  \ primary keys exist.`\n\n此查询失败，因为你没有在结果集中包含主键列。如清单 2-17 所示更改查询将解决此问题。\n\n```sql\n\
  SELECT LargePhotoFileName,\nLargePhoto,\nProductPhotoID\nFROM  Production.ProductPhoto\n\
  FOR XML AUTO, ELEMENTS;\n```\n清单 2-17.\n检索 XML 格式二进制数据的有效查询\n\n然而，返回的不是预期的二进制数据，而是对主键行的引用，如清单\
  \ 2-18 所示。\n\n```xml\n<ProductPhoto ProductPhotoID=\"70\">\n  <LargePhotoFileName>racer02_black_large.gif</LargePhotoFileName>\n\
  \  <LargePhoto>dbobject/Production.ProductPhoto[@ProductPhotoID='70']/@LargePhoto</LargePhoto>\n\
  </ProductPhoto>\n```\n清单 2-18.\n带有对主键行引用的二进制数据查询结果片段\n\n为了在你的 XML 结果中包含二进制数据的实际表示，只需将`BINARY\
  \ BASE64`指令应用于你的`FOR XML`子句。此指令强制 XML 结果以 Base64 编码格式包含二进制数据。清单 2-19 演示了`FOR XML`子句的`BINARY\
  \ BASE64`指令。\n\n```sql\nSELECT LargePhotoFileName,\nLargePhoto\nFROM  Production.ProductPhoto\n\
  FOR XML AUTO, ELEMENTS, BINARY BASE64;\n```\n清单 2-19.\n使用`FOR XML`子句的`BINARY BASE64`指令\n\
  \n### 工作原理\n\n`BINARY BASE64`指令以 Base-64 格式对二进制数据进行编码。当查询返回`varbinary`数据类型的列时，`FOR\
  \ XML`子句的`BINARY BASE64`指令会在你的 XML 结果中以 Base-64 编码的形式返回你的二进制数据。\n\n每个`FOR XML`模式使用特定规则作用于结果集中的二进制数据：\n\
  *   `AUTO`模式在查询结果中包含主键时，返回对二进制列和行的引用。\n*   `RAW`和`EXPLICIT`模式在查询有包含二进制数据的列时会引发错误。\n\
  *   只有`PATH`模式在未指定`BINARY BASE64`指令时不会引发错误，并会返回包含二进制数据的 XML 结果。\n\n例如，执行以下查询：\n\
  ```sql\nSELECT LargePhotoFileName, LargePhoto\nFROM  [Production].[ProductPhoto]\n\
  FOR XML PATH;\n```\n以及这个查询：\n```sql\nSELECT LargePhotoFileName, LargePhoto\nFROM\
  \  [Production].[ProductPhoto]\nFOR XML AUTO, ELEMENTS, BINARY BASE64;\n```\n两个查询都将返回相同的结果。然而，当二进制数据是结果集的一部分时，我强烈建议对所有`FOR\
  \ XML`模式包含`BINARY BASE64`指令。这是因为你需要检索实际的数据，而不是数据的引用，就像当主键列在`SELECT`子句中列出时可能发生的那样。\n\
  \n## 2-7. 生成嵌套的层次结构 XML 数据\n\n### 问题\n\n你希望将生成 XML 的子查询的结果嵌套到外部生成 XML 的查询中，以创建更复杂的层次结构\
  \ XML 数据。\n\n\n## 2-8. 构建自定义 XML\n\n### 问题\n\n您希望对生成的 XML 格式进行细粒度控制。\n\n### 解决方案\n\
  \n在之前的方案中，我们关注的是返回以元素为中心或以属性为中心的 XML 的 `RAW` 和 `AUTO` 模式，并根据源表和列名（或别名）自动生成名称。但如果您想对以元素为中心或以属性为中心的\
  \ XML 结果有更多控制呢？`EXPLICIT` 模式让您能对 XML 结果有更多的控制。清单 2-23 展示了一个使用自定义结构生成 XML 结果的查询。\n\
  \n```\nSELECT 1                AS Tag,\n       0                AS Parent,\n   \
  \    Prod.Name        AS [Categories!1!Category!ELEMENT],\n       NULL         \
  \    AS [Subcategories!2!Subcategory!ELEMENT],\n       NULL             AS [Product!3!ProductName!ELEMENT],\n\
  \       NULL             AS [Product!3!Color!ELEMENTXSINIL],\n       NULL      \
  \       AS [Product!3!Shelf],\n       NULL             AS [Product!3!Bin],\n   \
  \    NULL             AS [Product!3!Quantity]\nFROM   Production.ProductCategory\
  \ Prod\nUNION ALL\nSELECT 2                AS Tag,\n       1                AS Parent,\n\
  \       Category.Name,\n       Subcategory.Name,\n       NULL,\n       NULL,\n \
  \      NULL,\n       NULL,\n       NULL\nFROM   Production.ProductCategory Category\n\
  \       INNER JOIN Production.ProductSubcategory Subcategory\n         ON Category.ProductCategoryID\
  \ = Subcategory.ProductCategoryID\nUNION ALL\nSELECT 3                AS Tag,\n\
  \       2                AS Parent,\n       ProductCategory.Name,\n       Subcategory.Name,\n\
  \       Product.Name,\n       Product.Color,\n       Inventory.Shelf,\n       Inventory.Bin,\n\
  \       Inventory.Quantity\nFROM   Production.Product Product\n       INNER JOIN\
  \ Production.ProductInventory Inventory\n         ON Product.ProductID = Inventory.ProductID\n\
  \       INNER JOIN Production.ProductSubcategory Subcategory\n         ON Product.ProductSubcategoryID\
  \ = Subcategory.ProductSubcategoryID\n       INNER JOIN Production.ProductCategory\n\
  \         ON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
  ORDER  BY [Categories!1!Category!ELEMENT],\n          [Subcategories!2!Subcategory!ELEMENT],\n\
  \          [Product!3!ProductName!ELEMENT]\nFOR XML EXPLICIT, ROOT('Products');\n\
  清单 2-23.\n使用 EXPLICIT 模式控制 XML 结果的格式\n```\n\n### 解决方案（续）\n\n您可能遇到需要通过 SQL 相关子查询生成分层\
  \ XML 的情况。例如，AdventureWorks 数据库中的产品类别可以有多个相关的子类别。假设您想要生成一个列出所有产品类别的 XML 结果，每个类别内嵌其产品子类别。\n\
  \n您的第一个 SQL 查询可能如清单 2-20 所示。\n\n```\nSELECT Category.Name AS CategoryName,\n(\n\
  \  SELECT Subcategory.Name AS SubcategoryName\n  FROM   Production.ProductSubcategory\
  \ Subcategory\n  WHERE  Subcategory.ProductCategoryID = Category.ProductCategoryID\n\
  \  FOR XML AUTO\n) Subcategory\nFROM   Production.ProductCategory Category\nFOR\
  \ XML AUTO, ROOT('Categories');\n清单 2-20.\n首次尝试使用相关子查询创建分层 XML\n```\n\n此查询的结果在整个\
  \ XML 数据中生成了诸如 `&lt;` 和 `&gt;` 这样的 XML 实体，如图 2-4 所示，而不是预期的正确嵌套的 XML 元素。\n\n![A435478_1_En_2_Fig4_HTML.jpg](img/A435478_1_En_2_Fig4_HTML.jpg)\n\
  \n图 2-4.\n\n首次尝试创建分层 XML 数据的结果\n\n如何以 XML 格式返回查询？您需要正确的标签，而不是 XML `&gt;` 和 `&lt;`\
  \ 实体。\n\n为了强制结果集以正确的 XML 格式返回，请将 `TYPE` 指令添加到您的 `FOR XML` 子句中。清单 2-9 演示了此选项。清单 2-21\
  \ 显示了生成的 XML。\n\n```\nSELECT Category.Name AS CategoryName,\n(\n  SELECT Subcategory.Name\
  \ AS SubcategoryName\n  FROM   Production.ProductSubcategory Subcategory\n  WHERE\
  \  Subcategory.ProductCategoryID = Category.ProductCategoryID\n  FOR XML AUTO, TYPE\n\
  ) Subcategory\nFROM   Production.ProductCategory Category\nFOR XML AUTO, ELEMENTS,\
  \ TYPE, ROOT('Categories');\n清单 2-21.\n实现 TYPE 指令\n```\n\n这个添加了 `TYPE` 指令的更新查询的结果如清单\
  \ 2-22 所示。\n\n```\n\n...\n\n清单 2-22.\n使用嵌套子查询和 TYPE 指令生成的嵌套分层 XML 片段。\n```\n\n###\
  \ 工作原理\n\n默认情况下，`FOR XML` 子句返回 `nvarchar(max)` 数据类型的结果。子查询生成的 XML 作为字符数据返回，而不是所需的\
  \ XML 格式。当 SQL Server 将 XML 数据转换为字符格式时，它会正确地对某些特殊字符进行实体编码，例如“`<`”和“`>`”字符（分别为 `&lt;`\
  \ 和 `&gt;`）。`TYPE` 指令强制 SQL 以正确的 XML 格式返回 XML 结果，而不对内容进行实体编码。`TYPE` 指令可以与所有 `FOR\
  \ XML` 模式一起使用。\n\n\n### 工作原理\n\n`EXPLICIT`模式是`FOR XML`中最复杂的模式之一。所有元素和属性都需要显式提供，每个子块也必须显式链接到父级。与`RAW`和`AUTO`等其他模式相比，使用`EXPLICIT`模式的查询语句要冗长得多。然而，`EXPLICIT`模式的好处在于，它为控制查询结果生成的\
  \ XML 形状提供了更大的灵活性。\n\n为了更好地理解`EXPLICIT`模式的工作原理，我将通过一个示例来讲解。让我们从一个基础的 T-SQL 查询开始，如代码清单\
  \ 2-24 所示，该查询展示了我们希望转换为 XML 结构的 SQL。\n\n```sql\nSELECT ProductCategory.Name Category,\n\
  Subcategory.Name Subcategory,\nProduct.Name ProductName,\nProduct.Color,\nInventory.Shelf,\n\
  Inventory.Bin,\nInventory.Quantity\nFROM Production.Product Product\nINNER JOIN\
  \ Production.ProductInventory Inventory\nON Product.ProductID = Inventory.ProductID\n\
  INNER JOIN Production.ProductSubcategory Subcategory\nON Product.ProductSubcategoryID\
  \ = Subcategory.ProductSubcategoryID\nINNER JOIN Production.ProductCategory\nON\
  \ Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
  ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name;\n```\n**代码清单 2-24.**\
  \ 我们希望转换为 XML 格式的 SQL 查询\n\n代码清单 2-24 中的 SQL 返回了基于类别和子类别的产品列表。因此，我们需要做出决定并回答几个问题：\n\
  1.  我们希望 XML 的结构是怎样的？\n2.  XML 需要有多少个同级层级？\n3.  哪些列将被映射为元素，哪些应该是属性？\n4.  我们是否需要保留值为`NULL`的元素？\n\
  \n在图 2-5 中，我们展示了代码清单 2-24 查询的结果，并开始为想要的 XML 结果绘制路线图。图 2-5 展示了一个路线图示例，它将帮助我们使用`EXPLICIT`模式构建查询。\n\
  \n![A435478_1_En_2_Fig5_HTML.jpg](img/A435478_1_En_2_Fig5_HTML.jpg)\n**图 2-5.**\
  \ 代码清单 2-24 中的查询结果\n\n以此图为指导，我们将定义一个逻辑结构来模拟目标 XML 结构。该逻辑结构如代码清单 2-25 所示。\n\n```xml\n\
  <ELEMENT />\n<ELEMENT />\n<ELEMENT />\n<ELEMENT XSINIL />\n```\n**代码清单 2-25.** 建议的逻辑\
  \ XML 结构\n\n遵循图 2-5 的路线图和代码清单 2-25 的逻辑 XML 结构，最终的 XML 结构将由五个嵌套层级组成，包含：\n*   `<Products>`\
  \ 是根元素。\n*   `<Categories>` 是一个容器数据元素，直接容纳每个 `<Category>` 元素及其所有相关的 `<Subcategory>`\
  \ 元素。\n*   `<Category>` 是 `<Categories>` 元素的直接子元素，将包含类别名称。`<Subcategories>` 元素与\
  \ `<Category>` 元素是同级元素，同时也是 `<Categories>` 元素的直接子元素。这是用于存放与同级 `<Category>` 元素相关的、特定于子类别的数据的容器元素。\n\
  *   `<Subcategory>` 是 `<Subcategories>` 元素的直接子元素。此元素保存当前子类别的名称。`<Product>` 元素代表子类别内的单个产品。此元素是\
  \ `<Subcategories>` 元素的直接子元素，也是 `<Subcategory>` 元素的同级元素。`<Product>` 元素将分配有多个属性，并充当产品特定数据元素的容器。\n\
  *   `<ProductName>` 是包含产品名称的数据元素。`<Color>` 元素在有值时包含产品的颜色。`<Color>` 元素被标识为 `XSINIL`，这意味着即使源列为\
  \ `NULL`，我们也希望此元素出现在结果中。`<ProductName>` 和 `<Color>` 元素是同级元素，两者都是 `<Product>` 元素的直接子元素。\n\
  \n下一步是构建查询。`EXPLICIT`模式的语法有某些需要遵循的规则和规范：\n1.  查询可以包含一个或多个 `SELECT` 语句块，使用 `UNION\
  \ ALL` 将它们全部连接起来。\n2.  每个 `SELECT` 语句块必须包含两个名为 `Tag` 和 `Parent` 的整数类型列，作为查询的前两列。这些列定义了父级和子级层级之间的结构关系。例如，代码清单\
  \ 2-23 有多个嵌套层级，`SELECT` 子句确立了层级结构，如代码清单 2-26 中的代码片段所示。\n    ```sql\n    SELECT 1\
  \ AS Tag,\n    0 AS Parent,\n    .\n    .\n    .\n    UNION ALL\n    SELECT 2 AS\
  \ Tag,\n    1 AS Parent,\n    .\n    .\n    .\n    UNION ALL\n    SELECT 3  AS Tag,\n\
  \    2  AS Parent,\n    .\n    .\n    .\n    ```\n    **代码清单 2-26.** `Tag` 和 `Parent`\
  \ 列定义 XML 层级结构的代码片段\n\n    在第一个 `SELECT` 查询中，`Parent` 列以值 0 开始层级。`Tag` 列指定层级编号。在第二个\
  \ `SELECT` 查询中，`Tag` 值成为 `Parent` 并递增到下一个数字。这种交替机制应用于每个层级。\n3.  下一个重要的规则是建立 XML\
  \ 结构。在 `EXPLICIT` 模式下，每个列必须在第一个 `SELECT` 块中定义，并且 `EXPLICIT` 模式对此有特殊的语法。在代码清单 2-23\
  \ 中，您可以看到 `Tag` 和 `Parent` 列之后的所有列都有一个非常特定的别名样式，其格式必须为：`[ElementName!TagNumber!AttributeName!Directive]`。我们在代码清单\
  \ 2-23 查询中的一个例子是 `[Categories!1!Category!ELEMENT]`。这个特定的别名定义了我们 XML 中 `<Category>`\
  \ 元素的结构，它包含类别名称。下面是这个别名的分解：\n    *   `Categories` – 元素名称的通用标识符。\n    *   `1` – 元素的标签编号，代表嵌套的\
  \ XML 层级。值为 1 表示这是顶级元素（不包括根元素）。\n    *   `Category` – 值属性的名称，除非指定了 `ELEMENT` 指令，此时它用作元素名称。\n\
  \    *   `ELEMENT` – 该指令指定以元素为中心的表示。以属性为中心是默认设置，因此无需指定以属性为中心的表示。如果使用 `ELEMENTXSINIL`，即使源值为\
  \ `NULL`，该元素也将被包含。每个别名部分由感叹号 (!) 分隔，这种命名约定是规则的一部分。因为每个别名包含特殊字符（“!”），所以它们必须用引号括起来。以下是代码清单\
  \ 2-23 中的其他别名：\n        *   `[Subcategories!2!Subcategory!ELEMENT]` – Categories\
  \ 元素的子级（标签 2），表示子类别值，以元素为中心。\n        *   `[Product!3!ProductName!ELEMENT]` – Subcategories\
  \ 元素的子级（标签 3），表示产品名称值，以元素为中心。\n        *   `[Product!3!Color!ELEMENTXSINIL]` – Subcategories\
  \ 的子级（标签 3），表示颜色值，以元素为中心，带有 `XSINIL` 指令。\n        *   `[Product!3!Shelf]` – Subcategories\
  \ 的子级（标签 3），表示货架值，以属性为中心。\n        *   `[Product!3!Bin]` – Subcategories 的子级（标签\
  \ 3），表示货仓位值，以属性为中心。\n        *   `[Product!3!Quantity]` – Subcategories 的子级（标签 3），表示数量值，以属性为中心。\n\
  4.  在给定的 `TagNumber` 内，别名的 `ElementName` 部分必须相同，即使值是从不同的表中检索的。例如，对于 `TagNumber`\
  \ 3，必须始终使用 `Product` 作为 `ElementName`，如下所示：\n    ```sql\n    [Product!3!ProductName!ELEMENT]\
  \ -- 表 Product，列 Name\n    [Product!3!Color!ELEMENTXSINIL] -- 表 Product，列 Color\n\
  \    [Product!3!Shelf] – 表 Inventory 列 Shelf\n    [Product!3!Bin] - 表 Inventory\
  \ 列 Bin\n    [Product!3!Quantity] - 表 Inventory 列 Quantity\n    ```\n5.  源查询的 `SELECT`\
  \ 块都必须遵守 SQL 的 `UNION ALL` 运算符规则。每个 `SELECT` 语句必须具有相同数量的列。当不需要某列时，必须用 `NULL` 值填充。\n\
  6.  排序是 `EXPLICIT` 模式的一个重要考虑因素。`ORDER BY` 子句最终确定 XML 层级结构。因此，排序顺序需要遵循父级到子级的序列。`ORDER\
  \ BY` 子句中的列名必须与顶级 `SELECT` 查询中的别名相同。例如：\n    ```sql\n    ORDER BY [Categories!1!Category!ELEMENT],\n\
  \    [Subcategories!2!Subcategory!ELEMENT],\n    [Product!3!ProductName!ELEMENT]\n\
  \    ```\n\n显然，实现 `EXPLICIT` 模式比我们目前讨论的其他模式要复杂得多；然而，`EXPLICIT` 模式为用户提供了对 XML 生成过程的完全控制。与其他模式不同，此\
  \ `FOR XML` 模式可以通过内部指令进行扩展，允许用户控制每个单独的 XML 元素和属性。表 2-1 列出了 `EXPLICIT` 模式的指令。\n\n\
  **表 2-1.** `EXPLICIT` 模式指令列表\n\n| 指令 | 定义 | 语法示例 |\n| --- | --- | --- |\n| `ID,\
  \ IDREF, IDREFS` | 启用文档内链接，类似于关系数据库中的主键和外键关系。 | `[Product!3!ProductList!IDREFS]`\
  \ |\n| `CDATA` | 如果指令设置为 `CDATA`，则包含的数据不会被实体编码，而是放入 CDATA 节中。`CDATA` 属性必须是匿名的。 |\
  \ `[Product!3!!CDATA]` |\n| `HIDE` | 隐藏节点。当您仅为了排序目的而检索值，但不希望它们出现在结果 XML 中时，此指令很有用。\
  \ | `[Product!3!Shelf!HIDE]` |\n| `ELEMENT` | 生成元素而不是属性。 | `[Product!3!ProductName!ELEMENT]`\
  \ |\n| `ELEMENTXSINIL` | 为 `NULL` 值生成带有 `xsi:nil=“true”` 属性的元素。类似于 `XSINIL` 指令。\
  \ | `[Product!3!Color!ELEMENTXSINIL]` |\n| `XML` | 生成元素，就像元素指令一样。不同之处在于，xml 指令不进行实体编码。\
  \ | `[Product!3!Color!XML]` |\n| `XMLTEXT` | 如果指定了 xmltext 指令，则列内容将被包装在单个标签中，该标签与文档的其余部分集成。\
  \ | `[Parent!1!!XMLTEXT]` |\n\n"
- "# 2-9. 简化自定义 XML 生成\n\n### 问题\n\n`EXPLICIT` 模式允许对生成的 XML 格式进行细粒度控制，但使用起来很复杂。你想要生成自定义格式的\
  \ XML，但希望有一个更简单、同时能达到与 `EXPLICIT` 模式类似效果的替代方案。\n\n### 解决方案\n\n`PATH` 模式可以提供与使用 `EXPLICIT`\
  \ 模式生成的 XML 相似的结果。然而，用于生成 `PATH` 模式 XML 的机制比 `EXPLICIT` 模式简单得多，这是一个很大的优点。`PATH`\
  \ 模式的一个限制是它没有 `EXPLICIT` 模式那么多的指令选项。清单 2-27 展示了配方 2-9 中使用 `PATH` 模式实现的查询。\n\n```sql\n\
  SELECT ProductCategory.Name AS \"Category/CategoryName\",\nSubcategory.Name AS \"\
  Category/Subcategory/SubcategoryName\",\nInventory.Shelf AS \"Category/Subcategory/Product/ProductName/@Shelf\"\
  ,\nInventory.Bin AS \"Category/Subcategory/Product/ProductName/@Bin\",\nInventory.Quantity\
  \ AS \"Category/Subcategory/Product/ProductName/@Quantity\"\nProduct.Name AS \"\
  Category/Subcategory/Product/ProductName\",\nProduct.Color AS \"Category/Subcategory/Product/Color\"\
  ,\nFROM Production.Product Product\nINNER JOIN Production.ProductInventory Inventory\n\
  ON Product.ProductID = Inventory.ProductID\nINNER JOIN Production.ProductSubcategory\
  \ Subcategory\nON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\n\
  INNER JOIN Production.ProductCategory\nON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
  ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name\nFOR XML PATH('Categories'),\
  \ ELEMENTS XSINIL, ROOT('Products');\n```\n清单 2-27. 使用 `PATH` 模式生成自定义 XML\n\n###\
  \ 工作原理\n\n比较展示 `EXPLICIT` 模式的清单 2-23 和展示 `PATH` 模式的清单 2-27。很明显，`PATH` 模式没有使用多个 `SELECT`\
  \ 语句和 `UNION ALL` 来生成嵌套 XML 数据。相反，XML 层次结构是通过 XML 路径语言（XPath）风格的列别名定义的，其中路径中的步骤用正斜杠分隔。\n\
  \n要使用 `PATH` 模式生成 XML，请遵循以下规则：\n\n1.  位置应反映预期的 XML 层次结构，即子元素列在父元素下。例如：\n    ```sql\n\
  \    SELECT ProductCategory.Name AS \"Category/CategoryName\",\n    Subcategory.Name\
  \ AS \"Category/Subcategory/SubcategoryName\",\n    ```\n\n2.  每个子级别都在 XPath 别名中建立，通过用斜杠将其与父元素分隔，并添加子元素名称。例如：\n\
  \    ```sql\n    Name AS \"Category/CategoryName\",\n    Name AS \"Category/Subcategory/SubcategoryName\"\
  ,\n    Name AS \"Category/Subcategory/Product/ProductName\",\n    ```\n\n3.  当别名中出现“@”符号时，它会将值呈现为属性；否则定义为元素。此代码段展示了“@”在定义\
  \ XML 输出属性中的应用：\n    ```sql\n    SELECT ...\n    Inventory.Shelf AS \"Category/Subcategory/Product/ProductName/@Shelf\"\
  ,\n    Inventory.Bin AS \"Category/Subcategory/Product/ProductName/@Bin\",\n   \
  \ Inventory.Quantity AS \"Category/Subcategory/Product/ProductName/@Quantity\",\n\
  \    ...\n    ```\n\n4.  `ORDER BY` 子句在 `PATH` 模式下的效果与在 `EXPLICIT` 模式下不同，因此可以完全省略。但是，根据\
  \ XML 结构对查询进行排序是一个好习惯。例如：\n    ```sql\n    ORDER BY ProductCategory.Name , Subcategory.Name,\
  \ Product.Name\n    ```\n\n5.  建议的命名约定是在括号内为 `PATH` 提供一个元素名称。默认情况下，`PATH` 模式生成一个\
  \ `<row>` 元素，但这并不是最佳的 XML 设计。例如：\n    ```sql\n    FOR XML PATH('Categories')\n \
  \   ```\n\n6.  当 `XSINIL` 指令在 `PATH` 模式中实现时，该指令会自动应用于所有 XML 元素。然而，在 `EXPLICIT` 模式中，`ELEMENTXSINIL`\
  \ 指令仅影响指定指令的元素。\n7.  指定根元素是良好的 XML 设计实践。我强烈建议在所有 XML 查询中使用 `ROOT(‘ElementName')`\
  \ 选项。\n\n总结这个配方，我建议分析你期望的 XML，然后决定是使用 `EXPLICIT` 还是 `PATH` 模式。两种模式各有优缺点：`EXPLICIT`\
  \ 模式使用起来更复杂，但它让你能更好地控制 XML 输出。`PATH` 模式则相反，它易于编写代码；然而，你对元素和属性的控制力稍弱一些。\n\n"
- "# 2-10. 向 XML 添加特殊节点\n\n### 问题\n\n你希望向生成的 XML 数据中添加特殊节点，例如注释、处理指令或自定义文本。\n\n###\
  \ 解决方案\n\n`FOR XML` 子句的 `PATH` 模式支持 XML 路径语言（XPath）节点测试。XPath 语法支持一部分节点测试名称，这些名称充当函数。这些函数向最终的\
  \ XML 输出添加特定类型的节点。清单 2-28 是一个演示多个 XPath 节点测试的查询。\n\n```sql\nSELECT ProductCategory.Name\
  \ AS \"Category/CategoryName\",\nN'Sales started ' + convert(nvarchar(12), Product.SellStartDate,\
  \ 101) AS \"Category/comment()\",\nN'The record for product number ' + Product.ProductNumber\
  \ AS \"processing-instruction(xml:file)\",\n(\nSELECT DISTINCT Location.Name \"\
  text()\", N', cost rate $',\nLocation.CostRate \"text()\"\nFROM Production.ProductInventory\
  \ Inventory\nINNER JOIN Production.Location Location\nON Inventory.LocationID =\
  \ Location.LocationID\nWHERE Product.ProductID = Inventory.ProductID\nFOR XML PATH('LocationName'),\
  \ TYPE\n) AS \"Locations/node()\",\nSubcategory.Name AS \"Category/Subcategory/SubcategoryName\"\
  ,\nProduct.Name AS \"Category/Subcategory/Product/ProductName\",\nProduct.Color\
  \ AS \"Category/Subcategory/Product/Color\",\nInventory.Shelf AS \"Category/Subcategory/Product/ProductName/@Shelf\"\
  ,\nInventory.Bin AS \"Category/Subcategory/Product/ProductName/@Bin\",\nInventory.Quantity\
  \ AS \"Category/Subcategory/Product/ProductName/@Quantity\"\nFROM Production.Product\
  \ Product\nINNER JOIN Production.ProductInventory Inventory\nON Product.ProductID\
  \ = Inventory.ProductID\nINNER JOIN Production.ProductSubcategory Subcategory\n\
  ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\nINNER JOIN Production.ProductCategory\n\
  ON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
  ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name\nFOR XML PATH('Categories'),\
  \ ELEMENTS XSINIL, ROOT('Products');\n```\n清单 2-28. 演示 XPath 节点测试\n\n注意\n\nXPath\
  \ 节点测试名称区分大小写。因此，所有节点测试名称必须以小写字母输入，否则 SQL 将引发错误。例如，当函数 `text()` 被输入为 `Text()` 时，会抛出类似于以下的错误：Msg\
  \ 6850, Level 16, State 1 … Column name ‘Text()’ contains an invalid XML identifier\
  \ as required by FOR XML; …\n\n### 工作原理\n\n当 XPath 节点测试在 `PATH` 模式下使用时，它们会向您的 XML\
  \ 结果添加一个特殊节点。节点测试始终位于 XPath 列别名的末尾。例如，在 `“Category/comment()”` 路径或 `“processing-instruction(xml:file)”`\
  \ 路径中。此外，节点测试也可以单独用作列别名，无需层次路径。表 2-2 列出了支持的 `FOR XML PATH` XPath 节点测试。\n\n表 2-2.\
  \ XPath 节点测试\n\n| 节点类型 | 节点返回 | 节点示例 |\n| --- | --- | --- |\n| `comment()` | 返回注释节点。\
  \ | `element/comment()` 选择上下文节点之后出现的所有注释节点。 |\n| `node()` | 返回任何类型的节点。可用于向结果添加子集\
  \ XML。 | `element/node()` 选择上下文节点之前出现的所有节点。 |\n| `processing-instruction(name)`\
  \ | 返回处理指令节点。 | `processing instruction(PI Name)` 选择上下文节点内的所有处理指令节点。 |\n| `text()`\
  \ | 返回文本节点。可用于将多个列合并为一个 XML 元素。 | `element/text()` 选择作为上下文节点子节点的文本节点。 |\n\n回顾清单\
  \ 2-28 中的代码，我们可以看到以下内容：\n\n1.  要在 `<CategoryName>` 元素下生成注释，需要在别名中提供带有 `comment()`\
  \ 节点测试的路径。生成的 XML 会将数据行映射到 XML 结果中的特殊注释标签 `<!--comment-->` 中。根据我们的示例代码：\n    ```sql\n\
  \    N'Sales started' + convert(nvarchar(12), Product.SellStartDate, 101) AS \"\
  Category/comment()\"\n    ```\n\n2.  `processing-instruction(name)` 节点测试必须在其括号内指定目标名称。如果未提供目标名称，将引发错误。此函数创建格式为\
  \ `<?name ?>` 的特殊 XML 节点。例如：\n    ```sql\n    N'The record for product number '\
  \ + Product.ProductNumber AS \"processing-instruction(xml:file)\"\n    ```\n\n3.\
  \  当需要将多个列连接为单个元素时，`text()` 节点测试非常有用。例如：\n    ```sql\n    SELECT DISTINCT Location.Name\
  \ \"text()\", ', cost rate $',\n    Location.CostRate \"text()\"\n    ```\n\n4.\
  \  当需要将值插入 XML 数据类型时，`node()` 节点测试很有用。在清单 2-28 中，相关子查询执行两个操作。首先，它连接位置和成本率列；其次，它产生一个\
  \ XML 结果，因为一个产品可能有多个关联的位置。图 2-6 在一个 XML 结果中演示了所有 XPath 节点测试函数。\n    ![A435478_1_En_2_Fig6_HTML.jpg](img/A435478_1_En_2_Fig6_HTML.jpg)\n\
  \    图 2-6. 包含所有 XPath 节点测试函数的 XML 结果\n\n## 总结\n\n本章讨论了四种 `FOR XML` 模式：`RAW`、`AUTO`、`EXPLICIT`\
  \ 和 `PATH`。详细解释了每种模式，并针对特定情况提供了应使用的最佳模式建议，以及如何实现每种模式的技巧。我还讨论了指令、它们的功能以及每个指令如何与各种\
  \ XML 模式交互。如果您需要构建自定义 XML 结果，本章提供了如何构建健壮的自定义 XML 数据的方向。\n\n`FOR XML` 子句为用户提供了强大而高效的选项，用于从关系数据构建\
  \ XML 结果。图 2-7 中的图表说明了每种 `FOR XML` 模式支持的指令。\n![A435478_1_En_2_Fig7_HTML.gif](img/A435478_1_En_2_Fig7_HTML.gif)\n\
  图 2-7. 按模式分类的可用 `FOR XML` 指令\n\n下一章将演示如何将 XML 结果存储在存储介质（磁盘、SSD 驱动器、SAN 等）上，以及如何将\
  \ XML 文件上传到表中。\n\n"
- "# 3. 操作 XML 文件\n\n在第 2 章中，我们讨论了如何从 SQL 查询结果集构建 XML。在我们开始回顾如何分解 XML 数据的选项之前，我们首先需要知道如何将\
  \ XML 结果存储在存储介质（磁盘、SSD 驱动器、SAN 等）上，以及如何将 XML 文件上传到表中。本章将演示操作 XML 文件的各种选项。\n\n##\
  \ 3-1. 从 SQL 将 XML 结果存储到文件中\n\n### 问题\n\n您希望将 SQL 中生成的 XML 结果存储为 `.xml` 文件。\n\n\
  ### 解决方案\n\n`BCP`（大容量复制程序）实用程序允许将数据导出到 XML 文件。当文件路径有效且 SQL Server 帐户具有存储文件所需的足够权限时，则可以从存储过程执行该过程。清单\
  \ 3-1 演示了存储过程如何使用 `@FilePath` 参数中提供的文件路径创建 XML 文件。\n\n```sql\nCREATE PROCEDURE dbo.usp_WriteXMLFile\n\
  @XML XML,\n@FilePath nvarchar(200)\nAS\nBEGIN\nSET NOCOUNT ON;\nIF (OBJECT_ID('tempdb..##XML')\
  \ IS NOT NULL)\nDROP TABLE ##XML;\nCREATE TABLE ##XML (XMLHolder XML);\nINSERT INTO\
  \ ##XML\n(\nXMLHolder\n)\nSELECT @XML;\n-- 准备日志表\nDECLARE @cmd TABLE\n(\nname NVARCHAR(35),\n\
  minimum INT,\nmaximum INT,\nconfig_value INT,\nrun_value INT\n);\nDECLARE @run_value\
  \        INT;\n-- 保存原始配置集\nEXECUTE master.dbo.sp_configure 'show advanced options',\
  \ 1;\nRECONFIGURE ;\nINSERT INTO @cmd\n(\nname,\nminimum,\nmaximum,\nconfig_value,\n\
  run_value\n)\nEXECUTE sp_configure 'xp_cmdshell';\nSELECT @run_value = run_value\n\
  FROM @cmd;\nIF @run_value = 0\nBEGIN\n-- 启用 xp_cmdshell\nEXEC sp_configure 'xp_cmdshell',\
  \ 1;\nRECONFIGURE;\nEND;\nDECLARE @SQL nvarchar(300) = '';\nSET @SQL = 'bcp ##XML\
  \ out \"' + @FilePath + '\\Categories_'\n+ FORMAT(GETDATE(), N'yyyyMMdd_hhmmss')\n\
  + '.xml\" -S \"' + @@SERVERNAME + '\" -T -c';\n-- REPLACE(REPLACE(REPLACE(CONVERT(varchar(20),\
  \ GETDATE(), 120), '-', ''), ' ', '_'), ':', '')\n-- 对于仍在使用 SQL Server 2008 R2 或更早版本的用户，请使用\
  \ REPLACE 代替 FORMAT。FORMAT 函数在 SQL 2012 中引入。\nEXECUTE master..xp_cmdshell @SQL;\n\
  IF @run_value = 0\nBEGIN\n-- 禁用 xp_cmdshell\nEXECUTE sp_configure 'xp_cmdshell',\
  \ 0;\nRECONFIGURE;\nEND;\nIF (OBJECT_ID('tempdb..##XML') IS NOT NULL)\nDROP TABLE\
  \ ##XML;\nSET NOCOUNT OFF;\nEND;\nGO\n```\n清单 3-1. 使用存储过程通过目标文件路径写入 XML 文件\n\n###\
  \ 工作原理\n\n存储过程 `usp_WriteXMLFile`（如清单 3-1 所示）包含几个重要组件，以实现在 SQL Server 内部成功创建 XML\
  \ 文件。让我们分解这个存储过程，来了解 XML 文件写入过程是如何工作的：\n\n1.  参数 `@FilePath` 是 XML 文件的目标路径。该参数使得存储过程非常灵活，尤其是在不同环境（如开发、预演和生产环境）中运行时。\n\
  2.  `CREATE` 一个全局临时表 (`##XML`)，最后再 `DROP` 它。使用一个名为 `XMLHolder`、数据类型为 `XML` 的列来获取\
  \ `XML` 数据。需要创建全局临时表的情况比较少见；然而，如果引用了会话级临时表，`BCP` 命令将会报错。因此，我们可以使用永久表或全局临时表。如果过程属于并发进程的一部分，那么使用全局临时表总是存在风险。全局临时表在整个服务器范围内可见，如果其他人碰巧同时使用该存储过程，某个用户的表可能会被覆盖，从而导致结果不准确。请参考第\
  \ 3 章的代码示例，其中存储过程 `usp_WriteXMLFileDynamicTable` 演示了如何解决此问题。\n3.  将 `XML` 数据 `INSERT`\
  \ 到全局临时表 (`##XML`) 中。\n4.  要从存储过程或 SSMS 运行 `BCP` 命令，服务器实例需要配置 `xp_cmdshell` 选项值为\
  \ 1。这意味着实例允许运行 `xp_cmdshell` 扩展存储过程。有些情况下，出于安全原因，可能要求将服务器实例的配置保持为值 0（禁用状态）。在这种情况下，你仍然需要编写代码，在创建\
  \ XML 文件时将服务器实例从值 0 切换到 1，然后再切换回 0。由于 `BCP` 命令能够在毫秒级内创建 XML 文件，因此在服务器设置为值 0 以启用\
  \ `xp_cmdshell` 存储过程来创建 XML 文件的这几毫秒内，实际上没有安全风险。\n    *   为了保留原始设置，创建了表变量 `@cmd`。\n\
  \    *   系统存储过程 `sp_configure` 使用参数值 `'xp_cmdshell'`。该结果被插入到表变量 `@cmd` 中，它反映了 `'xp_cmdshell'`\
  \ 选项的当前状态。\n    *   以下语句 `SELECT @run_value = run_value FROM @cmd` 将局部变量 `@run_value`\
  \ 赋值，以保存 `xp_cmdshell` 选项的 `run_value` 供进一步分析。\n    *   条件语句 `IF @run_value = 0`\
  \ 检测是否需要将选项值从 0 更改为 1。\n5.  创建变量 `@SQL` 来组合 `BCP` 实用程序的语句。\n6.  最终的命令取决于实例和数据库名称，可能如下所示：\n\
  \n    让我们更仔细地看看 `BCP` 创建 XML 文件所需的所有参数和开关：\n    *   `BCP` – 批量复制实用程序的可执行文件名。\n \
  \   *   `##XML` – 包含 XML 数据的表名。\n    *   `out` – 指示从表中复制数据并将其发送到目标。\n    *   `\"\
  C:\\TEMP\\Categories_20170310_164701.xml\"` – 文件路径。\n    *   `-S \"APRESS\\SQL2016\"\
  ` – 服务器名称。\n    *   `-T` – 指定 `BCP` 命令在受信任的连接下运行。要使用 SQL Server 凭据运行 `BCP`，请使用 `-U\
  \ login_Name -P password` 选项代替 `-T`。\n    *   `-c` – 指定输出内容为字符数据类型。**注意** 以短横线开头的\
  \ `BCP` 参数区分大小写。例如，`-T` 是用于受信任连接的选项；而 `-t` 是字段终止符。\n    语句 `exec master..xp_cmdshell\
  \ @SQL` 运行 `BCP` 命令。\n    语句 `IF @run_value = 0` 条件检测是否需要将选项值从 1 改回 0。\n    为了完成流程，应该销毁\
  \ `##XML` 表。\n\n```sql\nIF (OBJECT_ID('tempdb..##XML') IS NOT NULL)\nDROP TABLE\
  \ ##XML;\n```\n\n```cmd\nBCP ##XML out \"C:\\TEMP\\Categories_20170310_164701.xml\"\
  \ -S \"APRESS\\SQL2016\" -T -c\n```\n\n要测试存储过程，请运行以下代码：\n\n```sql\nDECLARE @x XML\n\
  SET @x = (\nSELECT ProductCategory.Name AS \"Category/CategoryName\",\n(\nSELECT\
  \ DISTINCT Location.Name \"text()\", ', cost rate $',\nLocation.CostRate \"text()\"\
  \nFROM Production.ProductInventory Inventory\nINNER JOIN Production.Location Location\n\
  ON Inventory.LocationID = Location.LocationID\nWHERE Product.ProductID = Inventory.ProductID\n\
  FOR XML PATH('LocationName'), TYPE\n) AS \"Locations/node()\",\nSubcategory.Name\
  \ AS \"Category/Subcategory/SubcategoryName\",\nProduct.Name AS \"Category/Subcategory/Product/ProductName\"\
  ,\nProduct.Color AS \"Category/Subcategory/Product/Color\",\nInventory.Shelf AS\
  \ \"Category/Subcategory/Product/ProductName/@Shelf\",\nInventory.Bin AS \"Category/Subcategory/Product/ProductName/@Bin\"\
  ,\nInventory.Quantity AS \"Category/Subcategory/Product/ProductName/@Quantity\"\n\
  FROM Production.Product Product\nINNER JOIN Production.ProductInventory Inventory\n\
  ON Product.ProductID = Inventory.ProductID\nINNER JOIN Production.ProductSubcategory\
  \ Subcategory\nON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\n\
  INNER JOIN Production.ProductCategory\nON Subcategory.ProductCategoryID = ProductCategory.ProductCategoryID\n\
  ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name\nFOR XML PATH('Categories'),\
  \ ELEMENTS XSINIL, ROOT('Products')\n)\nEXECUTE usp_WriteXMLFile @x, 'C:\\TEMP'\n\
  ```\n\n当存储过程 `usp_WriteXMLFile` 执行完成后，`BCP` 实用程序会返回完成状态及运行时间（以毫秒为单位）。如图 3-1 所示，我创建\
  \ XML 文件的运行时间是 15 毫秒。XML 文件创建在 `C:\\TEMP` 目录中。图 3-1 展示了 `BCP` 实用程序的输出。\n\n![A435478_1_En_3_Fig1_HTML.jpg](img/A435478_1_En_3_Fig1_HTML.jpg)\n\
  **图 3-1.** 显示 `BCP` 实用程序完成状态\n\n如果需要隐藏完成输出状态，则在执行 `xp_cmdshell` 扩展存储过程之前，向存储过程中添加以下代码：\n\
  \n```sql\nDECLARE @stat TABLE\n(\nBCPStat VARCHAR(500)\n);\nINSERT INTO @stat\n\
  (\nBCPStat\n)\nEXECUTE master..xp_cmdshell @SQL;\n```\n\n`@stat` 表变量吸收了 `BCP` 的完成输出；因此存储过程不会返回任何消息。\n\
  \n**注意**\n“3-1 从 SQL 将 XML 结果存储到文件中”和“3-3 从存储过程加载 XML”这两个方案都实现了 `xp_cmdshell` 扩展存储过程。`xp_cmdshell`\
  \ 存储过程存在安全风险，这就是它默认在 SQL Server 中被禁用的原因。这两个方案都实现了 `xp_cmdshell`，其逻辑是自我检测并开关，以最小化安全风险。但是，如果由于任何原因，你在使用\
  \ `xp_cmdshell` 时遇到问题，请考虑采用方案“3-5 实现 CLR 解决方案”作为 `xp_cmdshell` 的替代方案。\n\n## 3-2.\
  \ 从 SSIS 包创建 XML\n\n### 问题\n\n你想要开发一个替代使用 `BCP` 实用程序从结果集创建 XML 文件的方法？\n\n\n### 解决方案\n\
  \nBCP 实用工具是一个方便的旧式命令行实用工具，但 SSIS 是 Microsoft 的标准 ETL 解决方案。SSIS 包可以为数据转换过程提供全面的解决方案。SSIS\
  \ 至少提供三个选项来执行创建 XML 文件的任务：\n\n1.  `脚本任务`\n2.  `平面文件目标`\n3.  `导出列` 转换\n\n这些选项中的每一个都相对容易完成；然而，我的偏好是\
  \ `脚本任务`。我有几个论据来支持我的偏好：\n\n*   `脚本任务` 是进行文件操作的简便快速的解决方案。\n*   只需几行代码（无论是 C# 还是 VB.NET），你就可以提供任务解决方案（即使你没有任何\
  \ .NET 知识，只需复制提供的代码即可）。\n*   调试过程轻松高效。\n*   使用 `脚本任务`，你可以完全控制整个过程。\n\n## SSIS 包创建\n\
  \n为了获得完整的 SSIS 解决方案，我们需要创建三个控制流任务：\n\n1.  一个名为“获取 XML 内容”的 `执行 SQL 任务`，用于从数据库获取\
  \ XML 结果。\n2.  为 `TimeStamp` 变量设置表达式，以获取用于 XML 文件名的日期和时间。\n3.  一个名为“创建 XML 文件”的\
  \ `脚本任务`，用于将 XML 文件写入目标位置。\n\n图 3-2 展示了一个简单的 SSIS 包控制流。\n\n![A435478_1_En_3_Fig2_HTML.jpg](img/A435478_1_En_3_Fig2_HTML.jpg)\n\
  \n*图 3-2. 显示 SSIS 包。*\n\n要创建 SSIS 包，请新建一个 Integration Services 项目。将包命名为 `CreateXMLFile`\
  \ 并保存项目。然后从 `工具箱` 将 `执行 SQL 任务` 拖放到包设计器窗格上。如果 `工具箱` 在你的新项目中没有显示，请按下图 3-3 所示右上角的按钮。\n\
  \n![A435478_1_En_3_Fig4_HTML.jpg](img/A435478_1_En_3_Fig4_HTML.jpg)\n\n*图 3-4. 弹出上下文菜单的“变量”选项。*\n\
  \n我们需要创建三个包级别的变量。要创建变量，请在设计器窗格的空白区域单击鼠标右键。在弹出菜单中选择“变量”以加载 `变量` 对话框，如图 3-4 所示。\n\n\
  ![A435478_1_En_3_Fig3_HTML.jpg](img/A435478_1_En_3_Fig3_HTML.jpg)\n\n*图 3-3. 显示工具箱按钮位置。*\n\
  \n在 `变量` 对话框中：\n\n*   单击“添加变量”按钮。\n*   键入变量名称。\n*   选择适当的数据类型（在我们的例子中，选择 `String`\
  \ 数据类型）。\n*   在需要时提供变量默认值。\n*   另外，请确保该变量具有 SSIS 包作用域。\n\n图 3-5 展示了 `变量` 表单条目。\n\
  \n![A435478_1_En_3_Fig5_HTML.jpg](img/A435478_1_En_3_Fig5_HTML.jpg)\n\n*图 3-5. 显示变量表单条目。*\n\
  \n**提示：** 良好的做法是使用变量代替硬编码的值，这样在执行包时可以有更大的灵活性。\n\n以上变量已创建，下面描述了它们的用途：\n\n![A435478_1_En_3_Fig6_HTML.jpg](img/A435478_1_En_3_Fig6_HTML.jpg)\n\
  \n*图 3-6. 显示配置 OLE DB 连接表单的步骤。*\n\n*   `FileDestinationPath` – 用于指定目标文件夹。此变量可以在包外部修改，实际上提供了参数功能。\n\
  *   `TimeStamp` – 用于获取文件名时间戳。\n*   `XMLData_Content` – 用于存储将要写入文件的 XML 结果。\n\n##\
  \ 配置执行 SQL 任务\n\n创建变量后，我们就可以放置和配置名为“获取 XML 内容”的 `执行 SQL 任务`。从 `工具箱` 中将 `执行 SQL 任务`\
  \ 拖放到设计器表面。要配置 `执行 SQL 任务`，你可以双击该任务，或右键单击它并从上下文菜单中选择“编辑…”。当 `执行 SQL 任务编辑器` 显示出来时，我们就可以开始配置任务了。任务配置需要以下步骤：\n\
  \n1.  首先，我们需要创建或选择一个现有的到 SQL Server 的 `连接`。在 `执行 SQL 任务编辑器` 中，从左侧的编辑器选项列表中选择 `常规`。\n\
  2.  单击 `连接`。\n3.  在右侧选择下拉箭头。\n4.  单击 `<新建连接>` 以打开 `连接` 对话框，或选择现有连接。图 3-6 展示了选择现有连接或调用\
  \ `配置 OLE DB 连接表单` 的步骤。\n\n通过单击“新建…”按钮配置 `OLE DB 连接表单`。在 `连接管理器` 对话框中：\n\n![A435478_1_En_3_Fig7_HTML.jpg](img/A435478_1_En_3_Fig7_HTML.jpg)\n\
  \n*图 3-7. 显示连接管理器表单配置步骤。*\n\n1.  从 `服务器名称` 下拉列表中选择或输入源服务器名称。\n2.  在“登录到服务器”选项中，选择身份验证类型。\n\
  3.  在“连接到数据库”选项中，选择数据库名称。\n4.  可选但建议的操作是，单击 `测试连接` 按钮以确认你的配置。图 3-7 展示了 `连接管理器` 对话框配置步骤。\n\
  \n## 配置 SQL 语句\n\n连接准备好后，下一步是添加 SQL 查询。在 `连接` 属性下，检查 `SQLSourceType` 属性。默认情况下，该值为\
  \ `直接输入`，但请再次确认选中了 `直接输入`。最重要的属性之一是 `SQLStatement`。在本示例中，我们将采用第 2 章中演示的查询。要配置 `SQLStatement`\
  \ 属性，只需添加清单 3-2 中用于 SSIS 包的 SQL 查询。\n\n```sql\nSELECT ProductCategory.Name AS \"\
  Category/CategoryName\",\n(\nSELECT DISTINCT Location.Name \"text()\", ', cost rate\
  \ $',\nLocation.CostRate \"text()\"\nFROM Production.ProductInventory Inventory\n\
  INNER JOIN Production.Location Location\nON Inventory.LocationID = Location.LocationID\n\
  WHERE Product.ProductID = Inventory.ProductID\nFOR XML PATH('LocationName'), TYPE\n\
  ) AS \"Locations/node()\",\nSubcategory.Name AS \"Category/Subcategory/SubcategoryName\"\
  ,\nProduct.Name AS \"Category/Subcategory/Product/ProductName\",\nProduct.Color\
  \ AS \"Category/Subcategory/Product/Color\",\nInventory.Shelf AS \"Category/Subcategory/Product/ProductName/@Shelf\"\
  ,\nInventory.Bin AS \"Category/Subcategory/Product/ProductName/@Bin\",\nInventory.Quantity\
  \ AS \"Category/Subcategory/Product/ProductName/@Quantity\"\nFROM Production.Product\
  \ Product\nINNER JOIN Production.ProductInventory Inventory\nON Product.ProductID\
  \ = Inventory.ProductID\nINNER JOIN Production.ProductSubcategory Subcategory\n\
  ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\nINNER JOIN Production.ProductCategory\n\
  ON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
  ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name\nFOR XML PATH('Categories'),\
  \ ELEMENTS XSINIL, ROOT('Products');\n```\n\n*清单 3-2. SSIS 包的查询清单（列出类别）。*\n\n最后，在\
  \ `常规` 菜单上，将 `结果集` 属性设置为 `XML`。图 3-8 显示了 `常规` 菜单配置。\n\n![A435478_1_En_3_Fig8_HTML.jpg](img/A435478_1_En_3_Fig8_HTML.jpg)\n\
  \n*图 3-8.*\n\n\n"
