  ## 8-2\. 处理 JSON 构建时的 NULL 值


  ### 问题


  当值为`NULL`时，你希望保留键元素名称。


  ### 解决方案


  `FOR JSON`子句中的`INCLUDE_NULL_VALUES`选项指定当列为`NULL`值时，JSON 输出中必须呈现一个 JSON 键元素。清单 8-8
  演示了一个带有`INCLUDE_NULL_VALUES`选项的`FOR JSON`子句。清单 8-9 显示了查询生成的 JSON 输出。


  ```

  USE [WideWorldImporters];

  SELECT TOP (1) [CustomerName]

  ,[PrimaryContact]

  ,[AlternateContact]

  ,[PhoneNumber]

  FROM [Website].[Customers] where [AlternateContact] IS NOT NULL

  UNION ALL

  SELECT TOP (1) [CustomerName]

  ,[PrimaryContact]

  ,[AlternateContact]

  ,[PhoneNumber]

  FROM [Website].[Customers] where [AlternateContact] IS NULL

  FOR JSON AUTO, INCLUDE_NULL_VALUES;

  清单 8-8.

  带有 INCLUDE_NULL_VALUES 选项的 FOR JSON 子句

  ```


  ```

  [  {

  "CustomerName":"Tailspin Toys (Head Office)",

  "PrimaryContact":"Waldemar Fisar",

  "AlternateContact":"Laimonis Berzins",

  "PhoneNumber":"(308) 555-0100"

  },

  {

  "CustomerName":"Eric Torres",

  "PrimaryContact":"Eric Torres",

  "AlternateContact":null,

  "PhoneNumber":"(307) 555-0100"

  }

  ]

  清单 8-9.

  显示返回的 JSON

  ```


  ### 工作原理


  默认情况下，`FOR JSON`子句会忽略具有默认值的元素。因此，JSON 输出中将缺少关键元素。例如，当执行清单 8-8 中所示但没有`INCLUDE_NULL_VALUES`选项的查询时，`"AlternateContact"`将在
  JSON 输出的第二部分中缺失。清单 8-10 演示了查询和返回的 JSON 输出。


  ```

  SELECT TOP (1) [CustomerName]

  ,[PrimaryContact]

  ,[AlternateContact]

  ,[PhoneNumber]

  FROM [Website].[Customers] where [AlternateContact] IS NOT NULL

  UNION ALL

  SELECT TOP (1) [CustomerName]

  ,[PrimaryContact]

  ,[AlternateContact]

  ,[PhoneNumber]

  FROM [Website].[Customers] where [AlternateContact] IS NULL

  FOR JSON AUTO ;

  [

  {

  "CustomerName":"Tailspin Toys (Head Office)",

  "PrimaryContact":"Waldemar Fisar",

  "AlternateContact":"Laimonis Berzins",

  "PhoneNumber":"(308) 555-0100"

  },

  {

  "CustomerName":"Eric Torres",

  "PrimaryContact":"Eric Torres",

  "PhoneNumber":"(307) 555-0100"

  }

  ]

  清单 8-10.

  显示查询和 JSON 输出

  ```


  ## 8-3\. 转义 JSON 输出的方括号


  ### 问题


  你想移除包围 JSON 输出的方括号。



  ### 解决方案


  `WITHOUT_ARRAY_WRAPPER`选项构建的 JSON 输出没有周围的方括号`[]`。清单 8-11 展示了`FOR JSON`子句中的`WITHOUT_ARRAY_WRAPPER`选项。清单
  8-12 展示了没有方括号`[]`的 JSON 输出。


  ```sql

  SELECT TOP (2) [CustomerName]

  ,[PrimaryContact]

  ,[AlternateContact]

  ,[PhoneNumber]

  FROM [WideWorldImporters].[Website].[Customers]

  FOR JSON AUTO, WITHOUT_ARRAY_WRAPPER;

  Listing 8-11.

  Showing WITHOUT_ARRAY_WRAPPER option

  ```


  ```json

  {

  "CustomerName":"Tailspin Toys (Head Office)",

  "PrimaryContact":"Waldemar Fisar",

  "AlternateContact":"Laimonis Berzins",

  "PhoneNumber":"(308) 555-0100"

  },

  {

  "CustomerName":"Tailspin Toys (Sylvanite, MT)",

  "PrimaryContact":"Lorena Cindric",

  "AlternateContact":"Hung Van Groesen",

  "PhoneNumber":"(406) 555-0100"

  }

  Listing 8-12.

  Showing JSON output

  ```


  ### 工作原理


  默认情况下，`FOR JSON`子句返回被方括号`[]`包围的 JSON 输出。这创建了作为初始数组而非对象的 JSON 输出。然而，某些输出不需要周围的括号。在这种情况下，`WITHOUT_ARRAY_WRAPPER`选项会移除包围
  JSON 输出的方括号。


  ## 8-4. 向 JSON 添加 ROOT 键元素


  ### 问题


  你希望向 JSON 输出添加一个用户定义的、单一的顶层键元素。


  ### 解决方案


  `ROOT`选项向 JSON 输出添加一个单一的顶层键元素。清单 8-13 展示了带有`ROOT`选项的`FOR JSON`子句。清单 8-14 展示了带有顶层键元素`"Customers"`的
  JSON 输出。


  ```sql

  SELECT TOP (2) [CustomerName]

  ,[PrimaryContact]

  ,[AlternateContact]

  ,[PhoneNumber]

  FROM [WideWorldImporters].[Website].[Customers]

  FOR JSON AUTO, ROOT(''Customers'')

  Listing 8-13.

  Showing ROOT option

  ```


  ```json

  {

  "Customers":[

  {

  "CustomerName":"Tailspin Toys (Head Office)",

  "PrimaryContact":"Waldemar Fisar",

  "AlternateContact":"Laimonis Berzins",

  "PhoneNumber":"(308) 555-0100"

  },

  {

  "CustomerName":"Tailspin Toys (Sylvanite, MT)",

  "PrimaryContact":"Lorena Cindric",

  "AlternateContact":"Hung Van Groesen",

  "PhoneNumber":"(406) 555-0100"

  }

  ]

  }

  Listing 8-14.

  Showing JSON output with top key element “Customers”

  ```


  ### 工作原理


  `ROOT`选项是`FOR JSON`子句的可选部分。


  `ROOT`选项可以与`INCLUDE_NULL_VALUES`选项组合使用。但是，当`WITHOUT_ARRAY_WRAPPER`与`ROOT`选项组合时，SQL
  Server 会引发清单 8-15 中显示的错误。


  ```sql

  Msg 13620, Level 16, State 1, Line 5

  ROOT option and WITHOUT_ARRAY_WRAPPER option cannot be used together in FOR JSON.
  Remove one of these options.

  Listing 8-15.

  Showing the error message when ROOT combined with WITHOUT_ARRAY_WRAPPER option

  ```


  ## 8-5. 获取对 JSON 输出的控制权


  ### 问题


  你希望获得对复杂 JSON 输出的完全控制。


  ### 解决方案


  `PATH`模式允许你构建由你控制的 JSON 输出。清单 8-16 展示了一个使用`FOR JSON`子句和`PATH`模式的查询，该查询返回了清单 8-17
  中显示的级联 JSON 输出。


  ```sql

  USE WideWorldImporters;

  SELECT db_name()     as ''Database'',

  [Schema].name as ''Tables.SchemaName'',

  [Table].name  as ''Tables.TableName'',

  [Column].name as ''Tables.Columns.ColumnName''

  FROM sys.objects [Table]

  JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

  JOIN sys.columns [Column] ON [Column].object_id = [Table].object_id

  WHERE type = ''u'' and [Table].name = ''SupplierCategories''

  FOR JSON PATH;

  Listing 8-16.

  Showing FOR JSON with PATH mode

  ```


  ```json

  [{

  "Database": "WideWorldImporters",

  "Tables": {

  "SchemaName": "Purchasing",

  "TableName": "SupplierCategories",

  "Columns":         {

  "ColumnName": "SupplierCategoryID"

  }

  }

  },

  {

  "Database": "WideWorldImporters",

  "Tables": {

  "SchemaName": "Purchasing",

  "TableName": "SupplierCategories",

  "Columns":         {

  "ColumnName": "SupplierCategoryName"

  }

  }

  },

  {

  "Database": "WideWorldImporters",

  "Tables": {

  "SchemaName": "Purchasing",

  "TableName": "SupplierCategories",

  "Columns":         {

  "ColumnName": "LastEditedBy"

  }

  }

  },

  {

  "Database": "WideWorldImporters ",

  "Tables": {

  "SchemaName": "Purchasing",

  "TableName": "SupplierCategories",

  "Columns":        {

  "ColumnName": "ValidFrom"

  }

  }

  },

  {

  "Database": "WideWorldImporters",

  "Tables": {

  "SchemaName": "Purchasing",

  "TableName": "SupplierCategories",

  "Columns":       {

  "ColumnName": "ValidTo"

  }

  }

  }]

  Listing 8-17.

  Showing JSON output

  ```




  ### 工作原理


  `PATH` 模式允许指定构建 JSON 输出的结构。`PATH` 与 `AUTO` 模式之间的区别在于，`AUTO` 模式通过解析查询中 `FROM` 和 `SELECT`
  子句的结构来自动生成 JSON 输出。如果查询基于单个表，那么 `PATH` 和 `AUTO` 模式会返回类似的 JSON 输出。然而，在大多数情况下，JSON
  输出是基于多个表构建的，此时 `AUTO` 模式并非最佳选择，因为你对 JSON 输出的期望并不总是与 `AUTO` 模式返回的结果相同。使用 `PATH` 模式，你可以规定
  JSON 结构的样式。


  JSON 结构是在 `SELECT` 子句中构建的。当别名用逗号分隔时，会为元素和值建立一个父子层级。例如，图 8-5 展示了三层结构：


  1.  数据库

  2.  表 {架构 和 表}

  3.  列 {列名}


  图 8-5 展示了相同查询返回的 T-SQL 结果，但没有使用 `FOR JSON` 子句，如代码清单 8-18 所示。


  ![A435478_1_En_8_Fig5_HTML.jpg](img/A435478_1_En_8_Fig5_HTML.jpg)


  图 8-5. 展示将转换为 JSON 的 T-SQL


  ```sql

  SELECT db_name()     as ''Database'',

  [Schema].name as ''Tables.SchemaName'',

  [Table].name  as ''Tables.TableName'',

  [Column].name as ''Tables.Columns.ColumnName''

  FROM sys.objects [Table]

  JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

  JOIN sys.columns [Column] ON [Column].object_id = [Table].object_id

  WHERE type = ''u'' and [Table].name = ''SupplierCategories''

  ```


  代码清单 8-18. 展示为图 8-5 生成结果的查询


  当我们转换 T-SQL 输出时，我们期望得到代码清单 8-19 所示的 JSON 结构。


  ```

  Database : 值  -> 第 1 层

  Tables_ 集合 -> 第 2 层

  {

  SchemaName : 值

  TableName : 值

  Columns_ 集合 -> 第 3 层

  {

  ColumnName : 值

  }

  }

  ```


  代码清单 8-19. 展示 JSON 结构


  `SELECT` 子句中的别名构建了代码清单 8-19 所示的结构。将结果转换为 JSON 时，别名中的每个句点都会构建一个额外的 JSON 对象层级。例如：


  ```json

  "Database": "WideWorldImporters", -> 顶层，别名 ''Database''

  "Tables": {  -> Database 键元素的子层，别名 ''Tables.___''

  "SchemaName": "Purchasing",           -> 详情 ''Tables.SchemaName''

  "TableName": "SupplierCategories", -> 详情 ''Tables.TableName''

  "Columns": -> Tables 的子层，别名 ''Tables.Columns.___''

  {

  "ColumnName": "SupplierCategoryID" -> 详情 ''Tables.Columns.ColumnName''

  }

  }

  ```


  这样，代码清单 8-19 中的查询就返回了一个有效的 JSON 结果集。然而，生成的输出存在一个问题。JSON 对象 `Tables{}` 对每一列都进行了重复，使得输出比我们预期的要大。理想情况下，将
  `Columns` 部分作为数组而不是对象返回会更高效，并将所有列列在数组内部。这样，JSON 结构会略有不同。代码清单 8-20 展示了 `Columns`
  部分作为数组的 JSON 结构，其中 `ColumnName` 键元素和值被方括号 `[]` 包围。


  ```

  Database : 值  -> 第 1 层

  Tables_ 集合 -> 第 2 层

  {

  SchemaName : 值

  TableName : 值

  Columns_ 集合 -> 第 3 层

  [

  {ColumnName : 值},{ColumnName : 值}, ...

  ]

  }

  ```


  代码清单 8-20. 展示 Columns 部分作为数组的 JSON 结构


  要完成这样的任务，我们需要将列名列表封装到一个内联子查询中，并使用带有 `AUTO` 模式的 `FOR JSON` 子句，如代码清单 8-21 所示。然而，对于内联子查询，`AUTO`
  和 `PATH` 模式返回相同的结果。JSON 输出如代码清单 8-22 所示。


  ```sql

  SELECT db_name() as ''Database'',

  [Schema].name as ''Tables.SchemaName'',

  [Table].name as ''Tables.TableName'',

  (SELECT [Column].name as ColumnName FROM sys.columns [Column]

  WHERE [Column].object_id = [Table].object_id FOR JSON AUTO

  ) as ''Tables.Columns''

  FROM sys.objects [Table]

  JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

  WHERE type = ''u'' and [Table].name = ''SupplierCategories''

  FOR JSON PATH;

  ```


  代码清单 8-21. 将列名封装在数组内


  ```json

  [

  {

  "Database": "WideWorldImporters",

  "Tables": {

  "SchemaName": "Purchasing",

  "TableName": "SupplierCategories",

  "Columns": [

  {

  "ColumnName": "SupplierCategoryID"

  },

  {

  "ColumnName": "SupplierCategoryName"

  },

  {

  "ColumnName": "LastEditedBy"

  },

  {

  "ColumnName": "ValidFrom"

  },

  {

  "ColumnName": "ValidTo"

  }

  ]

  }

  }

  ]

  ```


  代码清单 8-22. 展示带有 Columns 数组的 JSON 输出


  如你所见，代码清单 8-22 中的 JSON 输出比解决方案部分提供的代码清单 8-17 中的 JSON 小得多。我特意展示了两种创建 JSON 输出的方法。在某些情况下，你需要面向对象的
  JSON，如代码清单 8-16 和 8-17 所示；在另一种情况下，你需要创建带有值数组的紧凑 JSON，如代码清单 8-21 和 8-22 所示。


  ## 8-6. 处理转义字符


  ### 问题


  你不希望在 JSON 输出中返回转义字符 `\`。


  ### 解决方案


  `JSON_QUERY()` 函数可消除 JSON 输出中的转义字符。代码清单 8-23 展示了 `JSON_QUERY()` 函数如何“修复”包含 JSON
  数据的 `InvoiceDate` 列的 JSON 输出。代码清单 8-24 展示了 JSON 输出。要创建 `CustomerInvoice` 表，请先运行代码清单
  8-25。


  ```sql

  SELECT [CustomerName]

  ,[PrimaryContact]

  ,[AlternateContact]

  ,[PhoneNumber]

  ,JSON_QUERY(InvoiceDate) InvoiceDate

  FROM CustomerInvoice

  FOR JSON PATH;

  ```


  代码清单 8-23. 展示结合 `FOR JSON` 子句和 `PATH` 模式的 `JSON_QUERY()` 函数


  ```json

  [{

  "CustomerName":"Tailspin Toys (Head Office)",

  "PrimaryContact":"Waldemar Fisar",

  "AlternateContact":"Laimonis Berzins",

  "PhoneNumber":"(308) 555-0100",

  "InvoiceDate":{ "InvoiceDate":"03/04/2013"}

  },

  {

  "CustomerName":"Tailspin Toys (Head Office)",

  "PrimaryContact":"Waldemar Fisar",

  "AlternateContact":"Laimonis Berzins",

  "PhoneNumber":"(308) 555-0100",

  "InvoiceDate":{"InvoiceDate":"03/12/2013"}

  }]

  ```


  代码清单 8-24. 展示修复后的 JSON 输出




  ### 工作原理


  为了演示如何实现 `JSON_QUERY()` 函数以消除 JSON 输出中的转义字符，我们需要创建一个包含 JSON 数据列的表。代码清单 8-8 演示了创建表
  `CustomerInvoice` 的查询，其中列 `InvoiceDate` 存储 JSON 数据。图 8-6 展示了表 `CustomerInvoice`
  的结果集。


  ![A435478_1_En_8_Fig6_HTML.jpg](img/A435478_1_En_8_Fig6_HTML.jpg)


  图 8-6. 显示表 `CustomerInvoice` 结果集


  ```sql

  SELECT TOP (2)

  [CustomerName]

  ,[PrimaryContact]

  ,[AlternateContact]

  ,[PhoneNumber]

  ,CAST((QUOTENAME(''"InvoiceDate":'' + QUOTENAME(CONVERT(varchar(20),InvoiceDate,
  101) , ''"''), ''{'')) AS VARCHAR(MAX)) InvoiceDate

  INTO CustomerInvoice

  FROM [Website].[Customers] Customers JOIN [Sales].[Invoices]  Invoices

  ON Invoices.CustomerID = Customers.CustomerID;

  代码清单 8-25. 在列 `InvoiceDate` 中包含 JSON 数据来创建表 `CustomerInvoice`

  ```


  列 `InvoiceDate` 中的 JSON 数据包含正斜杠，例如：`{"InvoiceDate":"03/04/2013"}`，这对于 JSON 来说是一个无效字符。表
  8-4 列出了无效的 JSON 字符。


  **表 8-4.** JSON 无效字符


  | 字符 | 描述 |

  | --- | --- |

  | `"` | 双引号 |

  | `\` | 反斜杠 |

  | `/` | 正斜杠 |

  | 可能性较低的 SQL Server 数据字符 | |

  | `\r` | 回车符 ASCII 码 13 |

  | `\n` | 换行符 ASCII 码 10 |

  | `\t` | 水平制表符 ASCII 码 9 |

  | `\b` | 退格符 ASCII 码 8 |

  | `\f` | 换页符 ASCII 码 12 |


  如果代码清单 8-26 中的查询在没有使用 `JSON_QUERY()` 函数的情况下执行，那么 JSON 输出将包含转义字符 `\`，如代码清单 8-27 所示。


  ```sql

  SELECT CustomerName, PrimaryContact, AlternateContact, PhoneNumber, InvoiceDate

  FROM CustomerInvoice

  FOR JSON PATH;

  代码清单 8-26. 在没有 `JSON_QUERY()` 的情况下构建 JSON

  ```


  ```json

  [

  {

  "CustomerName":"Tailspin Toys (Head Office)",

  "PrimaryContact":"Waldemar Fisar",

  "AlternateContact":"Laimonis Berzins",

  "PhoneNumber":"(308) 555-0100",

  "InvoiceDate":"{\"InvoiceDate\":\"03\/04\/2013\"}"

  },

  {

  "CustomerName":"Tailspin Toys (Head Office)",

  "PrimaryContact":"Waldemar Fisar",

  "AlternateContact":"Laimonis Berzins",

  "PhoneNumber":"(308) 555-0100",

  "InvoiceDate":"{\"InvoiceDate\":\"03\/12\/2013\"}"

  }

  ]

  代码清单 8-27. 显示代码清单 8-26 中构建的 JSON 输出

  ```


  最初，`JSON_QUERY()` 函数与 XML 的 `query()` 函数非常相似，它根据提供的路径返回 JSON 子集。（第 9 章“将 JSON 转换为行集”将更详细地介绍
  `JSON_QUERY()` 函数。）`JSON_QUERY()` 函数具有以下两个参数：


  1.  JSON 表达式，必需。

  2.  JSON 路径，可选。


  当存储 JSON 的列被传递给 `JSON_QUERY()` 时，`FOR JSON` 子句会信任 `JSON_QUERY()`，因为该函数总是返回有效的 JSON，因此输出不需要转义字符。


