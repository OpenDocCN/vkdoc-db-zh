  \ T-SQL 语句。当 Foreach Loop Container “Load XML Content” 将文件名赋给 `FileName` 变量时，`SQLScript`\
  \ 表达式公式会在遍历指定目录中所有文件时不断重组新的 T-SQL 代码，如下例所示：\n\n    ```\n    INSERT INTO _XML\n \
  \   SELECT 'C:\\TEMP\\Categories.xml', X, GETDATE()\n    FROM OPENROWSET(BULK N'C:\\\
  TEMP\\Categories.xml', SINGLE_BLOB) as tempXML(X)\n    ```\n\n*   对于 `Direction`\
  \ 属性，选择 `Input`。\n*   对于 `Data Type` 属性，选择 `NVARCHAR`。\n*   对于 `Parameter Name`\
  \ 属性，输入 `0`。\n*   对于 `Parameter Size` 属性，输入 `1000`。图 3-24 说明了参数映射菜单。\n*   单击 `OK`\
  \ 完成设置。\n\n## 7. 文件系统任务 “归档文件”：打开文件系统任务编辑器。\n在“常规”菜单上：\n\n![A435478_1_En_3_Fig25_HTML.jpg](img/A435478_1_En_3_Fig25_HTML.jpg)\n\
  \n图 3-25. 显示文件系统任务设置\n\n*   将 `Operation` 属性设置为 `\"重命名文件\"`。\n*   将 `IsSourcePathVariable`\
  \ 属性设置为 `\"True\"`。\n*   对于 `SourceVariable` 属性，选择 `\"User::SourceFile\"` 变量。\n\
  *   将 `IsDestinationPathVariable` 属性设置为 `\"True\"`。\n*   对于 `DestinationVariable`\
  \ 属性，选择 `\"User::ArchiveFile\"` 变量。\n*   将 `OverwriteDestination` 属性设置为 `\"True\"\
  `。\n*   单击 `OK` 完成设置。图 3-25 说明了文件系统任务编辑器。\n\n我建议将文件系统任务属性（位于 SSIS IDE 右侧）`DelayValidation`\
  \ 设置为 `True`，以防止在包加载时，默认源文件名在源位置不存在而导致错误。图 3-26 说明了此属性。\n\n![A435478_1_En_3_Fig26_HTML.jpg](img/A435478_1_En_3_Fig26_HTML.jpg)\n\
  \n图 3-26. 显示 `DelayValidation` 属性的设置\n\n恭喜，SSIS 包 `LoadXMLFromFile` 配置完成！请务必保存您的工作。图\
  \ 3-27 显示您已成功完成的 SSIS 包。\n\n![A435478_1_En_3_Fig27_HTML.jpg](img/A435478_1_En_3_Fig27_HTML.jpg)\n\
  \n图 3-27. 显示成功的 SSIS 包\n\n### 它是如何工作的\nSSIS 包通过检查由 `SourceLocation` 变量指示的源位置中具有\
  \ `.xml` 扩展名的文件来启动流程。默认值可以在包外部修改。代码如下：\n\n```\nDts.Variables[\"User::FlagIsFileExist\"\
  ].Value = (System.IO.Directory.GetFiles(Dts.Variables[\"User::SourceLocation\"].Value.ToString(),\
  \ \"*.xml\").Length != 0);\n```\n返回文件计数（如果有）。比较条件 `!= 0` 返回布尔值：当计数大于 0 时为 `true`；当计数等于\
  \ 0 时为 `false`。结果值赋给 `FlagIsFileExist` 变量。\n\n在“优先约束”中的表达式 `@[User::FlagIsFileExist]\
  \ == true` 有条件地检查 `User::FlagIsFileExist` 变量值。当表达式返回 `true` 时，包转到下一个任务。当表达式返回否定结果\
  \ (`false`) 时，包执行终止。\n\n“截断表”执行 SQL 任务删除旧值并为新的行集准备 `_XML` 表。\n\n随着包的进行，Foreach 循环容器配置为检查源位置并检索所有具有\
  \ `.xml` 扩展名的可用文件。Foreach 循环容器遍历文件名列表，并在每次迭代中将每个文件名赋给 `User::FileName` 变量。\n\n变量\
  \ `SQLScript` 的表达式公式在 `FileName` 变量每次接收新值时更改 `INSERT` T-SQL 语句。“插入 XML 数据”执行 SQL\
  \ 任务将 `INSERT` T-SQL 语句发送到 SQL Server 实例。\n\n文件系统任务将处理后的文件从源位置发送到归档位置。\n\n文件系统任务的一个替代方案是脚本任务，这是我的个人偏好，适用于那些对脚本任务中使用的\
  \ C# 编程语言感到不舒服的 DBA。因此，文件系统任务是一个固定的任务，其配置不涉及代码。对于那些希望对移动文件过程有更多控制的人，我建议实现脚本任务而不是文件系统任务。要配置脚本任务，请完成以下步骤：\n\
  *   将脚本任务拖放到 Foreach 循环容器 “Load XML Content” 内。\n*   双击脚本任务以打开脚本任务编辑器。\n*   对于 `ScriptLanguage`\
  \ 属性，选择 `Microsoft Visual C#`。\n*   对于 `ReadOnlyVariables` 属性，添加变量 `User::ArchiveFile`\
  \ 和 `User::SourceFile`（高亮并复制变量名称）。\n*   单击 `编辑脚本…` 按钮。\n*   转到 `Main()` 函数并添加以下代码：\n\
  \n    ```\n    string from = Dts.Variables[\"User::SourceFile\"].Value.ToString();\n\
  \    string to = Dts.Variables[\"User::ArchiveFile\"].Value.ToString();\n    System.IO.File.Move(from,\
  \ to); // 移动文件\n    ```\n\n*   保存并关闭 C# Visual Studio。\n*   单击 `OK` 按钮完成配置。\n\n\
  正如您从这个示例中看到的，通过少量编码，您现在可以完全控制将文件从源位置移动到归档目录。\n\nSSIS 包可以通过 SQL Server Agent 作业部署，该作业将按自定义计划自动运行。也可以从存储过程中执行该包。清单\
  \ 3-7 演示了如何从存储过程执行 SSIS 包。\n\n```\nDECLARE @SourceLocation VARCHAR(200) = 'C:\\\\\
  TEMP\\\\';\nDECLARE @ArchiveLocation VARCHAR(200) = 'C:\\\\TEMP\\\\Archive\\\\';\n\
  SET @SQLQuery = 'DTEXEC /FILE ^\"C:\\SQL2016\\Chapter3\\CreateXMLFile\\CreateXMLFile\\\
  LoadXMLFromFile.dtsx^\" '\nSET @SQLQuery = @SQLQuery + ' /SET \\Package.Variables[SourceLocation].Value;^\"\
  '+ @SourceLocation + '^\"\n/SET \\Package.Variables[ArchiveLocation].Value;^\"'+\
  \ @ArchiveLocation + '^\"';\nEXEC master..xp_cmdshell @SQLQuery ;\n```\n清单 3-7.\
  \ 显示从存储过程执行 SSIS 包的代码\n\n## 3-5. 实现 CLR 解决方案\n### 问题\n您希望创建 SQL Server 对象来写入和读取\
  \ XML 文件，这些对象不实现扩展存储过程并提供更安全的功能。\n\n### 解决方案\n\nCLR（公共语言运行时）函数能够扩展 T-SQL 功能，其操作方式与\
  \ SQL Server 用户定义对象（对于本解决方案，即用户定义函数）相同。然而，CLR 对象需要使用 `dll`（动态链接库）文件格式（扩展名为 `.dll`），这是\
  \ Windows 程序代码和过程所使用的格式。本解决方案的代码演示了如何使用 Visual Studio C#。代码清单 3-8 展示了该 C# 文件的代码。\n\
  \n```csharp\nusing System;\nusing System.Data;\nusing System.Data.SqlClient;\nusing\
  \ System.Data.SqlTypes;\nusing Microsoft.SqlServer.Server;\nusing System.IO;\npublic\
  \ partial class XMLFileETL\n{\n    [SqlFunction]\n    public static SqlString WriteXMLFile(SqlString\
  \ XMLContent,\n        SqlString DirPath,\n        SqlString FileName,\n       \
  \ SqlBoolean DateStamp)\n    {\n        /*  参数:\n            XMLContent: 包含 XML\
  \ 文档。\n            DirPath: 要写入的目录路径。\n            FileName: 文件名。\n            DateStamp:\
  \ 决定是否为文件添加日期时间戳。\n        */\n        try\n        {\n            string strXMLFile\
  \ = \"\";\n            // 检查输入参数是否为 NULL。\n            if (!XMLContent.IsNull &&\n\
  \                !DirPath.IsNull &&\n                !FileName.IsNull)\n       \
  \     {\n                // 构建文件路径字符串\n                string strStamp = (DateStamp)\
  \ ? \"_\" + DateTime.Now.ToString(\"yyyyMMdd_HHmmss\") : \"\";\n               \
  \ strXMLFile = DirPath.Value + \"\\\\\" + FileName.Value + strStamp + \".xml\";\n\
  \                // 初始化 StreamWriter 类的新实例\n                using (var newFile =\
  \ new StreamWriter(strXMLFile.Value))\n                {\n                    //\
  \ 写入文件。\n                    newFile.WriteLine(XMLContent);\n                }\n\
  \                // 成功时返回文件路径。\n                return strXMLFile;\n           \
  \ }\n            else\n                // 当任何输入值为 NULL 时返回警告。\n                return\
  \ \"Input parameters with NULL detected\";\n        }\n        catch (Exception\
  \ ex)\n        {\n            // 出错时返回 null。\n            return ex.Message.ToString();\n\
  \        }\n    }\n\n    [SqlFunction]\n    public static SqlString ReadXMLFile(SqlString\
  \ FilePath)\n    {\n        // 参数:\n        // FilePath: XML 文件的路径。\n        try\n\
  \        {\n            // 声明局部变量\n            string fileContent = \"\";\n    \
  \        // 检查参数是否为 null。\n            if (!FilePath.IsNull)\n            {\n  \
  \              // 为指定路径初始化 StreamReader 类的新实例。\n                var fileStream =\
  \ new FileStream(FilePath.Value, FileMode.Open, FileAccess.Read);\n            \
  \    using (var streamReader = new StreamReader(fileStream))\n                {\n\
  \                    fileContent = streamReader.ReadToEnd();\n                }\n\
  \            }\n            // 返回 XML 文档\n            return fileContent;\n    \
  \    }\n        catch (Exception ex)\n        {\n            // 出错时发送异常消息。\n   \
  \         return ex.Message.ToString();\n        }\n    }\n};\n```\n\n*代码清单 3-8.\
  \ 创建 `WriteXMLFile` 和 `ReadXMLFile` SQL Server CLR 函数*\n\n#### 注册 C# 代码文件\n\n注册\
  \ C# 代码文件的步骤：\n\n*   创建名为 \"`第 3 章`\" 的文件夹。\n*   将 `XML_ETL.cs` 文件（可在本书代码示例中找到）保存到\
  \ \"`第 3 章`\" 文件夹中。\n*   打开 Windows 命令行 (`cmd.exe`)，然后运行代码清单 3-9 中所示的命令行。`cmd.exe`\
  \ 的输出如图 3-28 所示。\n\n![A435478_1_En_3_Fig28_HTML.jpg](img/A435478_1_En_3_Fig28_HTML.jpg)\n\
  \n*图 3-28. 显示命令行结果*\n\n```bash\nC:\\Windows\\Microsoft.NET\\Framework\\v3.5\\csc.exe\
  \ /target:library /out:C:\\Chapter3\\ReadWriteXML.dll C:\\Chapter3\\XML_ETL.cs\n\
  ```\n\n*代码清单 3-9. 展示用于注册 `dll` 的命令行。*\n\n#### 使用 T-SQL 进行配置\n\n代码清单 3-10 展示了用于配置服务器和数据库的\
  \ T-SQL 解决方案。创建的标量函数如图 3-29 所示。\n\n![A435478_1_En_3_Fig29_HTML.jpg](img/A435478_1_En_3_Fig29_HTML.jpg)\n\
  \n*图 3-29. 显示已创建的 CLR 函数*\n\n```sql\n-- 启用 CLR\nUSE master\nGO\nsp_configure 'clr\
  \ enabled', 1;\nGO\nRECONFIGURE\nGO\n-- 配置\nUSE AdventureWorks\nGO\nALTER DATABASE\
  \ AdventureWorks SET TRUSTWORTHY ON;\nGO\n-- 创建程序集\nCREATE ASSEMBLY ReadWriteXML\n\
  FROM 'C:\\Chapter3\\ReadWriteXML.dll'\nWITH PERMISSION_SET = EXTERNAL_ACCESS;\n\
  GO\n-- 创建函数\nCREATE FUNCTION dbo.WriteXMLFile(\n    @Content nvarchar(MAX),\n  \
  \  @DirPath nvarchar(500),\n    @FileName nvarchar(100),\n    @DateStamp bit)\n\
  RETURNS nvarchar(MAX) WITH EXECUTE AS CALLER\nAS\nEXTERNAL NAME ReadWriteXML.XMLFileETL.WriteXMLFile;\n\
  GO\nCREATE FUNCTION dbo.ReadXMLFile(@FilePath nvarchar(500))\nRETURNS nvarchar(MAX)\
  \ WITH EXECUTE AS CALLER\nAS\nEXTERNAL NAME ReadWriteXML.XMLFileETL.ReadXMLFile;\n\
  GO\n```\n\n*代码清单 3-10. 创建 CLR 函数*\n\n\n### 工作原理\n\nCLR 项目结合了 XML 文件的读写功能。将多个 C#\
  \ 函数放在一个类中比为每个函数创建一个类更实用。因此，读写功能都封装在一个 C# 类对象中。要创建 C# 文件，需要使用 MS Visual Studio C#\
  \ 或 VB 工具。如何创建 Visual Studio 项目超出了本书的讨论范围。有许多资源详细介绍了如何创建 CLR 项目。\n\nC# 代码的顶部列出了识别代码函数和方法所必需的命名空间或库。`using`\
  \ 方法向类添加一个命名空间。当启动一个新项目时，类会列出默认的命名空间。包含文件读写功能的 `System.IO` 命名空间不在默认列表中。因此，你必须手动添加\
  \ `System.IO` 命名空间。CLR 类必须有一个部分类（partial type）。过程属性（procedure attribute）指定了 SQL\
  \ Server 目标对象。例如：用户定义函数使用 `[SQLFunction]` 属性，存储过程使用 `[SQLProcedure]` 属性，等等。CLR 过程类型必须是\
  \ `public static`。\n\n`WriteXMLFile` 函数在成功时返回创建的文件完整路径，在失败或检测到 `NULL` 参数值时返回错误消息。\n\
  \n该函数有四个输入参数：\n\n*   `XMLContent` – 必需，数据类型 `SQLString`，包含 XML 文档。\n*   `DirPath`\
  \ – 必需，数据类型 `SQLString`，要写入的目录路径。\n*   `FileName` – 必需，数据类型 `SQLString`，文件名。\n*\
  \   `DateStamp` – 必需，数据类型 `SQLBoolean`，决定是否向文件添加日期时间戳。\n\n验证输入参数后，下一步是构建文件路径。首先，参数\
  \ `DateStamp` 需要检查日期时间戳是否会是文件名的一部分，然后连接参数和变量：\n\n```csharp\nstring strStamp = (DateStamp)\
  \ ? \"_\"\n+ DateTime.Now.ToString(\"yyyyMMdd_HHmmss\") : \"\";\nstrXMLFile = DirPath.Value\
  \ + \"\\\\\" + FileName.Value + strStamp + \".xml\";\n```\n\n最后一步——使用提供的路径写入 XML\
  \ 文件：\n\n```csharp\nusing (var newFile = new StreamWriter(strXMLFile.Value))\n{\n\
  \    newFile.WriteLine(XMLContent);\n}\n```\n\n`ReadXMLFile` 函数在成功时返回 XML 文件内容，在失败时返回错误消息。该函数有一个参数：\n\
  \n*   `FilePath` – 必需，数据类型 `SQLString`，XML 文件的路径。\n\n当 `FileStream` 函数建立与 XML 文件的连接后，`StreamReader`\
  \ 函数会读取整个文件，然后 `ReadXMLFile` 函数返回 XML 文档：\n\n```csharp\nvar fileStream = new FileStream(FilePath.Value,\
  \ FileMode.Open, FileAccess.Read);\nusing (var streamReader = new StreamReader(fileStream))\n\
  {\n    fileContent = streamReader.ReadToEnd();\n}\nreturn fileContent;\n```\n\n\
  如果你使用 Visual Studio 开发 CLR 过程，那么你可以构建解决方案来创建 `dll` 文件，或者运行命令行来构建并注册 `dll` 文件：\n\n\
  ```cmd\nC:\\Windows\\Microsoft.NET\\Framework\\v3.5\\csc.exe /target:library /out:C:\\\
  Chapter3\\ReadWriteXML.dll C:\\Chapter3\\XML_ETL.cs\n```\n\n当 `dll` 文件准备就绪后，我们转到\
  \ SSMS 进行以下操作：\n\n1.  确保启用了‘clr enabled’选项：\n\n    ```sql\n    sp_configure 'clr\
  \ enabled', 1\n    ```\n\n2.  切换到用户数据库并 `SET TRUSTWORTHY ON`。\n3.  创建一个程序集（assembly）以引用\
  \ `dll`：\n\n    ```sql\n    CREATE ASSEMBLY ReadWriteXML FROM\n    'C:\\Chapter3\\\
  ReadWriteXML.dll'\n    WITH PERMISSION_SET = EXTERNAL_ACCESS\n    ```\n\n对于程序集，在指定了名称和\
  \ `dll` 文件路径后，你需要设置 `PERMISSION_SET` 参数，该参数有三个选项：\n\n*   `SAFE` – 首选，当 `dll` 无法访问外部系统资源（例如注册表、文件、环境变量或网络）时使用。\n\
  *   `EXTERNAL_ACCESS` – `dll` 可以访问注册表、文件和环境变量。但是，这些访问不能在 SQL Server 实例之外进行。\n* \
  \  `UNSAFE` – 无限制访问。\n\n`ReadWriteXML.dll` 需要访问文件；因此，为 `ReadWriteXML` 的程序集设置了 `EXTERNAL_ACCESS`\
  \ 选项。一旦创建了 `ASSEMBLY`，就可以创建函数了。例如：\n\n```sql\nCREATE FUNCTION dbo.ReadXMLFile(@FilePath\
  \ nvarchar(500))\nRETURNS nvarchar(MAX) WITH EXECUTE AS CALLER\nAS\nEXTERNAL NAME\
  \ ReadWriteXML.XMLFileETL.ReadXMLFile\n```\n\n在 `CREATE FUNCTION` 部分，指定了架构和名称后，你需要列出所有参数以匹配\
  \ C# `dll` 中的函数。确保位置和数据类型相同。`RETURNS` 部分的数据类型也必须匹配。`EXTERNAL NAME` 包含三个引用，例如：\n\n\
  1.  `ASSEMBLY` 名称\n2.  CLR 类名\n3.  CLR 函数名\n\n```sql\nEXTERNAL NAME ReadWriteXML.XMLFileETL.ReadXMLFile\n\
  ```\n\n清单 3-11 演示了 `WriteXMLFile` 函数的 T_SQL 执行。结果如图 3-30 所示。\n\n![A435478_1_En_3_Fig30_HTML.jpg](img/A435478_1_En_3_Fig30_HTML.jpg)\n\
  \n图 3-30. 显示函数结果\n\n```sql\nSELECT  dbo.WriteXMLFile(N'\n<Accessories>\n  <Bike\
  \ Racks>\n    <Product>\n      <Name>Hitch Rack - 4-Bike</Name>\n      <ProductNumber>RA-H123</ProductNumber>\n\
  \      <ListPrice>120.0000</ListPrice>\n    </Product>\n  </Bike Racks>\n  <Bike\
  \ Stands>\n    <Product>\n      <Name>All-Purpose Bike Stand</Name>\n      <ProductNumber>ST-1401</ProductNumber>\n\
  \      <ListPrice>159.0000</ListPrice>\n    </Product>\n  </Bike Stands>\n</Accessories>\n\
  ', 'C:\\Chapter3', 'CategoriesXML', 0) NewFilePath\n```\n清单 3-11. 执行 `WriteXMLFile`\
  \ 函数\n\n清单 3-12 演示了 `ReadXMLFile` 函数的 T_SQL 执行。结果如图 3-31 所示。\n\n![A435478_1_En_3_Fig31_HTML.jpg](img/A435478_1_En_3_Fig31_HTML.jpg)\n\
  \n图 3-31. 显示函数结果\n\n```sql\nSELECT cast(dbo.ReadXMLFile('C:\\Chapter3\\CategoriesXML.xml')\
  \ as xml) XMLFile\n```\n清单 3-12. 执行 `ReadXMLFile` 函数\n\nCLR 过程提供了一种安全的方式来扩展 SQL\
  \ Server 功能。但是，在处理 CLR 过程时，编程技能是首选。\n\n## 本章小结\n\n本章演示了多种解决方案，详细说明了如何将 XML 结果写入文件，以及如何从源位置加载\
  \ XML 文件（或多个文件）。请注意，这不是唯一的解决方案，因为在当今世界，此类任务可以使用其他技术完成，例如 PowerShell、.NET 应用程序（C#\
  \ 或 VB.NET）等。然而，对于使用 SQL Server 的 T-SQL 代码编译 SSIS 包装包来说，这些都是优秀的解决方案。\n\n下一章的配方将涵盖如何将\
  \ XML 文档转换为行和列，也称为“XML 分解”。\n\n"
- "# 4. 分解 XML\n\n将 XML 数据转换为关系型列和行并不是一个简单的过程。`OPENXML` 函数是在 SQL Server 2000 中引入的，用于分解\
  \ XML 数据，然后在 SQL Server 2005 中通过 XPath 语言（也称为 XQuery）改进了 XML 分解。从那时起，查询 XML 数据的过程成为了一个提供结果的可靠解决方案。本章将演示如何将\
  \ XML 数据作为单个单元进行查询，并通过表的列返回检索到的数据。\n\n## 4-1. 使用内部实体声明分解 XML\n\n### 问题\n\n你希望将作为参数传递给存储过程或从表中作为单个\
  \ XML 值检索出的 XML 数据，转换成行集结果。\n\n\n### 解决方案\n\n`OPEXML` 函数提供了一个全面的解决方案，用于查询分配给 `VARCHAR`、`NVARCHAR`\
  \ 和 `XML` 数据类型的变量和参数中的 XML 数据。代码清单 4-1 中的 T-SQL 代码演示了该解决方案。可以在 AdventureWorks 数据库中找到一组示例数据。\n\
  \n```sql\nDECLARE @xml nvarchar(max),\n@idoc int,\n@ns varchar(200) =\nN'';\nSELECT\
  \ @xml = cast(Instructions as nvarchar(max))\nFROM [Production].[ProductModel]\n\
  WHERE ProductModelID = 7;\nEXECUTE sp_xml:preparedocument @idoc OUTPUT, @xml, @ns;\n\
  SELECT StepInstruction,\nLaborStation,\nLaborHours,\nLotSize,\nMachineHours,\nSetupHours,\n\
  Material,\nTool\nFROM OPENXML(@idoc, 'df:root/df:Location/df:step', 2)\nWITH (\n\
  LaborStation INT '../@LocationID',\nLaborHours REAL '../@LaborHours',\nLotSize INT\
  \ '../@LotSize ',\nMachineHours REAL '../@MachineHours ',\nSetupHours REAL '../@SetupHours\
  \ ',\nMaterial VARCHAR(100) 'df:material',\nTool VARCHAR(100) 'df:tool',\nStepInstruction\
  \ VARCHAR(2000) '.'\n);\nEXECUTE sp_xml:removedocument @idoc;\n```\n\n**代码清单 4-1.**\
  \ 使用 `OPENXML` 函数分解 XML\n\n查询输出如图 4-1 所示。\n\n![A435478_1_En_4_Fig1_HTML.jpg](img/A435478_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1. 显示流程输出\n\n\n### 工作原理\n\n在开始分解 XML 之前，第一步是确定 XML 结构，以及哪些元素和属性将成为结果集的一部分。这可以通过在\
  \ AdventureWorks 数据库上执行 SQL 来分析 XML 数据来完成，如代码清单 4-2 所示。\n\n```sql\nSELECT Instructions\n\
  FROM Production.ProductModel\nWHERE ProductModelID = 7;\n```\n*代码清单 4-2. 检索单个产品模型的示例\
  \ XML 说明的查询*\n\nXML 结果太大，无法在书页中完整显示。因此，代码清单 4-3 中的 XML 片段已为演示目的进行了格式化。\n\n```xml\n\
  <root xmlns=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelInstructions\"\
  >\n  <Adventure Works CyclesFR-210B Instructions....</Description>\n  <Location\
  \ LocationID=\"10\" LaborHours=\"0.5\" ...>\n    <step>...</step>\n    <step>\n\
  \      <material>aluminum sheet MS-2341</material>\n      <tool>T-85A framing tool</tool>\n\
  \    </step>\n    ...\n  </Location>\n</root>\n```\n*代码清单 4-3. 演示结果数据的 XML 片段*\n\
  \n## 数据准备\n\n`<root>` 元素有一个命名空间，该命名空间必须是 `OPENXML` 函数 XML 初始化的一部分。因此，声明了几个变量。这些变量的用途如下：\n\
  \n1.  `@xml` (`XML`) – 从表中将 XML 数据作为单个单元检索。\n2.  `@idoc` (`INT`) – 存储从 `sp_xml_preparedocument`\
  \ 系统存储过程返回的文档句柄，以允许 `OPENXML` 访问 XML 数据。\n3.  `@ns` (`VARCHAR`(200)) – 存储 XML 命名空间，提供给\
  \ `sp_xml_preparedocument` 系统存储过程，以及用于指定命名空间声明的参数 `xpath_namespaces`。\n\n> **注意**\n\
  > 当 XML 具有命名空间时，无法避免该命名空间。如果在 `sp_xml_preparedocument` 系统存储过程中未声明和指定命名空间，`OPENXML`\
  \ 函数将不会返回结果集。命名空间有助于避免名称冲突，并唯一标识 XML 数据中的元素和属性。\n\n分配给 `@ns` 变量的值需要更多解释。在代码清单 4-1\
  \ 中，`<root>` 元素中的命名空间声明与分配给 `@ns` 变量的那个略有不同。根元素命名空间如代码清单 4-4 所示。\n\n```xml\nxmlns=\"\
  http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelInstructions\"\
  \n```\n*代码清单 4-4. `<root>` 元素中的命名空间声明*\n\n示例代码中 `@ns` 变量的命名空间声明略有不同，如代码清单 4-5 所示。\n\
  \n```sql\n@ns = 'xmlns:df=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelInstructions\"\
  '\n```\n*代码清单 4-5. `@ns` 变量命名空间声明*\n\n变量 `@ns` 的值包含一个额外的部分 `xmlns:df=…`，其中 `df`（“default”的缩写）可以指定任何别名。最常用的别名是\
  \ `ns`。该命名空间用作 `OPENXML` 函数元素的引用。简而言之，这就像在不使用模式“Production”的情况下引用 `ProductModel`\
  \ 表一样。我们必须使用 `Production.ProductModel` 来提供对该表的引用；否则 SSMS 将抛出错误：“object not found”。主要区别在于\
  \ XML 解析器不会引发错误，而是会简单地忽略元素及其属性。因此，不会返回任何结果。\n\n代码清单 4-6 中的代码在代码清单 4-2 的基础上，将结果赋值给一个\
  \ `XML` 变量：\n\n```sql\nSELECT @xml = Instructions\nFROM Production.ProductModel\n\
  WHERE ProductModelID = 7;\n```\n*代码清单 4-6. 将 XML 示例数据赋值给 XML 变量*\n\n系统存储过程 `sp_xml_preparedocument`\
  \ 使用 MSXML 解析器 (`Msxmlsql.dll`) 来解析 XML 数据，并返回一个数值（`INT` 数据类型）值，该值提供了一个指针（变量 `@doc`）以访问\
  \ XML。\n\n存储过程 `sp_xml_preparedocument` 有三个参数：\n\n1.  `@hdoc` (`INT` OUTPUT) – 必需，整数数据类型。\n\
  2.  `@xmltext` (`NTEXT`) – 必需，可以是任何文本数据类型（`VARCHAR`、`NVARCHAR`、`XML`、`TEXT` 或 `NTEXT`）。使用的数据类型必须能隐式转换为旧的\
  \ `NTEXT` 数据类型；因此不允许使用 `VARBINARY`。\n3.  `@xpath_namespaces` (`NTEXT`) – 可选，可以是任何文本数据类型（`VARCHAR`、`NVARCHAR`、`XML`、`TEXT`、`NTEXT`\
  \ 或 `XML`）。请注意，此参数的类型转换限制与 `@xmltext` 参数相同。\n\n当 XML 文档在执行存储过程 `sp_xml_preparedocument`\
  \ 并返回后被加载到内存中时，XML 文档处理程序（内存指针）通过将值输出到 `@doc` 变量来返回该值，如代码清单 4-7 所示。\n\n```sql\n\
  EXECUTE sp_xml_preparedocument @doc OUTPUT, @xml, @ns;\n```\n*代码清单 4-7. 调用 `sp_xml_preparedocument`\
  \ 过程*\n\n## OPENXML 函数\n\n现在，流程已准备好将 XML 文档转换为关系结果集。返回结果集的查询包含三个部分：\n\n*   `SELECT`\
  \ 子句 – 将结果提供给用户。\n*   `OPENXML` 函数 – 提供对 XML 文档的访问，并将 XPath 设置为起始元素。\n*   `WITH`\
  \ 构造 – 定义描述构成 XML 数据的每个元素和属性的表。\n\nXML 分解过程从 `OPENXML` 函数开始。`OPENXML` 函数有三个输入参数：\n\
  \n*表 4-1. `@flags` 参数的取值列表*\n\n| 标志 | 描述 |\n| --- | --- |\n| 0 | 默认为以属性为中心的映射。 |\n\
  | 1 | 指定数据的以属性为中心的映射。 |\n| 2 | 指定数据的以元素为中心的映射。 |\n| 8 | 可与标志 1 或标志 2 组合使用，按位 OR\
  \ 运算。此标志表示消耗的数据不应复制到溢出属性 `@mp:xmltext`。 |\n\n1.  `@idoc` (`INT`) – [必需] 是 XML 文档的内部表示形式，由执行\
  \ `sp_xml_preparedocument` 存储过程创建。\n2.  `@rowpattern` (`NVARCHAR`) – [必需] 是标识起始元素的\
  \ XPath 模式。\n3.  `@flags` (`TINYINT`) – [可选] 指示 XML 文档的映射方式。标志值列于表 4-1 中。\n\n`OPENXML`\
  \ 函数是 `FROM` 子句的一部分，因为 XML 数据是数据源。代码清单 4-1 演示了设置在 `FROM` 子句中的 `OPENXML` 函数：`FROM\
  \ OPENXML(@idoc, 'df:root/df:Location/df:step', 2)`。\n\n第一个参数直接来自存储过程 `sp_xml_preparedocument`\
  \ 的输出，我们为函数提供了存储在变量中的输出。XPath 模式并不直观，需要详细的 XML 结构分析。让我们从示例 4-1 所示的 XML 中移除数据，以分离并分析其结构，如代码清单\
  \ 4-8 所示。\n\n```xml\n<root xmlns=\"...\">\n  <Location LocationID=\"10\" ...>\n\
  \    <step>\n      <material>...</material>\n      <tool>...</tool>\n    </step>\n\
  \    <step>\n      <material>...</material>\n      <tool>...</tool>\n    </step>\n\
  \  </Location>\n</root>\n```\n*代码清单 4-8. 展示裸 XML 结构的片段*\n\n我用来正确定义 XPath 并分解 XML\
  \ 的规则是：\n\n*   当同一个子元素被多次列出时，XPath 模式必须指向该元素。\n*   `<step>` 元素的层次结构是：`root/Location/step`。\n\
  *   此分析对于为 `OPENXML` 函数指定高效的 XPath 非常重要。代码清单 4-1 中的查询返回的结果显示，值为“10”的 `LaborStation`\
  \ 属性（`Location` 元素的属性）在此特定示例中有 6 个步骤，但步骤数量可能有所不同。代码清单 4-8 中的元素层次结构是 `root/Location/step/`，因此\
  \ `<material>` 和 `<tool>` 都是 `<step>` 的子元素，它们各自包含一个文本节点。因此，XPath `root/Location/step`\
  \ 将满足 `OPENXML` 函数的 `@rowpattern` 参数要求。稍后，我们将在 `WITH` 构造中为每个元素和属性数据单元格提供精确的路径。\n\
  \n对于可选参数 `@flags`，我们提供了值 `2`，因为 XPath 的终点 `<step>` 是一个元素，并且 `<Location>` 元素有几个属性将成为结果集的一部分。这种以元素为中心和以属性为中心的特性组合是\
  \ `@flags = 2` 的最佳场景。\n\n`WITH` 构造提供了结果输出的规范。XML 是层次数据，因此为了检索特定的元素和属性，我们需要提供精确的源数据位置。在大多数情况下，源数据位于为\
  \ `@rowpattern` 参数指定的位置之外。\n\nXML 数据的层次结构可以与 Windows 文件夹/文件结构相比较。想象一下浏览文件夹结构。简而言之，如果您需要将不同文件夹中的多个文件复制到一个新文件夹中，那么您需要从一个文件夹导航到另一个文件夹以收集所有需要的文件。因此，`WITH`\
  \ 构造构建一个表，该表将返回从元素和属性收集的数据。与普通表不同，`WITH` 构造具有列名、数据类型和 XML 项位置路径。代码清单 4-1 中的 `WITH`\
  \ 构造，在代码清单 4-9 中重现，定义了其结构。\n\n```sql\nWITH (\n    LaborStation INT '../@LocationID',\n\
  \    LaborHours REAL '../@LaborHours',\n    LotSize INT '../@LotSize ',\n    MachineHours\
  \ REAL '../@MachineHours ',\n    SetupHours REAL '../@SetupHours ',\n    Material\
  \ VARCHAR(100) 'df:material',\n    Tool VARCHAR(100) 'df:tool',\n    StepInstruction\
  \ VARCHAR(2000) '.'\n)\n```\n*代码清单 4-9. 定义 XML 结构的 `WITH` 子句*\n\n`LocationID`、`LaborHours`、`LotSize`\
  \ 和 `MachineHours` 是 `<Location>` 元素的属性（参见代码清单 4-3），而 `<Location>` 是 `<step>` 元素的父元素。要从这些属性中检索数据，我们需要从\
  \ `<step>` 元素向上移动一级，因为 `OPENXML` 函数被设置为指向 `<step>` 元素，它位于下一级。为了让 XML 读取正确的步骤并考虑到它读取的是下一级，您必须向上移动一级。“LaborStation”是\
  \ `LocationID` 属性的别名，数据类型是 `INT`，因为 `LocationID` 是一个整数。`'../@LocationID'` 值的路径结构意味着：\n\
  \n*   `\"../\"` - 从当前位置向上移动一级。\n*   `\"@\"` - 指定这是一个属性。\n*   `LocationID` – 是原始属性名。\n\
  \n相同的机制适用于其他 `LaborHours`、`LotSize` 和 `MachineHours` 属性。\n\n`<material>` 和 `<tool>`\
  \ 元素都是 `<step>` 元素的子元素。因此，我们需要向下移动以访问元素的数据，例如：\n\n*   `Material` - 元素别名。\n*   `VARCHAR(100)`\
  \ - 呈现的数据类型。\n*   `'df:material'` – `df:` 命名空间引用，`material` 是元素名。\n\n最后一列是 `StepInstruction`，数据类型是\
  \ `VARCHAR`(2000)，`' . '` 表示当前上下文节点是 XPath `rowpattern` 参数的最终元素。\n\n`SELECT` 子句返回以下列，这些列在\
  \ `WITH` 构造中被赋予了别名：\n\n*   `StepInstruction` – `<step>` 元素的别名。\n*   `LaborStation`\
  \ – `LocationID` 属性的别名。\n*   `LaborHours` – `LaborHours` 属性的别名。\n*   `LotSize` –\
  \ `LotSize` 属性的别名。\n*   `MachineHours` – `MachineHours` 属性的别名。\n*   `SetupHours`\
  \ – `SetupHours` 属性的别名。\n*   `Material` – `<material>` 元素的别名。\n*   `Tool` – `<tool>`\
  \ 元素的别名。\n\n## 内存释放\n\n最后，我们需要从内存中释放 XML 文档。当我们将 XML 处理程序设置为必需的参数时，存储过程 `sp_xml_removedocument`\
  \ 会移除 XML 文档：\n\n```sql\nEXECUTE sp_xml_removedocument @idoc;\n```\n\n> **警告**\n\
  > SQL Server 不为通过 `sp_xml_preparedocument` 存储过程处理的 XML 文档提供垃圾回收。XML 文档存储在 SQL Server\
  \ 的内部缓存中，MSXML 解析器使用 SQL Server 可用总内存的八分之一。因此，必须通过 `sp_xml_removedocument` 存储过程显式设置内存释放。否则，服务器将出现内存泄漏问题，并会定期重启该过程，这将消耗服务器内存。\n\
  \n\n## 4-2. 将 OPENXML 迁移到 XQuery\n\n### 问题\n\n你需要找到 `OPENXML` 函数的替代方法来解析 XML 文档。\n\
  \n### 解决方案\n\nSQL Server 2005 引入了 `XML` 数据类型和 XQuery 语言支持，通过五个 XML 数据类型方法实现：`nodes()`、`value()`、`query()`、`exist()`\
  \ 和 `modify()`。这些方法允许对 XML 数据进行全面操作。对于 `XML` 数据类型，传统的存储过程 `sp_xml_preparedocument`\
  \ 和 `sp_xml_removedocument` 已被弃用（详见解决方案 4-1）且不再使用。代码清单 4-10 展示了如何使用 `nodes()` 和\
  \ `value()` 方法将 `OPENXML()` 函数处理过程迁移到 XQuery 代码。\n\n```sql\nDECLARE @xml XML;\n\
  SELECT @xml = Instructions\nFROM [Production].[ProductModel]\nWHERE ProductModelID\
  \ = 7;\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'\
  \ as df)\nSELECT RTRIM(LTRIM(REPLACE(instruct.value('.', 'VARCHAR(2000)'), CHAR(10),\
  \ ''))) AS StepInstruction,\ninstruct.value('../@LocationID', 'INT') AS LaborStation,\n\
  instruct.value('../@LaborHours', 'REAL') AS LaborHours,\ninstruct.value('../@LotSize',\
  \ 'INT') AS LotSize,\ninstruct.value('../@MachineHours', 'REAL') AS MachineHours,\n\
  instruct.value('../@SetupHours', 'REAL') AS SetupHours,\ninstruct.value('df:material[1]',\
  \ 'VARCHAR(100) ') AS Material,\ninstruct.value('df:tool[1]', 'VARCHAR(100) ') AS\
  \ Tool\nFROM @xml.nodes('df:root/df:Location/df:step') prod(instruct);\n```\n\n\
  代码清单 4-10.\n将 OPENXML 迁移到 XQuery\n\n**注意**\n\n所有 XQuery 方法都是**区分大小写**的；因此，为避免错误，方法\
  \ `nodes()`、`value()`、`query()`、`exist()` 和 `modify()` 必须**仅使用小写字母**。\n\n### 工作原理\n\
  \n`OPENXML` 函数是在 SQL Server 2000 中引入的，当时 `XML` 数据类型尚不存在。因此，每个 `XML` 文档都需要从诸如 `VARCHAR`、`NVARCHAR`、`BINARY`、`IMAGE`、`TEXT`\
  \ 和 `NTEXT` 等数据类型转换成一种可由 `MSXML` 操作的内部格式。这是通过 `sp_xml_preparedocument` 存储过程完成的。\n\
  \n自 SQL Server 2005 引入 `XML` 数据类型以来，`XML` 的分解和构建过程得到了极大简化。`XQuery` 语言直接与 `XML` 数据类型配合工作。因此，当分解过程基于\
  \ `XML` 数据类型时，就不再需要额外的步骤来准备 `XML` 数据；或者，也可以使用 `CAST()` 和 `CONVERT()` 函数将 `XML` 数据显式转换为\
  \ `XML` 数据类型。\n\n`CONVERT` 和 `CAST` 函数之间的区别在于，`CONVERT` 函数不属于 `ANSI-SQL` 规范，而 `CAST`\
  \ 是。然而，最重要的是，`CONVERT` 有一个可选的第三个参数，该参数为转换过程提供了额外的功能，例如控制空白处理或应用内联文档类型定义（`DTD`）。以下是\
  \ `CONVERT` 函数的 `XML` 样式参数值说明：\n\n*   `0` – （默认值）丢弃 `XML` 中无关紧要的空白，并且不允许使用内部 `DTD`。\n\
  *   `1` – 保留 `XML` 中无关紧要的空白。但是，不允许使用内部 `DTD`。\n*   `2` – 丢弃无关紧要的空白，并启用有限的内部 `DTD`。\n\
  *   `3` – 保留无关紧要的空白，并启用有限的内部 `DTD`。\n\n清单 4-2 展示了将 `OPENXML` 函数迁移到 `XQuery` 语言的解决方案。第一行声明了\
  \ `XML` 变量，如清单 4-11 所示。\n\n```\nDECLARE @xml XML;\n清单 4-11.\n声明 XML 变量\n```\n\n\
  接下来，我们将 `XML` 数据值赋给该变量，如清单 4-12 所示。\n\n```\nSELECT @xml = Instructions\nFROM Production.ProductModel\n\
  WHERE ProductModelID = 7;\n清单 4-12.\n填充 XML 变量\n```\n\n要分解具有 `xml` 命名空间的 `XML` 文档（如清单\
  \ 4-2 所示），我们需要声明 `XML` 命名空间的实例。SQL Server 的 `WITH XMLNAMESPACES` 子句允许我们列出并实例化 `XML`\
  \ 命名空间。`WITH XMLNAMESPACES` 子句的声明语法结合了 `WITH` 和 `XMLNAMESPACES` 关键字。编写此 `T-SQL`\
  \ 代码时，请务必确保 `WITH` 结构前有一个分号（`;`）。\n\n**提示**\n\n良好的实践是让所有 `SQL` 语句以分号（`;`）终止。`WITH\
  \ XMLNAMESPACES` 子句与 `WITH CTE` 子句类似，必须始终通过分号与前面的语句分隔开。否则，`SQL Server` 将会抛出错误。\n\
  \n为了与清单 4-1 中的旧语法匹配，此示例创建了相同的 `xml` 命名空间名称，使用 \"`df`\" 作为前缀，如清单 4-13 所示。\n\n```\n\
  WITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'\
  \ as df)\n清单 4-13.\n声明带前缀 “df” 的 XML 命名空间\n```\n\n然而，当 `XML` 文档只有一个 `XML` 命名空间时，该命名空间可以被声明为\
  \ `DEFAULT`，无需为 `XML` 命名空间指定显式的命名空间前缀。清单 4-14 展示了使用默认 `xml` 命名空间分解 `XML` 文档。\n\n\
  ```\nWITH XMLNAMESPACES(DEFAULT 'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions')\n\
  SELECT RTRIM(LTRIM(REPLACE(instruct.value('.', 'varchar(2000)'), CHAR(10), '')))\
  \ AS StepInstruction\ninstruct.value('../@LocationID', 'int') AS LaborStation,\n\
  instruct.value('../@LaborHours', 'real') AS LaborHours,\ninstruct.value('../@LotSize',\
  \ 'int') AS LotSize,\ninstruct.value('../@MachineHours', 'real') AS MachineHours,\n\
  instruct.value('../@SetupHours', 'real') AS SetupHours,\ninstruct.value('material[1]',\
  \ 'varchar(100) ') AS Material,\ninstruct.value('tool[1]', 'varchar(100) ') AS Tool\n\
  FROM @xml.nodes('root/Location/step') prod(instruct);\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'\
  \ as df)\nSELECT RTRIM(LTRIM(REPLACE(instruct.value('.', 'varchar(2000)'), CHAR(10),\
  \ ''))) AS StepInstruction,\ninstruct.value('../@LocationID', 'int') AS LaborStation,\n\
  instruct.value('../@LaborHours', 'real') AS LaborHours,\ninstruct.value('../@LotSize',\
  \ 'int') AS LotSize,\ninstruct.value('../@MachineHours', 'real') AS MachineHours,\n\
  instruct.value('../@SetupHours', 'real') AS SetupHours,\ninstruct.value('df:material[1]',\
  \ 'varchar(100) ') AS Material,\ninstruct.value('df:tool[1]', 'varchar(100) ') AS\
  \ Tool\nFROM @xml.nodes('df:root/df:Location/df:step') prod(instruct);\n清单 4-14.\n\
  使用 DEFAULT xml 命名空间以及再次使用 “df” 前缀分解 XML 文档\n```\n\n要从 `XML` 文档返回表结构的结果集，我们需要提供元素路径，然后指定元素和属性值。`nodes()`\
  \ 方法类似于用于提供元素引用的 `OPENXML` 函数；然而，区别如下：\n\n使用 `OPENXML` 设置对 `XML` 文档的访问\n\n```\n\
  FROM OPENXML(@doc, 'df:root/df:Location/df:step', 2)\n```\n\n与使用 `nodes()` 方法设置对\
  \ `XML` 变量的访问进行比较\n\n1.  `XML` 数据类型 `nodes()` 方法与 `OPENXML` 函数的主要区别在于，`XQuery` 期望的是\
  \ `XML` 数据类型；因此，不需要 `XML` 处理器（`@doc` 变量）。\n2.  `nodes()` 方法不使用映射 `@flags` 参数。\n\n\
  ```\nFROM @xml.nodes('df:root/df:Location/df:step') prod(instruct)\n```\n\n元素位置路径对于\
  \ `OPENXML` 函数和 `nodes` 方法是相同的。重要的是要注意，`nodes()` 方法需要一个完全限定的别名，例如 `table(column)`。在清单\
  \ 4-14 中，别名是 `prod(instruct)`。在我个人的 `SQL` 脚本中，我使用 `T(C)` 别名，它简短而简单，但在生产环境中，我建议使用比\
  \ `T(C)` 更具体的名称。\n\n要构造 `XML` 输出，`OPENXML` 函数必须使用 `WITH()` 结构，而使用 `XQuery` 时，`value()`\
  \ 方法表示元素和属性值，并且不使用 `WITH()` 结构。`WITH()` 结构和 `value()` 方法之间的主要区别在于，`WITH()` 结构的语法序列是\
  \ `别名 + 数据类型 + 项`，而 `value()` 方法则正好相反：`项 + 数据类型 + 别名`；例如：\n\n```\nOPENXML 输出规范的一部分\n\
  WITH (\nLaborStation INT '../@LocationID',\nLaborHours REAL '../@LaborHours',\n\
  LotSize INT '../@LotSize ',\nMachineHours REAL '../@MachineHours ',\nSetupHours\
  \ REAL '../@SetupHours ',\nMaterial VARCHAR(100) 'df:material',\nTool VARCHAR(100)\
  \ 'df:tool',\nStepInstruction VARCHAR(2000) '.'\n)\n```\n\n与 `XQuery` 输出规范进行比较\n\
  \n```\nSELECT  instruct.value('.', 'varchar(2000)') AS StepInstruction,\ninstruct.value('../@LocationID',\
  \ 'int') AS LaborStation,\ninstruct.value('../@LaborHours', 'real') AS LaborHours,\n\
  instruct.value('../@LotSize', 'int') AS LotSize,\ninstruct.value('../@MachineHours',\
  \ 'real') AS MachineHours,\ninstruct.value('../@SetupHours', 'real') AS SetupHours,\n\
  instruct.value('df:material[1]', 'varchar(100) ') AS Material,\ninstruct.value('df:tool[1]',\
  \ 'varchar(100) ') AS Tool\n```\n\n`value()` 方法有两个参数：\n\n1.  指示元素或属性的 `XPath` 路径。\n\
  2.  用于转换的目标数据类型。\n\n两个参数都是 `NVARCHAR` 类型；因此，值必须用单引号括起来，并且 `value()` 方法必须基于在 `nodes()`\
  \ 方法中指定的列别名。如果未指定引用，将抛出错误 “Msg 195, Level 15, State 10, Line # ‘value’ is not a\
  \ recognized built-in function name”。\n\n`OPENXML() WITH` 子句与 `value()` 方法之间另一个重要的区别是，`value()`\
  \ 方法需要一个单例原子值，对于元素引用，用基于 1 的索引引用（\"`[1]`\"）来指示。例如：\n\n```\ninstruct.value('df:material[1]',\
  \ 'VARCHAR(100)') AS Material\n```\n\n指示的单例原子值具有一个基于 1 的数组索引（大多数现代编程语言实现基于 0 的数组索引）。这为\
  \ `XML` 数据提供了多次列出相同元素名称的能力。例如，`XML` 多次列出了 `Address` 元素：\n\n```\n<Address>Line 1</Address>\n\
  <Address>Line 2</Address>\n<Address>Line 3</Address>\n```\n\n在这种情况下，为了显示所有三行 `Address`，`value()`\
  \ 方法代码将如下所示：\n\n```\nc.value('Address[1]', 'VARCHAR(100)') AS Line1\nc.value('Address[2]',\
  \ 'VARCHAR(100)') AS Line2\nc.value('Address[3]', 'VARCHAR(100)') AS Line3\n```\n\
  \n当缺少单例时，编译器将抛出错误：“Msg 2389, Level 16, State 1, Line # XQuery [value()]: ‘value()’\
  \ requires a singleton (or empty sequence).”。因此，在使用 `value()` 方法时，请务必确保为元素提供了单例原子值。\n\
  \n\n## 4-3. 从列中分解 XML\n\n### 问题\n\n分解前文（4-1 和 4-2 节）中展示的 XML 文档，是一个需要从一个 XML 值导航到另一个\
  \ XML 值的游标过程。你需要在不打开游标的情况下，跨表的列来分解 XML。\n\n### 解决方案\n\n4-1 和 4-2 节的方案基于一次分解一个 XML\
  \ 变量的 XML 内容。然而，在许多情况下，我们需要跨整个表或至少跨多行来分解 XML，如清单 4-15 所示。\n\n```\nUnited Security\n\
  BM\nMountain\nISDN\n```\n清单 4-15. 显示来自表 `Sales.Store` 列 `Demographics` 的 XML\n\n\
  `XML` 数据类型不仅允许你从 `XML` 变量分解 XML 数据，还允许直接从表中的 `XML` 类型列进行分解。清单 4-16 演示了如何查询 XML 列。\n\
  \n```sql\nWITH XMLNAMESPACES(default 'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey')\n\
  SELECT details.value('AnnualSales[1]', 'MONEY') AS AnnualSales,\ndetails.value('AnnualRevenue[1]',\
  \ 'MONEY') AS AnnualRevenue,\ndetails.value('BankName[1]', 'VARCHAR(50)') AS BankName,\n\
  details.value('BusinessType[1]', 'VARCHAR(10)') AS BusinessType,\ndetails.value('YearOpened[1]',\
  \ 'INT') AS YearOpened,\ndetails.value('Specialty[1]', 'VARCHAR(50)') AS Specialty,\n\
  details.value('SquareFeet[1]', 'INT') AS SquareFeet,\ndetails.value('Brands[1]',\
  \ 'VARCHAR(10)') AS Brands,\ndetails.value('Internet[1]', 'VARCHAR(10)') AS Internet,\n\
  details.value('NumberEmployees[1]', 'SMALLINT') AS NumberEmployees\nFROM Sales.Store\n\
  CROSS APPLY Demographics.nodes('StoreSurvey') survey(details);\n```\n清单 4-16. 显示从\
  \ XML 列返回结果集的 XQuery 代码\n\n结果如图 4-2 所示。\n\n![A435478_1_En_4_Fig2_HTML.jpg](img/A435478_1_En_4_Fig2_HTML.jpg)\n\
  图 4-2. XQuery 处理产生的结果\n\n### 工作原理\n\n清单 4-17 中展示的来自表 `Sales.Store`、列 `Demographics`\
  \ 的 XML 文档相对简单。该 XML 具有根元素 `<StoreSurvey>`，所有后续元素都是此 XML 根的子元素。这是一个一级深度的 XML 结构。这种结构在生产环境中很常见，因为数据库设计者在可能的情况下倾向于为了性能原因而在列中保持简单的\
  \ XML 结构。因此，要将 XML 数据转换为行，我们需要在 `nodes()` 方法中提供对根元素的引用。之后，`value()` 方法在单独的列中显示每个元素，如前面的图\
  \ 4-2 所示。\n\n为了在表的列上进行导航，SQL Server 2005 引入了两种运算符：\n1.  `CROSS APPLY` – 允许在外部表表达式返回的每一行上调用一个表值函数。在\
  \ `CROSS APPLY` 的上下文中，XML `nodes()` 方法被视为表值函数。\n2.  `OUTER APPLY` - 等同于 `LEFT OUTER\
  \ JOIN`，当结果集返回查询外部表表达式的所有行时。\n\n解决方案在清单 4-16 中，为查询实现了 `CROSS APPLY` 运算符。然而，`OUTER\
  \ APPLY` 运算符会返回相同的结果集，因为 `Demographics` 列中没有任何包含 `NULL` 值的行。\n\n让我们比较一下基于清单 4-17\
  \ 中的 `XML` 变量分解 XML 值，与清单 4-15 中展示的表列分解之间的差异。\n\n```sql\nDECLARE @x XML;\nSELECT\
  \ @x = Demographics  FROM Sales.Store  WHERE BusinessEntityID = 292;\nWITH XMLNAMESPACES(default\
  \ 'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey')\n\
  SELECT details.value('AnnualSales[1]', 'MONEY') AS AnnualSales,\ndetails.value('AnnualRevenue[1]',\
  \ 'MONEY') AS AnnualRevenue,\ndetails.value('BankName[1]', 'VARCHAR(50)') AS BankName,\n\
  details.value('BusinessType[1]', 'VARCHAR(10)') AS BusinessType,\ndetails.value('YearOpened[1]',\
  \ 'INT') AS YearOpened,\ndetails.value('Specialty[1]', 'VARCHAR(50)') AS Specialty,\n\
  details.value('SquareFeet[1]', 'INT') AS SquareFeet,\ndetails.value('Brands[1]',\
  \ 'VARCHAR(10)') AS Brands,\ndetails.value('Internet[1]', 'VARCHAR(10)') AS Internet,\n\
  details.value('NumberEmployees[1]', 'SMALLINT') AS NumberEmployees\nFROM @x.nodes('StoreSurvey')\
  \ survey(details);\n```\n清单 4-17. 分解 XML 变量\n\n主要的 SQL 代码差异见清单 4-18。当我们在 `FROM`\
  \ 子句中引用变量时，应用于变量的 `nodes()` 方法返回一个行集，该行集表示分解单个文档的结果。这与针对表的 `CROSS APPLY` 相反，后者从表的每一行分解\
  \ XML 并生成一个单一的行集。清单 4-17 显示了分解 XML 变量和列之间的代码差异。\n\n```sql\nFROM @x.nodes('StoreSurvey\
  \ ') survey(details);\n```\n从变量分解 XML，并与以下对比：\n\n```sql\nFROM Sales.Store CROSS\
  \ APPLY Demographics.nodes('StoreSurvey') survey(details);\n```\n从列分解 XML\n\n`SELECT`\
  \ 子句对于变量和列分解过程是相同的。要检索元素值，`value()` 方法需要提供 XPath 路径，该路径指定了带有单例索引指示符的元素名称以及数据类型。例如：`details.value('SquareFeet[1]',\
  \ 'INT') AS SquareFeet.`\n\n在 `SELECT` 子句中列出列别名始终是一个好习惯。当缺少别名时我们不会收到错误，而且我个人更喜欢不收到带有默认列名“(无列名)”的结果。\n\
  \n**注意**\n\nXML 元素和属性是区分大小写的；因此，当在 `value()` 方法中引用元素和属性时，其大小写必须与 XML 文档完全一致。否则，对于\
  \ XML 类型的列，解析器将抛出错误。例如，当元素 `AnnualSales` 被指定为 `details.value(‘annualsales[1]’, ‘money’)`\
  \ 时，你将收到错误：消息 2263，级别 16，状态 1，第 2 行 XQuery `[Sales.Store.Demographics.value()]`:\
  \ 在类型元素 “({ `http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey}:StoreSurvey,#anonymous`\
  \ )” 中没有名为 “{ `http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey}:annualsales`\
  \ ” 的元素。如果 XML 值将列存储为非类型化的 XML，那么错误指定项目的分解结果将是 `NULL`。这同样适用于 XML 变量。我不断警告读者注意 XML\
  \ 的大小写敏感性，因为这是 XQuery 新手最常见的错误。例如，当我们以小写、大写或混合大小写键入函数 `CASE` 时，SQL Server T-SQL\
  \ 不会引发任何错误。然而，XQuery 没有为我们提供这种便利，我们必须遵循大小写规则。但是，当 SQL Server 实例或数据库安装在任何类型的二进制排序规则下时，对象名称元数据（表、列等）是区分大小写的。\n\
  \n## 4-4. 处理遗留的 XML 存储\n\n### 问题\n\n你想处理以 `XML` 以外的数据类型存储在表列中的 XML 数据。\n\n\n\n###\
  \ 解决方案\n\n在过去的二十年里，SQL Server 发生了巨大的变化。其中最重大的改动之一是在 SQL Server 2005 中引入的。微软向 IT\
  \ 市场推出了一款革命性的 RDBMS 产品。`NTEXT`、`TEXT` 和 `IMAGE` 数据类型被弃用。然而，在遗留数据库中，XML 文档可能存储在 `VARCHAR`、`NVARCHAR`、`VARBINARY`、`IMAGE`、`TEXT`\
  \ 和 `NTEXT` 数据类型的列中。在这种情况下，必须将该列转换为 `XML` 数据类型。\n\n**注意**\n\n在某些情况下，你会将数据存储在非 XML\
  \ 类型的列中，例如：XML 数据包含内部 DTD 或 ENTITY 声明；以及业务要求完全按照接收到的 XML 格式存储数据，包括不重要的空白字符。但是，`NTEXT`、`TEXT`\
  \ 和 `IMAGE` 数据类型不应被考虑。请使用 `VARCHAR`、`NVARCHAR`、`VARBINARY`。\n\n例如，SQL Server 继续使用\
  \ `IMAGE` 数据类型在 `msdb.dbo.sysssispackages` 表中存储 SSIS 包，如图 4-3 所示。所有 SSIS 包都是 XML\
  \ 文档。\n\n![A435478_1_En_4_Fig3_HTML.jpg](img/A435478_1_En_4_Fig3_HTML.jpg)\n\n图\
  \ 4-3\n\n展示 `msdb.dbo.sysssispackages` 结构\n\n让我们设定这个场景：你有一个任务，要找到所有通过 SQL Server\
  \ 维护计划运行数据库备份的服务器，并列出计划中使用的所有数据库。对于几台服务器来说，这个任务很容易完成。但你还需要检查数百个 SQL Server 实例。与其登录到每个实例并打开每个单独的维护计划，不如从\
  \ `sysssispackages` 表中拆解 `packagedata` 列，如代码清单 4-18 所示，因为这是一个高效得多的过程。\n\n```sql\n\
  WITH XMLNAMESPACES ('www.microsoft.com/SqlServer/Dts' AS DTS,\n'www.microsoft.com/sqlserver/dts/tasks/sqltask'\
  \ AS SQLTask),\nPackage\nAS\n(\nSELECT name,\nCAST(CAST(packagedata AS VARBINARY(MAX))\
  \ AS XML) AS package\nFROM msdb.dbo.sysssispackages\nWHERE packagetype = 6\n)\n\
  SELECT Package.name as MaintenancePlanName,\nPKG.value('@SQLTask:DatabaseName',\
  \ 'NVARCHAR(128)')  AS DatabaseName,\nPKG.value('(../@SQLTask:BackupDestinationAutoFolderPath)',\
  \ 'NVARCHAR(500)') AS BackupDestinationFolderPath\nFROM Package\nCROSS APPLY package.nodes('//DTS:ObjectData/SQLTask:SqlTaskData/SQLTask:SelectedDatabases')\
  \ SSIS(PKG);\n```\n\n代码清单 4-18\n拆解 SSIS 包代码\n\n拆解 SQL Server 维护计划 SSIS 包的结果如图 4-4\
  \ 所示。\n\n![A435478_1_En_4_Fig4_HTML.jpg](img/A435478_1_En_4_Fig4_HTML.jpg)\n\n图\
  \ 4-4\n\n拆解维护计划的结果\n\n### 工作原理\n\n正如我在“解决方案”中提到的，`packagedata` 列是一个 `IMAGE` 数据类型，不能直接由\
  \ `nodes()` 方法处理。因此，必须将该列转换为 `XML` 数据类型。这就是为什么解决方案查询包含一个 `XMLNAMESPACES` 声明块和一个名为\
  \ `Package` 的 CTE，用于将 `packagedata` 列转换为 `XML` 数据类型以进行进一步拆解。\n\n这些 SQL 维护作业 SSIS\
  \ 包包含两个命名空间，因此 `XMLNAMESPACES` 声明必须同时包含它们：\n\n1.  `'www.microsoft.com/SqlServer/Dts'`\
  \ – `<dts:executable>` 顶层元素。\n2.  `'www.microsoft.com/sqlserver/dts/tasks/sqltask'`\
  \ – `<SQLTask:SqlTaskData>` 子元素。\n\n`Package` CTE 为 XQuery 拆解过程准备 `packagedata`\
  \ 列。CTE 返回 SSIS 包的名称，并显式将 `packagedata` 列转换为 `XML` 数据类型。`IMAGE` 数据类型无法显式转换为 `XML`\
  \ 数据类型。第一步是显式将 `IMAGE` 数据类型转换为 `VARBINARY(MAX)`，后者可以转换为 `XML`，例如：`CAST(CAST(packagedata\
  \ AS VARBINARY(MAX)) AS XML)`。\n\n`packagetype` 列有五个可能的值。\n\n*   0 - 默认值\n*   1\
  \ - SQL Server 导入和导出向导\n*   3 - SQL Server 复制\n*   5 - SSIS 设计器\n*   6 - 维护计划设计器或向导\n\
  \n在此示例中，我们专注于维护计划；因此，我们可以在 `WHERE` 子句中过滤结果为 `packagetype = 6`。\n\n解决方案查询的最后一部分拆解维护计划\
  \ XML 并交付结果集。在处理 `SELECT` 子句中的值之前，我们需要在 XML 数据中建立一个元素路径。当我们处理表和列时，`CROSS APPLY`\
  \ 操作符有助于遍历这些值。`nodes()` 方法没有指向源元素的完整路径。SSIS XML 很大；因此，“//”提供了一个指向源元素的快捷路径，并在 XML\
  \ 文档中匹配表达式模式。你也可以在 `WHERE` 子句中使用前导通配符 “%”。元素路径 `//DTS:ObjectData/SQLTask:SqlTaskData/SQLTask:SelectedDatabases`\
  \ 告诉你忽略前导元素并匹配 XML 结构中最右侧的部分。请记住，`nodes()` 方法需要双部分别名，所以 `SSIS(PKG)` 是表（列）别名。\n\n\
  `SELECT` 子句与 `Package.name` 列一起从 XML 数据中返回两个值，如示例 4-6 所示的部分 XML 所示：\n\n1.  `PKG.value('@SQLTask:DatabaseName',\
  \ 'NVARCHAR(128)') as DatabaseName`，是 `SQLTask:SelectedDatabases` 元素的 `SQLTask:DatabaseName`\
  \ 属性。要在 `value()` 方法中处理属性，“@”字符指示该值是属性，不需要单例。\n2.  `PKG.value('(../@SQLTask:BackupDestinationAutoFolderPath)',\
  \ 'NVARCHAR(500)')` 可用作 `BackupDestinationFolderPath`。\n\n`SQLTask:BackupDestinationAutoFolderPath`\
  \ 同样是一个属性。然而，`nodes()` 方法设置在 `SQLTask:SelectedDatabases` 元素上，该元素是 `SQLTask:SqlTaskData`\
  \ 元素的子元素。因此，要访问 `SQLTask:BackupDestinationAutoFolderPath` 属性，我们需要向上移动一个 XML 层级到\
  \ `SQLTask:SqlTaskData` 元素。步骤操作符 “../” 完成了这个过程。\n\n```xml\n<!-- 此处应为 Listing 4-19\
  \ 的 XML 代码片段内容 -->\n```\n\n代码清单 4-19\n展示源 XML 的格式化片段\n\n## 4-5. 导航类型化 XML 列\n\n\
  ### 问题\n\n你想解决在拆解类型化 XML 列时遇到的“无法隐式原子化或将‘fn:data()’应用于复杂内容元素”错误。\n\n\n\n### 解决方案\n\
  \n当尝试分解一个类型化的 XML 列时，如代码清单 4-20 所示，`XPath` 路径可能会产生错误。\n\n```\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'\
  \ as df)\nSELECT ProductModelID,\ninstruct.value('.', 'VARCHAR(2000)') AS StepInstruction,\n\
  instruct.value('../@LocationID', 'INT') AS LaborStation,\ninstruct.value('../@LaborHours',\
  \ 'REAL') AS LaborHours,\ninstruct.value('../@LotSize', 'INT') AS LotSize,\ninstruct.value('../@MachineHours',\
  \ 'REAL') AS MachineHours,\ninstruct.value('../@SetupHours', 'REAL') AS SetupHours,\n\
  instruct.value('df:material[1]', 'VARCHAR(100) ') AS Material,\ninstruct.value('df:tool[1]',\
  \ 'VARCHAR(100) ') AS Tool\nFROM Production.ProductModel\nCROSS APPLY Instructions.nodes('df:root/df:Location/df:step')\
  \ prod(instruct);\n代码清单 4-20.\n首次尝试分解类型化 XML 列\n```\n\n然而，此代码会产生一个类似于以下内容的错误：\n\n\
  ```\nMsg 9314, Level 16, State 1, Line 2\nXQuery [Production.ProductModel.Instructions.value()]:\
  \ Cannot implicitly atomize or apply 'fn:data()' to complex content elements, found\
  \ type 'df{http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions}:StepType'\
  \ within inferred type 'element(df{http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions}:step,df{http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions}:StepType)'.\n\
  ```\n\n为了修复此错误，我们必须引入 `XQuery` 数据访问器函数 `fn:string()`，以防止当 `value()` 方法使用 `\"../\"\
  ` 步进运算符访问单例原子实例时发生错误，如代码清单 4-21 所示。\n\n```\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'\
  \ as df)\nSELECT ProductModelID,\ninstruct.value('fn:string(.)', 'varchar(2000)')\
  \ AS StepInstruction,\ninstruct.value('fn:string(../@LocationID)', 'int') AS LaborStation,\n\
  instruct.value('fn:string(../@LaborHours)', 'real') AS LaborHours,\ninstruct.value('fn:string(../@LotSize)',\
  \ 'int') AS LotSize,\ninstruct.value('fn:string(../@MachineHours)', 'real') AS MachineHours,\n\
  instruct.value('fn:string(../@SetupHours)', 'real') AS SetupHours,\ninstruct.value('df:material[1]',\
  \ 'varchar(100) ') AS Material,\ninstruct.value('df:tool[1]', 'varchar(100) ') AS\
  \ Tool\nFROM Production.ProductModel\nCROSS APPLY Instructions.nodes('df:root/df:Location/df:step')\
  \ prod(instruct);\n代码清单 4-21.\n应用 fn:string() 函数修复 Msg 9314 错误\n```\n\n查询结果如图 4-5\
  \ 所示。\n\n![A435478_1_En_4_Fig5_HTML.jpg](img/A435478_1_En_4_Fig5_HTML.jpg)\n\n图\
  \ 4-5.\n使用 `fn:string()` 函数分解类型化 XML 列的结果\n\n### 工作原理\n\n`SQL Server XQuery` 实现了三个数据访问器函数：\n\
  *   `fn:string()` – 提取元素或属性的字符串值。\n*   `fn:data()` – 从元素或属性中提取标量（类型化）值。\n*   `text()`\
  \ – 从元素或属性返回单个值。\n\n如你所见，这三个函数在功能上非常相似。为了检验每个函数的功能，让我们分析代码清单 4-22 的结果，其中的 `XML`\
  \ 部分模拟了来自 `Instructions` 列的 `XML`。\n\n```\nDECLARE @x XML = '\n<top>\n    <level1>1</level1>\n\
  \    <level2>2</level2>\n</top>\n<!-- extra text\nelement -->\n3';\nSELECT @x.query('/top/level1/text()')\
  \ Text_Function,\n@x.query('fn:data(/*)') Data_Function,\n@x.query('fn:string(/*[1])')\
  \ String_Function;\n代码清单 4-22.\n分析数据访问器函数。query() 方法将在下一个配方 4-6 “检索 XML 数据的子集”中介绍\n\
  ```\n\n此查询的结果如图 4-6 所示。\n\n![A435478_1_En_4_Fig6_HTML.jpg](img/A435478_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6.\n显示数据访问器函数结果\n\n代码清单 4-22 及其结果（如图 4-6 所示）演示了数据访问器函数：\n*   `text()` 函数从元素\
  \ `<level1>` 返回单个值 “1”。\n*   `fn:data()` 函数连接了值。\n*   `fn:string()` 函数要求单例，并为 `level1`\
  \ 和 `level2` 元素返回值。\n\n对于代码清单 4-22 中的解决方案，`fn:string()` 函数是最合适的，因为它使用了局部元素引用：`instruct.value('fn:string(.)',\
  \ 'varchar(2000)')`。例如，`fn:data()` 会返回错误，而 `text()` 函数会为 `Instructions` 列返回部分值，如代码清单\
  \ 4-23 所示。\n\n```\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'\
  \ as df)\nSELECT instruct.value('./text()[1]', 'varchar(2000)') AS Step_Instruction_by_text,\n\
  instruct.value('fn:string(.)', 'varchar(2000)') AS Step_Instruction_by_string\n\
  FROM Production.ProductModel\nCROSS APPLY Instructions.nodes('df:root/df:Location/df:step')\
  \ prod(instruct);\n代码清单 4-23.\n演示 text() 和 fn:string() 函数的结果差异\n```\n\n代码清单 4-23\
  \ 的结果如图 4-7 所示。\n\n![A435478_1_En_4_Fig7_HTML.jpg](img/A435478_1_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7.\n`text()` 和 `fn:string()` 函数之间的差异\n\n## 4-6. 检索 XML 数据的子集\n\n### 问题\n\n\
  你希望从 `XML` 文档中返回特定的子集并保持 `XML` 格式。\n\n### 解决方案\n\n`query()` 方法允许你检索 `XML` 实例的特定部分。代码清单\
  \ 4-24 演示了如何从 `SQL Server` 的动态管理视图 (`DMVs`) 中查询执行计划，并从执行计划中检索 `Statements` 部分。\n\
  \n```\nSELECT TOP (25)\n@@SERVERNAME as ServerName,\nqs.Execution_count as Executions,\n\
  qs.total_worker_time as TotalCPU,\nqs.total_physical_reads as PhysicalReads,\nqs.total_logical_reads\
  \ as LogicalReads,\nqs.total_logical_writes as LogicalWrites,\nqs.total_elapsed_time\
  \ as Duration,\nqs.total_worker_time/qs.execution_count as [Avg CPU Time],\nDB_NAME(qt.dbid)\
  \ DatabaseName,\nqt.objectid,\nOBJECT_NAME(qt.objectid, qt.dbid) ObjectName,\nqp.query_plan\
  \ as XMLPlan,\nquery_plan.query('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/showplan\"\
  ;\n//Batch/Statements') as SQLStatements\nFROM sys.dm_exec_query_stats qs\nCROSS\
  \ APPLY sys.dm_exec_sql_text(qs.sql_handle) as qt\nCROSS APPLY sys.dm_exec_query_plan(plan_handle)\
  \ as qp\nWHERE qt.dbid IS NOT NULL\nORDER BY TotalCPU DESC;\n代码清单 4-24.\n从执行计划返回\
  \ SQL 语句 XML\n```\n\n\n\n### 工作原理\n\n在 XQuery 方法中，`query()`方法直接且易于使用。要返回`XML`实例的子集，你需要指定一个`XML`变量或列，以及目标元素或属性的路径。`query()`方法返回`XML`数据类型的实例。例如，要从分配给变量`@x`的`ProductDescription`\
  \ `XML`实例（如代码清单 4-25 所示）中返回`Features` `XML`，结果如图 4-8 所示。\n\n```sql\nDECLARE @x XML\
  \ ='\n<ProductDescription ProductID=\"1\">\n  <Features>\n    <Feature 1>\n    \
  \    3 years\n        parts and labor\n    </Feature>\n    <Feature 2>\n       \
  \ 10 years\n        maintenance contract available through your dealer or any AdventureWorks\
  \ retail store.\n    </Feature>\n  </Features>\n  <Specifications>\n    <Color>front</Color>\n\
  \    <Size>small</Size>\n  </Specifications>\n</ProductDescription>\n';\nSELECT\
  \ @x.query('ProductDescription/Features');\n```\n\n**代码清单 4-25.** 从`XML`返回 Features\
  \ 子集\n\n结果如代码清单 4-26 所示。\n\n```xml\n<Features>\n  <Feature 1>\n    3 years\n   \
  \ parts and labor\n  </Feature>\n  <Feature 2>\n    10 years\n    maintenance contract\
  \ available through your dealer or any AdventureWorks retail store.\n  </Feature>\n\
  </Features>\n```\n\n**代码清单 4-26.** `query()`方法的结果\n\n代码清单 4-25 展示了从一个不包含任何命名空间的`XML`变量返回结果。因此，无需为`query()`方法指定任何`XMLNAMESPACES`。然而，对于类型化的`XML`，`query()`方法需要声明命名空间，如本配方的解决方案部分（代码清单\
  \ 4-24）所示。该解决方案使用默认语法声明命名空间，因为执行计划`XML`只引用了一个命名空间：\n\n```sql\nquery_plan.query('declare\
  \ default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/showplan\"\
  ;\n                    //Batch/Statements') as SQLStatements\n```\n\n或者，代码清单 4-27\
  \ 中定义了`XML`实例中的两个命名空间。因此，每个命名空间都必须单独声明，如下所示。\n\n```sql\nSELECT name,\n       CAST(CAST(packagedata\
  \ AS varbinary(MAX)) AS XML) AS package,\n       CAST(CAST(packagedata AS varbinary(MAX))\
  \ AS XML).query('declare namespace         DTS=\"www.microsoft.com/SqlServer/Dts\"\
  ;\ndeclare namespace SQLTask=\"www.microsoft.com/sqlserver/dts/tasks/sqltask\";\n\
  \                              //DTS:ObjectData//SQLTask:SqlTaskData/SQLTask:SelectedDatabases')\
  \ as SQLStatements\nFROM msdb.dbo.sysssispackages\nWHERE packagetype = 6;\n```\n\
  \n**代码清单 4-27.** 在`query()`方法的 XQuery 中声明多个命名空间\n\n要声明命名空间，你可以使用`query()`方法的内部 XQuery\
  \ 格式，也可以使用`XMLNAMESPACES`语法，如代码清单 4-28 所示。\n\n```sql\nWITH XMLNAMESPACES('www.microsoft.com/SqlServer/Dts'\
  \ as DTS,\n                   'www.microsoft.com/sqlserver/dts/tasks/sqltask' as\
  \ SQLTask)\nSELECT name,\n       CAST(CAST(packagedata AS varbinary(MAX)) AS XML)\
  \ AS package,\n       CAST(CAST(packagedata AS varbinary(MAX)) AS XML).query('//DTS:ObjectData//SQLTask:SqlTaskData/SQLTask:SelectedDatabases')\
  \ as SQLStatements\nFROM msdb.dbo.sysssispackages\nWHERE packagetype = 6;\n```\n\
  \n**代码清单 4-28.** 在`query()`方法中使用`XMLNAMESPACES`代替 XQuery 命名空间声明\n\n作为本配方的总结，我想再演示一个示例，其中返回带有用户定义根元素的`XML`实例子集（代码清单\
  \ 4-29）。其语法是 `query('<Root>{/XMLPath/}</Root>')`。\n\n```sql\nWITH XMLNAMESPACES('www.microsoft.com/SqlServer/Dts'\
  \ as DTS,\n                   'www.microsoft.com/sqlserver/dts/tasks/sqltask' as\
  \ SQLTask)\nSELECT name,\n       CAST(CAST(packagedata AS varbinary(MAX)) AS XML)\
  \ AS package,\n       CAST(CAST(packagedata AS varbinary(MAX)) AS XML).query('{//DTS:ObjectData//SQLTask:SqlTaskData/SQLTask:SelectedDatabases}')\
  \ as SQLStatements\nFROM msdb.dbo.sysssispackages\nWHERE packagetype = 6;\n```\n\
  \n**代码清单 4-29.** 使用用户定义的根元素返回`query()`函数结果\n\n你可以根据自己的偏好选择`query()`方法使用的语法。\n\n\
  ## 4-7. 查找表中的所有 XML 列\n\n### 问题\n\n你想查找那些可能以非`XML`数据类型存储的`XML`文档。\n\n### 解决方案\n\n\
  我从未遇到过需要在客户端检测`XML`文档的情况，但当客户端不确定`XML`存储在何处时，仅仅依赖`XML`数据类型并不是一个好策略。正如配方 4-4 所解释的，`XML`文档可能存储在`XML`、`VARCHAR`、`NVARCHAR`、`VARBINARY`、`IMAGE`、`TEXT`和`NTEXT`数据类型的列中。因此，我编写了一个`SQL`脚本，用于动态地在数据库的所有列中“嗅探”`XML`文档，如代码清单\
  \ 4-30 所示。\n\n```sql\nSET NOCOUNT ON;\nDECLARE @SQL nvarchar(1000),\n        @tblName\
  \ nvarchar(200),\n        @clmnName nvarchar(100),\n        @DType nvarchar(100);\n\
  IF (OBJECT_ID('tempdb.dbo.#Result')) IS NOT NULL\n    DROP TABLE #Result;\nCREATE\
  \ TABLE #Result\n(\n    XMLValue XML,\n    TopElement NVARCHAR(100),\n    tblName\
  \ NVARCHAR(200),\n    clmnName NVARCHAR(100),\n    DateType NVARCHAR(100)\n);\n\
  IF (OBJECT_ID('tempdb.dbo.#XML')) IS NOT NULL\n    DROP TABLE #XML;\nCREATE TABLE\
  \ #XML\n(\n    Val XML,\n    TopElmn VARCHAR(100)\n);\nDECLARE cur\nCURSOR FOR\n\
  SELECT XMLClmn = 'WITH CTE AS\n                   (SELECT TOP 1 '+ CASE t.name WHEN\
  \ ''IMAGE'' THEN '' TRY_CONVERT(XML, CAST(' + QUOTENAME(c.name)  + '' AS VARBINARY(MAX)))\
  \ AS tst, ''\n                                          ELSE '' TRY_CONVERT(XML,\
  \ ' + QUOTENAME(c.name)  + '') as tst, '' END + QUOTENAME(c.name)  + '' FROM ''\n\
  \                                          + QUOTENAME(s.name) +''.'' + QUOTENAME(o.name)\
  \ +\n                                          ''\n                            \
  \              WHERE '+ CASE t.name WHEN ''IMAGE'' THEN '' TRY_CONVERT(XML, CAST('\
  \ + QUOTENAME(c.name)  + '' AS VARBINARY(MAX)))''\n                            \
  \              ELSE '' TRY_CONVERT(XML, ' + QUOTENAME(c.name)  + '') '' END +''\
  \ IS NOT NULL\n                   )\n                   SELECT TOP (1) tst,\n  \
  \                        c.value(''fn:local-name(.)[1]'', ''VARCHAR(200)'') AS TopNodeName\n\
  \                   FROM CTE CROSS APPLY tst.nodes(''/*'') AS t(c);',\n       s.name\
  \ + ''.'' + o.name AS TableName,\n       c.name AS ColumnName ,\n       t.name\n\
  FROM sys.columns c\nINNER JOIN sys.types t\n    ON c.system_type_id = t.system_type_id\n\
  INNER JOIN sys.objects o\n    ON c.object_id = o.object_id\n    AND o.type = ''u''\n\
  INNER JOIN sys.schemas s\n    ON s.schema_id = o.schema_id\nWHERE (t.name IN(''xml'',''varchar'',\
  \ ''nvarchar'', ''varbinary'') AND c.max_length = -1)\n   OR (t.name IN (''image'',\
  \ ''text'', ''ntext''));\nOPEN cur;\nFETCH NEXT\nFROM cur\nINTO @SQL, @tblName,\
  \ @clmnName, @DType;\nWHILE @@FETCH_STATUS = 0\nBEGIN\n    INSERT INTO #XML\n  \
  \  EXEC(@SQL);\n    INSERT #Result\n    SELECT Val, TopElmn, @tblName, @clmnName,\
  \ @DType\n    FROM #XML;\n    TRUNCATE TABLE #XML;\n    FETCH NEXT FROM cur INTO\
  \ @SQL, @tblName, @clmnName, @DType;\nEND\nDEALLOCATE cur;\nSELECT XMLValue,TopElement,tblName,clmnName,DateType\n\
  FROM #Result;\nDROP TABLE #Result;\nDROP TABLE #XML;\nSET NOCOUNT OFF;\n```\n\n\
  **代码清单 4-30.** 跨表和列检测`XML`文档\n\n为了演示结果，该`SQL`脚本在`msdb`数据库上执行，如图 4-8 所示。\n\n![A435478_1_En_4_Fig8_HTML.jpg](img/A435478_1_En_4_Fig8_HTML.jpg)\n\
  \n**图 4-8.** 来自`msdb`数据库的结果\n\n**重要提示** 此解决方案使用了`TRY_CONVERT()`函数，该函数仅在 `SQL Server`\
  \ 2012 及更高版本中可用。\n\n\n### 工作原理\n\n## 数据类型过滤与验证\n\n该解决方案基于以下几个逻辑过程：\n\n*   `FROM`\
  \ 子句从系统表（`sys.columns`、`sys.types`、`sys.objects` 和 `sys.schemas`）中获取有关可能存储 XML 数据的列、其所属表和架构的信息。\n\
  *   `WHERE` 子句过滤数据类型。理论上，XML 文档可能存在于数据类型为 `XML`、`VARCHAR`、`NVARCHAR`、`VARBINARY`、`IMAGE`、`TEXT`\
  \ 和 `NTEXT` 的列中。XML 文档本质上是冗长的。因此，期望数据类型 `VARCHAR`、`NVARCHAR` 和 `VARBINARY` 的长度为\
  \ -1，即在数据类型长度规范中为 `MAX`。其他数据类型 `IMAGE`、`TEXT` 和 `NTEXT` 则不需要此额外的长度过滤器。\n*   `SELECT`\
  \ 子句动态构建用于验证的 SQL。关键函数 `TRY_CONVERT()` 自 SQL Server 2012 起可用。我们利用了 `TRY_CONVERT()`\
  \ 的行为：当数据类型无法转换为指定类型时，该函数返回 `NULL`。例如，`CAST()` 和 `CONVERT()` 函数在转换失败时会返回错误（消息 9420，XML\
  \ 解析：第 1 行，字符 2，非法 xml 字符）。因此，任何无法转换为 `XML` 数据类型的值都会被过滤掉。如技巧 4-4 所述，`IMAGE` 数据类型无法直接转换为\
  \ `XML`。因此，`CASE` 表达式使用了两次转换验证；第一次针对 `IMAGE` 数据类型，如代码清单 4-31 所示，第二次针对 `VARCHAR`、`NVARCHAR`、`VARBINARY`、`TEXT`\
  \ 和 `NTEXT` 数据类型，如代码清单 4-32 所示。\n\n```sql\nWITH CTE AS\n(\nSELECT TOP (1) TRY_CONVERT(XML,\
  \ CAST(packagedata AS VARBINARY(MAX))) AS tst,\npackagedata\nFROM dbo.sysssispackages\n\
  WHERE  TRY_CONVERT(XML, CAST(packagedata AS VARBINARY(MAX))) IS NOT NULL\n)\nSELECT\
  \ TOP (1) tst,\nc.value('local-name(.)[1]', 'VARCHAR(200)') AS TopNodeName\nFROM\
  \ CTE\nCROSS APPLY tst.nodes('/*') AS t(c);\n代码清单 4-31.\n验证 IMAGE 数据类型\n```\n\n\
  ```sql\nWITH CTE AS\n(\nSELECT TOP (1) TRY_CONVERT(XML, expression) as tst,\nexpression\n\
  FROM dbo.syspolicy_conditions_internal\nWHERE  TRY_CONVERT(XML, expression) IS NOT\
  \ NULL\n)\nSELECT TOP (1) tst,\nc.value('fn:local-name(.)[1]', 'VARCHAR(200)') AS\
  \ TopNodeName\nFROM CTE\nCROSS APPLY tst.nodes('/*') AS t(c);\n代码清单 4-32.\n验证 VARCHAR,\
  \ NVARCHAR, VARBINARY, TEXT 和 NTEXT 数据类型\n```\n\n## 代码执行过程\n\n代码的工作方式如下：\n\n*  \
  \ 游标执行在 `SELECT` 子句中生成的每个 SQL 脚本。\n*   临时表 `#XML` 获取返回的行。\n*   临时表 `#Result` 从 `#XML`\
  \ 表获取行，并从游标获取变量。\n*   清理 `#XML` 表，为下一行验证做准备。\n*   销毁游标。\n*   返回收集的数据。\n*   删除临时表。\n\
  \n## CTE 外部 SELECT 块分析\n\n以上是对流程的描述。然而，我想仔细研究一下代码清单 4-32 中 CTE 的外部 `SELECT` 块：\n\
  \n```sql\nSELECT TOP (1) tst,\nc.value('fn:local-name(.)[1]', 'VARCHAR(200)') AS\
  \ TopNodeName\nFROM CTE\nCROSS APPLY tst.nodes('/*') AS t(c);\n```\n\n列 `tst`（代表测试）在成功转换为\
  \ `XML` 数据类型时返回 XML 值。列 `TopNodeName` 返回第一个可用的元素名称，即根元素。`fn:local-name()` 函数根据提供的参数返回元素名称。点号（当前上下文节点）是传递给\
  \ `fn:local-name()` 函数的参数，而 `nodes()` 方法设置为 `\"/*\"`（`child::node()` 和 `/node()`\
  \ 轴的简写），它是单个元素的通配符。因此，这个组合的 XML 解析器意味着——从 XML 文档中返回第一个可用的名称。\n\n当 `node()` 方法设置为\
  \ `\"//*\"`（`descendant-or-self` 轴的简写）时，我们可以得到不同的效果，这意味着查看并访问 XML 数据中的每个元素。这可以与\
  \ T-SQL 过滤器相比较，例如 `WHERE ColumnName LIKE '%text%'`。这样，解析器会遍历 XML 数据中的所有元素，如代码清单\
  \ 4-33 所示。使用单个点作为参数的 `fn:local-name()` 函数返回当前元素名称，例如 `details.value('local-name(.)[1]',\
  \ 'VARCHAR(100)')`。使用父轴步进（双点号），它返回上一级（即父级）的元素，例如 `details.value('local-name(..)[1]',\
  \ 'VARCHAR(100)')`，如图 4-9 所示。\n\n```sql\nWITH ALLELEMENTS\nAS\n(\nSELECT TOP 1 Demographics\n\
  FROM Sales.Store\n)\nSELECT\ndetails.value('local-name(..)[1]', 'VARCHAR(100)')\
  \ AS ParentNodeName,\ndetails.value('local-name(.)[1]', 'VARCHAR(100)') AS NodeName\n\
  FROM ALLELEMENTS\nCROSS APPLY Demographics.nodes('//*') survey(details);\n代码清单 4-33.\n\
  显示 XML 数据中的所有元素\n```\n\n从 XML 数据中检索所有元素的结果如图 4-9 所示。\n\n![A435478_1_En_4_Fig9_HTML.jpg](img/A435478_1_En_4_Fig9_HTML.jpg)\n\
  \n**图 4-9.** 动态返回 XML 元素的结果\n\n## 4-8. 使用多个 CROSS APPLY 运算符\n\n### 问题\n\n你需要分解一个类型化\
  \ XML 列，但希望使用多个 `CROSS APPLY` 运算符来导航 XML。\n\n### 解决方案\n\n在技巧 4-5 “导航类型化 XML 列”中，我演示了如何使用\
  \ `\"../\"` 导航来分解类型化 XML 列。实现多个 `CROSS APPLY` 运算符可以作为 XML 导航的替代方案，如代码清单 4-34 所示。\n\
  \n```sql\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'\
  \ as df)\nSELECT ProductModelID,\nstep.value('fn:string(.)', 'varchar(2000)') AS\
  \ StepInstruction,\ninstruct.value('@LocationID', 'int') AS LaborStation,\ninstruct.value('@LaborHours',\
  \ 'real') AS LaborHours,\ninstruct.value('@LotSize', 'int') AS LotSize,\ninstruct.value('@MachineHours',\
  \ 'real') AS MachineHours,\ninstruct.value('@SetupHours', 'real') AS SetupHours,\n\
  step.value('df:material[1]', 'varchar(100) ') AS Material,\nstep.value('df:tool[1]',\
  \ 'varchar(100) ') AS Tool\nFROM Production.ProductModel\nCROSS APPLY Instructions.nodes('df:root/df:Location')\
  \ prod(instruct)\nCROSS APPLY instruct.nodes('df:step') ins(step);\n代码清单 4-34.\n\
  演示多个 CROSS APPLY 运算符的解决方案\n```\n\n查询结果如图 4-10 所示。\n\n![A435478_1_En_4_Fig10_HTML.jpg](img/A435478_1_En_4_Fig10_HTML.jpg)\n\
  \n**图 4-10.** 应用多个 CROSS APPLY 运算符的结果\n\n### 工作原理\n\n使用多个 `CROSS APPLY` 运算符的关键在于将一个\
  \ `CROSS APPLY` 应用于第二个 `CROSS APPLY` 的结果，如我们的示例代码所示：\n\n```sql\nFROM Production.ProductModel\n\
  CROSS APPLY Instructions.nodes('df:root/df:Location') prod(instruct)\nCROSS APPLY\
  \ instruct.nodes('df:step') ins(step)\n```\n\n第一个 `CROSS APPLY` 引用 `ProductModel`\
  \ 表的 `XML` 指令列，以创建一个基础结果集，供给第二个 `CROSS APPLY`：\n\n```sql\nCROSS APPLY Instructions.nodes('df:root/df:Location')\
  \ prod(instruct)\n```\n\n第二个 `CROSS APPLY` 通过其 `instruct` 列别名获取第一个 `CROSS APPLY`\
  \ 的结果：\n\n```sql\nCROSS APPLY instruct.nodes('df:step') ins(step)\n```\n\n最后，`SELECT`\
  \ 子句使用 `instruct` 别名检索父元素，并使用 `step` 别名引用子元素。技巧 4-5 和 4-8 中的解决方案产生的结果集完全相同，但 `SELECT`\
  \ 和 `FROM` 子句中的语法不同。\n\n## 摘要\n\n拆解 XML 数据的能力是在 SQL Server 中操作 XML 的一个非常重要的方面。许多内置的\
  \ SQL Server 流程都使用 XML；例如：\n\n*   执行计划\n*   扩展事件\n*   DDL 触发器\n*   SSIS 和 SSRS 后台代码\n\
  \nXQuery 语言通过允许动态且强大的编程式 XML 探索与操作，从而简化了 SQL Server 以及数据库管理员和开发人员的任务，更高效地利用了运行时间。\n\
  \n## 5. 修改 XML\n\nXML XQuery 能够修改 XML 变量的 XML 实例和 XML 列。XQuery 的 `modify()` 方法提供了添加、删除和更新\
  \ XML 元素、属性及其值的能力。本章将讨论并通过实际案例演示如何将 `modify()` 方法应用于 XML 实例。\n\n### 5-1. 在 XML 中插入一个子元素\n\
  \n### 问题\n\n你想在一个现有的 XML 实例中插入一个子元素。\n\n### 解决方案\n\n你可能会遇到需要向现有 XML 实例中插入一个 XML\
  \ 元素的情况。考虑清单 5-1 所示的简单 XML 数据。\n\n```\n清单 5-1.\n简单的 XML 数据\n```\n\nSQL Server 通过\
  \ XML 数据类型的 `modify()` 方法提供对 XML 数据修改语言（XML DML）的支持。XML DML 是 W3C XQuery 标准的一个扩展，因为\
  \ XQuery 缺少数据操作语句和函数。清单 5-2 展示了如何使用 `modify()` 方法的 XML DML `insert` 语句将一个新元素插入到现有\
  \ XML 数据中的特定位置。结果如图 5-1 所示。\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n\n';\n\
  SET @XMLDoc.modify('insert 3 year parts and labor extended maintenance is available\
  \ into (/Root/ProductDescription/Features)[1]');\nSELECT @XMLDoc;\n清单 5-2.\n为 Features\
  \ 元素插入第一个子元素\n```\n\nXML DML `insert` 语句的结果如图 5-1 所示。\n\n![A435478_1_En_5_Fig1_HTML.jpg](img/A435478_1_En_5_Fig1_HTML.jpg)\n\
  图 5-1. 在现有 XML 数据中插入子元素的结果\n\n### 工作原理\n\n`modify()` 方法的 XML DML 语言与 T-SQL DML 的\
  \ `INSERT`、`UPDATE` 和 `DELETE` 方法类似，但具有更多附加选项。这是合理的，因为 XML DML 在修改 XML 实例时必须考虑 XML\
  \ 结构。`modify()` 方法不仅按值修改 XML 文档，还会修改其元素和属性。因此，`modify()` 方法在逻辑上可以被视为 T-SQL 的 DML\
  \ 和 DDL 语言的一个子集的组合。我们将在本章的其他配方中讨论这些其他的 XML DML 语句和附加选项。\n\n本配方演示了如何将一个新的子元素 `Maintenance`\
  \ 添加到 XML 实例中的父元素 `Features`。在原始 XML 实例（如清单 5-1 所示）中，`Features` 元素没有任何子元素。我们不需要向\
  \ `modify()` 方法提供子元素位置的具体说明，因为 `Maintenance` 元素是 `Features` 元素的第一个子元素。清单 5-2 中提供的值来插入新元素的解决方案遵循以下模式：\n\
  \n1.  `insert` 是指定“插入”模式的关键词。\n2.  `<Maintenance> 3 years parts and labor extended\
  \ maintenance is available</Maintenance>` —— 是元素值模式，指示我们希望插入的元素。\n3.  `into` 是关键词，其后的目标\
  \ XPath 路径指示我们将元素插入到 XML 中的哪个位置。\n4.  `(/Root/ProductDescription/Features)[1]` 是插入的目标\
  \ XPath 路径。注意，目标 XPath 需要一个单例实例。当未提供单例（在此例中是通过 `[1]` 索引）时，XML DML 解析器将抛出以下错误：\n\
  \    ```\n    消息 2226，级别 16，状态 1，第 10 行\n    XQuery [modify()]: 'insert' 的目标必须是单个节点，找到的是\
  \ 'element(Features,xdt:untyped) *'\n    ```\n\n`modify(@xml:dml)` 方法接受一个参数。因此，发送给该方法的所有\
  \ `@xml:dml` 模式都作为单个字符串值提交，如清单 5-2 所示：\n\n```\nmodify('insert\n3 year parts and\
  \ labor extended maintenance is available \ninto (/Root/ProductDescription/Features)[1]');\n\
  ```\n\n### 5-2. 在包含命名空间的现有 XML 实例中插入子元素\n\n### 问题\n\n你想在一个包含命名空间的 XML 实例中插入一个子元素。\n\
  \n### 解决方案\n\n当 XML 实例包含 XML 命名空间时，你需要在 `modify()` 方法内声明该 XML 命名空间。清单 5-3 在配方 5-1\
  \ 的解决方案基础上进行了演示。\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n\n';\nSET @XMLDoc.modify('declare\
  \ namespace ns=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions\"\
  ;\ninsert 3 year parts and labor extended maintenance is available into (/ns:Root/ns:ProductDescription/ns:Features)[1]');\n\
  SELECT @XMLDoc;\n显示 XML 结果：\n\n3 year parts and labor extended maintenance is available\n\
  \n清单 5-3.\n在 modify()方法中声明 XML 命名空间\n```\n\n### 工作原理\n\n正如你所看到的，清单 5-1 和清单 5-3 之间有一个虽小但重要的区别。清单\
  \ 5-3 在 XML 实例内部定义了一个 XML 命名空间。这个微小的差异影响了 `modify()` 方法的语法。如果 `modify()` 方法忽略了 XML\
  \ 命名空间，XQuery 将无法找到目标 XPath 路径，导致 XML 不会发生任何更改，如清单 5-4 所示。结果如图 5-2 所示。\n\n```\n\
  DECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription ProductID=\"1\" xmlns=\"\
  http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions\"\
  >\n  <Summary>\n    <m:Features xmlns:m=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModel\"\
  >\n      <m:feature>Vacuum formed dual wall polycarbonate</m:feature>\n      <m:feature>Dual\
  \ material molded outer shell</m:feature>\n      <m:feature>3 year parts and labor\
  \ extended maintenance is available</m:feature>\n    </m:Features>\n  </Summary>\n\
  </ProductDescription>\n';\nSET @XMLDoc.modify('insert 3 year parts and labor extended\
  \ maintenance is available into (/Root/ProductDescription/Features)[1]');\nSELECT\
  \ @XMLDoc;\n```\n\n清单 5-4.\nXML 命名空间导致 `modify()` 方法未能更新目标 XML\n\n结果如图 5-2 所示，表明此\
  \ `modify()` 方法并未更新源 XML。\n\n![A435478_1_En_5_Fig2_HTML.jpg](img/A435478_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2.\n在 `modify()` 方法中忽略命名空间时生成的 XML\n\n如图 5-2 所见，返回的 XML 实例没有变化。要纠正这个问题，必须在\
  \ `modify()` 方法内部声明 XML 命名空间。因此，对于带有命名空间的 XML 实例，模式中的第一部分必须是命名空间声明，例如：\n\n```\n\
  modify('declare namespace ns = \"http://schemas.microsoft.com/sqlserver/2004/07/\
  \ adventure-works/ProductModelManuInstructions\"; ... )\n```\n\n声明的名称 `ns` 是用户定义的，因此你可以选择任何符合\
  \ SQL Server 命名约定的名称来声明命名空间，例如名称中不能有空格，首字符必须是字母，后续字符可以是字母数字等。声明命名空间后，在 `modify()`\
  \ 方法中使用这个名称作为每个元素的一部分，包括新模式和目标模式。例如：\n\n```\ninsert 3 year parts and labor extended\
  \ maintenance is available into (/ns:Root/ns:ProductDescription/ns:Features)[1]\n\
  ```\n\n**提示**\n使用 `modify()` 方法后，务必验证结果。例如，解析器对于被忽略的命名空间声明不会抛出错误，而且操作似乎成功完成。然而，`modify()`\
  \ 实际上并未将 XML DML 操作应用到你的 XML 数据上。\n\n作为 `modify()` 方法内部命名空间声明语法的替代方案，也可以使用 T-SQL\
  \ 的外部 `WITH XMLNAMESPACES` 声明来完成此任务。当 XML 文档只有一个命名空间时，可以使用默认命名空间，如清单 5-5 所示。\n\n\
  ```\nDECLARE @XMLDoc xml;\nWITH XMLNAMESPACES(default 'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions')\n\
  SELECT @XMLDoc =\n'\n<ProductDescription ProductID=\"1\" xmlns=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions\"\
  >\n  <Summary>\n    <Features>\n      <feature>Vacuum formed dual wall polycarbonate</feature>\n\
  \      <feature>Dual material molded outer shell</feature>\n    </Features>\n  </Summary>\n\
  </ProductDescription>\n';\nSET @XMLDoc.modify('insert 3 year parts and labor extended\
  \ maintenance is available into (/Root/ProductDescription/Features)[1]');\n```\n\
  \n清单 5-5.\n使用 `WITH XMLNAMESPACES` 声明默认 XML 命名空间\n\n当你使用 `WITH XMLNAMESPACES` 子句时，`SET`\
  \ 操作符将不起作用。你必须改用 `SELECT` 子句。\n\n## 5-3. 插入 XML 属性\n\n### 问题\n\n你想在现有 XML 数据的 XML\
  \ 元素中插入一个属性。\n\n### 解决方案\n\n属性是 XML 元素的一个特性。因此，`modify()` 方法提供了 `attribute` 选项来向元素添加属性，如清单\
  \ 5-6 所示。\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription ProductID=\"\
  1\">\n  <Summary>\n    <Features>\n      <Maintenance>\n        <feature>Vacuum\
  \ formed dual wall polycarbonate</feature>\n        <feature>Dual material molded\
  \ outer shell</feature>\n      </Maintenance>\n    </Features>\n  </Summary>\n</ProductDescription>\n\
  ';\nSET @XMLDoc.modify('insert attribute ProductModel {\"Mountain-100\"} into (/Root/ProductDescription/Features/Maintenance)[1]');\n\
  SELECT @XMLDoc;\n```\n\n清单 5-6.\n将 `ProductModel` 属性插入到 `Maintenance` 元素中\n\n结果如图\
  \ 5-3 所示。\n\n![A435478_1_En_5_Fig3_HTML.jpg](img/A435478_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3.\n向元素中插入属性后的 XML 结果\n\n### 工作原理\n\n第 4 章解释了元素和属性的 XPath 路径语法是不同的。同样地，`modify()`\
  \ 方法也存在差异。首先，`insert` 语句有一个额外的 `attribute` 选项，在插入元素时不指定这个选项。其次，属性不用尖括号包围。最后，属性的值被放入双引号内的花括号中，紧跟在属性名称之后。因此，添加属性的语法遵循以下模式：\n\
  \n1.  `insert attribute` 关键字表示你希望向元素中插入一个属性。\n2.  `ProductModel {\"Mountain-100\"\
  }` 是属性的名称和值。\n3.  `into` 表示目标元素的 XPath 路径即将到来。\n4.  `(/Root/ProductDescription/Features/Maintenance)[1]`\
  \ 是属性的目标 XPath 路径。单例数值位置谓词是目标 XPath 的必需组成部分。\n\n例如：\n\n```\nmodify('insert attribute\
  \ ProductModel {\"Mountain-100\"} into (/Root/ProductDescription/Features/Maintenance)[1]');\n\
  ```\n\n将 XPath 路径用括号括起来，然后在末尾加上数值位置谓词，意味着单例适用于路径中的每一步。不带括号的 XPath 路径则期望单例应用于每个元素。例如：`/Root[1]/ProductDescription[1]/Features[1]/Maintenance[1]`。\n\
  \n示例语法将属性 `ProductModel` 及其值 “Mountain-100” 添加到 `Maintenance` 元素的第一个实例中。\n\n此外，`modify()`\
  \ 方法允许你向一个元素插入多个属性。要向元素添加属性列表：\n\n1.  在 `insert` 指令后打括号。\n2.  列出属性，用逗号分隔。\n3.  闭合括号。\n\
  \n清单 5-7 展示了这一点。\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription\
  \ ProductID=\"1\">\n  <Summary>\n    <Features>\n      <Maintenance>\n        <feature>Vacuum\
  \ formed dual wall polycarbonate</feature>\n        <feature>Dual material molded\
  \ outer shell</feature>\n      </Maintenance>\n    </Features>\n  </Summary>\n</ProductDescription>\n\
  ';\nSET @XMLDoc.modify('insert\n(\nattribute ProductModel {\"Mountain-100\"},\n\
  attribute LaborType {\"Manual\"}\n) into (/Root/ProductDescription/Features/Maintenance)[1]');\n\
  SELECT @XMLDoc;\n```\n\n清单 5-7.\n向 `Maintenance` 元素插入多个属性\n\n结果如图 5-4 所示。\n\n![A435478_1_En_5_Fig4_HTML.jpg](img/A435478_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4.\n向 `Maintenance` 元素插入多个属性后的结果\n\n## 5-4. 条件性地插入 XML 属性\n\n### 问题\n\n你想基于一个比较条件插入一个\
  \ XML 属性。\n\n### 解决方案\n\n可以在 `modify()` 方法中实现 `if … else` 条件语句，如清单 5-8 所示。\n\n```\n\
  DECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription ProductID=\"1\">\n \
  \ <Summary>\n    <Features>\n      <Maintenance>\n        <feature>Vacuum formed\
  \ dual wall polycarbonate</feature>\n        <feature>Dual material molded outer\
  \ shell</feature>\n      </Maintenance>\n    </Features>\n  </Summary>\n</ProductDescription>\n\
  ';\nSET @XMLDoc.modify('insert\nif (/Root/ProductDescription[@ProductID=1])\nthen\
  \ attribute ProductModel {\"Road-150\"}\nelse (attribute ProductModel {\"Mountain-100\"\
  } )\ninto (/Root/ProductDescription/Features/Maintenance)[1]');\nSELECT @XMLDoc;\n\
  ```\n\n清单 5-8.\n将属性插入操作包装在 `if-then-else` 条件中\n\n结果如图 5-5 所示。\n\n![A435478_1_En_5_Fig5_HTML.jpg](img/A435478_1_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5.\n条件性属性插入后的 XML 结果\n\n\n### 5-5. 在指定位置插入子元素\n\n### 问题\n你希望将一个新元素插入到现有的元素组中，并强制其遵循特定的位置顺序。\n\
  \n### 解决方案\n`modify()` 方法的 `insert` 语句有四个关键字，可用于指定子元素在元素组中的位置：\n\n*   `as first`\n\
  *   `as last`\n*   `after`\n*   `before`\n\n这些关键字用于指定新元素的放置位置，如列表 5-9 所示。\n\n```sql\n\
  DECLARE @XMLDoc xml;\nSET @XMLDoc =\n'<Root>\n<ProductDescription ProductID=\"1\"\
  >\n  <Features>\n    <Color>Red</Color>\n    <Material>Aluminium</Material>\n  \
  \  <BikeFrame>Carbon</BikeFrame>\n  </Features>\n</ProductDescription>\n</Root>';\n\
  SET @XMLDoc.modify('insert 1 year parts and labor\nas first  into (/Root/ProductDescription/Features)[1]');\n\
  SET @XMLDoc.modify('insert Aluminium\nas last into (/Root/ProductDescription/Features)[1]');\n\
  SET @XMLDoc.modify('insert Strong long lasting\nafter (/Root/ProductDescription/Features/Material)[1]')\n\
  SET @XMLDoc.modify('insert Silver\nbefore (/Root/ProductDescription/Features/BikeFrame)[1]')\n\
  SELECT @XMLDoc;\n-- 列表 5-9.\n-- 演示使用 as first、as last、after 和 before 关键字在父元素 Features\
  \ 下排列子元素\n```\n\n结果如图 5-6 所示。\n\n![A435478_1_En_5_Fig6_HTML.jpg](img/A435478_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6.\n使用位置指定符的插入指令结果\n\n### 工作原理\n关键字 `as first`、`as last`、`after` 和 `before`\
  \ 为子元素提供位置指定。每个关键字的含义不言自明：\n\n*   `as first` – 将子元素添加到第一个位置。\n*   `as last` – 将子元素添加到最后一个位置。\n\
  *   `after` – 将子元素添加到提供的同级元素位置之后。\n*   `before` – 将子元素添加到提供的同级元素位置之前。\n\n`as first`\
  \ 和 `as last` 的语法与 `after` 和 `before` 的语法略有不同。例如，`as first` 和 `as last` 的语法如下：\n\
  \n*   `modify('insert <ChildElement> as first into (/XPath/<ParentElement>)[1]')`\n\
  *   `modify('insert <ChildElement> as last into (/XPath/<ParentElement>)[1]')`\n\
  \n`insert` 指令提供子元素及其值，然后由 `as first` 或 `as last` 指定符指明该元素在其同级元素中所处的位置。最后一步，父元素的\
  \ XPath 指明了子元素的目标位置。\n\n对于 `before` 和 `after` 关键字，与 `as first` 和 `as last` 相比有两个区别：\n\
  \n*   未使用 `into` 关键字。\n*   XPath 中引用了 `<ParentElement>/<SiblingElement>` 元素，新元素（在它之前或之后）将放置在该元素旁边。\n\
  *   `modify('insert <ChildElement> before (/XPath/<ParentElement>/<SiblingElement>)[1]')`\n\
  *   `modify('insert <ChildElement> after (/XPath/<ParentElement>/<SiblingElement>)[1]')`\n\
  \n### 5-6. 插入多个元素\n\n### 问题\n你希望向 XML 文档中插入多个同级元素。\n\n### 解决方案\n与属性不同（你可以通过逗号分隔来添加多个属性及其值），`modify()`\
  \ 方法中的直接 `insert` 语句不支持插入多个元素。但是，XQuery 扩展函数 `sql:variable()` 可以帮助解决这个问题，如列表 5-10\
  \ 所示。\n\n```sql\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'<Root>\n<ProductDescription\
  \ ProductID=\"1\">\n  <Features/>\n</ProductDescription>\n</Root>';\nDECLARE @newElements\
  \ xml;\nSET @newElements =\n'<Warranty>1 year parts and labor</Warranty>\n<Material>Aluminium</Material>\n\
  <Color>Silver</Color>\n<BikeFrame>Strong long lasting</BikeFrame>';\nSET @XMLDoc.modify('insert\n\
  sql:variable(\"@newElements\")\ninto (/Root/ProductDescription/Features)[1]')\n\
  SELECT @XMLDoc;\n-- 列表 5-10.\n-- 向 XML 实例中插入多个同级元素\n```\n\n生成的 XML 如图 5-6 所示（重复该图）。\n\
  \n![A435478_1_En_5_Figa_HTML.jpg](img/A435478_1_En_5_Figa_HTML.jpg)\n\n### 工作原理\n\
  如解决方案部分所述，`modify()` 方法在 `insert` 指令中不支持直接使用多个同级元素列表。XQuery `sql:variable()` 扩展函数为我们提供了一个指向\
  \ XML 块的引用，这使得 `insert` 指令机制能够像插入单个新元素一样工作。\n\n要向 XML 实例中插入多个同级元素，需要以下步骤：\n\n1.\
  \  声明一个变量为 `XML` 数据类型（`NVARCHAR` 或 `VARCHAR` 数据类型也可以工作，但我建议保持与 `XML` 数据类型一致）。\n\
  2.  将一个 XML 元素列表赋值给该变量。\n\n例如：\n\n```sql\nDECLARE @newElements xml;\nSET @newElements\
  \ =\n'<Warranty>1 year parts and labor</Warranty>\n<Material>Aluminium</Material>\n\
  <Color>Silver</Color>\n<BikeFrame>Strong long lasting</BikeFrame>';\n```\n\n`insert`\
  \ 部分与配方 5-1 “向你的 XML 中插入子元素” 中解释的相同。但是，使用了函数 `sql:variable()` 而不是特定的子元素。例如：\n\n\
  ```sql\nmodify('insert\nsql:variable(\"@newElements\")\ninto (/Root/ProductDescription/Features)[1]')\n\
  ```\n\nXQuery 扩展函数 `sql:variable()` 是这个用于向 XML 实例插入多个同级元素的简单解决方案的关键部分。\n\n### 5-7.\
  \ 更新 XML 元素值\n\n### 问题\n你希望更新 XML 实例中的元素值。\n\n### 解决方案\n`modify()` 方法的 `replace\
  \ value of` 语句用于更新 XML 实例的元素值。列表 5-11 演示了将 `Color` 元素值从 “Silver” 更新为 “Black” 的解决方案。\n\
  \n```sql\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'<Root>\n<ProductDescription ProductID=\"\
  1\">\n  <Features>\n    <Warranty>1 year parts and labor</Warranty>\n    <Material>Aluminium</Material>\n\
  \    <Color>Silver</Color>\n    <BikeFrame>Strong long lasting</BikeFrame>\n  </Features>\n\
  </ProductDescription>\n</Root>';\nSET @XMLDoc.modify('replace value of\n(/Root/ProductDescription/Features/Color/text())[1]\
  \ with \"Black\"')\nSELECT @XMLDoc;\n-- 列表 5-11.\n-- 更新 <Color> 元素的值\n```\n\n结果如图\
  \ 5-7 所示。\n\n![A435478_1_En_5_Fig7_HTML.jpg](img/A435478_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7.\n显示 `Color` 元素值被更新后的结果\n\n\n\n\n### 工作原理\n\n`modify()`方法实现了`replace value\
  \ of`语句，用于更新 XML 实例元素的值。当 XML 数据类型在 SQL Server 205 中引入时，许多 DBA 和 SQL Server 开发者感到困惑（至少我认识的所有\
  \ SQL Server 专业人员都是如此）。我们原本期待一个名为“update”之类的指令；然而，`replace value of`指令却用于更新 XML\
  \ 实例的元素和属性。之前的配方为我们提供了`insert`指令的多种“变体”，这在实践上是正确的。插入过程对 XML 实例有很多选项。与插入相比，更新 XML\
  \ 实例元素相当直接。要修改 XML 实例元素值，你需要以下步骤：\n\n1.  指定`modify()`方法的`replace value of`语句。\n\
  2.  左括号，提供指向 XML 元素的 XPath 路径；为目标元素实现`text()`函数；闭合括号并指定单例。\n3.  在`with`关键字后，用双引号指定新的元素值。\n\
  \n例如：\n\n```\nmodify('replace value of\n(/Root/ProductDescription/Features/Color/text())[1]\n\
  with \"Black\"')\n```\n\n## 5-8. 更新 XML 属性值\n\n### 问题\n\n你想更新 XML 实例中某个属性的值。\n\n\
  ### 解决方案\n\n更新 XML 实例属性的解决方案与更新元素相对接近。然而，更新属性有一些特定之处，如清单 5-12 所示。`ProductName`属性的值从“Road\
  \ Bike”被修改为“Mountain Bike”。\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription\
  \ ProductName=\"Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n\
  \    <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n    <Feature>Strong\
  \ long lasting</Feature>\n  </Features>\n</ProductDescription>\n';\nSET @XMLDoc.modify('replace\
  \ value of\n(/Root/ProductDescription/@ProductName)[1] with \"Mountain Bike\"');\n\
  SELECT @XMLDoc;\n```\n\n清单 5-12. 更新 `ProductName` 属性\n\n结果如图 5-8 所示。\n\n![A435478_1_En_5_Fig8_HTML.jpg](img/A435478_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8. 属性 `ProductName` 值更新后的结果展示\n\n### 工作原理\n\n更新 XML 实例属性与更新元素没有太大区别。要修改 XML\
  \ 实例属性值，你需要：\n\n1.  指定`modify()`方法的`replace value of`语句。\n2.  指向要更新的 XML 属性的 XPath\
  \ 路径，属性名前加上`@`符号，并用括号括起来。XPath 路径必须是单例节点。\n3.  在`with`关键字后，用双引号指定新的属性值。\n\n修改元素和属性的主要区别在于，属性必须以`@`符号为前缀，并且更新属性不需要`text()`节点测试。\n\
  \n## 5-9. 删除 XML 属性\n\n### 问题\n\n你想从 XML 属性中删除一个属性。\n\n### 解决方案\n\n在`modify()`方法中使用`delete`语句，如清单\
  \ 5-13 所示。\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription ProductName=\"\
  Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n    <Feature>Aluminium</Feature>\n\
  \    <Feature>Silver</Feature>\n    <Feature>Strong long lasting</Feature>\n  </Features>\n\
  </ProductDescription>\n';\nSET @XMLDoc.modify('delete /Root/ProductDescription/@ProductName')\n\
  SELECT @XMLDoc;\n```\n\n清单 5-13. 从 XML 实例中删除 `ProductName` 属性\n\n结果如图 5-9 所示。\n\n\
  ![A435478_1_En_5_Fig9_HTML.jpg](img/A435478_1_En_5_Fig9_HTML.jpg)\n\n图 5-9. 从 XML\
  \ 实例中删除属性后的结果\n\n### 工作原理\n\n删除属性的语法比更新属性的语法更简单。要从 XML 实例中删除属性，`modify()`方法需要`delete`语句和指向该属性的\
  \ XPath 路径。记住属性以`@`符号为前缀。此外，`ProductDescription`元素在 XML 文档中是唯一的，因此这种情况下不需要单例。例如：\n\
  \n```\nmodify('delete /Root/ProductDescription/@ProductName')\n```\n\n在需要移除元素所有属性的情况下，XPath\
  \ 应包含目标元素路径后跟`/@*`，如清单 5-14 所示。\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n\
  <ProductDescription ProductName=\"Road Bike\">\n  <Features>\n    <Feature>1 year\
  \ parts and labor</Feature>\n    <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n\
  \    <Feature>Strong long lasting</Feature>\n  </Features>\n</ProductDescription>\n\
  ';\nSET @XMLDoc.modify('delete /Root/ProductDescription/@*')\nSELECT @XMLDoc;\n\
  ```\n\n清单 5-14. 删除 `ProductDescription` 元素的所有属性\n\n结果如图 5-10 所示。\n\n![A435478_1_En_5_Fig10_HTML.jpg](img/A435478_1_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10. `<ProductDescription>` 元素所有属性被删除后的结果展示\n\n## 5-10. 删除 XML 元素\n\n### 问题\n\
  \n你想从 XML 实例中删除一个元素。\n\n### 解决方案\n\n从 XML 实例中移除元素的机制与移除属性非常相似。从示例 XML 中删除`Color`元素的解决方案在清单\
  \ 5-15 中演示。\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription\
  \ ProductName=\"Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n\
  \    <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n    <Feature>Strong\
  \ long lasting</Feature>\n  </Features>\n</ProductDescription>\n';\nSET @XMLDoc.modify('delete\
  \ /Root/ProductDescription/Features/Color')\nSELECT @XMLDoc;\n```\n\n清单 5-15. 从\
  \ XML 实例中删除 `Color` 元素\n\n结果如图 5-11 所示。\n\n![A435478_1_En_5_Fig11_HTML.jpg](img/A435478_1_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11. 从 XML 实例中删除 `Color` 元素后的结果\n\n### 工作原理\n\n要从 XML 实例中删除元素，`modify()`方法指定`delete`语句和指向目标元素的\
  \ XPath 路径。当 XML 中有多个同名元素时，删除特定元素需要单例，例如：\n\n```\n<Color>Aluminium</Color>\n<Color>Silver</Color>\n\
  <Color>Blue</Color>\n<Feature>Strong long lasting</Feature>\nmodify('delete /Root/ProductDescription/Features/Color[1]')\n\
  ```\n\n删除后的结果是`<Color>Silver</Color>`消失，`<Color>Blue</Color>`保留。\n\n要从父元素中删除所有子元素，XPath\
  \ 应指向父元素加上`/*`，如清单 5-16 所示。\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription\
  \ ProductName=\"Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n\
  \    <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n    <Feature>Strong\
  \ long lasting</Feature>\n  </Features>\n</ProductDescription>\n';\nSET @XMLDoc.modify('delete\
  \ /Root/ProductDescription/Features/*')\nSELECT @XMLDoc;\n```\n\n清单 5-16. 从 `Features`\
  \ 元素中删除所有子元素\n\n结果如图 5-12 所示。\n\n![A435478_1_En_5_Fig12_HTML.jpg](img/A435478_1_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12. `Features` 元素所有子元素被删除后的 XML 结果\n\n要删除注释、处理指令，甚至是元素内的文本，你可以将节点测试与`delete`一起使用，如清单\
  \ 5-17 所示。结果如图 5-13 所示。\n\n![A435478_1_En_5_Fig13_HTML.jpg](img/A435478_1_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13. 删除结果展示\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription\
  \ ProductName=\"Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n\
  \    <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n    <Feature>Strong\
  \ long lasting</Feature>\n  </Features>\n</ProductDescription>\n';\nSET @XMLDoc.modify('delete\
  \ (/Root/ProductDescription/Features/comment())[1]');\nSET @XMLDoc.modify('delete\
  \ (/Root/ProductDescription/Features/Color/text())[1]');\nSET @XMLDoc.modify('delete\
  \ (/Root/ProductDescription/Features/processing-instruction())[1]');\nSELECT @XMLDoc;\n\
  ```\n\n清单 5-17. 使用节点测试删除其他类型的 XML 节点\n\n## 总结\n\n`modify()`方法为操作 XML 实例的节点提供了全面的解决方案。这些指令：\n\
  \n*   `insert`\n*   `replace value of`\n*   `delete`\n\n这些指令能够以相对简单的语法修改 XML 实例中的任何元素和属性。\n\
  \n在下一章中，配方将涵盖如何高效地过滤 XML。\n\n\n\n\n"
- '# 6. 过滤 XML


  XQuery 的过滤机制与 T-SQL 的 WHERE 子句相比存在一些差异和特殊规范。根据我的经验，当数据库管理员和开发人员为 XQuery 实现过滤时，通常基于
  T-SQL 策略，或者创建效率低下且可能非常难以维护的动态 SQL，尤其是当过滤器以动态 SQL 形式实现时。本章将通过许多示例来演示如何为 XQuery 请求实现过滤器。


  ## 6-1. 使用 exist( ) 方法


  ### 问题


  你希望判断在 XML 数据中是否存在特定的元素或属性。


  ### 解决方案


  `exist()` 方法允许你判断在 XML 实例中是否存在某个元素或属性。代码清单 6-1 演示了使用 `exist()` 方法来检索所有在根元素 `IndividualSurvey`
  下直接包含 `YearlyIncome` 元素的 XML 实例。


  ```sql

  WITH XMLNAMESPACES

  (

  DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

  )

  SELECT BusinessEntityID,

  Demographics

  FROM Person.Person

  WHERE Demographics.exist(''IndividualSurvey/YearlyIncome'') = 1;

  代码清单 6-1.

  检索包含 YearlyIncome 元素的实例

  ```


  查询结果如图 6-1 所示。


  ![A435478_1_En_6_Fig1_HTML.jpg](img/A435478_1_En_6_Fig1_HTML.jpg)


  图 6-1.


  通过 `YearlyIncome` 元素过滤数据


  ### 工作原理


  `exist()` 方法验证提供的参数是否存在，然后返回：


  *   `TRUE`（位值 `1`），当 XQuery 表达式返回非空结果时。

  *   `FALSE`（位值 `0`），当 XQuery 表达式返回空结果时。

  *   `NULL`，当 XQuery 表达式传入的是 `NULL` 或 XML 实例是 `NULL` 时。


  因此，要检测 XML 实例中是否包含 `YearlyIncome` 元素，`exist()` 方法接受一个 XQuery 表达式，该表达式应用于 XML 实例时会返回一个或多个
  `YearlyIncome` 元素。代码清单 6-2 中的 XML 是代码清单 6-1 中查询所针对的示例 XML 数据。


  ```xml

  -16.01

  2003-09-01Z

  1961-02-23Z

  M

  25001-50000

  M


  Graduate Degree

  Clerical


  0-1 Miles


  代码清单 6-2.

  示例 XML 数据

  ```


  代码清单 6-2 中的 XML 结构相对简单。根元素是 `IndividualSurvey`，它最多可以包含 13 个子元素。


  要查询此 XML 并返回所有 XML 实例包含 `YearlyIncome` 元素的行，我们需要引用 XML 命名空间。在提供的解决方案中，为简单起见，XML
  命名空间被设置为 `DEFAULT`，如下所示：


  ```sql

  WITH XMLNAMESPACES(DEFAULT

  ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'')

  ```


  在 `WHERE` 子句中，`exist()` 方法接受一个指向我们目标元素的 XQuery 表达式。当 XQuery 表达式返回非空结果时，`exist()`
  方法将返回 `TRUE`：


  ```sql

  WHERE Demographics.exist(''IndividualSurvey/YearlyIncome'') = 1

  ```


  当 `YearlyIncome` 元素存在于 XML 实例中时，`exist()` 方法返回值 `1`（代表 `TRUE` 的数值），该行便会包含在结果集中。


  检测属性的机制类似，只是 XQuery 语法上有一些细微差别以匹配属性。来自 `Demographics` 列的 XML 数据不包含属性。示例 6-2 展示了当
  `YearlyIncome` 元素具有 `currency` 属性时的情况。


  ```sql

  DECLARE @survey XML = N''


  -16.01

  2003-09-01Z

  1961-02-23Z

  M

  25001-50000

  M


  Graduate Degree

  Clerical


  0-1 Miles

  示例 6-2.

  展示带有 currency 属性的 YearlyIncome 元素


  </IndividualSurvey>'';

  ```


  在这种特定情况下，解决方案将如代码清单 6-3 所示。


  ```sql

  WITH XMLNAMESPACES

  (

  DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

  )

  SELECT @survey,

  CASE WHEN @survey.exist(''IndividualSurvey/YearlyIncome/@currency'') = 1 THEN N''IndividualSurvey/YearlyIncome/@currency
  attribute is present.''

  ELSE N''currency attribute is NOT present.''

  END AS hasCurrency;

  代码清单 6-3.

  搜索 @currency 属性

  ```


  如示例所示，要检测属性，你需要提供指向该属性的 XPath。


  ## 6-2. 使用 exist( ) 方法过滤 XML 值


  ### 问题


  你希望根据值来过滤 XML 列，但查询不实现 XQuery 方法，例如 `nodes()`、`value()` 和 `query()`。


  ### 解决方案


  `exist()` 方法可以提供针对 XML 文本节点的过滤，特别是在需要检查 XML 实例以满足特定搜索条件时。同时，`SELECT` 子句不包含任何 XQuery
  处理。代码清单 6-4 检索所有 `TotalPurchaseYTD` 元素值大于 `9,000` 的 XML 实例。


  ```sql

  WITH XMLNAMESPACES

  (

  DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

  )

  SELECT BusinessEntityID,

  Demographics

  FROM Person.Person

  WHERE Demographics.exist(''IndividualSurvey[TotalPurchaseYTD > 9000]'') = 1;

  代码清单 6-4.

  使用 XQuery 根据值过滤 XML 实例

  ```


  图 6-2 展示了查询结果。


  ![A435478_1_En_6_Fig2_HTML.jpg](img/A435478_1_En_6_Fig2_HTML.jpg)


  图 6-2.


  返回 `TotalPurchaceYTD` 大于 `9000.00` 的行




  ### 工作原理


  除了检测 XML 元素和属性（如 Recipe 6-1 所述）之外，`exist()` 方法还可以根据实例值高效地过滤 XML。当查询从表中返回列，并且 XML
  实例不是分解过程的必需部分，但同时需要根据 XML 值过滤表中的行时，可以使用 `exist()` 方法作为过滤机制，基于搜索条件返回行。


  与 Recipe 6-1 中演示的区别在于，`exist()` 方法有一个针对 `TotalPurchaseYTD` 元素值的过滤条件，而不是检查元素是否存在，例如：


  ```xquery

  Demographics.exist(''IndividualSurvey[TotalPurchaseYTD > 9000]'')

  ```


  将 XML 实例的过滤器与 T-SQL 的 `WHERE` 子句进行比较时，存在一些差异。XML 过滤器为 `exist()` 方法指定了一个用方括号（`[`，`]`）括起来的布尔表达式（`nodes()`
  方法的过滤器将在本章后面演示）。解决方案演示了过滤以返回 `TotalPurchaseYTD` 值大于 $9000.00 的行。`exist()` 方法的过滤器参数包含以下组件：


  1.  父元素 `IndividualSurvey`

  2.  左方括号

  3.  带有比较运算符和值的子元素 `TotalPurchaseYTD`

  4.  右方括号


  将它们组合在一起，我们的 XQuery 过滤器具有以下语法：


  ```xquery

  IndividualSurvey[TotalPurchaseYTD > 9000]

  ```


  > **注意**

  > 应用过滤器时，路径中的步骤是隐含的。例如，实际的步骤应该是：`IndividualSurvey/.[TotalPurchaseYTD > 9000]`。但当应用过滤器时，步骤被隐含：`IndividualSurvey[TotalPurchaseYTD
  > 9000]`。


  XML 比较运算符列于表 6-1 中。


  **表 6-1. XML 比较运算符演示**


  | 运算符 | 值 | 描述 |

  | :--- | :--- | :--- |

  | `=` | `eq` | 等于 |

  | `!=` | `ne` | 不等于 |

  | `>` | `gt` | 大于 |

  | `<` | `lt` | 小于 |

  | `>=` | `ge` | 大于等于 |

  | `<=` | `le` | 小于等于 |

  | `<<` | `N/A` | 节点顺序在前比较 |

  | `>>` | `N/A` | 节点顺序在后比较 |

  | `is` | `N/A` | 节点标识相等 |


  “文档顺序”是 XML 的一个核心概念。它是节点顺序比较的基础。XQuery 节点顺序比较运算符 `<<`、`>>` 和 `is` 对于读者来说可能是新的，因为在
  T-SQL 中没有等效的运算符。在 XQuery 中，`is` 比较运算符检查节点标识相等；也就是说，它告诉你运算符两侧的两个节点是否是同一个节点。节点运算符
  `<<`（在前）和 `>>`（在后）基于文档顺序比较 XML 节点。如果 `<<` 运算符左侧的节点在文档顺序上先于右侧的节点，则返回 `true`。如果 `>>`
  运算符左侧的节点在文档顺序上跟随右侧的节点，则返回 `true`。清单 6-5 比较了 `<Education>` 的第一个实例与 `<Occupation>`
  元素节点位置，返回 `true`，因为在文档顺序上 `<Education>` 元素出现在 `<Occupation>` 元素之前。


  ```xquery

  WITH XMLNAMESPACES

  (

  DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

  )

  SELECT BusinessEntityID,

  Demographics.value(''(/IndividualSurvey/Education)[1]'', ''NVARCHAR(50)'') AS Education,

  Demographics.value(''(/IndividualSurvey/Occupation)[1]'', ''NVARCHAR(50)'') AS Occupation,

  Demographics.value(''(/IndividualSurvey/Education)[1] << (/IndividualSurvey/Occupation)[1]'',
  ''NVARCHAR(10)'') AS Precedes

  FROM Person.Person

  WHERE Demographics IS NOT NULL;

  ```


  XML 过滤不支持数据类型之间的隐式转换，如果尝试比较两个不兼容的值，则会返回错误。例如，`TotalPurchaseYTD` 元素期望一个 `xs:decimal`
  类型，但值被实现为 `xs:string` 类型。在这种情况下，SQL Server 会抛出错误，清单 6-6 触发了错误消息。


  **图 6-3. 显示错误消息**

  ![A435478_1_En_6_Fig3_HTML.jpg](img/A435478_1_En_6_Fig3_HTML.jpg)


  ```xquery

  WITH XMLNAMESPACES

  (

  DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

  )

  SELECT BusinessEntityID,

  Demographics

  FROM Person.Person

  WHERE Demographics.exist(''IndividualSurvey[TotalPurchaseYTD > "9000"]'') = 1;

  ```


  **清单 6-6. 引发类型转换错误**


  字符串类型值需要用双引号括起来，数字类型值则不需要。日期、时间和日期时间类型是例外，XML 过滤器直接处理转换，如清单 6-7 所示。


  ```xquery

  WITH XMLNAMESPACES

  (

  DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

  )

  SELECT BusinessEntityID,

  Demographics

  FROM Person.Person

  WHERE Demographics.exist

  (''IndividualSurvey[DateFirstPurchase=xs:date("2002-06-28Z")]'') = 1;

  ```


  **清单 6-7. 使用日期类型过滤**


  结果如图 6-4 所示。


  **图 6-4. 按日期过滤 XML 实例的结果**

  ![A435478_1_En_6_Fig4_HTML.jpg](img/A435478_1_En_6_Fig4_HTML.jpg)


  XQuery 支持以下日期和时间转换函数：


  *   `xs:date()` 用于日期类型

  *   `xs:time()` 用于时间类型

  *   `xs:dateTime()` 用于日期时间类型


  `DateFirstPurchase` 元素值是“2002-06-28Z”，其中“Z”是零子午线，即 Z 说明符（“Z”实际上表示 UTC 偏移量 +00:00）。对于过滤值，“Z”是可选的，因此，`xs:date("2002-06-28")`
  和 `xs:date("2002-06-28Z")` 将返回相同的结果。


  '
- "# 6-3. 在 XML 实例中任何位置查找所有 XML 元素的出现\n\n### 问题\n\n您想要定位 XML 元素的所有出现，无论它在 XML 实例中的哪个位置。\n\
  \n### 解决方案\n\n在 XQuery 路径表达式中的步骤前放置双斜杠 `//`（`/descendant-or-self::node()/` 的简写），为您提供了一个快捷步骤运算符，以检索当前上下文节点及其所有后代节点。当它出现在\
  \ XQuery 路径表达式的开头时，它会检索 XML 数据中的所有节点。您可以在 `node()` 方法中使用此方法，以避免显式指定对目标元素的完整引用，如清单\
  \ 6-8 所示。\n\n```xquery\nWITH XMLNAMESPACES\n(\nN'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/Resume'\
  \ AS ns\n)\nSELECT\nInfo.value(N'(/ns:Resume/ns:Name/ns:Name.First)[1]', 'NVARCHAR(30)')\
  \ AS FirstName,\nInfo.value(N'(/ns:Resume/ns:Name/ns:Name.Last)[1]', 'NVARCHAR(30)')\
  \ AS LastName,\nInfo.value('fn:string(../../../../ns:Address[1]/ns:Addr.Location[1]/ns:Location[1]/ns:Loc.CountryRegion[1])',\
  \ 'NVARCHAR(100)') AS Country,\nInfo.value('fn:string(../ns:Tel.Type[1])', 'NVARCHAR(15)')\
  \ AS PhoneType,\nInfo.value('fn:string(../ns:Tel.AreaCode[1])', 'NVARCHAR(9)') AS\
  \ AreaCode,\nInfo.value('fn:string(.)', 'NVARCHAR(20)') AS CandidatePhone\nFROM\
  \ HumanResources.JobCandidate\nCROSS APPLY Resume.nodes('//ns:Tel.Number') AS Person(Info);\n\
  ```\n\n**清单 6-8. 通过存储过程插入新行**\n\n查询结果如图 6-5 所示。\n\n**图 6-5. 显示 SQL 结果**\n![A435478_1_En_6_Fig5_HTML.jpg](img/A435478_1_En_6_Fig5_HTML.jpg)\n\
  \n\n\n### 工作原理\n\nSQL Server XQuery 可以通过在 `nodes()` 方法中为源元素添加前导双斜杠来缩短对源元素的引用，例如\
  \ `Resume.nodes(‘//ns:Tel.Number’)`。这里 “//” 是 XQuery 路径步骤 “`descendant-or-self::node()`”\
  \ 的快捷方式。当搜索 `nodes()` 方法所操作的 XML 数据中包含的所有元素时，XQuery 引擎会使用这种方式。\n\n`Tel.Number` 元素（作为\
  \ `HumanResources.JobCandidate` 表的 `Resume` 列的一部分）的层级结构如图 6-6 所示。\n\n![A435478_1_En_6_Fig6_HTML.jpg](img/A435478_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6. 展示 Tel.Number 元素层级\n\n`nodes()` 方法针对 `Tel.Number` 元素的完全限定 XQuery 路径表达式在代码清单\
  \ 6-9 中演示。\n\n```\nWITH XMLNAMESPACES\n(\nN'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/Resume'\
  \ AS ns\n)\nSELECT\n.\n.\n.\nFROM HumanResources.JobCandidate\nCROSS APPLY Resume.nodes\n\
  ('/ns:Resume/ns:Address/ns:Addr.Telephone/ns:Telephone/ns:Tel.Number')\nAS Person(Info);\n\
  ```\n\n代码清单 6-9. 演示对 Tel.Number 元素的完全限定引用\n\n注意\n\n显然，“`//`” 轴操作符提供了一种设置对深层子元素引用的便捷方式。然而，在最终决定之前应对此技术进行彻底测试，因为它可能在\
  \ XML 分解（shredding）过程中导致性能问题。第 7 章将提供有关 `nodes()` 方法性能优化的更多细节。\n\n## 6-4. 通过单值过滤\n\
  \n### 问题\n\n在分解 XML 实例时，你需要设置一个单值过滤器。\n\n### 解决方案\n\n在 `nodes()` 方法中设置过滤器，如代码清单\
  \ 6-10 所示。结果如图 6-7 所示。\n\n![A435478_1_En_6_Fig7_HTML.jpg](img/A435478_1_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7. 过滤后的 XQuery 查询结果\n\n```\nWITH XMLNAMESPACES\n(\nDEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'\n\
  )\nSELECT BusinessEntityID,\nref.value('TotalPurchaseYTD', 'MONEY') AS TotalPurchase,\n\
  ref.value('DateFirstPurchase', 'DATE') AS DateFirstPurchase,\nref.value('YearlyIncome',\
  \ 'NVARCHAR(20)') AS YearlyIncome,\nref.value('Occupation', 'NVARCHAR(15)') AS Occupation,\n\
  ref.value('CommuteDistance', 'NVARCHAR(15)') AS CommuteDistance\nFROM Person.Person\
  \ CROSS APPLY\nDemographics.nodes('IndividualSurvey[TotalPurchaseYTD > 9000]') AS\
  \ dmg(ref);\n```\n\n代码清单 6-10. 在 nodes() 方法中设置单值过滤器\n\n### 工作原理\n\nXQuery 语言支持在\
  \ `nodes()` 方法内部进行过滤。XQuery 过滤器的语法与 T-SQL 的 `WHERE` 子句非常相似，但不完全相同。表 6-1 列出了所有用于\
  \ XQuery 过滤器的比较运算符（请参阅“工作原理”部分中的食谱 6-2）。它们基本相同，只有一个小区别：不等于运算符，XQuery 仅实现 “!=” 作为选项。另一方面，T-SQL\
  \ 为 DBA 和开发人员在 “!=” 和 “<>” 运算符之间提供了选择（T-SQL 的最佳实践是使用 “<>” 运算符）。\n\n要在 `nodes()`\
  \ 方法中设置单值过滤器，你需要：\n\n1.  父元素 `IndividualSurvey`\n2.  开括号 `[`\n3.  带有比较运算符和要比较值的子元素\
  \ `TotalPurchaseYTD`\n4.  闭括号 `]`\n\n实际上，所有步骤与食谱 6-2 中为 `exist()` 方法演示的步骤相同。例如，两者的过滤器部分都是：\n\
  \n```\nIndividualSurvey[TotalPurchaseYTD > 9000]\n```\n\n然而，`exist()` 方法的性能比 `nodes()`\
  \ 方法稍好。由于这两种方法服务于完全不同的功能，`exist()` 方法用于过滤，而 `nodes()` 用于分解。\n\n## 6-5. 通过 T-SQL\
  \ 变量过滤 XML\n\n### 问题\n\n你希望基于 T-SQL 变量值过滤 XML 结果。\n\n### 解决方案\n\nSQL Server XQuery\
  \ 函数 `sql:variable()` 允许你的 XQuery 查询表达式访问 T-SQL 变量或参数的值，以便将其包含在搜索条件中。`sql:variable()`\
  \ 函数的最佳实现和演示是存储过程，如代码清单 6-11 所示。\n\n```\nCREATE PROCEDURE dbo.usp_DemographicsByYearlyIncome\n\
  @YearlyIncome NVARCHAR(20)\nAS\nBEGIN\nWITH XMLNAMESPACES\n(\nDEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'\n\
  )\nSELECT BusinessEntityID,\nref.value('TotalPurchaseYTD', 'MONEY') AS TotalPurchase,\n\
  ref.value('DateFirstPurchase', 'DATE') AS DateFirstPurchase,\nref.value('YearlyIncome',\
  \ 'NVARCHAR(20)') AS YearlyIncome,\nref.value('Occupation', 'NVARCHAR(15)') AS Occupation,\n\
  ref.value('CommuteDistance', 'NVARCHAR(15)') AS CommuteDistance\nFROM Person.Person\n\
  CROSS APPLY Demographics.nodes('IndividualSurvey[YearlyIncome=sql:variable(\"@YearlyIncome\"\
  )]') AS dmg(ref);\nEND;\nGO\n```\n\n代码清单 6-11. 使用 sql:variable() 函数创建存储过程\n\n###\
  \ 工作原理\n\nXQuery 具有 `sql:variable()` 函数，该函数允许你在不显式指定搜索条件的情况下过滤 XQuery。`sql:variable()`\
  \ 函数将 T-SQL 声明的变量或存储过程参数渲染并映射到 XQuery。`sql:variable()` 函数可以是 `nodes()` 和 `exist()`\
  \ 方法的一部分，以提供过滤功能。\n\n实现 `sql:variable()` 函数以过滤 XML 元素的语法如下：\n\n```\nparentElement[childElement\
  \ comparisonOperator sql:variable(“@varible”)]\n```\n\n实现 `sql:variable()` 函数以过滤\
  \ XML 属性的语法如下：\n\n```\nparentElement[@attribute comparisonOperator sql:variable(“@varible”)]\n\
  ```\n\n代码清单 6-12 演示了使用不同参数值多次执行 `usp_DemographicsByYearlyIncome` 存储过程。\n\n```\n\
  EXECUTE dbo.usp_DemographicsByYearlyIncome '0-25000';\nGO\nEXECUTE dbo.usp_DemographicsByYearlyIncome\
  \ '25001-50000';\nGO\nEXECUTE dbo.usp_DemographicsByYearlyIncome '50001-75000';\n\
  GO\nEXECUTE dbo.usp_DemographicsByYearlyIncome '75001-100000';\nGO\nEXECUTE dbo.usp_DemographicsByYearlyIncome\
  \ 'greater than 100000';\nGO\n```\n\n代码清单 6-12. 调用 usp_DemographicsByYearlyIncome\
  \ 存储过程\n\n使用参数值 '0-25000' 执行存储过程的结果如图 6-8 所示。\n\n![A435478_1_En_6_Fig8_HTML.jpg](img/A435478_1_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8. 显示存储过程结果\n\n注意\n\n`sql:variable( )` 函数是 XQuery 的一部分；因此，该函数区分大小写，并且必须仅以小写形式引用。任何其他大小写的实现都将触发错误：Msg\
  \ 2395, … There is no function ‘{urn:schemas-microsoft-com:xml-sql}:Variable( )’。但是，传递给\
  \ `sql:variable( )` 函数的变量名不区分大小写。\n\n## 6-6. 与值序列进行比较\n\n### 问题\n\n你需要通过值列表过滤 XML\
  \ 实例，类似于 T-SQL `WHERE` 子句中的 `IN` 谓词。\n\n\n### 解决方案\n\n清单 6-13 演示了如何在 XML 实例中，通过针对一个值序列使用“=`”通用比较运算符来模拟\
  \ `IN` 谓词。\n\n```sql\nWITH XMLNAMESPACES\n(\nDEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'\n\
  )\nSELECT BusinessEntityID,\nref.value('TotalPurchaseYTD', 'MONEY') AS TotalPurchase,\n\
  ref.value('DateFirstPurchase', 'DATE') AS DateFirstPurchase,\nref.value('YearlyIncome',\
  \ 'NVARCHAR(20)') AS YearlyIncome,\nref.value('Occupation', 'NVARCHAR(15)') AS Occupation,\n\
  ref.value('CommuteDistance', 'NVARCHAR(15)') AS CommuteDistance\nFROM Person.Person\n\
  CROSS APPLY Demographics.nodes('IndividualSurvey[Occupation=(\"Clerical\",\"Manual\"\
  , \"Professional\")]') AS dmg(ref);\n```\n\n清单 6-13. 发送值列表以筛选 XML 实例\n\n查询结果如图 6-9\
  \ 所示。\n\n![A435478_1_En_6_Fig9_HTML.jpg](img/A435478_1_En_6_Fig9_HTML.jpg)\n\n图\
  \ 6-9. 显示经值列表处理后的 XQuery 结果\n\n### 工作原理\n\n通过值序列筛选 XML 实例的机制相对简单，但并不直观。DBA 和开发人员最常犯的错误是试图采用\
  \ T-SQL 中的 `IN` 谓词来定义此筛选器。然而，解决方案要简单得多。在 `nodes()` 方法中列出值的语法是：\n\n```xquery\nparentElement[childElement\
  \ = (value1, value2, value3,...)]\n```\n\n当通过值列表筛选数据时，T-SQL 与 XQuery 的区别在于：XQuery\
  \ 语法使用等于通用比较运算符 (`=`)，而 T-SQL 中的 `IN` 谓词则使用 `WHERE` 子句。\n\n## 6-7. 匹配指定的字符串模式\n\n\
  ### 问题\n\n你想根据字符串模式筛选 XML 实例。\n\n### 解决方案\n\nXQuery `fn:contains()` 函数可匹配 XML 元素或属性中的字符串模式，如清单\
  \ 6-14 所示。\n\n```sql\nWITH XMLNAMESPACES\n(\nDEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'\n\
  )\nSELECT BusinessEntityID,\nDemographics,\nref.value('TotalPurchaseYTD', 'MONEY')\
  \ AS TotalPurchase,\nref.value('DateFirstPurchase', 'DATE') AS DateFirstPurchase,\n\
  ref.value('YearlyIncome', 'NVARCHAR(20)') AS YearlyIncome,\nref.value('Occupation',\
  \ 'NVARCHAR(15)') AS Occupation,\nref.value('CommuteDistance', 'NVARCHAR(15)') AS\
  \ CommuteDistance\nFROM Person.Person\nCROSS APPLY Demographics.nodes('IndividualSurvey[\
  \ ( fn:contains(Occupation[1], \"Manual\" ) ) ]') AS dmg(ref);\n```\n\n清单 6-14.\
  \ 在 Occupation 元素中搜索字符串 “Manual”\n\n图 6-10 展示了结果。\n\n![A435478_1_En_6_Fig10_HTML.jpg](img/A435478_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10. 显示 IndividualSurvey 元素匹配值模式的 XQuery 查询结果\n\n### 工作原理\n\nXQuery `contains()`\
  \ 函数有两个参数：\n1. 一个 XML 实例元素或属性\n2. 一个字符串模式\n\n`contains()` 函数返回一个 `xs:boolean` 数据类型\
  \ (`true`, `false`)，具体取决于参数 1 中的元素或属性值是否匹配参数 2 中的字符串模式。当参数被通配符包围时（例如：`'%ARGUMENT%'`，即匹配任何出现情况），`contains()`\
  \ 函数机制与 T-SQL `LIKE` 运算符类似。\n\n不幸的是，SQL Server 不支持 XQuery 函数 `fn:starts-with()`\
  \ 和 `fn:ends-with()`。然而，当你的任务需要使用类似 `fn:starts-with()` 或 `fn:ends-with()` 的功能来筛选值时，你可以使用\
  \ XQuery 和 T-SQL 混合解决方案来完成此任务，如清单 6-15 所示。\n\n```sql\nWITH XMLNAMESPACES\n(\nDEFAULT\
  \ N'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'\n\
  ),\nSubset AS\n(\nSELECT BusinessEntityID,\nref.value('TotalPurchaseYTD', 'MONEY')\
  \ AS TotalPurchase,\nref.value('DateFirstPurchase', 'DATE') AS DateFirstPurchase,\n\
  ref.value('YearlyIncome', 'NVARCHAR(20)') AS YearlyIncome,\nref.value('Occupation',\
  \ 'NVARCHAR(15)') AS Occupation,\nref.value('CommuteDistance', 'NVARCHAR(15)') AS\
  \ CommuteDistance\nFROM Person.Person\nCROSS APPLY Demographics.nodes('IndividualSurvey[\
  \ fn:contains(Occupation[1], \"Manual\" ) ]') AS dmg(ref)\n)\nSELECT BusinessEntityID,\n\
  TotalPurchase,\nDateFirstPurchase,\nYearlyIncome,\nOccupation,\nCommuteDistance\n\
  FROM Subset\nWHERE Occupation LIKE 'Manual%';\n```\n\n清单 6-15. 使用 `fn:contains()`\
  \ XQuery 和 T-SQL 混合解决方案筛选 XML 实例\n\n图 6-11 展示了结果。\n\n![A435478_1_En_6_Fig11_HTML.jpg](img/A435478_1_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11. 显示 XQuery 和 T-SQL 混合解决方案的结果\n\n## 6-8. 筛选值范围\n\n### 问题\n\n你想根据值范围筛选 XML\
  \ 实例，类似于 T-SQL 的 `BETWEEN` 运算符。\n\n### 解决方案\n\nXQuery 逻辑 `and` 运算符可用于连接两个谓词，为 XML\
  \ 实例定义范围筛选器，如清单 6-16 所示。\n\n```sql\nWITH XMLNAMESPACES\n(\nDEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'\n\
  )\nSELECT BusinessEntityID,\nref.value('TotalPurchaseYTD', 'MONEY') TotalPurchase,\n\
  ref.value('DateFirstPurchase', 'DATE') DateFirstPurchase,\nref.value('YearlyIncome',\
  \ 'NVARCHAR(20)') YearlyIncome,\nref.value('Occupation', 'NVARCHAR(15)') Occupation,\n\
  ref.value('CommuteDistance', 'NVARCHAR(15)') CommuteDistance\nFROM Person.Person\n\
  CROSS APPLY Demographics.nodes('IndividualSurvey[ TotalPurchaseYTD >= 1000 and TotalPurchaseYTD\
  \ <= 2000 ]') AS dmg(ref);\n```\n\n清单 6-16. 实现值范围筛选器\n\n结果如图 6-12 所示。\n\n![A435478_1_En_6_Fig12_HTML.jpg](img/A435478_1_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12. 显示应用值范围筛选条件的 XQuery 结果\n\n### 工作原理\n\n为 XQuery 设置值范围筛选器所使用的实现方法，与使用 T-SQL\
  \ `WHERE` 子句的方法类似。T-SQL 有 `BETWEEN` 运算符作为值范围筛选的额外选项。然而，XQuery 筛选器 `“elementName\
  \ >= value and elementName <= value”` 实现了与 `BETWEEN` 运算符相同的功能。因此，清单 6-16 中的解决方案展示了\
  \ XQuery 的值范围筛选器，例如：`‘IndividualSurvey[ TotalPurchaseYTD >= 1000 and TotalPurchaseYTD\
  \ <= 2000 ]’`。\n\n**注意**\nXQuery 中的所有运算符同样区分大小写。为避免错误，请仅使用小写的 `“and”` 和 `“or”` 运算符。\n\
  \n## 6-9. 按多个条件筛选\n\n### 问题\n\n你想根据多个元素、属性或条件筛选 XML 实例。\n\n### 解决方案\n\nXQuery 提供了\
  \ `and` 和 `or` 逻辑运算符来创建复合谓词，从而实现针对 XML 实例的多个筛选条件，如清单 6-17 所示。\n\n```sql\nWITH XMLNAMESPACES\n\
  (\nDEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'\n\
  )\nSELECT BusinessEntityID,\nref.value('TotalPurchaseYTD', 'MONEY') AS TotalPurchase,\n\
  ref.value('DateFirstPurchase', 'DATE') AS DateFirstPurchase,\nref.value('YearlyIncome',\
  \ 'NVARCHAR(20)') AS YearlyIncome,\nref.value('Occupation', 'NVARCHAR(15)') AS Occupation,\n\
  ref.value('CommuteDistance', 'NVARCHAR(15)') AS CommuteDistance\nFROM Person.Person\n\
  CROSS APPLY Demographics.nodes('IndividualSurvey[ TotalPurchaseYTD >= 1001\nand\
  \ TotalPurchaseYTD < 2000\nand DateFirstPurchase >= xs:date(\"2004-07-30Z\") ]'\n\
  ) AS dmg(ref);\n```\n\n清单 6-17. 实现多个筛选条件\n\n结果如图 6-13 所示。\n\n![A435478_1_En_6_Fig13_HTML.jpg](img/A435478_1_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13. 显示应用多个筛选条件的 XQuery 结果\n\n\n### 工作原理\n\n本示例展示了清单 6-17 中针对多个元素的 XQuery 过滤器。此示例中的逻辑是筛选满足以下条件的\
  \ XML 实例：\n\n1.  `TotalPurchaseYTD` 值介于 `1001` 和 `1004` 之间，**并且**\n2.  `CommuteDistance`\
  \ 等于 `“0-1 Miles,”` **或者**\n3.  `DateFirstPurchase > “2004-07-30Z.”`\n\n`nodes()`\
  \ 方法实现了四个谓词以满足过滤条件。本示例展示了 `and` 和 `or` 这两个逻辑运算符。解决方案的 XQuery 表达式编写如下：\n\n```xquery\n\
  IndividualSurvey[ TotalPurchaseYTD >= 1001\nand TotalPurchaseYTD <= 1004\nand CommuteDistance\
  \ = \"0-1 Miles\"\nor DateFirstPurchase > xs:date(\"2004-07-30\") ]\n```\n\n通过这种方式，本示例演示了在\
  \ XML 实例中设置多个过滤条件。\n\n注意：出于演示目的，本章选择了 `Person.Person` 表及其包含 19,972 行的 `Demographics`\
  \ 列。然而，`Demographics` 列是以元素为中心的 XML。因此，未提供针对 XML 属性的过滤示例。引用 XML 属性时存在细微差别。当在谓词中引用属性时，其名称前有一个\
  \ `@` 符号。清单 6-17 展示了包含 `TotalPurchaseYTD` 元素 `currency` 属性的 XML 部分。因此，按属性进行过滤的语法为：`nodes(‘IndividualSurvey/YearlyIncome@currency=“$”)’)`。\n\
  \n### 6-10. 设置否定谓词\n\n### 问题\n\n您需要通过设置否定运算符来过滤 XML 实例。例如，T-SQL 的 `NOT IN` 谓词。\n\
  \n### 解决方案\n\nXQuery 的否定函数是 `fn:not()`。当包裹在 XQuery 谓词周围时，`fn:not()` 返回该谓词的**有效布尔值**的相反值。清单\
  \ [6-18 展示了一个使用 `fn:not()` 的例子，同时也展示了通用比较运算符 `!=`，它本身等价于用 `fn:not()` 包裹一个 `=` 谓词。\n\
  \n```sql\nWITH XMLNAMESPACES\n(\nDEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'\n\
  )\nSELECT BusinessEntityID,\nref.value('TotalPurchaseYTD[1]', 'MONEY') AS TotalPurchase,\n\
  ref.value('DateFirstPurchase[1]', 'DATE') AS DateFirstPurchase,\nref.value('YearlyIncome[1]',\
  \ 'NVARCHAR(15)') AS YearlyIncome,\nref.value('Occupation[1]', 'NVARCHAR(15)') AS\
  \ Occupation,\nref.value('CommuteDistance[1]', 'NVARCHAR(15)') AS CommuteDistance\n\
  FROM Person.Person\nCROSS APPLY Demographics.nodes('IndividualSurvey[ YearlyIncome\
  \ != \"0-25000\" and fn:not( Occupation = ( \"Clerical\",\"Manual\",\"Professional\"\
  \ ) ) ]') AS dmg(ref);\n```\n清单 6-18. 演示否定运算符\n\n结果如图 6-14 所示。\n\n![A435478_1_En_6_Fig14_HTML.jpg](img/A435478_1_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14. 显示带有否定谓词的 XQuery 结果\n\n### 工作原理\n\nXQuery 有三种否定运算符：\n\n*   `!=` 用于通用比较的**不等于**运算符\n\
  *   `ne` 用于值比较的**不等于**运算符\n*   `fn:not()` 用于列表和值范围的**函数**\n\n在“解决方案”部分，清单 6-18 同时演示了针对单个值条件和值列表设置否定过滤器，例如：\n\
  \n`IndividualSurvey[YearlyIncome ne \"0-25000\" and fn:not( Occupation = ( “Clerical”,\
  \ “Manual”, “Professional” ) ) ]`\n\n### 6-11. 过滤空值\n\n### 问题\n\n您想根据元素或属性中是否存在值来过滤\
  \ XML 实例。\n\n### 解决方案\n\nXQuery 的 `fn:empty()` 函数用于验证给定的 XML 元素或属性是否有值，如清单 6-19\
  \ 所示。\n\n```sql\nWITH XMLNAMESPACES\n(\nDEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'\n\
  )\nSELECT BusinessEntityID,\nref.value('TotalPurchaseYTD[1]', 'MONEY') AS TotalPurchase,\n\
  ref.value('DateFirstPurchase[1]', 'DATE') AS DateFirstPurchase,\nref.value('YearlyIncome[1]',\
  \ 'NVARCHAR(15)') AS YearlyIncome,\nref.value('Occupation[1]', 'NVARCHAR(15)') AS\
  \ Occupation,\nref.value('CommuteDistance[1]', 'NVARCHAR(15)') AS CommuteDistance\n\
  FROM person.Person\nCROSS APPLY Demographics.nodes('IndividualSurvey[fn:not(fn:empty(Occupation))\n\
  and fn:not( Occupation = ( \"Clerical\", \"Manual\", \"Professional\" ) ) ]') AS\
  \ dmg(ref);\n```\n清单 6-19. 验证值的存在性\n\n结果如图 6-15 所示。\n\n![A435478_1_En_6_Fig15_HTML.jpg](img/A435478_1_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15. 显示实现 `fn:empty()` 函数作为过滤器后的 XQuery 结果\n\n注意：XQuery 函数 `fn:empty( )` 是\
  \ XQuery 中 `exist( )` 方法的替代方案。`nodes( )` 方法不支持 `exist( )` 方法。因此，`fn:empty( )` 和\
  \ `fn:not( )` 在 `nodes( )` 方法中配合良好，其功能类似于 T-SQL 的 `IS NULL` 和 `IS NOT NULL` 运算符。\n\
  \n### 工作原理\n\n`fn:empty()` 函数检查 XML 实例的元素和属性值是否为空。从逻辑上讲，`fn:empty()` 提供了检测 XML 数据中任何空值的功能。“解决方案”部分演示了返回\
  \ `Occupation` 元素有值的行的语法，即该元素不为空。因此，在清单 6-14 中同时使用了 `fn:not()` 和 `fn:empty()`：\n\
  \n```xquery\nIndividualSurvey fn:not( fn:empty( Occupation ) )\n```\n\n如“解决方案”部分所述，`fn:empty()`\
  \ 函数是 `exist()` 方法的替代方案，见清单 [6-20。\n\n```sql\nWITH XMLNAMESPACES\n(\nDEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'\n\
  )\nSELECT BusinessEntityID,\nref.value('TotalPurchaseYTD[1]', 'MONEY') AS TotalPurchase,\n\
  ref.value('DateFirstPurchase[1]', 'DATE') AS DateFirstPurchase,\nref.value('YearlyIncome[1]',\
  \ 'NVARCHAR(15)') AS YearlyIncome,\nref.value('Occupation[1]', 'NVARCHAR(15)') AS\
  \ Occupation,\nref.value('CommuteDistance[1]', 'NVARCHAR(15)') AS CommuteDistance\n\
  FROM Person.Person\nCROSS APPLY Demographics.nodes\n('IndividualSurvey[fn:not( Occupation\
  \ = (\"Clerical\", \"Manual\", \"Professional\" ) ) ]') AS dmg(ref)\nWHERE Demographics.exist('IndividualSurvey/Occupation')\
  \ = 1;\n```\n清单 6-20. 演示 `fn:empty()` 函数的替代方法\n\n结果如图 6-16 所示。\n\n![A435478_1_En_6_Fig16_HTML.jpg](img/A435478_1_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16. 显示使用 `fn:empty()` 函数替代方案后的 XQuery 结果\n\n当使用 T-SQL `SET STATISTICS TIME\
  \ ON;` 选项执行清单 6-19 和 6-20 时，SQL Server 显示 `fn:empty()` 比 `exist()` 方法具有微小的性能优势，如清单\
  \ 6-21 所示。\n\n```sql\n-- fn:empty() 函数\n(7652 行受影响)\nSQL Server 执行时间:\nCPU 时间 =\
  \ 454 ms，经过时间 = 496 ms。\n-- exist() 方法\n(7652 行受影响)\nSQL Server 执行时间:\nCPU 时间 =\
  \ 485 ms，经过时间 = 577 ms。\n```\n清单 6-21. 显示 `fn:empty()` 函数和 `exist()` 方法的执行输出\n\n\
  注意：在您的电脑上输出的性能数据可能不同。\n\n\n\n## 摘要\n\n“过滤 XML”章节演示了如何为 XML 实例实现内部 XQuery 过滤机制。T-SQL\
  \ `WHERE` 子句提供了比 XQuery 内部过滤更全面的过滤机制。然而，正如前面章节所演示的，XQuery 拥有过滤 XML 实例的充足能力。\n\n\
  SQL DBA 和开发人员在过滤 XML 时最常见的误解是，为了简单起见而直接实现 T-SQL `WHERE` 子句。对于处理 XML 实例的过滤过程，这是一种低效的解决方案，因为\
  \ T-SQL `WHERE` 子句在引擎返回结果集时才对 XML 进行过滤，而 XQuery 则直接返回过滤后的值。清单 6-22 比较了 XQuery 和\
  \ `WHERE` 子句两者的执行 CPU 利用率和时间。\n\n```\nSET STATISTICS TIME ON;\nWITH XMLNAMESPACES\n\
  (\nDEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'\n\
  )\nSELECT BusinessEntityID,\nref.value('fn:string(TotalPurchaseYTD[1])', 'MONEY')\
  \ AS TotalPurchase,\nref.value('fn:string(DateFirstPurchase[1])', 'DATE') AS DateFirstPurchase,\n\
  ref.value('fn:string(YearlyIncome[1])', 'NVARCHAR (20)') AS YearlyIncome,\nref.value('fn:string(Occupation[1])',\
  \ 'NVARCHAR(15)') AS Occupation,\nref.value('fn:string(CommuteDistance[1])', 'NVARCHAR(15)')\
  \ AS CommuteDistance\nFROM Person.Person\nCROSS APPLY Demographics.nodes('IndividualSurvey[Occupation=\"\
  Manual\"]') AS dmg(ref);\nWITH XMLNAMESPACES\n(\nDEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'\n\
  )\nSELECT BusinessEntityID,\nref.value('fn:string(TotalPurchaseYTD[1])', 'MONEY')\
  \ AS TotalPurchase,\nref.value('fn:string(DateFirstPurchase[1])', 'DATE') AS DateFirstPurchase,\n\
  ref.value('fn:string(YearlyIncome[1])', 'NVARCHAR(20)') AS YearlyIncome,\nref.value('fn:string(Occupation[1])',\
  \ 'NVARCHAR(15)') AS Occupation,\nref.value('fn:string(CommuteDistance[1])', 'NVARCHAR(15)')\
  \ AS CommuteDistance\nFROM Person.Person\nCROSS APPLY Demographics.nodes('IndividualSurvey')\
  \ AS dmg(ref)\nWHERE ref.value('fn:string(Occupation[1])', 'NVARCHAR(15)') = 'Manual';\n\
  SET STATISTICS TIME OFF ;\n清单 6-22.\n演示执行差异\n```\n\n结果如清单 6-23 所示。\n\n```\n-- XQuery\
  \ nodes() 过滤\n(2384 行受影响)\nSQL Server 执行时间:\nCPU 时间 = 235 ms,  已用时间 = 271 ms.\n\
  -- T-SQL WHERE 子句\n(2384 行受影响)\nSQL Server 执行时间:\nCPU 时间 = 593 ms,  已用时间 = 601 ms.\n\
  清单 6-23.\n显示 XQuery 和 WHERE 子句进程的执行输出:\n```\n\n清单 6-23 中的结果表明，XQuery 的效率比 `WHERE`\
  \ 子句高出一倍多。因此，XQuery 过滤应该是你的首选。\n\n> 注意\n> 在你的个人电脑上，返回的性能数字可能不同。\n\n## 7. 提升 XML\
  \ 性能\n\n性能效率始终是 DBA 和开发人员最关心的问题。索引是提高数据传递过程的首选方法。然而，XML 数据的逻辑树结构无法像普通的关系数据那样进行索引。因此，随着\
  \ SQL Server 2005 的推出，Microsoft 为 XML 数据类型列添加了一种索引机制。XML 数据与表中列的标量数据不同，因此 XML 索引机制提供了专门的主\
  \ XML 索引和辅助 XML 索引。在 SQL Server 2012 中，XML 索引通过选择性 XML 索引进行了增强，这提高了对大型 XML 数据的搜索效率。\n\
  \n### 7-1 创建主 XML 索引\n\n### 问题\n\n你想要改进对 XML 数据类型列的过滤过程。\n\n### 解决方案\n\n添加主 XML\
  \ 索引可以改进对 XML 数据类型列的过滤过程。为了演示，我们将创建一个包含 XML 列的新表，向其中填充数据，然后在其上创建主 XML 索引。清单 7-1\
  \ 演示了如何在新表的 `Demographic` 列上创建主 XML 索引。图 7-1 显示了创建的索引。\n\n![A435478_1_En_7_Fig1_HTML.jpg](img/A435478_1_En_7_Fig1_HTML.jpg)\n\
  图 7-1.\n显示为 PersonXML 表创建的索引\n\n```\n-- 这些设置在创建 XML 索引时很重要\nSET NUMERIC_ROUNDABORT\
  \ OFF;\nSET ARITHABORT ON;\nSET ANSI_NULLS ON;\nSET ANSI_PADDING ON;\nSET ANSI_WARNINGS\
  \ ON;\nSET CONCAT_NULL_YIELDS_NULL ON;\nSET QUOTED_IDENTIFIER ON;\nGO\n-- 删除表 (SQL\
  \ Server 2016 语法)\nDROP TABLE IF EXISTS dbo.PersonXML\n-- 创建名为 PersonXML 的表并填充数据\n\
  CREATE TABLE dbo.PersonXML\n(\nPersonID INT NOT NULL,\nFirstName NVARCHAR(30) NOT\
  \ NULL,\nMiddleName NVARCHAR(20)NULL,\nLastName NVARCHAR(30) NOT NULL,\nDemographics\
  \ XML NULL,\nCONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED\n(\nPersonID ASC\n)\n\
  );\nGO\nINSERT dbo.PersonXML\n(\nPersonID,\nFirstName,\nMiddleName,\nLastName,\n\
  Demographics\n)\nSELECT BusinessEntityID,\nFirstName,\nMiddleName,\nLastName,\n\
  Demographics\nFROM Person.Person;\nGO\n-- 现在在 dbo.PersonXML 表上创建主 XML 索引\nCREATE\
  \ PRIMARY XML INDEX IX_PXML_PersonXML_Demographics\nON dbo.PersonXML\n(\nDemographics\n\
  );\nGO\n清单 7-1.\n创建主 XML 索引\n```\n\n\n\n### 工作原理\n\n在我们的示例中，我们创建了一个 `dbo.PersonXML`\
  \ 表来演示 XML 索引的创建和性能。清单 7-2 展示了创建该表并用 AdventureWorks 数据库中 `Person.Person` 表的数据加载它的\
  \ SQL 代码。请注意所示的会话级别设置（通过 `SET` 语句）。在表中创建 XML 列或向 XML 列添加 XML 索引时，这些设置很重要。\n\n```\n\
  -- These settings are important when creating XML indexes\nSET NUMERIC_ROUNDABORT\
  \ OFF;\nSET ARITHABORT ON;\nSET ANSI_NULLS ON;\nSET ANSI_PADDING ON;\nSET ANSI_WARNINGS\
  \ ON;\nSET CONCAT_NULL_YIELDS_NULL ON;\nSET QUOTED_IDENTIFIER ON;\nGO\n-- Drop table\
  \ SQL Server 2016 syntax\nDROP TABLE IF EXISTS dbo.PersonXML\n-- Create and populate\
  \ a table called PersonXML\nCREATE TABLE dbo.PersonXML\n(\nPersonID INT NOT NULL,\n\
  FirstName NVARCHAR(30) NOT NULL,\nMiddleName NVARCHAR(20)NULL,\nLastName NVARCHAR(30)\
  \ NOT NULL,\nDemographics XML NULL,\nCONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED\n\
  (\nPersonID ASC\n)\n);\nGO\n```\n清单 7-2. 创建和填充 PersonXML 表\n\n清单 7-3 展示了一个从 XML\
  \ 列获取结果的 SQL 查询。图 7-2 显示了在创建主 XML 索引之前，此查询 SQL 代码的实际执行计划。\n\n![A435478_1_En_7_Fig2_HTML.jpg](img/A435478_1_En_7_Fig2_HTML.jpg)\n\
  图 7-2. 显示创建主 XML 索引前的执行计划\n\n```\nSELECT PersonID, Demographics\nFROM dbo.PersonXML\n\
  WHERE Demographics.exist('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\nIndividualSurvey[TotalPurchaseYTD > 9000]') = 1;\n```\n清单 7-3. 使用过滤器进行 XQuery\
  \ 采样\n\n查看为 XQuery 创建的执行计划，其有几个不同于典型 T-SQL 查询的步骤：\n\n*   表值函数 `[XML Reader with\
  \ XPath filter]`\n*   表值函数 `[XML Reader]`\n\n这两个步骤分别占总查询成本的最高百分比，92% 和 7%。这些步骤指定了\
  \ XML 运行时拆解机制，非常类似于普通关系 SQL 查询中的表扫描。这意味着，根据 XML 实例的大小，XML 拆解过程在性能方面可能非常耗费资源。图 7-3\
  \ 展示了表值函数 `[XML Reader]` 步骤的属性值。\n\n![A435478_1_En_7_Fig3_HTML.jpg](img/A435478_1_En_7_Fig3_HTML.jpg)\n\
  图 7-3. 显示表值函数 `[XML Reader]` 步骤属性\n\n```\nCREATE PRIMARY XML INDEX IX_PXML_PersonXML_Demographics\n\
  ON dbo.PersonXML\n(\nDemographics\n);\nGO\n```\n清单 7-4. 创建 XML 主索引\n\n一旦创建了主 XML\
  \ 索引，您就可以在 SSMS 上启用实际执行计划后，重新运行清单 7-5（与清单 7-2 相同）中的查询：\n\n```\nSELECT PersonID,\
  \ Demographics\nFROM dbo.PersonXML\nWHERE Demographics.exist('declare default element\
  \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\nIndividualSurvey[TotalPurchaseYTD > 9000]') = 1;\n```\n清单 7-5. 使用主 XML 索引查询 PersonXML\
  \ 表\n\n在得到的执行计划中，表值函数 `[XML Reader with XPath filter]` 步骤和表值函数 `[XML Reader]` 被聚簇索引查找\
  \ `[PrimaryXML]` 步骤所取代。图 7-4 展示了返回的执行计划。\n\n![A435478_1_En_7_Fig4_HTML.jpg](img/A435478_1_En_7_Fig4_HTML.jpg)\n\
  图 7-4. 显示创建主 XML 索引后的执行计划\n\n图 7-5 展示了聚簇索引查找 `[PrimaryXML]` 步骤属性。使用主 XML 索引后，估算运算符成本从表值函数\
  \ `[XML Reader]` 步骤的 35782.9（92%）下降到了聚簇索引查找 `[PrimaryXML]` 步骤的 21.2796（46%）。\n\n\
  ![A435478_1_En_7_Fig5_HTML.jpg](img/A435478_1_En_7_Fig5_HTML.jpg)\n图 7-5. 显示聚簇索引查找\
  \ `[PrimaryXML]` 步骤属性\n\n`CREATE PRIMARY XML INDEX` 语句包含三个部分，用于指定索引名称、在其上创建索引的表以及在其上创建索引的\
  \ XML 列的名称，如下所示：\n\n```\nCREATE PRIMARY XML INDEX \nON \n(  );\n```\n\n创建主 XML 索引时，需要遵循以下规则：\n\
  \n*   包含 XML 列的表必须有一个聚集主键。\n*   当存在主 XML 索引时，不能使用 DDL 语句删除或更改表的聚集主键。在修改主键之前，必须删除所有\
  \ XML 索引。\n*   只能在单个 `XML` 类型列上创建主 XML 索引。\n*   每个 XML 索引必须具有数据库范围内唯一的名称。\n*   创建\
  \ XML 索引时，无法为用户表单独指定文件组或分区信息。\n*   当删除主 XML 索引时，依赖于它的所有辅助 XML 索引都会被自动删除。\n*   为\
  \ XML 索引将 `IGNORE_DUP_KEY` 和 `ONLINE` 选项设置为 `OFF`。\n*   主 XML 索引在名称方面与视图有相同的限制。\n\
  *   只有包含 `XML` 类型列的表才能拥有 XML 索引。视图、具有 `XML` 类型列的表值变量或 `XML` 类型变量不能拥有 XML 索引。\n*\
  \   当将 `XML` 类型列从未类型化更改为类型化 XML 时，不应存在任何 XML 索引。如果表上存在 XML 索引，可以使用 `ALTER TABLE\
  \ ALTER COLUMN` 选项。在更改列类型之前，必须删除 XML 索引。\n*   创建 XML 索引时，必须将以下会话选项设置为 `ON`：`ARITHABORT`、`ANSI_NULLS`、`ANSI_PADDING`、`ANSI_WARNINGS`、`CONCAT_NULL_YIELDS_NULL`、`QUOTED_IDENTIFIER`。\n\
  *   创建 XML 索引时，选项 `NUMERIC_ROUNDABORT` 必须设置为 `OFF`。\n\n主 XML 索引可以显著提高 XQuery 性能。因此，XML\
  \ 索引可以是提高 SQL Server XQuery 性能的一个非常有吸引力的解决方案。然而，XML 索引有几个相关的注意事项。首先，添加主 XML 索引可能会消耗大量的存储空间。当创建\
  \ `PRIMARY XML` 索引时，SQL Server 会将给定列中的 XML 数据拆解为关系格式，只能由查询执行引擎访问。这可能消耗比存储未索引 XML\
  \ 数据所需多一倍以上的存储空间。\n\n在决定是否添加主 XML 索引时，请考虑以下建议：\n\n*   如果 XML 列不是 XQuery 过程的一部分，通常不需要\
  \ XML 索引。\n*   分析您的查询配置文件。如果您需要一次性查询大量行，或者您的 XML 数据量很大，则值得考虑 XML 索引。如果这些条件不适用，那么存储成本可能会超过效率收益。\n\
  *   添加主 XML 索引的一个充分理由是，如果您需要添加辅助 XML 索引以提高特定类别查询的效率（将在接下来的三个部分中讨论）。如果您希望添加辅助 XML\
  \ 索引，则必须先添加主 XML 索引。\n\n## 7-2 创建辅助 PATH 类型索引\n\n### 问题\n\n您想用 `exist()` 方法改进 XML\
  \ 列的过滤。\n\n\n"
- "# 7-3 创建二级 VALUE 类型索引\n\n### 问题\n\n当 XQuery 中使用了通配符或路径未完全指定时，你希望提升 XML 列的查询性能。\n\
  \n### 解决方案\n\n当路径未完全指定或包含通配符时，二级值类型 XML 索引有助于提升 XQuery 性能。清单 7-10 创建了我们在解决方案 7-1\
  \ 和 7-2 中创建的示例表和一级 XML 索引。如果你已创建此表，则无需重新创建。\n\n```sql\n-- 这些设置在创建 XML 索引时很重要\nSET\
  \ NUMERIC_ROUNDABORT OFF;\nSET ARITHABORT ON;\nSET ANSI_NULLS ON;\nSET ANSI_PADDING\
  \ ON;\nSET ANSI_WARNINGS ON;\nSET CONCAT_NULL_YIELDS_NULL ON;\nSET QUOTED_IDENTIFIER\
  \ ON;\nGO\n-- 删除表 SQL Server 2016 语法\nDROP TABLE IF EXISTS dbo.PersonXML\n-- 创建并填充名为\
  \ PersonXML 的表\nCREATE TABLE dbo.PersonXML\n(\nPersonID INT NOT NULL,\nFirstName\
  \ NVARCHAR(30) NOT NULL,\nMiddleName NVARCHAR(20)NULL,\nLastName NVARCHAR(30) NOT\
  \ NULL,\nDemographics XML NULL,\nCONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED\n\
  (\nPersonID ASC\n)\n);\nGO\nINSERT dbo.PersonXML\n(\nPersonID,\nFirstName,\nMiddleName,\n\
  LastName,\nDemographics\n)\nSELECT BusinessEntityID,\nFirstName,\nMiddleName,\n\
  LastName,\nDemographics\nFROM Person.Person;\nGO\n-- 现在在 dbo.PersonXML 表上创建一级 XML\
  \ 索引\nCREATE PRIMARY XML INDEX IX_PXML_PersonXML_Demographics\nON dbo.PersonXML\n\
  (\nDemographics\n);\nGO\n```\n清单 7-10. 创建带 XML 列的示例表和一级 XML 索引\n\n清单 7-11 展示了如何在示例表上创建二级值\
  \ XML 索引，图 7-7 显示了已创建的 XML 索引。\n\n![A435478_1_En_7_Fig7_HTML.jpg](img/A435478_1_En_7_Fig7_HTML.jpg)\n\
  图 7-7. 确认已创建二级值 XML 索引\n\n```sql\nCREATE XML INDEX IX_XMLVALUE_PersonXML_Demographics\n\
  ON dbo.PersonXML\n(\nDemographics\n)\nUSING XML INDEX IX_PXML_PersonXML_Demographics\n\
  FOR VALUE;\n```\n清单 7-11. 创建二级值类型索引\n\n二级路径类型 XML 索引可提升 XML 数据类型 `exist()` 方法的查询性能。清单\
  \ 7-6 创建了与解决方案 7-2 相同的表并对其应用了一级 XML 索引，因为这是此解决方案的两个必要条件。清单 7-7 演示了如何在表上创建二级路径 XML\
  \ 索引。图 7-6 显示了已创建的索引。\n\n```sql\n-- 这些设置在创建 XML 索引时很重要\nSET NUMERIC_ROUNDABORT OFF;\n\
  SET ARITHABORT ON;\nSET ANSI_NULLS ON;\nSET ANSI_PADDING ON;\nSET ANSI_WARNINGS\
  \ ON;\nSET CONCAT_NULL_YIELDS_NULL ON;\nSET QUOTED_IDENTIFIER ON;\nGO\n-- 删除表 SQL\
  \ Server 2016 语法\nDROP TABLE IF EXISTS dbo.PersonXML\n-- 创建并填充名为 PersonXML 的表\n\
  CREATE TABLE dbo.PersonXML\n(\nPersonID INT NOT NULL,\nFirstName NVARCHAR(30) NOT\
  \ NULL,\nMiddleName NVARCHAR(20)NULL,\nLastName NVARCHAR(30) NOT NULL,\nDemographics\
  \ XML NULL,\nCONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED\n(\nPersonID ASC\n)\n\
  );\nGO\nINSERT dbo.PersonXML\n(\nPersonID,\nFirstName,\nMiddleName,\nLastName,\n\
  Demographics\n)\nSELECT BusinessEntityID,\nFirstName,\nMiddleName,\nLastName,\n\
  Demographics\nFROM Person.Person;\nGO\n-- 现在在 dbo.PersonXML 表上创建一级 XML 索引\nCREATE\
  \ PRIMARY XML INDEX IX_PXML_PersonXML_Demographics\nON dbo.PersonXML\n(\nDemographics\n\
  );\nGO\n```\n清单 7-6. 创建带有一级 XML 索引的示例表\n\n`GO` 清单 7-7 向我们先前创建的、带有一级 XML 索引的示例表添加了一个二级路径\
  \ XML 索引。\n\n![A435478_1_En_7_Fig6_HTML.jpg](img/A435478_1_En_7_Fig6_HTML.jpg)\n\
  图 7-6. 显示已创建的二级路径类型 XML 索引\n\n```sql\nCREATE XML INDEX IX_XMLPATH_PersonXML_Demographics\n\
  ON dbo.PersonXML\n(\nDemographics\n)\nUSING XML INDEX IX_PXML_PersonXML_Demographics\n\
  FOR PATH;\n```\n清单 7-7. 创建二级路径 XML 索引\n\n### 工作原理\n\n一级 XML 索引可以提升在 XML 数据类型列上查询的性能。二级\
  \ XML 索引可以在一级 XML 索引的基础上进一步提升查询性能。如果你的查询倾向于在 `WHERE` 子句中指定 `exist()` 方法，那么 `SECONDARY\
  \ PATH` 类型索引可能进一步提升查询速度。清单 7-8 指定了一个查询 XQuery 路径是否存在的查询。\n\n```sql\nSELECT PersonID,\
  \ Demographics\nFROM dbo.PersonXML\nWHERE Demographics.exist('declare default element\
  \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\n/IndividualSurvey/Occupation') = 1;\n```\n清单 7-8. 演示指定查询路径的 SECONDARY PATH 类型索引\n\
  \n清单 7-9 展示了另一个选项，其中同时指定了路径和谓词。\n\n```sql\nSELECT PersonID, Demographics\nFROM dbo.PersonXML\n\
  WHERE Demographics.exist('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\n/IndividualSurvey[TotalPurchaseYTD > 9000]') = 1;\n```\n清单 7-9. 显示同时指定路径和谓词的二级路径类型\
  \ XML 索引。\n\n二级路径类型 XML 索引以及值类型和属性类型的二级索引，都是建立在一级 XML 索引之上的。创建二级路径 XML 索引的 `CREATE\
  \ XML INDEX` 语法包含四个部分：\n\n```sql\nCREATE XML INDEX \nON \n(    )\nUSING XML INDEX\
  \  FOR PATH;\n```\n\n**注意**\n当一级 XML 索引被删除时，所有关联的二级 XML 索引会自动被删除。\n\n\n### 工作原理\n\
  \n次级值类型索引可以在路径未完全指定或包含通配符时提升 XQuery 的效率，例如：\n\n*   `//ELEMENT[ELEMENT = \"Filter\
  \ Condition\"]`\n*   `/ELEMENT/@*[. = \"Filter Condition\"]`\n*   `//ELEMENT[@ATTRIBUTE\
  \ = \"Filter Condition\"]`\n\n实际上，次级值类型索引在谓词筛选条件值已知的情况下能提升查询性能。清单 7-12 展示了 XQuery\
  \ 如何从使用值索引中受益。\n\n```\nSELECT PersonID,\nref.value('declare default element namespace\
  \ \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\nTotalPurchaseYTD[1]', 'money') TotalPurchase,\nref.value('declare default element\
  \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\nDateFirstPurchase[1]', 'date') DateFirstPurchase,\nref.value('declare default\
  \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\nYearlyIncome[1]', 'varchar(20)') YearlyIncome,\nref.value('declare default element\
  \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\nOccupation[1]', 'varchar(15)') Occupation,\nref.value('declare default element\
  \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\nCommuteDistance[1]', 'varchar(15)') CommuteDistance\nFROM PersonXML\nCROSS APPLY\
  \ Demographics.nodes('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\n/*[YearlyIncome=\"50001-75000\"]') dmg(ref);\n清单 7-12.\n展示 XQuery 如何从利用次级值 XML\
  \ 索引中受益\n```\n\n创建次级值类型索引的语法包含四个组成部分：\n\n```\nCREATE XML INDEX \nON \n(    )\nUSING\
  \ XML INDEX  FOR VALUE;\n```\n\n**Caution**\n\n祖辈或自身轴操作符，例如 `XML_Column.nodes('//ELEMENT'`)，是在\
  \ `nodes()` 方法中建立路径引用的便捷方式。然而，对于 XML 实例具有深层嵌套元素的 XML 数据类型列，此技术可能会降低性能。这是 XML 分解过程中最常见的性能问题之一。因此，我建议（在可能的情况下）在\
  \ `nodes()` 方法中提供更详细的路径。例如，`XML_Column.nodes('//ELEMENT/CHILD_ELMNT')` 可以提升你的 XML\
  \ 分解性能。\n\n## 7-4 创建次级属性类型索引\n\n### 问题\n\n你希望提升从列中检索一个或多个值的 XML 列的性能。\n\n### 解决方案\n\
  \n如果你的 XQuery 从 XML 列中检索一个或多个值，次级属性类型 XML 索引会很有帮助。清单 7-13 创建了我们在解决方案 7-1、7-2 和 7-3\
  \ 中使用的演示表，并在其上创建了主 XML 索引。\n\n```\n-- 这些设置在创建 XML 索引时很重要\nSET NUMERIC_ROUNDABORT\
  \ OFF;\nSET ARITHABORT ON;\nSET ANSI_NULLS ON;\nSET ANSI_PADDING ON;\nSET ANSI_WARNINGS\
  \ ON;\nSET CONCAT_NULL_YIELDS_NULL ON;\nSET QUOTED_IDENTIFIER ON;\nGO\n-- 删除表（SQL\
  \ Server 2016 语法）\nDROP TABLE IF EXISTS dbo.PersonXML\n-- 创建并填充一个名为 PersonXML 的表\n\
  CREATE TABLE dbo.PersonXML\n(\nPersonID INT NOT NULL,\nFirstName NVARCHAR(30) NOT\
  \ NULL,\nMiddleName NVARCHAR(20) NULL,\nLastName NVARCHAR(30) NOT NULL,\nDemographics\
  \ XML NULL,\nCONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED\n(\nPersonID ASC\n)\n\
  );\nGO\nINSERT dbo.PersonXML\n(\nPersonID,\nFirstName,\nMiddleName,\nLastName,\n\
  Demographics\n)\nSELECT BusinessEntityID,\nFirstName,\nMiddleName,\nLastName,\n\
  Demographics\nFROM Person.Person;\nGO\n-- 现在在 dbo.PersonXML 表上创建主 XML 索引\nCREATE\
  \ PRIMARY XML INDEX IX_PXML_PersonXML_Demographics\nON dbo.PersonXML\n(\nDemographics\n\
  );\nGO\n清单 7-13.\n创建带 XML 列的示例表及主 XML 索引\n```\n\n清单 7-14 展示了如何创建次级属性 XML 索引。图 7-8\
  \ 展示了已创建的索引。\n\n![A435478_1_En_7_Fig8_HTML.jpg](img/A435478_1_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8.\n\n确认索引已创建\n\n```\nCREATE XML INDEX IX_XMLPROPERTY_PersonXML_Demographics\n\
  ON dbo.PersonXML\n(\nDemographics\n)\nUSING XML INDEX IX_PXML_PersonXML_Demographics\n\
  FOR PROPERTY;\n清单 7-14.\n创建次级属性 XML 索引\n```\n\n### 工作原理\n\n次级属性类型索引可以在通过 `value()`\
  \ 方法检索一个或多个值的 XML 列查询时提供性能优势。清单 7-15 展示了当存在 `PROPERTY` 索引时，使用 XQuery 的优势。\n\n```\n\
  SELECT PersonID,\nref.value('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\nTotalPurchaseYTD[1]', 'money') TotalPurchase,\nref.value('declare default element\
  \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\nDateFirstPurchase[1]', 'date') DateFirstPurchase,\nref.value('declare default\
  \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\nYearlyIncome[1]', 'varchar(20)') YearlyIncome,\nref.value('declare default element\
  \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\nOccupation[1]', 'varchar(15)') Occupation,\nref.value('declare default element\
  \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\nCommuteDistance[1]', 'varchar(15)') CommuteDistance\nFROM PersonXML\nCROSS APPLY\
  \ Demographics.nodes('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
  ;\nIndividualSurvey[TotalPurchaseYTD > 1000 and TotalPurchaseYTD < 1005\nand CommuteDistance\
  \ = \"0-1 Miles\"]') dmg(ref);\n清单 7-15.\n展示当存在 PROPERTY 索引时使用 XQuery 的优势\n```\n\
  \n创建次级属性 XML 索引的语法包含四个组成部分：\n\n```\nCREATE XML INDEX \nON \n(    )\nUSING XML INDEX\
  \  FOR PROPERTY;\n```\n\n## 7-5 创建选择性 XML 索引\n\n### 问题\n\n你希望在存储大型 XML 文档的 XML 列上创建索引，但希望最小化索引的存储空间。\n\
  \n\n### 解决方案\n\n选择性 XML 索引旨在为存储大型 XML 文档的 XML 列提升 XQuery 性能并优化 XML 索引存储。代码清单 7-16\
  \ 创建了一个包含无类型 XML 列的新示例表，使用示例 XML 数据填充它，并为其创建了一个选择性 XML 索引。图 7-9 展示了已创建的索引。\n\n![A435478_1_En_7_Fig9_HTML.jpg](img/A435478_1_En_7_Fig9_HTML.jpg)\n\
  图 7-9. 确认已为 ProductXML 表创建选择性 XML 索引\n\n```sql\n-- 创建包含 XML 列和 XML 索引的表时，这些设置很重要\n\
  SET NUMERIC_ROUNDABORT OFF;\nSET ARITHABORT ON;\nSET ANSI_NULLS ON;\nSET ANSI_PADDING\
  \ ON;\nSET ANSI_WARNINGS ON;\nSET CONCAT_NULL_YIELDS_NULL ON;\nSET QUOTED_IDENTIFIER\
  \ ON;\nGO\n-- 删除表（SQL Server 2016 语法）\nDROP TABLE IF EXISTS dbo.ProductXML\n-- 创建包含\
  \ XML 列的演示表\nCREATE TABLE dbo.ProductXML\n(\nProductID INT NOT NULL,\nName NVARCHAR(50)\
  \ NOT NULL,\nProductNumber NVARCHAR(25) NOT NULL,\nProductDetails XML NULL\nCONSTRAINT\
  \ PK_ProductXML_ProductID PRIMARY KEY CLUSTERED\n(\nProductID ASC\n)\n);\nGO\n--\
  \ 使用示例 XML 数据填充表\nINSERT INTO dbo.ProductXML\n(\nProductID,\nName,\nProductNumber,\n\
  ProductDetails\n)\nSELECT Product2.ProductId,\nProduct2.Name,\nProduct2.ProductNumber,\n\
  (\nSELECT ProductCategory.Name AS \"Category/CategoryName\",\n(\nSELECT DISTINCT\
  \ Location.Name \"text()\", ', 成本率 $',\nLocation.CostRate \"text()\"\nFROM Production.ProductInventory\
  \ Inventory\nINNER JOIN Production.Location Location\nON Inventory.LocationID =\
  \ Location.LocationID\nWHERE Product.ProductID = Inventory.ProductID\nFOR XML PATH('LocationName'),\
  \ TYPE\n) AS \"Locations/node()\",\nSubcategory.Name AS \"Category/Subcategory/SubcategoryName\"\
  ,\nProduct.Name AS \"Category/Subcategory/Product/ProductName\",\nProduct.Color\
  \ AS \"Category/Subcategory/Product/Color\",\nInventory.Shelf AS \"Category/Subcategory/Product/ProductLocation/Shelf\"\
  ,\nInventory.Bin AS \"Category/Subcategory/Product/ProductLocation/Bin\",\nInventory.Quantity\
  \ AS \"Category/Subcategory/Product/ProductLocation/Quantity\"\nFROM Production.Product\
  \ Product\nLEFT JOIN Production.ProductInventory Inventory\nON Product.ProductID\
  \ = Inventory.ProductID\nLEFT JOIN Production.ProductSubcategory Subcategory\nON\
  \ Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\nLEFT JOIN Production.ProductCategory\n\
  ON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
  WHERE Product.ProductID = Product2.ProductId\nORDER BY ProductCategory.Name, Subcategory.Name,\
  \ Product.Name\nFOR XML PATH('Categories'), ROOT('Products'), ELEMENTS, TYPE\n)\n\
  FROM Production.Product Product2;\nGO\n-- 创建选择性 XML 索引\nCREATE SELECTIVE XML INDEX\
  \ IX_SELECTIVE_XML_ProductXML\nON dbo.ProductXML\n(\nProductDetails\n)\nFOR\n(\n\
  Quantity = '/Products/Categories/Category/Subcategory/Product/ProductLocation/Quantity',\n\
  ProductName = '/Products/Categories/Category/Subcategory/Product/ProductName'\n\
  );\nGO\n```\n代码清单 7-16. 创建选择性 XML 索引\n\n\n### 工作原理\n\n主 XML 索引会将所有 XML 数据分解为关系格式，而选择性\
  \ XML 索引则不会这样做。对于大型 XML 实例，主 XML 索引可能会占用大量空间并消耗服务器资源。选择性 XML 索引则针对一个或多个路径中指定的值进行操作。这在许多情况下可以使选择性\
  \ XML 索引比主 XML 索引小得多。创建选择性 XML 索引的语法比创建主 XML 索引的语法更复杂。例如，清单 7-16 中演示的选择性 XML 索引，在\
  \ FOR 子句中标识了两条 XQuery 路径，指向两个深度嵌套的元素节点；即：\n\n*   `Quantity`\n*   `ProductName`\n\
  \n选择性 XML 索引路径必须是完全限定且完整的路径，即，路径不允许使用缩写。该索引包含由这些路径标识的节点。清单 7-17 展示了一个示例 XML 片段，其中说明了在选择性\
  \ XML 索引路径中标识的 `Quantity` 和 `ProductName` 元素节点的 XML 路径。\n\n**清单 7-17.** 来自上一个示例的\
  \ XML 片段示例\n\n![A435478_1_En_7_Figa_HTML.gif](img/A435478_1_En_7_Figa_HTML.gif)\n\
  \n清单 7-18 中的查询是在创建选择性 XML 索引之前运行的。结果如图 7-10 所示（时间统计），其执行计划如图 7-11 所示。\n\n![A435478_1_En_7_Fig11_HTML.jpg](img/A435478_1_En_7_Fig11_HTML.jpg)\n\
  **图 7-11.** 索引创建前的执行计划\n\n![A435478_1_En_7_Fig10_HTML.jpg](img/A435478_1_En_7_Fig10_HTML.jpg)\n\
  **图 7-10.** 显示索引创建前的时间统计\n\n```sql\nSET STATISTICS TIME ON;\nSELECT ProductID, Name,\
  \ ProductNumber, ProductDetails\nFROM dbo.ProductXML\nWHERE ProductDetails.exist('Products/Categories/Category/Subcategory/Product/ProductLocation/Quantity[.=\"\
  622\"]') = 1;\nSET STATISTICS TIME OFF;\n```\n**清单 7-18.** 展示示例查询\n\n在创建了索引 `IX_SELECTIVE_XML_ProductXML`\
  \ 之后，清单 7-19 中的查询生成了更高效的运行时和执行计划，如图 7-12 和图 7-13 所示。\n\n![A435478_1_En_7_Fig13_HTML.jpg](img/A435478_1_En_7_Fig13_HTML.jpg)\n\
  **图 7-13.** 显示创建选择性 XML 索引后执行计划的改进\n\n![A435478_1_En_7_Fig12_HTML.jpg](img/A435478_1_En_7_Fig12_HTML.jpg)\n\
  **图 7-12.** 显示改进的时间统计\n\n```sql\nSET STATISTICS TIME ON;\nSELECT ProductID, Name,\
  \ ProductNumber, ProductDetails\nFROM dbo.ProductXML\nWHERE ProductDetails.exist('Products/Categories/Category/Subcategory/Product/ProductLocation/Quantity[.=\"\
  622\"]') = 1;\n```\n**清单 7-19.** 创建选择性 XML 索引后运行的示例查询\n\n在没有 `XMLNAMESPACES` 的 XML\
  \ 实例的 XML 列上创建 `SELECTIVE XML` 索引的语法包含以下部分：\n\n```sql\nCREATE SELECTIVE XML INDEX\
  \ \nON \n()\nFOR ( Path_name1 = 'XML path',\nPath Name2 = 'XML path',\nPath Name3\
  \ = 'XML path')\n```\n\n当 XML 列存储带有 `XMLNAMESPACES` 的 XML 实例时，必须在 `CREATE SELECTIVE\
  \ INDEX` 语句中声明 `XMLNAMESPACE`。例如，如果你想改进对 `HumanResources.JobCandidate` 表的 `Resume`\
  \ 列的搜索。清单 7-20 展示了如何查询带有命名空间的 XML 列。\n\n```sql\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/Resume'\
  \ as ns)\nSELECT JobCandidateID, Resume\nFROM HumanResources.JobCandidate\nWHERE\
  \ Resume.exist('/ns:Resume/ns:Name/ns:Name.First[.=\"Stephen\"]') = 1\n```\n**清单\
  \ 7-20.** 用于搜索求职者的 SQL 代码\n\n清单 7-21 演示了如何在 `HumanResources.JobCandidate` 表的 `Resume`\
  \ 列上创建选择性 XML 索引。图 7-14 显示了在创建选择性 XML 索引后，清单 7-19 中查询的 SQL 执行计划。\n\n![A435478_1_En_7_Fig14_HTML.jpg](img/A435478_1_En_7_Fig14_HTML.jpg)\n\
  **图 7-14.** 显示创建选择性 XML 索引后的 SQL 执行计划\n\n```sql\nCREATE SELECTIVE XML INDEX IX_SELECTIVE_XML_HumanResources_JobCandidate\n\
  ON [HumanResources].[JobCandidate]\n(\n[Resume]\n)\nWITH XMLNAMESPACES\n(\nDEFAULT\
  \ 'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/Resume'\n)\nFOR\n\
  (\nLastName = '/Resume/Name/Name.Last'\n,FirstName = '/Resume/Name/Name.First'\n\
  );\n```\n**清单 7-21.** 在包含 `XMLNAMESPACE` 的列上创建 `SELECTIVE XML INDEX` 的语句\n\n在带有\
  \ `XMLNAMESPACES` 的 XML 实例的 XML 列上创建选择性 XML 索引的语法包含以下部分：\n\n```sql\nCREATE SELECTIVE\
  \ XML INDEX \nON \n()\nWITH XMLNAMESPACES(DEFAULT 'XMLNAMESPACE URI')\nFOR ( Path_Name1\
  \ = 'XML path',\nPath_Name2 = 'XML path',\nPath_Name3 = 'XML path')\n```\n\n创建选择性\
  \ XML 索引的优势在于，你可以实现一个或多个 XML 路径，以专注于你的搜索条件中主要使用的 XML 值。\n\n> **注意**\n> 微软建议优先设置选择性\
  \ XML 索引。但是，如果你的选择性 XML 索引映射了许多路径，那么 `PRIMARY` XML 索引可能是更好的选择。\n\n### 7-6 优化选择性\
  \ XML 索引\n\n### 问题\n\n你想优化选择性 XML 索引的性能。\n\n### 解决方案\n\n实现提示可以优化选择性 XML 索引。清单 7-22\
  \ 演示了选择性 XML 索引的不同提示。\n\n```sql\nCREATE SELECTIVE XML INDEX IX_SELECTIVE_XML_ProductXML_Hint_Sample\n\
  ON dbo.ProductXML\n(\nProductDetails\n)\nFOR\n(\nSubcategoryName = '/Products/Categories/Category/Subcategory/SubcategoryName'\
  \ AS XQUERY 'node()',\nShelf = '/Products/Categories/Category/Subcategory/Product/ProductLocation/Shelf',\n\
  Bin = '/Products/Categories/Category/Subcategory/Product/ProductLocation/Bin' AS\
  \ XQUERY 'xs:double' SINGLETON,\nProductName = '/Products/Categories/Category/Subcategory/Product/ProductName'\
  \ AS SQL nvarchar(40),\nCategoryName = '/Products/Categories/Category/CategoryName'\
  \ AS XQUERY 'xs:string' MAXLENGTH(35)\n);\n```\n**清单 7-22.** 测试选择性 XML 索引的不同提示\n\
  \n\n\n### 工作原理\n\n选择性 XML 索引提示分为两种：\n\n* `SQL Server` – 面向 SQL 数据类型映射。例如：`PathName`\
  \ = ‘/root/element’ AS SQL nvarchar(40)\n* `XQUERY` – 面向 XQuery 数据类型映射。例如：`PathName`\
  \ = ‘/root/element’ AS XQUERY ‘xs:string’\n\n表 `7-1` 描述了可用于改进选择性 XML 索引的优化提示。\n\n\
  表 7-1.\n选择性 XML 索引优化提示说明\n\n| 优化提示 | 适用于 | 提示说明 |\n| --- | --- | --- |\n| `node()`\
  \ | XQuery | 减少所需的存储空间。检查节点是否存在。 |\n| `SINGLETON` | XQuery 和 SQL Server | 确保该组只有一个实例，以便可以据此优化索引。请避免后续添加其他实例，因为这可能导致问题。\
  \ |\n| `DATA TYPE` | XQuery | 使用数据类型优化索引。如果某些内容破坏了数据类型，则可能会出现问题，索引中将显示 null。 |\n\
  | `MAXLENGTH` | XQuery | 查看 XQuery 类型 `xs:string` 并使用允许的字符串最大值来优化索引很有帮助。但是，如果现有字符串长于指定的\
  \ `MAXLENGTH`，则可能会导致问题，因为索引可能会失败。 |\n\n表 `7-2` 列出了在类型化和非类型化 XML 列上创建的选择性 XML 索引提示可用的\
  \ XQuery 数据类型。\n\n表 7-2.\n提示可用的 XQuery 数据类型\n\n| 类型化 XML | 非类型化 XML |\n| --- | ---\
  \ |\n| `xs:anyUri` |   |\n| `xs:boolean` | `xs:boolean` |\n| `xs:date` | `xs:date`\
  \ |\n| `xs:dateTime` | `xs:dateTime` |\n| `xs:day` |   |\n| `xs:decimal` |   |\n\
  | `xs:double` | `xs:double` |\n| `xs:float` |   |\n| `xs:int` |   |\n| `xs:integer`\
  \ |   |\n| `xs:language` |   |\n| `xs:long` |   |\n| `xs:name` |   |\n| `xs:NCName`\
  \ |   |\n| `xs:negativeInteger` |   |\n| `xs:nmtoken` |   |\n| `xs:nonNegativeInteger`\
  \ |   |\n| `xs:nonPositiveInteger` |   |\n| `xs:positiveInteger` |   |\n| `xs:qname`\
  \ |   |\n| `xs:short` |   |\n| `xs:string` | `xs:string` |\n| `xs:time` | `xs:time`\
  \ |\n| `xs:token` |   |\n| `xs:unsignedByte` |   |\n| `xs:unsignedInt` |   |\n|\
  \ `xs:unsignedLong` |   |\n| `xs:unsignedShort` |   |\n\n当提示应用于索引时，选择性 XML 索引可以获得益处。表\
  \ `7-3` 列出了选择性 XML 索引优化提示的益处。\n\n表 7-3.\n选择性 XML 索引优化提示的有效性\n\n| 优化提示 | 存储效率 | 性能提升\
  \ |\n| --- | --- | --- |\n| `node()` | 是 | 否 |\n| `SINGLETON` | 否 | 是 |\n| `DATA\
  \ TYPE` | 是 | 是 |\n| `MAXLENGTH` | 是 | 是 |\n\n表 `7-4` 列出了每种数据类型支持的优化提示。\n\n表 7-4.\n\
  优化提示与数据类型对照表\n\n| 优化提示 | XQuery 数据类型 | SQL 数据类型 |\n| --- | --- | --- |\n| `node()`\
  \ | 是 | 否 |\n| `SINGLETON` | 是 | 是 |\n| `DATA TYPE` | 是 | 否 |\n| `MAXLENGTH` | 是\
  \ | 否 |\n\n## 7-7 创建辅助选择性 XML 索引\n\n### 问题\n\n你想要提升选择性 XML 索引的性能。\n\n### 解决方案\n\n\
  辅助选择性 XML 索引可以提升选择性 XML 索引的性能。清单 `7-23` 在 `HumanResources.JobCandidate` 表上创建了选择性\
  \ XML 索引（来源于解决方案 7-6），这是此解决方案的先决条件。\n\n```sql\nCREATE SELECTIVE XML INDEX IX_SELECTIVE_XML_ProductXML_Hint_Sample\n\
  ON dbo.ProductXML\n(\nProductDetails\n)\nFOR\n(\nSubcategoryName = '/Products/Categories/Category/Subcategory/SubcategoryName'\
  \ AS XQUERY 'node()',\nShelf = '/Products/Categories/Category/Subcategory/Product/ProductLocation/Shelf',\n\
  Bin = '/Products/Categories/Category/Subcategory/Product/ProductLocation/Bin' AS\
  \ XQUERY 'xs:double' SINGLETON,\nProductName = '/Products/Categories/Category/Subcategory/Product/ProductName'\
  \ AS SQL nvarchar(40),\nCategoryName = '/Products/Categories/Category/CategoryName'\
  \ AS XQUERY 'xs:string' MAXLENGTH(35)\n);\n```\n清单 7-23.\n为选择性 XML 索引测试不同提示\n\n\
  清单 `7-24` 展示了如何在 `HumanResources.JobCandidate` 表上创建辅助选择性 XML 索引。\n\n```sql\nCREATE\
  \ XML INDEX IX_SELECTIVE_SECONDARY_XML_HumanResources_JobCandidate\nON HumanResources.JobCandidate\n\
  (\nResume\n)\nUSING XML INDEX IX_SELECTIVE_XML_HumanResources_JobCandidate\nFOR\
  \ (LastName);\n```\n清单 7-24.\n演示如何创建辅助选择性 XML 索引\n\n### 工作原理\n\n辅助选择性 XML 索引提升了选择性\
  \ XML 索引的性能。其语法类似于辅助 XML 索引的语法，主要区别在于：选择性 XML 索引在 `USING XML INDEX` 子句中指定，而 `FOR`\
  \ 子句则实现了选择性 XML 索引路径之一。\n\n创建辅助选择性 XML 索引的语法包含以下组件：\n\n```sql\nCREATE XML INDEX\
  \ \nON \n()\nUSING XML INDEX ()\nFOR (  )\n```\n\n辅助选择性 XML 索引必须包含一个提升（promoted）了数据类型的路径。例如：\n\
  \n* `SQL Server` 类型是 ‘/Resume/Name/Name.First’ AS SQL varchar(20)\n* `XQuery` 类型是\
  \ ‘/Resume/Name/Name.First’ AS XQUERY ‘xs:string’ MAXLENGTH(20)\n\n当数据类型未被提升时，`SQL\
  \ Server` 会引发错误：\n\n```sql\nMsg 6391, Level 16, State 0, Line 111\nPath 'LastName'\
  \ is promoted to a type that is invalid for use as a key column in a secondary selective\
  \ XML index.\n```\n\n## 7-8 修改选择性 XML 索引\n\n### 问题\n\n你想要从选择性 XML 索引中添加或删除路径。\n\n\
  \n\n"
