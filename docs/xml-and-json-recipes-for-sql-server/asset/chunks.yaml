- fmt: "# Showing configurations for General menu\n\nThe query for the “Get XML Content”\
    \ task does not have any parameters. To set the proper parameters, click on the\
    \ Result Set menu. The query that we set in the General menu returns the XML as\
    \ a scalar CLOB (Character Large Object) value. Therefore, the returned result\
    \ we will bind to one of the variables that were previously created. From the\
    \ Variable Name drop-down list, select the `XMLData_Content` variable. Set the\
    \ Result Name property to `0`. Since we do not have a name for the result set,\
    \ setting it to `0` will choose the first column from the result set. Figure [3-9](#A435478_1_En_3_Chapter.html#Fig9)\
    \ illustrates the Result Set menu configurations.\n\n![A435478_1_En_3_Fig9_HTML.jpg](A435478_1_En_3_Fig9_HTML.jpg)\n\
    \n**Figure 3-9. Showing Result Set menu configurations**\n\nThere are no Expressions\
    \ set for the Execute SQL Task “Get XML Content.” Therefore, press OK to complete\
    \ the task configuration.\n\n![A435478_1_En_3_Fig12_HTML.jpg](A435478_1_En_3_Fig12_HTML.jpg)\n\
    \n**Figure 3-12. Showing Script Task Manager properties**\n\n## Showing how to\
    \ set the expression to the variable\n\nThe next step is setting the expression\
    \ for the `TimeStamp` variable. In a real production environment, most XML file\
    \ names should have a timestamp. The timestamp has a variety of format options,\
    \ and the most appropriate should be chosen based on client or business needs.\
    \ For example, the most often implemented format I’ve seen is `yyyyMMdd_HHmmss`.\
    \ To this value, SSIS packages must have a syntax that is different from T-SQL,\
    \ or even .NET applications. For example, Listing [3-3](#A435478_1_En_3_Chapter.html#Par82)\
    \ demonstrates SSIS syntax to get the date timestamp.\n\n```csharp\n(DT_STR, 4,\
    \ 1252) DATEPART(\"yyyy\", GETDATE()) +\nRIGHT(\"0\" + (DT_STR, 2, 1252) DATEPART(\"\
    mm\", GETDATE()),2) +\nRIGHT(\"0\" + (DT_STR, 2, 1252) DATEPART(\"dd\", GETDATE()),2)\
    \  + \"_\" +\nRIGHT(\"0\" + (DT_STR, 2, 1252) DATEPART(\"hh\", GETDATE()),2) \
    \ +\nRIGHT(\"0\" + (DT_STR, 2, 1252) DATEPART(\"mi\", GETDATE()),2)  +\nRIGHT(\"\
    0\" + (DT_STR, 2, 1252) DATEPART(\"ss\", GETDATE()),2)\n```\n\n**Listing 3-3.\
    \ Showing SSIS syntax**\n\nTo set the variable expression:\n\n![A435478_1_En_3_Fig10_HTML.jpg](A435478_1_En_3_Fig10_HTML.jpg)\n\
    \n**Figure 3-10. Showing how to set the expression to the variable**\n\n*   Right-mouse\
    \ click on the package field. Select Variables from the pop-up menu.\n*   Click\
    \ the variable’s button in the Expression section to load the Expression Builder\
    \ Form.\n*   Place the code from Listing [3-3](#A435478_1_En_3_Chapter.html#Par82)\
    \ into the Expression text box.\n*   Click the “Evaluate Expression ” button to\
    \ verify the expression’s code.\n*   Click the OK button to finalize the setting.\
    \ Figure [3-10](#A435478_1_En_3_Chapter.html#Fig10) illustrates the setup of the\
    \ expressions to the variable.\n\n## Showing Script Task Manager properties\n\n\
    The Script Task “Create XML File,” as stated in its name, writes the XML file\
    \ to the destination file path, which is assigned to the SSIS package via the\
    \ `FileDestinationPath` variable that has a public interface and is visible outside\
    \ of the package. The Script Task is a programming module where a developer can\
    \ write the functionality implementing C# and VB.NET languages, which makes the\
    \ Script Task very popular for SQL Server developers. However, the Script Task\
    \ could simplify and extend SSIS packages functionalities. For the Script Task\
    \ “Create XML File,” several lines of code will need to be used to complete the\
    \ process. To configure the task:\n\n*   From the Tool Box, drag the Script Task\
    \ to the development field.\n*   Change the name to “Create XML File.”\n*   Link\
    \ the “Get XML Content” task with the “Create XML File” task. Click on the “Get\
    \ XML Content” task, grab a green arrow, drag over the “Create XML File” task,\
    \ then release the mouse. That creates a Precedence Constrain between two tasks\
    \ (this package does not need to configure the Precedence Constrain). See Figure\
    \ [3-11](#A435478_1_En_3_Chapter.html#Fig11), illustrating the Precedence Constrain\
    \ initialization.\n\n![A435478_1_En_3_Fig11_HTML.jpg](A435478_1_En_3_Fig11_HTML.jpg)\n\
    \n**Figure 3-11. Creating Precedence Constrain between the tasks**\n\n*   To load\
    \ the Script Task Manager, double-click on the “Create XML File” task.\n*   The\
    \ Script Task Manager, by default, has the `ScriptLanguage` set to `Microsoft\
    \ Visual C# 2015` (Microsoft Visual Basic 2015 is another option; however, this\
    \ example will use C#), and the `EntryPoint` property is set to `“Main”` under\
    \ the Script Task Editor (the function name that the script executes first).\n\
