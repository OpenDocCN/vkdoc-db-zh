    SELECT @XMLDoc;\n```\n\n清单 5-7.\n向 `Maintenance` 元素插入多个属性\n\n结果如图 5-4 所示。\n\n\
    ![A435478_1_En_5_Fig4_HTML.jpg](img/A435478_1_En_5_Fig4_HTML.jpg)\n\n图 5-4.\n\
    向 `Maintenance` 元素插入多个属性后的结果\n\n## 5-4. 条件性地插入 XML 属性\n\n### 问题\n\n你想基于一个比较条件插入一个\
    \ XML 属性。\n\n### 解决方案\n\n可以在 `modify()` 方法中实现 `if … else` 条件语句，如清单 5-8 所示。\n\n\
    ```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription ProductID=\"\
    1\">\n  <Summary>\n    <Features>\n      <Maintenance>\n        <feature>Vacuum\
    \ formed dual wall polycarbonate</feature>\n        <feature>Dual material molded\
    \ outer shell</feature>\n      </Maintenance>\n    </Features>\n  </Summary>\n\
    </ProductDescription>\n';\nSET @XMLDoc.modify('insert\nif (/Root/ProductDescription[@ProductID=1])\n\
    then attribute ProductModel {\"Road-150\"}\nelse (attribute ProductModel {\"Mountain-100\"\
    } )\ninto (/Root/ProductDescription/Features/Maintenance)[1]');\nSELECT @XMLDoc;\n\
    ```\n\n清单 5-8.\n将属性插入操作包装在 `if-then-else` 条件中\n\n结果如图 5-5 所示。\n\n![A435478_1_En_5_Fig5_HTML.jpg](img/A435478_1_En_5_Fig5_HTML.jpg)\n\
    \n图 5-5.\n条件性属性插入后的 XML 结果"
- fmt: "### 5-5. 指定位置插入子元素\n\n#### 问题\n你希望将一个新元素插入到现有的元素组中，并强制其遵循特定的位置顺序。\n\n####\
    \ 解决方案\n`modify()` 方法的 `insert` 语句有四个关键字，可用于指定子元素在元素组中的位置：\n\n*   `as first`\n\
    *   `as last`\n*   `after`\n*   `before`\n\n这些关键字用于指定新元素的放置位置，如列表 [5-9](#A435478_1_En_5_Chapter.html#Par71)\
    \ 所示。\n\n```sql\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'<Root>\n<ProductDescription\
    \ ProductID=\"1\">\n  <Features>\n    <Color>Red</Color>\n    <Material>Aluminium</Material>\n\
    \    <BikeFrame>Carbon</BikeFrame>\n  </Features>\n</ProductDescription>\n</Root>';\n\
    SET @XMLDoc.modify('insert 1 year parts and labor\nas first  into (/Root/ProductDescription/Features)[1]');\n\
    SET @XMLDoc.modify('insert Aluminium\nas last into (/Root/ProductDescription/Features)[1]');\n\
    SET @XMLDoc.modify('insert Strong long lasting\nafter (/Root/ProductDescription/Features/Material)[1]')\n\
    SET @XMLDoc.modify('insert Silver\nbefore (/Root/ProductDescription/Features/BikeFrame)[1]')\n\
    SELECT @XMLDoc;\n-- 列表 5-9.\n-- 演示使用 as first, as last, after, 和 before 关键字在父元素\
    \ Features 下排列子元素\n```\n\n结果如图 [5-6](#A435478_1_En_5_Chapter.html#Fig6) 所示。\n\n\
    ![A435478_1_En_5_Fig6_HTML.jpg](A435478_1_En_5_Fig6_HTML.jpg)\n\n图 5-6.\n使用位置指定符的插入指令结果\n\
    \n#### 工作原理\n关键字 `as first`, `as last`, `after`, 和 `before` 为子元素提供位置指定。每个关键字的含义不言自明：\n\
    \n*   `as first` – 将子元素添加到第一个位置。\n*   `as last` – 将子元素添加到最后一个位置。\n*   `after`\
    \ – 将子元素添加到提供的同级元素位置之后。\n*   `before` – 将子元素添加到提供的同级元素位置之前。\n\n`as first` 和 `as\
    \ last` 的语法与 `after` 和 `before` 的语法略有不同。例如，`as first` 和 `as last` 的语法如下：\n\n*\
    \   `modify('insert <ChildElement> as first into (/XPath/<ParentElement>)[1]')`\n\
    *   `modify('insert <ChildElement> as last into (/XPath/<ParentElement>)[1]')`\n\
    \n`insert` 指令提供子元素及其值，然后由 `as first` 或 `as last` 指定符指明该元素在其同级元素中所处的位置。最后一步，父元素的\
    \ XPath 指明了子元素的目标位置。\n\n对于 `before` 和 `after` 关键字，与 `as first` 和 `as last` 相比有两个区别：\n\
    \n*   未使用 `into` 关键字。\n*   XPath 中引用了 `<ParentElement>/<SiblingElement>` 元素，新元素（在它之前或之后）将放置在该元素旁边。\n\
    *   `modify('insert <ChildElement> before (/XPath/<ParentElement>/<SiblingElement>)[1]')`\n\
    *   `modify('insert <ChildElement> after (/XPath/<ParentElement>/<SiblingElement>)[1]')`\n\
    \n### 5-6. 插入多个元素\n\n#### 问题\n你希望向 XML 文档中插入多个同级元素。\n\n#### 解决方案\n与属性不同（你可以通过逗号分隔来添加多个属性及其值），`modify()`\
    \ 方法中的直接 `insert` 语句不支持插入多个元素。但是，XQuery 扩展函数 `sql:variable()` 可以帮助解决这个问题，如列表 [5-10](#A435478_1_En_5_Chapter.html#Par89)\
    \ 所示。\n\n```sql\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'<Root>\n<ProductDescription\
    \ ProductID=\"1\">\n  <Features/>\n</ProductDescription>\n</Root>';\nDECLARE @newElements\
    \ xml;\nSET @newElements =\n'<Warranty>1 year parts and labor</Warranty>\n<Material>Aluminium</Material>\n\
    <Color>Silver</Color>\n<BikeFrame>Strong long lasting</BikeFrame>';\nSET @XMLDoc.modify('insert\n\
    sql:variable(\"@newElements\")\ninto (/Root/ProductDescription/Features)[1]')\n\
    SELECT @XMLDoc;\n-- 列表 5-10.\n-- 向 XML 实例中插入多个同级元素\n```\n\n生成的 XML 如图 [5-6](#A435478_1_En_5_Chapter.html#Fig6)\
    \ 所示（重复该图）。\n\n![A435478_1_En_5_Figa_HTML.jpg](A435478_1_En_5_Figa_HTML.jpg)\n\
    \n#### 工作原理\n如解决方案部分所述，`modify()` 方法在 `insert` 指令中不支持直接使用多个同级元素列表。XQuery `sql:variable()`\
    \ 扩展函数为我们提供了一个指向 XML 块的引用，这使得 `insert` 指令机制能够像插入单个新元素一样工作。\n\n要向 XML 实例中插入多个同级元素，需要以下步骤：\n\
    \n1.  声明一个变量为 `XML` 数据类型（`NVARCHAR` 或 `VARCHAR` 数据类型也可以工作，但我建议保持与 `XML` 数据类型一致）。\n\
    2.  将一个 XML 元素列表赋值给该变量。\n\n例如：\n\n```sql\nDECLARE @newElements xml;\nSET @newElements\
    \ =\n'<Warranty>1 year parts and labor</Warranty>\n<Material>Aluminium</Material>\n\
    <Color>Silver</Color>\n<BikeFrame>Strong long lasting</BikeFrame>';\n```\n\n`insert`\
    \ 部分与配方 5-1 “向你的 XML 中插入子元素” 中解释的相同。但是，使用了函数 `sql:variable()` 而不是特定的子元素。例如：\n\n\
    ```sql\nmodify('insert\nsql:variable(\"@newElements\")\ninto (/Root/ProductDescription/Features)[1]')\n\
    ```\n\nXQuery 扩展函数 `sql:variable()` 是这个用于向 XML 实例插入多个同级元素的简单解决方案的关键部分。\n\n###\
    \ 5-7. 更新 XML 元素值\n\n#### 问题\n你希望更新 XML 实例中的元素值。\n\n#### 解决方案\n`modify()` 方法的\
    \ `replace value of` 语句用于更新 XML 实例的元素值。列表 [5-11](#A435478_1_En_5_Chapter.html#Par103)\
    \ 演示了将 `Color` 元素值从 “Silver” 更新为 “Black” 的解决方案。\n\n```sql\nDECLARE @XMLDoc xml;\n\
    SET @XMLDoc =\n'<Root>\n<ProductDescription ProductID=\"1\">\n  <Features>\n \
    \   <Warranty>1 year parts and labor</Warranty>\n    <Material>Aluminium</Material>\n\
    \    <Color>Silver</Color>\n    <BikeFrame>Strong long lasting</BikeFrame>\n \
    \ </Features>\n</ProductDescription>\n</Root>';\nSET @XMLDoc.modify('replace value\
    \ of\n(/Root/ProductDescription/Features/Color/text())[1] with \"Black\"')\nSELECT\
    \ @XMLDoc;\n-- 列表 5-11.\n-- 更新 <Color> 元素的值\n```\n\n结果如图 [5-7](#A435478_1_En_5_Chapter.html#Fig7)\
    \ 所示。\n\n![A435478_1_En_5_Fig7_HTML.jpg](A435478_1_En_5_Fig7_HTML.jpg)\n\n图 5-7.\n\
    显示 `Color` 元素值被更新后的结果"
  raw: '### How It Works


    To insert a new attribute conditionally, you can use the if … then … else construct
    within the modify() method. Listing [5-8](#A435478_1_En_5_Chapter.html#Par53)
    demonstrates an example of this conditional logic. If the attribute ProductID=“1”
    then a new attribute called ProductModel is added with the value “Road-150,” and
    for all other ProductIDs, a new attribute called ProductModel is added with the
    value “Mountain-100.”


    After the insert statement (Listing [5-8](#A435478_1_En_5_Chapter.html#Par53)),
    we immediately check the ProductID attribute value:


    ```

    if (/Root/ProductDescription[@ProductID=1])

    ```


    When the check condition returns true, the ProductModel attribute with the value
    “Road-150” is inserted into the Maintenance element:


    ```

    then attribute ProductModel {"Road-150"}

    ```


    For all other values, the else block is processed:


    ```

    else (

    attribute ProductModel {"Mountain-100"}

    )

    ```


    No changes are necessary for the into keyword, which provides the functionality
    establishing the target XPath path:


    ```

    into (/Root/ProductDescription/Features/Maintenance)[1]

    ```


    ## 5-5\. Inserting a Child Element with Position Specification


    ### Problem


    You want to insert a new element into the existing element group and enforce a
    certain position sequence .


    ### Solution


    The modify() method has four keywords that can be applied to the insert statement
    to specify the child element position among a group of elements:


    *   as first

    *   as last

    *   after

    *   before


    These keywords are used to specify the placement of a new element, as shown in
    Listing [5-9](#A435478_1_En_5_Chapter.html#Par71).


    ```

    DECLARE @XMLDoc xml;

    SET @XMLDoc =

    ''


    '';

    SET @XMLDoc.modify(''insert 1 year parts and labor

    as first  into (/Root/ProductDescription/Features)[1]'');

    SET @XMLDoc.modify(''insert Aluminium

    as last into (/Root/ProductDescription/Features)[1]'');

    SET @XMLDoc.modify(''insert Strong long lasting

    after (/Root/ProductDescription/Features/Material)[1]'')

    SET @XMLDoc.modify(''insert Silver

    before (/Root/ProductDescription/Features/BikeFrame)[1]'')

    SELECT @XMLDoc;

    Listing 5-9.

    Demonstrating as first, as last, after, and before keywords to arrange the child
    elements under the parent element Features

    ```


    The result is shown in Figure [5-6](#A435478_1_En_5_Chapter.html#Fig6).


    ![A435478_1_En_5_Fig6_HTML.jpg](A435478_1_En_5_Fig6_HTML.jpg)


    Figure 5-6.


    Results for the insert directive with position specification


    ### How It Works


    The keywords as first, as last, after, and before provide the position specification
    for a child element. Each of the keywords is self-explanatory:


    *   as first – adds the child element into the first position.

    *   as last – adds the child element into the last position.

    *   after – adds the child element after provided sibling position.

    *   before – adds the child element before provided sibling position.


    The syntax for as first and as last differs slightly from the syntax for after
    and before. For example, the syntax for as first and as last is as follows:


    *   `modify(''insert <ChildElement> as first into (/XPath/<ParentElement>)[1]'')`

    *   `modify(''insert <ChildElement> as last into (/XPath/<ParentElement>)[1]'')`


    The insert directive provides the child element and value, then as first or as
    last specifier indicates the position the element takes among its sibling elements.
    In the final step, the parent’s XPath provides the child element destination.


    There are two differences for the keywords before and after compared to as first
    and as last:


    *   No into keyword implemented.

    *   The XPath has a reference to the <ParentElement>/<SiblingElement> element,
    beside which the new element (before or after) will be placed.

    *   `modify(''insert <ChildElement> before (/XPath/<ParentElement>/<SiblingElement>)[1]'')`

    *   `modify(''insert <ChildElement> after (/XPath/<ParentElement>/<SiblingElement>)[1]'')`


    ## 5-6\. Inserting Multiple Elements


    ### Problem


    You want to insert multiple sibling elements into an XML document.


    ### Solution


    Unlike attributes, where you can add several attributes and their values by separating
    them with a comma, multiple elements are not supported in a direct insert within
    the modify() method. However, the XQuery extension function sql:variable() helps
    solve the problem, as shown in Listing [5-10](#A435478_1_En_5_Chapter.html#Par89).


    ```

    DECLARE @XMLDoc xml;

    SET @XMLDoc =

    ''


    '';

    DECLARE @newElements xml;

    SET @newElements =

    ''1 year parts and labor

    Aluminium

    Silver

    Strong long lasting'';

    SET @XMLDoc.modify(''insert

    sql:variable("@newElements")

    into (/Root/ProductDescription/Features)[1]'')

    SELECT @XMLDoc;

    Listing 5-10.

    Inserting multiple sibling elements into an XML instance

    ```


    The resulting XML is shown in Figure [5-6](#A435478_1_En_5_Chapter.html#Fig6)
    (repeating the figure).


    ![A435478_1_En_5_Figa_HTML.jpg](A435478_1_En_5_Figa_HTML.jpg)


    ### How It Works


    As explained in the Solution section, the modify() method does not support a multiple
    sibling element list within the insert directive. The XQuery sql:variable() extension
    function provides us a reference to an XML block, which makes the insert directive
    mechanism operate as it inserts a new element.


    To insert multiple sibling elements into an XML instance, the following is required:


    1.  Declare a variable as an XML data type (`NVARCHAR` or `VARCHAR` data types
    work as well, but I would recommend remaining consistent with the `XML` data type).
     

    2.  Assign an XML element list to the variable.  


    For example:


    ```

    DECLARE @newElements xml;

    SET @newElements =

    ''1 year parts and labor

    Aluminium

    Silver

    Strong long lasting'';

    ```


    The insert part is the same as explained in Recipe 5-1, “Inserting a Child Element
    into Your XML.” However, the function sql:variable() is used instead of the specific
    child element. For example:


    ```

    modify(''insert

    sql:variable("@newElements")

    into (/Root/ProductDescription/Features)[1]'')

    ```


    The XQuery extension function sql:variable() is a key part of this simple solution
    for inserting multiple sibling elements into an XML instance .


    ## 5-7\. Updating an XML Element Value


    ### Problem


    You want to update an XML instance element value .


    ### Solution


    The modify() method replace value of statement updates an XML instance element
    value. Listing [5-11](#A435478_1_En_5_Chapter.html#Par103) demonstrates the solution
    to update the Color element value from “Silver” to “Black.”


    ```

    DECLARE @XMLDoc xml;

    SET @XMLDoc =

    ''


    1 year parts and labor

    Aluminium

    Silver

    Strong long lasting


    '';

    SET @XMLDoc.modify(''replace value of

    (/Root/ProductDescription/Features/Color/text())[1] with "Black"'')

    SELECT @XMLDoc;

    Listing 5-11.

    Updating the  element value

    ```


    The result is shown in Figure [5-7](#A435478_1_En_5_Chapter.html#Fig7).


    ![A435478_1_En_5_Fig7_HTML.jpg](A435478_1_En_5_Fig7_HTML.jpg)


    Figure 5-7.


    Showing the result when the value of the Color element has been updated'
