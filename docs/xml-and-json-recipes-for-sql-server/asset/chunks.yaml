- fmt: "## How It Works\n\n在我们的示例中，我们创建了一个 `dbo.PersonXML` 表来演示 XML 索引的创建和性能。清单 [7-2](#A435478_1_En_7_Chapter.html#Par6)\
    \ 展示了创建该表并用 AdventureWorks 数据库中 `Person.Person` 表的数据加载它的 SQL 代码。请注意所示的会话级别设置（通过\
    \ `SET` 语句）。在表中创建 XML 列或向 XML 列添加 XML 索引时，这些设置很重要。\n\n```\n-- These settings are\
    \ important when creating XML indexes\nSET NUMERIC_ROUNDABORT OFF;\nSET ARITHABORT\
    \ ON;\nSET ANSI_NULLS ON;\nSET ANSI_PADDING ON;\nSET ANSI_WARNINGS ON;\nSET CONCAT_NULL_YIELDS_NULL\
    \ ON;\nSET QUOTED_IDENTIFIER ON;\nGO\n-- Drop table SQL Server 2016 syntax\nDROP\
    \ TABLE IF EXISTS dbo.PersonXML\n-- Create and populate a table called PersonXML\n\
    CREATE TABLE dbo.PersonXML\n(\nPersonID INT NOT NULL,\nFirstName NVARCHAR(30)\
    \ NOT NULL,\nMiddleName NVARCHAR(20)NULL,\nLastName NVARCHAR(30) NOT NULL,\nDemographics\
    \ XML NULL,\nCONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED\n(\nPersonID ASC\n\
    )\n);\nGO\n```\n清单 7-2. 创建和填充 PersonXML 表\n\n清单 [7-3](#A435478_1_En_7_Chapter.html#Par8)\
    \ 展示了一个从 XML 列获取结果的 SQL 查询。图 [7-2](#A435478_1_En_7_Chapter.html#Fig2) 显示了在创建主\
    \ XML 索引之前，此查询 SQL 代码的实际执行计划。\n\n![A435478_1_En_7_Fig2_HTML.jpg](A435478_1_En_7_Fig2_HTML.jpg)\n\
    图 7-2. 显示创建主 XML 索引前的执行计划\n\n```\nSELECT PersonID, Demographics\nFROM dbo.PersonXML\n\
    WHERE Demographics.exist('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nIndividualSurvey[TotalPurchaseYTD > 9000]') = 1;\n```\n清单 7-3. 使用过滤器进行 XQuery\
    \ 采样\n\n查看为 XQuery 创建的执行计划，其有几个不同于典型 T-SQL 查询的步骤：\n\n*   表值函数 `[XML Reader with\
    \ XPath filter]`\n*   表值函数 `[XML Reader]`\n\n这两个步骤分别占总查询成本的最高百分比，92% 和 7%。这些步骤指定了\
    \ XML 运行时拆解机制，非常类似于普通关系 SQL 查询中的表扫描。这意味着，根据 XML 实例的大小，XML 拆解过程在性能方面可能非常耗费资源。图\
    \ [7-3](#A435478_1_En_7_Chapter.html#Fig3) 展示了表值函数 `[XML Reader]` 步骤的属性值。\n\n\
    ![A435478_1_En_7_Fig3_HTML.jpg](A435478_1_En_7_Fig3_HTML.jpg)\n图 7-3. 显示表值函数 `[XML\
    \ Reader]` 步骤属性\n\n```\nCREATE PRIMARY XML INDEX IX_PXML_PersonXML_Demographics\n\
    ON dbo.PersonXML\n(\nDemographics\n);\nGO\n```\n清单 7-4. 创建 XML 主索引\n\n一旦创建了主 XML\
    \ 索引，您就可以在 SSMS 上启用实际执行计划后，重新运行清单 [7-5](#A435478_1_En_7_Chapter.html#Par15)（与清单\
    \ [7-2](#A435478_1_En_7_Chapter.html#Par6) 相同）中的查询：\n\n```\nSELECT PersonID, Demographics\n\
    FROM dbo.PersonXML\nWHERE Demographics.exist('declare default element namespace\
    \ \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nIndividualSurvey[TotalPurchaseYTD > 9000]') = 1;\n```\n清单 7-5. 使用主 XML 索引查询\
    \ PersonXML 表\n\n在得到的执行计划中，表值函数 `[XML Reader with XPath filter]` 步骤和表值函数 `[XML\
    \ Reader]` 被聚簇索引查找 `[PrimaryXML]` 步骤所取代。图 [7-4](#A435478_1_En_7_Chapter.html#Fig4)\
    \ 展示了返回的执行计划。\n\n![A435478_1_En_7_Fig4_HTML.jpg](A435478_1_En_7_Fig4_HTML.jpg)\n\
    图 7-4. 显示创建主 XML 索引后的执行计划\n\n图 [7-5](#A435478_1_En_7_Chapter.html#Fig5) 展示了聚簇索引查找\
    \ `[PrimaryXML]` 步骤属性。使用主 XML 索引后，估算运算符成本从表值函数 `[XML Reader]` 步骤的 35782.9（92%）下降到了聚簇索引查找\
    \ `[PrimaryXML]` 步骤的 21.2796（46%）。\n\n![A435478_1_En_7_Fig5_HTML.jpg](A435478_1_En_7_Fig5_HTML.jpg)\n\
    图 7-5. 显示聚簇索引查找 `[PrimaryXML]` 步骤属性\n\n`CREATE PRIMARY XML INDEX` 语句包含三个部分，用于指定索引名称、在其上创建索引的表以及在其上创建索引的\
    \ XML 列的名称，如下所示：\n\n```\nCREATE PRIMARY XML INDEX \nON \n(  );\n```\n\n创建主 XML\
    \ 索引时，需要遵循以下规则：\n\n*   包含 XML 列的表必须有一个聚集主键。\n*   当存在主 XML 索引时，不能使用 DDL 语句删除或更改表的聚集主键。在修改主键之前，必须删除所有\
    \ XML 索引。\n*   只能在单个 `XML` 类型列上创建主 XML 索引。\n*   每个 XML 索引必须具有数据库范围内唯一的名称。\n* \
    \  创建 XML 索引时，无法为用户表单独指定文件组或分区信息。\n*   当删除主 XML 索引时，依赖于它的所有辅助 XML 索引都会被自动删除。\n\
    *   为 XML 索引将 `IGNORE_DUP_KEY` 和 `ONLINE` 选项设置为 `OFF`。\n*   主 XML 索引在名称方面与视图有相同的限制。\n\
    *   只有包含 `XML` 类型列的表才能拥有 XML 索引。视图、具有 `XML` 类型列的表值变量或 `XML` 类型变量不能拥有 XML 索引。\n\
    *   当将 `XML` 类型列从未类型化更改为类型化 XML 时，不应存在任何 XML 索引。如果表上存在 XML 索引，可以使用 `ALTER TABLE\
    \ ALTER COLUMN` 选项。在更改列类型之前，必须删除 XML 索引。\n*   创建 XML 索引时，必须将以下会话选项设置为 `ON`：`ARITHABORT`、`ANSI_NULLS`、`ANSI_PADDING`、`ANSI_WARNINGS`、`CONCAT_NULL_YIELDS_NULL`、`QUOTED_IDENTIFIER`。\n\
    *   创建 XML 索引时，选项 `NUMERIC_ROUNDABORT` 必须设置为 `OFF`。\n\n主 XML 索引可以显著提高 XQuery 性能。因此，XML\
    \ 索引可以是提高 SQL Server XQuery 性能的一个非常有吸引力的解决方案。然而，XML 索引有几个相关的注意事项。首先，添加主 XML 索引可能会消耗大量的存储空间。当创建\
    \ `PRIMARY XML` 索引时，SQL Server 会将给定列中的 XML 数据拆解为关系格式，只能由查询执行引擎访问。这可能消耗比存储未索引 XML\
    \ 数据所需多一倍以上的存储空间。\n\n在决定是否添加主 XML 索引时，请考虑以下建议：\n\n*   如果 XML 列不是 XQuery 过程的一部分，通常不需要\
    \ XML 索引。\n*   分析您的查询配置文件。如果您需要一次性查询大量行，或者您的 XML 数据量很大，则值得考虑 XML 索引。如果这些条件不适用，那么存储成本可能会超过效率收益。\n\
    *   添加主 XML 索引的一个充分理由是，如果您需要添加辅助 XML 索引以提高特定类别查询的效率（将在接下来的三个部分中讨论）。如果您希望添加辅助 XML\
    \ 索引，则必须先添加主 XML 索引。\n\n## 7-2 创建辅助 PATH 类型索引\n\n### Problem\n\n您想用 `exist()`\
    \ 方法改进 XML 列的过滤。"
  raw: "### How It Works\n\nIn our example we created a dbo.PersonXML table to demonstrate\
    \ XML index creation and performance. Listing [7-2](#A435478_1_En_7_Chapter.html#Par6)\
    \ shows the SQL code that creates the table and loads it with data from the Person.Person\
    \ table in the AdventureWorks database. Note the session-level settings shown\
    \ (via the SET statements). These are important when creating XML columns in tables\
    \ or adding XML indexes to XML columns.\n\n```\n-- These settings are important\
    \ when creating XML indexes\nSET NUMERIC_ROUNDABORT OFF;\nSET ARITHABORT ON;\n\
    SET ANSI_NULLS ON;\nSET ANSI_PADDING ON;\nSET ANSI_WARNINGS ON;\nSET CONCAT_NULL_YIELDS_NULL\
    \ ON;\nSET QUOTED_IDENTIFIER ON;\nGO\n-- Drop table SQL Server 2016 syntax\nDROP\
    \ TABLE IF EXISTS dbo.PersonXML\n-- Create and populate a table called PersonXML\n\
    CREATE TABLE dbo.PersonXML\n(\nPersonID INT NOT NULL,\nFirstName NVARCHAR(30)\
    \ NOT NULL,\nMiddleName NVARCHAR(20)NULL,\nLastName NVARCHAR(30) NOT NULL,\nDemographics\
    \ XML NULL,\nCONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED\n(\nPersonID ASC\n\
    )\n);\nGO\nListing 7-2.\nCreating and populating a PersonXML table\n```\n\nListing\
    \ [7-3](#A435478_1_En_7_Chapter.html#Par8) demonstrates a SQL query to get a result\
    \ from the XML column. Figure [7-2](#A435478_1_En_7_Chapter.html#Fig2) shows the\
    \ actual execution plan for the SQL code for this query before a primary XML index\
    \ is created.\n\n![A435478_1_En_7_Fig2_HTML.jpg](A435478_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2.\n\nShowing the execution plan before the primary XML index is created\n\
    \n```\nSELECT PersonID, Demographics\nFROM dbo.PersonXML\nWHERE Demographics.exist('declare\
    \ default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nIndividualSurvey[TotalPurchaseYTD > 9000]') = 1;\nListing 7-3.\nSampling XQuery\
    \ with a filter\n```\n\nLooking at the execution plan that is created for the\
    \ XQuery is different by several steps that are not typical for T-SQL queries:\n\
    \n*   Table Valued Function [XML Reader with XPath filter]\n*   Table Valued Function\
    \ [XML Reader]\n\nTwo of these steps have the highest percentage of the total\
    \ query cost, 92% and 7%, respectively. These steps specify the XML runtime shredding\
    \ mechanism and is very similar to a table scan for a normal relational SQL query.\
    \ That means, depending on how big your XML instance is, the XML shredding process\
    \ could potentially be very costly in terms of performance. Figure [7-3](#A435478_1_En_7_Chapter.html#Fig3)\
    \ demonstrates the Table Valued Function [XML Reader] step property values.\n\n\
    ![A435478_1_En_7_Fig3_HTML.jpg](A435478_1_En_7_Fig3_HTML.jpg)\n\nFigure 7-3.\n\
    \nShowing a Table Valued Function [XML Reader] step property\n\n```\nCREATE PRIMARY\
    \ XML INDEX IX_PXML_PersonXML_Demographics\nON dbo.PersonXML\n(\nDemographics\n\
    );\nGO\nListing 7-4.\nCreating the XML Primary index\n```\n\nOnce the primary\
    \ XML index is created, you can re-run the query from Listing [7-5](#A435478_1_En_7_Chapter.html#Par15)\
    \ (same as Listing [7-2](#A435478_1_En_7_Chapter.html#Par6)) with the actual execution\
    \ plan enabled on SSMS:\n\n```\nSELECT PersonID, Demographics\nFROM dbo.PersonXML\n\
    WHERE Demographics.exist('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nIndividualSurvey[TotalPurchaseYTD > 9000]') = 1;\nListing 7-5.\nQuerying the\
    \ PersonXML table with a Primary XML index\n```\n\nIn the resulting execution\
    \ plan, the Table Valued Function [XML Reader with XPath filter] step and Table\
    \ Valued Function [XML Reader] are replaced with a Clustered Index Seek(PrimaryXML)\
    \ step. Figure [7-4](#A435478_1_En_7_Chapter.html#Fig4) demonstrates the returned\
    \ execution plan.\n\n![A435478_1_En_7_Fig4_HTML.jpg](A435478_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4.\n\nShowing the execution plan after PRIMARY XML index created\n\n\
    Figure [7-5](#A435478_1_En_7_Chapter.html#Fig5) demonstrates a Clustered Index\
    \ Seek (PrimaryXML) step property. With the primary XML index, the Estimated Operator\
    \ Cost went down from 35782.9 (92%) for the Table Valued Function [XML Reader]\
    \ step to 21.2796 (46%) for the Clustered Index Seek (PrimaryXML) step.\n\n![A435478_1_En_7_Fig5_HTML.jpg](A435478_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5.\n\nShowing the Clustered Index Seek(PrimaryXML) step property\n\n\
    The CREATE PRIMARY XML INDEX statement has three parts to identify the index name,\
    \ the table on which to create the index, and the name of the XML column on which\
    \ to create the index, as shown below:\n\n```\nCREATE PRIMARY XML INDEX \nON \n\
    (  );\n```\n\nWhen creating a primary XML index, you need to follow several rules\
    \ :\n\n*   The table that contains the XML column must have a clustered primary\
    \ key.\n*   When a primary XML index exists, the clustered primary key of the\
    \ table cannot be dropped or altered with DDL statements. All XML indexes must\
    \ be dropped before modifying the primary key.\n*   A primary XML index can be\
    \ created on a single XML type column.\n*   Each XML index must have a database-wide\
    \ unique name.\n*   You cannot separately specify filegroup or partitioning information\
    \ for the user table when creating an XML index.\n*   When the primary XML index\
    \ is dropped, all secondary XML indexes relying on it are dropped automatically.\n\
    *   Set IGNORE_DUP_KEY and ONLINE options OFF for XML indexes.\n*   Primary XML\
    \ indexes have the same restrictions on names as views have on their names.\n\
    *   Only tables with an XML type column can have an XML index. A view, table-valued\
    \ variable with XML type columns, or XML type variables cannot have an XML index.\n\
    *   No XML indexes should exist when changing an XML type column from untyped\
    \ to typed XML. The ALTER TABLE ALTER COLUMN option could be used if an XML index\
    \ exists on the table. The XML indexes must be dropped before the column type\
    \ can be changed.\n*   The following session options must be set to ON when an\
    \ XML index is created: ARITHABORT ANSI_NULLS ANSI_PADDING ANSI_WARNINGS CONCAT_NULL_YIELDS_NULL\
    \ QUOTED_IDENTIFIER\n*   The option NUMERIC_ROUNDABORT must be set to OFF when\
    \ an XML index is created.\n\nA primary XML index can improve XQuery performance\
    \ significantly. Therefore, XML indexing can be a very attractive solution to\
    \ improving SQL Server XQuery performance. However, there are several considerations\
    \ associated with XML indexing. First of all, adding a primary XML index might\
    \ consume a large amount of storage space. When a PRIMARY XML index is created,\
    \ SQL Server shreds the XML data in a given column into relational format, accessible\
    \ only by the query execution engine. That could potentially consume more than\
    \ double the storage space required to store the unindexed XML data.\n\nConsider\
    \ these recommendations when deciding whether to add a primary XML index:\n\n\
    *   Often times, an XML index is not needed if the XML columns are not part of\
    \ an XQuery process.\n*   Determine your query profiles. An XML index is worth\
    \ considering if you are querying against a large number of rows at a time or\
    \ if your XML data is large in size. If these conditions do not apply, then the\
    \ storage cost could outweigh the efficiency.\n*   A good reason for adding a\
    \ primary XML index is if you need to add a secondary XML index to increase the\
    \ efficiency of a specific class of queries (discussed in the next three sections).\
    \ Adding a primary XML index is mandatory if you wish to add secondary XML indexes.\n\
    \n## 7-2 Creating a Secondary PATH Type Index\n\n### Problem\n\nYou want to improve\
    \ am XML column filtering with the exist() method."
