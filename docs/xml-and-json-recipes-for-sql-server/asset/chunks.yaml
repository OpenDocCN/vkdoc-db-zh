    ';\nSET @XMLDoc.modify('delete /Root/ProductDescription/@*')\nSELECT @XMLDoc;\n\
    ```\n\n清单 5-14. 删除 `ProductDescription` 元素的所有属性\n\n结果如图 5-10 所示。\n\n![A435478_1_En_5_Fig10_HTML.jpg](img/A435478_1_En_5_Fig10_HTML.jpg)\n\
    \n图 5-10. `<ProductDescription>` 元素所有属性被删除后的结果展示\n\n## 5-10. 删除 XML 元素\n\n###\
    \ 问题\n\n你想从 XML 实例中删除一个元素。\n\n### 解决方案\n\n从 XML 实例中移除元素的机制与移除属性非常相似。从示例 XML 中删除`Color`元素的解决方案在清单\
    \ 5-15 中演示。\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription\
    \ ProductName=\"Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n\
    \    <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n    <Feature>Strong\
    \ long lasting</Feature>\n  </Features>\n</ProductDescription>\n';\nSET @XMLDoc.modify('delete\
    \ /Root/ProductDescription/Features/Color')\nSELECT @XMLDoc;\n```\n\n清单 5-15.\
    \ 从 XML 实例中删除 `Color` 元素\n\n结果如图 5-11 所示。\n\n![A435478_1_En_5_Fig11_HTML.jpg](img/A435478_1_En_5_Fig11_HTML.jpg)\n\
    \n图 5-11. 从 XML 实例中删除 `Color` 元素后的结果\n\n### 工作原理\n\n要从 XML 实例中删除元素，`modify()`方法指定`delete`语句和指向目标元素的\
    \ XPath 路径。当 XML 中有多个同名元素时，删除特定元素需要单例，例如：\n\n```\n<Color>Aluminium</Color>\n<Color>Silver</Color>\n\
    <Color>Blue</Color>\n<Feature>Strong long lasting</Feature>\nmodify('delete /Root/ProductDescription/Features/Color[1]')\n\
    ```\n\n删除后的结果是`<Color>Silver</Color>`消失，`<Color>Blue</Color>`保留。\n\n要从父元素中删除所有子元素，XPath\
    \ 应指向父元素加上`/*`，如清单 5-16 所示。\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription\
    \ ProductName=\"Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n\
    \    <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n    <Feature>Strong\
    \ long lasting</Feature>\n  </Features>\n</ProductDescription>\n';\nSET @XMLDoc.modify('delete\
    \ /Root/ProductDescription/Features/*')\nSELECT @XMLDoc;\n```\n\n清单 5-16. 从 `Features`\
    \ 元素中删除所有子元素\n\n结果如图 5-12 所示。\n\n![A435478_1_En_5_Fig12_HTML.jpg](img/A435478_1_En_5_Fig12_HTML.jpg)\n\
    \n图 5-12. `Features` 元素所有子元素被删除后的 XML 结果\n\n要删除注释、处理指令，甚至是元素内的文本，你可以将节点测试与`delete`一起使用，如清单\
    \ 5-17 所示。结果如图 5-13 所示。\n\n![A435478_1_En_5_Fig13_HTML.jpg](img/A435478_1_En_5_Fig13_HTML.jpg)\n\
    \n图 5-13. 删除结果展示\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription\
    \ ProductName=\"Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n\
    \    <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n    <Feature>Strong\
    \ long lasting</Feature>\n  </Features>\n</ProductDescription>\n';\nSET @XMLDoc.modify('delete\
    \ (/Root/ProductDescription/Features/comment())[1]');\nSET @XMLDoc.modify('delete\
    \ (/Root/ProductDescription/Features/Color/text())[1]');\nSET @XMLDoc.modify('delete\
    \ (/Root/ProductDescription/Features/processing-instruction())[1]');\nSELECT @XMLDoc;\n\
    ```\n\n清单 5-17. 使用节点测试删除其他类型的 XML 节点\n\n## 总结\n\n`modify()`方法为操作 XML 实例的节点提供了全面的解决方案。这些指令：\n\
    \n*   `insert`\n*   `replace value of`\n*   `delete`\n\n这些指令能够以相对简单的语法修改 XML 实例中的任何元素和属性。\n\
    \n在下一章中，配方将涵盖如何高效地过滤 XML。\n\n"
- fmt: '# 6. Filtering XML


    The filtering mechanism for XQuery has some differences and specifications when
    compared to the T-SQL WHERE clause. In my experience, when DBAs and Developers
    implement filters for XQuery, it is mostly based on a T-SQL strategy or to create
    dynamic SQL that is not efficient and could be very difficult to maintain, especially
    when the filter is implemented as dynamic SQL. This chapter will demonstrate many
    examples of how to implement filters for XQuery requests.


    ## 6-1. Implementing the exist( ) Method


    ### Problem


    You want to determine whether a specific element or attribute exists within your
    XML data.


    ### Solution


    The `exist()` method allows you to determine whether an element or attribute exists
    within an XML instance. Listing [6-1](#A435478_1_En_6_Chapter.html#Par4) is a
    demonstration of using the `exist()` method to retrieve all XML instances containing
    the `YearlyIncome` element directly below the root `IndividualSurvey` element.


    ```sql

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    Demographics

    FROM Person.Person

    WHERE Demographics.exist(''IndividualSurvey/YearlyIncome'') = 1;

    Listing 6-1.

    Retrieving the instances that contains the YearrlyIncome element

    ```


    The query result is demonstrated in Figure [6-1](#A435478_1_En_6_Chapter.html#Fig1).


    ![A435478_1_En_6_Fig1_HTML.jpg](A435478_1_En_6_Fig1_HTML.jpg)


    Figure 6-1.


    Filtering data by the `YearlyIncome` element


    ### How It Works


    The `exist()` method verifies the existence of a provided argument and then returns:


    *   `TRUE` (a bit value of `1`), when the XQuery expression returns a nonempty
    result.

    *   `FALSE` (a bit value of `0`), when the XQuery expression returns an empty
    result.

    *   `NULL` when a `NULL` is passed in as the XQuery expression or the XML instance
    is `NULL`.


    Therefore, to detect whether the `YearlyIncome` element is contained in an XML
    instance, the `exist()` method accepts an XQuery expression that returns one or
    more `YearlyIncome` elements when applied to the XML instance. The XML in Listing
    [6-2](#A435478_1_En_6_Chapter.html#Par11) is a sample of the XML that the query
    in Listing [6-1](#A435478_1_En_6_Chapter.html#Par4) is run against.


    ```xml

    -16.01

    2003-09-01Z

    1961-02-23Z

    M

    25001-50000

    M


    Graduate Degree

    Clerical


    0-1 Miles


    Listing 6-2.

    Sample XML data

    ```


    The XML in Listing [6-2](#A435478_1_En_6_Chapter.html#Par11) has a relatively
    simple structure. The root element is `IndividualSurvey`, and it can contain up
    to 13 child elements.


    To query this XML and return all rows where the XML instances contain the `YearlyIncome`
    element, we need to refer to the XML namespace. In the provided solution, for
    simplicity, the XML namespace is set to `DEFAULT`, as shown below:


    ```sql

    WITH XMLNAMESPACES(DEFAULT

    ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey'')

    ```


    In the `WHERE` clause, the `exist()` method takes an XQuery expression that targets
    our element. The `exist()` method will return `TRUE` when the XQuery expression
    returns a nonempty result :


    ```sql

    WHERE Demographics.exist(''IndividualSurvey/YearlyIncome'') = 1

    ```


    When the `YearlyIncome` element is present within an XML instance, the `exist()`
    method returns a value of `1`, (numeric for `TRUE`), and the row provides the
    result set.


    The same mechanism is used to detect an attribute, with some minor syntax differences
    required by XQuery to match attributes. The XML provided from the `Demographics`
    column does not have attributes. Sample 6-2 demonstrates when the `YearlyIncome`
    element has the attribute `currency`.


    ```sql

    DECLARE @survey XML = N''


    -16.01

    2003-09-01Z

    1961-02-23Z

    M

    25001-50000

    M


    Graduate Degree

    Clerical


    0-1 Miles

    Sample 6-2.

    Showing the YearlyIncome element with currency as an attribute


    </IndividualSurvey>'';

    ```


    In this particular case the solution will be as demonstrated in Listing [6-3](#A435478_1_En_6_Chapter.html#Par21).


    ```sql

    WITH XMLNAMESPACES

    (

    DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT @survey,

    CASE WHEN @survey.exist(''IndividualSurvey/YearlyIncome/@currency'') = 1 THEN
    N''IndividualSurvey/YearlyIncome/@currency attribute is present.''

    ELSE N''currency attribute is NOT present.''

    END AS hasCurrency;

    Listing 6-3.

    Searching for an attribute @currency

    ```


    As demonstrated, to detect the attributes you need to provide an XPath to the
    attribute.


    ## 6-2. Filtering an XML Value with the exist( ) Method


    ### Problem


    You want to filter an XML column by value, but the query does not implement XQuery
    Methods, such as `nodes()`, `value()`, and `query()`.


    ### Solution


    The `exist()` method can provide filtering against XML text nodes, especially
    when the XML instances need to be inspected for a specific searching condition.
    At the same time, the `SELECT` clause does not have any XQuery processes . Listing
    [6-4](#A435478_1_En_6_Chapter.html#Par25) retrieves all XML instances where the
    `TotalPurchaseYTD` element contains a value greater than `9,000`.


    ```sql

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    Demographics

    FROM Person.Person

    WHERE Demographics.exist(''IndividualSurvey[TotalPurchaseYTD > 9000]'') = 1;

    Listing 6-4.

    Using XQuery to filtering XML instances by values

    ```


    Figure [6-2](#A435478_1_En_6_Chapter.html#Fig2) displays the query result.


    ![A435478_1_En_6_Fig2_HTML.jpg](A435478_1_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    Returning the rows where the `TotalPurchaceYTD` is greater than `9000.00`'
