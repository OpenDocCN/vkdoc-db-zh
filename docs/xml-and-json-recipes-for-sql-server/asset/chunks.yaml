    ## 7. 提升 XML 性能


    性能效率始终是 DBA 和开发人员最关心的问题。索引是提高数据传递过程的首选方法。然而，XML 数据的逻辑树结构无法像普通的关系数据那样进行索引。因此，随着
    SQL Server 2005 的推出，Microsoft 为 XML 数据类型列添加了一种索引机制。XML 数据与表中列的标量数据不同，因此 XML 索引机制提供了专门的主
    XML 索引和辅助 XML 索引。在 SQL Server 2012 中，XML 索引通过选择性 XML 索引进行了增强，这提高了对大型 XML 数据的搜索效率。


    ### 7-1 创建主 XML 索引


    #### 问题


    你想要改进对 XML 数据类型列的过滤过程。


    #### 解决方案


    添加主 XML 索引可以改进对 XML 数据类型列的过滤过程。为了演示，我们将创建一个包含 XML 列的新表，向其中填充数据，然后在其上创建主 XML 索引。清单
    7-1 演示了如何在新表的 `Demographic` 列上创建主 XML 索引。图 7-1 显示了创建的索引。


