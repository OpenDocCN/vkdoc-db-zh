  trans: '### 工作原理


    `OPENXML` 函数是在 SQL Server 2000 中引入的，当时 `XML` 数据类型尚不存在。因此，每个 `XML` 文档都需要从诸如 `VARCHAR`、`NVARCHAR`、`BINARY`、`IMAGE`、`TEXT`
    和 `NTEXT` 等数据类型转换成一种可由 `MSXML` 操作的内部格式。这是通过 `sp_xml_preparedocument` 存储过程完成的。


    自 SQL Server 2005 引入 `XML` 数据类型以来，`XML` 的分解和构建过程得到了极大简化。`XQuery` 语言直接与 `XML` 数据类型配合工作。因此，当分解过程基于
    `XML` 数据类型时，就不再需要额外的步骤来准备 `XML` 数据；或者，也可以使用 `CAST()` 和 `CONVERT()` 函数将 `XML` 数据显式转换为
    `XML` 数据类型。


    `CONVERT` 和 `CAST` 函数之间的区别在于，`CONVERT` 函数不属于 `ANSI-SQL` 规范，而 `CAST` 是。然而，最重要的是，`CONVERT`
    有一个可选的第三个参数，该参数为转换过程提供了额外的功能，例如控制空白处理或应用内联文档类型定义（`DTD`）。以下是 `CONVERT` 函数的 `XML`
    样式参数值说明：


    *   `0` – （默认值）丢弃 `XML` 中无关紧要的空白，并且不允许使用内部 `DTD`。

    *   `1` – 保留 `XML` 中无关紧要的空白。但是，不允许使用内部 `DTD`。

    *   `2` – 丢弃无关紧要的空白，并启用有限的内部 `DTD`。

    *   `3` – 保留无关紧要的空白，并启用有限的内部 `DTD`。


    清单 4-2 展示了将 `OPENXML` 函数迁移到 `XQuery` 语言的解决方案。第一行声明了 `XML` 变量，如清单 4-11 所示。


    ```

    DECLARE @xml XML;

    清单 4-11.

    声明 XML 变量

    ```


    接下来，我们将 `XML` 数据值赋给该变量，如清单 4-12 所示。


    ```

    SELECT @xml = Instructions

    FROM Production.ProductModel

    WHERE ProductModelID = 7;

    清单 4-12.

    填充 XML 变量

    ```


    要分解具有 `xml` 命名空间的 `XML` 文档（如清单 4-2 所示），我们需要声明 `XML` 命名空间的实例。SQL Server 的 `WITH
    XMLNAMESPACES` 子句允许我们列出并实例化 `XML` 命名空间。`WITH XMLNAMESPACES` 子句的声明语法结合了 `WITH`
    和 `XMLNAMESPACES` 关键字。编写此 `T-SQL` 代码时，请务必确保 `WITH` 结构前有一个分号（`;`）。


    **提示**


    良好的实践是让所有 `SQL` 语句以分号（`;`）终止。`WITH XMLNAMESPACES` 子句与 `WITH CTE` 子句类似，必须始终通过分号与前面的语句分隔开。否则，`SQL
    Server` 将会抛出错误。


    为了与清单 4-1 中的旧语法匹配，此示例创建了相同的 `xml` 命名空间名称，使用 "`df`" 作为前缀，如清单 4-13 所示。


    ```

    WITH XMLNAMESPACES(''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions''
    as df)

    清单 4-13.

    声明带前缀 “df” 的 XML 命名空间

    ```


    然而，当 `XML` 文档只有一个 `XML` 命名空间时，该命名空间可以被声明为 `DEFAULT`，无需为 `XML` 命名空间指定显式的命名空间前缀。清单
    4-14 展示了使用默认 `xml` 命名空间分解 `XML` 文档。


    ```

    WITH XMLNAMESPACES(DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'')

    SELECT RTRIM(LTRIM(REPLACE(instruct.value(''.'', ''varchar(2000)''), CHAR(10),
    ''''))) AS StepInstruction

    instruct.value(''../@LocationID'', ''int'') AS LaborStation,

    instruct.value(''../@LaborHours'', ''real'') AS LaborHours,

    instruct.value(''../@LotSize'', ''int'') AS LotSize,

    instruct.value(''../@MachineHours'', ''real'') AS MachineHours,

    instruct.value(''../@SetupHours'', ''real'') AS SetupHours,

    instruct.value(''material[1]'', ''varchar(100) '') AS Material,

    instruct.value(''tool[1]'', ''varchar(100) '') AS Tool

    FROM @xml.nodes(''root/Location/step'') prod(instruct);

    WITH XMLNAMESPACES(''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions''
    as df)

    SELECT RTRIM(LTRIM(REPLACE(instruct.value(''.'', ''varchar(2000)''), CHAR(10),
    ''''))) AS StepInstruction,

    instruct.value(''../@LocationID'', ''int'') AS LaborStation,

    instruct.value(''../@LaborHours'', ''real'') AS LaborHours,

    instruct.value(''../@LotSize'', ''int'') AS LotSize,

    instruct.value(''../@MachineHours'', ''real'') AS MachineHours,

    instruct.value(''../@SetupHours'', ''real'') AS SetupHours,

    instruct.value(''df:material[1]'', ''varchar(100) '') AS Material,

    instruct.value(''df:tool[1]'', ''varchar(100) '') AS Tool

    FROM @xml.nodes(''df:root/df:Location/df:step'') prod(instruct);

    清单 4-14.

    使用 DEFAULT xml 命名空间以及再次使用 “df” 前缀分解 XML 文档

    ```


    要从 `XML` 文档返回表结构的结果集，我们需要提供元素路径，然后指定元素和属性值。`nodes()` 方法类似于用于提供元素引用的 `OPENXML`
    函数；然而，区别如下：


    使用 `OPENXML` 设置对 `XML` 文档的访问


    ```

    FROM OPENXML(@doc, ''df:root/df:Location/df:step'', 2)

    ```


    与使用 `nodes()` 方法设置对 `XML` 变量的访问进行比较


    1.  `XML` 数据类型 `nodes()` 方法与 `OPENXML` 函数的主要区别在于，`XQuery` 期望的是 `XML` 数据类型；因此，不需要
    `XML` 处理器（`@doc` 变量）。

    2.  `nodes()` 方法不使用映射 `@flags` 参数。


    ```

    FROM @xml.nodes(''df:root/df:Location/df:step'') prod(instruct)

    ```


    元素位置路径对于 `OPENXML` 函数和 `nodes` 方法是相同的。重要的是要注意，`nodes()` 方法需要一个完全限定的别名，例如 `table(column)`。在清单
    4-14 中，别名是 `prod(instruct)`。在我个人的 `SQL` 脚本中，我使用 `T(C)` 别名，它简短而简单，但在生产环境中，我建议使用比
    `T(C)` 更具体的名称。


    要构造 `XML` 输出，`OPENXML` 函数必须使用 `WITH()` 结构，而使用 `XQuery` 时，`value()` 方法表示元素和属性值，并且不使用
    `WITH()` 结构。`WITH()` 结构和 `value()` 方法之间的主要区别在于，`WITH()` 结构的语法序列是 `别名 + 数据类型 +
    项`，而 `value()` 方法则正好相反：`项 + 数据类型 + 别名`；例如：


    ```

    OPENXML 输出规范的一部分

    WITH (

    LaborStation INT ''../@LocationID'',

    LaborHours REAL ''../@LaborHours'',

    LotSize INT ''../@LotSize '',

    MachineHours REAL ''../@MachineHours '',

    SetupHours REAL ''../@SetupHours '',

    Material VARCHAR(100) ''df:material'',

    Tool VARCHAR(100) ''df:tool'',

    StepInstruction VARCHAR(2000) ''.''

    )

    ```


    与 `XQuery` 输出规范进行比较


    ```

    SELECT  instruct.value(''.'', ''varchar(2000)'') AS StepInstruction,

    instruct.value(''../@LocationID'', ''int'') AS LaborStation,

    instruct.value(''../@LaborHours'', ''real'') AS LaborHours,

    instruct.value(''../@LotSize'', ''int'') AS LotSize,

    instruct.value(''../@MachineHours'', ''real'') AS MachineHours,

    instruct.value(''../@SetupHours'', ''real'') AS SetupHours,

    instruct.value(''df:material[1]'', ''varchar(100) '') AS Material,

    instruct.value(''df:tool[1]'', ''varchar(100) '') AS Tool

    ```


    `value()` 方法有两个参数：


    1.  指示元素或属性的 `XPath` 路径。

    2.  用于转换的目标数据类型。


    两个参数都是 `NVARCHAR` 类型；因此，值必须用单引号括起来，并且 `value()` 方法必须基于在 `nodes()` 方法中指定的列别名。如果未指定引用，将抛出错误
    “Msg 195, Level 15, State 10, Line # ‘value’ is not a recognized built-in function
    name”。


    `OPENXML() WITH` 子句与 `value()` 方法之间另一个重要的区别是，`value()` 方法需要一个单例原子值，对于元素引用，用基于
    1 的索引引用（"`[1]`"）来指示。例如：


    ```

    instruct.value(''df:material[1]'', ''VARCHAR(100)'') AS Material

    ```


    指示的单例原子值具有一个基于 1 的数组索引（大多数现代编程语言实现基于 0 的数组索引）。这为 `XML` 数据提供了多次列出相同元素名称的能力。例如，`XML`
    多次列出了 `Address` 元素：


    ```

    <Address>Line 1</Address>

    <Address>Line 2</Address>

    <Address>Line 3</Address>

    ```


    在这种情况下，为了显示所有三行 `Address`，`value()` 方法代码将如下所示：


    ```

    c.value(''Address[1]'', ''VARCHAR(100)'') AS Line1

    c.value(''Address[2]'', ''VARCHAR(100)'') AS Line2

    c.value(''Address[3]'', ''VARCHAR(100)'') AS Line3

    ```


    当缺少单例时，编译器将抛出错误：“Msg 2389, Level 16, State 1, Line # XQuery [value()]: ‘value()’
    requires a singleton (or empty sequence).”。因此，在使用 `value()` 方法时，请务必确保为元素提供了单例原子值。'
- fmt: '## 4-3. Shredding XML from a Column


    ### Problem


    Shredding the XML documents that is shown in previous recipes (4-1 and 4-2) is
    a cursor process required to navigate from one XML value to another. You need
    to shred the XML across the table’s column without opening the cursor.


    ### Solution


    Recipes 4-1 and 4-2 are based on shredding the XML content of a single XML variable
    one at a time. However, in many situations we need to shred the XML across an
    entire table or at least multiple rows, as demonstrated in Listing [4-15](#A435478_1_En_4_Chapter.html#Par114).


    ```

    United Security

    BM

    Mountain

    ISDN

    ```

    Listing 4-15. Showing the XML from table `Sales.Store` column `Demographics`


    The `XML` data type allows you to shred the XML data from not only an `XML` variable,
    but also directly from an `XML` type column in a table. Listing [4-16](#A435478_1_En_4_Chapter.html#Par116)
    demonstrates how to query the XML column.


    ```sql

    WITH XMLNAMESPACES(default ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT details.value(''AnnualSales[1]'', ''MONEY'') AS AnnualSales,

    details.value(''AnnualRevenue[1]'', ''MONEY'') AS AnnualRevenue,

    details.value(''BankName[1]'', ''VARCHAR(50)'') AS BankName,

    details.value(''BusinessType[1]'', ''VARCHAR(10)'') AS BusinessType,

    details.value(''YearOpened[1]'', ''INT'') AS YearOpened,

    details.value(''Specialty[1]'', ''VARCHAR(50)'') AS Specialty,

    details.value(''SquareFeet[1]'', ''INT'') AS SquareFeet,

    details.value(''Brands[1]'', ''VARCHAR(10)'') AS Brands,

    details.value(''Internet[1]'', ''VARCHAR(10)'') AS Internet,

    details.value(''NumberEmployees[1]'', ''SMALLINT'') AS NumberEmployees

    FROM Sales.Store

    CROSS APPLY Demographics.nodes(''StoreSurvey'') survey(details);

    ```

    Listing 4-16. Showing the XQuery code to return the result set from the XML column


    The results are shown in Figure [4-2](#A435478_1_En_4_Chapter.html#Fig2).


    ![A435478_1_En_4_Fig2_HTML.jpg](A435478_1_En_4_Fig2_HTML.jpg)

    Figure 4-2. Resulting from XQuery process


    ### How It Works


    The XML document from the table `Sales.Store`, column `Demographics` demonstrated
    in Listing [4-17](#A435478_1_En_4_Chapter.html#Par124) is relatively simple. The
    XML has the root element `<StoreSurvey>`, and all subsequent elements are children
    of this XML root. This is a one-level deep XML structure. Such a structure is
    common in production environments, because database designers prefer to keep a
    simple XML structure within a column, when possible for performance reasons. Therefore,
    to convert XML data into rows, we need to provide a reference to the root element
    in the `nodes()` method. After that, the `value()` method displays each element
    in a separate column, as shown previously in Figure [4-2](#A435478_1_En_4_Chapter.html#Fig2).


    To navigate over the table’s column, SQL Server 2005 introduced two operators:

    1.  `CROSS APPLY` – allows a table-valued function to be invoked on each row returned
    by an outer-table expression of a query. The XML `nodes()` method is treated as
    a table-valued function in terms of `CROSS APPLY`.

    2.  `OUTER APPLY` - equivalent to `LEFT OUTER JOIN`, when the result set returns
    all rows from the outer-table expression of a query.


    The solution is in Listing [4-16](#A435478_1_En_4_Chapter.html#Par116), implementing
    `CROSS APPLY` operator for the query. However, the `OUTER APPLY` operator returns
    the same result set, because the `Demographics` column does not have any rows
    containing `NULL` values.


    Let’s compare the differences between shredding the XML value based on the `XML`
    variable in Listing [4-17](#A435478_1_En_4_Chapter.html#Par124), and the table’s
    column demonstrated in Listing [4-15](#A435478_1_En_4_Chapter.html#Par114).


    ```sql

    DECLARE @x XML;

    SELECT @x = Demographics  FROM Sales.Store  WHERE BusinessEntityID = 292;

    WITH XMLNAMESPACES(default ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT details.value(''AnnualSales[1]'', ''MONEY'') AS AnnualSales,

    details.value(''AnnualRevenue[1]'', ''MONEY'') AS AnnualRevenue,

    details.value(''BankName[1]'', ''VARCHAR(50)'') AS BankName,

    details.value(''BusinessType[1]'', ''VARCHAR(10)'') AS BusinessType,

    details.value(''YearOpened[1]'', ''INT'') AS YearOpened,

    details.value(''Specialty[1]'', ''VARCHAR(50)'') AS Specialty,

    details.value(''SquareFeet[1]'', ''INT'') AS SquareFeet,

    details.value(''Brands[1]'', ''VARCHAR(10)'') AS Brands,

    details.value(''Internet[1]'', ''VARCHAR(10)'') AS Internet,

    details.value(''NumberEmployees[1]'', ''SMALLINT'') AS NumberEmployees

    FROM @x.nodes(''StoreSurvey'') survey(details);

    ```

    Listing 4-17. Shredding XML variable


    The major SQL code differences are seen in Listing [4-18](#A435478_1_En_4_Chapter.html#Par137).
    When we reference the variable in the `FROM` clause the `nodes()` method applied
    to a variable returns a rowset that represents the result of shredding a single
    document. This is as opposed to `CROSS APPLY` against a table, which shreds the
    XML from each row of the table and generates a single rowset. Listing [4-17](#A435478_1_En_4_Chapter.html#Par124)
    shows the code difference between shredding an XML variable and column.


    ```sql

    FROM @x.nodes(''StoreSurvey '') survey(details);

    ```

    Shredding XML from a variable, and compare to:


    ```sql

    FROM Sales.Store CROSS APPLY Demographics.nodes(''StoreSurvey'') survey(details);

    ```

    Shredding XML from a column


    The `SELECT` clause is identical for both the variable and column shredding processes.
    To retrieve an element value, the `value()` method needs to be given the XPath
    path indicating the element name with a singleton index indicator and the data
    type. For example: `details.value(''SquareFeet[1]'', ''INT'') AS SquareFeet.`


    It is always good practice to list the column alias in the `SELECT` clause. We
    do not receive an error when the alias is missing, and personally, I prefer not
    to receive a result with the default column name “(No column name).”


    Caution


    The XML elements and attributes are case sensitive; therefore, when the elements
    and attributes are referenced in the `value()` method then the case must be identical
    to the XML document. Otherwise, for XML type columns, the parser will throw an
    error. For example, when the element `AnnualSales` is specified as `details.value(‘annualsales[1]’,
    ‘money’)` then you will receive the error: Msg 2263, Level 16, State 1, Line 2
    XQuery `[Sales.Store.Demographics.value()]`: There is no element named “{ `http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey}:annualsales`
    ” in the type element “({ `http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey}:StoreSurvey,#anonymous`
    )”. If the XML value stores the columns as untyped XML then the shredding result
    of the incorrectly specified item will be `NULL`. The same applies to the XML
    variable. I keep warning my readers about XML case sensitivity because it is the
    most common mistake for those who are new to XQuery. SQL Server T-SQL does not
    raise any errors when we type the function `CASE`, for instance, in lower, upper,
    or mixed case. However, XQuery does not provide us with such a convenient luxury
    and we must follow the case rules. However, when an SQL Server instance or a database
    is installed in any type of binary collation, then object name metadata (tables,
    columns, etc.) is case sensitive.


    ## 4-4. Dealing with Legacy XML Storage


    ### Problem


    You want to process XML data that has been stored in a table column as a data
    type other than `XML`.'
