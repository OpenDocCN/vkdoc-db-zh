  trans: "\n### 工作原理\n\n在 SQL Server 中，JSON 并不像 XML 那样被视为一种数据类型。它更类似于一个包含多个值的结构化字符串，并以\
    \ `nvarchar(max)` 数据类型存储（如果你遵循 Microsoft 的建议）。因此，存储 JSON 文档的列无法像标量值表列那样拥有传统索引。然而，可以通过\
    \ `JSON_VALUE()` 标量函数获取一个标量 JSON 值，这正是为 JSON 文档创建索引的关键。\n\n为 JSON 文档创建索引机制包含两个步骤：\n\
    \n1.  使用 `JSON_VALUE()` 函数向表添加一个计算列，该函数从 JSON 文档中返回一个标量值。计算列必须使用 `PERSISTED` 选项。另外，你需要记住\
    \ `JSON_VALUE()` 函数返回的数据类型是 `nvarchar(4000)`。因此，我建议将 `JSON_VALUE()` 函数返回的数据长度转换为更接近原始数据的长度。例如：\n\
    \    ```sql\n    CAST(JSON_VALUE([ReturnedDeliveryData], '$.Events[0].ConNote')\
    \ AS varchar(20)) PERSISTED\n    ```\n\n2.  在你的计算列上创建索引。根据需要，索引可以包含 `INCLUDE`\
    \ 子句来创建一个完全覆盖的索引。\n\n为 JSON 文档创建索引可以极大地提升性能。清单 9-25 展示了一个查询，该查询对 JSON 键元素 `ConNote`\
    \ 上的计算列应用了筛选器。\n\n```sql\nSET STATISTICS IO,TIME ON;\nSELECT [InvoiceDate]\n,[DeliveryInstructions]\n\
    ,[TotalDryItems]\n,[TotalChillerItems]\n,[ConfirmedDeliveryTime]\n,[ConfirmedReceivedBy]\n\
    ,[ConNote]\nFROM [Sales].[Invoices]\nWHERE [ConNote] = 'EAN-125-1051';\nSET STATISTICS\
    \ IO,TIME OFF;\n```\n*清单 9-25. 筛选 ConNote 列*\n\n图 9-11 展示了该查询的 \"STATISTICS IO,\
    \ TIME\" 结果和执行计划。清单 9-26 是该查询在索引创建前后的比较。\n\n![A435478_1_En_9_Figa_HTML.jpg](img/A435478_1_En_9_Figa_HTML.jpg)\n\
    \n```sql\n---- 无索引\nSQL Server parse and compile time:\nCPU time = 0 ms, elapsed\
    \ time = 0 ms.\n(1 row(s) affected)\nTable 'Invoices'. Scan count 9, logical reads\
    \ 8843, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
    \ reads 0, lob read-ahead reads 0.\nTable 'Worktable'. Scan count 0, logical reads\
    \ 0, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads\
    \ 0, lob read-ahead reads 0.\n(1 row(s) affected)\nSQL Server Execution Times:\n\
    CPU time = 94 ms,  elapsed time = 60 ms.\n```\n*清单 9-26. 比较索引创建前后的查询*\n\n![A435478_1_En_9_Fig11_HTML.jpg](img/A435478_1_En_9_Fig11_HTML.jpg)\n\
    *图 9-11. 比较索引创建前后的执行计划和 STATISTICS 结果*\n\n```sql\n---- 无索引\nSQL Server parse and\
    \ compile time:\nCPU time = 0 ms, elapsed time = 0 ms.\n(1 row(s) affected)\n\
    Table 'Invoices'. Scan count 9, logical reads 8843, physical reads 0, read-ahead\
    \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
    Table 'Worktable'. Scan count 0, logical reads 0, physical reads 0, read-ahead\
    \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
    (1 row(s) affected)\nSQL Server Execution Times:\nCPU time = 94 ms,  elapsed time\
    \ = 60 ms.\n---- 有索引\nSQL Server parse and compile time:\nCPU time = 0 ms, elapsed\
    \ time = 0 ms.\n(1 row(s) affected)\nTable 'Invoices'. Scan count 1, logical reads\
    \ 3, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads\
    \ 0, lob read-ahead reads 0.\n(1 row(s) affected)\nSQL Server Execution Times:\n\
    CPU time = 0 ms,  elapsed time = 33 ms.\n```\n\n如你所见，使用索引筛选后性能得到了显著提升。\n\n## 总结\n\
    \nSQL Server 2016 引入了 JSON 集成，与最新技术配合良好。第 9 章“将 JSON 转换为行集”介绍了完整的 SQL Server 函数集以及大量用于分解和交付\
    \ JSON 文档结果的示例。\n\n下一章将演示如何修改 JSON 文档，并最终比较 JSON 和 XML 的性能。\n\n# 10. 修改 JSON\n\
    \n为了在 JSON 文档中插入、删除和更新数据，SQL Server 2016 引入了 `JSON_MODIFY()` 函数，用于更新 JSON 字符串值。与\
    \ XML 的 `modify()` 方法相比，此函数仅支持追加模式，而 XML 方法则提供了插入、删除和替换模式。第 10 章“修改 JSON”将演示许多配方，解释如何更新\
    \ JSON 文档。在本章最后一节，我将比较 XML 和 JSON 之间的性能。\n\n## 10-1. 向 JSON 添加新的键值对\n\n### 问题\n\
    \n你想向 JSON 文档添加一个新的键值对。\n\n### 解决方案\n\n当第二个参数路径值在 JSON 文档中不存在时，`JSON_MODIFY()`\
    \ 函数会添加一个新的键值对。清单 10-1 展示了使用 `JSON_MODIFY()` 函数修改 `InvoiceDate` 列的查询，向 JSON 文档添加了一个新键\
    \ \"SentBy\"，其值为 \"John Smith\"。图 10-1 显示了包含原始 (`InvoiceDate`) 和修改后的 JSON 文档 (`NewInvoice`)\
    \ 列的结果。\n\n![A435478_1_En_10_Fig1_HTML.jpg](img/A435478_1_En_10_Fig1_HTML.jpg)\n\
    *图 10-1. 显示查询结果*\n\n```sql\nSELECT CustomerName\n, PrimaryContact\n, AlternateContact\n\
    , PhoneNumber\n, InvoiceDate\n, JSON_MODIFY(InvoiceDate,'$.SentBy', 'John Smith')\
    \ NewInvoice\nFROM [dbo].[CustomerInvoice];\n```\n*清单 10-1. 向 JSON 文档添加新的键值对*\n\
    \n### 工作原理\n\n`JSON_MODIFY()` 函数返回更新后的 JSON 文档。它有三个必需参数：\n\n1.  **表达式** – 列、变量或有效的硬编码\
    \ JSON 的名称。\n2.  **路径** – 指向值的键路径。仅支持追加模式。对于其他操作，如插入和更新，函数在自定义模式下工作。\n3.  **新值**\
    \ – 替换现有值或作为新值添加到 JSON 的值。\n\n要添加新的键值对，你不需要指定特殊模式。例如，要插入一个新值，你可以使用 `JSON_MODIFY()`\
    \ 函数，它是自定义的，这意味着如果路径包含一个现有的键，则更新其值。当键不存在时，一个新的键值对会被添加到 JSON 字符串中。\n\n在“解决方案”部分，清单\
    \ 10-1 中，首先使用 `JSON_MODIFY()` 函数检查 `InvoiceDate` 列中是否存在键 \"SentBy\"。例如：`JSON_MODIFY(InvoiceDate,'$.SentBy',\
    \ 'John Smith')`。在该列中未找到此键。因此，该函数添加了一个新键 \"SentBy\"，其值为 \"John Smith\"。\n\n##\
    \ 10-2. 更新现有的 JSON\n\n### 问题\n\n你想更改现有键的值。\n\n### 解决方案\n\n`JSON_MODIFY()` 函数的\
    \ `Path` 参数必须存在于 JSON 文档中。清单 10-2 演示了将键 \"Title\" 和值 \"Team Member\" 修改为 \"Manager\"\
    \ 的查询。图 10-2 显示了原始和修改后的 JSON 文档。\n\n![A435478_1_En_10_Fig2_HTML.jpg](img/A435478_1_En_10_Fig2_HTML.jpg)\n\
    *图 10-2. 比较查询输出*\n\n```sql\nSELECT CustomFields\n,JSON_MODIFY(CustomFields,'$.Title',\
    \ 'Manager') NewCustomFields\nFROM [Application].[People]\nWHERE FullName = 'Hudson\
    \ Onslow';\n```\n*清单 10-2. 修改 JSON 文档*\n"
- fmt: '### How It Works


    `JSON_MODIFY()` 函数是自定义的，如前面的配方 10-1 所解释。`CustomFields` 列中的 JSON 文档包含键“Title”。因此，当通过
    JSON 字符串检测到键路径时，`JSON_MODIFY()` 函数会更新其值属性。此概念将在解决方案部分的列表 [10-2](#A435478_1_En_10_Chapter.html#Par13)
    中演示。


    ## 10-3\. 从 JSON 中删除


    ### Problem


    你想从 JSON 文档中删除一个键值对。


    ### Solution


    如果需要删除键值对，请将 `JSON_MODIFY()` 函数的第三个参数 `NewValue` 设置为 `NULL`，如列表 [10-3](#A435478_1_En_10_Chapter.html#Par17)
    所示。图 [10-3](#A435478_1_En_10_Chapter.html#Fig3) 显示了原始和修改后的 JSON。


    ![A435478_1_En_10_Fig3_HTML.jpg](A435478_1_En_10_Fig3_HTML.jpg)


    图 10-3.


    比较删除键“Title”后的查询输出


    ```sql

    SELECT CustomFields

    ,JSON_MODIFY(CustomFields,''$.Title'', NULL) NewCustomFields

    FROM [Application].[People]

    WHERE FullName = ''Hudson Onslow'';

    ```

    列表 10-3.

    使用值 `NULL` 删除键“Title”


    ### How It Works


    当 `JSON_MODIFY()` 函数的第三个参数 (`NewValue`) 为 `NULL` 时，该键值对将从 JSON 中删除。此概念适用于键、对象和数组。列表
    [10-4](#A435478_1_En_10_Chapter.html#Par19) 演示了如何从 JSON 变量 `@j` 中删除数组“OtherLanguages”。表
    [10-1](#A435478_1_En_10_Chapter.html#Tab1) 对比了原始 JSON 和经过 `JSON_MODIFY()` 函数处理后的
    JSON。


    表 10-1.


    并排比较结果


    | 原始 JSON | 删除了数组 OtherLanguages 的 JSON |

    | --- | --- |

    | `{` `"OtherLanguages": [` `"Polish",` `"Chinese",` `"Japanese"` `],` `"HireDate":
    "2008-04-19T00:00:00",` `"Title": "Team Member",` `"PrimarySalesTerritory": "Plains",`
    `"CommissionRate": "0.98"` `}` | `{` `"HireDate": "2008-04-19T00:00:00",` `"Title":
    "Team Member",` `"PrimarySalesTerritory": "Plains",` `"CommissionRate": "0.98"`
    `}` |


    ```sql

    declare @j as nvarchar(MAX) =

    N''{

    "OtherLanguages": [

    "Polish",

    "Chinese",

    "Japanese"

    ],

    "HireDate": "2008-04-19T00:00:00",

    "Title": "Team Member",

    "PrimarySalesTerritory": "Plains",

    "CommissionRate": "0.98"

    }'';

    SELECT JSON_MODIFY(@j,''$.OtherLanguages'', NULL) DeletedOtherLanguages;

    ```

    列表 10-4.

    删除数组


    另一个例子演示了从分配给变量 `@j` 的 JSON 文档中删除对象“table”，如列表 [10-5](#A435478_1_En_10_Chapter.html#Par21)
    所示。表 [10-2](#A435478_1_En_10_Chapter.html#Tab2) 对比了原始 JSON 和经过 `JSON_MODIFY()`
    函数处理后的 JSON。


    表 10-2.


    并排比较结果


    | 原始 JSON | 删除了对象 table 的 JSON |

    | --- | --- |

    | `{` `"theme": "humanity",` `"dateFormat": "dd/mm/yy",` `"timeZone": "PST",`
    `"table": {` `"pagingType": "full",` `"pageLength": 50` `},` `"favoritesOnDashboard":
    true` `}` | `{` `"theme": "humanity",` `"dateFormat": "dd/mm/yy",` `"timeZone":
    "PST",` `"favoritesOnDashboard": true` `}` |


    ```sql

    declare @j nvarchar(MAX) =

    N''{

    "theme": "humanity",

    "dateFormat": "dd/mm/yy",

    "timeZone": "PST",

    "table": {

    "pagingType": "full",

    "pageLength": 50

    },

    "favoritesOnDashboard": true

    }'';

    SELECT JSON_MODIFY(@j,''$.table'', NULL) Delete_table;

    ```

    列表 10-5.

    从 JSON 文档中删除对象 “table”


    所有示例都展示了使用 `JSON_MODIFY()` 函数从 JSON 字符串中删除键、对象和数组是多么容易。


    ## 10-4\. 追加 JSON 属性


    ### Problem


    你想向现有数组添加一个新值。


    ### Solution


    `JSON_MODIFY()` 函数的追加模式指定需要将新值添加到现有的数组列表中。列表 [10-6](#A435478_1_En_10_Chapter.html#Par25)
    演示了如何向“OtherLanguages”数组添加新语言。带有 JSON 输出的返回结果的“前后”对比显示在图 [10-4](#A435478_1_En_10_Chapter.html#Fig4)
    中。


    ![A435478_1_En_10_Fig4_HTML.jpg](A435478_1_En_10_Fig4_HTML.jpg)


    图 10-4.


    显示新语言追加到 JSON 数组


    ```sql

    SELECT CustomFields

    ,JSON_MODIFY(CustomFields,''append $.OtherLanguages'', ''Greek'') AS

    AppendOtherLanguagesArray

    FROM [Application].[People]

    WHERE FullName = ''Isabella Rupp'';

    ```

    列表 10-6.

    将希腊语追加到 JSON 数组


    ### How It Works


    `JSON_MODIFY()` 函数提供了一个可选的追加模式。追加模式指定了路径参数，并指示 `JSON_MODIFY()` 函数向现有列表添加新值。当指定了追加模式但键路径不存在时，`JSON_MODIFY()`
    函数会创建一个新的键值对。例如，如果列表 [10-6](#A435478_1_En_10_Chapter.html#Par25) 中的解决方案查询在“OtherLanguages”数组以小写拼写时执行，如列表
    [10-7](#A435478_1_En_10_Chapter.html#Par27) 所示。此时，`JSON_MODIFY()` 函数会创建一个新的“otherlanguages”数组。结果如图
    [10-5](#A435478_1_En_10_Chapter.html#Fig5) 所示。


    ![A435478_1_En_10_Fig5_HTML.jpg](A435478_1_En_10_Fig5_HTML.jpg)


    图 10-5.


    显示带有重复数组的 JSON


    ```sql

    SELECT CustomFields

    ,JSON_MODIFY(CustomFields,''append $.otherlanguages'', ''Greek'') AS

    AppendOtherLanguagesArray

    FROM [Application].[People]

    WHERE FullName = ''Isabella Rupp'';

    ```

    列表 10-7.

    追加一个不存在的数组


    为避免此类错误，请确保为 `JSON_MODIFY()` 函数路径参数提供了正确的 JSON 路径。


    ## 10-5\. 使用多重操作进行修改


    ### Problem


    你想对 JSON 字符串应用多个值更改。


    ### Solution


    使用提供的参数为 `JSON_MODIFY()` 函数创建多个内联引用。列表 [10-8](#A435478_1_En_10_Chapter.html#Par35)
    演示了多次调用 `JSON_MODIFY()` 函数。以下内容被依次更改：


    1.  将值“Greek”追加到“OtherLanguages”数组。

    2.  将“Title”:“Team Member”更新为“Title”:“Manager”。

    3.  插入“CommissionRate”:“1.19”键值对。


    表 [10-3](#A435478_1_En_10_Chapter.html#Tab3) 对比了原始 JSON 和经过 `JSON_MODIFY()` 函数处理后的
    JSON。


    表 10-3.


    并排比较结果


    | 原始 JSON | 修改后的 JSON |

    | --- | --- |

    | `{` `"OtherLanguages": [` `"Turkish",` `"Slovenian"` `],` `"HireDate": "2010-08-24T00:00:00",`
    `"Title": "Team Member"` `}` | `{ "OtherLanguages": [` `"Turkish",` `"Slovenian",`
    `"Greek"` `],` `"HireDate": "2010-08-24T00:00:00",` `"Title": "Manager",` `"CommissionRate":
    "1.19"` `}` |


    ```sql

    SELECT CustomFields

    ,JSON_MODIFY(

    JSON_MODIFY(

    JSON_MODIFY(CustomFields,''append $.OtherLanguages'', ''Greek'')

    , ''$.Title'', ''Manager'')

    ,''$.CommissionRate'', ''1.19'') AS Multi_Changes

    FROM [Application].[People]

    WHERE FullName = ''Isabella Rupp'';

    ```

    列表 10-8.

    演示多次调用 `JSON_MODIFY()` 函数


    ### How It Works


    `JSON_MODIFY()` 函数能够通过连续的内联调用进行多重修改。`JSON_MODIFY()` 函数返回修改后的 JSON。因此，每个返回的 JSON
    字符串都可以被连续处理以进行另一次修改。


    ## 10-6\. 重命名 JSON 键


    ### Problem


    你想重命名一个 JSON 键。'
  raw: '### How It Works


    The JSON_MODIFY() function is self-defined, as explained in the previous Recipe
    10-1\. JSON documents in the CustomFields column contain the key “Title.” Therefore,
    when the key path is detected with a JSON string the JSON_MODIFY() function updates
    the value property. This concept will be demonstrated in the Solution section,
    Listing [10-2](#A435478_1_En_10_Chapter.html#Par13).


    ## 10-3\. Delet ing from JSON


    ### Problem


    You want to delete a key-value pair from a JSON document.


    ### Solution


    Set the NewValue(third) argument to NULL within the JSON_MODIFY() function if
    you need to delete the key-value pair, as demonstrated in Listing [10-3](#A435478_1_En_10_Chapter.html#Par17).
    Figure [10-3](#A435478_1_En_10_Chapter.html#Fig3) shows the original and modified
    JSON.


    ![A435478_1_En_10_Fig3_HTML.jpg](A435478_1_En_10_Fig3_HTML.jpg)


    Figure 10-3.


    Comparing query output with deleted key “Title”


    ```

    SELECT CustomFields

    ,JSON_MODIFY(CustomFields,''$.Title'', NULL) NewCustomFields

    FROM [Application].[People]

    WHERE FullName = ''Hudson Onslow'';

    Listing 10-3.

    Deleting key “Title” with value

    ```


    ### How It Works


    When the JSON_MODIFY() function has a NULL listed as the third argument (NewValue),
    then the key-value pair is deleted from JSON. This concept applies to the key,
    object, and array. Listing [10-4](#A435478_1_En_10_Chapter.html#Par19) demonstrates
    how to delete the array “OtherLanguages” from the JSON variable @j. Table [10-1](#A435478_1_En_10_Chapter.html#Tab1)
    demonstrates a side-by-side comparison between the original JSON and the JSON
    processed by the JSON_MODIFY() function.


    Table 10-1.


    Comparing the result side by side


    | Original JSON | JSON Array OtherLanguages Deleted |

    | --- | --- |

    | `{` `"OtherLanguages": [` `"Polish",` `"Chinese",` `"Japanese"` `],` `"HireDate":
    "2008-04-19T00:00:00",` `"Title": "Team Member",` `"PrimarySalesTerritory": "Plains",`
    `"CommissionRate": "0.98"` `}` | `{` `"HireDate": "2008-04-19T00:00:00",` `"Title":
    "Team Member",` `"PrimarySalesTerritory": "Plains",` `"CommissionRate": "0.98"`
    `}` |


    ```

    declare @j as nvarchar(MAX) =

    N''{

    "OtherLanguages": [

    "Polish",

    "Chinese",

    "Japanese"

    ],

    "HireDate": "2008-04-19T00:00:00",

    "Title": "Team Member",

    "PrimarySalesTerritory": "Plains",

    "CommissionRate": "0.98"

    }'';

    SELECT JSON_MODIFY(@j,''$.OtherLanguages'', NULL) DeletedOtherLanguages;

    Listing 10-4.

    Deleting an array

    ```


    Another example demonstrates when the object “table” is deleted from the JSON
    document assigned to the variable @j, shown in Listing [10-5](#A435478_1_En_10_Chapter.html#Par21).
    Table [10-2](#A435478_1_En_10_Chapter.html#Tab2) demonstrates a side-by-side comparison
    between the original JSON and the JSON processed by the JSON_MODIFY() function.


    Table 10-2.


    Comparing the results side by side


    | Original JSON | JSON Object table Deleted |

    | --- | --- |

    | `{` `"theme": "humanity",` `"dateFormat": "dd/mm/yy",` `"timeZone": "PST",`
    `"table": {` `"pagingType": "full",` `"pageLength": 50` `},` `"favoritesOnDashboard":
    true` `}` | `{` `"theme": "humanity",` `"dateFormat": "dd/mm/yy",` `"timeZone":
    "PST",` `"favoritesOnDashboard": true` `}` |


    ```

    declare @j nvarchar(MAX) =

    N''{

    "theme": "humanity",

    "dateFormat": "dd/mm/yy",

    "timeZone": "PST",

