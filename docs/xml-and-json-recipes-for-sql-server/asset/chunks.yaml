    \    *   `##XML` – name of table with XML data.\n    *   `out` – indicator that\
    \ copies the data from the table and sends it to the destination.\n    *   `\"\
    C:\\TEMP\\Categories_20170310_164701.xml\"` – the file path.\n    *   `-S \"APRESS\\\
    SQL2016\"` – server name.\n    *   `-T` – specifies that the `BCP` command runs\
    \ under a trusted connection. To run the `BCP` with SQL Server credentials then\
    \ instead of `-T`, please use `-U login_Name -P password` options.\n    *   `-c`\
    \ – specifies that the output content is in the character data type. **Caution**\
    \ The `BCP` arguments leading with a dash are case sensitive. For example, `-T`\
    \ is an option for a trusted connection; however, `-t` is the field terminator.\n\
    \    The statement `exec master..xp_cmdshell @SQL` runs the `BCP` command.\n \
    \   The statement `IF @run_value = 0` conditionally detects whether the option\
    \ value needs to be changed from 1 back to 0.\n    To finalize the process, the\
    \ `##XML` table should be destroyed.\n\n```sql\nIF (OBJECT_ID('tempdb..##XML')\
    \ IS NOT NULL)\nDROP TABLE ##XML;\n```\n\n```cmd\nBCP ##XML out \"C:\\TEMP\\Categories_20170310_164701.xml\"\
    \ -S \"APRESS\\SQL2016\" -T -c\n```\n\nTo test the stored procedure, run following\
    \ code:\n\n```sql\nDECLARE @x XML\nSET @x = (\nSELECT ProductCategory.Name AS\
    \ \"Category/CategoryName\",\n(\nSELECT DISTINCT Location.Name \"text()\", ',\
    \ cost rate $',\nLocation.CostRate \"text()\"\nFROM Production.ProductInventory\
    \ Inventory\nINNER JOIN Production.Location Location\nON Inventory.LocationID\
    \ = Location.LocationID\nWHERE Product.ProductID = Inventory.ProductID\nFOR XML\
    \ PATH('LocationName'), TYPE\n) AS \"Locations/node()\",\nSubcategory.Name AS\
    \ \"Category/Subcategory/SubcategoryName\",\nProduct.Name AS \"Category/Subcategory/Product/ProductName\"\
    ,\nProduct.Color AS \"Category/Subcategory/Product/Color\",\nInventory.Shelf AS\
    \ \"Category/Subcategory/Product/ProductName/@Shelf\",\nInventory.Bin AS \"Category/Subcategory/Product/ProductName/@Bin\"\
    ,\nInventory.Quantity AS \"Category/Subcategory/Product/ProductName/@Quantity\"\
    \nFROM Production.Product Product\nINNER JOIN Production.ProductInventory Inventory\n\
    ON Product.ProductID = Inventory.ProductID\nINNER JOIN Production.ProductSubcategory\
    \ Subcategory\nON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\n\
    INNER JOIN Production.ProductCategory\nON Subcategory.ProductCategoryID = ProductCategory.ProductCategoryID\n\
    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name\nFOR XML PATH('Categories'),\
