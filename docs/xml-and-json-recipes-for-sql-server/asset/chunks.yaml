  trans: "# 7-3 创建二级 VALUE 类型索引\n\n## 问题\n\n当 XQuery 中使用了通配符或路径未完全指定时，你希望提升 XML 列的查询性能。\n\
    \n## 解决方案\n\n当路径未完全指定或包含通配符时，二级值类型 XML 索引有助于提升 XQuery 性能。清单 7-10 创建了我们在解决方案 7-1\
    \ 和 7-2 中创建的示例表和一级 XML 索引。如果你已创建此表，则无需重新创建。\n\n```sql\n-- 这些设置在创建 XML 索引时很重要\n\
    SET NUMERIC_ROUNDABORT OFF;\nSET ARITHABORT ON;\nSET ANSI_NULLS ON;\nSET ANSI_PADDING\
    \ ON;\nSET ANSI_WARNINGS ON;\nSET CONCAT_NULL_YIELDS_NULL ON;\nSET QUOTED_IDENTIFIER\
    \ ON;\nGO\n-- 删除表 SQL Server 2016 语法\nDROP TABLE IF EXISTS dbo.PersonXML\n-- 创建并填充名为\
    \ PersonXML 的表\nCREATE TABLE dbo.PersonXML\n(\nPersonID INT NOT NULL,\nFirstName\
    \ NVARCHAR(30) NOT NULL,\nMiddleName NVARCHAR(20)NULL,\nLastName NVARCHAR(30)\
    \ NOT NULL,\nDemographics XML NULL,\nCONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED\n\
    (\nPersonID ASC\n)\n);\nGO\nINSERT dbo.PersonXML\n(\nPersonID,\nFirstName,\nMiddleName,\n\
    LastName,\nDemographics\n)\nSELECT BusinessEntityID,\nFirstName,\nMiddleName,\n\
    LastName,\nDemographics\nFROM Person.Person;\nGO\n-- 现在在 dbo.PersonXML 表上创建一级\
    \ XML 索引\nCREATE PRIMARY XML INDEX IX_PXML_PersonXML_Demographics\nON dbo.PersonXML\n\
    (\nDemographics\n);\nGO\n```\n清单 7-10. 创建带 XML 列的示例表和一级 XML 索引\n\n清单 7-11 展示了如何在示例表上创建二级值\
    \ XML 索引，图 7-7 显示了已创建的 XML 索引。\n\n![A435478_1_En_7_Fig7_HTML.jpg](img/A435478_1_En_7_Fig7_HTML.jpg)\n\
    图 7-7. 确认已创建二级值 XML 索引\n\n```sql\nCREATE XML INDEX IX_XMLVALUE_PersonXML_Demographics\n\
    ON dbo.PersonXML\n(\nDemographics\n)\nUSING XML INDEX IX_PXML_PersonXML_Demographics\n\
    FOR VALUE;\n```\n清单 7-11. 创建二级值类型索引\n\n二级路径类型 XML 索引可提升 XML 数据类型 `exist()` 方法的查询性能。清单\
    \ 7-6 创建了与解决方案 7-2 相同的表并对其应用了一级 XML 索引，因为这是此解决方案的两个必要条件。清单 7-7 演示了如何在表上创建二级路径\
    \ XML 索引。图 7-6 显示了已创建的索引。\n\n```sql\n-- 这些设置在创建 XML 索引时很重要\nSET NUMERIC_ROUNDABORT\
    \ OFF;\nSET ARITHABORT ON;\nSET ANSI_NULLS ON;\nSET ANSI_PADDING ON;\nSET ANSI_WARNINGS\
    \ ON;\nSET CONCAT_NULL_YIELDS_NULL ON;\nSET QUOTED_IDENTIFIER ON;\nGO\n-- 删除表\
    \ SQL Server 2016 语法\nDROP TABLE IF EXISTS dbo.PersonXML\n-- 创建并填充名为 PersonXML\
    \ 的表\nCREATE TABLE dbo.PersonXML\n(\nPersonID INT NOT NULL,\nFirstName NVARCHAR(30)\
    \ NOT NULL,\nMiddleName NVARCHAR(20)NULL,\nLastName NVARCHAR(30) NOT NULL,\nDemographics\
    \ XML NULL,\nCONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED\n(\nPersonID ASC\n\
    )\n);\nGO\nINSERT dbo.PersonXML\n(\nPersonID,\nFirstName,\nMiddleName,\nLastName,\n\
    Demographics\n)\nSELECT BusinessEntityID,\nFirstName,\nMiddleName,\nLastName,\n\
    Demographics\nFROM Person.Person;\nGO\n-- 现在在 dbo.PersonXML 表上创建一级 XML 索引\nCREATE\
    \ PRIMARY XML INDEX IX_PXML_PersonXML_Demographics\nON dbo.PersonXML\n(\nDemographics\n\
    );\nGO\n```\n清单 7-6. 创建带有一级 XML 索引的示例表\n\n`GO` 清单 7-7 向我们先前创建的、带有一级 XML 索引的示例表添加了一个二级路径\
    \ XML 索引。\n\n![A435478_1_En_7_Fig6_HTML.jpg](img/A435478_1_En_7_Fig6_HTML.jpg)\n\
    图 7-6. 显示已创建的二级路径类型 XML 索引\n\n```sql\nCREATE XML INDEX IX_XMLPATH_PersonXML_Demographics\n\
    ON dbo.PersonXML\n(\nDemographics\n)\nUSING XML INDEX IX_PXML_PersonXML_Demographics\n\
    FOR PATH;\n```\n清单 7-7. 创建二级路径 XML 索引\n\n## 工作原理\n\n一级 XML 索引可以提升在 XML 数据类型列上查询的性能。二级\
    \ XML 索引可以在一级 XML 索引的基础上进一步提升查询性能。如果你的查询倾向于在 `WHERE` 子句中指定 `exist()` 方法，那么 `SECONDARY\
    \ PATH` 类型索引可能进一步提升查询速度。清单 7-8 指定了一个查询 XQuery 路径是否存在的查询。\n\n```sql\nSELECT PersonID,\
    \ Demographics\nFROM dbo.PersonXML\nWHERE Demographics.exist('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\n/IndividualSurvey/Occupation') = 1;\n```\n清单 7-8. 演示指定查询路径的 SECONDARY PATH\
    \ 类型索引\n\n清单 7-9 展示了另一个选项，其中同时指定了路径和谓词。\n\n```sql\nSELECT PersonID, Demographics\n\
    FROM dbo.PersonXML\nWHERE Demographics.exist('declare default element namespace\
    \ \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\n/IndividualSurvey[TotalPurchaseYTD > 9000]') = 1;\n```\n清单 7-9. 显示同时指定路径和谓词的二级路径类型\
    \ XML 索引。\n\n二级路径类型 XML 索引以及值类型和属性类型的二级索引，都是建立在一级 XML 索引之上的。创建二级路径 XML 索引的 `CREATE\
    \ XML INDEX` 语法包含四个部分：\n\n```sql\nCREATE XML INDEX \nON \n(    )\nUSING XML INDEX\
    \  FOR PATH;\n```\n\n**注意**\n当一级 XML 索引被删除时，所有关联的二级 XML 索引会自动被删除。"
- fmt: "### How It Works\n\n次级值类型索引可以在路径未完全指定或包含通配符时提升 XQuery 的效率，例如：\n\n*   `//ELEMENT[ELEMENT\
    \ = “Filter Condition”]`\n*   `/ELEMENT/@*[. = “Filter Condition”]`\n*   `//ELEMENT[@ATTRIBUTE\
    \ = “Filter Condition”]`\n\n实际上，次级值类型索引在谓词筛选条件值已知的情况下能提升查询性能。清单 [7-12](#A435478_1_En_7_Chapter.html#Par66)\
    \ 展示了 XQuery 如何从使用值索引中受益。\n\n```\nSELECT PersonID,\nref.value('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nTotalPurchaseYTD[1]', 'money') TotalPurchase,\nref.value('declare default element\
    \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nDateFirstPurchase[1]', 'date') DateFirstPurchase,\nref.value('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nYearlyIncome[1]', 'varchar(20)') YearlyIncome,\nref.value('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nOccupation[1]', 'varchar(15)') Occupation,\nref.value('declare default element\
    \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nCommuteDistance[1]', 'varchar(15)') CommuteDistance\nFROM PersonXML\nCROSS\
    \ APPLY Demographics.nodes('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\n/*[YearlyIncome=\"50001-75000\"]') dmg(ref);\nListing 7-12.\n展示 XQuery 如何从利用次级值\
    \ XML 索引中受益\n```\n\n创建次级值类型索引的语法包含四个组成部分：\n\n```\nCREATE XML INDEX \nON \n(  \
    \  )\nUSING XML INDEX  FOR VALUE;\n```\n\nCaution\n\n祖辈或自身轴操作符，例如 `XML_Column.nodes('//ELEMENT'`)，是在\
    \ `nodes()` 方法中建立路径引用的便捷方式。然而，对于 XML 实例具有深层嵌套元素的 XML 数据类型列，此技术可能会降低性能。这是 XML 分解过程中最常见的性能问题之一。因此，我建议（在可能的情况下）在\
    \ `nodes()` 方法中提供更详细的路径。例如，`XML_Column.nodes(‘//ELEMENT/CHILD_ELMNT’)` 可以提升你的\
    \ XML 分解性能。\n\n## 7-4 Creating a Secondary PROPERTY Type Index\n\n### Problem\n\
    \n你希望提升从列中检索一个或多个值的 XML 列的性能。\n\n### Solution\n\n如果你的 XQuery 从 XML 列中检索一个或多个值，次级属性类型\
    \ XML 索引会很有帮助。清单 [7-13](#A435478_1_En_7_Chapter.html#Par72) 创建了我们在解决方案 7-1、7-2\
    \ 和 7-3 中使用的演示表，并在其上创建了主 XML 索引。\n\n```\n-- These settings are important when\
    \ creating XML indexes\nSET NUMERIC_ROUNDABORT OFF;\nSET ARITHABORT ON;\nSET ANSI_NULLS\
    \ ON;\nSET ANSI_PADDING ON;\nSET ANSI_WARNINGS ON;\nSET CONCAT_NULL_YIELDS_NULL\
    \ ON;\nSET QUOTED_IDENTIFIER ON;\nGO\n-- Drop table SQL Server 2016 syntax\nDROP\
    \ TABLE IF EXISTS dbo.PersonXML\n-- Create and populate a table called PersonXML\n\
    CREATE TABLE dbo.PersonXML\n(\nPersonID INT NOT NULL,\nFirstName NVARCHAR(30)\
    \ NOT NULL,\nMiddleName NVARCHAR(20)NULL,\nLastName NVARCHAR(30) NOT NULL,\nDemographics\
    \ XML NULL,\nCONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED\n(\nPersonID ASC\n\
    )\n);\nGO\nINSERT dbo.PersonXML\n(\nPersonID,\nFirstName,\nMiddleName,\nLastName,\n\
    Demographics\n)\nSELECT BusinessEntityID,\nFirstName,\nMiddleName,\nLastName,\n\
    Demographics\nFROM Person.Person;\nGO\n-- Now create the Primary XML index on\
    \ the dbo.PersonXML table\nCREATE PRIMARY XML INDEX IX_PXML_PersonXML_Demographics\n\
    ON dbo.PersonXML\n(\nDemographics\n);\nGO\nListing 7-13.\n创建带 XML 列的示例表及主 XML\
    \ 索引\n```\n\n清单 [7-14](#A435478_1_En_7_Chapter.html#Par74) 展示了如何创建次级属性 XML 索引。图\
