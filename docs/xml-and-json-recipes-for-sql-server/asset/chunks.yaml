- fmt: "### How It Works\n\n存储过程 `usp_LoadXMLFromFile`（如清单 [3-6](#A435478_1_En_3_Chapter.html#Par115)\
    \ 所示）提供了一种从一个或多个文件加载 XML 数据的解决方案。该存储过程有一个输入参数 `@FilePath`，数据类型为 `nvarchar(100)`。此参数用于指定\
    \ XML 源文件的位置。\n\n1.  启用/禁用扩展存储过程 `xp_cmdshell` 的机制在配方 3-1 中有描述。此过程对于存储过程 `usp_LoadXMLFromFile`\
    \ 是相同的。\n2.  我们需要确保目标表 `_XML` 存在。如果数据库中没有该表，则需要创建它。如果表已存在，根据业务需求，可以截断数据或保留历史数据。以下示例展示了如何截断表：\n\
    \n    ```\n    IF NOT EXISTS (SELECT * FROM sys.objects\n    WHERE object_id =\
    \ OBJECT_ID(N'[dbo].[_XML]') AND type in (N'U'))\n    CREATE TABLE _XML\n    (\n\
    \    ID int IDENTITY(1,1) PRIMARY KEY\n    ,XMLFileName nvarchar(300)\n    ,XML_LOAD\
    \ XML, Created datetime\n    )\n    ELSE\n    TRUNCATE TABLE _XML\n    ```\n\n\
    3.  为处理需求声明多个变量：\n\n    ```\n    @DOS nvarchar(300) = '' – 准备 DOS 命令。\n    @DirBaseLocation\
    \ nvarchar(500) – 验证并格式化源路径。\n    @FileName nvarchar(300) – 用于获取文件名。\n    @SQL\
    \ nvarchar(1000) = '' – 准备用于 INSERT 过程的 SQL。\n    @files TABLE – 用于从源位置获取所有文件名。\n\
    \    ```\n\n4.  验证最后一个字符是反斜杠 (`\\`)。我们需要确保存储过程接收到以 `\\` 结尾的有效路径。如果缺少最后一个反斜杠，则需要向提供的路径添加一个反斜杠。例如：\n\
    \n    ```\n    IIF(RIGHT(@FilePath, 1) = '\\', @FilePath, @FilePath + '\\');\n\
    \    ```\n\n    `IIF` 函数由 SQL Server 2012 版引入。该函数有三个参数：\n    1.  条件 - `RIGHT(@FilePath,\
    \ 1) = '\\'` 用于检查最后一个字符是否为 `\\`。\n    2.  真值结果 - 当找到该字符时，不执行任何操作。\n    3.  假值结果\
    \ - 当未找到时，向参数添加 `\\`。\n5.  准备 Windows 命令解释器命令，以从源位置获取所有文件的列表。Windows 命令解释器命令 `dir`\
    \ 返回指定路径下的所有文件和子目录。但是，`dir` 命令除了文件名外还返回其他信息。`\"/B\"` 表示使用裸格式（仅文件名），`\"/O:-D\"\
    ` 指定按创建日期降序排序。\n\n    ```\n    SET @DOS = 'dir /B /O:-D ' + @DirBaseLocation \
    \ ;\n    ```\n\n6.  扩展存储过程 `xp_cmdshell` 执行 Windows 命令解释器命令，并将源位置的所有可用文件插入。\n\n\
    \    ```\n    INSERT @files\n    EXEC master..xp_cmdshell @DOS;\n    ```\n\n7.\
    \  接下来，我们需要遍历扩展名为 `\".xml\"` 的每个文件。这可以通过为表变量声明游标并在游标上建立循环来完成。\n\n    ```\n   \
    \ DECLARE cur CURSOR\n    FOR     SELECT XMLFile\n    FROM @files\n    WHERE XMLFile\
    \ like '%.xml';\n    OPEN cur;\n    FETCH NEXT\n    FROM cur\n    INTO @FileName;\n\
    \    WHILE @@FETCH_STATUS = 0\n    ```\n\n8.  在 `WHILE` 循环内，我们需要为每个文件组合 `INSERT`\
    \ 语句，该语句读取文件内容并将 XML 插入 `_XML` 表。例如：\n\n    ```\n    INSERT INTO _XML\n    SELECT\
    \ 'C:\\TEMP\\Categories.xml', X, GETDATE()\n    FROM OPENROWSET(BULK N'C:\\TEMP\\\
    Categories.xml', SINGLE_BLOB) AS tempXML(X);\n    ```\n\n    上述 SQL 代码的关键是 `OPENROWSET()`\
    \ 函数。`BULK` 选项指定我们将从源文件中批量读取所有内容。然后是 `BULK` 后面的一个空格，接着是文件位置。`SINGLE_BLOB` 选项指定文件内容作为单列返回，数据类型为\
    \ `VARBINARY(MAX)`，这非常适合 XML 数据。别名语法 `AS tempXML(X)` 必须是 `table(column)` 格式：\n\
    \    *   `tempXML` – 表别名\n    *   `X` – 列别名\n    其他 `OPENROWSET` 选项 `SINGLE_CLOB`（返回\
    \ `varchar(max)`）和 `SINGLE_NCLOB`（返回 `nvarchar(max)`）不适合 XML 导入数据，因为只有 `SINGLE_BLOB`\
    \ 支持所有 Windows 编码转换。\n9.  系统存储过程 `sp_executesql` 执行组合好的 SQL。\n\n    ```\n    EXECUTE\
    \ sp_executesql @SQL ;\n    ```\n\n10. 错误处理程序允许进程运行，并返回有问题的 SQL 的错误详情。可选地，您可以创建一个表来记录错误。运行存储过程的代码示例：\n\
    \n    ```\n    EXEC dbo.usp_LoadXMLFromFile 'C:\\Temp'\n    ```\n\n但是，缺点是您将丢失错误处理程序日志记录，并且如果正在加载的其中一个文件失败，则该文件将不会被加载。\n\
    \n## 3-4. 从 SSIS 包加载 XML\n\n### Problem\n\n您希望使用一个 SSIS ETL 包将一个或多个 XML 文件加载到数据库中。"
  raw: "### How It Works\n\nThe stored procedure usp_LoadXMLFromFile, shown in Listing\
    \ [3-6](#A435478_1_En_3_Chapter.html#Par115), provides a solution for loading\
    \ XML data from one or more files. The stored procedure has one input parameter,\
    \ @FilePath, of nvarchar(100) data type. The parameter provides the location of\
    \ your XML source files.\n\n1.  The mechanism to enable/disable an extended stored\
    \ procedure xp_cmdshell is described in Recipe 3-1\\. This process is the same\
    \ for the stored procedure usp_LoadXMLFromFile.  \n2.  We need to make sure that\
    \ the destination table (_XML) exists. If the table is not in a database, then\
    \ the table needs to be created. When the table exists, depending on the business\
    \ requirements, the data can be truncated or the table can retain historical data.\
    \ The following example shows a truncated the table:\n\n    ```\n    IF NOT EXISTS\
    \ (SELECT * FROM sys.objects\n    WHERE object_id = OBJECT_ID(N'[dbo].[_XML]')\
    \ AND type in (N'U'))\n    CREATE TABLE _XML\n    (\n    ID int IDENTITY(1,1)\
    \ PRIMARY KEY\n    ,XMLFileName nvarchar(300)\n    ,XML_LOAD XML, Created datetime\n\
    \    )\n    ELSE\n    TRUNCATE TABLE _XML\n    ```\n\n3.  Declare several variables\
    \ for processing needs:\n\n    ```\n    @DOS nvarchar(300) = '' – prepare DOS\
    \ command.\n    @DirBaseLocation nvarchar(500) – verify and format source path.\n\
    \    @FileName nvarchar(300) – to obtain the file name.\n    @SQL nvarchar(1000)\
    \ = '' – prepare SQL for INSERT process.\n    @files TABLE – to obtain all file\
    \ name from source location.\n    ```\n\n4.  Verify that last character is a backslash\
    \ (\\). We need to make sure that the stored procedure receives a valid path with\
    \ \\ as the last character. If the last backslash is missing, then we need to\
    \ add a backslash to the provided path. For example:\n\n    ```\n    IIF(RIGHT(@FilePath,\
    \ 1) = '\\', @FilePath, @FilePath + '\\');\n    ```\n\n    The IIF function was\
    \ introduced by SQL Server version 2012\\. The function has three parameters:\n\
    \    1.  Condition - RIGHT(@FilePath, 1) = '\\' to check if the last character\
    \ is a \\.  \n    2.  True result – when the character is found, then do nothing.\
    \  \n    3.  False result – when not found, then add a \\ to the parameter .   \n\
    5.  Prepare the Windows Command Shell command to obtain a list of all files from\
    \ the source location. The Windows Command Shell command dir returns all files\
    \ and subdirectories for a specified path. However, the dir command returns other\
    \ information along with the file name. “/B” indicates the use of bare format\
    \ (file name only), and “/O:-D” – specifies the sort order by date created, descending.\n\
    \n    ```\n    SET @DOS = 'dir /B /O:-D ' + @DirBaseLocation  ;\n    ```\n\n6.\
    \  The extended stored procedure xp_cmdshell executes the Windows Command Shell\
    \ command and inserts all available files from the source location.\n\n    ```\n\
    \    INSERT @files\n    EXEC master..xp_cmdshell @DOS;\n    ```\n\n7.  Next, we\
    \ need to iterate through each file with the extension “.xml”. This can be accomplished\
    \ by declaring a cursor for the table variable and establishing a loop over the\
    \ cursor.\n\n    ```\n    DECLARE cur CURSOR\n    FOR     SELECT XMLFile\n   \
    \ FROM @files\n    WHERE XMLFile like '%.xml';\n    OPEN cur;\n    FETCH NEXT\n\
    \    FROM cur\n    INTO @FileName;\n    WHILE @@FETCH_STATUS = 0\n    ```\n\n\
    8.  Inside the WHILE loop , we need to compose the INSERT statement for each file\
    \ that reads the file content and inserts the XML into the _XML table. For example:\n\
    \n    ```\n    INSERT INTO _XML\n    SELECT 'C:\\TEMP\\Categories.xml', X, GETDATE()\n\
    \    FROM OPENROWSET(BULK N'C:\\TEMP\\Categories.xml', SINGLE_BLOB) AS tempXML(X);\n\
    \    ```\n\n    The key to the SQL code above is the `OPENROWSET()` function.\
    \ The `BULK` option specifies that we will be reading all of the contents from\
    \ the source file in bulk. Then there is a space after `BULK`, followed by the\
    \ file location. The `SINGLE_BLOB` option specifies that the file content is returned\
    \ as a single column with the data type `VARBINARY(MAX)`, which is a good fit\
    \ for XML data. The alias syntax `AS tempXML(X)` must be in table(column) format:\n\
    \    *   tempXML – table alias\n    *   X – column aliasOther OPENROWSET options\
    \ SINGLE_CLOB (returns varchar(max)) and SINGLE_NCLOB (returns nvarchar(max))\
    \ are not a good fit for XML import data, because only SINGLE_BLOB supports all\
    \ Windows encoding conversions.  \n9.  The system stored procedure sp_executesql\
    \ executes the composed SQL.\n\n    ```\n    EXECUTE sp_executesql @SQL ;\n  \
    \  ```\n\n10.  The error handler allows the process to run and returns error details\
    \ with problematic SQL. Optionally, you can create a table to log the errors.\
    \ Code sample to run the stored procedure:\n\n    ```\n    EXEC dbo.usp_LoadXMLFromFile\
    \ 'C:\\Temp'\n    ```\n\nHowever, the disadvantage is that you will lose the error\
    \ handler logging, and if one of the files that is being loaded fails, then the\
    \ file will not be loaded.\n\n## 3-4\\. Loading XML from SSIS Package\n\n### Problem\n\
    \nYou want to load one or more XML files into the database using an SSIS ETL package."
