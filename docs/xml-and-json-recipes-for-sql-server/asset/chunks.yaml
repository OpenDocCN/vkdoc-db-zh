  trans: '

    ### 工作原理


    创建 XML 架构集合的语法相当简单。生成 XML 架构后，需要将架构内容添加到 SQL Server XML 架构集合对象中。创建架构集合的语法（如代码清单
    1-14 所示）包含几个组成部分：

    *   `CREATE XML SCHEMA COLLECTION` - 声明性语句

    *   `dbo` – 关系架构（如果未提供，则将使用 SQL Server 默认值）

    *   XML 架构集合名称 – 任何 SQL Server 有效的唯一名称

    *   `AS <schema_contents>` - XML 架构内容，可以是常量，也可以是 `xml`、`nvarchar`、`varchar` 或
    `varbinary` 数据类型的标量变量


    要创建 XML 架构集合，需要具备以下服务器级或数据库级权限之一：

    *   `CONTROL`（服务器级）

    *   `ALTER ANY DATABASE`（服务器级）

    *   `ALTER`（数据库级）

    *   `CONTROL`（数据库级）

    *   `ALTER ANY SCHEMA` 和 `CREATE XML SCHEMA COLLECTION`（数据库级）


    成功创建后，您可以在 SSMS 对象资源管理器中，在“可编程性”、“类型”、“XML 架构集合”下找到您新建的 XML 架构集合，如图 1-9 所示。


    ![A435478_1_En_1_Fig9_HTML.jpg](img/A435478_1_En_1_Fig9_HTML.jpg)

    图 1-9. 查找 XML 架构集合


    注意：当 XML 架构集合绑定到一个或多个列时，无法对其应用任何更改。要修改或删除 XML 架构集合，您需要首先将其从列上解除绑定。


    ## 1-5. 创建类型化 XML 列


    ### 问题


    您已经创建了一个 XML 架构集合，现在希望将其绑定到一个列以创建类型化 XML 列。


    ### 解决方案


    当 XML 架构集合成功创建后，将 XML 架构绑定到新创建表的代码如代码清单 1-15 所示。


    ```sql

    CREATE TABLE dbo.TypedXML_VS

    (

    TypedXML_ID INT IDENTITY(1, 1) NOT NULL PRIMARY KEY,

    TypedXMLData XML(TypedXML_VisualStudio)

    );

    GO

    代码清单 1-15. 创建带有类型化 XML 列的新表

    ```


    您可以使用 `ALTER TABLE … ALTER COLUMN` 语句将 XML 架构集合绑定到现有的 `XML` 列，如代码清单 1-16 所示。


    ```sql

    ALTER TABLE TypedXML_VS

    ALTER COLUMN TypedXMLData XML (TypedXML_VisualStudio);

    代码清单 1-16. 将 XML 架构集合绑定到列

    ```


    ### 工作原理


    将 XML 架构集合绑定到 XML 列的机制很简单。需要将 XML 架构集合名称作为 `XML` 数据类型的一部分（在括号内）指定。语法为：`column_name
    XML (XML_SCHEMA_COLLECTION_NAME)`。对于新表，可以在 `CREATE TABLE` DDL 命令中将 XML 架构集合绑定到列（代码清单
    1-15）。当表包含非类型化 XML 列时，`ALTER TABLE` 命令将完成此任务（代码清单 1-16）。


    当 XML 架构集合绑定到列后，XSD 本身无法修改或删除。但是，可以删除包含类型化 XML 列的表。要将 XSD 与列断开连接，您需要执行一个 `ALTER
    TABLE` DDL 命令，其中 `XML` 数据类型不带括号，如代码清单 1-17 所示。


    ```sql

    ALTER TABLE TypedXML_VS

    ALTER COLUMN TypedXMLData XML;

    代码清单 1-17. 将 XSD 与列断开连接

    ```


    XSD 解除绑定后，XML 列变为非类型化。


    以下是关于类型化 XML 的几个问答。


    我为什么要这样做，有什么好处？

    *   能够根据 XML 架构验证 XML 数据。

    *   利用基于类型信息的存储和查询优化。

    *   在查询编译过程中更好地利用类型信息。


    我插入到类型化 XML 列中的 XML 数据会发生什么？

    *   每次插入都会根据 XML 架构进行验证；如果验证失败，则 SQL Server 会引发错误并且插入失败。


    如果我的表中已存在 XML 数据，然后对其应用 XML 架构会怎样？

    *   如果包含 XML 列的表已有 XML 数据，并且该 XML 不符合 XML 架构，则将 XML 架构绑定到表的操作会失败。


    ## 总结


    SQL Server 2000 首次在 SQL 数据库中引入了 XML 功能。从那时起，XML 技术已发展成为一个全面的信息技术平台。SQL Server
    2005 交付了 `XML` 数据类型。在本章中，您接触了 XML 的入门知识。我解释了元素和属性之间的区别，这对于后续章节非常重要。我定义并解释了 XML
    架构，并介绍了两种生成 XML 架构的方法。在我看来，有了现代技术的支持，无需手动创建 XML 架构，因为它是一个复杂且耗时的过程。节省您的时间，如果您使用的是
    Microsoft 工具 `MS Visual Studio`、`SQL Server Data Tools` 和 `SSMS`，其中任何一个都可以自动生成
    XML 架构。


    本书下一章将演示如何从结果集构建 XML。

    '
- fmt: '# 2. Building XML


    XML is represented in SQL Server using a complex data type that has special syntax
    and well-defined format. It can be used when we need to construct XML-formatted
    output or shred existing XML into relational format. In this chapter I will provide
    recipes for building XML from a result set based on one or more tables, and for
    formatting and presenting the result as XML output.


    Introduced in SQL Server 2000, the `FOR XML` clause has evolved dramatically to
    become a comprehensive solution for building XML output. `FOR XML` has to be the
    last clause in a `SELECT` statement and has to appear after an `ORDER BY` clause
    when the sorting has a place within a query.


    The `FOR XML` clause has the following modes :


    *   `RAW` – Returns simple XML from one or more tables, in which each row is represented
    with a `<row>` element. Attribute-centric XML is generated by default, which means
    each of the row’s non-null column values are represented as attributes of the
    `<row>` element. If, however, you specify the `ELEMENTS` directive, each of the
    row’s column values is represented as an element nested within the `<row>` element.
    `RAW` mode does not support nested element structure.

    *   `AUTO` – Returns simple XML structure from one or more tables. `AUTO` mode
    is similar to `RAW` mode, except that it supports nested elements when two or
    more tables are joined in the query’s `FROM` clause.

    *   `EXPLICIT` – Allows you to explicitly construct the XML. `EXPLICIT` mode accesses
    the XML in a universal table format behind the scenes. This is a well-defined
    rowset format that is very similar to shredded XML. Constructing XML using `EXPLICIT`
    mode requires a specific syntax to define the “shape” of the XML result; therefore
    this mode can be complex to use. SQL Server 2008 introduced `PATH` mode as a simplified
    alternative to `EXPLICIT` mode.

    *   `PATH` – Provides a simpler way to explicitly construct XML with a mix of
    elements and attributes. This is a great alternative to the `EXPLICIT` mode.


    When you specify the `FOR XML` clause, you can also provide the following directives,
    which control formatting options of the `FOR XML` clause modes :


    *   `ELEMENTS` – Returns element-centric XML. The default is attribute-centric
    results, and this option applies to `RAW`, `AUTO`, and `PATH` modes only.

    *   `BINARY BASE64` - Retrieves binary data in Base-64-encoded format.

    *   `TYPE` - Returns the result as an XML data type instance.

    *   `ROOT` – Extends the XML result with top-level (root) element, which is a
    requirement of “well-formed” XML.

    *   `XSINIL` - Returns the element name within the XML result when the value is
    `NULL`. The element is returned with an `xsi:nil` attribute set to “true,” like
    this: `<element xsi:nil = "true"/>` .

    *   `ABSENT` – Opposite of the `XSINIL` directive. The `ABSENT` directive is the
    default. When used, it specifies that `NULL`s should be eliminated from the XML
    result.

    *   `XMLSCHEMA` – Extends the XML result with an inline W3C XML Schema (XSD).


    ## Fixing the “Unable to show XML” Error


    To review XML results of a query in SQL Server Management Studio (SSMS), you can
    simply click on the hyperlinked XML result displayed in the Results pane. The
    XML result will display in a new SSMS XML editor window. When we are dealing with
    very large result sets, however, the XML might exceed the default limit for XML
    data (2 MB) and throw a `System.OutOfMemoryException` with the message “Unable
    to show XML,” as shown in Figure [2-1](#A435478_1_En_2_Chapter.html#Fig1).


    ![A435478_1_En_2_Fig1_HTML.jpg](A435478_1_En_2_Fig1_HTML.jpg)


    Figure 2-1. “Unable to show XML” error message


    The error message recommends increasing the number of characters retrieved from
    the server for XML data. As indicated, this option is available from the Options
    item in the Tools menu. The default maximum for XML data is 2 MB. To change this
    setting go to `Tools` in the menu bar and select `Options…` on the menu. Once
    you are in the Options dialog, do the following:


    1.  Expand `Query Results`.

    2.  Expand `SQL Server`.

    3.  Click `Result to Grid`.

    4.  In the right pane, use the drop-down to change the `Maximum Characters Retrieved`
    for XML data. The available settings are: 1 MB, 2 MB, 5 MB, or `Unlimited`.

    5.  Click `OK` to save your settings. Figure [2-2](#A435478_1_En_2_Chapter.html#Fig2)
    shows the Options dialog.


    ![A435478_1_En_2_Fig2_HTML.jpg](A435478_1_En_2_Fig2_HTML.jpg)


    Figure 2-2. Changing XML data settings


    If you would like to change the maximum size of your XML results for the current
    query only, and do not want to save the SSMS settings permanently, click on the
    `Query` menu and select `Query Options…`. Navigate to the `Grid` settings under
    `Results` and change the `Maximum Characters Retrieved` XML data option as in
    the previous recipe.


    ## 2-1. Converting Relational Data to a Simple XML Format


    ### Problem


    You want to convert a query result set to a simple XML format.


    ### Solution


    SQL Server provides the `FOR XML` clause to format query results as XML data.
    `RAW` mode generates a simple XML format. For example, Listing [2-1](#A435478_1_En_2_Chapter.html#Par26)
    demonstrates `RAW` mode in a `FOR XML` clause.


    ```sql

    SELECT Category.Name AS CategoryName,

    Subcategory.Name AS SubcategoryName,

    Product.Name,

    Product.ProductNumber AS Number,

    Product.ListPrice AS Price

    FROM  Production.Product Product

    INNER JOIN Production.ProductSubcategory Subcategory

    ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

    LEFT JOIN Production.ProductCategory Category

    ON Subcategory.ProductCategoryID = Category.ProductCategoryID

    WHERE Product.ListPrice > 0

    AND Product.SellEndDate IS NULL

    ORDER BY CategoryName, SubcategoryName

    FOR XML RAW;

    ```


    Listing 2-1. Demonstrating `RAW` mode within a `FOR XML` clause'
