    显然，“`//`” 轴操作符提供了一种设置对深层子元素引用的便捷方式。然而，在最终决定之前应对此技术进行彻底测试，因为它可能在 XML 分解（shredding）过程中导致性能问题。第
    [7](#A435478_1_En_7_Chapter.html) 章将提供有关 `nodes()` 方法性能优化的更多细节。


    ## 6-4. 通过单值过滤


    ### 问题


    在分解 XML 实例时，你需要设置一个单值过滤器。


    ### 解决方案


    在 `nodes()` 方法中设置过滤器，如代码清单 [6-10](#A435478_1_En_6_Chapter.html#Par62) 所示。结果如图
    [6-7](#A435478_1_En_6_Chapter.html#Fig7) 所示。


    ![A435478_1_En_6_Fig7_HTML.jpg](A435478_1_En_6_Fig7_HTML.jpg)


    图 6-7. 过滤后的 XQuery 查询结果


    ```

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''TotalPurchaseYTD'', ''MONEY'') AS TotalPurchase,

    ref.value(''DateFirstPurchase'', ''DATE'') AS DateFirstPurchase,

    ref.value(''YearlyIncome'', ''NVARCHAR(20)'') AS YearlyIncome,

    ref.value(''Occupation'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''CommuteDistance'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person CROSS APPLY

    Demographics.nodes(''IndividualSurvey[TotalPurchaseYTD > 9000]'') AS dmg(ref);

    ```


    代码清单 6-10. 在 nodes() 方法中设置单值过滤器


    ### 工作原理


    XQuery 语言支持在 `nodes()` 方法内部进行过滤。XQuery 过滤器的语法与 T-SQL 的 `WHERE` 子句非常相似，但不完全相同。表
    [6-1](#A435478_1_En_6_Chapter.html#Tab1) 列出了所有用于 XQuery 过滤器的比较运算符（请参阅“工作原理”部分中的食谱
    6-2）。它们基本相同，只有一个小区别：不等于运算符，XQuery 仅实现 “!=” 作为选项。另一方面，T-SQL 为 DBA 和开发人员在 “!=” 和
    “<>” 运算符之间提供了选择（T-SQL 的最佳实践是使用 “<>” 运算符）。


    要在 `nodes()` 方法中设置单值过滤器，你需要：


    1. 父元素 `IndividualSurvey`

    2. 开括号 `[`

    3. 带有比较运算符和要比较值的子元素 `TotalPurchaseYTD`

    4. 闭括号 `]`


    实际上，所有步骤与食谱 6-2 中为 `exist()` 方法演示的步骤相同。例如，两者的过滤器部分都是：


    ```

    IndividualSurvey[TotalPurchaseYTD > 9000]

    ```


    然而，`exist()` 方法的性能比 `nodes()` 方法稍好。由于这两种方法服务于完全不同的功能，`exist()` 方法用于过滤，而 `nodes()`
    用于分解。


    ## 6-5. 通过 T-SQL 变量过滤 XML


    ### 问题


    你希望基于 T-SQL 变量值过滤 XML 结果。


    ### 解决方案


    SQL Server XQuery 函数 `sql:variable()` 允许你的 XQuery 查询表达式访问 T-SQL 变量或参数的值，以便将其包含在搜索条件中。`sql:variable()`
    函数的最佳实现和演示是存储过程，如代码清单 [6-11](#A435478_1_En_6_Chapter.html#Par74) 所示。


    ```

    CREATE PROCEDURE dbo.usp_DemographicsByYearlyIncome

    @YearlyIncome NVARCHAR(20)

    AS

    BEGIN

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''TotalPurchaseYTD'', ''MONEY'') AS TotalPurchase,

    ref.value(''DateFirstPurchase'', ''DATE'') AS DateFirstPurchase,

    ref.value(''YearlyIncome'', ''NVARCHAR(20)'') AS YearlyIncome,

    ref.value(''Occupation'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''CommuteDistance'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey[YearlyIncome=sql:variable("@YearlyIncome")]'')
    AS dmg(ref);

    END;

    GO

    ```


    代码清单 6-11. 使用 sql:variable() 函数创建存储过程


    ### 工作原理


    XQuery 具有 `sql:variable()` 函数，该函数允许你在不显式指定搜索条件的情况下过滤 XQuery。`sql:variable()` 函数将
    T-SQL 声明的变量或存储过程参数渲染并映射到 XQuery。`sql:variable()` 函数可以是 `nodes()` 和 `exist()` 方法的一部分，以提供过滤功能。


    实现 `sql:variable()` 函数以过滤 XML 元素的语法如下：


    ```

    parentElement[childElement comparisonOperator sql:variable(“@varible”)]

    ```


    实现 `sql:variable()` 函数以过滤 XML 属性的语法如下：


    ```

    parentElement[@attribute comparisonOperator sql:variable(“@varible”)]

    ```


    代码清单 [6-12](#A435478_1_En_6_Chapter.html#Par81) 演示了使用不同参数值多次执行 `usp_DemographicsByYearlyIncome`
    存储过程。


    ```

    EXECUTE dbo.usp_DemographicsByYearlyIncome ''0-25000'';

    GO

    EXECUTE dbo.usp_DemographicsByYearlyIncome ''25001-50000'';

    GO

    EXECUTE dbo.usp_DemographicsByYearlyIncome ''50001-75000'';

    GO

    EXECUTE dbo.usp_DemographicsByYearlyIncome ''75001-100000'';

    GO

    EXECUTE dbo.usp_DemographicsByYearlyIncome ''greater than 100000'';

    GO

    ```


    代码清单 6-12. 调用 usp_DemographicsByYearlyIncome 存储过程


    使用参数值 ''0-25000'' 执行存储过程的结果如图 [6-8](#A435478_1_En_6_Chapter.html#Fig8) 所示。


    ![A435478_1_En_6_Fig8_HTML.jpg](A435478_1_En_6_Fig8_HTML.jpg)


    图 6-8. 显示存储过程结果


    注意


    `sql:variable( )` 函数是 XQuery 的一部分；因此，该函数区分大小写，并且必须仅以小写形式引用。任何其他大小写的实现都将触发错误：Msg
    2395, … There is no function ‘{urn:schemas-microsoft-com:xml-sql}:Variable( )’。但是，传递给
    `sql:variable( )` 函数的变量名不区分大小写。


    ## 6-6. 与值序列进行比较


    ### 问题


    你需要通过值列表过滤 XML 实例，类似于 T-SQL `WHERE` 子句中的 `IN` 谓词。'
  raw: '### How It Works


    SQL Server XQuery has the ability to shorten the reference to the source element
    within the node() Method by adding leading double forward slashes to the source
    element, for example Resume.nodes(‘//ns:Tel.Number’). In this case “//” is shortcut
    for the XQuery “descendant-or-self::node()” path step. The XQuery engine uses
    this when searching for all occurrences of an element contained within the XML
    data that the nodes() method is acting upon.


    The hierarchy for the Tel.Number element that is part of the HumanResources.JobCandidate
    table’s Resume column is shown in Figure [6-6](#A435478_1_En_6_Chapter.html#Fig6).


    ![A435478_1_En_6_Fig6_HTML.jpg](A435478_1_En_6_Fig6_HTML.jpg)


    Figure 6-6.


    Showing the Tel.Number element hierarchy


    The fully qualified XQuery path expression for the nodes() method to the Tel.Number
    element is demonstrated in Listing [6-9](#A435478_1_En_6_Chapter.html#Par58).


    ```

    WITH XMLNAMESPACES

    (

    N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/Resume'' AS
    ns

    )

    SELECT

    .

    .

    .

    FROM HumanResources.JobCandidate

    CROSS APPLY Resume.nodes

    (''/ns:Resume/ns:Address/ns:Addr.Telephone/ns:Telephone/ns:Tel.Number'')

    AS Person(Info);

    Listing 6-9.

    Demonstrating a fully qualified reference to the Tel.Number element

    ```


    Caution


    It is obvious that the “//” axis operator provides a convenient way to set the
    reference to a deep child element. However, this technique should be tested thoroughly
    before coming to a final consideration because it could cause performance problems
    during the XML shredding process. Chapter [7](#A435478_1_En_7_Chapter.html) will
    provide more details about the nodes() method performance optimization.


    ## 6-4\. Filtering by Single Value


    ### Problem


    You need to set a single value filter when shredding the XML instance.


    ### Solution


    Set the filter within the nodes() Method, Listing [6-10](#A435478_1_En_6_Chapter.html#Par62).
    The result is demonstrated in Figure [6-7](#A435478_1_En_6_Chapter.html#Fig7).


    ![A435478_1_En_6_Fig7_HTML.jpg](A435478_1_En_6_Fig7_HTML.jpg)


    Figure 6-7.


    Result of filtered XQuery query


    ```

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''TotalPurchaseYTD'', ''MONEY'') AS TotalPurchase,

    ref.value(''DateFirstPurchase'', ''DATE'') AS DateFirstPurchase,

    ref.value(''YearlyIncome'', ''NVARCHAR(20)'') AS YearlyIncome,

    ref.value(''Occupation'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''CommuteDistance'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person CROSS APPLY

    Demographics.nodes(''IndividualSurvey[TotalPurchaseYTD > 9000]'') AS dmg(ref);

    Listing 6-10.

    Setting a single value filter within the nodes() Method

    ```


    ### How It Works


    The XQuery language supports filtering from within the nodes() method. The syntax
    for the XQuery filter is very similar to the T-SQL `WHERE` clause, but it’s not
    exactly the same. Table [6-1](#A435478_1_En_6_Chapter.html#Tab1) lists all comparison
    operators for the XQuery filters (see Recipe 6-2 in the How It Works section).
    They are the same except for one small difference: the not equal operator, XQuery
    implements “!=” as the only option. On the other hand, T-SQL provides a choice
    for DBAs and Developers between “!=” and “<>” operators (best practice in T-SQL,
    however, is to use the “<>” operator).


    To set a single value filter within the nodes() method you need:


    1.  the parent element IndividualSurvey  

    2.  opening bracket  

    3.  the child element TotalPurchaseYTD with comparison operator and value to compare
    against  

    4.  closing bracket  


    Practically speaking, all steps are the same as those demonstrated in Recipe 6-2
    for the exist() method. For example, the filter part for both is:


    ```

    IndividualSurvey[TotalPurchaseYTD > 9000]

    ```


    However, the exist() method has slightly better performance compared to the nodes()
    method. Because those two methods serve completely different functions, the exist()
    method is for filtering, and nodes() is for shredding .


    ## 6-5\. Filtering XML by T-SQL Variable


    ### Problem


    You want to filter XML results based on T-SQL variable values .


    ### Solution


    The SQL Server XQuery function sql:variable() allows your XQuery query expression
    to access the values of T-SQL variables or parameters for inclusion in your search
    criteria. The best implementation and demonstration of the sql:variable() function
    is a stored procedure, as shown in Listing [6-11](#A435478_1_En_6_Chapter.html#Par74).


    ```

    CREATE PROCEDURE dbo.usp_DemographicsByYearlyIncome

    @YearlyIncome NVARCHAR(20)

    AS

    BEGIN

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''TotalPurchaseYTD'', ''MONEY'') AS TotalPurchase,

    ref.value(''DateFirstPurchase'', ''DATE'') AS DateFirstPurchase,

    ref.value(''YearlyIncome'', ''NVARCHAR(20)'') AS YearlyIncome,

    ref.value(''Occupation'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''CommuteDistance'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey[YearlyIncome=sql:variable("@YearlyIncome")]'')
    AS dmg(ref);

    END;

    GO

    Listing 6-11.

    Creating a stored procedure with sql:variable() function

    ```


    ### How It Works


    XQuery has the function sql:variable() that allows you to filter XQuery without
    explicitly specify a search criteria. The sql:variable() function renders and
    maps a T-SQL declared variable or stored procedure parameter to the XQuery. The
    sql:variable() function could be a part of the nodes() and exist() Methods to
    provide filtering functionalities.


    The syntax to implement the sql:variable() function to filter an XML element is
    as follows:


    ```

    parentElement[childElement comparisonOperator sql:variable(“@varible”)]

    ```


    The syntax to implement the sql:variable() function to filter an XML attribute
    is as follows:


    ```

    parentElement[@attribute comparisonOperator sql:variable(“@varible”)]

    ```


    Listing [6-12](#A435478_1_En_6_Chapter.html#Par81) demonstrates several executions
    of the usp_DemographicsByYearlyIncome stored procedure with different parameter
    values.


    ```

    EXECUTE dbo.usp_DemographicsByYearlyIncome ''0-25000'';

    GO

    EXECUTE dbo.usp_DemographicsByYearlyIncome ''25001-50000'';

    GO

    EXECUTE dbo.usp_DemographicsByYearlyIncome ''50001-75000'';

    GO

    EXECUTE dbo.usp_DemographicsByYearlyIncome ''75001-100000'';

    GO

    EXECUTE dbo.usp_DemographicsByYearlyIncome ''greater than 100000'';

    GO

    Listing 6-12.

    Calling the usp_DemographicsByYearlyIncome stored procedure

    ```


    The result from the stored procedure execution with parameter value ''0-25000''
    is demonstrated in Figure [6-8](#A435478_1_En_6_Chapter.html#Fig8).


    ![A435478_1_En_6_Fig8_HTML.jpg](A435478_1_En_6_Fig8_HTML.jpg)


    Figure 6-8.


    Showing the stored procedure result Caution


    The sql:variable( ) function is part of XQuery; therefore the function is case
    sensitive and must be referenced in lowercase only. Any other case implementation
    will trigger the error: Msg 2395, … There is no function ‘{urn:schemas-microsoft-com:xml-sql}:Variable( )’.
    However, a variable name that sends to the sql:variable( ) function is not case
    sensitive.


