  trans: "### 工作原理\n\n当 XPath 节点测试在 `PATH` 模式下使用时，它们会向您的 XML 结果添加一个特殊节点。节点测试始终位于 XPath\
    \ 列别名的末尾。例如，在 `“Category/comment()”` 路径或 `“processing-instruction(xml:file)”`\
    \ 路径中。此外，节点测试也可以单独用作列别名，无需层次路径。表 2-2 列出了支持的 `FOR XML PATH` XPath 节点测试。\n\n表 2-2.\
    \ XPath 节点测试\n\n| 节点类型 | 节点返回 | 节点示例 |\n| --- | --- | --- |\n| `comment()` | 返回注释节点。\
    \ | `element/comment()` 选择上下文节点之后出现的所有注释节点。 |\n| `node()` | 返回任何类型的节点。可用于向结果添加子集\
    \ XML。 | `element/node()` 选择上下文节点之前出现的所有节点。 |\n| `processing-instruction(name)`\
    \ | 返回处理指令节点。 | `processing instruction(PI Name)` 选择上下文节点内的所有处理指令节点。 |\n| `text()`\
    \ | 返回文本节点。可用于将多个列合并为一个 XML 元素。 | `element/text()` 选择作为上下文节点子节点的文本节点。 |\n\n回顾清单\
    \ 2-28 中的代码，我们可以看到以下内容：\n\n1.  要在 `<CategoryName>` 元素下生成注释，需要在别名中提供带有 `comment()`\
    \ 节点测试的路径。生成的 XML 会将数据行映射到 XML 结果中的特殊注释标签 `<!--comment-->` 中。根据我们的示例代码：\n    ```sql\n\
    \    N'Sales started' + convert(nvarchar(12), Product.SellStartDate, 101) AS \"\
    Category/comment()\"\n    ```\n\n2.  `processing-instruction(name)` 节点测试必须在其括号内指定目标名称。如果未提供目标名称，将引发错误。此函数创建格式为\
    \ `<?name ?>` 的特殊 XML 节点。例如：\n    ```sql\n    N'The record for product number\
    \ ' + Product.ProductNumber AS \"processing-instruction(xml:file)\"\n    ```\n\
    \n3.  当需要将多个列连接为单个元素时，`text()` 节点测试非常有用。例如：\n    ```sql\n    SELECT DISTINCT Location.Name\
    \ \"text()\", ', cost rate $',\n    Location.CostRate \"text()\"\n    ```\n\n\
    4.  当需要将值插入 XML 数据类型时，`node()` 节点测试很有用。在清单 2-28 中，相关子查询执行两个操作。首先，它连接位置和成本率列；其次，它产生一个\
    \ XML 结果，因为一个产品可能有多个关联的位置。图 2-6 在一个 XML 结果中演示了所有 XPath 节点测试函数。\n    ![A435478_1_En_2_Fig6_HTML.jpg](img/A435478_1_En_2_Fig6_HTML.jpg)\n\
    \    图 2-6. 包含所有 XPath 节点测试函数的 XML 结果\n\n## 总结\n\n本章讨论了四种 `FOR XML` 模式：`RAW`、`AUTO`、`EXPLICIT`\
    \ 和 `PATH`。详细解释了每种模式，并针对特定情况提供了应使用的最佳模式建议，以及如何实现每种模式的技巧。我还讨论了指令、它们的功能以及每个指令如何与各种\
    \ XML 模式交互。如果您需要构建自定义 XML 结果，本章提供了如何构建健壮的自定义 XML 数据的方向。\n\n`FOR XML` 子句为用户提供了强大而高效的选项，用于从关系数据构建\
    \ XML 结果。图 2-7 中的图表说明了每种 `FOR XML` 模式支持的指令。\n![A435478_1_En_2_Fig7_HTML.gif](img/A435478_1_En_2_Fig7_HTML.gif)\n\
    图 2-7. 按模式分类的可用 `FOR XML` 指令\n\n下一章将演示如何将 XML 结果存储在存储介质（磁盘、SSD 驱动器、SAN 等）上，以及如何将\
    \ XML 文件上传到表中。\n\n# 3. 操作 XML 文件\n\n在第 2 章中，我们讨论了如何从 SQL 查询结果集构建 XML。在我们开始回顾如何分解\
    \ XML 数据的选项之前，我们首先需要知道如何将 XML 结果存储在存储介质（磁盘、SSD 驱动器、SAN 等）上，以及如何将 XML 文件上传到表中。本章将演示操作\
    \ XML 文件的各种选项。\n\n## 3-1. 从 SQL 将 XML 结果存储到文件中\n\n### 问题\n\n您希望将 SQL 中生成的 XML\
    \ 结果存储为 `.xml` 文件。\n\n### 解决方案\n\n`BCP`（大容量复制程序）实用程序允许将数据导出到 XML 文件。当文件路径有效且 SQL\
    \ Server 帐户具有存储文件所需的足够权限时，则可以从存储过程执行该过程。清单 3-1 演示了存储过程如何使用 `@FilePath` 参数中提供的文件路径创建\
    \ XML 文件。\n\n```sql\nCREATE PROCEDURE dbo.usp_WriteXMLFile\n@XML XML,\n@FilePath\
    \ nvarchar(200)\nAS\nBEGIN\nSET NOCOUNT ON;\nIF (OBJECT_ID('tempdb..##XML') IS\
    \ NOT NULL)\nDROP TABLE ##XML;\nCREATE TABLE ##XML (XMLHolder XML);\nINSERT INTO\
    \ ##XML\n(\nXMLHolder\n)\nSELECT @XML;\n-- 准备日志表\nDECLARE @cmd TABLE\n(\nname\
    \ NVARCHAR(35),\nminimum INT,\nmaximum INT,\nconfig_value INT,\nrun_value INT\n\
    );\nDECLARE @run_value        INT;\n-- 保存原始配置集\nEXECUTE master.dbo.sp_configure\
    \ 'show advanced options', 1;\nRECONFIGURE ;\nINSERT INTO @cmd\n(\nname,\nminimum,\n\
    maximum,\nconfig_value,\nrun_value\n)\nEXECUTE sp_configure 'xp_cmdshell';\nSELECT\
    \ @run_value = run_value\nFROM @cmd;\nIF @run_value = 0\nBEGIN\n-- 启用 xp_cmdshell\n\
    EXEC sp_configure 'xp_cmdshell', 1;\nRECONFIGURE;\nEND;\nDECLARE @SQL nvarchar(300)\
    \ = '';\nSET @SQL = 'bcp ##XML out \"' + @FilePath + '\\Categories_'\n+ FORMAT(GETDATE(),\
    \ N'yyyyMMdd_hhmmss')\n+ '.xml\" -S \"' + @@SERVERNAME + '\" -T -c';\n-- REPLACE(REPLACE(REPLACE(CONVERT(varchar(20),\
    \ GETDATE(), 120), '-', ''), ' ', '_'), ':', '')\n-- 对于仍在使用 SQL Server 2008 R2\
    \ 或更早版本的用户，请使用 REPLACE 代替 FORMAT。FORMAT 函数在 SQL 2012 中引入。\nEXECUTE master..xp_cmdshell\
    \ @SQL;\nIF @run_value = 0\nBEGIN\n-- 禁用 xp_cmdshell\nEXECUTE sp_configure 'xp_cmdshell',\
    \ 0;\nRECONFIGURE;\nEND;\nIF (OBJECT_ID('tempdb..##XML') IS NOT NULL)\nDROP TABLE\
    \ ##XML;\nSET NOCOUNT OFF;\nEND;\nGO\n```\n清单 3-1. 使用存储过程通过目标文件路径写入 XML 文件"
- fmt: "### How It Works\n\nThe stored procedure `usp_WriteXMLFile`, shown in Listing\
    \ [3-1](#A435478_1_En_3_Chapter.html#Par4), has several important components to\
    \ successfully create an XML file from within SQL Server. Let’s break down this\
    \ stored procedure to follow how the XML file-writing process works:\n\n1.  The\
    \ parameter `@FilePath` is the XML file destination path. This parameter makes\
    \ the stored procedure flexible, especially when running it in different environments,\
    \ such as development, staging, and production.\n2.  `CREATE` a global temporary\
    \ table (`##XML`), then `DROP` it in the end. Use a column name `XMLHolder` with\
    \ the `XML` data type to get `XML` data. It is a rare case to need to create a\
    \ global temporary table; however, the `BCP` command will raise an error if a\
    \ session-level temporary table is referenced. Therefore, we can use either a\
    \ permanent table or a global temporary table. There is always a risk in implementing\
    \ a global temporary table, if the process part of the concurrent process. The\
    \ global temporary table is seen throughout the entire server and if somebody\
    \ else happens to use the stored procedure at the same time, one of the user’s\
    \ tables could be overwritten and therefore receive inaccurate results. Please\
    \ reference the code samples for Chapter [3](#A435478_1_En_3_Chapter.html) where\
    \ the stored procedure `usp_WriteXMLFileDynamicTable` demonstrates how to solve\
    \ this problem.\n3.  `INSERT` the `XML` data into a global temporary table (`##XML`).\n\
    4.  To run the `BCP` command from a stored procedure or SSMS, the server instance\
    \ needs to be configured for `xp_cmdshell` option at value 1. This means that\
    \ the instance allows the `xp_cmdshell` extended stored procedure to run. There\
    \ are cases where due to security reasons, you may be required to maintain the\
    \ configuration for the server instance at value 0 (disabled status). In this\
    \ case, you would still need to incorporate code that switches the server instance\
    \ from value 0 to 1, then back to 0 while creating the XML file. Since the `BCP`\
    \ command is able to create the XML file in milliseconds, there is virtually no\
    \ security risk during the milliseconds that the server is set to value 0 to enable\
    \ the `xp_cmdshell` stored procedure to create the XML file.\n    *   To preserve\
    \ the original settings, the table variable `@cmd` is created.\n    *   The system\
    \ stored procedure `sp_configure` uses the parameter value `'xp_cmdshell'`. This\
    \ result is inserted into the table variable `@cmd`, which reflects the current\
    \ status of the `'xp_cmdshell'` option.\n    *   The following statement `SELECT\
    \ @run_value = run_value FROM @cmd` populates the local variable `@run_value`\
    \ to preserve the `xp_cmdshell` option `run_value` for further analysis.\n   \
    \ *   The conditional statement `IF @run_value = 0` detects whether or not the\
    \ option value needs to be changed from 0 to 1.\n5.  The variable `@SQL` is created\
    \ to compose the statement for the `BCP` utility.\n6.  The final command depends\
    \ on the instance and database name and could be the following:\n\n    Let’s take\
    \ a closer look at all of the arguments and switches that are required by `BCP`\
