- fmt: "### Solution\n\n`ROOT`选项将你的XML结果包装在一个你选择的顶级根元素中。[清单 2-12](#A435478_1_En_2_Chapter.html#Par61)演示了如何向查询中添加`ROOT`指令。\n\
