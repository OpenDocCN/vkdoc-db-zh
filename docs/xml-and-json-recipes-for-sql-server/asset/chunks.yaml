    GO

    ```

    ## Shredding XML

    ```

    SET STATISTICS TIME ON;

    SELECT clm.value(''../../../Database[1]'', ''varchar(50)'') as [Database]

    ,clm.value(''../../SchemaName[1]'', ''varchar(50)'') as SchemaName

    ,clm.value(''../../TableName[1]'', ''varchar(50)'') as TableName

    ,clm.value(''@ColumnName'', ''varchar(50)'') as ColumnName

    FROM dbo.Table_Info_XML

    CROSS APPLY XMLDoc.nodes(''TableInfo/Tables/Columns/Column'') as tbl(clm);

    SET STATISTICS TIME OFF;

    ```

    ## Shredding JSON

    ```

    SET STATISTICS TIME ON;

    SELECT db.[Database]

    , tbl.SchemaName

    , tbl.TableName

    , clmn.ColumnName

    FROM dbo.Table_Info_JSON

    CROSS APPLY OPENJSON (JSONDoc)

    WITH

    (

    [Database] varchar(30),

    [Tables] nvarchar(MAX) AS JSON

    ) as db

    CROSS APPLY OPENJSON ([Tables])

    WITH

    (

    TableName varchar(30),

    SchemaName varchar(30),

    [Columns] nvarchar(MAX) AS JSON

    ) as tbl

    CROSS APPLY OPENJSON ([Columns])

    WITH

    (

    ColumnName varchar(30)

    ) as clmn

    SET STATISTICS TIME OFF ;

    ```

    *Listing 10-13. Demonstrating T-SQL code*


    ### How It Works

    The five-step mechanism to compare XML and JSON is listed in the Solution section
    as well as T-SQL code (Listing [10-13](#A435478_1_En_10_Chapter.html#Par69)) to
    create the tables, establish, and run the cursors to load the table with XML using
    the `FOR XML` clause and JSON using the `FOR JSON` clause; and as a last step,
    shred both XML and JSON columns into row sets. This code should be familiar to
    you by now, because the code for this case is very similar to several of the previous
    recipes.


    The comparison ran on the WideWorldImporters database. However, the code is database
    independent and could run on any database with a Compatibility Level of 130 or
    higher. In the “How It Works” section, I would like to compare the performance
    numbers between two processes. The insert runtime numbers in milliseconds are
    shown in Table [10-8](#A435478_1_En_10_Chapter.html#Tab8). In both the `Table_Info_JSON`
    and `Table_Info_XML` tables, 573 rows were inserted. The measurement was taken
    by the `DATEDIFF()` function for both JSON and XML inserts. The start time was
    assigned to a variable before the cursor started, and the function call was executed
    after the cursor deallocation.


    **Table 10-8. Comparing the insert time side by side**


    | JSON Insert | XML Insert |

    | --- | --- |

    | 20 milliseconds | 26 milliseconds |


    The shredding was measured by enabling `STATISTICS TIME`. Each shredding process
    ran separately, with the SSMS option Result To Text (Result To Grid returns slightly
    higher numbers).


    JSON shredding record:

    ```

    (573 row(s) affected)

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 14 ms.

    ```


    XML shredding record:

    ```

    (573 row(s) affected)

    SQL Server Execution Times:

    CPU time = 15 ms,  elapsed time = 21 ms.

    ```


    > **Note**

    >

    > The output on your PC could return different performance numbers.


    To summarize both, in the inserting and shredding processes, JSON clearly has
    slightly better performance than XML. However, it does not mean that you need
    to implement JSON immediately! Each technology has its pros and cons. For example,
    JSON is lighter than XML and processes faster, so it could be a good fit for a
    relatively small document without a deep parent-child structure. However, as of
    today, JSON is in string data format and cannot compete with a solid XML data
    type, which is practically a language. There are many options that make XML irreplaceable:
    XML Schema, Attributes, and Namespaces, to name a few. I would advise against
    taking extreme courses of action. Any technology should be used with the best
    practical performance, that is, what is better for each case.'
