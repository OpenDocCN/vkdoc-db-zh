    function. The query from Listing [4-1](#A435478_1_En_4_Chapter.html#Par4) returns
    the result where the LaborStation attribute (property of the Location element)
    with value “10” has 6 steps in this particular example, however the number of
    steps can vary. The element hierarchy from Listing [4-8](#A435478_1_En_4_Chapter.html#Par39)
    is root/Location/step/, so both <material> and <tool> are the child step elements,
    and they each contain a single text node. Therefore, XPath root/Location/step
    will satisfy the @rowpattern parameter for an `OPENXML` function. Later, we will
    provide a precise path for each element and attribute data cell in the `WITH`
    construct.


    For the optional parameter @flags we have provided a value of 2, because the XPath
    final point <step> is an element, and the <Location> element has several attributes
    that will be part of the result set. This combination of element-centric and attribute-centric
    properties is the best scenario for @flags = 2.


    The `WITH` construct provides the specification for the resulting output. The
    XML is hierarchical data, so in order to retrieve a specific element and attribute,
    we need to provide a precise source data location. In most cases the source data
    is located outside of the location that is specified for the @rowpattern parameter.


    The hierarchical structure of XML data can be compared to the Windows folder/file
    structure. Imagine navigating the folder structure. In simple terms, if you need
    to copy several files from different folders into a new folder, then you are navigating
    from one folder to another to collect all needed files. Therefore, the `WITH`
    construct builds the table that will return the collected data from elements and
    attributes. Unlike the tables, the `WITH` construct has a column name, datatype,
    and the XML item location path. The `WITH` construct from Listing [4-1](#A435478_1_En_4_Chapter.html#Par4),
    reproduced in Listing [4-9](#A435478_1_En_4_Chapter.html#Par47), defines the shape.


    ```

    WITH (

    LaborStation INT ''../@LocationID'',

    LaborHours REAL ''../@LaborHours'',

    LotSize INT ''../@LotSize '',

    MachineHours REAL ''../@MachineHours '',

    SetupHours REAL ''../@SetupHours '',

    Material VARCHAR(100) ''df:material'',

    Tool VARCHAR(100) ''df:tool'',

    StepInstruction VARCHAR(2000) ''.''

    )

    Listing 4-9.

    WITH clause defining XML structure

    ```


    The LocationID, LaborHours, LotSize, and MachineHours are attributes of the <Location>
    element (see Listing [4-3](#A435478_1_En_4_Chapter.html#Par9)), which is the parent
    of the <step> element. To retrieve the data from these attributes, we need to
    move one level up from the <step> element, because the `OPENXML` function is set
    to the <step>element, which is one step below. In order to have XML read the proper
    step and account for it reading one step below, you must move one step above.
    The “LaborStation” is an alias for the LocationID attribute, and the data type
    is</step> `INT` because LocationID is a whole number. The path structure for ‘../@LocationID’
    value means:


    *   “../” - move one level up from current location.

    *   “@” - specifies that this is an attribute.

    *   LocationID – is the original attribute name.


    The same mechanism applies to other LaborHours, LotSize, and MachineHours attributes.


    The <material> and <tool> elements are both children of the <step> element. Therefore,
    we need to move down to access the elements’ data, for example:


    *   Material - element alias.

    *   VARCHAR(100) - presented data type.

    *   ‘df:material’ – df: namespace reference, and material is the element name
    .


    The last column is StepInstruction, where the data type is `VARCHAR`(2000), and
    ‘ . ’ means that the current context node is the final element from the XPath
    rowpattern parameter.


    The `SELECT` clause returns the following columns, which are aliased in the `WITH`
    construct:


    *   StepInstruction – alias for the <step> element.

    *   LaborStation – alias for the LocationID attribute.

    *   LaborHours – alias for the LaborHours attribute.

    *   LotSize – alias for the LotSize attribute.

    *   MachineHours – alias for the MachineHours attribute.

    *   SetupHours – alias for the SetupHours attribute.

    *   Material – alias for the <material> element.

    *   Tool – alias for the <tool> element.


    Finally, we need to deallocate the XML document from the memory. The stored procedure
    sp_xml:removedocument removes the XML document when we set the XML handler to
    the required parameter:


    ```

    EXECUTE sp_xml:removedocument @idoc;

    ```


    Caution


    SQL Server does not provide garbage collection for XML documents processed by
    the sp_xml:preparedocument stored procedure. The XML document is stored in the
    internal cache of SQL Server, and the MSXML parser uses one-eighth of the total
    memory available for SQL Server. Therefore, memory deallocation must be set explicitly
    by the sp_xml:removedocument stored procedure. Otherwise, the server will have
    a memory leak problem and will periodically restart the procedure, which requires
    server memory.'
  trans: "\n# 工作原理\n\n在开始分解 XML 之前，第一步是确定 XML 结构，以及哪些元素和属性将成为结果集的一部分。这可以通过在 AdventureWorks\
    \ 数据库上执行 SQL 来分析 XML 数据来完成，如代码清单 4-2 所示。\n\n```sql\nSELECT Instructions\nFROM\
    \ Production.ProductModel\nWHERE ProductModelID = 7;\n```\n*代码清单 4-2. 检索单个产品模型的示例\
    \ XML 说明的查询*\n\nXML 结果太大，无法在书页中完整显示。因此，代码清单 4-3 中的 XML 片段已为演示目的进行了格式化。\n\n```xml\n\
    <root xmlns=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelInstructions\"\
    >\n  <Adventure Works CyclesFR-210B Instructions....</Description>\n  <Location\
    \ LocationID=\"10\" LaborHours=\"0.5\" ...>\n    <step>...</step>\n    <step>\n\
    \      <material>aluminum sheet MS-2341</material>\n      <tool>T-85A framing\
    \ tool</tool>\n    </step>\n    ...\n  </Location>\n</root>\n```\n*代码清单 4-3. 演示结果数据的\
    \ XML 片段*\n\n## 数据准备\n\n`<root>` 元素有一个命名空间，该命名空间必须是 `OPENXML` 函数 XML 初始化的一部分。因此，声明了几个变量。这些变量的用途如下：\n\
    \n1.  `@xml` (`XML`) – 从表中将 XML 数据作为单个单元检索。\n2.  `@idoc` (`INT`) – 存储从 `sp_xml_preparedocument`\
    \ 系统存储过程返回的文档句柄，以允许 `OPENXML` 访问 XML 数据。\n3.  `@ns` (`VARCHAR`(200)) – 存储 XML\
    \ 命名空间，提供给 `sp_xml_preparedocument` 系统存储过程，以及用于指定命名空间声明的参数 `xpath_namespaces`。\n\
    \n> **注意**\n> 当 XML 具有命名空间时，无法避免该命名空间。如果在 `sp_xml_preparedocument` 系统存储过程中未声明和指定命名空间，`OPENXML`\
    \ 函数将不会返回结果集。命名空间有助于避免名称冲突，并唯一标识 XML 数据中的元素和属性。\n\n分配给 `@ns` 变量的值需要更多解释。在代码清单\
    \ 4-1 中，`<root>` 元素中的命名空间声明与分配给 `@ns` 变量的那个略有不同。根元素命名空间如代码清单 4-4 所示。\n\n```xml\n\
    xmlns=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelInstructions\"\
    \n```\n*代码清单 4-4. `<root>` 元素中的命名空间声明*\n\n示例代码中 `@ns` 变量的命名空间声明略有不同，如代码清单 4-5\
    \ 所示。\n\n```sql\n@ns = 'xmlns:df=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelInstructions\"\
    '\n```\n*代码清单 4-5. `@ns` 变量命名空间声明*\n\n变量 `@ns` 的值包含一个额外的部分 `xmlns:df=…`，其中 `df`（“default”的缩写）可以指定任何别名。最常用的别名是\
    \ `ns`。该命名空间用作 `OPENXML` 函数元素的引用。简而言之，这就像在不使用模式“Production”的情况下引用 `ProductModel`\
    \ 表一样。我们必须使用 `Production.ProductModel` 来提供对该表的引用；否则 SSMS 将抛出错误：“object not found”。主要区别在于\
    \ XML 解析器不会引发错误，而是会简单地忽略元素及其属性。因此，不会返回任何结果。\n\n代码清单 4-6 中的代码在代码清单 4-2 的基础上，将结果赋值给一个\
    \ `XML` 变量：\n\n```sql\nSELECT @xml = Instructions\nFROM Production.ProductModel\n\
    WHERE ProductModelID = 7;\n```\n*代码清单 4-6. 将 XML 示例数据赋值给 XML 变量*\n\n系统存储过程 `sp_xml_preparedocument`\
    \ 使用 MSXML 解析器 (`Msxmlsql.dll`) 来解析 XML 数据，并返回一个数值（`INT` 数据类型）值，该值提供了一个指针（变量 `@doc`）以访问\
    \ XML。\n\n存储过程 `sp_xml_preparedocument` 有三个参数：\n\n1.  `@hdoc` (`INT` OUTPUT) –\
    \ 必需，整数数据类型。\n2.  `@xmltext` (`NTEXT`) – 必需，可以是任何文本数据类型（`VARCHAR`、`NVARCHAR`、`XML`、`TEXT`\
    \ 或 `NTEXT`）。使用的数据类型必须能隐式转换为旧的 `NTEXT` 数据类型；因此不允许使用 `VARBINARY`。\n3.  `@xpath_namespaces`\
    \ (`NTEXT`) – 可选，可以是任何文本数据类型（`VARCHAR`、`NVARCHAR`、`XML`、`TEXT`、`NTEXT` 或 `XML`）。请注意，此参数的类型转换限制与\
    \ `@xmltext` 参数相同。\n\n当 XML 文档在执行存储过程 `sp_xml_preparedocument` 并返回后被加载到内存中时，XML\
    \ 文档处理程序（内存指针）通过将值输出到 `@doc` 变量来返回该值，如代码清单 4-7 所示。\n\n```sql\nEXECUTE sp_xml_preparedocument\
    \ @doc OUTPUT, @xml, @ns;\n```\n*代码清单 4-7. 调用 `sp_xml_preparedocument` 过程*\n\n\
    ## OPENXML 函数\n\n现在，流程已准备好将 XML 文档转换为关系结果集。返回结果集的查询包含三个部分：\n\n*   `SELECT` 子句\
    \ – 将结果提供给用户。\n*   `OPENXML` 函数 – 提供对 XML 文档的访问，并将 XPath 设置为起始元素。\n*   `WITH`\
    \ 构造 – 定义描述构成 XML 数据的每个元素和属性的表。\n\nXML 分解过程从 `OPENXML` 函数开始。`OPENXML` 函数有三个输入参数：\n\
    \n*表 4-1. `@flags` 参数的取值列表*\n\n| 标志 | 描述 |\n| --- | --- |\n| 0 | 默认为以属性为中心的映射。\
    \ |\n| 1 | 指定数据的以属性为中心的映射。 |\n| 2 | 指定数据的以元素为中心的映射。 |\n| 8 | 可与标志 1 或标志 2 组合使用，按位\
    \ OR 运算。此标志表示消耗的数据不应复制到溢出属性 `@mp:xmltext`。 |\n\n1.  `@idoc` (`INT`) – [必需] 是 XML\
    \ 文档的内部表示形式，由执行 `sp_xml_preparedocument` 存储过程创建。\n2.  `@rowpattern` (`NVARCHAR`)\
    \ – [必需] 是标识起始元素的 XPath 模式。\n3.  `@flags` (`TINYINT`) – [可选] 指示 XML 文档的映射方式。标志值列于表\
    \ 4-1 中。\n\n`OPENXML` 函数是 `FROM` 子句的一部分，因为 XML 数据是数据源。代码清单 4-1 演示了设置在 `FROM` 子句中的\
    \ `OPENXML` 函数：`FROM OPENXML(@idoc, 'df:root/df:Location/df:step', 2)`。\n\n第一个参数直接来自存储过程\
    \ `sp_xml_preparedocument` 的输出，我们为函数提供了存储在变量中的输出。XPath 模式并不直观，需要详细的 XML 结构分析。让我们从示例\
    \ 4-1 所示的 XML 中移除数据，以分离并分析其结构，如代码清单 4-8 所示。\n\n```xml\n<root xmlns=\"...\">\n\
    \  <Location LocationID=\"10\" ...>\n    <step>\n      <material>...</material>\n\
    \      <tool>...</tool>\n    </step>\n    <step>\n      <material>...</material>\n\
    \      <tool>...</tool>\n    </step>\n  </Location>\n</root>\n```\n*代码清单 4-8.\
    \ 展示裸 XML 结构的片段*\n\n我用来正确定义 XPath 并分解 XML 的规则是：\n\n*   当同一个子元素被多次列出时，XPath 模式必须指向该元素。\n\
    *   `<step>` 元素的层次结构是：`root/Location/step`。\n*   此分析对于为 `OPENXML` 函数指定高效的 XPath\
    \ 非常重要。代码清单 4-1 中的查询返回的结果显示，值为“10”的 `LaborStation` 属性（`Location` 元素的属性）在此特定示例中有\
    \ 6 个步骤，但步骤数量可能有所不同。代码清单 4-8 中的元素层次结构是 `root/Location/step/`，因此 `<material>` 和\
    \ `<tool>` 都是 `<step>` 的子元素，它们各自包含一个文本节点。因此，XPath `root/Location/step` 将满足 `OPENXML`\
    \ 函数的 `@rowpattern` 参数要求。稍后，我们将在 `WITH` 构造中为每个元素和属性数据单元格提供精确的路径。\n\n对于可选参数 `@flags`，我们提供了值\
    \ `2`，因为 XPath 的终点 `<step>` 是一个元素，并且 `<Location>` 元素有几个属性将成为结果集的一部分。这种以元素为中心和以属性为中心的特性组合是\
    \ `@flags = 2` 的最佳场景。\n\n`WITH` 构造提供了结果输出的规范。XML 是层次数据，因此为了检索特定的元素和属性，我们需要提供精确的源数据位置。在大多数情况下，源数据位于为\
    \ `@rowpattern` 参数指定的位置之外。\n\nXML 数据的层次结构可以与 Windows 文件夹/文件结构相比较。想象一下浏览文件夹结构。简而言之，如果您需要将不同文件夹中的多个文件复制到一个新文件夹中，那么您需要从一个文件夹导航到另一个文件夹以收集所有需要的文件。因此，`WITH`\
    \ 构造构建一个表，该表将返回从元素和属性收集的数据。与普通表不同，`WITH` 构造具有列名、数据类型和 XML 项位置路径。代码清单 4-1 中的 `WITH`\
    \ 构造，在代码清单 4-9 中重现，定义了其结构。\n\n```sql\nWITH (\n    LaborStation INT '../@LocationID',\n\
    \    LaborHours REAL '../@LaborHours',\n    LotSize INT '../@LotSize ',\n    MachineHours\
    \ REAL '../@MachineHours ',\n    SetupHours REAL '../@SetupHours ',\n    Material\
    \ VARCHAR(100) 'df:material',\n    Tool VARCHAR(100) 'df:tool',\n    StepInstruction\
    \ VARCHAR(2000) '.'\n)\n```\n*代码清单 4-9. 定义 XML 结构的 `WITH` 子句*\n\n`LocationID`、`LaborHours`、`LotSize`\
    \ 和 `MachineHours` 是 `<Location>` 元素的属性（参见代码清单 4-3），而 `<Location>` 是 `<step>`\
    \ 元素的父元素。要从这些属性中检索数据，我们需要从 `<step>` 元素向上移动一级，因为 `OPENXML` 函数被设置为指向 `<step>` 元素，它位于下一级。为了让\
    \ XML 读取正确的步骤并考虑到它读取的是下一级，您必须向上移动一级。“LaborStation”是 `LocationID` 属性的别名，数据类型是 `INT`，因为\
    \ `LocationID` 是一个整数。`'../@LocationID'` 值的路径结构意味着：\n\n*   `\"../\"` - 从当前位置向上移动一级。\n\
    *   `\"@\"` - 指定这是一个属性。\n*   `LocationID` – 是原始属性名。\n\n相同的机制适用于其他 `LaborHours`、`LotSize`\
    \ 和 `MachineHours` 属性。\n\n`<material>` 和 `<tool>` 元素都是 `<step>` 元素的子元素。因此，我们需要向下移动以访问元素的数据，例如：\n\
    \n*   `Material` - 元素别名。\n*   `VARCHAR(100)` - 呈现的数据类型。\n*   `'df:material'` –\
    \ `df:` 命名空间引用，`material` 是元素名。\n\n最后一列是 `StepInstruction`，数据类型是 `VARCHAR`(2000)，`'\
    \ . '` 表示当前上下文节点是 XPath `rowpattern` 参数的最终元素。\n\n`SELECT` 子句返回以下列，这些列在 `WITH`\
    \ 构造中被赋予了别名：\n\n*   `StepInstruction` – `<step>` 元素的别名。\n*   `LaborStation` –\
    \ `LocationID` 属性的别名。\n*   `LaborHours` – `LaborHours` 属性的别名。\n*   `LotSize` –\
    \ `LotSize` 属性的别名。\n*   `MachineHours` – `MachineHours` 属性的别名。\n*   `SetupHours`\
    \ – `SetupHours` 属性的别名。\n*   `Material` – `<material>` 元素的别名。\n*   `Tool` – `<tool>`\
    \ 元素的别名。\n\n## 内存释放\n\n最后，我们需要从内存中释放 XML 文档。当我们将 XML 处理程序设置为必需的参数时，存储过程 `sp_xml_removedocument`\
    \ 会移除 XML 文档：\n\n```sql\nEXECUTE sp_xml_removedocument @idoc;\n```\n\n> **警告**\n\
    > SQL Server 不为通过 `sp_xml_preparedocument` 存储过程处理的 XML 文档提供垃圾回收。XML 文档存储在 SQL\
    \ Server 的内部缓存中，MSXML 解析器使用 SQL Server 可用总内存的八分之一。因此，必须通过 `sp_xml_removedocument`\
    \ 存储过程显式设置内存释放。否则，服务器将出现内存泄漏问题，并会定期重启该过程，这将消耗服务器内存。\n"
- fmt: '## 4-2. Migrating OPENXML into XQuery


    ### Problem


    You need to find an alternative to `OPENXML` function to shred the XML documents.


    ### Solution


    SQL Server 2005 introduced the `XML` data type and XQuery language support via
    five XML data type methods: `nodes()`, `value()`, `query()`, `exist()`, and `modify()`.
    These methods allow comprehensive manipulation of XML data. For the `XML` data
    type, the legacy stored procedures `sp_xml_preparedocument` and `sp_xml_removedocument`
    are obsolete (see Solution 4-1 for details), and are unused. Listing [4-10](#A435478_1_En_4_Chapter.html#Par72)
    shows how to migrate the `OPENXML()` function process to XQuery code using the
    `nodes()` and `value()` methods.


    ```sql

    DECLARE @xml XML;

    SELECT @xml = Instructions

    FROM [Production].[ProductModel]

    WHERE ProductModelID = 7;

    WITH XMLNAMESPACES(''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions''
    as df)

    SELECT RTRIM(LTRIM(REPLACE(instruct.value(''.'', ''VARCHAR(2000)''), CHAR(10),
    ''''))) AS StepInstruction,

    instruct.value(''../@LocationID'', ''INT'') AS LaborStation,

    instruct.value(''../@LaborHours'', ''REAL'') AS LaborHours,

    instruct.value(''../@LotSize'', ''INT'') AS LotSize,

    instruct.value(''../@MachineHours'', ''REAL'') AS MachineHours,

    instruct.value(''../@SetupHours'', ''REAL'') AS SetupHours,

    instruct.value(''df:material[1]'', ''VARCHAR(100) '') AS Material,

    instruct.value(''df:tool[1]'', ''VARCHAR(100) '') AS Tool

    FROM @xml.nodes(''df:root/df:Location/df:step'') prod(instruct);

    ```


    Listing 4-10.

    Migrating OPENXML into XQuery


    **Caution**


    All XQuery methods are case sensitive; therefore, to avoid an error, the methods
    `nodes()`, `value()`, `query()`, `exist()`, and `modify()` must be used in lowercase
    only.'
  raw: '## 4-2\. Migrating OPENXML into XQuery


    ### Problem


    You need to find an alternative to OPENXML function to shred the XML documents.


    ### Solution


    SQL Server 2005 introduced the `XML` data type and XQuery language support via
    five XML data type methods: nodes(), value(), query(),exist(), and modify(). These
    methods allow comprehensive manipulation of XML data. For the `XML` data type,
    the legacy stored procedures sp_xml:preparedocument and sp_xml:removedocument
    are obsolete (see Solution 4-1 for details), and are unused. Listing [4-10](#A435478_1_En_4_Chapter.html#Par72)
    shows how to migrate the `OPENXML()` function process to XQuery code using the
    nodes() and value() methods.


    ```

    DECLARE @xml XML;

    SELECT @xml = Instructions

    FROM [Production].[ProductModel]

    WHERE ProductModelID = 7;

    WITH XMLNAMESPACES(''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions''
    as df)

    SELECT RTRIM(LTRIM(REPLACE(instruct.value(''.'', ''VARCHAR(2000)''), CHAR(10),
    ''''))) AS StepInstruction,

    instruct.value(''../@LocationID'', ''INT'') AS LaborStation,

    instruct.value(''../@LaborHours'', ''REAL'') AS LaborHours,

    instruct.value(''../@LotSize'', ''INT'') AS LotSize,

    instruct.value(''../@MachineHours'', ''REAL'') AS MachineHours,

    instruct.value(''../@SetupHours'', ''REAL'') AS SetupHours,

    instruct.value(''df:material[1]'', ''VARCHAR(100) '') AS Material,

    instruct.value(''df:tool[1]'', ''VARCHAR(100) '') AS Tool

    FROM @xml.nodes(''df:root/df:Location/df:step'') prod(instruct);

    Listing 4-10.

    Migrating OPENXML into XQuery

    ```


    Caution


    All XQuery methods are case sensitive; therefore, to avoid an error, the methods
    nodes(), value(), query(), exist(), and modify() must be used in lowercase only.'
  trans: '## 4-2. 将 OPENXML 迁移到 XQuery


    ### 问题


    你需要找到 `OPENXML` 函数的替代方法来解析 XML 文档。


    ### 解决方案


    SQL Server 2005 引入了 `XML` 数据类型和 XQuery 语言支持，通过五个 XML 数据类型方法实现：`nodes()`、`value()`、`query()`、`exist()`
    和 `modify()`。这些方法允许对 XML 数据进行全面操作。对于 `XML` 数据类型，传统的存储过程 `sp_xml_preparedocument`
    和 `sp_xml_removedocument` 已被弃用（详见解决方案 4-1）且不再使用。代码清单 4-10 展示了如何使用 `nodes()` 和
    `value()` 方法将 `OPENXML()` 函数处理过程迁移到 XQuery 代码。


    ```sql

    DECLARE @xml XML;

    SELECT @xml = Instructions

    FROM [Production].[ProductModel]

    WHERE ProductModelID = 7;

    WITH XMLNAMESPACES(''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions''
    as df)

    SELECT RTRIM(LTRIM(REPLACE(instruct.value(''.'', ''VARCHAR(2000)''), CHAR(10),
    ''''))) AS StepInstruction,

    instruct.value(''../@LocationID'', ''INT'') AS LaborStation,

    instruct.value(''../@LaborHours'', ''REAL'') AS LaborHours,

    instruct.value(''../@LotSize'', ''INT'') AS LotSize,

    instruct.value(''../@MachineHours'', ''REAL'') AS MachineHours,

    instruct.value(''../@SetupHours'', ''REAL'') AS SetupHours,

    instruct.value(''df:material[1]'', ''VARCHAR(100) '') AS Material,

    instruct.value(''df:tool[1]'', ''VARCHAR(100) '') AS Tool

    FROM @xml.nodes(''df:root/df:Location/df:step'') prod(instruct);

    ```


    代码清单 4-10.

    将 OPENXML 迁移到 XQuery


    **注意**


    所有 XQuery 方法都是**区分大小写**的；因此，为避免错误，方法 `nodes()`、`value()`、`query()`、`exist()` 和
    `modify()` 必须**仅使用小写字母**。'
- fmt: '### How It Works


    The `OPENXML` function was introduced in SQL Server 2000 where the `XML` data
    type was nonexistent at the time. Therefore, each `XML` document needed to be
    converted from data types such as `VARCHAR`, `NVARCHAR`, `BINARY`, `IMAGE`, `TEXT`,
    and `NTEXT`, into an internal format that could be manipulated by `MSXML`. This
    was accomplished with the `sp_xml:preparedocument` stored procedure.


    Since SQL Server 2005, when the `XML` data type was implemented, the `XML` shredding
    and the building process were dramatically simplified. The `XQuery` language works
    with the `XML` data type directly. Therefore, extra steps to prepare `XML` data
    are no longer necessary when the shredding process is based on the `XML` data
    type, or the `XML` data can be explicitly converted to the `XML` data type using
    the `CAST()` and `CONVERT()` functions.


    The difference between the `CONVERT` and `CAST` functions is that the `CONVERT`
    function is not part of an `ANSI-SQL` specification, whereas `CAST` is. However,
    most importantly, `CONVERT` has a third optional parameter that provides additional
    functionality to the conversion process, such a controlling whitespace handling
    or applying an inline Document Type Definition (`DTD`). The following is a description
    of `XML` Style Parameter Values for the `CONVERT` function:


    *   `0` – (default) Discard insignificant whitespace in the `XML` and does not
    allow the use of an internal `DTD`.

    *   `1` – Preserve insignificant whitespace in the `XML`. However, does not allow
    the use of an internal `DTD`.

    *   `2` – Discards insignificant whitespace and enable limited internal `DTD`

    *   `3` – Preserve insignificant whitespace and enable limited internal `DTD`.


    Listing 4-2 demonstrates the solution to migrate the `OPENXML` function into the
    `XQuery` language. The first line declares the `XML` variable, as shown in Listing
    4-11.


    ```

    DECLARE @xml XML;

    Listing 4-11.

    Declaring an XML variable

    ```


    Next, we assign the `XML` data value to the variable, as shown in Listing 4-12.


    ```

    SELECT @xml = Instructions

    FROM Production.ProductModel

    WHERE ProductModelID = 7;

    Listing 4-12.

    Populating the XML variable

    ```


    To shred an `XML` document that has an `xml` namespace (as in Listing 4-2), we
    need to declare the instance of the `XML` namespace. The SQL Server `WITH XMLNAMESPACES`
    clause allows us to list and instantiate the `XML` namespaces. The declaration
    syntax for the `WITH XMLNAMESPACES` clause combines the `WITH` and `XMLNAMESPACES`
    keywords. Always make sure that a semicolon (`;`) precedes the `WITH` construct
    when writing this `T-SQL` code.


    **Tip**


    It’s a good practice to have all `SQL` statements terminated with a semicolon
    (`;`). The `WITH XMLNAMESPACES` clause, like the `WITH CTE` clause, must always
    be separated from preceding statements by a semicolon. Otherwise, `SQL Server`
    will throw an error.


    To match the legacy syntax from Listing 4-1, this example creates the same `xml`
    namespace name, with "`df`", as shown in Listing 4-13.


    ```

    WITH XMLNAMESPACES(''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions''
    as df)

    Listing 4-13.

    Declaring the XML namespace with prefix “df”

    ```


    However, when the `XML` document has only a single `XML` namespace, the namespace
    can be declared as `DEFAULT` with no explicit namespace prefix requirements for
    the `XML` namespace. Listing 4-14 demonstrates shredding of the `XML` document
    with the default `xml` namespace.


    ```

    WITH XMLNAMESPACES(DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'')

    SELECT RTRIM(LTRIM(REPLACE(instruct.value(''.'', ''varchar(2000)''), CHAR(10),
    ''''))) AS StepInstruction

    instruct.value(''../@LocationID'', ''int'') AS LaborStation,

    instruct.value(''../@LaborHours'', ''real'') AS LaborHours,

    instruct.value(''../@LotSize'', ''int'') AS LotSize,

    instruct.value(''../@MachineHours'', ''real'') AS MachineHours,

    instruct.value(''../@SetupHours'', ''real'') AS SetupHours,

    instruct.value(''material[1]'', ''varchar(100) '') AS Material,

    instruct.value(''tool[1]'', ''varchar(100) '') AS Tool

    FROM @xml.nodes(''root/Location/step'') prod(instruct);

    WITH XMLNAMESPACES(''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions''
    as df)

    SELECT RTRIM(LTRIM(REPLACE(instruct.value(''.'', ''varchar(2000)''), CHAR(10),
    ''''))) AS StepInstruction,

    instruct.value(''../@LocationID'', ''int'') AS LaborStation,

    instruct.value(''../@LaborHours'', ''real'') AS LaborHours,

    instruct.value(''../@LotSize'', ''int'') AS LotSize,

    instruct.value(''../@MachineHours'', ''real'') AS MachineHours,

    instruct.value(''../@SetupHours'', ''real'') AS SetupHours,

    instruct.value(''df:material[1]'', ''varchar(100) '') AS Material,

    instruct.value(''df:tool[1]'', ''varchar(100) '') AS Tool

    FROM @xml.nodes(''df:root/df:Location/df:step'') prod(instruct);

    Listing 4-14.

    Shredding the XML document with DEFAULT xml namespace and again with “df” prefix

    ```


    To return the table structured result set from the `XML` document, we need to
    provide an element path and then denote the element and attribute values. The
    `nodes()` method is similar to the `OPENXML` function for providing the element
    reference; however the differences are the following:


    Set access to `XML` document from the variable using `OPENXML`


    ```

    FROM OPENXML(@doc, ''df:root/df:Location/df:step'', 2)

    ```


    Compare to set access to the `XML` variable using `nodes()` method


    1.  The main differences between the `XML` data type `nodes()` method and the
    `OPENXML` function that `XQuery` is expecting the `XML` data type; therefore,
    the `XML` handler (`@doc` variable) is not needed.

    2.  The mapping `@flags` parameter is not used by the `nodes()` method.


    ```

    FROM @xml.nodes(''df:root/df:Location/df:step'') prod(instruct)

    ```


    The element location path is the same for both the `OPENXML` function and `nodes`
    methods. It is important to note that the `nodes()` method requires a fully qualified
    alias, such as `table(column)`. In Listing 4-14 the alias is `prod(instruct)`.
    Within my personal `SQL` scripts, I use the `T(C)` alias, which is short and simple,
    but in a production environment I would recommend being more specific than `T(C)`.


    To construct `XML` output the `OPENXML` function must use the `WITH()` construct
    while, when using `XQuery`, the `value()` method denotes the element and attribute
    values and the `WITH()` construct is not used. The major difference between the
    `WITH()` construct and the `value()` method is that the `WITH()` construct syntax
    sequence is `ALIAS + DATATYPE + ITEM`, while the `value()` method all is the reverse:
    `ITEM + DATATYPE + ALIAS`; for example:


    ```

    Part of OPENXML out put specification

    WITH (

    LaborStation INT ''../@LocationID'',

    LaborHours REAL ''../@LaborHours'',

    LotSize INT ''../@LotSize '',

    MachineHours REAL ''../@MachineHours '',

    SetupHours REAL ''../@SetupHours '',

    Material VARCHAR(100) ''df:material'',

    Tool VARCHAR(100) ''df:tool'',

    StepInstruction VARCHAR(2000) ''.''

    )

    ```


    Compare to `XQuery` out put specification


    ```

    SELECT  instruct.value(''.'', ''varchar(2000)'') AS StepInstruction,

    instruct.value(''../@LocationID'', ''int'') AS LaborStation,

    instruct.value(''../@LaborHours'', ''real'') AS LaborHours,

    instruct.value(''../@LotSize'', ''int'') AS LotSize,

    instruct.value(''../@MachineHours'', ''real'') AS MachineHours,

    instruct.value(''../@SetupHours'', ''real'') AS SetupHours,

    instruct.value(''df:material[1]'', ''varchar(100) '') AS Material,

    instruct.value(''df:tool[1]'', ''varchar(100) '') AS Tool

    ```


    The `value()` method has two parameters:


    1.  The `XPath` path indicating the element or attribute.

    2.  The target data type from conversion.


    Both parameters are `NVARCHAR`; therefore, the values must be surrounded by single
    quotes, and `value()` method must be based on the column alias that is specified
    in the `nodes()` method. If references are not specified, the error “Msg 195,
    Level 15, State 10, Line # ‘value’ is not a recognized built-in function name”
    will be thrown.


    Another important difference between the `OPENXML() WITH` clause and the `value()`
    method is that the `value()` method requires a singleton atomic value, indicated
    by a one-based index reference ("`[1]`") for element references. For example:


    ```

    instruct.value(''df:material[1]'', ''VARCHAR(100)'') AS Material

    ```


    The singleton atomic value indicated has a one-based array index (most modern
    programming languages implement a zero-based array index). That provides the ability
    for the `XML` data to list the same element name multiple times. For example,
    the `XML` has the element `Address` listed several times:


    ```

    <Address>Line 1</Address>

    <Address>Line 2</Address>

    <Address>Line 3</Address>

    ```


    In this case, in order to display all three `Address` lines, the `value()` method
    code would look like the following:


    ```

    c.value(''Address[1]'', ''VARCHAR(100)'') AS Line1

    c.value(''Address[2]'', ''VARCHAR(100)'') AS Line2

    c.value(''Address[3]'', ''VARCHAR(100)'') AS Line3

    ```


    When the singleton is missing then the compiler will throw the error: “Msg 2389,
    Level 16, State 1, Line # XQuery [value()]: ‘value()’ requires a singleton (or
    empty sequence).” Therefore, make sure the singleton atomic value always provides
    for an element when using the `value()` method.'
