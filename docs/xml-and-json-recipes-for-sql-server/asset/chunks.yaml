    ## 4-5. 导航类型化 XML 列


    ### 问题


    你想解决在拆解类型化 XML 列时遇到的“无法隐式原子化或将‘fn:data()’应用于复杂内容元素”错误。'
  raw: '### Solution


    Over the last two decades SQL Server has changed dramatically. One of the biggest
    modifications was delivered in SQL Server 2005\. Microsoft introduced a revolutionary
    RDBMS product to the IT market. The `NTEXT`, `TEXT`, and `IMAGE` data types were
    deprecated. However, in legacy databases , XML documents could be stored in columns
    of `VARCHAR` , `NVARCHAR` , `VARBINARY` , `IMAGE` , `TEXT`, and `NTEXT` data types.
    In this case the column has to be converted to the `XML` data type.


    Note


    There are several cases when you would store data in a column type other than
    XML, for example: XML data contains internal DTDs or ENTITY declarations and Business
    requirement to store XML data exactly as it was received, including insignificant
    whitespace. However, NTEXT, TEXT, and IMAGE data types should not be considered.
    Use `VARCHAR` , `NVARCHAR` , `VARBINARY instead.`


    As an example, SQL Server continues to use the `IMAGE` data type to store SSIS
    packages in the msdb.dbo.sysssispackages table, shown in Figure [4-3](#A435478_1_En_4_Chapter.html#Fig3).
    All SSIS packages are XML documents.


    ![A435478_1_En_4_Fig3_HTML.jpg](A435478_1_En_4_Fig3_HTML.jpg)


    Figure 4-3.


    Showing msdb.dbo.sysssispackages structure


    Let’s set this scenario: you have an assignment to find all servers where backup
    databases were run by the SQL Server Maintenance Plan, and list all databases
    that were used in the plan. This task is easy to do for a few servers. You also
    need to inspect several hundred SQL Server instances. Instead of logging in to
    each instance and opening each individual Maintenance Plan, you can shred the
    packagedata column from the sysssispackages table, as shown in Listing [4-18](#A435478_1_En_4_Chapter.html#Par137),
    as this is a much more efficient process.


    ```

    WITH XMLNAMESPACES (''www.microsoft.com/SqlServer/Dts'' AS DTS,

    ''www.microsoft.com/sqlserver/dts/tasks/sqltask'' AS SQLTask),

    Package

    AS

    (

    SELECT name,

    CAST(CAST(packagedata AS VARBINARY(MAX)) AS XML) AS package

    FROM msdb.dbo.sysssispackages

    WHERE packagetype = 6

    )

    SELECT Package.name as MaintenancePlanName,

    PKG.value(''@SQLTask:DatabaseName'', ''NVARCHAR(128)'')  AS DatabaseName,

    PKG.value(''(../@SQLTask:BackupDestinationAutoFolderPath)'', ''NVARCHAR(500)'')
    AS BackupDestinationFolderPath

    FROM Package

    CROSS APPLY package.nodes(''//DTS:ObjectData/SQLTask:SqlTaskData/SQLTask:SelectedDatabases'')
    SSIS(PKG);

    Listing 4-18.

    Shredding SSIS package code

    ```


    The result of shredding the SQL Server Maintenance Plan SSIS package is shown
    in Figure [4-4](#A435478_1_En_4_Chapter.html#Fig4).


    ![A435478_1_En_4_Fig4_HTML.jpg](A435478_1_En_4_Fig4_HTML.jpg)


    Figure 4-4.


    Result of shredding the maintenance plan


    ### How It Works


    As I mentioned in the Solution, the packagedata column is an `IMAGE` data type
    and cannot be processed by the nodes() method directly. Therefore, the column
    must be converted to the `XML` data type. This is why the solution query has an
    `XMLNAMESPACES` declaration block and a CTE named Package to convert the packagedata
    column into the `XML` data type for further shredding.


    These SQL Maintenance Job SSIS packages contain two namespaces, so the `XMLNAMESPACES`
    declaration has to include them both:


    1.  `''` [`www.microsoft.com/SqlServer/Dts`](http://www.microsoft.com/SqlServer/Dts)
    `''` – <dts:executable>top element.</dts:executable>  

    2.  ‘[www.​microsoft.​com/​sqlserver/​dts/​tasks/​sqltask](http://www.microsoft.com/sqlserver/dts/tasks/sqltask)’
    – <SQLTask:SqlTaskData> child element.  


    The Package CTE prepares the packagedata column for the XQuery shredding process.
    The CTE returns the SSIS package’s name and explicitly converts the packagedata
    column to the `XML` data type. The `IMAGE` data type cannot be converted explicitly
    in the `XML` data type. The first step is to explicitly convert the `IMAGE` data
    type to `VARBINARY(MAX)`, which is eligible to be converted into `XML`, for example:
    `CAST(CAST(packagedata AS varbinary(MAX)) AS XML)` .


    The packagetype column has five possible values.


    *   0 - default value

    *   1 - SQL Server Import and Export Wizard

    *   3 - SQL Server Replication

    *   5 - SSIS Designer

    *   6 - Maintenance Plan Designer or Wizard


    In this example, we are focusing on Maintenance Plans; therefore, we can filter
    the result to packagetype = 6 in the `WHERE` clause.


    The final part of the solution query shreds the Maintenece Plan XML and delivers
    the result set. Before we process the values in the `SELECT` clause, we need to
    establish an element path in the XML data. As we process the table and column,
    the `CROSS APPLY` operator helps navigate through the values. The nodes() method
    does not have a full path to the source element. The SSIS XML is large; therefore,
    “//” provides a shortcut path to the source element and matchs an expression pattern
    within the XML document. You can also use a leading wildcard “%” in a `WHERE`
    clause. The element path ‘//DTS:ObjectData/SQLTask:SqlTaskData/SQLTask:SelectedDatabases’
    tells you to ignore the leading elements and match the rightmost part in the XML
    structure. Remember that the double-part alias is required for the nodes() method,
    so SSIS(PKG) is the table(column) alias .


    The `SELECT` clause along with Package.name column returns two values from the
    XML data, part of the XML demonstrated in Sample 4-6:


    1.  PKG.value(‘@SQLTask:DatabaseName’, ‘NVARCHAR(128)’) as DatabaseName, is the
    SQLTask:DatabaseName attribute of the SQLTask:SelectedDatabases element. To process
    an attribute within the value() method the “@” character directs you to the method
    that the value is the attribute, and no singleton is required.  

    2.  PKG.value(‘(../@SQLTask:BackupDestinationAutoFolderPath)’, ‘NVARCHAR(500)’)
    can be used as the BackupDestinationFolderPath.  


    The SQLTask:BackupDestinationAutoFolderPath is an attribute as well. However,
    the nodes() method is set to the SQLTask:SelectedDatabases element that is the
    child of SQLTask:SqlTaskData element. Therefore, to access the SQLTask:BackupDestinationAutoFolderPath
    attribute, we need to step up one XML level to SQLTask:SqlTaskData element. The
    step operator “../” completes the process.


    ```


    Listing 4-19.

    Demonstrating a formatted snippet of the source XML

    ```


