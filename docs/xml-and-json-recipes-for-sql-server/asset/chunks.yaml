  trans: "\n### 工作原理\n\nCLR 项目结合了 XML 文件的读写功能。将多个 C# 函数放在一个类中比为每个函数创建一个类更实用。因此，读写功能都封装在一个\
    \ C# 类对象中。要创建 C# 文件，需要使用 MS Visual Studio C# 或 VB 工具。如何创建 Visual Studio 项目超出了本书的讨论范围。有许多资源详细介绍了如何创建\
    \ CLR 项目。\n\nC# 代码的顶部列出了识别代码函数和方法所必需的命名空间或库。`using` 方法向类添加一个命名空间。当启动一个新项目时，类会列出默认的命名空间。包含文件读写功能的\
    \ `System.IO` 命名空间不在默认列表中。因此，你必须手动添加 `System.IO` 命名空间。CLR 类必须有一个部分类（partial type）。过程属性（procedure\
    \ attribute）指定了 SQL Server 目标对象。例如：用户定义函数使用 `[SQLFunction]` 属性，存储过程使用 `[SQLProcedure]`\
    \ 属性，等等。CLR 过程类型必须是 `public static`。\n\n`WriteXMLFile` 函数在成功时返回创建的文件完整路径，在失败或检测到\
    \ `NULL` 参数值时返回错误消息。\n\n该函数有四个输入参数：\n\n*   `XMLContent` – 必需，数据类型 `SQLString`，包含\
    \ XML 文档。\n*   `DirPath` – 必需，数据类型 `SQLString`，要写入的目录路径。\n*   `FileName` – 必需，数据类型\
    \ `SQLString`，文件名。\n*   `DateStamp` – 必需，数据类型 `SQLBoolean`，决定是否向文件添加日期时间戳。\n\n\
    验证输入参数后，下一步是构建文件路径。首先，参数 `DateStamp` 需要检查日期时间戳是否会是文件名的一部分，然后连接参数和变量：\n\n```csharp\n\
    string strStamp = (DateStamp) ? \"_\"\n+ DateTime.Now.ToString(\"yyyyMMdd_HHmmss\"\
    ) : \"\";\nstrXMLFile = DirPath.Value + \"\\\\\" + FileName.Value + strStamp +\
    \ \".xml\";\n```\n\n最后一步——使用提供的路径写入 XML 文件：\n\n```csharp\nusing (var newFile =\
    \ new StreamWriter(strXMLFile.Value))\n{\n    newFile.WriteLine(XMLContent);\n\
    }\n```\n\n`ReadXMLFile` 函数在成功时返回 XML 文件内容，在失败时返回错误消息。该函数有一个参数：\n\n*   `FilePath`\
    \ – 必需，数据类型 `SQLString`，XML 文件的路径。\n\n当 `FileStream` 函数建立与 XML 文件的连接后，`StreamReader`\
    \ 函数会读取整个文件，然后 `ReadXMLFile` 函数返回 XML 文档：\n\n```csharp\nvar fileStream = new FileStream(FilePath.Value,\
    \ FileMode.Open, FileAccess.Read);\nusing (var streamReader = new StreamReader(fileStream))\n\
    {\n    fileContent = streamReader.ReadToEnd();\n}\nreturn fileContent;\n```\n\n\
    如果你使用 Visual Studio 开发 CLR 过程，那么你可以构建解决方案来创建 `dll` 文件，或者运行命令行来构建并注册 `dll` 文件：\n\
    \n```cmd\nC:\\Windows\\Microsoft.NET\\Framework\\v3.5\\csc.exe /target:library\
    \ /out:C:\\Chapter3\\ReadWriteXML.dll C:\\Chapter3\\XML_ETL.cs\n```\n\n当 `dll`\
    \ 文件准备就绪后，我们转到 SSMS 进行以下操作：\n\n1.  确保启用了‘clr enabled’选项：\n\n    ```sql\n    sp_configure\
    \ 'clr enabled', 1\n    ```\n\n2.  切换到用户数据库并 `SET TRUSTWORTHY ON`。\n3.  创建一个程序集（assembly）以引用\
    \ `dll`：\n\n    ```sql\n    CREATE ASSEMBLY ReadWriteXML FROM\n    'C:\\Chapter3\\\
    ReadWriteXML.dll'\n    WITH PERMISSION_SET = EXTERNAL_ACCESS\n    ```\n\n对于程序集，在指定了名称和\
    \ `dll` 文件路径后，你需要设置 `PERMISSION_SET` 参数，该参数有三个选项：\n\n*   `SAFE` – 首选，当 `dll` 无法访问外部系统资源（例如注册表、文件、环境变量或网络）时使用。\n\
    *   `EXTERNAL_ACCESS` – `dll` 可以访问注册表、文件和环境变量。但是，这些访问不能在 SQL Server 实例之外进行。\n\
    *   `UNSAFE` – 无限制访问。\n\n`ReadWriteXML.dll` 需要访问文件；因此，为 `ReadWriteXML` 的程序集设置了\
    \ `EXTERNAL_ACCESS` 选项。一旦创建了 `ASSEMBLY`，就可以创建函数了。例如：\n\n```sql\nCREATE FUNCTION\
    \ dbo.ReadXMLFile(@FilePath nvarchar(500))\nRETURNS nvarchar(MAX) WITH EXECUTE\
    \ AS CALLER\nAS\nEXTERNAL NAME ReadWriteXML.XMLFileETL.ReadXMLFile\n```\n\n在 `CREATE\
    \ FUNCTION` 部分，指定了架构和名称后，你需要列出所有参数以匹配 C# `dll` 中的函数。确保位置和数据类型相同。`RETURNS` 部分的数据类型也必须匹配。`EXTERNAL\
    \ NAME` 包含三个引用，例如：\n\n1.  `ASSEMBLY` 名称\n2.  CLR 类名\n3.  CLR 函数名\n\n```sql\nEXTERNAL\
    \ NAME ReadWriteXML.XMLFileETL.ReadXMLFile\n```\n\n清单 3-11 演示了 `WriteXMLFile`\
    \ 函数的 T_SQL 执行。结果如图 3-30 所示。\n\n![A435478_1_En_3_Fig30_HTML.jpg](img/A435478_1_En_3_Fig30_HTML.jpg)\n\
    \n图 3-30. 显示函数结果\n\n```sql\nSELECT  dbo.WriteXMLFile(N'\n<Accessories>\n  <Bike\
    \ Racks>\n    <Product>\n      <Name>Hitch Rack - 4-Bike</Name>\n      <ProductNumber>RA-H123</ProductNumber>\n\
    \      <ListPrice>120.0000</ListPrice>\n    </Product>\n  </Bike Racks>\n  <Bike\
    \ Stands>\n    <Product>\n      <Name>All-Purpose Bike Stand</Name>\n      <ProductNumber>ST-1401</ProductNumber>\n\
    \      <ListPrice>159.0000</ListPrice>\n    </Product>\n  </Bike Stands>\n</Accessories>\n\
    ', 'C:\\Chapter3', 'CategoriesXML', 0) NewFilePath\n```\n清单 3-11. 执行 `WriteXMLFile`\
    \ 函数\n\n清单 3-12 演示了 `ReadXMLFile` 函数的 T_SQL 执行。结果如图 3-31 所示。\n\n![A435478_1_En_3_Fig31_HTML.jpg](img/A435478_1_En_3_Fig31_HTML.jpg)\n\
    \n图 3-31. 显示函数结果\n\n```sql\nSELECT cast(dbo.ReadXMLFile('C:\\Chapter3\\CategoriesXML.xml')\
    \ as xml) XMLFile\n```\n清单 3-12. 执行 `ReadXMLFile` 函数\n\nCLR 过程提供了一种安全的方式来扩展 SQL\
    \ Server 功能。但是，在处理 CLR 过程时，编程技能是首选。\n\n## 本章小结\n\n本章演示了多种解决方案，详细说明了如何将 XML 结果写入文件，以及如何从源位置加载\
    \ XML 文件（或多个文件）。请注意，这不是唯一的解决方案，因为在当今世界，此类任务可以使用其他技术完成，例如 PowerShell、.NET 应用程序（C#\
    \ 或 VB.NET）等。然而，对于使用 SQL Server 的 T-SQL 代码编译 SSIS 包装包来说，这些都是优秀的解决方案。\n\n下一章的配方将涵盖如何将\
    \ XML 文档转换为行和列，也称为“XML 分解”。\n\n# 4. 分解 XML\n\n将 XML 数据转换为关系型列和行并不是一个简单的过程。`OPENXML`\
    \ 函数是在 SQL Server 2000 中引入的，用于分解 XML 数据，然后在 SQL Server 2005 中通过 XPath 语言（也称为 XQuery）改进了\
    \ XML 分解。从那时起，查询 XML 数据的过程成为了一个提供结果的可靠解决方案。本章将演示如何将 XML 数据作为单个单元进行查询，并通过表的列返回检索到的数据。\n\
    \n## 4-1. 使用内部实体声明分解 XML\n\n### 问题\n\n你希望将作为参数传递给存储过程或从表中作为单个 XML 值检索出的 XML 数据，转换成行集结果。\n"
- fmt: '### Solution


    The `OPEXML` function provides a comprehensive solution to query XML data assigned
    to `VARCHAR`, `NVARCHAR`, and `XML` data typed variable and parameters. The T-SQL
    code in Listing [4-1](#A435478_1_En_4_Chapter.html#Par4) demonstrates the solution.
    A sample set of data can be found in the AdventureWorks database.


    ```sql

    DECLARE @xml nvarchar(max),

    @idoc int,

    @ns varchar(200) =

    N'''';

    SELECT @xml = cast(Instructions as nvarchar(max))

    FROM [Production].[ProductModel]

    WHERE ProductModelID = 7;

    EXECUTE sp_xml:preparedocument @idoc OUTPUT, @xml, @ns;

    SELECT StepInstruction,

    LaborStation,

    LaborHours,

    LotSize,

    MachineHours,

    SetupHours,

    Material,

    Tool

    FROM OPENXML(@idoc, ''df:root/df:Location/df:step'', 2)

    WITH (

    LaborStation INT ''../@LocationID'',

    LaborHours REAL ''../@LaborHours'',

    LotSize INT ''../@LotSize '',

    MachineHours REAL ''../@MachineHours '',

    SetupHours REAL ''../@SetupHours '',

    Material VARCHAR(100) ''df:material'',

    Tool VARCHAR(100) ''df:tool'',

    StepInstruction VARCHAR(2000) ''.''

    );

    EXECUTE sp_xml:removedocument @idoc;

    ```


    **Listing 4-1.** Shredding the XML with the `OPENXML` function


    The query output is shown in Figure [4-1](#A435478_1_En_4_Chapter.html#Fig1).


    ![A435478_1_En_4_Fig1_HTML.jpg](A435478_1_En_4_Fig1_HTML.jpg)


    Figure 4-1. Showing the process output'
