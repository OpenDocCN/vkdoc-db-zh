- fmt: "# Part I\nXML in SQL Server\n\n## 1. Introducing XML\n\nWelcome and thank\
    \ you for reading *XML and JSON Recipes for SQL Server*. In the modern world of\
    \ information technology, keeping data stored and manipulated reliably and efficiently\
    \ is one of the first priorities. In the last decade, SQL Server has evolved into\
    \ a sophisticated Enterprise RDBMS tool, and it is still growing by providing\
    \ more functionalities to store and manipulate data reliably. eXtensible Markup\
    \ Language (XML) is one of the technologies that SQL Server implements not only\
    \ for data manipulation but also for many internal usages, such as Execution Plans,\
    \ Extended Events, DDL trigger `EventData()` function, and behind construction\
    \ for SQL Server Business Intelligence Tools (`SSIS`, `SSRS`, `SSAS`). In Part\
    \ 1 of this book, I will cover and provide the recipes on how to work with the\
    \ SQL Server `XML` data type; discuss and demonstrate real type scenarios to load,\
    \ build, and shred the XML; and present how daily tasks can be simplified by implementing\
    \ XML technologies. In this book, I will primarily be focusing on technology rather\
    \ than theory.\n\n### Stepping into XML\n\nTo work with XML, we need to understand\
    \ this technology, especially for SQL Server. XML is similar to HTML (Hypertext\
    \ Markup Language). XML and HTML contain markup elements to describe the contents\
    \ of the file or page for HTML. The big difference between them is that HTML contains\
    \ predefined elements (tags), while XML’s elements and attributes are not predefined\
    \ and based on described data within the files.\n\nSeveral more important differences\
    \ between HTML and XML:\n\n*   XML is key sensitive while HTML is not.\n*   XML\
    \ opened element must be closed. HTML can have an opened element without a closed\
    \ element. For example, `<DATA>Display Text` will compile for HTML and will return\
    \ an error for XML .\n\n**Caution**\n\nSQL Server, by default, is not case sensitive.\
    \ However, XML is case sensitive, and all XQuery Path Language (XPath) functions\
    \ and node tests are case sensitive (all lowercase). They will return an error\
    \ when entered with any case other than lowercase.\n\n### Sample Database\n\n\
    All code samples for Part I in this book utilize the SQL Server AdventureWorks\
    \ sample database, unless otherwise specified and referenced separately in the\
    \ text. The AdventureWorks database URL is [`https://github.com/Microsoft/sql-server-samples/releases/tag/adventureworks2014`](https://github.com/Microsoft/sql-server-samples/releases/tag/adventureworks2014).\
    \ I would highly recommend downloading and installing the AdventureWorks sample\
    \ database to run the samples presented.\n\n### Understanding XML\n\nBefore working\
    \ with XML, we need to explain the difference between the two types of node-centric\
    \ XML formats supported by SQL Server:\n\n1.  Element-centric\n2.  Attribute-centric\n\
    \nBoth elements and attributes can contain data. However, SQL Server has specialized\
    \ functionality and features for each format generating or shredding (shredding\
    \ is a process to convert XML into rows-columns format) attribute-centric or element-centric\
    \ data. In the element-centric format, values are contained within the opening\
    \ and closing tags of an element, for example, `<elementName>`. The attribute-centric\
    \ format relies on attributes of an element in the element’s opening tag. They\
    \ are assigned a value by the equal sign, and the values are wrapped in double\
    \ quotes, for example, `<elementName attribute=“value”>`. For instance, the sample\
    \ SQL query in Listing 1 returns two rows, with the result shown in Figure 1.\n\
    \n![A435478_1_En_1_Fig1_HTML.jpg](A435478_1_En_1_Fig1_HTML.jpg)\nFigure 1-1. Result\
    \ data set from sample SQL query\n\n```sql\nSELECT TOP (2) Category.Name AS CategoryName,\n\
    Subcategory.Name AS SubcategoryName,\nProduct.Name,\nProduct.ProductNumber AS\
    \ Number,\nProduct.ListPrice AS Price\nFROM  Production.Product Product\nINNER\
    \ JOIN Production.ProductSubcategory Subcategory\nON Product.ProductSubcategoryID\
    \ = Subcategory.ProductSubcategoryID\nLEFT JOIN Production.ProductCategory Category\n\
    ON Subcategory.ProductCategoryID = Category.ProductCategoryID\nWHERE Product.ListPrice\
    \ > 0\nAND Product.SellEndDate IS NULL\nORDER BY CategoryName, SubcategoryName;\n\
    ```\nListing 1-1. Simple SQL query\n\nThis is an example of what the relational\
    \ data from Figure 1 might look like in an element-centric XML format. Notice\
    \ that all values are presented as XML elements in this format demonstrated in\
    \ Listing 2.\n\n```xml\n<ProductCategory>\n  <Name>Accessories</Name>\n  <ProductSubcategory>\n\
    \    <Name>Bike Racks</Name>\n    <Product>\n      <Name>Hitch Rack - 4-Bike</Name>\n\
    \      <ProductNumber>RA-H123</ProductNumber>\n      <ListPrice>120.0000</ListPrice>\n\
    \    </Product>\n    <Product>\n      <Name>Bike Stands</Name>\n      <ProductNumber>ST-1401</ProductNumber>\n\
    \      <ListPrice>159.0000</ListPrice>\n    </Product>\n  </ProductSubcategory>\n\
    </ProductCategory>\n```\nListing 1-2. Showing element-centric XML\n\nConverted\
    \ relational data from Figure 1 might look like an attribute-centric XML format\
    \ demonstrated in Listing 3.\n\n```xml\n<ProductCategory Name=\"Accessories\"\
    >\n  <ProductSubcategory Name=\"Bike Racks\">\n    <Product Name=\"Hitch Rack\
    \ - 4-Bike\" ProductNumber=\"RA-H123\" ListPrice=\"120.0000\"/>\n    <Product\
    \ Name=\"Bike Stands\" ProductNumber=\"ST-1401\" ListPrice=\"159.0000\"/>\n  </ProductSubcategory>\n\
    </ProductCategory>\n```\nListing 1-3. Showing attribute-centric XML\n\nComparing\
    \ the element-centric XML data in Listing 2 to the attribute-centric XML data\
    \ in Listing 3, several differences can be clearly defined:\n\n*   `Element-centric\
    \ XML` is bigger (in number of characters) than `attribute-centric XML`.\n*  \
    \ `Element-centric XML` supports element hierarchy.\n*   `Element-centric XML`\
    \ can represent `SQL NULLs` with the `xsi:nil` attribute (`xsi:nil` will covered\
    \ in Chapter 2, Recipe 2-5 “Handling Elements with NULL Values”).\n\nWe will provide\
    \ a deeper analysis and show additional differences, use cases, and demonstrations\
    \ in Chapter 2, “Building XML.”\n\n### Entitizing XML Characters\n\nXML elements\
    \ are defined by left- and right-angled brackets (less-than and greater-than signs,\
    \ “<” and “>”). XML attribute values are wrapped in double quotation marks. Data\
    \ containing these special characters that are not part of the XML markup can\
    \ cause issues during XML parsing. To resolve these potential conflicts, XML defines\
    \ a set of special character sequences, known as predefined entities, which all\
    \ XML parsers must honor. The character sequences, which include the double quotation\
    \ mark, ampersand, apostrophe, less-than sign, and greater-than sign, and their\
    \ associated XML entities are listed in Table 1.\n\nTable 1-1. Listing Predefined\
    \ Entities in XML\n\n| Character | Entity Reference | Description |\n| --- | ---\
    \ | --- |\n| `\"` | `&quot;` | double quotation mark |\n| `&` | `&amp;` | ampersand\
    \ |\n| `'` | `&apos;` | apostrophe (apostrophe-quote) |\n| `<` | `&lt;` | less-than\
    \ sign |\n| `>` | `&gt;` | greater-than sign |\n\nThe process when predefined\
    \ entities are replaced with entity references is known as entitizing. To demonstrate\
    \ entitizing, I took the XML in Listing 4 then typed (copy/paste) into a Notepad.\n\
    \n```xml\n<Catalog>\n  <Product id=\"1\" name=\"Product 1 &quot;Super&quot;\"\
    >\n    <Price>12.99</Price>\n    <Description>An item with \"quotes\" and an &\
    \ ampersand.</Description>\n  </Product>\n</Catalog>\n```\nListing 1-4. Sample\
    \ XML with predefined entities\n\nI then saved the file with an .xml extension.\
    \ For instance, I call the file `XML_Entity.xml`. When the file is created, I\
    \ simply double-click on the file or open it in Internet Explorer. As a result,\
    \ the entity references will display as normal characters, as shown in Figure\
    \ 2.\n\n![A435478_1_En_1_Fig2_HTML.jpg](A435478_1_En_1_Fig2_HTML.jpg)\nFigure\
    \ 1-2. Sample with XML entities expanded"
  raw: '# Part I

    XML in SQL Server


    # 1. Introducing XML


    Welcome and thank you for reading XML and JSON Recipes for SQL Server. In the
    modern world of information technology, keeping data stored and manipulated reliably
    and efficiently is one of the first priorities. In the last decade, SQL Server
    has evolved into a sophisticated Enterprise RDBMS tool, and it is still growing
    by providing more functionalities to store and manipulate data reliably. eXtensible
    Markup Language (XML) is one of the technologies that SQL Server implements not
    only for data manipulation but also for many internal usages, such as Execution
    Plans, Extended Events, DDL trigger Eventdata() function, and behind construction
    for SQL Server Business Intelligence Tools (SSIS, SSRS, SSAS). In Part 1 of this
    book, I will cover and provide the recipes on how to work with the SQL Server
    XML data type; discuss and demonstrate real type scenarios to load, build, and
    shred the XML; and present how daily tasks can be simplified by implementing XML
    technologies. In this book, I will primarily be focusing on technology rather
    than theory.


    ## Stepping into XML


    To work with XML, we need to understand this technology, especially for SQL Server.
    XML is similar to HTML (Hypertext Markup Language). XML and HTML contain markup
    elements to describe the contents of the file or page for HTML. The big difference
    between them is that HTML contains predefined elements (tags), while XML’s elements
    and attributes are not predefined and based on described data within the files.


    Several more important differences between HTML and XML:


    *   XML is key sensitive while HTML is not.

    *   XML opened element must be closed. HTML can have an opened element without
    a closed element. For example, <DATA>Display Text will compile for HTML and will
    return an error for XML .


    Caution


    SQL Server, by default, is not case sensitive. However, XML is case sensitive,
    and all XQuery Path Language (XPath) functions and node tests are case sensitive
    (all lowercase). They will return an error when entered with any case other than
    lowercase.


    ### Sample Database


    All code samples for Part I in this book utilize the SQL Server AdventureWorks
    sample database, unless otherwise specified and referenced separately in the text.
    The AdventureWorks database URL is [`https://github.com/Microsoft/sql-server-samples/releases/tag/adventureworks2014`](https://github.com/Microsoft/sql-server-samples/releases/tag/adventureworks2014)
    . I would highly recommend downloading and installing the AdventureWorks sample
    database to run the samples presented.


    ### Understanding XML


    Before working with XML, we need to explain the difference between the two types
    of node-centric XML formats supported by SQL Server:


    1.  Element-centric  

    2.  Attribute-centric  


    Both elements and attributes can contain data. However, SQL Server has specialized
    functionality and features for each format generating or shredding (shredding
    is a process to convert XML into rows-columns format) attribute-centric or element-centric
    data. In the element-centric format, values are contained within the opening and
    closing tags of an element, for example, <elementName>. The attribute-centric
    format relies on attributes of an element in the element’s opening tag. They are
    assigned a value by the equal sign, and the values are wrapped in double quotes,
    for example, <elementName attribute=“value”>. For instance, the sample SQL query
    in Listing [1-1](#A435478_1_En_1_Chapter.html#Par12) returns two rows, with the
    result shown in Figure [1-1](#A435478_1_En_1_Chapter.html#Fig1).


    ![A435478_1_En_1_Fig1_HTML.jpg](A435478_1_En_1_Fig1_HTML.jpg)


    Figure 1-1.


    Result data set from sample SQL query


    ```

    SELECT TOP (2) Category.Name AS CategoryName,

    Subcategory.Name AS SubcategoryName,

    Product.Name,

    Product.ProductNumber AS Number,

    Product.ListPrice AS Price

    FROM  Production.Product Product

    INNER JOIN Production.ProductSubcategory Subcategory

    ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

    LEFT JOIN Production.ProductCategory Category

    ON Subcategory.ProductCategoryID = Category.ProductCategoryID

    WHERE Product.ListPrice > 0

    AND Product.SellEndDate IS NULL

    ORDER BY CategoryName, SubcategoryName;

    Listing 1-1.

    Simple SQL query

    ```


    This is an example of what the relational data from Figure [1-1](#A435478_1_En_1_Chapter.html#Fig1)
    might look like in an element-centric XML format. Notice that all values are presented
    as XML elements in this format demonstrated in Listing [1-2](#A435478_1_En_1_Chapter.html#Par14).


    ```


    Accessories


    Bike Racks


    Hitch Rack - 4-Bike

    RA-H123

    120.0000


    Bike Stands


    All-Purpose Bike Stand

    ST-1401

    159.0000


    Listing 1-2.

    Showing element-centric XML

    ```


    Converted relational data from Figure [1-1](#A435478_1_En_1_Chapter.html#Fig1)
    might look like an attribute-centric XML format demonstrated in Listing [1-3](#A435478_1_En_1_Chapter.html#Par16).


    ```


    Listing 1-3.

    Showing attribute-centric XML

    ```


    Comparing the element-centric XML data in Listing [1-2](#A435478_1_En_1_Chapter.html#Par14)
    to the attribute-centric XML data in Listing [1-3](#A435478_1_En_1_Chapter.html#Par16),
    several differences can be clearly defined:


    *   `Element-centric XML is bigger (in number of characters) than attribute-centric
    XML.`

    *   `Element-centric XML supports element hierarchy.`

    *   `Element-centric XML can represent SQL NULLs with the xsi:nil attribute (xsi:nil
    will covered in Chapter` [`2`](#A435478_1_En_2_Chapter.html) `, Recipe 2-5 “Handling
    Elements with NULL Values”).`


    We will provide a deeper analysis and show additional differences, use cases,
    and demonstrations in Chapter [2](#A435478_1_En_2_Chapter.html), “Building XML.”


    ### Entitizing XML Characters


    XML elements are defined by left- and right-angled brackets (less-than and greater-than
    signs, “<” and “>”). XML attribute values are wrapped in double quotation marks.
    Data containing these special characters that are not part of the XML markup can
    cause issues during XML parsing. To resolve these potential conflicts, XML defines
    a set of special character sequences, known as predefined entities, which all
    XML parsers must honor. The character sequences, which include the double quotation
    mark, ampersand, apostrophe, less-than sign, and greater-than sign, and their
    associated XML entities are listed in Table [1-1](#A435478_1_En_1_Chapter.html#Tab1).


    Table 1-1.


    Listing Predefined Entities in XML


    | Character | Entity Reference | Description |

    | --- | --- | --- |

    | `"` | `&quot;` | double quotation mark |

    | `&` | `&amp;` | ampersand |

    | `''` | `&apos;` | apostrophe (apostrophe-quote) |

    | `<` | `&lt;` | less-than sign |

    | `>` | `&gt;` | greater-than sign |


    The process when predefined entities are replaced with entity references is known
    as entitizing. To demonstrate entitizing, I took the XML in Listing [1-4](#A435478_1_En_1_Chapter.html#Par24)
    then typed (copy/paste) into a Notepad.


    ```


    Listing 1-4.

    Sample XML with predefined entities

    ```


    I then saved the file with an .xml extension. For instance, I call the file XML_Entity.xml.
    When the file is created, I simply double-click on the file or open it in Internet
    Explorer. As a result, the entity references will display as normal characters,
    as shown in Figure [1-2](#A435478_1_En_1_Chapter.html#Fig2).


    ![A435478_1_En_1_Fig2_HTML.jpg](A435478_1_En_1_Fig2_HTML.jpg)


    Figure 1-2.


    Sample with XML entities expanded'
  trans: "\n# 第一部分\nSQL Server 中的 XML\n\n## 1. XML 简介\n\n欢迎并感谢您阅读 *SQL Server 的 XML\
    \ 和 JSON 配方*。在信息技术的现代世界中，可靠且高效地存储和操作数据是首要任务之一。在过去十年中，SQL Server 已发展成为一个复杂的企业关系数据库管理系统工具，并且通过提供更多功能来可靠地存储和操作数据，它仍在不断发展。可扩展标记语言（XML）是\
    \ SQL Server 实现的技术之一，不仅用于数据操作，还用于许多内部用途，例如执行计划、扩展事件、DDL 触发器 `EventData()` 函数，以及\
    \ SQL Server 商业智能工具（`SSIS`、`SSRS`、`SSAS`）背后的构建基础。在本书的第一部分中，我将介绍并提供关于如何使用 SQL Server\
    \ `XML` 数据类型的配方；讨论并演示加载、构建和分解 XML 的真实场景；并展示如何通过应用 XML 技术简化日常任务。在本书中，我将主要关注技术而非理论。\n\
    \n### 踏入 XML 之门\n\n要使用 XML，我们需要理解这项技术，尤其是对于 SQL Server 而言。XML 类似于 HTML（超文本标记语言）。XML\
    \ 和 HTML 都包含标记元素来描述文件或页面（对于 HTML）的内容。它们之间最大的区别在于，HTML 包含预定义的元素（标签），而 XML 的元素和属性不是预定义的，而是基于文件内描述的数据。\n\
    \nHTML 和 XML 之间还有几个更重要的区别：\n\n*   XML 区分大小写，而 HTML 不区分。\n*   XML 的打开元素必须关闭。HTML\
    \ 可以有打开的元素而没有关闭元素。例如，`<DATA>Display Text` 在 HTML 中可以编译，但在 XML 中会返回错误。\n\n**注意**\n\
    \n默认情况下，SQL Server 不区分大小写。但是，XML 区分大小写，所有 XQuery 路径语言（XPath）函数和节点测试都区分大小写（全部小写）。如果输入时使用了小写以外的任何大小写形式，它们将返回错误。\n\
    \n### 示例数据库\n\n除非另有说明或在文中单独引用，本书第一部分的所有代码示例均使用 SQL Server AdventureWorks 示例数据库。AdventureWorks\
    \ 数据库的 URL 是 [`https://github.com/Microsoft/sql-server-samples/releases/tag/adventureworks2014`](https://github.com/Microsoft/sql-server-samples/releases/tag/adventureworks2014)。我强烈建议您下载并安装\
    \ AdventureWorks 示例数据库来运行提供的示例。\n\n### 理解 XML\n\n在使用 XML 之前，我们需要解释 SQL Server\
    \ 支持的两种以节点为中心的 XML 格式之间的区别：\n\n1.  以元素为中心\n2.  以属性为中心\n\n元素和属性都可以包含数据。然而，SQL Server\
    \ 针对每种格式的生成或分解（分解是将 XML 转换为行-列格式的过程）提供了专门的功能和特性。在以元素为中心的格式中，值包含在元素的开始和结束标签内，例如\
    \ `<元素名>`。以属性为中心的格式依赖于元素开始标签中元素的属性。它们通过等号分配值，并用双引号将值括起来，例如 `<元素名 属性=“值”>`。例如，清单\
    \ 1 中的示例 SQL 查询返回两行，结果如图 1 所示。\n\n![A435478_1_En_1_Fig1_HTML.jpg](img/A435478_1_En_1_Fig1_HTML.jpg)\n\
    图 1-1. 来自示例 SQL 查询的结果数据集\n\n```sql\nSELECT TOP (2) Category.Name AS CategoryName,\n\
    Subcategory.Name AS SubcategoryName,\nProduct.Name,\nProduct.ProductNumber AS\
    \ Number,\nProduct.ListPrice AS Price\nFROM  Production.Product Product\nINNER\
    \ JOIN Production.ProductSubcategory Subcategory\nON Product.ProductSubcategoryID\
    \ = Subcategory.ProductSubcategoryID\nLEFT JOIN Production.ProductCategory Category\n\
    ON Subcategory.ProductCategoryID = Category.ProductCategoryID\nWHERE Product.ListPrice\
    \ > 0\nAND Product.SellEndDate IS NULL\nORDER BY CategoryName, SubcategoryName;\n\
    ```\n清单 1-1. 简单的 SQL 查询\n\n这是一个示例，展示了图 1 中的关系数据在以元素为中心的 XML 格式中可能的样子。请注意，在此格式中，所有值都表示为\
    \ XML 元素，如清单 2 所示。\n\n```xml\n<ProductCategory>\n  <Name>Accessories</Name>\n\
    \  <ProductSubcategory>\n    <Name>Bike Racks</Name>\n    <Product>\n      <Name>Hitch\
    \ Rack - 4-Bike</Name>\n      <ProductNumber>RA-H123</ProductNumber>\n      <ListPrice>120.0000</ListPrice>\n\
    \    </Product>\n    <Product>\n      <Name>Bike Stands</Name>\n      <ProductNumber>ST-1401</ProductNumber>\n\
    \      <ListPrice>159.0000</ListPrice>\n    </Product>\n  </ProductSubcategory>\n\
    </ProductCategory>\n```\n清单 1-2. 显示以元素为中心的 XML\n\n从图 1 转换的关系数据可能看起来像清单 3 中所示的以属性为中心的\
    \ XML 格式。\n\n```xml\n<ProductCategory Name=\"Accessories\">\n  <ProductSubcategory\
    \ Name=\"Bike Racks\">\n    <Product Name=\"Hitch Rack - 4-Bike\" ProductNumber=\"\
    RA-H123\" ListPrice=\"120.0000\"/>\n    <Product Name=\"Bike Stands\" ProductNumber=\"\
    ST-1401\" ListPrice=\"159.0000\"/>\n  </ProductSubcategory>\n</ProductCategory>\n\
    ```\n清单 1-3. 显示以属性为中心的 XML\n\n比较清单 2 中的以元素为中心的 XML 数据与清单 3 中的以属性为中心的 XML 数据，可以明确界定几个区别：\n\
    \n*   `以元素为中心的 XML` 比 `以属性为中心的 XML` 更大（以字符数计）。\n*   `以元素为中心的 XML` 支持元素层次结构。\n\
    *   `以元素为中心的 XML` 可以使用 `xsi:nil` 属性表示 `SQL NULL`（`xsi:nil` 将在第 2 章的配方 2-5“处理具有\
    \ NULL 值的元素”中介绍）。\n\n我们将在第 2 章“构建 XML”中提供更深入的分析，并展示更多的区别、用例和演示。\n\n### XML 字符实体化\n\
    \nXML 元素由左右尖括号（小于号和大于号，“<”和“>”）定义。XML 属性值用双引号括起来。包含这些特殊字符（它们不是 XML 标记的一部分）的数据可能会在\
    \ XML 解析期间导致问题。为了解决这些潜在的冲突，XML 定义了一组特殊的字符序列，称为预定义实体，所有 XML 解析器都必须遵守。这些字符序列，包括双引号、和号、撇号、小于号和大于号，以及它们关联的\
    \ XML 实体，列在表 1 中。\n\n表 1-1. 列出 XML 中的预定义实体\n\n| 字符 | 实体引用 | 描述 |\n| --- | ---\
    \ | --- |\n| `\"` | `&quot;` | 双引号 |\n| `&` | `&amp;` | 和号 |\n| `'` | `&apos;`\
    \ | 撇号（单引号） |\n| `<` | `&lt;` | 小于号 |\n| `>` | `&gt;` | 大于号 |\n\n当预定义实体被实体引用替换的过程称为实体化。为了演示实体化，我获取了清单\
    \ 4 中的 XML，然后键入（复制/粘贴）到记事本中。\n\n```xml\n<Catalog>\n  <Product id=\"1\" name=\"\
    Product 1 &quot;Super&quot;\">\n    <Price>12.99</Price>\n    <Description>An\
    \ item with \"quotes\" and an & ampersand.</Description>\n  </Product>\n</Catalog>\n\
    ```\n清单 1-4. 包含预定义实体的示例 XML\n\n然后，我将文件保存为 .xml 扩展名。例如，我将文件命名为 `XML_Entity.xml`。创建文件后，我只需双击该文件或在\
    \ Internet Explorer 中打开它。结果，实体引用将显示为正常字符，如图 2 所示。\n\n![A435478_1_En_1_Fig2_HTML.jpg](img/A435478_1_En_1_Fig2_HTML.jpg)\n\
    图 1-2. 展开 XML 实体后的示例\n"
- fmt: "# Exploring the XML Data Type\n\nXML support within the Microsoft SQL Server\
    \ database was first introduced in SQL Server 2000. XML can consist of very long\
    \ strings of data; therefore, it is very rare to encounter XML data that will\
    \ not fit in a `VARCHAR(8000)` or `NVARCHAR(4000)` Unicode column. Since much\
    \ XML data won’t fit into these data types, SQL Server 2000 suggested that DBAs\
    \ and Developers utilize `TEXT`, and in some cases `IMAGE`, data types. Many found\
    \ dealing with these data types to be a nightmare, as they were difficult to work\
    \ with. Also, when dealing with XML on 2000 you had to utilize the COM-based stored\
    \ procedures.\n\nWith the release of SQL Server 2005, the `XML` data type was\
    \ provided, which made it significantly easier to work with XML data, and the\
    \ XML data can be stored in its native format. The result of the `XML` data type\
    \ returns a clickable hyperlink format when the output is set to Result To Grid\
    \ in SSMS. To review XML content, you can just click on the hyperlink and SSMS\
    \ will display the XML result in a separate XML document tab. The XML document\
    \ tab does not allow you to connect to SQL Server instances or execute any SQL\
    \ statements.\n\nThe `XML` data type is a convenient and well-designed data type\
    \ that allows you to store data and documents in the XML format. In some cases,\
    \ other large SQL Server data types can be used to store XML data, such as `NVARCHAR(MAX)`,\
    \ `VARCHAR(MAX)`, or `VARBINARY(MAX)`. The old data types `IMAGE`, `NTEXT`, and\
    \ `TEXT` can do the job as well but are not as user friendly to work with.\n\n\
    For example, when XML data is stored as a document, and you do not need to query\
    \ this data in its entirety, you can use the `NVARCHAR(MAX)`, `VARCHAR(MAX)`,\
    \ `VARBINARY(MAX)`. The best argument for using a LOB data type to store XML is\
    \ when you need to store the exact representation of the XML, since the `XML`\
    \ data type will store the content you provide, but it might alter insignificant\
    \ whitespace and the order of attributes is not guaranteed. Take a look at `msdb.dbo.sysssispackages`\
    \ table where the `packagedata` column stores server-side SSIS packages. SQL Server\
    \ utilizes the `IMAGE` data type (I would not recommend following Microsoft in\
    \ this case) to store the SSIS package code. For those who have never looked at\
    \ SSIS code, it is XML data. Therefore, when I need to query SSIS (I had several\
    \ reasonable requests for such a task), I converted the `packagedata` column to\
    \ `VARBINARY(MAX)` and then cast it to an `XML` data type instance, as shown in\
    \ Listing 1-5.\n\n```sql\nSELECT CAST(CAST(packagedata as VARBINARY(MAX)) AS XML)\
    \ AS SSISPackage\nFROM msdb.dbo.sysssispackages;\n```\nListing 1-5. Converting\
    \ IMAGE data type into XML data type\n\n**Caution**\n\nLegacy Large Object Binary\
    \ data types `IMAGE`, `NTEXT`, and `TEXT` should not be considered for any column\
    \ implementation. Books Online do not reference these data types because they\
    \ are deprecated. However, some system tables still have it; even Microsoft announced\
    \ that `IMAGE`, `NTEXT`, and `TEXT` data types would be deprecated in the year\
    \ 2008.\n\nThe `XML` data type has the following limitations:\n\n*   The storage\
    \ is limited to 2.1 GB.\n*   It cannot be used as a table Primary Key.\n*   It\
    \ cannot be sorted by the `ORDER BY` clause.\n*   It cannot be compared in the\
    \ `WHERE` clause.\n*   It cannot be used in the `GROUP BY` clause.\n*   It cannot\
    \ be a parameter to any scalar built-in functions except `ISNULL()`, `COALESCE()`,\
    \ `DATALENGTH()`, `CAST()`, `TRY_CAST()`, `CONVERT()`, `CHOOSE()`, and `IIF()`\
    \ functions.\n*   The columns with `XML` data type cannot be part of a linked\
    \ server query.\n*   XML columns can only be indexed via an XML index; for clustered\
    \ and nonclustered table indexes, XML columns can be included with the `INCLUDE`\
    \ clause.\n\nThe XML data type has two forms:\n\n*   Untyped XML (the default),\
    \ is an `XML` data type instance that does not have an associated XML schema.\n\
    *   Typed XML is an `XML` data type instance with an XML schema bound to it.\n\
    \n## 1-1. Creating an Untyped XML Column\n\n### Problem\n\nYou want to define\
    \ an untyped XML column in a table.\n\n### Solution\n\nDefine the designated column\
    \ as `XML` data type upon creation. The example in Listing 1-6 demonstrates syntax\
    \ on how to create a simple untyped XML column.\n\n```sql\nCREATE TABLE dbo.UntypedXML\n\
    (\n    UntypedXML_ID INT IDENTITY(1, 1) NOT NULL PRIMARY KEY,\n    UntypedXMLData\
    \ XML\n);\n```\nListing 1-6. Syntax for creating an untyped XML column\n\nThe\
    \ example in Listing 1-7 demonstrates how insert a new row into to the table we\
    \ created in Listing 1-6.\n\n```sql\nINSERT INTO dbo.UntypedXML\n(\n    UntypedXMLData\n\
    )\nSELECT N'\n<ProductCategory>\n    <ProductCategoryID>3</ProductCategoryID>\n\
    \    <Name>Accessories</Name>\n    <Products>\n        <Product>\n           \
    \ <Name>Bike Racks</Name>\n            <ProductID>100</ProductID>\n          \
    \  <ProductSubcategory>\n                <Name>Hitch Rack - 4-Bike</Name>\n  \
    \              <ProductNumber>RA-H123</ProductNumber>\n                <ListPrice>120.0000</ListPrice>\n\
    \            </ProductSubcategory>\n        </Product>\n        <Product>\n  \
    \          <Name>Bike Stands</Name>\n            <ProductID>101</ProductID>\n\
    \            <ProductSubcategory>\n                <Name>All-Purpose Bike Stand</Name>\n\
    \                <ProductNumber>ST-1401</ProductNumber>\n                <ListPrice>159.0000</ListPrice>\n\
    \            </ProductSubcategory>\n        </Product>\n    </Products>\n</ProductCategory>';\n\
    ```\nListing 1-7. Inserting a new row with XML data\n\nThe example in Listing\
    \ 1-8 demonstrates how to declare an `XML` data type variable and then insert\
    \ it into the table we previously created.\n\n```sql\nDECLARE @xml XML = N'\n\
    <ProductCategory>\n    <Name>Accessories</Name>\n</ProductCategory>';\nINSERT\
    \ INTO dbo.UntypedXML\n(\n    UntypedXMLData\n)\nSELECT @xml;\n```\nListing 1-8.\
    \ Inserting new row via XML variable\n\n**Note** When we declare a variable as\
    \ `XML` data type then assign XML to the variable, SQL Server implicitly converts\
    \ character data to `XML` data type. That applies to `VARCHAR`, `NVARCHAR`, and\
    \ `VARBINARY` data types.\n\nThe example in Listing 1-9 demonstrates how to create\
    \ a stored procedure with an `XML` data type parameter, which inserts into the\
    \ table when it is called.\n\n```sql\nCREATE PROCEDURE dbo.usp_Insert_UntypedXML\n\
    \    @UntypedXML XML\nAS\nINSERT INTO dbo.UntypedXML\n(\n    UntypedXMLData\n\
    )\nSELECT @UntypedXML;\nGO\n```\nListing 1-9. Stored procedure to insert XML data\
    \ into a table\n\n### How It Works\n\nWhen an XML schema is not bound to the column,\
    \ variable, or stored procedure parameter, the object created is untyped XML.\
    \ However, untyped XML instances still require the XML data it contains to follow\
    \ the XML format per the W3C standard. When a column is created as an untyped\
    \ XML instance, the parser will verify incoming data to ensure that the XML data\
    \ is “well-formed,” or a fragment (with no root element) that otherwise follows\
    \ the rules for well-formedness. For example, all opened elements are closed,\
    \ the opened and closed elements are matched to each other, and no invalid characters\
    \ are found. Untyped XML objects are useful when the following applies:\n\n* \
    \  No XML schema exists for the data.\n*   The XML documents and data consist\
    \ of different elements and attributes, but still need to be stored in the same\
    \ XML enabled column. Listings 1-7 and 1-8 demonstrate this case.\n*   An application\
    \ verifies and then sends well-formed XML or XML fragments to a table.\n\nAfter\
    \ a table with an untyped XML column is created, you can expand the table and\
    \ then expand columns under Object Explorer. The column list appears, showing\
    \ the `XML` data type distinguished with a dot inside parentheses, indicating\
    \ that this is an untyped XML column as shown in Figure 1-3.\n\n![A435478_1_En_1_Fig3_HTML.jpg](A435478_1_En_1_Fig3_HTML.jpg)\n\
    \nFigure 1-3. Untyped XML column in Table Designer\n\n## 1-2. Creating an XML\
    \ Schema in Visual Studio\n\n### Problem\n\nYou want to obtain or generate an\
    \ XML schema to constrain the data in a typed `XML` column."
  raw: '### Exploring the XML Data Type


    XML support within the Microsoft SQL Server database was first introduced in SQL
    Server 2000\. XML can consist of very long strings of data; therefore, it is very
    rare to encounter XML data that will not fit in a `VARCHAR(8000)` or `NVARCHAR(4000)`
    Unicode column. Since much XML data won’t fit into these data types, SQL Server
    2000 suggested that DBAs and Developers utilize `TEXT` , and in some cases `IMAGE`,
    data types. Many found dealing with these data types to be a nightmare, as they
    were difficult to work with. Also, when dealing with XML on 2000 you had to utilize
    the COM-based stored procedures.


    With the release of SQL Server 2005, the `XML` data type was provided, which made
    it significantly easier to work with XML data, and the XML data can be stored
    in its native format. The result of the `XML` data type returns a clickable hyperlink
    format when the output is set to Result To Grid in SSMS. To review XML content,
    you can just click on the hyperlink and SSMS will display the XML result in a
    separate XML document tab. The XML document tab does not allow you to connect
    to SQL Server instances or execute any SQL statements .


    The `XML` data type is a convenient and well-designed data type that allows you
    to store data and documents in the XML format. In some cases, other large SQL
    Server data types can be used to store XML data, such as `NVARCHAR(MAX)`, `VARCHAR(MAX)`,
    or `VARBINARY(MAX)`. The old data types `IMAGE`, `NTEXT,` and `TEXT` can do the
    job as well but are not as user friendly to work with.


    For example, when XML data is stored as a document, and you do not need to query
    this data in its entirety, you can use the `NVARCHAR(MAX)`, `VARCHAR(MAX)`, `VARBINARY(MAX)`.
    The best argument for using a LOB data type to store XML is when you need to store
    the exact representation of the XML, since the XML data type will store the content
    you provide, but it might alter insignificant whitespace and the order of attributes
    is not guaranteed. Take a look at msdb.dbo.sysssispackages table where the packagedata
    column stores server-side SSIS packages. SQL Server utilizes the `IMAGE` data
    type (I would not recommend following Microsoft in this case) to store the SSIS
    package code. For those who have never looked at SSIS code, it is XML data. Therefore,
    when I need to query SSIS (I had several reasonable requests for such a task),
    I converted the packagedata column to `VARBINARY(MAX)` and then cast it to and
    `XML` data type instance, as shown in Listing [1-5](#A435478_1_En_1_Chapter.html#Par30).


    ```

    SELECT CAST(CAST(packagedata as VARBINARY(MAX)) AS XML) AS SSISPackage

    FROM msdb.dbo.sysssispackages;

    Listing 1-5.

    Converting IMAGE data type into XML data type

    ```


    Caution


    Legacy Large Object Binary data types IMAGE, NTEXT, and TEXT should not be considered
    for any column implementation. Books Online do not reference these data types
    because they are deprecated. However, some system tables still have it; even Microsoft
    announced that IMAGE, NTEXT, and TEXT data types would be deprecated in the year
    2008.


    The `XML` data type has the following limitations:


    *   The storage is limited to 2.1 GB.

    *   It cannot be used as a table Primary Key.

    *   It cannot be sorted by the `ORDER BY` clause.

    *   It cannot be compared in the `WHERE` clause.

    *   It cannot be used in the `GROUP BY` clause.

    *   It cannot be a parameter to any scalar built-in functions except ISNULL, COALESCE,
    DATALENGTH, CAST, TRY_CAST, CONVERT, CHOOSE, and IIF functions.

    *   The columns with XML data type cannot be part of a linked server query.

    *   XML columns can only be indexed via an XML index; for clustered and nonclustered
    table indexes, XML columns can be included with the `INCLUDE` clause .


    The XML data type has two forms:


    *   Untyped XML (the default), is an `XML` data type instance that does not have
    an associated XML schema.

    *   Typed XML is an `XML` data type instance with an XML schema bound to it.


    ## 1-1\. Creating an Untyped XML Column


    ### Problem


    You want to define an untyped XML column in a table.


    ### Solution


    Define the designated column as `XML` data type upon creation. The example in
    Listing [1-6](#A435478_1_En_1_Chapter.html#Par46) demonstrates syntax on how to
    create a simple untyped XML column.


    ```

    CREATE TABLE dbo.UntypedXML

    (

    UntypedXML_ID INT IDENTITY(1, 1) NOT NULL PRIMARY KEY,

    UntypedXMLData XML

    );

    Listing 1-6.

    Syntax for creating an untyped XML column

    ```


    The example in Listing [1-7](#A435478_1_En_1_Chapter.html#Par48) demonstrates
    how insert a new row into to the table we created in Listing [1-6](#A435478_1_En_1_Chapter.html#Par46).


    ```

    INSERT INTO dbo.UntypedXML

    (

    UntypedXMLData

    )

    SELECT N''


    Accessories


    Bike Racks


    Hitch Rack - 4-Bike

    RA-H123

    120.0000


    Bike Stands


    All-Purpose Bike Stand

    ST-1401

    159.0000


    '';

    Listing 1-7.

    Inserting a new row with XML data

    ```


    The example in Listing [1-8](#A435478_1_En_1_Chapter.html#Par50) demonstrates
    how to declare an `XML` data type variable and then insert it into the table we
    previously created.


    ```

    DECLARE @xml XML = N''


    '';

    INSERT INTO dbo.UntypedXML

    (

    UntypedXMLData

    )

    SELECT @xml;

    Listing 1-8.

    Inserting new row via XML variable

    ```


    Note


    When we declare a variable as XML data type then assign XML to the variable, SQL
    Server implicitly converts character data to XML data type. That applies to VARCHAR,
    NVARCHAR, and VARBINARY data types.


    The example in Listing [1-9](#A435478_1_En_1_Chapter.html#Par53) demonstrates
    how to create a stored procedure with an `XML` data type parameter, which inserts
    into the table when it is called.


    ```

    CREATE PROCEDURE dbo.usp_Insert_UntypedXML

    @UntypedXML XML

    AS

    INSERT INTO dbo.UntypedXML

    (

    UntypedXMLData

    )

    SELECT @UntypedXML;

    GO

    Listing 1-9.

    Stored procedure to insert XML data into a table

    ```


    ### How It Works


    When an XML schema is not bound to the column, variable, or stored procedure parameter,
    the object created is untyped XML. However, untyped XML instances still require
    the XML data it contains to follow the XML format per the W3C standard. When a
    column is created as an untyped XML instance, the parser will verify incoming
    data to ensure that the XML data is “well-formed,” or a fragment (with no root
    element) that otherwise follows the rules for well-formedness. For example, all
    opened elements are closed, the opened and closed elements are matched to each
    other, and no invalid characters are found. Untyped XML objects are useful when
    the following applies:


    *   No XML schema exists for the data.

    *   The XML documents and data consist of different elements and attributes, but
    still need to be stored in the same XML enabled column. Listings [1-7](#A435478_1_En_1_Chapter.html#Par48)
    and [1-8](#A435478_1_En_1_Chapter.html#Par50) demonstrate this case.

    *   An application verifies and then sends well-formed XML or XML fragments to
    a table .


    After a table with an untyped XML column is created, you can expand the table
    and then expand columns under Object Explorer. The column list appears, showing
    the `XML` data type distinguished with a dot inside parentheses, indicating that
    this is an untyped XML column as shown in Figure [1-3](#A435478_1_En_1_Chapter.html#Fig3).


    ![A435478_1_En_1_Fig3_HTML.jpg](A435478_1_En_1_Fig3_HTML.jpg)


    Figure 1-3.


    Untyped XML column in Table Designer


    ## 1-2\. Creating an XML Schema in Visual Studio


    ### Problem


    You want to obtain or generate an XML schema to constrain the data in a typed
    XML column.'
  trans: "\n# 探索 XML 数据类型\n\nMicrosoft SQL Server 数据库中的 XML 支持首次引入于 SQL Server 2000。XML\
    \ 可能包含非常长的数据字符串；因此，很少会遇到无法放入 `VARCHAR(8000)` 或 `NVARCHAR(4000)` Unicode 列的 XML\
    \ 数据。由于许多 XML 数据无法放入这些数据类型，SQL Server 2000 建议 DBA 和开发人员使用 `TEXT`，在某些情况下使用 `IMAGE`\
    \ 数据类型。许多人发现处理这些数据类型是一场噩梦，因为它们难以使用。此外，在 2000 版处理 XML 时，你必须使用基于 COM 的存储过程。\n\n\
    随着 SQL Server 2005 的发布，提供了 `XML` 数据类型，这使得处理 XML 数据变得显著更容易，并且 XML 数据可以以其原生格式存储。当在\
    \ SSMS 中将输出设置为“结果到网格”时，`XML` 数据类型的输出会返回可点击的超链接格式。要查看 XML 内容，只需点击超链接，SSMS 就会在单独的\
    \ XML 文档选项卡中显示 XML 结果。XML 文档选项卡不允许你连接到 SQL Server 实例或执行任何 SQL 语句。\n\n`XML` 数据类型是一种便捷且设计良好的数据类型，允许你以\
    \ XML 格式存储数据和文档。在某些情况下，可以使用其他大型 SQL Server 数据类型来存储 XML 数据，例如 `NVARCHAR(MAX)`、`VARCHAR(MAX)`\
    \ 或 `VARBINARY(MAX)`。旧的数据类型 `IMAGE`、`NTEXT` 和 `TEXT` 也能完成这项工作，但使用起来不那么用户友好。\n\n\
    例如，当 XML 数据作为文档存储，并且你不需要整体查询这些数据时，你可以使用 `NVARCHAR(MAX)`、`VARCHAR(MAX)`、`VARBINARY(MAX)`。使用\
    \ LOB 数据类型存储 XML 的最佳理由是当你需要存储 XML 的精确表示时，因为 `XML` 数据类型会存储你提供的内容，但它可能会更改不重要的空白，并且不能保证属性的顺序。看看\
    \ `msdb.dbo.sysssispackages` 表，其中的 `packagedata` 列存储了服务器端的 SSIS 包。SQL Server 使用\
    \ `IMAGE` 数据类型（在此情况下我不建议效仿 Microsoft）来存储 SSIS 包代码。对于那些从未看过 SSIS 代码的人来说，它是 XML\
    \ 数据。因此，当我需要查询 SSIS 时（我有过几次这样的合理请求），我将 `packagedata` 列转换为 `VARBINARY(MAX)`，然后将其转换为\
    \ `XML` 数据类型实例，如代码清单 1-5 所示。\n\n```sql\nSELECT CAST(CAST(packagedata as VARBINARY(MAX))\
    \ AS XML) AS SSISPackage\nFROM msdb.dbo.sysssispackages;\n```\n代码清单 1-5. 将 IMAGE\
    \ 数据类型转换为 XML 数据类型\n\n**注意**\n\n不应考虑将旧式大型对象二进制数据类型 `IMAGE`、`NTEXT` 和 `TEXT` 用于任何列的实现。联机丛书中没有引用这些数据类型，因为它们已弃用。但是，一些系统表仍然包含它们；甚至\
    \ Microsoft 早在 2008 年就宣布 `IMAGE`、`NTEXT` 和 `TEXT` 数据类型将被弃用。\n\n`XML` 数据类型具有以下限制：\n\
    \n*   存储限制为 2.1 GB。\n*   不能用作表的主键。\n*   不能通过 `ORDER BY` 子句进行排序。\n*   不能在 `WHERE`\
    \ 子句中进行比较。\n*   不能用于 `GROUP BY` 子句。\n*   除了 `ISNULL()`、`COALESCE()`、`DATALENGTH()`、`CAST()`、`TRY_CAST()`、`CONVERT()`、`CHOOSE()`\
    \ 和 `IIF()` 函数外，不能作为任何标量内置函数的参数。\n*   具有 `XML` 数据类型的列不能是链接服务器查询的一部分。\n*   XML\
    \ 列只能通过 XML 索引进行索引；对于聚集和非聚集表索引，XML 列可以通过 `INCLUDE` 子句包含。\n\nXML 数据类型有两种形式：\n\n\
    *   非类型化 XML（默认），是未关联 XML 架构的 `XML` 数据类型实例。\n*   类型化 XML 是绑定了 XML 架构的 `XML` 数据类型实例。\n\
    \n## 1-1. 创建非类型化 XML 列\n\n### 问题\n\n你想在表中定义一个非类型化 XML 列。\n\n### 解决方案\n\n在创建时将指定列定义为\
    \ `XML` 数据类型。代码清单 1-6 中的示例演示了如何创建一个简单的非类型化 XML 列的语法。\n\n```sql\nCREATE TABLE dbo.UntypedXML\n\
    (\n    UntypedXML_ID INT IDENTITY(1, 1) NOT NULL PRIMARY KEY,\n    UntypedXMLData\
    \ XML\n);\n```\n代码清单 1-6. 创建非类型化 XML 列的语法\n\n代码清单 1-7 中的示例演示了如何向我们在代码清单 1-6 中创建的表插入新行。\n\
    \n```sql\nINSERT INTO dbo.UntypedXML\n(\n    UntypedXMLData\n)\nSELECT N'\n<ProductCategory>\n\
    \    <ProductCategoryID>3</ProductCategoryID>\n    <Name>Accessories</Name>\n\
    \    <Products>\n        <Product>\n            <Name>Bike Racks</Name>\n    \
    \        <ProductID>100</ProductID>\n            <ProductSubcategory>\n      \
    \          <Name>Hitch Rack - 4-Bike</Name>\n                <ProductNumber>RA-H123</ProductNumber>\n\
    \                <ListPrice>120.0000</ListPrice>\n            </ProductSubcategory>\n\
    \        </Product>\n        <Product>\n            <Name>Bike Stands</Name>\n\
    \            <ProductID>101</ProductID>\n            <ProductSubcategory>\n  \
    \              <Name>All-Purpose Bike Stand</Name>\n                <ProductNumber>ST-1401</ProductNumber>\n\
    \                <ListPrice>159.0000</ListPrice>\n            </ProductSubcategory>\n\
    \        </Product>\n    </Products>\n</ProductCategory>';\n```\n代码清单 1-7. 插入包含\
    \ XML 数据的新行\n\n代码清单 1-8 中的示例演示了如何声明一个 `XML` 数据类型变量，然后将其插入我们先前创建的表中。\n\n```sql\n\
    DECLARE @xml XML = N'\n<ProductCategory>\n    <Name>Accessories</Name>\n</ProductCategory>';\n\
    INSERT INTO dbo.UntypedXML\n(\n    UntypedXMLData\n)\nSELECT @xml;\n```\n代码清单\
    \ 1-8. 通过 XML 变量插入新行\n\n**注意** 当我们将变量声明为 `XML` 数据类型然后为其赋值 XML 时，SQL Server 会隐式地将字符数据转换为\
    \ `XML` 数据类型。这适用于 `VARCHAR`、`NVARCHAR` 和 `VARBINARY` 数据类型。\n\n代码清单 1-9 中的示例演示了如何创建一个带有\
    \ `XML` 数据类型参数的存储过程，该过程在被调用时向表中插入数据。\n\n```sql\nCREATE PROCEDURE dbo.usp_Insert_UntypedXML\n\
    \    @UntypedXML XML\nAS\nINSERT INTO dbo.UntypedXML\n(\n    UntypedXMLData\n\
    )\nSELECT @UntypedXML;\nGO\n```\n代码清单 1-9. 将 XML 数据插入表的存储过程\n\n### 工作原理\n\n当没有\
    \ XML 架构绑定到列、变量或存储过程参数时，所创建的对象是非类型化 XML。然而，非类型化 XML 实例仍然要求其包含的 XML 数据遵循 W3C 标准的\
    \ XML 格式。当列被创建为非类型化 XML 实例时，解析器将验证传入数据，以确保 XML 数据是“格式良好”的，或者是（没有根元素的）片段，但其他方面符合格式良好的规则。例如，所有打开的元素都被关闭，打开和关闭的元素彼此匹配，并且未发现无效字符。在以下情况下，非类型化\
    \ XML 对象非常有用：\n\n*   没有适用于该数据的 XML 架构。\n*   XML 文档和数据由不同的元素和属性组成，但仍需要存储在同一个启用\
    \ XML 的列中。代码清单 1-7 和 1-8 展示了这种情况。\n*   应用程序验证然后发送格式良好的 XML 或 XML 片段到表中。\n\n创建具有非类型化\
    \ XML 列的表后，你可以在“对象资源管理器”中展开该表，然后展开列。列列表会出现，显示 `XML` 数据类型，其括号内带有一个点，表明这是一个非类型化\
    \ XML 列，如图 1-3 所示。\n\n![A435478_1_En_1_Fig3_HTML.jpg](img/A435478_1_En_1_Fig3_HTML.jpg)\n\
    \n图 1-3. 表设计器中的非类型化 XML 列\n\n## 1-2. 在 Visual Studio 中创建 XML 架构\n\n### 问题\n\n\
    你想获取或生成一个 XML 架构来约束类型化 `XML` 列中的数据。\n"
- fmt: "# 使用 Visual Studio 和 SSMS 生成 XML Schema\n\n## 解决方案\n\n要使用 Microsoft Visual\
    \ Studio 生成 XML 架构，你需要使用 2008 或更新的版本。SQL Server Data Tools 也能完成此任务，因为它使用了 Microsoft\
    \ Visual Studio Shell。此外，你还需要一个 XML 文件。如果你的 XML 数据是作为 `FOR XML` 子句的结果创建的（更多内容见第\
    \ [2](#A435478_1_En_2_Chapter.html) 章），请将 XML 数据保存为扩展名为 `.xml` 的文件。\n\n要加载 XML\
    \ 文件：\n\n1.  启动 MS Visual Studio。\n2.  转到文件菜单。\n3.  选择“打开”选项。\n4.  单击“文件”（快捷键\
    \ CTRL + O）。“打开文件”对话框将出现。\n5.  导航到 XML 文件的存储位置。\n6.  单击“打开”按钮，如图 [1-4](#A435478_1_En_1_Chapter.html#Fig4)\
    \ 所示。\n\n    ![A435478_1_En_1_Fig4_HTML.jpg](A435478_1_En_1_Fig4_HTML.jpg)\n\n\
    \    图 1-4. 在 Visual Studio 中打开 XML 文件\n\n文件加载后，Visual Studio 会识别 XML 文件格式，并更改菜单选项以添加\
    \ XML 菜单选项。要生成 XML 架构，请完成以下步骤：\n\n1.  选择 XML 菜单。\n2.  单击“创建架构”选项，如图 [1-5](#A435478_1_En_1_Chapter.html#Fig5)\
    \ 所示。\n\n    ![A435478_1_En_1_Fig5_HTML.jpg](A435478_1_En_1_Fig5_HTML.jpg)\n\n\
    \    图 1-5. 创建 XML 架构\n\nXML 架构将在一个单独的选项卡中创建。你可以复制 XML 架构内容，或保存 `.xsd` 文件（快捷键\
    \ CTRL + S）以备将来使用，如图 [1-6](#A435478_1_En_1_Chapter.html#Fig6) 所示。\n\n![A435478_1_En_1_Fig6_HTML.jpg](A435478_1_En_1_Fig6_HTML.jpg)\n\
    \n图 1-6. 将 XML 架构保存为 .xsd 文件\n\n## 工作原理\n\n在我看来，手动创建 XML 架构的时代已经结束。有很多方法可以自动生成\
    \ XML 架构。在这个教程中，我演示了两种自动创建 XML 架构的方法。这两种方法都基于 Microsoft 产品：\n\n*   MS Visual Studio（2008\
    \ 及以上版本）\n*   MS SQL Server（2005 及以上版本）\n\n为简单起见，我重用了清单 [1-2](#A435478_1_En_1_Chapter.html#Par14)\
    \ 中的 XML 数据，如清单 [1-10](#A435478_1_En_1_Chapter.html#Par76) 所示。\n\n```xml\n\nAccessories\n\
    \nBike Racks\n\nHitch Rack - 4-Bike\nRA-H123\n120.0000\n\nBike Stands\n\nAll-Purpose\
    \ Bike Stand\nST-1401\n159.0000\n\n```\n清单 1-10. 示例 XML\n\n当你有一个 XML 文件并需要为其创建\
    \ XML 架构时，完成此任务最简单、最方便的方法是使用 Microsoft Visual Studio，如解决方案中所演示的那样。根据示例数据生成的 XML\
    \ 架构如清单 [1-11](#A435478_1_En_1_Chapter.html#Par78) 所示。\n\n```xml\n\n```\n清单 1-11.\
    \ 由 Visual Studio 生成的 XML 架构\n\n## 1-3\\. 从 SSMS 创建 XML 架构\n\n### 问题\n\n你想从 SQL\
    \ Server Management Studio (SSMS) 内部生成一个 XML 架构。\n\n### 解决方案\n\n创建 XML 架构的另一种方法是使用\
    \ SQL Server 的 `FOR XML` 子句配合 `XMLSCHEMA` 指令。演示此选项的目的是展示一种利用 `FOR XML` 子句结果生成\
    \ XML 架构的替代方法。\n\n要在 SQL Server 中生成内联 XSD (XML Schema Definition) 架构，你需要在查询中添加带有\
    \ `XMLSCHEMA` 关键字的 `FOR XML` 子句（`FOR XML` 子句将在第 [2](#A435478_1_En_2_Chapter.html)\
    \ 章“构建 XML”中更详细地介绍）。可选地，可以在 XMLSCHEMA 关键字的括号内指定架构名称。例如，要将 ProductSchema 架构添加到你的\
    \ XSD 架构中，指定如下：`XMLSCHEMA(' [`http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema`](http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema)\
    \ ')`，如清单 [1-12](#A435478_1_En_1_Chapter.html#Par82) 所示。\n\n```sql\nSELECT TOP\
    \ (2) Category.Name AS CategoryName,\nSubcategory.Name AS SubcategoryName,\nProduct.Name,\n\
    Product.ProductNumber AS Number,\nProduct.ListPrice AS Price\nFROM  Production.Product\
    \ Product\nINNER JOIN Production.ProductSubcategory Subcategory\nON Product.ProductSubcategoryID\
    \ = Subcategory.ProductSubcategoryID\nLEFT JOIN Production.ProductCategory Category\n\
    ON Subcategory.ProductCategoryID = Category.ProductCategoryID\nWHERE Product.ListPrice\
    \ > 0\nAND Product.SellEndDate IS NULL\nORDER BY CategoryName, SubcategoryName\n\
    FOR XML AUTO, ELEMENTS, XMLSCHEMA('http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema'),\
    \ ROOT('Category');\n```\n清单 1-12. 创建 XML 架构的查询\n\n要提取 XSD 架构，你需要执行以下步骤：\n\n![A435478_1_En_1_Fig7_HTML.jpg](A435478_1_En_1_Fig7_HTML.jpg)\n\
    \n图 1-7. 在 XML 编辑器中显示结果\n\n![A435478_1_En_1_Fig8_HTML.jpg](A435478_1_En_1_Fig8_HTML.jpg)\n\
    \n图 1-8. 提取 XSD 架构部分\n\n*   运行带有 `XMLSCHEMA` 关键字的 SQL 语句。\n*   单击查询结果以在 XML 编辑器中打开带有架构的\
    \ XML，如图 [1-7](#A435478_1_En_1_Chapter.html#Fig7) 所示。\n*   XML 编辑器将显示 XSD 部分和\
    \ XML 部分。我们将重点关注 `<xsd:schema>` 元素。\n*   从开始的 `<xsd:schema>` 标签复制到结束的 `</xsd:schema>`\
    \ 标签。\n*   打开一个新的 SSMS 窗口，粘贴复制的部分，如图 [1-8](#A435478_1_En_1_Chapter.html#Fig8)\
    \ 所示。\n\n## 工作原理\n\n带有 `XMLSCHEMA` 关键字的 `FOR XML` 子句提供了一种将 XML 架构添加到 XML 结果的机制。当需要将命名空间与\
    \ XML 结果关联时，应在 XMLSCHEMA 关键字后的括号中指定命名空间声明。例如：\n\n```sql\nXMLSCHEMA('http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema'),\
    \ ROOT('Category')\n```\n\n从清单 [1-13](#A435478_1_En_1_Chapter.html#Par92) 生成的\
    \ XML 结果中复制并粘贴内联 XML 架构后，最终的 XML 架构如清单 [1-14](#A435478_1_En_1_Chapter.html#Par96)\
    \ 所示。\n\n```xml\n\n```\n清单 1-13. 从 FOR XML 子句结果得到的 XML 架构\n\n你可能已经注意到通过 Visual\
    \ Studio 和 SQL Server Management Studio 生成的 XML 架构及其内容的差异。通过 SQL Server 创建的 XML\
    \ 架构往往要大得多。然而，两种变体都提供了一个可以与 XML 架构集合 (XML Schema Collection) 一起使用以验证 XML 数据的 XML\
    \ 架构。\n\n## 1-4\\. 将 XML 绑定到架构集合\n\n### 问题\n\n你有一个 XML 架构，想要将其绑定到表的列以创建类型化的 XML\
    \ 列。\n\n### 解决方案\n\n要使 XML 架构有资格绑定到表的列、XML 变量或 XML 存储过程参数，需要创建 XML 架构集合，如清单 [1-14](#A435478_1_En_1_Chapter.html#Par96)\
    \ 所示。为了演示此过程，我重用了清单 [1-11](#A435478_1_En_1_Chapter.html#Par78) 中的 XML 架构。\n\n\
    ```sql\nCREATE XML SCHEMA COLLECTION dbo.TypedXML_VisualStudio\nAS\nN'\n\n';\n\
    GO\n```\n清单 1-14. 创建 XML 架构集合"
  raw: "### Solution\n\nTo generate an XML schema using Microsoft Visual Studio, you\
    \ need to use a version from 2008 or newer. SQL Server Data Tools will work as\
    \ well since it uses the Microsoft Visual Studio Shell. You will then need an\
    \ XML file. If you have the XML data, for instance, created as a result from the\
    \ `FOR XML` clause (more on this in Chapter [2](#A435478_1_En_2_Chapter.html)),\
    \ then save the XML data as a file with extension .xml.\n\nTo load the XML file:\n\
    \n1.  Start MS Visual Studio.  \n2.  Go to the File menu.  \n3.  Select the Open\
    \ option.  \n4.  Click File (shortcut CTRL + O). The dialog Open File will appear.\
    \  \n5.  Navigate to the XML file storage location.  \n6.  Click the Open button,\
    \ as shown in Figure [1-4](#A435478_1_En_1_Chapter.html#Fig4).\n\n    ![A435478_1_En_1_Fig4_HTML.jpg](A435478_1_En_1_Fig4_HTML.jpg)\n\
    \n    Figure 1-4.\n\n    Opening an XML file in Visual Studio  \n\nOnce the file\
    \ is loaded, Visual Studio will recognize the XML file format and change the Menu\
    \ options to add the XML Menu Options. To generate an XML schema, complete the\
    \ following steps:\n\n1.  Select the XML menu .  \n2.  Click on Create Schema\
    \ option, shown in Figure [1-5](#A435478_1_En_1_Chapter.html#Fig5).\n\n    ![A435478_1_En_1_Fig5_HTML.jpg](A435478_1_En_1_Fig5_HTML.jpg)\n\
    \n    Figure 1-5.\n\n    Creating the XML Schema  \n\nThe XML schema will be created\
    \ in a separate tab. You can copy the XML schema contents, or save the .xsd file\
    \ (shortcut CTRL + S) for future use, as shown in Figure [1-6](#A435478_1_En_1_Chapter.html#Fig6).\n\
    \n![A435478_1_En_1_Fig6_HTML.jpg](A435478_1_En_1_Fig6_HTML.jpg)\n\nFigure 1-6.\n\
    \nSaving XML schema as an .xsd file\n\n### How It Works\n\nThe era of creating\
    \ your XML schemas manually is over, from my point of view. There are many ways\
    \ to generate an XML schema automatically. In this recipe, I demonstrated two\
    \ methods to automatically create an XML schema. Both methods are based on Microsoft\
    \ products:\n\n*   MS Visual Studio (2008 and up)\n*   MS SQL Server (2005 and\
    \ up)\n\nFor simplicity, I am reusing the XML data from Listing [1-2](#A435478_1_En_1_Chapter.html#Par14),\
    \ as reproduced in Listing [1-10](#A435478_1_En_1_Chapter.html#Par76).\n\n```\n\
    \nAccessories\n\nBike Racks\n\nHitch Rack - 4-Bike\nRA-H123\n120.0000\n\nBike\
    \ Stands\n\nAll-Purpose Bike Stand\nST-1401\n159.0000\n\nListing 1-10.\nSample\
    \ XML\n```\n\nWhen you have an XML file and need to create an XML schema from\
    \ it, the easiest and most convenient way to accomplish this task is to use Microsoft\
    \ Visual Studio, as demonstrated in the solution. An XML schema generated from\
    \ the sample data XML data is shown in Listing [1-11](#A435478_1_En_1_Chapter.html#Par78).\n\
    \n```\n\nListing 1-11.\nXML schema generated by Visual Studio\n```\n\n## 1-3\\\
    . Creating an XML Schema from SSMS\n\n### Problem\n\nYou want to generate an XML\
    \ schema from within SQL Server Management Studio (SSMS).\n\n### Solution\n\n\
    An alternate way to create an XML schema is using the SQL Server `FOR XML` clause\
    \ with the `XMLSCHEMA` directive. The reason for demonstrating this option is\
    \ to show an alternative way to generate an XML schema with `FOR XML` clause result.\n\
    \nTo generate an inline XSD (XML Schema Definition) XML schema in SQL Server you\
    \ need to add a `FOR XML` clause with `XMLSCHEMA` keyword to your query (the `FOR\
    \ XML` clause will be covered in greater detail in Chapter [2](#A435478_1_En_2_Chapter.html),\
    \ “Building XML”). Optionally the schema name can be specified inside XMLSCHEMA\
    \ keyword parentheses. For example, to add the ProductSchema schema to your XSD\
    \ schema, specify the following: XMLSCHEMA(' [`http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema`](http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema)\
    \ '), as shown in Listing [1-12](#A435478_1_En_1_Chapter.html#Par82).\n\n```\n\
    SELECT TOP (2) Category.Name AS CategoryName,\nSubcategory.Name AS SubcategoryName,\n\
    Product.Name,\nProduct.ProductNumber AS Number,\nProduct.ListPrice AS Price\n\
    FROM  Production.Product Product\nINNER JOIN Production.ProductSubcategory Subcategory\n\
    ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\nLEFT JOIN\
    \ Production.ProductCategory Category\nON Subcategory.ProductCategoryID = Category.ProductCategoryID\n\
    WHERE Product.ListPrice > 0\nAND Product.SellEndDate IS NULL\nORDER BY CategoryName,\
    \ SubcategoryName\nFOR XML AUTO, ELEMENTS, XMLSCHEMA('http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema'),\
    \ ROOT('Category');\nListing 1-12.\nCreating XML schema query\n```\n\nTo extract\
    \ the XSD schema you need to perform the following steps:\n\n![A435478_1_En_1_Fig8_HTML.jpg](A435478_1_En_1_Fig8_HTML.jpg)\n\
    \nFigure 1-8.\n\nExtracting XSD schema part\n\n![A435478_1_En_1_Fig7_HTML.jpg](A435478_1_En_1_Fig7_HTML.jpg)\n\
    \nFigure 1-7.\n\nShowing result in XML Editor\n\n*   Run your SQL statement with\
    \ the `XMLSCHEMA` keyword.\n*   Click on the query result to open the XML with\
    \ schema in XML Editor, as shown in Figure [1-7](#A435478_1_En_1_Chapter.html#Fig7).\n\
    *   The XML Editor will show both the XSD part and the XML part. We will be focusing\
    \ on the <xsd:schema> element.\n*   Copy from the opening <xsd:schema> tag to\
    \ the closing </xsd:schema> tag.\n*   Open a new SSMS window paste the copied\
    \ part, as shown in Figure [1-8](#A435478_1_En_1_Chapter.html#Fig8).\n\n### How\
    \ It Works\n\nThe `FOR XML` clause with the `XMLSCHEMA` keyword provides a mechanism\
    \ to add your XML Schema to your XML result. When the namespace needs to be associated\
    \ with the XML result then the namespace declaration should be specified after\
    \ the XMLSCHEMA keyword in parentheses. For example:\n\n```\nXMLSCHEMA('http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema'),\
    \ ROOT('Category')\n```\n\nAfter copying and pasting the inline XML schema from\
    \ the XML result generated by Listing [1-13](#A435478_1_En_1_Chapter.html#Par92),\
    \ the resulting XML schema is demonstrated in Listing [1-14](#A435478_1_En_1_Chapter.html#Par96).\n\
    \n```\n\nListing 1-13.\nThe XML schema from the FOR XML clause result\n```\n\n\
    You might have noticed the difference in the XML schema generation and contents\
    \ between Visual Studio and SQL Server Management Studio. Creating an XML Schema\
    \ via SQL Server tends to create a much larger XML schema. However, both variants\
    \ deliver an XML schema that can be used with the XML Schema Collection to validate\
    \ XML data against.\n\n## 1-4\\. Binding XML to a Schema Collection\n\n### Problem\n\
    \nYou have an XML schema that you want to bind to a table’s column to create a\
    \ typed XML column.\n\n### Solution\n\nTo make an XML schema eligible to be bound\
    \ to a table’s column, XML variable, or XML stored procedure’s parameter, the\
    \ XML Schema Collection needs to be created, as shown in Listing [1-14](#A435478_1_En_1_Chapter.html#Par96).\
    \ To demonstrate the process, I am reusing the XML Schema from Listing [1-11](#A435478_1_En_1_Chapter.html#Par78).\n\
    \n```\nCREATE XML SCHEMA COLLECTION dbo.TypedXML_VisualStudio\nAS\nN'\n\n';\n\
    GO\nListing 1-14.\nCreating the XML Schema Collection\n```"
  trans: "# 使用 Visual Studio 和 SSMS 生成 XML 架构\n\n## 解决方案\n\n要使用 Microsoft Visual Studio\
    \ 生成 XML 架构，你需要使用 2008 或更新的版本。SQL Server Data Tools 也能完成此任务，因为它使用了 Microsoft Visual\
    \ Studio Shell。此外，你还需要一个 XML 文件。如果你的 XML 数据是作为 `FOR XML` 子句的结果创建的（更多内容见第 2 章），请将\
    \ XML 数据保存为扩展名为 `.xml` 的文件。\n\n要加载 XML 文件：\n\n1.  启动 MS Visual Studio。\n2.  转到文件菜单。\n\
    3.  选择“打开”选项。\n4.  单击“文件”（快捷键 CTRL + O）。“打开文件”对话框将出现。\n5.  导航到 XML 文件的存储位置。\n\
    6.  单击“打开”按钮，如图 1-4 所示。\n\n    ![A435478_1_En_1_Fig4_HTML.jpg](img/A435478_1_En_1_Fig4_HTML.jpg)\n\
    \n    图 1-4. 在 Visual Studio 中打开 XML 文件\n\n文件加载后，Visual Studio 会识别 XML 文件格式，并更改菜单选项以添加\
    \ XML 菜单选项。要生成 XML 架构，请完成以下步骤：\n\n1.  选择 XML 菜单。\n2.  单击“创建架构”选项，如图 1-5 所示。\n\n\
    \    ![A435478_1_En_1_Fig5_HTML.jpg](img/A435478_1_En_1_Fig5_HTML.jpg)\n\n   \
    \ 图 1-5. 创建 XML 架构\n\nXML 架构将在一个单独的选项卡中创建。你可以复制 XML 架构内容，或保存 `.xsd` 文件（快捷键 CTRL\
    \ + S）以备将来使用，如图 1-6 所示。\n\n![A435478_1_En_1_Fig6_HTML.jpg](img/A435478_1_En_1_Fig6_HTML.jpg)\n\
    \n图 1-6. 将 XML 架构保存为 .xsd 文件\n\n## 工作原理\n\n在我看来，手动创建 XML 架构的时代已经结束。有很多方法可以自动生成\
    \ XML 架构。在这个教程中，我演示了两种自动创建 XML 架构的方法。这两种方法都基于 Microsoft 产品：\n\n*   MS Visual Studio（2008\
    \ 及以上版本）\n*   MS SQL Server（2005 及以上版本）\n\n为简单起见，我重用了清单 1-2 中的 XML 数据，如清单 1-10\
    \ 所示。\n\n```xml\n\nAccessories\n\nBike Racks\n\nHitch Rack - 4-Bike\nRA-H123\n\
    120.0000\n\nBike Stands\n\nAll-Purpose Bike Stand\nST-1401\n159.0000\n\n```\n\
    清单 1-10. 示例 XML\n\n当你有一个 XML 文件并需要为其创建 XML 架构时，完成此任务最简单、最方便的方法是使用 Microsoft Visual\
    \ Studio，如解决方案中所演示的那样。根据示例数据生成的 XML 架构如清单 1-11 所示。\n\n```xml\n\n```\n清单 1-11.\
    \ 由 Visual Studio 生成的 XML 架构\n\n## 1-3. 从 SSMS 创建 XML 架构\n\n### 问题\n\n你想从 SQL\
    \ Server Management Studio (SSMS) 内部生成一个 XML 架构。\n\n### 解决方案\n\n创建 XML 架构的另一种方法是使用\
    \ SQL Server 的 `FOR XML` 子句配合 `XMLSCHEMA` 指令。演示此选项的目的是展示一种利用 `FOR XML` 子句结果生成\
    \ XML 架构的替代方法。\n\n要在 SQL Server 中生成内联 XSD (XML Schema Definition) 架构，你需要在查询中添加带有\
    \ `XMLSCHEMA` 关键字的 `FOR XML` 子句（`FOR XML` 子句将在第 2 章“构建 XML”中更详细地介绍）。可选地，可以在 XMLSCHEMA\
    \ 关键字的括号内指定架构名称。例如，要将 ProductSchema 架构添加到你的 XSD 架构中，指定如下：`XMLSCHEMA(' [`http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema`](http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema)\
    \ ')`，如清单 1-12 所示。\n\n```sql\nSELECT TOP (2) Category.Name AS CategoryName,\n\
    Subcategory.Name AS SubcategoryName,\nProduct.Name,\nProduct.ProductNumber AS\
    \ Number,\nProduct.ListPrice AS Price\nFROM  Production.Product Product\nINNER\
    \ JOIN Production.ProductSubcategory Subcategory\nON Product.ProductSubcategoryID\
    \ = Subcategory.ProductSubcategoryID\nLEFT JOIN Production.ProductCategory Category\n\
    ON Subcategory.ProductCategoryID = Category.ProductCategoryID\nWHERE Product.ListPrice\
    \ > 0\nAND Product.SellEndDate IS NULL\nORDER BY CategoryName, SubcategoryName\n\
    FOR XML AUTO, ELEMENTS, XMLSCHEMA('http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema'),\
    \ ROOT('Category');\n```\n清单 1-12. 创建 XML 架构的查询\n\n要提取 XSD 架构，你需要执行以下步骤：\n\n![A435478_1_En_1_Fig7_HTML.jpg](img/A435478_1_En_1_Fig7_HTML.jpg)\n\
    \n图 1-7. 在 XML 编辑器中显示结果\n\n![A435478_1_En_1_Fig8_HTML.jpg](img/A435478_1_En_1_Fig8_HTML.jpg)\n\
    \n图 1-8. 提取 XSD 架构部分\n\n*   运行带有 `XMLSCHEMA` 关键字的 SQL 语句。\n*   单击查询结果以在 XML 编辑器中打开带有架构的\
    \ XML，如图 1-7 所示。\n*   XML 编辑器将显示 XSD 部分和 XML 部分。我们将重点关注 `<xsd:schema>` 元素。\n*\
    \   从开始的 `<xsd:schema>` 标签复制到结束的 `</xsd:schema>` 标签。\n*   打开一个新的 SSMS 窗口，粘贴复制的部分，如图\
    \ 1-8 所示。\n\n## 工作原理\n\n带有 `XMLSCHEMA` 关键字的 `FOR XML` 子句提供了一种将 XML 架构添加到 XML 结果的机制。当需要将命名空间与\
    \ XML 结果关联时，应在 XMLSCHEMA 关键字后的括号中指定命名空间声明。例如：\n\n```sql\nXMLSCHEMA('http://schemas.microsoft.com/sqlserver/2004/07/Chapter01/ProductSchema'),\
    \ ROOT('Category')\n```\n\n从清单 1-13 生成的 XML 结果中复制并粘贴内联 XML 架构后，最终的 XML 架构如清单 1-14\
    \ 所示。\n\n```xml\n\n```\n清单 1-13. 从 FOR XML 子句结果得到的 XML 架构\n\n你可能已经注意到通过 Visual\
    \ Studio 和 SQL Server Management Studio 生成的 XML 架构及其内容的差异。通过 SQL Server 创建的 XML\
    \ 架构往往要大得多。然而，两种变体都提供了一个可以与 XML 架构集合 (XML Schema Collection) 一起使用以验证 XML 数据的 XML\
    \ 架构。\n\n## 1-4. 将 XML 绑定到架构集合\n\n### 问题\n\n你有一个 XML 架构，想要将其绑定到表的列以创建类型化的 XML\
    \ 列。\n\n### 解决方案\n\n要使 XML 架构有资格绑定到表的列、XML 变量或 XML 存储过程参数，需要创建 XML 架构集合，如清单 1-14\
    \ 所示。为了演示此过程，我重用了清单 1-11 中的 XML 架构。\n\n```sql\nCREATE XML SCHEMA COLLECTION dbo.TypedXML_VisualStudio\n\
    AS\nN'\n\n';\nGO\n```\n清单 1-14. 创建 XML 架构集合"
- fmt: '### How It Works


    The syntax for creating the XML Schema Collection is fairly simple. When the XML
    schema is generated, the schema contents need to be added to an SQL Server XML
    Schema Collection object. The syntax to create the schema collection (shown in
    Listing [1-14](#A435478_1_En_1_Chapter.html#Par96)) has several components:

    *   `CREATE XML SCHEMA COLLECTION` - declarative statement

    *   `dbo` – relational schema (if not provided then the SQL Server default will
    be assumed)

    *   XML Schema Collection name – any SQL Server valid unique name

    *   `AS <schema_contents>` - The XML Schema contents that can be constant, or
    scalar variable in `xml`, `nvarchar`, `varchar`, or `varbinary` data type


    To create an XML SCHEMA COLLECTION one of the following server- or database-level
    permissions are required:

    *   `CONTROL` (server level)

    *   `ALTER ANY DATABASE` (server level)

    *   `ALTER` (database level)

    *   `CONTROL` (database level)

    *   `ALTER ANY SCHEMA` and `CREATE XML SCHEMA COLLECTION` (database level)


    After successful creation, your new XML Schema Collection can be found in the
    SSMS Object Explorer under Programmability, Types, XML Schema Collection, as shown
    in Figure [1-9](#A435478_1_En_1_Chapter.html#Fig9).


    ![A435478_1_En_1_Fig9_HTML.jpg](A435478_1_En_1_Fig9_HTML.jpg)

    Figure 1-9. Finding the XML Schema Collection


    Note: When the XML Schema Collection is bound to one or more columns, no changes
    can be applied to the XML Schema Collection. To modify or drop the XML Schema
    Collection you need to unbind it from the column(s) first.


    ## 1-5. Creating a Typed XML Column


    ### Problem


    You have created an XML Schema Collection, and now you want to bind it to a column
    to create a typed XML column.


    ### Solution


    When the XML Schema Collection is successfully created, the code to bind your
    XML Schema to a newly created table is shown in Listing [1-15](#A435478_1_En_1_Chapter.html#Par112).


    ```sql

    CREATE TABLE dbo.TypedXML_VS

    (

    TypedXML_ID INT IDENTITY(1, 1) NOT NULL PRIMARY KEY,

    TypedXMLData XML(TypedXML_VisualStudio)

    );

    GO

    Listing 1-15. Creating new table with typed XML column

    ```


    You can bind the XML Schema Collection to an existing `XML` column with the `ALTER
    TABLE … ALTER COLUMN` statement, as demonstrated in Listing [1-16](#A435478_1_En_1_Chapter.html#Par114).


    ```sql

    ALTER TABLE TypedXML_VS

    ALTER COLUMN TypedXMLData XML (TypedXML_VisualStudio);

    Listing 1-16. Binding XML Schema Collection to the column

    ```


    ### How It Works


    The mechanism to bind an XML Schema Collection to an XML column is straightforward.
    The XML Schema Collection name needs to be identified as part of the `XML` data
    type, in parentheses. The syntax is: `column_name XML (XML_SCHEMA_COLLECTION_NAME)`.
    For the new table, the XML Schema Collection can be bound to a column in the `CREATE
    TABLE` DDL command (Listing [1-15](#A435478_1_En_1_Chapter.html#Par112)). When
    the table contains an untyped XML column, the `ALTER TABLE` command will complete
    the task (Listing [1-16](#A435478_1_En_1_Chapter.html#Par114)).


    When the XML Schema Collection is bound to a column, the XSD itself cannot be
    modified or deleted. However, the table with the typed XML column can be dropped.
    To disconnect the XSD from the column, you need to execute an `ALTER TABLE` DDL
    command, where the `XML` data type does not have parentheses, as shown in Listing
    [1-17](#A435478_1_En_1_Chapter.html#Par117).


    ```sql

    ALTER TABLE TypedXML_VS

    ALTER COLUMN TypedXMLData XML;

    Listing 1-17. Disconnecting the XSD from the column

    ```


    After the XSD is unbound, the XML column becomes untyped.


    A couple of questions and answers about a typed XML.


    Why do I want to do this and what is the benefit?

    *   Ability to validate an XML data per the XML schema.

    *   Take advantage of storage and query optimizations based on type information.

    *   Better advantage of type information within a compilation of the queries.


    What happens to XML data I insert into a typed XML column?

    *   Each insert validates by the XML schema; when validation fails, then SQL Server
    raises an error and insert fails.


    What happens if I have XML already existing in the table and apply an XML schema
    to it?

    *   If a table with the XML column has existing XML, then bind XML schema to the
    table fails when the XML does not conform to the XML schema.


    ## Summary


    SQL Server 2000 first introduced XML functionality in the SQL database. Since
    that time, XML technology has evolved into a comprehensive information technology
    platform. SQL Server 2005 was delivered with the `XML` data type. In this chapter,
    you received an introduction to XML. I explained the difference between the element
    and attribute, which is very important to differentiate for future chapters. I
    defined and explained XML schemas and introduced two ways how to generate an XML
    Schema. From my point of view, with the availability of modern technology, there
    is no need to create the XML Schema manually, since it is a complex and time-consuming
    process. Save your time, and if you are dealing with the Microsoft tools `MS Visual
    Studio`, `SQL Server Data Tools`, and `SSMS`, either one can generate the XML
    Schema automatically.


    The next chapter of the book demonstrates how to build an XML out of a result
    set.'
