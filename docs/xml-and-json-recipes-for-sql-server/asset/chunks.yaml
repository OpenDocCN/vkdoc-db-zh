    "[\"Turkish\",\"Slovenian\"]"` `}` | `{` `"HireDate": "2010-08-24T00:00:00",`
    `"Title": "Team Member",` `"SpokenLanguages": [` `"Turkish", "Slovenian"` `]`
    `}` |


    When the first JSON_MODIFY() function call returns a desirable JSON result, the
    second JSON_MODIFY() call deletes the old name with the provided path arguments
    as ‘$.OtherLanguages’ and newValue argument as NULL .


