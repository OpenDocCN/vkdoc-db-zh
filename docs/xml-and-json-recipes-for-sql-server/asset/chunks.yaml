- fmt: '## How It Works


    PATH mode allows the specification of the structure that builds JSON output. The
    difference between PATH and AUTO mode is that AUTO mode builds up a JSON output
    automatically by figuring out how the `FROM` and `SELECT` clauses are structured
    in a query. If a query is based on one table, then the `PATH` and `AUTO` modes
    return similar JSON output. However, in most cases, JSON output is built based
    on multiple tables, and in this case the `AUTO` mode is not the best choice because
    your expectation for JSON output is not always the same as what `AUTO` mode returns.
    With the `PATH` mode, you dictate how your JSON structure is going to look.


    JSON structure is constructed in the `SELECT` clause. When alias names are separated
    by a comma, a parent-child level is established for the elements and value. For
    example, Figure 8-5 demonstrates three levels of structure:


    1.  Database

    2.  Tables {Schema and Table}

    3.  Columns {ColumnName}


    The T-SQL results returned by the same query are demonstrated in Figure 8-5, but
    without the `FOR JSON` clause, shown in Listing 8-18.


    ![A435478_1_En_8_Fig5_HTML.jpg](A435478_1_En_8_Fig5_HTML.jpg)


    Figure 8-5. Showing T-SQL that will be transformed into JSON


    ```sql

    SELECT db_name()     as ''Database'',

    [Schema].name as ''Tables.SchemaName'',

    [Table].name  as ''Tables.TableName'',

    [Column].name as ''Tables.Columns.ColumnName''

    FROM sys.objects [Table]

    JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

    JOIN sys.columns [Column] ON [Column].object_id = [Table].object_id

    WHERE type = ''u'' and [Table].name = ''SupplierCategories''

    ```


    Listing 8-18. Showing query that generated a result for Figure 8-5


    When we are converting the T-SQL output, we are expecting the JSON structure shown
    in Listing 8-19.


    ```

    Database : Value  -> LEVEL 1

    Tables_Collection -> LEVEL 2

    {

    SchemaName : Value

    TableName : Value

    Columns_Collection -> LEVEL 3

    {

    ColumnName : Value

    }

    }

    ```


    Listing 8-19. Showing JSON structure


    The aliases in the `SELECT` clause build the structure demonstrated in Listing
    8-19. When converting the result to JSON, each period in the alias builds up an
    additional JSON object level. For example:


    ```json

    "Database": "WideWorldImporters", -> top LEVEL with alias ''Database''

    "Tables": {  -> Database key element child LEVEL with alias ''Tables.___''

    "SchemaName": "Purchasing",           -> details ''Tables.SchemaName''

    "TableName": "SupplierCategories", -> details ''Tables.TableName''

    "Columns": -> Tables child LEVEL with alias ''Tables.Columns.___''

    {

    "ColumnName": "SupplierCategoryID" -> details ''Tables.Columns.ColumnName''

    }

    }

    ```


    This way, the query from Listing 8-19 returns a valid JSON result set. However,
    there is one problem with the resulting output. The JSON object `Tables{}` is
    repeated for each column and makes the output bigger than we expected. Ideally,
    it would be more efficient to return the `Columns` section as an array instead
    of an object and list all columns inside the array. This way, the JSON structure
    will look slightly different. Listing 8-20 demonstrates JSON structure with the
    `Columns` section as an array, where the `ColumnName` key element and values are
    surrounded by square brackets `[]`.


    ```

    Database : Value  -> LEVEL 1

    Tables_Collection -> LEVEL 2

    {

    SchemaName : Value

    TableName : Value

    Columns_Collection -> LEVEL 3

    [

    {ColumnName : Value},{ColumnName : Value}, ...

    ]

    }

    ```


    Listing 8-20. Showing JSON structure with Columns section as an array


    To accomplish such a task, we need to encapsulate the column name list into an
    inline subquery with the `FOR JSON` clause and `AUTO` mode as shown in Listing
    8-21. However, for an inline subquery, both `AUTO` and `PATH` modes return the
    same result. The JSON output is demonstrated in Listing 8-22.


    ```sql

    SELECT db_name() as ''Database'',

    [Schema].name as ''Tables.SchemaName'',

    [Table].name as ''Tables.TableName'',

    (SELECT [Column].name as ColumnName FROM sys.columns [Column]

    WHERE [Column].object_id = [Table].object_id FOR JSON AUTO

    ) as ''Tables.Columns''

    FROM sys.objects [Table]

    JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

    WHERE type = ''u'' and [Table].name = ''SupplierCategories''

    FOR JSON PATH;

    ```


    Listing 8-21. Encapsulating the column names within array


    ```json

    [

    {

    "Database": "WideWorldImporters",

    "Tables": {

    "SchemaName": "Purchasing",

    "TableName": "SupplierCategories",

    "Columns": [

    {

    "ColumnName": "SupplierCategoryID"

    },

    {

    "ColumnName": "SupplierCategoryName"

    },

    {

    "ColumnName": "LastEditedBy"

    },

    {

    "ColumnName": "ValidFrom"

    },

    {

    "ColumnName": "ValidTo"

    }

    ]

    }

    }

    ]

    ```


    Listing 8-22. Showing JSON output with Columns array


    As you can see, the JSON output in Listing 8-22 is much smaller than the JSON
    in Listing 8-17, which was provided in the Solution section. I intentionally demonstrated
    two ways to create a JSON output. In some cases, you need object-oriented JSON
    as it is demonstrated in Listings 8-16 and 8-17, and in another case you need
    to create compact JSON with an array of values as demonstrated in Listings 8-21
    and 8-22.


    ## 8-6. Handling Escape Characters


    ### Problem


    You do not want to return an escape character `\` in the JSON output.


    ### Solution


    A `JSON_QUERY()` function eliminates escape characters in JSON output. Listing
    8-23 demonstrates how a `JSON_QUERY()` function “fixes” the JSON output for the
    column `InvoiceDate`, which holds JSON data. Listing 8-24 demonstrates the JSON
    output. To create table `CustomerInvoice`, run Listing 8-25 first.


    ```sql

    SELECT [CustomerName]

    ,[PrimaryContact]

    ,[AlternateContact]

    ,[PhoneNumber]

    ,JSON_QUERY(InvoiceDate) InvoiceDate

    FROM CustomerInvoice

    FOR JSON PATH;

    ```


    Listing 8-23. Showing `JSON_QUERY()` function with combination `FOR JSON` clause
    and `PATH` mode


    ```json

    [{

    "CustomerName":"Tailspin Toys (Head Office)",

    "PrimaryContact":"Waldemar Fisar",

    "AlternateContact":"Laimonis Berzins",

    "PhoneNumber":"(308) 555-0100",

    "InvoiceDate":{ "InvoiceDate":"03/04/2013"}

    },

    {

    "CustomerName":"Tailspin Toys (Head Office)",

    "PrimaryContact":"Waldemar Fisar",

    "AlternateContact":"Laimonis Berzins",

    "PhoneNumber":"(308) 555-0100",

    "InvoiceDate":{"InvoiceDate":"03/12/2013"}

    }]

    ```


    Listing 8-24. Showing fixed JSON output'
