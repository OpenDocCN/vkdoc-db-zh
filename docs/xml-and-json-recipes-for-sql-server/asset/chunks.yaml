    # 2. 构建 XML


    XML 在 SQL Server 中通过一种复杂的数据类型来表示，它拥有特殊的语法和定义明确的格式。当我们需要构建 XML 格式的输出或将现有的 XML 拆分（shred）成关系格式时，就可以使用它。在本章中，我将提供一些方法，用于基于一张或多张表的结果集来构建
    XML，并将结果格式化并呈现为 XML 输出。


    `FOR XML` 子句自 SQL Server 2000 引入以来，已经历了显著的发展，成为构建 XML 输出的综合解决方案。`FOR XML` 必须是
    `SELECT` 语句中的最后一个子句，并且当排序在查询中占有位置时，它必须出现在 `ORDER BY` 子句之后。


    `FOR XML` 子句有以下几种模式：


    *   `RAW` – 从一张或多张表中返回简单的 XML，其中每一行由一个 `<row>` 元素表示。默认生成属性中心（attribute-centric）的
    XML，这意味着行中每个非空列值都表示为 `<row>` 元素的属性。但是，如果您指定了 `ELEMENTS` 指令，则行中每个列表示为嵌套在 `<row>`
    元素内的一个元素。`RAW` 模式不支持嵌套元素结构。

    *   `AUTO` – 从一张或多张表中返回简单的 XML 结构。`AUTO` 模式类似于 `RAW` 模式，不同之处在于，当查询的 `FROM` 子句中连接了两个或更多表时，它支持嵌套元素。

    *   `EXPLICIT` – 允许您显式地构建 XML。`EXPLICIT` 模式在后台通过通用表格式访问 XML。这是一种定义明确的行集格式，与拆分后的
    XML 非常相似。使用 `EXPLICIT` 模式构建 XML 需要特定的语法来定义 XML 结果的“形状”；因此，这种模式使用起来可能很复杂。SQL Server
    2008 引入了 `PATH` 模式作为 `EXPLICIT` 模式的简化替代方案。

    *   `PATH` – 提供了一种更简单的方式来显式构建包含元素和属性混合的 XML。这是 `EXPLICIT` 模式的一个绝佳替代方案。


    当您指定 `FOR XML` 子句时，您还可以提供以下指令，这些指令控制 `FOR XML` 子句模式的格式化选项：


    *   `ELEMENTS` – 返回元素中心（element-centric）的 XML。默认结果是属性中心的，此选项仅适用于 `RAW`、`AUTO`
    和 `PATH` 模式。

    *   `BINARY BASE64` - 以 Base-64 编码格式检索二进制数据。

    *   `TYPE` - 将结果作为 XML 数据类型实例返回。

    *   `ROOT` – 为 XML 结果添加顶级（根）元素，这是“格式良好” XML 的要求。

    *   `XSINIL` - 当值为 `NULL` 时，在 XML 结果中返回元素名。该元素会带有一个设置为 "true" 的 `xsi:nil` 属性返回，如下所示：`<element
    xsi:nil = "true"/>`。

    *   `ABSENT` – 与 `XSINIL` 指令相反。`ABSENT` 指令是默认值。使用时，它指定应从 XML 结果中消除 `NULL` 值。

    *   `XMLSCHEMA` – 为 XML 结果添加一个内联的 W3C XML 架构 (XSD)。


    ## 修复“无法显示 XML”错误


    要在 SQL Server Management Studio (SSMS) 中查看查询的 XML 结果，您只需单击结果窗格中显示为超链接的 XML 结果。XML
    结果将在新的 SSMS XML 编辑器窗口中显示。但是，当我们处理非常大的结果集时，XML 可能会超过 XML 数据的默认限制（2 MB），并抛出带有“无法显示
    XML”消息的 `System.OutOfMemoryException`，如图 2-1 所示。


    ![A435478_1_En_2_Fig1_HTML.jpg](img/A435478_1_En_2_Fig1_HTML.jpg)


    图 2-1. “无法显示 XML”错误消息


    错误消息建议增加从服务器检索的 XML 数据字符数。如所述，此选项可在“工具”菜单的“选项”项中找到。XML 数据的默认最大值为 2 MB。要更改此设置，请转到菜单栏中的
    `工具`，然后在菜单上选择 `选项...`。进入“选项”对话框后，请执行以下操作：


    1.  展开 `查询结果`。

    2.  展开 `SQL Server`。

    3.  单击 `结果到网格`。

    4.  在右侧窗格中，使用下拉菜单更改 XML 数据的 `检索到的最大字符数`。可用设置为：1 MB、2 MB、5 MB 或 `无限制`。

    5.  单击 `确定` 保存您的设置。图 2-2 显示了“选项”对话框。


    ![A435478_1_En_2_Fig2_HTML.jpg](img/A435478_1_En_2_Fig2_HTML.jpg)


    图 2-2. 更改 XML 数据设置


    如果您只想更改当前查询的 XML 结果最大大小，而不希望永久保存 SSMS 设置，请单击 `查询` 菜单并选择 `查询选项...`。导航到 `结果` 下的
    `网格` 设置，并按照前面的方法更改 `检索到的最大字符数` XML 数据选项。


    ## 2-1. 将关系数据转换为简单 XML 格式


    ### 问题


    您希望将查询结果集转换为简单的 XML 格式。


    ### 解决方案


    SQL Server 提供了 `FOR XML` 子句，用于将查询结果格式化为 XML 数据。`RAW` 模式生成简单的 XML 格式。例如，代码清单 2-1
    展示了 `FOR XML` 子句中的 `RAW` 模式。


    ```sql

    SELECT Category.Name AS CategoryName,

    Subcategory.Name AS SubcategoryName,

    Product.Name,

    Product.ProductNumber AS Number,

    Product.ListPrice AS Price

    FROM  Production.Product Product

    INNER JOIN Production.ProductSubcategory Subcategory

    ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

    LEFT JOIN Production.ProductCategory Category

    ON Subcategory.ProductCategoryID = Category.ProductCategoryID

    WHERE Product.ListPrice > 0

    AND Product.SellEndDate IS NULL

    ORDER BY CategoryName, SubcategoryName

    FOR XML RAW;

    ```


    代码清单 2-1. 在 `FOR XML` 子句中演示 `RAW` 模式

    '
- fmt: "# How It Works\n\n`RAW` 模式将查询结果集中的每一行转换为一个简单的、结构化的 XML 元素。默认情况下，`RAW` 模式为每个数据行返回一个\
    \ `<row>` 元素，所有值都映射到与源 SQL 查询中相同的列名（或列别名，如果指定了）作为属性。这种 XML 结构通常被称为以属性为中心的 XML。清单\
    \ [2-2](#A435478_1_En_2_Chapter.html#Par28) 展示了 `RAW` 模式输出的示例。\n\n```\nListing\
    \ 2-2.\nSample RAW mode output\n```\n\n注意\n\n以属性为中心的 XML 有一个限制，它要求每个元素的属性名称必须是唯一的。因此，SQL\
    \ 查询必须为每一列提供一个唯一的名称，这与创建 SQL 视图时必须提供唯一列名的方式非常相似。然而，以元素为中心的 XML 则没有这个限制。\n\n在生产环境中，默认的\
    \ `<row>` 元素通常不适合或不适用于在 XML 数据中发送给客户端。为了将 `<row>` 元素替换为另一个在生成的 XML 数据中更友好、更符合业务逻辑的元素名称，`RAW`\
    \ 模式可以接受用户定义的元素名称（行标签名称）。您可以在 `FOR XML RAW` 子句后的括号中指定此行标签名称，例如：`FOR XML RAW('ElementName')`。清单\
    \ [2-3](#A435478_1_En_2_Chapter.html#Par31) 展示了如何将默认元素名称替换为用户定义的名称，清单 [2-4](#A435478_1_En_2_Chapter.html#Par32)\
    \ 展示了 XML 结果。\n\n```sql\nSELECT Category.Name AS CategoryName,\nSubcategory.Name\
    \ AS SubcategoryName,\nProduct.Name,\nProduct.ProductNumber AS Number,\nProduct.ListPrice\
    \ AS Price\nFROM  Production.Product Product\nINNER JOIN Production.ProductSubcategory\
    \ Subcategory\nON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\n\
    LEFT JOIN Production.ProductCategory Category\nON Subcategory.ProductCategoryID\
    \ = Category.ProductCategoryID\nWHERE Product.ListPrice > 0\nAND Product.SellEndDate\
    \ IS NULL\nORDER BY CategoryName, SubcategoryName\nFOR XML RAW('Product');\nListing\
    \ 2-3.\nDemonstrating the row tag name option of the FOR XML RAW clause\n```\n\
    \n```\nListing 2-4.\nResult of FOR XML RAW query with row tag name specified\n\
    ```\n\n# 2-2\\. Generating XML Data with Table Names as Element Names\n\n## Problem\n\
    \n您希望简单地从单表构建 XML 结果，其中 XML 结果中的元素名称指示源表。\n\n## Solution\n\n当源查询引用单个表时，`AUTO`\
    \ 模式在功能上与 `RAW` 模式非常相似。唯一的区别是，`AUTO` 模式使用源查询中指定的表名来命名表示每一行的元素。也就是说，当查询包含模式和表名时，例如\
    \ `Production.Product`，每个行元素将是 `<Production.Product>`。清单 [2-5](#A435478_1_En_2_Chapter.html#Par35)\
    \ 展示了针对单表的 `AUTO` 模式。\n\n```sql\nSELECT Product.Name,\nProduct.ProductNumber AS\
    \ Number,\nProduct.ListPrice AS Price\nFROM  Production.Product\nWHERE Product.ListPrice\
    \ > 0\nAND Product.SellEndDate IS NULL\nORDER BY Product.Name\nFOR XML AUTO;\n\
    Listing 2-5.\nBuilding XML with FOR XML AUTO for a single table\n```\n\n清单 [2-6](#A435478_1_En_2_Chapter.html#Par37)\
    \ 展示了此查询的 XML 结果。\n\n```\nListing 2-6.\nResults of FOR XML AUTO for a single table\n\
    ```\n\n注意\n\nW3C XML 标准允许在元素和属性名称中使用句点 (.)。\n\n与 `RAW` 模式不同，`AUTO` 模式不支持行标签名称选项。因此，您必须提供表别名来更改行标签元素名称。清单\
    \ [2-7](#A435478_1_En_2_Chapter.html#Par40) 展示了如何在 `AUTO` 模式下使用别名来更改元素名称。\n\n\
    ```sql\nSELECT Product.Name,\nProduct.ProductNumber AS Number,\nProduct.ListPrice\
    \ AS Price\nFROM  Production.Product AS Product\nWHERE Product.ListPrice > 0\n\
    AND Product.SellEndDate IS NULL\nORDER BY Product.Name\nFOR XML AUTO;\nListing\
    \ 2-7.\nChanging the element name by aliasing a table with FOR XML AUTO\n```\n\
    \n清单 [2-8](#A435478_1_En_2_Chapter.html#Par42) 展示了使用带别名的源表名执行 `FOR XML AUTO` 查询的\
    \ XML 结果。\n\n```\nListing 2-8.\nResult of single-table FOR XML AUTO query with\
    \ source table aliased\n```\n\n当 `FOR XML AUTO` 查询的源查询中连接两个或更多表时，XML 呈现不同的形状。XML\
    \ 结果会嵌套多层，每一层嵌套节点的名称按照 `FROM` 子句中表的命名顺序命名。如清单 [2-9](#A435478_1_En_2_Chapter.html#Par44)\
    \ 所示，基于三个表构建 XML。\n\n```sql\nSELECT Category.Name AS CategoryName,\nSubcategory.Name\
    \ AS SubcategoryName,\nProduct.Name,\nProduct.ProductNumber AS Number,\nProduct.ListPrice\
    \ AS Price,\nSellEndDate\nFROM  Production.Product Product\nINNER JOIN Production.ProductSubcategory\
    \ Subcategory\nON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\n\
    LEFT JOIN Production.ProductCategory Category\nON Subcategory.ProductCategoryID\
    \ = Category.ProductCategoryID\nWHERE Product.ListPrice > 0\nAND Product.SellEndDate\
    \ IS NULL\nORDER BY CategoryName, SubcategoryName\nFOR XML AUTO;\nListing 2-9.\n\
    Using the FOR XML AUTO clause to construct XML data with multiple joined tables\n\
    ```\n\n此查询的 XML 结果格式如下：\n\n1.  `<Category>` 是顶级元素。\n2.  `<Subcategory>` 是 `<Category>`\
    \ 元素的子元素。\n3.  `<Product>` 是 `<Subcategory>` 元素的子元素。\n\n应用于查询中多个连接表的 `FOR XML\
    \ AUTO` 模式的分层 XML 结果如图 [2-3](#A435478_1_En_2_Chapter.html#Fig3) 所示。\n\n![A435478_1_En_2_Fig3_HTML.jpg](A435478_1_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3.\n\n当 `FOR XML AUTO` 模式应用于查询中的多个连接表时的分层 XML 结果\n\n## How It Works\n\n\
    `AUTO` 模式提供了一种构建 XML 的简单方法。SQL 查询引擎分析您的查询结构，并使用查询中提供的名称构建层次结构来生成元素和属性名称——这就是此模式被称为“`AUTO`”的原因。如解决方案部分所示，当实施\
    \ `FOR XML AUTO` 时，SQL Server 引擎返回分层的 XML。\n\n# 2-3\\. Generating Element-Centric\
    \ XML\n\n## Problem\n\n`RAW` 和 `AUTO` 模式默认都返回以属性为中心的 XML。但是，当业务规则需要时，您希望生成以元素为中心的\
    \ XML 数据。\n\n## Solution\n\n带有 `ELEMENTS` 选项的 `FOR XML` 子句以以元素为中心的格式返回 XML 结果。清单\
    \ [2-10](#A435478_1_En_2_Chapter.html#Par53) 展示了如何向 `FOR XML AUTO` 子句添加 `ELEMENTS`\
    \ 指令。\n\n```sql\nSELECT Product.Name,\nProduct.ProductNumber AS Number,\nProduct.ListPrice\
    \ AS Price\nFROM  Production.Product AS Product\nWHERE Product.ListPrice > 0\n\
    AND Product.SellEndDate IS NULL\nORDER BY Product.Name\nFOR XML AUTO, ELEMENTS;\n\
    Listing 2-10.\nFOR XML AUTO query with ELEMENTS directive\n```\n\n带有 `ELEMENTS`\
    \ 指令的 `FOR XML AUTO` 查询的结果如清单 [2-11](#A435478_1_En_2_Chapter.html#Par55) 所示。\n\
    \n```xml\n<Product>\n  <Name>Chain</Name>\n  <Number>CH-0234</Number>\n  <Price>20.2400</Price>\n\
    </Product>\n<Product>\n  <Name>Classic Vest, L</Name>\n  <Number>VE-C304-L</Number>\n\
    \  <Price>63.5000</Price>\n</Product>\nListing 2-11.\nResults of FOR XML AUTO\
    \ query with ELEMENTS directive\n```\n\n## How It Works\n\n`ELEMENTS` 选项将您的 XML\
    \ 结果格式化，将列作为每个行元素的子元素进行嵌套。这种格式被称为以元素为中心的 XML。`ELEMENTS` 选项可以与 `FOR XML` 子句的 `RAW`、`AUTO`\
    \ 和 `PATH` 模式一起指定。`FOR XML EXPLICIT` 模式不支持 `ELEMENTS` 指令。\n\n`ELEMENTS` 指令必须与\
    \ `RAW`、`AUTO` 和 `PATH` 模式关键字用逗号分隔。例如：`FOR XML AUTO, ELEMENTS`。\n\n这个简单的更改允许您以以元素为中心的格式返回\
    \ XML，而不是默认的以属性为中心的格式。\n\n# 2-4\\. Adding a Root Element\n\n## Problem\n\n您希望为生成的\
    \ XML 添加一个根（顶级）元素。"
  raw: '### How It Works


    `RAW` mode converts each row from a query result set into a simple, structured
    XML element. By default, `RAW` mode returns a `<row>` element for each data row,
    and all values are mapped to attributes with the same column names (or column
    aliases, if specified) as the source SQL query. This XML structure is commonly
    referred to as attribute-centric XML. Listing [2-2](#A435478_1_En_2_Chapter.html#Par28)
    shows sample `RAW` mode output.


    ```


    Listing 2-2.

    Sample RAW mode output

    ```


    Caution


    Attribute-centric XML has a limitation, in that it requires unique attribute names
    to be mapped to each element. Therefore, the SQL query must provide a unique name
    for each column, in much the same way that you must provide unique column names
    when creating an SQL view. Element-centric XML, however, does not have this limitation.


    In a production environment, the default <row> element is generally not suitable
    or business applicable to send to a client in your XML data. To replace a `<row>`
    element with another element name that is friendlier and more business appropriate
    in your generated XML data, `RAW` mode can accept a user-defined element name
    (a row tag name). You can specify this row tag name in parentheses following the
    `FOR XML RAW` clause, like this: `FOR XML RAW(‘ElementName’)` . Listing [2-3](#A435478_1_En_2_Chapter.html#Par31)
    demonstrates how to replace the default element name with a user-defined name,
    and Listing [2-4](#A435478_1_En_2_Chapter.html#Par32) shows the XML result.


    ```

    SELECT Category.Name AS CategoryName,

    Subcategory.Name AS SubcategoryName,

    Product.Name,

    Product.ProductNumber AS Number,

    Product.ListPrice AS Price

    FROM  Production.Product Product

    INNER JOIN Production.ProductSubcategory Subcategory

    ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

    LEFT JOIN Production.ProductCategory Category

    ON Subcategory.ProductCategoryID = Category.ProductCategoryID

    WHERE Product.ListPrice > 0

    AND Product.SellEndDate IS NULL

    ORDER BY CategoryName, SubcategoryName

    FOR XML RAW(''Product'');

    Listing 2-3.

    Demonstrating the row tag name option of the FOR XML RAW clause

    ```


    ```


    Listing 2-4.

    Result of FOR XML RAW query with row tag name specified

    ```


    ## 2-2\. Generating XML Data with Table Names as Element Names


    ### Problem


    You would like to simply construct XML results from a Single Table with element
    names in the XML result that indicate the source table.


    ### Solution


    `AUTO` mode is very similar in functionality to `RAW` mode when the source query
    references a single table. The only difference is that `AUTO` mode names each
    element representing a row with the name of the table as specified in the source
    query. That is to say, when the query has a schema and table name, like Production.Product,
    each row element will be `<Production.Product>.` Listing [2-5](#A435478_1_En_2_Chapter.html#Par35)
    demonstrates `AUTO` mode for a single table.


    ```

    SELECT Product.Name,

    Product.ProductNumber AS Number,

    Product.ListPrice AS Price

    FROM  Production.Product

    WHERE Product.ListPrice > 0

    AND Product.SellEndDate IS NULL

    ORDER BY Product.Name

    FOR XML AUTO;

    Listing 2-5.

    Building XML with FOR XML AUTO for a single table

    ```


    Listing [2-6](#A435478_1_En_2_Chapter.html#Par37) shows the XML result of this
    query.


    ```


    Listing 2-6.

    Results of FOR XML AUTO for a single table

    ```


    Note


    The W3C XML standard allows the use of periods (.) in element and attribute names
    .


    `AUTO` mode, unlike `RAW` mode, does not support a row tag name option. Therefore,
    you must provide a table alias to change the row tag element name. Listing [2-7](#A435478_1_En_2_Chapter.html#Par40)
    demonstrates how to use an alias to change the element name in `AUTO` mode.


    ```

    SELECT Product.Name,

    Product.ProductNumber AS Number,

    Product.ListPrice AS Price

    FROM  Production.Product AS Product

    WHERE Product.ListPrice > 0

    AND Product.SellEndDate IS NULL

    ORDER BY Product.Name

    FOR XML AUTO;

    Listing 2-7.

    Changing the element name by aliasing a table with FOR XML AUTO

    ```


    Listing [2-8](#A435478_1_En_2_Chapter.html#Par42) shows the XML result of the
    `FOR XML AUTO` query with the aliased source table name.


    ```


    Listing 2-8.

    Result of single-table FOR XML AUTO query with source table aliased

    ```


    When two or more tables are joined in the source query of a `FOR XML AUTO` query,
    the XML takes a different shape. The XML result is nested multiple levels deep
    with each level of nested node named for the tables in the FROM clause in the
    order in which they are named. As shown in Listing [2-9](#A435478_1_En_2_Chapter.html#Par44),
    construct the XML based on three tables.


    ```

    SELECT Category.Name AS CategoryName,

    Subcategory.Name AS SubcategoryName,

    Product.Name,

    Product.ProductNumber AS Number,

    Product.ListPrice AS Price,

    SellEndDate

    FROM  Production.Product Product

    INNER JOIN Production.ProductSubcategory Subcategory

    ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

    LEFT JOIN Production.ProductCategory Category

    ON Subcategory.ProductCategoryID = Category.ProductCategoryID

    WHERE Product.ListPrice > 0

    AND Product.SellEndDate IS NULL

    ORDER BY CategoryName, SubcategoryName

    FOR XML AUTO;

    Listing 2-9.

    Using the FOR XML AUTO clause to construct XML data with multiple joined tables

    ```


    The XML result of this query is formatted as follows:


    1.  <Category> is the top-level element.  

    2.  <Subcategory> is a child of the <Category> element.  

    3.  <Product> is the child of the <Subcategory> element.  


    The hierarchical XML results of the `FOR XML AUTO` query with multiple joined
    tables is shown in Figure [2-3](#A435478_1_En_2_Chapter.html#Fig3).


    ![A435478_1_En_2_Fig3_HTML.jpg](A435478_1_En_2_Fig3_HTML.jpg)


    Figure 2-3.


    Hierarchical XML result when `FOR XML AUTO` mode is applied to multiple joined
    tables in a query


    ### How It Works


    AUTO mode provides an easy way to build XML. The SQL query engine analyzes your
    query structure and builds a hierarchy using the names provided in the query to
    generate element and attribute names — this is why this mode is called “`AUTO.`”
    As demonstrated in the Solution section, when `FOR XML AUTO` is implemented, the
    SQL Server engine returns hierarchical XML.


    ## 2-3\. Generating Element-Centric XML


    ### Problem


    Both `RAW` and `AUTO` modes return attribute-centric XML by default. However,
    you want to generate element-centric XML data when business rule requires it.


    ### Solution


    The `FOR XML` clause with the `ELEMENTS` option returns the XML result in element-centric
    format. Listing [2-10](#A435478_1_En_2_Chapter.html#Par53) shows how to add the
    `ELEMENTS` directive to the `FOR XML AUTO` clause.


    ```

    SELECT Product.Name,

    Product.ProductNumber AS Number,

    Product.ListPrice AS Price

    FROM  Production.Product AS Product

    WHERE Product.ListPrice > 0

    AND Product.SellEndDate IS NULL

    ORDER BY Product.Name

    FOR XML AUTO, ELEMENTS;

    Listing 2-10.

    FOR XML AUTO query with ELEMENTS directive

    ```


    The results of the `FOR XML AUTO` query with `ELEMENTS` directive is shown in
    Listing [2-11](#A435478_1_En_2_Chapter.html#Par55).


    ```

    Chain

    CH-0234

    20.2400


    Classic Vest, L

    VE-C304-L

    63.5000


    Listing 2-11.

    Results of FOR XML AUTO query with ELEMENTS directive

    ```


    ### How It Works


    The `ELEMENTS` option formats your XML result with columns nested as sub-elements
    of each row element. This format is known as element-centric XML. The `ELEMENTS`
    option can be specified with the `FOR XML` clause’s `RAW`, `AUTO`, and `PATH`
    modes. `FOR XML EXPLICIT` mode does not support the `ELEMENTS` directive.


    The `ELEMENTS` directive must be separated from the `RAW`, `AUTO`, and `PATH`
    mode keyword by a comma. For example: `FOR XML AUTO, ELEMENTS` .


    This simple change allows you to return the XML in an element-centric format instead
    of the default attribute-centric format .


    ## 2-4\. Adding a Root Element


    ### Problem


    You would like to add a root (top-level) element to your generated XML.'
