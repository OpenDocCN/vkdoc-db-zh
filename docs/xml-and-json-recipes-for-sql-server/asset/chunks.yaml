  trans: '### 解决方案


    选择性 XML 索引旨在为存储大型 XML 文档的 XML 列提升 XQuery 性能并优化 XML 索引存储。代码清单 7-16 创建了一个包含无类型 XML
    列的新示例表，使用示例 XML 数据填充它，并为其创建了一个选择性 XML 索引。图 7-9 展示了已创建的索引。


    ![A435478_1_En_7_Fig9_HTML.jpg](img/A435478_1_En_7_Fig9_HTML.jpg)

    图 7-9. 确认已为 ProductXML 表创建选择性 XML 索引


    ```sql

    -- 创建包含 XML 列和 XML 索引的表时，这些设置很重要

    SET NUMERIC_ROUNDABORT OFF;

    SET ARITHABORT ON;

    SET ANSI_NULLS ON;

    SET ANSI_PADDING ON;

    SET ANSI_WARNINGS ON;

    SET CONCAT_NULL_YIELDS_NULL ON;

    SET QUOTED_IDENTIFIER ON;

    GO

    -- 删除表（SQL Server 2016 语法）

    DROP TABLE IF EXISTS dbo.ProductXML

    -- 创建包含 XML 列的演示表

    CREATE TABLE dbo.ProductXML

    (

    ProductID INT NOT NULL,

    Name NVARCHAR(50) NOT NULL,

    ProductNumber NVARCHAR(25) NOT NULL,

    ProductDetails XML NULL

    CONSTRAINT PK_ProductXML_ProductID PRIMARY KEY CLUSTERED

    (

    ProductID ASC

    )

    );

    GO

    -- 使用示例 XML 数据填充表

    INSERT INTO dbo.ProductXML

    (

    ProductID,

    Name,

    ProductNumber,

    ProductDetails

    )

    SELECT Product2.ProductId,

    Product2.Name,

    Product2.ProductNumber,

    (

    SELECT ProductCategory.Name AS "Category/CategoryName",

    (

    SELECT DISTINCT Location.Name "text()", '', 成本率 $'',

    Location.CostRate "text()"

    FROM Production.ProductInventory Inventory

    INNER JOIN Production.Location Location

    ON Inventory.LocationID = Location.LocationID

    WHERE Product.ProductID = Inventory.ProductID

    FOR XML PATH(''LocationName''), TYPE

    ) AS "Locations/node()",

    Subcategory.Name AS "Category/Subcategory/SubcategoryName",

    Product.Name AS "Category/Subcategory/Product/ProductName",

    Product.Color AS "Category/Subcategory/Product/Color",

    Inventory.Shelf AS "Category/Subcategory/Product/ProductLocation/Shelf",

    Inventory.Bin AS "Category/Subcategory/Product/ProductLocation/Bin",

    Inventory.Quantity AS "Category/Subcategory/Product/ProductLocation/Quantity"

    FROM Production.Product Product

    LEFT JOIN Production.ProductInventory Inventory

    ON Product.ProductID = Inventory.ProductID

    LEFT JOIN Production.ProductSubcategory Subcategory

    ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

    LEFT JOIN Production.ProductCategory

    ON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID

    WHERE Product.ProductID = Product2.ProductId

    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name

    FOR XML PATH(''Categories''), ROOT(''Products''), ELEMENTS, TYPE

    )

    FROM Production.Product Product2;

    GO

    -- 创建选择性 XML 索引

    CREATE SELECTIVE XML INDEX IX_SELECTIVE_XML_ProductXML

    ON dbo.ProductXML

    (

    ProductDetails

    )

    FOR

    (

    Quantity = ''/Products/Categories/Category/Subcategory/Product/ProductLocation/Quantity'',

    ProductName = ''/Products/Categories/Category/Subcategory/Product/ProductName''

    );

    GO

    ```

    代码清单 7-16. 创建选择性 XML 索引'
- fmt: "## How It Works\n\nWhile the primary XML index shreds all your XML data into\
    \ a relational format, the selective XML index does not. A primary XML index can\
    \ utilize a lot of space and consume server resources for large XML instances.\
    \ The selective XML index acts against the values are specified in one or more\
    \ paths. This can make the selective XML much smaller than the primary XML index\
    \ in many cases. The syntax to create a selective XML index is more complex than\
    \ the syntax to create a primary XML index. For example, the selective XML index,\
    \ demonstrated in Listing [7-16](#A435478_1_En_7_Chapter.html#Par81), identifies\
    \ two XQuery paths in the FOR clause, pointing to two deeply nested element nodes;\
    \ namely:\n\n*   `Quantity`\n*   `ProductName`\n\nA selective XML index path must\
    \ be a fully qualified and complete path, i.e., no shortcuts are allowed for the\
    \ path. The index contains the nodes that are identified by the paths. Listing\
    \ [7-17](#A435478_1_En_7_Chapter.html#Par86) shows a sample XML fragment that\
    \ demonstrates the XML paths to the `Quantity` and `ProductName` element nodes\
    \ identified in the selective XML index paths.\n\n**Listing 7-17.** Sample XML\
    \ fragment from the previous example\n\n![A435478_1_En_7_Figa_HTML.gif](A435478_1_En_7_Figa_HTML.gif)\n\
    \nThe query from Listing [7-18](#A435478_1_En_7_Chapter.html#Par88) was run before\
    \ the selective XML index was created. The result is demonstrated in Figure [7-10](#A435478_1_En_7_Chapter.html#Fig10)\
    \ for time statistics, with the execution plan shown in Figure [7-11](#A435478_1_En_7_Chapter.html#Fig11).\n\
    \n![A435478_1_En_7_Fig11_HTML.jpg](A435478_1_En_7_Fig11_HTML.jpg)\n**Figure 7-11.**\
    \ Execution plan before the index is created\n\n![A435478_1_En_7_Fig10_HTML.jpg](A435478_1_En_7_Fig10_HTML.jpg)\n\
    **Figure 7-10.** Shows time statistics before the index created\n\n```sql\nSET\
    \ STATISTICS TIME ON;\nSELECT ProductID, Name, ProductNumber, ProductDetails\n\
    FROM dbo.ProductXML\nWHERE ProductDetails.exist('Products/Categories/Category/Subcategory/Product/ProductLocation/Quantity[.=\"\
    622\"]') = 1;\nSET STATISTICS TIME OFF;\n```\n**Listing 7-18.** Showing the demo\
    \ query\n\nAfter the index `IX_SELECTIVE_XML_ProductXML` was created, the query\
    \ from Listing [7-19](#A435478_1_En_7_Chapter.html#Par90) generates more efficient\
    \ runtime and execution plan, as shown in Figure [7-12](#A435478_1_En_7_Chapter.html#Fig12)\
    \ and Figure [7-13](#A435478_1_En_7_Chapter.html#Fig13).\n\n![A435478_1_En_7_Fig13_HTML.jpg](A435478_1_En_7_Fig13_HTML.jpg)\n\
    **Figure 7-13.** Shows an improvement in the execution plan after creation of\
    \ a selective XML index\n\n![A435478_1_En_7_Fig12_HTML.jpg](A435478_1_En_7_Fig12_HTML.jpg)\n\
    **Figure 7-12.** Shows improved time statistics\n\n```sql\nSET STATISTICS TIME\
    \ ON;\nSELECT ProductID, Name, ProductNumber, ProductDetails\nFROM dbo.ProductXML\n\
    WHERE ProductDetails.exist('Products/Categories/Category/Subcategory/Product/ProductLocation/Quantity[.=\"\
    622\"]') = 1;\n```\n**Listing 7-19.** Demo query run after selective XML index\
    \ is created\n\nThe syntax to create the `SELECTIVE XML` index on an XML column\
    \ without `XMLNAMESPACES` on the XML instances has following parts:\n\n```sql\n\
    CREATE SELECTIVE XML INDEX \nON \n()\nFOR ( Path_name1 = 'XML path',\nPath Name2\
    \ = 'XML path',\nPath Name3 = 'XML path')\n```\n\nWhen an XML column stores the\
    \ XML instances with `XMLNAMESPACES`, the `XMLNAMESPACE` must be declared within\
    \ the `CREATE SELECTIVE INDEX` statement. For example, if you want to improve\
    \ search on the `Resume` column of the `HumanResources.JobCandidate` table. Listing\
    \ [7-20](#A435478_1_En_7_Chapter.html#Par94) shows how to query an XML column\
    \ with a namespace.\n\n```sql\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/Resume'\
    \ as ns)\nSELECT JobCandidateID, Resume\nFROM HumanResources.JobCandidate\nWHERE\
    \ Resume.exist('/ns:Resume/ns:Name/ns:Name.First[.=\"Stephen\"]') = 1\n```\n**Listing\
    \ 7-20.** SQL code for searching for a job candidate\n\nListing [7-21](#A435478_1_En_7_Chapter.html#Par96)\
    \ demonstrates how to create a selective XML index on the `Resume` column of the\
    \ `HumanResources.JobCandidate` table. Figure [7-14](#A435478_1_En_7_Chapter.html#Fig14)\
    \ shows the SQL execution plan for the query in Listing [7-19](#A435478_1_En_7_Chapter.html#Par90)\
    \ after the selective XML index is created.\n\n![A435478_1_En_7_Fig14_HTML.jpg](A435478_1_En_7_Fig14_HTML.jpg)\n\
    **Figure 7-14.** Shows the SQL execution plan after the selective XML index is\
    \ created\n\n```sql\nCREATE SELECTIVE XML INDEX IX_SELECTIVE_XML_HumanResources_JobCandidate\n\
    ON [HumanResources].[JobCandidate]\n(\n[Resume]\n)\nWITH XMLNAMESPACES\n(\nDEFAULT\
    \ 'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/Resume'\n)\n\
    FOR\n(\nLastName = '/Resume/Name/Name.Last'\n,FirstName = '/Resume/Name/Name.First'\n\
    );\n```\n**Listing 7-21.** The `CREATE SELECTIVE XML INDEX` statement on a column\
    \ with `XMLNAMESPACE`\n\nThe syntax to create a select XML index on an XML column\
    \ with `XMLNAMESPACES` on the XML instances has the following parts:\n\n```sql\n\
    CREATE SELECTIVE XML INDEX \nON \n()\nWITH XMLNAMESPACES(DEFAULT 'XMLNAMESPACE\
    \ URI')\nFOR ( Path_Name1 = 'XML path',\nPath_Name2 = 'XML path',\nPath_Name3\
    \ = 'XML path')\n```\n\nThe advantage of creating a selective XML index is that\
    \ you can implement one or more XML paths to focus on the XML values that are\
    \ primarily used in your search criteria.\n\n> **Note**\n> Microsoft recommends\
    \ setting the preference to selective XML indexes first. However, if your selective\
    \ XML indexes are set with many paths mapped to them, the `PRIMARY` XML index\
    \ could be a better choice.\n\n### 7-6 Optimizing a Selective XML Index\n\n####\
    \ Problem\n\nYou want to optimize the performance of a selective XML index.\n\n\
    #### Solution\n\nImplementing the hints can optimize a selective XML index. Listing\
    \ [7-22](#A435478_1_En_7_Chapter.html#Par103) demonstrates different hints for\
    \ the selective XML index.\n\n```sql\nCREATE SELECTIVE XML INDEX IX_SELECTIVE_XML_ProductXML_Hint_Sample\n\
    ON dbo.ProductXML\n(\nProductDetails\n)\nFOR\n(\nSubcategoryName = '/Products/Categories/Category/Subcategory/SubcategoryName'\
    \ AS XQUERY 'node()',\nShelf = '/Products/Categories/Category/Subcategory/Product/ProductLocation/Shelf',\n\
    Bin = '/Products/Categories/Category/Subcategory/Product/ProductLocation/Bin'\
    \ AS XQUERY 'xs:double' SINGLETON,\nProductName = '/Products/Categories/Category/Subcategory/Product/ProductName'\
    \ AS SQL nvarchar(40),\nCategoryName = '/Products/Categories/Category/CategoryName'\
    \ AS XQUERY 'xs:string' MAXLENGTH(35)\n);\n```\n**Listing 7-22.** Testing different\
    \ hints for the selective XML index"
