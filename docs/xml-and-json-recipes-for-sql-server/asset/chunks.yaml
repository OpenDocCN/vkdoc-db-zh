    \  [Production].[ProductPhoto]\nFOR XML AUTO, ELEMENTS, BINARY BASE64;\n```\n\
    两个查询都将返回相同的结果。然而，当二进制数据是结果集的一部分时，我强烈建议对所有`FOR XML`模式包含`BINARY BASE64`指令。这是因为你需要检索实际的数据，而不是数据的引用，就像当主键列在`SELECT`子句中列出时可能发生的那样。\n\
    \n## 2-7. 生成嵌套的层次结构 XML 数据\n\n### 问题\n\n你希望将生成 XML 的子查询的结果嵌套到外部生成 XML 的查询中，以创建更复杂的层次结构\
    \ XML 数据。"
- fmt: "## 2-8. 构建自定义XML\n\n### 问题\n\n您希望对生成的XML格式进行细粒度控制。\n\n### 解决方案\n\n在之前的方案中，我们关注的是返回以元素为中心或以属性为中心的XML的\
    \ `RAW` 和 `AUTO` 模式，并根据源表和列名（或别名）自动生成名称。但如果您想对以元素为中心或以属性为中心的XML结果有更多控制呢？`EXPLICIT`\
    \ 模式让您能对XML结果有更多的控制。清单 [2-23](#A435478_1_En_2_Chapter.html#Par109) 展示了一个使用自定义结构生成XML结果的查询。\n\
    \n```\nSELECT 1                AS Tag,\n       0                AS Parent,\n \
    \      Prod.Name        AS [Categories!1!Category!ELEMENT],\n       NULL     \
    \        AS [Subcategories!2!Subcategory!ELEMENT],\n       NULL             AS\
    \ [Product!3!ProductName!ELEMENT],\n       NULL             AS [Product!3!Color!ELEMENTXSINIL],\n\
    \       NULL             AS [Product!3!Shelf],\n       NULL             AS [Product!3!Bin],\n\
    \       NULL             AS [Product!3!Quantity]\nFROM   Production.ProductCategory\
    \ Prod\nUNION ALL\nSELECT 2                AS Tag,\n       1                AS\
    \ Parent,\n       Category.Name,\n       Subcategory.Name,\n       NULL,\n   \
    \    NULL,\n       NULL,\n       NULL,\n       NULL\nFROM   Production.ProductCategory\
    \ Category\n       INNER JOIN Production.ProductSubcategory Subcategory\n    \
    \     ON Category.ProductCategoryID = Subcategory.ProductCategoryID\nUNION ALL\n\
    SELECT 3                AS Tag,\n       2                AS Parent,\n       ProductCategory.Name,\n\
    \       Subcategory.Name,\n       Product.Name,\n       Product.Color,\n     \
    \  Inventory.Shelf,\n       Inventory.Bin,\n       Inventory.Quantity\nFROM  \
    \ Production.Product Product\n       INNER JOIN Production.ProductInventory Inventory\n\
    \         ON Product.ProductID = Inventory.ProductID\n       INNER JOIN Production.ProductSubcategory\
    \ Subcategory\n         ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\n\
    \       INNER JOIN Production.ProductCategory\n         ON Subcategory.ProductCategoryID\
    \ = Production.ProductCategory.ProductCategoryID\nORDER  BY [Categories!1!Category!ELEMENT],\n\
    \          [Subcategories!2!Subcategory!ELEMENT],\n          [Product!3!ProductName!ELEMENT]\n\
    FOR XML EXPLICIT, ROOT('Products');\n清单 2-23.\n使用 EXPLICIT 模式控制XML结果的格式\n```\n\
    \n### 解决方案（续）\n\n您可能遇到需要通过SQL相关子查询生成分层XML的情况。例如，AdventureWorks数据库中的产品类别可以有多个相关的子类别。假设您想要生成一个列出所有产品类别的XML结果，每个类别内嵌其产品子类别。\n\
    \n您的第一个SQL查询可能如清单 [2-20](#A435478_1_En_2_Chapter.html#Par99) 所示。\n\n```\nSELECT\
    \ Category.Name AS CategoryName,\n(\n  SELECT Subcategory.Name AS SubcategoryName\n\
    \  FROM   Production.ProductSubcategory Subcategory\n  WHERE  Subcategory.ProductCategoryID\
    \ = Category.ProductCategoryID\n  FOR XML AUTO\n) Subcategory\nFROM   Production.ProductCategory\
    \ Category\nFOR XML AUTO, ROOT('Categories');\n清单 2-20.\n首次尝试使用相关子查询创建分层XML\n\
    ```\n\n此查询的结果在整个XML数据中生成了诸如 `&lt;` 和 `&gt;` 这样的XML实体，如图 [2-4](#A435478_1_En_2_Chapter.html#Fig4)\
    \ 所示，而不是预期的正确嵌套的XML元素。\n\n![A435478_1_En_2_Fig4_HTML.jpg](A435478_1_En_2_Fig4_HTML.jpg)\n\
    \n图 2-4.\n\n首次尝试创建分层XML数据的结果\n\n如何以XML格式返回查询？您需要正确的标签，而不是XML `&gt;` 和 `&lt;` 实体。\n\
    \n为了强制结果集以正确的XML格式返回，请将 `TYPE` 指令添加到您的 `FOR XML` 子句中。清单 [2-9](#A435478_1_En_2_Chapter.html#Par44)\
    \ 演示了此选项。清单 [2-21](#A435478_1_En_2_Chapter.html#Par103) 显示了生成的XML。\n\n```\nSELECT\
    \ Category.Name AS CategoryName,\n(\n  SELECT Subcategory.Name AS SubcategoryName\n\
    \  FROM   Production.ProductSubcategory Subcategory\n  WHERE  Subcategory.ProductCategoryID\
    \ = Category.ProductCategoryID\n  FOR XML AUTO, TYPE\n) Subcategory\nFROM   Production.ProductCategory\
    \ Category\nFOR XML AUTO, ELEMENTS, TYPE, ROOT('Categories');\n清单 2-21.\n实现 TYPE\
    \ 指令\n```\n\n这个添加了 `TYPE` 指令的更新查询的结果如清单 [2-22](#A435478_1_En_2_Chapter.html#Par105)\
    \ 所示。\n\n```\n\n...\n\n清单 2-22.\n使用嵌套子查询和 TYPE 指令生成的嵌套分层XML片段。\n```\n\n### 工作原理\n\
    \n默认情况下，`FOR XML` 子句返回 `nvarchar(max)` 数据类型的结果。子查询生成的XML作为字符数据返回，而不是所需的XML格式。当SQL\
    \ Server将XML数据转换为字符格式时，它会正确地对某些特殊字符进行实体编码，例如“`<`”和“`>`”字符（分别为 `&lt;` 和 `&gt;`）。`TYPE`\
    \ 指令强制SQL以正确的XML格式返回XML结果，而不对内容进行实体编码。`TYPE` 指令可以与所有 `FOR XML` 模式一起使用。"
  raw: '### Solution


    You might want run into a situation that requires generating hierarchical XML
    that can be generated via SQL correlated subqueries. As an example, a product
    category in the AdventureWorks database can have multiple related subcategories.
    Assume that you want to generate an XML result that lists all product categories,
    each with its product subcategories nested within it.


    Your first pass at a SQL query might look like Listing [2-20](#A435478_1_En_2_Chapter.html#Par99).


    ```

    SELECT Category.Name AS CategoryName,

    (

    SELECT Subcategory.Name AS SubcategoryName

    FROM Production.ProductSubcategory Subcategory

    WHERE Subcategory.ProductCategoryID = Category.ProductCategoryID

    FOR XML AUTO

    ) Subcategory

    FROM  Production.ProductCategory Category

    FOR XML AUTO, ROOT(''Categories'');

    Listing 2-20.

    First attempt at creating hierarchical XML with a correlated subquery

    ```


    The result of this query results in XML entities like `&lt;` and `&gt;` throughout
    your XML data, as shown in Figure [2-4](#A435478_1_En_2_Chapter.html#Fig4), instead
    of the expected properly nested XML elements. This is because the XML being generated
    in the correlated subquery is treated as a string data type instead of proper
    XML data.


    ![A435478_1_En_2_Fig4_HTML.jpg](A435478_1_En_2_Fig4_HTML.jpg)


    Figure 2-4.


    Results of first attempt at creating hierarchical XML data


    How can you return the query in XML format? You want proper tags, and not the
    XML &gt; and &lt; entities.


    To force the result set to be retuned in proper XML format, add the `TYPE` directive
    to your FOR XML clauses. Listing [2-9](#A435478_1_En_2_Chapter.html#Par44) demonstrates
    this option. Listing [2-21](#A435478_1_En_2_Chapter.html#Par103) shows the generated
    XML.


    ```

    SELECT Category.Name AS CategoryName,

    (

    SELECT Subcategory.Name AS SubcategoryName

    FROM Production.ProductSubcategory Subcategory

    WHERE Subcategory.ProductCategoryID = Category.ProductCategoryID

    FOR XML AUTO, TYPE

    ) Subcategory

    FROM  Production.ProductCategory Category

    FOR XML AUTO, ELEMENTS, TYPE, ROOT(''Categories'');

    Listing 2-21.

    Implementing the TYPE directive

    ```


    The results of this updated query with the `TYPE` directive is shown in Listing
    [2-22](#A435478_1_En_2_Chapter.html#Par105).


    ```


    ...


    Listing 2-22.

    Snippet of nested hierarchical XML generated with nested subquery and TYPE directive.

    ```


    ### How It Works


    By default, the `FOR XML` clause returns an `nvarchar(max)` data type result.
    The XML generated by the subquery is retuned as character data, instead of the
    required XML format. When SQL Server converts XML data to character format, it
    properly entitizes certain special characters, like the “`<`” and “`>`” characters
    (`&lt;` and `&gt;`, respectively.) The `TYPE` directive forces SQL to return the
    XML results in proper XML format, without entitizing the contents. The `TYPE`
    directive can be used with all `FOR XML` modes.


    ## 2-8\. Building Custom XML


    ### Problem


    You want fine-grained control to customize the format of your generated XML.


    ### Solution


    In previous recipes we focused on the `RAW` and `AUTO` modes that return either
    element-centric or attribute-centric XML, and automatically generate names based
    on the source table and column names (or aliases). But what if you want more control
    over your element-centric or attribute-centric XML results? `EXPLICIT` mode gives
    you more control over your XML result. Listing [2-23](#A435478_1_En_2_Chapter.html#Par109)
    demonstrates a query to generate your XML result with a custom-defined structure.


    ```

    SELECT 1                AS Tag,

    0               AS Parent,

    Prod.Name       AS [Categories!1!Category!ELEMENT],

    NULL            AS [Subcategories!2!Subcategory!ELEMENT],

    NULL            AS [Product!3!ProductName!ELEMENT],

    NULL            AS [Product!3!Color!ELEMENTXSINIL],

    NULL            AS [Product!3!Shelf],

    NULL            AS [Product!3!Bin],

    NULL            AS [Product!3!Quantity]

    FROM Production.ProductCategory Prod

    UNION ALL

    SELECT 2 AS Tag,

    1 AS Parent,

    Category.Name,

    Subcategory.Name,

    NULL,

    NULL,

    NULL,

    NULL,

    NULL

    FROM Production.ProductCategory Category

    INNER JOIN Production.ProductSubcategory Subcategory

    ON Category.ProductCategoryID = Subcategory.ProductCategoryID

    UNION ALL

    SELECT 3  AS Tag,

    2  AS Parent,

    ProductCategory.Name,

    Subcategory.Name,

    Product.Name,

    Product.Color,

    Inventory.Shelf,

    Inventory.Bin,

    Inventory.Quantity

    FROM Production.Product Product

    INNER JOIN Production.ProductInventory Inventory

    ON Product.ProductID = Inventory.ProductID

    INNER JOIN Production.ProductSubcategory Subcategory

    ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

    INNER JOIN Production.ProductCategory

    ON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID

    ORDER BY [Categories!1!Category!ELEMENT],

    [Subcategories!2!Subcategory!ELEMENT],

    [Product!3!ProductName!ELEMENT]

    FOR XML EXPLICIT, ROOT(''Products'');

    Listing 2-23.

    Using EXPLICIT mode to control the format of your XML result

    ```'
  trans: "\n## 2-8. 构建自定义 XML\n\n### 问题\n\n您希望对生成的 XML 格式进行细粒度控制。\n\n### 解决方案\n\n\
    在之前的方案中，我们关注的是返回以元素为中心或以属性为中心的 XML 的 `RAW` 和 `AUTO` 模式，并根据源表和列名（或别名）自动生成名称。但如果您想对以元素为中心或以属性为中心的\
