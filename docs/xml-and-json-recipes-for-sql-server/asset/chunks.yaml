  raw: '## JSON Introduction


    JSON is an acronym for “JavaScript Object Notation” and is pronounced “Jason.”
    It’s meant to be a more easily decipherable and compact solution to represent
    a complex data structure and facilitate data interchange between systems.


    When comparing JSON to XML, there are many benefits to choosing JSON:


    *   Unlike XML, JSON does not use a full markup structure, which makes it more
    compact.

    *   JSON is not a data type (at least for SQL Server 2016). SQL Server represents
    JSON as a string that is similar to nvarchar(max). Microsoft recommends storing
    JSON as an nvarchar(max).

    *   JSON is easy to parse and build.

    *   JSON data structure is easy to understand.

    *   JSON is the native file structure for NoSQL databases, such as CouchDB, MongoDB,
    and others .


    The JSON model format has two blocks :


    *   Objects - encapsulated within opening and closing brackets {}. An empty object
    {} is considered valid JSON data. Listing [8-1](#A435478_1_En_8_Chapter.html#Par12):
    TopObject is an object block.

    *   Arrays - encapsulated within opening and closing square brackets []. An empty
    array [] is also considered valid JSON data. Listing [8-1](#A435478_1_En_8_Chapter.html#Par12):
    ArrayOfObjects and arrayOfValues are array blocks.


    ```

    {

    "TopObject": {

    "numericKey": 2016,

    "stringKey": "a text value",

    "nullKey": null,

    "booleanKey": true,

    "dateKey": "2017-11-14"

    },

    "arrayOfObjects": [

    {"item": 1},

    {"item": 2},

    {"item": 3}

    ] ,

    "arrayOfValues": [

    "SQL",

    "XML",

    "JSON"

    ]

    }

    Listing 8-1.

    Demonstrating JSON structure

    ```


    A JSON member is represented by a key-value pair {“key”: “value”}. The key of
    a member should be contained in double quotes. A key must be unique within the
    structure of an object. String type and date type values of a member are required
    to be contained in double quotes. Boolean and numeric values should not be contained
    within double quotes. However, when Boolean values use true or false literals,
    those values should be in lowercase. Table [8-1](#A435478_1_En_8_Chapter.html#Tab1)
    demonstrates data type conversion between SQL Server data types and JSON.


    Numbers with leading zeroes are considered strings. Therefore, they are required
    to be contained within double quotes. Each member of an object and each array
    value must be followed by a comma, except the last key-value pair.


    Table 8-1.


    Showing data type conversion from SQL Server to JSON


    | Category | SQL type | JSON type |

    | --- | --- | --- |

    | `Character and string types` | `nvarchar, varchar, nchar, char` | `string` |

    | `Numeric types` | `int, bigint, float, decimal, numeric` | `number` |

    | `Bit type` | `bit` | `Boolean (true or false)` |

    | `Date and time types` | `date, datetime, datetime2, time, datetimeoffset` |
    `string` |

    | `CLR types` | `geometry, geography (except hierarchyid)` | `Not supported. These
    types return an error. Cast or convert the data to a supported JSON type, or use
    a CLR property or method in the SELECT list – for example, ToString() for any
    CLR type, or STAsText() for the geometry type. Data type hierarchyid does not
    require explicit conversion.` |

    | `Other` `types` | `uniqueidentifier, money, varbinary, binary, timestamp, rowversion`
    | `string` |


    A side-by-side comparison of XML and JSON data and parsing methods is demonstrated
    in Table [8-2](#A435478_1_En_8_Chapter.html#Tab2).


    Table 8-2.


    Comparing XML and JSON


    | XML Sample | JSON Sample |

    | --- | --- |

    | `<employees>` `<employee>` `<firstName>Bill</firstName>` `<lastName>Adams</lastName>`
    `</employee>` `<employee>` `<firstName>John</firstName>` `<lastName>Smith</lastName>`
    `</employee>` `<employee>` `<firstName>Peter</firstName>` `<lastName>White</lastName>`
    `</employee>` `</employees>` | `{"employees":` `[` `{"firstName":"Bill", "lastName":"Adams"},`
    `{"firstName":"John", "lastName":"Smith"},` `{"firstName":"Peter", "lastName":"White"}`
    `]` `}` |

    | `XML Parsing` `Method` | `JSON Parsing Method` |

    | `Declare @x XML =` `''<employees>` `<employee>` `<firstName>Bill</firstName>`
    `<lastName>Adams</lastName>` `</employee>` `<employee>` `<firstName>John</firstName>`
    `<lastName>Smith</lastName>` `</employee>` `<employee>` `<firstName>Peter</firstName>`
    `<lastName>White</lastName>` `</employee>` `</employees>'';` `SELECT` `c.value(''firstName[1]'',
    ''varchar(30)'')  AS firstName` `,c.value(''lastName[1]'', ''varchar(30)'') AS
    lastName` `FROM @x.nodes(''//employee'') t(c);` | `declare @j nvarchar(max) =`
    `''{"employees":` `[` `{"firstName":"Bill", "lastName":"Adams"},` `{"firstName":"John",
    "lastName":"Smith"},` `{"firstName":"Peter", "lastName":"White"}` `]` `}'';` `SELECT
    firstName, lastName` `FROM OPENJSON (@j, ''$.employees'')` `WITH` `(` `firstName
    varchar(30),` `lastName varchar(30)` `);` |

    | `XML Result` | `JSON Result` |

    | ![A435478_1_En_8_Figa_HTML.jpg](A435478_1_En_8_Figa_HTML.jpg) | ![A435478_1_En_8_Figb_HTML.jpg](A435478_1_En_8_Figb_HTML.jpg)
    |


    SQL Server provides four built-in functions and the FOR JSON clause of SELECT
    queries to process and create JSON documents, as shown in Table [8-3](#A435478_1_En_8_Chapter.html#Tab3).


    Unlike XML methods, JSON functions are not key sensitive. However, key members
    remain key sensitive when referenced in JSON functions as well as the ToString()
    and STAsText() CLR functions.


    Table 8-3.


    Describing JSON built-in functions


    | JSON Procedure | Procedure Type | Description |

    | --- | --- | --- |

    | FOR JSON | Clause | Builds a JSON document. |

    | ISJSON() | Function | Verifies whether a string has a valid JSON. |

    | JSON_VALUE() | Function | Retrieves a scalar value from a JSON document. |

    | JSON_QUERY() | Function | Retrieves an object or an array from a JSON document.
    |

    | JSON_MODIFY() | Function | Modifies a JSON document. |

    | OPENJSON() | Table-valued function | Converts a JSON document into a table format
    that contains rows and columns. |


    Part II of this book provides JSON recipes for SQL Server.


    ## 8-1\. Building JSON with AUTO Mode


    ### Problem


    You want to build a JSON-formatted result automatically.


    ### Solution


    The FOR JSON clause in AUTO mode returns JSON-formatted rows. Listing [8-2](#A435478_1_En_8_Chapter.html#Par21)
    demonstrates a FOR JSON clause with AUTO mode from a single object. Figure [8-1](#A435478_1_En_8_Chapter.html#Fig1)
    shows a JSON returned row. Listing [8-3](#A435478_1_En_8_Chapter.html#Par22) demonstrates
    a formatted JSON from the query result.


    ![A435478_1_En_8_Fig1_HTML.jpg](A435478_1_En_8_Fig1_HTML.jpg)


    Figure 8-1.


    Showing JSON result in a grid


    ```

    SELECT TOP (2) CustomerName

    ,PrimaryContact

    ,AlternateContact

    ,PhoneNumber

    FROM WideWorldImporters.Website.Customers

    FOR JSON AUTO;

    Listing 8-2.

    Showing

    ```


    ```

    [

    {

    "CustomerName":"Tailspin Toys (Head Office)",

    "PrimaryContact":"Waldemar Fisar",

    "AlternateContact":"Laimonis Berzins",

    "PhoneNumber":"(308) 555-0100"

    },

    {

    "CustomerName":"Tailspin Toys (Sylvanite, MT)",

    "PrimaryContact":"Lorena Cindric",

    "AlternateContact":"Hung Van Groesen",

    "PhoneNumber":"(406) 555-0100"

    }

    ]

    Listing 8-3.

    Showing formatted JSON result

    ```'
  trans: '

    # JSON 简介


    JSON 是 "JavaScript Object Notation" 的首字母缩写，发音为 "Jason"。它旨在成为一种更易于解读和紧凑的解决方案，用于表示复杂的数据结构并促进系统间的数据交换。


    将 JSON 与 XML 比较时，选择 JSON 有许多优势：


    *   与 XML 不同，JSON 不使用完整的标记结构，这使其更紧凑。

    *   JSON 不是一种数据类型（至少对于 SQL Server 2016 而言）。SQL Server 将 JSON 表示为类似于 `nvarchar(max)`
    的字符串。Microsoft 建议将 JSON 存储为 `nvarchar(max)`。

    *   JSON 易于解析和构建。

    *   JSON 数据结构易于理解。

    *   JSON 是 NoSQL 数据库（如 CouchDB、MongoDB 等）的原生文件结构。


    JSON 模型格式有两个块：


    *   对象（Objects） - 用大括号 `{}` 包裹。一个空对象 `{}` 被视为有效的 JSON 数据。列表 8-1：`TopObject` 是一个对象块。

    *   数组（Arrays） - 用方括号 `[]` 包裹。一个空数组 `[]` 也被视为有效的 JSON 数据。列表 8-1：`arrayOfObjects`
    和 `arrayOfValues` 是数组块。


    ```

    {

    "TopObject": {

    "numericKey": 2016,

    "stringKey": "a text value",

    "nullKey": null,

    "booleanKey": true,

    "dateKey": "2017-11-14"

    },

    "arrayOfObjects": [

    {"item": 1},

    {"item": 2},

    {"item": 3}

    ] ,

    "arrayOfValues": [

    "SQL",

    "XML",

    "JSON"

    ]

    }

    清单 8-1.

    展示 JSON 结构

    ```


    一个 JSON 成员由一个键值对 `{"key": "value"}` 表示。成员的键必须包含在双引号内。键在对象的结构中必须是唯一的。成员的字符串类型和日期类型值需要包含在双引号内。布尔值和数值不应包含在双引号内。但是，当布尔值使用
    `true` 或 `false` 字面量时，这些值应为小写。表 8-1 演示了 SQL Server 数据类型与 JSON 之间的数据类型转换。


    带有前导零的数字被视为字符串。因此，它们必须包含在双引号内。对象的每个成员和数组的每个值后面都必须跟一个逗号，但最后一个键值对除外。


    表 8-1.


    展示从 SQL Server 到 JSON 的数据类型转换


    | 类别 | SQL 类型 | JSON 类型 |

    | --- | --- | --- |

    | `字符和字符串类型` | `nvarchar, varchar, nchar, char` | `string` |

    | `数值类型` | `int, bigint, float, decimal, numeric` | `number` |

    | `位类型` | `bit` | `Boolean (true or false)` |

    | `日期和时间类型` | `date, datetime, datetime2, time, datetimeoffset` | `string` |

    | `CLR 类型` | `geometry, geography (except hierarchyid)` | `不支持。这些类型会返回错误。将数据转换或转换为受支持的
    JSON 类型，或在 SELECT 列表中使用 CLR 属性或方法 – 例如，任何 CLR 类型的 `ToString()`，或 `geometry` 类型的
    `STAsText()`。数据类型 `hierarchyid` 不需要显式转换。` |

    | `其他类型` | `uniqueidentifier, money, varbinary, binary, timestamp, rowversion`
    | `string` |


    表 8-2 展示了 XML 和 JSON 数据及其解析方法的并排比较。


    表 8-2.


    比较 XML 和 JSON


    | XML 示例 | JSON 示例 |

    | --- | --- |

    | `<employees>` `<employee>` `<firstName>Bill</firstName>` `<lastName>Adams</lastName>`
    `</employee>` `<employee>` `<firstName>John</firstName>` `<lastName>Smith</lastName>`
    `</employee>` `<employee>` `<firstName>Peter</firstName>` `<lastName>White</lastName>`
    `</employee>` `</employees>` | `{"employees":` `[` `{"firstName":"Bill", "lastName":"Adams"},`
    `{"firstName":"John", "lastName":"Smith"},` `{"firstName":"Peter", "lastName":"White"}`
    `]` `}` |

    | `XML 解析方法` | `JSON 解析方法` |

    | `Declare @x XML =` `''<employees>` `<employee>` `<firstName>Bill</firstName>`
    `<lastName>Adams</lastName>` `</employee>` `<employee>` `<firstName>John</firstName>`
    `<lastName>Smith</lastName>` `</employee>` `<employee>` `<firstName>Peter</firstName>`
    `<lastName>White</lastName>` `</employee>` `</employees>'';` `SELECT` `c.value(''firstName[1]'',
    ''varchar(30)'')  AS firstName` `,c.value(''lastName[1]'', ''varchar(30)'') AS
    lastName` `FROM @x.nodes(''//employee'') t(c);` | `declare @j nvarchar(max) =`
    `''{"employees":` `[` `{"firstName":"Bill", "lastName":"Adams"},` `{"firstName":"John",
    "lastName":"Smith"},` `{"firstName":"Peter", "lastName":"White"}` `]` `}'';` `SELECT
    firstName, lastName` `FROM OPENJSON (@j, ''$.employees'')` `WITH` `(` `firstName
    varchar(30),` `lastName varchar(30)` `);` |

    | `XML 结果` | `JSON 结果` |

    | ![A435478_1_En_8_Figa_HTML.jpg](img/A435478_1_En_8_Figa_HTML.jpg) | ![A435478_1_En_8_Figb_HTML.jpg](img/A435478_1_En_8_Figb_HTML.jpg)
    |


    SQL Server 提供了四个内置函数和 `SELECT` 查询的 `FOR JSON` 子句来处理和创建 JSON 文档，如表 8-3 所示。


    与 XML 方法不同，JSON 函数不区分键（key）。但是，当在 JSON 函数以及 `ToString()` 和 `STAsText()` CLR 函数中引用时，键成员仍然是区分大小写的。


    表 8-3.


    描述 JSON 内置函数


    | JSON 过程 | 过程类型 | 描述 |

    | --- | --- | --- |

    | `FOR JSON` | 子句 | 构建 JSON 文档。 |

    | `ISJSON()` | 函数 | 验证字符串是否具有有效的 JSON。 |

    | `JSON_VALUE()` | 函数 | 从 JSON 文档中检索标量值。 |

    | `JSON_QUERY()` | 函数 | 从 JSON 文档中检索对象或数组。 |

    | `JSON_MODIFY()` | 函数 | 修改 JSON 文档。 |

    | `OPENJSON()` | 表值函数 | 将 JSON 文档转换为包含行和列的表格式。 |


    本书第二部分提供了适用于 SQL Server 的 JSON 食谱。


    ## 8-1. 使用 AUTO 模式构建 JSON


    ### 问题


    你想要自动构建 JSON 格式的结果。


    ### 解决方案


    `FOR JSON` 子句的 `AUTO` 模式返回 JSON 格式的行。清单 8-2 展示了一个来自单个对象的 `FOR JSON` 子句的 `AUTO`
    模式。图 8-1 显示了一个返回的 JSON 行。清单 8-3 展示了来自查询结果的格式化 JSON。


    ![A435478_1_En_8_Fig1_HTML.jpg](img/A435478_1_En_8_Fig1_HTML.jpg)


    图 8-1.


    在网格中显示 JSON 结果


    ```

    SELECT TOP (2) CustomerName

    ,PrimaryContact

    ,AlternateContact

    ,PhoneNumber

    FROM WideWorldImporters.Website.Customers

    FOR JSON AUTO;

    清单 8-2.

    显示

    ```


    ```

    [

    {

    "CustomerName":"Tailspin Toys (Head Office)",

    "PrimaryContact":"Waldemar Fisar",

    "AlternateContact":"Laimonis Berzins",

    "PhoneNumber":"(308) 555-0100"

    },

    {

    "CustomerName":"Tailspin Toys (Sylvanite, MT)",

    "PrimaryContact":"Lorena Cindric",

    "AlternateContact":"Hung Van Groesen",

    "PhoneNumber":"(406) 555-0100"

    }

    ]

    清单 8-3.

    显示格式化的 JSON 结果

    ```

    '
- fmt: '### How It Works


    `FOR JSON`子句在`AUTO`模式下将输出格式化为JSON结果集。`AUTO`模式会根据`FROM`和`SELECT`子句中实现的表（或多张表）自动确定JSON格式。清单[8-3](#A435478_1_En_8_Chapter.html#Par22)返回简单的JSON输出，因为其结果基于单一的`Website.Customers`表。默认情况下，结果在SSMS网格中显示为超链接。用户点击结果时，JSON会在XML编辑器中打开。然而，结果将以未格式化的单行字符串形式加载。图[8-2](#A435478_1_En_8_Chapter.html#Fig2)展示了在XML编辑器中未格式化的结果。


    ![A435478_1_En_8_Fig2_HTML.jpg](A435478_1_En_8_Fig2_HTML.jpg)


    图 8-2.


    在XML编辑器中显示JSON结果


    因此，较小的JSON结果可以手动格式化，如清单[8-3](#A435478_1_En_8_Chapter.html#Par22)所示。然而，对于较大的JSON，手动格式化可能需要花费大量时间来完成此任务。


    有几个网站提供验证JSON并将未格式化的JSON值转换为格式化JSON数据的功能。我偏好的JSON格式化工具之一是JSONFormatter，其URL如下：[`https://jsonformatter.curiousconcept.com/`](https://jsonformatter.curiousconcept.com/)。该程序易于操作：


    ![A435478_1_En_8_Fig4_HTML.jpg](A435478_1_En_8_Fig4_HTML.jpg)


    图 8-4.


    显示格式化JSON数据窗口


    ![A435478_1_En_8_Fig3_HTML.jpg](A435478_1_En_8_Fig3_HTML.jpg)


    图 8-3.


    显示JSONFormatter界面


    1.  从XML编辑器获取JSON结果。

    2.  粘贴到JSONFormatter验证窗口中，如图[8-3](#A435478_1_En_8_Chapter.html#Fig3)所示。

    3.  点击`Process`按钮。

    4.  有效的JSON将显示在格式化JSON数据窗口中，如图[8-4](#A435478_1_En_8_Chapter.html#Fig4)所示。


    注意


    作为JSONFormatter的替代方案，JSON Editor Online是另一个格式化应用程序；URL：[`http://www.jsoneditoronline.org/`](http://www.jsoneditoronline.org/)。我更喜欢JSONFormatter，因为该应用程序会保留所有提交的JSON代码。因此，当我需要回溯到某些结果时，无需重新提交JSON代码。


    当在`FROM`子句中处理多个表以返回JSON数据时，必须记住表和列别名会影响JSON输出。例如，清单[8-4](#A435478_1_En_8_Chapter.html#Par32)演示了使用未为表和列设置别名的查询构建的JSON。对于此类`db_name()`函数，只会创建一个数据库别名。清单[8-5](#A435478_1_En_8_Chapter.html#Par33)在JSON输出中显示了查询结果。


    ```

    SELECT db_name() as [Database],

    sys.schemas.name,

    sys.objects.name,

    sys.columns.name

    FROM sys.objects

    JOIN sys.schemas on sys.objects.schema_id = sys.schemas.schema_id

    JOIN sys.columns ON sys.columns.object_id = sys.objects.object_id

    JOIN ( SELECT TOP (1) o.object_id, count(c.name) [name]

    FROM sys.columns c

    JOIN sys.objects o ON c.object_id = o.object_id WHERE type = ''u''

    GROUP BY o.object_id HAVING COUNT(c.name) < 6

    )  countCol

    ON countCol.object_id = sys.objects.object_id

    WHERE type = ''u''

    FOR JSON AUTO;

    Listing 8-4.

    显示使用原始表名的SQL

    ```


    ```

    {   "Database":"WideWorldImporters",

    "name":"Purchasing",

    "sys.objects":[

    {   "name":"SupplierCategories",

    "sys.columns":[

    {

    "name":"SupplierCategoryID"

    },

    {

    "name":"SupplierCategoryName"

    },

    {

    "name":"LastEditedBy"

    },

    {

    "name":"ValidFrom"

    },

    {

    "name":"ValidTo"

    }

    ]

    }

    ]

    }

    Listing 8-5.

    显示JSON输出

    ```


    清单[8-6](#A435478_1_En_8_Chapter.html#Par35)演示了使用带有别名的表的查询构建的JSON。清单[8-7](#A435478_1_En_8_Chapter.html#Par36)在JSON输出中显示了查询结果。


    ```

    SELECT db_name() as [Database],

    [Schema].name as [SchemaName],

    [Table].name  as [TableName],

    [Column].name as [ColumnName]

    FROM sys.objects [Table]

    JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

    JOIN sys.columns [Column] ON [Column].object_id = [Table].object_id

    JOIN ( SELECT TOP (1) o.object_id, COUNT(c.name) [name]

    FROM sys.columns c JOIN sys.objects o

    ON c.object_id = o.object_id where type = ''u''

    GROUP BY o.object_id HAVING COUNT(c.name) < 6)  countCol

    ON countCol.object_id = [Table].object_id

    WHERE type = ''u''

    FOR JSON AUTO;

    Listing 8-6.

    显示使用了表别名的SQL

    ```


    ```

    {   "Database":"WideWorldImporters",

    "SchemaName":"Purchasing",

    "Table":[

    {   "TableName":"SupplierCategories",

    "Column":[

    {

    "ColumnName":"SupplierCategoryID"

    },

    {

    "ColumnName":"SupplierCategoryName"

    },

    {

    "ColumnName":"LastEditedBy"

    },

    {

    "ColumnName":"ValidFrom"

    },

    {

    "ColumnName":"ValidTo"

    }

    ]

    }

    ]

    }

    Listing 8-7.

    显示JSON输出

    ```


    将清单[8-5](#A435478_1_En_8_Chapter.html#Par33)和[8-7](#A435478_1_En_8_Chapter.html#Par36)中的JSON进行比较，可以看到清单[8-7](#A435478_1_En_8_Chapter.html#Par36)比清单[8-5](#A435478_1_En_8_Chapter.html#Par33)更具描述性，例如，“`sys.objects`”与“`Table`”。


    ## 8-2\. 处理JSON构建时的NULL值


    ### 问题


    当值为`NULL`时，你希望保留键元素名称。


    ### 解决方案


    `FOR JSON`子句中的`INCLUDE_NULL_VALUES`选项指定当列为`NULL`值时，JSON输出中必须呈现一个JSON键元素。清单[8-8](#A435478_1_En_8_Chapter.html#Par40)演示了一个带有`INCLUDE_NULL_VALUES`选项的`FOR
    JSON`子句。清单[8-9](#A435478_1_En_8_Chapter.html#Par41)显示了查询生成的JSON输出。


    ```

    USE [WideWorldImporters];

    SELECT TOP (1) [CustomerName]

    ,[PrimaryContact]

    ,[AlternateContact]

    ,[PhoneNumber]

    FROM [Website].[Customers] where [AlternateContact] IS NOT NULL

    UNION ALL

    SELECT TOP (1) [CustomerName]

    ,[PrimaryContact]

    ,[AlternateContact]

    ,[PhoneNumber]

    FROM [Website].[Customers] where [AlternateContact] IS NULL

    FOR JSON AUTO, INCLUDE_NULL_VALUES;

    Listing 8-8.

    带有INCLUDE_NULL_VALUES选项的FOR JSON子句

    ```


    ```

    [  {

    "CustomerName":"Tailspin Toys (Head Office)",

    "PrimaryContact":"Waldemar Fisar",

    "AlternateContact":"Laimonis Berzins",

    "PhoneNumber":"(308) 555-0100"

    },

    {

    "CustomerName":"Eric Torres",

    "PrimaryContact":"Eric Torres",

    "AlternateContact":null,

    "PhoneNumber":"(307) 555-0100"

    }

    ]

    Listing 8-9.

    显示返回的JSON

    ```


    ### 工作原理


    默认情况下，`FOR JSON`子句会忽略具有默认值的元素。因此，JSON输出中将缺少关键元素。例如，当执行清单[8-8](#A435478_1_En_8_Chapter.html#Par40)中所示但没有`INCLUDE_NULL_VALUES`选项的查询时，`"AlternateContact"`将在JSON输出的第二部分中缺失。清单[8-10](#A435478_1_En_8_Chapter.html#Par43)演示了查询和返回的JSON输出。


    ```

    SELECT TOP (1) [CustomerName]

    ,[PrimaryContact]

    ,[AlternateContact]

    ,[PhoneNumber]

    FROM [Website].[Customers] where [AlternateContact] IS NOT NULL

    UNION ALL

    SELECT TOP (1) [CustomerName]

    ,[PrimaryContact]

    ,[AlternateContact]

    ,[PhoneNumber]

    FROM [Website].[Customers] where [AlternateContact] IS NULL

    FOR JSON AUTO ;

    [

    {

    "CustomerName":"Tailspin Toys (Head Office)",

    "PrimaryContact":"Waldemar Fisar",

    "AlternateContact":"Laimonis Berzins",

    "PhoneNumber":"(308) 555-0100"

    },

    {

    "CustomerName":"Eric Torres",

    "PrimaryContact":"Eric Torres",

    "PhoneNumber":"(307) 555-0100"

    }

    ]

    Listing 8-10.

    显示查询和JSON输出

    ```


    ## 8-3\. 转义JSON输出的方括号


    ### 问题


    你想移除包围JSON输出的方括号。'
  raw: '### How It Works


    The FOR JSON clause in AUTO mode formats the output into a JSON result set. AUTO
    mode automatically determines the JSON format based on the table (or tables) implemented
    in the FROM and SELECT clauses. Listing [8-3](#A435478_1_En_8_Chapter.html#Par22)
    returns simple JSON output because of the result based on the single Website.Customers
    table. The result, by default, is displayed in the SSMS grid as a hyperlink. When
    the user clicks on the result, JSON opens it in the XML Editor. However, the result
    will load as an unformatted single-line string. Figure [8-2](#A435478_1_En_8_Chapter.html#Fig2)
    demonstrates the unformatted result in the XML Editor.


    ![A435478_1_En_8_Fig2_HTML.jpg](A435478_1_En_8_Fig2_HTML.jpg)


    Figure 8-2.


    Showing JSON result in the XML Editor


    Therefore, a small JSON result could be formatted manually, as shown in Listing
    [8-3](#A435478_1_En_8_Chapter.html#Par22). However, for a bigger JSON, manual
    formatting could take an enormous time to complete such a task.


    There are several websites offering the capability to validate and convert a JSON
    unformatted value into formatted JSON data. One of my preferred JSON formatting
    tools is JSONFormatter, and the URL is the following: [`https://jsonformatter.curiousconcept.com/`](https://jsonformatter.curiousconcept.com/)
    . This program is easy to operate:


    ![A435478_1_En_8_Fig4_HTML.jpg](A435478_1_En_8_Fig4_HTML.jpg)


    Figure 8-4.


    Showing Formatted JSON Data window


    ![A435478_1_En_8_Fig3_HTML.jpg](A435478_1_En_8_Fig3_HTML.jpg)


    Figure 8-3.


    Showing JSONFormatter interface


    1.  JSON result from XML Editor.  

    2.  Paste into JSONFormatter validation window, shown in Figure [8-3](#A435478_1_En_8_Chapter.html#Fig3).
     

    3.  Click Process button.  

    4.  Valid JSON displays in the Formatted JSON Data window, shown in Figure [8-4](#A435478_1_En_8_Chapter.html#Fig4).
     


    Note


    As an alternative to JSONFormatter, JSON Editor Online is another formatting application;
    URL: [`http://www.jsoneditoronline.org/`](http://www.jsoneditoronline.org/) .
    I prefer JSONFormatter because this application retains all submitted JSON code.
    Therefore, when I need to go back to some result, I do not need to resubmit the
    JSON code.


    When dealing with many tables in the FROM clause to return JSON data, you must
    keep in mind that the table and column aliases take effect on JSON output. For
    example, Listing [8-4](#A435478_1_En_8_Chapter.html#Par32) demonstrates the JSON
    built with a query where the query does not have table and column aliases. Only
    a Database alias will be created for such a db_name() function. Listing [8-5](#A435478_1_En_8_Chapter.html#Par33)
    displays the query result in JSON output.


    ```

    SELECT db_name() as [Database],

    sys.schemas.name,

    sys.objects.name,

    sys.columns.name

    FROM sys.objects

    JOIN sys.schemas on sys.objects.schema_id = sys.schemas.schema_id

    JOIN sys.columns ON sys.columns.object_id = sys.objects.object_id

    JOIN ( SELECT TOP (1) o.object_id, count(c.name) [name]

    FROM sys.columns c

    JOIN sys.objects o ON c.object_id = o.object_id WHERE type = ''u''

    GROUP BY o.object_id HAVING COUNT(c.name) < 6

    )  countCol

    ON countCol.object_id = sys.objects.object_id

    WHERE type = ''u''

    FOR JSON AUTO;

    Listing 8-4.

    Showing SQL with original tables name

    ```


    ```

    {   "Database":"WideWorldImporters",

    "name":"Purchasing",

    "sys.objects":[

    {   "name":"SupplierCategories",

    "sys.columns":[

    {

    "name":"SupplierCategoryID"

    },

    {

    "name":"SupplierCategoryName"

    },

    {

    "name":"LastEditedBy"

    },

    {

    "name":"ValidFrom"

    },

    {

    "name":"ValidTo"

    }

    ]

    }

    ]

    }

    Listing 8-5.

    Showing JSON output

    ```


    Listing [8-6](#A435478_1_En_8_Chapter.html#Par35) demonstrates the JSON that builds
    with a query where the tables do have aliases. Listing [8-7](#A435478_1_En_8_Chapter.html#Par36)
    displays the query result in JSON output.


    ```

    SELECT db_name() as [Database],

    [Schema].name as [SchemaName],

    [Table].name  as [TableName],

    [Column].name as [ColumnName]

    FROM sys.objects [Table]

    JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

    JOIN sys.columns [Column] ON [Column].object_id = [Table].object_id

    JOIN ( SELECT TOP (1) o.object_id, COUNT(c.name) [name]

    FROM sys.columns c JOIN sys.objects o

    ON c.object_id = o.object_id where type = ''u''

    GROUP BY o.object_id HAVING COUNT(c.name) < 6)  countCol

    ON countCol.object_id = [Table].object_id

    WHERE type = ''u''

    FOR JSON AUTO;

    Listing 8-6.

    Showing SQL with the table aliases

    ```


    ```

    {   "Database":"WideWorldImporters",

    "SchemaName":"Purchasing",

    "Table":[

    {   "TableName":"SupplierCategories",

    "Column":[

    {

    "ColumnName":"SupplierCategoryID"

    },

    {

    "ColumnName":"SupplierCategoryName"

    },

    {

    "ColumnName":"LastEditedBy"

    },

    {

    "ColumnName":"ValidFrom"

    },

    {

    "ColumnName":"ValidTo"

    }

    ]

    }

    ]

    }

    Listing 8-7.

    Showing JSON output

    ```


    When compared to the JSON in Listings [8-5](#A435478_1_En_8_Chapter.html#Par33)
    and [8-7](#A435478_1_En_8_Chapter.html#Par36), you could see that Listing [8-7](#A435478_1_En_8_Chapter.html#Par36)
    is more descriptive than Listing [8-5](#A435478_1_En_8_Chapter.html#Par33), for
    example, “sys.objects” vs “Table.”


    ## 8-2\. Handling NULL When JSON Build


    ### Problem


    You want to preserve key element names when a value is NULL .


    ### Solution


    The INCLUDE_NULL_VALUES option within the FOR JSON clause specifies that when
    a column has a NULL value , then a JSON key element must be presented in the JSON
    output. Listing [8-8](#A435478_1_En_8_Chapter.html#Par40) demonstrated a FOR JSON
    clause with an INCLUDE_NULL_VALUES option. Listing [8-9](#A435478_1_En_8_Chapter.html#Par41)
    is showing JSON output generated by the query.


    ```

    USE [WideWorldImporters];

    SELECT TOP (1) [CustomerName]

    ,[PrimaryContact]

    ,[AlternateContact]

    ,[PhoneNumber]

    FROM [Website].[Customers] where [AlternateContact] IS NOT NULL

    UNION ALL

    SELECT TOP (1) [CustomerName]

    ,[PrimaryContact]

    ,[AlternateContact]

    ,[PhoneNumber]

    FROM [Website].[Customers] where [AlternateContact] IS NULL

    FOR JSON AUTO, INCLUDE_NULL_VALUES;

    Listing 8-8.

    FOR JSON clause with INCLUDE_NULL_VALUES option

    ```


    ```

    [  {

    "CustomerName":"Tailspin Toys (Head Office)",

    "PrimaryContact":"Waldemar Fisar",

    "AlternateContact":"Laimonis Berzins",

    "PhoneNumber":"(308) 555-0100"

    },

    {

    "CustomerName":"Eric Torres",

    "PrimaryContact":"Eric Torres",

    "AlternateContact":null,

    "PhoneNumber":"(307) 555-0100"

    }

    ]

    Listing 8-9.

    Showing returned JSON

    ```


    ### How It Works


    By default, the FOR JSON clause ignores elements with default values. Therefore,
    key elements will be missing in the JSON output. For example, when you execute
    the query demonstrated in Listing [8-8](#A435478_1_En_8_Chapter.html#Par40) without
    the INCLUDE_NULL_VALUES option, then "AlternateContact" will be missing in the
    second part of the JSON output. Listing [8-10](#A435478_1_En_8_Chapter.html#Par43)
    demonstrates the query and returned JSON output.


    ```

    SELECT TOP (1) [CustomerName]

    ,[PrimaryContact]

    ,[AlternateContact]

    ,[PhoneNumber]

    FROM [Website].[Customers] where [AlternateContact] IS NOT NULL

    UNION ALL

    SELECT TOP (1) [CustomerName]

    ,[PrimaryContact]

    ,[AlternateContact]

    ,[PhoneNumber]

    FROM [Website].[Customers] where [AlternateContact] IS NULL

    FOR JSON AUTO ;

    [

    {

    "CustomerName":"Tailspin Toys (Head Office)",

    "PrimaryContact":"Waldemar Fisar",

    "AlternateContact":"Laimonis Berzins",

    "PhoneNumber":"(308) 555-0100"

    },

    {

    "CustomerName":"Eric Torres",

    "PrimaryContact":"Eric Torres",

    "PhoneNumber":"(307) 555-0100"

    }

    ]

    Listing 8-10.

    Showing query and JSON output

    ```


