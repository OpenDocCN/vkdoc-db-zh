  trans: "### 解决方案\n\nCLR（公共语言运行时）函数能够扩展 T-SQL 功能，其操作方式与 SQL Server 用户定义对象（对于本解决方案，即用户定义函数）相同。然而，CLR\
    \ 对象需要使用 `dll`（动态链接库）文件格式（扩展名为 `.dll`），这是 Windows 程序代码和过程所使用的格式。本解决方案的代码演示了如何使用\
    \ Visual Studio C#。代码清单 3-8 展示了该 C# 文件的代码。\n\n```csharp\nusing System;\nusing\
    \ System.Data;\nusing System.Data.SqlClient;\nusing System.Data.SqlTypes;\nusing\
    \ Microsoft.SqlServer.Server;\nusing System.IO;\npublic partial class XMLFileETL\n\
    {\n    [SqlFunction]\n    public static SqlString WriteXMLFile(SqlString XMLContent,\n\
    \        SqlString DirPath,\n        SqlString FileName,\n        SqlBoolean DateStamp)\n\
    \    {\n        /*  参数:\n            XMLContent: 包含 XML 文档。\n            DirPath:\
    \ 要写入的目录路径。\n            FileName: 文件名。\n            DateStamp: 决定是否为文件添加日期时间戳。\n\
    \        */\n        try\n        {\n            string strXMLFile = \"\";\n \
    \           // 检查输入参数是否为 NULL。\n            if (!XMLContent.IsNull &&\n      \
    \          !DirPath.IsNull &&\n                !FileName.IsNull)\n           \
    \ {\n                // 构建文件路径字符串\n                string strStamp = (DateStamp)\
    \ ? \"_\" + DateTime.Now.ToString(\"yyyyMMdd_HHmmss\") : \"\";\n             \
    \   strXMLFile = DirPath.Value + \"\\\\\" + FileName.Value + strStamp + \".xml\"\
    ;\n                // 初始化 StreamWriter 类的新实例\n                using (var newFile\
    \ = new StreamWriter(strXMLFile.Value))\n                {\n                 \
    \   // 写入文件。\n                    newFile.WriteLine(XMLContent);\n           \
    \     }\n                // 成功时返回文件路径。\n                return strXMLFile;\n \
    \           }\n            else\n                // 当任何输入值为 NULL 时返回警告。\n    \
    \            return \"Input parameters with NULL detected\";\n        }\n    \
    \    catch (Exception ex)\n        {\n            // 出错时返回 null。\n           \
    \ return ex.Message.ToString();\n        }\n    }\n\n    [SqlFunction]\n    public\
    \ static SqlString ReadXMLFile(SqlString FilePath)\n    {\n        // 参数:\n  \
    \      // FilePath: XML 文件的路径。\n        try\n        {\n            // 声明局部变量\n\
    \            string fileContent = \"\";\n            // 检查参数是否为 null。\n      \
    \      if (!FilePath.IsNull)\n            {\n                // 为指定路径初始化 StreamReader\
    \ 类的新实例。\n                var fileStream = new FileStream(FilePath.Value, FileMode.Open,\
    \ FileAccess.Read);\n                using (var streamReader = new StreamReader(fileStream))\n\
    \                {\n                    fileContent = streamReader.ReadToEnd();\n\
    \                }\n            }\n            // 返回 XML 文档\n            return\
    \ fileContent;\n        }\n        catch (Exception ex)\n        {\n         \
    \   // 出错时发送异常消息。\n            return ex.Message.ToString();\n        }\n    }\n\
    };\n```\n\n*代码清单 3-8. 创建 `WriteXMLFile` 和 `ReadXMLFile` SQL Server CLR 函数*\n\n\
    #### 注册 C# 代码文件\n\n注册 C# 代码文件的步骤：\n\n*   创建名为 \"`第 3 章`\" 的文件夹。\n*   将 `XML_ETL.cs`\
    \ 文件（可在本书代码示例中找到）保存到 \"`第 3 章`\" 文件夹中。\n*   打开 Windows 命令行 (`cmd.exe`)，然后运行代码清单\
    \ 3-9 中所示的命令行。`cmd.exe` 的输出如图 3-28 所示。\n\n![A435478_1_En_3_Fig28_HTML.jpg](img/A435478_1_En_3_Fig28_HTML.jpg)\n\
    \n*图 3-28. 显示命令行结果*\n\n```bash\nC:\\Windows\\Microsoft.NET\\Framework\\v3.5\\\
    csc.exe /target:library /out:C:\\Chapter3\\ReadWriteXML.dll C:\\Chapter3\\XML_ETL.cs\n\
    ```\n\n*代码清单 3-9. 展示用于注册 `dll` 的命令行。*\n\n#### 使用 T-SQL 进行配置\n\n代码清单 3-10 展示了用于配置服务器和数据库的\
    \ T-SQL 解决方案。创建的标量函数如图 3-29 所示。\n\n![A435478_1_En_3_Fig29_HTML.jpg](img/A435478_1_En_3_Fig29_HTML.jpg)\n\
    \n*图 3-29. 显示已创建的 CLR 函数*\n\n```sql\n-- 启用 CLR\nUSE master\nGO\nsp_configure 'clr\
    \ enabled', 1;\nGO\nRECONFIGURE\nGO\n-- 配置\nUSE AdventureWorks\nGO\nALTER DATABASE\
    \ AdventureWorks SET TRUSTWORTHY ON;\nGO\n-- 创建程序集\nCREATE ASSEMBLY ReadWriteXML\n\
    FROM 'C:\\Chapter3\\ReadWriteXML.dll'\nWITH PERMISSION_SET = EXTERNAL_ACCESS;\n\
    GO\n-- 创建函数\nCREATE FUNCTION dbo.WriteXMLFile(\n    @Content nvarchar(MAX),\n\
    \    @DirPath nvarchar(500),\n    @FileName nvarchar(100),\n    @DateStamp bit)\n\
    RETURNS nvarchar(MAX) WITH EXECUTE AS CALLER\nAS\nEXTERNAL NAME ReadWriteXML.XMLFileETL.WriteXMLFile;\n\
    GO\nCREATE FUNCTION dbo.ReadXMLFile(@FilePath nvarchar(500))\nRETURNS nvarchar(MAX)\
    \ WITH EXECUTE AS CALLER\nAS\nEXTERNAL NAME ReadWriteXML.XMLFileETL.ReadXMLFile;\n\
    GO\n```\n\n*代码清单 3-10. 创建 CLR 函数*"
- fmt: "### How It Works\n\nThe CLR project combines reading and writing XML files.\
    \ It is more practical to have several C# functions in one class rather creating\
    \ one class per function. Therefore, both read and write functionality is wrapped\
    \ into one C# class object. To create a C# file, MS Visual Studio C# or VB is\
    \ the tool to use. Covering how to create Visual Studio project is beyond the\
    \ scope of this this book. There are many resources available that explain how\
    \ to create CRL projects in great detail.\n\nThe top part of the C# code lists\
    \ namespaces or libraries that are necessary to recognize code functions and methods.\
    \ The `using` method adds a namespace to a class. When a new project starts, a\
    \ class lists default namespaces. The `System.IO` namespace that contains reading\
    \ and writing as part of the file’s functionality is not part of the default list.\
    \ Therefore, you must add the `System.IO` namespace manually. A CLR class must\
    \ have a partial type. The procedure attribute specifies a SQL Server target object.\
    \ For example: a user-defined function is the `[SQLFunction]` attribute, a stored\
    \ procedure is `[SQLProcedure]`, etc. A CLR procedure type must be `public static`.\n\
    \nThe `WriteXMLFile` function returns a created file full path on success and\
    \ an error message on failure or when a `NULL` parameter value is detected.\n\n\
    The function has four input parameters:\n\n*   `XMLContent` – required, data type\
    \ `SQLString`, Contains XML document.\n*   `DirPath` – required, data type `SQLString`,\
    \ the directory path to write to.\n*   `FileName` – required, data type `SQLString`,\
    \ the file name.\n*   `DateStamp` – required, data type `SQLBoolean`, determines\
    \ whether to add a datetime stamp to the file or not.\n\nAfter validating the\
    \ input parameters, the next step is to build up a file path. First, the parameter\
    \ `DateStamp` needs to check whether a datetime stamp will be part of the file\
    \ name, then concatenate the parameters and the variable:\n\n```csharp\nstring\
    \ strStamp = (DateStamp) ? \"_\"\n+ DateTime.Now.ToString(\"yyyyMMdd_HHmmss\"\
    ) : \"\";\nstrXMLFile = DirPath.Value + \"\\\\\" + FileName.Value + strStamp +\
    \ \".xml\";\n```\n\nAs a final point – write an XML file with the provided path:\n\
    \n```csharp\nusing (var newFile = new StreamWriter(strXMLFile.Value))\n{\n   \
    \ newFile.WriteLine(XMLContent);\n}\n```\n\nThe `ReadXMLFile` function returns\
    \ XML file content on success and an error message on failure. The function has\
    \ one parameter:\n\n*   `FilePath` – required, data type `SQLString`, the file\
    \ path to the XML file.\n\nWhen the `FileStream` function establishes a connection\
    \ to the XML file, then the `StreamReader` function reads the entire file and\
    \ the `ReadXMLFile` function returns the XML document:\n\n```csharp\nvar fileStream\
    \ = new FileStream(FilePath.Value, FileMode.Open, FileAccess.Read);\nusing (var\
    \ streamReader = new StreamReader(fileStream))\n{\n    fileContent = streamReader.ReadToEnd();\n\
    }\nreturn fileContent;\n```\n\nIf you develop a CRL procedure with Visual Studio,\
    \ then you could build the solution to create a `dll` file or run a Command Line\
    \ to build and register a `dll` file:\n\n```cmd\nC:\\Windows\\Microsoft.NET\\\
    Framework\\v3.5\\csc.exe /target:library /out:C:\\Chapter3\\ReadWriteXML.dll C:\\\
    Chapter3\\XML_ETL.cs\n```\n\nWhen the `dll` file is ready then we are moving to\
    \ the SSMS to:\n\n1.  Make sure that the ‘clr enabled’ option is enabled:\n\n\
    \    ```sql\n    sp_configure 'clr enabled', 1\n    ```\n\n2.  Swith to user database\
    \ and `SET TRUSTWORTHY ON`.\n3.  Create an assembly that sets the reference to\
    \ `dll`:\n\n    ```sql\n    CREATE ASSEMBLY ReadWriteXML FROM\n    'C:\\Chapter3\\\
    ReadWriteXML.dll'\n    WITH PERMISSION_SET = EXTERNAL_ACCESS\n    ```\n\nFor the\
    \ assembly, after the name and `dll` file path are specified, you need to set\
    \ the `PERMISSION_SET` argument that has three options:\n\n*   `SAFE` – preferred,\
    \ used when a `dll` cannot access external system resources, for example, the\
    \ registry, files, environment variables, or the network.\n*   `EXTERNAL_ACCESS`\
    \ – the `dll` can access to the registry, files, and environment variables. However,\
    \ these cannot be accessed outside an instance of SQL Server.\n*   `UNSAFE` –\
    \ unrestricted access.\n\nThe `ReadWriteXML.dll` accesses to files; therefore,\
    \ the `EXTERNAL_ACCESS` option is set to the `PERMISSION_SET` for the assembly\
    \ of `ReadWriteXML`. Once the `ASSEMBLY` is created, the functions can now be\
    \ created. For example:\n\n```sql\nCREATE FUNCTION dbo.ReadXMLFile(@FilePath nvarchar(500))\n\
    RETURNS nvarchar(MAX) WITH EXECUTE AS CALLER\nAS\nEXTERNAL NAME ReadWriteXML.XMLFileETL.ReadXMLFile\n\
    ```\n\nIn the `CREATE FUNCTION` section after the schema and name, you need to\
    \ list all of the parameters to match to the function in the C# `dll`. Make sure\
    \ that the positions and the data types are the same. The `RETURNS` section must\
    \ match the data type as well. The `EXTERNAL NAME` has three references, for example:\n\
    \n1.  The `ASSEMBLY` name\n2.  CLR class name\n3.  CLR function name\n\n```sql\n\
    EXTERNAL NAME ReadWriteXML.XMLFileETL.ReadXMLFile\n```\n\nListing [3-11](#A435478_1_En_3_Chapter.html#Par282)\
    \ demonstrates the execution of T_SQL for the `WriteXMLFile` functions. The result\
    \ is shown in Figure [3-30](#A435478_1_En_3_Chapter.html#Fig30).\n\n![A435478_1_En_3_Fig30_HTML.jpg](A435478_1_En_3_Fig30_HTML.jpg)\n\
    \nFigure 3-30. Showing the function result\n\n```sql\nSELECT  dbo.WriteXMLFile(N'\n\
    <Accessories>\n  <Bike Racks>\n    <Product>\n      <Name>Hitch Rack - 4-Bike</Name>\n\
    \      <ProductNumber>RA-H123</ProductNumber>\n      <ListPrice>120.0000</ListPrice>\n\
    \    </Product>\n  </Bike Racks>\n  <Bike Stands>\n    <Product>\n      <Name>All-Purpose\
    \ Bike Stand</Name>\n      <ProductNumber>ST-1401</ProductNumber>\n      <ListPrice>159.0000</ListPrice>\n\
    \    </Product>\n  </Bike Stands>\n</Accessories>\n', 'C:\\Chapter3', 'CategoriesXML',\
    \ 0) NewFilePath\n```\nListing 3-11. Executing the `WriteXMLFile` functions\n\n\
    Listing [3-12](#A435478_1_En_3_Chapter.html#Par284) demonstrates the execution\
    \ of T_SQL for the `ReadXMLFile` functions. The result is shown in Figure [3-31](#A435478_1_En_3_Chapter.html#Fig31).\n\
    \n![A435478_1_En_3_Fig31_HTML.jpg](A435478_1_En_3_Fig31_HTML.jpg)\n\nFigure 3-31.\
    \ Showing the function result\n\n```sql\nSELECT cast(dbo.ReadXMLFile('C:\\Chapter3\\\
    CategoriesXML.xml') as xml) XMLFile\n```\nListing 3-12. Executing the `ReadXMLFile`\
    \ functions\n\nThe CRL procedures provide a secure way to extend SQL Server functionality.\
    \ However, programming skills are preferred when dealing with CLR procedures.\n\
    \n## Summary\n\nThis chapter demonstrates a variety of solutions detailing how\
    \ to write the XML result into a file, and how to load the XML file (or files)\
    \ from the source location. Please be aware that this is not the only solution,\
    \ since in today’s world, such tasks could be completed using other technologies,\
    \ such as PowerShell, .NET applications (either C# or VB.NET), among others. However,\
    \ these are excellent solutions to compiling SSIS packaged using SQL Server the\
    \ T-SQL code.\n\nIn the next chapter the recipes will cover how to convert an\
    \ XML document into rows and columns, also known as “XML Shredding.”\n\n# 4. Shredding\
    \ XML\n\nConverting XML data into relational columns and rows is not an easy process.\
    \ The `OPENXML` function was introduced to shred XML data in SQL Server 2000,\
    \ and then XML shredding was improved by the XPath language (also known as XQuery)\
    \ in SQL Server 2005. Since then, the process of querying XML data became a solid\
    \ solution to deliver results. This chapter will demonstrate how to query XML\
    \ data as a single unit and return the retrieved data across a table’s column.\n\
    \n## 4-1. Shredding XML with Internal ENTITY Declarations\n\n### Problem\n\nYou\
    \ want to return a rowset result out of the XML data that is passing to a stored\
    \ procedure as a parameter or retrieved out of the table as the single XML value."
