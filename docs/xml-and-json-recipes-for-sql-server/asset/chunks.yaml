    \ procedure before executing the `xp_cmdshell` extended stored procedure:\n\n\
    ```sql\nDECLARE @stat TABLE\n(\nBCPStat VARCHAR(500)\n);\nINSERT INTO @stat\n\
    (\nBCPStat\n)\nEXECUTE master..xp_cmdshell @SQL;\n```\n\nThe `@stat` table variable\
    \ absorbs the `BCP` completion output; therefore the stored procedure does not\
