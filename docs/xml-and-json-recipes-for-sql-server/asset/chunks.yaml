  trans: '# 工作原理


    ## 数据类型过滤与验证


    该解决方案基于以下几个逻辑过程：


    *   `FROM` 子句从系统表（`sys.columns`、`sys.types`、`sys.objects` 和 `sys.schemas`）中获取有关可能存储
    XML 数据的列、其所属表和架构的信息。

    *   `WHERE` 子句过滤数据类型。理论上，XML 文档可能存在于数据类型为 `XML`、`VARCHAR`、`NVARCHAR`、`VARBINARY`、`IMAGE`、`TEXT`
    和 `NTEXT` 的列中。XML 文档本质上是冗长的。因此，期望数据类型 `VARCHAR`、`NVARCHAR` 和 `VARBINARY` 的长度为
    -1，即在数据类型长度规范中为 `MAX`。其他数据类型 `IMAGE`、`TEXT` 和 `NTEXT` 则不需要此额外的长度过滤器。

    *   `SELECT` 子句动态构建用于验证的 SQL。关键函数 `TRY_CONVERT()` 自 SQL Server 2012 起可用。我们利用了
    `TRY_CONVERT()` 的行为：当数据类型无法转换为指定类型时，该函数返回 `NULL`。例如，`CAST()` 和 `CONVERT()` 函数在转换失败时会返回错误（消息
    9420，XML 解析：第 1 行，字符 2，非法 xml 字符）。因此，任何无法转换为 `XML` 数据类型的值都会被过滤掉。如技巧 4-4 所述，`IMAGE`
    数据类型无法直接转换为 `XML`。因此，`CASE` 表达式使用了两次转换验证；第一次针对 `IMAGE` 数据类型，如代码清单 4-31 所示，第二次针对
    `VARCHAR`、`NVARCHAR`、`VARBINARY`、`TEXT` 和 `NTEXT` 数据类型，如代码清单 4-32 所示。


    ```sql

    WITH CTE AS

    (

    SELECT TOP (1) TRY_CONVERT(XML, CAST(packagedata AS VARBINARY(MAX))) AS tst,

    packagedata

    FROM dbo.sysssispackages

    WHERE  TRY_CONVERT(XML, CAST(packagedata AS VARBINARY(MAX))) IS NOT NULL

    )

    SELECT TOP (1) tst,

    c.value(''local-name(.)[1]'', ''VARCHAR(200)'') AS TopNodeName

    FROM CTE

    CROSS APPLY tst.nodes(''/*'') AS t(c);

    代码清单 4-31.

    验证 IMAGE 数据类型

    ```


    ```sql

    WITH CTE AS

    (

    SELECT TOP (1) TRY_CONVERT(XML, expression) as tst,

    expression

    FROM dbo.syspolicy_conditions_internal

    WHERE  TRY_CONVERT(XML, expression) IS NOT NULL

    )

    SELECT TOP (1) tst,

    c.value(''fn:local-name(.)[1]'', ''VARCHAR(200)'') AS TopNodeName

    FROM CTE

    CROSS APPLY tst.nodes(''/*'') AS t(c);

    代码清单 4-32.

    验证 VARCHAR, NVARCHAR, VARBINARY, TEXT 和 NTEXT 数据类型

    ```


    ## 代码执行过程


    代码的工作方式如下：


    *   游标执行在 `SELECT` 子句中生成的每个 SQL 脚本。

    *   临时表 `#XML` 获取返回的行。

    *   临时表 `#Result` 从 `#XML` 表获取行，并从游标获取变量。

    *   清理 `#XML` 表，为下一行验证做准备。

    *   销毁游标。

    *   返回收集的数据。

    *   删除临时表。


    ## CTE 外部 SELECT 块分析


    以上是对流程的描述。然而，我想仔细研究一下代码清单 4-32 中 CTE 的外部 `SELECT` 块：


    ```sql

    SELECT TOP (1) tst,

    c.value(''fn:local-name(.)[1]'', ''VARCHAR(200)'') AS TopNodeName

    FROM CTE

    CROSS APPLY tst.nodes(''/*'') AS t(c);

    ```


    列 `tst`（代表测试）在成功转换为 `XML` 数据类型时返回 XML 值。列 `TopNodeName` 返回第一个可用的元素名称，即根元素。`fn:local-name()`
    函数根据提供的参数返回元素名称。点号（当前上下文节点）是传递给 `fn:local-name()` 函数的参数，而 `nodes()` 方法设置为 `"/*"`（`child::node()`
    和 `/node()` 轴的简写），它是单个元素的通配符。因此，这个组合的 XML 解析器意味着——从 XML 文档中返回第一个可用的名称。


    当 `node()` 方法设置为 `"//*"`（`descendant-or-self` 轴的简写）时，我们可以得到不同的效果，这意味着查看并访问 XML
    数据中的每个元素。这可以与 T-SQL 过滤器相比较，例如 `WHERE ColumnName LIKE ''%text%''`。这样，解析器会遍历 XML
    数据中的所有元素，如代码清单 4-33 所示。使用单个点作为参数的 `fn:local-name()` 函数返回当前元素名称，例如 `details.value(''local-name(.)[1]'',
    ''VARCHAR(100)'')`。使用父轴步进（双点号），它返回上一级（即父级）的元素，例如 `details.value(''local-name(..)[1]'',
    ''VARCHAR(100)'')`，如图 4-9 所示。


    ```sql

    WITH ALLELEMENTS

    AS

    (

    SELECT TOP 1 Demographics

    FROM Sales.Store

    )

    SELECT

    details.value(''local-name(..)[1]'', ''VARCHAR(100)'') AS ParentNodeName,

    details.value(''local-name(.)[1]'', ''VARCHAR(100)'') AS NodeName

    FROM ALLELEMENTS

    CROSS APPLY Demographics.nodes(''//*'') survey(details);

    代码清单 4-33.

    显示 XML 数据中的所有元素

    ```


    从 XML 数据中检索所有元素的结果如图 4-9 所示。


    ![A435478_1_En_4_Fig9_HTML.jpg](img/A435478_1_En_4_Fig9_HTML.jpg)


    **图 4-9.** 动态返回 XML 元素的结果


    ## 4-8. 使用多个 CROSS APPLY 运算符


    ### 问题


    你需要分解一个类型化 XML 列，但希望使用多个 `CROSS APPLY` 运算符来导航 XML。


    ### 解决方案


    在技巧 4-5 “导航类型化 XML 列”中，我演示了如何使用 `"../"` 导航来分解类型化 XML 列。实现多个 `CROSS APPLY` 运算符可以作为
    XML 导航的替代方案，如代码清单 4-34 所示。


    ```sql

    WITH XMLNAMESPACES(''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions''
    as df)

    SELECT ProductModelID,

    step.value(''fn:string(.)'', ''varchar(2000)'') AS StepInstruction,

    instruct.value(''@LocationID'', ''int'') AS LaborStation,

    instruct.value(''@LaborHours'', ''real'') AS LaborHours,

    instruct.value(''@LotSize'', ''int'') AS LotSize,

    instruct.value(''@MachineHours'', ''real'') AS MachineHours,

    instruct.value(''@SetupHours'', ''real'') AS SetupHours,

    step.value(''df:material[1]'', ''varchar(100) '') AS Material,

    step.value(''df:tool[1]'', ''varchar(100) '') AS Tool

    FROM Production.ProductModel

    CROSS APPLY Instructions.nodes(''df:root/df:Location'') prod(instruct)

    CROSS APPLY instruct.nodes(''df:step'') ins(step);

    代码清单 4-34.

    演示多个 CROSS APPLY 运算符的解决方案

    ```


    查询结果如图 4-10 所示。


    ![A435478_1_En_4_Fig10_HTML.jpg](img/A435478_1_En_4_Fig10_HTML.jpg)


    **图 4-10.** 应用多个 CROSS APPLY 运算符的结果


    ### 工作原理


    使用多个 `CROSS APPLY` 运算符的关键在于将一个 `CROSS APPLY` 应用于第二个 `CROSS APPLY` 的结果，如我们的示例代码所示：


    ```sql

    FROM Production.ProductModel

    CROSS APPLY Instructions.nodes(''df:root/df:Location'') prod(instruct)

    CROSS APPLY instruct.nodes(''df:step'') ins(step)

    ```


    第一个 `CROSS APPLY` 引用 `ProductModel` 表的 `XML` 指令列，以创建一个基础结果集，供给第二个 `CROSS APPLY`：


    ```sql

    CROSS APPLY Instructions.nodes(''df:root/df:Location'') prod(instruct)

    ```


    第二个 `CROSS APPLY` 通过其 `instruct` 列别名获取第一个 `CROSS APPLY` 的结果：


    ```sql

    CROSS APPLY instruct.nodes(''df:step'') ins(step)

    ```


    最后，`SELECT` 子句使用 `instruct` 别名检索父元素，并使用 `step` 别名引用子元素。技巧 4-5 和 4-8 中的解决方案产生的结果集完全相同，但
    `SELECT` 和 `FROM` 子句中的语法不同。'
- fmt: "## Summary\n\nThe ability to shred XML data is a very important aspect of\
    \ manipulating XML in SQL Server. Many of the built-in SQL Server processes use\
    \ XML; for example:\n\n*   Execution Plans\n*   Extended Events\n*   DDL triggers\n\
    *   SSIS and SSRS code behind\n\nThe XQuery language simplifies SQL Server and\
    \ the tasks performed by DBAs and Developers by allowing dynamic and powerful\
    \ programmatic XML exploration and manipulation, utilizing operational time more\
    \ efficiently.\n\n## 5. Modifying XML\n\nXML XQuery has the ability to modify\
    \ an XML instance for the XML variable and XML columns. The XQuery `modify()`\
    \ method provides the ability to add, delete, and update the XML elements, attributes,\
    \ and their values. This chapter will discuss and demonstrate real case scenarios\
    \ to apply the `modify()` method for XML instances.\n\n### 5-1. Inserting a Child\
    \ Element into Your XML\n\n#### Problem\n\nYou want to insert a child element\
    \ into an existing XML instance.\n\n#### Solution\n\nYou may encounter a situation\
    \ in which you need to insert an XML element into an existing XML instance. Consider\
    \ the simple XML data shown in Listing [5-1](#A435478_1_En_5_Chapter.html#Par4).\n\
    \n```\nListing 5-1.\nSimple XML data\n```\n\nSQL Server provides XML Data Modification\
    \ Language (XML DML) support via the XML data type `modify()` method. XML DML\
    \ is an extension to the W3C XQuery standard, as XQuery lacks data manipulation\
    \ statements and functions. Listing [5-2](#A435478_1_En_5_Chapter.html#Par6) shows\
    \ how to use the `modify()` method’s XML DML `insert` statement to insert a new\
    \ element into a specific location within your existing XML data. The result is\
    \ demonstrated in Figure [5-1](#A435478_1_En_5_Chapter.html#Fig1).\n\n```\nDECLARE\
    \ @XMLDoc xml;\nSET @XMLDoc =\n'\n\n';\nSET @XMLDoc.modify('insert 3 year parts\
    \ and labor extended maintenance is available into (/Root/ProductDescription/Features)[1]');\n\
    SELECT @XMLDoc;\nListing 5-2.\nInserting the first child element for the Features\
    \ element\n```\n\nThe result of the XML DML `insert` statement is shown in Figure\
    \ [5-1](#A435478_1_En_5_Chapter.html#Fig1).\n\n![A435478_1_En_5_Fig1_HTML.jpg](A435478_1_En_5_Fig1_HTML.jpg)\n\
    Figure 5-1. Result of inserting a child element into existing XML data\n\n####\
    \ How It Works\n\nThe `modify()` method’s XML DML language is comparable to the\
    \ T-SQL DML `INSERT`, `UPDATE`, and `DELETE` methods, but with many additional\
    \ options. This makes sense because XML DML must take XML structure into account\
    \ when modifying your XML instance. The `modify()` method alters an XML document\
    \ not only by value, but also amends its elements and attributes. Therefore, the\
    \ `modify()` method can be logically considered a combination of a subset of T-SQL’s\
    \ DML and DDL languages. We will discuss these other XML DML statements and additional\
    \ options in other recipes of this chapter.\n\nThis recipe demonstrates how to\
    \ add a new child element, `Maintenance`, to the parent element `Features` in\
    \ the XML instance. The `Features` element does not have any child elements in\
    \ the original XML instance, shown in Listing [5-1](#A435478_1_En_5_Chapter.html#Par4).\
    \ We do not need to provide a specification for the child element position to\
    \ the `modify()` method since the `Maintenance` element is the first child of\
    \ the `Features` element. The solution to insert a new element with the values\
    \ provided in Listing [5-2](#A435478_1_En_5_Chapter.html#Par6) follows this pattern:\n\
    \n1.  `insert` is the keyword specifying an \"insert\" pattern.\n2.  `<Maintenance>\
    \ 3 years parts and labor extended maintenance is available</Maintenance>` – is\
    \ the element value pattern, indicating the element we wish to insert.\n3.  `into`\
    \ is the keyword the target XPath path indicating where we will insert the element\
    \ within the XML.\n4.  `(/Root/ProductDescription/Features)[1]` is the insert\
    \ target XPath path. Note that a singleton instance is a required component for\
    \ the target XPath. When the singleton is not provided (via the `[1]` index in\
    \ this case), the XML DML parser will throw the following error:\n    ```\n  \
    \  Msg 2226, Level 16, State 1, Line 10\n    XQuery [modify()]: The target of\
    \ 'insert' must be a single node, found 'element(Features,xdt:untyped) *'\n  \
    \  ```\n\nThe `modify(@xml:dml)` method takes one argument. Therefore, all `@xml:dml`\
    \ patterns sent to the method are submitted as a single string value, as shown\
    \ in Listing [5-2](#A435478_1_En_5_Chapter.html#Par6):\n\n```\nmodify('insert\n\
    3 year parts and labor extended maintenance is available \ninto (/Root/ProductDescription/Features)[1]');\n\
    ```\n\n### 5-2. Inserting a Child Element into an Existing XML Instance with Namespace\n\
    \n#### Problem\n\nYou want to insert a child element into an XML instance that\
    \ contains a namespace.\n\n#### Solution\n\nWhen an XML instance contains an XML\
    \ namespace, you need to declare the XML namespace within the `modify()` method.\
    \ Listing [5-3](#A435478_1_En_5_Chapter.html#Par19) builds on the solution in\
    \ Recipe 5-1 to demonstrate.\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n\n\
    ';\nSET @XMLDoc.modify('declare namespace ns=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions\"\
    ;\ninsert 3 year parts and labor extended maintenance is available into (/ns:Root/ns:ProductDescription/ns:Features)[1]');\n\
    SELECT @XMLDoc;\nShowing the XML rusult:\n\n3 year parts and labor extended maintenance\
    \ is available\n\nListing 5-3.\nDeclaring an XML namespace within the modify()\
    \ method\n```"
  raw: "## Summary\n\nThe ability to shred XML data is a very important aspect of\
    \ manipulating XML in SQL Server. Many of the built-in SQL Server processes use\
    \ XML; for example:\n\n*   Execution Plans\n*   Extended Events\n*   DDL triggers\n\
    *   SSIS and SSRS code behind\n\nThe XQuery language simplifies SQL Server and\
    \ the tasks performed by DBAs and Developers by allowing dynamic and powerful\
    \ programmatic XML exploration and manipulation, utilizing operational time more\
    \ efficiently.\n\n# 5. Modifying XML\n\nXML XQuery has the ability to modify an\
    \ XML instance for the XML variable and XML columns. The XQuery modify() method\
    \ provides the ability to add, delete, and update the XML elements, attributes,\
    \ and their values. This chapter will discuss and demonstrate real case scenarios\
    \ to apply the modify() method for XML instances.\n\n## 5-1\\. Inserting a Child\
    \ Element into Your XML\n\n### Problem\n\nYou want to insert a child element into\
    \ an existing XML instance.\n\n### Solution\n\nYou may encounter a situation in\
    \ which you need to insert an XML element into an existing XML instance. Consider\
    \ the simple XML data shown in Listing [5-1](#A435478_1_En_5_Chapter.html#Par4).\n\
    \n```\n\nListing 5-1.\nSimple XML data\n```\n\nSQL Server provides XML Data Modification\
    \ Language (XML DML) support via the XML data type modify() method. XML DML is\
    \ an extension to the W3C XQuery standard, as XQuery lacks data manipulation statements\
    \ and functions. Listing [5-2](#A435478_1_En_5_Chapter.html#Par6) shows how to\
    \ use the modify() method’s XML DML insert statement to insert a new element into\
    \ a specific location within your existing XML data. The result is demonstrated\
    \ in Figure [5-1](#A435478_1_En_5_Chapter.html#Fig1).\n\n```\nDECLARE @XMLDoc\
    \ xml;\nSET @XMLDoc =\n'\n\n';\nSET @XMLDoc.modify('insert 3 year parts and labor\
    \ extended maintenance is available into (/Root/ProductDescription/Features)[1]');\n\
    SELECT @XMLDoc;\nListing 5-2.\nInserting the first child element for the Features\
    \ element\n```\n\nThe result of the XML DML insert statement is shown in Figure\
    \ [5-1](#A435478_1_En_5_Chapter.html#Fig1).\n\n![A435478_1_En_5_Fig1_HTML.jpg](A435478_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1.\n\nResult of inserting a child element into existing XML data\n\n\
    ### How It Works\n\nThe XML modify() method’s XML DML language is comparable to\
    \ the T-SQL DML `INSERT`, `UPDATE`, and `DELETE` methods, but with many additional\
    \ options. This makes sense because XML DML must take XML structure into account\
    \ when modifying your XML instance. The modify() method alters an XML document\
    \ not only by value, but also amends its elements and attributes. Therefore, the\
    \ modify() method can be logically considered a combination of a subset of T-SQL’s\
    \ DML and DDL languages. We will discuss these other XML DML statements and additional\
    \ options in other recipes of this chapter.\n\nThis recipe demonstrates how to\
    \ add a new child element, Maintenance, to the parent element Features in the\
    \ XML instance. The Features element does not have any child elements in the original\
    \ XML instance, shown in Listing [5-1](#A435478_1_En_5_Chapter.html#Par4). We\
    \ do not need to provide a specification for the child element position to the\
    \ modify() method since the Maintenance element is the first child of the Features\
    \ element. The solution to insert a new element with the values provided in Listing\
    \ [5-2](#A435478_1_En_5_Chapter.html#Par6) follows this pattern:\n\n1.  insert\
    \ is the keyword specifying an “insert” pattern.  \n2.  <Maintenance> 3 years\
    \ parts and labor extended maintenance is available</Maintenance> – is the element\
    \ value pattern, indicating the element we wish to insert.  \n3.  into is the\
    \ keyword the target XPath path indicating where we will insert the element within\
    \ the XML.  \n4.  (/Root/ProductDescription/Features)[1] is the insert target\
    \ XPath path. Note that a singleton instance is a required component for the target\
    \ XPath. When the singleton is not provided (via the [1] index in this case),\
    \ the XML DML parser will throw the following error:  \n\n```\nMsg 2226, Level\
    \ 16, State 1, Line 10XQuery [modify()]: The target of 'insert' must be a single\
    \ node, found 'element(Features,xdt:untyped) *'\n```\n\nThe modify(@xml:dml) method\
    \ takes one argument. Therefore, all @xml:dml patterns sent to the method are\
    \ submitted as a single string value , as shown in Listing [5-2](#A435478_1_En_5_Chapter.html#Par6):\n\
    \n```\nmodify('insert\n3 year parts and labor extended maintenance is available\
    \ \ninto (/Root/ProductDescription/Features)[1]');\n```\n\n## 5-2\\. Inserting\
    \ a Child Element into an Existing XML Instance with Namespace\n\n### Problem\n\
    \nYou want to insert a child element into an XML instance that contains a namespace.\n\
    \n### Solution\n\nWhen an XML instance contains an XML namespace, you need to\
    \ declare the XML namespace within the modify() method. Listing [5-3](#A435478_1_En_5_Chapter.html#Par19)\
    \ builds on the solution in Recipe 5-1 to demonstrate.\n\n```\nDECLARE @XMLDoc\
    \ xml;\nSET @XMLDoc =\n'\n\n';\nSET @XMLDoc.modify('declare namespace ns=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions\"\
    ;\ninsert 3 year parts and labor extended maintenance is available into (/ns:Root/ns:ProductDescription/ns:Features)[1]');\n\
    SELECT @XMLDoc;\nShowing the XML rusult:\n\n3 year parts and labor extended maintenance\
    \ is available\n\nListing 5-3.\nDeclaring an XML namespace within the modify()\
    \ method\n```"
  trans: "## 摘要\n\n拆解 XML 数据的能力是在 SQL Server 中操作 XML 的一个非常重要的方面。许多内置的 SQL Server 流程都使用\
    \ XML；例如：\n\n*   执行计划\n*   扩展事件\n*   DDL 触发器\n*   SSIS 和 SSRS 后台代码\n\nXQuery 语言通过允许动态且强大的编程式\
    \ XML 探索与操作，从而简化了 SQL Server 以及数据库管理员和开发人员的任务，更高效地利用了运行时间。\n\n## 5. 修改 XML\n\n\
    XML XQuery 能够修改 XML 变量的 XML 实例和 XML 列。XQuery 的 `modify()` 方法提供了添加、删除和更新 XML 元素、属性及其值的能力。本章将讨论并通过实际案例演示如何将\
    \ `modify()` 方法应用于 XML 实例。\n\n### 5-1. 在 XML 中插入一个子元素\n\n#### 问题\n\n你想在一个现有的 XML\
    \ 实例中插入一个子元素。\n\n#### 解决方案\n\n你可能会遇到需要向现有 XML 实例中插入一个 XML 元素的情况。考虑清单 5-1 所示的简单\
    \ XML 数据。\n\n```\n清单 5-1.\n简单的 XML 数据\n```\n\nSQL Server 通过 XML 数据类型的 `modify()`\
    \ 方法提供对 XML 数据修改语言（XML DML）的支持。XML DML 是 W3C XQuery 标准的一个扩展，因为 XQuery 缺少数据操作语句和函数。清单\
    \ 5-2 展示了如何使用 `modify()` 方法的 XML DML `insert` 语句将一个新元素插入到现有 XML 数据中的特定位置。结果如图\
    \ 5-1 所示。\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n\n';\nSET @XMLDoc.modify('insert\
    \ 3 year parts and labor extended maintenance is available into (/Root/ProductDescription/Features)[1]');\n\
    SELECT @XMLDoc;\n清单 5-2.\n为 Features 元素插入第一个子元素\n```\n\nXML DML `insert` 语句的结果如图\
    \ 5-1 所示。\n\n![A435478_1_En_5_Fig1_HTML.jpg](img/A435478_1_En_5_Fig1_HTML.jpg)\n\
    图 5-1. 在现有 XML 数据中插入子元素的结果\n\n#### 工作原理\n\n`modify()` 方法的 XML DML 语言与 T-SQL DML\
    \ 的 `INSERT`、`UPDATE` 和 `DELETE` 方法类似，但具有更多附加选项。这是合理的，因为 XML DML 在修改 XML 实例时必须考虑\
    \ XML 结构。`modify()` 方法不仅按值修改 XML 文档，还会修改其元素和属性。因此，`modify()` 方法在逻辑上可以被视为 T-SQL\
    \ 的 DML 和 DDL 语言的一个子集的组合。我们将在本章的其他配方中讨论这些其他的 XML DML 语句和附加选项。\n\n本配方演示了如何将一个新的子元素\
    \ `Maintenance` 添加到 XML 实例中的父元素 `Features`。在原始 XML 实例（如清单 5-1 所示）中，`Features`\
    \ 元素没有任何子元素。我们不需要向 `modify()` 方法提供子元素位置的具体说明，因为 `Maintenance` 元素是 `Features` 元素的第一个子元素。清单\
    \ 5-2 中提供的值来插入新元素的解决方案遵循以下模式：\n\n1.  `insert` 是指定“插入”模式的关键词。\n2.  `<Maintenance>\
    \ 3 years parts and labor extended maintenance is available</Maintenance>` ——\
    \ 是元素值模式，指示我们希望插入的元素。\n3.  `into` 是关键词，其后的目标 XPath 路径指示我们将元素插入到 XML 中的哪个位置。\n\
    4.  `(/Root/ProductDescription/Features)[1]` 是插入的目标 XPath 路径。注意，目标 XPath 需要一个单例实例。当未提供单例（在此例中是通过\
    \ `[1]` 索引）时，XML DML 解析器将抛出以下错误：\n    ```\n    消息 2226，级别 16，状态 1，第 10 行\n   \
    \ XQuery [modify()]: 'insert' 的目标必须是单个节点，找到的是 'element(Features,xdt:untyped) *'\n\
    \    ```\n\n`modify(@xml:dml)` 方法接受一个参数。因此，发送给该方法的所有 `@xml:dml` 模式都作为单个字符串值提交，如清单\
    \ 5-2 所示：\n\n```\nmodify('insert\n3 year parts and labor extended maintenance\
    \ is available \ninto (/Root/ProductDescription/Features)[1]');\n```\n\n### 5-2.\
    \ 在包含命名空间的现有 XML 实例中插入子元素\n\n#### 问题\n\n你想在一个包含命名空间的 XML 实例中插入一个子元素。\n\n#### 解决方案\n\
    \n当 XML 实例包含 XML 命名空间时，你需要在 `modify()` 方法内声明该 XML 命名空间。清单 5-3 在配方 5-1 的解决方案基础上进行了演示。\n\
    \n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n\n';\nSET @XMLDoc.modify('declare\
    \ namespace ns=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions\"\
    ;\ninsert 3 year parts and labor extended maintenance is available into (/ns:Root/ns:ProductDescription/ns:Features)[1]');\n\
    SELECT @XMLDoc;\n显示 XML 结果：\n\n3 year parts and labor extended maintenance is\
    \ available\n\n清单 5-3.\n在 modify()方法中声明 XML 命名空间\n```"
- fmt: "## How It Works\n\nAs you can see, there is a small, but significant, difference\
    \ between Listing [5-1](#A435478_1_En_5_Chapter.html#Par4) and Listing [5-3](#A435478_1_En_5_Chapter.html#Par19).\
    \ Listing [5-3](#A435478_1_En_5_Chapter.html#Par19) has an XML namespace defined\
    \ within the XML instance. This small difference affects the `modify()` method\
    \ syntax. If the `modify()` method ignores the XML namespace, the XQuery won’t\
    \ find the target XPath path, resulting in no change to the XML, as shown in Listing\
    \ [5-4](#A435478_1_En_5_Chapter.html#Par21). The result is shown in Figure [5-2](#A435478_1_En_5_Chapter.html#Fig2).\n\
    \n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription ProductID=\"\
    1\" xmlns=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions\"\
    >\n  <Summary>\n    <m:Features xmlns:m=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModel\"\
    >\n      <m:feature>Vacuum formed dual wall polycarbonate</m:feature>\n      <m:feature>Dual\
    \ material molded outer shell</m:feature>\n      <m:feature>3 year parts and labor\
    \ extended maintenance is available</m:feature>\n    </m:Features>\n  </Summary>\n\
    </ProductDescription>\n';\nSET @XMLDoc.modify('insert 3 year parts and labor extended\
    \ maintenance is available into (/Root/ProductDescription/Features)[1]');\nSELECT\
    \ @XMLDoc;\n```\n\nListing 5-4.\nXML namespace causes `modify()` method to not\
    \ update target XML\n\nThe result, shown in Figure [5-2](#A435478_1_En_5_Chapter.html#Fig2),\
    \ demonstrates that this `modify()` method does not update the source XML.\n\n\
    ![A435478_1_En_5_Fig2_HTML.jpg](A435478_1_En_5_Fig2_HTML.jpg)\n\nFigure 5-2.\n\
    Resulting XML when the namespaces are ignored in the `modify()` method\n\nAs you\
    \ can see in Figure [5-2](#A435478_1_En_5_Chapter.html#Fig2), the XML instance\
    \ returned has not changed. To correct the problem, the XML namespace needs to\
    \ be declared inside the `modify()` method. Therefore, the first pattern for the\
    \ XML instance with the namespace must be the namespace declaration, for example:\n\
    \n```\nmodify('declare namespace ns = \"http://schemas.microsoft.com/sqlserver/2004/07/\
    \ adventure-works/ProductModelManuInstructions\"; ... )\n```\n\nThe declared name\
    \ `ns` is user defined, so you can choose a name to declare the namespace as long\
    \ as it complies with SQL Server naming conventions, such as no spaces in the\
    \ name, the first character is alpha, the following characters are alphanumeric,\
    \ etc. When the namespace is declared, this name needs to be a part of each element\
    \ in the `modify()` method, for both new and target patterns. For example:\n\n\
    ```\ninsert 3 year parts and labor extended maintenance is available into (/ns:Root/ns:ProductDescription/ns:Features)[1]\n\
    ```\n\n**Tip**\nAlways verify the result after using the `modify()` method. For\
    \ example, the parser does not throw an error for an ignored namespace declaration,\
    \ and the action appears to complete successfully. However, `modify()` simply\
    \ does not apply the XML DML action to your XML data.\n\nAs an alternative to\
    \ the `modify()` method’s internal namespace declaration syntax, it is possible\
    \ to complete this task with T-SQL’s external `WITH XMLNAMESPACES` declaration.\
    \ When an XML document has one namespace, the default namespace can be used, as\
    \ shown in Listing [5-5](#A435478_1_En_5_Chapter.html#Par29).\n\n```\nDECLARE\
    \ @XMLDoc xml;\nWITH XMLNAMESPACES(default 'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions')\n\
    SELECT @XMLDoc =\n'\n<ProductDescription ProductID=\"1\" xmlns=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions\"\
    >\n  <Summary>\n    <Features>\n      <feature>Vacuum formed dual wall polycarbonate</feature>\n\
    \      <feature>Dual material molded outer shell</feature>\n    </Features>\n\
    \  </Summary>\n</ProductDescription>\n';\nSET @XMLDoc.modify('insert 3 year parts\
    \ and labor extended maintenance is available into (/Root/ProductDescription/Features)[1]');\n\
    ```\n\nListing 5-5.\nUsing `WITH XMLNAMESPACES` to declare a default XML namespace\n\
    \nWhen you are implementing the `WITH XMLNAMESPACES` clause, then the `SET` operator\
    \ will not work. You must implement the `SELECT` clause instead.\n\n## 5-3. Inserting\
    \ XML Attributes\n\n### Problem\n\nYou want to insert an attribute into an XML\
    \ element of existing XML data.\n\n### Solution\n\nAn attribute is a property\
    \ of an XML element. Therefore, the `modify()` method has the `attribute` option\
    \ to insert an attribute to an element, as shown in Listing [5-6](#A435478_1_En_5_Chapter.html#Par33).\n\
    \n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription ProductID=\"\
    1\">\n  <Summary>\n    <Features>\n      <Maintenance>\n        <feature>Vacuum\
    \ formed dual wall polycarbonate</feature>\n        <feature>Dual material molded\
    \ outer shell</feature>\n      </Maintenance>\n    </Features>\n  </Summary>\n\
    </ProductDescription>\n';\nSET @XMLDoc.modify('insert attribute ProductModel {\"\
    Mountain-100\"} into (/Root/ProductDescription/Features/Maintenance)[1]');\nSELECT\
    \ @XMLDoc;\n```\n\nListing 5-6.\nInserting `ProductModel` attribute into the `Maintenance`\
    \ element\n\nThe result is shown in Figure [5-3](#A435478_1_En_5_Chapter.html#Fig3).\n\
    \n![A435478_1_En_5_Fig3_HTML.jpg](A435478_1_En_5_Fig3_HTML.jpg)\n\nFigure 5-3.\n\
    XML result of inserting an attribute into an element\n\n### How It Works\n\nChapter\
    \ [4](#A435478_1_En_4_Chapter.html) explained the XPath path syntaxes for elements\
    \ and attributes are different. Likewise, the `modify()` method has differences\
    \ as well. First of all, the `insert` statement has an additional `attribute`\
    \ option that is not specified when elements are inserted. Second, the attribute\
    \ is not surrounded by angle brackets. Finally, the attribute’s value is placed\
    \ into curly brackets with double quotes immediately following the attribute name.\
    \ Therefore, the syntax to add the attribute has the following patterns:\n\n1.\
    \  The `insert attribute` keywords indicate you wish to insert an attribute into\
    \ an element.\n2.  `ProductModel {\"Mountain-100\"}` is the attribute’s name and\
    \ value.\n3.  `into` indicates the XPath path of the target element is coming\
    \ up.\n4.  `(/Root/ProductDescription/Features/Maintenance)[1]` is the attribute\
    \ target XPath path. The singleton numeric positional predicate is a required\
    \ component of the target XPath.\n\nFor example:\n\n```\nmodify('insert attribute\
    \ ProductModel {\"Mountain-100\"} into (/Root/ProductDescription/Features/Maintenance)[1]');\n\
    ```\n\nWrapping the XPath path in parentheses and then putting the numeric positional\
    \ predicate on the end means that the singleton applies to every step in the path.\
    \ The XPath path without parentheses expects that the singleton applies to each\
    \ element. For example: `/Root[1]/ProductDescription[1]/Features[1]/Maintenance[1]`.\n\
    \nThe sample syntax adds the attribute `ProductModel` with the value “Mountain-100”\
    \ to the first instance of the `Maintenance` element.\n\nAlso the `modify()` method\
    \ allows you to insert several attributes for an element. To add a list of attributes\
    \ to the element:\n\n1.  Open parentheses after the `insert` directive.\n2.  List\
    \ the attributes separated by a comma.\n3.  Close the parentheses.\n\nThis is\
    \ demonstrated in Listing [5-7](#A435478_1_En_5_Chapter.html#Par49).\n\n```\n\
    DECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription ProductID=\"1\">\n\
    \  <Summary>\n    <Features>\n      <Maintenance>\n        <feature>Vacuum formed\
    \ dual wall polycarbonate</feature>\n        <feature>Dual material molded outer\
    \ shell</feature>\n      </Maintenance>\n    </Features>\n  </Summary>\n</ProductDescription>\n\
    ';\nSET @XMLDoc.modify('insert\n(\nattribute ProductModel {\"Mountain-100\"},\n\
    attribute LaborType {\"Manual\"}\n) into (/Root/ProductDescription/Features/Maintenance)[1]');\n\
    SELECT @XMLDoc;\n```\n\nListing 5-7.\nInserting multiple attributes into the `Maintenance`\
    \ element\n\nThe result is shown in Figure [5-4](#A435478_1_En_5_Chapter.html#Fig4).\n\
    \n![A435478_1_En_5_Fig4_HTML.jpg](A435478_1_En_5_Fig4_HTML.jpg)\n\nFigure 5-4.\n\
    Result of inserting multiple attributes to the `Maintenance` element\n\n## 5-4.\
    \ Inserting XML Attribute Conditionally\n\n### Problem\n\nYou want to insert an\
    \ XML attribute based on a comparison condition.\n\n### Solution\n\nThe `if …\
    \ else` condition can be implemented in the `modify()` method, as shown in Listing\
    \ [5-8](#A435478_1_En_5_Chapter.html#Par53).\n\n```\nDECLARE @XMLDoc xml;\nSET\
    \ @XMLDoc =\n'\n<ProductDescription ProductID=\"1\">\n  <Summary>\n    <Features>\n\
    \      <Maintenance>\n        <feature>Vacuum formed dual wall polycarbonate</feature>\n\
    \        <feature>Dual material molded outer shell</feature>\n      </Maintenance>\n\
    \    </Features>\n  </Summary>\n</ProductDescription>\n';\nSET @XMLDoc.modify('insert\n\
    if (/Root/ProductDescription[@ProductID=1])\nthen attribute ProductModel {\"Road-150\"\
    }\nelse (attribute ProductModel {\"Mountain-100\"} )\ninto (/Root/ProductDescription/Features/Maintenance)[1]');\n\
    SELECT @XMLDoc;\n```\n\nListing 5-8.\nWrapping the attribute insert in an `if-then-else`\
    \ condition\n\nThe result is shown in Figure [5-5](#A435478_1_En_5_Chapter.html#Fig5).\n\
    \n![A435478_1_En_5_Fig5_HTML.jpg](A435478_1_En_5_Fig5_HTML.jpg)\n\nFigure 5-5.\n\
    XML result of conditional attribute insert"
  raw: '### How It Works


    As you can see, there is a small, but significant, difference between Listing
    [5-1](#A435478_1_En_5_Chapter.html#Par4) and Listing [5-3](#A435478_1_En_5_Chapter.html#Par19).
    Listing [5-3](#A435478_1_En_5_Chapter.html#Par19) has an XML namespace defined
    within the XML instance. This small difference affects the modify() method syntax.
    If the modify() method ignores the XML namespace, the XQuery won’t find the target
    XPath path, resulting in no change to the XML, as shown in Listing [5-4](#A435478_1_En_5_Chapter.html#Par21).
    The result is shown in Figure [5-2](#A435478_1_En_5_Chapter.html#Fig2).


    ```

    DECLARE @XMLDoc xml;

    SET @XMLDoc =

    ''


    '';

    SET @XMLDoc.modify(''insert 3 year parts and labor extended maintenance is available
    into (/Root/ProductDescription/Features)[1]'');

    SELECT @XMLDoc;

    Listing 5-4.

    XML namespace causes modify() method to not update target XML

    ```


    The result, shown in Figure [5-2](#A435478_1_En_5_Chapter.html#Fig2), demonstrates
    that this modify() method does not update the source XML.


    ![A435478_1_En_5_Fig2_HTML.jpg](A435478_1_En_5_Fig2_HTML.jpg)


    Figure 5-2.


    Resulting XML when the namepspaces are ignored in the modify() method


    As you can see in Figure [5-2](#A435478_1_En_5_Chapter.html#Fig2), the XML instance
    returned has not changed. To correct the problem, the XML namespace needs to be
    declared inside the modify() method. Therefore, the first pattern for the XML
    instance with the namespace must be the namespace declaration, for example:


    ```

    modify(''declare namespace ns = "http://schemas.microsoft.com/sqlserver/2004/07/
    adventure-works/ProductModelManuInstructions"; ... )

    ```


    The declared name ns is user defined, so you can choose a name to declare the
    namespace as long as it complies with SQL Server naming conventions, such as no
    spaces in the name, the first character is alpha, the following characters are
    alphanumeric, etc. When the namespace is declared, this name needs to be a part
    of each element in the modify() method, for both new and target patterns . For
    example:


    ```

    insert 3 year parts and labor extended maintenance is available into (/ns:Root/ns:ProductDescription/ns:Features)[1]

    ```


    Tip


    Always verify the result after using the modify() method. For example, the parser
    does not throw an error for an ignored namespace declaration, and the action appears
    to complete successfully. However, modify() simply does not apply the XML DML
    action to your XML data.


    As an alternative to the modify() method’s internal namespace declaration syntax,
    it is possible to complete this task with T-SQL’s external `WITH XMLNAMESPACES`
    declaration. When an XML document has one namespace, the default namespace can
    be used, as shown in Listing [5-5](#A435478_1_En_5_Chapter.html#Par29).


    ```

    DECLARE @XMLDoc xml;

    WITH XMLNAMESPACES(default ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'')

    SELECT @XMLDoc =

    ''


    '';

    SET @XMLDoc.modify(''insert 3 year parts and labor extended maintenance is available
    into (/Root/ProductDescription/Features)[1]'');

    Listing 5-5.

    Using WITH XMLNAMESPACES to declare a default XML namespace

    ```


    When you are implementing the WITH XMLNAMESPACES clause, then the SET operator
    will not work. You must implement the SELECT clause instead .


    ## 5-3\. Inserting XML Attributes


    ### Problem


    You want to insert an attribute into an XML element of existing XML data.


    ### Solution


    An attribute is a property of an XML element. Therefore, the modify() method has
    the attribute option to insert an attribute to an element, as shown in Listing
    [5-6](#A435478_1_En_5_Chapter.html#Par33).


    ```

    DECLARE @XMLDoc xml;

    SET @XMLDoc =

    ''


    3 year parts and labor extended maintenance is available


    '';

    SET @XMLDoc.modify(''insert attribute ProductModel {"Mountain-100"} into (/Root/ProductDescription/Features/Maintenance)[1]'');

    SELECT @XMLDoc;

    Listing 5-6.

    Inserting ProductModel attribute into the Maintenance element

    ```


    The result is shown in Figure [5-3](#A435478_1_En_5_Chapter.html#Fig3).


    ![A435478_1_En_5_Fig3_HTML.jpg](A435478_1_En_5_Fig3_HTML.jpg)


    Figure 5-3.


    XML result of inserting an attribute into an element


    ### How It Works


    Chapter [4](#A435478_1_En_4_Chapter.html) explained the XPath path syntaxes for
    elements and attributes are different. Likewise, the modify() method has differences
    as well. First of all, the insert statement has an additional attribute option
    that is not specified when elements are inserted. Second, the attribute is not
    surrounded by angle brackets. Finally, the attribute’s value is placed into curly
    brackets with double quotes immediately following the attribute name. Therefore,
    the syntax to add the attribute has the following patterns:


    1.  The insert attribute keywords indicate you wish to insert an attribute into
    an element.  

    2.  ProductModel {“Mountain-100”} is the attribute’s name and value.  

    3.  into indicates the XPath path of the target element is coming up.  

    4.  (/Root/ProductDescription/Features/Maintenance)[1] is the attribute target
    XPath path. The singleton numeric positional predicate is a required component
    of the target XPath.  


    For example:


    ```

    modify(''insert attribute ProductModel {"Mountain-100"} into (/Root/ProductDescription/Features/Maintenance)[1]'');

    ```


    Wrapping the XPath path in parentheses and then putting the numeric positional
    predicate on the end means that the singleton applies to every step in the path.
    The XPath path without parentheses expects that the singleton applies to each
    element. For example: `/Root[1]/ProductDescription[1]/Features[1]/Maintenance[1].`


    The sample syntax adds the attribute ProductModel with the value “Mountain-100”
    to the first instance of the Maintenance element.


    Also the modify() method allows you to insert several attributes for an element.
    To add a list of attributes to the element :


    1.  Open parentheses after the insert directive.  

    2.  List the attributes separated by a comma.  

    3.  Close the parentheses.  


    This is demonstrated in Listing [5-7](#A435478_1_En_5_Chapter.html#Par49).


    ```

    DECLARE @XMLDoc xml;

    SET @XMLDoc =

    ''


    3 year parts and labor extended maintenance is available


    '';

    SET @XMLDoc.modify(''insert

    (

    attribute ProductModel {"Mountain-100"},

    attribute LaborType {"Manual"}

    ) into (/Root/ProductDescription/Features/Maintenance)[1]'');

    SELECT @XMLDoc;

    Listing 5-7.

    Inserting multiple attributes into the Maintenance element

    ```


    The result is shown in Figure [5-4](#A435478_1_En_5_Chapter.html#Fig4).


    ![A435478_1_En_5_Fig4_HTML.jpg](A435478_1_En_5_Fig4_HTML.jpg)


    Figure 5-4.


    Result of inserting multiple attributes to the Maintenance element


    ## 5-4\. Inserting XML Attribute Conditionally


    ### Problem


    You want to insert an XML attribute based on a comparison condition.


    ### Solution


    The if … else condition can be implemented in the modify() method, as shown in
    Listing [5-8](#A435478_1_En_5_Chapter.html#Par53).


    ```

    DECLARE @XMLDoc xml;

    SET @XMLDoc =

    ''


    3 year parts and labor extended maintenance is available


    '';

    SET @XMLDoc.modify(''insert

    if (/Root/ProductDescription[@ProductID=1])

    then attribute ProductModel {"Road-150"}

    else (attribute ProductModel {"Mountain-100"} )

    into (/Root/ProductDescription/Features/Maintenance)[1]'');

    SELECT @XMLDoc;

    Listing 5-8.

    Wrapping the attribute insert in an if-then-else condition

    ```


    The result is shown in Figure [5-5](#A435478_1_En_5_Chapter.html#Fig5).


    ![A435478_1_En_5_Fig5_HTML.jpg](A435478_1_En_5_Fig5_HTML.jpg)


    Figure 5-5.


    XML result of conditional attribute insert'
