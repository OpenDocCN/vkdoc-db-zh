- fmt: "### Solution\n\nWhen you attempt to shred a typed XML column, as shown in\
    \ Listing [4-20](#A435478_1_En_4_Chapter.html#Par159), the `XPath` paths might\
    \ generate errors.\n\n```\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'\
    \ as df)\nSELECT ProductModelID,\ninstruct.value('.', 'VARCHAR(2000)') AS StepInstruction,\n\
    instruct.value('../@LocationID', 'INT') AS LaborStation,\ninstruct.value('../@LaborHours',\
    \ 'REAL') AS LaborHours,\ninstruct.value('../@LotSize', 'INT') AS LotSize,\ninstruct.value('../@MachineHours',\
    \ 'REAL') AS MachineHours,\ninstruct.value('../@SetupHours', 'REAL') AS SetupHours,\n\
    instruct.value('df:material[1]', 'VARCHAR(100) ') AS Material,\ninstruct.value('df:tool[1]',\
    \ 'VARCHAR(100) ') AS Tool\nFROM Production.ProductModel\nCROSS APPLY Instructions.nodes('df:root/df:Location/df:step')\
    \ prod(instruct);\nListing 4-20.\nFirst attempt at shredding a typed XML column\n\
    ```\n\nThis code, however, generates an error similar to the following:\n\n```\n\
    Msg 9314, Level 16, State 1, Line 2\nXQuery [Production.ProductModel.Instructions.value()]:\
    \ Cannot implicitly atomize or apply 'fn:data()' to complex content elements,\
    \ found type 'df{http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions}:StepType'\
    \ within inferred type 'element(df{http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions}:step,df{http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions}:StepType)'.\n\
    ```\n\nTo fix this error we have to introduce the `XQuery` data accessor function\
    \ `fn:string()` to prevent the error when the `value()` method access a singleton\
    \ atomic instance using the `\"../\"` step operator, as shown in Listing [4-21](#A435478_1_En_4_Chapter.html#Par163).\n\
    \n```\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'\
    \ as df)\nSELECT ProductModelID,\ninstruct.value('fn:string(.)', 'varchar(2000)')\
    \ AS StepInstruction,\ninstruct.value('fn:string(../@LocationID)', 'int') AS LaborStation,\n\
    instruct.value('fn:string(../@LaborHours)', 'real') AS LaborHours,\ninstruct.value('fn:string(../@LotSize)',\
    \ 'int') AS LotSize,\ninstruct.value('fn:string(../@MachineHours)', 'real') AS\
    \ MachineHours,\ninstruct.value('fn:string(../@SetupHours)', 'real') AS SetupHours,\n\
    instruct.value('df:material[1]', 'varchar(100) ') AS Material,\ninstruct.value('df:tool[1]',\
    \ 'varchar(100) ') AS Tool\nFROM Production.ProductModel\nCROSS APPLY Instructions.nodes('df:root/df:Location/df:step')\
    \ prod(instruct);\nListing 4-21.\nApplying the fn:string() function to fix Msg\
    \ 9314 error\n```\n\nThe query result is demonstrated in Figure [4-5](#A435478_1_En_4_Chapter.html#Fig5).\n\
    \n![A435478_1_En_4_Fig5_HTML.jpg](A435478_1_En_4_Fig5_HTML.jpg)\n\nFigure 4-5.\n\
    Result of shredding typed XML column with `fn:string()` function\n\n### How It\
    \ Works\n\n`SQL Server XQuery` implements three data accessor functions:\n*  \
    \ `fn:string()` – extracts the string values of the elements or attributes.\n\
    *   `fn:data()` – extracts scalar (typed) values from the elements or attributes.\n\
    *   `text()` – returns a single value from the elements or attributes.\n\nAs you\
    \ can see, these three functions are very similar in functionality. To examine\
    \ each function’s functionality, let’s analyze the result of Listing [4-22](#A435478_1_En_4_Chapter.html#Par170),\
    \ where the `XML` partially simulates the `XML` from the column `Instructions`.\n\
    \n```\nDECLARE @x XML = '\n<top>\n    <level1>1</level1>\n    <level2>2</level2>\n\
    </top>\n<!-- extra text\nelement -->\n3';\nSELECT @x.query('/top/level1/text()')\
    \ Text_Function,\n@x.query('fn:data(/*)') Data_Function,\n@x.query('fn:string(/*[1])')\
    \ String_Function;\nListing 4-22.\nAnalyzing the data accessor functions. A query()\
    \ method covered in the next Recipe 4-6, “Retrieving a Subset of Your XML  Data”\n\
    ```\n\nThe results of this query are shown in Figure [4-6](#A435478_1_En_4_Chapter.html#Fig6).\n\
    \n![A435478_1_En_4_Fig6_HTML.jpg](A435478_1_En_4_Fig6_HTML.jpg)\n\nFigure 4-6.\n\
    Showing data accessor function results\n\nThe code in Listing [4-22](#A435478_1_En_4_Chapter.html#Par170)\
    \ and its result, shown in Figure [4-6](#A435478_1_En_4_Chapter.html#Fig6), demonstrate\
    \ the data accessor functions:\n*   `text()` function returns single value “1”\
    \ from the element `<level1>`.\n*   `fn:data()` function concatenated.\n*   `fn:string()`\
    \ function requires singleton, and returns values for `level1` and `level2` elements.\n\
    \nFor the solution in Listing [4-22](#A435478_1_En_4_Chapter.html#Par170) the\
    \ `fn:string()` function is most appropriate, because of the local element reference:\
    \ `instruct.value('fn:string(.)', 'varchar(2000)')`. For example, `fn:data()`,\
    \ returns an error, and `text()` function returns a partial value for the `Instructions`\
    \ column, as shown in Listing [4-23](#A435478_1_En_4_Chapter.html#Par177).\n\n\
    ```\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'\
    \ as df)\nSELECT instruct.value('./text()[1]', 'varchar(2000)') AS Step_Instruction_by_text,\n\
    instruct.value('fn:string(.)', 'varchar(2000)') AS Step_Instruction_by_string\n\
    FROM Production.ProductModel\nCROSS APPLY Instructions.nodes('df:root/df:Location/df:step')\
    \ prod(instruct);\nListing 4-23.\nDemonstrating result difference between text()\
    \ and fn:string() functions\n```\n\nThe result of Listing [4-23](#A435478_1_En_4_Chapter.html#Par177)\
    \ is shown in Figure [4-7](#A435478_1_En_4_Chapter.html#Fig7).\n\n![A435478_1_En_4_Fig7_HTML.jpg](A435478_1_En_4_Fig7_HTML.jpg)\n\
    \nFigure 4-7.\nDifference between `text()` and `fn:string()` functions\n\n## 4-6.\
    \ Retrieving a Subset of Your XML Data\n\n### Problem\n\nYou want to return a\
    \ specific subset from your `XML` document and maintain the `XML` format.\n\n\
    ### Solution\n\nThe `query()` method allows you to retrieve a specific part of\
    \ an `XML` instance. Listing [4-24](#A435478_1_En_4_Chapter.html#Par181) demonstrates\
    \ how to query the execution plans from `SQL Server`’s Dynamic Management Views\
    \ (`DMVs`) and retrieve the `Statements` section out of the execution plans.\n\
    \n```\nSELECT TOP (25)\n@@SERVERNAME as ServerName,\nqs.Execution_count as Executions,\n\
    qs.total_worker_time as TotalCPU,\nqs.total_physical_reads as PhysicalReads,\n\
    qs.total_logical_reads as LogicalReads,\nqs.total_logical_writes as LogicalWrites,\n\
    qs.total_elapsed_time as Duration,\nqs.total_worker_time/qs.execution_count as\
    \ [Avg CPU Time],\nDB_NAME(qt.dbid) DatabaseName,\nqt.objectid,\nOBJECT_NAME(qt.objectid,\
    \ qt.dbid) ObjectName,\nqp.query_plan as XMLPlan,\nquery_plan.query('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/showplan\"\
    ;\n//Batch/Statements') as SQLStatements\nFROM sys.dm_exec_query_stats qs\nCROSS\
    \ APPLY sys.dm_exec_sql_text(qs.sql_handle) as qt\nCROSS APPLY sys.dm_exec_query_plan(plan_handle)\
    \ as qp\nWHERE qt.dbid IS NOT NULL\nORDER BY TotalCPU DESC;\nListing 4-24.\nReturning\
    \ SQL Statements XML from the Execution Plan\n```"
