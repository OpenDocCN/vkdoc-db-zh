    2395, … There is no function ‘{urn:schemas-microsoft-com:xml-sql}:Variable( )’。但是，传递给
    `sql:variable( )` 函数的变量名不区分大小写。


    ## 6-6. 与值序列进行比较


    ### 问题


    你需要通过值列表过滤 XML 实例，类似于 T-SQL `WHERE` 子句中的 `IN` 谓词。

    '
- fmt: '## Solution


    Listing [6-13](#A435478_1_En_6_Chapter.html#Par86) demonstrates how to simulate
    the `IN` predicate within an XML instance using the “=`” general comparison operator
    against a sequence of values.


    ```sql

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''TotalPurchaseYTD'', ''MONEY'') AS TotalPurchase,

    ref.value(''DateFirstPurchase'', ''DATE'') AS DateFirstPurchase,

    ref.value(''YearlyIncome'', ''NVARCHAR(20)'') AS YearlyIncome,

    ref.value(''Occupation'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''CommuteDistance'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey[Occupation=("Clerical","Manual",
    "Professional")]'') AS dmg(ref);

    ```


    Listing 6-13. Sending a list of values to filter an XML instance


    The query results are demonstrated in Figure [6-9](#A435478_1_En_6_Chapter.html#Fig9).


    ![A435478_1_En_6_Fig9_HTML.jpg](A435478_1_En_6_Fig9_HTML.jpg)


    Figure 6-9. Showing XQuery result that processed by list of values


    ## How It Works


    The mechanism for filtering an XML instance by a sequence of values is relatively
    simple, but it is not intuitive. The most common mistake that DBAs and Developers
    make is that they try to adopt the `IN` predicate from T-SQL to define this filter.
    However, the solution is much simpler. The syntax to list the values within the
    `nodes()` method is:


    ```xquery

    parentElement[childElement = (value1, value2, value3,...)]

    ```


    When filtering the data by list of values, the difference between T-SQL and XQuery
    is that XQuery syntax uses the equal general comparison operator (`=`), while
    the `IN` predicate in T-SQL uses the `WHERE` clause.


    ## 6-7. Matching a Specified String Pattern


    ### Problem


    You want to filter an XML instance by a string pattern.


    ### Solution


    The XQuery `fn:contains()` function matches a string pattern within an XML element
    or attribute, as shown in Listing [6-14](#A435478_1_En_6_Chapter.html#Par93).


    ```sql

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    Demographics,

    ref.value(''TotalPurchaseYTD'', ''MONEY'') AS TotalPurchase,

    ref.value(''DateFirstPurchase'', ''DATE'') AS DateFirstPurchase,

    ref.value(''YearlyIncome'', ''NVARCHAR(20)'') AS YearlyIncome,

    ref.value(''Occupation'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''CommuteDistance'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey[ ( fn:contains(Occupation[1],
    "Manual" ) ) ]'') AS dmg(ref);

    ```


    Listing 6-14. Searching for the string “Manual” within the Occupation element


    Figure [6-10](#A435478_1_En_6_Chapter.html#Fig10) demonstrates the result.


    ![A435478_1_En_6_Fig10_HTML.jpg](A435478_1_En_6_Fig10_HTML.jpg)


    Figure 6-10. Showing the XQuery result for query where IndividualSurvey element
    matched a value pattern


    ### How It Works


    The XQuery `contains()` function has two arguments:

    1. an XML instance element or attribute

    2. a string pattern


    The `contains()` function returns an `xs:boolean` data type (`true`, `false`)
    depending on whether the element or the attribute value in argument 1 matches
    the string pattern in argument 2. The `contains()` function mechanism is similar
    to the T-SQL `LIKE` operator, when the argument is surrounded by wild cards, for
    example: `''%ARGUMENT%''`, that is, matching any occurrences.


    Unfortunately, SQL Server does not support the XQuery functions `fn:starts-with()`
    and `fn:ends-with()`. However, when your task requires you to filter values using
    `fn:starts-with()` or `fn:ends-with()`-type functionality, you can complete this
    task by using an XQuery and T-SQL hybrid solution, as shown in Listing [6-15](#A435478_1_En_6_Chapter.html#Par100).


    ```sql

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    ),

    Subset AS

    (

    SELECT BusinessEntityID,

    ref.value(''TotalPurchaseYTD'', ''MONEY'') AS TotalPurchase,

    ref.value(''DateFirstPurchase'', ''DATE'') AS DateFirstPurchase,

    ref.value(''YearlyIncome'', ''NVARCHAR(20)'') AS YearlyIncome,

    ref.value(''Occupation'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''CommuteDistance'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey[ fn:contains(Occupation[1],
    "Manual" ) ]'') AS dmg(ref)

    )

    SELECT BusinessEntityID,

    TotalPurchase,

    DateFirstPurchase,

    YearlyIncome,

    Occupation,

    CommuteDistance

    FROM Subset

    WHERE Occupation LIKE ''Manual%'';

    ```


    Listing 6-15. Filtering an XML instance using `fn:contains()` XQuery and T-SQL
    hybrid solution


    Figure [6-11](#A435478_1_En_6_Chapter.html#Fig11) demonstrates the result.


    ![A435478_1_En_6_Fig11_HTML.jpg](A435478_1_En_6_Fig11_HTML.jpg)


    Figure 6-11. Showing the XQuery and T-SQL hybrid solution result


    ## 6-8. Filtering a Range of Values


    ### Problem


    You want to filter an XML instance by a range of values, similar to the T-SQL
    `BETWEEN` operator.


    ### Solution


    The XQuery logical `and` operator can be used to join two predicates to define
    a range filter for an XML instance, as shown in Listing [6-16](#A435478_1_En_6_Chapter.html#Par104).


    ```sql

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''TotalPurchaseYTD'', ''MONEY'') TotalPurchase,

    ref.value(''DateFirstPurchase'', ''DATE'') DateFirstPurchase,

    ref.value(''YearlyIncome'', ''NVARCHAR(20)'') YearlyIncome,

    ref.value(''Occupation'', ''NVARCHAR(15)'') Occupation,

    ref.value(''CommuteDistance'', ''NVARCHAR(15)'') CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey[ TotalPurchaseYTD >= 1000 and
    TotalPurchaseYTD <= 2000 ]'') AS dmg(ref);

    ```


    Listing 6-16. Implementing the value range filter


    The result is demonstrated in Figure [6-12](#A435478_1_En_6_Chapter.html#Fig12).


    ![A435478_1_En_6_Fig12_HTML.jpg](A435478_1_En_6_Fig12_HTML.jpg)


    Figure 6-12. Showing the XQuery result with range of values filter conditions


    ### How It Works


    Setting the value range filter for XQuery uses a method of implementation similar
    to using the T-SQL `WHERE` clause. T-SQL has the `BETWEEN` operator as an additional
    option for the values range filter. However, the XQuery filter `“elementName >=
    value and elementName <= value”` implements the same functionality as the `BETWEEN`
    operator. Therefore, the solution in Listing [6-16](#A435478_1_En_6_Chapter.html#Par104)
    demonstrates the value range filter for XQuery, for example: `‘IndividualSurvey[
    TotalPurchaseYTD >= 1000 and TotalPurchaseYTD <= 2000 ]’`.


    **Caution**

    All operators within XQuery are case sensitive as well. To avoid errors, utilize
    `“and”` `“or”` operators in lowercase only.


    ## 6-9. Filtering by Multiple Conditions


    ### Problem


    You want to filter an XML instance by multiple elements, attributes, or conditions.


    ### Solution


    XQuery provides the `and` and `or` logical operators to create compound predicates,
    which implement multiple filtering conditions against an XML instance, as shown
    in Listing [6-17](#A435478_1_En_6_Chapter.html#Par110).


    ```sql

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''TotalPurchaseYTD'', ''MONEY'') AS TotalPurchase,

    ref.value(''DateFirstPurchase'', ''DATE'') AS DateFirstPurchase,

    ref.value(''YearlyIncome'', ''NVARCHAR(20)'') AS YearlyIncome,

    ref.value(''Occupation'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''CommuteDistance'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey[ TotalPurchaseYTD >= 1001

    and TotalPurchaseYTD < 2000

    and DateFirstPurchase >= xs:date("2004-07-30Z") ]''

    ) AS dmg(ref);

    ```


    Listing 6-17. Implementing multiple filter conditions


    The result is demonstrated in Figure [6-13](#A435478_1_En_6_Chapter.html#Fig13).


    ![A435478_1_En_6_Fig13_HTML.jpg](A435478_1_En_6_Fig13_HTML.jpg)


    Figure 6-13. Showing the XQuery result with multiple filter conditions'
