    ### Problem


    You want to replace all values in a JSON array object.


    ### Solution


    A `JSON_MODIFY()` function replaces all values in a JSON array by specified `Path`
    and `NewValue` arguments. Listing [10-10](#A435478_1_En_10_Chapter.html#Par47)
    demonstrates a Solution section to replace the JSON array. Table [10-5](#A435478_1_En_10_Chapter.html#Tab5)
    demonstrates a side-by-side comparison between the original and modified JSON
    arrays.


    Table 10-5.

    Comparing the JSON result side by side


    | Original JSON | Modified JSON |

    | --- | --- |

    | `{` `"OtherLanguages": [` `"Turkish", "Slovenian"` `],` `"HireDate": "2010-08-24T00:00:00",`
    `"Title": "Team Member"` `}` | `{` `"OtherLanguages": [` `"Dutch", "Latvian",
    "Lithuanian"` `],` `"HireDate": "2010-08-24T00:00:00",` `"Title": "Team Member"`
    `}` |


    ```sql

    SELECT CustomFields, JSON_MODIFY(CustomFields, ''$.OtherLanguages'',

    JSON_QUERY(''["Dutch","Latvian","Lithuanian"]'')) OtherLanguages

    FROM [Application].[People]

    WHERE FullName = ''Isabella Rupp'';

    ```

    Listing 10-10.

    Replacing a JSON array


    ### How It Works


    To replace a JSON array, the `JSON_MODIFY()` function detects and validates an
    argument path and then applies the `newValue` argument to JSON. The `NewValue`
    argument must have a valid JSON array or objects part. For example, `["Dutch",
    "Latvian", "Lithuanian"]` is a valid array part for the `NewValue` argument used
    in Listing [10-10](#A435478_1_En_10_Chapter.html#Par47).


    The nature of the behavior for the `JSON_MODIFY()` function is that the value
    in the `newValue` argument is treated as a string. Therefore, all special characters
    (for example: double quotes, forward slashes, and backslashes) escape with backslash
    `"\\"`. That''s why the `NewValue` argument is surrounded by the `JSON_QUERY()`
    function to remove escape characters.


    The Solution section provides a query for creating a JSON array. However, a similar
    solution is demonstrated in Listing [10-11](#A435478_1_En_10_Chapter.html#Par51)
    for replacing a JSON object. As a reminder: an array is surrounded by square brackets
    and contains a list of values for the same property and type. When an object is
    surrounded by curly braces `{}`, it could have a list of key-value pairs with
    different properties and types. Table [10-6](#A435478_1_En_10_Chapter.html#Tab6)
    demonstrates a side-by-side comparison of an original and modified JSON object.


    Table 10-6.

    Comparing the JSON results side by side


    | Original JSON | Modified JSON |

    | --- | --- |

    | `{` `"theme": "ui-darkness",` `"dateFormat": "dd/mm/yy",` `"timeZone": "PST",`
    `"table": {` `"pagingType": "simple",` `"pageLength": 10` `},` `"favoritesOnDashboard":
    true` `}` | `{` `"theme": "ui-darkness",` `"dateFormat": "dd/mm/yy",` `"timeZone":
    "PST",` `"table": {` `"pagingType": "full",` `"pageLength": 25,` `"pageScope":
    "private"` `},` `"favoritesOnDashboard": true` `}` |


    ```sql

    SELECT [UserPreferences],

    JSON_MODIFY([UserPreferences], ''$.table'',

    JSON_QUERY(''{"pagingType":"full","pageLength":25,"pageScope":"private"}'')   )
    AS ModifiedUserPreferences

    FROM [Application].[People]

    WHERE FullName = ''Isabella Rupp'';

    ```

    Listing 10-11.

    Replacing a JSON object


    An alternate solution could be:

    1.  Delete the `OtherLanguages` array.

    2.  Reinsert the `OtherLanguages` array with the new part.


    The code for this technique is demonstrated in Listing [10-12](#A435478_1_En_10_Chapter.html#Par56).
    The result from the code is shown in Figure [10-7](#A435478_1_En_10_Chapter.html#Fig7).


    ![A435478_1_En_10_Fig7_HTML.jpg](A435478_1_En_10_Fig7_HTML.jpg)

    Figure 10-7.

    Showing the query output


    ```sql

    SELECT CustomFields,

    JSON_MODIFY(

    JSON_MODIFY(CustomFields, ''$.OtherLanguages'', NULL), ''$.OtherLanguages'', JSON_QUERY(''["Dutch","Latvian","Lithuanian"]''))
    OtherLanguages

    FROM [Application].[People]

    WHERE FullName = ''Isabella Rupp'';

    ```

    Listing 10-12.

    Demonstrating the delete and re-insert query


    Inefficiency (I prefer not to use word “problematic” because the code returns
    a correct result) for such a technique is that:

    *   The `OtherLanguages` array moves to the last JSON position, so the array loses
    its original place within the JSON document.

    *   You are required to implement an additional `JSON_MODIFY()` function.


    I would not recommend this technique to replace an object or array.


