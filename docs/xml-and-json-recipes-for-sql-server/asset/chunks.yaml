    \ specified.\n\n### Solution\n\nA secondary value type XML index benefits XQuery\
    \ performance when the path is not fully specified or if it includes a wildcard.\
    \ Listing [7-10](#A435478_1_En_7_Chapter.html#Par58) creates the sample table\
    \ and primary XML index we previously created in Solutions 7-1 and 7-2\\. If you\
    \ have already created this table, then you do not need to recreate it.\n\n```\n\
    -- These settings are important when creating XML indexes\nSET NUMERIC_ROUNDABORT\
    \ OFF;\nSET ARITHABORT ON;\nSET ANSI_NULLS ON;\nSET ANSI_PADDING ON;\nSET ANSI_WARNINGS\
    \ ON;\nSET CONCAT_NULL_YIELDS_NULL ON;\nSET QUOTED_IDENTIFIER ON;\nGO\n-- Drop\
    \ table SQL Server 2016 syntax\nDROP TABLE IF EXISTS dbo.PersonXML\n-- Create\
    \ and populate a table called PersonXML\nCREATE TABLE dbo.PersonXML\n(\nPersonID\
    \ INT NOT NULL,\nFirstName NVARCHAR(30) NOT NULL,\nMiddleName NVARCHAR(20)NULL,\n\
