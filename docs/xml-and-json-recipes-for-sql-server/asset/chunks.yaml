- fmt: '## Summary


    “Filtering XML” 章节演示了如何为 XML 实例实现内部 XQuery 过滤机制。T-SQL `WHERE` 子句提供了比 XQuery 内部过滤更全面的过滤机制。然而，正如前面章节所演示的，XQuery
    拥有过滤 XML 实例的充足能力。


    SQL DBA 和开发人员在过滤 XML 时最常见的误解是，为了简单起见而直接实现 T-SQL `WHERE` 子句。对于处理 XML 实例的过滤过程，这是一种低效的解决方案，因为
    T-SQL `WHERE` 子句在引擎返回结果集时才对 XML 进行过滤，而 XQuery 则直接返回过滤后的值。清单 [6-22](#A435478_1_En_6_Chapter.html#Par145)
    比较了 XQuery 和 `WHERE` 子句两者的执行 CPU 利用率和时间。


    ```

    SET STATISTICS TIME ON;

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''fn:string(TotalPurchaseYTD[1])'', ''MONEY'') AS TotalPurchase,

    ref.value(''fn:string(DateFirstPurchase[1])'', ''DATE'') AS DateFirstPurchase,

    ref.value(''fn:string(YearlyIncome[1])'', ''NVARCHAR (20)'') AS YearlyIncome,

    ref.value(''fn:string(Occupation[1])'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''fn:string(CommuteDistance[1])'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey[Occupation="Manual"]'') AS dmg(ref);

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''fn:string(TotalPurchaseYTD[1])'', ''MONEY'') AS TotalPurchase,

    ref.value(''fn:string(DateFirstPurchase[1])'', ''DATE'') AS DateFirstPurchase,

    ref.value(''fn:string(YearlyIncome[1])'', ''NVARCHAR(20)'') AS YearlyIncome,

    ref.value(''fn:string(Occupation[1])'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''fn:string(CommuteDistance[1])'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey'') AS dmg(ref)

    WHERE ref.value(''fn:string(Occupation[1])'', ''NVARCHAR(15)'') = ''Manual'';

    SET STATISTICS TIME OFF ;

    Listing 6-22.

    Demonstrating execution differences

    ```


    结果如清单 [6-23](#A435478_1_En_6_Chapter.html#Par147) 所示。


    ```

    -- XQuery nodes() filter

    (2384 row(s) affected)

    SQL Server Execution Times:

    CPU time = 235 ms,  elapsed time = 271 ms.

    -- T-SQL WHERE clause

    (2384 row(s) affected)

    SQL Server Execution Times:

    CPU time = 593 ms,  elapsed time = 601 ms.

    Listing 6-23.

    Showing the execution output for XQuery and WHERE clause processes :

    ```


    清单 [6-23](#A435478_1_En_6_Chapter.html#Par147) 中的结果表明，XQuery 的效率比 `WHERE` 子句高出一倍多。因此，XQuery
    过滤应该是你的首选。


    > Note

    > 在你的个人电脑上，返回的性能数字可能不同。


    ## 7. Improving XML Performance


    性能效率始终是 DBA 和开发人员最关心的问题。索引是提高数据传递过程的首选方法。然而，XML 数据的逻辑树结构无法像普通的关系数据那样进行索引。因此，随着
    SQL Server 2005 的推出，Microsoft 为 XML 数据类型列添加了一种索引机制。XML 数据与表中列的标量数据不同，因此 XML 索引机制提供了专门的主
    XML 索引和辅助 XML 索引。在 SQL Server 2012 中，XML 索引通过选择性 XML 索引进行了增强，这提高了对大型 XML 数据的搜索效率。


    ### 7-1 Creating a Primary XML Index


    #### Problem


    你想要改进对 XML 数据类型列的过滤过程。


    #### Solution


    添加主 XML 索引可以改进对 XML 数据类型列的过滤过程。为了演示，我们将创建一个包含 XML 列的新表，向其中填充数据，然后在其上创建主 XML 索引。清单
    [7-1](#A435478_1_En_7_Chapter.html#Par4) 演示了如何在新表的 `Demographic` 列上创建主 XML 索引。图
    [7-1](#A435478_1_En_7_Chapter.html#Fig1) 显示了创建的索引。


    ![A435478_1_En_7_Fig1_HTML.jpg](A435478_1_En_7_Fig1_HTML.jpg)

    图 7-1.

    Showing the created index for a PersonXML table


    ```

    -- These settings are important when creating XML indexes

    SET NUMERIC_ROUNDABORT OFF;

    SET ARITHABORT ON;

    SET ANSI_NULLS ON;

    SET ANSI_PADDING ON;

    SET ANSI_WARNINGS ON;

    SET CONCAT_NULL_YIELDS_NULL ON;

    SET QUOTED_IDENTIFIER ON;

    GO

    -- Drop table SQL Server 2016 syntax

    DROP TABLE IF EXISTS dbo.PersonXML

    -- Create and populate a table called PersonXML

    CREATE TABLE dbo.PersonXML

    (

    PersonID INT NOT NULL,

    FirstName NVARCHAR(30) NOT NULL,

    MiddleName NVARCHAR(20)NULL,

    LastName NVARCHAR(30) NOT NULL,

    Demographics XML NULL,

    CONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED

    (

    PersonID ASC

    )

    );

    GO

    INSERT dbo.PersonXML

    (

    PersonID,

    FirstName,

    MiddleName,

    LastName,

    Demographics

    )

    SELECT BusinessEntityID,

    FirstName,

    MiddleName,

    LastName,

    Demographics

    FROM Person.Person;

    GO

    -- Now create the Primary XML index on the dbo.PersonXML table

    CREATE PRIMARY XML INDEX IX_PXML_PersonXML_Demographics

    ON dbo.PersonXML

    (

    Demographics

    );

    GO

    Listing 7-1.

    Creating a primary XML index

    ```'
  raw: '## Summary


    The “Filtering XML” chapter demonstrates the ability to implement an internal
    XQuery filtering mechanism for the XML instance. The T-SQL `WHERE` clause provides
    a more comprehensive filtering mechanism compared to XQuery internal filtering.
    However, as was demonstrated in the previous recipes, XQuery has sufficient ability
    to filter an XML instance.


    The most common misconceptions that SQL DBAs and Developers make for filtering
    the XML is that they are implementing a T-SQL `WHERE` clause for simplicity. This
    is an inefficient solution to handle the filtering process for XML instances because
    the T-SQL `WHERE` clause filters the XML when the engine returns the result set,
    while the XQuery returns the filtered values. Listing [6-22](#A435478_1_En_6_Chapter.html#Par145)
    compares the execution CPU utilization and time for both XQuery and the `WHERE`
    clause.


    ```

    SET STATISTICS TIME ON;

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''fn:string(TotalPurchaseYTD[1])'', ''MONEY'') AS TotalPurchase,

    ref.value(''fn:string(DateFirstPurchase[1])'', ''DATE'') AS DateFirstPurchase,

    ref.value(''fn:string(YearlyIncome[1])'', ''NVARCHAR (20)'') AS YearlyIncome,

    ref.value(''fn:string(Occupation[1])'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''fn:string(CommuteDistance[1])'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey[Occupation="Manual"]'') AS dmg(ref);

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''fn:string(TotalPurchaseYTD[1])'', ''MONEY'') AS TotalPurchase,

    ref.value(''fn:string(DateFirstPurchase[1])'', ''DATE'') AS DateFirstPurchase,

    ref.value(''fn:string(YearlyIncome[1])'', ''NVARCHAR(20)'') AS YearlyIncome,

    ref.value(''fn:string(Occupation[1])'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''fn:string(CommuteDistance[1])'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey'') AS dmg(ref)

    WHERE ref.value(''fn:string(Occupation[1])'', ''NVARCHAR(15)'') = ''Manual'';

    SET STATISTICS TIME OFF ;

    Listing 6-22.

    Demonstrating execution differences

    ```


    The result is demonstrated in Listing [6-23](#A435478_1_En_6_Chapter.html#Par147).


    ```

    -- XQuery nodes() filter

    (2384 row(s) affected)

    SQL Server Execution Times:

    CPU time = 235 ms,  elapsed time = 271 ms.

    -- T-SQL WHERE clause

    (2384 row(s) affected)

    SQL Server Execution Times:

    CPU time = 593 ms,  elapsed time = 601 ms.

    Listing 6-23.

    Showing the execution output for XQuery and WHERE clause processes :

    ```


    The result in Listing [6-23](#A435478_1_En_6_Chapter.html#Par147) demonstrates
    that XQuery is more than twice as efficient as compared to the `WHERE` clause.
    Therefore, XQuery filtering should be your first choice.


    Note


    The output on your PC could return different performance numbers.


    # 7. Improving XML Performance


    Performance efficiency is always a top concern for DBAs and developers. Indexes
    are a front runner to improve data delivery processes. However, the logical tree
    structure of XML data cannot be indexed in the same way as plain old relational
    data. Therefore, with the introduction of SQL Server 2005, Microsoft added an
    indexing mechanism for XML data type columns. XML data is not the same as scalar
    data in a table’s column, therefore the XML indexing mechanism provides for specialized
    primary and secondary XML indexes. In SQL Server 2012, the XML indexes are enhanced
    with a Selective XML Index, which provides an improvement in search efficiency
    for big XML data.


    ## 7-1 Creating a Primary XML Index


    ### Problem


    You want to improve the filtering processes on an XML data type column .


    ### Solution


    Adding a primary XML index can improve the filtering processes on an XML data
    type column. To demonstrate, we will create a new table with an XML column, populate
    it with data, and then create a primary XML index on it. Listing [7-1](#A435478_1_En_7_Chapter.html#Par4)
    demonstrates how to create a primary XML index on the Demographic column of our
    new table. Figure [7-1](#A435478_1_En_7_Chapter.html#Fig1) displays a created
    index.


    ![A435478_1_En_7_Fig1_HTML.jpg](A435478_1_En_7_Fig1_HTML.jpg)


    Figure 7-1.


    Showing the created index for a PersonXML table


    ```

    -- These settings are important when creating XML indexes

    SET NUMERIC_ROUNDABORT OFF;

    SET ARITHABORT ON;

    SET ANSI_NULLS ON;

    SET ANSI_PADDING ON;

    SET ANSI_WARNINGS ON;

    SET CONCAT_NULL_YIELDS_NULL ON;

    SET QUOTED_IDENTIFIER ON;

    GO

    -- Drop table SQL Server 2016 syntax

    DROP TABLE IF EXISTS dbo.PersonXML

    -- Create and populate a table called PersonXML

    CREATE TABLE dbo.PersonXML

    (

    PersonID INT NOT NULL,

    FirstName NVARCHAR(30) NOT NULL,

    MiddleName NVARCHAR(20)NULL,

    LastName NVARCHAR(30) NOT NULL,

    Demographics XML NULL,

    CONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED

    (

    PersonID ASC

    )

    );

    GO

    INSERT dbo.PersonXML

    (

    PersonID,

    FirstName,

    MiddleName,

    LastName,

    Demographics

    )

    SELECT BusinessEntityID,

    FirstName,

    MiddleName,

    LastName,

    Demographics

    FROM Person.Person;

    GO

    -- Now create the Primary XML index on the dbo.PersonXML table

    CREATE PRIMARY XML INDEX IX_PXML_PersonXML_Demographics

    ON dbo.PersonXML

    (

    Demographics

    );

    GO

    Listing 7-1.

    Creating a primary XML index

    ```'
