    Reference to child-level sets in OPENJSON function WITH clause. The child object
    name must be in nvarchar(MAX) data type and set AS JSON object. For example: [Tables]
    nvarchar(MAX) AS JSON .


    The SELECT clause delivered a result using created aliases in the FROM clause:


    ```

    SELECT db.[Database]    -- first level

    , tbl.SchemaName -- second level

    , tbl.TableName  -- second level

    , clmn.ColumnName -- third level

    ```


    ## 9-7\. Indexing JSON


    ### Problem


    You want to improve JSON filtering with an index.


    ### Solution


    To create an index for a JSON document, you need to add a computed column for
    a JSON scalar value, then create an index on this column. Listing [9-24](#A435478_1_En_9_Chapter.html#Par111)
    demonstrates how to add the index for a JSON value to an existing table. The index
    is created for a JSON value shown in Figure [9-10](#A435478_1_En_9_Chapter.html#Fig10).


    ![A435478_1_En_9_Fig10_HTML.jpg](A435478_1_En_9_Fig10_HTML.jpg)


    Figure 9-10.


    Showing JSON index


    ```

    USE [WideWorldImporters];

    SET ANSI_NULLS ON;

    ALTER TABLE [Sales].[Invoices] ADD ConNote AS

    CAST(JSON_VALUE([ReturnedDeliveryData], ''$.Events[0].ConNote'') AS varchar(20))
    PERSISTED

    CREATE  INDEX IX_Sales_Invoices_ConNote

    ON [Sales].[Invoices]

    (

    [ConNote]

    )INCLUDE(

    [InvoiceDate]

    ,[DeliveryInstructions]

    ,[TotalDryItems]

    ,[TotalChillerItems]

    ,[ConfirmedDeliveryTime]

    ,[ConfirmedReceivedBy]

    );

