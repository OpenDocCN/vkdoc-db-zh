  trans: "# 显示常规菜单配置\n\n“获取 XML 内容”任务的查询没有任何参数。要设置正确的参数，请单击“结果集”菜单。我们在“常规”菜单中设置的查询将\
    \ XML 作为标量 CLOB（字符大对象）值返回。因此，我们将把返回的结果绑定到先前创建的某个变量。从“变量名”下拉列表中，选择 `XMLData_Content`\
    \ 变量。将“结果名称”属性设置为 `0`。由于我们没有为结果集命名，将其设置为 `0` 将选择结果集的第一列。图 3-9 说明了结果集菜单的配置。\n\n\
    ![A435478_1_En_3_Fig9_HTML.jpg](img/A435478_1_En_3_Fig9_HTML.jpg)\n\n**图 3-9.\
    \ 显示结果集菜单配置**\n\n执行 SQL 任务“获取 XML 内容”没有设置表达式。因此，按“确定”完成任务配置。\n\n![A435478_1_En_3_Fig12_HTML.jpg](img/A435478_1_En_3_Fig12_HTML.jpg)\n\
    \n**图 3-12. 显示脚本任务管理器属性**\n\n## 显示如何为变量设置表达式\n\n下一步是为 `TimeStamp` 变量设置表达式。在真实的生产环境中，大多数\
    \ XML 文件名都应包含时间戳。时间戳有多种格式选项，应根据客户或业务需求选择最合适的格式。例如，我见过最常实现的格式是 `yyyyMMdd_HHmmss`。对于这个值，SSIS\
    \ 包必须使用不同于 T-SQL 甚至 .NET 应用程序的语法。例如，清单 3-3 演示了用于获取日期时间戳的 SSIS 语法。\n\n```csharp\n\
    (DT_STR, 4, 1252) DATEPART(\"yyyy\", GETDATE()) +\nRIGHT(\"0\" + (DT_STR, 2, 1252)\
    \ DATEPART(\"mm\", GETDATE()),2) +\nRIGHT(\"0\" + (DT_STR, 2, 1252) DATEPART(\"\
    dd\", GETDATE()),2)  + \"_\" +\nRIGHT(\"0\" + (DT_STR, 2, 1252) DATEPART(\"hh\"\
    , GETDATE()),2)  +\nRIGHT(\"0\" + (DT_STR, 2, 1252) DATEPART(\"mi\", GETDATE()),2)\
    \  +\nRIGHT(\"0\" + (DT_STR, 2, 1252) DATEPART(\"ss\", GETDATE()),2)\n```\n\n\
    **清单 3-3. 显示 SSIS 语法**\n\n要设置变量表达式：\n\n![A435478_1_En_3_Fig10_HTML.jpg](img/A435478_1_En_3_Fig10_HTML.jpg)\n\
    \n**图 3-10. 显示如何为变量设置表达式**\n\n*   右键单击包字段。从弹出菜单中选择“变量”。\n*   单击“表达式”部分中的变量按钮以加载“表达式生成器”窗体。\n\
    *   将清单 3-3 中的代码放入“表达式”文本框。\n*   单击“计算表达式”按钮以验证表达式代码。\n*   单击“确定”按钮以完成设置。图 3-10\
    \ 说明了如何为变量设置表达式。\n\n## 显示脚本任务管理器属性\n\n脚本任务“创建 XML 文件”，顾名思义，将 XML 文件写入目标文件路径，该路径通过\
    \ SSIS 包的 `FileDestinationPath` 变量分配，该变量具有公共接口，在包外部可见。脚本任务是一个编程模块，开发人员可以在其中使用\
    \ C# 和 VB.NET 语言编写实现功能的代码，这使得脚本任务在 SQL Server 开发人员中非常受欢迎。然而，脚本任务可以简化并扩展 SSIS 包的功能。对于脚本任务“创建\
    \ XML 文件”，需要使用几行代码来完成该过程。要配置该任务：\n\n*   从工具箱中将“脚本任务”拖到开发区域。\n*   将名称更改为“创建 XML\
    \ 文件”。\n*   将“获取 XML 内容”任务与“创建 XML 文件”任务链接起来。单击“获取 XML 内容”任务，抓住绿色箭头，拖动到“创建 XML\
    \ 文件”任务上，然后释放鼠标。这将在两个任务之间创建一个优先级约束（此包不需要配置优先级约束）。参见图 3-11，说明了优先级约束的初始化。\n\n![A435478_1_En_3_Fig11_HTML.jpg](img/A435478_1_En_3_Fig11_HTML.jpg)\n\
    \n**图 3-11. 在任务之间创建优先级约束**\n\n*   要加载脚本任务管理器，请双击“创建 XML 文件”任务。\n*   默认情况下，脚本任务管理器的\
    \ `ScriptLanguage` 设置为 `Microsoft Visual C# 2015`（Microsoft Visual Basic 2015\
    \ 是另一个选项；但是，本示例将使用 C#），并且在脚本任务编辑器中 `EntryPoint` 属性设置为 `“Main”`（脚本首先执行的函数名）。\n\
    *   此任务中的变量无需更改。因此，单击 `ReadOnlyVariables` 属性以将变量绑定到任务。在属性的右侧，单击按钮以加载包变量列表。在变量\
    \ `User::FileDestinationPath`、`User::TimeStamp`、`User::XMLData_Content` 旁边放置一个勾选标记，然后单击“确定”。\n\
    *   单击“编辑脚本…”按钮以加载编程模块。图 3-12 说明了脚本任务管理器属性。\n\n**提示**\n\n在单击“编辑脚本…”按钮之前，请高亮显示并复制所有已选择的变量。您稍后在代码模块中将需要它们。另外，请记住，在代码中引用变量名时，它们是区分大小写的。\n\
    \n当脚本编辑器窗口加载后，转到 `Main()` 函数。默认情况下，`Main()` 包含清单 3-4 中所示的代码。\n\n```csharp\npublic\
    \ void Main()\n{\n    // TODO: Add your code here\n    Dts.TaskResult = (int)ScriptResults.Success;\n\
    }\n```\n\n**清单 3-4. 显示 Main() 函数的默认代码**\n\n首先，将值 `“TODO: Add your code here”`\
    \ 替换为已保存的变量列表。保留 `“//”`，因为它表示注释。接下来，声明两个字符串变量并重新分配包变量的值（使用您保存的变量引用）。`Main()` 函数变量\
    \ `strFilePath` 的结果将是 XML 文件路径；因此，包变量 `FileDestinationPath` 被硬编码为 `“Categories_”`\
    \ 加上包变量 `TimeStamp` 和 `“.xml”` 作为文件扩展名，指示 XML 文件的目标路径。\n\n`Main()` 函数的第二部分实际将\
    \ XML 文件写入存储。我们需要创建一个 `StreamWriter` 对象的实例。`StreamWriter` 类属于 `System.IO` 命名空间，该命名空间不是编程模块的默认命名空间的一部分，这意味着我们有两种选择：在代码中添加\
    \ `“using System.IO;”` 语句，或者使用 `System.IO` 命名空间作为完全限定符来引用 `StreamWriter` 类。因此，我们只需要一行代码来实例化\
    \ `StreamWriter` 类。在下面的例子中，我们将在 `Main()` 函数的代码中使用第二个选项。清单 3-5 中的代码演示了用于写入文件的 C#\
    \ 代码。\n\n```csharp\npublic void Main()\n{\n    // User::FileDestinationPath,User::TimeStamp,User::XMLData_Content\n\
    \    string strFilePath = Dts.Variables[\"User::FileDestinationPath\"].Value.ToString()\
    \ + @\"\\\\Categories_\" + Dts.Variables[\"User::TimeStamp\"].Value.ToString()\
    \ + \".xml\";\n    string strXML = Dts.Variables[\"User::XMLData_Content\"].Value.ToString();\n\
    \    System.IO.StreamWriter file = new System.IO.StreamWriter(strFilePath);\n\
    \    file.Write(strXML);\n    file.Close();\n    Dts.TaskResult = (int)ScriptResults.Success;\n\
    }\n```\n\n**清单 3-5. 用于写入 XML 文件的函数编码**\n\n要完成脚本任务，请保存并关闭脚本编辑器窗口。单击脚本任务的“确定”按钮。您的\
    \ SSIS 包现在可以进行测试了。\n\n## 测试 SSIS 包\n\n要测试 SSIS 包，请按“开始”按钮。当 SSIS 成功完成时，每个任务上都会显示带有复选标记的绿色圆圈。图\
    \ 3-13 说明了 SSIS 包成功完成的情况。\n\n![A435478_1_En_3_Fig13_HTML.jpg](img/A435478_1_En_3_Fig13_HTML.jpg)\n\
    \n**图 3-13. 测试 SSIS 包**"
- fmt: '要停止 SSIS 包，请按红色方块按钮，或单击包底部的“Package execution completed with success”链接。图
    [3-14](#A435478_1_En_3_Chapter.html#Fig14) 说明了停止包的选项。


    ![A435478_1_En_3_Fig14_HTML.jpg](A435478_1_En_3_Fig14_HTML.jpg)


    图 3-14. 显示切换包到设计模式的选项


    至此，SSIS 包开发完成，XML 文件已在指定目标文件夹 `C:\TEMP` 中创建。


    ### 工作原理


    SSIS 包 `Get XML Content` 中的 `Execute SQL Task` 向 SQL Server 提交查询。`Connection Manager`
    提供对 SQL Server 实例和数据库名称的引用，必要时还包括连接凭据。查询结果被赋值给包级变量 `XMLData_Content`。`TimeStamp`
    变量的表达式计算日期和时间，以提供唯一性并防止文件冲突。


    `Create XML File` `Script Task` 执行 C# 代码，将 XML 结果写入文件。包变量提供文件内容和 XML 文件路径。


    ## 3-3. 从存储过程加载 XML


    ### 问题


    你想利用 T-SQL 从一个或多个源位置读取 XML 文件。


    ### 解决方案


    SQL Server 能够读取 XML 文件内容并将 XML 写入表中。将文件写入存储与从存储将 XML 数据写入表（加载 XML）的机制是不同的。当文件写入存储时，我们处理的是每个文件一个
    XML 输出。然而，当加载文件时，源位置可能有一个或多个文件。因此，T-SQL 代码需要解决以下问题：


    *   获取符合特定条件的文件名；例如，所有扩展名为 `.xml` 的文件。

    *   访问每个文件并读取文件内容。

    *   将文件内容加载（`INSERT`）到表中。


    代码清单 [3-6](#A435478_1_En_3_Chapter.html#Par115) 演示了此问题的解决方案。


    ```sql

    CREATE PROCEDURE dbo.usp_LoadXMLFromFile

    @FilePath nvarchar(100)

    AS

    BEGIN

    SET NOCOUNT ON;

    -- Prepare log table

    DECLARE @cmd TABLE

    (

    name NVARCHAR(35),

    minimum INT,

    maximum INT,

    config_value INT,

    run_value INT

    );

    DECLARE @run_value        INT;

    -- Save original configuration set

    INSERT @cmd

    (

    name,

    minimum,

    maximum,

    config_value,

    run_value

    )

    EXEC sp_configure ''xp_cmdshell'';

    SELECT @run_value = run_value

    FROM @cmd;

    IF @run_value = 0

    BEGIN

    -- Enable xp_cmdshell

    EXEC sp_configure ''xp_cmdshell'', 1;

    RECONFIGURE;

    END;

    IF NOT EXISTS

    (

    SELECT *

    FROM sys.objects

