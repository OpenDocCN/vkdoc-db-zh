    \    ID int IDENTITY(1,1) PRIMARY KEY\n    ,XMLFileName nvarchar(300)\n    ,XML_LOAD\
    \ XML, Created datetime\n    )\n    ELSE\n    TRUNCATE TABLE _XML\n    ```\n\n\
    3.  为处理需求声明多个变量：\n\n    ```\n    @DOS nvarchar(300) = '' – 准备 DOS 命令。\n    @DirBaseLocation\
    \ nvarchar(500) – 验证并格式化源路径。\n    @FileName nvarchar(300) – 用于获取文件名。\n    @SQL\
    \ nvarchar(1000) = '' – 准备用于 INSERT 过程的 SQL。\n    @files TABLE – 用于从源位置获取所有文件名。\n\
    \    ```\n\n4.  验证最后一个字符是反斜杠 (`\\`)。我们需要确保存储过程接收到以 `\\` 结尾的有效路径。如果缺少最后一个反斜杠，则需要向提供的路径添加一个反斜杠。例如：\n\
    \n    ```\n    IIF(RIGHT(@FilePath, 1) = '\\', @FilePath, @FilePath + '\\');\n\
    \    ```\n\n    `IIF` 函数由 SQL Server 2012 版引入。该函数有三个参数：\n    1.  条件 - `RIGHT(@FilePath,\
    \ 1) = '\\'` 用于检查最后一个字符是否为 `\\`。\n    2.  真值结果 - 当找到该字符时，不执行任何操作。\n    3.  假值结果\
    \ - 当未找到时，向参数添加 `\\`。\n5.  准备 Windows 命令解释器命令，以从源位置获取所有文件的列表。Windows 命令解释器命令 `dir`\
    \ 返回指定路径下的所有文件和子目录。但是，`dir` 命令除了文件名外还返回其他信息。`\"/B\"` 表示使用裸格式（仅文件名），`\"/O:-D\"\
    ` 指定按创建日期降序排序。\n\n    ```\n    SET @DOS = 'dir /B /O:-D ' + @DirBaseLocation \
    \ ;\n    ```\n\n6.  扩展存储过程 `xp_cmdshell` 执行 Windows 命令解释器命令，并将源位置的所有可用文件插入。\n\n\
    \    ```\n    INSERT @files\n    EXEC master..xp_cmdshell @DOS;\n    ```\n\n7.\
    \  接下来，我们需要遍历扩展名为 `\".xml\"` 的每个文件。这可以通过为表变量声明游标并在游标上建立循环来完成。\n\n    ```\n   \
    \ DECLARE cur CURSOR\n    FOR     SELECT XMLFile\n    FROM @files\n    WHERE XMLFile\
    \ like '%.xml';\n    OPEN cur;\n    FETCH NEXT\n    FROM cur\n    INTO @FileName;\n\
    \    WHILE @@FETCH_STATUS = 0\n    ```\n\n8.  在 `WHILE` 循环内，我们需要为每个文件组合 `INSERT`\
    \ 语句，该语句读取文件内容并将 XML 插入 `_XML` 表。例如：\n\n    ```\n    INSERT INTO _XML\n    SELECT\
    \ 'C:\\TEMP\\Categories.xml', X, GETDATE()\n    FROM OPENROWSET(BULK N'C:\\TEMP\\\
    Categories.xml', SINGLE_BLOB) AS tempXML(X);\n    ```\n\n    上述 SQL 代码的关键是 `OPENROWSET()`\
    \ 函数。`BULK` 选项指定我们将从源文件中批量读取所有内容。然后是 `BULK` 后面的一个空格，接着是文件位置。`SINGLE_BLOB` 选项指定文件内容作为单列返回，数据类型为\
    \ `VARBINARY(MAX)`，这非常适合 XML 数据。别名语法 `AS tempXML(X)` 必须是 `table(column)` 格式：\n\
    \    *   `tempXML` – 表别名\n    *   `X` – 列别名\n    其他 `OPENROWSET` 选项 `SINGLE_CLOB`（返回\
    \ `varchar(max)`）和 `SINGLE_NCLOB`（返回 `nvarchar(max)`）不适合 XML 导入数据，因为只有 `SINGLE_BLOB`\
    \ 支持所有 Windows 编码转换。\n9.  系统存储过程 `sp_executesql` 执行组合好的 SQL。\n\n    ```\n    EXECUTE\
    \ sp_executesql @SQL ;\n    ```\n\n10. 错误处理程序允许进程运行，并返回有问题的 SQL 的错误详情。可选地，您可以创建一个表来记录错误。运行存储过程的代码示例：\n\
    \n    ```\n    EXEC dbo.usp_LoadXMLFromFile 'C:\\Temp'\n    ```\n\n但是，缺点是您将丢失错误处理程序日志记录，并且如果正在加载的其中一个文件失败，则该文件将不会被加载。\n\
    \n## 3-4. 从 SSIS 包加载 XML\n\n### 问题\n\n您希望使用一个 SSIS ETL 包将一个或多个 XML 文件加载到数据库中。\n"
- fmt: "## Solution\n\nSSIS 提供了一套全面的工具，用于从指定目录加载 XML 文件。\n\n一个用于加载多个 XML 文件的 SSIS\
    \ 包，比 Recipe 3-2 “Creating XML from an SSIS Package” 中展示的写入 XML 文件的 SSIS 包更复杂。`LoadXMLFromFile`\
    \ 这个 SSIS 包是基于以下业务规则创建的：\n\n1.  检查源目录中是否存在 `.xml` 文件。\n2.  如果在源位置未找到文件，则停止包执行。\n\
    3.  如果找到匹配的文件，则截断目标表。\n4.  从所有可用的 `.xml` 扩展名文件加载 XML 内容。\n5.  将所有已处理的文件移动到 Archive\
    \ 文件夹。\n\n`LoadXMLFromFile` SSIS 包由以下部分组成：\n\n![A435478_1_En_3_Fig15_HTML.jpg](A435478_1_En_3_Fig15_HTML.jpg)\n\
    *图 3-15. 展示设计模式下的 `LoadXMLFromFile` SSIS 包*\n\n1.  一个“Check If File Exists”脚本任务，它使用\
    \ C# 代码来验证源位置是否存在任何 XML 文件。\n2.  优先级约束（在“Check If File Exists”和“Truncate Table”之间的绿色箭头）公式有条件地验证\
    \ `FlagIsFileExist` 变量，并扮演“停止”或“继续”的角色。\n3.  一个执行 SQL 任务“Truncate Table”，有条件地执行\
    \ T-SQL 代码来创建或截断表。\n4.  “Load XML Content” 循环容器遍历 XML 文件。\n5.  “Insert XML Data”\
    \ 执行 SQL 任务执行一条 T-SQL 语句，将 XML 文件内容插入到 `_XML` 表中。\n6.  “Archive File” 文件系统任务将\
    \ XML 文件移动到 Archive 文件夹。图 [3-15](#A435478_1_En_3_Chapter.html#Fig15) 展示了该 SSIS\
    \ 包。\n\n创建了以下 SSIS 包变量以提供包的灵活性和功能：\n\n1.  `ArchiveFile` – 为文件系统任务“Archive File”提供\
    \ `DestinationVariable` 属性。使用表达式 `@[User::ArchiveLocation] + @[User::FileName]`\
    \ 创建。\n2.  `ArchiveLocation` – 提供存档文件夹的目标路径。\n3.  `FileName` – 映射到循环容器“Load XML\
    \ Content”。从每次迭代中获取 XML 文件名。\n4.  `FlagIsFileExist` – 被赋予 `true` 或 `false` 值，并控制优先级约束表达式。\n\
    5.  `SourceFile` – 为文件系统任务“Archive File”提供 `SourceVariable`。创建表达式 `@[User::SourceLocation]\
    \ + @[User::FileName]`。\n6.  `SourceLocation` – 提供源文件夹的源路径。\n7.  `SQLScript` –\
    \ 组合 T-SQL 以将 XML 内容插入到 `_XML` 表中，使用以下表达式：\n\n```sql\n\"INSERT INTO _XML\nSELECT\
    \ '\" + @[User::SourceLocation]  + @[User::FileName] + \"', X, GETDATE()\nFROM\
    \ OPENROWSET(BULK N'\" + @[User::SourceLocation]  + @[User::FileName] + \"', SINGLE_BLOB)\
    \ as tempXML(X)\"\n```\n\n图 [3-16](#A435478_1_En_3_Chapter.html#Fig16) 展示了变量列表。\n\
    \n![A435478_1_En_3_Fig16_HTML.jpg](A435478_1_En_3_Fig16_HTML.jpg)\n*图 3-16. 展示\
    \ SSIS 包变量列表*\n\n现在我们将讨论任务的配置。在本教程中，我不会深入太多细节，因为 Recipe 3-2 已经详细涵盖了这个主题。\n\n1.\
    \  **脚本任务 “Check If File Exists”。** 这次，脚本任务检查源位置是否有扩展名为 `.xml` 的文件。没有其他任务能提供此功能。两个变量被映射到该任务：\n\
    \n![A435478_1_En_3_Fig17_HTML.jpg](A435478_1_En_3_Fig17_HTML.jpg)\n*图 3-17. 演示脚本任务变量映射*\n\
    \    *   `SourceLocation` – `ReadOnlyVariable`。\n    *   `FlagIsFileExist` – `ReadWriteVariable`。代码可以修改该变量值。图\
    \ [3-17](#A435478_1_En_3_Chapter.html#Fig17) 展示了变量。点击 `Edit Script` 命令按钮。将以下代码添加到\
    \ `Main()` 函数中：\n\n```csharp\n    Dts.Variables[\"User::FlagIsFileExist\"].Value\
    \ =              (System.IO.Directory.GetFiles(Dts.Variables[\"User::SourceLocation\"\
    ].Value.ToString(), \"*.xml\").Length != 0);\n```\n\n保存然后关闭代码窗口。点击 `OK` 命令按钮完成设置。\n\
    2.  **优先级约束（在 “Check If File Exists” 和 “Truncate Table” 之间的绿色箭头）。** 要打开优先级约束编辑器，请双击箭头。在优先级约束编辑器中：\n\
    \    *   选择 `Evaluation operation`: `Expression`\n    *   对于 `Expression` 属性，键入表达式：`@[User::FlagIsFileExist]\
    \ == true`\n    点击 `OK` 保存设置。图 [3-18](#A435478_1_En_3_Chapter.html#Fig18) 展示了优先级约束编辑器。\n\
    \n![A435478_1_En_3_Fig18_HTML.jpg](A435478_1_En_3_Fig18_HTML.jpg)\n*图 3-18. 展示优先级约束编辑器设置*\n\
    3.  **执行 SQL 任务 “Truncate Table”。** 在 `General` 菜单上打开执行 SQL 任务编辑器：\n    *   对于\
    \ `Connection` 属性，添加一个新连接。指定目标服务器和数据库。\n    *   将以下代码添加到 `SQLStatement` 属性：\n\n\
    ```sql\n    IF NOT EXISTS (SELECT * FROM sys.objects\n    WHERE object_id = OBJECT_ID(N'[dbo].[_XML]')\
    \ AND type in (N'U'))\n    CREATE TABLE _XML\n    (\n    ID int IDENTITY(1,1)\
    \ PRIMARY KEY\n    ,XMLFileName nvarchar(300)\n    ,XML_LOAD XML, Created datetime\n\
    \    )\n    ELSE\n    TRUNCATE TABLE _XML\n```\n\n点击 `OK` 完成设置。图 [3-19](#A435478_1_En_3_Chapter.html#Fig19)\
    \ 展示了执行 SQL 任务编辑器。\n\n![A435478_1_En_3_Fig19_HTML.jpg](A435478_1_En_3_Fig19_HTML.jpg)\n\
    *图 3-19. 展示执行 SQL 任务设置*\n4.  **“Load XML Content” 循环容器。** 打开循环容器编辑器并点击 `Collect`\
    \ 菜单：\n\n![A435478_1_En_3_Fig21_HTML.jpg](A435478_1_En_3_Fig21_HTML.jpg)\n*图 3-21.\
    \ 演示收集菜单设置*\n    *   选择 `An expression`，然后加载表达式属性编辑器。\n    *   选择 `Directory`\
    \ 属性并添加表达式：`@[User::SourceLocation]`。\n    *   点击 `OK` 完成设置。图 [3-20](#A435478_1_En_3_Chapter.html#Fig20)\
    \ 展示了表达式属性编辑器。表达式值反映在 `Folder` 属性中。\n\n![A435478_1_En_3_Fig20_HTML.jpg](A435478_1_En_3_Fig20_HTML.jpg)\n\
    *图 3-20. 展示表达式属性编辑器*\n    *   在 `Files` 属性中，键入目标文件名模式，即 Windows 文件名模式。它在模式中使用\
    \ Windows 文件名通配符。由于我们搜索所有 XML 文件进行迭代，因此使用扩展名模式 `*.xml` 来过滤掉除 XML 文件外的所有文件。\n \
    \   *   对于 `Retrieve the file name` 属性，选择 `Name and extension`。图 [3-21](#A435478_1_En_3_Chapter.html#Fig21)\
    \ 展示了收集菜单。\n5.  点击 `Variable Mapping` 菜单。从下拉列表中选择 `FileName` 变量。图 [3-22](#A435478_1_En_3_Chapter.html#Fig22)\
    \ 展示了变量映射菜单。点击 `OK` 完成设置。\n\n![A435478_1_En_3_Fig22_HTML.jpg](A435478_1_En_3_Fig22_HTML.jpg)\n\
    *图 3-22. 映射 FileName 变量*\n6.  **“Insert XML Data” 执行 SQL 任务。** 打开执行 SQL 任务编辑器。默认将显示\
    \ `General` 选项卡。\n    *   选择先前在上一个执行 SQL 任务中使用的现有连接。\n    *   在 `SQLStatement`\
    \ 属性中，键入 `exec sp_executesql ?`。问号指定该任务将有一个输入变量作为参数。图 [3-23](#A435478_1_En_3_Chapter.html#Fig23)\
    \ 展示了 `General` 菜单。\n\n![A435478_1_En_3_Fig23_HTML.jpg](A435478_1_En_3_Fig23_HTML.jpg)\n\
    *图 3-23. 展示常规菜单设置*\n点击 `Parameter Mapping` 菜单。\n\n![A435478_1_En_3_Fig24_HTML.jpg](A435478_1_En_3_Fig24_HTML.jpg)\n\
    *图 3-24.*"
  raw: "### Solution\n\nSSIS provides a comprehensive set of tools to load XML files\
    \ from a specified directory.\n\nAn SSIS package to load multiple XML files is\
    \ more complex than the SSIS package that writes an XML file, shown in Recipe\
    \ 3-2, “Creating XML from an SSIS Package.” The SSIS package LoadXMLFromFile is\
    \ created based on the following business rules:\n\n1.  Check whether.xml files\
    \ exist in the source directory.  \n2.  If no files are found in the source location,\
    \ stop package execution.  \n3.  If matching files are found, truncate the destination\
    \ table.  \n4.  Load XML content from all available files with the .xml extension.\
    \  \n5.  Move all processed files into an Archive folder .\n\nThe LoadXMLFromFile\
    \ SSIS package is composed of:\n\n![A435478_1_En_3_Fig15_HTML.jpg](A435478_1_En_3_Fig15_HTML.jpg)\n\
    \nFigure 3-15.\n\nShowing “LoadXMLFromFile ” SSIS package in design mode\n\n1.\
    \  A “Check If File Exists” Script Task, which uses C# code to verify whether\
    \ any XML files exist in the source location.  \n2.  The Precedence Constraint\
    \ (green arrow between “Check If File Exists” and “Truncate Table”) formula conditionally\
    \ verifies the FlagIsFileExist variable and plays the “STOP” or “GO” role.  \n\
    3.  An Execute SQL Task “Truncate Table” conditionally executes T-SQL code to\
    \ CREATE or TRUNCATE the table.  \n4.  The “Load XML Content” Foreach Loop Container\
    \ iterates through the XML files.  \n5.  The “Insert XML Data” Execute SQL Task\
    \ executes a T-SQL statement that inserts the XML file content into the _XML table.\
    \  \n6.  The “Archive File” File System Task moves the XML file into the Archive\
    \ folder. Figure [3-15](#A435478_1_En_3_Chapter.html#Fig15) illustrates the SSIS\
    \ package.\n\nThe following SSIS package variables were created to provide package\
    \ flexibility and functionality :\n\n1.  ArchiveFile – Supplies the File System\
    \ Task “Archive File,” DestinationVariable property. Created with the expression\
    \ @[User::ArchiveLocation] + @[User::FileName].  \n2.  ArchiveLocation – Provides\
    \ the destination path to the archive folder.  \n3.  FileName – Mapped to the\
    \ Foreach Loop Container “Load XML Content.” Takes the XML file name from each\
    \ iteration.  \n4.  FlagIsFileExist – Is assigned a “true” or “false” value and\
    \ controls the Precedence Constraint expression.  \n5.  SourceFile – Supplies\
    \ the File System Task “Archive File,” SourceVariable. Creates the expression\
    \ @[User::SourceLocation] + @[User::FileName].  \n6.  SourceLocation – Provides\
    \ the source path to source folder .  \n7.  SQLScript – Composes T-SQL to insert\
    \ the XML content into the _XML table using the expression:\n\n```\n\"INSERT INTO\
    \ _XML\nSELECT '\" + @[User::SourceLocation]  + @[User::FileName] + \"', X, GETDATE()\n\
    FROM OPENROWSET(BULK N'\" + @[User::SourceLocation]  + @[User::FileName] + \"\
    ', SINGLE_BLOB) as tempXML(X)\"\n```\n\nFigure [3-16](#A435478_1_En_3_Chapter.html#Fig16)\
    \ illustrates the variable list.\n\n![A435478_1_En_3_Fig16_HTML.jpg](A435478_1_En_3_Fig16_HTML.jpg)\n\
    \nFigure 3-16.\n\nShowing the SSIS package variable list\n\nNow we will discuss\
    \ the configuration of tasks. In this recipe, I will not go into much detail because\
    \ this topic was thoroughly covered in Recipe 3-2.\n\n1.  Script Task “Check If\
    \ File Exists.” This time the Script Task checks whether the source location has\
    \ files with extension .xml. No other task can provide this functionality. Two\
    \ variables are mapped to the task:\n\n![A435478_1_En_3_Fig17_HTML.jpg](A435478_1_En_3_Fig17_HTML.jpg)\n\
    \nFigure 3-17.\n\nDemonstrating the Script Task variables mapping\n    *   SourceLocation\
    \ – ReadOnlyVariable.\n    *   FlagIsFileExist – ReadWriteVariable. The code could\
    \ modify the variable value. Figure [3-17](#A435478_1_En_3_Chapter.html#Fig17)\
    \ illustrates the variables .Click on the Edit Script command button. Add the\
    \ following code into the Main() function:\n\n```\n    Dts.Variables[\"User::FlagIsFileExist\"\
    ].Value =              (System.IO.Directory.GetFiles(Dts.Variables[\"User::SourceLocation\"\
    ].Value.ToString(), \"*.xml\").Length != 0);\n    ```\n\nSave and then Close the\
    \ code window. Click the OK command button to complete the settings.  \n2.  Precedence\
    \ Constraint (green arrow between “Check If File Exists” and “Truncate Table”).\
    \ To load the Precedence Constraint Editor, double-click on the arrow. On the\
    \ Precedence Constraint Editor:\n    *   Select the Evaluation operation: Expression\n\
    \    *   For the Expression property type the expression: @[User::FlagIsFileExist]\
    \ == trueClick OK to save the settings. Figure [3-18](#A435478_1_En_3_Chapter.html#Fig18)\
    \ illustrates the Precedence Constraint Editor .\n\n![A435478_1_En_3_Fig18_HTML.jpg](A435478_1_En_3_Fig18_HTML.jpg)\n\
    \nFigure 3-18.\n\nShowing Precedence Constraint Editor settings  \n3.  Execute\
    \ the SQL Task “Truncate Table.” Open the Execute SQL Task Editor on the General\
    \ menu:\n    *   For the Connection property, add a new connection. Specify the\
    \ destination server and database.\n    *   Add the following code to the SQLStatement\
    \ property:\n\n```\n    IF NOT EXISTS (SELECT * FROM sys.objects\n    WHERE object_id\
    \ = OBJECT_ID(N'[dbo].[_XML]') AND type in (N'U'))\n    CREATE TABLE _XML\n  \
    \  (\n    ID int IDENTITY(1,1) PRIMARY KEY\n    ,XMLFileName nvarchar(300)\n \
    \   ,XML_LOAD XML, Created datetime\n    )\n    ELSE\n    TRUNCATE TABLE _XML\n\
    \    ```\n\nClick OK to complete the settings. Figure [3-19](#A435478_1_En_3_Chapter.html#Fig19)\
    \ illustrates the Execute SQL Task Editor .\n\n![A435478_1_En_3_Fig19_HTML.jpg](A435478_1_En_3_Fig19_HTML.jpg)\n\
    \nFigure 3-19.\n\nShowing Execute SQL Task settings  \n4.  The “Load XML Content”\
    \ Foreach Loop Container. Open the Foreach Loop Editor and click on the Collect\
    \ menu:\n\n![A435478_1_En_3_Fig21_HTML.jpg](A435478_1_En_3_Fig21_HTML.jpg)\n\n\
    Figure 3-21.\n\nDemonstrating Collection menu settings\n    *   Select an Expression\
    \ then load the Expression Property Editor.\n    *   Select the Directory property\
    \ and add the expression: @[User::SourceLocation].\n    *   Click OK to complete\
    \ the settings. Figure [3-20](#A435478_1_En_3_Chapter.html#Fig20) illustrates\
    \ the Expression Property Editor. The expression value is reflected in the Folder\
    \ property .\n\n![A435478_1_En_3_Fig20_HTML.jpg](A435478_1_En_3_Fig20_HTML.jpg)\n\
    \nFigure 3-20.\n\nShowing the Expression Property Editor\n    *   In the Files\
    \ property, type the target file name pattern, which is a Windows filename pattern.\
    \ It utilizes Windows filename wildcards in the pattern. Since we are searching\
    \ for all XML files to iterate, use the extension pattern *.xml to filter out\
    \ all files other than XML files.\n    *   To Retrieve the file name property,\
    \ select the Name and extension. Figure [3-21](#A435478_1_En_3_Chapter.html#Fig21)\
    \ illustrates the Collection menu. \n5.  Click the Variable Mapping menu. Select\
    \ the FileName variable from the drop-down list. Figure [3-22](#A435478_1_En_3_Chapter.html#Fig22)\
    \ illustrates the Variable Mapping menu. Click OK to complete the settings.\n\n\
    ![A435478_1_En_3_Fig22_HTML.jpg](A435478_1_En_3_Fig22_HTML.jpg)\n\nFigure 3-22.\n\
    \nMapping FileName variable  \n6.  The “Insert XML Data” Execute SQL Task. Open\
    \ the Execute SQL Task Editor. The General tab will be displayed by default.\n\
    \    *   Select the existing Connection that was in the previous Execute SQL Task.\n\
    \    *   In the SQLStatement property, type “exec sp_executesql ?”. The question\
    \ mark specifies that the task will have an input variable as a parameter.Figure\
    \ [3-23](#A435478_1_En_3_Chapter.html#Fig23) illustrates the General menu.\n\n\
    ![A435478_1_En_3_Fig23_HTML.jpg](A435478_1_En_3_Fig23_HTML.jpg)\n\nFigure 3-23.\n\
    \nShowing General menu settings Click on the Parameter Mapping menu.\n\n![A435478_1_En_3_Fig24_HTML.jpg](A435478_1_En_3_Fig24_HTML.jpg)\n\
    \nFigure 3-24."
  trans: "\n## 解决方案\n\nSSIS 提供了一套全面的工具，用于从指定目录加载 XML 文件。\n\n一个用于加载多个 XML 文件的 SSIS\
    \ 包，比配方 3-2 “从 SSIS 包创建 XML” 中展示的写入 XML 文件的 SSIS 包更复杂。`LoadXMLFromFile` 这个 SSIS\
    \ 包是基于以下业务规则创建的：\n\n1.  检查源目录中是否存在 `.xml` 文件。\n2.  如果在源位置未找到文件，则停止包执行。\n3.  如果找到匹配的文件，则截断目标表。\n\
    4.  从所有可用的 `.xml` 扩展名文件加载 XML 内容。\n5.  将所有已处理的文件移动到 Archive 文件夹。\n\n`LoadXMLFromFile`\
    \ SSIS 包由以下部分组成：\n\n![A435478_1_En_3_Fig15_HTML.jpg](img/A435478_1_En_3_Fig15_HTML.jpg)\n\
    *图 3-15. 展示设计模式下的 `LoadXMLFromFile` SSIS 包*\n\n1.  一个“Check If File Exists”脚本任务，它使用\
    \ C# 代码来验证源位置是否存在任何 XML 文件。\n2.  优先级约束（在“Check If File Exists”和“Truncate Table”之间的绿色箭头）公式有条件地验证\
    \ `FlagIsFileExist` 变量，并扮演“停止”或“继续”的角色。\n3.  一个执行 SQL 任务“Truncate Table”，有条件地执行\
    \ T-SQL 代码来创建或截断表。\n4.  “Load XML Content” 循环容器遍历 XML 文件。\n5.  “Insert XML Data”\
    \ 执行 SQL 任务执行一条 T-SQL 语句，将 XML 文件内容插入到 `_XML` 表中。\n6.  “Archive File” 文件系统任务将\
    \ XML 文件移动到 Archive 文件夹。图 3-15 展示了该 SSIS 包。\n\n创建了以下 SSIS 包变量以提供包的灵活性和功能：\n\n\
    1.  `ArchiveFile` – 为文件系统任务“Archive File”提供 `DestinationVariable` 属性。使用表达式 `@[User::ArchiveLocation]\
    \ + @[User::FileName]` 创建。\n2.  `ArchiveLocation` – 提供存档文件夹的目标路径。\n3.  `FileName`\
    \ – 映射到循环容器“Load XML Content”。从每次迭代中获取 XML 文件名。\n4.  `FlagIsFileExist` – 被赋予 `true`\
    \ 或 `false` 值，并控制优先级约束表达式。\n5.  `SourceFile` – 为文件系统任务“Archive File”提供 `SourceVariable`。创建表达式\
    \ `@[User::SourceLocation] + @[User::FileName]`。\n6.  `SourceLocation` – 提供源文件夹的源路径。\n\
    7.  `SQLScript` – 组合 T-SQL 以将 XML 内容插入到 `_XML` 表中，使用以下表达式：\n\n```sql\n\"INSERT\
    \ INTO _XML\nSELECT '\" + @[User::SourceLocation]  + @[User::FileName] + \"',\
    \ X, GETDATE()\nFROM OPENROWSET(BULK N'\" + @[User::SourceLocation]  + @[User::FileName]\
    \ + \"', SINGLE_BLOB) as tempXML(X)\"\n```\n\n图 3-16 展示了变量列表。\n\n![A435478_1_En_3_Fig16_HTML.jpg](img/A435478_1_En_3_Fig16_HTML.jpg)\n\
    *图 3-16. 展示 SSIS 包变量列表*\n\n现在我们将讨论任务的配置。在本教程中，我不会深入太多细节，因为配方 3-2 已经详细涵盖了这个主题。\n\
    \n1.  **脚本任务 “Check If File Exists”。** 这次，脚本任务检查源位置是否有扩展名为 `.xml` 的文件。没有其他任务能提供此功能。两个变量被映射到该任务：\n\
    \n![A435478_1_En_3_Fig17_HTML.jpg](img/A435478_1_En_3_Fig17_HTML.jpg)\n*图 3-17.\
    \ 演示脚本任务变量映射*\n    *   `SourceLocation` – `ReadOnlyVariable`。\n    *   `FlagIsFileExist`\
    \ – `ReadWriteVariable`。代码可以修改该变量值。图 3-17 展示了变量。点击 `Edit Script` 命令按钮。将以下代码添加到\
    \ `Main()` 函数中：\n\n```csharp\n    Dts.Variables[\"User::FlagIsFileExist\"].Value\
    \ =              (System.IO.Directory.GetFiles(Dts.Variables[\"User::SourceLocation\"\
    ].Value.ToString(), \"*.xml\").Length != 0);\n```\n\n保存然后关闭代码窗口。点击 `OK` 命令按钮完成设置。\n\
    2.  **优先级约束（在 “Check If File Exists” 和 “Truncate Table” 之间的绿色箭头）。** 要打开优先级约束编辑器，请双击箭头。在优先级约束编辑器中：\n\
    \    *   选择 `Evaluation operation`: `Expression`\n    *   对于 `Expression` 属性，键入表达式：`@[User::FlagIsFileExist]\
    \ == true`\n    点击 `OK` 保存设置。图 3-18 展示了优先级约束编辑器。\n\n![A435478_1_En_3_Fig18_HTML.jpg](img/A435478_1_En_3_Fig18_HTML.jpg)\n\
    *图 3-18. 展示优先级约束编辑器设置*\n3.  **执行 SQL 任务 “Truncate Table”。** 在 `General` 菜单上打开执行\
    \ SQL 任务编辑器：\n    *   对于 `Connection` 属性，添加一个新连接。指定目标服务器和数据库。\n    *   将以下代码添加到\
    \ `SQLStatement` 属性：\n\n```sql\n    IF NOT EXISTS (SELECT * FROM sys.objects\n\
    \    WHERE object_id = OBJECT_ID(N'[dbo].[_XML]') AND type in (N'U'))\n    CREATE\
    \ TABLE _XML\n    (\n    ID int IDENTITY(1,1) PRIMARY KEY\n    ,XMLFileName nvarchar(300)\n\
    \    ,XML_LOAD XML, Created datetime\n    )\n    ELSE\n    TRUNCATE TABLE _XML\n\
    ```\n\n点击 `OK` 完成设置。图 3-19 展示了执行 SQL 任务编辑器。\n\n![A435478_1_En_3_Fig19_HTML.jpg](img/A435478_1_En_3_Fig19_HTML.jpg)\n\
    *图 3-19. 展示执行 SQL 任务设置*\n4.  **“Load XML Content” 循环容器。** 打开循环容器编辑器并点击 `Collect`\
    \ 菜单：\n\n![A435478_1_En_3_Fig21_HTML.jpg](img/A435478_1_En_3_Fig21_HTML.jpg)\n\
    *图 3-21. 演示收集菜单设置*\n    *   选择 `An expression`，然后加载表达式属性编辑器。\n    *   选择 `Directory`\
    \ 属性并添加表达式：`@[User::SourceLocation]`。\n    *   点击 `OK` 完成设置。图 3-20 展示了表达式属性编辑器。表达式值反映在\
    \ `Folder` 属性中。\n\n![A435478_1_En_3_Fig20_HTML.jpg](img/A435478_1_En_3_Fig20_HTML.jpg)\n\
    *图 3-20. 展示表达式属性编辑器*\n    *   在 `Files` 属性中，键入目标文件名模式，即 Windows 文件名模式。它在模式中使用\
    \ Windows 文件名通配符。由于我们搜索所有 XML 文件进行迭代，因此使用扩展名模式 `*.xml` 来过滤掉除 XML 文件外的所有文件。\n \
    \   *   对于 `Retrieve the file name` 属性，选择 `Name and extension`。图 3-21 展示了收集菜单。\n\
    5.  点击 `Variable Mapping` 菜单。从下拉列表中选择 `FileName` 变量。图 3-22 展示了变量映射菜单。点击 `OK` 完成设置。\n\
    \n![A435478_1_En_3_Fig22_HTML.jpg](img/A435478_1_En_3_Fig22_HTML.jpg)\n*图 3-22.\
    \ 映射 FileName 变量*\n6.  **“Insert XML Data” 执行 SQL 任务。** 打开执行 SQL 任务编辑器。默认将显示 `General`\
    \ 选项卡。\n    *   选择先前在上一个执行 SQL 任务中使用的现有连接。\n    *   在 `SQLStatement` 属性中，键入 `exec\
    \ sp_executesql ?`。问号指定该任务将有一个输入变量作为参数。图 3-23 展示了 `General` 菜单。\n\n![A435478_1_En_3_Fig23_HTML.jpg](img/A435478_1_En_3_Fig23_HTML.jpg)\n\
    *图 3-23. 展示常规菜单设置*\n点击 `Parameter Mapping` 菜单。\n\n![A435478_1_En_3_Fig24_HTML.jpg](img/A435478_1_En_3_Fig24_HTML.jpg)\n\
    *图 3-24.*\n"
- fmt: "# 显示参数映射菜单设置\n*   从下拉列表中选择 `User::SQLScript` 变量。该 SQLScript 变量通过表达式公式组合 `INSERT`\
    \ T-SQL 语句。当 Foreach Loop Container “Load XML Content” 将文件名赋给 `FileName` 变量时，`SQLScript`\
    \ 表达式公式会在遍历指定目录中所有文件时不断重组新的 T-SQL 代码，如下例所示：\n\n    ```\n    INSERT INTO _XML\n\
    \    SELECT 'C:\\TEMP\\Categories.xml', X, GETDATE()\n    FROM OPENROWSET(BULK\
    \ N'C:\\TEMP\\Categories.xml', SINGLE_BLOB) as tempXML(X)\n    ```\n\n*   对于 `Direction`\
    \ 属性，选择 `Input`。\n*   对于 `Data Type` 属性，选择 `NVARCHAR`。\n*   对于 `Parameter Name`\
    \ 属性，输入 `0`。\n*   对于 `Parameter Size` 属性，输入 `1000`。图 [3-24](#A435478_1_En_3_Chapter.html#Fig24)\
    \ 说明了参数映射菜单。\n*   单击 `OK` 完成设置。\n\n## 7. 文件系统任务 “归档文件”：打开文件系统任务编辑器。\n在“常规”菜单上：\n\
    \n![A435478_1_En_3_Fig25_HTML.jpg](A435478_1_En_3_Fig25_HTML.jpg)\n\n图 3-25. 显示文件系统任务设置\n\
    \n*   将 `Operation` 属性设置为 `\"Rename file\"`。\n*   将 `IsSourcePathVariable` 属性设置为\
    \ `\"True\"`。\n*   对于 `SourceVariable` 属性，选择 `\"User::SourceFile\"` 变量。\n*   将\
    \ `IsDestinationPathVariable` 属性设置为 `\"True\"`。\n*   对于 `DestinationVariable`\
    \ 属性，选择 `\"User::ArchiveFile\"` 变量。\n*   将 `OverwriteDestination` 属性设置为 `\"True\"\
    `。\n*   单击 `OK` 完成设置。图 [3-25](#A435478_1_En_3_Chapter.html#Fig25) 说明了文件系统任务编辑器。\n\
    \n我建议将文件系统任务属性（位于 SSIS IDE 右侧）`DelayValidation` 设置为 `True`，以防止在包加载时默认源文件名在源位置不存在而导致错误。图\
    \ [3-26](#A435478_1_En_3_Chapter.html#Fig26) 说明了此属性。\n\n![A435478_1_En_3_Fig26_HTML.jpg](A435478_1_En_3_Fig26_HTML.jpg)\n\
    \n图 3-26. 显示 `DelayValidation` 属性的设置\n\n恭喜，SSIS 包 `LoadXMLFromFile` 配置完成！请务必保存您的工作。图\
    \ [3-27](#A435478_1_En_3_Chapter.html#Fig27) 显示您已成功完成的 SSIS 包。\n\n![A435478_1_En_3_Fig27_HTML.jpg](A435478_1_En_3_Fig27_HTML.jpg)\n\
    \n图 3-27. 显示成功的 SSIS 包\n\n### 它是如何工作的\nSSIS 包通过检查由 `SourceLocation` 变量指示的源位置中具有\
    \ `.xml` 扩展名的文件来启动流程。默认值可以在包外部修改。代码如下：\n\n```\nDts.Variables[\"User::FlagIsFileExist\"\
    ].Value = (System.IO.Directory.GetFiles(Dts.Variables[\"User::SourceLocation\"\
    ].Value.ToString(), \"*.xml\").Length != 0);\n```\n返回文件计数（如果有）。比较条件 `!= 0` 返回布尔值：当计数大于\
    \ 0 时为 `true`；当计数等于 0 时为 `false`。结果值赋给 `FlagIsFileExist` 变量。\n\n在“ precedence\
    \ 约束”中的表达式 `@[User::FlagIsFileExist] == true` 有条件地检查 `User::FlagIsFileExist` 变量值。当表达式返回\
    \ `true` 时，包转到下一个任务。当表达式返回否定结果 (`false`) 时，包执行终止。\n\n“截断表”执行 SQL 任务删除旧值并为新的行集准备\
    \ `_XML` 表。\n\n随着包的进行，Foreach 循环容器配置为检查源位置并检索所有具有 `.xml` 扩展名的可用文件。Foreach 循环容器遍历文件名列表，并在每次迭代中将每个文件名赋给\
    \ `User::FileName` 变量。\n\n变量 `SQLScript` 的表达式公式在 `FileName` 变量每次接收新值时更改 `INSERT`\
    \ T-SQL 语句。“插入 XML 数据”执行 SQL 任务将 `INSERT` T-SQL 语句发送到 SQL Server 实例。\n\n文件系统任务将处理后的文件从源位置发送到归档位置。\n\
    \n文件系统任务的一个替代方案是脚本任务，这是我的个人偏好，适用于那些对脚本任务中使用的 C# 编程语言感到不舒服的 DBA。因此，文件系统任务是一个固定的任务，其配置不涉及代码。对于那些希望对移动文件过程有更多控制的人，我建议实现脚本任务而不是文件系统任务。要配置脚本任务，请完成以下步骤：\n\
    *   将脚本任务拖放到 Foreach 循环容器 “Load XML Content” 内。\n*   双击脚本任务以打开脚本任务编辑器。\n*   对于\
    \ `ScriptLanguage` 属性，选择 `Microsoft Visual C#`。\n*   对于 `ReadOnlyVariables` 属性，添加变量\
    \ `User::ArchiveFile` 和 `User::SourceFile`（高亮并复制变量名称）。\n*   单击 `Edit Script…`\
    \ 按钮。\n*   转到 `Main()` 函数并添加以下代码：\n\n    ```\n    string from = Dts.Variables[\"\
    User::SourceFile\"].Value.ToString();\n    string to = Dts.Variables[\"User::ArchiveFile\"\
    ].Value.ToString();\n    System.IO.File.Move(from, to); // 移动文件\n    ```\n\n*\
    \   保存并关闭 C# Visual Studio。\n*   单击 `OK` 按钮完成配置。\n\n正如您从这个示例中看到的，通过少量编码，您现在可以完全控制将文件从源位置移动到归档目录。\n\
    \nSSIS 包可以通过 SQL Server Agent 作业部署，该作业将按自定义计划自动运行。也可以从存储过程中执行该包。清单 [3-7](#A435478_1_En_3_Chapter.html#Par235)\
    \ 演示了如何从存储过程执行 SSIS 包。\n\n```\nDECLARE @SourceLocation VARCHAR(200) = 'C:\\\\\
    TEMP\\\\';\nDECLARE @ArchiveLocation VARCHAR(200) = 'C:\\\\TEMP\\\\Archive\\\\\
    ';\nSET @SQLQuery = 'DTEXEC /FILE ^\"C:\\SQL2016\\Chapter3\\CreateXMLFile\\CreateXMLFile\\\
    LoadXMLFromFile.dtsx^\" '\nSET @SQLQuery = @SQLQuery + ' /SET \\Package.Variables[SourceLocation].Value;^\"\
    '+ @SourceLocation + '^\"\n/SET \\Package.Variables[ArchiveLocation].Value;^\"\
    '+ @ArchiveLocation + '^\"';\nEXEC master..xp_cmdshell @SQLQuery ;\n```\n清单 3-7.\
    \ 显示从存储过程执行 SSIS 包的代码\n\n## 3-5. 实现 CLR 解决方案\n### 问题\n您希望创建 SQL Server 对象来写入和读取\
    \ XML 文件，这些对象不实现扩展存储过程并提供更安全的功能。"
  raw: "Showing Parameter Mapping menu settings\n    *   Select the User::SQLScript\
    \ variable from the drop-down list. The SQLScript variable composes the INSERT\
    \ T-SQL statement through an expression formula. When the Foreach Loop Container\
    \ “Load XML Content” assigns the file name to the FileName variable, then the\
    \ SQLScript expression formula constantly recomposes the new T-SQL code as it\
    \ loops through all the files in the specified directory, as demonstrated in the\
    \ following example:\n\n```\n        INSERT INTO _XML\n        SELECT 'C:\\TEMP\\\
    Categories.xml', X, GETDATE()\n        FROM OPENROWSET(BULK N'C:\\TEMP\\Categories.xml',\
    \ SINGLE_BLOB) as tempXML(X)\n        ```\n\n*   For the Direction property select\
    \ Input\n    *   For the Data Type property select NVARCHAR\n    *   For the Parameter\
    \ Name Property, type 0\n    *   For the Parameter Size Property, type 1000\\\
    . Figure [3-24](#A435478_1_En_3_Chapter.html#Fig24) illustrates the Parameter\
    \ Mapping menu.\n    *   Click OK to complete the settings. \n7.  File System\
    \ Task “Archive File”: open the File System Task Editor. On General menu:\n\n\
    ![A435478_1_En_3_Fig25_HTML.jpg](A435478_1_En_3_Fig25_HTML.jpg)\n\nFigure 3-25.\n\
    \nShowing File System Task settings\n    *   Set the Operation property to “Rename\
    \ file.”\n    *   IsSourcePathVariable property set to “True.”\n    *   For the\
    \ SourceVariable property select the “User::SourceFile” variable.\n    *   Set\
    \ the IsDestinationPathVariable property to “True.”\n    *   For the DestinationVariable\
    \ property select “User::ArchiveFile” variable.\n    *   Set the OverwriteDestination\
    \ property to “True.”\n    *   Click OK to complete the settings. Figure [3-25](#A435478_1_En_3_Chapter.html#Fig25)\
    \ illustrates the File System Task Editor .\n\nI recommend setting the File System\
    \ Task property (located on the right side of SSIS IDE) DelayValidation to True\
    \ in order to prevent an error in case the package loads and the default file\
    \ name does not exist in the source location. Figure [3-26](#A435478_1_En_3_Chapter.html#Fig26)\
    \ illustrates the property .\n\n![A435478_1_En_3_Fig26_HTML.jpg](A435478_1_En_3_Fig26_HTML.jpg)\n\
    \nFigure 3-26.\n\nShowing settings for the property DelayValidation\n\nCongratulations,\
    \ the SSIS package LoadXMLFromFile configuration is completed! Be sure to save\
    \ your work. Figure [3-27](#A435478_1_En_3_Chapter.html#Fig27) shows your successfully\
    \ completed SSIS Package.\n\n![A435478_1_En_3_Fig27_HTML.jpg](A435478_1_En_3_Fig27_HTML.jpg)\n\
    \nFigure 3-27.\n\nShowing succeeded SSIS Package\n\n### How It Works\n\nThe SSIS\
    \ package starts the process by inspecting the files with an .xml extension in\
    \ the source location indicated by the SourceLocation variable. The default value\
    \ can be modified outside the package. The code is as follows:\n\n```\nDts.Variables[\"\
    User::FlagIsFileExist\"].Value = (System.IO.Directory.GetFiles(Dts.Variables[\"\
    User::SourceLocation\"].Value.ToString(), \"*.xml\").Length != 0);\nreturns count\
    \ of the files (if any). Comparison condition !=0 returns boolean values; true\
    \ - when count greater than 0 or false – when count equal 0\\. The result value\
    \ assignes to FlagIsFileExist variable.\n```\n\nThe expression @[User::FlagIsFileExist]\
    \ == true in the Precedence Constraint conditionally inspects the User::FlagIsFileExist\
    \ variable value. When the expression returns true then the package goes to the\
    \ next task. When the expression returns a negative result (false), the package\
    \ execution is terminated.\n\nThe “Truncate Table” Execute SQL Task removes the\
    \ old value and prepares the table _XML for a new set of rows.\n\nAs the package\
    \ progresses, the Foreach Loop Container is configured to inspect the source location\
    \ and retrieve all available files with .xml extension. The Foreach Loop Container\
    \ iterates the list of filenames and assigns each filename to the User::FileName\
    \ variable on each iteration.\n\nThe expression formula for the variable SQLScript\
    \ changes the `INSERT` T-SQL statement each time the FileName variable receives\
    \ a new value. The “Insert XML Data” Execute SQL Task sends the `INSERT` T-SQL\
    \ statement to the SQL Server instance.\n\nThe File System Task sends the processed\
    \ files from the source location to the archive location.\n\nAn alternative to\
    \ the File System Task is the Script Task , which is my personal preference for\
    \ those DBAs who feel uncomfortable with the C# programing language used in the\
    \ Script Task. Therefore, the File System Task is a set task, and there is no\
    \ code involved with the configuration of the task. For those who prefer more\
    \ control over the process of moving the files, I would suggest implementing the\
    \ Script Task instead of the File System Task. To configure the Script task, please\
    \ complete the following steps :\n\n*   Drag and drop the Script Task inside the\
    \ Foreach Loop Container “Load XML Content.”\n*   Double-click on the Script Task\
    \ to open the Script Task Editor.\n*   For the ScriptLanguage property, select\
    \ Microsoft Visual C#.\n*   For the ReadOnlyVariable property, add the variable\
    \ User::ArchiveFile and User::SourceFile (highlight and copy the variable’s name).\n\
    *   Click the Edit Script… button.\n*   Go to Main() function and add following\
    \ code:\n\n    ```\n    string from = Dts.Variables[\"User::SourceFile\"].Value.ToString();\n\
    \    string to = Dts.Variables[\"User::ArchiveFile\"].Value.ToString();\n    System.IO.File.Move(from,\
    \ to); // move a file\n    ```\n\n*   Save and close the C# Visual Studio\n* \
    \  Click the OK button to complete the configuration.\n\nAs you can see from this\
    \ example, with a little bit of minor coding, you now have full control over moving\
    \ the files from the source location to the archive directory.\n\nThe SSIS package\
    \ can be deployed through the SQL Server Agent job, which will run automatically\
    \ on a customized schedule. The package can also be executed from the stored procedure.\
    \ Listing [3-7](#A435478_1_En_3_Chapter.html#Par235) demonstrates how to execute\
    \ the SSIS package from the stored procedure.\n\n```\nDECLARE @SourceLocation\
    \ VARCHAR(200) = 'C:\\\\TEMP\\\\';\nDECLARE @ArchiveLocation VARCHAR(200) = 'C:\\\
    \\TEMP\\\\Archive\\\\';\nSET @SQLQuery = 'DTEXEC /FILE ^\"C:\\SQL2016\\Chapter3\\\
    CreateXMLFile\\CreateXMLFile\\LoadXMLFromFile.dtsx^\" '\nSET @SQLQuery = @SQLQuery\
    \ + ' /SET \\Package.Variables[SourceLocation].Value;^\"'+ @SourceLocation + '^\"\
    \n/SET \\Package.Variables[ArchiveLocation].Value;^\"'+ @ArchiveLocation + '^\"\
    ';\nEXEC master..xp_cmdshell @SQLQuery ;\nListing 3-7.\nShowing the code to execute\
    \ the SSIS package from a stored procedure\n```\n\n## 3-5\\. Implementing a CLR\
    \ Solution\n\n### Problem\n\nYou want to create SQL Server objects to write and\
    \ read XML files that that do not implement extended stored procedures and provide\
    \ more secure functionalities."
  trans: "# 显示参数映射菜单设置\n\n*   从下拉列表中选择 `User::SQLScript` 变量。该 SQLScript 变量通过表达式公式组合\
    \ `INSERT` T-SQL 语句。当 Foreach Loop Container “Load XML Content” 将文件名赋给 `FileName`\
    \ 变量时，`SQLScript` 表达式公式会在遍历指定目录中所有文件时不断重组新的 T-SQL 代码，如下例所示：\n\n    ```\n    INSERT\
    \ INTO _XML\n    SELECT 'C:\\TEMP\\Categories.xml', X, GETDATE()\n    FROM OPENROWSET(BULK\
    \ N'C:\\TEMP\\Categories.xml', SINGLE_BLOB) as tempXML(X)\n    ```\n\n*   对于 `Direction`\
    \ 属性，选择 `Input`。\n*   对于 `Data Type` 属性，选择 `NVARCHAR`。\n*   对于 `Parameter Name`\
    \ 属性，输入 `0`。\n*   对于 `Parameter Size` 属性，输入 `1000`。图 3-24 说明了参数映射菜单。\n*   单击 `OK`\
    \ 完成设置。\n\n## 7. 文件系统任务 “归档文件”：打开文件系统任务编辑器。\n在“常规”菜单上：\n\n![A435478_1_En_3_Fig25_HTML.jpg](img/A435478_1_En_3_Fig25_HTML.jpg)\n\
    \n图 3-25. 显示文件系统任务设置\n\n*   将 `Operation` 属性设置为 `\"重命名文件\"`。\n*   将 `IsSourcePathVariable`\
    \ 属性设置为 `\"True\"`。\n*   对于 `SourceVariable` 属性，选择 `\"User::SourceFile\"` 变量。\n\
    *   将 `IsDestinationPathVariable` 属性设置为 `\"True\"`。\n*   对于 `DestinationVariable`\
    \ 属性，选择 `\"User::ArchiveFile\"` 变量。\n*   将 `OverwriteDestination` 属性设置为 `\"True\"\
    `。\n*   单击 `OK` 完成设置。图 3-25 说明了文件系统任务编辑器。\n\n我建议将文件系统任务属性（位于 SSIS IDE 右侧）`DelayValidation`\
    \ 设置为 `True`，以防止在包加载时，默认源文件名在源位置不存在而导致错误。图 3-26 说明了此属性。\n\n![A435478_1_En_3_Fig26_HTML.jpg](img/A435478_1_En_3_Fig26_HTML.jpg)\n\
    \n图 3-26. 显示 `DelayValidation` 属性的设置\n\n恭喜，SSIS 包 `LoadXMLFromFile` 配置完成！请务必保存您的工作。图\
    \ 3-27 显示您已成功完成的 SSIS 包。\n\n![A435478_1_En_3_Fig27_HTML.jpg](img/A435478_1_En_3_Fig27_HTML.jpg)\n\
    \n图 3-27. 显示成功的 SSIS 包\n\n### 它是如何工作的\nSSIS 包通过检查由 `SourceLocation` 变量指示的源位置中具有\
    \ `.xml` 扩展名的文件来启动流程。默认值可以在包外部修改。代码如下：\n\n```\nDts.Variables[\"User::FlagIsFileExist\"\
    ].Value = (System.IO.Directory.GetFiles(Dts.Variables[\"User::SourceLocation\"\
    ].Value.ToString(), \"*.xml\").Length != 0);\n```\n返回文件计数（如果有）。比较条件 `!= 0` 返回布尔值：当计数大于\
    \ 0 时为 `true`；当计数等于 0 时为 `false`。结果值赋给 `FlagIsFileExist` 变量。\n\n在“优先约束”中的表达式 `@[User::FlagIsFileExist]\
    \ == true` 有条件地检查 `User::FlagIsFileExist` 变量值。当表达式返回 `true` 时，包转到下一个任务。当表达式返回否定结果\
    \ (`false`) 时，包执行终止。\n\n“截断表”执行 SQL 任务删除旧值并为新的行集准备 `_XML` 表。\n\n随着包的进行，Foreach\
    \ 循环容器配置为检查源位置并检索所有具有 `.xml` 扩展名的可用文件。Foreach 循环容器遍历文件名列表，并在每次迭代中将每个文件名赋给 `User::FileName`\
    \ 变量。\n\n变量 `SQLScript` 的表达式公式在 `FileName` 变量每次接收新值时更改 `INSERT` T-SQL 语句。“插入 XML\
    \ 数据”执行 SQL 任务将 `INSERT` T-SQL 语句发送到 SQL Server 实例。\n\n文件系统任务将处理后的文件从源位置发送到归档位置。\n\
    \n文件系统任务的一个替代方案是脚本任务，这是我的个人偏好，适用于那些对脚本任务中使用的 C# 编程语言感到不舒服的 DBA。因此，文件系统任务是一个固定的任务，其配置不涉及代码。对于那些希望对移动文件过程有更多控制的人，我建议实现脚本任务而不是文件系统任务。要配置脚本任务，请完成以下步骤：\n\
    *   将脚本任务拖放到 Foreach 循环容器 “Load XML Content” 内。\n*   双击脚本任务以打开脚本任务编辑器。\n*   对于\
    \ `ScriptLanguage` 属性，选择 `Microsoft Visual C#`。\n*   对于 `ReadOnlyVariables` 属性，添加变量\
    \ `User::ArchiveFile` 和 `User::SourceFile`（高亮并复制变量名称）。\n*   单击 `编辑脚本…` 按钮。\n*\
    \   转到 `Main()` 函数并添加以下代码：\n\n    ```\n    string from = Dts.Variables[\"User::SourceFile\"\
    ].Value.ToString();\n    string to = Dts.Variables[\"User::ArchiveFile\"].Value.ToString();\n\
    \    System.IO.File.Move(from, to); // 移动文件\n    ```\n\n*   保存并关闭 C# Visual Studio。\n\
    *   单击 `OK` 按钮完成配置。\n\n正如您从这个示例中看到的，通过少量编码，您现在可以完全控制将文件从源位置移动到归档目录。\n\nSSIS 包可以通过\
    \ SQL Server Agent 作业部署，该作业将按自定义计划自动运行。也可以从存储过程中执行该包。清单 3-7 演示了如何从存储过程执行 SSIS\
    \ 包。\n\n```\nDECLARE @SourceLocation VARCHAR(200) = 'C:\\\\TEMP\\\\';\nDECLARE\
    \ @ArchiveLocation VARCHAR(200) = 'C:\\\\TEMP\\\\Archive\\\\';\nSET @SQLQuery\
    \ = 'DTEXEC /FILE ^\"C:\\SQL2016\\Chapter3\\CreateXMLFile\\CreateXMLFile\\LoadXMLFromFile.dtsx^\"\
    \ '\nSET @SQLQuery = @SQLQuery + ' /SET \\Package.Variables[SourceLocation].Value;^\"\
    '+ @SourceLocation + '^\"\n/SET \\Package.Variables[ArchiveLocation].Value;^\"\
    '+ @ArchiveLocation + '^\"';\nEXEC master..xp_cmdshell @SQLQuery ;\n```\n清单 3-7.\
    \ 显示从存储过程执行 SSIS 包的代码\n\n## 3-5. 实现 CLR 解决方案\n### 问题\n您希望创建 SQL Server 对象来写入和读取\
    \ XML 文件，这些对象不实现扩展存储过程并提供更安全的功能。"
- fmt: "### Solution\n\nThe CLR (Common Language Runtime) functions could extend T-SQL\
    \ functionality and operate the same way as a SQL Server user-defined object (user-defined\
    \ functions, for this recipe solution). However, CRL objects require a `dll` (dynamic\
    \ link library) file format (extension `.dll`) that is used for Windows program\
    \ codes and procedures. For this recipe, the code demonstrates using Visual Studio\
    \ C#. Listing 3-8 demonstrates the code for the C# file.\n\n```csharp\nusing System;\n\
    using System.Data;\nusing System.Data.SqlClient;\nusing System.Data.SqlTypes;\n\
    using Microsoft.SqlServer.Server;\nusing System.IO;\npublic partial class XMLFileETL\n\
    {\n    [SqlFunction]\n    public static SqlString WriteXMLFile(SqlString XMLContent,\n\
    \        SqlString DirPath,\n        SqlString FileName,\n        SqlBoolean DateStamp)\n\
    \    {\n        /*  Parameters:\n            XMLContent: Contains XML document.\n\
    \            DirPath: The directory path to write to.\n            FileName: The\
    \ file name.\n            DateStamp: Determines add datetime stamp to the file\
    \ or not.\n        */\n        try\n        {\n            string strXMLFile =\
    \ \"\";\n            // Check input parameters for NULL.\n            if (!XMLContent.IsNull\
    \ &&\n                !DirPath.IsNull &&\n                !FileName.IsNull)\n\
    \            {\n                // Build File Path string\n                string\
    \ strStamp = (DateStamp) ? \"_\" + DateTime.Now.ToString(\"yyyyMMdd_HHmmss\")\
    \ : \"\";\n                strXMLFile = DirPath.Value + \"\\\\\" + FileName.Value\
    \ + strStamp + \".xml\";\n                // Initialize a new instance of the\
    \ StreamWriter class\n                using (var newFile = new StreamWriter(strXMLFile.Value))\n\
    \                {\n                    // Write the file.\n                 \
    \   newFile.WriteLine(XMLContent);\n                }\n                // Return\
    \ the file path on success.\n                return strXMLFile;\n            }\n\
    \            else\n                // Return warning when any of input value is\
    \ NULL .\n                return \"Input parameters with NULL detected\";\n  \
    \      }\n        catch (Exception ex)\n        {\n            // Return null\
    \ on error.\n            return ex.Message.ToString();\n        }\n    }\n\n \
    \   [SqlFunction]\n    public static SqlString ReadXMLFile(SqlString FilePath)\n\
    \    {\n        // Parameters:\n        // FilePath: The file path to the XML\
    \ file.\n        try\n        {\n            // Declare local variable\n     \
    \       string fileContent = \"\";\n            // Check paremeter for null.\n\
    \            if (!FilePath.IsNull)\n            {\n                // Initialize\
    \ a new instance of the StreamReader class for the specified path.\n         \
    \       var fileStream = new FileStream(FilePath.Value, FileMode.Open, FileAccess.Read);\n\
    \                using (var streamReader = new StreamReader(fileStream))\n   \
    \             {\n                    fileContent = streamReader.ReadToEnd();\n\
    \                }\n            }\n            // Return XML document\n      \
    \      return fileContent;\n        }\n        catch (Exception ex)\n        {\n\
    \            // Send exception message on error.\n            return ex.Message.ToString();\n\
    \        }\n    }\n};\n```\n\n*Listing 3-8. Creating `WriteXMLFile` and `ReadXMLFile`\
    \ SQL Server CLR functions*\n\n#### Registering the C# Code File\n\nTo register\
    \ the C# code file:\n\n*   Create folder “`Chapter 3`”.\n*   Save the `XML_ETL.cs`\
    \ file (the file available in the book code samples) in the “`Chapter 3`” folder.\n\
    *   Open Windows Command Line (`cmd.exe`) and then run the command line that is\
    \ shown in Listing 3-9. The `cmd.exe` output is shown in Figure 3-28.\n\n![A435478_1_En_3_Fig28_HTML.jpg](A435478_1_En_3_Fig28_HTML.jpg)\n\
    \n*Figure 3-28. Showing the command-line result*\n\n```bash\nC:\\Windows\\Microsoft.NET\\\
    Framework\\v3.5\\csc.exe /target:library /out:C:\\Chapter3\\ReadWriteXML.dll C:\\\
    Chapter3\\XML_ETL.cs\n```\n\n*Listing 3-9. Demonstrating the Command Line to register\
    \ the `dll`.*\n\n#### Configuring with T-SQL\n\nListing 3-10 demonstrates the\
    \ T-SQL solution to configure the server and database. Created scalar functions\
    \ are shown in Figure 3-29.\n\n![A435478_1_En_3_Fig29_HTML.jpg](A435478_1_En_3_Fig29_HTML.jpg)\n\
    \n*Figure 3-29. Showing created CLR functions*\n\n```sql\n-- Enable CLR\nUSE master\n\
    GO\nsp_configure 'clr enabled', 1;\nGO\nRECONFIGURE\nGO\n-- Configure\nUSE AdventureWorks\n\
    GO\nALTER DATABASE AdventureWorks SET TRUSTWORTHY ON;\nGO\n-- Create Assembly\n\
    CREATE ASSEMBLY ReadWriteXML\nFROM 'C:\\Chapter3\\ReadWriteXML.dll'\nWITH PERMISSION_SET\
    \ = EXTERNAL_ACCESS;\nGO\n-- Create functions\nCREATE FUNCTION dbo.WriteXMLFile(\n\
    \    @Content nvarchar(MAX),\n    @DirPath nvarchar(500),\n    @FileName nvarchar(100),\n\
    \    @DateStamp bit)\nRETURNS nvarchar(MAX) WITH EXECUTE AS CALLER\nAS\nEXTERNAL\
    \ NAME ReadWriteXML.XMLFileETL.WriteXMLFile;\nGO\nCREATE FUNCTION dbo.ReadXMLFile(@FilePath\
    \ nvarchar(500))\nRETURNS nvarchar(MAX) WITH EXECUTE AS CALLER\nAS\nEXTERNAL NAME\
    \ ReadWriteXML.XMLFileETL.ReadXMLFile;\nGO\n```\n\n*Listing 3-10. Creating CLR\
    \ functions*"
  raw: '### Solution


    The CLR (Common Language Runtime) functions could extend T-SQL functionality and
    operate the same way as a SQL Server user-defined object (user-defined functions,
    for this recipe solution). However, CRL objects require a dll (dynamic link library)
    file format (extension .dll) that is used for Windows program codes and procedures.
    For this recipe, the code demonstrates using Visual Studio C#. Listing [3-8](#A435478_1_En_3_Chapter.html#Par238)
    demonstrates the code for the C# file.


    ```

    using System;

    using System.Data;

    using System.Data.SqlClient;

    using System.Data.SqlTypes;

    using Microsoft.SqlServer.Server;

    using System.IO;

    public partial class XMLFileETL

    {

    [SqlFunction]

    public static SqlString WriteXMLFile(SqlString XMLContent,

    SqlString DirPath,

    SqlString FileName,

    SqlBoolean DateStamp)

    {

    /*  Parameters:

    XMLContent: Contains XML document.

    DirPath: The directory path to write to.

    FileName: The file name.

    DateStamp: Determines add datetime stamp to the file or not.

    */

    try

    {

    string strXMLFile = "";

    // Check input parameters for NULL.

    if (!XMLContent.IsNull &&

    !DirPath.IsNull &&

    !FileName.IsNull)

    {

    // Build File Path string

    string strStamp = (DateStamp) ? "_" + DateTime.Now.ToString("yyyyMMdd_HHmmss")
    : "";

    strXMLFile = DirPath.Value + "\\" + FileName.Value + strStamp + ".xml";

    // Initialize a new instance of the StreamWriter class

    using (var newFile = new StreamWriter(strXMLFile.Value))

    {

    // Write the file.

    newFile.WriteLine(XMLContent);

    }

    // Return the file path on success.

    return strXMLFile;

    }

    else

    // Return warning when any of input value is NULL .

    return "Input parameters with NULL detected";

    }

    catch (Exception ex)

    {

    // Return null on error.

    return ex.Message.ToString();

    }

    }

    [SqlFunction]

    public static SqlString ReadXMLFile(SqlString FilePath)

    {

    // Parameters:

    // FilePath: The file path to the XML file.

    try

    {

    // Declare local variable

    string fileContent = "";

    // Check paremeter for null.

    if (!FilePath.IsNull)

    {

    // Initialize a new instance of the StreamReader class for the specified path.

    var fileStream = new FileStream(FilePath.Value, FileMode.Open, FileAccess.Read);

    using (var streamReader = new StreamReader(fileStream))

    {

    fileContent = streamReader.ReadToEnd();

    }

    }

    // Return XML document

    return fileContent;

    }

    catch (Exception ex)

    {

    // Send exception message on error.

    return ex.Message.ToString();

    }

    }

    };

    Listing 3-8.

    Creating WriteXMLFile and ReadXMLFile SQL Server CLR functions

    ```


    To register the C# code file:


    *   Create folder “Chapter[3](#A435478_1_En_3_Chapter.html).”

    *   Save the XML_ETL.cs file (the file available in the book code samples) the
    in “Chapter[3](#A435478_1_En_3_Chapter.html)” folder.

    *   Open Windows Command Line (cmd.exe) and then run the command line that is
    shown in Listing [3-9](#A435478_1_En_3_Chapter.html#Par243). The cmd.exe output
    is shown in Figure [3-28](#A435478_1_En_3_Chapter.html#Fig28).


    ![A435478_1_En_3_Fig28_HTML.jpg](A435478_1_En_3_Fig28_HTML.jpg)


    Figure 3-28.


    Showing the command-line result


    ```

    C:\Windows\Microsoft.NET\Framework\v3.5\csc.exe /target:library /out:C:\Chapter3\ReadWriteXML.dll
    C:\Chapter3\XML_ETL.cs

    Listing 3-9.

    Eemonstrating the Command Line to register the dll.

    ```


    Listing [3-10](#A435478_1_En_3_Chapter.html#Par245) demonstrates the T-SQL solution
    to configure the server and database. Created scalar functions are shown in Figure
    [3-29](#A435478_1_En_3_Chapter.html#Fig29).


    ![A435478_1_En_3_Fig29_HTML.jpg](A435478_1_En_3_Fig29_HTML.jpg)


    Figure 3-29.


    Showing created CLR functions


    ```

    -- Enable CLR

    USE master

    GO

    sp_configure ''clr enabled'', 1;

    GO

    RECONFIGURE

    GO

    -- Configure

    USE AdventureWorks

    GO

    ALTER DATABASE AdventureWorks SET TRUSTWORTHY ON;

    GO

    -- Create Assembly

    CREATE ASSEMBLY ReadWriteXML

    FROM ''C:\Chapter3\ReadWriteXML.dll''

    WITH PERMISSION_SET = EXTERNAL_ACCESS;

    GO

    -- Create functions

    CREATE FUNCTION dbo.WriteXMLFile(

    @Content nvarchar(MAX),

    @DirPath nvarchar(500),

    @FileName nvarchar(100),

    @DateStamp bit)

    RETURNS nvarchar(MAX) WITH EXECUTE AS CALLER

    AS

    EXTERNAL NAME ReadWriteXML.XMLFileETL.WriteXMLFile;

    GO

    CREATE FUNCTION dbo.ReadXMLFile(@FilePath nvarchar(500))

    RETURNS nvarchar(MAX) WITH EXECUTE AS CALLER

    AS

    EXTERNAL NAME ReadWriteXML.XMLFileETL.ReadXMLFile;

    GO

