    The JSON output is demonstrated in Listing [8-22](#A435478_1_En_8_Chapter.html#Par75).


    ```

    SELECT db_name() as ''Database'',

    [Schema].name as ''Tables.SchemaName'',

    [Table].name as ''Tables.TableName'',

    (SELECT [Column].name as ColumnName FROM sys.columns [Column]

    WHERE [Column].object_id = [Table].object_id FOR JSON AUTO

    ) as ''Tables.Columns''

    FROM sys.objects [Table]

    JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

    WHERE type = ''u'' and [Table].name = ''SupplierCategories''

    FOR JSON PATH;

    Listing 8-21.

    Encapsulating the column names within array

    ```


    ```

    [

    {

    "Database": "WideWorldImporters",

    "Tables": {

    "SchemaName": "Purchasing",

    "TableName": "SupplierCategories",

    "Columns": [

    {

    "ColumnName": "SupplierCategoryID"

    },

    {

    "ColumnName": "SupplierCategoryName"

    },

    {

    "ColumnName": "LastEditedBy"

    },

    {

    "ColumnName": "ValidFrom"

    },

    {

    "ColumnName": "ValidTo"

    }

    ]

    }

    }

    ]

    Listing 8-22.

    Showing JSON output with Columns array

    ```


    As you can see, the JSON output in Listing [8-22](#A435478_1_En_8_Chapter.html#Par75)
    is much smaller than the JSON in Listing [8-17](#A435478_1_En_8_Chapter.html#Par59),
    which was provided in the Solution section. I intentionally demonstrated two ways
    to create a JSON output. In some cases, you need object-oriented JSON as it is
    demonstrated in Listings [8-16](#A435478_1_En_8_Chapter.html#Par58) and [8-17](#A435478_1_En_8_Chapter.html#Par59),
    and in another case you need to create compact JSON with an array of values as
    demonstrated in Listings [8-21](#A435478_1_En_8_Chapter.html#Par74) and [8-22](#A435478_1_En_8_Chapter.html#Par75).


    ## 8-6\. Handling Escape Characters


    ### Problem


    You do not want to return an escape character “\” in the JSON output.


    ### Solution


    A JSON_QUERY() function eliminates escape characters in JSON output. Listing [8-23](#A435478_1_En_8_Chapter.html#Par79)
    demonstrates how a JSON_QUERY() function “fixes” the JSON output for the column
    InvoiceDate, which holds JSON data. Listing [8-24](#A435478_1_En_8_Chapter.html#Par80)
    demonstrates the JSON output. To create table CustomerInvoice, run Listing [8-25](#A435478_1_En_8_Chapter.html#Par82)
    first.


    ```

    SELECT [CustomerName]

    ,[PrimaryContact]

    ,[AlternateContact]

    ,[PhoneNumber]

    ,JSON_QUERY(InvoiceDate) InvoiceDate

    FROM CustomerInvoice

    FOR JSON PATH;

    Listing 8-23.

    Showing JSON_QUERY() function with combination FOR JSON clause and PATH mode

    ```


    ```

    [{

    "CustomerName":"Tailspin Toys (Head Office)",

    "PrimaryContact":"Waldemar Fisar",

    "AlternateContact":"Laimonis Berzins",

    "PhoneNumber":"(308) 555-0100",

    "InvoiceDate":{ "InvoiceDate":"03/04/2013"}

    },

    {

    "CustomerName":"Tailspin Toys (Head Office)",

    "PrimaryContact":"Waldemar Fisar",

    "AlternateContact":"Laimonis Berzins",

    "PhoneNumber":"(308) 555-0100",

    "InvoiceDate":{"InvoiceDate":"03/12/2013"}

    }]

    Listing 8-24.

    Showing fixed JSON output

    ```'
