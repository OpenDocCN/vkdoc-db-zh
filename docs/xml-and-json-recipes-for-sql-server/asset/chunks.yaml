- fmt: "# 7-3 Creating a Secondary VALUE Type Index\n\n## Problem\n\nYou want to improve\
    \ an XML column when a wildcard is implemented in XQuery or the path is not fully\
    \ specified.\n\n## Solution\n\nA secondary value type XML index benefits XQuery\
    \ performance when the path is not fully specified or if it includes a wildcard.\
    \ Listing [7-10](#A435478_1_En_7_Chapter.html#Par58) creates the sample table\
    \ and primary XML index we previously created in Solutions 7-1 and 7-2. If you\
    \ have already created this table, then you do not need to recreate it.\n\n```sql\n\
    -- These settings are important when creating XML indexes\nSET NUMERIC_ROUNDABORT\
    \ OFF;\nSET ARITHABORT ON;\nSET ANSI_NULLS ON;\nSET ANSI_PADDING ON;\nSET ANSI_WARNINGS\
    \ ON;\nSET CONCAT_NULL_YIELDS_NULL ON;\nSET QUOTED_IDENTIFIER ON;\nGO\n-- Drop\
    \ table SQL Server 2016 syntax\nDROP TABLE IF EXISTS dbo.PersonXML\n-- Create\
    \ and populate a table called PersonXML\nCREATE TABLE dbo.PersonXML\n(\nPersonID\
    \ INT NOT NULL,\nFirstName NVARCHAR(30) NOT NULL,\nMiddleName NVARCHAR(20)NULL,\n\
    LastName NVARCHAR(30) NOT NULL,\nDemographics XML NULL,\nCONSTRAINT PK_PersonXML\
    \ PRIMARY KEY CLUSTERED\n(\nPersonID ASC\n)\n);\nGO\nINSERT dbo.PersonXML\n(\n\
    PersonID,\nFirstName,\nMiddleName,\nLastName,\nDemographics\n)\nSELECT BusinessEntityID,\n\
    FirstName,\nMiddleName,\nLastName,\nDemographics\nFROM Person.Person;\nGO\n--\
    \ Now create the Primary XML index on the dbo.PersonXML table\nCREATE PRIMARY\
    \ XML INDEX IX_PXML_PersonXML_Demographics\nON dbo.PersonXML\n(\nDemographics\n\
    );\nGO\n```\nListing 7-10. Creating sample table with XML column and primary XML\
    \ index\n\nListing [7-11](#A435478_1_En_7_Chapter.html#Par60) shows how to create\
    \ a secondary value XML index on the sample table, and Figure [7-7](#A435478_1_En_7_Chapter.html#Fig7)\
    \ displays the created XML index.\n\n![A435478_1_En_7_Fig7_HTML.jpg](A435478_1_En_7_Fig7_HTML.jpg)\n\
    Figure 7-7. Confirming the secondary value XML index was created\n\n```sql\nCREATE\
    \ XML INDEX IX_XMLVALUE_PersonXML_Demographics\nON dbo.PersonXML\n(\nDemographics\n\
    )\nUSING XML INDEX IX_PXML_PersonXML_Demographics\nFOR VALUE;\n```\nListing 7-11.\
    \ Creating a secondary value type index\n\nThe secondary path type XML index improves\
    \ query performance for the `exist()` method of the XML data type. Listing [7-6](#A435478_1_En_7_Chapter.html#Par46)\
    \ creates the same table from Solution 7-2 and applies a primary XML index to\
    \ it, as these are both required for this solution. Listing [7-7](#A435478_1_En_7_Chapter.html#Par48)\
    \ demonstrates how to create a secondary path XML index on the table. Figure [7-6](#A435478_1_En_7_Chapter.html#Fig6)\
    \ displays the created index.\n\n```sql\n-- These settings are important when\
    \ creating XML indexes\nSET NUMERIC_ROUNDABORT OFF;\nSET ARITHABORT ON;\nSET ANSI_NULLS\
    \ ON;\nSET ANSI_PADDING ON;\nSET ANSI_WARNINGS ON;\nSET CONCAT_NULL_YIELDS_NULL\
    \ ON;\nSET QUOTED_IDENTIFIER ON;\nGO\n-- Drop table SQL Server 2016 syntax\nDROP\
    \ TABLE IF EXISTS dbo.PersonXML\n-- Create and populate a table called PersonXML\n\
    CREATE TABLE dbo.PersonXML\n(\nPersonID INT NOT NULL,\nFirstName NVARCHAR(30)\
    \ NOT NULL,\nMiddleName NVARCHAR(20)NULL,\nLastName NVARCHAR(30) NOT NULL,\nDemographics\
    \ XML NULL,\nCONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED\n(\nPersonID ASC\n\
    )\n);\nGO\nINSERT dbo.PersonXML\n(\nPersonID,\nFirstName,\nMiddleName,\nLastName,\n\
    Demographics\n)\nSELECT BusinessEntityID,\nFirstName,\nMiddleName,\nLastName,\n\
    Demographics\nFROM Person.Person;\nGO\n-- Now create the Primary XML index on\
    \ the dbo.PersonXML table\nCREATE PRIMARY XML INDEX IX_PXML_PersonXML_Demographics\n\
    ON dbo.PersonXML\n(\nDemographics\n);\nGO\n```\nListing 7-6. Creating sample table\
    \ with primary XML index\n\n`GO` Listing [7-7](#A435478_1_En_7_Chapter.html#Par46)\
    \ adds a secondary path XML index to our previously-created sample table with\
    \ primary XML index on it.\n\n![A435478_1_En_7_Fig6_HTML.jpg](A435478_1_En_7_Fig6_HTML.jpg)\n\
    Figure 7-6. Showing a created secondary path type XML index\n\n```sql\nCREATE\
    \ XML INDEX IX_XMLPATH_PersonXML_Demographics\nON dbo.PersonXML\n(\nDemographics\n\
    )\nUSING XML INDEX IX_PXML_PersonXML_Demographics\nFOR PATH;\n```\nListing 7-7.\
    \ Creating a secondary path XML index\n\n## How It Works\n\nA primary XML index\
    \ can improve the performance of queries on XML data type columns. Secondary XML\
    \ indexes can increase query performance on top of the primary XML index. If your\
    \ queries tend to specify the `exist()` method in their `WHERE` clauses, a `SECONDARY\
    \ PATH` type index can potentially further improve query speed. Listing [7-8](#A435478_1_En_7_Chapter.html#Par50)\
    \ specifies a query for the existence of an XQuery path.\n\n```sql\nSELECT PersonID,\
    \ Demographics\nFROM dbo.PersonXML\nWHERE Demographics.exist('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\n/IndividualSurvey/Occupation') = 1;\n```\nListing 7-8. Demonstrating a SECONDARY\
    \ PATH type index which specifies a query path\n\nAnother option is demonstrated\
    \ in Listing [7-9](#A435478_1_En_7_Chapter.html#Par52), where both the path and\
    \ a predicate are specified.\n\n```sql\nSELECT PersonID, Demographics\nFROM dbo.PersonXML\n\
    WHERE Demographics.exist('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\n/IndividualSurvey[TotalPurchaseYTD > 9000]') = 1;\n```\nListing 7-9. Showing\
    \ a secondary path type XML index specifying the path and predicate.\n\nA secondary\
    \ path type XML index, as well as value and property type secondary indexes, are\
    \ each built on top of a primary XML index. The syntax of the `CREATE XML INDEX`\
    \ to create a secondary path XML index has four parts:\n\n```sql\nCREATE XML INDEX\
    \ \nON \n(    )\nUSING XML INDEX  FOR PATH;\n```\n\n**Note**\nWhen the primary\
    \ XML index is dropped, all associated secondary XML indexes are dropped automatically."
