    Figure 3-14.


    Showing the package switch to design mode options


    Now the SSIS package development is completed and the XML file was created in
    the specified destination, “C:\TEMP” folder.


    ### How It Works


    The SSIS package “Get XML Content” Execute SQL Task submits a query to the SQL
    Server. The Connection Manager provides a reference to the SQL Server instance
    and the database name, as well as connection credentials, if necessary. The query
    result is assigned to the package-level variable XMLData_Content. The expression
    for the TimeStamp variable computes the date and time to provide uniqueness and
    prevent file collision.


    The “Create XML File” Script Task executes C# code to write the XML result out
    to the file. The package variables provide the file content and the XML file path.


    ## 3-3\. Loading XML from a Stored Procedure


    ### Problem


    You want to read one or more XML files from a source location utilizing T-SQL
    .


    ### Solution


    SQL Server has the ability to read the XML file content and write the XML into
    a table. The mechanics between writing the file to the storage and writing the
    XML data into a table from storage (load the XML) is different. When the file
    is written to storage, we deal with a single XML output per file. However, when
    we load files, one or more files could be in the source location. For this reason,
    the T-SQL code needs to solve the following issues :


    *   Obtain the file names with particular criteria; for example, all files with
    the extension “.xml”.

    *   Access each file and read the file content.

    *   Load (INSERT) the file content into a table.


    Listing [3-6](#A435478_1_En_3_Chapter.html#Par115) demonstrates the solution for
    this problem.


    ```

    CREATE PROCEDURE dbo.usp_LoadXMLFromFile

    @FilePath nvarchar(100)

    AS

    BEGIN

    SET NOCOUNT ON;

    -- Prepare log table

    DECLARE @cmd TABLE

    (

    name NVARCHAR(35),

    minimum INT,

    maximum INT,

    config_value INT,

    run_value INT

    );

    DECLARE @run_value        INT;

    -- Save original configuration set

    INSERT @cmd

    (

    name,

    minimum,

    maximum,

    config_value,

    run_value

    )

    EXEC sp_configure ''xp_cmdshell'';

    SELECT @run_value = run_value

    FROM @cmd;

    IF @run_value = 0

    BEGIN

    -- Enable xp_cmdshell

    EXEC sp_configure ''xp_cmdshell'', 1;

    RECONFIGURE;

    END;

    IF NOT EXISTS

    (

    SELECT *

    FROM sys.objects

    WHERE object_id = OBJECT_ID(N''[dbo].[_XML]'') AND type in (N''U'')

    )

    CREATE TABLE dbo._XML

    (

    ID INT NOT NULL IDENTITY(1,1) PRIMARY KEY,

    XMLFileName NVARCHAR(300),

    XML_LOAD XML,

    Created DATETIME

    )

    ELSE

    TRUNCATE TABLE dbo._XML;

    DECLARE @DOS NVARCHAR(300) = N'''',

    @DirBaseLocation NVARCHAR(500),

    @FileName NVARCHAR(300),

    @SQL NVARCHAR(1000) = N'''';

    DECLARE @files TABLE

    (

    tID INT IDENTITY(1,1) NOT NULL PRIMARY KEY,

    XMLFile NVARCHAR(300)

    );

    -- Verify that last character is \

    SET @DirBaseLocation = IIF(RIGHT(@FilePath, 1) = ''\'', @FilePath, @FilePath +
    ''\'');

    SET @DOS = ''dir /B /O:-D '' + @DirBaseLocation;

    INSERT @files

    (

    XMLFile

    )

    EXEC master..xp_cmdshell @DOS;

    IF @run_value = 0

    BEGIN

    -- Disable xp_cmdshell

    EXECUTE sp_configure ''xp_cmdshell'', 0;

    RECONFIGURE;

    END;

    DECLARE cur CURSOR

    FOR          SELECT XMLFile

    FROM @files

    WHERE XMLFile like ''%.xml'';

    OPEN cur;

    FETCH NEXT

    FROM cur

    INTO @FileName;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    BEGIN TRY

    SET @SQL = ''INSERT INTO _XML SELECT '''''' + @DirBaseLocation + @FileName

    + '''''', X, GETDATE()  FROM OPENROWSET(BULK N'''''' + @DirBaseLocation + @FileName

    + '''''', SINGLE_BLOB) as tempXML(X)'';

    EXECUTE sp_executesql @SQL;

    FETCH NEXT

    FROM cur

    INTO @FileName;

    END TRY

    BEGIN CATCH

    SELECT @SQL, ERROR_MESSAGE();

    END CATCH

    END;

    CLOSE cur;

    DEALLOCATE cur;

    SET NOCOUNT OFF;

    END;

    GO

    Listing 3-6.

    Demonstrating stored procedure usp_LoadXMLFromFile

    ```'
