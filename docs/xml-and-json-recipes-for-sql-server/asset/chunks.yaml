    ### How It Works


    The OPENJSON() table-valued function shreds and converts a JSON document into
    a rowset. Since the OPENJSON() function returns a rowset, the function can be
    used in the FROM clause using the CROSS APPLY and OUTER APPLY operators.


    The OPENJSON() function consists of two arguments and a WITH clause:


    *   jsonExpression (required) – JSON valid column or variable

    *   path (optional) – JSON object or array path

    *   WITH clause (optional) – explicitly defines the output table; therefore, the
    name and data type is required for each column. Optionally, the WITH clause could
    reference an object or array, as shown in Listing [9-18](#A435478_1_En_9_Chapter.html#Par74).


    Before we review the query details from Listing [9-17](#A435478_1_En_9_Chapter.html#Par74),
    we’ll discuss one JSON document from the [Application].[People] table, column
    [UserPreferences], as shown in Listing [9-18](#A435478_1_En_9_Chapter.html#Par75).


    ```

    {

    "theme": "blitzer",

    "dateFormat": "yy-mm-dd",

    "timeZone": "PST",

    "table": {

    "pagingType": "full_numbers",

    "pageLength": 25

    },

    "favoritesOnDashboard": true

    }

    Listing 9-18.

    Showing JSON document

    ```


    The document has four key-value elements that are considered to be first level:


    *   theme

    *   dateFormat

    *   timeZone

    *   favoritesOnDashboard


    Additionally, the sub-objects table contains two more key-value elements:


    *   pagingType

    *   pageLength


    The OPENJSON() function in the Solution section (Listing [9-17](#A435478_1_En_9_Chapter.html#Par74))
    is implemented with the required argument only, which is the UserPreferences column,
    for example: OPENJSON([UserPreferences]). For the provided Solution, there is
    no need to specify the path argument, because all JSON keys are explicitly defined
    in the WITH clause, for example:


    ```

    CROSS APPLY OPENJSON([UserPreferences])

    WITH

    (

    theme        varchar(20) ''$.theme'',

    [dateFormat] varchar(20) ''$.dateFormat'',

    timeZone     varchar(10) ''$.timeZone'',

    pagingType   varchar(20) ''$.table.pagingType'',

    pageLength   int         ''$.table.pageLength'',

    favoritesOnDashboard bit ''$.favoritesOnDashboard''

    ) AS UserPref

    ```


    The OPENJSON() function could be defined for all first-level keys by default.
    For example, the same output is returned for the OPENJSON() function when the
    WITH clause does not have an explicit path for the first-level keys, as demonstrated
    in Listing [9-19](#A435478_1_En_9_Chapter.html#Par87).


    ```

    SELECT UserPref.theme,

    UserPref.[dateFormat],

    UserPref.timeZone,

    UserPref.pagingType,

    UserPref.pageLength,

    UserPref.favoritesOnDashboard

    FROM [Application].[People]

    CROSS APPLY OPENJSON([UserPreferences])

    WITH

    (

    theme        varchar(20),

    [dateFormat] varchar(20),

    timeZone     varchar(10),

    pagingType   varchar(20) ''$.table.pagingType'',

    pageLength   int         ''$.table.pageLength'',

    favoritesOnDashboard bit

    ) AS UserPref;

    Listing 9-19.

    Shredding a JSON document with default first level keys

    ```


    There is one caveat with such an implementation; all first level keys in the WITH
    clause must match the JSON document name and the name is case sensitive. The sub-object
    table is still a required path specification, due to the second JSON level.


    When the OPENJSON() function is used with all defaults, that is, no path argument
    and no WITH clause , the function returns three columns:


    | Type column value | JSON data type decription |

    | --- | --- |

    | 0 | NULL |

    | 1 | string |

    | 2 | int |

    | 3 | boolean (true/false) |

    | 4 | array |

    | 5 | object |


    *   Key – nvarchar(4000), returns a JSON key, object or array name.

    *   Value – nvarchar(max), returns a JSON property value.

    *   Type – int, returns a type of the JSON property value. The type descriptions
    are demonstrated in Table 9-1.


    Listing [9-20](#A435478_1_En_9_Chapter.html#Par94) uses the JSON data from Listing
    [9-18](#A435478_1_En_9_Chapter.html#Par75), denoting the JSON document from a
    variable into a table structure. Figure [9-8](#A435478_1_En_9_Chapter.html#Fig8)
    demonstrates the result from a JSON variable.


    ![A435478_1_En_9_Fig8_HTML.jpg](A435478_1_En_9_Fig8_HTML.jpg)


    Figure 9-8.


    Showing the OPENJSON() function result


    ```

    declare @json varchar(max) =

    ''{

    "theme": "blitzer",

    "dateFormat": "yy-mm-dd",

    "timeZone": "PST",

    "table": {

    "pagingType": "full_numbers",

    "pageLength": 25

    },

    "favoritesOnDashboard": true

    }''

    SELECT [key], [value], [type]

    FROM OPENJSON(@json);

    Listing 9-20.

    Running the OPENJSON() function without an optional argument or WITH clause

    ```


    ## 9-6\. Processing JSON Nested Sub-Objects


    ### Problem


    You want to shred JSON with several nested levels.'
