    \  FOR XML AUTO, TYPE\n) Subcategory\nFROM   Production.ProductCategory Category\n\
    FOR XML AUTO, ELEMENTS, TYPE, ROOT('Categories');\n清单 2-21.\n实现 TYPE 指令\n```\n\
