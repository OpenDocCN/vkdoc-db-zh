    Listing 9-21.

    Shredding multiple JSON sub-object solution

    ```


    ### How It Works


    The mechanism to shred multi sub-object JSON data is based on a parent-child object
    reference set. To understand how it works, we need to take a closer look at the
    JSON document from the Table_Info_JSON table in Listing [9-22](#A435478_1_En_9_Chapter.html#Par99).


    ```

    {

    "Database": "WideWorldImporters",

    "Tables": {

    "SchemaName": "Warehouse",

    "TableName": "Colors",

    "Columns": [

    { "ColumnName": "ColorID" },

    { "ColumnName": "ColorName" },

    { "ColumnName": "LastEditedBy" },

    { "ColumnName": "ValidFrom" },

    { "ColumnName": "ValidTo" }

    ]

    }

    }

    Listing 9-22.

    Showing the JSON document

    ```


    The JSON document shown in Sample 9-9 has three levels:


    *   Top Level 1 – key "Database"

    *   Sub-Level 2 – object "Tables"

    *   Sub-Level 3 – array "Columns"


    Therefore, the JSON structure reflected in the FROM clause is demonstrated in
    Listing [9-23](#A435478_1_En_9_Chapter.html#Par105):


    ```

    FROM dbo.Table_Info_JSON

    CROSS APPLY OPENJSON (JSONDoc) <- reference to the table column

    WITH

    (

    [Database] varchar(30),

    [Tables] nvarchar(MAX) AS JSON

    ) as db

    CROSS APPLY OPENJSON ([Tables]) <- reference to [Tables] JSON object

    WITH

    (

    TableName varchar(30),

    SchemaName varchar(30),

    [Columns] nvarchar(MAX) AS JSON

    ) as tbl

    CROSS APPLY OPENJSON ([Columns]) <- reference to [Columns] JSON array

    WITH

    (

    ColumnName varchar(30)

    ) as clmn

