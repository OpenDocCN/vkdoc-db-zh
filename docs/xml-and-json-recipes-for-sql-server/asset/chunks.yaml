    \ 指令生成的嵌套分层 XML 片段。\n```\n\n### 工作原理\n\n默认情况下，`FOR XML` 子句返回 `nvarchar(max)` 数据类型的结果。子查询生成的\
    \ XML 作为字符数据返回，而不是所需的 XML 格式。当 SQL Server 将 XML 数据转换为字符格式时，它会正确地对某些特殊字符进行实体编码，例如“`<`”和“`>`”字符（分别为\
    \ `&lt;` 和 `&gt;`）。`TYPE` 指令强制 SQL 以正确的 XML 格式返回 XML 结果，而不对内容进行实体编码。`TYPE` 指令可以与所有\
