    ### 工作原理


    SSIS 包 `Get XML Content` 中的 `Execute SQL Task` 向 SQL Server 提交查询。`Connection Manager`
    提供对 SQL Server 实例和数据库名称的引用，必要时还包括连接凭据。查询结果被赋值给包级变量 `XMLData_Content`。`TimeStamp`
    变量的表达式计算日期和时间，以提供唯一性并防止文件冲突。


    `Create XML File` `Script Task` 执行 C# 代码，将 XML 结果写入文件。包变量提供文件内容和 XML 文件路径。


    ## 3-3. 从存储过程加载 XML


    ### 问题


    你想利用 T-SQL 从一个或多个源位置读取 XML 文件。


    ### 解决方案


    SQL Server 能够读取 XML 文件内容并将 XML 写入表中。将文件写入存储与从存储将 XML 数据写入表（加载 XML）的机制是不同的。当文件写入存储时，我们处理的是每个文件一个
    XML 输出。然而，当加载文件时，源位置可能有一个或多个文件。因此，T-SQL 代码需要解决以下问题：


    *   获取符合特定条件的文件名；例如，所有扩展名为 `.xml` 的文件。

    *   访问每个文件并读取文件内容。

    *   将文件内容加载（`INSERT`）到表中。


    代码清单 3-6 演示了此问题的解决方案。


    ```sql

    CREATE PROCEDURE dbo.usp_LoadXMLFromFile

    @FilePath nvarchar(100)

    AS

    BEGIN

    SET NOCOUNT ON;

    -- Prepare log table

    DECLARE @cmd TABLE

    (

    name NVARCHAR(35),

    minimum INT,

    maximum INT,

    config_value INT,

    run_value INT

    );

    DECLARE @run_value        INT;

    -- Save original configuration set

    INSERT @cmd

    (

    name,

    minimum,

    maximum,

    config_value,

    run_value

    )

    EXEC sp_configure ''xp_cmdshell'';

    SELECT @run_value = run_value

    FROM @cmd;

    IF @run_value = 0

    BEGIN

    -- Enable xp_cmdshell

    EXEC sp_configure ''xp_cmdshell'', 1;

    RECONFIGURE;

    END;

    IF NOT EXISTS

    (

    SELECT *

    FROM sys.objects

    WHERE object_id = OBJECT_ID(N''[dbo].[_XML]'') AND type in (N''U'')

    )

    CREATE TABLE dbo._XML

    (

    ID INT NOT NULL IDENTITY(1,1) PRIMARY KEY,

    XMLFileName NVARCHAR(300),

    XML_LOAD XML,

    Created DATETIME

    )

    ELSE

    TRUNCATE TABLE dbo._XML;

    DECLARE @DOS NVARCHAR(300) = N'''',

    @DirBaseLocation NVARCHAR(500),

    @FileName NVARCHAR(300),

    @SQL NVARCHAR(1000) = N'''';

    DECLARE @files TABLE

    (

    tID INT IDENTITY(1,1) NOT NULL PRIMARY KEY,

    XMLFile NVARCHAR(300)

    );

    -- Verify that last character is \

    SET @DirBaseLocation = IIF(RIGHT(@FilePath, 1) = ''\'', @FilePath, @FilePath +
    ''\'');

    SET @DOS = ''dir /B /O:-D '' + @DirBaseLocation;

    INSERT @files

    (

    XMLFile

    )

    EXEC master..xp_cmdshell @DOS;

    IF @run_value = 0

    BEGIN

    -- Disable xp_cmdshell

    EXECUTE sp_configure ''xp_cmdshell'', 0;

    RECONFIGURE;

    END;

    DECLARE cur CURSOR

    FOR          SELECT XMLFile

    FROM @files

    WHERE XMLFile like ''%.xml'';

    OPEN cur;

    FETCH NEXT

    FROM cur

    INTO @FileName;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    BEGIN TRY

    SET @SQL = ''INSERT INTO _XML SELECT '''''' + @DirBaseLocation + @FileName

    + '''''', X, GETDATE()  FROM OPENROWSET(BULK N'''''' + @DirBaseLocation + @FileName

    + '''''', SINGLE_BLOB) as tempXML(X)'';

    EXECUTE sp_executesql @SQL;

    FETCH NEXT

    FROM cur

    INTO @FileName;

    END TRY

    BEGIN CATCH

    SELECT @SQL, ERROR_MESSAGE();

    END CATCH

    END;

    CLOSE cur;

    DEALLOCATE cur;

    SET NOCOUNT OFF;

    END;

    GO

    ```

