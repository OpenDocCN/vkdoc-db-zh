- fmt: "## 9-4. Implementing Strict Mode for JSON Paths\n\n### How It Works\n\nThe\
    \ JSON functions that support the path argument can implement strict mode to force\
    \ an error when a returned scalar value is `NULL`. These functions are:\n\n* \
    \  `JSON_VALUE()`\n*   `JSON_QUERY()`\n*   `JSON_MODIFY()`\n*   `OPENJSON()`\n\
    \nThe path argument for functions supporting the path argument can run in two\
    \ modes:\n\n*   `lax` mode (default), JSON function returns a scalar `NULL` value\n\
    *   `strict` mode, JSON function returns an error instead of a `NULL` value\n\n\
    **Caution**\n\nBoth `lax` and `strict` keywords are case sensitive; therefore,\
    \ implementation is required to be in lowercase only.\n\nListing 9-15 demonstrates\
    \ how to detect a problem for a `JSON_VALUE()` function scalar output when executing\
    \ the code in strict mode. Listing 9-16 demonstrates the error message.\n\n```sql\n\
    declare @json nvarchar(max) = '\n{\n\"RegularText\":\"Regular Text\",\n\"LongText\"\
    :\"Long Text' + REPLICATE(' too long ', 500) + '\"\n}'\nSELECT JSON_VALUE(@json,\
    \ 'strict $.LongText') LongText\n```\n\n*Listing 9-15. Implementing strict mode*\n\
    \n```sql\nMsg 13625, Level 16, State 1, Line 7\nString value in the specified\
    \ JSON path would be truncated.\n```\n\n*Listing 9-16. Showing the error message*\n\
    \nThe error message in Listing 9-16 notifies that the text exceeded the maximum\
    \ 4,000 characters. However, the `OPENJSON()` function, which we’ll cover in the\
    \ next recipe, can fix this problem.\n\n## 9-5. Converting JSON into a Table\n\
    \n### Problem\n\nYou want to convert a JSON document into columns and rows.\n\n\
    ### Solution\n\nThe `OPENJSON()` table-valued function shreds the JSON document\
    \ and returns a resultset in columns-rows format. Listing 9-17 shreds the JSON\
    \ document from table `[Application].[People]`, column `[UserPreferences]`. Figure\
    \ 9-7 shows the query result.\n\n![A435478_1_En_9_Fig7_HTML.jpg](A435478_1_En_9_Fig7_HTML.jpg)\n\
    \n*Figure 9-7. Showing the query result*\n\n```sql\nSELECT UserPref.theme,\n \
    \      UserPref.[dateFormat],\n       UserPref.timeZone,\n       UserPref.pagingType,\n\
    \       UserPref.pageLength,\n       UserPref.favoritesOnDashboard\nFROM [Application].[People]\n\
    CROSS APPLY OPENJSON([UserPreferences])\nWITH\n(\n   theme         varchar(20)\
    \ '$.theme',\n   [dateFormat]  varchar(20) '$.dateFormat',\n   timeZone      varchar(10)\
    \ '$.timeZone',\n   pagingType    varchar(20) '$.table.pagingType',\n   pageLength\
    \    int         '$.table.pageLength',\n   favoritesOnDashboard bit  '$.favoritesOnDashboard'\n\
    ) AS UserPref;\n```\n\n*Listing 9-17. Converting JSON into table structure*\n\n\
    ### How It Works\n\nThe `OPENJSON()` table-valued function shreds and converts\
    \ a JSON document into a rowset. Since the `OPENJSON()` function returns a rowset,\
    \ the function can be used in the `FROM` clause using the `CROSS APPLY` and `OUTER\
    \ APPLY` operators.\n\nThe `OPENJSON()` function consists of two arguments and\
    \ a `WITH` clause:\n\n*   `jsonExpression` (required) – JSON valid column or variable\n\
    *   `path` (optional) – JSON object or array path\n*   `WITH` clause (optional)\
    \ – explicitly defines the output table; therefore, the name and data type is\
    \ required for each column. Optionally, the `WITH` clause could reference an object\
    \ or array, as shown in Listing 9-18.\n\nBefore we review the query details from\
    \ Listing 9-17, we’ll discuss one JSON document from the `[Application].[People]`\
    \ table, column `[UserPreferences]`, as shown in Listing 9-18.\n\n```json\n{\n\
    \  \"theme\": \"blitzer\",\n  \"dateFormat\": \"yy-mm-dd\",\n  \"timeZone\": \"\
    PST\",\n  \"table\": {\n    \"pagingType\": \"full_numbers\",\n    \"pageLength\"\
    : 25\n  },\n  \"favoritesOnDashboard\": true\n}\n```\n\n*Listing 9-18. Showing\
    \ JSON document*\n\nThe document has four key-value elements that are considered\
    \ to be first level:\n\n*   `theme`\n*   `dateFormat`\n*   `timeZone`\n*   `favoritesOnDashboard`\n\
    \nAdditionally, the sub-objects `table` contains two more key-value elements:\n\
    \n*   `pagingType`\n*   `pageLength`\n\nThe `OPENJSON()` function in the Solution\
    \ section (Listing 9-17) is implemented with the required argument only, which\
    \ is the `UserPreferences` column, for example: `OPENJSON([UserPreferences])`.\
    \ For the provided Solution, there is no need to specify the path argument, because\
    \ all JSON keys are explicitly defined in the `WITH` clause, for example:\n\n\
    ```sql\nCROSS APPLY OPENJSON([UserPreferences])\nWITH\n(\n   theme        varchar(20)\
    \ '$.theme',\n   [dateFormat] varchar(20) '$.dateFormat',\n   timeZone     varchar(10)\
    \ '$.timeZone',\n   pagingType   varchar(20) '$.table.pagingType',\n   pageLength\
    \   int         '$.table.pageLength',\n   favoritesOnDashboard bit '$.favoritesOnDashboard'\n\
    ) AS UserPref\n```\n\nThe `OPENJSON()` function could be defined for all first-level\
    \ keys by default. For example, the same output is returned for the `OPENJSON()`\
    \ function when the `WITH` clause does not have an explicit path for the first-level\
    \ keys, as demonstrated in Listing 9-19.\n\n```sql\nSELECT UserPref.theme,\n \
    \      UserPref.[dateFormat],\n       UserPref.timeZone,\n       UserPref.pagingType,\n\
    \       UserPref.pageLength,\n       UserPref.favoritesOnDashboard\nFROM [Application].[People]\n\
    CROSS APPLY OPENJSON([UserPreferences])\nWITH\n(\n   theme        varchar(20),\n\
    \   [dateFormat] varchar(20),\n   timeZone     varchar(10),\n   pagingType   varchar(20)\
    \ '$.table.pagingType',\n   pageLength   int         '$.table.pageLength',\n \
    \  favoritesOnDashboard bit\n) AS UserPref;\n```\n\n*Listing 9-19. Shredding a\
    \ JSON document with default first level keys*\n\nThere is one caveat with such\
    \ an implementation; all first level keys in the `WITH` clause must match the\
    \ JSON document name and the name is case sensitive. The sub-object `table` is\
    \ still a required path specification, due to the second JSON level.\n\nWhen the\
    \ `OPENJSON()` function is used with all defaults, that is, no path argument and\
    \ no `WITH` clause, the function returns three columns:\n\n| Type column value\
    \ | JSON data type description |\n| --- | --- |\n| 0 | `NULL` |\n| 1 | `string`\
    \ |\n| 2 | `int` |\n| 3 | `boolean` (true/false) |\n| 4 | `array` |\n| 5 | `object`\
    \ |\n\n*   `Key` – `nvarchar(4000)`, returns a JSON key, object or array name.\n\
    *   `Value` – `nvarchar(max)`, returns a JSON property value.\n*   `Type` – `int`,\
    \ returns a type of the JSON property value. The type descriptions are demonstrated\
    \ in Table 9-1.\n\nListing 9-20 uses the JSON data from Listing 9-18, denoting\
    \ the JSON document from a variable into a table structure. Figure 9-8 demonstrates\
    \ the result from a JSON variable.\n\n![A435478_1_En_9_Fig8_HTML.jpg](A435478_1_En_9_Fig8_HTML.jpg)\n\
    \n*Figure 9-8. Showing the OPENJSON() function result*\n\n```sql\ndeclare @json\
    \ varchar(max) =\n'{\n  \"theme\": \"blitzer\",\n  \"dateFormat\": \"yy-mm-dd\"\
    ,\n  \"timeZone\": \"PST\",\n  \"table\": {\n    \"pagingType\": \"full_numbers\"\
    ,\n    \"pageLength\": 25\n  },\n  \"favoritesOnDashboard\": true\n}'\nSELECT\
    \ [key], [value], [type]\nFROM OPENJSON(@json);\n```\n\n*Listing 9-20. Running\
    \ the OPENJSON() function without an optional argument or WITH clause*\n\n## 9-6.\
    \ Processing JSON Nested Sub-Objects\n\n### Problem\n\nYou want to shred JSON\
    \ with several nested levels."
