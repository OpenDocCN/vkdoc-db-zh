- fmt: '# 9. Converting JSON to Row Sets


    In this chapter, we will discuss recipes demonstrating how to detect a JSON document,
    different ways to shred JSON, and how to improve performance when you want to
    filter a JSON document. SQL Server JSON integration provides comprehensive coverage
    to convert a JSON document into a scalar value and rows-columns set. You will
    find a variety of tested samples and possible scenarios to help you find the most
    appropriate solution for your task.


    ## 9-1. Detecting the Columns with JSON


    ### Problem


    You want to detect all columns with JSON data in a database.


    ### Solution


    An `ISJSON()` function detects when data is valid JSON. Listing [9-1](#A435478_1_En_9_Chapter.html#Par4)
    demonstrates the process on how to detect JSON document within a database. Figure
    [9-1](#A435478_1_En_9_Chapter.html#Fig1) demonstrates the SQL script result.


    ![A435478_1_En_9_Fig1_HTML.jpg](A435478_1_En_9_Fig1_HTML.jpg)


    *Figure 9-1. Showing detected tables and columns with JSON data*


    ```sql

    SET NOCOUNT ON;

    DECLARE @SQL nvarchar(1000)

    IF (OBJECT_ID(''tempdb.dbo.#Result'')) IS NOT NULL

    DROP TABLE #Result

    CREATE TABLE #Result (tblName nvarchar(200),

    clmnName nvarchar(100),

    DateType nvarchar(100),

    JSONDoc nvarchar(MAX),)

    DECLARE cur CURSOR

    FOR

    SELECT ''SELECT TOP (1) '''''' + QUOTENAME(s.name) +''.'' + QUOTENAME(o.name)
    + '''''' as TblName, ''''''

    + QUOTENAME(c.name)  + '''''' as ClmName, ''''''

    + t.name  + QUOTENAME(case c.max_length when -1 then ''MAX'' ELSE cast(c.max_length
    as varchar(5)) END , '')'') + '''''' as DataType, ''

    + QUOTENAME(c.name)  + '' FROM ''

    + QUOTENAME(s.name) +''.'' + QUOTENAME(o.name) +

    '' WHERE ISJSON('' + QUOTENAME(c.name)  + '') = 1;''

    FROM sys.columns c

    JOIN sys.types t on c.system_type_id = t.system_type_id

    JOIN sys.objects o ON c.object_id = o.object_id AND o.type = ''u''

    JOIN sys.schemas s ON s.schema_id = o.schema_id

    WHERE t.name IN(''varchar'', ''nvarchar'')

    AND (c.max_length = -1 OR c.max_length > 100)

    OPEN cur

    FETCH NEXT FROM cur INTO @SQL

    WHILE @@FETCH_STATUS = 0

    BEGIN

    print @SQL

    INSERT #Result

    EXEC(@SQL)

    FETCH NEXT FROM cur INTO @SQL

    END

    DEALLOCATE cur;

    SELECT JSONDoc,tblName,clmnName,DateType

    FROM #Result

    ORDER BY tblName, clmnName

    DROP TABLE #Result

    SET NOCOUNT OFF;

    ```


    *Listing 9-1. Detecting JSON data*


    ### How It Works


    An `ISJSON()` function verifies whether a string type value is valid JSON. The
    `ISJSON()` function returns:


    *   1 when the string is valid JSON document.

    *   0 when the string is invalid JSON document.

    *   NULL when an expression is a NULL value.


    Empty curly brackets `{}` and empty square brackets `[]` are considered to be
    valid JSON, therefore, the `ISJSON()` function returns 1 on those values. The
    `ISJSON()` function will detect the JSON document, and a cursor is established
    to build dynamic SQL, as shown in Listing [9-2](#A435478_1_En_9_Chapter.html#Par10).


    ```sql

    DECLARE cur CURSOR

    FOR

    SELECT ''SELECT TOP (1) '''''' + QUOTENAME(s.name) +''.'' + QUOTENAME(o.name)
    + '''''' as TblName, ''''''

    + QUOTENAME(c.name)  + '''''' as ClmName, ''''''

    + t.name  + QUOTENAME(case c.max_length when -1 then ''MAX'' ELSE cast(c.max_length
    as varchar(5)) END , '')'') + '''''' as DataType, ''

    + QUOTENAME(c.name)  + '' FROM ''

    + QUOTENAME(s.name) +''.'' + QUOTENAME(o.name) +

    '' WHERE ISJSON('' + QUOTENAME(c.name)  + '') = 1;''

    FROM sys.columns c

    JOIN sys.types t on c.system_type_id = t.system_type_id

    JOIN sys.objects o ON c.object_id = o.object_id AND o.type = ''u''

    JOIN sys.schemas s ON s.schema_id = o.schema_id

    WHERE t.name IN(''varchar'', ''nvarchar'')

    AND (c.max_length = -1 OR c.max_length > 100);

    ```


    *Listing 9-2. Building dynamic SQL to detect JSON documents*


    The columns that store JSON have `nvarchar` and `varchar` data types. Theoretically,
    the columns with `nchar` and `char` data types could store the JSON as well; however,
    a fixed length data type is not appropriate for JSON. The wrong design consideration
    could be implemented in binary data types, such as `varbinary` and `image` for
    JSON documents.


    **Note**


    Microsoft recommends `nvarchar(max)` as a standard data type to store the JSON
    documents, as it is implemented in the WideWorldImporters sample database (Figure
    [9-1](#A435478_1_En_9_Chapter.html#Fig1)). All columns that store JSON have the
    `nvarchar(max)` data type.


    Therefore, the dynamic SQL (Listing [9-1](#A435478_1_En_9_Chapter.html#Par4))
    for the cursor filters the table `sys.types` and column name by ‘`varchar`’, ‘`nvarchar`’.
    In Chapter [4](#A435478_1_En_4_Chapter.html), Recipe 4-7 demonstrated how to detect
    an XML column when the data type filter is included in four more data types: `varbinary`,
    `image`, `text`, and `ntext`. Also, it is less likely to store JSON where the
    column length is less than 100. Therefore, the column `max_length` from the table
    `sys.columns` is filtered by -1, which is `MAX` OR greater than 100.


    The `SELECT` statement for a cursor produces dynamic SQL output of:


    1.  `Schema.TableName` – defines schema and table

    2.  `ColumnName` – defines column name

    3.  `DataType(data length)` – defines data type

    4.  Column name – defines returned JSON document


    The `WHERE` clause implements `ISJSON()` with a column name as an argument. The
    output for a dynamic SQL row is demonstrated in Listing [9-3](#A435478_1_En_9_Chapter.html#Par20).
    The result from the dynamic SQL is shown in Figure [9-2](#A435478_1_En_9_Chapter.html#Fig2).


    ![A435478_1_En_9_Fig2_HTML.jpg](A435478_1_En_9_Fig2_HTML.jpg)


    *Figure 9-2. Showing the output from Listing [9-3](#A435478_1_En_9_Chapter.html#Par20)*


    ```sql

    SELECT TOP (1) ''[Application].[People]'' as TblName,

    ''[CustomFields]'' as ClmName,

    ''nvarchar(MAX)'' as DataType,

    [CustomFields]

    FROM [Application].[People]

    WHERE ISJSON([CustomFields]) = 1;

    ```


    *Listing 9-3. Resulting code for dynamic SQL*


    A loop is iterating over each line of dynamic SQL and inspects it for potential
    JSON document in each column. When `ISJSON()` returns a value of 1, which means
    TRUE, then the output from that SQL is logged into a temporary table `#Result`,
    which is created before the cursor declaration. When the cursor is exhausted then
    the temporary table `#Result` returns all logged rows.


    ## 9-2. Returning a Subset of a JSON Document


    ### Problem


    You want to return an object or array from a JSON document.


    ### Solution


    The `JSON_QUERY()` function returns a subset (object or array) from a variable
    or column that contains a JSON document. Listing [9-4](#A435478_1_En_9_Chapter.html#Par24)
    demonstrates the query that returns the `Events` array objects (two of those)
    out of a JSON document stored in the `Sales.Invoices` table and `ReturnedDeliveryData`
    column. The result is shown in Listing [9-5](#A435478_1_En_9_Chapter.html#Par25).


    ```sql

    SELECT TOP (1) JSON_QUERY([ReturnedDeliveryData], ''$.Events'')

    FROM [Sales].[Invoices];

    ```


    *Listing 9-4. Returning Events arrays*


    ```json

    [

    {

    "Event":"Ready for collection",

    "EventTime":"2013-01-01T12:00:00",

    "ConNote":"EAN-125-1051"

    },

    {

    "Event":"DeliveryAttempt",

    "EventTime":"2013-01-02T07:05:00",

    "ConNote":"EAN-125-1051",

    "DriverID":15,

    "Latitude":41.3617214,

    "Longitude":-81.4695602,

    "Status":"Delivered"

    }

    ]

    ```


    *Listing 9-5. Resulting from Listing [9-4]*'
