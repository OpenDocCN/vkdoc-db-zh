    ## 10-4\. Appending a JSON Property


    ### Problem


    You want to add a new value to an existing array.


    ### Solution


    The append mode of the JSON_MODIFY() function specifies that the new value needs
    to be added to the existing list of arrays. Listing [10-6](#A435478_1_En_10_Chapter.html#Par25)
    demonstrates how to add a new language to the “OtherLanguages” array. A before-and-after
    comparison of the returned result with JSON output is shown in Figure [10-4](#A435478_1_En_10_Chapter.html#Fig4).


    ![A435478_1_En_10_Fig4_HTML.jpg](A435478_1_En_10_Fig4_HTML.jpg)


    Figure 10-4.


    Showing new language appended to a JSON array


    ```

    SELECT CustomFields

    ,JSON_MODIFY(CustomFields,''append $.OtherLanguages'', ''Greek'') AS

    AppendOtherLanguagesArray

    FROM [Application].[People]

    WHERE FullName = ''Isabella Rupp'';

    Listing 10-6.

    Appending Greek language to a JSON array

    ```


    ### How It Works


    The JSON_MODIFY() function provides an optional append mode. The append mode specifies
    the path argument and directs the JSON_MODIFY() function to add a new value to
    an existing list. When the append mode is specified, but the key path does not
    exist, the JSON_MODIFY() function creates a new key-value pair. For example, the
    solution query in Listing [10-6](#A435478_1_En_10_Chapter.html#Par25) is executed
    when the “OtherLanguages” array is spelled in lowercase as shown in Listing [10-7](#A435478_1_En_10_Chapter.html#Par27).
    At this point, a new “otherlanguages” array is created by the JSON_MODIFY() function.
    The result is shown in Figure [10-5](#A435478_1_En_10_Chapter.html#Fig5).


    ![A435478_1_En_10_Fig5_HTML.jpg](A435478_1_En_10_Fig5_HTML.jpg)


    Figure 10-5.


    Showing JSON with a duplicated array


    ```

    SELECT CustomFields

    ,JSON_MODIFY(CustomFields,''append $.otherlanguages'', ''Greek'') AS

    AppendOtherLanguagesArray

    FROM [Application].[People]

    WHERE FullName = ''Isabella Rupp'';

    Listing 10-7.

    Appending a nonexisting array

    ```


    To avoid such a mistake, make sure that the JSON_MODIFY() function path argument
    is provided with the correct JSON path .


    ## 10-5\. Modifying with Multiple Actions


    ### Problem


    You want to apply several value changes to a JSON string.


    ### Solution


    Create several inline references with supplied arguments to the JSON_MODIFY()
    function. Listing [10-8](#A435478_1_En_10_Chapter.html#Par35) demonstrates multiple
    JSON_MODIFY() function calls. The following is subsequently changed :


    1.  Append the value “Greek” to the “OtherLanguages” array.  

    2.  Update “Title”:“Team Member” to “Title”:“Manager.”  

    3.  Insert the “CommissionRate”:“1.19” key-value pair.  


    Table [10-3](#A435478_1_En_10_Chapter.html#Tab3) demonstrates a side-by-side comparison
    of the original JSON and JSON processed by the JSON_MODIFY() function.


    Table 10-3.


    Comparing result side by side


    | Original JSON | Modified JSON |

    | --- | --- |

    | `{` `"OtherLanguages": [` `"Turkish",` `"Slovenian"` `],` `"HireDate": "2010-08-24T00:00:00",`
    `"Title": "Team Member"` `}` | `{ "OtherLanguages": [` `"Turkish",` `"Slovenian",`
    `"Greek"` `],` `"HireDate": "2010-08-24T00:00:00",` `"Title": "Manager",` `"CommissionRate":
    "1.19"` `}` |


    ```

    SELECT CustomFields

    ,JSON_MODIFY(

    JSON_MODIFY(

    JSON_MODIFY(CustomFields,''append $.OtherLanguages'', ''Greek'')

    , ''$.Title'', ''Manager'')

    ,''$.CommissionRate'', ''1.19'') AS Multi_Changes

    FROM [Application].[People]

    WHERE FullName = ''Isabella Rupp'';

    Listing 10-8.

    Demonstrating multiple JSON_MODIFY() function calls

    ```


    ### How It Works


    The JSON_MODIFY() function has the ability for continuous inline calls with multiple
    modifications . The JSON_MODIFY() function returns modified JSON. Therefore, each
    returned JSON string could be continuously processed for another modification.


