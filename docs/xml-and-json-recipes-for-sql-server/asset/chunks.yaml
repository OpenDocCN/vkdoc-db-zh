    `JSON_QUERY()` 函数有两个参数：


    1.  **Expression** – 一个必需的参数，期望来自列名或变量的 JSON 文档。

    2.  **Path** – 一个可选的参数，提供到 JSON 对象部分的文档路径。


    > **注意**

    >

    > 路径参数中的美元符号 (`$`) 表示 JSON 上下文，可以将其视为顶级对象。


    示例方案演示的 JSON 文档存储在 `Sales.Invoices` 表的 `ReturnedDeliveryData` 列中。例如，清单 [9-6](#A435478_1_En_9_Chapter.html#Par31)
    中显示的完整 JSON 文档有两个额外的键元素 `DeliveredWhen` 和 `ReceivedBy`，它们不属于 `JSON_QUERY()` 结果的一部分，因为路径参数被设置为包含两个子数组的对象
    `Events`。


    ```json

    {

    "Events":[

    {

    "Event":"Ready for collection",

    "EventTime":"2013-01-01T12:00:00",

    "ConNote":"EAN-125-1051"

    },

    {

    "Event":"DeliveryAttempt",

    "EventTime":"2013-01-02T07:05:00",

    "ConNote":"EAN-125-1051",

    "DriverID":15,

    "Latitude":41.3617214,

    "Longitude":-81.4695602,

    "Status":"Delivered"

    }

    ],

    "DeliveredWhen":"2013-01-02T07:05:00",

    "ReceivedBy":"Aakriti Byrraju"

    }

    ```

    **清单 9-6.** 显示完整的 JSON 文档


    要返回单个数组对象，路径参数需要指定一个数组索引，如清单 [9-7](#A435478_1_En_9_Chapter.html#Par33) 所示。清单 [9-8](#A435478_1_En_9_Chapter.html#Par200)
    展示了单个数组对象的 JSON 输出。


    ```sql

    SELECT TOP (1) JSON_QUERY([ReturnedDeliveryData], ''$.Events[0]'')

    FROM [Sales].[Invoices];

    ```

    **清单 9-7.** 引用单个 JSON 数组对象


    ```json

    {

    "Event":"Ready for collection",

    "EventTime":"2013-01-01T12:00:00",

    "ConNote":"EAN-125-1051 "

    }

    ```

    **清单 9-8.** 显示数组输出


    > **警告**

    >

    > 与基于 1 的起始索引的 XML 单例不同，JSON 数组是基于 0 的。因此，要引用第一个数组对象或数组值，索引必须是 0，而不是 1。


    当 `JSON_QUERY()` 函数未设置路径参数时，该函数返回完整的 JSON 文档。


    ## 9-3. 从 JSON 返回标量值


    ### 问题


    你想从 JSON 文档中返回一个标量值。


    ### 解决方案


    `JSON_VALUE()` 函数从 JSON 文档中提取标量值，如清单 [9-9](#A435478_1_En_9_Chapter.html#Par38)
    所示。查询结果如图 [9-3](#A435478_1_En_9_Chapter.html#Fig3) 所示。


    ![A435478_1_En_9_Fig3_HTML.jpg](A435478_1_En_9_Fig3_HTML.jpg)

    **图 9-3.** 显示查询结果


    ```sql

    SELECT TOP (1) JSON_value([ReturnedDeliveryData], ''$.ReceivedBy'') ReceivedBy

    ,JSON_value([ReturnedDeliveryData], ''$.Events[0].Event'') FirstEvent

    ,JSON_value([ReturnedDeliveryData], ''$.Events[0].EventTime'') EventTime

    ,JSON_value([ReturnedDeliveryData], ''$.Events[1].Event'') LastEvent

    ,JSON_value([ReturnedDeliveryData], ''$.Events[1].Status'') [Status]

    FROM [Sales].[Invoices];

    ```

    **清单 9-9.** 返回标量值


    ### 工作原理


    `JSON_VALUE()` 函数有两个必需参数：


    1.  **Expression** – 期望来自列名或变量的 JSON 文档。

    2.  **Path** – 到 JSON 标量值的 JSON 文档路径。


    与返回对象和数组的 `JSON_QUERY()` 函数不同，`JSON_VALUE()` 函数返回 JSON 标量值。如果您尝试使用 `JSON_QUERY()`
    函数返回标量值，将返回 `NULL`。`JSON_VALUE()` 函数则相反——当路径引用对象或数组而不是键时，它返回 `NULL`。例如，清单 [9-10](#A435478_1_En_9_Chapter.html#Par43)
    中的查询演示了在 `JSON_VALUE()` 和 `JSON_QUERY()` 函数之间翻转对象和值引用。图 [9-4](#A435478_1_En_9_Chapter.html#Fig4)
    显示了当引用标量值的 `JSON_VALUE()` 返回 `ReceivedBy` 值而引用标量值的 `JSON_QUERY()` 返回 `NULL` 时的结果。在接下来的两列中，引用数组的
    `JSON_VALUE()` 返回 `NULL` 值，而引用数组的 `JSON_QUERY()` 返回一个 JSON 片段。


    ![A435478_1_En_9_Fig4_HTML.jpg](A435478_1_En_9_Fig4_HTML.jpg)

    **图 9-4.** 显示查询结果


    ```sql

    SELECT TOP (1) JSON_VALUE([ReturnedDeliveryData], ''$.ReceivedBy'') ScalarValue

    ,JSON_QUERY([ReturnedDeliveryData], ''$.ReceivedBy'') ScalarQuery

    ,JSON_VALUE([ReturnedDeliveryData], ''$.Events[0]'') ObjectValue

    ,JSON_QUERY([ReturnedDeliveryData], ''$.Events[0]'') ObjectQuery

    FROM [Sales].[Invoices];

    ```

    **清单 9-10.** 演示 `JSON_VALUE()` 和 `JSON_QUERY()` 函数


    `JSON_VALUE()` 函数为标量值返回 `nvarchar(4000)` 数据类型。清单 [9-11](#A435478_1_En_9_Chapter.html#Par45)
    演示了如何验证 `JSON_VALUE()` 函数返回的数据类型。图 [9-5](#A435478_1_En_9_Chapter.html#Fig5) 显示了返回的结果。


    ![A435478_1_En_9_Fig5_HTML.jpg](A435478_1_En_9_Fig5_HTML.jpg)

    **图 9-5.** 验证代码的输出结果


    ```sql

    DECLARE @Value sql_variant

    SELECT @Value =

    (

    SELECT TOP (1) JSON_value([ReturnedDeliveryData], ''$."ReceivedBy"'')

    FROM [Sales].[Invoices]

    );

    SELECT SQL_VARIANT_PROPERTY(@Value,''BaseType'') BaseType,

    CAST(SQL_VARIANT_PROPERTY(@Value, ''MaxLength'')as int) /

    CASE SQL_VARIANT_PROPERTY(@Value,''BaseType'') WHEN ''nvarchar''

    THEN 2 ELSE 1 END TypeLength,

    SQL_VARIANT_PROPERTY(@Value,''TotalBytes'') TotalBytes;

    ```

    **清单 9-11.** 通过 `JSON_VALUE()` 函数验证返回的数据类型


    当标量值大于 4000 个字符时，该函数返回 `NULL`。清单 [9-12](#A435478_1_En_9_Chapter.html#Par47) 演示了当标量值
    `LongText` 包含 5,009 个字符并由 `JSON_VALUE()` 函数处理时的 JSON 文档。查询结果如图 [9-6](#A435478_1_En_9_Chapter.html#Fig6)
    所示。


    ![A435478_1_En_9_Fig6_HTML.jpg](A435478_1_En_9_Fig6_HTML.jpg)

    **图 9-6.** 显示查询结果


