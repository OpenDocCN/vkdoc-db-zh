    \ Category\nFOR XML AUTO, ROOT('Categories');\n清单 2-20.\n首次尝试使用相关子查询创建分层 XML\n\
    ```\n\n此查询的结果在整个 XML 数据中生成了诸如 `&lt;` 和 `&gt;` 这样的 XML 实体，如图 2-4 所示，而不是预期的正确嵌套的\
    \ XML 元素。\n\n![A435478_1_En_2_Fig4_HTML.jpg](img/A435478_1_En_2_Fig4_HTML.jpg)\n\
    \n图 2-4.\n\n首次尝试创建分层 XML 数据的结果\n\n如何以 XML 格式返回查询？您需要正确的标签，而不是 XML `&gt;` 和 `&lt;`\
    \ 实体。\n\n为了强制结果集以正确的 XML 格式返回，请将 `TYPE` 指令添加到您的 `FOR XML` 子句中。清单 2-9 演示了此选项。清单\
