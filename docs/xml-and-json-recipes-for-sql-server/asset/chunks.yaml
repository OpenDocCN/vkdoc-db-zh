- fmt: "### How It Works\n\n`EXPLICIT` mode is one of the most complex `FOR XML` modes\
    \ to use. All elements and attributes need to be provided explicitly, and each\
    \ child block must be linked to the parent explicitly as well. When comparing\
    \ `EXPLICIT` mode other modes, such as `RAW` and `AUTO`, the queries with the\
    \ `EXPLICIT` mode are much lengthier. The benefit of `EXPLICIT` mode, however,\
    \ is that it provides much greater control over the shape of the XML generated\
    \ by the query result.\n\nTo better understand how `EXPLICIT` mode works, I’ll\
    \ walk you through an example. Let’s start with a base T-SQL query, like the one\
    \ shown in Listing 2-24, which shows SQL that we would like to convert to an XML\
    \ structure.\n\n```sql\nSELECT ProductCategory.Name Category,\nSubcategory.Name\
    \ Subcategory,\nProduct.Name ProductName,\nProduct.Color,\nInventory.Shelf,\n\
    Inventory.Bin,\nInventory.Quantity\nFROM Production.Product Product\nINNER JOIN\
    \ Production.ProductInventory Inventory\nON Product.ProductID = Inventory.ProductID\n\
    INNER JOIN Production.ProductSubcategory Subcategory\nON Product.ProductSubcategoryID\
    \ = Subcategory.ProductSubcategoryID\nINNER JOIN Production.ProductCategory\n\
    ON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name;\n```\n**Listing\
    \ 2-24.** SQL query we would like to convert to XML format\n\nThe SQL in Listing\
    \ 2-24 returns the product list based on categories and subcategories. Therefore,\
    \ we need to make a decision and ask some questions:\n\n1.  How do we want the\
    \ XML structured?\n2.  How many sibling levels does the XML need to have?\n3.\
    \  Which columns will be mapped to elements and which should be attributes?\n\
    4.  Do we need to preserve elements with `NULL` values?\n\nIn Figure 2-5 we show\
    \ the results of the query in Listing 2-24, and begin the process of drawing a\
    \ road map for the XML result we want. Figure 2-5 demonstrates a sample of a road\
    \ map that will help us build the query using `EXPLICIT` mode.\n\n![A435478_1_En_2_Fig5_HTML.jpg](A435478_1_En_2_Fig5_HTML.jpg)\n\
    \n**Figure 2-5.** Results of query in Listing 2-23\n\nUsing this figure as a guide,\
    \ we will define a logical structure that will model our target XML structure.\
    \ This logical structure is shown in Listing 2-25.\n\n```xml\n<ELEMENT />\n<ELEMENT\
    \ />\n<ELEMENT />\n<ELEMENT XSINIL />\n```\n**Listing 2-25.** Proposed logical\
    \ XML structure\n\nFollowing the road map in Figure 2-5 and the logical XML structure\
    \ of Listing 2-25, the resulting XML structure will be composed of five nested\
    \ levels, which will contain:\n\n*   `<Products>` is the root element.\n*   `<Categories>`\
    \ is a container data element that holds each `<Category>` element and all its\
    \ related `<Subcategory>` elements directly.\n*   `<Category>` is a direct child\
    \ of the `<Categories>` element and will contain the category name. The `<Subcategories>`\
    \ element is a sibling of the `<Category>` element, and also a direct child of\
    \ the `<Categories>` element. This is a container element for subcategory-specific\
    \ data related to the sibling `<Category>` element.\n*   `<Subcategory>` is a\
    \ direct child of the `<Subcategories>` element. This element holds the name of\
    \ the current subcategory. The `<Product>` element represents an individual product\
    \ within a subcategory. This element is a direct child of the `<Subcategories>`\
    \ element and a sibling of the `<Subcategory>` element. The `<Product>` element\
    \ will have multiple attributes assigned to it, and it acts as a container for\
    \ product-specific data elements.\n*   `<ProductName>` is a data element that\
    \ contains a product’s name. The `<Color>` element contains a product’s color,\
    \ when available. The `<Color>` element is identified as `XSINIL`, which means\
    \ we want this element to appear in the result even when the source column is\
    \ `NULL`. The `<ProductName>` and `<Color>` elements are siblings, and both are\
    \ direct children of the `<Product>` element.\n\nThe next step is to build the\
    \ query. The syntax for `EXPLICIT` mode has certain rules and specifications that\
    \ you will need to follow:\n\n1.  The query can have one or more `SELECT` statement\
    \ blocks, with `UNION ALL` linking all of them together.\n2.  Each `SELECT` statement\
    \ block must contain two integer type columns named `Tag` and `Parent`, respectively,\
    \ as the first two columns in the query. These columns define the structural relationship\
    \ between the parent and child levels. For example, Listing 2-23 has multiple\
    \ nested levels and the `SELECT` clause establishes the hierarchy, as shown in\
    \ the code snippet in Listing 2-26.\n    ```sql\n    SELECT 1 AS Tag,\n    0 AS\
    \ Parent,\n    .\n    .\n    .\n    UNION ALL\n    SELECT 2 AS Tag,\n    1 AS\
    \ Parent,\n    .\n    .\n    .\n    UNION ALL\n    SELECT 3  AS Tag,\n    2  AS\
    \ Parent,\n    .\n    .\n    .\n    ```\n    **Listing 2-26.** Code snippet ,\
    \ `Tag`, and `Parent` columns define the XML hierarchy\n\n    In the first `SELECT`\
    \ query, the `Parent` column starts the hierarchy, with a value of 0. The `Tag`\
    \ column specifies the hierarchy level. In the second `SELECT` query the `Tag`\
    \ value becomes the `Parent` and increments to the next number. This flip-flop\
    \ mechanism is applied to each hierarchical level.\n3.  The next important rule\
    \ establishes an XML structure. In `EXPLICIT` mode, each column must be defined\
    \ within the first `SELECT` block, and `EXPLICIT` mode has a special syntax for\
    \ this. In Listing 2-23, you can see that all columns after the `Tag` and `Parent`\
    \ columns have a very specific style of alias, which must be formatted as: `[ElementName!TagNumber!AttributeName!Directive]`.\
    \ An example from our query in Listing 2-23 is `[Categories!1!Category!ELEMENT]`.\
    \ This particular alias defines the structure for the `<Category>` element of\
    \ our XML, which contains the category name. Here is the breakdown of this alias:\n\
    \    *   `Categories` –a generic identifier for the element name.\n    *   `1`\
    \ –the tag number of the element, representing the nested XML level. A value of\
    \ 1 implies this is the top element (excluding the root).\n    *   `Category`\
    \ –the value attribute’s name, unless an `ELEMENT` directive is specified, in\
    \ which case it is used as an element name.\n    *   `ELEMENT` –this directive\
    \ specifies element-centric representation. Attribute-centric is the default,\
    \ therefore there is no need to specify an attribute-centric representation. If\
    \ the `ELEMENTXSINIL` is used, the element will be included even when the source\
    \ value is `NULL`. Each alias section is separated by an exclamation point(!),\
    \ this naming convention is required as part of the rule. Because each alias contains\
    \ special characters (“!”), they must be quoted. Here are some other aliases from\
    \ Listing 2-23:\n    *   `[Subcategories!2!Subcategory!ELEMENT]` – Child of Categories\
    \ element (tag 2), represent Subcategory values, element-centric\n    *   `[Product!3!ProductName!ELEMENT]`\
    \ – Child of Subcategories element (tag 3), represent ProductName value, element-centric\n\
    \    *   `[Product!3!Color!ELEMENTXSINIL]` – Child of Subcategories (tag 3), represent\
    \ Color value, element-centric with `XSINIL` directive\n    *   `[Product!3!Shelf]`\
    \ – Child of Subcategories (tag 3), represent Shelf value, attribute-centric.\n\
    \    *   `[Product!3!Bin]` – Child of Subcategories (tag 3), represent Bin value,\
    \ attribute-centric\n    *   `[Product!3!Quantity]` – Child of Subcategories (tag\
    \ 3), represent Quantity value, attribute-centric\n4.  The `ElementName` portion\
    \ of the aliases must be the same within a given `TagNumber`, even if the values\
    \ are retrieved from different tables. For example, an `ElementName` of `Product`\
    \ must be used consistently for `TagNumber` 3, as shown here:\n    ```sql\n  \
    \  [Product!3!ProductName!ELEMENT] -- table Product, column Name\n    [Product!3!Color!ELEMENTXSINIL]\
    \ - table Product, column Color\n    [Product!3!Shelf] – table Inventory column\
    \ Shelf\n    [Product!3!Bin] - table Inventory column Bin\n    [Product!3!Quantity]\
    \ - table Inventory column Quantity\n    ```\n5.  The `SELECT` blocks of your\
    \ source query must all conform to SQL’s `UNION ALL` operator rule. Each `SELECT`\
    \ statement must have the same number of columns. When the column is not needed,\
    \ it must be filled with `NULL` values.\n6.  Sorting is an important consideration\
    \ for `EXPLICIT` mode. The `ORDER BY` clause finalizes the XML hierarchy. Therefore,\
    \ the sorting order needs to follow the parent-child sequence. The column names\
    \ in an `ORDER BY` clause must be the same as aliases in the top `SELECT` query.\
    \ For example:\n    ```sql\n    ORDER BY [Categories!1!Category!ELEMENT],\n  \
    \  [Subcategories!2!Subcategory!ELEMENT],\n    [Product!3!ProductName!ELEMENT]\n\
    \    ```\n\nIt is clear that implementing `EXPLICIT` mode is significantly more\
    \ complex than implementing the other modes we’ve covered so far; however, `EXPLICIT`\
    \ mode provides the user with full control over the XML generation process. Unlike\
    \ other modes, this `FOR XML` mode can be extended with internal directives that\
    \ allow the user to control each individual XML element and attribute. Table 2-1\
    \ lists the directives for the `EXPLICIT` mode.\n\n**Table 2-1.** Listing the\
    \ `EXPLICIT` mode directives\n\n| Directive | Definition | Syntax Example |\n\
    | --- | --- | --- |\n| `ID, IDREF, IDREFS` | Enables intra-document links and\
    \ is similar to the primary key and foreign key relationships in relational databases.\
    \ | `[Product!3!ProductList!IDREFS]` |\n| `CDATA` | If the directive is set to\
    \ `CDATA`, the contained data is not entity encoded, but is put in the CDATA section.\
    \ The `CDATA` attributes must be nameless. | `[Product!3!!CDATA]` |\n| `HIDE`\
    \ | Hides the node. This is useful when you retrieve values only for sorting purposes,\
    \ but you do not want them in the resulting XML. | `[Product!3!Shelf!HIDE]` |\n\
    | `ELEMENT` | Generates an element instead of an attribute. | `[Product!3!ProductName!ELEMENT]`\
    \ |\n| `ELEMENTXSINIL` | Generates an element with an `xsi:nil=“true”` attribute\
    \ for `NULL`s. Similar to `XSINIL` directive. | `[Product!3!Color!ELEMENTXSINIL]`\
    \ |\n| `XML` | Generates an element, just like the element directive. The difference\
    \ is that the xml directive does not encode entities. | `[Product!3!Color!XML]`\
    \ |\n| `XMLTEXT` | If the xmltext directive is specified, the column content is\
    \ wrapped in a single tag that is integrated with the rest of the document. |\
    \ `[Parent!1!!XMLTEST]` |"
  raw: "### How It Works\n\n`EXPLICIT` mode is one of the most complex `FOR XML` modes\
    \ to use. All elements and attributes need to be provided explicitly, and each\
    \ child block must be linked to the parent explicitly as well. When comparing\
    \ `EXPLICIT` mode other modes, such as `RAW` and `AUTO`, the queries with the\
    \ `EXPLICIT` mode are much lengthier. The benefit of `EXPLICIT` mode, however,\
    \ is that it provides much greater control over the shape of the XML generated\
    \ by the query result.\n\nTo better understand how EXPLICIT mode works, I’ll walk\
    \ you through an example. Let’s start with a base T-SQL query, like the one shown\
    \ in Listing [2-24](#A435478_1_En_2_Chapter.html#Par112), which shows SQL that\
    \ we would like to convert to an XML structure.\n\n```\nSELECT ProductCategory.Name\
    \ Category,\nSubcategory.Name Subcategory,\nProduct.Name ProductName,\nProduct.Color,\n\
    Inventory.Shelf,\nInventory.Bin,\nInventory.Quantity\nFROM Production.Product\
    \ Product\nINNER JOIN Production.ProductInventory Inventory\nON Product.ProductID\
    \ = Inventory.ProductID\nINNER JOIN Production.ProductSubcategory Subcategory\n\
    ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\nINNER JOIN\
    \ Production.ProductCategory\nON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
    Listing 2-24.\nSQL query we would like to convert to XML format\n```\n\nORDER\
    \ BY ProductCategory.Name, Subcategory.Name, Product.Name; The SQL in Listing\
    \ [2-24](#A435478_1_En_2_Chapter.html#Par112) returns the product list based on\
    \ categories and subcategories. Therefore, we need to make a decision and ask\
    \ some questions:\n\n1.  How do we want the XML structured?  \n2.  How many sibling\
    \ levels does the XML need to have?  \n3.  Which columns will be mapped to elements\
    \ and which should be attributes?  \n4.  Do we need to preserve elements with\
    \ NULL values?  \n\nIn Figure [2-5](#A435478_1_En_2_Chapter.html#Fig5) we show\
    \ the results of the query in Listing [2-24](#A435478_1_En_2_Chapter.html#Par112),\
    \ and begin the process of drawing a road map for the XML result we want. Figure\
    \ [2-5](#A435478_1_En_2_Chapter.html#Fig5) demonstrates a sample of a road map\
    \ that will help us build the query using `EXPLICIT` mode .\n\n![A435478_1_En_2_Fig5_HTML.jpg](A435478_1_En_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5.\n\nResults of query in Listing [2-23](#A435478_1_En_2_Chapter.html#Par109)\n\
    \nUsing this figure as a guide, we will define a logical structure that will model\
    \ our target XML structure. This logical structure is shown in Listing [2-25](#A435478_1_En_2_Chapter.html#Par120).\n\
    \n```\n\n ELEMENT \n\n ELEMENT \n\n ELEMENT \n ELEMENT XSINIL \n\nListing 2-25.\n\
    Proposed logical XML structure\n```\n\nFollowing the road map in Figure [2-5](#A435478_1_En_2_Chapter.html#Fig5)\
    \ and the logical XML structure of Listing [2-25](#A435478_1_En_2_Chapter.html#Par120),\
    \ the resulting XML structure will be composed of five nested levels, which will\
    \ contain:\n\n*   <Products> is the root element.\n*   <Categories> is a container\
    \ data element that holds each <Category> element and all its related <Subcategory>\
    \ elements directly.\n*   <Category> is a direct child of the <Categories> element\
    \ and will contain the category name. The <Subcategories> element is a sibling\
    \ of the <Category> element, and also a direct child of the <Categories> element.\
    \ This is a container element for subcategory-specific data related to the sibling\
    \ <Category> element.\n*   <Subcategory> is a direct child of the <Subcategories>\
    \ element. This element holds the name of the current subcategory. The <Product>\
    \ element represents an individual product within a subcategory. This element\
    \ is a direct child of the <Subcategories> element and a sibling of the <Subcategory>\
    \ element. The <Product> element will have multiple attributes assigned to it,\
    \ and it acts as a container for product-specific data elements.\n*   <ProductName>\
    \ is a data element that contains a product’s name. The <Color> element contains\
    \ a product’s color, when available. The <Color> element is identified as XSINIL,\
    \ which means we want this element to appear in the result even when the source\
    \ column is NULL. The <ProductName> and <Color> elements are siblings, and both\
    \ are direct children of the <Product> element.\n\nThe next step is to build the\
    \ query. The syntax for `EXPLICIT` mode has certain rules and specifications that\
    \ you will need to follow:\n\n1.  The query can have one or more `SELECT` statement\
    \ blocks, with `UNION ALL` linking all of them together.  \n2.  Each `SELECT`\
    \ statement block must contain two integer type columns named Tag and Parent,\
    \ respectively, as the first two columns in the query. These columns define the\
    \ structural relationship between the parent and child levels. For example, Listing\
    \ [2-23](#A435478_1_En_2_Chapter.html#Par109) has multiple nested levels and the\
    \ `SELECT` clause establishes the hierarchy, as shown in the code snippet in Listing\
    \ [2-26](#A435478_1_En_2_Chapter.html#Par130).\n\n    ```\n    SELECT 1 AS Tag,\n\
    \    0 AS Parent,\n    .\n    .\n    .\n    UNION ALL\n    SELECT 2 AS Tag,\n\
    \    1 AS Parent,\n    .\n    .\n    .\n    UNION ALL\n    SELECT 3  AS Tag,\n\
    \    2  AS Parent,\n    .\n    .\n    .\n    Listing 2-26.\n    Code snippet ,\
    \ Tag, and Parent columns define the XML hierarchy\n    ```\n\n    In the first\
    \ `SELECT` query , the Parent column starts the hierarchy, with a value of 0\\\
    . The Tag column specifies the hierarchy level. In the second SELECT query the\
    \ Tag value becomes the Parent and increments to the next number. This flip-flop\
    \ mechanism is applied to each hierarchical level.  \n3.  The next important rule\
    \ establishes an XML structure. In `EXPLICIT` mode, each column must be defined\
    \ within the first `SELECT` block, and `EXPLICIT` mode has a special syntax for\
    \ this. In Listing [2-23](#A435478_1_En_2_Chapter.html#Par109), you can see that\
    \ all columns after the Tag and Parent columns have a very specific style of alias,\
    \ which must be formatted as: [ElementName!TagNumber!AttributeName!Directive].\
    \ An example from our query in Listing [2-23](#A435478_1_En_2_Chapter.html#Par109)\
    \ is [Categories!1!Category!ELEMENT]. This particular alias defines the structure\
    \ for the <Category> element of our XML, which contains the category name. Here\
    \ is the breakdown of this alias:\n    *   Categories –a generic identifier for\
    \ the element name.\n    *   1 –the tag number of the element, representing the\
    \ nested XML level. A value of 1 implies this is the top element (excluding the\
    \ root).\n    *   Category –the value attribute’s name, unless an ELEMENT directive\
    \ is specified, in which case it is used as an element name.\n    *   ELEMENT\
    \ –this directive specifies element-centric representation. Attribute-centric\
    \ is the default, therefore there is no need to specify an attribute-centric representation.\
    \ If the ELEMENTXSINIL is used, the element will be included even when the source\
    \ value is `NULL` .Each alias section is separated by an exclamation point(!),\
    \ this naming convention is required as part of the rule. Because each alias contains\
    \ special characters (“!”), they must be quoted. Here are some other aliases from\
    \ Listing [2-23](#A435478_1_En_2_Chapter.html#Par109):\n    *   `[Subcategories!2!Subcategory!ELEMENT]`\
    \ `– Child of Categories element (tag       2), represent Subcategory values,\
    \ element-centric`\n    *   `[Product!3!ProductName!ELEMENT]` `– Child of Subcategories\
    \ element (tag 3), represent ProductName value, element-centric`\n    *   `[Product!3!Color!ELEMENTXSINIL]`\
    \ `– Child of Subcategories (tag 3), represent Color value, element-centric with\
    \ XSINIL directive`\n    *   `[Product!3!Shelf]` `– Child of Subcategories (tag\
    \ 3), represent Shelf value, attribute-centric.`\n    *   `[Product!3!Bin]` `–\
    \ Child of Subcategories (tag 3), represent Bin value, attribute-centric`\n  \
    \  *   `[Product!3!Quantity]` `– Child of Subcategories (tag 3), represent Quantity\
    \ value, attribute-centric` \n4.  The ElementName portion of the aliases must\
    \ be the same within a given TagNumber, even if the values are retrieved from\
    \ different tables. For example, an ElementName of Product must be used consistently\
    \ for TagNumber 3, as shown here :\n\n    ```\n    [Product!3!ProductName!ELEMENT]\
    \ – table Product, column Name\n    [Product!3!Color!ELEMENTXSINIL] - table Product,\
    \ column Color\n    [Product!3!Shelf] – table Inventory column Shelf\n    [Product!3!Bin]\
    \ - table Inventory column Bin\n    [Product!3!Quantity] - table Inventory column\
    \ Quantity\n    ```\n\n5.  The `SELECT` blocks of your source query must all conform\
    \ to SQL’s `UNION ALL` operator rule. Each `SELECT` statement must have the same\
    \ number of columns. When the column is not needed, it must be filled with `NULL`\
    \ values.  \n6.  Sorting is an important consideration for `EXPLICIT` mode. The\
    \ `ORDER BY` clause finalizes the XML hierarchy. Therefore, the sorting order\
    \ needs to follow the parent-child sequence. The column names in an `ORDER BY`\
    \ clause must be the same as aliases in the top `SELECT` query. For example:\n\
    \n    ```\n    ORDER BY [Categories!1!Category!ELEMENT],\n    [Subcategories!2!Subcategory!ELEMENT],\n\
    \    [Product!3!ProductName!ELEMENT]\n    ```\n\nIt is clear that implementing\
    \ `EXPLICIT` mode is significantly more complex than implementing the other modes\
    \ we’ve covered so far; however, `EXPLICIT` mode provides the user with full control\
    \ over the XML generation process. Unlike other modes, this `FOR XML` mode can\
    \ be extended with internal directives that allow the user to control each individual\
    \ XML element and attribute. Table [2-1](#A435478_1_En_2_Chapter.html#Tab1) lists\
    \ the directives for the `EXPLICIT` mode.\n\nTable 2-1.\n\nListing the `EXPLICIT`\
    \ mode directives\n\n| Directive | Definition | Syntax Example |\n| --- | ---\
    \ | --- |\n| `ID, IDREF, IDREFS` | Enables intra-document links and is similar\
    \ to the primary key and foreign key relationships in relational databases. |\
    \ `[Product!3!ProductList!IDREFS]` |\n| `CDATA` | If the directive is set to CDATA,\
    \ the contained data is not entity encoded, but is put in the CDATA section. The\
    \ CDATA attributes must be nameless. | `[Product!3!!CDATA]` |\n| `HIDE` | Hides\
    \ the node. This is useful when you retrieve values only for sorting purposes,\
    \ but you do not want them in the resulting XML. | `[Product!3!Shelf!HIDE]` |\n\
    | `ELEMENT` | Generates an element instead of an attribute. | `[Product!3!ProductName!ELEMENT]`\
    \ |\n| `ELEMENTXSINIL` | Generates an element with an xsi:nil=“true” attribute\
    \ for NULLs. Similar to XSINIL directive. | `[Product!3!Color!ELEMENTXSINIL]`\
    \ |\n| `XML` | Generates an element, just like the element directive. The difference\
    \ is that the xml directive does not encode entities. | `[Product!3!Color!XML]`\
    \ |\n| `XMLTEXT` | If the xmltext directive is specified, the column content is\
    \ wrapped in a single tag that is integrated with the rest of the document. |\
    \ `[Parent!1!!XMLTEST]` |"
  trans: "### 工作原理\n\n`EXPLICIT`模式是`FOR XML`中最复杂的模式之一。所有元素和属性都需要显式提供，每个子块也必须显式链接到父级。与`RAW`和`AUTO`等其他模式相比，使用`EXPLICIT`模式的查询语句要冗长得多。然而，`EXPLICIT`模式的好处在于，它为控制查询结果生成的\
    \ XML 形状提供了更大的灵活性。\n\n为了更好地理解`EXPLICIT`模式的工作原理，我将通过一个示例来讲解。让我们从一个基础的 T-SQL 查询开始，如代码清单\
    \ 2-24 所示，该查询展示了我们希望转换为 XML 结构的 SQL。\n\n```sql\nSELECT ProductCategory.Name Category,\n\
    Subcategory.Name Subcategory,\nProduct.Name ProductName,\nProduct.Color,\nInventory.Shelf,\n\
    Inventory.Bin,\nInventory.Quantity\nFROM Production.Product Product\nINNER JOIN\
    \ Production.ProductInventory Inventory\nON Product.ProductID = Inventory.ProductID\n\
    INNER JOIN Production.ProductSubcategory Subcategory\nON Product.ProductSubcategoryID\
    \ = Subcategory.ProductSubcategoryID\nINNER JOIN Production.ProductCategory\n\
    ON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name;\n```\n**代码清单 2-24.**\
    \ 我们希望转换为 XML 格式的 SQL 查询\n\n代码清单 2-24 中的 SQL 返回了基于类别和子类别的产品列表。因此，我们需要做出决定并回答几个问题：\n\
    1.  我们希望 XML 的结构是怎样的？\n2.  XML 需要有多少个同级层级？\n3.  哪些列将被映射为元素，哪些应该是属性？\n4.  我们是否需要保留值为`NULL`的元素？\n\
    \n在图 2-5 中，我们展示了代码清单 2-24 查询的结果，并开始为想要的 XML 结果绘制路线图。图 2-5 展示了一个路线图示例，它将帮助我们使用`EXPLICIT`模式构建查询。\n\
    \n![A435478_1_En_2_Fig5_HTML.jpg](img/A435478_1_En_2_Fig5_HTML.jpg)\n**图 2-5.**\
    \ 代码清单 2-24 中的查询结果\n\n以此图为指导，我们将定义一个逻辑结构来模拟目标 XML 结构。该逻辑结构如代码清单 2-25 所示。\n\n```xml\n\
    <ELEMENT />\n<ELEMENT />\n<ELEMENT />\n<ELEMENT XSINIL />\n```\n**代码清单 2-25.**\
    \ 建议的逻辑 XML 结构\n\n遵循图 2-5 的路线图和代码清单 2-25 的逻辑 XML 结构，最终的 XML 结构将由五个嵌套层级组成，包含：\n\
    *   `<Products>` 是根元素。\n*   `<Categories>` 是一个容器数据元素，直接容纳每个 `<Category>` 元素及其所有相关的\
    \ `<Subcategory>` 元素。\n*   `<Category>` 是 `<Categories>` 元素的直接子元素，将包含类别名称。`<Subcategories>`\
    \ 元素与 `<Category>` 元素是同级元素，同时也是 `<Categories>` 元素的直接子元素。这是用于存放与同级 `<Category>`\
    \ 元素相关的、特定于子类别的数据的容器元素。\n*   `<Subcategory>` 是 `<Subcategories>` 元素的直接子元素。此元素保存当前子类别的名称。`<Product>`\
    \ 元素代表子类别内的单个产品。此元素是 `<Subcategories>` 元素的直接子元素，也是 `<Subcategory>` 元素的同级元素。`<Product>`\
    \ 元素将分配有多个属性，并充当产品特定数据元素的容器。\n*   `<ProductName>` 是包含产品名称的数据元素。`<Color>` 元素在有值时包含产品的颜色。`<Color>`\
    \ 元素被标识为 `XSINIL`，这意味着即使源列为 `NULL`，我们也希望此元素出现在结果中。`<ProductName>` 和 `<Color>`\
    \ 元素是同级元素，两者都是 `<Product>` 元素的直接子元素。\n\n下一步是构建查询。`EXPLICIT`模式的语法有某些需要遵循的规则和规范：\n\
    1.  查询可以包含一个或多个 `SELECT` 语句块，使用 `UNION ALL` 将它们全部连接起来。\n2.  每个 `SELECT` 语句块必须包含两个名为\
    \ `Tag` 和 `Parent` 的整数类型列，作为查询的前两列。这些列定义了父级和子级层级之间的结构关系。例如，代码清单 2-23 有多个嵌套层级，`SELECT`\
    \ 子句确立了层级结构，如代码清单 2-26 中的代码片段所示。\n    ```sql\n    SELECT 1 AS Tag,\n    0 AS Parent,\n\
    \    .\n    .\n    .\n    UNION ALL\n    SELECT 2 AS Tag,\n    1 AS Parent,\n\
    \    .\n    .\n    .\n    UNION ALL\n    SELECT 3  AS Tag,\n    2  AS Parent,\n\
    \    .\n    .\n    .\n    ```\n    **代码清单 2-26.** `Tag` 和 `Parent` 列定义 XML 层级结构的代码片段\n\
    \n    在第一个 `SELECT` 查询中，`Parent` 列以值 0 开始层级。`Tag` 列指定层级编号。在第二个 `SELECT` 查询中，`Tag`\
    \ 值成为 `Parent` 并递增到下一个数字。这种交替机制应用于每个层级。\n3.  下一个重要的规则是建立 XML 结构。在 `EXPLICIT` 模式下，每个列必须在第一个\
    \ `SELECT` 块中定义，并且 `EXPLICIT` 模式对此有特殊的语法。在代码清单 2-23 中，您可以看到 `Tag` 和 `Parent` 列之后的所有列都有一个非常特定的别名样式，其格式必须为：`[ElementName!TagNumber!AttributeName!Directive]`。我们在代码清单\
    \ 2-23 查询中的一个例子是 `[Categories!1!Category!ELEMENT]`。这个特定的别名定义了我们 XML 中 `<Category>`\
    \ 元素的结构，它包含类别名称。下面是这个别名的分解：\n    *   `Categories` – 元素名称的通用标识符。\n    *   `1` –\
    \ 元素的标签编号，代表嵌套的 XML 层级。值为 1 表示这是顶级元素（不包括根元素）。\n    *   `Category` – 值属性的名称，除非指定了\
    \ `ELEMENT` 指令，此时它用作元素名称。\n    *   `ELEMENT` – 该指令指定以元素为中心的表示。以属性为中心是默认设置，因此无需指定以属性为中心的表示。如果使用\
    \ `ELEMENTXSINIL`，即使源值为 `NULL`，该元素也将被包含。每个别名部分由感叹号 (!) 分隔，这种命名约定是规则的一部分。因为每个别名包含特殊字符（“!”），所以它们必须用引号括起来。以下是代码清单\
    \ 2-23 中的其他别名：\n        *   `[Subcategories!2!Subcategory!ELEMENT]` – Categories\
    \ 元素的子级（标签 2），表示子类别值，以元素为中心。\n        *   `[Product!3!ProductName!ELEMENT]` –\
    \ Subcategories 元素的子级（标签 3），表示产品名称值，以元素为中心。\n        *   `[Product!3!Color!ELEMENTXSINIL]`\
    \ – Subcategories 的子级（标签 3），表示颜色值，以元素为中心，带有 `XSINIL` 指令。\n        *   `[Product!3!Shelf]`\
    \ – Subcategories 的子级（标签 3），表示货架值，以属性为中心。\n        *   `[Product!3!Bin]` – Subcategories\
    \ 的子级（标签 3），表示货仓位值，以属性为中心。\n        *   `[Product!3!Quantity]` – Subcategories\
    \ 的子级（标签 3），表示数量值，以属性为中心。\n4.  在给定的 `TagNumber` 内，别名的 `ElementName` 部分必须相同，即使值是从不同的表中检索的。例如，对于\
    \ `TagNumber` 3，必须始终使用 `Product` 作为 `ElementName`，如下所示：\n    ```sql\n    [Product!3!ProductName!ELEMENT]\
    \ -- 表 Product，列 Name\n    [Product!3!Color!ELEMENTXSINIL] -- 表 Product，列 Color\n\
    \    [Product!3!Shelf] – 表 Inventory 列 Shelf\n    [Product!3!Bin] - 表 Inventory\
    \ 列 Bin\n    [Product!3!Quantity] - 表 Inventory 列 Quantity\n    ```\n5.  源查询的\
    \ `SELECT` 块都必须遵守 SQL 的 `UNION ALL` 运算符规则。每个 `SELECT` 语句必须具有相同数量的列。当不需要某列时，必须用\
    \ `NULL` 值填充。\n6.  排序是 `EXPLICIT` 模式的一个重要考虑因素。`ORDER BY` 子句最终确定 XML 层级结构。因此，排序顺序需要遵循父级到子级的序列。`ORDER\
    \ BY` 子句中的列名必须与顶级 `SELECT` 查询中的别名相同。例如：\n    ```sql\n    ORDER BY [Categories!1!Category!ELEMENT],\n\
    \    [Subcategories!2!Subcategory!ELEMENT],\n    [Product!3!ProductName!ELEMENT]\n\
    \    ```\n\n显然，实现 `EXPLICIT` 模式比我们目前讨论的其他模式要复杂得多；然而，`EXPLICIT` 模式为用户提供了对 XML 生成过程的完全控制。与其他模式不同，此\
    \ `FOR XML` 模式可以通过内部指令进行扩展，允许用户控制每个单独的 XML 元素和属性。表 2-1 列出了 `EXPLICIT` 模式的指令。\n\
    \n**表 2-1.** `EXPLICIT` 模式指令列表\n\n| 指令 | 定义 | 语法示例 |\n| --- | --- | --- |\n| `ID,\
    \ IDREF, IDREFS` | 启用文档内链接，类似于关系数据库中的主键和外键关系。 | `[Product!3!ProductList!IDREFS]`\
    \ |\n| `CDATA` | 如果指令设置为 `CDATA`，则包含的数据不会被实体编码，而是放入 CDATA 节中。`CDATA` 属性必须是匿名的。\
    \ | `[Product!3!!CDATA]` |\n| `HIDE` | 隐藏节点。当您仅为了排序目的而检索值，但不希望它们出现在结果 XML 中时，此指令很有用。\
    \ | `[Product!3!Shelf!HIDE]` |\n| `ELEMENT` | 生成元素而不是属性。 | `[Product!3!ProductName!ELEMENT]`\
    \ |\n| `ELEMENTXSINIL` | 为 `NULL` 值生成带有 `xsi:nil=“true”` 属性的元素。类似于 `XSINIL` 指令。\
    \ | `[Product!3!Color!ELEMENTXSINIL]` |\n| `XML` | 生成元素，就像元素指令一样。不同之处在于，xml 指令不进行实体编码。\
    \ | `[Product!3!Color!XML]` |\n| `XMLTEXT` | 如果指定了 xmltext 指令，则列内容将被包装在单个标签中，该标签与文档的其余部分集成。\
    \ | `[Parent!1!!XMLTEXT]` |"
- fmt: "# 2-9. 简化自定义 XML 生成\n\n## 问题\n\n`EXPLICIT` 模式允许对生成的 XML 格式进行细粒度控制，但使用起来很复杂。你想要生成自定义格式的\
    \ XML，但希望有一个更简单、同时能达到与 `EXPLICIT` 模式类似效果的替代方案。\n\n## 解决方案\n\n`PATH` 模式可以提供与使用\
    \ `EXPLICIT` 模式生成的 XML 相似的结果。然而，用于生成 `PATH` 模式 XML 的机制比 `EXPLICIT` 模式简单得多，这是一个很大的优点。`PATH`\
    \ 模式的一个限制是它没有 `EXPLICIT` 模式那么多的指令选项。清单 [2-27](#A435478_1_En_2_Chapter.html#Par153)\
    \ 展示了配方 2-9 中使用 `PATH` 模式实现的查询。\n\n```sql\nSELECT ProductCategory.Name AS \"Category/CategoryName\"\
    ,\nSubcategory.Name AS \"Category/Subcategory/SubcategoryName\",\nInventory.Shelf\
    \ AS \"Category/Subcategory/Product/ProductName/@Shelf\",\nInventory.Bin AS \"\
    Category/Subcategory/Product/ProductName/@Bin\",\nInventory.Quantity AS \"Category/Subcategory/Product/ProductName/@Quantity\"\
    \nProduct.Name AS \"Category/Subcategory/Product/ProductName\",\nProduct.Color\
    \ AS \"Category/Subcategory/Product/Color\",\nFROM Production.Product Product\n\
    INNER JOIN Production.ProductInventory Inventory\nON Product.ProductID = Inventory.ProductID\n\
    INNER JOIN Production.ProductSubcategory Subcategory\nON Product.ProductSubcategoryID\
    \ = Subcategory.ProductSubcategoryID\nINNER JOIN Production.ProductCategory\n\
    ON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name\nFOR XML PATH('Categories'),\
    \ ELEMENTS XSINIL, ROOT('Products');\n```\n清单 2-27. 使用 `PATH` 模式生成自定义 XML\n\n\
    ## 工作原理\n\n比较展示 `EXPLICIT` 模式的清单 [2-23](#A435478_1_En_2_Chapter.html#Par109) 和展示\
    \ `PATH` 模式的清单 [2-27](#A435478_1_En_2_Chapter.html#Par153)。很明显，`PATH` 模式没有使用多个\
    \ `SELECT` 语句和 `UNION ALL` 来生成嵌套 XML 数据。相反，XML 层次结构是通过 XML 路径语言（XPath）风格的列别名定义的，其中路径中的步骤用正斜杠分隔。\n\
    \n要使用 `PATH` 模式生成 XML，请遵循以下规则：\n\n1.  位置应反映预期的 XML 层次结构，即子元素列在父元素下。例如：\n    ```sql\n\
    \    SELECT ProductCategory.Name AS \"Category/CategoryName\",\n    Subcategory.Name\
    \ AS \"Category/Subcategory/SubcategoryName\",\n    ```\n\n2.  每个子级别都在 XPath 别名中建立，通过用斜杠将其与父元素分隔，并添加子元素名称。例如：\n\
    \    ```sql\n    Name AS \"Category/CategoryName\",\n    Name AS \"Category/Subcategory/SubcategoryName\"\
    ,\n    Name AS \"Category/Subcategory/Product/ProductName\",\n    ```\n\n3.  当别名中出现“@”符号时，它会将值呈现为属性；否则定义为元素。此代码段展示了“@”在定义\
    \ XML 输出属性中的应用：\n    ```sql\n    SELECT ...\n    Inventory.Shelf AS \"Category/Subcategory/Product/ProductName/@Shelf\"\
    ,\n    Inventory.Bin AS \"Category/Subcategory/Product/ProductName/@Bin\",\n \
    \   Inventory.Quantity AS \"Category/Subcategory/Product/ProductName/@Quantity\"\
    ,\n    ...\n    ```\n\n4.  `ORDER BY` 子句在 `PATH` 模式下的效果与在 `EXPLICIT` 模式下不同，因此可以完全省略。但是，根据\
    \ XML 结构对查询进行排序是一个好习惯。例如：\n    ```sql\n    ORDER BY ProductCategory.Name , Subcategory.Name,\
    \ Product.Name\n    ```\n\n5.  建议的命名约定是在括号内为 `PATH` 提供一个元素名称。默认情况下，`PATH` 模式生成一个\
    \ `<row>` 元素，但这并不是最佳的 XML 设计。例如：\n    ```sql\n    FOR XML PATH('Categories')\n\
    \    ```\n\n6.  当 `XSINIL` 指令在 `PATH` 模式中实现时，该指令会自动应用于所有 XML 元素。然而，在 `EXPLICIT`\
    \ 模式中，`ELEMENTXSINIL` 指令仅影响指定指令的元素。\n7.  指定根元素是良好的 XML 设计实践。我强烈建议在所有 XML 查询中使用\
    \ `ROOT(‘ElementName')` 选项。\n\n总结这个配方，我建议分析你期望的 XML，然后决定是使用 `EXPLICIT` 还是 `PATH`\
    \ 模式。两种模式各有优缺点：`EXPLICIT` 模式使用起来更复杂，但它让你能更好地控制 XML 输出。`PATH` 模式则相反，它易于编写代码；然而，你对元素和属性的控制力稍弱一些。\n\
    \n# 2-10. 向 XML 添加特殊节点\n\n## 问题\n\n你希望向生成的 XML 数据中添加特殊节点，例如注释、处理指令或自定义文本。\n\n\
    ## 解决方案\n\n`FOR XML` 子句的 `PATH` 模式支持 XML 路径语言（XPath）节点测试。XPath 语法支持一部分节点测试名称，这些名称充当函数。这些函数向最终的\
    \ XML 输出添加特定类型的节点。清单 [2-28](#A435478_1_En_2_Chapter.html#Par171) 是一个演示多个 XPath\
    \ 节点测试的查询。\n\n```sql\nSELECT ProductCategory.Name AS \"Category/CategoryName\"\
    ,\nN'Sales started ' + convert(nvarchar(12), Product.SellStartDate, 101) AS \"\
    Category/comment()\",\nN'The record for product number ' + Product.ProductNumber\
    \ AS \"processing-instruction(xml:file)\",\n(\nSELECT DISTINCT Location.Name \"\
    text()\", N', cost rate $',\nLocation.CostRate \"text()\"\nFROM Production.ProductInventory\
    \ Inventory\nINNER JOIN Production.Location Location\nON Inventory.LocationID\
    \ = Location.LocationID\nWHERE Product.ProductID = Inventory.ProductID\nFOR XML\
    \ PATH('LocationName'), TYPE\n) AS \"Locations/node()\",\nSubcategory.Name AS\
    \ \"Category/Subcategory/SubcategoryName\",\nProduct.Name AS \"Category/Subcategory/Product/ProductName\"\
    ,\nProduct.Color AS \"Category/Subcategory/Product/Color\",\nInventory.Shelf AS\
    \ \"Category/Subcategory/Product/ProductName/@Shelf\",\nInventory.Bin AS \"Category/Subcategory/Product/ProductName/@Bin\"\
    ,\nInventory.Quantity AS \"Category/Subcategory/Product/ProductName/@Quantity\"\
    \nFROM Production.Product Product\nINNER JOIN Production.ProductInventory Inventory\n\
    ON Product.ProductID = Inventory.ProductID\nINNER JOIN Production.ProductSubcategory\
    \ Subcategory\nON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\n\
    INNER JOIN Production.ProductCategory\nON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name\nFOR XML PATH('Categories'),\
    \ ELEMENTS XSINIL, ROOT('Products');\n```\n清单 2-28. 演示 XPath 节点测试\n\n注意\n\nXPath\
    \ 节点测试名称区分大小写。因此，所有节点测试名称必须以小写字母输入，否则 SQL 将引发错误。例如，当函数 `text()` 被输入为 `Text()`\
    \ 时，会抛出类似于以下的错误：Msg 6850, Level 16, State 1 … Column name ‘Text()’ contains an\
    \ invalid XML identifier as required by FOR XML; …"
  raw: "## 2-9\\. Simplifying Custom XML Generation\n\n### Problem\n\n`EXPLICIT` mode\
    \ allows fine-grained control of your generated XML format, but is complex to\
    \ utilize. You want to generate custom-formatted XML, but you want an alternative\
    \ that is easier to use, but achieves results similar to `EXPLICIT` mode.\n\n\
    ### Solution\n\n`PATH` mode can provide XML results that are similar to the results\
    \ generated by the XML using `EXPLICIT` mode. However, the mechanism used to generate\
    \ the `PATH` mode XML is much simpler than the `EXPLICIT` mode, which is a big\
    \ positive. One of the limitations of `PATH` mode is that it does not have as\
    \ many directive options as `EXPLICIT` mode. Listing [2-27](#A435478_1_En_2_Chapter.html#Par153)\
    \ demonstrates the query from Recipe 2-9, implemented with `PATH` mode.\n\n```\n\
    SELECT ProductCategory.Name AS \"Category/CategoryName\",\nSubcategory.Name AS\
    \ \"Category/Subcategory/SubcategoryName\",\nInventory.Shelf AS \"Category/Subcategory/Product/ProductName/@Shelf\"\
    ,\nInventory.Bin AS \"Category/Subcategory/Product/ProductName/@Bin\",\nInventory.Quantity\
    \ AS \"Category/Subcategory/Product/ProductName/@Quantity\"\nProduct.Name AS \"\
    Category/Subcategory/Product/ProductName\",\nProduct.Color AS \"Category/Subcategory/Product/Color\"\
    ,\nFROM Production.Product Product\nINNER JOIN Production.ProductInventory Inventory\n\
    ON Product.ProductID = Inventory.ProductID\nINNER JOIN Production.ProductSubcategory\
    \ Subcategory\nON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\n\
    INNER JOIN Production.ProductCategory\nON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name\nFOR XML PATH('Categories'),\
    \ ELEMENTS XSINIL, ROOT('Products');\nListing 2-27.\nGenerating custom XML generation\
    \ with PATH mode\n```\n\n### How It Works\n\nCompare Listing [2-23](#A435478_1_En_2_Chapter.html#Par109),\
    \ illustrating `EXPLICIT` mode and Listing [2-27](#A435478_1_En_2_Chapter.html#Par153)\
    \ illustrating `PATH` mode. It is clear that the `PATH` mode does not utilize\
    \ multiple `SELECT` statements and `UNION ALL` to generate nested XML data. Instead\
    \ the XML hierarchy is defined by XML Path Language (XPath)-style column aliases,\
    \ where steps in the path are separated by forward slashes.\n\nTo generate XML\
    \ using `PATH` mode, follow these rules:\n\n1.  The position should reflect the\
    \ expected XML hierarchy, that is, the child elements listed under parent elements.\
    \ For example:\n\n    ```\n    SELECT ProductCategory.Name AS \"Category/CategoryName\"\
    ,\n    Subcategory.Name AS \"Category/Subcategory/SubcategoryName\",\n    ```\n\
    \n2.  Each child level is established in the XPath alias, by separating them from\
    \ the parent element with a slash, and adding the child element name. For example:\n\
    \n    ```\n    Name AS \"Category/CategoryName\",\n    Name AS \"Category/Subcategory/SubcategoryName\"\
    ,\n    Name AS \"Category/Subcategory/Product/ProductName\",\n    ```\n\n3.  When\
    \ an “@” symbol is present in the alias, it renders the value as an attribute;\
    \ otherwise it defines an element. This snippet shows the “@” in action, defining\
    \ attributes in the XML output:\n\n    ```\n    SELECT ...\n    Inventory.Shelf\
    \ AS \"Category/Subcategory/Product/ProductName/@Shelf\",\n    Inventory.Bin AS\
    \ \"Category/Subcategory/Product/ProductName/@Bin\",\n    Inventory.Quantity AS\
    \ \"Category/Subcategory/Product/ProductName/@Quantity\",\n    ...\n    ```\n\n\
    4.  The `ORDER BY` clause does not have the same effect in `PATH` mode as it does\
    \ in `EXPLICIT` mode, and therefore it can be omitted altogether. However, it\
    \ is good practice to sort the query according to the XML structure. For example:\n\
    \n    ```\n    ORDER BY ProductCategory.Name , Subcategory.Name, Product.Name\n\
    \    ```\n\n5.  A suggested naming convention is to provide the `PATH` with an\
    \ element name inside the parentheses. By default, the `PATH` mode generates a\
    \ <row>element, but that is not the best XML design. For example:</row>\n\n  \
    \  ```\n    FOR XML PATH('Categories')\n    ```\n\n6.  When the XSINIL directive\
    \ is implemented in the PATH mode, then this directive is automatically applied\
    \ to all XML elements. However, in the EXPLICIT mode, the ELEMENTXSINIL directive\
    \ only affects the element that the directive specifies.  \n7.  Specifying the\
    \ root element is good XML design practice. I would highly recommend utilizing\
    \ the ROOT(‘ElementName’) option in all XML queries.  \n\nWrapping up this recipe,\
    \ I recommend analyzing your prospect XML then making a choice of whether to use\
    \ `EXPLICIT` or `PATH` mode. Both modes have advantages and disadvantages: `EXPLICIT`\
    \ mode is more complex to use, but it gives you better control over the XML output.\
    \ `PATH` mode is the opposite in the sense that it is easy to write the code;\
    \ however, you have a bit less control over the elements and attributes.\n\n##\
    \ 2-10\\. Adding Special Nodes to Your XML\n\n### Problem\n\nYou would like to\
    \ add special nodes to your generated XML data, such as comments, processing instructions,\
    \ or custom text.\n\n### Solution\n\nThe `FOR XML` clause `PATH` mode supports\
    \ XML Path Language (XPath) node tests. The XPath syntax supports a subset of\
    \ node test names that act as functions. These functions add specific types of\
    \ nodes to the resulting XML output. Listing [2-28](#A435478_1_En_2_Chapter.html#Par171)\
    \ is a query demonstrating multiple XPath node tests.\n\n```\nSELECT ProductCategory.Name\
    \ AS \"Category/CategoryName\",\nN'Sales started ' + convert(nvarchar(12), Product.SellStartDate,\
    \ 101) AS \"Category/comment()\",\nN'The record for product number ' + Product.ProductNumber\
    \ AS \"processing-instruction(xml:file)\",\n(\nSELECT DISTINCT Location.Name \"\
    text()\", N', cost rate $',\nLocation.CostRate \"text()\"\nFROM Production.ProductInventory\
    \ Inventory\nINNER JOIN Production.Location Location\nON Inventory.LocationID\
    \ = Location.LocationID\nWHERE Product.ProductID = Inventory.ProductID\nFOR XML\
    \ PATH('LocationName'), TYPE\n) AS \"Locations/node()\",\nSubcategory.Name AS\
    \ \"Category/Subcategory/SubcategoryName\",\nProduct.Name AS \"Category/Subcategory/Product/ProductName\"\
    ,\nProduct.Color AS \"Category/Subcategory/Product/Color\",\nInventory.Shelf AS\
    \ \"Category/Subcategory/Product/ProductName/@Shelf\",\nInventory.Bin AS \"Category/Subcategory/Product/ProductName/@Bin\"\
    ,\nInventory.Quantity AS \"Category/Subcategory/Product/ProductName/@Quantity\"\
    \nFROM Production.Product Product\nINNER JOIN Production.ProductInventory Inventory\n\
    ON Product.ProductID = Inventory.ProductID\nINNER JOIN Production.ProductSubcategory\
    \ Subcategory\nON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\n\
    INNER JOIN Production.ProductCategory\nON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name\nFOR XML PATH('Categories'),\
    \ ELEMENTS XSINIL, ROOT('Products');\nListing 2-28.\nDemonstrating XPath node\
    \ tests\n```\n\nCaution\n\nXPath node test names are case sensitive. Therefore,\
    \ all node test names must be entered in lowercase, otherwise SQL will raise an\
    \ error. For example when the function text() is typed as Text(), an error similar\
    \ to the following is thrown: Msg 6850, Level 16, State 1 … Column name ‘Text()’\
    \ contains an invalid XML identifier as required by FOR XML; …"
