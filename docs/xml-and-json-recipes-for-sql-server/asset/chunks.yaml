    # 9. 将 JSON 转换为行集


    在本章中，我们将讨论一些方法，演示如何检测 JSON 文档、不同的 JSON 解构方式，以及在需要筛选 JSON 文档时如何提高性能。SQL Server
    的 JSON 集成功能提供了全面的覆盖，可以将 JSON 文档转换为标量值和行-列集。您将找到各种经过测试的示例和可能的场景，以帮助您为任务找到最合适的解决方案。


    ## 9-1. 检测包含 JSON 的列


    ### 问题


    您希望检测数据库中所有包含 JSON 数据的列。


    ### 解决方案


    `ISJSON()` 函数用于检测数据是否为有效的 JSON。清单 9-1 演示了如何在数据库中检测 JSON 文档的过程。图 9-1 展示了 SQL 脚本的结果。


    ![A435478_1_En_9_Fig1_HTML.jpg](img/A435478_1_En_9_Fig1_HTML.jpg)


    *图 9-1. 显示已检测到的包含 JSON 数据的表和列*


    ```sql

    SET NOCOUNT ON;

    DECLARE @SQL nvarchar(1000)

    IF (OBJECT_ID(''tempdb.dbo.#Result'')) IS NOT NULL

    DROP TABLE #Result

    CREATE TABLE #Result (tblName nvarchar(200),

    clmnName nvarchar(100),

    DateType nvarchar(100),

    JSONDoc nvarchar(MAX),)

    DECLARE cur CURSOR

    FOR

    SELECT ''SELECT TOP (1) '''''' + QUOTENAME(s.name) +''.'' + QUOTENAME(o.name)
    + '''''' as TblName, ''''''

    + QUOTENAME(c.name)  + '''''' as ClmName, ''''''

    + t.name  + QUOTENAME(case c.max_length when -1 then ''MAX'' ELSE cast(c.max_length
    as varchar(5)) END , '')'') + '''''' as DataType, ''

    + QUOTENAME(c.name)  + '' FROM ''

    + QUOTENAME(s.name) +''.'' + QUOTENAME(o.name) +

    '' WHERE ISJSON('' + QUOTENAME(c.name)  + '') = 1;''

    FROM sys.columns c

    JOIN sys.types t on c.system_type_id = t.system_type_id

    JOIN sys.objects o ON c.object_id = o.object_id AND o.type = ''u''

    JOIN sys.schemas s ON s.schema_id = o.schema_id

    WHERE t.name IN(''varchar'', ''nvarchar'')

    AND (c.max_length = -1 OR c.max_length > 100)

    OPEN cur

    FETCH NEXT FROM cur INTO @SQL

    WHILE @@FETCH_STATUS = 0

    BEGIN

    print @SQL

    INSERT #Result

    EXEC(@SQL)

    FETCH NEXT FROM cur INTO @SQL

    END

    DEALLOCATE cur;

    SELECT JSONDoc,tblName,clmnName,DateType

    FROM #Result

    ORDER BY tblName, clmnName

    DROP TABLE #Result

    SET NOCOUNT OFF;

    ```


    *清单 9-1. 检测 JSON 数据*


    ### 工作原理


    `ISJSON()` 函数验证字符串类型的值是否为有效的 JSON。`ISJSON()` 函数返回：


    *   1 表示该字符串是有效的 JSON 文档。

    *   0 表示该字符串是无效的 JSON 文档。

    *   NULL 表达式为 NULL 值。


    空的花括号 `{}` 和空的方括号 `[]` 被视为有效的 JSON，因此，`ISJSON()` 函数对这些值返回 1。`ISJSON()` 函数将用于检测
    JSON 文档，并建立一个游标来构建动态 SQL，如清单 9-2 所示。


    ```sql

    DECLARE cur CURSOR

    FOR

    SELECT ''SELECT TOP (1) '''''' + QUOTENAME(s.name) +''.'' + QUOTENAME(o.name)
    + '''''' as TblName, ''''''

    + QUOTENAME(c.name)  + '''''' as ClmName, ''''''

    + t.name  + QUOTENAME(case c.max_length when -1 then ''MAX'' ELSE cast(c.max_length
    as varchar(5)) END , '')'') + '''''' as DataType, ''

    + QUOTENAME(c.name)  + '' FROM ''

    + QUOTENAME(s.name) +''.'' + QUOTENAME(o.name) +

    '' WHERE ISJSON('' + QUOTENAME(c.name)  + '') = 1;''

    FROM sys.columns c

    JOIN sys.types t on c.system_type_id = t.system_type_id

    JOIN sys.objects o ON c.object_id = o.object_id AND o.type = ''u''

    JOIN sys.schemas s ON s.schema_id = o.schema_id

    WHERE t.name IN(''varchar'', ''nvarchar'')

    AND (c.max_length = -1 OR c.max_length > 100);

    ```


    *清单 9-2. 构建动态 SQL 以检测 JSON 文档*


    存储 JSON 的列具有 `nvarchar` 和 `varchar` 数据类型。理论上，`nchar` 和 `char` 数据类型的列也可以存储 JSON；但是，固定长度的数据类型并不适合
    JSON。错误的设计考虑可能会在二进制数据类型（例如用于 JSON 文档的 `varbinary` 和 `image`）中实现。


    **注意**


    Microsoft 推荐使用 `nvarchar(max)` 作为存储 JSON 文档的标准数据类型，正如在 WideWorldImporters 示例数据库（图
    9-1）中所实现的那样。所有存储 JSON 的列都具有 `nvarchar(max)` 数据类型。


    因此，用于游标的动态 SQL（清单 9-1）筛选了表 `sys.types`，并将列名筛选为 ''`varchar`''、''`nvarchar`''。在第
    4 章中，方法 4-7 演示了当数据类型筛选器包含另外四种数据类型：`varbinary`、`image`、`text` 和 `ntext` 时，如何检测
    XML 列。此外，列长度小于 100 时存储 JSON 的可能性较小。因此，对来自表 `sys.columns` 的 `max_length` 列按 -1（即
    `MAX`）或大于 100 进行了筛选。


    游标的 `SELECT` 语句生成的动态 SQL 输出如下：


    1.  `Schema.TableName` – 定义架构和表

    2.  `ColumnName` – 定义列名

    3.  `DataType(data length)` – 定义数据类型

    4.  列名 – 定义返回的 JSON 文档


    `WHERE` 子句使用列名作为参数实现 `ISJSON()`。动态 SQL 行的输出如清单 9-3 所示。动态 SQL 的结果如图 9-2 所示。


    ![A435478_1_En_9_Fig2_HTML.jpg](img/A435478_1_En_9_Fig2_HTML.jpg)


    *图 9-2. 显示清单 9-3 的输出*


    ```sql

    SELECT TOP (1) ''[Application].[People]'' as TblName,

    ''[CustomFields]'' as ClmName,

    ''nvarchar(MAX)'' as DataType,

    [CustomFields]

    FROM [Application].[People]

    WHERE ISJSON([CustomFields]) = 1;

    ```


    *清单 9-3. 动态 SQL 生成的代码*


    循环遍历动态 SQL 的每一行，并检查每列中是否存在潜在的 JSON 文档。当 `ISJSON()` 返回值 1（表示 TRUE）时，该 SQL 的输出将被记录到临时表
    `#Result` 中，该表在游标声明之前创建。当游标遍历完成后，临时表 `#Result` 将返回所有已记录的行。


    ## 9-2. 返回 JSON 文档的子集


    ### 问题


    您希望从 JSON 文档中返回一个对象或数组。


    ### 解决方案


    `JSON_QUERY()` 函数从包含 JSON 文档的变量或列中返回一个子集（对象或数组）。清单 9-4 演示了如何从存储在 `Sales.Invoices`
    表 `ReturnedDeliveryData` 列中的 JSON 文档中返回 `Events` 数组对象（其中的两个）。结果如清单 9-5 所示。


    ```sql

    SELECT TOP (1) JSON_QUERY([ReturnedDeliveryData], ''$.Events'')

    FROM [Sales].[Invoices];

    ```


    *清单 9-4. 返回 Events 数组*


    ```json

    [

    {

    "Event":"Ready for collection",

    "EventTime":"2013-01-01T12:00:00",

    "ConNote":"EAN-125-1051"

    },

    {

    "Event":"DeliveryAttempt",

    "EventTime":"2013-01-02T07:05:00",

    "ConNote":"EAN-125-1051",

    "DriverID":15,

    "Latitude":41.3617214,

    "Longitude":-81.4695602,

    "Status":"Delivered"

    }

    ]

    ```


    *清单 9-5. 清单 [9-4] 的结果*

