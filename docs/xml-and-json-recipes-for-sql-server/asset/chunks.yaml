  trans: "\n### 解决方案\n\n当尝试分解一个类型化的 XML 列时，如代码清单 4-20 所示，`XPath` 路径可能会产生错误。\n\n```\n\
    WITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'\
    \ as df)\nSELECT ProductModelID,\ninstruct.value('.', 'VARCHAR(2000)') AS StepInstruction,\n\
    instruct.value('../@LocationID', 'INT') AS LaborStation,\ninstruct.value('../@LaborHours',\
    \ 'REAL') AS LaborHours,\ninstruct.value('../@LotSize', 'INT') AS LotSize,\ninstruct.value('../@MachineHours',\
    \ 'REAL') AS MachineHours,\ninstruct.value('../@SetupHours', 'REAL') AS SetupHours,\n\
    instruct.value('df:material[1]', 'VARCHAR(100) ') AS Material,\ninstruct.value('df:tool[1]',\
    \ 'VARCHAR(100) ') AS Tool\nFROM Production.ProductModel\nCROSS APPLY Instructions.nodes('df:root/df:Location/df:step')\
    \ prod(instruct);\n代码清单 4-20.\n首次尝试分解类型化 XML 列\n```\n\n然而，此代码会产生一个类似于以下内容的错误：\n\
    \n```\nMsg 9314, Level 16, State 1, Line 2\nXQuery [Production.ProductModel.Instructions.value()]:\
    \ Cannot implicitly atomize or apply 'fn:data()' to complex content elements,\
    \ found type 'df{http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions}:StepType'\
    \ within inferred type 'element(df{http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions}:step,df{http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions}:StepType)'.\n\
    ```\n\n为了修复此错误，我们必须引入 `XQuery` 数据访问器函数 `fn:string()`，以防止当 `value()` 方法使用 `\"../\"\
    ` 步进运算符访问单例原子实例时发生错误，如代码清单 4-21 所示。\n\n```\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'\
    \ as df)\nSELECT ProductModelID,\ninstruct.value('fn:string(.)', 'varchar(2000)')\
    \ AS StepInstruction,\ninstruct.value('fn:string(../@LocationID)', 'int') AS LaborStation,\n\
    instruct.value('fn:string(../@LaborHours)', 'real') AS LaborHours,\ninstruct.value('fn:string(../@LotSize)',\
    \ 'int') AS LotSize,\ninstruct.value('fn:string(../@MachineHours)', 'real') AS\
    \ MachineHours,\ninstruct.value('fn:string(../@SetupHours)', 'real') AS SetupHours,\n\
    instruct.value('df:material[1]', 'varchar(100) ') AS Material,\ninstruct.value('df:tool[1]',\
    \ 'varchar(100) ') AS Tool\nFROM Production.ProductModel\nCROSS APPLY Instructions.nodes('df:root/df:Location/df:step')\
    \ prod(instruct);\n代码清单 4-21.\n应用 fn:string() 函数修复 Msg 9314 错误\n```\n\n查询结果如图\
    \ 4-5 所示。\n\n![A435478_1_En_4_Fig5_HTML.jpg](img/A435478_1_En_4_Fig5_HTML.jpg)\n\
    \n图 4-5.\n使用 `fn:string()` 函数分解类型化 XML 列的结果\n\n### 工作原理\n\n`SQL Server XQuery`\
    \ 实现了三个数据访问器函数：\n*   `fn:string()` – 提取元素或属性的字符串值。\n*   `fn:data()` – 从元素或属性中提取标量（类型化）值。\n\
    *   `text()` – 从元素或属性返回单个值。\n\n如你所见，这三个函数在功能上非常相似。为了检验每个函数的功能，让我们分析代码清单 4-22 的结果，其中的\
    \ `XML` 部分模拟了来自 `Instructions` 列的 `XML`。\n\n```\nDECLARE @x XML = '\n<top>\n \
    \   <level1>1</level1>\n    <level2>2</level2>\n</top>\n<!-- extra text\nelement\
    \ -->\n3';\nSELECT @x.query('/top/level1/text()') Text_Function,\n@x.query('fn:data(/*)')\
    \ Data_Function,\n@x.query('fn:string(/*[1])') String_Function;\n代码清单 4-22.\n\
    分析数据访问器函数。query() 方法将在下一个配方 4-6 “检索 XML 数据的子集”中介绍\n```\n\n此查询的结果如图 4-6 所示。\n\n\
    ![A435478_1_En_4_Fig6_HTML.jpg](img/A435478_1_En_4_Fig6_HTML.jpg)\n\n图 4-6.\n\
    显示数据访问器函数结果\n\n代码清单 4-22 及其结果（如图 4-6 所示）演示了数据访问器函数：\n*   `text()` 函数从元素 `<level1>`\
    \ 返回单个值 “1”。\n*   `fn:data()` 函数连接了值。\n*   `fn:string()` 函数要求单例，并为 `level1` 和\
    \ `level2` 元素返回值。\n\n对于代码清单 4-22 中的解决方案，`fn:string()` 函数是最合适的，因为它使用了局部元素引用：`instruct.value('fn:string(.)',\
    \ 'varchar(2000)')`。例如，`fn:data()` 会返回错误，而 `text()` 函数会为 `Instructions` 列返回部分值，如代码清单\
    \ 4-23 所示。\n\n```\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions'\
    \ as df)\nSELECT instruct.value('./text()[1]', 'varchar(2000)') AS Step_Instruction_by_text,\n\
    instruct.value('fn:string(.)', 'varchar(2000)') AS Step_Instruction_by_string\n\
    FROM Production.ProductModel\nCROSS APPLY Instructions.nodes('df:root/df:Location/df:step')\
    \ prod(instruct);\n代码清单 4-23.\n演示 text() 和 fn:string() 函数的结果差异\n```\n\n代码清单 4-23\
    \ 的结果如图 4-7 所示。\n\n![A435478_1_En_4_Fig7_HTML.jpg](img/A435478_1_En_4_Fig7_HTML.jpg)\n\
    \n图 4-7.\n`text()` 和 `fn:string()` 函数之间的差异\n\n## 4-6. 检索 XML 数据的子集\n\n### 问题\n\
    \n你希望从 `XML` 文档中返回特定的子集并保持 `XML` 格式。\n\n### 解决方案\n\n`query()` 方法允许你检索 `XML` 实例的特定部分。代码清单\
    \ 4-24 演示了如何从 `SQL Server` 的动态管理视图 (`DMVs`) 中查询执行计划，并从执行计划中检索 `Statements` 部分。\n\
    \n```\nSELECT TOP (25)\n@@SERVERNAME as ServerName,\nqs.Execution_count as Executions,\n\
    qs.total_worker_time as TotalCPU,\nqs.total_physical_reads as PhysicalReads,\n\
    qs.total_logical_reads as LogicalReads,\nqs.total_logical_writes as LogicalWrites,\n\
    qs.total_elapsed_time as Duration,\nqs.total_worker_time/qs.execution_count as\
    \ [Avg CPU Time],\nDB_NAME(qt.dbid) DatabaseName,\nqt.objectid,\nOBJECT_NAME(qt.objectid,\
    \ qt.dbid) ObjectName,\nqp.query_plan as XMLPlan,\nquery_plan.query('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/showplan\"\
    ;\n//Batch/Statements') as SQLStatements\nFROM sys.dm_exec_query_stats qs\nCROSS\
    \ APPLY sys.dm_exec_sql_text(qs.sql_handle) as qt\nCROSS APPLY sys.dm_exec_query_plan(plan_handle)\
    \ as qp\nWHERE qt.dbid IS NOT NULL\nORDER BY TotalCPU DESC;\n代码清单 4-24.\n从执行计划返回\
    \ SQL 语句 XML\n```\n"
- fmt: "## How It Works\n\nAmong XQuery methods, the `query()` method is straightforward\
    \ and simple to use. To return the subset of an `XML` instance, you need to specify\
    \ an `XML` variable or column, and the path to the target element or attribute.\
    \ The `query()` method returns an instance of the `XML` data type. For example,\
    \ to return `Features` `XML` out of the `ProductDescription` `XML` instance assigned\
    \ to the `@x` variable demonstrated in Listing [4-25](#A435478_1_En_4_Chapter.html#Par183),\
    \ the result is shown in Figure [4-8](#A435478_1_En_4_Chapter.html#Fig8).\n\n\
    ```sql\nDECLARE @x XML ='\n<ProductDescription ProductID=\"1\">\n  <Features>\n\
    \    <Feature 1>\n        3 years\n        parts and labor\n    </Feature>\n \
    \   <Feature 2>\n        10 years\n        maintenance contract available through\
    \ your dealer or any AdventureWorks retail store.\n    </Feature>\n  </Features>\n\
    \  <Specifications>\n    <Color>front</Color>\n    <Size>small</Size>\n  </Specifications>\n\
    </ProductDescription>\n';\nSELECT @x.query('ProductDescription/Features');\n```\n\
    \n**Listing 4-25.** Returning Features subset from the `XML`\n\nThe result is\
    \ shown in Listing [4-26](#A435478_1_En_4_Chapter.html#Par185).\n\n```xml\n<Features>\n\
    \  <Feature 1>\n    3 years\n    parts and labor\n  </Feature>\n  <Feature 2>\n\
    \    10 years\n    maintenance contract available through your dealer or any AdventureWorks\
    \ retail store.\n  </Feature>\n</Features>\n```\n\n**Listing 4-26.** Resulting\
    \ of `query()` method\n\nListing [4-25](#A435478_1_En_4_Chapter.html#Par183) demonstrates\
    \ returning results from an `XML` variable that does not contain any namespaces.\
    \ Therefore, no `XMLNAMESPACES` are specified for the `query()` method. However,\
    \ for typed `XML` the `query()` method is required to declare a namespace, as\
    \ demonstrated in the Solution section of this recipe, in Listing [4-24](#A435478_1_En_4_Chapter.html#Par181).\
    \ The solution uses the default syntax to declare a namespace, because the execution\
    \ plan `XML` only references a single namespace:\n\n```sql\nquery_plan.query('declare\
    \ default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/showplan\"\
    ;\n                    //Batch/Statements') as SQLStatements\n```\n\nAlternatively,\
    \ Listing [4-27](#A435478_1_En_4_Chapter.html#Par189) has two namespaces defined\
    \ in the `XML` instance. Therefore, each namespace has to be declared individually,\
    \ as shown.\n\n```sql\nSELECT name,\n       CAST(CAST(packagedata AS varbinary(MAX))\
    \ AS XML) AS package,\n       CAST(CAST(packagedata AS varbinary(MAX)) AS XML).query('declare\
    \ namespace         DTS=\"www.microsoft.com/SqlServer/Dts\";\ndeclare namespace\
    \ SQLTask=\"www.microsoft.com/sqlserver/dts/tasks/sqltask\";\n               \
    \               //DTS:ObjectData//SQLTask:SqlTaskData/SQLTask:SelectedDatabases')\
    \ as SQLStatements\nFROM msdb.dbo.sysssispackages\nWHERE packagetype = 6;\n```\n\
    \n**Listing 4-27.** Declaring multiple namespaces in XQuery, in the `query()`\
    \ method\n\nTo declare the namespaces, you can use either the internal XQuery\
    \ format of the `query()` method or the `XMLNAMESPACES` syntax, as shown in Listing\
    \ [4-28](#A435478_1_En_4_Chapter.html#Par191).\n\n```sql\nWITH XMLNAMESPACES('www.microsoft.com/SqlServer/Dts'\
    \ as DTS,\n                   'www.microsoft.com/sqlserver/dts/tasks/sqltask'\
    \ as SQLTask)\nSELECT name,\n       CAST(CAST(packagedata AS varbinary(MAX)) AS\
    \ XML) AS package,\n       CAST(CAST(packagedata AS varbinary(MAX)) AS XML).query('//DTS:ObjectData//SQLTask:SqlTaskData/SQLTask:SelectedDatabases')\
    \ as SQLStatements\nFROM msdb.dbo.sysssispackages\nWHERE packagetype = 6;\n```\n\
    \n**Listing 4-28.** Using `XMLNAMESPACES` instead of XQuery namespace declaration\
    \ in the `query()` method\n\nTo finalize this recipe, I would like to demonstrate\
    \ one more example when the subset of the `XML` instance is returned with user-defined\
    \ root element, Listing [4-29](#A435478_1_En_4_Chapter.html#Par193). The syntax\
    \ for this is `query('<Root>{/XMLPath/}</Root>')`.\n\n```sql\nWITH XMLNAMESPACES('www.microsoft.com/SqlServer/Dts'\
    \ as DTS,\n                   'www.microsoft.com/sqlserver/dts/tasks/sqltask'\
    \ as SQLTask)\nSELECT name,\n       CAST(CAST(packagedata AS varbinary(MAX)) AS\
    \ XML) AS package,\n       CAST(CAST(packagedata AS varbinary(MAX)) AS XML).query('{//DTS:ObjectData//SQLTask:SqlTaskData/SQLTask:SelectedDatabases}')\
    \ as SQLStatements\nFROM msdb.dbo.sysssispackages\nWHERE packagetype = 6;\n```\n\
    \n**Listing 4-29.** Returning `query()` function result with user-defined root\
    \ element\n\nYou can pick your own preference on which syntax to use for the `query()`\
    \ method.\n\n## 4-7. Finding All XML Columns in a Table\n\n### Problem\n\nYou\
    \ want to find `XML` documents that can be stored with a data type other than\
    \ `XML`.\n\n### Solution\n\nI have never been in the situation where I needed\
    \ to detect the `XML` document on the client side; however, the client is not\
    \ sure where `XML` is stored. Simply relying on the `XML` data type is not a good\
    \ strategy. As explained in Recipe 4-4, the `XML` documents could store the columns\
    \ with `XML`, `VARCHAR`, `NVARCHAR`, `VARBINARY`, `IMAGE`, `TEXT`, and `NTEXT`\
    \ data types. Therefore, I developed a `SQL` script that dynamically “sniffs”\
    \ the `XML` document across all columns within a database, as shown in Listing\
    \ [4-30](#A435478_1_En_4_Chapter.html#Par197).\n\n```sql\nSET NOCOUNT ON;\nDECLARE\
    \ @SQL nvarchar(1000),\n        @tblName nvarchar(200),\n        @clmnName nvarchar(100),\n\
    \        @DType nvarchar(100);\nIF (OBJECT_ID('tempdb.dbo.#Result')) IS NOT NULL\n\
    \    DROP TABLE #Result;\nCREATE TABLE #Result\n(\n    XMLValue XML,\n    TopElement\
    \ NVARCHAR(100),\n    tblName NVARCHAR(200),\n    clmnName NVARCHAR(100),\n  \
    \  DateType NVARCHAR(100)\n);\nIF (OBJECT_ID('tempdb.dbo.#XML')) IS NOT NULL\n\
    \    DROP TABLE #XML;\nCREATE TABLE #XML\n(\n    Val XML,\n    TopElmn VARCHAR(100)\n\
    );\nDECLARE cur\nCURSOR FOR\nSELECT XMLClmn = 'WITH CTE AS\n                 \
    \  (SELECT TOP 1 '+ CASE t.name WHEN ''IMAGE'' THEN '' TRY_CONVERT(XML, CAST('\
    \ + QUOTENAME(c.name)  + '' AS VARBINARY(MAX))) AS tst, ''\n                 \
    \                         ELSE '' TRY_CONVERT(XML, ' + QUOTENAME(c.name)  + '')\
    \ as tst, '' END + QUOTENAME(c.name)  + '' FROM ''\n                         \
    \                 + QUOTENAME(s.name) +''.'' + QUOTENAME(o.name) +\n         \
    \                                 ''\n                                       \
    \   WHERE '+ CASE t.name WHEN ''IMAGE'' THEN '' TRY_CONVERT(XML, CAST(' + QUOTENAME(c.name)\
    \  + '' AS VARBINARY(MAX)))''\n                                          ELSE\
    \ '' TRY_CONVERT(XML, ' + QUOTENAME(c.name)  + '') '' END +'' IS NOT NULL\n  \
    \                 )\n                   SELECT TOP (1) tst,\n                \
    \          c.value(''fn:local-name(.)[1]'', ''VARCHAR(200)'') AS TopNodeName\n\
    \                   FROM CTE CROSS APPLY tst.nodes(''/*'') AS t(c);',\n      \
    \ s.name + ''.'' + o.name AS TableName,\n       c.name AS ColumnName ,\n     \
    \  t.name\nFROM sys.columns c\nINNER JOIN sys.types t\n    ON c.system_type_id\
    \ = t.system_type_id\nINNER JOIN sys.objects o\n    ON c.object_id = o.object_id\n\
    \    AND o.type = ''u''\nINNER JOIN sys.schemas s\n    ON s.schema_id = o.schema_id\n\
    WHERE (t.name IN(''xml'',''varchar'', ''nvarchar'', ''varbinary'') AND c.max_length\
    \ = -1)\n   OR (t.name IN (''image'', ''text'', ''ntext''));\nOPEN cur;\nFETCH\
    \ NEXT\nFROM cur\nINTO @SQL, @tblName, @clmnName, @DType;\nWHILE @@FETCH_STATUS\
    \ = 0\nBEGIN\n    INSERT INTO #XML\n    EXEC(@SQL);\n    INSERT #Result\n    SELECT\
    \ Val, TopElmn, @tblName, @clmnName, @DType\n    FROM #XML;\n    TRUNCATE TABLE\
    \ #XML;\n    FETCH NEXT FROM cur INTO @SQL, @tblName, @clmnName, @DType;\nEND\n\
    DEALLOCATE cur;\nSELECT XMLValue,TopElement,tblName,clmnName,DateType\nFROM #Result;\n\
    DROP TABLE #Result;\nDROP TABLE #XML;\nSET NOCOUNT OFF;\n```\n\n**Listing 4-30.**\
    \ Detecting the `XML` document across the tables and columns\n\nTo demonstrate\
    \ the result, the `SQL` script is executed against the `msdb` database, as shown\
    \ in Figure [4-8](#A435478_1_En_4_Chapter.html#Fig8).\n\n![A435478_1_En_4_Fig8_HTML.jpg](A435478_1_En_4_Fig8_HTML.jpg)\n\
    \n**Figure 4-8.** Results from the `msdb` database\n\n**Important** This solution\
    \ uses the `TRY_CONVERT()` function, which is only available on `SQL Server` 2012\
    \ and later."
  raw: '### How It Works


    Among XQuery methods, the query() method is straightfordard and simple to use.
    To return the subset of an XML instance, you need to specify an `XML` variable
    or column, and the path to the target element or attribute. The query() method
    returns an instance of the `XML` data type. For example, to return Features XML
    out of the ProductDescription XML instance assigned to the untype variable demonstarted
    in Listing [4-25](#A435478_1_En_4_Chapter.html#Par183), the result is shown in
    Figure [4-8](#A435478_1_En_4_Chapter.html#Fig8).


    ```

    DECLARE @x XML =''


    AdventureWorks


    HTTP://www.Adventure-works.com


    3 years

    parts and labor


    10 years

    maintenance contract available through your dealer or any AdventureWorks retail
    store.


    front

    small


    '';

    SELECT @x.query(''ProductDescription/Features'');

    Listing 4-25.

    Returning Features subset fromthe XML

    ```


    The result is shown in Listing [4-26](#A435478_1_En_4_Chapter.html#Par185).


    ```


    3 years

    parts and labor


    10 years

    maintenance contract available through your dealer or any AdventureWorks retail
    store.


    Listing 4-26.

    Resulting of query() method

    ```


    Listing [4-25](#A435478_1_En_4_Chapter.html#Par183) demonstrates returning results
    from an `XML` variable that does not contain any namespaces. Therefore, no `XMLNAMESPACES`
    are specified for the query() method. However, for typed XML the query() method
    is required to declare a namespace, as demonstrated in the Solution section of
    this recipe, in Listing [4-24](#A435478_1_En_4_Chapter.html#Par181). The solution
    uses the default syntax to declare a namespace, because the execution plan XML
    only references a single namespace:


    ```

    query_plan.query(''declare default element namespace "http://schemas.microsoft.com/sqlserver/2004/07/showplan";

    //Batch/Statements'') as SQLStatements

    ```


    Alternatively, Listing [4-27](#A435478_1_En_4_Chapter.html#Par189) has two namespaces
    defined in the XML instance. Therefore, each namespace has to be declared individually,
    as shown.


    ```

    SELECT name,

    CAST(CAST(packagedata AS varbinary(MAX)) AS XML) AS package,

    CAST(CAST(packagedata AS varbinary(MAX)) AS XML).query(''declare namespace         DTS="www.microsoft.com/SqlServer/Dts";

    declare namespace SQLTask="www.microsoft.com/sqlserver/dts/tasks/sqltask";

    //DTS:ObjectData//SQLTask:SqlTaskData/SQLTask:SelectedDatabases'') as SQLStatements

    FROM msdb.dbo.sysssispackages

    WHERE packagetype = 6;

    Listing 4-27.

    Declaring multiple namespaces in XQuery, in the query() method

    ```


    To declare the namespaces, you can use either the internal XQuery format of the
    query() method or the `XMLNAMESPACES` syntax, as shown in Listing [4-28](#A435478_1_En_4_Chapter.html#Par191).


    ```

    WITH XMLNAMESPACES(''www.microsoft.com/SqlServer/Dts'' as DTS,

    ''www.microsoft.com/sqlserver/dts/tasks/sqltask'' as SQLTask)

    SELECT name,

    CAST(CAST(packagedata AS varbinary(MAX)) AS XML) AS package,

    CAST(CAST(packagedata AS varbinary(MAX)) AS XML).query(''//DTS:ObjectData//SQLTask:SqlTaskData/SQLTask:SelectedDatabases'')
    as SQLStatements

    FROM msdb.dbo.sysssispackages

    WHERE packagetype = 6;

    Listing 4-28.

    Using XMLNAMESPACES instead of XQuery namespace declaration in the query() method

    ```


    To finalize this recipe, I would like to demonstrate one more example when the
    subset of the XML instance is returned with user-defined root element, Listing
    [4-29](#A435478_1_En_4_Chapter.html#Par193). The syntax for this is query(‘<Root>{/XMLPath/}</Root>’).


    ```

    WITH XMLNAMESPACES(''www.microsoft.com/SqlServer/Dts'' as DTS,

    ''www.microsoft.com/sqlserver/dts/tasks/sqltask'' as SQLTask)

    SELECT name,

    CAST(CAST(packagedata AS varbinary(MAX)) AS XML) AS package,

    CAST(CAST(packagedata AS varbinary(MAX)) AS XML).query(''{//DTS:ObjectData//SQLTask:SqlTaskData/SQLTask:SelectedDatabases}'')
    as SQLStatements

    FROM msdb.dbo.sysssispackages

    WHERE packagetype = 6;

    Listing 4-29.

    Returning query() function result with user-defined root element

    ```


    You can pick your own preference on which syntax to use for the query() method.


    ## 4-7\. Finding All XML Columns in a Table


    ### Problem


    You want to find XML documents that can be stored with a data type other than
    XML.


    ### Solution


    I have never been in the situation where I needed to detect the XML document on
    the client side; however, the client is not sure where XML is stored. Simply relying
    on the XML data type is not a good strategy. As explained in Recipe 4-4, the XML
    documents could store the columns with `XML`, `VARCHAR` , `NVARCHAR` , `VARBINARY`
    , `IMAGE` , `TEXT`, and `NTEXT` data types. Therefore, I developed a SQL script
    that dynamically “sniffs” the XML document across all columns within a database
    , as shown in Listing [4-30](#A435478_1_En_4_Chapter.html#Par197).


    ```

    SET NOCOUNT ON;

    DECLARE @SQL nvarchar(1000),

    @tblName nvarchar(200),

    @clmnName nvarchar(100),

    @DType nvarchar(100);

    IF (OBJECT_ID(''tempdb.dbo.#Result'')) IS NOT NULL

    DROP TABLE #Result;

    CREATE TABLE #Result

    (

    XMLValue XML,

    TopElement NVARCHAR(100),

    tblName NVARCHAR(200),

    clmnName NVARCHAR(100),

    DateType NVARCHAR(100)

    );

    IF (OBJECT_ID(''tempdb.dbo.#XML'')) IS NOT NULL

    DROP TABLE #XML;

    CREATE TABLE #XML

    (

    Val XML,

    TopElmn VARCHAR(100)

    );

    DECLARE cur

    CURSOR FOR

    SELECT XMLClmn = ''WITH CTE AS

    (SELECT TOP 1 ''+ CASE t.name WHEN ''IMAGE'' THEN '' TRY_CONVERT(XML, CAST(''
    + QUOTENAME(c.name)  + '' AS VARBINARY(MAX))) AS tst, ''

    ELSE '' TRY_CONVERT(XML, '' + QUOTENAME(c.name)  + '') as tst, '' END + QUOTENAME(c.name)  +
    '' FROM ''

    + QUOTENAME(s.name) +''.'' + QUOTENAME(o.name) +

    ''

    WHERE ''+ CASE t.name WHEN ''IMAGE'' THEN '' TRY_CONVERT(XML, CAST('' + QUOTENAME(c.name)  +
    '' AS VARBINARY(MAX)))''

    ELSE '' TRY_CONVERT(XML, '' + QUOTENAME(c.name)  + '') '' END +'' IS NOT NULL

    )

    SELECT TOP (1) tst,

    c.value(''''fn:local-name(.)[1]'''', ''''VARCHAR(200)'''') AS TopNodeName

    FROM CTE CROSS APPLY tst.nodes(''''/*'''') AS t(c);'',

    s.name + ''.'' + o.name AS TableName,

    c.name AS ColumnName ,

    t.name

    FROM sys.columns c

    INNER JOIN sys.types t

    ON c.system_type_id = t.system_type_id

    INNER JOIN sys.objects o

    ON c.object_id = o.object_id

    AND o.type = ''u''

    INNER JOIN sys.schemas s

    ON s.schema_id = o.schema_id

    WHERE (t.name IN(''xml'',''varchar'', ''nvarchar'', ''varbinary'') AND c.max_length
    = -1)

    OR (t.name IN (''image'', ''text'', ''ntext''));

    OPEN cur;

    FETCH NEXT

    FROM cur

    INTO @SQL, @tblName, @clmnName, @DType;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    INSERT INTO #XML

    EXEC(@SQL);

    INSERT #Result

    SELECT Val, TopElmn, @tblName, @clmnName, @DType

    FROM #XML;

    TRUNCATE TABLE #XML;

    FETCH NEXT FROM cur INTO @SQL, @tblName, @clmnName, @DType;

    END

    DEALLOCATE cur;

    SELECT XMLValue,TopElement,tblName,clmnName,DateType

    FROM #Result;

    DROP TABLE #Result;

    DROP TABLE #XML;

    SET NOCOUNT OFF;

    Listing 4-30.

    Detecting the XML document across the tables and columns

    ```


    To demonstrate the result , the SQL script is executed against the msdb database,
    as shown in Figure [4-8](#A435478_1_En_4_Chapter.html#Fig8).


    ![A435478_1_En_4_Fig8_HTML.jpg](A435478_1_En_4_Fig8_HTML.jpg)


    Figure 4-8.


    Results from the msdb database Important


    This solution uses the `TRY_CONVERT()` function, which is only available on SQL
    Server 2012 and later.'
  trans: "\n## 工作原理\n\n在 XQuery 方法中，`query()`方法直接且易于使用。要返回`XML`实例的子集，你需要指定一个`XML`变量或列，以及目标元素或属性的路径。`query()`方法返回`XML`数据类型的实例。例如，要从分配给变量`@x`的`ProductDescription`\
    \ `XML`实例（如代码清单 4-25 所示）中返回`Features` `XML`，结果如图 4-8 所示。\n\n```sql\nDECLARE @x\
    \ XML ='\n<ProductDescription ProductID=\"1\">\n  <Features>\n    <Feature 1>\n\
    \        3 years\n        parts and labor\n    </Feature>\n    <Feature 2>\n \
    \       10 years\n        maintenance contract available through your dealer or\
    \ any AdventureWorks retail store.\n    </Feature>\n  </Features>\n  <Specifications>\n\
    \    <Color>front</Color>\n    <Size>small</Size>\n  </Specifications>\n</ProductDescription>\n\
    ';\nSELECT @x.query('ProductDescription/Features');\n```\n\n**代码清单 4-25.** 从`XML`返回\
    \ Features 子集\n\n结果如代码清单 4-26 所示。\n\n```xml\n<Features>\n  <Feature 1>\n    3\
    \ years\n    parts and labor\n  </Feature>\n  <Feature 2>\n    10 years\n    maintenance\
    \ contract available through your dealer or any AdventureWorks retail store.\n\
    \  </Feature>\n</Features>\n```\n\n**代码清单 4-26.** `query()`方法的结果\n\n代码清单 4-25\
    \ 展示了从一个不包含任何命名空间的`XML`变量返回结果。因此，无需为`query()`方法指定任何`XMLNAMESPACES`。然而，对于类型化的`XML`，`query()`方法需要声明命名空间，如本配方的解决方案部分（代码清单\
    \ 4-24）所示。该解决方案使用默认语法声明命名空间，因为执行计划`XML`只引用了一个命名空间：\n\n```sql\nquery_plan.query('declare\
    \ default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/showplan\"\
    ;\n                    //Batch/Statements') as SQLStatements\n```\n\n或者，代码清单 4-27\
    \ 中定义了`XML`实例中的两个命名空间。因此，每个命名空间都必须单独声明，如下所示。\n\n```sql\nSELECT name,\n       CAST(CAST(packagedata\
    \ AS varbinary(MAX)) AS XML) AS package,\n       CAST(CAST(packagedata AS varbinary(MAX))\
    \ AS XML).query('declare namespace         DTS=\"www.microsoft.com/SqlServer/Dts\"\
    ;\ndeclare namespace SQLTask=\"www.microsoft.com/sqlserver/dts/tasks/sqltask\"\
    ;\n                              //DTS:ObjectData//SQLTask:SqlTaskData/SQLTask:SelectedDatabases')\
    \ as SQLStatements\nFROM msdb.dbo.sysssispackages\nWHERE packagetype = 6;\n```\n\
    \n**代码清单 4-27.** 在`query()`方法的 XQuery 中声明多个命名空间\n\n要声明命名空间，你可以使用`query()`方法的内部\
    \ XQuery 格式，也可以使用`XMLNAMESPACES`语法，如代码清单 4-28 所示。\n\n```sql\nWITH XMLNAMESPACES('www.microsoft.com/SqlServer/Dts'\
    \ as DTS,\n                   'www.microsoft.com/sqlserver/dts/tasks/sqltask'\
    \ as SQLTask)\nSELECT name,\n       CAST(CAST(packagedata AS varbinary(MAX)) AS\
    \ XML) AS package,\n       CAST(CAST(packagedata AS varbinary(MAX)) AS XML).query('//DTS:ObjectData//SQLTask:SqlTaskData/SQLTask:SelectedDatabases')\
    \ as SQLStatements\nFROM msdb.dbo.sysssispackages\nWHERE packagetype = 6;\n```\n\
    \n**代码清单 4-28.** 在`query()`方法中使用`XMLNAMESPACES`代替 XQuery 命名空间声明\n\n作为本配方的总结，我想再演示一个示例，其中返回带有用户定义根元素的`XML`实例子集（代码清单\
    \ 4-29）。其语法是 `query('<Root>{/XMLPath/}</Root>')`。\n\n```sql\nWITH XMLNAMESPACES('www.microsoft.com/SqlServer/Dts'\
    \ as DTS,\n                   'www.microsoft.com/sqlserver/dts/tasks/sqltask'\
    \ as SQLTask)\nSELECT name,\n       CAST(CAST(packagedata AS varbinary(MAX)) AS\
    \ XML) AS package,\n       CAST(CAST(packagedata AS varbinary(MAX)) AS XML).query('{//DTS:ObjectData//SQLTask:SqlTaskData/SQLTask:SelectedDatabases}')\
    \ as SQLStatements\nFROM msdb.dbo.sysssispackages\nWHERE packagetype = 6;\n```\n\
    \n**代码清单 4-29.** 使用用户定义的根元素返回`query()`函数结果\n\n你可以根据自己的偏好选择`query()`方法使用的语法。\n\n\
    ## 4-7. 查找表中的所有 XML 列\n\n### 问题\n\n你想查找那些可能以非`XML`数据类型存储的`XML`文档。\n\n### 解决方案\n\
    \n我从未遇到过需要在客户端检测`XML`文档的情况，但当客户端不确定`XML`存储在何处时，仅仅依赖`XML`数据类型并不是一个好策略。正如配方 4-4\
    \ 所解释的，`XML`文档可能存储在`XML`、`VARCHAR`、`NVARCHAR`、`VARBINARY`、`IMAGE`、`TEXT`和`NTEXT`数据类型的列中。因此，我编写了一个`SQL`脚本，用于动态地在数据库的所有列中“嗅探”`XML`文档，如代码清单\
    \ 4-30 所示。\n\n```sql\nSET NOCOUNT ON;\nDECLARE @SQL nvarchar(1000),\n        @tblName\
    \ nvarchar(200),\n        @clmnName nvarchar(100),\n        @DType nvarchar(100);\n\
    IF (OBJECT_ID('tempdb.dbo.#Result')) IS NOT NULL\n    DROP TABLE #Result;\nCREATE\
    \ TABLE #Result\n(\n    XMLValue XML,\n    TopElement NVARCHAR(100),\n    tblName\
    \ NVARCHAR(200),\n    clmnName NVARCHAR(100),\n    DateType NVARCHAR(100)\n);\n\
    IF (OBJECT_ID('tempdb.dbo.#XML')) IS NOT NULL\n    DROP TABLE #XML;\nCREATE TABLE\
    \ #XML\n(\n    Val XML,\n    TopElmn VARCHAR(100)\n);\nDECLARE cur\nCURSOR FOR\n\
    SELECT XMLClmn = 'WITH CTE AS\n                   (SELECT TOP 1 '+ CASE t.name\
    \ WHEN ''IMAGE'' THEN '' TRY_CONVERT(XML, CAST(' + QUOTENAME(c.name)  + '' AS\
    \ VARBINARY(MAX))) AS tst, ''\n                                          ELSE\
    \ '' TRY_CONVERT(XML, ' + QUOTENAME(c.name)  + '') as tst, '' END + QUOTENAME(c.name)\
    \  + '' FROM ''\n                                          + QUOTENAME(s.name)\
    \ +''.'' + QUOTENAME(o.name) +\n                                          ''\n\
    \                                          WHERE '+ CASE t.name WHEN ''IMAGE''\
    \ THEN '' TRY_CONVERT(XML, CAST(' + QUOTENAME(c.name)  + '' AS VARBINARY(MAX)))''\n\
    \                                          ELSE '' TRY_CONVERT(XML, ' + QUOTENAME(c.name)\
    \  + '') '' END +'' IS NOT NULL\n                   )\n                   SELECT\
    \ TOP (1) tst,\n                          c.value(''fn:local-name(.)[1]'', ''VARCHAR(200)'')\
    \ AS TopNodeName\n                   FROM CTE CROSS APPLY tst.nodes(''/*'') AS\
    \ t(c);',\n       s.name + ''.'' + o.name AS TableName,\n       c.name AS ColumnName\
    \ ,\n       t.name\nFROM sys.columns c\nINNER JOIN sys.types t\n    ON c.system_type_id\
    \ = t.system_type_id\nINNER JOIN sys.objects o\n    ON c.object_id = o.object_id\n\
    \    AND o.type = ''u''\nINNER JOIN sys.schemas s\n    ON s.schema_id = o.schema_id\n\
    WHERE (t.name IN(''xml'',''varchar'', ''nvarchar'', ''varbinary'') AND c.max_length\
    \ = -1)\n   OR (t.name IN (''image'', ''text'', ''ntext''));\nOPEN cur;\nFETCH\
    \ NEXT\nFROM cur\nINTO @SQL, @tblName, @clmnName, @DType;\nWHILE @@FETCH_STATUS\
    \ = 0\nBEGIN\n    INSERT INTO #XML\n    EXEC(@SQL);\n    INSERT #Result\n    SELECT\
    \ Val, TopElmn, @tblName, @clmnName, @DType\n    FROM #XML;\n    TRUNCATE TABLE\
    \ #XML;\n    FETCH NEXT FROM cur INTO @SQL, @tblName, @clmnName, @DType;\nEND\n\
    DEALLOCATE cur;\nSELECT XMLValue,TopElement,tblName,clmnName,DateType\nFROM #Result;\n\
    DROP TABLE #Result;\nDROP TABLE #XML;\nSET NOCOUNT OFF;\n```\n\n**代码清单 4-30.**\
    \ 跨表和列检测`XML`文档\n\n为了演示结果，该`SQL`脚本在`msdb`数据库上执行，如图 4-8 所示。\n\n![A435478_1_En_4_Fig8_HTML.jpg](img/A435478_1_En_4_Fig8_HTML.jpg)\n\
    \n**图 4-8.** 来自`msdb`数据库的结果\n\n**重要提示** 此解决方案使用了`TRY_CONVERT()`函数，该函数仅在 `SQL Server`\
    \ 2012 及更高版本中可用。\n"
- fmt: '# How It Works


    ## Data Type Filtering and Verification


    The solution is based on several logical processes:


    *   The `FROM` clause obtains from the system tables (`sys.columns`, `sys.types`,
    `sys.objects`, and `sys.schemas`) data about the columns, their tables, and schemas
    that have the possibility to store XML data.

    *   The `WHERE` clause filters out the data types. Hypothetically, the XML documents
    could be found in the columns with the `XML`, `VARCHAR`, `NVARCHAR`, `VARBINARY`,
    `IMAGE`, `TEXT`, and `NTEXT` data types. The XML documents are lengthy by nature.
    Therefore, the data types `VARCHAR`, `NVARCHAR`, and `VARBINARY` are expected
    to have a length of -1, that is `MAX` in the data type length specification. Other
    data types `IMAGE`, `TEXT`, and `NTEXT` do not need to have this additional length
    filter.

    *   The `SELECT` clause dynamically builds verification SQL. The key function
    is `TRY_CONVERT()` has been available since SQL Server 2012. We are taking advantage
    of the `TRY_CONVERT()` behavior: when a data type fails to covert to specified
    type, then the function returns `NULL`. For example, `CAST()` and `CONVERT()`
    functions return an error (Msg 9420, XML parsing: line 1, character 2, illegal
    xml character) when the conversion fails. Therefore, any data value that fails
    to convert to the `XML` data type is filtered out. As explained in Recipe 4-4,
    the `IMAGE` data type cannot be converted directly to `XML`. Therefore, the `CASE`
    expression uses two conversion verifications; first for `IMAGE` data type, as
    shown in Listing 4-31, and the second for the `VARCHAR`, `NVARCHAR`, `VARBINARY`,
    `TEXT`, and `NTEXT` data types, shown in Listing 4-32.


    ```sql

    WITH CTE AS

    (

    SELECT TOP (1) TRY_CONVERT(XML, CAST(packagedata AS VARBINARY(MAX))) AS tst,

    packagedata

    FROM dbo.sysssispackages

    WHERE  TRY_CONVERT(XML, CAST(packagedata AS VARBINARY(MAX))) IS NOT NULL

    )

    SELECT TOP (1) tst,

    c.value(''local-name(.)[1]'', ''VARCHAR(200)'') AS TopNodeName

    FROM CTE

    CROSS APPLY tst.nodes(''/*'') AS t(c);

    Listing 4-31.

    Verifying IMAGE data type

    ```


    ```sql

    WITH CTE AS

    (

    SELECT TOP (1) TRY_CONVERT(XML, expression) as tst,

    expression

    FROM dbo.syspolicy_conditions_internal

    WHERE  TRY_CONVERT(XML, expression) IS NOT NULL

    )

    SELECT TOP (1) tst,

    c.value(''fn:local-name(.)[1]'', ''VARCHAR(200)'') AS TopNodeName

    FROM CTE

    CROSS APPLY tst.nodes(''/*'') AS t(c);

    Listing 4-32.

    Verifying VARCHAR, NVARCHAR, VARBINARY, TEXT, and NTEXT data types

    ```


    ## Code Execution Process


    This is how the code works:


    *   The cursor executes each SQL script generated in `SELECT` clause.

    *   The temp table `#XML` gets returned rows.

    *   The temp table `#Result` gets the row from `#XML` table and the variables
    from the cursor.

    *   Clean up `#XML` table to prepare for next row verification.

    *   Destroying the cursor.

    *   Returning the collected data.

    *   Dropping the temp tables.


    ## Analysis of the CTE External SELECT Block


    This is the description of the process. However, I would like take a closer look
    at the CTE external `SELECT` block from Listing 4-32:


    ```sql

    SELECT TOP (1) tst,

    c.value(''fn:local-name(.)[1]'', ''VARCHAR(200)'') AS TopNodeName

    FROM CTE

    CROSS APPLY tst.nodes(''/*'') AS t(c);

    ```


    The column `tst`, which stands for test, returns the XML value when it is successfully
    converted to the `XML` data type. The column `TopNodeName` returns the first available
    element name, that is, the root element. The `fn:local-name()` function returns
    an element name by the provided argument. The dot (the current context node) is
    the argument to the `fn:local-name()` function, and `nodes()` method set to `"/*"`
    (shortcut for `child::node()` and `/node()` axis), which is a wildcard for a single
    element. Therefore, the XML parser of this combination means – return the first
    available name out of the XML document.


    We can get different effects when the `node()` method is set with `"//*"` (shortcut
    for `descendant-or-self` axis), which means to look and visit every element in
    the XML data. This can be compared to the T-SQL filter, for example, `WHERE ColumnName
    LIKE ''%text%''`. This way the parser navigates through all the elements within
    the XML data, as shown in Listing 4-33. The `fn:local-name()` function with a
    single dot as the argument returns the current element name, for example, `details.value(''local-name(.)[1]'',
    ''VARCHAR(100)'')`. With a parent axis step (double dot), it returns the element
    that resides one level up, that is, parent, for example, `details.value(''local-name(..)[1]'',
    ''VARCHAR(100)'')`, as shown in Figure 4-9.


    ```sql

    WITH ALLELEMENTS

    AS

    (

    SELECT TOP 1 Demographics

    FROM Sales.Store

    )

    SELECT

    details.value(''local-name(..)[1]'', ''VARCHAR(100)'') AS ParentNodeName,

    details.value(''local-name(.)[1]'', ''VARCHAR(100)'') AS NodeName

    FROM ALLELEMENTS

    CROSS APPLY Demographics.nodes(''//*'') survey(details);

    Listing 4-33.

    Displaying all the elements from the XML data

    ```


    Results of retrieving all elements from XML data are shown in Figure 4-9.


    ![A435478_1_En_4_Fig9_HTML.jpg](A435478_1_En_4_Fig9_HTML.jpg)


    **Figure 4-9.** Resulting dynamically returning XML elements


    ## 4-8. Using Multiple CROSS APPLY Operators


    ### Problem


    You want to shred a typed XML column, but you want to navigate the XML using multiple
    `CROSS APPLY` operators.


    ### Solution


    In Recipe 4-5, "Navigating Typed XML Columns," I demonstrated how to shred a typed
    XML column with navigation `"../"`. Implementing multiple `CROSS APPLY` operators
    could provide an alternate to XML navigation, as shown in Listing 4-34.


    ```sql

    WITH XMLNAMESPACES(''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelManuInstructions''
    as df)

    SELECT ProductModelID,

    step.value(''fn:string(.)'', ''varchar(2000)'') AS StepInstruction,

    instruct.value(''@LocationID'', ''int'') AS LaborStation,

    instruct.value(''@LaborHours'', ''real'') AS LaborHours,

    instruct.value(''@LotSize'', ''int'') AS LotSize,

    instruct.value(''@MachineHours'', ''real'') AS MachineHours,

    instruct.value(''@SetupHours'', ''real'') AS SetupHours,

    step.value(''df:material[1]'', ''varchar(100) '') AS Material,

    step.value(''df:tool[1]'', ''varchar(100) '') AS Tool

    FROM Production.ProductModel

    CROSS APPLY Instructions.nodes(''df:root/df:Location'') prod(instruct)

    CROSS APPLY instruct.nodes(''df:step'') ins(step);

    Listing 4-34.

    Demonstrating multiple CROSS APPLY operator solution

    ```


    The query result is shown in Figure 4-10.


    ![A435478_1_En_4_Fig10_HTML.jpg](A435478_1_En_4_Fig10_HTML.jpg)


    **Figure 4-10.** Result of applying multiple CROSS APPLY operators


    ### How It Works


    The key to using multiple `CROSS APPLY` operators is applying one `CROSS APPLY`
    to the results of the second `CROSS APPLY`, as in our sample code:


    ```sql

    FROM Production.ProductModel

    CROSS APPLY Instructions.nodes(''df:root/df:Location'') prod(instruct)

    CROSS APPLY instruct.nodes(''df:step'') ins(step)

    ```


    The first `CROSS APPLY` references the `XML` Instruction column of the `ProductModel`
    table to create a base result set to feed to the second `CROSS APPLY`:


    ```sql

    CROSS APPLY Instructions.nodes(''df:root/df:Location'') prod(instruct)

    ```


    The second `CROSS APPLY` takes the results of the first `CROSS APPLY` via its
    `instruct` column alias:


    ```sql

    CROSS APPLY instruct.nodes(''df:step'') ins(step)

    ```


    Finally, the `SELECT` clause uses the `instruct` alias to retrieve the parent
    elements, and the `step` alias to reference child elements. The solutions in Recipes
    4-5 and 4-8 produce absolutely the same result set, but the syntax in the `SELECT`
    and `FROM` clauses is different.'
