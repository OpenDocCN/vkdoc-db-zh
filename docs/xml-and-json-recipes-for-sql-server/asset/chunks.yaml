  trans: '

    ## 4-3. 从列中分解 XML


    ### 问题


    分解前文（4-1 和 4-2 节）中展示的 XML 文档，是一个需要从一个 XML 值导航到另一个 XML 值的游标过程。你需要在不打开游标的情况下，跨表的列来分解
    XML。


    ### 解决方案


    4-1 和 4-2 节的方案基于一次分解一个 XML 变量的 XML 内容。然而，在许多情况下，我们需要跨整个表或至少跨多行来分解 XML，如清单 4-15
    所示。


    ```

    United Security

    BM

    Mountain

    ISDN

    ```

    清单 4-15. 显示来自表 `Sales.Store` 列 `Demographics` 的 XML


    `XML` 数据类型不仅允许你从 `XML` 变量分解 XML 数据，还允许直接从表中的 `XML` 类型列进行分解。清单 4-16 演示了如何查询 XML
    列。


    ```sql

    WITH XMLNAMESPACES(default ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT details.value(''AnnualSales[1]'', ''MONEY'') AS AnnualSales,

    details.value(''AnnualRevenue[1]'', ''MONEY'') AS AnnualRevenue,

    details.value(''BankName[1]'', ''VARCHAR(50)'') AS BankName,

    details.value(''BusinessType[1]'', ''VARCHAR(10)'') AS BusinessType,

    details.value(''YearOpened[1]'', ''INT'') AS YearOpened,

    details.value(''Specialty[1]'', ''VARCHAR(50)'') AS Specialty,

    details.value(''SquareFeet[1]'', ''INT'') AS SquareFeet,

    details.value(''Brands[1]'', ''VARCHAR(10)'') AS Brands,

    details.value(''Internet[1]'', ''VARCHAR(10)'') AS Internet,

    details.value(''NumberEmployees[1]'', ''SMALLINT'') AS NumberEmployees

    FROM Sales.Store

    CROSS APPLY Demographics.nodes(''StoreSurvey'') survey(details);

    ```

    清单 4-16. 显示从 XML 列返回结果集的 XQuery 代码


    结果如图 4-2 所示。


    ![A435478_1_En_4_Fig2_HTML.jpg](img/A435478_1_En_4_Fig2_HTML.jpg)

    图 4-2. XQuery 处理产生的结果


    ### 工作原理


    清单 4-17 中展示的来自表 `Sales.Store`、列 `Demographics` 的 XML 文档相对简单。该 XML 具有根元素 `<StoreSurvey>`，所有后续元素都是此
    XML 根的子元素。这是一个一级深度的 XML 结构。这种结构在生产环境中很常见，因为数据库设计者在可能的情况下倾向于为了性能原因而在列中保持简单的 XML
    结构。因此，要将 XML 数据转换为行，我们需要在 `nodes()` 方法中提供对根元素的引用。之后，`value()` 方法在单独的列中显示每个元素，如前面的图
    4-2 所示。


    为了在表的列上进行导航，SQL Server 2005 引入了两种运算符：

    1.  `CROSS APPLY` – 允许在外部表表达式返回的每一行上调用一个表值函数。在 `CROSS APPLY` 的上下文中，XML `nodes()`
    方法被视为表值函数。

    2.  `OUTER APPLY` - 等同于 `LEFT OUTER JOIN`，当结果集返回查询外部表表达式的所有行时。


    解决方案在清单 4-16 中，为查询实现了 `CROSS APPLY` 运算符。然而，`OUTER APPLY` 运算符会返回相同的结果集，因为 `Demographics`
    列中没有任何包含 `NULL` 值的行。


    让我们比较一下基于清单 4-17 中的 `XML` 变量分解 XML 值，与清单 4-15 中展示的表列分解之间的差异。


    ```sql

    DECLARE @x XML;

    SELECT @x = Demographics  FROM Sales.Store  WHERE BusinessEntityID = 292;

    WITH XMLNAMESPACES(default ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT details.value(''AnnualSales[1]'', ''MONEY'') AS AnnualSales,

    details.value(''AnnualRevenue[1]'', ''MONEY'') AS AnnualRevenue,

    details.value(''BankName[1]'', ''VARCHAR(50)'') AS BankName,

    details.value(''BusinessType[1]'', ''VARCHAR(10)'') AS BusinessType,

    details.value(''YearOpened[1]'', ''INT'') AS YearOpened,

    details.value(''Specialty[1]'', ''VARCHAR(50)'') AS Specialty,

    details.value(''SquareFeet[1]'', ''INT'') AS SquareFeet,

    details.value(''Brands[1]'', ''VARCHAR(10)'') AS Brands,

    details.value(''Internet[1]'', ''VARCHAR(10)'') AS Internet,

    details.value(''NumberEmployees[1]'', ''SMALLINT'') AS NumberEmployees

    FROM @x.nodes(''StoreSurvey'') survey(details);

    ```

    清单 4-17. 分解 XML 变量


    主要的 SQL 代码差异见清单 4-18。当我们在 `FROM` 子句中引用变量时，应用于变量的 `nodes()` 方法返回一个行集，该行集表示分解单个文档的结果。这与针对表的
    `CROSS APPLY` 相反，后者从表的每一行分解 XML 并生成一个单一的行集。清单 4-17 显示了分解 XML 变量和列之间的代码差异。


    ```sql

    FROM @x.nodes(''StoreSurvey '') survey(details);

    ```

    从变量分解 XML，并与以下对比：


    ```sql

    FROM Sales.Store CROSS APPLY Demographics.nodes(''StoreSurvey'') survey(details);

    ```

    从列分解 XML


    `SELECT` 子句对于变量和列分解过程是相同的。要检索元素值，`value()` 方法需要提供 XPath 路径，该路径指定了带有单例索引指示符的元素名称以及数据类型。例如：`details.value(''SquareFeet[1]'',
    ''INT'') AS SquareFeet.`


    在 `SELECT` 子句中列出列别名始终是一个好习惯。当缺少别名时我们不会收到错误，而且我个人更喜欢不收到带有默认列名“(无列名)”的结果。


    **注意**


    XML 元素和属性是区分大小写的；因此，当在 `value()` 方法中引用元素和属性时，其大小写必须与 XML 文档完全一致。否则，对于 XML 类型的列，解析器将抛出错误。例如，当元素
    `AnnualSales` 被指定为 `details.value(‘annualsales[1]’, ‘money’)` 时，你将收到错误：消息 2263，级别
    16，状态 1，第 2 行 XQuery `[Sales.Store.Demographics.value()]`: 在类型元素 “({ `http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey}:StoreSurvey,#anonymous`
    )” 中没有名为 “{ `http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey}:annualsales`
    ” 的元素。如果 XML 值将列存储为非类型化的 XML，那么错误指定项目的分解结果将是 `NULL`。这同样适用于 XML 变量。我不断警告读者注意 XML
    的大小写敏感性，因为这是 XQuery 新手最常见的错误。例如，当我们以小写、大写或混合大小写键入函数 `CASE` 时，SQL Server T-SQL
    不会引发任何错误。然而，XQuery 没有为我们提供这种便利，我们必须遵循大小写规则。但是，当 SQL Server 实例或数据库安装在任何类型的二进制排序规则下时，对象名称元数据（表、列等）是区分大小写的。


    ## 4-4. 处理遗留的 XML 存储


    ### 问题


    你想处理以 `XML` 以外的数据类型存储在表列中的 XML 数据。

    '
- fmt: '### 解决方案


    在过去的二十年里，SQL Server 发生了巨大的变化。其中最重大的改动之一是在 SQL Server 2005 中引入的。微软向 IT 市场推出了一款革命性的
    RDBMS 产品。`NTEXT`、`TEXT` 和 `IMAGE` 数据类型被弃用。然而，在遗留数据库中，XML 文档可能存储在 `VARCHAR`、`NVARCHAR`、`VARBINARY`、`IMAGE`、`TEXT`
    和 `NTEXT` 数据类型的列中。在这种情况下，必须将该列转换为 `XML` 数据类型。


    **注意**


    在某些情况下，你会将数据存储在非 XML 类型的列中，例如：XML 数据包含内部 DTD 或 ENTITY 声明；以及业务要求完全按照接收到的 XML 格式存储数据，包括不重要的空白字符。但是，`NTEXT`、`TEXT`
    和 `IMAGE` 数据类型不应被考虑。请使用 `VARCHAR`、`NVARCHAR`、`VARBINARY`。


    例如，SQL Server 继续使用 `IMAGE` 数据类型在 `msdb.dbo.sysssispackages` 表中存储 SSIS 包，如图 4-3
    所示。所有 SSIS 包都是 XML 文档。


    ![A435478_1_En_4_Fig3_HTML.jpg](A435478_1_En_4_Fig3_HTML.jpg)


    图 4-3


    展示 `msdb.dbo.sysssispackages` 结构


    让我们设定这个场景：你有一个任务，要找到所有通过 SQL Server 维护计划运行数据库备份的服务器，并列出计划中使用的所有数据库。对于几台服务器来说，这个任务很容易完成。但你还需要检查数百个
    SQL Server 实例。与其登录到每个实例并打开每个单独的维护计划，不如从 `sysssispackages` 表中拆解 `packagedata` 列，如代码清单
    4-18 所示，因为这是一个高效得多的过程。


    ```sql

    WITH XMLNAMESPACES (''www.microsoft.com/SqlServer/Dts'' AS DTS,

    ''www.microsoft.com/sqlserver/dts/tasks/sqltask'' AS SQLTask),

    Package

    AS

    (

    SELECT name,

    CAST(CAST(packagedata AS VARBINARY(MAX)) AS XML) AS package

    FROM msdb.dbo.sysssispackages

    WHERE packagetype = 6

    )

    SELECT Package.name as MaintenancePlanName,

    PKG.value(''@SQLTask:DatabaseName'', ''NVARCHAR(128)'')  AS DatabaseName,

    PKG.value(''(../@SQLTask:BackupDestinationAutoFolderPath)'', ''NVARCHAR(500)'')
    AS BackupDestinationFolderPath

    FROM Package

    CROSS APPLY package.nodes(''//DTS:ObjectData/SQLTask:SqlTaskData/SQLTask:SelectedDatabases'')
    SSIS(PKG);

    ```


    代码清单 4-18

    拆解 SSIS 包代码


    拆解 SQL Server 维护计划 SSIS 包的结果如图 4-4 所示。


    ![A435478_1_En_4_Fig4_HTML.jpg](A435478_1_En_4_Fig4_HTML.jpg)


    图 4-4


    拆解维护计划的结果


    ### 工作原理


    正如我在“解决方案”中提到的，`packagedata` 列是一个 `IMAGE` 数据类型，不能直接由 `nodes()` 方法处理。因此，必须将该列转换为
    `XML` 数据类型。这就是为什么解决方案查询包含一个 `XMLNAMESPACES` 声明块和一个名为 `Package` 的 CTE，用于将 `packagedata`
    列转换为 `XML` 数据类型以进行进一步拆解。


    这些 SQL 维护作业 SSIS 包包含两个命名空间，因此 `XMLNAMESPACES` 声明必须同时包含它们：


    1.  `''www.microsoft.com/SqlServer/Dts''` – `<dts:executable>` 顶层元素。

    2.  `''www.microsoft.com/sqlserver/dts/tasks/sqltask''` – `<SQLTask:SqlTaskData>`
    子元素。


    `Package` CTE 为 XQuery 拆解过程准备 `packagedata` 列。CTE 返回 SSIS 包的名称，并显式将 `packagedata`
    列转换为 `XML` 数据类型。`IMAGE` 数据类型无法显式转换为 `XML` 数据类型。第一步是显式将 `IMAGE` 数据类型转换为 `VARBINARY(MAX)`，后者可以转换为
    `XML`，例如：`CAST(CAST(packagedata AS VARBINARY(MAX)) AS XML)`。


    `packagetype` 列有五个可能的值。


    *   0 - 默认值

    *   1 - SQL Server 导入和导出向导

    *   3 - SQL Server 复制

    *   5 - SSIS 设计器

    *   6 - 维护计划设计器或向导


    在此示例中，我们专注于维护计划；因此，我们可以在 `WHERE` 子句中过滤结果为 `packagetype = 6`。


    解决方案查询的最后一部分拆解维护计划 XML 并交付结果集。在处理 `SELECT` 子句中的值之前，我们需要在 XML 数据中建立一个元素路径。当我们处理表和列时，`CROSS
    APPLY` 操作符有助于遍历这些值。`nodes()` 方法没有指向源元素的完整路径。SSIS XML 很大；因此，“//”提供了一个指向源元素的快捷路径，并在
    XML 文档中匹配表达式模式。你也可以在 `WHERE` 子句中使用前导通配符 “%”。元素路径 `//DTS:ObjectData/SQLTask:SqlTaskData/SQLTask:SelectedDatabases`
    告诉你忽略前导元素并匹配 XML 结构中最右侧的部分。请记住，`nodes()` 方法需要双部分别名，所以 `SSIS(PKG)` 是表（列）别名。


    `SELECT` 子句与 `Package.name` 列一起从 XML 数据中返回两个值，如示例 4-6 所示的部分 XML 所示：


    1.  `PKG.value(''@SQLTask:DatabaseName'', ''NVARCHAR(128)'') as DatabaseName`，是
    `SQLTask:SelectedDatabases` 元素的 `SQLTask:DatabaseName` 属性。要在 `value()` 方法中处理属性，“@”字符指示该值是属性，不需要单例。

    2.  `PKG.value(''(../@SQLTask:BackupDestinationAutoFolderPath)'', ''NVARCHAR(500)'')`
    可用作 `BackupDestinationFolderPath`。


    `SQLTask:BackupDestinationAutoFolderPath` 同样是一个属性。然而，`nodes()` 方法设置在 `SQLTask:SelectedDatabases`
    元素上，该元素是 `SQLTask:SqlTaskData` 元素的子元素。因此，要访问 `SQLTask:BackupDestinationAutoFolderPath`
    属性，我们需要向上移动一个 XML 层级到 `SQLTask:SqlTaskData` 元素。步骤操作符 “../” 完成了这个过程。


    ```xml

    <!-- 此处应为 Listing 4-19 的 XML 代码片段内容 -->

    ```


