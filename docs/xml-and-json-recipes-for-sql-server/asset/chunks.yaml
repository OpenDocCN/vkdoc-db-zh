    \ Problem\n\n你希望在存储大型 XML 文档的 XML 列上创建索引，但希望最小化索引的存储空间。"
  raw: "### How It Works\n\nA secondary value type index can improve the efficiency\
    \ of a XQuery when the path is not fully specified, or includes wildcards, for\
    \ example:\n\n*   //ELEMENT[ELEMENT = “Filter Condition”]\n*   /ELEMENT/@*[. =\
    \ “Filter Condition”]\n*   //ELEMENT[@ATTRIBUTE = “Filter Condition”]\n\nPractically\
    \ speaking, the secondary value type index improves query performance where the\
    \ predicate filter condition value is known. Listing [7-12](#A435478_1_En_7_Chapter.html#Par66)\
    \ demonstrates XQuery benefits from using a value index.\n\n```\nSELECT PersonID,\n\
    ref.value('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nTotalPurchaseYTD[1]', 'money') TotalPurchase,\nref.value('declare default element\
    \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nDateFirstPurchase[1]', 'date') DateFirstPurchase,\nref.value('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nYearlyIncome[1]', 'varchar(20)') YearlyIncome,\nref.value('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nOccupation[1]', 'varchar(15)') Occupation,\nref.value('declare default element\
    \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nCommuteDistance[1]', 'varchar(15)') CommuteDistance\nFROM PersonXML\nCROSS\
    \ APPLY Demographics.nodes('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\n/*[YearlyIncome=\"50001-75000\"]') dmg(ref);\nListing 7-12.\nShowing XQuery\
    \ benefits from utilizing a secondary value XML index\n```\n\nThe syntax to create\
    \ a secondary value type index has four components :\n\n```\nCREATE XML INDEX\
    \ \nON \n(    )\nUSING XML INDEX  FOR VALUE;\n```\n\nCaution\n\nAn ancestor-or-self\
    \ axis operator, for example XML_Column.nodes('//ELEMENT’, is a convenient way\
    \ to establish the path reference in the nodes() method. However, this technique\
    \ could slow down performance for an XML data type column where the XML instance\
    \ has deeply nested elements. This is one of the most common performance issues\
    \ in the XML shredding process. Therefore, I would recommend (when possible) to\
    \ provide a more detailed path within the nodes() method. For example, XML_Column.nodes(‘//ELEMENT/CHILD_ELMNT’)\
    \ could improve your XML shredding performance.\n\n## 7-4 Creating a Secondary\
    \ PROPERTY Type Index\n\n### Problem\n\nYou want to improve performance on an\
    \ XML column where XQuery retrieves one or more values from the column.\n\n###\
    \ Solution\n\nA secondary property type XML index can be beneficial if your XQuery\
    \ retrieves one or more values from an XML column. Listing [7-13](#A435478_1_En_7_Chapter.html#Par72)\
    \ creates our demonstration table we have used in Solutions 7-1, 7-2 and 7-3,\
    \ and creates the primary XML index on it.\n\n```\n-- These settings are important\
    \ when creating XML indexes\nSET NUMERIC_ROUNDABORT OFF;\nSET ARITHABORT ON;\n\
    SET ANSI_NULLS ON;\nSET ANSI_PADDING ON;\nSET ANSI_WARNINGS ON;\nSET CONCAT_NULL_YIELDS_NULL\
    \ ON;\nSET QUOTED_IDENTIFIER ON;\nGO\n-- Drop table SQL Server 2016 syntax\nDROP\
    \ TABLE IF EXISTS dbo.PersonXML\n-- Create and populate a table called PersonXML\n\
    CREATE TABLE dbo.PersonXML\n(\nPersonID INT NOT NULL,\nFirstName NVARCHAR(30)\
    \ NOT NULL,\nMiddleName NVARCHAR(20)NULL,\nLastName NVARCHAR(30) NOT NULL,\nDemographics\
    \ XML NULL,\nCONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED\n(\nPersonID ASC\n\
    )\n);\nGO\nINSERT dbo.PersonXML\n(\nPersonID,\nFirstName,\nMiddleName,\nLastName,\n\
    Demographics\n)\nSELECT BusinessEntityID,\nFirstName,\nMiddleName,\nLastName,\n\
    Demographics\nFROM Person.Person;\nGO\n-- Now create the Primary XML index on\
    \ the dbo.PersonXML table\nCREATE PRIMARY XML INDEX IX_PXML_PersonXML_Demographics\n\
    ON dbo.PersonXML\n(\nDemographics\n);\nGO\nListing 7-13.\nCreate sample table\
    \ with XML column and primary XML index\n```\n\nListing [7-14](#A435478_1_En_7_Chapter.html#Par74)\
    \ shows how to create a secondary property XML index. Figure [7-8](#A435478_1_En_7_Chapter.html#Fig8)\
    \ displays the created index .\n\n![A435478_1_En_7_Fig8_HTML.jpg](A435478_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8.\n\nConfirming the index was created\n\n```\nCREATE XML INDEX IX_XMLPROPERTY_PersonXML_Demographics\n\
    ON dbo.PersonXML\n(\nDemographics\n)\nUSING XML INDEX IX_PXML_PersonXML_Demographics\n\
    FOR PROPERTY;\nListing 7-14.\nCreating a secondary property XML index\n```\n\n\
    ### How It Works\n\nA secondary property type index can provide performance benefits\
    \ when querying an XML column that retrieves one or more values via the value()\
    \ method. Listing [7-15](#A435478_1_En_7_Chapter.html#Par76) demonstrates the\
    \ benefits of using XQuery when a PROPERTY index is present.\n\n```\nSELECT PersonID,\n\
    ref.value('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nTotalPurchaseYTD[1]', 'money') TotalPurchase,\nref.value('declare default element\
    \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nDateFirstPurchase[1]', 'date') DateFirstPurchase,\nref.value('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nYearlyIncome[1]', 'varchar(20)') YearlyIncome,\nref.value('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nOccupation[1]', 'varchar(15)') Occupation,\nref.value('declare default element\
    \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nCommuteDistance[1]', 'varchar(15)') CommuteDistance\nFROM PersonXML\nCROSS\
    \ APPLY Demographics.nodes('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nIndividualSurvey[TotalPurchaseYTD > 1000 and TotalPurchaseYTD < 1005\nand CommuteDistance\
    \ = \"0-1 Miles\"]') dmg(ref);\nListing 7-15.\nShowing the benefits of using XQuery\
    \ when a PROPERTY index is present\n```\n\nThe syntax to create the secondary\
    \ property XML index has four components:\n\n```\nCREATE XML INDEX \nON \n(  \
    \  )\nUSING XML INDEX  FOR PROPERTY;\n```\n\n## 7-5 Creating a Selective XML Index\n\
    \n### Problem\n\nYou want to create an XML index on an XML column that stores\
    \ large XML documents, but you want to minimize storage for the index."
  trans: "\n### 工作原理\n\n次级值类型索引可以在路径未完全指定或包含通配符时提升 XQuery 的效率，例如：\n\n*   `//ELEMENT[ELEMENT\
    \ = \"Filter Condition\"]`\n*   `/ELEMENT/@*[. = \"Filter Condition\"]`\n*   `//ELEMENT[@ATTRIBUTE\
    \ = \"Filter Condition\"]`\n\n实际上，次级值类型索引在谓词筛选条件值已知的情况下能提升查询性能。清单 7-12 展示了 XQuery\
    \ 如何从使用值索引中受益。\n\n```\nSELECT PersonID,\nref.value('declare default element namespace\
    \ \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nTotalPurchaseYTD[1]', 'money') TotalPurchase,\nref.value('declare default element\
    \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nDateFirstPurchase[1]', 'date') DateFirstPurchase,\nref.value('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nYearlyIncome[1]', 'varchar(20)') YearlyIncome,\nref.value('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nOccupation[1]', 'varchar(15)') Occupation,\nref.value('declare default element\
    \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nCommuteDistance[1]', 'varchar(15)') CommuteDistance\nFROM PersonXML\nCROSS\
    \ APPLY Demographics.nodes('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\n/*[YearlyIncome=\"50001-75000\"]') dmg(ref);\n清单 7-12.\n展示 XQuery 如何从利用次级值\
    \ XML 索引中受益\n```\n\n创建次级值类型索引的语法包含四个组成部分：\n\n```\nCREATE XML INDEX \nON \n(  \
    \  )\nUSING XML INDEX  FOR VALUE;\n```\n\n**Caution**\n\n祖辈或自身轴操作符，例如 `XML_Column.nodes('//ELEMENT'`)，是在\
    \ `nodes()` 方法中建立路径引用的便捷方式。然而，对于 XML 实例具有深层嵌套元素的 XML 数据类型列，此技术可能会降低性能。这是 XML 分解过程中最常见的性能问题之一。因此，我建议（在可能的情况下）在\
    \ `nodes()` 方法中提供更详细的路径。例如，`XML_Column.nodes('//ELEMENT/CHILD_ELMNT')` 可以提升你的\
    \ XML 分解性能。\n\n## 7-4 创建次级属性类型索引\n\n### 问题\n\n你希望提升从列中检索一个或多个值的 XML 列的性能。\n\n\
    ### 解决方案\n\n如果你的 XQuery 从 XML 列中检索一个或多个值，次级属性类型 XML 索引会很有帮助。清单 7-13 创建了我们在解决方案\
    \ 7-1、7-2 和 7-3 中使用的演示表，并在其上创建了主 XML 索引。\n\n```\n-- 这些设置在创建 XML 索引时很重要\nSET NUMERIC_ROUNDABORT\
    \ OFF;\nSET ARITHABORT ON;\nSET ANSI_NULLS ON;\nSET ANSI_PADDING ON;\nSET ANSI_WARNINGS\
    \ ON;\nSET CONCAT_NULL_YIELDS_NULL ON;\nSET QUOTED_IDENTIFIER ON;\nGO\n-- 删除表（SQL\
    \ Server 2016 语法）\nDROP TABLE IF EXISTS dbo.PersonXML\n-- 创建并填充一个名为 PersonXML\
    \ 的表\nCREATE TABLE dbo.PersonXML\n(\nPersonID INT NOT NULL,\nFirstName NVARCHAR(30)\
    \ NOT NULL,\nMiddleName NVARCHAR(20) NULL,\nLastName NVARCHAR(30) NOT NULL,\n\
    Demographics XML NULL,\nCONSTRAINT PK_PersonXML PRIMARY KEY CLUSTERED\n(\nPersonID\
    \ ASC\n)\n);\nGO\nINSERT dbo.PersonXML\n(\nPersonID,\nFirstName,\nMiddleName,\n\
    LastName,\nDemographics\n)\nSELECT BusinessEntityID,\nFirstName,\nMiddleName,\n\
    LastName,\nDemographics\nFROM Person.Person;\nGO\n-- 现在在 dbo.PersonXML 表上创建主 XML\
    \ 索引\nCREATE PRIMARY XML INDEX IX_PXML_PersonXML_Demographics\nON dbo.PersonXML\n\
    (\nDemographics\n);\nGO\n清单 7-13.\n创建带 XML 列的示例表及主 XML 索引\n```\n\n清单 7-14 展示了如何创建次级属性\
    \ XML 索引。图 7-8 展示了已创建的索引。\n\n![A435478_1_En_7_Fig8_HTML.jpg](img/A435478_1_En_7_Fig8_HTML.jpg)\n\
    \n图 7-8.\n\n确认索引已创建\n\n```\nCREATE XML INDEX IX_XMLPROPERTY_PersonXML_Demographics\n\
    ON dbo.PersonXML\n(\nDemographics\n)\nUSING XML INDEX IX_PXML_PersonXML_Demographics\n\
    FOR PROPERTY;\n清单 7-14.\n创建次级属性 XML 索引\n```\n\n### 工作原理\n\n次级属性类型索引可以在通过 `value()`\
    \ 方法检索一个或多个值的 XML 列查询时提供性能优势。清单 7-15 展示了当存在 `PROPERTY` 索引时，使用 XQuery 的优势。\n\n\
    ```\nSELECT PersonID,\nref.value('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nTotalPurchaseYTD[1]', 'money') TotalPurchase,\nref.value('declare default element\
    \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nDateFirstPurchase[1]', 'date') DateFirstPurchase,\nref.value('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nYearlyIncome[1]', 'varchar(20)') YearlyIncome,\nref.value('declare default\
    \ element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nOccupation[1]', 'varchar(15)') Occupation,\nref.value('declare default element\
    \ namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nCommuteDistance[1]', 'varchar(15)') CommuteDistance\nFROM PersonXML\nCROSS\
    \ APPLY Demographics.nodes('declare default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nIndividualSurvey[TotalPurchaseYTD > 1000 and TotalPurchaseYTD < 1005\nand CommuteDistance\
    \ = \"0-1 Miles\"]') dmg(ref);\n清单 7-15.\n展示当存在 PROPERTY 索引时使用 XQuery 的优势\n```\n\
    \n创建次级属性 XML 索引的语法包含四个组成部分：\n\n```\nCREATE XML INDEX \nON \n(    )\nUSING XML\
    \ INDEX  FOR PROPERTY;\n```\n\n## 7-5 创建选择性 XML 索引\n\n### 问题\n\n你希望在存储大型 XML 文档的\
    \ XML 列上创建索引，但希望最小化索引的存储空间。\n"
- fmt: '### Solution


    A selective XML index is designed to improve XQuery performance and XML index
    storage for an XML column that stores large XML documents. Listing [7-16](#A435478_1_En_7_Chapter.html#Par81)
    creates a new sample table with an untyped XML column, populates it with sample
    XML data, and creates a selective XML index on it. Figure [7-9](#A435478_1_En_7_Chapter.html#Fig9)
    displays the created index.


    ![A435478_1_En_7_Fig9_HTML.jpg](A435478_1_En_7_Fig9_HTML.jpg)

    Figure 7-9. Confirming the selective XML index was created for the ProductXML
    table


    ```sql

    -- These settings are important when creating a table with XML columns and XML
    indexes

    SET NUMERIC_ROUNDABORT OFF;

    SET ARITHABORT ON;

    SET ANSI_NULLS ON;

    SET ANSI_PADDING ON;

    SET ANSI_WARNINGS ON;

    SET CONCAT_NULL_YIELDS_NULL ON;

    SET QUOTED_IDENTIFIER ON;

    GO

    -- Drop table SQL Server 2016 syntax

    DROP TABLE IF EXISTS dbo.ProductXML

    -- Create demo table with an XML column

    CREATE TABLE dbo.ProductXML

    (

    ProductID INT NOT NULL,

    Name NVARCHAR(50) NOT NULL,

    ProductNumber NVARCHAR(25) NOT NULL,

    ProductDetails XML NULL

    CONSTRAINT PK_ProductXML_ProductID PRIMARY KEY CLUSTERED

    (

    ProductID ASC

    )

    );

    GO

    -- Populate table with sample XML data

    INSERT INTO dbo.ProductXML

    (

    ProductID,

    Name,

    ProductNumber,

    ProductDetails

    )

    SELECT Product2.ProductId,

    Product2.Name,

    Product2.ProductNumber,

    (

    SELECT ProductCategory.Name AS "Category/CategoryName",

    (

    SELECT DISTINCT Location.Name "text()", '', cost rate $'',

    Location.CostRate "text()"

    FROM Production.ProductInventory Inventory

    INNER JOIN Production.Location Location

    ON Inventory.LocationID = Location.LocationID

    WHERE Product.ProductID = Inventory.ProductID

    FOR XML PATH(''LocationName''), TYPE

    ) AS "Locations/node()",

    Subcategory.Name AS "Category/Subcategory/SubcategoryName",

    Product.Name AS "Category/Subcategory/Product/ProductName",

    Product.Color AS "Category/Subcategory/Product/Color",

    Inventory.Shelf AS "Category/Subcategory/Product/ProductLocation/Shelf",

    Inventory.Bin AS "Category/Subcategory/Product/ProductLocation/Bin",

    Inventory.Quantity AS "Category/Subcategory/Product/ProductLocation/Quantity"

    FROM Production.Product Product

    LEFT JOIN Production.ProductInventory Inventory

    ON Product.ProductID = Inventory.ProductID

    LEFT JOIN Production.ProductSubcategory Subcategory

    ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

    LEFT JOIN Production.ProductCategory

    ON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID

    WHERE Product.ProductID = Product2.ProductId

    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name

    FOR XML PATH(''Categories''), ROOT(''Products''), ELEMENTS, TYPE

    )

    FROM Production.Product Product2;

    GO

    -- Create the selective XML index

    CREATE SELECTIVE XML INDEX IX_SELECTIVE_XML_ProductXML

    ON dbo.ProductXML

    (

    ProductDetails

    )

    FOR

    (

    Quantity = ''/Products/Categories/Category/Subcategory/Product/ProductLocation/Quantity'',

    ProductName = ''/Products/Categories/Category/Subcategory/Product/ProductName''

    );

    GO

    ```

    Listing 7-16. Creating a selective XML index'
