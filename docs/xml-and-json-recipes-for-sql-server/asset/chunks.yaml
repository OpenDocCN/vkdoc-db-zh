    图 6-6. 展示 Tel.Number 元素层级


    `nodes()` 方法针对 `Tel.Number` 元素的完全限定 XQuery 路径表达式在代码清单 [6-9](#A435478_1_En_6_Chapter.html#Par58)
    中演示。


    ```

    WITH XMLNAMESPACES

    (

    N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/Resume'' AS
    ns

    )

    SELECT

    .

    .

    .

    FROM HumanResources.JobCandidate

    CROSS APPLY Resume.nodes

    (''/ns:Resume/ns:Address/ns:Addr.Telephone/ns:Telephone/ns:Tel.Number'')

