    Listing 7-26.

    Altering selective XML index

    ```


    ### How It Works


    The ALTER INDEX statement can be used on the selective XML index to change the
    index contents. It is possible to drop an existing path using the REMOVE keyword
    and a new path can be added by using the ADD keyword within the FOR() clause,
    as demonstrated in Listing [7-26](#A435478_1_En_7_Chapter.html#Par128). You can
    combine the ADD and REMOVE keywords as we did in Listing [7-26](#A435478_1_En_7_Chapter.html#Par128),
    or they can be issued in individual ALTER INDEX statements, as shown in Listing
    [7-27](#A435478_1_En_7_Chapter.html#Par130).


    ```

    ALTER INDEX IX_SELECTIVE_XML_ProductXML

    ON dbo.ProductXML

    FOR

    (

    ADD CategoryName = ''/Products/Categories/Category/CategoryName''

    );

    GO

    ALTER INDEX IX_SELECTIVE_XML_ProductXML

    ON ProductXML

    FOR

    (

    REMOVE Quantity

    );

    GO

    Listing 7-27.

    Altering selective index with separate ALTER INDEX statements

    ```


    Each ALTER INDEX statement rebuilds the entire index. Therefore, for efficiency
    reasons, it is more practical to implement a list of changes in a single ALTER
    INDEX statement instead of running the ALTER INDEX statement multiple times.


    To drop a selective XML index, use the DROP INDEX statement, as shown in Listing
    Sample [7-28](#A435478_1_En_7_Chapter.html#Par133).


    ```

    DROP INDEX IX_SELECTIVE_XML_ProductXML

    ON dbo.ProductModelXML;

    Listing 7-28.

    Dropping a selective XML index

    ```


    Note


    Keep in mind, similarly to the primary XML index, when the selective XML index
    is dropped, all associated secondary selective XML indexes are dropped automatically.


    ## Wrapping up


    This chapter completes the XML section of the book. I hope that you learned a
    lot from the recipes provided in the XML portion.


    If you practice the solutions in the XML chapters then you should able to build
    XML, shred XML instances, load XML documents from different sources, utilize XML-based
    searches via XQuery statements, and create XML indexes.


    The upcoming section will introduce JSON and demonstrate SQL Server 2016’s integration
    with new JSON features.


    # Part II

    JSON in SQL Server


    # 8. Constructing JSON


    Welcome to Part II of this book. Part II will cover JSON for SQL Server, which
    was introduced in SQL Server 2016\. JSON has many similarities to XML; however,
    they are not the same. JSON can be thought of as a “fat-free” version of XML.
    To run the samples for Part II, make sure that the database compatibility level
    in SQL Server 2016 is set to 130. The sample database for Part II is WideWorldImporters.
    Please use the following link to download the database: [`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0?utm_source=MyTechMantra.com`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0?utm_source=MyTechMantra.com)
