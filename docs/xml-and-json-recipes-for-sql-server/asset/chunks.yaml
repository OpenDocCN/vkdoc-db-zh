- fmt: '# JSON Introduction


    JSON 是 “JavaScript Object Notation” 的首字母缩写，发音为 “Jason”。它旨在成为一种更易于解读和紧凑的解决方案，用于表示复杂的数据结构并促进系统间的数据交换。


    将 JSON 与 XML 比较时，选择 JSON 有许多优势：


    *   与 XML 不同，JSON 不使用完整的标记结构，这使其更紧凑。

    *   JSON 不是一种数据类型（至少对于 SQL Server 2016 而言）。SQL Server 将 JSON 表示为类似于 `nvarchar(max)`
    的字符串。Microsoft 建议将 JSON 存储为 `nvarchar(max)`。

    *   JSON 易于解析和构建。

    *   JSON 数据结构易于理解。

    *   JSON 是 NoSQL 数据库（如 CouchDB、MongoDB 等）的原生文件结构。


    JSON 模型格式有两个块：


    *   对象（Objects） - 用大括号 `{}` 包裹。一个空对象 `{}` 被视为有效的 JSON 数据。列表 [8-1](#A435478_1_En_8_Chapter.html#Par12)：`TopObject`
    是一个对象块。

    *   数组（Arrays） - 用方括号 `[]` 包裹。一个空数组 `[]` 也被视为有效的 JSON 数据。列表 [8-1](#A435478_1_En_8_Chapter.html#Par12)：`arrayOfObjects`
    和 `arrayOfValues` 是数组块。


    ```

    {

    "TopObject": {

    "numericKey": 2016,

    "stringKey": "a text value",

    "nullKey": null,

    "booleanKey": true,

    "dateKey": "2017-11-14"

    },

    "arrayOfObjects": [

    {"item": 1},

    {"item": 2},

    {"item": 3}

    ] ,

    "arrayOfValues": [

    "SQL",

    "XML",

    "JSON"

    ]

    }

    Listing 8-1.

    展示 JSON 结构

    ```


    一个 JSON 成员由一个键值对 `{"key": "value"}` 表示。成员的键必须包含在双引号内。键在对象的结构中必须是唯一的。成员的字符串类型和日期类型值需要包含在双引号内。布尔值和数值不应包含在双引号内。但是，当布尔值使用
    `true` 或 `false` 字面量时，这些值应为小写。表 [8-1](#A435478_1_En_8_Chapter.html#Tab1) 演示了 SQL
    Server 数据类型与 JSON 之间的数据类型转换。


    带有前导零的数字被视为字符串。因此，它们必须包含在双引号内。对象的每个成员和数组的每个值后面都必须跟一个逗号，但最后一个键值对除外。


    表 8-1.


    展示从 SQL Server 到 JSON 的数据类型转换


    | 类别 | SQL 类型 | JSON 类型 |

    | --- | --- | --- |

    | `字符和字符串类型` | `nvarchar, varchar, nchar, char` | `string` |

    | `数值类型` | `int, bigint, float, decimal, numeric` | `number` |

    | `位类型` | `bit` | `Boolean (true or false)` |

    | `日期和时间类型` | `date, datetime, datetime2, time, datetimeoffset` | `string` |

    | `CLR 类型` | `geometry, geography (except hierarchyid)` | `不支持。这些类型会返回错误。将数据转换或转换为受支持的
    JSON 类型，或在 SELECT 列表中使用 CLR 属性或方法 – 例如，任何 CLR 类型的 `ToString()`，或 `geometry` 类型的
    `STAsText()`。数据类型 `hierarchyid` 不需要显式转换。` |

    | `其他类型` | `uniqueidentifier, money, varbinary, binary, timestamp, rowversion`
    | `string` |


    表 [8-2](#A435478_1_En_8_Chapter.html#Tab2) 展示了 XML 和 JSON 数据及其解析方法的并排比较。


    表 8-2.


    比较 XML 和 JSON


    | XML 示例 | JSON 示例 |

    | --- | --- |

    | `<employees>` `<employee>` `<firstName>Bill</firstName>` `<lastName>Adams</lastName>`
    `</employee>` `<employee>` `<firstName>John</firstName>` `<lastName>Smith</lastName>`
    `</employee>` `<employee>` `<firstName>Peter</firstName>` `<lastName>White</lastName>`
    `</employee>` `</employees>` | `{"employees":` `[` `{"firstName":"Bill", "lastName":"Adams"},`
    `{"firstName":"John", "lastName":"Smith"},` `{"firstName":"Peter", "lastName":"White"}`
    `]` `}` |

    | `XML 解析方法` | `JSON 解析方法` |

    | `Declare @x XML =` `''<employees>` `<employee>` `<firstName>Bill</firstName>`
    `<lastName>Adams</lastName>` `</employee>` `<employee>` `<firstName>John</firstName>`
    `<lastName>Smith</lastName>` `</employee>` `<employee>` `<firstName>Peter</firstName>`
    `<lastName>White</lastName>` `</employee>` `</employees>'';` `SELECT` `c.value(''firstName[1]'',
    ''varchar(30)'')  AS firstName` `,c.value(''lastName[1]'', ''varchar(30)'') AS
    lastName` `FROM @x.nodes(''//employee'') t(c);` | `declare @j nvarchar(max) =`
    `''{"employees":` `[` `{"firstName":"Bill", "lastName":"Adams"},` `{"firstName":"John",
    "lastName":"Smith"},` `{"firstName":"Peter", "lastName":"White"}` `]` `}'';` `SELECT
    firstName, lastName` `FROM OPENJSON (@j, ''$.employees'')` `WITH` `(` `firstName
    varchar(30),` `lastName varchar(30)` `);` |

    | `XML 结果` | `JSON 结果` |

    | ![A435478_1_En_8_Figa_HTML.jpg](A435478_1_En_8_Figa_HTML.jpg) | ![A435478_1_En_8_Figb_HTML.jpg](A435478_1_En_8_Figb_HTML.jpg)
    |


    SQL Server 提供了四个内置函数和 `SELECT` 查询的 `FOR JSON` 子句来处理和创建 JSON 文档，如表 [8-3](#A435478_1_En_8_Chapter.html#Tab3)
    所示。


    与 XML 方法不同，JSON 函数不区分键（key）。但是，当在 JSON 函数以及 `ToString()` 和 `STAsText()` CLR 函数中引用时，键成员仍然是区分大小写的。


    表 8-3.


    描述 JSON 内置函数


    | JSON 过程 | 过程类型 | 描述 |

    | --- | --- | --- |

    | `FOR JSON` | 子句 | 构建 JSON 文档。 |

    | `ISJSON()` | 函数 | 验证字符串是否具有有效的 JSON。 |

    | `JSON_VALUE()` | 函数 | 从 JSON 文档中检索标量值。 |

    | `JSON_QUERY()` | 函数 | 从 JSON 文档中检索对象或数组。 |

    | `JSON_MODIFY()` | 函数 | 修改 JSON 文档。 |

    | `OPENJSON()` | 表值函数 | 将 JSON 文档转换为包含行和列的表格式。 |


    本书第二部分提供了适用于 SQL Server 的 JSON 食谱。


    ## 8-1. 使用 AUTO 模式构建 JSON


