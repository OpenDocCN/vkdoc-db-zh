- fmt: '### How It Works


    SQL Server XQuery 可以通过在 `nodes()` 方法中为源元素添加前导双斜杠来缩短对源元素的引用，例如 `Resume.nodes(‘//ns:Tel.Number’)`。这里
    “//” 是 XQuery 路径步骤 “`descendant-or-self::node()`” 的快捷方式。当搜索 `nodes()` 方法所操作的 XML
    数据中包含的所有元素时，XQuery 引擎会使用这种方式。


