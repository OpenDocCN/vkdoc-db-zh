  trans: "### 工作原理\n\n存储过程 `usp_WriteXMLFile`（如清单 3-1 所示）包含几个重要组件，以实现在 SQL Server\
    \ 内部成功创建 XML 文件。让我们分解这个存储过程，来了解 XML 文件写入过程是如何工作的：\n\n1.  参数 `@FilePath` 是 XML\
    \ 文件的目标路径。该参数使得存储过程非常灵活，尤其是在不同环境（如开发、预演和生产环境）中运行时。\n2.  `CREATE` 一个全局临时表 (`##XML`)，最后再\
    \ `DROP` 它。使用一个名为 `XMLHolder`、数据类型为 `XML` 的列来获取 `XML` 数据。需要创建全局临时表的情况比较少见；然而，如果引用了会话级临时表，`BCP`\
    \ 命令将会报错。因此，我们可以使用永久表或全局临时表。如果过程属于并发进程的一部分，那么使用全局临时表总是存在风险。全局临时表在整个服务器范围内可见，如果其他人碰巧同时使用该存储过程，某个用户的表可能会被覆盖，从而导致结果不准确。请参考第\
    \ 3 章的代码示例，其中存储过程 `usp_WriteXMLFileDynamicTable` 演示了如何解决此问题。\n3.  将 `XML` 数据 `INSERT`\
    \ 到全局临时表 (`##XML`) 中。\n4.  要从存储过程或 SSMS 运行 `BCP` 命令，服务器实例需要配置 `xp_cmdshell` 选项值为\
    \ 1。这意味着实例允许运行 `xp_cmdshell` 扩展存储过程。有些情况下，出于安全原因，可能要求将服务器实例的配置保持为值 0（禁用状态）。在这种情况下，你仍然需要编写代码，在创建\
    \ XML 文件时将服务器实例从值 0 切换到 1，然后再切换回 0。由于 `BCP` 命令能够在毫秒级内创建 XML 文件，因此在服务器设置为值 0 以启用\
    \ `xp_cmdshell` 存储过程来创建 XML 文件的这几毫秒内，实际上没有安全风险。\n    *   为了保留原始设置，创建了表变量 `@cmd`。\n\
    \    *   系统存储过程 `sp_configure` 使用参数值 `'xp_cmdshell'`。该结果被插入到表变量 `@cmd` 中，它反映了\
    \ `'xp_cmdshell'` 选项的当前状态。\n    *   以下语句 `SELECT @run_value = run_value FROM @cmd`\
    \ 将局部变量 `@run_value` 赋值，以保存 `xp_cmdshell` 选项的 `run_value` 供进一步分析。\n    *   条件语句\
    \ `IF @run_value = 0` 检测是否需要将选项值从 0 更改为 1。\n5.  创建变量 `@SQL` 来组合 `BCP` 实用程序的语句。\n\
    6.  最终的命令取决于实例和数据库名称，可能如下所示：\n\n    让我们更仔细地看看 `BCP` 创建 XML 文件所需的所有参数和开关：\n   \
    \ *   `BCP` – 批量复制实用程序的可执行文件名。\n    *   `##XML` – 包含 XML 数据的表名。\n    *   `out`\
    \ – 指示从表中复制数据并将其发送到目标。\n    *   `\"C:\\TEMP\\Categories_20170310_164701.xml\"\
    ` – 文件路径。\n    *   `-S \"APRESS\\SQL2016\"` – 服务器名称。\n    *   `-T` – 指定 `BCP`\
    \ 命令在受信任的连接下运行。要使用 SQL Server 凭据运行 `BCP`，请使用 `-U login_Name -P password` 选项代替\
    \ `-T`。\n    *   `-c` – 指定输出内容为字符数据类型。**注意** 以短横线开头的 `BCP` 参数区分大小写。例如，`-T` 是用于受信任连接的选项；而\
    \ `-t` 是字段终止符。\n    语句 `exec master..xp_cmdshell @SQL` 运行 `BCP` 命令。\n    语句 `IF\
    \ @run_value = 0` 条件检测是否需要将选项值从 1 改回 0。\n    为了完成流程，应该销毁 `##XML` 表。\n\n```sql\n\
    IF (OBJECT_ID('tempdb..##XML') IS NOT NULL)\nDROP TABLE ##XML;\n```\n\n```cmd\n\
    BCP ##XML out \"C:\\TEMP\\Categories_20170310_164701.xml\" -S \"APRESS\\SQL2016\"\
    \ -T -c\n```\n\n要测试存储过程，请运行以下代码：\n\n```sql\nDECLARE @x XML\nSET @x = (\nSELECT\
    \ ProductCategory.Name AS \"Category/CategoryName\",\n(\nSELECT DISTINCT Location.Name\
    \ \"text()\", ', cost rate $',\nLocation.CostRate \"text()\"\nFROM Production.ProductInventory\
    \ Inventory\nINNER JOIN Production.Location Location\nON Inventory.LocationID\
    \ = Location.LocationID\nWHERE Product.ProductID = Inventory.ProductID\nFOR XML\
    \ PATH('LocationName'), TYPE\n) AS \"Locations/node()\",\nSubcategory.Name AS\
    \ \"Category/Subcategory/SubcategoryName\",\nProduct.Name AS \"Category/Subcategory/Product/ProductName\"\
    ,\nProduct.Color AS \"Category/Subcategory/Product/Color\",\nInventory.Shelf AS\
    \ \"Category/Subcategory/Product/ProductName/@Shelf\",\nInventory.Bin AS \"Category/Subcategory/Product/ProductName/@Bin\"\
    ,\nInventory.Quantity AS \"Category/Subcategory/Product/ProductName/@Quantity\"\
    \nFROM Production.Product Product\nINNER JOIN Production.ProductInventory Inventory\n\
    ON Product.ProductID = Inventory.ProductID\nINNER JOIN Production.ProductSubcategory\
    \ Subcategory\nON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\n\
    INNER JOIN Production.ProductCategory\nON Subcategory.ProductCategoryID = ProductCategory.ProductCategoryID\n\
    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name\nFOR XML PATH('Categories'),\
    \ ELEMENTS XSINIL, ROOT('Products')\n)\nEXECUTE usp_WriteXMLFile @x, 'C:\\TEMP'\n\
    ```\n\n当存储过程 `usp_WriteXMLFile` 执行完成后，`BCP` 实用程序会返回完成状态及运行时间（以毫秒为单位）。如图 3-1 所示，我创建\
    \ XML 文件的运行时间是 15 毫秒。XML 文件创建在 `C:\\TEMP` 目录中。图 3-1 展示了 `BCP` 实用程序的输出。\n\n![A435478_1_En_3_Fig1_HTML.jpg](img/A435478_1_En_3_Fig1_HTML.jpg)\n\
    **图 3-1.** 显示 `BCP` 实用程序完成状态\n\n如果需要隐藏完成输出状态，则在执行 `xp_cmdshell` 扩展存储过程之前，向存储过程中添加以下代码：\n\
    \n```sql\nDECLARE @stat TABLE\n(\nBCPStat VARCHAR(500)\n);\nINSERT INTO @stat\n\
    (\nBCPStat\n)\nEXECUTE master..xp_cmdshell @SQL;\n```\n\n`@stat` 表变量吸收了 `BCP`\
    \ 的完成输出；因此存储过程不会返回任何消息。\n\n**注意**\n“3-1 从 SQL 将 XML 结果存储到文件中”和“3-3 从存储过程加载 XML”这两个方案都实现了\
    \ `xp_cmdshell` 扩展存储过程。`xp_cmdshell` 存储过程存在安全风险，这就是它默认在 SQL Server 中被禁用的原因。这两个方案都实现了\
    \ `xp_cmdshell`，其逻辑是自我检测并开关，以最小化安全风险。但是，如果由于任何原因，你在使用 `xp_cmdshell` 时遇到问题，请考虑采用方案“3-5\
    \ 实现 CLR 解决方案”作为 `xp_cmdshell` 的替代方案。\n\n## 3-2. 从 SSIS 包创建 XML\n\n### 问题\n\n\
    你想要开发一个替代使用 `BCP` 实用程序从结果集创建 XML 文件的方法？"
- fmt: '# Solution


    The BCP utility is a handy legacy command-line utility, but SSIS is Microsoft’s
    standard ETL solution. The SSIS package can provide a comprehensive solution for
    the data transformation processes. SSIS provides at least three options to perform
    the task of creating an XML file:


    1.  `Script Task`

    2.  `Flat File Destination`

    3.  `Export Column` transform


    Each of those options is relatively easy to complete; however, my preference is
    `Script Task`. I have several arguments to defend my preference:


    *   `Script Task` is an easy and fast solution for file manipulation.

    *   In a few lines of code (either C# or VB.NET), you can provide the task solution
    (even if you don’t have any .NET knowledge, simply copy provided code).

    *   Easy and productive debugging process.

    *   With the `Script Task`, you have full control over the process.


    ## SSIS Package Creation


    For a complete SSIS solution, we need to create three Control Flow tasks:


    1.  An `Execute SQL Task` called “Get XML Content,” to obtain the XML result from
    the database.

    2.  Set an expression for the `TimeStamp` variable to get date and time for the
    XML file name.

    3.  A `Script Task` named “Create XML File,” to write the XML file to the destination.


    Figure [3-2](#A435478_1_En_3_Chapter.html#Fig2) illustrates a simple SSIS package
    control flow.


    ![A435478_1_En_3_Fig2_HTML.jpg](A435478_1_En_3_Fig2_HTML.jpg)


    *Figure 3-2. Showing SSIS package.*


    To create the SSIS package, create a New Integration Services Project. Name the
    package `CreateXMLFile`, and save the project. Then from the `Tool Box` drag and
    drop the `Execute SQL Task` onto the package designer pane. If the `Tool Box`
    does not show up for your new project, press the button in the upper-right corner,
    as shown in Figure [3-3](#A435478_1_En_3_Chapter.html#Fig3).


    ![A435478_1_En_3_Fig4_HTML.jpg](A435478_1_En_3_Fig4_HTML.jpg)


    *Figure 3-4. Variables option of the pop-up context menu.*


    We need to create three package-level variables. To create a variable, right-mouse
    click on an empty area of the designer pane. On the pop-up menu select “Variables”
    to load the `Variables` dialog, as shown in Figure [3-4](#A435478_1_En_3_Chapter.html#Fig4).


    ![A435478_1_En_3_Fig3_HTML.jpg](A435478_1_En_3_Fig3_HTML.jpg)


    *Figure 3-3. Showing Tool Box button location.*


    In the `Variables` dialog:


    *   Click the “Add Variable” button.

    *   Type the variable name.

    *   Choose the appropriate data type (in our case, choose the `String` data type).

    *   Provide the variable default when needed.

    *   Also, make sure that the variable has SSIS Package Scope.


    Figure [3-5](#A435478_1_En_3_Chapter.html#Fig5) illustrates the `Variables` Form
    entries.


    ![A435478_1_En_3_Fig5_HTML.jpg](A435478_1_En_3_Fig5_HTML.jpg)


    *Figure 3-5. Showing the Variables Form entries.*


    **Tip:** It’s good practice to utilize variables in place of hard-coded values
    so you can have more flexibility when executing a package.


    The variables above are created, and below is a description of their purpose:


    ![A435478_1_En_3_Fig6_HTML.jpg](A435478_1_En_3_Fig6_HTML.jpg)


    *Figure 3-6. Showing steps to Configure OLE DB Connection Form.*


    *   `FileDestinationPath` – to specify the destination folder. This variable can
    be modified outside of the package, practically providing the parameter functionality.

    *   `TimeStamp` – to obtain the file name time stamp.

    *   `XMLData_Content` – to store the XML result that will be written to the file.


    ## Configuring Execute SQL Task


    Once the variables are created, we can place and configure the `Execute SQL Task`
    “Get XML Content.” From the `Tool Box`, drag and drop the `Execute SQL Task` onto
    the designer surface. To configure the `Execute SQL Task` you can either double-click
    on the task or right-click it and select “Edit…” from the context menu. When the
    `Execute SQL Task Editor` shows up, we are ready to configure the task. The task
    configuration requires the following:


    1.  First, we need to create or select an existing `Connection` to SQL Server.
    On the `Execute SQL Task Editor`, select `General` from the Editor options list
    located on the left side.

    2.  Click `Connection`.

    3.  On the right side select the drop-down arrow.

    4.  Click on `<New connection>` to open the `Connection` dialog, or select an
    existing connection. Figure [3-6](#A435478_1_En_3_Chapter.html#Fig6) illustrates
    the steps to select an existing connection, or call the `Configure OLE DB Connection
    Form`.


    Configure the `OLE DB Connection Form` by clicking the “New…” button. In the `Connection
    Manager` dialog:


    ![A435478_1_En_3_Fig7_HTML.jpg](A435478_1_En_3_Fig7_HTML.jpg)


    *Figure 3-7. Showing the Connection Manager Form configuration steps.*


    1.  Select or enter the source server name from the `Server name` drop-down list.

    2.  From the “Log on to the server” option, select the type of authentication.

    3.  From the “Connect to a database” option, select the database name.

    4.  Optionally, but recommended, click the `Test Connection` button to confirm
    your configuration. Figure [3-7](#A435478_1_En_3_Chapter.html#Fig7) illustrates
    the `Connection Manager` dialog configuration steps.


    ## Configuring SQL Statement


    Once the connection is ready, the next step is to add the SQL query. Under the
    `Connection` property, check the `SQLSourceType` property. By default, the value
    is `Direct input`, but double-check that `Direct input` is selected. One of the
    most important properties is `SQLStatement`. We will take the query that was demonstrated
    in Chapter [2](#A435478_1_En_2_Chapter.html) for this example. To configure the
    `SQLStatement` property, simply add the query from the Listing [3-2](#A435478_1_En_3_Chapter.html#Par77)
    SQL query for SSIS package.


    ```sql

    SELECT ProductCategory.Name AS "Category/CategoryName",

    (

    SELECT DISTINCT Location.Name "text()", '', cost rate $'',

    Location.CostRate "text()"

    FROM Production.ProductInventory Inventory

    INNER JOIN Production.Location Location

    ON Inventory.LocationID = Location.LocationID

    WHERE Product.ProductID = Inventory.ProductID

    FOR XML PATH(''LocationName''), TYPE

    ) AS "Locations/node()",

    Subcategory.Name AS "Category/Subcategory/SubcategoryName",

    Product.Name AS "Category/Subcategory/Product/ProductName",

    Product.Color AS "Category/Subcategory/Product/Color",

    Inventory.Shelf AS "Category/Subcategory/Product/ProductName/@Shelf",

    Inventory.Bin AS "Category/Subcategory/Product/ProductName/@Bin",

    Inventory.Quantity AS "Category/Subcategory/Product/ProductName/@Quantity"

    FROM Production.Product Product

    INNER JOIN Production.ProductInventory Inventory

    ON Product.ProductID = Inventory.ProductID

    INNER JOIN Production.ProductSubcategory Subcategory

    ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

    INNER JOIN Production.ProductCategory

    ON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID

    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name

    FOR XML PATH(''Categories''), ELEMENTS XSINIL, ROOT(''Products'');

    ```


    *Listing 3-2. Listing Categories query for SSIS package.*


    Finally, on the `General` menu, set the `ResultSet` property to `XML`. Figure
    [3-8](#A435478_1_En_3_Chapter.html#Fig8) shows the `General` menu configurations.


    ![A435478_1_En_3_Fig8_HTML.jpg](A435478_1_En_3_Fig8_HTML.jpg)


    *Figure 3-8.*'
  raw: "### Solution\n\nThe BCP utility is a handy legacy command-line utility, but\
    \ SSIS is Microsoft’s standard ETL solution.The SSIS package can provide a comprehensive\
    \ solution for the data transformation processes. SSIS provides at least three\
    \ options to perform the task of creating an XML file:\n\n1.  Script task  \n\
    2.  Flat File Destination  \n3.  Export Column transform\n\nEach of those options\
    \ is relatively easy to complete; however, my preference is Script Task. I have\
    \ several arguments to defend my preference:\n\n*   Script Task is an easy and\
    \ fast solution for file manipulation.\n*   In a few lines of code (either C#\
    \ or VB.NET), you can provide the task solution (even if you don’t have any .NET\
    \ knowledge, simply copy provided code).\n*   Easy and productive debugging process.\n\
    *   With the Script Task, you have full control over the process.\n\nFor a complete\
    \ SSIS solution, we need to create three Control Flow tasks :\n\n1.  An Execute\
    \ SQL Task called “Get XML Content,” to obtain the XML result from the database.\
    \  \n2.  Set an expression for the TimeStamp variable to get date and time for\
    \ the XML file name .  \n3.  A Script Task named “Create XML File,” to write the\
    \ XML file to the destination.\n\nFigure [3-2](#A435478_1_En_3_Chapter.html#Fig2)\
    \ Illustrates a simple SSIS package control flow.\n\n![A435478_1_En_3_Fig2_HTML.jpg](A435478_1_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2.\n\nShowing SSIS package\n\nTo create the SSIS package, create a\
    \ New Integration Services Project. Name the package CreateXMLFile, and save the\
    \ project. Then from the Tool Box drag and drop the Execute SQL Task onto the\
    \ package designer pane. If the Tool Box does not show up for your new project,\
    \ press the button in the upper-right corner, as shown in Figure [3-3](#A435478_1_En_3_Chapter.html#Fig3).\n\
    \n![A435478_1_En_3_Fig4_HTML.jpg](A435478_1_En_3_Fig4_HTML.jpg)\n\nFigure 3-4.\n\
    \nVariables option of the pop-up context menu\n\n1.  We need to create three package-level\
    \ variables. To create a variable, right-mouse click on an empty area of the designer\
    \ pane. On the pop-up menu select “Variables” to load the Variables dialog, as\
    \ shown in Figure [3-4](#A435478_1_En_3_Chapter.html#Fig4).\n\n![A435478_1_En_3_Fig3_HTML.jpg](A435478_1_En_3_Fig3_HTML.jpg)\n\
    \nFigure 3-3.\n\nShowing Tool Box button location\n\nIn the Variables dialog:\n\
    \n*   Click the “Add Variable” button.\n*   Type the variable name.\n*   Choose\
    \ the appropriate data type (in our case, choose the String data type).\n*   Provide\
    \ the variable default when needed.\n*   Also, make sure that the variable has\
    \ SSIS Package Scope.\n\nFigure [3-5](#A435478_1_En_3_Chapter.html#Fig5) Illustrates\
    \ the Variables Form entries.\n\n![A435478_1_En_3_Fig5_HTML.jpg](A435478_1_En_3_Fig5_HTML.jpg)\n\
    \nFigure 3-5.\n\nShowing the Variables Form entries Tip\n\nIt’s good practice\
    \ to utilize variables in place of hard-coded values so you can have more flexibility\
    \ when executing a package.\n\nThe variables above are created, and below is a\
    \ description of their purpose:\n\n![A435478_1_En_3_Fig6_HTML.jpg](A435478_1_En_3_Fig6_HTML.jpg)\n\
    \nFigure 3-6.\n\nShowing steps to Configure OLE DB Connection Form\n\n*   FileDestinationPath\
    \ – to specify the destination folder. This variable can be modified outside of\
    \ the package, practically providing the parameter functionality.\n*   TimeStamp\
    \ – to obtain the file name time stamp.\n*   XMLData_Content – to store the XML\
    \ result that will be written to the file.\n*   Once the variables are created,\
    \ we can place and configure the Execute SQL Task “Get XML Content.” From the\
    \ Tool Box, drag and drop the Execute SQL Task onto the designer surface. To configure\
    \ the Execute SQL Task you can either double-click on the task or right-click\
    \ it and select “Edit…” from the context menu. When the Execute SQL Task Editor\
    \ shows up, we are ready to configure the task. The task configuration requires\
    \ the following:\n    1.  First, we need to create or select an existing Connection\
    \ to SQL Server. On the Execute SQL Task Editor, select General from the Editor\
    \ options list located on the left side.  \n    2.  Click Connection .  \n   \
    \ 3.  On the right side select the drop-down arrow.  \n    4.  Click on <New connection>\
    \ to open the Connection dialog, or select an existing connection. Figure [3-6](#A435478_1_En_3_Chapter.html#Fig6)\
    \ illustrates the steps to select an existing connection, or call the Configure\
    \ OLE DB Connection Form.\n\nConfigure the OLE DB Connection Form by clicking\
    \ the “New…” button. In the Connection Manager dialog:\n\n![A435478_1_En_3_Fig7_HTML.jpg](A435478_1_En_3_Fig7_HTML.jpg)\n\
    \nFigure 3-7.\n\nShowing the Connection Manager Form configuration steps\n\n1.\
    \  Select or enter the source server name from the Server name drop-down list.\
    \  \n2.  From the “Log on to the server” option, select the type of authentication.\
    \  \n3.  From the “Connect to a database” option, select the database name  \n\
    4.  Optionally, but recommended, click the Test Connection button to confirm your\
    \ configuration. Figure [3-7](#A435478_1_En_3_Chapter.html#Fig7) illustrates the\
    \ Connection Manager dialog configuration steps.\n\nOnce the connection is ready,\
    \ the next step is to add the SQL query. Under the Connection property, check\
    \ the SQLSourceType property. By default, the value is Direct input, but double-check\
    \ that Direct input is selected. One of the most important properties is SQLStatement.\
    \ We will take the query that was demonstrated in Chapter [2](#A435478_1_En_2_Chapter.html)\
    \ for this example. To configure the SQLStatement property, simply add the query\
    \ from the Listing [3-2](#A435478_1_En_3_Chapter.html#Par77) SQL query for SSIS\
    \ package.\n\n```\nSELECT ProductCategory.Name AS \"Category/CategoryName\",\n\
    (\nSELECT DISTINCT Location.Name \"text()\", ', cost rate $',\nLocation.CostRate\
    \ \"text()\"\nFROM Production.ProductInventory Inventory\nINNER JOIN Production.Location\
    \ Location\nON Inventory.LocationID = Location.LocationID\nWHERE Product.ProductID\
    \ = Inventory.ProductID\nFOR XML PATH('LocationName'), TYPE\n) AS \"Locations/node()\"\
    ,\nSubcategory.Name AS \"Category/Subcategory/SubcategoryName\",\nProduct.Name\
    \ AS \"Category/Subcategory/Product/ProductName\",\nProduct.Color AS \"Category/Subcategory/Product/Color\"\
    ,\nInventory.Shelf AS \"Category/Subcategory/Product/ProductName/@Shelf\",\nInventory.Bin\
    \ AS \"Category/Subcategory/Product/ProductName/@Bin\",\nInventory.Quantity AS\
    \ \"Category/Subcategory/Product/ProductName/@Quantity\"\nFROM Production.Product\
    \ Product\nINNER JOIN Production.ProductInventory Inventory\nON Product.ProductID\
    \ = Inventory.ProductID\nINNER JOIN Production.ProductSubcategory Subcategory\n\
    ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\nINNER JOIN\
    \ Production.ProductCategory\nON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name\nFOR XML PATH('Categories'),\
    \ ELEMENTS XSINIL, ROOT('Products');\nListing 3-2.\nListing Categories query for\
    \ SSIS package\n```\n\nFinally, on the General menu, set the ResultSet property\
    \ to XML. Figure [3-8](#A435478_1_En_3_Chapter.html#Fig8) shows the General menu\
    \ configurations .\n\n![A435478_1_En_3_Fig8_HTML.jpg](A435478_1_En_3_Fig8_HTML.jpg)\n\
    \nFigure 3-8."
  trans: '

    # 解决方案


    BCP 实用工具是一个方便的旧式命令行实用工具，但 SSIS 是 Microsoft 的标准 ETL 解决方案。SSIS 包可以为数据转换过程提供全面的解决方案。SSIS
    至少提供三个选项来执行创建 XML 文件的任务：


    1.  `脚本任务`

    2.  `平面文件目标`

    3.  `导出列` 转换


    这些选项中的每一个都相对容易完成；然而，我的偏好是 `脚本任务`。我有几个论据来支持我的偏好：


    *   `脚本任务` 是进行文件操作的简便快速的解决方案。

    *   只需几行代码（无论是 C# 还是 VB.NET），你就可以提供任务解决方案（即使你没有任何 .NET 知识，只需复制提供的代码即可）。

    *   调试过程轻松高效。

    *   使用 `脚本任务`，你可以完全控制整个过程。


    ## SSIS 包创建


    为了获得完整的 SSIS 解决方案，我们需要创建三个控制流任务：


    1.  一个名为“获取 XML 内容”的 `执行 SQL 任务`，用于从数据库获取 XML 结果。

    2.  为 `TimeStamp` 变量设置表达式，以获取用于 XML 文件名的日期和时间。

    3.  一个名为“创建 XML 文件”的 `脚本任务`，用于将 XML 文件写入目标位置。


    图 3-2 展示了一个简单的 SSIS 包控制流。


    ![A435478_1_En_3_Fig2_HTML.jpg](img/A435478_1_En_3_Fig2_HTML.jpg)


    *图 3-2. 显示 SSIS 包。*


    要创建 SSIS 包，请新建一个 Integration Services 项目。将包命名为 `CreateXMLFile` 并保存项目。然后从 `工具箱`
    将 `执行 SQL 任务` 拖放到包设计器窗格上。如果 `工具箱` 在你的新项目中没有显示，请按下图 3-3 所示右上角的按钮。


    ![A435478_1_En_3_Fig4_HTML.jpg](img/A435478_1_En_3_Fig4_HTML.jpg)


    *图 3-4. 弹出上下文菜单的“变量”选项。*


    我们需要创建三个包级别的变量。要创建变量，请在设计器窗格的空白区域单击鼠标右键。在弹出菜单中选择“变量”以加载 `变量` 对话框，如图 3-4 所示。


    ![A435478_1_En_3_Fig3_HTML.jpg](img/A435478_1_En_3_Fig3_HTML.jpg)


    *图 3-3. 显示工具箱按钮位置。*


    在 `变量` 对话框中：


    *   单击“添加变量”按钮。

    *   键入变量名称。

    *   选择适当的数据类型（在我们的例子中，选择 `String` 数据类型）。

    *   在需要时提供变量默认值。

    *   另外，请确保该变量具有 SSIS 包作用域。


    图 3-5 展示了 `变量` 表单条目。


    ![A435478_1_En_3_Fig5_HTML.jpg](img/A435478_1_En_3_Fig5_HTML.jpg)


    *图 3-5. 显示变量表单条目。*


    **提示：** 良好的做法是使用变量代替硬编码的值，这样在执行包时可以有更大的灵活性。


    以上变量已创建，下面描述了它们的用途：


    ![A435478_1_En_3_Fig6_HTML.jpg](img/A435478_1_En_3_Fig6_HTML.jpg)


    *图 3-6. 显示配置 OLE DB 连接表单的步骤。*


    *   `FileDestinationPath` – 用于指定目标文件夹。此变量可以在包外部修改，实际上提供了参数功能。

    *   `TimeStamp` – 用于获取文件名时间戳。

    *   `XMLData_Content` – 用于存储将要写入文件的 XML 结果。


    ## 配置执行 SQL 任务


    创建变量后，我们就可以放置和配置名为“获取 XML 内容”的 `执行 SQL 任务`。从 `工具箱` 中将 `执行 SQL 任务` 拖放到设计器表面。要配置
    `执行 SQL 任务`，你可以双击该任务，或右键单击它并从上下文菜单中选择“编辑…”。当 `执行 SQL 任务编辑器` 显示出来时，我们就可以开始配置任务了。任务配置需要以下步骤：


    1.  首先，我们需要创建或选择一个现有的到 SQL Server 的 `连接`。在 `执行 SQL 任务编辑器` 中，从左侧的编辑器选项列表中选择 `常规`。

    2.  单击 `连接`。

    3.  在右侧选择下拉箭头。

    4.  单击 `<新建连接>` 以打开 `连接` 对话框，或选择现有连接。图 3-6 展示了选择现有连接或调用 `配置 OLE DB 连接表单` 的步骤。


    通过单击“新建…”按钮配置 `OLE DB 连接表单`。在 `连接管理器` 对话框中：


    ![A435478_1_En_3_Fig7_HTML.jpg](img/A435478_1_En_3_Fig7_HTML.jpg)


    *图 3-7. 显示连接管理器表单配置步骤。*


    1.  从 `服务器名称` 下拉列表中选择或输入源服务器名称。

    2.  在“登录到服务器”选项中，选择身份验证类型。

    3.  在“连接到数据库”选项中，选择数据库名称。

    4.  可选但建议的操作是，单击 `测试连接` 按钮以确认你的配置。图 3-7 展示了 `连接管理器` 对话框配置步骤。


    ## 配置 SQL 语句


    连接准备好后，下一步是添加 SQL 查询。在 `连接` 属性下，检查 `SQLSourceType` 属性。默认情况下，该值为 `直接输入`，但请再次确认选中了
    `直接输入`。最重要的属性之一是 `SQLStatement`。在本示例中，我们将采用第 2 章中演示的查询。要配置 `SQLStatement` 属性，只需添加清单
    3-2 中用于 SSIS 包的 SQL 查询。


    ```sql

    SELECT ProductCategory.Name AS "Category/CategoryName",

    (

    SELECT DISTINCT Location.Name "text()", '', cost rate $'',

    Location.CostRate "text()"

    FROM Production.ProductInventory Inventory

    INNER JOIN Production.Location Location

    ON Inventory.LocationID = Location.LocationID

    WHERE Product.ProductID = Inventory.ProductID

    FOR XML PATH(''LocationName''), TYPE

    ) AS "Locations/node()",

    Subcategory.Name AS "Category/Subcategory/SubcategoryName",

    Product.Name AS "Category/Subcategory/Product/ProductName",

    Product.Color AS "Category/Subcategory/Product/Color",

    Inventory.Shelf AS "Category/Subcategory/Product/ProductName/@Shelf",

    Inventory.Bin AS "Category/Subcategory/Product/ProductName/@Bin",

    Inventory.Quantity AS "Category/Subcategory/Product/ProductName/@Quantity"

    FROM Production.Product Product

    INNER JOIN Production.ProductInventory Inventory

    ON Product.ProductID = Inventory.ProductID

    INNER JOIN Production.ProductSubcategory Subcategory

    ON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID

    INNER JOIN Production.ProductCategory

    ON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID

    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name

    FOR XML PATH(''Categories''), ELEMENTS XSINIL, ROOT(''Products'');

    ```


    *清单 3-2. SSIS 包的查询清单（列出类别）。*


    最后，在 `常规` 菜单上，将 `结果集` 属性设置为 `XML`。图 3-8 显示了 `常规` 菜单配置。


    ![A435478_1_En_3_Fig8_HTML.jpg](img/A435478_1_En_3_Fig8_HTML.jpg)


    *图 3-8.*

