    OPENJSON(…) WITH(…) block. The new JSON instance will stand along a sub-object
    JSON. The solution demonstrated is a database independent process that can run
    on any database with COMPATIBILITY_LEVEL = 130 or higher. The complete solution
    is demonstrated in Listing [9-21](#A435478_1_En_9_Chapter.html#Par97). The final
    query result is shown in Figure [9-9](#A435478_1_En_9_Chapter.html#Fig9).


    ![A435478_1_En_9_Fig9_HTML.jpg](A435478_1_En_9_Fig9_HTML.jpg)


    Figure 9-9.


    Showing final result


    ```

    SET NOCOUNT ON;

