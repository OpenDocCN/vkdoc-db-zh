    `SELECT` 子句与 `Package.name` 列一起从 XML 数据中返回两个值，如示例 4-6 所示的部分 XML 所示：


    1.  `PKG.value(''@SQLTask:DatabaseName'', ''NVARCHAR(128)'') as DatabaseName`，是
    `SQLTask:SelectedDatabases` 元素的 `SQLTask:DatabaseName` 属性。要在 `value()` 方法中处理属性，“@”字符指示该值是属性，不需要单例。

    2.  `PKG.value(''(../@SQLTask:BackupDestinationAutoFolderPath)'', ''NVARCHAR(500)'')`
    可用作 `BackupDestinationFolderPath`。


    `SQLTask:BackupDestinationAutoFolderPath` 同样是一个属性。然而，`nodes()` 方法设置在 `SQLTask:SelectedDatabases`
    元素上，该元素是 `SQLTask:SqlTaskData` 元素的子元素。因此，要访问 `SQLTask:BackupDestinationAutoFolderPath`
    属性，我们需要向上移动一个 XML 层级到 `SQLTask:SqlTaskData` 元素。步骤操作符 “../” 完成了这个过程。


    ```xml

