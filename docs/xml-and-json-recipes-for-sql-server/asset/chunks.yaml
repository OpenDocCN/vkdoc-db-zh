    **清单 9-12.** 演示超出字符限制的文本如何影响 `JSON_VALUE()` 函数输出


    > **注意**

    >

    > 当 JSON 键包含无效字符（如空格）时，键必须用双引号 (`“”`) 括起来。例如，当键是 `Last Name` 时，路径参数将是：

