    EXECUTE master..xp_cmdshell @SQL;\n```\n\nThe @stat table variable absorbs the\
    \ BCP completion output; therefore the stored procedure does not return any messages.\n\
    \nNote\n\nBoth Recipes “3-1 Storing XML Result in a File from SQL” and “3-3 Loading\
    \ XML from a Stored Procedure” implement the xp_cmdshell extended stored procedure.\
    \ The xp_cmdshell stored procedure is associated with security risk, which is\
