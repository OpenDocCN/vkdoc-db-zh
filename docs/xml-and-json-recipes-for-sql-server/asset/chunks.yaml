- fmt: "### How It Works\n\n`modify()`方法实现了`replace value of`语句，用于更新XML实例元素的值。当XML数据类型在SQL\
    \ Server 205中引入时，许多DBA和SQL Server开发者感到困惑（至少我认识的所有SQL Server专业人员都是如此）。我们原本期待一个名为“update”之类的指令；然而，`replace\
    \ value of`指令却用于更新XML实例的元素和属性。之前的配方为我们提供了`insert`指令的多种“变体”，这在实践上是正确的。插入过程对XML实例有很多选项。与插入相比，更新XML实例元素相当直接。要修改XML实例元素值，你需要以下步骤：\n\
    \n1.  指定`modify()`方法的`replace value of`语句。\n2.  左括号，提供指向XML元素的XPath路径；为目标元素实现`text()`函数；闭合括号并指定单例。\n\
    3.  在`with`关键字后，用双引号指定新的元素值。\n\n例如：\n\n```\nmodify('replace value of\n(/Root/ProductDescription/Features/Color/text())[1]\n\
    with \"Black\"')\n```\n\n## 5-8. 更新XML属性值\n\n### Problem\n\n你想更新XML实例中某个属性的值。\n\
    \n### Solution\n\n更新XML实例属性的解决方案与更新元素相对接近。然而，更新属性有一些特定之处，如清单[5-12](#A435478_1_En_5_Chapter.html#Par113)所示。`ProductName`属性的值从“Road\
    \ Bike”被修改为“Mountain Bike”。\n\n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription\
    \ ProductName=\"Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n\
    \    <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n    <Feature>Strong\
    \ long lasting</Feature>\n  </Features>\n</ProductDescription>\n';\nSET @XMLDoc.modify('replace\
    \ value of\n(/Root/ProductDescription/@ProductName)[1] with \"Mountain Bike\"\
    ');\nSELECT @XMLDoc;\n```\n\n清单 5-12. 更新 `ProductName` 属性\n\n结果如图[5-8](#A435478_1_En_5_Chapter.html#Fig8)所示。\n\
    \n![A435478_1_En_5_Fig8_HTML.jpg](A435478_1_En_5_Fig8_HTML.jpg)\n\n图 5-8. 属性 `ProductName`\
    \ 值更新后的结果展示\n\n### How It Works\n\n更新XML实例属性与更新元素没有太大区别。要修改XML实例属性值，你需要：\n\n1.\
    \  指定`modify()`方法的`replace value of`语句。\n2.  指向要更新的XML属性的XPath路径，属性名前加上`@`符号，并用括号括起来。XPath路径必须是单例节点。\n\
    3.  在`with`关键字后，用双引号指定新的属性值。\n\n修改元素和属性的主要区别在于，属性必须以`@`符号为前缀，并且更新属性不需要`text()`节点测试。\n\
    \n## 5-9. 删除XML属性\n\n### Problem\n\n你想从XML属性中删除一个属性。\n\n### Solution\n\n在`modify()`方法中使用`delete`语句，如清单[5-13](#A435478_1_En_5_Chapter.html#Par122)所示。\n\
    \n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription ProductName=\"\
    Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n  \
    \  <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n    <Feature>Strong\
    \ long lasting</Feature>\n  </Features>\n</ProductDescription>\n';\nSET @XMLDoc.modify('delete\
    \ /Root/ProductDescription/@ProductName')\nSELECT @XMLDoc;\n```\n\n清单 5-13. 从XML实例中删除\
    \ `ProductName` 属性\n\n结果如图[5-9](#A435478_1_En_5_Chapter.html#Fig9)所示。\n\n![A435478_1_En_5_Fig9_HTML.jpg](A435478_1_En_5_Fig9_HTML.jpg)\n\
    \n图 5-9. 从XML实例中删除属性后的结果\n\n### How It Works\n\n删除属性的语法比更新属性的语法更简单。要从XML实例中删除属性，`modify()`方法需要`delete`语句和指向该属性的XPath路径。记住属性以`@`符号为前缀。此外，`ProductDescription`元素在XML文档中是唯一的，因此这种情况下不需要单例。例如：\n\
    \n```\nmodify('delete /Root/ProductDescription/@ProductName')\n```\n\n在需要移除元素所有属性的情况下，XPath应包含目标元素路径后跟`/@*`，如清单[5-14](#A435478_1_En_5_Chapter.html#Par127)所示。\n\
    \n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription ProductName=\"\
    Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n  \
    \  <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n    <Feature>Strong\
    \ long lasting</Feature>\n  </Features>\n</ProductDescription>\n';\nSET @XMLDoc.modify('delete\
    \ /Root/ProductDescription/@*')\nSELECT @XMLDoc;\n```\n\n清单 5-14. 删除 `ProductDescription`\
    \ 元素的所有属性\n\n结果如图[5-10](#A435478_1_En_5_Chapter.html#Fig10)所示。\n\n![A435478_1_En_5_Fig10_HTML.jpg](A435478_1_En_5_Fig10_HTML.jpg)\n\
    \n图 5-10. `<ProductDescription>` 元素所有属性被删除后的结果展示\n\n## 5-10. 删除XML元素\n\n### Problem\n\
    \n你想从XML实例中删除一个元素。\n\n### Solution\n\n从XML实例中移除元素的机制与移除属性非常相似。从示例XML中删除`Color`元素的解决方案在清单[5-15](#A435478_1_En_5_Chapter.html#Par131)中演示。\n\
    \n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription ProductName=\"\
    Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n  \
    \  <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n    <Feature>Strong\
    \ long lasting</Feature>\n  </Features>\n</ProductDescription>\n';\nSET @XMLDoc.modify('delete\
    \ /Root/ProductDescription/Features/Color')\nSELECT @XMLDoc;\n```\n\n清单 5-15.\
    \ 从XML实例中删除 `Color` 元素\n\n结果如图[5-11](#A435478_1_En_5_Chapter.html#Fig11)所示。\n\n\
    ![A435478_1_En_5_Fig11_HTML.jpg](A435478_1_En_5_Fig11_HTML.jpg)\n\n图 5-11. 从XML实例中删除\
    \ `Color` 元素后的结果\n\n### How It Works\n\n要从XML实例中删除元素，`modify()`方法指定`delete`语句和指向目标元素的XPath路径。当XML中有多个同名元素时，删除特定元素需要单例，例如：\n\
    \n```\n<Color>Aluminium</Color>\n<Color>Silver</Color>\n<Color>Blue</Color>\n\
    <Feature>Strong long lasting</Feature>\nmodify('delete /Root/ProductDescription/Features/Color[1]')\n\
    ```\n\n删除后的结果是`<Color>Silver</Color>`消失，`<Color>Blue</Color>`保留。\n\n要从父元素中删除所有子元素，XPath应指向父元素加上`/*`，如清单[5-16](#A435478_1_En_5_Chapter.html#Par137)所示。\n\
    \n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription ProductName=\"\
    Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n  \
    \  <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n    <Feature>Strong\
    \ long lasting</Feature>\n  </Features>\n</ProductDescription>\n';\nSET @XMLDoc.modify('delete\
    \ /Root/ProductDescription/Features/*')\nSELECT @XMLDoc;\n```\n\n清单 5-16. 从 `Features`\
    \ 元素中删除所有子元素\n\n结果如图[5-12](#A435478_1_En_5_Chapter.html#Fig12)所示。\n\n![A435478_1_En_5_Fig12_HTML.jpg](A435478_1_En_5_Fig12_HTML.jpg)\n\
    \n图 5-12. `Features` 元素所有子元素被删除后的XML结果\n\n要删除注释、处理指令，甚至是元素内的文本，你可以将节点测试与`delete`一起使用，如清单[5-17](#A435478_1_En_5_Chapter.html#Par140)所示。结果如图[5-13](#A435478_1_En_5_Chapter.html#Fig13)所示。\n\
    \n![A435478_1_En_5_Fig13_HTML.jpg](A435478_1_En_5_Fig13_HTML.jpg)\n\n图 5-13. 删除结果展示\n\
    \n```\nDECLARE @XMLDoc xml;\nSET @XMLDoc =\n'\n<ProductDescription ProductName=\"\
    Road Bike\">\n  <Features>\n    <Feature>1 year parts and labor</Feature>\n  \
    \  <Feature>Aluminium</Feature>\n    <Feature>Silver</Feature>\n    <Feature>Strong\
    \ long lasting</Feature>\n  </Features>\n</ProductDescription>\n';\nSET @XMLDoc.modify('delete\
    \ (/Root/ProductDescription/Features/comment())[1]');\nSET @XMLDoc.modify('delete\
    \ (/Root/ProductDescription/Features/Color/text())[1]');\nSET @XMLDoc.modify('delete\
    \ (/Root/ProductDescription/Features/processing-instruction())[1]');\nSELECT @XMLDoc;\n\
    ```\n\n清单 5-17. 使用节点测试删除其他类型的XML节点\n\n## Summary\n\n`modify()`方法为操作XML实例的节点提供了全面的解决方案。这些指令：\n\
    \n*   `insert`\n*   `replace value of`\n*   `delete`\n\n这些指令能够以相对简单的语法修改XML实例中的任何元素和属性。\n\
    \n在下一章中，配方将涵盖如何高效地过滤XML。"
  raw: '### How It Works


    The modify() method implements the replace value of statement to update an XML
    instance element value. When the XML data type was introduced in SQL Server 2005,
    many DBAs and SQL Server Developers were puzzled, at least all SQL Server professionals
    that I know. We expected a directive name of “update” or so; however, the replace
    value of directive updates the XML instance elements and attributes. Previous
    recipes provided us with many “flavors” of the insert directive, which is practically
    correct. The insert process has many options for XML instances. Compared to insert,
    updating an XML instance element is fairly straightforward. To modify the XML
    instance element value, you need the following:


    1.  Specify the modify() method replace value of statement.  

    2.  Opening parenthesis, provide the XPath path to the XML element; implement
    the text() function for the target element; and closing the parenthesis and specifying
    the singleton.  

    3.  After the with keyword, specify a new element value in double quotes .  


    For example:


    ```

    modify(''replace value of

    (/Root/ProductDescription/Features/Color/text())[1]

    with "Black"'')

    ```


    ## 5-8\. Updating XML Attribute Value


    ### Problem


    You want to update the value of an attribute in an XML instance.


    ### Solution


    Updating an XML instance attribute solution is relatively close to updating the
    element. However, updating the attribute has some specifics that are demonstrated
    in Listing [5-12](#A435478_1_En_5_Chapter.html#Par113). The attribute ProductName
    value is modified from “Road Bike” to “Mountain Bike.”


    ```

    DECLARE @XMLDoc xml;

    SET @XMLDoc =

    ''


    1 year parts and labor

    Aluminium

    Silver

    Strong long lasting


    '';

    SET @XMLDoc.modify(''replace value of

    (/Root/ProductDescription/@ProductName)[1] with "Mountain Bike"'');

    SELECT @XMLDoc;

    Listing 5-12.

    Updating ProductName attribute

    ```


    The result is shown in Figure [5-8](#A435478_1_En_5_Chapter.html#Fig8).


    ![A435478_1_En_5_Fig8_HTML.jpg](A435478_1_En_5_Fig8_HTML.jpg)


    Figure 5-8.


    Showing the results when the attribute ProductName value is updated


    ### How It Works


    Updating an XML instance attribute is not much different from updating an element.
    To modify the XML instance attribute value, you need to:


    1.  Specify the modify() method replace value of statement.  

    2.  The XPath path to the XML attribute you want to update with the @ symbol preceding
    the attribute name, wrapped in parentheses. The XPath path must be a singleton
    node.  

    3.  After the with keyword, specify a new attribute value in double quotes.  


    The major difference between modifying the element and attribute is that the attribute
    must be prefixed with an @ symbol and the text() node test is not needed to update
    the attribute .


    ## 5-9\. Deleting an XML Attribute


    ### Problem


    You want to delete an attribute from an XML attribute.


    ### Solution


    Use the delete statement in the modify() method, as shown in Listing [5-13](#A435478_1_En_5_Chapter.html#Par122).


    ```

    DECLARE @XMLDoc xml;

    SET @XMLDoc =

    ''


    1 year parts and labor

    Aluminium

    Silver

    Strong long lasting


    '';

    SET @XMLDoc.modify(''delete /Root/ProductDescription/@ProductName'')

    SELECT @XMLDoc;

    Listing 5-13.

    Deleting the ProductName attribute from an XML instance

    ```


    The result is shown in Figure [5-9](#A435478_1_En_5_Chapter.html#Fig9).


    ![A435478_1_En_5_Fig9_HTML.jpg](A435478_1_En_5_Fig9_HTML.jpg)


    Figure 5-9.


    Result of deleting attribute from an XML instance


    ### How It Works


    The syntax to delete an attribute is simpler than the syntax to update an attribute.
    To delete an attribute from an XML instance, the modify() method needs the delete
    statement and an XPath path to the attribute. Just remember the attribute is prefixed
    by the “@” symbol. Also, the ProductDescription element is unique within the XML
    document, therefore no singleton needed in such a case. For example:


    ```

    modify(''delete /Root/ProductDescription/@ProductName'')

    ```


    In the case when you need to remove all attributes from an element, the XPath
    should have the destination element path followed by “/@*”, as shown in Listing
    [5-14](#A435478_1_En_5_Chapter.html#Par127).


    ```

    DECLARE @XMLDoc xml;

    SET @XMLDoc =

    ''


    1 year parts and labor

    Aluminium

    Silver

    Strong long lasting


    '';

    SET @XMLDoc.modify(''delete /Root/ProductDescription/@*'')

    SELECT @XMLDoc;

    Listing 5-14.

    Deleting all attributes of the ProductDescription element

    ```


    The result is shown in Figure [5-10](#A435478_1_En_5_Chapter.html#Fig10).


    ![A435478_1_En_5_Fig10_HTML.jpg](A435478_1_En_5_Fig10_HTML.jpg)


    Figure 5-10.


    Showing the results when all attributes are deleted from the <ProductDescription>
    element


    ## 5-10\. Deleting an XML Element


    ### Problem


    You want to delete an element from an XML instance.


    ### Solution


    The mechanism for removing an element from an XML instance is very similar to
    removing an attribute. The solution to delete the Color element from our sample
    XML is demonstrated in Listing [5-15](#A435478_1_En_5_Chapter.html#Par131).


    ```

    DECLARE @XMLDoc xml;

    SET @XMLDoc =

    ''


    1 year parts and labor

    Aluminium

    Silver

    Strong long lasting


    '';

    SET @XMLDoc.modify(''delete /Root/ProductDescription/Features/Color)

    SELECT @XMLDoc;

    Listing 5-15.

    Deleting the Color element from an XML instance

    ```


    The result is shown in Figure [5-11](#A435478_1_En_5_Chapter.html#Fig11).


    ![A435478_1_En_5_Fig11_HTML.jpg](A435478_1_En_5_Fig11_HTML.jpg)


    Figure 5-11.


    Result of deleting the Color element from an XML instance


    ### How It Works


    To delete an element from an XML instance, the modify() method specifies the delete
    statement and the XPath path to the target element. A singleton is required to
    delete a specific element when the XML has several elements with the same name,
    for example:


    ```

    Aluminium

    Silver

    Blue

    Strong long lasting

    modify(''delete /Root/ProductDescription/Features/Color[1]'')

    ```


    The result after delete is that <Color>Silver</Color> gone, <Color>Blue</Color>
    stays.


    To remove all child elements from the parent element, the XPath should point to
    the parent element plus “/*”, as shown in Listing [5-16](#A435478_1_En_5_Chapter.html#Par137).


    ```

    DECLARE @XMLDoc xml;

    SET @XMLDoc =

    ''


    1 year parts and labor

    Aluminium

    Silver

    Strong long lasting


    '';

    SET @XMLDoc.modify(''delete /Root/ProductDescription/Features/*'')

    SELECT @XMLDoc;

    Listing 5-16.

    Deleting all child elements from the Features element

    ```


    The result is shown in Figure [5-12](#A435478_1_En_5_Chapter.html#Fig12).


    ![A435478_1_En_5_Fig12_HTML.jpg](A435478_1_En_5_Fig12_HTML.jpg)


    Figure 5-12.


    XML result after all child elements are deleted from the Features element


    To delete items like comments and processing instructions, or even the text within
    an element, you could use node tests with delete as it demonstrates in Listing
    [5-17](#A435478_1_En_5_Chapter.html#Par140). The result is shown in Figure [5-13](#A435478_1_En_5_Chapter.html#Fig13).


    ![A435478_1_En_5_Fig13_HTML.jpg](A435478_1_En_5_Fig13_HTML.jpg)


    Figure 5-13.


    Showing delete result


    ```

    DECLARE @XMLDoc xml;

    SET @XMLDoc =

    ''


    1 year parts and labor

    Aluminium

    Silver

    Strong long lasting


    '';

    SET @XMLDoc.modify(''delete (/Root/ProductDescription/Features/comment())[1]'');

    SET @XMLDoc.modify(''delete (/Root/ProductDescription/Features/Color/text())[1]'');

    SET @XMLDoc.modify(''delete (/Root/ProductDescription/Features/processing-instruction())[1]'');

    SELECT @XMLDoc;

    Listing 5-17.

    Deleting other types of XML nodes by using node tests

    ```


    ## Summary


    The modify() method provides a comprehensive solution for manipulating the nodes
    of an XML instance. The directives:


    *   insert

    *   replace value of

    *   delete


    These directives are able to modify any elements and attributes within an XML
    instance with a relatively simple syntax.


    In the next chapter the recipes will cover how to efficiently filter the XML.'
