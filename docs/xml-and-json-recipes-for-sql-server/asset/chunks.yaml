- fmt: '# How It Works


    To demonstrate how to implement a `JSON_QUERY()` function to eliminate escape
    characters from JSON output, we need to create a table with a JSON data column.
    Listing 8-8 demonstrates a query to create the table `CustomerInvoice` where the
    column `InvoiceDate` holds JSON data. Figure 8-6 demonstrates the result set from
    the table `CustomerInvoice`.


    ![A435478_1_En_8_Fig6_HTML.jpg](A435478_1_En_8_Fig6_HTML.jpg)


    Figure 8-6. Showing the table `CustomerInvoice` result set


    ```sql

    SELECT TOP (2)

    [CustomerName]

    ,[PrimaryContact]

    ,[AlternateContact]

    ,[PhoneNumber]

    ,CAST((QUOTENAME(''"InvoiceDate":'' + QUOTENAME(CONVERT(varchar(20),InvoiceDate,
    101) , ''"''), ''{'')) AS VARCHAR(MAX)) InvoiceDate

    INTO CustomerInvoice

    FROM [Website].[Customers] Customers JOIN [Sales].[Invoices]  Invoices

    ON Invoices.CustomerID = Customers.CustomerID;

    Listing 8-25. Creating table `CustomerInvoice` with JSON data in column `InvoiceDate`

    ```


    The JSON data in the column `InvoiceDate` has forward slashes, for example: `{"InvoiceDate":"03/04/2013"}`,
    which is an invalid character for JSON. Table 8-4 lists the invalid JSON characters.


    **Table 8-4.** The JSON invalid characters


    | Character | Description |

    | --- | --- |

    | `"` | Double quote |

    | `\` | Backslash |

    | `/` | Forward slash |

    | The characters that less likely could be SQL Server data | |

    | `\r` | Carriage return ASCII Code 13 |

    | `\n` | Line feed ASCII Code 10 |

    | `\t` | Horizontal Tab ASCII Code 9 |

    | `\b` | Backspace ASCII Code 8 |

    | `\f` | Form feed ASCII Code 12 |


    If the query in Listing 8-26 executes without a `JSON_QUERY()` function, then
    JSON output will include escape character `\` in the output as shown in Listing
    8-27.


    ```sql

    SELECT CustomerName, PrimaryContact, AlternateContact, PhoneNumber, InvoiceDate

    FROM CustomerInvoice

    FOR JSON PATH;

    Listing 8-26. Building JSON without `JSON_QUERY()`

    ```


    ```json

    [

    {

    "CustomerName":"Tailspin Toys (Head Office)",

    "PrimaryContact":"Waldemar Fisar",

    "AlternateContact":"Laimonis Berzins",

    "PhoneNumber":"(308) 555-0100",

    "InvoiceDate":"{\"InvoiceDate\":\"03\/04\/2013\"}"

    },

    {

    "CustomerName":"Tailspin Toys (Head Office)",

    "PrimaryContact":"Waldemar Fisar",

    "AlternateContact":"Laimonis Berzins",

    "PhoneNumber":"(308) 555-0100",

    "InvoiceDate":"{\"InvoiceDate\":\"03\/12\/2013\"}"

    }

    ]

    Listing 8-27. Showing JSON output built in Listing 8-26

    ```


    Initially, the `JSON_QUERY()` function is very similar to the XML `query()` function
    that returns the JSON subset based on a provided path. (The Chapter 9 “Converting
    JSON to Row Sets” will cover the `JSON_QUERY()` function in greater detail.) The
    `JSON_QUERY()` function has the following two parameters:


    1.  JSON Expression, required.

    2.  JSON Path, optional.


    When a column that stores JSON is sent to the `JSON_QUERY()`, then the `FOR JSON`
    clause trusts the `JSON_QUERY()`, because the function always returns a valid
    JSON, so the output does not require escape characters.


    # 8-7. Dealing with CLR Data Types


    ## Problem


    You want to include a CLR data type in JSON output.


    ## Solution


    A `ToString()` function converts a CLR data type value into an `nvarchar` data
    type. Listing 8-28 demonstrates a query where the `Customers.DeliveryLocation`
    `geography` data type column is part of JSON output. Listing 8-29 shows the JSON
    output.


    ```sql

    SELECT TOP (2) Customers.CustomerName,

    People.FullName AS PrimaryContact,

    ap.FullName AS AlternateContact,

    Customers.PhoneNumber,

    Cities.CityName AS CityName,

    Customers.DeliveryLocation.ToString() AS DeliveryLocation

    FROM Sales.Customers AS Customers

    JOIN [Application].People AS People

    ON Customers.PrimaryContactPersonID = People.PersonID

    JOIN [Application].People AS ap

    ON Customers.AlternateContactPersonID = ap.PersonID

    JOIN [Application].Cities AS Cities

    ON Customers.DeliveryCityID = Cities.CityID

    FOR JSON PATH, ROOT(''Customers'');

    Listing 8-28. Converting CLR values into a string

    ```


    ```json

    {"Customers": [

    {

    "CustomerName": "Tailspin Toys (Head Office)",

    "PrimaryContact": "Waldemar Fisar",

    "AlternateContact": "Laimonis Berzins",

    "PhoneNumber": "(308) 555-0100",

    "CityName": "Lisco",

    "DeliveryLocation": "POINT (-102.6201979 41.4972022)"

    },

    {

    "CustomerName": "Tailspin Toys (Sylvanite, MT)",

    "PrimaryContact": "Lorena Cindric",

    "AlternateContact": "Hung Van Groesen",

    "PhoneNumber": "(406) 555-0100",

    "CityName": "Sylvanite",

    "DeliveryLocation": "POINT (-115.8743507 48.7163356)"

    }

    ]

    }

    Listing 8-29. Show in JSON output

    ```


    ## How It Works


    The `ToString()` function implicitly converts CLR data types `geography`, `geometry`,
    and `hierarchyid` into an `nvarchar` data type. The `ToString()` function default
    output is shown in Table 8-5.


    **Table 8-5.** Showing `ToString()` function conversion output


    | Data Type | Converts to Data Type |

    | --- | --- |

    | `hierarchyid` | `nvarchar(4000)` |

    | `geography` | `nvarchar(max)` |

    | `geometry` | `nvarchar(max)` |


    > **Note**

    > The `hierarchyid` data type is an exception for this limitation. The `FOR JSON`
    clause does not raise an error when a column with a `hierarchyid` data type is
    part of the JSON output.


    When the `FOR JSON` clause references unconverted `geography` and `geometry` data
    types, SQL Server raises the error shown in Listing 8-30.


    ```text

    Msg 13604, Level 16, State 1, Line 1

    FOR JSON cannot serialize CLR objects. Cast CLR types explicitly into one of the
    supported types in FOR JSON queries.

    Listing 8-30. Showing error for unconverted CLR

    ```


    The `ToString()` function is case sensitive, which is not typical for most SQL
    Server built-in functions. Therefore, any other spelling than a properly cased
    `ToString()` function will raise an error. For example, SQL Server raises an error
    when the function is spelled `tostring()`. Listing 8-31 demonstrates the error
    message.


    ```text

    Msg 6506, Level 16, State 10, Line 5 Could not find method ''tostring'' for type
    ''Microsoft.SqlServer.Types.SqlGeography'' in assembly ''Microsoft.SqlServer.Types''

    Listing 8-31. Showing the error message when the `ToString()` function is incorrectly
    spelled

    ```


    As an alternative, the `CAST()` and `CONVERT()` functions can explicitly convert
    `geography` and `geometry` into `nvarchar` and `varchar` data types. Listing 8-32
    demonstrates a query where the column `Customers.DeliveryLocation` with the `geography`
    data type is explicitly converted to `nvarchar(1000)` using the `CAST()` function
    .


    ```sql

    SELECT TOP (2) Customers.CustomerName,

    People.FullName AS PrimaryContact,

    ap.FullName AS AlternateContact,

    Customers.PhoneNumber,

    Cities.CityName AS CityName,

    CAST(Customers.DeliveryLocation as nvarchar(1000)) AS DeliveryLocation

    FROM Sales.Customers AS Customers

    JOIN Application.People AS People

    ON Customers.PrimaryContactPersonID = People.PersonID

    JOIN Application.People AS ap

    ON Customers.AlternateContactPersonID = ap.PersonID

    JOIN Application.Cities AS Cities

    ON Customers.DeliveryCityID = Cities.CityID

    FOR JSON PATH, ROOT(''Customers'');

    Listing 8-32. Using `CAST()` function column with geography data type

    ```


    # Summary


    SQL Server 2016 was introduced with JSON integration. This chapter covered how
    to build efficient and effective JSON output. This is the first chapter dedicated
    to JSON, and you can see that the `FOR JSON` clause has many similarities to the
    `FOR XML` clause. Both have `AUTO` and `PATH` modes. The `ROOT` option in the
    `FOR JSON` clause is the same as the `FOR XML` clause. As a rule of thumb, if
    you are familiar with XML, then JSON should be simple to learn.


    The next chapter will cover the conversion of JSON values into rows and columns.'
