    XQuery 逻辑 `and` 运算符可用于连接两个谓词，为 XML 实例定义范围筛选器，如清单 6-16 所示。


    ```sql

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''TotalPurchaseYTD'', ''MONEY'') TotalPurchase,

    ref.value(''DateFirstPurchase'', ''DATE'') DateFirstPurchase,

    ref.value(''YearlyIncome'', ''NVARCHAR(20)'') YearlyIncome,

    ref.value(''Occupation'', ''NVARCHAR(15)'') Occupation,

    ref.value(''CommuteDistance'', ''NVARCHAR(15)'') CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey[ TotalPurchaseYTD >= 1000 and
    TotalPurchaseYTD <= 2000 ]'') AS dmg(ref);

    ```


    清单 6-16. 实现值范围筛选器


    结果如图 6-12 所示。


    ![A435478_1_En_6_Fig12_HTML.jpg](img/A435478_1_En_6_Fig12_HTML.jpg)


    图 6-12. 显示应用值范围筛选条件的 XQuery 结果


    ### 工作原理


    为 XQuery 设置值范围筛选器所使用的实现方法，与使用 T-SQL `WHERE` 子句的方法类似。T-SQL 有 `BETWEEN` 运算符作为值范围筛选的额外选项。然而，XQuery
    筛选器 `“elementName >= value and elementName <= value”` 实现了与 `BETWEEN` 运算符相同的功能。因此，清单
    6-16 中的解决方案展示了 XQuery 的值范围筛选器，例如：`‘IndividualSurvey[ TotalPurchaseYTD >= 1000
    and TotalPurchaseYTD <= 2000 ]’`。


    **注意**

    XQuery 中的所有运算符同样区分大小写。为避免错误，请仅使用小写的 `“and”` 和 `“or”` 运算符。


    ## 6-9. 按多个条件筛选


    ### 问题


    你想根据多个元素、属性或条件筛选 XML 实例。


    ### 解决方案


    XQuery 提供了 `and` 和 `or` 逻辑运算符来创建复合谓词，从而实现针对 XML 实例的多个筛选条件，如清单 6-17 所示。


    ```sql

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''TotalPurchaseYTD'', ''MONEY'') AS TotalPurchase,

    ref.value(''DateFirstPurchase'', ''DATE'') AS DateFirstPurchase,

    ref.value(''YearlyIncome'', ''NVARCHAR(20)'') AS YearlyIncome,

    ref.value(''Occupation'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''CommuteDistance'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey[ TotalPurchaseYTD >= 1001

    and TotalPurchaseYTD < 2000

    and DateFirstPurchase >= xs:date("2004-07-30Z") ]''

    ) AS dmg(ref);

    ```


    清单 6-17. 实现多个筛选条件


    结果如图 6-13 所示。


    ![A435478_1_En_6_Fig13_HTML.jpg](img/A435478_1_En_6_Fig13_HTML.jpg)


    图 6-13. 显示应用多个筛选条件的 XQuery 结果'
- fmt: '### How It Works


    This recipe demonstrates an XQuery filter for several elements in Listing [6-17](#A435478_1_En_6_Chapter.html#Par110).
    The logic in this recipe is to filter the XML instance where:


    1.  `TotalPurchaseYTD` values are between `1001` and `1004`, AND

    2.  `CommuteDistance` is equal to `“0-1 Miles,”` OR

    3.  The `DateFirstPurchase > “2004-07-30Z.”`


    The `nodes()` method implements four predicates to satisfy the filtering criteria.
    This recipe demonstrates the two logical operators `and` and `or`. The solution
    XQuery expression is written as:


    ```xquery

    IndividualSurvey[ TotalPurchaseYTD >= 1001

    and TotalPurchaseYTD <= 1004

    and CommuteDistance = "0-1 Miles"

    or DateFirstPurchase > xs:date("2004-07-30") ]

    ```


    This way the recipe demonstrates multiple filtering conditions within the XML
    instance.


    Note: For demo purposes, the table `Person.Person` and the column `Demographics`,
    containing 19,972 rows, has been selected for this chapter. However, the `Demographics`
    column is element-centric XML. Therefore, no filtering samples were provided for
    the XML attribute. There is a small difference when referencing the XML attribute.
    The attribute has a leading `@` when it is referenced in a predicate. Listing
    [6-17](#A435478_1_En_6_Chapter.html#Par110) demonstrates the XML portion with
    the `TotalPurchaseYTD` element `currency` attribute. Therefore, the syntax to
    filter by the attribute is: `nodes(‘IndividualSurvey/YearlyIncome[@currency=“$”)’)`.


    ### 6-10. Setting a Negative Predicate


    #### Problem


    You need to filter an XML instance by setting a negative operator. For instance,
    the T-SQL `NOT IN` predicate.


    #### Solution


    The XQuery negation function is `fn:not()`. When wrapped around an XQuery predicate,
    `fn:not()` returns the opposite of the Effective Boolean Value of the predicate.
    Listing [6-18](#A435478_1_En_6_Chapter.html#Par122) shows an example of using
    `fn:not()` as well as the `!=` general comparison operator, which is itself the
    equivalent of wrapping an `=` predicate with `fn:not()`.


    ```sql

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''TotalPurchaseYTD[1]'', ''MONEY'') AS TotalPurchase,

    ref.value(''DateFirstPurchase[1]'', ''DATE'') AS DateFirstPurchase,

    ref.value(''YearlyIncome[1]'', ''NVARCHAR(15)'') AS YearlyIncome,

    ref.value(''Occupation[1]'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''CommuteDistance[1]'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey[ YearlyIncome != "0-25000" and
    fn:not( Occupation = ( "Clerical","Manual","Professional" ) ) ]'') AS dmg(ref);

    ```


    Listing 6-18. Demonstrating negative operators


    The result is demonstrated in Figure [6-14](#A435478_1_En_6_Chapter.html#Fig14).


    ![A435478_1_En_6_Fig14_HTML.jpg](A435478_1_En_6_Fig14_HTML.jpg)


    Figure 6-14. Showing the XQuery result with negative predicate


    #### How It Works


    XQuery has three negative operators:


    *   `!=` not equal operator for a general comparison

    *   `ne` not equal operator for a value comparison

    *   `fn:not()` function for a list and range of values


    In the Solution section, Listing [6-18](#A435478_1_En_6_Chapter.html#Par122) demonstrates
    both single value criteria and a list of the values setting negative filters,
    for example:


    `IndividualSurvey[YearlyIncome ne "0-25000" and fn:not( Occupation = ( “Clerical”,
    “Manual”, “Professional” ) ) ]`


    ### 6-11. Filtering Empty Values


    #### Problem


    You want to filter an XML instance based on the existence of a value within an
    element or attribute.


    #### Solution


    The XQuery `fn:empty()` function verifies if a value exists for a given XML element
    or attribute, as shown in Listing [6-19](#A435478_1_En_6_Chapter.html#Par132).


    ```sql

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''TotalPurchaseYTD[1]'', ''MONEY'') AS TotalPurchase,

    ref.value(''DateFirstPurchase[1]'', ''DATE'') AS DateFirstPurchase,

    ref.value(''YearlyIncome[1]'', ''NVARCHAR(15)'') AS YearlyIncome,

    ref.value(''Occupation[1]'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''CommuteDistance[1]'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM person.Person

    CROSS APPLY Demographics.nodes(''IndividualSurvey[fn:not(fn:empty(Occupation))

    and fn:not( Occupation = ( "Clerical", "Manual", "Professional" ) ) ]'') AS dmg(ref);

    ```


    Listing 6-19. Verifying the value existence


    The result is demonstrated in Figure [6-15](#A435478_1_En_6_Chapter.html#Fig15).


    ![A435478_1_En_6_Fig15_HTML.jpg](A435478_1_En_6_Fig15_HTML.jpg)


    Figure 6-15. Showing the XQuery result with implemented `fn:empty()` function
    as a filter


    Note: The `fn:empty( )` XQuery function is an alternative to the `exist( )` method
    within XQuery. The `exist( )` method is not supported in the `nodes( )` Method.
    Therefore, `fn:empty( )` and `fn:not( )` work very well within the `nodes( )`
    Method, similarly to the functionality of T-SQL `IS NULL` and `IS NOT NULL` operators.


    #### How It Works


    The `fn:empty()` function checks if the XML instance elements and attribute values
    are empty or not. Logically, `fn:empty()` provides functionality to detect any
    empty values within your XML data. The Solution section demonstrates the syntax
    to return rows where the `Occupation` element has a value, that is, the element
    is not empty. Therefore, both `fn:not()` and `fn:empty()` are implemented in Listing
    [6-14](#A435478_1_En_6_Chapter.html#Par93):


    ```xquery

    IndividualSurvey[ fn:not( fn:empty( Occupation ) )

    ```


    As mentioned in the Solution section, the `fn:empty()` function is an alternate
    to the `exist()` Method, Listing [6-20](#A435478_1_En_6_Chapter.html#Par138).


    ```sql

    WITH XMLNAMESPACES

    (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey''

    )

    SELECT BusinessEntityID,

    ref.value(''TotalPurchaseYTD[1]'', ''MONEY'') AS TotalPurchase,

    ref.value(''DateFirstPurchase[1]'', ''DATE'') AS DateFirstPurchase,

    ref.value(''YearlyIncome[1]'', ''NVARCHAR(15)'') AS YearlyIncome,

    ref.value(''Occupation[1]'', ''NVARCHAR(15)'') AS Occupation,

    ref.value(''CommuteDistance[1]'', ''NVARCHAR(15)'') AS CommuteDistance

    FROM Person.Person

    CROSS APPLY Demographics.nodes

    (''IndividualSurvey[fn:not( Occupation = ("Clerical", "Manual", "Professional"
    ) ) ]'') AS dmg(ref)

    WHERE Demographics.exist(''IndividualSurvey/Occupation'') = 1;

    ```


    Listing 6-20. Demonstrates an alternative to the `fn:empty()` function


    The result is demonstrated in Figure [6-16](#A435478_1_En_6_Chapter.html#Fig16).


    ![A435478_1_En_6_Fig16_HTML.jpg](A435478_1_En_6_Fig16_HTML.jpg)


    Figure 6-16. Showing the XQuery result with implemented an alternative to the
    `fn:empty()` function


    When both Listings [6-19](#A435478_1_En_6_Chapter.html#Par132) and [6-20](#A435478_1_En_6_Chapter.html#Par138)
    are executed with the T-SQL `SET STATISTICS TIME ON;` option set, SQL Server shows
    that `fn:empty()` has a minor performance advantage over the `exist()` Method,
    as shown in Listing [6-21](#A435478_1_En_6_Chapter.html#Par141).


    ```sql

    -- fn:empty() function

    (7652 row(s) affected)

    SQL Server Execution Times:

    CPU time = 454 ms,  elapsed time = 496 ms.

    -- exist() method

    (7652 row(s) affected)

    SQL Server Execution Times:

    CPU time = 485 ms,  elapsed time = 577 ms.

    ```


    Listing 6-21. Showing the execution output for the `fn:empty()` function and the
    `exist()` Method


    Note: The output on your PC could return different performance numbers.'
