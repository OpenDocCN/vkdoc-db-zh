    AND Product.SellEndDate IS NULL\nORDER BY Product.Name\nFOR XML AUTO, ELEMENTS,\
    \ ROOT;\n```\n清单 2-12.\n向`FOR XML AUTO`查询添加`ROOT`指令\n\n[清单 2-13](#A435478_1_En_2_Chapter.html#Par63)展示了同时使用`ELEMENTS`和`ROOT`指令的`FOR\
    \ XML AUTO`查询结果。\n\n```xml\n<root>\n  <Product>\n    <Name>All-Purpose Bike Stand</Name>\n\
    \    <Number>ST-1401</Number>\n    <Price>159.0000</Price>\n  </Product>\n  <Product>\n\
    \    <Name>AWC Logo Cap</Name>\n    <Number>CA-1098</Number>\n    <Price>8.9900</Price>\n\
    \  </Product>\n  <Product>\n    <Name>Bike Wash - Dissolver</Name>\n    <Number>CL-9009</Number>\n\
    \    <Price>7.9500</Price>\n  </Product>\n  ...\n</root>\n```\n清单 2-13.\n使用`ELEMENTS`和`ROOT`指令生成的格式良好XML片段\n\
    \n### How It Works\n\n`ROOT`选项指定你的XML结果将被包装在一个单独的顶级根元素中。默认情况下，`ROOT`指令生成一个名为`<root>`的顶级元素。然而，默认名称`<root>`也可以通过在括号中指定用户定义的值来替换。例如：`FOR\
    \ XML AUTO, ELEMENTS, ROOT('Products')`。当指定了根元素名称时，XML结果将使用你指定的名称作为顶级根元素。在前面的例子中，根元素将被命名为`<Products>`。\n\
    \n## 2-5. 在XML数据中包含值为NULL的元素\n\n### Problem\n\n默认情况下，SQL Server生成的XML会排除任何包含`NULL`的列。你希望特别包含那些包含`NULL`的列。\n\
    \n### Solution\n\n`ELEMENTS`指令的`XSINIL`选项强制XML结果包含那些源列包含`NULL`的元素。[清单 2-14](#A435478_1_En_2_Chapter.html#Par67)演示了如何向你的查询添加`XSINIL`选项。\n\
    \n```sql\nSELECT Product.Name,\nProduct.ProductNumber AS Number,\nProduct.ListPrice\
    \ AS Price,\nSellEndDate\nFROM  Production.Product AS Product\nWHERE Product.ListPrice\
    \ > 0\nORDER BY Product.Name\nFOR XML AUTO, ELEMENTS XSINIL, ROOT('Products');\n\
    ```\n清单 2-14.\n向`FOR XML`查询添加`XSINIL`选项\n\n[清单 2-15](#A435478_1_En_2_Chapter.html#Par69)展示了使用`XSINIL`选项的结果。\n\
    \n```xml\n...\n<Product>\n  <Name>Bike Wash - Dissolver</Name>\n  <Number>CL-9009</Number>\n\
    \  <Price>7.9500</Price>\n  <SellEndDate xsi:nil=\"true\"/>\n</Product>\n<Product>\n\
    \  <Name>Cable Lock</Name>\n  <Number>LO-C100</Number>\n  <Price>25.0000</Price>\n\
    \  <SellEndDate>2013-05-29T00:00:00</SellEndDate>\n</Product>\n...\n```\n清单 2-15.\n\
    `XSINIL`选项查询结果的片段\n\n在示例结果中，产品编号`CL-9009`在数据库中的`SellEndDate`为`NULL`，因此它用一个设置为“true”的`xsi:nil`属性来表示。然而，产品编号`LO-C100`有一个非`NULL`的`SellEndDate`值，所以它没有`xsi:nil`属性。\n\
    \n### How It Works\n\n`ELEMENTS`指令支持两个选项：\n1.  `XSINIL` – 此选项强制XML结果为源数据中的`NULL`值生成元素。\n\
    2.  `ABSENT` – 此选项将源数据中包含`NULL`值的任何元素排除在你的XML结果之外。这是`ELEMENTS`指令的默认选项，无需显式指定。\n\
    \n`XSINIL`和`ABSENT`选项被视为`ELEMENTS`指令的一部分，并且在需要时可以这样指定。因此，与指令不同，`XSINIL`和`ABSENT`选项与其`ELEMENTS`指令之间用空格分隔，而不是逗号。\n\
    \n## 2-6. 在XML中包含二进制数据\n\n### Problem\n\n你希望将二进制列的内容包含在你的XML数据中。\n\n### Solution\n\
    \n你可能会遇到查询包含二进制数据的列的情况，并且你希望将这些二进制数据包含在你的XML结果中。考虑[清单 2-16](#A435478_1_En_2_Chapter.html#Par77)，这是一个试图以XML格式返回二进制数据的查询。\n\
    \n```sql\nSELECT LargePhotoFileName,\nLargePhoto\nFROM  Production.ProductPhoto\n\
    FOR XML AUTO, ELEMENTS;\n```\n清单 2-16.\n检索XML格式二进制数据的失败查询\n\n当你尝试执行此查询时，它会引发错误：\n\
    \n`FOR XML AUTO requires primary keys to create references for 'LargePhoto'. Select\
    \ primary keys, or use BINARY BASE64 to obtain binary data in encoded form if\
    \ no primary keys exist.`\n\n此查询失败，因为你没有在结果集中包含主键列。如[清单 2-17](#A435478_1_En_2_Chapter.html#Par81)所示更改查询将解决此问题。\n\
    \n```sql\nSELECT LargePhotoFileName,\nLargePhoto,\nProductPhotoID\nFROM  Production.ProductPhoto\n\
    FOR XML AUTO, ELEMENTS;\n```\n清单 2-17.\n检索XML格式二进制数据的有效查询\n\n然而，返回的不是预期的二进制数据，而是对主键行的引用，如[清单\
    \ 2-18](#A435478_1_En_2_Chapter.html#Par83)所示。\n\n```xml\n<ProductPhoto ProductPhotoID=\"\
    70\">\n  <LargePhotoFileName>racer02_black_large.gif</LargePhotoFileName>\n  <LargePhoto>dbobject/Production.ProductPhoto[@ProductPhotoID='70']/@LargePhoto</LargePhoto>\n\
    </ProductPhoto>\n```\n清单 2-18.\n带有对主键行引用的二进制数据查询结果片段\n\n为了在你的XML结果中包含二进制数据的实际表示，只需将`BINARY\
    \ BASE64`指令应用于你的`FOR XML`子句。此指令强制XML结果以Base64编码格式包含二进制数据。[清单 2-19](#A435478_1_En_2_Chapter.html#Par85)演示了`FOR\
    \ XML`子句的`BINARY BASE64`指令。\n\n```sql\nSELECT LargePhotoFileName,\nLargePhoto\n\
    FROM  Production.ProductPhoto\nFOR XML AUTO, ELEMENTS, BINARY BASE64;\n```\n清单\
    \ 2-19.\n使用`FOR XML`子句的`BINARY BASE64`指令\n\n### How It Works\n\n`BINARY BASE64`指令以Base-64格式对二进制数据进行编码。当查询返回`varbinary`数据类型的列时，`FOR\
    \ XML`子句的`BINARY BASE64`指令会在你的XML结果中以Base-64编码的形式返回你的二进制数据。\n\n每个`FOR XML`模式使用特定规则作用于结果集中的二进制数据：\n\
    *   `AUTO`模式在查询结果中包含主键时，返回对二进制列和行的引用。\n*   `RAW`和`EXPLICIT`模式在查询有包含二进制数据的列时会引发错误。\n\
    *   只有`PATH`模式在未指定`BINARY BASE64`指令时不会引发错误，并会返回包含二进制数据的XML结果。\n\n例如，执行以下查询：\n\
    ```sql\nSELECT LargePhotoFileName, LargePhoto\nFROM  [Production].[ProductPhoto]\n\
    FOR XML PATH;\n```\n以及这个查询：\n```sql\nSELECT LargePhotoFileName, LargePhoto\nFROM\
    \  [Production].[ProductPhoto]\nFOR XML AUTO, ELEMENTS, BINARY BASE64;\n```\n\
    两个查询都将返回相同的结果。然而，当二进制数据是结果集的一部分时，我强烈建议对所有`FOR XML`模式包含`BINARY BASE64`指令。这是因为你需要检索实际的数据，而不是数据的引用，就像当主键列在`SELECT`子句中列出时可能发生的那样。\n\
    \n## 2-7. 生成嵌套的层次结构XML数据\n\n### Problem\n\n你希望将生成XML的子查询的结果嵌套到外部生成XML的查询中，以创建更复杂的层次结构XML数据。"
  raw: '### Solution


    The `ROOT` option wraps your XML result in a top-level root element of your choosing.
    Listing [2-12](#A435478_1_En_2_Chapter.html#Par61) demonstrates how to add a `ROOT`
    directive to the query.


    ```

    SELECT Product.Name,

    Product.ProductNumber AS Number,

    Product.ListPrice AS Price

    FROM  Production.Product AS Product

    WHERE Product.ListPrice > 0

    AND Product.SellEndDate IS NULL

    ORDER BY Product.Name

    FOR XML AUTO, ELEMENTS, ROOT;

    Listing 2-12.

    Adding the ROOT directive to a FOR XML AUTO query

    ```


    Listing [2-13](#A435478_1_En_2_Chapter.html#Par63) shows the result of the `FOR
    XML AUTO` query with both the `ELEMENTS` and `ROOT` directives.


    ```


    All-Purpose Bike Stand

    ST-1401

    159.0000


    AWC Logo Cap

    CA-1098

    8.9900


    Bike Wash - Dissolver

    CL-9009

    7.9500


    ...


    Listing 2-13.

    Snippet of well-formed XML generated with ELEMENTS and ROOT directives

    ```


    ### How It Works


    The `ROOT` option specifies that your XML result will be wrapped in a single top-level
    root element. By default, the `ROOT` directive generates a top-level element named
    <root>. However, the default name <root>can also be replaced with a user-defined
    value in parentheses. For example:</root></root> `FOR XML AUTO, ELEMENTS, ROOT(''Products'')`.
    When the root element name is specified, the XML result uses the name you specify
    as the top-level root element. In the previous example, the root element will
    be named <products>.</products>


    ## 2-5\. Including Elements with NULL Values in Your XML Data


    ### Problem


    By default, the XML that SQL Server generates excludes any columns with `NULL`s.
    You would like to specifically include columns containing `NULL`s.


    ### Solution


    The `XSINIL` option of the `ELEMENTS` directive forces the XML result to include
    elements in which the source columns contain `NULL`s. Listing [2-14](#A435478_1_En_2_Chapter.html#Par67)
    demonstrates how to add an `XSINIL` option to your query .


    ```

    SELECT Product.Name,

    Product.ProductNumber AS Number,

    Product.ListPrice AS Price,

    SellEndDate

    FROM  Production.Product AS Product

    WHERE Product.ListPrice > 0

    ORDER BY Product.Name

    FOR XML AUTO, ELEMENTS XSINIL, ROOT(''Products'');

    Listing 2-14.

    Adding an XSINIL option to the FOR XML query

    ```


    Listing [2-15](#A435478_1_En_2_Chapter.html#Par69) displays the result of using
    the `XSINIL` option.


    ```

    ...


    Bike Wash - Dissolver

    CL-9009

    7.9500


    Cable Lock

    LO-C100

    25.0000

    2013-05-29T00:00:00


    ...


    Listing 2-15.

    Snippet of results of the XSINIL option query

    ```


    In the sample results, product number CL-9009 has a SellEndDate of `NULL` in the
    database, so it is represented with an xsi:nil attribute set to “true.” Product
    number LO-C100, however, has a non-`NULL` SellEndDate value, so it has no xsi:nil
    attribute.


    ### How It Works


    The `ELEMENTS` directive supports two options:


    1.  `XSINIL` – this option forces the XML result to generate elements for `NULL`
    values in the source data.  

    2.  `ABSENT` – this option leaves any elements that contain `NULL` values in the
    source data out of your XML result. This is the default option for the `ELEMENTS`
    directive, and does not need to be specified explicitly.  


    The `XSINIL` and `ABSENT` options are considered part of the `ELEMENTS` directive,
    and they can be specified as such, when needed. Therefore, unlike directives,
    the `XSINIL` and `ABSENT` options are separated from their `ELEMENTS` directive
    by a space, not a comma.


    ## 2-6\. Including Binary Data in Your XML


    ### Problem


    You want to include the contents of a binary column in your XML data.


    ### Solution


    You may run into a situation in which you are querying a column that contains
    binary data, and you want the binary data to be included in your XML result. Consider
    Listing [2-16](#A435478_1_En_2_Chapter.html#Par77), which is a query that attempts
    to return binary data in XML format.


    ```

    SELECT LargePhotoFileName,

    LargePhoto

    FROM  Production.ProductPhoto

    FOR XML AUTO, ELEMENTS;

    Listing 2-16.

    Failing query to retrieve binary data in XML format

    ```


    When you try to execute this query it raises an error:


    FOR XML AUTO requires primary keys to create references for ‘LargePhoto’. Select
    primary keys, or use BINARY BASE64 to obtain binary data in encoded form if no
    primary keys exist.


    This query fails because you did not include a primary key column in your result
    set. Changing the query as shown in Listing [2-17](#A435478_1_En_2_Chapter.html#Par81)
    will resolve the issue.


    ```

    SELECT LargePhotoFileName,

    LargePhoto,

    ProductPhotoID

    FROM  Production.ProductPhoto

    FOR XML AUTO, ELEMENTS;

    Listing 2-17.

    Working query to retrieve binary data in XML format

    ```


    However, instead of the expected binary data, a reference to the primary key row
    is returned, as shown in Listing [2-18](#A435478_1_En_2_Chapter.html#Par83).


    ```

    racer02_black_large.gif

    dbobject/Production.ProductPhoto[@ProductPhotoID=''70'']/@LargePhoto


    Listing 2-18.

    Snippet of results of binary data query with reference to primary key row

    ```


    To include an actual representation of your binary data in your XML result, simply
    apply the `BINARY BASE64` directive to your `FOR XML` clause. This directive forces
    the XML result to include binary data in Base64-encoded format. Listing [2-19](#A435478_1_En_2_Chapter.html#Par85)
    demonstrates the `BINARY BASE64` directive of the `FOR XML` clause.


    ```

    SELECT LargePhotoFileName,

    LargePhoto

    FROM  Production.ProductPhoto

    FOR XML AUTO, ELEMENTS, BINARY BASE64;

    Listing 2-19.

    Using the BINARY BASE64 directive of the FOR XML clause

    ```


    ### How It Works


    The `BINARY BASE64` directive encodes binary data in Base-64 format. When the
    query returns a column of the `varbinary` data type, the `BINARY BASE64` directive
    of the `FOR XML` clause returns your binary data in Base-64-encoded in your XML
    result.


    Each FOR XML mode acts on the binary data in your result set using specific rules:


    *   `AUTO` mode returns a reference to a binary column and row when the primary
    key is included in your query result.

    *   `RAW` and `EXPLICIT` modes will raise an error when the query has a column
    with binary data.

    *   Only PATH mode does not raise an error, and returns the XML result with binary
    data when the `BINARY BASE64` directive is not specified.


    For example, execute the following query:


    ```

    SELECT LargePhotoFileName, LargePhoto

    FROM  [Production].[ProductPhoto]

    FOR XML PATH;

    ```


    And this query:


    ```

    SELECT LargePhotoFileName, LargePhoto

    FROM  [Production].[ProductPhoto]

    FOR XML AUTO, ELEMENTS, BINARY BASE64;

    ```


    Both queries will return the same result. However, I would strongly recommend
    including a `BINARY BASE64` directive to all `FOR XML` modes when the binary data
    is part of the result set. This is because you need to retrieve an actual datum,
    not the reference to the data, as it could happen when the primary key is listed
    in the SELECT clause .


    ## 2-7\. Generating Nested Hierarchical XML Data


    ### Problem


    You want to nest the results of an XML-generating subquery into your outer XML-generating
    query, to create more complex hierarchical XML data.'
