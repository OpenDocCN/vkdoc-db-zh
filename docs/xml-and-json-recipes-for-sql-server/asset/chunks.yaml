- fmt: '# Part II

    JSON in SQL Server


    # 8. 构造 JSON


    欢迎阅读本书第二部分。第二部分将介绍 SQL Server 中的 JSON，该功能于 SQL Server 2016 引入。JSON 与 XML 有许多相似之处，但它们并不相同。JSON
    可以被视为 XML 的“无脂”版本。要运行第二部分的示例，请确保 SQL Server 2016 中的数据库兼容级别设置为 130。第二部分的示例数据库是
    WideWorldImporters。请使用以下链接下载数据库：[`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0?utm_source=MyTechMantra.com`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0?utm_source=MyTechMantra.com)
    。


    ### 解决方案


    您可以为选择性 XML 索引添加或删除路径。清单 [7-25](#A435478_1_En_7_Chapter.html#Par126) 创建了我们之前在解决方案
    7-5 中创建的演示表。它用 XML 数据填充该表，并在表上创建了一个选择性 XML 索引。这是此解决方案的先决条件。


    ```sql

    -- These settings are important when creating a table with XML columns and XML
    indexes

    SET NUMERIC_ROUNDABORT OFF;

    SET ARITHABORT ON;

    SET ANSI_NULLS ON;

    SET ANSI_PADDING ON;

    SET ANSI_WARNINGS ON;

    SET CONCAT_NULL_YIELDS_NULL ON;

    SET QUOTED_IDENTIFIER ON;

    GO

    -- Drop table SQL Server 2016 syntax

    DROP TABLE IF EXISTS dbo.ProductXML

    -- Create demo table with an XML column

    CREATE TABLE dbo.ProductXML

    (

    ProductID INT NOT NULL,

    Name NVARCHAR(50) NOT NULL,

    ProductNumber NVARCHAR(25) NOT NULL,

    ProductDetails XML NULL

    CONSTRAINT PK_ProductXML_ProductID PRIMARY KEY CLUSTERED

    (

    ProductID ASC

    )

    );

    GO

    -- Populate table with sample XML data

    INSERT INTO dbo.ProductXML

    (

    ProductID,

    Name,

    Number,

    ProductDetails

    )

