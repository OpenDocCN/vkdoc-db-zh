  raw: '### How It Works


    A JSON_QUERY() function has two arguments:


    1.  Expression – a required argument, expecting a JSON document from a column
    name or variable.  

    2.  Path – an optional argument, providing a JSON document path to an object part.
     


    Note


    The dollar sign ($) in the path argument represents JSON context, and it could
    be considered as a top object.


    The recipe solution demonstrated in a JSON document is stored in the Sales.Invoices
    table and ReturnedDeliveryData column. For example, the complete JSON document
    shown in Listing [9-6](#A435478_1_En_9_Chapter.html#Par31) has two extra key elements
    DeliveredWhen and ReceivedBy that are not part of the JSON_QUERY() result, because
    the path argument was set to the object Events, which has two child arrays.


    ```

    {

    "Events":[

    {

    "Event":"Ready for collection",

    "EventTime":"2013-01-01T12:00:00",

    "ConNote":"EAN-125-1051"

    },

    {

    "Event":"DeliveryAttempt",

    "EventTime":"2013-01-02T07:05:00",

    "ConNote":"EAN-125-1051",

    "DriverID":15,

    "Latitude":41.3617214,

    "Longitude":-81.4695602,

    "Status":"Delivered"

    }

    ],

    "DeliveredWhen":"2013-01-02T07:05:00",

    "ReceivedBy":"Aakriti Byrraju"

    }

    Listing 9-6.

    Showing a complete JSON document

    ```


    To return the single array object, the path argument needs to specify an array
    index on how it is demonstrated in Listing [9-7](#A435478_1_En_9_Chapter.html#Par33).
    Listing [9-8](#A435478_1_En_9_Chapter.html#Par200) demonstrates JSON output for
    a single array object .


    ```

    SELECT TOP (1) JSON_QUERY([ReturnedDeliveryData], ''$.Events[0]'')

    FROM [Sales].[Invoices];

    Listing 9-7.

    Referencing a single JSON array object

    ```


    ```

    {

    "Event":"Ready for collection",

    "EventTime":"2013-01-01T12:00:00",

    "ConNote":"EAN-125-1051 "

    }

    Listing 9-8.

    Showing array output

    ```


    Caution


    Unlike an XML singleton that is a 1-based starting index, JSON arrays are 0-based.
    Therefore, to reference the first array object or array value, the index must
    be 0, not 1.


    When the path argument is not set for a JSON_QUERY() function, the function returns
    a complete JSON document.


    ## 9-3\. Returning a Scalar Value from JSON


    ### Problem


    You want to return a scalar value from a JSON document.


    ### Solution


    A JSON_VALUE() function extracts a scalar value from a JSON document, shown in
    Listing [9-9](#A435478_1_En_9_Chapter.html#Par38). The query result is demonstrated
    in Figure [9-3](#A435478_1_En_9_Chapter.html#Fig3).


    ![A435478_1_En_9_Fig3_HTML.jpg](A435478_1_En_9_Fig3_HTML.jpg)


    Figure 9-3.


    Showing the query result


    ```

    SELECT TOP (1) JSON_value([ReturnedDeliveryData], ''$.ReceivedBy'') ReceivedBy

    ,JSON_value([ReturnedDeliveryData], ''$.Events[0].Event'') FirstEvent

    ,JSON_value([ReturnedDeliveryData], ''$.Events[0].EventTime'') EventTime

    ,JSON_value([ReturnedDeliveryData], ''$.Events[1].Event'') LastEvent

    ,JSON_value([ReturnedDeliveryData], ''$.Events[1].Status'') [Status]

    FROM [Sales].[Invoices];

    Listing 9-9.

    Returning scalar values

    ```


    ### How It Works


    A JSON_VALUE() function has two required arguments:


    1.  Expression – expects a JSON document from a column name or variable.  

    2.  Path – a JSON document path to a JSON scalar value.  


    Unlike a JSON_QUERY() function that returns objects and arrays, the JSON_VALUE()
    function returns a JSON scalar value. If you attempt to return a scalar value
    using the JSON_QUERY() function, NULL will be returned. The JSON_VALUE() function
    is the opposite – it returns NULL when the path references an object or array
    instead of a key. For example, the query in Listing [9-10](#A435478_1_En_9_Chapter.html#Par43)
    demonstrates flipping an object and value reference between a JSON_VALUE() and
    JSON_QUERY() functions. Figure [9-4](#A435478_1_En_9_Chapter.html#Fig4) shows
    the result when a JSON_VALUE() referencing a scalar value returns a ReceivedBy
    value and a JSON_QUERY() referencing a scalar value returns NULL. In the next
    two columns, the JSON_VALUE() referencing an array returns a NULL value and JSON_QUERY()
    referencing and array returns a JSON segment.


    ![A435478_1_En_9_Fig4_HTML.jpg](A435478_1_En_9_Fig4_HTML.jpg)


    Figure 9-4.


    Showing the query result


    ```

    SELECT TOP (1) JSON_VALUE([ReturnedDeliveryData], ''$.ReceivedBy'') ScalarValue

    ,JSON_QUERY([ReturnedDeliveryData], ''$.ReceivedBy'') ScalarQuery

    ,JSON_VALUE([ReturnedDeliveryData], ''$.Events[0]'') ObjectValue

    ,JSON_QUERY([ReturnedDeliveryData], ''$.Events[0]'') ObjectQuery

    FROM [Sales].[Invoices];

    Listing 9-10.

    Demonstrating JSON_VALUE() and JSON_QUERY() functions

    ```


    The JSON_VALUE() function returns an nvarchar(4000) data type for a scalar value.
    Listing [9-11](#A435478_1_En_9_Chapter.html#Par45) demonstrates how to verify
    a data type that is returned by a JSON_VALUE() function. Figure [9-5](#A435478_1_En_9_Chapter.html#Fig5)
    shows the returned result.


    ![A435478_1_En_9_Fig5_HTML.jpg](A435478_1_En_9_Fig5_HTML.jpg)


    Figure 9-5.


    Resulting output from the verification code


    ```

    DECLARE @Value sql_variant

    SELECT @Value =

    (

    SELECT TOP (1) JSON_value([ReturnedDeliveryData], ''$."ReceivedBy"'')

    FROM [Sales].[Invoices]

    );

    SELECT SQL_VARIANT_PROPERTY(@Value,''BaseType'') BaseType,

    CAST(SQL_VARIANT_PROPERTY(@Value, ''MaxLength'')as int) /

    CASE SQL_VARIANT_PROPERTY(@Value,''BaseType'') WHEN ''nvarchar''

    THEN 2 ELSE 1 END TypeLength,

    SQL_VARIANT_PROPERTY(@Value,''TotalBytes'') TotalBytes;

    Listing 9-11.

    Verifying the returned data type by JSON_VALUE() function

    ```


    When the scalar value is greater than 4000 characters, the function returns a
    NULL. Listing [9-12](#A435478_1_En_9_Chapter.html#Par47) demonstrates the JSON
    document when the scalar value LongText contains 5,009 characters processed by
    a JSON_VALUE() function. The query result is shown in Figure [9-6](#A435478_1_En_9_Chapter.html#Fig6).


    ![A435478_1_En_9_Fig6_HTML.jpg](A435478_1_En_9_Fig6_HTML.jpg)


    Figure 9-6.


    Showing query result


    ```

    declare @json nvarchar(max) = ''

    {

    "RegularText":"Regular Text",

    "LongText":"Long Text'' + REPLICATE('' too long '', 500) + ''"

    }''

    SELECT JSON_VALUE(@json, ''$.RegularText'') RegularText ,

    JSON_VALUE(@json, ''$.LongText'') LongText

    Listing 9-12.

    Demonstrating how text that exceeds the character limit affects the JSON_VALUE()
    function output

    ```


    Note


    When a JSON key has an invalid character, such as a space, the key must be surrounded
    by double quotes (“”). For example, when key is Last Name the path argument will
    be:


    ```

    SELECT JSON_VALUE(@json, ''$."Last Name"'')

    ```


    ## 9-4\. Troubleshooting a Returned NULL


    ### Problem


    You want to troubleshoot why a JSON a scalar value is NULL.


    ### Solution


    Implementing the strict mode within JSON functions raises an error when a NULL
    is returned. Listing [9-13](#A435478_1_En_9_Chapter.html#Par52) demonstrates a
    query in strict mode. The error message is shown in Listing [9-14](#A435478_1_En_9_Chapter.html#Par201).


    ```

    SELECT JSON_VALUE([ReturnedDeliveryData], ''strict $.receivedby'') ReceivedBy

    FROM [Sales].[Invoices];

    Listing 9-13.

    Forcing a JSON_VALUE() function to raise an error

    ```


    ```

    Msg 13608, Level 16, State 5, Line 1

    Property cannot be found on the specified JSON path.

    Listing 9-14.

    Showing the error message

    ```'
