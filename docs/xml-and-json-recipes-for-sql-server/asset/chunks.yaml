    \n### 解决方案（续）\n\n您可能遇到需要通过 SQL 相关子查询生成分层 XML 的情况。例如，AdventureWorks 数据库中的产品类别可以有多个相关的子类别。假设您想要生成一个列出所有产品类别的\
