    to obtain original values. However, the returned values have an escape character,
    and to hide the escape character(s), a JSON_QUERY() function is called to fix
    the returned array. Table [10-4](#A435478_1_En_10_Chapter.html#Tab4) demonstrates
    a side-by-side comparison between the JSON with a single JSON_QUERY() function
