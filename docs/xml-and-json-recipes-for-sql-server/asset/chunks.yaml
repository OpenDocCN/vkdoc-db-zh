    ## 9-4. 对返回的 NULL 进行故障排除


    ### 问题


    你想对 JSON 标量值为 `NULL` 的原因进行故障排除。


    ### 解决方案


    在 JSON 函数中实现严格模式（strict mode）会在返回 `NULL` 时引发错误。清单 [9-13](#A435478_1_En_9_Chapter.html#Par52)
    演示了严格模式下的查询。错误消息如清单 [9-14](#A435478_1_En_9_Chapter.html#Par201) 所示。


    ```sql

