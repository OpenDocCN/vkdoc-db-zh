  trans: '## 9-6. 处理多级 JSON


    ### 解决方案


    要切分（shred）一个子对象，你需要在一个父级`OPENJSON(…) WITH(…)`块中设置对该子对象的引用。新的 JSON 实例将作为一个独立的子对象
    JSON 存在。演示的解决方案是一个与数据库无关的过程，可以在任何兼容级别（`COMPATIBILITY_LEVEL`）为 130 或更高的数据库上运行。完整的解决方案在`清单
    9-21`中展示。最终的查询结果如图`9-9`所示。


    ![A435478_1_En_9_Fig9_HTML.jpg](img/A435478_1_En_9_Fig9_HTML.jpg)

    图 9-9：显示最终结果


    ```sql

    SET NOCOUNT ON;

    DECLARE @JSON nvarchar(MAX),

    @schema nvarchar(30),

    @tbl nvarchar(128),

    @objID int

    DROP TABLE IF EXISTS dbo.Table_Info_JSON;

    CREATE TABLE Table_Info_JSON (

    TableID int PRIMARY KEY,

    DBName nvarchar(128),

    [SchemaName] nvarchar(30),

    tblName nvarchar(128),

    JSONDoc nvarchar(MAX)

    );

    DECLARE cur CURSOR FOR

    SELECT object_id, [Schema].name, [Table].name

    FROM sys.objects [Table]

    JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

    WHERE type = ''u'';

    OPEN cur ;

    FETCH NEXT FROM cur INTO @objID, @schema, @tbl;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    SELECT @JSON = (

    SELECT db_name() as ''Database'',

    [Schema].name as ''Tables.SchemaName'',

    [Table].name as ''Tables.TableName'',

    (SELECT [Column].name ColumnName FROM sys.columns [Column]

    WHERE [Column].object_id = [Table].object_id FOR JSON AUTO

    ) AS ''Tables.Columns''

    FROM sys.objects [Table]

    JOIN sys.schemas [Schema] on [Table].schema_id = [Schema].schema_id

    WHERE [Table].object_id = @objID

    FOR JSON PATH, WITHOUT_ARRAY_WRAPPER

    );

    INSERT Table_Info_JSON

    SELECT @objID, DB_NAME(), @schema, @tbl, @JSON;

    FETCH NEXT FROM cur INTO @objID, @schema, @tbl;

    END;

    DEALLOCATE cur;

    SET NOCOUNT OFF;

    SELECT db.[Database]    -- first level

    , tbl.SchemaName -- second level

    , tbl.TableName  -- second level

    , clmn.ColumnName -- third level

    FROM dbo.Table_Info_JSON

    CROSS APPLY OPENJSON (JSONDoc)

    WITH

    (

    [Database] varchar(30),

    [Tables] nvarchar(MAX) AS JSON

    ) as db

    CROSS APPLY OPENJSON ([Tables])

    WITH

    (

    TableName varchar(30),

    SchemaName varchar(30),

    [Columns] nvarchar(MAX) AS JSON

    ) as tbl

    CROSS APPLY OPENJSON ([Columns])

    WITH

    (

    ColumnName varchar(30)

    ) as clmn;

    ```

    `清单 9-21`：切分多个 JSON 子对象的解决方案


    ### 工作原理


    切分多级子对象 JSON 数据的机制是基于一个父子对象的引用集。要理解其工作原理，我们需要仔细查看`清单 9-22`中来自`Table_Info_JSON`表的
    JSON 文档。


    ```json

    {

    "Database": "WideWorldImporters",

    "Tables": {

    "SchemaName": "Warehouse",

    "TableName": "Colors",

    "Columns": [

    { "ColumnName": "ColorID" },

    { "ColumnName": "ColorName" },

    { "ColumnName": "LastEditedBy" },

    { "ColumnName": "ValidFrom" },

    { "ColumnName": "ValidTo" }

    ]

    }

    }

    ```

    `清单 9-22`：显示 JSON 文档


    示例`9-9`中显示的 JSON 文档有三个层级：

    *   顶级（Level 1）– 键 `"Database"`

    *   子级（Level 2）– 对象 `"Tables"`

    *   子级（Level 3）– 数组 `"Columns"`


    因此，在`FROM`子句中反映出的 JSON 结构如`清单 9-23`所示：


    ```sql

    FROM dbo.Table_Info_JSON

    CROSS APPLY OPENJSON (JSONDoc) <- reference to the table column

    WITH

    (

    [Database] varchar(30),

    [Tables] nvarchar(MAX) AS JSON

    ) as db

    CROSS APPLY OPENJSON ([Tables]) <- reference to [Tables] JSON object

    WITH

    (

    TableName varchar(30),

    SchemaName varchar(30),

    [Columns] nvarchar(MAX) AS JSON

    ) as tbl

    CROSS APPLY OPENJSON ([Columns]) <- reference to [Columns] JSON array

    WITH

    (

    ColumnName varchar(30)

    ) as clmn

    ```

    `清单 9-23`：显示`FROM`子句


    在`OPENJSON`函数的`WITH`子句中引用子级集合。子对象名称必须是`nvarchar(MAX)`数据类型，并设置为`AS JSON`对象。例如：`[Tables]
    nvarchar(MAX) AS JSON`。


    `SELECT`子句使用在`FROM`子句中创建的别名来交付结果：


    ```sql

    SELECT db.[Database]    -- first level

    , tbl.SchemaName -- second level

    , tbl.TableName  -- second level

    , clmn.ColumnName -- third level

    ```


    ## 9-7. JSON 索引


    ### 问题


    你想要通过索引来改进 JSON 过滤性能。


    ### 解决方案


    要为 JSON 文档创建索引，你需要为 JSON 标量值添加一个计算列，然后在此列上创建索引。`清单 9-24`演示了如何向现有表添加针对 JSON 值的索引。该索引是针对图`9-10`中所示的
    JSON 值创建的。


    ![A435478_1_En_9_Fig10_HTML.jpg](img/A435478_1_En_9_Fig10_HTML.jpg)

    图 9-10：显示 JSON 索引


    ```sql

    USE [WideWorldImporters];

    SET ANSI_NULLS ON;

    ALTER TABLE [Sales].[Invoices] ADD ConNote AS

    CAST(JSON_VALUE([ReturnedDeliveryData], ''$.Events[0].ConNote'') AS varchar(20))
    PERSISTED

    CREATE  INDEX IX_Sales_Invoices_ConNote

    ON [Sales].[Invoices]

    (

    [ConNote]

    )INCLUDE(

    [InvoiceDate]

    ,[DeliveryInstructions]

    ,[TotalDryItems]

    ,[TotalChillerItems]

    ,[ConfirmedDeliveryTime]

    ,[ConfirmedReceivedBy]

    );

    ```

    `清单 9-24`：为 JSON 键值`ConNote`创建索引'
- fmt: "### How It Works\n\nJSON is not treated as a data type in SQL Server, like\
    \ XML. It is more comparable to a structured string that has multiple values and\
    \ stores a table as an `nvarchar(max)` data type (if you follow Microsoft recommendations).\
    \ Therefore, a column that stores a JSON document cannot have a traditional index\
    \ as a scalar value table column. However, a scalar JSON value can be obtained\
    \ by a `JSON_VALUE()` scalar function, and this is the key to create an index\
    \ for a JSON document.\n\nCreating an index mechanism for a JSON document has\
    \ two steps:\n\n1.  Add a computed column to a table with a `JSON_VALUE()` function\
    \ that returns a scalar value from your JSON document. The computed column must\
    \ use the `PERSISTED` option. Also, you need to keep in mind that the `JSON_VALUE()`\
    \ function returns the `nvarchar(4000)` data type. Therefore, I recommend converting\
    \ the returned data length from a `JSON_VALUE()` function closer to the original\
    \ data length. For example:\n    ```sql\n    CAST(JSON_VALUE([ReturnedDeliveryData],\
    \ '$.Events[0].ConNote') AS varchar(20)) PERSISTED\n    ```\n\n2.  Create an index\
    \ on your computed column. When needed, the index can have an `INCLUDE` clause\
    \ to create a fully covering index.\n\nAn index for a JSON document can greatly\
    \ improve performance. Listing 9-25 demonstrates a query with a filter for computed\
    \ columns over the JSON key element `ConNote`.\n\n```sql\nSET STATISTICS IO,TIME\
    \ ON;\nSELECT [InvoiceDate]\n,[DeliveryInstructions]\n,[TotalDryItems]\n,[TotalChillerItems]\n\
    ,[ConfirmedDeliveryTime]\n,[ConfirmedReceivedBy]\n,[ConNote]\nFROM [Sales].[Invoices]\n\
    WHERE [ConNote] = 'EAN-125-1051';\nSET STATISTICS IO,TIME OFF;\n```\n*Listing\
    \ 9-25. Filtering the ConNote column*\n\nFigure 9-11 demonstrates “STATISTICS\
    \ IO, TIME” results and the execution plans for the query. Listing 9-26 is a comparison\
    \ of this query before and after index creation.\n\n![A435478_1_En_9_Figa_HTML.jpg](A435478_1_En_9_Figa_HTML.jpg)\n\
    \n```sql\n---- WITHOUT INDEX\nSQL Server parse and compile time:\nCPU time = 0\
    \ ms, elapsed time = 0 ms.\n(1 row(s) affected)\nTable 'Invoices'. Scan count\
    \ 9, logical reads 8843, physical reads 0, read-ahead reads 0, lob logical reads\
    \ 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'Worktable'. Scan count\
    \ 0, logical reads 0, physical reads 0, read-ahead reads 0, lob logical reads\
    \ 0, lob physical reads 0, lob read-ahead reads 0.\n(1 row(s) affected)\nSQL Server\
    \ Execution Times:\nCPU time = 94 ms,  elapsed time = 60 ms.\n```\n*Listing 9-26.\
    \ Comparing a query before and after the index*\n\n![A435478_1_En_9_Fig11_HTML.jpg](A435478_1_En_9_Fig11_HTML.jpg)\n\
    *Figure 9-11. Comparing the execution plans and STATISTICS results before and\
    \ after the index is created*\n\n```sql\n---- WITHOUT INDEX\nSQL Server parse\
    \ and compile time:\nCPU time = 0 ms, elapsed time = 0 ms.\n(1 row(s) affected)\n\
    Table 'Invoices'. Scan count 9, logical reads 8843, physical reads 0, read-ahead\
    \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
    Table 'Worktable'. Scan count 0, logical reads 0, physical reads 0, read-ahead\
    \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
    (1 row(s) affected)\nSQL Server Execution Times:\nCPU time = 94 ms,  elapsed time\
    \ = 60 ms.\n---- WITH INDEX\nSQL Server parse and compile time:\nCPU time = 0\
    \ ms, elapsed time = 0 ms.\n(1 row(s) affected)\nTable 'Invoices'. Scan count\
    \ 1, logical reads 3, physical reads 0, read-ahead reads 0, lob logical reads\
    \ 0, lob physical reads 0, lob read-ahead reads 0.\n(1 row(s) affected)\nSQL Server\
    \ Execution Times:\nCPU time = 0 ms,  elapsed time = 33 ms.\n```\n\nAs you can\
    \ see, performance is improved dramatically with index filtering.\n\n## Summary\n\
    \nSQL Server 2016 introduced JSON integration that pairs well with the latest\
    \ technologies. Chapter 9, “Converting JSON to Row Sets” covered the complete\
    \ set of SQL Server functions and plenty of examples to shred and deliver the\
    \ results from a JSON document.\n\nThe next chapter will demonstrate how to modify\
    \ the JSON document and as a final point will compare JSON and XML performance.\n\
    \n# 10. Modifying JSON\n\nTo insert, delete, and update data in a JSON document,\
    \ SQL Server 2016 introduced the `JSON_MODIFY()` function that updates a JSON\
    \ string value. This function, compared to XML `modify()` method, only has an\
    \ append mode, as opposed to the insert, delete, and instead of modes provided\
    \ by the XML method. Chapter 10 “Modifying JSON” will demonstrate many recipes\
    \ explaining how to update a JSON document. In the final section of this chapter,\
    \ I will compare the performance between XML and JSON.\n\n## 10-1. Adding a New\
    \ Key-Value Pair to JSON\n\n### Problem\n\nYou want to add a new key-value pair\
    \ to a JSON document.\n\n### Solution\n\nA `JSON_MODIFY()` function adds a new\
    \ key-value pair when a second argument path value does not exist in a JSON document.\
    \ Listing 10-1 demonstrates the query when the column `InvoiceDate` is modified\
    \ by the `JSON_MODIFY()` function, adding a new key “SentBy” with the value “John\
    \ Smith” to a JSON document. The result with both original (`InvoiceDate`) and\
    \ modified JSON document (`NewInvoice`) columns is shown in Figure 10-1.\n\n![A435478_1_En_10_Fig1_HTML.jpg](A435478_1_En_10_Fig1_HTML.jpg)\n\
    *Figure 10-1. Showing the query result*\n\n```sql\nSELECT CustomerName\n, PrimaryContact\n\
    , AlternateContact\n, PhoneNumber\n, InvoiceDate\n, JSON_MODIFY(InvoiceDate,'$.SentBy',\
    \ 'John Smith') NewInvoice\nFROM [dbo].[CustomerInvoice];\n```\n*Listing 10-1.\
    \ Adding a new key-value pair to a JSON document*\n\n### How It Works\n\nA `JSON_MODIFY()`\
    \ function returns an updated JSON document. There are three required arguments:\n\
    \n1.  **Expression** – name of a column, variable, or valid hard-coded JSON.\n\
    2.  **Path** – key path to a value. Supports the append mode only. For other actions,\
    \ such as insert and update, the function works in self-defined mode.\n3.  **NewValue**\
    \ – the value that replaces existing or added as new to JSON.\n\nTo add a new\
    \ key-value pair, you do not need to specify a special mode. For example, to insert\
    \ a new value, you can use the `JSON_MODIFY()` function, which is self-defined,\
    \ meaning if a path contains an existing key, then the value is updated. When\
    \ a key does not exist, a new key-value pair is added to the JSON string.\n\n\
    In the Solution section, in Listing 10-1, the column `InvoiceDate` is first checked\
    \ by the `JSON_MODIFY()` function for existence of the key “SentBy.” For example:\
    \ `JSON_MODIFY(InvoiceDate,'$.SentBy', 'John Smith')`. In the column this key\
    \ was not found. Therefore, the function added a new key “SentBy” with the value\
    \ “John Smith.”\n\n## 10-2. Updating Existing JSON\n\n### Problem\n\nYou want\
    \ to change the value for an existing key.\n\n### Solution\n\nA `Path` argument\
    \ for the `JSON_MODIFY()` function must exist within a JSON document. Listing\
    \ 10-2 demonstrates the query when the key “Title” and value “Team Member” are\
    \ modified to “Manager.” Figure 10-2 shows the original and modified JSON documents.\n\
    \n![A435478_1_En_10_Fig2_HTML.jpg](A435478_1_En_10_Fig2_HTML.jpg)\n*Figure 10-2.\
    \ Comparing query output*\n\n```sql\nSELECT CustomFields\n,JSON_MODIFY(CustomFields,'$.Title',\
    \ 'Manager') NewCustomFields\nFROM [Application].[People]\nWHERE FullName = 'Hudson\
    \ Onslow';\n```\n*Listing 10-2. Modifying a JSON document*"
