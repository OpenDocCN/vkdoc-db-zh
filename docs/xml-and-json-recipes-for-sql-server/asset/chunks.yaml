    \ 展示了当存在 `PROPERTY` 索引时，使用 XQuery 的优势。\n\n```\nSELECT PersonID,\nref.value('declare\
    \ default element namespace \"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/IndividualSurvey\"\
    ;\nTotalPurchaseYTD[1]', 'money') TotalPurchase,\nref.value('declare default element\
