    \ Figure [3-1](#A435478_1_En_3_Chapter.html#Fig1) illustrates the BCP utility\
    \ output.\n\n![A435478_1_En_3_Fig1_HTML.jpg](A435478_1_En_3_Fig1_HTML.jpg)\n\n\
    Figure 3-1.\n\nShowing the BCP utility completion status\n\nIf you need to hide\
    \ the completion output status, then add the following code to the stored procedure\
