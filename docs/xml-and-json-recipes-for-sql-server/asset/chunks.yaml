    \ = Location.LocationID\nWHERE Product.ProductID = Inventory.ProductID\nFOR XML\
    \ PATH('LocationName'), TYPE\n) AS \"Locations/node()\",\nSubcategory.Name AS\
    \ \"Category/Subcategory/SubcategoryName\",\nProduct.Name AS \"Category/Subcategory/Product/ProductName\"\
    ,\nProduct.Color AS \"Category/Subcategory/Product/Color\",\nInventory.Shelf AS\
    \ \"Category/Subcategory/Product/ProductName/@Shelf\",\nInventory.Bin AS \"Category/Subcategory/Product/ProductName/@Bin\"\
    ,\nInventory.Quantity AS \"Category/Subcategory/Product/ProductName/@Quantity\"\
    \nFROM Production.Product Product\nINNER JOIN Production.ProductInventory Inventory\n\
    ON Product.ProductID = Inventory.ProductID\nINNER JOIN Production.ProductSubcategory\
    \ Subcategory\nON Product.ProductSubcategoryID = Subcategory.ProductSubcategoryID\n\
    INNER JOIN Production.ProductCategory\nON Subcategory.ProductCategoryID = Production.ProductCategory.ProductCategoryID\n\
    ORDER BY ProductCategory.Name, Subcategory.Name, Product.Name\nFOR XML PATH('Categories'),\
    \ ELEMENTS XSINIL, ROOT('Products');\n```\n清单 2-28. 演示 XPath 节点测试\n\n注意\n\nXPath\
    \ 节点测试名称区分大小写。因此，所有节点测试名称必须以小写字母输入，否则 SQL 将引发错误。例如，当函数 `text()` 被输入为 `Text()`\
    \ 时，会抛出类似于以下的错误：Msg 6850, Level 16, State 1 … Column name ‘Text()’ contains an\
    \ invalid XML identifier as required by FOR XML; …"
- fmt: "### How It Works\n\nWhen XPath node tests are used in `PATH` mode, they add\
    \ a special node to your XML result. The node test is always located at the end\
    \ of an XPath column alias. For example, in the `“Category/comment()”` path or\
    \ the `“processing-instruction(xml:file)”` path. Additionally, the node test can\
    \ be used as the column alias alone, without a hierarchy path. Table 2-2 lists\
    \ the supported `FOR XML PATH` XPath node tests.\n\nTable 2-2. XPath node tests\n\
    \n| Node type | Node Returns | Node Example |\n| --- | --- | --- |\n| `comment()`\
    \ | Returns a comment node. | `element/comment()` selects all the comment nodes\
    \ that appear after the context node. |\n| `node()` | Returns a node of any type.\
    \ Useful to add subset XML to result. | `element/node()` selects all the nodes\
    \ that appear before the context node. |\n| `processing-instruction(name)` | Returns\
    \ a processing instruction node. | `processing instruction(PI Name)` selects all\
    \ the processing instruction nodes within the context node. |\n| `text()` | Returns\
    \ a text node. Useful to combine more than one column into one XML element. |\
    \ `element/text()` selects the text nodes that are children of the context node.\
    \ |\n\nReviewing the code in Listing 2-28, we see the following:\n\n1.  To generate\
    \ a comment under the `<CategoryName>` element, the path is provided in the alias\
    \ with the `comment()` node test. The resulting XML maps the data row into the\
    \ special comment tag `<!--comment-->` in your XML result. From our sample code:\n\
    \    ```sql\n    N'Sales started' + convert(nvarchar(12), Product.SellStartDate,\
    \ 101) AS \"Category/comment()\"\n    ```\n\n2.  The `processing-instruction(name)`\
    \ node test must have a target name inside its parentheses. If the target name\
    \ is not provided, an error will be thrown. This function creates a special XML\
    \ node of the format `<?name ?>`. For example:\n    ```sql\n    N'The record for\
    \ product number ' + Product.ProductNumber AS \"processing-instruction(xml:file)\"\
    \n    ```\n\n3.  The `text()` node test is very helpful when you need to concatenate\
    \ multiple columns into a single element. For example:\n    ```sql\n    SELECT\
    \ DISTINCT Location.Name \"text()\", ', cost rate $',\n    Location.CostRate \"\
    text()\"\n    ```\n\n4.  The `node()` node test is useful when you need to insert\
    \ values in the XML data type. In Listing 2-28, the correlated subquery performs\
    \ two actions. Firstly, it concatenates the location and cost rate columns; secondly,\
    \ it produces an XML result, because the product can have more than one associated\
    \ location. Figure 2-6 demonstrates all the XPath node test functions in one XML\
    \ result.\n    ![A435478_1_En_2_Fig6_HTML.jpg](A435478_1_En_2_Fig6_HTML.jpg)\n\
    \    Figure 2-6. XML result with all XPath node test functions\n\n## Summary\n\
    \nThis chapter discusses the four `FOR XML` modes: `RAW`, `AUTO`, `EXPLICIT`,\
    \ and `PATH`. Each mode is thoroughly explained and suggestions for the best mode\
    \ to use in particular situations, with tips on how to implement each mode. I\
    \ also discussed directives, their functions, and how each directive interacts\
    \ with the various XML modes. If you need to build a custom XML result, this chapter\
    \ provided direction on how to build a robust custom XML data.\n\nThe `FOR XML`\
    \ clause provides the user with great and powerful options for efficiently building\
    \ XML results from relational data. The chart in Figure 2-7 illustrates the directives\
    \ supported by each of the `FOR XML` modes.\n![A435478_1_En_2_Fig7_HTML.gif](A435478_1_En_2_Fig7_HTML.gif)\n\
    Figure 2-7. `FOR XML` directives available by mode\n\nThe next chapter demonstrates\
    \ how to store the XML result on the storage (disk, SSD drive, SAN, etc) and how\
    \ to upload an XML file into a table.\n\n# 3. Manipulating XML Files\n\nIn Chapter\
    \ 2, we discussed how to build XML from an SQL query result set. Before we begin\
    \ reviewing the options on how to shred XML data, we first need to know how to\
    \ store the XML result on the storage (disk, SSD drive, SAN, etc.) and how to\
    \ upload an XML file into a table. This chapter will demonstrate the various options\
    \ to manipulate the XML files.\n\n## 3-1. Storing XML Result in a File from SQL\n\
    \n### Problem\n\nYou want to store the XML result you generate in SQL as an `.xml`\
    \ file.\n\n### Solution\n\nThe `BCP` (bulk copy program) utility allows the export\
    \ of data into an XML file. When the file path is eligible and the SQL Server\
    \ account has enough privileges to store the file, then the process can be executed\
    \ from the stored procedure. Listing 3-1 demonstrates how the stored procedure\
    \ creates an XML file using the provided file path in the `@FilePath` parameter.\n\
    \n```sql\nCREATE PROCEDURE dbo.usp_WriteXMLFile\n@XML XML,\n@FilePath nvarchar(200)\n\
    AS\nBEGIN\nSET NOCOUNT ON;\nIF (OBJECT_ID('tempdb..##XML') IS NOT NULL)\nDROP\
    \ TABLE ##XML;\nCREATE TABLE ##XML (XMLHolder XML);\nINSERT INTO ##XML\n(\nXMLHolder\n\
    )\nSELECT @XML;\n-- Prepare log table\nDECLARE @cmd TABLE\n(\nname NVARCHAR(35),\n\
    minimum INT,\nmaximum INT,\nconfig_value INT,\nrun_value INT\n);\nDECLARE @run_value\
    \        INT;\n-- Save original configuration set\nEXECUTE master.dbo.sp_configure\
    \ 'show advanced options', 1;\nRECONFIGURE ;\nINSERT INTO @cmd\n(\nname,\nminimum,\n\
    maximum,\nconfig_value,\nrun_value\n)\nEXECUTE sp_configure 'xp_cmdshell';\nSELECT\
    \ @run_value = run_value\nFROM @cmd;\nIF @run_value = 0\nBEGIN\n-- Enable xp_cmdshell\n\
    EXEC sp_configure 'xp_cmdshell', 1;\nRECONFIGURE;\nEND;\nDECLARE @SQL nvarchar(300)\
    \ = '';\nSET @SQL = 'bcp ##XML out \"' + @FilePath + '\\Categories_'\n+ FORMAT(GETDATE(),\
    \ N'yyyyMMdd_hhmmss')\n+ '.xml\" -S \"' + @@SERVERNAME + '\" -T -c';\n-- REPLACE(REPLACE(REPLACE(CONVERT(varchar(20),\
    \ GETDATE(), 120), '-', ''), ' ', '_'), ':', '')\n-- for those who still using\
    \ SQL Server 2008 R2 or below, use REPLACE instead of FORMAT. FORMAT function\
    \ introduced in SQL 2012.\nEXECUTE master..xp_cmdshell @SQL;\nIF @run_value =\
    \ 0\nBEGIN\n-- Disable xp_cmdshell\nEXECUTE sp_configure 'xp_cmdshell', 0;\nRECONFIGURE;\n\
    END;\nIF (OBJECT_ID('tempdb..##XML') IS NOT NULL)\nDROP TABLE ##XML;\nSET NOCOUNT\
    \ OFF;\nEND;\nGO\n```\nListing 3-1. Using the stored procedure to write an XML\
    \ file by destination file path"
