- fmt: "# How It Works\n\nBefore we shred the XML, the first step is to determine\
    \ the XML structure and which elements and attributes will be a part of the result\
    \ set. This can be done on the AdventureWorks database executing SQL to analyze\
    \ the XML data as shown in Listing 4-2.\n\n```sql\nSELECT Instructions\nFROM Production.ProductModel\n\
    WHERE ProductModelID = 7;\n```\n*Listing 4-2. Query to retrieve sample XML instructions\
    \ for one product model*\n\nThe XML result is too large to display in a book page.\
    \ For this reason, the XML snippet in Listing 4-3 has been formatted for demonstration\
    \ purposes.\n\n```xml\n<root xmlns=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelInstructions\"\
    >\n  <Adventure Works CyclesFR-210B Instructions....</Description>\n  <Location\
    \ LocationID=\"10\" LaborHours=\"0.5\" ...>\n    <step>...</step>\n    <step>\n\
    \      <material>aluminum sheet MS-2341</material>\n      <tool>T-85A framing\
    \ tool</tool>\n    </step>\n    ...\n  </Location>\n</root>\n```\n*Listing 4-3.\
    \ XML Snippet demonstrating the result data*\n\n## Data Preparation\n\nThe `<root>`\
    \ element has a namespace that must be part of the XML initialization of the `OPENXML`\
    \ function. Therefore, several variables were declared. The purpose for these\
    \ variables is the following:\n\n1.  `@xml` (`XML`) – Retrieve the XML data as\
    \ a single unit from the table.\n2.  `@idoc` (`INT`) – Store the returned document\
    \ handle from the `sp_xml_preparedocument` system stored procedure to allow `OPENXML`\
    \ to access the XML data.\n3.  `@ns` (`VARCHAR`(200)) – Store the XML namespace\
    \ to supply to the `sp_xml_preparedocument` system stored procedure, and the parameter\
    \ `xpath_namespaces` to specify the namespace declaration.\n\n> **Note**\n> When\
    \ XML has a namespace, the namespace cannot be avoided. The `OPENXML` function\
    \ will not return the result set when the namespace is not declared and specified\
    \ in the `sp_xml_preparedocument` system stored procedure. The namespaces help\
    \ to avoid name conflict and uniquely identify the elements and attributes in\
    \ the XML data.\n\nThe value assigned to the `@ns` variable needs more clarification.\
    \ In Listing 4-1, the namespace declaration in the `<root>` element is a little\
    \ different from the one assigned to the `@ns` variable. The root element namespace\
    \ looks like Listing 4-4.\n\n```xml\nxmlns=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelInstructions\"\
    \n```\n*Listing 4-4. Namespace declaration in the `<root>` element*\n\nThe `@ns`\
    \ variable namespace declaration in the sample code looks slightly different,\
    \ as shown in Listing 4-5.\n\n```sql\n@ns = 'xmlns:df=\"http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/ProductModelInstructions\"\
    '\n```\n*Listing 4-5. `@ns` variable namespace declaration*\n\nThe value of the\
    \ variable `@ns` has an extra part `xmlns:df=…`, where the `df` (short for “default”)\
    \ can specify any alias. The most commonly used alias is `ns`. The namespace is\
    \ used as a reference to the elements of the `OPENXML` function. In simple terms,\
    \ it’s the same reference as if the `ProductModel` table were referenced without\
    \ the schema “Production.” We must use `Production.ProductModel` to provide a\
    \ reference to the table; otherwise SSMS will throw an error: “object not found.”\
    \ The main difference is that the XML parser will not raise an error and will\
    \ simply ignore the elements and the element’s attributes. Therefore, no results\
    \ will be returned.\n\nThe code in Listing 4-6 builds on Listing 4-2 by assigning\
    \ the result to an `XML` variable:\n\n```sql\nSELECT @xml = Instructions\nFROM\
    \ Production.ProductModel\nWHERE ProductModelID = 7;\n```\n*Listing 4-6. Assigning\
    \ XML sample data to an XML variable*\n\nThe system stored procedure `sp_xml_preparedocument`\
    \ uses the MSXML parser (`Msxmlsql.dll`) to parse the XML data, and returns a\
    \ numeric (`INT` data type) value that provides a pointer (variable `@doc`) to\
    \ access the XML.\n\nThe stored procedure `sp_xml_preparedocument` has three parameters:\n\
    \n1.  `@hdoc` (`INT` OUTPUT) – required, integer data type.\n2.  `@xmltext` (`NTEXT`)\
    \ – required, can be any textual data type (`VARCHAR`, `NVARCHAR`, `XML`, `TEXT`,\
    \ or `NTEXT`). The data type used must be implicitly convertible to the legacy\
    \ `NTEXT` data type; so `VARBINARY` is not allowed.\n3.  `@xpath_namespaces` (`NTEXT`)\
    \ – optional, can be any textual data type (`VARCHAR`, `NVARCHAR`, `XML`, `TEXT`,\
    \ `NTEXT`, or `XML`). Note the type conversion restrictions on this parameter\
    \ are the same as for the `@xmltext` parameter.\n\nWhen the XML document is loaded\
    \ into the memory after the stored procedure `sp_xml_preparedocument` is executed\
    \ and returned, the XML document handler (memory pointer) returns the value by\
    \ outputting value into an `@doc` variable, as demonstrated in Listing 4-7.\n\n\
    ```sql\nEXECUTE sp_xml_preparedocument @doc OUTPUT, @xml, @ns;\n```\n*Listing\
    \ 4-7. Calling the `sp_xml_preparedocument` procedure*\n\n## OPENXML Function\n\
    \nNow the process is ready to convert the XML document into a relational result\
    \ set. The query that returns the result set has three parts:\n\n*   `SELECT`\
    \ clause – delivers the result to the user.\n*   `OPENXML` function – provides\
    \ access to the XML document and sets the XPath to the startup element.\n*   `WITH`\
    \ construct – defines the table that describes each element and attribute that\
    \ form the XML data.\n\nThe XML shredding process starts with the `OPENXML` function.\
    \ The `OPENXML` function has three input parameters:\n\n*Table 4-1. Listing values\
    \ for the `@flags` parameter*\n\n| Flag | Description |\n| --- | --- |\n| 0 |\
    \ Defaults to attribute-centric mapping. |\n| 1 | Specifies attribute-centric\
    \ mapping of the data. |\n| 2 | Specifies element-centric mapping of the data.\
    \ |\n| 8 | Can be combined with flag 1 or flag 2, with the bitwise OR operator.\
    \ This flag indicates that the consumed data should not be copied to the overflow\
    \ property `@mp:xmltext`. |\n\n1.  `@idoc` (`INT`) – [required] is an internal\
    \ representation of an XML document that is created by executing the `sp_xml_preparedocument`\
    \ stored procedure.\n2.  `@rowpattern` (`NVARCHAR`) – [required] is the XPath\
    \ pattern that identifies the startup element.\n3.  `@flags` (`TINYINT`) – [optional]\
    \ indicates the mapping for the XML document. The flag values are listed in Table\
    \ 4-1.\n\nThe `OPENXML` function is part of the `FROM` clause because the XML\
    \ data is the data source. Listing 4-1 demonstrated the `OPENXML` function set\
    \ with the values in the `FROM` clause: `FROM OPENXML(@idoc, 'df:root/df:Location/df:step',\
    \ 2)`.\n\nThe first parameter is straightforward output from the stored procedure\
    \ `sp_xml_preparedocument`, where we provide the function with output that is\
    \ stored in the variable. The XPath pattern is not intuitive, and requires detailed\
    \ XML structure analysis. Let’s remove the data from the XML that is shown in\
    \ Sample 4-1, to isolate and analyze the structure, as shown in Listing 4-8.\n\
    \n```xml\n<root xmlns=\"...\">\n  <Location LocationID=\"10\" ...>\n    <step>\n\
    \      <material>...</material>\n      <tool>...</tool>\n    </step>\n    <step>\n\
    \      <material>...</material>\n      <tool>...</tool>\n    </step>\n  </Location>\n\
    </root>\n```\n*Listing 4-8. Showing snippet of bare XML structure*\n\nThe rule\
    \ that I am using to properly define XPath and shred the XML is this:\n\n*   When\
    \ the same child element is listed more than once, the XPath pattern must point\
    \ to that element.\n*   The hierarchy for the `<step>` element is: `root/Location/step`.\n\
    *   This analysis is very important to specify an efficient XPath for the `OPENXML`\
    \ function. The query from Listing 4-1 returns the result where the `LaborStation`\
    \ attribute (property of the `Location` element) with value “10” has 6 steps in\
    \ this particular example, however the number of steps can vary. The element hierarchy\
    \ from Listing 4-8 is `root/Location/step/`, so both `<material>` and `<tool>`\
    \ are the child step elements, and they each contain a single text node. Therefore,\
    \ XPath `root/Location/step` will satisfy the `@rowpattern` parameter for an `OPENXML`\
    \ function. Later, we will provide a precise path for each element and attribute\
    \ data cell in the `WITH` construct.\n\nFor the optional parameter `@flags` we\
    \ have provided a value of `2`, because the XPath final point `<step>` is an element,\
    \ and the `<Location>` element has several attributes that will be part of the\
    \ result set. This combination of element-centric and attribute-centric properties\
    \ is the best scenario for `@flags = 2`.\n\nThe `WITH` construct provides the\
    \ specification for the resulting output. The XML is hierarchical data, so in\
    \ order to retrieve a specific element and attribute, we need to provide a precise\
    \ source data location. In most cases the source data is located outside of the\
    \ location that is specified for the `@rowpattern` parameter.\n\nThe hierarchical\
    \ structure of XML data can be compared to the Windows folder/file structure.\
    \ Imagine navigating the folder structure. In simple terms, if you need to copy\
    \ several files from different folders into a new folder, then you are navigating\
    \ from one folder to another to collect all needed files. Therefore, the `WITH`\
    \ construct builds the table that will return the collected data from elements\
    \ and attributes. Unlike the tables, the `WITH` construct has a column name, datatype,\
    \ and the XML item location path. The `WITH` construct from Listing 4-1, reproduced\
    \ in Listing 4-9, defines the shape.\n\n```sql\nWITH (\n    LaborStation INT '../@LocationID',\n\
    \    LaborHours REAL '../@LaborHours',\n    LotSize INT '../@LotSize ',\n    MachineHours\
    \ REAL '../@MachineHours ',\n    SetupHours REAL '../@SetupHours ',\n    Material\
    \ VARCHAR(100) 'df:material',\n    Tool VARCHAR(100) 'df:tool',\n    StepInstruction\
    \ VARCHAR(2000) '.'\n)\n```\n*Listing 4-9. `WITH` clause defining XML structure*\n\
    \nThe `LocationID`, `LaborHours`, `LotSize`, and `MachineHours` are attributes\
    \ of the `<Location>` element (see Listing 4-3), which is the parent of the `<step>`\
    \ element. To retrieve the data from these attributes, we need to move one level\
    \ up from the `<step>` element, because the `OPENXML` function is set to the `<step>`\
    \ element, which is one step below. In order to have XML read the proper step\
    \ and account for it reading one step below, you must move one step above. The\
    \ “LaborStation” is an alias for the `LocationID` attribute, and the data type\
    \ is `INT` because `LocationID` is a whole number. The path structure for `'../@LocationID'`\
    \ value means:\n\n*   `\"../\"` - move one level up from current location.\n*\
    \   `\"@\"` - specifies that this is an attribute.\n*   `LocationID` – is the\
    \ original attribute name.\n\nThe same mechanism applies to other `LaborHours`,\
    \ `LotSize`, and `MachineHours` attributes.\n\nThe `<material>` and `<tool>` elements\
    \ are both children of the `<step>` element. Therefore, we need to move down to\
    \ access the elements’ data, for example:\n\n*   `Material` - element alias.\n\
    *   `VARCHAR(100)` - presented data type.\n*   `'df:material'` – `df:` namespace\
    \ reference, and `material` is the element name.\n\nThe last column is `StepInstruction`,\
    \ where the data type is `VARCHAR`(2000), and `' . '` means that the current context\
    \ node is the final element from the XPath `rowpattern` parameter.\n\nThe `SELECT`\
    \ clause returns the following columns, which are aliased in the `WITH` construct:\n\
    \n*   `StepInstruction` – alias for the `<step>` element.\n*   `LaborStation`\
    \ – alias for the `LocationID` attribute.\n*   `LaborHours` – alias for the `LaborHours`\
    \ attribute.\n*   `LotSize` – alias for the `LotSize` attribute.\n*   `MachineHours`\
    \ – alias for the `MachineHours` attribute.\n*   `SetupHours` – alias for the\
    \ `SetupHours` attribute.\n*   `Material` – alias for the `<material>` element.\n\
    *   `Tool` – alias for the `<tool>` element.\n\n## Memory Deallocation\n\nFinally,\
    \ we need to deallocate the XML document from the memory. The stored procedure\
    \ `sp_xml_removedocument` removes the XML document when we set the XML handler\
    \ to the required parameter:\n\n```sql\nEXECUTE sp_xml_removedocument @idoc;\n\
    ```\n\n> **Caution**\n> SQL Server does not provide garbage collection for XML\
    \ documents processed by the `sp_xml_preparedocument` stored procedure. The XML\
    \ document is stored in the internal cache of SQL Server, and the MSXML parser\
    \ uses one-eighth of the total memory available for SQL Server. Therefore, memory\
    \ deallocation must be set explicitly by the `sp_xml_removedocument` stored procedure.\
    \ Otherwise, the server will have a memory leak problem and will periodically\
    \ restart the procedure, which requires server memory."
