  trans: "\n## 工作原理\n\n主 XML 索引会将所有 XML 数据分解为关系格式，而选择性 XML 索引则不会这样做。对于大型 XML 实例，主\
    \ XML 索引可能会占用大量空间并消耗服务器资源。选择性 XML 索引则针对一个或多个路径中指定的值进行操作。这在许多情况下可以使选择性 XML 索引比主\
    \ XML 索引小得多。创建选择性 XML 索引的语法比创建主 XML 索引的语法更复杂。例如，清单 7-16 中演示的选择性 XML 索引，在 FOR 子句中标识了两条\
    \ XQuery 路径，指向两个深度嵌套的元素节点；即：\n\n*   `Quantity`\n*   `ProductName`\n\n选择性 XML 索引路径必须是完全限定且完整的路径，即，路径不允许使用缩写。该索引包含由这些路径标识的节点。清单\
    \ 7-17 展示了一个示例 XML 片段，其中说明了在选择性 XML 索引路径中标识的 `Quantity` 和 `ProductName` 元素节点的\
    \ XML 路径。\n\n**清单 7-17.** 来自上一个示例的 XML 片段示例\n\n![A435478_1_En_7_Figa_HTML.gif](img/A435478_1_En_7_Figa_HTML.gif)\n\
    \n清单 7-18 中的查询是在创建选择性 XML 索引之前运行的。结果如图 7-10 所示（时间统计），其执行计划如图 7-11 所示。\n\n![A435478_1_En_7_Fig11_HTML.jpg](img/A435478_1_En_7_Fig11_HTML.jpg)\n\
    **图 7-11.** 索引创建前的执行计划\n\n![A435478_1_En_7_Fig10_HTML.jpg](img/A435478_1_En_7_Fig10_HTML.jpg)\n\
    **图 7-10.** 显示索引创建前的时间统计\n\n```sql\nSET STATISTICS TIME ON;\nSELECT ProductID,\
    \ Name, ProductNumber, ProductDetails\nFROM dbo.ProductXML\nWHERE ProductDetails.exist('Products/Categories/Category/Subcategory/Product/ProductLocation/Quantity[.=\"\
    622\"]') = 1;\nSET STATISTICS TIME OFF;\n```\n**清单 7-18.** 展示示例查询\n\n在创建了索引 `IX_SELECTIVE_XML_ProductXML`\
    \ 之后，清单 7-19 中的查询生成了更高效的运行时和执行计划，如图 7-12 和图 7-13 所示。\n\n![A435478_1_En_7_Fig13_HTML.jpg](img/A435478_1_En_7_Fig13_HTML.jpg)\n\
    **图 7-13.** 显示创建选择性 XML 索引后执行计划的改进\n\n![A435478_1_En_7_Fig12_HTML.jpg](img/A435478_1_En_7_Fig12_HTML.jpg)\n\
    **图 7-12.** 显示改进的时间统计\n\n```sql\nSET STATISTICS TIME ON;\nSELECT ProductID, Name,\
    \ ProductNumber, ProductDetails\nFROM dbo.ProductXML\nWHERE ProductDetails.exist('Products/Categories/Category/Subcategory/Product/ProductLocation/Quantity[.=\"\
    622\"]') = 1;\n```\n**清单 7-19.** 创建选择性 XML 索引后运行的示例查询\n\n在没有 `XMLNAMESPACES` 的\
    \ XML 实例的 XML 列上创建 `SELECTIVE XML` 索引的语法包含以下部分：\n\n```sql\nCREATE SELECTIVE XML\
    \ INDEX \nON \n()\nFOR ( Path_name1 = 'XML path',\nPath Name2 = 'XML path',\n\
    Path Name3 = 'XML path')\n```\n\n当 XML 列存储带有 `XMLNAMESPACES` 的 XML 实例时，必须在 `CREATE\
    \ SELECTIVE INDEX` 语句中声明 `XMLNAMESPACE`。例如，如果你想改进对 `HumanResources.JobCandidate`\
    \ 表的 `Resume` 列的搜索。清单 7-20 展示了如何查询带有命名空间的 XML 列。\n\n```sql\nWITH XMLNAMESPACES('http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/Resume'\
    \ as ns)\nSELECT JobCandidateID, Resume\nFROM HumanResources.JobCandidate\nWHERE\
    \ Resume.exist('/ns:Resume/ns:Name/ns:Name.First[.=\"Stephen\"]') = 1\n```\n**清单\
    \ 7-20.** 用于搜索求职者的 SQL 代码\n\n清单 7-21 演示了如何在 `HumanResources.JobCandidate` 表的 `Resume`\
    \ 列上创建选择性 XML 索引。图 7-14 显示了在创建选择性 XML 索引后，清单 7-19 中查询的 SQL 执行计划。\n\n![A435478_1_En_7_Fig14_HTML.jpg](img/A435478_1_En_7_Fig14_HTML.jpg)\n\
    **图 7-14.** 显示创建选择性 XML 索引后的 SQL 执行计划\n\n```sql\nCREATE SELECTIVE XML INDEX IX_SELECTIVE_XML_HumanResources_JobCandidate\n\
    ON [HumanResources].[JobCandidate]\n(\n[Resume]\n)\nWITH XMLNAMESPACES\n(\nDEFAULT\
    \ 'http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/Resume'\n)\n\
    FOR\n(\nLastName = '/Resume/Name/Name.Last'\n,FirstName = '/Resume/Name/Name.First'\n\
    );\n```\n**清单 7-21.** 在包含 `XMLNAMESPACE` 的列上创建 `SELECTIVE XML INDEX` 的语句\n\n在带有\
    \ `XMLNAMESPACES` 的 XML 实例的 XML 列上创建选择性 XML 索引的语法包含以下部分：\n\n```sql\nCREATE SELECTIVE\
    \ XML INDEX \nON \n()\nWITH XMLNAMESPACES(DEFAULT 'XMLNAMESPACE URI')\nFOR ( Path_Name1\
    \ = 'XML path',\nPath_Name2 = 'XML path',\nPath_Name3 = 'XML path')\n```\n\n创建选择性\
    \ XML 索引的优势在于，你可以实现一个或多个 XML 路径，以专注于你的搜索条件中主要使用的 XML 值。\n\n> **注意**\n> 微软建议优先设置选择性\
    \ XML 索引。但是，如果你的选择性 XML 索引映射了许多路径，那么 `PRIMARY` XML 索引可能是更好的选择。\n\n### 7-6 优化选择性\
    \ XML 索引\n\n#### 问题\n\n你想优化选择性 XML 索引的性能。\n\n#### 解决方案\n\n实现提示可以优化选择性 XML 索引。清单\
    \ 7-22 演示了选择性 XML 索引的不同提示。\n\n```sql\nCREATE SELECTIVE XML INDEX IX_SELECTIVE_XML_ProductXML_Hint_Sample\n\
    ON dbo.ProductXML\n(\nProductDetails\n)\nFOR\n(\nSubcategoryName = '/Products/Categories/Category/Subcategory/SubcategoryName'\
    \ AS XQUERY 'node()',\nShelf = '/Products/Categories/Category/Subcategory/Product/ProductLocation/Shelf',\n\
    Bin = '/Products/Categories/Category/Subcategory/Product/ProductLocation/Bin'\
    \ AS XQUERY 'xs:double' SINGLETON,\nProductName = '/Products/Categories/Category/Subcategory/Product/ProductName'\
    \ AS SQL nvarchar(40),\nCategoryName = '/Products/Categories/Category/CategoryName'\
    \ AS XQUERY 'xs:string' MAXLENGTH(35)\n);\n```\n**清单 7-22.** 测试选择性 XML 索引的不同提示\n"
- fmt: "### How It Works\n\n选择性 XML 索引提示分为两种：\n\n* `SQL Server` – 面向 SQL 数据类型映射。例如：`PathName`\
    \ = ‘/root/element’ AS SQL nvarchar(40)\n* `XQUERY` – 面向 XQuery 数据类型映射。例如：`PathName`\
    \ = ‘/root/element’ AS XQUERY ‘xs:string’\n\n表 `[7-1](#A435478_1_En_7_Chapter.html#Tab1)`\
    \ 描述了可用于改进选择性 XML 索引的优化提示。\n\n表 7-1.\n选择性 XML 索优化提示说明\n\n| 优化提示 | 适用于 | 提示说明 |\n\
    | --- | --- | --- |\n| `node()` | XQuery | 减少所需的存储空间。检查节点是否存在。 |\n| `SINGLETON`\
    \ | XQuery 和 SQL Server | 确保该组只有一个实例，以便可以据此优化索引。请避免后续添加其他实例，因为这可能导致问题。 |\n| `DATA\
    \ TYPE` | XQuery | 使用数据类型优化索引。如果某些内容破坏了数据类型，则可能会出现问题，索引中将显示 null。 |\n| `MAXLENGTH`\
    \ | XQuery | 查看 XQuery 类型 `xs:string` 并使用允许的字符串最大值来优化索引很有帮助。但是，如果现有字符串长于指定的 `MAXLENGTH`，则可能会导致问题，因为索引可能会失败。\
    \ |\n\n表 `[7-2](#A435478_1_En_7_Chapter.html#Tab2)` 列出了在类型化和非类型化 XML 列上创建的选择性\
    \ XML 索引提示可用的 XQuery 数据类型。\n\n表 7-2.\n提示可用的 XQuery 数据类型\n\n| 类型化 XML | 非类型化 XML\
    \ |\n| --- | --- |\n| `xs:anyUri` |   |\n| `xs:boolean` | `xs:boolean` |\n| `xs:date`\
    \ | `xs:date` |\n| `xs:dateTime` | `xs:dateTime` |\n| `xs:day` |   |\n| `xs:decimal`\
    \ |   |\n| `xs:double` | `xs:double` |\n| `xs:float` |   |\n| `xs:int` |   |\n\
    | `xs:integer` |   |\n| `xs:language` |   |\n| `xs:long` |   |\n| `xs:name` |\
    \   |\n| `xs:NCName` |   |\n| `xs:negativeInteger` |   |\n| `xs:nmtoken` |   |\n\
    | `xs:nonNegativeInteger` |   |\n| `xs:nonPositiveInteger` |   |\n| `xs:positiveInteger`\
    \ |   |\n| `xs:qname` |   |\n| `xs:short` |   |\n| `xs:string` | `xs:string` |\n\
    | `xs:time` | `xs:time` |\n| `xs:token` |   |\n| `xs:unsignedByte` |   |\n| `xs:unsignedInt`\
    \ |   |\n| `xs:unsignedLong` |   |\n| `xs:unsignedShort` |   |\n\n当提示应用于索引时，选择性\
    \ XML 索引可以获得益处。表 `[7-3](#A435478_1_En_7_Chapter.html#Tab3)` 列出了选择性 XML 索引优化提示的益处。\n\
    \n表 7-3.\n选择性 XML 索引优化提示的有效性\n\n| 优化提示 | 存储效率 | 性能提升 |\n| --- | --- | --- |\n\
    | `node()` | 是 | 否 |\n| `SINGLETON` | 否 | 是 |\n| `DATA TYPE` | 是 | 是 |\n| `MAXLENGTH`\
    \ | 是 | 是 |\n\n表 `[7-4](#A435478_1_En_7_Chapter.html#Tab4)` 列出了每种数据类型支持的优化提示。\n\
    \n表 7-4.\n优化提示与数据类型对照表\n\n| 优化提示 | XQuery 数据类型 | SQL 数据类型 |\n| --- | --- | ---\
    \ |\n| `node()` | 是 | 否 |\n| `SINGLETON` | 是 | 是 |\n| `DATA TYPE` | 是 | 否 |\n\
    | `MAXLENGTH` | 是 | 否 |\n\n## 7-7 创建辅助选择性 XML 索引\n\n### Problem\n\n你想要提升选择性 XML\
    \ 索引的性能。\n\n### Solution\n\n辅助选择性 XML 索引可以提升选择性 XML 索引的性能。清单 `[7-23](#A435478_1_En_7_Chapter.html#Par113)`\
    \ 在 `HumanResources.JobCandidate` 表上创建了选择性 XML 索引（来源于解决方案 7-6），这是此解决方案的先决条件。\n\
    \n```sql\nCREATE SELECTIVE XML INDEX IX_SELECTIVE_XML_ProductXML_Hint_Sample\n\
    ON dbo.ProductXML\n(\nProductDetails\n)\nFOR\n(\nSubcategoryName = '/Products/Categories/Category/Subcategory/SubcategoryName'\
    \ AS XQUERY 'node()',\nShelf = '/Products/Categories/Category/Subcategory/Product/ProductLocation/Shelf',\n\
    Bin = '/Products/Categories/Category/Subcategory/Product/ProductLocation/Bin'\
    \ AS XQUERY 'xs:double' SINGLETON,\nProductName = '/Products/Categories/Category/Subcategory/Product/ProductName'\
    \ AS SQL nvarchar(40),\nCategoryName = '/Products/Categories/Category/CategoryName'\
    \ AS XQUERY 'xs:string' MAXLENGTH(35)\n);\n```\n清单 7-23.\n为选择性 XML 索引测试不同提示\n\n\
    清单 `[7-24](#A435478_1_En_7_Chapter.html#Par115)` 展示了如何在 `HumanResources.JobCandidate`\
    \ 表上创建辅助选择性 XML 索引。\n\n```sql\nCREATE XML INDEX IX_SELECTIVE_SECONDARY_XML_HumanResources_JobCandidate\n\
    ON HumanResources.JobCandidate\n(\nResume\n)\nUSING XML INDEX IX_SELECTIVE_XML_HumanResources_JobCandidate\n\
    FOR (LastName);\n```\n清单 7-24.\n演示如何创建辅助选择性 XML 索引\n\n### How It Works\n\n辅助选择性\
    \ XML 索引提升了选择性 XML 索引的性能。其语法类似于辅助 XML 索引的语法，主要区别在于：选择性 XML 索引在 `USING XML INDEX`\
    \ 子句中指定，而 `FOR` 子句则实现了选择性 XML 索引路径之一。\n\n创建辅助选择性 XML 索引的语法包含以下组件：\n\n```sql\n\
    CREATE XML INDEX \nON \n()\nUSING XML INDEX ()\nFOR (  )\n```\n\n辅助选择性 XML 索引必须包含一个提升（promoted）了数据类型的路径。例如：\n\
    \n* `SQL Server` 类型是 ‘/Resume/Name/Name.First’ AS SQL varchar(20)\n* `XQuery`\
    \ 类型是 ‘/Resume/Name/Name.First’ AS XQUERY ‘xs:string’ MAXLENGTH(20)\n\n当数据类型未被提升时，`SQL\
    \ Server` 会引发错误：\n\n```sql\nMsg 6391, Level 16, State 0, Line 111\nPath 'LastName'\
    \ is promoted to a type that is invalid for use as a key column in a secondary\
    \ selective XML index.\n```\n\n## 7-8 修改选择性 XML 索引\n\n### Problem\n\n你想要从选择性 XML\
    \ 索引中添加或删除路径。"
  raw: "### How It Works\n\nSelective XML index hints come in two flavors:\n\n*  \
    \ SQL Server – oriented with SQL data-type mappings. For example, PathName = ‘/root/element’\
    \ AS SQL nvarchar(40)\n*   XQUERY – oriented with XQuery data-type mappings. For\
    \ example, PathName = ‘/root/element AS XQUERY ‘xs:string’\n\nTable [7-1](#A435478_1_En_7_Chapter.html#Tab1)\
    \ describes the optimization hints that could be implements to improve the selective\
    \ XML index.\n\nTable 7-1.\n\nDescriptions of the selective XML index optimization\
    \ hints\n\n| Optimization hint | Applies to | Hint description |\n| --- | ---\
    \ | --- |\n| node() | XQuery | Reduces the amount of storage required. Check for\
    \ node existence. |\n| SINGLETON | XQuery and SQL Server | Provides assurance\
    \ that there is only one instance of the group so that the index can be optimized\
    \ with that in mind. Avoid adding additional instances subsequently, as this can\
    \ cause issues. |\n| DATA TYPE | XQuery | Optimizes the index with the data types.\
    \ An issue could arise if something breaks the data type, then a null will show\
    \ in the index. |\n| MAXLENGTH | XQuery | It is helpful to look at the XQuery\
    \ type xs:string and optimize the index with the maximum allowed value for the\
    \ strings. However, this could cause an issue if the existing string is longer\
    \ than the specified MAXLENGTH, since the index could fail. |\n\nTable [7-2](#A435478_1_En_7_Chapter.html#Tab2)\
    \ lists the eligible XQuery data types for selective XML index hints, created\
    \ on XML typed and untyped columns.\n\nTable 7-2.\n\nHint-eligible XQuery data\
    \ types\n\n| Typed XML | Untyped XML |\n| --- | --- |\n| xs:anyUri |   |\n| xs:boolean\
    \ | xs:boolean |\n| xs:date | xs:date |\n| xs:dateTime | xs:dateTime |\n| xs:day\
    \ |   |\n| xs:decimal |   |\n| xs:double | xs:double |\n| xs:float |   |\n| xs:int\
    \ |   |\n| xs:integer |   |\n| xs:language |   |\n| xs:long |   |\n| xs:name |\
    \   |\n| xs:NCName |   |\n| xs:negativeInteger |   |\n| xs:nmtoken |   |\n| xs:nonNegativeInteger\
    \ |   |\n| xs:nonPositiveInteger |   |\n| xs:positiveInteger |   |\n| xs:qname\
    \ |   |\n| xs:short |   |\n| xs:string | xs:string |\n| xs:time | xs:time |\n\
    | xs:token |   |\n| xs:unsignedByte |   |\n| xs:unsignedInt |   |\n| xs:unsignedLong\
    \ |   |\n| xs:unsignedShort |   |\n\nThe selective XML index can obtain benefits\
    \ when a hint applies to the index. Table [7-3](#A435478_1_En_7_Chapter.html#Tab3)\
    \ lists the benefits of the selective XML index optimization hints .\n\nTable\
    \ 7-3.\n\nEffectiveness of selective XML index optimization hints\n\n| Optimization\
    \ hint | Storage efficiency | Performance improvement |\n| --- | --- | --- |\n\
    | node() | Yes | No |\n| SINGLETON | No | Yes |\n| DATA TYPE | Yes | Yes |\n|\
    \ MAXLENGTH | Yes | Yes |\n\nTable [7-4](#A435478_1_En_7_Chapter.html#Tab4) lists\
    \ which optimization hints are supported with each data type.\n\nTable 7-4.\n\n\
    List of optimization hints and data types\n\n| Optimization hint | XQuery data\
    \ types | SQL data types |\n| --- | --- | --- |\n| node() | Yes | No |\n| SINGLETON\
    \ | Yes | Yes |\n| DATA TYPE | Yes | No |\n| MAXLENGTH | Yes | No |\n\n## 7-7\
    \ Creating a Secondary Selective XML Index\n\n### Problem\n\nYou want to improve\
    \ selective XML index performance.\n\n### Solution\n\nA secondary selective XML\
    \ index can improve the performance of a selective XML index. Listing [7-23](#A435478_1_En_7_Chapter.html#Par113)\
    \ creates the selective XML index on the HumanResources.JobCandidate table from\
    \ Solution 7-6, which is a prerequisite for this solution.\n\n```\nCREATE SELECTIVE\
    \ XML INDEX IX_SELECTIVE_XML_ProductXML_Hint_Sample\nON dbo.ProductXML\n(\nProductDetails\n\
    )\nFOR\n(\nSubcategoryName = '/Products/Categories/Category/Subcategory/SubcategoryName'\
    \ AS XQUERY 'node()',\nShelf = '/Products/Categories/Category/Subcategory/Product/ProductLocation/Shelf',\n\
    Bin = '/Products/Categories/Category/Subcategory/Product/ProductLocation/Bin'\
    \ AS XQUERY 'xs:double' SINGLETON,\nProductName = '/Products/Categories/Category/Subcategory/Product/ProductName'\
    \ AS SQL nvarchar(40),\nCategoryName = '/Products/Categories/Category/CategoryName'\
    \ AS XQUERY 'xs:string' MAXLENGTH(35)\n);\nListing 7-23.\nTesting different hints\
    \ for the selective XML index\n```\n\nListing [7-24](#A435478_1_En_7_Chapter.html#Par115)\
    \ shows how to create a secondary selective XML index on the HumanResources.JobCandidate\
    \ table .\n\n```\nCREATE XML INDEX IX_SELECTIVE_SECONDARY_XML_HumanResources_JobCandidate\n\
    ON HumanResources.JobCandidate\n(\nResume\n)\nUSING XML INDEX IX_SELECTIVE_XML_HumanResources_JobCandidate\n\
    FOR (LastName);\nListing 7-24.\nDemonstrating how to create a secondary selective\
    \ XML index\n```\n\n### How It Works\n\nThe secondary selective XML index improves\
    \ the performance of a selective XML index. The syntax is similar to the syntax\
    \ of a secondary XML index, the main difference being that the selective XML index\
    \ is specified in the USING XML INDEX clause and the FOR clause implements one\
    \ of the selective XML index paths.\n\nThe syntax to create the secondary selective\
    \ XML index has following components:\n\n```\nCREATE XML INDEX \nON \n()\nUSING\
    \ XML INDEX ()\nFOR (  )\n```\n\nThe secondary selective XML index must have a\
    \ path with a promoted data type. For example:\n\n*   SQL Server type is ‘/Resume/Name/Name.First’\
    \ AS SQL varchar(20)\n*   XQuery type is ‘/Resume/Name/Name.First’ AS XQUERY ‘xs:string’\
    \ MAXLENGTH(20)\n\nWhen a data type is not promoted, SQL Server raises an error:\n\
    \n```\nMsg 6391, Level 16, State 0, Line 111\nPath 'LastName' is promoted to a\
    \ type that is invalid for use as a key column in a secondary selective XML index.\n\
    ```\n\n## 7-8 Modifying Selective XML Indexes\n\n### Problem\n\nYou want to add\
    \ or remove a path from a selective XML index."
