  raw: "### How It Works\n\nThe stored procedure usp_WriteXMLFile, shown in Listing\
    \ [3-1](#A435478_1_En_3_Chapter.html#Par4), has several important components to\
    \ successfully create an XML file from within SQL Server. Let’s break down this\
    \ stored procedure to follow how the XML file-writing process works:\n\n1.  The\
    \ parameter @FilePath is the XML file destination path. This parameter makes the\
    \ stored procedure flexible, especially when running it in different environments,\
    \ such as development, staging, and production.  \n2.  CREATE a global temporary\
    \ table (##XML), then DROP it in the end. Use a column name XMLHolder with the\
    \ XML data type to get XML data. It is a rare case to need to create a global\
    \ temporary table; however, the BCP command will raise an error if a session-level\
    \ temporary table is referenced. Therefore, we can use either a permanent table\
    \ or a global temporary table. There is always a risk in implementing a global\
    \ temporary table, if the process part of the concurrent process. The global temporary\
    \ table is seen throughout the entire server and if somebody else happens to use\
    \ the stored procedure at the same time, one of the user’s tables could be overwritten\
    \ and therefore receive inaccurate results. Please reference the code samples\
    \ for Chapter [3](#A435478_1_En_3_Chapter.html) where the stored procedure usp_WriteXMLFileDynamicTable\
    \ demonstrates how to solve this problem .  \n3.  INSERT the XML data into a global\
    \ temporary table (##XML).  \n4.  To run the BCP command from a stored procedure\
    \ or SSMS, the server instance needs to be configured for “xp_cmdshell” option\
    \ at value 1. This means that the instance allows the xp_cmdshell extended stored\
    \ procedure to run. There are cases where due to security reasons, you may be\
    \ required to maintain the configuration for the server instance at value 0 (disabled\
    \ status). In this case, you would still need to incorporate code that switches\
    \ the server instance from value 0 to 1, then back to 0 while creating the XML\
    \ file. Since the BCP command is able to create the XML file in milliseconds,\
    \ there is virtually no security risk during the milliseconds that the server\
    \ is set to value 0 to enable the xp_cmdshell stored procedure to create the XML\
    \ file.\n    *   To preserve the original settings, the table variable @cmd is\
    \ created.\n    *   The system stored procedure sp_configure uses the parameter\
    \ value ‘xp_cmdshell’. This result is inserted into the table variable @cmd, which\
    \ reflects the current status of the ‘xp_cmdshell’ option.\n    *   The following\
    \ statement SELECT @run_value = run_value FROM @cmd populates the local variable\
    \ @run_value to preserve the xp_cmdshell option run_value for further analysis.\n\
    \    *   The conditional statement IF @run_value = 0 detects whether or not the\
    \ option value needs to be changed from 0 to 1. \n5.  The variable @SQL is created\
    \ to compose the statement for the BCP utility.  \n6.  The final command depends\
    \ on the instance and database name and could be the following:  \n\n1.  Let’s\
    \ take a closer look at all of the arguments and switches that are required by\
