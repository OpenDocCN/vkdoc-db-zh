  ## 本书概述


  本书是 Jonathan Gennick 的构想。这是一本重点介绍备份与恢复概念的入门书，内容涵盖用户管理备份、RMAN 和 Data Pump。感谢 Jill
  Balzano 和 Apress 的工作人员；制作一本高质量的书籍需要一支优秀的（协调的）团队。


  同时也要感谢多年来我从中学习的许多开发者和 DBA：Bob Suehrstedt、Dave Jennings、Scott Schulze、Venkatesh Ranganathan、Valerie
  Eipper、Mike Tanaka、Simon Ip、Nitin Mittal、Mohan Shanmugavelu、Ric Ambridge、Kamal Chamakura、Dallas
  Powell、Krishna (KP) Tallapaneni、Laurie Bourgeois、Todd Sherman、Radha Ponnapalli、Mohan
  Koneru、Kevin O’Grady、Peter Schow、Sujit Pattnaik、Roger Murphy、Barb Sannwald、Pete
