  Isom、Tim Gorman、Tom Kyte 和 Jim Stark。


  ### 简介


  备份与恢复能力可以说是数据库管理员所需的关键技能。恢复管理器（RMAN）是 Oracle 的标准备份与恢复工具；每位 Oracle DBA 都应熟悉如何使用 RMAN。本书将带你入门
  RMAN；从如何设置和配置 RMAN 的最基础开始，逐步深入到更高级的主题，例如各种恢复和还原场景。


  ### 本书涵盖内容


  第 1 章 介绍了环境设置的基础知识以及如何连接到 RMAN。第 2 章 详细介绍了构成备份与恢复操作的文件（控制文件、联机重做日志、归档重做日志和数据文件）。


  第 3 章 重点介绍了用户管理备份。用户管理备份如今已很少使用，但理解它们有助于为领会备份与恢复的机制打下基础。有了这些知识，你将能够更充分地利用 RMAN 并解决任何备份与恢复情况。


  第 4、5 和 6 章集中讨论 RMAN。第 4 章 介绍了典型的 RMAN 配置和设置任务。这里会给出如何实现最常用 RMAN 配置的示例。第 5 章 将引导你使用
  RMAN 备份数据库。第 6 章 专门讨论还原和恢复这些关键任务。


  第 7 章 深入介绍了处理联机重做日志故障的方法。如果联机重做日志出现故障，你必须能够介入并采取纠正措施。第 8 章 的主题是 Data Pump。该工具灵活且功能丰富。许多
  DBA 使用此工具来增强其备份与恢复策略。


  这八个章节将为你提供 Oracle 备份与恢复技能的坚实基础。有了这些知识，你将能够保护公司的数据并保持其可用性；所有 DBA 都需要这些技能。


  ### 排版约定


  本书使用以下排版约定：


  *   `$` 用于表示可由 Oracle 二进制文件的操作系统所有者（通常名为 `oracle`）运行的 Linux/Unix 命令。

  *   `#` 用于表示应以 root 操作系统用户身份运行的 Linux/Unix 命令。

  *   `SQL>` 用于表示单行 SQL*Plus 语句。

  *   等宽字体用于代码示例、实用程序名称、文件名、URL 和目录路径。

  *   斜体用于突出显示新概念或单词。

  *   `UPPERCASE` 表示数据库对象的名称，如视图、表和相应的列名。

  *   `< >` 用于需要提供输入的地方，例如文件名或密码。


