- '# 第 1 章 入门


  ![image](img/frontdot.jpg)


  备份与恢复技能是 DBA 能力清单上的首要技能。保护数据并保持其可用性构成了数据库管理的基础。你的 DBA 工作依赖于你定期执行备份的能力，并在必要时还原和恢复数据库。恢复管理器（RMAN）是
  Oracle 旗舰级的备份与恢复工具。此工具是保护数据的高效且有效的方式。每位 DBA 都必须知道如何实施和使用 RMAN。


  RMAN 是一个灵活的工具，包含各种各样的备份与恢复功能。本书的目的是让你扎实了解使用 RMAN 备份、还原和恢复数据库的最常见方法。我将展示许多实际示例以及实现各种功能所需的代码。有了这个基础，你将能够在任何环境中实施
  RMAN。


  我还将介绍用户管理备份技术（热备份和冷备份）。我发现，理解用户管理备份机制的 DBA 能更好地排查和解决任何类型的数据库问题（包括但不限于备份与恢复问题）。我还将介绍
  Data Pump 的使用。DBA 通常会实施 Data Pump 功能来满足备份与恢复需求（例如，快速备份单个表）。简而言之，每位 DBA 都应熟悉所有用于保护数据的
  Oracle 工具。


  要开始使用，在处理 Oracle 备份与恢复时，有一些基本任务你应该熟悉，即：


  *   连接到你的数据库

  *   启动/停止你的数据库


  理解这些主题是使用 RMAN（以及其他 Oracle 工具）的前提。本章的目的是让你熟悉这些初始任务。首先是连接到你的数据库。


  ![Image](img/sq.jpg) **注意** 本章假设你已安装 Oracle，并且有一个已创建且可用的数据库。


  ### 连接到你的数据库


  在连接到你的数据库之前，你必须建立所需的操作系统变量。此外，如果你要运行备份和恢复命令，你需要有权访问特权操作系统（OS）账户或已被授予适当权限（通过密码文件）的数据库用户。这些主题将在以下小节中讨论。


  ### 建立操作系统变量


  在通过 SQL*Plus、RMAN、Data Pump（或任何其他 Oracle 实用程序）连接到你的数据库之前，必须首先设置几个操作系统变量：


  *   `ORACLE_HOME`

  *   `ORACLE_SID`

  *   `LD_LIBRARY_PATH`

  *   `PATH`


  `ORACLE_HOME` 变量很重要，因为它定义了定位 Oracle 二进制文件（如 `sqlplus`、`dbca`、`netca`、`rman` 等）的起始目录，这些文件位于
  `ORACLE_HOME/bin` 中。




  '
- '# Oracle 环境变量设置与用户认证


  ## 一、 关键环境变量

  `ORACLE_SID`（系统标识符）变量定义了您将要连接的数据库的默认名称。`ORACLE_SID` 也用于确定参数文件的默认名称，即 `init<ORACLE_SID>.ora`
  或 `spfile<ORACLE_SID>.ora`。默认情况下，Oracle 在 Linux/Unix 系统上会在 `ORACLE_HOME/dbs` 目录中查找这些初始化文件，在
  Windows 系统上则在 `ORACLE_HOME\database` 目录中查找。初始化文件包含管理数据库各个方面的参数，例如为数据库分配多少内存、最大连接数等。


  `LD_LIBRARY_PATH` 变量非常重要，因为它指定了在 Linux/Unix 系统上搜索库文件的位置。该变量的值通常设置为包含 `ORACLE_HOME/lib`。


  `PATH` 变量指定了当您在操作系统提示符下键入命令时默认查找的目录。在几乎所有情况下，`ORACLE_HOME/bin`（Oracle 二进制文件的位置）都必须包含在您的
  `PATH` 变量中。


  您可以手动设置这些变量，也可以使用 Oracle 提供的标准脚本来设置。


  ## 二、 手动设置变量

  在 Linux/Unix 中，当您使用 Bourne、Bash 或 Korn shell 时，可以使用以下 `export` 命令从操作系统命令行手动设置操作系统变量：


  ```bash

  $ export ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1

  $ export ORACLE_SID=O12C

  $ export LD_LIBRARY_PATH=/usr/lib:$ORACLE_HOME/lib

  $ export PATH=$ORACLE_HOME/bin:$PATH

  ```


  请注意，上面的命令是针对我特定的开发环境的；您需要调整它们以匹配您环境中使用的 Oracle 主目录和数据库名称。


  对于 C 或 `tcsh` shell，请使用 `setenv` 命令设置变量：


  ```bash

  $ setenv ORACLE_HOME <path>

  $ setenv ORACLE_SID <sid>

  $ setenv LD_LIBRARY_PATH <path>

  $ setenv PATH <path>

  ```


  DBA 设置这些变量的另一种方式是将之前的 `export` 或 `setenv` 命令放入 Linux/Unix 启动文件中，例如 `.bash_profile`、`.bashrc`
  或 `.profile`。这样，变量会在登录时自动设置。


  然而，手动设置操作系统变量（无论是从命令行还是通过在启动文件中硬编码值）并不是实例化这些变量的最佳方式。例如，如果您在一台服务器上有多个具有多个 Oracle
  主目录的数据库，手动设置这些变量很快就会变得难以管理且不易维护。


  ## 三、 使用 Oracle 脚本

  设置操作系统变量的一个好方法是使用一个脚本，该脚本利用一个包含服务器上所有 Oracle 数据库名称及其关联 Oracle 主目录的文件。这种方法灵活且易于维护。例如，如果某个数据库的
  Oracle 主目录发生变化（例如，升级后），您只需在服务器上修改一个文件，而不必去查找硬编码在脚本中的 Oracle 主目录变量。


  Oracle 提供了一种自动设置所需操作系统变量的机制。此方法依赖于两个文件：`oratab` 和 `oraenv`。


  ### 3.1 理解 oratab

  您可以将 `oratab` 文件中的条目视为一台服务器上安装的数据库及其对应 Oracle 主目录的注册表。当您安装 Oracle 软件时，`oratab` 文件会自动为您创建。在
  Linux 服务器上，`oratab` 通常位于 `/etc` 目录中。在 Solaris 服务器上，`oratab` 文件位于 `/var/opt/oracle`
  目录中。如果由于某种原因 `oratab` 文件未自动创建，您可以手动创建它（使用文本编辑器）。


  `oratab` 文件在 Linux/Unix 环境中用于以下目的：


  *   自动设置所需的操作系统变量

  *   自动启动和停止服务器上的 Oracle 数据库


  `oratab` 文件有三列，格式如下：


  ```

  <database_sid>:<oracle_home_dir>:Y|N

  ```


  `Y` 或 `N` 表示您是否希望 Oracle 在服务器重启时自动重启；`Y` 表示是，`N` 表示否（自动重启功能需要本书未涉及的额外任务）。


  `oratab` 文件中的注释以井号（`#`）开头。以下是一个典型的 `oratab` 文件条目：


  ```

  O12C:/orahome/app/oracle/product/12.1.0.1/db_1:N

  ORA12CR1:/orahome/app/oracle/product/12.1.0.1/db_1:N

  ```


  上一行中的数据库名称是 `O12C` 和 `ORA12CR1`。每个数据库的 Oracle 主目录路径紧接在行中（与数据库名用冒号 [`:`] 分隔）。


  多个 Oracle 提供的实用程序使用 `oratab` 文件：


  *   `oraenv` 使用 `oratab` 来设置操作系统变量。

  *   `dbstart` 使用它在服务器重启时自动启动数据库（如果 `oratab` 中的第三个字段是 `Y`）。

  *   `dbshut` 使用它在服务器重启时自动停止数据库（如果 `oratab` 中的第三个字段是 `Y`）。


  `oraenv` 工具将在下一节讨论。


  ### 3.2 使用 oraenv

  如果您没有为 Oracle 环境正确设置所需的操作系统变量，那么诸如 SQL*Plus、RMAN、Data Pump 等实用程序将无法正常工作。`oraenv`
  实用程序可自动在 Oracle 数据库服务器上设置所需的操作系统变量（如 `ORACLE_HOME`、`ORACLE_SID` 和 `PATH`）。此实用程序用于
  Bash、Korn 和 Bourne shell 环境（如果您在 C shell 环境中，有一个对应的 `coraenv` 实用程序）。


  `oraenv` 实用程序位于 `ORACLE_HOME/bin` 目录中。您必须先导航到您的 `ORACLE_HOME/bin` 目录（您需要修改以下路径以匹配您的环境）：


  ```bash

  $ cd /orahome/app/oracle/product/12.1.0.1/db_1/bin

  ```


  然后您可以手动运行 `oraenv`，像这样：


  ```bash

  $ . ./oraenv

  ```


  系统将提示您输入 `ORACLE_SID`（并且如果 `ORACLE_SID` 不在 `oratab` 文件中，您还将被提示输入 `ORACLE_HOME` 值）：


  ```

  ORACLE_SID = [oracle] ?

  ORACLE_HOME = [/home/oracle] ?

  ```


  您也可以在运行 `oraenv` 实用程序之前设置操作系统变量，以非交互方式运行它。这在您不希望提示输入的脚本编写中很有用：


  ```bash

  $ export ORACLE_SID=O12C

  $ export ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1

  $ export ORAENV_ASK=NO

  $ cd /orahome/app/oracle/product/12.1.0.1/db_1/bin

  $ . ./oraenv

  ```


  ![Image](img/sq.jpg) **注意** 在 Windows 操作系统中，变量在注册表中设置。


  您可以使用 `echo` 命令验证操作系统变量设置，例如：


  ```bash

  $ echo $ORACLE_SID

  O12C


  $ echo $ORACLE_HOME

  /orahome/app/oracle/product/12.1.0.1/db_1

  ```


  ## 四、 连接到数据库

  建立操作系统变量后，您需要使用适当的权限连接到数据库。您可以通过两种方式之一完成此操作：使用操作系统认证或使用密码文件。


  ### 4.1 使用操作系统认证

  在连接到 Oracle 数据库之前，您需要设置正确的操作系统变量（如前一节所述）。此外，如果您想以特权用户身份连接到 Oracle，那么您还必须有权访问特权操作系统账户或特权数据库用户。以特权用户身份连接允许您执行管理任务，例如启动和停止数据库。您可以使用操作系统认证或密码文件以特权用户身份连接到数据库。


  特权用户的概念对于 RMAN 备份和恢复也很重要。RMAN 使用操作系统认证和密码文件来允许特权用户建立特权数据库会话（通过 `rman` 实用程序）。只有特权账户才允许备份、恢复和恢复数据库。


  如果您的 Linux/Unix 账户是 `dba` 组的成员（您的公司可能使用不同的组名，但 `dba` 是最常见的），那么凭借登录到您的 Linux/Unix
  账户，您就可以通过 SQL*Plus 以所需的特权连接到您的数据库。




  '
- '# 在 Windows 上


  在 Windows 上，操作系统用户必须是 `ora_dba` 组或 `ora_oper` 组的成员。在 Windows 环境中，您可以按照以下步骤验证哪些操作系统用户属于
  `ora_dba` 组：选择控制面板 ![image](img/arrow.jpg) 管理工具 ![image](img/arrow.jpg) 计算机管理 ![image](img/arrow.jpg)
  本地用户和组 ![image](img/arrow.jpg) 组。您应该能看到一个名为 `ora_dba` 的组。您可以单击该组并查看分配了哪些操作系统用户。此外，要在
  Windows 环境中使操作系统认证正常工作，您的 `sqlnet.ora` 文件中必须包含以下条目：`SQLNET.AUTHENTICATION_SERVICES=(NTS)`。


  '
- '# 在 Linux/Unix 上


  在 Linux/Unix 上，您可以使用不带任何参数的 `id` 命令快速验证您的帐户所属的操作系统组：


  ```

  $ id

  uid=500(oracle) gid=500(oinstall) groups=500(oinstall),501(dba),502(oper),503(asmdba),

  504(asmoper),505(asmadmin),506(backupdba)

  ```


  前面的输出表明 `oracle` 用户包含在几个组中，其中一个是 `dba`。任何属于 `dba` 组的用户都可以使用 `SYSDBA` 权限连接到数据库。拥有
  `SYSDBA` 权限的用户可以启动和停止数据库。此示例使用操作系统认证以 `SYS` 用户身份连接到您的数据库：


  ```

  $ sqlplus / as sysdba

  ```


  使用操作系统认证时不需要用户名或密码（因此只有一个斜杠而没有用户/密码），因为 Oracle 首先检查操作系统用户是否是特权操作系统组的成员，如果是，则连接而不检查用户名/密码。您可以通过发出以下命令来验证是否已作为
  `SYS` 连接：


  ```

  SQL> show user

  USER is "SYS"

  ```


  特权操作系统组是在安装 Oracle 软件时建立的。有几个与备份和恢复相关的操作系统组：


  *   `dba`

  *   `oper`

  *   `backupdba`（从 Oracle 12c 开始提供）


  每个操作系统组对应某些数据库权限。表 1-1 显示了操作系统组到数据库系统权限和操作的映射。


  表 1-1. 操作系统组到与备份和恢复相关权限的映射


  | 操作系统组 | 数据库系统权限 | 授权的操作 |

  | --- | --- | --- |

  | `dba` | `sysdba` | 启动、关闭、更改数据库、创建和删除数据库、切换归档日志模式、备份和恢复数据库。 |

  | `oinstall` | `none` | 安装和升级 Oracle 二进制文件。 |

  | `oper` | `sysoper` | 启动、关闭、更改数据库、切换归档日志模式、备份和恢复数据库。 |

  | `backupdba` | `sysbackup` | 从 Oracle 12*c* 开始可用，此权限允许您启动、关闭并执行所有备份和恢复操作。 |


  ### 使用密码文件


  如果您不使用操作系统认证，那么您可以使用密码文件以特权用户身份连接到数据库。密码文件允许您从 SQL*Plus 或 RMAN 执行以下操作：


  *   以非 `SYS` 数据库用户身份使用 `sys*` 权限连接到您的数据库

  *   通过网络使用 `sys*` 权限连接到远程数据库


  密码文件必须使用 `orapwd` 实用程序手动创建，并通过 SQL `grant` 命令填充。要实现密码文件，请执行以下步骤：


  1.  使用 `orapwd` 实用程序创建密码文件。

  2.  将初始化参数 `remote_login_passwordfile` 设置为 `exclusive`。


  在 Linux/Unix 环境中，使用 `orapwd` 实用程序创建密码文件，如下所示：


  ```

  $ cd $ORACLE_HOME/dbs

  $ orapwd file=orapw$ORACLE_SID password=<sys password>

  ```


  在 Linux/Unix 环境中，密码文件通常存储在 `ORACLE_HOME/dbs` 目录中，在 Windows 中，它通常放置在 `ORACLE_HOME\database`
  目录中。您在上一条命令中指定的文件名格式可能因操作系统而异。例如，在 Windows 上格式是 `PWD<ORACLE_SID>.ora`。以下显示了 Windows
  环境中的语法：


  ```

  c:\> cd %ORACLE_HOME%\database

  c:\> orapwd file=PWD<ORACLE_SID>.ora password=<sys password>

  ```


  要启用密码文件的使用，请将初始化参数 `remote_login_passwordfile` 设置为 `exclusive`（这是默认值）。您可以如下所示验证其值：


  ```

  SQL> show parameter remote_login_password


  NAME                                 TYPE        VALUE

  --------------------------           ------      ---------

  remote_login_passwordfile            string      EXCLUSIVE

  ```


  如果需要，您可以手动设置 `remote_login_passwordfile` 参数，如下所示：


  ```

  $ sqlplus / as sysdba

  SQL> alter system set remote_login_passwordfile=exclusive scope=spfile;

  ```


  然后您需要停止并启动数据库以使此参数生效（有关停止/启动数据库的更多详细信息将在本章后面介绍）。前面的示例假设您使用的是服务器参数文件（`spfile`）。如果您没有使用
  `spfile`，则必须通过文本编辑器手动编辑 `init.ora` 文件并添加此条目：


  ```

  remote_login_passwordfile=exclusive

  ```


  然后停止并启动数据库以实例化该参数。启用密码文件后，您就可以创建数据库用户并根据需要为他们分配 `sys*` 权限。例如，假设您有一个名为 `DBA_MAINT`
  的数据库用户，您想授予其 `SYSBACKUP` 权限：


  ```

  $ sqlplus / as sysdba

  SQL> grant sysbackup to dba_maint;

  ```


  使用密码文件连接到数据库的语法如下：


  ```

  $ sqlplus <username>/<password>[@<db conn string>] as sys[dba|oper|backup]

  ```


  例如，使用 `DBA_MAINT` 数据库用户，您可以使用 `SYSBACKUP` 权限连接到数据库，如下所示：


  ```

  $ sqlplus dba_maint/foo as sysbackup

  ```


  因为您提供了用户名/密码并尝试以 `sys*` 级别权限（作为非 `SYS` 用户）连接，Oracle 将验证密码文件是否就位（对于本地数据库），并且提供的用户名/密码是否在密码文件中。您可以通过查询
  `V$PWFILE_USERS` 视图来验证哪些用户具有 `sys*` 权限：


  ```

  SQL> select * from v$pwfile_users;

  ```


  以下是一些示例输出：


  ```

  USERNAME                       SYSDB SYSOP SYSAS SYSBA SYSDG SYSKM     CON_ID

  -----------------              ----- ----- ----- ----- ----- ----- ----------

  SYS                            TRUE  TRUE  FALSE FALSE FALSE FALSE          0

  DBA_MAINT                      FALSE FALSE FALSE TRUE  FALSE FALSE          0

  ```


  ## 操作系统认证与密码文件


  对于本地连接（在物理登录到数据库服务器时进行），操作系统认证优先于密码文件认证。换句话说，如果您登录到一个属于已认证组（如 `dba`）的操作系统帐户，那么在使用
  `sys*` 权限连接到本地数据库时，您输入什么用户名和密码并不重要。例如，您可以使用不存在的用户名/密码以 `sysdba` 身份连接：


  ```

  $ sqlplus bogus/wrong as sysdba

  SQL> show user;

  USER is "SYS"

  ```


  前面的连接有效，因为 Oracle 忽略了提供的用户名/密码，因为用户首先通过操作系统认证进行了验证。但是，当您不使用操作系统认证来建立特权本地连接，或者当您尝试通过网络连接到远程数据库时，则会使用密码文件。




  '
- '# 使用密码文件与数据库连接


  使用密码文件的一个重要方面是，该机制允许你通过网络使用 `sqlplus` 或 `rman` 以 `sys*` 特权连接到远程数据库。例如，如果你想以 `sysdba`
  特权，使用用户名 `chaya` 和密码 `heera` 连接到名为 `HATHI` 的远程数据库，你将按如下操作：


  ```

  $ sqlplus chaya/heera@HATHI as sysdba

  ```


  Oracle 将核实该用户名密码组合是否存在远程服务器上与 `HATHI` 网络服务名所定义的数据库相关联的密码文件中。在此示例中，Oracle 使用本地 `tnsnames.ora`
  文件中的信息来确定数据库在网络上的位置（主机、端口和数据库）。


  ![Image](img/sq.jpg) **提示** 使用本地 `tnsnames.ora` 文件被称为*本地命名*连接方法。还有其他远程数据库名称解析方法，例如简易连接、目录命名和外部命名。有关如何实现这些方法的详细信息，请参阅
  *Oracle Database Net Services Administrator’s Guide*。


  ## 简易连接


  简易连接方法允许你连接到远程数据库，而无需 `tnsnames.ora` 文件（或其他解析数据库位置的方法）。如果你知道主机名、服务器端口和服务名，可以直接在命令行中输入这些信息。语法如下：


  `sqlplus username@[//]host[:port][/service_name][:server][/instance_name]`


  例如，假设主机名为 `hesta`，端口为 1521，服务名为 `O12C`，那么你可以按如下方式连接：


  `$ sqlplus user/pass@hesta:1521/O12C`


  简易连接方法在排除连接问题故障或当没有可用的 `tnsnames.ora` 文件（或其他解析远程连接的方法）时非常方便。


  #### 启动数据库


  启动和停止数据库是你将频繁执行的任务。要启动/停止数据库，请使用具有 `SYSDBA` 或 `SYSOPER` 特权的用户帐户连接，并发出 `STARTUP`
  和 `SHUTDOWN` 语句。以下示例使用操作系统认证连接到数据库：


  ```

  $ sqlplus / as sysdba

  ```


  以特权帐户连接后，你可以启动数据库，如下所示：


  ```

  SQL> startup;

  ```


  ![Image](img/sq.jpg) **注意** 要使上述命令生效，`ORACLE_HOME/dbs` 目录中需要有一个 `spfile` 或 `init.ora`
  文件。


  当你的实例成功启动时，你应该会看到来自 Oracle 的消息，表明系统全局区（SGA）已分配。数据库已装载然后打开：


  ```

  ORACLE instance started.


  Total System Global Area 2137886720 bytes

  Fixed Size                  2290416 bytes

  Variable Size            1207962896 bytes

  Database Buffers          922746880 bytes

  Redo Buffers                4886528 bytes

  Database mounted.

  Database opened.

  ```


  从以上输出可以看出，打开 Oracle 数据库的启动操作经历了三个不同的阶段：


  1.  启动实例

  2.  装载数据库

  3.  打开数据库


  启动数据库时，你可以逐步执行这些阶段。首先，启动 Oracle 实例（后台进程和内存结构）：


  ```

  SQL> startup nomount;

  ```


  接下来，装载数据库。此时，Oracle 读取控制文件：


  ```

  SQL> alter database mount;

  ```


  最后，打开数据文件和联机重做日志文件：


  ```

  SQL> alter database open;

  ```


  ![Image](img/sq.jpg) **提示** 正如你将在本书后面看到的，在执行 RMAN 备份和恢复任务时，理解这些启动阶段尤为重要。例如，在某些场景下，你可能需要数据库处于装载模式。在该模式下，重要的是要理解控制文件已打开，但数据文件和联机重做日志尚未打开。


  此启动过程在图 1-1 中以图形方式描述。


  ![9781484207642_Fig01-01.jpg](img/9781484207642_Fig01-01.jpg)


  图 1-1. Oracle 启动阶段


  当你发出不带任何参数的 `STARTUP` 语句时，Oracle 会自动逐步执行三个启动阶段（nomount、mount、open）。在大多数情况下，你将发出不带参数的
  `STARTUP` 语句来启动数据库。在许多 RMAN 备份和恢复场景中，你会发出 `STARTUP MOUNT` 来将数据库置于装载模式（实例已启动，控制文件已打开）。表
  1-2 描述了可与数据库 `STARTUP` 语句一起使用的参数含义。


  表 1-2. STARTUP 命令可用参数


  | 参数 | 含义 |

  | --- | --- |

  | `FORCE` | 在重新启动前使用 `ABORT` 关闭实例；对于排除启动问题故障很有用 |

  | `RESTRICT` | 仅允许具有 `RESTRICTED SESSION` 特权的用户连接到数据库 |

  | `PFILE` | 指定启动实例时要使用的客户端参数文件 |

  | `QUIET` | 在启动实例时抑制显示 SGA 信息 |

  | `NOMOUNT` | 启动后台进程并分配内存；不读取控制文件 |

  | `MOUNT` | 启动后台进程，分配内存，并读取控制文件 |

  | `OPEN` | 启动后台进程，分配内存，读取控制文件，并打开联机重做日志和数据文件 |

  | `OPEN RECOVER` | 在打开数据库前尝试进行介质恢复 |

  | `OPEN READ ONLY` | 以只读模式打开数据库 |

  | `UPGRADE` | 在升级数据库时使用 |

  | `DOWNGRADE` | 在降级数据库时使用 |


  ### 停止数据库


  通常，你使用 `SHUTDOWN IMMEDIATE` 语句来停止数据库。`IMMEDIATE` 参数指示 Oracle 停止数据库活动并回滚任何打开的事务，例如：


  ```

  SQL> shutdown immediate;

  Database closed.

  Database dismounted.

  ORACLE instance shut down.

  ```


  表 1-3 详细定义了 `SHUTDOWN` 语句可用的参数。在大多数情况下，`SHUTDOWN IMMEDIATE` 是关闭数据库的可接受方法。如果你发出不带参数的
  `SHUTDOWN` 命令，则等同于发出 `SHUTDOWN NORMAL`。


  表 1-3. SHUTDOWN 命令可用参数


  | 参数 | 含义 |

  | --- | --- |

  | `NORMAL` | 等待用户退出活动会话后再关闭。 |

  | `TRANSACTIONAL` | 等待事务完成，然后终止会话。 |

  | `TRANSACTIONAL LOCAL` | 仅对本地实例执行事务性关闭。 |

  | `IMMEDIATE` | 立即终止活动会话。打开的事务将被回滚。 |

  | `ABORT` | 立即终止实例。事务被终止且不会被回滚。 |


  你很少需要使用 `SHUTDOWN ABORT` 语句。通常，`SHUTDOWN IMMEDIATE` 就足够了。话虽如此，使用 `SHUTDOWN ABORT`
  也没有问题。如果 `SHUTDOWN IMMEDIATE` 因任何原因不工作，那么就使用 `SHUTDOWN ABORT`。


  ![Image](img/sq.jpg) **注意** 快速连续停止和重新启动数据库在俗称“弹跳数据库”。


  启动和停止数据库是一个相当简单的过程。如果环境设置正确，你应该能够以特权用户身份连接到数据库，并发出适当的启动和关闭语句。


  ## 启动力


  有时在开发环境中，我需要快速停止并启动数据库。例如，我可能想这样做是因为我修改了一个需要数据库重新启动的初始化参数。你可以用一个命令停止/启动数据库：


  `SQL> startup force;`




  如果您的实例当前正在运行，`STARTUP FORCE`命令将会关闭实例（中止模式）并重新启动它。在生产环境中，这种行为可能并非您所期望的，但对于测试/开发数据库，这通常是可以的。


  ### 总结


  本章涵盖的任务包括设置操作系统变量、连接到数据库以及启动/停止数据库。这些操作是许多 DBA 任务的前提条件，特别是备份与恢复。在启动数据库时，了解 Oracle
  经历的各个阶段以及在哪个时间点访问控制文件、打开数据文件和联机重做日志非常重要。现在您已理解这些基础概念，我们准备继续描述执行备份与恢复操作时使用的 Oracle
  文件。


  ## 第二章


  ![image](img/frontdot.jpg)


  ## 支持备份与恢复操作的文件


  Oracle 数据库由三种必需文件组成：控制文件、联机重做日志和数据文件。本章将探讨管理这些关键文件的基础知识。本章还将讨论如何实现归档（这会生成归档重做日志文件）以及如何启用快速恢复区（FRA）。理解如何启用归档以及如何管理归档重做日志是数据库管理和备份恢复的关键部分。了解基本的
  FRA 概念也很重要，因为 RMAN（除非另有指示）默认会将备份文件写入 FRA。


  使用 RMAN 时，理解构成数据库的文件至关重要。熟悉数据库的物理特性是理解 RMAN 如何执行备份和恢复操作的基础。这些知识将使您能更好地理解底层机制，并在出现问题时提供故障排除所需的基础信息。首先是管理控制文件。


  ### 管理控制文件


  控制文件是一个小的二进制文件，存储诸如数据库名称、数据文件的名称和位置、联机重做日志文件的名称和位置、当前联机重做日志序列号、检查点信息以及 RMAN 备份文件的名称和位置（如果使用）等信息。您可以从数据字典视图查询存储在控制文件中的许多信息。以下示例通过查询`V$CONTROLFILE_RECORD_SECTION`来显示存储在控制文件中的信息类型：


  ```

  SQL> select distinct type from v$controlfile_record_section;


  TYPE

  ------------------

  FILENAME

  TABLESPACE

  RMAN CONFIGURATION

  BACKUP CORRUPTION

  PROXY COPY

  FLASHBACK LOG

  ...

  ```


  您可以通过`V$DATABASE`视图查看存储在控制文件中的数据库相关信息：


  ```

  SQL> select name, open_mode, created, current_scn from v$database;


  NAME      OPEN_MODE            CREATED   CURRENT_SCN

  --------- -------------------- --------- -----------

  O12C      READ WRITE           27-SEP-14      319781

  ```


  每个 Oracle 数据库必须至少有一个控制文件。当您以 nomount 模式启动数据库时，实例会从`spfile`或`init.ora`文件中的`CONTROL_FILES`初始化参数得知控制文件的位置。当您发出`STARTUP
  NOMOUNT`命令时，Oracle 会读取参数文件，启动后台进程并分配内存结构：


  ```

  -- 实例已知晓控制文件的位置

  SQL> startup nomount;

  ```


  此时，控制文件尚未被任何进程访问。当您将数据库切换到 mount 模式时，控制文件会被读取并打开以供使用：


  ```

  -- 控制文件已打开

  SQL> alter database mount;

  ```


  如果`CONTROL_FILES`初始化参数中列出的任何控制文件不可用，则无法挂载数据库。


  成功挂载数据库后，实例便知晓数据文件和联机重做日志的位置，但尚未打开它们。当您将数据库切换到 open 模式后，数据文件和联机重做日志将被打开：


  ```

  -- 数据文件和联机重做日志已打开

  SQL> alter database open;

  ```


  ![Image](img/sq.jpg) **请注意**，当您发出`STARTUP`命令（不带选项）时，会自动按此顺序执行前述三个阶段：nomount、mount、open。当您发出`SHUTDOWN`命令时，阶段则相反：关闭数据库、卸载控制文件并停止实例。


  控制文件在数据库创建时创建。如果可能，您应该将多个控制文件存储在由单独控制器控制的独立存储设备上。


  数据库打开后，Oracle 会频繁地向控制文件写入信息，例如当您进行任何物理修改时（例如，创建表空间、添加/删除/调整数据文件大小）。Oracle 会向`CONTROL_FILES`初始化参数指定的所有控制文件写入。如果
  Oracle 无法写入某个控制文件，则会抛出错误：


  ```

  ORA-00210: cannot open the specified control file

  ```


  如果您的某个控制文件变得不可用，请关闭数据库并在重新启动前解决问题（有关使用 RMAN 还原控制文件，请参见第 6 章）。解决问题可能意味着解决存储设备故障，或修改`CONTROL_FILES`初始化参数以移除不可用控制文件的条目。


  ### 显示控制文件的内容


  您可以使用`ALTER SESSION`语句显示控制文件的物理内容；例如，


  ```

  SQL> oradebug setmypid

  SQL> oradebug unlimit

  SQL> alter session set events ''immediate trace name controlf level 9'';

  SQL> oradebug tracefile_name

  ```


  前面的代码行将显示以下跟踪文件名：


  ```

  /orahome/app/oracle/diag/rdbms/o12c/O12C/trace/O12C_ora_15545.trc

  ```


  在 Oracle 11g 及更高版本中，跟踪文件写入到`$ADR_HOME/trace`目录。您也可以通过此查询查看跟踪目录名称：


  ```

  SQL> select value from v$diag_info where name=''Diag Trace'';

  ```


  在 Oracle 10g 及更低版本中，跟踪目录由`USER_DUMP_DEST`初始化参数定义。在排查问题或试图更好地理解 Oracle 内部机制时，您可以检查控制文件的内容。


  ### 查看控制文件名称和位置


  如果您的数据库处于 nomount、mounted 或 open 状态，您可以按如下方式查看控制文件的名称和位置：


  ```

  SQL> show parameter control_files

  ```


  您也可以通过查询`V$CONTROLFILE`视图来查看控制文件的位置和名称信息。此查询在数据库处于 mounted 或 open 状态时有效：


  ```

  SQL> select name from v$controlfile;

  ```


  如果由于某种原因您根本无法启动数据库，并且需要知道控制文件的名称和位置，您可以检查初始化（参数）文件的内容以查看它们的位置。如果您使用的是`spfile`，尽管它是二进制文件，您仍然可以用文本编辑器打开它。最安全的方法是复制一份`spfile`，然后使用操作系统编辑器检查其内容：


  ```

  $ cp $ORACLE_HOME/dbs/spfileO12C.ora $ORACLE_HOME/dbs/spfileO12C.copy

  $ vi $ORACLE_HOME/dbs/spfileO12C.copy

  ```


  您也可以使用`strings`命令在二进制文件中搜索值：


  ```

  $ strings $ORACLE_HOME/dbs/spfileO12C.ora | grep -i control_files

  ```


  如果您使用的是基于文本的初始化文件，您可以直接使用操作系统编辑器查看该文件，或使用`grep`命令：


  ```

  $ grep -i control_files $ORACLE_HOME/dbs/initO12C.ora

  ```


  #### 添加控制文件




  '
- "# 添加 Oracle 数据库控制文件指南\n\n添加控制文件意味着复制一个现有的控制文件，并通过修改`CONTROL_FILES`参数让数据库感知到这个副本。此操作必须在数据库关闭时执行。此过程仅在你拥有一个可供复制的良好现有控制文件时才有效。添加控制文件不同于创建或恢复控制文件。\n\
  \n如果你的数据库只使用一个控制文件，而该控制文件损坏，你需要从备份中恢复一个控制文件（如果有）并执行恢复，或者重新创建控制文件。如果你正在使用两个或更多控制文件，其中一个损坏，你可以使用剩余的良好控制文件快速将数据库恢复到可运行状态。\n\
  \n如果数据库只使用一个控制文件，添加控制文件的基本过程如下：\n\n1.  修改初始化文件中的`CONTROL_FILES`参数，以包含新控制文件的位置和名称。\n\
  2.  关闭数据库。\n3.  使用操作系统命令将现有的控制文件复制到新的位置和名称。\n4.  重启数据库。\n\n根据你使用的是`spfile`还是`init.ora`文件，上述步骤会略有不同。接下来的两个部分将详细说明这些不同的场景。\n\
  \n## Spfile 场景\n\n如果你的数据库已打开，可以使用以下 SQL 语句快速确定你是否在使用`spfile`：\n\n```sql\nSQL> show\
  \ parameter spfile\n```\n\n以下是一些示例输出：\n\n```\nNAME      TYPE        VALUE\n---------\
  \ ----------- ------------------------------\nspfile    string      /orahome/app/oracle/product/12\n\
                        .1.0.1/db_1/dbs/spfileO12C.ora\n```\n\n确定你正在使用`spfile`后，请使用以下步骤添加控制文件：\n\
  \n### 步骤 1：确定`CONTROL_FILES`参数的当前值\n\n```sql\nSQL> show parameter control_files\n\
  ```\n\n输出显示此数据库仅使用一个控制文件：\n\n```\nNAME              TYPE        VALUE\n-----------------\
  \ ----------- ------------------------------\ncontrol_files     string      /u01/dbfile/O12C/control01.ctl\n\
  ```\n\n### 步骤 2：修改`CONTROL_FILES`参数\n\n修改你的`CONTROL_FILES`参数以包含要添加的新控制文件，但将操作范围限制为`spfile`（你无法在内存中修改此参数）。确保也包含步骤\
  \ 1 中列出的所有控制文件：\n\n```sql\nSQL> alter system set control_files='/u01/dbfile/O12C/control01.ctl',\n\
  '/u01/dbfile/O12C/control02.ctl' scope=spfile;\n```\n\n### 步骤 3：关闭数据库\n\n```sql\n\
  SQL> shutdown immediate;\n```\n\n### 步骤 4：复制现有控制文件\n\n将现有的控制文件复制到新的位置和名称。在此示例中，通过操作系统`cp`命令创建了一个名为`control02.ctl`的新控制文件：\n\
  \n```bash\n$ cp /u01/dbfile/O12C/control01.ctl /u01/dbfile/O12C/control02.ctl\n\
  ```\n\n### 步骤 5：启动数据库\n\n```sql\nSQL> startup;\n```\n\n你可以通过显示`CONTROL_FILES`参数来验证新控制文件是否正在被使用：\n\
  \n```sql\nSQL> show parameter control_files\n```\n\n此示例的输出如下：\n\n```\nNAME            TYPE        VALUE\n\
  --------------- ----------- ------------------------------\ncontrol_files   string      /u01/dbfile/O12C/control01.ctl\n\
                              ,/u01/dbfile/O12C/control02.ctl\n```\n\n## Init.ora\
  \ 场景\n\n运行以下语句以验证你是否在使用`init.ora`文件。如果你没有使用`spfile`，`VALUE`列将为空：\n\n```sql\nSQL>\
  \ show parameter spfile\nNAME       TYPE        VALUE\n---------- ----------- ------------------------------\n\
  spfile     string\n```\n\n要使用文本`init.ora`文件添加控制文件，请执行以下步骤：\n\n### 步骤 1：关闭数据库\n\n\
  ```sql\nSQL> shutdown immediate;\n```\n\n### 步骤 2：编辑`init.ora`文件\n\n使用操作系统实用程序（如`vi`）编辑你的`init.ora`文件，并将新的控制文件位置和名称添加到`CONTROL_FILES`参数中。此示例使用`vi`打开`init.ora`文件，并将`control02.ctl`添加到`CONTROL_FILES`参数：\n\
  \n\n\n#### 添加控制文件\n\n1.  在`$ vi $ORACLE_HOME/dbs/initO12C.ora`中编辑初始化参数文件。\n\n  \
  \  添加后，`CONTROL_FILES`参数如下所示：\n\n    ```sql\n    control_files='/u01/dbfile/O12C/control01.ctl',\
  \ \n                  '/u01/dbfile/O12C/control02.ctl'\n    ```\n\n2.  在操作系统中，将现有的控制文件复制到要添加的控制文件的目录和名称：\n\
  \n    ```bash\n    $ cp /u01/dbfile/O12C/control01.ctl /u01/dbfile/O12C/control02.ctl\n\
  \    ```\n\n3.  启动数据库：\n\n    ```sql\n    SQL> startup;\n    ```\n\n    通过显示`CONTROL_FILES`参数，可以查看正在使用的控制文件：\n\
  \n    ```sql\n    SQL> show parameter control_files\n    ```\n\n    对于本示例，输出如下：\n\
  \n    ```\n    NAME             TYPE        VALUE\n    ---------------- -----------\
  \ ------------------------------\n    control_files    string      /u01/dbfile/O12C/control01.ctl\n\
  \                                 ,/u01/dbfile/O12C/control02.ctl\n    ```\n\n####\
  \ 移动控制文件\n\n有时可能需要将控制文件从一个位置移动到另一个位置。例如，如果为数据库服务器添加了新存储，可能希望将现有控制文件移动到新位置。\n\n移动控制文件的步骤与添加控制文件非常相似。唯一的区别是重命名而不是复制控制文件。此示例展示了在使用`spfile`时如何移动控制文件：\n\
  \n1.  确定`CONTROL_FILES`参数的当前值：\n\n    ```sql\n    SQL> show parameter control_files\n\
  \n    NAME              TYPE        VALUE\n    ----------------- ----------- ------------------------------\n\
  \    control_files     string      /u01/dbfile/O12C/control01.ctl\n    ```\n\n2.\
  \  修改`CONTROL_FILES`参数以反映正在移动控制文件。在此示例中，控制文件当前位置是：\n\n    ```\n    /u01/dbfile/O12C/control01.ctl\n\
  \    ```\n\n    将控制文件移动到此位置：\n\n    ```\n    /u02/dbfile/O12C/control01.ctl\n  \
  \  ```\n\n    修改`spfile`以反映控制文件的新位置。必须指定`SCOPE=SPFILE`，因为`CONTROL_FILES`参数无法在内存中修改：\n\
  \n    ```sql\n    SQL> alter system set\n         control_files='/u02/dbfile/O12C/control01.ctl'\
  \ scope=spfile;\n    ```\n\n3.  关闭数据库：\n\n    ```sql\n    SQL> shutdown immediate;\n\
  \    ```\n\n4.  在操作系统提示符下，将控制文件移动到新位置。此示例使用操作系统`mv`命令：\n\n    ```bash\n    $ mv\
  \ /u01/dbfile/O12C/control01.ctl /u02/dbfile/O12C/control01.ctl\n    ```\n\n5. \
  \ 启动数据库：\n\n    ```sql\n    SQL> startup;\n    ```\n\n    可以通过显示`CONTROL_FILES`参数来验证是否正在使用新的控制文件：\n\
  \n    ```sql\n    SQL> show parameter control_files\n    ```\n\n    此示例的输出如下：\n\n\
  \    ```\n    NAME             TYPE        VALUE\n    ---------------- -----------\
  \ ------------------------------\n    control_files    string      /u02/dbfile/O12C/control01.ctl\n\
  \    ```\n\n## 删除控制文件\n\n可能会遇到包含一个多路复用控制文件的存储设备发生介质故障的情况：\n\n```\nORA-00205: error\
  \ in identifying control file, check alert log for more info\n```\n\n在此场景中，您仍然至少有一个完好的控制文件。要删除控制文件，请遵循以下步骤：\n\
  \n1.  通过检查`alert.log`获取信息来确定哪个控制文件发生了介质故障：\n\n    ```\n    ORA-00210: cannot open\
  \ the specified control file\n    ORA-00202: control file: '/u01/dbfile/O12C/control02.ctl'\n\
  \    ```\n\n2.  从`CONTROL_FILES`参数中移除不可用的控制文件名。如果使用的是`init.ora`文件，请使用操作系统编辑器（如`vi`）直接修改该文件。如果使用的是`spfile`，请使用`ALTER\
  \ SYSTEM`语句修改`CONTROL_FILES`参数。在此`spfile`示例中，从`CONTROL_FILES`参数中移除了`control02.ctl`控制文件：\n\
  \n    ```sql\n    SQL> alter system set control_files='/u01/dbfile/O12C/control01.ctl'\n\
  \         scope=spfile;\n    ```\n\n\n\n### 管理在线重做日志\n\n此数据库当前仅关联了一个控制文件。您绝不应只用一个控制文件来运行生产数据库。有关如何向数据库添加更多控制文件的详细信息，请参阅本章前面的“添加控制文件”部分。\n\
  \n3.  停止并启动数据库：\n\n```sql\nSQL> shutdown immediate;\nSQL> startup;\n```\n\n## 在线重做日志的用途\n\
  \n在线重做日志存储了数据库中发生事务的记录。这些日志具有以下用途：\n\n*   提供一种记录数据库更改的机制，以便在发生介质故障时，您有一种恢复事务的方法。\n\
  *   确保在发生实例完全故障时，即使已提交的数据更改尚未写入数据文件，已提交的事务也可以被恢复（崩溃恢复）。\n*   允许管理员通过 Oracle LogMiner\
  \ 实用程序检查历史数据库事务。\n*   它们被 Oracle 工具（如 GoldenGate 或 Streams）读取以复制数据。\n\n您的数据库中必须至少有两个在线重做日志组。每个在线重做日志组必须至少包含一个在线重做日志成员。成员是磁盘上存在的物理文件。您可以在每个重做日志组中创建多个成员，这称为对在线重做日志组进行**多路复用**。\n\
  \n![Image](img/sq.jpg) **提示** 我强烈建议您对在线重做日志组进行多路复用，如果可能，让每个成员位于由独立控制器管理的独立物理设备上。\n\
  \n## 日志写入器进程\n\n日志写入器是一个后台进程，负责将事务信息从重做日志缓冲区（在 SGA 中）写入在线重做日志文件（在磁盘上）。在以下任一情况发生时，日志写入器会刷新重做日志缓冲区的内容：\n\
  \n*   发出 `COMMIT` 或 `ROLLBACK`。\n*   发生日志切换。\n*   三秒钟过去。\n*   重做日志缓冲区已满三分之一。\n*\
  \   重做日志缓冲区填满到一兆字节。\n\n## 当前在线重做日志组与日志切换\n\n日志写入器正在主动写入的在线重做日志组是 `当前在线重做日志组`。日志写入器同时写入重做日志组的所有成员。日志写入器只需成功写入一个成员，数据库即可继续运行。如果日志写入器无法成功写入当前组中的至少一个成员，数据库将停止运行。\n\
  \n当当前在线重做日志组填满时，会发生日志切换，日志写入器开始写入下一个在线重做日志组。日志写入器以轮询方式写入在线重做日志组。因为在线重做日志组的数量是有限的，最终每个在线重做日志组的内容将被覆盖。如果您想保存事务信息的历史记录，必须将数据库置于归档日志模式（请参阅本章后面的“实现归档日志模式”部分）。\n\
  \n当数据库处于归档日志模式时，每次日志切换后，归档器后台进程会将在线重做日志文件的内容复制到归档重做日志文件。在发生故障时，归档重做日志文件允许您还原自上次数据库备份以来发生的所有事务的完整历史记录。\n\
  \n图 2-1 展示了一个典型的在线重做日志文件设置。此图显示了三个在线重做日志组，每组包含两个成员。数据库处于归档日志模式。图中，第 2 组已因事务填满，发生了日志切换，日志写入器现在正在写入第\
  \ 3 组。归档器进程正在将第 2 组的内容复制到归档重做日志文件。当第 3 组填满时，将再次发生日志切换，日志写入器将开始写入第 1 组。同时，归档器进程会将第\
  \ 3 组的内容复制到归档日志序列 3（依此类推）。\n\n![9781484207642_Fig02-01.jpg](img/9781484207642_Fig02-01.jpg)\n\
  \n**图 2-1.** 在线重做日志配置\n\n在线重做日志文件不用于备份。这些文件仅包含数据库生成的最新重做事务信息。当您启用归档时，归档重做日志文件是保护数据库事务历史的机制。\n\
  \n![Image](img/sq.jpg) **注意** 在 Oracle 真应用集群（RAC）数据库中，每个实例都有自己的一组在线重做日志。这被称为一个重做\
  \ `线程`。每个 RAC 实例写入自己的在线重做日志，并生成自己线程的归档重做日志文件。此外，每个实例必须能够读取任何其他实例的在线重做日志。这一点很重要，因为如果一个实例崩溃，其他幸存的实例可以通过读取崩溃实例的在线重做日志来启动实例恢复。\n\
  \n## 保护在线重做日志文件\n\n当前在线重做日志文件的内容在发生日志切换之前不会被归档。这意味着如果您丢失了当前在线重做日志文件的所有成员，您将丢失事务。下面列出了几种您可以实施的机制，以最大限度地降低在线重做日志文件故障的可能性：\n\
  \n*   对组进行多路复用。\n*   如果可能，切勿让同一组的两个成员共享同一个控制器。\n*   如果可能，切勿将同一组的两个成员放在同一个物理磁盘上。\n\
  *   确保操作系统文件权限设置得当（限制性，只有 Oracle 二进制文件的所有者具有读写权限）。\n*   使用冗余的物理存储设备（例如，RAID [廉价磁盘冗余阵列]）。\n\
  *   合理设置日志文件大小，以便它们定期切换和归档。\n*   考虑设置 `ARCHIVE_LAG_TARGET` 初始化参数，以确保在线重做日志定期切换。\n\
  \n![Image](img/sq.jpg) **注意** Oracle 提供的唯一能在您丢失当前在线重做日志组所有成员时保护您并保留所有已提交事务的工具是 Oracle\
  \ Data Guard，需以最大保护模式实施。有关 Oracle Data Guard 保护模式的更多详细信息，请参阅 MOS 说明 239100.1。\n\n\
  ## 在线重做日志与备份\n\n在线重做日志文件绝不会被 RMAN 备份或用户管理的热备份所备份。如果您确实备份了在线重做日志文件，那么还原它们也是没有意义的。在线重做日志文件包含数据库生成的最新重做信息。您不会希望用备份中包含旧重做信息的文件来覆盖它们。对于处于归档日志模式的数据库，其中的在线重做日志文件包含执行完全恢复所需的最新生成的事务。\n\
  \n#### 显示在线重做日志信息\n\n使用 `V$LOG` 和 `V$LOGFILE` 视图显示有关在线重做日志组及相应成员的信息：\n\n```sql\n\
  COL group#     FORM 99999\nCOL thread#    FORM 99999\nCOL grp_status FORM a10\n\
  COL member     FORM a30\nCOL mem_status FORM a10\nCOL mbytes     FORM 999999\n--\n\
  SELECT\n a.group#\n,a.thread#\n,a.status grp_status\n,b.member member\n,b.status\
  \ mem_status\n,a.bytes/1024/1024 mbytes\nFROM v$log     a,\n     v$logfile b\nWHERE\
  \ a.group# = b.group#\nORDER BY a.group#, b.member;\n\nGROUP# THREAD# GRP_STATUS\
  \ MEMBER                         MEM_STATUS  MBYTES\n------ ------- ---------- ------------------------------\
  \ ---------- -------\n     1       1 CURRENT    /u01/oraredo/O12C/redo01a.rdo  \
  \          50\n     1       1 CURRENT    /u02/oraredo/O12C/redo01b.rdo         \
  \   50\n     2       1 INACTIVE   /u01/oraredo/O12C/redo02a.rdo            50\n\
  \     2       1 INACTIVE   /u02/oraredo/O12C/redo02b.rdo            50\n     3 \
  \      1 INACTIVE   /u01/oraredo/O12C/redo03a.rdo            50\n     3       1\
  \ INACTIVE   /u02/oraredo/O12C/redo03b.rdo            50\n```\n\n\n"
- "# Oracle 在线重做日志诊断与优化\n\n当你正在诊断在线重做日志问题时，`V$LOG` 和 `V$LOGFILE` 视图特别有用。在数据库处于已挂载或打开状态时，你都可以查询这些视图。\n\
  \n#### 确定在线重做日志组的最佳大小\n\n尝试将在线重做日志的大小调整为每小时切换 2 到 6 次。`V$LOG_HISTORY` 视图包含在线重做日志切换频率的历史记录。执行以下查询可以查看每小时的日志切换次数：\n\
  \n```\nselect count(*)\n,to_char(first_time,'YYYY:MM:DD:HH24')\nfrom v$log_history\n\
  group by to_char(first_time,'YYYY:MM:DD:HH24')\norder by 2;\n\nCOUNT(*) TO_CHAR(FIRST\n\
  ---------- -------------\n         2 2014:09:24:04\n        80 2014:09:24:05\n \
  \       44 2014:09:24:06\n        10 2014:09:24:12\n```\n\n从上面的输出可以看到，大约在凌晨 4:00\
  \ 到 6:00 发生了大量的日志切换活动。这可能是由于夜间批处理作业或不同时区的用户更新数据所致。对于这个数据库，应增加在线重做日志的大小。你应该尝试调整在线重做日志的大小，以适应数据库的峰值事务负载。\n\
  \n`V$LOG_HISTORY` 视图的数据来源于控制文件。每次发生日志切换时，该视图中会记录一条详细信息，如切换时间和系统变更号 (SCN)。如前所述，一个经验法则是，你应该将在线重做日志文件的大小调整为大约每小时切换\
  \ 2 到 6 次。你不希望它们切换得太频繁，因为日志切换本身有开销。Oracle 会将检查点作为日志切换的一部分来启动。在检查点期间，数据库写入器后台进程将已修改（也称为脏）的数据块写入磁盘，这是资源密集型的操作。\n\
  \n另一方面，你也不希望在线重做日志文件从不切换，因为当前的在线重做日志包含在恢复事件中你可能需要的事务。如果灾难导致当前在线重做日志发生介质故障，你可能会丢失那些尚未归档的事务。\n\
  \n`![Image](img/sq.jpg)` `提示` 使用 `ARCHIVE_LAG_TARGET` 初始化参数来设置日志切换之间的最大时间（以秒为单位）。此参数的典型设置是\
  \ 1800 秒（30 分钟）。值为 0（默认值）会禁用此功能。此参数通常用于 Oracle Data Guard 环境中，以在指定的时间过后强制进行日志切换。\n\
  \n你也可以查询 `V$INSTANCE_RECOVERY` 视图中的 `OPTIMAL_LOGFILE_SIZE` 列，以确定你的在线重做日志文件大小是否设置正确：\n\
  \n```\nSQL> select optimal_logfile_size from v$instance_recovery;\n```\n\n此列报告了被认为是“最优”的重做日志文件大小（以兆字节为单位），该大小是基于初始化参数\
  \ `FAST_START_MTTR_TARGET` 的设置。Oracle 建议你将所有在线重做日志配置为至少达到 `OPTIMAL_LOGFILE_SIZE`\
  \ 的值。然而，在调整在线重做日志大小时，你必须考虑你的环境信息（例如切换频率）。\n\n#### 确定重做日志组的最佳数量\n\nOracle 至少需要两个重做日志组才能运行。但是，只有两个组有时是不够的。要理解原因，请记住每次日志切换发生时，都会启动一个检查点。作为检查点的一部分，数据库写入器会将所有已修改（脏）的数据块从\
  \ SGA 写入磁盘上的数据文件。同时回想一下，在线重做日志是按轮询方式写入的，最终给定日志中的信息会被覆盖。在日志写入器可以开始覆盖在线重做日志中的信息之前，必须先将\
  \ SGA 中与该重做日志关联的所有已修改块写入数据文件。如果并非所有已修改块都已写入数据文件，你会在 `alert.log` 文件中看到此消息：\n\n```\n\
  Thread 1 cannot allocate new log, sequence <sequence number>\nCheckpoint not complete\n\
  ```\n\n解释此问题的另一种方式是，Oracle 需要在在线重做日志中存储任何可能用于执行崩溃恢复的信息。为了帮助你可视化这一点，请参见 图 2-2。\n\n\
  ![9781484207642_Fig02-02.jpg](img/9781484207642_Fig02-02.jpg)\n\n图 2-2. 在修改的（脏）缓冲区写入磁盘之前，重做受保护。\n\
  \n在时间 1，块 A 从数据文件 AA 读入缓冲区高速缓存并被修改。在时间 2，重做更改向量信息（块如何更改）被写入日志缓冲区。在时间 3，日志写入器进程将块\
  \ A 的更改向量信息写入在线重做日志 1。在时间 4，发生日志切换，在线重做日志 2 成为当前的在线重做日志。\n\n现在，假设在线重做日志 2 很快填满并发生另一次日志切换，此时日志写入器尝试写入在线重做日志\
  \ 1。在数据库块写入器将块 A 写入数据文件 AA 之前，日志写入器不被允许覆盖在线重做日志 1 中的信息。在块 A 被写入数据文件 AA 之前，如果发生电源故障或\
  \ `shutdown abort`，Oracle 需要在线重做日志中的信息来恢复此块。在覆盖在线重做日志中的信息之前，Oracle 会确保受重做保护的数据块已写入磁盘。如果这些修改的块尚未写入磁盘，Oracle\
  \ 会暂时挂起处理，直到写入完成。有几种方法可以解决此问题：\n\n*   添加更多的重做日志组。\n*   降低 `FAST_START_MTTR_TARGET`\
  \ 的值。这样做会使数据库写入器进程在更短的时间内将较旧的修改块写入磁盘。\n*   调优数据库写入器进程（修改 `DB_WRITER_PROCESSES`）。\n\
  \n如果你注意到 `Checkpoint not complete` 消息经常出现（比如一天多次），我建议你添加一个或多个日志组来解决此问题。添加一个额外的重做日志为数据库写入器提供了更多时间，在关联的重做信息被覆盖之前，将数据库缓冲区高速缓存中的修改块写入数据文件。添加更多的重做日志组几乎没有缺点。主要的问题是，你可能会遇到创建数据库时使用的\
  \ `MAXLOGFILES` 值的限制。如果你需要添加更多的组并且已经超出了 `MAXLOGFILES` 的值，那么你必须重新创建控制文件并为此参数指定一个更高的值。\n\
  \n如果添加更多的重做日志组不能解决问题，你应该仔细考虑降低 `FAST_START_MTTR_TARGET` 的值。当你降低此值时，可能会看到更多的 I/O，因为数据库写入器进程更积极地将修改块写入数据文件。理想情况下，最好在生产环境进行更改之前，在测试环境中验证修改\
  \ `FAST_START_MTTR_TARGET` 的影响。你可以在实例运行时修改此参数；这意味着如果出现不可预见的副作用，你可以快速将其修改回原始设置。\n\
  \n最后，考虑增加 `DB_WRITER_PROCESSES` 参数的值。在生产环境应用此更改之前，请仔细分析在测试环境中修改此参数的影响。此值的修改需要停止并启动数据库；因此，如果产生不利影响，则需要停机才能将此值更改回原始设置。\n\
  \n#### 添加在线重做日志组\n\n如果你确定需要添加在线重做日志组，请使用 `ADD LOGFILE GROUP` 语句。在此示例中，数据库已包含两个大小各为\
  \ 50M 的在线重做日志组。添加了一个额外的日志组，该组有两个成员，大小为 50MB：\n\n```\nalter database add logfile\
  \ group 3\n('/u01/oraredo/O12C/redo03a.rdo',\n '/u02/oraredo/O12C/redo03b.rdo')\
  \ SIZE 50M;\n```\n\n\n在此场景下，我强烈建议你添加的日志组应与现有的在线重做日志大小相同，并且包含相同数量的成员。如果新添加的组与现有组的物理特性不一致，将更难准确判断性能问题。\n\
  \n例如，如果你有两个大小为 50MB 的日志组，而你添加了一个大小为 500MB 的新日志组，这很可能会产生前一节描述的`Checkpoint not complete`（检查点未完成）问题。这是因为，从\
  \ SGA 中刷出由 500MB 日志文件保护的所有已修改数据块，所需时间可能远比刷出由 50MB 日志文件保护的已修改数据块长得多。\n\n## 调整大小与删除在线重做日志组\n\
  \n你可能需要更改在线重做日志的大小（参见本章前面的“确定在线重做日志组的最佳大小”一节）。你无法直接修改现有在线重做日志的大小。要调整在线重做日志的大小，必须先添加符合你目标大小的在线重做日志组，然后删除旧大小的日志。\n\
  \n假设你想将每个在线重做日志的大小调整为 200MB。首先，使用`ADD LOGFILE GROUP`语句添加大小为 200MB 的新组。以下示例添加了日志组\
  \ 4，包含两个大小为 200MB 的成员：\n\n```\nalter database add logfile group 4\n('/u01/oraredo/O12C/redo04a.rdo',\n\
  \ '/u02/oraredo/O12C/redo04b.rdo') SIZE 200M;\n```\n\n![Image](img/sq.jpg) **注意**\
  \ 你可以指定日志文件的大小，单位可以是字节、千字节、兆字节或千兆字节。\n\n添加了新大小的日志文件后，就可以删除旧的在线重做日志了。一个日志组必须处于`INACTIVE`（非活动）状态才能被删除。你可以检查日志组的状态，如下所示：\n\
  \n```\nSQL> select group#, status, archived, thread#, sequence# from v$log;\n```\n\
  \n你可以使用`ALTER DATABASE DROP LOGFILE GROUP`语句删除一个非活动的日志组：\n\n```\nSQL> alter database\
  \ drop logfile group <group #>;\n```\n\n如果你尝试删除当前的在线日志组，Oracle 会返回一个`ORA-01623`错误，提示你不能删除当前组。使用`ALTER\
  \ SYSTEM SWITCH LOGFILE`语句切换日志，使下一个组成为当前组：\n\n```\nSQL> alter system switch logfile;\n\
  ```\n\n日志切换后，先前作为当前组的日志组，只要其中包含 Oracle 执行崩溃恢复所需的重做信息，就会保持活动状态。如果你尝试删除一个状态为活动的日志组，Oracle\
  \ 会抛出一个`ORA-01624`错误，指出该日志组是崩溃恢复所必需的。执行`ALTER SYSTEM CHECKPOINT`命令使日志组变为非活动状态：\n\
  \n```\nSQL> alter system checkpoint;\n```\n\n此外，如果删除一个在线重做日志组会导致你的数据库只剩下最后一个日志组，那么你不能删除它。如果你尝试这样做，Oracle\
  \ 会抛出`ORA-01567`错误，并告知你删除该日志组不被允许，因为这会使你的数据库少于两个日志组（如前所述，Oracle 至少需要两个重做日志组才能运行）。\n\
  \n删除一个在线重做日志组并不会从操作系统中删除日志文件。你必须使用操作系统命令（例如 Linux/Unix 命令`rm`）来删除文件。在从操作系统中删除文件之前，请确保该文件未在使用，并且你删除的不是活动的在线重做日志文件。针对服务器上的每个数据库，执行此查询以查看哪些在线重做日志文件正在使用中：\n\
  \n```\nSQL> select member from v$logfile;\n```\n\n在物理删除日志文件之前，先执行足够多次的日志切换，确保所有在线重做日志组最近都已被切换过；这样做会使操作系统写入该文件，从而为其更新时间戳。例如，如果你有三个组，请确保执行至少三次日志切换：\n\
  \n```\nSQL> alter system switch logfile;\nSQL> /\nSQL> /\n```\n\n现在，在操作系统提示符下验证你打算删除的日志文件是否没有新的时间戳。首先，进入包含在线重做日志文件的目录：\n\
  \n```\n$ cd  /u01/oraredo/O12C\n```\n\n然后，列出文件以查看最新的修改日期：\n\n```\n$ ls -altr\n```\n\
  \n当你完全确定该文件未被使用时，才可以删除它。删除文件的风险在于，如果它恰好是一个正在使用的在线重做日志，并且是某个组的唯一成员，则可能对你的数据库造成严重损害。确保你拥有数据库的良好备份，并且要删除的文件未被服务器上的任何数据库使用。\n\
  \n#### 向组中添加在线重做日志文件\n\n你可能偶尔需要向现有组中添加一个日志文件。例如，如果你有一个仅包含一个成员的在线重做日志组，你应该考虑添加一个日志文件（以提供更高级别的保护，防止单一日志文件成员故障）。使用`ALTER\
  \ DATABASE ADD LOGFILE MEMBER`语句向现有的在线重做日志组添加一个成员文件。你需要指定新成员文件的位置、名称以及要添加到的组：\n\n\
  ```\nSQL> alter database add logfile member '/u02/oraredo/O12C/redo01b.rdo' to group\
  \ 1;\n```\n\n请确保你遵循关于任何新添加的重做日志文件的位置和命名的标准。\n\n#### 从组中移除在线重做日志文件\n\n偶尔，你可能需要从一个组中移除一个在线重做日志文件。例如，你的数据库可能经历了一个多路复用组中某个成员的故障，而你希望移除这个失效的成员。首先，确保你要删除的日志文件不在当前组中：\n\
  \n```\nSELECT a.group#, a.member, b.status, b.archived, SUM(b.bytes)/1024/1024 mbytes\n\
  FROM v$logfile a, v$log b\nWHERE a.group# = b.group#\nGROUP BY a.group#, a.member,\
  \ b.status, b.archived\nORDER BY 1, 2;\n```\n\n如果你尝试删除状态为`CURRENT`（当前）的组中的日志文件，你会收到以下错误：\n\
  \n```\nORA-01623: log 2 is current log for instance O12C (thread 1) - cannot drop\n\
  ```\n\n如果你正在尝试从当前的在线重做日志组中删除一个成员，则强制进行一次切换，如下所示：\n\n```\nSQL> alter system switch\
  \ logfile;\n```\n\n使用`ALTER DATABASE DROP LOGFILE MEMBER`语句从现有的在线重做日志组中移除一个成员文件。你不需要指定组号，因为你是在移除一个特定的文件：\n\
  \n```\nSQL> alter database drop logfile member '/u01/oraredo/O12C/redo04a.rdo';\n\
  ```\n\n你也不能删除一个组中最后一个剩余的日志文件。一个组必须至少包含一个日志文件。如果你尝试删除一个组中最后一个剩余的日志文件，你会收到以下错误：\n\n\
  ```\nORA-00361: cannot remove last log member ...\n```\n\n#### 移动或重命名重做日志文件\n\n\
  有时，你需要移动或重命名在线重做日志文件。例如，你可能向系统添加了一些新的挂载点，并希望将在线重做日志移动到新的存储设备上。你可以使用两种方法来完成此任务：\n\
  \n*   在新位置添加新的日志文件，然后删除旧的日志文件。\n*   在操作系统层面物理重命名文件。\n\n如果你无法承担任何停机时间，请考虑在新位置添加新的日志文件，然后删除旧的日志文件。有关如何添加日志组的详细信息，请参阅本章前面的“添加在线重做日志组”一节。另请参阅本章前面的“调整大小与删除在线重做日志组”一节，了解如何删除日志组。\n\
  \n\n## 移动在线重做日志文件\n\n或者，您可以从操作系统层面物理移动文件。您可以在数据库打开或关闭的状态下执行此操作。如果您的数据库是打开的，请确保您移动的文件不属于当前的在线重做日志组（因为这些文件正被日志写入器后台进程写入）。在数据库打开时尝试执行此任务是危险的，因为在活动系统中，在线重做日志可能正在快速切换，这会导致您有可能在文件被切换为当前在线重做日志时尝试移动它。因此，我强烈建议您仅在数据库关闭时执行此操作。\n\
  \n下一个示例展示了如何在数据库关闭时移动在线重做日志文件。步骤如下：\n\n1.  关闭数据库：\n\n    ```\n    SQL> shutdown\
  \ immediate;\n    ```\n\n2.  在操作系统提示符下，移动文件。此示例使用 `mv` 命令完成此任务：\n\n    ```\n   \
  \ $ mv /u02/oraredo/O12C/redo02b.rdo /u01/oraredo/O12C/redo02b.rdo\n    ```\n\n\
  3.  以 `mount` 模式启动数据库：\n\n    ```\n    SQL> startup mount;\n    ```\n\n4.  用新的文件位置和名称更新控制文件：\n\
  \n    ```\n    SQL> alter database rename file '/u02/oraredo/O12C/redo02b.rdo'\n\
  \         to '/u01/oraredo/O12C/redo02b.rdo';\n    ```\n\n5.  打开数据库：\n\n    ```\n\
  \    SQL> alter database open;\n    ```\n\n您可以通过查询 `V$LOGFILE` 视图来验证您的在线重做日志是否已位于新位置。我还建议您切换几次在线重做日志，然后从操作系统验证这些文件是否具有最近的时间戳。同时检查\
  \ `alert.log` 文件是否有任何相关错误。\n\n## 实现归档日志模式\n\n回顾本章前面的讨论，只有当您的数据库处于归档日志模式时，才会创建归档重做日志。如果您希望保留数据库事务历史以支持时间点恢复和其他类型的恢复，就需要启用该模式。\n\
  \n在正常操作中，对数据的更改会在数据库重做日志文件中生成条目。当每个在线重做日志组填满时，会启动日志切换。当发生日志切换时，日志写入器进程停止向最近填满的在线重做日志组写入，并开始向一个新的在线重做日志组写入。在线重做日志组以轮转方式被写入——这意味着任何给定的在线重做日志组的内容最终将被覆盖。归档日志模式通过使用归档器后台进程将已填满的在线重做日志的内容复制到所谓的\
  \ `archive redo log file` 中，从而长期保留重做数据。归档重做日志文件的轨迹对于您能够恢复数据库并保留所有更改直至故障发生的确切时刻至关重要。\n\
  \n#### 做出架构决策\n\n当您实现归档日志模式时，您还需要一个管理归档日志文件的策略。归档重做日志会消耗磁盘空间。如果置之不理，这些文件最终将用完分配给它们的所有空间。如果发生这种情况，归档器就无法将新的归档重做日志文件写入磁盘，而您的数据库将停止处理事务。那时，您将面对一个挂起的数据库。然后您需要手动干预，为归档器创建空间以恢复工作。由于这些原因，在启用归档之前，您必须仔细考虑几个架构决策：\n\
  \n*   将归档重做日志放置在何处，以及是否使用 `FRA` 来存储它们\n*   如何命名归档重做日志\n*   为归档重做日志位置分配多少空间\n*  \
  \ 多久备份一次归档重做日志\n*   何时可以从磁盘永久删除归档重做日志\n*   如何删除归档重做日志（例如，让 `RMAN` 根据保留策略删除日志）\n\
  *   是否应启用多个归档重做日志位置\n*   （何时安排所需的少量停机时间（如果是生产数据库）\n\n作为一般经验法则，您的主要归档重做位置应有足够的空间来容纳至少一天的归档重做日志。这允许您每天备份它们，并在备份后从磁盘中删除它们。\n\
  \n如果您决定使用 `FRA` 作为归档重做日志位置，您必须确保它包含足够的空间来容纳备份之间生成的归档重做日志数量。请记住，`FRA` 通常包含其他类型的文件，例如\
  \ `RMAN` 备份文件、闪回日志等。如果您使用 `FRA`，请注意其他类型文件的生成可能会潜在地影响归档重做日志文件所需的空间。\n\n您需要一个自动化备份和删除归档重做日志文件的策略。对于用户管理的备份，可以通过一个\
  \ shell 脚本来实现，该脚本定期将归档重做日志复制到备份位置，然后从主要位置删除它们。正如您将在后续章节中看到的，`RMAN` 可以自动化归档重做日志文件的备份和删除。\n\
  \n如果您的业务要求是必须具备一定程度的高可用性和冗余，那么您应该考虑将归档重做日志写入多个位置。一些机构设置作业，定期将归档重做日志复制到磁盘上的不同位置，甚至是不同的服务器。\n\
  \n#### 设置归档重做文件位置\n\n在将数据库模式设置为归档之前，您应明确指示 `Oracle` 您希望归档重做日志放置的位置。您可以使用以下技术设置归档重做日志文件目标：\n\
  \n*   设置 `LOG_ARCHIVE_DEST_N` 数据库初始化参数。\n*   实现 `FRA`。\n\n这两种方法将在以下部分详细讨论。\n\n`images/sq.jpg`\
  \ **提示** 如果您未通过初始化参数或启用 `FRA` 明确设置归档重做日志位置，那么归档重做日志将被写入默认位置。对于 `Linux/Unix`，默认位置是\
  \ `ORACLE_HOME/dbs`。对于 `Windows`，默认位置是 `ORACLE_HOME\\database`。对于活动的生产数据库系统，默认的归档重做日志位置通常不合适。\n\
  \n### 设置归档位置到用户定义的磁盘位置（非 FRA）\n\n如果您使用的是 `init<SID>.ora` 文件，请使用操作系统实用程序（例如 `vi`）修改该文件。在此示例中，归档重做日志位置设置为\
  \ `/u01/oraarch/O12C`：\n\n```\nlog_archive_dest_1='location=/u01/oraarch/O12C'\n\
  log_archive_format='O12C_%t_%s_%r.arc'\n```\n\n在之前的代码行中，我命名归档重做日志文件的标准包括 `ORACLE_SID`（在此示例中，以\
  \ `O12C` 开始字符串）；强制参数 `%t`、`%s` 和 `%r`；以及字符串 `.arc` 作为结尾。我喜欢在字符串中嵌入 `ORACLE_SID`\
  \ 的名称，以避免在一台服务器上托管多个数据库时产生混淆。我喜欢使用扩展名 `.arc` 来将这些文件与其他类型的数据库文件区分开来。\n\n`images/sq.jpg`\
  \ **提示** 如果您没有为 `LOG_ARCHIVE_FORMAT` 指定值，`Oracle` 会使用默认值，例如 `%t_%s_%r.dbf`。默认格式的一个我不喜欢的方面是它以扩展名\
  \ `.dbf` 结尾，该扩展名广泛用于数据文件。这可能会引起关于某个特定文件是否可以安全删除的混淆，因为它是一个旧的归档重做日志文件，还是不应该触动的实时数据文件。大多数\
  \ `DBA` 不愿意发出诸如 `rm *.dbf` 之类的命令，因为担心意外删除实时数据文件。\n\n如果您使用的是 `spfile`，请使用 `ALTER\
  \ SYSTEM` 修改相应的初始化变量：\n\n```\nSQL> alter system set log_archive_dest_1='location=/u01/oraarch/O12C'\
  \ scope=both;\nSQL> alter system set log_archive_format='O12C_%t_%s_%r.arc' scope=spfile;\n\
  ```\n\n\n你可以在数据库打开时动态更改 `LOG_ARCHIVE_DEST_n` 参数。然而，要让 `LOG_ARCHIVE_FORMAT` 参数生效，你必须停止并重新启动数据库。\n\
  \n## 从设置错误的 SPFILE 参数中恢复\n\n注意不要将 `LOG_ARCHIVE_FORMAT` 设置为无效值；例如，\n\n```sql\nSQL>\
  \ alter system set log_archive_format='%r_%y_%dk.arc' scope=spfile;\n```\n\n如果你这样做了，当你试图停止并重启数据库时，你甚至无法进入\
  \ `nomount` 阶段（因为 `spfile` 包含无效参数）：\n\n```sql\nSQL> startup nomount;\nORA-19905:\
  \ log_archive_format must contain %s, %t and %r\n```\n\n在这种情况下，如果你使用的是 `spfile`，你将无法启动实例。此时最简单的做法是从\
  \ `spfile` 的内容创建一个基于文本的 `init.ora` 文件。你可以使用 Linux/Unix 的 `strings` 命令来完成此操作：\n\n\
  ```bash\n$ cd $ORACLE_HOME/dbs\n$ strings spfile$ORACLE_SID.ora\n```\n\n前面的命令将从二进制的\
  \ `spfile` 中提取文本并将其显示在屏幕上。然后你可以将这些文本剪切并粘贴到 `init.ora` 文件中，并用它来启动数据库。如果你使用的是 Windows，可以使用像\
  \ `write.exe` 这样的实用程序来显示二进制文件中的文本。\n\n当你指定 `LOG_ARCHIVE_FORMAT` 时，必须在格式字符串中包含 `%t`（或\
  \ `%T`）、`%s`（或 `%S`）和 `%r`。表 2-1 列出了可以与 `LOG_ARCHIVE_FORMAT` 初始化参数一起使用的有效变量。\n\n\
  表 2-1. 日志归档格式字符串的有效变量\n\n| 格式字符串 | 含义 |\n| --- | --- |\n| `%s` | 日志序列号 |\n| `%S`\
  \ | 左侧补零的日志序列号 |\n| `%t` | 线程号 |\n| `%T` | 左侧补零的线程号 |\n| `%a` | 激活 ID |\n| `%d`\
  \ | 数据库 ID |\n| `%r` | `Resetlogs` ID，用于确保跨数据库多个化身的唯一性 |\n\n你可以通过运行以下命令查看 `LOG_ARCHIVE_DEST_N`\
  \ 参数的值：\n\n```sql\nSQL> show parameter log_archive_dest\n```\n\n以下是部分输出列表：\n\n```\n\
  NAME                   TYPE        VALUE\n---------------------- ----------- --------------------------\n\
  log_archive_dest       string\nlog_archive_dest_1     string      location=/u01/oraarch/O12C\n\
  log_archive_dest_10    string\n```\n\n对于 Oracle 11g 及更高版本，你可以启用最多 31 个不同的归档重做日志文件目标位置。对于大多数生产系统，一个归档重做日志目标位置通常就足够了。如果你需要更高级别的保护，可以启用多个目标位置。请记住，当你使用多个目标位置时，归档器必须能够成功写入至少一个位置。如果你启用了多个强制位置并将\
  \ `LOG_ARCHIVE_MIN_SUCCEED_DEST` 设置为大于 1，那么如果归档器无法写入所有强制位置，你的数据库可能会挂起。\n\n你可以通过以下查询检查有关归档重做日志位置状态的详细信息：\n\
  \n```sql\nSQL> select dest_name, destination, status, binding from v$archive_dest;\n\
  \nDEST_NAME            DESTINATION          STATUS    BINDING\n--------------------\
  \ -------------------- --------- ---------\nLOG_ARCHIVE_DEST_1   /u01/archive/O12C\
  \    VALID     OPTIONAL\nLOG_ARCHIVE_DEST_2                       INACTIVE  OPTIONAL\n\
  ...\n```\n\n## 使用 FRA 存放归档日志文件\n\n快速恢复区 (FRA) 是磁盘上的一个区域——通过数据库初始化参数指定——可用于存储文件，如归档重做日志、RMAN\
  \ 备份文件、闪回日志以及多路复用的控制文件和联机重做日志。要启用 FRA，你必须按顺序设置两个初始化参数：\n\n*   `DB_RECOVERY_FILE_DEST_SIZE`\
  \ 指定可用于存储在 FRA 中的所有文件的最大空间。\n*   `DB_RECOVERY_FILE_DEST` 指定 FRA 的基本目录。\n\n当你创建 FRA\
  \ 时，你并不是真的在创建什么——你是在告诉 Oracle 在存储属于 FRA 的文件时使用哪个目录。例如，假设在挂载点上预留了 200GB 的空间，并且你希望\
  \ FRA 的基本目录是 `/u01/fra`。要启用 FRA，首先设置 `DB_RECOVERY_FILE_DEST_SIZE`：\n\n```sql\nSQL>\
  \ alter system set db_recovery_file_dest_size=200g scope=both;\n```\n\n接下来，设置 `DB_RECOVERY_FILE_DEST`\
  \ 参数：\n\n```sql\nSQL> alter system set db_recovery_file_dest='/u01/fra' scope=both;\n\
  ```\n\n如果你使用的是 `init.ora` 文件，请使用操作系统实用程序（如 `vi`）修改它，添加适当的条目。\n\n启用 FRA 后，默认情况下，Oracle\
  \ 会将归档重做日志写入 FRA 中的子目录。\n\n> **注意：** 如果你已将 `LOG_ARCHIVE_DEST_N` 参数设置为磁盘上的某个位置，则归档重做日志不会写入\
  \ FRA。\n\n你可以验证归档位置是否使用了 FRA：\n\n```sql\nSQL> archive log list;\n```\n\n如果归档文件正在写入\
  \ FRA，你应该会看到类似以下的输出：\n\n```\nDatabase log mode              Archive Mode\nAutomatic\
  \ archival             Enabled\nArchive destination            USE_DB_RECOVERY_FILE_DEST\n\
  ```\n\n你可以像这样显示与 FRA 关联的目录：\n\n```sql\nSQL> show parameter db_recovery_file_dest\n\
  ```\n\n当你首次实现 FRA 时，基本 FRA 目录（由 `DB_RECOVERY_FILE_DEST` 指定）下没有子目录。当 Oracle 首次需要向\
  \ FRA 写入文件时，它会在基本目录下创建任何必需的目录。例如，实现 FRA 后，如果为数据库启用了归档，那么在第一次发生日志切换时，Oracle 会在基本\
  \ FRA 目录下创建以下目录：\n\n```\n<SID>/archivelog/<YYYY_MM_DD>\n```\n\n每天生成的归档重做日志都会在 FRA\
  \ 中创建一个新目录，使用目录名格式 `YYYY_MM_DD`。写入 FRA 的归档重做日志使用 OMF 格式命名约定（无论你是否设置了 `LOG_ARCHIVE_FORMAT`\
  \ 参数）。\n\n如果你希望归档重做日志同时写入 FRA 和非 FRA 位置，可以按如下方式启用：\n\n```sql\nSQL> alter system\
  \ set log_archive_dest_1='location=/u01/oraarch/O12C';\nSQL> alter system set log_archive_dest_2='location=USE_DB_RECOVERY_FILE_DEST';\n\
  ```\n\n`USE_DB_RECOVERY_FILE_DEST` 的归档目标表示正在使用 FRA。如果你想禁用 FRA，只需将 `db_recovery_file_dest`\
  \ 参数设置为空字符串：\n\n```sql\nSQL> alter system set db_recovery_file_dest='';\n``\n\n\
  我不会讨论启用和管理 FRA 的所有方面。只需注意，一旦启用，在发出 RMAN 备份命令时需要小心，并确保你有定期删除旧备份的策略。第 4 章 包含有关使用 FRA\
  \ 和 RMAN 备份的更多详细信息。\n\n#### 启用归档日志模式\n\n设置归档重做日志文件的位置后，你可以启用归档。要启用归档，你需要以 `SYS`（或具有\
  \ `SYSDBA` 权限的用户）身份连接到数据库，并执行以下操作：\n\n```sql\nSQL> shutdown immediate;\nSQL> startup\
  \ mount;\nSQL> alter database archivelog;\nSQL> alter database open;\n```\n\n你可以通过此查询确认归档日志模式：\n\
  \n```sql\nSQL> archive log list;\n```\n\n你也可以通过以下方式确认：\n\n```sql\nSQL> select log_mode\
  \ from v$database;\n\nLOG_MODE\n------------\nARCHIVELOG\n```\n\n#### 禁用归档日志模式\n\
  \n通常，你不会为生产数据库禁用归档日志模式。然而，你可能正在进行大数据加载，并希望减少与归档过程相关的任何开销，因此你希望在加载开始前关闭归档日志模式，然后在加载后重新启用。如果你这样做，请务必在重新启用归档后尽快进行备份。\n\
  \n要禁用归档，请以 `SYS`（或具有 `SYSDBA` 权限的用户）身份执行以下操作：\n\n\n# 处理归档日志目标空间不足的情况\n\n```\nSQL>\
  \ shutdown immediate;\nSQL> startup mount;\nSQL> alter database noarchivelog;\n\
  SQL> alter database open;\n```\n\n归档器后台进程会将归档重做日志写入您指定的位置。如果由于任何原因，归档器进程无法写入归档位置，您的数据库就会挂起。任何尝试连接的用户都会收到此错误：\n\
  \n```\nORA-00257: archiver error. Connect internal only, until freed.\n```\n\n作为生产支持\
  \ DBA，您绝不能让数据库进入那种状态。有时，不可预测的事件会发生，您必须处理这些未预料到的问题。\n\n![Image](img/sq.jpg)\n**注意**\
  \ 支持生产数据库的 DBA 与架构师 DBA 的思维方式完全不同，后者从花哨的演示或重复的文档中获取新想法。\n\n在这种情况下，您的数据库等同于宕机并完全不可用。要解决此问题，您必须迅速采取行动：\n\
  *   将文件移动到其他位置。\n*   压缩归档重做日志位置中的旧文件。\n*   永久删除旧文件。\n*   将归档重做日志目标切换到其他位置（可以在数据库启动并运行时动态更改）。\n\
  \n移动文件通常是解决归档器错误最快、最安全的方法。您可以使用诸如 `mv` 之类的操作系统实用程序，将旧的归档重做日志移动到其他位置。如果后续的还原和恢复需要它们，您可以告知恢复过程新位置。注意不要移动正在写入的归档重做日志。如果某个归档重做日志文件出现在\
  \ `V$ARCHIVED_LOG` 中，这意味着它已被完全归档。\n\n您可以使用诸如 `gzip` 之类的操作系统实用程序来压缩当前归档目标中的归档重做日志文件。如果您这样做，则必须记住解压缩任何以后可能需要用于还原和恢复的文件。注意不要压缩正在写入的归档重做日志。\n\
  \n另一个选择是使用诸如 `rm` 之类的操作系统实用程序从磁盘永久删除归档重做日志。这种方法很危险，因为后续恢复可能需要那些归档重做日志。如果您确实删除了归档重做日志文件，并且您没有它们的备份，那么您应尽快对数据库进行完整备份。同样，这种方法有风险，只应作为最后手段使用；如果您删除了尚未备份的归档重做日志，那么您可能无法执行完全恢复。\n\
  \n如果您的服务器上的另一个位置有充足的空间，您可以考虑更改归档重做日志的写入位置。您可以在数据库启动并运行时执行此操作；例如，\n\n```\nSQL> alter\
  \ system set log_archive_dest_1='location=/u02/oraarch/O12C';\n```\n\n在您解决主位置的问题后，可以切换回原始位置。\n\
  \n对于大多数数据库，将归档重做日志写入一个位置就足够了。但是，如果您有任何类型的灾难恢复或高可用性要求，那么您应该写入多个位置。有时，DBA 会设置一个作业，每小时备份归档重做日志，并将它们复制到备用位置甚至备用服务器。\n\
  \n#### 备份归档重做日志文件\n\n根据您的业务要求，您可能需要一个备份归档重做日志文件的策略。至少，您应该备份在备份处于归档日志模式的数据库期间生成的任何归档重做日志。其他策略可能包括\n\
  *   定期将归档重做日志复制到备用位置，然后从主目标中删除它们\n*   将归档重做日志复制到磁带，然后从磁盘删除它们\n*   使用两个归档重做日志位置\n\
  *   使用 Data Guard 实现稳健的灾难恢复解决方案\n\n请记住，您需要自上次良好备份的开始时间以来生成的所有归档重做日志，以确保能够完全恢复数据库。只有在确定拥有良好的数据库备份后，才应考虑删除该备份之前生成的归档重做日志。\n\
  \n如果您使用 RMAN 作为备份和恢复策略，那么您应该使用 RMAN 来备份归档重做日志。此外，您应该为这些文件指定 RMAN 保留策略，并仅在满足保留策略要求后（例如，在从磁盘删除前至少备份一次文件）让\
  \ RMAN 删除归档重做日志（有关使用 RMAN 的详细信息，请参见第 5 章）。\n\n### 管理表空间和数据文件\n\n术语 `tablespace`\
  \ 有点用词不当，因为它不仅仅是表的空间。相反，`tablespace` 是一个逻辑容器，允许您管理磁盘上的物理文件——数据文件——的组。创建表空间后，您就可以在表空间内创建数据库对象（表和索引），这会导致在关联的数据文件中分配磁盘空间。\n\
  \n`tablespace` 是逻辑的，意味着它仅通过数据字典视图（如 `DBA_TABLESPACES`）可见；您通过 SQL*Plus 或图形工具（如 Enterprise\
  \ Manager）或两者来管理表空间。表空间仅在数据库启动并运行时存在。\n\n`Data files` 也可以通过数据字典视图（如 `DBA_DATA_FILES`）查看，但还具有物理存在，因为可以通过操作系统实用程序（如\
  \ `ls`）在数据库外部查看它们。无论数据库是打开还是关闭，数据文件都持续存在。\n\nOracle 数据库通常包含多个表空间。一个表空间可以有一个或多个与之关联的数据文件，但一个数据文件只能与一个表空间关联。换句话说，一个数据文件不能在两个（或多个）表空间之间共享。\n\
  \n对象（如表和索引）由用户拥有并在表空间内创建。对象在逻辑上实例化为 `segment`（段）。一个 `segment` 由表空间内的 `extents`（区）组成。一个\
  \ `extent` 由一组数据库块组成。图 2-3 展示了这些用于管理 Oracle 数据库内部空间的逻辑和物理结构之间的关系。\n\n![9781484207642_Fig02-03.jpg](img/9781484207642_Fig02-03.jpg)\n\
  图 2-3 逻辑存储对象与物理存储的关系\n\n创建数据库时，执行 `CREATE DATABASE` 语句通常会创建五个表空间：`SYSTEM`、`SYSAUX`、`UNDO`、`TEMP`\
  \ 和 `USERS`。\n\n这五个表空间是运行数据库所需的最小存储容器集合（不过有人可能会说您不需要 `USERS` 表空间；更多内容将在下一节介绍）。在打开数据库使用时，您应迅速创建额外的表空间来存储应用程序数据。本章将讨论标准表空间集的用途、对额外表空间的需求，以及如何管理这些关键的数据库存储容器。本章重点介绍与创建和维护表空间及数据文件相关的最常见和最关键的任务，进而介绍更高级的主题，如移动和重命名数据文件。\n\
  \n## 理解前五个表空间\n\n`SYSTEM` 表空间为 Oracle 数据字典对象提供存储。这是所有 `SYS` 用户拥有的对象的存储位置。`SYS` 用户应是在\
  \ `SYSTEM` 表空间中创建对象的唯一用户。\n\n从 Oracle 10g 开始，创建数据库时会创建 `SYSAUX`（系统辅助）表空间。这是一个辅助表空间，用作\
  \ Oracle 数据库工具（如 Enterprise Manager、Statspack、LogMiner、Logical Standby 等）的数据存储库。\n\
  \n# Oracle 表空间概述\n\n## 不同类型的表空间\n\n### UNDO 表空间\n\n`UNDO` 表空间存储了撤销事务（`insert`、`update`、`delete`\
  \ 或 `merge`）效果所需的信息。这些信息在事务被有意回滚（通过 `ROLLBACK` 语句）时是必需的。Undo 信息也被 Oracle 用于从意外实例崩溃中恢复，并为\
  \ SQL 语句提供读一致性。此外，一些数据库功能（如闪回查询）也会使用 undo 信息。\n\n### TEMP 表空间\n\n某些 Oracle SQL 语句需要排序区，无论是在内存中还是在磁盘上。例如，查询结果在返回给用户之前可能需要排序。Oracle\
  \ 首先使用内存对查询结果进行排序，当内存不足时，`TEMP` 表空间就被用作磁盘上的排序区。在创建或重建索引时也可能需要额外的临时存储空间。当你创建数据库时，通常会创建\
  \ `TEMP` 表空间，并将其指定为你所创建的任何用户的默认临时表空间。\n\n### USERS 表空间\n\n`USERS` 表空间并非绝对必需，但它通常被用作用户表和索引数据的默认永久表空间。这意味着当用户尝试创建表或索引时，如果在创建对象时没有指定表空间，那么该对象默认会在默认永久表空间中创建。\n\
  \n## 理解更多需求\n\n虽然你可以将所有数据库用户的数据都放在 `USERS` 表空间中，但对于任何类型的专业数据库应用程序来说，这通常不具备可扩展性或可维护性。相反，为应用程序用户创建额外的表空间更为高效。你通常会为使用数据库的每个应用程序创建至少两个特定的表空间：一个用于应用程序表数据，另一个用于应用程序索引数据。例如，对于\
  \ `APP` 用户，你可以创建名为 `APP_DATA` 和 `APP_INDEX` 的表空间，分别用于存储表和索引数据。\n\n过去，DBA 出于性能原因会将表数据和索引数据分开存储。当时的思路是，将表数据与索引数据分开可以减少输入/输出（I/O）争用。这是因为（每个表空间的）数据文件可以放置在不同的磁盘上，并使用独立的控制器。\n\
  \n在现代存储配置中，应用程序与底层物理存储设备之间存在多层抽象，通过创建多个独立的表空间是否能实现任何性能提升是有争议的。但是，为表和索引数据创建多个表空间仍然有一些合理的理由：\n\
  *   表和索引的备份与恢复要求可能不同。\n*   索引的存储要求可能与表数据的存储要求不同。\n*   你可能使用 `BLOB` 和 `CLOB` 数据类型，这些类型通常与非\
  \ LOB 数据在空间大小上有显著不同的要求。因此，DBA 倾向于将 LOB 数据单独存放在自己的表空间中。\n\n根据你的需求，你应该考虑为使用数据库的每个应用程序创建独立的表空间。例如，为库存应用程序创建\
  \ `INV_DATA` 和 `INV_INDEX`；为人力资源应用程序创建 `HR_DATA` 和 `HR_INDEX`。以下是考虑为每个应用程序创建独立表空间的一些原因：\n\
  *   应用程序可能有不同的可用性要求。独立的表空间允许你将一个应用程序的表空间离线，而不影响另一个应用程序。\n*   应用程序可能有不同的备份和恢复要求。独立的表空间允许表空间被独立地备份和恢复。\n\
  *   应用程序可能有不同的存储要求。独立的表空间允许为不同的空间配额、扩展大小和段管理设置不同的参数。\n*   你可能有一些纯粹是只读的数据。独立的表空间允许你将包含只读数据的表空间设置为只读模式。\n\
  \n下一节将讨论创建表空间。\n\n#### 创建表空间\n\n你使用 `CREATE TABLESPACE` 语句来创建表空间。*Oracle SQL 参考手册*\
  \ 包含超过十几页的创建表空间的语法和示例。在大多数场景下，你只需要使用其中少数几个可用功能，即本地管理的扩展分配和自动段空间管理。以下代码片段演示了如何创建一个采用最常见功能的表空间：\n\
  \n```sql\ncreate tablespace tools datafile '/u01/dbfile/O12C/tools01.dbf'\n  size\
  \ 100m\n  segment space management auto;\n```\n\n你需要根据你的环境修改此脚本。默认情况下，表空间将被创建为本地管理的。本地管理的表空间使用数据文件中的位图来高效地确定一个扩展区是否正在使用中。存储参数\
  \ `NEXT`、`PCTINCREASE`、`MINEXTENTS`、`MAXEXTENTS` 和 `DEFAULT` 在本地管理的表空间中对于扩展区选项是无效的。\n\
  \n`SEGMENT SPACE MANAGEMENT AUTO` 子句指示 Oracle 管理块内的空间。使用此子句时，无需指定诸如 `PCTUSED`、`FREELISTS`\
  \ 和 `FREELIST GROUPS` 之类的参数。`AUTO` 空间管理的替代方案是 `MANUAL`。当你使用 `MANUAL` 时，可以根据应用程序的要求调整参数。我建议你使用\
  \ `AUTO` 而不是 `MANUAL`。使用 `AUTO` 大大减少了你需要配置和管理的参数数量。\n\n当你在表空间中创建表和索引时，Oracle 会根据需要在表空间的数据文件中自动为段分配空间。默认的分配类型是自动分配。你可以通过\
  \ `AUTOALLOCATE` 子句明确指示 Oracle 使用自动分配。Oracle 会分配 64KB、1MB、8MB 或 64MB 的扩展区大小。当你认为一个表空间中的对象大小不一（通常是这种情况）时，使用\
  \ `AUTOALLOCATE` 是合适的。我通常使用默认值，允许 Oracle 自动确定扩展区大小。\n\n`AUTOALLOCATE` 的替代方案是统一扩展区大小。你可以通过\
  \ `UNIFORM SIZE [size]` 子句指示 Oracle 为每个扩展区分配统一的大小。如果你不指定大小，则默认的统一扩展区大小为 1MB。你使用的统一扩展区大小取决于表和索引的存储要求。在某些场景下，我会为给定的应用程序创建几个表空间。例如，你可以创建一个用于小对象的表空间（统一扩展区大小为\
  \ 512KB），一个用于中等大小对象的表空间（统一扩展区大小为 4MB），一个用于大对象的表空间（统一扩展区大小为 16MB），等等。\n\n当数据文件填满时，你可以通过\
  \ `AUTOEXTEND` 功能指示 Oracle 自动增大数据文件的大小。我不建议你使用此功能。相反，你应该监控表空间的增长并在必要时手动添加空间。手动添加空间优于让一个失控的\
  \ SQL 过程意外增长表空间，直到它消耗了挂载点上的所有空间。如果你不小心填满了包含控制文件或 Oracle 二进制文件的挂载点，可能会导致数据库挂起。\n\n\
  如果你确实使用了 `AUTOEXTEND` 功能，我建议你始终指定一个对应的 `MAXSIZE`，这样失控的 SQL 过程就不会意外地填满一个表空间，进而填满挂载点。以下是一个创建自动扩展表空间并设置其最大大小上限的示例：\n\
  \n```sql\ncreate tablespace tools datafile '/u01/dbfile/O12C/tools01.dbf'\n  size\
  \ 100m\n  autoextend on maxsize 1000m\n  segment space management auto;\n```\n\n\
  # 使用&变量参数化 CREATE TABLESPACE 脚本\n\n在不同的环境中使用`CREATE TABLESPACE`脚本时，能够参数化脚本的部分内容是非常有用的。例如，在开发环境中，你可能将数据文件大小设置为\
  \ 100MB，而在生产环境中，数据文件可能是 100GB。使用`&`变量可以使`CREATE TABLESPACE`脚本在不同环境之间更便于移植。\n\n以下列表在脚本顶部定义了`&`变量，这些变量决定了为表空间创建的数据文件的大小：\n\
  \n```\ndefine tbsp_large=5G\ndefine tbsp_med=500M\n--\ncreate tablespace reg_data\
  \ datafile '/u01/dbfile/O12C/reg_data01.dbf'\n  size &&tbsp_large segment space\
  \ management auto;\n--\ncreate tablespace reg_index datafile '/u01/dbfile/O12C/reg_index01.dbf'\n\
  \  size &&tbsp_med segment space management auto;\n```\n\n使用`&`变量允许你修改一次脚本，然后在整个脚本中重用这些变量。你可以参数化脚本的所有方面，包括数据文件挂载点和区大小。\n\
  \n你还可以从 SQL*Plus 命令行将`&`变量的值传递到`CREATE TABLESPACE`脚本中。这样可以避免在脚本中硬编码特定大小，而是在运行时提供大小。为此，首先在脚本顶部定义`&`变量以接收传入的值：\n\
  \n```\ndefine tbsp_large=&1\ndefine tbsp_med=&2\n--\ncreate tablespace reg_data\
  \ datafile '/u01/dbfile/O12C/reg_data01.dbf'\n  size &&tbsp_large segment space\
  \ management auto;\n--\ncreate tablespace reg_index datafile '/u01/dbfile/O12C/reg_index01.dbf'\n\
  \  size &&tbsp_med segment space management auto;\n```\n\n现在，你可以从 SQL*Plus 命令行将变量传递到脚本中。以下示例执行名为`cretbsp.sql`的脚本，并传入两个值，分别将`&`变量设置为`5G`和`500M`：\n\
  \n```\nSQL> @cretbsp  5G  500M\n```\n\n表 2-2 总结了创建和管理表空间的最佳实践。\n\n表 2-2. 创建和管理表空间的最佳实践\n\
  \n| 最佳实践 | 推理 |\n| --- | --- |\n| 为使用同一数据库的不同应用程序创建独立的表空间。 | 如果需要将某个表空间脱机，它只会影响一个应用程序。\
  \ |\n| 对于一个应用程序，将表数据与索引数据分离到不同的表空间中。 | 表和索引数据可能有不同的存储需求。 |\n| 不要对数据文件使用`AUTOEXTEND`特性。如果确实使用`AUTOEXTEND`，请指定最大大小。\
  \ | 指定最大大小可以防止失控的 SQL 语句填满存储设备。 |\n| 创建本地管理的表空间。不应创建字典管理的表空间。 | 这提供了更好的性能和可管理性。\
  \ |\n| 对于表空间的数据文件命名约定，使用包含表空间名称后跟一个在该表空间数据文件中唯一的两位数的名称。 | 这样做可以轻松识别哪些数据文件与哪些表空间关联。\
  \ |\n| 尽量减少与表空间关联的数据文件数量。 | 你需要管理的数据文件更少。 |\n| 在表空间`CREATE`脚本中，使用`&`变量来定义诸如存储特性等方面。\
  \ | 这使得脚本在各种环境中更易于重用。 |\n\n如果你需要验证重新创建现有表空间所需的 SQL，可以使用`DBMS_METADATA`包来完成。首先，将`LONG`变量设置为一个较大的值：\n\
  \n```\nSQL> set long 1000000\n```\n\n接下来，使用`DBMS_METADATA`包显示数据库中所有表空间的`CREATE TABLESPACE`数据定义语言（DDL）：\n\
  \n```\nSQL> select dbms_metadata.get_ddl('TABLESPACE',tablespace_name) from dba_tablespaces;\n\
  ```\n\n![Image](img/sq.jpg) **提示**  你也可以使用 Data Pump 来提取数据库对象的 DDL。详见第 8 章。\n\n\
  #### 重命名表空间\n\n有时，你需要重命名一个表空间。你可能想这样做是因为表空间最初被错误命名，或者你希望表空间名称更好地符合你的数据库命名标准。使用`ALTER\
  \ TABLESPACE`语句来重命名表空间。此示例将表空间从`TOOLS`重命名为`TOOLS_DEV`：\n\n```\nSQL> alter tablespace\
  \ tools rename to tools_dev;\n```\n\n当你重命名一个表空间时，Oracle 会在数据字典、控制文件和数据文件头中更新表空间的名称。请记住，重命名表空间不会重命名任何关联的数据文件。有关重命名数据文件的信息，请参阅本章后面的“重命名或重新定位数据文件”部分。\n\
  \n![Image](img/sq.jpg) **注意**  你不能重命名`SYSTEM`表空间或`SYSAUX`表空间。\n\n## 控制重做生成\n\n对于某些类型的应用程序，你可能事先知道可以轻松地重新创建数据。一个例子可能是数据仓库环境，你在其中执行直接路径插入或使用\
  \ SQL*Loader 加载数据。在这些场景中，你可以关闭直接路径加载的重做生成。你使用`NOLOGGING`子句来实现这一点：\n\n```\ncreate\
  \ tablespace inv_mgmt_data\n  datafile '/u01/dbfile/O12C/inv_mgmt_data01.dbf' size\
  \ 100m\n  segment space management auto\n  nologging;\n```\n\n如果你有一个现有表空间并希望更改其日志记录模式，请使用`ALTER\
  \ TABLESPACE`语句：\n\n```\nSQL> alter tablespace inv_mgmt_data nologging;\n```\n\n\
  你可以通过查询`DBA_TABLESPACES`视图来确认表空间的日志记录模式：\n\n```\nSQL> select tablespace_name, logging\
  \ from dba_tablespaces;\n```\n\n重做日志生成无法为常规的`INSERT`、`UPDATE`和`DELETE`语句抑制。对于常规的数据操作语言（DML）语句，`NOLOGGING`子句将被忽略。然而，`NOLOGGING`子句适用于以下类型的\
  \ DML：\n\n* 直接路径`INSERT`语句\n* 直接路径 SQL*Loader\n\n`NOLOGGING`子句也适用于以下类型的 DDL 语句：\n\
  \n* `CREATE TABLE ... AS SELECT`（`NOLOGGING`仅影响初始创建，不影响随后对表的常规 DML 语句）\n* `ALTER\
  \ TABLE ... MOVE`\n* `ALTER TABLE ... ADD/MERGE/SPLIT/MOVE/MODIFY PARTITION`\n*\
  \ `CREATE INDEX`\n* `ALTER INDEX ... REBUILD`\n* `CREATE MATERIALIZED VIEW`\n* `ALTER\
  \ MATERIALIZED VIEW ... MOVE`\n* `CREATE MATERIALIZED VIEW LOG`\n* `ALTER MATERIALIZED\
  \ VIEW LOG ... MOVE`\n\n请注意，如果表或索引的重做没有被记录，并且在对象备份之前发生了介质故障，那么你将无法恢复数据；你会收到一个`ORA-01578`错误，指出数据存在逻辑损坏。\n\
  \n![Image](img/sq.jpg) **注意**  你也可以在对象级别覆盖表空间级别的日志记录设置。例如，即使表空间被指定为`NOLOGGING`，你也可以使用`LOGGING`子句创建表。\n\
  \n#### 更改表空间的写入模式\n\n在数据仓库等环境中，你可能需要将数据加载到表中，然后永远不再修改这些数据。为了强制表空间中的对象不能被修改，你可以将表空间更改为只读。为此，请使用`ALTER\
  \ TABLESPACE`语句：\n\n```\nSQL> alter tablespace inv_mgmt_rep read only;\n```\n\n\
  只读表空间的一个优点是，你只需要备份它一次。无论备份是多久以前进行的，你都应该能够从只读表空间恢复数据文件。\n\n如果你需要将表空间从只读模式修改回来，可以按如下方式进行：\n\
  \n```\nSQL> alter tablespace inv_mgmt_rep read write;\n```\n\n在将表空间置于读/写模式后，请确保重新启用该表空间的备份。\n\
  \n\n![Image](img/sq.jpg) `注意` 你不能将一个包含活动回滚段的表空间设置为只读。因此，`SYSTEM`表空间不能设为只读，因为它包含了`SYSTEM`回滚段。\n\
  \n需要注意的是，在 Oracle 11g 及更高版本中，你可以将单个表修改为只读。这允许你在比表空间级别更细的粒度上控制只读状态；例如，\n\n```\nSQL>\
  \ alter table my_tab read only;\n```\n\n在只读模式下，你不能对表执行任何`insert`、`update`或`delete`语句。在进行维护操作（如数据迁移）并希望确保用户不更新数据时，将单个表设为只读可能是有益的。\n\
  \n此示例将表修改回读写模式：\n\n```\nSQL> alter table my_tab read write;\n```\n\n#### 删除表空间\n\
  \n如果你有一个未使用的表空间，最好将其删除，这样它就不会使你的数据库变得杂乱、消耗不必要的资源，并可能让不熟悉数据库的 DBA 感到困惑。在删除表空间之前，最好先将其脱机：\n\
  \n```\nSQL> alter tablespace inv_data offline;\n```\n\n你可能希望等待看看是否有人抱怨应用程序因为无法写入要删除的表空间中的表或索引而中断。当你确定不再需要该表空间时，删除它并删除其数据文件：\n\
  \n```\nSQL> drop tablespace inv_data including contents and datafiles;\n```\n\n\
  ![Image](img/sq.jpg) `提示` 无论表空间是在线还是离线，你都可以删除它。例外是`SYSTEM`表空间，它不能被删除。在删除表空间之前，最好先将其脱机。通过这样做，你可以更好地确定是否有应用程序正在使用该表空间中的任何对象。如果你尝试查询离线表空间中的表，你会收到此错误：ORA-00376:\
  \ 此时无法读取文件。\n\n使用`INCLUDING CONTENTS AND DATAFILES`删除表空间会永久移除该表空间及其所有数据文件。在删除之前，请确保该表空间不包含你想要保留的任何数据。\n\
  \n如果你尝试删除一个包含被外键引用的主键的表空间，且该外键关联的表位于另一个不同于你尝试删除的表空间中，你会收到此错误：\n\n```\nORA-02449:\
  \ 表中的唯一/主键被外键引用\n```\n\n首先运行此查询以确定是否有任何外键约束会受到影响：\n\n```\nselect p.owner,\n      \
  \ p.table_name,\n       p.constraint_name,\n       f.table_name referencing_table,\n\
         f.constraint_name foreign_key_name,\n       f.status fk_status\nfrom   dba_constraints\
  \ p,\n       dba_constraints f,\n       dba_tables      t\nwhere  p.constraint_name\
  \ = f.r_constraint_name\nand    f.constraint_type = 'R'\nand    p.table_name = t.table_name\n\
  and    t.tablespace_name = UPPER('&tablespace_name')\norder by 1,2,3,4,5;\n```\n\
  \n如果存在被引用的约束，你需要首先删除这些约束，或者使用`DROP TABLESPACE`语句的`CASCADE CONSTRAINTS`子句。此语句使用`CASCADE\
  \ CONSTRAINTS`自动删除任何受影响的约束：\n\n```\nSQL> drop tablespace inv_data including contents\
  \ and data files cascade constraints;\n```\n\n此语句从被删除表空间外部的、引用被删除表空间内表的表中删除任何引用完整性约束。\n\
  \n如果你删除了一个在生产系统中包含必需对象的表空间，后果可能是灾难性的。你必须执行某种恢复操作来使表空间及其对象恢复。不用说，删除表空间时要非常小心。表 2-3\
  \ 列出了执行此操作时要考虑的建议。\n\n表 2-3. 删除表空间的最佳实践\n\n| 最佳实践 | 原因 |\n| --- | --- |\n| 在删除表空间之前，运行类似这样的脚本来确定表空间中是否存在任何对象：\
  \ \n```\nselect owner, segment_name, segment_type\nfrom dba_segments\nwhere tablespace_name=upper('&&tbsp_name');\n\
  ```\n | 这样做可确保在删除表空间之前，其中不存在任何表或索引。 |\n| 考虑在删除表空间之前重命名其中的表。 | 如果任何应用程序正在使用要删除的表空间中的表，当所需的表被重命名时，应用程序会抛出错误。\
  \ |\n| 如果表空间中没有对象，则将相关数据文件的大小调整为一个非常小的数字，例如 10MB。 | 将数据文件大小缩减到极小的空间量可以快速显示是否有任何应用程序试图访问需要该表空间中空间的对象。\
  \ |\n| 在删除表空间之前备份你的数据库。 | 这确保了你有办法恢复在删除表空间后才发现正在使用的对象。 |\n| 在删除表空间之前，将表空间和数据文件脱机。使用`ALTER\
  \ TABLESPACE`语句使表空间脱机。 | 这有助于确定是否有任何应用程序或用户正在使用表空间中的对象。如果表空间和数据文件脱机，他们就无法访问这些对象。\
  \ |\n| 当你确定一个表空间未被使用时，使用`DROP TABLESPACE ... INCLUDING CONTENTS AND DATAFILES`语句。\
  \ | 这将移除表空间并物理删除与其关联的任何数据文件。一些 DBA 不喜欢这种方法，但如果你已经采取了必要的预防措施，你应该没问题。 |\n\n#### 使用\
  \ Oracle 托管文件\n\nOracle 托管文件（OMF）功能自动化了表空间管理的许多方面，例如文件放置、命名和大小调整。你通过设置以下初始化参数来控制\
  \ OMF：\n\n*   `DB_CREATE_FILE_DEST`\n*   `DB_CREATE_ONLINE_LOG_DEST_N`\n*   `DB_RECOVERY_FILE_DEST`\n\
  \n如果你在创建数据库之前设置了这些参数，Oracle 会将它们用于数据文件、控制文件和联机重做日志的放置。你也可以在数据库创建后启用 OMF。Oracle 使用初始化参数的值来确定任何新添加文件的位置。Oracle\
  \ 还会确定新添加文件的名称。\n\n使用 OMF 的优势在于简化了创建表空间的过程。例如，`CREATE TABLESPACE`语句除了表空间名称外不需要指定任何内容。首先，通过设置`DB_CREATE_FILE_DEST`参数启用\
  \ OMF 功能：\n\n```\nSQL> alter system set db_create_file_dest='/u01';\n```\n\n现在，发出`CREATE\
  \ TABLESPACE`语句：\n\n```\nSQL> create tablespace inv1;\n```\n\n此语句创建一个名为`INV1`的表空间，默认数据文件大小为\
  \ 100MB。请记住，你可以通过指定大小来覆盖默认的 100MB 大小：\n\n```\nSQL> create tablespace inv2 datafile\
  \ size 20m;\n```\n\n要查看关联数据文件的详细信息，请查询`V$DATAFILE`视图，并注意 Oracle 已在`/u01`目录下创建了子目录，并使用\
  \ OMF 格式命名了文件：\n\n```\nSQL> select name from v$datafile where name like '%inv%';\n\
  NAME\n\n/u01/O12C/datafile/o1_mf_inv1_8b5l63q6_.dbf\n/u01/O12C/datafile/o1_mf_inv2_8b5lflfc_.dbf\n\
  ```\n\nOMF 的一个限制是，你仅限于一个目录用于放置数据文件。如果你想将数据文件添加到不同的目录，可以动态更改位置：\n\n```\nSQL> alter\
  \ system set db_create_file_dest='/u02';\n```\n\n\n\n虽然这个过程并非至关重要，但我发现不使用 OMF（Oracle\
  \ Managed Files）会更加简便。我工作过的大多数环境都为数据库用途分配了许多挂载点。如果数据文件需要添加到一个不在当前 `DB_CREATE_FILE_DEST`\
  \ 参数定义范围内的目录中，你肯定不希望每次都去修改初始化参数。更简单的方法是直接在脚本中使用带有文件位置和存储参数的 `CREATE TABLESPACE`\
  \ 或 `ALTER TABLESPACE` 语句。向表空间管理语句提供目录名和文件名并不繁琐。\n\n#### 创建大文件表空间\n\n大文件（bigfile）特性允许你创建一个关联了超大数据文件的表空间。使用大文件特性的优势在于它具备创建极大型文件的潜力。在\
  \ 8KB 块大小下，你可以创建最大 32TB 的数据文件。在 32KB 块大小下，你可以创建最大 128TB 的数据文件。\n\n使用 `BIGFILE` 子句创建大文件表空间：\n\
  \n```sql\ncreate bigfile tablespace inv_big_data\ndatafile '/u01/dbfile/O12C/inv_big_data01.dbf'\n\
  \  size 10g\n  segment space management auto;\n```\n\n只要支持大文件表空间数据文件的文件系统有充足的空间，你就可以在表空间中存储海量数据。\n\
  \n使用大文件表空间的一个潜在缺点是，如果由于任何原因，支持该大文件关联数据文件的文件系统空间耗尽，你将无法扩展表空间的大小（除非你能为文件系统增加空间）。你无法将更多的数据文件添加到大文件表空间，即使这些文件放在不同的挂载点上。大文件表空间只允许关联一个数据文件。\n\
  \n你可以使用 `ALTER DATABASE SET DEFAULT BIGFILE TABLESPACE` 语句，使大文件表空间成为数据库的默认表空间类型。但是，我不建议这样做。你可能会在不知情的情况下创建了一个大文件表空间（因为你忘了它是默认类型，或者因为你是项目的新\
  \ DBA 没有意识到），并在某个挂载点上创建了该表空间。之后，当你发现需要更多空间时，你将不知道无法为这个表空间在另一个挂载点上添加另一个数据文件。\n\n\
  #### 在表空间内启用默认表压缩\n\n处理大型数据库时，你可能需要考虑压缩数据。压缩数据可以减少磁盘空间、内存占用和 I/O 操作。读取压缩数据的查询执行速度可能更快，因为满足查询结果所需的数据块更少。但是，压缩确实有代价；它在读写过程中压缩和解压数据，需要更多的\
  \ CPU 资源。\n\n在创建表空间时，你可以启用数据压缩功能。这样做并不会压缩表空间本身。相反，你在该表空间内创建的任何表都将继承表空间的压缩特性。以下示例创建了一个使用\
  \ `ROW STORE COMPRESS ADVANCED` 的表空间：\n\n```sql\nCREATE TABLESPACE tools_comp\n\
  \  DATAFILE '/u01/dbfile/O12C/tools_comp01.dbf'\n  SIZE 100m\n  SEGMENT SPACE MANAGEMENT\
  \ AUTO\n  DEFAULT ROW STORE COMPRESS ADVANCED;\n```\n\n![Image](img/sq.jpg) **注意**\
  \ 如果你使用的是 Oracle 11g，请使用 `COMPRESS FOR OLTP` 子句代替 `ROW STORE COMPRESS ADVANCED`。\n\
  \n现在，当在该表空间内创建表时，表将自动启用 `ROW STORE COMPRESS ADVANCED` 功能。你可以通过以下查询验证表空间的压缩特性：\n\n\
  ```sql\nSQL> select tablespace_name, def_tab_compression, compress_for from dba_tablespaces;\n\
  ```\n\n如果表空间已经创建，你可以更改其压缩特性，如下所示：\n\n```sql\nSQL> alter tablespace tools_comp default\
  \ row store compress advanced;\n```\n\n下面是一个将表空间默认压缩更改为 `BASIC` 的示例：\n\n```sql\n\
  SQL> alter tablespace tools_comp default compress basic;\n```\n\n你可以通过 `NOCOMPRESS`\
  \ 子句禁用表空间压缩：\n\n```sql\nSQL> alter tablespace tools_comp default nocompress;\n```\n\
  \n![Image](img/sq.jpg) **注意** 大多数压缩功能需要企业版和高级压缩选项。\n\n#### 显示表空间大小\n\nDBA 通常使用监控脚本，在需要增加分配给表空间的空间时收到警报。根据你是否处于可插拔数据库环境，用于确定空间使用情况的\
  \ SQL 会有所不同。对于常规数据库（非可插拔），你可以使用常规的 DBA 级别视图来确定空间使用情况。以下脚本显示表空间和数据文件的剩余空闲空间百分比：\n\
  \n```sql\nSET PAGESIZE 100 LINES 132 ECHO OFF VERIFY OFF FEEDB OFF SPACE 1 TRIMSP\
  \ ON\nCOMPUTE SUM OF a_byt t_byt f_byt ON REPORT\nBREAK ON REPORT ON tablespace_name\
  \ ON pf\nCOL tablespace_name FOR A17   TRU HEAD 'Tablespace|Name'\nCOL file_name\
  \       FOR A40   TRU HEAD 'Filename'\nCOL a_byt           FOR 9,990.999 HEAD 'Allocated|GB'\n\
  COL t_byt           FOR 9,990.999 HEAD 'Current|Used GB'\nCOL f_byt           FOR\
  \ 9,990.999 HEAD 'Current|Free GB'\nCOL pct_free        FOR 990.0     HEAD 'File\
  \ %|Free'\nCOL pf              FOR 990.0     HEAD 'Tbsp %|Free'\nCOL seq NOPRINT\n\
  DEFINE b_div=1073741824\n--\nSELECT 1 seq, b.tablespace_name, nvl(x.fs,0)/y.ap*100\
  \ pf, b.file_name file_name,\n  b.bytes/&&b_div a_byt, NVL((b.bytes-SUM(f.bytes))/&&b_div,b.bytes/&&b_div)\
  \ t_byt,\n  NVL(SUM(f.bytes)/&&b_div,0) f_byt, NVL(SUM(f.bytes)/b.bytes*100,0) pct_free\n\
  FROM dba_free_space f, dba_data_files b\n ,(SELECT y.tablespace_name, SUM(y.bytes)\
  \ fs\n   FROM dba_free_space y GROUP BY y.tablespace_name) x\n ,(SELECT x.tablespace_name,\
  \ SUM(x.bytes) ap\n   FROM dba_data_files x GROUP BY x.tablespace_name) y\nWHERE\
  \ f.file_id(+) = b.file_id\nAND   x.tablespace_name(+) = y.tablespace_name\nand\
  \   y.tablespace_name =  b.tablespace_name\nAND   f.tablespace_name(+) = b.tablespace_name\n\
  GROUP BY b.tablespace_name, nvl(x.fs,0)/y.ap*100, b.file_name, b.bytes\nUNION\n\
  SELECT 2 seq, tablespace_name,\n  j.bf/k.bb*100 pf, b.name file_name, b.bytes/&&b_div\
  \ a_byt,\n  a.bytes_used/&&b_div t_byt, a.bytes_free/&&b_div f_byt,\n  a.bytes_free/b.bytes*100\
  \ pct_free\nFROM v$temp_space_header a, v$tempfile b\n  ,(SELECT SUM(bytes_free)\
  \ bf FROM v$temp_space_header) j\n  ,(SELECT SUM(bytes) bb FROM v$tempfile) k\n\
  WHERE a.file_id = b.file#\nORDER BY 1,2,4,3;\n```\n\n如果你没有任何监控措施，那么当尝试执行插入或更新操作的\
  \ SQL 语句因表空间需要更多空间但无法分配而失败时，你会收到警报。此时，会抛出 `ORA-01653` 错误，指示对象无法扩展。\n\n确定表空间需要更多空间后，你需要增大某个数据文件的大小或向表空间添加一个数据文件。有关这些主题的讨论，请参阅本章后面的“更改表空间大小”部分。\n\
  \n## 显示 Oracle 错误消息和操作\n\n你可以使用 `oerr` 工具快速显示错误原因以及应采取的简单操作说明；例如，`$ oerr ora 01653`\n\
  \n以下是此示例的输出：\n\n```\n01653, 00000, \"unable to extend table %s.%s by %s in tablespace\
  \ %s\"\n// *Cause:  Failed to allocate an extent of the required number of blocks\
  \ for\n//          a table segment in the tablespace indicated.\n// *Action: Use\
  \ ALTER TABLESPACE ADD DATAFILE statement to add one or more\n//          files\
  \ to the tablespace indicated.\n```\n\n`oerr` 工具的输出为你提供了一种快速、简便的问题排查方法。如果提供的信息不足，那么谷歌是一个很好的备选方案。\n\
  \n#### 更改表空间大小\n\n当你确定了要调整大小的数据文件后，首先确保数据文件所在挂载点有足够的磁盘空间来增加数据文件的大小：\n\n```bash\n\
  $ df -h | sort\n```\n\n\n\n使用 `ALTER DATABASE DATAFILE ... RESIZE` 命令来增加数据文件的大小。此示例将数据文件大小调整为\
  \ 1GB：\n\n```\nSQL> alter database datafile '/u01/dbfile/O12C/users01.dbf' resize\
  \ 1g;\n```\n\n如果现有挂载点上没有空间来增加数据文件的大小，则必须添加一个数据文件。要向现有表空间添加数据文件，请使用 `ALTER TABLESPACE\
  \ ... ADD DATAFILE` 语句：\n\n```\nSQL> alter tablespace users add datafile '/u02/dbfile/O12C/users02.dbf'\
  \ size 100m;\n```\n\n对于大文件表空间，您可以选择使用 `ALTER TABLESPACE` 语句来调整数据文件的大小。这样做是可行的，因为一个大文件表空间只能关联一个数据文件：\n\
  \n```\nSQL> alter tablespace inv_big_data resize 1P;\n```\n\n当管理具有高事务负载的数据库时，调整数据文件大小可能是一项日常任务。增加现有数据文件的大小允许您在不添加更多数据文件的情况下为表空间增加空间。如果包含现有数据文件的存储设备上没有足够的磁盘空间，您可以向现有表空间添加一个位于不同位置的数据文件。\n\
  \n要向临时表空间添加空间，首先查询 `V$TEMPFILE` 视图以验证当前临时数据文件的大小和位置：\n\n```\nSQL> select name, bytes\
  \ from v$tempfile;\n```\n\n然后，使用 `ALTER DATABASE` 语句的 `TEMPFILE` 选项：\n\n```\nSQL>\
  \ alter database tempfile '/u01/dbfile/O12C/temp01.dbf' resize 500m;\n```\n\n您也可以通过\
  \ `ALTER TABLESPACE` 语句向临时表空间添加文件：\n\n```\nSQL> alter tablespace temp add tempfile\
  \ '/u01/dbfile/O12C/temp02.dbf' size 5000m;\n```\n\n## 将数据文件脱机和联机\n\n有时，在执行维护操作（例如重命名数据文件）时，您可能需要先将数据文件脱机。您可以使用\
  \ `ALTER TABLESPACE` 或 `ALTER DATABASE DATAFILE` 语句来切换数据文件的脱机和联机状态。\n\n![Image](img/sq.jpg)\
  \ **提示**  自 Oracle 12c 起，您可以在数据文件联机并打开使用时移动和重命名它们。有关此的讨论，请参阅本章后面的“重命名或重新定位数据文件”。\n\
  \n使用 `ALTER TABLESPACE ... OFFLINE NORMAL` 语句将表空间及其关联的数据文件脱机。您无需指定 `NORMAL`，因为它是默认值：\n\
  \n```\nSQL> alter tablespace users offline;\n```\n\n当您以正常模式将表空间脱机时，Oracle 会对与该表空间关联的数据文件执行一个检查点。这确保与表空间关联的所有内存中已修改块都被刷新并写入数据文件。当您将表空间及其关联的数据文件重新联机时，无需执行介质恢复。\n\
  \n当数据库处于装载模式时，不能使用 `ALTER TABLESPACE` 语句将表空间脱机。如果您尝试在数据库已装载（但未打开）时将表空间脱机，将收到以下错误：\n\
  \n```\nORA-01109: database not open\n```\n\n![Image](img/sq.jpg) **注意**  在装载模式下，必须使用\
  \ `ALTER DATABASE DATAFILE` 语句将数据文件脱机。\n\n在将表空间脱机时，您还可以指定 `ALTER TABLESPACE ...\
  \ OFFLINE TEMPORARY`。在这种情况下，Oracle 会对与该表空间关联的所有联机数据文件启动一个检查点。Oracle 不会对与该表空间关联的脱机数据文件启动检查点。\n\
  \n在将表空间脱机时，可以指定 `ALTER TABLESPACE ... OFFLINE IMMEDIATE`。在这种情况下，您的数据库必须处于归档日志模式，否则会抛出以下错误：\n\
  \n```\nORA-01145: offline immediate disallowed unless media recovery enabled\n```\n\
  \n当使用 `OFFLINE IMMEDIATE` 时，Oracle 不会对数据文件发出检查点。在将表空间重新联机之前，您必须对其执行介质恢复。\n\n![Image](img/sq.jpg)\
  \ **注意**  当数据库打开时，不能将 `SYSTEM` 或 `UNDO` 表空间脱机。\n\n您也可以使用 `ALTER DATABASE DATAFILE`\
  \ 语句将数据文件脱机。如果您的数据库已打开供使用，则它必须处于归档日志模式，才能使用 `ALTER DATABASE DATAFILE` 语句将数据文件脱机。如果您尝试使用\
  \ `ALTER DATABASE DATAFILE` 语句将数据文件脱机，而您的数据库不在归档日志模式，则会抛出 `ORA-01145` 错误。\n\n如果您的数据库不在归档日志模式，则在将数据文件脱机时必须指定\
  \ `ALTER DATABASE DATAFILE ... OFFLINE FOR DROP`。您可以指定完整的文件名或提供文件编号。在此示例中，数据文件 4\
  \ 被脱机：\n\n```\nSQL> alter database datafile 4 offline for drop;\n```\n\n现在，如果您尝试将脱机的数据文件联机，会收到以下错误：\n\
  \n```\nSQL> alter database datafile 4 online;\nORA-01113: file 4 needs media recovery\n\
  ```\n\n当您使用 `OFFLINE FOR DROP` 子句时，不会对数据文件执行检查点。这意味着在将数据文件联机之前，您需要对其执行介质恢复。执行介质恢复会将在线重做日志中记录但数据文件本身没有的所有更改应用到数据文件。在您可以将使用\
  \ `OFFLINE FOR DROP` 子句脱机的数据文件联机之前，必须对其执行介质恢复。您可以指定完整的文件名或文件编号：\n\n```\nSQL> recover\
  \ datafile 4;\n```\n\n如果 Oracle 所需的重做信息包含在在线重做日志中，您应该会看到此消息：\n\n```\nMedia recovery\
  \ complete.\n```\n\n如果您的数据库不在归档日志模式，并且如果 Oracle 需要包含在在线重做日志之外的重做信息来恢复数据文件，那么您将无法恢复该数据文件并将其放回联机状态。\n\
  \n如果您的数据库处于归档日志模式，您可以在不带 `FOR DROP` 子句的情况下将其脱机。在这种情况下，Oracle 会忽略 `FOR DROP` 子句。即使您的数据库处于归档日志模式，对于已使用\
  \ `ALTER DATABASE DATAFILE` 语句脱机的数据文件，您仍需要执行介质恢复。表 2-4 总结了在将表空间/数据文件脱机时必须考虑的选项。\n\
  \n表 2-4. 将表空间/数据文件脱机的选项\n\n![Table2-4.jpg](img/Table2-4.jpg)\n\n![Image](img/sq.jpg)\
  \ **注意**  当数据库处于装载模式（且未打开）时，您可以使用 `ALTER DATABASE DATAFILE` 命令将任何数据文件脱机，包括 `SYSTEM`\
  \ 和 `UNDO`。\n\n### 重命名或重新定位数据文件\n\n您可能偶尔需要移动或重命名数据文件。例如，您可能因为存储设备的变更，或者因为文件是在错误的位置创建的或使用了非标准名称而需要移动数据文件。自\
  \ Oracle 12c 起，您可以选择在数据文件联机时重命名或移动数据文件，或两者同时进行。否则，您将不得不为了维护操作而将数据文件脱机。\n\n### 执行联机数据文件操作\n\
  \n从 Oracle 12c 开始，引入了 `ALTER DATABASE MOVE DATAFILE` 命令。此命令允许您在不产生任何停机时间的情况下重命名或移动数据文件。这极大地简化了移动或重命名数据文件的任务，因为无需手动将数据文件脱机/联机，也无需使用操作系统命令来物理移动文件。这个曾经手动密集（且容易出错）的操作，现在已简化为单个\
  \ SQL 命令。\n\n数据文件必须处于联机状态，联机移动或重命名才能生效。以下是一个重命名联机数据文件的示例：\n\n```\nSQL> alter database\
  \ move datafile '/u01/dbfile/O12C/users01.dbf' to\n     '/u01/dbfile/O12C/users_dev01.dbf';\n\
  ```\n\n以下是一个将数据文件移动到新挂载点的示例：\n\n\n# Oracle 数据文件移动操作指南\n\n在 Oracle 数据库管理中，移动数据文件是一项常见操作。以下将介绍在线和离线移动数据文件的方法。\n\
  \n## 在线操作\n\n可以直接使用 `ALTER DATABASE MOVE DATAFILE` 命令来移动或重命名数据文件。\n\n例如，将数据文件移动到新位置：\n\
  ```sql\nSQL> alter database move datafile '/u01/dbfile/O12C/system01.dbf' to\n \
  \   '/u02/dbfile/O12C/system01.dbf';\n```\n\n也可以通过文件编号来指定要移动的数据文件：\n```sql\nSQL>\
  \ alter database move datafile 2 to '/u02/dbfile/O12C/sysuax01.dbf';\n```\n\n在上面的例子中，指定移动数据文件\
  \ `2`。\n\n如果想在移动数据文件时保留原始文件的副本，可以使用 `KEEP` 选项：\n```sql\nSQL> alter database move\
  \ datafile 4 to '/u02/dbfile/O12C/users01.dbf' keep;\n```\n\n使用 `REUSE` 子句可以覆盖已存在的文件：\n\
  ```sql\nSQL> alter database move datafile 4 to '/u01/dbfile/O12C/users01.dbf' reuse;\n\
  ```\n\nOracle 不允许覆盖（重用）数据库当前正在使用的数据文件。这是一项安全措施。\n\n## 离线操作\n\n如果使用的是 Oracle 11g\
  \ 或更低版本，在重命名或移动数据文件之前，必须先将其下线。移动和重命名离线数据文件有两种不同的方法：\n\n*   结合使用 SQL 命令和操作系统命令。\n\
  *   结合使用重建控制文件和操作系统命令。\n\n这两种技术将在接下来的两节中讨论。\n\n### 使用 SQL 和操作系统命令\n\n以下是使用 SQL 命令和操作系统命令重命名数据文件的步骤：\n\
  \n1.  使用以下查询确定现有数据文件的名称：\n    ```sql\n    SQL> select name from v$datafile;\n  \
  \  ```\n\n2.  将数据文件下线，使用 `ALTER TABLESPACE` 或 `ALTER DATABASE DATAFILE` 语句（有关如何执行此操作的详细信息，请参阅前面的“离线数据文件操作”部分）。您也可以关闭数据库，然后以装载模式启动它；在此模式下可以移动数据文件，因为它们没有被打开使用。\n\
  3.  使用操作系统命令（如 `mv` 或 `cp`）或内置 PL/SQL 包 `DBMS_FILE_TRANSFER` 的 `COPY_FILE` 过程，将数据文件物理移动到新位置。\n\
  4.  使用 `ALTER TABLESPACE ... RENAME DATAFILE ... TO` 语句或 `ALTER DATABASE RENAME\
  \ FILE ... TO` 语句，用新的数据文件名更新控制文件。\n5.  将数据文件上线。\n\n> **注意**：如果需要重命名与 `SYSTEM` 或\
  \ `UNDO` 表空间关联的数据文件，必须关闭数据库并以装载模式启动。当数据库处于装载模式时，可以通过 `ALTER DATABASE RENAME FILE`\
  \ 语句重命名这些数据文件。\n\n以下示例演示了如何移动与单个表空间关联的数据文件。首先，使用 `ALTER TABLESPACE` 语句将数据文件下线：\n\
  ```sql\nSQL> alter tablespace users offline;\n```\n\n现在，在操作系统提示符下，使用 Linux/Unix\
  \ 的 `mv` 命令将数据文件移动到新位置：\n```bash\n$ mv /u01/dbfile/O12C/users01.dbf /u02/dbfile/O12C/users01.dbf\n\
  ```\n\n使用 `ALTER TABLESPACE` 语句更新控制文件：\n```sql\nalter tablespace users\nrename datafile\n\
  '/u01/dbfile/O12C/users01.dbf'\nto\n'/u02/dbfile/O12C/users01.dbf';\n```\n\n最后，将表空间内的数据文件重新上线：\n\
  ```sql\nSQL> alter tablespace users online;\n```\n\n如果想在一次操作中重命名多个表空间的数据文件，可以使用\
  \ `ALTER DATABASE RENAME FILE` 语句（而不是 `ALTER TABLESPACE...RENAME DATAFILE` 语句）。以下示例重命名数据库中的几个数据文件。因为移动的是\
  \ `SYSTEM` 和 `UNDO` 表空间的数据文件，所以必须先关闭数据库，然后将其置于装载模式：\n```sql\nSQL> conn / as sysdba\n\
  SQL> shutdown immediate;\nSQL> startup mount;\n```\n\n由于数据库处于装载模式，数据文件没有打开使用，因此无需将它们下线。接下来，通过\
  \ Linux/Unix 的 `mv` 命令物理移动文件：\n```bash\n$ mv /u01/dbfile/O12C/system01.dbf /u02/dbfile/O12C/system01.dbf\n\
  $ mv /u01/dbfile/O12C/sysaux01.dbf /u02/dbfile/O12C/sysaux01.dbf\n$ mv /u01/dbfile/O12C/undotbs01.dbf\
  \ /u02/dbfile/O12C/undotbs01.dbf\n```\n\n> **注意**：必须在更新控制文件之前移动文件。`ALTER DATABASE\
  \ RENAME FILE` 命令期望文件已处于重命名后的位置。如果文件不在那里，将抛出错误：`ORA-27037: unable to obtain file\
  \ status`。\n\n现在，可以更新控制文件以使其知晓新的文件名：\n```sql\nalter database rename file\n'/u01/dbfile/O12C/system01.dbf',\n\
  '/u01/dbfile/O12C/sysaux01.dbf',\n'/u01/dbfile/O12C/undotbs01.dbf'\nto\n'/u02/dbfile/O12C/system01.dbf',\n\
  '/u02/dbfile/O12C/sysaux01.dbf',\n'/u02/dbfile/O12C/undotbs01.dbf';\n```\n\n此时，您应该可以打开数据库：\n\
  ```sql\nSQL> alter database open;\n```\n\n### 重建控制文件和操作系统命令\n\n重新定位数据库中所有数据文件的另一种方法是结合使用重建控制文件和操作系统命令。此操作的步骤如下：\n\
  \n1.  创建一个包含 `CREATE CONTROLFILE` 语句的跟踪文件。\n2.  修改跟踪文件以显示数据文件的新位置。\n3.  关闭数据库。\n\
  4.  使用操作系统命令物理移动数据文件。\n5.  以 `NOMOUNT` 模式启动数据库。\n6.  运行 `CREATE CONTROLFILE` 命令。\n\
  \n> **注意**：重建控制文件时，请注意文件中包含的任何 RMAN 信息将会丢失。如果您没有使用恢复目录，可以使用 RMAN 的 `CATALOG` 命令将\
  \ RMAN 备份信息重新填充到控制文件中。\n\n以下示例逐步执行上述步骤。首先，通过 `ALTER DATABASE BACKUP CONTROLFILE\
  \ TO TRACE` 语句将 `CREATE CONTROLFILE` 语句写入跟踪文件：\n```sql\nSQL> alter database backup\
  \ controlfile to trace as '/tmp/mv.sql' noresetlogs;\n```\n\n关于前面的语句有几点需要注意。首先，在\
  \ `/tmp` 目录下创建了一个名为 `mv.sql` 的文件；该文件包含一个 `CREATE CONTROLFILE` 语句。其次，前面的语句使用了 `NORESETLOGS`\
  \ 子句；这指示 Oracle 只向跟踪文件写入一个 SQL 语句。如果未指定 `NORESETLOGS`，Oracle 会向跟踪文件写入两个 SQL 语句：一个使用\
  \ `NORESETLOGS` 选项重建控制文件，另一个使用 `RESETLOGS` 选项重建控制文件。通常，您会知道是否要在重建控制文件时重置联机重做日志。在这个例子中，您知道在重建控制文件时不需要重置联机重做日志（因为联机重做日志没有损坏，并且仍在数据库的正常位置）。\n\
  \n接下来，编辑 `/tmp/mv.sql` 文件，将目录路径的名称更改为新位置。以下是此示例的 `CREATE CONTROLFILE` 语句：\n```sql\n\
  CREATE CONTROLFILE REUSE DATABASE \"O12C\" NORESETLOGS  NOARCHIVELOG\n    MAXLOGFILES\
  \ 16\n    MAXLOGMEMBERS 4\n    MAXDATAFILES 1024\n    MAXINSTANCES 1\n    MAXLOGHISTORY\
  \ 876\nLOGFILE\n  GROUP 1 (\n    '/u01/oraredo/O12C/redo01a.rdo',\n    '/u02/oraredo/O12C/redo01b.rdo'\n\
  \  ) SIZE 50M BLOCKSIZE 512,\n  GROUP 2 (\n    '/u01/oraredo/O12C/redo02a.rdo',\n\
  \    '/u02/oraredo/O12C/redo02b.rdo'\n  ) SIZE 50M BLOCKSIZE 512,\n  GROUP 3 (\n\
  \    '/u01/oraredo/O12C/redo03a.rdo',\n    '/u02/oraredo/O12C/redo03b.rdo'\n  )\
  \ SIZE 50M BLOCKSIZE 512\nDATAFILE\n  '/u01/dbfile/O12C/system01.dbf',\n  '/u01/dbfile/O12C/sysaux01.dbf',\n\
  \  '/u01/dbfile/O12C/undotbs01.dbf',\n  '/u01/dbfile/O12C/users01.dbf'\nCHARACTER\
  \ SET AL32UTF8;\n```\n\n现在，关闭数据库：\n```sql\nSQL> shutdown immediate;\n```\n\n在操作系统提示符下物理移动文件。此示例使用\
  \ Linux/Unix 的 `mv` 命令移动文件。\n\n# 第三章\n## 用户管理的备份与恢复\n\n所有数据库管理员（DBA）都应该知道如何备份数据库。更为关键的是，DBA\
  \ 必须能够恢复和还原数据库。当发生介质故障时，所有人的目光都会投向 DBA，期望他能让数据库重新启动并运行。Oracle 有两种常见但截然不同的备份与恢复方法：\n\
  \n-   用户管理的方法\n-   RMAN 方法\n\n用户管理的备份名副其实，因为与备份或恢复（或两者）相关的所有步骤都由你手动执行。用户管理的备份有两种类型：冷备份和热备份。冷备份有时也称为离线备份，因为在备份过程中数据库会被关闭。热备份也称为在线备份，因为在备份过程中数据库是可用的。\n\
  \nRMAN 是 Oracle 的旗舰备份与恢复工具。它自动化并管理了备份与恢复的大部分工作。对于 Oracle 的备份与恢复，你应该使用 RMAN。那么，既然这种方法已经尘封了十多年，为什么还要设一章来讲解用户管理的备份呢？请考虑理解用户管理备份与恢复的以下原因：\n\
  \n-   你仍然会发现有些地方在使用用户管理的备份与恢复技术。因此，你需要通晓这项技术。\n-   手动执行用户管理的备份、还原和恢复操作，能巩固你对 Oracle\
  \ 备份与恢复架构的理解。这对你使用任何备份与恢复工具进行问题排查时有巨大帮助，并为掌握 Oracle 关键工具（如 `RMAN` 和 `Data Guard`）的核心知识奠定基础。\n\
  -   你会更充分地领略 `RMAN` 及其功能的价值。\n-   资深 DBA 讲述的那些噩梦般的数据库恢复故事，现在也就有迹可循了。\n\n基于这些原因，你应该熟悉用户管理的备份与恢复技术。手动演练本章中的场景，将极大地加深你对哪些文件需要备份以及它们如何在恢复中使用的理解。你将能更好地使用\
  \ `RMAN`。`RMAN` 将备份与恢复的大部分工作变得自动化和一键完成。然而，了解如何手动备份和恢复数据库，能帮助你深入思考并排查任何备份技术的问题。\n\
  \n本章从冷备份开始。这类备份被视为用户管理备份中最简单的形式，因为即使系统管理员也能实现。接着，本章讨论热备份。你还将研究几个常见的还原与恢复场景。这些示例将为你构建关于\
  \ Oracle 备份与恢复内部机制的基础知识。\n\n![图片](img/sq.jpg) `提示` 在 Oracle 12c 中，你可以对可插拔数据库执行用户管理的热备份和冷备份；用户管理的备份与恢复技术运行良好。但是，我强烈建议你在可插拔环境中使用\
  \ `RMAN` 来管理备份与恢复。当连接到根容器或可插拔容器时，`RMAN` 会自动确定需要备份哪些数据文件、它们的位置以及如何还原与恢复。对于用户管理的备份，这项任务很快就会变得难以处理，因为\
  \ DBA 必须为根容器以及可能的众多可插拔数据库管理这些信息。\n\n## 为非归档模式数据库实施冷备份策略\n\n通过在数据库关闭后复制文件来执行用户管理的冷备份。这种类型的备份也称为离线备份。执行冷备份时，你的数据库可以处于\
  \ `noarchivelog`（非归档）模式或 `archivelog`（归档）模式。\n\nDBA 倾向于认为冷备份等同于对处于 `noarchivelog`\
  \ 模式的数据库进行备份。这并不正确。你可以对处于 `archivelog` 模式的数据库进行冷备份，这是许多地方采用的一种备份策略。数据库处于 `noarchivelog`\
  \ 模式和 `archivelog` 模式下进行冷备份的区别，将在以下各节中详述。\n\n## 制作非归档模式数据库的冷备份\n\n对 `noarchivelog`\
  \ 模式的数据库进行冷备份的一个主要原因，是让你能够将数据库恢复到过去的某个时间点。仅当你不需要恢复备份之后发生的事务时，才应使用此类型的备份。仅当你的业务要求允许数据丢失和停机时，这种备份和恢复策略才是可接受的。你几乎不会为生产业务数据库实施此类备份与恢复解决方案。\n\
  \n```\n$ mv /u02/dbfile/O12C/system01.dbf /u01/dbfile/O12C/system01.dbf\n$ mv /u02/dbfile/O12C/sysaux01.dbf\
  \ /u01/dbfile/O12C/sysaux01.dbf\n$ mv /u02/dbfile/O12C/undotbs01.dbf /u01/dbfile/O12C/undotbs01.dbf\n\
  $ mv /u02/dbfile/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf\n```\n\n以 `nomount`\
  \ 模式启动数据库：\n\n```\nSQL> startup nomount;\n```\n\n然后，执行包含 `CREATE CONTROLFILE` 语句的文件（本例中为\
  \ `mv.sql`）：\n\n```\nSQL> @/tmp/mv.sql\n```\n\n如果语句成功，你将看到以下消息：\n\n```\nControl\
  \ file created.\n```\n\n最后，打开你的数据库：\n\n```\nSQL> alter database open;\n```\n\n###\
  \ 总结\n\n本章描述了如何配置和管理控制文件、在线重做日志文件、启用归档模式，以及管理表空间和数据文件。控制文件、在线重做日志和数据文件是关键的数据库文件；正常运行的数据库缺少它们就无法运作。\n\
  \n控制文件是包含数据库结构信息的小型二进制文件。参数文件中指定的任何控制文件都必须可用，才能加载数据库。如果一个控制文件变得不可用，那么你的数据库将停止运行，直到你解决问题。我强烈建议你为数据库配置至少三个控制文件。如果一个控制文件变得不可用，你可以用一个完好的现有控制文件副本替换它。至关重要的是，你要知道如何配置、添加和删除这些文件。\n\
  \n在线重做日志是记录数据库事务历史的关键文件。如果你有多个实例连接到一个数据库，那么每个实例都会生成自己的重做线程。每个数据库创建时都必须有两个或更多的在线重做日志组。你可以仅使用每组一个在线重做日志成员来运行数据库。但是，我强烈建议你为每个在线重做日志组创建两个成员。如果一个在线重做日志至少有一个成员可以写入，你的数据库就能继续运行。如果一个在线重做日志组的所有成员都不可用，那么你的数据库将停止运行。作为\
  \ DBA，你必须极其精通创建、添加、移动和删除这些关键的数据库文件。\n\n归档是确保你拥有恢复数据库所需的所有事务的机制。一旦启用，归档进程需要在日志切换发生后成功复制在线重做日志。如果归档进程无法写入主要归档目标，那么你的数据库将挂起。因此，你需要仔细规划所需的磁盘空间量，以及备份和随后删除这些文件的频率。\n\
  \n表空间和数据文件是你的数据存储的地方。它们通常构成任何备份与恢复操作的大部分。因此，理解如何操作和管理数据文件至关重要。\n\n到目前为止，本书前面的章节涵盖了连接到\
  \ Oracle、执行常规 DBA 任务以及管理关键文件。接下来的几章将集中讨论备份与恢复操作。\n\n![图片](img/frontdot.jpg)\n\n\n\
  话虽如此，实施此类备份也有一些充分的理由。一个常见的用途是为开发/测试/培训数据库制作冷备份，并定期将数据库重置回基线状态。这为你提供了一种方式，可以使用数据库的同一时间点快照来重启性能测试或培训课程。\n\
  \n![Image](img/sq.jpg) **提示** 考虑使用闪回数据库功能将你的数据库设置回过去的某个时间点（详见第 6 章）。\n\n本节示例向你展示如何备份数据库中的每个关键文件：所有控制文件、数据文件、临时数据文件和联机重做日志文件。使用此类备份，你可以轻松地将数据库恢复到进行备份时的时间点。这种方法的主要优点是概念简单且易于实现。以下是数据库在`noarchivelog`模式下进行冷备份所需的步骤：\n\
  \n1.  确定将备份文件复制到何处以及需要多少空间。\n2.  确认要复制的数据库文件的位置和名称。\n3.  使用`IMMEDIATE`、`TRANSACTIONAL`或`NORMAL`子句关闭数据库。\n\
  4.  将文件（步骤 2 中确认的）复制到备份位置（步骤 1 中确定的）。\n5.  重新启动数据库。\n\n以下各节将详细阐述这些步骤。\n\n### 步骤\
  \ 1：确定备份文件的复制位置及所需空间\n\n理想情况下，备份位置应位于与你的活动数据文件位置不同的一组磁盘上。然而，在许多工作环境中，你可能没有选择权，并且可能会被告知数据库应使用哪些挂载点。在此示例中，备份位置是目录`/u01/cbackup/O12C`。为了大致了解存储备份的一个副本需要多少空间，你可以运行此查询：\n\
  \n```sql\nselect sum(sum_bytes)/1024/1024 m_bytes\nfrom(\nselect sum(bytes) sum_bytes\
  \ from v$datafile\nunion\nselect sum(bytes) sum_bytes from v$tempfile\nunion\nselect\
  \ (sum(bytes) * members) sum_bytes from v$log\ngroup by members);\n```\n\n你可以使用\
  \ Linux/Unix 的`df`（磁盘空闲）命令来验证操作系统有多少可用磁盘空间。确保操作系统上可用的磁盘空间量大于前一个查询返回的总和：\n\n```bash\n\
  $ df -h\n```\n\n### 步骤 2：识别要复制的数据库文件的位置和名称\n\n运行此查询以列出包含在`noarchivelog`模式数据库冷备份中的文件的名称（和路径）：\n\
  \n```sql\nselect name from v$datafile\nunion\nselect name from v$controlfile\nunion\n\
  select name from v$tempfile\nunion\nselect member from v$logfile;\n```\n\n**备份联机重做日志（或不备份）**\n\
  \n你需要备份联机重做日志吗？不需要；你永远不需要作为任何类型备份的一部分来备份联机重做日志。那么，为什么 DBA 们会在冷备份中备份联机重做日志呢？一个原因是它可以使`noarchivelog`模式场景下的恢复过程稍微容易一些。联机重做日志是正常打开数据库所必需的。\n\
  \n如果你备份了所有文件（包括联机重做日志），那么要使你的数据库恢复到备份时的状态，你需要还原所有文件（包括联机重做日志）并启动数据库。\n\n### 步骤 3：关闭数据库\n\
  \n以`SYS`用户（或具有`SYSDBA`权限的用户）连接到你的数据库，并使用`IMMEDIATE`、`TRANSACTIONAL`或`NORMAL`关闭数据库。在几乎所有情况下，使用`IMMEDIATE`是首选方法。此模式会断开用户连接、回滚未完成的事务并关闭数据库：\n\
  \n```bash\n$ sqlplus / as sysdba\nSQL> shutdown immediate;\n```\n\n### 步骤 4：创建文件的备份副本\n\
  \n对于步骤 2 中确认的每个文件，使用操作系统实用程序将文件复制到备份目录（步骤 1 中确认的）。在这个简单的示例中，所有数据文件、控制文件、临时数据库文件和联机重做日志都在同一个目录中。在生产环境中，你很可能将文件分布在几个不同的目录中。此示例使用\
  \ Linux/Unix 的`cp`命令将数据库文件从`/u01/dbfile/O12C`复制到`/u01/cbackup/O12C`目录：\n\n```bash\n\
  $ cp /u01/dbfile/O12C/*.*  /u01/cbackup/O12C\n```\n\n### 步骤 5：重启数据库\n\n所有文件复制完成后，你可以启动数据库：\n\
  \n```bash\n$ sqlplus / as sysdba\nSQL> startup;\n```\n\n## 在有在线重做日志的情况下恢复无归档日志模式的冷备份\n\
  \n下一个示例解释如何从`noarchivelog`模式数据库的冷备份中恢复。如果你在冷备份中包含了联机重做日志，则可以在恢复文件时包含它们。此过程涉及以下步骤：\n\
  \n1.  关闭实例。\n2.  将数据文件、联机重做日志、临时文件和控制文件从备份复制回活动数据库数据文件位置。\n3.  启动数据库。\n\n这些步骤在以下各节中详述。\n\
  \n### 步骤 1：关闭实例\n\n如果实例正在运行，请将其关闭。在此场景中，关闭数据库的方式无关紧要，因为你是恢复到过去的一个时间点（不恢复事务）。当备份文件被复制回来时，活动数据库目录位置中的任何文件都将被覆盖。如果你的实例正在运行，你可以强行中止它。以具有`SYSDBA`权限的用户身份执行以下操作：\n\
  \n```bash\n$ sqlplus / as sysdba\nSQL> shutdown abort;\n```\n\n### 步骤 2：从备份中复制文件回来\n\
  \n此步骤执行与备份相反的操作：你正在将文件从备份位置复制到活动数据库文件位置。在此示例中，所有备份文件都位于`/u01/cbackup/O12C`目录中，并且所有文件都被复制到`/u01/dbfile/O12C`目录：\n\
  \n```bash\n$ cp /u01/cbackup/O12C/*.*  /u01/dbfile/O12C\n```\n\n### 步骤 3：启动数据库\n\
  \n以`SYS`用户（或具有`SYSDBA`权限的用户）连接到你的数据库，并启动数据库：\n\n```bash\n$ sqlplus / as sysdba\n\
  SQL> startup;\n```\n\n完成这些步骤后，你应该拥有与你进行冷备份时完全相同的数据库副本。这就像你将数据库设置回进行备份时的时间点一样。\n\n\
  ## 在没有在线重做日志的情况下恢复无归档日志模式的冷备份\n\n如前所述，在从冷备份恢复时，你永远不需要联机重做日志。如果你对`noarchivelog`模式下的数据库进行了冷备份，并且没有将联机重做日志作为备份的一部分包含在内，则恢复步骤与前一节中的步骤几乎相同。主要区别在于最后一步需要你使用`OPEN\
  \ RESETLOGS`子句打开数据库。步骤如下：\n\n1.  关闭实例。\n2.  从备份复制控制文件和数据文件回来。\n3.  以挂载模式启动数据库。\n\
  4.  使用`OPEN RESETLOGS`子句打开数据库。\n\n### 步骤 1：关闭实例\n\n如果实例正在运行，请将其关闭。在此场景中，关闭数据库的方式无关紧要，因为你是恢复到过去的一个时间点。当备份文件被复制回来时，活动数据库目录位置中的任何文件都将被覆盖。如果你的实例正在运行，你可以强行中止它。以具有`SYSDBA`权限的用户身份执行以下操作：\n\
  \n```bash\n$ sqlplus / as sysdba\nSQL> shutdown abort;\n```\n\n### 步骤 2：从备份中复制文件回来\n\
  \n将控制文件和数据文件从备份位置复制到活动数据文件位置：\n\n```bash\n$ cp <backup directory>/*.*  <live database\
  \ file directory>\n```\n\n### 步骤 3：以挂载模式启动数据库\n\n以`SYS`用户或具有`SYSDBA`权限的用户连接到你的数据库，并以挂载模式启动数据库：\n\
  \n\n\n# 使用 OPEN RESETLOGS 子句打开数据库\n\n进入`/path/to/xxx`目录，找到`xxx.json`。\n\n```\n$\
  \ sqlplus / as sysdba\nSQL> startup mount\n```\n\n## 步骤 4. 使用 OPEN RESETLOGS 子句打开数据库\n\
  \n使用`OPEN RESETLOGS`子句打开数据库以供使用：\n\n```\nSQL> alter database open resetlogs;\n```\n\
  \n如果看到`Database altered`消息，则命令成功。但是，您可能会看到此错误：\n\n```\nORA-01139: RESETLOGS option\
  \ only valid after an incomplete database recovery\n```\n\n这种情况下，请发出以下命令：\n\n```\n\
  SQL> recover database until cancel;\n```\n\n您应该会看到此消息：\n\n```\nMedia recovery complete.\n\
  ```\n\n现在，尝试使用`OPEN RESETLOGS`子句打开数据库：\n\n```\nSQL> alter database open resetlogs;\n\
  ```\n\n此语句指示 Oracle 重新创建联机重做日志。Oracle 使用控制文件中的信息来确定重做日志的位置、名称和大小。如果那些位置有旧的联机重做日志文件，它们将被覆盖。\n\
  \n如果您在此过程中监控`alert.log`，可能会看到`ORA-00312`和`ORA-00313`。这意味着 Oracle 找不到联机重做日志文件；这是正常的，因为这些文件在被`OPEN\
  \ RESETLOGS`命令重新创建之前是物理不可用的。\n\n# 脚本化冷备份与恢复\n\n了解如何编写冷备份脚本具有指导意义。基本思想是动态查询数据字典以确定要备份的文件的位置和名称。这比在脚本中硬编码目录位置和文件名更可取。动态生成的脚本不易出错和出现意外情况（例如，向数据库添加了新数据文件，但未更新到旧的硬编码备份脚本中）。\n\
  \n![Image](img/sq.jpg)`Note`：本节中的脚本并非用于生产强度的备份和恢复脚本。相反，它们说明了脚本化冷备份和后续恢复的基本概念。\n\n\
  本节的第一个脚本创建数据库的冷备份。在使用冷备份脚本之前，您需要修改脚本中的这些变量以匹配您的数据库环境：\n\n*   `ORACLE_SID`\n*   `ORACLE_HOME`\n\
  *   `cbdir`\n\n`cbdir`变量指定备份目录位置的名称。该脚本创建一个名为`coldback.sql`的文件，该文件从 SQL*Plus 执行以启动数据库的冷备份：\n\
  \n```\n#!/bin/bash\nORACLE_SID=O12C\nORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n\
  PATH=$PATH:$ORACLE_HOME/bin\n#\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0\
  \ lines 132 verify off feed off trimsp on\ndefine cbdir=/u01/cbackup/O12C\nspo coldback.sql\n\
  select 'shutdown immediate;' from dual;\nselect '!cp ' || name   || ' ' || '&&cbdir'\
  \   from v\\$datafile;\nselect '!cp ' || name   || ' ' || '&&cbdir'   from v\\$tempfile;\n\
  select '!cp ' || member || ' ' || '&&cbdir' from v\\$logfile;\nselect '!cp ' ||\
  \ name   || ' ' || '&&cbdir'   from v\\$controlfile;\nselect 'startup;' from dual;\n\
  spo off;\n@@coldback.sql\nEOF\nexit 0\n```\n\n此文件生成的命令将从 SQL*Plus 脚本执行，以对数据库进行冷备份。您在\
  \ Unix`cp`命令前放置一个感叹号（`!`），以指示 SQL*Plus 主机退出到操作系统以运行`cp`命令。在引用`v$`数据字典视图时，您还需要在每个美元符号（`$`）前放置一个反斜杠（`\\\
  `）；这在 Linux/Unix shell 脚本中是必需的。`\\`转义了`$`，并告诉 shell 脚本不要将`$`视为特殊字符（`$`通常表示 shell\
  \ 变量）。\n\n运行此脚本后，写入`coldback.sql`脚本的复制命令示例如下：\n\n```\nshutdown immediate;\n!cp /u01/dbfile/O12C/system01.dbf\
  \ /u01/cbackup/O12C\n!cp /u01/dbfile/O12C/sysaux01.dbf /u01/cbackup/O12C\n!cp /u01/dbfile/O12C/undotbs01.dbf\
  \ /u01/cbackup/O12C\n!cp /u01/dbfile/O12C/users01.dbf /u01/cbackup/O12C\n!cp /u01/dbfile/O12C/tools01.dbf\
  \ /u01/cbackup/O12C\n!cp /u01/dbfile/O12C/temp01.dbf /u01/cbackup/O12C\n!cp /u01/oraredo/O12C/redo02a.rdo\
  \ /u01/cbackup/O12C\n!cp /u02/oraredo/O12C/redo02b.rdo /u01/cbackup/O12C\n!cp /u01/oraredo/O12C/redo01a.rdo\
  \ /u01/cbackup/O12C\n!cp /u02/oraredo/O12C/redo01b.rdo /u01/cbackup/O12C\n!cp /u01/oraredo/O12C/redo03a.rdo\
  \ /u01/cbackup/O12C\n!cp /u02/oraredo/O12C/redo03b.rdo /u01/cbackup/O12C\n!cp /u01/dbfile/O12C/control01.ctl\
  \ /u01/cbackup/O12C\n!cp /u01/dbfile/O12C/control02.ctl /u01/cbackup/O12C\nstartup;\n\
  ```\n\n进行冷备份时，您还应该生成一个脚本，该脚本提供将数据文件、临时文件、日志文件和控制文件复制回其原始位置的命令。您可以使用此脚本从冷备份中恢复。本节的下一个脚本动态创建`coldrest.sql`脚本，该脚本将文件从备份位置复制到原始数据文件位置。您需要以修改冷备份脚本的相同方式修改此脚本（即，更改`ORACLE_SID`、`ORACLE_HOME`和`cbdir`变量以匹配您的环境）：\n\
  \n```\n#!/bin/bash\nORACLE_SID=O12C\nORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n\
  PATH=$PATH:$ORACLE_HOME/bin\n#\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0\
  \ lines 132 verify off feed off trimsp on\ndefine cbdir=/u01/cbackup/O12C\ndefine\
  \ dbname=$ORACLE_SID\nspo coldrest.sql\nselect 'shutdown abort;' from dual;\nselect\
  \ '!cp ' || '&&cbdir/' || substr(name, instr(name,'/',-1,1)+1) ||\n       ' ' ||\
  \ name   from v\\$datafile;\nselect '!cp ' || '&&cbdir/' || substr(name, instr(name,'/',-1,1)+1)\
  \ ||\n       ' ' || name   from v\\$tempfile;\nselect '!cp ' || '&&cbdir/' || substr(member,\
  \ instr(member,'/',-1,1)+1) ||\n       ' ' || member from v\\$logfile;\nselect '!cp\
  \ ' || '&&cbdir/' || substr(name, instr(name,'/',-1,1)+1) ||\n       ' ' || name\
  \   from v\\$controlfile;\nselect 'startup;' from dual;\nspo off;\nEOF\nexit 0\n\
  ```\n\n此脚本创建一个名为`coldrest.sql`的脚本，该脚本生成将数据文件、临时文件、日志文件和控制文件复制回其原始位置的命令。运行此 shell\
  \ 脚本后，`coldrest.sql`文件中的代码片段如下：\n\n```\nshutdown abort;\n!cp /u01/cbackup/O12C/system01.dbf\
  \ /u01/dbfile/O12C/system01.dbf\n!cp /u01/cbackup/O12C/sysaux01.dbf /u01/dbfile/O12C/sysaux01.dbf\n\
  !cp /u01/cbackup/O12C/undotbs01.dbf /u01/dbfile/O12C/undotbs01.dbf\n!cp /u01/cbackup/O12C/users01.dbf\
  \ /u01/dbfile/O12C/users01.dbf\n!cp /u01/cbackup/O12C/tools01.dbf /u01/dbfile/O12C/tools01.dbf\n\
  \n...\n!cp /u01/cbackup/O12C/redo03b.rdo /u02/oraredo/O12C/redo03b.rdo\n!cp /u01/cbackup/O12C/control01.ctl\
  \ /u01/dbfile/O12C/control01.ctl\n!cp /u01/cbackup/O12C/control02.ctl /u01/dbfile/O12C/control02.ctl\n\
  startup;\n```\n\n如果需要使用此脚本从冷备份中恢复，请以`SYS`身份登录 SQL*Plus 并执行脚本：\n\n```\n$ sqlplus\
  \ / as sysdba\nSQL> @coldrest.sql\n```\n\n## 制作归档日志模式数据库的冷备份\n\n您可以使用归档日志模式数据库的备份来恢复和恢复到故障发生前最后一次提交的事务。因此，与无归档日志模式数据库的备份不同，此类备份不一定用于将数据库重置到过去某个无法应用恢复的时间点。归档日志模式数据库备份的目的通常是恢复数据库，并前滚和应用事务以完全恢复数据库。\n\
  \n\n\n这对备份操作有重要影响。回顾一下，对于`NOARCHIVELOG`（非归档日志）模式的数据库，数据库管理员有时会将在线重做日志包含在备份中。而对于`ARCHIVELOG`（归档日志）模式数据库的备份，**绝对不应**将在线重做日志包含在备份中。在线重做日志包含数据库当前最新生成的重做事务信息。任何尚未归档的、位于当前在线重做日志中的事务，都是进行完整恢复所必需的。一旦发生故障，你肯定不希望用从过去某个时间点获取的在线重做日志备份来覆盖当前的在线重做日志；这将导致无法执行完整恢复。\n\
  \n在归档日志模式下执行数据库冷备份的高级步骤，与非归档日志模式数据库的步骤完全相同：\n1.  确定备份文件的复制位置以及所需空间大小。\n2.  确定要复制的数据库文件的位置和名称。\n\
  3.  使用`IMMEDIATE`、`TRANSACTIONAL`或`NORMAL`子句关闭数据库。\n4.  将文件（步骤 2 中确定的）复制到备份位置（步骤\
  \ 1 中确定的）。\n5.  重新启动数据库。\n\n归档日志模式冷备份与非归档日志模式冷备份的主要区别在于步骤 2：你需要运行此查询来确定要备份的文件：\n\
  ```\nselect name from v$datafile\nunion\nselect name from v$controlfile;\n```\n\
  此外，你不需要备份与`TEMP`（临时）表空间关联的数据文件。从 Oracle 10g 开始，当数据库启动时，Oracle 会自动尝试为本地管理的临时表空间创建缺失的关联数据文件。\n\
  \n使用归档日志模式数据库的冷备份进行恢复和修复，与使用热备份进行的恢复几乎完全相同。有关如何恢复和修复归档日志模式数据库的讨论，请参阅本章后面的“执行归档日志模式数据库的完整恢复”和“执行归档日志模式数据库的不完整恢复”两节。\n\
  \n## 理解机制确实至关重要\n了解热备份的工作原理也有助于理清和应对棘手的`RMAN`场景。`RMAN`是一个复杂且高度自动化的工具。只需几条命令，你就可以备份、恢复和修复数据库。然而，如果任何`RMAN`命令或步骤出现故障，理解\
  \ Oracle 底层内部的恢复与修复架构将带来巨大回报。详细掌握如何从热备份中恢复和修复，能帮助你逻辑清晰地应对任何`RMAN`场景。\n\n当你骑自行车时，了解变速器、齿轮和换挡的工作原理会大有帮助。通常你能分辨出，一个骑手是只知道按一个按钮减速、另一个按钮加速，还是更详细地了解链条在齿轮间移动的原理。后者换挡总会更加顺畅。我的编辑乔纳森·詹尼克（Jonathan\
  \ Gennick）在阅读本章的初稿时，讲述了以下轶事：\n“前几周我把自行车借给一个人，并和他一起骑了一趟。你真该听听他骑我的变速器和传动系统时发出的可怕噪音。我以为他会把车弄坏。几分钟后，他骑到我面前，告诉我我的前变速器工作不正常。\n\
  “变速器其实没问题。他只是那种只知道按按钮，却对按钮下面发生了什么毫无理解的人。”\n同样，你投入到了解备份和恢复实现机制的努力，长远来看会得到回报。实际上你需要记忆的东西反而更少——因为你对底层操作的理解，使你能够思考问题并以清单无法提供的方**解决问题**。\n\
  \n### 实施热备份策略\n如前所述，`RMAN`应该是你进行任何类型 Oracle 数据库备份（联机或脱机）的首选工具。`RMAN`比用户管理的备份更高效，并能自动化大多数任务。话虽如此，理解\
  \ Oracle 备份与恢复内部机制的最佳方法之一，就是进行一次热备份，然后使用该备份来恢复和修复你的数据库。手动发出热备份所涉及的命令，然后进行恢复和修复，有助于你理解每种文件（控制文件、数据文件、归档重做日志、在线重做日志）在恢复和修复场景中的作用。\n\
  \n以下章节首先向你展示如何实施热备份。它们还提供了可用于自动化热备份过程的基本脚本。后面的部分解释了热备份的一些内部机制，并阐明了为何在进行热备份前必须将表空间置于备份模式。\n\
  \n### 进行热备份\n热备份需要以下步骤：\n1.  确保数据库处于`ARCHIVELOG`（归档日志）模式。\n2.  确定备份文件的复制位置。\n3.\
  \  确定需要备份哪些文件。\n4.  记录在线重做日志的最大序列号。\n5.  将数据库/表空间切换到备份模式。\n6.  使用操作系统实用程序将数据文件复制到步骤\
  \ 2 确定的位置。\n7.  将数据库/表空间切换出备份模式。\n8.  归档当前的在线重做日志，并记录在线重做日志的最大序列号。\n9.  备份控制文件。\n\
  10. 备份在备份期间生成的任何归档重做日志。\n\n这些步骤将在以下各节中详细说明。\n\n### 步骤 1：确保数据库处于归档日志模式\n运行以下命令检查数据库的`ARCHIVELOG`模式状态：\n\
  ```\nSQL> archive log list;\n```\n输出显示此数据库处于`ARCHIVELOG`模式：\n```\nDatabase log mode\
  \              Archive Mode\nAutomatic archival             Enabled\nArchive destination\
  \            /u01/oraarch/O12C\n```\n如果你不确定如何启用归档，请参阅第 2 章了解详情。\n\n### 步骤 2：确定备份文件的复制位置\n\
  现在，确定备份位置。本例中，备份位置是目录`/u01/hbackup/O12C`。要大致了解所需空间，你可以运行此查询：\n```\nSQL> select sum(bytes)\
  \ from dba_data_files;\n```\n理想情况下，备份位置应该位于与你的活动数据文件分开的一组磁盘上。但在实践中，很多时候你被分配的是`SAN`（存储区域网络）上的一块空间，对底层磁盘布局一无所知。在这些情况下，你依赖于`SAN`硬件中内置的冗余（`RAID`磁盘、多个控制器等）来确保高可用性和可恢复性。\n\
  \n### 步骤 3：确定需要备份哪些文件\n对于此步骤，你只需要知道数据文件的位置：\n```\nSQL> select name from v$datafile;\n\
  ```\n当进行到步骤 5 时，你可能需要考虑一次只将一个表空间切换到备份模式。如果采取这种方法，你需要知道哪些数据文件属于哪个表空间：\n```\nselect\
  \ tablespace_name, file_name\nfrom dba_data_files\norder by 1,2;\n```\n\n### 步骤\
  \ 4：记录在线重做日志的最大序列号\n要成功使用热备份进行恢复，你至少需要备份期间生成的所有归档重做日志。因此，你需要在开始热备份前记录当前的`ARCHIVELOG`序列号：\n\
  ```\nselect thread#, max(sequence#)\nfrom v$log\ngroup by thread#\norder by thread#;\n\
  ```\n\n### 步骤 5：将数据库/表空间切换到备份模式\n你可以使用`ALTER DATABASE BEGIN BACKUP`语句将所有表空间同时置于备份模式：\n\
  ```\nSQL> alter database begin backup;\n```\n\n\n\n如果是一个活跃的 OLTP 数据库，执行此操作会**严重降低性能**。这是因为当表空间处于备份模式时，Oracle\
  \ 会将任何数据块（在首次修改时）的完整映像复制到重做流中（有关更多详细信息，请参阅本章后面的“理解拆分块问题”部分）。\n\n另一种方法是**每次只将一个表空间**切换到备份模式。将表空间切换到备份模式后，您可以复制相关的数据文件（步骤\
  \ 6），然后将表空间切换出备份模式（步骤 7）。您必须对每个表空间重复此过程：\n\n```sql\nSQL> alter tablespace <tablespace_name>\
  \ begin backup;\n```\n\n## 步骤 6. 使用操作系统工具复制数据文件\n\n使用操作系统工具（Linux/Unix 的 `cp` 命令）将数据文件复制到备份位置。在此示例中，所有数据文件都在一个目录中，并且它们都被复制到同一个备份目录：\n\
  \n```bash\n$ cp /u01/dbfile/O12C/*.dbf  /u01/hbackup/O12C\n```\n\n## 步骤 7. 将数据库/表空间切换出备份模式\n\
  \n将所有数据文件复制到备份目录后，您需要将表空间切换出备份模式。此示例将所有表空间同时切换出备份模式：\n\n```sql\nSQL> alter database\
  \ end backup;\n```\n\n如果您是逐个将表空间切换到备份模式的，则需要在复制完每个表空间的数据文件后，将其切换出备份模式：\n\n```sql\n\
  SQL> alter tablespace <tablespace_name> end backup;\n```\n\n如果您没有将表空间切换出备份模式，可能会**严重降低性能并危及数据库恢复能力**。您可以使用以下查询来验证没有数据文件处于\
  \ `ACTIVE` 状态：\n\n```sql\nSQL> alter session set nls_date_format = 'DD-MON-RRRR\
  \ HH24:MI:SS';\nSQL> select * from v$backup where status='ACTIVE';\n```\n\n![Image](img/sq.jpg)\
  \ **注意** 正确设置 `NLS_DATE_FORMAT` 参数可以让您看到数据文件进入备份模式的准确日期/时间。这对于在需要恢复数据文件时确定所需归档日志的起始序列号非常有用。\n\
  \n## 步骤 8. 归档当前的在线重做日志，并记录在线重做日志的最大序列号\n\n以下语句指示 Oracle 归档所有未归档的在线重做日志并启动日志切换。这确保将备份结束标记写入归档重做日志：\n\
  \n```sql\nSQL> alter system archive log current;\n```\n\n此外，请记录最大的在线重做日志序列号。如果在热备份后立即发生故障，您将需要热备份期间生成的所有归档重做日志才能完全恢复数据库：\n\
  \n```sql\nselect thread#, max(sequence#)\nfrom v$log\ngroup by thread#\norder by\
  \ thread#;\n```\n\n## 步骤 9. 备份控制文件\n\n对于热备份，您**不能**使用操作系统复制命令来备份控制文件。Oracle 的热备份过程规定您必须使用\
  \ `ALTER DATABASE BACKUP CONTROLFILE` 语句。此示例创建控制文件的备份并将其放置在数据库备份文件所在的同一位置：\n\n```sql\n\
  SQL> alter database backup controlfile\n     to '/u01/hbackup/O12C/controlbk.ctl'\
  \ reuse;\n```\n\n`REUSE` 子句指示 Oracle，如果备份位置已存在同名文件，则覆盖它。\n\n## 步骤 10. 备份备份期间产生的任何归档重做日志\n\
  \n备份热备份期间产生的归档重做日志。您可以使用操作系统复制命令来完成此操作：\n\n```bash\n$ cp <备份期间产生的归档重做日志>  <备份目录>\n\
  ```\n\n此过程可确保您拥有这些日志，即使在热备份完成后不久发生故障。请确保不要备份当前正由归档进程写入的归档重做日志——这样做会导致该文件副本不完整。有时，DBA\
  \ 会通过检查 `V$ARCHIVED_LOG` 视图中的最大 `SEQUENCE#` 和最大 `RESETLOGS_ID` 来编写此过程的脚本。Oracle\
  \ 在完成归档重做日志到磁盘的复制后会更新该视图。因此，出现在 `V$ARCHIVED_LOG` 视图中的任何归档重做日志文件都应该是可以安全复制的。\n\n\
  ### 编写热备份脚本\n\n本节中的脚本涵盖了与热备份相关的**最基本任务**。对于生产环境，热备份脚本可能相当复杂。这里提供的脚本为您提供了应在热备份脚本中包含内容的基线。您需要修改脚本中的以下变量，使其在您的环境中生效：\n\
  \n*   `ORACLE_SID`\n*   `ORACLE_HOME`\n*   `hbdir`\n\n`ORACLE_SID` 操作系统变量定义了您的数据库名称。`ORACLE_HOME`\
  \ 操作系统变量定义了您安装 Oracle 软件的位置。SQL*Plus 中的 `hbdir` 变量指向热备份存放的目录。\n\n```bash\n#!/bin/bash\n\
  ORACLE_SID=O12C\nORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\nPATH=$PATH:$ORACLE_HOME/bin\n\
  #\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0 lines 132 verify off feed\
  \ off trimsp on\ndefine hbdir=/u01/hbackup/O12C\nspo hotback.sql\nselect 'spo &&hbdir/hotlog.txt'\
  \ from dual;\nselect 'select max(sequence#) from v\\$log;' from dual;\nselect 'alter\
  \ database begin backup;' from dual;\nselect '!cp ' || name || ' ' || '&&hbdir'\
  \ from v\\$datafile;\nselect 'alter database end backup;' from dual;\nselect 'alter\
  \ database backup controlfile to ' || '''' || '&&hbdir'\n       || '/controlbk.ctl'\
  \  || '''' || ' reuse;' from dual;\nselect 'alter system archive log current;' from\
  \ dual;\nselect 'select max(sequence#) from v\\$log;' from dual;\nselect 'select\
  \ member from v\\$logfile;' from dual;\nselect 'spo off;' from dual;\nspo off;\n\
  @@hotback.sql\nEOF\n```\n\n该脚本会生成一个 `hotback.sql` 脚本。此脚本包含执行热备份的命令。以下是一个测试数据库的 `hotback.sql`\
  \ 脚本列表：\n\n```sql\nspo /u01/hbackup/O12C/hotlog.txt\nselect max(sequence#) from\
  \ v$log;\nalter database begin backup;\n!cp /u01/dbfile/O12C/system01.dbf /u01/hbackup/O12C\n\
  !cp /u01/dbfile/O12C/sysaux01.dbf /u01/hbackup/O12C\n!cp /u01/dbfile/O12C/undotbs01.dbf\
  \ /u01/hbackup/O12C\n!cp /u01/dbfile/O12C/users01.dbf /u01/hbackup/O12C\n!cp /u01/dbfile/O12C/tools01.dbf\
  \ /u01/hbackup/O12C\nalter database end backup;\nalter database backup controlfile\
  \ to '/u01/hbackup/O12C/controlbk.ctl' reuse;\nalter system archive log current;\n\
  select max(sequence#) from v$log;\nselect member from v$logfile;\nspo off;\n```\n\
  \n您可以从 SQL*Plus 手动运行此脚本，如下所示：\n\n```sql\nSQL> @hotback.sql\n```\n\n![Image](img/sq.jpg)\
  \ **警告** 如果前面的脚本在执行 `ALTER DATABASE END BACKUP` 之前的某条语句上失败，您必须手动从 SQL*Plus（以 `SYS`\
  \ 用户身份）运行 `ALTER DATABASE END BACKUP` 来将数据库（表空间）切换出备份模式。\n\n在生成热备份脚本时，同时生成一个可用于从备份目录复制数据文件的脚本是**审慎的做法**。您需要修改此脚本中的\
  \ `hbdir` 变量以匹配您环境中热备份的位置。以下是一个生成复制命令的脚本：\n\n```bash\n#!/bin/bash\nORACLE_SID=O12C\n\
  ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\nPATH=$PATH:$ORACLE_HOME/bin\n\
  #\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0 lines 132 verify off feed\
  \ off trimsp on\ndefine hbdir=/u01/hbackup/O12C/\ndefine dbname=$ORACLE_SID\nspo\
  \ hotrest.sql\nselect '!cp ' || '&&hbdir' || substr(name,instr(name,'/',-1,1)+1)\n\
  \       || ' ' || name from v\\$datafile;\nspo off;\nEOF\n#\nexit 0\n```\n\n\n以下是根据我的环境生成的代码，可以在\
  \ SQL*Plus 中执行，以便在发生故障时将数据文件从备份目录复制回来：\n\n```\n!cp /u01/hbackup/O12C/system01.dbf\
  \ /u01/dbfile/O12C/system01.dbf\n!cp /u01/hbackup/O12C/sysaux01.dbf /u01/dbfile/O12C/sysaux01.dbf\n\
  !cp /u01/hbackup/O12C/undotbs01.dbf /u01/dbfile/O12C/undotbs01.dbf\n!cp /u01/hbackup/O12C/users01.dbf\
  \ /u01/dbfile/O12C/users01.dbf\n!cp /u01/hbackup/O12C/tools01.dbf /u01/dbfile/O12C/tools01.dbf\n\
  ```\n\n在此输出中，如果您更愿意从操作系统提示符运行这些命令，可以删除每行开头的感叹号（`!`）。核心思想是，这些命令可在发生故障时使用，因此您可以知道哪些文件已备份到哪个位置以及如何将它们复制回来。\n\
  \n![Image](img/sq.jpg) **提示** 对于联机备份，不要使用用户管理的热备份技术；请使用 `RMAN`。`RMAN` 不需要将表空间置于备份模式，并且几乎自动化了所有与备份和恢复相关的操作。\n\
  \n## 理解分裂块问题\n\n执行热备份时，一个关键步骤是在使用操作系统实用程序复制与表空间关联的任何数据文件之前，先将该表空间更改为备份模式。要理解为何必须将表空间更改为备份模式，您必须熟悉有时被称为分裂块（或断裂块）的问题。\n\
  \n回想一下，数据库块的大小通常与操作系统块的大小不同。例如，数据库块的大小可能为 8KB，而操作系统块的大小为 4KB。作为热备份的一部分，您使用操作系统实用程序复制正在使用的数据文件。在操作系统实用程序复制数据文件的过程中，有可能数据库写入器正在同时写入某个块。由于\
  \ Oracle 块和操作系统块的大小不同，可能会发生以下情况：\n\n1.  操作系统实用程序复制了 Oracle 块的一部分。\n2.  片刻之后，数据库写入器更新了整个块。\n\
  3.  紧接着，操作系统实用程序复制了 Oracle 块的后半部分。\n\n这可能导致操作系统复制的块与 Oracle 写入操作系统的内容不一致。图 3-1 说明了这个概念。\n\
  \n![9781484207642_Fig03-01.jpg](img/9781484207642_Fig03-01.jpg)\n\n图 3-1. 热备份中的分裂（或断裂）块问题\n\
  \n查看图 3-1，在时间点 3 复制到磁盘的块，就 Oracle 而言是损坏的。块的前半部分来自时间点 1，后半部分在时间点 3 复制。当您进行热备份时，您就是在保证数据文件的备份中存在块级别的损坏。\n\
  \n要理解 Oracle 如何解决分裂块问题，首先考虑一个处于正常模式（而非备份模式）的数据库。写入联机重做日志的重做信息仅仅是 Oracle 重新应用事务所需的内容。重做流不包含完整的数据块。Oracle\
  \ 只在重做流中记录一个更改向量，指定哪个块被更改以及如何更改。图 3-2 显示了 Oracle 在正常条件下的操作。\n\n![9781484207642_Fig03-02.jpg](img/9781484207642_Fig03-02.jpg)\n\
  \n图 3-2. Oracle 通常只将更改向量写入重做流\n\n现在，考虑在热备份期间发生的情况。对于热备份，在复制与表空间关联的数据文件之前，必须先将表空间更改为备份模式。在此模式下，在\
  \ Oracle 修改一个块之前，会将整个块复制到重做流中。对该块的任何后续更改只需要将正常的重做更改向量写入重做流。图 3-3 对此进行了说明。\n\n![9781484207642_Fig03-03.jpg](img/9781484207642_Fig03-03.jpg)\n\
  \n图 3-3. 整个块被写入重做流\n\n要理解为何 Oracle 将整个块记录到重做流中，考虑在还原和恢复期间发生的情况。首先，从热备份中还原备份文件。如前所述，这些备份文件包含损坏的块，这是由于分裂块问题造成的。但这没关系，因为一旦\
  \ Oracle 恢复了数据文件，对于在热备份期间被修改的任何块，Oracle 都拥有该块在被修改前的映像副本。Oracle 使用其在重做流中拥有的该块副本作为恢复（该块）的起点。图\
  \ 3-4 说明了这个过程。\n\n![9781484207642_Fig03-04.jpg](img/9781484207642_Fig03-04.jpg)\n\
  \n图 3-4. 分裂块的还原和恢复\n\n这样，热备份文件中是否存在损坏的块就无关紧要了。Oracle 总是从重做流中该块的副本（修改前的状态）开始块的恢复过程。\n\
  \n## 理解备份期间生成重做日志的必要性\n\n如果您在完成热备份后不久就发生故障，会发生什么？Oracle 知道表空间何时被置于备份模式（`begin backup`\
  \ 系统 `SCN` 写入重做流），也知道表空间何时退出备份模式（`end-of-backup` 标记写入重做流）。Oracle 需要该时间范围内生成的所有归档重做日志才能成功恢复数据文件。\n\
  \n图 3-5 显示，至少需要序列号从 100 到 102 的归档重做日志来恢复该表空间。这些归档重做日志是在热备份期间生成的。\n\n![9781484207642_Fig03-05.jpg](img/9781484207642_Fig03-05.jpg)\n\
  \n图 3-5. 恢复已应用\n\n如果您尝试在开始标记和结束标记之间的所有重做日志都应用到数据文件之前停止恢复过程，Oracle 会抛出此错误：\n\n```\n\
  ORA-01195: online backup of file 1 needs more recovery to be consistent\n```\n\n\
  表空间热备份期间生成的所有重做日志都必须应用到数据文件，然后才能打开它们。Oracle 至少需要应用 `begin-backup` `SCN` 标记和 `end-backup`\
  \ 标记之间的所有内容，以考虑表空间处于备份模式期间被修改的每个块。这些重做日志位于归档重做日志文件中；或者，如果故障正好发生在备份结束后，部分重做日志可能尚未归档，可能还存在于联机重做日志中。因此，您必须指示\
  \ Oracle 应用联机重做日志中的内容。\n\n### 理解数据文件会被更新\n\n请注意，在图 3-2 和 图 3-3 中，数据库写入器的行为在整个备份过程中基本上保持不变。无论数据库处于何种备份模式，数据库写入器都会继续将块写入数据文件。数据库写入器不关心是否正在进行热备份；它的工作是将块从缓冲区高速缓存写入数据文件。\n\
  \n偶尔，您会遇到声称在用户管理的热备份期间数据库写入器不会写入数据文件的 DBA。这是一种普遍存在的误解。请运用一些常识：如果数据库写入器在热备份期间不写入数据文件，那么更改被写入到哪里？如果事务被写入到数据文件以外的地方，备份后这些数据文件将如何重新同步？这根本说不通。\n\
  \n\n\n一些数据库管理员会说：“数据文件头被冻结了，这意味着数据文件不能更改。” Oracle 确实会冻结数据文件头中的 `SCN`（系统变更号）来表示热备份的开始，并且直到该表空间退出备份模式才会更新那个\
  \ `SCN`。这种“冻结的 `SCN`”并不意味着在备份期间数据块没有被写入数据文件。你可以通过以下操作轻松证明在备份模式下数据文件有写入操作：\n\n1.\
  \  将一个表空间置于备份模式：\n\n```\nSQL> alter tablespace users begin backup;\n```\n\n2.  创建一个包含字符字段的表：\n\
  \n```\nSQL> create table cc(cc varchar2(20)) tablespace users;\n```\n\n3.  向该表中插入一个字符串：\n\
  \n```\nSQL> insert into cc values('DBWR does write');\n```\n\n4.  强制执行一个检查点（确保所有被修改的缓冲区都写入磁盘）：\n\
  \n```\nSQL> alter system checkpoint;\n```\n\n5.  在操作系统中，使用 `strings` 和 `grep` 命令在数据文件中搜索该字符串：\n\
  \n```\n$ strings /u01/dbfile/O12C/users01.dbf | grep \"DBWR does write\"\n```\n\n\
  6.  以下是输出结果，证明数据库写入器（DBWR）确实将数据写入了磁盘：\n\n```\nDBWR does write\n```\n\n7.  别忘了将表空间退出备份模式：\n\
  \n```\nSQL> alter tablespace users end backup;\n```\n\n# 执行归档日志模式数据库的完全恢复\n\n术语\
  \ `完全恢复` 意味着你可以恢复在故障发生之前已提交的所有事务。`完全恢复` 并不意味着你必须完全还原和恢复整个数据库。例如，如果只有一个数据文件经历了介质故障，你只需要还原和恢复那个受损的数据文件即可执行完全恢复。\n\
  \n![Image](img/sq.jpg) `提示` 如果你有权访问测试或开发数据库，请花时间逐步演练下面每个示例中的每一步。亲身实践这些步骤，比阅读任何文档都能学到更多关于备份和恢复的知识。\n\
  \n这里概述的步骤适用于任何在归档日志模式下备份的数据库。无论你进行的是冷备份还是热备份都无关紧要。只要数据库在备份时处于归档日志模式，还原和恢复数据文件的步骤都是相同的。对于完全恢复，你需要：\n\
  \n*   能够还原那些经历了介质故障的数据文件\n*   能够访问自上次备份开始以来生成的所有归档重做日志\n*   完好的联机重做日志\n\n以下是完全恢复的基本过程：\n\
  \n1.  将数据库置于装载（`MOUNT`）模式；这可以防止正常的用户事务处理读取/写入正在还原的数据文件。（如果你还原的不是 `SYSTEM` 或 `UNDO`\
  \ 表空间，你也可以选择打开数据库，但在还原数据文件之前手动将其脱机。如果这样做，请确保在恢复完成后将数据文件重新联机。）\n2.  使用操作系统复制实用程序还原受损的数据文件。\n\
  3.  执行相应的 SQL*Plus `RECOVER` 命令，以应用归档重做日志和联机重做日志中所需的任何信息。\n4.  将数据库打开。\n\n接下来的几个部分将演示一些常见的完全还原和恢复场景。你应该能够应用这些基本场景，来诊断并从你遇到的任何复杂情况中恢复。\n\
  \n## 在数据库离线时进行还原和恢复\n\n本节详细描述了一个简单的还原和恢复场景。接下来描述的是模拟一个故障，然后执行完全还原和恢复的步骤。请在开发数据库中尝试此场景。确保你有一个良好的备份，并且不是在包含关键业务数据的数据库中尝试这个实验。\n\
  \n在开始此示例之前，请创建一个表并插入一些数据。在完全恢复过程结束时会选择此表和数据，以演示成功的恢复：\n\n```\nSQL> create table\
  \ foo(foo number) tablespace users;\nSQL> insert into foo values(1);\nSQL> commit;\n\
  ```\n\n现在，多次切换联机日志。这样做可以确保你必须在恢复过程中应用归档重做日志：\n\n```\nSQL> alter system switch logfile;\n\
  ```\n\n前斜杠 (`/`) 会重新执行最近执行的 SQL 语句：\n\n```\nSQL> /\nSQL> /\nSQL> /\n```\n\n接下来，通过重命名与\
  \ `USERS` 表空间关联的数据文件来模拟介质故障。你可以通过此查询来确定该文件的名称：\n\n```\nSQL> select file_name from\
  \ dba_data_files where tablespace_name='USERS';\n\nFILE_NAME\n\n/u01/dbfile/O12C/users01.dbf\n\
  ```\n\n在操作系统中，重命名该文件：\n\n```\n$ mv /u01/dbfile/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf.old\n\
  ```\n\n然后，尝试停止你的数据库：\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown immediate;\n```\n\
  \n你应该会看到类似这样的错误：\n\n```\nORA-01116: error in opening database file ...\n```\n\n\
  如果这是一场真实的灾难，明智的做法是导航到数据文件目录，列出文件，并查看有问题的文件是否在其正确的位置。你还应该检查 `alert.log` 文件，看看 Oracle\
  \ 是否在那里记录了任何相关信息。\n\n既然你已经模拟了一个介质故障，接下来的几个步骤将引导你完成还原和完全恢复。\n\n### 步骤 1. 将数据库置于装载模式\n\
  \n在将数据库置于装载模式之前，你可能需要先使用 `ABORT` 选项关闭它：\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown\
  \ abort;\nSQL> startup mount;\n```\n\n### 步骤 2. 从备份中还原数据文件\n\n下一步是将备份中对应于故障文件的文件复制回来：\n\
  \n```\n$ cp /u01/hbackup/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf\n```\n\n\
  此时，思考一下如果你尝试启动数据库，Oracle 会做什么，这很有启发性。当你发出 `ALTER DATABASE OPEN` 语句时，Oracle 会检查控制文件中每个数据文件的\
  \ `SCN`。你可以通过查询 `V$DATAFILE` 来检查这个 `SCN`：\n\n```\nSQL> select checkpoint_change#\
  \ from v$datafile where file#=4;\n\nCHECKPOINT_CHANGE#\n```\n\nOracle 将控制文件中的 `SCN`\
  \ 与数据文件头中的 `SCN` 进行比较。你可以通过查询 `V$DATAFILE_HEADER` 来检查数据文件头中的 `SCN`；例如：\n\n```\n\
  select file#, fuzzy, checkpoint_change#\nfrom v$datafile_header\nwhere file#=4;\n\
  \nFILE# FUZ CHECKPOINT_CHANGE#\n---------- --- ------------------\n         4 YES\
  \            3502285\n```\n\n请注意，对于同一个数据文件，`V$DATAFILE_HEADER` 中记录的 `SCN` 小于 `V$DATAFILE`\
  \ 中的 `SCN`。如果你尝试打开数据库，Oracle 会抛出一个错误，指出需要介质恢复（意味着你需要应用重做）来同步数据文件中的 `SCN` 和控制文件中的\
  \ `SCN`。`FUZZY` 列被设置为 `YES`。这表明在打开数据文件供使用之前，必须对其应用重做。以下是你此时尝试打开数据库时会发生的情况：\n\n```\n\
  SQL> alter database open;\n\nalter database open;\nalter database open\n*\nERROR\
  \ at line 1:\nORA-01113: file 4 needs media recovery...\n```\n\n在所有数据文件头中的 `SCN`\
  \ 与控制文件中相应的 `SCN` 匹配之前，Oracle 不会让你打开数据库。\n\n### 步骤 3. 执行相应的 `RECOVER` 语句\n\n归档重做日志和联机重做日志拥有将数据文件\
  \ `SCN` 追赶到控制文件 `SCN` 所需的信息。你可以通过执行以下 SQL*Plus 语句之一来将重做应用到需要介质恢复的数据文件上：\n\n*   `RECOVER\
  \ DATAFILE`\n*   `RECOVER TABLESPACE`\n*   `RECOVER DATABASE`\n\n\n\n因为在本例中仅需恢复一个数据文件，所以使用\
  \ `RECOVER DATAFILE` 语句是合适的。不过请记住，你可以运行前面列出的任何 `RECOVER` 语句，Oracle 会自行判断需要恢复什么。在这种特定场景下，你可能会发现记住包含已恢复数据文件的表空间名称比记住数据文件名称更容易。接下来，恢复\
  \ `USERS` 表空间中所有需要恢复的数据文件：\n\n```\nSQL> recover tablespace users;\n```\n\n此时，Oracle\
  \ 会使用数据文件头部的 `SCN` 来确定从哪个归档重做日志或联机重做日志开始应用重做数据。你可以通过以下查询查看 `RMAN` 将用于开始恢复过程的起始日志序列号：\n\
  \n```\nselect\n HXFNM file_name\n,HXFIL file_num\n,FHTNM tablespace_name\n,FHRBA_SEQ\
  \ sequence\nfrom X$KCVFH\nwhere FHTNM = 'USERS';\n```\n\n如果所有需要的重做数据都存在于联机重做日志中，Oracle\
  \ 会应用该重做数据并显示此消息：\n\n```\nMedia recovery complete.\n```\n\n如果 Oracle 需要应用仅存在于归档重做日志中的重做数据（这意味着包含相应重做数据的联机重做日志已被覆盖），系统会提示你一条\
  \ Oracle 的建议，告知首先应用哪个归档重做日志：\n\n```\nORA-00279: change 3502285 generated at 11/02/2012\
  \ 10:49:39 needed for thread 1\nORA-00289: suggestion : /u01/oraarch/O12C/1_1_798283209.dbf\n\
  ORA-00280: change 3502285 for thread 1 is in sequence #1\n\nSpecify log: {<RET>=suggested\
  \ | filename | AUTO | CANCEL}\n```\n\n你可以按回车键 (`<RET>`) 让 Oracle 应用建议的归档重做日志文件，指定一个文件名，指定\
  \ `AUTO` 指示 Oracle 自动应用所有建议的文件，或者输入 `CANCEL` 取消恢复操作。\n\n在此示例中，指定 `AUTO`。Oracle 将应用所有归档重做日志文件和联机重做日志文件中的重做数据以完成完全恢复：\n\
  \n```\nAUTO\n```\n\n当所有需要的归档重做和联机重做都应用完毕后，最后显示的消息是：\n\n```\nLog applied.\nMedia\
  \ recovery complete.\n```\n\n## 步骤 4. 打开数据库\n\n介质恢复完成后，你可以打开数据库：\n\n```\nSQL> alter\
  \ database open;\n```\n\n你现在可以验证在介质故障之前提交的事务是否已恢复并完成恢复：\n\n```\nSQL> select * from\
  \ foo;\n\nFOO\n```\n\n## 在数据库联机状态下恢复与修复\n\n如果你丢失了与 `SYSTEM` 和 `UNDO` 以外的表空间关联的数据文件，可以在数据库保持联机状态的同时恢复并修复损坏的数据文件。为此，任何正在被恢复和修复的数据文件必须先被脱机。你可能会收到关于数据文件问题的警报，例如有用户尝试更新表时看到如下错误：\n\
  \n```\nSQL> insert into foo values(2);\n\nORA-01116: error in opening database file\
  \ ...\n```\n\n你导航到包含该数据文件的操作系统目录，并确认它已被系统管理员错误地删除。\n\n在此示例中，与 `USERS` 表空间关联的数据文件被脱机，随后在数据库其余部分保持联机的状态下进行恢复和修复。首先，将数据文件脱机：\n\
  \n```\nSQL> alter database datafile '/u01/dbfile/O12C/users01.dbf' offline;\n```\n\
  \n现在，从备份位置恢复相应的数据文件：\n\n```\n$ cp /u01/hbackup/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf\n\
  ```\n\n在此情况下，你不能使用 `RECOVER DATABASE`。`RECOVER DATABASE` 语句尝试恢复数据库中的所有数据文件，而 `SYSTEM`\
  \ 表空间是其中的一部分。`SYSTEM` 表空间在数据库联机时无法被恢复。如果你使用 `RECOVER TABLESPACE`，则与该表空间关联的所有数据文件都必须处于脱机状态。在这种情况下，更合适的做法是在数据文件级别进行恢复：\n\
  \n\n\n### 恢复数据文件\n\n执行以下命令：\n```\nSQL> recover datafile '/u01/dbfile/O12C/users01.dbf';\n\
  ```\n\nOracle 会检查数据文件头中的 SCN，以确定需要使用哪个归档重做日志或在线重做日志来开始应用重做。如果所有需要的重做都已存在于在线重做日志中，你将看到此消息：\n\
  ```\nMedia recovery complete.\n```\n\n如果重做的起始点只存在于归档重做日志文件中，Oracle 会建议从哪个文件开始：\n\
  ```\nORA-00279: change 3502285 generated at 11/02/2012 10:49:39 needed for thread\
  \ 1\nORA-00289: suggestion : /u01/oraarch/O12C/1_1_798283209.dbf\nORA-00280: change\
  \ 3502285 for thread 1 is in sequence #1\n\nSpecify log: {<RET>=suggested | filename\
  \ | AUTO | CANCEL}\n```\n\n你可以输入 `AUTO`，让 Oracle 应用所有归档重做日志文件和在线重做日志文件中需要的重做：\n\
  ```\nAUTO\n```\n\n如果成功，你应该会看到此消息：\n```\nLog applied.\nMedia recovery complete.\n\
  ```\n\n现在，你可以将数据文件重新联机：\n```\nSQL> alter database datafile '/u01/dbfile/O12C/users01.dbf'\
  \ online;\n```\n\n如果成功，你会看到：\n```\nDatabase altered.\n```\n\n### 恢复控制文件\n\n在用户管理的备份操作中，通常会在以下情况下恢复控制文件：\n\
  \n*   控制文件损坏，且该文件是多路复用的。\n*   所有控制文件都损坏。\n\n以下部分将介绍这两种情况。\n\n### 多路复用时恢复损坏的控制文件\n\
  \n如果你为数据库配置了多个控制文件，可以关闭数据库并使用操作系统命令将现有的控制文件复制到丢失控制文件的位置。例如，从初始化参数文件中，你得知此数据库使用了两个控制文件：\n\
  ```\nSQL> show parameter control_files\n\nNAME                     TYPE        VALUE\n\
  ---------------------------- ----------- ------------------------------\ncontrol_files\
  \            string      /u01/dbfile/O12C/control01.ctl\n                      \
  \               ,/u02/dbfile/O12C/control02.ctl\n```\n\n假设 `control02.ctl` 文件已损坏。查询数据字典时\
  \ Oracle 会抛出此错误：\n```\nORA-00210: cannot open the specified control file...\n```\n\
  \n当有完好的控制文件可用时，你可以关闭数据库，移动旧的/损坏的控制文件（这可以保留它，以备日后进行根本原因分析），然后将现有的完好控制文件复制到损坏控制文件的名称和位置：\n\
  ```\nSQL> shutdown abort;\n\n$ mv /u02/dbfile/O12C/control02.ctl /u02/dbfile/O12C/control02.ctl.old\n\
  $ cp /u01/dbfile/O12C/control01.ctl /u02/dbfile/O12C/control02.ctl\n```\n\n现在，重新启动数据库：\n\
  ```\nSQL> startup;\n```\n\n通过这种方式，你可以从现有的控制文件恢复一个控制文件。\n\n### 所有控制文件都损坏时的恢复\n\n\
  如果丢失了所有控制文件，你可以从备份中恢复一个，或者重新创建控制文件。只要你拥有所有的数据文件和任何需要的重做（归档重做和在线重做），就应该能够完全恢复数据库。此场景的步骤如下：\n\
  \n1.  关闭数据库。\n2.  从备份中恢复一个控制文件。\n3.  以 `MOUNT` 模式启动数据库，并使用 `RECOVER DATABASE USING\
  \ BACKUP CONTROLFILE` 子句启动数据库恢复。\n4.  对于完全恢复，手动应用在线重做日志中包含的重做。\n5.  使用 `OPEN RESETLOGS`\
  \ 子句打开数据库。\n\n在此示例中，数据库的所有控制文件都被意外删除，随后 Oracle 报告此错误：\n```\nORA-00210: cannot open\
  \ the specified control file...\n```\n\n#### 第 1 步：关闭数据库\n\n首先，关闭数据库：\n```\nSQL>\
  \ shutdown abort;\n```\n\n#### 第 2 步：从备份中恢复控制文件\n\n此数据库配置为只有一个控制文件，你可以将其从备份位置复制回来，如下所示：\n\
  ```\n$ cp /u01/hbackup/O12C/controlbk.ctl /u01/dbfile/O12C/control01.ctl\n```\n\n\
  \n\n## 步骤 3：在挂载模式下启动数据库并启动数据库恢复\n\n接下来，在挂载模式下启动数据库：\n```sql\nSQL> startup mount;\n\
  ```\n\n控制文件和数据文件复制回去之后，你就可以执行恢复操作。Oracle 知道控制文件来自备份（因为它是通过 `ALTER DATABASE BACKUP\
  \ CONTROLFILE` 语句创建的），因此恢复必须使用 `USING BACKUP CONTROLFILE` 子句来执行：\n```sql\nSQL> recover\
  \ database using backup controlfile;\n```\n\n此时，系统会提示你应用归档重做日志文件：\n```text\nORA-00279:\
  \ change 3584431 generated at 11/02/2012 11:48:46 needed for thread 1\nORA-00289:\
  \ suggestion : /u01/oraarch/O12C/1_8_798283209.dbf\nORA-00280: change 3584431 for\
  \ thread 1 is in sequence #8\n\nSpecify log: {<RET>=suggested | filename | AUTO\
  \ | CANCEL}\n```\n\n输入 `AUTO` 指示恢复过程自动应用所有归档重做日志：\n```text\nAUTO\n```\n\n恢复过程会应用所有可用的归档重做日志。恢复过程无法单方面确定归档重做流在哪里结束，因此会尝试应用一个不存在的归档重做日志，导致出现如下消息：\n\
  ```text\nORA-00308: cannot open archived log '/u01/oraarch/O12C/1_10_798283209.dbf'\n\
  ORA-27037: unable to obtain file status\n```\n\n出现前面这条消息是预料之中的。现在，尝试打开数据库：\n```sql\n\
  SQL> alter database open resetlogs;\n```\n\n在这种情况下，Oracle 会抛出以下错误：\n```text\nORA-01113:\
  \ file 1 needs media recovery\nORA-01110: data file 1: '/u01/dbfile/O12C/system01.dbf'\n\
  ```\n\n## 步骤 4：应用联机重做日志中包含的重做数据\n\nOracle 需要应用更多重做数据以使控制文件中的 SCN 与数据文件头中的 SCN 同步。在此场景中，联机重做日志仍然完好无损，并包含所需的重做数据。要应用联机重做日志中包含的重做数据，首先识别联机重做日志文件的位置和名称：\n\
  ```sql\nselect a.sequence#, a.status, a.first_change#, b.member\nfrom v$log a, v$logfile\
  \ b\nwhere a.group# = b.group#\norder by a.sequence#;\n```\n\n以下是此示例的部分输出：\n```text\n\
  SEQUENCE#  STATUS           FIRST_CHANGE# MEMBER\n---------- ---------------- -------------\
  \ ------------------------------\n         6 INACTIVE               3543960 /u01/oraredo/O12C/redo03a.rdo\n\
  \         6 INACTIVE               3543960 /u02/oraredo/O12C/redo03b.rdo\n     \
  \    7 INACTIVE               3543963 /u02/oraredo/O12C/redo01b.rdo\n         7\
  \ INACTIVE               3543963 /u01/oraredo/O12C/redo01a.rdo\n         8 CURRENT\
  \                3583986 /u02/oraredo/O12C/redo02b.rdo\n         8 CURRENT     \
  \           3583986 /u01/oraredo/O12C/redo02a.rdo\n```\n\n现在，重新启动恢复过程：\n```sql\n\
  SQL> recover database using backup controlfile;\n```\n\n恢复过程会提示一个不存在的归档重做日志：\n```text\n\
  ORA-00279: change 3584513 generated at 11/02/2012 11:50:50 needed for thread 1\n\
  ORA-00289: suggestion : /u01/oraarch/O12C/1_10_798283209.dbf\nORA-00280: change\
  \ 3584513 for thread 1 is in sequence #10\n\nSpecify log: {<RET>=suggested | filename\
  \ | AUTO | CANCEL}\n```\n\n不要向恢复过程提供归档重做日志文件，而是输入一个当前联机重做日志文件的名称（可能需要尝试每个联机重做日志，直到找到\
  \ Oracle 需要的那个）。这将指示恢复过程应用联机重做日志中的任何重做数据：\n```text\n/u01/oraredo/O12C/redo01a.rdo\n\
  ```\n\n当应用了正确的联机重做日志时，你应该看到这条消息：\n```text\nLog applied.\nMedia recovery complete.\n\
  ```\n\n## 步骤 5：使用 RESETLOGS 打开数据库\n\n此时数据库已完全恢复。然而，因为恢复过程使用了备份控制文件，所以必须使用 `RESETLOGS`\
  \ 子句打开数据库：\n```sql\nSQL> alter database open resetlogs;\n```\n\n成功后，你将看到：\n```text\n\
  Database altered.\n```\n\n## 执行归档日志模式数据库的不完全恢复\n\n不完全恢复意味着你不会还原在故障发生前已提交的所有事务。使用这种恢复类型时，你是恢复到过去的某个时间点，事务会丢失。这就是为什么不完全恢复也被称为数据库时间点恢复。\n\
  \n不完全恢复并不意味着你只还原和恢复数据文件的一个子集。事实上，在大多数不完全恢复场景中，你必须作为过程的一部分从备份中还原所有数据文件。如果你不想恢复所有数据文件，首先需要将任何你不打算参与不完全恢复过程的数据文件脱机。当你启动恢复时，Oracle\
  \ 将只恢复那些在 `V$DATAFILE_HEADER` 的 `STATUS` 列中值为 `ONLINE` 的数据文件。\n\n你可能出于许多不同原因需要执行不完全恢复：\n\
  \n*   你尝试执行完全恢复，但缺少所需的归档重做日志或未归档的联机重做日志信息。\n*   你希望将数据库还原到过去某个错误用户操作（删除数据、删除表等）发生之前的时点。\n\
  *   你有一个测试环境，其中包含数据库的基线副本。测试完成后，你希望将数据库重置回基线以进行另一轮测试。\n\n你可以通过三种方式执行用户管理的不完全恢复：\n\
  \n*   基于取消\n*   基于 SCN\n*   基于时间\n\n基于取消允许你应用归档重做数据，并根据归档重做日志文件在边界处停止过程。例如，假设你正在尝试还原和恢复数据库，并且意识到你缺少一个归档重做日志。你必须在你最后一个完好的归档重做日志处停止恢复过程。你使用\
  \ `RECOVER DATABASE` 语句的 `CANCEL` 子句来启动基于取消的不完全恢复：\n```sql\nSQL> recover database\
  \ until cancel;\n```\n\n如果你想恢复到并包含某个 SCN 号，请使用基于 SCN 的不完全恢复。你可能从告警日志或 LogMiner 的输出中知道你想要还原到的某个\
  \ SCN 点。使用 `UNTIL CHANGE` 子句执行这种类型的不完全恢复：\n```sql\nSQL> recover database until change\
  \ 12345;\n```\n\n如果你知道希望停止恢复过程的时间，请使用基于时间的不完全恢复。例如，你可能知道某个表在特定时间被删除，并希望将数据库还原和恢复到指定时间。基于时间的恢复格式始终如下：`YYYY-MM-DD:HH24:MI:SS`。以下是一个示例：\n\
  ```sql\nSQL> recover database until time '2012-10-21:02:00:00';\n```\n\n执行不完全恢复时，你必须还原所有计划在完全恢复完成后保持联机的数据文件。以下是进行不完全恢复的步骤：\n\
  \n1.  关闭数据库。\n2.  从备份中还原所有数据文件。\n3.  在挂载模式下启动数据库。\n4.  应用重做数据（前滚）到所需的点，并停止恢复过程（使用基于取消、SCN\
  \ 或时间的恢复）。\n5.  使用 `OPEN RESETLOGS` 子句打开数据库。\n\n以下示例执行基于取消的不完全恢复。如果数据库是打开的，请将其关闭：\n\
  ```bash\n$ sqlplus / as sysdba\nSQL> shutdown abort;\n```\n\n接下来，从备份中复制所有数据文件（冷备份或热备份均可）。此示例从热备份中还原所有数据文件。在此示例中，当前控制文件是完好的，无需还原。以下是用于还原数据库的\
  \ OS 复制命令片段：\n\n\n\n```\ncp /u01/hbackup/O12C/system01.dbf /u01/dbfile/O12C/system01.dbf\n\
  cp /u01/hbackup/O12C/sysaux01.dbf /u01/dbfile/O12C/sysaux01.dbf\ncp /u01/hbackup/O12C/undotbs01.dbf\
  \ /u01/dbfile/O12C/undotbs01.dbf\ncp /u01/hbackup/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf\n\
  cp /u01/hbackup/O12C/tools01.dbf /u01/dbfile/O12C/tools01.dbf\n```\n\n数据文件复制回去之后，你就可以开始恢复过程。此示例执行的是基于取消的不完全恢复：\n\
  \n```\n$ sqlplus / as sysdba\nSQL> startup mount;\nSQL> recover database until cancel;\n\
  ```\n\n此时，Oracle 恢复过程会建议应用一个归档重做日志：\n\n```\nORA-00279: change 3584872 generated\
  \ at 11/02/2012 12:02:32 needed for thread 1\nORA-00289: suggestion : /u01/oraarch/O12C/1_1_798292887.dbf\n\
  ORA-00280: change 3584872 for thread 1 is in sequence #1\n\nSpecify log: {<RET>=suggested\
  \ | filename | AUTO | CANCEL}\n```\n\n应用日志直到你想要停止的点，然后输入 `CANCEL`：\n\n```\nCANCEL\n\
  ```\n\n这会停止恢复过程。现在，你可以使用 `RESETLOGS` 子句打开数据库：\n\n```\nSQL> alter database open resetlogs;\n\
  ```\n\n数据库已被打开到过去的某个时间点。恢复被认为是不完全的，因为并非所有重做日志都已应用。\n\n![Image](img/sq.jpg) **提示**\
  \ 现在正是为数据库做一个良好备份的好时机。这将为你提供一个干净的恢复点，万一在你打开数据库后不久发生故障，可以从这个点启动还原和恢复。\n\n## OPEN\
  \ RESETLOGS 的目的\n\n有时，你可能被要求使用 `OPEN RESETLOGS` 子句打开数据库。你可能在重建控制文件、使用备份控制文件执行还原和恢复、或者执行不完全恢复时这样做。当你使用\
  \ `OPEN RESETLOGS` 子句打开数据库时，它要么会清除任何现有的联机重做日志文件，要么（如果文件不存在）重新创建它们。你可以查询 `V$LOGFILE`\
  \ 的 `MEMBER` 列，以查看哪些文件涉及 `OPEN RESETLOGS` 操作。\n\n为什么你想清除联机重做日志中的内容呢？以不完全恢复为例，其中数据库被故意打开到过去的某个时间点。在这种情况下，联机重做日志中的\
  \ `SCN` 信息包含了永远不会被恢复的事务数据。Oracle 强制你使用 `OPEN RESETLOGS` 打开数据库，以故意清除这些信息。\n\n当你使用\
  \ `OPEN RESETLOGS` 打开数据库时，你创建了数据库的一个新化身，并将日志序列号重置回 1。Oracle 要求一个新化身，以避免在需要另一次还原和恢复时，意外使用任何旧的归档重做日志（与数据库的独立化身相关联）。\n\
  \n### 总结\n\n一些研究表明，过度依赖自动驾驶技术的飞机飞行员，在应对灾难性飞行中问题方面的能力，不如那些花了大量时间在无自动驾驶辅助下飞行的飞行员。过度依赖自动驾驶的飞行员在出现严重问题时往往会忘记关键程序，而不太依赖自动驾驶的飞行员则更擅长诊断和解决令人紧张的飞行故障。\n\
  \n同样，理解如何使用用户管理技术手动备份、还原和恢复数据库的 DBA，在故障排除和解决严重的备份与恢复问题方面，比那些仅通过屏幕操作备份和恢复技术的 DBA\
  \ 更为熟练。这就是我在本书中包含本章的原因。理解每一步发生了什么以及为什么需要这一步，对于完全掌握 Oracle 备份和恢复架构至关重要。这种意识会转化为在使用\
  \ Oracle 工具（如 `RMAN`（备份和恢复）、`Enterprise Manager` 和 `Data Guard`（灾难恢复、高可用性和复制）时的关键故障排除技能。\n\
  \n本章介绍的用户管理备份和恢复技术如今已很少被教授或使用。大多数 DBA 正在（并且应该）使用 `RMAN` 来满足其 Oracle 备份和恢复需求。然而，理解冷备份和热备份的工作原理至关重要。你可能会发现自己受雇于一个实施了旧技术的单位，并且需要还原和恢复数据库、进行故障排除，或协助迁移到\
  \ `RMAN`。在这些场景中，你必须完全理解旧的备份技术。\n\n现在你已经对 Oracle 备份和恢复机制有了深入的理解，准备好研究 `RMAN` 了。接下来的几章将探讨如何配置和使用\
  \ `RMAN` 进行备份和恢复。\n\n# 第 4 章\n\n![image](img/frontdot.jpg)\n\n## 配置 RMAN\n\n如本书前面所述，`RMAN`\
  \ 是 Oracle 的旗舰级 `B&R` 工具。当你安装 Oracle 软件时（标准版和企业版），默认就会提供 `RMAN`。`RMAN` 提供了一套强大而灵活的\
  \ `B&R` 功能。以下列表突出了一些最显著的特点：\n\n*   易于使用的备份、还原和恢复命令。\n*   能够跟踪哪些文件已被备份以及备份位置。管理过时备份和归档重做日志的删除。\n\
  *   并行化：可以使用多个进程进行备份、还原和恢复。\n*   仅备份自上次备份以来更改的增量备份。\n*   在数据库、表空间、数据文件、表或块级别进行恢复。\n\
  *   高级压缩和加密功能。\n*   与介质管理器集成以进行磁带备份。\n*   备份验证和测试。\n*   跨平台数据转换。\n*   数据恢复顾问，可协助诊断故障并提出解决方案。\n\
  *   能够检测数据文件中的损坏块。\n*   从 `RMAN` 命令行进行高级报告。\n\n本章的目标是提供足够的关于 `RMAN` 的信息，使你能够就如何实施可靠的备份策略做出合理的决策。首先描述基本的\
  \ `RMAN` 组件，然后你将逐步了解实施 `RMAN` 过程中涉及的许多决策点。\n\n## 理解 RMAN\n\n`RMAN` 由许多不同的组件组成。图\
  \ 4-1 展示了主要 `RMAN` 组件的交互。在阅读本节时请参考此图。\n\n![9781484207642_Fig04-01.jpg](img/9781484207642_Fig04-01.jpg)\n\
  \n图 4-1. `RMAN` 架构组件\n\n以下列表描述了 `RMAN` 架构组件：\n\n\n\n*   `DBA`：在图中看起来有些秃顶，这与事实相去不远（就我而言）。\n\
  *   `目标数据库`：由 RMAN 执行备份的数据库。你可以通过 RMAN 命令行的 `TARGET` 参数连接到目标数据库（更多详情请参见下一节）。\n*\
  \   `RMAN 客户端`：发出 `BACKUP`、`RESTORE` 和 `RECOVER` 命令的 `rman` 工具。在大多数数据库服务器上，`rman`\
  \ 工具位于 `ORACLE_HOME/bin` 目录中（与其他所有 Oracle 实用程序一起，例如 `sqlplus` 和 `expdp`）。\n*   `Oracle\
  \ 服务器进程`：当你执行 `rman` 客户端并连接到目标数据库时，会启动两个 Oracle 服务器后台进程。第一个默认的服务器进程与 PL/SQL 包交互以协调备份活动。次要的轮询进程偶尔会更新\
  \ Oracle 数据字典结构。\n*   `通道`：用于处理正在备份（或还原）的文件与备份设备（磁盘或磁带）之间 I/O 的 Oracle 服务器进程。\n\
  *   `PL/SQL 包`：RMAN 使用两个内部 PL/SQL 包（由 `SYS` 拥有）来执行 B&R 任务：`DBMS_RCVMAN` 和 `DBMS_BACKUP_RESTORE`。`DBMS_RCVMAN`\
  \ 访问控制文件中的信息，并将其传递给 RMAN 服务器进程。`DBMS_BACKUP_RESTORE` 包执行 RMAN 的大部分工作。例如，该包创建系统调用，指导通道进程执行\
  \ B&R 操作。\n*   `内存缓冲区（PGA 或 SGA）`：RMAN 在从数据文件读取并将后续块复制到备份文件时，使用 PGA（有时也使用 SGA）中的一个内存区域作为缓冲区。\n\
  *   `辅助数据库`：RMAN 为克隆数据库、创建 Data Guard 备用数据库或执行 DBPITR 而将目标数据库数据文件还原到的数据库。\n*   `备份`：既可以是名词，也可以是动词。指存储已备份文件的物理文件（备份）；或者，指复制和归档（备份）文件的操作。备份可以由备份集和备份片段或映像副本组成。\n\
  *   `备份集`：当你运行 RMAN `BACKUP` 命令时，默认情况下会创建一个或多个备份集。备份集是一个逻辑 RMAN 构造，用于分组备份片段文件。你可以将备份集与备份片段的关系，视为类似于表空间与数据文件的关系：一个是逻辑构造，另一个是物理文件。\n\
  *   `备份片段文件`：RMAN 的二进制备份文件。每个逻辑备份集由一个或多个备份片段文件组成。这些是 RMAN 在磁盘或磁带上创建的物理文件。它们是二进制、专有格式的文件，只有\
  \ RMAN 能够读取或写入。一个备份片段可以包含来自许多不同数据文件的块。备份片段文件通常比数据文件小，因为备份片段只包含数据文件中已使用的块。\n*   `映像副本`：使用\
  \ `BACKUP AS COPY` 命令启动。一种备份类型，其中 RMAN 创建数据文件、归档重做日志文件或控制文件的完全相同的副本。映像副本可以由操作系统实用程序（如\
  \ Linux 的 `cp` 和 `mv` 命令）操作。映像副本用作增量更新映像备份的一部分。有时，如果你需要能够快速恢复，使用映像副本比使用备份集更可取。\n\
  *   `恢复目录`：一个可选的数据库模式，包含用于存储有关 RMAN 备份操作的元数据信息的表。Oracle 强烈建议使用恢复目录，因为它为 B&R 提供了更多选项。\n\
  *   `介质管理器`：允许 RMAN 直接将文件备份到磁带的第三方软件。当你没有足够空间直接备份到磁盘，或者灾难恢复要求必须备份到可以轻松运送到异地的存储时，备份到磁带是理想的。\n\
  *   `FRA`：RMAN 可用于备份的可选磁盘区域。你还可以使用 FRA 来多路复用控制文件和联机重做日志。你通过数据库初始化参数 `DB_RECOVERY_FILE_DEST_SIZE`\
  \ 和 `DB_RECOVERY_FILE_DEST` 来实例化一个快速恢复区。\n*   `快照控制文件`：当备份控制文件或与恢复目录（如果正在使用）同步时，RMAN\
  \ 需要控制文件的一致性视图。在这些情况下，RMAN 首先创建控制文件的临时副本（快照）。这使得 RMAN 能够使用一个保证在备份控制文件或与恢复目录同步期间不会更改的控制文件版本。\n\
  \n\n\n# RMAN 备份类型\n\n您可以使用 RMAN 创建多种类型的备份：\n\n*   **完整备份：**备份与数据文件关联的所有已修改块。完整备份并非整个数据库的备份。例如，您可以对单个数据文件进行完整备份。\n\
  *   **增量级别 0 备份：**备份与完整备份相同的块。级别 0 备份与完整备份的唯一区别在于，级别 0 备份可与其他增量备份结合使用，而完整备份则不能。\n\
  *   **增量级别 1 备份：**仅备份自上次备份以来已修改的块。级别 1 增量备份可以是差异备份或累积备份。差异级别 1 备份是默认类型，备份自上次级别 0\
  \ 或级别 1 备份以来所有已修改的块。累积级别 1 备份则备份自上次级别 0 备份以来所有已更改的块。\n*   **增量更新备份：**首先创建数据文件的映像副本，随后的增量备份会与该映像副本合并。这是一种利用映像副本进行备份的高效方式。使用增量更新备份进行介质恢复速度很快，因为在还原过程中直接使用数据文件的映像副本。\n\
  *   **块变化跟踪：**数据库功能，用于跟踪数据库中已更改的块。更改块的记录保存在一个二进制文件中。RMAN 可以利用该二进制文件的内容来提高增量备份的性能：无需扫描数据文件中所有已修改的块，RMAN\
  \ 可以通过二进制块变化跟踪来快速确定哪些块已发生变化。\n\n现在您已经了解了 RMAN 的架构组件和可以创建的备份类型，可以准备启动 RMAN 并为其配置环境。\n\
  \n# 启动 RMAN\n\n在启动 RMAN 并连接到您的数据库之前，您需要确保已设置正确的操作系统变量，并且拥有具备`sys*`权限的账户访问权限。一旦这些条件就绪，您就可以通过`rman`命令行实用程序启动\
  \ RMAN 并连接到目标数据库。连接到数据库所需的这些相同条件，如前面第 1 章所述。如果您不熟悉这些条件，现在可能需要回顾一下第 1 章。\n\n您可以通过操作系统命令行界面或企业管理器（EM）连接到\
  \ RMAN。使用 EM 进行备份和恢复超出了本书的范围。本书的示例侧重于命令行界面。\n\n![Image](img/sq.jpg) 即使您使用基于屏幕的企业管理器工具，了解用于备份和恢复操作的\
  \ RMAN 命令也很有用。这种知识是无论使用何种界面使用 RMAN 的基础。在调试和排除问题时，这种认识尤其有价值。\n\n以下示例假设您已使用分配到特权组（如`dba`）的`oracle`操作系统账户登录到\
  \ Linux/Unix 服务器，并建立了所需的 OS 变量。然后您可以按如下方式调用 RMAN 并连接到目标数据库：\n\n```\n$ rman target\
  \ /\n```\n\n输出片段如下：\n\n```\nconnected to target database: O12C (DBID=3458744089)\n\
  ```\n\n如果您使用的是密码文件，则需要指定已被授予适当系统权限的用户名和密码：\n\n```\n$ rman target <user>/<password>\n\
  ```\n\n如果您通过 Oracle Net 远程访问目标数据库，则需要在目标服务器上有一个密码文件，并且还需要指定连接字符串，如下所示：\n\n```\n\
  $ rman target <user with sys* priv>/<password>@<database connection string>\n```\n\
  \n您也可以先调用 RMAN，然后从 RMAN 提示符连接到目标数据库，作为第二步操作：\n\n```\n$ rman\nRMAN> connect target\
  \ /\n```\n\n\n\n要退出 RMAN，请输入如下 `exit` 命令：\n\n```\nRMAN> exit\n```\n\n![Image](img/sq.jpg)\
  \ **提示** 在 Linux 系统上，当从操作系统提示符下键入 `rman` 命令时，如果出现类似 “rman: can’t open target” 的错误，请确保您的\
  \ `PATH` 变量在 `/usr/X11R6/bin` 目录之前包含了 `ORACLE_HOME/bin` 目录。\n\n## 不要从 SQL*PLUS 中调用\
  \ RMAN\n\n我在当地一所高等教育学院教授 Oracle B&R 课程。几乎每个学期，都会有一个学生问为什么下面的 RMAN 命令不起作用：\n\n```\n\
  SQL> rman\nSP2-0042: unknown command \"rman\" - rest of line ignored.\n```\n\n答案很简单：`rman`\
  \ 客户端是一个操作系统实用程序，而不是 SQL*Plus 的功能。您必须从操作系统提示符调用 `rman` 客户端。\n\n请注意，连接到 RMAN 时，您不必像通过\
  \ SQL*Plus 以 `SYSDBA` 特权用户连接时那样指定 `sys*` 子句。这是因为 RMAN 总是要求您以具有 `sys*` 权限的用户身份连接。因此，您必须使用操作系统验证的用户或具有\
  \ `sys*` 权限的用户名/密码（因此存在于口令文件中）连接到 RMAN。这与 SQL*Plus 不同，在 SQL*Plus 中您可以选择以非特权用户身份连接。在\
  \ SQL*Plus 中，如果您想以具有 `sys*` 权限的用户身份连接，则必须在连接时指定 `sys*` 子句。\n\n如果您尝试以不适当的权限连接到 RMAN，您会收到以下错误：\n\
  \n```\nORA-01031: insufficient privileges\n```\n\n诊断 `ORA-01031` 错误根本原因的一个有用方法是，尝试使用与尝试通过\
  \ RMAN 连接时相同的验证信息登录到 SQL*Plus。这将有助于验证您是使用操作系统验证的账户，还是用户名和密码正确。如果操作系统验证有效，您应该能够像这样登录到\
  \ SQL*Plus：\n\n```\n$ sqlplus / as sysdba\n```\n\n如果您正在使用口令文件，可以通过如下登录来验证用户名和密码是否正确（并且该用户具有\
  \ `sysdba` 权限）：\n\n```\n$ sqlplus <username>/<password> as sysdba\n```\n\n如果您在尝试登录\
  \ SQL*Plus 时收到 `ORA-01031` 错误，那么要么您没有使用操作系统验证的账户，要么您的用户名和密码组合与存储在口令文件中的不匹配（对于尝试以\
  \ `sys*` 权限连接的用户）。\n\n一旦连接到 RMAN，您就可以发出管理命令，如 `startup`、`shutdown`、`backup`、`restore`\
  \ 和 `recover`。例如，如果您想要启动和停止数据库，可以在 RMAN 中这样做：\n\n```\n$ rman target /\nRMAN> startup;\n\
  RMAN> shutdown immediate;\n```\n\n这省去了您在发出管理命令时必须在 SQL*Plus 和 RMAN 之间来回切换的麻烦。\n\n\
  ## 从 RMAN 中运行 SQL 命令\n\n从 Oracle 12c 开始，您可以直接从 RMAN 命令行运行许多 SQL 命令。在 Oracle 的早期版本中，当在\
  \ RMAN 中运行某些 SQL 命令时，您必须指定 `sql` 子句。例如，假设您想运行 `alter system switch logfile` 命令。在\
  \ Oracle 12c 之前，您必须按如下方式指定该命令：\n\n```\nRMAN> sql 'alter system switch logfile';\n\
  ```\n\n在 Oracle 12c 中，您可以直接运行 SQL：\n\n```\nRMAN> alter system switch logfile;\n\
  ```\n\n这是一个很好的易用性增强，因为它消除了对额外子句和命令周围引号的需要。\n\n## RMAN 架构决策\n\n如果为您的数据库启用了归档（有关归档的详细信息，请参见\
  \ 第 2 章），您可以开箱即用地使用 RMAN 来运行以下命令备份整个目标数据库：\n\n```\n$ rman target /\nRMAN> backup\
  \ database;\n```\n\n如果遇到介质故障，您可以恢复所有数据文件，如下所示：\n\n```\nRMAN> shutdown immediate;\n\
  RMAN> startup mount;\nRMAN> restore database;\n```\n\n数据库恢复后，您可以完全恢复它：\n\n```\n\
  RMAN> recover database;\nRMAN> alter database open;\n```\n\n这样就大功告成了，对吗？不，还不完全是。RMAN\
  \ 的默认属性对于简单的备份需求设置得相当合理。RMAN 的开箱即用设置可能适用于小型开发或测试数据库。但是，对于任何类型的业务关键型数据库，您都需要仔细考虑备份存储的位置、在磁盘或磁带上存储备份的时间长短、哪些\
  \ RMAN 功能适用于该数据库等等。本章接下来的几节将指导您完成在生产环境中实施 RMAN 所需的许多 B&R 架构决策。RMAN 有丰富多样的选项可用于定制\
  \ B&R；通常，您不需要实施 RMAN 的许多功能。但是，每次实施 RMAN 来备份生产数据库时，您都应该仔细考虑每个决策点，并决定是否需要某个属性。\n\n\
  表 4-1 总结了 RMAN 的实施决策和建议。表中的每个决策点将在后续章节中详细阐述。许多 DBA 对其中一些建议会有不同的看法；这没关系。关键在于您需要考虑每个架构方面，并确定什么符合您的业务需求。\n\
  \n表 4-1. 架构决策与建议概述\n\n\n\n# RMAN 备份关键决策点建议\n\n## 决策与推荐配置\n\n| 决策点 | 建议 |\n| ---\
  \ | --- |\n| 1. 远程还是本地运行 `RMAN` 客户端 | 在目标数据库服务器上本地运行客户端。 |\n| 2. 指定备份用户 | 除非有特定安全要求，否则使用\
  \ `SYS` 用户。 |\n| 3. 使用联机备份还是脱机备份 | 取决于您的业务需求。大多数生产数据库需要联机备份，这意味着您必须启用归档。 |\n| 4.\
  \ 设置归档重做日志目标位置和文件格式 | 如果使用快速恢复区，归档日志将以默认格式写入其中。我更倾向于使用 `LOG_ARCHIVE_DEST_N` 初始化参数来明确设置快速恢复区之外的位置。\
  \ |\n| 5. 配置 `RMAN` 备份位置和文件格式 | 取决于您的业务需求。有些环境需要磁带备份。如果使用磁盘，将备份放在快速恢复区中，或者通过通道设置指定位置。我更倾向于不使用快速恢复区，而是通过\
  \ `CONFIGURE` 命令显式指定位置和文件格式。 |\n| 6. 设置控制文件的自动备份 | 始终启用控制文件的自动备份。 |\n| 7. 指定控制文件自动备份的位置\
  \ | 将其放在快速恢复区中，或配置一个特定位置。我倾向于将控制文件的自动备份写入与数据库备份相同的位置。 |\n| 8. 备份归档重做日志 | 取决于您的业务需求。对于许多环境，我会每天备份归档重做日志，使用与备份数据库相同的命令。\
  \ |\n| 9. 确定快照控制文件的位置 | 使用默认位置。 |\n| 10. 使用恢复目录 | 取决于您的业务需求。对于许多环境，我不使用恢复目录。Oracle\
  \ 建议使用恢复目录。如果 `RMAN` 保留策略大于 `CONTROL_FILE_RECORD_KEEP_TIME`，则建议使用恢复目录。 |\n| 11.\
  \ 使用介质管理器 | 这是直接备份到磁带所必需的。 |\n| 12. 设置 `CONTROL_FILE_RECORD_KEEP_TIME` 初始化参数 | 通常，默认的\
  \ 7 天就足够了。 |\n| 13. 配置 `RMAN` 的备份保留策略 | 取决于您的数据库和业务需求。对于许多环境，我使用 1 或 2 的备份保留冗余度。\
  \ |\n| 14. 配置归档重做日志的删除策略 | 取决于您的数据库和业务需求。在许多场景中，将备份保留策略应用于归档重做日志就足够了（这是默认行为）。 |\n\
  | 15. 设置并行度 | 取决于可用的硬件资源和业务需求。对于大多数具有多个 `CPU` 的生产服务器，我配置并行度为 2 或更高。 |\n| 16. 使用备份集还是映像副本\
  \ | 我更喜欢备份集。备份集通常比映像副本更小且更易于管理。 |\n| 17. 使用增量备份 | 当备份之间数据库变化百分比很小且希望节省磁盘空间时，对大型数据库使用增量备份。我经常在数据仓库类型的数据库中使用增量备份。\
  \ |\n| 18. 使用增量更新备份 | 如果需要数据文件的映像副本，请使用此方法。 |\n| 19. 使用块更改跟踪 | 使用此功能来提高增量备份的性能。对于大型数据仓库类型的数据库，块更改跟踪可以显著节省备份时间。\
  \ |\n| 20. 配置二进制压缩 | 取决于您的业务需求。压缩备份占用空间更少，但备份和恢复操作需要更多的 `CPU` 资源（和时间）。 |\n| 21.\
  \ 配置加密 | 取决于您的业务需求。 |\n| 22. 配置其他设置 | 您可以设置许多通道相关属性，例如备份集大小和备份片大小。根据需要进行配置。 |\n\
  | 23. 配置信息输出 | 配置操作系统变量 `NLS_DATE_FORMAT` 以显示日期和时间。使用 `SET ECHO ON` 和 `SHOW ALL`\
  \ 来显示 `RMAN` 命令和设置。 |\n\n\n\n# 1. 远程或本地运行 RMAN 客户端\n\n可以从远程服务器运行 `rman` 实用程序，并通过\
  \ Oracle Net 连接到目标数据库：\n\n```bash\n$ rman target sys/foo@remote_db\n```\n\n这使您可以从一个中央位置在不同的远程服务器上运行\
  \ RMAN 备份。当您远程运行 RMAN 时，备份文件总是在目标数据库服务器上创建。\n\n只要可能，我更倾向于在目标服务器上本地运行 `rman` 客户端并进行连接，如下所示：\n\
  \n```bash\n$ rman target /\n```\n\n这种方法简单且能满足大多数需求。您无需担心网络问题或密码文件，并且 `rman` 客户端与目标数据库之间永远不会存在兼容性问题。如果您远程运行\
  \ RMAN，则需要确保远程的 `rman` 可执行文件与目标数据库兼容。例如，您可能需要确认您运行的远程 `rman` 可执行文件是 Oracle 12c 版本的\
  \ RMAN 客户端，并需要确定是否可以将该客户端连接到远程的 Oracle 9i 目标数据库。如果您在目标服务器上本地运行 `rman` 客户端，则永远不会出现兼容性问题，因为\
  \ `rman` 客户端始终与目标数据库版本相同。\n\n#### 2. 指定备份用户\n\n如前所述，RMAN 要求您使用具有 `SYSDBA` 权限的数据库用户。无论我是从命令行运行\
  \ RMAN 还是在脚本中调用 RMAN，在大多数场景下，我都直接以 `SYS` 身份连接到目标数据库。例如，以下是我如何从命令行连接到 RMAN：\n\n```bash\n\
  $ rman target /\n```\n\n有些 DBA 不使用这种方法；他们选择建立一个独立于 `SYS` 的用户，并以安全问题作为这样做的理由。\n\n\
  我更喜欢直接使用 `SYS` 帐户，因为当在服务器上本地连接到 RMAN 时，无需指定用户名和密码。这意味着您永远不必在任何备份脚本中硬编码用户名和密码，也不必在命令行上指定可能被恶意开发人员或旁观的管理员看到的用户名和密码。\n\
  \n#### 3. 使用联机或脱机备份\n\n大多数生产数据库都有 7x24 小时的可用性要求。因此，您唯一的选择是联机 RMAN 备份。要进行联机备份，您的数据库必须处于归档日志模式。您需要仔细考虑归档重做日志的存放位置、格式、备份频率以及删除前的保留时间。这些主题将在后续章节中讨论。\n\
  \n![Image](img/sq.jpg) **注意** 如果您进行脱机备份，必须使用 `IMMEDIATE`、`NORMAL` 或 `TRANSACTIONAL`\
  \ 选项关闭数据库，然后将其置于加载（mount）模式。RMAN 需要数据库处于加载模式，以便它可以读写控制文件。\n\n# 4. 设置归档重做日志目标位置和文件格式\n\
  \n启用归档重做日志模式是进行联机备份的先决条件（有关归档重做日志目标位置和格式的架构决策以及如何启用/禁用归档日志模式的完整讨论，请参见第 2 章）。\n\n\
  启用归档日志模式后，Oracle 会将归档重做日志写入以下一个或多个位置（您可以配置将归档重做日志写入 FRA 以及通过初始化参数手动设置的其他几个位置）：\n\
  \n*   默认位置\n*   FRA\n*   通过 `LOG_ARCHIVE_DEST_N` 初始化参数指定的位置\n\n如果您不使用 FRA，并且也没有通过\
  \ `LOG_ARCHIVE_DEST_N` 初始化参数显式设置归档重做日志目标位置，那么默认情况下，归档重做日志将写入一个依赖于操作系统的位罝。在许多 Linux/Unix\
  \ 系统上，默认位置是 `ORACLE_HOME/dbs` 目录。归档重做日志的默认文件名格式为 `%t_%s_%r.dbf`。\n\n如果您启用了 FRA（并且没有设置\
  \ `LOG_ARCHIVE_DEST_N`），那么默认情况下，归档重做日志将写入 FRA 中的一个目录。在 FRA 中创建的归档重做日志文件的默认文件名格式是\
  \ OMF 格式。文件存储在与数据库唯一名相同的子目录中；例如：\n\n```text\n/<fra>/<dbuname>/archivelog/<YYYY_MM_DD>/o1_mf_1_1078_68dx5dyj_.arc\n\
  ```\n\nOracle 建议使用 FRA。我倾向于不使用 FRA，因为当 FRA 空间已满且旧文件清除不够及时导致数据库挂起时，我不喜欢被这种意外情况困扰。相反，我使用\
  \ `LOG_ARCHIVE_DEST_N` 参数来设置归档重做日志文件的位置。以下是一个示例：\n\n```sql\nlog_archive_dest_1='LOCATION=/oraarch1/CHNPRD'\n\
  ```\n\n我也倾向于对归档日志文件名使用以下格式：\n\n```sql\nlog_archive_format='%t_%s_%r.arc'\n```\n\n\
  ![Image](img/sq.jpg) **提示** 有时，DBA 对数据文件和归档重做日志文件都使用 `.dbf` 作为扩展名。我倾向于对归档重做日志文件使用\
  \ `.arc`。`.arc` 扩展名可以避免将文件识别为归档重做日志文件还是活动数据库数据文件时可能引起的混淆。\n\n# 5. 配置 RMAN 备份位置和文件格式\n\
  \n当您为基于磁盘的备份运行 `BACKUP` 命令时，RMAN 会在以下位置之一创建备份片：\n\n*   默认位置\n*   FRA\n*   通过 `BACKUP...FORMAT`\
  \ 命令指定的位置\n*   通过 `CONFIGURE CHANNEL...FORMAT` 命令指定的位置\n\n在这些选项中，我倾向于最后一种；我更喜欢通过备份通道来指定目标位置。\n\
  \n## 默认位置\n\n如果您没有配置任何 RMAN 变量也没有设置 FRA，默认情况下，RMAN 会分配一个基于磁盘的通道，并将备份文件写入默认位置。例如，您可以运行以下命令而无需配置任何\
  \ RMAN 参数：\n\n```sql\nRMAN> backup database;\n```\n\n默认位置因操作系统而异。在许多 Linux/Unix\
  \ 环境中，默认位置是 `ORACLE_HOME/dbs`。创建的备份文件的默认名称格式是 OMF 格式；例如：\n\n```text\n<ORACLE_HOME>/dbs/01ln9g7e_1_1\n\
  ```\n\n![Image](img/sq.jpg) **提示** 默认位置对于小型开发数据库来说是可以的。然而，对于大多数其他环境（尤其是生产环境），您需要提前规划备份所需的磁盘空间，并通过其他方法之一（如实施\
  \ FRA 或 `CONFIGURE CHANNEL`）显式设置备份位置。\n\n## FRA\n\n备份到磁盘时，如果您没有明确指示 RMAN 将备份写入特定位置（通过\
  \ `FORMAT` 或 `CONFIGURE` 命令），并且您正在使用 FRA，RMAN 会自动将备份文件写入 FRA 中的目录。文件存储在与数据库唯一名相同的子目录中。此外，在\
  \ FRA 中创建的备份文件的默认名称格式是 OMF 格式；例如：\n\n```text\n/<fra>/<dbuname>/backupset/<YYYY_MM_DD>/o1_mf_nnndf_TAG20100907T025402_68czfbdf_.bkp\n\
  ```\n\n我通常不使用 FRA 来放置 RMAN 备份。在我工作的许多环境中，单个挂载点上没有足够的磁盘空间来容纳整个数据库的备份。在这种情况下，您需要分配两个或多个指向不同挂载点的通道。在这些环境中使用\
  \ FRA 有些笨拙。\n\n此外，出于性能原因，您可能希望指示 RMAN 写入多个磁盘位置。如果您能确保不同的挂载点基于不同的物理磁盘并由独立的控制器写入，那么通过分配指向不同挂载点的多个通道可以减少\
  \ I/O 争用。\n\n\n\n当您使用快速恢复区（FRA）时，RMAN 会在给定日期首次备份数据库时自动创建独立的目录。我倾向于将备份写入一个目录，而不是按日期分隔目录和备份。我发现，如果为每个服务器上的每个数据库使用一个标准目录，备份的管理、维护和故障排除会更容易。\n\
  \n## BACKUP...FORMAT\n\n如果您已配置了 FRA，但又不想让 RMAN 备份文件自动放入 FRA，您可以在执行 `BACKUP` 命令时直接指定备份的存放位置；例如：\n\
  \n```\nRMAN> backup database format '/u01/O12C/rman/rman_%U.bkp';\n```\n\n这是由 RMAN\
  \ 生成的对应文件：\n\n```\n/u01/O12C/rman/rman_0jnv0557_1_1.bkp\n```\n\n`%U` 指示 RMAN 为备份文件名动态构建一个唯一的字符串。在大多数情况下都需要唯一的名称，因为\
  \ RMAN 不会覆盖已存在的文件。这一点很重要，因为如果您指示 RMAN 并行写入，它需要为每个通道创建唯一的文件名；例如：\n\n```\nRMAN> configure\
  \ device type disk parallelism 2;\n```\n\n现在，当您运行 `BACKUP` 命令时，您会看到这条消息：\n\n```\n\
  RMAN> backup database format '/u01/O12C/rman/rman_%U.bkp';\n```\n\nRMAN 分配多个通道，并并行写入两个不同的备份文件。格式字符串中的\
  \ `%U` 确保了创建的文件名是唯一的。\n\n## CONFIGURE CHANNEL...FORMAT\n\n我通常不使用 `BACKUP...FORMAT`\
  \ 语法来指定 RMAN 备份的位置。我更喜欢使用 `CONFIGURE CHANNEL...FORMAT` 命令。这是因为我经常需要写入多个磁盘位置，并且需要灵活指定位于不同挂载点的目录。以下是一个指定\
  \ `CONFIGURE CHANNEL...FORMAT` 的典型配置：\n\n```\nRMAN> configure device type disk parallelism\
  \ 3;\nRMAN> configure channel 1 device type disk format '/u01/O12C/rman/rman1_%U.bk';\n\
  RMAN> configure channel 2 device type disk format '/u02/O12C/rman/rman2_%U.bk';\n\
  RMAN> configure channel 3 device type disk format '/u03/O12C/rman/rman3_%U.bk';\n\
  ```\n\n在这些代码行中，您应该将设备类型的并行度配置为与您分配的通道数相匹配。RMAN 仅分配由并行度指定的通道数；其他已配置的通道将被忽略。例如，如果您指定并行度为\
  \ 2，那么无论您通过 `CONFIGURE CHANNEL` 命令配置了多少通道，RMAN 都只分配两个通道。\n\n在此配置三个通道的示例中，假设发出了如下\
  \ `BACKUP` 命令：\n\n```\nRMAN> backup database;\n```\n\nRMAN 将分配三个通道，全部位于不同的挂载点（`/u01`,\
  \ `/u02`, `/u03`），并并行写入指定位置。RMAN 会在三个位置创建它认为必要的尽可能多的备份片来完成数据库备份。\n\n如果您需要取消配置某个通道，请按以下方式操作：\n\
  \n```\nRMAN> configure channel 3 device type disk clear;\n```\n\n![Image](img/sq.jpg)\
  \ `注意` 另外，请考虑如果您配置的并行度高于预配置通道数会发生什么。RMAN 将为每个并行度打开一个通道，如果打开的通道数大于预配置的通道数，对于未配置的通道，RMAN\
  \ 会将备份文件写入 FRA（如果已配置）或默认位置。\n\n## 设置控制文件的自动备份\n\n您应该始终配置 RMAN，使其在运行任何 RMAN `BACKUP`\
  \ 或 `COPY` 命令后，或者在您对数据库进行导致控制文件更新的物理更改（例如添加/删除数据文件）后自动备份控制文件。使用 `SHOW` 命令显示控制文件自动备份的当前设置：\n\
  \n```\nRMAN> show controlfile autobackup;\n```\n\n以下是一些示例输出：\n\n\n\n```\n针对 db_unique_name\
  \ 为 O12C 的数据库，其 RMAN 配置参数为：\nCONFIGURE CONTROLFILE AUTOBACKUP ON;\n```\n\n以下代码行展示了如何启用控制文件自动备份功能：\n\
  \n```\nRMAN> configure controlfile autobackup on;\n```\n\n控制文件的自动备份始终会存放在其独立的备份集中。当启用控制文件的自动备份时，如果你正在使用\
  \ `spfile`，它会与控制文件一起被自动备份。\n\n如果出于任何原因，你想要禁用控制文件的自动备份，可以按如下操作：\n\n```\nRMAN> configure\
  \ controlfile autobackup off;\n```\n\n> **注意**\n> 如果控制文件的自动备份处于关闭状态，那么每次你备份数据文件\
  \ 1（`SYSTEM` 表空间数据文件）时，RMAN 都会自动备份控制文件。\n\n#### 7. 指定控制文件自动备份的位置\n\n当你启用控制文件的自动备份时，RMAN\
  \ 会在以下位置之一创建控制文件的备份：\n\n*   默认位置\n*   FRA\n*   通过 `CONFIGURE CONTROLFILE AUTOBACKUP\
  \ FORMAT` 命令指定的位置\n\n如果你没有使用 FRA，或者你没有为控制文件自动备份指定位置，那么控制文件自动备份会被写入一个依赖于操作系统的默认位置。在\
  \ Linux/Unix 环境中，默认位置是 `ORACLE_HOME/dbs`；例如：\n\n```\n/u01/app/oracle/product/12.1.0.1/db_1/dbs/c-3423216220-20130109-01\n\
  ```\n\n如果你启用了 FRA，那么 RMAN 会自动将控制文件自动备份文件写入 FRA 中的目录，文件名使用 OMF 格式；例如：\n\n```\n/<fra>/<dbuname>/autobackup/<YYYY_MM_DD>/o1_mf_s_729103049_68fho9z2_.bkp\n\
  ```\n\n我通常不会为控制文件自动备份使用默认位置或 FRA。我更倾向于将这些备份放在与数据库备份相同的目录中。以下是一个示例：\n\n```\nRMAN>\
  \ configure controlfile autobackup format for device type disk to\n'/u01/ORA12C/rman/rman_ctl_%F.bk';\n\
  ```\n\n如果你想将自动备份格式重置回默认值，可以按如下方式操作：\n\n```\nRMAN> configure controlfile autobackup\
  \ format for device type disk clear;\n```\n\n#### 8. 备份归档重做日志\n\n你应该定期备份你的归档重做日志。在备份至少一次之前，归档日志文件不应该从磁盘中删除。我通常喜欢保留自上次成功的\
  \ RMAN 备份以来生成的所有归档重做日志。\n\n通常，我指示 RMAN 在备份数据文件的同时备份归档重做日志。这在大多数情况下是一个足够的策略。以下是在备份数据文件的同时备份归档重做日志的命令：\n\
  \n```\nRMAN> backup database plus archivelog;\n```\n\n有时，如果你的数据库生成大量重做日志，你可能需要以不同于数据文件备份的频率来备份你的归档重做日志。DBA\
  \ 可能一天备份两到三次归档重做日志；在日志备份之后，DBA 会删除它们以为更当前的归档日志文件腾出空间。\n\n在大多数情况下，你不需要最后一次成功备份之前生成的任何归档重做日志。例如，如果一个数据文件经历了介质故障，你需要从备份中恢复该数据文件，然后应用在该数据文件备份期间及之后生成的任何归档重做日志。\n\
  \n在某些情况下，你可能需要上次备份之前生成的归档重做日志。例如，你可能遇到介质故障，尝试从上次成功的备份恢复数据库，发现该备份已损坏，因此需要从更早的备份进行恢复。那时，你需要自那个更早备份制作以来生成的所有归档重做日志的副本。\n\
  \n#### 9. 确定快照控制文件的位置\n\nRMAN 在执行以下任务时需要一个读一致的控制文件视图：\n\n*   与恢复目录同步\n*   备份当前控制文件\n\
  \nRMAN 会创建当前控制文件的一个快照副本，在执行这些任务时使用它作为读一致的副本。这确保 RMAN 正在处理一个未被修改的控制文件副本。\n\n快照控制文件的默认位置取决于操作系统。在\
  \ Linux 平台上，默认位置/格式是 `ORACLE_HOME/dbs/snapcf_@.f`。请注意，默认位置不在 FRA 中（即使你已经实施了 FRA）。\n\
  \n你可以使用 `SHOW` 命令显示当前快照控制文件的详细信息：\n\n```\nRMAN> show snapshot controlfile name;\n\
  ```\n\n以下是一些示例输出：\n\n```\nCONFIGURE SNAPSHOT CONTROLFILE NAME TO\n '/ora01/app/oracle/product/12.1.0.1/db_1/dbs/snapcf_o12c.f';\
  \ # default\n```\n\n对于大多数情况，快照控制文件的默认位置和格式是足够的。这个文件不会占用太多空间，也没有密集的 I/O 要求。我建议你使用默认设置。\n\
  \n如果你有充分的理由需要将快照控制文件配置到非默认位置，可以按如下方式操作：\n\n```\nRMAN> configure snapshot controlfile\
  \ name to '/u01/O12C/rman/snapcf.ctl';\n```\n\n如果你不小心将快照控制文件位置配置到了一个不存在的目录，那么在运行\
  \ `BACKUP` 或 `COPY` 命令时，控制文件的自动备份将失败，并出现以下错误：\n\n```\nORA-01580: error creating\
  \ control backup file...\n```\n\n你可以将快照控制文件设置回默认值，如下所示：\n\n```\nRMAN> configure\
  \ snapshot controlfile name clear;\n```\n\n#### 10. 使用恢复目录\n\nRMAN 始终将其最新的备份操作存储在目标数据库控制文件中。你可以设置一个可选的恢复目录来存储有关\
  \ RMAN 备份的元数据。恢复目录是一个独立的模式（通常位于与目标数据库不同的数据库中），它包含存储 RMAN 备份信息的数据库对象（表、索引等）。恢复目录不存储\
  \ RMAN 备份片——只存储备份元数据。\n\n使用恢复目录的主要优势如下：\n\n*   为 RMAN 元数据提供了一个辅助存储库。如果你丢失了所有控制文件及其备份，你仍然可以从恢复目录中检索\
  \ RMAN 元数据。\n*   可以将 RMAN 元数据存储比仅使用控制文件作为存储库时更长的周期。\n*   提供对所有 RMAN 功能的访问。使用恢复目录时，某些恢复和修复功能会更简单。\n\
  \n使用恢复目录的缺点是，这是另一个你需要设置、维护和备份的数据库。此外，当你启动备份并尝试连接到恢复目录时，如果恢复目录因任何原因（服务器宕机、网络问题等）不可用，你必须决定是否在没有恢复目录的情况下继续备份。\n\
  \n在使用恢复目录时，你还必须注意版本兼容性问题。你需要确保存储恢复目录的数据库版本与目标数据库的版本兼容。当你升级目标数据库时，请确保恢复目录也已升级（如果需要）。\n\
  \n> **注意**\n> 有关如何实施恢复目录的详细信息，请参见第 5 章。\n\n无论是否使用恢复目录，RMAN 都能正常工作。对于我维护的几个数据库，我没有使用恢复目录；这样就免去了设置和维护它的麻烦。对我来说，简单性优先于恢复目录所提供的功能。\n\
  \n但是，如果你有充分的业务理由使用恢复目录，那么就实施并使用它。恢复目录的设置和维护并不那么困难，Oracle 建议你使用它。\n\n#### 11. 使用介质管理器\n\
  \n\n\n# RMAN 的媒体管理器\n\nRMAN 需要媒体管理器才能直接备份到磁带。多个供应商提供此功能（需付费）。媒体管理器用于大型数据库环境，例如数据仓库，这类环境中可能没有足够的空间将数据库备份到磁盘。您可能还有灾难恢复要求，需要直接备份到磁带。\n\
  \n如果您有此类要求，则应购买并实施媒体管理软件包。如果不需要直接备份到磁带，则无需实施媒体管理器。RMAN 直接备份到磁盘运行良好。\n\n请记住，许多机构使用\
  \ RMAN 直接备份到磁带，然后让系统管理员随后将 RMAN 备份复制到磁带。如果这样做，必须确保 RMAN 备份在磁带备份运行时未在进行（因为可能会导致部分文件备份到磁带）。\n\
  \n## 设置 `CONTROL_FILE_RECORD_KEEP_TIME` 初始化参数\n\n`CONTROL_FILE_RECORD_KEEP_TIME`\
  \ 初始化参数指定控制文件中可重用记录在被覆盖前保留的最少天数。RMAN 元数据存储在控制文件的可重用部分中，因此最终会被覆盖。\n\n如果您使用恢复目录，则无需担心此参数，因为\
  \ RMAN 元数据会无限期存储在恢复目录中。因此，使用恢复目录时，您可以访问任何历史 RMAN 元数据。\n\n如果您仅使用控制文件作为 RMAN 元数据存储库，则其中存储的信息最终将被覆盖。`CONTROL_FILE_RECORD_KEEP_TIME`\
  \ 的默认值为 7 天：\n\n```sql\nSQL> show parameter control_file_record_keep_time\n\nNAME\
  \                                 TYPE        VALUE\n------------------------------------\
  \ ----------- ---------\ncontrol_file_record_keep_time        integer     7\n```\n\
  \n您可以将该值设置为 0 到 365 天之间的任意值。将值设置为 0 意味着 RMAN 元数据信息可能随时被覆盖。\n\n`CONTROL_FILE_RECORD_KEEP_TIME`\
  \ 参数在早期版本的 Oracle 中更为关键，因为那时如果元数据被覆盖，重新填充控制文件中的 RMAN 信息并不容易。从 Oracle 10g 开始，您可以使用\
  \ `CATALOG` 命令快速使控制文件知晓 RMAN 备份文件。\n\n如果您执行每日备份，建议将此参数保留为 7 天。但是，如果您每月仅备份数据库一次，或者由于某种原因，您的保留策略大于\
  \ 7 天，并且您未使用恢复目录，则可能需要考虑增加该值。增加此参数的缺点是，如果您有大量 RMAN 备份活动，这可能会增加控制文件的大小。\n\n## 配置\
  \ RMAN 的备份保留策略\n\nRMAN 保留策略允许您指定希望保留备份的时长。RMAN 有两种互斥的方法来指定保留策略：\n\n*   恢复窗口\n* \
  \  备份数量（冗余度）\n\n### 恢复窗口\n\n使用恢复窗口，您可以指定过去的天数，以便能够恢复到该窗口内的任意时间点。例如，如果您指定保留策略窗口为\
  \ 5 天，则 RMAN 不会将恢复到该 5 天窗口内任意时间点所需的数据文件和归档重做日志备份标记为过时：\n\n```rman\nRMAN> configure\
  \ retention policy to recovery window of 5 days;\n```\n\n对于指定的恢复，RMAN 可能需要比 5 天窗口更早的备份，因为它可能需要一个更早的备份作为起点，才能恢复到指定的恢复点。例如，假设您上次完好的备份是\
  \ 6 天前制作的，而您现在想要恢复到 4 天前。对于此恢复窗口，RMAN 需要 6 天前的备份来还原并恢复到指定时间点。\n\n### 冗余度\n\n\n\n\
  你还可以指定 RMAN 保留最少数量的备份。例如，如果将 `redundancy`（冗余度）设置为 2，那么 RMAN 不会将数据文件和归档重做日志文件的最新两个备份标记为过时：\n\
  \n```\nRMAN> configure retention policy to redundancy 2;\n```\n\n我发现，基于冗余度的保留策略更易于使用，并且在备份保留时间方面更具可预测性。如果我将\
  \ `redundancy` 设置为 2，我知道 RMAN 不会将最新的两个备份标记为过时。相比之下，恢复窗口保留策略则依赖于备份的频率和窗口长度来确定备份是否过时。\n\
  \n### 基于保留策略删除备份\n\n你可以报告 RMAN 根据保留策略确定为过时的备份，如下所示：\n\n```\nRMAN> report obsolete;\n\
  ```\n\n要删除过时的备份，请运行 `DELETE OBSOLETE` 命令：\n\n```\nRMAN> delete obsolete;\n```\n\n\
  系统会提示你：\n\n```\nDo you really want to delete the above objects (enter YES or NO)?\n\
  ```\n\n如果你在编写脚本来执行此过程，可以指定删除操作不提示输入：\n\n```\nRMAN> delete noprompt obsolete;\n```\n\
  \n我通常将 `DELETE NOPROMPT OBSOLETE` 命令编码到备份数据库的 shell 脚本中。这会指示 RMAN 删除保留策略指定的任何过时备份和过时归档重做日志（有关如何使用\
  \ shell 脚本自动删除过时备份的示例，请参阅本章后面的“从决策到行动的过渡”部分）。\n\n### 清除保留策略\n\n默认的保留策略是冗余度为 1。你可以通过\
  \ `TO NONE` 命令完全禁用 RMAN 保留策略。\n\n```\nRMAN> configure retention policy to none;\n\
  ```\n\n当策略设置为 `NONE` 时，不会有任何备份被视为过时，因此无法通过 `DELETE OBSOLETE` 命令删除。这通常不是你想要的行为。你希望让\
  \ RMAN 根据基于窗口或备份数量的保留策略删除备份。\n\n要将保留策略设置回默认值，请使用 `CLEAR` 命令：\n\n```\nRMAN> configure\
  \ retention policy clear;\n```\n\n#### 14. 配置归档重做日志的删除策略\n\n在大多数情况下，我让 RMAN 根据数据库备份的保留策略删除归档重做日志。这是默认行为。你可以使用\
  \ `SHOW` 命令查看数据库保留策略：\n\n```\nRMAN> show retention policy;\nCONFIGURE RETENTION\
  \ POLICY TO REDUNDANCY 1; # default\n```\n\n要根据数据库保留策略删除归档重做日志（和备份片），请运行以下命令：\n\n\
  ```\nRMAN> delete obsolete;\n```\n\n从 Oracle 11g 开始，你可以指定一个独立于数据库备份的归档重做日志删除策略。此删除策略适用于\
  \ FRA（快速恢复区）之外和之内的归档重做日志。\n\n**注意** 在 Oracle 11g 之前，归档删除策略仅适用于与备用数据库关联的归档重做日志。\n\
  \n要配置归档重做日志删除策略，请使用 `CONFIGURE ARCHIVELOG DELETION` 命令。以下命令配置归档重做删除策略，使得归档重做日志在备份到磁盘两次之前不会被删除：\n\
  \n```\nRMAN> configure archivelog deletion policy to backed up 2 times to device\
  \ type disk;\n```\n\n要让 RMAN 删除由 `archivelog deletion policy` 定义的过时归档重做日志，请发出以下命令：\n\
  \n```\nRMAN> delete archivelog all;\n```\n\n**提示** 在运行 `DELETE` 命令之前，先运行 `CROSSCHECK`\
  \ 命令。这样做可以确保 RMAN 知晓文件是否在磁盘上。\n\n要查看是否为归档重做日志文件专门设置了保留策略，请使用此命令：\n\n```\nRMAN> show\
  \ archivelog deletion policy;\n```\n\n要清除归档删除策略，请执行以下操作：\n\n```\nRMAN> configure\
  \ archivelog deletion policy clear;\n```\n\n#### 15. 设置并行度\n\n如果你的数据库服务器配备了支持多通道的硬件，你可以显著提高\
  \ RMAN 备份和恢复操作的性能。如果你的服务器有多个 CPU 和多个存储设备（磁盘或磁带设备），那么可以通过启用多个备份通道来提高性能。\n\n如果你需要从备份和恢复操作中获得更好的性能，并且拥有支持并行操作的硬件，则应启用并行度并进行测试以确定最佳程度。如果你的硬件能够利用并行\
  \ RMAN 通道，那么启用并行度几乎没有缺点。\n\n如果你有多个 CPU，但只有一个存储设备位置，你可以启用多个通道向一个位置写入和读取。例如，如果你要备份到\
  \ FRA，仍然可以通过启用并行度来利用多通道。假设服务器上有四个 CPU 并希望启用相应的并行度：\n\n```\nRMAN> configure device\
  \ type disk parallelism 4;\n```\n\n你也可以通过配置与不同挂载点关联的多个通道来并行写入单独的位置；例如，\n\n```\n\
  RMAN> configure device type disk parallelism 4;\nRMAN> configure channel 1 device\
  \ type disk format '/u01/O12C/rman/rman1_%U.bk';\nRMAN> configure channel 2 device\
  \ type disk format '/u02/O12C/rman/rman2_%U.bk';\nRMAN> configure channel 3 device\
  \ type disk format '/u03/O12C/rman/rman3_%U.bk';\nRMAN> configure channel 4 device\
  \ type disk format '/u04/O12C/rman/rman4_%U.bk';\n```\n\n此代码配置了四个通道，分别写入磁盘上的不同位置。当你为不同位置配置单独的通道时，请确保启用的并行度与配置的设备通道数匹配。如果你分配的通道数超过指定的并行度，RMAN\
  \ 只会写入并行度指定的通道数，并忽略其他通道。\n\n如果需要清除并行度，可以按如下方式操作：\n\n```\nRMAN> configure device\
  \ type disk clear;\n```\n\n同样，要清除通道设备类型，请使用 `CLEAR` 命令。此示例清除通道 4：\n\n```\nRMAN>\
  \ configure channel 4 device type disk clear;\n```\n\n#### 16. 使用备份集或映像副本\n\n当你发出\
  \ RMAN `BACKUP` 命令时，可以指定备份为以下类型之一：\n\n*   备份集\n*   映像副本\n\n备份集是 RMAN 备份的默认类型。备份集包含备份片，这些是只有\
  \ RMAN 才能写入或读取的二进制文件。备份集是可取的，因为它们通常比被备份的数据文件要小。如果你使用的是 Oracle 10g Release 2 或更高版本，RMAN\
  \ 会自动尝试创建使用未使用块压缩的备份片。在此模式下，RMAN 读取位图以确定哪些块已分配，并且仅从数据文件中读取这些块。此功能仅适用于基于磁盘的备份集和 Oracle\
  \ Secure Backup 磁带备份。\n\n如果你使用的数据库版本早于 Oracle 10g Release 2，默认情况下，使用空块压缩（有时更恰当地称为块跳过）创建备份集。在此模式下，RMAN\
  \ 检查数据文件中的块；如果块未被使用，则不会备份。\n\n**注意** RMAN 也可以使用真正的二进制压缩创建备份集。这是你从操作系统压缩实用程序（如 `zip`）获得的那种压缩。Oracle\
  \ 支持多个级别的二进制压缩。`BASIC` 压缩算法无需额外许可即可使用。Oracle 通过 Oracle Advanced Compression 选项提供了进一步的压缩功能（有关如何启用二进制压缩的详细信息，请参阅本章后面的“配置二进制压缩”部分）。\n\
  \n\n\n当你创建备份集时，二进制备份片文件只能由 RMAN 进程操作。一些数据库管理员认为这是一个缺点，因为他们必须使用 RMAN 来备份和恢复这些文件（你无法直接访问或控制备份片）。但是，这些看法是没有根据的。除非你遇到了罕见的缺陷，否则\
  \ RMAN 是可靠的，并且在所有备份和恢复场景中都能稳定工作。\n\n将备份集与映像副本进行对比。映像副本创建每个数据文件的逐字节相同副本。创建映像副本的优点是，（如果需要）你可以不使用\
  \ RMAN 来操作映像副本（就像使用操作系统复制工具一样）。此外，在发生介质故障时，映像副本是恢复数据文件的快速方法，因为 RMAN 只需将文件从备份位置复制回来（无需重建数据文件，因为它是一个精确的副本）。\n\
  \n我几乎总是使用备份集进行数据库备份，而不是映像副本。通常，我需要某种形式的 RMAN 压缩（块跳过）。备份到磁盘的大小几乎总是需要关注的问题。备份集在磁盘空间消耗方面更高效。因为备份集可以利用\
  \ RMAN 压缩，与映像副本相比，涉及的 I/O 也更少。在许多环境中，减少 I/O 以避免影响其他应用程序是一个需要考虑的问题。\n\n但是，如果你觉得需要直接控制\
  \ RMAN 创建的备份文件，或者你处于恢复过程速度至关重要的环境中，请考虑使用映像副本。\n\n#### 17. 使用增量备份\n\n对于我负责的大多数数据库，我每天运行一次\
  \ 0 级备份。我通常不实施任何类型的增量备份策略。\n\n增量备份策略适用于大型数据库，这些数据库中只有一小部分数据块在备份之间发生变化。如果你处于数据仓库环境中，你可能需要考虑增量备份策略，因为它可以大大减少备份的大小。例如，你可能希望每周运行一次\
  \ 0 级备份，然后每天运行一次 1 级增量备份。\n\n![Image](img/sq.jpg) `Note` 有关如何使用增量备份备份数据库的详细信息，请参阅第\
  \ 5 章。\n\n## 18. 使用增量更新备份\n\n增量更新备份是实现映像副本备份策略的一种高效方法。该技术指示 RMAN 首先创建数据文件的映像副本；然后，下次运行备份时，RMAN\
  \ 不是创建一组新的映像副本，而是进行增量备份（自创建映像副本以来发生变化的数据块），并将该增量备份应用到映像副本上。\n\n如果你有可用的磁盘空间来存放数据库的完整映像副本，并且希望在发生介质故障时能够直接使用映像副本的灵活性，请考虑这种备份策略。\n\
  \n这种方法的一个潜在缺点是，如果你需要恢复并恢复到过去的某个时间点，你只能恢复并恢复到映像副本最后一次用增量备份更新的那个时间点。\n\n![Image](img/sq.jpg)\
  \ `Note` 有关如何使用增量更新备份备份数据库的详细信息，请参阅第 5 章。\n\n#### 19. 使用块变化跟踪\n\n此功能跟踪数据库块发生变化的时间。其思路是，如果你正在使用增量备份策略，你可以提升性能，因为通过实施此功能，RMAN\
  \ 不必扫描数据文件中的每个块（在高水位线下）来确定是否需要备份。相反，RMAN 只需访问块变化跟踪文件，找出自上次备份以来哪些块发生了变化，并直接访问这些块。如果你在大型数据仓库环境中工作并使用增量备份策略，请考虑启用块变化跟踪以提升性能。\n\
  \n![Image](img/sq.jpg) `Note` 有关如何实施块变化跟踪的详细信息，请参阅第 5 章。\n\n#### 20. 配置二进制压缩\n\n\
  你可以配置 RMAN 在生成备份集时使用真正的二进制压缩。你可以通过以下两种方式之一启用压缩：\n\n*   在 `BACKUP` 命令中指定 `AS COMPRESSED\
  \ BACKUPSET`。\n*   使用一次性的 `CONFIGURE` 命令。\n\n以下是在发出 `BACKUP` 命令时使用压缩进行备份的示例：\n\n\
  ```\nRMAN> backup as compressed backupset database;\n```\n\n在此示例中，为磁盘设备配置了压缩：\n\n\
  ```\nRMAN> configure device type disk backup type to compressed backupset;\n```\n\
  \n如果需要清除设备类型的压缩配置，请发出此命令：\n\n```\nRMAN> configure device type disk clear;\n```\n\
  \n我发现默认的压缩算法非常高效。对于典型的数据库，备份大小通常比常规备份小大约四到五倍。当然，你的压缩结果可能会因数据而异。\n\n为什么不压缩所有备份？压缩备份消耗更多的\
  \ CPU 资源，并且创建和恢复所需的时间更长，但它们导致的 I/O 更少，并且分散在更长的时间段内。如果你有多个 CPU，并且备份速度不是问题，那么你应该考虑压缩备份。\n\
  \n你可以使用 `SHOW` 命令查看启用的压缩类型：\n\n```\nRMAN> show compression algorithm;\n```\n\n这是一些示例输出：\n\
  \n```\nCONFIGURE COMPRESSION ALGORITHM 'BASIC' AS OF RELEASE 'DEFAULT'\nOPTIMIZE\
  \ FOR LOAD TRUE ; # default\n```\n\n基本压缩算法不需要 Oracle 的额外许可。如果你使用的是 Oracle 11g Release\
  \ 2 或更高版本，并且你拥有 Advanced Compression 选项的许可证，那么你还可以使用三个额外可配置的二进制压缩级别；例如，\n\n```\n\
  RMAN> configure compression algorithm 'HIGH';\nRMAN> configure compression algorithm\
  \ 'MEDIUM';\nRMAN> configure compression algorithm 'LOW';\n```\n\n根据我的经验，这些先前的压缩算法在压缩比和创建备份所需时间方面都非常高效。\n\
  \n你可以查询 `V$RMAN_COMPRESSION_ALGORITHM` 来查看适用于你的数据库版本的压缩算法的详细信息。要将当前压缩算法重置为默认的 `BASIC`，请使用\
  \ `CLEAR` 命令：\n\n```\nRMAN> configure compression algorithm clear;\n```\n\n####\
  \ 21. 配置加密\n\n你可能需要对备份进行加密。一些机构特别要求对包含敏感数据且存储在异地的备份进行加密。要在备份时使用加密，你必须使用 Oracle 企业版，拥有\
  \ Advanced Security 选项的许可证，并且使用 Oracle 10g Release 2 或更高版本。\n\n如果你已经配置了安全钱包（有关详细信息，请参阅可以从\
  \ Oracle 网站 (`http://otn.oracle.com`) 的 Technology Network 区域免费下载的《Oracle Advanced\
  \ Security 管理员指南》），你可以为备份配置透明加密，如下所示：\n\n```\nRMAN> configure encryption for database\
  \ on;\n```\n\n\n\n你现在所做的任何备份都将被加密。如果需要从备份中恢复，它将自动解密（假设加密备份时使用的安全钱包仍然存在）。要禁用加密，请使用\
  \ `CONFIGURE` 命令：\n\n```\nRMAN> configure encryption for database off;\n```\n\n\
  你也可以使用 `CLEAR` 来清除加密设置：\n\n```\nRMAN> configure encryption for database clear;\n\
  ```\n\n你可以查询 `V$RMAN_ENCRYPTION_ALGORITHMS` 以查看当前数据库版本可用的加密算法详细信息。\n\n### 在 RMAN\
  \ 内部运行 SQL\n\n从 Oracle 12c 开始，你可以直接在 RMAN 内部运行 SQL 语句（并查看结果）：\n\n```\nRMAN> select\
  \ * from v$rman_encryption_algorithms;\n```\n\n在 12c 之前，你可以使用 RMAN 的 `sql` 命令来执行上述\
  \ SQL 语句，但不会显示结果：\n\n```\nRMAN> sql 'select * from v$rman_encryption_algorithms';\n\
  ```\n\nRMAN 的 `sql` 命令更多地用于运行诸如 `ALTER SYSTEM` 之类的命令：\n\n```\nRMAN> sql 'alter system\
  \ switch logfile';\n```\n\n现在，在 12c 中，你可以直接运行 SQL：\n\n```\nRMAN> alter system switch\
  \ logfile;\n```\n\n这种在 RMAN 内部运行 SQL 的能力是一个非常好的增强；它允许你查看 SQL 查询的结果，并消除了指定 `sql`\
  \ 关键字以及在 SQL 命令本身周围加上引号的需要。\n\n## 22. 配置杂项设置\n\nRMAN 提供了灵活的通道配置命令。根据特殊情况和数据库要求，你偶尔需要使用它们。以下是一些选项：\n\
  \n*   最大备份集大小\n*   最大备份片大小\n*   最大速率\n*   最大打开文件数\n\n默认情况下，最大备份集大小是无限制的。你可以使用 `CONFIGURE`\
  \ 或 `BACKUP` 命令中的 `MAXSETSIZE` 参数来指定整体最大备份集大小。请确保此参数的值至少与 RMAN 正在备份的最大数据文件一样大。以下是一个示例：\n\
  \n```\nRMAN> configure maxsetsize to 2g;\n```\n\n有时，由于存储设备的物理限制，你可能想要限制备份片的总体大小。使用\
  \ `CONFIGURE CHANNEL` 或 `ALLOCATE CHANNEL` 命令的 `MAXPIECESIZE` 参数来实现；例如，\n\n```\n\
  RMAN> configure channel device type disk maxpiecesize = 2g;\n```\n\n如果你需要设置 RMAN\
  \ 每秒在通道上读取的最大字节数，你可以使用 `RATE` 参数来做到。这将通道 1 的最大读取速率配置为每秒 200MB：\n\n```\nconfigure\
  \ channel 1 device type disk rate 200M;\n```\n\n如果你对可以同时打开的文件数量有限制，你可以通过 `MAXOPENFILES`\
  \ 参数指定一个最大打开文件数：\n\n```\nRMAN> configure channel 1 device type disk maxopenfiles\
  \ 32;\n```\n\n当你需要让 RMAN 感知到某些操作系统或硬件限制时，你可能需要配置这些设置中的任何一个。你很少需要使用这些参数，但应该了解它们。\n\
  \n#### 23. 配置信息输出\n\n一个好的做法是始终设置操作系统的 `NLS_DATE_FORMAT` 变量（在运行 RMAN 之前），这样 RMAN\
  \ 日志中就会同时显示日期和时间信息，而不仅仅是默认的日期：\n\n```\nexport NLS_DATE_FORMAT='dd-mon-yyyy hh24:mi:ss'\n\
  ```\n\n这在故障排除时很有用，尤其是在 RMAN 失败时，因为我们可以使用 RMAN 错误发生时的确切日期/时间信息，并与 `alert.log` 以及操作系统/MML\
  \ 日志进行比较，以验证数据库/服务器中发生的其他事件。\n\n另外，考虑执行 `SET ECHO ON` 以确保 RMAN 命令在执行前显示在日志中。同时执行\
  \ `SHOW ALL` 以显示 RMAN 变量的当前设置。这些设置在故障排除和调优时非常有用。\n\n### 清除所有 RMAN 配置\n\n没有用于将所有\
  \ RMAN 配置重置为默认值的 `CLEAR ALL` 命令。但是，你可以通过运行一个包含 `CONFIGURE...CLEAR` 命令的脚本来轻松地模拟：\n\
  \n```\nCONFIGURE RETENTION POLICY clear;\nCONFIGURE BACKUP OPTIMIZATION clear;\n\
  CONFIGURE DEFAULT DEVICE TYPE clear;\nCONFIGURE CONTROLFILE AUTOBACKUP clear;\n\
  CONFIGURE CONTROLFILE AUTOBACKUP FORMAT FOR DEVICE TYPE DISK clear;\nCONFIGURE DEVICE\
  \ TYPE DISK clear;\nCONFIGURE DATAFILE BACKUP COPIES FOR DEVICE TYPE DISK clear;\n\
  CONFIGURE CHANNEL 1 DEVICE TYPE DISK clear;\nCONFIGURE CHANNEL 2 DEVICE TYPE DISK\
  \ clear;\nCONFIGURE CHANNEL 3 DEVICE TYPE DISK clear;\nCONFIGURE ARCHIVELOG BACKUP\
  \ COPIES FOR DEVICE TYPE DISK clear;\nCONFIGURE MAXSETSIZE clear;\nCONFIGURE ENCRYPTION\
  \ FOR DATABASE clear;\nCONFIGURE ENCRYPTION ALGORITHM clear;\nCONFIGURE COMPRESSION\
  \ ALGORITHM clear;\nCONFIGURE RMAN OUTPUT clear; # 12c\nCONFIGURE ARCHIVELOG DELETION\
  \ POLICY clear;\nCONFIGURE SNAPSHOT CONTROLFILE NAME clear;\n```\n\n根据你的设置（以及数据库的版本），你可能需要设置额外的配置。\n\
  \n### 从决策到行动的过渡\n\n既然你已经很好地理解了在实施 RMAN 之前应该做出哪些类型的决策，那么查看一个实现了其中一些组件的脚本是很有指导意义的。我主要使用\
  \ Linux/Unix 服务器。在这些环境中，我使用 shell 脚本来自动化 RMAN 备份。这些 shell 脚本通过 `cron` 等调度工具实现自动化。\n\
  \n本节包含一个用于 RMAN 备份的典型 shell 脚本。该 shell 脚本在输出中带有行号，以便在讨论编写脚本时所做的架构决策时参考。（如果你复制脚本，请在运行前删除行号。）\n\
  \n以下是该脚本。表 4-2 详细列出了本章涉及的每个 RMAN 架构决策点、它在 shell 脚本中的实现方式（或未实现），以及 shell 脚本中对应的行号。该脚本并未涵盖如何使用\
  \ RMAN 的所有方面。如果你使用该脚本，请务必修改它以满足你自己的环境要求和 RMAN 标准：\n\n```\n#!/bin/bash\n#----------------------------------------------\n\
  PRG=`basename $0`\nUSAGE=\"Usage: ${PRG}\"\nif [ $# -gt 0 ]; then\n   echo \"${USAGE}\"\
  \n   exit 1\nfi\nexport ORACLE_SID=O12C\nexport ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1\n\
  export PATH=$PATH:$ORACLE_HOME/bin\nBOX=`uname -a | awk '{print$2}'`\nMAILX='/bin/mailx'\n\
  MAIL_LIST='dkuhn@gmail.com'\nexport NLS_DATE_FORMAT='dd-mon-yyyy hh24:mi:ss'\ndate\n\
  #----------------------------------------------\nLOCKFILE=/tmp/$PRG.lock\nif [ -f\
  \ $LOCKFILE ]; then\n  echo \"lock file exists, exiting...\"\n  exit 1\nelse\n \
  \ echo \"DO NOT REMOVE, $LOCKFILE\" > $LOCKFILE\nfi\n#----------------------------------------------\n\
  rman nocatalog <<EOF\nconnect target /\nset echo on;\nshow all;\ncrosscheck backup;\n\
  crosscheck copy;\nconfigure controlfile autobackup on;\nconfigure controlfile autobackup\
  \ format for device type disk to\n   '/u01/O12C/rman/O12C_ctl_%F.bk';\nconfigure\
  \ retention policy to redundancy 1;\nconfigure           device type disk parallelism\
  \ 2;\nconfigure channel 1 device type disk format '/u01/O12C/rman/O12C_%U.bk';\n\
  configure channel 2 device type disk format '/u02/O12C/rman/O12C_%U.bk';\nbackup\
  \ as compressed backupset incremental level=0 database plus archivelog;\ndelete\
  \ noprompt obsolete;\nEOF\n#----------------------------------------------\nif [\
  \ $? -ne 0 ]; then\n  echo \"RMAN problem...\"\n  echo \"Check RMAN backups\" |\
  \ $MAILX -s \"RMAN issue: $ORACLE_SID on $BOX\" $MAIL_LIST\nelse\n  echo \"RMAN\
  \ ran okay...\"\nfi\n#----------------------------------------------\nif [ -f $LOCKFILE\
  \ ]; then\n  rm $LOCKFILE\nfi\n#----------------------------------------------\n\
  date\nexit 0\n```\n\n\n\n表 4-2. 架构决策的实现\n\n| 决策点 | 在脚本中的实现 | 脚本中的行号 |\n| --- | ---\
  \ | --- |\n| 1\\. 远程或本地运行 RMAN 客户端 | 在数据库服务器上本地运行脚本 | 第 26 行，本地连接（非网络连接） |\n| 2\\\
  . 指定备份用户 | 使用 `SYS` 进行连接 | 第 27 行，启动 `rman` 并使用斜杠 (`/`) 连接 |\n| 3\\. 使用联机或脱机备份 |\
  \ 联机备份 | 不适用。假设备份期间数据库处于运行状态 |\n| 4\\. 设置归档重做日志目的地和文件格式 | 在脚本外的数据库参数文件中设置 `LOG_ARCHIVE_DEST_N`\
  \ 和 `LOG_ARCHIVE_FORMAT` 初始化参数 | 不适用；在脚本外设置 |\n| 5\\. 配置 RMAN 备份位置和文件格式 | 在脚本中直接使用\
  \ `CONFIGURE` 命令 | 第 33–37 行 |\n| 6\\. 设置控制文件的自动备份 | 在脚本中启用 | 第 32 行 |\n| 7\\. 指定控制文件自动备份的位置\
  \ | 放置在与备份相同的目录中 | 第 33 行 |\n| 8\\. 备份归档重做日志 | 与数据库的其余部分一起备份；具体来说，使用 `PLUS ARCHIVELOG`\
  \ 子句 | 第 38 行 |\n| 9\\. 确定快照控制文件的位置 | 使用默认位置 | 不适用 |\n| 10\\. 使用恢复目录 | 不使用 | 第 26\
  \ 行，以 `nocatalog` 方式连接 |\n| 11\\. 使用介质管理器 | 不使用 | 第 35–37 行，`device type disk` |\n\
  | 12\\. 设置 `CONTROL_FILE_RECORD_KEEP_TIME` 初始化参数 | 使用默认值 | 不适用 |\n| 13\\. 配置 RMAN\
  \ 的备份保留策略 | 配置为冗余度 1，进行交叉检查，并删除过时的备份和归档重做日志文件 | 第 34 行，配置；第 30 和 31 行交叉检查；第 39 行，使用\
  \ RMAN 删除旧文件 |\n| 14\\. 配置归档重做日志的删除策略 | 使用与备份相同的保留策略 | 不适用 |\n| 15\\. 设置并行度 | 设置并行度为\
  \ 2 | 第 35–37 行 |\n| 16\\. 使用备份集或映像副本 | 使用备份集 | 第 38 行 |\n| 17\\. 使用增量备份 | 增量级别\
  \ 0，与完整备份相同 | 第 38 行 |\n| 18\\. 使用增量更新备份 | 不使用 | 不适用 |\n| 19\\. 使用块变更跟踪 | 不使用 |\
  \ 不适用 |\n| 20\\. 配置二进制压缩 | 使用基本压缩 | 第 38 行 |\n| 21\\. 配置加密 | 不使用 | 不适用 |\n| 22\\\
  . 配置杂项设置 | 不使用 | 不适用 |\n| 23\\. 配置信息输出 | 设置 | 第 15、28 和 29 行 |\n\n这个脚本有几个方面需要进一步讨论。第\
  \ 9、10 和 11 行通过将所需的 OS 变量硬编码到脚本中来设置它们（有关 sourcing OS 变量的详细信息，请参阅第 1 章）。我通常不倾向于像这样在脚本中硬编码变量，但这里这样做是为了提供一个关于如何编写\
  \ RMAN 脚本来备份数据库的简单示例。你会发现许多 DBA 确实会将这些变量硬编码到脚本中。\n\n第 15 行将 `NLS_DATE_FORMAT` OS\
  \ 变量设置为一个包含小时、分钟和秒的值。这确保了当 RMAN 运行适当的命令时，它显示的日期输出带有时间成分。这在调试和诊断问题时非常有价值。默认情况下，RMAN\
  \ 只显示日期部分。只知道命令运行的日期通常不足以确定命令执行的时机。至少，你需要看到小时和分钟（以及日期）。\n\n第 18–24 行检查锁文件是否存在。如果脚本已经在运行，你就不希望再次运行它。脚本检查锁文件，如果存在，脚本就退出。备份完成后，锁文件被删除（第\
  \ 49–51 行）。\n\n第 28 行将 `ECHO` 参数设置为 `on`。这指示 RMAN 在运行命令前在输出中显示该命令。这对于调试问题非常有价值。第\
  \ 29 行显示所有可配置的变量。这对于故障排除也很有用，因为你可以看到在执行任何命令之前 RMAN 变量被设置为什么。\n\n第 32–37 行使用 `CONFIGURE`\
  \ 命令。这些命令在每次执行脚本时都会运行。为什么要这样做？`CONFIGURE` 命令只需要运行一次，它会存储在控制文件中——你不必再次运行它，对吗？这是正确的。然而，我偶尔会因为一个习惯不好的\
  \ DBA 为数据库配置了一个设置却没有告诉任何人，而我直到尝试进行另一次备份时才发现这个错误配置而吃过亏。我强烈倾向于将 `CONFIGURE` 命令放在脚本中，这样无论其他\
  \ DBA 在脚本外做了什么，行为都是一致的。脚本中的 `CONFIGURE` 设置也起到一种文档的作用：我可以轻松地查看脚本并确定设置是如何配置的。\n\n\
  第 30 和 31 行运行 `CROSSCHECK` 命令。为什么要这样做？有时，文件会丢失，或者一个鲁莽的 DBA 可能会在 RMAN 之外使用操作系统命令从磁盘删除归档重做日志文件。当\
  \ RMAN 运行时，如果它找不到它认为应该存在的文件，就会抛出错误并停止备份。我倾向于运行 `CROSSCHECK` 命令，让 RMAN 调和它认为应该在磁盘上的文件与实际在磁盘上的文件。这使得\
  \ RMAN 能够平稳运行。\n\n你在第 39 行运行 `DELETE NOPROMPT OBSOLETE`。这会删除所有被 RMAN 根据保留策略标记为 `OBSOLETE`\
  \ 的备份文件和归档重做日志文件。这让 RMAN 管理哪些文件应该保留在磁盘上。我倾向于在备份完成后运行 `DELETE` 命令（而不是在备份之前运行）。保留策略定义为\
  \ 1，因此如果你在备份后运行 `DELETE`，RMAN 会在磁盘上保留一份备份副本。如果你在备份之前运行 `DELETE`，RMAN 会在磁盘上保留一份备份副本。备份运行后，磁盘上会有两份备份副本，而我这台服务器上没有足够的空间。\n\
  \n你可以从 Linux/Unix 调度工具 `cron` 执行 shell 脚本，如下所示：\n\n```\n0 16 * * * $HOME/bin/rmanback.bsh\
  \ >$HOME/bin/log/INVPRDRMAN.log 2>&1\n```\n\n该脚本在数据库服务器上于每天 1600 时（军用时间）运行。会创建一个日志文件\
  \ (`INVPRDRMAN.log`) 来捕获与 RMAN 作业相关的任何输出和错误。\n\n再次说明，本节中的脚本是基础的；你无疑会想要增强和修改它以满足你的需求。这个脚本为你提供了一个起点，包含具体的\
  \ RMAN 建议以及如何实现它们。\n\n### 总结\n\nRMAN 是 Oracle 的旗舰级 B&R（备份与恢复）工具。如果你仍在使用较旧的、用户管理的备份技术，那么我强烈建议你切换到\
  \ RMAN。RMAN 包含一套强大的功能，是其他任何备份工具都无法比拟的。RMAN 易于使用和配置。在实施稳固的 B&R 策略时，它将为你节省时间和精力，并让你高枕无忧。\n\
  \n如果你是 RMAN 的新手，可能不清楚哪些功能应该始终启用和实现，同样，哪些方面你很少需要。本章包含一个检查清单，引导你了解每个架构决策点。你可能不同意我的一些结论，或者某些推荐可能无法满足你的业务需求——这没关系。关键在于你应该仔细考虑每个组件以及如何实现有意义的功能。\n\
  \n本章以一个在生产环境中用于实现 RMAN 的脚本的实际示例结束。现在你对 RMAN 的功能及其使用方法有了很好的了解，可以开始进行备份了。下一章将介绍 RMAN\
  \ 备份场景。\n\n## 第 5 章\n\n\n\n# RMAN 备份与报告\n\n第 4 章详细介绍了如何配置 RMAN 以及使用专用功能来控制 RMAN\
  \ 的行为。在确定所需功能后，您就可以开始创建备份了。RMAN 可以备份以下类型的文件：\n\n*   数据文件\n*   控制文件\n*   已归档重做日志文件\n\
  *   `spfile`文件\n*   备份片文件\n\n在大多数场景中，您将使用 RMAN 来备份数据文件、控制文件和归档重做日志文件。如果您启用了控制文件自动备份功能，那么在发出`BACKUP`或`COPY`命令时，RMAN\
  \ 会自动备份控制文件和`spfile`文件（如果您正在使用它）。您也可以备份 RMAN 已创建的备份片文件。\n\nRMAN 不备份 Oracle Net 文件、口令文件、块更改跟踪文件、闪回日志或\
  \ Oracle 二进制文件（安装 Oracle 时创建的文件）。如果需要，您应设置包含这些文件的操作系统备份。\n\n另请注意，RMAN 不备份在线重做日志文件。即使备份了在线重做日志文件，恢复它们也是没有意义的。在线重做日志文件包含数据库生成的最新重做信息。您肯定不希望用备份中的旧重写信息来覆盖它们。当数据库处于归档日志模式时，在线重做日志文件包含执行完全恢复所需的最近生成的事务。\n\
  \n本章详细介绍了与运行 RMAN `BACKUP`命令相关的许多功能。同时涵盖了创建恢复目录以及记录输出和报告 RMAN 备份操作的技术。本章首先讨论一些常见的实践，这些实践用于增强运行命令时\
  \ RMAN 输出的显示内容。\n\n## 准备运行 RMAN 备份命令\n\n在运行 RMAN 备份之前，我通常会设置一些东西，以增强输出中显示的信息。您不需要每次登录和运行\
  \ RMAN 命令时都设置这些变量。然而，在故障排除或调试问题时，执行以下任务几乎总是一个好主意：\n\n*   设置`NLS_DATE_FORMAT`操作系统变量\n\
  *   设置`ECHO`\n*   显示 RMAN 变量\n\n以下各节将讨论这些要点。\n\n### 设置 NLS_DATE_FORMAT\n\n在运行任何\
  \ RMAN 作业之前，我会将操作系统变量`NLS_DATE_FORMAT`设置为包含时间（时、分、秒）部分；例如，\n\n```\n$ export NLS_DATE_FORMAT='dd-mon-yyyy\
  \ hh24:mi:ss'\n```\n\n此外，如果我有一个调用 RMAN 的 shell 脚本，我会将上述行直接放在 shell 脚本中（有关示例，请参见第\
  \ 4 章末尾的 shell 脚本）：\n\n```\nNLS_DATE_FORMAT='dd-mon-yyyy hh24:mi:ss'\n```\n\n这确保了当\
  \ RMAN 显示日期时，输出中始终包含小时、分钟和秒作为一部分。默认情况下，RMAN 输出中只包含日期部分（`DD-MON-YY`）。例如，未设置`NLS_DATE_FORMAT`时，启动备份时\
  \ RMAN 显示如下：\n\n```\nStarting backup at 04-SEP-14\n```\n\n当您设置`NLS_DATE_FORMAT`操作系统变量以包含时间部分时，输出将变为如下所示：\n\
  \n```\nStarting backup at 04-sep-2014 16:43:04\n```\n\n在故障排除时，拥有时间部分至关重要，这样您才能确定一个命令运行了多久，或者一个命令在失败前运行了多长时间。Oracle\
  \ 支持人员几乎总是会要求您在捕获输出并发送给他们之前，将此变量设置为包含时间部分。\n\n设置`NLS_DATE_FORMAT`的唯一缺点是，如果您将其设置为\
  \ RMAN 无法识别的值，可能会导致连接问题。例如，这里`NLS_DATE_FORMAT`被设置为一个无效值：\n\n```\n$ export NLS_DATE_FORMAT='dd-mon-yyyy\
  \ hh24:mi:sd'\n$ rman target /\n```\n\n当设置为无效值时，登录 RMAN 时会收到此错误：\n\n```\nRMAN-03999:\
  \ Oracle error occurred while converting a date: ORA-01821:\n```\n\n\n\n### 执行备份\n\
  \n## 设置 NLS_DATE_FORMAT 变量\n\n要取消设置 `NLS_DATE_FORMAT` 变量，可以将其设为空值，如下所示：\n\n```\n\
  $ export NLS_DATE_FORMAT=''\n```\n\n## 设置 ECHO\n\n另一个我总是在任何 RMAN 脚本中设置的值是 `ECHO`\
  \ 命令，如下所示：\n\n```\nRMAN> set echo on;\n```\n\n这会指示 RMAN 在输出中显示它正在运行的命令，这样你就可以看到正在运行的是哪个\
  \ RMAN 命令，以及与该命令相关的任何错误或输出信息。当你在脚本中运行 RMAN 命令时，这一点尤其重要，因为你不是在直接输入命令（并且可能不知道在 shell\
  \ 脚本中发出了什么命令）。\n\n例如，如果没有 `SET ECHO ON`，命令的输出显示如下：\n\n```\nStarting backup at...\n\
  ```\n\n使用 `SET ECHO ON` 后，此输出会显示实际运行的命令：\n\n```\nbackup datafile 4;\nStarting backup\
  \ at...\n```\n\n从上面的输出中，你可以看到正在运行哪个命令、何时开始等等。\n\n### 显示变量\n\n另一个好习惯是在任何脚本中运行 `SHOW\
  \ ALL` 命令，如下所示：\n\n```\nRMAN> show all;\n```\n\n这会显示所有可配置的 RMAN 变量。在进行故障排除时，你可能不知道其他数据库管理员（DBA）配置了什么。这能让你看到\
  \ RMAN 会话执行时的配置快照。\n\n## 执行备份之前\n\n在运行 RMAN 备份之前，请务必阅读第 4 章，了解如何为生产环境配置 RMAN。对于生产数据库，我主要从一个类似于第\
  \ 4 章末尾所示的 shell 脚本来运行 RMAN。在 shell 脚本中，我会配置我想为特定数据库使用的 RMAN 的各个方面。如果使用开箱即用的默认设置运行\
  \ RMAN，你虽然能够备份数据库，但这些设置对于大多数生产数据库应用来说是不够的。\n\n#### 备份整个数据库\n\n如果你不确定 RMAN 会将数据库文件备份到哪里，你需要阅读第\
  \ 4 章，因为它描述了如何配置 RMAN 在你选择的位置创建备份文件。以下是我通常如何配置 RMAN 将文件写入磁盘的特定位置（请注意，`CONFIGURE`\
  \ 命令必须在运行 `BACKUP` 命令之前执行）：\n\n```\nRMAN> configure channel 1 device type disk format\
  \ '/u01/O12C/rman/rman1_%U.bk';\n```\n\n配置好备份位置后，我几乎总是使用类似下面的命令来备份整个数据库：\n\n```\n\
  RMAN> backup incremental level=0 database plus archivelog;\n```\n\n这个命令确保 RMAN 将备份数据库中的所有数据文件、备份前生成的所有可用归档重做日志，以及备份期间生成的所有归档重做日志。该命令还确保你拥有恢复和还原数据库所需的所有数据文件和归档重做日志。\n\
  \n如果你启用了控制文件的自动备份功能，接着运行此命令：\n\n```\nRMAN> configure controlfile autobackup on;\n\
  ```\n\n作为备份的一部分，RMAN 执行的最后一项任务是生成一个包含控制文件备份的备份集。这个控制文件将包含有关已执行的备份以及备份期间生成的任何归档重做日志的所有信息。\n\
  \n![Image](img/sq.jpg) **提示**：务必启用控制文件的自动备份功能。\n\n## BACKUP 命令的细微差别\n\nRMAN 的 `BACKUP`\
  \ 命令有许多细微之处。对于生产数据库，我通常使用 `BACKUP INCREMENTAL LEVEL=0 DATABASE PLUS ARCHIVELOG`\
  \ 命令备份数据库，这通常是足够的。然而，你会遇到许多情况，需要运行使用特定 RMAN 功能的备份，或者你可能在解决一个问题时，需要了解调用 RMAN 备份的其他方式。这些方面将在接下来的几个部分中讨论。\n\
  \n## 完全备份与增量级别=0\n\n\n\n# RMAN 备份概念详解\n\n## RMAN 完整备份与增量 0 级备份\n\n术语 *RMAN 完整备份*\
  \ 有时会引起混淆。更贴切地描述此任务的方式是 *RMAN 备份一个或多个数据文件中所有已修改的块*。术语 *完整* 并不意味着备份所有块或所有数据文件。它仅表示正在备份在故障事件中重建数据文件所需的所有块。你可以对单个数据文件进行完整备份，而该备份片的内容可能比数据文件本身小得多。\n\
  \n术语 *RMAN 增量 0 级备份* 本身也描述得不够准确。增量 0 级备份所备份的块与完整备份相同。换句话说，以下两条命令备份数据库中的相同块：\n\n\
  ```\nRMAN> backup as backupset full database;\nRMAN> backup as backupset incremental\
  \ level=0 database;\n```\n\n前述两条命令的唯一区别在于，增量 0 级备份可以与其他增量备份结合使用，而完整备份不能参与增量备份策略。因此，我几乎总是更喜欢使用\
  \ `INCREMENTAL LEVEL=0` 语法（而不是完整备份）；它让我可以灵活地将 0 级增量备份与后续的 1 级增量备份一起使用。\n\n## 备份集与映像副本\n\
  \nRMAN 默认的备份模式指示其仅备份数据文件中已使用的块；这些称为备份集。RMAN 也可以对数据文件进行逐字节的复制；这些称为映像副本。创建备份集是 RMAN\
  \ 创建的默认备份类型。以下命令创建数据库的备份集备份：\n\n```\nRMAN> backup database;\n```\n\n如果愿意，你可以在创建备份时显式指定\
  \ `AS BACKUPSET` 命令：\n\n```\nRMAN> backup as backupset database;\n```\n\n你可以通过使用\
  \ `AS COPY` 命令指示 RMAN 创建映像副本。此命令为数据库中的每个数据文件创建映像副本：\n\n```\nRMAN> backup as copy\
  \ database;\n```\n\n由于映像副本是数据文件的完全相同的副本，DBA 可以通过操作系统命令直接访问它们。例如，假设你遇到了媒体故障，并且不想使用\
  \ RMAN 来还原映像副本。你可以使用操作系统命令将数据文件的映像副本复制到数据库可以使用的位置。相比之下，备份集由二进制文件组成，只有 RMAN 工具可以写入或读取。\n\
  \n我在使用 RMAN 时更喜欢使用备份集。备份集往往比数据文件小，并且可以应用真正的二进制压缩。此外，我并不觉得使用 RMAN 作为只能由 RMAN 还原的备份文件的创建机制有什么不便。使用\
  \ RMAN 和备份集既高效又非常可靠。\n\n## 备份表空间与数据文件\n\nRMAN 能够在数据库级别（如前一节所示）、表空间级别，或者更精细地在数据文件级别进行备份。当你备份表空间时，RMAN\
  \ 会备份你所指定的表空间关联的所有数据文件。例如，以下命令将备份与 `SYSTEM` 和 `SYSAUX` 表空间关联的所有数据文件：\n\n```\nRMAN>\
  \ backup tablespace system, sysaux;\n```\n\n我进行表空间级别备份的一种情况是，如果我最近创建了一个新表空间，并希望仅备份与新增表空间关联的数据文件。请注意，在遇到备份与恢复问题时，使用一个表空间通常更高效（因为备份一个表空间通常比备份整个数据库快得多）。\n\
  \n你可能偶尔需要备份单个数据文件。例如，在排查备份问题时，尝试成功备份一个数据文件通常很有帮助。你可以按文件名或文件号指定数据文件，如下所示：\n\n\n####\
  \ 备份数据文件\n\n```\nRMAN> backup datafile '/u01/dbfile/O12C/system01.dbf';\n```\n\n\
  在此示例中，指定了文件编号：\n\n```\nRMAN> backup datafile 1,4;\n```\n\n以下是一些使用不同特性备份数据文件的其他示例：\n\
  \n```\nRMAN> backup as copy datafile 4;\nRMAN> backup incremental level 1 datafile\
  \ 4;\n```\n\n![Image](img/sq.jpg) **提示** 使用`RMAN`的`REPORT SCHEMA`命令可以列出表空间、数据文件名和数据文件编号信息。\n\
  \n#### 备份控制文件\n\n备份控制文件最可靠的方法是配置自动备份功能：\n\n```\nRMAN> configure controlfile autobackup\
  \ on;\n```\n\n此命令确保在发出`BACKUP`或`COPY`命令时自动备份控制文件。我通常启用控制文件的自动备份功能，这样就永远不必担心需要显式发出单独的命令来备份控制文件。在此模式下，控制文件总是在数据文件备份片段创建后，在其自身的备份集和备份片段中创建。\n\
  \n如果需要手动备份控制文件，可以这样做：\n\n```\nRMAN> backup current controlfile;\n```\n\n备份的位置可以是默认的操作系统位置、快速恢复区（如果使用的话）或手动配置的位置。如第\
  \ 4 章所示，我更喜欢将控制文件备份片段的位置设置为与数据文件备份相同的位置：\n\n```\nRMAN> configure controlfile autobackup\
  \ format for device type disk to\n'/u01/O12C/rman/rman_ctl_%F.bk';\n```\n\n## 备份\
  \ spfile\n\n如果启用了控制文件的自动备份功能，则在发出任何`BACKUP`或`COPY`命令时，`spfile`（连同控制文件）都会被自动备份。如果需要手动备份`spfile`，请使用以下命令：\n\
  \n```\nRMAN> backup spfile;\n```\n\n包含`spfile`备份的文件位置取决于您为控制文件自动备份配置的内容（有关示例，请参阅上一节）。默认情况下，如果您没有使用快速恢复区，并且没有通过通道显式配置位置，那么在\
  \ Linux/Unix 服务器上，备份会转到`ORACLE_HOME/dbs`目录。\n\n![Image](img/sq.jpg) **注意** 只有实例是使用`spfile`启动时，`RMAN`才能备份`spfile`。\n\
  \n#### 备份归档重做日志\n\n我通常不会将归档重做日志与数据库备份分开备份。如前所述，我通常使用以下命令备份数据库文件和归档重做日志文件：\n\n```\n\
  RMAN> backup incremental level=0 database plus archivelog;\n```\n\n然而，您偶尔会遇到需要特殊、一次性备份归档重做日志的情况。您可以发出以下命令来备份归档重做日志文件：\n\
  \n```\nRMAN> backup archivelog all;\n```\n\n如果您有一个几乎已满的挂载点，并且您确定要备份归档重做日志（以便它们存在于备份文件中），但随后又希望立即将刚备份的文件从磁盘上删除，则可以使用以下语法备份归档重做日志，然后让`RMAN`从存储介质中删除它们：\n\
  \n```\nRMAN> backup archivelog all delete input;\n```\n\n下面列出了备份归档重做日志文件的其他一些方法：\n\
  \n```\nRMAN> backup archivelog sequence 300;\nRMAN> backup archivelog sequence between\
  \ 300 and 400 thread 1;\nRMAN> backup archivelog from time \"sysdate-7\" until time\
  \ \"sysdate-1\";\n```\n\n如果某个归档重做日志已通过操作系统删除命令从磁盘上手动删除，则在尝试备份不存在的归档重做日志文件时，`RMAN`将抛出以下错误：\n\
  \n```\nRMAN-06059: expected archived log not found, loss of archived log compromises\
  \ recoverability\n```\n\n在这种情况下，首先运行`CROSSCHECK`命令，让`RMAN`知道磁盘上哪些文件是物理可用的：\n\n```\n\
  RMAN> crosscheck archivelog all;\n```\n\n\n# 备份快速恢复区\n\n如果您使用了快速恢复区，RMAN 有一个很方便的功能：只需一条命令即可备份该位置的所有文件。如果您使用了介质管理器并启用了磁带备份通道，您可以将快速恢复区中的所有内容备份到磁带，如下所示：\n\
  \n```\nRMAN> backup device type sbt_tape recovery area;\n```\n\n您也可以将快速恢复区备份到磁盘上的某个位置。使用\
  \ `TO DESTINATION` 命令来完成此操作：\n\n```\nRMAN> backup recovery area to destination '/u01/O12C/fra_back';\n\
  ```\n\nRMAN 会在 `TO DESTINATION` 命令指定的目录下，根据需要自动创建子目录。\n\n![Image](img/sq.jpg) **注意**\
  \  `TO_DESTINATION` 目录下的子目录格式为 `db_unique_name/backupset/YYYY_MM_DD`。\n\nRMAN 将备份完整备份、增量备份、控制文件自动备份以及归档重做日志文件。请记住，闪回日志、在线重做日志文件和当前控制文件**不会**被备份。\n\
  \n#### 从备份中排除表空间\n\n假设您有一个包含非关键数据的表空间，并且您永远不想备份它。RMAN 可以配置为在备份时排除此类表空间。要确定 RMAN\
  \ 当前是否配置为排除任何表空间，请运行以下命令：\n\n```\nRMAN> show exclude;\nRMAN configuration parameters\
  \ for database with db_unique_name O12C are:\nRMAN configuration has no stored or\
  \ default parameters\n```\n\n使用 `EXCLUDE` 命令来指示 RMAN 不备份哪些表空间：\n\n```\nRMAN> configure\
  \ exclude for tablespace users;\n```\n\n现在，对于任何数据库级别的备份，RMAN 都将排除与 `USERS` 表空间关联的数据文件。您可以通过以下命令指示\
  \ RMAN 备份所有数据文件以及任何被排除的表空间：\n\n```\nRMAN> backup database noexclude;\n```\n\n您可以通过以下命令清除排除设置：\n\
  \n```\nRMAN> configure exclude for tablespace users clear;\n```\n\n# 备份尚未备份的数据文件\n\
  \n假设您刚刚向数据库添加了几个数据文件，并且您希望确保已对它们进行了备份。您可以发出以下命令来指示 Oracle 备份那些尚未备份的数据文件：\n\n```\n\
  RMAN> backup database not backed up;\n```\n\n您还可以为这些尚未备份的文件指定时间范围。假设您发现备份已停止运行数天，并且希望备份过去\
  \ 24 小时内所有尚未备份的内容。以下命令备份过去一天内所有尚未备份的数据文件：\n\n```\nRMAN> backup database not backed\
  \ up since time='sysdate-1';\n```\n\n如果由于任何原因（数据中心断电、备份目录在备份期间变满等等）导致您的备份中止，前面的命令也很有用。在您解决了导致备份作业失败的问题后，您可以发出前面的命令，RMAN\
  \ 将仅备份在指定时间段内尚未备份的数据文件。\n\n#### 跳过只读表空间\n\n因为只读表空间中的数据无法更改，您可能希望只备份只读表空间一次，然后在后续备份中跳过它们。使用\
  \ `SKIP READONLY` 命令来实现此目的：\n\n```\nRMAN> backup database skip readonly;\n```\n\n\
  请记住，当您跳过只读表空间时，您需要保留一个包含这些表空间的可用备份。只要您只发出 RMAN 命令 `DELETE OBSOLETE`，包含只读表空间的 RMAN\
  \ 备份集就会被保留而不会被删除，即使该 RMAN 备份集还包含其他可读写的表空间。\n\n#### 跳过离线或不可访问的文件\n\n假设您有一个数据文件丢失或损坏，并且您没有它的备份，因此无法还原和恢复它。在这种情况下，您无法启动数据库：\n\
  \n```\nSQL> startup;\nORA-01157: cannot identify/lock data file 6 - see DBWR trace\
  \ file\nORA-01110: data file 6: '/u01/dbfile/ O12C/reg_data01.dbf'\n```\n\n\n\n\
  在此场景中，您必须先将数据文件脱机，然后才能启动数据库：\n\n```\nSQL> alter database datafile '/u01/dbfile/O12C/reg_data01.dbf'\
  \ offline for drop;\n```\n\n现在，您可以打开数据库了：\n\n```\nSQL> alter database open;\n```\n\
  \n假设您随后尝试执行 RMAN 备份：\n\n```\nRMAN> backup database;\n```\n\n当 RMAN 遇到无法备份的数据文件时，会抛出以下错误：\n\
  \n```\nRMAN-03002: failure of backup command at ...\nRMAN-06056: could not access\
  \ datafile 6\n```\n\n在这种情况下，您需要指示 RMAN 从备份中排除该离线数据文件。`SKIP OFFLINE` 命令指示 RMAN 忽略状态为离线的数据文件：\n\
  \n```\nRMAN> backup database skip offline;\n```\n\n如果文件已完全丢失，请使用 `SKIP INACCESSIBLE`\
  \ 指示 RMAN 忽略磁盘上不可用的文件。如果数据文件是通过操作系统命令删除的，就可能发生这种情况。以下是从 RMAN 备份中排除不可访问数据文件的示例：\n\
  \n```\nRMAN> backup database skip inaccessible;\n```\n\n您可以使用一条命令跳过只读、离线和不可访问的数据文件：\n\
  \n```\nRMAN> backup database skip readonly skip offline skip inaccessible;\n```\n\
  \n在处理离线和不可访问的文件时，您应查明文件离线或不可访问的原因，并尝试解决任何问题。\n\n#### 并行备份大文件\n\n通常，RMAN 仅使用一个通道来备份单个数据文件。当您启用并行性时，它允许\
  \ RMAN 生成多个进程来备份多个文件。然而，即使启用了并行性，RMAN 也不会同时使用并行通道来备份一个数据文件。\n\n从 Oracle 11g 开始，您可以指示\
  \ RMAN 使用多个通道并行备份一个数据文件。这称为多节备份。此功能可以加快超大文件的备份速度。使用 `SECTION SIZE` 参数进行多节备份。以下示例配置两个并行通道来备份一个文件：\n\
  \n```\nRMAN> configure device type disk parallelism 2;\nRMAN> configure channel\
  \ 1 device type disk format '/u01/O12C/rman/r1%U.bk';\nRMAN> configure channel 2\
  \ device type disk format '/u02/O12C/rman/r2%U.bk';\nRMAN> backup section size 2500M\
  \ datafile 10;\n```\n\n当此代码运行时，RMAN 将分配两个通道来并行备份指定的数据文件。\n\n`注意` 如果您指定的节大小大于数据文件的大小，RMAN\
  \ 将不会并行备份该文件。\n\n## 将 RMAN 备份信息添加到存储库\n\n假设您不得不重新创建控制文件。重新创建控制文件的过程会清除所有有关 RMAN\
  \ 备份的信息。但是，您希望新创建的控制文件知晓磁盘上现有的 RMAN 备份。在这种情况下，请使用 `CATALOG` 命令将 RMAN 元数据填充到控制文件中。例如，如果所有\
  \ RMAN 备份文件都保存在 `/u01/O12C/rman` 目录中，您可以按如下方式使控制文件知晓该目录中的这些备份文件：\n\n```\nRMAN> catalog\
  \ start with '/u01/O12C/rman';\n```\n\n这会指示 RMAN 在指定目录中查找所有备份片、映像副本、控制文件副本和归档重做日志，如果找到，则将相应的元数据填充到控制文件中。对于此示例，在给定目录中找到了两个备份片文件：\n\
  \n```\nsearching for all files that match the pattern /u01/O12C/rman\n\nList of\
  \ Files Unknown to the Database\n=====================================\nFile Name:\
  \ /u01/O12C/rman/r1otlns90o_1_1.bk\nFile Name: /u01/ O12C/rman/r1xyklnrveg_1_1.bk\n\
  \nDo you really want to catalog the above files (enter YES or NO)?\n```\n\n如果您输入\
  \ `YES`，则有关备份文件的元数据将被添加到控制文件中。这样，`CATALOG` 命令就允许您让 RMAN 存储库（控制文件和恢复目录）知晓 RMAN 可用于备份与恢复的文件。\n\
  \n\n\n您还可以指示 RMAN 编录恢复区（FRA）中控制文件当前未知的任何文件，如下所示：\n\n```\nRMAN> catalog recovery\
  \ area;\n```\n\n此外，您可以编录特定文件。此示例指示 RMAN 为特定的备份片文件向控制文件添加元数据：\n\n```\nRMAN> catalog\
  \ backuppiece '/u01/O12C/rman/r159nv562v_1_1.bk';\n```\n\n## 备份可插拔数据库\n\n从 Oracle\
  \ 12c 开始，您可以在根容器数据库中创建可插拔数据库。如果使用此选项，关于备份需要了解几个特性：\n\n*   当连接到根容器时，您可以备份数据库内的所有数据文件，或仅备份根数据库数据文件；特定的可插拔数据库；或特定的表空间或数据文件，或这些的组合。\n\
  *   当连接到可插拔数据库时，您只能备份与该数据库关联的数据文件。\n\n项目符号项的详细说明见以下两个部分。\n\n### 连接到根容器时\n\n假设您以\
  \ `SYS` 身份连接到根容器，并希望备份所有数据文件（包括任何有关联的可插拔数据库的数据文件）。首先，验证您确实是以 `SYS` 身份连接到根容器：\n\n\
  ```\nRMAN> SELECT SYS_CONTEXT('USERENV', 'CON_ID')   AS con_id,\n       SYS_CONTEXT('USERENV',\
  \ 'CON_NAME')       AS cur_container,\n       SYS_CONTEXT('USERENV', 'CURRENT_SCHEMA')\
  \ AS cur_user\n       FROM DUAL;\n```\n\n以下是一些示例输出：\n\n```\nCON_ID             \
  \  CUR_CONTAINER        CUR_USER\n-------------------- -------------------- --------------------\n\
  1                    CDB$ROOT             SYS\n```\n\n现在，要备份所有数据文件，包括根容器和任何关联的可插拔数据库中的，请按如下方式操作：\n\
  \n```\nRMAN> backup database;\n```\n\n如果您只想备份与根容器关联的数据文件，则指定 `ROOT`：\n\n```\nRMAN>\
  \ backup database root;\n```\n\n您也可以备份特定的可插拔数据库：\n\n```\nRMAN> backup pluggable\
  \ database salespdb;\n```\n\n此外，您可以备份可插拔数据库内的特定表空间：\n\n```\nRMAN> backup tablespace\
  \ SALESPDB:SALES;\n```\n\n并且，您可以指定文件名来备份根容器或关联的可插拔数据库中的任何数据文件：\n\n```\nRMAN> backup\
  \ datafile '/ora01/app/oracle/oradata/CDB/salespdb/sales01.dbf';\n```\n\n### 连接到可插拔数据库时\n\
  \n首先，启动 RMAN，并连接到您想要备份的可插拔数据库。您必须以具有 `SYSDBA` 或 `SYSBACKUP` 权限的用户身份连接。此外，必须有侦听器正在运行并存在口令文件。此示例连接到\
  \ `SALESPDB` 可插拔数据库：\n\n```\n$ rman target sys/foo@salespdb\n```\n\n一旦连接到可插拔数据库，您只能备份特定于该数据库的数据文件。因此，对于此示例，以下命令仅备份与\
  \ `SALESPDB` 可插拔数据库关联的数据文件：\n\n```\nRMAN> backup database;\n```\n\n此示例备份与可插拔数据库\
  \ `SYSTEM` 表空间关联的数据文件：\n\n```\nRMAN> backup tablespace system;\n```\n\n我需要再次强调，当您直接连接到可插拔数据库时，您只能备份与该数据库关联的数据文件。您无法备份与根容器关联或容器内任何其他可插拔数据库关联的数据文件。图\
  \ 5-1 说明了这一概念。以 `SYSDBA` 身份连接到 `SALESPDB` 可插拔数据库只能备份和查看与该数据库相关的数据文件。该 `SYSDBA` 连接在数据文件和\
  \ RMAN 数据文件备份方面无法看到其可插拔“盒子”之外的内容。相比之下，到根容器的 `SYSDBA` 连接可以备份所有数据文件（根、种子和所有可插拔数据库），以及访问从连接到可插拔数据库发起的\
  \ RMAN 备份。\n\n![9781484207642_Fig05-01.jpg](img/9781484207642_Fig05-01.jpg)\n\n\
  图 5-1. `SYSDBA` 连接到根容器与 `SYSDBA` 连接到可插拔数据库的权限范围\n\n#### 创建增量备份\n\nRMAN 有三个独立且不同的增量备份特性：\n\
  \n*   增量级别备份\n*   增量更新备份\n*   块更改跟踪\n\n使用增量级别备份，RMAN 仅备份自上次备份以来已修改的块。增量备份可应用于整个数据库、表空间或数据文件。增量级别备份是\
  \ RMAN 中最常用的增量特性。\n\n增量更新备份是与增量级别备份分开的一个特性。这些备份获取数据文件的映像副本，然后使用增量备份来更新这些映像副本。这为您提供了一种在备份策略中实施和维护映像副本的高效方式。您只需进行一次映像副本备份，然后使用增量备份使映像副本保持最新事务的更新。\n\
  \n块更改跟踪是另一个旨在加速增量备份性能的特性。其思路是使用一个操作系统文件来记录自上次备份以来哪些块已更改。RMAN 可以使用块更改跟踪文件在执行增量备份时快速识别需要备份的块。此特性可以极大地提高增量备份的性能。\n\
  \n#### 执行增量级别备份\n\nRMAN 通过级别实现增量备份。从 Oracle 10g 开始，只有两个有文档记载的增量备份级别：级别 0 和级别 1。Oracle\
  \ 的早期版本提供五个级别（0-4）。这些级别（0-4）仍然可用，但未在 Oracle 文档中指定。您必须首先执行级别 0 增量备份以建立基线，之后才能执行级别\
  \ 1 增量备份。\n\n![Image](img/sq.jpg) > **注意** > 完全备份备份与级别 0 备份相同的块。但是，您不能将完全备份与增量备份一起使用。此外，您必须从级别\
  \ 0 备份开始增量备份策略。如果您尝试执行级别 1 备份，但不存在级别 0 备份，RMAN 将自动执行级别 0 备份。\n\n以下是执行增量级别 0 备份的示例：\n\
  \n```\nRMAN> backup incremental level=0 database;\n```\n\n假设在接下来的几次备份中，您只想备份自上次增量备份以来已更改的块。以下代码执行级别\
  \ 1 备份：\n\n```\nRMAN> backup incremental level=1 database;\n```\n\n增量备份有两种不同的类型：差异备份和累积备份。您使用哪种类型取决于您的需求。差异备份（默认）较小，但恢复需要更多时间。累积备份比差异备份大，但需要的恢复时间更少。\n\
  \n差异增量级别 1 备份指示 RMAN 备份自上次级别 1 或级别 0 备份以来已更改的块，而累积增量级别 1 备份指示 RMAN 备份自上次级别 0 备份以来已更改的块。累积增量备份实际上会忽略任何级别\
  \ 1 增量备份。\n\n![Image](img/sq.jpg) > **注意** > RMAN 增量级别 0 备份用于还原数据文件，而 RMAN 增量级别\
  \ 1 备份用于恢复数据文件。\n\n当使用增量备份时，我几乎总是使用默认的差异备份。通常，我不太担心差异备份和累积备份之间的区别。如果您需要累积备份，则必须指定关键字\
  \ `CUMULATIVE`。以下是执行累积级别 1 备份的示例：\n\n```\nRMAN> backup incremental level=1 cumulative\
  \ database;\n```\n\n以下是一些在比数据库更细粒度的级别上执行增量备份的示例：\n\n\n\n```\nRMAN> backup incremental\
  \ level=0 tablespace sysaux;\nRMAN> backup incremental level=1 tablespace sysaux\
  \ plus archivelog;\nRMAN> backup incremental from scn 4343352 datafile 3;\n```\n\
  \n## 制作增量更新备份\n\n增量更新备份的基本思路是创建数据文件的映像副本，然后使用增量备份来更新这些映像副本。这样，你就能拥有一个基本保持最新的数据库映像副本。这是一种将映像副本备份与增量备份高效结合的方法。\n\
  \n要理解这种备份技术的工作原理，你需要查看执行增量更新备份所需的命令。启用此功能需要以下 RMAN 代码行：\n\n```\nrun{recover copy\
  \ of database with tag 'incupdate';\nbackup incremental level 1 for recover of copy\
  \ with tag 'incupdate' database;}\n```\n\n第一行指定了一个标签（本例使用 `incupdate`）。标签名可以任意设置；它让\
  \ RMAN 能够关联每次运行命令时所使用的备份文件。这段代码在你首次运行脚本时将执行如下操作：\n\n*   `RECOVER COPY` 会生成一条消息，说明无需执行任何操作。\n\
  *   如果不存在映像副本，`BACKUP INCREMENTAL` 将创建数据库数据文件的映像副本。\n\n首次运行 `RECOVER COPY` 和 `BACKUP\
  \ INCREMENTAL` 命令时，输出中应会看到类似以下的消息：\n\n```\nno copy of datafile 1 found to recover\n\
  ...\nno parent backup or copy of datafile 1 found\n...\n```\n\n第二次运行增量更新备份时，它将执行以下操作：\n\
  \n*   `RECOVER COPY` 再次生成一条消息，说明无需执行任何操作。\n*   `BACKUP INCREMENTAL` 创建一个增量级别 1 的备份，并为其分配指定的标签名；此备份随后将被\
  \ `RECOVER COPY` 命令使用。\n\n第三次运行增量更新备份时，它将执行以下操作：\n\n*   此时增量备份已创建，`RECOVER COPY`\
  \ 会将此增量备份应用到映像副本上。\n*   `BACKUP INCREMENTAL` 创建一个增量级别 1 的备份，并为其分配指定的标签名；此备份随后将被\
  \ `RECOVER COPY` 命令使用。\n\n今后，每次运行这两行代码时，你都将遵循一个定期重复的备份模式。如果你使用映像副本进行备份，可以考虑采用增量更新备份策略，因为通过它，你可以避免在每次备份运行时都创建完整的映像副本。每次备份运行时，映像副本都会根据前一次备份的增量变化进行更新。\n\
  \n## 使用块更改跟踪\n\n块更改跟踪是一个使用二进制文件记录数据库数据文件块更改的过程。其理念是改进增量备份的性能，因为 RMAN 可以使用块更改跟踪文件来精确定位自上次备份以来哪些块发生了更改。这节省了大量时间，因为否则\
  \ RMAN 将不得不扫描所有已备份的块以确定它们是否自上次备份以来发生了更改。\n\n启用块更改跟踪的步骤如下：\n\n1.  如果尚未启用，请将 `DB_CREATE_FILE_DEST`\
  \ 参数设置为磁盘上已存在的一个位置；例如，\n\n    ```\n    SQL> alter system set db_create_file_dest='/u01/O12C/bct'\
  \ scope=both;\n    ```\n\n2.  通过 `ALTER DATABASE` 命令启用块更改跟踪：\n\n    ```\n    SQL>\
  \ alter database enable block change tracking;\n    ```\n\n此示例在 `DB_CREATE_FILE_DEST`\
  \ 指定的目录中创建一个具有 OMF 名称的文件。本例中创建的文件被赋予此名称：\n\n```\n/u01/O12C/bct/O12C/changetracking/o1_mf_8h0wmng1_.chg\n\
  ```\n\n你也可以通过直接指定文件名来启用块更改跟踪，这不需要设置 `DB_CREATE_FILE_DEST`；例如，\n\n```\nSQL> alter\
  \ database enable block change tracking using file '/u01/O12C/bct/btc.bt';\n```\n\
  \n你可以通过运行以下查询来验证块更改跟踪的详细信息：\n\n```\nSQL> select * from v$block_change_tracking;\n\
  ```\n\n出于空间规划目的，块更改跟踪文件的大小大约是被跟踪的数据库块总大小的 1/30,000。因此，块更改跟踪文件的大小与数据库的大小成正比，而与生成的重做量无关。\n\
  \n要禁用块更改跟踪，请运行此命令：\n\n```\nSQL> alter database disable block change tracking;\n\
  ```\n\n`注意` 当你禁用块更改跟踪时，Oracle 会自动删除块更改跟踪文件。\n\n#### 检查数据文件和备份中的损坏\n\n你可以使用 RMAN\
  \ 来检查数据文件、归档重做日志和控制文件中的损坏情况。你还可以验证备份集是否可恢复。RMAN `VALIDATE` 命令用于执行这些类型的完整性检查。运行 `VALIDATE`\
  \ 命令有三种方式：\n\n*   `VALIDATE`\n*   `BACKUP...VALIDATE`\n*   `RESTORE...VALIDATE`\n\
  \n`注意` 独立的 `VALIDATE` 命令在 Oracle 11g 及更高版本中可用。`BACKUP...VALIDATE` 和 `RESTORE...VALIDATE`\
  \ 命令在 Oracle 10g 及更高版本中可用。\n\n### 使用 VALIDATE\n\n`VALIDATE` 命令可独立使用，用于检查数据库数据文件、归档重做日志文件、控制文件、`spfile`\
  \ 和备份集片段中是否存在缺失文件或物理损坏。例如，此命令将验证所有数据文件和控制文件：\n\n```\nRMAN> validate database;\n\
  ```\n\n你也可以只验证控制文件，如下所示：\n\n```\nRMAN> validate current controlfile;\n```\n\n你可以像这样验证归档重做日志文件：\n\
  \n```\nRMAN> validate archivelog all;\n```\n\n你可能希望将所有先前的完整性检查合并为一个命令，如下所示：\n\n\
  ```\nRMAN> validate database include current controlfile plus archivelog;\n```\n\
  \n在正常情况下，`VALIDATE` 命令仅检查物理损坏。你可以通过使用 `CHECK LOGICAL` 子句来指定你还想检查逻辑损坏：\n\n```\nRMAN>\
  \ validate check logical database include current controlfile plus archivelog;\n\
  ```\n\n`VALIDATE` 有多种用途。以下是另外一些示例：\n\n```\nRMAN> validate database skip offline;\n\
  RMAN> validate copy of database;\nRMAN> validate tablespace system;\nRMAN> validate\
  \ datafile 3 block 20 to 30;\nRMAN> validate spfile;\nRMAN> validate backupset <primary_key_value>;\n\
  RMAN> validate recovery area;\n```\n\n如果你使用的是 Oracle 12c 的可插拔数据库功能，你可以验证容器中的特定数据库。以\
  \ `SYS` 身份连接到根容器后，验证任何关联的可插拔数据库：\n\n```\nRMAN> validate pluggable database salespdb;\n\
  ```\n\n如果 RMAN 检测到任何损坏的块，`V$DATABASE_BLOCK_CORRUPTION` 视图将被填充。此视图包含有关文件号、块号和受影响块数的信息。你可以使用此信息来执行块级别的恢复（详情请参见\
  \ 第 6 章）。\n\n`注意` 物理损坏是指块的更改导致其内容与 Oracle 预期的物理格式不匹配。默认情况下，RMAN 在备份、恢复和验证数据文件时会检查物理损坏。对于逻辑损坏，块的格式正确，但其内容与\
  \ Oracle 预期的不一致，例如在行片或索引条目中。\n\n### 使用 BACKUP...VALIDATE\n\n`BACKUP...VALIDATE`\
  \ 命令与 `VALIDATE` 命令非常相似，它可以检查数据文件是否可用以及数据文件是否包含任何损坏的块；例如，\n\n```\nRMAN> backup validate\
  \ database;\n```\n\n\n\n# RMAN 备份与恢复目录管理\n\n## 使用 `BACKUP...VALIDATE` 命令\n\n此命令实际上不会创建任何备份文件；它仅读取数据文件并检查是否损坏。与\
  \ `VALIDATE` 命令类似，`BACKUP VALIDATE` 默认只检查物理损坏。你也可以指示它同时检查逻辑损坏，如下所示：\n\n```\nRMAN>\
  \ backup validate check logical database;\n```\n\n以下是 `BACKUP...VALIDATE` 命令的一些变体：\n\
  \n```\nRMAN> backup validate database current controlfile;\nRMAN> backup validate\
  \ check logical database current controlfile plus archivelog;\n```\n\n同样，与 `VALIDATE`\
  \ 命令类似，`BACKUP...VALIDATE` 如果检测到任何损坏的数据块，将会填充 `V$DATABASE_BLOCK_CORRUPTION` 视图。该视图中的信息可用于确定哪些块可能通过块级恢复进行修复（详见第\
  \ 6 章）。\n\n## 使用 `RESTORE...VALIDATE` 命令\n\n`RESTORE...VALIDATE` 命令用于验证恢复操作中将使用的备份文件。此命令验证备份集、数据文件副本和归档重做日志文件：\n\
  \n```\nRMAN> restore validate database;\n```\n\n使用 `RESTORE...VALIDATE` 时不会实际恢复任何文件。这意味着你可以在数据库处于联机可用状态时运行该命令。\n\
  \n### 使用恢复目录\n\n当你使用恢复目录时，可以在与目标数据库相同的数据库、同一台服务器上创建恢复目录用户。但是，不建议采用这种方法，因为你肯定不希望目标数据库或其所在服务器的可用性影响到恢复目录。因此，你应该在与目标数据库不同的服务器上创建恢复目录数据库。\n\
  \n#### 创建恢复目录\n\n当我使用恢复目录时，我倾向于拥有一个专用的、仅用于恢复目录的数据库。这确保了恢复目录不会受到其他应用程序所需的维护或停机的影响（反之亦然）。\n\
  \n以下是创建恢复目录的步骤：\n\n1.  在与目标数据库不同的服务器上创建一个用于恢复目录的数据库。确保数据库大小足够。我发现 Oracle 推荐的大小通常都太小。以下是一些合适的建议：\n\
  \n    `SYSTEM` 表空间：500MB\n    `SYSAUX` 表空间：500MB\n    `TEMP` 表空间：500MB\n    `UNDO`\
  \ 表空间：500MB\n    在线重做日志：每个 25MB；三组，每组两个成员（多路复用）\n    `RECCAT` 表空间：500MB\n\n2.  创建一个供恢复目录用户使用的表空间。我建议给表空间起一个诸如\
  \ `RECCAT` 这样的名字，以便它能被轻松识别为包含恢复目录元数据的表空间：\n\n    ```\n    CREATE TABLESPACE reccat\n\
  \      DATAFILE '/u01/dbfile/O12C/reccat01.dbf' SIZE 500M\n      EXTENT MANAGEMENT\
  \ LOCAL UNIFORM SIZE 128k\n      SEGMENT SPACE MANAGEMENT AUTO;\n    ```\n\n3. \
  \ 创建一个用户，该用户将拥有用于存储目标数据库元数据的表和其他对象。我建议给恢复目录用户起一个诸如 `RCAT` 这样的名字，以便它能被轻松识别为拥有恢复目录对象的用户。此外，向\
  \ `RCAT` 用户授予 `RECOVERY_CATALOG_OWNER` 角色以及 `CREATE SESSION` 权限：\n\n    ```\n  \
  \  CREATE USER rcat IDENTIFIED BY foo\n    TEMPORARY TABLESPACE temp\n    DEFAULT\
  \ TABLESPACE reccat\n    QUOTA UNLIMITED ON reccat;\n    --\n    GRANT RECOVERY_CATALOG_OWNER\
  \ TO rcat;\n    GRANT CREATE SESSION TO rcat;\n    ```\n\n4.  通过 RMAN 以 `RCAT` 用户身份连接，并创建恢复目录对象：\n\
  \n    ```\n    $ rman catalog rcat/foo\n    ```\n\n5.  现在，运行 `CREATE CATALOG` 命令：\n\
  \n    ```\n    RMAN> create catalog;\n    RMAN> exit;\n    ```\n\n6.  此命令可能需要几分钟才能运行完成。完成后，你可以通过以下查询验证表是否已创建：\n\
  \n    ```\n    $ sqlplus rcat/foo\n    SQL> select table_name from user_tables;\n\
  \    ```\n\n7.  以下是部分输出示例：\n\n\n# Oracle RMAN 恢复目录操作指南\n\n#### 注册目标数据库\n\n现在，您可以将目标数据库注册到恢复目录。登录到目标数据库服务器。确保您可以建立到恢复目录数据库的\
  \ Oracle Net 连接。例如，一种方法是在 `TNS_ADMIN/tnsnames.ora` 文件中填充一个指向远程数据库的条目。\n\n在目标数据库服务器上，按如下方式注册恢复目录：\n\
  \n```\n$ rman target / catalog rcat/foo@rcat\n```\n\n连接时，您应该会看到验证信息，表明您同时连接到了目标数据库和恢复目录：\n\
  \n```\nconnected to target database: O12C (DBID=3423216220)\nconnected to recovery\
  \ catalog database\n```\n\n接下来，运行 `REGISTER DATABASE` 命令：\n\n```\nRMAN> register\
  \ database;\n```\n\n现在，您可以运行备份操作，有关备份任务的元数据将被写入控制文件和恢复目录。确保每次运行 RMAN 命令时都连接到恢复目录以及目标数据库：\n\
  \n```\n$ rman target / catalog rcat/foo@rcat\nRMAN> backup database;\n```\n\n####\
  \ 备份恢复目录\n\n请确保您包含了备份和恢复恢复目录数据库的策略。为了获得最大程度的保护，请确保恢复目录数据库处于归档日志模式，并使用 RMAN 来备份该数据库。\n\
  \n您也可以使用诸如 Data Pump 之类的工具来获取数据库的快照。使用 Data Pump 的缺点是，您可能会丢失在 Data Pump 导出之后创建的恢复目录中的部分信息。\n\
  \n请记住，如果您在恢复目录数据库服务器上遇到完全故障，您仍然可以使用 RMAN 来备份您的目标数据库；只是无法连接到恢复目录。因此，任何指示 RMAN 连接到目标和恢复目录的脚本都必须进行修改。\n\
  \n此外，如果您完全丢失了恢复目录且没有备份，一个选择是从头重新创建它。一旦重新创建，您需要将目标数据库重新注册到恢复目录。您会丢失任何长期的历史恢复目录元数据。\n\
  \n#### 同步恢复目录\n\n您可能遇到网络问题，导致恢复目录无法访问。在此期间，您连接到目标数据库并执行备份操作。一段时间后，网络问题得到解决，您可以再次连接到恢复目录。\n\
  \n在这种情况下，您需要将恢复目录与目标数据库重新同步，以便恢复目录知晓那些未存储在其中的备份操作。运行以下命令以确保恢复目录拥有最新的备份信息：\n\n```\n\
  $ rman target / catalog rcat/foo@rcat\nRMAN> resync catalog;\n```\n\n请记住，仅当您因某种原因在未连接到目录的情况下执行备份操作时，才需要重新同步目录。在正常情况下，您无需运行\
  \ `RESYNC` 命令。\n\n#### 恢复目录版本\n\n我建议您为您正在备份的每个目标数据库版本创建一个恢复目录。这样做可以避免兼容性和升级方面的一些麻烦。我发现，当\
  \ `rman` 客户端的数据库版本与创建目录时使用的版本相同时，使用恢复目录会更容易。\n\n是的，拥有多个版本的恢复目录可能会引起一些混淆。但是，如果您所在的环境中包含多个不同版本的\
  \ Oracle 数据库，那么使用多个恢复目录可能更方便。\n\n#### 删除恢复目录\n\n如果您确定不使用恢复目录并且不再需要其中的数据，可以将其删除。为此，以目录所有者身份连接到恢复目录数据库，并发出\
  \ `DROP CATALOG` 命令：\n\n```\n$ rman catalog rcat/foo\nRMAN> drop catalog;\n```\n\
  \n# RMAN 恢复目录管理与输出日志记录\n\n#### 删除恢复目录\n\n系统会提示如下信息：\n\n```\nrecovery catalog owner\
  \ is RCAT\nenter DROP CATALOG command again to confirm catalog removal\n```\n\n\
  如果再次输入 `DROP CATALOG` 命令，恢复目录中的所有对象都将从恢复目录数据库中删除。\n\n另一种删除目录的方式是删除其所有者。为此，需使用具有\
  \ `DBA` 权限的用户连接到恢复目录，并执行 `DROP USER` 语句：\n\n```\n$ sqlplus system/manager\nSQL>\
  \ drop user rcat cascade;\n```\n\nSQL*Plus 不会再次提示；它会按照您的指示直接删除用户及其对象。再次强调，执行此操作的前提是您确信不再需要恢复目录或其数据。删除用户或恢复目录时请谨慎操作：建议在删除之前，对恢复目录所有者进行\
  \ Data Pump 导出。\n\n## 记录 RMAN 输出\n\n在排查 RMAN 输出问题或检查备份作业状态时，记录 RMAN 的执行内容及每个命令的状态至关重要。有几种记录\
  \ RMAN 输出的方法，有些是 Linux/Unix 操作系统的内置功能，有些是 RMAN 特有的功能：\n\n*   Linux/Unix 重定向输出到文件\n\
  *   Linux/Unix 日志记录命令\n*   RMAN `SPOOL LOG` 命令\n*   `V$RMAN_OUTPUT` 视图\n\n这些日志功能将在接下来的章节中讨论。\n\
  \n### 重定向输出到文件\n\n我几乎所有的 RMAN 备份作业都从 shell 脚本运行。这些脚本通常由 `cron` 等调度工具自动运行。以此方式运行\
  \ RMAN 命令时，我总是通过指示 shell 命令将标准输出消息和标准错误消息重定向到一个日志文件来捕获输出。这是通过重定向（`>`）字符完成的。此示例运行一个\
  \ shell 脚本（`rmanback.bsh`），并将标准输出和标准错误输出都重定向到名为 `rmanback.log` 的日志文件：\n\n```\n$\
  \ rmanback.bsh 1>/home/oracle/bin/log/rmanback.log 2>&1\n```\n\n这里，`1>` 指示将标准输出重定向到指定文件。`2>&1`\
  \ 指示 shell 脚本将标准错误输出发送到与标准输出相同的位置。\n\n![Image](img/sq.jpg)\n> **提示**：有关 DBA 如何使用\
  \ shell 脚本和 Linux 功能的更多详细信息，请参阅 Darl Kuhn 所著的《Linux Recipes for Oracle DBAs》（Apress，2008\
  \ 年）。\n\n### 使用 Linux/Unix 日志记录命令捕获输出\n\n您可以指示 Linux/Unix 创建一个日志文件，以捕获同时显示在屏幕上的任何输出。这可以通过以下两种方式之一完成：\n\
  \n*   `tee`\n*   `script`\n\n#### 使用 `tee` 捕获输出\n\n启动 RMAN 时，可以使用 `tee` 命令将您在屏幕上看到的输出发送到操作系统文本文件：\n\
  \n```\n$ rman | tee /tmp/rman.log\n```\n\n现在，您可以连接到目标数据库并运行命令。所有在屏幕上看到的输出都将被记录到\
  \ `/tmp/rman.log` 文件中：\n\n```\nRMAN> connect target /\nRMAN> backup database;\n\
  RMAN> exit;\n```\n\n当您退出 RMAN 时，`tee` 会话将停止写入日志文件。\n\n#### 使用 `script` 捕获输出\n\n\
  `script` 命令非常有用，因为它指示操作系统将终端上出现的任何输出记录到日志文件。要捕获所有输出，请在连接到 RMAN 之前运行 `script` 命令：\n\
  \n```\n$ script /tmp/rman.log\nScript started, file is /tmp/rman.log\n$ rman target\
  \ /\nRMAN> backup database;\nRMAN> exit;\n```\n\n要结束 `script` 会话，请按 Ctrl+D 或输入 `exit`。`/tmp/rman.log`\
  \ 文件将包含在屏幕上显示的所有输出。当您需要捕获特定时间范围内的所有输出时，`script` 命令非常有用。例如，您可能正在运行 RMAN 命令、退出 RMAN、运行\
  \ SQL*Plus 命令等等。`script` 会话从您启动 `script` 开始，直到您按 Ctrl+D 结束。\n\n### 记录输出到文件\n\n捕获\
  \ RMAN 输出的一种简单方法是使用 `SPOOL LOG` 命令将输出发送到文件。此示例从 RMAN 内部开始记录日志文件：\n\n\n## SPOOL LOG\n\
  通过 `SPOOL LOG` 命令，可以将 RMAN 的输出记录到日志文件中。\n\n```\nRMAN> spool log to '/tmp/rmanout.log'\n\
  RMAN> set echo on;\nRMAN> <run RMAN commands>\nRMAN> spool log off;\n```\n\n默认情况下，`SPOOL\
  \ LOG` 命令会覆盖已有的文件。若想追加到日志文件末尾，请使用 `APPEND` 关键字：\n\n```\nRMAN> spool log to '/tmp/rmanout.log'\
  \ append\n```\n\n在命令行启动 RMAN 时，也可以直接将输出定向到日志文件（此方式会覆盖已有文件）：\n\n```\n$ rman target\
  \ / log /tmp/rmanout.log\n```\n\n同样，也可以选择追加到日志文件：\n\n```\n$ rman target / log /tmp/rmanout.log\
  \ append\n```\n\n当你使用上述 `SPOOL LOG` 示例时，输出会进入文件，而不会显示在终端上。因此，我在交互式运行 RMAN 时几乎从不使用\
  \ `SPOOL LOG`。该命令主要用于从脚本运行 RMAN 时捕获输出。\n\n## 查询输出\n即使没有捕获任何 RMAN 输出，你仍然可以通过查询数据字典来查看最近的\
  \ RMAN 输出。`V$RMAN_OUTPUT` 视图包含了 RMAN 最近报告的消息：\n\n```\nselect sid, recid, output\n\
  from v$rman_output\norder by recid;\n```\n\n`V$RMAN_OUTPUT` 是一个内存中的对象，最多可容纳 32,768\
  \ 行。数据库停止并重启后，此视图中的信息会被清除。当你使用 RMAN 的 `SPOOL LOG` 命令将输出假脱机到文件而无法在终端上查看进度时，这个视图非常方便。\n\
  \n# RMAN 报告\n有几种不同的方法可以报告 RMAN 环境：\n\n*   `LIST` 命令\n*   `REPORT` 命令\n*   通过数据字典视图查询元数据\n\
  \n初次学习 RMAN 时，`LIST` 和 `REPORT` 命令的区别可能令人困惑，因为两者之间的界限并不清晰。一般来说，我使用 `LIST` 命令查看现有备份的信息，使用\
  \ `REPORT` 命令确定哪些文件需要备份，或显示关于过期或失效备份的信息。\n\n对于特殊报告（`LIST` 或 `REPORT` 无法提供）或自动化报告，我会使用\
  \ SQL 查询。例如，我通常会通过一个 Shell 脚本和 SQL 来实现自动化检查，报告 RMAN 备份在过去一天内是否运行过。\n\n## 使用 LIST\n\
  在调查 RMAN 备份问题时，我通常首先连接到目标数据库并运行 `LIST BACKUP` 命令。此命令允许你查看备份集、备份片以及备份中包含的文件：\n\n\
  ```\nRMAN> list backup;\n```\n\n该命令显示存储库中记录的所有 RMAN 备份。你可能希望将备份列表输出到一个文件，以便保存输出，然后使用操作系统编辑器在其中搜索特定字符串。\n\
  \n要获取备份信息的汇总视图，请使用 `LIST BACKUP SUMMARY` 命令：\n\n```\nRMAN> list backup summary;\n\
  ```\n\n你也可以使用 `LIST` 命令仅报告映像副本信息：\n\n```\nRMAN> list copy;\n```\n\n要列出所有已备份的文件及相关的备份集，请执行以下命令：\n\
  \n```\nRMAN> list backup by file;\n```\n\n以下命令显示磁盘上的归档重做日志：\n\n```\nRMAN> list archivelog\
  \ all;\nRMAN> list copy of archivelog all;\n```\n\n而以下命令列出了归档重做日志的备份（以及哪些归档重做日志包含在哪个备份片中）：\n\
  \n```\nRMAN> list backup of archivelog all;\n```\n\n运行 `LIST` 命令（同样，也适用于下一节将要介绍的\
  \ `REPORT` 命令）的方式有很多种。前面提到的方法是最常用的。有关选项的完整列表，请参阅 Oracle 网站技术网络区 (`http://otn.oracle.com`)\
  \ 提供的《Oracle Database Backup and Recovery Reference Guide》。\n\n## 使用 REPORT\nRMAN\
  \ 的 `REPORT` 命令可用于报告各种详细信息。你可以快速查看与数据库关联的所有数据文件，如下所示：\n\n```\nRMAN> report schema;\n\
  ```\n\n`REPORT` 命令提供有关通过 RMAN 保留策略标记为过时的备份的详细信息；例如：\n\n```\nRMAN> report obsolete;\n\
  ```\n\n你可以根据保留策略报告需要备份的数据文件，像这样：\n\n```\nRMAN> report need backup;\n```\n\n报告需要备份的数据文件有多种方式。以下是一些其他示例：\n\
  \n```\nRMAN> report need backup redundancy 2;\nRMAN> report need backup redundancy\
  \ 2 datafile 2;\n```\n\n`REPORT` 命令还可用于报告从未备份过或可能包含由 `NOLOGGING` 操作创建的数据的数据文件。例如，假设你直接路径加载数据到一个表中，而该表所在的数据文件尚未备份。以下命令将检测这些情况：\n\
  \n```\nRMAN> report unrecoverable;\n```\n\n## 使用 SQL\n有许多数据字典视图可用于查询备份信息。表 5-1 描述了与\
  \ RMAN 相关的数据字典视图。无论你是否使用恢复目录，这些视图都是可用的（这些视图中的信息源自控制文件）。\n\n表 5-1 RMAN 备份数据字典视图描述\n\
  \n| 视图名称 | 提供的信息 |\n| --- | --- |\n| `V$RMAN_BACKUP_JOB_DETAILS` | RMAN 备份作业 |\n\
  | `V$BACKUP` | 处于备份模式的联机数据文件的备份状态（用于热备份） |\n| `V$BACKUP_ARCHIVELOG_DETAILS` | 已备份的归档日志\
  \ |\n| `V$BACKUP_CONTROLFILE_DETAILS` | 已备份的控制文件 |\n| `V$BACKUP_COPY_DETAILS` |\
  \ 控制文件和数据文件副本 |\n| `V$BACKUP_DATAFILE` | 已备份的控制文件和数据文件 |\n| `V$BACKUP_DATAFILE_DETAILS`\
  \ | 在备份集、映像副本和代理副本中备份的数据文件 |\n| `V$BACKUP_FILES` | 已备份的数据文件、控制文件、`spfile` 和归档重做日志\
  \ |\n| `V$BACKUP_PIECE` | 备份片文件 |\n| `V$BACKUP_PIECE_DETAILS` | 备份片详细信息 |\n| `V$BACKUP_SET`\
  \ | 备份集 |\n| `V$BACKUP_SET_DETAILS` | 备份集详细信息 |\n\n有时，刚接触 RMAN 的 DBA 很难理解备份、备份集、备份片和数据文件的概念以及它们之间的关系。在讨论\
  \ RMAN 备份组件时，我发现以下查询很有用。此查询将显示备份集、备份集内的备份片以及备份片内备份的数据文件：\n\n```\nSET LINES 132 PAGESIZE\
  \ 100\nBREAK ON REPORT ON bs_key ON completion_time ON bp_name ON file_name\nCOL\
  \ bs_key    FORM 99999 HEAD \"BS Key\"\nCOL bp_name   FORM a40   HEAD \"BP Name\"\
  \nCOL file_name FORM a40   HEAD \"Datafile\"\n--\nSELECT\n s.recid             \
  \     bs_key\n,TRUNC(s.completion_time) completion_time\n,p.handle             \
  \    bp_name\n,f.name                   file_name\nFROM v$backup_set      s\n  \
  \  ,v$backup_piece    p\n    ,v$backup_datafile d\n    ,v$datafile        f\nWHERE\
  \ p.set_stamp = s.set_stamp\nAND   p.set_count = s.set_count\nAND   d.set_stamp\
  \ = s.set_stamp\nAND   d.set_count = s.set_count\nAND   d.file#     = f.file#\n\
  ORDER BY\n s.recid\n,p.handle\n,f.name;\n```\n\n这里的输出已缩短以适应页面：\n\n```\nS Key COMPLETIO\
  \ BP Name                                    Datafile\n------ --------- ------------------------------------------\
  \ ------------------------------------\n    11 28-SEP-14 /u01/O12C/rman/O12C_0cpjkl6h_1_1.bk\
  \        /u01/dbfile/O12C/inv_mgmt_data01.dbf\n                                \
  \                      /u01/dbfile/O12C/reg_index01.dbf\n                      \
  \                                /u01/dbfile/O12C/tools01.dbf\n                \
  \                                      /u01/dbfile/O12C/undotbs01.dbf\n        \
  \                                              /u01/dbfile/O12C/users01.dbf\n```\n\
  \n有时，报告 RMAN 备份的性能很有用。以下查询报告了每个会话执行 RMAN 备份所花费的时间。\n\n\n# RMAN 备份与恢复\n\n以下是 SQL\\\
  *Plus 中用于格式化 RMAN 备份报告查询输出的命令：\n\n```\nCOL hours              FORM 9999.99\nCOL\
  \ time_taken_display FORM a20\nSET LINESIZE 132\n--\nSELECT\n session_recid\n,compression_ratio\n\
  ,time_taken_display\n,(end_time - start_time) * 24 as hours\n,TO_CHAR(end_time,'dd-mon-yy\
  \ hh24:mi') as end_time\nFROM v$rman_backup_job_details\nORDER BY end_time;\n```\n\
  \n以下是一些示例输出：\n\n```\nSESSION_RECID COMPRESSION_RATIO TIME_TAKEN_DISPLAY      HOURS\
  \ END_TIME\n------------- ----------------- -------------------- -------- ------------------------\n\
  \            3        2.03556203 00:00:18                  .00 28-sep-14 11:03\n\
  \            6        7.81358269 00:00:25                  .01 28-sep-14 11:06\n\
  \           14        10.7638918 00:00:19                  .01 28-sep-14 11:07\n\
  ```\n\n`V$RMAN_BACKUP_JOB_DETAILS` 的内容是按 RMAN 的会话连接进行汇总的。因此，如果你连接到 RMAN（建立一个会话），然后在备份作业完成后退出\
  \ RMAN，报告输出会更准确。如果你在运行多个备份作业时保持连接到 RMAN，查询输出会报告该会话连接期间的所有备份活动。\n\n你应该有一个自动化的方法来检测\
  \ RMAN 备份是否正在运行以及数据文件是否正在被备份。自动化此类任务的一个可靠方法是将 SQL 嵌入到 shell 脚本中，然后使用像 `cron` 这样的调度工具定期运行该脚本。\n\
  \n关于 RMAN 备份，我通常进行两种基本类型的检查：\n\n*   RMAN 备份最近运行过吗？\n*   是否有任何数据文件最近没有被备份？\n\n以下\
  \ shell 脚本检查这些情况。你需要修改脚本，为其提供一个能够查询脚本中引用的数据字典对象的用户的用户名和密码，并更改消息发送到的电子邮件地址。运行脚本时，你需要传入两个变量：Oracle\
  \ SID 和你想检查的备份上次运行或数据文件被备份的天数阈值。\n\n```\n#!/bin/bash\n#\nif [ $# -ne 2 ]; then\n\
  \  echo \"Usage: $0 SID threshold\"\n  exit 1\nfi\n"
- "# source oracle OS variables\nexport ORACLE_SID=O12C\nexport ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1\n\
  export PATH=$PATH:$ORACLE_HOME/bin\ncrit_var=$(sqlplus -s <<EOF\n/ as sysdba\nSET\
  \ HEAD OFF FEEDBACK OFF\nSELECT COUNT(*) FROM\n(SELECT (sysdate - MAX(end_time))\
  \ delta\n FROM v\\$rman_backup_job_details) a\nWHERE a.delta > $2;\nEOF)\n#\nif\
  \ [ $crit_var -ne 0 ]; then\n  echo \"rman backups not running on $1\" | mailx -s\
  \ \"rman problem\" dkuhn@gmail.com\nelse\n  echo \"rman backups ran ok\"\nfi\n#--------------------------------------------\n\
  crit_var2=$(sqlplus -s <<EOF\n/ as sysdba\nSET HEAD OFF FEEDBACK OFF\nSELECT COUNT(*)\n\
  FROM\n(\nSELECT name\nFROM v\\$datafile\nMINUS\nSELECT DISTINCT\n f.name\nFROM v\\\
  $backup_datafile d\n    ,v\\$datafile        f\nWHERE d.file#     = f.file#\nAND\
  \   d.completion_time > sysdate - $2);\nEOF)\n#\nif [ $crit_var2 -ne 0 ]; then\n\
  \  echo \"datafile not backed up on $1\" | mailx -s \"backup problem\" dkuhn@gmail.com\n\
  else\n  echo \"datafiles are backed up...\"\nfi\n#\nexit 0\n```\n\n例如，要检查备份在过去 2\
  \ 天内是否成功运行，请运行该脚本（名为 `rman_chk.bsh`）：\n\n```\n$ rman_chk.bsh O12c 2\n```\n\n前面的脚本是基础的，但很有效。你可以根据你的\
  \ RMAN 环境需要对其进行增强。\n\n### 总结\n\nRMAN 为备份提供了许多灵活且功能丰富的选项。默认情况下，RMAN 仅备份数据库中已修改的块。增量功能允许你仅备份自上次备份以来修改过的块。这些增量功能在大型数据库环境中特别有用，可以减少备份的大小，因为这类环境中数据库中只有很小比例的数据在每次备份之间发生变化。\n\
  \n你可以指示 RMAN 通过映像副本备份每个数据文件中的每个块。映像副本是数据文件逐块相同的副本。映像副本的优点是能够直接从备份中恢复备份文件（无需使用 RMAN）。你可以使用增量更新备份功能来实现映像副本备份和增量备份的有效混合。\n\
  \nRMAN 包含用于报告备份许多方面的内置命令。`LIST` 命令报告备份活动。`REPORT` 命令对于根据保留策略确定哪些文件需要备份非常有用。\n\n\
  在你成功配置 RMAN 并创建备份之后，你就可以在发生介质故障时恢复和恢复你的数据库。恢复和恢复的主题将在下一章详细说明。\n\n# 第六章\n\n![image](img/frontdot.jpg)\n\
  \n## RMAN 恢复与恢复\n\n几年前的一个周六早上，我正在进行一次长距离骑行。大约骑到一半时，我的手机响了。是数据中心的一个运维支持技术员。他告诉我一个关键业务数据库服务器行为异常，我应该尽快登录并确保一切正常。我告诉他，我大约\
  \ 15 分钟后才能登录。于是，我尽可能快地赶回家检查那台生产机器。当我回到家登录到数据库服务器时，我尝试启动 SQL\\*Plus，却立即收到一个错误，提示\
  \ SQL\\*Plus 二进制文件已损坏。太好了。我甚至无法登录 SQL\\*Plus。这可不妙。\n\n![Image](img/sq.jpg)  **切记**\
  \  确保所有的自行车骑行都在手机信号覆盖范围之外进行。 – 编者注。\n\n我让系统管理员从操作系统备份中恢复了 Oracle 二进制文件。我启动了 SQL\\\
  *Plus。数据库已经崩溃，所以我尝试启动它。输出表明所有数据文件都存在介质故障。经过一些分析，发现之前存在一些文件系统问题，磁盘上的所有这些文件都已损坏：\n\
  \n*   数据文件\n*   控制文件\n*   归档重做日志\n*   在线重做日志文件\n*   RMAN 备份片\n\n这几乎是一场彻底的灾难。我的总监询问我们的选择。我回答说：“我们所要做的就是从上次的磁带备份中恢复数据库，我们将丢失那些尚未备份到磁带的归档重做日志中所包含的任何数据。”\n\
  \n存储管理员被召集进来，并被指示恢复最后写入磁带的一组 RMAN 备份。大约 15 分钟后，我们可以听到磁带管理员们在低声交谈。其中一人说：“我们完蛋了。这台机器上任何数据库的\
  \ RMAN 磁带备份都没有。”\n\n那是一个黑暗的时刻。最坏的情况是从 DDL 脚本重建数据库并丢失 3 年的生产数据。这不是一个非常容易接受的选项。\n\n\
  在检查了生产机器之后，我发现之前的支持 DBA（讽刺的是，他几天前刚因预算削减被解雇）实现了一个作业，将 RMAN 备份复制到生产环境中的另一台服务器上。那台其他服务器上的\
  \ RMAN 备份是完好无损的。我能够从这些备份中恢复和恢复生产数据库。我们丢失了大约一天的数据（在损坏的归档日志和停机期间，期间不允许传入事务），但在最初的电话呼叫大约\
  \ 20 小时后，我们成功地恢复并恢复了数据库。那是漫长的一天。\n\n大多数需要你进行恢复和恢复的情况都不会像刚才描述的那么糟糕。然而，前面的场景确实凸显了对以下内容的需求：\n\
  \n*   一个备份策略\n*   一个具备 B&R 技能的 DBA\n*   一个恢复与恢复策略，包括定期测试恢复和恢复的要求\n\n\n# 通过 RMAN\
  \ 执行恢复与修复\n\n本章将引导你使用 RMAN 完成恢复与修复操作。本章涵盖了处理介质故障时需要执行的许多常见任务。\n\n### 确定是否需要介质恢复\n\
  \n术语**介质恢复**是指恢复因底层存储介质（通常是某种磁盘）故障或文件被意外删除而丢失或损坏的文件。通常，你会通过类似以下的错误得知需要介质恢复：\n\n\
  ```\nORA-01157: cannot identify/lock data file 1 - see DBWR trace file\nORA-01110:\
  \ data file 1: '/u01/dbfile/O12C/system01.dbf'\n```\n\n在执行数据库管理任务（如停止和启动数据库）时，此错误可能会显示在屏幕上。或者，你可能会在跟踪文件或\
  \ `alert.log` 文件中看到此类错误。如果你没有立即注意到问题，在严重的介质故障情况下，数据库将停止处理事务，用户就会开始给你打电话。\n\n要理解\
  \ Oracle 如何确定需要介质恢复，你必须首先理解 Oracle 如何确定一切正常。当 Oracle 正常关闭（`IMMEDIATE`、`TRANSACTIONAL`、`NORMAL`）时，关闭过程的一部分是将所有已修改的块（在内存中）刷新到磁盘，在每个数据文件的头部标记当前的系统变更号（SCN），并用当前\
  \ SCN 信息更新控制文件。\n\n启动时，Oracle 会检查控制文件中的 SCN 是否与数据文件头部的 SCN 匹配。如果匹配，Oracle 尝试打开数据文件和在线重做日志文件。如果所有文件都可用且可以打开，Oracle\
  \ 将正常启动。以下查询比较了控制文件中（针对每个数据文件）的 SCN 与数据文件头部中的 SCN：\n\n```\nSET LINES 132\nCOL name\
  \             FORM a40\nCOL status           FORM A8\nCOL file#            FORM\
  \ 9999\nCOL control_file_SCN FORM 999999999999999\nCOL datafile_SCN     FORM 999999999999999\n\
  --\nSELECT\n a.name\n,a.status\n,a.file#\n,a.checkpoint_change# control_file_SCN\n\
  ,b.checkpoint_change# datafile_SCN\n,CASE\n   WHEN ((a.checkpoint_change# - b.checkpoint_change#)\
  \ = 0) THEN 'Startup Normal'\n   WHEN ((b.checkpoint_change#) = 0)             \
  \           THEN 'File Missing?'\n   WHEN ((a.checkpoint_change# - b.checkpoint_change#)\
  \ > 0) THEN 'Media Rec. Req.'\n   WHEN ((a.checkpoint_change# - b.checkpoint_change#)\
  \ < 0) THEN 'Old Control File'\n   ELSE 'what the ?'\n END datafile_status\nFROM\
  \ v$datafile        a -- control file SCN for datafile\n    ,v$datafile_header b\
  \ -- datafile header SCN\nWHERE a.file# = b.file#\nORDER BY a.file#;\n```\n\n如果控制文件\
  \ SCN 值大于数据文件 SCN 值，则很可能需要介质恢复。如果你从备份中还原了数据文件，并且还原的数据文件中的 SCN 小于当前控制文件中数据文件的 SCN，就会出现这种情况。\n\
  \n![Image](img/sq.jpg) **提示** `V$DATAFILE_HEADER` 视图使用磁盘上的物理数据文件作为其源。`V$DATAFILE`\
  \ 视图使用控制文件作为其源。\n\n你也可以直接查询 `V$DATAFILE_HEADER` 以获取更多信息。`ERROR` 和 `RECOVER` 列报告任何潜在问题。例如，`RECOVER`\
  \ 列中的 `YES` 或 `null` 值表示存在问题：\n\n```\nSQL> select file#, status, error, recover\
  \ from v$datafile_header;\n```\n\n以下是一些示例输出：\n\n```\n     FILE# STATUS  ERROR  \
  \              REC\n---------- ------- -------------------- ---\n         1 ONLINE\
  \  FILE NOT FOUND\n         2 ONLINE                       NO\n         3 ONLINE\
  \                       NO\n```\n\n### 确定要恢复的内容\n\n介质恢复需要你执行手动任务以使数据库恢复完整。这些任务通常涉及\
  \ `RESTORE` 和 `RECOVER` 命令的组合使用。如果由于某种原因（文件被意外删除、磁盘故障等）导致数据文件发生介质故障，你将需要发出 RMAN\
  \ `RESTORE` 命令。\n\n### 流程工作原理\n\n当你发出 `RESTORE` 命令时，RMAN 会自动决定如何从以下任何可用备份中提取数据文件：\n\
  \n*   完全数据库备份\n*   增量级别 0 备份\n*   由 `BACKUP AS COPY` 命令生成的映像副本备份\n\n文件从备份中还原后，你需要通过\
  \ `RECOVER` 命令对其应用重做。当你发出 `RECOVER` 命令时，Oracle 会检查受影响数据文件中的 SCN，并确定其中任何文件是否需要恢复。如果数据文件中的\
  \ SCN 小于控制文件中对应的 SCN，则将需要介质恢复。\n\nOracle 检索数据文件 SCN，然后在重做流中查找对应的 SCN，以确定从何处开始恢复过程。如果起始恢复\
  \ SCN 在线重做日志文件中，则不需要归档重做日志文件进行恢复。\n\n在恢复期间，RMAN 会自动确定如何应用重做。首先，RMAN 应用任何大于级别 0 的可用增量备份，例如增量级别\
  \ 1。接下来，应用磁盘上的任何归档重做日志文件。如果归档重做日志文件在磁盘上不存在，RMAN 会尝试从备份集中检索它们。\n\n要能够执行完全恢复，需要满足以下所有条件：\n\
  \n*   你的数据库处于归档日志模式。\n*   你拥有数据库的良好基线备份。\n*   你拥有自备份以来生成的任何所需重做（归档重做日志文件、在线重做日志文件，或\
  \ RMAN 可以用于恢复而不是应用重做的增量备份）。\n\n存在多种多样的恢复场景。你如何恢复直接取决于你的备份策略以及哪些文件已损坏。以下是面对介质故障时应遵循的一般步骤：\n\
  \n1.  确定需要还原的文件。\n2.  根据损坏情况，将数据库模式设置为 `nomount`、`mount` 或 `open`。\n3.  使用 `RESTORE`\
  \ 命令从 RMAN 备份中检索文件。\n4.  对需要恢复的数据文件使用 `RECOVER` 命令。\n5.  打开你的数据库。\n\n你特定的恢复场景可能不需要执行所有上述步骤。例如，你可能只想还原\
  \ `spfile`，这就不需要恢复步骤。\n\n恢复过程的第一步是确定哪些文件经历了介质故障。你通常可以从以下来源确定需要还原的文件：\n\n*   屏幕上显示的错误消息，来自\
  \ RMAN 或 SQL*Plus\n*   `Alert.log` 文件及相应的跟踪文件\n*   数据字典视图\n\n如果你使用的是 Oracle 11g\
  \ 或更高版本，除了前面列出的方法外，你应考虑使用数据恢复顾问来获取有关故障范围及相应纠正措施的信息。\n\n### 使用数据恢复顾问\n\n数据恢复顾问工具在\
  \ Oracle 11g 中引入。在发生介质故障时，此工具将显示故障详情、建议纠正措施，并在你指定时执行建议的措施。这就像在恢复情况下拥有另一双眼睛提供反馈一样。数据恢复顾问有四种模式：\n\
  \n*   列出故障\n*   建议纠正措施\n*   运行命令修复故障\n*   更改故障状态\n\n数据恢复顾问从 RMAN 中调用。你可以将数据恢复顾问视为一组在处理介质故障时可以协助你的\
  \ RMAN 命令。\n\n### 列出故障\n\n使用数据恢复顾问时，`LIST FAILURE` 命令用于显示数据文件、控制文件或在线重做日志的任何问题：\n\
  \n```\nRMAN> list failure;\n```\n\n\n\n![Image](img/sq.jpg) **提示** 如果您怀疑存在介质故障，但数据恢复顾问（Data\
  \ Recovery Advisor）并未报告任何问题，可以运行 `VALIDATE DATABASE` 命令来验证数据库的完整性。\n\n如果没有检测到故障，您将看到一条消息，表明没有故障。以下是一些示例输出，表明数据文件可能存在问题：\n\
  \n```\nList of Database Failures\n=========================\n\nFailure ID Priority\
  \ Status    Time Detected Summary\n---------- -------- --------- ------------- -------\n\
  6222       CRITICAL OPEN      12-JAN-14     System datafile 1:\n '/u01/dbfile/O12C/system01.dbf'\
  \ is missing\n```\n\n要显示有关故障的更多信息，请使用 `DETAIL` 子句：\n\n```\nRMAN> list failure 6222\
  \ detail;\n```\n\n以下是此示例的附加输出：\n\n```\nImpact: Database cannot be opened\n```\n\n\
  对于此类故障，前面的输出表明数据库无法打开。\n\n**提出纠正措施**\n\n`ADVISE FAILURE` 命令提供有关如何恢复数据恢复顾问检测到的潜在问题的建议。如果数据库存在多个故障，您可以直接指定故障\
  \ ID 以获取针对特定故障的建议，如下所示：\n\n```\nRMAN> advise failure 6222;\n```\n\n以下是针对此特定问题的部分输出：\n\
  \n```\nOptional Manual Actions\n=======================\n1\\. If file /u01/dbfile/O12C/system01.dbf\
  \ was unintentionally renamed or moved,\nrestore it\n\nAutomated Repair Options\n\
  ========================\nOption Repair Description\n------ ------------------\n\
  1      Restore and recover datafile 1\n  Strategy: The repair includes complete\
  \ media recovery with no data loss\n  Repair script: /ora01/app/oracle/diag/rdbms/O12C/O12C/hm/reco_4116328280.hm\n\
  ```\n\n在这种情况下，数据恢复顾问创建了一个可用于潜在修复问题的脚本。可以使用操作系统实用程序查看修复脚本的内容；例如，\n\n```\n$ cat /ora01/app/oracle/diag/rdbms/O12C/O12C/hm/reco_4116328280.hm\n\
  ```\n\n以下是此示例的脚本内容：\n\n```\n"
- "# restore and recover datafile\nrestore ( datafile 1 );\nrecover datafile 1;\n\
  sql 'alter database datafile 1 online';\n```\n\n检查脚本后，您可以决定手动运行建议的命令，也可以让数据恢复顾问通过\
  \ `REPAIR` 命令运行脚本（详见下一节）。\n\n**修复故障**\n\n如果您已识别故障并查看了建议，则可以继续进行修复工作。如果您想在不实际运行命令的情况下检查\
  \ `REPAIR FAILURE` 命令将执行的操作，请使用 `PREVIEW` 子句：\n\n```\nRMAN> repair failure preview;\n\
  ```\n\n在运行 `REPAIR FAILURE` 命令之前，请确保您首先在同一连接会话中运行了 `LIST FAILURE` 和 `ADVISE FAILURE`\
  \ 命令。换句话说，您所在的 RMAN 会话必须在运行 `REPAIR` 命令之前，在同一会话中运行过 `LIST` 和 `ADVISE` 命令。\n\n如果您对修复建议满意，则运行\
  \ `REPAIR FAILURE` 命令：\n\n```\nRMAN> repair failure;\n```\n\n此时系统将提示您确认：\n\n```\n\
  Do you really want to execute the above repair (enter YES or NO)?\n```\n\n输入 `YES`\
  \ 以继续：\n\n```\nYES\n```\n\n如果一切顺利，您应该在输出中看到类似以下的最终消息：\n\n```\nrepair failure complete\n\
  ```\n\n![Image](img/sq.jpg) **注意** 您可以从 RMAN 命令提示符或 Enterprise Manager 运行数据恢复顾问命令。\n\
  \n通过这种方式，您可以使用 RMAN 命令 `LIST FAILURE`、`ADVISE FAILURE` 和 `REPAIR FAILURE` 来解决介质故障。\n\
  \n**更改故障状态**\n\n关于数据恢复顾问的最后一点说明：如果您知道有一个故障，并且它不是关键性的（例如，从一个不再使用的表空间中丢失了数据文件），那么可以使用\
  \ `CHANGE FAILURE` 命令来更改故障的优先级。在此示例中，有一个属于非关键表空间的丢失数据文件。首先，通过 `LIST FAILURE` 命令获取故障优先级：\n\
  \n```\nRMAN> list failure;\n```\n\n以下是一些示例输出：\n\n```\nFailure ID Priority Status    Time\
  \ Detected Summary\n---------- -------- --------- ------------- -------\n5          HIGH    \
  \ OPEN      12-JAN-14     One or more non-system datafiles\n                                            are\
  \ missing\n```\n\n接下来，使用 `CHANGE FAILURE` 命令将优先级从 `HIGH` 更改为 `LOW`：\n\n```\nRMAN>\
  \ change failure 5 priority low;\n```\n\n系统将提示您确认是否确实要更改优先级：\n\n```\nDo you really\
  \ want to change the above failures (enter YES or NO)?\n```\n\n如果您确实要更改优先级，请键入 `YES`，然后按回车键。如果再次运行\
  \ `LIST FAILURE` 命令，您将看到优先级现已更改为 `LOW`：\n\n```\nRMAN> list failure low;\n```\n\n\
  **使用 RMAN 停止/启动 Oracle**\n\n您可以使用 RMAN 以几乎与 SQL*Plus 相同的方法来停止和启动数据库。在执行恢复和修复操作时，从\
  \ RMAN 内部停止和启动数据库通常更为方便。以下 RMAN 命令可用于停止和启动数据库：\n\n*   `SHUTDOWN`\n*   `STARTUP`\n\
  *   `ALTER DATABASE`\n\n**关闭数据库**\n\n`SHUTDOWN` 命令在 RMAN 中的工作方式与在 SQL*Plus 中相同。有四种关闭类型：`ABORT`、`IMMEDIATE`、`NORMAL`\
  \ 和 `TRANSACTIONAL`。我通常首先尝试使用 `SHUTDOWN IMMEDIATE` 来停止数据库；如果这不起作用，请毫不犹豫地使用 `SHUTDOWN\
  \ ABORT`。以下是一些示例：\n\n```\nRMAN> shutdown immediate;\nRMAN> shutdown abort;\n```\n\
  \n如果不指定关闭选项，则 `NORMAL` 是默认值。使用 `NORMAL` 关闭数据库很少可行，因为此模式会等待当前连接的用户在闲暇时断开连接。我从不使用\
  \ `NORMAL` 来关闭数据库。\n\n**启动数据库**\n\n与 SQL*Plus 一样，您可以组合使用 RMAN 中的 `STARTUP` 和 `ALTER\
  \ DATABASE` 命令，使数据库逐步完成启动阶段，如下所示：\n\n```\nRMAN> startup nomount;\nRMAN> alter database\
  \ mount;\nRMAN> alter database open;\n```\n\n这是另一个示例：\n\n```\nRMAN> startup mount;\n\
  RMAN> alter database open;\n```\n\n如果要以受限访问方式启动数据库，请使用 DBA 选项：\n\n```\nRMAN> startup\
  \ dba;\n```\n\n![Image](img/sq.jpg) **提示** 从 Oracle 12c 开始，您可以直接从 RMAN 内部运行所有 SQL\
  \ 语句，而无需指定 RMAN `sql` 命令。\n\n**完全恢复**\n\n如第 3 章所述，术语 *完全恢复* 表示您可以恢复在故障发生之前已提交的所有事务。*完全恢复*\
  \ 并不意味着您正在恢复和修复数据库中的所有数据文件。例如，如果您有一个数据文件发生介质故障，并且您恢复和修复了该数据文件，那么您就是在执行完全恢复。对于完全恢复，必须满足以下条件：\n\
  \n*   您的数据库处于归档日志模式（archivelog mode）。\n*   您拥有发生介质故障的数据文件的良好基线备份。\n*   您拥有自上次备份以来生成的任何必需重做日志。\n\
  *   所有归档重做日志从上次备份开始时即存在。\n*   RMAN 可用于恢复的任何增量备份都可用（如果使用）。\n*   包含尚未归档的事务的联机重做日志可用。\n\
  \n如果您遇到了介质故障，并且拥有执行完全恢复所需的文件，则可以恢复和修复数据库。\n\n**测试恢复与修复**\n\n\n\n## 预览用于恢复的备份\n\n\
  在实际执行还原和恢复操作之前，你可以确定 `RMAN` 将使用哪些文件进行还原和恢复。你还可以指示 `RMAN` 验证将用于还原和恢复的备份文件的完整性。\n\n\
  使用 `RESTORE...PREVIEW` 命令可列出 `RMAN` 将用于还原和恢复数据库数据文件的备份和归档重做日志文件。`RESTORE...PREVIEW`\
  \ 命令实际上并不还原任何文件，而是列出将用于还原操作的备份文件。此示例详细预览了整个数据库还原和恢复所需的备份：\n\n```\nRMAN> restore\
  \ database preview;\n```\n\n你还可以在汇总详细信息级别预览所需的备份文件：\n\n```\nRMAN> restore database\
  \ preview summary;\n```\n\n以下是输出内容的片段：\n\n```\n备份列表\n===============\n密钥     类型\
  \ LVL S  设备类型 完成时间       份数  副本数 压缩  标签\n------- -- -- -  --------- ---------------\
  \ ------- ------- -------- ---\n12      B  0  A DISK        28-9 月 -14      1  \
  \     1       是      TAG20140928T110657\n11      B  0  A DISK        28-9 月 -14\
  \      1       1       是      TAG20140928T110657\n```\n\n以下是如何预览还原和恢复所需备份的更多示例：\n\
  \n```\nRMAN> restore tablespace system preview;\nRMAN> restore archivelog from time\
  \ 'sysdate -1' preview;\nRMAN> restore datafile 1, 2, 3 preview;\n```\n\n## 在还原前验证备份文件\n\
  \n你可以在不实际还原任何内容的情况下，对备份文件执行多个级别的验证。如果你只想让 `RMAN` 验证文件是否存在并检查文件头，请使用 `RESTORE...VALIDATE\
  \ HEADER` 命令，如下所示：\n\n```\nRMAN> restore database validate header;\n```\n\n此命令仅验证备份文件的存在性并检查文件头。你可以通过\
  \ `RESTORE...VALIDATE` 命令（不带 `HEADER` 子句）进一步指示 `RMAN` 验证还原数据库数据文件所需的备份文件内的块的完整性。同样，在此模式下\
  \ `RMAN` 不会还原任何数据文件：\n\n```\nRMAN> restore database validate;\n```\n\n此命令仅检查备份文件内的物理损坏。你也可以同时检查逻辑损坏（和物理损坏），如下所示：\n\
  \n```\nRMAN> restore database validate check logical;\n```\n\n以下是使用 `RESTORE...VALIDATE`\
  \ 的其他一些示例：\n\n```\nRMAN> restore datafile 1,2,3 validate;\nRMAN> restore archivelog\
  \ all validate;\nRMAN> restore controlfile validate;\nRMAN> restore tablespace system\
  \ validate;\n```\n\n## 测试介质恢复\n\n前面的部分涵盖了报告和验证还原操作。你还可以通过 `RECOVER...TEST` 命令指示\
  \ `RMAN` 验证恢复过程。在执行测试恢复之前，你需要确保正在恢复的数据文件处于脱机状态。Oracle 会对任何在测试模式下恢复的联机数据文件抛出错误。\n\
  \n在此示例中，首先还原了 `USERS` 表空间，然后执行了试运行恢复：\n\n```\nRMAN> connect target /\nRMAN> startup\
  \ mount;\nRMAN> restore tablespace users;\nRMAN> recover tablespace users test;\n\
  ```\n\n如果恢复所需的任何归档重做日志缺失，则会抛出以下错误：\n\n```\nRMAN-06053: 由于缺少日志，无法执行介质恢复\nRMAN-06025:\
  \ 没有序列号为 6 的线程 1 的归档日志备份...\n```\n\n如果恢复测试成功，你将看到类似以下的消息，表明重做应用已被测试但未实际应用：\n\n```\n\
  ORA-10574: 测试恢复未损坏任何数据块\nORA-10573: 测试恢复测试了从更改 4586939 到 4588462 的重做\nORA-10572:\
  \ 由于错误，测试恢复已取消\nORA-10585: 测试恢复无法应用可能修改控制文件的重做\n```\n\n以下是测试恢复过程的一些其他示例：\n\n```\n\
  RMAN> recover database test;\nRMAN> recover tablespace users, tools test;\nRMAN>\
  \ recover datafile 1,2,3 test;\n```\n\n## 还原和恢复整个数据库\n\n`RESTORE DATABASE` 命令将还原数据库中的每个数据文件。例外情况是当\
  \ `RMAN` 检测到数据文件已被还原时；在这种情况下，它不会再次还原它们。如果你想覆盖该行为，请使用 `FORCE` 命令。\n\n当你发出 `RECOVER\
  \ DATABASE` 命令时，`RMAN` 会自动将重做应用到任何需要恢复的数据文件。恢复过程包括应用在以下文件中发现的更改：\n*   增量备份片（仅在使用增量备份时适用）\n\
  *   自上次备份或应用的增量备份以来生成的归档重做日志文件\n*   联机重做日志文件（当前且未归档）\n\n在还原和恢复过程完成后，你可以打开数据库。完整的数据库恢复仅在你拥有数据库的良好备份以及对备份后生成的所有重做的访问权限时才有效。你需要所有恢复数据库数据文件所需的重做。如果你没有所有必需的重做，那么你很可能必须执行不完全恢复（请参阅本章后面的“不完全恢复”部分）。\n\
  \n![Image](img/sq.jpg) **注意** 你的数据库必须至少处于装载状态才能使用 `RMAN` 还原数据文件。这是因为在还原和恢复过程中，`RMAN`\
  \ 从控制文件中读取信息。\n\n你可以使用当前控制文件或备份控制文件执行完整的数据库级恢复。\n\n### 使用当前控制文件\n\n你必须首先将数据库置于装载模式以执行数据库范围的还原和恢复。这是因为当与\
  \ `SYSTEM` 表空间关联的数据文件正在被还原和恢复时，Oracle 不允许你在打开模式下操作数据库。在此情况下，以装载模式启动数据库，发出 `RESTORE`\
  \ 和 `RECOVER` 命令，然后打开数据库，如下所示：\n\n```\n$ rman target /\nRMAN> startup mount;\nRMAN>\
  \ restore database;\nRMAN> recover database;\nRMAN> alter database open;\n```\n\n\
  如果一切按预期进行，你应该看到的最后一条消息是：\n\n```\n语句已处理\n```\n\n### 使用备份控制文件\n\n此技术使用从 `FRA` 检索到的控制文件的自动备份（有关如何还原控制文件的更多示例，请参阅本章后面的“还原控制文件”部分）。在此场景中，首先从备份中检索控制文件，然后再还原和恢复数据库：\n\
  \n```\n$ rman target /\nRMAN> startup nomount;\nRMAN> restore controlfile from autobackup;\n\
  RMAN> alter database mount;\nRMAN> restore database;\nRMAN> recover database;\n\
  RMAN> alter database open resetlogs;\n```\n\n如果成功，你应该看到的最后一条消息是：\n\n```\n语句已处理\n\
  ```\n\n## 还原和恢复表空间\n\n有时你会遇到局限于特定表空间或一组表空间的介质故障。在这种情况下，在表空间级别的粒度上进行还原和恢复是合适的。`RMAN`\
  \ 的 `RESTORE TABLESPACE` 和 `RECOVER TABLESPACE` 命令将还原和恢复与指定表空间关联的所有数据文件。\n\n###\
  \ 在数据库打开时还原表空间\n\n如果你的数据库处于打开状态，那么你必须将要还原和恢复的表空间脱机。除了 `SYSTEM` 和 `UNDO` 之外，你可以对任何表空间执行此操作。此示例在数据库打开时还原并恢复\
  \ `USERS` 表空间：\n\n```\n$ rman target /\nRMAN> sql 'alter tablespace users offline\
  \ immediate';\nRMAN> restore tablespace users;\nRMAN> recover tablespace users;\n\
  RMAN> sql 'alter tablespace users online';\n```\n\n在表空间联机后，你应该会看到类似这样的消息：\n\n```\n\
  sql 语句: alter tablespace users online\n```\n\n\n\n# 在 RMAN 中执行恢复操作\n\n从 Oracle 12c\
  \ 开始，您可以直接运行 SQL 语句，无需使用 RMAN 的 `sql` 命令和相关的引号；例如，\n```\n$ rman target /\nRMAN>\
  \ alter tablespace users offline immediate;\nRMAN> restore tablespace users;\nRMAN>\
  \ recover tablespace users;\nRMAN> alter tablespace users online;\n```\n\n## 在数据库处于装载（MOUNT）模式时恢复表空间\n\
  \n通常，在执行恢复时，DBA 会关闭数据库并将其重新启动到装载模式，为执行恢复做准备。将数据库置于装载模式可确保没有用户连接到数据库，并且没有事务正在进行。\n\
  \n此外，如果您要恢复的是 `SYSTEM` 表空间，那么您必须以装载模式启动数据库。Oracle 不允许在数据库打开时恢复 `SYSTEM` 表空间的数据文件。下面的示例在数据库处于装载模式时恢复\
  \ `SYSTEM` 表空间：\n```\n$ rman target /\nRMAN> shutdown immediate;\nRMAN> startup\
  \ mount;\nRMAN> restore tablespace system;\nRMAN> recover tablespace system;\nRMAN>\
  \ alter database open;\n```\n如果成功，您应该看到的最后一条消息是：\n```\nStatement processed\n```\n\
  \n### 恢复只读表空间\n\n当您发出 `RESTORE DATDABASE` 命令时，RMAN 会随数据库的其余部分一起恢复只读表空间。例如，以下命令将恢复所有数据文件（包括处于只读模式的数据文件）：\n\
  ```\nRMAN> restore database;\n```\n在 Oracle 11g 之前，您需要发出 `RESTORE DATABASE CHECK\
  \ READONLY` 来指示 RMAN 一起恢复只读表空间和读写模式的表空间。在 Oracle 11g 及更高版本中，这不再是必需的。\n\n![Image](img/sq.jpg)\
  \ `Note` 如果您使用的是在只读表空间被置于只读模式之后创建的备份，那么只读数据文件不需要恢复。在这种情况下，自备份以来没有为只读表空间生成重做日志。\n\
  \n### 恢复临时表空间\n\n从 Oracle 10g 开始，您不必恢复或重新创建丢失的本地管理临时表空间临时文件。当您打开数据库供使用时，Oracle 会自动检测并重新创建本地管理临时表空间的临时文件。\n\
  \n当 Oracle 自动重新创建临时表空间时，它会向您的目标数据库的 `alert.log` 中记录如下消息：\n```\nRe-creating tempfile\
  \ <your temporary tablespace filename>\n```\n如果由于任何原因，您的临时表空间变得不可用，您也可以自己重新创建它。因为临时表空间中永远不会有永久对象，您可以根据需要简单地重新创建它们。以下是如何创建本地管理临时表空间的示例：\n\
  ```\nCREATE TEMPORARY TABLESPACE temp TEMPFILE\n'/u01/dbfile/O12C/temp01.dbf' SIZE\
  \ 1000M\nEXTENT MANAGEMENT\nLOCAL UNIFORM SIZE 512K;\n```\n如果您的临时表空间存在，但临时数据文件丢失了，您可以直接添加它们，如下所示：\n\
  ```\nalter tablespace temp\nadd tempfile '/u01/dbfile/O12C/temp02.dbf' SIZE 5000M\
  \ REUSE;\n```\n\n## 恢复和恢复数据文件\n\n数据文件级别的恢复和恢复适用于媒体故障仅限于一小部分数据文件的情况。对于数据文件级别的恢复，您可以指示\
  \ RMAN 使用数据文件名或数据文件号进行恢复和恢复。对于不与 `SYSTEM` 或 `UNDO` 表空间关联的数据文件，您可以选择在数据库保持打开状态时进行恢复和恢复。但是，在数据库打开时，您必须首先将任何要恢复和恢复的数据文件脱机。\n\
  \n### 在数据库打开时恢复和恢复数据文件\n\n使用 `RESTORE DATAFILE` 和 `RECOVER DATAFILE` 命令在数据文件级别进行恢复和恢复。当您的数据库处于打开状态时，您需要将任何尝试恢复和恢复的数据文件脱机。此示例在数据库打开时恢复和恢复数据文件：\n\
  ```\nRMAN> sql 'alter database datafile 4, 5 offline';\nRMAN> restore datafile 4,\
  \ 5;\nRMAN> recover datafile 4, 5;\nRMAN> sql 'alter database datafile 4, 5 online';\n\
  ```\n![Image](img/sq.jpg) `Tip` 使用 RMAN 的 `REPORT SCHEMA` 命令列出数据文件名和文件号。您也可以查询 `V$DATAFILE`\
  \ 的 `NAME` 和 `FILE#` 列来获取名称和编号。\n\n您也可以指定要恢复和恢复的数据文件的名称；例如，\n```\nRMAN> sql \"alter\
  \ database datafile ''/u01/dbfile/O12C/users01.dbf'' offline\";\nRMAN> restore datafile\
  \ '/u01/dbfile/O12C/users01.dbf';\nRMAN> recover datafile '/u01/dbfile/O12C/users01.dbf';\n\
  RMAN> sql \"alter database datafile ''/u01/dbfile/O12C/users01.dbf'' online\";\n\
  ```\n![Image](img/sq.jpg) `Note` 当使用 RMAN 的 `sql` 命令时，如果 SQL 语句内部有单引号，则需要使用双引号包裹整个\
  \ SQL 语句，并且在原本使用单引号的地方使用两个单引号。\n\n如前所述，从 Oracle 12c 开始，您可以直接运行 SQL 命令，无需 RMAN 的\
  \ `sql` 命令和相关的引号；例如，\n```\nRMAN> alter database datafile 4 offline;\nRMAN> restore\
  \ datafile 4;\nRMAN> recover datafile 4;\nRMAN> alter database datafile 4 online;\n\
  ```\n以下是相应的 12c 示例，使用数据文件名：\n```\nRMAN> alter database datafile '/u01/dbfile/O12C/users01.dbf'\
  \ offline;\nRMAN> restore datafile '/u01/dbfile/O12C/users01.dbf';\nRMAN> recover\
  \ datafile '/u01/dbfile/O12C/users01.dbf';\nRMAN> alter database datafile '/u01/dbfile/O12C/users01.dbf'\
  \ online;\n```\n\n### 在数据库未打开时恢复和恢复数据文件\n\n在这种情况下，数据库首先被关闭，然后以装载模式启动。在数据库未打开时，您可以恢复和恢复数据库中的任何数据文件。此示例显示了恢复数据文件\
  \ 1（与 `SYSTEM` 表空间关联）的过程：\n```\n$ rman target /\nRMAN> shutdown abort;\nRMAN> startup\
  \ mount;\nRMAN> restore datafile 1;\nRMAN> recover datafile 1;\nRMAN> alter database\
  \ open;\n```\n在执行数据文件恢复时，您也可以指定文件名：\n```\n$ rman target /\nRMAN> shutdown abort;\n\
  RMAN> startup mount;\nRMAN> restore datafile '/u01/dbfile/O12C/system01.dbf';\n\
  RMAN> recover datafile '/u01/dbfile/O12C/system01.dbf';\nRMAN> alter database open;\n\
  ```\n\n### 将数据文件恢复到非默认位置\n\n有时会发生故障，导致与挂载点关联的磁盘无法操作。在这些情况下，您需要将数据文件恢复并恢复到与它们原始位置不同的位置。另一个需要将数据文件恢复到非默认位置的典型情况是，您正在恢复到一个不同的数据库服务器，该服务器的挂载点与备份来源的服务器的挂载点完全不同。\n\
  \n使用 `SET NEWNAME` 和 `SWITCH` 命令将数据文件恢复到非默认位置。这两个命令都必须在 RMAN 的 `run{}` 块内运行。您可以将使用\
  \ `SET NEWNAME` 和 `SWITCH` 视为重命名数据文件的一种方式（类似于 SQL*Plus 的 `ALTER DATABASE RENAME\
  \ FILE` 语句）。\n\n此示例在恢复和恢复时更改数据文件的位置。首先，将数据库置于装载模式：\n```\n$ rman target /\nRMAN>\
  \ startup mount;\n```\n然后，运行以下 RMAN 代码块：\n\n\n\n# RMAN 数据文件恢复与块级恢复\n\n## RMAN 数据文件恢复操作\n\
  \n以下是一个 RMAN 恢复脚本示例：\n\n```\nrun{\nset newname for datafile 4 to '/u02/dbfile/O12C/users01.dbf';\n\
  set newname for datafile 5 to '/u02/dbfile/O12C/users02.dbf';\nrestore datafile\
  \ 4, 5;\nswitch datafile all; # 使用新数据文件位置更新存储库。\nrecover datafile 4, 5;\nalter database\
  \ open;\n}\n```\n\n这是部分输出信息：\n\n```\ndatafile 4 switched to datafile copy\ninput\
  \ datafile copy RECID=79 STAMP=804533148 file name=/u02/dbfile/O12C/users01.dbf\n\
  datafile 5 switched to datafile copy\ninput datafile copy RECID=80 STAMP=804533148\
  \ file name=/u02/dbfile/O12C/users02.dbf\n```\n\n如果数据库处于打开状态，可以先将数据文件离线，然后为其设置新名称以进行恢复，如下所示：\n\
  \n```\nrun{\nsql 'alter database datafile 4, 5 offline';\nset newname for datafile\
  \ 4 to '/u02/dbfile/O12C/users01.dbf';\nset newname for datafile 5 to '/u02/dbfile/O12C/users02.dbf';\n\
  restore datafile 4, 5;\nswitch datafile all; # 使用新数据文件位置更新存储库。\nrecover datafile\
  \ 4, 5;\nsql 'alter database datafile 4, 5 online';\n}\n```\n\n从 Oracle 12c 开始，运行\
  \ SQL 语句（例如`ALTER DATABASE`）时不再需要指定 RMAN `sql`命令；例如：\n\n```\nrun{\nalter database\
  \ datafile 4, 5 offline;\nset newname for datafile 4 to '/u02/dbfile/O12C/users01.dbf';\n\
  set newname for datafile 5 to '/u02/dbfile/O12C/users02.dbf';\nrestore datafile\
  \ 4, 5;\nswitch datafile all; # 使用新数据文件位置更新存储库。\nrecover datafile 4, 5;\nalter database\
  \ datafile 4, 5 online;\n}\n```\n\n## 块级恢复\n\n块级损坏很少见，通常由某种 I/O 错误引起。但是，如果在大型数据文件中确实存在孤立的损坏块，能够执行块级恢复是一个很好的选择。当数据文件中只有少量块损坏时，块级恢复非常有用。如果整个数据文件都需要介质恢复，则块恢复不合适。\n\
  \n每当运行`BACKUP`、`VALIDATE`或`BACKUP VALIDATE`命令时，RMAN 会自动检测损坏块。关于损坏块的详细信息可以在`V$DATABASE_BLOCK_CORRUPTION`视图中查看。在以下示例中，常规备份作业在输出中报告了损坏块：\n\
  \n```\nORA-19566: exceeded limit of 0 corrupt blocks for file...\n```\n\n查询`V$DATABASE_BLOCK_CORRUPTION`视图可以指示哪个文件包含损坏：\n\
  \n```\nSQL> select * from v$database_block_corruption;\n\nFILE#     BLOCK#     BLOCKS\
  \ CORRUPTION_CHANGE# CORRUPTIO     CON_ID\n---------- ---------- ---------- ------------------\
  \ --------- ----------\n         4         20          1                  0 ALL\
  \ ZERO           0\n```\n\n执行块级恢复时，数据库可以处于装载或打开状态。无需将正在恢复的数据文件离线。可以指示 RMAN 恢复在`V$DATABASE_BLOCK_CORRUPTION`中报告的所有块，如下所示：\n\
  \n```\nRMAN> recover corruption list;\n```\n\n如果成功，将显示以下消息：\n\n```\nmedia recovery\
  \ complete...\n```\n\n另一种恢复块的方法是指定数据文件和块号，如下所示：\n\n```\nRMAN> recover datafile 4\
  \ block 20;\n```\n\n最好使用`RECOVER CORRUPTION LIST`语法，因为它会从`V$DATABASE_BLOCK_CORRUPTION`视图中清除所有已恢复的块。\n\
  \n**注意：** RMAN 无法对数据文件头（块 1）执行块级恢复。\n\n块级介质恢复允许您保持数据库可用，并减少平均恢复时间，因为在恢复期间只有损坏块处于离线状态。执行块级恢复时，数据库必须处于归档日志模式。从\
  \ Oracle 11g 开始，RMAN 可以从闪回日志中还原块（如果可用）。如果闪回日志不可用，则 RMAN 将尝试从完整备份、0 级备份或由`BACKUP\
  \ AS COPY`命令生成的映像副本备份中还原块。块还原后，任何所需的归档重做日志必须可用才能恢复该块。RMAN 无法使用增量 1 级（或更高级别）备份执行块介质恢复。\n\
  \n**注意：** 如果您使用的是 Oracle 10g 或 Oracle9i，请使用`BLOCKRECOVER`命令执行块介质恢复。\n\n## 恢复容器数据库及其关联的可插拔数据库\n\
  \n从 Oracle 12c 开始，您可以在一个容器数据库中创建可插拔数据库。在处理容器及其关联的可插拔数据库时，有三种基本场景：\n\n*   所有数据文件都经历了介质故障（容器根数据文件以及所有关联的可插拔数据库数据文件）。\n\
  *   仅与容器根数据库关联的数据文件经历了介质故障。\n*   仅与某个可插拔数据库关联的数据文件经历了介质故障。\n\n以下部分涵盖了上述场景。\n\n###\
  \ 恢复和还原所有数据文件\n\n要恢复和还原与容器数据库关联的所有数据文件（包括根容器、种子容器和所有关联的可插拔数据库），请使用具有`sysdba`或`sysbackup`权限的用户通过\
  \ RMAN 连接到容器数据库。因为正在还原与根系统表空间关联的数据文件，所以数据库必须以装载模式启动（而非打开）：\n\n```\n$ rman target\
  \ /\nRMAN> startup mount;\nRMAN> restore database;\nRMAN> recover database;\nRMAN>\
  \ alter database open;\n```\n\n请记住，当您打开容器数据库时，默认情况下不会打开关联的可插拔数据库。您可以从根容器中打开它们，如下所示：\n\
  \n```\nRMAN> alter pluggable database all open;\n```\n\n### 恢复和还原根容器数据文件\n\n如果仅与根容器关联的数据文件损坏，则可以在根级别进行恢复和还原。在此示例中，正在还原根容器的系统数据文件，因此数据库不能处于打开状态。以下命令指示\
  \ RMAN 仅还原与根容器数据库关联的数据文件，通过关键字`root`实现：\n\n```\n$ rman target /\nRMAN> startup mount;\n\
  RMAN> restore database root;\nRMAN> recover database root;\nRMAN> alter database\
  \ open;\n```\n\n在之前的代码中，`restore database root`命令指示 RMAN 仅还原与根容器数据库关联的数据文件。容器数据库打开后，您必须打开任何关联的可插拔数据库。您可以从根容器中执行此操作，如下所示：\n\
  \n```\nRMAN> alter pluggable database all open;\n```\n\n您可以通过以下查询检查可插拔数据库的状态：\n\n\
  ```\nSQL> select name, open_mode from v$pdbs;\n```\n\n### 恢复和还原可插拔数据库\n\n您有两种选项来恢复和还原可插拔数据库：\n\
  \n*   以容器根用户身份连接，并指定要恢复和还原的可插拔数据库。\n*   直接以特权可插拔级别用户身份连接到可插拔数据库，并发出`RESTORE`和`RECOVER`命令。\n\
  \n第一个示例连接到根容器，并恢复和还原与`salespdb`可插拔数据库关联的数据文件。为此，可插拔数据库不能处于打开状态（因为可插拔数据库的系统数据文件也将被恢复和还原）：\n\
  \n\n\n## 恢复可插拔数据库\n\n您可以使用 RMAN 连接到根容器数据库来恢复整个可插拔数据库。\n\n```\n$ rman target /\n\
  RMAN> alter pluggable database salespdb close;\nRMAN> restore pluggable database\
  \ salespdb;\nRMAN> recover pluggable database salespdb;\nRMAN> alter pluggable database\
  \ salespdb open;\n```\n\n您也可以直接连接到一个可插拔数据库并执行恢复操作。当直接连接到可插拔数据库时，用户只能访问与该可插拔数据库关联的数据文件：\n\
  \n```\n$ rman target sys/foo@salespdb\nRMAN> shutdown immediate;\nRMAN> restore\
  \ database;\nRMAN> recover database;\nRMAN> alter database open;\n```\n\n![Image](img/sq.jpg)\
  \ `注意` 当您直接连接到可插拔数据库时，不能在 `RESTORE` 和 `RECOVER` 命令中指定可插拔数据库的名称。在这种情况下，您会收到 `RMAN-07536:\
  \ command not allowed when connected to a Pluggable Database` 错误。\n\n前面的代码只影响与您所连接的可插拔数据库关联的数据文件。可插拔数据库需要关闭才能进行此操作。但是，根容器数据库可以是打开或挂载状态。此外，您必须使用在连接到可插拔数据库时以特权用户身份进行的备份。特权可插拔数据库用户无法访问由根容器数据库特权用户启动的数据文件备份。\n\
  \n## 恢复归档重做日志文件\n\nRMAN 会在恢复过程中自动恢复它需要的任何归档重做日志文件。通常您不需要手动恢复归档重做日志文件。但是，在以下任何情况适用时，您可能希望这样做：\n\
  \n*   您需要恢复归档重做日志文件，以便稍后执行恢复；其思路是，如果归档重做日志文件已经恢复，将加快恢复操作。\n*   您需要将归档重做日志文件恢复到非默认位置，无论是由于介质故障还是存储空间问题。\n\
  *   您需要恢复特定的归档重做日志文件，以便通过 LogMiner 进行检查。\n\n如果您启用了 FRA，那么 RMAN 默认会将归档重做日志文件恢复到由初始化参数\
  \ `DB_RECOVERY_FILE_DEST` 定义的目标位置。否则，RMAN 使用 `LOG_ARCHIVE_DEST_N` 初始化参数（其中 `N` 通常为\
  \ 1）来确定恢复归档重做日志文件的位置。\n\n如果您将归档重做日志文件恢复到非默认位置，RMAN 知道它们被恢复到的位置，并会在您发出任何后续 `RECOVER`\
  \ 命令时自动找到这些文件。RMAN 不会恢复它认为已经存在于磁盘上的归档重做日志文件。即使您指定了非默认位置，如果文件已存在，RMAN 也不会将归档重做日志文件恢复到磁盘。在这种情况下，RMAN\
  \ 仅返回一条消息，说明该归档重做日志文件已被恢复。使用 `FORCE` 选项可以覆盖此行为。\n\n如果您不确定在恢复日志文件时要使用的序列号，可以查询 `V$LOG_HISTORY`\
  \ 视图。\n\n![Image](img/sq.jpg) `提示` 请记住，您无法恢复从未备份过的归档重做日志。此外，如果包含该归档重做日志的备份文件不再可用，您也无法恢复它。运行\
  \ `LIST ARCHIVELOG ALL` 命令可以查看磁盘上当前的归档重做日志，运行 `LIST BACKUP OF ARCHIVELOG ALL` 可以验证哪些归档重做日志文件在可用的\
  \ RMAN 备份中。\n\n### 恢复到默认位置\n\n以下命令将恢复 RMAN 已备份的所有归档重做日志文件：\n\n```\nRMAN> restore\
  \ archivelog all;\n```\n\n如果您想从指定的序列开始恢复，请使用 `FROM SEQUENCE` 子句。您可能需要先运行此查询以确定已生成的最新日志文件和序列号：\n\
  \n```\nSQL> select sequence#, first_time from v$log_history order by 2;\n```\n\n\
  此示例从序列 68 开始恢复所有归档重做日志文件：\n\n```\nRMAN> restore archivelog from sequence 68;\n```\n\
  \n如果您想恢复一定范围的归档重做日志文件，请使用 `FROM SEQUENCE` 和 `UNTIL SEQUENCE` 子句或 `SEQUENCE BETWEEN`\
  \ 子句，如下所示。以下命令恢复从序列 68 到序列 78 的归档重做日志文件，使用线程 1：\n\n```\nRMAN> restore archivelog\
  \ from sequence 68 until sequence 78 thread 1;\nRMAN> restore archivelog sequence\
  \ between 68 and 78 thread 1;\n```\n\n默认情况下，如果归档重做日志文件已在磁盘上，RMAN 不会恢复它。如果您使用 `FORCE`，则可以覆盖此行为，如下所示：\n\
  \n```\nRMAN> restore archivelog from sequence 1 force;\n```\n\n### 恢复到非默认位置\n\n\
  如果您想将归档重做日志文件恢复到与默认位置不同的位置，请使用 `SET ARCHIVELOG DESTINATION` 子句。以下示例恢复到非默认位置 `/u01/archtemp`。`SET`\
  \ 命令的此选项必须在 RMAN `run{}` 块内执行。\n\n```\nrun{\nset archivelog destination to '/u01/archtemp';\n\
  restore archivelog from sequence 8 force;\n}\n```\n\n### 恢复控制文件\n\n如果您丢失了一个控制文件，并且您有多个副本，那么您可以关闭数据库，并通过将一个好的控制文件复制到丢失控制文件的正确位置和名称来简单地恢复丢失或损坏的控制文件（有关详细信息，请参见\
  \ 第 2 章）。\n\n下面列出了恢复控制文件时的三种典型场景：\n\n*   使用恢复目录\n*   使用自动备份\n*   指定备份文件名\n\n###\
  \ 使用恢复目录\n\n当您连接到恢复目录时，即使目标数据库处于 nomount 模式，您也可以查看有关控制文件的备份信息。要列出控制文件的备份，请使用 `LIST`\
  \ 命令，如下所示：\n\n```\n$ rman target / catalog rcat/foo@rcat\nRMAN> startup nomount;\n\
  RMAN> list backup of controlfile;\n```\n\n如果您丢失了所有控制文件，并且正在使用恢复目录，那么请发出 `STARTUP\
  \ NOMOUNT` 和 `RESTORE CONTROLFILE` 命令：\n\n```\nRMAN> startup nomount;\nRMAN> restore\
  \ controlfile;\n```\n\nRMAN 将控制文件恢复到由您的 `CONTROL_FILES` 初始化参数定义的位置。您应该会看到一条消息，指示您的控制文件已成功从\
  \ RMAN 备份片复制回来。您现在可以将数据库更改为 mount 模式，并执行数据库所需的任何其他恢复和恢复命令。\n\n![Image](img/sq.jpg)\
  \ `注意` 当您从备份恢复控制文件时，需要对整个数据库执行介质恢复，并使用 `OPEN RESETLOGS` 命令打开数据库，即使您没有恢复任何数据文件。您可以通过查询\
  \ `V$DATABASE` 视图的 `CONTROLFILE_TYPE` 列来确定您的控制文件是否是备份。\n\n### 使用自动备份\n\n当您启用控制文件的自动备份并使用\
  \ FRA 时，恢复控制文件相当简单。首先，连接到您的目标数据库，然后发出 `STARTUP NOMOUNT` 命令，接着是 `RESTORE CONTROLFILE\
  \ FROM AUTOBACKUP` 命令，如下所示：\n\n```\n$ rman target /\nRMAN> startup nomount;\nRMAN>\
  \ restore controlfile from autobackup;\n```\n\nRMAN 将控制文件恢复到由您的 `CONTROL_FILES`\
  \ 初始化参数定义的位置。您应该会看到一条消息，指示您的控制文件已成功从 RMAN 备份片复制回来。以下是输出片段：\n\n```\nchannel ORA_DISK_1:\
  \ control file restore from AUTOBACKUP complete\n```\n\n您现在可以将数据库更改为 mount 模式，并执行数据库所需的任何其他恢复和恢复命令。\n\
  \n### 指定备份文件名\n\n（注：原文在此处结束，未提供后续内容。）\n\n\n\n### 恢复控制文件\n\n当将数据库恢复到不同服务器时，通常的最初步骤包括：对目标数据库进行备份、复制到远程服务器，然后从\
  \ RMAN 备份中恢复控制文件。在这些场景中，我通常知道包含控制文件的备份片名称。以下是一个示例，展示如何指示 RMAN 从特定的备份片文件恢复控制文件：\n\
  \n```\nRMAN> startup nomount;\nRMAN> restore controlfile from\n'/u01/O12C/rman/rman_ctl_c-3423216220-20130113-01.bk';\n\
  ```\n\n控制文件将被恢复到由`CONTROL_FILES`初始化参数定义的位置。\n\n## 恢复 spfile\n\n出于以下几个不同原因，您可能需要恢复`spfile`：\n\
  *   您不小心在`spfile`中设置了一个导致实例无法启动的值。\n*   您不小心删除了`spfile`。\n*   您需要查看`spfile`在过去某个时间点的状态。\n\
  \n一个（我遇到过不止一次）场景是：您正在使用`spfile`，而团队中的一位 DBA 执行了一些令人费解的操作，例如：\n\n```\nSQL> alter\
  \ system set processes=1000000 scope=spfile;\n```\n\n该参数在磁盘上的`spfile`中被更改，但在内存中未更改。一段时间后，数据库因维护而停止。当尝试启动数据库时，您甚至无法让实例处于`nomount`状态。这是因为某个参数被设置为一个过大的值，会消耗服务器上的所有内存。在这种情况下，实例可能会挂起，或者您可能会看到以下一条或多条信息：\n\
  \n```\nORA-01078: failure in processing system parameters\nORA-00838: Specified\
  \ value of ... is too small\n```\n\n如果您有一个包含修改前`spfile`副本的 RMAN 备份，您可以直接恢复`spfile`。如果您使用恢复目录，以下是恢复`spfile`的步骤：\n\
  \n```\n$ rman target / catalog rcat/foo@rcat\nRMAN> startup nomount;\nRMAN> restore\
  \ spfile;\n```\n\n*   如果您不使用恢复目录，有多种方法可以恢复`spfile`。您采取的方法取决于几个变量，例如：\n    *   您是否使用了\
  \ FRA\n    *   您是否为自动备份配置了通道备份位置\n    *   您是否使用了自动备份的默认位置\n\n我不会展示这些场景的每个细节。通常，我会确定包含`spfile`备份的备份片位置并执行恢复，像这样：\n\
  \n```\nRMAN> startup nomount force;\nRMAN> restore spfile to '/tmp/spfile.ora'\n\
  \      from '/u01/O12C/rman/rman_ctl_c-3423216220-20130113-00.bk';\n```\n\n您应该会看到类似这样的消息：\n\
  \n```\nchannel ORA_DISK_1: SPFILE restore from AUTOBACKUP complete\n```\n\n在此示例中，`spfile`被恢复到`/tmp`目录。恢复后，您可以使用正确的名称将`spfile`复制到`ORACLE_HOME/dbs`。对于我的环境（数据库名：`O12C`），操作如下：\n\
  \n```\n$ cp /tmp/spfile.ora $ORACLE_HOME/dbs/spfileo12c.ora\n```\n\n![Image](img/sq.jpg)\
  \ **注意**  有关所有可能的`spfile`和控制文件恢复场景的完整描述，请参阅*RMAN Recipes for Oracle Database 12c*。\n\
  \n## 不完全恢复\n\n术语*不完全数据库恢复*意味着您无法恢复所有已提交的事务。*不完全*意味着您不应用所有重做日志来恢复到最后一个已提交事务发生的时间点。换句话说，您是将数据库恢复并恢复到过去的某个时间点。因此，不完全数据库恢复也称为数据库时间点恢复（DBPITR）。通常，您出于以下原因之一执行不完全数据库恢复：\n\
  *   您没有执行完整恢复所需的所有重做日志。您缺少归档重做日志文件或联机重做日志文件。这种情况可能是因为所需的重做文件损坏或丢失。\n*   您有意将数据库回滚到过去的某个时间点。例如，如果有人意外截断了表，而您希望将数据库回滚到发出截断表命令之前，就需要这样做。\n\
  \n不完全数据库恢复包括两个步骤：恢复和恢复。恢复步骤重新创建数据文件，恢复步骤应用重做日志直到指定的时间点。恢复过程可以通过 RMAN 以几种不同的方式启动：\n\
  *   `RESTORE DATABASE UNTIL`\n*   `FLASHBACK DATABASE`\n\n对于大多数不完全数据库恢复的情况，您使用`RESTORE\
  \ DATABASE UNTIL`命令指示 RMAN 从 RMAN 备份文件中检索数据文件。这种类型的不完全数据库恢复是本章此部分的主要重点。Flashback\
  \ Database 功能将在本章后面的“闪回数据库”部分介绍。\n\n`RESTORE DATABASE`命令的`UNTIL`部分指示 RMAN 基于以下方法之一从过去的某个时间点检索数据文件：\n\
  *   时间\n*   SCN\n*   日志序列号\n*   还原点\n\nRMAN 的`RESTORE DATABASE UNTIL`命令将从最新的备份集或映像副本中检索所有数据文件。RMAN\
  \ 会根据`UNTIL`子句自动确定哪个备份集包含所需的数据文件。如果您省略`RESTORE DATABASE`命令的`UNTIL`子句，RMAN 将从最新可用的备份集或映像副本中检索数据文件。在某些情况下，这可能是您期望的行为。我建议您使用`UNTIL`子句以确保\
  \ RMAN 从正确的备份集中恢复。当您发出`RESTORE DATABASE UNTIL`命令时，RMAN 将确定如何从以下任何类型的备份中提取数据文件：\n\
  *   完整数据库备份\n*   增量 0 级备份\n*   由`BACKUP AS COPY`命令生成的映像副本备份\n\n您不能在数据库联机数据文件的子集上执行不完全数据库恢复。执行不完全恢复时，在使用`ALTER\
  \ DATABASE OPEN RESETLOGS`命令打开数据库之前，所有联机数据文件的检查点 SCN 必须同步。您可以通过此 SQL 查询查看数据文件头 SCN\
  \ 和每个数据文件的状态：\n\n```\nselect file#, status, fuzzy,\nerror, checkpoint_change#,\n\
  to_char(checkpoint_time,'dd-mon-rrrr hh24:mi:ss') as checkpoint_time\nfrom v$datafile_header;\n\
  ```\n\n![Image](img/sq.jpg) **注意**  `V$DATAFILE_HEADER`中的`FUZZY`列包含一个或多个数据块的 SCN\
  \ 值大于或等于数据文件头中检查点 SCN 的数据文件。如果数据文件已恢复并且`FUZZY`值为`YES`，则需要进行介质恢复。\n\n不在数据库联机文件的子集上执行不完全恢复规则的唯一例外是表空间时间点恢复（TSPITR），它使用`RECOVER\
  \ TABLESPACE UNTIL`命令。TSPITR 在罕见情况下使用；它仅恢复和恢复您指定的表空间。有关 TSPITR 的更多详细信息，请参阅*RMAN\
  \ Recipes for Oracle Database 12c*。\n\n不完全数据库恢复的恢复部分总是通过`RECOVER DATABASE UNTIL`命令启动。RMAN\
  \ 将自动恢复您的数据库，直到使用`UNTIL`子句指定的点。与`RESTORE`命令类似，您可以按时间、变更/SCN、日志序列号或还原点进行恢复。当 RMAN\
  \ 达到指定点时，它将自动终止恢复过程。\n\n\n![Image](img/sq.jpg) **注意** 无论您在 `UNTIL` 子句中指定了什么，RMAN\
  \ 都会将其转换为相应的 `UNTIL SCN` 子句并分配适当的 SCN。这是为了避免任何时间问题，特别是由夏令时引起的问题。\n\n在恢复期间，RMAN 会自动确定如何应用重做。首先，RMAN\
  \ 会应用任何可用的增量备份。接下来，将应用磁盘上的任何归档重做日志文件。如果归档重做日志文件不存在于磁盘上，那么 RMAN 将尝试从备份集中检索它们。如果您想将重做应用作为不完整数据库恢复的一部分，则必须满足以下条件：\n\
  \n*   您的数据库处于归档日志模式。\n*   您拥有所有数据文件的良好备份。\n*   您拥有恢复到指定点所需的所有重做。\n\n![Image](img/sq.jpg)\
  \ **提示** 从 Oracle 10g 开始，您可以使用 `RECOVER DATABASE PARALLEL` 命令执行并行介质恢复。\n\n在使用 RMAN\
  \ 执行不完整的数据库恢复时，必须将数据库置于装载（mount）模式。RMAN 需要数据库处于装载模式才能读写控制文件。此外，对于不完整的数据库恢复，任何 `SYSTEM`\
  \ 表空间的数据文件总是会被恢复。Oracle 不允许您在恢复 `SYSTEM` 表空间数据文件时打开数据库。\n\n![Image](img/sq.jpg)\
  \ **注意** 执行完不完整的数据库恢复后，您需要使用 `ALTER DATABASE OPEN RESETLOGS` 命令打开数据库。\n\n根据具体情况，您可以使用\
  \ RMAN 执行各种不完整的恢复方法。下一节将讨论如何确定要执行哪种类型的不完全恢复。\n\n## 确定不完全恢复的类型\n\n当您知道要恢复数据库的大致日期和时间时，通常使用基于时间的还原和恢复。例如，您可能知道希望停止恢复过程的大致时间，但不知道特定的\
  \ SCN。\n\n基于日志序列和基于取消的恢复在您有丢失或损坏的日志文件的情况下效果很好。在这种情况下，您只能恢复到最后一个完好的归档重做日志文件。\n\n\
  如果您能精确定位希望停止恢复过程的 SCN，那么基于 SCN 的恢复效果很好。您可以从 `V$LOG` 和 `V$LOG_HISTORY` 等视图中检索 SCN\
  \ 信息。您还可以使用 LogMiner 等工具来检索特定 SQL 语句的 SCN。\n\n还原点恢复仅在您已建立还原点的情况下有效。在这些情况下，您可以还原并恢复到与指定还原点关联的\
  \ SCN。\n\nTSPITR 用于只需要还原和恢复少数几个表空间的情况。您可以使用 RMAN 来自动化与此类不完整恢复相关的许多任务。\n\n## 执行基于时间的恢复\n\
  \n要将数据库还原并恢复到过去的某个时间点，您可以使用 `RESTORE` 和 `RECOVER` 命令的 `UNTIL TIME` 子句，或者在 `run{}`\
  \ 块中使用 `SET UNTIL TIME` 子句。RMAN 将还原并恢复数据库到指定时间之前，但不包括该时间。换句话说，RMAN 将还原在指定时间之前提交的所有事务。RMAN\
  \ 会在达到您指定的时间时自动停止恢复过程。\n\nRMAN 期望的默认日期格式是 `YYYY-MM-DD:HH24:MI:SS`。但是，我建议使用 `TO_DATE`\
  \ 函数并指定格式掩码。这可以消除不同国家日期格式的歧义，也不必设置操作系统 `NLS_DATE_FORMAT` 变量。以下示例在发出 `restore` 和\
  \ `recover` 命令时指定了时间：\n\n```bash\n$ rman target /\nRMAN> startup mount;\nRMAN> restore\
  \ database until time\n      \"to_date('15-jan-2015 12:20:00', 'dd-mon-rrrr hh24:mi:ss')\"\
  ;\nRMAN> recover database until time\n      \"to_date('15-jan-2015 12:20:00', 'dd-mon-rrrr\
  \ hh24:mi:ss')\";\nRMAN> alter database open resetlogs;\n```\n\n如果一切顺利，您应该看到类似这样的输出：\n\
  \n```\nStatement processed\n```\n\n## 执行基于日志序列的恢复\n\n通常，这种类型的不完整数据库恢复是因为您丢失或损坏了归档重做日志文件而启动的。如果是这种情况，您只能恢复到最后一个完好的归档重做日志文件，因为您无法跳过丢失的归档重做日志。\n\
  \n您如何确定要恢复到（但不包括）哪个归档重做日志文件会有所不同。例如，如果您物理上丢失了一个归档重做日志文件，并且 RMAN 无法在备份集中找到它，那么在尝试应用丢失的文件时，您会收到类似这样的消息：\n\
  \n```\nRMAN-06053: unable to perform media recovery because of missing log\nRMAN-06025:\
  \ no backup of archived log for thread 1 with sequence 19...\n```\n\n根据之前的错误消息，您将恢复到（但不包括）日志序列\
  \ 19。\n\n```bash\n$ rman target /\nRMAN> startup mount;\nRMAN> restore database\
  \ until sequence 19;\nRMAN> recover database until sequence 19;\nRMAN> alter database\
  \ open resetlogs;\n```\n\n如果成功，您应该看到类似这样的输出：\n\n```\nStatement processed\n```\n\n\
  ![Image](img/sq.jpg) **注意** 基于日志序列的恢复类似于用户管理的基于取消的恢复。有关用户管理的基于取消的恢复的详细信息，请参阅第 3\
  \ 章。\n\n## 执行基于 SCN 的恢复\n\n当您知道希望结束还原和恢复会话的 SCN 值时，基于 SCN 的不完整数据库恢复非常有效。RMAN 将恢复到指定\
  \ SCN 之前，但不包括该 SCN。RMAN 会在达到指定的 SCN 时自动终止还原过程。\n\n您可以通过多种方式查看数据库的 SCN 信息：\n\n* \
  \  使用 LogMiner 确定与 DDL 或 DML 语句关联的 SCN\n*   查看 `alert.log` 文件\n*   查看跟踪文件\n*   查询\
  \ `V$LOG`、`V$LOG_HISTORY` 和 `V$ARCHIVED_LOG` 的 `FIRST_CHANGE#` 列\n\n确定要还原到的 SCN\
  \ 后，使用 `UNTIL SCN` 子句还原到指定 SCN 之前，但不包括该 SCN。以下示例还原所有 SCN 小于 95019865425 的事务：\n\n\
  ```bash\n$ rman target /\nRMAN> startup mount;\nRMAN> restore database until scn\
  \ 95019865425;\nRMAN> recover database until scn 95019865425;\nRMAN> alter database\
  \ open resetlogs;\n```\n\n如果一切顺利，您应该看到类似这样的输出：\n\n```\nStatement processed\n```\n\
  \n## 还原到还原点\n\n有两种类型的还原点：普通还原点和保证还原点。保证还原点和普通还原点之间的主要区别在于，保证还原点最终不会从控制文件中老化清除；保证还原点将一直保留，直到您将其删除。保证还原点确实需要一个\
  \ FRA。但是，对于使用保证还原点的不完整恢复，您不必启用闪回数据库。\n\n您可以使用 SQL*Plus 创建普通还原点，如下所示：\n\n```sql\n\
  SQL> create restore point MY_RP;\n```\n\n此命令创建一个名为 `MY_RP` 的还原点，它与发出命令时数据库的 SCN\
  \ 相关联。您可以查看数据库的当前 SCN，如下所示：\n\n```sql\nSQL> select current_scn from v$database;\n\
  ```\n\n您可以查看 `V$RESTORE_POINT` 视图中的还原点信息，如下所示：\n\n```sql\nSQL> select name, scn\
  \ from v$restore_point;\n```\n\n还原点就像特定 SCN 的同义词。还原点允许您还原并恢复到某个 SCN，而无需指定一个数字。RMAN\
  \ 将还原并恢复到与还原点关联的 SCN 之前，但不包括该 SCN。\n\n\n# RMAN 与闪回技术详解\n\n## 使用 RMAN 恢复到还原点\n\n\
  此示例演示了如何恢复数据库到 `MY_RP` 还原点：\n\n```sql\n$ rman target /\nRMAN> startup mount;\nRMAN>\
  \ restore database until restore point MY_RP;\nRMAN> recover database until restore\
  \ point MY_RP;\nRMAN> alter database open resetlogs;\n```\n\n## 将表恢复到先前时间点\n\n从\
  \ Oracle 12c 开始，你可以通过 `RECOVER TABLE` 命令从 RMAN 备份中恢复单个表。这使你能够将表恢复到过去的某个时间点。\n\n\
  表级恢复功能使用临时辅助实例和 Data Pump 实用程序。在恢复表时，辅助实例和 Data Pump 都会创建临时文件。在启动表级恢复之前，首先创建两个目录：一个用于存放辅助实例使用的文件，另一个用于存储\
  \ Data Pump 转储文件：\n\n```bash\n$ mkdir /tmp/oracle\n$ mkdir /tmp/recover\n```\n\n\
  上面的两个目录在 `RECOVER TABLE` 命令中通过 `AUXILIARY DESTINATION` 和 `DATAPUMP DESTINATION`\
  \ 子句引用。在以下代码片段中，由 `MV_MAINT` 拥有的 `INV` 表被恢复到之前的某个 SCN：\n\n```sql\nrecover table\
  \ mv_maint.inv\nuntil scn 4689805\nauxiliary destination '/tmp/oracle'\ndatapump\
  \ destination '/tmp/recover';\n```\n\n前提是存在包含该表在指定 SCN 时状态的 RMAN 备份，这样表级恢复和恢复操作才能执行。\n\
  \n> 注意：你还可以将表恢复到 SCN、时间点或日志序列号。\n\n当 RMAN 执行表级恢复时，它会自动创建一个临时辅助数据库，使用 Data Pump 导出该表，然后将表作为它在指定还原点时的状态导入回目标数据库。恢复完成后，辅助数据库会被删除，Data\
  \ Pump 转储文件也会被移除。\n\n> 提示：尽管 `RECOVER TABLE` 命令是一个很好的增强功能，但建议，如果不小心删除了表，首先探索使用闪回到删除前（Flashback\
  \ Table to Before Drop）功能来恢复表。或者，如果表被错误地删除了数据，则使用闪回表（Flashback Table）功能将表闪回到过去的某个时间点。如果以上选项都不可行，再考虑使用\
  \ RMAN 恢复表功能。\n\n## 闪回表\n\n在 Oracle 10g 之前，如果不小心删除了表，你必须执行以下步骤来恢复表：\n\n1.  将数据库备份恢复到测试数据库。\n\
  2.  执行不完全恢复，直到删除表的时间点。\n3.  导出该表。\n4.  将表导入到生产数据库。\n\n这个过程可能非常耗时且资源密集。它需要额外的服务器资源，以及\
  \ DBA 的时间和精力。\n\n为了简化意外删除表的恢复，Oracle 引入了闪回表（Flashback Table）功能。Oracle 提供了两种不同类型的闪回表操作：\n\
  \n*   `FLASHBACK TABLE TO BEFORE DROP` 可以快速撤消之前删除的表。此功能使用一个名为回收站的逻辑容器。\n*   `FLASHBACK\
  \ TABLE` 可闪回到最近的某个时间点，以撤消不期望的 DML 语句的影响。你可以闪回到 SCN、时间戳或还原点。\n\nOracle 引入 `FLASHBACK\
  \ TABLE TO BEFORE DROP` 是为了让你能够快速恢复已删除的表。从 Oracle 10g 开始，当你删除一个表时，如果没有指定 `PURGE`\
  \ 子句，Oracle 不会真正删除该表——而是将其重命名。任何被你删除（由 Oracle 重命名）的表都会被放入回收站。回收站为你提供了一种高效的方式来查看和管理已删除的对象。\n\
  \n> 注意：要使用闪回表功能，你不需要实施 FRA（快速恢复区），也不需要启用闪回数据库。\n\n`FLASHBACK TABLE TO BEFORE DROP`\
  \ 操作仅在你的数据库启用了回收站功能时有效（默认是启用的）。你可以按如下方式检查回收站的状态：\n\n```sql\nSQL> show parameter\
  \ recyclebin\n\nNAME                                 TYPE        VALUE\n------------------------------------\
  \ ----------- -------\nrecyclebin                           string      on\n```\n\
  \n### FLASHBACK TABLE TO BEFORE DROP\n\n当你删除一个表时，如果没有指定 `PURGE` 子句，Oracle 会用一个系统生成的名称重命名该表。因为表并非真正被删除，你可以使用\
  \ `FLASHBACK TABLE TO BEFORE DROP` 来指示 Oracle 用其原始名称重命名表。下面是一个例子。假设 `INV` 表被意外删除：\n\
  \n```sql\nSQL> drop table inv;\n```\n\n通过查看回收站的内容来验证表已被重命名：\n\n```sql\nSQL> show\
  \ recyclebin;\nORIGINAL NAME    RECYCLEBIN NAME                OBJECT TYPE  DROP\
  \ TIME\n---------------- ------------------------------ ------------ -----------\n\
  INV      BIN$BCRjF6KSbi/gU7fQTwrP+Q==$0 TABLE    2014-09-28:11:26:15\n```\n\n`SHOW\
  \ RECYCLEBIN` 语句只显示已删除的表。要获得更完整的重命名对象视图，请查询 `RECYCLEBIN` 视图：\n\n```sql\nSQL> select\
  \ object_name, original_name, type from recyclebin;\n```\n\n输出如下：\n\n```\nOBJECT_NAME\
  \                              ORIGINAL_NAME        TYPE\n----------------------------------------\
  \ -------------------- ----------\nBIN$BCRjF6KSbi/gU7fQTwrP+Q==$0           INV\
  \                  TABLE\nBIN$BCRjF6KRbi/gU7fQTwrP+Q==$0           INV_TRIG    \
  \         TRIGGER\nBIN$BCRjF6KQbi/gU7fQTwrP+Q==$0           INV_PK             \
  \  INDEX\n```\n\n在此输出中，该表还有一个在对象删除时被重命名的主键。要恢复（取消删除）该表，请执行：\n\n```sql\nSQL> flashback\
  \ table inv to before drop;\n```\n\n前面的命令将表恢复为其原始名称。但是，此语句不会将索引恢复为其原始名称：\n\n```sql\n\
  SQL> select index_name from user_indexes where table_name='INV';\n\nINDEX_NAME\n\
  ----------------------------------------\nBIN$BCRjF6KQbi/gU7fQTwrP+Q==$0\n```\n\n\
  在这种情况下，你必须重命名索引：\n\n```sql\nSQL> alter index \"BIN$BCRjF6KQbi/gU7fQTwrP+Q==$0\"\
  \ rename to inv_pk;\n```\n\n你还必须以同样的方式重命名任何触发器对象。如果在删除表之前存在引用约束，你必须手动重新创建它们。\n\n\
  如果由于某些原因，你需要将表闪回到一个与原始名称不同的名称，可以按如下方式操作：\n\n```sql\nSQL> flashback table inv to\
  \ before drop rename to inv_bef;\n```\n\n### 将表闪回到之前的时点\n\n如果表被错误地删除了数据，你可以选择将表闪回到之前的某个时间点。闪回表功能使用回滚表空间中的信息来恢复表。过去的那个时间点取决于你的回滚表空间保留期，它指定了回滚信息保留的最短时间。\n\
  \n如果所需的闪回信息不在回滚表空间中，你会收到类似以下的错误：\n\n```\nORA-01555: snapshot too old\n```\n\n换句话说，要能够闪回到过去的某个时间点，回滚表空间中所需的信息不能被覆盖。\n\
  \n### FLASHBACK TABLE TO SCN\n\n假设你正在测试一个应用程序功能，并希望快速将表恢复到某个特定的 SCN。作为应用程序测试的一部分，你在测试开始前记录了\
  \ SCN：\n\n```sql\nSQL> select current_scn from v$database;\n\nCURRENT_SCN\n-----------\n\
  \    4760089\n```\n\n你执行了一些测试，然后希望将表闪回到之前记录的 SCN。首先，确保为表启用了行移动：\n\n```sql\nSQL>\
  \ alter table inv enable row movement;\nSQL> flashback table inv to scn 4760089;\n\
  ```\n\n该表现在应该反映截至在 `FLASHBACK` 语句中指定的历史 SCN 值时已提交的事务。\n\n### FLASHBACK TABLE TO\
  \ TIMESTAMP\n\n（此处原文内容不完整，故保留原有标题）\n\n\n\n你也可以将表闪回到之前的某个时间点。例如，要将表闪回到 15 分钟前，首先启用行移动，然后使用\
  \ `FLASHBACK TABLE`：\n\n```\nSQL> alter table inv enable row movement;\nSQL> flashback\
  \ table inv to timestamp(sysdate-1/96);\n```\n\n你提供的时间戳必须能解析为有效的 Oracle 时间戳格式。你也可以显式指定一个时间，如下所示：\n\
  \n```\nSQL> flashback table inv to timestamp\n     to_timestamp('14-jan-15 12:07:33','dd-mon-yy\
  \ hh24:mi:ss');\n```\n\n## FLASHBACK TABLE TO RESTORE POINT（闪回表到还原点）\n\n还原点（restore\
  \ point）是数据库中与时间戳或 SCN 关联的一个名称。你可以创建一个包含数据库当前 SCN 的还原点，如下所示：\n\n```\nSQL> create\
  \ restore point point_a;\n```\n\n之后，如果你决定将表闪回到该还原点，同样需要先启用行移动：\n\n```\nSQL> alter\
  \ table inv enable row movement;\nSQL> flashback table inv to restore point point_a;\n\
  ```\n\n此时，表中的数据应恢复到与指定还原点所关联的 SCN 时相同的事务状态。\n\n## Flashback Database（闪回数据库）\n\n\
  闪回数据库（Flashback Database）功能允许你执行不完全恢复，回退到过去的某个时间点。闪回数据库使用存储在闪回日志中的信息；它不依赖于还原数据库文件（如冷备份、热备份和\
  \ RMAN 那样）。\n\n`提示`：闪回数据库并不能替代你的数据库备份。如果遇到数据文件介质故障，你无法使用闪回数据库闪回到故障发生之前。如果数据文件损坏，你必须使用物理备份（热备、冷备或\
  \ RMAN）进行还原和恢复。\n\n在需要将数据库一致地重置到过去某个时间点的场景下，闪回数据库功能可能非常有用。例如，你可能需要定期将测试或培训数据库重置回已知基线。或者，在升级应用程序时，在对应用程序数据库对象进行大规模更改之前标记一个起始点。升级后，如果情况不顺利，你希望能够快速将数据库重置回升级前的时间点。\n\
  \n启用闪回数据库有几个先决条件：\n\n*   数据库必须处于归档日志模式（archivelog mode）。\n*   你必须使用闪回恢复区（FRA）。\n\
  *   闪回数据库功能必须已启用。\n\n关于启用归档日志模式和/或启用 FRA 的详细信息，请参见第 2 章。你可以使用以下 SQL*Plus 语句验证这些功能的状态：\n\
  \n```\nSQL> archive log list;\nSQL> show parameter db_recovery_file_dest;\n```\n\
  \n要启用闪回数据库功能，需将数据库切换到闪回模式，如下所示：\n\n```\nSQL> alter database flashback on;\n```\n\
  \n`注意`：在 Oracle 10g 中，数据库必须处于装载（mount）模式才能启用闪回数据库。\n\n你可以通过以下方式验证闪回状态：\n\n```\n\
  SQL> select flashback_on from v$database;\n```\n\n启用闪回数据库后，你可以使用以下查询查看 FRA 中的闪回日志：\n\
  \n```\nselect name, log#, thread#, sequence#, bytes\nfrom v$flashback_database_logfile;\n\
  ```\n\n你可以闪回的时间范围由 `DB_FLASHBACK_RETENTION_TARGET` 参数决定。该参数指定了数据库可以闪回的最大时间上限（以分钟计）。\n\
  \n你可以通过运行以下 SQL 来查看可以闪回数据库到的最早 SCN 和时间：\n\n```\nselect\n oldest_flashback_scn\n\
  ,to_char(oldest_flashback_time,'dd-mon-yy hh24:mi:ss')\nfrom v$flashback_database_log;\n\
  ```\n\n如果因任何原因需要禁用闪回数据库，你可以将其关闭，如下所示：\n\n```\nSQL> alter database flashback off;\n\
  ```\n\n你可以使用 RMAN 或 SQL*Plus 来闪回数据库。你可以使用以下方式之一指定过去的时间点：\n\n*   SCN\n*   时间戳（Timestamp）\n\
  *   还原点（Restore point）\n*   上次 `RESETLOGS` 操作（仅适用于 RMAN）\n\n此示例创建一个还原点：\n\n```\n\
  SQL> create restore point flash_1;\n```\n\n接着，应用程序执行一些测试，之后将数据库闪回到该还原点，以便开始新一轮测试：\n\
  \n```\nSQL> shutdown immediate;\nSQL> startup mount;\nSQL> flashback database to\
  \ restore point flash_1;\nSQL> alter database open resetlogs;\n```\n\n至此，你的数据库在事务一致性方面应与该还原点所关联的\
  \ SCN 时的状态相同。\n\n## Restoring and Recovering to Different Server（还原和恢复到不同的服务器）\n\
  \n在规划备份策略时，作为该过程的一部分，你还必须考虑如何进行还原和恢复。你的备份的有效性取决于你上次测试还原和恢复的时间。没有一个好的还原恢复策略，备份策略可能变得毫无价值。最糟糕的情况莫过于发生介质故障后，去还原数据库时，才发现缺少关键部分、没有足够的空间进行还原、某些文件已损坏等等。\n\
  \n测试 RMAN 备份的最佳方法之一是将其还原和恢复到不同的数据库服务器上。这将全面锻炼你的备份、还原和恢复 DBA 技能。如果你能在不同的服务器上成功还原和恢复\
  \ RMAN 备份，那么当真正的灾难来袭时，这将给你带来信心。你可以将本书之前的所有内容视为执行这些技术挑战性任务的基础。使用 RMAN 备份将数据库从一个服务器迁移到另一个服务器，需要对\
  \ Oracle 架构以及备份与恢复（B&R）的工作原理有专家级的理解。\n\n`注意`：RMAN 确实有一个 `DUPLICATE DATABASE` 命令，非常适合将数据库从一个服务器复制到另一个。如果你经常执行此类任务，我建议你使用\
  \ RMAN 的复制数据库功能。然而，有时你可能仍需要手动将数据库备份从一台服务器复制到另一台，尤其是在安全策略禁止直接连接生产服务器到开发环境的情况下。我接触过许多生产数据库，它们无法直接访问生产服务器，因此复制数据库的唯一方法就是手动将\
  \ RMAN 备份从生产环境复制到测试环境。从 Oracle 11g Release 2 开始，你可以使用 RMAN 基于从目标服务器复制到辅助服务器的备份来复制数据库。有关无目标（targetless）复制的详细信息，请参见\
  \ MOS 注释 874352.1。\n\n在此示例中，源服务器和目标服务器具有不同的挂载点。以下是使用 RMAN 备份在单独的服务器上重建数据库所需的高级步骤：\n\
  \n1.  在源数据库上创建 RMAN 备份。\n2.  将 RMAN 备份复制到目标服务器。以下所有步骤均在目标数据库服务器上执行。\n3.  确保已安装 Oracle\
  \ 软件。\n4.  设置所需的 OS 环境变量。\n5.  为要还原的数据库创建 `init.ora` 文件。\n6.  为数据文件、控制文件和转储/跟踪文件创建任何必需的目录。\n\
  7.  在 `nomount` 模式下启动数据库。\n8.  从 RMAN 备份中还原控制文件。\n9.  在 `mount` 模式下启动数据库。\n10. 使控制文件知晓\
  \ RMAN 备份的位置。\n11. 重命名并还原数据文件以反映新的目录位置。\n12. 恢复数据库。\n13. 设置联机重做日志的新位置。\n14. 打开数据库。\n\
  15. 添加临时文件（temp file）。\n16. 重命名数据库（可选）。\n\n以上每个步骤都将在接下来的章节中详细说明。步骤 1 和 2 在源数据库服务器上执行。所有剩余步骤在目标服务器上执行。在本示例中，源数据库名为\
  \ `O12C`，目标数据库将命名为 `DEVDB`。\n\n\n\n## 使用 RMAN 跨平台/跨版本迁移数据库\n\n此外，源服务器与目标服务器的挂载点名称不同。源数据库的数据文件和控制文件位于：\n\
  \n```\n/u01/dbfile/O12C\n```\n\n在目标数据库上，数据文件和控制文件将被重命名并恢复到此目录：\n\n```\n/ora01/dbfile/DEVDB\n\
  ```\n\n目标数据库的在线重做日志将放置在此目录：\n\n```\n/ora01/oraredo/DEVDB\n```\n\n目标数据库的归档重做日志文件位置将设置如下：\n\
  \n```\n/ora01/arc/DEVDB\n```\n\n请记住，这些是我测试环境中服务器使用的目录。您需要调整这些目录名称，以反映您数据库服务器上的实际目录结构。\n\
  \n## 步骤 1. 在源数据库上创建 RMAN 备份\n\n备份数据库时，请确保已开启控制文件自动备份功能。同时，将归档重做日志作为备份的一部分包含进来，如下所示：\n\
  \n```\nRMAN> backup database plus archivelog;\n```\n\n您可以通过 `LIST BACKUP` 命令验证备份片的名称和位置。例如，源数据库的备份片如下所示：\n\
  \n```\nrman1_bonvb2js_1_1.bk\nrman1_bqnvb2k5_1_1.bk\nrman1_bsnvb2p3_1_1.bk\nrman_ctl_c-3423216220-20130113-06.bk\n\
  ```\n\n在上面的输出中，名称中包含 `c-3423216220` 字符串的文件是包含控制文件的备份片。您需要检查 `LIST BACKUP` 命令的输出，以确定哪个备份片包含控制文件。在步骤\
  \ 8 中，您将需要引用该备份片。\n\n## 步骤 2. 将 RMAN 备份复制到目标服务器\n\n在此步骤中，使用 `rsync` 或 `scp` 等工具将备份片从一台服务器复制到另一台。此示例使用\
  \ `scp` 命令复制备份片：\n\n```\n$ scp rman*  oracle@DEVBOX:/ora01/rman/DEVDB\n```\n\n在此示例中，复制备份文件之前，必须在目标服务器上创建\
  \ `/ora01/rman/DEVDB` 目录。根据您的环境，此步骤可能需要复制两次 RMAN 备份：一次从生产服务器到安全服务器，另一次从安全服务器到测试服务器。\n\
  \n![Image](img/sq.jpg) 注意 如果 RMAN 备份在磁带上而非磁盘上，则目标服务器必须安装/配置相同的介质管理器软件。此外，该服务器必须能够直接访问磁带上的\
  \ RMAN 备份。\n\n## 步骤 3. 确保已安装 Oracle\n\n确保在目标服务器上安装了与源数据库相同版本的 Oracle 二进制文件。\n\n\
  ## 步骤 4. 设置所需的 OS 变量\n\n您需要设置操作系统变量，例如 `ORACLE_SID`、`ORACLE_HOME` 和 `PATH`。通常，`ORACLE_SID`\
  \ 变量最初设置为与原始数据库上的名称一致。作为本配方最后一步（可选）的一部分，数据库名称将被更改。以下是目标服务器上 `ORACLE_SID` 和 `ORACLE_HOME`\
  \ 的设置：\n\n```\n$ echo $ORACLE_SID\nO12C\n\n$ echo $ORACLE_HOME\n/ora01/app/oracle/product/12.1.0.1/db_1\n\
  ```\n\n此时，也请考虑将 Oracle SID 添加到 `oratab` 文件中。如果您计划在复制后使用此数据库，则应具备设置所需 OS 变量的自动化方法。有关结合\
  \ `oratab` 文件设置 OS 变量的详细信息，请参阅第 1 章。\n\n## 步骤 5. 为要还原的数据库创建 init.ora 文件\n\n将 `init.ora`\
  \ 文件从原始服务器复制到目标服务器，并修改它，使其在目录路径方面与目标机器匹配。确保更改参数，例如 `CONTROL_FILES`，以反映目标服务器上的新路径目录（在此示例中为\
  \ `/ora01/dbfile/DEVDB`）。\n\n最初，`init.ora` 文件名为 `ORACLE_HOME/dbs/inito12c.ora`，数据库名称为\
  \ `O12C`。两者都将在后续步骤中重命名。以下是 `init.ora` 文件的内容：\n\n```\ncontrol_files='/ora01/dbfile/DEVDB/control01.ctl',\n\
  \              '/ora01/dbfile/DEVDB/control02.ctl'\ndb_block_size=8192\ndb_name='O12C'\n\
  log_archive_dest_1='location=/ora01/arc/DEVDB'\njob_queue_processes=10\nmemory_max_target=300000000\n\
  memory_target=300000000\nopen_cursors=100\nos_authent_prefix=''\nprocesses=100\n\
  remote_login_passwordfile='EXCLUSIVE'\nresource_limit=true\nshared_pool_size=80M\n\
  sql92_security=TRUE\nundo_management='AUTO'\nundo_tablespace='UNDOTBS1'\nworkarea_size_policy='AUTO'\n\
  ```\n\n![Image](img/sq.jpg) 注意 如果这是一个 Oracle 10g 示例，您将需要设置参数 `background_dump_dest`、`user_dump_dest`、`core_dump_dest`。\n\
  \n## 步骤 6. 为数据文件、控制文件以及转储/跟踪文件创建任何必需的目录\n\n在此示例中，创建目录 `/ora01/dbfile/DEVDB` 和 `/ora01/oraredo/DEVDB`：\n\
  \n```\n$ mkdir -p /ora01/dbfile/DEVDB\n$ mkdir -p /ora01/oraredo/DEVDB\n$ mkdir\
  \ -p /ora01/arc/DEVDB\n```\n\n## 步骤 7. 以 NOMOUNT 模式启动数据库\n\n您现在应该能够以 nomount 模式启动数据库：\n\
  \n```\n$ rman target /\nRMAN> startup nomount;\n```\n\n## 步骤 8. 从 RMAN 备份还原控制文件\n\
  \n接下来，从先前复制的备份中还原控制文件；例如，\n\n```\nRMAN> restore controlfile from\n'/ora01/rman/DEVDB/rman_ctl_c-3423216220-20130113-06.bk';\n\
  ```\n\n控制文件将被还原到 `CONTROL_FILES` 初始化参数指定的所有位置。以下是一些示例输出：\n\n```\nchannel ORA_DISK_1:\
  \ restore complete, elapsed time: 00:00:03\noutput file name=/ora01/dbfile/DEVDB/control01.ctl\n\
  output file name=/ora01/dbfile/DEVDB/control02.ctl\n```\n\n## 步骤 9. 以 MOUNT 模式启动数据库\n\
  \n您现在应该能够以 mount 模式启动数据库：\n\n```\nRMAN> alter database mount;\n```\n\n此时，您的控制文件已存在并已打开，但任何数据文件或在线重做日志都还不存在。\n\
  \n## 步骤 10. 让控制文件知晓 RMAN 备份的位置\n\n首先，使用 `CROSSCHECK` 命令让控制文件知道，没有任何备份或归档重做日志位于它们在原始服务器上的同一位置：\n\
  \n```\nRMAN> crosscheck backup; # 交叉检查备份\nRMAN> crosscheck copy;   # 交叉检查映像副本和归档日志\n\
  ```\n\n然后，使用 `CATALOG` 命令让控制文件知晓复制到目标服务器的备份片的位置和名称。\n\n![Image](img/sq.jpg) 注意 不要将\
  \ `CATALOG` 命令与恢复目录模式混淆。`CATALOG` 命令将 RMAN 元数据添加到控制文件，而恢复目录模式是一个用户（通常在单独的数据库中创建），可用于存储\
  \ RMAN 元数据。\n\n在此示例中，位于 `/ora01/rman/DEVDB` 目录中的任何 RMAN 文件都将在控制文件中编目：\n\n```\nRMAN>\
  \ catalog start with '/ora01/rman/DEVDB';\n```\n\n以下是一些示例输出：\n\n```\nList of Files\
  \ Unknown to the Database\n=====================================\nFile Name: /ora01/rman/DEVDB/rman1_bqnvb2k5_1_1.bk\n\
  File Name: /ora01/rman/DEVDB/rman1_bonvb2js_1_1.bk\nFile Name: /ora01/rman/DEVDB/rman_ctl_c-3423216220-20130113-06.bk\n\
  File Name: /ora01/rman/DEVDB/rman1_bsnvb2p3_1_1.bk\n\nDo you really want to catalog\
  \ the above files (enter YES or NO)?\n```\n\n现在，键入 `YES`（如果一切看起来正常）。然后，您应该能够使用 RMAN\
  \ 的 `LIST BACKUP` 命令来查看新编目的备份片：\n\n```\nRMAN> list backup;\n```\n\n## 步骤 11. 重命名并还原数据文件以反映新的目录位置\n\
  \n如果您的目标服务器具有与原始服务器目录完全相同的目录结构，您可以直接发出 `RESTORE` 命令：\n\n```\nRMAN> restore database;\n\
  ```\n\n\n\n# 将数据库文件恢复到不同目录\n\n然而，当将数据文件恢复到与原始目录不同的位置时，必须使用`SET NEWNAME`命令。创建一个文件，该文件包含一个\
  \ RMAN `run{}`块，其中有适当的`SET NEWNAME`和`RESTORE`命令。我喜欢使用一个 SQL 脚本来生成 SQL，作为我的起点。以下是一个示例脚本：\n\
  \n```\nset head off feed off verify off echo off pages 0 trimspool on\nset lines\
  \ 132 pagesize 0\nspo newname.sql\n--\nselect 'run{' from dual;\n--\nselect\n'set\
  \ newname for datafile ' || file# || ' to ' || '''' || name || '''' || ';'\nfrom\
  \ v$datafile;\n--\nselect\n'restore database;' || chr(10) ||\n'switch datafile all;'\
  \ || chr(10) ||\n'}'\nfrom dual;\n--\nspo off;\n```\n\n运行脚本后，生成的`newname.sql`脚本内容如下：\n\
  \n```\nrun{\nset newname for datafile 1 to '/u01/dbfile/O12C/system01.dbf';\nset\
  \ newname for datafile 2 to '/u01/dbfile/O12C/sysaux01.dbf';\nset newname for datafile\
  \ 3 to '/u01/dbfile/O12C/undotbs01.dbf';\nset newname for datafile 4 to '/u01/dbfile/O12C/users01.dbf';\n\
  restore database;\nswitch datafile all;\n}\n```\n\n然后，修改`newname.sql`脚本的内容，以反映目标数据库服务器上的目录。本例中最终的`newname.sql`脚本如下所示：\n\
  \n```\nrun{\nset newname for datafile 1 to '/ora01/dbfile/DEVDB/system01.dbf';\n\
  set newname for datafile 2 to '/ora01/dbfile/DEVDB/sysaux01.dbf';\nset newname for\
  \ datafile 3 to '/ora01/dbfile/DEVDB/undotbs01.dbf';\nset newname for datafile 4\
  \ to '/ora01/dbfile/DEVDB/users01.dbf';\nrestore database;\nswitch datafile all;\n\
  }\n```\n\n现在，连接到 RMAN，并运行前面的脚本以将数据文件恢复到新位置：\n\n```\n$ rman target /\nRMAN> @newname.sql\n\
  ```\n\n以下是输出的片段：\n\n```\ndatafile 1 switched to datafile copy\ninput datafile copy\
  \ RECID=5 STAMP=790357985 file name=/ora01/dbfile/DEVDB/system01.dbf\n```\n\n所有数据文件都已恢复到新的数据库服务器。你可以使用\
  \ RMAN 的`REPORT SCHEMA`命令来验证文件是否已恢复且位置正确：\n\n```\nRMAN> report schema;\n```\n\n\
  以下是部分示例输出：\n\n```\nRMAN-06139: WARNING: control file is not current for REPORT SCHEMA\n\
  Report of database schema for database with db_unique_name O12C\nList of Permanent\
  \ Datafiles\n===========================\nFile Size(MB) Tablespace           RB\
  \ segs Datafile Name\n---- -------- -------------------- ------- ------------------------\n\
  1    500      SYSTEM               ***     /ora01/dbfile/DEVDB/system01.dbf\n2 \
  \   500      SYSAUX               ***     /ora01/dbfile/DEVDB/sysaux01.dbf\n3  \
  \  800      UNDOTBS1             ***     /ora01/dbfile/DEVDB/undotbs01.dbf\n4  \
  \  50       USERS                ***     /ora01/dbfile/DEVDB/users01.dbf\n\nList\
  \ of Temporary Files\n=======================\nFile Size(MB) Tablespace        \
  \   Maxsize(MB) Tempfile Name\n---- -------- -------------------- ----------- --------------------\n\
  1    500      TEMP                 500         /u01/dbfile/O12C/temp01.dbf\n```\n\
  \n从上述输出中可以看到，数据库名称和临时表空间数据文件仍未反映目标数据库（`DEVDB`）。这些将在后续步骤中进行修改。\n\n### 步骤 12：恢复数据库\n\
  \n接下来，你需要应用备份期间生成的所有归档重做文件。这些文件应包含在备份中，因为使用了`ARCHIVELOG ALL`子句来执行备份。通过`RECOVER DATABASE`命令启动重做的应用：\n\
  \n```\nRMAN> recover database;\n```\n\nRMAN 将恢复并应用备份集中它拥有的尽可能多的归档重做日志，然后在遇到一个不存在的归档重做日志时可能会抛出错误；例如，\n\
  \n```\nRMAN-06054: media recovery requesting unknown archived log for...\n```\n\n\
  那个错误信息是正常的。恢复过程将恢复并应用备份中包含的归档重做日志，这应该足以打开数据库。恢复过程不知道应该在何处停止应用归档重做日志，因此将继续尝试，直到找不到下一个日志为止。话虽如此，现在是验证你的数据文件是否在线且不处于模糊状态的好时机：\n\
  \n```\nselect file#, status, fuzzy, error, checkpoint_change#,\nto_char(checkpoint_time,'dd-mon-rrrr\
  \ hh24:mi:ss') as checkpoint_time\nfrom v$datafile_header;\n```\n\n### 步骤 13：设置联机重做日志的新位置\n\
  \n如果你的源服务器和目标服务器具有完全相同的目录结构，那么你不需要为联机重做日志设置新位置（因此可以跳过此步骤）。\n\n然而，如果目录结构不同，那么你将需要更新控制文件以反映联机重做日志的新目录。我有时使用一个生成\
  \ SQL 的 SQL 脚本来协助完成此步骤：\n\n```\nset head off feed off verify off echo off pages\
  \ 0 trimspool on\nset lines 132 pagesize 0\nspo renlog.sql\nselect\n'alter database\
  \ rename file ' || chr(10)\n|| '''' || member || '''' || ' to ' || chr(10) || ''''\
  \ || member || '''' ||';'\nfrom v$logfile;\nspo off;\n```\n\n对于本例，以下是生成的`renlog.sql`文件的片段：\n\
  \n```\nalter database rename file\n'/u01/oraredo/O12C/redo01a.rdo' to\n'/u01/oraredo/O12C/redo01a.rdo';\n\
  ...\nalter database rename file\n'/u02/oraredo/O12C/redo03b.rdo' to\n'/u02/oraredo/O12C/redo03b.rdo';\n\
  ```\n\n`renlog.sql`的内容需要进行修改，以反映目标服务器上的目录结构。以下是编辑后的`renlog.sql`：\n\n```\nalter database\
  \ rename file\n'/u01/oraredo/O12C/redo01a.rdo' to\n'/ora01/oraredo/DEVDB/redo01a.rdo';\n\
  ...\nalter database rename file\n'/u02/oraredo/O12C/redo03b.rdo' to\n'/ora01/oraredo/DEVDB/redo03b.rdo';\n\
  ```\n\n通过运行`renlog.sql`脚本来更新控制文件：\n\n```\nSQL> @renlog.sql\n```\n\n你可以从`V$LOGFILE`中查询以验证联机重做日志名称是否正确：\n\
  \n```\nSQL> select member from v$logfile;\n```\n\n以下是本例的输出：\n\n```\n/ora01/oraredo/DEVDB/redo01a.rdo\n\
  /ora01/oraredo/DEVDB/redo02a.rdo\n/ora01/oraredo/DEVDB/redo03a.rdo\n/ora01/oraredo/DEVDB/redo01b.rdo\n\
  /ora01/oraredo/DEVDB/redo02b.rdo\n/ora01/oraredo/DEVDB/redo03b.rdo\n```\n\n确保新服务器上包含联机重做日志的目录存在。对于本例，`mkdir`命令如下：\n\
  \n```\n$ mkdir -p /ora01/oraredo/DEVDB\n```\n\n### 步骤 14：打开数据库\n\n你必须使用`OPEN RESETLOGS`命令打开数据库（因为此时没有重做日志，必须重新创建）：\n\
  \n```\nSQL> alter database open resetlogs;\n```\n\n如果成功，你应该会看到此消息：\n\n```\nStatement\
  \ processed\n```\n\n`Note` 请记住，新恢复副本的所有密码都与源数据库中的一样。你可能希望在复制的数据库中更改密码，特别是如果它是从生产环境复制的。\n\
  \n### 步骤 15：添加临时文件\n\n当你启动数据库时，Oracle 会自动尝试向数据库添加任何缺失的临时文件。如果目标服务器上的目录结构与源服务器不同，Oracle\
  \ 将无法做到这一点。在这种情况下，你将必须手动添加任何缺失的临时文件。为此，首先将临时表空间的临时文件脱机。来自源数据库的文件定义像这样脱机：\n\n```\n\
  SQL> alter database tempfile '/u01/dbfile/O12C/temp01.dbf' offline;\nSQL> alter\
  \ database tempfile '/u01/dbfile/O12C/temp01.dbf' drop;\n```\n\n接下来，向`TEMP`表空间添加一个临时表空间文件，该文件匹配目标数据库服务器的目录结构：\n\
  \n```\nSQL> alter tablespace temp add tempfile '/ora01/dbfile/DEVDB/temp01.dbf'\n\
  \     size 100m;\n```\n\n\n\n你可以运行 `REPORT SCHEMA` 命令来验证所有文件是否位于正确的位置。\n\n## 步骤\
  \ 16. 重命名数据库\n\n此步骤是可选的。如果你需要重命名数据库以反映开发或测试数据库的名称，请创建一个包含 `CREATE CONTROLFILE` 语句的跟踪文件，并用它来重命名你的数据库。\n\
  \n![Image](img/sq.jpg) `提示` 如果你不重命名数据库，请注意对同一恢复目录执行的连接和重新同步操作（该目录由原始/源数据库使用）。这会导致恢复目录混淆哪个是真正的源数据库，并可能危及你恢复和还原真正源数据库的能力。\n\
  \n重命名数据库的步骤如下：\n\n### 1. 生成跟踪文件\n\n生成一个包含重新创建控制文件的 SQL 命令的跟踪文件：\n\n```sql\nSQL>\
  \ alter database backup controlfile to trace as '/tmp/cf.sql' resetlogs;\n```\n\n\
  ### 2. 关闭数据库\n\n关闭数据库：\n\n```sql\nSQL> shutdown immediate;\n```\n\n### 3. 修改跟踪文件\n\
  \n修改 `/tmp/cf.sql` 跟踪文件；确保在输出的开头一行中指定 `SET DATABASE \"<新数据库名称>\"`：\n\n```sql\nCREATE\
  \ CONTROLFILE REUSE SET DATABASE \"DEVDB\" RESETLOGS ARCHIVELOG\n    MAXLOGFILES\
  \ 16\n    MAXLOGMEMBERS 4\n    MAXDATAFILES 1024\n    MAXINSTANCES 1\n    MAXLOGHISTORY\
  \ 876\nLOGFILE\n  GROUP 1 (\n    '/ora01/oraredo/DEVDB/redo01a.rdo',\n    '/ora01/oraredo/DEVDB/redo01b.rdo'\n\
    ) SIZE 50M BLOCKSIZE 512,\n  GROUP 2 (\n    '/ora01/oraredo/DEVDB/redo02a.rdo',\n\
      '/ora01/oraredo/DEVDB/redo02b.rdo'\n  ) SIZE 50M BLOCKSIZE 512,\n  GROUP 3 (\n\
      '/ora01/oraredo/DEVDB/redo03a.rdo',\n    '/ora01/oraredo/DEVDB/redo03b.rdo'\n\
    ) SIZE 50M BLOCKSIZE 512\nDATAFILE\n  '/ora01/dbfile/DEVDB/system01.dbf',\n  '/ora01/dbfile/DEVDB/sysaux01.dbf',\n\
    '/ora01/dbfile/DEVDB/undotbs01.dbf',\n  '/ora01/dbfile/DEVDB/users01.dbf'\nCHARACTER\
  \ SET AL32UTF8;\n```\n\n![Image](img/sq.jpg) `注意` 如果你在前面的脚本开头没有指定 `SET DATABASE`，那么当你运行该脚本时（如本示例后面所示），你会收到类似这样的错误：`ORA-01161:\
  \ database name ... in file header does not match`。\n\n### 4. 创建新的 init.ora 文件\n\
  \n创建一个与新数据库名称匹配的 `init.ora` 文件：\n\n```bash\n$ cd $ORACLE_HOME/dbs\n$ cp init<旧 _sid>.ora\
  \ init<新 _sid>.ora\n$ cp inito12c.ora initDEVDB.ora\n```\n\n### 5. 修改 DB_NAME 变量\n\
  \n在新的 `init.ora` 文件中修改 `DB_NAME` 变量（在本示例中，它被设置为 `DEVDB`）：\n\n```bash\ndb_name='DEVDB'\n\
  ```\n\n### 6. 设置 ORACLE_SID 变量\n\n设置 `ORACLE_SID` 操作系统变量以反映新的 `SID` 名称（在本示例中，它被设置为\
  \ `DEVDB`）：\n\n```bash\n$ echo $ORACLE_SID\nDEVDB\n```\n\n### 7. 启动实例\n\n以 nomount\
  \ 模式启动实例：\n\n```sql\nSQL> startup nomount;\n```\n\n### 8. 运行跟踪文件\n\n运行跟踪文件（来自步骤\
  \ 2）以重新创建控制文件：\n\n```sql\nSQL> @/tmp/cf.sql\n```\n\n![Image](img/sq.jpg) `注意` 在本示例中，控制文件已存在于\
  \ `CONTROL_FILES` 初始化参数指定的位置；因此，在 `CREATE CONTROL FILE` 语句中使用了 `REUSE` 参数。\n\n###\
  \ 9. 打开数据库\n\n使用 `OPEN RESETLOGS` 打开数据库：\n\n```sql\nSQL> alter database open resetlogs;\n\
  ```\n\n如果成功，你将拥有一个原始数据库的副本数据库。所有的数据文件、控制文件、归档重做日志和联机重做日志都位于新位置，并且数据库具有新的名称。\n\n\
  ### 10. 确保临时表空间存在\n\n作为最后一步，确保你的临时表空间存在：\n\n```sql\nALTER TABLESPACE TEMP ADD TEMPFILE\
  \ '/ora01/dbfile/DEVDB/temp01.dbf'\n     SIZE 104857600  REUSE AUTOEXTEND OFF;\n\
  ```\n\n![Image](img/sq.jpg) `提示` 你也可以使用 `NID` 工具来更改数据库名称和数据库标识符 (DBID)。更多详情请参阅 MOS\
  \ 笔记 863800.1。\n\n### 总结\n\nRMAN 是 Recovery Manager（恢复管理器）的首字母缩写。值得注意的是，Oracle 并未将此工具命名为\
  \ Backup Manager（备份管理器）。Oracle 团队认识到，尽管备份很重要，但 B&R（备份与恢复）工具的真正价值在于其恢复和还原数据库的能力。能够管理恢复过程是关键技能。当数据库损坏需要还原时，所有人都会指望\
  \ DBA 来执行平稳快速的数据库恢复。Oracle DBA 应该使用 RMAN 来保护、确保公司数据资产的安全和可用性。\n\n还原和恢复过程类似于骨折后的愈合过程。从备份还原数据文件并将其放回原始目录，可以比作将骨头复位到原始位置。恢复数据文件类似于骨折的愈合——将骨头恢复到断裂前的状态。当你恢复数据文件时，你应用事务（从归档重做和联机重做中获取）将还原的数据文件转换回介质故障发生前的状态。\n\
  \nRMAN 可用于任何类型的还原和恢复场景。根据具体情况，RMAN 可用于还原整个数据库、特定数据文件、控制文件、服务器参数文件、归档重做日志，或仅还原特定的数据块。你可以指示\
  \ RMAN 执行完全恢复或不完全恢复。\n\n本章最后一节详细介绍了如何使用 RMAN 将数据库还原和恢复到远程服务器。我建议你定期尝试这种类型的恢复，以演练你的\
  \ B&R 策略。一旦你能够成功地将数据库还原到与原始服务器不同的服务器上，你将获得极大的信心并完全理解 B&R 的内部机制。\n\n# 第 7 章\n\n![image](img/frontdot.jpg)\n\
  \n## 处理联机重做日志故障\n\n我曾为一家公司工作，该公司刚刚实施了一台昂贵的数据库服务器，其每个组件都内置了冗余，至少我是这么认为的。服务器配置了用于所有数据库文件和联机重做日志组的\
  \ RAID 磁盘。团队确信这些磁盘的故障风险极小。\n\n因此，我决定不对联机重做日志组进行多路复用。几天后，一个用于维持磁盘控制器缓存的廉价电池失效了。这导致当前的联机重做日志组损坏。结果，公司丢失了数据，经历了代价高昂的停机时间，并且不得不执行不完全恢复。\n\
  \n如第 2 章所述，联机重做日志是关键的数据库文件，记录了数据库中发生的所有事务。由于 RMAN 不备份联机重做日志文件，你无法使用 RMAN 来还原这些关键文件。考虑到它们的重要性，我认为有必要专门用一章来讨论如何处理联机重做日志文件的故障。\n\
  \n联机重做日志的介质故障通常在以下情况下被发现：数据库停止工作（某个组的所有成员都经历了介质故障），或者你在 `alert.log` 中注意到指示问题的错误，例如：\n\
  \n```\nORA-00312: online log 3 thread 1: '/u01/oraredo/O12C/redo02b.rdo'\n```\n\n\
  一旦发现问题，第一步就是确定如何从此故障中恢复。\n\n![Image](img/sq.jpg) `提示` 使用 RMAN 的 `backup database\
  \ plus archivelog` 命令，确保在备份数据库之前和之后，你当前的联机重做日志文件（所有线程的）都已切换并归档。\n\n### 确定行动方案\n\n\
  如果你遇到了联机重做日志文件的问题，并需要确定它们的状况以及采取什么行动。处理联机重做日志文件故障时，请遵循以下步骤：\n\n\n\n# 重做日志故障诊断\n\n\
  ## 故障诊断步骤\n\n1.  检查 `alert.log` 文件，以确定哪些联机重做日志文件经历了介质故障。\n2.  查询 `V$LOG` 和 `V$LOGFILE`\
  \ 以确定日志组的状态和镜像程度。\n3.  如果镜像组中仍有一个正常运行的成员，请参阅本章中关于“丢失镜像组中一个成员后的恢复”部分，了解如何修复故障成员的详细信息。\n\
  4.  根据日志组的状态，使用 表 7-1 来确定应采取的操作。\n\n表 7-1. 确定应采取的操作\n\n![Table7-1](img/Table7-1.jpg)\n\
  \n检查目标数据库的 `alert.log` 文件，以确定哪个联机重做日志文件成员不可用。与联机重做日志文件故障相关的 Oracle 错误消息是 `ORA-00312`\
  \ 和 `ORA-00313`。以下是在联机重做日志文件出现问题时写入 `alert.log` 文件的错误示例：\n\n```\nORA-00313: open\
  \ failed for members of log group 2 of thread 1\nORA-00312: online log 2 thread\
  \ 1: '/u02/oraredo/O12C/redo02b.rdo'\n```\n\n查询 `V$LOG` 和 `V$LOGFILE` 视图以确定日志组的状态以及每组中的成员文件：\n\
  \n```\nSELECT\n a.group#\n,a.thread#\n,a.status grp_status\n,b.member member\n,b.status\
  \ mem_status\n,a.bytes/1024/1024 mbytes\nFROM v$log     a,\n     v$logfile b\nWHERE\
  \ a.group# = b.group#\nORDER BY a.group#, b.member;\n```\n\n以下是一些示例输出：\n\n```\n\
  GROUP#  THREAD# GRP_STATUS MEMBER                         MEM_STA   MBYTES\n------\
  \ -------- ---------- ------------------------------ ------- --------\n     1  \
  \      1 INACTIVE   /u01/oraredo/O12C/redo01a.rdo                50\n     1    \
  \    1 INACTIVE   /u02/oraredo/O12C/redo01b.rdo                50\n     2      \
  \  1 CURRENT    /u01/oraredo/O12C/redo02a.rdo                50\n     2        1\
  \ CURRENT    /u02/oraredo/O12C/redo02b.rdo                50\n     3        1 INACTIVE\
  \   /u01/oraredo/O12C/redo03a.rdo                50\n     3        1 INACTIVE  \
  \ /u02/oraredo/O12C/redo03b.rdo                50\n```\n\n如果镜像组中只有一个成员经历了故障，那么请继续阅读“丢失镜像组中一个成员后的恢复”部分。如果重做日志组的所有成员都经历了故障，并且您的数据库是打开的，那么一旦后台归档进程无法成功复制故障的联机重做日志文件成员，它就会挂起（停止处理事务）。如果您的数据库是关闭的，并且所有成员中有一个联机重做日志组的所有成员都经历了介质故障，Oracle\
  \ 将不允许您打开它。当您尝试打开数据库时，您会看到类似以下消息：\n\n```\nORA-00313: open failed for members of\
  \ log group...\n```\n\n根据为故障组在 `V$LOG` 中报告的状态，使用 表 7-1 来确定应采取的操作。\n\n目标数据库的 `alert.log`\
  \ 文件包含确定发生了何种类型故障的最佳信息。如果镜像组中只有一个成员故障，那么您只能通过检查 alert.log 文件来检测到这一点。您也可以尝试停止并启动数据库。如果一个组的所有成员都经历了介质故障，那么\
  \ Oracle 将不允许您打开数据库，并会显示 ORA-00313 错误消息。\n\n`alert.log` 文件还会告知您其他错误消息已写入跟踪文件的位置：\n\
  \n```\nAdditional information: 3\nChecker run found 1 new persistent data failures\n\
  Errors in file /u01/app/oracle/diag/rdbms/o12C/O12C/trace/O12C_lgwr_10531.trc:\n\
  ```\n\n在诊断联机重做日志问题时，`V$LOG`、`V$LOGFILE` 和 `V$LOG_HISTORY` 视图特别有用。您可以在数据库已装载或打开时查询这些视图。表\
  \ 7-2 简要描述了每个视图。\n\n表 7-2. 与联机重做日志相关的有用视图\n\n\n# V$LOG、V$LOGFILE 和 V$LOG_HISTORY\
  \ 视图\n| 视图 | 描述 |\n| --- | --- |\n| `V$LOG` | 显示存储在控制文件中的在线重做日志组信息。 |\n| `V$LOGFILE`\
  \ | 显示在线重做日志文件成员信息。 |\n| `V$LOG_HISTORY` | 控制文件中在线重做日志信息的历史记录。 |\n\n`V$LOG` 视图的\
  \ `STATUS` 列在使用在线重做日志组时特别有用。表 7-3 描述了 `V$LOG` 视图中的每个状态及其含义。\n\n## 表 7-3. `V$LOG`\
  \ 视图中的在线重做日志组状态\n\n| 状态 | 含义 |\n| --- | --- |\n| `CURRENT` | 日志写入器当前正在写入的日志组。 |\n\
  | `ACTIVE` | 崩溃恢复需要该日志组，并且可能已归档，也可能未归档。 |\n| `CLEARING` | 正在通过 `alter database clear\
  \ logfile` 命令清除该日志组。 |\n| `CLEARING_CURRENT` | 正在清除一个已关闭线程的当前日志组。 |\n| `INACTIVE`\
  \ | 崩溃恢复不需要该日志组，并且可能已归档，也可能未归档。 |\n| `UNUSED` | 该日志组从未被写入；它是最近创建的。 |\n\n`V$LOGFILE`\
  \ 视图的 `STATUS` 列也包含有用的信息。此视图包含有关日志组中每个物理在线重做日志文件成员的信息。表 7-4 提供了每个日志文件成员状态的描述。\n\n\
  ## 表 7-4. `V$LOGFILE` 视图中的在线重做日志文件成员状态\n\n| 状态 | 含义 |\n| --- | --- |\n| `INVALID`\
  \ | 该日志文件成员不可访问，或是最近创建的。 |\n| `DELETED` | 该日志文件成员不再使用。 |\n| `STALE` | 该日志文件成员的内容不完整。\
  \ |\n| `NULL` | 该日志文件成员正被数据库使用。 |\n\n区分 `V$LOG` 中的 `STATUS` 列和 `V$LOGFILE` 中的 `STATUS`\
  \ 列很重要。`V$LOG` 中的 `STATUS` 列反映的是日志组的状态。`V$LOGFILE` 中的 `STATUS` 列报告的是物理在线重做日志文件成员的状态。\n\
  \n# 在丢失多路复用组的一个成员后进行恢复\n\n假设你在 `alert.log` 文件中看到此消息：\n```\nORA-00312: online log\
  \ 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\n```\n\n你知道此组是多路复用的，但只看到其中一个成员出错。如果你的在线重做日志文件成员是多路复用的，只要日志写入器能够成功写入当前日志组的一个成员，它就会继续运行。如果问题是暂时的，那么一旦在线重做日志文件变得可用，日志写入器就会开始写入该文件，就像从未发生过问题一样。\n\
  \n如果介质故障是永久性的（例如磁盘损坏），那么你需要更换磁盘并删除并重新创建损坏的成员到其原始位置。如果你没有更换损坏磁盘的选项，那么你需要删除损坏的成员并在替代位置重新创建它。\n\
  \n对于永久性介质故障，请按照以下说明删除并重新创建在线重做日志组的一个成员：\n1.  识别发生介质故障的在线重做日志文件（检查 `alert.log`）。\n\
  2.  确保该在线重做日志文件不是当前在线日志组的一部分。\n3.  删除损坏的成员。\n4.  向该组添加一个新成员。\n\n首先，打开你的 `alert.log`\
  \ 文件，查找标识日志组中哪个成员发生介质故障的 `ORA-00312` 消息。你应该在 `alert.log` 文件中看到类似以下的内容：\n```\nORA-00312:\
  \ online log 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\nErrors in file\n/u01/app/oracle/diag/rdbms/o12C/O12C/trace/O12C_lgwr_10531.trc:\n\
  ```\n\n此消息告诉你哪个日志成员已失效。`alert.log` 文件输出还指定了已生成一个跟踪文件。你将在指定的跟踪文件中找到有关损坏成员的更多信息：\n\
  ```\nORA-00313: open failed for members of log group 2 of thread 1\nORA-00312: online\
  \ log 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\nORA-27037: unable to obtain file\
  \ status\nLinux-x86_64 Error: 2: No such file or directory\nORA-00321: log 2 of\
  \ thread 1, cannot update log file header\nORA-00312: online log 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\n\
  ```\n\n从前面的输出可以看出，在线重做日志组 2 的一个成员出现问题。一旦识别出损坏的在线重做日志文件，请执行以下查询以检查该在线重做日志文件的组是否具有\
  \ `CURRENT` 状态（在此示例中，我们关注组 2）：\n```\nSELECT group#, status, archived, thread#, sequence#\n\
  FROM v$log;\n```\n\n以下是一些示例输出，表明组 2 不是当前日志：\n```\n    GROUP# STATUS           ARC\
  \    THREAD#  SEQUENCE#\n---------- ---------------- --- ---------- ----------\n\
  \         1 CURRENT          NO           1         25\n         3 INACTIVE    \
  \     NO           1         24\n         2 INACTIVE         NO           1    \
  \     23\n```\n\n`注意` 如果你尝试删除当前日志组的成员，Oracle 将抛出 ORA-01609 错误，指明该日志是当前的，你不能删除其成员。\n\
  \n如果失效的成员位于当前日志组中，则使用 `alter system switch logfile` 命令使下一个组成为当前组。然后按如下方式删除失效的成员：\n\
  ```\nSQL> alter database drop logfile member '/u02/oraredo/O12C/redo02b.rdo';\n\
  ```\n\n然后重新创建在线重做日志文件成员：\n```\nSQL> alter database add logfile member '/u02/oraredo/O12C/redo02b.rdo'\n\
  \     to group 2;\n```\n\n请记住，前面的命令是示例，你必须为你的环境指定目录、日志文件成员文件和组号。\n\n如果目标位置已经存在一个未使用的日志文件，你可以使用\
  \ `reuse` 参数来覆盖并重用该日志文件。该日志文件必须与组中的其他日志文件大小相同：\n```\nSQL> alter database add logfile\
  \ member '</directory/file_name>' reuse\n     to group <group#>;\n```\n\n如前所述，只要\
  \ Oracle 能够写入多路复用重做日志组的至少一个成员，它就会继续运行。当日志写入器无法写入当前在线重做日志文件时，错误消息将写入 `alert.log`\
  \ 文件。\n\n你应该定期检查你的 `alert.log` 文件中的 Oracle 错误。这可能是你发现组成员发生介质故障的唯一方式。我建议你运行一个定期批处理作业，搜索\
  \ `alert.log` 文件中的任何错误，并在发现潜在问题时自动通知你。\n\n一旦识别出在线重做日志组中的损坏成员，你就可以删除并重新创建在线重做日志文件。新创建的在线重做日志文件在\
  \ `V$LOGFILE` 中可能显示 `INVALID` 状态，直到它成为 `CURRENT` 日志组的一部分。一旦新创建的成员成为 `CURRENT` 日志组的一部分，其状态应更改为\
  \ `NULL`。`NULL` 成员状态（如 表 7-4 所述）表示数据库正在使用该在线重做日志文件。\n\n你可以在数据库处于挂载（`MOUNTED`）状态或打开（`OPEN`）状态时删除和添加在线重做日志文件成员。我建议在删除和重新创建日志成员时，让数据库处于挂载状态。这将确保在删除和重新创建成员期间，日志组的状态不会改变。你无法删除属于\
  \ `CURRENT` 组的在线重做日志文件成员。\n\n**注意** 使用`alter database drop logfile member`命令时，系统不允许从重做日志组中删除最后一个剩余的在线重做日志文件成员。如果尝试这样做，Oracle\
  \ 将抛出 ORA-00361 错误，指出无法删除最后一个日志成员。如果需要删除日志组的所有成员，请使用`alter database drop logfile\
  \ group`命令。\n\n## 搜索告警日志中的错误\n\n这是一个简单的 Bash shell 脚本，用于确定`alert.log`的位置，然后在其中搜索错误字符串。您可以使用类似的方法自动检测`alert.log`中的错误。\n\
  \n```bash\n#!/bin/bash\nexport DBS=\"ENGDEV STAGE OTEST\"\nexport MAILLIST=\"larry@support.com\"\
  \nexport BOX=`uname -a | awk '{print$2}'`\n#-----------------------------------------------------------\n\
  for instance in $DBS\ndo\n"
- "# call script to source oracle OS variables\nexport ORACLE_SID=O12C\nexport ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1\n\
  export PATH=$PATH:$ORACLE_HOME/bin\ncrit_var=$(\nsqlplus -s <<EOF\n/ as sysdba\n\
  SET HEAD OFF TERM OFF FEED OFF VERIFY OFF\nCOL value FORM A80\nselect value from\
  \ v\\$diag_info where name='Diag Trace';\nEOF)\n  if [ -r $crit_var/alert_$instance.log\
  \ ]\n  then\n  grep -ic error $crit_var/alert_$instance.log\n    if [ $? = 0 ]\n\
  \    then\n     mailx -s \"Error in $instance log file\" $MAILLIST <<EOF\nError\
  \ in $crit_var/alert_$instance.log file on $BOX...\nEOF\n    fi # $?\n  fi # -r\n\
  done # for instance\nexit 0\n```\n\n您可以轻松修改以上脚本以适应您的环境要求。例如，您可能需要更改 Oracle 操作系统变量的加载方式、搜索的数据库、错误字符串以及电子邮件地址。这只是一个简单的示例，展示了使用\
  \ shell 脚本自动搜索文件中错误的强大功能。\n\n## 丢失所有非活动重做日志组成员后的恢复\n\n如果您丢失了某个非活动重做日志组的所有成员，请执行以下步骤：\n\
  \n1.  验证该组的所有成员是否都已损坏（通过检查`alert.log`文件）。\n2.  验证日志组状态是否为`INACTIVE`。\n3.  使用`clear\
  \ logfile`命令重新创建该日志组。\n4.  如果重新创建的日志组尚未归档，请立即备份数据库。\n\n如果在线重做日志组的所有成员都已损坏，您将无法打开数据库。在这种情况下，Oracle\
  \ 只允许您装载（mount）数据库。\n\n首先检查您的`alert.log`文件，确认某个重做日志组的所有成员都已损坏。您应该会看到一条消息，指示某个在线重做日志组的所有成员已损坏，数据库无法打开：\n\
  \n```\nORA-00312: online log 2 thread 1: '/u01/oraredo/O12C/redo02a.rdo'\nORA-00313:\
  \ open failed for members of log group 2 of thread 1\n```\n\n接下来，确保您的数据库处于装载（mount）模式：\n\
  \n```\n$ sqlplus / as sysdba\nSQL> startup mount;\n```\n\n然后，运行以下查询以验证损坏的日志组是否为`INACTIVE`状态，并确定其是否已归档：\n\
  \n```\nSELECT group#, status, archived, thread#, sequence#\nFROM v$log;\n```\n\n\
  以下是一些示例输出：\n\n```\n    GROUP# STATUS           ARC    THREAD#  SEQUENCE#\n----------\
  \ ---------------- --- ---------- ----------\n         1 CURRENT          NO   \
  \        1         25\n         3 INACTIVE         NO           1         24\n \
  \        2 INACTIVE         NO           1         23\n```\n\n如果状态为`INACTIVE`，则该日志组不再需要用于崩溃恢复（如表\
  \ 7-3 所述）。因此，您可以使用`clear logfile`命令重新创建该日志组的所有成员。以下示例重新创建第 2 组的所有日志成员：\n\n```\n\
  SQL> alter database clear logfile group 2;\n```\n\n如果该日志组尚未归档，那么您将需要使用`clear unarchived\
  \ logfile`命令，如下所示：\n\n\nSQL> alter database clear unarchived logfile group 2;\n\
  ```\n\n如果被清除的日志组之前未被归档，那么立即为你的数据库创建一个备份至关重要。关于如何对数据库进行完整备份的详细信息，请参阅第 5 章。\n\n请记住，在前面的例子中，日志文件组编号为\
  \ 2。你必须修改组号以匹配你实际场景中的组号。\n\n如果在线重做日志组处于非活动状态并已归档，那么它的内容对于崩溃恢复或介质恢复来说就不是必需的。因此，可以使用\
  \ `clear logfile` 命令来重新创建一个组中的所有在线重做日志文件成员。\n\n![Image](img/sq.jpg) **注意** `clear\
  \ logfile` 命令会为你删除并重新创建日志组中的所有成员。即使你的数据库中只有两个日志组，你也可以执行此命令。\n\n如果在线重做日志组尚未归档，那么它可能对介质恢复是必需的。在这种情况下，使用\
  \ `clear unarchived logfile` 命令来重新创建日志文件组成员。在此情况下，请尽快备份你的数据库。\n\n如果上次数据库备份是在日志中的重做信息创建之前进行的，那么可能需要未归档的日志组来进行介质恢复。这意味着如果你尝试执行介质恢复，你将无法恢复损坏日志文件中的任何信息，或该日志之后创建的任何事务。\n\
  \n如果由于 I/O 错误导致 `clear logfile` 命令执行失败，并且这是一个永久性问题，那么你需要考虑删除该日志组并在其他位置重新创建。关于如何删除和重新创建日志文件组的指引，请参阅接下来的两个小节。\n\
  \n## 删除日志文件组\n\n清除日志文件组（告诉 Oracle 重新创建日志文件）的替代方法是删除并重新创建日志文件组。如果你需要在不同位置重新创建日志文件组，因为原始位置已损坏或不可用，那么你可能需要这样做。\n\
  \n日志组必须处于非活动状态才能被删除。你可以按如下方式检查日志组的状态：\n\n```sql\nSQL> select group#, status, archived,\
  \ thread#, sequence# from v$log;\n```\n\n你可以使用 `drop logfile group` 命令删除日志组：\n\n\
  ```sql\nSQL> alter database drop logfile group <group #>;\n```\n\n如果你尝试删除当前的在线日志组，Oracle\
  \ 将返回 `ORA-01623` 错误，指出你不能删除当前组。使用 `alter system switch logfile` 命令来切换日志，使下一个组成为当前组。\n\
  \n日志切换后，之前是当前组的日志组只要包含 Oracle 执行崩溃恢复所需的重做信息，就会保持活动状态。如果你尝试删除一个处于活动状态的日志组，Oracle\
  \ 将抛出 `ORA-01624` 错误，指出该日志组是崩溃恢复所必需的。发出 `alter system checkpoint` 命令以使日志组变为非活动状态。\n\
  \n此外，如果删除操作会导致你的数据库中只剩下一个日志组，那么你将无法发出 `drop logfile group` 命令。如果你尝试这样做，Oracle 将抛出\
  \ `ORA-01567` 错误，并告知你删除日志组是不被允许的，因为这将使你的数据库只剩下一个日志组（Oracle 最少需要两个日志组才能运行）。\n\n##\
  \ 添加日志文件组\n\n你可以使用 `add logfile group` 命令添加新的日志组：\n\n```sql\nSQL> alter database\
  \ add logfile group <group_#>\n('/directory/file') SIZE <bytes> K|M|G;\n```\n\n\
  你可以以字节、千字节、兆字节或千兆字节为单位指定日志文件的大小。以下示例添加了一个包含两个成员的日志组，每个成员大小为 50MB：\n\n```sql\nSQL>\
  \ alter database add logfile group 2\n('/u01/oraredo/O12C/redo02a.rdo',\n '/u02/oraredo/O12C/redo02b.rdo')\
  \ SIZE 50M;\n```\n\n如果由于某些原因日志文件成员已存在于磁盘上，你可以使用 `reuse` 子句来覆盖它们：\n\n\n\n"
- "# 恢复活动重做日志组所有成员丢失后的状态\n\n```sql\nalter database add logfile group 2\n('/u01/oraredo/O12C/redo02a.rdo',\n\
  \ '/u02/oraredo/O12C/redo02b.rdo') SIZE 50M reuse;\n```\n\n![Image](img/sq.jpg)\
  \ `提示` 有关移动联机重做日志组的示例，请参见第 2 章。\n\n如果您数据库中某个活动的联机重做日志组的所有成员都发生了介质故障，那么在恢复该活动联机重做日志组时，请执行以下步骤：\n\
  \n1.  确认成员损坏情况。\n2.  确认其状态为 `ACTIVE`。\n3.  尝试发出一个检查点。\n4.  如果检查点成功，状态应变为 `INACTIVE`，然后您可以清除该日志组。\n\
  5.  如果被清除的日志组尚未归档，请立即备份您的数据库。\n6.  如果检查点不成功，那么您将必须执行不完全恢复。\n\n检查目标数据库的 `alert.log`\
  \ 文件，确认损坏情况。您应该会在 `alert.log` 文件中看到一条标识损坏成员的消息：\n\n```\nORA-00312: online log 2\
  \ thread 1: '/u01/oraredo/O12C/redo02a.rdo'\nORA-00312: online log 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\n\
  ```\n\n接下来，验证受损的日志组状态是否为 `ACTIVE`，如下所示：\n\n```\n$ sqlplus / as sysdba\nSQL> startup\
  \ mount;\n```\n\n运行以下查询：\n\n```sql\nSQL> select group#, status, archived, thread#,\
  \ sequence# from v$log;\n```\n\n以下是示例输出：\n\n```\nGROUP# STATUS           ARC  THREAD#\
  \  SEQUENCE#\n------ ---------------- --- --------\n     1 CURRENT          NO \
  \        1         92\n     2 ACTIVE           YES        1         91\n     3 INACTIVE\
  \         YES        1         90\n```\n\n如果状态是 `ACTIVE`，则尝试发出 `alter system checkpoint`\
  \ 命令，如下所示：\n\n```sql\nSQL> alter system checkpoint;\nSystem altered.\n```\n\n如果检查点成功完成，则活动的日志组应被标记为\
  \ `INACTIVE`。成功的检查点确保所有已修改的数据库缓冲区都已写入磁盘，此时，只有包含在 `CURRENT` 联机重做日志中的事务才需要用于崩溃恢复。\n\
  \n![Image](img/sq.jpg) `注意` 如果检查点不成功，您将必须执行不完全恢复。有关此场景下的完整选项列表，请参见本章“恢复当前重做日志组所有成员丢失后的状态”一节。\n\
  \n如果状态是 `INACTIVE` 且日志已归档，您可以使用 `clear logfile` 命令重新创建日志组，如下所示：\n\n```sql\nSQL>\
  \ alter database clear logfile group <group#>;\n```\n\n如果状态是 `INACTIVE` 且日志组尚未归档，则使用\
  \ `clear unarchived logfile` 命令重新创建它，如下所示：\n\n```sql\nSQL> alter database clear\
  \ unarchived logfile group <group#>;\n```\n\n如果被清除的日志组之前未归档，立即创建数据库备份至关重要。有关创建数据库完整备份的详细信息，请参见第\
  \ 5 章。\n\n状态为 `ACTIVE` 的联机重做日志组仍然需要用于崩溃恢复。如果某个活动的联机重做日志组的所有成员都发生了介质故障，那么您必须尝试发出检查点。如果检查点成功，则可以清除该日志组。如果检查点不成功，则必须执行不完全恢复。\n\
  \n如果检查点成功且日志组未归档，那么该日志可能仍需要用于介质恢复。在此情况下，请尽快备份您的数据库。如果上次数据库备份是在该日志中的重做信息创建之前进行的，那么未归档的日志组可能仍需要用于介质恢复。这意味着如果您尝试执行介质恢复，您将无法恢复损坏日志文件中的任何信息或在该日志之后创建的任何事务。\n\
  \n"
- "# 恢复当前重做日志组所有成员丢失后的状态\n\n如果您数据库中当前联机重做日志组的所有成员都发生了介质故障，那么（不幸的是）当您丢失当前联机重做日志组的所有成员时，您的备选方案是有限的。以下是一些可能的选项：\n\
  \n*   执行不完全恢复到最后一个完好的 `SCN`。\n*   如果启用了闪回，将数据库闪回到最后一个完好的 `SCN`。\n*   如果您正在使用 Oracle\
  \ Data Guard，则故障切换到您的物理或逻辑备用数据库。\n*   联系 Oracle 支持服务寻求建议。\n\n为不完全恢复做准备，首先通过查询 `V$LOG`\
  \ 中的 `FIRST_CHANGE#` 列来确定最后一个完好的 `SCN`。在此场景中，您仅丢失了当前联机重做日志。因此，您可以执行不完全恢复，恢复到但不包括当前联机重做日志的\
  \ `FIRST_CHANGE#` `SCN`。\n\n```\nSQL> shutdown immediate;\nSQL> startup mount;\n\
  ```\n\n现在发出此查询：\n\n```sql\nSELECT group#, status, archived,\nthread#, sequence#,\
  \ first_change#\nFROM v$log;\n```\n\n以下是示例输出：\n\n```\nGROUP# STATUS           ARC\
  \  THREAD#  SEQUENCE# FIRST_CHANGE#\n------ ---------------- --- -------- ----------\
  \ -------------\n     1 INACTIVE         YES        1         86        533781\n\
  \     2 INACTIVE         YES        1         85        533778\n     3 CURRENT \
  \         NO         1         87        533784\n```\n\n在此情况下，您可以恢复并恢复到但不包括 `SCN`\
  \ 533784。操作方法如下：\n\n```\nRMAN> restore database until scn 533784;\nRMAN> recover\
  \ database until scn 533784;\nRMAN> alter database open resetlogs;\n```\n\n![Image](img/sq.jpg)\
  \ `注意` 有关不完全恢复和/或闪回数据库的完整详细信息，请参见第 6 章。\n\n丢失当前联机重做日志组的所有成员可以说是可能发生在您数据库上的最糟糕的事情。如果您遭遇当前联机组所有成员的介质故障，那么您很可能会丢失这些日志中包含的所有事务。在这种情况下，您必须先执行不完全恢复，然后才能打开数据库。\n\
  \n![Image](img/sq.jpg) `提示` 如果您迫切需要恢复受损的当前联机重做日志文件中丢失的事务，请联系 Oracle 支持服务以探索所有选项。\n\
  \n### 总结\n\n理解如何处理联机重做日志故障至关重要。Oracle 没有提供在联机重做日志发生介质故障时自动修复问题的方法。因此，了解如何诊断和解决出现的任何问题非常重要。联机重做日志的故障很少见，但当它们确实发生时，您现在将能更好地做好准备，以高效有效地解决任何复杂情况。\n\
  \n"
- '# 第 8 章


  ![image](img/frontdot.jpg)


  '
- "# 数据泵\n\n数据泵通常被描述为旧版 `exp`/`imp` 实用程序的升级版本。这种描述并不准确；这有点像把现代智能手机称为老式转盘拨号座机的替代品。虽然旧版实用程序可靠且运行良好，但数据泵不仅涵盖了那些功能，还为数据在环境之间的抽取和移动增添了全新的维度。本章将帮助解释数据泵如何使您当前的数据传输任务更轻松，并将展示如何以您未曾想过的方式移动信息和解决问题。\n\
  \n数据泵使您能够高效地备份、复制、保护和转换大量数据和元数据。您可以通过多种方式使用数据泵：\n\n*   对整个数据库或部分数据执行时间点逻辑备份\n* \
  \  为测试或开发复制整个数据库或部分数据\n*   快速生成重新创建对象所需的 DDL\n*   通过从旧版本导出并导入到新版本来升级数据库\n\n\n\n\
  有时，数据库管理员（DBA）会表现出类似卢德分子那样对 `exp`/`imp` 工具的执着，因为 DBA 们熟悉这些工具的语法，并且它们能快速完成任务。即便这些传统工具易于使用，您也应考虑未来使用\
  \ **Data Pump**。Data Pump 相较于旧的 `exp`/`imp` 工具提供了**显著增强的功能**：\n\n*   针对大数据集的高性能，支持高效导出和导入千兆字节的数据\n\
  *   交互式命令行实用程序，允许您断开连接并在之后重新连接到正在运行的 Data Pump 作业\n*   能够从远程数据库导出大量数据并直接导入本地数据库，无需创建转储文件\n\
  *   能够在从导出到导入的过程中，对模式、表空间、数据文件和存储设置进行**即时更改**\n*   对对象和数据进行**精细过滤**\n*   通过（数据库）目录对象实现安全控制\n\
  *   高级功能，例如压缩和加密\n\n本章首先讨论 Data Pump 的架构。后续主题包括基本的导出和导入任务、跨网络移动数据、过滤数据以及在遗留模式下运行\
  \ Data Pump。\n\n## Data Pump 架构\n\nData Pump 由以下组件组成：\n\n*   `expdp`（Data Pump 导出实用程序）\n\
  *   `impdp`（Data Pump 导入实用程序）\n*   `DBMS_DATAPUMP` PL/SQL 包（Data Pump 应用程序编程接口 [API]）\n\
  *   `DBMS_METADATA` PL/SQL 包（Data Pump 元数据 API）\n\n`expdp` 和 `impdp` 实用程序在导出和导入数据及元数据时，会使用内置的\
  \ `DBMS_DATAPUMP` 和 `DBMS_METADATA` PL/SQL 包。`DBMS_DATAPUMP` 包用于在数据库环境之间移动整个数据库或数据子集。`DBMS_METADATA`\
  \ 包则用于导出和导入关于数据库对象的信息。\n\n![Image](img/sq.jpg) 注意：您可以从 SQL*Plus 中独立（在 `expdp` 和\
  \ `impdp` 之外）调用 `DBMS_DATAPUMP` 和 `DBMS_METADATA` 包。我很少直接从 SQL*Plus 调用这些包，但您可能有特定场景需要直接与它们交互。更多详情请参阅\
  \ *Oracle Database PL/SQL Packages and Types Reference Guide*，该指南可从 Oracle 网站 (`http://otn.oracle.com`)\
  \ 的 Technology Network 区域下载。\n\n### 主进程和工作进程\n\n当您启动 Data Pump 导出或导入作业时，会在数据库服务器上初始化一个主操作系统进程。此主进程的名称格式为\
  \ `ora_dmNN_<SID>`。在 Linux/Unix 系统上，您可以使用 `ps` 命令从操作系统提示符查看此进程：\n```\n$ ps -ef |\
  \ grep -v grep | grep ora_dm\noracle   14602      1  4 08:59 ?        00:00:03 ora_dm00_O12C\n\
  ```\n根据并行度和指定的工作量，还会启动若干个工作进程。如果未指定并行度，则仅启动一个工作进程。主进程协调主进程和工作进程之间的工作。工作进程的名称格式为\
  \ `ora_dwNN_<SID>`。\n\n### 状态表\n\n当用户启动导出或导入作业时，会创建一个数据库状态表（由启动作业的用户拥有）。该表仅在 Data\
  \ Pump 作业期间存在。状态表的名称取决于您运行的作业类型。表的名称格式为 `SYS_<OPERATION>_<JOB_MODE>_NN`，其中 `OPERATION`\
  \ 为 `EXPORT` 或 `IMPORT`。`JOB_MODE` 可以是以下类型之一：\n\n*   `FULL`\n*   `SCHEMA`\n*   `TABLE`\n\
  *   `TABLESPACE`\n*   `TRANSPORTABLE`\n\n例如，如果您正在导出一个模式，则会在您的账户中创建一个名为 `SYS_EXPORT_SCHEMA_NN`\
  \ 的表，其中 `NN` 是一个数字，用于确保该表名在用户模式中是唯一的。此状态表包含诸如导出/导入的对象、开始时间、耗时、行数和错误计数等信息。该状态表包含超过\
  \ 80 个列。\n\n![Image](img/sq.jpg) 提示：Data Pump 状态表创建在执行导出/导入的用户的默认永久表空间中。因此，如果用户没有在默认表空间中创建表的权限，Data\
  \ Pump 作业将失败，并出现 `ORA-31633` 错误。\n\n状态表在导出或导入作业成功完成后会被 Data Pump 删除。如果您使用 `KILL_JOB`\
  \ 交互式命令，主表也会被删除。如果您使用 `STOP_JOB` 交互式命令停止作业，该表不会被移除，并可在您重新启动作业时使用。\n\n如果您的作业异常终止，主表将被保留。如果您不打算重新启动作业，可以删除该状态表。\n\
  \n### 目录对象\n\n当 Data Pump 运行时，它使用数据库目录对象来确定写入和读取转储文件及日志文件的位置。通常，您需要指定希望 Data Pump\
  \ 使用的目录对象。如果您未指定目录对象，则会使用一个默认目录。默认目录路径由名为 `DATA_PUMP_DIR` 的数据目录对象定义。该目录对象在数据库首次创建时自动创建。在\
  \ Linux/Unix 系统上，此目录对象映射到 `ORACLE_HOME/rdbms/log` 目录。\n\nData Pump 导出会创建一个导出文件和一个日志文件。导出文件包含要导出的对象。日志文件包含作业活动的记录。图\
  \ 8-1 显示了与 Data Pump 导出作业相关的架构组件。\n\n![9781484207642_Fig08-01.jpg](img/9781484207642_Fig08-01.jpg)\n\
  \n图 8-1. Data Pump 导出作业组件\n\n类似地，图 8-2 展示了 Data Pump 导入作业的架构组件。导出与导入之间的主要区别在于数据流的方向。导出将数据从数据库中写出，而导入则将信息带入数据库。在学习本章中有关\
  \ Data Pump 的示例和概念时，请回头参考这些图表。\n\n![9781484207642_Fig08-02.jpg](img/9781484207642_Fig08-02.jpg)\n\
  \n图 8-2. Data Pump 导入作业组件\n\n对于每个 Data Pump 作业，您必须确保有权访问一个目录对象。导出和导入的基础知识将在接下来的几节中描述。\n\
  \n\n\nImage **提示** 由于数据泵内部使用 PL/SQL 来执行其工作，因此需要在共享池中有一些可用内存来保存 PL/SQL 包。如果共享池中的空间不足，数据泵将抛出\
  \ `ORA-04031: unable to allocate bytes of shared memory...` 错误并中止。如果您收到此错误，请将数据库参数\
  \ `SHARED_POOL_SIZE` 设置为至少 50M。更多详情请参阅 MOS note 396940.1。\n\n### 开始使用\n\n既然您已经了解了数据泵的架构，接下来是一个简单的示例，展示了导出表、删除表然后将表重新导入数据库所需的导出设置步骤。这将为本章涵盖的所有其他数据泵任务奠定基础。\n\
  \n#### 执行导出\n\n运行数据泵导出作业时，需要进行少量设置。步骤如下：\n1.  创建一个数据库目录对象，该对象指向您希望写入/读取数据泵文件的操作系统目录。\n\
  2.  为运行导出的数据库用户授予对该目录对象的读写权限。\n3.  在操作系统提示符下，运行 `expdp` 实用程序。\n\n#### 步骤 1. 创建数据库目录对象\n\
  \n在运行数据泵作业之前，首先创建一个与磁盘上物理位置相对应的数据库目录对象。此位置将用于保存导出文件和日志文件，并且应该是一个您知道有足够磁盘空间来容纳导出数据量的位置。\n\
  \n使用 `CREATE DIRECTORY` 命令来完成此任务。此示例创建一个名为 `dp_dir` 的目录，并指定它映射到磁盘上的 `/oradump` 物理位置：\n\
  ``` SQL\nSQL> create directory dp_dir as '/oradump';\n```\n要查看新创建目录的详细信息，请发出以下查询：\n\
  ``` SQL\nSQL> select owner, directory_name, directory_path from dba_directories;\n\
  ```\n以下是一些示例输出：\n```\nOWNER      DIRECTORY_NAME  DIRECTORY_PATH\n---------- ---------------\n\
  SYS        DP_DIR          /oradump\n```\n请记住，指定的目录路径必须在数据库服务器上物理存在。此外，该目录必须是 `oracle`\
  \ 操作系统用户具有读/写访问权限的目录。最后，执行数据泵操作的用户需要被授予对该目录对象的读/写访问权限（参见步骤 2）。\n\n如果在导出或导入时未指定 `DIRECTORY`\
  \ 参数，数据泵将尝试使用默认的数据库目录对象（如前所述，这映射到 `ORACLE_HOME/rdbms/log`）。我不建议使用默认目录，原因有二：\n* \
  \  如果您要导出大量数据，最好有一个您知道有足够空间来满足磁盘空间需求的首选磁盘位置。如果使用默认目录，您可能会无意中填满与 `ORACLE_HOME` 相关联的挂载点，从而可能导致数据库挂起。\n\
  *   如果您向非 DBA 用户授予导出权限，您不希望他们在与 `ORACLE_HOME` 相关的位置创建大型转储文件。同样，您不希望与 `ORACLE_HOME`\
  \ 相关联的挂载点变满，从而损害您的数据库。\n\n#### 步骤 2. 授予目录访问权限\n\n您需要向想要使用数据泵的用户授予对数据库目录对象的权限。使用\
  \ `GRANT` 语句分配适当的权限。如果您希望一个用户能够从目录读取和写入目录，则必须授予安全访问权限。此示例向名为 `MV_MAINT` 的用户授予对目录对象的访问权限：\n\
  ``` SQL\nSQL> grant read, write on directory dp_dir to mv_maint;\n```\n所有目录对象都归\
  \ `SYS` 用户所有。如果您使用的用户账户被授予了 DBA 角色，那么您就拥有了对任何目录对象的必要读/写权限。我通常使用被授予了 DBA 的用户来执行数据泵作业（这样我就不需要费心授予权限了）。\n\
  \n**旧版 EXP 实用程序的安全问题**\n\n创建目录对象然后向物理存储位置授予特定 I/O 访问权限的理念是，您可以更安全地管理哪些用户有能力执行通常他们没有权限的读写活动。使用传统的\
  \ `exp` 实用程序，任何有权访问该工具的用户默认都有权限将文件写入或读取到 Oracle 二进制文件所有者（通常是 `oracle`）有权访问的位置。可以想象，恶意的非\
  \ `oracle` 操作系统用户可以尝试运行 `exp` 实用程序，故意覆盖关键的数据库文件。例如，以下命令可以由任何具有 `exp` 实用程序执行权限的非\
  \ `oracle` 操作系统用户运行：\n`$ exp heera/foo file=/oradata04/SCRKDV12/users01.dbf`\n`exp`\
  \ 进程以 `oracle` 操作系统用户身份运行，因此对任何 `oracle` 拥有的数据文件具有读写操作系统权限。在这个 `exp` 示例中，如果 `users01.dbf`\
  \ 文件是一个活动的数据库数据文件，它会被覆盖并变得毫无用处。这可能对您的数据库造成灾难性的损害。\n\n为了防止此类问题，使用 Oracle 数据泵，您必须首先创建一个映射到特定目录的数据库对象目录，然后另外为每个用户分配对该目录的读写权限。因此，数据泵不存在旧版\
  \ `exp` 实用程序的安全问题。\n\n#### 步骤 3. 执行导出\n\n当目录对象和权限设置就位后，您就可以使用数据泵从数据库导出信息。本节中的一个简单示例展示了如何导出一个表。本章后面的章节将详细描述导出数据的各种方式。这里的重点是完成一个示例，为理解后续更复杂的主题奠定基础。\n\
  \n作为非 `SYS` 用户，创建一个表并填充一些数据：\n``` SQL\nSQL> create table inv(inv_id number);\nSQL>\
  \ insert into inv values (123);\n```\n接下来，作为非 `SYS` 用户，导出该表。此示例使用先前创建的名为 `DP_DIR`\
  \ 的目录。数据泵使用目录对象指定的目录路径作为磁盘上写入转储文件和日志文件的位置：\n``` $ expdp mv_maint/foo directory=dp_dir\
  \ tables=inv dumpfile=exp.dmp logfile=exp.log\n```\n`expdp` 实用程序在 `/oradump` 目录中创建一个名为\
  \ `exp.dmp` 的文件，其中包含重新创建 `INV` 表并填充导出时数据所需的信息。此外，在 `/oradump` 目录中创建一个名为 `exp.log`\
  \ 的日志文件，其中包含与此导出作业相关的日志信息。\n\n如果您未指定转储文件名，数据泵会创建一个名为 `expdat.dmp` 的文件。如果目录中已存在名为\
  \ `expdat.dmp` 的文件，则数据泵会抛出错误。如果您未指定日志文件名，则数据泵会创建一个名为 `export.log` 的文件。如果名为 `export.log`\
  \ 的日志文件已存在，则数据泵会覆盖它。\n\nImage **提示** 尽管可以作为 `SYS` 用户执行数据泵，但我不建议这样做，原因有几个。首先，`SYS`\
  \ 需要使用 `AS SYSDBA` 子句连接到数据库。这需要一个带有 `USERID` 参数和连接字符串引号的数据泵参数文件。这很不方便。其次，`SYS` 拥有的大多数表无法导出（少数例外，如\
  \ `AUD$`）。如果您尝试导出 `SYS` 拥有的表，数据泵将抛出 `ORA-39166` 错误并指出该表不存在。这令人困惑。\n\n#### 导入表\n\n\
  导出数据的关键原因之一是为了能够重新创建数据库对象。\n\n\n\n你可能希望将此作为备份策略的一部分，或将数据复制到不同的数据库。数据泵导入使用导出转储文件作为其输入，并重新创建导出文件中包含的数据库对象。导入的过程与导出类似：\n\
  1.  创建一个数据库目录对象，指向你希望从中读/写数据泵文件的操作系统目录。\n2.  授予执行导出或导入的数据库用户对该目录对象的读写权限。\n3.  在操作系统提示符下，运行\
  \ `impdp` 命令。\n\n第 1 步和第 2 步已在前面的章节“执行导出”中介绍过，因此这里不再重复。\n\n在运行导入作业之前，请先删除之前创建的 `INV`\
  \ 表。\n```\nSQL> drop table inv purge;\n```\n\n接下来，根据之前的导出重新创建 `INV` 表：\n```\n$ impdp\
  \ mv_maint/foo directory=dp_dir dumpfile=exp.dmp logfile=imp.log\n```\n\n现在，你应该已经重新创建了\
  \ `INV` 表，并填充了导出时的数据。现在是再次查看图 8-1 和图 8-2 的好时机。确保你理解哪些文件是由 `expdp` 创建的，哪些文件是由 `impdp`\
  \ 使用的。\n\n#### 使用参数文件\n\n与其在命令行上键入命令，在许多情况下，更好的做法是将命令存储在文件中，然后在执行数据泵导出或导入时引用该文件。使用参数文件使任务更具可重复性，且不易出错。你可以将命令放在文件中一次，然后多次引用该文件。\n\
  \n此外，一些数据泵命令（如 `FLASHBACK_TIME`）需要使用引号；在这些情况下，有时很难预测操作系统将如何解释这些引号。每当命令需要引号时，强烈建议使用参数文件。\n\
  \n要使用参数文件，首先创建一个包含你希望用于控制作业行为的命令的操作系统文本文件。此示例使用 Linux/Unix 的 `vi` 命令创建一个名为 `exp.par`\
  \ 的文本文件：\n```\n$ vi exp.par\n```\n\n现在，将以下命令放入 `exp.par` 文件：\n```\nuserid=mv_maint/foo\n\
  directory=dp_dir\ndumpfile=exp.dmp\nlogfile=exp.log\ntables=inv\nreuse_dumpfiles=y\n\
  ```\n\n接下来，导出操作通过 `PARFILE` 命令行选项引用参数文件：\n```\n$ expdp parfile=exp.par\n```\n\n\
  数据泵处理文件中的参数，就像它们是在命令行上键入的一样。如果你发现自己在重复键入相同的命令，或者在使用需要引号的命令，或者两者兼有，那么考虑使用参数文件来提高效率。\n\
  \n`提示` 不要将数据泵参数文件与数据库初始化参数文件混淆。数据泵参数文件指示数据泵以哪个用户身份连接到数据库、从哪些目录位置读/写文件、在操作中包含哪些对象，等等。相比之下，数据库参数文件在数据库启动时确立实例的特性。\n\
  \n### 以精细度进行导出和导入\n\n回顾本章前面的“数据泵体系结构”一节，你可以通过几种不同的模式调用导出/导入实用程序。例如，你可以指示数据泵以以下模式进行导出/导入：\n\
  *   整个数据库\n*   方案级别\n*   表级别\n*   表空间级别\n*   可传输表空间级别\n\n在深入研究数据泵的众多功能之前，讨论这些模式并确保你了解每种模式的运作方式很有用。这将为理解本章后面介绍的概念进一步奠定基础。\n\
  \n#### 导出和导入整个数据库\n\n当你导出整个数据库时，这有时被称为完整导出。\n\n在此模式下，生成的导出文件包含制作数据库副本所需的一切。除非受过滤参数限制（见本章后面的“过滤数据和对象”一节），完整导出包括：\n\
  *   重新创建表空间、用户、用户表、索引、约束、触发器、序列、存储的 PL/SQL 等所需的所有 DDL。\n*   所有表数据（`SYS` 用户的表除外）\n\
  \n通过将 `FULL` 参数设置为 `Y` 来启动完整导出，并且必须由具有 DBA 权限或被授予 `DATAPUMP_EXP_FULL_DATABASE` 角色的用户来执行。以下是对数据库执行完整导出的示例：\n\
  ```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=full.dmp logfile=full.log full=y\n\
  ```\n\n在导出执行时，你应该在输出中看到此文本，表明正在进行完整级别的导出：\n```\nStarting \"MV_MAINT\".\"SYS_EXPORT_FULL_01\"\
  :\n```\n\n请注意，完整导出并不会导出数据库中的所有内容：\n*   不导出 `SYS` 方案的内容（有少数例外，例如 `AUD$` 表）。试想一下，如果你能够将一个数据库中\
  \ `SYS` 方案的内容导出并导入到另一个数据库中会发生什么。`SYS` 方案的内容将覆盖内部数据字典表/视图，从而损坏数据库。因此，数据泵从不导出由 `SYS`\
  \ 拥有的对象。\n*   不导出索引数据，而是导出包含在后续导入期间重新创建索引所需 SQL 的索引 DDL。\n\n一旦你有了完整导出，你就可以使用其内容在原始数据库中重新创建对象（例如，在表意外删除的情况下），或者将整个数据库或用户/表的子集复制到不同的数据库。下一个示例假定转储文件已被复制到不同的数据库服务器，现在用于将所有对象导入到目标数据库：\n\
  ```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=full.dmp logfile=fullimp.log\
  \ full=y\n```\n\n`提示` 要启动完整数据库导入，你必须具有 DBA 权限或被分配 `DATAPUMP_IMP_FULL_DATABASE` 角色。\n\
  \n在屏幕上显示的输出中，你应该看到正在进行完整导入的指示：\n```\nStarting \"MV_MAINT\".\"SYS_IMPORT_FULL_01\"\
  :\n```\n\n运行完整导入数据库作业有一些需要注意的影响：\n*   导入作业将首先尝试重新创建任何表空间。如果表空间已存在，或者表空间所依赖的目录路径不存在，那么表空间创建语句将失败，导入作业将移动到下一个任务。\n\
  *   接下来，导入作业将修改 `SYS` 和 `SYSTEM` 用户账户，使其包含与导出时相同的密码。因此，从生产系统导入后，为了反映新环境，修改 `SYS`\
  \ 和 `SYSTEM` 的密码是谨慎的做法。\n*   此外，导入作业随后将尝试创建导出文件中的任何用户。如果用户已存在，则会抛出错误，导入作业移动到下一个任务。\n\
  *   用户将以与原始数据库相同的密码导入。根据你的安全标准，你可能希望更改密码。\n*   表将被重新创建。如果表已存在并包含数据，你必须指定你希望导入作业如何处理此情况。你可以让导入作业跳过、追加、替换或截断该表（请参见本章后面的“当对象已存在时导入”一节）。\n\
  *   在每个表创建并填充后，将创建关联的索引。\n*   如果可用，导入作业还将尝试导入统计信息。此外，对象授权将被实例化。\n\n\n\n如果一切运行顺利，最终结果将是一个在表空间、用户、对象等方面与源数据库逻辑上完全相同的数据库。\n\
  \n#### 模式级别\n\n当你启动导出时，除非另有说明，数据泵会为运行导出作业的用户启动一个模式级别导出。用户级别导出常用于将一个或多个模式从一个环境复制到另一个环境。以下命令为\
  \ `MV_MAINT` 用户启动一个模式级别导出：\n\n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=mv_maint.dmp\
  \ logfile=mv_maint.log\n```\n\n在屏幕上显示的输出中，你应该会看到一些表明已启动模式级别导出的文本：\n\n```\nStarting\
  \ \"MV_MAINT\".\"SYS_EXPORT_SCHEMA_01\"...\n```\n\n你也可以使用 `SCHEMAS` 参数，为运行导出作业之外的其他用户启动模式级别导出。以下命令展示了为多个用户进行模式级别导出：\n\
  \n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=user.dmp  schemas=heera,chaya\n\
  ```\n\n你可以通过引用一个使用模式级别导出生成的转储文件来启动模式级别导入：\n\n```\n$ impdp mv_maint/foo directory=dp_dir\
  \ dumpfile=user.dmp\n```\n\n当你启动模式级别导入时，有一些细节需要注意：\n\n*   模式级别导出不包含任何表空间。\n*   导入作业会尝试重新创建转储文件中的任何用户。如果用户已存在，则会报错，然后导入作业继续执行。\n\
  *   导入作业将根据导出的密码重置用户的密码。\n*   用户所属的表将被导入并填充数据。如果表已存在，你必须通过 `TABLE_EXISTS_ACTION`\
  \ 参数指示数据泵如何处理这种情况。\n\n你也可以在使用完全导出转储文件时启动模式级别导入。为此，请指定你想从完全导出中提取哪些模式：\n\n```\n$ impdp\
  \ mv_maint/foo directory=dp_dir dumpfile=full.dmp schemas=heera,chaya\n```\n\n####\
  \ 表级别\n\n你可以通过 `TABLES` 参数指示数据泵操作特定的表。例如，假设你想导出\n\n```\n$ expdp mv_maint/foo directory=dp_dir\
  \ dumpfile=tab.dmp \\\ntables=heera.inv,heera.inv_items\n```\n\n你应该在输出中看到一些文本，表明正在进行表级别导出：\n\
  \n```\nStarting \"MV_MAINT\".\"SYS_EXPORT_TABLE_01...\n```\n\n类似地，你可以通过指定表级别创建的转储文件来启动表级别导入：\n\
  \n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=tab.dmp\n```\n\n表级别导入仅尝试导入指定的表及其数据。如果表已存在，则会报错，然后导入作业继续执行。如果表已存在且包含数据，你必须指定导出作业应如何处理这种情况。你可以通过\
  \ `TABLE_EXISTS_ACTION` 参数让导入作业跳过、追加、替换或截断该表。\n\n你也可以在使用完全导出转储文件或模式级别导出时启动表级别导入。为此，请指定你想从完全或模式级别导出中提取哪些表：\n\
  \n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=full.dmp tables=heera.inv\n\
  ```\n\n#### 表空间级别\n\n表空间级别导出/导入操作包含在特定表空间中的对象。此示例导出 `USERS` 表空间中包含的所有对象：\n\n```\n\
  $ expdp mv_maint/foo directory=dp_dir dumpfile=tbsp.dmp tablespaces=users\n```\n\
  \n输出中显示的文本应表明正在进行表空间级别导出：\n\n```\nStarting \"MV_MAINT\".\"SYS_EXPORT_TABLESPACE_01\"\
  ...\n```\n\n你可以通过指定使用表空间级别导出创建的导出文件来启动表空间级别导入：\n\n```\n$ impdp mv_maint/foo directory=dp_dir\
  \ dumpfile=tbsp.dmp\n```\n\n你也可以通过使用完全导出但指定 `TABLESPACES` 参数来启动表空间级别导入：\n\n```\n\
  $ impdp mv_maint/foo directory=dp_dir dumpfile=full.dmp tablespaces=users\n```\n\
  \n表空间级别导入将尝试创建表空间内的任何表和索引。导入不会尝试重新创建表空间本身。\n\n![Image](img/sq.jpg) `注意` 还有一种可传输表空间模式导出。请参阅本章后面的“复制数据文件”一节。\n\
  \n### 传输数据\n\n数据泵的主要用途之一是将数据从一个数据库复制到另一个数据库。通常，源数据库和目标数据库位于相距数千英里的数据中心。数据泵提供了几个强大的功能来高效复制数据：\n\
  \n*   网络链接\n*   复制数据文件（可传输表空间）\n*   外部表\n\n使用网络链接允许你执行导出并将其直接导入目标数据库，而无需创建转储文件。这是一种非常高效的数据移动方式。\n\
  \nOracle 还提供了可传输表空间功能，让你可以将数据文件从源数据库复制到目标数据库，然后使用数据泵传输相关的元数据。这两种技术将在以下章节中描述。\n\n\
  #### 直接通过网络导出和导入\n\n假设你有两个数据库环境——一个运行在 Solaris 服务器上的生产数据库和一个运行在 Linux 服务器上的测试数据库。你的老板向你提出以下要求：\n\
  \n*   在 Solaris 服务器上制作生产数据库的副本。\n*   将该副本导入 Linux 服务器上的测试数据库。\n*   在导入时更改模式名称以满足测试数据库的命名标准。\n\
  \n首先，考虑一下使用旧的 `exp`/`imp` 实用程序将数据从一个数据库传输到另一个数据库所需的步骤。步骤大致如下：\n\n1.  导出生产数据库（这会在数据库服务器上创建一个转储文件）。\n\
  2.  将转储文件复制到测试数据库服务器。\n3.  将转储文件导入测试数据库。\n\n你可以使用数据泵执行相同的步骤。然而，数据泵提供了一种更高效、更透明的方法来执行这些步骤。如果你的生产数据库服务器和测试数据库服务器之间有直接的网络连接，你可以执行导出并直接导入目标数据库，而无需创建或复制任何转储文件。此外，你可以在执行导入时动态重命名模式。另外，源数据库是否运行在与目标数据库不同的操作系统上并不重要。\n\
  \n一个示例将有助于说明这是如何工作的。在此示例中，生产数据库用户是 `STAR2`、`CIA_APP` 和 `CIA_SEL`。你想将这些用户移动到测试数据库，并将它们重命名为\
  \ `STAR_JUL`、`CIA_APP_JUL` 和 `CIA_SEL_JUL`。此任务需要以下步骤：\n\n1.  在要导入的测试数据库中创建用户。以下是一个在测试数据库中创建用户的示例脚本：\n\
  \n    ```\n    define star_user=star_jul\n    define star_user_pwd=star_jul_pwd\n\
  \    define cia_app_user=cia_app_jul\n    define cia_app_user_pwd=cia_app_jul_pwd\n\
  \    define cia_sel_user=cia_sel_jul\n    define cia_sel_user_pwd=cia_sel_jul_pwd\n\
  \    --\n    create user &&star_user identified by &&star_user_pwd;\n    grant connect,resource\
  \ to &&star_user;\n    alter user &&star_user default tablespace dim_data;\n   \
  \ --\n    create user &&cia_app_user identified by &&cia_app_user_pwd;\n    grant\
  \ connect,resource to &&cia_app_user;\n    alter user &&cia_app_user default tablespace\
  \ cia_data;\n    --\n    create user &&cia_sel_user identified by &&cia_app_user_pwd;\n\
  \    grant connect,resource to &&cia_app_user;\n    alter user &&cia_sel_user default\
  \ tablespace cia_data;\n    ```\n\n2.\n\n\n\n## 使用数据库链接和网络链接导入数据\n\n在测试数据库中，创建一个指向生产数据库的数据库链接。`CREATE\
  \ DATABASE LINK`语句中引用的远程用户必须在生产数据库中被授予`DBA`角色。以下是一个`CREATE DATABASE LINK`脚本示例：\n\
  \n```sql\ncreate database link dk\nconnect to darl identified by foobar\nusing 'dwdb1:1522/dwrep1';\n\
  ```\n\n在测试数据库中，创建一个目录对象，指向你希望日志文件存放的位置：\n\n```sql\nSQL> create or replace directory\
  \ engdev as '/orahome/oracle/ddl/engdev';\n```\n\n在测试服务器上运行导入命令。此命令通过`NETWORK_LINK`参数引用远程数据库。该命令还指示\
  \ Data Pump 将生产数据库用户名映射到测试数据库中新建的用户。\n\n```bash\n$ impdp darl/engdev directory=engdev\
  \ network_link=dk \\\nschemas='STAR2,CIA_APP,CIA_SEL' \\\nremap_schema=STAR2:STAR_JUL,CIA_APP:CIA_APP_JUL,CIA_SEL:CIA_SEL_JUL\n\
  ```\n\n此技术允许你在不同的数据库之间移动大量数据，而无需创建或复制任何转储文件或数据文件。你还可以通过`REMAP_SCHEMA`参数动态重命名模式。这是一个非常强大的\
  \ Data Pump 功能，可以让你快速高效地传输数据。\n\n![Image](img/sq.jpg) **提示**：在复制整个数据库时，也可以考虑使用 RMAN\
  \ 的 duplicate database 功能。\n\n### DATABASE LINK 与 NETWORK_LINK\n\n不要将通过数据库链接连接到远程数据库时进行的导出，与使用`NETWORK_LINK`参数进行的导出混淆。当通过数据库链接连接到远程数据库进行导出时，被导出的对象存在于远程数据库中，转储文件和日志文件根据`DIRECTORY`参数指定的目录在远程服务器上创建。例如，以下命令导出远程数据库中的对象并在远程服务器上创建文件：\n\
  \n```bash\n$ expdp mv_maint/foo@shrek2 directory=dp_dir dumpfile=sales.dmp\n```\n\
  \n相反，当你使用`NETWORK_LINK`参数导出时，你是在本地创建转储文件和日志文件，而被导出的数据库对象存在于远程数据库中；例如：\n\n```bash\n\
  $ expdp mv_maint/foo network_link=shrek2 directory=dp_dir dumpfile=sales.dmp\n```\n\
  \n#### 复制数据文件\n\nOracle 提供了一种将数据文件从一个数据库复制到另一个数据库的机制，结合使用 Data Pump 来传输相关的元数据。这被称为可传输表空间功能。此任务所需的时间取决于将数据文件复制到目标服务器所需的时间。此技术适用于在\
  \ DSS 和数据仓库环境中移动数据。\n\n![Image](img/sq.jpg) **提示**：可传输表空间还可以与 RMAN 的`CONVERT TABLESPACE`命令结合使用，将表空间移动到与主机平台不同的目标服务器。\n\
  \n### 传输表空间的步骤\n\n1.  确保表空间是自包含的。以下是一些常见的违反自包含规则的情况：\n    *   一个表空间中的索引不能指向不属于正在传输的表空间集合中的另一个表空间中的表。\n\
  \    *   在一个表空间中的表上定义的外键约束，引用了不属于正在传输的表空间集合中的另一个表空间中的表上的主键约束。\n    运行以下检查，查看正在传输的表空间集合是否违反了任何自包含规则：\n\
  \    ```sql\n    SQL> exec dbms_tts.transport_set_check('INV_DATA,INV_INDEX', TRUE);\n\
  \    ```\n    现在，查看 Oracle 是否检测到任何违规：\n    ```sql\n    SQL> select * from transport_set_violations;\n\
  \    ```\n    如果没有违规，你应该看到：\n    ```\n    no rows selected\n    ```\n    如果有违规，例如索引建立在未被传输的表空间中的表上，那么你将不得不在正在被传输的表空间中重建该索引。\n\
  \n2.  将要传输的表空间设置为只读：\n    ```sql\n    SQL> alter tablespace inv_data read only;\n\
  \    SQL> alter tablespace inv_index read only;\n    ```\n\n3.  使用 Data Pump 导出要传输的表空间的元数据：\n\
  \    ```bash\n    $ expdp mv_maint/foo directory=dp_dir dumpfile=trans.dmp \\\n\
  \    transport_tablespaces=INV_DATA,INV_INDEX\n    ```\n\n4.  将 Data Pump 导出转储文件复制到目标服务器。\n\
  5.  将数据文件复制到目标数据库。将文件放在目标数据库服务器中你希望它们位于的目录中。文件名和目录路径必须与下一步中使用的导入命令匹配。\n6.  将元数据导入到目标数据库。使用以下参数文件来导入被传输数据文件的元数据：\n\
  \    ```\n    userid=mv_maint/foo\n    directory=dp_dir\n    dumpfile=trans.dmp\n\
  \    transport_datafiles=/ora01/dbfile/rcat/inv_data01.dbf,\n    /ora01/dbfile/rcat/inv_index01.dbf\n\
  \    ```\n    如果一切顺利，你应该会看到一些指示成功的输出：\n    ```text\n    Job \"MV_MAINT\".\"SYS_IMPORT_TRANSPORTABLE_01\"\
  \ successfully completed...\n    ```\n    如果被传输的数据块的块大小与目标数据库的不同，那么你必须修改你的初始化文件（或使用`ALTER\
  \ SYSTEM`命令）并添加一个包含源数据库块大小的缓冲池。例如，要添加一个 16KB 的缓冲区高速缓存，请在初始化文件中放置以下内容：\n    ```\n\
  \    db_16k_cache_size=200M\n    ```\n    你可以通过此查询检查表空间的块大小：\n    ```sql\n    SQL>\
  \ select tablespace_name, block_size from dba_tablespaces;\n    ```\n    可传输表空间机制允许你在数据库之间快速移动数据文件，即使数据库使用不同的块大小或不同的\
  \ endian 格式。本节并未讨论与可传输表空间相关的所有细节；本章的重点是展示如何使用 Data Pump 来传输数据。有关可传输表空间的完整细节，请参阅可从\
  \ Oracle 网站技术网络区域（`http://otn.oracle.com`）免费下载的《Oracle Database Administrator’s\
  \ Guide》。\n\n![Image](img/sq.jpg) **注意**：要生成可传输表空间，你必须使用 Oracle 企业版。你可以使用其他版本的 Oracle\
  \ 来导入可传输表空间。\n\n### 操作存储的特性\n\nData Pump 包含许多灵活的特性，用于在导出和导入时操作表空间和数据文件。以下各节展示了在处理这些重要数据库对象时有用的\
  \ Data Pump 技术。\n\n### 导出表空间元数据\n\n有时，你可能需要复制一个环境——例如，将生产环境复制到测试环境中。首要任务之一是复制表空间。为此，你可以使用\
  \ Data Pump 提取仅用于重新创建环境表空间所需的 DDL：\n\n```bash\n$ expdp mv_maint/foo directory=dp_dir\
  \ dumpfile=inv.dmp \\\nfull=y include=tablespace\n```\n\n`FULL`参数指示 Data Pump 导出数据库中的所有内容。然而，当与`INCLUDE`一起使用时，Data\
  \ Pump 仅导出该命令指定的对象。\n\n\n\n## 在此组合中，仅导出关于表空间的元数据；导出的内容中不包含数据文件内的数据。您可以向 `INCLUDE`\
  \ 命令添加参数和值 `CONTENT=METADATA_ONLY`，但这将是多余的。\n\n现在，您可以使用 `SQLFILE` 参数来查看与已导出表空间关联的\
  \ DDL：\n```bash\n$ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp sqlfile=tbsp.sql\n\
  ```\n当您使用 `SQLFILE` 参数时，不会导入任何内容。在此示例中，上述命令仅会创建一个名为 `tbsp.sql` 的文件，其中包含与表空间相关的 SQL\
  \ 语句。您可以修改 DDL 并在目标数据库环境中运行；或者，如果无需更改，您可以通过将表空间导入目标数据库来直接使用转储文件。\n\n## 指定不同的数据文件路径和名称\n\
  \n如前所述，您可以使用 `FULL` 和 `INCLUDE` 参数的组合来仅导出表空间元数据信息：\n```bash\n$ expdp mv_maint/foo\
  \ directory=dp_dir dumpfile=inv.dmp \\\nfull=y include=tablespace\n```\n如果您想使用转储文件在具有不同目录结构的单独数据库服务器上创建表空间，该怎么办？Data\
  \ Pump 允许您在导入步骤中使用 `REMAP_DATAFILE` 参数来更改数据文件目录路径和文件名。\n\n例如，假设源数据文件位于名为 `/ora03`\
  \ 的挂载点上，但在要导入到的数据库上，挂载点命名为 `/ora01`。以下是一个参数文件，它指定仅应导入表空间名称以字符串 `INV` 开头的表空间，并将它们对应的数据文件名更改为反映新环境的名称：\n\
  ```\nuserid=mv_maint/foo directory=dp_dir dumpfile=inv.dmp full=y include=tablespace:\"\
  like 'INV%'\" remap_datafile=\"'/ora03/dbfile/O12C/inv_data01.dbf':'/ora01/dbfile/O12C/tb1.dbf'\"\
  \ remap_datafile=\"'/ora03/dbfile/O12C/inv_index01.dbf':'/ora01/dbfile/O12C/tb2.dbf'\"\
  \n```\n当 Data Pump 创建表空间时，对于任何与字符串第一部分（冒号 [`:`] 左侧）匹配的路径，该字符串将被字符串下一部分（冒号右侧）中的文本替换。\n\
  \n### 提示\n![Image](img/sq.jpg) 当使用需要同时使用单引号和双引号的参数时，使用参数文件会得到可预测的行为。相反，如果您尝试在命令行上输入各种必需的引号，操作系统可能会进行解释并传递给\
  \ Data Pump 与您预期不符的内容。\n\n## 导入到与原始表空间不同的表空间中\n\n您偶尔可能需要导出一个表，然后将其导入到不同的用户和不同的表空间中。源数据库可能与目标数据库不同，或者您可能只是尝试在同一数据库内的两个用户之间移动数据。您可以使用\
  \ `REMAP_SCHEMA` 和 `REMAP_TABLESPACE` 参数轻松处理此需求。\n\n此示例重新映射用户以及表空间。原始用户和表空间是 `HEERA`\
  \ 和 `INV_DATA`。此命令将 `INV` 表导入到用户 `CHAYA` 和表空间 `DIM_DATA` 中：\n```bash\n$ impdp mv_maint/foo\
  \ directory=dp_dir dumpfile=inv.dmp remap_schema=HEERA:CHAYA \\\nremap_tablespace=INV_DATA:DIM_DATA\
  \ tables=heera.inv\n```\n`REMAP_TABLESPACE` 功能不会重新创建表空间。它只是指示 Data Pump 将对象放置在与其导出时不同的表空间中。导入时，如果您放置对象的表空间不存在，Data\
  \ Pump 会抛出错误。\n\n## 更改数据文件的大小\n\n您可以在导入时使用带有 `PCTSPACE` 选项的 `TRANSFORM` 参数来更改数据文件的大小。假设您已经创建了一个仅包含表空间元数据的导出：\n\
  ```bash\n$ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp full=y include=tablespace\n\
  ```\n现在，您希望在开发数据库中创建表空间名称包含字符串 `DATA` 的表空间，但没有足够的磁盘空间来按照源数据库中的方式创建这些表空间。在这种情况下，您可以使用\
  \ `TRANSFORM` 参数来指定表空间按照原始大小的百分比创建。\n\n例如，如果您希望表空间以原始大小的 20% 创建，请发出以下命令：\n```\n\
  userid=mv_maint/foo directory=dp_dir dumpfile=inv.dmp full=y include=tablespace:\"\
  like '%DATA%'\" transform=pctspace:20\n```\n表空间将使用相当于其原始大小 20% 的数据文件创建。区的分配大小也是其原始定义的\
  \ 20%。这一点很重要，因为 Data Pump 不会检查存储属性是否满足数据文件的最小大小限制。这意味着，如果计算出的较小尺寸违反了 Oracle 的最小大小（例如，统一区大小为五个块），则在导入期间将抛出错误。\n\
  \n当用于导出生产数据然后导入到较小的数据库中时，此功能非常有用。在这些场景中，您可能正在通过 `SAMPLE` 参数或 `QUERY` 参数（参见本章后面的“过滤数据和对象”部分）过滤掉部分生产数据。\n\
  \n## 更改段和存储属性\n\n导入时，您可以使用 `TRANSFORM` 参数来更改表的存储属性。此参数的通用语法为\n```\nTRANSFORM=transform_name:value[:object_type]\n\
  ```\n当您使用 `SEGMENT_ATTRIBUTES:N` 作为转换名称时，可以在导入过程中删除以下段属性：\n* 物理属性\n* 存储属性\n* 表空间\n\
  * 日志记录\n\n当您导入到开发环境并且不希望表带有其在生产数据库中的所有存储属性时，您可能需要此功能。例如，在开发中，您可能只有一个表空间来存储所有表和索引，而在生产中，您将表和索引分布在多个表空间中。\n\
  \n以下是一个删除段属性的示例：\n```bash\n$ impdp mv_maint/foo directory=dp_dir  dumpfile=inv.dmp\
  \ \\\ntransform=segment_attributes:n\n```\n您可以使用 `STORAGE:N` 仅删除存储子句：\n```bash\n\
  $ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp \\\ntransform=storage:n\n\
  ```\n\n### 过滤数据和对象\n\nData Pump 提供了大量用于过滤数据和元数据的机制。您可以通过以下方式影响在 Data Pump 导出或导入中排除或包含的内容：\n\
  * 使用 `QUERY` 参数来导出或导入数据的子集。\n* 使用 `SAMPLE` 参数来导出表中一定百分比的行。\n* 使用 `CONTENT` 参数来排除或包含数据和元数据。\n\
  * 使用 `EXCLUDE` 参数来具体命名要排除的项。\n* 使用 `INCLUDE` 参数来命名要包含的项（从而排除列表中未包含的其他非依赖项）。\n* 使用诸如\
  \ `SCHEMAS` 之类的参数来指定您只需要数据库对象的子集（属于指定用户或用户的对象）。\n\n以下各节将描述这些技术的示例。\n\n### 注意\n![Image](img/sq.jpg)\
  \ 您不能同时使用 `EXCLUDE` 和 `INCLUDE`。这些参数是互斥的。\n\n## 指定查询\n\n您可以使用 `QUERY` 参数指示 Data\
  \ Pump 仅将满足特定条件的行写入转储文件。如果您正在重新创建测试环境并且只需要数据的子集，可能需要这样做。\n\n\n\n"
- '# 使用 Oracle Data Pump 进行高级数据过滤与导出


  ## 使用查询限制数据

  请注意，此技术无法感知可能存在的任何外键约束，因此在考虑父-子关系之前，不能盲目地限制数据集。`QUERY`参数用于包含查询的通用语法如下：


  ```

  QUERY = [schema.][table_name:] query_clause

  ```


  查询子句可以是任何有效的 SQL 子句。查询必须用双引号或单引号括起来。我建议使用双引号，因为查询中可能需要嵌入单引号来处理`VARCHAR2`数据。此外，您应该使用参数文件，以避免操作系统对引号的解释产生混淆。


  此示例使用参数文件并限制两个表导出的行数。导出时使用的参数文件如下：


  ```

  userid=mv_maint/foo

  directory=dp_dir

  dumpfile=inv.dmp

  tables=inv,reg

  query=inv:"WHERE inv_desc=''Book''"

  query=reg:"WHERE reg_id <=20"

  ```


  假设您将上述代码行放在一个名为`inv.par`的文件中。导出作业引用该参数文件，如下所示：


  ```

  $ expdp parfile=inv.par

  ```


  生成的转储文件仅包含由`QUERY`参数过滤的行。再次提醒，请注意任何父-子关系，并确保导出的内容不会违反导入时的任何约束。


  ## 在导入时使用查询

  您也可以在导入数据时指定查询。以下是一个参数文件，它根据`INV_ID`列限制导入`INV`表的行数：


  ```

  userid=mv_maint/foo

  directory=dp_dir

  dumpfile=inv.dmp

  tables=inv,reg

  query=inv:"WHERE inv_id > 10"

  ```


  此文件内容被放入一个名为`inv2.par`的文件中，并在导入时引用，如下所示：


  ```

  $ impdp parfile=inv2.par

  ```


  `REG`表的所有行都被导入。只有`INV`表中`INV_ID`大于 10 的行被导入。


  ## 按百分比导出数据

  在导出时，`SAMPLE`参数指示 Data Pump 根据您提供的数字检索一定百分比的行。Data Pump 在导出时不会跟踪父-子关系。因此，当您的表通过外键约束链接，并且您尝试随机选择一定百分比的行时，这种方法效果不佳。


  此参数的通用语法如下：


  ```

  SAMPLE=[[schema_name.]table_name:]sample_percent

  ```


  例如，如果您想导出表中 10%的数据，可按如下方式操作：


  ```

  $ expdp mv_maint/foo directory=dp_dir tables=inv sample=10 dumpfile=inv.dmp

  ```


  下一个示例导出两个表，但仅导出`REG`表 30%的数据：


  ```

  $ expdp mv_maint/foo directory=dp_dir tables=inv,reg sample=reg:30 dumpfile=inv.dmp

  ```


  ![Image](img/sq.jpg) **注意**  `SAMPLE`参数仅对导出有效。


  ## 从导出文件中排除对象

  对于导出，`EXCLUDE`参数指示 Data Pump 不导出指定的对象（而`INCLUDE`参数则指示 Data Pump 在导出文件中仅包含特定对象）。`EXCLUDE`参数的通用语法如下：


  ```

  EXCLUDE=object_type[:name_clause] [, ...]

  ```


  `OBJECT_TYPE`是数据库对象，例如`TABLE`或`INDEX`。要查看可以过滤哪些对象类型，请查看`DATABASE_EXPORT_OBJECTS`、`SCHEMA_EXPORT_OBJECTS`或`TABLE_EXPORT_OBJECTS`的`OBJECT_PATH`列。例如，如果您想查看可以过滤哪些模式级对象，请运行此查询：


  ```

  SELECT  object_path

  FROM    schema_export_objects

  WHERE   object_path NOT LIKE ''%/%'';

  ```


  以下是输出的片段：


  ```

  OBJECT_PATH

  ------------------

  STATISTICS

  SYNONYM

  SYSTEM_GRANT

  TABLE

  TABLESPACE_QUOTA

  TRIGGER

  ```


  `EXCLUDE`参数指示 Data Pump 导出从导出中过滤掉特定对象。例如，假设您正在导出一个表但希望排除索引和授权：


  ```

  $ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp tables=inv exclude=index,grant

  ```


  您可以通过使用`NAME_CLAUSE`进行更细粒度的过滤。`EXCLUDE`的`NAME_CLAUSE`选项允许您指定一个 SQL 过滤器。要排除名称以字符串“INV”开头的索引，请使用以下命令：


  ```

  exclude=index:"LIKE ''INV%''"

  ```


  前面的命令要求您使用引号；在这些情况下，我建议您使用参数文件。以下是一个包含`EXCLUDE`子句的参数文件：


  ```

  userid=mv_maint/foo

  directory=dp_dir

  dumpfile=inv.dmp

  tables=inv

  exclude=index:"LIKE ''INV%''"

  ```


  `EXCLUDE`子句的某些方面可能看起来违反直觉。例如，考虑以下导出参数文件：


  ```

  userid=mv_maint/foo

  directory=dp_dir

  dumpfile=sch.dmp

  exclude=schema:"=''HEERA''"

  ```


  如果您尝试以这种方式排除用户，则会抛出错误。这是因为默认的导出模式是`SCHEMA`级别，并且 Data Pump 不能同时排除和包含一个模式。如果您想从导出文件中排除一个用户，请指定`FULL`模式，然后排除该用户：


  ```

  userid=mv_maint/foo

  directory=dp_dir

  dumpfile=sch.dmp

  exclude=schema:"=''HEERA''"

  full=y

  ```


  ## 排除统计信息

  默认情况下，当您导出表对象时，任何统计信息也会被导出。您可以通过`EXCLUDE`参数防止统计信息被导入。这是一个例子：


  ```

  $ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp \

  tables=inv exclude=statistics

  ```


  在导入时，如果您尝试从原本不包含统计信息的转储文件中排除统计信息，则会收到此错误：


  ```

  ORA-39168: Object path STATISTICS was not found.

  ```


  如果导出转储文件中的对象从未生成过统计信息，您也会收到此错误。


  ## 在导出文件中仅包含特定对象

  使用`INCLUDE`参数在导出文件中仅包含某些数据库对象。以下示例仅导出用户拥有的过程和函数：


  ```

  $ expdp mv_maint/foo dumpfile=proc.dmp directory=dp_dir include=procedure,function

  ```


  创建的`proc.dmp`文件仅包含重新创建用户拥有的任何过程和函数所需的 DDL。


  使用`INCLUDE`时，您也可以指定仅导出特定的 PL/SQL 对象：


  ```

  $ expdp mv_maint/foo directory=dp_dir dumpfile=ss.dmp \

  include=function:\"=\''IS_DATE\''\"

  ```


  当仅导出特定的 PL/SQL 对象时，由于需要在操作系统命令行上转义引号的问题，我建议使用参数文件。使用参数文件时，这不是问题。以下示例显示了导出特定对象的参数文件内容：


  ```

  directory=dp_dir

  dumpfile=ss.dmp

  include=function:"=''ISDATE''",procedure:"=''DEPTREE_FILL''"

  ```


  如果您指定一个不存在的对象，Data Pump 会抛出错误但会继续导出操作：


  ```

  ORA-39168: Object path FUNCTION was not found.

  ```


  ## 导出表、索引、约束和触发器的 DDL

  假设您想导出数据库中与表、索引、约束和触发器关联的 DDL。为此，请使用`FULL`导出模式，指定`CONTENT=METADATA_ONLY`，并且仅包含表：


  ```

  $ expdp mv_maint/foo directory=dp_dir dumpfile=ddl.dmp \

  content=metadata_only full=y include=table

  ```


  当您导出一个对象时，Data Pump 也会导出任何依赖对象。因此，当您导出一个表时，您也会获得与该表关联的索引、约束和触发器。


  ## 从导入中排除对象

  通常，您可以使用与在导出中过滤对象相同的技术来排除对象被导入。使用`EXCLUDE`参数来排除对象被导入。例如，要排除触发器和过程被导入，请使用以下命令：


  ```

  $ impdp mv_maint/foo dumpfile=inv.dmp exclude=trigger,procedure

  ```




  '
- "# Oracle 数据泵任务与操作指南\n\n## 排除和包含导入对象\n\n在导入时，可以使用 `exclude` 参数排除特定对象类型，如触发器、存储过程等。\n\
  例如，在参数文件中设置 `exclude=TRIGGER,PROCEDURE`。\n\n可以通过添加 SQL 子句来进一步细化排除条件。例如，如果不想导入以字母\
  \ `B` 开头的触发器，参数文件内容如下：\n```\nuserid=mv_maint/foo\ndirectory=dp_dir\ndumpfile=inv.dmp\n\
  schemas=HEERA\nexclude=trigger:\"like 'B%'\"\n```\n\n### 包含对象导入\n\n可以使用 `INCLUDE`\
  \ 参数来限制导入的内容。假设需要从某个模式中导入所有以字母 `A` 开头的表，参数文件如下：\n```\nuserid=mv_maint/foo\ndirectory=dp_dir\n\
  dumpfile=inv.dmp\nschemas=HEERA\ninclude=table:\"like 'A%'\"\n```\n\n将上述内容保存到名为\
  \ `h.par` 的文件后，可以按如下方式调用参数文件：\n```\n$ impdp parfile=h.par\n```\n\n在此示例中，`HEERA`\
  \ 模式必须已存在。只有以字母 `A` 开头的表会被导入。\n\n### 常见数据泵任务\n\n以下各节介绍数据泵的常用功能。其中许多功能是数据泵的标准功能，例如创建一致性导出以及处理导入对象已存在于数据库中的情况。其他功能，如压缩和加密，则需要\
  \ Oracle 企业版或额外许可，或两者兼需。在介绍相关数据泵元素时，我会指出这些要求（如适用）。\n\n### 估算导出作业大小\n\n如果即将导出大量数据，可以在运行导出前估算数据泵创建的文件大小。这样做可能是因为担心导出作业所需的空间量。\n\
  \n要估算大小，请使用 `ESTIMATE_ONLY` 参数。此示例估算整个数据库导出文件的大小：\n```\n$ expdp mv_maint/foo estimate_only=y\
  \ full=y logfile=n\n```\n\n部分输出示例如下：\n```\nEstimate in progress using BLOCKS method...\n\
  Total estimation using BLOCKS method: 6.75 GB\n```\n\n同样，可以指定模式名来估算导出特定用户所需的空间大小：\n\
  ```\n$ expdp mv_maint/foo estimate_only=y schemas=star2 logfile=n\n```\n\n以下示例演示了估算两张表所需大小：\n\
  ```\n$ expdp mv_maint/foo estimate_only=y tables=star2.f_configs,star2.f_installations\
  \ \\\nlogfile=n\n```\n\n### 列出转储文件内容\n\n数据泵提供了一种非常强大的方法来创建包含导入作业运行时执行的所有 SQL 语句的文件。数据泵使用\
  \ `DBMS_METADATA` 包来创建可用于在数据泵转储文件中重建对象的 DDL。\n\n使用数据泵导入的 `SQLFILE` 选项可以列出数据泵导出文件的内容。此示例创建一个名为\
  \ `expfull.sql` 的文件，其中包含导入过程将调用的 SQL 语句（文件放置在由 `DPUMP_DIR2` 目录对象定义的目录中）：\n```\n\
  $ impdp hr/hr DIRECTORY=dpump_dir1 DUMPFILE=expfull.dmp \\\nSQLFILE=dpump_dir2:expfull.sql\n\
  ```\n\n如果未指定单独的目录（例如上例中的 `dpump_dir2`），则 SQL 文件将写入 `DIRECTORY` 选项指定的位置。\n\n```\n\
  提示\n```\n必须使用具有 DBA 权限的用户或执行数据泵导出的模式用户来运行上述命令。否则，将得到一个不包含预期 SQL 语句的空 SQL 文件。\n\n\
  当对导入使用 `SQLFILE` 选项时，`impdp` 进程不会导入任何数据；它仅创建一个包含导入过程将运行的 SQL 命令的文件。\n\n有时生成 SQL\
  \ 文件非常方便，原因如下：\n* 在运行导入前预览和验证 SQL 语句\n* 手动运行 SQL 以预创建数据库对象\n* 捕获重建数据库对象（用户、表、索引等）所需的\
  \ SQL\n\n关于最后一点，有时签入源代码控制仓库的内容与实际应用于生产数据库的内容并不匹配。此过程对于故障排除或记录数据库在某个时间点的状态非常方便。\n\
  \n### 克隆用户\n\n假设需要将用户对象和数据移动到新数据库。作为迁移的一部分，希望重命名该用户。首先，创建一个包含要克隆用户的模式级导出文件。在此示例中，用户名为\
  \ `INV`：\n```\n$ expdp mv_maint/foo directory=dp_dir schemas=inv dumpfile=inv.dmp\n\
  ```\n\n现在，可以使用数据泵导入来克隆用户。如果要将用户移动到不同的数据库，请将转储文件复制到远程数据库，并使用 `REMAP_SCHEMA` 参数创建用户的副本。在此示例中，`INV`\
  \ 用户被克隆为 `INV_DW` 用户：\n```\n$ impdp mv_maint/foo directory=dp_dir remap_schema=inv:inv_dw\
  \ dumpfile=inv.dmp\n```\n\n此命令将 `INV` 用户中的所有结构和数据复制到 `INV_DW` 用户。最终的 `INV_DW` 用户在对象方面与\
  \ `INV` 用户相同。复制的模式也包含与源模式相同的密码。\n\n如果只想将元数据从一个模式复制到另一个模式，请使用带有 `METADATA_ONLY` 选项的\
  \ `CONTENT` 参数：\n```\n$ impdp mv_maint/foo directory=dp_dir remap_schema=inv:inv_dw\
  \ \\\ncontent=metadata_only dumpfile=inv.dmp\n```\n\n`REMAP_SCHEMA` 参数提供了一种高效复制模式的方法，无论是否包含数据。在模式复制操作期间，如果希望更改对象所在的表空间，还可以使用\
  \ `REMAP_TABLESPACE` 参数。这允许您复制模式并将对象放置在与源对象不同的表空间中。\n\n也可以无需先创建转储文件就将用户从一个数据库复制到另一个数据库。为此，请使用\
  \ `NETWORK_LINK` 参数。有关直接从一个数据库复制数据的详细信息，请参阅本章前面的“直接通过网络导出和导入”部分。\n\n### 创建一致性导出\n\
  \n一致性导出意味着导出文件中的所有数据都截至某个时间点或 SCN 一致。当导出具有许多父-子表的活动数据库时，应确保获得数据的一致性快照。\n\n```\n\
  提示\n```\n如果使用的是 Oracle 11g Release 2 或更高版本，可以通过调用传统模式参数 `CONSISTENT=Y` 来进行一致性导出。有关详细信息，请参阅本章后面的“数据泵传统模式”部分。\n\
  \n通过使用 `FLASHBACK_SCN` 或 `FLASHBACK_TIME` 参数可以创建一致性导出。此示例使用 `FLASHBACK_SCN` 参数进行导出。要确定数据集的当前\
  \ SCN 值，请发出以下查询：\n```\nSQL> select current_scn from v$database;\n```\n\n典型输出如下：\n\
  ```\n CURRENT_SCN\n-----------\n     5715397\n```\n\n以下命令使用 `FLASHBACK_SCN` 参数对数据库进行一致性完全导出：\n\
  ```\n$ expdp mv_maint/foo directory=dp_dir full=y flashback_scn=5715397 \\\ndumpfile=full.dmp\n\
  ```\n\n前面的导出命令确保所有导出的数据与指定 SCN 时数据库中已提交的任何事务保持一致。\n\n当使用 `FLASHBACK_SCN` 参数时，数据泵确保导出文件中的数据截至指定的\
  \ SCN 是一致的。\n\n\n\n这意味着在指定的 SCN 之后提交的任何事务都不会包含在导出文件中。\n\n`注意`：如果将 `NETWORK_LINK`\
  \ 参数与 `FLASHBACK_SCN` 结合使用，则导出将使用与数据库链接中引用的数据库一致的 SCN 进行。\n\n## 使用 FLASHBACK_TIME\
  \ 指定导出一致性\n\n您还可以使用 `FLASHBACK_TIME` 来指定导出文件应基于指定时间点的、一致的已提交事务来创建。使用 `FLASHBACK_TIME`\
  \ 时，Oracle 会确定与指定时间最匹配的 SCN，并使用该 SCN 来生成一致的导出。使用 `FLASHBACK_TIME` 的语法如下：\n\n```\n\
  FLASHBACK_TIME=\"TO_TIMESTAMP{<value>}\"\n\"\n```\n\n对于某些操作系统，直接在命令行上出现的双引号必须用反斜杠\
  \ (`\\`) 转义，因为操作系统将它们视为特殊字符。因此，使用参数文件要直接得多。以下是一个使用 `FLASHBACK_TIME` 的参数文件内容：\n\n\
  ```\ndirectory=dp_dir\ncontent=metadata_only\ndumpfile=inv.dmp\nflashback_time=\"\
  to_timestamp('24-jan-2014 07:03:00','dd-mon-yyyy hh24:mi:ss')\"\n```\n\n根据您的操作系统，前述示例的命令行版本必须指定如下：\n\
  \n```\nflashback_time=\\\"to_timestamp\\(\\'24-jan-2014 07:03:00\\', \\'dd-mon-yyyy\
  \ hh24:mi:ss\\'\\)\\\"\n```\n\n此行代码应在一行上指定。这里，为了适应页面，代码被放在了两行上。\n\n`注意`：执行导出时，不能同时指定\
  \ `FLASHBACK_SCN` 和 `FLASHBACK_TIME`；这两个参数是互斥的。如果您尝试同时使用这两个参数，Data Pump 将抛出以下错误消息并停止导出作业：\n\
  \n```\nORA-39050: parameter FLASHBACK_TIME is incompatible with parameter FLASHBACK_SCN\n\
  ```\n\n## 当对象已存在时进行导入\n\n在导出和导入数据时，您经常需要导入到其中对象（表、索引等）已创建的模式中。在这种情况下，您应该导入数据，但指示\
  \ Data Pump 尝试不创建已存在的对象。\n\n您可以使用 `TABLE_EXISTS_ACTION` 和 `CONTENT` 参数来实现这一点。下一个示例通过\
  \ `TABLE_EXISTS_ACTION=APPEND` 选项指示 Data Pump 将数据附加到任何已存在的表中。同时还使用了 `CONTENT=DATA_ONLY`\
  \ 选项，该选项指示 Data Pump 不要运行任何 DDL 来创建对象（仅加载数据）：\n\n```\n$ impdp mv_maint/foo directory=dp_dir\
  \ dumpfile=inv.dmp \\\ntable_exists_action=append content=data_only\n```\n\n现有对象不会以任何方式被修改，而转储文件中存在的任何新数据都会插入到相应的表中。\n\
  \n您可能想知道如果只使用 `TABLE_EXISTS_ACTION` 选项而不将其与 `CONTENT` 选项结合会发生什么：\n\n```\n$ impdp\
  \ mv_maint/foo directory=dp_dir dumpfile=inv.dmp \\\ntable_exists_action=append\n\
  ```\n\n唯一的区别是，如果对象存在，Data Pump 会尝试运行 DDL 命令来创建它们。这不会阻止作业运行，但您会在输出中看到一条错误消息，指示对象已存在。以下是前述命令输出的一个片段：\n\
  \n```\nTable \"MV_MAINT\".\"INV\" exists. Data will be appended ...\n```\n\n`TABLE_EXISTS_ACTION`\
  \ 参数的默认值是 `SKIP`，除非您还指定了 `CONTENT=DATA_ONLY` 参数。如果您使用 `CONTENT=DATA_ONLY`，那么 `TABLE_EXISTS_ACTION`\
  \ 的默认值是 `APPEND`。\n\n### TABLE_EXISTS_ACTION 选项\n\n`TABLE_EXISTS_ACTION` 参数接受以下选项：\n\
  \n*   `SKIP`（默认，如果未与 `CONTENT=DATA_ONLY` 结合使用）\n*   `APPEND`（默认，如果与 `CONTENT=DATA_ONLY`\
  \ 结合使用）\n*   `REPLACE`\n*   `TRUNCATE`\n\n`SKIP` 选项告诉 Data Pump，如果对象存在则不处理该对象。`APPEND`\
  \ 选项指示 Data Pump 不要删除现有数据，而是向表中添加数据，而不修改任何现有数据。\n\n`REPLACE` 选项指示 Data Pump 删除并重新创建对象；当\
  \ `CONTENT` 参数与 `DATA_ONLY` 选项一起使用时，此参数无效。`TRUNCATE` 参数告诉 Data Pump 通过 `TRUNCATE`\
  \ 语句删除表中的行。\n\n### CONTENT 选项\n\n`CONTENT` 参数接受以下选项：\n\n*   `ALL`（默认）\n*   `DATA_ONLY`\n\
  *   `METADATA_ONLY`\n\n`ALL` 选项指示 Data Pump 加载转储文件中包含的数据和元数据；这是默认行为。`DATA_ONLY`\
  \ 选项告诉 Data Pump 仅将表数据加载到现有表中；不创建任何数据库对象。`METADATA_ONLY` 选项仅创建对象；不加载任何数据。\n\n##\
  \ 重命名表\n\n从 Oracle 11g 开始，您可以在导入操作期间选择重命名表。导入时重命名表的原因有很多。例如，目标模式中可能有一个表与您要导入的表同名。您可以使用\
  \ `REMAP_TABLE` 参数在导入时重命名表。此示例将 `HEERA` 用户的 `INV` 表从转储文件导入为 `HEERA` 用户的 `INVEN`\
  \ 表：\n\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp tables=heera.inv\
  \ \\\nremap_table=heera.inv:inven\n```\n\n以下是重命名表的一般语法：\n\n```\nREMAP_TABLE=[schema.]old_tablename[.partition]:new_tablename\n\
  ```\n\n`注意`：此语法不允许您将表重命名到不同的模式中。如果不小心，您可能会尝试执行以下操作（认为您是在一个操作中移动并重命名表）：\n\n```\n\
  $ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp tables=heera.inv \\\nremap_table=heera.inv:scott.inven\n\
  ```\n\n在前面的示例中，您最终会在 `HEERA` 模式中得到一个名为 `SCOTT` 的表。这可能会引起混淆。\n\n`注意`：在 Oracle 11g\
  \ Release 1 中，重命名表的过程并非完全没有错误，但在 Oracle 11g Release 2 中已得到纠正。有关更多详细信息，请参阅 MOS Note\
  \ 886762.1。\n\n## 重映射数据\n\n从 Oracle 11g 开始，在导出或导入时，您可以应用 PL/SQL 函数来更改列值。例如，您可能有一位审计员需要查看数据，其中一个要求是对敏感列应用简单的混淆函数。数据不需要加密；只需要进行足够改变，使得审计员无法轻易确定\
  \ `CUSTOMERS` 表中 `LAST_NAME` 列的值。\n\n此示例首先创建一个用于混淆数据的简单包：\n\n```\ncreate or replace\
  \ package obfus is\n  function obf(clear_string varchar2) return varchar2;\n  function\
  \ unobf(obs_string varchar2) return varchar2;\nend obfus;\n/\ncreate or replace\
  \ package body obfus is\n  fromstr varchar2(62) := '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'\
  \ ||\n             'abcdefghijklmnopqrstuvwxyz';\n  tostr varchar2(62)   := 'defghijklmnopqrstuvwxyzabc3456789012'\
  \ ||\n             'KLMNOPQRSTUVWXYZABCDEFGHIJ';\n  function obf(clear_string varchar2)\
  \ return varchar2 is\n  begin\n    return translate(clear_string, fromstr, tostr);\n\
  \  end obf;\n  function unobf(obs_string varchar2) return varchar2 is\n  begin\n\
  \    return translate(obs_string, tostr, fromstr);\n  end unobf;\nend obfus;\n/\n\
  ```\n\n现在，当您将数据导入数据库时，您将混淆函数应用于 `CUSTOMERS` 表的 `LAST_NAME` 列：\n\n```\n$ impdp mv_maint/foo\
  \ directory=dp_dir dumpfile=cust.dmp tables=customers  \\\nremap_data=customers.last_name:obfus.obf\n\
  ```\n\n从 `CUSTOMERS` 表中选择 `LAST_NAME` 显示它已被混淆的方式导入：\n\n```\nSQL> select last_name\
  \ from customers;\nLAST_NAME\n------------------\nyYZEJ\ntOXXSMU\nxERX\n```\n\n\
  您可以手动应用包的 `UNOBF` 函数来查看列的真实值：\n\n```\nSQL> select obfus.unobf(last_name) from customers;\n\
  OBFUS.UNOBF(LAST_NAME)\n------------------------\nSmith\nJohnson\nWilliams\n```\n\
  \n\n\n## 抑制日志文件\n默认情况下，Data Pump 在执行导出或导入时会创建一个日志文件。如果您知道不需要生成日志文件，可以通过指定 `NOLOGFILE`\
  \ 参数来抑制它。这是一个示例：\n\n```bash\n$ expdp mv_maint/foo directory=dp_dir tables=inv nologfile=y\n\
  ```\n\n如果您选择不创建日志文件，Data Pump 仍然会在输出设备上显示状态消息。一般来说，我建议您为每个 Data Pump 操作都创建一个日志文件。这为您提供了操作的审计跟踪。\n\
  \n## 使用并行\n使用 `PARALLEL` 参数来并行化一个 Data Pump 作业。例如，如果您知道一台服务器上有四个 CPU，并希望将并行度设置为\
  \ 4，可以如下使用 `PARALLEL`：\n\n```bash\n$ expdp mv_maint/foo parallel=4 dumpfile=exp.dmp\
  \ directory=dp_dir full=y\n```\n\n为了充分利用并行功能，请确保在导出时指定多个文件。以下示例为每个并行线程创建一个文件：\n\n\
  ```bash\n$ expdp mv_maint/foo parallel=4 dumpfile=exp1.dmp,exp2.dmp,exp3.dmp,exp4.dmp\n\
  ```\n\n您也可以使用 `%U` 替代变量来指示 Data Pump 自动创建与并行度匹配的转储文件。`%U` 变量从值 01 开始，并在分配额外的转储文件时递增。此示例使用了\
  \ `%U` 变量：\n\n```bash\n$ expdp mv_maint/foo parallel=4 dumpfile=exp%U.dmp\n```\n\
  \n现在，假设您需要从由导出创建的转储文件中导入。您可以单独指定转储文件，或者，如果转储文件是使用 `%U` 变量创建的，则在导入时也使用它：\n\n```bash\n\
  $ impdp mv_maint/foo parallel=4 dumpfile=exp%U.dmp\n```\n\n在上面的示例中，导入进程首先查找名为 `exp01.dmp`\
  \ 的文件，然后是 `exp02.dmp`，依此类推。\n\n![Image](img/sq.jpg) **提示** Oracle 建议并行度不要设置为服务器上可用\
  \ CPU 数量的两倍以上。\n\n您也可以在作业运行时修改并行度。首先，以交互命令模式附加到要修改并行度的作业（请参阅本章后面的“交互命令模式”部分），然后使用\
  \ `PARALLEL` 选项。此示例中附加到的作业是 `SYS_IMPORT_TABLE_01`：\n\n```bash\n$ impdp mv_maint/foo\
  \ attach=sys_import_table_01\nImport> parallel=6\n```\n\n您可以通过 `STATUS` 命令检查并行度：\n\
  \n```bash\nImport> status\n```\n\n这是一些示例输出：\n\n```\nJob: SYS_IMPORT_TABLE_01\n \
  \ Operation: IMPORT\n  Mode: TABLE\n  State: EXECUTING\n  Bytes Processed: 0\n \
  \ Current Parallelism: 6\n```\n\n![Image](img/sq.jpg) **注意** `PARALLEL` 功能仅在 Oracle\
  \ 企业版中可用。\n\n## 指定额外的转储文件\n如果主数据泵位置空间不足，您可以动态指定额外的数据泵位置。使用交互式命令提示符下的 `ADD_FILE`\
  \ 命令。以下是添加额外文件的基本语法：\n\n```\nADD_FILE=[directory_object:]file_name [,...]\n```\n\
  \n此示例向已存在的 Data Pump 导出作业添加另一个输出文件：\n\n```bash\nExport> add_file=alt2.dmp\n```\n\
  \n您也可以指定一个单独的数据库目录对象：\n\n```bash\nExport> add_file=alt_dir:alt3.dmp\n```\n\n## 重用输出文件名\n\
  默认情况下，Data Pump 不会覆盖现有的转储文件。例如，第一次运行此作业时，它会正常运行，因为所使用的目录中没有名为 `inv.dmp` 的转储文件：\n\
  \n```bash\n$ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp\n```\n\n如果您尝试使用相同的目录和数据泵名称再次运行上述命令，将会抛出此错误：\n\
  \n```\nORA-31641: unable to create dump file \"/oradump/inv.dmp\"\n```\n\n您可以为导出作业指定一个新的数据泵名称，或者使用\
  \ `REUSE_DUMPFILES` 参数来指示 Data Pump 覆盖现有的转储文件；例如：\n\n```bash\n$ expdp mv_maint/foo\
  \ directory=dp_dir dumpfile=inv.dmp reuse_dumpfiles=y\n```\n\n现在，无论输出目录中是否存在同名的现有转储文件，您都应该能够运行\
  \ Data Pump 导出。当您将 `REUSE_DUMPFILES` 设置为 `y` 时，如果 Data Pump 找到同名的转储文件，它将覆盖该文件。\n\
  \n![Image](img/sq.jpg) **注意** `REUSE_DUMPFILES` 的默认值为 `n`。`REUSE_DUMPFILES` 参数仅在\
  \ Oracle 11g 及更高版本中可用。\n\n## 创建每日 DDL 文件\n有时，在数据库环境中，数据库对象会以意想不到的方式发生变化。您可能有一位开发人员以某种方式获得了生产用户密码，并决定在未经任何人告知的情况下即时进行更改。或者，DBA\
  \ 在排查问题时可能决定不遵循标准发布流程而更改对象。这些情况对于生产支持 DBA 来说可能是令人沮丧的。每当出现问题时，首先被提出的问题是：“什么发生了变化？”\n\
  \n当您使用 Data Pump 时，创建一个包含用于重新创建数据库中所有对象的 DDL 的文件相当简单。您可以通过 `CONTENT=METADATA_ONLY`\
  \ 选项指示 Data Pump 仅导出或导入元数据。\n\n例如，在生产环境中，您可以设置一个每日作业来捕获此 DDL。如果对发生了什么变化以及何时发生变化有疑问，您可以回溯并比较每日转储文件中的\
  \ DDL。\n\n下面列出的是一个简单的 shell 脚本，它首先从数据库导出元数据内容，然后使用 Data Pump 导入从该导出创建 DDL 文件：\n\n\
  ```bash\n#!/bin/bash\nexport ORACLE_SID=O12C\nexport ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1\n\
  export PATH=$PATH:$ORACLE_HOME/bin\n#\nDAY=$(date +%Y_%m_%d)\nSID=DWREP\n#---------------------------------------------------\n\
  # 首先创建仅包含元数据的导出转储文件\nexpdp mv_maint/foo dumpfile=${SID}.${DAY}.dmp content=metadata_only\
  \ \\\ndirectory=dp_dir full=y logfile=${SID}.${DAY}.log\n#---------------------------------------------------\n\
  # 现在从导出转储文件创建 DDL 文件。\nimpdp mv_maint/foo directory=dp_dir dumpfile=${SID}.${DAY}.dmp\
  \ \\\nSQLFILE=${SID}.${DAY}.sql logfile=${SID}.${DAY}.sql.log\n#\n# exit 0\n```\n\
  \n此代码清单依赖于已创建一个数据库目录对象，该对象指向您希望每日转储文件写入的位置。您可能还想设置另一个作业，该作业定期删除超过一定时间的文件。\n\n##\
  \ 压缩输出\n当您使用 Data Pump 创建大文件时，应该考虑压缩输出。从 Oracle 11g 开始，`COMPRESSION` 参数可以是以下值之一：`ALL`、`DATA_ONLY`、`METADATA_ONLY`\
  \ 或 `NONE`。如果您指定 `ALL`，则输出中的数据和元数据都将被压缩。此示例导出一个表并压缩输出文件中的数据和元数据：\n\n```bash\n$ expdp\
  \ dbauser/foo tables=locations directory=datapump \\\ndumpfile=compress.dmp compression=all\n\
  ```\n\n如果您使用的是 Oracle 10g，则 `COMPRESSION` 参数只有 `METADATA_ONLY` 和 `NONE` 值。\n\n![Image](img/sq.jpg)\
  \ **注意** `COMPRESS` 参数的 `ALL` 和 `DATA_ONLY` 选项需要 Oracle 高级压缩选项的许可。\n\nOracle 12c\
  \ 的新功能是，您可以指定一种压缩算法。选择有 `BASIC`、`LOW`、`MEDIUM` 和 `HIGH`。这是一个使用 `MEDIUM` 压缩的示例：\n\
  \n```bash\n$ expdp mv_maint/foo dumpfile=full.dmp compression=medium\n```\n\n\n"
- "# 数据泵高级特性\n\n## 压缩特性\n\n使用命令 `dmp directory=dp_dir full=y \\ compression=all compression_algorithm=MEDIUM`。\n\
  \n`COMPRESSION_ALGORITHM` 参数在磁盘空间不足或通过网络连接导出时特别有用，因为它减少了需要传输的字节数。\n\n![Image](img/sq.jpg)\n\
  \n**注意**\n`COMPRESSION_ALGORITHM` 参数需要 Oracle Advanced Compression 选项的许可。\n\n###\
  \ 导入时更改表压缩特性\n\n从 Oracle 12c 开始，您可以在导入表时更改其压缩特性。此示例将作业中导入的所有表的压缩特性更改为 `COMPRESS\
  \ FOR OLTP`。由于此示例中的命令需要引号，因此将其放在参数文件中，如下所示：\n\n```\nuserid=mv_maint/foo dumpfile=inv.dmp\
  \ directory=dp_dir transform=table_compression_clause:\"COMPRESS FOR OLTP\"\n```\n\
  \n假设参数文件名为 `imp.par`。现在可以按如下方式调用：\n\n```\n$ impdp parfile=imp.par\n```\n\n导入作业中包含的所有表都将创建为\
  \ `COMPRESS FOR OLTP`，并且数据在加载时被压缩。\n\n![Image](img/sq.jpg)\n\n**注意**\n表级压缩（用于 OLTP）需要\
  \ Oracle Advanced Compression 选项的许可。\n\n## 数据加密\n\n数据泵转储文件的一个潜在安全问题是，任何对输出文件有操作系统访问权限的人都可以在文件中搜索字符串。在\
  \ Linux/Unix 系统上，您可以使用 `strings` 命令执行此操作：\n\n```\n$ strings inv.dmp | grep -i secret\n\
  ```\n\n这是此特定转储文件的输出：\n\n```\nSecret Data<\ntop secret data<\ncorporate secret data<\n\
  ```\n\n此命令允许您查看转储文件的内容，因为数据是常规文本且未加密。如果您需要保护数据安全，可以使用数据泵的加密功能。\n\n此示例使用 `ENCRYPTION`\
  \ 参数来保护输出中的所有数据和元数据：\n\n```\n$ expdp mv_maint/foo encryption=all directory=dp_dir\
  \ dumpfile=inv.dmp\n```\n\n要使此命令生效，您的数据库必须有一个已打开的加密钱包。有关如何创建和打开钱包的更多详细信息，请参阅《Oracle\
  \ Advanced Security Administrator’s Guide》，可从 Oracle 网站 (`http://otn.oracle.com`)\
  \ 的 Technology Network 区域下载。\n\n![Image](img/sq.jpg)\n\n**注意**\n数据泵 `ENCRYPTION`\
  \ 参数要求您使用 Oracle 11g 或更高版本的企业版，并且还需要 Oracle Advanced Security 选项的许可。\n\n`ENCRYPTION`\
  \ 参数接受以下选项：\n\n*   `ALL`\n*   `DATA_ONLY`\n*   `ENCRYPTED_COLUMNS_ONLY`\n*   `METADATA_ONLY`\n\
  *   `NONE`\n\n`ALL` 选项为数据和元数据启用加密。`DATA_ONLY` 选项仅加密数据。`ENCRYPTED_COLUMNS_ONLY` 选项指定仅在数据库中加密的列才以加密格式写入转储文件。`METADATA_ONLY`\
  \ 选项仅加密导出文件中的元数据。\n\n## 将视图导出为表\n\n从 Oracle 12c 开始，您可以导出视图并在之后将其作为表导入。如果您需要将视图中包含的数据复制到历史报告数据库，则可能需要这样做。\n\
  \n使用 `VIEWS_AS_TABLES` 参数将视图导出到表结构中。此参数的语法如下：\n\n```\nVIEWS_AS_TABLES=[schema_name.]view_name[:template_table_name]\n\
  ```\n\n以下是一个示例：\n\n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=v.dmp \\\n\
  views_as_tables=sales_rockies\n```\n\n现在，转储文件可用于将名为 `SALES_ROCKIES` 的表导入不同的方案或数据库。\n\
  \n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=v.dmp\n```\n\n如果您只想导入在导出期间从视图创建的表，可以按如下方式进行：\n\
  \n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=v.dmp tables=sales_rockies\n\
  ```\n\n该表将具有与视图定义相同的列和数据类型。该表还将包含与导出时从视图中选择的内容相匹配的数据行。\n\n## 导入时禁用重做日志记录\n\n从 Oracle\
  \ 12c 开始，您可以指定对象以 nologging 方式加载重做。这是通过 `DISABLE_ARCHIVE_LOGGING` 参数实现的：\n\n```\n\
  $ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp \\\ntransform=disable_archive_logging:Y\n\
  ```\n\n在执行导入期间，对象的日志记录属性被设置为 `NO`；导入后，日志记录属性被设置回其原始值。对于数据泵可以使用直接路径执行的操作（例如向表中插入数据），这可以减少导入期间生成的重做量。\n\
  \n### 交互式命令模式\n\n数据泵提供了一个交互式命令模式，允许您监控数据泵作业的状态并动态修改许多作业特征。交互式命令模式对于长时间运行的数据泵操作最为有用。在此模式下，您还可以停止、重新启动或终止当前正在运行的作业。以下部分将讨论这些活动。\n\
  \n### 进入交互式命令模式\n\n有两种方式可以访问交互式命令模式提示符：\n\n*   在通过 `expdp` 或 `impdp` 启动的数据泵作业中按\
  \ Ctrl+C。\n*   使用 `ATTACH` 参数附加到当前正在运行的作业。\n\n当您从命令行运行数据泵作业时，您将处于命令行模式。随着作业的进行，您应该会看到输出显示在您的终端上。如果要退出命令行模式，请按\
  \ Ctrl+C。这将使您进入交互式命令界面模式。对于导出作业，提示符为：\n\n```\nExport>\n```\n\n输入 `HELP` 命令以查看可用的导出交互式命令（参见\
  \ 表 8-1）：\n\n```\nExport> help\n```\n\n**表 8-1**. 导出交互式命令\n\n| 命令 | 描述 |\n| ---\
  \ | --- |\n| `ADD_FILE` | 向导出转储集添加文件 |\n| `CONTINUE_CLIENT` | 继续交互式客户端模式 |\n| `EXIT_CLIENT`\
  \ | 退出客户端会话并返回到操作系统提示符；让当前作业继续运行 |\n| `FILESIZE` | 为任何后续创建的转储文件定义文件大小 |\n| `HELP`\
  \ | 显示交互式导出命令 |\n| `KILL_JOB` | 终止当前作业 |\n| `PARALLEL` | 增加或减少并行度 |\n| `REUSE_DUMPFILES`\
  \ | 如果转储文件存在则覆盖它（默认为 `N`） |\n| `START_JOB` | 重新启动已附加的作业 |\n| `STATUS` | 显示当前附加作业的状态\
  \ |\n| `STOP_JOB [=IMMEDIATE]` | 停止作业处理（您可以稍后重新启动它）。使用 `IMMEDIATE` 参数可快速停止作业，但可能有一些未完成的任务。\
  \ |\n\n输入 `EXIT` 以离开交互式命令模式：\n\n```\nExport> exit\n```\n\n您现在应该处于操作系统提示符下。\n\n您可以在导出或导入作业中按\
  \ Ctrl+C。对于导入作业，交互式命令模式提示符为：\n\n```\nImport>\n```\n\n要查看所有可用命令，请输入 `HELP`：\n\n```\n\
  Import> help\n```\n\n交互式命令模式的导入命令总结在 表 8-2 中。\n\n**表 8-2**. 导入交互式命令\n\n| 命令 | 描述\
  \ |\n| --- | --- |\n| `CONTINUE_CLIENT` | 继续交互式日志记录模式 |\n| `EXIT_CLIENT` | 退出客户端会话并返回到操作系统提示符。让当前作业继续运行\
  \ |\n| `HELP` | 显示可用的交互式命令 |\n| `KILL_JOB` | 终止客户端当前连接到的作业 |\n| `PARALLEL` | 增加或减少并行度\
  \ |\n| `START_JOB` | 重新启动先前停止的作业 |\n\n\n`START_JOB=SKIP_CURRENT` 将重启作业并跳过作业停止时正处于活动状态的任何操作。\n\
  `STATUS` 用于指定监控作业状态的频率。默认模式为 0；在此模式下，客户端会在作业状态变化可用时立即报告。\n`STOP_JOB [=IMMEDIATE]`\
  \ 用于停止作业处理（稍后可重启）。使用 `IMMEDIATE` 参数可快速停止作业，但可能会有未完成的任务。\n\n键入 `EXIT` 以离开 Data Pump\
  \ 状态工具：\n```\nImport> exit\n```\n此时您应处于操作系统提示符下。\n\n## 连接到正在运行的作业\n\nData Pump 的一个强大功能是，您可以连接到当前正在运行的作业并查看其进度和状态。如果您拥有\
  \ DBA 权限，即使您不是作业所有者，也可以连接。您可以通过 `ATTACH` 参数连接到导入或导出作业。\n\n在连接到作业之前，您必须首先确定 Data\
  \ Pump 作业名称（以及所有者名称，如果您不是作业所有者）。运行以下 SQL 查询以显示当前正在运行的作业：\n```\nSQL> select owner_name,\
  \ operation, job_name, state from dba_datapump_jobs;\n```\n以下是一些示例输出：\n```\nOWNER_NAME\
  \      OPERATION       JOB_NAME               STATE\n--------------- ---------------\
  \ -------------------- --------------------\nMV_MAINT        EXPORT          SYS_EXPORT_SCHEMA_01\
  \  EXECUTING\n```\n在此示例中，`MV_MAINT` 用户可以直接连接到该导出作业，如下所示：\n```\n$ expdp mv_maint/foo\
  \ attach=sys_export_schema_01\n```\n如果您不是作业所有者，则通过指定所有者名称和作业名称来连接到作业：\n```\n$ expdp\
  \ system/foobar attach=mv_maint.sys_export_schema_01\n```\n现在您应该会看到 Data Pump 命令行提示符：\n\
  ```\nExport>\n```\n键入 `STATUS` 以查看当前连接作业的状态：\n```\nExport> status\n```\n\n## 停止和重启作业\n\
  \n如果您有一个当前正在运行的 Data Pump 作业希望暂时停止，可以先连接到交互式命令模式来实现。您可能希望停止作业以解决空间问题或性能问题，待问题解决后再重启作业。以下示例连接到一个导入作业：\n\
  ```\n$ impdp mv_maint/foo attach=sys_import_table_01\n```\n现在，使用 `STOP_JOB` 参数停止作业：\n\
  ```\nImport> stop_job\n```\n您应该会看到以下输出：\n```\nAre you sure you wish to stop this\
  \ job ([yes]/no):\n```\n键入 `YES` 以继续停止作业。您还可以指定立即停止作业：\n```\nImport> stop_job=immediate\n\
  ```\n当您使用 `IMMEDIATE` 选项停止作业时，与该作业关联的一些任务可能未完成。要重启作业，请连接到交互式命令模式，并发出 `START_JOB`\
  \ 命令：\n```\nImport> start_job\n```\n如果您希望继续将作业输出记录到您的终端，请发出 `CONTINUE_CLIENT` 命令：\n\
  ```\nImport> continue_client\n```\n\n## 终止 Data Pump 作业\n\n您可以指示 Data Pump 永久终止一个导出或导入作业。首先，以交互式命令模式连接到作业，然后发出\
  \ `KILL_JOB` 命令：\n```\nImport> kill_job\n```\n系统将提示您以下输出：\n```\nAre you sure you\
  \ wish to stop this job ([yes]/no):\n```\n键入 `YES` 以永久终止该作业。Data Pump 会立即终止作业，并从运行导出或导入的用户中删除相关的状态表。\n\
  \n## 监控 Data Pump 作业\n\n当您有长时间运行的 Data Pump 作业时，应不时检查作业状态，以确保其未失败、未被挂起等等。\n\n有几种方法可以监控\
  \ Data Pump 作业的状态：\n* 屏幕输出\n* Data Pump 日志文件\n* 查询数据字典视图\n* 数据库告警日志\n* 查询状态表\n*\
  \ 交互式命令模式状态\n* 使用进程状态 (`ps`) 操作系统工具\n\n最直观的监控方法是查看 Data Pump 在作业运行时显示在屏幕上的状态。如果您已从命令模式断开连接，则状态将不再显示在屏幕上。在这种情况下，您必须使用另一种技术来监控\
  \ Data Pump 作业。\n\n### Data Pump 日志文件\n\n默认情况下，Data Pump 会为每个作业生成一个日志文件。启动 Data\
  \ Pump 作业时，最好为该作业指定一个特定的日志文件名：\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=archive.dmp\
  \ logfile=archive.log\n```\n此作业会创建一个名为 `archive.log` 的文件，该文件放置在数据库对象 `DP` 引用的目录中。如果您没有显式命名日志文件，Data\
  \ Pump 导入会创建一个名为 `import.log` 的文件，而 Data Pump 导出会创建一个名为 `export.log` 的文件。\n\n![Image](img/sq.jpg)\
  \ `Note`  该日志文件包含的信息与您运行 Data Pump 作业时在屏幕上以交互方式看到的信息相同。\n\n### 数据字典视图\n\n快速判断 Data\
  \ Pump 作业是否正在运行的一种方法是检查 `DBA_DATAPUMP_JOBS` 视图，查看是否有状态为 `EXECUTING` 的作业在运行：\n```\n\
  select job_name, operation, job_mode, state from dba_datapump_jobs;\n```\n以下是一些示例输出：\n\
  ```\nJOB_NAME                  OPERATION            JOB_MODE   STATE\n-------------------------\
  \ -------------------- ---------- ---------------\nSYS_IMPORT_TABLE_04       IMPORT\
  \               TABLE      EXECUTING\nSYS_IMPORT_FULL_02        IMPORT         \
  \      FULL       NOT RUNNING\n```\n您还可以通过以下查询 `DBA_DATAPUMP_SESSIONS` 视图来获取会话信息：\n\
  ```\nselect sid, serial#, username, process, program from v$session s,\n     dba_datapump_sessions\
  \ d where s.saddr = d.saddr;\n```\n以下是一些示例输出，显示正在使用多个 Data Pump 会话：\n```\n     \
  \ SID    SERIAL#  USERNAME           PROCESS         PROGRAM\n---------- ----------\
  \ -------------------- --------------- ----------------------\n      1049      \
  \ 6451 STAGING            11306           oracle@xengdb (DM00)\n      1058     \
  \ 33126 STAGING            11338           oracle@xengdb (DW01)\n      1048    \
  \  50508 STAGING            11396           oracle@xengdb (DW02)\n```\n\n### 数据库告警日志\n\
  \n如果某个作业花费的时间比您预期的长得多，请检查数据库告警日志中是否有类似以下的消息：\n```\nstatement in resumable session\
  \ 'SYS_IMPORT_SCHEMA_02.1' was suspended due to\nORA-01652: unable to extend temp\
  \ segment by 64 in tablespace REG_TBSP_3\n```\n此消息表明一个 Data Pump 导入作业被暂停，正在等待向 `REG_TBSP_3`\
  \ 表空间添加空间。向表空间添加空间后，Data Pump 作业会自动恢复处理。默认情况下，Data Pump 作业会等待 2 小时以添加空间。\n\n![Image](img/sq.jpg)\
  \ `Note`  除了写入告警日志外，对于每个 Data Pump 作业，Oracle 会在 `ADR_HOME/trace` 目录中创建一个跟踪文件。该文件包含会话\
  \ ID 和作业开始时间等信息。跟踪文件的命名格式如下：`<SID>_dm00_<process_ID>.trc`。\n\n### 状态表\n\n每次启动 Data\
  \ Pump 作业时，都会在运行作业的用户帐户中自动创建一个状态表。对于导出作业，表名取决于您运行的导出作业类型。表的命名格式为 `SYS_<OPERATION>_<JOB_MODE>_NN`，其中\
  \ `OPERATION` 是 `EXPORT` 或 `IMPORT`。`JOB_MODE` 可以是 `FULL`、`SCHEMA`、`TABLE`、`TABLESPACE`\
  \ 等。\n\n\n\n以下是查询状态表以获取当前正在运行的作业详情的示例：\n\n```sql\nselect name, object_name, total_bytes/1024/1024\
  \ t_m_bytes ,job_mode ,state ,to_char(last_update, 'dd-mon-yy hh24:mi') from SYS_EXPORT_TABLE_01\
  \ where state='EXECUTING';\n```\n\n## 交互式命令模式状态\n\n验证数据泵是否正在运行作业的快速方法是以交互式命令模式连接并发出\
  \ `STATUS` 命令；例如，\n\n```bash\n$ impdp mv_maint/foo attach=SYS_IMPORT_TABLE_04\n\
  Import> status\n```\n\n以下是一些示例输出：\n\n```\nJob: SYS_IMPORT_TABLE_04\n  Operation:\
  \ IMPORT\n  Mode: TABLE\n  State: EXECUTING\n  Bytes Processed: 0\n  Current Parallelism:\
  \ 4\n```\n\n你应该看到一个 `EXECUTING` 状态，这表示作业正在主动运行。输出中需要检查的其他项目包括处理的对象和字节数。这些数字应随着作业的进行而增加。\n\
  \n## 操作系统实用程序\n\n你可以使用操作系统实用程序 `ps` 来显示服务器上正在运行的作业。例如，你可以搜索主进程和工作进程，如下所示：\n\n```bash\n\
  $ ps -ef | egrep 'ora_dm|ora_dw' | grep -v egrep\n```\n\n以下是一些示例输出：\n\n```\noracle\
  \ 29871   717   5 08:26:39 ?          11:42 ora_dw01_STAGE\noracle 29848   717 \
  \  0 08:26:33 ?           0:08 ora_dm00_STAGE\noracle 29979   717   0 08:27:09 ?\
  \           0:04 ora_dw02_STAGE\n```\n\n如果你多次运行此命令，你应该会看到一个或多个当前作业的处理时间（第七列）在增加。这是数据泵仍在执行并工作的良好指标。\n\
  \n### 数据泵传统模式\n\n本章最后介绍此功能，但它非常实用，尤其如果你是一位老派的 DBA。自 Oracle 11g Release 2 起，数据泵允许你在调用数据泵作业时使用旧的\
  \ `exp` 和 `imp` 实用程序参数。这被称为传统模式，是一项很棒的功能。\n\n要使用传统模式的数据泵，你无需做任何特殊操作。一旦数据泵检测到传统参数，它会尝试将其作为来自旧\
  \ `exp`/`imp` 实用程序的参数进行处理。你甚至可以将旧的传统参数与新参数混合使用；例如，\n\n```bash\n$ expdp mv_maint/foo\
  \ consistent=y tables=inv directory=dp_dir\n```\n\n在输出中，数据泵会指出它遇到了传统参数，并为你提供该参数在数据泵语法中的翻译结果。对于前面的命令，以下是数据泵会话的输出，显示了\
  \ `consistent=y` 参数被翻译成的内容：\n\n```\nLegacy Mode Parameter: \"consistent=TRUE\"\n\
  Location: Command Line, Replaced with: \"flashback_time=TO_TIMESTAMP('2014-01-25\
  \ 19:31:54', 'YYYY-MM-DD HH24:MI:SS')\"\n```\n\n此功能可能极其方便，特别是当你非常熟悉旧的传统语法并想知道它如何在数据泵中实现时。\n\
  \n我建议你尽可能使用较新的数据泵语法。然而，你可能会遇到这样的情况：你有传统的 `exp`/`imp` 作业，并希望保持脚本原样运行，无需修改。\n\n![Image](img/sq.jpg)\
  \ **注意** 当数据泵在传统模式下运行时，它不会创建旧的 `exp`-/`imp` 格式的文件。数据泵总是创建数据泵文件，并且只能读取数据泵文件。\n\n\
  ## 数据泵与 exp 实用程序的映射\n\n如果你习惯旧的 `exp`/`imp` 参数，最初可能会对某些语法含义感到困惑。然而，在使用数据泵之后，你会发现新语法相当容易记忆和使用。表\
  \ 8-3 描述了传统导出参数如何映射到数据泵导出。\n\n表 8-3. 旧导出参数到数据泵的映射\n\n| 原始 exp 参数 | 类似的数据泵 expdp\
  \ 参数 |\n| --- | --- |\n| `BUFFER` | 不适用 |\n| `COMPRESS` | `TRANSFORM` |\n| `CONSISTENT`\
  \ | `FLASHBACK_SCN` 或 `FLASHBACK_TIME` |\n| `CONSTRAINTS` | `EXCLUDE=CONSTRAINTS`\
  \ |\n| `DIRECT` | 不适用；数据泵尽可能自动使用直接路径。 |\n| `FEEDBACK` | 客户端输出中的 `STATUS` |\n| `FILE`\
  \ | 数据库目录对象和 `DUMPFILE` |\n| `GRANTS` | `EXCLUDE=GRANT` |\n| `INDEXES` | `INCLUDE=INDEXES`,\
  \ `INCLUDE=INDEXES` |\n| `LOG` | 数据库目录对象和 `LOGFILE` |\n| `OBJECT_CONSISTENT` | 不适用\
  \ |\n| `OWNER` | `SCHEMAS` |\n| `RECORDLENGTH` | 不适用 |\n| `RESUMABLE` | 不适用；数据泵自动提供此功能。\
  \ |\n| `RESUMABLE_NAME` | 不适用 |\n| `RESUMABLE_TIMEOUT` | 不适用 |\n| `ROWS` | `CONTENT=ALL`\
  \ |\n| `STATISTICS` | 不适用；数据泵导出总是导出表的统计信息。 |\n| `TABLESPACES` | `TRANSPORT_TABLESPACES`\
  \ |\n| `TRANSPORT_TABLESPACE` | `TRANSPORT_TABLESPACES` |\n| `TRIGGERS` | `EXCLUDE=TRIGGER`\
  \ |\n| `TTS_FULL_CHECK` | `TRANSPORT_FULL_CHECK` |\n| `VOLSIZE` | 不适用；数据泵不支持磁带设备。\
  \ |\n\n在许多情况下，并非一一对应。通常，数据泵会自动提供旧版实用程序中需要参数才能使用的功能。例如，过去必须指定 `DIRECT=Y` 才能获得直接路径导出，而数据泵会在可能时自动使用直接路径。\n\
  \n## 数据泵与 imp 实用程序的映射\n\n与数据泵导出类似，数据泵导入通常也与旧版实用程序参数没有一一对应的映射。数据泵导入自动提供了旧 `imp` 实用程序的许多功能。例如，不需要\
  \ `COMMIT=Y`，因为数据泵导入在每个表导入后会自动提交。表 8-4 描述了传统导入参数如何映射到数据泵导入。\n\n表 8-4. 旧导入参数到数据泵的映射\n\
  \n| 原始 imp 参数 | 类似的数据泵 impdp 参数 |\n| --- | --- |\n| `BUFFER` | 不适用 |\n| `CHARSET`\
  \ | 不适用 |\n| `COMMIT` | 不适用；数据泵导入在每个表导出后会自动提交。 |\n| `COMPILE` | 不适用；数据泵导入在过程创建后编译它们。\
  \ |\n| `CONSTRAINTS` | `EXCLUDE=CONSTRAINT` |\n| `DATAFILES` | `TRANSPORT_DATAFILES`\
  \ |\n| `DESTROY` | `REUSE_DATAFILES=y` |\n| `FEEDBACK` | 客户端输出中的 `STATUS` |\n| `FILE`\
  \ | 数据库目录对象和 `DUMPFILE` |\n| `FILESIZE` | 不适用 |\n| `FROMUSER` | `REMAP_SCHEMA` |\n\
  | `GRANTS` | `EXCLUDE=OBJECT_GRANT` |\n| `IGNORE` | `TABLE_EXISTS_ACTION`，可选值为 `APPEND`、`REPLACE`、`SKIP`\
  \ 或 `TRUNCATE` |\n| `INDEXES` | `EXCLUDE=INDEXES` |\n| `INDEXFILE` | `SQLFILE` |\n\
  | `LOG` | 数据库目录对象和 `LOGFILE` |\n| `RECORDLENGTH` | 不适用 |\n| `RESUMABLE` | 不适用；此功能自动提供。\
  \ |\n| `RESUMABLE_NAME` | 不适用 |\n| `RESUMABLE_TIMEOUT` | 不适用 |\n| `ROWS=N` | `CONTENT`，可选值为\
  \ `METADATA_ONLY` 或 `ALL` |\n| `SHOW` | `SQLFILE` |\n| `STATISTICS` | 不适用 |\n| `STREAMS_CONFIGURATION`\
  \ | 不适用 |\n| `STREAMS_INSTANTIATION` | 不适用 |\n| `TABLESPACES` | `TRANSPORT_TABLESPACES`\
  \ |\n| `TOID_NOVALIDATE` | 不适用 |\n| `TOUSER` | `REMAP_SCHEMA` |\n| `TRANSPORT_TABLESPACE`\
  \ | `TRANSPORT_TABLESPACES` |\n| `TTS_OWNERS` | 不适用 |\n| `VOLSIZE` | 不适用；数据泵不支持磁带设备。\
  \ |\n\n### 总结\n\n数据泵是一个功能极其强大且丰富的工具。如果你使用数据泵不多，那么我建议你花些时间重读本章并实践其中的示例。此工具极大地简化了将用户和数据从一个环境迁移到另一个环境等任务。你可以导出和导入用户的子集，通过\
  \ SQL 和 PL/SQL 过滤和重映射数据，重命名用户和表空间，压缩、加密和并行化，所有这些都只需一个命令。它确实如此强大。\n\n\n\n数据库管理员有时会坚持使用旧的`exp`/`imp`实用程序，因为那是他们所熟悉的（我偶尔也会犯这样的错误）。如果你运行的是\
  \ Oracle 11g 第 2 版，你可以直接在命令行使用旧的`exp`/`imp`参数和选项。Data Pump 会将这些参数实时转换为 Data Pump\
  \ 特有的语法。这个特性很好地促进了从旧工具到新工具的迁移。作为参考，我还提供了旧`exp`/`imp`语法与 Data Pump 命令之间的映射关系。\n\n\
