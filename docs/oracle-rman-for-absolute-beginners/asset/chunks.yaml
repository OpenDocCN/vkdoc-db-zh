  trans: "\n# 恢复活动重做日志组所有成员丢失后的状态\n\n```sql\nalter database add logfile group 2\n\
    ('/u01/oraredo/O12C/redo02a.rdo',\n '/u02/oraredo/O12C/redo02b.rdo') SIZE 50M\
    \ reuse;\n```\n\n![Image](img/sq.jpg) `提示` 有关移动联机重做日志组的示例，请参见第 2 章。\n\n如果您数据库中某个活动的联机重做日志组的所有成员都发生了介质故障，那么在恢复该活动联机重做日志组时，请执行以下步骤：\n\
    \n1.  确认成员损坏情况。\n2.  确认其状态为 `ACTIVE`。\n3.  尝试发出一个检查点。\n4.  如果检查点成功，状态应变为 `INACTIVE`，然后您可以清除该日志组。\n\
    5.  如果被清除的日志组尚未归档，请立即备份您的数据库。\n6.  如果检查点不成功，那么您将必须执行不完全恢复。\n\n检查目标数据库的 `alert.log`\
    \ 文件，确认损坏情况。您应该会在 `alert.log` 文件中看到一条标识损坏成员的消息：\n\n```\nORA-00312: online log\
    \ 2 thread 1: '/u01/oraredo/O12C/redo02a.rdo'\nORA-00312: online log 2 thread\
    \ 1: '/u02/oraredo/O12C/redo02b.rdo'\n```\n\n接下来，验证受损的日志组状态是否为 `ACTIVE`，如下所示：\n\
    \n```\n$ sqlplus / as sysdba\nSQL> startup mount;\n```\n\n运行以下查询：\n\n```sql\n\
    SQL> select group#, status, archived, thread#, sequence# from v$log;\n```\n\n\
    以下是示例输出：\n\n```\nGROUP# STATUS           ARC  THREAD#  SEQUENCE#\n------ ----------------\
    \ --- --------\n     1 CURRENT          NO         1         92\n     2 ACTIVE\
    \           YES        1         91\n     3 INACTIVE         YES        1    \
    \     90\n```\n\n如果状态是 `ACTIVE`，则尝试发出 `alter system checkpoint` 命令，如下所示：\n\n```sql\n\
    SQL> alter system checkpoint;\nSystem altered.\n```\n\n如果检查点成功完成，则活动的日志组应被标记为\
    \ `INACTIVE`。成功的检查点确保所有已修改的数据库缓冲区都已写入磁盘，此时，只有包含在 `CURRENT` 联机重做日志中的事务才需要用于崩溃恢复。\n\
    \n![Image](img/sq.jpg) `注意` 如果检查点不成功，您将必须执行不完全恢复。有关此场景下的完整选项列表，请参见本章“恢复当前重做日志组所有成员丢失后的状态”一节。\n\
    \n如果状态是 `INACTIVE` 且日志已归档，您可以使用 `clear logfile` 命令重新创建日志组，如下所示：\n\n```sql\nSQL>\
    \ alter database clear logfile group <group#>;\n```\n\n如果状态是 `INACTIVE` 且日志组尚未归档，则使用\
    \ `clear unarchived logfile` 命令重新创建它，如下所示：\n\n```sql\nSQL> alter database clear\
    \ unarchived logfile group <group#>;\n```\n\n如果被清除的日志组之前未归档，立即创建数据库备份至关重要。有关创建数据库完整备份的详细信息，请参见第\
    \ 5 章。\n\n状态为 `ACTIVE` 的联机重做日志组仍然需要用于崩溃恢复。如果某个活动的联机重做日志组的所有成员都发生了介质故障，那么您必须尝试发出检查点。如果检查点成功，则可以清除该日志组。如果检查点不成功，则必须执行不完全恢复。\n\
    \n如果检查点成功且日志组未归档，那么该日志可能仍需要用于介质恢复。在此情况下，请尽快备份您的数据库。如果上次数据库备份是在该日志中的重做信息创建之前进行的，那么未归档的日志组可能仍需要用于介质恢复。这意味着如果您尝试执行介质恢复，您将无法恢复损坏日志文件中的任何信息或在该日志之后创建的任何事务。\n\
    \n# 恢复当前重做日志组所有成员丢失后的状态\n\n如果您数据库中当前联机重做日志组的所有成员都发生了介质故障，那么（不幸的是）当您丢失当前联机重做日志组的所有成员时，您的备选方案是有限的。以下是一些可能的选项：\n\
    \n*   执行不完全恢复到最后一个完好的 `SCN`。\n*   如果启用了闪回，将数据库闪回到最后一个完好的 `SCN`。\n*   如果您正在使用 Oracle\
    \ Data Guard，则故障切换到您的物理或逻辑备用数据库。\n*   联系 Oracle 支持服务寻求建议。\n\n为不完全恢复做准备，首先通过查询\
    \ `V$LOG` 中的 `FIRST_CHANGE#` 列来确定最后一个完好的 `SCN`。在此场景中，您仅丢失了当前联机重做日志。因此，您可以执行不完全恢复，恢复到但不包括当前联机重做日志的\
    \ `FIRST_CHANGE#` `SCN`。\n\n```\nSQL> shutdown immediate;\nSQL> startup mount;\n\
    ```\n\n现在发出此查询：\n\n```sql\nSELECT group#, status, archived,\nthread#, sequence#,\
    \ first_change#\nFROM v$log;\n```\n\n以下是示例输出：\n\n```\nGROUP# STATUS          \
    \ ARC  THREAD#  SEQUENCE# FIRST_CHANGE#\n------ ---------------- --- --------\
    \ ---------- -------------\n     1 INACTIVE         YES        1         86  \
    \      533781\n     2 INACTIVE         YES        1         85        533778\n\
    \     3 CURRENT          NO         1         87        533784\n```\n\n在此情况下，您可以恢复并恢复到但不包括\
    \ `SCN` 533784。操作方法如下：\n\n```\nRMAN> restore database until scn 533784;\nRMAN>\
    \ recover database until scn 533784;\nRMAN> alter database open resetlogs;\n```\n\
    \n![Image](img/sq.jpg) `注意` 有关不完全恢复和/或闪回数据库的完整详细信息，请参见第 6 章。\n\n丢失当前联机重做日志组的所有成员可以说是可能发生在您数据库上的最糟糕的事情。如果您遭遇当前联机组所有成员的介质故障，那么您很可能会丢失这些日志中包含的所有事务。在这种情况下，您必须先执行不完全恢复，然后才能打开数据库。\n\
    \n![Image](img/sq.jpg) `提示` 如果您迫切需要恢复受损的当前联机重做日志文件中丢失的事务，请联系 Oracle 支持服务以探索所有选项。\n\
    \n# 总结\n\n理解如何处理联机重做日志故障至关重要。Oracle 没有提供在联机重做日志发生介质故障时自动修复问题的方法。因此，了解如何诊断和解决出现的任何问题非常重要。联机重做日志的故障很少见，但当它们确实发生时，您现在将能更好地做好准备，以高效有效地解决任何复杂情况。\n\
    \n# 第 8 章\n\n![image](img/frontdot.jpg)\n\n# 数据泵\n\n数据泵通常被描述为旧版 `exp`/`imp` 实用程序的升级版本。这种描述并不准确；这有点像把现代智能手机称为老式转盘拨号座机的替代品。虽然旧版实用程序可靠且运行良好，但数据泵不仅涵盖了那些功能，还为数据在环境之间的抽取和移动增添了全新的维度。本章将帮助解释数据泵如何使您当前的数据传输任务更轻松，并将展示如何以您未曾想过的方式移动信息和解决问题。\n\
    \n数据泵使您能够高效地备份、复制、保护和转换大量数据和元数据。您可以通过多种方式使用数据泵：\n\n*   对整个数据库或部分数据执行时间点逻辑备份\n\
    *   为测试或开发复制整个数据库或部分数据\n*   快速生成重新创建对象所需的 DDL\n*   通过从旧版本导出并导入到新版本来升级数据库\n"
- fmt: 'Sometimes, DBAs exert a Luddite-like attachment to the `exp`/`imp` utilities
    because the DBAs are familiar with the syntax of these utilities, and they get
    the job done quickly. Even if those legacy utilities are easy to use, you should
    consider using Data Pump going forward. Data Pump contains substantial functionality
    over the old `exp`/`imp` utilities:


    *   Performance with large data sets, allowing efficient export and import gigabytes
    of data

    *   Interactive command line utility, which lets you disconnect and then later
    attach to active Data Pump jobs

    *   Ability to export large amounts of data from a remote database and import
    them directly into a local database without creating a dump file

    *   Ability to make on-the-fly changes to schemas, tablespaces, data files, and
    storage settings from export to import

    *   Sophisticated filtering of objects and data

    *   Security-controlled (via database) directory objects

    *   Advanced features, such as compression and encryption


    This chapter begins with a discussion on the Data Pump architecture. Subsequent
    topics include basic export and import tasks, moving data across networks, filtering
    data, and running Data Pump in legacy mode.


    ## Data Pump Architecture


    Data Pump consists of the following components:


    *   `expdp` (Data Pump export utility)

    *   `impdp` (Data Pump import utility)

    *   `DBMS_DATAPUMP` PL/SQL package (Data Pump application programming interface
    [API])

    *   `DBMS_METADATA` PL/SQL package (Data Pump Metadata API)


    The `expdp` and `impdp` utilities use the `DBMS_DATAPUMP` and `DBMS_METADATA`
    built-in PL/SQL packages when exporting and importing data and metadata. The `DBMS_DATAPUMP`
    package moves entire databases or subsets of data between database environments.
    The `DBMS_METADATA` package exports and imports information about database objects.


    ![Image](images/sq.jpg) Note: You can call the `DBMS_DATAPUMP` and `DBMS_METADATA`
    packages independently (outside `expdp` and `impdp`) from SQL*Plus. I rarely call
    these packages directly from SQL*Plus, but you may have a specific scenario in
    which it’s desirable to interact directly with them. See the *Oracle Database
    PL/SQL Packages and Types Reference Guide*, which is available for download from
    the Technology Network area of the Oracle Web site (`http://otn.oracle.com`),
    for more details.


    ### Master and Worker Processes


    When you start a Data Pump export or import job, a master OS process is initiated
    on the database server. This master process name has the format `ora_dmNN_<SID>`.
    On Linux/Unix systems, you can view this process from the OS prompt using the
    `ps` command:

    ```

    $ ps -ef | grep -v grep | grep ora_dm

    oracle   14602      1  4 08:59 ?        00:00:03 ora_dm00_O12C

    ```

    Depending on the degree of parallelism and the work specified, a number of worker
    processes are also started. If no parallelism is specified, then only one worker
    process is started. The master process coordinates the work between master and
    worker processes. The worker process names have the format `ora_dwNN_<SID>`.


    ### Status Table


    When a user starts an export or import job, a database status table is created
    (owned by the user that starts the job). This table exists only for the duration
    of the Data Pump job. The name of the status table is dependent on what type of
    job you’re running. The table is named with the format `SYS_<OPERATION>_<JOB_MODE>_NN`,
    where `OPERATION` is either `EXPORT` or `IMPORT`. `JOB_MODE` can be one of the
    following types:


    *   `FULL`

    *   `SCHEMA`

    *   `TABLE`

    *   `TABLESPACE`

    *   `TRANSPORTABLE`


    For example, if you’re exporting a schema, a table is created in your account
    with the name `SYS_EXPORT_SCHEMA_NN`, where `NN` is a number that makes the table
    name unique in the user’s schema. This status table contains information such
    as the objects exported/imported, start time, elapsed time, rows, and error count.
    The status table has more than 80 columns.


    ![Image](images/sq.jpg) Tip: The Data Pump status table is created in the default
    permanent tablespace of the user performing the export/import. Therefore, if the
    user has no privileges to create a table in the default tablespace, the Data Pump
    job will fail, with an `ORA-31633` error.


    The status table is dropped by Data Pump upon successful completion of an export
    or import job. If you use the `KILL_JOB` interactive command, the master table
    is also dropped. If you stop a job with the `STOP_JOB` interactive command, the
    table isn’t removed and is used in the event you restart the job.


    If your job terminates abnormally, the master table is retained. You can delete
    the status table if you don’t plan to restart the job.


    ### Directory Objects


    When Data Pump runs, it uses a database directory object to determine where to
    write and read dump files and log files. Usually, you specify which directory
    object you want Data Pump to use. If you don’t specify a directory object, a default
    directory is used. The default directory path is defined by a data directory object
    named `DATA_PUMP_DIR`. This directory object is automatically created when the
    database is first created. On Linux/Unix systems this directory object maps to
    the `ORACLE_HOME/rdbms/log` directory.


    A Data Pump export creates an export file and a log file. The export file contains
    the objects being exported. The log file contains a record of the job activities.
    [Figure 8-1](#9781484207642_Ch08.xhtml#Fig1) shows the architectural components
    related to a Data Pump export job.


    ![9781484207642_Fig08-01.jpg](images/9781484207642_Fig08-01.jpg)


    [Figure 8-1](#9781484207642_Ch08.xhtml#_Fig1). Data Pump export job components


    Similarly, [Figure 8-2](#9781484207642_Ch08.xhtml#Fig2) displays the architectural
    components of a Data Pump import job. The main difference between export and import
    is the direction in which the data flow. Export writes data out of the database,
    and import brings information into the database. Refer back to these diagrams
    as you work through Data Pump examples and concepts throughout this chapter.


    ![9781484207642_Fig08-02.jpg](images/9781484207642_Fig08-02.jpg)


    [Figure 8-2](#9781484207642_Ch08.xhtml#_Fig2). Data Pump import job components


    For each Data Pump job, you must ensure that you have access to a directory object.
    The basics of exporting and importing are described in the next few sections.'
