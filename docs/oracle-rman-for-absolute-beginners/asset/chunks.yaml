    Here is some sample output:


    ```

    SESSION_RECID COMPRESSION_RATIO TIME_TAKEN_DISPLAY      HOURS END_TIME

    ------------- ----------------- -------------------- -------- ------------------------

                3        2.03556203 00:00:18                  .00 28-sep-14 11:03

                6        7.81358269 00:00:25                  .01 28-sep-14 11:06

               14        10.7638918 00:00:19                  .01 28-sep-14 11:07

    ```


    The contents of `V$RMAN_BACKUP_JOB_DETAILS` are summarized by a session connection
    to RMAN. Therefore, the report output is more accurate if you connect to RMAN
    (establishing a session) and then exit out of RMAN after the backup job is complete.
    If you remain connected to RMAN while running multiple backup jobs, the query
    output reports on all backup activity while connected (for that session).


    You should have an automated method of detecting whether or not RMAN backups are
    running and if data files are being backed up. One reliable method of automating
    such a task is to embed SQL into a shell script and then run the script on a periodic
    basis from a scheduling utility such as `cron`.


    I typically run two basic types of checks regarding the RMAN backups:


    *   Have the RMAN backups run recently?

    *   Are there any data files that have not been backed up recently?


    The following shell script checks for these conditions. You’ll need to modify
    the script and provide it with a username and password for a user that can query
    the data dictionary objects referenced in the script and also change the e-mail
    address of where messages are sent. When running the script, you’ll need to pass
    in two variables: the Oracle SID and the threshold number of past days that you
    want to check for the last time the backups ran or for when a data file was backed
    up.


    ```

    #!/bin/bash

    #

    if [ $# -ne 2 ]; then

      echo "Usage: $0 SID threshold"

      exit 1

    fi

    # source oracle OS variables

    export ORACLE_SID=O12C

    export ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1

    export PATH=$PATH:$ORACLE_HOME/bin

    crit_var=$(sqlplus -s <<EOF

    / as sysdba

    SET HEAD OFF FEEDBACK OFF

    SELECT COUNT(*) FROM

    (SELECT (sysdate - MAX(end_time)) delta

     FROM v\$rman_backup_job_details) a

    WHERE a.delta > $2;

    EOF)

    #

    if [ $crit_var -ne 0 ]; then

      echo "rman backups not running on $1" | mailx -s "rman problem" dkuhn@gmail.com

    else

      echo "rman backups ran ok"

    fi

    #--------------------------------------------

    crit_var2=$(sqlplus -s <<EOF

    / as sysdba

    SET HEAD OFF FEEDBACK OFF

    SELECT COUNT(*)

    FROM

    (

    SELECT name

    FROM v\$datafile

    MINUS

    SELECT DISTINCT

     f.name

    FROM v\$backup_datafile d

        ,v\$datafile        f

    WHERE d.file#     = f.file#

    AND   d.completion_time > sysdate - $2);

    EOF)

    #

    if [ $crit_var2 -ne 0 ]; then

      echo "datafile not backed up on $1" | mailx -s "backup problem" dkuhn@gmail.com

    else

      echo "datafiles are backed up..."

    fi

    #

    exit 0

    ```


    For example, to check if backups have been running successfully within the past
    2 days, run the script (named `rman_chk.bsh`):


    ```

    $ rman_chk.bsh O12c 2

    ```


    The prior script is basic but effective. You can enhance it as required for your
    RMAN environment.


    Summary


    RMAN offers many flexible and feature-rich options for backups. By default, RMAN
    backs up only blocks that have been modified in the database. The incremental
    features allow you to back up only blocks that have been modified since the last
    backup. These incremental features are particularly useful in reducing the size
    of backups in large database environments,  in which only a small percentage of
    data in the database changes from one backup to the next.


    You can instruct RMAN to back up every block in each data file via an image copy.
    An image copy is a block-for-block identical copy of the data file. Image copies
    have the advantage of being able to restore the backup files directly from the
    backup (without using RMAN). You can use the incrementally updated backup feature
    to implement an efficient hybrid of image copy backups and incremental backups.


    RMAN contains built-in commands for reporting on many aspects of backups. The
    `LIST` command reports on backup activity. The `REPORT` command is useful for
    determining which files need to be backed up, as dictated by the retention policy.


    After you’ve successfully configured RMAN and created backups, you are in a position
    to be able to restore and recover your database in the event of a media failure.
    Restore and recovery topics are detailed in the next chapter.


    CHAPTER 6


    ![image](images/frontdot.jpg)


    RMAN Restore and Recovery


    A couple of years ago, I was out on a long Saturday morning bike ride. About halfway
    through the ride, my cell phone rang. It was one of the data center operational
    support technicians. He told me that a mission critical database server was acting
    strange and that I should log in as soon as possible and make sure things were
    okay. I told him that I was about 15 minutes from being able to log in. So, I
    scurried home as fast as I could to check out the production box. When I got home
    and logged in to the database server, I tried to start SQL*Plus and immediately
    got an error indicating that the SQL*Plus binary file had corruption. Great. I
    couldn’t even log in to SQL*Plus. This was not good.


    ![Image](images/sq.jpg) **Mental Note**  Ensure that all bicycle rides are taken
    out of range of cell phone coverage. – Ed.


    I had the SA restore the Oracle binaries from an OS backup. I started SQL*Plus.
    The database had crashed, so I attempted to start it. The output indicated that
    there was a media failure with all the data files. After some analysis it was
    discovered that there had been some filesystem issues and that all these files
    on disk were corrupt:


    *   Data files

    *   Control files

    *   Archive redo logs

    *   Online redo log files

    *   RMAN backup pieces


    This was almost a total disaster. My director asked about our options. I responded,
    “All we have to do is restore the database from our last tape backup, and we’ll
    lose whatever data are in archive redo logs that haven’t been backed up to tape
    yet.”


    The storage administrators were called in and instructed to restore the last set
    of RMAN backups that had been written to tape. About 15 minutes later, we could
    hear the tape guys talking to each other in hushed voices. One of them said, “We
    are sooooo hosed. We don’t have any tape backups of RMAN for any databases on
    this box.”


    That was a dark moment. The worst case scenario was to rebuild the database from
    DDL scripts and lose 3 years of production data. Not a very palatable option.


    After looking around the production box, I discovered that the prior production
    support DBA (who, ironically, had just been let go a few days before, owing to
    budget cuts) had implemented a job to copy the RMAN backups to another server
    in the production environment. The RMAN backups on this other server were intact.
    I was able to restore and recover the production database from these backups.
    We lost about a day’s worth of data (between corrupt archive logs and downtime,
    in which no incoming transactions were allowed), but we were able to get the database
    restored and recovered approximately 20 hours after the initial phone call. That
    was a long day.


    Most situations in which you need to restore and recover will not be as bad as
    the one just described. However, the previous scenario does highlight the need
    for


    *   a backup strategy

    *   a DBA with B&R skills

    *   a restore-and-recovery strategy, including a requirement to test the restore
    and recovery periodically'
  trans: "# RMAN 备份与恢复\n\n以下是 SQL\\*Plus 中用于格式化 RMAN 备份报告查询输出的命令：\n\n```\nCOL hours\
    \              FORM 9999.99\nCOL time_taken_display FORM a20\nSET LINESIZE 132\n\
    --\nSELECT\n session_recid\n,compression_ratio\n,time_taken_display\n,(end_time\
    \ - start_time) * 24 as hours\n,TO_CHAR(end_time,'dd-mon-yy hh24:mi') as end_time\n\
    FROM v$rman_backup_job_details\nORDER BY end_time;\n```\n\n以下是一些示例输出：\n\n```\n\
    SESSION_RECID COMPRESSION_RATIO TIME_TAKEN_DISPLAY      HOURS END_TIME\n-------------\
    \ ----------------- -------------------- -------- ------------------------\n \
    \           3        2.03556203 00:00:18                  .00 28-sep-14 11:03\n\
    \            6        7.81358269 00:00:25                  .01 28-sep-14 11:06\n\
    \           14        10.7638918 00:00:19                  .01 28-sep-14 11:07\n\
    ```\n\n`V$RMAN_BACKUP_JOB_DETAILS` 的内容是按 RMAN 的会话连接进行汇总的。因此，如果你连接到 RMAN（建立一个会话），然后在备份作业完成后退出\
    \ RMAN，报告输出会更准确。如果你在运行多个备份作业时保持连接到 RMAN，查询输出会报告该会话连接期间的所有备份活动。\n\n你应该有一个自动化的方法来检测\
    \ RMAN 备份是否正在运行以及数据文件是否正在被备份。自动化此类任务的一个可靠方法是将 SQL 嵌入到 shell 脚本中，然后使用像 `cron` 这样的调度工具定期运行该脚本。\n\
    \n关于 RMAN 备份，我通常进行两种基本类型的检查：\n\n*   RMAN 备份最近运行过吗？\n*   是否有任何数据文件最近没有被备份？\n\n\
    以下 shell 脚本检查这些情况。你需要修改脚本，为其提供一个能够查询脚本中引用的数据字典对象的用户的用户名和密码，并更改消息发送到的电子邮件地址。运行脚本时，你需要传入两个变量：Oracle\
    \ SID 和你想检查的备份上次运行或数据文件被备份的天数阈值。\n\n```\n#!/bin/bash\n#\nif [ $# -ne 2 ]; then\n\
    \  echo \"Usage: $0 SID threshold\"\n  exit 1\nfi\n# source oracle OS variables\n\
    export ORACLE_SID=O12C\nexport ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1\n\
    export PATH=$PATH:$ORACLE_HOME/bin\ncrit_var=$(sqlplus -s <<EOF\n/ as sysdba\n\
    SET HEAD OFF FEEDBACK OFF\nSELECT COUNT(*) FROM\n(SELECT (sysdate - MAX(end_time))\
    \ delta\n FROM v\\$rman_backup_job_details) a\nWHERE a.delta > $2;\nEOF)\n#\n\
    if [ $crit_var -ne 0 ]; then\n  echo \"rman backups not running on $1\" | mailx\
    \ -s \"rman problem\" dkuhn@gmail.com\nelse\n  echo \"rman backups ran ok\"\n\
    fi\n#--------------------------------------------\ncrit_var2=$(sqlplus -s <<EOF\n\
    / as sysdba\nSET HEAD OFF FEEDBACK OFF\nSELECT COUNT(*)\nFROM\n(\nSELECT name\n\
    FROM v\\$datafile\nMINUS\nSELECT DISTINCT\n f.name\nFROM v\\$backup_datafile d\n\
    \    ,v\\$datafile        f\nWHERE d.file#     = f.file#\nAND   d.completion_time\
    \ > sysdate - $2);\nEOF)\n#\nif [ $crit_var2 -ne 0 ]; then\n  echo \"datafile\
    \ not backed up on $1\" | mailx -s \"backup problem\" dkuhn@gmail.com\nelse\n\
    \  echo \"datafiles are backed up...\"\nfi\n#\nexit 0\n```\n\n例如，要检查备份在过去 2 天内是否成功运行，请运行该脚本（名为\
    \ `rman_chk.bsh`）：\n\n```\n$ rman_chk.bsh O12c 2\n```\n\n前面的脚本是基础的，但很有效。你可以根据你的\
    \ RMAN 环境需要对其进行增强。\n\n## 总结\n\nRMAN 为备份提供了许多灵活且功能丰富的选项。默认情况下，RMAN 仅备份数据库中已修改的块。增量功能允许你仅备份自上次备份以来修改过的块。这些增量功能在大型数据库环境中特别有用，可以减少备份的大小，因为这类环境中数据库中只有很小比例的数据在每次备份之间发生变化。\n\
    \n你可以指示 RMAN 通过映像副本备份每个数据文件中的每个块。映像副本是数据文件逐块相同的副本。映像副本的优点是能够直接从备份中恢复备份文件（无需使用\
    \ RMAN）。你可以使用增量更新备份功能来实现映像副本备份和增量备份的有效混合。\n\nRMAN 包含用于报告备份许多方面的内置命令。`LIST` 命令报告备份活动。`REPORT`\
    \ 命令对于根据保留策略确定哪些文件需要备份非常有用。\n\n在你成功配置 RMAN 并创建备份之后，你就可以在发生介质故障时恢复和恢复你的数据库。恢复和恢复的主题将在下一章详细说明。\n\
    \n# 第六章\n\n![image](img/frontdot.jpg)\n\n## RMAN 恢复与恢复\n\n几年前的一个周六早上，我正在进行一次长距离骑行。大约骑到一半时，我的手机响了。是数据中心的一个运维支持技术员。他告诉我一个关键业务数据库服务器行为异常，我应该尽快登录并确保一切正常。我告诉他，我大约\
    \ 15 分钟后才能登录。于是，我尽可能快地赶回家检查那台生产机器。当我回到家登录到数据库服务器时，我尝试启动 SQL\\*Plus，却立即收到一个错误，提示\
    \ SQL\\*Plus 二进制文件已损坏。太好了。我甚至无法登录 SQL\\*Plus。这可不妙。\n\n![Image](img/sq.jpg)  **切记**\
    \  确保所有的自行车骑行都在手机信号覆盖范围之外进行。 – 编者注。\n\n我让系统管理员从操作系统备份中恢复了 Oracle 二进制文件。我启动了 SQL\\\
    *Plus。数据库已经崩溃，所以我尝试启动它。输出表明所有数据文件都存在介质故障。经过一些分析，发现之前存在一些文件系统问题，磁盘上的所有这些文件都已损坏：\n\
    \n*   数据文件\n*   控制文件\n*   归档重做日志\n*   在线重做日志文件\n*   RMAN 备份片\n\n这几乎是一场彻底的灾难。我的总监询问我们的选择。我回答说：“我们所要做的就是从上次的磁带备份中恢复数据库，我们将丢失那些尚未备份到磁带的归档重做日志中所包含的任何数据。”\n\
    \n存储管理员被召集进来，并被指示恢复最后写入磁带的一组 RMAN 备份。大约 15 分钟后，我们可以听到磁带管理员们在低声交谈。其中一人说：“我们完蛋了。这台机器上任何数据库的\
    \ RMAN 磁带备份都没有。”\n\n那是一个黑暗的时刻。最坏的情况是从 DDL 脚本重建数据库并丢失 3 年的生产数据。这不是一个非常容易接受的选项。\n\
    \n在检查了生产机器之后，我发现之前的支持 DBA（讽刺的是，他几天前刚因预算削减被解雇）实现了一个作业，将 RMAN 备份复制到生产环境中的另一台服务器上。那台其他服务器上的\
    \ RMAN 备份是完好无损的。我能够从这些备份中恢复和恢复生产数据库。我们丢失了大约一天的数据（在损坏的归档日志和停机期间，期间不允许传入事务），但在最初的电话呼叫大约\
    \ 20 小时后，我们成功地恢复并恢复了数据库。那是漫长的一天。\n\n大多数需要你进行恢复和恢复的情况都不会像刚才描述的那么糟糕。然而，前面的场景确实凸显了对以下内容的需求：\n\
    \n*   一个备份策略\n*   一个具备 B&R 技能的 DBA\n*   一个恢复与恢复策略，包括定期测试恢复和恢复的要求"
- fmt: "# 通过 RMAN 执行恢复与修复\n\n本章将引导你使用 RMAN 完成恢复与修复操作。本章涵盖了处理介质故障时需要执行的许多常见任务。\n\n\
    ## 确定是否需要介质恢复\n\n术语**介质恢复**是指恢复因底层存储介质（通常是某种磁盘）故障或文件被意外删除而丢失或损坏的文件。通常，你会通过类似以下的错误得知需要介质恢复：\n\
    \n```\nORA-01157: cannot identify/lock data file 1 - see DBWR trace file\nORA-01110:\
    \ data file 1: '/u01/dbfile/O12C/system01.dbf'\n```\n\n在执行数据库管理任务（如停止和启动数据库）时，此错误可能会显示在屏幕上。或者，你可能会在跟踪文件或\
    \ `alert.log` 文件中看到此类错误。如果你没有立即注意到问题，在严重的介质故障情况下，数据库将停止处理事务，用户就会开始给你打电话。\n\n要理解\
    \ Oracle 如何确定需要介质恢复，你必须首先理解 Oracle 如何确定一切正常。当 Oracle 正常关闭（`IMMEDIATE`、`TRANSACTIONAL`、`NORMAL`）时，关闭过程的一部分是将所有已修改的块（在内存中）刷新到磁盘，在每个数据文件的头部标记当前的系统变更号（SCN），并用当前\
    \ SCN 信息更新控制文件。\n\n启动时，Oracle 会检查控制文件中的 SCN 是否与数据文件头部的 SCN 匹配。如果匹配，Oracle 尝试打开数据文件和在线重做日志文件。如果所有文件都可用且可以打开，Oracle\
    \ 将正常启动。以下查询比较了控制文件中（针对每个数据文件）的 SCN 与数据文件头部中的 SCN：\n\n```\nSET LINES 132\nCOL\
    \ name             FORM a40\nCOL status           FORM A8\nCOL file#         \
    \   FORM 9999\nCOL control_file_SCN FORM 999999999999999\nCOL datafile_SCN   \
    \  FORM 999999999999999\n--\nSELECT\n a.name\n,a.status\n,a.file#\n,a.checkpoint_change#\
    \ control_file_SCN\n,b.checkpoint_change# datafile_SCN\n,CASE\n   WHEN ((a.checkpoint_change#\
    \ - b.checkpoint_change#) = 0) THEN 'Startup Normal'\n   WHEN ((b.checkpoint_change#)\
    \ = 0)                        THEN 'File Missing?'\n   WHEN ((a.checkpoint_change#\
    \ - b.checkpoint_change#) > 0) THEN 'Media Rec. Req.'\n   WHEN ((a.checkpoint_change#\
    \ - b.checkpoint_change#) < 0) THEN 'Old Control File'\n   ELSE 'what the ?'\n\
    \ END datafile_status\nFROM v$datafile        a -- control file SCN for datafile\n\
    \    ,v$datafile_header b -- datafile header SCN\nWHERE a.file# = b.file#\nORDER\
    \ BY a.file#;\n```\n\n如果控制文件 SCN 值大于数据文件 SCN 值，则很可能需要介质恢复。如果你从备份中还原了数据文件，并且还原的数据文件中的\
    \ SCN 小于当前控制文件中数据文件的 SCN，就会出现这种情况。\n\n![Image](images/sq.jpg) **提示** `V$DATAFILE_HEADER`\
    \ 视图使用磁盘上的物理数据文件作为其源。`V$DATAFILE` 视图使用控制文件作为其源。\n\n你也可以直接查询 `V$DATAFILE_HEADER`\
    \ 以获取更多信息。`ERROR` 和 `RECOVER` 列报告任何潜在问题。例如，`RECOVER` 列中的 `YES` 或 `null` 值表示存在问题：\n\
    \n```\nSQL> select file#, status, error, recover from v$datafile_header;\n```\n\
    \n以下是一些示例输出：\n\n```\n     FILE# STATUS  ERROR                REC\n---------- -------\
    \ -------------------- ---\n         1 ONLINE  FILE NOT FOUND\n         2 ONLINE\
    \                       NO\n         3 ONLINE                       NO\n```\n\n\
    ## 确定要恢复的内容\n\n介质恢复需要你执行手动任务以使数据库恢复完整。这些任务通常涉及 `RESTORE` 和 `RECOVER` 命令的组合使用。如果由于某种原因（文件被意外删除、磁盘故障等）导致数据文件发生介质故障，你将需要发出\
    \ RMAN `RESTORE` 命令。\n\n### 流程工作原理\n\n当你发出 `RESTORE` 命令时，RMAN 会自动决定如何从以下任何可用备份中提取数据文件：\n\
    \n*   完全数据库备份\n*   增量级别 0 备份\n*   由 `BACKUP AS COPY` 命令生成的映像副本备份\n\n文件从备份中还原后，你需要通过\
    \ `RECOVER` 命令对其应用重做。当你发出 `RECOVER` 命令时，Oracle 会检查受影响数据文件中的 SCN，并确定其中任何文件是否需要恢复。如果数据文件中的\
    \ SCN 小于控制文件中对应的 SCN，则将需要介质恢复。\n\nOracle 检索数据文件 SCN，然后在重做流中查找对应的 SCN，以确定从何处开始恢复过程。如果起始恢复\
    \ SCN 在线重做日志文件中，则不需要归档重做日志文件进行恢复。\n\n在恢复期间，RMAN 会自动确定如何应用重做。首先，RMAN 应用任何大于级别 0\
    \ 的可用增量备份，例如增量级别 1。接下来，应用磁盘上的任何归档重做日志文件。如果归档重做日志文件在磁盘上不存在，RMAN 会尝试从备份集中检索它们。\n\
    \n要能够执行完全恢复，需要满足以下所有条件：\n\n*   你的数据库处于归档日志模式。\n*   你拥有数据库的良好基线备份。\n*   你拥有自备份以来生成的任何所需重做（归档重做日志文件、在线重做日志文件，或\
    \ RMAN 可以用于恢复而不是应用重做的增量备份）。\n\n存在多种多样的恢复场景。你如何恢复直接取决于你的备份策略以及哪些文件已损坏。以下是面对介质故障时应遵循的一般步骤：\n\
    \n1.  确定需要还原的文件。\n2.  根据损坏情况，将数据库模式设置为 `nomount`、`mount` 或 `open`。\n3.  使用 `RESTORE`\
    \ 命令从 RMAN 备份中检索文件。\n4.  对需要恢复的数据文件使用 `RECOVER` 命令。\n5.  打开你的数据库。\n\n你特定的恢复场景可能不需要执行所有上述步骤。例如，你可能只想还原\
    \ `spfile`，这就不需要恢复步骤。\n\n恢复过程的第一步是确定哪些文件经历了介质故障。你通常可以从以下来源确定需要还原的文件：\n\n*   屏幕上显示的错误消息，来自\
    \ RMAN 或 SQL*Plus\n*   `Alert.log` 文件及相应的跟踪文件\n*   数据字典视图\n\n如果你使用的是 Oracle 11g\
    \ 或更高版本，除了前面列出的方法外，你应考虑使用数据恢复顾问来获取有关故障范围及相应纠正措施的信息。\n\n## 使用数据恢复顾问\n\n数据恢复顾问工具在\
    \ Oracle 11g 中引入。在发生介质故障时，此工具将显示故障详情、建议纠正措施，并在你指定时执行建议的措施。这就像在恢复情况下拥有另一双眼睛提供反馈一样。数据恢复顾问有四种模式：\n\
    \n*   列出故障\n*   建议纠正措施\n*   运行命令修复故障\n*   更改故障状态\n\n数据恢复顾问从 RMAN 中调用。你可以将数据恢复顾问视为一组在处理介质故障时可以协助你的\
    \ RMAN 命令。\n\n### 列出故障\n\n使用数据恢复顾问时，`LIST FAILURE` 命令用于显示数据文件、控制文件或在线重做日志的任何问题：\n\
    \n```\nRMAN> list failure;\n```"
  raw: 'This chapter walks you through restore and recovery, using RMAN. The chapter
    covers many of the common tasks you will have to perform when dealing with media
    failures.


    Determining if Media Recovery Is Required


    The term media recovery means the restoration of files that have been lost or
    damaged, owing to the failure of the underlying storage media (usually a disk
    of some sort) or accidental removal of files. Usually, you know that media recovery
    is required through an error such as the following:


    ```

    ORA-01157: cannot identify/lock data file 1 - see DBWR trace file

    ORA-01110: data file 1: ''/u01/dbfile/O12C/system01.dbf''

    ```


    The error may be displayed on your screen when performing DBA tasks, such as stopping
    and starting the database. Or, you might see such an error in a trace file or
    the `alert.log` file. If you don’t notice the issue right away, with a severe
    media failure, the database will stop processing transactions, and users will
    start calling you.


    To understand how Oracle determines that media recovery is required, you must
    first understand how Oracle determines that everything is okay. When Oracle shuts
    down normally (`IMMEDIATE`, `TRANSACTIONAL`, `NORMAL`), part of the shutdown process
    is to flush all modified blocks (in memory) to disk, mark the header of each data
    file with the current SCN, and update the control file with the current SCN information.


    Upon startup, Oracle checks to see if the SCN in the control file matches the
    SCN in the header of the data files. If there is a match, then Oracle attempts
    to open the data files and online redo log files. If all files are available and
    can be opened, Oracle starts normally. The following query compares the SCN in
    the control file (for each data file) with the SCN in the data file header:


    ```

    SET LINES 132

    COL name             FORM a40

    COL status           FORM A8

    COL file#            FORM 9999

    COL control_file_SCN FORM 999999999999999

    COL datafile_SCN     FORM 999999999999999

    --

    SELECT

     a.name

    ,a.status

    ,a.file#

    ,a.checkpoint_change# control_file_SCN

    ,b.checkpoint_change# datafile_SCN

    ,CASE

       WHEN ((a.checkpoint_change# - b.checkpoint_change#) = 0) THEN ''Startup Normal''

       WHEN ((b.checkpoint_change#) = 0)                        THEN ''File Missing?''

       WHEN ((a.checkpoint_change# - b.checkpoint_change#) > 0) THEN ''Media Rec.
    Req.''

       WHEN ((a.checkpoint_change# - b.checkpoint_change#) < 0) THEN ''Old Control
    File''

       ELSE ''what the ?''

     END datafile_status

    FROM v$datafile        a -- control file SCN for datafile

        ,v$datafile_header b -- datafile header SCN

    WHERE a.file# = b.file#

    ORDER BY a.file#;

    ```


    If the control file SCN values are greater than the data file SCN values, then
    media recovery is most likely required. This would be the case if you restored
    a data file from a backup, and the SCN in the restored data file had an SCN less
    than the data file in the current control file.


    ![Image](images/sq.jpg) **Tip**  The `V$DATAFILE_HEADER` view uses the physical
    data file on disk as its source. The `V$DATAFILE` view uses the control file as
    its source.


    You can also directly query the `V$DATAFILE_HEADER` for more information. The
    `ERROR` and `RECOVER` columns report any potential problems. For example, a `YES`
    or `null` value in the `RECOVER` column indicates that there is a problem:


    ```

    SQL> select file#, status, error, recover from v$datafile_header;

    ```


    Here is some sample output:


    ```

         FILE# STATUS  ERROR                REC

    ---------- ------- -------------------- ---

             1 ONLINE  FILE NOT FOUND

             2 ONLINE                       NO

             3 ONLINE                       NO

    ```


    Determining What to Restore


    Media recovery requires that you perform manual tasks to get your database back
    in one piece. These tasks usually involve a combination of `RESTORE` and `RECOVER`
    commands. You will have to issue an RMAN `RESTORE` command if, for some reason
    (accidental deleting of files, disk failure, and so on), your data files have
    experienced media failure.


    How the Process Works


    When you issue the `RESTORE` command, RMAN automatically decides how to extract
    the data files from any of the following available backups:


    *   Full database backup

    *   Incremental level-0 backup

    *   Image copy backup generated by `BACKUP AS COPY` command


    After the files are restored from a backup, you are required to apply redo to
    them via the `RECOVER` command. When you issue the `RECOVER` command, Oracle examines
    the SCNs in the affected data files and determines whether any of them need to
    be recovered. If the SCN in the data file is less than the corresponding SCN in
    the control file, then media recovery will be required.


    Oracle retrieves the data file SCN and then looks for the corresponding SCN in
    the redo stream to establish where to start the recovery process. If the starting
    recovery SCN is in the online redo log files, the archived redo log files are
    not required for recovery.


    During a recovery, RMAN automatically determines how to apply redo. First, RMAN
    applies any incremental backups available that are greater than level 0, such
    as the incremental level 1\. Next, any archived redo log files on disk are applied.
    If the archived redo log files do not exist on disk, RMAN attempts to retrieve
    them from a backup set.


    To be able to perform a complete recovery, all the following conditions need to
    be true:


    *   Your database is in archivelog mode.

    *   You have a good baseline backup of your database.

    *   You have any required redo that has been generated since the backup (archived
    redo log files, online redo log files, or incremental backups that RMAN can use
    for recovery instead of applying redo).


    There are a wide variety of restore-and-recovery scenarios. How you restore and
    recover depends directly on your backup strategy and which files have been damaged.
    Listed next are the general steps to follow when facing a media failure:


    1.  Determine which files need to be restored.

    2.  Depending on the damage, set your database mode to nomount, mount, or open.

    3.  Use the `RESTORE` command to retrieve files from RMAN backups.

    4.  Use the `RECOVER` command for data files requiring recovery.

    5.  Open your database.


    Your particular restore-and-recovery scenario may not require that all the previous
    steps be performed. For instance, you may just want to restore your `spfile`,
    which doesn’t require a recovery step.


    The first step in the restore-and-recovery process is to determine which files
    have experienced media failure. You can usually determine which files need to
    be restored from the following sources:


    *   Error messages displayed on your screen, either from RMAN or SQL*Plus

    *   `Alert.log` file and corresponding trace files

    *   Data dictionary views


    If you’re using Oracle 11g or higher, then in addition to the previously listed
    methods, you should consider the Data Recovery Advisor for obtaining information
    about the extent of a failure and corresponding corrective action.


    Using Data Recovery Advisor


    The Data Recovery Advisor tool was introduced in Oracle 11g. In the event of a
    media failure, this tool will display the details of the failure, recommend corrective
    actions, and perform the recommended actions if you specify that it do so. It’s
    like having another set of eyes to provide feedback when in a restore-and-recovery
    situation. There are four modes to Data Recovery Advisor:


    *   Listing failures

    *   Suggesting corrective action

    *   Running commands to repair failures

    *   Changing the status of a failure


    The Data Recovery Advisor is invoked from RMAN. You can think of the Data Recovery
    Advisor as a set of RMAN commands that can assist you when dealing with media
    failure.


    Listing Failures


    When using the Data Recovery Advisor, the `LIST FAILURE` command is used to display
    any issues with the data files, control files, or online redo logs:


    ```

    RMAN> list failure;

    ```'
  trans: "\n# 通过 RMAN 执行恢复与修复\n\n本章将引导你使用 RMAN 完成恢复与修复操作。本章涵盖了处理介质故障时需要执行的许多常见任务。\n\
    \n## 确定是否需要介质恢复\n\n术语**介质恢复**是指恢复因底层存储介质（通常是某种磁盘）故障或文件被意外删除而丢失或损坏的文件。通常，你会通过类似以下的错误得知需要介质恢复：\n\
    \n```\nORA-01157: cannot identify/lock data file 1 - see DBWR trace file\nORA-01110:\
    \ data file 1: '/u01/dbfile/O12C/system01.dbf'\n```\n\n在执行数据库管理任务（如停止和启动数据库）时，此错误可能会显示在屏幕上。或者，你可能会在跟踪文件或\
    \ `alert.log` 文件中看到此类错误。如果你没有立即注意到问题，在严重的介质故障情况下，数据库将停止处理事务，用户就会开始给你打电话。\n\n要理解\
    \ Oracle 如何确定需要介质恢复，你必须首先理解 Oracle 如何确定一切正常。当 Oracle 正常关闭（`IMMEDIATE`、`TRANSACTIONAL`、`NORMAL`）时，关闭过程的一部分是将所有已修改的块（在内存中）刷新到磁盘，在每个数据文件的头部标记当前的系统变更号（SCN），并用当前\
    \ SCN 信息更新控制文件。\n\n启动时，Oracle 会检查控制文件中的 SCN 是否与数据文件头部的 SCN 匹配。如果匹配，Oracle 尝试打开数据文件和在线重做日志文件。如果所有文件都可用且可以打开，Oracle\
    \ 将正常启动。以下查询比较了控制文件中（针对每个数据文件）的 SCN 与数据文件头部中的 SCN：\n\n```\nSET LINES 132\nCOL\
    \ name             FORM a40\nCOL status           FORM A8\nCOL file#         \
    \   FORM 9999\nCOL control_file_SCN FORM 999999999999999\nCOL datafile_SCN   \
    \  FORM 999999999999999\n--\nSELECT\n a.name\n,a.status\n,a.file#\n,a.checkpoint_change#\
    \ control_file_SCN\n,b.checkpoint_change# datafile_SCN\n,CASE\n   WHEN ((a.checkpoint_change#\
    \ - b.checkpoint_change#) = 0) THEN 'Startup Normal'\n   WHEN ((b.checkpoint_change#)\
    \ = 0)                        THEN 'File Missing?'\n   WHEN ((a.checkpoint_change#\
    \ - b.checkpoint_change#) > 0) THEN 'Media Rec. Req.'\n   WHEN ((a.checkpoint_change#\
    \ - b.checkpoint_change#) < 0) THEN 'Old Control File'\n   ELSE 'what the ?'\n\
    \ END datafile_status\nFROM v$datafile        a -- control file SCN for datafile\n\
    \    ,v$datafile_header b -- datafile header SCN\nWHERE a.file# = b.file#\nORDER\
    \ BY a.file#;\n```\n\n如果控制文件 SCN 值大于数据文件 SCN 值，则很可能需要介质恢复。如果你从备份中还原了数据文件，并且还原的数据文件中的\
    \ SCN 小于当前控制文件中数据文件的 SCN，就会出现这种情况。\n\n![Image](img/sq.jpg) **提示** `V$DATAFILE_HEADER`\
    \ 视图使用磁盘上的物理数据文件作为其源。`V$DATAFILE` 视图使用控制文件作为其源。\n\n你也可以直接查询 `V$DATAFILE_HEADER`\
    \ 以获取更多信息。`ERROR` 和 `RECOVER` 列报告任何潜在问题。例如，`RECOVER` 列中的 `YES` 或 `null` 值表示存在问题：\n\
    \n```\nSQL> select file#, status, error, recover from v$datafile_header;\n```\n\
    \n以下是一些示例输出：\n\n```\n     FILE# STATUS  ERROR                REC\n---------- -------\
    \ -------------------- ---\n         1 ONLINE  FILE NOT FOUND\n         2 ONLINE\
    \                       NO\n         3 ONLINE                       NO\n```\n\n\
    ## 确定要恢复的内容\n\n介质恢复需要你执行手动任务以使数据库恢复完整。这些任务通常涉及 `RESTORE` 和 `RECOVER` 命令的组合使用。如果由于某种原因（文件被意外删除、磁盘故障等）导致数据文件发生介质故障，你将需要发出\
    \ RMAN `RESTORE` 命令。\n\n### 流程工作原理\n\n当你发出 `RESTORE` 命令时，RMAN 会自动决定如何从以下任何可用备份中提取数据文件：\n\
    \n*   完全数据库备份\n*   增量级别 0 备份\n*   由 `BACKUP AS COPY` 命令生成的映像副本备份\n\n文件从备份中还原后，你需要通过\
    \ `RECOVER` 命令对其应用重做。当你发出 `RECOVER` 命令时，Oracle 会检查受影响数据文件中的 SCN，并确定其中任何文件是否需要恢复。如果数据文件中的\
    \ SCN 小于控制文件中对应的 SCN，则将需要介质恢复。\n\nOracle 检索数据文件 SCN，然后在重做流中查找对应的 SCN，以确定从何处开始恢复过程。如果起始恢复\
    \ SCN 在线重做日志文件中，则不需要归档重做日志文件进行恢复。\n\n在恢复期间，RMAN 会自动确定如何应用重做。首先，RMAN 应用任何大于级别 0\
    \ 的可用增量备份，例如增量级别 1。接下来，应用磁盘上的任何归档重做日志文件。如果归档重做日志文件在磁盘上不存在，RMAN 会尝试从备份集中检索它们。\n\
    \n要能够执行完全恢复，需要满足以下所有条件：\n\n*   你的数据库处于归档日志模式。\n*   你拥有数据库的良好基线备份。\n*   你拥有自备份以来生成的任何所需重做（归档重做日志文件、在线重做日志文件，或\
    \ RMAN 可以用于恢复而不是应用重做的增量备份）。\n\n存在多种多样的恢复场景。你如何恢复直接取决于你的备份策略以及哪些文件已损坏。以下是面对介质故障时应遵循的一般步骤：\n\
    \n1.  确定需要还原的文件。\n2.  根据损坏情况，将数据库模式设置为 `nomount`、`mount` 或 `open`。\n3.  使用 `RESTORE`\
    \ 命令从 RMAN 备份中检索文件。\n4.  对需要恢复的数据文件使用 `RECOVER` 命令。\n5.  打开你的数据库。\n\n你特定的恢复场景可能不需要执行所有上述步骤。例如，你可能只想还原\
    \ `spfile`，这就不需要恢复步骤。\n\n恢复过程的第一步是确定哪些文件经历了介质故障。你通常可以从以下来源确定需要还原的文件：\n\n*   屏幕上显示的错误消息，来自\
    \ RMAN 或 SQL*Plus\n*   `Alert.log` 文件及相应的跟踪文件\n*   数据字典视图\n\n如果你使用的是 Oracle 11g\
    \ 或更高版本，除了前面列出的方法外，你应考虑使用数据恢复顾问来获取有关故障范围及相应纠正措施的信息。\n\n## 使用数据恢复顾问\n\n数据恢复顾问工具在\
    \ Oracle 11g 中引入。在发生介质故障时，此工具将显示故障详情、建议纠正措施，并在你指定时执行建议的措施。这就像在恢复情况下拥有另一双眼睛提供反馈一样。数据恢复顾问有四种模式：\n\
    \n*   列出故障\n*   建议纠正措施\n*   运行命令修复故障\n*   更改故障状态\n\n数据恢复顾问从 RMAN 中调用。你可以将数据恢复顾问视为一组在处理介质故障时可以协助你的\
    \ RMAN 命令。\n\n### 列出故障\n\n使用数据恢复顾问时，`LIST FAILURE` 命令用于显示数据文件、控制文件或在线重做日志的任何问题：\n\
    \n```\nRMAN> list failure;\n```\n"
- fmt: '![Image](images/sq.jpg) **Tip** 如果您怀疑存在介质故障，但数据恢复顾问（Data Recovery Advisor）并未报告任何问题，可以运行
    `VALIDATE DATABASE` 命令来验证数据库的完整性。


    如果没有检测到故障，您将看到一条消息，表明没有故障。以下是一些示例输出，表明数据文件可能存在问题：


    ```

    List of Database Failures

    =========================


    Failure ID Priority Status    Time Detected Summary

    ---------- -------- --------- ------------- -------

    6222       CRITICAL OPEN      12-JAN-14     System datafile 1:

     ''/u01/dbfile/O12C/system01.dbf'' is missing

    ```


    要显示有关故障的更多信息，请使用 `DETAIL` 子句：


    ```

    RMAN> list failure 6222 detail;

    ```


    以下是此示例的附加输出：


    ```

    Impact: Database cannot be opened

    ```


    对于此类故障，前面的输出表明数据库无法打开。


    **提出纠正措施**


    `ADVISE FAILURE` 命令提供有关如何恢复数据恢复顾问检测到的潜在问题的建议。如果数据库存在多个故障，您可以直接指定故障ID以获取针对特定故障的建议，如下所示：


    ```

    RMAN> advise failure 6222;

    ```


    以下是针对此特定问题的部分输出：


    ```

    Optional Manual Actions

    =======================

    1\. If file /u01/dbfile/O12C/system01.dbf was unintentionally renamed or moved,

    restore it


    Automated Repair Options

    ========================

    Option Repair Description

    ------ ------------------

    1      Restore and recover datafile 1

      Strategy: The repair includes complete media recovery with no data loss

      Repair script: /ora01/app/oracle/diag/rdbms/O12C/O12C/hm/reco_4116328280.hm

    ```


    在这种情况下，数据恢复顾问创建了一个可用于潜在修复问题的脚本。可以使用操作系统实用程序查看修复脚本的内容；例如，


    ```

    $ cat /ora01/app/oracle/diag/rdbms/O12C/O12C/hm/reco_4116328280.hm

    ```


    以下是此示例的脚本内容：


    ```

    # restore and recover datafile

    restore ( datafile 1 );

    recover datafile 1;

    sql ''alter database datafile 1 online'';

    ```


    检查脚本后，您可以决定手动运行建议的命令，也可以让数据恢复顾问通过 `REPAIR` 命令运行脚本（详见下一节）。


    **修复故障**


    如果您已识别故障并查看了建议，则可以继续进行修复工作。如果您想在不实际运行命令的情况下检查 `REPAIR FAILURE` 命令将执行的操作，请使用 `PREVIEW`
    子句：


    ```

    RMAN> repair failure preview;

    ```


    在运行 `REPAIR FAILURE` 命令之前，请确保您首先在同一连接会话中运行了 `LIST FAILURE` 和 `ADVISE FAILURE`
    命令。换句话说，您所在的RMAN会话必须在运行 `REPAIR` 命令之前，在同一会话中运行过 `LIST` 和 `ADVISE` 命令。


    如果您对修复建议满意，则运行 `REPAIR FAILURE` 命令：


    ```

    RMAN> repair failure;

    ```


    此时系统将提示您确认：


    ```

    Do you really want to execute the above repair (enter YES or NO)?

    ```


    输入 `YES` 以继续：


    ```

    YES

    ```


    如果一切顺利，您应该在输出中看到类似以下的最终消息：


    ```

    repair failure complete

    ```


    ![Image](images/sq.jpg) **Note** 您可以从RMAN命令提示符或Enterprise Manager运行数据恢复顾问命令。


    通过这种方式，您可以使用RMAN命令 `LIST FAILURE`、`ADVISE FAILURE` 和 `REPAIR FAILURE` 来解决介质故障。


    **更改故障状态**


    关于数据恢复顾问的最后一点说明：如果您知道有一个故障，并且它不是关键性的（例如，从一个不再使用的表空间中丢失了数据文件），那么可以使用 `CHANGE FAILURE`
    命令来更改故障的优先级。在此示例中，有一个属于非关键表空间的丢失数据文件。首先，通过 `LIST FAILURE` 命令获取故障优先级：


    ```

    RMAN> list failure;

    ```


    以下是一些示例输出：


    ```

    Failure ID Priority Status    Time Detected Summary

    ---------- -------- --------- ------------- -------

    5          HIGH     OPEN      12-JAN-14     One or more non-system datafiles

                                                are missing

    ```


    接下来，使用 `CHANGE FAILURE` 命令将优先级从 `HIGH` 更改为 `LOW`：


    ```

    RMAN> change failure 5 priority low;

    ```


    系统将提示您确认是否确实要更改优先级：


    ```

    Do you really want to change the above failures (enter YES or NO)?

    ```


    如果您确实要更改优先级，请键入 `YES`，然后按回车键。如果再次运行 `LIST FAILURE` 命令，您将看到优先级现已更改为 `LOW`：


    ```

    RMAN> list failure low;

    ```


    **使用RMAN停止/启动Oracle**


    您可以使用RMAN以几乎与SQL*Plus相同的方法来停止和启动数据库。在执行恢复和修复操作时，从RMAN内部停止和启动数据库通常更为方便。以下RMAN命令可用于停止和启动数据库：


    *   `SHUTDOWN`

    *   `STARTUP`

    *   `ALTER DATABASE`


    **关闭数据库**


    `SHUTDOWN` 命令在RMAN中的工作方式与在SQL*Plus中相同。有四种关闭类型：`ABORT`、`IMMEDIATE`、`NORMAL` 和 `TRANSACTIONAL`。我通常首先尝试使用
    `SHUTDOWN IMMEDIATE` 来停止数据库；如果这不起作用，请毫不犹豫地使用 `SHUTDOWN ABORT`。以下是一些示例：


    ```

    RMAN> shutdown immediate;

    RMAN> shutdown abort;

    ```


    如果不指定关闭选项，则 `NORMAL` 是默认值。使用 `NORMAL` 关闭数据库很少可行，因为此模式会等待当前连接的用户在闲暇时断开连接。我从不使用
    `NORMAL` 来关闭数据库。


    **启动数据库**


    与SQL*Plus一样，您可以组合使用RMAN中的 `STARTUP` 和 `ALTER DATABASE` 命令，使数据库逐步完成启动阶段，如下所示：


    ```

    RMAN> startup nomount;

    RMAN> alter database mount;

    RMAN> alter database open;

    ```


    这是另一个示例：


    ```

    RMAN> startup mount;

    RMAN> alter database open;

    ```


    如果要以受限访问方式启动数据库，请使用DBA选项：


    ```

    RMAN> startup dba;

    ```


    ![Image](images/sq.jpg) **Tip** 从Oracle 12c开始，您可以直接从RMAN内部运行所有SQL语句，而无需指定RMAN
    `sql` 命令。


    **完全恢复**


    如[第3章](#9781484207642_Ch03.xhtml)所述，术语 *complete recovery* 表示您可以恢复在故障发生之前已提交的所有事务。*Complete
    recovery* 并不意味着您正在恢复和修复数据库中的所有数据文件。例如，如果您有一个数据文件发生介质故障，并且您恢复和修复了该数据文件，那么您就是在执行完全恢复。对于完全恢复，必须满足以下条件：


    *   您的数据库处于归档日志模式（archivelog mode）。

    *   您拥有发生介质故障的数据文件的良好基线备份。

    *   您拥有自上次备份以来生成的任何必需重做日志。

    *   所有归档重做日志从上次备份开始时即存在。

    *   RMAN可用于恢复的任何增量备份都可用（如果使用）。

    *   包含尚未归档的事务的联机重做日志可用。


    如果您遇到了介质故障，并且拥有执行完全恢复所需的文件，则可以恢复和修复数据库。


    **测试恢复与修复**'
  raw: '![Image](images/sq.jpg) **Tip**  If you suspect there’s a media failure, yet
    the Data Recovery Advisor is not reporting any issues, run the `VALIDATE DATABASE`
    command to verify that the database is intact.


    If there are no detected failures, you’ll see a message indicating that there
    are no failures. Here is some sample output indicating that there may be an issue
    with a data file:


    ```

    List of Database Failures

    =========================


    Failure ID Priority Status    Time Detected Summary

    ---------- -------- --------- ------------- -------

    6222       CRITICAL OPEN      12-JAN-14     System datafile 1:

     ''/u01/dbfile/O12C/system01.dbf'' is missing

    ```


    To display more information about the failure, use the `DETAIL` clause:


    ```

    RMAN> list failure 6222 detail;

    ```


    Here is the additional output for this example:


    ```

    Impact: Database cannot be opened

    ```


    With this type of failure, the prior output indicates that the database can’t
    be opened.


    Suggesting Corrective Action


    The `ADVISE FAILURE` command gives advice about how to recover from potential
    problems detected by the Data Recovery Advisor. If you have multiple failures
    with your database, you can directly specify the failure ID to get advice on a
    given failure, like so:


    ```

    RMAN> advise failure 6222;

    ```


    Here is a snippet of the output for this particular issue:


    ```

    Optional Manual Actions

    =======================

    1\. If file /u01/dbfile/O12C/system01.dbf was unintentionally renamed or moved,

    restore it


    Automated Repair Options

    ========================

    Option Repair Description

    ------ ------------------

    1      Restore and recover datafile 1

      Strategy: The repair includes complete media recovery with no data loss

      Repair script: /ora01/app/oracle/diag/rdbms/O12C/O12C/hm/reco_4116328280.hm

    ```


    In this case, the Data Recovery Advisor created a script that can be used to potentially
    fix the problem. The contents of the repair script can be viewed with an OS utility;
    for example,


    ```

    $ cat /ora01/app/oracle/diag/rdbms/O12C/O12C/hm/reco_4116328280.hm

    ```


    Here are the contents of the script for this example:


    ```

    # restore and recover datafile

    restore ( datafile 1 );

    recover datafile 1;

    sql ''alter database datafile 1 online'';

    ```


    After reviewing the script, you can decide to run the suggested commands manually,
    or you can have the Data Recovery Advisor run the script via the `REPAIR` command
    (see the next section for details).


    Repairing Failures


    If you have identified a failure and viewed the recommended advice, you can proceed
    to the repair work. If you want to inspect what the `REPAIR FAILURE` command will
    do without actually running the commands, use the `PREVIEW` clause:


    ```

    RMAN> repair failure preview;

    ```


    Before you run the `REPAIR FAILURE` command, ensure that you first run the `LIST
    FAILURE` and `ADVISE FAILURE` commands from the same connected session. In other
    words, the RMAN session that you’re in must run the `LIST` and `ADVISE` commands
    within the same session before running the `REPAIR` command.


    If you’re satisfied with the repair suggestions, then run the `REPAIR FAILURE`
    command:


    ```

    RMAN> repair failure;

    ```


    You’ll be prompted at this point for confirmation:


    ```

    Do you really want to execute the above repair (enter YES or NO)?

    ```


    Type `YES` to proceed:


    ```

    YES

    ```


    If all goes well, you should see a final message such as this in the output:


    ```

    repair failure complete

    ```


    ![Image](images/sq.jpg) **Note**  You can run the Data Recovery Advisor commands
    from the RMAN command prompt or from Enterprise Manager.


    In this way, you can use the RMAN commands `LIST FAILURE`, `ADVISE FAILURE`, and
    `REPAIR FAILURE` to resolve media failures.


    Changing the Status of a Failure


    One last note on the Data Recovery Advisor: if you know that you’ve had a failure
    and that it isn’t critical (e.g., a data file missing from a tablespace that is
    no longer used), then use the `CHANGE FAILURE` command to alter the priority of
    a failure. In this example, there’s a missing data file that belongs to a noncritical
    tablespace. First, obtain the failure priority via the `LIST FAILURE` command:


    ```

    RMAN> list failure;

    ```


    Here is some sample output:


    ```

    Failure ID Priority Status    Time Detected Summary

    ---------- -------- --------- ------------- -------

    5          HIGH     OPEN      12-JAN-14     One or more non-system datafiles

                                                are missing

    ```


    Next, change the priority from `HIGH` to `LOW` with the `CHANGE FAILURE` command:


    ```

    RMAN> change failure 5 priority low;

    ```


    You will be prompted to confirm that you really do want to change the priority:


    ```

    Do you really want to change the above failures (enter YES or NO)?

    ```


    If you do want to change the priority, then type `YES`, and press the Enter key.
    If you run the `LIST FAILURE` command again, you’ll see that the priority has
    now been changed to `LOW`:


    ```

    RMAN> list failure low;

    ```


    Using RMAN to Stop/Start Oracle


    You can use RMAN to stop and start your database with methods that are almost
    identical to those available through SQL*Plus. When performing restore and recovery
    operations, it’s often more convenient to stop and start your database from within
    RMAN. The following RMAN commands can be used to stop and start your database:


    *   `SHUTDOWN`

    *   `STARTUP`

    *   `ALTER DATABASE`


    Shutting Down


    The `SHUTDOWN` command works the same from RMAN as it does from SQL*Plus. There
    are four types of shutdown: `ABORT`, `IMMEDIATE`, `NORMAL`, and `TRANSACTIONAL`.
    I usually first attempt to stop a database using `SHUTDOWN IMMEDIATE`; if that
    doesn’t work, don’t hesitate to use `SHUTDOWN ABORT`. Here are some examples:


    ```

    RMAN> shutdown immediate;

    RMAN> shutdown abort;

    ```


    If you don’t specify a shutdown option, `NORMAL` is the default. Shutting down
    a database with `NORMAL` is rarely viable, as this mode waits for currently connected
    users to disconnect at their leisure. I never use `NORMAL` when shutting down
    a database.


    Starting Up


    As with SQL*Plus, you can use a combination of `STARTUP` and `ALTER DATABASE`
    commands with RMAN to step the database through startup phases, like this:


    ```

    RMAN> startup nomount;

    RMAN> alter database mount;

    RMAN> alter database open;

    ```


    Here is another example:


    ```

    RMAN> startup mount;

    RMAN> alter database open;

    ```


    If you want to start the database with restricted access, use the DBA option:


    ```

    RMAN> startup dba;

    ```


    ![Image](images/sq.jpg) **Tip**  Starting with Oracle 12c, you can run all SQL
    statements directly from within RMAN without having to specify the RMAN `sql`
    command.


    Complete Recovery


    As discussed in [Chapter 3](#9781484207642_Ch03.xhtml), the term *complete recovery*
    means that you can restore all transactions that were committed before a failure
    occurred. *Complete recovery* doesn’t mean that you are restoring and recovering
    all data files in your database. For instance, you are performing a complete recovery
    if you have a media failure with one data file, and you restore and recover the
    one data file. For complete recovery, the following conditions must be true:


    *   Your database is in archivelog mode.

    *   You have a good baseline backup of the data files that have experienced media
    failure.

    *   You have any required redo that has been generated since the last backup.

    *   All archive redo logs start from the point at which the last backup began.

    *   Any incremental backups that RMAN can use for recovery are available (if using).

    *   Online redo logs that contain transactions that have not yet been archived
    are available.


    If you’ve experienced a media failure, and you have the required files to perform
    a complete recovery, then you can restore and recover your database.


    Testing Restore and Recovery'
