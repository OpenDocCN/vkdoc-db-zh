    \ 11g开始，RMAN可以从闪回日志中还原块（如果可用）。如果闪回日志不可用，则RMAN将尝试从完整备份、0级备份或由`BACKUP AS COPY`命令生成的映像副本备份中还原块。块还原后，任何所需的归档重做日志必须可用才能恢复该块。RMAN无法使用增量1级（或更高级别）备份执行块介质恢复。\n\
    \n**注意：** 如果您使用的是Oracle 10g或Oracle9i，请使用`BLOCKRECOVER`命令执行块介质恢复。\n\n## 恢复容器数据库及其关联的可插拔数据库\n\
    \n从Oracle 12c开始，您可以在一个容器数据库中创建可插拔数据库。在处理容器及其关联的可插拔数据库时，有三种基本场景：\n\n*   所有数据文件都经历了介质故障（容器根数据文件以及所有关联的可插拔数据库数据文件）。\n\
    *   仅与容器根数据库关联的数据文件经历了介质故障。\n*   仅与某个可插拔数据库关联的数据文件经历了介质故障。\n\n以下部分涵盖了上述场景。\n\n\
    ### 恢复和还原所有数据文件\n\n要恢复和还原与容器数据库关联的所有数据文件（包括根容器、种子容器和所有关联的可插拔数据库），请使用具有`sysdba`或`sysbackup`权限的用户通过RMAN连接到容器数据库。因为正在还原与根系统表空间关联的数据文件，所以数据库必须以装载模式启动（而非打开）：\n\
    \n```\n$ rman target /\nRMAN> startup mount;\nRMAN> restore database;\nRMAN> recover\
    \ database;\nRMAN> alter database open;\n```\n\n请记住，当您打开容器数据库时，默认情况下不会打开关联的可插拔数据库。您可以从根容器中打开它们，如下所示：\n\
    \n```\nRMAN> alter pluggable database all open;\n```\n\n### 恢复和还原根容器数据文件\n\n如果仅与根容器关联的数据文件损坏，则可以在根级别进行恢复和还原。在此示例中，正在还原根容器的系统数据文件，因此数据库不能处于打开状态。以下命令指示RMAN仅还原与根容器数据库关联的数据文件，通过关键字`root`实现：\n\
    \n```\n$ rman target /\nRMAN> startup mount;\nRMAN> restore database root;\nRMAN>\
    \ recover database root;\nRMAN> alter database open;\n```\n\n在之前的代码中，`restore\
    \ database root`命令指示RMAN仅还原与根容器数据库关联的数据文件。容器数据库打开后，您必须打开任何关联的可插拔数据库。您可以从根容器中执行此操作，如下所示：\n\
    \n```\nRMAN> alter pluggable database all open;\n```\n\n您可以通过以下查询检查可插拔数据库的状态：\n\
    \n```\nSQL> select name, open_mode from v$pdbs;\n```\n\n### 恢复和还原可插拔数据库\n\n您有两种选项来恢复和还原可插拔数据库：\n\
    \n*   以容器根用户身份连接，并指定要恢复和还原的可插拔数据库。\n*   直接以特权可插拔级别用户身份连接到可插拔数据库，并发出`RESTORE`和`RECOVER`命令。\n\
    \n第一个示例连接到根容器，并恢复和还原与`salespdb`可插拔数据库关联的数据文件。为此，可插拔数据库不能处于打开状态（因为可插拔数据库的系统数据文件也将被恢复和还原）："
  raw: '```

    run{

    set newname for datafile 4 to ''/u02/dbfile/O12C/users01.dbf'';

    set newname for datafile 5 to ''/u02/dbfile/O12C/users02.dbf'';

    restore datafile 4, 5;

    switch datafile all; # Updates repository with new datafile location.

    recover datafile 4, 5;

    alter database open;

    }

    ```


    This is a partial listing of the output:


    ```

    datafile 4 switched to datafile copy

    input datafile copy RECID=79 STAMP=804533148 file name=/u02/dbfile/O12C/users01.dbf

    datafile 5 switched to datafile copy

    input datafile copy RECID=80 STAMP=804533148 file name=/u02/dbfile/O12C/users02.dbf

    ```


    If the database is open, you can place the data files offline and then set their
    new names for restore and recovery, as follows:


    ```

    run{

    sql ''alter database datafile 4, 5 offline'';

    set newname for datafile 4 to ''/u02/dbfile/O12C/users01.dbf'';

    set newname for datafile 5 to ''/u02/dbfile/O12C/users02.dbf'';

    restore datafile 4, 5;

    switch datafile all; # Updates repository with new datafile location.

    recover datafile 4, 5;

    sql ''alter database datafile 4, 5 online'';

    }

    ```


    Starting with Oracle 12c, you no longer need to specify the RMAN `sql` command
    when running SQL statements, such as `ALTER DATABASE`; for example,


    ```

    run{

    alter database datafile 4, 5 offline;

    set newname for datafile 4 to ''/u02/dbfile/O12C/users01.dbf'';

    set newname for datafile 5 to ''/u02/dbfile/O12C/users02.dbf'';

    restore datafile 4, 5;

    switch datafile all; # Updates repository with new datafile location.

    recover datafile 4, 5;

    alter database datafile 4, 5 online;

    }

    ```


    Performing Block-Level Recovery


    Block-level corruption is rare and is usually caused by some sort of I/O error.
    However, if you do have an isolated corrupt block within a large data file, it’s
    nice to have the option of performing a block-level recovery. Block-level recovery
    is useful when a small number of blocks are corrupt within a data file. Block
    recovery is not appropriate if the entire data file needs media recovery.


    RMAN will automatically detect corrupt blocks whenever a `BACKUP`, `VALIDATE`,
    or `BACKUP VALIDATE` command is run. Details on corrupt blocks can be viewed in
    the `V$DATABASE_BLOCK_CORRUPTION` view. In the following example the regular backup
    job has reported a corrupt block in the output:


    ```

    ORA-19566: exceeded limit of 0 corrupt blocks for file...

    ```


    Querying the `V$DATABASE_BLOCK_CORRUPTION` view indicates which file contains
    corruption:


    ```

    SQL> select * from v$database_block_corruption;


    FILE#     BLOCK#     BLOCKS CORRUPTION_CHANGE# CORRUPTIO     CON_ID

    ---------- ---------- ---------- ------------------ --------- ----------

             4         20          1                  0 ALL ZERO           0

    ```


    Your database can be either mounted or open when performing block-level recovery.
    You do not have to take offline the data file being recovered. You can instruct
    RMAN to recover all blocks reported in `V$DATABASE_BLOCK_CORRUPTION`, as shown:


    ```

    RMAN> recover corruption list;

    ```


    If successful, the following message is displayed:


    ```

    media recovery complete...

    ```


    Another way to recover the block is to specify the data file and block number,
    like so:


    ```

    RMAN> recover datafile 4 block 20;

    ```


    It’s preferable to use the `RECO``VER CORRUPTION LIST` syntax because it will
    clear out any blocks recovered from the `V$DATABASE_BLOCK_CORRUPTION` view.


    ![Image](images/sq.jpg) **Note**  RMAN can’t perform block-level recovery on block
    1 (data file header) of the data file.


    Block-level media recovery allows you to keep your database available and also
    reduces the mean time to recovery, as only the corrupt blocks are offline during
    the recovery. Your database must be in archivelog mode for performing block-level
    recoveries. Starting with Oracle 11g, RMAN can restore the block from the flashback
    logs (if available). If the flashback logs are not available, then RMAN will attempt
    to restore the block from a full backup, a level-0 backup, or an image copy backup
    generated by the `BACKUP AS COPY` command. After the block has been restored,
    any required archived redo logs must be available to recover the block. RMAN can’t
    perform block media recovery using incremental level-1 (or higher) backups.


    ![Image](images/sq.jpg) **Note**  If you’re using Oracle 10g or Oracle9i, use
    the `BLOCKRECOVER` command to perform block media recovery.


    Restoring a Container Database and Its Associated Pluggable Databases


    Starting with Oracle 12c, you can create pluggable databases within one container
    database. When dealing with container and associated pluggable databases, there
    are three basic scenarios:


    *   All data files have experienced media failure (container root data files as
    well as all associated pluggable database data files).

    *   Just the data files associated with the container root database have experienced
    media failure.

    *   Only data files associated with a pluggable database have experienced media
    failure.


    The prior scenarios are covered in the following sections.


    Restoring and Recovering All Data Files


    To restore and recover all data files associated with a container database (this
    includes the root container, the seed container, and all associated pluggable
    databases), use RMAN to connect to the container database as a user with `sysdba`
    or `sysbackup` privileges. Because the data files associated with the root system
    tablespace are being restored, the database must be started in mount mode (and
    not open):


    ```

    $ rman target /

    RMAN> startup mount;

    RMAN> restore database;

    RMAN> recover database;

    RMAN> alter database open;

    ```


    Keep in mind that when you open a container database, this does not, by default,
    open the associated pluggable databases. You can do that from the root container,
    as follows:


    ```

    RMAN> alter pluggable database all open;

    ```


    Restoring and Recovering Root Container Data Files


    If just data files associated with the root container have been damaged, then
    you can restore and recover at the root level. In this example the root container’s
    system data file is being restored, so the database must not be open. The following
    commands instruct RMAN to restore only the data files associated with the root
    container database, via the keyword `root`:


    ```

    $ rman target /

    RMAN> startup mount;

    RMAN> restore database root;

    RMAN> recover database root;

    RMAN> alter database open;

    ```


    In the prior code the `restore database root` command instructs RMAN to restore
    only data files associated with the root container database. After the container
    database is opened, you must open any associated pluggable databases. You can
    do so from the root container, as shown:


    ```

    RMAN> alter pluggable database all open;

    ```


    You can check the status of your pluggable databases via this query:


    ```

    SQL> select name, open_mode from v$pdbs;

    ```


    Restoring and Recovering a Pluggable Database


    You have two options for restoring and recovering a pluggable database:


    *   Connect as the container root user, and specify the pluggable database to
    be restored and recovered.

    *   Connect directly to the pluggable database as a privileged pluggable-level
    user, and issue `RESTORE` and `RECOVER` commands.


    This first example connects to the root container and restores and recovers the
    data files associated with the `salespdb` pluggable database. For this to work,
    the pluggable database must not be open (because the pluggable database’s system
    data files are also being restored and recovered):'
  trans: "\n# RMAN 数据文件恢复与块级恢复\n\n## RMAN 数据文件恢复操作\n\n以下是一个 RMAN 恢复脚本示例：\n\n```\n\
    run{\nset newname for datafile 4 to '/u02/dbfile/O12C/users01.dbf';\nset newname\
    \ for datafile 5 to '/u02/dbfile/O12C/users02.dbf';\nrestore datafile 4, 5;\n\
    switch datafile all; # 使用新数据文件位置更新存储库。\nrecover datafile 4, 5;\nalter database\
    \ open;\n}\n```\n\n这是部分输出信息：\n\n```\ndatafile 4 switched to datafile copy\ninput\
    \ datafile copy RECID=79 STAMP=804533148 file name=/u02/dbfile/O12C/users01.dbf\n\
    datafile 5 switched to datafile copy\ninput datafile copy RECID=80 STAMP=804533148\
    \ file name=/u02/dbfile/O12C/users02.dbf\n```\n\n如果数据库处于打开状态，可以先将数据文件离线，然后为其设置新名称以进行恢复，如下所示：\n\
    \n```\nrun{\nsql 'alter database datafile 4, 5 offline';\nset newname for datafile\
    \ 4 to '/u02/dbfile/O12C/users01.dbf';\nset newname for datafile 5 to '/u02/dbfile/O12C/users02.dbf';\n\
    restore datafile 4, 5;\nswitch datafile all; # 使用新数据文件位置更新存储库。\nrecover datafile\
    \ 4, 5;\nsql 'alter database datafile 4, 5 online';\n}\n```\n\n从 Oracle 12c 开始，运行\
    \ SQL 语句（例如`ALTER DATABASE`）时不再需要指定 RMAN `sql`命令；例如：\n\n```\nrun{\nalter database\
    \ datafile 4, 5 offline;\nset newname for datafile 4 to '/u02/dbfile/O12C/users01.dbf';\n\
    set newname for datafile 5 to '/u02/dbfile/O12C/users02.dbf';\nrestore datafile\
    \ 4, 5;\nswitch datafile all; # 使用新数据文件位置更新存储库。\nrecover datafile 4, 5;\nalter\
    \ database datafile 4, 5 online;\n}\n```\n\n## 块级恢复\n\n块级损坏很少见，通常由某种 I/O 错误引起。但是，如果在大型数据文件中确实存在孤立的损坏块，能够执行块级恢复是一个很好的选择。当数据文件中只有少量块损坏时，块级恢复非常有用。如果整个数据文件都需要介质恢复，则块恢复不合适。\n\
    \n每当运行`BACKUP`、`VALIDATE`或`BACKUP VALIDATE`命令时，RMAN 会自动检测损坏块。关于损坏块的详细信息可以在`V$DATABASE_BLOCK_CORRUPTION`视图中查看。在以下示例中，常规备份作业在输出中报告了损坏块：\n\
    \n```\nORA-19566: exceeded limit of 0 corrupt blocks for file...\n```\n\n查询`V$DATABASE_BLOCK_CORRUPTION`视图可以指示哪个文件包含损坏：\n\
    \n```\nSQL> select * from v$database_block_corruption;\n\nFILE#     BLOCK#   \
    \  BLOCKS CORRUPTION_CHANGE# CORRUPTIO     CON_ID\n---------- ---------- ----------\
    \ ------------------ --------- ----------\n         4         20          1  \
    \                0 ALL ZERO           0\n```\n\n执行块级恢复时，数据库可以处于装载或打开状态。无需将正在恢复的数据文件离线。可以指示\
    \ RMAN 恢复在`V$DATABASE_BLOCK_CORRUPTION`中报告的所有块，如下所示：\n\n```\nRMAN> recover corruption\
    \ list;\n```\n\n如果成功，将显示以下消息：\n\n```\nmedia recovery complete...\n```\n\n另一种恢复块的方法是指定数据文件和块号，如下所示：\n\
    \n```\nRMAN> recover datafile 4 block 20;\n```\n\n最好使用`RECOVER CORRUPTION LIST`语法，因为它会从`V$DATABASE_BLOCK_CORRUPTION`视图中清除所有已恢复的块。\n\
    \n**注意：** RMAN 无法对数据文件头（块 1）执行块级恢复。\n\n块级介质恢复允许您保持数据库可用，并减少平均恢复时间，因为在恢复期间只有损坏块处于离线状态。执行块级恢复时，数据库必须处于归档日志模式。从\
    \ Oracle 11g 开始，RMAN 可以从闪回日志中还原块（如果可用）。如果闪回日志不可用，则 RMAN 将尝试从完整备份、0 级备份或由`BACKUP\
    \ AS COPY`命令生成的映像副本备份中还原块。块还原后，任何所需的归档重做日志必须可用才能恢复该块。RMAN 无法使用增量 1 级（或更高级别）备份执行块介质恢复。\n\
    \n**注意：** 如果您使用的是 Oracle 10g 或 Oracle9i，请使用`BLOCKRECOVER`命令执行块介质恢复。\n\n## 恢复容器数据库及其关联的可插拔数据库\n\
    \n从 Oracle 12c 开始，您可以在一个容器数据库中创建可插拔数据库。在处理容器及其关联的可插拔数据库时，有三种基本场景：\n\n*   所有数据文件都经历了介质故障（容器根数据文件以及所有关联的可插拔数据库数据文件）。\n\
    *   仅与容器根数据库关联的数据文件经历了介质故障。\n*   仅与某个可插拔数据库关联的数据文件经历了介质故障。\n\n以下部分涵盖了上述场景。\n\n\
    ### 恢复和还原所有数据文件\n\n要恢复和还原与容器数据库关联的所有数据文件（包括根容器、种子容器和所有关联的可插拔数据库），请使用具有`sysdba`或`sysbackup`权限的用户通过\
    \ RMAN 连接到容器数据库。因为正在还原与根系统表空间关联的数据文件，所以数据库必须以装载模式启动（而非打开）：\n\n```\n$ rman target\
    \ /\nRMAN> startup mount;\nRMAN> restore database;\nRMAN> recover database;\n\
    RMAN> alter database open;\n```\n\n请记住，当您打开容器数据库时，默认情况下不会打开关联的可插拔数据库。您可以从根容器中打开它们，如下所示：\n\
    \n```\nRMAN> alter pluggable database all open;\n```\n\n### 恢复和还原根容器数据文件\n\n如果仅与根容器关联的数据文件损坏，则可以在根级别进行恢复和还原。在此示例中，正在还原根容器的系统数据文件，因此数据库不能处于打开状态。以下命令指示\
    \ RMAN 仅还原与根容器数据库关联的数据文件，通过关键字`root`实现：\n\n```\n$ rman target /\nRMAN> startup\
    \ mount;\nRMAN> restore database root;\nRMAN> recover database root;\nRMAN> alter\
    \ database open;\n```\n\n在之前的代码中，`restore database root`命令指示 RMAN 仅还原与根容器数据库关联的数据文件。容器数据库打开后，您必须打开任何关联的可插拔数据库。您可以从根容器中执行此操作，如下所示：\n\
    \n```\nRMAN> alter pluggable database all open;\n```\n\n您可以通过以下查询检查可插拔数据库的状态：\n\
    \n```\nSQL> select name, open_mode from v$pdbs;\n```\n\n### 恢复和还原可插拔数据库\n\n您有两种选项来恢复和还原可插拔数据库：\n\
    \n*   以容器根用户身份连接，并指定要恢复和还原的可插拔数据库。\n*   直接以特权可插拔级别用户身份连接到可插拔数据库，并发出`RESTORE`和`RECOVER`命令。\n\
    \n第一个示例连接到根容器，并恢复和还原与`salespdb`可插拔数据库关联的数据文件。为此，可插拔数据库不能处于打开状态（因为可插拔数据库的系统数据文件也将被恢复和还原）：\n"
- fmt: '## 恢复可插拔数据库


    您可以使用 RMAN 连接到根容器数据库来恢复整个可插拔数据库。


    ```

    $ rman target /

    RMAN> alter pluggable database salespdb close;

    RMAN> restore pluggable database salespdb;

    RMAN> recover pluggable database salespdb;

    RMAN> alter pluggable database salespdb open;

    ```


    您也可以直接连接到一个可插拔数据库并执行恢复操作。当直接连接到可插拔数据库时，用户只能访问与该可插拔数据库关联的数据文件：


    ```

    $ rman target sys/foo@salespdb

    RMAN> shutdown immediate;

    RMAN> restore database;

    RMAN> recover database;

    RMAN> alter database open;

    ```


    ![Image](images/sq.jpg) `注意` 当您直接连接到可插拔数据库时，不能在 `RESTORE` 和 `RECOVER` 命令中指定可插拔数据库的名称。在这种情况下，您会收到
    `RMAN-07536: command not allowed when connected to a Pluggable Database` 错误。


    前面的代码只影响与您所连接的可插拔数据库关联的数据文件。可插拔数据库需要关闭才能进行此操作。但是，根容器数据库可以是打开或挂载状态。此外，您必须使用在连接到可插拔数据库时以特权用户身份进行的备份。特权可插拔数据库用户无法访问由根容器数据库特权用户启动的数据文件备份。


    ## 恢存归档重做日志文件


    RMAN 会在恢复过程中自动恢复它需要的任何归档重做日志文件。通常您不需要手动恢复归档重做日志文件。但是，在以下任何情况适用时，您可能希望这样做：


    *   您需要恢复归档重做日志文件，以便稍后执行恢复；其思路是，如果归档重做日志文件已经恢复，将加快恢复操作。

    *   您需要将归档重做日志文件恢复到非默认位置，无论是由于介质故障还是存储空间问题。

    *   您需要恢复特定的归档重做日志文件，以便通过 LogMiner 进行检查。


    如果您启用了 FRA，那么 RMAN 默认会将归档重做日志文件恢复到由初始化参数 `DB_RECOVERY_FILE_DEST` 定义的目标位置。否则，RMAN
    使用 `LOG_ARCHIVE_DEST_N` 初始化参数（其中 `N` 通常为 1）来确定恢复归档重做日志文件的位置。


    如果您将归档重做日志文件恢复到非默认位置，RMAN 知道它们被恢复到的位置，并会在您发出任何后续 `RECOVER` 命令时自动找到这些文件。RMAN 不会恢复它认为已经存在于磁盘上的归档重做日志文件。即使您指定了非默认位置，如果文件已存在，RMAN
    也不会将归档重做日志文件恢复到磁盘。在这种情况下，RMAN 仅返回一条消息，说明该归档重做日志文件已被恢复。使用 `FORCE` 选项可以覆盖此行为。


    如果您不确定在恢复日志文件时要使用的序列号，可以查询 `V$LOG_HISTORY` 视图。


    ![Image](images/sq.jpg) `提示` 请记住，您无法恢复从未备份过的归档重做日志。此外，如果包含该归档重做日志的备份文件不再可用，您也无法恢复它。运行
    `LIST ARCHIVELOG ALL` 命令可以查看磁盘上当前的归档重做日志，运行 `LIST BACKUP OF ARCHIVELOG ALL` 可以验证哪些归档重做日志文件在可用的
    RMAN 备份中。


    ### 恢复到默认位置


    以下命令将恢复 RMAN 已备份的所有归档重做日志文件：


    ```

    RMAN> restore archivelog all;

    ```


    如果您想从指定的序列开始恢复，请使用 `FROM SEQUENCE` 子句。您可能需要先运行此查询以确定已生成的最新日志文件和序列号：


    ```

    SQL> select sequence#, first_time from v$log_history order by 2;

    ```


    此示例从序列 68 开始恢复所有归档重做日志文件：


    ```

    RMAN> restore archivelog from sequence 68;

    ```


    如果您想恢复一定范围的归档重做日志文件，请使用 `FROM SEQUENCE` 和 `UNTIL SEQUENCE` 子句或 `SEQUENCE BETWEEN`
    子句，如下所示。以下命令恢复从序列 68 到序列 78 的归档重做日志文件，使用线程 1：


    ```

    RMAN> restore archivelog from sequence 68 until sequence 78 thread 1;

    RMAN> restore archivelog sequence between 68 and 78 thread 1;

    ```


    默认情况下，如果归档重做日志文件已在磁盘上，RMAN 不会恢复它。如果您使用 `FORCE`，则可以覆盖此行为，如下所示：


    ```

    RMAN> restore archivelog from sequence 1 force;

    ```


    ### 恢复到非默认位置


    如果您想将归档重做日志文件恢复到与默认位置不同的位置，请使用 `SET ARCHIVELOG DESTINATION` 子句。以下示例恢复到非默认位置 `/u01/archtemp`。`SET`
    命令的此选项必须在 RMAN `run{}` 块内执行。


    ```

    run{

    set archivelog destination to ''/u01/archtemp'';

    restore archivelog from sequence 8 force;

    }

    ```


    ## 恢复控制文件


    如果您丢失了一个控制文件，并且您有多个副本，那么您可以关闭数据库，并通过将一个好的控制文件复制到丢失控制文件的正确位置和名称来简单地恢复丢失或损坏的控制文件（有关详细信息，请参见
    [第 2 章](#9781484207642_Ch02.xhtml)）。


    下面列出了恢复控制文件时的三种典型场景：


    *   使用恢复目录

    *   使用自动备份

    *   指定备份文件名


    ### 使用恢复目录


    当您连接到恢复目录时，即使目标数据库处于 nomount 模式，您也可以查看有关控制文件的备份信息。要列出控制文件的备份，请使用 `LIST` 命令，如下所示：


    ```

    $ rman target / catalog rcat/foo@rcat

    RMAN> startup nomount;

    RMAN> list backup of controlfile;

    ```


    如果您丢失了所有控制文件，并且正在使用恢复目录，那么请发出 `STARTUP NOMOUNT` 和 `RESTORE CONTROLFILE` 命令：


    ```

    RMAN> startup nomount;

    RMAN> restore controlfile;

    ```


    RMAN 将控制文件恢复到由您的 `CONTROL_FILES` 初始化参数定义的位置。您应该会看到一条消息，指示您的控制文件已成功从 RMAN 备份片复制回来。您现在可以将数据库更改为
    mount 模式，并执行数据库所需的任何其他恢复和恢复命令。


    ![Image](images/sq.jpg) `注意` 当您从备份恢复控制文件时，需要对整个数据库执行介质恢复，并使用 `OPEN RESETLOGS`
    命令打开数据库，即使您没有恢复任何数据文件。您可以通过查询 `V$DATABASE` 视图的 `CONTROLFILE_TYPE` 列来确定您的控制文件是否是备份。


    ### 使用自动备份


    当您启用控制文件的自动备份并使用 FRA 时，恢复控制文件相当简单。首先，连接到您的目标数据库，然后发出 `STARTUP NOMOUNT` 命令，接着是
    `RESTORE CONTROLFILE FROM AUTOBACKUP` 命令，如下所示：


    ```

    $ rman target /

    RMAN> startup nomount;

    RMAN> restore controlfile from autobackup;

    ```


    RMAN 将控制文件恢复到由您的 `CONTROL_FILES` 初始化参数定义的位置。您应该会看到一条消息，指示您的控制文件已成功从 RMAN 备份片复制回来。以下是输出片段：


    ```

    channel ORA_DISK_1: control file restore from AUTOBACKUP complete

    ```


    您现在可以将数据库更改为 mount 模式，并执行数据库所需的任何其他恢复和恢复命令。


