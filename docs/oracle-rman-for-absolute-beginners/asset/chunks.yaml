- fmt: "## 添加控制文件\n\n1.  在`$ vi $ORACLE_HOME/dbs/initO12C.ora`中编辑初始化参数文件。\n\n    添加后，`CONTROL_FILES`参数如下所示：\n\
    \n    ```sql\n    control_files='/u01/dbfile/O12C/control01.ctl', \n         \
    \         '/u01/dbfile/O12C/control02.ctl'\n    ```\n\n2.  在操作系统中，将现有的控制文件复制到要添加的控制文件的目录和名称：\n\
    \n    ```bash\n    $ cp /u01/dbfile/O12C/control01.ctl /u01/dbfile/O12C/control02.ctl\n\
    \    ```\n\n3.  启动数据库：\n\n    ```sql\n    SQL> startup;\n    ```\n\n    通过显示`CONTROL_FILES`参数，可以查看正在使用的控制文件：\n\
    \n    ```sql\n    SQL> show parameter control_files\n    ```\n\n    对于本示例，输出如下：\n\
    \n    ```\n    NAME             TYPE        VALUE\n    ---------------- -----------\
    \ ------------------------------\n    control_files    string      /u01/dbfile/O12C/control01.ctl\n\
    \                                 ,/u01/dbfile/O12C/control02.ctl\n    ```\n\n\
    ## 移动控制文件\n\n有时可能需要将控制文件从一个位置移动到另一个位置。例如，如果为数据库服务器添加了新存储，可能希望将现有控制文件移动到新位置。\n\n\
    移动控制文件的步骤与添加控制文件非常相似。唯一的区别是重命名而不是复制控制文件。此示例展示了在使用`spfile`时如何移动控制文件：\n\n1.  确定`CONTROL_FILES`参数的当前值：\n\
    \n    ```sql\n    SQL> show parameter control_files\n\n    NAME              TYPE\
    \        VALUE\n    ----------------- ----------- ------------------------------\n\
    \    control_files     string      /u01/dbfile/O12C/control01.ctl\n    ```\n\n\
    2.  修改`CONTROL_FILES`参数以反映正在移动控制文件。在此示例中，控制文件当前位置是：\n\n    ```\n    /u01/dbfile/O12C/control01.ctl\n\
    \    ```\n\n    将控制文件移动到此位置：\n\n    ```\n    /u02/dbfile/O12C/control01.ctl\n\
    \    ```\n\n    修改`spfile`以反映控制文件的新位置。必须指定`SCOPE=SPFILE`，因为`CONTROL_FILES`参数无法在内存中修改：\n\
    \n    ```sql\n    SQL> alter system set\n         control_files='/u02/dbfile/O12C/control01.ctl'\
    \ scope=spfile;\n    ```\n\n3.  关闭数据库：\n\n    ```sql\n    SQL> shutdown immediate;\n\
    \    ```\n\n4.  在操作系统提示符下，将控制文件移动到新位置。此示例使用操作系统`mv`命令：\n\n    ```bash\n    $ mv\
    \ /u01/dbfile/O12C/control01.ctl /u02/dbfile/O12C/control01.ctl\n    ```\n\n5.\
    \  启动数据库：\n\n    ```sql\n    SQL> startup;\n    ```\n\n    可以通过显示`CONTROL_FILES`参数来验证是否正在使用新的控制文件：\n\
    \n    ```sql\n    SQL> show parameter control_files\n    ```\n\n    此示例的输出如下：\n\
    \n    ```\n    NAME             TYPE        VALUE\n    ---------------- -----------\
    \ ------------------------------\n    control_files    string      /u02/dbfile/O12C/control01.ctl\n\
    \    ```\n\n## 删除控制文件\n\n可能会遇到包含一个多路复用控制文件的存储设备发生介质故障的情况：\n\n```\nORA-00205: error\
    \ in identifying control file, check alert log for more info\n```\n\n在此场景中，您仍然至少有一个完好的控制文件。要删除控制文件，请遵循以下步骤：\n\
    \n1.  通过检查`alert.log`获取信息来确定哪个控制文件发生了介质故障：\n\n    ```\n    ORA-00210: cannot open\
    \ the specified control file\n    ORA-00202: control file: '/u01/dbfile/O12C/control02.ctl'\n\
    \    ```\n\n2.  从`CONTROL_FILES`参数中移除不可用的控制文件名。如果使用的是`init.ora`文件，请使用操作系统编辑器（如`vi`）直接修改该文件。如果使用的是`spfile`，请使用`ALTER\
    \ SYSTEM`语句修改`CONTROL_FILES`参数。在此`spfile`示例中，从`CONTROL_FILES`参数中移除了`control02.ctl`控制文件：\n\
    \n    ```sql\n    SQL> alter system set control_files='/u01/dbfile/O12C/control01.ctl'\n\
    \         scope=spfile;\n    ```"
  raw: "```\n    $ vi $ORACLE_HOME/dbs/initO12C.ora\n    ```\n\nListed next is the\
    \ `CONTROL_FILES` parameter after `control02.ctl` is added:\n\n```\n    control_files='/u01/dbfile/O12C/control01.ctl',\
    \ \n                  '/u01/dbfile/O12C/control02.ctl'\n    ```\n\n3.  From the\
    \ OS, copy the existing control file to the location, and name of the control\
    \ file being added:\n\n```\n    $ cp /u01/dbfile/O12C/control01.ctl /u01/dbfile/O12C/control02.ctl\n\
    \    ```\n\n4.  Start up your database:\n\n```\n    SQL> startup;\n    ```\n\n\
    You can view the control files in use by displaying the `CONTROL_FILES` parameter:\n\
    \n```\nSQL> show parameter control_files\n```\n\nFor this example, here is   the\
    \ output:\n\n```\nNAME             TYPE        VALUE\n---------------- -----------\
    \ ------------------------------\ncontrol_files    string      /u01/dbfile/O12C/control01.ctl\n\
                                 ,/u01/dbfile/O12C/control02.ctl\n```\n\nMoving a\
    \ Control File\n\nYou may occasionally need to move a control file from one location\
    \ to another. For example, if new storage is added to the database server, you\
    \ may want to move an existing control file to the newly available location.\n\
    \nThe procedure for moving a control file is very similar to adding a control\
    \ file. The only difference is that you rename the control file instead of copying\
    \ it. This example shows how to move a control file when you’re using an `spfile`:\n\
    \n1.  Determine the `CONTROL_FILES` parameter’s current value:\n\n```\n    SQL>\
    \ show parameter control_files\n\nNAME              TYPE        VALUE\n    -----------------\
    \ ----------- ------------------------------\n    control_files     string      /u01/dbfile/O12C/control01.ctl\n\
    \    ```\n\n2.  Alter your `CONTROL_FILES` parameter to reflect that you’re moving\
    \ a control file. In this example the control file is currently in this location:\n\
    \n```\n    /u01/dbfile/O12C/control01.ctl\n    ```\n\nYou’re moving the control\
    \ file to this location:\n\n```\n    /u02/dbfile/O12C/control01.ctl\n    ```\n\
    \nAlter the `spfile` to reflect the new location for the control file. You have\
    \ to specify `SCOPE=SPFILE` because the `CONTROL_FILES` parameter can’t be modified\
    \ in memory:\n\n```\n    SQL> alter system set\n         control_files='/u02/dbfile/O12C/control01.ctl'\
    \ scope=spfile;\n    ```\n\n3.  Shut down your database:\n\n```\n    SQL> shutdown\
    \ immediate;\n    ```\n\n4.  At the OS prompt, move the control file to the new\
    \ location. This example uses the OS `mv` command:\n\n```\n    $ mv /u01/dbfile/O12C/control01.ctl\
    \ /u02/dbfile/O12C/control01.ctl\n    ```\n\n5.  Start up your database:\n\n```\n\
    \    SQL> startup;\n    ```\n\nYou can verify that the new control file is being\
    \ used by displaying the `CONTROL_FILES` parameter:\n\n```\nSQL> show parameter\
    \ control_files\n```\n\nHere is the output for this example:\n\n```\nNAME            \
    \ TYPE        VALUE\n---------------- ----------- ------------------------------\n\
    control_files    string      /u02/dbfile/O12C/control01.ctl\n```\n\nRemoving a\
    \ Control File\n\nYou may run into a situation in which you experience a media\
    \ failure with a storage device that contains one of your multiplexed control\
    \ files:\n\n```\nORA-00205: error in identifying control file, check alert log\
    \ for more info\n```\n\nIn this scenario, you still have at least one good control\
    \ file. To remove a control file, follow these steps:\n\n1.  Identify which control\
    \ file has experienced media failure by inspecting the `alert.log` for information:\n\
    \n```\n    ORA-00210: cannot open the specified control file\n    ORA-00202: control\
    \ file: '/u01/dbfile/O12C/control02.ctl'\n    ```\n\n2.  Remove the unavailable\
    \ control file name from the `CONTROL_FILES` parameter. If you’re using an `init.ora`\
    \ file, modify the file directly with an OS editor (such as `vi`). If you’re using\
    \ an `spfile`, modify the `CONTROL_FILES` parameter with the `ALTER SYSTEM` statement.\
    \ In this `spfile` example the `control02.ctl` control file is removed from the\
    \ `CONTROL_FILES` parameter:\n\n```\n    SQL> alter system set control_files='/u01/dbfile/O12C/control01.ctl'\n\
    \         scope=spfile;\n    ```"
  trans: "\n## 添加控制文件\n\n1.  在`$ vi $ORACLE_HOME/dbs/initO12C.ora`中编辑初始化参数文件。\n\n\
    \    添加后，`CONTROL_FILES`参数如下所示：\n\n    ```sql\n    control_files='/u01/dbfile/O12C/control01.ctl',\
    \ \n                  '/u01/dbfile/O12C/control02.ctl'\n    ```\n\n2.  在操作系统中，将现有的控制文件复制到要添加的控制文件的目录和名称：\n\
    \n    ```bash\n    $ cp /u01/dbfile/O12C/control01.ctl /u01/dbfile/O12C/control02.ctl\n\
    \    ```\n\n3.  启动数据库：\n\n    ```sql\n    SQL> startup;\n    ```\n\n    通过显示`CONTROL_FILES`参数，可以查看正在使用的控制文件：\n\
    \n    ```sql\n    SQL> show parameter control_files\n    ```\n\n    对于本示例，输出如下：\n\
    \n    ```\n    NAME             TYPE        VALUE\n    ---------------- -----------\
    \ ------------------------------\n    control_files    string      /u01/dbfile/O12C/control01.ctl\n\
    \                                 ,/u01/dbfile/O12C/control02.ctl\n    ```\n\n\
    ## 移动控制文件\n\n有时可能需要将控制文件从一个位置移动到另一个位置。例如，如果为数据库服务器添加了新存储，可能希望将现有控制文件移动到新位置。\n\n\
    移动控制文件的步骤与添加控制文件非常相似。唯一的区别是重命名而不是复制控制文件。此示例展示了在使用`spfile`时如何移动控制文件：\n\n1.  确定`CONTROL_FILES`参数的当前值：\n\
    \n    ```sql\n    SQL> show parameter control_files\n\n    NAME              TYPE\
    \        VALUE\n    ----------------- ----------- ------------------------------\n\
    \    control_files     string      /u01/dbfile/O12C/control01.ctl\n    ```\n\n\
    2.  修改`CONTROL_FILES`参数以反映正在移动控制文件。在此示例中，控制文件当前位置是：\n\n    ```\n    /u01/dbfile/O12C/control01.ctl\n\
    \    ```\n\n    将控制文件移动到此位置：\n\n    ```\n    /u02/dbfile/O12C/control01.ctl\n\
    \    ```\n\n    修改`spfile`以反映控制文件的新位置。必须指定`SCOPE=SPFILE`，因为`CONTROL_FILES`参数无法在内存中修改：\n\
    \n    ```sql\n    SQL> alter system set\n         control_files='/u02/dbfile/O12C/control01.ctl'\
    \ scope=spfile;\n    ```\n\n3.  关闭数据库：\n\n    ```sql\n    SQL> shutdown immediate;\n\
    \    ```\n\n4.  在操作系统提示符下，将控制文件移动到新位置。此示例使用操作系统`mv`命令：\n\n    ```bash\n    $ mv\
    \ /u01/dbfile/O12C/control01.ctl /u02/dbfile/O12C/control01.ctl\n    ```\n\n5.\
    \  启动数据库：\n\n    ```sql\n    SQL> startup;\n    ```\n\n    可以通过显示`CONTROL_FILES`参数来验证是否正在使用新的控制文件：\n\
    \n    ```sql\n    SQL> show parameter control_files\n    ```\n\n    此示例的输出如下：\n\
    \n    ```\n    NAME             TYPE        VALUE\n    ---------------- -----------\
    \ ------------------------------\n    control_files    string      /u02/dbfile/O12C/control01.ctl\n\
    \    ```\n\n## 删除控制文件\n\n可能会遇到包含一个多路复用控制文件的存储设备发生介质故障的情况：\n\n```\nORA-00205: error\
    \ in identifying control file, check alert log for more info\n```\n\n在此场景中，您仍然至少有一个完好的控制文件。要删除控制文件，请遵循以下步骤：\n\
    \n1.  通过检查`alert.log`获取信息来确定哪个控制文件发生了介质故障：\n\n    ```\n    ORA-00210: cannot open\
    \ the specified control file\n    ORA-00202: control file: '/u01/dbfile/O12C/control02.ctl'\n\
    \    ```\n\n2.  从`CONTROL_FILES`参数中移除不可用的控制文件名。如果使用的是`init.ora`文件，请使用操作系统编辑器（如`vi`）直接修改该文件。如果使用的是`spfile`，请使用`ALTER\
    \ SYSTEM`语句修改`CONTROL_FILES`参数。在此`spfile`示例中，从`CONTROL_FILES`参数中移除了`control02.ctl`控制文件：\n\
    \n    ```sql\n    SQL> alter system set control_files='/u01/dbfile/O12C/control01.ctl'\n\
    \         scope=spfile;\n    ```\n"
- fmt: "# Managing Online Redo Logs\n\nThis database now has only one control file\
    \ associated with it. You should never run a production database with just one\
    \ control file. See the section “Adding a Control File,” earlier in this chapter,\
    \ for details on how to add more control files to your database.\n\n3.  Stop and\
    \ start your database:\n\n```sql\nSQL> shutdown immediate;\nSQL> startup;\n```\n\
    \n## Online Redo Logs Purpose\n\nOnline redo logs store a record of transactions\
    \ that have occurred in your database. These logs serve the following purposes:\n\
    \n*   Provide a mechanism for recording changes to the database so that in the\
    \ event of a media failure, you have a method of recovering transactions.\n* \
    \  Ensure that in the event of total instance failure, committed transactions\
    \ can be recovered (crash recovery) even if committed data changes have not yet\
    \ been written to the data files.\n*   Allow administrators to inspect historical\
    \ database transactions through the Oracle LogMiner utility.\n*   They are read\
    \ by Oracle tools such as GoldenGate or Streams to replicate data.\n\nYou’re required\
    \ to have at least two online redo log groups in your database. Each online redo\
    \ log group must contain at least one online redo log member. The member is the\
    \ physical file that exists on disk. You can create multiple members in each redo\
    \ log group, which is known as multiplexing your online redo log group.\n\n![Image](images/sq.jpg)\
    \ **Tip** I highly recommend that you multiplex your online redo log groups and,\
    \ if possible, have each member on a separate physical device governed by a separate\
    \ controller.\n\n## The Log Writer Process\n\nThe log writer is the background\
    \ process responsible for writing transaction information from the redo log buffer\
    \ (in the SGA) to the online redo log files (on disk). Log writer flushes the\
    \ contents of the redo log buffer when any of the following are true:\n\n*   A\
    \ `COMMIT` or `ROLLBACK` issued.\n*   A log switch occurs.\n*   Three seconds\
    \ go by.\n*   The redo log buffer is one-third full.\n*   The redo log buffer\
    \ fills to one megabyte.\n\n## Current Online Redo Log Group and Log Switches\n\
    \nThe online redo log group that the log writer is actively writing to is the\
    \ `current online redo log group`. The log writer writes simultaneously to all\
    \ members of a redo log group. The log writer needs to successfully write to only\
    \ one member in order for the database to continue operating. The database ceases\
    \ operating if the log writer can’t write successfully to at least one member\
    \ of the current group.\n\nWhen the current online redo log group fills up, a\
    \ log switch occurs, and the log writer starts writing to the next online redo\
    \ log group. The log writer writes to the online redo log groups in a round-robin\
    \ fashion. Because you have a finite number of online redo log groups, eventually\
    \ the contents of each online redo log group are overwritten. If you want to save\
    \ a history of the transaction information, you must place your database in archivelog\
    \ mode (see the section “Implementing Archivelog Mode,” later in this chapter).\n\
    \nWhen your database is in archivelog mode, after every log switch the archiver\
    \ background process copies the contents of the online redo log file to an archived\
    \ redo log file. In the event of a failure the archived redo log files allow you\
    \ to restore the complete history of transactions that have occurred since your\
    \ last database backup.\n\n[Figure 2-1](#9781484207642_Ch02.xhtml#Fig1) displays\
    \ a typical setup for the online redo log files. This figure shows three online\
    \ redo log groups, each containing two members. The database is in archivelog\
    \ mode. In the figure, group 2 has recently been filled with transactions, a log\
    \ switch has occurred, and the log writer is now writing to group 3. The archiver\
    \ process is copying the contents of group 2 to an archived redo log file. When\
    \ group 3 fills up, another log switch will occur, and the log writer will begin\
    \ writing to group 1. At the same time, the archiver process will copy the contents\
    \ of group 3 to archive log sequence 3 (and so forth).\n\n![9781484207642_Fig02-01.jpg](images/9781484207642_Fig02-01.jpg)\n\
    \n**Figure 2-1.** Online redo log configuration\n\nThe online redo log files aren’t\
    \ intended to be backed up. These files contain only the most recent redo transaction\
    \ information generated by the database. When you enable archiving, the archived\
    \ redo log files are the mechanism for protecting your database transaction history.\n\
    \n![Image](images/sq.jpg) **Note** In an Oracle Real Application Cluster (RAC)\
    \ database, each instance has its own set of online redo logs. This is known as\
    \ a `thread` of redo. Each RAC instance writes to its own online redo logs and\
    \ generates its own thread of archive redo log files. Additionally, each instance\
    \ must be able to read any other instance’s online redo logs. This is important\
    \ because if one instance crashes, then the other surviving instances can initiate\
    \ instance recovery via reading the crashed instance’s online redo logs.\n\n##\
    \ Protecting Online Redo Log Files\n\nThe contents of the current online redo\
    \ log files aren’t archived until a log switch occurs. This means that if you\
    \ lose all members of the current online redo log file, you lose transactions.\
    \ Listed next are several mechanisms you can implement to minimize the chance\
    \ of failure with the online redo log files:\n\n*   Multiplex the groups.\n* \
    \  If possible, never allow two members of the same group to share the same controller.\n\
    *   If possible, never put two members of the same group on the same physical\
    \ disk.\n*   Ensure that OS file permissions are set appropriately (restrictive,\
    \ that only the owner of the Oracle binaries has permissions to write and read).\n\
    *   Use physical storage devices that are redundant (i.e., RAID [redundant array\
    \ of inexpensive disks]).\n*   Appropriately size the log files, so that they\
    \ switch and are archived at regular intervals.\n*   Consider setting the `ARCHIVE_LAG_TARGET`\
    \ initialization parameter to ensure that the online redo logs are switched at\
    \ regular intervals.\n\n![Image](images/sq.jpg) **Note** The only tool provided\
    \ by Oracle that can protect you and preserve all committed transactions in the\
    \ event you lose all members of the current online redo log group is Oracle Data\
    \ Guard, implemented in maximum protection mode. See MOS note 239100.1 for more\
    \ details regarding Oracle Data Guard protection modes.\n\n## Online Redo Logs\
    \ and Backups\n\nThe online redo log files are never backed up by an RMAN backup\
    \ or by a user-managed hot backup. If you did back up the online redo log files,\
    \ it would be meaningless to restore them. The online redo log files contain the\
    \ latest redo generated by the database. You wouldn’t want to overwrite them from\
    \ a backup with old redo information. For a database in archivelog mode the online\
    \ redo log files contain the most recently generated transactions that are required\
    \ to perform a complete recovery.\n\n## Displaying Online Redo Log Information\n\
    \nUse the `V$LOG` and `V$LOGFILE` views to display information about online redo\
    \ log groups and corresponding members:\n\n```sql\nCOL group#     FORM 99999\n\
    COL thread#    FORM 99999\nCOL grp_status FORM a10\nCOL member     FORM a30\n\
    COL mem_status FORM a10\nCOL mbytes     FORM 999999\n--\nSELECT\n a.group#\n,a.thread#\n\
    ,a.status grp_status\n,b.member member\n,b.status mem_status\n,a.bytes/1024/1024\
    \ mbytes\nFROM v$log     a,\n     v$logfile b\nWHERE a.group# = b.group#\nORDER\
    \ BY a.group#, b.member;\n\nGROUP# THREAD# GRP_STATUS MEMBER                 \
    \        MEM_STATUS  MBYTES\n------ ------- ---------- ------------------------------\
    \ ---------- -------\n     1       1 CURRENT    /u01/oraredo/O12C/redo01a.rdo\
    \            50\n     1       1 CURRENT    /u02/oraredo/O12C/redo01b.rdo     \
    \       50\n     2       1 INACTIVE   /u01/oraredo/O12C/redo02a.rdo          \
    \  50\n     2       1 INACTIVE   /u02/oraredo/O12C/redo02b.rdo            50\n\
    \     3       1 INACTIVE   /u01/oraredo/O12C/redo03a.rdo            50\n     3\
    \       1 INACTIVE   /u02/oraredo/O12C/redo03b.rdo            50\n```"
