    从Oracle 12c开始，您可以直接运行SQL语句，无需使用RMAN的 `sql` 命令和相关的引号；例如，

    ```

    $ rman target /

    RMAN> alter tablespace users offline immediate;

    RMAN> restore tablespace users;

    RMAN> recover tablespace users;

    RMAN> alter tablespace users online;

    ```


    ## 在数据库处于装载（MOUNT）模式时恢复表空间


    通常，在执行恢复时，DBA会关闭数据库并将其重新启动到装载模式，为执行恢复做准备。将数据库置于装载模式可确保没有用户连接到数据库，并且没有事务正在进行。


    此外，如果您要恢复的是 `SYSTEM` 表空间，那么您必须以装载模式启动数据库。Oracle不允许在数据库打开时恢复 `SYSTEM` 表空间的数据文件。下面的示例在数据库处于装载模式时恢复
    `SYSTEM` 表空间：

    ```

    $ rman target /

    RMAN> shutdown immediate;

    RMAN> startup mount;

    RMAN> restore tablespace system;

    RMAN> recover tablespace system;

    RMAN> alter database open;

    ```

    如果成功，您应该看到的最后一条消息是：

    ```

    Statement processed

    ```


    ## 恢复只读表空间


    当您发出 `RESTORE DATDABASE` 命令时，RMAN会随数据库的其余部分一起恢复只读表空间。例如，以下命令将恢复所有数据文件（包括处于只读模式的数据文件）：

    ```

    RMAN> restore database;

    ```

    在Oracle 11g之前，您需要发出 `RESTORE DATABASE CHECK READONLY` 来指示RMAN一起恢复只读表空间和读写模式的表空间。在Oracle
    11g及更高版本中，这不再是必需的。


    ![Image](images/sq.jpg) `Note` 如果您使用的是在只读表空间被置于只读模式之后创建的备份，那么只读数据文件不需要恢复。在这种情况下，自备份以来没有为只读表空间生成重做日志。


    ## 恢复临时表空间


    从Oracle 10g开始，您不必恢复或重新创建丢失的本地管理临时表空间临时文件。当您打开数据库供使用时，Oracle会自动检测并重新创建本地管理临时表空间的临时文件。


    当Oracle自动重新创建临时表空间时，它会向您的目标数据库的 `alert.log` 中记录如下消息：

    ```

    Re-creating tempfile <your temporary tablespace filename>

    ```

    如果由于任何原因，您的临时表空间变得不可用，您也可以自己重新创建它。因为临时表空间中永远不会有永久对象，您可以根据需要简单地重新创建它们。以下是如何创建本地管理临时表空间的示例：

    ```

    CREATE TEMPORARY TABLESPACE temp TEMPFILE

    ''/u01/dbfile/O12C/temp01.dbf'' SIZE 1000M

    EXTENT MANAGEMENT

    LOCAL UNIFORM SIZE 512K;

    ```

    如果您的临时表空间存在，但临时数据文件丢失了，您可以直接添加它们，如下所示：

    ```

    alter tablespace temp

    add tempfile ''/u01/dbfile/O12C/temp02.dbf'' SIZE 5000M REUSE;

    ```


    ## 恢复和恢复数据文件


    数据文件级别的恢复和恢复适用于媒体故障仅限于一小部分数据文件的情况。对于数据文件级别的恢复，您可以指示RMAN使用数据文件名或数据文件号进行恢复和恢复。对于不与
    `SYSTEM` 或 `UNDO` 表空间关联的数据文件，您可以选择在数据库保持打开状态时进行恢复和恢复。但是，在数据库打开时，您必须首先将任何要恢复和恢复的数据文件脱机。


    ### 在数据库打开时恢复和恢复数据文件


    使用 `RESTORE DATAFILE` 和 `RECOVER DATAFILE` 命令在数据文件级别进行恢复和恢复。当您的数据库处于打开状态时，您需要将任何尝试恢复和恢复的数据文件脱机。此示例在数据库打开时恢复和恢复数据文件：

    ```

    RMAN> sql ''alter database datafile 4, 5 offline'';

    RMAN> restore datafile 4, 5;

    RMAN> recover datafile 4, 5;

    RMAN> sql ''alter database datafile 4, 5 online'';

    ```

    ![Image](images/sq.jpg) `Tip` 使用RMAN的 `REPORT SCHEMA` 命令列出数据文件名和文件号。您也可以查询 `V$DATAFILE`
    的 `NAME` 和 `FILE#` 列来获取名称和编号。


    您也可以指定要恢复和恢复的数据文件的名称；例如，

    ```

    RMAN> sql "alter database datafile ''''/u01/dbfile/O12C/users01.dbf'''' offline";

    RMAN> restore datafile ''/u01/dbfile/O12C/users01.dbf'';

    RMAN> recover datafile ''/u01/dbfile/O12C/users01.dbf'';

    RMAN> sql "alter database datafile ''''/u01/dbfile/O12C/users01.dbf'''' online";

    ```

