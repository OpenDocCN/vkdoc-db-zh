    \ DATABASE END BACKUP` 之前的某条语句上失败，您必须手动从 SQL*Plus（以 `SYS` 用户身份）运行 `ALTER DATABASE\
    \ END BACKUP` 来将数据库（表空间）切换出备份模式。\n\n在生成热备份脚本时，同时生成一个可用于从备份目录复制数据文件的脚本是**审慎的做法**。您需要修改此脚本中的\
