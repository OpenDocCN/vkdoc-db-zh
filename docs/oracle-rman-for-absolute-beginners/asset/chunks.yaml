  raw: 'Starting with Oracle 12c, you can run SQL statements directly, without the
    RMAN `sql` command and associated quotation marks; for example,


    ```

    $ rman target /

    RMAN> alter tablespace users offline immediate;

    RMAN> restore tablespace users;

    RMAN> recover tablespace users;

    RMAN> alter tablespace users online;

    ```


    Restoring Tablespaces While the Database Is in Mount Mode


    Usually when performing a restore and recovery, DBAs will shut down the database
    and restart it in mount mode in preparation for performing the recovery. Placing
    a database in mount mode ensures that no users are connecting to the database
    and that no transactions are transpiring.


    Also, if you’re restoring and recovering the `SYSTEM` tablespace, then you must
    start the database in mount mode. Oracle doesn’t allow for restoring and recovering
    the `SYSTEM` tablespace data files while the database is open. This next example
    restores the `SYSTEM` tablespace while the database is in mount mode:


    ```

    $ rman target /

    RMAN> shutdown immediate;

    RMAN> startup mount;

    RMAN> restore tablespace system;

    RMAN> recover tablespace system;

    RMAN> alter database open;

    ```


    If successful, the last message you should see is this:


    ```

    Statement processed

    ```


    Restoring Read-Only Tablespaces


    RMAN will restore read-only tablespaces along with the rest of the database when
    you issue a `RESTORE DATDABASE` command. For example, the following command will
    restore all data files (including those in read-only mode):


    ```

    RMAN> restore database;

    ```


    Prior to Oracle 11g, you were required to issue `RESTORE DATABASE CHECK READONLY`
    to instruct RMAN to restore read-only tablespaces along with tablespaces in read-write
    mode. This is no longer a requirement in Oracle 11g and higher.


    ![Image](images/sq.jpg) **Note**  If you are using a backup that was created after
    the read-only tablespace was placed in read-only mode, then no recovery is necessary
    for the read-only data files. In this situation no redo has been generated for
    the read-only tablespace since it was backed up.


    Restoring Temporary Tablespaces


    Starting with Oracle 10g, you don’t have to restore or re-create missing locally
    managed temporary tablespace temp files. When you open your database for use,
    Oracle automatically detects and re-creates locally managed temporary tablespace
    temp files.


    When Oracle automatically re-creates a temporary tablespace, it will log a message
    to your target database `alert.log` such as this:


    ```

    Re-creating tempfile <your temporary tablespace filename>

    ```


    If, for any reason, your temporary tablespace becomes unavailable, you can also
    re-create it yourself. Because there are never any permanent objects in temporary
    tablespaces, you can simply re-create them as needed. Here is an example of how
    to create a locally managed temporary tablespace:


    ```

    CREATE TEMPORARY TABLESPACE temp TEMPFILE

    ''/u01/dbfile/O12C/temp01.dbf'' SIZE 1000M

    EXTENT MANAGEMENT

    LOCAL UNIFORM SIZE 512K;

    ```


    If your temporary tablespace exists, but the temporary data files are missing,
    you can just add them, as shown:


    ```

    alter tablespace temp

    add tempfile ''/u01/dbfile/O12C/temp02.dbf'' SIZE 5000M REUSE;

    ```


    Restoring and Recovering Data Files


    A data file–level restore and recovery works well when a media failure is confined
    to a small set of data files. With data file–level recoveries, you can instruct
    RMAN to restore and recover either with data file name or data file number. For
    data files not associated with the `SYSTEM` or `UNDO` tablespaces, you have the
    option of restoring and recovering while the database remains open. While the
    database is open, however, you must first take offline any data files being restored
    and recovered.


    Restoring and Recovering Data Files While the Database Is Open


    Use the `RESTORE DATAFILE` and `RECOVER DATAFILE` commands to restore and recover
    at the data file level. When your database is open, you’re required to take offline
    any data files that you’re attempting to restore and recover. This example restores
    and recovers data files while the database is open:


    ```

    RMAN> sql ''alter database datafile 4, 5 offline'';

    RMAN> restore datafile 4, 5;

    RMAN> recover datafile 4, 5;

    RMAN> sql ''alter database datafile 4, 5 online'';

    ```


    ![Image](images/sq.jpg) **Tip**  Use the RMAN `REPORT SCHEMA` command to list
    data file names and file numbers. You can also query the `NAME` and `FILE#` columns
    of `V$DATAFILE` to take names and numbers.


    You can also specify the name of the data file that you want to restore and recover;
    for example,


    ```

    RMAN> sql "alter database datafile ''''/u01/dbfile/O12C/users01.dbf'''' offline";

    RMAN> restore datafile ''/u01/dbfile/O12C/users01.dbf'';

    RMAN> recover datafile ''/u01/dbfile/O12C/users01.dbf'';

    RMAN> sql "alter database datafile ''''/u01/dbfile/O12C/users01.dbf'''' online";

    ```


    ![Image](images/sq.jpg) **Note**  When using the RMAN `sql` command, if there
    are single quotation marks within the SQL statement, then you are required to
    use double quotation marks to enclose the entire SQL statement and two single
    quotation marks where you would ordinarily use just one quotation double mark.


    As mentioned earlier, starting with Oracle 12c, you can run SQL commands directly,
    without the RMAN `sql` command and associated quotation marks; for example,


    ```

    RMAN> alter database datafile 4 offline;

    RMAN> restore datafile 4;

    RMAN> recover datafile 4;

    RMAN> alter database datafile 4 online;

    ```


    Here are the corresponding 12c examples, with the data file names:


    ```

    RMAN> alter database datafile ''/u01/dbfile/O12C/users01.dbf'' offline;

    RMAN> restore datafile ''/u01/dbfile/O12C/users01.dbf'';

    RMAN> recover datafile ''/u01/dbfile/O12C/users01.dbf'';

    RMAN> alter database datafile ''/u01/dbfile/O12C/users01.dbf'' online;

    ```


    Restoring and Recovering Data Files While the Database Is Not Open


    In this scenario the database is first shut down and then started in mount mode.
    You can restore and recover any data file in your database while the database
    is not open. This example shows the restoring of data file 1, which is associated
    with the `SYSTEM` tablespace:


    ```

    $ rman target /

    RMAN> shutdown abort;

    RMAN> startup mount;

    RMAN> restore datafile 1;

    RMAN> recover datafile 1;

    RMAN> alter database open;

    ```


    You can also specify the file name when performing a data file recovery:


    ```

    $ rman target /

    RMAN> shutdown abort;

    RMAN> startup mount;

    RMAN> restore datafile ''/u01/dbfile/O12C/system01.dbf'';

    RMAN> recover datafile ''/u01/dbfile/O12C/system01.dbf'';

    RMAN> alter database open;

    ```


    Restoring Data Files to Nondefault Locations


    Sometimes a failure will occur that renders the disks associated with a mount
    point inoperable. In these situations, you will need to restore and recover the
    data files to a location different from the one where they originally resided.
    Another typical need for restoring data files to nondefault locations is that
    you’re restoring to a different database server, on which the mount points are
    completely different from those of the server on which the backup originated.


    Use the `SET NEWNAME` and `SWITCH` commands to restore data files to nondefault
    locations. Both of these commands must be run from within an RMAN `run{}` block.
    You can think of using `SET NEWNAME` and `SWITCH` as a way to rename data files
    (similar to the SQL*Plus `ALTER DATABASE RENAME FILE` statement).


    This example changes the location of data files when doing a restore and recover.
    First, place the database in mount mode:


    ```

    $ rman target /

    RMAN> startup mount;

    ```


