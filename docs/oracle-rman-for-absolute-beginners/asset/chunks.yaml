    backup technologies, then I strongly recommend that you switch to RMAN. RMAN contains
    a powerful set of features that are unmatched by any other backup tool available.
    RMAN is easy to use and configure. It will save you time and effort and give you
    peace of mind when you’re implementing a rock-solid B&R strategy.


    If you’re new to RMAN, it may not be obvious which features should always be enabled
