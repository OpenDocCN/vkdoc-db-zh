    \ is currently being written to by the archiver process—doing so results in an\
    \ incomplete copy of that file. Sometimes, DBAs script this process by checking\
    \ the maximum `SEQUENCE#` with the maximum `RESETLOGS_ID` in the `V$ARCHIVED_LOG`\
    \ view. Oracle updates that view when it’s finished copying the archive redo log\
    \ to disk. Therefore, any archive redo log file that appears in the `V$ARCHIVED_LOG`\
    \ view should be safe to copy.\n\n## Scripting Hot Backups\n\nThe script in this\
    \ section covers the minimal tasks associated with a hot backup. For a production\
    \ environment a hot backup script can be quite complex. The script given here\
    \ provides you with a baseline of what you should include in a hot backup script.\
