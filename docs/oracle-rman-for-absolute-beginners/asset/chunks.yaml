- fmt: 'You may want to do this as part of a backup strategy or to replicate data
    to a different database. Data Pump import uses an export dump file as its input
    and recreates database objects contained in the export file. The procedure for
    importing is similar to exporting:

    1.  Create a database directory object that points to an OS directory that you
    want to read/write Data Pump files from.

    2.  Grant read and write privileges on the directory object to the database user
    running the export or import.

    3.  From the OS prompt, run the `impdp` command.


    Steps 1 and 2 were covered in the prior section, “Taking an Export,” and therefore
    will not be repeated here.


    Before running the import job, drop the `INV` table that was created previously.

    ```

    SQL> drop table inv purge;

    ```


    Next, recreate the `INV` table from the export taken:

    ```

    $ impdp mv_maint/foo directory=dp_dir dumpfile=exp.dmp logfile=imp.log

    ```


    You should now have the `INV` table recreated and populated with data as it was
    at the time of the export. Now is a good time to inspect again Figures 8-1 and
    8-2. Make sure you understand which files were created by `expdb` and which files
    were used by `impdp`.


    ## Using a Parameter File


    Instead of typing commands on the command line, in many situations it’s better
    to store the commands in a file and then reference the file when executing Data
    Pump export or import. Using parameter files makes tasks more repeatable and less
    prone to error. You can place the commands in a file once and then reference that
    file multiple times.


    Additionally, some Data Pump commands (such as `FLASHBACK_TIME`) require the use
    of quotation marks; in these situations, it’s sometimes hard to predict how the
    OS will interpret these. Whenever a command requires quotation marks, it’s highly
    preferable to use a parameter file.


    To use a parameter file, first create an OS text file that contains the commands
    you want to use to control the behavior of your job. This example uses the Linux/Unix
    `vi` command to create a text file named `exp.par`:

    ```

    $ vi exp.par

    ```


    Now, place the following commands in the `exp.par` file:

    ```

    userid=mv_maint/foo

    directory=dp_dir

    dumpfile=exp.dmp

    logfile=exp.log

    tables=inv

    reuse_dumpfiles=y

    ```


    Next, the export operation references the parameter file via the `PARFILE` command
    line option:

    ```

    $ expdp parfile=exp.par

    ```


    Data Pump processes the parameters in the file as if they were typed on the command
    line. If you find yourself repeatedly typing the same commands or using commands
    that require quotation marks, or both, then consider using a parameter file to
    increase your efficiency.


    `Tip` Don’t confuse a Data Pump parameter file with the database initialization
    parameter file. A Data Pump parameter file instructs Data Pump as to which user
    to connect to the database as, which directory locations to read/write files to
    and from, what objects to include in the operation, and so on. In contrast, a
    database parameter file establishes characteristics of the instance upon database
    startup.


    ## Exporting and Importing with Granularity


    Recall from the section “Data Pump Architecture,” earlier in this chapter, that
    there are several different modes in which you can invoke the export/import utilities.
    For instance, you can instruct Data Pump to export/import in the following modes:

    *   Entire database

    *   Schema level

    *   Table level

    *   Tablespace level

    *   Transportable tablespace level


    Before diving into the many features of Data Pump, it''s useful to discuss these
    modes and ensure you’re aware of how each operates. This will further lay the
    foundation for understanding concepts introduced later in the chapter.


    ### Exporting and Importing an Entire Database


    When you export an entire database, this is sometimes referred to as a full export.


    In this mode the resultant export file contains everything required to make a
    copy of your database. Unless restricted by filtering parameters (see the section
    “Filtering Data and Objects,” later in this chapter), a full export consists of

    *   all DDL required to recreate tablespaces, users, user tables, indexes, constraints,
    triggers, sequences, stored PL/SQL, and so on.

    *   all table data (except the `SYS` user’s tables)


    A full export is initiated with the `FULL` parameter set to `Y` and must be done
    with a user that has DBA privileges or that has the `DATAPUMP_EXP_FULL_DATABASE`
    role granted to it. Here is an example of taking a full export of a database:

    ```

    $ expdp mv_maint/foo directory=dp_dir dumpfile=full.dmp logfile=full.log full=y

    ```


    As the export is executing, you should see this text in the output, indicating
    that a full-level export is taking place:

    ```

    Starting "MV_MAINT"."SYS_EXPORT_FULL_01":

    ```


    Be aware that a full export doesn’t export everything in the database:

    *   The contents of the `SYS` schema are not exported (there are a few exceptions
    to this, such as the `AUD$` table). Consider what would happen if you could export
    the contents of the `SYS` schema from one database and import them into another.
    The `SYS` schema contents would overwrite internal data dictionary tables/views
    and thus corrupt the database. Therefore, Data Pump never exports objects owned
    by `SYS`.

    *   Index data are not exported, but rather, the index DDL that contains the SQL
    required to recreate the indexes during a subsequent import.


    Once you have a full export, you can use its contents to either recreate objects
    in the original database (e.g., in the event a table is accidentally dropped)
    or replicate the entire database or subsets of users/tables to a different database.
    This next example assumes that the dump file has been copied to a different database
    server and is now used to import all objects into the destination database:

    ```

    $ impdp mv_maint/foo directory=dp_dir dumpfile=full.dmp logfile=fullimp.log full=y

    ```


    `Tip` To initiate a full database import, you must have DBA privileges or be assigned
    the `DATAPUMP_IMP_FULL_DATABASE` role.


    In the output displayed on your screen, you should see an indication that a full
    import is transpiring:

    ```

    Starting "MV_MAINT"."SYS_IMPORT_FULL_01":

    ```


    Running a full-import database job has some implications to be aware of:

    *   The import job will first attempt to recreate any tablespaces. If a tablespace
    already exists, or if the directory path a tablespace depends on doesn’t exist,
    then the tablespace creation statements will fail, and the import job will move
    on to the next task.

    *   Next, the import job will alter the `SYS` and `SYSTEM` user accounts to contain
    the same password that was exported. Therefore, after you import from a production
    system, it’s prudent to change the passwords for `SYS` and `SYSTEM`, to reflect
    the new environment.

    *   Additionally, the import job will then attempt to create any users in the
    export file. If a user already exists, an error is thrown, and the import job
    moves on to the next task.

    *   Users will be imported with the same passwords that were taken from the original
    database. Depending on your security standards, you may want to change the passwords.

    *   Tables will be recreated. If a table already exists and contains data, you
    must specify how you want the import job to handle this. You can have the import
    job either skip, append, replace, or truncate the table (see the section “Importing
    When Objects Already Exist,” later in this chapter).

    *   After each table is created and populated, associated indexes are created.

    *   The import job will also try to import statistics if available. Furthermore,
    object grants are instantiated.'
