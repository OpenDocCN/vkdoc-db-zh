    ## OPEN RESETLOGS 的目的


    有时，你可能被要求使用 `OPEN RESETLOGS` 子句打开数据库。你可能在重建控制文件、使用备份控制文件执行还原和恢复、或者执行不完全恢复时这样做。当你使用
    `OPEN RESETLOGS` 子句打开数据库时，它要么会清除任何现有的联机重做日志文件，要么（如果文件不存在）重新创建它们。你可以查询 `V$LOGFILE`
    的 `MEMBER` 列，以查看哪些文件涉及 `OPEN RESETLOGS` 操作。


    为什么你想清除联机重做日志中的内容呢？以不完全恢复为例，其中数据库被故意打开到过去的某个时间点。在这种情况下，联机重做日志中的 `SCN` 信息包含了永远不会被恢复的事务数据。Oracle
    强制你使用 `OPEN RESETLOGS` 打开数据库，以故意清除这些信息。


    当你使用 `OPEN RESETLOGS` 打开数据库时，你创建了数据库的一个新化身，并将日志序列号重置回 1。Oracle 要求一个新化身，以避免在需要另一次还原和恢复时，意外使用任何旧的归档重做日志（与数据库的独立化身相关联）。


    ## 总结


    一些研究表明，过度依赖自动驾驶技术的飞机飞行员，在应对灾难性飞行中问题方面的能力，不如那些花了大量时间在无自动驾驶辅助下飞行的飞行员。过度依赖自动驾驶的飞行员在出现严重问题时往往会忘记关键程序，而不太依赖自动驾驶的飞行员则更擅长诊断和解决令人紧张的飞行故障。


    同样，理解如何使用用户管理技术手动备份、还原和恢复数据库的 DBA，在故障排除和解决严重的备份与恢复问题方面，比那些仅通过屏幕操作备份和恢复技术的 DBA
    更为熟练。这就是我在本书中包含本章的原因。理解每一步发生了什么以及为什么需要这一步，对于完全掌握 Oracle 备份和恢复架构至关重要。这种意识会转化为在使用
    Oracle 工具（如 `RMAN`（备份和恢复）、`Enterprise Manager` 和 `Data Guard`（灾难恢复、高可用性和复制）时的关键故障排除技能。


    本章介绍的用户管理备份和恢复技术如今已很少被教授或使用。大多数 DBA 正在（并且应该）使用 `RMAN` 来满足其 Oracle 备份和恢复需求。然而，理解冷备份和热备份的工作原理至关重要。你可能会发现自己受雇于一个实施了旧技术的单位，并且需要还原和恢复数据库、进行故障排除，或协助迁移到
    `RMAN`。在这些场景中，你必须完全理解旧的备份技术。


    现在你已经对 Oracle 备份和恢复机制有了深入的理解，准备好研究 `RMAN` 了。接下来的几章将探讨如何配置和使用 `RMAN` 进行备份和恢复。


    # 第 4 章


    ![image](img/frontdot.jpg)


    ## 配置 RMAN


    如本书前面所述，`RMAN` 是 Oracle 的旗舰级 `B&R` 工具。当你安装 Oracle 软件时（标准版和企业版），默认就会提供 `RMAN`。`RMAN`
    提供了一套强大而灵活的 `B&R` 功能。以下列表突出了一些最显著的特点：


    *   易于使用的备份、还原和恢复命令。

    *   能够跟踪哪些文件已被备份以及备份位置。管理过时备份和归档重做日志的删除。

    *   并行化：可以使用多个进程进行备份、还原和恢复。

    *   仅备份自上次备份以来更改的增量备份。

    *   在数据库、表空间、数据文件、表或块级别进行恢复。

    *   高级压缩和加密功能。

    *   与介质管理器集成以进行磁带备份。

    *   备份验证和测试。

    *   跨平台数据转换。

    *   数据恢复顾问，可协助诊断故障并提出解决方案。

    *   能够检测数据文件中的损坏块。

    *   从 `RMAN` 命令行进行高级报告。


    本章的目标是提供足够的关于 `RMAN` 的信息，使你能够就如何实施可靠的备份策略做出合理的决策。首先描述基本的 `RMAN` 组件，然后你将逐步了解实施
    `RMAN` 过程中涉及的许多决策点。


    ## 理解 RMAN


    `RMAN` 由许多不同的组件组成。图 4-1 展示了主要 `RMAN` 组件的交互。在阅读本节时请参考此图。


    ![9781484207642_Fig04-01.jpg](img/9781484207642_Fig04-01.jpg)


    图 4-1. `RMAN` 架构组件


    以下列表描述了 `RMAN` 架构组件：

    '
- fmt: '*   `DBA`: Appears somewhat short and bald in the diagram, which isn’t far
    from the truth (in my case).

    *   `Target database`: The database being backed up by RMAN. You connect to the
    target database with the RMAN command-line `TARGET` parameter (see the next section
    for more details).

    *   `RMAN client`: The `rman` utility from which you issue `BACKUP`, `RESTORE`,
    and `RECOVER` commands. On most database servers the `rman` utility is located
    in the `ORACLE_HOME/bin` directory (along with all the other Oracle utilities,
    such as `sqlplus` and `expdp`).

    *   `Oracle server processes`: When you execute the `rman` client and connect
    to the target database, two Oracle server background processes are started. The
    first default server process interacts with the PL/SQL packages to coordinate
    the backup activities. The secondary polling process occasionally updates Oracle
    data dictionary structures.

    *   `Channel(s)`: The Oracle server processes for handling I/O between files being
    backed up (or restored) and the backup device (disk or tape).

    *   `PL/SQL packages`: RMAN uses two internal PL/SQL packages (owned by `SYS`)
    to perform B&R tasks: `DBMS_RCVMAN` and `DBMS_BACKUP_RESTORE.DBMS_RCVMAN` accesses
    information in the control file and passes that to the RMAN server processes.
    The `DBMS_BACKUP_RESTORE` package performs most of RMAN’s work. For example, this
    package creates the system calls that direct the channel processes to perform
    B&R operations.

    *   `Memory buffers (PGA or SGA)`: RMAN uses a memory area in the PGA (and sometimes
    in the SGA) as a buffer when reading from data files and copying subsequent blocks
    to back up files.

    *   `Auxiliary database`: A database to which RMAN restores target database data
    files for the purpose of duplicating a database, creating a Data Guard standby
    database, or performing a DBPITR.

    *   `Backup/Back up`: Can be either a noun or a verb. The physical files (backup)
    that store the backed up files; or, the act of copying and archiving (backing
    up) files. Backups can consist of backup sets and backup pieces or image copies.

    *   `Backup set`: When you run an RMAN `BACKUP` command, by default, it creates
    one or more backup sets. A backup set is a logical RMAN construct that groups
    backup piece files. You can think of the relationship of a backup set to a backup
    piece as similar to the relationship between a tablespace and a data file: one
    is a logical construct, the other is a physical file.

    *   `Backup piece file`: RMAN binary backup files. Each logical backup set consists
    of one or more backup piece files. These are the physical files that RMAN creates
    on disk or tape. They’re binary, proprietary format files that only RMAN can read
    or write to. A backup piece can contain blocks from many different data files.
    Backup piece files are typically smaller than data files, because backup pieces
    only contain blocks that have been used in the data files.

    *   `Image copy`: Initiated with the `BACKUP AS COPY` command. A type of backup
    in which RMAN creates identical copies of a data file, archive redo log file,
    or control file. Image copies can be operated on by OS utilities such as the Linux
    `cp` and `mv` commands. Image copies are used as part of incrementally updated
    image backups. Sometimes, it’s preferable to use image copies rather than backup
    sets if you need to be able to restore quickly.

    *   `Recovery catalog`: An optional database schema that contains tables used
    to store metadata information regarding RMAN backup operations. Oracle strongly
    recommends using a recovery catalog, because it provides more options for B&R.

    *   `Media manager`: Third-party software that allows RMAN to back up files directly
    to tape. Backing up to tape is desirable when you don’t have enough room to back
    up directly to disk or when disaster recovery requirements necessitate a backup
    to storage that can be easily moved offsite.

    *   `FRA`: An optional disk area that RMAN can use for backups.

    You can also use the FRA to multiplex control files and online redo logs. You
    instantiate a fast recovery with the database initialization parameters `DB_RECOVERY_FILE_DEST_SIZE`
    and `DB_RECOVERY_FILE_DEST`.

    *   `Snapshot control file`: RMAN requires a read-consistent view of the control
    file when either backing up the control file or synchronizing with the recovery
    catalog (if it’s being used). In these situations, RMAN first creates a temporary
    copy (snapshot) of the control file. This allows RMAN to use a version of the
    control file that is guaranteed not to change while backing up the control file
    or synchronizing with the recovery catalog.'
  raw: '*   **DBA:** Appears somewhat short and bald in the diagram, which isn’t far
    from the truth (in my case).

    *   **Target database:** The database being backed up by RMAN. You connect to
    the target database with the RMAN command-line `TARGET` parameter (see the next
    section for more details).

    *   **RMAN client:** The `rman` utility from which you issue `BACKUP`, `RESTORE`,
    and `RECOVER` commands. On most database servers the `rman` utility is located
    in the `ORACLE_HOME/bin` directory (along with all the other Oracle utilities,
    such as `sqlplus` and `expdp`).

    *   **Oracle server processes:** When you execute the `rman` client and connect
    to the target database, two Oracle server background processes are started. The
    first default server process interacts with the PL/SQL packages to coordinate
    the backup activities. The secondary polling process occasionally updates Oracle
    data dictionary structures.

    *   **Channel(s):** The Oracle server processes for handling I/O between files
    being backed up (or restored) and the backup device (disk or tape).

    *   **PL/SQL packages:** RMAN uses two internal PL/SQL packages (owned by `SYS`)
    to perform B&R tasks: `DBMS_RCVMAN` and `DBMS_BACKUP_RESTORE.DBMS_RCVMAN` accesses
    information in the control file and passes that to the RMAN server processes.
    The `DBMS_BACKUP_RESTORE` package performs most of RMAN’s work. For example, this
    package creates the system calls that direct the channel processes to perform
    B&R operations.

    *   **Memory buffers** **(PGA or SGA):** RMAN uses a memory area in the PGA (and
    sometimes in the SGA) as a buffer when reading from data files and copying subsequent
    blocks to back up files.

    *   **Auxiliary database:** A database to which RMAN restores target database
    data files for the purpose of duplicating a database, creating a Data Guard standby
    database, or performing a DBPITR.

    *   **Backup/Back up:** Can be either a noun or a verb. The physical files (backup)
    that store the backed up files; or, the act of copying and archiving (backing
    up) files. Backups can consist of backup sets and backup pieces or image copies.

    *   **Backup set:** When you run an RMAN `BACKUP` command, by default, it creates
    one or more backup sets. A backup set is a logical RMAN construct that groups
    backup piece files. You can think of the relationship of a backup set to a backup
    piece as similar to the relationship between a tablespace and a data file: one
    is a logical construct, the other is a physical file.

    *   **Backup piece file:** RMAN binary backup files. Each logical backup set consists
    of one or more backup piece files. These are the physical files that RMAN creates
    on disk or tape. They’re binary, proprietary format files that only RMAN can read
    or write to. A backup piece can contain blocks from many different data files.
    Backup piece files are typically smaller than data files, because backup pieces
    only contain blocks that have been used in the data files.

    *   **Image copy:** Initiated with the `BACKUP AS COPY` command. A type of backup
    in which RMAN creates identical copies of a data file, archive redo log file,
    or control file. Image copies can be operated on by OS utilities such as the Linux
    `cp` and `mv` commands. Image copies are used as part of incrementally updated
    image backups. Sometimes, it’s preferable to use image copies rather than backup
    sets if you need to be able to restore quickly.

    *   **Recovery catalog:** An optional database schema that contains tables used
    to store metadata information regarding RMAN backup operations. Oracle strongly
    recommends using a recovery catalog, because it provides more options for B&R.

    *   **Media manager:** Third-party software that allows RMAN to back up files
    directly to tape. Backing up to tape is desirable when you don’t have enough room
    to back up directly to disk or when disaster recovery requirements necessitate
    a backup to storage that can be easily moved offsite.

    *   **FRA:** An optional disk area that RMAN can use for backups.


    You can also use the FRA to multiplex control files and online redo logs. You
    instantiate a fast recovery with the database initialization parameters `DB_RECOVERY_FILE_DEST_SIZE`
    and `DB_RECOVERY_FILE_DEST`.

    *   **Snapshot control file:** RMAN requires a read-consistent view of the control
    file when either backing up the control file or synchronizing with the recovery
    catalog (if it’s being used). In these situations, RMAN first creates a temporary
    copy (snapshot) of the control file. This allows RMAN to use a version of the
    control file that is guaranteed not to change while backing up the control file
    or synchronizing with the recovery catalog.'
  trans: '

    *   `DBA`：在图中看起来有些秃顶，这与事实相去不远（就我而言）。

    *   `目标数据库`：由 RMAN 执行备份的数据库。你可以通过 RMAN 命令行的 `TARGET` 参数连接到目标数据库（更多详情请参见下一节）。

    *   `RMAN 客户端`：发出 `BACKUP`、`RESTORE` 和 `RECOVER` 命令的 `rman` 工具。在大多数数据库服务器上，`rman`
    工具位于 `ORACLE_HOME/bin` 目录中（与其他所有 Oracle 实用程序一起，例如 `sqlplus` 和 `expdp`）。

    *   `Oracle 服务器进程`：当你执行 `rman` 客户端并连接到目标数据库时，会启动两个 Oracle 服务器后台进程。第一个默认的服务器进程与
    PL/SQL 包交互以协调备份活动。次要的轮询进程偶尔会更新 Oracle 数据字典结构。

    *   `通道`：用于处理正在备份（或还原）的文件与备份设备（磁盘或磁带）之间 I/O 的 Oracle 服务器进程。

    *   `PL/SQL 包`：RMAN 使用两个内部 PL/SQL 包（由 `SYS` 拥有）来执行 B&R 任务：`DBMS_RCVMAN` 和 `DBMS_BACKUP_RESTORE`。`DBMS_RCVMAN`
    访问控制文件中的信息，并将其传递给 RMAN 服务器进程。`DBMS_BACKUP_RESTORE` 包执行 RMAN 的大部分工作。例如，该包创建系统调用，指导通道进程执行
    B&R 操作。

    *   `内存缓冲区（PGA 或 SGA）`：RMAN 在从数据文件读取并将后续块复制到备份文件时，使用 PGA（有时也使用 SGA）中的一个内存区域作为缓冲区。

    *   `辅助数据库`：RMAN 为克隆数据库、创建 Data Guard 备用数据库或执行 DBPITR 而将目标数据库数据文件还原到的数据库。

    *   `备份`：既可以是名词，也可以是动词。指存储已备份文件的物理文件（备份）；或者，指复制和归档（备份）文件的操作。备份可以由备份集和备份片段或映像副本组成。

    *   `备份集`：当你运行 RMAN `BACKUP` 命令时，默认情况下会创建一个或多个备份集。备份集是一个逻辑 RMAN 构造，用于分组备份片段文件。你可以将备份集与备份片段的关系，视为类似于表空间与数据文件的关系：一个是逻辑构造，另一个是物理文件。

    *   `备份片段文件`：RMAN 的二进制备份文件。每个逻辑备份集由一个或多个备份片段文件组成。这些是 RMAN 在磁盘或磁带上创建的物理文件。它们是二进制、专有格式的文件，只有
    RMAN 能够读取或写入。一个备份片段可以包含来自许多不同数据文件的块。备份片段文件通常比数据文件小，因为备份片段只包含数据文件中已使用的块。

    *   `映像副本`：使用 `BACKUP AS COPY` 命令启动。一种备份类型，其中 RMAN 创建数据文件、归档重做日志文件或控制文件的完全相同的副本。映像副本可以由操作系统实用程序（如
    Linux 的 `cp` 和 `mv` 命令）操作。映像副本用作增量更新映像备份的一部分。有时，如果你需要能够快速恢复，使用映像副本比使用备份集更可取。

    *   `恢复目录`：一个可选的数据库模式，包含用于存储有关 RMAN 备份操作的元数据信息的表。Oracle 强烈建议使用恢复目录，因为它为 B&R 提供了更多选项。

    *   `介质管理器`：允许 RMAN 直接将文件备份到磁带的第三方软件。当你没有足够空间直接备份到磁盘，或者灾难恢复要求必须备份到可以轻松运送到异地的存储时，备份到磁带是理想的。

    *   `FRA`：RMAN 可用于备份的可选磁盘区域。你还可以使用 FRA 来多路复用控制文件和联机重做日志。你通过数据库初始化参数 `DB_RECOVERY_FILE_DEST_SIZE`
    和 `DB_RECOVERY_FILE_DEST` 来实例化一个快速恢复区。

    *   `快照控制文件`：当备份控制文件或与恢复目录（如果正在使用）同步时，RMAN 需要控制文件的一致性视图。在这些情况下，RMAN 首先创建控制文件的临时副本（快照）。这使得
    RMAN 能够使用一个保证在备份控制文件或与恢复目录同步期间不会更改的控制文件版本。

    '
- fmt: '# RMAN备份类型


    您可以使用RMAN制作多种类型的备份：


    *   **完整备份：**备份与数据文件关联的所有已修改块。完整备份并非整个数据库的备份。例如，您可以对一个数据文件进行完整备份。

    *   **增量级别0备份：**备份与完整备份相同的块。级别0备份与完整备份的唯一区别在于，您可以将级别0备份与其他增量备份结合使用，而完整备份则不能。

    *   **增量级别1备份：**仅备份自上次备份以来已修改的块。级别1增量备份可以是差异备份或累积备份。差异级别1备份是默认类型，备份自上次级别0或级别1备份以来所有已修改的块。累积级别1备份备份自上次级别0备份以来所有已更改的块。

    *   **增量更新备份：**首先创建数据文件的映像副本，随后的增量备份会与该映像副本合并。这是利用映像副本进行备份的一种高效方式。使用增量更新备份进行介质恢复速度很快，因为在还原过程中使用的是数据文件的映像副本。

    *   **块变化跟踪：**数据库功能，用于跟踪数据库中已更改的块。更改块的记录保存在一个二进制文件中。RMAN可以利用该二进制文件的内容来提高增量备份的性能：无需扫描数据文件中所有已修改的块，RMAN可以通过二进制块变化跟踪来确定哪些块已发生变化。


    现在您已经了解了RMAN的架构组件和可以制作的备份类型，可以准备启动RMAN并为其配置环境。


    # 启动RMAN


    在启动RMAN并连接到您的数据库之前，您需要确保已设置正确的操作系统变量，并且拥有具备`sys*`权限的账户访问权限。一旦这些条件就绪，您就可以通过`rman`命令行实用程序启动RMAN并连接到目标数据库。连接到数据库所需的这些相同条件，如前面[第1章](#9781484207642_Ch01.xhtml)所述。如果您不熟悉这些条件，现在可能需要回顾一下[第1章](#9781484207642_Ch01.xhtml)。


    您可以通过操作系统命令行界面或企业管理器（EM）连接到RMAN。使用EM进行备份和恢复超出了本书的范围。本书的示例侧重于命令行界面。


    ![Image](images/sq.jpg) 即使您使用基于屏幕的企业管理器工具，了解用于备份和恢复操作的RMAN命令也很有用。这种知识是无论使用何种界面使用RMAN的基础。在调试和排除问题时，这种认识特别有用。


    以下示例假设您已使用分配到特权组（如`dba`）的`oracle`操作系统账户登录到Linux/Unix服务器，并建立了所需的OS变量。然后您可以按如下方式调用RMAN并连接到目标数据库：


    ```

    $ rman target /

    ```


    这是输出片段：


    ```

    connected to target database: O12C (DBID=3458744089)

    ```


    如果您使用的是密码文件，则需要指定已被授予适当系统权限的用户名和密码：


    ```

    $ rman target <user>/<password>

    ```


    如果您通过Oracle Net远程访问目标数据库，则需要在目标服务器上有一个密码文件，并且还需要指定连接字符串，如下所示：


    ```

    $ rman target <user with sys* priv>/<password>@<database connection string>

    ```


    您也可以先调用RMAN，然后从RMAN提示符连接到目标数据库，作为第二步操作：


    ```

    $ rman

    RMAN> connect target /

    ```'
  raw: 'You can make several types of backups with RMAN:


    *   **Full backup:** All modified blocks associated with the data file are backed
    up. A full backup is not a backup of the entire database. For example, you can
    make a full backup of one data file.

    *   **Incremental level 0 backup:** Backs up the same blocks as a full backup.
    The only difference between a level 0 backup and a full backup is that you can
    use a level 0 backup with other incremental backups, but not a full backup.

    *   **Incremental level 1 backup:** Backs up only blocks that have been modified
    since the previous backup. Level 1 incremental backups can be either differential
    or cumulative. A differential level 1 backup is the default and backs up all blocks
    that have been modified since the last level 0 or level 1 backup. A cumulative
    level 1 backup backs up all blocks that have changed since the last level 0 backup.

    *   **Incrementally updated backup:** First creates an image copy of the data
    files, after which subsequent backups are incremental backups that are merged
    with the image copy. This is an efficient way to use image copies for backups.
    Media recoveries using incrementally updated backups are fast because the image
    copy of the data file is used during the restore.

    *   **Block change tracking:** Database feature that keeps track of blocks that
    have changed in the database. A record of the changed blocks is kept in a binary
    file. RMAN can use the contents of the binary file to improve the performance
    of incremental backups: instead of having to scan all modified blocks in a data
    file, RMAN can determine which blocks have changed from the binary block change
    tracking.


    Now that you understand the RMAN architectural components and the types of backups
    you can make, you’re ready to start up RMAN and configure it for your environment.


    Starting RMAN


    Before you start RMAN and connect to your database, you need to ensure that you
    have the proper OS variables set and that you have access to an account with `sys*`
    privileges. Once those are in place, you can start RMAN and connect to your target
    database via the `rman` command-line utility. These are the same conditions that
    need to be in place before connecting to your database as a privileged user are
    described earlier in [Chapter 1](#9781484207642_Ch01.xhtml). You may want to review
    [Chapter 1](#9781484207642_Ch01.xhtml) now if you’re not familiar with these conditions.


    You can connect to RMAN either through the operating system command-line interface
    or through Enterprise Manager (EM). Using EM for backup and recovery is out of
    scope for this book. This book focuses on the command-line interface for its examples.


    ![Image](images/sq.jpg) **Tip**  Even if you use the screen based Enterprise Manager
    tool, it’s useful to understand the RMAN commands used for backup and recovery
    operations. This knowledge the foundation for using RMAN regardless of the interface.
    This awareness is particularly useful when debugging and troubleshooting problems.


    The following example assumes you have logged on to a Linux/Unix server using
    the `oracle` operating system account assigned to a privileged group, such as
    `dba` and have established the required OS variables. You can then invoke RMAN
    and connect to the target database as follows:


    ```

    $ rman target /

    ```


    Here is a snippet of the output:


    ```

    connected to target database: O12C (DBID=3458744089)

    ```


    If you’re using a password file, then you need to specify the username and password
    that have been granted proper system privileges:


    ```

    $ rman target <user>/<password>

    ```


    If you’re accessing your target database remotely via Oracle Net, you will need
    a password file on the target server and will also need to specify a connection
    string as follows:


    ```

    $ rman target <user with sys* priv>/<password>@<database connection string>

    ```


    You can also invoke RMAN and then connect to your target database as a second
    step, from the RMAN prompt:


    ```

    $ rman

    RMAN> connect target /

    ```'
