  raw: '```

    $ rman target /

    RMAN> alter pluggable database salespdb close;

    RMAN> restore pluggable database salespdb;

    RMAN> recover pluggable database salespdb;

    RMAN> alter pluggable database salespdb open;

    ```


    You can also connect directly to a pluggable database and perform restore and
    recovery operations. When connected directly to the pluggable database, the user
    only has access to the data files associated with the pluggable database:


    ```

    $ rman target sys/foo@salespdb

    RMAN> shutdown immediate;

    RMAN> restore database;

    RMAN> recover database;

    RMAN> alter database open;

    ```


    ![Image](images/sq.jpg) **Note**  When you’re connected directly to a pluggable
    database, you can’t specify the name of the pluggable database as part of the
    `RESTORE` and `RECOVER` commands. In this situation, you’ll get an `RMAN-07536:
    command not allowed when connected to a Pluggable Database` error.


    The prior code only affects data files associated with the pluggable database
    to which you are connected. The pluggable database needs to be closed for this
    to work. However, the root container database can be open or mounted. Also, you
    must use a backup that was taken while connected to the pluggable database as
    a privileged user. The privileged pluggable database user can’t access backups
    of data files initiated by the root container database privileged user.


    Restoring Archive Redo Log Files


    RMAN will automatically restore any archived redo log files that it needs during
    a recovery process. You normally don’t need to restore archived redo log files
    manually. However, you may want to do so if any of the following situations apply:


    *   You need to restore archived redo log files in anticipation of later performing
    a recovery; the idea is that if the archived redo log files are already restored,
    it will speed the recovery operation.

    *   You’re required to restore the archived redo log files to a nondefault location,
    either because of media failure or because of storage space issues.

    *   You need to restore specific archived redo log files in order to inspect them
    via LogMiner.


    If you’ve enabled an FRA, then RMAN will, by default, restore archived redo log
    files to the destination defined by the initialization parameter `DB_RECOVERY_FILE_DEST`.
    Otherwise, RMAN uses the `LOG_ARCHIVE_DEST_N` initialization parameter (where
    `N` is usually 1) to determine where to restore the archived redo log files.


    If you restore archived redo log files to a nondefault location, RMAN knows the
    location they were restored to and automatically finds these files when you issue
    any subsequent `RECOVER` commands. RMAN will not restore archived redo log files
    that it determines are already on disk. Even if you specify a nondefault location,
    RMAN will not restore an archived redo log file to disk if the file already exists.
    In this situation, RMAN simply returns a message stating that the archived redo
    log file has already been restored. Use the `FORCE` option to override this behavior.


    If you are uncertain of the sequence numbers to use during a restore of log files,
    you can query the `V$LOG_HISTORY` view.


    ![Image](images/sq.jpg) **Tip**  Keep in mind that you can’t restore an archive
    redo log that you never backed up. Also, you can’t restore an archive redo log
    if the backup file containing the archive redo log is no longer available. Run
    the `LIST ARCHIVELOG ALL` command to view archive redo logs currently on disk,
    and `LIST BACKUP OF ARCHIVELOG ALL` to verify which archive redo log files are
    in available RMAN backups.


    Restoring to the Default Location


    The following command will restore all archived redo log files that RMAN has backed
    up:


    ```

    RMAN> restore archivelog all;

    ```


    If you want to restore from a specified sequence, use the `FROM SEQUENCE` clause.
    You may want to run this query first to establish the most recent log files and
    sequence numbers that have been generated:


    ```

    SQL> select sequence#, first_time from v$log_history order by 2;

    ```


    This example restores all archived redo log files from sequence 68:


    ```

    RMAN> restore archivelog from sequence 68;

    ```


    If you want to restore a range of archived redo log files, use the `FROM SEQUENCE`
    and `UNTIL SEQUENCE` clauses or the `SEQUENCE BETWEEN` clause, as shown. The following
    commands restore archived redo log files from sequence 68 through sequence 78,
    using thread 1:


    ```

    RMAN> restore archivelog from sequence 68 until sequence 78 thread 1;

    RMAN> restore archivelog sequence between 68 and 78 thread 1;

    ```


    By default, RMAN won’t restore an archived redo log file if it is already on disk.
    You can override this behavior if you use the `FORCE`, like so:


    ```

    RMAN> restore archivelog from sequence 1 force;

    ```


    Restoring to a Nondefault Location


    Use the `SET ARCHIVELOG DESTINATION` clause if you want to restore archived redo
    log files to a location different from the default. The following example restores
    to the nondefault location `/u01/archtemp`. The option of the `SET` command must
    be executed from within an RMAN `run{}` block.


    ```

    run{

    set archivelog destination to ''/u01/archtemp'';

    restore archivelog from sequence 8 force;

    }

    ```


    Restoring a Control File


    If you are missing one control file, and you have multiple copies, then you can
    shut down your database and simply restore the missing or damaged control file
    by copying a good control file to the correct location and name of the missing
    control file (see [Chapter 2](#9781484207642_Ch02.xhtml) for details).


    Listed next are three typical scenarios when restoring a control file:


    *   Using a recovery catalog

    *   Using an autobackup

    *   Specifying a backup file name


    Using a Recovery Catalog


    When you’re connected to the recovery catalog, you can view backup information
    about your control files even while your target database is in nomount mode. To
    list backups of your control files, use the `LIST` command, as shown:


    ```

    $ rman target / catalog rcat/foo@rcat

    RMAN> startup nomount;

    RMAN> list backup of controlfile;

    ```


    If you’re missing all your control files, and you’re using a recovery catalog,
    then issue the `STARTUP NOMOUNT` and the `RESTORE CONTROLFILE` commands:


    ```

    RMAN> startup nomount;

    RMAN> restore controlfile;

    ```


    RMAN restores the control files to the location defined by your `CONTROL_FILES`
    initialization parameter. You should see a message indicating that your control
    files have been successfully copied back from an RMAN backup piece. You can now
    alter your database into mount mode and perform any additional restore and recovery
    commands required for your database.


    ![Image](images/sq.jpg) **Note**  When you restore a control file from a backup,
    you’re required to perform media recovery on your entire database and open your
    database with the `OPEN RESETLOGS` command, even if you didn’t restore any data
    files. You can determine whether your control file is a backup by querying the
    `CONTROLFILE_TYPE` column of the `V$DATABASE` view.


    Using an Autobackup


    When you enable the autobackup of your control file and are using an FRA, restoring
    your control file is fairly simple. First, connect to your target database, then
    issue a `STARTUP NOMOUNT` command, followed by the `RESTORE CONTROLFILE FROM AUTOBACKUP`
    command, like this:


    ```

    $ rman target /

    RMAN> startup nomount;

    RMAN> restore controlfile from autobackup;

    ```


    RMAN restores the control files to the location defined by your `CONTROL_FILES`
    initialization parameter. You should see a message indicating that your control
    files have been successfully copied back from an RMAN backup piece. Here is a
    snippet of the output:


    ```

    channel ORA_DISK_1: control file restore from AUTOBACKUP complete

    ```


    You can now alter your database into mount mode and perform any additional restore
    and recovery commands required for your database.


