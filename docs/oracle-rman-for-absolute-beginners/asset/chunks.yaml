    \      OPERATION       JOB_NAME               STATE\n--------------- ---------------\
    \ -------------------- --------------------\nMV_MAINT        EXPORT          SYS_EXPORT_SCHEMA_01\
    \  EXECUTING\n```\n在此示例中，`MV_MAINT` 用户可以直接连接到该导出作业，如下所示：\n```\n$ expdp mv_maint/foo\
    \ attach=sys_export_schema_01\n```\n如果您不是作业所有者，则通过指定所有者名称和作业名称来连接到作业：\n```\n$\
    \ expdp system/foobar attach=mv_maint.sys_export_schema_01\n```\n现在您应该会看到 Data\
    \ Pump 命令行提示符：\n```\nExport>\n```\n键入 `STATUS` 以查看当前连接作业的状态：\n```\nExport> status\n\
    ```\n\n## 停止和重启作业\n\n如果您有一个当前正在运行的 Data Pump 作业希望暂时停止，可以先连接到交互式命令模式来实现。您可能希望停止作业以解决空间问题或性能问题，待问题解决后再重启作业。以下示例连接到一个导入作业：\n\
    ```\n$ impdp mv_maint/foo attach=sys_import_table_01\n```\n现在，使用 `STOP_JOB` 参数停止作业：\n\
    ```\nImport> stop_job\n```\n您应该会看到以下输出：\n```\nAre you sure you wish to stop this\
    \ job ([yes]/no):\n```\n键入 `YES` 以继续停止作业。您还可以指定立即停止作业：\n```\nImport> stop_job=immediate\n\
    ```\n当您使用 `IMMEDIATE` 选项停止作业时，与该作业关联的一些任务可能未完成。要重启作业，请连接到交互式命令模式，并发出 `START_JOB`\
    \ 命令：\n```\nImport> start_job\n```\n如果您希望继续将作业输出记录到您的终端，请发出 `CONTINUE_CLIENT`\
    \ 命令：\n```\nImport> continue_client\n```\n\n## 终止 Data Pump 作业\n\n您可以指示 Data Pump\
    \ 永久终止一个导出或导入作业。首先，以交互式命令模式连接到作业，然后发出 `KILL_JOB` 命令：\n```\nImport> kill_job\n\
    ```\n系统将提示您以下输出：\n```\nAre you sure you wish to stop this job ([yes]/no):\n```\n\
    键入 `YES` 以永久终止该作业。Data Pump 会立即终止作业，并从运行导出或导入的用户中删除相关的状态表。\n\n## 监控 Data Pump\
    \ 作业\n\n当您有长时间运行的 Data Pump 作业时，应不时检查作业状态，以确保其未失败、未被挂起等等。\n\n有几种方法可以监控 Data Pump\
    \ 作业的状态：\n* 屏幕输出\n* Data Pump 日志文件\n* 查询数据字典视图\n* 数据库告警日志\n* 查询状态表\n* 交互式命令模式状态\n\
    * 使用进程状态 (`ps`) 操作系统工具\n\n最直观的监控方法是查看 Data Pump 在作业运行时显示在屏幕上的状态。如果您已从命令模式断开连接，则状态将不再显示在屏幕上。在这种情况下，您必须使用另一种技术来监控\
    \ Data Pump 作业。\n\n### Data Pump 日志文件\n\n默认情况下，Data Pump 会为每个作业生成一个日志文件。启动 Data\
    \ Pump 作业时，最好为该作业指定一个特定的日志文件名：\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=archive.dmp\
    \ logfile=archive.log\n```\n此作业会创建一个名为 `archive.log` 的文件，该文件放置在数据库对象 `DP` 引用的目录中。如果您没有显式命名日志文件，Data\
    \ Pump 导入会创建一个名为 `import.log` 的文件，而 Data Pump 导出会创建一个名为 `export.log` 的文件。\n\n\
    ![Image](img/sq.jpg) `Note`  该日志文件包含的信息与您运行 Data Pump 作业时在屏幕上以交互方式看到的信息相同。\n\n\
    ### 数据字典视图\n\n快速判断 Data Pump 作业是否正在运行的一种方法是检查 `DBA_DATAPUMP_JOBS` 视图，查看是否有状态为\
    \ `EXECUTING` 的作业在运行：\n```\nselect job_name, operation, job_mode, state from dba_datapump_jobs;\n\
    ```\n以下是一些示例输出：\n```\nJOB_NAME                  OPERATION            JOB_MODE\
    \   STATE\n------------------------- -------------------- ---------- ---------------\n\
    SYS_IMPORT_TABLE_04       IMPORT               TABLE      EXECUTING\nSYS_IMPORT_FULL_02\
    \        IMPORT               FULL       NOT RUNNING\n```\n您还可以通过以下查询 `DBA_DATAPUMP_SESSIONS`\
    \ 视图来获取会话信息：\n```\nselect sid, serial#, username, process, program from v$session\
    \ s,\n     dba_datapump_sessions d where s.saddr = d.saddr;\n```\n以下是一些示例输出，显示正在使用多个\
    \ Data Pump 会话：\n```\n      SID    SERIAL#  USERNAME           PROCESS       \
    \  PROGRAM\n---------- ---------- -------------------- --------------- ----------------------\n\
    \      1049       6451 STAGING            11306           oracle@xengdb (DM00)\n\
    \      1058      33126 STAGING            11338           oracle@xengdb (DW01)\n\
    \      1048      50508 STAGING            11396           oracle@xengdb (DW02)\n\
    ```\n\n### 数据库告警日志\n\n如果某个作业花费的时间比您预期的长得多，请检查数据库告警日志中是否有类似以下的消息：\n```\nstatement\
    \ in resumable session 'SYS_IMPORT_SCHEMA_02.1' was suspended due to\nORA-01652:\
    \ unable to extend temp segment by 64 in tablespace REG_TBSP_3\n```\n此消息表明一个 Data\
    \ Pump 导入作业被暂停，正在等待向 `REG_TBSP_3` 表空间添加空间。向表空间添加空间后，Data Pump 作业会自动恢复处理。默认情况下，Data\
    \ Pump 作业会等待 2 小时以添加空间。\n\n![Image](img/sq.jpg) `Note`  除了写入告警日志外，对于每个 Data Pump\
    \ 作业，Oracle 会在 `ADR_HOME/trace` 目录中创建一个跟踪文件。该文件包含会话 ID 和作业开始时间等信息。跟踪文件的命名格式如下：`<SID>_dm00_<process_ID>.trc`。\n\
    \n### 状态表\n\n每次启动 Data Pump 作业时，都会在运行作业的用户帐户中自动创建一个状态表。对于导出作业，表名取决于您运行的导出作业类型。表的命名格式为\
    \ `SYS_<OPERATION>_<JOB_MODE>_NN`，其中 `OPERATION` 是 `EXPORT` 或 `IMPORT`。`JOB_MODE`\
    \ 可以是 `FULL`、`SCHEMA`、`TABLE`、`TABLESPACE` 等。\n"
- fmt: "Here is an example of querying the status table for particulars about a currently\
    \ running job:\n\n```sql\nselect name, object_name, total_bytes/1024/1024 t_m_bytes\
    \ ,job_mode ,state ,to_char(last_update, 'dd-mon-yy hh24:mi') from SYS_EXPORT_TABLE_01\
    \ where state='EXECUTING';\n```\n\n## Interactive Command Mode Status\n\nA quick\
    \ way to verify that Data Pump is running a job is to attach in interactive command\
    \ mode and issue a `STATUS` command; for example,\n\n```bash\n$ impdp mv_maint/foo\
    \ attach=SYS_IMPORT_TABLE_04\nImport> status\n```\n\nHere is some sample output:\n\
    \n```\nJob: SYS_IMPORT_TABLE_04\n  Operation: IMPORT\n  Mode: TABLE\n  State:\
    \ EXECUTING\n  Bytes Processed: 0\n  Current Parallelism: 4\n```\n\nYou should\
    \ see a state of `EXECUTING`, which indicates that the job is actively running.\
    \ Other items to inspect in the output are the number of objects and bytes processed.\
    \ Those numbers should increase as the job progresses.\n\n## OS Utilities\n\n\
    You can use the `ps` OS utility to display jobs running on the server. For example,\
    \ you can search for master and worker processes, as follows:\n\n```bash\n$ ps\
    \ -ef | egrep 'ora_dm|ora_dw' | grep -v egrep\n```\n\nHere is some sample output:\n\
    \n```\noracle 29871   717   5 08:26:39 ?          11:42 ora_dw01_STAGE\noracle\
    \ 29848   717   0 08:26:33 ?           0:08 ora_dm00_STAGE\noracle 29979   717\
    \   0 08:27:09 ?           0:04 ora_dw02_STAGE\n```\n\nIf you run this command\
    \ multiple times, you should see the processing time (seventh column) increase\
    \ for one or more of the current jobs. This is a good indicator that Data Pump\
    \ is still executing and doing work.\n\n## Data Pump Legacy Mode\n\nThis feature\
    \ is covered last in this chapter, but it’s quite useful, especially if you’re\
    \ an old-school DBA. As of Oracle 11g Release 2, Data Pump allows you to use the\
    \ old `exp` and `imp` utility parameters when invoking a Data Pump job. This is\
    \ known as legacy mode, and it’s a great feature.\n\nYou don’t have to do anything\
    \ special to use legacy mode Data Pump. As soon as Data Pump detects a legacy\
    \ parameter, it attempts to process the parameter as if it were from the old `exp`/`imp`\
    \ utilities. You can even mix and match old legacy parameters with newer parameters;\
    \ for example,\n\n```bash\n$ expdp mv_maint/foo consistent=y tables=inv directory=dp_dir\n\
    ```\n\nIn the output, Data Pump indicates that it has encountered legacy parameters\
    \ and gives you the syntax for what it translated the legacy parameter to in Data\
    \ Pump syntax. For the previous command, here is the output from the Data Pump\
    \ session that shows what the `consistent=y` parameter was translated into:\n\n\
    ```\nLegacy Mode Parameter: \"consistent=TRUE\"\nLocation: Command Line, Replaced\
    \ with: \"flashback_time=TO_TIMESTAMP('2014-01-25 19:31:54', 'YYYY-MM-DD HH24:MI:SS')\"\
    \n```\n\nThis feature can be extremely handy, particularly if you’re really familiar\
    \ with the old legacy syntax and wonder how it’s implemented in Data Pump.\n\n\
    I recommend that you try to use the newer Data Pump syntax whenever possible.\
    \ However, you may run into situations in which you have legacy `exp`/`imp` jobs\
    \ and want to continue running the scripts as they are, without modification.\n\
    \n![Image](images/sq.jpg) **Note** When Data Pump runs in legacy mode, it doesn’t\
    \ create an old `exp`-/`imp`-formatted file. Data Pump always creates a Data Pump\
    \ file and can only read Data Pump files.\n\n## Data Pump Mapping to the exp Utility\n\
    \nIf you’re used to the old `exp`/`imp` parameters, you may initially be confused\
    \ by some of the syntax semantics. However, after you use Data Pump, you’ll find\
    \ the newer syntax fairly easy to remember and use. [Table 8-3](#9781484207642_Ch08.xhtml#Tab3)\
    \ describes how the legacy export parameters map to Data Pump export.\n\n[Table\
    \ 8-3](#9781484207642_Ch08.xhtml#_Tab3). Mapping of Old Export Parameters to Data\
    \ Pump\n\n| Original exp Parameter | Similar Data Pump expdp Parameter |\n| ---\
    \ | --- |\n| `BUFFER` | N/A |\n| `COMPRESS` | `TRANSFORM` |\n| `CONSISTENT` |\
    \ `FLASHBACK_SCN` or `FLASHBACK_TIME` |\n| `CONSTRAINTS` | `EXCLUDE=CONSTRAINTS`\
    \ |\n| `DIRECT` | N/A; Data Pump automatically uses direct path whenever possible.\
    \ |\n| `FEEDBACK` | `STATUS` in client output |\n| `FILE` | Database directory\
    \ object and `DUMPFILE` |\n| `GRANTS` | `EXCLUDE=GRANT` |\n| `INDEXES` | `INCLUDE=INDEXES`,\
    \ `INCLUDE=INDEXES` |\n| `LOG` | Database directory object and `LOGFILE` |\n|\
    \ `OBJECT_CONSISTENT` | N/A |\n| `OWNER` | `SCHEMAS` |\n| `RECORDLENGTH` | N/A\
    \ |\n| `RESUMABLE` | N/A; Data Pump automatically provides functionality. |\n\
    | `RESUMABLE_NAME` | N/A |\n| `RESUMABLE_TIMEOUT` | N/A |\n| `ROWS` | `CONTENT=ALL`\
    \ |\n| `STATISTICS` | N/A; Data Pump export always exports statistics for tables.\
    \ |\n| `TABLESPACES` | `TRANSPORT_TABLESPACES` |\n| `TRANSPORT_TABLESPACE` | `TRANSPORT_TABLESPACES`\
    \ |\n| `TRIGGERS` | `EXCLUDE=TRIGGER` |\n| `TTS_FULL_CHECK` | `TRANSPORT_FULL_CHECK`\
    \ |\n| `VOLSIZE` | N/A; Data Pump doesn’t support tape devices. |\n\nIn many instances,\
    \ there isn’t a one-to-one mapping. Often, Data Pump automatically provides features\
    \ that used to require a parameter in the legacy utilities. For example, whereas\
    \ you used to have to specify `DIRECT=Y` to get a direct path export, Data Pump\
    \ automatically uses direct path whenever possible.\n\n## Data Pump Mapping to\
    \ the imp Utility\n\nAs with Data Pump export, Data Pump import often doesn’t\
    \ have a one-to-one mapping of the legacy utility parameter. Data Pump import\
    \ automatically provides many features of the old `imp` utility. For example,\
    \ `COMMIT=Y` isn’t required because Data Pump import automatically commits after\
    \ each table is imported. [Table 8-4](#9781484207642_Ch08.xhtml#Tab4) describes\
    \ how the legacy import parameters map to Data Pump import.\n\n[Table 8-4](#9781484207642_Ch08.xhtml#_Tab4).\
    \ Mapping of Old Import Parameters to Data Pump\n\n| Original imp Parameter |\
    \ Similar Data Pump impdp Parameter |\n| --- | --- |\n| `BUFFER` | N/A |\n| `CHARSET`\
    \ | N/A |\n| `COMMIT` | N/A; Data Pump import automatically commits after each\
    \ table is exported. |\n| `COMPILE` | N/A; Data Pump import compiles procedures\
    \ after they’re created. |\n| `CONSTRAINTS` | `EXCLUDE=CONSTRAINT` |\n| `DATAFILES`\
    \ | `TRANSPORT_DATAFILES` |\n| `DESTROY` | `REUSE_DATAFILES=y` |\n| `FEEDBACK`\
    \ | `STATUS` in client output |\n| `FILE` | Database directory object and `DUMPFILE`\
    \ |\n| `FILESIZE` | N/A |\n| `FROMUSER` | `REMAP_SCHEMA` |\n| `GRANTS` | `EXCLUDE=OBJECT_GRANT`\
    \ |\n| `IGNORE` | `TABLE_EXISTS_ACTION`, with `APPEND`, `REPLACE`, `SKIP`, or\
    \ `TRUNCATE` |\n| `INDEXES` | `EXCLUDE=INDEXES` |\n| `INDEXFILE` | `SQLFILE` |\n\
    | `LOG` | Database directory object and `LOGFILE` |\n| `RECORDLENGTH` | N/A |\n\
    | `RESUMABLE` | N/A; this functionality is automatically provided. |\n| `RESUMABLE_NAME`\
    \ | N/A |\n| `RESUMABLE_TIMEOUT` | N/A |\n| `ROWS=N` | `CONTENT`, with `METADATA_ONLY`\
    \ or `ALL` |\n| `SHOW` | `SQLFILE` |\n| `STATISTICS` | N/A |\n| `STREAMS_CONFIGURATION`\
    \ | N/A |\n| `STREAMS_INSTANTIATION` | N/A |\n| `TABLESPACES` | `TRANSPORT_TABLESPACES`\
    \ |\n| `TOID_NOVALIDATE` | N/A |\n| `TOUSER` | `REMAP_SCHEMA` |\n| `TRANSPORT_TABLESPACE`\
    \ | `TRANSPORT_TABLESPACES` |\n| `TTS_OWNERS` | N/A |\n| `VOLSIZE` | N/A; Data\
    \ Pump doesn’t support tape devices. |\n\n## Summary\n\nData Pump is an extremely\
    \ powerful and feature-rich tool. If you haven’t used Data Pump much, then I recommend\
    \ that you take some time to reread this chapter and work through the examples.\
    \ This tool greatly simplifies tasks such as moving users and data from one environment\
    \ to another. You can export and import subsets of users, filter and remap data\
    \ via SQL and PL/SQL, rename users and tablespaces, compress, encrypt, and parallelize,\
    \ all with one command. It really is that powerful."
