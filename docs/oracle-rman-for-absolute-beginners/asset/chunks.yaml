    !cp /u01/hbackup/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf

    !cp /u01/hbackup/O12C/tools01.dbf /u01/dbfile/O12C/tools01.dbf

    ```


    In this output, you can remove the exclamation point (`!`) from each line if you
    prefer to run the commands from the OS prompt. The main idea is that these commands
    are available in the event of a failure, so you know which files have been backed
    up to which location and how to copy them back.


    ![Image](images/sq.jpg) **Tip** Don’t use user-managed hot backup technology for
    online backups; use `RMAN`. `RMAN` doesn’t need to place tablespaces in backup
    mode and automates nearly everything related to backup and recovery.


    ## 理解分裂块问题


    To perform a hot backup, one critical step is to alter a tablespace into backup
    mode before you copy any of the data files associated with the tablespace, using
    an OS utility. To understand why you have to alter a tablespace into backup mode,
    you must be familiar with what is sometimes called the split- (or fractured-)
    block issue.


    Recall that the size of a database block is often different from that of an OS
    block. For instance, a database block may be sized at 8KB, whereas the OS block
    size is 4KB. As part of the hot backup, you use an OS utility to copy the live
    data files. While the OS utility is copying the data files, the possibility exists
    that database writers are writing to a block simultaneously. Because the Oracle
    block and the OS block are different sizes, the following may happen:


    1.  The OS utility copies part of the Oracle block.

    2.  A moment later, a database writer updates the entire block.

    3.  A split second later, the OS utility copies the latter half of the Oracle
    block.


    This can result in the OS copy of the block’s being inconsistent with what Oracle
    wrote to the OS. [Figure 3-1](#9781484207642_Ch03.xhtml#Fig1) illustrates this
    concept.


    ![9781484207642_Fig03-01.jpg](images/9781484207642_Fig03-01.jpg)


    [Figure 3-1](#9781484207642_Ch03.xhtml#_Fig1). Hot backup split- (or fractured-)
    block issue


    Looking at [Figure 3-1](#9781484207642_Ch03.xhtml#Fig1), the block copied to disk
    at time 3 is corrupt, as far as Oracle is concerned. The first half of the block
    is from time 1, and the latter half is copied at time 3. When you make a hot backup,
    you’re guaranteeing block-level corruption in the backups of the data files.


    To understand how Oracle resolves the split-block issue, first consider a database
    operating in its normal mode (not in backup mode). The redo information that is
    written to the online redo logs is only what Oracle needs, to reapply transactions.
    The redo stream doesn’t contain entire blocks of data. Oracle only records a change
    vector in the redo stream that specifies which block changed and how it was changed.
    [Figure 3-2](#9781484207642_Ch03.xhtml#Fig2) shows Oracle operating under normal
    conditions.


    ![9781484207642_Fig03-02.jpg](images/9781484207642_Fig03-02.jpg)


    [Figure 3-2](#9781484207642_Ch03.xhtml#_Fig2). Oracle normally only writes change
    vectors to the redo stream


    Now, consider what happens during a hot backup. For a hot backup, before you copy
    the data files associated with a tablespace, you must first alter the tablespace
    into backup mode. While in this mode, before Oracle modifies a block, the entire
    block is copied to the redo stream. Any subsequent changes to the block only require
    that the normal redo-change vectors be written to the redo stream. This is illustrated
    in [Figure 3-3](#9781484207642_Ch03.xhtml#Fig3).


    ![9781484207642_Fig03-03.jpg](images/9781484207642_Fig03-03.jpg)


    [Figure 3-3](#9781484207642_Ch03.xhtml#_Fig3). Entire blocks are written to the
    redo stream


    To understand why Oracle logs the entire block to the redo stream, consider what
    happens during a restore and recovery. First, the backup files from the hot backup
    are restored. As explained earlier, these backup files contain corrupt blocks,
    owing to the split-block issue. But, it doesn’t matter, because once Oracle recovers
    the data files, for any block that was modified during the hot backup, Oracle
    has an image copy of the block as it was before it was modified. Oracle uses the
    copy of the block it has in the redo stream as a starting point for the recovery
    (of that block). This process is illustrated in [Figure 3-4](#9781484207642_Ch03.xhtml#Fig4).


    ![9781484207642_Fig03-04.jpg](images/9781484207642_Fig03-04.jpg)


    [Figure 3-4](#9781484207642_Ch03.xhtml#_Fig4). Restore and recovery of a split
    block


    In this way, it doesn’t matter if there are corrupt blocks in the hot backup files.
    Oracle always starts the recovery process for a block from a copy of the block
    (as it was before it was modified) in the redo stream.


    ## 理解备份期间生成重做日志的必要性


    What happens if you experience a failure soon after you make a hot backup? Oracle
    knows when a tablespace was put in backup mode (`begin backup` system `SCN` written
    to the redo stream), and Oracle knows when the tablespace was taken out of backup
    mode (`end-of-backup` marker written to the redo stream). Oracle requires every
    archive redo log generated during that time frame to successfully recover the
    data files.


    [Figure 3-5](#9781484207642_Ch03.xhtml#Fig5) shows that, at minimum, the archive
    redo logs from sequence numbers 100 to 102 are required to recover the tablespace.
    These archive redo logs were generated during the hot backup.


    ![9781484207642_Fig03-05.jpg](images/9781484207642_Fig03-05.jpg)


    [Figure 3-5](#9781484207642_Ch03.xhtml#_Fig5). Recovery applied


    If you attempt to stop the recovery process before all redo between the begin
    and end markers has been applied to the data file, Oracle throws this error:


    ```

    ORA-01195: online backup of file 1 needs more recovery to be consistent

    ```


    All redo generated during the hot backup of a tablespace must be applied to the
    data files before they can be opened. Oracle, at a minimum, needs to apply everything
    between the `begin-backup` `SCN` marker and the `end-backup` marker, to account
    for every block modified while the tablespace was in backup mode. This redo is
    in the archive redo log files; or, if the failure happened right after the backup
    ended, some of the redo may not have been archived and may be in the online redo
    logs. Therefore, you have to instruct Oracle to apply what’s in the online redo
    logs.


    ## 理解数据文件会被更新


    Note that, in [Figures 3-2](#9781484207642_Ch03.xhtml#Fig2) and [3-3](#9781484207642_Ch03.xhtml#Fig3),
    the behavior of the database writer is, for the most part, unchanged throughout
    the backup procedure. The database writer continues to write blocks to data files,
    regardless of the backup mode of the database. The database writer doesn’t care
    if a hot backup is taking place; its job is to write blocks from the buffer cache
    to the data files.


    Every once in a while, you run into a DBA who states that the database writer
    doesn’t write to data files during user-managed hot backups. This is a widespread
    misconception. Use some common sense: if the database writer isn’t writing to
    the data files during a hot backup, then where are the changes being written?
    If the transactions are being written to somewhere other than the data files,
    how would those data files be resynchronized after the backup? It doesn’t make
    any sense.'
  raw: 'For my environment here is the code generated that can be executed from SQL*Plus
    to copy the data files back from the backup directory, if a failure should occur:


    ```

    !cp /u01/hbackup/O12C/system01.dbf /u01/dbfile/O12C/system01.dbf

    !cp /u01/hbackup/O12C/sysaux01.dbf /u01/dbfile/O12C/sysaux01.dbf

    !cp /u01/hbackup/O12C/undotbs01.dbf /u01/dbfile/O12C/undotbs01.dbf

    !cp /u01/hbackup/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf

    !cp /u01/hbackup/O12C/tools01.dbf /u01/dbfile/O12C/tools01.dbf

    ```


    In this output, you can remove the exclamation point (`!`) from each line if you
    prefer to run the commands from the OS prompt. The main idea is that these commands
    are available in the event of a failure, so you know which files have been backed
    up to which location and how to copy them back.


    ![Image](images/sq.jpg) **Tip**  Don’t use user-managed hot backup technology
    for online backups; use RMAN. RMAN doesn’t need to place tablespaces in backup
    mode and automates nearly everything related to backup and recovery.


    Understanding the Split-Block Issue


    To perform a hot backup, one critical step is to alter a tablespace into backup
    mode before you copy any of the data files associated with the tablespace, using
    an OS utility. To understand why you have to alter a tablespace into backup mode,
    you must be familiar with what is sometimes called the split- (or fractured-)
    block issue.


    Recall that the size of a database block is often different from that of an OS
    block. For instance, a database block may be sized at 8KB, whereas the OS block
    size is 4KB. As part of the hot backup, you use an OS utility to copy the live
    data files. While the OS utility is copying the data files, the possibility exists
    that database writers are writing to a block simultaneously. Because the Oracle
    block and the OS block are different sizes, the following may happen:


    1.  The OS utility copies part of the Oracle block.

    2.  A moment later, a database writer updates the entire block.

    3.  A split second later, the OS utility copies the latter half of the Oracle
    block.


    This can result in the OS copy of the block’s being inconsistent with what Oracle
    wrote to the OS. [Figure 3-1](#9781484207642_Ch03.xhtml#Fig1) illustrates this
    concept.


    ![9781484207642_Fig03-01.jpg](images/9781484207642_Fig03-01.jpg)


    [Figure 3-1](#9781484207642_Ch03.xhtml#_Fig1). Hot backup split- (or fractured-)
    block issue


    Looking at [Figure 3-1](#9781484207642_Ch03.xhtml#Fig1), the block copied to disk
    at time 3 is corrupt, as far as Oracle is concerned. The first half of the block
    is from time 1, and the latter half is copied at time 3\. When you make a hot
    backup, you’re guaranteeing block-level corruption in the backups of the data
    files.


    To understand how Oracle resolves the split-block issue, first consider a database
    operating in its normal mode (not in backup mode). The redo information that is
    written to the online redo logs is only what Oracle needs, to reapply transactions.
    The redo stream doesn’t contain entire blocks of data. Oracle only records a change
    vector in the redo stream that specifies which block changed and how it was changed.
    [Figure 3-2](#9781484207642_Ch03.xhtml#Fig2) shows Oracle operating under normal
    conditions.


    ![9781484207642_Fig03-02.jpg](images/9781484207642_Fig03-02.jpg)


    [Figure 3-2](#9781484207642_Ch03.xhtml#_Fig2). Oracle normally only writes change
    vectors to the redo stream


    Now, consider what happens during a hot backup. For a hot backup, before you copy
    the data files associated with a tablespace, you must first alter the tablespace
    into backup mode. While in this mode, before Oracle modifies a block, the entire
    block is copied to the redo stream. Any subsequent changes to the block only require
    that the normal redo-change vectors be written to the redo stream. This is illustrated
    in [Figure 3-3](#9781484207642_Ch03.xhtml#Fig3).


    ![9781484207642_Fig03-03.jpg](images/9781484207642_Fig03-03.jpg)


    [Figure 3-3](#9781484207642_Ch03.xhtml#_Fig3). Entire blocks are written to the
    redo stream


    To understand why Oracle logs the entire block to the redo stream, consider what
    happens during a restore and recovery. First, the backup files from the hot backup
    are restored. As explained earlier, these backup files contain corrupt blocks,
    owing to the split-block issue. But, it doesn’t matter, because once Oracle recovers
    the data files, for any block that was modified during the hot backup, Oracle
    has an image copy of the block as it was before it was modified. Oracle uses the
    copy of the block it has in the redo stream as a starting point for the recovery
    (of that block). This process is illustrated in [Figure 3-4](#9781484207642_Ch03.xhtml#Fig4).


    ![9781484207642_Fig03-04.jpg](images/9781484207642_Fig03-04.jpg)


    [Figure 3-4](#9781484207642_Ch03.xhtml#_Fig4). Restore and recovery of a split
    block


    In this way, it doesn’t matter if there are corrupt blocks in the hot backup files.
    Oracle always starts the recovery process for a block from a copy of the block
    (as it was before it was modified) in the redo stream.


    Understanding the Need for Redo Generated During Backup


    What happens if you experience a failure soon after you make a hot backup? Oracle
    knows when a tablespace was put in backup mode (begin backup system SCN written
    to the redo stream), and Oracle knows when the tablespace was taken out of backup
    mode (end-of-backup marker written to the redo stream). Oracle requires every
    archive redo log generated during that time frame to successfully recover the
    data files.


    [Figure 3-5](#9781484207642_Ch03.xhtml#Fig5) shows that, at minimum, the archive
    redo logs from sequence numbers 100 to 102 are required to recover the tablespace.
    These archive redo logs were generated during the hot backup.


    ![9781484207642_Fig03-05.jpg](images/9781484207642_Fig03-05.jpg)


    [Figure 3-5](#9781484207642_Ch03.xhtml#_Fig5). Recovery applied


    If you attempt to stop the recovery process before all redo between the begin
    and end markers has been applied to the data file, Oracle throws this error:


    ```

    ORA-01195: online backup of file 1 needs more recovery to be consistent

    ```


    All redo generated during the hot backup of a tablespace must be applied to the
    data files before they can be opened. Oracle, at a minimum, needs to apply everything
    between the begin-backup SCN marker and the end-backup marker, to account for
    every block modified while the tablespace was in backup mode. This redo is in
    the archive redo log files; or, if the failure happened right after the backup
    ended, some of the redo may not have been archived and may be in the online redo
    logs. Therefore, you have to instruct Oracle to apply what’s in the online redo
    logs.


    Understanding That Data Files Are Updated


    Note that, in [Figures 3-2](#9781484207642_Ch03.xhtml#Fig2) and [3-3](#9781484207642_Ch03.xhtml#Fig3),
    the behavior of the database writer is, for the most part, unchanged throughout
    the backup procedure. The database writer continues to write blocks to data files,
    regardless of the backup mode of the database. The database writer doesn’t care
    if a hot backup is taking place; its job is to write blocks from the buffer cache
    to the data files.


    Every once in a while, you run into a DBA who states that the database writer
    doesn’t write to data files during user-managed hot backups. This is a widespread
    misconception. Use some common sense: if the database writer isn’t writing to
    the data files during a hot backup, then where are the changes being written?
    If the transactions are being written to somewhere other than the data files,
    how would those data files be resynchronized after the backup? It doesn’t make
    any sense.'
  trans: '

    以下是根据我的环境生成的代码，可以在 SQL*Plus 中执行，以便在发生故障时将数据文件从备份目录复制回来：


    ```

    !cp /u01/hbackup/O12C/system01.dbf /u01/dbfile/O12C/system01.dbf

    !cp /u01/hbackup/O12C/sysaux01.dbf /u01/dbfile/O12C/sysaux01.dbf

    !cp /u01/hbackup/O12C/undotbs01.dbf /u01/dbfile/O12C/undotbs01.dbf

    !cp /u01/hbackup/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf

    !cp /u01/hbackup/O12C/tools01.dbf /u01/dbfile/O12C/tools01.dbf

    ```


    在此输出中，如果您更愿意从操作系统提示符运行这些命令，可以删除每行开头的感叹号（`!`）。核心思想是，这些命令可在发生故障时使用，因此您可以知道哪些文件已备份到哪个位置以及如何将它们复制回来。


    ![Image](img/sq.jpg) **提示** 对于联机备份，不要使用用户管理的热备份技术；请使用 `RMAN`。`RMAN` 不需要将表空间置于备份模式，并且几乎自动化了所有与备份和恢复相关的操作。


    ## 理解分裂块问题


    执行热备份时，一个关键步骤是在使用操作系统实用程序复制与表空间关联的任何数据文件之前，先将该表空间更改为备份模式。要理解为何必须将表空间更改为备份模式，您必须熟悉有时被称为分裂块（或断裂块）的问题。


    回想一下，数据库块的大小通常与操作系统块的大小不同。例如，数据库块的大小可能为 8KB，而操作系统块的大小为 4KB。作为热备份的一部分，您使用操作系统实用程序复制正在使用的数据文件。在操作系统实用程序复制数据文件的过程中，有可能数据库写入器正在同时写入某个块。由于
    Oracle 块和操作系统块的大小不同，可能会发生以下情况：


    1.  操作系统实用程序复制了 Oracle 块的一部分。

    2.  片刻之后，数据库写入器更新了整个块。

    3.  紧接着，操作系统实用程序复制了 Oracle 块的后半部分。


    这可能导致操作系统复制的块与 Oracle 写入操作系统的内容不一致。图 3-1 说明了这个概念。


    ![9781484207642_Fig03-01.jpg](img/9781484207642_Fig03-01.jpg)


    图 3-1. 热备份中的分裂（或断裂）块问题


    查看图 3-1，在时间点 3 复制到磁盘的块，就 Oracle 而言是损坏的。块的前半部分来自时间点 1，后半部分在时间点 3 复制。当您进行热备份时，您就是在保证数据文件的备份中存在块级别的损坏。


    要理解 Oracle 如何解决分裂块问题，首先考虑一个处于正常模式（而非备份模式）的数据库。写入联机重做日志的重做信息仅仅是 Oracle 重新应用事务所需的内容。重做流不包含完整的数据块。Oracle
    只在重做流中记录一个更改向量，指定哪个块被更改以及如何更改。图 3-2 显示了 Oracle 在正常条件下的操作。


    ![9781484207642_Fig03-02.jpg](img/9781484207642_Fig03-02.jpg)


    图 3-2. Oracle 通常只将更改向量写入重做流


    现在，考虑在热备份期间发生的情况。对于热备份，在复制与表空间关联的数据文件之前，必须先将表空间更改为备份模式。在此模式下，在 Oracle 修改一个块之前，会将整个块复制到重做流中。对该块的任何后续更改只需要将正常的重做更改向量写入重做流。图
    3-3 对此进行了说明。


    ![9781484207642_Fig03-03.jpg](img/9781484207642_Fig03-03.jpg)


    图 3-3. 整个块被写入重做流


    要理解为何 Oracle 将整个块记录到重做流中，考虑在还原和恢复期间发生的情况。首先，从热备份中还原备份文件。如前所述，这些备份文件包含损坏的块，这是由于分裂块问题造成的。但这没关系，因为一旦
    Oracle 恢复了数据文件，对于在热备份期间被修改的任何块，Oracle 都拥有该块在被修改前的映像副本。Oracle 使用其在重做流中拥有的该块副本作为恢复（该块）的起点。图
    3-4 说明了这个过程。


    ![9781484207642_Fig03-04.jpg](img/9781484207642_Fig03-04.jpg)


    图 3-4. 分裂块的还原和恢复


    这样，热备份文件中是否存在损坏的块就无关紧要了。Oracle 总是从重做流中该块的副本（修改前的状态）开始块的恢复过程。


    ## 理解备份期间生成重做日志的必要性


    如果您在完成热备份后不久就发生故障，会发生什么？Oracle 知道表空间何时被置于备份模式（`begin backup` 系统 `SCN` 写入重做流），也知道表空间何时退出备份模式（`end-of-backup`
    标记写入重做流）。Oracle 需要该时间范围内生成的所有归档重做日志才能成功恢复数据文件。


    图 3-5 显示，至少需要序列号从 100 到 102 的归档重做日志来恢复该表空间。这些归档重做日志是在热备份期间生成的。


    ![9781484207642_Fig03-05.jpg](img/9781484207642_Fig03-05.jpg)


    图 3-5. 恢复已应用


    如果您尝试在开始标记和结束标记之间的所有重做日志都应用到数据文件之前停止恢复过程，Oracle 会抛出此错误：


    ```

    ORA-01195: online backup of file 1 needs more recovery to be consistent

    ```


    表空间热备份期间生成的所有重做日志都必须应用到数据文件，然后才能打开它们。Oracle 至少需要应用 `begin-backup` `SCN` 标记和 `end-backup`
    标记之间的所有内容，以考虑表空间处于备份模式期间被修改的每个块。这些重做日志位于归档重做日志文件中；或者，如果故障正好发生在备份结束后，部分重做日志可能尚未归档，可能还存在于联机重做日志中。因此，您必须指示
    Oracle 应用联机重做日志中的内容。


    ## 理解数据文件会被更新


    请注意，在图 3-2 和 图 3-3 中，数据库写入器的行为在整个备份过程中基本上保持不变。无论数据库处于何种备份模式，数据库写入器都会继续将块写入数据文件。数据库写入器不关心是否正在进行热备份；它的工作是将块从缓冲区高速缓存写入数据文件。


    偶尔，您会遇到声称在用户管理的热备份期间数据库写入器不会写入数据文件的 DBA。这是一种普遍存在的误解。请运用一些常识：如果数据库写入器在热备份期间不写入数据文件，那么更改被写入到哪里？如果事务被写入到数据文件以外的地方，备份后这些数据文件将如何重新同步？这根本说不通。

    '
- fmt: "Some DBAs say, \"The data file header is frozen, which means no changes to\
    \ the data file.\" Oracle does freeze the `SCN` to indicate the start of the hot\
    \ backup in the data file header and doesn't update that `SCN` until the tablespace\
    \ is taken out of backup mode. This \"frozen `SCN`\" doesn't mean that blocks\
    \ aren't being written to data files during the backup. You can easily demonstrate\
    \ that a data file is written to during backup mode by doing this:\n\n1.  Put\
    \ a tablespace in backup mode:\n\n```\nSQL> alter tablespace users begin backup;\n\
    ```\n\n2.  Create a table that has a character field:\n\n```\nSQL> create table\
    \ cc(cc varchar2(20)) tablespace users;\n```\n\n3.  Insert a string into that\
    \ table:\n\n```\nSQL> insert into cc values('DBWR does write');\n```\n\n4.  Force\
    \ a checkpoint (which ensures that all modified buffers are written to disk):\n\
    \n```\nSQL> alter system checkpoint;\n```\n\n5.  From the OS, use the `strings`\
    \ and `grep` commands to search for the string in the data file:\n\n```\n$ strings\
    \ /u01/dbfile/O12C/users01.dbf | grep \"DBWR does write\"\n```\n\n6.  Here is\
    \ the output, proving that the database writer did write the data to disk:\n\n\
    ```\nDBWR does write\n```\n\n7.  Don't forget to take the tablespace out of backup\
    \ mode:\n\n```\nSQL> alter tablespace users end backup;\n```\n\n# Performing a\
    \ Complete Recovery of an Archivelog Mode Database\n\nThe term `complete recovery`\
    \ means that you can recover all transactions that were committed before a failure\
    \ occurred. `Complete recovery` doesn't mean you that completely restore and recover\
    \ the entire database. For instance, if only one data file has experienced media\
    \ failure, you need to restore and recover only the damaged data file to perform\
    \ a complete recovery.\n\n![Image](images/sq.jpg) `Tip` If you have access to\
    \ a test or development database, take the time to walk through every step in\
    \ each of the examples that follow. Going through these steps can teach you more\
    \ about backup and recovery than any documentation.\n\nThe steps outlined here\
    \ apply to any database backed up while in archivelog mode. It doesn't matter\
    \ if you made a cold backup or hot backup. The steps to restore and recover data\
    \ files are the same, as long as the database was in archivelog mode during the\
    \ backup. For a complete recovery, you need\n\n*   to be able to restore the data\
    \ files that have experienced media failure\n*   access to all archive redo logs\
    \ generated since the last backup was started\n*   intact online redo logs\n\n\
    Here is the basic procedure for a complete recovery:\n\n1.  Place the database\
    \ in mount mode; this prevents normal user transaction processing from reading/writing\
    \ to data files being restored. (If you're not restoring the `SYSTEM` or `UNDO`\
    \ tablespace, you have the option of opening the database and manually taking\
    \ the data files offline before restoring them. If you do this, make sure you\
    \ place the data files online after the recovery is complete.)\n2.  Restore the\
    \ damaged data files with an OS copy utility.\n3.  Issue the appropriate SQL*Plus\
    \ `RECOVER` command to apply any information required in the archive redo logs\
    \ and online redo logs.\n4.  Alter the database open.\n\nThe next several sections\
    \ demonstrate some common complete restore-and-recovery scenarios. You should\
    \ be able to apply these basic scenarios to diagnose and recover from any complex\
    \ situation you find yourself in.\n\n## Restoring and Recovering with the Database\
    \ Offline\n\nThis section details a simple restore-and-recovery scenario. Described\
    \ next are the steps to simulate a failure and then perform a complete restore\
    \ and recovery. Try this scenario in a development database. Ensure that you have\
    \ a good backup and that you aren't trying this experiment in a database that\
    \ contains critical business data.\n\nBefore you start this example, create a\
    \ table, and insert some data. This table and data are selected from the end of\
    \ the complete recovery process to demonstrate a successful recovery:\n\n```\n\
    SQL> create table foo(foo number) tablespace users;\nSQL> insert into foo values(1);\n\
    SQL> commit;\n```\n\nNow, switch the online logs several times. Doing so ensures\
    \ that you have to apply archive redo logs as part of the recovery:\n\n```\nSQL>\
    \ alter system switch logfile;\n```\n\nThe forward slash (`/`) reruns the most\
    \ recently executed SQL statement:\n\n```\nSQL> /\nSQL> /\nSQL> /\n```\n\nNext,\
    \ simulate a media failure by renaming the data file associated with the `USERS`\
    \ tablespace. You can identify the name of this file with this query:\n\n```\n\
    SQL> select file_name from dba_data_files where tablespace_name='USERS';\n\nFILE_NAME\n\
    \n/u01/dbfile/O12C/users01.dbf\n```\n\nFrom the OS, rename the file:\n\n```\n\
    $ mv /u01/dbfile/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf.old\n```\n\nAnd,\
    \ attempt to stop your database:\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown\
    \ immediate;\n```\n\nYou should see an error such as this:\n\n```\nORA-01116:\
    \ error in opening database file ...\n```\n\nIf this were a real disaster, it\
    \ would be prudent to navigate to the data file directory, list the files, and\
    \ see if the file in question was in its correct location. You should also inspect\
    \ the `alert.log` file to see if any relevant information is logged there by Oracle.\n\
    \nNow that you've simulated a media failure, the next several steps walk you through\
    \ a restore and complete recovery.\n\n### Step 1. Place Your Database in Mount\
    \ Mode\n\nBefore you place your database in mount mode, you may need to first\
    \ shut it down, using `ABORT`:\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown abort;\n\
    SQL> startup mount;\n```\n\n### Step 2. Restore the Data File from the Backup\n\
    \nThe next step is to copy from the backup the data file that corresponds to the\
    \ one that has had a failure:\n\n```\n$ cp /u01/hbackup/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf\n\
    ```\n\nAt this point, it's instructional to ponder what Oracle would do if you\
    \ attempted to start your database. When you issue the `ALTER DATABASE OPEN` statement,\
    \ Oracle inspects the `SCN` in the control file for each data file. You can examine\
    \ this `SCN` by querying `V$DATAFILE`:\n\n```\nSQL> select checkpoint_change#\
    \ from v$datafile where file#=4;\n\nCHECKPOINT_CHANGE#\n```\n\nOracle compares\
    \ the `SCN` in the control file with the `SCN` in the data file header. You can\
    \ check the `SCN` in the data file header by querying `V$DATAFILE_HEADER`; for\
    \ example,\n\n```\nselect file#, fuzzy, checkpoint_change#\nfrom v$datafile_header\n\
    where file#=4;\n\nFILE# FUZ CHECKPOINT_CHANGE#\n---------- --- ------------------\n\
    \         4 YES            3502285\n```\n\nNote that the `SCN` recorded in `V$DATAFILE_HEADER`\
    \ is less than the `SCN` in `V$DATAFILE` for the same data file. If you attempt\
    \ to open your database, Oracle throws an error stating that media recovery is\
    \ required (meaning that you need to apply redo) to synchronize the `SCN` in the\
    \ data file with the `SCN` in the control file. The `FUZZY` column is set to `YES`.\
    \ This indicates that redo must be applied to the data file before it can be opened\
    \ for use. Here is what happens when you try to open the database at this point:\n\
    \n```\nSQL> alter database open;\n\nalter database open;\nalter database open\n\
    *\nERROR at line 1:\nORA-01113: file 4 needs media recovery...\n```\n\nOracle\
    \ doesn't let you open the database until the `SCN` in all data file headers matches\
    \ the corresponding `SCN` in the control file.\n\n### Step 3. Issue the Appropriate\
    \ `RECOVER` Statement\n\nThe archive redo logs and online redo logs have the information\
    \ required to catch up the data file `SCN` to the control file `SCN`. You can\
    \ apply redo to the data file that needs media recovery by issuing one of the\
    \ following SQL*Plus statements:\n\n*   `RECOVER DATAFILE`\n*   `RECOVER TABLESPACE`\n\
    *   `RECOVER DATABASE`"
  raw: "Some DBAs say, “The data file header is frozen, which means no changes to\
    \ the data file.” Oracle does freeze the SCN to indicate the start of the hot\
    \ backup in the data file header and doesn’t update that SCN until the tablespace\
    \ is taken out of backup mode. This “frozen SCN” doesn’t mean that blocks aren’t\
    \ being written to data files during the backup. You can easily demonstrate that\
    \ a data file is written to during backup mode by doing this:\n\n1.  Put a tablespace\
    \ in backup mode:\n\n```\n    SQL> alter tablespace users begin backup;\n    ```\n\
    \n2.  Create a table that has a character field:\n\n```\n    SQL> create table\
    \ cc(cc varchar2(20)) tablespace users;\n    ```\n\n3.  Insert a string into that\
    \ table:\n\n```\n    SQL> insert into cc values('DBWR does write');\n    ```\n\
    \n4.  Force a checkpoint (which ensures that all modified buffers are written\
    \ to disk):\n\n```\n    SQL> alter system checkpoint;\n    ```\n\n5.  From the\
    \ OS, use the `strings` and `grep` commands to search for the string in the data\
    \ file:\n\n```\n    $ strings /u01/dbfile/O12C/users01.dbf | grep \"DBWR does\
    \ write\"\n    ```\n\n6.  Here is the output, proving that the database writer\
    \ did write the data to disk:\n\n```\n    DBWR does write\n    ```\n\n7.  Don’t\
    \ forget to take the tablespace out of backup mode:\n\n```\n    SQL> alter tablespace\
    \ users end backup;\n    ```\n\nPerforming a Complete Recovery of an Archivelog\
    \ Mode Database\n\nThe term *complete recovery* means that you can recover all\
    \ transactions that were committed before a failure occurred. *Complete recovery*\
    \ doesn’t mean you that completely restore and recover the entire database. For\
    \ instance, if only one data file has experienced media failure, you need to restore\
    \ and recover only the damaged data file to perform a complete recovery.\n\n![Image](images/sq.jpg) **Tip**  If\
    \ you have access to a test or development database, take the time to walk through\
    \ every step in each of the examples that follow. Going through these steps can\
    \ teach you more about backup and recovery than any documentation.\n\nThe steps\
    \ outlined here apply to any database backed up while in archivelog mode. It doesn’t\
    \ matter if you made a cold backup or hot backup. The steps to restore and recover\
    \ data files are the same, as long as the database was in archivelog mode during\
    \ the backup. For a complete recovery, you need\n\n*   to be able to restore the\
    \ data files that have experienced media failure\n*   access to all archive redo\
    \ logs generated since the last backup was started\n*   intact online redo logs\n\
    \nHere is the basic procedure for a complete recovery:\n\n1.  Place the database\
    \ in mount mode; this prevents normal user transaction processing from reading/writing\
    \ to data files being restored. (If you're not restoring the `SYSTEM` or `UNDO`\
    \ tablespace, you have the option of opening the database and manually taking\
    \ the data files offline before restoring them. If you do this, make sure you\
    \ place the data files online after the recovery is complete.)\n2.  Restore the\
    \ damaged data files with an OS copy utility.\n3.  Issue the appropriate SQL*Plus\
    \ `RECOVER` command to apply any information required in the archive redo logs\
    \ and online redo logs.\n4.  Alter the database open.\n\nThe next several sections\
    \ demonstrate some common complete restore-and-recovery scenarios. You should\
    \ be able to apply these basic scenarios to diagnose and recover from any complex\
    \ situation you find yourself in.\n\nRestoring and Recovering with the Database\
    \ Offline\n\nThis section details a simple restore-and-recovery scenario. Described\
    \ next are the steps to simulate a failure and then perform a complete restore\
    \ and recovery. Try this scenario in a development database. Ensure that you have\
    \ a good backup and that you aren’t trying this experiment in a database that\
    \ contains critical business data.\n\nBefore you start this example, create a\
    \ table, and insert some data. This table and data are selected from the end of\
    \ the complete recovery process to demonstrate a successful recovery:\n\n```\n\
    SQL> create table foo(foo number) tablespace users;\nSQL> insert into foo values(1);\n\
    SQL> commit;\n```\n\nNow, switch the online logs several times. Doing so ensures\
    \ that you have to apply archive redo logs as part of the recovery:\n\n```\nSQL>\
    \ alter system switch logfile;\n```\n\nThe forward slash (`/`) reruns the most\
    \ recently executed SQL statement:\n\n```\nSQL> /\nSQL> /\nSQL> /\n```\n\nNext,\
    \ simulate a media failure by renaming the data file associated with the `USERS`\
    \ tablespace. You can identify the name of this file with this query:\n\n```\n\
    SQL> select file_name from dba_data_files where tablespace_name='USERS';\n\nFILE_NAME\n\
    \n/u01/dbfile/O12C/users01.dbf\n```\n\nFrom the OS, rename the file:\n\n```\n\
    $ mv /u01/dbfile/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf.old\n```\n\nAnd,\
    \ attempt to stop your database:\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown\
    \ immediate;\n```\n\nYou should see an error such as this:\n\n```\nORA-01116:\
    \ error in opening database file ...\n```\n\nIf this were a real disaster, it\
    \ would be prudent to navigate to the data file directory, list the files, and\
    \ see if the file in question was in its correct location. You should also inspect\
    \ the `alert.log` file to see if any relevant information is logged there by Oracle.\n\
    \nNow that you’ve simulated a media failure, the next several steps walk you through\
    \ a restore and complete recovery.\n\nStep 1\\. Place Your Database in Mount Mode\n\
    \nBefore you place your database in mount mode, you may need to first shut it\
    \ down, using `ABORT`:\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown abort;\nSQL>\
    \ startup mount;\n```\n\nStep 2\\. Restore the Data File from the Backup\n\nThe\
    \ next step is to copy from the backup the data file that corresponds to the one\
    \ that has had a failure:\n\n```\n$ cp /u01/hbackup/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf\n\
    ```\n\nAt this point, it’s instructional to ponder what Oracle would do if you\
    \ attempted to start your database. When you issue the `ALTER DATABASE OPEN` statement,\
    \ Oracle inspects the SCN in the control file for each data file. You can examine\
    \ this SCN by querying `V$DATAFILE`:\n\n```\nSQL> select checkpoint_change# from\
    \ v$datafile where file#=4;\n\nCHECKPOINT_CHANGE#\n\n```\n\nOracle compares the\
    \ SCN in the control file with the SCN in the data file header. You can check\
    \ the SCN in the data file header by querying `V$DATAFILE_HEADER`; for example,\n\
    \n```\nselect file#, fuzzy, checkpoint_change#\nfrom v$datafile_header\nwhere\
    \ file#=4;\n\nFILE# FUZ CHECKPOINT_CHANGE#\n---------- --- ------------------\n\
             4 YES            3502285\n```\n\nNote that the SCN recorded in `V$DATAFILE_HEADER`\
    \ is less than the SCN in `V$DATAFILE` for the same data file. If you attempt\
    \ to open your database, Oracle throws an error stating that media recovery is\
    \ required (meaning that you need to apply redo) to synchronize the SCN in the\
    \ data file with the SCN in the control file. The `FUZZY` column is set to `YES`.\
    \ This indicates that redo must be applied to the data file before it can be opened\
    \ for use. Here is what happens when you try to open the database at this point:\n\
    \n```\nSQL> alter database open;\n\nalter database open;\nalter database open\n\
    *\nERROR at line 1:\nORA-01113: file 4 needs media recovery...\n```\n\nOracle\
    \ doesn’t let you open the database until the SCN in all data file headers matches\
    \ the corresponding SCN in the control file.\n\nStep 3\\. Issue the Appropriate\
    \ RECOVER Statement\n\nThe archive redo logs and online redo logs have the information\
    \ required to catch up the data file SCN to the control file SCN. You can apply\
    \ redo to the data file that needs media recovery by issuing one of the following\
    \ SQL*Plus statements:\n\n*   `RECOVER DATAFILE`\n*   `RECOVER TABLESPACE`\n*\
    \   `RECOVER DATABASE`"
  trans: "\n一些数据库管理员会说：“数据文件头被冻结了，这意味着数据文件不能更改。” Oracle 确实会冻结数据文件头中的 `SCN`（系统变更号）来表示热备份的开始，并且直到该表空间退出备份模式才会更新那个\
    \ `SCN`。这种“冻结的 `SCN`”并不意味着在备份期间数据块没有被写入数据文件。你可以通过以下操作轻松证明在备份模式下数据文件有写入操作：\n\n\
    1.  将一个表空间置于备份模式：\n\n```\nSQL> alter tablespace users begin backup;\n```\n\n2.\
    \  创建一个包含字符字段的表：\n\n```\nSQL> create table cc(cc varchar2(20)) tablespace users;\n\
    ```\n\n3.  向该表中插入一个字符串：\n\n```\nSQL> insert into cc values('DBWR does write');\n\
    ```\n\n4.  强制执行一个检查点（确保所有被修改的缓冲区都写入磁盘）：\n\n```\nSQL> alter system checkpoint;\n\
    ```\n\n5.  在操作系统中，使用 `strings` 和 `grep` 命令在数据文件中搜索该字符串：\n\n```\n$ strings /u01/dbfile/O12C/users01.dbf\
    \ | grep \"DBWR does write\"\n```\n\n6.  以下是输出结果，证明数据库写入器（DBWR）确实将数据写入了磁盘：\n\n\
    ```\nDBWR does write\n```\n\n7.  别忘了将表空间退出备份模式：\n\n```\nSQL> alter tablespace\
    \ users end backup;\n```\n\n# 执行归档日志模式数据库的完全恢复\n\n术语 `完全恢复` 意味着你可以恢复在故障发生之前已提交的所有事务。`完全恢复`\
    \ 并不意味着你必须完全还原和恢复整个数据库。例如，如果只有一个数据文件经历了介质故障，你只需要还原和恢复那个受损的数据文件即可执行完全恢复。\n\n![Image](img/sq.jpg)\
    \ `提示` 如果你有权访问测试或开发数据库，请花时间逐步演练下面每个示例中的每一步。亲身实践这些步骤，比阅读任何文档都能学到更多关于备份和恢复的知识。\n\
    \n这里概述的步骤适用于任何在归档日志模式下备份的数据库。无论你进行的是冷备份还是热备份都无关紧要。只要数据库在备份时处于归档日志模式，还原和恢复数据文件的步骤都是相同的。对于完全恢复，你需要：\n\
    \n*   能够还原那些经历了介质故障的数据文件\n*   能够访问自上次备份开始以来生成的所有归档重做日志\n*   完好的联机重做日志\n\n以下是完全恢复的基本过程：\n\
    \n1.  将数据库置于装载（`MOUNT`）模式；这可以防止正常的用户事务处理读取/写入正在还原的数据文件。（如果你还原的不是 `SYSTEM` 或 `UNDO`\
    \ 表空间，你也可以选择打开数据库，但在还原数据文件之前手动将其脱机。如果这样做，请确保在恢复完成后将数据文件重新联机。）\n2.  使用操作系统复制实用程序还原受损的数据文件。\n\
    3.  执行相应的 SQL*Plus `RECOVER` 命令，以应用归档重做日志和联机重做日志中所需的任何信息。\n4.  将数据库打开。\n\n接下来的几个部分将演示一些常见的完全还原和恢复场景。你应该能够应用这些基本场景，来诊断并从你遇到的任何复杂情况中恢复。\n\
    \n## 在数据库离线时进行还原和恢复\n\n本节详细描述了一个简单的还原和恢复场景。接下来描述的是模拟一个故障，然后执行完全还原和恢复的步骤。请在开发数据库中尝试此场景。确保你有一个良好的备份，并且不是在包含关键业务数据的数据库中尝试这个实验。\n\
    \n在开始此示例之前，请创建一个表并插入一些数据。在完全恢复过程结束时会选择此表和数据，以演示成功的恢复：\n\n```\nSQL> create table\
    \ foo(foo number) tablespace users;\nSQL> insert into foo values(1);\nSQL> commit;\n\
    ```\n\n现在，多次切换联机日志。这样做可以确保你必须在恢复过程中应用归档重做日志：\n\n```\nSQL> alter system switch\
    \ logfile;\n```\n\n前斜杠 (`/`) 会重新执行最近执行的 SQL 语句：\n\n```\nSQL> /\nSQL> /\nSQL> /\n\
    ```\n\n接下来，通过重命名与 `USERS` 表空间关联的数据文件来模拟介质故障。你可以通过此查询来确定该文件的名称：\n\n```\nSQL> select\
    \ file_name from dba_data_files where tablespace_name='USERS';\n\nFILE_NAME\n\n\
    /u01/dbfile/O12C/users01.dbf\n```\n\n在操作系统中，重命名该文件：\n\n```\n$ mv /u01/dbfile/O12C/users01.dbf\
    \ /u01/dbfile/O12C/users01.dbf.old\n```\n\n然后，尝试停止你的数据库：\n\n```\n$ sqlplus / as\
    \ sysdba\nSQL> shutdown immediate;\n```\n\n你应该会看到类似这样的错误：\n\n```\nORA-01116: error\
    \ in opening database file ...\n```\n\n如果这是一场真实的灾难，明智的做法是导航到数据文件目录，列出文件，并查看有问题的文件是否在其正确的位置。你还应该检查\
    \ `alert.log` 文件，看看 Oracle 是否在那里记录了任何相关信息。\n\n既然你已经模拟了一个介质故障，接下来的几个步骤将引导你完成还原和完全恢复。\n\
    \n### 步骤 1. 将数据库置于装载模式\n\n在将数据库置于装载模式之前，你可能需要先使用 `ABORT` 选项关闭它：\n\n```\n$ sqlplus\
    \ / as sysdba\nSQL> shutdown abort;\nSQL> startup mount;\n```\n\n### 步骤 2. 从备份中还原数据文件\n\
    \n下一步是将备份中对应于故障文件的文件复制回来：\n\n```\n$ cp /u01/hbackup/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf\n\
    ```\n\n此时，思考一下如果你尝试启动数据库，Oracle 会做什么，这很有启发性。当你发出 `ALTER DATABASE OPEN` 语句时，Oracle\
    \ 会检查控制文件中每个数据文件的 `SCN`。你可以通过查询 `V$DATAFILE` 来检查这个 `SCN`：\n\n```\nSQL> select\
    \ checkpoint_change# from v$datafile where file#=4;\n\nCHECKPOINT_CHANGE#\n```\n\
    \nOracle 将控制文件中的 `SCN` 与数据文件头中的 `SCN` 进行比较。你可以通过查询 `V$DATAFILE_HEADER` 来检查数据文件头中的\
    \ `SCN`；例如：\n\n```\nselect file#, fuzzy, checkpoint_change#\nfrom v$datafile_header\n\
    where file#=4;\n\nFILE# FUZ CHECKPOINT_CHANGE#\n---------- --- ------------------\n\
    \         4 YES            3502285\n```\n\n请注意，对于同一个数据文件，`V$DATAFILE_HEADER` 中记录的\
    \ `SCN` 小于 `V$DATAFILE` 中的 `SCN`。如果你尝试打开数据库，Oracle 会抛出一个错误，指出需要介质恢复（意味着你需要应用重做）来同步数据文件中的\
    \ `SCN` 和控制文件中的 `SCN`。`FUZZY` 列被设置为 `YES`。这表明在打开数据文件供使用之前，必须对其应用重做。以下是你此时尝试打开数据库时会发生的情况：\n\
    \n```\nSQL> alter database open;\n\nalter database open;\nalter database open\n\
    *\nERROR at line 1:\nORA-01113: file 4 needs media recovery...\n```\n\n在所有数据文件头中的\
    \ `SCN` 与控制文件中相应的 `SCN` 匹配之前，Oracle 不会让你打开数据库。\n\n### 步骤 3. 执行相应的 `RECOVER` 语句\n\
    \n归档重做日志和联机重做日志拥有将数据文件 `SCN` 追赶到控制文件 `SCN` 所需的信息。你可以通过执行以下 SQL*Plus 语句之一来将重做应用到需要介质恢复的数据文件上：\n\
    \n*   `RECOVER DATAFILE`\n*   `RECOVER TABLESPACE`\n*   `RECOVER DATABASE`\n"
- fmt: "Because only one data file in this example needs to be recovered, the `RECOVER\
    \ DATAFILE` statement is appropriate. However, keep in mind that you can run any\
    \ of the previously listed `RECOVER` statements, and Oracle will figure out what\
    \ needs to be recovered. In this particular scenario, you may find it easier to\
    \ remember the name of the tablespace that contains the restored data file(s)\
    \ than to remember the data file name(s). Next, any data files that need recovery\
    \ in the `USERS` tablespace are recovered:\n\n```\nSQL> recover tablespace users;\n\
    ```\n\nAt this point, Oracle uses the `SCN` in the data file header to determine\
    \ which archive redo log or online redo log to use to begin applying redo. You\
    \ can view the starting log sequence number that `RMAN` will use to begin the\
    \ recovery process via the following query:\n\n```\nselect\n HXFNM file_name\n\
    ,HXFIL file_num\n,FHTNM tablespace_name\n,FHRBA_SEQ sequence\nfrom X$KCVFH\nwhere\
    \ FHTNM = 'USERS';\n```\n\nIf all the redo required is in the online redo logs,\
    \ Oracle applies that redo and displays this message:\n\n```\nMedia recovery complete.\n\
    ```\n\nIf Oracle needs to apply redo that is only contained in archived redo logs\
    \ (meaning that the online redo log that contained the appropriate redo has already\
    \ been overwritten), you’re prompted with a recommendation from Oracle as to which\
    \ archive redo log to apply first:\n\n```\nORA-00279: change 3502285 generated\
    \ at 11/02/2012 10:49:39 needed for thread 1\nORA-00289: suggestion : /u01/oraarch/O12C/1_1_798283209.dbf\n\
    ORA-00280: change 3502285 for thread 1 is in sequence #1\n\nSpecify log: {<RET>=suggested\
    \ | filename | AUTO | CANCEL}\n```\n\nYou can press Enter or Return (`<RET>`)\
    \ to have Oracle apply the suggested archive redo log file, specify a file name,\
    \ specify `AUTO` to instruct Oracle to apply any suggested files automatically,\
    \ or type `CANCEL` to cancel out of the recovery operation.\n\nIn this example,\
    \ specify `AUTO`. Oracle applies all redo in all archive redo log files and online\
    \ redo log files to perform a complete recovery:\n\n```\nAUTO\n```\n\nThe last\
    \ message displayed after all required archive redo and online redo have been\
    \ applied is this:\n\n```\nLog applied.\nMedia recovery complete.\n```\n\n## Step\
    \ 4. Alter Your Database Open\n\nAfter the media recovery is complete, you can\
    \ open your database:\n\n```\nSQL> alter database open;\n```\n\nYou can now verify\
    \ that the transaction you committed just prior to the media failure was restored\
    \ and recovered:\n\n```\nSQL> select * from foo;\n\nFOO\n```\n\n## Restoring and\
    \ Recovering with a Database Online\n\nIf you lose a data file associated with\
    \ a tablespace other than `SYSTEM` and `UNDO`, you can restore and recover the\
    \ damaged data file while leaving the database online. For this to work, any data\
    \ files being restored and recovered must be taken offline first. You may be alerted\
    \ to an issue with a data file in which a user is attempting to update a table\
    \ and sees an error such as this:\n\n```\nSQL> insert into foo values(2);\n\n\
    ORA-01116: error in opening database file ...\n```\n\nYou navigate to the OS directory\
    \ that contains the data file and determine that it has been erroneously removed\
    \ by a system administrator.\n\nIn this example the data file associated with\
    \ the `USERS` tablespace is taken offline and subsequently restored and recovered\
    \ while the rest of the database remains online. First, place take the data file\
    \ offline:\n\n```\nSQL> alter database datafile '/u01/dbfile/O12C/users01.dbf'\
    \ offline;\n```\n\nNow, restore the appropriate data file from the backup location:\n\
    \n```\n$ cp /u01/hbackup/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf\n```\n\n\
    In this situation, you can’t use `RECOVER DATABASE`. The `RECOVER DATABASE` statement\
    \ attempts to recover all data files in the database, of which the `SYSTEM` tablespace\
    \ is part. The `SYSTEM` tablespace can’t be recovered while the database is online.\
    \ If you use the `RECOVER TABLESPACE`, all data files associated with the tablespace\
    \ must be offline. In this case, it’s more appropriate to recover at the data\
    \ file level of granularity:"
  raw: 'Because only one data file in this example needs to be recovered, the `RECOVER
    DATAFILE` statement is appropriate. However, keep in mind that you can run any
    of the previously listed `RECOVER` statements, and Oracle will figure out what
    needs to be recovered. In this particular scenario, you may find it easier to
    remember the name of the tablespace that contains the restored data file(s) than
    to remember the data file name(s). Next, any data files that need recovery in
    the `USERS` tablespace are recovered:


    ```

    SQL> recover tablespace users;

    ```


    At this point, Oracle uses the SCN in the data file header to determine which
    archive redo log or online redo log to use to begin applying redo. You can view
    the starting log sequence number that RMAN will use to begin the recovery process
    via the following query:


    ```

    select

     HXFNM file_name

    ,HXFIL file_num

    ,FHTNM tablespace_name

    ,FHTHR thread

    ,FHRBA_SEQ sequence

    from X$KCVFH

    where FHTNM = ''USERS'';

    ```


    If all the redo required is in the online redo logs, Oracle applies that redo
    and displays this message:


    ```

    Media recovery complete.

    ```


    If Oracle needs to apply redo that is only contained in archived redo logs (meaning
    that the online redo log that contained the appropriate redo has already been
    overwritten), you’re prompted with a recommendation from Oracle as to which archive
    redo log to apply first:


    ```

    ORA-00279: change 3502285 generated at 11/02/2012 10:49:39 needed for thread 1

    ORA-00289: suggestion : /u01/oraarch/O12C/1_1_798283209.dbf

    ORA-00280: change 3502285 for thread 1 is in sequence #1


    Specify log: {<RET>=suggested | filename | AUTO | CANCEL}

    ```


    You can press Enter or Return (`<RET>`) to have Oracle apply the suggested archive
    redo log file, specify a file name, specify `AUTO` to instruct Oracle to apply
    any suggested files automatically, or type `CANCEL` to cancel out of the recovery
    operation.


    In this example, specify `AUTO`. Oracle applies all redo in all archive redo log
    files and online redo log files to perform a complete recovery:


    ```

    AUTO

    ```


    The last message displayed after all required archive redo and online redo have
    been applied is this:


    ```

    Log applied.

    Media recovery complete.

    ```


    Step 4\. Alter Your Database Open


    After the media recovery is complete, you can open your database:


    ```

    SQL> alter database open;

    ```


    You can now verify that the transaction you committed just prior to the media
    failure was restored and recovered:


    ```

    SQL> select * from foo;


    FOO


    ```


    Restoring and Recovering with a Database Online


    If you lose a data file associated with a tablespace other than `SYSTEM` and `UNDO`,
    you can restore and recover the damaged data file while leaving the database online.
    For this to work, any data files being restored and recovered must be taken offline
    first. You may be alerted to an issue with a data file in which a user is attempting
    to update a table and sees an error such as this:


    ```

    SQL> insert into foo values(2);


    ORA-01116: error in opening database file ...

    ```


    You navigate to the OS directory that contains the data file and determine that
    it has been erroneously removed by a system administrator.


    In this example the data file associated with the `USERS` tablespace is taken
    offline and subsequently restored and recovered while the rest of the database
    remains online. First, place take the data file offline:


    ```

    SQL> alter database datafile ''/u01/dbfile/O12C/users01.dbf'' offline;

    ```


    Now, restore the appropriate data file from the backup location:


    ```

    $ cp /u01/hbackup/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf

    ```


    In this situation, you can’t use `RECOVER DATABASE`. The `RECOVER DATABASE` statement
    attempts to recover all data files in the database, of which the `SYSTEM` tablespace
    is part. The `SYSTEM` tablespace can’t be recovered while the database is online.
    If you use the `RECOVER TABLESPACE`, all data files associated with the tablespace
    must be offline. In this case, it’s more appropriate to recover at the data file
    level of granularity:'
  trans: "\n因为在本例中仅需恢复一个数据文件，所以使用 `RECOVER DATAFILE` 语句是合适的。不过请记住，你可以运行前面列出的任何 `RECOVER`\
    \ 语句，Oracle 会自行判断需要恢复什么。在这种特定场景下，你可能会发现记住包含已恢复数据文件的表空间名称比记住数据文件名称更容易。接下来，恢复 `USERS`\
    \ 表空间中所有需要恢复的数据文件：\n\n```\nSQL> recover tablespace users;\n```\n\n此时，Oracle 会使用数据文件头部的\
    \ `SCN` 来确定从哪个归档重做日志或联机重做日志开始应用重做数据。你可以通过以下查询查看 `RMAN` 将用于开始恢复过程的起始日志序列号：\n\n\
    ```\nselect\n HXFNM file_name\n,HXFIL file_num\n,FHTNM tablespace_name\n,FHRBA_SEQ\
    \ sequence\nfrom X$KCVFH\nwhere FHTNM = 'USERS';\n```\n\n如果所有需要的重做数据都存在于联机重做日志中，Oracle\
    \ 会应用该重做数据并显示此消息：\n\n```\nMedia recovery complete.\n```\n\n如果 Oracle 需要应用仅存在于归档重做日志中的重做数据（这意味着包含相应重做数据的联机重做日志已被覆盖），系统会提示你一条\
    \ Oracle 的建议，告知首先应用哪个归档重做日志：\n\n```\nORA-00279: change 3502285 generated at 11/02/2012\
    \ 10:49:39 needed for thread 1\nORA-00289: suggestion : /u01/oraarch/O12C/1_1_798283209.dbf\n\
    ORA-00280: change 3502285 for thread 1 is in sequence #1\n\nSpecify log: {<RET>=suggested\
    \ | filename | AUTO | CANCEL}\n```\n\n你可以按回车键 (`<RET>`) 让 Oracle 应用建议的归档重做日志文件，指定一个文件名，指定\
    \ `AUTO` 指示 Oracle 自动应用所有建议的文件，或者输入 `CANCEL` 取消恢复操作。\n\n在此示例中，指定 `AUTO`。Oracle\
    \ 将应用所有归档重做日志文件和联机重做日志文件中的重做数据以完成完全恢复：\n\n```\nAUTO\n```\n\n当所有需要的归档重做和联机重做都应用完毕后，最后显示的消息是：\n\
    \n```\nLog applied.\nMedia recovery complete.\n```\n\n## 步骤 4. 打开数据库\n\n介质恢复完成后，你可以打开数据库：\n\
    \n```\nSQL> alter database open;\n```\n\n你现在可以验证在介质故障之前提交的事务是否已恢复并完成恢复：\n\n```\n\
    SQL> select * from foo;\n\nFOO\n```\n\n## 在数据库联机状态下恢复与修复\n\n如果你丢失了与 `SYSTEM` 和\
    \ `UNDO` 以外的表空间关联的数据文件，可以在数据库保持联机状态的同时恢复并修复损坏的数据文件。为此，任何正在被恢复和修复的数据文件必须先被脱机。你可能会收到关于数据文件问题的警报，例如有用户尝试更新表时看到如下错误：\n\
    \n```\nSQL> insert into foo values(2);\n\nORA-01116: error in opening database\
    \ file ...\n```\n\n你导航到包含该数据文件的操作系统目录，并确认它已被系统管理员错误地删除。\n\n在此示例中，与 `USERS` 表空间关联的数据文件被脱机，随后在数据库其余部分保持联机的状态下进行恢复和修复。首先，将数据文件脱机：\n\
    \n```\nSQL> alter database datafile '/u01/dbfile/O12C/users01.dbf' offline;\n\
    ```\n\n现在，从备份位置恢复相应的数据文件：\n\n```\n$ cp /u01/hbackup/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf\n\
    ```\n\n在此情况下，你不能使用 `RECOVER DATABASE`。`RECOVER DATABASE` 语句尝试恢复数据库中的所有数据文件，而 `SYSTEM`\
    \ 表空间是其中的一部分。`SYSTEM` 表空间在数据库联机时无法被恢复。如果你使用 `RECOVER TABLESPACE`，则与该表空间关联的所有数据文件都必须处于脱机状态。在这种情况下，更合适的做法是在数据文件级别进行恢复：\n"
- fmt: "## 恢复数据文件\n\n执行以下命令：\n```\nSQL> recover datafile '/u01/dbfile/O12C/users01.dbf';\n\
    ```\n\nOracle 检查数据文件头中的 SCN，确定要使用哪个归档重做日志或在线重做日志来开始应用重做。如果所有需要的重做都在在线重做日志中，你将看到这条消息：\n\
    ```\nMedia recovery complete.\n```\n\n如果重做起始点只存在于归档重做日志文件中，Oracle 会建议从哪个文件开始：\n\
    ```\nORA-00279: change 3502285 generated at 11/02/2012 10:49:39 needed for thread\
    \ 1\nORA-00289: suggestion : /u01/oraarch/O12C/1_1_798283209.dbf\nORA-00280: change\
    \ 3502285 for thread 1 is in sequence #1\n\nSpecify log: {<RET>=suggested | filename\
    \ | AUTO | CANCEL}\n```\n\n你可以输入 `AUTO` 让 Oracle 应用归档重做日志文件和在线重做日志文件中所有需要的重做：\n\
    ```\nAUTO\n```\n\n如果成功，你应该会看到这条消息：\n```\nLog applied.\nMedia recovery complete.\n\
    ```\n\n现在，你可以将数据文件重新联机：\n```\nSQL> alter database datafile '/u01/dbfile/O12C/users01.dbf'\
    \ online;\n```\n\n如果成功，你会看到：\n```\nDatabase altered.\n```\n\n## 恢复控制文件\n\n在处理用户管理的备份时，通常会在以下情况下恢复控制文件：\n\
    \n*   控制文件损坏，且该文件是多路复用的。\n*   所有控制文件都损坏。\n\n以下部分将介绍这两种情况。\n\n### 多路复用时恢复损坏的控制文件\n\
    \n如果你为数据库配置了多个控制文件，可以关闭数据库并使用操作系统命令将现有的控制文件复制到丢失控制文件的位置。例如，从初始化文件中，你得知此数据库使用了两个控制文件：\n\
    ```\nSQL> show parameter control_files\n\nNAME                     TYPE      \
    \  VALUE\n---------------------------- ----------- ------------------------------\n\
    control_files            string      /u01/dbfile/O12C/control01.ctl\n        \
    \                             ,/u02/dbfile/O12C/control02.ctl\n```\n\n假设 `control02.ctl`\
    \ 文件已损坏。查询数据字典时 Oracle 会抛出此错误：\n```\nORA-00210: cannot open the specified control\
    \ file...\n```\n\n当有完好的控制文件可用时，你可以关闭数据库，移动旧的/损坏的控制文件（这可以保留它，以备日后进行根本原因分析），然后将现有的完好控制文件复制到损坏控制文件的名称和位置：\n\
    ```\nSQL> shutdown abort;\n\n$ mv /u02/dbfile/O12C/control02.ctl /u02/dbfile/O12C/control02.ctl.old\n\
    $ cp /u01/dbfile/O12C/control01.ctl /u02/dbfile/O12C/control02.ctl\n```\n\n现在，重新启动数据库：\n\
    ```\nSQL> startup;\n```\n\n通过这种方式，你可以从现有的控制文件恢复一个控制文件。\n\n### 所有控制文件都损坏时的恢复\n\n\
    如果丢失了所有控制文件，你可以从备份中恢复一个，或者重新创建控制文件。只要你拥有所有的数据文件和任何需要的重做（归档重做和在线重做），就应该能够完全恢复数据库。此场景的步骤如下：\n\
    \n1.  关闭数据库。\n2.  从备份中恢复一个控制文件。\n3.  以 `MOUNT` 模式启动数据库，并使用 `RECOVER DATABASE USING\
    \ BACKUP CONTROLFILE` 子句启动数据库恢复。\n4.  对于完全恢复，手动应用在线重做日志中包含的重做。\n5.  使用 `OPEN RESETLOGS`\
    \ 子句打开数据库。\n\n在此示例中，数据库的所有控制文件都被意外删除，随后 Oracle 报告此错误：\n```\nORA-00210: cannot\
    \ open the specified control file...\n```\n\n#### 第 1 步：关闭数据库\n\n首先，关闭数据库：\n```\n\
    SQL> shutdown abort;\n```\n\n#### 第 2 步：从备份中恢复控制文件\n\n此数据库配置为只有一个控制文件，你可以将其从备份位置复制回来，如下所示：\n\
    ```\n$ cp /u01/hbackup/O12C/controlbk.ctl /u01/dbfile/O12C/control01.ctl\n```"
  raw: '```

    SQL> recover datafile ''/u01/dbfile/O12C/users01.dbf'';

    ```


    Oracle inspects the SCN in the data file header and determines which archive redo
    log or online redo log to use to start applying redo. If all redo required is
    in the online redo logs, you see this message:


    ```

    Media recovery complete.

    ```


    If the starting point for redo is contained only in an archive redo log file,
    Oracle suggests which file to start with:


    ```

    ORA-00279: change 3502285 generated at 11/02/2012 10:49:39 needed for thread 1

    ORA-00289: suggestion : /u01/oraarch/O12C/1_1_798283209.dbf

    ORA-00280: change 3502285 for thread 1 is in sequence #1


    Specify log: {<RET>=suggested | filename | AUTO | CANCEL}

    ```


    You can type `AUTO` to have Oracle apply all required redo in archive redo log
    files and online redo log files:


    ```

    AUTO

    ```


    If successful, you should see this message:


    ```

    Log applied.

    Media recovery complete.

    ```


    You can now bring the data file back online:


    ```

    SQL> alter database datafile ''/u01/dbfile/O12C/users01.dbf'' online;

    ```


    If successful, you should see this:


    ```

    Database altered.

    ```


    Restoring Control Files


    When you’re dealing with user-managed backups, you usually restore the control
    file in one of these situations:


    *   A control file is damaged, and the file is multiplexed.

    *   All control files are damaged.


    These two situations are covered in the following sections.


    Restoring a Damaged Control File When Multiplexed


    If you configure your database with more than one control file, you can shut down
    the database and use an OS command to copy an existing control file to the location
    of the missing control file. For example, from the initialization file, you know
    that two control files are used for this database:


    ```

    SQL> show parameter control_files


    NAME                         TYPE        VALUE

    ---------------------------- ----------- ------------------------------

    control_files                string      /u01/dbfile/O12C/control01.ctl

                                             ,/u02/dbfile/O12C/control02.ctl

    ```


    Suppose the `control02.ctl` file has become damaged. Oracle throws this error
    when querying the data dictionary:


    ```

    ORA-00210: cannot open the specified control file...

    ```


    When a good control file is available, you can shut down the database, move the
    old/bad control file (this preserves it, in the event that it is later needed
    for root cause analysis), and copy the existing good control file to the name
    and location of the bad control file:


    ```

    SQL> shutdown abort;


    $ mv /u02/dbfile/O12C/control02.ctl /u02/dbfile/O12C/control02.ctl.old

    $ cp /u01/dbfile/O12C/control01.ctl /u02/dbfile/O12C/control02.ctl

    ```


    Now, restart the database:


    ```

    SQL> startup;

    ```


    In this manner, you can restore a control file from an existing control file.


    Restoring When All Control Files Are Damaged


    If you lose all of your control files, you can restore one from a backup, or you
    can recreate the control file. As long as you have all your data files and any
    required redo (archive redo and online redo), you should be able to recover your
    database completely. The steps for this scenario are as follows:


    1.  Shut down the database.

    2.  Restore a control file from the backup.

    3.  Start the database in mount mode, and initiate database recovery, using the
    `RECOVER DATABASE USING BACKUP CONTROLFILE` clause.

    4.  For a complete recovery, manually apply the redo contained in the online redo
    logs.

    5.  Open the database with the `OPEN RESETLOGS` clause.


    In this example all control files for the database were accidentally deleted,
    and Oracle subsequently reports this error:


    ```

    ORA-00210: cannot open the specified control file...

    ```


    Step 1\. Shut Down the Database


    First, shut down the database:


    ```

    SQL> shutdown abort;

    ```


    Step 2\. Restore the Control File from the Backup


    This database was configured with just one control file, which you copy back from
    the backup location, as shown:


    ```

    $ cp /u01/hbackup/O12C/controlbk.ctl /u01/dbfile/O12C/control01.ctl

    ```'
