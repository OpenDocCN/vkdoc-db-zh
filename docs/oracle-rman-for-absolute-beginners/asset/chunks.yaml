  trans: '

    有时，数据库管理员（DBA）会表现出类似卢德分子那样对 `exp`/`imp` 工具的执着，因为 DBA 们熟悉这些工具的语法，并且它们能快速完成任务。即便这些传统工具易于使用，您也应考虑未来使用
    **Data Pump**。Data Pump 相较于旧的 `exp`/`imp` 工具提供了**显著增强的功能**：


    *   针对大数据集的高性能，支持高效导出和导入千兆字节的数据

    *   交互式命令行实用程序，允许您断开连接并在之后重新连接到正在运行的 Data Pump 作业

    *   能够从远程数据库导出大量数据并直接导入本地数据库，无需创建转储文件

    *   能够在从导出到导入的过程中，对模式、表空间、数据文件和存储设置进行**即时更改**

    *   对对象和数据进行**精细过滤**

    *   通过（数据库）目录对象实现安全控制

    *   高级功能，例如压缩和加密


    本章首先讨论 Data Pump 的架构。后续主题包括基本的导出和导入任务、跨网络移动数据、过滤数据以及在遗留模式下运行 Data Pump。


    ## Data Pump 架构


    Data Pump 由以下组件组成：


    *   `expdp`（Data Pump 导出实用程序）

    *   `impdp`（Data Pump 导入实用程序）

    *   `DBMS_DATAPUMP` PL/SQL 包（Data Pump 应用程序编程接口 [API]）

    *   `DBMS_METADATA` PL/SQL 包（Data Pump 元数据 API）


    `expdp` 和 `impdp` 实用程序在导出和导入数据及元数据时，会使用内置的 `DBMS_DATAPUMP` 和 `DBMS_METADATA` PL/SQL
    包。`DBMS_DATAPUMP` 包用于在数据库环境之间移动整个数据库或数据子集。`DBMS_METADATA` 包则用于导出和导入关于数据库对象的信息。


    ![Image](img/sq.jpg) 注意：您可以从 SQL*Plus 中独立（在 `expdp` 和 `impdp` 之外）调用 `DBMS_DATAPUMP`
    和 `DBMS_METADATA` 包。我很少直接从 SQL*Plus 调用这些包，但您可能有特定场景需要直接与它们交互。更多详情请参阅 *Oracle Database
    PL/SQL Packages and Types Reference Guide*，该指南可从 Oracle 网站 (`http://otn.oracle.com`)
    的 Technology Network 区域下载。


    ### 主进程和工作进程


    当您启动 Data Pump 导出或导入作业时，会在数据库服务器上初始化一个主操作系统进程。此主进程的名称格式为 `ora_dmNN_<SID>`。在 Linux/Unix
    系统上，您可以使用 `ps` 命令从操作系统提示符查看此进程：

    ```

    $ ps -ef | grep -v grep | grep ora_dm

    oracle   14602      1  4 08:59 ?        00:00:03 ora_dm00_O12C

    ```

    根据并行度和指定的工作量，还会启动若干个工作进程。如果未指定并行度，则仅启动一个工作进程。主进程协调主进程和工作进程之间的工作。工作进程的名称格式为 `ora_dwNN_<SID>`。


    ### 状态表


    当用户启动导出或导入作业时，会创建一个数据库状态表（由启动作业的用户拥有）。该表仅在 Data Pump 作业期间存在。状态表的名称取决于您运行的作业类型。表的名称格式为
    `SYS_<OPERATION>_<JOB_MODE>_NN`，其中 `OPERATION` 为 `EXPORT` 或 `IMPORT`。`JOB_MODE`
    可以是以下类型之一：


    *   `FULL`

    *   `SCHEMA`

    *   `TABLE`

    *   `TABLESPACE`

    *   `TRANSPORTABLE`


    例如，如果您正在导出一个模式，则会在您的账户中创建一个名为 `SYS_EXPORT_SCHEMA_NN` 的表，其中 `NN` 是一个数字，用于确保该表名在用户模式中是唯一的。此状态表包含诸如导出/导入的对象、开始时间、耗时、行数和错误计数等信息。该状态表包含超过
    80 个列。


    ![Image](img/sq.jpg) 提示：Data Pump 状态表创建在执行导出/导入的用户的默认永久表空间中。因此，如果用户没有在默认表空间中创建表的权限，Data
    Pump 作业将失败，并出现 `ORA-31633` 错误。


    状态表在导出或导入作业成功完成后会被 Data Pump 删除。如果您使用 `KILL_JOB` 交互式命令，主表也会被删除。如果您使用 `STOP_JOB`
    交互式命令停止作业，该表不会被移除，并可在您重新启动作业时使用。


    如果您的作业异常终止，主表将被保留。如果您不打算重新启动作业，可以删除该状态表。


    ### 目录对象


    当 Data Pump 运行时，它使用数据库目录对象来确定写入和读取转储文件及日志文件的位置。通常，您需要指定希望 Data Pump 使用的目录对象。如果您未指定目录对象，则会使用一个默认目录。默认目录路径由名为
    `DATA_PUMP_DIR` 的数据目录对象定义。该目录对象在数据库首次创建时自动创建。在 Linux/Unix 系统上，此目录对象映射到 `ORACLE_HOME/rdbms/log`
    目录。


    Data Pump 导出会创建一个导出文件和一个日志文件。导出文件包含要导出的对象。日志文件包含作业活动的记录。图 8-1 显示了与 Data Pump 导出作业相关的架构组件。


    ![9781484207642_Fig08-01.jpg](img/9781484207642_Fig08-01.jpg)


    图 8-1. Data Pump 导出作业组件


    类似地，图 8-2 展示了 Data Pump 导入作业的架构组件。导出与导入之间的主要区别在于数据流的方向。导出将数据从数据库中写出，而导入则将信息带入数据库。在学习本章中有关
    Data Pump 的示例和概念时，请回头参考这些图表。


    ![9781484207642_Fig08-02.jpg](img/9781484207642_Fig08-02.jpg)


    图 8-2. Data Pump 导入作业组件


    对于每个 Data Pump 作业，您必须确保有权访问一个目录对象。导出和导入的基础知识将在接下来的几节中描述。

