    *   `ALL`

    *   `DATA_ONLY`

    *   `ENCRYPTED_COLUMNS_ONLY`

    *   `METADATA_ONLY`

    *   `NONE`


    `ALL` 选项为数据和元数据启用加密。`DATA_ONLY` 选项仅加密数据。`ENCRYPTED_COLUMNS_ONLY` 选项指定仅在数据库中加密的列才以加密格式写入转储文件。`METADATA_ONLY`
    选项仅加密导出文件中的元数据。


    ## 将视图导出为表


    从 Oracle 12c 开始，您可以导出视图并在之后将其作为表导入。如果您需要将视图中包含的数据复制到历史报告数据库，则可能需要这样做。


    使用 `VIEWS_AS_TABLES` 参数将视图导出到表结构中。此参数的语法如下：


    ```

    VIEWS_AS_TABLES=[schema_name.]view_name[:template_table_name]

    ```


    以下是一个示例：


    ```

    $ expdp mv_maint/foo directory=dp_dir dumpfile=v.dmp \

    views_as_tables=sales_rockies

    ```


    现在，转储文件可用于将名为 `SALES_ROCKIES` 的表导入不同的方案或数据库。


    ```

    $ impdp mv_maint/foo directory=dp_dir dumpfile=v.dmp

    ```


    如果您只想导入在导出期间从视图创建的表，可以按如下方式进行：


    ```

    $ impdp mv_maint/foo directory=dp_dir dumpfile=v.dmp tables=sales_rockies

    ```


    该表将具有与视图定义相同的列和数据类型。该表还将包含与导出时从视图中选择的内容相匹配的数据行。


    ## 导入时禁用重做日志记录


    从 Oracle 12c 开始，您可以指定对象以 nologging 方式加载重做。这是通过 `DISABLE_ARCHIVE_LOGGING` 参数实现的：


    ```

    $ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp \

    transform=disable_archive_logging:Y

    ```


    在执行导入期间，对象的日志记录属性被设置为 `NO`；导入后，日志记录属性被设置回其原始值。对于数据泵可以使用直接路径执行的操作（例如向表中插入数据），这可以减少导入期间生成的重做量。


    ## 交互式命令模式


    数据泵提供了一个交互式命令模式，允许您监控数据泵作业的状态并动态修改许多作业特征。交互式命令模式对于长时间运行的数据泵操作最为有用。在此模式下，您还可以停止、重新启动或终止当前正在运行的作业。以下部分将讨论这些活动。


    ### 进入交互式命令模式


    有两种方式可以访问交互式命令模式提示符：


    *   在通过 `expdp` 或 `impdp` 启动的数据泵作业中按 Ctrl+C。

    *   使用 `ATTACH` 参数附加到当前正在运行的作业。


    当您从命令行运行数据泵作业时，您将处于命令行模式。随着作业的进行，您应该会看到输出显示在您的终端上。如果要退出命令行模式，请按 Ctrl+C。这将使您进入交互式命令界面模式。对于导出作业，提示符为：


    ```

    Export>

    ```


    输入 `HELP` 命令以查看可用的导出交互式命令（参见 表 8-1）：


    ```

    Export> help

    ```


    **表 8-1**. 导出交互式命令


    | 命令 | 描述 |

    | --- | --- |

    | `ADD_FILE` | 向导出转储集添加文件 |

    | `CONTINUE_CLIENT` | 继续交互式客户端模式 |

    | `EXIT_CLIENT` | 退出客户端会话并返回到操作系统提示符；让当前作业继续运行 |

    | `FILESIZE` | 为任何后续创建的转储文件定义文件大小 |

    | `HELP` | 显示交互式导出命令 |

    | `KILL_JOB` | 终止当前作业 |

    | `PARALLEL` | 增加或减少并行度 |

    | `REUSE_DUMPFILES` | 如果转储文件存在则覆盖它（默认为 `N`） |

    | `START_JOB` | 重新启动已附加的作业 |

    | `STATUS` | 显示当前附加作业的状态 |

    | `STOP_JOB [=IMMEDIATE]` | 停止作业处理（您可以稍后重新启动它）。使用 `IMMEDIATE` 参数可快速停止作业，但可能有一些未完成的任务。
    |


    输入 `EXIT` 以离开交互式命令模式：


    ```

    Export> exit

    ```


    您现在应该处于操作系统提示符下。


    您可以在导出或导入作业中按 Ctrl+C。对于导入作业，交互式命令模式提示符为：


    ```

    Import>

    ```


    要查看所有可用命令，请输入 `HELP`：


    ```

    Import> help

    ```


    交互式命令模式的导入命令总结在 表 8-2 中。


    **表 8-2**. 导入交互式命令


    | 命令 | 描述 |

    | --- | --- |

    | `CONTINUE_CLIENT` | 继续交互式日志记录模式 |

    | `EXIT_CLIENT` | 退出客户端会话并返回到操作系统提示符。让当前作业继续运行 |

    | `HELP` | 显示可用的交互式命令 |

    | `KILL_JOB` | 终止客户端当前连接到的作业 |

    | `PARALLEL` | 增加或减少并行度 |

    | `START_JOB` | 重新启动先前停止的作业 |'
- fmt: "`START_JOB=SKIP_CURRENT` 会重启作业并跳过作业停止时处于活动状态的任何操作。\n`STATUS` 指定监控作业状态的频率。默认模式为\
    \ 0；在此模式下，客户端会在作业状态变化可用时立即报告。\n`STOP_JOB [=IMMEDIATE]` 停止作业处理（稍后可以重启）。使用 `IMMEDIATE`\
    \ 参数可以快速停止作业，但可能会有一些未完成的任务。\n\n键入 `EXIT` 以离开 Data Pump 状态工具：\n```\nImport> exit\n\
    ```\n此时您应该处于操作系统提示符下。\n\n## 连接到正在运行的作业\n\nData Pump 的一个强大功能是，您可以连接到当前正在运行的作业并查看其进度和状态。如果您拥有\
    \ DBA 权限，即使您不是作业所有者，也可以连接。您可以通过 `ATTACH` 参数连接到导入或导出作业。\n\n在连接到作业之前，您必须首先确定 Data\
    \ Pump 作业名称（以及所有者名称，如果您不是作业所有者）。运行以下 SQL 查询以显示当前正在运行的作业：\n```\nSQL> select owner_name,\
    \ operation, job_name, state from dba_datapump_jobs;\n```\n以下是一些示例输出：\n```\nOWNER_NAME\
    \      OPERATION       JOB_NAME               STATE\n--------------- ---------------\
    \ -------------------- --------------------\nMV_MAINT        EXPORT          SYS_EXPORT_SCHEMA_01\
    \  EXECUTING\n```\n在此示例中，`MV_MAINT` 用户可以直接连接到该导出作业，如下所示：\n```\n$ expdp mv_maint/foo\
    \ attach=sys_export_schema_01\n```\n如果您不是作业所有者，则通过指定所有者名称和作业名称来连接到作业：\n```\n$\
    \ expdp system/foobar attach=mv_maint.sys_export_schema_01\n```\n现在您应该会看到 Data\
    \ Pump 命令行提示符：\n```\nExport>\n```\n键入 `STATUS` 以查看当前连接作业的状态：\n```\nExport> status\n\
    ```\n\n## 停止和重启作业\n\n如果您有一个当前正在运行的 Data Pump 作业希望暂时停止，可以先连接到交互式命令模式来实现。您可能希望停止作业以解决空间问题或性能问题，待问题解决后再重启作业。以下示例连接到一个导入作业：\n\
    ```\n$ impdp mv_maint/foo attach=sys_import_table_01\n```\n现在，使用 `STOP_JOB` 参数停止作业：\n\
    ```\nImport> stop_job\n```\n您应该会看到以下输出：\n```\nAre you sure you wish to stop this\
    \ job ([yes]/no):\n```\n键入 `YES` 以继续停止作业。您还可以指定立即停止作业：\n```\nImport> stop_job=immediate\n\
    ```\n当您使用 `IMMEDIATE` 选项停止作业时，与该作业关联的一些任务可能未完成。要重启作业，请连接到交互式命令模式，并发出 `START_JOB`\
    \ 命令：\n```\nImport> start_job\n```\n如果您希望继续将作业输出记录到您的终端，请发出 `CONTINUE_CLIENT`\
    \ 命令：\n```\nImport> continue_client\n```\n\n## 终止 Data Pump 作业\n\n您可以指示 Data Pump\
    \ 永久终止一个导出或导入作业。首先，以交互式命令模式连接到作业，然后发出 `KILL_JOB` 命令：\n```\nImport> kill_job\n\
    ```\n系统将提示您以下输出：\n```\nAre you sure you wish to stop this job ([yes]/no):\n```\n\
    键入 `YES` 以永久终止该作业。Data Pump 会立即终止作业，并从运行导出或导入的用户中删除相关的状态表。\n\n## 监控 Data Pump\
    \ 作业\n\n当您有长时间运行的 Data Pump 作业时，应不时检查作业状态，以确保其未失败、未被挂起等等。\n\n有几种方法可以监控 Data Pump\
    \ 作业的状态：\n* 屏幕输出\n* Data Pump 日志文件\n* 查询数据字典视图\n* 数据库告警日志\n* 查询状态表\n* 交互式命令模式状态\n\
    * 使用进程状态 (`ps`) 操作系统工具\n\n最直观的监控方法是查看 Data Pump 在作业运行时显示在屏幕上的状态。如果您已从命令模式断开连接，则状态将不再显示在屏幕上。在这种情况下，您必须使用另一种技术来监控\
    \ Data Pump 作业。\n\n### Data Pump 日志文件\n\n默认情况下，Data Pump 会为每个作业生成一个日志文件。启动 Data\
    \ Pump 作业时，最好为该作业指定一个特定的日志文件名：\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=archive.dmp\
    \ logfile=archive.log\n```\n此作业会创建一个名为 `archive.log` 的文件，该文件放置在数据库对象 `DP` 引用的目录中。如果您没有显式命名日志文件，Data\
    \ Pump 导入会创建一个名为 `import.log` 的文件，而 Data Pump 导出会创建一个名为 `export.log` 的文件。\n\n\
    ![Image](images/sq.jpg) `Note`  该日志文件包含的信息与您运行 Data Pump 作业时在屏幕上以交互方式看到的信息相同。\n\
    \n### 数据字典视图\n\n快速判断 Data Pump 作业是否正在运行的一种方法是检查 `DBA_DATAPUMP_JOBS` 视图，查看是否有状态为\
    \ `EXECUTING` 的作业在运行：\n```\nselect job_name, operation, job_mode, state from dba_datapump_jobs;\n\
    ```\n以下是一些示例输出：\n```\nJOB_NAME                  OPERATION            JOB_MODE\
    \   STATE\n------------------------- -------------------- ---------- ---------------\n\
    SYS_IMPORT_TABLE_04       IMPORT               TABLE      EXECUTING\nSYS_IMPORT_FULL_02\
    \        IMPORT               FULL       NOT RUNNING\n```\n您还可以通过以下查询 `DBA_DATAPUMP_SESSIONS`\
    \ 视图来获取会话信息：\n```\nselect sid, serial#, username, process, program from v$session\
    \ s,\n     dba_datapump_sessions d where s.saddr = d.saddr;\n```\n以下是一些示例输出，显示正在使用多个\
    \ Data Pump 会话：\n```\n      SID    SERIAL#  USERNAME           PROCESS       \
    \  PROGRAM\n---------- ---------- -------------------- --------------- ----------------------\n\
    \      1049       6451 STAGING            11306           oracle@xengdb (DM00)\n\
    \      1058      33126 STAGING            11338           oracle@xengdb (DW01)\n\
    \      1048      50508 STAGING            11396           oracle@xengdb (DW02)\n\
    ```\n\n### 数据库告警日志\n\n如果某个作业花费的时间比您预期的长得多，请检查数据库告警日志中是否有类似以下的消息：\n```\nstatement\
    \ in resumable session 'SYS_IMPORT_SCHEMA_02.1' was suspended due to\nORA-01652:\
    \ unable to extend temp segment by 64 in tablespace REG_TBSP_3\n```\n此消息表明一个 Data\
    \ Pump 导入作业被暂停，正在等待向 `REG_TBSP_3` 表空间添加空间。向表空间添加空间后，Data Pump 作业会自动恢复处理。默认情况下，Data\
    \ Pump 作业会等待 2 小时以添加空间。\n\n![Image](images/sq.jpg) `Note`  除了写入告警日志外，对于每个 Data\
    \ Pump 作业，Oracle 会在 `ADR_HOME/trace` 目录中创建一个跟踪文件。该文件包含会话 ID 和作业开始时间等信息。跟踪文件的命名格式如下：`<SID>_dm00_<process_ID>.trc`。\n\
    \n### 状态表\n\n每次启动 Data Pump 作业时，都会在运行作业的用户帐户中自动创建一个状态表。对于导出作业，表名取决于您运行的导出作业类型。表的命名格式为\
    \ `SYS_<OPERATION>_<JOB_MODE>_NN`，其中 `OPERATION` 是 `EXPORT` 或 `IMPORT`。`JOB_MODE`\
    \ 可以是 `FULL`、`SCHEMA`、`TABLE`、`TABLESPACE` 等。"
  raw: '`START_JOB=SKIP_CURRENT` restarts the job and skips any operations that were
    active when the job was stopped | | `STATUS` | Specifies the frequency at which
    the job status is monitored. Default mode is 0; the client reports job status
    changes whenever available in this mode. | | `STOP_JOB [=IMMEDIATE]` | Stops a
    job from processing (you can later restart it). Using the `IMMEDIATE` parameter
    quickly stops the job, but there may be some incomplete tasks. |    Type `EXIT`
    to leave the Data Pump status utility:    ``` Import> exit ```    You should now
    be at the OS prompt.    Attaching to a Running Job    One powerful feature of
    Data Pump is that you can attach to a currently running job and view its progress
    and status. If you have DBA privileges, you can even attach to a job if you aren’t
    the owner. You can attach to either an import or an export job via the `ATTACH`
    parameter.    Before you attach to a job, you must first determine the Data Pump
    job name (and owner name, if you’re not the owner of the job). Run the following
    SQL query to display currently running jobs:    ``` SQL> select owner_name, operation,
    job_name, state from dba_datapump_jobs; ```    Here is some sample output:    ```
    OWNER_NAME OPERATION       JOB_NAME              STATE ---------- ---------------
    --------------------  -------------------- MV_MAINT   EXPORT          SYS_EXPORT_SCHEMA_01  EXECUTING
    ```    In this example the `MV_MAINT` user can directly attach to the export job,
    as shown:    ``` $ expdp mv_maint/foo attach=sys_export_schema_01 ```    If you
    aren’t the owner of the job, you attach to the job by specifying the owner name
    and the job name:    ``` $ expdp system/foobar attach=mv_maint.sys_export_schema_01
    ```    You should now see the Data Pump command-line prompt:    ``` Export> ```    Type
    `STATUS` to view the status of the currently attached job:    ``` Export> status
    ```    Stopping and Restarting a Job    If you have a currently running Data Pump
    job that you want to temporarily stop, you can do so by first attaching to the
    interactive command mode. You may want to stop a job to resolve space issues or
    performance issues and then, after resolving the issues, restart the job. This
    example attaches to an import job:    ``` $ impdp mv_maint/foo attach=sys_import_table_01
    ```    Now, stop the job, using the `STOP_JOB` parameter:    ``` Import> stop_job
    ```    You should see this output:    ``` Are you sure you wish to stop this job
    ([yes]/no): ```    Type `YES` to proceed with stopping the job. You can also specify
    that the job be stopped immediately:    ``` Import> stop_job=immediate ```    When
    you stop a job with the `IMMEDIATE` option, there may be some incomplete tasks
    associated with the job. To restart a job, attach to interactive command mode,
    and issue the `START_JOB` command:    ``` Import> start_job ```    If you want
    to resume logging job output to your terminal, issue the `CONTINUE_CLIENT` command:    ```
    Import> continue_client ```    Terminating a Data Pump Job    You can instruct
    Data Pump to permanently kill an export or import job. First, attach to the job
    in interactive command mode, and then issue the `KILL_JOB` command:    ``` Import>
    kill_job ```    You should be prompted with the following output:    ``` Are you
    sure you wish to stop this job ([yes]/no): ```    Type `YES` to permanently kill
    the job. Data Pump unceremoniously kills the job and drops the associated status
    table from the user running the export or import.    Monitoring Data Pump Jobs    When
    you have long-running Data Pump jobs, you should occasionally check the status
    of the job to ensure it hasn’t failed become suspended, and so on.


    There are several ways to monitor the status of Data Pump jobs:    *   Screen
    output *   Data Pump log file *   Querying data dictionary views *   Database
    alert log *   Querying the status table *   Interactive command mode status *   Using
    the process status (`ps`) OS utility    The most obvious way to monitor a job
    is to view the status that Data Pump displays on the screen as the job is running.
    If you’ve disconnected from the command mode, then the status is no longer displayed
    on your screen. In this situation, you must use another technique to monitor a
    Data Pump job.    Data Pump Log File    By default, Data Pump generates a log
    file for every job. When you start a Data Pump job, it’s good practice to name
    a log file that is specific to that job:    ``` $ impdp mv_maint/foo directory=dp_dir
    dumpfile=archive.dmp logfile=archive.log ```    This job creates a file, named
    `archive.log`, that is placed in the directory referenced in the database object
    `DP`. If you don’t explicitly name a log file, Data Pump import creates one named
    `import.log`, and Data Pump export creates one named `export.log`.    ![Image](images/sq.jpg) **Note**  The
    log file contains the same information you see displayed interactively on your
    screen when running a Data Pump job.    Data Dictionary Views    A quick way to
    determine whether a Data Pump job is running is to check the `DBA_DATAPUMP_JOBS`
    view for anything running with a `STATE` that has an `EXECUTING` status:    ```
    select job_name, operation, job_mode, state from dba_datapump_jobs; ```    Here
    is some sample output:    ``` JOB_NAME                  OPERATION            JOB_MODE  
    STATE ------------------------- -------------------- ---------- ---------------
    SYS_IMPORT_TABLE_04       IMPORT               TABLE      EXECUTING SYS_IMPORT_FULL_02        IMPORT              
    FULL       NOT RUNNING ```    You can also query the `DBA_DATAPUMP_SESSIONS` view
    for session information via the following query:    ``` select sid, serial#, username,
    process, program from v$session s,      dba_datapump_sessions d where s.saddr
    = d.saddr; ```    Here is some sample output, showing that several Data Pump sessions
    are in use:    ```       SID    SERIAL#  USERNAME             PROCESS        
    PROGRAM ---------- ---------- -------------------- --------------- ----------------------
          1049       6451 STAGING              11306           oracle@xengdb (DM00)
          1058      33126 STAGING              11338           oracle@xengdb (DW01)
          1048      50508 STAGING              11396           oracle@xengdb (DW02)
    ```    Database Alert Log    If a job is taking much longer than you expected,
    look in the database alert log for any messages similar to this:    ``` statement
    in resumable session ''SYS_IMPORT_SCHEMA_02.1'' was suspended due to ORA-01652:
    unable to extend temp segment by 64 in tablespace REG_TBSP_3 ```    This message
    indicates that a Data Pump import job is suspended and is waiting for space to
    be added to the `REG_TBSP_3` tablespace. After you add space to the tablespace,
    the Data Pump job automatically resumes processing. By default a Data Pump job
    waits 2 hours for space to be added.    ![Image](images/sq.jpg) **Note**  In addition
    to writing to the alert log, for each Data Pump job, Oracle creates a trace file
    in the `ADR_HOME/trace` directory. This file contains information such as the
    session ID and when the job started. The trace file is named with the following
    format: `<SID>_dm00_<process_ID>.trc`.    Status Table    Every time you start
    a Data Pump job, a status table is automatically created in the account of the
    user running the job. For export jobs the table name depends on what type of export
    job you’re running. The table is named with the format `SYS_<OPERATION>_<JOB_MODE>_NN`,
    where `OPERATION` is either `EXPORT` or `IMPORT. JOB_MODE` can be `FULL`, `SCHEMA`,
    `TABLE`, `TABLESPACE`, and so on.'
