    \ /u01/dbfile/O12C/undotbs01.dbf /u01/hbackup/O12C\n!cp /u01/dbfile/O12C/users01.dbf\
    \ /u01/hbackup/O12C\n!cp /u01/dbfile/O12C/tools01.dbf /u01/hbackup/O12C\nalter\
    \ database end backup;\nalter database backup controlfile to '/u01/hbackup/O12C/controlbk.ctl'\
    \ reuse;\nalter system archive log current;\nselect max(sequence#) from v$log;\n\
