    \ online redo log:\n```text\n/u01/oraredo/O12C/redo01a.rdo\n```\n\nYou should\
    \ see this message when the correct online redo log is applied:\n```text\nLog\
    \ applied.\nMedia recovery complete.\n```\n\n## Step 5: Open the Database with\
    \ RESETLOGS\n\nThe database is completely recovered at this point. However, because\
    \ a backup control file was used for the recovery process, the database must be\
    \ opened with the `RESETLOGS` clause:\n```sql\nSQL> alter database open resetlogs;\n\
    ```\n\nUpon success, you should see this:\n```text\nDatabase altered.\n```\n\n\
    ## Performing an Incomplete Recovery of an Archivelog Mode Database\n\nIncomplete\
    \ recovery means that you don’t restore all transactions that were committed before\
    \ the failure. With this type of recovery, you’re recovering to a point in time\
    \ in the past, and transactions are lost. This is why incomplete recovery is also\
    \ known as database point-in-time recovery (DBPITR).\n\nIncomplete recovery doesn’t\
    \ mean that you’re restoring and recovering only a subset of data files. In fact,\
    \ with most incomplete scenarios, you have to restore all data files from the\
    \ backup as part of the procedure. If you don’t want to recover all data files,\
    \ you first need to take offline any data files you don’t intend to participate\
    \ in the incomplete recovery process. When you initiate the recovery, Oracle will\
    \ only recover data files that have an `ONLINE` value in the `STATUS` column of\
    \ `V$DATAFILE_HEADER`.\n\nYou may want to perform an incomplete recovery for many\
    \ different reasons:\n\n*   You attempt to perform a complete recovery but are\
    \ missing the required archive redo logs or unarchived online redo log information.\n\
    *   You want to restore the database back to a point in time in the past just\
    \ prior to an erroneous user error (deleted data, dropped table, and so on).\n\
    *   You have a testing environment in which you have a baseline copy of the database.\
    \ After the testing is finished, you want to reset the database back to baseline\
    \ for another round of testing.\n\nYou can perform user-managed incomplete recovery\
    \ three ways:\n\n*   Cancel based\n*   SCN based\n*   Time based\n\nCancel based\
    \ allows you to apply archive redo and halt the process at the boundary, based\
    \ on an archive redo log file. For instance, say you’re attempting to restore\
    \ and recover your database, and you realize that you’re missing an archive redo\
    \ log. You have to stop the recover process at the point of your last good archive\
    \ redo log. You initiate cancel-based incomplete recovery with the `CANCEL` clause\
    \ of the `RECOVER DATABASE` statement:\n```sql\nSQL> recover database until cancel;\n\
    ```\n\nIf you want to recover up to and including a certain SCN number, use SCN-based\
    \ incomplete recovery. You may know from the alert log or from the output of LogMiner\
    \ the point to which you want to restore to a certain SCN. Use the `UNTIL CHANGE`\
    \ clause to perform this type of incomplete recovery:\n```sql\nSQL> recover database\
    \ until change 12345;\n```\n\nIf you know the time at which you want to stop the\
    \ recovery process, use time-based incomplete recovery. For example, you may know\
    \ that a table was dropped at a certain time and want to restore and recover the\
    \ database up to the specified time. The format for a time-based recovery is always\
    \ as follows: `YYYY-MM-DD:HH24:MI:SS`. Here is an example:\n```sql\nSQL> recover\
    \ database until time '2012-10-21:02:00:00';\n```\n\nWhen you perform an incomplete\
    \ recovery, you have to restore all data files that you plan to have online when\
    \ the incomplete restoration is finished. Here are the steps for an incomplete\
    \ recovery:\n\n1.  Shut down the database.\n2.  Restore all the data files from\
    \ the backup.\n3.  Start the database in mount mode.\n4.  Apply redo (roll forward)\
    \ to the desired point, and halt the recovery process (use cancel-, SCN-, or time-based\
    \ recovery).\n5.  Open the database with the `OPEN RESETLOGS` clause.\n\nThe following\
    \ example performs a cancel-based incomplete recovery. If the database is open,\
    \ shut it down:\n```bash\n$ sqlplus / as sysdba\nSQL> shutdown abort;\n```\n\n\
    Next, copy all data files from the backup (either a cold or hot backup). This\
    \ example restores all data files from a hot backup. For this example the current\
    \ control file is intact and doesn’t need to be restored. Here is a snippet of\
    \ the OS copy commands for the database being restored:"
  raw: 'If more than one control file is being used, you have to copy the backup control
    file to each control file and location name listed in the `CONTROL_FILES` initialization
    parameter.


    Step 3\. Start the Database in Mount Mode, and Initiate Database Recovery


    Next, start the database in mount mode:


    ```

    SQL> startup mount;

    ```


    After the control file(s) and data files have been copied back, you can perform
    a recovery. Oracle knows that the control file was from a backup (because it was
    created with the `ALTER DATABASE BACKUP CONTROLFILE` statement), so the recovery
    must be performed with the `USING BACKUP CONTROLFILE` clause:


    ```

    SQL> recover database using backup controlfile;

    ```


    At this point, you’re prompted for the application of archive redo log files:


    ```

    ORA-00279: change 3584431 generated at 11/02/2012 11:48:46 needed for thread 1

    ORA-00289: suggestion : /u01/oraarch/O12C/1_8_798283209.dbf

    ORA-00280: change 3584431 for thread 1 is in sequence #8


    Specify log: {<RET>=suggested | filename | AUTO | CANCEL}

    ```


    Type `AUTO` to instruct the recovery process to apply all archive redo logs automatically:


    ```

    AUTO

    ```


    The recovery process applies all available archive redo logs. The recovery process
    has no one way of determining where the archive redo stream ends and therefore
    tries to apply an archive redo log that doesn’t exist, resulting in a message
    such as this:


    ```

    ORA-00308: cannot open archived log ''/u01/oraarch/O12C/1_10_798283209.dbf''

    ORA-27037: unable to obtain file status

    ```


    The prior message is to be expected. Now, attempt to open the database:


    ```

    SQL> alter database open resetlogs;

    ```


    Oracle throws the following error in this situation:


    ```

    ORA-01113: file 1 needs media recovery

    ORA-01110: data file 1: ''/u01/dbfile/O12C/system01.dbf''

    ```


    Step 4\. Apply Redo Contained in the Online Redo Logs


    Oracle needs to apply more redo to synchronize the SCN in the control file with
    the SCN in the data file header. In this scenario the online redo logs are still
    intact and contain the required redo. To apply redo contained in the online redo
    logs, first identify the locations and names of the online redo log files:


    ```

    select a.sequence#, a.status, a.first_change#, b.member

    from v$log a, v$logfile b

    where a.group# = b.group#

    order by a.sequence#;

    ```


    Here is the partial output for this example:


    ```

    SEQUENCE#  STATUS           FIRST_CHANGE# MEMBER

    ---------- ---------------- ------------- ------------------------------

             6 INACTIVE               3543960 /u01/oraredo/O12C/redo03a.rdo

             6 INACTIVE               3543960 /u02/oraredo/O12C/redo03b.rdo

             7 INACTIVE               3543963 /u02/oraredo/O12C/redo01b.rdo

             7 INACTIVE               3543963 /u01/oraredo/O12C/redo01a.rdo

             8 CURRENT                3583986 /u02/oraredo/O12C/redo02b.rdo

             8 CURRENT                3583986 /u01/oraredo/O12C/redo02a.rdo

    ```


    Now, reinitiate the recovery process:


    ```

    SQL> recover database using backup controlfile;

    ```


    The recovery process prompts for an archive redo log that doesn’t exist:


    ```

    ORA-00279: change 3584513 generated at 11/02/2012 11:50:50 needed for thread 1

    ORA-00289: suggestion : /u01/oraarch/O12C/1_10_798283209.dbf

    ORA-00280: change 3584513 for thread 1 is in sequence #10


    Specify log: {<RET>=suggested | filename | AUTO | CANCEL}

    ```


    Instead of supplying the recovery process with an archive redo log file, type
    in the name of a current online redo log file (you may have to attempt each online
    redo log until you find the one that Oracle needs). This instructs the recovery
    process to apply any redo in the online redo log:


    ```

    /u01/oraredo/O12C/redo01a.rdo

    ```


    You should see this message when the correct online redo log is applied:


    ```

    Log applied.

    Media recovery complete.

    ```


    Step 5\. Open the Database with RESETLOGS


    The database is completely recovered at this point. However, because a backup
    control file was used for the recovery process, the database must be opened with
    the `RESETLOGS` clause:


    ```

    SQL> alter database open resetlogs;

    ```


    Upon success, you should see this:


    ```

    Database altered.

    ```


    Performing an Incomplete Recovery of an Archivelog Mode Database


    Incomplete recovery means that you don’t restore all transactions that were committed
    before the failure. With this type of recovery, you’re recovering to a point in
    time in the past, and transactions are lost. This is why incomplete recovery is
    also known as database point-in-time recovery (DBPITR).


    Incomplete recovery doesn’t mean that you’re restoring and recovering only a subset
    of data files. In fact, with most incomplete scenarios, you have to restore all
    data files from the backup as part of the procedure. If you don’t want to recover
    all data files, you first need to take offline any data files you don’t intend
    to participate in the incomplete recovery process. When you initiate the recovery,
    Oracle will only recover data files that have an `ONLINE` value in the `STATUS`
    column of `V$DATAFILE_HEADER`.


    You may want to perform an incomplete recovery for many different reasons:


    *   You attempt to perform a complete recovery but are missing the required archive
    redo logs or unarchived online redo log information.

    *   You want to restore the database back to a point in time in the past just
    prior to an erroneous user error (deleted data, dropped table, and so on).

    *   You have a testing environment in which you have a baseline copy of the database.
    After the testing is finished, you want to reset the database back to baseline
    for another round of testing.


    You can perform user-managed incomplete recovery three ways:


    *   Cancel based

    *   SCN based

    *   Time based


    Cancel based allows you to apply archive redo and halt the process at the boundary,
    based on an archive redo log file. For instance, say you’re attempting to restore
    and recover your database, and you realize that you’re missing an archive redo
    log. You have to stop the recover process at the point of your last good archive
    redo log. You initiate cancel-based incomplete recovery with the `CANCEL` clause
    of the `RECOVER DATABASE` statement:


    ```

    SQL> recover database until cancel;

    ```


    If you want to recover up to and including a certain SCN number, use SCN-based
    incomplete recovery. You may know from the alert log or from the output of LogMiner
    the point to which you want to restore to a certain SCN. Use the `UNTIL CHANGE`
    clause to perform this type of incomplete recovery:


    ```

    SQL> recover database until change 12345;

    ```


    If you know the time at which you want to stop the recovery process, use time-based
    incomplete recovery. For example, you may know that a table was dropped at a certain
    time and want to restore and recover the database up to the specified time. The
    format for a time-based recovery is always as follows: `YYYY-MM-DD:HH24:MI:SS`.
    Here is an example:


    ```

    SQL> recover database until time ''2012-10-21:02:00:00'';

    ```


    When you perform an incomplete recovery, you have to restore all data files that
    you plan to have online when the incomplete restoration is finished. Here are
    the steps for an incomplete recovery:


    1.  Shut down the database.

    2.  Restore all the data files from the backup.

    3.  Start the database in mount mode.

    4.  Apply redo (roll forward) to the desired point, and halt the recovery process
    (use cancel-, SCN-, or time-based recovery).

    5.  Open the database with the `OPEN RESETLOGS` clause.


    The following example performs a cancel-based incomplete recovery. If the database
    is open, shut it down:


    ```

    $ sqlplus / as sysdba

    SQL> shutdown abort;

    ```


    Next, copy all data files from the backup (either a cold or hot backup). This
    example restores all data files from a hot backup. For this example the current
    control file is intact and doesn’t need to be restored. Here is a snippet of the
    OS copy commands for the database being restored:'
  trans: "\n## 步骤 3：在挂载模式下启动数据库并启动数据库恢复\n\n接下来，在挂载模式下启动数据库：\n```sql\nSQL> startup\
    \ mount;\n```\n\n控制文件和数据文件复制回去之后，你就可以执行恢复操作。Oracle 知道控制文件来自备份（因为它是通过 `ALTER DATABASE\
    \ BACKUP CONTROLFILE` 语句创建的），因此恢复必须使用 `USING BACKUP CONTROLFILE` 子句来执行：\n```sql\n\
    SQL> recover database using backup controlfile;\n```\n\n此时，系统会提示你应用归档重做日志文件：\n\
    ```text\nORA-00279: change 3584431 generated at 11/02/2012 11:48:46 needed for\
    \ thread 1\nORA-00289: suggestion : /u01/oraarch/O12C/1_8_798283209.dbf\nORA-00280:\
    \ change 3584431 for thread 1 is in sequence #8\n\nSpecify log: {<RET>=suggested\
    \ | filename | AUTO | CANCEL}\n```\n\n输入 `AUTO` 指示恢复过程自动应用所有归档重做日志：\n```text\n\
    AUTO\n```\n\n恢复过程会应用所有可用的归档重做日志。恢复过程无法单方面确定归档重做流在哪里结束，因此会尝试应用一个不存在的归档重做日志，导致出现如下消息：\n\
    ```text\nORA-00308: cannot open archived log '/u01/oraarch/O12C/1_10_798283209.dbf'\n\
    ORA-27037: unable to obtain file status\n```\n\n出现前面这条消息是预料之中的。现在，尝试打开数据库：\n```sql\n\
    SQL> alter database open resetlogs;\n```\n\n在这种情况下，Oracle 会抛出以下错误：\n```text\n\
    ORA-01113: file 1 needs media recovery\nORA-01110: data file 1: '/u01/dbfile/O12C/system01.dbf'\n\
    ```\n\n## 步骤 4：应用联机重做日志中包含的重做数据\n\nOracle 需要应用更多重做数据以使控制文件中的 SCN 与数据文件头中的 SCN\
    \ 同步。在此场景中，联机重做日志仍然完好无损，并包含所需的重做数据。要应用联机重做日志中包含的重做数据，首先识别联机重做日志文件的位置和名称：\n```sql\n\
    select a.sequence#, a.status, a.first_change#, b.member\nfrom v$log a, v$logfile\
    \ b\nwhere a.group# = b.group#\norder by a.sequence#;\n```\n\n以下是此示例的部分输出：\n```text\n\
    SEQUENCE#  STATUS           FIRST_CHANGE# MEMBER\n---------- ----------------\
    \ ------------- ------------------------------\n         6 INACTIVE          \
    \     3543960 /u01/oraredo/O12C/redo03a.rdo\n         6 INACTIVE             \
    \  3543960 /u02/oraredo/O12C/redo03b.rdo\n         7 INACTIVE               3543963\
    \ /u02/oraredo/O12C/redo01b.rdo\n         7 INACTIVE               3543963 /u01/oraredo/O12C/redo01a.rdo\n\
    \         8 CURRENT                3583986 /u02/oraredo/O12C/redo02b.rdo\n   \
    \      8 CURRENT                3583986 /u01/oraredo/O12C/redo02a.rdo\n```\n\n\
    现在，重新启动恢复过程：\n```sql\nSQL> recover database using backup controlfile;\n```\n\n\
    恢复过程会提示一个不存在的归档重做日志：\n```text\nORA-00279: change 3584513 generated at 11/02/2012\
    \ 11:50:50 needed for thread 1\nORA-00289: suggestion : /u01/oraarch/O12C/1_10_798283209.dbf\n\
    ORA-00280: change 3584513 for thread 1 is in sequence #10\n\nSpecify log: {<RET>=suggested\
    \ | filename | AUTO | CANCEL}\n```\n\n不要向恢复过程提供归档重做日志文件，而是输入一个当前联机重做日志文件的名称（可能需要尝试每个联机重做日志，直到找到\
    \ Oracle 需要的那个）。这将指示恢复过程应用联机重做日志中的任何重做数据：\n```text\n/u01/oraredo/O12C/redo01a.rdo\n\
    ```\n\n当应用了正确的联机重做日志时，你应该看到这条消息：\n```text\nLog applied.\nMedia recovery complete.\n\
    ```\n\n## 步骤 5：使用 RESETLOGS 打开数据库\n\n此时数据库已完全恢复。然而，因为恢复过程使用了备份控制文件，所以必须使用 `RESETLOGS`\
    \ 子句打开数据库：\n```sql\nSQL> alter database open resetlogs;\n```\n\n成功后，你将看到：\n```text\n\
    Database altered.\n```\n\n## 执行归档日志模式数据库的不完全恢复\n\n不完全恢复意味着你不会还原在故障发生前已提交的所有事务。使用这种恢复类型时，你是恢复到过去的某个时间点，事务会丢失。这就是为什么不完全恢复也被称为数据库时间点恢复。\n\
    \n不完全恢复并不意味着你只还原和恢复数据文件的一个子集。事实上，在大多数不完全恢复场景中，你必须作为过程的一部分从备份中还原所有数据文件。如果你不想恢复所有数据文件，首先需要将任何你不打算参与不完全恢复过程的数据文件脱机。当你启动恢复时，Oracle\
    \ 将只恢复那些在 `V$DATAFILE_HEADER` 的 `STATUS` 列中值为 `ONLINE` 的数据文件。\n\n你可能出于许多不同原因需要执行不完全恢复：\n\
    \n*   你尝试执行完全恢复，但缺少所需的归档重做日志或未归档的联机重做日志信息。\n*   你希望将数据库还原到过去某个错误用户操作（删除数据、删除表等）发生之前的时点。\n\
    *   你有一个测试环境，其中包含数据库的基线副本。测试完成后，你希望将数据库重置回基线以进行另一轮测试。\n\n你可以通过三种方式执行用户管理的不完全恢复：\n\
    \n*   基于取消\n*   基于 SCN\n*   基于时间\n\n基于取消允许你应用归档重做数据，并根据归档重做日志文件在边界处停止过程。例如，假设你正在尝试还原和恢复数据库，并且意识到你缺少一个归档重做日志。你必须在你最后一个完好的归档重做日志处停止恢复过程。你使用\
    \ `RECOVER DATABASE` 语句的 `CANCEL` 子句来启动基于取消的不完全恢复：\n```sql\nSQL> recover database\
    \ until cancel;\n```\n\n如果你想恢复到并包含某个 SCN 号，请使用基于 SCN 的不完全恢复。你可能从告警日志或 LogMiner\
    \ 的输出中知道你想要还原到的某个 SCN 点。使用 `UNTIL CHANGE` 子句执行这种类型的不完全恢复：\n```sql\nSQL> recover\
    \ database until change 12345;\n```\n\n如果你知道希望停止恢复过程的时间，请使用基于时间的不完全恢复。例如，你可能知道某个表在特定时间被删除，并希望将数据库还原和恢复到指定时间。基于时间的恢复格式始终如下：`YYYY-MM-DD:HH24:MI:SS`。以下是一个示例：\n\
    ```sql\nSQL> recover database until time '2012-10-21:02:00:00';\n```\n\n执行不完全恢复时，你必须还原所有计划在完全恢复完成后保持联机的数据文件。以下是进行不完全恢复的步骤：\n\
    \n1.  关闭数据库。\n2.  从备份中还原所有数据文件。\n3.  在挂载模式下启动数据库。\n4.  应用重做数据（前滚）到所需的点，并停止恢复过程（使用基于取消、SCN\
    \ 或时间的恢复）。\n5.  使用 `OPEN RESETLOGS` 子句打开数据库。\n\n以下示例执行基于取消的不完全恢复。如果数据库是打开的，请将其关闭：\n\
