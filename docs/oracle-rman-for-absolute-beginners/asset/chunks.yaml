- fmt: "Any backups that you make now will be encrypted. If you need to restore from\
    \ a backup, it’s automatically unencrypted (assuming the same security wallet\
    \ is in place as when you encrypted the backup). To disable encryption, use the\
    \ `CONFIGURE` command:\n\n```\nRMAN> configure encryption for database off;\n\
    ```\n\nYou can also clear the encryption setting with `CLEAR`:\n\n```\nRMAN> configure\
    \ encryption for database clear;\n```\n\nYou can query `V$RMAN_ENCRYPTION_ALGORITHMS`\
    \ to view details regarding the encryption algorithms available for your release\
    \ of the database.\n\n### RUNNING SQL FROM WITHIN RMAN\n\nStarting with Oracle\
    \ 12c, you can run SQL statements (and see the results) directly from within RMAN:\n\
    \n```\nRMAN> select * from v$rman_encryption_algorithms;\n```\n\nPrior to 12c,\
    \ you could run the prior SQL statement with the RMAN `sql` command, but no results\
    \ would be displayed:\n\n```\nRMAN> sql 'select * from v$rman_encryption_algorithms';\n\
    ```\n\nThe RMAN `sql` command was meant more for running commands such as `ALTER\
    \ SYSTEM`:\n\n```\nRMAN> sql 'alter system switch logfile';\n```\n\nNow, in 12c,\
    \ you can run the SQL directly:\n\n```\nRMAN> alter system switch logfile;\n```\n\
    \nThis ability to run SQL from within RMAN is a really nice enhancement; it allows\
    \ you to see the results of SQL queries and eliminates the need for specifying\
    \ the `sql` keyword as well as for placing quotation marks around the SQL command\
    \ itself.\n\n## 22. Configuring Miscellaneous Settings\n\nRMAN provides a flexible\
    \ number of channel configuration commands. You will occasionally need to use\
    \ them, depending on special circumstances and the requirements for your database.\
    \ Here are some of the options:\n\n*   Maximum backup set size\n*   Maximum backup\
    \ piece size\n*   Maximum rate\n*   Maximum open files\n\nBy default the maximum\
    \ backup set size is unlimited. You can use the `MAXSETSIZE` parameter with the\
    \ `CONFIGURE` or `BACKUP` command to specify the overall maximum backup set size.\
    \ Make sure the value of this parameter is at least as great as the largest data\
    \ file being backed up by RMAN. Here is an example:\n\n```\nRMAN> configure maxsetsize\
    \ to 2g;\n```\n\nSometimes, you may want to limit the overall size of a backup\
    \ piece because of physical limitations of storage devices. Use the `MAXPIECESIZE`\
    \ parameter of the `CONFIGURE CHANNEL` or `ALLOCATE CHANNEL` command do this;\
    \ for example,\n\n```\nRMAN> configure channel device type disk maxpiecesize =\
    \ 2g;\n```\n\nIf you need to set the maximum number of bytes that RMAN reads each\
    \ second on a channel, you can do so, using the `RATE` parameter. This configures\
    \ the maximum read rate for channel 1 to 200MB per second:\n\n```\nconfigure channel\
    \ 1 device type disk rate 200M;\n```\n\nIf you have a limit on the number of files\
    \ you can have open simultaneously, you can specify a maximum open files number\
    \ via the `MAXOPENFILES` parameter:\n\n```\nRMAN> configure channel 1 device type\
    \ disk maxopenfiles 32;\n```\n\nYou may need to configure any of these settings\
    \ when you need to make RMAN aware of some OS or hardware limitation. You’ll rarely\
    \ need to use these parameters but should know of them.\n\n## 23. Configuring\
    \ Informational Output\n\nA good practice is to always set the OS `NLS_DATE_FORMAT`\
    \ variable (before running RMAN) so that both the date and time information are\
    \ displayed in the RMAN log instead of just the date, which is the default:\n\n\
    ```\nexport NLS_DATE_FORMAT='dd-mon-yyyy hh24:mi:ss'\n```\n\nThis is useful during\
    \ troubleshooting, especially when RMAN fails, because we can use the exact date/time\
    \ information for when the RMAN error occurred and compare it with the `alert.log`\
    \ and OS/MML logs to verify what other events occurred in the database/server.\n\
    \nAlso consider executing `SET ECHO ON` to ensure that RMAN commands are displayed\
    \ within the log before the command is executed. Execute `SHOW ALL` as well to\
    \ display the current settings of RMAN variables. These settings are useful when\
    \ troubleshooting and tuning.\n\n### CLEARING ALL RMAN CONFIGURATIONS\n\nThere\
    \ is no `CLEAR ALL` command for resetting all RMAN configurations back to the\
    \ default values. However, you can easily simulate this by running a script that\
    \ contains `CONFIGURE...CLEAR` commands:\n\n```\nCONFIGURE RETENTION POLICY clear;\n\
    CONFIGURE BACKUP OPTIMIZATION clear;\nCONFIGURE DEFAULT DEVICE TYPE clear;\nCONFIGURE\
    \ CONTROLFILE AUTOBACKUP clear;\nCONFIGURE CONTROLFILE AUTOBACKUP FORMAT FOR DEVICE\
    \ TYPE DISK clear;\nCONFIGURE DEVICE TYPE DISK clear;\nCONFIGURE DATAFILE BACKUP\
    \ COPIES FOR DEVICE TYPE DISK clear;\nCONFIGURE CHANNEL 1 DEVICE TYPE DISK clear;\n\
    CONFIGURE CHANNEL 2 DEVICE TYPE DISK clear;\nCONFIGURE CHANNEL 3 DEVICE TYPE DISK\
    \ clear;\nCONFIGURE ARCHIVELOG BACKUP COPIES FOR DEVICE TYPE DISK clear;\nCONFIGURE\
    \ MAXSETSIZE clear;\nCONFIGURE ENCRYPTION FOR DATABASE clear;\nCONFIGURE ENCRYPTION\
    \ ALGORITHM clear;\nCONFIGURE COMPRESSION ALGORITHM clear;\nCONFIGURE RMAN OUTPUT\
    \ clear; # 12c\nCONFIGURE ARCHIVELOG DELETION POLICY clear;\nCONFIGURE SNAPSHOT\
    \ CONTROLFILE NAME clear;\n```\n\nDepending on what you’ve set (and the version\
    \ of your database), you may need to set additional configurations.\n\n## Segueing\
    \ from Decision to Action\n\nNow that you have a good understanding of what types\
    \ of decisions you should make before implementing RMAN, it’s instructional to\
    \ view a script that implements some of these components. I mainly work with Linux/Unix\
    \ servers. In these environments, I use shell scripts to automate the RMAN backups.\
    \ These shell scripts are automated through a scheduling utility such as `cron`.\n\
    \nThis section contains a typical shell script for RMAN backups. The shell script\
    \ has line numbers in the output for reference in the discussion of the architectural\
    \ decisions I made when writing the script. (If you copy the script, take out\
    \ the line numbers before running it.)\n\nFollowing is the script. [Table 4-2](#9781484207642_Ch04.xhtml#Tab2)\
    \ details every RMAN architectural decision point covered in this chapter, how\
    \ it’s implemented (or not) in the shell script, and the corresponding line number\
    \ in the shell script. The script doesn’t cover every aspect of how to use RMAN.\
    \ If you use the script, be sure to modify it to meet the requirements and RMAN\
    \ standards for your own environment:\n\n```\n#!/bin/bash\n#----------------------------------------------\n\
    PRG=`basename $0`\nUSAGE=\"Usage: ${PRG}\"\nif [ $# -gt 0 ]; then\n   echo \"\
    ${USAGE}\"\n   exit 1\nfi\nexport ORACLE_SID=O12C\nexport ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1\n\
    export PATH=$PATH:$ORACLE_HOME/bin\nBOX=`uname -a | awk '{print$2}'`\nMAILX='/bin/mailx'\n\
    MAIL_LIST='dkuhn@gmail.com'\nexport NLS_DATE_FORMAT='dd-mon-yyyy hh24:mi:ss'\n\
    date\n#----------------------------------------------\nLOCKFILE=/tmp/$PRG.lock\n\
    if [ -f $LOCKFILE ]; then\n  echo \"lock file exists, exiting...\"\n  exit 1\n\
    else\n  echo \"DO NOT REMOVE, $LOCKFILE\" > $LOCKFILE\nfi\n#----------------------------------------------\n\
    rman nocatalog <<EOF\nconnect target /\nset echo on;\nshow all;\ncrosscheck backup;\n\
    crosscheck copy;\nconfigure controlfile autobackup on;\nconfigure controlfile\
    \ autobackup format for device type disk to\n   '/u01/O12C/rman/O12C_ctl_%F.bk';\n\
    configure retention policy to redundancy 1;\nconfigure           device type disk\
    \ parallelism 2;\nconfigure channel 1 device type disk format '/u01/O12C/rman/O12C_%U.bk';\n\
    configure channel 2 device type disk format '/u02/O12C/rman/O12C_%U.bk';\nbackup\
    \ as compressed backupset incremental level=0 database plus archivelog;\ndelete\
    \ noprompt obsolete;\nEOF\n#----------------------------------------------\nif\
    \ [ $? -ne 0 ]; then\n  echo \"RMAN problem...\"\n  echo \"Check RMAN backups\"\
    \ | $MAILX -s \"RMAN issue: $ORACLE_SID on $BOX\" $MAIL_LIST\nelse\n  echo \"\
    RMAN ran okay...\"\nfi\n#----------------------------------------------\nif [\
    \ -f $LOCKFILE ]; then\n  rm $LOCKFILE\nfi\n#----------------------------------------------\n\
    date\nexit 0\n```"
  raw: 'Any backups that you make now will be encrypted. If you need to restore from
    a backup, it’s automatically unencrypted (assuming the same security wallet is
    in place as when you encrypted the backup). To disable encryption, use the `CONFIGURE`
    command:


    ```

    RMAN> configure encryption for database off;

    ```


    You can also clear the encryption setting with `CLEAR`:


    ```

    RMAN> configure encryption for database clear;

    ```


    You can query `V$RMAN_ENCRYPTION_ALGORITHMS` to view details regarding the encryption
    algorithms available for your release of the database.


    RUNNING SQL FROM WITHIN RMAN


    Starting with Oracle 12c, you can run SQL statements (and see the results) directly
    from within RMAN:


    `RMAN> select * from v$rman_encryption_algorithms;`


    Prior to 12c, you could run the prior SQL statement with the RMAN `sql` command,
    but no results would be displayed:


    `RMAN> sql ''select * from v$rman_encryption_algorithms'';`


    The RMAN `sql` command was meant more for running commands such as `ALTER SYTEM`:


    `RMAN> sql ''alter system switch logfile'';`


    Now, in 12c, you can run the SQL directly:


    `RMAN> alter system switch logfile;`


    This ability to run SQL from within RMAN is a really nice enhancement; it allows
    you to see the results of SQL queries and eliminates the need for specifying the
    `sql` keyword as well as for placing quotation marks around the SQL command itself.


    22\. Configuring Miscellaneous Settings


    RMAN provides a flexible number of channel configuration commands. You will occasionally
    need to use them, depending on special circumstances and the requirements for
    your database. Here are some of the options:


    *   Maximum backup set size

    *   Maximum backup piece size

    *   Maximum rate

    *   Maximum open files


    By default the maximum backup set size is unlimited. You can use the `MAXSETSIZE`
    parameter with the `CONFIGURE` or `BACKUP` command to specify the overall maximum
    backup set size. Make sure the value of this parameter is at least as great as
    the largest data file being backed up by RMAN. Here is an example:


    ```

    RMAN> configure maxsetsize to 2g;

    ```


    Sometimes, you may want to limit the overall size of a backup piece because of
    physical limitations of storage devices. Use the `MAXPIECESIZE` parameter of the
    `CONFIGURE CHANNEL` or `ALLOCATE CHANNEL` command do this; for example,


    ```

    RMAN> configure channel device type disk maxpiecesize = 2g;

    ```


    If you need to set the maximum number of bytes that RMAN reads each second on
    a channel, you can do so, using the `RATE` parameter. This configures the maximum
    read rate for channel 1 to 200MB per second:


    ```

    configure channel 1 device type disk rate 200M;

    ```


    If you have a limit on the number of files you can have open simultaneously, you
    can specify a maximum open files number via the `MAXOPENFILES` parameter:


    ```

    RMAN> configure channel 1 device type disk maxopenfiles 32;

    ```


    You may need to configure any of these settings when you need to make RMAN aware
    of some OS or hardware limitation. You’ll rarely need to use these parameters
    but should know of them.


    23\. Configuring Informational Output


    A good practice is to always set the OS `NLS_DATE_FORMAT` variable (before running
    RMAN) so that both the date and time information are displayed in the RMAN log
    instead of just the date, which is the default:


    ```

    export NLS_DATE_FORMAT=''dd-mon-yyyy hh24:mi:ss''

    ```


    This is useful during troubleshooting, especially when RMAN fails, because we
    can use the exact date/time information for when the RMAN error occurred and compare
    it with the `alert.log` and OS/MML logs to verify what other events occurred in
    the database/server.


    Also consider executing `SET ECHO ON` to ensure that RMAN commands are displayed
    within the log before the command is executed. Execute `SHOW ALL` as well to display
    the current settings of RMAN variables. These settings are useful when troubleshooting
    and tuning.


    CLEARING ALL RMAN CONFIGURATIONS


    There is no `CLEAR ALL` command for resetting all RMAN configurations back to
    the default values. However, you can easily simulate this by running a script
    that contains `CONFIGURE...CLEAR` commands:


    `CONFIGURE RETENTION POLICY clear;`

    `CONFIGURE BACKUP OPTIMIZATION clear;`

    `CONFIGURE DEFAULT DEVICE TYPE clear;`

    `CONFIGURE CONTROLFILE AUTOBACKUP clear;`

    `CONFIGURE CONTROLFILE AUTOBACKUP FORMAT FOR DEVICE TYPE DISK clear;`

    `CONFIGURE DEVICE TYPE DISK clear;`

    `CONFIGURE DATAFILE BACKUP COPIES FOR DEVICE TYPE DISK clear;`

    `CONFIGURE CHANNEL 1 DEVICE TYPE DISK clear;`

    `CONFIGURE CHANNEL 2 DEVICE TYPE DISK clear;`

    `CONFIGURE CHANNEL 3 DEVICE TYPE DISK clear;`

    `CONFIGURE ARCHIVELOG BACKUP COPIES FOR DEVICE TYPE DISK clear;`

    `CONFIGURE MAXSETSIZE clear;`

    `CONFIGURE ENCRYPTION FOR DATABASE clear;`

    `CONFIGURE ENCRYPTION ALGORITHM clear;`

    `CONFIGURE COMPRESSION ALGORITHM clear;`

    `CONFIGURE RMAN OUTPUT clear; # 12c`

    `CONFIGURE ARCHIVELOG DELETION POLICY clear;`

    `CONFIGURE SNAPSHOT CONTROLFILE NAME clear;`


    Depending on what you’ve set (and the version of your database), you may need
    to set additional configurations.


    Segueing from Decision to Action


    Now that you have a good understanding of what types of decisions you should make
    before implementing RMAN, it’s instructional to view a script that implements
    some of these components. I mainly work with Linux/Unix servers. In these environments,
    I use shell scripts to automate the RMAN backups. These shell scripts are automated
    through a scheduling utility such as `cron`.


    This section contains a typical shell script for RMAN backups. The shell script
    has line numbers in the output for reference in the discussion of the architectural
    decisions I made when writing the script. (If you copy the script, take out the
    line numbers before running it.)


    Following is the script. [Table 4-2](#9781484207642_Ch04.xhtml#Tab2) details every
    RMAN architectural decision point covered in this chapter, how it’s implemented
    (or not) in the shell script, and the corresponding line number in the shell script.
    The script doesn’t cover every aspect of how to use RMAN. If you use the script,
    be sure to modify it to meet the requirements and RMAN standards for your own
    environment:


    ```

     1 #!/bin/bash

     2 #----------------------------------------------

     3 PRG=`basename $0`

     4 USAGE="Usage: ${PRG}"

     5 if [ $# -gt 0 ]; then

     6    echo "${USAGE}"

     7    exit 1

     8 fi

     9 export ORACLE_SID=O12C

    10 export ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1

    11 export PATH=$PATH:$ORACLE_HOME/bin

    12 BOX=`uname -a | awk ''{print$2}''`

    13 MAILX=''/bin/mailx''

    14 MAIL_LIST=''dkuhn@gmail.com''

    15 export NLS_DATE_FORMAT=''dd-mon-yyyy hh24:mi:ss''

    16 date

    17 #----------------------------------------------

    18 LOCKFILE=/tmp/$PRG.lock

    19 if [ -f $LOCKFILE ]; then

    20   echo "lock file exists, exiting..."

    21   exit 1

    22 else

    23   echo "DO NOT REMOVE, $LOCKFILE" > $LOCKFILE

    24 fi

    25 #----------------------------------------------

    26 rman nocatalog <<EOF

    27 connect target /

    28 set echo on;

    29 show all;

    30 crosscheck backup;

    31 crosscheck copy;

    32 configure controlfile autobackup on;

    33 configure controlfile autobackup format for device type disk to

       ''/u01/O12C/rman/O12C_ctl_%F.bk'';

    34 configure retention policy to redundancy 1;

    35 configure           device type disk parallelism 2;

    36 configure channel 1 device type disk format ''/u01/O12C/rman/O12C_%U.bk'';

    37 configure channel 2 device type disk format ''/u02/O12C/rman/O12C_%U.bk'';

    38 backup as compressed backupset incremental level=0 database plus archivelog;

    39 delete noprompt obsolete;

    40 EOF

    41 #----------------------------------------------

    42 if [ $? -ne 0 ]; then

    43   echo "RMAN problem..."

    44   echo "Check RMAN backups" | $MAILX -s "RMAN issue: $ORACLE_SID on $BOX" $MAIL_LIST

    45 else

    46   echo "RMAN ran okay..."

    47 fi

    48 #----------------------------------------------

    49 if [ -f $LOCKFILE ]; then

    50   rm $LOCKFILE

    51 fi

    52 #----------------------------------------------

    53 date

    54 exit 0

    ```'
  trans: "\n你现在所做的任何备份都将被加密。如果需要从备份中恢复，它将自动解密（假设加密备份时使用的安全钱包仍然存在）。要禁用加密，请使用 `CONFIGURE`\
    \ 命令：\n\n```\nRMAN> configure encryption for database off;\n```\n\n你也可以使用 `CLEAR`\
