    An object is logically instantiated as a segment. A segment consists of extents
    of space within the tablespace. An extent consists of a set of database blocks.
    [Figure 2-3](#9781484207642_Ch02.xhtml#Fig3) shows the relationships between these
    logical and physical constructs used to manage space within an Oracle database.


    ![9781484207642_Fig02-03.jpg](images/9781484207642_Fig02-03.jpg)


    [Figure 2-3](#9781484207642_Ch02.xhtml#_Fig3). Relationships of logical storage
    objects and physical storage


    When you create a database, typically five tablespaces are created when you execute
    the `CREATE DATABASE` statement: `SYSTEM`, `SYSAUX`, `UNDO`, `TEMP`, and `USERS`.


    These five tablespaces are the minimal set of storage containers you need to operate
    a database (one could argue, however, you don’t need the `USERS` tablespace; more
    on that in the next section). As you open a database for use, you should quickly
    create additional tablespaces for storing application data. This chapter discusses
    the purpose of the standard set of tablespaces, the need for additional tablespaces,
    and how to manage these critical database storage containers. The chapter focuses
    on the most common and critical tasks associated with creating and maintaining
    tablespaces and data files, progressing to more advanced topics, such as moving
    and renaming data files.


    Understanding the First Five


    The `SYSTEM` tablespace provides storage for the Oracle data dictionary objects.
    This tablespace is where all objects owned by the `SYS` user are stored. The `SYS`
    user should be the only user that owns objects created in the `SYSTEM` tablespace.


    Starting with Oracle 10g, the `SYSAUX` (system auxiliary) tablespace is created
    when you create the database. This is an auxiliary tablespace used as a data repository
    for Oracle database tools, such as Enterprise Manager, Statspack, LogMiner, Logical
    Standby, and so on.'
  trans: '# 处理归档日志目标空间不足的情况


    ```

    SQL> shutdown immediate;

    SQL> startup mount;

    SQL> alter database noarchivelog;

    SQL> alter database open;

    ```


    归档器后台进程会将归档重做日志写入您指定的位置。如果由于任何原因，归档器进程无法写入归档位置，您的数据库就会挂起。任何尝试连接的用户都会收到此错误：


    ```

    ORA-00257: archiver error. Connect internal only, until freed.

    ```


    作为生产支持 DBA，您绝不能让数据库进入那种状态。有时，不可预测的事件会发生，您必须处理这些未预料到的问题。


    ![Image](img/sq.jpg)

    **注意** 支持生产数据库的 DBA 与架构师 DBA 的思维方式完全不同，后者从花哨的演示或重复的文档中获取新想法。


    在这种情况下，您的数据库等同于宕机并完全不可用。要解决此问题，您必须迅速采取行动：

    *   将文件移动到其他位置。

    *   压缩归档重做日志位置中的旧文件。

    *   永久删除旧文件。

    *   将归档重做日志目标切换到其他位置（可以在数据库启动并运行时动态更改）。


    移动文件通常是解决归档器错误最快、最安全的方法。您可以使用诸如 `mv` 之类的操作系统实用程序，将旧的归档重做日志移动到其他位置。如果后续的还原和恢复需要它们，您可以告知恢复过程新位置。注意不要移动正在写入的归档重做日志。如果某个归档重做日志文件出现在
    `V$ARCHIVED_LOG` 中，这意味着它已被完全归档。


    您可以使用诸如 `gzip` 之类的操作系统实用程序来压缩当前归档目标中的归档重做日志文件。如果您这样做，则必须记住解压缩任何以后可能需要用于还原和恢复的文件。注意不要压缩正在写入的归档重做日志。


    另一个选择是使用诸如 `rm` 之类的操作系统实用程序从磁盘永久删除归档重做日志。这种方法很危险，因为后续恢复可能需要那些归档重做日志。如果您确实删除了归档重做日志文件，并且您没有它们的备份，那么您应尽快对数据库进行完整备份。同样，这种方法有风险，只应作为最后手段使用；如果您删除了尚未备份的归档重做日志，那么您可能无法执行完全恢复。


    如果您的服务器上的另一个位置有充足的空间，您可以考虑更改归档重做日志的写入位置。您可以在数据库启动并运行时执行此操作；例如，


    ```

    SQL> alter system set log_archive_dest_1=''location=/u02/oraarch/O12C'';

    ```


    在您解决主位置的问题后，可以切换回原始位置。


    对于大多数数据库，将归档重做日志写入一个位置就足够了。但是，如果您有任何类型的灾难恢复或高可用性要求，那么您应该写入多个位置。有时，DBA 会设置一个作业，每小时备份归档重做日志，并将它们复制到备用位置甚至备用服务器。


    # 备份归档重做日志文件


    根据您的业务要求，您可能需要一个备份归档重做日志文件的策略。至少，您应该备份在备份处于归档日志模式的数据库期间生成的任何归档重做日志。其他策略可能包括

    *   定期将归档重做日志复制到备用位置，然后从主目标中删除它们

    *   将归档重做日志复制到磁带，然后从磁盘删除它们

    *   使用两个归档重做日志位置

    *   使用 Data Guard 实现稳健的灾难恢复解决方案


    请记住，您需要自上次良好备份的开始时间以来生成的所有归档重做日志，以确保能够完全恢复数据库。只有在确定拥有良好的数据库备份后，才应考虑删除该备份之前生成的归档重做日志。


    如果您使用 RMAN 作为备份和恢复策略，那么您应该使用 RMAN 来备份归档重做日志。此外，您应该为这些文件指定 RMAN 保留策略，并仅在满足保留策略要求后（例如，在从磁盘删除前至少备份一次文件）让
    RMAN 删除归档重做日志（有关使用 RMAN 的详细信息，请参见第 5 章）。


    # 管理表空间和数据文件


    术语 `tablespace` 有点用词不当，因为它不仅仅是表的空间。相反，`tablespace` 是一个逻辑容器，允许您管理磁盘上的物理文件——数据文件——的组。创建表空间后，您就可以在表空间内创建数据库对象（表和索引），这会导致在关联的数据文件中分配磁盘空间。


    `tablespace` 是逻辑的，意味着它仅通过数据字典视图（如 `DBA_TABLESPACES`）可见；您通过 SQL*Plus 或图形工具（如 Enterprise
    Manager）或两者来管理表空间。表空间仅在数据库启动并运行时存在。


    `Data files` 也可以通过数据字典视图（如 `DBA_DATA_FILES`）查看，但还具有物理存在，因为可以通过操作系统实用程序（如 `ls`）在数据库外部查看它们。无论数据库是打开还是关闭，数据文件都持续存在。


    Oracle 数据库通常包含多个表空间。一个表空间可以有一个或多个与之关联的数据文件，但一个数据文件只能与一个表空间关联。换句话说，一个数据文件不能在两个（或多个）表空间之间共享。


    对象（如表和索引）由用户拥有并在表空间内创建。对象在逻辑上实例化为 `segment`（段）。一个 `segment` 由表空间内的 `extents`（区）组成。一个
    `extent` 由一组数据库块组成。图 2-3 展示了这些用于管理 Oracle 数据库内部空间的逻辑和物理结构之间的关系。


    ![9781484207642_Fig02-03.jpg](img/9781484207642_Fig02-03.jpg)

    图 2-3 逻辑存储对象与物理存储的关系


    创建数据库时，执行 `CREATE DATABASE` 语句通常会创建五个表空间：`SYSTEM`、`SYSAUX`、`UNDO`、`TEMP` 和 `USERS`。


    这五个表空间是运行数据库所需的最小存储容器集合（不过有人可能会说您不需要 `USERS` 表空间；更多内容将在下一节介绍）。在打开数据库使用时，您应迅速创建额外的表空间来存储应用程序数据。本章将讨论标准表空间集的用途、对额外表空间的需求，以及如何管理这些关键的数据库存储容器。本章重点介绍与创建和维护表空间及数据文件相关的最常见和最关键的任务，进而介绍更高级的主题，如移动和重命名数据文件。


    ## 理解前五个表空间


    `SYSTEM` 表空间为 Oracle 数据字典对象提供存储。这是所有 `SYS` 用户拥有的对象的存储位置。`SYS` 用户应是在 `SYSTEM` 表空间中创建对象的唯一用户。


    从 Oracle 10g 开始，创建数据库时会创建 `SYSAUX`（系统辅助）表空间。这是一个辅助表空间，用作 Oracle 数据库工具（如 Enterprise
    Manager、Statspack、LogMiner、Logical Standby 等）的数据存储库。'
- fmt: "# Oracle 表空间概述\n\n## 不同类型的表空间\n\n### UNDO 表空间\n\n`UNDO` 表空间存储了撤销事务（`insert`、`update`、`delete`\
    \ 或 `merge`）效果所需的信息。这些信息在事务被有意回滚（通过 `ROLLBACK` 语句）时是必需的。Undo 信息也被 Oracle 用于从意外实例崩溃中恢复，并为\
    \ SQL 语句提供读一致性。此外，一些数据库功能（如闪回查询）也会使用 undo 信息。\n\n### TEMP 表空间\n\n某些 Oracle SQL\
    \ 语句需要排序区，无论是在内存中还是在磁盘上。例如，查询结果在返回给用户之前可能需要排序。Oracle 首先使用内存对查询结果进行排序，当内存不足时，`TEMP`\
    \ 表空间就被用作磁盘上的排序区。在创建或重建索引时也可能需要额外的临时存储空间。当你创建数据库时，通常会创建 `TEMP` 表空间，并将其指定为你所创建的任何用户的默认临时表空间。\n\
    \n### USERS 表空间\n\n`USERS` 表空间并非绝对必需，但它通常被用作用户表和索引数据的默认永久表空间。这意味着当用户尝试创建表或索引时，如果在创建对象时没有指定表空间，那么该对象默认会在默认永久表空间中创建。\n\
    \n## 理解更多需求\n\n虽然你可以将所有数据库用户的数据都放在 `USERS` 表空间中，但对于任何类型的专业数据库应用程序来说，这通常不具备可扩展性或可维护性。相反，为应用程序用户创建额外的表空间更为高效。你通常会为使用数据库的每个应用程序创建至少两个特定的表空间：一个用于应用程序表数据，另一个用于应用程序索引数据。例如，对于\
    \ `APP` 用户，你可以创建名为 `APP_DATA` 和 `APP_INDEX` 的表空间，分别用于存储表和索引数据。\n\n过去，DBA 出于性能原因会将表数据和索引数据分开存储。当时的思路是，将表数据与索引数据分开可以减少输入/输出（I/O）争用。这是因为（每个表空间的）数据文件可以放置在不同的磁盘上，并使用独立的控制器。\n\
    \n在现代存储配置中，应用程序与底层物理存储设备之间存在多层抽象，通过创建多个独立的表空间是否能实现任何性能提升是有争议的。但是，为表和索引数据创建多个表空间仍然有一些合理的理由：\n\
    *   表和索引的备份与恢复要求可能不同。\n*   索引的存储要求可能与表数据的存储要求不同。\n*   你可能使用 `BLOB` 和 `CLOB` 数据类型，这些类型通常与非\
    \ LOB 数据在空间大小上有显著不同的要求。因此，DBA 倾向于将 LOB 数据单独存放在自己的表空间中。\n\n根据你的需求，你应该考虑为使用数据库的每个应用程序创建独立的表空间。例如，为库存应用程序创建\
    \ `INV_DATA` 和 `INV_INDEX`；为人力资源应用程序创建 `HR_DATA` 和 `HR_INDEX`。以下是考虑为每个应用程序创建独立表空间的一些原因：\n\
    *   应用程序可能有不同的可用性要求。独立的表空间允许你将一个应用程序的表空间离线，而不影响另一个应用程序。\n*   应用程序可能有不同的备份和恢复要求。独立的表空间允许表空间被独立地备份和恢复。\n\
    *   应用程序可能有不同的存储要求。独立的表空间允许为不同的空间配额、扩展大小和段管理设置不同的参数。\n*   你可能有一些纯粹是只读的数据。独立的表空间允许你将包含只读数据的表空间设置为只读模式。\n\
    \n下一节将讨论创建表空间。\n\n## 创建表空间\n\n你使用 `CREATE TABLESPACE` 语句来创建表空间。*Oracle SQL Reference\
    \ Manual* 包含超过十几页的创建表空间的语法和示例。在大多数场景下，你只需要使用其中少数几个可用功能，即本地管理的扩展分配和自动段空间管理。以下代码片段演示了如何创建一个采用最常见功能的表空间：\n\
    \n```sql\ncreate tablespace tools datafile '/u01/dbfile/O12C/tools01.dbf'\n  size\
    \ 100m\n  segment space management auto;\n```\n\n你需要根据你的环境修改此脚本。默认情况下，表空间将被创建为本地管理的。本地管理的表空间使用数据文件中的位图来高效地确定一个扩展区是否正在使用中。存储参数\
    \ `NEXT`、`PCTINCREASE`、`MINEXTENTS`、`MAXEXTENTS` 和 `DEFAULT` 在本地管理的表空间中对于扩展区选项是无效的。\n\
    \n`SEGMENT SPACE MANAGEMENT AUTO` 子句指示 Oracle 管理块内的空间。使用此子句时，无需指定诸如 `PCTUSED`、`FREELISTS`\
    \ 和 `FREELIST GROUPS` 之类的参数。`AUTO` 空间管理的替代方案是 `MANUAL`。当你使用 `MANUAL` 时，可以根据应用程序的要求调整参数。我建议你使用\
    \ `AUTO` 而不是 `MANUAL`。使用 `AUTO` 大大减少了你需要配置和管理的参数数量。\n\n当你在表空间中创建表和索引时，Oracle 会根据需要在表空间的数据文件中自动为段分配空间。默认的分配类型是自动分配。你可以通过\
    \ `AUTOALLOCATE` 子句明确指示 Oracle 使用自动分配。Oracle 会分配 64KB、1MB、8MB 或 64MB 的扩展区大小。当你认为一个表空间中的对象大小不一（通常是这种情况）时，使用\
    \ `AUTOALLOCATE` 是合适的。我通常使用默认值，允许 Oracle 自动确定扩展区大小。\n\n`AUTOALLOCATE` 的替代方案是统一扩展区大小。你可以通过\
    \ `UNIFORM SIZE [size]` 子句指示 Oracle 为每个扩展区分配统一的大小。如果你不指定大小，则默认的统一扩展区大小为 1MB。你使用的统一扩展区大小取决于表和索引的存储要求。在某些场景下，我会为给定的应用程序创建几个表空间。例如，你可以创建一个用于小对象的表空间（统一扩展区大小为\
    \ 512KB），一个用于中等大小对象的表空间（统一扩展区大小为 4MB），一个用于大对象的表空间（统一扩展区大小为 16MB），等等。\n\n当数据文件填满时，你可以通过\
    \ `AUTOEXTEND` 功能指示 Oracle 自动增大数据文件的大小。我不建议你使用此功能。相反，你应该监控表空间的增长并在必要时手动添加空间。手动添加空间优于让一个失控的\
    \ SQL 过程意外增长表空间，直到它消耗了挂载点上的所有空间。如果你不小心填满了包含控制文件或 Oracle 二进制文件的挂载点，可能会导致数据库挂起。\n\
    \n如果你确实使用了 `AUTOEXTEND` 功能，我建议你始终指定一个对应的 `MAXSIZE`，这样失控的 SQL 过程就不会意外地填满一个表空间，进而填满挂载点。以下是一个创建自动扩展表空间并设置其最大大小上限的示例：\n\
    \n```sql\ncreate tablespace tools datafile '/u01/dbfile/O12C/tools01.dbf'\n  size\
    \ 100m\n  autoextend on maxsize 1000m\n  segment space management auto;\n```"
  raw: 'The `UNDO` tablespace stores the information required to undo the effects
    of a transaction (`insert`, `update`, `delete`, or `merge`). This information
    is required in the event a transaction is purposely rolled back (via a `ROLLBACK`
    statement). The undo information is also used by Oracle to recover from unexpected
    instance crashes and to provide read consistency for SQL statements. Additionally,
    some database features, such as Flashback Query, use the undo information.


    Some Oracle SQL statements require a sort area, either in memory or on disk. For
    example, the results of a query may need to be sorted before being returned to
    the user. Oracle first uses memory to sort the query results, and when there is
    no longer sufficient memory, the `TEMP` tablespace is used as a sorting area on
    disk. Extra temporary storage may also be required when creating or rebuilding
    indexes. When you create a database, typically you create the `TEMP` tablespace
    and specify it to be the default temporary tablespace for any users you create.


    The `USERS` tablespace is not absolutely required but is often used as a default
    permanent tablespace for table and index data for users. This means that when
    a user attempts to create a table or index, if no tablespace is specified during
    object creation, by default the object is created in the default permanent tablespace.


    Understanding the Need for More


    Although you could put every database user’s data in the `USERS` tablespace, this
    usually isn’t scalable or maintainable for any type of serious database application.
    Instead, it’s more efficient to create additional tablespaces for application
    users. You typically create at least two tablespaces specific to each application
    using the database: one for the application table data and one for the application
    index data. For example, for the `APP` user, you can create tablespaces named
    `APP_DATA` and `APP_INDEX` for table and index data, respectively.


    DBAs used to separate table and index data for performance reasons. The thinking
    was that separating table data from index data would reduce input/output (I/O)
    contention. This is because the data files (for each tablespace) could be placed
    on different disks, with separate controllers.


    With modern storage configurations, which have multiple layers of abstraction
    between the application and the underlying physical storage devices, it’s debatable
    whether you can realize any performance gains by creating multiple separate tablespaces.
    But, there still are valid reasons for creating multiple tablespaces for table
    and index data:


    *   Backup and recovery requirements may be different for the tables and indexes.

    *   The indexes may have storage requirements different from those of the table
    data.

    *   You may be using BLOB and CLOB data types, which typically have considerably
    different sizing requirements than non-LOB data. Therefore DBAs tend to separate
    LOB data in its own tablespace(s).


    Depending on your requirements, you should consider creating separate tablespaces
    for each application using the database. For example, for an inventory application,
    create `INV_DATA` and `INV_INDEX`; for a human resources application, create `HR_DATA`
    and `HR_INDEX`. Here are some reasons to consider creating separate tablespaces
    for each application using the database:


    *   Applications may have different availability requirements. Separate tablespaces
    lets you take tablespaces offline for one application without affecting another
    application.

    *   Applications may have different backup and recovery requirements. Separate
    tablespaces lets tablespaces be backed up and recovered independently.

    *   Applications may have different storage requirements. Separate tablespaces
    allows for different settings for space quotas, extent sizes, and segment management.

    *   You may have some data that is purely read-only. Separate tablespaces lets
    you put a tablespace that contains only read-only data into read-only mode.


    The next section discusses creating tablespaces.


    Creating Tablespaces


    You use the `CREATE TABLESPACE` statement to create tablespaces. The *Oracle SQL
    Reference Manual* contains more than a dozen pages of syntax and examples for
    creating tablespaces. In most scenarios, you need to use only a few of the features
    available, namely, locally managed extent allocation, and automatic segment space
    management. The following code snippet demonstrates how to create a tablespace
    that employs the most common features:


    ```

    create tablespace tools datafile ''/u01/dbfile/O12C/tools01.dbf''

      size 100m

      segment space management auto;

    ```


    You need to modify this script for your environment. By default, tablespaces will
    be created as locally managed. A locally managed tablespace uses a bitmap in the
    data file to efficiently determine whether an extent is in use. The storage parameters
    `NEXT`, `PCTINCREASE`, `MINEXTENTS`, `MAXEXTENTS`, and `DEFAULT` aren’t valid
    for extent options in locally managed tablespaces.


    The `SEGMENT SPACE MANAGEMENT AUTO` clause instructs Oracle to manage the space
    within the block. When you use this clause, there is no need to specify parameters,
    such as `PCTUSED`, `FREELISTS`, and `FREELIST GROUPS`. The alternative to `AUTO`
    space management is `MANUAL`. When you use `MANUAL`, you can adjust the parameters
    to the requirements of your application. I recommend that you use `AUTO` and not
    `MANUAL`. Using `AUTO` vastly reduces the number of parameters you need to configure
    and manage.


    As you create tables and indexes within a tablespace, Oracle will automatically
    allocate space to segments within a tablespace’s datafile as required. The default
    type of allocation is to automatically allocate space. You can explicitly instruct
    Oracle to use automatic allocation via the `AUTOALLOCATE` clause. Oracle allocates
    extent sizes of 64KB, 1MB, 8MB, or 64MB. Using `AUTOALLOCATE` is appropriate when
    you think objects in one tablespace will be of varying sizes (which is often the
    case). I usually use the default of allowing Oracle to automatically determine
    the extent sizes.


    The alternative to `AUTOALLOCATE` is uniform extent sizes. You can instruct Oracle
    to allocate a uniform size for each extent via the `UNIFORM SIZE [size]` clause.
    If you don’t specify a size, then the default uniform extent size is 1MB. The
    uniform extent size that you use varies, depending on the storage requirements
    of your tables and indexes. In some scenarios, I create several tablespaces for
    a given application. For instance, you can create a tablespace for small objects
    that has a uniform extent size of 512KB, a tablespace for medium-sized objects
    that has a uniform extent size of 4MB, a tablespace for large objects with a uniform
    extent size of 16MB, and so on.


    When a data file fills up, you can instruct Oracle to increase the size of the
    data file automatically, with the `AUTOEXTEND` feature. I recommend that you don’t
    use this feature. Instead, you should monitor tablespace growth and add space
    as necessary. Manually adding space is preferable to having a runaway SQL process
    that accidentally grows a tablespace until it has consumed all the space on a
    mount point. If you inadvertently fill up a mount point that contains a control
    file or the Oracle binaries, you can hang your database.


    If you do use the `AUTOEXTEND` feature, I suggest that you always specify a corresponding
    `MAXSIZE` so that a runaway SQL process doesn’t accidentally fill up a tablespace
    that in turn fills up a mount point. Here is an example of creating an autoextending
    tablespace with a cap on its maximum size:


    ```

    create tablespace tools datafile ''/u01/dbfile/O12C/tools01.dbf''

      size 100m

      autoextend on maxsize 1000m

      segment space management auto;

    ```'
  trans: "# Oracle 表空间概述\n\n## 不同类型的表空间\n\n### UNDO 表空间\n\n`UNDO` 表空间存储了撤销事务（`insert`、`update`、`delete`\
    \ 或 `merge`）效果所需的信息。这些信息在事务被有意回滚（通过 `ROLLBACK` 语句）时是必需的。Undo 信息也被 Oracle 用于从意外实例崩溃中恢复，并为\
    \ SQL 语句提供读一致性。此外，一些数据库功能（如闪回查询）也会使用 undo 信息。\n\n### TEMP 表空间\n\n某些 Oracle SQL\
    \ 语句需要排序区，无论是在内存中还是在磁盘上。例如，查询结果在返回给用户之前可能需要排序。Oracle 首先使用内存对查询结果进行排序，当内存不足时，`TEMP`\
    \ 表空间就被用作磁盘上的排序区。在创建或重建索引时也可能需要额外的临时存储空间。当你创建数据库时，通常会创建 `TEMP` 表空间，并将其指定为你所创建的任何用户的默认临时表空间。\n\
    \n### USERS 表空间\n\n`USERS` 表空间并非绝对必需，但它通常被用作用户表和索引数据的默认永久表空间。这意味着当用户尝试创建表或索引时，如果在创建对象时没有指定表空间，那么该对象默认会在默认永久表空间中创建。\n\
    \n## 理解更多需求\n\n虽然你可以将所有数据库用户的数据都放在 `USERS` 表空间中，但对于任何类型的专业数据库应用程序来说，这通常不具备可扩展性或可维护性。相反，为应用程序用户创建额外的表空间更为高效。你通常会为使用数据库的每个应用程序创建至少两个特定的表空间：一个用于应用程序表数据，另一个用于应用程序索引数据。例如，对于\
    \ `APP` 用户，你可以创建名为 `APP_DATA` 和 `APP_INDEX` 的表空间，分别用于存储表和索引数据。\n\n过去，DBA 出于性能原因会将表数据和索引数据分开存储。当时的思路是，将表数据与索引数据分开可以减少输入/输出（I/O）争用。这是因为（每个表空间的）数据文件可以放置在不同的磁盘上，并使用独立的控制器。\n\
    \n在现代存储配置中，应用程序与底层物理存储设备之间存在多层抽象，通过创建多个独立的表空间是否能实现任何性能提升是有争议的。但是，为表和索引数据创建多个表空间仍然有一些合理的理由：\n\
    *   表和索引的备份与恢复要求可能不同。\n*   索引的存储要求可能与表数据的存储要求不同。\n*   你可能使用 `BLOB` 和 `CLOB` 数据类型，这些类型通常与非\
    \ LOB 数据在空间大小上有显著不同的要求。因此，DBA 倾向于将 LOB 数据单独存放在自己的表空间中。\n\n根据你的需求，你应该考虑为使用数据库的每个应用程序创建独立的表空间。例如，为库存应用程序创建\
    \ `INV_DATA` 和 `INV_INDEX`；为人力资源应用程序创建 `HR_DATA` 和 `HR_INDEX`。以下是考虑为每个应用程序创建独立表空间的一些原因：\n\
    *   应用程序可能有不同的可用性要求。独立的表空间允许你将一个应用程序的表空间离线，而不影响另一个应用程序。\n*   应用程序可能有不同的备份和恢复要求。独立的表空间允许表空间被独立地备份和恢复。\n\
    *   应用程序可能有不同的存储要求。独立的表空间允许为不同的空间配额、扩展大小和段管理设置不同的参数。\n*   你可能有一些纯粹是只读的数据。独立的表空间允许你将包含只读数据的表空间设置为只读模式。\n\
    \n下一节将讨论创建表空间。\n\n## 创建表空间\n\n你使用 `CREATE TABLESPACE` 语句来创建表空间。*Oracle SQL 参考手册*\
    \ 包含超过十几页的创建表空间的语法和示例。在大多数场景下，你只需要使用其中少数几个可用功能，即本地管理的扩展分配和自动段空间管理。以下代码片段演示了如何创建一个采用最常见功能的表空间：\n\
    \n```sql\ncreate tablespace tools datafile '/u01/dbfile/O12C/tools01.dbf'\n  size\
    \ 100m\n  segment space management auto;\n```\n\n你需要根据你的环境修改此脚本。默认情况下，表空间将被创建为本地管理的。本地管理的表空间使用数据文件中的位图来高效地确定一个扩展区是否正在使用中。存储参数\
    \ `NEXT`、`PCTINCREASE`、`MINEXTENTS`、`MAXEXTENTS` 和 `DEFAULT` 在本地管理的表空间中对于扩展区选项是无效的。\n\
    \n`SEGMENT SPACE MANAGEMENT AUTO` 子句指示 Oracle 管理块内的空间。使用此子句时，无需指定诸如 `PCTUSED`、`FREELISTS`\
    \ 和 `FREELIST GROUPS` 之类的参数。`AUTO` 空间管理的替代方案是 `MANUAL`。当你使用 `MANUAL` 时，可以根据应用程序的要求调整参数。我建议你使用\
    \ `AUTO` 而不是 `MANUAL`。使用 `AUTO` 大大减少了你需要配置和管理的参数数量。\n\n当你在表空间中创建表和索引时，Oracle 会根据需要在表空间的数据文件中自动为段分配空间。默认的分配类型是自动分配。你可以通过\
    \ `AUTOALLOCATE` 子句明确指示 Oracle 使用自动分配。Oracle 会分配 64KB、1MB、8MB 或 64MB 的扩展区大小。当你认为一个表空间中的对象大小不一（通常是这种情况）时，使用\
    \ `AUTOALLOCATE` 是合适的。我通常使用默认值，允许 Oracle 自动确定扩展区大小。\n\n`AUTOALLOCATE` 的替代方案是统一扩展区大小。你可以通过\
    \ `UNIFORM SIZE [size]` 子句指示 Oracle 为每个扩展区分配统一的大小。如果你不指定大小，则默认的统一扩展区大小为 1MB。你使用的统一扩展区大小取决于表和索引的存储要求。在某些场景下，我会为给定的应用程序创建几个表空间。例如，你可以创建一个用于小对象的表空间（统一扩展区大小为\
    \ 512KB），一个用于中等大小对象的表空间（统一扩展区大小为 4MB），一个用于大对象的表空间（统一扩展区大小为 16MB），等等。\n\n当数据文件填满时，你可以通过\
    \ `AUTOEXTEND` 功能指示 Oracle 自动增大数据文件的大小。我不建议你使用此功能。相反，你应该监控表空间的增长并在必要时手动添加空间。手动添加空间优于让一个失控的\
    \ SQL 过程意外增长表空间，直到它消耗了挂载点上的所有空间。如果你不小心填满了包含控制文件或 Oracle 二进制文件的挂载点，可能会导致数据库挂起。\n\
    \n如果你确实使用了 `AUTOEXTEND` 功能，我建议你始终指定一个对应的 `MAXSIZE`，这样失控的 SQL 过程就不会意外地填满一个表空间，进而填满挂载点。以下是一个创建自动扩展表空间并设置其最大大小上限的示例：\n\
    \n```sql\ncreate tablespace tools datafile '/u01/dbfile/O12C/tools01.dbf'\n  size\
    \ 100m\n  autoextend on maxsize 1000m\n  segment space management auto;\n```"
- fmt: "# 使用&变量参数化CREATE TABLESPACE脚本\n\n在不同的环境中使用`CREATE TABLESPACE`脚本时，能够参数化脚本的部分内容是非常有用的。例如，在开发环境中，你可能将数据文件大小设置为100MB，而在生产环境中，数据文件可能是100GB。使用`&`变量可以使`CREATE\
    \ TABLESPACE`脚本在不同环境之间更便于移植。\n\n以下列表在脚本顶部定义了`&`变量，这些变量决定了为表空间创建的数据文件的大小：\n\n```\n\
    define tbsp_large=5G\ndefine tbsp_med=500M\n--\ncreate tablespace reg_data datafile\
    \ '/u01/dbfile/O12C/reg_data01.dbf'\n  size &&tbsp_large segment space management\
    \ auto;\n--\ncreate tablespace reg_index datafile '/u01/dbfile/O12C/reg_index01.dbf'\n\
    \  size &&tbsp_med segment space management auto;\n```\n\n使用`&`变量允许你修改一次脚本，然后在整个脚本中重用这些变量。你可以参数化脚本的所有方面，包括数据文件挂载点和区大小。\n\
    \n你还可以从SQL*Plus命令行将`&`变量的值传递到`CREATE TABLESPACE`脚本中。这样可以避免在脚本中硬编码特定大小，而是在运行时提供大小。为此，首先在脚本顶部定义`&`变量以接收传入的值：\n\
    \n```\ndefine tbsp_large=&1\ndefine tbsp_med=&2\n--\ncreate tablespace reg_data\
    \ datafile '/u01/dbfile/O12C/reg_data01.dbf'\n  size &&tbsp_large segment space\
    \ management auto;\n--\ncreate tablespace reg_index datafile '/u01/dbfile/O12C/reg_index01.dbf'\n\
    \  size &&tbsp_med segment space management auto;\n```\n\n现在，你可以从SQL*Plus命令行将变量传递到脚本中。以下示例执行名为`cretbsp.sql`的脚本，并传入两个值，分别将`&`变量设置为`5G`和`500M`：\n\
    \n```\nSQL> @cretbsp  5G  500M\n```\n\n[表 2-2](#9781484207642_Ch02.xhtml#Tab2)\
    \ 总结了创建和管理表空间的最佳实践。\n\n[表 2-2](#9781484207642_Ch02.xhtml#_Tab2). 创建和管理表空间的最佳实践\n\
    \n| 最佳实践 | 推理 |\n| --- | --- |\n| 为使用同一数据库的不同应用程序创建独立的表空间。 | 如果需要将某个表空间脱机，它只会影响一个应用程序。\
    \ |\n| 对于一个应用程序，将表数据与索引数据分离到不同的表空间中。 | 表和索引数据可能有不同的存储需求。 |\n| 不要对数据文件使用`AUTOEXTEND`特性。如果确实使用`AUTOEXTEND`，请指定最大大小。\
    \ | 指定最大大小可以防止失控的SQL语句填满存储设备。 |\n| 创建本地管理的表空间。不应创建字典管理的表空间。 | 这提供了更好的性能和可管理性。\
    \ |\n| 对于表空间的数据文件命名约定，使用包含表空间名称后跟一个在该表空间数据文件中唯一的两位数的名称。 | 这样做可以轻松识别哪些数据文件与哪些表空间关联。\
    \ |\n| 尽量减少与表空间关联的数据文件数量。 | 你需要管理的数据文件更少。 |\n| 在表空间`CREATE`脚本中，使用`&`变量来定义诸如存储特性等方面。\
    \ | 这使得脚本在各种环境中更易于重用。 |\n\n如果你需要验证重新创建现有表空间所需的SQL，可以使用`DBMS_METADATA`包来完成。首先，将`LONG`变量设置为一个较大的值：\n\
    \n```\nSQL> set long 1000000\n```\n\n接下来，使用`DBMS_METADATA`包显示数据库中所有表空间的`CREATE\
    \ TABLESPACE`数据定义语言（DDL）：\n\n```\nSQL> select dbms_metadata.get_ddl('TABLESPACE',tablespace_name)\
    \ from dba_tablespaces;\n```\n\n![Image](images/sq.jpg) **提示**  你也可以使用Data Pump来提取数据库对象的DDL。详见[第8章](#9781484207642_Ch08.xhtml)。\n\
    \n## 重命名表空间\n\n有时，你需要重命名一个表空间。你可能想这样做是因为表空间最初被错误命名，或者你希望表空间名称更好地符合你的数据库命名标准。使用`ALTER\
    \ TABLESPACE`语句来重命名表空间。此示例将表空间从`TOOLS`重命名为`TOOLS_DEV`：\n\n```\nSQL> alter tablespace\
    \ tools rename to tools_dev;\n```\n\n当你重命名一个表空间时，Oracle会在数据字典、控制文件和数据文件头中更新表空间的名称。请记住，重命名表空间不会重命名任何关联的数据文件。有关重命名数据文件的信息，请参阅本章后面的“重命名或重新定位数据文件”部分。\n\
    \n![Image](images/sq.jpg) **注意**  你不能重命名`SYSTEM`表空间或`SYSAUX`表空间。\n\n## 控制重做生成\n\
    \n对于某些类型的应用程序，你可能事先知道可以轻松地重新创建数据。一个例子可能是数据仓库环境，你在其中执行直接路径插入或使用SQL*Loader加载数据。在这些场景中，你可以关闭直接路径加载的重做生成。你使用`NOLOGGING`子句来实现这一点：\n\
    \n```\ncreate tablespace inv_mgmt_data\n  datafile '/u01/dbfile/O12C/inv_mgmt_data01.dbf'\
    \ size 100m\n  segment space management auto\n  nologging;\n```\n\n如果你有一个现有表空间并希望更改其日志记录模式，请使用`ALTER\
    \ TABLESPACE`语句：\n\n```\nSQL> alter tablespace inv_mgmt_data nologging;\n```\n\
    \n你可以通过查询`DBA_TABLESPACES`视图来确认表空间的日志记录模式：\n\n```\nSQL> select tablespace_name,\
    \ logging from dba_tablespaces;\n```\n\n重做日志生成无法为常规的`INSERT`、`UPDATE`和`DELETE`语句抑制。对于常规的数据操作语言（DML）语句，`NOLOGGING`子句将被忽略。然而，`NOLOGGING`子句适用于以下类型的DML：\n\
    \n* 直接路径`INSERT`语句\n* 直接路径SQL*Loader\n\n`NOLOGGING`子句也适用于以下类型的DDL语句：\n\n* `CREATE\
    \ TABLE ... AS SELECT`（`NOLOGGING`仅影响初始创建，不影响随后对表的常规DML语句）\n* `ALTER TABLE ...\
    \ MOVE`\n* `ALTER TABLE ... ADD/MERGE/SPLIT/MOVE/MODIFY PARTITION`\n* `CREATE\
    \ INDEX`\n* `ALTER INDEX ... REBUILD`\n* `CREATE MATERIALIZED VIEW`\n* `ALTER\
    \ MATERIALIZED VIEW ... MOVE`\n* `CREATE MATERIALIZED VIEW LOG`\n* `ALTER MATERIALIZED\
    \ VIEW LOG ... MOVE`\n\n请注意，如果表或索引的重做没有被记录，并且在对象备份之前发生了介质故障，那么你将无法恢复数据；你会收到一个`ORA-01578`错误，指出数据存在逻辑损坏。\n\
    \n![Image](images/sq.jpg) **注意**  你也可以在对象级别覆盖表空间级别的日志记录设置。例如，即使表空间被指定为`NOLOGGING`，你也可以使用`LOGGING`子句创建表。\n\
    \n## 更改表空间的写入模式\n\n在数据仓库等环境中，你可能需要将数据加载到表中，然后永远不再修改这些数据。为了强制表空间中的对象不能被修改，你可以将表空间更改为只读。为此，请使用`ALTER\
    \ TABLESPACE`语句：\n\n```\nSQL> alter tablespace inv_mgmt_rep read only;\n```\n\n\
    只读表空间的一个优点是，你只需要备份它一次。无论备份是多久以前进行的，你都应该能够从只读表空间恢复数据文件。\n\n如果你需要将表空间从只读模式修改回来，可以按如下方式进行：\n\
    \n```\nSQL> alter tablespace inv_mgmt_rep read write;\n```\n\n在将表空间置于读/写模式后，请确保重新启用该表空间的备份。"
  raw: 'When you’re using `CREATE TABLESPACE` scripts in different environments, it’s
    useful to be able to parameterize portions of the script. For instance, in development
    you may size the data files at 100MB, whereas in production the data files may
    be 100GB. Use ampersand (`&`) variables to make `CREATE TABLESPACE` scripts more
    portable among environments.


    The next listing defines ampersand variables at the top of the script, and those
    variables determine the sizes of data files created for the tablespaces:


    ```

    define tbsp_large=5G

    define tbsp_med=500M

    --

    create tablespace reg_data datafile ''/u01/dbfile/O12C/reg_data01.dbf''

      size &&tbsp_large segment space management auto;

    --

    create tablespace reg_index datafile ''/u01/dbfile/O12C/reg_index01.dbf''

      size &&tbsp_med segment space management auto;

    ```


    Using ampersand variables allows you to modify the script once and have the variables
    reused throughout the script. You can parameterize all aspects of the script,
    including data file mount points and extent sizes.


    You can also pass the values of the ampersand variables in to the `CREATE TABLESPACE`
    script from the SQL*Plus command line. This lets you avoid hard-coding a specific
    size in the script and instead provide the sizes at runtime. To accomplish this,
    first define at the top of the script the ampersand variables to accept the values
    being passed in:


    ```

    define tbsp_large=&1

    define tbsp_med=&2

    --

    create tablespace reg_data datafile ''/u01/dbfile/O12C/reg_data01.dbf''

      size &&tbsp_large segment space management auto;

    --

    create tablespace reg_index datafile ''/u01/dbfile/O12C/reg_index01.dbf''

      size &&tbsp_med segment space management auto;

    ```


    Now, you can pass variables in to the script from the SQL*Plus command line. The
    following example executes a script named `cretbsp.sql` and passes in two values
    that set the ampersand variables to `5G` and `500M`, respectively:


    ```

    SQL> @cretbsp  5G  500M

    ```


    [Table 2-2](#9781484207642_Ch02.xhtml#Tab2) summarizes the best practices for
    creating and managing tablespaces.


    [Table 2-2](#9781484207642_Ch02.xhtml#_Tab2). Best Practices for Creating and
    Managing Tablespaces


    | Best Practice | Reasoning |

    | --- | --- |

    | Create separate tablespaces for different applications using the same database.
    | If a tablespace needs to be taken offline, it affects only one application.
    |

    | For an application, separate table data from index data in different tablespaces.
    | Table and index data may have different storage requirements. |

    | Don’t use the `AUTOEXTEND` feature for data files. If you do use `AUTOEXTEND`,
    specify a maximum size. | Specifying a maximum size prevents a runaway SQL statement
    from filling up a storage device. |

    | Create tablespaces as locally managed. You shouldn’t create a tablespace as
    dictionary managed. | This provides better performance and manageability. |

    | For a tablespace’s data file naming convention, use a name that contains the
    tablespace name followed by a two-digit number that’s unique within data files
    for that tablespace. | Doing this makes it easy to identify which data files are
    associated with which tablespaces. |

    | Try to minimize the number of data files associated with a tablespace. | You
    have fewer data files to manage. |

    | In tablespace `CREATE` scripts, use ampersand variables to define aspects such
    as storage characteristics. | This makes scripts more reusable among various  environments.
    |


    If you ever need to verify the SQL required to re-create an existing tablespace,
    you can do so with the `DBMS_METADATA` package. First, set the `LONG` variable
    to a large value:


    ```

    SQL> set long 1000000

    ```


    Next, use the `DBMS_METADATA` package to display the `CREATE TABLESPACE` data
    definition language (DDL) for all tablespaces within the database:


    ```

    SQL> select dbms_metadata.get_ddl(''TABLESPACE'',tablespace_name) from dba_tablespaces;

    ```


    ![Image](images/sq.jpg) **Tip**  You can also use Data Pump to extract the DDL
    of database objects. See [Chapter 8](#9781484207642_Ch08.xhtml) for details.


    Renaming a Tablespace


    Sometimes, you need to rename a tablespace. You may want to do this because a
    tablespace was initially erroneously named, or you may want the tablespace name
    to better conform to your database naming standards. Use the `ALTER TABLESPACE`
    statement to rename a tablespace. This example renames a tablespace from `TOOLS`
    to `TOOLS_DEV`:


    ```

    SQL> alter tablespace tools rename to tools_dev;

    ```


    When you rename a tablespace, Oracle updates the name of the tablespace in the
    data dictionary, control files, and data file headers. Keep in mind that renaming
    a tablespace doesn’t rename any associated data files. See the section “Renaming
    or Relocating a Data File,” later in this chapter, for information on renaming
    data files.


    ![Image](images/sq.jpg) **Note**  You can’t rename the `SYSTEM` tablespace or
    the `SYSAUX` tablespace.


    Controlling the Generation of Redo


    For some types of applications, you may know beforehand that you can easily re-create
    the data. An example might be a data warehouse environment in which you perform
    direct path inserts or use SQL*Loader to load data. In these scenarios you can
    turn off the generation of redo for direct path loading. You use the `NOLOGGING`
    clause to do this:


    ```

    create tablespace inv_mgmt_data

      datafile ''/u01/dbfile/O12C/inv_mgmt_data01.dbf'' size 100m

      segment space management auto

      nologging;

    ```


    If you have an existing tablespace and want to alter its logging mode, use the
    `ALTER TABLESPACE` statement:


    ```

    SQL> alter tablespace inv_mgmt_data nologging;

    ```


    You can confirm the tablespace logging mode by querying the `DBA_TABLESPACES`
    view:


    ```

    SQL> select tablespace_name, logging from dba_tablespaces;

    ```


    The generation of redo logging can’t be suppressed for regular `INSERT`, `UPDATE`,
    and `DELETE` statements. For regular data manipulation language (DML) statements,
    the `NOLOGGING` clause is ignored. The `NOLOGGING` clause does apply, however,
    to the following types of DML:


    *   Direct path `INSERT` statements

    *   Direct path SQL*Loader


    The `NOLOGGING` clause also applies to the following types of DDL statements:


    *   `CREATE TABLE ... AS SELECT` (`NOLOGGING` only affects the initial create,
    not subsequent regular DML, statements against the table)

    *   `ALTER TABLE ... MOVE`

    *   `ALTER TABLE ... ADD/MERGE/SPLIT/MOVE/MODIFY PARTITION`

    *   `CREATE INDEX`

    *   `ALTER INDEX ... REBUILD`

    *   `CREATE MATERIALIZED VIEW`

    *   `ALTER MATERIALIZED VIEW ... MOVE`

    *   `CREATE MATERIALIZED VIEW LOG`

    *   `ALTER MATERIALIZED VIEW LOG ... MOVE`


    Be aware that if redo isn’t logged for a table or index, and you have a media
    failure before the object is backed up, then you can’t recover the data; you receive
    an `ORA-01578` error, indicating that there is logical corruption of the data.


    ![Image](images/sq.jpg) **Note**  You can also override the tablespace level of
    logging at the object level. For example, even if a tablespace is specified as
    `NOLOGGING`, you can create a table with the `LOGGING` clause.


    Changing a Tablespace’s Write Mode


    In environments such as data warehouses, you may need to load data into tables
    and then never modify the data again. To enforce that no objects in a tablespace
    can be modified, you can alter the tablespace to be read-only. To do this, use
    the `ALTER TABLESPACE` statement:


    ```

    SQL> alter tablespace inv_mgmt_rep read only;

    ```


    One advantage of a read-only tablespace is that you only have to back it up once.
    You should be able to restore the data files from a read-only tablespace no matter
    how long ago the backup was made.


    If you need to modify the tablespace out of read-only mode, you do so as follows:


    ```

    SQL> alter tablespace inv_mgmt_rep read write;

    ```


    Make sure you reenable backups of a tablespace after you place it in read/write
    mode.'
  trans: "# 使用&变量参数化 CREATE TABLESPACE 脚本\n\n在不同的环境中使用`CREATE TABLESPACE`脚本时，能够参数化脚本的部分内容是非常有用的。例如，在开发环境中，你可能将数据文件大小设置为\
    \ 100MB，而在生产环境中，数据文件可能是 100GB。使用`&`变量可以使`CREATE TABLESPACE`脚本在不同环境之间更便于移植。\n\n\
    以下列表在脚本顶部定义了`&`变量，这些变量决定了为表空间创建的数据文件的大小：\n\n```\ndefine tbsp_large=5G\ndefine\
    \ tbsp_med=500M\n--\ncreate tablespace reg_data datafile '/u01/dbfile/O12C/reg_data01.dbf'\n\
    \  size &&tbsp_large segment space management auto;\n--\ncreate tablespace reg_index\
    \ datafile '/u01/dbfile/O12C/reg_index01.dbf'\n  size &&tbsp_med segment space\
    \ management auto;\n```\n\n使用`&`变量允许你修改一次脚本，然后在整个脚本中重用这些变量。你可以参数化脚本的所有方面，包括数据文件挂载点和区大小。\n\
    \n你还可以从 SQL*Plus 命令行将`&`变量的值传递到`CREATE TABLESPACE`脚本中。这样可以避免在脚本中硬编码特定大小，而是在运行时提供大小。为此，首先在脚本顶部定义`&`变量以接收传入的值：\n\
    \n```\ndefine tbsp_large=&1\ndefine tbsp_med=&2\n--\ncreate tablespace reg_data\
    \ datafile '/u01/dbfile/O12C/reg_data01.dbf'\n  size &&tbsp_large segment space\
    \ management auto;\n--\ncreate tablespace reg_index datafile '/u01/dbfile/O12C/reg_index01.dbf'\n\
    \  size &&tbsp_med segment space management auto;\n```\n\n现在，你可以从 SQL*Plus 命令行将变量传递到脚本中。以下示例执行名为`cretbsp.sql`的脚本，并传入两个值，分别将`&`变量设置为`5G`和`500M`：\n\
    \n```\nSQL> @cretbsp  5G  500M\n```\n\n表 2-2 总结了创建和管理表空间的最佳实践。\n\n表 2-2. 创建和管理表空间的最佳实践\n\
    \n| 最佳实践 | 推理 |\n| --- | --- |\n| 为使用同一数据库的不同应用程序创建独立的表空间。 | 如果需要将某个表空间脱机，它只会影响一个应用程序。\
    \ |\n| 对于一个应用程序，将表数据与索引数据分离到不同的表空间中。 | 表和索引数据可能有不同的存储需求。 |\n| 不要对数据文件使用`AUTOEXTEND`特性。如果确实使用`AUTOEXTEND`，请指定最大大小。\
    \ | 指定最大大小可以防止失控的 SQL 语句填满存储设备。 |\n| 创建本地管理的表空间。不应创建字典管理的表空间。 | 这提供了更好的性能和可管理性。\
    \ |\n| 对于表空间的数据文件命名约定，使用包含表空间名称后跟一个在该表空间数据文件中唯一的两位数的名称。 | 这样做可以轻松识别哪些数据文件与哪些表空间关联。\
    \ |\n| 尽量减少与表空间关联的数据文件数量。 | 你需要管理的数据文件更少。 |\n| 在表空间`CREATE`脚本中，使用`&`变量来定义诸如存储特性等方面。\
    \ | 这使得脚本在各种环境中更易于重用。 |\n\n如果你需要验证重新创建现有表空间所需的 SQL，可以使用`DBMS_METADATA`包来完成。首先，将`LONG`变量设置为一个较大的值：\n\
    \n```\nSQL> set long 1000000\n```\n\n接下来，使用`DBMS_METADATA`包显示数据库中所有表空间的`CREATE\
    \ TABLESPACE`数据定义语言（DDL）：\n\n```\nSQL> select dbms_metadata.get_ddl('TABLESPACE',tablespace_name)\
    \ from dba_tablespaces;\n```\n\n![Image](img/sq.jpg) **提示**  你也可以使用 Data Pump\
    \ 来提取数据库对象的 DDL。详见第 8 章。\n\n## 重命名表空间\n\n有时，你需要重命名一个表空间。你可能想这样做是因为表空间最初被错误命名，或者你希望表空间名称更好地符合你的数据库命名标准。使用`ALTER\
    \ TABLESPACE`语句来重命名表空间。此示例将表空间从`TOOLS`重命名为`TOOLS_DEV`：\n\n```\nSQL> alter tablespace\
    \ tools rename to tools_dev;\n```\n\n当你重命名一个表空间时，Oracle 会在数据字典、控制文件和数据文件头中更新表空间的名称。请记住，重命名表空间不会重命名任何关联的数据文件。有关重命名数据文件的信息，请参阅本章后面的“重命名或重新定位数据文件”部分。\n\
    \n![Image](img/sq.jpg) **注意**  你不能重命名`SYSTEM`表空间或`SYSAUX`表空间。\n\n## 控制重做生成\n\n\
    对于某些类型的应用程序，你可能事先知道可以轻松地重新创建数据。一个例子可能是数据仓库环境，你在其中执行直接路径插入或使用 SQL*Loader 加载数据。在这些场景中，你可以关闭直接路径加载的重做生成。你使用`NOLOGGING`子句来实现这一点：\n\
    \n```\ncreate tablespace inv_mgmt_data\n  datafile '/u01/dbfile/O12C/inv_mgmt_data01.dbf'\
    \ size 100m\n  segment space management auto\n  nologging;\n```\n\n如果你有一个现有表空间并希望更改其日志记录模式，请使用`ALTER\
    \ TABLESPACE`语句：\n\n```\nSQL> alter tablespace inv_mgmt_data nologging;\n```\n\
    \n你可以通过查询`DBA_TABLESPACES`视图来确认表空间的日志记录模式：\n\n```\nSQL> select tablespace_name,\
    \ logging from dba_tablespaces;\n```\n\n重做日志生成无法为常规的`INSERT`、`UPDATE`和`DELETE`语句抑制。对于常规的数据操作语言（DML）语句，`NOLOGGING`子句将被忽略。然而，`NOLOGGING`子句适用于以下类型的\
    \ DML：\n\n* 直接路径`INSERT`语句\n* 直接路径 SQL*Loader\n\n`NOLOGGING`子句也适用于以下类型的 DDL 语句：\n\
    \n* `CREATE TABLE ... AS SELECT`（`NOLOGGING`仅影响初始创建，不影响随后对表的常规 DML 语句）\n* `ALTER\
    \ TABLE ... MOVE`\n* `ALTER TABLE ... ADD/MERGE/SPLIT/MOVE/MODIFY PARTITION`\n\
    * `CREATE INDEX`\n* `ALTER INDEX ... REBUILD`\n* `CREATE MATERIALIZED VIEW`\n\
    * `ALTER MATERIALIZED VIEW ... MOVE`\n* `CREATE MATERIALIZED VIEW LOG`\n* `ALTER\
    \ MATERIALIZED VIEW LOG ... MOVE`\n\n请注意，如果表或索引的重做没有被记录，并且在对象备份之前发生了介质故障，那么你将无法恢复数据；你会收到一个`ORA-01578`错误，指出数据存在逻辑损坏。\n\
    \n![Image](img/sq.jpg) **注意**  你也可以在对象级别覆盖表空间级别的日志记录设置。例如，即使表空间被指定为`NOLOGGING`，你也可以使用`LOGGING`子句创建表。\n\
    \n## 更改表空间的写入模式\n\n在数据仓库等环境中，你可能需要将数据加载到表中，然后永远不再修改这些数据。为了强制表空间中的对象不能被修改，你可以将表空间更改为只读。为此，请使用`ALTER\
    \ TABLESPACE`语句：\n\n```\nSQL> alter tablespace inv_mgmt_rep read only;\n```\n\n\
    只读表空间的一个优点是，你只需要备份它一次。无论备份是多久以前进行的，你都应该能够从只读表空间恢复数据文件。\n\n如果你需要将表空间从只读模式修改回来，可以按如下方式进行：\n\
    \n```\nSQL> alter tablespace inv_mgmt_rep read write;\n```\n\n在将表空间置于读/写模式后，请确保重新启用该表空间的备份。"
- fmt: "![Image](images/sq.jpg) `Note` 你不能将一个包含活动回滚段的表空间设为只读。因此，`SYSTEM`表空间不能设为只读，因为它包含了`SYSTEM`回滚段。\n\
    \n需要注意的是，在 Oracle 11g 及更高版本中，你可以将单独的表修改为只读。这允许你在比表空间级别更细的粒度上控制只读状态；例如，\n\n```\n\
    SQL> alter table my_tab read only;\n```\n\n在只读模式下，你不能对表执行任何`insert`、`update`或`delete`语句。在进行维护操作（如数据迁移）并希望确保用户不更新数据时，将单个表设为读写可能是有益的。\n\
    \n此示例将表修改回读写模式：\n\n```\nSQL> alter table my_tab read write;\n```\n\n## 删除表空间\n\
    \n如果你有一个未使用的表空间，最好将其删除，这样它就不会使你的数据库变得杂乱、消耗不必要的资源，并可能让不熟悉数据库的 DBA 感到困惑。在删除表空间之前，最好先将其脱机：\n\
    \n```\nSQL> alter tablespace inv_data offline;\n```\n\n你可能希望等待看看是否有人抱怨应用程序因为无法写入要删除的表空间中的表或索引而中断。当你确定不再需要该表空间时，删除它并删除其数据文件：\n\
    \n```\nSQL> drop tablespace inv_data including contents and datafiles;\n```\n\n\
    ![Image](images/sq.jpg) `Tip` 无论表空间是在线还是离线，你都可以删除它。例外是`SYSTEM`表空间，它不能被删除。在删除表空间之前，最好先将其脱机。通过这样做，你可以更好地确定是否有应用程序正在使用该表空间中的任何对象。如果你尝试查询离线表空间中的表，你会收到此错误：ORA-00376:\
    \ file can’t be read at this time。\n\n使用`INCLUDING CONTENTS AND DATAFILES`删除表空间会永久移除该表空间及其所有数据文件。在删除之前，请确保该表空间不包含你想要保留的任何数据。\n\
    \n如果你尝试删除一个包含被外键引用的主键的表空间，且该外键关联的表位于另一个不同于你尝试删除的表空间中，你会收到此错误：\n\n```\nORA-02449:\
    \ unique/primary keys in table referenced by foreign keys\n```\n\n首先运行此查询以确定是否有任何外键约束会受到影响：\n\
    \n```\nselect p.owner,\n       p.table_name,\n       p.constraint_name,\n      \
    \ f.table_name referencing_table,\n       f.constraint_name foreign_key_name,\n\
           f.status fk_status\nfrom   dba_constraints p,\n       dba_constraints f,\n\
           dba_tables      t\nwhere  p.constraint_name = f.r_constraint_name\nand    f.constraint_type\
    \ = 'R'\nand    p.table_name = t.table_name\nand    t.tablespace_name = UPPER('&tablespace_name')\n\
    order by 1,2,3,4,5;\n```\n\n如果存在被引用的约束，你需要首先删除这些约束，或者使用`DROP TABLESPACE`语句的`CASCADE\
    \ CONSTRAINTS`子句。此语句使用`CASCADE CONSTRAINTS`自动删除任何受影响的约束：\n\n```\nSQL> drop tablespace\
    \ inv_data including contents and data files cascade constraints;\n```\n\n此语句从被删除表空间外部的、引用被删除表空间内表的表中删除任何引用完整性约束。\n\
    \n如果你删除了一个在生产系统中包含必需对象的表空间，后果可能是灾难性的。你必须执行某种恢复操作来使表空间及其对象恢复。不用说，删除表空间时要非常小心。[Table\
    \ 2-3](#9781484207642_Ch02.xhtml#Tab3)列出了执行此操作时要考虑的建议。\n\n[Table 2-3](#9781484207642_Ch02.xhtml#_Tab3).\
    \ 删除表空间的最佳实践\n\n| 最佳实践 | 原因 |\n| --- | --- |\n| 在删除表空间之前，运行类似这样的脚本来确定表空间中是否存在任何对象：\
    \ \n```\nselect owner, segment_name, segment_type\nfrom dba_segments\nwhere tablespace_name=upper('&&tbsp_name');\n\
    ```\n | 这样做可确保在删除表空间之前，其中不存在任何表或索引。 |\n| 考虑在删除表空间之前重命名其中的表。 | 如果任何应用程序正在使用要删除的表空间中的表，当所需的表被重命名时，应用程序会抛出错误。\
    \ |\n| 如果表空间中没有对象，则将相关数据文件的大小调整为一个非常小的数字，例如 10MB。 | 将数据文件大小缩减到极小的空间量可以快速显示是否有任何应用程序试图访问需要该表空间中空间的对象。\
    \ |\n| 在删除表空间之前备份你的数据库。 | 这确保了你有办法恢复在删除表空间后才发现正在使用的对象。 |\n| 在删除表空间之前，将表空间和数据文件脱机。使用`ALTER\
    \ TABLESPACE`语句使表空间脱机。 | 这有助于确定是否有任何应用程序或用户正在使用表空间中的对象。如果表空间和数据文件脱机，他们就无法访问这些对象。\
    \ |\n| 当你确定一个表空间未被使用时，使用`DROP TABLESPACE ... INCLUDING CONTENTS AND DATAFILES`语句。\
    \ | 这将移除表空间并物理删除与其关联的任何数据文件。一些 DBA 不喜欢这种方法，但如果你已经采取了必要的预防措施，你应该没问题。 |\n\n## 使用\
    \ Oracle 托管文件\n\nOracle 托管文件（OMF）功能自动化了表空间管理的许多方面，例如文件放置、命名和大小调整。你通过设置以下初始化参数来控制\
    \ OMF：\n\n*   `DB_CREATE_FILE_DEST`\n*   `DB_CREATE_ONLINE_LOG_DEST_N`\n*   `DB_RECOVERY_FILE_DEST`\n\
    \n如果你在创建数据库之前设置了这些参数，Oracle 会将它们用于数据文件、控制文件和联机重做日志的放置。你也可以在数据库创建后启用 OMF。Oracle\
    \ 使用初始化参数的值来确定任何新添加文件的位置。Oracle 还会确定新添加文件的名称。\n\n使用 OMF 的优势在于简化了创建表空间的过程。例如，`CREATE\
    \ TABLESPACE`语句除了表空间名称外不需要指定任何内容。首先，通过设置`DB_CREATE_FILE_DEST`参数启用 OMF 功能：\n\n\
    ```\nSQL> alter system set db_create_file_dest='/u01';\n```\n\n现在，发出`CREATE TABLESPACE`语句：\n\
    \n```\nSQL> create tablespace inv1;\n```\n\n此语句创建一个名为`INV1`的表空间，默认数据文件大小为 100MB。请记住，你可以通过指定大小来覆盖默认的\
    \ 100MB 大小：\n\n```\nSQL> create tablespace inv2 datafile size 20m;\n```\n\n要查看关联数据文件的详细信息，请查询`V$DATAFILE`视图，并注意\
    \ Oracle 已在`/u01`目录下创建了子目录，并使用 OMF 格式命名了文件：\n\n```\nSQL> select name from v$datafile\
    \ where name like '%inv%';\nNAME\n\n/u01/O12C/datafile/o1_mf_inv1_8b5l63q6_.dbf\n\
    /u01/O12C/datafile/o1_mf_inv2_8b5lflfc_.dbf\n```\n\nOMF 的一个限制是，你仅限于一个目录用于放置数据文件。如果你想将数据文件添加到不同的目录，可以动态更改位置：\n\
    \n```\nSQL> alter system set db_create_file_dest='/u02';\n```"
  raw: "![Image](images/sq.jpg) **Note**  You can’t make a tablespace that contains\
    \ active rollback segments read-only. For this reason, the `SYSTEM` tablespace\
    \ can’t be made read-only, because it contains the `SYSTEM` rollback segment.\n\
    \nBe aware that in Oracle 11g and above, you can modify individual tables to be\
    \ read-only. This allows you to control the read-only at a much more granular\
    \ level (than at the tablespace level); for example,\n\n```\nSQL> alter table\
    \ my_tab read only;\n```\n\nWhile in read-only mode, you can’t issue any `insert`,\
    \ `update`, or `delete` statements against the table. Making individual tables\
    \ read/write can be advantageous when you’re doing maintenance (such as a data\
    \ migration) and you want to ensure that users don’t update the data.\n\nThis\
    \ example modifies a table back to read/write mode:\n\n```\nSQL> alter table my_tab\
    \ read write;\n```\n\nDropping a Tablespace\n\nIf you have a tablespace that is\
    \ unused, it’s best to drop it so it doesn’t clutter your database, consume unnecessary\
    \ resources, and potentially confuse DBAs who aren’t familiar with the database.\
    \ Before dropping a tablespace, it’s a good practice to first take it offline:\n\
    \n```\nSQL> alter tablespace inv_data offline;\n```\n\nYou may want to wait to\
    \ see if anybody screams that an application is broken because it can’t write\
    \ to a table or index in the tablespace to be dropped. When you’re sure the tablespace\
    \ isn’t required, drop it, and delete its data files:\n\n```\nSQL> drop tablespace\
    \ inv_data including contents and datafiles;\n```\n\n![Image](images/sq.jpg) **Tip**  You\
    \ can drop a tablespace whether it’s online or offline. The exception to this\
    \ is the `SYSTEM` tablespace, which can’t be dropped. It’s always a good idea\
    \ to take a tablespace offline before you drop it. By doing so, you can better\
    \ determine if an application is using any objects in the tablespace. If you attempt\
    \ to query a table in an offline tablespace, you receive this error: ORA-00376:\
    \ file can’t be read at this time.\n\nDropping a tablespace using `INCLUDING CONTENTS\
    \ AND DATAFILES` permanently removes the tablespace and any of its data files.\
    \ Make certain the tablespace doesn’t contain any data you want to keep before\
    \ you drop it.\n\nIf you attempt to drop a tablespace that contains a primary\
    \ key that is referenced by a foreign key associated with a table in a tablespace\
    \ different from the one you’re trying to drop, you receive this error:\n\n```\n\
    ORA-02449: unique/primary keys in table referenced by foreign keys\n```\n\nRun\
    \ this query first to determine whether any foreign key constraints will be affected:\n\
    \n```\nselect p.owner,\n       p.table_name,\n       p.constraint_name,\n      \
    \ f.table_name referencing_table,\n       f.constraint_name foreign_key_name,\n\
           f.status fk_status\nfrom   dba_constraints p,\n       dba_constraints f,\n\
           dba_tables      t\nwhere  p.constraint_name = f.r_constraint_name\nand    f.constraint_type\
    \ = 'R'\nand    p.table_name = t.table_name\nand    t.tablespace_name = UPPER('&tablespace_name')\n\
    order by 1,2,3,4,5;\n```\n\nIf there are referenced constraints, you need to first\
    \ drop the constraints or use the `CASCADE CONSTRAINTS` clause of the `DROP TABLESPACE`\
    \ statement. This statement uses `CASCADE CONSTRAINTS` to drop any affected constraints\
    \ automatically:\n\n```\nSQL> drop tablespace inv_data including contents and\
    \ data files cascade constraints;\n```\n\nThis statement drops any referential\
    \ integrity constraints from tables outside the tablespace being dropped that\
    \ reference tables within the dropped tablespace.\n\nIf you drop a tablespace\
    \ that has required objects in a production system, the results can be catastrophic.\
    \ You must perform some sort of recovery to get the tablespace and its objects\
    \ back. Needless to say, be very careful when dropping a tablespace. [Table 2-3](#9781484207642_Ch02.xhtml#Tab3)\
    \ lists recommendations to consider when you do this.\n\n[Table 2-3](#9781484207642_Ch02.xhtml#_Tab3).\
    \ Best Practices for Dropping Tablespaces\n\n| Best Practice | Reasoning |\n|\
    \ --- | --- |\n| Before dropping a tablespace, run a script such as this to determine\
    \ if any objects exist in the tablespace: \n```\nselect owner, segment_name, segment_type\n\
    from dba_segments\nwhere tablespace_name=upper('&&tbsp_name');\n```\n\n| Doing\
    \ this ensures that no tables or indexes exist in the tablespace before you drop\
    \ it. |\n| Consider renaming tables in a tablespace before you drop it. | If any\
    \ applications are using tables within the tablespace to be dropped, the application\
    \ throws an error when a required table is renamed. |\n| If there are no objects\
    \ in the tablespace, resize the associated data files to a very small number,\
    \ such as 10MB. | Reducing the size of the data files to a miniscule amount of\
    \ space quickly shows whether any applications are trying to access objects that\
    \ require space in a tablespace. |\n| Make a backup of your database before dropping\
    \ a tablespace. | This ensures that you have a way to recover objects that are\
    \ discovered to be in use after you drop the tablespace. |\n| Take the tablespace\
    \ and data files offline before you drop the tablespace. Use the `ALTER TABLESPACE`\
    \ statement to take the tablespace offline. | This helps determine if any applications\
    \ or users are using objects in the tablespace. They can’t access the objects\
    \ if the tablespace and data files are offline. |\n| When you’re sure a tablespace\
    \ isn’t in use, use the `DROP TABLESPACE ... INCLUDING CONTENTS AND DATAFILES`\
    \ statement. | This removes the tablespace and physically removes any data files\
    \ associated with it. Some DBAs don’t like this approach, but you should be fine\
    \ if you’ve taken the   necessary precautions. |\n\nUsing Oracle Managed Files\n\
    \nThe Oracle Managed File (OMF) feature automates many aspects of tablespace management,\
    \ such as file placement, naming, and sizing. You control OMF by setting the following\
    \ initialization parameters:\n\n*   `DB_CREATE_FILE_DEST`\n*   `DB_CREATE_ONLINE_LOG_DEST_N`\n\
    *   `DB_RECOVERY_FILE_DEST`\n\nIf you set these parameters before you create the\
    \ database, Oracle uses them for the placement of the data files, control files,\
    \ and online redo logs. You can also enable OMF after your database has been created.\
    \ Oracle uses the values of the initialization parameters for the locations of\
    \ any newly added files. Oracle also determines the name of the newly added file.\n\
    \nThe advantage of using OMF is that creating tablespaces is simplified. For example,\
    \ the `CREATE TABLESPACE` statement doesn’t need to specify anything other than\
    \ the tablespace name. First, enable the OMF feature by setting the `DB_CREATE_FILE_DEST`\
    \ parameter:\n\n```\nSQL> alter system set db_create_file_dest='/u01';\n```\n\n\
    Now, issue the `CREATE TABLESPACE` statement:\n\n```\nSQL> create tablespace inv1;\n\
    ```\n\nThis statement creates a tablespace named `INV1`, with a default data file\
    \ size of 100MB. Keep in mind that you can override the default size of 100MB\
    \ by specifying a size:\n\n```\nSQL> create tablespace inv2 datafile size 20m;\n\
    ```\n\nTo view the details of the associated data files, query the `V$DATAFILE`\
    \ view, and note that Oracle has created subdirectories beneath the `/u01` directory\
    \ and named the file with the OMF format:\n\n```\nSQL> select name from v$datafile\
    \ where name like '%inv%';\nNAME\n\n/u01/O12C/datafile/o1_mf_inv1_8b5l63q6_.dbf\n\
    /u01/O12C/datafile/o1_mf_inv2_8b5lflfc_.dbf\n```\n\nOne limitation of OMF is that\
    \ you’re limited to one directory for the placement of data files. If you want\
    \ to add data files to a different directory, you can alter the location dynamically:\n\
    \n```\nSQL> alter system set db_create_file_dest='/u02';\n```"
  trans: "\n![Image](img/sq.jpg) `注意` 你不能将一个包含活动回滚段的表空间设置为只读。因此，`SYSTEM`表空间不能设为只读，因为它包含了`SYSTEM`回滚段。\n\
    \n需要注意的是，在 Oracle 11g 及更高版本中，你可以将单个表修改为只读。这允许你在比表空间级别更细的粒度上控制只读状态；例如，\n\n```\n\
    SQL> alter table my_tab read only;\n```\n\n在只读模式下，你不能对表执行任何`insert`、`update`或`delete`语句。在进行维护操作（如数据迁移）并希望确保用户不更新数据时，将单个表设为只读可能是有益的。\n\
    \n此示例将表修改回读写模式：\n\n```\nSQL> alter table my_tab read write;\n```\n\n## 删除表空间\n\
    \n如果你有一个未使用的表空间，最好将其删除，这样它就不会使你的数据库变得杂乱、消耗不必要的资源，并可能让不熟悉数据库的 DBA 感到困惑。在删除表空间之前，最好先将其脱机：\n\
    \n```\nSQL> alter tablespace inv_data offline;\n```\n\n你可能希望等待看看是否有人抱怨应用程序因为无法写入要删除的表空间中的表或索引而中断。当你确定不再需要该表空间时，删除它并删除其数据文件：\n\
    \n```\nSQL> drop tablespace inv_data including contents and datafiles;\n```\n\n\
    ![Image](img/sq.jpg) `提示` 无论表空间是在线还是离线，你都可以删除它。例外是`SYSTEM`表空间，它不能被删除。在删除表空间之前，最好先将其脱机。通过这样做，你可以更好地确定是否有应用程序正在使用该表空间中的任何对象。如果你尝试查询离线表空间中的表，你会收到此错误：ORA-00376:\
    \ 此时无法读取文件。\n\n使用`INCLUDING CONTENTS AND DATAFILES`删除表空间会永久移除该表空间及其所有数据文件。在删除之前，请确保该表空间不包含你想要保留的任何数据。\n\
    \n如果你尝试删除一个包含被外键引用的主键的表空间，且该外键关联的表位于另一个不同于你尝试删除的表空间中，你会收到此错误：\n\n```\nORA-02449:\
    \ 表中的唯一/主键被外键引用\n```\n\n首先运行此查询以确定是否有任何外键约束会受到影响：\n\n```\nselect p.owner,\n      \
    \ p.table_name,\n       p.constraint_name,\n       f.table_name referencing_table,\n\
           f.constraint_name foreign_key_name,\n       f.status fk_status\nfrom  \
    \ dba_constraints p,\n       dba_constraints f,\n       dba_tables      t\nwhere  p.constraint_name\
    \ = f.r_constraint_name\nand    f.constraint_type = 'R'\nand    p.table_name = t.table_name\n\
    and    t.tablespace_name = UPPER('&tablespace_name')\norder by 1,2,3,4,5;\n```\n\
    \n如果存在被引用的约束，你需要首先删除这些约束，或者使用`DROP TABLESPACE`语句的`CASCADE CONSTRAINTS`子句。此语句使用`CASCADE\
    \ CONSTRAINTS`自动删除任何受影响的约束：\n\n```\nSQL> drop tablespace inv_data including contents\
    \ and data files cascade constraints;\n```\n\n此语句从被删除表空间外部的、引用被删除表空间内表的表中删除任何引用完整性约束。\n\
    \n如果你删除了一个在生产系统中包含必需对象的表空间，后果可能是灾难性的。你必须执行某种恢复操作来使表空间及其对象恢复。不用说，删除表空间时要非常小心。表\
    \ 2-3 列出了执行此操作时要考虑的建议。\n\n表 2-3. 删除表空间的最佳实践\n\n| 最佳实践 | 原因 |\n| --- | --- |\n\
    | 在删除表空间之前，运行类似这样的脚本来确定表空间中是否存在任何对象： \n```\nselect owner, segment_name, segment_type\n\
    from dba_segments\nwhere tablespace_name=upper('&&tbsp_name');\n```\n | 这样做可确保在删除表空间之前，其中不存在任何表或索引。\
    \ |\n| 考虑在删除表空间之前重命名其中的表。 | 如果任何应用程序正在使用要删除的表空间中的表，当所需的表被重命名时，应用程序会抛出错误。 |\n|\
    \ 如果表空间中没有对象，则将相关数据文件的大小调整为一个非常小的数字，例如 10MB。 | 将数据文件大小缩减到极小的空间量可以快速显示是否有任何应用程序试图访问需要该表空间中空间的对象。\
    \ |\n| 在删除表空间之前备份你的数据库。 | 这确保了你有办法恢复在删除表空间后才发现正在使用的对象。 |\n| 在删除表空间之前，将表空间和数据文件脱机。使用`ALTER\
    \ TABLESPACE`语句使表空间脱机。 | 这有助于确定是否有任何应用程序或用户正在使用表空间中的对象。如果表空间和数据文件脱机，他们就无法访问这些对象。\
    \ |\n| 当你确定一个表空间未被使用时，使用`DROP TABLESPACE ... INCLUDING CONTENTS AND DATAFILES`语句。\
    \ | 这将移除表空间并物理删除与其关联的任何数据文件。一些 DBA 不喜欢这种方法，但如果你已经采取了必要的预防措施，你应该没问题。 |\n\n## 使用\
    \ Oracle 托管文件\n\nOracle 托管文件（OMF）功能自动化了表空间管理的许多方面，例如文件放置、命名和大小调整。你通过设置以下初始化参数来控制\
    \ OMF：\n\n*   `DB_CREATE_FILE_DEST`\n*   `DB_CREATE_ONLINE_LOG_DEST_N`\n*   `DB_RECOVERY_FILE_DEST`\n\
    \n如果你在创建数据库之前设置了这些参数，Oracle 会将它们用于数据文件、控制文件和联机重做日志的放置。你也可以在数据库创建后启用 OMF。Oracle\
    \ 使用初始化参数的值来确定任何新添加文件的位置。Oracle 还会确定新添加文件的名称。\n\n使用 OMF 的优势在于简化了创建表空间的过程。例如，`CREATE\
    \ TABLESPACE`语句除了表空间名称外不需要指定任何内容。首先，通过设置`DB_CREATE_FILE_DEST`参数启用 OMF 功能：\n\n\
    ```\nSQL> alter system set db_create_file_dest='/u01';\n```\n\n现在，发出`CREATE TABLESPACE`语句：\n\
    \n```\nSQL> create tablespace inv1;\n```\n\n此语句创建一个名为`INV1`的表空间，默认数据文件大小为 100MB。请记住，你可以通过指定大小来覆盖默认的\
    \ 100MB 大小：\n\n```\nSQL> create tablespace inv2 datafile size 20m;\n```\n\n要查看关联数据文件的详细信息，请查询`V$DATAFILE`视图，并注意\
    \ Oracle 已在`/u01`目录下创建了子目录，并使用 OMF 格式命名了文件：\n\n```\nSQL> select name from v$datafile\
    \ where name like '%inv%';\nNAME\n\n/u01/O12C/datafile/o1_mf_inv1_8b5l63q6_.dbf\n\
    /u01/O12C/datafile/o1_mf_inv2_8b5lflfc_.dbf\n```\n\nOMF 的一个限制是，你仅限于一个目录用于放置数据文件。如果你想将数据文件添加到不同的目录，可以动态更改位置：\n\
    \n```\nSQL> alter system set db_create_file_dest='/u02';\n```\n"
- fmt: "Although this procedure isn’t a huge deal, I find it easier not to use OMF.\
    \ Most of the environments I’ve worked in have many mount points assigned for\
    \ database use. You don’t want to have to modify an initialization parameter every\
    \ time you need a data file added to a directory that isn’t in the current definition\
    \ of `DB_CREATE_FILE_DEST`. It’s easier to issue a `CREATE TABLESPACE` statement\
    \ or `ALTER TABLESPACE` statement that has the file location and storage parameters\
    \ in the script. It isn’t cumbersome to provide directory names and file names\
    \ to the tablespace-management statements.\n\n## Creating a Bigfile Tablespace\n\
    \nThe bigfile feature allows you to create a tablespace with a very large data\
    \ file assigned to it. The advantage of using the bigfile feature is this potential\
    \ to create very large files. With an 8KB block size, you can create a data file\
    \ as large as 32TB. With a 32KB block size, you can create a data file up to 128TB.\n\
    \nUse the `BIGFILE` clause to create a bigfile tablespace:\n\n```sql\ncreate bigfile\
    \ tablespace inv_big_data\ndatafile '/u01/dbfile/O12C/inv_big_data01.dbf'\n  size\
    \ 10g\n  segment space management auto;\n```\n\nAs long as you have plenty of\
    \ space associated with the filesystem supporting the bigfile tablespace data\
    \ file, you can store massive amounts of data in a tablespace.\n\nOne potential\
    \ disadvantage of using a bigfile tablespace is that if, for any reason, you run\
    \ out of space on a filesystem that supports the data file associated with the\
    \ bigfile, you can’t expand the size of the tablespace (unless you can add space\
    \ to the filesystem). You can’t add more data files to a bigfile tablespace if\
    \ they’re placed on separate mount points. A bigfile tablespace allows only one\
    \ data file to be associated with it.\n\nYou can make the bigfile tablespace the\
    \ default type of tablespace for a database, using the `ALTER DATABASE SET DEFAULT\
    \ BIGFILE TABLESPACE` statement. However, I don’t recommend doing that. You could\
    \ potentially create a tablespace, not knowing it was a bigfile tablespace (because\
    \ you forgot it was the default or because you’re a new DBA on the project and\
    \ didn’t realize it), and create a tablespace on a mount point. Then, when you\
    \ discovered that you needed more space, you wouldn’t know that you couldn’t add\
    \ another data file on a different mount point for this tablespace.\n\n## Enabling\
    \ Default Table Compression within a Tablespace\n\nWhen working with large databases,\
    \ you may want to consider compressing the data. Compressed data results in less\
    \ disk space, less memory, and fewer I/O operations. Queries reading compressed\
    \ data potentially execute faster because fewer blocks are required to satisfy\
    \ the result of the query. But, compression does have a cost; it requires more\
    \ CPU resources, as the data are compressed and uncompressed while reading and\
    \ writing.\n\nWhen creating a tablespace, you can enable data compression features.\
    \ Doing so doesn’t compress the tablespace. Rather, any tables you create within\
    \ the tablespace inherit the compression characteristics of the tablespace. This\
    \ example creates a tablespace with `ROW STORE COMPRESS ADVANCED`:\n\n```sql\n\
    CREATE TABLESPACE tools_comp\n  DATAFILE '/u01/dbfile/O12C/tools_comp01.dbf'\n\
    \  SIZE 100m\n  SEGMENT SPACE MANAGEMENT AUTO\n  DEFAULT ROW STORE COMPRESS ADVANCED;\n\
    ```\n\n![Image](images/sq.jpg) **注意** 如果你使用的是 Oracle 11g，请使用 `COMPRESS FOR OLTP`\
    \ 子句代替 `ROW STORE COMPRESS ADVANCED`。\n\nNow when a table is created within this\
    \ tablespace, it will automatically be created with the `ROW STORE COMPRESS ADVANCED`\
    \ feature. You can verify the compression characteristics of a tablespace via\
    \ this query:\n\n```sql\nSQL> select tablespace_name, def_tab_compression, compress_for\
    \ from dba_tablespaces;\n```\n\nIf a tablespace is already created, you can alter\
    \ its compression characters, as follows:\n\n```sql\nSQL> alter tablespace tools_comp\
    \ default row store compress advanced;\n```\n\nHere’s an example that alters a\
    \ tablespace’s default compress to `BASIC`:\n\n```sql\nSQL> alter tablespace tools_comp\
    \ default compress basic;\n```\n\nYou can disable tablespace compression via the\
    \ `NOCOMPRESS` clause:\n\n```sql\nSQL> alter tablespace tools_comp default nocompress;\n\
    ```\n\n![Image](images/sq.jpg) **注意** 大多数压缩功能需要企业版和高级压缩选项。\n\n## Displaying Tablespace\
    \ Size\n\nDBAs often use monitoring scripts to alert them when they need to increase\
    \ the space allocated to a tablespace. Depending on whether or not you’re in a\
    \ pluggable database environment, your SQL for determining space usage will vary.\
    \ For a regular database (nonpluggable), you can use the regular DBA-level views\
    \ to determine space usage. The following script displays the percentage of free\
    \ space left in a tablespace and data file:\n\n```sql\nSET PAGESIZE 100 LINES\
    \ 132 ECHO OFF VERIFY OFF FEEDB OFF SPACE 1 TRIMSP ON\nCOMPUTE SUM OF a_byt t_byt\
    \ f_byt ON REPORT\nBREAK ON REPORT ON tablespace_name ON pf\nCOL tablespace_name\
    \ FOR A17   TRU HEAD 'Tablespace|Name'\nCOL file_name       FOR A40   TRU HEAD\
    \ 'Filename'\nCOL a_byt           FOR 9,990.999 HEAD 'Allocated|GB'\nCOL t_byt\
    \           FOR 9,990.999 HEAD 'Current|Used GB'\nCOL f_byt           FOR 9,990.999\
    \ HEAD 'Current|Free GB'\nCOL pct_free        FOR 990.0     HEAD 'File %|Free'\n\
    COL pf              FOR 990.0     HEAD 'Tbsp %|Free'\nCOL seq NOPRINT\nDEFINE\
    \ b_div=1073741824\n--\nSELECT 1 seq, b.tablespace_name, nvl(x.fs,0)/y.ap*100\
    \ pf, b.file_name file_name,\n  b.bytes/&&b_div a_byt, NVL((b.bytes-SUM(f.bytes))/&&b_div,b.bytes/&&b_div)\
    \ t_byt,\n  NVL(SUM(f.bytes)/&&b_div,0) f_byt, NVL(SUM(f.bytes)/b.bytes*100,0)\
    \ pct_free\nFROM dba_free_space f, dba_data_files b\n ,(SELECT y.tablespace_name,\
    \ SUM(y.bytes) fs\n   FROM dba_free_space y GROUP BY y.tablespace_name) x\n ,(SELECT\
    \ x.tablespace_name, SUM(x.bytes) ap\n   FROM dba_data_files x GROUP BY x.tablespace_name)\
    \ y\nWHERE f.file_id(+) = b.file_id\nAND   x.tablespace_name(+) = y.tablespace_name\n\
    and   y.tablespace_name =  b.tablespace_name\nAND   f.tablespace_name(+) = b.tablespace_name\n\
    GROUP BY b.tablespace_name, nvl(x.fs,0)/y.ap*100, b.file_name, b.bytes\nUNION\n\
    SELECT 2 seq, tablespace_name,\n  j.bf/k.bb*100 pf, b.name file_name, b.bytes/&&b_div\
    \ a_byt,\n  a.bytes_used/&&b_div t_byt, a.bytes_free/&&b_div f_byt,\n  a.bytes_free/b.bytes*100\
    \ pct_free\nFROM v$temp_space_header a, v$tempfile b\n  ,(SELECT SUM(bytes_free)\
    \ bf FROM v$temp_space_header) j\n  ,(SELECT SUM(bytes) bb FROM v$tempfile) k\n\
    WHERE a.file_id = b.file#\nORDER BY 1,2,4,3;\n```\n\nIf you don’t have any monitoring\
    \ in place, you’re alerted via the SQL statement that is attempting to perform\
    \ an insert or update operation that the tablespace requires more space but isn’t\
    \ able to allocate more. At that point, an `ORA-01653` error is thrown, indicating\
    \ the object can’t extend.\n\nAfter you determine that a tablespace needs more\
    \ space, you need to either increase the size of a data file or add a data file\
    \ to the tablespace. See the section “Altering Tablespace Size,” later in this\
    \ chapter, for a discussion of these topics.\n\n## DISPLAYING ORACLE ERROR MESSAGES\
    \ AND ACTIONS\n\nYou can use the `oerr` utility to quickly display the cause of\
    \ an error and simple instructions on what actions to take; for example, `$ oerr\
    \ ora 01653`\n\nHere is the output for this example:\n\n```\n01653, 00000, \"\
    unable to extend table %s.%s by %s in tablespace %s\"\n// *Cause:  Failed to allocate\
    \ an extent of the required number of blocks for\n//          a table segment\
    \ in the tablespace indicated.\n// *Action: Use ALTER TABLESPACE ADD DATAFILE\
    \ statement to add one or more\n//          files to the tablespace indicated.\n\
    ```\n\nThe `oerr` utility’s output gives you a fast and easy way to triage problems.\
    \ If the information provided isn't enough, then Google is a good second option.\n\
    \n## Altering Tablespace Size\n\nWhen you’ve determined which data file you want\
    \ to resize, first make sure you have enough disk space to increase the size of\
    \ the data file on the mount point on which the data file exists:\n\n```bash\n\
    $ df -h | sort\n```"
  raw: 'Although this procedure isn’t a huge deal, I find it easier not to use OMF.
    Most of the environments I’ve worked in have many mount points assigned for database
    use. You don’t want to have to modify an initialization parameter every time you
    need a data file added to a directory that isn’t in the current definition of
    `DB_CREATE_FILE_DEST`. It’s easier to issue a `CREATE TABLESPACE` statement or
    `ALTER TABLESPACE` statement that has the file location and storage parameters
    in the script. It isn’t cumbersome to provide directory names and file names to
    the tablespace-management statements.


    Creating a Bigfile Tablespace


    The bigfile feature allows you to create a tablespace with a very large data file
    assigned to it. The advantage of using the bigfile feature is this potential to
    create very large files. With an 8KB block size, you can create a data file as
    large as 32TB. With a 32KB block size, you can create a data file up to 128TB.


    Use the `BIGFILE` clause to create a bigfile tablespace:


    ```

    create bigfile tablespace inv_big_data

    datafile ''/u01/dbfile/O12C/inv_big_data01.dbf''

      size 10g

      segment space management auto;

    ```


    As long as you have plenty of space associated with the filesystem supporting
    the bigfile tablespace data file, you can store massive amounts of data in a tablespace.


    One potential disadvantage of using a bigfile tablespace is that if, for any reason,
    you run out of space on a filesystem that supports the data file associated with
    the bigfile, you can’t expand the size of the tablespace (unless you can add space
    to the filesystem). You can’t add more data files to a bigfile tablespace if they’re
    placed on separate mount points. A bigfile tablespace allows only one data file
    to be associated with it.


    You can make the bigfile tablespace the default type of tablespace for a database,
    using the `ALTER DATABASE SET DEFAULT BIGFILE TABLESPACE` statement. However,
    I don’t recommend doing that. You could potentially create a tablespace, not knowing
    it was a bigfile tablespace (because you forgot it was the default or because
    you’re a new DBA on the project and didn’t realize it), and create a tablespace
    on a mount point. Then, when you discovered that you needed more space, you wouldn’t
    know that you couldn’t add another data file on a different mount point for this
    tablespace.


    Enabling Default Table Compression within a Tablespace


    When working with large databases, you may want to consider compressing the data.
    Compressed data results in less disk space, less memory, and fewer I/O operations.
    Queries reading compressed data potentially execute faster because fewer blocks
    are required to satisfy the result of the query. But, compression does have a
    cost; it requires more CPU resources, as the data are compressed and uncompressed
    while reading and writing.


    When creating a tablespace, you can enable data compression features. Doing so
    doesn’t compress the tablespace. Rather, any tables you create within the tablespace
    inherit the compression characteristics of the tablespace. This example creates
    a tablespace with `ROW STORE COMPRESS ADVANCED`:


    ```

    CREATE TABLESPACE tools_comp

      DATAFILE ''/u01/dbfile/O12C/tools_comp01.dbf''

      SIZE 100m

      SEGMENT SPACE MANAGEMENT AUTO

      DEFAULT ROW STORE COMPRESS ADVANCED;

    ```


    ![Image](images/sq.jpg) **Note**  If you’re using Oracle 11g, then use the `COMPRESS
    FOR OLTP` clause instead of `ROW STORE COMPRESS ADVANCED`.


    Now when a table is created within this tablespace, it will automatically be created
    with the `ROW STORE COMPRESS ADVANCED` feature. You can verify the compression
    characteristics of a tablespace via this query:


    ```

    SQL> select tablespace_name, def_tab_compression, compress_for from dba_tablespaces;

    ```


    If a tablespace is already created, you can alter its compression characters,
    as follows:


    ```

    SQL> alter tablespace tools_comp default row store compress advanced;

    ```


    Here’s an example that alters a tablespace’s default compress to `BASIC`:


    ```

    SQL> alter tablespace tools_comp default compress basic;

    ```


    You can disable tablespace compression via the `NOCOMPRESS` clause:


    ```

    SQL> alter tablespace tools_comp default nocompress;

    ```


    ![Image](images/sq.jpg) **Note**  Most compression features require the Enterprise
    Edition and the Advanced Compression option.


    Displaying Tablespace Size


    DBAs often use monitoring scripts to alert them when they need to increase the
    space allocated to a tablespace. Depending on whether or not you’re in a pluggable
    database environment, your SQL for determining space usage will vary. For a regular
    database (nonpluggable), you can use the regular DBA-level views to determine
    space usage. The following script displays the percentage of free space left in
    a tablespace and data file:


    ```

    SET PAGESIZE 100 LINES 132 ECHO OFF VERIFY OFF FEEDB OFF SPACE 1 TRIMSP ON

    COMPUTE SUM OF a_byt t_byt f_byt ON REPORT

    BREAK ON REPORT ON tablespace_name ON pf

    COL tablespace_name FOR A17   TRU HEAD ''Tablespace|Name''

    COL file_name       FOR A40   TRU HEAD ''Filename''

    COL a_byt           FOR 9,990.999 HEAD ''Allocated|GB''

    COL t_byt           FOR 9,990.999 HEAD ''Current|Used GB''

    COL f_byt           FOR 9,990.999 HEAD ''Current|Free GB''

    COL pct_free        FOR 990.0     HEAD ''File %|Free''

    COL pf              FOR 990.0     HEAD ''Tbsp %|Free''

    COL seq NOPRINT

    DEFINE b_div=1073741824

    --

    SELECT 1 seq, b.tablespace_name, nvl(x.fs,0)/y.ap*100 pf, b.file_name file_name,

      b.bytes/&&b_div a_byt, NVL((b.bytes-SUM(f.bytes))/&&b_div,b.bytes/&&b_div) t_byt,

      NVL(SUM(f.bytes)/&&b_div,0) f_byt, NVL(SUM(f.bytes)/b.bytes*100,0) pct_free

    FROM dba_free_space f, dba_data_files b

     ,(SELECT y.tablespace_name, SUM(y.bytes) fs

       FROM dba_free_space y GROUP BY y.tablespace_name) x

     ,(SELECT x.tablespace_name, SUM(x.bytes) ap

       FROM dba_data_files x GROUP BY x.tablespace_name) y

    WHERE f.file_id(+) = b.file_id

    AND   x.tablespace_name(+) = y.tablespace_name

    and   y.tablespace_name =  b.tablespace_name

    AND   f.tablespace_name(+) = b.tablespace_name

    GROUP BY b.tablespace_name, nvl(x.fs,0)/y.ap*100, b.file_name, b.bytes

    UNION

    SELECT 2 seq, tablespace_name,

      j.bf/k.bb*100 pf, b.name file_name, b.bytes/&&b_div a_byt,

      a.bytes_used/&&b_div t_byt, a.bytes_free/&&b_div f_byt,

      a.bytes_free/b.bytes*100 pct_free

    FROM v$temp_space_header a, v$tempfile b

      ,(SELECT SUM(bytes_free) bf FROM v$temp_space_header) j

      ,(SELECT SUM(bytes) bb FROM v$tempfile) k

    WHERE a.file_id = b.file#

    ORDER BY 1,2,4,3;

    ```


    If you don’t have any monitoring in place, you’re alerted via the SQL statement
    that is attempting to perform an insert or update operation that the tablespace
    requires more space but isn’t able to allocate more. At that point, an `ORA-01653`
    error is thrown, indicating the object can’t extend.


    After you determine that a tablespace needs more space, you need to either increase
    the size of a data file or add a data file to the tablespace. See the section
    “Altering Tablespace Size,” later in this chapter, for a discussion of these topics.


    DISPLAYING ORACLE ERROR MESSAGES AND ACTIONS


    You can use the `oerr` utility to quickly display the cause of an error and simple
    instructions on what actions to take; for example,


    `$ oerr ora 01653`


    Here is the output for this example:


    `01653, 00000, "unable to extend table %s.%s by %s in tablespace %s"`

    `// *Cause:  Failed to allocate an extent of the required number of blocks for`

    `//          a table segment in the tablespace indicated.`

    `// *Action: Use ALTER TABLESPACE ADD DATAFILE statement` `to` `add one or more`

    `//          files to the tablespace indicated.`


    The `oerr` utility’s output gives you a fast and easy way to triage problems.
    If the information provided isn''t enough, then Google is a good second option.


    Altering Tablespace Size


    When you’ve determined which data file you want to resize, first make sure you
    have enough disk space to increase the size of the data file on the mount point
    on which the data file exists:


    ```

    $ df -h | sort

    ```'
  trans: "\n虽然这个过程并非至关重要，但我发现不使用 OMF（Oracle Managed Files）会更加简便。我工作过的大多数环境都为数据库用途分配了许多挂载点。如果数据文件需要添加到一个不在当前\
    \ `DB_CREATE_FILE_DEST` 参数定义范围内的目录中，你肯定不希望每次都去修改初始化参数。更简单的方法是直接在脚本中使用带有文件位置和存储参数的\
    \ `CREATE TABLESPACE` 或 `ALTER TABLESPACE` 语句。向表空间管理语句提供目录名和文件名并不繁琐。\n\n## 创建大文件表空间\n\
    \n大文件（bigfile）特性允许你创建一个关联了超大数据文件的表空间。使用大文件特性的优势在于它具备创建极大型文件的潜力。在 8KB 块大小下，你可以创建最大\
    \ 32TB 的数据文件。在 32KB 块大小下，你可以创建最大 128TB 的数据文件。\n\n使用 `BIGFILE` 子句创建大文件表空间：\n\n\
    ```sql\ncreate bigfile tablespace inv_big_data\ndatafile '/u01/dbfile/O12C/inv_big_data01.dbf'\n\
    \  size 10g\n  segment space management auto;\n```\n\n只要支持大文件表空间数据文件的文件系统有充足的空间，你就可以在表空间中存储海量数据。\n\
    \n使用大文件表空间的一个潜在缺点是，如果由于任何原因，支持该大文件关联数据文件的文件系统空间耗尽，你将无法扩展表空间的大小（除非你能为文件系统增加空间）。你无法将更多的数据文件添加到大文件表空间，即使这些文件放在不同的挂载点上。大文件表空间只允许关联一个数据文件。\n\
    \n你可以使用 `ALTER DATABASE SET DEFAULT BIGFILE TABLESPACE` 语句，使大文件表空间成为数据库的默认表空间类型。但是，我不建议这样做。你可能会在不知情的情况下创建了一个大文件表空间（因为你忘了它是默认类型，或者因为你是项目的新\
    \ DBA 没有意识到），并在某个挂载点上创建了该表空间。之后，当你发现需要更多空间时，你将不知道无法为这个表空间在另一个挂载点上添加另一个数据文件。\n\n\
    ## 在表空间内启用默认表压缩\n\n处理大型数据库时，你可能需要考虑压缩数据。压缩数据可以减少磁盘空间、内存占用和 I/O 操作。读取压缩数据的查询执行速度可能更快，因为满足查询结果所需的数据块更少。但是，压缩确实有代价；它在读写过程中压缩和解压数据，需要更多的\
    \ CPU 资源。\n\n在创建表空间时，你可以启用数据压缩功能。这样做并不会压缩表空间本身。相反，你在该表空间内创建的任何表都将继承表空间的压缩特性。以下示例创建了一个使用\
    \ `ROW STORE COMPRESS ADVANCED` 的表空间：\n\n```sql\nCREATE TABLESPACE tools_comp\n\
    \  DATAFILE '/u01/dbfile/O12C/tools_comp01.dbf'\n  SIZE 100m\n  SEGMENT SPACE\
    \ MANAGEMENT AUTO\n  DEFAULT ROW STORE COMPRESS ADVANCED;\n```\n\n![Image](img/sq.jpg)\
    \ **注意** 如果你使用的是 Oracle 11g，请使用 `COMPRESS FOR OLTP` 子句代替 `ROW STORE COMPRESS ADVANCED`。\n\
    \n现在，当在该表空间内创建表时，表将自动启用 `ROW STORE COMPRESS ADVANCED` 功能。你可以通过以下查询验证表空间的压缩特性：\n\
    \n```sql\nSQL> select tablespace_name, def_tab_compression, compress_for from\
    \ dba_tablespaces;\n```\n\n如果表空间已经创建，你可以更改其压缩特性，如下所示：\n\n```sql\nSQL> alter tablespace\
    \ tools_comp default row store compress advanced;\n```\n\n下面是一个将表空间默认压缩更改为 `BASIC`\
    \ 的示例：\n\n```sql\nSQL> alter tablespace tools_comp default compress basic;\n```\n\
    \n你可以通过 `NOCOMPRESS` 子句禁用表空间压缩：\n\n```sql\nSQL> alter tablespace tools_comp default\
    \ nocompress;\n```\n\n![Image](img/sq.jpg) **注意** 大多数压缩功能需要企业版和高级压缩选项。\n\n## 显示表空间大小\n\
    \nDBA 通常使用监控脚本，在需要增加分配给表空间的空间时收到警报。根据你是否处于可插拔数据库环境，用于确定空间使用情况的 SQL 会有所不同。对于常规数据库（非可插拔），你可以使用常规的\
    \ DBA 级别视图来确定空间使用情况。以下脚本显示表空间和数据文件的剩余空闲空间百分比：\n\n```sql\nSET PAGESIZE 100 LINES\
    \ 132 ECHO OFF VERIFY OFF FEEDB OFF SPACE 1 TRIMSP ON\nCOMPUTE SUM OF a_byt t_byt\
    \ f_byt ON REPORT\nBREAK ON REPORT ON tablespace_name ON pf\nCOL tablespace_name\
    \ FOR A17   TRU HEAD 'Tablespace|Name'\nCOL file_name       FOR A40   TRU HEAD\
    \ 'Filename'\nCOL a_byt           FOR 9,990.999 HEAD 'Allocated|GB'\nCOL t_byt\
    \           FOR 9,990.999 HEAD 'Current|Used GB'\nCOL f_byt           FOR 9,990.999\
    \ HEAD 'Current|Free GB'\nCOL pct_free        FOR 990.0     HEAD 'File %|Free'\n\
    COL pf              FOR 990.0     HEAD 'Tbsp %|Free'\nCOL seq NOPRINT\nDEFINE\
    \ b_div=1073741824\n--\nSELECT 1 seq, b.tablespace_name, nvl(x.fs,0)/y.ap*100\
    \ pf, b.file_name file_name,\n  b.bytes/&&b_div a_byt, NVL((b.bytes-SUM(f.bytes))/&&b_div,b.bytes/&&b_div)\
    \ t_byt,\n  NVL(SUM(f.bytes)/&&b_div,0) f_byt, NVL(SUM(f.bytes)/b.bytes*100,0)\
    \ pct_free\nFROM dba_free_space f, dba_data_files b\n ,(SELECT y.tablespace_name,\
    \ SUM(y.bytes) fs\n   FROM dba_free_space y GROUP BY y.tablespace_name) x\n ,(SELECT\
    \ x.tablespace_name, SUM(x.bytes) ap\n   FROM dba_data_files x GROUP BY x.tablespace_name)\
    \ y\nWHERE f.file_id(+) = b.file_id\nAND   x.tablespace_name(+) = y.tablespace_name\n\
    and   y.tablespace_name =  b.tablespace_name\nAND   f.tablespace_name(+) = b.tablespace_name\n\
    GROUP BY b.tablespace_name, nvl(x.fs,0)/y.ap*100, b.file_name, b.bytes\nUNION\n\
    SELECT 2 seq, tablespace_name,\n  j.bf/k.bb*100 pf, b.name file_name, b.bytes/&&b_div\
    \ a_byt,\n  a.bytes_used/&&b_div t_byt, a.bytes_free/&&b_div f_byt,\n  a.bytes_free/b.bytes*100\
    \ pct_free\nFROM v$temp_space_header a, v$tempfile b\n  ,(SELECT SUM(bytes_free)\
    \ bf FROM v$temp_space_header) j\n  ,(SELECT SUM(bytes) bb FROM v$tempfile) k\n\
    WHERE a.file_id = b.file#\nORDER BY 1,2,4,3;\n```\n\n如果你没有任何监控措施，那么当尝试执行插入或更新操作的\
    \ SQL 语句因表空间需要更多空间但无法分配而失败时，你会收到警报。此时，会抛出 `ORA-01653` 错误，指示对象无法扩展。\n\n确定表空间需要更多空间后，你需要增大某个数据文件的大小或向表空间添加一个数据文件。有关这些主题的讨论，请参阅本章后面的“更改表空间大小”部分。\n\
    \n## 显示 Oracle 错误消息和操作\n\n你可以使用 `oerr` 工具快速显示错误原因以及应采取的简单操作说明；例如，`$ oerr ora 01653`\n\
    \n以下是此示例的输出：\n\n```\n01653, 00000, \"unable to extend table %s.%s by %s in tablespace\
    \ %s\"\n// *Cause:  Failed to allocate an extent of the required number of blocks\
    \ for\n//          a table segment in the tablespace indicated.\n// *Action: Use\
    \ ALTER TABLESPACE ADD DATAFILE statement to add one or more\n//          files\
    \ to the tablespace indicated.\n```\n\n`oerr` 工具的输出为你提供了一种快速、简便的问题排查方法。如果提供的信息不足，那么谷歌是一个很好的备选方案。\n\
    \n## 更改表空间大小\n\n当你确定了要调整大小的数据文件后，首先确保数据文件所在挂载点有足够的磁盘空间来增加数据文件的大小：\n\n```bash\n\
    $ df -h | sort\n```\n"
- fmt: "Use the `ALTER DATABASE DATAFILE ... RESIZE` command to increase the data\
    \ file’s size. This example resizes the data file to 1GB:\n\n```\nSQL> alter database\
    \ datafile '/u01/dbfile/O12C/users01.dbf' resize 1g;\n```\n\nIf you don’t have\
    \ space on an existing mount point to increase the size of a data file, then you\
    \ must add a data file. To add a data file to an existing tablespace, use the\
    \ `ALTER TABLESPACE ... ADD DATAFILE` statement:\n\n```\nSQL> alter tablespace\
    \ users add datafile '/u02/dbfile/O12C/users02.dbf' size 100m;\n```\n\nWith bigfile\
    \ tablespaces, you have the option of using the `ALTER TABLESPACE` statement to\
    \ resize the data file. This works because only one data file can be associated\
    \ with a bigfile tablespace:\n\n```\nSQL> alter tablespace inv_big_data resize\
    \ 1P;\n```\n\nResizing data files can be a daily task when you’re managing databases\
    \ with heavy transaction loads. Increasing the size of an existing data file allows\
    \ you to add space to a tablespace without adding more data files. If there isn’t\
    \ enough disk space left on the storage device that contains an existing data\
    \ file, you can add a data file in a different location to an existing tablespace.\n\
    \nTo add space to a temporary tablespace, first query the `V$TEMPFILE` view to\
    \ verify the current size and location of temporary data files:\n\n```\nSQL> select\
    \ name, bytes from v$tempfile;\n```\n\nThen, use the `TEMPFILE` option of the\
    \ `ALTER DATABASE` statement:\n\n```\nSQL> alter database tempfile '/u01/dbfile/O12C/temp01.dbf'\
    \ resize 500m;\n```\n\nYou can also add a file to a temporary tablespace via the\
    \ `ALTER TABLESPACE` statement:\n\n```\nSQL> alter tablespace temp add tempfile\
    \ '/u01/dbfile/O12C/temp02.dbf' size 5000m;\n```\n\n## Toggling Data Files Offline\
    \ and Online\n\nSometimes, when you’re performing maintenance operations (such\
    \ as renaming data files), you may need to first take a data file offline. You\
    \ can use either the `ALTER TABLESPACE` or the `ALTER DATABASE DATAFILE` statement\
    \ to toggle data files offline and online.\n\n![Image](images/sq.jpg) **Tip**\
    \  As of Oracle 12c, you can move and rename data files while they are online\
    \ and open for use. See “Renaming or Relocating a Data File,” later in this chapter,\
    \ for a discussion of this.\n\nUse the `ALTER TABLESPACE ... OFFLINE NORMAL` statement\
    \ to take a tablespace and its associated data files offline. You don’t need to\
    \ specify `NORMAL`, because it’s the default:\n\n```\nSQL> alter tablespace users\
    \ offline;\n```\n\nWhen you place a tablespace offline in normal mode, Oracle\
    \ performs a checkpoint on the data files associated with the tablespace. This\
    \ ensures that all modified blocks in memory that are associated with the tablespace\
    \ are flushed and written to the data files. You don’t need to perform media recovery\
    \ when you bring the tablespace and its associated data files back online.\n\n\
    You can’t use the `ALTER TABLESPACE` statement to place tablespaces offline when\
    \ the database is in mount mode. If you attempt to take a tablespace offline while\
    \ the database is mounted (but not open), you receive the following error:\n\n\
    ```\nORA-01109: database not open\n```\n\n![Image](images/sq.jpg) **Note**  When\
    \ in mount mode, you must use the `ALTER DATABASE DATAFILE` statement to take\
    \ a data file offline.\n\nWhen taking a tablespace offline, you can also specify\
    \ `ALTER TABLESPACE ... OFFLINE TEMPORARY`. In this scenario, Oracle initiates\
    \ a checkpoint on all data files associated with the tablespace that are online.\
    \ Oracle doesn’t initiate a checkpoint on offline data files associated with the\
    \ tablespace.\n\nYou can specify `ALTER TABLESPACE ... OFFLINE IMMEDIATE` when\
    \ taking a tablespace offline. Your database must be in archivelog mode in this\
    \ situation, or the following error is thrown:\n\n```\nORA-01145: offline immediate\
    \ disallowed unless media recovery enabled\n```\n\nWhen using `OFFLINE IMMEDIATE`,\
    \ Oracle doesn’t issue a checkpoint on the data files. You must perform media\
    \ recovery on the tablespace before bringing it back online.\n\n![Image](images/sq.jpg)\
    \ **Note**  You can’t take the `SYSTEM` or `UNDO` tablespace offline while the\
    \ database is open.\n\nYou can also use the `ALTER DATABASE DATAFILE` statement\
    \ to take a data file offline. If your database is open for use, then it must\
    \ be in archivelog mode in order for you to take a data file offline with the\
    \ `ALTER DATABASE DATAFILE` statement. If you attempt to take a data file offline\
    \ using the `ALTER DATABASE DATAFILE` statement, and your database isn’t in archivelog\
    \ mode, the `ORA-01145` error is thrown.\n\nIf your database isn’t in archivelog\
    \ mode, you must specify `ALTER DATABASE DATAFILE ... OFFLINE FOR DROP` when taking\
    \ a data file offline. You can specify the entire file name or provide the file\
    \ number. In this example, data file 4 is taken offline:\n\n```\nSQL> alter database\
    \ datafile 4 offline for drop;\n```\n\nNow, if you attempt to bring online the\
    \ offline data file, you receive the following error:\n\n```\nSQL> alter database\
    \ datafile 4 online;\nORA-01113: file 4 needs media recovery\n```\n\nWhen you\
    \ use the `OFFLINE FOR DROP` clause, no checkpoint is taken on the data file.\
    \ This means you need to perform media recovery on the data file before bringing\
    \ it online. Performing media recovery applies any changes to the data file that\
    \ are recorded in the online redo logs that aren’t in the data files themselves.\
    \ Before you can bring online a data file that was taken offline with the `OFFLINE\
    \ FOR DROP` clause, you must perform media recovery on it. You can specify either\
    \ the entire file name or the file number:\n\n```\nSQL> recover datafile 4;\n\
    ```\n\nIf the redo information that Oracle needs is contained in the online redo\
    \ logs, you should see this message:\n\n```\nMedia recovery complete.\n```\n\n\
    If your database isn’t in archivelog mode, and if Oracle needs redo information\
    \ not contained in the online redo logs to recover the data file, then you can’t\
    \ recover the data file and place it back online.\n\nIf your database is in archivelog\
    \ mode, you can take it offline without the `FOR DROP` clause. In this scenario,\
    \ Oracle overlooks the `FOR DROP` clause. Even when your database is in archivelog\
    \ mode, you need to perform media recovery on a data file that has been taken\
    \ offline with the `ALTER DATABASE DATAFILE` statement. [Table 2-4](#9781484207642_Ch02.xhtml#Tab4)\
    \ summarizes the options you must consider when taking a tablespace/data files\
    \ offline.\n\n[Table 2-4](#9781484207642_Ch02.xhtml#_Tab4). Options for Taking\
    \ Tablespaces/Data Files Offline\n\n![Table2-4.jpg](images/Table2-4.jpg)\n\n![Image](images/sq.jpg)\
    \ **Note**  While the database is in mount mode (and not open), you can use the\
    \ `ALTER DATABASE DATAFILE` command to take any data file offline, including `SYSTEM`\
    \ and `UNDO`.\n\n## Renaming or Relocating a Data File\n\nYou may occasionally\
    \ need to move or rename a data file. For example, you may need to move data files\
    \ because of changes in the storage devices or because the files were created\
    \ in the wrong location or with a nonstandard name. As of Oracle 12c, you have\
    \ the option of renaming or moving data files, or both, while they are online.\
    \ Otherwise, you will have to take data files offline for maintenance operations.\n\
    \n### Performing Online Data File Operations\n\nStarting with Oracle 12c is the\
    \ `ALTER DATABASE MOVE DATAFILE` command. This command allows you to rename or\
    \ move data files without any downtime. This vastly simplifies the task of moving\
    \ or renaming a data file, as there is no need to manually place data files offline/online\
    \ and use OS commands to physically move the files. This once manually intensive\
    \ (and error-prone) operation has now been simplified to a single SQL command.\n\
    \nA data file must be online for the online move or rename to work. Here is an\
    \ example of renaming an online data file:\n\n```\nSQL> alter database move datafile\
    \ '/u01/dbfile/O12C/users01.dbf' to\n     '/u01/dbfile/O12C/users_dev01.dbf';\n\
    ```\n\nHere is an example of moving a data file to a new mount point:"
  raw: 'Use the `ALTER DATABASE DATAFILE ... RESIZE` command to increase the data
    file’s size. This example resizes the data file to 1GB:


    ```

    SQL> alter database datafile ''/u01/dbfile/O12C/users01.dbf'' resize 1g;

    ```


    If you don’t have space on an existing mount point to increase the size of a data
    file, then you must add a data file. To add a data file to an existing tablespace,
    use the `ALTER TABLESPACE ... ADD DATAFILE` statement:


    ```

    SQL> alter tablespace users add datafile ''/u02/dbfile/O12C/users02.dbf'' size
    100m;

    ```


    With bigfile tablespaces, you have the option of using the `ALTER TABLESPACE`
    statement to resize the data file. This works because only one data file can be
    associated with a bigfile tablespace:


    ```

    SQL> alter tablespace inv_big_data resize 1P;

    ```


    Resizing data files can be a daily task when you’re managing databases with heavy
    transaction loads. Increasing the size of an existing data file allows you to
    add space to a tablespace without adding more data files. If there isn’t enough
    disk space left on the storage device that contains an existing data file, you
    can add a data file in a different location to an existing tablespace.


    To add space to a temporary tablespace, first query the `V$TEMPFILE` view to verify
    the current size and location of temporary data files:


    ```

    SQL> select name, bytes from v$tempfile;

    ```


    Then, use the `TEMPFILE` option of the `ALTER DATABASE` statement:


    ```

    SQL> alter database tempfile ''/u01/dbfile/O12C/temp01.dbf'' resize 500m;

    ```


    You can also add a file to a temporary tablespace via the `ALTER TABLESPACE` statement:


    ```

    SQL> alter tablespace temp add tempfile ''/u01/dbfile/O12C/temp02.dbf'' size 5000m;

    ```


    Toggling Data Files Offline and Online


    Sometimes, when you’re performing maintenance operations (such as renaming data
    files), you may need to first take a data file offline. You can use either the
    `ALTER TABLESPACE` or the `ALTER DATABASE DATAFILE` statement to toggle data files
    offline and online.


    ![Image](images/sq.jpg) **Tip**  As of Oracle 12c, you can move and rename data
    files while they are online and open for use. See “Renaming or Relocating a Data
    File,” later in this chapter, for a discussion of this.


    Use the `ALTER TABLESPACE ... OFFLINE NORMAL` statement to take a tablespace and
    its associated data files offline. You don’t need to specify `NORMAL`, because
    it’s the default:


    ```

    SQL> alter tablespace users offline;

    ```


    When you place a tablespace offline in normal mode, Oracle performs a checkpoint
    on the data files associated with the tablespace. This ensures that all modified
    blocks in memory that are associated with the tablespace are flushed and written
    to the data files. You don’t need to perform media recovery when you bring the
    tablespace and its associated data files back online.


    You can’t use the `ALTER TABLESPACE` statement to place tablespaces offline when
    the database is in mount mode. If you attempt to take a tablespace offline while
    the database is mounted (but not open), you receive the following error:


    ```

    ORA-01109: database not open

    ```


    ![Image](images/sq.jpg) **Note**  When in mount mode, you must use the `ALTER
    DATABASE DATAFILE` statement to take a data file offline.


    When taking a tablespace offline, you can also specify `ALTER TABLESPACE ... OFFLINE
    TEMPORARY`. In this scenario, Oracle initiates a checkpoint on all data files
    associated with the tablespace that are online. Oracle doesn’t initiate a checkpoint
    on offline data files associated with the tablespace.


    You can specify `ALTER TABLESPACE ... OFFLINE IMMEDIATE` when taking a tablespace
    offline. Your database must be in archivelog mode in this situation, or the following
    error is thrown:


    ```

    ORA-01145: offline immediate disallowed unless media recovery enabled

    ```


    When using `OFFLINE IMMEDIATE`, Oracle doesn’t issue a checkpoint on the data
    files. You must perform media recovery on the tablespace before bringing it back
    online.


    ![Image](images/sq.jpg) **Note**  You can’t take the `SYSTEM` or `UNDO` tablespace
    offline while the database is open.


    You can also use the `ALTER DATABASE DATAFILE` statement to take a data file offline.
    If your database is open for use, then it must be in archivelog mode in order
    for you to take a data file offline with the `ALTER DATABASE DATAFILE` statement.
    If you attempt to take a data file offline using the `ALTER DATABASE DATAFILE`
    statement, and your database isn’t in archivelog mode, the `ORA-01145` error is
    thrown.


    If your database isn’t in archivelog mode, you must specify `ALTER DATABASE DATAFILE
    ... OFFLINE FOR DROP` when taking a data file offline. You can specify the entire
    file name or provide the file number. In this example, data file 4 is taken offline:


    ```

    SQL> alter database datafile 4 offline for drop;

    ```


    Now, if you attempt to bring online the offline data file, you receive the following
    error:


    ```

    SQL> alter database datafile 4 online;

    ORA-01113: file 4 needs media recovery

    ```


    When you use the `OFFLINE FOR DROP` clause, no checkpoint is taken on the data
    file. This means you need to perform media recovery on the data file before bringing
    it online. Performing media recovery applies any changes to the data file that
    are recorded in the online redo logs that aren’t in the data files themselves.
    Before you can bring online a data file that was taken offline with the `OFFLINE
    FOR DROP` clause, you must perform media recovery on it. You can specify either
    the entire file name or the file number:


    ```

    SQL> recover datafile 4;

    ```


    If the redo information that Oracle needs is contained in the online redo logs,
    you should see this message:


    ```

    Media recovery complete.

    ```


    If your database isn’t in archivelog mode, and if Oracle needs redo information
    not contained in the online redo logs to recover the data file, then you can’t
    recover the data file and place it back online.


    If your database is in archivelog mode, you can take it offline without the `FOR
    DROP` clause. In this scenario, Oracle overlooks the `FOR DROP` clause. Even when
    your database is in archivelog mode, you need to perform media recovery on a data
    file that has been taken offline with the `ALTER DATABASE DATAFILE` statement.
    [Table 2-4](#9781484207642_Ch02.xhtml#Tab4) summarizes the options you must consider
    when taking a tablespace/data files offline.


    [Table 2-4](#9781484207642_Ch02.xhtml#_Tab4). Options for Taking Tablespaces/Data
    Files Offline


    ![Table2-4.jpg](images/Table2-4.jpg)


    ![Image](images/sq.jpg) **Note**  While the database is in mount mode (and not
    open), you can use the `ALTER DATABASE DATAFILE` command to take any data file
    offline, including `SYSTEM` and `UNDO`.


    Renaming or Relocating a Data File


    You may occasionally need to move or rename a data file. For example, you may
    need to move data files because of changes in the storage devices or because the
    files were created in the wrong location or with a nonstandard name. As of Oracle
    12c, you have the option of renaming or moving data files, or both, while they
    are online. Otherwise, you will have to take data files offline for maintenance
    operations.


    Performing Online Data File Operations


    Starting with Oracle 12c is the `ALTER DATABASE MOVE DATAFILE` command. This command
    allows you to rename or move data files without any downtime. This vastly simplifies
    the task of moving or renaming a data file, as there is no need to manually place
    data files offline/online and use OS commands to physically move the files. This
    once manually intensive (and error-prone) operation has now been simplified to
    a single SQL command.


    A data file must be online for the online move or rename to work. Here is an example
    of renaming an online data file:


    ```

    SQL> alter database move datafile ''/u01/dbfile/O12C/users01.dbf'' to

         ''/u01/dbfile/O12C/users_dev01.dbf'';

    ```


    Here is an example of moving a data file to a new mount point:'
  trans: "\n使用 `ALTER DATABASE DATAFILE ... RESIZE` 命令来增加数据文件的大小。此示例将数据文件大小调整为 1GB：\n\
    \n```\nSQL> alter database datafile '/u01/dbfile/O12C/users01.dbf' resize 1g;\n\
    ```\n\n如果现有挂载点上没有空间来增加数据文件的大小，则必须添加一个数据文件。要向现有表空间添加数据文件，请使用 `ALTER TABLESPACE\
    \ ... ADD DATAFILE` 语句：\n\n```\nSQL> alter tablespace users add datafile '/u02/dbfile/O12C/users02.dbf'\
    \ size 100m;\n```\n\n对于大文件表空间，您可以选择使用 `ALTER TABLESPACE` 语句来调整数据文件的大小。这样做是可行的，因为一个大文件表空间只能关联一个数据文件：\n\
    \n```\nSQL> alter tablespace inv_big_data resize 1P;\n```\n\n当管理具有高事务负载的数据库时，调整数据文件大小可能是一项日常任务。增加现有数据文件的大小允许您在不添加更多数据文件的情况下为表空间增加空间。如果包含现有数据文件的存储设备上没有足够的磁盘空间，您可以向现有表空间添加一个位于不同位置的数据文件。\n\
    \n要向临时表空间添加空间，首先查询 `V$TEMPFILE` 视图以验证当前临时数据文件的大小和位置：\n\n```\nSQL> select name,\
    \ bytes from v$tempfile;\n```\n\n然后，使用 `ALTER DATABASE` 语句的 `TEMPFILE` 选项：\n\n\
    ```\nSQL> alter database tempfile '/u01/dbfile/O12C/temp01.dbf' resize 500m;\n\
    ```\n\n您也可以通过 `ALTER TABLESPACE` 语句向临时表空间添加文件：\n\n```\nSQL> alter tablespace temp\
    \ add tempfile '/u01/dbfile/O12C/temp02.dbf' size 5000m;\n```\n\n## 将数据文件脱机和联机\n\
    \n有时，在执行维护操作（例如重命名数据文件）时，您可能需要先将数据文件脱机。您可以使用 `ALTER TABLESPACE` 或 `ALTER DATABASE\
    \ DATAFILE` 语句来切换数据文件的脱机和联机状态。\n\n![Image](img/sq.jpg) **提示**  自 Oracle 12c 起，您可以在数据文件联机并打开使用时移动和重命名它们。有关此的讨论，请参阅本章后面的“重命名或重新定位数据文件”。\n\
    \n使用 `ALTER TABLESPACE ... OFFLINE NORMAL` 语句将表空间及其关联的数据文件脱机。您无需指定 `NORMAL`，因为它是默认值：\n\
    \n```\nSQL> alter tablespace users offline;\n```\n\n当您以正常模式将表空间脱机时，Oracle 会对与该表空间关联的数据文件执行一个检查点。这确保与表空间关联的所有内存中已修改块都被刷新并写入数据文件。当您将表空间及其关联的数据文件重新联机时，无需执行介质恢复。\n\
    \n当数据库处于装载模式时，不能使用 `ALTER TABLESPACE` 语句将表空间脱机。如果您尝试在数据库已装载（但未打开）时将表空间脱机，将收到以下错误：\n\
    \n```\nORA-01109: database not open\n```\n\n![Image](img/sq.jpg) **注意**  在装载模式下，必须使用\
    \ `ALTER DATABASE DATAFILE` 语句将数据文件脱机。\n\n在将表空间脱机时，您还可以指定 `ALTER TABLESPACE ...\
    \ OFFLINE TEMPORARY`。在这种情况下，Oracle 会对与该表空间关联的所有联机数据文件启动一个检查点。Oracle 不会对与该表空间关联的脱机数据文件启动检查点。\n\
    \n在将表空间脱机时，可以指定 `ALTER TABLESPACE ... OFFLINE IMMEDIATE`。在这种情况下，您的数据库必须处于归档日志模式，否则会抛出以下错误：\n\
    \n```\nORA-01145: offline immediate disallowed unless media recovery enabled\n\
    ```\n\n当使用 `OFFLINE IMMEDIATE` 时，Oracle 不会对数据文件发出检查点。在将表空间重新联机之前，您必须对其执行介质恢复。\n\
    \n![Image](img/sq.jpg) **注意**  当数据库打开时，不能将 `SYSTEM` 或 `UNDO` 表空间脱机。\n\n您也可以使用\
    \ `ALTER DATABASE DATAFILE` 语句将数据文件脱机。如果您的数据库已打开供使用，则它必须处于归档日志模式，才能使用 `ALTER DATABASE\
    \ DATAFILE` 语句将数据文件脱机。如果您尝试使用 `ALTER DATABASE DATAFILE` 语句将数据文件脱机，而您的数据库不在归档日志模式，则会抛出\
    \ `ORA-01145` 错误。\n\n如果您的数据库不在归档日志模式，则在将数据文件脱机时必须指定 `ALTER DATABASE DATAFILE ...\
    \ OFFLINE FOR DROP`。您可以指定完整的文件名或提供文件编号。在此示例中，数据文件 4 被脱机：\n\n```\nSQL> alter database\
    \ datafile 4 offline for drop;\n```\n\n现在，如果您尝试将脱机的数据文件联机，会收到以下错误：\n\n```\nSQL>\
    \ alter database datafile 4 online;\nORA-01113: file 4 needs media recovery\n\
    ```\n\n当您使用 `OFFLINE FOR DROP` 子句时，不会对数据文件执行检查点。这意味着在将数据文件联机之前，您需要对其执行介质恢复。执行介质恢复会将在线重做日志中记录但数据文件本身没有的所有更改应用到数据文件。在您可以将使用\
    \ `OFFLINE FOR DROP` 子句脱机的数据文件联机之前，必须对其执行介质恢复。您可以指定完整的文件名或文件编号：\n\n```\nSQL> recover\
    \ datafile 4;\n```\n\n如果 Oracle 所需的重做信息包含在在线重做日志中，您应该会看到此消息：\n\n```\nMedia recovery\
    \ complete.\n```\n\n如果您的数据库不在归档日志模式，并且如果 Oracle 需要包含在在线重做日志之外的重做信息来恢复数据文件，那么您将无法恢复该数据文件并将其放回联机状态。\n\
    \n如果您的数据库处于归档日志模式，您可以在不带 `FOR DROP` 子句的情况下将其脱机。在这种情况下，Oracle 会忽略 `FOR DROP` 子句。即使您的数据库处于归档日志模式，对于已使用\
    \ `ALTER DATABASE DATAFILE` 语句脱机的数据文件，您仍需要执行介质恢复。表 2-4 总结了在将表空间/数据文件脱机时必须考虑的选项。\n\
    \n表 2-4. 将表空间/数据文件脱机的选项\n\n![Table2-4.jpg](img/Table2-4.jpg)\n\n![Image](img/sq.jpg)\
    \ **注意**  当数据库处于装载模式（且未打开）时，您可以使用 `ALTER DATABASE DATAFILE` 命令将任何数据文件脱机，包括 `SYSTEM`\
    \ 和 `UNDO`。\n\n## 重命名或重新定位数据文件\n\n您可能偶尔需要移动或重命名数据文件。例如，您可能因为存储设备的变更，或者因为文件是在错误的位置创建的或使用了非标准名称而需要移动数据文件。自\
    \ Oracle 12c 起，您可以选择在数据文件联机时重命名或移动数据文件，或两者同时进行。否则，您将不得不为了维护操作而将数据文件脱机。\n\n###\
    \ 执行联机数据文件操作\n\n从 Oracle 12c 开始，引入了 `ALTER DATABASE MOVE DATAFILE` 命令。此命令允许您在不产生任何停机时间的情况下重命名或移动数据文件。这极大地简化了移动或重命名数据文件的任务，因为无需手动将数据文件脱机/联机，也无需使用操作系统命令来物理移动文件。这个曾经手动密集（且容易出错）的操作，现在已简化为单个\
    \ SQL 命令。\n\n数据文件必须处于联机状态，联机移动或重命名才能生效。以下是一个重命名联机数据文件的示例：\n\n```\nSQL> alter database\
    \ move datafile '/u01/dbfile/O12C/users01.dbf' to\n     '/u01/dbfile/O12C/users_dev01.dbf';\n\
    ```\n\n以下是一个将数据文件移动到新挂载点的示例：\n"
- fmt: "# Oracle数据文件移动操作指南\n\n在Oracle数据库管理中，移动数据文件是一项常见操作。以下将介绍在线和离线移动数据文件的方法。\n\n\
    ## 在线操作\n\n可以直接使用 `ALTER DATABASE MOVE DATAFILE` 命令来移动或重命名数据文件。\n\n例如，将数据文件移动到新位置：\n\
    ```sql\nSQL> alter database move datafile '/u01/dbfile/O12C/system01.dbf' to\n\
    \    '/u02/dbfile/O12C/system01.dbf';\n```\n\n也可以通过文件编号来指定要移动的数据文件：\n```sql\n\
    SQL> alter database move datafile 2 to '/u02/dbfile/O12C/sysuax01.dbf';\n```\n\
    \n在上面的例子中，指定移动数据文件 `2`。\n\n如果想在移动数据文件时保留原始文件的副本，可以使用 `KEEP` 选项：\n```sql\nSQL>\
    \ alter database move datafile 4 to '/u02/dbfile/O12C/users01.dbf' keep;\n```\n\
    \n使用 `REUSE` 子句可以覆盖已存在的文件：\n```sql\nSQL> alter database move datafile 4 to '/u01/dbfile/O12C/users01.dbf'\
    \ reuse;\n```\n\nOracle不允许覆盖（重用）数据库当前正在使用的数据文件。这是一项安全措施。\n\n## 离线操作\n\n如果使用的是\
    \ Oracle 11g 或更低版本，在重命名或移动数据文件之前，必须先将其下线。移动和重命名离线数据文件有两种不同的方法：\n\n*   结合使用 SQL\
    \ 命令和操作系统命令。\n*   结合使用重建控制文件和操作系统命令。\n\n这两种技术将在接下来的两节中讨论。\n\n### 使用 SQL 和操作系统命令\n\
    \n以下是使用 SQL 命令和操作系统命令重命名数据文件的步骤：\n\n1.  使用以下查询确定现有数据文件的名称：\n    ```sql\n    SQL>\
    \ select name from v$datafile;\n    ```\n\n2.  将数据文件下线，使用 `ALTER TABLESPACE` 或\
    \ `ALTER DATABASE DATAFILE` 语句（有关如何执行此操作的详细信息，请参阅前面的“离线数据文件操作”部分）。您也可以关闭数据库，然后以装载模式启动它；在此模式下可以移动数据文件，因为它们没有被打开使用。\n\
    3.  使用操作系统命令（如 `mv` 或 `cp`）或内置 PL/SQL 包 `DBMS_FILE_TRANSFER` 的 `COPY_FILE` 过程，将数据文件物理移动到新位置。\n\
    4.  使用 `ALTER TABLESPACE ... RENAME DATAFILE ... TO` 语句或 `ALTER DATABASE RENAME\
    \ FILE ... TO` 语句，用新的数据文件名更新控制文件。\n5.  将数据文件上线。\n\n> **注意**：如果需要重命名与 `SYSTEM`\
    \ 或 `UNDO` 表空间关联的数据文件，必须关闭数据库并以装载模式启动。当数据库处于装载模式时，可以通过 `ALTER DATABASE RENAME\
    \ FILE` 语句重命名这些数据文件。\n\n以下示例演示了如何移动与单个表空间关联的数据文件。首先，使用 `ALTER TABLESPACE` 语句将数据文件下线：\n\
    ```sql\nSQL> alter tablespace users offline;\n```\n\n现在，在操作系统提示符下，使用 Linux/Unix\
    \ 的 `mv` 命令将数据文件移动到新位置：\n```bash\n$ mv /u01/dbfile/O12C/users01.dbf /u02/dbfile/O12C/users01.dbf\n\
    ```\n\n使用 `ALTER TABLESPACE` 语句更新控制文件：\n```sql\nalter tablespace users\nrename\
    \ datafile\n'/u01/dbfile/O12C/users01.dbf'\nto\n'/u02/dbfile/O12C/users01.dbf';\n\
    ```\n\n最后，将表空间内的数据文件重新上线：\n```sql\nSQL> alter tablespace users online;\n```\n\n\
    如果想在一次操作中重命名多个表空间的数据文件，可以使用 `ALTER DATABASE RENAME FILE` 语句（而不是 `ALTER TABLESPACE...RENAME\
    \ DATAFILE` 语句）。以下示例重命名数据库中的几个数据文件。因为移动的是 `SYSTEM` 和 `UNDO` 表空间的数据文件，所以必须先关闭数据库，然后将其置于装载模式：\n\
    ```sql\nSQL> conn / as sysdba\nSQL> shutdown immediate;\nSQL> startup mount;\n\
    ```\n\n由于数据库处于装载模式，数据文件没有打开使用，因此无需将它们下线。接下来，通过 Linux/Unix 的 `mv` 命令物理移动文件：\n```bash\n\
    $ mv /u01/dbfile/O12C/system01.dbf /u02/dbfile/O12C/system01.dbf\n$ mv /u01/dbfile/O12C/sysaux01.dbf\
    \ /u02/dbfile/O12C/sysaux01.dbf\n$ mv /u01/dbfile/O12C/undotbs01.dbf /u02/dbfile/O12C/undotbs01.dbf\n\
    ```\n\n> **注意**：必须在更新控制文件之前移动文件。`ALTER DATABASE RENAME FILE` 命令期望文件已处于重命名后的位置。如果文件不在那里，将抛出错误：`ORA-27037:\
    \ unable to obtain file status`。\n\n现在，可以更新控制文件以使其知晓新的文件名：\n```sql\nalter database\
    \ rename file\n'/u01/dbfile/O12C/system01.dbf',\n'/u01/dbfile/O12C/sysaux01.dbf',\n\
    '/u01/dbfile/O12C/undotbs01.dbf'\nto\n'/u02/dbfile/O12C/system01.dbf',\n'/u02/dbfile/O12C/sysaux01.dbf',\n\
    '/u02/dbfile/O12C/undotbs01.dbf';\n```\n\n此时，您应该可以打开数据库：\n```sql\nSQL> alter database\
    \ open;\n```\n\n### 重建控制文件和操作系统命令\n\n重新定位数据库中所有数据文件的另一种方法是结合使用重建控制文件和操作系统命令。此操作的步骤如下：\n\
    \n1.  创建一个包含 `CREATE CONTROLFILE` 语句的跟踪文件。\n2.  修改跟踪文件以显示数据文件的新位置。\n3.  关闭数据库。\n\
    4.  使用操作系统命令物理移动数据文件。\n5.  以 `NOMOUNT` 模式启动数据库。\n6.  运行 `CREATE CONTROLFILE` 命令。\n\
    \n> **注意**：重建控制文件时，请注意文件中包含的任何 RMAN 信息将会丢失。如果您没有使用恢复目录，可以使用 RMAN 的 `CATALOG` 命令将\
    \ RMAN 备份信息重新填充到控制文件中。\n\n以下示例逐步执行上述步骤。首先，通过 `ALTER DATABASE BACKUP CONTROLFILE\
    \ TO TRACE` 语句将 `CREATE CONTROLFILE` 语句写入跟踪文件：\n```sql\nSQL> alter database backup\
    \ controlfile to trace as '/tmp/mv.sql' noresetlogs;\n```\n\n关于前面的语句有几点需要注意。首先，在\
    \ `/tmp` 目录下创建了一个名为 `mv.sql` 的文件；该文件包含一个 `CREATE CONTROLFILE` 语句。其次，前面的语句使用了 `NORESETLOGS`\
    \ 子句；这指示 Oracle 只向跟踪文件写入一个 SQL 语句。如果未指定 `NORESETLOGS`，Oracle 会向跟踪文件写入两个 SQL 语句：一个使用\
    \ `NORESETLOGS` 选项重建控制文件，另一个使用 `RESETLOGS` 选项重建控制文件。通常，您会知道是否要在重建控制文件时重置联机重做日志。在这个例子中，您知道在重建控制文件时不需要重置联机重做日志（因为联机重做日志没有损坏，并且仍在数据库的正常位置）。\n\
    \n接下来，编辑 `/tmp/mv.sql` 文件，将目录路径的名称更改为新位置。以下是此示例的 `CREATE CONTROLFILE` 语句：\n```sql\n\
    CREATE CONTROLFILE REUSE DATABASE \"O12C\" NORESETLOGS  NOARCHIVELOG\n    MAXLOGFILES\
    \ 16\n    MAXLOGMEMBERS 4\n    MAXDATAFILES 1024\n    MAXINSTANCES 1\n    MAXLOGHISTORY\
    \ 876\nLOGFILE\n  GROUP 1 (\n    '/u01/oraredo/O12C/redo01a.rdo',\n    '/u02/oraredo/O12C/redo01b.rdo'\n\
    \  ) SIZE 50M BLOCKSIZE 512,\n  GROUP 2 (\n    '/u01/oraredo/O12C/redo02a.rdo',\n\
    \    '/u02/oraredo/O12C/redo02b.rdo'\n  ) SIZE 50M BLOCKSIZE 512,\n  GROUP 3 (\n\
    \    '/u01/oraredo/O12C/redo03a.rdo',\n    '/u02/oraredo/O12C/redo03b.rdo'\n \
    \ ) SIZE 50M BLOCKSIZE 512\nDATAFILE\n  '/u01/dbfile/O12C/system01.dbf',\n  '/u01/dbfile/O12C/sysaux01.dbf',\n\
    \  '/u01/dbfile/O12C/undotbs01.dbf',\n  '/u01/dbfile/O12C/users01.dbf'\nCHARACTER\
    \ SET AL32UTF8;\n```\n\n现在，关闭数据库：\n```sql\nSQL> shutdown immediate;\n```\n\n在操作系统提示符下物理移动文件。此示例使用\
    \ Linux/Unix 的 `mv` 命令移动文件。"
  raw: "```\nSQL> alter database move datafile '/u01/dbfile/O12C/system01.dbf' to\n\
        '/u02/dbfile/O12C/system01.dbf';\n```\n\nYou can also specify the data file\
    \ number when renaming or moving a data file; for example,\n\n```\nSQL> alter\
    \ database move datafile 2 to '/u02/dbfile/O12C/sysuax01.dbf';\n```\n\nIn the\
    \ previous example, you are specifying that data file 2 be moved.\n\nIf you’re\
    \ moving a data file and, for any reason, want to keep a copy of the original\
    \ file, you can use the `KEEP` option:\n\n```\nSQL> alter database move datafile\
    \ 4 to '/u02/dbfile/O12C/users01.dbf' keep;\n```\n\nYou can specify the `REUSE`\
    \ clause to overwrite an existing file:\n\n```\nSQL> alter database move datafile\
    \ 4 to '/u01/dbfile/O12C/users01.dbf' reuse;\n```\n\nOracle will not allow you\
    \ to overwrite (reuse) a data file that is currently being used by the database.\
    \ That’s a good thing.\n\nPerforming Offline Data File Operations\n\nIf you are\
    \ using Oracle 11g or lower, before you rename or move a data file, you must take\
    \ the data file offline. There are two somewhat different approaches to moving\
    \ and renaming offline data files:\n\n*   Use a combination of SQL commands and\
    \ OS commands.\n*   Use a combination of re-creating the control file and OS commands.\n\
    \nThese two techniques are discussed in the next two sections.\n\nUsing SQL and\
    \ OS Commands\n\nHere are the steps for renaming a data file using SQL commands\
    \ and OS commands:\n\n1.  Use the following query to determine the names of existing\
    \ data files:\n\n```\n    SQL> select name from v$datafile;\n    ```\n\n2.  Take\
    \ the data file offline, using either the `ALTER TABLESPACE` or `ALTER DATABASE\
    \ DATAFILE` statement (see the previous section, “Performing Offline Data File\
    \ Operations,” for details on how to do this). You can also shut down your database\
    \ and then start it in mount mode; the data files can be moved while in this mode\
    \ because they aren’t open for use.\n3.  Physically move the data file to the\
    \ new location, using either an OS command (like `mv` or `cp`) or the `COPY_FILE`\
    \ procedure of the `DBMS_FILE_TRANSFER` built-in PL/SQL package.\n4.  Use either\
    \ the `ALTER TABLESPACE ... RENAME DATAFILE ... TO` statement or the `ALTER DATABASE\
    \ RENAME FILE ... TO` statement to update the control file with the new data file\
    \ name.\n5.  Alter the data file online.\n\n![Image](images/sq.jpg) **Note**  If\
    \ you need to rename data files associated with the `SYSTEM` or `UNDO` tablespace,\
    \ you must shut down your database and start it in mount mode. When your database\
    \ is in mount mode, you can rename these data files via the `ALTER DATABASE RENAME\
    \ FILE` statement.\n\nThe following example demonstrates how to move the data\
    \ files associated with a single tablespace. First, take the data files offline\
    \ with the `ALTER TABLESPACE` statement:\n\n```\nSQL> alter tablespace users offline;\n\
    ```\n\nNow, from the OS prompt, move the data files to a new location, using the\
    \ Linux/Unix `mv` command:\n\n```\n$ mv /u01/dbfile/O12C/users01.dbf /u02/dbfile/O12C/users01.dbf\n\
    ```\n\nUpdate the control file with the `ALTER TABLESPACE` statement:\n\n```\n\
    alter tablespace users\nrename datafile\n'/u01/dbfile/O12C/users01.dbf'\nto\n\
    '/u02/dbfile/O12C/users01.dbf';\n```\n\nFinally, bring the data files within the\
    \ tablespace back online:\n\n```\nSQL> alter tablespace users online;\n```\n\n\
    If you want to rename data files from multiple tablespaces in one operation, you\
    \ can use the `ALTER DATABASE RENAME FILE` statement (instead of the `ALTER TABLESPACE...RENAME\
    \ DATAFILE` statement). The following example renames several data files in the\
    \ database. Because the `SYSTEM` and `UNDO` tablespaces’ data files are being\
    \ moved, you must shut down the database first and then place it in mount mode:\n\
    \n```\nSQL> conn / as sysdba\nSQL> shutdown immediate;\nSQL> startup mount;\n\
    ```\n\nBecause the database is in mount mode, the data files aren’t open for use,\
    \ and thus there is no need to take the data files offline. Next, physically move\
    \ the files via the Linux/Unix `mv` command:\n\n```\n$ mv /u01/dbfile/O12C/system01.dbf\
    \ /u02/dbfile/O12C/system01.dbf\n$ mv /u01/dbfile/O12C/sysaux01.dbf /u02/dbfile/O12C/sysaux01.dbf\n\
    $ mv /u01/dbfile/O12C/undotbs01.dbf /u02/dbfile/O12C/undotbs01.dbf\n```\n\n![Image](images/sq.jpg) **Note**  You\
    \ must move the files before you update the control file. The `ALTER DATABASE\
    \ RENAME FILE` command expects the file to be in the renamed location. If the\
    \ file isn’t there, an error is thrown: `ORA-27037: unable to obtain file status`.\n\
    \nNow, you can update the control file to be aware of the new file name:\n\n```\n\
    alter database rename file\n'/u01/dbfile/O12C/system01.dbf',\n'/u01/dbfile/O12C/sysaux01.dbf',\n\
    '/u01/dbfile/O12C/undotbs01.dbf'\nto\n'/u02/dbfile/O12C/system01.dbf',\n'/u02/dbfile/O12C/sysaux01.dbf',\n\
    '/u02/dbfile/O12C/undotbs01.dbf';\n```\n\nYou should be able to open your database:\n\
    \n```\nSQL> alter database open;\n```\n\nRe-Creating the Control File and OS Commands\n\
    \nAnother way you can relocate all data files in a database is to use a combination\
    \ of a re-created control file and OS commands. The steps for this operation are\
    \ as follows:\n\n1.  Create a trace file that contains a `CREATE CONTROLFILE`\
    \ statement.\n2.  Modify the trace file to display the new location of the data\
    \ files.\n3.  Shut down the database.\n4.  Physically move the data files, using\
    \ an OS command.\n5.  Start the database in nomount mode.\n6.  Run the `CREATE\
    \ CONTROLFILE` command.\n\n![Image](images/sq.jpg) **Note**  When you re-create\
    \ a control file, be aware that any RMAN information that was contained in the\
    \ file will be lost. If you’re not using a recovery catalog, you can repopulate\
    \ the control file with RMAN backup information, using the RMAN `CATALOG` command.\n\
    \nThe following example walks through the previous steps. First, you write a `CREATE\
    \ CONTROLFILE` statement to a trace file via an `ALTER DATABASE BACKUP CONTROLFILE\
    \ TO TRACE` statement:\n\n```\nSQL> alter database backup controlfile to trace\
    \ as '/tmp/mv.sql' noresetlogs;\n```\n\nThere are a couple of items to note about\
    \ the prior statement. First, a file named `mv.sql` is created in the `/tmp` directory;\
    \ this file contains a `CREATE CONTROLFILE` statement. Second, the prior statement\
    \ uses the `NORESETLOGS` clause; this instructs Oracle to write only one SQL statement\
    \ to the trace file. If you don’t specify `NORESETLOGS`, Oracle writes two SQL\
    \ statements to the trace file: one to re-create the control file with the `NORESETLOGS`\
    \ option and one to re-create the control file with `RESETLOGS`. Normally, you\
    \ know whether you want to reset the online redo logs as part of re-creating the\
    \ control file. In this case, you know that you don’t need to reset the online\
    \ redo logs when you re-create the control file (because the online redo logs\
    \ haven’t been damaged and are still in the normal location for the database).\n\
    \nNext, edit the `/tmp/mv.sql` file, and change the names of the directory paths\
    \ to the new locations. Here is a `CREATE CONTROLFILE` statement for this example:\n\
    \n```\nCREATE CONTROLFILE REUSE DATABASE \"O12C\" NORESETLOGS  NOARCHIVELOG\n\
        MAXLOGFILES 16\n    MAXLOGMEMBERS 4\n    MAXDATAFILES 1024\n    MAXINSTANCES\
    \ 1\n    MAXLOGHISTORY 876\nLOGFILE\n  GROUP 1 (\n    '/u01/oraredo/O12C/redo01a.rdo',\n\
        '/u02/oraredo/O12C/redo01b.rdo'\n  ) SIZE 50M BLOCKSIZE 512,\n  GROUP 2 (\n\
        '/u01/oraredo/O12C/redo02a.rdo',\n    '/u02/oraredo/O12C/redo02b.rdo'\n  )\
    \ SIZE 50M BLOCKSIZE 512,\n  GROUP 3 (\n    '/u01/oraredo/O12C/redo03a.rdo',\n\
        '/u02/oraredo/O12C/redo03b.rdo'\n  ) SIZE 50M BLOCKSIZE 512\nDATAFILE\n  '/u01/dbfile/O12C/system01.dbf',\n\
      '/u01/dbfile/O12C/sysaux01.dbf',\n  '/u01/dbfile/O12C/undotbs01.dbf',\n  '/u01/dbfile/O12C/users01.dbf'\n\
    CHARACTER SET AL32UTF8;\n```\n\nNow, shut down the database:\n\n```\nSQL> shutdown\
    \ immediate;\n```\n\nPhysically move the files from the OS prompt. This example\
    \ uses the Linux/Unix `mv` command to move the files:"
  trans: "# Oracle 数据文件移动操作指南\n\n在 Oracle 数据库管理中，移动数据文件是一项常见操作。以下将介绍在线和离线移动数据文件的方法。\n\
    \n## 在线操作\n\n可以直接使用 `ALTER DATABASE MOVE DATAFILE` 命令来移动或重命名数据文件。\n\n例如，将数据文件移动到新位置：\n\
    ```sql\nSQL> alter database move datafile '/u01/dbfile/O12C/system01.dbf' to\n\
    \    '/u02/dbfile/O12C/system01.dbf';\n```\n\n也可以通过文件编号来指定要移动的数据文件：\n```sql\n\
    SQL> alter database move datafile 2 to '/u02/dbfile/O12C/sysuax01.dbf';\n```\n\
    \n在上面的例子中，指定移动数据文件 `2`。\n\n如果想在移动数据文件时保留原始文件的副本，可以使用 `KEEP` 选项：\n```sql\nSQL>\
    \ alter database move datafile 4 to '/u02/dbfile/O12C/users01.dbf' keep;\n```\n\
    \n使用 `REUSE` 子句可以覆盖已存在的文件：\n```sql\nSQL> alter database move datafile 4 to '/u01/dbfile/O12C/users01.dbf'\
    \ reuse;\n```\n\nOracle 不允许覆盖（重用）数据库当前正在使用的数据文件。这是一项安全措施。\n\n## 离线操作\n\n如果使用的是\
    \ Oracle 11g 或更低版本，在重命名或移动数据文件之前，必须先将其下线。移动和重命名离线数据文件有两种不同的方法：\n\n*   结合使用 SQL\
    \ 命令和操作系统命令。\n*   结合使用重建控制文件和操作系统命令。\n\n这两种技术将在接下来的两节中讨论。\n\n### 使用 SQL 和操作系统命令\n\
    \n以下是使用 SQL 命令和操作系统命令重命名数据文件的步骤：\n\n1.  使用以下查询确定现有数据文件的名称：\n    ```sql\n    SQL>\
    \ select name from v$datafile;\n    ```\n\n2.  将数据文件下线，使用 `ALTER TABLESPACE` 或\
    \ `ALTER DATABASE DATAFILE` 语句（有关如何执行此操作的详细信息，请参阅前面的“离线数据文件操作”部分）。您也可以关闭数据库，然后以装载模式启动它；在此模式下可以移动数据文件，因为它们没有被打开使用。\n\
    3.  使用操作系统命令（如 `mv` 或 `cp`）或内置 PL/SQL 包 `DBMS_FILE_TRANSFER` 的 `COPY_FILE` 过程，将数据文件物理移动到新位置。\n\
    4.  使用 `ALTER TABLESPACE ... RENAME DATAFILE ... TO` 语句或 `ALTER DATABASE RENAME\
    \ FILE ... TO` 语句，用新的数据文件名更新控制文件。\n5.  将数据文件上线。\n\n> **注意**：如果需要重命名与 `SYSTEM`\
    \ 或 `UNDO` 表空间关联的数据文件，必须关闭数据库并以装载模式启动。当数据库处于装载模式时，可以通过 `ALTER DATABASE RENAME\
    \ FILE` 语句重命名这些数据文件。\n\n以下示例演示了如何移动与单个表空间关联的数据文件。首先，使用 `ALTER TABLESPACE` 语句将数据文件下线：\n\
    ```sql\nSQL> alter tablespace users offline;\n```\n\n现在，在操作系统提示符下，使用 Linux/Unix\
    \ 的 `mv` 命令将数据文件移动到新位置：\n```bash\n$ mv /u01/dbfile/O12C/users01.dbf /u02/dbfile/O12C/users01.dbf\n\
    ```\n\n使用 `ALTER TABLESPACE` 语句更新控制文件：\n```sql\nalter tablespace users\nrename\
    \ datafile\n'/u01/dbfile/O12C/users01.dbf'\nto\n'/u02/dbfile/O12C/users01.dbf';\n\
    ```\n\n最后，将表空间内的数据文件重新上线：\n```sql\nSQL> alter tablespace users online;\n```\n\n\
    如果想在一次操作中重命名多个表空间的数据文件，可以使用 `ALTER DATABASE RENAME FILE` 语句（而不是 `ALTER TABLESPACE...RENAME\
    \ DATAFILE` 语句）。以下示例重命名数据库中的几个数据文件。因为移动的是 `SYSTEM` 和 `UNDO` 表空间的数据文件，所以必须先关闭数据库，然后将其置于装载模式：\n\
    ```sql\nSQL> conn / as sysdba\nSQL> shutdown immediate;\nSQL> startup mount;\n\
    ```\n\n由于数据库处于装载模式，数据文件没有打开使用，因此无需将它们下线。接下来，通过 Linux/Unix 的 `mv` 命令物理移动文件：\n```bash\n\
    $ mv /u01/dbfile/O12C/system01.dbf /u02/dbfile/O12C/system01.dbf\n$ mv /u01/dbfile/O12C/sysaux01.dbf\
    \ /u02/dbfile/O12C/sysaux01.dbf\n$ mv /u01/dbfile/O12C/undotbs01.dbf /u02/dbfile/O12C/undotbs01.dbf\n\
    ```\n\n> **注意**：必须在更新控制文件之前移动文件。`ALTER DATABASE RENAME FILE` 命令期望文件已处于重命名后的位置。如果文件不在那里，将抛出错误：`ORA-27037:\
    \ unable to obtain file status`。\n\n现在，可以更新控制文件以使其知晓新的文件名：\n```sql\nalter database\
    \ rename file\n'/u01/dbfile/O12C/system01.dbf',\n'/u01/dbfile/O12C/sysaux01.dbf',\n\
    '/u01/dbfile/O12C/undotbs01.dbf'\nto\n'/u02/dbfile/O12C/system01.dbf',\n'/u02/dbfile/O12C/sysaux01.dbf',\n\
    '/u02/dbfile/O12C/undotbs01.dbf';\n```\n\n此时，您应该可以打开数据库：\n```sql\nSQL> alter database\
    \ open;\n```\n\n### 重建控制文件和操作系统命令\n\n重新定位数据库中所有数据文件的另一种方法是结合使用重建控制文件和操作系统命令。此操作的步骤如下：\n\
    \n1.  创建一个包含 `CREATE CONTROLFILE` 语句的跟踪文件。\n2.  修改跟踪文件以显示数据文件的新位置。\n3.  关闭数据库。\n\
    4.  使用操作系统命令物理移动数据文件。\n5.  以 `NOMOUNT` 模式启动数据库。\n6.  运行 `CREATE CONTROLFILE` 命令。\n\
    \n> **注意**：重建控制文件时，请注意文件中包含的任何 RMAN 信息将会丢失。如果您没有使用恢复目录，可以使用 RMAN 的 `CATALOG` 命令将\
    \ RMAN 备份信息重新填充到控制文件中。\n\n以下示例逐步执行上述步骤。首先，通过 `ALTER DATABASE BACKUP CONTROLFILE\
    \ TO TRACE` 语句将 `CREATE CONTROLFILE` 语句写入跟踪文件：\n```sql\nSQL> alter database backup\
    \ controlfile to trace as '/tmp/mv.sql' noresetlogs;\n```\n\n关于前面的语句有几点需要注意。首先，在\
    \ `/tmp` 目录下创建了一个名为 `mv.sql` 的文件；该文件包含一个 `CREATE CONTROLFILE` 语句。其次，前面的语句使用了 `NORESETLOGS`\
    \ 子句；这指示 Oracle 只向跟踪文件写入一个 SQL 语句。如果未指定 `NORESETLOGS`，Oracle 会向跟踪文件写入两个 SQL 语句：一个使用\
    \ `NORESETLOGS` 选项重建控制文件，另一个使用 `RESETLOGS` 选项重建控制文件。通常，您会知道是否要在重建控制文件时重置联机重做日志。在这个例子中，您知道在重建控制文件时不需要重置联机重做日志（因为联机重做日志没有损坏，并且仍在数据库的正常位置）。\n\
    \n接下来，编辑 `/tmp/mv.sql` 文件，将目录路径的名称更改为新位置。以下是此示例的 `CREATE CONTROLFILE` 语句：\n```sql\n\
    CREATE CONTROLFILE REUSE DATABASE \"O12C\" NORESETLOGS  NOARCHIVELOG\n    MAXLOGFILES\
    \ 16\n    MAXLOGMEMBERS 4\n    MAXDATAFILES 1024\n    MAXINSTANCES 1\n    MAXLOGHISTORY\
    \ 876\nLOGFILE\n  GROUP 1 (\n    '/u01/oraredo/O12C/redo01a.rdo',\n    '/u02/oraredo/O12C/redo01b.rdo'\n\
    \  ) SIZE 50M BLOCKSIZE 512,\n  GROUP 2 (\n    '/u01/oraredo/O12C/redo02a.rdo',\n\
    \    '/u02/oraredo/O12C/redo02b.rdo'\n  ) SIZE 50M BLOCKSIZE 512,\n  GROUP 3 (\n\
    \    '/u01/oraredo/O12C/redo03a.rdo',\n    '/u02/oraredo/O12C/redo03b.rdo'\n \
    \ ) SIZE 50M BLOCKSIZE 512\nDATAFILE\n  '/u01/dbfile/O12C/system01.dbf',\n  '/u01/dbfile/O12C/sysaux01.dbf',\n\
    \  '/u01/dbfile/O12C/undotbs01.dbf',\n  '/u01/dbfile/O12C/users01.dbf'\nCHARACTER\
    \ SET AL32UTF8;\n```\n\n现在，关闭数据库：\n```sql\nSQL> shutdown immediate;\n```\n\n在操作系统提示符下物理移动文件。此示例使用\
    \ Linux/Unix 的 `mv` 命令移动文件。"
- fmt: '# CHAPTER 3

    ## User-Managed Backup and Recovery


    All DBAs should know how to back up a database. Even more critical, a DBA must
    be able to restore and recover a database. When media failures occur, everybody
    looks to the DBA to get the database up and running. There are two common, yet
    very different, Oracle approaches for backup and recovery:


    - User-managed approach

    - RMAN approach


    User-managed backups are aptly named because you manually perform all steps associated
    with the backup or recovery, or both. There are two types of user-managed backups:
    cold backups and hot backups. Cold backups are sometimes called offline backups
    because the database is shut down during the backup process. Hot backups are also
    referred to as online backups because the database is available during the backup
    procedure.


    RMAN is Oracle’s flagship backup and recovery tool. It automates and manages most
    aspects of backup and recovery. For Oracle backup and recovery, you should use
    RMAN. So, why have a chapter about user-managed backups when this approach has
    been gathering dust for more than a decade? Consider the following reasons for
    understanding user-managed backup and recovery:


    - You still find shops using user-managed backup and recovery techniques. Therefore,
    you’re required to be knowledgeable about this technology.

    - Manually executing a user-managed backup, restore, and recovery solidifies your
    understanding of the Oracle backup and recovery architecture. This helps immensely
    when you’re troubleshooting issues with any backup and recovery tool and lays
    the foundation of core knowledge for key Oracle tools, such as `RMAN` and `Data
    Guard`.

    - You’ll more fully appreciate `RMAN` and the value of its features.

    - Nightmarish database recovery stories recounted by the old DBAs will now make
    sense.


    For these reasons, you should be familiar with user-managed backup and recovery
    techniques. Manually working through the scenarios in this chapter will greatly
    increase your understanding of which files are backed up and how they’re used
    in a recovery. You’ll be much better prepared to use `RMAN`. `RMAN` makes much
    of backup and recovery automated and push-button. However, knowledge of how to
    back up and recover a database manually helps you think through and troubleshoot
    issues with any type of backup technology.


    This chapter begins with cold backups. These types of backups are viewed as the
    simplest form of user-managed backup because even a system administrator can implement
    them. Next, the chapter discusses hot backups. You also investigate several common
    restore-and-recovery scenarios. These examples build your base knowledge of Oracle
    backup and recovery internals.


    ![Image](images/sq.jpg) `Tip` In Oracle 12c, you can perform user-managed hot
    backups and cold backups on pluggable databases; the user-managed backup and recovery
    technology works fine. However, I would strongly recommend that you use `RMAN`
    to manage backup and recovery in a pluggable environment. When connected to either
    the root container or a pluggable container, `RMAN` automatically determines which
    data files need to be backed up, their locations, and how to restore and recover.
    This task quickly becomes unwieldy for user-managed backups, in which the DBA
    has to manage this information for the root container and, potentially, numerous
    pluggable databases.


    ## Implementing a Cold-Backup Strategy for a Noarchivelog Mode Database


    You perform a user-managed cold backup by copying files after the database has
    been shut down. This type of backup is also known as an offline backup. Your database
    can be in either `noarchivelog` mode or `archivelog` mode when you make a cold
    backup.


    DBAs tend to think of a cold backup as being synonymous with a backup of a database
    in `noarchivelog` mode. That isn’t correct. You can make a cold backup of a database
    in `archivelog` mode, and that’s a backup strategy that many shops employ. The
    differences between a cold backup with the database in `noarchivelog` mode and
    in `archivelog` mode are detailed in the following sections.


    ## Making a Cold Backup of a Noarchivelog Mode Database


    One main reason for making a cold backup of a database in `noarchivelog` mode
    is to give you a way to restore a database back to a point in time in the past.
    You should use this type of backup only if you don’t need to recover transactions
    that occurred after the backup. This type of backup and recovery strategy is acceptable
    only if your business requirements allow for the loss of data and downtime. Rarely
    would you ever implement this type of backup and recovery solution for a production
    business database.


    ```

    $ mv /u02/dbfile/O12C/system01.dbf /u01/dbfile/O12C/system01.dbf

    $ mv /u02/dbfile/O12C/sysaux01.dbf /u01/dbfile/O12C/sysaux01.dbf

    $ mv /u02/dbfile/O12C/undotbs01.dbf /u01/dbfile/O12C/undotbs01.dbf

    $ mv /u02/dbfile/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf

    ```


    Start up the database in `nomount` mode:


    ```

    SQL> startup nomount;

    ```


    Then, execute the file that contains the `CREATE CONTROLFILE` statement (in this
    example, `mv.sql`):


    ```

    SQL> @/tmp/mv.sql

    ```


    If the statement is successful, you see the following message:


    ```

    Control file created.

    ```


    Finally, alter your database open:


    ```

    SQL> alter database open;

    ```


    ## Summary


    This chapter described how to configure and manage control files, online redo
    log files, enable archiving, and managing tablespaces and data files. Control
    files, online redo logs, and data files are critical database files; a normally
    operating database can’t function without them.


    Control files are small binary files that contain information about the structure
    of the database. Any control files specified in the parameter file must be available
    in order for you to mount the database. If a control file becomes unavailable,
    then your database will cease operating until you resolve the issue. I highly
    recommend that you configure your database with at least three control files.
    If one control file becomes unavailable, you can replace it with a copy of a good
    existing control file. It’s critical that you know how to configure, add, and
    remove these files.


    Online redo logs are crucial files that record the database’s transaction history.
    If you have multiple instances connected to one database, then each instance generates
    its own redo thread. Each database must be created with two or more online redo
    log groups. You can operate a database with each group’s having just one online
    redo log member. However, I highly recommend that you create your online redo
    log groups with two members in each group. If an online redo log has at least
    one member that can be written to, your database will continue to function. If
    all members of an online redo log group are unavailable, then your database will
    cease to operate. As a DBA you must be extremely proficient in creating, adding,
    moving, and dropping these critical database files.


    Archiving is the mechanism for ensuring you have all the transactions required
    to recover the database. Once enabled, the archiver needs to successfully copy
    the online redo log after a log switch occurs. If the archiver can’t write to
    the primary archive destination, then your database will hang. Therefore, you
    need to map out carefully the amount of disk space required and how often to back
    up and subsequently remove these files.


    Tablespaces and data files are where your data is stored. These typically make
    up the bulk of any backup and recovery operation. Therefore it’s critical that
    you understand how to work with and manage data files.


    The chapters up to this point in the book have covered tasks connecting to Oracle,
    performing routine DBA tasks, and managing critical files. The next several chapters
    concentrate backup and recovery operations.


    ![image](images/frontdot.jpg)'
  raw: '```

    $ mv /u02/dbfile/O12C/system01.dbf /u01/dbfile/O12C/system01.dbf

    $ mv /u02/dbfile/O12C/sysaux01.dbf /u01/dbfile/O12C/sysaux01.dbf

    $ mv /u02/dbfile/O12C/undotbs01.dbf /u01/dbfile/O12C/undotbs01.dbf

    $ mv /u02/dbfile/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf

    ```


    Start up the database in nomount mode:


    ```

    SQL> startup nomount;

    ```


    Then, execute the file that contains the `CREATE CONTROLFILE` statement (in this
    example, `mv.sql`):


    ```

    SQL> @/tmp/mv.sql

    ```


    If the statement is successful, you see the following message:


    ```

    Control file created.

    ```


    Finally, alter your database open:


    ```

    SQL> alter database open;

    ```


    Summary


    This chapter described how to configure and manage control files, online redo
    log files, enable archiving, and managing tablespaces and data files. Control
    files, online redo logs, and data files are critical database files; a normally
    operating database can’t function without them.


    Control files are small binary files that contain information about the structure
    of the database. Any control files specified in the parameter file must be available
    in order for you to mount the database. If a control file becomes unavailable,
    then your database will cease operating until you resolve the issue. I highly
    recommend that you configure your database with at least three control files.
    If one control file becomes unavailable, you can replace it with a copy of a good
    existing control file. It’s critical that you know how to configure, add, and
    remove these files.


    Online redo logs are crucial files that record the database’s transaction history.
    If you have multiple instances connected to one database, then each instance generates
    its own redo thread. Each database must be created with two or more online redo
    log groups. You can operate a database with each group’s having just one online
    redo log member. However, I highly recommend that you create your online redo
    log groups with two members in each group. If an online redo log has at least
    one member that can be written to, your database will continue to function. If
    all members of an online redo log group are unavailable, then your database will
    cease to operate. As a DBA you must be extremely proficient in creating, adding,
    moving, and dropping these critical database files.


    Archiving is the mechanism for ensuring you have all the transactions required
    to recover the database. Once enabled, the archiver needs to successfully copy
    the online redo log after a log switch occurs. If the archiver can’t write to
    the primary archive destination, then your database will hang. Therefore, you
    need to map out carefully the amount of disk space required and how often to back
    up and subsequently remove these files.


    Tablespaces and data files are where your data is stored. These typically make
    up the bulk of any backup and recovery operation. Therefore it’s critical that
    you understand how to work with and manage data files.


    The chapters up to this point in the book have covered tasks connecting to Oracle,
    performing routine DBA tasks, and managing critical files. The next several chapters
    concentrate backup and recovery operations.


    CHAPTER 3


    ![image](images/frontdot.jpg)


    User-Managed Backup and Recovery


    All DBAs should know how to back up a database. Even more critical, a DBA must
    be able to restore and recover a database. When media failures occur, everybody
    looks to the DBA to get the database up and running. There are two common, yet
    very different, Oracle approaches for backup and recovery:


    *   User-managed approach

    *   RMAN approach


    User-managed backups are aptly named because you manually perform all steps associated
    with the backup or recovery, or both. There are two types of user-managed backups:
    cold backups and hot backups. Cold backups are sometimes called offline backups
    because the database is shut down during the backup process. Hot backups are also
    referred to as online backups because the database is available during the backup
    procedure.


    RMAN is Oracle’s flagship backup and recovery tool. It automates and manages most
    aspects of backup and recovery. For Oracle backup and recovery, you should use
    RMAN. So, why have a chapter about user-managed backups when this approach has
    been gathering dust for more than a decade? Consider the following reasons for
    understanding user-managed backup and recovery:


    *   You still find shops using user-managed backup and recovery techniques. Therefore,
    you’re required to be knowledgeable about this technology.

    *   Manually executing a user-managed backup, restore, and recovery solidifies
    your understanding of the Oracle backup and recovery architecture. This helps
    immensely when you’re troubleshooting issues with any backup and recovery tool
    and lays the foundation of core knowledge for key Oracle tools, such as RMAN and
    Data Guard.

    *   You’ll more fully appreciate RMAN and the value of its features.

    *   Nightmarish database recovery stories recounted by the old DBAs will now make
    sense.


    For these reasons, you should be familiar with user-managed backup and recovery
    techniques. Manually working through the scenarios in this chapter will greatly
    increase your understanding of which files are backed up and how they’re used
    in a recovery. You’ll be much better prepared to use RMAN. RMAN makes much of
    backup and recovery automated and push-button. However, knowledge of how to back
    up and recover a database manually helps you think through and troubleshoot issues
    with any type of backup technology.


    This chapter begins with cold backups. These types of backups are viewed as the
    simplest form of user-managed backup because even a system administrator can implement
    them. Next, the chapter discusses hot backups. You also investigate several common
    restore-and-recovery scenarios. These examples build your base knowledge of Oracle
    backup and recovery internals.


    ![Image](images/sq.jpg) **Tip**  In Oracle 12c, you can perform user-managed hot
    backups and cold backups on pluggable databases; the user-managed backup and recovery
    technology works fine. However, I would strongly recommend that you use RMAN to
    manage backup and recovery in a pluggable environment. When connected to either
    the root container or a pluggable container, RMAN automatically determines which
    data files need to be backed up, their locations, and how to restore and recover.
    This task quickly becomes unwieldy for user-managed backups, in which the DBA
    has to manage this ­information for the root container and, potentially, numerous
    pluggable databases.


    Implementing a Cold-Backup Strategy for a Noarchivelog Mode Database


    You perform a user-managed cold backup by copying files after the database has
    been shut down. This type of backup is also known as an offline backup. Your database
    can be in either noarchivelog mode or archivelog mode when you make a cold backup.


    DBAs tend to think of a cold backup as being synonymous with a backup of a database
    in noarchivelog mode. That isn’t correct. You can make a cold backup of a database
    in archivelog mode, and that’s a backup strategy that many shops employ. The differences
    between a cold backup with the database in noarchivelog mode and in archivelog
    mode are detailed in the following sections.


    Making a Cold Backup of a Noarchivelog Mode Database


    One main reason for making a cold backup of a database in noarchivelog mode is
    to give you a way to restore a database back to a point in time in the past. You
    should use this type of backup only if you don’t need to recover transactions
    that occurred after the backup. This type of backup and recovery strategy is acceptable
    only if your business requirements allow for the loss of data and downtime. Rarely
    would you ever implement this type of backup and recovery solution for a production
    business database.'
  trans: '# 第三章

    ## 用户管理的备份与恢复


    所有数据库管理员（DBA）都应该知道如何备份数据库。更为关键的是，DBA 必须能够恢复和还原数据库。当发生介质故障时，所有人的目光都会投向 DBA，期望他能让数据库重新启动并运行。Oracle
    有两种常见但截然不同的备份与恢复方法：


    -   用户管理的方法

    -   RMAN 方法


    用户管理的备份名副其实，因为与备份或恢复（或两者）相关的所有步骤都由你手动执行。用户管理的备份有两种类型：冷备份和热备份。冷备份有时也称为离线备份，因为在备份过程中数据库会被关闭。热备份也称为在线备份，因为在备份过程中数据库是可用的。


    RMAN 是 Oracle 的旗舰备份与恢复工具。它自动化并管理了备份与恢复的大部分工作。对于 Oracle 的备份与恢复，你应该使用 RMAN。那么，既然这种方法已经尘封了十多年，为什么还要设一章来讲解用户管理的备份呢？请考虑理解用户管理备份与恢复的以下原因：


    -   你仍然会发现有些地方在使用用户管理的备份与恢复技术。因此，你需要通晓这项技术。

    -   手动执行用户管理的备份、还原和恢复操作，能巩固你对 Oracle 备份与恢复架构的理解。这对你使用任何备份与恢复工具进行问题排查时有巨大帮助，并为掌握
    Oracle 关键工具（如 `RMAN` 和 `Data Guard`）的核心知识奠定基础。

    -   你会更充分地领略 `RMAN` 及其功能的价值。

    -   资深 DBA 讲述的那些噩梦般的数据库恢复故事，现在也就有迹可循了。


    基于这些原因，你应该熟悉用户管理的备份与恢复技术。手动演练本章中的场景，将极大地加深你对哪些文件需要备份以及它们如何在恢复中使用的理解。你将能更好地使用 `RMAN`。`RMAN`
    将备份与恢复的大部分工作变得自动化和一键完成。然而，了解如何手动备份和恢复数据库，能帮助你深入思考并排查任何备份技术的问题。


    本章从冷备份开始。这类备份被视为用户管理备份中最简单的形式，因为即使系统管理员也能实现。接着，本章讨论热备份。你还将研究几个常见的还原与恢复场景。这些示例将为你构建关于
    Oracle 备份与恢复内部机制的基础知识。


    ![图片](img/sq.jpg) `提示` 在 Oracle 12c 中，你可以对可插拔数据库执行用户管理的热备份和冷备份；用户管理的备份与恢复技术运行良好。但是，我强烈建议你在可插拔环境中使用
    `RMAN` 来管理备份与恢复。当连接到根容器或可插拔容器时，`RMAN` 会自动确定需要备份哪些数据文件、它们的位置以及如何还原与恢复。对于用户管理的备份，这项任务很快就会变得难以处理，因为
    DBA 必须为根容器以及可能的众多可插拔数据库管理这些信息。


    ## 为非归档模式数据库实施冷备份策略


    通过在数据库关闭后复制文件来执行用户管理的冷备份。这种类型的备份也称为离线备份。执行冷备份时，你的数据库可以处于 `noarchivelog`（非归档）模式或
    `archivelog`（归档）模式。


    DBA 倾向于认为冷备份等同于对处于 `noarchivelog` 模式的数据库进行备份。这并不正确。你可以对处于 `archivelog` 模式的数据库进行冷备份，这是许多地方采用的一种备份策略。数据库处于
    `noarchivelog` 模式和 `archivelog` 模式下进行冷备份的区别，将在以下各节中详述。


    ## 制作非归档模式数据库的冷备份


    对 `noarchivelog` 模式的数据库进行冷备份的一个主要原因，是让你能够将数据库恢复到过去的某个时间点。仅当你不需要恢复备份之后发生的事务时，才应使用此类型的备份。仅当你的业务要求允许数据丢失和停机时，这种备份和恢复策略才是可接受的。你几乎不会为生产业务数据库实施此类备份与恢复解决方案。


    ```

    $ mv /u02/dbfile/O12C/system01.dbf /u01/dbfile/O12C/system01.dbf

    $ mv /u02/dbfile/O12C/sysaux01.dbf /u01/dbfile/O12C/sysaux01.dbf

    $ mv /u02/dbfile/O12C/undotbs01.dbf /u01/dbfile/O12C/undotbs01.dbf

    $ mv /u02/dbfile/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf

    ```


    以 `nomount` 模式启动数据库：


    ```

    SQL> startup nomount;

    ```


    然后，执行包含 `CREATE CONTROLFILE` 语句的文件（本例中为 `mv.sql`）：


    ```

    SQL> @/tmp/mv.sql

    ```


    如果语句成功，你将看到以下消息：


    ```

    Control file created.

    ```


    最后，打开你的数据库：


    ```

    SQL> alter database open;

    ```


    ## 总结


    本章描述了如何配置和管理控制文件、在线重做日志文件、启用归档模式，以及管理表空间和数据文件。控制文件、在线重做日志和数据文件是关键的数据库文件；正常运行的数据库缺少它们就无法运作。


    控制文件是包含数据库结构信息的小型二进制文件。参数文件中指定的任何控制文件都必须可用，才能加载数据库。如果一个控制文件变得不可用，那么你的数据库将停止运行，直到你解决问题。我强烈建议你为数据库配置至少三个控制文件。如果一个控制文件变得不可用，你可以用一个完好的现有控制文件副本替换它。至关重要的是，你要知道如何配置、添加和删除这些文件。


    在线重做日志是记录数据库事务历史的关键文件。如果你有多个实例连接到一个数据库，那么每个实例都会生成自己的重做线程。每个数据库创建时都必须有两个或更多的在线重做日志组。你可以仅使用每组一个在线重做日志成员来运行数据库。但是，我强烈建议你为每个在线重做日志组创建两个成员。如果一个在线重做日志至少有一个成员可以写入，你的数据库就能继续运行。如果一个在线重做日志组的所有成员都不可用，那么你的数据库将停止运行。作为
    DBA，你必须极其精通创建、添加、移动和删除这些关键的数据库文件。


    归档是确保你拥有恢复数据库所需的所有事务的机制。一旦启用，归档进程需要在日志切换发生后成功复制在线重做日志。如果归档进程无法写入主要归档目标，那么你的数据库将挂起。因此，你需要仔细规划所需的磁盘空间量，以及备份和随后删除这些文件的频率。


    表空间和数据文件是你的数据存储的地方。它们通常构成任何备份与恢复操作的大部分。因此，理解如何操作和管理数据文件至关重要。


    到目前为止，本书前面的章节涵盖了连接到 Oracle、执行常规 DBA 任务以及管理关键文件。接下来的几章将集中讨论备份与恢复操作。


    ![图片](img/frontdot.jpg)'
- fmt: 'Having said that, there are some good reasons to implement this type of backup.
    One common use is to make a cold backup of a development/test/training database
    and periodically reset the database back to the baseline. This gives you a way
    to restart a performance test or a training session with the same point-in-time
    snapshot of the database.


    ![Image](images/sq.jpg) **Tip**  Consider using the Flashback Database feature
    to set your database back to a point in time in the past (see [Chapter 6](#9781484207642_Ch06.xhtml)
    for more details).


    The example in this section shows you how to make a backup of every critical file
    in your database: all control files, data files, temporary data files, and online
    redo log files. With this type of backup, you can easily restore your database
    back to the point in time when the backup was made. The main advantages of this
    approach are that it’s conceptually simple and easy to implement. Here are the
    steps required for a cold backup of a database in `noarchivelog` mode:


    1.  Determine where to copy the backup files and how much space is required.

    2.  Identify the locations and names of the database files to copy.

    3.  Shut down the database with the `IMMEDIATE`, `TRANSACTIONAL`, or `NORMAL`
    clause.

    4.  Copy the files (identified in step 2) to the backup location (determined in
    step 1).

    5.  Restart your database.


    The following sections elaborate on these steps.


    ### 步骤1：确定备份文件的复制位置及所需空间


    Ideally, the backup location should be on a set of disks separate from your live
    data files location. However, in many shops, you may not have a choice and may
    be told which mount points are to be used by the database. For this example the
    backup location is the directory `/u01/cbackup/O12C`. To get a rough idea of how
    much space you need to store one copy of the backups, you can run this query:


    ```sql

    select sum(sum_bytes)/1024/1024 m_bytes

    from(

    select sum(bytes) sum_bytes from v$datafile

    union

    select sum(bytes) sum_bytes from v$tempfile

    union

    select (sum(bytes) * members) sum_bytes from v$log

    group by members);

    ```


    You can verify how much operating disk space is available with the Linux/Unix
    `df` (disk free) command. Make sure that the amount of disk space available at
    the OS is greater than the sum returned from the prior query:


    ```bash

    $ df -h

    ```


    ### 步骤2：识别要复制的数据库文件的位置和名称


    Run this query to list the names (and paths) of the files that are included in
    a cold backup of a `noarchivelog` mode database:


    ```sql

    select name from v$datafile

    union

    select name from v$controlfile

    union

    select name from v$tempfile

    union

    select member from v$logfile;

    ```


    **BACKING UP ONLINE REDO LOGS (OR NOT)**


    Do you need to back up the online redo logs? No; you never need to back up the
    online redo logs as part of any type of backup. Then, why do DBAs back up the
    online redo logs as part of a cold backup? One reason is that it makes the restore
    process for the `noarchivelog` mode scenario slightly easier. The online redo
    logs are required to open the database in a normal manner.


    If you back up all files (including the online redo logs), then to get your database
    back to the state it was in at the time of the backup, you restore all files (including
    the online redo logs) and start up your database.


    ### 步骤3：关闭数据库


    Connect to your database as the `SYS` (or as a `SYSDBA`-privileged user), and
    shut down your database, using `IMMEDIATE`, `TRANSACTIONAL`, or `NORMAL`. In almost
    every situation, using `IMMEDIATE` is the preferred method. This mode disconnects
    users, rolls back incomplete transactions, and shuts down the database:


    ```bash

    $ sqlplus / as sysdba

    SQL> shutdown immediate;

    ```


    ### 步骤4：创建文件的备份副本


    For every file identified in step 2, use an OS utility to copy the files to a
    backup directory (identified in step 1). In this simple example all the data files,
    control files, temporary database files, and online redo logs are in the same
    directory. In production environments, you’ll most likely have files spread out
    in several different directories. This example uses the Linux/Unix `cp` command
    to copy the database files from `/u01/dbfile/O12C` to the `/u01/cbackup/O12C`
    directory:


    ```bash

    $ cp /u01/dbfile/O12C/*.*  /u01/cbackup/O12C

    ```


    ### 步骤5：重启数据库


    After all the files are copied, you can start up your database:


    ```bash

    $ sqlplus / as sysdba

    SQL> startup;

    ```


    ## 在有在线重做日志的情况下恢复无归档日志模式的冷备份


    The next example explains how to restore from a cold backup of a database in `noarchivelog`
    mode. If you included the online redo logs as part of the cold backup, you can
    include them when you restore the files. Here are the steps involved in this procedure:


    1.  Shut down the instance.

    2.  Copy the data files, online redo logs, temporary files, and control files
    back from the backup to the live database data file locations.

    3.  Start up your database.


    These steps are detailed in the following sections.


    ### 步骤1：关闭实例


    Shut down the instance, if it’s running. In this scenario it doesn’t matter how
    you shut down the database, because you’re restoring back to a point in time (with
    no recovery of transactions). Any files in the live database directory locations
    are overwritten when the backup files are copied back. If your instance is running,
    you can abruptly abort it. As a `SYSDBA`-privileged user, do the following:


    ```bash

    $ sqlplus / as sysdba

    SQL> shutdown abort;

    ```


    ### 步骤2：从备份中复制文件回来


    This step does the reverse of the backup: you’re copying files from the backup
    location to the live database file locations. In this example all the backup files
    are located in the `/u01/cbackup/O12C` directory, and all files are being copied
    to the `/u01/dbfile/O12C` directory:


    ```bash

    $ cp /u01/cbackup/O12C/*.*  /u01/dbfile/O12C

    ```


    ### 步骤3：启动数据库


    Connect to your database as `SYS` (or a user that has `SYSDBA` privileges), and
    start up your database:


    ```bash

    $ sqlplus / as sysdba

    SQL> startup;

    ```


    After you finish these steps, you should have an exact copy of your database as
    it was when you made the cold backup. It’s as if you set your database back to
    the point in time when you made the backup.


    ## 在没有在线重做日志的情况下恢复无归档日志模式的冷备份


    As mentioned earlier, you don’t ever need the online redo logs when restoring
    from a cold backup. If you made a cold backup of your database in `noarchivelog`
    mode and didn’t include the online redo logs as part of the backup, the steps
    to restore are nearly identical to the steps in the previous section. The main
    difference is that the last step requires you to open your database, using the
    `OPEN RESETLOGS` clause. Here are the steps:


    1.  Shut down the instance.

    2.  Copy the control files and data files back from the backup.

    3.  Start up the database in mount mode.

    4.  Open the database with the `OPEN RESETLOGS` clause.


    ### 步骤1：关闭实例


    Shut down the instance, if it’s running. In this scenario it doesn’t matter how
    you shut down the database, because you’re restoring back to a point in time.
    Any files in the live database directory locations are overwritten when the backups
    are copied. If your instance is running, you can abruptly abort it. As a `SYSDBA`-privileged
    user, do the following:


    ```bash

    $ sqlplus / as sysdba

    SQL> shutdown abort;

    ```


    ### 步骤2：从备份中复制文件回来


    Copy the control files and data files from the backup location to the live data
    file locations:


    ```bash

    $ cp <backup directory>/*.*  <live database file directory>

    ```


