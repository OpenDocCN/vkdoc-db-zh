    The following line of code shows how to enable automatic backup of the control
    file feature:


    ```

    RMAN> configure controlfile autobackup on;

    ```


    The automatic control file backup always goes into its own backup set. When autobackup
    of the control file is enabled, if you’re using an `spfile`, it’s automatically
    backed up along with the control file.


    If, for any reason, you want to disable automatic backup of the control file,
    you can do so as follows:


    ```

    RMAN> configure controlfile autobackup off;

    ```


    ![Image](images/sq.jpg) **Note**  If autobackup of the control file is off, then
    any time you back up data file 1 (`SYSTEM` tablespace data file), RMAN automatically
    backs up the control file.


    7\. Specifying the Location of the Autobackup of the Control File


    When you enable autobackup of the control file, RMAN creates the backup of the
    control file in one of the following locations:


    *   Default location

    *   FRA

    *   Location specified via the `CONFIGURE CONTROLFILE AUTOBACKUP FORMAT` command


    If you aren’t using an FRA, or if you haven’t specified a location for the control
    file autobackups, the control file autobackup is written to an OS-dependent default
    location. In Linux/Unix environments the default location is `ORACLE_HOME/dbs`;
    for example,


    ```

    /u01/app/oracle/product/12.1.0.1/db_1/dbs/c-3423216220-20130109-01

    ```


    If you’ve enabled an FRA, then RMAN automatically writes the control file autobackup
    files to directories in the FRA, using an OMF format for the name; for example,


    ```

    /<fra>/<dbuname>/autobackup/<YYYY_MM_DD>/o1_mf_s_729103049_68fho9z2_.bkp

    ```


    I don’t usually use the default location or the FRA for control file autobackups.
    I prefer these backups to be placed in the same directory the database backups
    are in. Here is an example:


    ```

    RMAN> configure controlfile autobackup format for device type disk to

    ''/u01/ORA12C/rman/rman_ctl_%F.bk'';

    ```


    If you want to set the autobackup format back to the default, do so as follows:


    ```

    RMAN> configure controlfile autobackup format for device type disk clear;

    ```


    8\. Backing Up Archive Redo Logs


    You should back up your archive redo logs on a regular basis. The archivelog files
    shouldn’t be removed from disk until you’ve backed them up at least once. I usually
    like to keep on disk any archive redo logs that have been generated since the
    last good RMAN backup.


    Generally, I instruct RMAN to back up the archive redo logs while the data files
    are being backed up. This is a sufficient strategy in most situations. Here is
    the command to back up the archive redo logs along with the data files:


    ```

    RMAN> backup database plus archivelog;

    ```


    Sometimes, if your database generates a great deal of redo, you may need to back
    up your archive redo logs at a frequency different from that of the data files.
    DBAs may back up the archive redo logs two or three times a day; after the logs
    are backed up, the DBAs delete them to make room for more current archivelog files.


    In most situations, you don’t need any archive redo logs that were generated before
    your last good backup. For example, if a data file has experienced media failure,
    you need to restore the data file from a backup and then apply any archive redo
    logs that were generated during and after the backup of the data file.


    On some occasions, you may need archive redo logs that were generated before the
    last backup. For instance, you may experience a media failure, attempt to restore
    your database from the last good backup, find corruption in that backup, and therefore
    need to restore from an older backup. At that point, you need a copy of all archive
    redo logs that have been generated since that older backup was made.


    9\. Determining the Location for the Snapshot Control File


    RMAN requires a read-consistent view of the control file for the following tasks:


    *   Synchronizing with the recovery catalog

    *   Backing up the current control file


    RMAN creates a snapshot copy of the current control file that it uses as a read-consistent
    copy while it’s performing these tasks. This ensures that RMAN is working from
    a copy of the control file that isn’t being modified.


    The default location of the snapshot control file is OS specific. On Linux platforms
    the default location/format is `ORACLE_HOME/dbs/snapcf_@.f`. Note that the default
    location isn’t in the FRA (even if you’ve implemented an FRA).


    You can display the current snapshot control file details, using the `SHOW` command:


    ```

    RMAN> show snapshot controlfile name;

    ```


    Here is some sample output:


    ```

    CONFIGURE SNAPSHOT CONTROLFILE NAME TO

     ''/ora01/app/oracle/product/12.1.0.1/db_1/dbs/snapcf_o12c.f''; # default

    ```


    For most situations the default location and format of the snapshot control file
    are sufficient. This file doesn’t use much space or have any intensive I/O requirements.
    I recommend that you use the default setting.


    If you have a good reason to configure the snapshot control file to a nondefault
    location, you can do so as follows:


    ```

    RMAN> configure snapshot controlfile name to ''/u01/O12C/rman/snapcf.ctl'';

    ```


    If you accidentally configure the snapshot control file location to a nonexistent
    directory, then when running a `BACKUP` or `COPY` command, the autobackup of the
    control file will fail, with this error:


    ```

    ORA-01580: error creating control backup file...

    ```


    You can set the snapshot control file back to the default, like this:


    ```

    RMAN> configure snapshot controlfile name clear;

    ```


    10\. Using a Recovery Catalog


    RMAN always stores its latest backup operations in the target database control
    file. You can set up an optional recovery catalog to store metadata regarding
    RMAN backups. The recovery catalog is a separate schema (usually in a database
    different from that of the target database) that contains database objects (tables,
    indexes, and so on) that store the RMAN backup information. The recovery catalog
    doesn’t store RMAN backup pieces—only backup metadata.


    The main advantages of using a recovery catalog are as follows:


    *   Provides a secondary repository for RMAN metadata. If you lose all your control
    files and backups of your control files, you can still retrieve RMAN metadata
    from the recovery catalog.

    *   Stores RMAN metadata for a much longer period than is possible when you just
    use a control file for the repository.

    *   Offers access to all RMAN features. Some restore and recovery features are
    simpler when using a recovery catalog.


    The disadvantage of using a recovery catalog is that this is another database
    you have to set up, maintain, and back up. Additionally, when you start a backup
    and attempt to connect to the recovery catalog, if the recovery catalog isn’t
    available for any reason (server down, network issues, and so on), you must decide
    whether you want to continue with the backup without a recovery catalog.


    You must also be aware of versioning aspects when using a recovery catalog. You
    need to make sure the version of the database you use to store the recovery catalog
    is compatible with the version of the target database. When you upgrade a target
    database, be sure the recovery catalog is upgraded (if necessary).


    ![Image](images/sq.jpg) **Note**  See [Chapter 5](#9781484207642_Ch05.xhtml) for
    details on how to implement a recovery catalog.


    RMAN works fine with or without a recovery catalog. For several of the databases
    I maintain, I don’t use a recovery catalog; this eliminates having to set it up
    and maintain it. For me, simplicity takes precedence over the features available
    with the recovery catalog.


    However, if you have good business reasons for using a recovery catalog, then
    implement and use one. The recovery catalog isn’t that difficult to set up and
    maintain, and Oracle recommends that you use it.


    11\. Using a Media Manager'
  trans: "\n```\n针对 db_unique_name 为 O12C 的数据库，其 RMAN 配置参数为：\nCONFIGURE CONTROLFILE\
    \ AUTOBACKUP ON;\n```\n\n以下代码行展示了如何启用控制文件自动备份功能：\n\n```\nRMAN> configure controlfile\
    \ autobackup on;\n```\n\n控制文件的自动备份始终会存放在其独立的备份集中。当启用控制文件的自动备份时，如果你正在使用 `spfile`，它会与控制文件一起被自动备份。\n\
    \n如果出于任何原因，你想要禁用控制文件的自动备份，可以按如下操作：\n\n```\nRMAN> configure controlfile autobackup\
    \ off;\n```\n\n> **注意**\n> 如果控制文件的自动备份处于关闭状态，那么每次你备份数据文件 1（`SYSTEM` 表空间数据文件）时，RMAN\
    \ 都会自动备份控制文件。\n\n## 7. 指定控制文件自动备份的位置\n\n当你启用控制文件的自动备份时，RMAN 会在以下位置之一创建控制文件的备份：\n\
    \n*   默认位置\n*   FRA\n*   通过 `CONFIGURE CONTROLFILE AUTOBACKUP FORMAT` 命令指定的位置\n\
    \n如果你没有使用 FRA，或者你没有为控制文件自动备份指定位置，那么控制文件自动备份会被写入一个依赖于操作系统的默认位置。在 Linux/Unix 环境中，默认位置是\
    \ `ORACLE_HOME/dbs`；例如：\n\n```\n/u01/app/oracle/product/12.1.0.1/db_1/dbs/c-3423216220-20130109-01\n\
    ```\n\n如果你启用了 FRA，那么 RMAN 会自动将控制文件自动备份文件写入 FRA 中的目录，文件名使用 OMF 格式；例如：\n\n```\n\
    /<fra>/<dbuname>/autobackup/<YYYY_MM_DD>/o1_mf_s_729103049_68fho9z2_.bkp\n```\n\
    \n我通常不会为控制文件自动备份使用默认位置或 FRA。我更倾向于将这些备份放在与数据库备份相同的目录中。以下是一个示例：\n\n```\nRMAN> configure\
    \ controlfile autobackup format for device type disk to\n'/u01/ORA12C/rman/rman_ctl_%F.bk';\n\
    ```\n\n如果你想将自动备份格式重置回默认值，可以按如下方式操作：\n\n```\nRMAN> configure controlfile autobackup\
    \ format for device type disk clear;\n```\n\n## 8. 备份归档重做日志\n\n你应该定期备份你的归档重做日志。在备份至少一次之前，归档日志文件不应该从磁盘中删除。我通常喜欢保留自上次成功的\
    \ RMAN 备份以来生成的所有归档重做日志。\n\n通常，我指示 RMAN 在备份数据文件的同时备份归档重做日志。这在大多数情况下是一个足够的策略。以下是在备份数据文件的同时备份归档重做日志的命令：\n\
    \n```\nRMAN> backup database plus archivelog;\n```\n\n有时，如果你的数据库生成大量重做日志，你可能需要以不同于数据文件备份的频率来备份你的归档重做日志。DBA\
    \ 可能一天备份两到三次归档重做日志；在日志备份之后，DBA 会删除它们以为更当前的归档日志文件腾出空间。\n\n在大多数情况下，你不需要最后一次成功备份之前生成的任何归档重做日志。例如，如果一个数据文件经历了介质故障，你需要从备份中恢复该数据文件，然后应用在该数据文件备份期间及之后生成的任何归档重做日志。\n\
    \n在某些情况下，你可能需要上次备份之前生成的归档重做日志。例如，你可能遇到介质故障，尝试从上次成功的备份恢复数据库，发现该备份已损坏，因此需要从更早的备份进行恢复。那时，你需要自那个更早备份制作以来生成的所有归档重做日志的副本。\n\
    \n## 9. 确定快照控制文件的位置\n\nRMAN 在执行以下任务时需要一个读一致的控制文件视图：\n\n*   与恢复目录同步\n*   备份当前控制文件\n\
    \nRMAN 会创建当前控制文件的一个快照副本，在执行这些任务时使用它作为读一致的副本。这确保 RMAN 正在处理一个未被修改的控制文件副本。\n\n快照控制文件的默认位置取决于操作系统。在\
    \ Linux 平台上，默认位置/格式是 `ORACLE_HOME/dbs/snapcf_@.f`。请注意，默认位置不在 FRA 中（即使你已经实施了 FRA）。\n\
    \n你可以使用 `SHOW` 命令显示当前快照控制文件的详细信息：\n\n```\nRMAN> show snapshot controlfile name;\n\
    ```\n\n以下是一些示例输出：\n\n```\nCONFIGURE SNAPSHOT CONTROLFILE NAME TO\n '/ora01/app/oracle/product/12.1.0.1/db_1/dbs/snapcf_o12c.f';\
    \ # default\n```\n\n对于大多数情况，快照控制文件的默认位置和格式是足够的。这个文件不会占用太多空间，也没有密集的 I/O 要求。我建议你使用默认设置。\n\
    \n如果你有充分的理由需要将快照控制文件配置到非默认位置，可以按如下方式操作：\n\n```\nRMAN> configure snapshot controlfile\
    \ name to '/u01/O12C/rman/snapcf.ctl';\n```\n\n如果你不小心将快照控制文件位置配置到了一个不存在的目录，那么在运行\
    \ `BACKUP` 或 `COPY` 命令时，控制文件的自动备份将失败，并出现以下错误：\n\n```\nORA-01580: error creating\
    \ control backup file...\n```\n\n你可以将快照控制文件设置回默认值，如下所示：\n\n```\nRMAN> configure\
    \ snapshot controlfile name clear;\n```\n\n## 10. 使用恢复目录\n\nRMAN 始终将其最新的备份操作存储在目标数据库控制文件中。你可以设置一个可选的恢复目录来存储有关\
    \ RMAN 备份的元数据。恢复目录是一个独立的模式（通常位于与目标数据库不同的数据库中），它包含存储 RMAN 备份信息的数据库对象（表、索引等）。恢复目录不存储\
    \ RMAN 备份片——只存储备份元数据。\n\n使用恢复目录的主要优势如下：\n\n*   为 RMAN 元数据提供了一个辅助存储库。如果你丢失了所有控制文件及其备份，你仍然可以从恢复目录中检索\
    \ RMAN 元数据。\n*   可以将 RMAN 元数据存储比仅使用控制文件作为存储库时更长的周期。\n*   提供对所有 RMAN 功能的访问。使用恢复目录时，某些恢复和修复功能会更简单。\n\
    \n使用恢复目录的缺点是，这是另一个你需要设置、维护和备份的数据库。此外，当你启动备份并尝试连接到恢复目录时，如果恢复目录因任何原因（服务器宕机、网络问题等）不可用，你必须决定是否在没有恢复目录的情况下继续备份。\n\
    \n在使用恢复目录时，你还必须注意版本兼容性问题。你需要确保存储恢复目录的数据库版本与目标数据库的版本兼容。当你升级目标数据库时，请确保恢复目录也已升级（如果需要）。\n\
    \n> **注意**\n> 有关如何实施恢复目录的详细信息，请参见第 5 章。\n\n无论是否使用恢复目录，RMAN 都能正常工作。对于我维护的几个数据库，我没有使用恢复目录；这样就免去了设置和维护它的麻烦。对我来说，简单性优先于恢复目录所提供的功能。\n\
    \n但是，如果你有充分的业务理由使用恢复目录，那么就实施并使用它。恢复目录的设置和维护并不那么困难，Oracle 建议你使用它。\n\n## 11. 使用介质管理器\n"
- fmt: '# Media Manager for RMAN


    A media manager is required for RMAN to back up directly to tape. Several vendors
    provide this feature (for a cost). Media managers are used in large database environments,
    such as data warehouses, in which you may not have enough room to back up a database
    to disk. You may also have a disaster recovery requirement to back up directly
    to tape.


    If you have such requirements, then you should purchase a media management package
    and implement it. If you don’t need to back up directly to tape, there’s no need
    to implement a media manager. RMAN works fine backing up directly to disk.


    Keep in mind that many shops use RMAN to back up directly to disk and then have
    the system administrator back up the RMAN backups to tape afterward. If you do
    this, you have to be sure your RMAN backups aren’t running while the tape backups
    are running (because you may get partial files backed up to tape).


    ## Setting the `CONTROL_FILE_RECORD_KEEP_TIME` Initialization Parameter


    The `CONTROL_FILE_RECORD_KEEP_TIME` initialization parameter specifies the minimum
    number of days a reusable record in the control file is retained before the record
    can be overwritten. The RMAN metadata are stored in the reusable section of the
    control file and therefore are eventually overwritten.


    If you’re using a recovery catalog, then you don’t need to worry about this parameter
    because RMAN metadata are stored in the recovery catalog indefinitely. Therefore,
    when you use a recovery catalog, you can access any historical RMAN metadata.


    If you’re using only the control file as the RMAN metadata repository, then the
    information stored there will eventually be overwritten. The default value for
    `CONTROL_FILE_RECORD_KEEP_TIME` is 7 days:


    ```sql

    SQL> show parameter control_file_record_keep_time


    NAME                                 TYPE        VALUE

    ------------------------------------ ----------- ---------

    control_file_record_keep_time        integer     7

    ```


    You can set the value to anything from 0 to 365 days. Setting the value to 0 means
    that the RMAN metadata information can be overwritten at any time.


    The `CONTROL_FILE_RECORD_KEEP_TIME` parameter was more critical in older versions
    of Oracle, in which it wasn’t easy to repopulate the control file with RMAN information,
    in the event that metadata were overwritten. Starting with Oracle 10g, you can
    use the `CATALOG` command to quickly make the control file aware of RMAN backup
    files.


    If you run daily backups, then I recommend that you leave this parameter at 7
    days. However, if you only back up your database once a month, or if, for some
    reason, you have a retention policy greater than 7 days, and you’re not using
    a recovery catalog, then you may want to consider increasing the value. The downside
    to increasing this parameter is that if you have a significant amount of RMAN
    backup activity, this can increase the size of your control file.


    ## Configuring RMAN’s Backup Retention Policy


    RMAN retention policies allow you to specify how long you want to retain backups.
    RMAN has two mutually exclusive methods of specifying a retention policy:


    *   Recovery window

    *   Number of backups (redundancy)


    ### Recovery Window


    With a recovery window, you specify a number of days in the past for which you
    want to be able recover to any point in that window. For example, if you specify
    a retention policy window of 5 days, then RMAN doesn’t mark as obsolete backups
    of data files and archive redo logs that are required to be able to restore to
    any point in that 5-day window:


    ```rman

    RMAN> configure retention policy to recovery window of 5 days;

    ```


    For the specified recovery, RMAN may need backups older than the 5-day window
    because it may need an older backup to start with to be able to recover to the
    recovery point specified. For example, suppose your last good backup was made
    6 days ago, and now you want to recover to 4 days in the past. For this recovery
    window, RMAN needs the backup from 6 days ago to restore and recover to the point
    specified.


    ### Redundancy'
