    ```\n CURRENT_SCN\n-----------\n     5715397\n```\n\n以下命令使用 `FLASHBACK_SCN` 参数对数据库进行一致性完全导出：\n\
    ```\n$ expdp mv_maint/foo directory=dp_dir full=y flashback_scn=5715397 \\\ndumpfile=full.dmp\n\
    ```\n\n前面的导出命令确保所有导出的数据与指定 SCN 时数据库中已提交的任何事务保持一致。\n\n当使用 `FLASHBACK_SCN` 参数时，数据泵确保导出文件中的数据截至指定的\
    \ SCN 是一致的。\n"
- fmt: "This means that any transactions committed after the specified SCN aren’t\
    \ included in the export file.\n\n`Note`: If you use the `NETWORK_LINK` parameter\
    \ in conjunction with `FLASHBACK_SCN`, then the export is taken with the SCN consistent\
    \ with the database referenced in the database link.\n\n## Specifying Export Consistency\
    \ with FLASHBACK_TIME\n\nYou can also use `FLASHBACK_TIME` to specify that the\
    \ export file should be created with consistent committed transactions as of a\
    \ specified time. When using `FLASHBACK_TIME`, Oracle determines the SCN that\
    \ most closely matches the time specified and uses that to produce an export consistent\
    \ with that SCN. The syntax for using `FLASHBACK_TIME` is as follows:\n\n```\n\
    FLASHBACK_TIME=\"TO_TIMESTAMP{<value>}\"\n```\n\nFor some operating systems, double\
    \ quotation marks appearing directly on the command line must be escaped by a\
    \ backslash (`\\`), because the OS treats them as special characters. For this\
    \ reason, it’s much more straightforward to use a parameter file. Here are the\
    \ contents of a parameter file that uses `FLASHBACK_TIME`:\n\n```\ndirectory=dp_dir\n\
    content=metadata_only\ndumpfile=inv.dmp\nflashback_time=\"to_timestamp('24-jan-2014\
    \ 07:03:00','dd-mon-yyyy hh24:mi:ss')\"\n```\n\nDepending on your OS, the command\
    \ line version of the previous example must be specified as follows:\n\n```\n\
    flashback_time=\\\"to_timestamp\\(\\'24-jan-2014 07:03:00\\', \\'dd-mon-yyyy hh24:mi:ss\\\
    '\\)\\\"\n```\n\nThis line of code should be specified on one line. Here, the\
    \ code has been placed on two lines in order to fit on the page.\n\n`Note`: You\
    \ can’t specify both `FLASHBACK_SCN` and `FLASHBACK_TIME` when taking an export;\
    \ these two parameters are mutually exclusive. If you attempt to use both parameters\
    \ at the same time, Data Pump throws the following error message and halts the\
    \ export job:\n\n```\nORA-39050: parameter FLASHBACK_TIME is incompatible with\
    \ parameter FLASHBACK_SCN\n```\n\n## Importing When Objects Already Exist\n\n\
    When exporting and importing data, you often import into schemas in which the\
    \ objects have been created (tables, indexes, and so on). In this situation, you\
    \ should import the data but instruct Data Pump to try not to create already existing\
    \ objects.\n\nYou can achieve this with the `TABLE_EXISTS_ACTION` and `CONTENT`\
    \ parameters. The next example instructs Data Pump to append data in any tables\
    \ that already exist via the `TABLE_EXISTS_ACTION=APPEND` option. Also used is\
    \ the `CONTENT=DATA_ONLY` option, which instructs Data Pump not to run any DDL\
    \ to create objects (only to load data):\n\n```\n$ impdp mv_maint/foo directory=dp_dir\
    \ dumpfile=inv.dmp \\\ntable_exists_action=append content=data_only\n```\n\nExisting\
    \ objects aren’t modified in any way, and any new data that exist in the dump\
    \ file are inserted into any tables.\n\nYou may wonder what happens if you just\
    \ use the `TABLE_EXISTS_ACTION` option and don’t combine it with the `CONTENT`\
    \ option:\n\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp \\\n\
    table_exists_action=append\n```\n\nThe only difference is that Data Pump attempts\
    \ to run DDL commands to create objects if they exist. This doesn’t stop the job\
    \ from running, but you see an error message in the output, indicating that the\
    \ object already exists. Here is a snippet of the output for the previous command:\n\
    \n```\nTable \"MV_MAINT\".\"INV\" exists. Data will be appended ...\n```\n\nThe\
    \ default for the `TABLE_EXISTS_ACTION` parameter is `SKIP`, unless you also specify\
    \ the parameter `CONTENT=DATA_ONLY`. If you use `CONTENT=DATA_ONLY`, then the\
    \ default for `TABLE_EXISTS_ACTION` is `APPEND`.\n\n### TABLE_EXISTS_ACTION Options\n\
    \nThe `TABLE_EXISTS_ACTION` parameter takes the following options:\n\n*   `SKIP`\
    \ (default if not combined with `CONTENT=DATA_ONLY`)\n*   `APPEND` (default if\
    \ combined with `CONTENT=DATA_ONLY`)\n*   `REPLACE`\n*   `TRUNCATE`\n\nThe `SKIP`\
    \ option tells Data Pump not to process the object if it exists. The `APPEND`\
    \ option instructs Data Pump not to delete existing data, but rather, to add data\
    \ to the table without modifying any existing data.\n\nThe `REPLACE` option instructs\
    \ Data Pump to drop and recreate objects; this parameter isn’t valid when the\
    \ `CONTENT` parameter is used with the `DATA_ONLY` option. The `TRUNCATE` parameter\
    \ tells Data Pump to delete rows from tables via a `TRUNCATE` statement.\n\n###\
    \ CONTENT Options\n\nThe `CONTENT` parameter takes the following options:\n\n\
    *   `ALL` (default)\n*   `DATA_ONLY`\n*   `METADATA_ONLY`\n\nThe `ALL` option\
    \ instructs Data Pump to load both data and metadata contained in the dump file;\
    \ this is the default behavior. The `DATA_ONLY` option tells Data Pump to load\
    \ only table data into existing tables; no database objects are created. The `METADATA_ONLY`\
    \ option only creates objects; no data are loaded.\n\n## Renaming a Table\n\n\
    Starting with Oracle 11g, you have the option of renaming a table during import\
    \ operations. There are many reasons you may want to rename a table when importing\
    \ it. For instance, you may have a table in the target schema that has the same\
    \ name as the table you want to import. You can rename a table when importing\
    \ by using the `REMAP_TABLE` parameter. This example imports the table from the\
    \ `HEERA` user `INV` table to the `HEERA` user `INVEN` table:\n\n```\n$ impdp\
    \ mv_maint/foo directory=dp_dir dumpfile=inv.dmp tables=heera.inv \\\nremap_table=heera.inv:inven\n\
    ```\n\nHere is the general syntax for renaming a table:\n\n```\nREMAP_TABLE=[schema.]old_tablename[.partition]:new_tablename\n\
    ```\n\n`Note`: That this syntax doesn’t allow you to rename a table into a different\
    \ schema. If you’re not careful, you may attempt to do the following (thinking\
    \ that you’re moving a table and renaming it in one operation):\n\n```\n$ impdp\
    \ mv_maint/foo directory=dp_dir dumpfile=inv.dmp tables=heera.inv \\\nremap_table=heera.inv:scott.inven\n\
    ```\n\nIn the prior example, you end up with a table in the `HEERA` schema named\
    \ `SCOTT`. That can be confusing.\n\n`Note`: The process of renaming a table wasn’t\
    \ entirely bug free in Oracle 11g Release 1 but has been corrected in Oracle 11g\
    \ Release 2. See MOS Note 886762.1 for more details.\n\n## Remapping Data\n\n\
    Starting with Oracle 11g, when either exporting or importing, you can apply a\
    \ PL/SQL function to alter a column value. For example, you may have an auditor\
    \ who needs to look at the data, and one requirement is that you apply a simple\
    \ obfuscation function to sensitive columns. The data don’t need to be encrypted;\
    \ they just need to be changed enough that the auditor can’t readily determine\
    \ the value of the `LAST_NAME` column in the `CUSTOMERS` table.\n\nThis example\
    \ first creates a simple package that is used to obfuscate the data:\n\n```\n\
    create or replace package obfus is\n  function obf(clear_string varchar2) return\
    \ varchar2;\n  function unobf(obs_string varchar2) return varchar2;\nend obfus;\n\
    /\n-- create or replace package body obfus is\n  fromstr varchar2(62) := '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'\
    \ ||\n             'abcdefghijklmnopqrstuvwxyz';\n  tostr varchar2(62)   := 'defghijklmnopqrstuvwxyzabc3456789012'\
    \ ||\n             'KLMNOPQRSTUVWXYZABCDEFGHIJ';\n-- function obf(clear_string\
    \ varchar2) return varchar2 is\nbegin\n  return translate(clear_string, fromstr,\
    \ tostr);\nend obf;\n-- function unobf(obs_string varchar2) return varchar2 is\n\
    begin\n  return translate(obs_string, tostr, fromstr);\nend unobf;\nend obfus;\n\
    /\n```\n\nNow, when you import the data into the database, you apply the obfuscation\
    \ function to the `LAST_NAME` column of the `CUSTOMERS` table:\n\n```\n$ impdp\
    \ mv_maint/foo directory=dp_dir dumpfile=cust.dmp tables=customers  \\\nremap_data=customers.last_name:obfus.obf\n\
    ```\n\nSelecting `LAST_NAME` from `CUSTOMERS` shows that it has been imported\
    \ in an obfuscated manner:\n\n```\nSQL> select last_name from customers;\nLAST_NAME\n\
    ------------------\nyYZEJ\ntOXXSMU\nxERX\n```\n\nYou can manually apply the package’s\
    \ `UNOBF` function to see the real values of the column:\n\n```\nSQL> select obfus.unobf(last_name)\
    \ from customers;\nOBFUS.UNOBF(LAST_NAME)\n------------------------\nSmith\nJohnson\n\
    Williams\n```"
