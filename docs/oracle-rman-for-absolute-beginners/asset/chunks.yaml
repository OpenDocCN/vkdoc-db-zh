    \ Data Pump 导出。当您将 `REUSE_DUMPFILES` 设置为 `y` 时，如果 Data Pump 找到同名的转储文件，它将覆盖该文件。\n\
    \n![Image](img/sq.jpg) **注意** `REUSE_DUMPFILES` 的默认值为 `n`。`REUSE_DUMPFILES` 参数仅在\
    \ Oracle 11g 及更高版本中可用。\n\n## 创建每日 DDL 文件\n有时，在数据库环境中，数据库对象会以意想不到的方式发生变化。您可能有一位开发人员以某种方式获得了生产用户密码，并决定在未经任何人告知的情况下即时进行更改。或者，DBA\
    \ 在排查问题时可能决定不遵循标准发布流程而更改对象。这些情况对于生产支持 DBA 来说可能是令人沮丧的。每当出现问题时，首先被提出的问题是：“什么发生了变化？”\n\
    \n当您使用 Data Pump 时，创建一个包含用于重新创建数据库中所有对象的 DDL 的文件相当简单。您可以通过 `CONTENT=METADATA_ONLY`\
    \ 选项指示 Data Pump 仅导出或导入元数据。\n\n例如，在生产环境中，您可以设置一个每日作业来捕获此 DDL。如果对发生了什么变化以及何时发生变化有疑问，您可以回溯并比较每日转储文件中的\
    \ DDL。\n\n下面列出的是一个简单的 shell 脚本，它首先从数据库导出元数据内容，然后使用 Data Pump 导入从该导出创建 DDL 文件：\n\
    \n```bash\n#!/bin/bash\nexport ORACLE_SID=O12C\nexport ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1\n\
    export PATH=$PATH:$ORACLE_HOME/bin\n#\nDAY=$(date +%Y_%m_%d)\nSID=DWREP\n#---------------------------------------------------\n\
    # 首先创建仅包含元数据的导出转储文件\nexpdp mv_maint/foo dumpfile=${SID}.${DAY}.dmp content=metadata_only\
    \ \\\ndirectory=dp_dir full=y logfile=${SID}.${DAY}.log\n#---------------------------------------------------\n\
    # 现在从导出转储文件创建 DDL 文件。\nimpdp mv_maint/foo directory=dp_dir dumpfile=${SID}.${DAY}.dmp\
    \ \\\nSQLFILE=${SID}.${DAY}.sql logfile=${SID}.${DAY}.sql.log\n#\n# exit 0\n```\n\
    \n此代码清单依赖于已创建一个数据库目录对象，该对象指向您希望每日转储文件写入的位置。您可能还想设置另一个作业，该作业定期删除超过一定时间的文件。\n\n\
    ## 压缩输出\n当您使用 Data Pump 创建大文件时，应该考虑压缩输出。从 Oracle 11g 开始，`COMPRESSION` 参数可以是以下值之一：`ALL`、`DATA_ONLY`、`METADATA_ONLY`\
    \ 或 `NONE`。如果您指定 `ALL`，则输出中的数据和元数据都将被压缩。此示例导出一个表并压缩输出文件中的数据和元数据：\n\n```bash\n\
    $ expdp dbauser/foo tables=locations directory=datapump \\\ndumpfile=compress.dmp\
    \ compression=all\n```\n\n如果您使用的是 Oracle 10g，则 `COMPRESSION` 参数只有 `METADATA_ONLY`\
    \ 和 `NONE` 值。\n\n![Image](img/sq.jpg) **注意** `COMPRESS` 参数的 `ALL` 和 `DATA_ONLY`\
    \ 选项需要 Oracle 高级压缩选项的许可。\n\nOracle 12c 的新功能是，您可以指定一种压缩算法。选择有 `BASIC`、`LOW`、`MEDIUM`\
    \ 和 `HIGH`。这是一个使用 `MEDIUM` 压缩的示例：\n\n```bash\n$ expdp mv_maint/foo dumpfile=full.dmp\
    \ compression=medium\n```\n"
- fmt: "# Data Pump 高级特性\n\n## 压缩特性\n\n使用命令 `dmp directory=dp_dir full=y \\ compression=all\
    \ compression_algorithm=MEDIUM`。\n\n`COMPRESSION_ALGORITHM` 参数在磁盘空间不足或通过网络连接导出时特别有用，因为它减少了需要传输的字节数。\n\
    \n![Image](images/sq.jpg)\n\n**Note**  \n`COMPRESSION_ALGORITHM` 参数需要 Oracle Advanced\
    \ Compression 选项的许可。\n\n### 导入时更改表压缩特性\n\n从 Oracle 12c 开始，您可以在导入表时更改其压缩特性。此示例将作业中导入的所有表的压缩特性更改为\
    \ `COMPRESS FOR OLTP`。由于此示例中的命令需要引号，因此将其放在参数文件中，如下所示：\n\n```\nuserid=mv_maint/foo\
    \ dumpfile=inv.dmp directory=dp_dir transform=table_compression_clause:\"COMPRESS\
    \ FOR OLTP\"\n```\n\n假设参数文件名为 `imp.par`。现在可以按如下方式调用：\n\n```\n$ impdp parfile=imp.par\n\
    ```\n\n导入作业中包含的所有表都将创建为 `COMPRESS FOR OLTP`，并且数据在加载时被压缩。\n\n![Image](images/sq.jpg)\n\
    \n**Note**  \n表级压缩（用于 OLTP）需要 Oracle Advanced Compression 选项的许可。\n\n## 数据加密\n\n\
    Data Pump 转储文件的一个潜在安全问题是，任何对输出文件有操作系统访问权限的人都可以在文件中搜索字符串。在 Linux/Unix 系统上，您可以使用\
    \ `strings` 命令执行此操作：\n\n```\n$ strings inv.dmp | grep -i secret\n```\n\n这是此特定转储文件的输出：\n\
    \n```\nSecret Data<\ntop secret data<\ncorporate secret data<\n```\n\n此命令允许您查看转储文件的内容，因为数据是常规文本且未加密。如果您需要保护数据安全，可以使用\
    \ Data Pump 的加密功能。\n\n此示例使用 `ENCRYPTION` 参数来保护输出中的所有数据和元数据：\n\n```\n$ expdp mv_maint/foo\
    \ encryption=all directory=dp_dir dumpfile=inv.dmp\n```\n\n要使此命令生效，您的数据库必须有一个已打开的加密钱包。有关如何创建和打开钱包的更多详细信息，请参阅《Oracle\
    \ Advanced Security Administrator’s Guide》，可从 Oracle 网站 (`http://otn.oracle.com`)\
    \ 的 Technology Network 区域下载。\n\n![Image](images/sq.jpg)\n\n**Note**  \nData Pump\
    \ `ENCRYPTION` 参数要求您使用 Oracle 11g 或更高版本的企业版，并且还需要 Oracle Advanced Security 选项的许可。\n\
    \n`ENCRYPTION` 参数接受以下选项：\n\n*   `ALL`\n*   `DATA_ONLY`\n*   `ENCRYPTED_COLUMNS_ONLY`\n\
    *   `METADATA_ONLY`\n*   `NONE`\n\n`ALL` 选项为数据和元数据启用加密。`DATA_ONLY` 选项仅加密数据。`ENCRYPTED_COLUMNS_ONLY`\
    \ 选项指定仅在数据库中加密的列才以加密格式写入转储文件。`METADATA_ONLY` 选项仅加密导出文件中的元数据。\n\n## 将视图导出为表\n\n\
    从 Oracle 12c 开始，您可以导出视图并在之后将其作为表导入。如果您需要将视图中包含的数据复制到历史报告数据库，则可能需要这样做。\n\n使用 `VIEWS_AS_TABLES`\
    \ 参数将视图导出到表结构中。此参数的语法如下：\n\n```\nVIEWS_AS_TABLES=[schema_name.]view_name[:template_table_name]\n\
    ```\n\n以下是一个示例：\n\n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=v.dmp \\\
    \nviews_as_tables=sales_rockies\n```\n\n现在，转储文件可用于将名为 `SALES_ROCKIES` 的表导入不同的方案或数据库。\n\
    \n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=v.dmp\n```\n\n如果您只想导入在导出期间从视图创建的表，可以按如下方式进行：\n\
    \n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=v.dmp tables=sales_rockies\n\
    ```\n\n该表将具有与视图定义相同的列和数据类型。该表还将包含与导出时从视图中选择的内容相匹配的数据行。\n\n## 导入时禁用重做日志记录\n\n从\
    \ Oracle 12c 开始，您可以指定对象以 nologging 方式加载重做。这是通过 `DISABLE_ARCHIVE_LOGGING` 参数实现的：\n\
    \n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp \\\ntransform=disable_archive_logging:Y\n\
    ```\n\n在执行导入期间，对象的日志记录属性被设置为 `NO`；导入后，日志记录属性被设置回其原始值。对于 Data Pump 可以使用直接路径执行的操作（例如向表中插入数据），这可以减少导入期间生成的重做量。\n\
    \n## 交互式命令模式\n\nData Pump 提供了一个交互式命令模式，允许您监控 Data Pump 作业的状态并动态修改许多作业特征。交互式命令模式对于长时间运行的\
    \ Data Pump 操作最为有用。在此模式下，您还可以停止、重新启动或终止当前正在运行的作业。以下部分将讨论这些活动。\n\n### 进入交互式命令模式\n\
    \n有两种方式可以访问交互式命令模式提示符：\n\n*   在通过 `expdp` 或 `impdp` 启动的 Data Pump 作业中按 Ctrl+C。\n\
    *   使用 `ATTACH` 参数附加到当前正在运行的作业。\n\n当您从命令行运行 Data Pump 作业时，您将处于命令行模式。随着作业的进行，您应该会看到输出显示在您的终端上。如果要退出命令行模式，请按\
    \ Ctrl+C。这将使您进入交互式命令界面模式。对于导出作业，提示符为：\n\n```\nExport>\n```\n\n输入 `HELP` 命令以查看可用的导出交互式命令（参见\
    \ [表 8-1](#9781484207642_Ch08.xhtml#Tab1)）：\n\n```\nExport> help\n```\n\n**表 8-1**.\
    \ 导出交互式命令\n\n| 命令 | 描述 |\n| --- | --- |\n| `ADD_FILE` | 向导出转储集添加文件 |\n| `CONTINUE_CLIENT`\
    \ | 继续交互式客户端模式 |\n| `EXIT_CLIENT` | 退出客户端会话并返回到操作系统提示符；让当前作业继续运行 |\n| `FILESIZE`\
    \ | 为任何后续创建的转储文件定义文件大小 |\n| `HELP` | 显示交互式导出命令 |\n| `KILL_JOB` | 终止当前作业 |\n| `PARALLEL`\
    \ | 增加或减少并行度 |\n| `REUSE_DUMPFILES` | 如果转储文件存在则覆盖它（默认为 `N`） |\n| `START_JOB` |\
    \ 重新启动已附加的作业 |\n| `STATUS` | 显示当前附加作业的状态 |\n| `STOP_JOB [=IMMEDIATE]` | 停止作业处理（您可以稍后重新启动它）。使用\
    \ `IMMEDIATE` 参数可快速停止作业，但可能有一些未完成的任务。 |\n\n输入 `EXIT` 以离开交互式命令模式：\n\n```\nExport>\
    \ exit\n```\n\n您现在应该处于操作系统提示符下。\n\n您可以在导出或导入作业中按 Ctrl+C。对于导入作业，交互式命令模式提示符为：\n\n\
    ```\nImport>\n```\n\n要查看所有可用命令，请输入 `HELP`：\n\n```\nImport> help\n```\n\n交互式命令模式的导入命令总结在\
    \ [表 8-2](#9781484207642_Ch08.xhtml#Tab2) 中。\n\n**表 8-2**. 导入交互式命令\n\n| 命令 | 描述\
    \ |\n| --- | --- |\n| `CONTINUE_CLIENT` | 继续交互式日志记录模式 |\n| `EXIT_CLIENT` | 退出客户端会话并返回到操作系统提示符。让当前作业继续运行\
    \ |\n| `HELP` | 显示可用的交互式命令 |\n| `KILL_JOB` | 终止客户端当前连接到的作业 |\n| `PARALLEL` | 增加或减少并行度\
    \ |\n| `START_JOB` | 重新启动先前停止的作业 |"
  raw: 'dmp directory=dp_dir full=y \ compression=all compression_algorithm=MEDIUM
    ```    Using the `COMPRESSION_ALGORITHM` parameter can be especially useful if
    you’re running low on disk space or exporting over a network connection (as it
    reduces the number of bytes that need to be transferred).    ![Image](images/sq.jpg) **Note**  The
    `COMPRESSION_ALGORITHM` parameter requires a license for the Oracle Advanced Compression
    option.    Changing Table Compression Characteristics on Import    Starting with
    Oracle 12c, you can change a table’s compression characteristics when importing
    the table. This example changes the compression characteristics for all tables
    imported in the job to `COMPRESS FOR OLTP`. Because the command in this example
    requires quotation marks, it’s placed in a parameter file, as shown:    ``` userid=mv_maint/foo
    dumpfile=inv.dmp directory=dp_dir transform=table_compression_clause:"COMPRESS
    FOR OLTP" ```    Assume that the parameter file is named `imp.par`. It can now
    be invoked as follows:    ``` $ impdp parfile=imp.par ```    All tables included
    in the import job are created as `COMPRESS FOR OLTP`, and the data are compressed
    as they’re loaded.    ![Image](images/sq.jpg) **Note**  Table-level compression
    (for OLTP) requires a license for the Oracle Advanced Compression option.    Encrypting
    Data    One potential security issue with Data Pump dump files is that anybody
    with OS access to the output file can search for strings in the file. On Linux/Unix
    systems, you can do this with the `strings` command:    ``` $ strings inv.dmp
    | grep -i secret ```    Here is the output for this particular dump file:    ```
    Secret Data< top secret data< corporate secret data< ```    This command allows
    you to view the contents of the dump file because the data are in regular text
    and not encrypted. If you require that the data be secured, you can use Data Pump’s
    encryption features.    This example uses the `ENCRYPTION` parameter to secure
    all data and metadata in the output:    ``` $ expdp mv_maint/foo encryption=all
    directory=dp_dir dumpfile=inv.dmp ```    For this command to work, your database
    must have an encryption wallet in place and open. See the *Oracle Advanced Security
    Administrator’s Guide*, available for download from the Technology Network area
    of the Oracle web site (`http://otn.oracle.com`), for more details on how to create
    and open a wallet.    ![Image](images/sq.jpg) **Note**  The Data Pump `ENCRYPTION`
    parameter requires that you use the Enterprise Edition of Oracle 11g or higher
    and also requires a license for the Oracle Advanced Security option.    The `ENCRYPTION`
    parameter takes the following options:    *   `ALL` *   `DATA_ONLY` *   `ENCRYPTED_COLUMNS_ONLY`
    *   `METADATA_ONLY` *   `NONE`    The `ALL` option enables encryption for both
    data and metadata. The `DATA_ONLY` option encrypts just the data. The `ENCRYPTED_COLUMNS_ONLY`
    option specifies that only columns encrypted in the database are written to the
    dump file in an encrypted format. The `METADATA_ONLY` option encrypts just metadata
    in the export file.    Exporting Views As Tables    Starting with Oracle 12c,
    you can export a view and later import it as a table. You may want to do this
    if you need to replicate the data contained in a view to a historical reporting
    database.    Use the `VIEWS_AS_TABLES` parameter to export a view into a table
    structure. This parameter has the following syntax:    ``` VIEWS_AS_TABLES=[schema_name.]view_name[:template_table_name]
    ```    Here is an example:    ``` $ expdp mv_maint/foo directory=dp_dir dumpfile=v.dmp
    \ views_as_tables=sales_rockies ```    The dump file can now be used to import
    a table named `SALES_ROCKIES` into a different schema or database.    ``` $ impdp
    mv_maint/foo directory=dp_dir dumpfile=v.dmp ```    If you just want to import
    the table (which was created from a view during the export), you can do so as
    follows:    ``` $ impdp mv_maint/foo directory=dp_dir dumpfile=v.


    dmp tables=sales_rockies ```    The table will have the same columns and data
    types as per the view definition. The table will additionally contain rows of
    data that match what would have been selected from the view at the time of the
    export.    Disabling Logging of Redo on Import    Starting with Oracle 12c, you
    can specify that objects be loaded with nologging of redo. This is achieved via
    the `DISABLE_ARCHIVE_LOGGING` parameter:    ``` $ impdp mv_maint/foo directory=dp_dir
    dumpfile=inv.dmp \ transform=disable_archive_logging:Y ```    While performing
    the import, the logging attributes for objects are set to `NO`; after the import
    the logging attributes are set back to their original values. For operations that
    Data Pump can perform with direct path (such as inserting into a table), this
    can reduce the amount of redo generated during an import.    Interactive Command
    Mode    Data Pump provides an interactive command mode that allows you to monitor
    the status of a Data Pump job and modify on the fly a number of job characteristics.
    The interactive command mode is most useful for long-running Data Pump operations.
    In this mode, you can also stop, restart, or terminate a currently running job.
    Each of these activities is discussed in the following sections.    Entering Interactive
    Command Mode    There are two ways to access the interactive command mode prompt:    *   Press
    Ctrl+C in a Data Pump job that you started via `expdp` or `impdp`. *   Use the
    `ATTACH` parameter to attach to a currently running job.    When you run a Data
    Pump job from the command line, you’re placed in the command-line mode. You should
    see output displayed to your terminal as a job progresses. If you want to exit
    command-line mode, press Ctrl+C. This places you in the interactive command-interface
    mode. For an export job, the prompt is    ``` Export> ```    Type in the `HELP`
    command to view the export interactive commands available (see [Table 8-1](#9781484207642_Ch08.xhtml#Tab1)):    ```
    Export> help ```    [Table 8-1](#9781484207642_Ch08.xhtml#_Tab1). Export Interactive
    Commands     | Command | Description | | --- | --- | | `ADD_FILE` | Adds files
    to the export dump set | | `CONTINUE_CLIENT` | Continues with interactive client
    mode | | `EXIT_CLIENT` | Exits the client session and returns to the OS prompt;
    leaves the current job running | | `FILESIZE` | Defines file size for any subsequently
    created dump files | | `HELP` | Displays interactive export commands | | `KILL_JOB`
    | Terminates the current job | | `PARALLEL` | Increases or decreases the degree
    of parallelism | | `REUSE_DUMPFILES` | Overwrites the dump file if it exists (default
    is `N`) | | `START_JOB` | Restarts the attached job | | `STATUS` | Displays the
    status of the currently attached job | | `STOP_JOB [=IMMEDIATE]` | Stops a job
    from processing (you can later restart it). Using the `IMMEDIATE` parameter quickly
    stops the job, but there may be some incomplete tasks. |    Type `EXIT` to leave
    interactive command mode:    ``` Export> exit ```    You should now be at the
    OS prompt.    You can press Ctrl+C for either an export or an import job. For
    an import job the interactive command mode prompt is    ``` Import> ```    To
    view all commands available, type `HELP`:    ``` Import> help ```    The interactive
    command mode import commands are summarized in [Table 8-2](#9781484207642_Ch08.xhtml#Tab2).    [Table
    8-2](#9781484207642_Ch08.xhtml#_Tab2). Import Interactive Commands     | Command
    | Description | | --- | --- | | `CONTINUE_CLIENT` | Continues with interactive
    logging mode | | `EXIT_CLIENT` | Exits the client session and returns to the OS
    prompt. Leaves the current job running | | `HELP` | Displays the available interactive
    commands | | `KILL_JOB` | Terminates the job currently connected to in the client
    | | `PARALLEL` | Increases or decreases the degree of parallelism | | `START_JOB`
    | Restarts a previously stopped job.'
