- fmt: '# On Windows


    在 Windows 上，操作系统用户必须是 `ora_dba` 组或 `ora_oper` 组的成员。在 Windows 环境中，您可以按照以下步骤验证哪些操作系统用户属于
    `ora_dba` 组：选择控制面板 ![image](images/arrow.jpg) 管理工具 ![image](images/arrow.jpg)
    计算机管理 ![image](images/arrow.jpg) 本地用户和组 ![image](images/arrow.jpg) 组。您应该能看到一个名为
    `ora_dba` 的组。您可以单击该组并查看分配了哪些操作系统用户。此外，要在 Windows 环境中使操作系统认证正常工作，您的 `sqlnet.ora`
    文件中必须包含以下条目：`SQLNET.AUTHENTICATION_SERVICES=(NTS)`。


    # On Linux/Unix


    在 Linux/Unix 上，您可以使用不带任何参数的 `id` 命令快速验证您的帐户所属的操作系统组：


    ```

    $ id

    uid=500(oracle) gid=500(oinstall) groups=500(oinstall),501(dba),502(oper),503(asmdba),

    504(asmoper),505(asmadmin),506(backupdba)

    ```


    前面的输出表明 `oracle` 用户包含在几个组中，其中一个是 `dba`。任何属于 `dba` 组的用户都可以使用 `SYSDBA` 权限连接到数据库。拥有
    `SYSDBA` 权限的用户可以启动和停止数据库。此示例使用操作系统认证以 `SYS` 用户身份连接到您的数据库：


    ```

    $ sqlplus / as sysdba

    ```


    使用操作系统认证时不需要用户名或密码（因此只有一个斜杠而没有用户/密码），因为 Oracle 首先检查操作系统用户是否是特权操作系统组的成员，如果是，则连接而不检查用户名/密码。您可以通过发出以下命令来验证是否已作为
    `SYS` 连接：


    ```

    SQL> show user

    USER is "SYS"

    ```


    特权操作系统组是在安装 Oracle 软件时建立的。有几个与备份和恢复相关的操作系统组：


    *   `dba`

    *   `oper`

    *   `backupdba`（从 Oracle 12c 开始提供）


    每个操作系统组对应某些数据库权限。[表 1-1](#9781484207642_Ch01.xhtml#Tab1) 显示了操作系统组到数据库系统权限和操作的映射。


    [表 1-1](#9781484207642_Ch01.xhtml#_Tab1). 操作系统组到与备份和恢复相关权限的映射


    | 操作系统组 | 数据库系统权限 | 授权的操作 |

    | --- | --- | --- |

    | `dba` | `sysdba` | 启动、关闭、更改数据库、创建和删除数据库、切换归档日志模式、备份和恢复数据库。 |

    | `oinstall` | `none` | 安装和升级 Oracle 二进制文件。 |

    | `oper` | `sysoper` | 启动、关闭、更改数据库、切换归档日志模式、备份和恢复数据库。 |

    | `backupdba` | `sysbackup` | 从 Oracle 12*c* 开始可用，此权限允许您启动、关闭并执行所有备份和恢复操作。 |


    # Using a Password File


    如果您不使用操作系统认证，那么您可以使用密码文件以特权用户身份连接到数据库。密码文件允许您从 SQL*Plus 或 RMAN 执行以下操作：


    *   以非 `SYS` 数据库用户身份使用 `sys*` 权限连接到您的数据库

    *   通过网络使用 `sys*` 权限连接到远程数据库


    密码文件必须使用 `orapwd` 实用程序手动创建，并通过 SQL `grant` 命令填充。要实现密码文件，请执行以下步骤：


    1.  使用 `orapwd` 实用程序创建密码文件。

    2.  将初始化参数 `remote_login_passwordfile` 设置为 `exclusive`。


    在 Linux/Unix 环境中，使用 `orapwd` 实用程序创建密码文件，如下所示：


    ```

    $ cd $ORACLE_HOME/dbs

    $ orapwd file=orapw$ORACLE_SID password=<sys password>

    ```


    在 Linux/Unix 环境中，密码文件通常存储在 `ORACLE_HOME/dbs` 目录中，在 Windows 中，它通常放置在 `ORACLE_HOME\database`
    目录中。您在上一条命令中指定的文件名格式可能因操作系统而异。例如，在 Windows 上格式是 `PWD<ORACLE_SID>.ora`。以下显示了 Windows
    环境中的语法：


    ```

    c:\> cd %ORACLE_HOME%\database

    c:\> orapwd file=PWD<ORACLE_SID>.ora password=<sys password>

    ```


    要启用密码文件的使用，请将初始化参数 `remote_login_passwordfile` 设置为 `exclusive`（这是默认值）。您可以如下所示验证其值：


    ```

    SQL> show parameter remote_login_password


    NAME                                 TYPE        VALUE

    --------------------------           ------      ---------

    remote_login_passwordfile            string      EXCLUSIVE

    ```


    如果需要，您可以手动设置 `remote_login_passwordfile` 参数，如下所示：


    ```

    $ sqlplus / as sysdba

    SQL> alter system set remote_login_passwordfile=exclusive scope=spfile;

    ```


    然后您需要停止并启动数据库以使此参数生效（有关停止/启动数据库的更多详细信息将在本章后面介绍）。前面的示例假设您使用的是服务器参数文件（`spfile`）。如果您没有使用
    `spfile`，则必须通过文本编辑器手动编辑 `init.ora` 文件并添加此条目：


    ```

    remote_login_passwordfile=exclusive

    ```


    然后停止并启动数据库以实例化该参数。启用密码文件后，您就可以创建数据库用户并根据需要为他们分配 `sys*` 权限。例如，假设您有一个名为 `DBA_MAINT`
    的数据库用户，您想授予其 `SYSBACKUP` 权限：


    ```

    $ sqlplus / as sysdba

    SQL> grant sysbackup to dba_maint;

    ```


    使用密码文件连接到数据库的语法如下：


    ```

    $ sqlplus <username>/<password>[@<db conn string>] as sys[dba|oper|backup]

    ```


    例如，使用 `DBA_MAINT` 数据库用户，您可以使用 `SYSBACKUP` 权限连接到数据库，如下所示：


    ```

    $ sqlplus dba_maint/foo as sysbackup

    ```


    因为您提供了用户名/密码并尝试以 `sys*` 级别权限（作为非 `SYS` 用户）连接，Oracle 将验证密码文件是否就位（对于本地数据库），并且提供的用户名/密码是否在密码文件中。您可以通过查询
    `V$PWFILE_USERS` 视图来验证哪些用户具有 `sys*` 权限：


    ```

    SQL> select * from v$pwfile_users;

    ```


    以下是一些示例输出：


    ```

    USERNAME                       SYSDB SYSOP SYSAS SYSBA SYSDG SYSKM     CON_ID

    -----------------              ----- ----- ----- ----- ----- ----- ----------

    SYS                            TRUE  TRUE  FALSE FALSE FALSE FALSE          0

    DBA_MAINT                      FALSE FALSE FALSE TRUE  FALSE FALSE          0

    ```


    ## OS AUTHENTICATION VS. PASSWORD FILE


    对于本地连接（在物理登录到数据库服务器时进行），操作系统认证优先于密码文件认证。换句话说，如果您登录到一个属于已认证组（如 `dba`）的操作系统帐户，那么在使用
    `sys*` 权限连接到本地数据库时，您输入什么用户名和密码并不重要。例如，您可以使用不存在的用户名/密码以 `sysdba` 身份连接：


    ```

    $ sqlplus bogus/wrong as sysdba

    SQL> show user;

    USER is "SYS"

    ```


    前面的连接有效，因为 Oracle 忽略了提供的用户名/密码，因为用户首先通过操作系统认证进行了验证。但是，当您不使用操作系统认证来建立特权本地连接，或者当您尝试通过网络连接到远程数据库时，则会使用密码文件。'
  raw: 'On Windows, the OS user must be part of either the `ora_dba` group or the
    `ora_oper` group. In Windows environments, you can verify which OS users belong
    to the `ora_dba` group as follows: select Control Panel ![image](images/arrow.jpg)
    Administrative Tools ![image](images/arrow.jpg) Computer Management ![image](images/arrow.jpg)
    Local Users and Groups ![image](images/arrow.jpg) Groups. You should see a group
    named something like `ora_dba`. You can click that group and view which OS users
    are assigned to it. Additionally, for OS authentication to work in Windows environments,
    you must have the following entry in your `sqlnet.ora` file: `SQLNET.AUTHENTICATION_SERVICES=(NTS)`.


    On Linux/Unix, you can quickly verify the operating system groups that your account
    belongs to using the `id` command without any parameters:


    ```

    $ id

    uid=500(oracle) gid=500(oinstall) groups=500(oinstall),501(dba),502(oper),503(asmdba),

    504(asmoper),505(asmadmin),506(backupdba)

    ```


    The prior output indicates that the `oracle` user is included in several groups,
    one of which is `dba`. Any user who belongs to the `dba` group can connect to
    the database with `SYSDBA` privileges. A user with `SYSDBA` privileges can start
    and stop the database. This example uses OS authentication to connect to your
    database as the user `SYS`:


    ```

    $ sqlplus / as sysdba

    ```


    No username or password is required when using OS authentication (hence just the
    slash without a user/password) because Oracle first checks to see if the OS user
    is a member of a privileged OS group, and if so, connects without checking the
    username/password. You can verify that you have connected as `SYS` by issuing
    the following:


    ```

    SQL> show user

    USER is "SYS"

    ```


    The privileged OS groups are established when installing the Oracle software.
    There are a few OS groups that pertain to backup and recovery:


    *   `dba`

    *   `oper`

    *   `backupdba` (available starting with Oracle 12c)


    Each OS group corresponds to certain database privileges. [Table 1-1](#9781484207642_Ch01.xhtml#Tab1)
    shows the mapping of OS groups to database system privileges and operations.


    [Table 1-1](#9781484207642_Ch01.xhtml#_Tab1). Mapping of OS Groups to Privileges
    Related to Backup and Recovery


    | Operating System Group | Database System Privilege | Authorized Operations |

    | --- | --- | --- |

    | `dba` | `sysdba` | Start up, shut down, alter database, create and drop database,
    toggle archivelog mode, back up, and recover database. |

    | `oinstall` | `none` | Install and upgrade Oracle binaries. |

    | `oper` | `sysoper` | Start up, shut down, alter database, toggle archivelog
    mode, back up, and recover database. |

    | `backupdba` | `sysbackup` | Available starting with Oracle 12*c*, this privilege
    allows you to start up, shut down, and perform all backup and recovery operations.
    |


    Using a Password File


    If you aren’t using OS authentication, then you can use a password file to connect
    to the database as a privileged user. A password file allows you to do the following
    from SQL*Plus or RMAN:


    *   Connect to your database with `sys*` privileges as a non-`SYS` database user

    *   Connect to remote database (over the network) with `sys*` privileges


    The password file must be manually created with the `orapwd` utility and is populated
    via the SQL `grant` command. To implement a password file, perform the following
    steps:


    1.  Create the password file with the `orapwd` utility.

    2.  Set the initialization parameter `remote_login_passwordfile` to `exclusive`.


    In a Linux/Unix environment, use the `orapwd` utility to create a password file
    as follows:


    ```

    $ cd $ORACLE_HOME/dbs

    $ orapwd file=orapw$ORACLE_SID password=<sys password>

    ```


    In a Linux/Unix environment, the password file is usually stored in the `ORACLE_HOME/dbs`
    directory, and in Windows, it’s typically placed in the `ORACLE_HOME\database`
    directory. The format of the file name that you specify in the previous command
    may vary by OS. For example, on Windows the format is `PWD<ORACLE_SID>.ora`. The
    following shows the syntax in a Windows environment:


    ```

    c:\> cd %ORACLE_HOME%\database

    c:\> orapwd file=PWD<ORACLE_SID>.ora password=<sys password>

    ```


    To enable the use of the password file, set the initialization parameter `remote_login_passwordfile`
    to `exclusive` (this is the default value). You can verify its value as shown
    next:


    ```

    SQL> show parameter remote_login_password


    NAME                                 TYPE        VALUE

    --------------------------           ------      ---------

    remote_login_passwordfile            string      EXCLUSIVE

    ```


    If need be, you can manually set the `remote_login_passwordfile` parameter as
    shown:


    ```

    $ sqlplus / as sysdba

    SQL> alter system set remote_login_passwordfile=exclusive scope=spfile;

    ```


    You will then need to stop and start your database for this parameter to take
    effect (more details on stopping/starting your database later in this chapter).
    The prior example assumes you are using a server parameter file (`spfile`). If
    you are not using a `spfile`, you will have to manually edit the `init.ora` file
    by adding this entry with a text editor:


    ```

    remote_login_passwordfile=exclusive

    ```


    Then stop and start your database to instantiate the parameter. Once the password
    file is enabled, you can then create database users and assign them the `sys*`
    privileges as required. For example, suppose you had a database user named `DBA_MAINT`
    that you wanted to grant `SYSBACKUP` privileges:


    ```

    $ sqlplus / as sysdba

    SQL> grant sysbackup to dba_maint;

    ```


    The syntax for using a password file to connect to a database is as follows:


    ```

    $ sqlplus <username>/<password>[@<db conn string>] as sys[dba|oper|backup]

    ```


    For example, using the `DBA_MAINT` database user, you can connect to the database
    with `SYSBACKUP` privileges as follows:


    ```

    $ sqlplus dba_maint/foo as sysbackup

    ```


    Because you are providing a username/password and attempting to connect with a
    `sys*` level privilege (as a non-`SYS` user), Oracle will verify that a password
    file is in place (for the local database) and that the supplied username/password
    is in the password file. You can verify which users have `sys*` privileges by
    querying the `V$PWFILE_USERS` view:


    ```

    SQL> select * from v$pwfile_users;

    ```


    Here is some sample output:


    ```

    USERNAME                       SYSDB SYSOP SYSAS SYSBA SYSDG SYSKM     CON_ID

    -----------------              ----- ----- ----- ----- ----- ----- ----------

    SYS                            TRUE  TRUE  FALSE FALSE FALSE FALSE          0

    DBA_MAINT                      FALSE FALSE FALSE TRUE  FALSE FALSE          0

    ```


    **OS AUTHENTICATION** **VS. PASSWORD FILE**


    For local connections (made while physically logged on to the database server),
    operating system authentication takes precedence over password file authentication.
    In other words, if you’re logged on to an OS account that is a member of an authenticated
    group, such as `dba`, it doesn’t matter what you type in for the username and
    password when connecting to a local database with `sys*` privileges. For example,
    you can connect as `sysdba` with a nonexistent username/password:


    `$ sqlplus bogus/wrong as sysdba`

    `SQL> show user;`

    `USER is "SYS"`


    The prior connection works because Oracle ignores the username/password provided,
    as the user was first verified via OS authentication. However, a password file
    is used when you’re not using OS authentication to establish a privileged local
    connection or when you’re trying to make a privileged connection to a remote database
    via the network.'
