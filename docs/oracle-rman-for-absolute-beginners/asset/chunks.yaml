    例如，在参数文件中设置 `exclude=TRIGGER,PROCEDURE`。\n\n可以通过添加 SQL 子句来进一步细化排除条件。例如，如果不想导入以字母\
    \ `B` 开头的触发器，参数文件内容如下：\n```\nuserid=mv_maint/foo\ndirectory=dp_dir\ndumpfile=inv.dmp\n\
    schemas=HEERA\nexclude=trigger:\"like 'B%'\"\n```\n\n### 包含对象导入\n\n可以使用 `INCLUDE`\
    \ 参数来限制导入的内容。假设需要从某个模式中导入所有以字母 `A` 开头的表，参数文件如下：\n```\nuserid=mv_maint/foo\ndirectory=dp_dir\n\
    dumpfile=inv.dmp\nschemas=HEERA\ninclude=table:\"like 'A%'\"\n```\n\n将上述内容保存到名为\
    \ `h.par` 的文件后，可以按如下方式调用参数文件：\n```\n$ impdp parfile=h.par\n```\n\n在此示例中，`HEERA`\
    \ 模式必须已存在。只有以字母 `A` 开头的表会被导入。\n\n## 常见 Data Pump 任务\n\n以下各节介绍 Data Pump 的常用功能。其中许多功能是\
    \ Data Pump 的标准功能，例如创建一致性导出以及处理导入对象已存在于数据库中的情况。其他功能，如压缩和加密，则需要 Oracle 企业版或额外许可，或两者兼需。在介绍相关\
    \ Data Pump 元素时，我会指出这些要求（如适用）。\n\n### 估算导出作业大小\n\n如果即将导出大量数据，可以在运行导出前估算 Data Pump\
    \ 创建的文件大小。这样做可能是因为担心导出作业所需的空间量。\n\n要估算大小，请使用 `ESTIMATE_ONLY` 参数。此示例估算整个数据库导出文件的大小：\n\
    ```\n$ expdp mv_maint/foo estimate_only=y full=y logfile=n\n```\n\n部分输出示例如下：\n\
    ```\nEstimate in progress using BLOCKS method...\nTotal estimation using BLOCKS\
    \ method: 6.75 GB\n```\n\n同样，可以指定模式名来估算导出特定用户所需的空间大小：\n```\n$ expdp mv_maint/foo\
    \ estimate_only=y schemas=star2 logfile=n\n```\n\n以下示例演示了估算两张表所需大小：\n```\n$ expdp\
    \ mv_maint/foo estimate_only=y tables=star2.f_configs,star2.f_installations \\\
    \nlogfile=n\n```\n\n### 列出转储文件内容\n\nData Pump 提供了一种非常强大的方法来创建包含导入作业运行时执行的所有 SQL\
    \ 语句的文件。Data Pump 使用 `DBMS_METADATA` 包来创建可用于在 Data Pump 转储文件中重建对象的 DDL。\n\n使用\
    \ Data Pump 导入的 `SQLFILE` 选项可以列出 Data Pump 导出文件的内容。此示例创建一个名为 `expfull.sql` 的文件，其中包含导入过程将调用的\
    \ SQL 语句（文件放置在由 `DPUMP_DIR2` 目录对象定义的目录中）：\n```\n$ impdp hr/hr DIRECTORY=dpump_dir1\
    \ DUMPFILE=expfull.dmp \\\nSQLFILE=dpump_dir2:expfull.sql\n```\n\n如果未指定单独的目录（例如上例中的\
    \ `dpump_dir2`），则 SQL 文件将写入 `DIRECTORY` 选项指定的位置。\n\n```\nTip\n```\n必须使用具有 DBA\
    \ 权限的用户或执行 Data Pump 导出的模式用户来运行上述命令。否则，将得到一个不包含预期 SQL 语句的空 SQL 文件。\n\n当对导入使用 `SQLFILE`\
    \ 选项时，`impdp` 进程不会导入任何数据；它仅创建一个包含导入过程将运行的 SQL 命令的文件。\n\n有时生成 SQL 文件非常方便，原因如下：\n\
    * 在运行导入前预览和验证 SQL 语句\n* 手动运行 SQL 以预创建数据库对象\n* 捕获重建数据库对象（用户、表、索引等）所需的 SQL\n\n关于最后一点，有时签入源代码控制仓库的内容与实际应用于生产数据库的内容并不匹配。此过程对于故障排除或记录数据库在某个时间点的状态非常方便。\n\
    \n### 克隆用户\n\n假设需要将用户对象和数据移动到新数据库。作为迁移的一部分，希望重命名该用户。首先，创建一个包含要克隆用户的模式级导出文件。在此示例中，用户名为\
    \ `INV`：\n```\n$ expdp mv_maint/foo directory=dp_dir schemas=inv dumpfile=inv.dmp\n\
    ```\n\n现在，可以使用 Data Pump 导入来克隆用户。如果要将用户移动到不同的数据库，请将转储文件复制到远程数据库，并使用 `REMAP_SCHEMA`\
    \ 参数创建用户的副本。在此示例中，`INV` 用户被克隆为 `INV_DW` 用户：\n```\n$ impdp mv_maint/foo directory=dp_dir\
    \ remap_schema=inv:inv_dw dumpfile=inv.dmp\n```\n\n此命令将 `INV` 用户中的所有结构和数据复制到 `INV_DW`\
    \ 用户。最终的 `INV_DW` 用户在对象方面与 `INV` 用户相同。复制的模式也包含与源模式相同的密码。\n\n如果只想将元数据从一个模式复制到另一个模式，请使用带有\
    \ `METADATA_ONLY` 选项的 `CONTENT` 参数：\n```\n$ impdp mv_maint/foo directory=dp_dir\
    \ remap_schema=inv:inv_dw \\\ncontent=metadata_only dumpfile=inv.dmp\n```\n\n\
    `REMAP_SCHEMA` 参数提供了一种高效复制模式的方法，无论是否包含数据。在模式复制操作期间，如果希望更改对象所在的表空间，还可以使用 `REMAP_TABLESPACE`\
    \ 参数。这允许您复制模式并将对象放置在与源对象不同的表空间中。\n\n也可以无需先创建转储文件就将用户从一个数据库复制到另一个数据库。为此，请使用 `NETWORK_LINK`\
    \ 参数。有关直接从一个数据库复制数据的详细信息，请参阅本章前面的“直接通过网络导出和导入”部分。\n\n### 创建一致性导出\n\n一致性导出意味着导出文件中的所有数据都截至某个时间点或\
    \ SCN 一致。当导出具有许多父-子表的活动数据库时，应确保获得数据的一致性快照。\n\n```\nTip\n```\n如果使用的是 Oracle 11g\
    \ Release 2 或更高版本，可以通过调用传统模式参数 `CONSISTENT=Y` 来进行一致性导出。有关详细信息，请参阅本章后面的“Data Pump\
    \ 传统模式”部分。\n\n通过使用 `FLASHBACK_SCN` 或 `FLASHBACK_TIME` 参数可以创建一致性导出。此示例使用 `FLASHBACK_SCN`\
    \ 参数进行导出。要确定数据集的当前 SCN 值，请发出以下查询：\n```\nSQL> select current_scn from v$database;\n\
    ```\n\n典型输出如下：\n```\n CURRENT_SCN\n-----------\n     5715397\n```\n\n以下命令使用 `FLASHBACK_SCN`\
    \ 参数对数据库进行一致性完全导出：\n```\n$ expdp mv_maint/foo directory=dp_dir full=y flashback_scn=5715397\
    \ \\\ndumpfile=full.dmp\n```\n\n前面的导出命令确保所有导出的数据与指定 SCN 时数据库中已提交的任何事务保持一致。\n\n\
    当使用 `FLASHBACK_SCN` 参数时，Data Pump 确保导出文件中的数据截至指定的 SCN 是一致的。"
  raw: 'dmp directory=dp_dir exclude=TRIGGER,PROCEDURE ```    You can further refine
    what is excluded by adding an SQL clause. For example, say you want not to import
    triggers that begin with the letter `B`. Here is what the parameter file looks
    like:    ``` userid=mv_maint/foo directory=dp_dir dumpfile=inv.dmp schemas=HEERA
    exclude=trigger:"like ''B%''" ```    Including Objects in Import    You can use
    the `INCLUDE` parameter to reduce what is imported. Suppose you have a schema
    from which you want to import tables that begin with the letter `A`. Here is the
    parameter file:    ``` userid=mv_maint/foo directory=dp_dir dumpfile=inv.dmp schemas=HEERA
    include=table:"like ''A%''" ```    If you place the previous text in a file named
    `h.par`, then the parameter file can be invoked as follows:    ``` $ impdp parfile=h.par
    ```    In this example the `HEERA` schema must already exist. Only tables that
    start with the letter `A` are imported.    Common Data Pump Tasks    The following
    sections describe common features you can use with Data Pump. Many of these features
    are standard with Data Pump, such as creating a consistent export and taking action
    when imported objects already exist in the database. Other features, such as compression
    and encryption, require the Enterprise Edition of Oracle or an extra license,
    or both. I’ll point out these requirements (if relevant) for the Data Pump element
    being covered.    Estimating the Size of Export Jobs    If you’re about to export
    a large amount of data, you can estimate the size of the file that Data Pump creates
    before you run the export. You may want to do this because you’re concerned about
    the amount of space an export job needs.    To estimate the size, use the `ESTIMATE_ONLY`
    parameter. This example estimates the size of the export file for an entire database:    ```
    $ expdp mv_maint/foo estimate_only=y full=y logfile=n ```    Here is a snippet
    of the output:    ``` Estimate in progress using BLOCKS method... Total estimation
    using BLOCKS method: 6.75 GB ```    Similarly, you can specify a schema name to
    get an estimate of the size required to export a user:    ``` $ expdp mv_maint/foo
    estimate_only=y schemas=star2 logfile=n ```    Here is an example of estimating
    the size required for two tables:    ``` $ expdp mv_maint/foo estimate_only=y
    tables=star2.f_configs,star2.f_installations \ logfile=n ```    Listing the Contents
    of Dump Files    Data Pump has a very robust method of creating a file that contains
    all the SQL that’s executed when an import job runs. Data Pump uses the `DBMS_METADATA`
    package to create the DDL that you can use to recreate objects in the Data Pump
    dump file.    Use the `SQLFILE` option of Data Pump import to list the contents
    of a Data Pump export file. This example creates a file named `expfull.sql`, containing
    the SQL statements that the import process calls (the file is placed in the directory
    defined by the `DPUMP_DIR2` directory object):    ``` $ impdp hr/hr DIRECTORY=dpump_dir1
    DUMPFILE=expfull.dmp \ SQLFILE=dpump_dir2:expfull.sql ```    If you don’t specify
    a separate directory (such as `dpump_dir2`, in the previous example), then the
    SQL file is written to the location specified in the `DIRECTORY` option.    ![Image](images/sq.jpg) **Tip**  You
    must run the previous command as a user with DBA privileges or the schema that
    performed the Data Pump export. Otherwise, you get an empty SQL file without the
    expected SQL statements in it.    When you use the `SQLFILE` option with an import,
    the `impdp` process doesn’t import any data; it only creates a file that contains
    the SQL commands that would be run by the import process.


    It’s sometimes handy to generate an SQL file for the following reasons:    *   Preview
    and verify the SQL statements before running the import *   Run the SQL manually
    to precreate database objects *   Capture the SQL that would be required to recreate
    database objects (users, tables, index, and so on)    In regard to the last bulleted
    item, sometimes what’s checked into the source code control repository doesn’t
    match what’s really been applied to the production database. This procedure can
    be handy for troubleshooting or documenting the state of the database at a point
    in time.    Cloning a User    Suppose you need to move a user’s objects and data
    to a new database. As part of the migration, you want to rename the user. First,
    create a schema-level export file that contains the user you want to clone. In
    this example the user name is `INV`:    ``` $ expdp mv_maint/foo directory=dp_dir
    schemas=inv dumpfile=inv.dmp ```    Now, you can use Data Pump import to clone
    the user. If you want to move the user to a different database, copy the dump
    file to the remote database, and use the `REMAP_SCHEMA` parameter to create a
    copy of a user. In this example the `INV` user is cloned to the `INV_DW` user:    ```
    $ impdp mv_maint/foo directory=dp_dir remap_schema=inv:inv_dw dumpfile=inv.dmp
    ```    This command copies all structures and data in the `INV` user to the `INV_DW`
    user. The resulting `INV_DW` user is identical, in terms of objects, to the `INV`
    user. The duplicated schema also contains the same password as the schema from
    which it was copied.    If you just want to duplicate the metadata from one schema
    to another, use the `CONTENT` parameter with the `METADATA_ONLY` option:    ```
    $ impdp mv_maint/foo directory=dp_dir remap_schema=inv:inv_dw \ content=metadata_only
    dumpfile=inv.dmp ```    The `REMAP_SCHEMA` parameter provides an efficient way
    to duplicate a schema, with or without the data. During a schema duplication operation,
    if you want to change the tablespace in which the objects reside, also use the
    `REMAP_TABLESPACE` parameter. This allows you to duplicate a schema and also place
    the objects in a tablespace different from that of the source objects.    You
    can also duplicate a user from one database to another without first creating
    a dump file. To do this, use the `NETWORK_LINK` parameter. See the section “Exporting
    and Importing Directly Across the Network,” earlier in this chapter, for details
    on copying data directly from one database to another.    Creating a Consistent
    Export    A consistent export means that all data in the export file are consistent
    as of a time or an SCN. When you’re exporting an active database with many parent-child
    tables, you should ensure that you get a consistent snapshot of the data.    ![Image](images/sq.jpg) **Tip**  If
    you’re using Oracle 11g Release 2 or higher, you can take a consistent export
    by invoking the legacy mode parameter of `CONSISTENT=Y`. See the section “Data
    Pump Legacy Mode,” later in this chapter, for details.    You create a consistent
    export by using either the `FLASHBACK_SCN` or `FLASHBACK_TIME` parameter. This
    example uses the `FLASHBACK_SCN` parameter to take an export. To determine the
    current value of the SCN of your data set, issue this query:    ``` SQL> select
    current_scn from v$database; ```    Here is some typical output:    ```  CURRENT_SCN
    -----------     5715397 ```    The following command takes a consistent full export
    of the database, using the `FLASHBACK_SCN` parameter:    ``` $ expdp mv_maint/foo
    directory=dp_dir full=y flashback_scn=5715397 \ dumpfile=full.dmp ```    The previous
    export command ensures that all data exported are consistent with any transactions
    committed in the database as of the specified SCN.    When you use the `FLASHBACK_SCN`
    parameter, Data Pump ensures that the data in the export file are consistent as
    of the specified SCN.'
