    如果您已识别故障并查看了建议，则可以继续进行修复工作。如果您想在不实际运行命令的情况下检查 `REPAIR FAILURE` 命令将执行的操作，请使用 `PREVIEW`
    子句：


    ```

    RMAN> repair failure preview;

    ```


    在运行 `REPAIR FAILURE` 命令之前，请确保您首先在同一连接会话中运行了 `LIST FAILURE` 和 `ADVISE FAILURE`
    命令。换句话说，您所在的 RMAN 会话必须在运行 `REPAIR` 命令之前，在同一会话中运行过 `LIST` 和 `ADVISE` 命令。


    如果您对修复建议满意，则运行 `REPAIR FAILURE` 命令：


    ```

