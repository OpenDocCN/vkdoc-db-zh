    \ 操作系统变量定义了您安装 Oracle 软件的位置。SQL*Plus 中的 `hbdir` 变量指向热备份存放的目录。\n\n```bash\n#!/bin/bash\n\
    ORACLE_SID=O12C\nORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\nPATH=$PATH:$ORACLE_HOME/bin\n\
    #\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0 lines 132 verify off feed\
    \ off trimsp on\ndefine hbdir=/u01/hbackup/O12C\nspo hotback.sql\nselect 'spo\
    \ &&hbdir/hotlog.txt' from dual;\nselect 'select max(sequence#) from v\\$log;'\
    \ from dual;\nselect 'alter database begin backup;' from dual;\nselect '!cp '\
    \ || name || ' ' || '&&hbdir' from v\\$datafile;\nselect 'alter database end backup;'\
    \ from dual;\nselect 'alter database backup controlfile to ' || '''' || '&&hbdir'\n\
    \       || '/controlbk.ctl'  || '''' || ' reuse;' from dual;\nselect 'alter system\
    \ archive log current;' from dual;\nselect 'select max(sequence#) from v\\$log;'\
    \ from dual;\nselect 'select member from v\\$logfile;' from dual;\nselect 'spo\
    \ off;' from dual;\nspo off;\n@@hotback.sql\nEOF\n```\n\n该脚本会生成一个 `hotback.sql`\
