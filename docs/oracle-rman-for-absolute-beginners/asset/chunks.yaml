- fmt: '## Previewing Backups Used for Recovery


    You can determine which files `RMAN` will use for restore and recovery before
    you actually perform the restore and recovery. You can also instruct `RMAN` to
    verify the integrity of the backup files that will be used for the restore and
    recovery.


    Use the `RESTORE...PREVIEW` command to list the backups and archive redo log files
    that `RMAN` will use to restore and recover database data files. The `RESTORE...PREVIEW`
    command does not actually restore any files. Rather, it lists the backup files
    that will be used for a restore operation. This example previews in detail the
    backups required for restore and recovery for the entire database:


    ```

    RMAN> restore database preview;

    ```


    You can also preview require backup files at a summarized level of detail:


    ```

    RMAN> restore database preview summary;

    ```


    Here is a snippet of the output:


    ```

    List of Backups

    ===============

    Key     TY LV S Device Type Completion Time #Pieces #Copies Compress Tag

    ------- -- -- - ----------- --------------- ------- ------- -------- ---

    12      B  0  A DISK        28-SEP-14       1       1       YES      TAG20140928T110657

    11      B  0  A DISK        28-SEP-14       1       1       YES      TAG20140928T110657

    ```


    Here are some more examples of how to preview backups required for restore and
    recovery:


    ```

    RMAN> restore tablespace system preview;

    RMAN> restore archivelog from time ''sysdate -1'' preview;

    RMAN> restore datafile 1, 2, 3 preview;

    ```


    ## Validating Backup Files Before Restoring


    There are several levels of verification that you can perform on backup files
    without actually restoring anything. If you just want `RMAN` to verify that the
    files exist and check the file headers, then use the `RESTORE...VALIDATE HEADER`
    command, as shown:


    ```

    RMAN> restore database validate header;

    ```


    This command only validates the existence of backup files and checks the file
    headers. You can further instruct `RMAN` to verify the integrity of blocks within
    backup files required to restore the database data files via the `RESTORE...VALIDATE`
    command (sans the `HEADER` clause). Again, `RMAN` will not restore any data files
    in this mode:


    ```

    RMAN> restore database validate;

    ```


    This command only checks for physical corruption within the backup files. You
    can also check for logical corruption (along with physical corruption), as follows:


    ```

    RMAN> restore database validate check logical;

    ```


    Here are some other examples of using `RESTORE...VALIDATE`:


    ```

    RMAN> restore datafile 1,2,3 validate;

    RMAN> restore archivelog all validate;

    RMAN> restore controlfile validate;

    RMAN> restore tablespace system validate;

    ```


    ## Testing Media Recovery


    The prior sections covered reporting and verifying the restore operations. You
    can also instruct `RMAN` to verify the recovery process via the `RECOVER...TEST`
    command. Before performing a test recovery, you need to ensure that the data files
    being recovered are offline. Oracle will throw an error for any online data files
    being recovered in test mode.


    In this example the tablespace `USERS` is restored first, and then a trial recovery
    is performed:


    ```

    RMAN> connect target /

    RMAN> startup mount;

    RMAN> restore tablespace users;

    RMAN> recover tablespace users test;

    ```


    If there are any missing archive redo logs that are required for recovery, the
    following error is thrown:


    ```

    RMAN-06053: unable to perform media recovery because of missing log

    RMAN-06025: no backup of archived log for thread 1 with sequence 6...

    ```


    If the testing of the recovery succeeded, you’ll see messages such as the following,
    indicating that the application of redo was tested but not applied:


    ```

    ORA-10574: Test recovery did not corrupt any data block

    ORA-10573: Test recovery tested redo from change 4586939 to 4588462

    ORA-10572: Test recovery canceled due to errors

    ORA-10585: Test recovery can not apply redo that may modify control file

    ```


    Here are some other examples of testing the recovery process:


    ```

    RMAN> recover database test;

    RMAN> recover tablespace users, tools test;

    RMAN> recover datafile 1,2,3 test;

    ```


    ## Restoring and Recovering the Entire Database


    The `RESTORE DATABASE` command will restore every data file in your database.
    The exception to this is when `RMAN` detects that data files have already been
    restored; in that case, it will not restore them again. If you want to override
    that behavior, use the `FORCE` command.


    When you issue the `RECOVER DATABASE` command, `RMAN` will automatically apply
    redo to any data files that need recovery. The recovery process includes applying
    changes found in the following files:

    *   Incremental backup pieces (applicable only if using incremental backups)

    *   Archived redo log files (generated since the last backup or incremental backup
    applied)

    *   Online redo log files (current and unarchived)


    You can open your database after the restore-and-recovery process is complete.
    Complete database recovery works only if you have good backups of your database
    and access to all redo generated after the backup was taken. You need all the
    redo required to recover the database data files. If you don’t have all the required
    redo, then you’ll most likely have to perform an incomplete recovery (see the
    section “Incomplete Recovery,” later in this chapter).


    ![Image](images/sq.jpg) **Note**  Your database has to be at least mounted to
    restore data files, using `RMAN`. This is because `RMAN` reads information from
    the control file during the restore-and-recovery process.


    You can perform a complete database-level recovery with either the current control
    file or a backup control file.


    ### Using the Current Control File


    You must first put your database in mount mode to perform a database-wide restore
    and recovery. This is because Oracle won’t allow you to operate your database
    in open mode while data files associated with the `SYSTEM` tablespace are being
    restored and recovered. In this situation, start up the database in mount mode,
    issue the `RESTORE` and `RECOVER` commands, and then open the database, like so:


    ```

    $ rman target /

    RMAN> startup mount;

    RMAN> restore database;

    RMAN> recover database;

    RMAN> alter database open;

    ```


    If everything goes as expected, the last message you should see is this:


    ```

    Statement processed

    ```


    ### Using the Backup Control File


    This technique uses an autobackup of the control file retrieved from the `FRA`
    (see the section “Restoring a Control File,” later in this chapter, for more examples
    of how to restore your control file). In this scenario the control file is first
    retrieved from a backup before restoring and recovering the database:


    ```

    $ rman target /

    RMAN> startup nomount;

    RMAN> restore controlfile from autobackup;

    RMAN> alter database mount;

    RMAN> restore database;

    RMAN> recover database;

    RMAN> alter database open resetlogs;

    ```


    If successful, the last message you should see is this:


    ```

    Statement processed

    ```


    ## Restoring and Recovering Tablespaces


    Sometimes you’ll have a media failure that’s localized to a particular tablespace
    or set of tablespaces. In this situation, it’s appropriate to restore and recover
    at the tablespace level of granularity. The `RMAN` `RESTORE TABLESPACE` and `RECOVER
    TABLESPACE` commands will restore and recover all data files associated with the
    specified tablespace(s).


    ### Restoring Tablespaces While the Database Is Open


    If your database is open, then you must take offline the tablespace you want to
    restore and recover. You can do this for any tablespace except `SYSTEM` and `UNDO`.
    This example restores and recovers the `USERS` tablespace while the database is
    open:


    ```

    $ rman target /

    RMAN> sql ''alter tablespace users offline immediate'';

    RMAN> restore tablespace users;

    RMAN> recover tablespace users;

    RMAN> sql ''alter tablespace users online'';

    ```


    After the tablespace is brought online, you should see a message such as this:


    ```

    sql statement: alter tablespace users online

    ```'
