    SQL> alter database clear unarchived logfile group 2;

    ```


    If the cleared log group had not been previously archived, it’s critical that
    you immediately create a backup of your database. See [Chapter 5](#9781484207642_Ch05.xhtml)
    for details on taking a complete backup of your database.


    Keep in mind that in these prior examples the logfile group is number 2\. You’ll
    have to modify the group number to match the group number for your scenario.


    If the online redo log group is inactive and archived, then its contents aren’t
    required for crash or media recovery. Therefore it’s possible to use the `clear
    logfile` command to re-create all online redo log file members of a group.


    ![Image](images/sq.jpg) **Note**  The `clear logfile` command will drop and re-create
    all members of a log group for you. You can issue this command even if you have
    only two log groups in your database.


    If the online redo log group has not been archived, then it may be required for
    media recovery. In this case, use the `clear unarchived logfile` command to re-create
    the logfile group members. Back up your database as soon as possible in this situation.


    The unarchived log group may be needed for media recovery if the last database
    backups were taken before the redo information in the log was created. This means
    if you attempt to perform media recovery, you won’t be able to recover any information
    in the damaged log file or any transactions that were created after that log.


    If the clear logfile command does not succeed because of an I/O error and it’s
    a permanent problem, then you will need to consider dropping the log group and
    re-creating it in a different location. See the next two subsections for directions
    on how to drop and re-create a log file group.


    Dropping a Log File Group


    The alternative to clearing a logfile group (which tells Oracle to re-create the
    logfile) is to drop and re-create the logfile group. You might need to do this
    if you need to re-create the logfile group in a different location because the
    original location is damaged or not available.


    A log group has to have an inactive status before you can drop it. You can check
    the status of the log group, as shown here:


    ```

    SQL> select group#, status, archived, thread#, sequence# from v$log;

    ```


    You can drop a log group with the `drop logfile group` command:


    ```

    SQL> alter database drop logfile group <group #>;

    ```


    If you attempt to drop the current online log group, Oracle will return an ORA-01623
    error stating that you cannot drop the current group. Use the `alert system switch
    logfile` command to switch the logs and make the next group the current group.


    After a log switch, the log group that was previously the current group will retain
    an active status as long as it contains redo that Oracle requires to perform crash
    recovery. If you attempt to drop a log group with an active status, Oracle will
    throw an ORA-01624 error stating that the log group is required for crash recovery.
    Issue an `alter system checkpoint` command to make the log group inactive.


    Additionally, you cannot issue a drop logfile group command if it leaves you with
    only one log group left in your database. If you attempt to do this, Oracle will
    throw an ORA-01567 error and inform you that dropping the log group is not permitted
    because it would leave you with less than two logs groups for your database (Oracle
    minimally requires two log groups to function).


    Adding a Log File Group


    You can add a new log group with the `add logfile group` command:


    ```

    SQL> alter database add logfile group <group_#>

    (''/directory/file'') SIZE <bytes> K|M|G;

    ```


    You can specify the size of the log file in bytes, kilobytes, megabytes, or gigabytes.
    The following example adds a log group with two members sized at 50MB:


    ```

    SQL> alter database add logfile group 2

    (''/u01/oraredo/O12C/redo02a.rdo'',

     ''/u02/oraredo/O12C/redo02b.rdo'') SIZE 50M;

    ```


    If for some reason the log file members already exist on disk, you can use the
    reuse clause to overwrite them:'
