    要退出 RMAN，请输入如下 `exit` 命令：


    ```

    RMAN> exit

    ```


    ![Image](img/sq.jpg) **提示** 在 Linux 系统上，当从操作系统提示符下键入 `rman` 命令时，如果出现类似 “rman:
    can’t open target” 的错误，请确保您的 `PATH` 变量在 `/usr/X11R6/bin` 目录之前包含了 `ORACLE_HOME/bin`
    目录。


    ## 不要从 SQL*PLUS 中调用 RMAN


    我在当地一所高等教育学院教授 Oracle B&R 课程。几乎每个学期，都会有一个学生问为什么下面的 RMAN 命令不起作用：


    ```

    SQL> rman

    SP2-0042: unknown command "rman" - rest of line ignored.

    ```


    答案很简单：`rman` 客户端是一个操作系统实用程序，而不是 SQL*Plus 的功能。您必须从操作系统提示符调用 `rman` 客户端。


    请注意，连接到 RMAN 时，您不必像通过 SQL*Plus 以 `SYSDBA` 特权用户连接时那样指定 `sys*` 子句。这是因为 RMAN 总是要求您以具有
    `sys*` 权限的用户身份连接。因此，您必须使用操作系统验证的用户或具有 `sys*` 权限的用户名/密码（因此存在于口令文件中）连接到 RMAN。这与
    SQL*Plus 不同，在 SQL*Plus 中您可以选择以非特权用户身份连接。在 SQL*Plus 中，如果您想以具有 `sys*` 权限的用户身份连接，则必须在连接时指定
    `sys*` 子句。


    如果您尝试以不适当的权限连接到 RMAN，您会收到以下错误：


    ```

    ORA-01031: insufficient privileges

    ```


    诊断 `ORA-01031` 错误根本原因的一个有用方法是，尝试使用与尝试通过 RMAN 连接时相同的验证信息登录到 SQL*Plus。这将有助于验证您是使用操作系统验证的账户，还是用户名和密码正确。如果操作系统验证有效，您应该能够像这样登录到
    SQL*Plus：


    ```

    $ sqlplus / as sysdba

    ```


    如果您正在使用口令文件，可以通过如下登录来验证用户名和密码是否正确（并且该用户具有 `sysdba` 权限）：


    ```

    $ sqlplus <username>/<password> as sysdba

    ```


    如果您在尝试登录 SQL*Plus 时收到 `ORA-01031` 错误，那么要么您没有使用操作系统验证的账户，要么您的用户名和密码组合与存储在口令文件中的不匹配（对于尝试以
    `sys*` 权限连接的用户）。


    一旦连接到 RMAN，您就可以发出管理命令，如 `startup`、`shutdown`、`backup`、`restore` 和 `recover`。例如，如果您想要启动和停止数据库，可以在
    RMAN 中这样做：


    ```

    $ rman target /

    RMAN> startup;

    RMAN> shutdown immediate;

    ```


    这省去了您在发出管理命令时必须在 SQL*Plus 和 RMAN 之间来回切换的麻烦。


    ## 从 RMAN 中运行 SQL 命令


    从 Oracle 12c 开始，您可以直接从 RMAN 命令行运行许多 SQL 命令。在 Oracle 的早期版本中，当在 RMAN 中运行某些 SQL 命令时，您必须指定
    `sql` 子句。例如，假设您想运行 `alter system switch logfile` 命令。在 Oracle 12c 之前，您必须按如下方式指定该命令：


    ```

    RMAN> sql ''alter system switch logfile'';

    ```


    在 Oracle 12c 中，您可以直接运行 SQL：


    ```

    RMAN> alter system switch logfile;

    ```


    这是一个很好的易用性增强，因为它消除了对额外子句和命令周围引号的需要。


    ## RMAN 架构决策


    如果为您的数据库启用了归档（有关归档的详细信息，请参见 第 2 章），您可以开箱即用地使用 RMAN 来运行以下命令备份整个目标数据库：


    ```

    $ rman target /

    RMAN> backup database;

    ```


    如果遇到介质故障，您可以恢复所有数据文件，如下所示：


    ```

    RMAN> shutdown immediate;

    RMAN> startup mount;

    RMAN> restore database;

    ```


    数据库恢复后，您可以完全恢复它：


    ```

    RMAN> recover database;

    RMAN> alter database open;

    ```


    这样就大功告成了，对吗？不，还不完全是。RMAN 的默认属性对于简单的备份需求设置得相当合理。RMAN 的开箱即用设置可能适用于小型开发或测试数据库。但是，对于任何类型的业务关键型数据库，您都需要仔细考虑备份存储的位置、在磁盘或磁带上存储备份的时间长短、哪些
    RMAN 功能适用于该数据库等等。本章接下来的几节将指导您完成在生产环境中实施 RMAN 所需的许多 B&R 架构决策。RMAN 有丰富多样的选项可用于定制
    B&R；通常，您不需要实施 RMAN 的许多功能。但是，每次实施 RMAN 来备份生产数据库时，您都应该仔细考虑每个决策点，并决定是否需要某个属性。


    表 4-1 总结了 RMAN 的实施决策和建议。表中的每个决策点将在后续章节中详细阐述。许多 DBA 对其中一些建议会有不同的看法；这没关系。关键在于您需要考虑每个架构方面，并确定什么符合您的业务需求。


    表 4-1. 架构决策与建议概述

    '
- fmt: '# RMAN 备份关键决策点建议


    ## 决策与推荐配置


    | 决策点 | 建议 |

    | --- | --- |

    | 1. 远程还是本地运行 `RMAN` 客户端 | 在目标数据库服务器上本地运行客户端。 |

    | 2. 指定备份用户 | 除非有特定安全要求，否则使用 `SYS` 用户。 |

    | 3. 使用联机备份还是脱机备份 | 取决于您的业务需求。大多数生产数据库需要联机备份，这意味着您必须启用归档。 |

    | 4. 设置归档重做日志目标位置和文件格式 | 如果使用快速恢复区，归档日志将以默认格式写入其中。我更倾向于使用 `LOG_ARCHIVE_DEST_N`
    初始化参数来明确设置快速恢复区之外的位置。 |

    | 5. 配置 `RMAN` 备份位置和文件格式 | 取决于您的业务需求。有些环境需要磁带备份。如果使用磁盘，将备份放在快速恢复区中，或者通过通道设置指定位置。我更倾向于不使用快速恢复区，而是通过
    `CONFIGURE` 命令显式指定位置和文件格式。 |

    | 6. 设置控制文件的自动备份 | 始终启用控制文件的自动备份。 |

    | 7. 指定控制文件自动备份的位置 | 将其放在快速恢复区中，或配置一个特定位置。我倾向于将控制文件的自动备份写入与数据库备份相同的位置。 |

    | 8. 备份归档重做日志 | 取决于您的业务需求。对于许多环境，我会每天备份归档重做日志，使用与备份数据库相同的命令。 |

    | 9. 确定快照控制文件的位置 | 使用默认位置。 |

    | 10. 使用恢复目录 | 取决于您的业务需求。对于许多环境，我不使用恢复目录。Oracle 建议使用恢复目录。如果 `RMAN` 保留策略大于 `CONTROL_FILE_RECORD_KEEP_TIME`，则建议使用恢复目录。
    |

    | 11. 使用介质管理器 | 这是直接备份到磁带所必需的。 |

    | 12. 设置 `CONTROL_FILE_RECORD_KEEP_TIME` 初始化参数 | 通常，默认的 7 天就足够了。 |

    | 13. 配置 `RMAN` 的备份保留策略 | 取决于您的数据库和业务需求。对于许多环境，我使用 1 或 2 的备份保留冗余度。 |

    | 14. 配置归档重做日志的删除策略 | 取决于您的数据库和业务需求。在许多场景中，将备份保留策略应用于归档重做日志就足够了（这是默认行为）。 |

    | 15. 设置并行度 | 取决于可用的硬件资源和业务需求。对于大多数具有多个 `CPU` 的生产服务器，我配置并行度为 2 或更高。 |

    | 16. 使用备份集还是映像副本 | 我更喜欢备份集。备份集通常比映像副本更小且更易于管理。 |

    | 17. 使用增量备份 | 当备份之间数据库变化百分比很小且希望节省磁盘空间时，对大型数据库使用增量备份。我经常在数据仓库类型的数据库中使用增量备份。 |

    | 18. 使用增量更新备份 | 如果需要数据文件的映像副本，请使用此方法。 |

    | 19. 使用块更改跟踪 | 使用此功能来提高增量备份的性能。对于大型数据仓库类型的数据库，块更改跟踪可以显著节省备份时间。 |

    | 20. 配置二进制压缩 | 取决于您的业务需求。压缩备份占用空间更少，但备份和恢复操作需要更多的 `CPU` 资源（和时间）。 |

    | 21. 配置加密 | 取决于您的业务需求。 |

    | 22. 配置其他设置 | 您可以设置许多通道相关属性，例如备份集大小和备份片大小。根据需要进行配置。 |

    | 23. 配置信息输出 | 配置操作系统变量 `NLS_DATE_FORMAT` 以显示日期和时间。使用 `SET ECHO ON` 和 `SHOW ALL`
    来显示 `RMAN` 命令和设置。 |'
  raw: '| Decision Point | Recommendation |

    | --- | --- |

    | 1\. Running the RMAN client remotely or locally | Run the client locally on
    the target database server. |

    | 2\. Specifying the backup user | Use `SYS` unless you have a security requirement
    that dictates otherwise. |

    | 3\. Using online or offline backups | Depends on your business requirements.
    Most production databases require online backups, which means that you must enable
    archiving. |

    | 4\. Setting the archive redo log destination and file format | If you’re using
    an FRA, archive logs are written there with a default format. I prefer to use
    the `LOG_ARCHIVE_DEST_N` initialization parameter to specifically set the location
    outside the FRA. |

    | 5\. Configuring the RMAN backup location and file format | Depends on your business
    requirements. Some shops require tape backups. If you’re using disk, place the
    backups in the FRA, or specify a location via channel settings. I prefer not to
    use an FRA and to explicitly specify the location and file format via a `CONFIGURE`
    command. |

    | 6\. Setting the autobackup of the control file | Always enable autobackup of
    the control file. |

    | 7\. Specifying the location of the autobackup of the control file | Either place
    it in the FRA, or con`figure` a location. I prefer to write the autobackup of
    the control file to the same location as that of the database backups. |

    | 8\. Backing up archive redo logs | Depends on your business requirements. For
    many environments, I back up the archive redo logs on a daily basis, with the
    same command I use to back up the database. |

    | 9\. Determining the location for the snapshot control file | Use the default
    location. |

    | 10\. Using a recovery catalog | Depends on your business requirements. For many
    environments, I don’t use a recovery catalog. Oracle recommends that you do use
    a recovery catalog. If the RMAN retention policy is greater than `CONTROL_FILE_RECORD_KEEP_TIME`,
    then I recommend that you use a recovery catalog. |

    | 11\. Using a media manager | This is required for backing up directly to tape.
    |

    | 12\. Setting the `CONTROL_FILE_RECORD_KEEP_TIME` initialization parameter |
    Usually, the default of 7 days is sufficient. |

    | 13\. Configuring RMAN’s backup retention policy | Depends on your database and
    business requirements. For many environments, I use a backup retention redundancy
    of 1 or 2. |

    | 14\. Configuring the archive redo logs’ deletion policy | Depends on your database
    and business requirements. In many scenarios, applying the backup retention policy
    to the archive redo logs is sufficient (this is the default behavior). |

    | 15\. Setting the degree of parallelism | Depends on the available hardware resources
    and business requirements. For most production servers, on which there are multiple
    CPUs, I configure a degree of parallelism of 2 or more. |

    | 16\. Using backup sets or image copies | I prefer backup sets. Backup sets are
    generally smaller than image copies and easier to manage. |

    | 17\. Using incremental backups | Use incremental backups for large databases
    when a small percentage of the database changes between backups and when you want
    to conserve on disk space. I often use incremental backups in data warehouse–type
    databases. |

    | 18\. Using incrementally updated backups | Use this approach if you require
    image copies of data files. |

    | 19\. Using block change tracking | Use this to improve the performance of incremental
    backups. For large, data warehouse–type databases, block change tracking can result
    in significant time savings for backups. |

    | 20\. Configuring binary compression | Depends on your business requirements.
    Compressed backups consume less space but require more CPU resources (and time)
    for backup and restore operations. |

    | 21\. Configuring encryption | Depends on your business requirements. |

    | 22\. Configuring miscellaneous settings | You can set many channel-related properties,
    such as the backup set size and backup piece size. Configure as needed. |

    | 23\.


    Configuring informational output | Configure the OS variable `NLS_DATE_FORMAT`
    to display date and time. Use `SET ECHO ON` and `SHOW ALL` to display RMAN commands
    and settings. |'
