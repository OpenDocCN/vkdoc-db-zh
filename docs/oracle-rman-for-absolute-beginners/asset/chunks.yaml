  trans: '

    # 1. 远程或本地运行 RMAN 客户端


    可以从远程服务器运行 `rman` 实用程序，并通过 Oracle Net 连接到目标数据库：


    ```bash

    $ rman target sys/foo@remote_db

    ```


    这使您可以从一个中央位置在不同的远程服务器上运行 RMAN 备份。当您远程运行 RMAN 时，备份文件总是在目标数据库服务器上创建。


    只要可能，我更倾向于在目标服务器上本地运行 `rman` 客户端并进行连接，如下所示：


    ```bash

    $ rman target /

    ```


    这种方法简单且能满足大多数需求。您无需担心网络问题或密码文件，并且 `rman` 客户端与目标数据库之间永远不会存在兼容性问题。如果您远程运行 RMAN，则需要确保远程的
    `rman` 可执行文件与目标数据库兼容。例如，您可能需要确认您运行的远程 `rman` 可执行文件是 Oracle 12c 版本的 RMAN 客户端，并需要确定是否可以将该客户端连接到远程的
    Oracle 9i 目标数据库。如果您在目标服务器上本地运行 `rman` 客户端，则永远不会出现兼容性问题，因为 `rman` 客户端始终与目标数据库版本相同。


    # 2. 指定备份用户


    如前所述，RMAN 要求您使用具有 `SYSDBA` 权限的数据库用户。无论我是从命令行运行 RMAN 还是在脚本中调用 RMAN，在大多数场景下，我都直接以
    `SYS` 身份连接到目标数据库。例如，以下是我如何从命令行连接到 RMAN：


    ```bash

    $ rman target /

    ```


    有些 DBA 不使用这种方法；他们选择建立一个独立于 `SYS` 的用户，并以安全问题作为这样做的理由。


    我更喜欢直接使用 `SYS` 帐户，因为当在服务器上本地连接到 RMAN 时，无需指定用户名和密码。这意味着您永远不必在任何备份脚本中硬编码用户名和密码，也不必在命令行上指定可能被恶意开发人员或旁观的管理员看到的用户名和密码。


    # 3. 使用联机或脱机备份


    大多数生产数据库都有 7x24 小时的可用性要求。因此，您唯一的选择是联机 RMAN 备份。要进行联机备份，您的数据库必须处于归档日志模式。您需要仔细考虑归档重做日志的存放位置、格式、备份频率以及删除前的保留时间。这些主题将在后续章节中讨论。


    ![Image](img/sq.jpg) **注意** 如果您进行脱机备份，必须使用 `IMMEDIATE`、`NORMAL` 或 `TRANSACTIONAL`
    选项关闭数据库，然后将其置于加载（mount）模式。RMAN 需要数据库处于加载模式，以便它可以读写控制文件。


    # 4. 设置归档重做日志目标位置和文件格式


    启用归档重做日志模式是进行联机备份的先决条件（有关归档重做日志目标位置和格式的架构决策以及如何启用/禁用归档日志模式的完整讨论，请参见第 2 章）。


    启用归档日志模式后，Oracle 会将归档重做日志写入以下一个或多个位置（您可以配置将归档重做日志写入 FRA 以及通过初始化参数手动设置的其他几个位置）：


    *   默认位置

    *   FRA

    *   通过 `LOG_ARCHIVE_DEST_N` 初始化参数指定的位置


    如果您不使用 FRA，并且也没有通过 `LOG_ARCHIVE_DEST_N` 初始化参数显式设置归档重做日志目标位置，那么默认情况下，归档重做日志将写入一个依赖于操作系统的位罝。在许多
    Linux/Unix 系统上，默认位置是 `ORACLE_HOME/dbs` 目录。归档重做日志的默认文件名格式为 `%t_%s_%r.dbf`。


    如果您启用了 FRA（并且没有设置 `LOG_ARCHIVE_DEST_N`），那么默认情况下，归档重做日志将写入 FRA 中的一个目录。在 FRA 中创建的归档重做日志文件的默认文件名格式是
    OMF 格式。文件存储在与数据库唯一名相同的子目录中；例如：


    ```text

    /<fra>/<dbuname>/archivelog/<YYYY_MM_DD>/o1_mf_1_1078_68dx5dyj_.arc

    ```


    Oracle 建议使用 FRA。我倾向于不使用 FRA，因为当 FRA 空间已满且旧文件清除不够及时导致数据库挂起时，我不喜欢被这种意外情况困扰。相反，我使用
    `LOG_ARCHIVE_DEST_N` 参数来设置归档重做日志文件的位置。以下是一个示例：


    ```sql

    log_archive_dest_1=''LOCATION=/oraarch1/CHNPRD''

    ```


    我也倾向于对归档日志文件名使用以下格式：


    ```sql

    log_archive_format=''%t_%s_%r.arc''

    ```


    ![Image](img/sq.jpg) **提示** 有时，DBA 对数据文件和归档重做日志文件都使用 `.dbf` 作为扩展名。我倾向于对归档重做日志文件使用
    `.arc`。`.arc` 扩展名可以避免将文件识别为归档重做日志文件还是活动数据库数据文件时可能引起的混淆。


    # 5. 配置 RMAN 备份位置和文件格式


    当您为基于磁盘的备份运行 `BACKUP` 命令时，RMAN 会在以下位置之一创建备份片：


    *   默认位置

    *   FRA

    *   通过 `BACKUP...FORMAT` 命令指定的位置

    *   通过 `CONFIGURE CHANNEL...FORMAT` 命令指定的位置


    在这些选项中，我倾向于最后一种；我更喜欢通过备份通道来指定目标位置。


    ## 默认位置


    如果您没有配置任何 RMAN 变量也没有设置 FRA，默认情况下，RMAN 会分配一个基于磁盘的通道，并将备份文件写入默认位置。例如，您可以运行以下命令而无需配置任何
    RMAN 参数：


    ```sql

    RMAN> backup database;

    ```


    默认位置因操作系统而异。在许多 Linux/Unix 环境中，默认位置是 `ORACLE_HOME/dbs`。创建的备份文件的默认名称格式是 OMF 格式；例如：


    ```text

    <ORACLE_HOME>/dbs/01ln9g7e_1_1

    ```


    ![Image](img/sq.jpg) **提示** 默认位置对于小型开发数据库来说是可以的。然而，对于大多数其他环境（尤其是生产环境），您需要提前规划备份所需的磁盘空间，并通过其他方法之一（如实施
    FRA 或 `CONFIGURE CHANNEL`）显式设置备份位置。


    ## FRA


    备份到磁盘时，如果您没有明确指示 RMAN 将备份写入特定位置（通过 `FORMAT` 或 `CONFIGURE` 命令），并且您正在使用 FRA，RMAN
    会自动将备份文件写入 FRA 中的目录。文件存储在与数据库唯一名相同的子目录中。此外，在 FRA 中创建的备份文件的默认名称格式是 OMF 格式；例如：


    ```text

    /<fra>/<dbuname>/backupset/<YYYY_MM_DD>/o1_mf_nnndf_TAG20100907T025402_68czfbdf_.bkp

    ```


    我通常不使用 FRA 来放置 RMAN 备份。在我工作的许多环境中，单个挂载点上没有足够的磁盘空间来容纳整个数据库的备份。在这种情况下，您需要分配两个或多个指向不同挂载点的通道。在这些环境中使用
    FRA 有些笨拙。


    此外，出于性能原因，您可能希望指示 RMAN 写入多个磁盘位置。如果您能确保不同的挂载点基于不同的物理磁盘并由独立的控制器写入，那么通过分配指向不同挂载点的多个通道可以减少
    I/O 争用。

    '
- fmt: 'When you''re using an FRA, RMAN automatically creates separate directories
    when backing up a database for the first time on a given date. I prefer to have
    the backups written to one directory and not separate the directories and backups
    by date. I find it easier to manage, maintain, and troubleshoot the backups if
    I use one standard directory for each database on each server.


    ## BACKUP...FORMAT


    If you''ve configured an FRA and don''t want to place RMAN backup files in the
    FRA automatically, you can directly specify where you want backups to be placed
    when you issue the `BACKUP` command; for example,


    ```

    RMAN> backup database format ''/u01/O12C/rman/rman_%U.bkp'';

    ```


    Here is a corresponding file generated by RMAN:


    ```

    /u01/O12C/rman/rman_0jnv0557_1_1.bkp

    ```


    The `%U` instructs RMAN to dynamically construct a unique string for the backup
    file name. A unique name is required in most situations, because RMAN won''t write
    over the top of a file that already exists. This is important, because if you
    instruct RMAN to write in parallel, it needs to create unique file names for each
    channel; for example,


    ```

    RMAN> configure device type disk parallelism 2;

    ```


    Now, when you run the `BACKUP` command, you see this message:


    ```

    RMAN> backup database format ''/u01/O12C/rman/rman_%U.bkp'';

    ```


    RMAN allocates multiple channels and writes in parallel to two different backup
    files. The `%U` in the format string guarantees that unique file names are created.


    ## CONFIGURE CHANNEL...FORMAT


    I don''t usually use the `BACKUP...FORMAT` syntax to specify the location for
    RMAN backups. I prefer to use the `CONFIGURE CHANNEL...FORMAT` command. This is
    because I''m frequently writing to multiple disk locations and need the flexibility
    to specify directories located on different mount points. Here is a typical configuration
    specifying `CONFIGURE CHANNEL...FORMAT`:


    ```

    RMAN> configure device type disk parallelism 3;

    RMAN> configure channel 1 device type disk format ''/u01/O12C/rman/rman1_%U.bk'';

    RMAN> configure channel 2 device type disk format ''/u02/O12C/rman/rman2_%U.bk'';

    RMAN> configure channel 3 device type disk format ''/u03/O12C/rman/rman3_%U.bk'';

    ```


    In these lines of code, you should configure the device-type parallelism degree
    to match the number of channels that you allocated. RMAN only allocates the number
    of channels as specified by the degree of parallelism; other configured channels
    are ignored. For instance, if you specify a degree of parallelism of 2, RMAN allocates
    only two channels, regardless of the number of channels you configured via the
    `CONFIGURE CHANNEL` command.


    In this example of configuring three channels, suppose the `BACKUP` command is
    issued, like this:


    ```

    RMAN> backup database;

    ```


    RMAN allocates three channels, all on separate mount points (`/u01`, `/u02`, `/u03`),
    and writes in parallel to the specified locations. RMAN creates as many backup
    pieces in the three locations as it deems necessary to create a backup of the
    database.


    If you need to unconfigure a channel, do so as follows:


    ```

    RMAN> configure channel 3 device type disk clear;

    ```


    ![Image](images/sq.jpg) `Note` Also consider what happens if you configure a degree
    of parallelism higher than the number of preconfigured channels. RMAN will open
    a channel for each degree of parallelism, and if the number of channels opened
    is greater than the number of preconfigured channels, for the unconfigured channels,
    RMAN will write backup files to the FRA (if configured) or the default location.


    ## Setting the Autobackup of the Control File


    You should always configure RMAN to back up the control file automatically after
    running any RMAN `BACKUP` or `COPY` command or after you make physical changes
    to the database that result in updates to the control file (such as adding/removing
    a data file). Use the `SHOW` command to display the current setting of the control
    file autobackup:


    ```

    RMAN> show controlfile autobackup;

    ```


    Here is some sample output:'
