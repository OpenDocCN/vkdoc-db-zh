- fmt: '# 本书概述


    本书是 Jonathan Gennick 的构想。这是一本重点介绍备份与恢复概念的入门书，内容涵盖用户管理备份、RMAN 和 Data Pump。感谢 Jill
    Balzano 和 Apress 的工作人员；制作一本高质量的书籍需要一支优秀的（协调的）团队。


    同时也要感谢多年来我从中学习的许多开发者和 DBA：Bob Suehrstedt、Dave Jennings、Scott Schulze、Venkatesh
    Ranganathan、Valerie Eipper、Mike Tanaka、Simon Ip、Nitin Mittal、Mohan Shanmugavelu、Ric
    Ambridge、Kamal Chamakura、Dallas Powell、Krishna (KP) Tallapaneni、Laurie Bourgeois、Todd
    Sherman、Radha Ponnapalli、Mohan Koneru、Kevin O’Grady、Peter Schow、Sujit Pattnaik、Roger
    Murphy、Barb Sannwald、Pete Mullineaux、Janet Bacon、Shawn Heisdorffer、Mehran Sowdaey、Patrick
    David、Carson Vowles、Aaron Isom、Tim Gorman、Tom Kyte 和 Jim Stark。


    ## 简介


    备份与恢复能力可以说是数据库管理员所需的关键技能。恢复管理器（RMAN）是 Oracle 的标准备份与恢复工具；每位 Oracle DBA 都应熟悉如何使用
    RMAN。本书将带你入门 RMAN；从如何设置和配置 RMAN 的最基础开始，逐步深入到更高级的主题，例如各种恢复和还原场景。


    ## 本书涵盖内容


    [第 1 章](#9781484207642_Ch01.xhtml) 介绍了环境设置的基础知识以及如何连接到 RMAN。[第 2 章](#9781484207642_Ch02.xhtml)
    详细介绍了构成备份与恢复操作的文件（控制文件、联机重做日志、归档重做日志和数据文件）。


    [第 3 章](#9781484207642_Ch03.xhtml) 重点介绍了用户管理备份。用户管理备份如今已很少使用，但理解它们有助于为领会备份与恢复的机制打下基础。有了这些知识，你将能够更充分地利用
    RMAN 并解决任何备份与恢复情况。


    [第 4](#9781484207642_Ch04.xhtml)、[5](#9781484207642_Ch05.xhtml) 和 [6](#9781484207642_Ch06.xhtml)
    章集中讨论 RMAN。[第 4 章](#9781484207642_Ch04.xhtml) 介绍了典型的 RMAN 配置和设置任务。这里会给出如何实现最常用
    RMAN 配置的示例。[第 5 章](#9781484207642_Ch05.xhtml) 将引导你使用 RMAN 备份数据库。[第 6 章](#9781484207642_Ch06.xhtml)
    专门讨论还原和恢复这些关键任务。


