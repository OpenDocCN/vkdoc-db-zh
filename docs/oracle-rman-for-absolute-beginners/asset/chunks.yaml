    Step 4\. Open the Database with the OPEN RESETLOGS Clause


    Open your database for use with the `OPEN RESETLOGS` clause:


    ```

    SQL> alter database open resetlogs;

    ```


    If you see the `Database altered` message, the command was successful. However,
    you may see this error:


    ```

    ORA-01139: RESETLOGS option only valid after an incomplete database recovery

    ```


    In this case, issue the following command:


    ```

    SQL> recover database until cancel;

    ```


    You should see this message:


    ```

    Media recovery complete.

    ```


    Now, attempt to open your database with the `OPEN RESETLOGS` clause:


    ```

    SQL> alter database open resetlogs;

    ```


    This statement instructs Oracle to recreate the online redo logs. Oracle uses
    information in the control file for the placement, name, and size of the redo
    logs. If there are old online redo log files in those locations, they’re overwritten.


    If you’re monitoring your `alert.log` throughout this process, you may see `ORA-00312`
    and `ORA-00313`. This means that Oracle can’t find the online redo log files;
    this is okay, because these files aren’t physically available until they’re recreated
    by the `OPEN RESETLOGS` command.


    Scripting a Cold Backup and Restore


    It’s instructional to view how to script a cold backup. The basic idea is to dynamically
    query the data dictionary to determine the locations and names of the files to
    be backed up. This is preferable to hard-coding the directory locations and file
    names in a script. The dynamic generation of a script is less prone to errors
    and surprises (e.g., the addition of new data files to a database but not to an
    old, hard-coded backup script).


    ![Image](images/sq.jpg) **Note**  The scripts in this section aren’t meant to
    be production-strength backup and recovery scripts. Rather, they illustrate the
    basic concepts of scripting a cold backup and subsequent restore.


    The first script in this section makes a cold backup of a database. Before you
    use the cold backup script, you need to modify these variables in the script to
    match your database environment:


    *   `ORACLE_SID`

    *   `ORACLE_HOME`

    *   `cbdir`


    The `cbdir` variable specifies the name of the backup-directory location. The
    script creates a file named `coldback.sql`, which is executed from SQL*Plus to
    initiate a cold backup of the database:


    ```

    #!/bin/bash

    ORACLE_SID=O12C

    ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1

    PATH=$PATH:$ORACLE_HOME/bin

    #

    sqlplus -s <<EOF

    / as sysdba

    set head off pages0 lines 132 verify off feed off trimsp on

    define cbdir=/u01/cbackup/O12C

    spo coldback.sql

    select ''shutdown immediate;'' from dual;

    select ''!cp '' || name   || '' '' || ''&&cbdir''   from v\$datafile;

    select ''!cp '' || name   || '' '' || ''&&cbdir''   from v\$tempfile;

    select ''!cp '' || member || '' '' || ''&&cbdir'' from v\$logfile;

    select ''!cp '' || name   || '' '' || ''&&cbdir''   from v\$controlfile;

    select ''startup;'' from dual;

    spo off;

    @@coldback.sql

    EOF

    exit 0

    ```


    This file generates commands that are to be executed from an SQL*Plus script to
    make a cold backup of a database. You place an exclamation mark (`!`) in front
    of the Unix `cp` command to instruct SQL*Plus to host out to the OS to run the
    `cp` command. You also place a backward slash (`\`) in front of each dollar sign
    (`$`) when referencing `v$` data dictionary views; this is required in a Linux/Unix
    shell script. The `\` escapes the `$` and tells the shell script not to treat
    the `$` as a special character (the `$` normally signifies a shell variable).


    After you run this script, here is a sample of the copy commands written to the
    `coldback.sql` script:


    ```

    shutdown immediate;

    !cp /u01/dbfile/O12C/system01.dbf /u01/cbackup/O12C

    !cp /u01/dbfile/O12C/sysaux01.dbf /u01/cbackup/O12C

    !cp /u01/dbfile/O12C/undotbs01.dbf /u01/cbackup/O12C

    !cp /u01/dbfile/O12C/users01.dbf /u01/cbackup/O12C

    !cp /u01/dbfile/O12C/tools01.dbf /u01/cbackup/O12C

    !cp /u01/dbfile/O12C/temp01.dbf /u01/cbackup/O12C

    !cp /u01/oraredo/O12C/redo02a.rdo /u01/cbackup/O12C

    !cp /u02/oraredo/O12C/redo02b.rdo /u01/cbackup/O12C

    !cp /u01/oraredo/O12C/redo01a.rdo /u01/cbackup/O12C

    !cp /u02/oraredo/O12C/redo01b.rdo /u01/cbackup/O12C

    !cp /u01/oraredo/O12C/redo03a.rdo /u01/cbackup/O12C

    !cp /u02/oraredo/O12C/redo03b.rdo /u01/cbackup/O12C

    !cp /u01/dbfile/O12C/control01.ctl /u01/cbackup/O12C

    !cp /u01/dbfile/O12C/control02.ctl /u01/cbackup/O12C

    startup;

    ```


    While you make a cold backup, you should also generate a script that provides
    the commands to copy data files, temp files, log files, and control files back
    to their original locations. You can use this script to restore from the cold
    backup. The next script in this section dynamically creates a `coldrest.sql` script
    that copies files from the backup location to the original data file locations.
    You need to modify this script in the same manner that you modified the cold backup
    script (i.e., change the `ORACLE_SID`, `ORACLE_HOME`, and `cbdir` variables to
    match your environment):


    ```

    #!/bin/bash

    ORACLE_SID=O12C

    ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1

    PATH=$PATH:$ORACLE_HOME/bin

    #

    sqlplus -s <<EOF

    / as sysdba

    set head off pages0 lines 132 verify off feed off trimsp on

    define cbdir=/u01/cbackup/O12C

    define dbname=$ORACLE_SID

    spo coldrest.sql

    select ''shutdown abort;'' from dual;

    select ''!cp '' || ''&&cbdir/'' || substr(name, instr(name,''/'',-1,1)+1) ||

           '' '' || name   from v\$datafile;

    select ''!cp '' || ''&&cbdir/'' || substr(name, instr(name,''/'',-1,1)+1) ||

           '' '' || name   from v\$tempfile;

    select ''!cp '' || ''&&cbdir/'' || substr(member, instr(member,''/'',-1,1)+1)
    ||

           '' '' || member from v\$logfile;

    select ''!cp '' || ''&&cbdir/'' || substr(name, instr(name,''/'',-1,1)+1) ||

           '' '' || name   from v\$controlfile;

    select ''startup;'' from dual;

    spo off;

    EOF

    exit 0

    ```


    This script creates a script, named `coldrest.sql`, that generates the copy commands
    to restore your data files, temp files, log files, and control files back to their
    original locations. After you run this shell script, here is a snippet of the
    code in the `coldrest.sql` file:


    ```

    shutdown abort;

    !cp /u01/cbackup/O12C/system01.dbf /u01/dbfile/O12C/system01.dbf

    !cp /u01/cbackup/O12C/sysaux01.dbf /u01/dbfile/O12C/sysaux01.dbf

    !cp /u01/cbackup/O12C/undotbs01.dbf /u01/dbfile/O12C/undotbs01.dbf

    !cp /u01/cbackup/O12C/users01.dbf /u01/dbfile/O12C/users01.dbf

    !cp /u01/cbackup/O12C/tools01.dbf /u01/dbfile/O12C/tools01.dbf


    ...

    !cp /u01/cbackup/O12C/redo03b.rdo /u02/oraredo/O12C/redo03b.rdo

    !cp /u01/cbackup/O12C/control01.ctl /u01/dbfile/O12C/control01.ctl

    !cp /u01/cbackup/O12C/control02.ctl /u01/dbfile/O12C/control02.ctl

    startup;

    ```


    If you need to restore from a cold backup using this script, log in to SQL*Plus
    as `SYS`, and execute the script:


    ```

    $ sqlplus / as sysdba

    SQL> @coldrest.sql

    ```


    Making a Cold Backup of an Archivelog Mode Database


    You can use a backup of a database in archivelog mode to restore and recover up
    to the last committed transaction prior to a failure. Therefore, unlike a backup
    of a noarchivelog mode database, this type of backup is not necessarily intended
    to be used to reset the database back to a point in time in the past from which
    no recovery can be applied. The purpose of a backup of an archivelog mode database
    is usually to restore the database and roll forward and apply transactions to
    fully recover the database.'
