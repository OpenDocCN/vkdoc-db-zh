    up. Say you discover that your backups have not been running for the last several
    days, and you want to back up everything that hasn’t been backed up within the
    last 24 hours. The following command backs up all data files that have not been
    backed up within the last day:


    ```

    RMAN> backup database not backed up since time=''sysdate-1'';

    ```


    The prior command is also useful if, for any reason (a power failure in the data
    center, your backup directory’s becoming full during backups, and so on), your
    backups aborted. After you have resolved the issue that caused your backup job
    to fail, you can issue the previous command, and RMAN will back up only the data
    files that have not been backed up in the specified time period.


    Skipping Read-Only Tablespaces


    Because data in read-only tablespaces can’t change, you may only want to back
    up read-only tablespaces once and then skip them in subsequent backups. Use the
    `SKIP READONLY` command to achieve this:


    ```

    RMAN> backup database skip readonly;

    ```


    Keep in mind that when you skip read-only tablespaces, you’ll need to keep available
    a backup that contains these tablespaces. As long as you only issue the RMAN command
    `DELETE OBSOLETE`, the RMAN backup set containing the read-only tablespaces will
    be retained and not deleted, even if that RMAN backup set contains other read-write
    tablespaces.


    Skipping Offline or Inaccessible Files


    Suppose you have one data file that is missing or corrupt, and you don’t have
    a backup of it, so you can’t restore and recover it. You can’t start your database
    in this situation:


    ```

    SQL> startup;

    ORA-01157: cannot identify/lock data file 6 - see DBWR trace file

    ORA-01110: data file 6: ''/u01/dbfile/ O12C/reg_data01.dbf''

    ```'
  trans: '

    # 备份快速恢复区


    如果您使用了快速恢复区，RMAN 有一个很方便的功能：只需一条命令即可备份该位置的所有文件。如果您使用了介质管理器并启用了磁带备份通道，您可以将快速恢复区中的所有内容备份到磁带，如下所示：


    ```

    RMAN> backup device type sbt_tape recovery area;

    ```


    您也可以将快速恢复区备份到磁盘上的某个位置。使用 `TO DESTINATION` 命令来完成此操作：


    ```

    RMAN> backup recovery area to destination ''/u01/O12C/fra_back'';

    ```


    RMAN 会在 `TO DESTINATION` 命令指定的目录下，根据需要自动创建子目录。


    ![Image](img/sq.jpg) **注意**  `TO_DESTINATION` 目录下的子目录格式为 `db_unique_name/backupset/YYYY_MM_DD`。


    RMAN 将备份完整备份、增量备份、控制文件自动备份以及归档重做日志文件。请记住，闪回日志、在线重做日志文件和当前控制文件**不会**被备份。


    # 从备份中排除表空间


    假设您有一个包含非关键数据的表空间，并且您永远不想备份它。RMAN 可以配置为在备份时排除此类表空间。要确定 RMAN 当前是否配置为排除任何表空间，请运行以下命令：


    ```

    RMAN> show exclude;

    RMAN configuration parameters for database with db_unique_name O12C are:

    RMAN configuration has no stored or default parameters

    ```


    使用 `EXCLUDE` 命令来指示 RMAN 不备份哪些表空间：


    ```

    RMAN> configure exclude for tablespace users;

    ```


    现在，对于任何数据库级别的备份，RMAN 都将排除与 `USERS` 表空间关联的数据文件。您可以通过以下命令指示 RMAN 备份所有数据文件以及任何被排除的表空间：


    ```

    RMAN> backup database noexclude;

    ```


    您可以通过以下命令清除排除设置：


    ```

    RMAN> configure exclude for tablespace users clear;

    ```


    # 备份尚未备份的数据文件


    假设您刚刚向数据库添加了几个数据文件，并且您希望确保已对它们进行了备份。您可以发出以下命令来指示 Oracle 备份那些尚未备份的数据文件：


    ```

    RMAN> backup database not backed up;

    ```


    您还可以为这些尚未备份的文件指定时间范围。假设您发现备份已停止运行数天，并且希望备份过去 24 小时内所有尚未备份的内容。以下命令备份过去一天内所有尚未备份的数据文件：


    ```

    RMAN> backup database not backed up since time=''sysdate-1'';

    ```


    如果由于任何原因（数据中心断电、备份目录在备份期间变满等等）导致您的备份中止，前面的命令也很有用。在您解决了导致备份作业失败的问题后，您可以发出前面的命令，RMAN
    将仅备份在指定时间段内尚未备份的数据文件。


    # 跳过只读表空间


    因为只读表空间中的数据无法更改，您可能希望只备份只读表空间一次，然后在后续备份中跳过它们。使用 `SKIP READONLY` 命令来实现此目的：


    ```

    RMAN> backup database skip readonly;

    ```


    请记住，当您跳过只读表空间时，您需要保留一个包含这些表空间的可用备份。只要您只发出 RMAN 命令 `DELETE OBSOLETE`，包含只读表空间的 RMAN
    备份集就会被保留而不会被删除，即使该 RMAN 备份集还包含其他可读写的表空间。


    # 跳过离线或不可访问的文件


    假设您有一个数据文件丢失或损坏，并且您没有它的备份，因此无法还原和恢复它。在这种情况下，您无法启动数据库：


    ```

    SQL> startup;

    ORA-01157: cannot identify/lock data file 6 - see DBWR trace file

    ORA-01110: data file 6: ''/u01/dbfile/ O12C/reg_data01.dbf''

    ```

    '
- fmt: 'In this scenario, you’ll have to take the data file offline before you can
    start your database:


    ```

    SQL> alter database datafile ''/u01/dbfile/O12C/reg_data01.dbf'' offline for drop;

    ```


    Now, you can open your database:


    ```

    SQL> alter database open;

    ```


    Suppose you then attempt to run an RMAN backup:


    ```

    RMAN> backup database;

    ```


    The following error is thrown when RMAN encounters a data file that it can’t back
    up:


    ```

    RMAN-03002: failure of backup command at ...

    RMAN-06056: could not access datafile 6

    ```


    In this situation, you’ll have to instruct RMAN to exclude the offline data file
    from the backup. The `SKIP OFFLINE` command instructs RMAN to ignore data files
    with an offline status:


    ```

    RMAN> backup database skip offline;

    ```


    If a file has gone completely missing, use `SKIP INACCESSIBLE` to instruct RMAN
    to ignore files that are not available on disk. This might happen if the data
    file was deleted using an OS command. Here is an example of excluding inaccessible
    data files from the RMAN backup:


    ```

    RMAN> backup database skip inaccessible;

    ```


    You can skip read-only, offline, and inaccessible data files with one command:


    ```

    RMAN> backup database skip readonly skip offline skip inaccessible;

    ```


    When dealing with offline and inaccessible files, you should figure out why the
    files are offline or inaccessible and try to resolve any issues.


    ## Backing Up Large Files in Parallel


    Normally, RMAN will only use one channel to back up a single data file. When you
    enable parallelism, it allows RMAN to spawn multiple processes to back up multiple
    files. However, even when parallelism is enabled, RMAN will not use parallel channels
    simultaneously to back up one data file.


    Starting with Oracle 11g, you can instruct RMAN to use multiple channels to back
    up one data file in parallel. This is known as a multisection backup. This feature
    can speed up the backups of very large data files. Use the `SECTION SIZE` parameter
    to make a multisection backup. The following example configures two parallel channels
    to back up one file:


    ```

    RMAN> configure device type disk parallelism 2;

    RMAN> configure channel 1 device type disk format ''/u01/O12C/rman/r1%U.bk'';

    RMAN> configure channel 2 device type disk format ''/u02/O12C/rman/r2%U.bk'';

    RMAN> backup section size 2500M datafile 10;

    ```


    When this code runs, RMAN will allocate two channels to back up the specified
    data file in parallel.


    `Note` If you specify a section size greater than the size of the data file, RMAN
    will not back up the file in parallel.


    ## Adding RMAN Backup Information to the Repository


    Suppose you’ve had to re-create your control file. The process of re-creating
    the control file wipes out any information regarding RMAN backups. However, you
    want to make the newly created control file aware of RMAN backups sitting on disk.
    In this situation, use the `CATALOG` command to populate the control file with
    RMAN metadata. For example, if all the RMAN backup files are kept in the `/u01/O12C/rman`
    directory, you can make the control file aware of these backups files in the directory,
    as follows:


    ```

    RMAN> catalog start with ''/u01/O12C/rman'';

    ```


    This instructs RMAN to look for any backup pieces, image copies, control file
    copies, and archive redo logs in the specified directory, and, if found, to populate
    the control file with the appropriate metadata. For this example two backup piece
    files are found in the given directory:


    ```

    searching for all files that match the pattern /u01/O12C/rman


    List of Files Unknown to the Database

    =====================================

    File Name: /u01/O12C/rman/r1otlns90o_1_1.bk

    File Name: /u01/ O12C/rman/r1xyklnrveg_1_1.bk


    Do you really want to catalog the above files (enter YES or NO)?

    ```


    If you enter `YES`, then metadata regarding the backup files will be added to
    the control file. In this way, the `CATALOG` command allows you to make the RMAN
    repository (control file and recovery catalog) aware of files that RMAN can work
    with for B&R.'
