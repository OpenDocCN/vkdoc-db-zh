- fmt: 'This has significant implications for the backups. Recall that for a `NOARCHIVELOG`
    mode database, DBAs sometimes include the online redo logs as part of the backup.
    For a backup of an `ARCHIVELOG` mode database, you should never include the online
    redo logs in the backup. The online redo logs contain the most currently generated
    redo transaction information for the database. Any transactions in the current
    online redo logs that haven’t been archived are required for a complete recovery.
    In the event of a failure, you don’t want to overwrite the online redo logs with
    backups of online redo logs taken from a point in time in the past; this would
    result in the inability to perform a complete recovery.


    The high-level steps for a cold backup of a database in archivelog mode are identical
    to those for a noarchivelog mode database:

    1.  Determine where to copy the backup files and how much space is required.

    2.  Identify the locations and names of the database files to copy.

    3.  Shut down the database with the `IMMEDIATE`, `TRANSACTIONAL`, or `NORMAL`
    clause.

    4.  Copy the files (identified in step 2) to the backup location (determined in
    step 1).

    5.  Restart your database.


    The main difference between the cold archivelog mode backup and noarchivelog mode
    backup is that in step 2, you run this query to identify the files to be backed
    up:

    ```

    select name from v$datafile

    union

    select name from v$controlfile;

    ```

    Also, you don’t need to back up the data files associated with the `TEMP` tablespace.
    As of Oracle 10g, Oracle automatically attempts to create missing data files associated
    with the `TEMP` tablespace (for locally managed temp tablespaces) when the database
    is started.


    Restoring and recovering with a cold backup of a database in archivelog mode is
    nearly identical to the restore and recovery from a hot backup. See the sections
    “Performing a Complete Recovery of an Archivelog Mode Database” and “Performing
    an Incomplete Recovery of an Archivelog Mode Database,” later in this chapter,
    for discussion of how to restore and recover from a database in archivelog mode.


    ## UNDERSTANDING THE MECHANICS DOES MATTER

    Knowing how a hot backup works also helps in untangling and surviving difficult
    `RMAN` scenarios. `RMAN` is a sophisticated and highly automated tool. With just
    a few commands, you can back up, restore, and recover your database. However,
    if there is a failure with any `RMAN` command or step, an understanding of Oracle’s
    underlying internal restore-and-recovery architecture pays huge dividends. A detailed
    knowledge of how to restore and recover from a hot backup helps you logically
    think your way through any `RMAN` scenario.


    When you ride a bike, understanding how the derailleurs and gears and shifting
    work helps a great deal. You can usually tell when a rider knows only to push
    one button to go slower and another button to go faster. Riders who understand
    in more detail how the chain moves between gears will always be smoother at shifting
    gears. My editor, Jonathan Gennick, recounted the following anecdote while reading
    an early draft of this chapter:

    “I loaned my bike to a guy the other week and went on a ride with him. You should
    have heard the horrible noises he conjured out of my derailleurs and drivetrain.
    I thought he was going to damage the bike. After a few minutes, he rode up to
    me and told me that my front derailleur wasn’t working right.

    “The derailleur was fine. He was just one of those guys who knows only how to
    push the button, without any understanding of what goes on underneath that action.”

    Similarly, effort you put into understanding how backup and recovery is implemented
    pays off in the long run. You actually have less to remember—because your understanding
    of the underlying operation enables you to think through problems and solve them
    in ways that checklists don’t.


    ## Implementing a Hot Backup Strategy

    As discussed previously, `RMAN` should be your tool of choice for any type of
    Oracle database backup (either online or offline). `RMAN` is more efficient than
    user-managed backups and automates most tasks. Having said that, one of the best
    ways to gain an understanding of Oracle backup and recovery internals is to make
    a hot backup and then use that backup to restore and recover your database. Manually
    issuing the commands involved in a hot backup, followed by a restore and recovery,
    helps you understand the role of each type of file (control files, data files,
    archive redo logs, online redo logs) in a restore-and-recovery scenario.


    The following sections begin by showing you how to implement a hot backup. They
    also provide basic scripts that you can use to automate the hot backup process.
    Later sections explain some of the internal mechanics of a hot backup and clarify
    why you must put tablespaces in backup mode before the hot backup takes place.


    ### Making a Hot Backup

    Here are the steps required for a hot backup:

    1.  Ensure that the database is in `ARCHIVELOG` mode.

    2.  Determine where to copy the backup files.

    3.  Identify which files need to be backed up.

    4.  Note the maximum sequence number of the online redo logs.

    5.  Alter the database/tablespace into backup mode.

    6.  Copy the data files with an OS utility to the location determined in step
    2.

    7.  Alter the database/tablespace out of backup mode.

    8.  Archive the current online redo log, and note the maximum sequence number
    of the online redo logs.

    9.  Back up the control file.

    10. Back up any archive redo logs generated during the backup.


    These steps are covered in detail in the following sections.


    ### Step 1. Ensure That the Database Is in Archivelog Mode

    Run the following command to check the `ARCHIVELOG` mode status of your database:

    ```

    SQL> archive log list;

    ```

    The output shows that this database is in `ARCHIVELOG` mode:

    ```

    Database log mode              Archive Mode

    Automatic archival             Enabled

    Archive destination            /u01/oraarch/O12C

    ```

    If you’re not sure how to enable archiving, see Chapter 2 for details.


    ### Step 2. Determine Where to Copy the Backup Files

    Now, determine the backup location. For this example the backup location is the
    directory `/u01/hbackup/O12C`. To get a rough idea of how much space you need,
    you can run this query:

    ```

    SQL> select sum(bytes) from dba_data_files;

    ```

    Ideally, the backup location should be on a set of disks separate from your live
    data files. But, in practice, many times you’re given a slice of space on a `SAN`
    and have no idea about the underlying disk layout. In these situations, you rely
    on redundancy’s being built into the `SAN` hardware (`RAID` disks, multiple controllers,
    and so on) to ensure high availability and recoverability.


    ### Step 3. Identify Which Files Need to Be Backed Up

    For this step, you only need to know the locations of the data files:

    ```

    SQL> select name from v$datafile;

    ```

    When you get to step 5, you may want to consider altering tablespaces one at a
    time into backup mode. If you take that approach, you need to know which data
    files are associated with which: tablespace:

    ```

    select tablespace_name, file_name

    from dba_data_files

    order by 1,2;

    ```


    ### Step 4. Note the Maximum Sequence Number of the Online Redo Logs

    To successfully recover using a hot backup, you require, at minimum, all the archive
    redo logs that were generated during the backup. For this reason, you need to
    note the `ARCHIVELOG` sequence before starting the hot backup:

    ```

    select thread#, max(sequence#)

    from v$log

    group by thread#

    order by thread#;

    ```


    ### Step 5. Alter the Database/Tablespaces into Backup Mode

    You can put all your tablespaces into backup mode at the same time, using the
    `ALTER DATABASE BEGIN BACKUP` statement:

    ```

    SQL> alter database begin backup;

    ```'
  raw: 'This has significant implications for the backups. Recall that for a noarchivelog
    mode database, DBAs sometimes include the online redo logs as part of the backup.
    For a backup of an archivelog mode database, you should never include the online
    redo logs in the backup. The online redo logs contain the most currently generated
    redo transaction information for the database. Any transactions in the current
    online redo logs that haven’t been archived are required for a complete recovery.
    In the event of a failure, you don’t want to overwrite the online redo logs with
    backups of online redo logs taken from a point in time in the past; this would
    result in the inability to perform a complete recovery.


    The high-level steps for a cold backup of a database in archivelog mode are identical
    to those for a noarchivelog mode database:


    1.  Determine where to copy the backup files and how much space is required.

    2.  Identify the locations and names of the database files to copy.

    3.  Shut down the database with the `IMMEDIATE`, `TRANSACTIONAL`, or `NORMAL`
    clause.

    4.  Copy the files (identified in step 2) to the backup location (determined in
    step 1).

    5.  Restart your database.


    The main difference between the cold archivelog mode backup and noarchivelog mode
    backup is that in step 2, you run this query to identify the files to be backed
    up:


    ```

    select name from v$datafile

    union

    select name from v$controlfile;

    ```


    Also, you don’t need to back up the data files associated with the `TEMP` tablespace.
    As of Oracle 10g, Oracle automatically attempts to create missing data files associated
    with the `TEMP` tablespace (for locally managed temp tablespaces) when the database
    is started.


    Restoring and recovering with a cold backup of a database in archivelog mode is
    nearly identical to the restore and recovery from a hot backup. See the sections
    “Performing a Complete Recovery of an Archivelog Mode Database” and “Performing
    an Incomplete Recovery of an Archivelog Mode Database,” later in this chapter,
    for discussion of how to restore and recover from a database in archivelog mode.


