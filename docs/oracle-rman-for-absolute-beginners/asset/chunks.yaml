    to_char(checkpoint_time,'dd-mon-rrrr hh24:mi:ss') as checkpoint_time\nfrom v$datafile_header;\n\
    ```\n\n![Image](img/sq.jpg) **注意**  `V$DATAFILE_HEADER`中的`FUZZY`列包含一个或多个数据块的 SCN\
    \ 值大于或等于数据文件头中检查点 SCN 的数据文件。如果数据文件已恢复并且`FUZZY`值为`YES`，则需要进行介质恢复。\n\n不在数据库联机文件的子集上执行不完全恢复规则的唯一例外是表空间时间点恢复（TSPITR），它使用`RECOVER\
    \ TABLESPACE UNTIL`命令。TSPITR 在罕见情况下使用；它仅恢复和恢复您指定的表空间。有关 TSPITR 的更多详细信息，请参阅*RMAN\
    \ Recipes for Oracle Database 12c*。\n\n不完全数据库恢复的恢复部分总是通过`RECOVER DATABASE UNTIL`命令启动。RMAN\
    \ 将自动恢复您的数据库，直到使用`UNTIL`子句指定的点。与`RESTORE`命令类似，您可以按时间、变更/SCN、日志序列号或还原点进行恢复。当 RMAN\
    \ 达到指定点时，它将自动终止恢复过程。\n"
- fmt: "![Image](images/sq.jpg) **Note** 无论您在 `UNTIL` 子句中指定了什么，RMAN 都会将其转换为相应的 `UNTIL\
    \ SCN` 子句并分配适当的 SCN。这是为了避免任何时间问题，特别是由夏令时引起的问题。\n\n在恢复期间，RMAN 会自动确定如何应用重做。首先，RMAN\
    \ 会应用任何可用的增量备份。接下来，将应用磁盘上的任何归档重做日志文件。如果归档重做日志文件不存在于磁盘上，那么 RMAN 将尝试从备份集中检索它们。如果您想将重做应用作为不完整数据库恢复的一部分，则必须满足以下条件：\n\
    \n*   您的数据库处于归档日志模式。\n*   您拥有所有数据文件的良好备份。\n*   您拥有恢复到指定点所需的所有重做。\n\n![Image](images/sq.jpg)\
    \ **Tip** 从 Oracle 10g 开始，您可以使用 `RECOVER DATABASE PARALLEL` 命令执行并行介质恢复。\n\n在使用\
    \ RMAN 执行不完整的数据库恢复时，必须将数据库置于装载（mount）模式。RMAN 需要数据库处于装载模式才能读写控制文件。此外，对于不完整的数据库恢复，任何\
    \ `SYSTEM` 表空间的数据文件总是会被恢复。Oracle 不允许您在恢复 `SYSTEM` 表空间数据文件时打开数据库。\n\n![Image](images/sq.jpg)\
    \ **Note** 执行完不完整的数据库恢复后，您需要使用 `ALTER DATABASE OPEN RESETLOGS` 命令打开数据库。\n\n根据具体情况，您可以使用\
    \ RMAN 执行各种不完整的恢复方法。下一节将讨论如何确定要执行哪种类型的不完整恢复。\n\n## 确定不完全恢复的类型\n\n当您知道要恢复数据库的大致日期和时间时，通常使用基于时间的还原和恢复。例如，您可能知道希望停止恢复过程的大致时间，但不知道特定的\
    \ SCN。\n\n基于日志序列和基于取消的恢复在您有丢失或损坏的日志文件的情况下效果很好。在这种情况下，您只能恢复到最后一个完好的归档重做日志文件。\n\n\
    如果您能精确定位希望停止恢复过程的 SCN，那么基于 SCN 的恢复效果很好。您可以从 `V$LOG` 和 `V$LOG_HISTORY` 等视图中检索 SCN\
    \ 信息。您还可以使用 LogMiner 等工具来检索特定 SQL 语句的 SCN。\n\n还原点恢复仅在您已建立还原点的情况下有效。在这些情况下，您可以还原并恢复到与指定还原点关联的\
    \ SCN。\n\nTSPITR 用于只需要还原和恢复少数几个表空间的情况。您可以使用 RMAN 来自动化与此类不完整恢复相关的许多任务。\n\n## 执行基于时间的恢复\n\
    \n要将数据库还原并恢复到过去的某个时间点，您可以使用 `RESTORE` 和 `RECOVER` 命令的 `UNTIL TIME` 子句，或者在 `run{}`\
    \ 块中使用 `SET UNTIL TIME` 子句。RMAN 将还原并恢复数据库到指定时间之前，但不包括该时间。换句话说，RMAN 将还原在指定时间之前提交的所有事务。RMAN\
    \ 会在达到您指定的时间时自动停止恢复过程。\n\nRMAN 期望的默认日期格式是 `YYYY-MM-DD:HH24:MI:SS`。但是，我建议使用 `TO_DATE`\
    \ 函数并指定格式掩码。这可以消除不同国家日期格式的歧义，也不必设置操作系统 `NLS_DATE_FORMAT` 变量。以下示例在发出 `restore`\
    \ 和 `recover` 命令时指定了时间：\n\n```bash\n$ rman target /\nRMAN> startup mount;\nRMAN>\
    \ restore database until time\n      \"to_date('15-jan-2015 12:20:00', 'dd-mon-rrrr\
    \ hh24:mi:ss')\";\nRMAN> recover database until time\n      \"to_date('15-jan-2015\
    \ 12:20:00', 'dd-mon-rrrr hh24:mi:ss')\";\nRMAN> alter database open resetlogs;\n\
    ```\n\n如果一切顺利，您应该看到类似这样的输出：\n\n```\nStatement processed\n```\n\n## 执行基于日志序列的恢复\n\
    \n通常，这种类型的不完整数据库恢复是因为您丢失或损坏了归档重做日志文件而启动的。如果是这种情况，您只能恢复到最后一个完好的归档重做日志文件，因为您无法跳过丢失的归档重做日志。\n\
    \n您如何确定要恢复到（但不包括）哪个归档重做日志文件会有所不同。例如，如果您物理上丢失了一个归档重做日志文件，并且 RMAN 无法在备份集中找到它，那么在尝试应用丢失的文件时，您会收到类似这样的消息：\n\
    \n```\nRMAN-06053: unable to perform media recovery because of missing log\nRMAN-06025:\
    \ no backup of archived log for thread 1 with sequence 19...\n```\n\n根据之前的错误消息，您将恢复到（但不包括）日志序列\
    \ 19。\n\n```bash\n$ rman target /\nRMAN> startup mount;\nRMAN> restore database\
    \ until sequence 19;\nRMAN> recover database until sequence 19;\nRMAN> alter database\
    \ open resetlogs;\n```\n\n如果成功，您应该看到类似这样的输出：\n\n```\nStatement processed\n```\n\
    \n![Image](images/sq.jpg) **Note** 基于日志序列的恢复类似于用户管理的基于取消的恢复。有关用户管理的基于取消的恢复的详细信息，请参阅[第\
    \ 3 章](#9781484207642_Ch03.xhtml)。\n\n## 执行基于 SCN 的恢复\n\n当您知道希望结束还原和恢复会话的 SCN\
    \ 值时，基于 SCN 的不完整数据库恢复非常有效。RMAN 将恢复到指定 SCN 之前，但不包括该 SCN。RMAN 会在达到指定的 SCN 时自动终止还原过程。\n\
    \n您可以通过多种方式查看数据库的 SCN 信息：\n\n*   使用 LogMiner 确定与 DDL 或 DML 语句关联的 SCN\n*   查看 `alert.log`\
    \ 文件\n*   查看跟踪文件\n*   查询 `V$LOG`、`V$LOG_HISTORY` 和 `V$ARCHIVED_LOG` 的 `FIRST_CHANGE#`\
    \ 列\n\n确定要还原到的 SCN 后，使用 `UNTIL SCN` 子句还原到指定 SCN 之前，但不包括该 SCN。以下示例还原所有 SCN 小于 95019865425\
    \ 的事务：\n\n```bash\n$ rman target /\nRMAN> startup mount;\nRMAN> restore database\
    \ until scn 95019865425;\nRMAN> recover database until scn 95019865425;\nRMAN>\
    \ alter database open resetlogs;\n```\n\n如果一切顺利，您应该看到类似这样的输出：\n\n```\nStatement\
    \ processed\n```\n\n## 还原到还原点\n\n有两种类型的还原点：普通还原点和保证还原点。保证还原点和普通还原点之间的主要区别在于，保证还原点最终不会从控制文件中老化清除；保证还原点将一直保留，直到您将其删除。保证还原点确实需要一个\
    \ FRA。但是，对于使用保证还原点的不完整恢复，您不必启用闪回数据库。\n\n您可以使用 SQL*Plus 创建普通还原点，如下所示：\n\n```sql\n\
    SQL> create restore point MY_RP;\n```\n\n此命令创建一个名为 `MY_RP` 的还原点，它与发出命令时数据库的 SCN\
    \ 相关联。您可以查看数据库的当前 SCN，如下所示：\n\n```sql\nSQL> select current_scn from v$database;\n\
    ```\n\n您可以查看 `V$RESTORE_POINT` 视图中的还原点信息，如下所示：\n\n```sql\nSQL> select name, scn\
    \ from v$restore_point;\n```\n\n还原点就像特定 SCN 的同义词。还原点允许您还原并恢复到某个 SCN，而无需指定一个数字。RMAN\
    \ 将还原并恢复到与还原点关联的 SCN 之前，但不包括该 SCN。"
  raw: '![Image](images/sq.jpg) **Note**  Regardless of what you specify in the `UNTIL`
    clause, RMAN will convert that into a corresponding `UNTIL SCN` clause and assign
    the appropriate SCN. This is to avoid any timing issues, particularly those caused
    by Daylight Saving Time.


    During a recovery, RMAN will automatically determine how to apply redo. First,
    RMAN will apply any incremental backups available. Next, any archived redo log
    files on disk will be applied. If the archived redo log files do not exist on
    disk, then RMAN will attempt to retrieve them from a backup set. If you want to
    apply redo as part of an incomplete database recovery, the following conditions
    must be true:


    *   Your database is in archivelog mode.

    *   You have a good backup of all data files.

    *   You have all redo required to restore up to the specified point.


    ![Image](images/sq.jpg) **Tip**  Starting with Oracle 10g, you can perform parallel
    media recovery by using the `RECOVER DATABASE PARALLEL` command.


    When performing an incomplete database recovery with RMAN, you must have your
    database in mount mode. RMAN needs the database in mount mode to be able to read
    and write to the control file. Also, with an incomplete database recovery, any
    `SYSTEM` tablespace data files are always recovered. Oracle will not allow your
    database to be open while restoring the `SYSTEM` tablespace data file(s).


    ![Image](images/sq.jpg) **Note**  After incomplete database recovery is performed,
    you are required to open your database with the `ALTER DATABASE OPEN RESETLOGS`
    command.


    Depending on the scenario, you can use RMAN to perform a variety of incomplete
    recovery methods. The next section discusses how to determine what type of incomplete
    recovery to perform.


    Determining the Type of Incomplete Recovery


    Time-based restore and recovery is commonly used when you know the approximate
    date and time to which you want to recover your database. For instance, you may
    know approximately the time you want to stop the recovery process, but not a particular
    SCN.


    Log sequence–based and cancel-based recovery work well in situations in which
    you have missing or damaged log files. In such scenarios, you can recover only
    up to your last good archived redo log file.


    SCN-based recovery works well if you can pinpoint the SCN at which you want to
    stop the recovery process. You can retrieve SCN information from views such as
    `V$LOG` and `V$LOG_HISTORY`. You can also use tools such as LogMiner to retrieve
    the SCN of a particular SQL statement.


    Restore point recoveries work only if you have established restore points. In
    these situations, you restore and recover up to the SCN associated with the specified
    restore point.


    TSPITR is used in situations in which you need to restore and recover just a few
    tablespaces. You can use RMAN to automate many of the tasks associated with this
    type of incomplete recovery.


    Performing Time-Based Recovery


    To restore and recover your database back to a point in time in the past, you
    can use either the `UNTIL TIME` clause of the `RESTORE` and `RECOVER` commands
    or the `SET UNTIL TIME` clause within a `run{}` block. RMAN will restore and recover
    the database up to, but not including, the specified time. In other words, RMAN
    will restore any transactions committed prior to the time specified. RMAN automatically
    stops the recovery process when it reaches the time you specified.


    The default date format that RMAN expects is `YYYY-MM-DD:HH24:MI:SS`. However,
    I recommend using the `TO_DATE` function and specifying a format mask. This eliminates
    ambiguities with different national date formats and having to set the OS `NLS_DATE_FORMAT`
    variable. The following example specifies a time when issuing the `restore` and
    `recover` commands:


    ```

    $ rman target /

    RMAN> startup mount;

    RMAN> restore database until time

          "to_date(''15-jan-2015 12:20:00'', ''dd-mon-rrrr hh24:mi:ss'')";

    RMAN> recover database until time

          "to_date(''15-jan-2015 12:20:00'', ''dd-mon-rrrr hh24:mi:ss'')";

    RMAN> alter database open resetlogs;

    ```


    If everything goes well, you should see output such as this:


    ```

    Statement processed

    ```


    Performing Log Sequence-Based Recovery


    Usually this type of incomplete database recovery is initiated because you have
    a missing or damaged archived redo log file. If that’s the case, you can recover
    only up to your last good archived redo log file, because you can’t skip a missing
    archived redo log.


    How you determine which archived redo log file to restore up to (but not including)
    will vary. For example, if you are physically missing an archived redo log file,
    and RMAN can’t find it in a backup set, you’ll receive a message such as this
    when trying to apply the missing file:


    ```

    RMAN-06053: unable to perform media recovery because of missing log

    RMAN-06025: no backup of archived log for thread 1 with sequence 19...

    ```


    Based on the previous error message, you would restore up to (but not including)
    log sequence 19.


    ```

    $ rman target /

    RMAN> startup mount;

    RMAN> restore database until sequence 19;

    RMAN> recover database until sequence 19;

    RMAN> alter database open resetlogs;

    ```


    If successful, you should see output such as this:


    ```

    Statement processed

    ```


    ![Image](images/sq.jpg) **Note**  Log sequence–based recovery is similar to user-managed
    cancel-based recovery. See [Chapter 3](#9781484207642_Ch03.xhtml) for details
    on a user-managed cancel-based recovery.


    Performing SCN-Based Recovery


    SCN-based incomplete database recovery works in situations in which you know the
    SCN value at which you want to end the restore-and-recovery session. RMAN will
    recover up to, but not including, the specified SCN. RMAN automatically terminates
    the restore process when it reaches the specified SCN.


    You can view your database SCN information in several ways:


    *   Using LogMiner to determine an SCN associated with a DDL or DML statement

    *   Looking in the `alert.log` file

    *   Looking in your trace files

    *   Querying the `FIRST_CHANGE#` column of `V$LOG`, `V$LOG_HISTORY` and `V$ARCHIVED_LOG`


    After establishing the SCN to which you want to restore, use the `UNTIL SCN` clause
    to restore up to, but not including, the SCN specified. The following example
    restores all transactions that have an SCN that is less than 95019865425:


    ```

    $ rman target /

    RMAN> startup mount;

    RMAN> restore database until scn 95019865425;

    RMAN> recover database until scn 95019865425;

    RMAN> alter database open resetlogs;

    ```


    If everything goes well, you should see output such as this:


    ```

    Statement processed

    ```


    Restoring to a Restore Point


    There are two types of restore points: normal and guaranteed. The main difference
    between a guaranteed restore point and a normal restore point is that a guaranteed
    restore point is not eventually aged out of the control file; a guaranteed restore
    point will persist until you drop it. Guaranteed restore points do require an
    FRA. However, for incomplete recovery using a guaranteed restore point, you do
    not have to have flashback database enabled.


    You can create a normal restore point using SQL*Plus, as follows:


    ```

    SQL> create restore point MY_RP;

    ```


    This command creates a restore point, named `MY_RP`, that is associated with the
    SCN of the database at the time the command was issued. You can view the current
    SCN of your database, as shown:


    ```

    SQL> select current_scn from v$database;

    ```


    You can view restore point information in the `V$RESTORE_POINT` view, like so:


    ```

    SQL> select name, scn from v$restore_point;

    ```


    The restore point acts like a synonym for the particular SCN. The restore point
    allows you to restore and recover to an SCN without having to specify a number.
    RMAN will restore and recover up to, but not including, the SCN associated with
    the restore point.'
