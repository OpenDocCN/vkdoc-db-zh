  trans: "\n如果一切运行顺利，最终结果将是一个在表空间、用户、对象等方面与源数据库逻辑上完全相同的数据库。\n\n## 模式级别\n\n当你启动导出时，除非另有说明，数据泵会为运行导出作业的用户启动一个模式级别导出。用户级别导出常用于将一个或多个模式从一个环境复制到另一个环境。以下命令为\
    \ `MV_MAINT` 用户启动一个模式级别导出：\n\n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=mv_maint.dmp\
    \ logfile=mv_maint.log\n```\n\n在屏幕上显示的输出中，你应该会看到一些表明已启动模式级别导出的文本：\n\n```\nStarting\
    \ \"MV_MAINT\".\"SYS_EXPORT_SCHEMA_01\"...\n```\n\n你也可以使用 `SCHEMAS` 参数，为运行导出作业之外的其他用户启动模式级别导出。以下命令展示了为多个用户进行模式级别导出：\n\
    \n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=user.dmp  schemas=heera,chaya\n\
    ```\n\n你可以通过引用一个使用模式级别导出生成的转储文件来启动模式级别导入：\n\n```\n$ impdp mv_maint/foo directory=dp_dir\
    \ dumpfile=user.dmp\n```\n\n当你启动模式级别导入时，有一些细节需要注意：\n\n*   模式级别导出不包含任何表空间。\n* \
    \  导入作业会尝试重新创建转储文件中的任何用户。如果用户已存在，则会报错，然后导入作业继续执行。\n*   导入作业将根据导出的密码重置用户的密码。\n\
    *   用户所属的表将被导入并填充数据。如果表已存在，你必须通过 `TABLE_EXISTS_ACTION` 参数指示数据泵如何处理这种情况。\n\n你也可以在使用完全导出转储文件时启动模式级别导入。为此，请指定你想从完全导出中提取哪些模式：\n\
    \n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=full.dmp schemas=heera,chaya\n\
    ```\n\n## 表级别\n\n你可以通过 `TABLES` 参数指示数据泵操作特定的表。例如，假设你想导出\n\n```\n$ expdp mv_maint/foo\
    \ directory=dp_dir dumpfile=tab.dmp \\\ntables=heera.inv,heera.inv_items\n```\n\
    \n你应该在输出中看到一些文本，表明正在进行表级别导出：\n\n```\nStarting \"MV_MAINT\".\"SYS_EXPORT_TABLE_01...\n\
    ```\n\n类似地，你可以通过指定表级别创建的转储文件来启动表级别导入：\n\n```\n$ impdp mv_maint/foo directory=dp_dir\
    \ dumpfile=tab.dmp\n```\n\n表级别导入仅尝试导入指定的表及其数据。如果表已存在，则会报错，然后导入作业继续执行。如果表已存在且包含数据，你必须指定导出作业应如何处理这种情况。你可以通过\
    \ `TABLE_EXISTS_ACTION` 参数让导入作业跳过、追加、替换或截断该表。\n\n你也可以在使用完全导出转储文件或模式级别导出时启动表级别导入。为此，请指定你想从完全或模式级别导出中提取哪些表：\n\
    \n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=full.dmp tables=heera.inv\n\
    ```\n\n## 表空间级别\n\n表空间级别导出/导入操作包含在特定表空间中的对象。此示例导出 `USERS` 表空间中包含的所有对象：\n\n```\n\
    $ expdp mv_maint/foo directory=dp_dir dumpfile=tbsp.dmp tablespaces=users\n```\n\
    \n输出中显示的文本应表明正在进行表空间级别导出：\n\n```\nStarting \"MV_MAINT\".\"SYS_EXPORT_TABLESPACE_01\"\
    ...\n```\n\n你可以通过指定使用表空间级别导出创建的导出文件来启动表空间级别导入：\n\n```\n$ impdp mv_maint/foo directory=dp_dir\
    \ dumpfile=tbsp.dmp\n```\n\n你也可以通过使用完全导出但指定 `TABLESPACES` 参数来启动表空间级别导入：\n\n```\n\
    $ impdp mv_maint/foo directory=dp_dir dumpfile=full.dmp tablespaces=users\n```\n\
    \n表空间级别导入将尝试创建表空间内的任何表和索引。导入不会尝试重新创建表空间本身。\n\n![Image](img/sq.jpg) `注意` 还有一种可传输表空间模式导出。请参阅本章后面的“复制数据文件”一节。\n\
    \n## 传输数据\n\n数据泵的主要用途之一是将数据从一个数据库复制到另一个数据库。通常，源数据库和目标数据库位于相距数千英里的数据中心。数据泵提供了几个强大的功能来高效复制数据：\n\
    \n*   网络链接\n*   复制数据文件（可传输表空间）\n*   外部表\n\n使用网络链接允许你执行导出并将其直接导入目标数据库，而无需创建转储文件。这是一种非常高效的数据移动方式。\n\
    \nOracle 还提供了可传输表空间功能，让你可以将数据文件从源数据库复制到目标数据库，然后使用数据泵传输相关的元数据。这两种技术将在以下章节中描述。\n\
    \n### 直接通过网络导出和导入\n\n假设你有两个数据库环境——一个运行在 Solaris 服务器上的生产数据库和一个运行在 Linux 服务器上的测试数据库。你的老板向你提出以下要求：\n\
    \n*   在 Solaris 服务器上制作生产数据库的副本。\n*   将该副本导入 Linux 服务器上的测试数据库。\n*   在导入时更改模式名称以满足测试数据库的命名标准。\n\
    \n首先，考虑一下使用旧的 `exp`/`imp` 实用程序将数据从一个数据库传输到另一个数据库所需的步骤。步骤大致如下：\n\n1.  导出生产数据库（这会在数据库服务器上创建一个转储文件）。\n\
    2.  将转储文件复制到测试数据库服务器。\n3.  将转储文件导入测试数据库。\n\n你可以使用数据泵执行相同的步骤。然而，数据泵提供了一种更高效、更透明的方法来执行这些步骤。如果你的生产数据库服务器和测试数据库服务器之间有直接的网络连接，你可以执行导出并直接导入目标数据库，而无需创建或复制任何转储文件。此外，你可以在执行导入时动态重命名模式。另外，源数据库是否运行在与目标数据库不同的操作系统上并不重要。\n\
    \n一个示例将有助于说明这是如何工作的。在此示例中，生产数据库用户是 `STAR2`、`CIA_APP` 和 `CIA_SEL`。你想将这些用户移动到测试数据库，并将它们重命名为\
    \ `STAR_JUL`、`CIA_APP_JUL` 和 `CIA_SEL_JUL`。此任务需要以下步骤：\n\n1.  在要导入的测试数据库中创建用户。以下是一个在测试数据库中创建用户的示例脚本：\n\
    \n    ```\n    define star_user=star_jul\n    define star_user_pwd=star_jul_pwd\n\
    \    define cia_app_user=cia_app_jul\n    define cia_app_user_pwd=cia_app_jul_pwd\n\
    \    define cia_sel_user=cia_sel_jul\n    define cia_sel_user_pwd=cia_sel_jul_pwd\n\
    \    --\n    create user &&star_user identified by &&star_user_pwd;\n    grant\
    \ connect,resource to &&star_user;\n    alter user &&star_user default tablespace\
    \ dim_data;\n    --\n    create user &&cia_app_user identified by &&cia_app_user_pwd;\n\
    \    grant connect,resource to &&cia_app_user;\n    alter user &&cia_app_user\
    \ default tablespace cia_data;\n    --\n    create user &&cia_sel_user identified\
    \ by &&cia_app_user_pwd;\n    grant connect,resource to &&cia_app_user;\n    alter\
    \ user &&cia_sel_user default tablespace cia_data;\n    ```\n\n2.\n"
- fmt: "## 使用数据库链接和网络链接导入数据\n\n在测试数据库中，创建一个指向生产数据库的数据库链接。`CREATE DATABASE LINK`语句中引用的远程用户必须在生产数据库中被授予`DBA`角色。以下是一个`CREATE\
    \ DATABASE LINK`脚本示例：\n\n```sql\ncreate database link dk\nconnect to darl identified\
    \ by foobar\nusing 'dwdb1:1522/dwrep1';\n```\n\n在测试数据库中，创建一个目录对象，指向你希望日志文件存放的位置：\n\
    \n```sql\nSQL> create or replace directory engdev as '/orahome/oracle/ddl/engdev';\n\
    ```\n\n在测试服务器上运行导入命令。此命令通过`NETWORK_LINK`参数引用远程数据库。该命令还指示 Data Pump 将生产数据库用户名映射到测试数据库中新建的用户。\n\
    \n```bash\n$ impdp darl/engdev directory=engdev network_link=dk \\\nschemas='STAR2,CIA_APP,CIA_SEL'\
    \ \\\nremap_schema=STAR2:STAR_JUL,CIA_APP:CIA_APP_JUL,CIA_SEL:CIA_SEL_JUL\n```\n\
    \n此技术允许你在不同的数据库之间移动大量数据，而无需创建或复制任何转储文件或数据文件。你还可以通过`REMAP_SCHEMA`参数动态重命名模式。这是一个非常强大的\
    \ Data Pump 功能，可以让你快速高效地传输数据。\n\n![Image](images/sq.jpg) **提示**：在复制整个数据库时，也可以考虑使用\
    \ RMAN 的 duplicate database 功能。\n\n### DATABASE LINK 与 NETWORK_LINK\n\n不要将通过数据库链接连接到远程数据库时进行的导出，与使用`NETWORK_LINK`参数进行的导出混淆。当通过数据库链接连接到远程数据库进行导出时，被导出的对象存在于远程数据库中，转储文件和日志文件根据`DIRECTORY`参数指定的目录在远程服务器上创建。例如，以下命令导出远程数据库中的对象并在远程服务器上创建文件：\n\
    \n```bash\n$ expdp mv_maint/foo@shrek2 directory=dp_dir dumpfile=sales.dmp\n```\n\
    \n相反，当你使用`NETWORK_LINK`参数导出时，你是在本地创建转储文件和日志文件，而被导出的数据库对象存在于远程数据库中；例如：\n\n```bash\n\
    $ expdp mv_maint/foo network_link=shrek2 directory=dp_dir dumpfile=sales.dmp\n\
    ```\n\n## 复制数据文件\n\nOracle 提供了一种将数据文件从一个数据库复制到另一个数据库的机制，结合使用 Data Pump 来传输相关的元数据。这被称为可传输表空间功能。此任务所需的时间取决于将数据文件复制到目标服务器所需的时间。此技术适用于在\
    \ DSS 和数据仓库环境中移动数据。\n\n![Image](images/sq.jpg) **提示**：可传输表空间还可以与 RMAN 的`CONVERT\
    \ TABLESPACE`命令结合使用，将表空间移动到与主机平台不同的目标服务器。\n\n### 传输表空间的步骤\n\n1.  确保表空间是自包含的。以下是一些常见的违反自包含规则的情况：\n\
    \    *   一个表空间中的索引不能指向不属于正在传输的表空间集合中的另一个表空间中的表。\n    *   在一个表空间中的表上定义的外键约束，引用了不属于正在传输的表空间集合中的另一个表空间中的表上的主键约束。\n\
    \    运行以下检查，查看正在传输的表空间集合是否违反了任何自包含规则：\n    ```sql\n    SQL> exec dbms_tts.transport_set_check('INV_DATA,INV_INDEX',\
    \ TRUE);\n    ```\n    现在，查看 Oracle 是否检测到任何违规：\n    ```sql\n    SQL> select *\
    \ from transport_set_violations;\n    ```\n    如果没有违规，你应该看到：\n    ```\n    no\
    \ rows selected\n    ```\n    如果有违规，例如索引建立在未被传输的表空间中的表上，那么你将不得不在正在被传输的表空间中重建该索引。\n\
    \n2.  将要传输的表空间设置为只读：\n    ```sql\n    SQL> alter tablespace inv_data read only;\n\
    \    SQL> alter tablespace inv_index read only;\n    ```\n\n3.  使用 Data Pump 导出要传输的表空间的元数据：\n\
    \    ```bash\n    $ expdp mv_maint/foo directory=dp_dir dumpfile=trans.dmp \\\n\
    \    transport_tablespaces=INV_DATA,INV_INDEX\n    ```\n\n4.  将 Data Pump 导出转储文件复制到目标服务器。\n\
    5.  将数据文件复制到目标数据库。将文件放在目标数据库服务器中你希望它们位于的目录中。文件名和目录路径必须与下一步中使用的导入命令匹配。\n6.  将元数据导入到目标数据库。使用以下参数文件来导入被传输数据文件的元数据：\n\
    \    ```\n    userid=mv_maint/foo\n    directory=dp_dir\n    dumpfile=trans.dmp\n\
    \    transport_datafiles=/ora01/dbfile/rcat/inv_data01.dbf,\n    /ora01/dbfile/rcat/inv_index01.dbf\n\
    \    ```\n    如果一切顺利，你应该会看到一些指示成功的输出：\n    ```text\n    Job \"MV_MAINT\".\"SYS_IMPORT_TRANSPORTABLE_01\"\
    \ successfully completed...\n    ```\n    如果被传输的数据块的块大小与目标数据库的不同，那么你必须修改你的初始化文件（或使用`ALTER\
    \ SYSTEM`命令）并添加一个包含源数据库块大小的缓冲池。例如，要添加一个 16KB 的缓冲区高速缓存，请在初始化文件中放置以下内容：\n    ```\n\
    \    db_16k_cache_size=200M\n    ```\n    你可以通过此查询检查表空间的块大小：\n    ```sql\n   \
    \ SQL> select tablespace_name, block_size from dba_tablespaces;\n    ```\n   \
    \ 可传输表空间机制允许你在数据库之间快速移动数据文件，即使数据库使用不同的块大小或不同的 endian 格式。本节并未讨论与可传输表空间相关的所有细节；本章的重点是展示如何使用\
    \ Data Pump 来传输数据。有关可传输表空间的完整细节，请参阅可从 Oracle 网站技术网络区域（`http://otn.oracle.com`）免费下载的《Oracle\
    \ Database Administrator’s Guide》。\n\n![Image](images/sq.jpg) **注意**：要生成可传输表空间，你必须使用\
    \ Oracle 企业版。你可以使用其他版本的 Oracle 来导入可传输表空间。\n\n## 操作存储的特性\n\nData Pump 包含许多灵活的特性，用于在导出和导入时操作表空间和数据文件。以下各节展示了在处理这些重要数据库对象时有用的\
    \ Data Pump 技术。\n\n### 导出表空间元数据\n\n有时，你可能需要复制一个环境——例如，将生产环境复制到测试环境中。首要任务之一是复制表空间。为此，你可以使用\
    \ Data Pump 提取仅用于重新创建环境表空间所需的 DDL：\n\n```bash\n$ expdp mv_maint/foo directory=dp_dir\
    \ dumpfile=inv.dmp \\\nfull=y include=tablespace\n```\n\n`FULL`参数指示 Data Pump\
    \ 导出数据库中的所有内容。然而，当与`INCLUDE`一起使用时，Data Pump 仅导出该命令指定的对象。"
  raw: 'In your testing database, create a database link that points to your production
    database. The remote user referenced in the `CREATE DATABASE LINK` statement must
    have the DBA role granted to it in the production database. Here is a sample `CREATE
    DATABASE LINK` script:                    ```     create database link dk     connect
    to darl identified by foobar     using ''dwdb1:1522/dwrep1'';     ```           3.  In
    your testing database, create a directory object that points to the location where
    you want your log file to go:                    ```     SQL> create or replace
    directory engdev as ''/orahome/oracle/ddl/engdev'';     ```           4.  Run
    the import command on the testing box. This command references the remote database
    via the `NETWORK_LINK` parameter. The command also instructs Data Pump to map
    the production database user names to the newly created users in the testing database.                    ```     $
    impdp darl/engdev directory=engdev network_link=dk \     schemas=''STAR2,CIA_APP,CIA_SEL''
    \     remap_schema=STAR2:STAR_JUL,CIA_APP:CIA_APP_JUL,CIA_SEL:CIA_SEL_JUL     ```              This
    technique allows you to move large amounts of data between disparate databases
    without having to create or copy any dump files or data files. You can also rename
    schemas on the fly via the `REMAP_SCHEMA` parameter. This is a very powerful Data
    Pump feature that lets you transfer data quickly and efficiently.    ![Image](images/sq.jpg) **Tip**  When
    replicating entire databases, also consider using the RMAN duplicate database
    functionality.    **DATABASE LINK VS. NETWORK_LINK**    Don’t confuse exporting
    while connected to a remote database over a database link with exporting using
    the `NETWORK_LINK` parameter. When exporting while connected to a remote database
    via a database link, the objects being exported exist in the remote database,
    and the dump file and log file are created on the remote server in the directory
    specified by the `DIRECTORY` parameter. For instance, the following command exports
    objects in the remote database and creates files on the remote server:    `$ expdp
    mv_maint/foo@shrek2 directory=dp_dir dumpfile=sales.dmp`    In contrast, when
    you export using the `NETWORK_LINK` parameter, you are creating dump files and
    log files locally, and the database objects being exported exist in a remote database;
    for example,    `$ expdp mv_maint/foo network_link=shrek2 directory=dp_dir dumpfile=sales.dmp`    Copying
    Data Files    Oracle provides a mechanism for copying data files from one database
    to another, in conjunction with using Data Pump to transport the associated metadata.
    This is known as the transportable tablespace feature. The amount of time this
    task requires depends on how long it takes you to copy the data files to the destination
    server. This technique is appropriate for moving data in DSS and data warehouse
    environments.    ![Image](images/sq.jpg) **Tip**  Transporting tablespaces can
    also be used (in conjunction with the RMAN `CONVERT TABLESPACE` command) to move
    tablespaces to a destination server that has a platform different from that of
    the host.    Follow these steps to transport tablespaces:    1.  Ensure that the
    tablespace is self-contained. These are some common violations of the self-contained
    rule:               *   An index in one tablespace can’t point to a table in another
    tablespace that isn’t in the set of tablespaces being transported.     *   A foreign
    key constraint is defined on a table in a tablespace that references a primary
    key constraint on a table in a tablespace that isn’t in the set of tablespaces
    being transported.          Run the following check to see if the set of tablespaces
    being transported violates any of the self-contained rules:                    ```     SQL>
    exec dbms_tts.


    transport_set_check(''INV_DATA,INV_INDEX'', TRUE);     ```                    Now,
    see if Oracle detected any violations:                    ```     SQL> select
    * from transport_set_violations;     ```                    If you don’t have
    any violations, you should see this:                    ```     no rows selected     ```                    If
    you do have violations, such as an index that is built on a table that exists
    in a tablespace not being transported, then you’ll have to rebuild the index in
    a tablespace that is being transported.           2.  Make the tablespaces being
    transported read-only:                    ```     SQL> alter tablespace inv_data
    read only;     SQL> alter tablespace inv_index read only;     ```           3.  Use
    Data Pump to export the metadata for the tablespaces being transported:                    ```     $
    expdp mv_maint/foo directory=dp_dir dumpfile=trans.dmp \     transport_tablespaces=INV_DATA,INV_INDEX     ```           4.  Copy
    the Data Pump export dump file to the destination server. 5.  Copy the data file(s)
    to the destination database. Place the files in the directory where you want them
    in the destination database server. The file name and directory path must match
    the import command used in the next step. 6.  Import the metadata into the destination
    database. Use the following parameter file to import the metadata for the data
    files being transported:                    ```     userid=mv_maint/foo     directory=dp_dir     dumpfile=trans.dmp     transport_datafiles=/ora01/dbfile/rcat/inv_data01.dbf,     /ora01/dbfile/rcat/inv_index01.dbf     ```              If
    everything goes well, you should see some output indicating success:    ``` Job
    "MV_MAINT"."SYS_IMPORT_TRANSPORTABLE_01" successfully completed... ```    If the
    data files that are being transported have a block size different from that of
    the destination database, then you must modify your initialization file (or use
    an `ALTER SYSTEM` command) and add a buffer pool that contains the block size
    of the source database. For example, to add a 16KB buffer cache, place this in
    the initialization file:    ``` db_16k_cache_size=200M ```    You can check a
    tablespace’s block size via this query:    ``` SQL> select tablespace_name, block_size
    from dba_tablespaces; ```    The transportable tablespace mechanism allows you
    to quickly move data files between databases, even if the databases use different
    block sizes or have different endian formats. This section doesn’t discuss all
    the details involved with transportable tablespaces; the focus of this chapter
    is to show how to use Data Pump to transport data. See the *Oracle Database Administrator’s
    Guide*, which can be freely downloaded from the Technology Network area of the
    Oracle Web site (`http://otn.oracle.com``)`, for complete details on transportable
    tablespaces.    ![Image](images/sq.jpg) **Note**  To generate transportable tablespaces,
    you must use the Oracle Enterprise Edition. You can use other editions of Oracle
    to import transportable tablespaces.    Features for Manipulating Storage    Data
    Pump contains many flexible features for manipulating tablespaces and data files
    when exporting and importing. The following sections show useful Data Pump techniques
    when working with these important database objects.    Exporting Tablespace Metadata    Sometimes,
    you may be required to replicate an environment—say, replicating a production
    environment into a testing environment. One of the first tasks is to replicate
    the tablespaces. To this end, you can use Data Pump to pull out just the DDL required
    to recreate the tablespaces for an environment:    ``` $ expdp mv_maint/foo directory=dp_dir
    dumpfile=inv.dmp \ full=y include=tablespace ```    The `FULL` parameter instructs
    Data Pump to export everything in the database. However, when used with `INCLUDE`,
    Data Pump exports only the objects specified with that command.'
