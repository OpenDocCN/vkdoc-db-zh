- fmt: "If everything runs well, the end result will be a database that is logically\
    \ identical to the source database in terms of tablespaces, users, objects, and\
    \ so on.\n\n## Schema Level\n\nWhen you initiate an export, unless otherwise specified,\
    \ Data Pump starts a schema-level export for the user running the export job.\
    \ User-level exports are frequently used to copy a schema or set of schemas from\
    \ one environment to another. The following command starts a schema-level export\
    \ for the `MV_MAINT` user:\n\n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=mv_maint.dmp\
    \ logfile=mv_maint.log\n```\n\nIn the output displayed on the screen, you should\
    \ see some text indicating that a schema-level export has been initiated:\n\n\
    ```\nStarting \"MV_MAINT\".\"SYS_EXPORT_SCHEMA_01\"...\n```\n\nYou can also initiate\
    \ a schema-level export for users other than the one running the export job with\
    \ the `SCHEMAS` parameter. The following command shows a schema-level export for\
    \ multiple users:\n\n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=user.dmp\
    \  schemas=heera,chaya\n```\n\nYou can initiate a schema-level import by referencing\
    \ a dump file that was taken with a schema-level export:\n\n```\n$ impdp mv_maint/foo\
    \ directory=dp_dir dumpfile=user.dmp\n```\n\nWhen you initiate a schema-level\
    \ import, there are some details to be aware of:\n\n*   No tablespaces are included\
    \ in a schema-level export.\n*   The import job attempts to recreate any users\
    \ in the dump file. If a user already exists, an error is thrown, and the import\
    \ job continues.\n*   The import job will reset the users’ passwords, based on\
    \ the password that was exported.\n*   Tables owned by the users will be imported\
    \ and populated. If a table already exists, you must instruct Data Pump on how\
    \ to handle this with the `TABLE_EXISTS_ACTION` parameter.\n\nYou can also initiate\
    \ a schema-level import when using a full-export dump file. To do this, specify\
    \ which schemas you want extracted from the full export:\n\n```\n$ impdp mv_maint/foo\
    \ directory=dp_dir dumpfile=full.dmp schemas=heera,chaya\n```\n\n## Table Level\n\
    \nYou can instruct Data Pump to operate on specific tables via the `TABLES` parameter.\
    \ For example, say you want to export\n\n```\n$ expdp mv_maint/foo directory=dp_dir\
    \ dumpfile=tab.dmp \\\ntables=heera.inv,heera.inv_items\n```\n\nYou should see\
    \ some text in the output indicating that a table-level export is transpiring:\n\
    \n```\nStarting \"MV_MAINT\".\"SYS_EXPORT_TABLE_01...\n```\n\nSimilarly, you can\
    \ initiate a table-level import by specifying a table-level-created dump file:\n\
    \n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=tab.dmp\n```\n\nA table-level\
    \ import only attempts to import the tables and specified data. If a table already\
    \ exists, an error is thrown, and the import job continues. If a table already\
    \ exists and contains data, you must specify how you want the export job to handle\
    \ this. You can have the import job either skip, append, replace, or truncate\
    \ the table with the `TABLE_EXISTS_ACTION` parameter.\n\nYou can also initiate\
    \ a table-level import when using a full-export dump file or a schema-level export.\
    \ To do this, specify which tables you want extracted from the full- or schema-level\
    \ export:\n\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=full.dmp tables=heera.inv\n\
    ```\n\n## Tablespace Level\n\nA tablespace-level export/import operates on objects\
    \ contained within specific tablespaces. This example exports all objects contained\
    \ in the `USERS` tablespace:\n\n```\n$ expdp mv_maint/foo directory=dp_dir dumpfile=tbsp.dmp\
    \ tablespaces=users\n```\n\nThe text displayed in the output should indicate that\
    \ a tablespace-level export is occurring:\n\n```\nStarting \"MV_MAINT\".\"SYS_EXPORT_TABLESPACE_01\"\
    ...\n```\n\nYou can initiate a tablespace-level import by specifying an export\
    \ file that was created with a tablespace-level export:\n\n```\n$ impdp mv_maint/foo\
    \ directory=dp_dir dumpfile=tbsp.dmp\n```\n\nYou can also initiate a tablespace-level\
    \ import by using a full export, but specifying the `TABLESPACES` parameter:\n\
    \n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=full.dmp tablespaces=users\n\
    ```\n\nA tablespace-level import will attempt to create any tables and indexes\
    \ within the tablespace. The import doesn’t try to recreate the tablespaces themselves.\n\
    \n![Image](images/sq.jpg) `Note` There is also a transportable tablespace mode\
    \ export. See the section “Copying Data Files”, later in this chapter.\n\n## Transferring\
    \ Data\n\nOne of the main uses of Data Pump is the copying of data from one database\
    \ to another. Often, source and destination databases are located in data centers\
    \ thousands of miles apart. Data Pump offers several powerful features for efficiently\
    \ copying data:\n\n*   Network link\n*   Copying data files (transportable tablespaces)\n\
    *   External tables\n\nUsing a network link allows you to take an export and import\
    \ it into the destination database without having to create a dump file. This\
    \ is a very efficient way of moving data.\n\nOracle also provides the transportable\
    \ tablespace feature, which lets you copy the data files from a source database\
    \ to the destination and then use Data Pump to transfer the associated metadata.\
    \ These two techniques are described in the following sections.\n\n### Exporting\
    \ and Importing Directly Across the Network\n\nSuppose you have two database environments—a\
    \ production database running on a Solaris box and a test database running on\
    \ a Linux server. Your boss comes to you with these requirements:\n\n*   Make\
    \ a copy of the production database on the Solaris box.\n*   Import the copy into\
    \ the testing database on the Linux server.\n*   Change the names of the schemas\
    \ when importing so as to meet the testing database standards for names.\n\nFirst,\
    \ consider the steps required to transfer data from one database to another, using\
    \ the old `exp`/`imp` utilities. The steps would look something like this:\n\n\
    1.  Export the production database (which creates a dump file on the database\
    \ server).\n2.  Copy the dump file to the testing database server.\n3.  Import\
    \ the dump file into the testing database.\n\nYou can perform those same steps\
    \ using Data Pump. However, Data Pump provides a much more efficient and transparent\
    \ method for executing those steps. If you have direct network connectivity between\
    \ the production and testing database servers, you can take an export and directly\
    \ import it into your target database without having to create or copy any dump\
    \ files. Furthermore, you can rename schemas on the fly as you perform the import.\
    \ Additionally, it doesn’t matter if the source database is running on an OS different\
    \ from that of the target database.\n\nAn example will help illustrate how this\
    \ works. For this example, the production database users are `STAR2`, `CIA_APP`,\
    \ and `CIA_SEL`. You want to move these users into a testing database and rename\
    \ them `STAR_JUL`, `CIA_APP_JUL`, and `CIA_SEL_JUL`. This task requires the following\
    \ steps:\n\n1.  Create users in the test database to be imported into. Here is\
    \ a sample script that creates the users in the testing database:\n\n    ```\n\
    \    define star_user=star_jul\n    define star_user_pwd=star_jul_pwd\n    define\
    \ cia_app_user=cia_app_jul\n    define cia_app_user_pwd=cia_app_jul_pwd\n    define\
    \ cia_sel_user=cia_sel_jul\n    define cia_sel_user_pwd=cia_sel_jul_pwd\n    --\n\
    \    create user &&star_user identified by &&star_user_pwd;\n    grant connect,resource\
    \ to &&star_user;\n    alter user &&star_user default tablespace dim_data;\n \
    \   --\n    create user &&cia_app_user identified by &&cia_app_user_pwd;\n   \
    \ grant connect,resource to &&cia_app_user;\n    alter user &&cia_app_user default\
    \ tablespace cia_data;\n    --\n    create user &&cia_sel_user identified by &&cia_app_user_pwd;\n\
    \    grant connect,resource to &&cia_app_user;\n    alter user &&cia_sel_user\
    \ default tablespace cia_data;\n    ```\n\n2."
