    ## CHAPTER 2


    ![image](images/frontdot.jpg)


    ## Files in Support of Backup and Recovery Operations


    An Oracle database consists of three types of mandatory files: control files,
    online redo logs, and data files. This chapter looks at the basics of managing
    these critical files. This chapter also discusses how to implement archiving (which
    generates archive redo log files) and enabling a fast recovery area (FRA). Understanding
    how to enable archiving and how to manage archive redo logs is a crucial part
    of database administration and backup and recovery. It’s also important to understand
    basic FRA concepts as RMAN (unless otherwise directed) will by default write backup
    files to the FRA.


    When working with RMAN, it’s essential to understand the files that comprise the
    database. Being familiar with the physical characteristics of your database lay
    the foundation for understanding how RMAN performs backup and recovery operations.
    This knowledge will enable you to better understand the underlying mechanics and
    also provide the base information required for troubleshooting when problems arise.
    First up is managing control files.


    ## Managing Control Files


    A control file is a small binary file that stores information such as the database
    name, names and locations of data files, names and locations of online redo log
    files, current online redo log sequence number, checkpoint information, and names
    and locations of RMAN backup files (if using). You can query much of the information
    stored in the control file from data dictionary views. This example displays the
    types of information stored in the control file by querying `V$CONTROLFILE_RECORD_SECTION`:


    ```

    SQL> select distinct type from v$controlfile_record_section;


    TYPE

    ------------------

    FILENAME

    TABLESPACE

    RMAN CONFIGURATION

    BACKUP CORRUPTION

    PROXY COPY

    FLASHBACK LOG

    ...

    ```


    You can view database-related information stored in the control file via the `V$DATABASE`
    view:


    ```

    SQL> select name, open_mode, created, current_scn from v$database;


    NAME      OPEN_MODE            CREATED   CURRENT_SCN

    --------- -------------------- --------- -----------

    O12C      READ WRITE           27-SEP-14      319781

    ```


    Every Oracle database must have at least one control file. When you start your
    database in nomount mode, the instance is aware of the location of the control
    files from the `CONTROL_FILES` initialization parameter in the `spfile` or `init.ora`
    file. When you issue a `STARTUP NOMOUNT` command, Oracle reads the parameter file
    and starts the background processes and allocates memory structures:


    ```

    -- locations of control files are known to the instance

    SQL> startup nomount;

    ```


    At this point, the control files haven’t been touched by any processes. When you
    alter your database into mount mode, the control files are read and opened for
    use:


    ```

    -- control files opened

    SQL> alter database mount;

    ```


    If any of the control files listed in the `CONTROL_FILES` initialization parameter
    aren’t available, then you can’t mount your database.


    When you successfully mount your database, the instance is aware of the locations
    of the data files and online redo logs but hasn’t yet opened them. After you alter
    your database into open mode, the data files and online redo logs are opened:


    ```

    -- datafiles and online redo logs opened

    SQL> alter database open;

    ```


    ![Image](images/sq.jpg) **Note**  Keep in mind that when you issue the `STARTUP`
    command (with no options), the previously described three phases are automatically
    performed in this order: nomount, mount, open. When you issue a `SHUTDOWN` command,
    the phases are reversed: close the database, unmount the control file, and stop
    the instance.


    The control file is created when the database is created. If possible you should
    have multiple control files stored on separate storage devices controlled by separate
    controllers.


    After the database has been opened, Oracle will frequently write information to
    the control files, such as when you make any physical modifications (e.g., creating
    a tablespace, adding/removing/resizing a data file). Oracle writes to all control
    files specified by the `CONTROL_FILES` initialization parameter. If Oracle can’t
    write to one of the control files, an error is thrown:


    ```

    ORA-00210: cannot open the specified control file

    ```


    If one of your control files becomes unavailable, shut down your database, and
    resolve the issue before restarting (see [Chapter 6](#9781484207642_Ch06.xhtml)
    for using RMAN to restore a control file). Fixing the problem may mean resolving
    a storage-device failure or modifying the `CONTROL_FILES` initialization parameter
    to remove the control file entry for the control file that isn’t available.


    ### DISPLAYING THE CONTENTS OF A CONTROL FILE


    You can use the `ALTER SESSION` statement to display the physical contents of
    the control file; for example,


    ```

    SQL> oradebug setmypid

    SQL> oradebug unlimit

    SQL> alter session set events ''immediate trace name controlf level 9'';

    SQL> oradebug tracefile_name

    ```


    The prior line of code displays the following name of the trace file:


    ```

    /orahome/app/oracle/diag/rdbms/o12c/O12C/trace/O12C_ora_15545.trc

    ```


    In Oracle 11g and above, the trace file is written to the `$ADR_HOME/trace` directory.
    You can also view the trace directory name via this query:


    ```

    SQL> select value from v$diag_info where name=''Diag Trace'';

    ```


    In Oracle 10g and below, the trace directory is defined by the `USER_DUMP_DEST`
    initialization parameter. You can inspect the contents of the control file when
    troubleshooting or when you’re trying to gain a better understanding of Oracle
    internals.


    ### Viewing Control File Names and Locations


    If your database is in a nomount state, a mounted state, or an open state, you
    can view the names and locations of the control files, as follows:


    ```

    SQL> show parameter control_files

    ```


    You can also view control file location and name information by querying the `V$CONTROLFILE`
    view. This query works while your database is mounted or open:


    ```

    SQL> select name from v$controlfile;

    ```


    If, for some reason, you can’t start your database at all, and you need to know
    the names and locations of the control files, you can inspect the contents of
    the initialization (parameter) file to see where they’re located. If you’re using
    an `spfile`, even though it’s a binary file, you can still open it with a text
    editor. The safest approach is to make a copy of the `spfile` and then inspect
    its contents with an OS editor:


    ```

    $ cp $ORACLE_HOME/dbs/spfileO12C.ora $ORACLE_HOME/dbs/spfileO12C.copy

    $ vi $ORACLE_HOME/dbs/spfileO12C.copy

    ```


    You can also use the `strings` command to search for values in a binary file:


    ```

    $ strings $ORACLE_HOME/dbs/spfileO12C.ora | grep -i control_files

    ```


    If you’re using a text-based initialization file, you can view the file directly,
    with an OS editor, or use the `grep` command:


    ```

    $ grep -i control_files $ORACLE_HOME/dbs/initO12C.ora

    ```


