    ```

    SQL> shutdown immediate;

    SQL> startup mount;

    SQL> alter database noarchivelog;

    SQL> alter database open;

    ```


    The archiver background process writes archive redo logs to a location that you
    specify. If, for any reason, the archiver process can’t write to the archive location,
    your database hangs. Any users attempting to connect receive this error:


    ```

    ORA-00257: archiver error. Connect internal only, until freed.

    ```


    As a production-support DBA, you never want to let your database get into that
    state. Sometimes, unpredictable events happen, and you have to deal with unforeseen
    issues.


    ![Image](images/sq.jpg)

    **Note** DBAs who support production databases have a mindset completely different
    from that of architect DBAs, who get new ideas from flashy presentations or regurgitated
    documentation.


    In this situation your database is as good as down and completely unavailable.
    To fix the issue, you have to act quickly:

    *   Move files to a different location.

    *   Compress old files in the archive redo log location.

    *   Permanently remove old files.

    *   Switch the archive redo log destination to a different location (this can
    be changed dynamically, while the database is up and running).


    Moving files is usually the quickest and safest way to resolve the archiver error.
    You can use an OS utility such as `mv` to move old archive redo logs to a different
    location. If they’re needed for a subsequent restore and recovery, you can let
    the recovery process know about the new location. Be careful not to move an archive
    redo log that is currently being written to. If an archived redo log file appears
    in `V$ARCHIVED_LOG`, that means it has been completely archived.


    You can use an OS utility such as `gzip` to compress archive redo log files in
    the current archive destination. If you do this, you have to remember to uncompress
    any files that may be later needed for a restore and recovery. Be careful not
    to compress an archive redo log that is currently being written to.


    Another option is to use an OS utility such as `rm` to remove archive redo logs
    from disk permanently. This approach is dangerous because you may need those archive
    redo logs for a subsequent recovery. If you do remove archive redo log files,
    and you don’t have a backup of them, you should make a full backup of your database
    as soon as possible. Again, this approach is risky and should only be done as
    a last resort; if you delete archive redo logs that haven’t been backed up, then
    you chance not being able to perform a complete recovery.


    If another location on your server has plenty of space, you can consider changing
    the location to which the archive redo logs are being written. You can perform
    this operation while the database is up and running; for example,


    ```

    SQL> alter system set log_archive_dest_1=''location=/u02/oraarch/O12C'';

    ```


    After you’ve resolved the issue with the primary location, you can switch back
    the original location.


    For most databases, writing the archive redo logs to one location is sufficient.
    However, if you have any type of disaster recovery or high-availability requirement,
    then you should write to multiple locations. Sometimes, DBAs set up a job to back
    up the archive redo logs every hour and copy them to an alternate location or
    even to an alternate server.


    # Backing Up Archive Redo Log Files


    Depending on your business requirements, you may need a strategy for backing up
    archive redo log files. Minimally, you should back up any archive redo logs generated
    during a backup of a database in archivelog mode. Additional strategies may include

    *   periodically copying archive redo logs to an alternate location and then removing
    them from the primary destination

    *   copying the archive redo logs to tape and then deleting them from disk

    *   using two archive redo log locations

    *   using Data Guard for a robust disaster recovery solution


    Keep in mind that you need all archive redo logs generated since the begin time
    of the last good backup to ensure that you can completely recover your database.
    Only after you’re sure you have a good backup of your database should you consider
    removing archive redo logs that were generated prior to the backup.


    If you’re using RMAN as a backup and recovery strategy, then you should use RMAN
    to backup the archive redo logs. Additionally, you should specify an RMAN retention
    policy for these files and have RMAN remove the archive redo logs only after the
    retention policy requirements are met (e.g., back up files at least once before
    removing from disk) (see [Chapter 5](#9781484207642_Ch05.xhtml) for details on
    using RMAN).


    # Managing Tablespaces and Data files


    The term `tablespace` is something of a misnomer, in that it’s not just a space
    for tables. Rather, a `tablespace` is a logical container that allows you to manage
    groups of data files, the physical files on disk that consume space. Once a tablespace
    is created, you can then create database objects (tables and indexes) within tablespaces,
    which results in space allocated on disk in the associated data files.


    A `tablespace` is logical in the sense that it is only visible through data dictionary
    views (such as `DBA_TABLESPACES`); you manage tablespaces through SQL*Plus or
    graphical tools (such as Enterprise Manager), or both. Tablespaces only exist
    while the database is up and running.


    `Data files` can also be viewed through data dictionary views (such as `DBA_DATA_FILES`)
    but additionally have a physical presence, as they can be viewed outside the database
    through OS utilities (such as `ls`). Data files persist whether the database is
    open or closed.


    Oracle databases typically contain several tablespaces. A tablespace can have
    one or more data files associated with it, but a data file can be associated with
    only one tablespace. In other words, a data file can’t be shared between two (or
    more) tablespaces.


    Objects (such as tables and indexes) are owned by users and created within tablespaces.
    An object is logically instantiated as a `segment`. A `segment` consists of `extents`
    of space within the tablespace. An `extent` consists of a set of database blocks.
    [Figure 2-3](#9781484207642_Ch02.xhtml#Fig3) shows the relationships between these
    logical and physical constructs used to manage space within an Oracle database.


    ![9781484207642_Fig02-03.jpg](images/9781484207642_Fig02-03.jpg)

    [Figure 2-3](#9781484207642_Ch02.xhtml#_Fig3). Relationships of logical storage
    objects and physical storage


    When you create a database, typically five tablespaces are created when you execute
    the `CREATE DATABASE` statement: `SYSTEM`, `SYSAUX`, `UNDO`, `TEMP`, and `USERS`.


    These five tablespaces are the minimal set of storage containers you need to operate
    a database (one could argue, however, you don’t need the `USERS` tablespace; more
    on that in the next section). As you open a database for use, you should quickly
    create additional tablespaces for storing application data. This chapter discusses
    the purpose of the standard set of tablespaces, the need for additional tablespaces,
    and how to manage these critical database storage containers. The chapter focuses
    on the most common and critical tasks associated with creating and maintaining
    tablespaces and data files, progressing to more advanced topics, such as moving
    and renaming data files.


    ## Understanding the First Five


    The `SYSTEM` tablespace provides storage for the Oracle data dictionary objects.
    This tablespace is where all objects owned by the `SYS` user are stored. The `SYS`
    user should be the only user that owns objects created in the `SYSTEM` tablespace.


    Starting with Oracle 10g, the `SYSAUX` (system auxiliary) tablespace is created
    when you create the database. This is an auxiliary tablespace used as a data repository
    for Oracle database tools, such as Enterprise Manager, Statspack, LogMiner, Logical
    Standby, and so on.'
