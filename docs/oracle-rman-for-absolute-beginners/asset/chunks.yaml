- fmt: '# RMAN 恢复目录管理与输出日志记录


    ## 删除恢复目录


    系统会提示如下信息：


    ```

    recovery catalog owner is RCAT

    enter DROP CATALOG command again to confirm catalog removal

    ```


    如果再次输入 `DROP CATALOG` 命令，恢复目录中的所有对象都将从恢复目录数据库中删除。


    另一种删除目录的方式是删除其所有者。为此，需使用具有 `DBA` 权限的用户连接到恢复目录，并执行 `DROP USER` 语句：


    ```

    $ sqlplus system/manager

    SQL> drop user rcat cascade;

    ```


    SQL*Plus 不会再次提示；它会按照您的指示直接删除用户及其对象。再次强调，执行此操作的前提是您确信不再需要恢复目录或其数据。删除用户或恢复目录时请谨慎操作：建议在删除之前，对恢复目录所有者进行
    Data Pump 导出。


    ## 记录 RMAN 输出


    在排查 RMAN 输出问题或检查备份作业状态时，记录 RMAN 的执行内容及每个命令的状态至关重要。有几种记录 RMAN 输出的方法，有些是 Linux/Unix
    操作系统的内置功能，有些是 RMAN 特有的功能：


    *   Linux/Unix 重定向输出到文件

    *   Linux/Unix 日志记录命令

    *   RMAN `SPOOL LOG` 命令

    *   `V$RMAN_OUTPUT` 视图


    这些日志功能将在接下来的章节中讨论。


    ### 重定向输出到文件


    我几乎所有的 RMAN 备份作业都从 shell 脚本运行。这些脚本通常由 `cron` 等调度工具自动运行。以此方式运行 RMAN 命令时，我总是通过指示
    shell 命令将标准输出消息和标准错误消息重定向到一个日志文件来捕获输出。这是通过重定向（`>`）字符完成的。此示例运行一个 shell 脚本（`rmanback.bsh`），并将标准输出和标准错误输出都重定向到名为
    `rmanback.log` 的日志文件：


    ```

    $ rmanback.bsh 1>/home/oracle/bin/log/rmanback.log 2>&1

    ```


    这里，`1>` 指示将标准输出重定向到指定文件。`2>&1` 指示 shell 脚本将标准错误输出发送到与标准输出相同的位置。


    ![Image](images/sq.jpg)

    > **提示**：有关 DBA 如何使用 shell 脚本和 Linux 功能的更多详细信息，请参阅 Darl Kuhn 所著的《Linux Recipes
    for Oracle DBAs》（Apress，2008 年）。


    ### 使用 Linux/Unix 日志记录命令捕获输出


    您可以指示 Linux/Unix 创建一个日志文件，以捕获同时显示在屏幕上的任何输出。这可以通过以下两种方式之一完成：


    *   `tee`

    *   `script`


    #### 使用 `tee` 捕获输出


    启动 RMAN 时，可以使用 `tee` 命令将您在屏幕上看到的输出发送到操作系统文本文件：


    ```

    $ rman | tee /tmp/rman.log

    ```


    现在，您可以连接到目标数据库并运行命令。所有在屏幕上看到的输出都将被记录到 `/tmp/rman.log` 文件中：


    ```

    RMAN> connect target /

    RMAN> backup database;

    RMAN> exit;

    ```


    当您退出 RMAN 时，`tee` 会话将停止写入日志文件。


    #### 使用 `script` 捕获输出


    `script` 命令非常有用，因为它指示操作系统将终端上出现的任何输出记录到日志文件。要捕获所有输出，请在连接到 RMAN 之前运行 `script` 命令：


    ```

    $ script /tmp/rman.log

    Script started, file is /tmp/rman.log

    $ rman target /

    RMAN> backup database;

    RMAN> exit;

    ```


    要结束 `script` 会话，请按 Ctrl+D 或输入 `exit`。`/tmp/rman.log` 文件将包含在屏幕上显示的所有输出。当您需要捕获特定时间范围内的所有输出时，`script`
    命令非常有用。例如，您可能正在运行 RMAN 命令、退出 RMAN、运行 SQL*Plus 命令等等。`script` 会话从您启动 `script` 开始，直到您按
    Ctrl+D 结束。


    ### 记录输出到文件


    捕获 RMAN 输出的一种简单方法是使用 `SPOOL LOG` 命令将输出发送到文件。此示例从 RMAN 内部开始记录日志文件：'
  raw: 'You’re prompted as follows:


    ```

    recovery catalog owner is RCAT

    enter DROP CATALOG command again to confirm catalog removal

    ```


    If you enter the `DROP CATALOG` command again, all the objects in the recovery
    catalog are removed from the recovery catalog database.


    The other way to drop a catalog is to drop the owner. To do so, connect to the
    recovery catalog as a user with `DBA` privileges, and issue the `DROP USER` statement:


    ```

    $ sqlplus system/manager

    SQL> drop user rcat cascade;

    ```


    SQL*Plus doesn’t prompt you twice; it does as you instructed and drops the user
    and its objects. Again, the only reason to do this is when you’re certain you
    don’t need the recovery catalog or its data any longer. Use caution when dropping
    a user or the recovery catalog: I recommend that you take a Data Pump export of
    the recovery catalog owner before dropping it.


    Logging RMAN Output


    When troubleshooting RMAN output or checking the status of a backup job, it’s
    essential to have a record of what RMAN ran and the status of each command. There
    are several methods for logging RMAN output. Some are built-in aspects of the
    Linux/Unix OS. Others are RMAN-specific features:


    *   Linux/Unix redirect output to file

    *   Linux/Unix logging commands

    *   RMAN `SPOOL LOG` command

    *   `V$RMAN_OUTPUT` view


    These logging features are discussed in the next sections.


    Redirecting Output to a File


    I run almost all RMAN backup jobs from shell scripts. The shell scripts are usually
    run automatically from a scheduling tool such as `cron`. When running RMAN commands
    in this fashion, I always capture the output by instructing the shell command
    to redirect standard output messaging and standard error messaging to a log file.
    This is done with the redirection (`>`) character. This example runs a shell script
    (`rmanback.bsh`) and redirects both standard output and standard error output
    to a log file named `rmanback.log`:


    ```

    $ rmanback.bsh 1>/home/oracle/bin/log/rmanback.log 2>&1

    ```


    Here, `1>` instructs standard output to be redirected to the specified file. The
    `2>&1` instructs the shell script to send standard error output to the same location
    as standard output.


    ![Image](images/sq.jpg) **Tip**  For further details on how DBAs use shell scripts
    and Linux features, see *Linux Recipes for Oracle DBAs* by Darl Kuhn (Apress,
    2008).


    Capturing Output with Linux/Unix Logging Commands


    You can instruct Linux/Unix to create a log file to capture any output that is
    also being displayed on your screen. This can be done in one of two ways:


    *   `tee`

    *   `script`


    Capturing Output with tee


    When you start RMAN, you can send the output you see on your screen to an OS text
    file, using the `tee` command:


    ```

    $ rman | tee /tmp/rman.log

    ```


    Now, you can connect to the target database and run commands. All the output seen
    on your screen will be logged to the /`tmp/rman.log` file:


    ```

    RMAN> connect target /

    RMAN> backup database;

    RMAN> exit;

    ```


    The `tee` party session stops writing to the log file when you exit RMAN.


    Capturing Output with script


    The `script` command is useful because it instructs the OS to log any output that
    appears at the terminal to a log file. To capture all output, run the `script`
    command before connecting to RMAN:


    ```

    $ script /tmp/rman.log

    Script started, file is /tmp/rman.log

    $ rman target /

    RMAN> backup database;

    RMAN> exit;

    ```


    To end a script session, press Ctrl+D, or type `exit`. The `tmp/rman.log` file
    will contain all output that was displayed on your screen. The `script` command
    is useful when you need to capture all the output from a particular time range.
    For example, you may be running RMAN commands, exiting from RMAN, running SQL*Plus
    commands, and so on. The script session lasts from the point at which you start
    `script` to the point at which you press Ctrl+D.


    Logging Output to a File


    An easy way to capture RMAN output is to use the `SPOOL LOG` command to send the
    output to a file. This example spools a log file from within RMAN:'
