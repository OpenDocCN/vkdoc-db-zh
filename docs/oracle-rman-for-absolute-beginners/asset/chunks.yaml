  raw: 'If it’s an active OLTP database, doing this can greatly degrade performance.
    This is because when a tablespace is in backup mode, Oracle copies a full image
    of any block (when it’s first modified) to the redo stream (see the section “Understanding
    the Split-Block Issue,’ later in this chapter, for more details).


    The alternative is to alter only one tablespace at a time into backup mode. After
    the tablespace has been altered into backup mode, you can copy the associated
    data files (step 6) and then alter the tablespace out of backup mode (step 7).
    You have to do this for each tablespace:


    ```

    SQL> alter tablespace <tablespace_name> begin backup;

    ```


    Step 6\. Copy the Data Files with an OS Utility


    Use an OS utility (Linux/Unix `cp` command) to copy the data files to the backup
    location. In this example all the data files are in one directory, and they’re
    all copied to the same backup directory:


    ```

    $ cp /u01/dbfile/O12C/*.dbf  /u01/hbackup/O12C

    ```


    Step 7\. Alter the Database/Tablespaces out of Backup Mode


    After you’re finished copying all your data files to the backup directory, you
    need to alter the tablespaces out of backup mode. This example alters all tablespaces
    out of backup mode at the same time:


    ```

    SQL> alter database end backup;

    ```


    If you’re altering your tablespaces into backup mode one at a time, you need to
    alter each tablespace out of backup mode after its data files have been copied:


    ```

    SQL> alter tablespace <tablespace_name> end backup;

    ```


    If you don’t take the tablespaces out of backup mode, you can seriously degrade
    performance and compromise the ability to recover your database. You can verify
    that no data files have an `ACTIVE` status with the following query:


    ```

    SQL> alter session set nls_date_format = ''DD-MON-RRRR HH24:MI:SS'';

    SQL> select * from v$backup where status=''ACTIVE'';

    ```


    ![Image](images/sq.jpg) **Note**  Setting the `NLS_DATE_FORMAT` parameter appropriately
    will allow you to see the exact date/time when the data file was placed into backup
    mode. This is useful for determining the starting sequence number of the archivelog
    needed, in the event that the data file needs to be recovered.


    Step 8\. Archive the Current Online Redo Log, and Note the Maximum Sequence Number
    of the Online Redo Logs


    The following statement instructs Oracle to archive any unarchived online redo
    logs and to initiate a log switch. This ensures that an end-of-backup marker is
    written to the archive redo logs:


    ```

    SQL> alter system archive log current;

    ```


    Also, note the maximum online redo log sequence number. If a failure occurs immediately
    after the hot backup, you need any archive redo logs generated during the hot
    backup to fully recover your database:


    ```

    select thread#, max(sequence#)

    from v$log

    group by thread#

    order by thread#;

    ```


    Step 9\. Back Up the Control File


    For a hot backup, you can’t use an OS copy command to make a backup of the control
    file. Oracle’s hot backup procedure specifies that you must use the `ALTER DATABASE
    BACKUP CONTROLFILE` statement. This example makes a backup of the control file
    and places it in the same location as the database backup files:


    ```

    SQL> alter database backup controlfile

         to ''/u01/hbackup/O12C/controlbk.ctl'' reuse;

    ```


    The `REUSE` clause instructs Oracle to overwrite the file if it already exists
    in the backup location.


    Step 10\. Back Up Any Archive Redo Logs Generated During the Backup


    Back up the archive redo logs that were generated during the hot backup. You can
    do this with an OS copy command:


    ```

    $ cp <archive redo logs generated during backup>  <backup directory>

    ```


    This procedure guarantees that you have the logs, even if a failure should occur
    soon after the hot backup finishes. Be sure you don’t back up an archive redo
    log that is currently being written to by the archiver process—doing so results
    in an incomplete copy of that file. Sometimes, DBAs script this process by checking
    the maximum `SEQUENCE#` with the maximum `RESETLOGS_ID` in the `V$ARCHIVED_LOG`
    view. Oracle updates that view when it’s finished copying the archive redo log
    to disk. Therefore, any archive redo log file that appears in the `V$ARCHIVED_LOG`
    view should be safe to copy.


    Scripting Hot Backups


    The script in this section covers the minimal tasks associated with a hot backup.
    For a production environment a hot backup script can be quite complex. The script
    given here provides you with a baseline of what you should include in a hot backup
    script. You need to modify these variables in the script for it to work in your
    environment:


    *   `ORACLE_SID`

    *   `ORACLE_HOME`

    *   `hbdir`


    The `ORACLE_SID` OS variable defines your database name. The `ORACLE_HOME` OS
    varriable defines where you installed the Oracle software. The SQL*Plus `hbdir`
    variable points to the directory for the hot backups.


    ```

    #!/bin/bash

    ORACLE_SID=O12C

    ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1

    PATH=$PATH:$ORACLE_HOME/bin

    #

    sqlplus -s <<EOF

    / as sysdba

    set head off pages0 lines 132 verify off feed off trimsp on

    define hbdir=/u01/hbackup/O12C

    spo hotback.sql

    select ''spo &&hbdir/hotlog.txt'' from dual;

    select ''select max(sequence#) from v\$log;'' from dual;

    select ''alter database begin backup;'' from dual;

    select ''!cp '' || name || '' '' || ''&&hbdir'' from v\$datafile;

    select ''alter database end backup;'' from dual;

    select ''alter database backup controlfile to '' || '''''''' || ''&&hbdir''

           || ''/controlbk.ctl''  || '''''''' || '' reuse;'' from dual;

    select ''alter system archive log current;'' from dual;

    select ''select max(sequence#) from v\$log;'' from dual;

    select ''select member from v\$logfile;'' from dual;

    select ''spo off;'' from dual;

    spo off;

    @@hotback.sql

    EOF

    ```


    The script generates a `hotback.sql` script. This script contains the commands
    for performing the hot backup. Here is a listing of the `hotback.sql` script for
    a test database:


    ```

    spo /u01/hbackup/O12C/hotlog.txt

    select max(sequence#) from v$log;

    alter database begin backup;

    !cp /u01/dbfile/O12C/system01.dbf /u01/hbackup/O12C

    !cp /u01/dbfile/O12C/sysaux01.dbf /u01/hbackup/O12C

    !cp /u01/dbfile/O12C/undotbs01.dbf /u01/hbackup/O12C

    !cp /u01/dbfile/O12C/users01.dbf /u01/hbackup/O12C

    !cp /u01/dbfile/O12C/tools01.dbf /u01/hbackup/O12C

    alter database end backup;

    alter database backup controlfile to ''/u01/hbackup/O12C/controlbk.ctl'' reuse;

    alter system archive log current;

    select max(sequence#) from v$log;

    select member from v$logfile;

    spo off;

    ```


    You can run this script manually from SQL*Plus, like this:


    ```

    SQL> @hotback.sql

    ```


    ![Image](images/sq.jpg) **Caution**  If the previous script fails on a statement
    before `ALTER DATABASE END BACKUP` is executed, you must take your database (tablespaces)
    out of backup mode by manually running `ALTER DATABASE END BACKUP` from SQL*Plus
    (as the `SYS` user).


    While you generate the hot backup script, it’s prudent to generate a script that
    you can use to copy the data files from a backup directory. You have to modify
    the `hbdir` variable in this script to match the location of the hot backups for
    your environment. Here is a script that generates the copy commands:


    ```

    #!/bin/bash

    ORACLE_SID=O12C

    ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1

    PATH=$PATH:$ORACLE_HOME/bin

    #

    sqlplus -s <<EOF

    / as sysdba

    set head off pages0 lines 132 verify off feed off trimsp on

    define hbdir=/u01/hbackup/O12C/

    define dbname=$ORACLE_SID

    spo hotrest.sql

    select ''!cp '' || ''&&hbdir'' || substr(name,instr(name,''/'',-1,1)+1)

           || '' '' || name from v\$datafile;

    spo off;

    EOF

    #

    exit 0

    ```'
  trans: "\n如果是一个活跃的 OLTP 数据库，执行此操作会**严重降低性能**。这是因为当表空间处于备份模式时，Oracle 会将任何数据块（在首次修改时）的完整映像复制到重做流中（有关更多详细信息，请参阅本章后面的“理解拆分块问题”部分）。\n\
    \n另一种方法是**每次只将一个表空间**切换到备份模式。将表空间切换到备份模式后，您可以复制相关的数据文件（步骤 6），然后将表空间切换出备份模式（步骤\
    \ 7）。您必须对每个表空间重复此过程：\n\n```sql\nSQL> alter tablespace <tablespace_name> begin\
    \ backup;\n```\n\n## 步骤 6. 使用操作系统工具复制数据文件\n\n使用操作系统工具（Linux/Unix 的 `cp` 命令）将数据文件复制到备份位置。在此示例中，所有数据文件都在一个目录中，并且它们都被复制到同一个备份目录：\n\
    \n```bash\n$ cp /u01/dbfile/O12C/*.dbf  /u01/hbackup/O12C\n```\n\n## 步骤 7. 将数据库/表空间切换出备份模式\n\
    \n将所有数据文件复制到备份目录后，您需要将表空间切换出备份模式。此示例将所有表空间同时切换出备份模式：\n\n```sql\nSQL> alter database\
    \ end backup;\n```\n\n如果您是逐个将表空间切换到备份模式的，则需要在复制完每个表空间的数据文件后，将其切换出备份模式：\n\n```sql\n\
    SQL> alter tablespace <tablespace_name> end backup;\n```\n\n如果您没有将表空间切换出备份模式，可能会**严重降低性能并危及数据库恢复能力**。您可以使用以下查询来验证没有数据文件处于\
    \ `ACTIVE` 状态：\n\n```sql\nSQL> alter session set nls_date_format = 'DD-MON-RRRR\
    \ HH24:MI:SS';\nSQL> select * from v$backup where status='ACTIVE';\n```\n\n![Image](img/sq.jpg)\
    \ **注意** 正确设置 `NLS_DATE_FORMAT` 参数可以让您看到数据文件进入备份模式的准确日期/时间。这对于在需要恢复数据文件时确定所需归档日志的起始序列号非常有用。\n\
    \n## 步骤 8. 归档当前的在线重做日志，并记录在线重做日志的最大序列号\n\n以下语句指示 Oracle 归档所有未归档的在线重做日志并启动日志切换。这确保将备份结束标记写入归档重做日志：\n\
    \n```sql\nSQL> alter system archive log current;\n```\n\n此外，请记录最大的在线重做日志序列号。如果在热备份后立即发生故障，您将需要热备份期间生成的所有归档重做日志才能完全恢复数据库：\n\
    \n```sql\nselect thread#, max(sequence#)\nfrom v$log\ngroup by thread#\norder\
    \ by thread#;\n```\n\n## 步骤 9. 备份控制文件\n\n对于热备份，您**不能**使用操作系统复制命令来备份控制文件。Oracle\
    \ 的热备份过程规定您必须使用 `ALTER DATABASE BACKUP CONTROLFILE` 语句。此示例创建控制文件的备份并将其放置在数据库备份文件所在的同一位置：\n\
    \n```sql\nSQL> alter database backup controlfile\n     to '/u01/hbackup/O12C/controlbk.ctl'\
    \ reuse;\n```\n\n`REUSE` 子句指示 Oracle，如果备份位置已存在同名文件，则覆盖它。\n\n## 步骤 10. 备份备份期间产生的任何归档重做日志\n\
    \n备份热备份期间产生的归档重做日志。您可以使用操作系统复制命令来完成此操作：\n\n```bash\n$ cp <备份期间产生的归档重做日志>  <备份目录>\n\
    ```\n\n此过程可确保您拥有这些日志，即使在热备份完成后不久发生故障。请确保不要备份当前正由归档进程写入的归档重做日志——这样做会导致该文件副本不完整。有时，DBA\
    \ 会通过检查 `V$ARCHIVED_LOG` 视图中的最大 `SEQUENCE#` 和最大 `RESETLOGS_ID` 来编写此过程的脚本。Oracle\
    \ 在完成归档重做日志到磁盘的复制后会更新该视图。因此，出现在 `V$ARCHIVED_LOG` 视图中的任何归档重做日志文件都应该是可以安全复制的。\n\n\
    ## 编写热备份脚本\n\n本节中的脚本涵盖了与热备份相关的**最基本任务**。对于生产环境，热备份脚本可能相当复杂。这里提供的脚本为您提供了应在热备份脚本中包含内容的基线。您需要修改脚本中的以下变量，使其在您的环境中生效：\n\
