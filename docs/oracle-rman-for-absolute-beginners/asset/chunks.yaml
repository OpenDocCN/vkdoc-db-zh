    # 执行备份


    ## 设置 NLS_DATE_FORMAT 变量


    要取消设置 `NLS_DATE_FORMAT` 变量，可以将其设为空值，如下所示：


    ```

    $ export NLS_DATE_FORMAT=''''

    ```


    ## 设置 ECHO


    另一个我总是在任何 RMAN 脚本中设置的值是 `ECHO` 命令，如下所示：


    ```

    RMAN> set echo on;

    ```


    这会指示 RMAN 在输出中显示它正在运行的命令，这样你就可以看到正在运行的是哪个 RMAN 命令，以及与该命令相关的任何错误或输出信息。当你在脚本中运行
    RMAN 命令时，这一点尤其重要，因为你不是在直接输入命令（并且可能不知道在 shell 脚本中发出了什么命令）。


    例如，如果没有 `SET ECHO ON`，命令的输出显示如下：


    ```

    Starting backup at...

    ```


    使用 `SET ECHO ON` 后，此输出会显示实际运行的命令：


    ```

    backup datafile 4;

    Starting backup at...

    ```


    从上面的输出中，你可以看到正在运行哪个命令、何时开始等等。


    ## 显示变量


    另一个好习惯是在任何脚本中运行 `SHOW ALL` 命令，如下所示：


    ```

    RMAN> show all;

    ```


    这会显示所有可配置的 RMAN 变量。在进行故障排除时，你可能不知道其他数据库管理员（DBA）配置了什么。这能让你看到 RMAN 会话执行时的配置快照。


    ## 执行备份之前


    在运行 RMAN 备份之前，请务必阅读第 4 章，了解如何为生产环境配置 RMAN。对于生产数据库，我主要从一个类似于第 4 章末尾所示的 shell 脚本来运行
    RMAN。在 shell 脚本中，我会配置我想为特定数据库使用的 RMAN 的各个方面。如果使用开箱即用的默认设置运行 RMAN，你虽然能够备份数据库，但这些设置对于大多数生产数据库应用来说是不够的。


    ## 备份整个数据库


    如果你不确定 RMAN 会将数据库文件备份到哪里，你需要阅读第 4 章，因为它描述了如何配置 RMAN 在你选择的位置创建备份文件。以下是我通常如何配置 RMAN
    将文件写入磁盘的特定位置（请注意，`CONFIGURE` 命令必须在运行 `BACKUP` 命令之前执行）：


    ```

    RMAN> configure channel 1 device type disk format ''/u01/O12C/rman/rman1_%U.bk'';

    ```


    配置好备份位置后，我几乎总是使用类似下面的命令来备份整个数据库：


    ```

    RMAN> backup incremental level=0 database plus archivelog;

    ```


    这个命令确保 RMAN 将备份数据库中的所有数据文件、备份前生成的所有可用归档重做日志，以及备份期间生成的所有归档重做日志。该命令还确保你拥有恢复和还原数据库所需的所有数据文件和归档重做日志。


    如果你启用了控制文件的自动备份功能，接着运行此命令：


    ```

    RMAN> configure controlfile autobackup on;

    ```


    作为备份的一部分，RMAN 执行的最后一项任务是生成一个包含控制文件备份的备份集。这个控制文件将包含有关已执行的备份以及备份期间生成的任何归档重做日志的所有信息。


    ![Image](img/sq.jpg) **提示**：务必启用控制文件的自动备份功能。


    ## BACKUP 命令的细微差别


    RMAN 的 `BACKUP` 命令有许多细微之处。对于生产数据库，我通常使用 `BACKUP INCREMENTAL LEVEL=0 DATABASE PLUS
    ARCHIVELOG` 命令备份数据库，这通常是足够的。然而，你会遇到许多情况，需要运行使用特定 RMAN 功能的备份，或者你可能在解决一个问题时，需要了解调用
    RMAN 备份的其他方式。这些方面将在接下来的几个部分中讨论。


    ## 完全备份与增量级别=0

