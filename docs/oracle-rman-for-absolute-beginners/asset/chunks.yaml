    Recovering After Loss of All Members of Active Redo Log Group


    If all the members of an active online redo log group in your database have experienced
    media failure, then perform the following steps when restoring an active online
    redo log group:


    1.  Verify the damage to the members.

    2.  Verify that the status is `ACTIVE`.

    3.  Attempt to issue a checkpoint.

    4.  If the checkpoint is successful, the status should now be `INACTIVE`, and
    you can clear the log group.

    5.  If the log group that was cleared was unarchived, back up your database immediately.

    6.  If the checkpoint is unsuccessful, then you will have to perform incomplete
    recovery.


    Inspect your target database `alert.log` file, and verify the damage. You should
    see a message in the alert.log file identifying the bad members:


    ```

    ORA-00312: online log 2 thread 1: ''/u01/oraredo/O12C/redo02a.rdo''

    ORA-00312: online log 2 thread 1: ''/u02/oraredo/O12C/redo02b.rdo''

    ```


    Next, verify that the damaged log group has an `ACTIVE` status as follows:


    ```

    $ sqlplus / as sysdba

    SQL> startup mount;

    ```


    Run the following query:


    ```

    SQL> select group#, status, archived, thread#, sequence# from v$log;

    ```


    Here is some sample output:


    ```

    GROUP# STATUS           ARC  THREAD#  SEQUENCE#

    ------ ---------------- --- -------- ----------

         1 CURRENT          NO         1         92

         2 ACTIVE           YES        1         91

         3 INACTIVE         YES        1         90

    ```


    If the status is ACTIVE, then attempt to issue an alter system checkpoint command,
    as shown here:


    ```

    SQL> alter system checkpoint;

    System altered.

    ```


    If the checkpoint completes successfully, then the active log group should be
    marked as `INACTIVE`. A successful checkpoint ensures that all modified database
    buffers have been written to disk, and at that point, only transactions contained
    in the CURRENT online redo log will be required for crash recovery.


    ![Image](images/sq.jpg) **Note**  If the checkpoint is unsuccessful, you will
    have to perform incomplete recovery. See the section in this chapter “Recovering
    After Loss of All Members of Current Redo Log Group” for a full list of options
    in this scenario.


    If the status is `INACTIVE` and the log has been archived, you can use the `clear
    logfile` command to re-create the log group, as shown here:


    ```

    SQL> alter database clear logfile group <group#>;

    ```


    If the status is inactive and the log group has not been archived, then re-create
    it with the `clear unarchived logfile` command, as shown here:


    ```

    SQL> alter database clear unarchived logfile group <group#>;

    ```


    If the cleared log group had not been previously archived, it’s critical that
    you immediately create a backup of your database. See [Chapter 5](#9781484207642_Ch05.xhtml)
    for details on creating a complete backup of your database.


    An online redo log group with an `ACTIVE` status is still required for crash recovery.
    If all members of an active online redo log group experience media failure, then
    you must attempt to issue a checkpoint. If the checkpoint is successful, then
    you can clear the log group. If the checkpoint is unsuccessful, then you will
    have to perform an incomplete recovery.


    If the checkpoint is successful and if the log group has not been archived, then
    the log may be required for media recovery. Back up your database as soon as possible
    in this situation. The unarchived log group may be needed for media recovery if
    the last database backups were taken before the redo information in the log was
    created. This means if you attempt to perform media recovery, you won’t be able
    to recover any information in the damaged log file or any transactions that were
    created after that log.


    Recovering After Loss of All Members of Current Redo Log Group


    If all of the members of a current Online redo logs:recovery online redo log group
    in your database have experienced media failure then (unfortunately) your alternatives
    are limited when you lose all members of a current online redo log group. Here
    are some possible options:


    *   Perform an incomplete recovery up to the last good SCN.

    *   If flashback is enabled, flash your database back to the last good SCN.

    *   If you’re using Oracle Data Guard, fail over to your physical or logical standby
    database.

    *   Contact Oracle Support for suggestions.


    In preparation for an incomplete recovery, first determine the last good SCN by
    querying the `FIRST_CHANGE#` column from `V$LOG`. In this scenario, you’re missing
    only the current online redo logs. Therefore, you can perform an incomplete recovery
    up to, but not including, the `FIRST_CHANGE#` SCN of the current online redo log.


    ```

    SQL> shutdown immediate;

    SQL> startup mount;

    ```


    Now issue this query:


    ```

    SELECT group#, status, archived,

    thread#, sequence#, first_change#

    FROM v$log;

    ```


    Here is some sample output:


    ```

    GROUP# STATUS           ARC  THREAD#  SEQUENCE# FIRST_CHANGE#

    ------ ---------------- --- -------- ---------- -------------

         1 INACTIVE         YES        1         86        533781

         2 INACTIVE         YES        1         85        533778

         3 CURRENT          NO         1         87        533784

    ```


    In this case, you can restore Online redo logs:recovery and recover up to, but
    not including, SCN 533784\. Here’s how you would do that:


    ```

    RMAN> restore database until scn 533784;

    RMAN> recover database until scn 533784;

    RMAN> alter database open resetlogs;

    ```


    ![Image](images/sq.jpg) **Note**  For complete details on incomplete recovery,
    and/or flashing back your database see [Chapter 6](#9781484207642_Ch06.xhtml).


    Losing all members of your current online redo log group is arguably the worst
    thing that can happen to your database. If you experience media failure with all
    members of the current online redo group, then you most likely will lose any transactions
