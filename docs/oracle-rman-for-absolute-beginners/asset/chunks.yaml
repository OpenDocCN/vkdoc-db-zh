    Image **提示** 由于数据泵内部使用 PL/SQL 来执行其工作，因此需要在共享池中有一些可用内存来保存 PL/SQL 包。如果共享池中的空间不足，数据泵将抛出
    `ORA-04031: unable to allocate bytes of shared memory...` 错误并中止。如果您收到此错误，请将数据库参数
    `SHARED_POOL_SIZE` 设置为至少 50M。更多详情请参阅 MOS note 396940.1。


    ## 开始使用


    既然您已经了解了数据泵的架构，接下来是一个简单的示例，展示了导出表、删除表然后将表重新导入数据库所需的导出设置步骤。这将为本章涵盖的所有其他数据泵任务奠定基础。


    ### 执行导出


    运行数据泵导出作业时，需要进行少量设置。步骤如下：

    1.  创建一个数据库目录对象，该对象指向您希望写入/读取数据泵文件的操作系统目录。

    2.  为运行导出的数据库用户授予对该目录对象的读写权限。

    3.  在操作系统提示符下，运行 `expdp` 实用程序。


    #### 步骤 1. 创建数据库目录对象


    在运行数据泵作业之前，首先创建一个与磁盘上物理位置相对应的数据库目录对象。此位置将用于保存导出文件和日志文件，并且应该是一个您知道有足够磁盘空间来容纳导出数据量的位置。


    使用 `CREATE DIRECTORY` 命令来完成此任务。此示例创建一个名为 `dp_dir` 的目录，并指定它映射到磁盘上的 `/oradump` 物理位置：

    ``` SQL

    SQL> create directory dp_dir as ''/oradump'';

    ```

    要查看新创建目录的详细信息，请发出以下查询：

    ``` SQL

    SQL> select owner, directory_name, directory_path from dba_directories;

    ```

    以下是一些示例输出：

    ```

    OWNER      DIRECTORY_NAME  DIRECTORY_PATH

    ---------- ---------------

    SYS        DP_DIR          /oradump

    ```

    请记住，指定的目录路径必须在数据库服务器上物理存在。此外，该目录必须是 `oracle` 操作系统用户具有读/写访问权限的目录。最后，执行数据泵操作的用户需要被授予对该目录对象的读/写访问权限（参见步骤
    2）。


    如果在导出或导入时未指定 `DIRECTORY` 参数，数据泵将尝试使用默认的数据库目录对象（如前所述，这映射到 `ORACLE_HOME/rdbms/log`）。我不建议使用默认目录，原因有二：

    *   如果您要导出大量数据，最好有一个您知道有足够空间来满足磁盘空间需求的首选磁盘位置。如果使用默认目录，您可能会无意中填满与 `ORACLE_HOME`
    相关联的挂载点，从而可能导致数据库挂起。

    *   如果您向非 DBA 用户授予导出权限，您不希望他们在与 `ORACLE_HOME` 相关的位置创建大型转储文件。同样，您不希望与 `ORACLE_HOME`
    相关联的挂载点变满，从而损害您的数据库。


    #### 步骤 2. 授予目录访问权限


    您需要向想要使用数据泵的用户授予对数据库目录对象的权限。使用 `GRANT` 语句分配适当的权限。如果您希望一个用户能够从目录读取和写入目录，则必须授予安全访问权限。此示例向名为
    `MV_MAINT` 的用户授予对目录对象的访问权限：

    ``` SQL

    SQL> grant read, write on directory dp_dir to mv_maint;

    ```

    所有目录对象都归 `SYS` 用户所有。如果您使用的用户账户被授予了 DBA 角色，那么您就拥有了对任何目录对象的必要读/写权限。我通常使用被授予了 DBA
    的用户来执行数据泵作业（这样我就不需要费心授予权限了）。


    **旧版 EXP 实用程序的安全问题**


    创建目录对象然后向物理存储位置授予特定 I/O 访问权限的理念是，您可以更安全地管理哪些用户有能力执行通常他们没有权限的读写活动。使用传统的 `exp` 实用程序，任何有权访问该工具的用户默认都有权限将文件写入或读取到
    Oracle 二进制文件所有者（通常是 `oracle`）有权访问的位置。可以想象，恶意的非 `oracle` 操作系统用户可以尝试运行 `exp` 实用程序，故意覆盖关键的数据库文件。例如，以下命令可以由任何具有
    `exp` 实用程序执行权限的非 `oracle` 操作系统用户运行：

    `$ exp heera/foo file=/oradata04/SCRKDV12/users01.dbf`

    `exp` 进程以 `oracle` 操作系统用户身份运行，因此对任何 `oracle` 拥有的数据文件具有读写操作系统权限。在这个 `exp` 示例中，如果
    `users01.dbf` 文件是一个活动的数据库数据文件，它会被覆盖并变得毫无用处。这可能对您的数据库造成灾难性的损害。


    为了防止此类问题，使用 Oracle 数据泵，您必须首先创建一个映射到特定目录的数据库对象目录，然后另外为每个用户分配对该目录的读写权限。因此，数据泵不存在旧版
    `exp` 实用程序的安全问题。


    #### 步骤 3. 执行导出


    当目录对象和权限设置就位后，您就可以使用数据泵从数据库导出信息。本节中的一个简单示例展示了如何导出一个表。本章后面的章节将详细描述导出数据的各种方式。这里的重点是完成一个示例，为理解后续更复杂的主题奠定基础。


    作为非 `SYS` 用户，创建一个表并填充一些数据：

    ``` SQL

    SQL> create table inv(inv_id number);

    SQL> insert into inv values (123);

    ```

    接下来，作为非 `SYS` 用户，导出该表。此示例使用先前创建的名为 `DP_DIR` 的目录。数据泵使用目录对象指定的目录路径作为磁盘上写入转储文件和日志文件的位置：

    ``` $ expdp mv_maint/foo directory=dp_dir tables=inv dumpfile=exp.dmp logfile=exp.log

    ```

    `expdp` 实用程序在 `/oradump` 目录中创建一个名为 `exp.dmp` 的文件，其中包含重新创建 `INV` 表并填充导出时数据所需的信息。此外，在
    `/oradump` 目录中创建一个名为 `exp.log` 的日志文件，其中包含与此导出作业相关的日志信息。


    如果您未指定转储文件名，数据泵会创建一个名为 `expdat.dmp` 的文件。如果目录中已存在名为 `expdat.dmp` 的文件，则数据泵会抛出错误。如果您未指定日志文件名，则数据泵会创建一个名为
    `export.log` 的文件。如果名为 `export.log` 的日志文件已存在，则数据泵会覆盖它。


    Image **提示** 尽管可以作为 `SYS` 用户执行数据泵，但我不建议这样做，原因有几个。首先，`SYS` 需要使用 `AS SYSDBA` 子句连接到数据库。这需要一个带有
    `USERID` 参数和连接字符串引号的数据泵参数文件。这很不方便。其次，`SYS` 拥有的大多数表无法导出（少数例外，如 `AUD$`）。如果您尝试导出
    `SYS` 拥有的表，数据泵将抛出 `ORA-39166` 错误并指出该表不存在。这令人困惑。


    ## 导入表


    导出数据的关键原因之一是为了能够重新创建数据库对象。

