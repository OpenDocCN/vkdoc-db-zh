    \ Data Pump 来传输数据。有关可传输表空间的完整细节，请参阅可从 Oracle 网站技术网络区域（`http://otn.oracle.com`）免费下载的《Oracle\
    \ Database Administrator’s Guide》。\n\n![Image](img/sq.jpg) **注意**：要生成可传输表空间，你必须使用\
    \ Oracle 企业版。你可以使用其他版本的 Oracle 来导入可传输表空间。\n\n## 操作存储的特性\n\nData Pump 包含许多灵活的特性，用于在导出和导入时操作表空间和数据文件。以下各节展示了在处理这些重要数据库对象时有用的\
    \ Data Pump 技术。\n\n### 导出表空间元数据\n\n有时，你可能需要复制一个环境——例如，将生产环境复制到测试环境中。首要任务之一是复制表空间。为此，你可以使用\
    \ Data Pump 提取仅用于重新创建环境表空间所需的 DDL：\n\n```bash\n$ expdp mv_maint/foo directory=dp_dir\
    \ dumpfile=inv.dmp \\\nfull=y include=tablespace\n```\n\n`FULL`参数指示 Data Pump\
    \ 导出数据库中的所有内容。然而，当与`INCLUDE`一起使用时，Data Pump 仅导出该命令指定的对象。\n"
- fmt: '## In this combination only metadata regarding tablespaces are exported; no
    data within the data files are included with the export. You could add the parameter
    and value of `CONTENT=METADATA_ONLY` to the `INCLUDE` command, but this would
    be redundant.


    Now, you can use the `SQLFILE` parameter to view the DDL associated with the tablespaces
    that were exported:

    ```bash

    $ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp sqlfile=tbsp.sql

    ```

    When you use the `SQLFILE` parameter, nothing is imported. In this example the
    prior command only creates a file named `tbsp.sql`, containing SQL statements
    pertaining to tablespaces. You can modify the DDL and run it in the destination
    database environment; or, if nothing needs to change, you can directly use the
    dump file by importing tablespaces into the destination database.


    ## Specifying Different Data File Paths and Names


    As previously discussed, you can use the combination of the `FULL` and `INCLUDE`
    parameters to export only tablespace metadata information:

    ```bash

    $ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp \

    full=y include=tablespace

    ```

    What happens if you want to use the dump file to create tablespaces on a separate
    database server that has different directory structures? Data Pump allows you
    to change the data file directory paths and file names in the import step with
    the `REMAP_DATAFILE` parameter.


    For example, say the source data files existed on a mount point named `/ora03`,
    but on the database being imported to, the mount points are named with `/ora01`.
    Here is a parameter file that specifies that only tablespaces beginning with the
    string `INV` should be imported and that their corresponding data files names
    be changed to reflect the new environment:

    ```

    userid=mv_maint/foo directory=dp_dir dumpfile=inv.dmp full=y include=tablespace:"like
    ''INV%''" remap_datafile="''/ora03/dbfile/O12C/inv_data01.dbf'':''/ora01/dbfile/O12C/tb1.dbf''"
    remap_datafile="''/ora03/dbfile/O12C/inv_index01.dbf'':''/ora01/dbfile/O12C/tb2.dbf''"

    ```

    When Data Pump creates the tablespaces, for any paths that match the first part
    of the string (to the left of the colon [`:`]), the string is replaced with the
    text in the next part of the string (to the right of the colon).


    ### Tip

    ![Image](images/sq.jpg) When working with parameters that require both single
    and double quotation marks, you’ll get predictable behavior when using a parameter
    file. In contrast, if you were to try to enter in the various required quotation
    marks on the command line, the OS may interpret and pass to Data Pump something
    other than what you were expecting.


    ## Importing into a Tablespace Different from the Original


    You may occasionally be required to export a table and then import it into a different
    user and a different tablespace. The source database could be different from the
    destination database, or you could simply be trying to move data between two users
    within the same database. You can easily handle this requirement with the `REMAP_SCHEMA`
    and `REMAP_TABLESPACE` parameters.


    This example remaps the user as well as the tablespace. The original user and
    tablespaces are `HEERA` and `INV_DATA`. This command imports the `INV` table into
    the `CHAYA` user and the `DIM_DATA` tablespace:

    ```bash

    $ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp remap_schema=HEERA:CHAYA
    \

    remap_tablespace=INV_DATA:DIM_DATA tables=heera.inv

    ```

    The `REMAP_TABLESPACE` feature doesn’t recreate tablespaces. It only instructs
    Data Pump to place objects in tablespaces different from those they were exported
    from. When importing, if the tablespace that you’re placing the object in doesn’t
    exist, Data Pump throws an error.


    ## Changing the Size of Data Files


    You can change the size of the data files when importing by using the `TRANSFORM`
    parameter with the `PCTSPACE` option. Say you’ve created an export of just the
    tablespace metadata:

    ```bash

    $ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp full=y include=tablespace

    ```

    Now, you want to create the tablespaces that contain the string `DATA` in the
    tablespace name in a development database, but you don’t have enough disk space
    to create the tablespaces as they were in the source database. In this scenario,
    you can use the `TRANSFORM` parameter to specify that the tablespaces be created
    as a percentage of the original size.


    For instance, if you want the tablespaces to be created at 20 percent of the original
    size, issue the following command:

    ```

    userid=mv_maint/foo directory=dp_dir dumpfile=inv.dmp full=y include=tablespace:"like
    ''%DATA%''" transform=pctspace:20

    ```

    The tablespaces are created with data files 20 percent of their original size.
    The extent allocation sizes are also 20 percent of their original definition.
    This is important because Data Pump doesn’t check to see if the storage attributes
    meet the minimum size restrictions for data files. This means that if the calculated
    smaller size violates an Oracle minimum size (e.g., five blocks for the uniform
    extent size), an error will be thrown during the import.


    This feature is useful when used to export production data and then import it
    into a smaller database. In these scenarios, you may be filtering out some of
    the production data via the `SAMPLE` parameter or `QUERY` parameters (see the
    section “Filtering Data and Objects,” later in this chapter).


    ## Changing Segment and Storage Attributes


    When importing, you can alter the storage attributes of a table by using the `TRANSFORM`
    parameter. The general syntax for this parameter is

    ```

    TRANSFORM=transform_name:value[:object_type]

    ```

    When you use `SEGMENT_ATTRIBUTES:N` for the transformation name, you can remove
    the following segment attributes during an import:

    * Physical attributes

    * Storage attributes

    * Tablespaces

    * Logging


    You may require this feature when you’re importing into a development environment
    and don’t want the tables to come in with all the storage attributes as they were
    in the production database. For example, in development you may just have one
    tablespace in which you store all your tables and indexes, whereas in production,
    you spread the tables and indexes out in multiple tablespaces.


    Here is an example that removes the segment attributes:

    ```bash

    $ impdp mv_maint/foo directory=dp_dir  dumpfile=inv.dmp \

    transform=segment_attributes:n

    ```

    You can remove just the storage clause by using `STORAGE:N`:

    ```bash

    $ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp \

    transform=storage:n

    ```


    ## Filtering Data and Objects


    Data Pump has a vast array of mechanisms for filtering data and metadata. You
    can influence what is excluded or included in a Data Pump export or import in
    the following ways:

    * Use the `QUERY` parameter to export or import subsets of data.

    * Use the `SAMPLE` parameter to export a percentage of the rows in a table.

    * Use the `CONTENT` parameter to exclude or include data and metadata.

    * Use the `EXCLUDE` parameter to specifically name items to be excluded.

    * Use the `INCLUDE` parameter to name the items to be included (thereby excluding
    other nondependent items not included in the list).

    * Use parameters such as `SCHEMAS` to specify that you only want a subset of the
    database’s objects (those that belong to the specified user or users).


    Examples of each of these techniques are described in the following sections.


    ### Note

    ![Image](images/sq.jpg) You can’t use `EXCLUDE` and `INCLUDE` at the same time.
    These parameters are mutually exclusive.


    ## Specifying a Query


    You can use the `QUERY` parameter to instruct Data Pump to write to a dump file
    only rows that meet a certain criterion. You may want to do this if you’re recreating
    a test environment and only need subsets of the data.'
