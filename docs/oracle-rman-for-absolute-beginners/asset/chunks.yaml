- fmt: "## SPOOL LOG\n通过`SPOOL LOG`命令，可以将RMAN的输出记录到日志文件中。\n\n```\nRMAN> spool log\
    \ to '/tmp/rmanout.log'\nRMAN> set echo on;\nRMAN> <run RMAN commands>\nRMAN>\
    \ spool log off;\n```\n\n默认情况下，`SPOOL LOG`命令会覆盖已有的文件。若想追加到日志文件末尾，请使用`APPEND`关键字：\n\
    \n```\nRMAN> spool log to '/tmp/rmanout.log' append\n```\n\n在命令行启动RMAN时，也可以直接将输出定向到日志文件（此方式会覆盖已有文件）：\n\
    \n```\n$ rman target / log /tmp/rmanout.log\n```\n\n同样，也可以选择追加到日志文件：\n\n```\n\
    $ rman target / log /tmp/rmanout.log append\n```\n\n当你使用上述`SPOOL LOG`示例时，输出会进入文件，而不会显示在终端上。因此，我在交互式运行RMAN时几乎从不使用`SPOOL\
    \ LOG`。该命令主要用于从脚本运行RMAN时捕获输出。\n\n## 查询输出\n即使没有捕获任何RMAN输出，你仍然可以通过查询数据字典来查看最近的RMAN输出。`V$RMAN_OUTPUT`视图包含了RMAN最近报告的消息：\n\
    \n```\nselect sid, recid, output\nfrom v$rman_output\norder by recid;\n```\n\n\
    `V$RMAN_OUTPUT`是一个内存中的对象，最多可容纳32,768行。数据库停止并重启后，此视图中的信息会被清除。当你使用RMAN的`SPOOL LOG`命令将输出假脱机到文件而无法在终端上查看进度时，这个视图非常方便。\n\
    \n# RMAN报告\n有几种不同的方法可以报告RMAN环境：\n\n*   `LIST`命令\n*   `REPORT`命令\n*   通过数据字典视图查询元数据\n\
    \n初次学习RMAN时，`LIST`和`REPORT`命令的区别可能令人困惑，因为两者之间的界限并不清晰。一般来说，我使用`LIST`命令查看现有备份的信息，使用`REPORT`命令确定哪些文件需要备份，或显示关于过期或失效备份的信息。\n\
    \n对于特殊报告（`LIST`或`REPORT`无法提供）或自动化报告，我会使用SQL查询。例如，我通常会通过一个Shell脚本和SQL来实现自动化检查，报告RMAN备份在过去一天内是否运行过。\n\
    \n## 使用 LIST\n在调查RMAN备份问题时，我通常首先连接到目标数据库并运行`LIST BACKUP`命令。此命令允许你查看备份集、备份片以及备份中包含的文件：\n\
    \n```\nRMAN> list backup;\n```\n\n该命令显示存储库中记录的所有RMAN备份。你可能希望将备份列表输出到一个文件，以便保存输出，然后使用操作系统编辑器在其中搜索特定字符串。\n\
    \n要获取备份信息的汇总视图，请使用`LIST BACKUP SUMMARY`命令：\n\n```\nRMAN> list backup summary;\n\
    ```\n\n你也可以使用`LIST`命令仅报告映像副本信息：\n\n```\nRMAN> list copy;\n```\n\n要列出所有已备份的文件及相关的备份集，请执行以下命令：\n\
    \n```\nRMAN> list backup by file;\n```\n\n以下命令显示磁盘上的归档重做日志：\n\n```\nRMAN> list\
    \ archivelog all;\nRMAN> list copy of archivelog all;\n```\n\n而以下命令列出了归档重做日志的备份（以及哪些归档重做日志包含在哪个备份片中）：\n\
    \n```\nRMAN> list backup of archivelog all;\n```\n\n运行`LIST`命令（同样，也适用于下一节将要介绍的`REPORT`命令）的方式有很多种。前面提到的方法是最常用的。有关选项的完整列表，请参阅Oracle网站技术网络区（`http://otn.oracle.com`）提供的《Oracle\
    \ Database Backup and Recovery Reference Guide》。\n\n## 使用 REPORT\nRMAN的`REPORT`命令可用于报告各种详细信息。你可以快速查看与数据库关联的所有数据文件，如下所示：\n\
    \n```\nRMAN> report schema;\n```\n\n`REPORT`命令提供有关通过RMAN保留策略标记为过时的备份的详细信息；例如：\n\
    \n```\nRMAN> report obsolete;\n```\n\n你可以根据保留策略报告需要备份的数据文件，像这样：\n\n```\nRMAN>\
    \ report need backup;\n```\n\n报告需要备份的数据文件有多种方式。以下是一些其他示例：\n\n```\nRMAN> report\
    \ need backup redundancy 2;\nRMAN> report need backup redundancy 2 datafile 2;\n\
    ```\n\n`REPORT`命令还可用于报告从未备份过或可能包含由`NOLOGGING`操作创建的数据的数据文件。例如，假设你直接路径加载数据到一个表中，而该表所在的数据文件尚未备份。以下命令将检测这些情况：\n\
    \n```\nRMAN> report unrecoverable;\n```\n\n## 使用 SQL\n有许多数据字典视图可用于查询备份信息。[表 5-1](#9781484207642_Ch05.xhtml#Tab1)描述了与RMAN相关的数据字典视图。无论你是否使用恢复目录，这些视图都是可用的（这些视图中的信息源自控制文件）。\n\
    \n[表 5-1](#9781484207642_Ch05.xhtml#_Tab1) RMAN备份数据字典视图描述\n\n| 视图名称 | 提供的信息 |\n\
    | --- | --- |\n| `V$RMAN_BACKUP_JOB_DETAILS` | RMAN备份作业 |\n| `V$BACKUP` | 处于备份模式的联机数据文件的备份状态（用于热备份）\
    \ |\n| `V$BACKUP_ARCHIVELOG_DETAILS` | 已备份的归档日志 |\n| `V$BACKUP_CONTROLFILE_DETAILS`\
    \ | 已备份的控制文件 |\n| `V$BACKUP_COPY_DETAILS` | 控制文件和数据文件副本 |\n| `V$BACKUP_DATAFILE`\
    \ | 已备份的控制文件和数据文件 |\n| `V$BACKUP_DATAFILE_DETAILS` | 在备份集、映像副本和代理副本中备份的数据文件 |\n\
    | `V$BACKUP_FILES` | 已备份的数据文件、控制文件、`spfile`和归档重做日志 |\n| `V$BACKUP_PIECE` | 备份片文件\
    \ |\n| `V$BACKUP_PIECE_DETAILS` | 备份片详细信息 |\n| `V$BACKUP_SET` | 备份集 |\n| `V$BACKUP_SET_DETAILS`\
    \ | 备份集详细信息 |\n\n有时，刚接触RMAN的DBA很难理解备份、备份集、备份片和数据文件的概念以及它们之间的关系。在讨论RMAN备份组件时，我发现以下查询很有用。此查询将显示备份集、备份集内的备份片以及备份片内备份的数据文件：\n\
    \n```\nSET LINES 132 PAGESIZE 100\nBREAK ON REPORT ON bs_key ON completion_time\
    \ ON bp_name ON file_name\nCOL bs_key    FORM 99999 HEAD \"BS Key\"\nCOL bp_name\
    \   FORM a40   HEAD \"BP Name\"\nCOL file_name FORM a40   HEAD \"Datafile\"\n\
    --\nSELECT\n s.recid                  bs_key\n,TRUNC(s.completion_time) completion_time\n\
    ,p.handle                 bp_name\n,f.name                   file_name\nFROM v$backup_set\
    \      s\n    ,v$backup_piece    p\n    ,v$backup_datafile d\n    ,v$datafile\
    \        f\nWHERE p.set_stamp = s.set_stamp\nAND   p.set_count = s.set_count\n\
    AND   d.set_stamp = s.set_stamp\nAND   d.set_count = s.set_count\nAND   d.file#\
    \     = f.file#\nORDER BY\n s.recid\n,p.handle\n,f.name;\n```\n\n这里的输出已缩短以适应页面：\n\
    \n```\nS Key COMPLETIO BP Name                                    Datafile\n------\
    \ --------- ------------------------------------------ ------------------------------------\n\
    \    11 28-SEP-14 /u01/O12C/rman/O12C_0cpjkl6h_1_1.bk        /u01/dbfile/O12C/inv_mgmt_data01.dbf\n\
    \                                                      /u01/dbfile/O12C/reg_index01.dbf\n\
    \                                                      /u01/dbfile/O12C/tools01.dbf\n\
    \                                                      /u01/dbfile/O12C/undotbs01.dbf\n\
    \                                                      /u01/dbfile/O12C/users01.dbf\n\
    ```\n\n有时，报告RMAN备份的性能很有用。以下查询报告了每个会话执行RMAN备份所花费的时间。"
  raw: '```

    RMAN> spool log to ''/tmp/rmanout.log''

    RMAN> set echo on;

    RMAN> <run RMAN commands>

    RMAN> spool log off;

    ```


    By default the `SPOOL LOG` command will overwrite an existing file. If you want
    to append to the log file, use the keyword `APPEND`:


    ```

    RMAN> spool log to ''/tmp/rmanout.log'' append

    ```


    You can also direct output to a log file when starting RMAN on the command line,
    which will overwrite an existing file:


    ```

    $ rman target / log /tmp/rmanout.log

    ```


    You can also append to the log file, as follows:


    ```

    $ rman target / log /tmp/rmanout.log append

    ```


    When you use `SPOOL LOG` as shown in the previous examples, the output goes to
    a file and not to your terminal. Therefore, I hardly ever use `SPOOL LOG` when
    running RMAN interactively. The command is mainly a tool for capturing output
    when running RMAN from scripts.


    Querying for Output in the Data Dictionary


    If you don’t capture any RMAN output, you can still view the most recent RMAN
    output by querying the data dictionary. The `V$RMAN_OUTPUT` view contains messages
    recently reported by RMAN:


    ```

    select sid, recid, output

    from v$rman_output

    order by recid;

    ```


    The `V$RMAN_OUTPUT` view is an in-memory object that holds up to 32,768 rows.
    Information in this view is cleared out when you stop and restart your database.
    The view is handy when you’re using the RMAN `SPOOL LOG` command to spool output
    to a file and cannot view what is happening at your terminal.


    RMAN Reporting


    There are several different methods for reporting on the RMAN environment:


    *   `LIST` command

    *   `REPORT` command

    *   Query metadata via data dictionary views


    When first learning RMAN, the difference between the `LIST` and `REPORT` commands
    may seem confusing because the distinction between the two is not clear-cut. In
    general, I use the `LIST` command to view information about existing backups and
    the `REPORT` command to determine which files need to be backed or to display
    information on obsolete or expired backups.


    I use SQL queries for specialized reports (not available via `LIST` or `REPORT`)
    or for automating reports. For example, I’ll generally implement an automated
    check via a shell script and SQL that reports whether the RMAN backups have run
    within the last day.


    Using LIST


    When investigating issues with RMAN backups, usually one of the first tasks I
    undertake is connecting to the target database and running the `LIST BACKUP` command.
    This command allows you to view backup sets, backup pieces, and the files included
    in the backup:


    ```

    RMAN> list backup;

    ```


    The command shows all RMAN backups recorded in the repository. You may want to
    spool the backups to an output file so that you can save the output and then use
    an OS editor to search through and look for specific strings in the output.


    To get a summarized view of backup information, use the `LIST BACKUP SUMMARY`
    command:


    ```

    RMAN> list backup summary;

    ```


    You can also use the `LIST` command to report just image copy information:


    ```

    RMAN> list copy;

    ```


    To list all files that have been backed up, and the associated backup set, issue
    the following command:


    ```

    RMAN> list backup by file;

    ```


    These commands display archive redo logs on disk:


    ```

    RMAN> list archivelog all;

    RMAN> list copy of archivelog all;

    ```


    And, this command lists the backups of the archive redo logs (and which archive
    redo logs are contained in which backup pieces):


    ```

    RMAN> list backup of archivelog all;

    ```


    There are a great many ways in which you can run the `LIST` command (and, likewise,
    the `REPORT` command, covered in the next section). The prior methods are the
    ones you’ll run most of the time. See the *Oracle Database Backup and Recovery
    Reference Guide*, available from the Technology Network area of the Oracle web
    site (`http://otn.oracle.com`), for a complete list of options.


    Using REPORT


    The RMAN `REPORT` command is useful for reporting on a variety of details. You
    can quickly view all the data files associated with a database, as follows:


    ```

    RMAN> report schema;

    ```


    The `REPORT` command provides detailed information about backups marked obsolete
    via the RMAN retention policy; for example,


    ```

    RMAN> report obsolete;

    ```


    You can report on data files that need to be backed up, as defined by the retention
    policy, like this:


    ```

    RMAN> report need backup;

    ```


    There are several ways to report on data files that need to be backed up. Here
    are some other examples:


    ```

    RMAN> report need backup redundancy 2;

    RMAN> report need backup redundancy 2 datafile 2;

    ```


    The `REPORT` command may also be used for data files that have never been backed
    up or that may contain data created from a `NOLOGGING` operation. For example,
    say you have direct-path loaded data into a table, and the data file in which
    the table resides has not been backed up. The following command will detect these
    conditions:


    ```

    RMAN> report unrecoverable;

    ```


    Using SQL


    There are a number of data dictionary views available for querying about backup
    information. [Table 5-1](#9781484207642_Ch05.xhtml#Tab1) describes RMAN-related
    data dictionary views. These views are available regardless of your use of a recovery
    catalog (the information in these views is derived from the control file).


    [Table 5-1](#9781484207642_Ch05.xhtml#_Tab1). Description of RMAN Backup Data
    Dictionary Views


    | View Name | Information Provided |

    | --- | --- |

    | `V$RMAN_BACKUP_JOB_DETAILS` | RMAN backup jobs |

    | `V$BACKUP` | Backup status of online data files placed in backup mode (for hot
    backups) |

    | `V$BACKUP_ARCHIVELOG_DETAILS` | Archive logs backed up |

    | `V$BACKUP_CONTROLFILE_DETAILS` | Control files backed up |

    | `V$BACKUP_COPY_DETAILS` | Control file and data file copies |

    | `V$BACKUP_DATAFILE` | Control files and data files backed up |

    | `V$BACKUP_DATAFILE_DETAILS` | Data files backed up in backup sets, image copies,
    and proxy copies |

    | `V$BACKUP_FILES` | Data files, control files, `spfile`s, and archive redo logs
    backed up |

    | `V$BACKUP_PIECE` | Backup piece files |

    | `V$BACKUP_PIECE_DETAILS` | Backup piece details |

    | `V$BACKUP_SET` | Backup sets |

    | `V$BACKUP_SET_DETAILS` | Backup set details |


    Sometimes, DBAs new to RMAN have a hard time grasping the concept of backups,
    backup sets, backup pieces, and data files and how they relate. I find the following
    query useful when discussing RMAN backup components. This query will display backup
    sets, the backup pieces with the set, and the data files that are backed up within
    the backup pieces:


    ```

    SET LINES 132 PAGESIZE 100

    BREAK ON REPORT ON bs_key ON completion_time ON bp_name ON file_name

    COL bs_key    FORM 99999 HEAD "BS Key"

    COL bp_name   FORM a40   HEAD "BP Name"

    COL file_name FORM a40   HEAD "Datafile"

    --

    SELECT

     s.recid                  bs_key

    ,TRUNC(s.completion_time) completion_time

    ,p.handle                 bp_name

    ,f.name                   file_name

    FROM v$backup_set      s

        ,v$backup_piece    p

        ,v$backup_datafile d

        ,v$datafile        f

    WHERE p.set_stamp = s.set_stamp

    AND   p.set_count = s.set_count

    AND   d.set_stamp = s.set_stamp

    AND   d.set_count = s.set_count

    AND   d.file#     = f.file#

    ORDER BY

     s.recid

    ,p.handle

    ,f.name;

    ```


    The output here has been shortened to fit on the page:


    ```

    S Key COMPLETIO BP Name                                  Datafile

    ------ --------- ---------------------------------------- ------------------------------------

        11 28-SEP-14 /u01/O12C/rman/O12C_0cpjkl6h_1_1.bk      /u01/dbfile/O12C/inv_mgmt_data01.dbf

                                                              /u01/dbfile/O12C/reg_index01.dbf

                                                              /u01/dbfile/O12C/tools01.dbf

                                                              /u01/dbfile/O12C/undotbs01.dbf

                                                              /u01/dbfile/O12C/users01.dbf

    ```


    Sometimes, it’s useful to report on the performance of RMAN backups. The following
    query reports on the time taken for an RMAN backup per session.'
  trans: "\n## SPOOL LOG\n通过 `SPOOL LOG` 命令，可以将 RMAN 的输出记录到日志文件中。\n\n```\nRMAN> spool\
    \ log to '/tmp/rmanout.log'\nRMAN> set echo on;\nRMAN> <run RMAN commands>\nRMAN>\
    \ spool log off;\n```\n\n默认情况下，`SPOOL LOG` 命令会覆盖已有的文件。若想追加到日志文件末尾，请使用 `APPEND`\
    \ 关键字：\n\n```\nRMAN> spool log to '/tmp/rmanout.log' append\n```\n\n在命令行启动 RMAN\
    \ 时，也可以直接将输出定向到日志文件（此方式会覆盖已有文件）：\n\n```\n$ rman target / log /tmp/rmanout.log\n\
    ```\n\n同样，也可以选择追加到日志文件：\n\n```\n$ rman target / log /tmp/rmanout.log append\n\
    ```\n\n当你使用上述 `SPOOL LOG` 示例时，输出会进入文件，而不会显示在终端上。因此，我在交互式运行 RMAN 时几乎从不使用 `SPOOL\
    \ LOG`。该命令主要用于从脚本运行 RMAN 时捕获输出。\n\n## 查询输出\n即使没有捕获任何 RMAN 输出，你仍然可以通过查询数据字典来查看最近的\
    \ RMAN 输出。`V$RMAN_OUTPUT` 视图包含了 RMAN 最近报告的消息：\n\n```\nselect sid, recid, output\n\
    from v$rman_output\norder by recid;\n```\n\n`V$RMAN_OUTPUT` 是一个内存中的对象，最多可容纳 32,768\
    \ 行。数据库停止并重启后，此视图中的信息会被清除。当你使用 RMAN 的 `SPOOL LOG` 命令将输出假脱机到文件而无法在终端上查看进度时，这个视图非常方便。\n\
    \n# RMAN 报告\n有几种不同的方法可以报告 RMAN 环境：\n\n*   `LIST` 命令\n*   `REPORT` 命令\n*   通过数据字典视图查询元数据\n\
    \n初次学习 RMAN 时，`LIST` 和 `REPORT` 命令的区别可能令人困惑，因为两者之间的界限并不清晰。一般来说，我使用 `LIST` 命令查看现有备份的信息，使用\
    \ `REPORT` 命令确定哪些文件需要备份，或显示关于过期或失效备份的信息。\n\n对于特殊报告（`LIST` 或 `REPORT` 无法提供）或自动化报告，我会使用\
    \ SQL 查询。例如，我通常会通过一个 Shell 脚本和 SQL 来实现自动化检查，报告 RMAN 备份在过去一天内是否运行过。\n\n## 使用 LIST\n\
    在调查 RMAN 备份问题时，我通常首先连接到目标数据库并运行 `LIST BACKUP` 命令。此命令允许你查看备份集、备份片以及备份中包含的文件：\n\n\
    ```\nRMAN> list backup;\n```\n\n该命令显示存储库中记录的所有 RMAN 备份。你可能希望将备份列表输出到一个文件，以便保存输出，然后使用操作系统编辑器在其中搜索特定字符串。\n\
    \n要获取备份信息的汇总视图，请使用 `LIST BACKUP SUMMARY` 命令：\n\n```\nRMAN> list backup summary;\n\
    ```\n\n你也可以使用 `LIST` 命令仅报告映像副本信息：\n\n```\nRMAN> list copy;\n```\n\n要列出所有已备份的文件及相关的备份集，请执行以下命令：\n\
    \n```\nRMAN> list backup by file;\n```\n\n以下命令显示磁盘上的归档重做日志：\n\n```\nRMAN> list\
    \ archivelog all;\nRMAN> list copy of archivelog all;\n```\n\n而以下命令列出了归档重做日志的备份（以及哪些归档重做日志包含在哪个备份片中）：\n\
    \n```\nRMAN> list backup of archivelog all;\n```\n\n运行 `LIST` 命令（同样，也适用于下一节将要介绍的\
    \ `REPORT` 命令）的方式有很多种。前面提到的方法是最常用的。有关选项的完整列表，请参阅 Oracle 网站技术网络区 (`http://otn.oracle.com`)\
    \ 提供的《Oracle Database Backup and Recovery Reference Guide》。\n\n## 使用 REPORT\n\
    RMAN 的 `REPORT` 命令可用于报告各种详细信息。你可以快速查看与数据库关联的所有数据文件，如下所示：\n\n```\nRMAN> report\
    \ schema;\n```\n\n`REPORT` 命令提供有关通过 RMAN 保留策略标记为过时的备份的详细信息；例如：\n\n```\nRMAN> report\
    \ obsolete;\n```\n\n你可以根据保留策略报告需要备份的数据文件，像这样：\n\n```\nRMAN> report need backup;\n\
    ```\n\n报告需要备份的数据文件有多种方式。以下是一些其他示例：\n\n```\nRMAN> report need backup redundancy\
    \ 2;\nRMAN> report need backup redundancy 2 datafile 2;\n```\n\n`REPORT` 命令还可用于报告从未备份过或可能包含由\
    \ `NOLOGGING` 操作创建的数据的数据文件。例如，假设你直接路径加载数据到一个表中，而该表所在的数据文件尚未备份。以下命令将检测这些情况：\n\n\
    ```\nRMAN> report unrecoverable;\n```\n\n## 使用 SQL\n有许多数据字典视图可用于查询备份信息。表 5-1 描述了与\
    \ RMAN 相关的数据字典视图。无论你是否使用恢复目录，这些视图都是可用的（这些视图中的信息源自控制文件）。\n\n表 5-1 RMAN 备份数据字典视图描述\n\
    \n| 视图名称 | 提供的信息 |\n| --- | --- |\n| `V$RMAN_BACKUP_JOB_DETAILS` | RMAN 备份作业 |\n\
    | `V$BACKUP` | 处于备份模式的联机数据文件的备份状态（用于热备份） |\n| `V$BACKUP_ARCHIVELOG_DETAILS` |\
    \ 已备份的归档日志 |\n| `V$BACKUP_CONTROLFILE_DETAILS` | 已备份的控制文件 |\n| `V$BACKUP_COPY_DETAILS`\
    \ | 控制文件和数据文件副本 |\n| `V$BACKUP_DATAFILE` | 已备份的控制文件和数据文件 |\n| `V$BACKUP_DATAFILE_DETAILS`\
    \ | 在备份集、映像副本和代理副本中备份的数据文件 |\n| `V$BACKUP_FILES` | 已备份的数据文件、控制文件、`spfile` 和归档重做日志\
    \ |\n| `V$BACKUP_PIECE` | 备份片文件 |\n| `V$BACKUP_PIECE_DETAILS` | 备份片详细信息 |\n| `V$BACKUP_SET`\
    \ | 备份集 |\n| `V$BACKUP_SET_DETAILS` | 备份集详细信息 |\n\n有时，刚接触 RMAN 的 DBA 很难理解备份、备份集、备份片和数据文件的概念以及它们之间的关系。在讨论\
    \ RMAN 备份组件时，我发现以下查询很有用。此查询将显示备份集、备份集内的备份片以及备份片内备份的数据文件：\n\n```\nSET LINES 132\
    \ PAGESIZE 100\nBREAK ON REPORT ON bs_key ON completion_time ON bp_name ON file_name\n\
    COL bs_key    FORM 99999 HEAD \"BS Key\"\nCOL bp_name   FORM a40   HEAD \"BP Name\"\
    \nCOL file_name FORM a40   HEAD \"Datafile\"\n--\nSELECT\n s.recid           \
    \       bs_key\n,TRUNC(s.completion_time) completion_time\n,p.handle         \
    \        bp_name\n,f.name                   file_name\nFROM v$backup_set     \
    \ s\n    ,v$backup_piece    p\n    ,v$backup_datafile d\n    ,v$datafile     \
    \   f\nWHERE p.set_stamp = s.set_stamp\nAND   p.set_count = s.set_count\nAND \
    \  d.set_stamp = s.set_stamp\nAND   d.set_count = s.set_count\nAND   d.file# \
    \    = f.file#\nORDER BY\n s.recid\n,p.handle\n,f.name;\n```\n\n这里的输出已缩短以适应页面：\n\
    \n```\nS Key COMPLETIO BP Name                                    Datafile\n------\
    \ --------- ------------------------------------------ ------------------------------------\n\
    \    11 28-SEP-14 /u01/O12C/rman/O12C_0cpjkl6h_1_1.bk        /u01/dbfile/O12C/inv_mgmt_data01.dbf\n\
    \                                                      /u01/dbfile/O12C/reg_index01.dbf\n\
    \                                                      /u01/dbfile/O12C/tools01.dbf\n\
    \                                                      /u01/dbfile/O12C/undotbs01.dbf\n\
    \                                                      /u01/dbfile/O12C/users01.dbf\n\
    ```\n\n有时，报告 RMAN 备份的性能很有用。以下查询报告了每个会话执行 RMAN 备份所花费的时间。\n"
- fmt: "# RMAN 备份与恢复\n\n以下是 SQL\\*Plus 中用于格式化 RMAN 备份报告查询输出的命令：\n\n```\nCOL hours\
    \              FORM 9999.99\nCOL time_taken_display FORM a20\nSET LINESIZE 132\n\
    --\nSELECT\n session_recid\n,compression_ratio\n,time_taken_display\n,(end_time\
    \ - start_time) * 24 as hours\n,TO_CHAR(end_time,'dd-mon-yy hh24:mi') as end_time\n\
    FROM v$rman_backup_job_details\nORDER BY end_time;\n```\n\nHere is some sample\
    \ output:\n\n```\nSESSION_RECID COMPRESSION_RATIO TIME_TAKEN_DISPLAY      HOURS\
    \ END_TIME\n------------- ----------------- -------------------- -------- ------------------------\n\
    \            3        2.03556203 00:00:18                  .00 28-sep-14 11:03\n\
    \            6        7.81358269 00:00:25                  .01 28-sep-14 11:06\n\
    \           14        10.7638918 00:00:19                  .01 28-sep-14 11:07\n\
    ```\n\nThe contents of `V$RMAN_BACKUP_JOB_DETAILS` are summarized by a session\
    \ connection to RMAN. Therefore, the report output is more accurate if you connect\
    \ to RMAN (establishing a session) and then exit out of RMAN after the backup\
    \ job is complete. If you remain connected to RMAN while running multiple backup\
    \ jobs, the query output reports on all backup activity while connected (for that\
    \ session).\n\nYou should have an automated method of detecting whether or not\
    \ RMAN backups are running and if data files are being backed up. One reliable\
    \ method of automating such a task is to embed SQL into a shell script and then\
    \ run the script on a periodic basis from a scheduling utility such as `cron`.\n\
    \nI typically run two basic types of checks regarding the RMAN backups:\n\n* \
    \  Have the RMAN backups run recently?\n*   Are there any data files that have\
    \ not been backed up recently?\n\nThe following shell script checks for these\
    \ conditions. You’ll need to modify the script and provide it with a username\
    \ and password for a user that can query the data dictionary objects referenced\
    \ in the script and also change the e-mail address of where messages are sent.\
    \ When running the script, you’ll need to pass in two variables: the Oracle SID\
    \ and the threshold number of past days that you want to check for the last time\
    \ the backups ran or for when a data file was backed up.\n\n```\n#!/bin/bash\n\
    #\nif [ $# -ne 2 ]; then\n  echo \"Usage: $0 SID threshold\"\n  exit 1\nfi\n#\
    \ source oracle OS variables\nexport ORACLE_SID=O12C\nexport ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1\n\
    export PATH=$PATH:$ORACLE_HOME/bin\ncrit_var=$(sqlplus -s <<EOF\n/ as sysdba\n\
    SET HEAD OFF FEEDBACK OFF\nSELECT COUNT(*) FROM\n(SELECT (sysdate - MAX(end_time))\
    \ delta\n FROM v\\$rman_backup_job_details) a\nWHERE a.delta > $2;\nEOF)\n#\n\
    if [ $crit_var -ne 0 ]; then\n  echo \"rman backups not running on $1\" | mailx\
    \ -s \"rman problem\" dkuhn@gmail.com\nelse\n  echo \"rman backups ran ok\"\n\
    fi\n#--------------------------------------------\ncrit_var2=$(sqlplus -s <<EOF\n\
    / as sysdba\nSET HEAD OFF FEEDBACK OFF\nSELECT COUNT(*)\nFROM\n(\nSELECT name\n\
    FROM v\\$datafile\nMINUS\nSELECT DISTINCT\n f.name\nFROM v\\$backup_datafile d\n\
    \    ,v\\$datafile        f\nWHERE d.file#     = f.file#\nAND   d.completion_time\
    \ > sysdate - $2);\nEOF)\n#\nif [ $crit_var2 -ne 0 ]; then\n  echo \"datafile\
    \ not backed up on $1\" | mailx -s \"backup problem\" dkuhn@gmail.com\nelse\n\
    \  echo \"datafiles are backed up...\"\nfi\n#\nexit 0\n```\n\nFor example, to\
    \ check if backups have been running successfully within the past 2 days, run\
    \ the script (named `rman_chk.bsh`):\n\n```\n$ rman_chk.bsh O12c 2\n```\n\nThe\
    \ prior script is basic but effective. You can enhance it as required for your\
    \ RMAN environment.\n\n## Summary\n\nRMAN offers many flexible and feature-rich\
    \ options for backups. By default, RMAN backs up only blocks that have been modified\
    \ in the database. The incremental features allow you to back up only blocks that\
    \ have been modified since the last backup. These incremental features are particularly\
    \ useful in reducing the size of backups in large database environments,  in which\
    \ only a small percentage of data in the database changes from one backup to the\
    \ next.\n\nYou can instruct RMAN to back up every block in each data file via\
    \ an image copy. An image copy is a block-for-block identical copy of the data\
    \ file. Image copies have the advantage of being able to restore the backup files\
    \ directly from the backup (without using RMAN). You can use the incrementally\
    \ updated backup feature to implement an efficient hybrid of image copy backups\
    \ and incremental backups.\n\nRMAN contains built-in commands for reporting on\
    \ many aspects of backups. The `LIST` command reports on backup activity. The\
    \ `REPORT` command is useful for determining which files need to be backed up,\
    \ as dictated by the retention policy.\n\nAfter you’ve successfully configured\
    \ RMAN and created backups, you are in a position to be able to restore and recover\
    \ your database in the event of a media failure. Restore and recovery topics are\
    \ detailed in the next chapter.\n\n# CHAPTER 6\n\n![image](images/frontdot.jpg)\n\
    \n## RMAN Restore and Recovery\n\nA couple of years ago, I was out on a long Saturday\
    \ morning bike ride. About halfway through the ride, my cell phone rang. It was\
    \ one of the data center operational support technicians. He told me that a mission\
    \ critical database server was acting strange and that I should log in as soon\
    \ as possible and make sure things were okay. I told him that I was about 15 minutes\
    \ from being able to log in. So, I scurried home as fast as I could to check out\
    \ the production box. When I got home and logged in to the database server, I\
    \ tried to start SQL\\*Plus and immediately got an error indicating that the SQL\\\
    *Plus binary file had corruption. Great. I couldn’t even log in to SQL\\*Plus.\
    \ This was not good.\n\n![Image](images/sq.jpg)  **Mental Note**  Ensure that\
    \ all bicycle rides are taken out of range of cell phone coverage. – Ed.\n\nI\
    \ had the SA restore the Oracle binaries from an OS backup. I started SQL\\*Plus.\
    \ The database had crashed, so I attempted to start it. The output indicated that\
    \ there was a media failure with all the data files. After some analysis it was\
    \ discovered that there had been some filesystem issues and that all these files\
    \ on disk were corrupt:\n\n*   Data files\n*   Control files\n*   Archive redo\
    \ logs\n*   Online redo log files\n*   RMAN backup pieces\n\nThis was almost a\
    \ total disaster. My director asked about our options. I responded, “All we have\
    \ to do is restore the database from our last tape backup, and we’ll lose whatever\
    \ data are in archive redo logs that haven’t been backed up to tape yet.”\n\n\
    The storage administrators were called in and instructed to restore the last set\
    \ of RMAN backups that had been written to tape. About 15 minutes later, we could\
    \ hear the tape guys talking to each other in hushed voices. One of them said,\
    \ “We are sooooo hosed. We don’t have any tape backups of RMAN for any databases\
    \ on this box.”\n\nThat was a dark moment. The worst case scenario was to rebuild\
    \ the database from DDL scripts and lose 3 years of production data. Not a very\
    \ palatable option.\n\nAfter looking around the production box, I discovered that\
    \ the prior production support DBA (who, ironically, had just been let go a few\
    \ days before, owing to budget cuts) had implemented a job to copy the RMAN backups\
    \ to another server in the production environment. The RMAN backups on this other\
    \ server were intact. I was able to restore and recover the production database\
    \ from these backups. We lost about a day’s worth of data (between corrupt archive\
    \ logs and downtime, in which no incoming transactions were allowed), but we were\
    \ able to get the database restored and recovered approximately 20 hours after\
    \ the initial phone call. That was a long day.\n\nMost situations in which you\
    \ need to restore and recover will not be as bad as the one just described. However,\
    \ the previous scenario does highlight the need for\n\n*   a backup strategy\n\
    *   a DBA with B&R skills\n*   a restore-and-recovery strategy, including a requirement\
    \ to test the restore and recovery periodically"
