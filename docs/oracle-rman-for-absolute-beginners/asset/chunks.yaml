  trans: "\n以下是查询状态表以获取当前正在运行的作业详情的示例：\n\n```sql\nselect name, object_name, total_bytes/1024/1024\
    \ t_m_bytes ,job_mode ,state ,to_char(last_update, 'dd-mon-yy hh24:mi') from SYS_EXPORT_TABLE_01\
    \ where state='EXECUTING';\n```\n\n## 交互式命令模式状态\n\n验证数据泵是否正在运行作业的快速方法是以交互式命令模式连接并发出\
    \ `STATUS` 命令；例如，\n\n```bash\n$ impdp mv_maint/foo attach=SYS_IMPORT_TABLE_04\n\
    Import> status\n```\n\n以下是一些示例输出：\n\n```\nJob: SYS_IMPORT_TABLE_04\n  Operation:\
    \ IMPORT\n  Mode: TABLE\n  State: EXECUTING\n  Bytes Processed: 0\n  Current Parallelism:\
    \ 4\n```\n\n你应该看到一个 `EXECUTING` 状态，这表示作业正在主动运行。输出中需要检查的其他项目包括处理的对象和字节数。这些数字应随着作业的进行而增加。\n\
    \n## 操作系统实用程序\n\n你可以使用操作系统实用程序 `ps` 来显示服务器上正在运行的作业。例如，你可以搜索主进程和工作进程，如下所示：\n\n\
    ```bash\n$ ps -ef | egrep 'ora_dm|ora_dw' | grep -v egrep\n```\n\n以下是一些示例输出：\n\
    \n```\noracle 29871   717   5 08:26:39 ?          11:42 ora_dw01_STAGE\noracle\
    \ 29848   717   0 08:26:33 ?           0:08 ora_dm00_STAGE\noracle 29979   717\
    \   0 08:27:09 ?           0:04 ora_dw02_STAGE\n```\n\n如果你多次运行此命令，你应该会看到一个或多个当前作业的处理时间（第七列）在增加。这是数据泵仍在执行并工作的良好指标。\n\
    \n## 数据泵传统模式\n\n本章最后介绍此功能，但它非常实用，尤其如果你是一位老派的 DBA。自 Oracle 11g Release 2 起，数据泵允许你在调用数据泵作业时使用旧的\
    \ `exp` 和 `imp` 实用程序参数。这被称为传统模式，是一项很棒的功能。\n\n要使用传统模式的数据泵，你无需做任何特殊操作。一旦数据泵检测到传统参数，它会尝试将其作为来自旧\
    \ `exp`/`imp` 实用程序的参数进行处理。你甚至可以将旧的传统参数与新参数混合使用；例如，\n\n```bash\n$ expdp mv_maint/foo\
    \ consistent=y tables=inv directory=dp_dir\n```\n\n在输出中，数据泵会指出它遇到了传统参数，并为你提供该参数在数据泵语法中的翻译结果。对于前面的命令，以下是数据泵会话的输出，显示了\
    \ `consistent=y` 参数被翻译成的内容：\n\n```\nLegacy Mode Parameter: \"consistent=TRUE\"\
    \nLocation: Command Line, Replaced with: \"flashback_time=TO_TIMESTAMP('2014-01-25\
    \ 19:31:54', 'YYYY-MM-DD HH24:MI:SS')\"\n```\n\n此功能可能极其方便，特别是当你非常熟悉旧的传统语法并想知道它如何在数据泵中实现时。\n\
    \n我建议你尽可能使用较新的数据泵语法。然而，你可能会遇到这样的情况：你有传统的 `exp`/`imp` 作业，并希望保持脚本原样运行，无需修改。\n\n\
    ![Image](img/sq.jpg) **注意** 当数据泵在传统模式下运行时，它不会创建旧的 `exp`-/`imp` 格式的文件。数据泵总是创建数据泵文件，并且只能读取数据泵文件。\n\
    \n## 数据泵与 exp 实用程序的映射\n\n如果你习惯旧的 `exp`/`imp` 参数，最初可能会对某些语法含义感到困惑。然而，在使用数据泵之后，你会发现新语法相当容易记忆和使用。表\
    \ 8-3 描述了传统导出参数如何映射到数据泵导出。\n\n表 8-3. 旧导出参数到数据泵的映射\n\n| 原始 exp 参数 | 类似的数据泵 expdp\
    \ 参数 |\n| --- | --- |\n| `BUFFER` | 不适用 |\n| `COMPRESS` | `TRANSFORM` |\n| `CONSISTENT`\
    \ | `FLASHBACK_SCN` 或 `FLASHBACK_TIME` |\n| `CONSTRAINTS` | `EXCLUDE=CONSTRAINTS`\
    \ |\n| `DIRECT` | 不适用；数据泵尽可能自动使用直接路径。 |\n| `FEEDBACK` | 客户端输出中的 `STATUS` |\n|\
    \ `FILE` | 数据库目录对象和 `DUMPFILE` |\n| `GRANTS` | `EXCLUDE=GRANT` |\n| `INDEXES`\
    \ | `INCLUDE=INDEXES`, `INCLUDE=INDEXES` |\n| `LOG` | 数据库目录对象和 `LOGFILE` |\n|\
    \ `OBJECT_CONSISTENT` | 不适用 |\n| `OWNER` | `SCHEMAS` |\n| `RECORDLENGTH` | 不适用\
    \ |\n| `RESUMABLE` | 不适用；数据泵自动提供此功能。 |\n| `RESUMABLE_NAME` | 不适用 |\n| `RESUMABLE_TIMEOUT`\
    \ | 不适用 |\n| `ROWS` | `CONTENT=ALL` |\n| `STATISTICS` | 不适用；数据泵导出总是导出表的统计信息。 |\n\
    | `TABLESPACES` | `TRANSPORT_TABLESPACES` |\n| `TRANSPORT_TABLESPACE` | `TRANSPORT_TABLESPACES`\
    \ |\n| `TRIGGERS` | `EXCLUDE=TRIGGER` |\n| `TTS_FULL_CHECK` | `TRANSPORT_FULL_CHECK`\
    \ |\n| `VOLSIZE` | 不适用；数据泵不支持磁带设备。 |\n\n在许多情况下，并非一一对应。通常，数据泵会自动提供旧版实用程序中需要参数才能使用的功能。例如，过去必须指定\
    \ `DIRECT=Y` 才能获得直接路径导出，而数据泵会在可能时自动使用直接路径。\n\n## 数据泵与 imp 实用程序的映射\n\n与数据泵导出类似，数据泵导入通常也与旧版实用程序参数没有一一对应的映射。数据泵导入自动提供了旧\
    \ `imp` 实用程序的许多功能。例如，不需要 `COMMIT=Y`，因为数据泵导入在每个表导入后会自动提交。表 8-4 描述了传统导入参数如何映射到数据泵导入。\n\
    \n表 8-4. 旧导入参数到数据泵的映射\n\n| 原始 imp 参数 | 类似的数据泵 impdp 参数 |\n| --- | --- |\n| `BUFFER`\
    \ | 不适用 |\n| `CHARSET` | 不适用 |\n| `COMMIT` | 不适用；数据泵导入在每个表导出后会自动提交。 |\n| `COMPILE`\
    \ | 不适用；数据泵导入在过程创建后编译它们。 |\n| `CONSTRAINTS` | `EXCLUDE=CONSTRAINT` |\n| `DATAFILES`\
    \ | `TRANSPORT_DATAFILES` |\n| `DESTROY` | `REUSE_DATAFILES=y` |\n| `FEEDBACK`\
    \ | 客户端输出中的 `STATUS` |\n| `FILE` | 数据库目录对象和 `DUMPFILE` |\n| `FILESIZE` | 不适用 |\n\
    | `FROMUSER` | `REMAP_SCHEMA` |\n| `GRANTS` | `EXCLUDE=OBJECT_GRANT` |\n| `IGNORE`\
    \ | `TABLE_EXISTS_ACTION`，可选值为 `APPEND`、`REPLACE`、`SKIP` 或 `TRUNCATE` |\n| `INDEXES`\
    \ | `EXCLUDE=INDEXES` |\n| `INDEXFILE` | `SQLFILE` |\n| `LOG` | 数据库目录对象和 `LOGFILE`\
    \ |\n| `RECORDLENGTH` | 不适用 |\n| `RESUMABLE` | 不适用；此功能自动提供。 |\n| `RESUMABLE_NAME`\
    \ | 不适用 |\n| `RESUMABLE_TIMEOUT` | 不适用 |\n| `ROWS=N` | `CONTENT`，可选值为 `METADATA_ONLY`\
    \ 或 `ALL` |\n| `SHOW` | `SQLFILE` |\n| `STATISTICS` | 不适用 |\n| `STREAMS_CONFIGURATION`\
    \ | 不适用 |\n| `STREAMS_INSTANTIATION` | 不适用 |\n| `TABLESPACES` | `TRANSPORT_TABLESPACES`\
    \ |\n| `TOID_NOVALIDATE` | 不适用 |\n| `TOUSER` | `REMAP_SCHEMA` |\n| `TRANSPORT_TABLESPACE`\
    \ | `TRANSPORT_TABLESPACES` |\n| `TTS_OWNERS` | 不适用 |\n| `VOLSIZE` | 不适用；数据泵不支持磁带设备。\
    \ |\n\n## 总结\n\n数据泵是一个功能极其强大且丰富的工具。如果你使用数据泵不多，那么我建议你花些时间重读本章并实践其中的示例。此工具极大地简化了将用户和数据从一个环境迁移到另一个环境等任务。你可以导出和导入用户的子集，通过\
    \ SQL 和 PL/SQL 过滤和重映射数据，重命名用户和表空间，压缩、加密和并行化，所有这些都只需一个命令。它确实如此强大。\n"
