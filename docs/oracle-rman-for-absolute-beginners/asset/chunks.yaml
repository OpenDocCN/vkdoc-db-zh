- fmt: '# Backing Up FRA


    If you use an FRA, one nice RMAN feature is that you can back up all the files
    in that location with one command. If you’re using a media manager and have a
    tape backup channel enabled, you can back up everything in the FRA to tape, like
    this:


    ```

    RMAN> backup device type sbt_tape recovery area;

    ```


    You can also back up the FRA to a location on disk. Use the `TO DESTINATION` command
    to accomplish this:


    ```

    RMAN> backup recovery area to destination ''/u01/O12C/fra_back'';

    ```


    RMAN will automatically create directories as required beneath the directory specified
    by the `TO DESTINATION` command.


    ![Image](images/sq.jpg) **Note**  The format of the subdirectory under the directory
    `TO_DESTINATION` is `db_uniuqe_name/backupset/YYYY_MM_DD`.


    RMAN will back up full backups, incremental backups, control file autobackups,
    and archive redo log files. Keep in mind that flashback logs, online redo log
    files, and the current control file are not backed up.


    # Excluding Tablespaces from Backups


    Suppose you have a tablespace that contains noncritical data, and you don’t ever
    want to back it up. RMAN can be configured to exclude such tablespaces from the
    backup. To determine if RMAN is currently configured to exclude any tablespaces,
    run this command:


    ```

    RMAN> show exclude;

    RMAN configuration parameters for database with db_unique_name O12C are:

    RMAN configuration has no stored or default parameters

    ```


    Use the `EXCLUDE` command to instruct RMAN as to which tablespaces not to back
    up:


    ```

    RMAN> configure exclude for tablespace users;

    ```


    Now, for any database-level backups, RMAN will exclude the data files associated
    with the `USERS` tablespace. You can instruct RMAN to back up all data files and
    any excluded tablespaces with this command:


    ```

    RMAN> backup database noexclude;

    ```


    You can clear the exclude setting via the following command:


    ```

    RMAN> configure exclude for tablespace users clear;

    ```


    # Backing Up Data Files Not Backed Up


    Suppose you have just added several data files to your database, and you want
    to ensure that you have a backup of them. You can issue the following command
    to instruct Oracle to back up data files that have not yet been backed up:


    ```

    RMAN> backup database not backed up;

    ```


    You can also specify a time range for such files that have not yet been backed
    up. Say you discover that your backups have not been running for the last several
    days, and you want to back up everything that hasn’t been backed up within the
    last 24 hours. The following command backs up all data files that have not been
    backed up within the last day:


    ```

    RMAN> backup database not backed up since time=''sysdate-1'';

    ```


    The prior command is also useful if, for any reason (a power failure in the data
    center, your backup directory’s becoming full during backups, and so on), your
    backups aborted. After you have resolved the issue that caused your backup job
    to fail, you can issue the previous command, and RMAN will back up only the data
    files that have not been backed up in the specified time period.


    # Skipping Read-Only Tablespaces


    Because data in read-only tablespaces can’t change, you may only want to back
    up read-only tablespaces once and then skip them in subsequent backups. Use the
    `SKIP READONLY` command to achieve this:


    ```

    RMAN> backup database skip readonly;

    ```


    Keep in mind that when you skip read-only tablespaces, you’ll need to keep available
    a backup that contains these tablespaces. As long as you only issue the RMAN command
    `DELETE OBSOLETE`, the RMAN backup set containing the read-only tablespaces will
    be retained and not deleted, even if that RMAN backup set contains other read-write
    tablespaces.


    # Skipping Offline or Inaccessible Files


    Suppose you have one data file that is missing or corrupt, and you don’t have
    a backup of it, so you can’t restore and recover it. You can’t start your database
    in this situation:


    ```

    SQL> startup;

    ORA-01157: cannot identify/lock data file 6 - see DBWR trace file

    ORA-01110: data file 6: ''/u01/dbfile/ O12C/reg_data01.dbf''

    ```'
