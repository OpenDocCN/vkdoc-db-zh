- fmt: "SQL> alter database clear unarchived logfile group 2;\n```\n\nIf the cleared\
    \ log group had not been previously archived, it’s critical that you immediately\
    \ create a backup of your database. See [Chapter 5](#9781484207642_Ch05.xhtml)\
    \ for details on taking a complete backup of your database.\n\nKeep in mind that\
    \ in these prior examples the logfile group is number 2. You’ll have to modify\
    \ the group number to match the group number for your scenario.\n\nIf the online\
    \ redo log group is inactive and archived, then its contents aren’t required for\
    \ crash or media recovery. Therefore it’s possible to use the `clear logfile`\
    \ command to re-create all online redo log file members of a group.\n\n![Image](images/sq.jpg)\
    \ **Note** The `clear logfile` command will drop and re-create all members of\
    \ a log group for you. You can issue this command even if you have only two log\
    \ groups in your database.\n\nIf the online redo log group has not been archived,\
    \ then it may be required for media recovery. In this case, use the `clear unarchived\
    \ logfile` command to re-create the logfile group members. Back up your database\
    \ as soon as possible in this situation.\n\nThe unarchived log group may be needed\
    \ for media recovery if the last database backups were taken before the redo information\
    \ in the log was created. This means if you attempt to perform media recovery,\
    \ you won’t be able to recover any information in the damaged log file or any\
    \ transactions that were created after that log.\n\nIf the `clear logfile` command\
    \ does not succeed because of an I/O error and it’s a permanent problem, then\
    \ you will need to consider dropping the log group and re-creating it in a different\
    \ location. See the next two subsections for directions on how to drop and re-create\
    \ a log file group.\n\n## Dropping a Log File Group\n\nThe alternative to clearing\
    \ a logfile group (which tells Oracle to re-create the logfile) is to drop and\
    \ re-create the logfile group. You might need to do this if you need to re-create\
    \ the logfile group in a different location because the original location is damaged\
    \ or not available.\n\nA log group has to have an inactive status before you can\
    \ drop it. You can check the status of the log group, as shown here:\n\n```sql\n\
    SQL> select group#, status, archived, thread#, sequence# from v$log;\n```\n\n\
    You can drop a log group with the `drop logfile group` command:\n\n```sql\nSQL>\
    \ alter database drop logfile group <group #>;\n```\n\nIf you attempt to drop\
    \ the current online log group, Oracle will return an `ORA-01623` error stating\
    \ that you cannot drop the current group. Use the `alert system switch logfile`\
    \ command to switch the logs and make the next group the current group.\n\nAfter\
    \ a log switch, the log group that was previously the current group will retain\
    \ an active status as long as it contains redo that Oracle requires to perform\
    \ crash recovery. If you attempt to drop a log group with an active status, Oracle\
    \ will throw an `ORA-01624` error stating that the log group is required for crash\
    \ recovery. Issue an `alter system checkpoint` command to make the log group inactive.\n\
    \nAdditionally, you cannot issue a `drop logfile group` command if it leaves you\
    \ with only one log group left in your database. If you attempt to do this, Oracle\
    \ will throw an `ORA-01567` error and inform you that dropping the log group is\
    \ not permitted because it would leave you with less than two logs groups for\
