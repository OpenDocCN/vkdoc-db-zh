- fmt: 'You can also specify that RMAN keep a minimum number of backups. For instance,
    if `redundancy` is set to 2, then RMAN doesn’t mark as obsolete the latest two
    backups of data files and archive redo log files:


    ```

    RMAN> configure retention policy to redundancy 2;

    ```


    I find that a retention policy based on redundancy is easier to work with and
    more predictable with regard to how long backups are retained. If I set `redundancy`
    to 2, I know that RMAN won’t mark as obsolete the latest two backups. In contrast,
    the recovery window retention policy depends on the frequency of the backups and
    the window length to determine whether a backup is obsolete.


    ### Deleting Backups, Based on Retention Policy


    You can report on backups that RMAN has determined to be obsolete per the retention
    policy, as follows:


    ```

    RMAN> report obsolete;

    ```


    To delete obsolete backups, run the `DELETE OBSOLETE` command:


    ```

    RMAN> delete obsolete;

    ```


    You’re prompted with this:


    ```

    Do you really want to delete the above objects (enter YES or NO)?

    ```


    If you’re scripting the procedure, you can specify the delete not to prompt for
    input:


    ```

    RMAN> delete noprompt obsolete;

    ```


    I usually have the `DELETE NOPROMPT OBSOLETE` command coded into the shell script
    that backs up the database. This instructs RMAN to delete any obsolete backups
    and obsolete archive redo logs, as specified by the retention policy (see the
    section “Segueing from Decisions to Action,” later in this chapter, for an example
    of how to automate the deleting of obsolete backups with a shell script).


    ### Clearing the Retention Policy


    The default retention policy is redundancy of 1. You can completely disable the
    RMAN retention policy via the `TO NONE` command.


    ```

    RMAN> configure retention policy to none;

    ```


    When the policy is set to `NONE`, no backups are ever considered obsolete and
    therefore cannot be removed via the `DELETE OBSOLETE` command. This normally is
    not the behavior you want. You want to let RMAN delete backups per a retention
    policy based on a window or number of backups.


    To set the retention policy back to the default, use the `CLEAR` command:


    ```

    RMAN> configure retention policy clear;

    ```


    ## 14. Configuring the Archive Redo Logs’ Deletion Policy


    In most scenarios, I have RMAN delete the archive redo logs based on the retention
    policy of the database backups. This is the default behavior. You can view the
    database retention policy, using the `SHOW` command:


    ```

    RMAN> show retention policy;

    CONFIGURE RETENTION POLICY TO REDUNDANCY 1; # default

    ```


    To remove archive redo logs (and backup pieces) based on the database retention
    policy, run the following:


    ```

    RMAN> delete obsolete;

    ```


    As of Oracle 11g, you can specify an archive redo log deletion policy that is
    separate from that of the database backups. This deletion policy applies to archive
    redo logs both outside and in the FRA.


    **注意** Prior to Oracle 11g the archive deletion policy only applied to archive
    redo logs associated with a standby database.


    To configure an archive redo log deletion policy, use the `CONFIGURE ARCHIVELOG
    DELETION` command. The following command configures the archive redo deletion
    policy so that archive redo logs aren’t deleted until they have been backed up
    twice to disk:


    ```

    RMAN> configure archivelog deletion policy to backed up 2 times to device type
    disk;

    ```


    To have RMAN delete obsolete archive redo logs, as defined by the `archivelog
    deletion policy`, issue the following command:


    ```

    RMAN> delete archivelog all;

    ```


    **提示** Run the `CROSSCHECK` command before running the `DELETE` command. Doing
    so ensures that RMAN is aware of whether a file is on disk.


    To see whether a retention policy has been set specifically for the archive redo
    log files, use this command:


    ```

    RMAN> show archivelog deletion policy;

    ```


    To clear the archive deletion policy, do this:


    ```

    RMAN> configure archivelog deletion policy clear;

    ```


    ## 15. Setting the Degree of Parallelism


    You can significantly increase the performance of RMAN backup and restore operations
    if your database server is equipped with the hardware to support multiple channels.
    If your server has multiple CPUs and multiple storage devices (disks or tape devices),
    then you can improve performance by enabling multiple backup channels.


    If you require better performance from backup and restore operations and have
    hardware that facilitates parallel operations, you should enable parallelism and
    perform tests to determine the optimal degree. If your hardware can take advantage
    of parallel RMAN channels, there is little downside to enabling parallelism.


    If you have multiple CPUs, but just one storage device location, you can enable
    multiple channels to write to and read from one location. For example, if you’re
    backing up to an FRA, you can still take advantage of multiple channels by enabling
    parallelism. Suppose you have four CPUs on a server and want to enable a corresponding
    degree of parallelism:


    ```

    RMAN> configure device type disk parallelism 4;

    ```


    You can also write to separate locations in parallel by configuring multiple channels
    associated with different mount points; for example,


    ```

    RMAN> configure device type disk parallelism 4;

    RMAN> configure channel 1 device type disk format ''/u01/O12C/rman/rman1_%U.bk'';

    RMAN> configure channel 2 device type disk format ''/u02/O12C/rman/rman2_%U.bk'';

    RMAN> configure channel 3 device type disk format ''/u03/O12C/rman/rman3_%U.bk'';

    RMAN> configure channel 4 device type disk format ''/u04/O12C/rman/rman4_%U.bk'';

    ```


    This code configures four channels that write to separate locations on disk. When
    you configure separate channels for different locations, make sure you enable
    the degree of parallelism to match the number of configured device channels. If
    you allocate more channels than the specified degree of parallelism, RMAN only
    writes to the number of channels specified by the degree of parallelism and ignores
    the other channels.


    If you need to clear the degree of parallelism, you can do so as follows:


    ```

    RMAN> configure device type disk clear;

    ```


    Similarly, to clear the channel device types, use the `CLEAR` command. This example
    clears channel 4:


    ```

    RMAN> configure channel 4 device type disk clear;

    ```


    ## 16. Using Backup Sets or Image Copies


    When you issue an RMAN `BACKUP` command, you can specify that the backup be one
    of the following:


    *   Backup set

    *   Image copy


    A backup set is the default type of RMAN backup. A backup set contains backup
    pieces, which are binary files that only RMAN can write to or read from. Backup
    sets are desirable because they’re generally smaller than the data files being
    backed up. If you’re using Oracle 10g Release 2 or higher, RMAN automatically
    attempts to create backup pieces with unused block compression. In this mode,
    RMAN reads a bitmap to determine which blocks are allocated and only reads from
    those blocks in the data files. This feature is supported only for disk-based
    backup sets and Oracle Secure Backup tape backups.


    If you’re using a database version prior to Oracle 10g Release 2, by default,
    backup sets are created, using null block compression (sometimes referred to,
    more aptly, as block skipping). In this mode, RMAN checks blocks in the data file;
    if the blocks haven’t been used, they aren’t backed up.


    **注意** RMAN can also create backup sets using true binary compression. This is
    the type of compression you get from an OS compression utility (such as `zip`).
    Oracle supports several levels of binary compression. The `BASIC` compression
    algorithm is available without an additional license. Oracle provides further
    compression features with the Oracle Advanced Compression option (see the section
    “Configuring Binary Compression,” later in this chapter, for details on how to
    enable binary compression).'
