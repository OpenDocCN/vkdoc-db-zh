  trans: "\n数据库管理员有时会坚持使用旧的`exp`/`imp`实用程序，因为那是他们所熟悉的（我偶尔也会犯这样的错误）。如果你运行的是 Oracle\
    \ 11g 第 2 版，你可以直接在命令行使用旧的`exp`/`imp`参数和选项。Data Pump 会将这些参数实时转换为 Data Pump 特有的语法。这个特性很好地促进了从旧工具到新工具的迁移。作为参考，我还提供了旧`exp`/`imp`语法与\
    \ Data Pump 命令之间的映射关系。\n\n## 索引\n\n- ![images](img/sq.jpg)  A\n    - 活动的联机重做日志组\n\
