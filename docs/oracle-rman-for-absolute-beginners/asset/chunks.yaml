    \ You have to do this for each tablespace:\n\n```sql\nSQL> alter tablespace <tablespace_name>\
    \ begin backup;\n```\n\n## Step 6. Copy the Data Files with an OS Utility\n\n\
    Use an OS utility (Linux/Unix `cp` command) to copy the data files to the backup\
    \ location. In this example all the data files are in one directory, and they’re\
    \ all copied to the same backup directory:\n\n```bash\n$ cp /u01/dbfile/O12C/*.dbf\
    \  /u01/hbackup/O12C\n```\n\n## Step 7. Alter the Database/Tablespaces out of\
    \ Backup Mode\n\nAfter you’re finished copying all your data files to the backup\
    \ directory, you need to alter the tablespaces out of backup mode. This example\
    \ alters all tablespaces out of backup mode at the same time:\n\n```sql\nSQL>\
    \ alter database end backup;\n```\n\nIf you’re altering your tablespaces into\
    \ backup mode one at a time, you need to alter each tablespace out of backup mode\
    \ after its data files have been copied:\n\n```sql\nSQL> alter tablespace <tablespace_name>\
    \ end backup;\n```\n\nIf you don’t take the tablespaces out of backup mode, you\
    \ can seriously degrade performance and compromise the ability to recover your\
    \ database. You can verify that no data files have an `ACTIVE` status with the\
    \ following query:\n\n```sql\nSQL> alter session set nls_date_format = 'DD-MON-RRRR\
    \ HH24:MI:SS';\nSQL> select * from v$backup where status='ACTIVE';\n```\n\n![Image](images/sq.jpg)\
    \ **Note** Setting the `NLS_DATE_FORMAT` parameter appropriately will allow you\
    \ to see the exact date/time when the data file was placed into backup mode. This\
    \ is useful for determining the starting sequence number of the archivelog needed,\
    \ in the event that the data file needs to be recovered.\n\n## Step 8. Archive\
    \ the Current Online Redo Log, and Note the Maximum Sequence Number of the Online\
    \ Redo Logs\n\nThe following statement instructs Oracle to archive any unarchived\
    \ online redo logs and to initiate a log switch. This ensures that an end-of-backup\
    \ marker is written to the archive redo logs:\n\n```sql\nSQL> alter system archive\
    \ log current;\n```\n\nAlso, note the maximum online redo log sequence number.\
    \ If a failure occurs immediately after the hot backup, you need any archive redo\
    \ logs generated during the hot backup to fully recover your database:\n\n```sql\n\
    select thread#, max(sequence#)\nfrom v$log\ngroup by thread#\norder by thread#;\n\
    ```\n\n## Step 9. Back Up the Control File\n\nFor a hot backup, you can’t use\
    \ an OS copy command to make a backup of the control file. Oracle’s hot backup\
    \ procedure specifies that you must use the `ALTER DATABASE BACKUP CONTROLFILE`\
    \ statement. This example makes a backup of the control file and places it in\
    \ the same location as the database backup files:\n\n```sql\nSQL> alter database\
    \ backup controlfile\n     to '/u01/hbackup/O12C/controlbk.ctl' reuse;\n```\n\n\
    The `REUSE` clause instructs Oracle to overwrite the file if it already exists\
    \ in the backup location.\n\n## Step 10. Back Up Any Archive Redo Logs Generated\
    \ During the Backup\n\nBack up the archive redo logs that were generated during\
    \ the hot backup. You can do this with an OS copy command:\n\n```bash\n$ cp <archive\
    \ redo logs generated during backup>  <backup directory>\n```\n\nThis procedure\
    \ guarantees that you have the logs, even if a failure should occur soon after\
