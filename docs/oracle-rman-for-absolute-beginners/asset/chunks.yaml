    | 21\. Configuring encryption | Not using | N/A |

    | 22\. Configuring miscellaneous settings | Not using | N/A |

    | 23\. Configuring informational output | Setting | Lines 15, 28, and 29 |


    A few aspects of this script need further discussion. Lines 9, 10, and 11 set
    the required OS variables by hard-coding the required OS variables into the script
    (see [Chapter 1](#9781484207642_Ch01.xhtml) for details on sourcing OS variables).
    I generally prefer not to hard-code variables into a script like this, but did
    so here to provide a simple example of how to script RMAN to backup your database.
    You’ll find that many DBAs do hard-code these variables into scripts.


    Line 15 sets the `NLS_DATE_FORMAT` OS variable to a value that includes hours,
    minutes, and seconds. This ensures that when RMAN runs commands that are appropriate,
    it displays the date output with a time component. This can be invaluable when
    you’re debugging and diagnosing issues. By default, RMAN displays only the date
    component. Knowing just the date when a command ran is rarely enough information
    to determine the timing of the commands as they were executed. At minimum, you
    need to see hours and minutes (along with the date).


    Lines 18–24 check for the existence of a lock file. You don’t want to run this
    script if it’s already running. The script checks for the lock file, and, if it
    exists, the script exits. After the backup has finished, the lock file is removed
    (lines 49–51).


    Line 28 sets the `ECHO` parameter to `on`. This instructs RMAN to display in the
    output the command before running it. This can be invaluable for debugging issues.
    Line 29 displays all the configurable variables. This also comes in handy for
    troubleshooting issues because you can see what the RMAN variables were set to
    before any commands are executed.


    Lines 32–37 use the `CONFIGURE` command. These commands run each time the script
    is executed. Why do that? You only need to run a `CONFIGURE` command once, and
    it’s stored in the control file—you don’t have to run it again, right? That is
    correct. However, I’ve occasionally been burned when a DBA with poor habits configured
    a setting for a database and didn’t tell anybody, and I didn’t discover the misconfiguration
    until I attempted to make another backup. I strongly prefer to place the `CONFIGURE`
    commands in the script so that the behavior is the same, regardless of what another
    DBA may have done outside the script. The `CONFIGURE` settings in the script also
    act as a form of documentation: I can readily look at the script and determine
    how settings have been configured.


    Lines 30 and 31 run `CROSSCHECK` commands. Why do that? Sometimes, files go missing,
    or a rogue DBA may remove archive redo log files from disk with an OS command
    outside RMAN. When RMAN runs, if it can’t find files that it thinks should be
    in place, it throws an error and stops the backup. I prefer to run the `CROSSCHECK`
    command and let RMAN reconcile which files it thinks should be on disk with those
    that are actually on disk. This keeps RMAN running smoothly.


    You run `DELETE NOPROMPT OBSOLETE` on line 39\. This removes all backup files
    and archive redo log files that have been marked as `OBSOLETE` by RMAN, as defined
    by the retention policy. This lets RMAN manage which files should be kept on disk.
    I prefer to run the `DELETE` command after the backup has finished (as opposed
    to running it before the backup). The retention policy is defined as 1, so if
    you run `DELETE` after the backup, RMAN leaves one backup copy on disk. If you
    run `DELETE` before the backup, RMAN leaves one copy of the backup on disk. After
    the backup runs, there are be two copies of the backup on disk, which I don’t
    have room for on this server.


