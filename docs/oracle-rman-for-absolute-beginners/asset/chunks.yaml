- fmt: 'When you create a backup as a backup set, the binary backup piece files can
    only be manipulated by RMAN processes. Some DBAs view this as a disadvantage because
    they must use RMAN to back up and restore these files (you have no direct access
    to or control over the backup pieces). But, these perceptions aren’t warranted.
    Unless you hit a rare bug, RMAN is dependable and works reliably in all backup-and-restore
    situations.


    Contrast the backup set with an image copy. An image copy creates a byte-for-byte
    identical copy of each data file. The advantage of creating an image copy is that
    (if necessary) you can manipulate the image copy without using RMAN (as with an
    OS copy utility). Additionally, in the event of a media failure, an image copy
    is a fast method of restoring data files, because RMAN only has to copy the file
    back from the backup location (there is no reconstructing of the data file, because
    it’s an exact copy).


    I almost always use backup sets for database backups, rather than image copies.
    Usually, I require some form of RMAN compression (block skipping). The size of
    the backup to disk is almost always a concern. Backup sets are more efficient
    regarding disk space consumption. Because backup sets can take advantage of RMAN
    compression, there is also less I/O involved, compared with an image copy. In
    many environments, reducing the I/O so as not to impact other applications is
    a concern.


    However, if you feel that you need direct control over the backup files that RMAN
    creates, or you’re in an environment in which the speed of the restore process
    is paramount, consider using image copies.


    ## 17. Using Incremental Backups


    For most of the databases I’m responsible for, I run a daily level 0 backup. I
    don’t usually implement any type of incremental backup strategy.


    Incremental backup strategies are appropriate for large databases in which only
    a small portion of the database blocks change from one backup to the next. If
    you’re in a data warehouse environment, you may want to consider an incremental
    backup strategy, because it can greatly reduce the size of your backups. For example,
    you may want to run a weekly level 0 backup and then run a daily level 1 incremental
    backup.


    ![Image](images/sq.jpg) `Note` See [Chapter 5](#9781484207642_Ch05.xhtml) for
    details on how to back up a database using incremental backups.


    ## 18. Using Incrementally Updated Backups


    Incrementally updated backups are an efficient way to implement an image copy
    backup strategy. This technique instructs RMAN to first create image copies of
    data files; then, the next time the backup runs, instead of creating a fresh set
    of image copies, RMAN makes an incremental backup (changes to blocks since the
    image copy was created) and applies that incremental backup to the image copies.


    If you have the disk space available for full image copies of your database and
    you want the flexibility to use the image copies directly, in the event of a media
    failure, consider this backup strategy.


    One potential disadvantage of this approach is that if you’re required to restore
    and recover to some point in the past, you can only restore and recover to the
    point at which the image copies were last updated with the incremental backup.


    ![Image](images/sq.jpg) `Note` See [Chapter 5](#9781484207642_Ch05.xhtml) for
    details on how to back up a database using incrementally updated backups.


    ## 19. Using Block Change Tracking


    This feature keeps track of when a database block changes. The idea is that if
    you’re using an incremental backup strategy, you can enhance performance, because
    by implementing this feature, RMAN doesn’t have to scan each block (under the
    high-water mark) in the data files to determine whether it needs to be backed
    up. Rather, RMAN only has to access the block change tracking file to find which
    blocks have changed since the last backup and directly access those blocks. If
    you work in a large, data warehouse environment and are using an incremental backup
    strategy, consider enabling block change tracking to enhance performance.


    ![Image](images/sq.jpg) `Note` See [Chapter 5](#9781484207642_Ch05.xhtml) for
    details on how to implement block change tracking.


    ## 20. Configuring Binary Compression


    You can configure RMAN to use true binary compression when generating backup sets.
    You can enable compression in one of two ways:


    *   Specify `AS COMPRESSED BACKUPSET` with the `BACKUP` command.

    *   Use a one-time `CONFIGURE` command.


    Here is an example of backing up with compression when issuing the `BACKUP` command:


    ```

    RMAN> backup as compressed backupset database;

    ```


    In this example, compression is configured for the disk device:


    ```

    RMAN> configure device type disk backup type to compressed backupset;

    ```


    If you need to clear the device-type compression, issue this command:


    ```

    RMAN> configure device type disk clear;

    ```


    I’ve found the default compression algorithm to be quite efficient. For a typical
    database the backups are usually approximately four to five times smaller than
    the regular backups. Of course, your compression results may vary, depending on
    your data.


    Why not compress all backups? Compressed backups consume more CPU resources and
    take longer to create and restore from, but they result in less I/O, spread out
    over a longer period. If you have multiple CPUs, and the speed of making a backup
    isn’t an issue, then you should consider compressing your backups.


    You can view the type of compression enabled, using the `SHOW` command:


    ```

    RMAN> show compression algorithm;

    ```


    Here is some sample output:


    ```

    CONFIGURE COMPRESSION ALGORITHM ''BASIC'' AS OF RELEASE ''DEFAULT''

    OPTIMIZE FOR LOAD TRUE ; # default

    ```


    The basic compression algorithm doesn’t require an extra license from Oracle.
    If you’re using Oracle 11g Release 2 or higher, and if you have a license for
    the Advanced Compression option, then you have available three additional configurable
    levels of binary compression; for example,


    ```

    RMAN> configure compression algorithm ''HIGH'';

    RMAN> configure compression algorithm ''MEDIUM'';

    RMAN> configure compression algorithm ''LOW'';

    ```


    In my experience the prior compression algorithms are very efficient, both in
    compression ratios and time taken to create backups.


    You can query `V$RMAN_COMPRESSION_ALGORITHM` to view details regarding the compression
    algorithms available for your release of the database. To reset the current compression
    algorithm to the default of `BASIC`, use the `CLEAR` command:


    ```

    RMAN> configure compression algorithm clear;

    ```


    ## 21. Configuring Encryption


    You may be required to encrypt backups. Some shops especially require this for
    backups that contain sensitive data and that are stored offsite. To use encryption
    when backing up, you must use the Oracle Enterprise Edition, possess a license
    for the Advanced Security option, and use Oracle 10g Release 2 or higher.


    If you’ve configured a security wallet (see the `Oracle Advanced Security Administrator’s
    Guide`, which can be freely downloaded from the Technology Network area of the
    Oracle website (`http://otn.oracle.com`, for details), you can configure transparent
    encryption for backups, as shown:


    ```

    RMAN> configure encryption for database on;

    ```'
  raw: 'When you create a backup as a backup set, the binary backup piece files can
    only be manipulated by RMAN processes. Some DBAs view this as a disadvantage because
    they must use RMAN to back up and restore these files (you have no direct access
    to or control over the backup pieces). But, these perceptions aren’t warranted.
    Unless you hit a rare bug, RMAN is dependable and works reliably in all backup-and-restore
    situations.


    Contrast the backup set with an image copy. An image copy creates a byte-for-byte
    identical copy of each data file. The advantage of creating an image copy is that
    (if necessary) you can manipulate the image copy without using RMAN (as with an
    OS copy utility). Additionally, in the event of a media failure, an image copy
    is a fast method of restoring data files, because RMAN only has to copy the file
    back from the backup location (there is no reconstructing of the data file, because
    it’s an exact copy).


    I almost always use backup sets for database backups, rather than image copies.
    Usually, I require some form of RMAN compression (block skipping). The size of
    the backup to disk is almost always a concern. Backup sets are more efficient
    regarding disk space consumption. Because backup sets can take advantage of RMAN
    compression, there is also less I/O involved, compared with an image copy. In
    many environments, reducing the I/O so as not to impact other applications is
    a concern.


    However, if you feel that you need direct control over the backup files that RMAN
    creates, or you’re in an environment in which the speed of the restore process
    is paramount, consider using image copies.


