    如果您的实例当前正在运行，`STARTUP FORCE`命令将会关闭实例（中止模式）并重新启动它。在生产环境中，这种行为可能并非您所期望的，但对于测试/开发数据库，这通常是可以的。


    ## 总结


    本章涵盖的任务包括设置操作系统变量、连接到数据库以及启动/停止数据库。这些操作是许多 DBA 任务的前提条件，特别是备份与恢复。在启动数据库时，了解 Oracle
    经历的各个阶段以及在哪个时间点访问控制文件、打开数据文件和联机重做日志非常重要。现在您已理解这些基础概念，我们准备继续描述执行备份与恢复操作时使用的 Oracle
    文件。


    ## 第二章


    ![image](img/frontdot.jpg)


    ## 支持备份与恢复操作的文件


    Oracle 数据库由三种必需文件组成：控制文件、联机重做日志和数据文件。本章将探讨管理这些关键文件的基础知识。本章还将讨论如何实现归档（这会生成归档重做日志文件）以及如何启用快速恢复区（FRA）。理解如何启用归档以及如何管理归档重做日志是数据库管理和备份恢复的关键部分。了解基本的
    FRA 概念也很重要，因为 RMAN（除非另有指示）默认会将备份文件写入 FRA。


    使用 RMAN 时，理解构成数据库的文件至关重要。熟悉数据库的物理特性是理解 RMAN 如何执行备份和恢复操作的基础。这些知识将使您能更好地理解底层机制，并在出现问题时提供故障排除所需的基础信息。首先是管理控制文件。


    ## 管理控制文件


    控制文件是一个小的二进制文件，存储诸如数据库名称、数据文件的名称和位置、联机重做日志文件的名称和位置、当前联机重做日志序列号、检查点信息以及 RMAN 备份文件的名称和位置（如果使用）等信息。您可以从数据字典视图查询存储在控制文件中的许多信息。以下示例通过查询`V$CONTROLFILE_RECORD_SECTION`来显示存储在控制文件中的信息类型：


    ```

    SQL> select distinct type from v$controlfile_record_section;


    TYPE

    ------------------

    FILENAME

    TABLESPACE

    RMAN CONFIGURATION

    BACKUP CORRUPTION

    PROXY COPY

    FLASHBACK LOG

    ...

    ```


    您可以通过`V$DATABASE`视图查看存储在控制文件中的数据库相关信息：


    ```

    SQL> select name, open_mode, created, current_scn from v$database;


    NAME      OPEN_MODE            CREATED   CURRENT_SCN

    --------- -------------------- --------- -----------

    O12C      READ WRITE           27-SEP-14      319781

    ```


    每个 Oracle 数据库必须至少有一个控制文件。当您以 nomount 模式启动数据库时，实例会从`spfile`或`init.ora`文件中的`CONTROL_FILES`初始化参数得知控制文件的位置。当您发出`STARTUP
    NOMOUNT`命令时，Oracle 会读取参数文件，启动后台进程并分配内存结构：


    ```

    -- 实例已知晓控制文件的位置

    SQL> startup nomount;

    ```


    此时，控制文件尚未被任何进程访问。当您将数据库切换到 mount 模式时，控制文件会被读取并打开以供使用：


    ```

    -- 控制文件已打开

    SQL> alter database mount;

    ```


    如果`CONTROL_FILES`初始化参数中列出的任何控制文件不可用，则无法挂载数据库。


    成功挂载数据库后，实例便知晓数据文件和联机重做日志的位置，但尚未打开它们。当您将数据库切换到 open 模式后，数据文件和联机重做日志将被打开：


    ```

    -- 数据文件和联机重做日志已打开

    SQL> alter database open;

    ```


    ![Image](img/sq.jpg) **请注意**，当您发出`STARTUP`命令（不带选项）时，会自动按此顺序执行前述三个阶段：nomount、mount、open。当您发出`SHUTDOWN`命令时，阶段则相反：关闭数据库、卸载控制文件并停止实例。


    控制文件在数据库创建时创建。如果可能，您应该将多个控制文件存储在由单独控制器控制的独立存储设备上。


    数据库打开后，Oracle 会频繁地向控制文件写入信息，例如当您进行任何物理修改时（例如，创建表空间、添加/删除/调整数据文件大小）。Oracle 会向`CONTROL_FILES`初始化参数指定的所有控制文件写入。如果
    Oracle 无法写入某个控制文件，则会抛出错误：


    ```

    ORA-00210: cannot open the specified control file

    ```


    如果您的某个控制文件变得不可用，请关闭数据库并在重新启动前解决问题（有关使用 RMAN 还原控制文件，请参见第 6 章）。解决问题可能意味着解决存储设备故障，或修改`CONTROL_FILES`初始化参数以移除不可用控制文件的条目。


    ### 显示控制文件的内容


    您可以使用`ALTER SESSION`语句显示控制文件的物理内容；例如，


    ```

    SQL> oradebug setmypid

    SQL> oradebug unlimit

    SQL> alter session set events ''immediate trace name controlf level 9'';

    SQL> oradebug tracefile_name

    ```


    前面的代码行将显示以下跟踪文件名：


    ```

    /orahome/app/oracle/diag/rdbms/o12c/O12C/trace/O12C_ora_15545.trc

    ```


    在 Oracle 11g 及更高版本中，跟踪文件写入到`$ADR_HOME/trace`目录。您也可以通过此查询查看跟踪目录名称：


    ```

    SQL> select value from v$diag_info where name=''Diag Trace'';

    ```


    在 Oracle 10g 及更低版本中，跟踪目录由`USER_DUMP_DEST`初始化参数定义。在排查问题或试图更好地理解 Oracle 内部机制时，您可以检查控制文件的内容。


    ### 查看控制文件名称和位置


    如果您的数据库处于 nomount、mounted 或 open 状态，您可以按如下方式查看控制文件的名称和位置：


    ```

    SQL> show parameter control_files

    ```


    您也可以通过查询`V$CONTROLFILE`视图来查看控制文件的位置和名称信息。此查询在数据库处于 mounted 或 open 状态时有效：


    ```

    SQL> select name from v$controlfile;

    ```


    如果由于某种原因您根本无法启动数据库，并且需要知道控制文件的名称和位置，您可以检查初始化（参数）文件的内容以查看它们的位置。如果您使用的是`spfile`，尽管它是二进制文件，您仍然可以用文本编辑器打开它。最安全的方法是复制一份`spfile`，然后使用操作系统编辑器检查其内容：


    ```

    $ cp $ORACLE_HOME/dbs/spfileO12C.ora $ORACLE_HOME/dbs/spfileO12C.copy

    $ vi $ORACLE_HOME/dbs/spfileO12C.copy

    ```


    您也可以使用`strings`命令在二进制文件中搜索值：


    ```

    $ strings $ORACLE_HOME/dbs/spfileO12C.ora | grep -i control_files

    ```


    如果您使用的是基于文本的初始化文件，您可以直接使用操作系统编辑器查看该文件，或使用`grep`命令：


    ```

    $ grep -i control_files $ORACLE_HOME/dbs/initO12C.ora

    ```


    ### 添加控制文件

    '
- fmt: '# 添加Oracle数据库控制文件指南


    添加控制文件意味着复制一个现有的控制文件，并通过修改`CONTROL_FILES`参数让数据库感知到这个副本。此操作必须在数据库关闭时执行。此过程仅在你拥有一个可供复制的良好现有控制文件时才有效。添加控制文件不同于创建或恢复控制文件。


    如果你的数据库只使用一个控制文件，而该控制文件损坏，你需要从备份中恢复一个控制文件（如果有）并执行恢复，或者重新创建控制文件。如果你正在使用两个或更多控制文件，其中一个损坏，你可以使用剩余的良好控制文件快速将数据库恢复到可运行状态。


    如果数据库只使用一个控制文件，添加控制文件的基本过程如下：


    1.  修改初始化文件中的`CONTROL_FILES`参数，以包含新控制文件的位置和名称。

    2.  关闭数据库。

    3.  使用操作系统命令将现有的控制文件复制到新的位置和名称。

    4.  重启数据库。


    根据你使用的是`spfile`还是`init.ora`文件，上述步骤会略有不同。接下来的两个部分将详细说明这些不同的场景。


    ## Spfile场景


    如果你的数据库已打开，可以使用以下SQL语句快速确定你是否在使用`spfile`：


    ```sql

    SQL> show parameter spfile

    ```


    以下是一些示例输出：


    ```

    NAME      TYPE        VALUE

    --------- ----------- ------------------------------

    spfile    string      /orahome/app/oracle/product/12

                          .1.0.1/db_1/dbs/spfileO12C.ora

    ```


    确定你正在使用`spfile`后，请使用以下步骤添加控制文件：


    ### 步骤1：确定`CONTROL_FILES`参数的当前值


    ```sql

    SQL> show parameter control_files

    ```


    输出显示此数据库仅使用一个控制文件：


    ```

    NAME              TYPE        VALUE

    ----------------- ----------- ------------------------------

    control_files     string      /u01/dbfile/O12C/control01.ctl

    ```


    ### 步骤2：修改`CONTROL_FILES`参数


    修改你的`CONTROL_FILES`参数以包含要添加的新控制文件，但将操作范围限制为`spfile`（你无法在内存中修改此参数）。确保也包含步骤1中列出的所有控制文件：


    ```sql

    SQL> alter system set control_files=''/u01/dbfile/O12C/control01.ctl'',

    ''/u01/dbfile/O12C/control02.ctl'' scope=spfile;

    ```


    ### 步骤3：关闭数据库


    ```sql

    SQL> shutdown immediate;

    ```


    ### 步骤4：复制现有控制文件


    将现有的控制文件复制到新的位置和名称。在此示例中，通过操作系统`cp`命令创建了一个名为`control02.ctl`的新控制文件：


    ```bash

    $ cp /u01/dbfile/O12C/control01.ctl /u01/dbfile/O12C/control02.ctl

    ```


    ### 步骤5：启动数据库


    ```sql

    SQL> startup;

    ```


    你可以通过显示`CONTROL_FILES`参数来验证新控制文件是否正在被使用：


    ```sql

    SQL> show parameter control_files

    ```


    此示例的输出如下：


    ```

    NAME            TYPE        VALUE

    --------------- ----------- ------------------------------

    control_files   string      /u01/dbfile/O12C/control01.ctl

                                ,/u01/dbfile/O12C/control02.ctl

    ```


    ## Init.ora场景


    运行以下语句以验证你是否在使用`init.ora`文件。如果你没有使用`spfile`，`VALUE`列将为空：


    ```sql

    SQL> show parameter spfile

    NAME       TYPE        VALUE

    ---------- ----------- ------------------------------

    spfile     string

    ```


    要使用文本`init.ora`文件添加控制文件，请执行以下步骤：


    ### 步骤1：关闭数据库


    ```sql

    SQL> shutdown immediate;

    ```


    ### 步骤2：编辑`init.ora`文件


    使用操作系统实用程序（如`vi`）编辑你的`init.ora`文件，并将新的控制文件位置和名称添加到`CONTROL_FILES`参数中。此示例使用`vi`打开`init.ora`文件，并将`control02.ctl`添加到`CONTROL_FILES`参数：'
  raw: "Adding a control file means copying an existing control file and making your\
    \ database aware of the copy by modifying your `CONTROL_FILES` parameter. This\
    \ task must be done while your database is shut down. This procedure only works\
    \ when you have a good existing control file that can be copied. Adding a control\
    \ file isn’t the same thing as creating or restoring a control file.\n\nIf your\
    \ database uses only one control file, and that control file becomes damaged,\
    \ you need to either restore a control file from a backup (if available) and perform\
    \ a recovery or re-create the control file. If you’re using two or more control\
    \ files, and one becomes damaged, you can use the remaining good control file(s)\
    \ to quickly get your database into an operating state.\n\nIf a database is using\
    \ only one control file, the basic procedure for adding a control file is as follows:\n\
    \n1.  Alter the initialization file `CONTROL_FILES` parameter to include the new\
    \ location and name of the control file.\n2.  Shut down your database.\n3.  Use\
    \ an OS command to copy an existing control file to the new location and name.\n\
    4.  Restart your database.\n\nDepending on whether you use an `spfile` or an `init.ora`\
    \ file, the previous steps vary slightly. The next two sections detail these different\
    \ scenarios.\n\nSpfile Scenario\n\nIf your database is open, you can quickly determine\
    \ whether you’re using an `spfile` with the following SQL statement:\n\n```\n\
    SQL> show parameter spfile\n```\n\nHere is some sample output:\n\n```\nNAME      TYPE        VALUE\n\
    --------- ----------- ------------------------------\nspfile    string      /orahome/app/oracle/product/12\n\
                          .1.0.1/db_1/dbs/spfileO12C.ora\n```\n\nWhen you’ve determined\
    \ that you’re using an `spfile`, use the following steps to add a control file:\n\
    \n1.  Determine the `CONTROL_FILES` parameter’s current value:\n\n```\n    SQL>\
    \ show parameter control_files\n    ```\n\nThe output shows that this database\
    \ is using only one control file:\n\n```\n    NAME              TYPE        VALUE\n\
    \    ----------------- ----------- ------------------------------\n    control_files    \
    \ string      /u01/dbfile/O12C/control01.ctl\n    ```\n\n2.  Alter your `CONTROL_FILES`\
    \ parameter to include the new control file that you want to add, but limit the\
    \ scope of the operation to the `spfile` (you can’t modify this parameter in memory).\
    \ Make sure you also include any control files listed in step 1:\n\n```\n    SQL>\
    \ alter system set control_files='/u01/dbfile/O12C/control01.ctl',\n    '/u01/dbfile/O12C/control02.ctl'\
    \ scope=spfile;\n    ```\n\n3.  Shut down your database:\n\n```\n    SQL> shutdown\
    \ immediate;\n    ```\n\n4.  Copy an existing control file to the new location\
    \ and name. In this example a new control file named `control02.ctl` is created\
    \ via the OS `cp` command:\n\n```\n    $ cp /u01/dbfile/O12C/control01.ctl /u01/dbfile/O12C/control02.ctl\n\
    \    ```\n\n5.  Start up your database:\n\n```\n    SQL> startup;\n    ```\n\n\
    You can verify that the new control file is being used by displaying the `CONTROL_FILES`\
    \ parameter:\n\n```\nSQL> show parameter control_files\n```\n\nHere is the output\
    \ for this   example:\n\n```\nNAME            TYPE        VALUE\n---------------\
    \ ----------- ------------------------------\ncontrol_files   string      /u01/dbfile/O12C/control01.ctl\n\
                                ,/u01/dbfile/O12C/control02.ctl\n```\n\nInit.ora Scenario\n\
    \nRun the following statement to verify that you’re using an `init.ora` file.\
    \ If you’re not using an `spfile`, the `VALUE` column is blank:\n\n```\nSQL> show\
    \ parameter spfile\nNAME       TYPE        VALUE\n---------- ----------- ------------------------------\n\
    spfile     string\n```\n\nTo add a control file when using a text `init.ora` file,\
    \ perform the following steps:\n\n1.  Shut down your database:\n\n```\n    SQL>\
    \ shutdown immediate;\n    ```\n\n2.  Edit your `init.ora` file with an OS utility\
    \ (such as `vi`), and add the new control file location and name to the `CONTROL_FILES`\
    \ parameter. This example opens the `init.ora` file, using `vi`, and adds `control02.ctl`\
    \ to the `CONTROL_FILES` parameter:"
