    \ 相关联。您可以查看数据库的当前 SCN，如下所示：\n\n```sql\nSQL> select current_scn from v$database;\n\
    ```\n\n您可以查看 `V$RESTORE_POINT` 视图中的还原点信息，如下所示：\n\n```sql\nSQL> select name, scn\
    \ from v$restore_point;\n```\n\n还原点就像特定 SCN 的同义词。还原点允许您还原并恢复到某个 SCN，而无需指定一个数字。RMAN\
    \ 将还原并恢复到与还原点关联的 SCN 之前，但不包括该 SCN。"
- fmt: "# RMAN 和 Flashback 技术详解\n\n## 使用 RMAN 恢复到还原点\n\n此示例演示了如何恢复并恢复到 `MY_RP` 还原点：\n\
    \n```sql\n$ rman target /\nRMAN> startup mount;\nRMAN> restore database until\
    \ restore point MY_RP;\nRMAN> recover database until restore point MY_RP;\nRMAN>\
    \ alter database open resetlogs;\n```\n\n## 将表恢复到先前时间点\n\n从 Oracle 12c 开始，你可以通过\
    \ `RECOVER TABLE` 命令从 RMAN 备份中恢复单个表。这使你能够将表恢复并恢复到过去的某个时间点。\n\n表级恢复功能使用临时辅助实例和\
    \ Data Pump 实用程序。在恢复表时，辅助实例和 Data Pump 都会创建临时文件。在启动表级恢复之前，首先创建两个目录：一个用于存放辅助实例使用的文件，另一个用于存储\
    \ Data Pump 转储文件：\n\n```bash\n$ mkdir /tmp/oracle\n$ mkdir /tmp/recover\n```\n\
    \n上面的两个目录在 `RECOVER TABLE` 命令中通过 `AUXILIARY DESTINATION` 和 `DATAPUMP DESTINATION`\
    \ 子句引用。在以下代码片段中，由 `MV_MAINT` 拥有的 `INV` 表被恢复到之前的某个 SCN：\n\n```sql\nrecover table\
    \ mv_maint.inv\nuntil scn 4689805\nauxiliary destination '/tmp/oracle'\ndatapump\
    \ destination '/tmp/recover';\n```\n\n前提是存在包含该表在指定 SCN 时状态的 RMAN 备份，这样表级恢复和恢复操作才能执行。\n\
    \n> 注意：你还可以将表恢复到 SCN、时间点或日志序列号。\n\n当 RMAN 执行表级恢复时，它会自动创建一个临时辅助数据库，使用 Data Pump\
    \ 导出该表，然后将表作为它在指定还原点时的状态导入回目标数据库。恢复完成后，辅助数据库会被删除，Data Pump 转储文件也会被移除。\n\n> 提示：尽管\
    \ `RECOVER TABLE` 命令是一个很好的增强功能，但建议，如果不小心删除了表，首先探索使用闪回表到删除前（Flashback Table to\
    \ Before Drop）功能来恢复表。或者，如果表被错误地删除了数据，则使用闪回表（Flashback Table）功能将表闪回到过去的某个时间点。如果以上选项都不可行，再考虑使用\
    \ RMAN 恢复表功能。\n\n## 闪回表\n\n在 Oracle 10g 之前，如果不小心删除了表，你必须执行以下步骤来恢复表：\n\n1. 将数据库备份恢复到测试数据库。\n\
    2. 执行不完全恢复，直到删除表的时间点。\n3. 导出该表。\n4. 将表导入到生产数据库。\n\n这个过程可能非常耗时且资源密集。它需要额外的服务器资源，以及\
    \ DBA 的时间和精力。\n\n为了简化意外删除表的恢复，Oracle 引入了闪回表（Flashback Table）功能。Oracle 提供了两种不同类型的闪回表操作：\n\
    \n*   `FLASHBACK TABLE TO BEFORE DROP` 可以快速撤消之前删除的表。此功能使用一个名为回收站的逻辑容器。\n*   `FLASHBACK\
    \ TABLE` 可闪回到最近的某个时间点，以撤消不期望的 DML 语句的影响。你可以闪回到 SCN、时间戳或还原点。\n\nOracle 引入 `FLASHBACK\
    \ TABLE TO BEFORE DROP` 是为了让你能够快速恢复已删除的表。从 Oracle 10g 开始，当你删除一个表时，如果没有指定 `PURGE`\
    \ 子句，Oracle 不会真正删除该表——而是将其重命名。任何被你删除（由 Oracle 重命名）的表都会被放入回收站。回收站为你提供了一种高效的方式来查看和管理已删除的对象。\n\
    \n> 注意：要使用闪回表功能，你不需要实施 FRA（快速恢复区），也不需要启用闪回数据库。\n\n`FLASHBACK TABLE TO BEFORE DROP`\
    \ 操作仅在你的数据库启用了回收站功能时有效（默认是启用的）。你可以按如下方式检查回收站的状态：\n\n```sql\nSQL> show parameter\
    \ recyclebin\n\nNAME                                 TYPE        VALUE\n------------------------------------\
    \ ----------- -------\nrecyclebin                           string      on\n```\n\
    \n### FLASHBACK TABLE TO BEFORE DROP\n\n当你删除一个表时，如果没有指定 `PURGE` 子句，Oracle 会用一个系统生成的名称重命名该表。因为表并非真正被删除，你可以使用\
    \ `FLASHBACK TABLE TO BEFORE DROP` 来指示 Oracle 用其原始名称重命名表。下面是一个例子。假设 `INV` 表被意外删除：\n\
    \n```sql\nSQL> drop table inv;\n```\n\n通过查看回收站的内容来验证表已被重命名：\n\n```sql\nSQL> show\
    \ recyclebin;\nORIGINAL NAME    RECYCLEBIN NAME                OBJECT TYPE  DROP\
    \ TIME\n---------------- ------------------------------ ------------ -----------\n\
    INV      BIN$BCRjF6KSbi/gU7fQTwrP+Q==$0 TABLE    2014-09-28:11:26:15\n```\n\n\
    `SHOW RECYCLEBIN` 语句只显示已删除的表。要获得更完整的重命名对象视图，请查询 `RECYCLEBIN` 视图：\n\n```sql\nSQL>\
    \ select object_name, original_name, type from recyclebin;\n```\n\n输出如下：\n\n```\n\
    OBJECT_NAME                              ORIGINAL_NAME        TYPE\n----------------------------------------\
    \ -------------------- ----------\nBIN$BCRjF6KSbi/gU7fQTwrP+Q==$0           INV\
    \                  TABLE\nBIN$BCRjF6KRbi/gU7fQTwrP+Q==$0           INV_TRIG  \
    \           TRIGGER\nBIN$BCRjF6KQbi/gU7fQTwrP+Q==$0           INV_PK         \
    \      INDEX\n```\n\n在此输出中，该表还有一个在对象删除时被重命名的主键。要恢复（取消删除）该表，请执行：\n\n```sql\nSQL>\
    \ flashback table inv to before drop;\n```\n\n前面的命令将表恢复为其原始名称。但是，此语句不会将索引恢复为其原始名称：\n\
    \n```sql\nSQL> select index_name from user_indexes where table_name='INV';\n\n\
    INDEX_NAME\n----------------------------------------\nBIN$BCRjF6KQbi/gU7fQTwrP+Q==$0\n\
    ```\n\n在这种情况下，你必须重命名索引：\n\n```sql\nSQL> alter index \"BIN$BCRjF6KQbi/gU7fQTwrP+Q==$0\"\
    \ rename to inv_pk;\n```\n\n你还必须以同样的方式重命名任何触发器对象。如果在删除表之前存在引用约束，你必须手动重新创建它们。\n\
    \n如果由于某些原因，你需要将表闪回到一个与原始名称不同的名称，可以按如下方式操作：\n\n```sql\nSQL> flashback table inv\
    \ to before drop rename to inv_bef;\n```\n\n### 将表闪回到之前的时点\n\n如果表被错误地删除了数据，你可以选择将表闪回到之前的某个时间点。闪回表功能使用回滚表空间中的信息来恢复表。过去的那个时间点取决于你的回滚表空间保留期，它指定了回滚信息保留的最短时间。\n\
    \n如果所需的闪回信息不在回滚表空间中，你会收到类似以下的错误：\n\n```\nORA-01555: snapshot too old\n```\n\n\
    换句话说，要能够闪回到过去的某个时间点，回滚表空间中所需的信息不能被覆盖。\n\n### FLASHBACK TABLE TO SCN\n\n假设你正在测试一个应用程序功能，并希望快速将表恢复到某个特定的\
    \ SCN。作为应用程序测试的一部分，你在测试开始前记录了 SCN：\n\n```sql\nSQL> select current_scn from v$database;\n\
    \nCURRENT_SCN\n-----------\n    4760089\n```\n\n你执行了一些测试，然后希望将表闪回到之前记录的 SCN。首先，确保为表启用了行移动：\n\
    \n```sql\nSQL> alter table inv enable row movement;\nSQL> flashback table inv\
    \ to scn 4760089;\n```\n\n该表现在应该反映截至在 `FLASHBACK` 语句中指定的历史 SCN 值时已提交的事务。\n\n###\
    \ FLASHBACK TABLE TO TIMESTAMP\n\n（此处原文内容不完整，故保留原有标题）"
  raw: 'This example restores and recovers to the `MY_RP` restore point:


    ```

    $ rman target /

    RMAN> startup mount;

    RMAN> restore database until restore point MY_RP;

    RMAN> recover database until restore point MY_RP;

    RMAN> alter database open resetlogs;

    ```


    Restoring Tables to a Previous Point


    Starting with Oracle 12c, you can restore individual tables from RMAN backups
    via the `RECOVER TABLE` command. This gives you with the ability to restore and
    recover a table back to a point in time in the past.


    The table-level restore feature uses a temporary auxiliary instance and the Data
    Pump utility. Both the auxiliary instance and Data Pump create temporary files
    when restoring the table. Before initiating a table-level restore, first create
    two directories: one to hold files used by the auxiliary instance and one to store
    a Data Pump dump file:


    ```

    $ mkdir /tmp/oracle

    $ mkdir /tmp/recover

    ```


    The prior two directories are referenced within the `RECOVER TABLE` command via
    the `AUXILIARY DESTINATION` and `DATAPUMP DESTINATION` clauses. In the following
    bit of code, the `INV` table, owned by `MV_MAINT`, is restored as it was at a
    prior SCN:


    ```

    recover table mv_maint.inv

    until scn 4689805

    auxiliary destination ''/tmp/oracle''

    datapump destination ''/tmp/recover'';

    ```


    Providing that RMAN backups are available that contain the state of the table
    at the specified SCN, a table-level restore and recovery is performed.


    ![Image](images/sq.jpg) **Note**  You can also restore a table to an SCN, a point
    in time, or a log sequence number.


    When RMAN performs a table-level recovery, it automatically creates a temporary
    auxiliary database, uses Data Pump to export the table, and then imports the table
    back into the target database as it was at the specified restore point. After
    the restore is finished, the auxiliary database is dropped, and Data Pump dump
    file is removed.


    ![Image](images/sq.jpg) **Tip**  Although the `RECOVER TABLE` command is a nice
    enhancement, I would recommend that, if you have an accidentally dropped table,
    you first explore using the Flashback Table to Before Drop feature to restore
    the table. Or, if the table was erroneously deleted from, then use the Flashback
    Table feature to restore the table back to a point in time in the past. If neither
    of the prior options are viable, then consider using the RMAN Recover Table feature.


    Flashing Back a Table


    Prior to Oracle 10g, if a table was accidentally dropped, you had to do the following
    to restore the table:


    1.  Restore a backup of the database to a test database.

    2.  Perform an incomplete recovery up to the point in time at which the table
    was dropped.

    3.  Export the table.

    4.  Import the table into the production database.


    This process can be time-consuming and resource intensive. It requires extra server
    resources as well as time and effort from a DBA.


    To simplify recovery of an accidentally dropped table, Oracle introduced the Flashback
    Table feature. Oracle offers two different types of Flashback Table operations:


    *   `FLASHBACK TABLE TO BEFORE DROP` quickly undrops a previously dropped table.
    This feature uses a logical container named the recycle bin.

    *   `FLASHBACK TABLE` flashes back to a recent point in time to undo the effects
    of undesired DML statements. You can flash back to an SCN, a timestamp, or a restore
    point.


    Oracle introduced `FLASHBACK TABLE TO BEFORE DROP` to allow you to quickly recover
    a dropped table. As of Oracle 10g, when you drop a table, if you don’t specify
    the `PURGE` clause, Oracle doesn’t drop the table—instead, the table is renamed.
    Any tables you drop (that Oracle renames) are placed in the recycle bin. The recycle
    bin provides you with an efficient way to view and manage dropped objects.


    ![Image](images/sq.jpg) **Note**  To use the Flashback Table feature, you don’t
    need to implement an FRA, nor do you need Flashback Database to be enabled.


    The `FLASHBACK TABLE TO BEFORE DROP` operation only works if your database has
    the recycle bin feature enabled (which it is by default). You can check the status
    of the recycle bin, as follows:


    ```

    SQL> show parameter recyclebin


    NAME                                 TYPE        VALUE

    ------------------------------------ ----------- -------

    recyclebin                           string      on

    ```


    FLASHBACK TABLE TO BEFORE DROP


    When you drop a table, if you don’t specify the `PURGE` clause, Oracle renames
    the table with a system-generated name. Because the table isn’t really dropped,
    you can use `FLASHBACK TABLE TO BEFORE DROP` to instruct Oracle to rename the
    table with its original name. Here is an example. Suppose the `INV` table is accidentally
    dropped:


    ```

    SQL> drop table inv;

    ```


    Verify that the table has been renamed by viewing the contents of the recycle
    bin:


    ```

    SQL> show recyclebin;

    ORIGINAL NAME    RECYCLEBIN NAME                OBJECT TYPE  DROP TIME

    ---------------- ------------------------------ ------------ -----------

    INV      BIN$BCRjF6KSbi/gU7fQTwrP+Q==$0 TABLE   2014-09-28:11:26:15

    ```


    The `SHOW RECYCLEBIN` statement shows only tables that have been dropped. To get
    a more complete picture of renamed objects, query the `RECYCLEBIN` view:


    ```

    SQL> select object_name, original_name, type from recyclebin;

    ```


    Here is the output:


    ```

    OBJECT_NAME                              ORIGINAL_NAME        TYPE

    ---------------------------------------- -------------------- ----------

    BIN$BCRjF6KSbi/gU7fQTwrP+Q==$0           INV                  TABLE

    BIN$BCRjF6KRbi/gU7fQTwrP+Q==$0           INV_TRIG             TRIGGER

    BIN$BCRjF6KQbi/gU7fQTwrP+Q==$0           INV_PK               INDEX

    ```


    In this output the table also has a primary key that was renamed when the object
    was dropped. To undrop the table, do this:


    ```

    SQL> flashback table inv to before drop;

    ```


    The prior command restores the table to its original name. This statement, however,
    doesn’t restore the index to its original name:


    ```

    SQL> select index_name from user_indexes where table_name=''INV'';


    INDEX_NAME


    BIN$BCRjF6KQbi/gU7fQTwrP+Q==$0

    ```


    In this scenario, you have to rename the index:


    ```

    SQL> alter index "BIN$BCRjF6KQbi/gU7fQTwrP+Q==$0" rename to inv_pk;

    ```


    You also have to rename any trigger objects in the same manner. If referential
    constraints were in place before the table was dropped, you must manually re-create
    them.


    If, for some reason, you need to flash back a table to a name different from the
    original name, you can do so as follows:


    ```

    SQL> flashback table inv to before drop rename to inv_bef;

    ```


    Flashing Back a Table to a Previous Point in Time


    If a table was erroneously deleted from, you have the option of flashing back
    the table to a previous point in time. The Flashback Table feature uses information
    in the undo tablespace to restore the table. The point in time in the past depends
    on your undo tablespace retention period, which specifies the minimum time that
    undo information is kept.


    If the required flashback information isn’t in the undo tablespace, you receive
    an error such as this:


    ```

    ORA-01555: snapshot too old

    ```


    In other words, to be able to flash back to a point in time in the past, the required
    information in the undo tablespace must not have been overwritten.


    FLASHBACK TABLE TO SCN


    Suppose you’re testing an application feature, and you want to quickly restore
    a table back to a specific SCN. As part of the application testing, you record
    the SCN before testing begins:


    ```

    SQL> select current_scn from v$database;


    CURRENT_SCN


    ```


    You perform some testing and then want to flash back the table to the SCN previously
    recorded. First, ensure that row movement is enabled for the table:


    ```

    SQL> alter table inv enable row movement;

    SQL> flashback table inv to scn 4760089;

    ```


    The table should now reflect transactions that were committed as of the historical
    SCN value specified in the `FLASHBACK` statement.


    FLASHBACK TABLE TO TIMESTAMP'
