    \    ALTER TABLESPACE TEMP ADD TEMPFILE '/ora01/dbfile/DEVDB/temp01.dbf'\n   \
    \      SIZE 104857600  REUSE AUTOEXTEND OFF;\n    ```\n\n![Image](images/sq.jpg) **Tip**  You\
    \ can also use the `NID` utility to change the database name and database identifier\
    \ (DBID). See MOS note 863800.1 for more details.\n\nSummary\n\nRMAN is an acronym\
    \ for Recovery Manager. It’s worth noting that Oracle did not name this tool Backup\
    \ Manager. The Oracle team recognized that although backups are important, the\
    \ real value of a B&R tool is its ability to restore and recover the database.\
    \ Being able to manage the recovery process is the critical skill. When a database\
    \ is damaged and needs to be restored, everybody looks to the DBA to perform a\
    \ smooth and speedy recovery of the database. Oracle DBAs should use RMAN to protect,\
    \ secure, and ensure the availability of the company’s data assets.\n\nThe restore-and-recovery\
    \ process is analogous to the healing process involved when you break a bone.\
    \ Restoring data files from a backup and placing them in their original directories\
    \ can be likened to setting a bone back to its original position. Recovering a\
    \ data file is similar to the healing of a broken bone—returning the bone back\
    \ to the state it was in before it was broken. When you recover data files, you\
    \ apply transactions (obtained from archive redo and online redo) to transform\
    \ the restored data files back to the state they were in before the media failure\
    \ occurred.\n\nRMAN can be used for any type of restore-and-recovery scenario.\
    \ Depending on the situation, RMAN can be used to restore the entire database,\
    \ specific data files, control files, server parameter files, archive redo logs,\
    \ or just specific data blocks. You can instruct RMAN to perform a complete or\
    \ an incomplete recovery.\n\nThe last section in this chapter details how to use\
    \ RMAN to restore and recover a database to a remote server. I recommend that\
    \ you periodically attempt this type of recovery in order to exercise your B&R\
    \ strategy. You will gain much confidence and fully understand B&R internals once\
    \ you can successfully restore a database to a server that is different from the\
    \ original.\n\nCHAPTER 7\n\n![image](images/frontdot.jpg)\n\nHandling Online Redo\
    \ Log Failures\n\nI worked for a company that had just implemented an expensive\
    \ database server with redundancy built into every component, or so I thought.\
    \ The server was configured with RAID disks for all database files and the online\
    \ redo log groups. The team was confident that there was minimal risk of failure\
    \ with these disks.\n\nTherefore, I decided not to multiplex the online redo log\
    \ groups. A few days later, an inexpensive battery that maintained the cache for\
    \ a disk controller failed. This caused corruption in the current online redo\
    \ log group. As a result, the company lost data, experienced costly downtime,\
    \ and had to perform an incomplete recovery.\n\nAs detailed in [Chapter 2](#9781484207642_Ch02.xhtml),\
    \ online redo logs are crucial database files that store a record of transactions\
    \ that have occurred in your database. Since RMAN doesn’t back up online redo\
    \ log files, you can’t use RMAN to restore these critical files. Given their criticality,\
    \ I thought it was important to include a chapter on how to deal with failures\
    \ with online redo log files.\n\nMedia failures with the online redo logs are\
    \ usually noticed either when the database ceases to work (all members of a group\
    \ have experienced media failure) or you notice an error in the alert.log indicating\
    \ issues, for example:\n\n```\nORA-00312: online log 3 thread 1: '/u01/oraredo/O12C/redo02b.rdo'\n\
    ```\n\nOnce you’ve discovered an issue, the first step is to determine how to\
    \ recover from this failure.\n\n![Image](images/sq.jpg) **Tip**  Use the RMAN\
    \ `backup database plus archivelog` command to ensure your current online redo\
    \ log files (of all the threads) are switched and archived before and after the\
    \ backup of the database.\n\nDetermining a Course of Action\n\nIf you’ve experienced\
    \ a problem with your online redo log files and need to determine what shape they\
    \ are in and what action to take. Follow these steps when dealing with online\
    \ redo log file failures:"
  trans: "\n你可以运行 `REPORT SCHEMA` 命令来验证所有文件是否位于正确的位置。\n\n## 步骤 16. 重命名数据库\n\n此步骤是可选的。如果你需要重命名数据库以反映开发或测试数据库的名称，请创建一个包含\
    \ `CREATE CONTROLFILE` 语句的跟踪文件，并用它来重命名你的数据库。\n\n![Image](img/sq.jpg) `提示` 如果你不重命名数据库，请注意对同一恢复目录执行的连接和重新同步操作（该目录由原始/源数据库使用）。这会导致恢复目录混淆哪个是真正的源数据库，并可能危及你恢复和还原真正源数据库的能力。\n\
    \n重命名数据库的步骤如下：\n\n### 1. 生成跟踪文件\n\n生成一个包含重新创建控制文件的 SQL 命令的跟踪文件：\n\n```sql\nSQL>\
    \ alter database backup controlfile to trace as '/tmp/cf.sql' resetlogs;\n```\n\
    \n### 2. 关闭数据库\n\n关闭数据库：\n\n```sql\nSQL> shutdown immediate;\n```\n\n### 3. 修改跟踪文件\n\
    \n修改 `/tmp/cf.sql` 跟踪文件；确保在输出的开头一行中指定 `SET DATABASE \"<新数据库名称>\"`：\n\n```sql\n\
    CREATE CONTROLFILE REUSE SET DATABASE \"DEVDB\" RESETLOGS ARCHIVELOG\n    MAXLOGFILES\
    \ 16\n    MAXLOGMEMBERS 4\n    MAXDATAFILES 1024\n    MAXINSTANCES 1\n    MAXLOGHISTORY\
    \ 876\nLOGFILE\n  GROUP 1 (\n    '/ora01/oraredo/DEVDB/redo01a.rdo',\n    '/ora01/oraredo/DEVDB/redo01b.rdo'\n\
      ) SIZE 50M BLOCKSIZE 512,\n  GROUP 2 (\n    '/ora01/oraredo/DEVDB/redo02a.rdo',\n\
        '/ora01/oraredo/DEVDB/redo02b.rdo'\n  ) SIZE 50M BLOCKSIZE 512,\n  GROUP 3\
    \ (\n    '/ora01/oraredo/DEVDB/redo03a.rdo',\n    '/ora01/oraredo/DEVDB/redo03b.rdo'\n\
      ) SIZE 50M BLOCKSIZE 512\nDATAFILE\n  '/ora01/dbfile/DEVDB/system01.dbf',\n\
      '/ora01/dbfile/DEVDB/sysaux01.dbf',\n  '/ora01/dbfile/DEVDB/undotbs01.dbf',\n\
      '/ora01/dbfile/DEVDB/users01.dbf'\nCHARACTER SET AL32UTF8;\n```\n\n![Image](img/sq.jpg)\
    \ `注意` 如果你在前面的脚本开头没有指定 `SET DATABASE`，那么当你运行该脚本时（如本示例后面所示），你会收到类似这样的错误：`ORA-01161:\
    \ database name ... in file header does not match`。\n\n### 4. 创建新的 init.ora 文件\n\
    \n创建一个与新数据库名称匹配的 `init.ora` 文件：\n\n```bash\n$ cd $ORACLE_HOME/dbs\n$ cp init<旧\
    \ _sid>.ora init<新 _sid>.ora\n$ cp inito12c.ora initDEVDB.ora\n```\n\n### 5. 修改\
    \ DB_NAME 变量\n\n在新的 `init.ora` 文件中修改 `DB_NAME` 变量（在本示例中，它被设置为 `DEVDB`）：\n\n```bash\n\
    db_name='DEVDB'\n```\n\n### 6. 设置 ORACLE_SID 变量\n\n设置 `ORACLE_SID` 操作系统变量以反映新的\
    \ `SID` 名称（在本示例中，它被设置为 `DEVDB`）：\n\n```bash\n$ echo $ORACLE_SID\nDEVDB\n```\n\n\
    ### 7. 启动实例\n\n以 nomount 模式启动实例：\n\n```sql\nSQL> startup nomount;\n```\n\n###\
    \ 8. 运行跟踪文件\n\n运行跟踪文件（来自步骤 2）以重新创建控制文件：\n\n```sql\nSQL> @/tmp/cf.sql\n```\n\n\
    ![Image](img/sq.jpg) `注意` 在本示例中，控制文件已存在于 `CONTROL_FILES` 初始化参数指定的位置；因此，在 `CREATE\
    \ CONTROL FILE` 语句中使用了 `REUSE` 参数。\n\n### 9. 打开数据库\n\n使用 `OPEN RESETLOGS` 打开数据库：\n\
    \n```sql\nSQL> alter database open resetlogs;\n```\n\n如果成功，你将拥有一个原始数据库的副本数据库。所有的数据文件、控制文件、归档重做日志和联机重做日志都位于新位置，并且数据库具有新的名称。\n\
    \n### 10. 确保临时表空间存在\n\n作为最后一步，确保你的临时表空间存在：\n\n```sql\nALTER TABLESPACE TEMP ADD\
    \ TEMPFILE '/ora01/dbfile/DEVDB/temp01.dbf'\n     SIZE 104857600  REUSE AUTOEXTEND\
    \ OFF;\n```\n\n![Image](img/sq.jpg) `提示` 你也可以使用 `NID` 工具来更改数据库名称和数据库标识符 (DBID)。更多详情请参阅\
    \ MOS 笔记 863800.1。\n\n## 总结\n\nRMAN 是 Recovery Manager（恢复管理器）的首字母缩写。值得注意的是，Oracle\
    \ 并未将此工具命名为 Backup Manager（备份管理器）。Oracle 团队认识到，尽管备份很重要，但 B&R（备份与恢复）工具的真正价值在于其恢复和还原数据库的能力。能够管理恢复过程是关键技能。当数据库损坏需要还原时，所有人都会指望\
    \ DBA 来执行平稳快速的数据库恢复。Oracle DBA 应该使用 RMAN 来保护、确保公司数据资产的安全和可用性。\n\n还原和恢复过程类似于骨折后的愈合过程。从备份还原数据文件并将其放回原始目录，可以比作将骨头复位到原始位置。恢复数据文件类似于骨折的愈合——将骨头恢复到断裂前的状态。当你恢复数据文件时，你应用事务（从归档重做和联机重做中获取）将还原的数据文件转换回介质故障发生前的状态。\n\
    \nRMAN 可用于任何类型的还原和恢复场景。根据具体情况，RMAN 可用于还原整个数据库、特定数据文件、控制文件、服务器参数文件、归档重做日志，或仅还原特定的数据块。你可以指示\
    \ RMAN 执行完全恢复或不完全恢复。\n\n本章最后一节详细介绍了如何使用 RMAN 将数据库还原和恢复到远程服务器。我建议你定期尝试这种类型的恢复，以演练你的\
    \ B&R 策略。一旦你能够成功地将数据库还原到与原始服务器不同的服务器上，你将获得极大的信心并完全理解 B&R 的内部机制。\n\n# 第 7 章\n\n\
    ![image](img/frontdot.jpg)\n\n## 处理联机重做日志故障\n\n我曾为一家公司工作，该公司刚刚实施了一台昂贵的数据库服务器，其每个组件都内置了冗余，至少我是这么认为的。服务器配置了用于所有数据库文件和联机重做日志组的\
    \ RAID 磁盘。团队确信这些磁盘的故障风险极小。\n\n因此，我决定不对联机重做日志组进行多路复用。几天后，一个用于维持磁盘控制器缓存的廉价电池失效了。这导致当前的联机重做日志组损坏。结果，公司丢失了数据，经历了代价高昂的停机时间，并且不得不执行不完全恢复。\n\
    \n如第 2 章所述，联机重做日志是关键的数据库文件，记录了数据库中发生的所有事务。由于 RMAN 不备份联机重做日志文件，你无法使用 RMAN 来还原这些关键文件。考虑到它们的重要性，我认为有必要专门用一章来讨论如何处理联机重做日志文件的故障。\n\
    \n联机重做日志的介质故障通常在以下情况下被发现：数据库停止工作（某个组的所有成员都经历了介质故障），或者你在 `alert.log` 中注意到指示问题的错误，例如：\n\
    \n```\nORA-00312: online log 3 thread 1: '/u01/oraredo/O12C/redo02b.rdo'\n```\n\
    \n一旦发现问题，第一步就是确定如何从此故障中恢复。\n\n![Image](img/sq.jpg) `提示` 使用 RMAN 的 `backup database\
    \ plus archivelog` 命令，确保在备份数据库之前和之后，你当前的联机重做日志文件（所有线程的）都已切换并归档。\n\n### 确定行动方案\n\
    \n如果你遇到了联机重做日志文件的问题，并需要确定它们的状况以及采取什么行动。处理联机重做日志文件故障时，请遵循以下步骤：\n"
- fmt: "# 重做日志故障诊断\n\n## 故障诊断步骤\n\n1.  检查 `alert.log` 文件，以确定哪些联机重做日志文件经历了介质故障。\n2.\
    \  查询 `V$LOG` 和 `V$LOGFILE` 以确定日志组的状态和镜像程度。\n3.  如果镜像组中仍有一个正常运行的成员，请参阅本章中关于“丢失镜像组中一个成员后的恢复”部分，了解如何修复故障成员的详细信息。\n\
    4.  根据日志组的状态，使用 [表 7-1](#9781484207642_Ch07.xhtml#Tab1) 来确定应采取的操作。\n\n[表 7-1](#9781484207642_Ch07.xhtml#_Tab1).\
    \ 确定应采取的操作\n\n![Table7-1](images/Table7-1.jpg)\n\n检查目标数据库的 `alert.log` 文件，以确定哪个联机重做日志文件成员不可用。与联机重做日志文件故障相关的\
    \ Oracle 错误消息是 `ORA-00312` 和 `ORA-00313`。以下是在联机重做日志文件出现问题时写入 `alert.log` 文件的错误示例：\n\
    \n```\nORA-00313: open failed for members of log group 2 of thread 1\nORA-00312:\
    \ online log 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\n```\n\n查询 `V$LOG` 和\
    \ `V$LOGFILE` 视图以确定日志组的状态以及每组中的成员文件：\n\n```\nSELECT\n a.group#\n,a.thread#\n,a.status\
    \ grp_status\n,b.member member\n,b.status mem_status\n,a.bytes/1024/1024 mbytes\n\
    FROM v$log     a,\n     v$logfile b\nWHERE a.group# = b.group#\nORDER BY a.group#,\
    \ b.member;\n```\n\n以下是一些示例输出：\n\n```\nGROUP#  THREAD# GRP_STATUS MEMBER     \
    \                    MEM_STA   MBYTES\n------ -------- ---------- ------------------------------\
    \ ------- --------\n     1        1 INACTIVE   /u01/oraredo/O12C/redo01a.rdo \
    \               50\n     1        1 INACTIVE   /u02/oraredo/O12C/redo01b.rdo \
    \               50\n     2        1 CURRENT    /u01/oraredo/O12C/redo02a.rdo \
    \               50\n     2        1 CURRENT    /u02/oraredo/O12C/redo02b.rdo \
    \               50\n     3        1 INACTIVE   /u01/oraredo/O12C/redo03a.rdo \
    \               50\n     3        1 INACTIVE   /u02/oraredo/O12C/redo03b.rdo \
    \               50\n```\n\n如果镜像组中只有一个成员经历了故障，那么请继续阅读“丢失镜像组中一个成员后的恢复”部分。如果重做日志组的所有成员都经历了故障，并且您的数据库是打开的，那么一旦后台归档进程无法成功复制故障的联机重做日志文件成员，它就会挂起（停止处理事务）。如果您的数据库是关闭的，并且所有成员中有一个联机重做日志组的所有成员都经历了介质故障，Oracle\
    \ 将不允许您打开它。当您尝试打开数据库时，您会看到类似以下消息：\n\n```\nORA-00313: open failed for members of\
    \ log group...\n```\n\n根据为故障组在 `V$LOG` 中报告的状态，使用 [表 7-1](#9781484207642_Ch07.xhtml#Tab1)\
    \ 来确定应采取的操作。\n\n目标数据库的 `alert.log` 文件包含确定发生了何种类型故障的最佳信息。如果镜像组中只有一个成员故障，那么您只能通过检查\
    \ alert.log 文件来检测到这一点。您也可以尝试停止并启动数据库。如果一个组的所有成员都经历了介质故障，那么 Oracle 将不允许您打开数据库，并会显示\
    \ ORA-00313 错误消息。\n\n`alert.log` 文件还会告知您其他错误消息已写入跟踪文件的位置：\n\n```\nAdditional information:\
    \ 3\nChecker run found 1 new persistent data failures\nErrors in file /u01/app/oracle/diag/rdbms/o12C/O12C/trace/O12C_lgwr_10531.trc:\n\
    ```\n\n在诊断联机重做日志问题时，`V$LOG`、`V$LOGFILE` 和 `V$LOG_HISTORY` 视图特别有用。您可以在数据库已装载或打开时查询这些视图。[表\
    \ 7-2](#9781484207642_Ch07.xhtml#Tab2) 简要描述了每个视图。\n\n[表 7-2](#9781484207642_Ch07.xhtml#_Tab2).\
    \ 与联机重做日志相关的有用视图"
  raw: '1.  Inspect the `alert.log` file to determine which online redo log files
    have experienced a media failure.

    2.  Query `V$LOG` and `V$LOGFILE` to determine the status of the log group and
    degree of multiplexing.

    3.  If there is still one functioning member of a multiplexed group, then see
    the section of this chapter on “Restoring After Losing One Member of Multiplexed
    Group” for details on how to fix a failed member(s).

    4.  Depending on the status of the log group, use [Table 7-1](#9781484207642_Ch07.xhtml#Tab1)
    to determine what action to take.


    [Table 7-1](#9781484207642_Ch07.xhtml#_Tab1). Determining the Action to Take


    ![Table7-1](images/Table7-1.jpg)


    Inspect your target database `alert.log` file to determine which online redo log
    file member is unavailable. Oracle error messages related to online redo log file
    failures are `ORA-00312` and `ORA-00313`. Here’s an example of errors written
    to the `alert.log` file when there are problems with an online redo log file:


    ```

    ORA-00313: open failed for members of log group 2 of thread 1

    ORA-00312: online log 2 thread 1: ''/u02/oraredo/O12C/redo02b.rdo''

    ```


    Query `V$LOG` and `V$LOGFILE` views to determine the status of your log group
    and the member files in each group:


    ```

    SELECT

     a.group#

    ,a.thread#

    ,a.status grp_status

    ,b.member member

    ,b.status mem_status

    ,a.bytes/1024/1024 mbytes

    FROM v$log     a,

         v$logfile b

    WHERE a.group# = b.group#

    ORDER BY a.group#, b.member;

    ```


    Here is some sample output:


    ```

    GROUP#  THREAD# GRP_STATUS MEMBER                         MEM_STA   MBYTES

    ------ -------- ---------- ------------------------------ ------- --------

         1        1 INACTIVE   /u01/oraredo/O12C/redo01a.rdo                50

         1        1 INACTIVE   /u02/oraredo/O12C/redo01b.rdo                50

         2        1 CURRENT    /u01/oraredo/O12C/redo02a.rdo                50

         2        1 CURRENT    /u02/oraredo/O12C/redo02b.rdo                50

         3        1 INACTIVE   /u01/oraredo/O12C/redo03a.rdo                50

         3        1 INACTIVE   /u02/oraredo/O12C/redo03b.rdo                50

    ```


    If only one member of a multiplexed group has experienced a failure, then proceed
    to the section on “Restoring After Losing One Member of Multiplexed Group”. If
    all members of a redo log group have experienced a failure and your database is
    open, it will hang (cease to allow transactions to process) as soon as the archiver
    background process cannot successfully copy the failed online redo log file members.
    If your database is closed, Oracle will not allow you to open it if all members
    of one online redo log group are experiencing a media failure. When you attempt
    to open your database, you’ll see a message similar to this:


    ```

    ORA-00313: open failed for members of log group...

    ```


    Depending on the status reported in `V$LOG` for the failed group, use [Table 7-1](#9781484207642_Ch07.xhtml#Tab1)
    to determine what action to take.


    Your target database’s `alert.log` file contains the best information for determining
    what type of failure has occurred. If only one member of a multiplexed group fails,
    then you will be able to detect this only by inspecting the alert.log file. You
    can also try to stop and start your database. If all members of a group have experienced
    media failure, then Oracle will not let you open the database and will display
    an ORA-00313 error message.


    The `alert.log` file will also tell you where additional error messages have been
    written to trace files:


    ```

    Additional information: 3

    Checker run found 1 new persistent data failures

    Errors in file /u01/app/oracle/diag/rdbms/o12C/O12C/trace/O12C_lgwr_10531.trc:

    ```


    When diagnosing online redo log issues, the `V$LOG`, `V$LOGFILE`, and `V$LOG_HISTORY`
    views are particularly helpful. You can query these views while the database is
    mounted or open. [Table 7-2](#9781484207642_Ch07.xhtml#Tab2) briefly describes
    each view.


    [Table 7-2](#9781484207642_Ch07.xhtml#_Tab2). Useful Views Related to Online Redo
    Logs'
  trans: "\n# 重做日志故障诊断\n\n## 故障诊断步骤\n\n1.  检查 `alert.log` 文件，以确定哪些联机重做日志文件经历了介质故障。\n\
    2.  查询 `V$LOG` 和 `V$LOGFILE` 以确定日志组的状态和镜像程度。\n3.  如果镜像组中仍有一个正常运行的成员，请参阅本章中关于“丢失镜像组中一个成员后的恢复”部分，了解如何修复故障成员的详细信息。\n\
    4.  根据日志组的状态，使用 表 7-1 来确定应采取的操作。\n\n表 7-1. 确定应采取的操作\n\n![Table7-1](img/Table7-1.jpg)\n\
    \n检查目标数据库的 `alert.log` 文件，以确定哪个联机重做日志文件成员不可用。与联机重做日志文件故障相关的 Oracle 错误消息是 `ORA-00312`\
    \ 和 `ORA-00313`。以下是在联机重做日志文件出现问题时写入 `alert.log` 文件的错误示例：\n\n```\nORA-00313: open\
    \ failed for members of log group 2 of thread 1\nORA-00312: online log 2 thread\
    \ 1: '/u02/oraredo/O12C/redo02b.rdo'\n```\n\n查询 `V$LOG` 和 `V$LOGFILE` 视图以确定日志组的状态以及每组中的成员文件：\n\
    \n```\nSELECT\n a.group#\n,a.thread#\n,a.status grp_status\n,b.member member\n\
    ,b.status mem_status\n,a.bytes/1024/1024 mbytes\nFROM v$log     a,\n     v$logfile\
    \ b\nWHERE a.group# = b.group#\nORDER BY a.group#, b.member;\n```\n\n以下是一些示例输出：\n\
    \n```\nGROUP#  THREAD# GRP_STATUS MEMBER                         MEM_STA   MBYTES\n\
    ------ -------- ---------- ------------------------------ ------- --------\n \
    \    1        1 INACTIVE   /u01/oraredo/O12C/redo01a.rdo                50\n \
    \    1        1 INACTIVE   /u02/oraredo/O12C/redo01b.rdo                50\n \
    \    2        1 CURRENT    /u01/oraredo/O12C/redo02a.rdo                50\n \
    \    2        1 CURRENT    /u02/oraredo/O12C/redo02b.rdo                50\n \
    \    3        1 INACTIVE   /u01/oraredo/O12C/redo03a.rdo                50\n \
    \    3        1 INACTIVE   /u02/oraredo/O12C/redo03b.rdo                50\n```\n\
    \n如果镜像组中只有一个成员经历了故障，那么请继续阅读“丢失镜像组中一个成员后的恢复”部分。如果重做日志组的所有成员都经历了故障，并且您的数据库是打开的，那么一旦后台归档进程无法成功复制故障的联机重做日志文件成员，它就会挂起（停止处理事务）。如果您的数据库是关闭的，并且所有成员中有一个联机重做日志组的所有成员都经历了介质故障，Oracle\
    \ 将不允许您打开它。当您尝试打开数据库时，您会看到类似以下消息：\n\n```\nORA-00313: open failed for members of\
    \ log group...\n```\n\n根据为故障组在 `V$LOG` 中报告的状态，使用 表 7-1 来确定应采取的操作。\n\n目标数据库的 `alert.log`\
    \ 文件包含确定发生了何种类型故障的最佳信息。如果镜像组中只有一个成员故障，那么您只能通过检查 alert.log 文件来检测到这一点。您也可以尝试停止并启动数据库。如果一个组的所有成员都经历了介质故障，那么\
    \ Oracle 将不允许您打开数据库，并会显示 ORA-00313 错误消息。\n\n`alert.log` 文件还会告知您其他错误消息已写入跟踪文件的位置：\n\
    \n```\nAdditional information: 3\nChecker run found 1 new persistent data failures\n\
    Errors in file /u01/app/oracle/diag/rdbms/o12C/O12C/trace/O12C_lgwr_10531.trc:\n\
    ```\n\n在诊断联机重做日志问题时，`V$LOG`、`V$LOGFILE` 和 `V$LOG_HISTORY` 视图特别有用。您可以在数据库已装载或打开时查询这些视图。表\
    \ 7-2 简要描述了每个视图。\n\n表 7-2. 与联机重做日志相关的有用视图\n"
- fmt: "# V$LOG、V$LOGFILE 和 V$LOG_HISTORY 视图\n| View | Description |\n| --- | ---\
    \ |\n| `V$LOG` | Displays the online redo log group information stored in the\
    \ control file. |\n| `V$LOGFILE` | Displays online redo log file member information.\
    \ |\n| `V$LOG_HISTORY` | History of online redo log information in control file.\
    \ |\n\n`V$LOG` 视图的 `STATUS` 列在使用在线重做日志组时特别有用。[Table 7-3](#9781484207642_Ch07.xhtml#Tab3)\
    \ 描述了 `V$LOG` 视图中的每个状态及其含义。\n\n## Table 7-3. Status for Online Redo Log Groups\
    \ in the `V$LOG` View\n\n| Status | Meaning |\n| --- | --- |\n| `CURRENT` | The\
    \ log group that is currently being written to by the log writer. |\n| `ACTIVE`\
    \ | The log group is required for crash recovery and may or may not have been\
    \ archived. |\n| `CLEARING` | The log group is being cleared out by an `alter\
    \ database clear logfile` command. |\n| `CLEARING_CURRENT` | The current log group\
    \ is being cleared of a closed thread. |\n| `INACTIVE` | The log group isn’t needed\
    \ for crash recovery and may or may not have been archived. |\n| `UNUSED` | The\
    \ log group has never been written to; it was recently created. |\n\n`V$LOGFILE`\
    \ 视图的 `STATUS` 列也包含有用的信息。此视图包含有关日志组中每个物理在线重做日志文件成员的信息。[Table 7-4](#9781484207642_Ch07.xhtml#Tab4)\
    \ 提供了每个日志文件成员状态的描述。\n\n## Table 7-4. Status for Online Redo Log File Members in\
    \ the `V$LOGFILE` View\n\n| Status | Meaning |\n| --- | --- |\n| `INVALID` | The\
    \ log file member is inaccessible, or it has been recently created. |\n| `DELETED`\
    \ | The log file member is no longer in use. |\n| `STALE` | The log file member’s\
    \ contents are not complete. |\n| `NULL` | The log file member is being used by\
    \ the database. |\n\n区分 `V$LOG` 中的 `STATUS` 列和 `V$LOGFILE` 中的 `STATUS` 列很重要。`V$LOG`\
    \ 中的 `STATUS` 列反映的是日志组的状态。`V$LOGFILE` 中的 `STATUS` 列报告的是物理在线重做日志文件成员的状态。\n\n# Restoring\
    \ After Losing One Member of Multiplexed Group\n\n假设你在 `alert.log` 文件中看到此消息：\n\
    ```\nORA-00312: online log 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\n```\n\n\
    你知道此组是多路复用的，但只看到其中一个成员出错。如果你的在线重做日志文件成员是多路复用的，只要日志写入器能够成功写入当前日志组的一个成员，它就会继续运行。如果问题是暂时的，那么一旦在线重做日志文件变得可用，日志写入器就会开始写入该文件，就像从未发生过问题一样。\n\
    \n如果介质故障是永久性的（例如磁盘损坏），那么你需要更换磁盘并删除并重新创建损坏的成员到其原始位置。如果你没有更换损坏磁盘的选项，那么你需要删除损坏的成员并在替代位置重新创建它。\n\
    \n对于永久性介质故障，请按照以下说明删除并重新创建在线重做日志组的一个成员：\n1.  识别发生介质故障的在线重做日志文件（检查 `alert.log`）。\n\
    2.  确保该在线重做日志文件不是当前在线日志组的一部分。\n3.  删除损坏的成员。\n4.  向该组添加一个新成员。\n\n首先，打开你的 `alert.log`\
    \ 文件，查找标识日志组中哪个成员发生介质故障的 `ORA-00312` 消息。你应该在 `alert.log` 文件中看到类似以下的内容：\n```\n\
    ORA-00312: online log 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\nErrors in file\n\
    /u01/app/oracle/diag/rdbms/o12C/O12C/trace/O12C_lgwr_10531.trc:\n```\n\n此消息告诉你哪个日志成员已失效。`alert.log`\
    \ 文件输出还指定了已生成一个跟踪文件。你将在指定的跟踪文件中找到有关损坏成员的更多信息：\n```\nORA-00313: open failed for\
    \ members of log group 2 of thread 1\nORA-00312: online log 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\n\
    ORA-27037: unable to obtain file status\nLinux-x86_64 Error: 2: No such file or\
    \ directory\nORA-00321: log 2 of thread 1, cannot update log file header\nORA-00312:\
    \ online log 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\n```\n\n从前面的输出可以看出，在线重做日志组\
    \ 2 的一个成员出现问题。一旦识别出损坏的在线重做日志文件，请执行以下查询以检查该在线重做日志文件的组是否具有 `CURRENT` 状态（在此示例中，我们关注组\
    \ 2）：\n```\nSELECT group#, status, archived, thread#, sequence#\nFROM v$log;\n\
    ```\n\n以下是一些示例输出，表明组 2 不是当前日志：\n```\n    GROUP# STATUS           ARC    THREAD#\
    \  SEQUENCE#\n---------- ---------------- --- ---------- ----------\n        \
    \ 1 CURRENT          NO           1         25\n         3 INACTIVE         NO\
    \           1         24\n         2 INACTIVE         NO           1         23\n\
    ```\n\n`Note` 如果你尝试删除当前日志组的成员，Oracle 将抛出 ORA-01609 错误，指明该日志是当前的，你不能删除其成员。\n\n\
    如果失效的成员位于当前日志组中，则使用 `alter system switch logfile` 命令使下一个组成为当前组。然后按如下方式删除失效的成员：\n\
    ```\nSQL> alter database drop logfile member '/u02/oraredo/O12C/redo02b.rdo';\n\
    ```\n\n然后重新创建在线重做日志文件成员：\n```\nSQL> alter database add logfile member '/u02/oraredo/O12C/redo02b.rdo'\n\
    \     to group 2;\n```\n\n请记住，前面的命令是示例，你必须为你的环境指定目录、日志文件成员文件和组号。\n\n如果目标位置已经存在一个未使用的日志文件，你可以使用\
    \ `reuse` 参数来覆盖并重用该日志文件。该日志文件必须与组中的其他日志文件大小相同：\n```\nSQL> alter database add logfile\
    \ member '</directory/file_name>' reuse\n     to group <group#>;\n```\n\n如前所述，只要\
    \ Oracle 能够写入多路复用重做日志组的至少一个成员，它就会继续运行。当日志写入器无法写入当前在线重做日志文件时，错误消息将写入 `alert.log`\
    \ 文件。\n\n你应该定期检查你的 `alert.log` 文件中的 Oracle 错误。这可能是你发现组成员发生介质故障的唯一方式。我建议你运行一个定期批处理作业，搜索\
    \ `alert.log` 文件中的任何错误，并在发现潜在问题时自动通知你。\n\n一旦识别出在线重做日志组中的损坏成员，你就可以删除并重新创建在线重做日志文件。新创建的在线重做日志文件在\
    \ `V$LOGFILE` 中可能显示 `INVALID` 状态，直到它成为 `CURRENT` 日志组的一部分。一旦新创建的成员成为 `CURRENT`\
    \ 日志组的一部分，其状态应更改为 `NULL`。`NULL` 成员状态（如 [Table 7-4](#9781484207642_Ch07.xhtml#Tab4)\
    \ 所述）表示数据库正在使用该在线重做日志文件。\n\n你可以在数据库处于挂载（`MOUNTED`）状态或打开（`OPEN`）状态时删除和添加在线重做日志文件成员。我建议在删除和重新创建日志成员时，让数据库处于挂载状态。这将确保在删除和重新创建成员期间，日志组的状态不会改变。你无法删除属于\
    \ `CURRENT` 组的在线重做日志文件成员。"
  raw: '| View | Description |

    | --- | --- |

    | V$LOG | Displays the online redo log group information stored in the control
    file. |

    | V$LOGFILE | Displays online redo log file member information. |

    | V$LOG_HISTORY | History of online redo log information in control file. |


    The `STATUS` column of the `V$LOG` view is particularly useful when working with
    online redo logs groups. [Table 7-3](#9781484207642_Ch07.xhtml#Tab3) describes
    each status and meaning for the `V$LOG` view.


    [Table 7-3](#9781484207642_Ch07.xhtml#_Tab3). Status for Online Redo Log Groups
    in the `V$LOG` View


    | Status | Meaning |

    | --- | --- |

    | CURRENT | The log group that is currently being written to by the log writer.
    |

    | ACTIVE | The log group is required for crash recovery and may or may not have
    been archived. |

    | CLEARING | The log group is being cleared out by an alter database clear logfile
    command. |

    | CLEARING_CURRENT | The current log group is being cleared of a closed thread.
    |

    | INACTIVE | The log group isn’t needed for crash recovery and may or may not
    have been archived. |

    | UNUSED | The log group has never been written to; it was recently created. |


    The `STATUS` column of the `V$LOGFILE` view also contains useful information.
    This view contains information about each physical online redo log file member
    of a log group. [Table 7-4](#9781484207642_Ch07.xhtml#Tab4) provides descriptions
    of the status of each log file member.


    [Table 7-4](#9781484207642_Ch07.xhtml#_Tab4). Status for Online Redo Log File
    Members in the `V$LOGFILE` View


    | Status | Meaning |

    | --- | --- |

    | INVALID | The log file member is inaccessible, or it has been recently created.
    |

    | DELETED | The log file member is no longer in use. |

    | STALE | The log file member’s contents are not complete. |

    | NULL | The log file member is being used by the database. |


    It’s important to differentiate between the `STATUS` column in `V$LOG` and the
    `STATUS` column in `V$LOGFILE`. The `STATUS` column in `V$LOG` reflects the status
    of the log group. The `STATUS` column in `V$LOGFILE` reports the status of the
    physical online redo log file member.


    Restoring After Losing One Member of Multiplexed Group


    Suppose you notice this message in your `alert.log` file:


    ```

    ORA-00312: online log 2 thread 1: ''/u02/oraredo/O12C/redo02b.rdo''

    ```


    You know that this group is multiplexed but only see an error with one of the
    members of the group. If your online redo log file members are multiplexed, the
    log writer will continue to function as long as it can successfully write to one
    member of the current log group. If the problem is temporary, then as soon as
    the online redo log file becomes available, the log writer will start to write
    to the online redo log file as if there were never an issue.


    If the media failure is permanent (such as a bad disk), then you’ll need to replace
    the disk and drop and re-create the bad member to its original location. If you
    don’t have the option of replacing the bad disk, then you’ll need to drop the
    bad member and re-create it in an alternate location.


    For permanent media failures, follow these instructions for dropping and re-creating
    one member of an online redo log group:


    1.  Identify the online redo log file experiencing media failure (inspect the
    `alert.log`).

    2.  Ensure that the online redo log file is not part of the current online log
    group.

    3.  Drop the damaged member.

    4.  Add a new member to the group.


    To begin, open your `alert.log` file and look for an `ORA-00312` message that
    identifies which member of the log group is experiencing media failure. You should
    see lines similar to these in your `alert.log` file:


    ```

    ORA-00312: online log 2 thread 1: ''/u02/oraredo/O12C/redo02b.rdo''

    Errors in file

    /u01/app/oracle/diag/rdbms/o12C/O12C/trace/O12C_lgwr_10531.trc:

    ```


    This message tells you which log member has failed. The `alert.log` file output
    also specifies that a trace file has been generated. You’ll find additional information
    about the bad member in the specified trace file:


    ```

    ORA-00313: open failed for members of log group 2 of thread 1

    ORA-00312: online log 2 thread 1: ''/u02/oraredo/O12C/redo02b.rdo''

    ORA-27037: unable to obtain file status

    Linux-x86_64 Error: 2: No such file or directory

    ORA-00321: log 2 of thread 1, cannot update log file header

    ORA-00312: online log 2 thread 1: ''/u02/oraredo/O12C/redo02b.rdo''

    ```


    From the prior output, a member of the online redo log group 2 is having issues.
    Once you’ve identified the bad online redo log file, execute the following query
    to check whether that online redo log file’s group has a CURRENT status (in this
    example, we’re interested in group 2):


    ```

    SELECT group#, status, archived, thread#, sequence#

    FROM v$log;

    ```


    Here is some sample output indicating that group 2 is not the current log:


    ```

        GROUP# STATUS           ARC    THREAD#  SEQUENCE#

    ---------- ---------------- --- ---------- ----------

             1 CURRENT          NO           1         25

             3 INACTIVE         NO           1         24

             2 INACTIVE         NO           1         23

    ```


    ![Image](images/sq.jpg) **Note**  If you attempt to drop a member of a current
    log group, Oracle will throw an ORA-01609 error specifying that the log is current
    and you cannot drop one of its members.


    If the failed member is in the current log group, then use the `alter system switch
    logfile` command to make the next group the current group. Then drop the failed
    member as follows:


    ```

    SQL> alter database drop logfile member ''/u02/oraredo/O12C/redo02b.rdo'';

    ```


    Then re-create the online redo log file member:


    ```

    SQL> alter database add logfile member ''/u02/oraredo/O12C/redo02b.rdo''

         to group 2;

    ```


    Keep in mind that the prior commands are examples, and that you’ll have to specify
    the directory and logfile member file and group number for your environment.


    If an unused log file already happens to exist in the target location, you can
    use the `reuse` parameter to overwrite and reuse that log file. The log file must
    be the same size as the other log files in the group:


    ```

    SQL> alter database add logfile member ''</directory/file_name>'' reuse

         to group <group#>;

    ```


    As mentioned previously, Oracle will continue to operate as long as it can write
    to at least one member of a multiplexed redo log group. An error message will
    be written to the `alert.log` file when the log writer is unable to write to a
    current online redo log file.


    You should periodically inspect your `alert.log` file for Oracle errors. This
    may be the only way that you’ll discover a member of a group has experienced a
    media failure. I recommend that you run a periodic batch job that searches the
    `alert.log` file for any errors and automatically notifies you when it finds potential
    problems.


    Once you’ve identified the bad member of an online redo log group, then you can
    drop and re-create the online redo log file. The newly created online redo log
    file may display an `INVALID` status in `V$LOGFILE` until it becomes part of the
    `CURRENT` log group. Once the newly created member becomes part of the `CURRENT`
    log group, its status should change to `NULL`. A `NULL` member status (as described
    in [Table 7-4](#9781484207642_Ch07.xhtml#Tab4)) indicates that the database is
    using the online redo log file.


    You can drop and add online redo log file members while your database is in either
    a mounted state or an open state. I recommend that while dropping and re-creating
    log members, you have your database in a mounted state. This will ensure that
    the status of the log group doesn’t change while dropping and re-creating members.
    You cannot drop an online redo log file member that is part of the `CURRENT` group.'
  trans: "# V$LOG、V$LOGFILE 和 V$LOG_HISTORY 视图\n| 视图 | 描述 |\n| --- | --- |\n| `V$LOG`\
    \ | 显示存储在控制文件中的在线重做日志组信息。 |\n| `V$LOGFILE` | 显示在线重做日志文件成员信息。 |\n| `V$LOG_HISTORY`\
    \ | 控制文件中在线重做日志信息的历史记录。 |\n\n`V$LOG` 视图的 `STATUS` 列在使用在线重做日志组时特别有用。表 7-3 描述了 `V$LOG`\
    \ 视图中的每个状态及其含义。\n\n## 表 7-3. `V$LOG` 视图中的在线重做日志组状态\n\n| 状态 | 含义 |\n| --- | ---\
    \ |\n| `CURRENT` | 日志写入器当前正在写入的日志组。 |\n| `ACTIVE` | 崩溃恢复需要该日志组，并且可能已归档，也可能未归档。\
    \ |\n| `CLEARING` | 正在通过 `alter database clear logfile` 命令清除该日志组。 |\n| `CLEARING_CURRENT`\
    \ | 正在清除一个已关闭线程的当前日志组。 |\n| `INACTIVE` | 崩溃恢复不需要该日志组，并且可能已归档，也可能未归档。 |\n| `UNUSED`\
    \ | 该日志组从未被写入；它是最近创建的。 |\n\n`V$LOGFILE` 视图的 `STATUS` 列也包含有用的信息。此视图包含有关日志组中每个物理在线重做日志文件成员的信息。表\
    \ 7-4 提供了每个日志文件成员状态的描述。\n\n## 表 7-4. `V$LOGFILE` 视图中的在线重做日志文件成员状态\n\n| 状态 | 含义\
    \ |\n| --- | --- |\n| `INVALID` | 该日志文件成员不可访问，或是最近创建的。 |\n| `DELETED` | 该日志文件成员不再使用。\
    \ |\n| `STALE` | 该日志文件成员的内容不完整。 |\n| `NULL` | 该日志文件成员正被数据库使用。 |\n\n区分 `V$LOG`\
    \ 中的 `STATUS` 列和 `V$LOGFILE` 中的 `STATUS` 列很重要。`V$LOG` 中的 `STATUS` 列反映的是日志组的状态。`V$LOGFILE`\
    \ 中的 `STATUS` 列报告的是物理在线重做日志文件成员的状态。\n\n# 在丢失多路复用组的一个成员后进行恢复\n\n假设你在 `alert.log`\
    \ 文件中看到此消息：\n```\nORA-00312: online log 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\n\
    ```\n\n你知道此组是多路复用的，但只看到其中一个成员出错。如果你的在线重做日志文件成员是多路复用的，只要日志写入器能够成功写入当前日志组的一个成员，它就会继续运行。如果问题是暂时的，那么一旦在线重做日志文件变得可用，日志写入器就会开始写入该文件，就像从未发生过问题一样。\n\
    \n如果介质故障是永久性的（例如磁盘损坏），那么你需要更换磁盘并删除并重新创建损坏的成员到其原始位置。如果你没有更换损坏磁盘的选项，那么你需要删除损坏的成员并在替代位置重新创建它。\n\
    \n对于永久性介质故障，请按照以下说明删除并重新创建在线重做日志组的一个成员：\n1.  识别发生介质故障的在线重做日志文件（检查 `alert.log`）。\n\
    2.  确保该在线重做日志文件不是当前在线日志组的一部分。\n3.  删除损坏的成员。\n4.  向该组添加一个新成员。\n\n首先，打开你的 `alert.log`\
    \ 文件，查找标识日志组中哪个成员发生介质故障的 `ORA-00312` 消息。你应该在 `alert.log` 文件中看到类似以下的内容：\n```\n\
    ORA-00312: online log 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\nErrors in file\n\
    /u01/app/oracle/diag/rdbms/o12C/O12C/trace/O12C_lgwr_10531.trc:\n```\n\n此消息告诉你哪个日志成员已失效。`alert.log`\
    \ 文件输出还指定了已生成一个跟踪文件。你将在指定的跟踪文件中找到有关损坏成员的更多信息：\n```\nORA-00313: open failed for\
    \ members of log group 2 of thread 1\nORA-00312: online log 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\n\
    ORA-27037: unable to obtain file status\nLinux-x86_64 Error: 2: No such file or\
    \ directory\nORA-00321: log 2 of thread 1, cannot update log file header\nORA-00312:\
    \ online log 2 thread 1: '/u02/oraredo/O12C/redo02b.rdo'\n```\n\n从前面的输出可以看出，在线重做日志组\
    \ 2 的一个成员出现问题。一旦识别出损坏的在线重做日志文件，请执行以下查询以检查该在线重做日志文件的组是否具有 `CURRENT` 状态（在此示例中，我们关注组\
    \ 2）：\n```\nSELECT group#, status, archived, thread#, sequence#\nFROM v$log;\n\
    ```\n\n以下是一些示例输出，表明组 2 不是当前日志：\n```\n    GROUP# STATUS           ARC    THREAD#\
    \  SEQUENCE#\n---------- ---------------- --- ---------- ----------\n        \
    \ 1 CURRENT          NO           1         25\n         3 INACTIVE         NO\
    \           1         24\n         2 INACTIVE         NO           1         23\n\
    ```\n\n`注意` 如果你尝试删除当前日志组的成员，Oracle 将抛出 ORA-01609 错误，指明该日志是当前的，你不能删除其成员。\n\n如果失效的成员位于当前日志组中，则使用\
    \ `alter system switch logfile` 命令使下一个组成为当前组。然后按如下方式删除失效的成员：\n```\nSQL> alter\
    \ database drop logfile member '/u02/oraredo/O12C/redo02b.rdo';\n```\n\n然后重新创建在线重做日志文件成员：\n\
    ```\nSQL> alter database add logfile member '/u02/oraredo/O12C/redo02b.rdo'\n\
    \     to group 2;\n```\n\n请记住，前面的命令是示例，你必须为你的环境指定目录、日志文件成员文件和组号。\n\n如果目标位置已经存在一个未使用的日志文件，你可以使用\
    \ `reuse` 参数来覆盖并重用该日志文件。该日志文件必须与组中的其他日志文件大小相同：\n```\nSQL> alter database add logfile\
    \ member '</directory/file_name>' reuse\n     to group <group#>;\n```\n\n如前所述，只要\
    \ Oracle 能够写入多路复用重做日志组的至少一个成员，它就会继续运行。当日志写入器无法写入当前在线重做日志文件时，错误消息将写入 `alert.log`\
    \ 文件。\n\n你应该定期检查你的 `alert.log` 文件中的 Oracle 错误。这可能是你发现组成员发生介质故障的唯一方式。我建议你运行一个定期批处理作业，搜索\
    \ `alert.log` 文件中的任何错误，并在发现潜在问题时自动通知你。\n\n一旦识别出在线重做日志组中的损坏成员，你就可以删除并重新创建在线重做日志文件。新创建的在线重做日志文件在\
    \ `V$LOGFILE` 中可能显示 `INVALID` 状态，直到它成为 `CURRENT` 日志组的一部分。一旦新创建的成员成为 `CURRENT`\
    \ 日志组的一部分，其状态应更改为 `NULL`。`NULL` 成员状态（如 表 7-4 所述）表示数据库正在使用该在线重做日志文件。\n\n你可以在数据库处于挂载（`MOUNTED`）状态或打开（`OPEN`）状态时删除和添加在线重做日志文件成员。我建议在删除和重新创建日志成员时，让数据库处于挂载状态。这将确保在删除和重新创建成员期间，日志组的状态不会改变。你无法删除属于\
    \ `CURRENT` 组的在线重做日志文件成员。"
- fmt: "**Note** 当使用`alter database drop logfile member`命令时，系统不允许从重做日志组中删除最后一个剩余的在线重做日志文件成员。如果尝试这样做，Oracle将抛出ORA-00361错误，指出无法删除最后一个日志成员。如果需要删除日志组的所有成员，请使用`alter\
    \ database drop logfile group`命令。\n\n## 搜索告警日志中的错误\n\n这是一个简单的Bash shell脚本，用于确定`alert.log`的位置，然后在其中搜索错误字符串。您可以使用类似的方法自动检测`alert.log`中的错误。\n\
    \n```bash\n#!/bin/bash\nexport DBS=\"ENGDEV STAGE OTEST\"\nexport MAILLIST=\"\
    larry@support.com\"\nexport BOX=`uname -a | awk '{print$2}'`\n#-----------------------------------------------------------\n\
    for instance in $DBS\ndo\n# call script to source oracle OS variables\nexport\
    \ ORACLE_SID=O12C\nexport ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1\n\
    export PATH=$PATH:$ORACLE_HOME/bin\ncrit_var=$(\nsqlplus -s <<EOF\n/ as sysdba\n\
    SET HEAD OFF TERM OFF FEED OFF VERIFY OFF\nCOL value FORM A80\nselect value from\
    \ v\\$diag_info where name='Diag Trace';\nEOF)\n  if [ -r $crit_var/alert_$instance.log\
    \ ]\n  then\n  grep -ic error $crit_var/alert_$instance.log\n    if [ $? = 0 ]\n\
    \    then\n     mailx -s \"Error in $instance log file\" $MAILLIST <<EOF\nError\
    \ in $crit_var/alert_$instance.log file on $BOX...\nEOF\n    fi # $?\n  fi # -r\n\
    done # for instance\nexit 0\n```\n\n您可以轻松修改以上脚本以适应您的环境要求。例如，您可能需要更改Oracle操作系统变量的加载方式、搜索的数据库、错误字符串以及电子邮件地址。这只是一个简单的示例，展示了使用shell脚本自动搜索文件中错误的强大功能。\n\
    \n## 丢失所有非活动重做日志组成员后的恢复\n\n如果您丢失了某个非活动重做日志组的所有成员，请执行以下步骤：\n\n1.  验证该组的所有成员是否都已损坏（通过检查`alert.log`文件）。\n\
    2.  验证日志组状态是否为`INACTIVE`。\n3.  使用`clear logfile`命令重新创建该日志组。\n4.  如果重新创建的日志组尚未归档，请立即备份数据库。\n\
    \n如果在线重做日志组的所有成员都已损坏，您将无法打开数据库。在这种情况下，Oracle只允许您装载（mount）数据库。\n\n首先检查您的`alert.log`文件，确认某个重做日志组的所有成员都已损坏。您应该会看到一条消息，指示某个在线重做日志组的所有成员已损坏，数据库无法打开：\n\
    \n```\nORA-00312: online log 2 thread 1: '/u01/oraredo/O12C/redo02a.rdo'\nORA-00313:\
    \ open failed for members of log group 2 of thread 1\n```\n\n接下来，确保您的数据库处于装载（mount）模式：\n\
    \n```\n$ sqlplus / as sysdba\nSQL> startup mount;\n```\n\n然后，运行以下查询以验证损坏的日志组是否为`INACTIVE`状态，并确定其是否已归档：\n\
    \n```\nSELECT group#, status, archived, thread#, sequence#\nFROM v$log;\n```\n\
    \n以下是一些示例输出：\n\n```\n    GROUP# STATUS           ARC    THREAD#  SEQUENCE#\n----------\
    \ ---------------- --- ---------- ----------\n         1 CURRENT          NO \
    \          1         25\n         3 INACTIVE         NO           1         24\n\
    \         2 INACTIVE         NO           1         23\n```\n\n如果状态为`INACTIVE`，则该日志组不再需要用于崩溃恢复（如[表7-3](#9781484207642_Ch07.xhtml#Tab3)所述）。因此，您可以使用`clear\
    \ logfile`命令重新创建该日志组的所有成员。以下示例重新创建第2组的所有日志成员：\n\n```\nSQL> alter database clear\
    \ logfile group 2;\n```\n\n如果该日志组尚未归档，那么您将需要使用`clear unarchived logfile`命令，如下所示："
  raw: '![Image](images/sq.jpg) **Note**  When using the `alter database drop logfile
    member` command, you will not be allowed to drop the last remaining online redo
    log file member from a redo log group. If you attempt to do this, Oracle will
    throw an ORA-00361 error stating that you cannot remove the last standing log
    member. If you need to drop all members of a log group, use the `alter database
    drop logfile group` command.


    **SEARCHING THE ALERT LOG FOR ERRORS**


    Here’s a simple Bash shell script that determines the location of the alert.log
    and then searches the alert.log for an error string. You can use something similar
    to automatically detect errors in the alert.log.


    `#!/bin/bash`

    `export DBS="ENGDEV STAGE OTEST"`

    `export MAILLIST="larry@support.com"`

    `` export BOX=`uname -a | awk ''{print$2}''` ``

    `#-----------------------------------------------------------`

    `for instance in $DBS`

    `do`

    `# call script to source oracle OS variables`

    `export ORACLE_SID=O12C`

    `export ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1`

    `export PATH=$PATH:$ORACLE_HOME/bin`

    `crit_var=$(`

    `sqlplus -s <<EOF`

    `/ as sysdba`

    `SET HEAD OFF TERM OFF FEED OFF VERIFY OFF`

    `COL value FORM A80`

    `select value from v\$diag_info where name=''Diag Trace'';`

    `EOF)`

      `if [ -r $crit_var/alert_$instance.log ]`

      `then`

      `grep -ic error $crit_var/alert_$instance.log`

        `if [ $? = 0 ]`

        `then`

         `mailx -s "Error in $instance log file" $MAILLIST <<EOF`

    `Error in $crit_var/alert_$instance.log file on $BOX...`

    `EOF`

        `fi # $?`

      `fi # -r`

    `done # for instance`

    `exit 0`


    You can easily modify the above to fit the requirements of your environment. For
    example, you might need to change the way the Oracle operating system variables
    are sourced, the databases searched for, the error string, and the e-mail address.
    This is just a simple example showing the power of using a shell script to automate
    the search for errors in a file.


    Recovering After Loss of All Members of Inactive Redo Log Group


    If you’ve lost all members of an inactive redo log group, then perform the following
    steps:


    1.  Verify that all members of a group have been damaged (by inspecting the `alert.log`
    file).

    2.  Verify that the log group status is `INACTIVE`.

    3.  Re-create the log group with the `clear logfile` command.

    4.  If the re-created log group has not been archived, then immediately back up
    your database.


    If all members of an online redo log group are damaged, you won’t be able to open
    your database. In this situation, Oracle will allow you to only mount your database.


    First inspect your `alert.log` file, and verify that all members of a redo log
    group are damaged. You should see a message indicating that all members of an
    online redo log group are damaged and the database cannot open:


    ```

    ORA-00312: online log 2 thread 1: ''/u01/oraredo/O12C/redo02a.rdo''

    ORA-00313: open failed for members of log group 2 of thread 1

    ```


    Next, ensure that your database is in mount mode:


    ```

    $ sqlplus / as sysdba

    SQL> startup mount;

    ```


    Next, run the following query to verify that the damaged log group is `INACTIVE`
    and determine whether it has been archived:


    ```

    SELECT group#, status, archived, thread#, sequence#

    FROM v$log;

    ```


    Here is some sample output:


    ```

        GROUP# STATUS           ARC    THREAD#  SEQUENCE#

    ---------- ---------------- --- ---------- ----------

             1 CURRENT          NO           1         25

             3 INACTIVE         NO           1         24

             2 INACTIVE         NO           1         23

    ```


    If the status is `INACTIVE`, then this log group is no longer needed for crash
    recovery (as described in [Table 7-3](#9781484207642_Ch07.xhtml#Tab3)). Therefore,
    you can use `the clear logfile` command to re-create all members of a log group.
    The following example re-creates all log members of group 2:


    ```

    SQL> alter database clear logfile group 2;

    ```


    If the log group has not been archived, then you will need to use the `clear unarchived
    logfile` command as follows:'
