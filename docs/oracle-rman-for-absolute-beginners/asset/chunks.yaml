    ```


    输入 `YES` 以继续：


    ```

    YES

    ```


    如果一切顺利，您应该在输出中看到类似以下的最终消息：


    ```

    repair failure complete

    ```


    ![Image](img/sq.jpg) **注意** 您可以从 RMAN 命令提示符或 Enterprise Manager 运行数据恢复顾问命令。


