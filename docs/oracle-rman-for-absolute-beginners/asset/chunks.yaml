- fmt: '[Image](images/sq.jpg) **Tip** 因为 Data Pump 内部使用 PL/SQL 来执行其工作，所以需要在共享池中有一些可用内存来保存
    PL/SQL 包。如果共享池中的空间不足，Data Pump 将抛出 `ORA-04031: unable to allocate bytes of shared
    memory...` 错误并中止。如果您收到此错误，请将数据库参数 `SHARED_POOL_SIZE` 设置为至少 50M。更多详情请参阅 MOS note
    396940.1。


    ## Getting Started


    既然您已经了解了 Data Pump 的架构，接下来是一个简单的示例，展示了导出表、删除表然后将表重新导入数据库所需的导出设置步骤。这将为本章涵盖的所有其他
    Data Pump 任务奠定基础。


    ### Taking an Export


    运行 Data Pump 导出作业时，需要进行少量设置。步骤如下：

    1.  创建一个数据库目录对象，该对象指向您希望写入/读取 Data Pump 文件的操作系统目录。

    2.  为运行导出的数据库用户授予对该目录对象的读写权限。

    3.  在操作系统提示符下，运行 `expdp` 实用程序。


    #### Step 1. Creating a Database Directory Object


    在运行 Data Pump 作业之前，首先创建一个与磁盘上物理位置相对应的数据库目录对象。此位置将用于保存导出文件和日志文件，并且应该是一个您知道有足够磁盘空间来容纳导出数据量的位置。


    使用 `CREATE DIRECTORY` 命令来完成此任务。此示例创建一个名为 `dp_dir` 的目录，并指定它映射到磁盘上的 `/oradump` 物理位置：

    ``` SQL

    SQL> create directory dp_dir as ''/oradump'';

    ```

    要查看新创建目录的详细信息，请发出以下查询：

    ``` SQL

    SQL> select owner, directory_name, directory_path from dba_directories;

    ```

    以下是一些示例输出：

    ```

    OWNER      DIRECTORY_NAME  DIRECTORY_PATH

    ---------- ---------------

    SYS        DP_DIR          /oradump

    ```

    请记住，指定的目录路径必须在数据库服务器上物理存在。此外，该目录必须是 `oracle` 操作系统用户具有读/写访问权限的目录。最后，执行 Data Pump
    操作的用户需要被授予对该目录对象的读/写访问权限（参见步骤 2）。


    如果在导出或导入时未指定 `DIRECTORY` 参数，Data Pump 将尝试使用默认的数据库目录对象（如前所述，这映射到 `ORACLE_HOME/rdbms/log`）。我不建议使用默认目录，原因有二：

    *   如果您要导出大量数据，最好有一个您知道有足够空间来满足磁盘空间需求的首选磁盘位置。如果使用默认目录，您可能会无意中填满与 `ORACLE_HOME`
    相关联的挂载点，从而可能导致数据库挂起。

    *   如果您向非 DBA 用户授予导出权限，您不希望他们在与 `ORACLE_HOME` 相关的位置创建大型转储文件。同样，您不希望与 `ORACLE_HOME`
    相关联的挂载点变满，从而损害您的数据库。


    #### Step 2. Granting Access to the Directory


    您需要向想要使用 Data Pump 的用户授予对数据库目录对象的权限。使用 `GRANT` 语句分配适当的权限。如果您希望一个用户能够从目录读取和写入目录，则必须授予安全访问权限。此示例向名为
    `MV_MAINT` 的用户授予对目录对象的访问权限：

    ``` SQL

    SQL> grant read, write on directory dp_dir to mv_maint;

    ```

    所有目录对象都归 `SYS` 用户所有。如果您使用的用户账户被授予了 DBA 角色，那么您就拥有了对任何目录对象的必要读/写权限。我通常使用被授予了 DBA
    的用户来执行 Data Pump 作业（这样我就不需要费心授予权限了）。


    **SECURITY ISSUES WITH THE OLD EXP UTILITY**


    创建目录对象然后向物理存储位置授予特定 I/O 访问权限的理念是，您可以更安全地管理哪些用户有能力执行通常他们没有权限的读写活动。使用传统的 `exp` 实用程序，任何有权访问该工具的用户默认都有权限将文件写入或读取到
    Oracle 二进制文件所有者（通常是 `oracle`）有权访问的位置。可以想象，恶意的非 `oracle` 操作系统用户可以尝试运行 `exp` 实用程序，故意覆盖关键的数据库文件。例如，以下命令可以由任何具有
    `exp` 实用程序执行权限的非 `oracle` 操作系统用户运行：

    `$ exp heera/foo file=/oradata04/SCRKDV12/users01.dbf`

    `exp` 进程以 `oracle` 操作系统用户身份运行，因此对任何 `oracle` 拥有的数据文件具有读写操作系统权限。在这个 `exp` 示例中，如果
    `users01.dbf` 文件是一个活动的数据库数据文件，它会被覆盖并变得毫无用处。这可能对您的数据库造成灾难性的损害。


    为了防止此类问题，使用 Oracle Data Pump，您必须首先创建一个映射到特定目录的数据库对象目录，然后另外为每个用户分配对该目录的读写权限。因此，Data
    Pump 不存在旧版 `exp` 实用程序的安全问题。


    #### Step 3. Taking an Export


    当目录对象和权限设置就位后，您就可以使用 Data Pump 从数据库导出信息。本节中的一个简单示例展示了如何导出一个表。本章后面的章节将详细描述导出数据的各种方式。这里的重点是完成一个示例，为理解后续更复杂的主题奠定基础。


    作为非 `SYS` 用户，创建一个表并填充一些数据：

    ``` SQL

    SQL> create table inv(inv_id number);

    SQL> insert into inv values (123);

    ```

    接下来，作为非 `SYS` 用户，导出该表。此示例使用先前创建的名为 `DP_DIR` 的目录。Data Pump 使用目录对象指定的目录路径作为磁盘上写入转储文件和日志文件的位置：

    ``` $ expdp mv_maint/foo directory=dp_dir tables=inv dumpfile=exp.dmp logfile=exp.log

    ```

    `expdp` 实用程序在 `/oradump` 目录中创建一个名为 `exp.dmp` 的文件，其中包含重新创建 `INV` 表并填充导出时数据所需的信息。此外，在
    `/oradump` 目录中创建一个名为 `exp.log` 的日志文件，其中包含与此导出作业相关的日志信息。


    如果您未指定转储文件名，Data Pump 会创建一个名为 `expdat.dmp` 的文件。如果目录中已存在名为 `expdat.dmp` 的文件，则 Data
    Pump 会抛出错误。如果您未指定日志文件名，则 Data Pump 会创建一个名为 `export.log` 的文件。如果名为 `export.log`
    的日志文件已存在，则 Data Pump 会覆盖它。


    [Image](images/sq.jpg) **Tip** 尽管可以作为 `SYS` 用户执行 Data Pump，但我不建议这样做，原因有几个。首先，`SYS`
    需要使用 `AS SYSDBA` 子句连接到数据库。这需要一个带有 `USERID` 参数和连接字符串引号的 Data Pump 参数文件。这很不方便。其次，`SYS`
    拥有的大多数表无法导出（少数例外，如 `AUD$`）。如果您尝试导出 `SYS` 拥有的表，Data Pump 将抛出 `ORA-39166` 错误并指出该表不存在。这令人困惑。


    ## Importing a Table


    导出数据的关键原因之一是为了能够重新创建数据库对象。'
  raw: '[Image](images/sq.jpg) **Tip**  Because Data Pump internally uses PL/SQL to
    perform its work, there needs to be some memory available in the shared pool to
    hold the PL/SQL packages. If there is not enough room in the shared pool, Data
    Pump will throw an `ORA-04031: unable to allocate  bytes of shared memory...`
    error and abort. If you receive this error, set the database parameter SHARED_POOL_SIZE
    to at least 50M. See MOS note 396940.1 for further details.    Getting Started    Now
    that you have an understanding of the Data Pump architecture, next is a simple
    example showing the required export setup steps for exporting a table, dropping
    the table, and then reimporting the table back into the database. This will lay
    the foundation for all other Data Pump tasks covered in this chapter.    Taking
    an Export    A small amount of setup is required when you run a Data Pump export
    job. Here are the steps:    1.  Create a database directory object that points
    to an OS directory that you want to write/read Data Pump files to/from. 2.  Grant
    read and write privileges on the directory object to the database user running
    the export. 3.  From the OS prompt, run the `expdp` utility.    Step 1\. Creating
    a Database Directory Object    Before you run a Data Pump job, first create a
    database directory object that corresponds to a physical location on disk. This
    location will be used to hold the export and log files and should be a location
    where you know you have plenty of disk space to accommodate the amount of data
    being exported.    Use the `CREATE DIRECTORY` command to accomplish this task.
    This example creates a directory named `dp_dir` and specifies that it is to map
    to the `/oradump` physical location on disk:    ``` SQL> create directory dp_dir
    as ''/oradump''; ```    To view the details of the newly created directory, issue
    this query:    ``` SQL> select owner, directory_name, directory_path from dba_directories;
    ```    Here is some sample output:    ``` OWNER      DIRECTORY_NAME  DIRECTORY_PATH
    ---------- --------------- -------------------- SYS        DP_DIR          /oradump
    ```    Keep in mind that the directory path specified has to physically exist
    on the database server. Furthermore, the directory has to be one that the `oracle`
    OS user has read/write access to. Finally, the user performing the Data Pump operations
    needs to be granted read/write access to the directory object (see step 2).    If
    you don’t specify the `DIRECTORY` parameter when exporting or importing, Data
    Pump will attempt to use the default database directory object (as previously
    discussed, this maps to `ORACLE_HOME/rdbms/log`). I don’t recommend using the
    default directory for two reasons:    *   If you’re exporting large amounts of
    data, it’s better to have on disk the preferred location, where you know you have
    enough room to accommodate your disk space requirements. If you use the default
    directory, you run the risk of inadvertently filling up the mount point associated
    with `ORACLE_HOME` and then potentially hanging your database. *   If you grant
    privileges to non-DBA users to take exports, you don’t want them creating large
    dump files in a location associated with `ORACLE_HOME`. Again, you don’t want
    the mount point associated with `ORACLE_HOME` to become full to the detriment
    of your database.    Step 2\. Granting Access to the Directory    You need to
    grant permissions on the database directory object to a user that wants to use
    Data Pump. Use the `GRANT` statement to allocate the appropriate privileges. If
    you want a user to be able to read from and write to the directory, you must grant
    security access. This example grants access to the directory object to a user
    named `MV_MAINT`:    ``` SQL> grant read, write on directory dp_dir to mv_maint;
    ```    All directory objects are owned by the `SYS` user. If you’re using a user
    account that has the DBA role granted to it, then you have the requisite read/write
    privileges on any directory objects.


    I usually perform Data Pump jobs with a user that has the DBA granted to it (so
    that I don’t need to bother with granting access).    **SECURITY ISSUES WITH THE
    OLD EXP UTILITY**    The idea behind creating directory objects and then granting
    specific I/O access to the physical storage location is that you can more securely
    administer which users have the capability to generate read and write activities
    when normally they wouldn’t have permissions. With the legacy `exp` utility, any
    user that has access to the tool by default has access to write or read a file
    to which the owner (usually `oracle`) of the Oracle binaries has access. It’s
    conceivable that a malicious non-`oracle` OS user can attempt to run the `exp`
    utility to purposely overwrite a critical database file. For example, the following
    command can be run by any non-`oracle` OS user with execute access to the `exp`
    utility:    `$ exp heera/foo file=/oradata04/SCRKDV12/users01.dbf`    The `exp`
    process runs as the `oracle` OS user and therefore has read and write OS privileges
    on any `oracle`-owned data files. In this `exp` example, if the `users01.dbf`
    file is a live database data file, it’s overwritten and rendered worthless. This
    can cause catastrophic damage to your database.    To prevent such issues, with
    Oracle Data Pump you first have to create a database object directory that maps
    to a specific directory and then additionally assign read and write privileges
    to that directory per user. Thus, Data Pump doesn’t have the security problems
    that exist with the old `exp` utility.    Step 3\. Taking an Export    When the
    directory object and grants are in place, you can use Data Pump to export information
    from a database. The simple example in this section shows how to export a table.
    Later sections in this chapter describe in detail the various ways in which you
    can export data. The point here is to work through an example that will provide
    a foundation for understanding more complex topics that follow.    As a non-`SYS`
    user, create a table, and populate it with some data:    ``` SQL> create table
    inv(inv_id number); SQL> insert into inv values (123); ```    Next, as a non-`SYS`
    user, export the table. This example uses the previously created directory, named
    `DP_DIR`. Data Pump uses the directory path specified by the directory object
    as the location on disk to which to write the dump file and log file:    ``` $
    expdp mv_maint/foo directory=dp_dir tables=inv dumpfile=exp.dmp logfile=exp.log
    ```    The `expdp` utility creates a file named `exp.dmp` in the `/oradump` directory,
    containing the information required to recreate the `INV` table and populate it
    with data as it was at the time the export was taken. Additionally, a log file
    named `exp.log` is created in the `/oradump` directory, containing logging information
    associated with this export job.    If you don’t specify a dump file name, Data
    Pump creates a file named `expdat.dmp`. If a file named `expdat.dmp` already exists
    in the directory, then Data Pump throws an error. If you don’t specify a log file
    name, then Data Pump creates one named `export.log`. If a log file named `export.log`
    already exists, then Data Pump overwrites it.    ![Image](images/sq.jpg) **Tip**  Although
    it’s possible to execute Data Pump as the `SYS` user, I don’t recommend it for
    couple of reasons. First, `SYS` is required to connect to the database with the
    `AS SYSDBA` clause. This requires a Data Pump parameter file with the `USERID`
    parameter and quotes around the associated connect string. This is unwieldy. Second,
    most tables owned by `SYS` cannot be exported (there are a few exceptions, such
    as `AUD$`). If you attempt to export a table owned by `SYS`, Data Pump will throw
    an `ORA-39166` error and indicate that the table doesn’t exist. This is confusing.    Importing
    a Table    One of the key reasons to export data is so that you can recreate database
    objects.'
