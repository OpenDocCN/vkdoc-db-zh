- fmt: '# Oracle环境变量设置与用户认证


    ## 一、 关键环境变量

    `ORACLE_SID`（站点标识符）变量定义了您将连接的数据库的默认名称。`ORACLE_SID`也用于建立参数文件的默认名称，即`init<ORACLE_SID>.ora`或`spfile<ORACLE_SID>.ora`。默认情况下，Oracle在Linux/Unix系统上会在`ORACLE_HOME/dbs`中查找这些初始化文件，在Windows系统上则在`ORACLE_HOME\database`中查找。初始化文件包含管理数据库各个方面的参数，例如为数据库分配多少内存、最大连接数等。


    `LD_LIBRARY_PATH`变量非常重要，因为它指定了在Linux/Unix系统上搜索库文件的位置。该变量的值通常设置为包含`ORACLE_HOME/lib`。


    `PATH`变量指定了当您在操作系统提示符下键入命令时默认查找的目录。在几乎所有情况下，`ORACLE_HOME/bin`（Oracle二进制文件的位置）都必须包含在您的`PATH`变量中。


    您可以手动设置这些变量，也可以使用Oracle提供的标准脚本来设置。


    ## 二、 手动设置变量

    在Linux/Unix中，当您使用Bourne、Bash或Korn shell时，可以使用以下`export`命令从操作系统命令行手动设置操作系统变量：


    ```bash

    $ export ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1

    $ export ORACLE_SID=O12C

    $ export LD_LIBRARY_PATH=/usr/lib:$ORACLE_HOME/lib

    $ export PATH=$ORACLE_HOME/bin:$PATH

    ```


    请注意，上面的命令是针对我特定的开发环境的；您需要调整它们以匹配您环境中使用的Oracle主目录和数据库名称。


    对于C或`tcsh` shell，请使用`setenv`命令设置变量：


    ```bash

    $ setenv ORACLE_HOME <path>

    $ setenv ORACLE_SID <sid>

    $ setenv LD_LIBRARY_PATH <path>

    $ setenv PATH <path>

    ```


    DBA设置这些变量的另一种方式是将之前的`export`或`setenv`命令放入Linux/Unix启动文件中，例如`.bash_profile`、`.bashrc`或`.profile`。这样，变量会在登录时自动设置。


    然而，手动设置操作系统变量（无论是从命令行还是通过在启动文件中硬编码值）并不是实例化这些变量的最佳方式。例如，如果您在一台服务器上有多个具有多个Oracle主目录的数据库，手动设置这些变量很快就会变得难以管理且不易维护。


    ## 三、 使用Oracle脚本

    设置操作系统变量的一个好方法是使用一个脚本，该脚本利用一个包含服务器上所有Oracle数据库名称及其关联Oracle主目录的文件。这种方法灵活且易于维护。例如，如果某个数据库的Oracle主目录发生变化（例如，升级后），您只需在服务器上修改一个文件，而不必去查找硬编码在脚本中的Oracle主目录变量。


    Oracle提供了一种自动设置所需操作系统变量的机制。此方法依赖于两个文件：`oratab`和`oraenv`。


    ### 3.1 理解 oratab

    您可以将`oratab`文件中的条目视为一台服务器上安装的数据库及其对应Oracle主目录的注册表。当您安装Oracle软件时，`oratab`文件会自动为您创建。在Linux服务器上，`oratab`通常位于`/etc`目录中。在Solaris服务器上，`oratab`文件位于`/var/opt/oracle`目录中。如果由于某种原因`oratab`文件未自动创建，您可以手动创建它（使用文本编辑器）。


    `oratab`文件在Linux/Unix环境中用于以下目的：


    *   自动设置所需的操作系统变量

    *   自动启动和停止服务器上的Oracle数据库


    `oratab`文件有三列，格式如下：


    ```

    <database_sid>:<oracle_home_dir>:Y|N

    ```


    `Y`或`N`表示您是否希望Oracle在服务器重启时自动重启；`Y`表示是，`N`表示否（自动重启功能需要本书未涉及的额外任务）。


    `oratab`文件中的注释以井号（`#`）开头。以下是一个典型的`oratab`文件条目：


    ```

    O12C:/orahome/app/oracle/product/12.1.0.1/db_1:N

    ORA12CR1:/orahome/app/oracle/product/12.1.0.1/db_1:N

    ```


    上一行中的数据库名称是`O12C`和`ORA12CR1`。每个数据库的Oracle主目录路径紧接在行中（与数据库名用冒号[`:`]分隔）。


    多个Oracle提供的实用程序使用`oratab`文件：


    *   `oraenv`使用`oratab`来设置操作系统变量。

    *   `dbstart`使用它在服务器重启时自动启动数据库（如果`oratab`中的第三个字段是`Y`）。

    *   `dbshut`使用它在服务器重启时自动停止数据库（如果`oratab`中的第三个字段是`Y`）。


    `oraenv`工具将在下一节讨论。


    ### 3.2 使用 oraenv

    如果您没有为Oracle环境正确设置所需的操作系统变量，那么诸如SQL*Plus、RMAN、Data Pump等实用程序将无法正常工作。`oraenv`实用程序可自动在Oracle数据库服务器上设置所需的操作系统变量（如`ORACLE_HOME`、`ORACLE_SID`和`PATH`）。此实用程序用于Bash、Korn和Bourne
    shell环境（如果您在C shell环境中，有一个对应的`coraenv`实用程序）。


    `oraenv`实用程序位于`ORACLE_HOME/bin`目录中。您必须先导航到您的`ORACLE_HOME/bin`目录（您需要修改以下路径以匹配您的环境）：


    ```bash

    $ cd /orahome/app/oracle/product/12.1.0.1/db_1/bin

    ```


    然后您可以手动运行`oraenv`，像这样：


    ```bash

    $ . ./oraenv

    ```


    系统将提示您输入`ORACLE_SID`（并且如果`ORACLE_SID`不在`oratab`文件中，您还将被提示输入`ORACLE_HOME`值）：


    ```

    ORACLE_SID = [oracle] ?

    ORACLE_HOME = [/home/oracle] ?

    ```


    您也可以在运行`oraenv`实用程序之前设置操作系统变量，以非交互方式运行它。这在您不希望提示输入的脚本编写中很有用：


    ```bash

    $ export ORACLE_SID=O12C

    $ export ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1

    $ export ORAENV_ASK=NO

    $ cd /orahome/app/oracle/product/12.1.0.1/db_1/bin

    $ . ./oraenv

    ```


    ![Image](images/sq.jpg) **注意** 在Windows操作系统中，变量在注册表中设置。


    您可以使用`echo`命令验证操作系统变量设置，例如：


    ```bash

    $ echo $ORACLE_SID

    O12C


    $ echo $ORACLE_HOME

    /orahome/app/oracle/product/12.1.0.1/db_1

    ```


    ## 四、 连接到数据库

    建立操作系统变量后，您需要使用适当的权限连接到数据库。您可以通过两种方式之一完成此操作：使用操作系统认证或使用密码文件。


    ### 4.1 使用操作系统认证

    在连接到Oracle数据库之前，您需要设置正确的操作系统变量（如前一节所述）。此外，如果您想以特权用户身份连接到Oracle，那么您还必须有权访问特权操作系统账户或特权数据库用户。以特权用户身份连接允许您执行管理任务，例如启动和停止数据库。您可以使用操作系统认证或密码文件以特权用户身份连接到数据库。


    特权用户的概念对于RMAN备份和恢复也很重要。RMAN使用操作系统认证和密码文件来允许特权用户建立特权数据库会话（通过`rman`实用程序）。只有特权账户才允许备份、恢复和恢复数据库。


    如果您的Linux/Unix账户是`dba`组的成员（您的公司可能使用不同的组名，但`dba`是最常见的），那么凭借登录到您的Linux/Unix账户，您就可以通过SQL*Plus以所需的特权连接到您的数据库。'
  raw: 'The `ORACLE_SID` (site identifier) variable defines the default name of the
    database you’ll connect to. `ORACLE_SID` is also used to establish the default
    name for the parameter file, which is `init<ORACLE_SID>.ora` or `spfile<ORACLE_SID>.ora`.
    By default, Oracle will look in `ORACLE_HOME/dbs` for these initialization files
    on Linux/Unix systems and `ORACLE_HOME\database` on Windows systems. The initialization
    file contains parameters that govern aspects of your database, such as how much
    memory to allocate to your database, the maximum number of connections, and so
    on.


    The `LD_LIBRARY_PATH` variable is important because it specifies where to search
    for libraries on Linux/Unix boxes. The value of this variable is typically set
    to include `ORACLE_HOME/lib`.


    The `PATH` variable specifies which directories are looked in by default when
    you type a command from the OS prompt. In almost all situations, `ORACLE_HOME/bin`
    (the location of the Oracle binaries) must be included in your `PATH` variable.


    You can either manually set these variables or use a standard script provided
    by Oracle to set these variables.


    Manually Setting Variables


    In Linux/Unix, when you’re using the Bourne, Bash, or Korn shell, you can set
    OS variables manually from the OS command line with the following `export` command:


    ```

    $ export ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1

    $ export ORACLE_SID=O12C

    $ export LD_LIBRARY_PATH=/usr/lib:$ORACLE_HOME/lib

    $ export PATH=$ORACLE_HOME/bin:$PATH

    ```


    Note that the prior commands are for my particular development environment; you’ll
    need to adjust those to match the Oracle home and database name used in your environment.


    For the C or `tcsh` shell, use the `setenv` command to set variables:


    ```

    $ setenv ORACLE_HOME <path>

    $ setenv ORACLE_SID <sid>

    $ setenv LD_LIBRARY_PATH <path>

    $ setenv PATH <path>

    ```


    Another way that DBAs set these variables is by placing the previous `export`
    or `setenv` commands into a Linux/Unix startup file, such as `.bash_profile`,
    `.bashrc`, or `.profile`. That way, the variables are automatically set upon login.


    However, manually setting OS variables (either from the command line or by hard-coding
    values into a startup file) isn’t the optimal way to instantiate these variables.
    For example, if you have multiple databases with multiple Oracle homes on a box,
    manually setting these variables quickly becomes unwieldy and not very maintainable.


    Using Oracle’s Script


    A much better method for setting OS variables is use of a script that uses a file
    that contains the names of all Oracle databases on a server and their associated
    Oracle homes. This approach is flexible and maintainable. For instance, if a database’s
    Oracle home changes (e.g., after an upgrade), you only have to modify one file
    on the server and not hunt down where the Oracle home variables may be hard-coded
    into scripts.


    Oracle provides a mechanism for automatically setting the required OS variables.
    This approach relies on two files: `oratab` and `oraenv`.


    Understanding oratab


    You can think of the entries in the `oratab` file as a registry of what databases
    are installed on a box and their corresponding Oracle home directories. The `oratab`
    file is automatically created for you when you install the Oracle software. On
    Linux boxes, `oratab` is usually placed in the `/etc` directory. On Solaris servers,
    the `oratab` file is placed in the `/var/opt/oracle` directory. If, for some reason,
    the `oratab` file isn’t automatically created, you can manually create it (with
    a text editor).


    The `oratab` file is used in Linux/Unix environments for the following purposes:


    *   Automating the sourcing of required OS variables

    *   Automating the start and stop of Oracle databases on the server


    The `oratab` file has three columns with this format:


    ```

    <database_sid>:<oracle_home_dir>:Y|N

    ```


    The `Y` or `N` indicates whether you want Oracle to restart automatically on reboot
    of the box; `Y` indicates yes, and `N` indicates no (the automatic restart feature
    requires additional tasks not covered in this book).


    Comments in the `oratab` file start with a pound sign (`#`). Here is a typical
    `oratab` file entry:


    ```

    O12C:/orahome/app/oracle/product/12.1.0.1/db_1:N

    ORA12CR1:/orahome/app/oracle/product/12.1.0.1/db_1:N

    ```


    The names of the databases on the previous lines are `O12C` and `ORA12CR1`. The
    path of each database’s Oracle home directory is next on the line (separated from
    the database name by a colon [`:`]).


    Several Oracle-supplied utilities use the `oratab` file:


    *   `oraenv` uses `oratab` to set the OS variables.

    *   `dbstart` uses it to start the database automatically on server reboots (if
    the third field in `oratab` is `Y`).

    *   `dbshut` uses it to stop the database automatically on server reboots (if
    the third field in `oratab` is `Y`).


    The `oraenv` tool is discussed in the following section.


    Using oraenv


    If you don’t properly set the required OS variables for an Oracle environment,
    then utilities such as SQL*Plus, RMAN, Data Pump, and so on won’t work correctly.
    The `oraenv` utility automates the setting of required OS variables (such as `ORACLE_HOME`,
    `ORACLE_SID`, and `PATH`) on an Oracle database server. This utility is used in
    Bash, Korn, and Bourne shell environments (if you’re in a C shell environment,
    there is a corresponding `coraenv` utility).


    The `oraenv` utility is located in the `ORACLE_HOME/bin` directory. You’ll have
    to navigate to your `ORACLE_HOME/bin` directory first (you’ll have to modify the
    following path to match your environment):


    ```

    $ cd /orahome/app/oracle/product/12.1.0.1/db_1/bin

    ```


    And then you can run `oraenv` manually, like this:


    ```

    $ . ./oraenv

    ```


    You’ll be prompted for `ORACLE_SID` (and if the `ORACLE_SID` isn’t in the `oratab`
    file, you’ll additionally be prompted for an `ORACLE_HOME` value):


    ```

    ORACLE_SID = [oracle] ?

    ORACLE_HOME = [/home/oracle] ?

    ```


    You can also run the `oraenv` utility non-interactively by setting OS variables
    before you run it. This is useful for scripting when you don’t want to be prompted
    for input:


    ```

    $ export ORACLE_SID=O12C

    $ export ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1

    $ export ORAENV_ASK=NO

    $ cd /orahome/app/oracle/product/12.1.0.1/db_1/bin

    $ . ./oraenv

    ```


    ![Image](images/sq.jpg) **Note**  In Windows the operating system, variables are
    set in the registry.


    You can verify that the OS variable settings with the `echo` command, for example:


    ```

    $ echo $ORACLE_SID

    O12C


    $ echo $ORACLE_HOME

    /orahome/app/oracle/product/12.1.0.1/db_1

    ```


    After you’ve established your operating system variables, you need to connect
    to the database with the proper privileges. You can do this in one of two ways:
    using OS authentication or using a password file.


    Using OS Authentication


    Before you can connect to the Oracle database, you need to have the proper OS
    variables set (covered in the prior section). Additionally, if you want to connect
    to Oracle as a privileged user, then you must also have access to either a privileged
    OS account or a privileged database user. Connecting as a privileged user allows
    you to perform administrative tasks, such as starting and stopping a database.
    You can use either OS authentication or a password file to connect to your database
    as a privileged user.


    The concept of a privileged user is also important to RMAN backup and recovery.
    RMAN uses OS authentication and password files to allow privileged users to establish
    a privileged database session (via the `rman` utility). Only a privileged account
    is allowed to back up, restore, and recover a database.


    If your Linux/Unix account is a member of the `dba` group (your shop might use
    a different group name, but `dba` is the most common), you can connect to your
    database with the required privileges via SQL*Plus by virtue of being logged in
    to your Linux/Unix account.'
