  trans: '

    当你创建备份集时，二进制备份片文件只能由 RMAN 进程操作。一些数据库管理员认为这是一个缺点，因为他们必须使用 RMAN 来备份和恢复这些文件（你无法直接访问或控制备份片）。但是，这些看法是没有根据的。除非你遇到了罕见的缺陷，否则
    RMAN 是可靠的，并且在所有备份和恢复场景中都能稳定工作。


    将备份集与映像副本进行对比。映像副本创建每个数据文件的逐字节相同副本。创建映像副本的优点是，（如果需要）你可以不使用 RMAN 来操作映像副本（就像使用操作系统复制工具一样）。此外，在发生介质故障时，映像副本是恢复数据文件的快速方法，因为
    RMAN 只需将文件从备份位置复制回来（无需重建数据文件，因为它是一个精确的副本）。


    我几乎总是使用备份集进行数据库备份，而不是映像副本。通常，我需要某种形式的 RMAN 压缩（块跳过）。备份到磁盘的大小几乎总是需要关注的问题。备份集在磁盘空间消耗方面更高效。因为备份集可以利用
    RMAN 压缩，与映像副本相比，涉及的 I/O 也更少。在许多环境中，减少 I/O 以避免影响其他应用程序是一个需要考虑的问题。


    但是，如果你觉得需要直接控制 RMAN 创建的备份文件，或者你处于恢复过程速度至关重要的环境中，请考虑使用映像副本。


    ## 17. 使用增量备份


    对于我负责的大多数数据库，我每天运行一次 0 级备份。我通常不实施任何类型的增量备份策略。


    增量备份策略适用于大型数据库，这些数据库中只有一小部分数据块在备份之间发生变化。如果你处于数据仓库环境中，你可能需要考虑增量备份策略，因为它可以大大减少备份的大小。例如，你可能希望每周运行一次
    0 级备份，然后每天运行一次 1 级增量备份。


    ![Image](img/sq.jpg) `Note` 有关如何使用增量备份备份数据库的详细信息，请参阅第 5 章。


    ## 18. 使用增量更新备份


    增量更新备份是实现映像副本备份策略的一种高效方法。该技术指示 RMAN 首先创建数据文件的映像副本；然后，下次运行备份时，RMAN 不是创建一组新的映像副本，而是进行增量备份（自创建映像副本以来发生变化的数据块），并将该增量备份应用到映像副本上。


    如果你有可用的磁盘空间来存放数据库的完整映像副本，并且希望在发生介质故障时能够直接使用映像副本的灵活性，请考虑这种备份策略。


    这种方法的一个潜在缺点是，如果你需要恢复并恢复到过去的某个时间点，你只能恢复并恢复到映像副本最后一次用增量备份更新的那个时间点。


    ![Image](img/sq.jpg) `Note` 有关如何使用增量更新备份备份数据库的详细信息，请参阅第 5 章。


    ## 19. 使用块变化跟踪


    此功能跟踪数据库块发生变化的时间。其思路是，如果你正在使用增量备份策略，你可以提升性能，因为通过实施此功能，RMAN 不必扫描数据文件中的每个块（在高水位线下）来确定是否需要备份。相反，RMAN
    只需访问块变化跟踪文件，找出自上次备份以来哪些块发生了变化，并直接访问这些块。如果你在大型数据仓库环境中工作并使用增量备份策略，请考虑启用块变化跟踪以提升性能。


    ![Image](img/sq.jpg) `Note` 有关如何实施块变化跟踪的详细信息，请参阅第 5 章。


    ## 20. 配置二进制压缩


    你可以配置 RMAN 在生成备份集时使用真正的二进制压缩。你可以通过以下两种方式之一启用压缩：


    *   在 `BACKUP` 命令中指定 `AS COMPRESSED BACKUPSET`。

    *   使用一次性的 `CONFIGURE` 命令。


    以下是在发出 `BACKUP` 命令时使用压缩进行备份的示例：


    ```

    RMAN> backup as compressed backupset database;

    ```


    在此示例中，为磁盘设备配置了压缩：


    ```

    RMAN> configure device type disk backup type to compressed backupset;

    ```


    如果需要清除设备类型的压缩配置，请发出此命令：


    ```

    RMAN> configure device type disk clear;

    ```


    我发现默认的压缩算法非常高效。对于典型的数据库，备份大小通常比常规备份小大约四到五倍。当然，你的压缩结果可能会因数据而异。


    为什么不压缩所有备份？压缩备份消耗更多的 CPU 资源，并且创建和恢复所需的时间更长，但它们导致的 I/O 更少，并且分散在更长的时间段内。如果你有多个 CPU，并且备份速度不是问题，那么你应该考虑压缩备份。


    你可以使用 `SHOW` 命令查看启用的压缩类型：


    ```

    RMAN> show compression algorithm;

    ```


    这是一些示例输出：


    ```

    CONFIGURE COMPRESSION ALGORITHM ''BASIC'' AS OF RELEASE ''DEFAULT''

    OPTIMIZE FOR LOAD TRUE ; # default

    ```


    基本压缩算法不需要 Oracle 的额外许可。如果你使用的是 Oracle 11g Release 2 或更高版本，并且你拥有 Advanced Compression
    选项的许可证，那么你还可以使用三个额外可配置的二进制压缩级别；例如，


    ```

    RMAN> configure compression algorithm ''HIGH'';

    RMAN> configure compression algorithm ''MEDIUM'';

    RMAN> configure compression algorithm ''LOW'';

    ```


    根据我的经验，这些先前的压缩算法在压缩比和创建备份所需时间方面都非常高效。


    你可以查询 `V$RMAN_COMPRESSION_ALGORITHM` 来查看适用于你的数据库版本的压缩算法的详细信息。要将当前压缩算法重置为默认的 `BASIC`，请使用
    `CLEAR` 命令：


    ```

    RMAN> configure compression algorithm clear;

    ```


    ## 21. 配置加密


    你可能需要对备份进行加密。一些机构特别要求对包含敏感数据且存储在异地的备份进行加密。要在备份时使用加密，你必须使用 Oracle 企业版，拥有 Advanced
    Security 选项的许可证，并且使用 Oracle 10g Release 2 或更高版本。


    如果你已经配置了安全钱包（有关详细信息，请参阅可以从 Oracle 网站 (`http://otn.oracle.com`) 的 Technology Network
    区域免费下载的《Oracle Advanced Security 管理员指南》），你可以为备份配置透明加密，如下所示：


    ```

    RMAN> configure encryption for database on;

    ```

