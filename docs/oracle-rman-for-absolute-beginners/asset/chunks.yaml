    `RMAN-07536: command not allowed when connected to a Pluggable Database` 错误。


    前面的代码只影响与您所连接的可插拔数据库关联的数据文件。可插拔数据库需要关闭才能进行此操作。但是，根容器数据库可以是打开或挂载状态。此外，您必须使用在连接到可插拔数据库时以特权用户身份进行的备份。特权可插拔数据库用户无法访问由根容器数据库特权用户启动的数据文件备份。


    ## 恢复归档重做日志文件


    RMAN 会在恢复过程中自动恢复它需要的任何归档重做日志文件。通常您不需要手动恢复归档重做日志文件。但是，在以下任何情况适用时，您可能希望这样做：


    *   您需要恢复归档重做日志文件，以便稍后执行恢复；其思路是，如果归档重做日志文件已经恢复，将加快恢复操作。

    *   您需要将归档重做日志文件恢复到非默认位置，无论是由于介质故障还是存储空间问题。

    *   您需要恢复特定的归档重做日志文件，以便通过 LogMiner 进行检查。


    如果您启用了 FRA，那么 RMAN 默认会将归档重做日志文件恢复到由初始化参数 `DB_RECOVERY_FILE_DEST` 定义的目标位置。否则，RMAN
    使用 `LOG_ARCHIVE_DEST_N` 初始化参数（其中 `N` 通常为 1）来确定恢复归档重做日志文件的位置。


    如果您将归档重做日志文件恢复到非默认位置，RMAN 知道它们被恢复到的位置，并会在您发出任何后续 `RECOVER` 命令时自动找到这些文件。RMAN 不会恢复它认为已经存在于磁盘上的归档重做日志文件。即使您指定了非默认位置，如果文件已存在，RMAN
    也不会将归档重做日志文件恢复到磁盘。在这种情况下，RMAN 仅返回一条消息，说明该归档重做日志文件已被恢复。使用 `FORCE` 选项可以覆盖此行为。


    如果您不确定在恢复日志文件时要使用的序列号，可以查询 `V$LOG_HISTORY` 视图。


    ![Image](img/sq.jpg) `提示` 请记住，您无法恢复从未备份过的归档重做日志。此外，如果包含该归档重做日志的备份文件不再可用，您也无法恢复它。运行
    `LIST ARCHIVELOG ALL` 命令可以查看磁盘上当前的归档重做日志，运行 `LIST BACKUP OF ARCHIVELOG ALL` 可以验证哪些归档重做日志文件在可用的
    RMAN 备份中。


    ### 恢复到默认位置


