    # 第 1 章 入门


    ![image](images/frontdot.jpg)


    备份与恢复技能是 DBA 能力清单上的首要技能。保护数据并保持其可用性构成了数据库管理的基础。你的 DBA 工作依赖于你定期执行备份的能力，并在必要时还原和恢复数据库。恢复管理器（RMAN）是
    Oracle 旗舰级的备份与恢复工具。此工具是保护数据的高效且有效的方式。每位 DBA 都必须知道如何实施和使用 RMAN。


    RMAN 是一个灵活的工具，包含各种各样的备份与恢复功能。本书的目的是让你扎实了解使用 RMAN 备份、还原和恢复数据库的最常见方法。我将展示许多实际示例以及实现各种功能所需的代码。有了这个基础，你将能够在任何环境中实施
    RMAN。


    我还将介绍用户管理备份技术（热备份和冷备份）。我发现，理解用户管理备份机制的 DBA 能更好地排查和解决任何类型的数据库问题（包括但不限于备份与恢复问题）。我还将介绍
    Data Pump 的使用。DBA 通常会实施 Data Pump 功能来满足备份与恢复需求（例如，快速备份单个表）。简而言之，每位 DBA 都应熟悉所有用于保护数据的
    Oracle 工具。


    要开始使用，在处理 Oracle 备份与恢复时，有一些基本任务你应该熟悉，即：


    *   连接到你的数据库

    *   启动/停止你的数据库


    理解这些主题是使用 RMAN（以及其他 Oracle 工具）的前提。本章的目的是让你熟悉这些初始任务。首先是连接到你的数据库。


    ![Image](images/sq.jpg) **注意** 本章假设你已安装 Oracle，并且有一个已创建且可用的数据库。


    ## 连接到你的数据库


    在连接到你的数据库之前，你必须建立所需的操作系统变量。此外，如果你要运行备份和恢复命令，你需要有权访问特权操作系统（OS）账户或已被授予适当权限（通过密码文件）的数据库用户。这些主题将在以下小节中讨论。


    ### 建立操作系统变量


    在通过 SQL*Plus、RMAN、Data Pump（或任何其他 Oracle 实用程序）连接到你的数据库之前，必须首先设置几个操作系统变量：


    *   `ORACLE_HOME`

    *   `ORACLE_SID`

    *   `LD_LIBRARY_PATH`

    *   `PATH`


    `ORACLE_HOME` 变量很重要，因为它定义了定位 Oracle 二进制文件（如 `sqlplus`、`dbca`、`netca`、`rman` 等）的起始目录，这些文件位于
    `ORACLE_HOME/bin` 中。'
  raw: 'This book is the brainchild of Jonathan Gennick. It is a focused book introducing
    the reader to backup and recovery concepts, including topics on user-managed backups,
    RMAN, and Data Pump. Thanks to Jill Balzano and the Apress staff; it takes a good
    (coordinated) team to produce a quality book.


    Also thanks to the many developers and DBAs that I’ve learned from over the years:
    Bob Suehrstedt, Dave Jennings, Scott Schulze, Venkatesh Ranganathan, Valerie Eipper,
    Mike Tanaka, Simon Ip, Nitin Mittal, Mohan Shanmugavelu, Ric Ambridge, Kamal Chamakura,
    Dallas Powell, Krishna (KP) Tallapaneni, Laurie Bourgeois, Todd Sherman, Radha
    Ponnapalli, Mohan Koneru, Kevin O’Grady, Peter Schow, Sujit Pattnaik, Roger Murphy,
    Barb Sannwald, Pete Mullineaux, Janet Bacon, Shawn Heisdorffer, Mehran Sowdaey,
    Patrick David, Carson Vowles, Aaron Isom, Tim Gorman, Tom Kyte, and Jim Stark.


    Introduction


    Backup and recovery abilities are arguably the most critical skills required of
    a database administrator. Recovery Manager (RMAN) is Oracle’s standard backup
    and recovery tool; every Oracle DBA should be familiar with utilizing RMAN. This
    book introduces you to RMAN; it starts with the very basics of how to set up and
    configure RMAN, and works through to more advanced topics, such as various restore
    and recovery scenarios.


    What This Book Covers


    [Chapter 1](#9781484207642_Ch01.xhtml) covers the essentials of your environment
    setup and how to connect to RMAN. [Chapter 2](#9781484207642_Ch02.xhtml) details
    the files that are part of backup and recovery operations (control files, online
    redo logs, archive redo logs, and data files).


    User-managed backups are the focus of [Chapter 3](#9781484207642_Ch03.xhtml).
    User-managed backups are rarely used nowadays, but an understanding of them builds
    the foundation for appreciating the mechanics of backup and recovery. With this
    information you’ll be able to more fully utilize RMAN and think your way through
    any backup and recovery situation.


    [Chapters 4](#9781484207642_Ch04.xhtml), [5](#9781484207642_Ch05.xhtml), and [6](#9781484207642_Ch06.xhtml)
    concentrate on RMAN. [Chapter 4](#9781484207642_Ch04.xhtml) introduces you to
    typical RMAN configuration and setup tasks. Here you’ll be given examples of how
    to implement the most commonly used RMAN configurations. [Chapter 5](#9781484207642_Ch05.xhtml)
    walks you through using RMAN to back up your database. [Chapter 6](#9781484207642_Ch06.xhtml)
    is dedicated to the critical tasks of restore and recovery.


    [Chapter 7](#9781484207642_Ch07.xhtml) provides in-depth details on handling online
    redo log failures. If there’s a failure with the online redo logs, you must be
    able to step in and take corrective actions. The topic of [Chapter 8](#9781484207642_Ch08.xhtml)
    is Data Pump. This tool is highly flexible and feature rich. Many DBAs use this
    tool to augment their backup and recovery strategy.


    These eight chapters will provide you with a solid foundation for Oracle backup
    and recovery skills. With this knowledge, you’ll be able to protect your company’s
    data and keep it available; these skills are needed by all DBAs.


    Conventions


    The following typographical conventions are used in this book:


    *   $ is used to denote Linux/Unix commands that can be run by the operating system
    owner of the Oracle binaries (usually named oracle).

    *   # is used to denote Linux/Unix commands that should be run as the root operating
    system user.

    *   SQL> is used to denote one-line SQL*Plus statements.

    *   Monospaced font is used for code examples, utility names, file names, URLs,
    and directory paths.

    *   Italic is used to highlight a new concept or word.

    *   `UPPERCASE` indicates names of database objects like views, tables, and corresponding
    column names.

    *   < > is used where you need to provide input, such as a file name or password.


    Source Code


    The code for the examples shown in this book is available on the Apress web site
    (`www.apress.com`). A link can be found on the book’s information page under the
    Source Code/Downloads tab. This tab is located underneath the Related Titles section
    of the page.


