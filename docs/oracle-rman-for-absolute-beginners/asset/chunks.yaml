- fmt: "You can also instruct RMAN to catalog any files in the FRA that the control\
    \ file isn’t currently aware of, like this:\n\n```\nRMAN> catalog recovery area;\n\
    ```\n\nAdditionally, you can catalog specific files. This example instructs RMAN\
    \ to add metadata to the control file for a specific backup piece file:\n\n```\n\
    RMAN> catalog backuppiece '/u01/O12C/rman/r159nv562v_1_1.bk';\n```\n\n## Taking\
    \ Backups of Pluggable Databases\n\nStarting with Oracle 12c, you can create pluggable\
    \ databases within a root container database. If you’re using this option, there\
    \ are a few features to be aware of in regard to backups:\n\n*   While connected\
    \ to the root container, you can back up all the data files within the database\
    \ or just the root database data files; a specific pluggable database; or specific\
    \ tablespaces or data files, or a combination of these.\n*   While connected to\
    \ a pluggable database, you can only back up data files associated with that database.\n\
    \nThe bulleted items are detailed in the following two sections.\n\n### While\
    \ Connected to the Root Container\n\nSuppose you’re connected to the root container\
    \ as `SYS` and want to back up all data files (including any data files with associated\
    \ pluggable databases). First, verify that you are indeed connected to the root\
    \ container as `SYS`:\n\n```\nRMAN> SELECT SYS_CONTEXT('USERENV', 'CON_ID')  \
    \ AS con_id,\n       SYS_CONTEXT('USERENV', 'CON_NAME')       AS cur_container,\n\
    \       SYS_CONTEXT('USERENV', 'CURRENT_SCHEMA') AS cur_user\n       FROM DUAL;\n\
    ```\n\nHere is some sample output:\n\n```\nCON_ID               CUR_CONTAINER\
    \        CUR_USER\n-------------------- -------------------- --------------------\n\
    1                    CDB$ROOT             SYS\n```\n\nNow, to back up all data\
    \ files, both in the root container and in any associated pluggable databases,\
    \ do so as follows:\n\n```\nRMAN> backup database;\n```\n\nIf you want to back\
    \ up only the data files associated with the root container, then specify `ROOT`:\n\
    \n```\nRMAN> backup database root;\n```\n\nYou can also back up a specific pluggable\
    \ database:\n\n```\nRMAN> backup pluggable database salespdb;\n```\n\nAdditionally,\
    \ you can back up specific tablespaces within a pluggable database:\n\n```\nRMAN>\
    \ backup tablespace SALESPDB:SALES;\n```\n\nAnd, you can specify the file name\
    \ to back up any data file within the root container or associated pluggable databases:\n\
    \n```\nRMAN> backup datafile '/ora01/app/oracle/oradata/CDB/salespdb/sales01.dbf';\n\
    ```\n\n### While Connected to a Pluggable Database\n\nFirst, start RMAN, and connect\
    \ to the pluggable database you want to back up. You must connect as a user with\
    \ `SYSDBA` or `SYSBACKUP` privileges. Also, there must be a listener running and\
    \ a password file in place. This example connects to the `SALESPDB` pluggable\
    \ database:\n\n```\n$ rman target sys/foo@salespdb\n```\n\nOnce connected to a\
    \ pluggable database, you can only back up data files specific to that database.\
    \ Therefore, for this example, the following command takes a backup of just data\
    \ files associated with the `SALESPDB` pluggable database:\n\n```\nRMAN> backup\
    \ database;\n```\n\nThis example backs up the data files associated with the pluggable\
    \ database `SYSTEM` tablespace:\n\n```\nRMAN> backup tablespace system;\n```\n\
    \nI should emphasize again that when you are connected directly to a pluggable\
    \ database, you can only back up data files associated with that database. You\
    \ can’t back up data files associated with the root container or with any other\
    \ pluggable databases within the container. [Figure 5-1](#9781484207642_Ch05.xhtml#Fig1)\
    \ illustrates this concept. A connection as `SYSDBA` to the `SALESPDB` pluggable\
    \ database can only back up and view data files related to that database. The\
    \ `SYSDBA` connection can’t see outside its pluggable box in regard to data files\
    \ and RMAN backups of data files. In contrast, the `SYSDBA` connection to the\
    \ root container can back up all data files (root, seed, and all pluggable databases)\
    \ as well as access RMAN backups that were initiated from a connection to a pluggable\
    \ database.\n\n![9781484207642_Fig05-01.jpg](images/9781484207642_Fig05-01.jpg)\n\
    \n[Figure 5-1](#9781484207642_Ch05.xhtml#_Fig1). Purview of a `SYSDBA` connection\
    \ to root container vs. a `SYSDBA` connection to a pluggable database\n\n## Creating\
    \ Incremental Backups\n\nRMAN has three separate and distinct incremental backup\
    \ features:\n\n*   Incremental-level backups\n*   Incrementally updating backups\n\
    *   Block change tracking\n\nWith incremental-level backups, RMAN only backs up\
    \ the blocks that have been modified since a previous backup. Incremental backups\
    \ can be applied to the entire database, tablespaces, or data files. Incremental-level\
    \ backups are the most commonly used incremental feature with RMAN.\n\nIncrementally\
    \ updating backups is a separate feature from incremental-level backups. These\
    \ backups take image copies of the data files and then use incremental backups\
    \ to update the image copies. This gives you an efficient way to implement and\
    \ maintain image copies as part of your backup strategy. You only take the image\
    \ copy backup once, and then use incremental backups to keep the image copies\
    \ updated with the most recent transactions.\n\nBlock change tracking is another\
    \ feature designed to speed up the performance of incremental backups. The idea\
    \ here is that an OS file is used to record which blocks have changed since the\
    \ last backup. RMAN can use the block change tracking file to quickly identify\
    \ which blocks need to be backed up when performing incremental backups. This\
    \ feature can greatly improve the performance of incremental backups.\n\n### Taking\
    \ Incremental-Level Backups\n\nRMAN implements incremental backups through levels.\
    \ Starting with Oracle 10g, there are only two documented levels of incremental\
    \ backups: level 0 and level 1. Prior versions of Oracle offer five levels, 0–4.\
    \ These levels (0–4) are still available but are not specified in the Oracle documentation.\
    \ You must first take a level 0 incremental backup to establish a baseline, after\
    \ which you can take a level 1 incremental backup.\n\n![Image](images/sq.jpg)\
    \ > **Note** > A full backup backs up the same blocks as a level 0 backup. However,\
    \ you can’t use a full backup with incremental backups. Furthermore, you have\
    \ to start an incremental backup strategy with a level 0 backup. If you attempt\
    \ to take a level 1 backup, and no level 0 exists, RMAN will automatically take\
    \ a level 0 backup.\n\nHere is an example of taking an incremental level 0 backup:\n\
    \n```\nRMAN> backup incremental level=0 database;\n```\n\nSuppose for the next\
    \ several backups you want to back up only the blocks that have changed since\
    \ the last incremental backup. This line of code takes a level 1 backup:\n\n```\n\
    RMAN> backup incremental level=1 database;\n```\n\nThere are two different types\
    \ of incremental backups: differential and cumulative. Which type you use depends\
    \ on your requirements. Differential backups (the default) are smaller but take\
    \ more time to recover from. Cumulative backups are larger than differential backups\
    \ but require less recovery time.\n\nA differential incremental level 1 backup\
    \ instructs RMAN to back up blocks that have changed since the last level 1 or\
    \ level 0 backup, whereas a cumulative incremental level 1 backup instructs RMAN\
    \ to back up blocks that have changed since the last level 0 backup. Cumulative\
    \ incremental backups, in effect, ignore any level 1 incremental backups.\n\n\
    ![Image](images/sq.jpg) > **Note** > The RMAN incremental level 0 backups are\
    \ used to restore the data files, whereas the RMAN incremental level 1 backups\
    \ are used to recover the data files.\n\nWhen using incremental backups, I almost\
    \ always use the default, of differential. Usually, I don’t worry about the differences\
    \ between differential and cumulative backups. If you require cumulative backups,\
    \ you must specify the key word `CUMULATIVE`. Here is an example of taking a cumulative\
    \ level 1 backup:\n\n```\nRMAN> backup incremental level=1 cumulative database;\n\
    ```\n\nHere are some examples of taking incremental backups at a more granular\
    \ level than the database:"
  raw: 'You can also instruct RMAN to catalog any files in the FRA that the control
    file isn’t currently aware of, like this:


    ```

    RMAN> catalog recovery area;

    ```


    Additionally, you can catalog specific files. This example instructs RMAN to add
    metadata to the control file for a specific backup piece file:


    ```

    RMAN> catalog backuppiece ''/u01/O12C/rman/r159nv562v_1_1.bk'';

    ```


    Taking Backups of Pluggable Databases


    Starting with Oracle 12c, you can create pluggable databases within a root container
    database. If you’re using this option, there are a few features to be aware of
    in regard to backups:


    *   While connected to the root container, you can back up all the data files
    within the database or just the root database data files; a specific pluggable
    database; or specific tablespaces or data files, or a combination of these.

    *   While connected to a pluggable database, you can only back up data files associated
    with that database.


    The bulleted items are detailed in the following two sections.


    While Connected to the Root Container


    Suppose you’re connected to the root container as `SYS` and want to back up all
    data files (including any data files with associated pluggable databases). First,
    verify that you are indeed connected to the root container as `SYS`:


    ```

    RMAN> SELECT SYS_CONTEXT(''USERENV'', ''CON_ID'')   AS con_id,

           SYS_CONTEXT(''USERENV'', ''CON_NAME'')       AS cur_container,

           SYS_CONTEXT(''USERENV'', ''CURRENT_SCHEMA'') AS cur_user

           FROM DUAL;

    ```


    Here is some sample output:


    ```

    CON_ID               CUR_CONTAINER        CUR_USER

    -------------------- -------------------- --------------------

    1                    CDB$ROOT             SYS

    ```


    Now, to back up all data files, both in the root container and in any associated
    pluggable databases, do so as follows:


    ```

    RMAN> backup database;

    ```


    If you want to back up only the data files associated with the root container,
    then specify `ROOT`:


    ```

    RMAN> backup database root;

    ```


    You can also back up a specific pluggable database:


    ```

    RMAN> backup pluggable database salespdb;

    ```


    Additionally, you can back up specific tablespaces within a pluggable database:


    ```

    RMAN> backup tablespace SALESPDB:SALES;

    ```


    And, you can specify the file name to back up any data file within the root container
    or associated pluggable databases:


    ```

    RMAN> backup datafile ''/ora01/app/oracle/oradata/CDB/salespdb/sales01.dbf'';

    ```


    While Connected to a Pluggable Database


    First, start RMAN, and connect to the pluggable database you want to back up.
    You must connect as a user with `SYSDBA` or `SYSBACKUP` privileges. Also, there
    must be a listener running and a password file in place. This example connects
    to the `SALESPDB` pluggable database:


    ```

    $ rman target sys/foo@salespdb

    ```


    Once connected to a pluggable database, you can only back up data files specific
    to that database. Therefore, for this example, the following command takes a backup
    of just data files associated with the `SALESPDB` pluggable database:


    ```

    RMAN> backup database;

    ```


    This example backs up the data files associated with the pluggable database `SYSTEM`
    tablespace:


    ```

    RMAN> backup tablespace system;

    ```


    I should emphasize again that when you are connected directly to a pluggable database,
    you can only back up data files associated with that database. You can’t back
    up data files associated with the root container or with any other pluggable databases
    within the container. [Figure 5-1](#9781484207642_Ch05.xhtml#Fig1) illustrates
    this concept. A connection as `SYSDBA` to the `SALESPDB` pluggable database can
    only back up and view data files related to that database. The `SYSDBA` connection
    can’t see outside its pluggable box in regard to data files and RMAN backups of
    data files. In contrast, the `SYSDBA` connection to the root container can back
    up all data files (root, seed, and all pluggable databases) as well as access
    RMAN backups that were initiated from a connection to a pluggable database.


    ![9781484207642_Fig05-01.jpg](images/9781484207642_Fig05-01.jpg)


    [Figure 5-1](#9781484207642_Ch05.xhtml#_Fig1). Purview of a `SYSDBA` connection
    to root container vs. a `SYSDBA` connection to a pluggable database


    Creating Incremental Backups


    RMAN has three separate and distinct incremental backup features:


    *   Incremental-level backups

    *   Incrementally updating backups

    *   Block change tracking


    With incremental-level backups, RMAN only backs up the blocks that have been modified
    since a previous backup. Incremental backups can be applied to the entire database,
    tablespaces, or data files. Incremental-level backups are the most commonly used
    incremental feature with RMAN.


    Incrementally updating backups is a separate feature from incremental-level backups.
    These backups take image copies of the data files and then use incremental backups
    to update the image copies. This gives you an efficient way to implement and maintain
    image copies as part of your backup strategy. You only take the image copy backup
    once, and then use incremental backups to keep the image copies updated with the
    most recent transactions.


    Block change tracking is another feature designed to speed up the performance
    of incremental backups. The idea here is that an OS file is used to record which
    blocks have changed since the last backup. RMAN can use the block change tracking
    file to quickly identify which blocks need to be backed up when performing incremental
    backups. This feature can greatly improve the performance of incremental backups.


    Taking Incremental-Level Backups


    RMAN implements incremental backups through levels. Starting with Oracle 10g,
    there are only two documented levels of incremental backups: level 0 and level
    1\. Prior versions of Oracle offer five levels, 0–4\. These levels (0–4) are still
    available but are not specified in the Oracle documentation. You must first take
    a level 0 incremental backup to establish a baseline, after which you can take
    a level 1 incremental backup.


    ![Image](images/sq.jpg) **Note**  A full backup backs up the same blocks as a
    level 0 backup. However, you can’t use a full backup with incremental backups.
    Furthermore, you have to start an incremental backup strategy with a level 0 backup.
    If you attempt to take a level 1 backup, and no level 0 exists, RMAN will automatically
    take a level 0 backup.


    Here is an example of taking an incremental level 0 backup:


    ```

    RMAN> backup incremental level=0 database;

    ```


    Suppose for the next several backups you want to back up only the blocks that
    have changed since the last incremental backup. This line of code takes a level
    1 backup:


    ```

    RMAN> backup incremental level=1 database;

    ```


    There are two different types of incremental backups: differential and cumulative.
    Which type you use depends on your requirements. Differential backups (the default)
    are smaller but take more time to recover from. Cumulative backups are larger
    than differential backups but require less recovery time.


    A differential incremental level 1 backup instructs RMAN to back up blocks that
    have changed since the last level 1 or level 0 backup, whereas a cumulative incremental
    level 1 backup instructs RMAN to back up blocks that have changed since the last
    level 0 backup. Cumulative incremental backups, in effect, ignore any level 1
    incremental backups.


    ![Image](images/sq.jpg) **Note**  The RMAN incremental level 0 backups are used
    to restore the data files, whereas the RMAN incremental level 1 backups are used
    to recover the data files.


    When using incremental backups, I almost always use the default, of differential.
    Usually, I don’t worry about the differences between differential and cumulative
    backups. If you require cumulative backups, you must specify the key word `CUMULATIVE`.
    Here is an example of taking a cumulative level 1 backup:


    ```

    RMAN> backup incremental level=1 cumulative database;

    ```


    Here are some examples of taking incremental backups at a more granular level
    than the database:'
  trans: "\n您还可以指示 RMAN 编录恢复区（FRA）中控制文件当前未知的任何文件，如下所示：\n\n```\nRMAN> catalog recovery\
    \ area;\n```\n\n此外，您可以编录特定文件。此示例指示 RMAN 为特定的备份片文件向控制文件添加元数据：\n\n```\nRMAN> catalog\
    \ backuppiece '/u01/O12C/rman/r159nv562v_1_1.bk';\n```\n\n## 备份可插拔数据库\n\n从 Oracle\
    \ 12c 开始，您可以在根容器数据库中创建可插拔数据库。如果使用此选项，关于备份需要了解几个特性：\n\n*   当连接到根容器时，您可以备份数据库内的所有数据文件，或仅备份根数据库数据文件；特定的可插拔数据库；或特定的表空间或数据文件，或这些的组合。\n\
    *   当连接到可插拔数据库时，您只能备份与该数据库关联的数据文件。\n\n项目符号项的详细说明见以下两个部分。\n\n### 连接到根容器时\n\n假设您以\
    \ `SYS` 身份连接到根容器，并希望备份所有数据文件（包括任何有关联的可插拔数据库的数据文件）。首先，验证您确实是以 `SYS` 身份连接到根容器：\n\
    \n```\nRMAN> SELECT SYS_CONTEXT('USERENV', 'CON_ID')   AS con_id,\n       SYS_CONTEXT('USERENV',\
    \ 'CON_NAME')       AS cur_container,\n       SYS_CONTEXT('USERENV', 'CURRENT_SCHEMA')\
    \ AS cur_user\n       FROM DUAL;\n```\n\n以下是一些示例输出：\n\n```\nCON_ID           \
    \    CUR_CONTAINER        CUR_USER\n-------------------- --------------------\
    \ --------------------\n1                    CDB$ROOT             SYS\n```\n\n\
    现在，要备份所有数据文件，包括根容器和任何关联的可插拔数据库中的，请按如下方式操作：\n\n```\nRMAN> backup database;\n```\n\
    \n如果您只想备份与根容器关联的数据文件，则指定 `ROOT`：\n\n```\nRMAN> backup database root;\n```\n\n\
    您也可以备份特定的可插拔数据库：\n\n```\nRMAN> backup pluggable database salespdb;\n```\n\n此外，您可以备份可插拔数据库内的特定表空间：\n\
    \n```\nRMAN> backup tablespace SALESPDB:SALES;\n```\n\n并且，您可以指定文件名来备份根容器或关联的可插拔数据库中的任何数据文件：\n\
    \n```\nRMAN> backup datafile '/ora01/app/oracle/oradata/CDB/salespdb/sales01.dbf';\n\
    ```\n\n### 连接到可插拔数据库时\n\n首先，启动 RMAN，并连接到您想要备份的可插拔数据库。您必须以具有 `SYSDBA` 或 `SYSBACKUP`\
    \ 权限的用户身份连接。此外，必须有侦听器正在运行并存在口令文件。此示例连接到 `SALESPDB` 可插拔数据库：\n\n```\n$ rman target\
    \ sys/foo@salespdb\n```\n\n一旦连接到可插拔数据库，您只能备份特定于该数据库的数据文件。因此，对于此示例，以下命令仅备份与 `SALESPDB`\
    \ 可插拔数据库关联的数据文件：\n\n```\nRMAN> backup database;\n```\n\n此示例备份与可插拔数据库 `SYSTEM`\
    \ 表空间关联的数据文件：\n\n```\nRMAN> backup tablespace system;\n```\n\n我需要再次强调，当您直接连接到可插拔数据库时，您只能备份与该数据库关联的数据文件。您无法备份与根容器关联或容器内任何其他可插拔数据库关联的数据文件。图\
    \ 5-1 说明了这一概念。以 `SYSDBA` 身份连接到 `SALESPDB` 可插拔数据库只能备份和查看与该数据库相关的数据文件。该 `SYSDBA`\
    \ 连接在数据文件和 RMAN 数据文件备份方面无法看到其可插拔“盒子”之外的内容。相比之下，到根容器的 `SYSDBA` 连接可以备份所有数据文件（根、种子和所有可插拔数据库），以及访问从连接到可插拔数据库发起的\
    \ RMAN 备份。\n\n![9781484207642_Fig05-01.jpg](img/9781484207642_Fig05-01.jpg)\n\n\
    图 5-1. `SYSDBA` 连接到根容器与 `SYSDBA` 连接到可插拔数据库的权限范围\n\n## 创建增量备份\n\nRMAN 有三个独立且不同的增量备份特性：\n\
    \n*   增量级别备份\n*   增量更新备份\n*   块更改跟踪\n\n使用增量级别备份，RMAN 仅备份自上次备份以来已修改的块。增量备份可应用于整个数据库、表空间或数据文件。增量级别备份是\
    \ RMAN 中最常用的增量特性。\n\n增量更新备份是与增量级别备份分开的一个特性。这些备份获取数据文件的映像副本，然后使用增量备份来更新这些映像副本。这为您提供了一种在备份策略中实施和维护映像副本的高效方式。您只需进行一次映像副本备份，然后使用增量备份使映像副本保持最新事务的更新。\n\
    \n块更改跟踪是另一个旨在加速增量备份性能的特性。其思路是使用一个操作系统文件来记录自上次备份以来哪些块已更改。RMAN 可以使用块更改跟踪文件在执行增量备份时快速识别需要备份的块。此特性可以极大地提高增量备份的性能。\n\
    \n### 执行增量级别备份\n\nRMAN 通过级别实现增量备份。从 Oracle 10g 开始，只有两个有文档记载的增量备份级别：级别 0 和级别 1。Oracle\
    \ 的早期版本提供五个级别（0-4）。这些级别（0-4）仍然可用，但未在 Oracle 文档中指定。您必须首先执行级别 0 增量备份以建立基线，之后才能执行级别\
    \ 1 增量备份。\n\n![Image](img/sq.jpg) > **注意** > 完全备份备份与级别 0 备份相同的块。但是，您不能将完全备份与增量备份一起使用。此外，您必须从级别\
    \ 0 备份开始增量备份策略。如果您尝试执行级别 1 备份，但不存在级别 0 备份，RMAN 将自动执行级别 0 备份。\n\n以下是执行增量级别 0 备份的示例：\n\
    \n```\nRMAN> backup incremental level=0 database;\n```\n\n假设在接下来的几次备份中，您只想备份自上次增量备份以来已更改的块。以下代码执行级别\
    \ 1 备份：\n\n```\nRMAN> backup incremental level=1 database;\n```\n\n增量备份有两种不同的类型：差异备份和累积备份。您使用哪种类型取决于您的需求。差异备份（默认）较小，但恢复需要更多时间。累积备份比差异备份大，但需要的恢复时间更少。\n\
    \n差异增量级别 1 备份指示 RMAN 备份自上次级别 1 或级别 0 备份以来已更改的块，而累积增量级别 1 备份指示 RMAN 备份自上次级别 0 备份以来已更改的块。累积增量备份实际上会忽略任何级别\
    \ 1 增量备份。\n\n![Image](img/sq.jpg) > **注意** > RMAN 增量级别 0 备份用于还原数据文件，而 RMAN 增量级别\
    \ 1 备份用于恢复数据文件。\n\n当使用增量备份时，我几乎总是使用默认的差异备份。通常，我不太担心差异备份和累积备份之间的区别。如果您需要累积备份，则必须指定关键字\
    \ `CUMULATIVE`。以下是执行累积级别 1 备份的示例：\n\n```\nRMAN> backup incremental level=1 cumulative\
    \ database;\n```\n\n以下是一些在比数据库更细粒度的级别上执行增量备份的示例：\n"
- fmt: "```\nRMAN> backup incremental level=0 tablespace sysaux;\nRMAN> backup incremental\
    \ level=1 tablespace sysaux plus archivelog;\nRMAN> backup incremental from scn\
    \ 4343352 datafile 3;\n```\n\n## Making Incrementally Updating Backups\n\nThe\
    \ basic idea behind an incrementally updating backup is to create image copies\
    \ of data files and then use incremental backups to update the image copies. In\
    \ this manner, you have image copies of your database that are kept somewhat current.\
    \ This can be an efficient way to combine image copy backups with incremental\
    \ backups.\n\nTo understand how this backup technique works, you’ll need to inspect\
    \ the commands that perform an incrementally updating backup. The following lines\
    \ of RMAN code are required to enable this feature:\n\n```\nrun{recover copy of\
    \ database with tag 'incupdate';\nbackup incremental level 1 for recover of copy\
    \ with tag 'incupdate' database;}\n```\n\nIn the first line a tag is specified\
    \ (this example uses `incupdate`). You can use whatever you want for the tag name;\
    \ the tag name lets RMAN associate the backup files being used each time the commands\
    \ are run. This code will perform as follows the first time you run the script:\n\
    \n*   `RECOVER COPY` generates a message saying there’s nothing for it to do.\n\
    *   If no image copies exist, the `BACKUP INCREMENTAL` creates an image copy of\
    \ the database data files.\n\nYou should see messages such as this in the output\
    \ when the `RECOVER COPY` and `BACKUP INCREMENTAL` commands run the first time:\n\
    \n```\nno copy of datafile 1 found to recover\n...\nno parent backup or copy of\
    \ datafile 1 found\n...\n```\n\nThe second time you run the incrementally updating\
    \ backup, it does as follows:\n\n*   `RECOVER COPY` again generates a message\
    \ saying it has nothing to do.\n*   `BACKUP INCREMENTAL` makes an incremental\
    \ level 1 backup and assigns it the tag name specified; this backup will subsequently\
    \ be used by the `RECOVER COPY` command.\n\nThe third time you run the incrementally\
    \ updating backup, it does this:\n\n*   Now that an incremental backup has been\
    \ created, the `RECOVER COPY` applies the incremental backup to the image copies.\n\
    *   `BACKUP INCREMENTAL` makes an incremental level 1 backup and assigns it the\
    \ tag name specified; this backup will subsequently be used by the `RECOVER COPY`\
    \ command.\n\nGoing forward, each time you run the two lines of code, you will\
    \ have a regularly repeating backup pattern. If you use image copies for backups,\
    \ you might consider using an incrementally updating backup strategy, because\
    \ with it, you avoid creating entire image copies whenever the backup runs. The\
    \ image copies are updated each time the backup runs with the incremental changes\
    \ from the previous backup.\n\n## Using Block Change Tracking\n\nBlock change\
    \ tracking is the process in which a binary file is used to record changes to\
    \ database data file blocks. The idea is that incremental backup performance can\
    \ be improved because RMAN can use the block change tracking file to pinpoint\
    \ which blocks have changed since the last backup. This saves a great deal of\
    \ time because otherwise RMAN would have to scan all the blocks that had been\
    \ backed up to determine if they’d changed since the last backup.\n\nListed next\
    \ are the steps for enabling block change tracking:\n\n1.  If not already enabled,\
    \ set the `DB_CREATE_FILE_DEST` parameter to a location (that already exists on\
    \ disk); for example,\n\n    ```\n    SQL> alter system set db_create_file_dest='/u01/O12C/bct'\
    \ scope=both;\n    ```\n\n2.  Enable block change tracking via the `ALTER DATABASE`\
    \ command:\n\n    ```\n    SQL> alter database enable block change tracking;\n\
    \    ```\n\nThis example creates a file with an OMF name in the directory specified\
    \ by `DB_CREATE_FILE_DEST`. In this example the file created is given this name:\n\
    \n```\n/u01/O12C/bct/O12C/changetracking/o1_mf_8h0wmng1_.chg\n```\n\nYou can also\
    \ enable block change tracking by directly specifying a file name, which does\
    \ not require that `DB_CREATE_FILE_DEST` be set; for example,\n\n```\nSQL> alter\
    \ database enable block change tracking using file '/u01/O12C/bct/btc.bt';\n```\n\
    \nYou can verify the details of block change tracking by running the following\
    \ query:\n\n```\nSQL> select * from v$block_change_tracking;\n```\n\nFor space-planning\
    \ purposes, the size of the block change tracking file is approximately 1/30,000\
    \ the size of the total size of the blocks being tracked in the database. Therefore,\
    \ the size of the block change tracking file is proportional to the size of the\
    \ database and not to the amount of redo generated.\n\nTo disable block change\
    \ tracking, run this command:\n\n```\nSQL> alter database disable block change\
    \ tracking;\n```\n\n`Note` When you disable block change tracking, Oracle will\
    \ automatically delete the block change tracking file.\n\n## Checking for Corruption\
    \ in Data Files and Backups\n\nYou can use RMAN to check for corruption in data\
    \ files, archive redo logs, and control files. You can also verify whether a backup\
    \ set is restorable. The RMAN `VALIDATE` command is used to perform these types\
    \ of integrity checks. There are three ways you can run the `VALIDATE` command:\n\
    \n*   `VALIDATE`\n*   `BACKUP...VALIDATE`\n*   `RESTORE...VALIDATE`\n\n`Note`\
    \ The stand-alone `VALIDATE` command is available in Oracle 11g and higher. The\
    \ `BACKUP...VALIDATE` and `RESTORE...VALIDATE` commands are available in Oracle\
    \ 10g and higher.\n\n### Using VALIDATE\n\nThe `VALIDATE` command can be used\
    \ stand-alone to check for missing files or physical corruption in database data\
    \ files, archive redo log files, control files, `spfile`s, and backup set pieces.\
    \ For example, this command will validate all data files and the control files:\n\
    \n```\nRMAN> validate database;\n```\n\nYou can also validate just the control\
    \ file, as follows:\n\n```\nRMAN> validate current controlfile;\n```\n\nYou can\
    \ validate the archive redo log files, like so:\n\n```\nRMAN> validate archivelog\
    \ all;\n```\n\nYou may want to combine all the prior integrity checks into one\
    \ command, as shown:\n\n```\nRMAN> validate database include current controlfile\
    \ plus archivelog;\n```\n\nUnder normal conditions the `VALIDATE` command only\
    \ checks for physical corruption. You can specify that you also want to check\
    \ for logical corruption by using the `CHECK LOGICAL` clause:\n\n```\nRMAN> validate\
    \ check logical database include current controlfile plus archivelog;\n```\n\n\
    `VALIDATE` has a variety of uses. Here are a few more examples:\n\n```\nRMAN>\
    \ validate database skip offline;\nRMAN> validate copy of database;\nRMAN> validate\
    \ tablespace system;\nRMAN> validate datafile 3 block 20 to 30;\nRMAN> validate\
    \ spfile;\nRMAN> validate backupset <primary_key_value>;\nRMAN> validate recovery\
    \ area;\n```\n\nIf you’re using the Oracle 12c pluggable database feature, you\
    \ can validate specific databases within the container. While connected as `SYS`\
    \ to the root container, validate any associated pluggable databases:\n\n```\n\
    RMAN> validate pluggable database salespdb;\n```\n\nIf RMAN detects any corrupt\
    \ blocks, the `V$DATABASE_BLOCK_CORRUPTION` is populated. This view contains information\
    \ on the file number, block number, and number of blocks affected. You can use\
    \ this information to perform a block-level recovery (see [Chapter 6](#9781484207642_Ch06.xhtml)\
    \ for more details).\n\n`Note` Physical corruption is a change to a block, such\
    \ that its contents don’t match the physical format that Oracle expects. By default,\
    \ RMAN checks for physical corruption when backing up, restoring, and validating\
    \ data files. With logical corruption, a block is in the correct format, but the\
    \ contents aren’t consistent with what Oracle expects, such as in a row piece\
    \ or an index entry.\n\n### Using BACKUP...VALIDATE\n\nThe `BACKUP...VALIDATE`\
    \ command is very similar to the `VALIDATE` command, in that it can check to see\
    \ if data files are available and if the data files contain any corrupt blocks;\
    \ for example,\n\n```\nRMAN> backup validate database;\n```"
  raw: "```\nRMAN> backup incremental level=0 tablespace sysaux;\nRMAN> backup incremental\
    \ level=1 tablespace sysaux plus archivelog;\nRMAN> backup incremental from scn\
    \ 4343352 datafile 3;\n```\n\nMaking Incrementally Updating Backups\n\nThe basic\
    \ idea behind an incrementally updating backup is to create image copies of data\
    \ files and then use incremental backups to update the image copies. In this manner,\
    \ you have image copies of your database that are kept somewhat current. This\
    \ can be an efficient way to combine image copy backups with incremental backups.\n\
    \nTo understand how this backup technique works, you’ll need to inspect the commands\
    \ that perform an incrementally updating backup. The following lines of RMAN code\
    \ are required to enable this feature:\n\n```\nrun{recover copy of database with\
    \ tag 'incupdate';\nbackup incremental level 1 for recover of copy with tag 'incupdate'\
    \ database;}\n```\n\nIn the first line a tag is specified (this example uses `incupdate`)`.`\
    \ You can use whatever you want for the tag name; the tag name lets RMAN associate\
    \ the backup files being used each time the commands are run. This code will perform\
    \ as follows the first time you run the script:\n\n*   `RECOVER COPY` generates\
    \ a message saying there’s nothing for it to do.\n*   If no image copies exist,\
    \ the `BACKUP INCREMENTAL` creates an image copy of the database data files.\n\
    \nYou should see messages such as this in the output when the `RECOVER COPY` and\
    \ `BACKUP INCREMENTAL` commands run the first time:\n\n```\nno copy of datafile\
    \ 1 found to recover\n...\nno parent backup or copy of datafile 1 found\n...\n\
    ```\n\nThe second time you run the incrementally updating backup, it does as follows:\n\
    \n*   `RECOVER COPY` again generates a message saying it has nothing to do.\n\
    *   `BACKUP INCREMENTAL` makes an incremental level 1 backup and assigns it the\
    \ tag name specified; this backup will subsequently be used by the `RECOVER COPY`\
    \ command.\n\nThe third time you run the incrementally updating backup, it does\
    \ this:\n\n*   Now that an incremental backup has been created, the `RECOVER COPY`\
    \ applies the incremental backup to the image copies.\n*   `BACKUP INCREMENTAL`\
    \ makes an incremental level 1 backup and assigns it the tag name specified; this\
    \ backup will subsequently be used by the `RECOVER COPY` command.\n\nGoing forward,\
    \ each time you run the two lines of code, you will have a regularly repeating\
    \ backup pattern. If you use image copies for backups, you might consider using\
    \ an incrementally updating backup strategy, because with it, you avoid creating\
    \ entire image copies whenever the backup runs. The image copies are updated each\
    \ time the backup runs with the incremental changes from the previous backup.\n\
    \nUsing Block Change Tracking\n\nBlock change tracking is the process in which\
    \ a binary file is used to record changes to database data file blocks. The idea\
    \ is that incremental backup performance can be improved because RMAN can use\
    \ the block change tracking file to pinpoint which blocks have changed since the\
    \ last backup. This saves a great deal of time because otherwise RMAN would have\
    \ to scan all the blocks that had been backed up to determine if they’d changed\
    \ since the last backup.\n\nListed next are the steps for enabling block change\
    \ tracking:\n\n1.  If not already enabled, set the `DB_CREATE_FILE_DEST` parameter\
    \ to a location (that already exists on disk); for example,\n\n```\n    SQL> alter\
    \ system set db_create_file_dest='/u01/O12C/bct' scope=both;\n    ```\n\n2.  Enable\
    \ block change tracking via the `ALTER DATABASE` command:\n\n```\n    SQL> alter\
    \ database enable block change tracking;\n    ```\n\nThis example creates a file\
    \ with an OMF name in the directory specified by `DB_CREATE_FILE_DEST`. In this\
    \ example the file created is given this name:\n\n```\n/u01/O12C/bct/O12C/changetracking/o1_mf_8h0wmng1_.chg\n\
    ```\n\nYou can also enable block change tracking by directly specifying a file\
    \ name, which does not require that `DB_CREATE_FILE_DEST` be set; for example,\n\
    \n```\nSQL> alter database enable block change tracking using file '/u01/O12C/bct/btc.bt';\n\
    ```\n\nYou can verify the details of block change tracking by running the following\
    \ query:\n\n```\nSQL> select * from v$block_change_tracking;\n```\n\nFor space-planning\
    \ purposes, the size of the block change tracking file is approximately 1/30,000\
    \ the size of the total size of the blocks being tracked in the database. Therefore,\
    \ the size of the block change tracking file is proportional to the size of the\
    \ database and not to the amount of redo generated.\n\nTo disable block change\
    \ tracking, run this command:\n\n```\nSQL> alter database disable block change\
    \ tracking;\n```\n\n![Image](images/sq.jpg) **Note**  When you disable block change\
    \ tracking, Oracle will automatically delete the block change tracking file.\n\
    \nChecking for Corruption in Data Files and Backups\n\nYou can use RMAN to check\
    \ for corruption in data files, archive redo logs, and control files. You can\
    \ also verify whether a backup set is restorable. The RMAN `VALIDATE` command\
    \ is used to perform these types of integrity checks. There are three ways you\
    \ can run the `VALIDATE` command:\n\n*   `VALIDATE`\n*   `BACKUP...VALIDATE`\n\
    *   `RESTORE...VALIDATE`\n\n![Image](images/sq.jpg) **Note**  The stand-alone\
    \ `VALIDATE` command is available in Oracle 11g and higher. The `BACKUP...VALIDATE`\
    \ and `RESTORE...VALIDATE` commands are available in Oracle 10g and higher.\n\n\
    Using VALIDATE\n\nThe `VALIDATE` command can be used stand-alone to check for\
    \ missing files or physical corruption in database data files, archive redo log\
    \ files, control files, `spfile`s, and backup set pieces. For example, this command\
    \ will validate all data files and the control files:\n\n```\nRMAN> validate database;\n\
    ```\n\nYou can also validate just the control file, as follows:\n\n```\nRMAN>\
    \ validate current controlfile;\n```\n\nYou can validate the archive redo log\
    \ files, like so:\n\n```\nRMAN> validate archivelog all;\n```\n\nYou may want\
    \ to combine all the prior integrity checks into one command, as shown:\n\n```\n\
    RMAN> validate database include current controlfile plus archivelog;\n```\n\n\
    Under normal conditions the `VALIDATE` command only checks for physical corruption.\
    \ You can specify that you also want to check for logical corruption by using\
    \ the `CHECK LOGICAL` clause:\n\n```\nRMAN> validate check logical database include\
    \ current controlfile plus archivelog;\n```\n\n`VALIDATE` has a variety of uses.\
    \ Here are a few more examples:\n\n```\nRMAN> validate database skip offline;\n\
    RMAN> validate copy of database;\nRMAN> validate tablespace system;\nRMAN> validate\
    \ datafile 3 block 20 to 30;\nRMAN> validate spfile;\nRMAN> validate backupset\
    \ <primary_key_value>;\nRMAN> validate recovery area;\n```\n\nIf you’re using\
    \ the Oracle 12c pluggable database feature, you can validate specific databases\
    \ within the container. While connected as `SYS` to the root container, validate\
    \ any associated pluggable databases:\n\n```\nRMAN> validate pluggable database\
    \ salespdb;\n```\n\nIf RMAN detects any corrupt blocks, the `V$DATABASE_BLOCK_CORRUPTION`\
    \ is populated. This view contains information on the file number, block number,\
    \ and number of blocks affected. You can use this information to perform a block-level\
    \ recovery (see [Chapter 6](#9781484207642_Ch06.xhtml) for more details).\n\n\
    ![Image](images/sq.jpg) **Note**  Physical corruption is a change to a block,\
    \ such that its contents don’t match the physical format that Oracle expects.\
    \ By default, RMAN checks for physical corruption when backing up, restoring,\
    \ and validating data files. With logical corruption, a block is in the correct\
    \ format, but the contents aren’t consistent with what Oracle expects, such as\
    \ in a row piece or an index entry.\n\nUsing BACKUP...VALIDATE\n\nThe `BACKUP...VALIDATE`\
    \ command is very similar to the `VALIDATE` command, in that it can check to see\
    \ if data files are available and if the data files contain any corrupt blocks;\
    \ for example,\n\n```\nRMAN> backup validate database;\n```"
  trans: "\n```\nRMAN> backup incremental level=0 tablespace sysaux;\nRMAN> backup\
    \ incremental level=1 tablespace sysaux plus archivelog;\nRMAN> backup incremental\
    \ from scn 4343352 datafile 3;\n```\n\n## 制作增量更新备份\n\n增量更新备份的基本思路是创建数据文件的映像副本，然后使用增量备份来更新这些映像副本。这样，你就能拥有一个基本保持最新的数据库映像副本。这是一种将映像副本备份与增量备份高效结合的方法。\n\
    \n要理解这种备份技术的工作原理，你需要查看执行增量更新备份所需的命令。启用此功能需要以下 RMAN 代码行：\n\n```\nrun{recover copy\
    \ of database with tag 'incupdate';\nbackup incremental level 1 for recover of\
    \ copy with tag 'incupdate' database;}\n```\n\n第一行指定了一个标签（本例使用 `incupdate`）。标签名可以任意设置；它让\
    \ RMAN 能够关联每次运行命令时所使用的备份文件。这段代码在你首次运行脚本时将执行如下操作：\n\n*   `RECOVER COPY` 会生成一条消息，说明无需执行任何操作。\n\
    *   如果不存在映像副本，`BACKUP INCREMENTAL` 将创建数据库数据文件的映像副本。\n\n首次运行 `RECOVER COPY` 和 `BACKUP\
    \ INCREMENTAL` 命令时，输出中应会看到类似以下的消息：\n\n```\nno copy of datafile 1 found to recover\n\
    ...\nno parent backup or copy of datafile 1 found\n...\n```\n\n第二次运行增量更新备份时，它将执行以下操作：\n\
    \n*   `RECOVER COPY` 再次生成一条消息，说明无需执行任何操作。\n*   `BACKUP INCREMENTAL` 创建一个增量级别 1\
    \ 的备份，并为其分配指定的标签名；此备份随后将被 `RECOVER COPY` 命令使用。\n\n第三次运行增量更新备份时，它将执行以下操作：\n\n*\
    \   此时增量备份已创建，`RECOVER COPY` 会将此增量备份应用到映像副本上。\n*   `BACKUP INCREMENTAL` 创建一个增量级别\
    \ 1 的备份，并为其分配指定的标签名；此备份随后将被 `RECOVER COPY` 命令使用。\n\n今后，每次运行这两行代码时，你都将遵循一个定期重复的备份模式。如果你使用映像副本进行备份，可以考虑采用增量更新备份策略，因为通过它，你可以避免在每次备份运行时都创建完整的映像副本。每次备份运行时，映像副本都会根据前一次备份的增量变化进行更新。\n\
    \n## 使用块更改跟踪\n\n块更改跟踪是一个使用二进制文件记录数据库数据文件块更改的过程。其理念是改进增量备份的性能，因为 RMAN 可以使用块更改跟踪文件来精确定位自上次备份以来哪些块发生了更改。这节省了大量时间，因为否则\
    \ RMAN 将不得不扫描所有已备份的块以确定它们是否自上次备份以来发生了更改。\n\n启用块更改跟踪的步骤如下：\n\n1.  如果尚未启用，请将 `DB_CREATE_FILE_DEST`\
    \ 参数设置为磁盘上已存在的一个位置；例如，\n\n    ```\n    SQL> alter system set db_create_file_dest='/u01/O12C/bct'\
    \ scope=both;\n    ```\n\n2.  通过 `ALTER DATABASE` 命令启用块更改跟踪：\n\n    ```\n    SQL>\
    \ alter database enable block change tracking;\n    ```\n\n此示例在 `DB_CREATE_FILE_DEST`\
    \ 指定的目录中创建一个具有 OMF 名称的文件。本例中创建的文件被赋予此名称：\n\n```\n/u01/O12C/bct/O12C/changetracking/o1_mf_8h0wmng1_.chg\n\
    ```\n\n你也可以通过直接指定文件名来启用块更改跟踪，这不需要设置 `DB_CREATE_FILE_DEST`；例如，\n\n```\nSQL> alter\
    \ database enable block change tracking using file '/u01/O12C/bct/btc.bt';\n```\n\
    \n你可以通过运行以下查询来验证块更改跟踪的详细信息：\n\n```\nSQL> select * from v$block_change_tracking;\n\
    ```\n\n出于空间规划目的，块更改跟踪文件的大小大约是被跟踪的数据库块总大小的 1/30,000。因此，块更改跟踪文件的大小与数据库的大小成正比，而与生成的重做量无关。\n\
    \n要禁用块更改跟踪，请运行此命令：\n\n```\nSQL> alter database disable block change tracking;\n\
    ```\n\n`注意` 当你禁用块更改跟踪时，Oracle 会自动删除块更改跟踪文件。\n\n## 检查数据文件和备份中的损坏\n\n你可以使用 RMAN\
    \ 来检查数据文件、归档重做日志和控制文件中的损坏情况。你还可以验证备份集是否可恢复。RMAN `VALIDATE` 命令用于执行这些类型的完整性检查。运行\
    \ `VALIDATE` 命令有三种方式：\n\n*   `VALIDATE`\n*   `BACKUP...VALIDATE`\n*   `RESTORE...VALIDATE`\n\
    \n`注意` 独立的 `VALIDATE` 命令在 Oracle 11g 及更高版本中可用。`BACKUP...VALIDATE` 和 `RESTORE...VALIDATE`\
    \ 命令在 Oracle 10g 及更高版本中可用。\n\n### 使用 VALIDATE\n\n`VALIDATE` 命令可独立使用，用于检查数据库数据文件、归档重做日志文件、控制文件、`spfile`\
    \ 和备份集片段中是否存在缺失文件或物理损坏。例如，此命令将验证所有数据文件和控制文件：\n\n```\nRMAN> validate database;\n\
    ```\n\n你也可以只验证控制文件，如下所示：\n\n```\nRMAN> validate current controlfile;\n```\n\n\
    你可以像这样验证归档重做日志文件：\n\n```\nRMAN> validate archivelog all;\n```\n\n你可能希望将所有先前的完整性检查合并为一个命令，如下所示：\n\
    \n```\nRMAN> validate database include current controlfile plus archivelog;\n\
    ```\n\n在正常情况下，`VALIDATE` 命令仅检查物理损坏。你可以通过使用 `CHECK LOGICAL` 子句来指定你还想检查逻辑损坏：\n\n\
    ```\nRMAN> validate check logical database include current controlfile plus archivelog;\n\
    ```\n\n`VALIDATE` 有多种用途。以下是另外一些示例：\n\n```\nRMAN> validate database skip offline;\n\
    RMAN> validate copy of database;\nRMAN> validate tablespace system;\nRMAN> validate\
    \ datafile 3 block 20 to 30;\nRMAN> validate spfile;\nRMAN> validate backupset\
    \ <primary_key_value>;\nRMAN> validate recovery area;\n```\n\n如果你使用的是 Oracle 12c\
    \ 的可插拔数据库功能，你可以验证容器中的特定数据库。以 `SYS` 身份连接到根容器后，验证任何关联的可插拔数据库：\n\n```\nRMAN> validate\
    \ pluggable database salespdb;\n```\n\n如果 RMAN 检测到任何损坏的块，`V$DATABASE_BLOCK_CORRUPTION`\
    \ 视图将被填充。此视图包含有关文件号、块号和受影响块数的信息。你可以使用此信息来执行块级别的恢复（详情请参见 第 6 章）。\n\n`注意` 物理损坏是指块的更改导致其内容与\
    \ Oracle 预期的物理格式不匹配。默认情况下，RMAN 在备份、恢复和验证数据文件时会检查物理损坏。对于逻辑损坏，块的格式正确，但其内容与 Oracle\
    \ 预期的不一致，例如在行片或索引条目中。\n\n### 使用 BACKUP...VALIDATE\n\n`BACKUP...VALIDATE` 命令与 `VALIDATE`\
    \ 命令非常相似，它可以检查数据文件是否可用以及数据文件是否包含任何损坏的块；例如，\n\n```\nRMAN> backup validate database;\n\
    ```\n"
- fmt: "# RMAN 备份与恢复目录管理\n\n## 使用 `BACKUP...VALIDATE` 命令\n\n此命令实际上不会创建任何备份文件；它仅读取数据文件并检查是否损坏。与\
    \ `VALIDATE` 命令类似，`BACKUP VALIDATE` 默认只检查物理损坏。你也可以指示它同时检查逻辑损坏，如下所示：\n\n```\nRMAN>\
    \ backup validate check logical database;\n```\n\n以下是 `BACKUP...VALIDATE` 命令的一些变体：\n\
    \n```\nRMAN> backup validate database current controlfile;\nRMAN> backup validate\
    \ check logical database current controlfile plus archivelog;\n```\n\n同样，与 `VALIDATE`\
    \ 命令类似，`BACKUP...VALIDATE` 如果检测到任何损坏的数据块，将会填充 `V$DATABASE_BLOCK_CORRUPTION` 视图。该视图中的信息可用于确定哪些块可能通过块级恢复进行修复（详见[第6章](#9781484207642_Ch06.xhtml)）。\n\
    \n## 使用 `RESTORE...VALIDATE` 命令\n\n`RESTORE...VALIDATE` 命令用于验证恢复操作中将使用的备份文件。此命令验证备份集、数据文件副本和归档重做日志文件：\n\
    \n```\nRMAN> restore validate database;\n```\n\n使用 `RESTORE...VALIDATE` 时不会实际恢复任何文件。这意味着你可以在数据库处于联机可用状态时运行该命令。\n\
    \n## 使用恢复目录\n\n当你使用恢复目录时，可以在与目标数据库相同的数据库、同一台服务器上创建恢复目录用户。但是，不建议采用这种方法，因为你肯定不希望目标数据库或其所在服务器的可用性影响到恢复目录。因此，你应该在与目标数据库不同的服务器上创建恢复目录数据库。\n\
    \n### 创建恢复目录\n\n当我使用恢复目录时，我倾向于拥有一个专用的、仅用于恢复目录的数据库。这确保了恢复目录不会受到其他应用程序所需的维护或停机的影响（反之亦然）。\n\
    \n以下是创建恢复目录的步骤：\n\n1.  在与目标数据库不同的服务器上创建一个用于恢复目录的数据库。确保数据库大小足够。我发现 Oracle 推荐的大小通常都太小。以下是一些合适的建议：\n\
    \n    `SYSTEM` 表空间：500MB\n    `SYSAUX` 表空间：500MB\n    `TEMP` 表空间：500MB\n    `UNDO`\
    \ 表空间：500MB\n    在线重做日志：每个25MB；三组，每组两个成员（多路复用）\n    `RECCAT` 表空间：500MB\n\n2. \
    \ 创建一个供恢复目录用户使用的表空间。我建议给表空间起一个诸如 `RECCAT` 这样的名字，以便它能被轻松识别为包含恢复目录元数据的表空间：\n\n \
    \   ```\n    CREATE TABLESPACE reccat\n      DATAFILE '/u01/dbfile/O12C/reccat01.dbf'\
    \ SIZE 500M\n      EXTENT MANAGEMENT LOCAL UNIFORM SIZE 128k\n      SEGMENT SPACE\
    \ MANAGEMENT AUTO;\n    ```\n\n3.  创建一个用户，该用户将拥有用于存储目标数据库元数据的表和其他对象。我建议给恢复目录用户起一个诸如\
    \ `RCAT` 这样的名字，以便它能被轻松识别为拥有恢复目录对象的用户。此外，向 `RCAT` 用户授予 `RECOVERY_CATALOG_OWNER`\
    \ 角色以及 `CREATE SESSION` 权限：\n\n    ```\n    CREATE USER rcat IDENTIFIED BY foo\n\
    \    TEMPORARY TABLESPACE temp\n    DEFAULT TABLESPACE reccat\n    QUOTA UNLIMITED\
    \ ON reccat;\n    --\n    GRANT RECOVERY_CATALOG_OWNER TO rcat;\n    GRANT CREATE\
    \ SESSION TO rcat;\n    ```\n\n4.  通过 RMAN 以 `RCAT` 用户身份连接，并创建恢复目录对象：\n\n    ```\n\
    \    $ rman catalog rcat/foo\n    ```\n\n5.  现在，运行 `CREATE CATALOG` 命令：\n\n  \
    \  ```\n    RMAN> create catalog;\n    RMAN> exit;\n    ```\n\n6.  此命令可能需要几分钟才能运行完成。完成后，你可以通过以下查询验证表是否已创建：\n\
    \n    ```\n    $ sqlplus rcat/foo\n    SQL> select table_name from user_tables;\n\
    \    ```\n\n7.  以下是部分输出示例："
  raw: "This command doesn’t actually create any backup files; it only reads the data\
    \ files and checks for corruption. Like the `VALIDATE` command, `BACKUP VALIDATE`,\
    \ by default, only checks for physical corruption. You can instruct it to check\
    \ as well for logical corruption, as shown:\n\n```\nRMAN> backup validate check\
    \ logical database;\n```\n\nHere are some variations of the `BACKUP...VALIDATE`\
    \ command:\n\n```\nRMAN> backup validate database current controlfile;\nRMAN>\
    \ backup validate check logical database current controlfile plus archivelog;\n\
    ```\n\nAlso like the `VALIDATE` command, `BACKUP...VALIDATE` will populate `V$DATABASE_BLOCK_CORRUPTION`\
    \ if it detects any corrupt blocks. The information in this view can be used to\
    \ determine which blocks can potentially be restored by block-level recovery (see\
    \ [Chapter 6](#9781484207642_Ch06.xhtml) for more details).\n\nUsing RESTORE...VALIDATE\n\
    \nThe `RESTORE...VALIDATE` command is used to verify backup files that would be\
    \ used in a restore operation. This command validates backup sets, data file copies,\
    \ and archive redo log files:\n\n```\nRMAN> restore validate database;\n```\n\n\
    No actual files are restored when using `RESTORE...VALIDATE`. This means that\
    \ you can run the command while the database is online and available.\n\nUsing\
    \ a Recovery Catalog\n\nWhen you use a recovery catalog, it’s possible to create\
    \ the recovery catalog user in the same database, on the same server, as your\
    \ target database. However, that approach isn’t recommended because you don’t\
    \ want the availability of your target database or of the server on which the\
    \ target database resides to affect the recovery catalog. Therefore, you should\
    \ create the recovery catalog database on a server different from that of your\
    \ target database.\n\nCreating a Recovery Catalog\n\nWhen I use a recovery catalog,\
    \ I prefer to have a dedicated database that is used only for the recovery catalog.\
    \ This ensures that the recovery catalog isn’t affected by any maintenance or\
    \ downtime required by another application (and vice versa).\n\nListed next are\
    \ the steps for creating a recovery catalog:\n\n1.  Create a database on a server\
    \ different from that of your target database, to be used for the recovery catalog.\
    \ Make sure the database is adequately sized. I’ve found that Oracle’s recommended\
    \ sizes are usually much too small. Here are some adequate recommendations:\n\n\
    `SYSTEM` tablespace: 500MB\n\n`SYSAUX` tablespace: 500MB\n\n`TEMP` tablespace:\
    \ 500MB\n\n`UNDO` tablespace: 500MB\n\nOnline redo logs: 25MB each; three groups,\
    \ multiplexed with two members per group\n\n`RECCAT` tablespace: 500MB\n\n2. \
    \ Create a tablespace to be used by the recovery catalog user. I recommend giving\
    \ the tablespace a name such as `RECCAT` so that it’s readily identifiable as\
    \ the tablespace that contains the recovery catalog metadata:\n\n```\n    CREATE\
    \ TABLESPACE reccat\n      DATAFILE '/u01/dbfile/O12C/reccat01.dbf' SIZE 500M\n\
    \      EXTENT MANAGEMENT LOCAL UNIFORM SIZE 128k\n      SEGMENT SPACE MANAGEMENT\
    \ AUTO;\n    ```\n\n3.  Create a user that will own the tables and other objects\
    \ used to store the target database metadata. I recommend giving the recovery\
    \ catalog user a name such as `RCAT` so that it’s readily identifiable as the\
    \ user that owns the recovery catalog objects. Also, grant the `RECOVERY_CATALOG_OWNER`\
    \ role to the `RCAT` user as well as `CREATE SESSION`:\n\n```\n    CREATE USER\
    \ rcat IDENTIFIED BY foo\n    TEMPORARY TABLESPACE temp\n    DEFAULT TABLESPACE\
    \ reccat\n    QUOTA UNLIMITED ON reccat;\n    --\n    GRANT RECOVERY_CATALOG_OWNER\
    \ TO rcat;\n    GRANT CREATE SESSION TO rcat;\n    ```\n\n4.  Connect through\
    \ RMAN as `RCAT`, and create the recovery catalog objects:\n\n```\n    $ rman\
    \ catalog rcat/foo\n    ```\n\n5.  Now, run the `CREATE CATALOG` command:\n\n\
    ```\n    RMAN> create catalog;\n    RMAN> exit;\n    ```\n\n6.  This command may\
    \ take a few minutes to run. When it’s finished, you can verify that the tables\
    \ were created with the following query:\n\n```\n    $ sqlplus rcat/foo\n    SQL>\
    \ select table_name from user_tables;\n    ```\n\n7.  Here is a small sample of\
    \ the output:"
  trans: "\n# RMAN 备份与恢复目录管理\n\n## 使用 `BACKUP...VALIDATE` 命令\n\n此命令实际上不会创建任何备份文件；它仅读取数据文件并检查是否损坏。与\
    \ `VALIDATE` 命令类似，`BACKUP VALIDATE` 默认只检查物理损坏。你也可以指示它同时检查逻辑损坏，如下所示：\n\n```\nRMAN>\
    \ backup validate check logical database;\n```\n\n以下是 `BACKUP...VALIDATE` 命令的一些变体：\n\
    \n```\nRMAN> backup validate database current controlfile;\nRMAN> backup validate\
    \ check logical database current controlfile plus archivelog;\n```\n\n同样，与 `VALIDATE`\
    \ 命令类似，`BACKUP...VALIDATE` 如果检测到任何损坏的数据块，将会填充 `V$DATABASE_BLOCK_CORRUPTION` 视图。该视图中的信息可用于确定哪些块可能通过块级恢复进行修复（详见第\
    \ 6 章）。\n\n## 使用 `RESTORE...VALIDATE` 命令\n\n`RESTORE...VALIDATE` 命令用于验证恢复操作中将使用的备份文件。此命令验证备份集、数据文件副本和归档重做日志文件：\n\
    \n```\nRMAN> restore validate database;\n```\n\n使用 `RESTORE...VALIDATE` 时不会实际恢复任何文件。这意味着你可以在数据库处于联机可用状态时运行该命令。\n\
    \n## 使用恢复目录\n\n当你使用恢复目录时，可以在与目标数据库相同的数据库、同一台服务器上创建恢复目录用户。但是，不建议采用这种方法，因为你肯定不希望目标数据库或其所在服务器的可用性影响到恢复目录。因此，你应该在与目标数据库不同的服务器上创建恢复目录数据库。\n\
    \n### 创建恢复目录\n\n当我使用恢复目录时，我倾向于拥有一个专用的、仅用于恢复目录的数据库。这确保了恢复目录不会受到其他应用程序所需的维护或停机的影响（反之亦然）。\n\
    \n以下是创建恢复目录的步骤：\n\n1.  在与目标数据库不同的服务器上创建一个用于恢复目录的数据库。确保数据库大小足够。我发现 Oracle 推荐的大小通常都太小。以下是一些合适的建议：\n\
    \n    `SYSTEM` 表空间：500MB\n    `SYSAUX` 表空间：500MB\n    `TEMP` 表空间：500MB\n    `UNDO`\
    \ 表空间：500MB\n    在线重做日志：每个 25MB；三组，每组两个成员（多路复用）\n    `RECCAT` 表空间：500MB\n\n2.\
    \  创建一个供恢复目录用户使用的表空间。我建议给表空间起一个诸如 `RECCAT` 这样的名字，以便它能被轻松识别为包含恢复目录元数据的表空间：\n\n\
    \    ```\n    CREATE TABLESPACE reccat\n      DATAFILE '/u01/dbfile/O12C/reccat01.dbf'\
    \ SIZE 500M\n      EXTENT MANAGEMENT LOCAL UNIFORM SIZE 128k\n      SEGMENT SPACE\
    \ MANAGEMENT AUTO;\n    ```\n\n3.  创建一个用户，该用户将拥有用于存储目标数据库元数据的表和其他对象。我建议给恢复目录用户起一个诸如\
    \ `RCAT` 这样的名字，以便它能被轻松识别为拥有恢复目录对象的用户。此外，向 `RCAT` 用户授予 `RECOVERY_CATALOG_OWNER`\
    \ 角色以及 `CREATE SESSION` 权限：\n\n    ```\n    CREATE USER rcat IDENTIFIED BY foo\n\
    \    TEMPORARY TABLESPACE temp\n    DEFAULT TABLESPACE reccat\n    QUOTA UNLIMITED\
    \ ON reccat;\n    --\n    GRANT RECOVERY_CATALOG_OWNER TO rcat;\n    GRANT CREATE\
    \ SESSION TO rcat;\n    ```\n\n4.  通过 RMAN 以 `RCAT` 用户身份连接，并创建恢复目录对象：\n\n    ```\n\
    \    $ rman catalog rcat/foo\n    ```\n\n5.  现在，运行 `CREATE CATALOG` 命令：\n\n  \
    \  ```\n    RMAN> create catalog;\n    RMAN> exit;\n    ```\n\n6.  此命令可能需要几分钟才能运行完成。完成后，你可以通过以下查询验证表是否已创建：\n\
    \n    ```\n    $ sqlplus rcat/foo\n    SQL> select table_name from user_tables;\n\
    \    ```\n\n7.  以下是部分输出示例：\n"
- fmt: '# Oracle RMAN Recovery Catalog 操作指南


    ## 注册目标数据库


    现在，您可以将目标数据库注册到恢复目录。登录到目标数据库服务器。确保您可以建立到恢复目录数据库的 Oracle Net 连接。例如，一种方法是在 `TNS_ADMIN/tnsnames.ora`
    文件中填充一个指向远程数据库的条目。


    在目标数据库服务器上，按如下方式注册恢复目录：


    ```

    $ rman target / catalog rcat/foo@rcat

    ```


    连接时，您应该会看到验证信息，表明您同时连接到了目标数据库和恢复目录：


    ```

    connected to target database: O12C (DBID=3423216220)

    connected to recovery catalog database

    ```


    接下来，运行 `REGISTER DATABASE` 命令：


    ```

    RMAN> register database;

    ```


    现在，您可以运行备份操作，有关备份任务的元数据将被写入控制文件和恢复目录。确保每次运行 RMAN 命令时都连接到恢复目录以及目标数据库：


    ```

    $ rman target / catalog rcat/foo@rcat

    RMAN> backup database;

    ```


    ## 备份恢复目录


    请确保您包含了备份和恢复恢复目录数据库的策略。为了获得最大程度的保护，请确保恢复目录数据库处于归档日志模式，并使用 RMAN 来备份该数据库。


    您也可以使用诸如 Data Pump 之类的工具来获取数据库的快照。使用 Data Pump 的缺点是，您可能会丢失在 Data Pump 导出之后创建的恢复目录中的部分信息。


    请记住，如果您在恢复目录数据库服务器上遇到完全故障，您仍然可以使用 RMAN 来备份您的目标数据库；只是无法连接到恢复目录。因此，任何指示 RMAN 连接到目标和恢复目录的脚本都必须进行修改。


    此外，如果您完全丢失了恢复目录且没有备份，一个选择是从头重新创建它。一旦重新创建，您需要将目标数据库重新注册到恢复目录。您会丢失任何长期的历史恢复目录元数据。


    ## 同步恢复目录


    您可能遇到网络问题，导致恢复目录无法访问。在此期间，您连接到目标数据库并执行备份操作。一段时间后，网络问题得到解决，您可以再次连接到恢复目录。


    在这种情况下，您需要将恢复目录与目标数据库重新同步，以便恢复目录知晓那些未存储在其中的备份操作。运行以下命令以确保恢复目录拥有最新的备份信息：


    ```

    $ rman target / catalog rcat/foo@rcat

    RMAN> resync catalog;

    ```


    请记住，仅当您因某种原因在未连接到目录的情况下执行备份操作时，才需要重新同步目录。在正常情况下，您无需运行 `RESYNC` 命令。


    ## 恢复目录版本


    我建议您为您正在备份的每个目标数据库版本创建一个恢复目录。这样做可以避免兼容性和升级方面的一些麻烦。我发现，当 `rman` 客户端的数据库版本与创建目录时使用的版本相同时，使用恢复目录会更容易。


    是的，拥有多个版本的恢复目录可能会引起一些混淆。但是，如果您所在的环境中包含多个不同版本的 Oracle 数据库，那么使用多个恢复目录可能更方便。


    ## 删除恢复目录


    如果您确定不使用恢复目录并且不再需要其中的数据，可以将其删除。为此，以目录所有者身份连接到恢复目录数据库，并发出 `DROP CATALOG` 命令：


    ```

    $ rman catalog rcat/foo

    RMAN> drop catalog;

    ```'
  raw: "```\n    TABLE_NAME\n    ------------------------------\n    DB\n    NODE\n\
    \    CONF\n    DBINC\n    ```\n\nRegistering a Target Database\n\nNow, you can\
    \ register a target database with the recovery catalog. Log in to the target database\
    \ server. Ensure that you can establish Oracle Net connectivity to the recovery\
    \ catalog database. For instance, one approach is to populate the `TNS_ADMIN/tnsnames.ora`\
    \ file with an entry that points to the remote database. On the target database\
    \ server, register the recovery catalog, as follows:\n\n```\n$ rman target / catalog\
    \ rcat/foo@rcat\n```\n\nWhen you connect, you should see verification that you’re\
    \ connecting to both the target and the recovery catalog:\n\n```\nconnected to\
    \ target database: O12C (DBID=3423216220)\nconnected to recovery catalog database\n\
    ```\n\nNext, run the `REGISTER DATABASE` command:\n\n```\nRMAN> register database;\n\
    ```\n\nNow, you can run backup operations and have the metadata about the backup\
    \ tasks written to both the control file and the recovery catalog. Make sure you\
    \ connect to the recovery catalog, along with the target database, each time you\
    \ run RMAN commands:\n\n```\n$ rman target / catalog rcat/foo@rcat\nRMAN> backup\
    \ database;\n```\n\nBacking Up the Recovery Catalog\n\nMake certain you include\
    \ a strategy for backing up and recovering the recovery catalog database. For\
    \ the most protection, be sure the recovery catalog database is in archivelog\
    \ mode, and use RMAN to back up the database.\n\nYou can also use a tool such\
    \ as Data Pump to take a snapshot of the database. The downside to using Data\
    \ Pump is that you can potentially lose some information in the recovery catalog\
    \ that was created after the Data Pump export.\n\nKeep in mind that if you experience\
    \ a complete failure on your recovery catalog database server, you can still use\
    \ RMAN to back up your target databases; you just can’t connect to the recovery\
    \ catalog. Therefore, any scripts that instruct RMAN to connect to the target\
    \ and the recovery catalog must be modified.\n\nAlso, if you completely lose a\
    \ recovery catalog and don’t have a backup, one option is to re-create it from\
    \ scratch. As soon as you re-create it, you reregister the target databases with\
    \ the recovery catalog. You lose any long-term historical recovery catalog metadata.\n\
    \nSynchronizing the Recovery Catalog\n\nYou may have an issue with the network\
    \ that renders the recovery catalog inaccessible. In the meantime, you connect\
    \ to your target database and perform backup operations. Sometime later, the network\
    \ issues are resolved, and you can again connect to the recovery catalog.\n\n\
    In this situation, you need to resynchronize the recovery catalog with the target\
    \ database so that the recovery catalog is aware of any backup operations that\
    \ aren’t stored in it. Run the following command to ensure that the recovery catalog\
    \ has the most recent backup information:\n\n```\n$ rman target / catalog rcat/foo@rcat\n\
    RMAN> resync catalog;\n```\n\nKeep in mind that you have to resynchronize the\
    \ catalog only if, for some reason, you’re performing backup operations without\
    \ connecting to the catalog. Under normal conditions, you don’t have to run the\
    \ `RESYNC` command.\n\nRecovery Catalog Versions\n\nI recommend that you create\
    \ a recovery catalog for each version of the target databases that you’re backing\
    \ up. Doing so will save you some headaches with compatibility issues and upgrades.\
    \ I’ve found it easier to use a recovery catalog when the database version of\
    \ the `rman` client is the same version used when creating the catalog.\n\nYes,\
    \ having multiple versions of the recovery catalog can cause some confusion. However,\
    \ if you’re in an environment in which you have several different versions of\
    \ the Oracle database, then multiple recovery catalogs may be more convenient.\n\
    \nDropping a Recovery Catalog\n\nIf you determine that you’re not using a recovery\
    \ catalog and that you no longer need the data, you can drop it. To do so, connect\
    \ to the recovery catalog database as the catalog owner, and issue the `DROP CATALOG`\
    \ command:\n\n```\n$ rman catalog rcat/foo\nRMAN> drop catalog;\n```"
