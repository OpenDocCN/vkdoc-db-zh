- fmt: "## 恢复控制文件\n\n当将数据库恢复到不同服务器时，通常的最初步骤包括：对目标数据库进行备份、复制到远程服务器，然后从RMAN备份中恢复控制文件。在这些场景中，我通常知道包含控制文件的备份片名称。以下是一个示例，展示如何指示RMAN从特定的备份片文件恢复控制文件：\n\
    \n```\nRMAN> startup nomount;\nRMAN> restore controlfile from\n'/u01/O12C/rman/rman_ctl_c-3423216220-20130113-01.bk';\n\
    ```\n\n控制文件将被恢复到由`CONTROL_FILES`初始化参数定义的位置。\n\n## 恢复spfile\n\n出于以下几个不同原因，您可能需要恢复`spfile`：\n\
    *   您不小心在`spfile`中设置了一个导致实例无法启动的值。\n*   您不小心删除了`spfile`。\n*   您需要查看`spfile`在过去某个时间点的状态。\n\
    \n一个（我遇到过不止一次）场景是：您正在使用`spfile`，而团队中的一位DBA执行了一些令人费解的操作，例如：\n\n```\nSQL> alter\
    \ system set processes=1000000 scope=spfile;\n```\n\n该参数在磁盘上的`spfile`中被更改，但在内存中未更改。一段时间后，数据库因维护而停止。当尝试启动数据库时，您甚至无法让实例处于`nomount`状态。这是因为某个参数被设置为一个过大的值，会消耗服务器上的所有内存。在这种情况下，实例可能会挂起，或者您可能会看到以下一条或多条信息：\n\
    \n```\nORA-01078: failure in processing system parameters\nORA-00838: Specified\
    \ value of ... is too small\n```\n\n如果您有一个包含修改前`spfile`副本的RMAN备份，您可以直接恢复`spfile`。如果您使用恢复目录，以下是恢复`spfile`的步骤：\n\
    \n```\n$ rman target / catalog rcat/foo@rcat\nRMAN> startup nomount;\nRMAN> restore\
    \ spfile;\n```\n\n*   如果您不使用恢复目录，有多种方法可以恢复`spfile`。您采取的方法取决于几个变量，例如：\n    *  \
    \ 您是否使用了FRA\n    *   您是否为自动备份配置了通道备份位置\n    *   您是否使用了自动备份的默认位置\n\n我不会展示这些场景的每个细节。通常，我会确定包含`spfile`备份的备份片位置并执行恢复，像这样：\n\
    \n```\nRMAN> startup nomount force;\nRMAN> restore spfile to '/tmp/spfile.ora'\n\
    \      from '/u01/O12C/rman/rman_ctl_c-3423216220-20130113-00.bk';\n```\n\n您应该会看到类似这样的消息：\n\
    \n```\nchannel ORA_DISK_1: SPFILE restore from AUTOBACKUP complete\n```\n\n在此示例中，`spfile`被恢复到`/tmp`目录。恢复后，您可以使用正确的名称将`spfile`复制到`ORACLE_HOME/dbs`。对于我的环境（数据库名：`O12C`），操作如下：\n\
    \n```\n$ cp /tmp/spfile.ora $ORACLE_HOME/dbs/spfileo12c.ora\n```\n\n![Image](images/sq.jpg)\
    \ **注意**  有关所有可能的`spfile`和控制文件恢复场景的完整描述，请参阅*RMAN Recipes for Oracle Database 12c*。\n\
    \n## 不完全恢复\n\n术语*不完全数据库恢复*意味着您无法恢复所有已提交的事务。*不完全*意味着您不应用所有重做日志来恢复到最后一个已提交事务发生的时间点。换句话说，您是将数据库恢复并恢复到过去的某个时间点。因此，不完全数据库恢复也称为数据库时间点恢复（DBPITR）。通常，您出于以下原因之一执行不完全数据库恢复：\n\
    *   您没有执行完整恢复所需的所有重做日志。您缺少归档重做日志文件或联机重做日志文件。这种情况可能是因为所需的重做文件损坏或丢失。\n*   您有意将数据库回滚到过去的某个时间点。例如，如果有人意外截断了表，而您希望将数据库回滚到发出截断表命令之前，就需要这样做。\n\
    \n不完全数据库恢复包括两个步骤：恢复和恢复。恢复步骤重新创建数据文件，恢复步骤应用重做日志直到指定的时间点。恢复过程可以通过RMAN以几种不同的方式启动：\n\
    *   `RESTORE DATABASE UNTIL`\n*   `FLASHBACK DATABASE`\n\n对于大多数不完全数据库恢复的情况，您使用`RESTORE\
    \ DATABASE UNTIL`命令指示RMAN从RMAN备份文件中检索数据文件。这种类型的不完全数据库恢复是本章此部分的主要重点。Flashback Database功能将在本章后面的“闪回数据库”部分介绍。\n\
    \n`RESTORE DATABASE`命令的`UNTIL`部分指示RMAN基于以下方法之一从过去的某个时间点检索数据文件：\n*   时间\n*   SCN\n\
    *   日志序列号\n*   还原点\n\nRMAN的`RESTORE DATABASE UNTIL`命令将从最新的备份集或映像副本中检索所有数据文件。RMAN会根据`UNTIL`子句自动确定哪个备份集包含所需的数据文件。如果您省略`RESTORE\
    \ DATABASE`命令的`UNTIL`子句，RMAN将从最新可用的备份集或映像副本中检索数据文件。在某些情况下，这可能是您期望的行为。我建议您使用`UNTIL`子句以确保RMAN从正确的备份集中恢复。当您发出`RESTORE\
    \ DATABASE UNTIL`命令时，RMAN将确定如何从以下任何类型的备份中提取数据文件：\n*   完整数据库备份\n*   增量0级备份\n* \
    \  由`BACKUP AS COPY`命令生成的映像副本备份\n\n您不能在数据库联机数据文件的子集上执行不完全数据库恢复。执行不完全恢复时，在使用`ALTER\
    \ DATABASE OPEN RESETLOGS`命令打开数据库之前，所有联机数据文件的检查点SCN必须同步。您可以通过此SQL查询查看数据文件头SCN和每个数据文件的状态：\n\
    \n```\nselect file#, status, fuzzy,\nerror, checkpoint_change#,\nto_char(checkpoint_time,'dd-mon-rrrr\
    \ hh24:mi:ss') as checkpoint_time\nfrom v$datafile_header;\n```\n\n![Image](images/sq.jpg)\
    \ **注意**  `V$DATAFILE_HEADER`中的`FUZZY`列包含一个或多个数据块的SCN值大于或等于数据文件头中检查点SCN的数据文件。如果数据文件已恢复并且`FUZZY`值为`YES`，则需要进行介质恢复。\n\
    \n不在数据库联机文件的子集上执行不完全恢复规则的唯一例外是表空间时间点恢复（TSPITR），它使用`RECOVER TABLESPACE UNTIL`命令。TSPITR在罕见情况下使用；它仅恢复和恢复您指定的表空间。有关TSPITR的更多详细信息，请参阅*RMAN\
    \ Recipes for Oracle Database 12c*。\n\n不完全数据库恢复的恢复部分总是通过`RECOVER DATABASE UNTIL`命令启动。RMAN将自动恢复您的数据库，直到使用`UNTIL`子句指定的点。与`RESTORE`命令类似，您可以按时间、变更/SCN、日志序列号或还原点进行恢复。当RMAN达到指定点时，它将自动终止恢复过程。"
  raw: 'When restoring a database to a different server, these are generally the first
    few steps in the process take a backup of the target database, copy to the remote
    server, and then restore the control file from the RMAN backup. In these scenarios,
    I usually know the name of the backup piece that contains the control file. Here
    is an example in which you instruct RMAN to restore a control file from a specific
    backup piece file:


    ```

    RMAN> startup nomount;

    RMAN> restore controlfile from

    ''/u01/O12C/rman/rman_ctl_c-3423216220-20130113-01.bk'';

    ```


    The control file will be restored to the location defined by the `CONTROL_FILES`
    initialization parameter.


    Restoring the spfile


    You might want to restore a `spfile` for several different reasons:


    *   You accidentally set a value in the `spfile` that keeps your instance from
    starting.

    *   You accidentally deleted the `spfile`.

    *   You are required to see what the `spfile` looked like at some point in time
    in the past.


    One scenario (this has happened to me more than once) is that you’re using a `spfile`,
    and one of the DBAs on your team does something inexplicable, such as this:


    ```

    SQL> alter system set processes=1000000 scope=spfile;

    ```


    The parameter is changed in the `spfile` on disk, but not in memory. Sometime
    later, the database is stopped for some maintenance. When attempting to start
    the database, you can’t even get the instance to start in a nomount state. This
    is because a parameter has been set to a ridiculous value that will consume all
    the memory on the box. In this scenario the instance may hang, or you may see
    one or more of the following messages:


    ```

    ORA-01078: failure in processing system parameters

    ORA-00838: Specified value of ... is too small

    ```


    If you have an RMAN backup available that has a copy of the `spfile` as it was
    before it was modified, you can simply restore the `spfile`. If you are using
    a recovery catalog, here is the procedure for restoring the `spfile`:


    ```

    $ rman target / catalog rcat/foo@rcat

    RMAN> startup nomount;

    RMAN> restore spfile;

    ```


    *   If you’re not using a recovery catalog, there are a number of ways to restore
    your `spfile`. The approach you take depends on several variables, such as whether
    you’re using an FRA

    *   you’ve configured a channel backup location for the autobackup

    *   you’re using the default location for autobackups


    I’m not going to show every detail of these scenarios. Usually, I determine the
    location of the backup piece that contains the backup of the `spfile` and do the
    restore, like this:


    ```

    RMAN> startup nomount force;

    RMAN> restore spfile to ''/tmp/spfile.ora''

          from ''/u01/O12C/rman/rman_ctl_c-3423216220-20130113-00.bk'';

    ```


    You should see a message such as this:


    ```

    channel ORA_DISK_1: SPFILE restore from AUTOBACKUP complete

    ```


    In this example the `spfile` is restored to the `/tmp` directory. Once restored,
    you can copy the `spfile` to `ORACLE_HOME/dbs`, with the proper name. For my environment
    (database name: `O12C`) this would be as follows:


    ```

    $ cp /tmp/spfile.ora $ORACLE_HOME/dbs/spfileo12c.ora

    ```


    ![Image](images/sq.jpg) **Note**  For a complete description of all possible `spfile`
    and control file restore scenarios, see *RMAN Recipes for Oracle Database 12c*.


    Incomplete Recovery


    The term *incomplete database recovery* means that you can’t recover all committed
    transactions. *Incomplete* means that you do not apply all redo to restore up
    to the point of the last committed transaction that occurred in your database.
    In other words, you are restoring and recovering to a point in time in the past.
    For this reason, incomplete database recovery is also called database point-in-time
    recovery (DBPITR). Typically, you perform incomplete database recovery for one
    of the following reasons:


    *   You don’t have all the redo required to perform a complete recovery. You’re
    missing either the archived redo log files or the online redo log files that are
    required for complete recovery. This situation could arise because the required
    redo files are damaged or missing.

    *   You purposely want to roll back the database to a point in time in the past.
    For example, you would do this if somebody accidentally truncated a table, and
    you intentionally wanted to roll back the database to just before the truncate
    table command was issued.


    Incomplete database recovery consists of two : restore and recovery. The restore
    step re-creates data files, and the recover step applies redo up to the specified
    point in time. The restore process can be initiated from RMAN in a couple of different
    ways:


    *   `RESTORE DATABASE UNTIL`

    *   `FLASHBACK DATABASE`


    For the majority of incomplete database recovery circumstances, you use the `RESTORE
    DATABASE UNTIL` command to instruct RMAN to retrieve data files from the RMAN
    backup files. This type of incomplete database recovery is the main focus of this
    section of the chapter. The Flashback Database feature is covered in the section
    “Flashing Back a Database,” later in this chapter.


    The `UNTIL` portion of the `RESTORE DATABASE` command instructs RMAN to retrieve
    data files from a point in time in the past, based on one of the following methods:


    *   Time

    *   SCN

    *   Log sequence number

    *   Restore point


    The RMAN `RESTORE DATABASE UNTIL` command will retrieve all data files from the
    most recent backup set or image copy. RMAN will automatically determine from the
    `UNTIL` clause which backup set contains the required data files. If you omit
    the `UNTIL` clause of the `RESTORE DATABASE` command, RMAN will retrieve data
    files from the latest available backup set or image copy. In some situations this
    may be the behavior you desire. I recommend that you use the `UNTIL` clause to
    ensure that RMAN restores from the correct backup set. When you issue the `RESTORE
    DATABASE UNTIL` command, RMAN will establish how to extract the data files from
    any of the following types of backups:


    *   Full database backup

    *   Incremental level-0 backup

    *   Image copy backup generated by the `BACKUP AS COPY` command


    You can’t perform an incomplete database recovery on a subset of your database’s
    online data files. When performing incomplete database recovery, all the checkpoint
    SCNs for all online data files must be synchronized before you can open your database
    with the `ALTER DATABASE OPEN RESETLOGS` command. You can view the data file header
    SCNs and the status of each data file via this SQL query:


    ```

    select file#, status, fuzzy,

    error, checkpoint_change#,

    to_char(checkpoint_time,''dd-mon-rrrr hh24:mi:ss'') as checkpoint_time

    from v$datafile_header;

    ```


    ![Image](images/sq.jpg) **Note**  The `FUZZY` column `V$DATAFILE_HEADER` contains
    data files that have one or more blocks with an SCN value greater than or equal
    to the checkpoint SCN in the data file header. If a data file is restored and
    has a `FUZZY` value of `YES`, then media recovery is required.


    The only exception to this rule of not performing an incomplete recovery on a
    subset of online database files is a tablespace point-in-time recovery (TSPITR),
    which uses the `RECOVER TABLESPACE UNTIL` command. TSPITR is used in rare situations;
    it restores and recovers only the tablespace(s) you specify. For more details
    on TSPITR, see *RMAN Recipes for Oracle Database 12c*.


    The recovery portion of an incomplete database recovery is always initiated with
    the `RECOVER DATABASE UNTIL` command. RMAN will automatically recover your database
    up to the point specified with the `UNTIL` clause. Just like the `RESTORE` command,
    you can recover up to time, change/SCN, log sequence number, or restore point.
    When RMAN reaches the specified point, it will automatically terminate the recovery
    process.'
  trans: "\n## 恢复控制文件\n\n当将数据库恢复到不同服务器时，通常的最初步骤包括：对目标数据库进行备份、复制到远程服务器，然后从 RMAN 备份中恢复控制文件。在这些场景中，我通常知道包含控制文件的备份片名称。以下是一个示例，展示如何指示\
    \ RMAN 从特定的备份片文件恢复控制文件：\n\n```\nRMAN> startup nomount;\nRMAN> restore controlfile\
    \ from\n'/u01/O12C/rman/rman_ctl_c-3423216220-20130113-01.bk';\n```\n\n控制文件将被恢复到由`CONTROL_FILES`初始化参数定义的位置。\n\
    \n## 恢复 spfile\n\n出于以下几个不同原因，您可能需要恢复`spfile`：\n*   您不小心在`spfile`中设置了一个导致实例无法启动的值。\n\
    *   您不小心删除了`spfile`。\n*   您需要查看`spfile`在过去某个时间点的状态。\n\n一个（我遇到过不止一次）场景是：您正在使用`spfile`，而团队中的一位\
    \ DBA 执行了一些令人费解的操作，例如：\n\n```\nSQL> alter system set processes=1000000 scope=spfile;\n\
    ```\n\n该参数在磁盘上的`spfile`中被更改，但在内存中未更改。一段时间后，数据库因维护而停止。当尝试启动数据库时，您甚至无法让实例处于`nomount`状态。这是因为某个参数被设置为一个过大的值，会消耗服务器上的所有内存。在这种情况下，实例可能会挂起，或者您可能会看到以下一条或多条信息：\n\
    \n```\nORA-01078: failure in processing system parameters\nORA-00838: Specified\
    \ value of ... is too small\n```\n\n如果您有一个包含修改前`spfile`副本的 RMAN 备份，您可以直接恢复`spfile`。如果您使用恢复目录，以下是恢复`spfile`的步骤：\n\
    \n```\n$ rman target / catalog rcat/foo@rcat\nRMAN> startup nomount;\nRMAN> restore\
