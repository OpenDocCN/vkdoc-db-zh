    ## Summary


    This chapter covered tasks such as establishing OS variables, connecting to your
    database, and starting/stopping your database. These operations are prerequisites
    for many DBA tasks, especially backup and recovery. When starting your database,
    it’s important to understand the phases that Oracle goes through and at what point
