- fmt: "```\nRMAN configuration parameters for database with db_unique_name O12C are:\n\
    CONFIGURE CONTROLFILE AUTOBACKUP ON;\n```\n\nThe following line of code shows\
    \ how to enable automatic backup of the control file feature:\n\n```\nRMAN> configure\
    \ controlfile autobackup on;\n```\n\nThe automatic control file backup always\
    \ goes into its own backup set. When autobackup of the control file is enabled,\
    \ if you’re using an `spfile`, it’s automatically backed up along with the control\
    \ file.\n\nIf, for any reason, you want to disable automatic backup of the control\
    \ file, you can do so as follows:\n\n```\nRMAN> configure controlfile autobackup\
    \ off;\n```\n\n> **Note**\n> If autobackup of the control file is off, then any\
    \ time you back up data file 1 (`SYSTEM` tablespace data file), RMAN automatically\
    \ backs up the control file.\n\n## 7. Specifying the Location of the Autobackup\
    \ of the Control File\n\nWhen you enable autobackup of the control file, RMAN\
    \ creates the backup of the control file in one of the following locations:\n\n\
    *   Default location\n*   FRA\n*   Location specified via the `CONFIGURE CONTROLFILE\
    \ AUTOBACKUP FORMAT` command\n\nIf you aren’t using an FRA, or if you haven’t\
    \ specified a location for the control file autobackups, the control file autobackup\
    \ is written to an OS-dependent default location. In Linux/Unix environments the\
    \ default location is `ORACLE_HOME/dbs`; for example,\n\n```\n/u01/app/oracle/product/12.1.0.1/db_1/dbs/c-3423216220-20130109-01\n\
    ```\n\nIf you’ve enabled an FRA, then RMAN automatically writes the control file\
    \ autobackup files to directories in the FRA, using an OMF format for the name;\
    \ for example,\n\n```\n/<fra>/<dbuname>/autobackup/<YYYY_MM_DD>/o1_mf_s_729103049_68fho9z2_.bkp\n\
    ```\n\nI don’t usually use the default location or the FRA for control file autobackups.\
    \ I prefer these backups to be placed in the same directory the database backups\
    \ are in. Here is an example:\n\n```\nRMAN> configure controlfile autobackup format\
    \ for device type disk to\n'/u01/ORA12C/rman/rman_ctl_%F.bk';\n```\n\nIf you want\
    \ to set the autobackup format back to the default, do so as follows:\n\n```\n\
    RMAN> configure controlfile autobackup format for device type disk clear;\n```\n\
    \n## 8. Backing Up Archive Redo Logs\n\nYou should back up your archive redo logs\
    \ on a regular basis. The archivelog files shouldn’t be removed from disk until\
    \ you’ve backed them up at least once. I usually like to keep on disk any archive\
    \ redo logs that have been generated since the last good RMAN backup.\n\nGenerally,\
    \ I instruct RMAN to back up the archive redo logs while the data files are being\
    \ backed up. This is a sufficient strategy in most situations. Here is the command\
    \ to back up the archive redo logs along with the data files:\n\n```\nRMAN> backup\
    \ database plus archivelog;\n```\n\nSometimes, if your database generates a great\
    \ deal of redo, you may need to back up your archive redo logs at a frequency\
    \ different from that of the data files. DBAs may back up the archive redo logs\
    \ two or three times a day; after the logs are backed up, the DBAs delete them\
    \ to make room for more current archivelog files.\n\nIn most situations, you don’t\
    \ need any archive redo logs that were generated before your last good backup.\
    \ For example, if a data file has experienced media failure, you need to restore\
    \ the data file from a backup and then apply any archive redo logs that were generated\
    \ during and after the backup of the data file.\n\nOn some occasions, you may\
    \ need archive redo logs that were generated before the last backup. For instance,\
    \ you may experience a media failure, attempt to restore your database from the\
    \ last good backup, find corruption in that backup, and therefore need to restore\
    \ from an older backup. At that point, you need a copy of all archive redo logs\
    \ that have been generated since that older backup was made.\n\n## 9. Determining\
    \ the Location for the Snapshot Control File\n\nRMAN requires a read-consistent\
    \ view of the control file for the following tasks:\n\n*   Synchronizing with\
    \ the recovery catalog\n*   Backing up the current control file\n\nRMAN creates\
    \ a snapshot copy of the current control file that it uses as a read-consistent\
    \ copy while it’s performing these tasks. This ensures that RMAN is working from\
    \ a copy of the control file that isn’t being modified.\n\nThe default location\
    \ of the snapshot control file is OS specific. On Linux platforms the default\
    \ location/format is `ORACLE_HOME/dbs/snapcf_@.f`. Note that the default location\
    \ isn’t in the FRA (even if you’ve implemented an FRA).\n\nYou can display the\
    \ current snapshot control file details, using the `SHOW` command:\n\n```\nRMAN>\
    \ show snapshot controlfile name;\n```\n\nHere is some sample output:\n\n```\n\
    CONFIGURE SNAPSHOT CONTROLFILE NAME TO\n '/ora01/app/oracle/product/12.1.0.1/db_1/dbs/snapcf_o12c.f';\
    \ # default\n```\n\nFor most situations the default location and format of the\
    \ snapshot control file are sufficient. This file doesn’t use much space or have\
    \ any intensive I/O requirements. I recommend that you use the default setting.\n\
    \nIf you have a good reason to configure the snapshot control file to a nondefault\
    \ location, you can do so as follows:\n\n```\nRMAN> configure snapshot controlfile\
    \ name to '/u01/O12C/rman/snapcf.ctl';\n```\n\nIf you accidentally configure the\
    \ snapshot control file location to a nonexistent directory, then when running\
    \ a `BACKUP` or `COPY` command, the autobackup of the control file will fail,\
    \ with this error:\n\n```\nORA-01580: error creating control backup file...\n\
    ```\n\nYou can set the snapshot control file back to the default, like this:\n\
    \n```\nRMAN> configure snapshot controlfile name clear;\n```\n\n## 10. Using a\
    \ Recovery Catalog\n\nRMAN always stores its latest backup operations in the target\
    \ database control file. You can set up an optional recovery catalog to store\
    \ metadata regarding RMAN backups. The recovery catalog is a separate schema (usually\
    \ in a database different from that of the target database) that contains database\
    \ objects (tables, indexes, and so on) that store the RMAN backup information.\
    \ The recovery catalog doesn’t store RMAN backup pieces—only backup metadata.\n\
    \nThe main advantages of using a recovery catalog are as follows:\n\n*   Provides\
    \ a secondary repository for RMAN metadata. If you lose all your control files\
    \ and backups of your control files, you can still retrieve RMAN metadata from\
    \ the recovery catalog.\n*   Stores RMAN metadata for a much longer period than\
    \ is possible when you just use a control file for the repository.\n*   Offers\
    \ access to all RMAN features. Some restore and recovery features are simpler\
    \ when using a recovery catalog.\n\nThe disadvantage of using a recovery catalog\
    \ is that this is another database you have to set up, maintain, and back up.\
    \ Additionally, when you start a backup and attempt to connect to the recovery\
    \ catalog, if the recovery catalog isn’t available for any reason (server down,\
    \ network issues, and so on), you must decide whether you want to continue with\
    \ the backup without a recovery catalog.\n\nYou must also be aware of versioning\
    \ aspects when using a recovery catalog. You need to make sure the version of\
    \ the database you use to store the recovery catalog is compatible with the version\
    \ of the target database. When you upgrade a target database, be sure the recovery\
    \ catalog is upgraded (if necessary).\n\n> **Note**\n> See [Chapter 5](#9781484207642_Ch05.xhtml)\
    \ for details on how to implement a recovery catalog.\n\nRMAN works fine with\
    \ or without a recovery catalog. For several of the databases I maintain, I don’t\
    \ use a recovery catalog; this eliminates having to set it up and maintain it.\
    \ For me, simplicity takes precedence over the features available with the recovery\
    \ catalog.\n\nHowever, if you have good business reasons for using a recovery\
    \ catalog, then implement and use one. The recovery catalog isn’t that difficult\
    \ to set up and maintain, and Oracle recommends that you use it.\n\n## 11. Using\
    \ a Media Manager"
