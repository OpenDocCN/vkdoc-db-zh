    话虽如此，实施此类备份也有一些充分的理由。一个常见的用途是为开发/测试/培训数据库制作冷备份，并定期将数据库重置回基线状态。这为你提供了一种方式，可以使用数据库的同一时间点快照来重启性能测试或培训课程。


    ![Image](img/sq.jpg) **提示** 考虑使用闪回数据库功能将你的数据库设置回过去的某个时间点（详见第 6 章）。


    本节示例向你展示如何备份数据库中的每个关键文件：所有控制文件、数据文件、临时数据文件和联机重做日志文件。使用此类备份，你可以轻松地将数据库恢复到进行备份时的时间点。这种方法的主要优点是概念简单且易于实现。以下是数据库在`noarchivelog`模式下进行冷备份所需的步骤：


    1.  确定将备份文件复制到何处以及需要多少空间。

    2.  确认要复制的数据库文件的位置和名称。

    3.  使用`IMMEDIATE`、`TRANSACTIONAL`或`NORMAL`子句关闭数据库。

    4.  将文件（步骤 2 中确认的）复制到备份位置（步骤 1 中确定的）。

    5.  重新启动数据库。


    以下各节将详细阐述这些步骤。


    ### 步骤 1：确定备份文件的复制位置及所需空间


    理想情况下，备份位置应位于与你的活动数据文件位置不同的一组磁盘上。然而，在许多工作环境中，你可能没有选择权，并且可能会被告知数据库应使用哪些挂载点。在此示例中，备份位置是目录`/u01/cbackup/O12C`。为了大致了解存储备份的一个副本需要多少空间，你可以运行此查询：


    ```sql

    select sum(sum_bytes)/1024/1024 m_bytes

    from(

    select sum(bytes) sum_bytes from v$datafile

    union

    select sum(bytes) sum_bytes from v$tempfile

    union

    select (sum(bytes) * members) sum_bytes from v$log

    group by members);

    ```


    你可以使用 Linux/Unix 的`df`（磁盘空闲）命令来验证操作系统有多少可用磁盘空间。确保操作系统上可用的磁盘空间量大于前一个查询返回的总和：


    ```bash

    $ df -h

    ```


    ### 步骤 2：识别要复制的数据库文件的位置和名称


    运行此查询以列出包含在`noarchivelog`模式数据库冷备份中的文件的名称（和路径）：


    ```sql

    select name from v$datafile

    union

    select name from v$controlfile

    union

    select name from v$tempfile

    union

    select member from v$logfile;

    ```


    **备份联机重做日志（或不备份）**


    你需要备份联机重做日志吗？不需要；你永远不需要作为任何类型备份的一部分来备份联机重做日志。那么，为什么 DBA 们会在冷备份中备份联机重做日志呢？一个原因是它可以使`noarchivelog`模式场景下的恢复过程稍微容易一些。联机重做日志是正常打开数据库所必需的。


    如果你备份了所有文件（包括联机重做日志），那么要使你的数据库恢复到备份时的状态，你需要还原所有文件（包括联机重做日志）并启动数据库。


    ### 步骤 3：关闭数据库


    以`SYS`用户（或具有`SYSDBA`权限的用户）连接到你的数据库，并使用`IMMEDIATE`、`TRANSACTIONAL`或`NORMAL`关闭数据库。在几乎所有情况下，使用`IMMEDIATE`是首选方法。此模式会断开用户连接、回滚未完成的事务并关闭数据库：


    ```bash

    $ sqlplus / as sysdba

    SQL> shutdown immediate;

    ```


    ### 步骤 4：创建文件的备份副本


    对于步骤 2 中确认的每个文件，使用操作系统实用程序将文件复制到备份目录（步骤 1 中确认的）。在这个简单的示例中，所有数据文件、控制文件、临时数据库文件和联机重做日志都在同一个目录中。在生产环境中，你很可能将文件分布在几个不同的目录中。此示例使用
    Linux/Unix 的`cp`命令将数据库文件从`/u01/dbfile/O12C`复制到`/u01/cbackup/O12C`目录：


    ```bash

    $ cp /u01/dbfile/O12C/*.*  /u01/cbackup/O12C

    ```


    ### 步骤 5：重启数据库


    所有文件复制完成后，你可以启动数据库：


    ```bash

    $ sqlplus / as sysdba

    SQL> startup;

    ```


    ## 在有在线重做日志的情况下恢复无归档日志模式的冷备份


    下一个示例解释如何从`noarchivelog`模式数据库的冷备份中恢复。如果你在冷备份中包含了联机重做日志，则可以在恢复文件时包含它们。此过程涉及以下步骤：


    1.  关闭实例。

    2.  将数据文件、联机重做日志、临时文件和控制文件从备份复制回活动数据库数据文件位置。

    3.  启动数据库。


    这些步骤在以下各节中详述。


    ### 步骤 1：关闭实例


    如果实例正在运行，请将其关闭。在此场景中，关闭数据库的方式无关紧要，因为你是恢复到过去的一个时间点（不恢复事务）。当备份文件被复制回来时，活动数据库目录位置中的任何文件都将被覆盖。如果你的实例正在运行，你可以强行中止它。以具有`SYSDBA`权限的用户身份执行以下操作：


    ```bash

    $ sqlplus / as sysdba

    SQL> shutdown abort;

    ```


    ### 步骤 2：从备份中复制文件回来


    此步骤执行与备份相反的操作：你正在将文件从备份位置复制到活动数据库文件位置。在此示例中，所有备份文件都位于`/u01/cbackup/O12C`目录中，并且所有文件都被复制到`/u01/dbfile/O12C`目录：


    ```bash

    $ cp /u01/cbackup/O12C/*.*  /u01/dbfile/O12C

    ```


    ### 步骤 3：启动数据库


    以`SYS`用户（或具有`SYSDBA`权限的用户）连接到你的数据库，并启动数据库：


    ```bash

    $ sqlplus / as sysdba

    SQL> startup;

    ```


    完成这些步骤后，你应该拥有与你进行冷备份时完全相同的数据库副本。这就像你将数据库设置回进行备份时的时间点一样。


    ## 在没有在线重做日志的情况下恢复无归档日志模式的冷备份


    如前所述，在从冷备份恢复时，你永远不需要联机重做日志。如果你对`noarchivelog`模式下的数据库进行了冷备份，并且没有将联机重做日志作为备份的一部分包含在内，则恢复步骤与前一节中的步骤几乎相同。主要区别在于最后一步需要你使用`OPEN
    RESETLOGS`子句打开数据库。步骤如下：


    1.  关闭实例。

    2.  从备份复制控制文件和数据文件回来。

    3.  以挂载模式启动数据库。

    4.  使用`OPEN RESETLOGS`子句打开数据库。


    ### 步骤 1：关闭实例


    如果实例正在运行，请将其关闭。在此场景中，关闭数据库的方式无关紧要，因为你是恢复到过去的一个时间点。当备份文件被复制回来时，活动数据库目录位置中的任何文件都将被覆盖。如果你的实例正在运行，你可以强行中止它。以具有`SYSDBA`权限的用户身份执行以下操作：


    ```bash

    $ sqlplus / as sysdba

    SQL> shutdown abort;

    ```


    ### 步骤 2：从备份中复制文件回来


    将控制文件和数据文件从备份位置复制到活动数据文件位置：


    ```bash

    $ cp <backup directory>/*.*  <live database file directory>

    ```


    ### 步骤 3：以挂载模式启动数据库


    以`SYS`用户或具有`SYSDBA`权限的用户连接到你的数据库，并以挂载模式启动数据库：

    '
- fmt: "# 使用 OPEN RESETLOGS 子句打开数据库\n\n进入`/path/to/xxx`目录，找到`xxx.json`。\n\n```\n$\
    \ sqlplus / as sysdba\nSQL> startup mount\n```\n\n## Step 4. 使用 OPEN RESETLOGS\
    \ 子句打开数据库\n\n使用`OPEN RESETLOGS`子句打开数据库以供使用：\n\n```\nSQL> alter database open resetlogs;\n\
    ```\n\n如果看到`Database altered`消息，则命令成功。但是，您可能会看到此错误：\n\n```\nORA-01139: RESETLOGS\
    \ option only valid after an incomplete database recovery\n```\n\n这种情况下，请发出以下命令：\n\
    \n```\nSQL> recover database until cancel;\n```\n\n您应该会看到此消息：\n\n```\nMedia recovery\
    \ complete.\n```\n\n现在，尝试使用`OPEN RESETLOGS`子句打开数据库：\n\n```\nSQL> alter database\
    \ open resetlogs;\n```\n\n此语句指示 Oracle 重新创建联机重做日志。Oracle 使用控制文件中的信息来确定重做日志的位置、名称和大小。如果那些位置有旧的联机重做日志文件，它们将被覆盖。\n\
    \n如果您在此过程中监控`alert.log`，可能会看到`ORA-00312`和`ORA-00313`。这意味着 Oracle 找不到联机重做日志文件；这是正常的，因为这些文件在被`OPEN\
    \ RESETLOGS`命令重新创建之前是物理不可用的。\n\n# 脚本化冷备份与恢复\n\n了解如何编写冷备份脚本具有指导意义。基本思想是动态查询数据字典以确定要备份的文件的位置和名称。这比在脚本中硬编码目录位置和文件名更可取。动态生成的脚本不易出错和出现意外情况（例如，向数据库添加了新数据文件，但未更新到旧的硬编码备份脚本中）。\n\
    \n![Image](images/sq.jpg)`Note`：本节中的脚本并非用于生产强度的备份和恢复脚本。相反，它们说明了脚本化冷备份和后续恢复的基本概念。\n\
    \n本节的第一个脚本创建数据库的冷备份。在使用冷备份脚本之前，您需要修改脚本中的这些变量以匹配您的数据库环境：\n\n*   `ORACLE_SID`\n\
    *   `ORACLE_HOME`\n*   `cbdir`\n\n`cbdir`变量指定备份目录位置的名称。该脚本创建一个名为`coldback.sql`的文件，该文件从\
    \ SQL*Plus 执行以启动数据库的冷备份：\n\n```\n#!/bin/bash\nORACLE_SID=O12C\nORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n\
    PATH=$PATH:$ORACLE_HOME/bin\n#\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0\
    \ lines 132 verify off feed off trimsp on\ndefine cbdir=/u01/cbackup/O12C\nspo\
    \ coldback.sql\nselect 'shutdown immediate;' from dual;\nselect '!cp ' || name\
    \   || ' ' || '&&cbdir'   from v\\$datafile;\nselect '!cp ' || name   || ' ' ||\
    \ '&&cbdir'   from v\\$tempfile;\nselect '!cp ' || member || ' ' || '&&cbdir'\
    \ from v\\$logfile;\nselect '!cp ' || name   || ' ' || '&&cbdir'   from v\\$controlfile;\n\
    select 'startup;' from dual;\nspo off;\n@@coldback.sql\nEOF\nexit 0\n```\n\n此文件生成的命令将从\
    \ SQL*Plus 脚本执行，以对数据库进行冷备份。您在 Unix`cp`命令前放置一个感叹号（`!`），以指示 SQL*Plus 主机退出到操作系统以运行`cp`命令。在引用`v$`数据字典视图时，您还需要在每个美元符号（`$`）前放置一个反斜杠（`\\\
    `）；这在 Linux/Unix shell 脚本中是必需的。`\\`转义了`$`，并告诉 shell 脚本不要将`$`视为特殊字符（`$`通常表示 shell\
    \ 变量）。\n\n运行此脚本后，写入`coldback.sql`脚本的复制命令示例如下：\n\n```\nshutdown immediate;\n!cp\
    \ /u01/dbfile/O12C/system01.dbf /u01/cbackup/O12C\n!cp /u01/dbfile/O12C/sysaux01.dbf\
    \ /u01/cbackup/O12C\n!cp /u01/dbfile/O12C/undotbs01.dbf /u01/cbackup/O12C\n!cp\
    \ /u01/dbfile/O12C/users01.dbf /u01/cbackup/O12C\n!cp /u01/dbfile/O12C/tools01.dbf\
    \ /u01/cbackup/O12C\n!cp /u01/dbfile/O12C/temp01.dbf /u01/cbackup/O12C\n!cp /u01/oraredo/O12C/redo02a.rdo\
    \ /u01/cbackup/O12C\n!cp /u02/oraredo/O12C/redo02b.rdo /u01/cbackup/O12C\n!cp\
    \ /u01/oraredo/O12C/redo01a.rdo /u01/cbackup/O12C\n!cp /u02/oraredo/O12C/redo01b.rdo\
    \ /u01/cbackup/O12C\n!cp /u01/oraredo/O12C/redo03a.rdo /u01/cbackup/O12C\n!cp\
    \ /u02/oraredo/O12C/redo03b.rdo /u01/cbackup/O12C\n!cp /u01/dbfile/O12C/control01.ctl\
    \ /u01/cbackup/O12C\n!cp /u01/dbfile/O12C/control02.ctl /u01/cbackup/O12C\nstartup;\n\
    ```\n\n进行冷备份时，您还应该生成一个脚本，该脚本提供将数据文件、临时文件、日志文件和控制文件复制回其原始位置的命令。您可以使用此脚本从冷备份中恢复。本节的下一个脚本动态创建`coldrest.sql`脚本，该脚本将文件从备份位置复制到原始数据文件位置。您需要以修改冷备份脚本的相同方式修改此脚本（即，更改`ORACLE_SID`、`ORACLE_HOME`和`cbdir`变量以匹配您的环境）：\n\
    \n```\n#!/bin/bash\nORACLE_SID=O12C\nORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\n\
    PATH=$PATH:$ORACLE_HOME/bin\n#\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0\
    \ lines 132 verify off feed off trimsp on\ndefine cbdir=/u01/cbackup/O12C\ndefine\
    \ dbname=$ORACLE_SID\nspo coldrest.sql\nselect 'shutdown abort;' from dual;\n\
    select '!cp ' || '&&cbdir/' || substr(name, instr(name,'/',-1,1)+1) ||\n     \
