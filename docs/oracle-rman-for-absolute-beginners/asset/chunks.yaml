  trans: '

    ## 在此组合中，仅导出关于表空间的元数据；导出的内容中不包含数据文件内的数据。您可以向 `INCLUDE` 命令添加参数和值 `CONTENT=METADATA_ONLY`，但这将是多余的。


    现在，您可以使用 `SQLFILE` 参数来查看与已导出表空间关联的 DDL：

    ```bash

    $ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp sqlfile=tbsp.sql

    ```

    当您使用 `SQLFILE` 参数时，不会导入任何内容。在此示例中，上述命令仅会创建一个名为 `tbsp.sql` 的文件，其中包含与表空间相关的 SQL
    语句。您可以修改 DDL 并在目标数据库环境中运行；或者，如果无需更改，您可以通过将表空间导入目标数据库来直接使用转储文件。


    ## 指定不同的数据文件路径和名称


    如前所述，您可以使用 `FULL` 和 `INCLUDE` 参数的组合来仅导出表空间元数据信息：

    ```bash

    $ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp \

    full=y include=tablespace

    ```

    如果您想使用转储文件在具有不同目录结构的单独数据库服务器上创建表空间，该怎么办？Data Pump 允许您在导入步骤中使用 `REMAP_DATAFILE`
    参数来更改数据文件目录路径和文件名。


    例如，假设源数据文件位于名为 `/ora03` 的挂载点上，但在要导入到的数据库上，挂载点命名为 `/ora01`。以下是一个参数文件，它指定仅应导入表空间名称以字符串
    `INV` 开头的表空间，并将它们对应的数据文件名更改为反映新环境的名称：

    ```

    userid=mv_maint/foo directory=dp_dir dumpfile=inv.dmp full=y include=tablespace:"like
    ''INV%''" remap_datafile="''/ora03/dbfile/O12C/inv_data01.dbf'':''/ora01/dbfile/O12C/tb1.dbf''"
    remap_datafile="''/ora03/dbfile/O12C/inv_index01.dbf'':''/ora01/dbfile/O12C/tb2.dbf''"

    ```

    当 Data Pump 创建表空间时，对于任何与字符串第一部分（冒号 [`:`] 左侧）匹配的路径，该字符串将被字符串下一部分（冒号右侧）中的文本替换。


    ### 提示

    ![Image](img/sq.jpg) 当使用需要同时使用单引号和双引号的参数时，使用参数文件会得到可预测的行为。相反，如果您尝试在命令行上输入各种必需的引号，操作系统可能会进行解释并传递给
    Data Pump 与您预期不符的内容。


    ## 导入到与原始表空间不同的表空间中


    您偶尔可能需要导出一个表，然后将其导入到不同的用户和不同的表空间中。源数据库可能与目标数据库不同，或者您可能只是尝试在同一数据库内的两个用户之间移动数据。您可以使用
    `REMAP_SCHEMA` 和 `REMAP_TABLESPACE` 参数轻松处理此需求。


    此示例重新映射用户以及表空间。原始用户和表空间是 `HEERA` 和 `INV_DATA`。此命令将 `INV` 表导入到用户 `CHAYA` 和表空间 `DIM_DATA`
    中：

    ```bash

    $ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp remap_schema=HEERA:CHAYA
    \

    remap_tablespace=INV_DATA:DIM_DATA tables=heera.inv

    ```

    `REMAP_TABLESPACE` 功能不会重新创建表空间。它只是指示 Data Pump 将对象放置在与其导出时不同的表空间中。导入时，如果您放置对象的表空间不存在，Data
    Pump 会抛出错误。


    ## 更改数据文件的大小


    您可以在导入时使用带有 `PCTSPACE` 选项的 `TRANSFORM` 参数来更改数据文件的大小。假设您已经创建了一个仅包含表空间元数据的导出：

    ```bash

    $ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp full=y include=tablespace

    ```

    现在，您希望在开发数据库中创建表空间名称包含字符串 `DATA` 的表空间，但没有足够的磁盘空间来按照源数据库中的方式创建这些表空间。在这种情况下，您可以使用
    `TRANSFORM` 参数来指定表空间按照原始大小的百分比创建。


    例如，如果您希望表空间以原始大小的 20% 创建，请发出以下命令：

    ```

    userid=mv_maint/foo directory=dp_dir dumpfile=inv.dmp full=y include=tablespace:"like
    ''%DATA%''" transform=pctspace:20

    ```

    表空间将使用相当于其原始大小 20% 的数据文件创建。区的分配大小也是其原始定义的 20%。这一点很重要，因为 Data Pump 不会检查存储属性是否满足数据文件的最小大小限制。这意味着，如果计算出的较小尺寸违反了
    Oracle 的最小大小（例如，统一区大小为五个块），则在导入期间将抛出错误。


    当用于导出生产数据然后导入到较小的数据库中时，此功能非常有用。在这些场景中，您可能正在通过 `SAMPLE` 参数或 `QUERY` 参数（参见本章后面的“过滤数据和对象”部分）过滤掉部分生产数据。


    ## 更改段和存储属性


    导入时，您可以使用 `TRANSFORM` 参数来更改表的存储属性。此参数的通用语法为

    ```

    TRANSFORM=transform_name:value[:object_type]

    ```

    当您使用 `SEGMENT_ATTRIBUTES:N` 作为转换名称时，可以在导入过程中删除以下段属性：

    * 物理属性

    * 存储属性

    * 表空间

    * 日志记录


    当您导入到开发环境并且不希望表带有其在生产数据库中的所有存储属性时，您可能需要此功能。例如，在开发中，您可能只有一个表空间来存储所有表和索引，而在生产中，您将表和索引分布在多个表空间中。


    以下是一个删除段属性的示例：

    ```bash

    $ impdp mv_maint/foo directory=dp_dir  dumpfile=inv.dmp \

    transform=segment_attributes:n

    ```

    您可以使用 `STORAGE:N` 仅删除存储子句：

    ```bash

    $ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp \

    transform=storage:n

    ```


    ## 过滤数据和对象


    Data Pump 提供了大量用于过滤数据和元数据的机制。您可以通过以下方式影响在 Data Pump 导出或导入中排除或包含的内容：

    * 使用 `QUERY` 参数来导出或导入数据的子集。

    * 使用 `SAMPLE` 参数来导出表中一定百分比的行。

    * 使用 `CONTENT` 参数来排除或包含数据和元数据。

    * 使用 `EXCLUDE` 参数来具体命名要排除的项。

    * 使用 `INCLUDE` 参数来命名要包含的项（从而排除列表中未包含的其他非依赖项）。

    * 使用诸如 `SCHEMAS` 之类的参数来指定您只需要数据库对象的子集（属于指定用户或用户的对象）。


    以下各节将描述这些技术的示例。


    ### 注意

    ![Image](img/sq.jpg) 您不能同时使用 `EXCLUDE` 和 `INCLUDE`。这些参数是互斥的。


    ## 指定查询


    您可以使用 `QUERY` 参数指示 Data Pump 仅将满足特定条件的行写入转储文件。如果您正在重新创建测试环境并且只需要数据的子集，可能需要这样做。

    '
- fmt: '# 使用 Oracle Data Pump 进行高级数据过滤与导出


    ## 使用查询限制数据

    请注意，此技术无法感知可能存在的任何外键约束，因此在考虑父-子关系之前，不能盲目地限制数据集。`QUERY`参数用于包含查询的通用语法如下：


    ```

    QUERY = [schema.][table_name:] query_clause

    ```


    查询子句可以是任何有效的SQL子句。查询必须用双引号或单引号括起来。我建议使用双引号，因为查询中可能需要嵌入单引号来处理`VARCHAR2`数据。此外，您应该使用参数文件，以避免操作系统对引号的解释产生混淆。


    此示例使用参数文件并限制两个表导出的行数。导出时使用的参数文件如下：


    ```

    userid=mv_maint/foo

    directory=dp_dir

    dumpfile=inv.dmp

    tables=inv,reg

    query=inv:"WHERE inv_desc=''Book''"

    query=reg:"WHERE reg_id <=20"

    ```


    假设您将上述代码行放在一个名为`inv.par`的文件中。导出作业引用该参数文件，如下所示：


    ```

    $ expdp parfile=inv.par

    ```


    生成的转储文件仅包含由`QUERY`参数过滤的行。再次提醒，请注意任何父-子关系，并确保导出的内容不会违反导入时的任何约束。


    ## 在导入时使用查询

    您也可以在导入数据时指定查询。以下是一个参数文件，它根据`INV_ID`列限制导入`INV`表的行数：


    ```

    userid=mv_maint/foo

    directory=dp_dir

    dumpfile=inv.dmp

    tables=inv,reg

    query=inv:"WHERE inv_id > 10"

    ```


    此文件内容被放入一个名为`inv2.par`的文件中，并在导入时引用，如下所示：


    ```

    $ impdp parfile=inv2.par

    ```


    `REG`表的所有行都被导入。只有`INV`表中`INV_ID`大于10的行被导入。


    ## 按百分比导出数据

    在导出时，`SAMPLE`参数指示Data Pump根据您提供的数字检索一定百分比的行。Data Pump在导出时不会跟踪父-子关系。因此，当您的表通过外键约束链接，并且您尝试随机选择一定百分比的行时，这种方法效果不佳。


    此参数的通用语法如下：


    ```

    SAMPLE=[[schema_name.]table_name:]sample_percent

    ```


    例如，如果您想导出表中10%的数据，可按如下方式操作：


    ```

    $ expdp mv_maint/foo directory=dp_dir tables=inv sample=10 dumpfile=inv.dmp

    ```


    下一个示例导出两个表，但仅导出`REG`表30%的数据：


    ```

    $ expdp mv_maint/foo directory=dp_dir tables=inv,reg sample=reg:30 dumpfile=inv.dmp

    ```


    ![Image](images/sq.jpg) **注意**  `SAMPLE`参数仅对导出有效。


    ## 从导出文件中排除对象

    对于导出，`EXCLUDE`参数指示Data Pump不导出指定的对象（而`INCLUDE`参数则指示Data Pump在导出文件中仅包含特定对象）。`EXCLUDE`参数的通用语法如下：


    ```

    EXCLUDE=object_type[:name_clause] [, ...]

    ```


    `OBJECT_TYPE`是数据库对象，例如`TABLE`或`INDEX`。要查看可以过滤哪些对象类型，请查看`DATABASE_EXPORT_OBJECTS`、`SCHEMA_EXPORT_OBJECTS`或`TABLE_EXPORT_OBJECTS`的`OBJECT_PATH`列。例如，如果您想查看可以过滤哪些模式级对象，请运行此查询：


    ```

    SELECT  object_path

    FROM    schema_export_objects

    WHERE   object_path NOT LIKE ''%/%'';

    ```


    以下是输出的片段：


    ```

    OBJECT_PATH

    ------------------

    STATISTICS

    SYNONYM

    SYSTEM_GRANT

    TABLE

    TABLESPACE_QUOTA

    TRIGGER

    ```


    `EXCLUDE`参数指示Data Pump导出从导出中过滤掉特定对象。例如，假设您正在导出一个表但希望排除索引和授权：


    ```

    $ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp tables=inv exclude=index,grant

    ```


    您可以通过使用`NAME_CLAUSE`进行更细粒度的过滤。`EXCLUDE`的`NAME_CLAUSE`选项允许您指定一个SQL过滤器。要排除名称以字符串“INV”开头的索引，请使用以下命令：


    ```

    exclude=index:"LIKE ''INV%''"

    ```


    前面的命令要求您使用引号；在这些情况下，我建议您使用参数文件。以下是一个包含`EXCLUDE`子句的参数文件：


    ```

    userid=mv_maint/foo

    directory=dp_dir

    dumpfile=inv.dmp

    tables=inv

    exclude=index:"LIKE ''INV%''"

    ```


    `EXCLUDE`子句的某些方面可能看起来违反直觉。例如，考虑以下导出参数文件：


    ```

    userid=mv_maint/foo

    directory=dp_dir

    dumpfile=sch.dmp

    exclude=schema:"=''HEERA''"

    ```


    如果您尝试以这种方式排除用户，则会抛出错误。这是因为默认的导出模式是`SCHEMA`级别，并且Data Pump不能同时排除和包含一个模式。如果您想从导出文件中排除一个用户，请指定`FULL`模式，然后排除该用户：


    ```

    userid=mv_maint/foo

    directory=dp_dir

    dumpfile=sch.dmp

    exclude=schema:"=''HEERA''"

    full=y

    ```


    ## 排除统计信息

    默认情况下，当您导出表对象时，任何统计信息也会被导出。您可以通过`EXCLUDE`参数防止统计信息被导入。这是一个例子：


    ```

    $ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp \

    tables=inv exclude=statistics

    ```


    在导入时，如果您尝试从原本不包含统计信息的转储文件中排除统计信息，则会收到此错误：


    ```

    ORA-39168: Object path STATISTICS was not found.

    ```


    如果导出转储文件中的对象从未生成过统计信息，您也会收到此错误。


    ## 在导出文件中仅包含特定对象

    使用`INCLUDE`参数在导出文件中仅包含某些数据库对象。以下示例仅导出用户拥有的过程和函数：


    ```

    $ expdp mv_maint/foo dumpfile=proc.dmp directory=dp_dir include=procedure,function

    ```


    创建的`proc.dmp`文件仅包含重新创建用户拥有的任何过程和函数所需的DDL。


    使用`INCLUDE`时，您也可以指定仅导出特定的PL/SQL对象：


    ```

    $ expdp mv_maint/foo directory=dp_dir dumpfile=ss.dmp \

    include=function:\"=\''IS_DATE\''\"

    ```


    当仅导出特定的PL/SQL对象时，由于需要在操作系统命令行上转义引号的问题，我建议使用参数文件。使用参数文件时，这不是问题。以下示例显示了导出特定对象的参数文件内容：


    ```

    directory=dp_dir

    dumpfile=ss.dmp

    include=function:"=''ISDATE''",procedure:"=''DEPTREE_FILL''"

    ```


    如果您指定一个不存在的对象，Data Pump会抛出错误但会继续导出操作：


    ```

    ORA-39168: Object path FUNCTION was not found.

    ```


    ## 导出表、索引、约束和触发器的DDL

    假设您想导出数据库中与表、索引、约束和触发器关联的DDL。为此，请使用`FULL`导出模式，指定`CONTENT=METADATA_ONLY`，并且仅包含表：


    ```

    $ expdp mv_maint/foo directory=dp_dir dumpfile=ddl.dmp \

    content=metadata_only full=y include=table

    ```


    当您导出一个对象时，Data Pump也会导出任何依赖对象。因此，当您导出一个表时，您也会获得与该表关联的索引、约束和触发器。


    ## 从导入中排除对象

    通常，您可以使用与在导出中过滤对象相同的技术来排除对象被导入。使用`EXCLUDE`参数来排除对象被导入。例如，要排除触发器和过程被导入，请使用以下命令：


    ```

    $ impdp mv_maint/foo dumpfile=inv.dmp exclude=trigger,procedure

    ```'
