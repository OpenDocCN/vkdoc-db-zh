    \ 到 6:00 发生了大量的日志切换活动。这可能是由于夜间批处理作业或不同时区的用户更新数据所致。对于这个数据库，应增加在线重做日志的大小。你应该尝试调整在线重做日志的大小，以适应数据库的峰值事务负载。\n\
    \n`V$LOG_HISTORY` 视图的数据来源于控制文件。每次发生日志切换时，该视图中会记录一条详细信息，如切换时间和系统变更号 (SCN)。如前所述，一个经验法则是，你应该将在线重做日志文件的大小调整为大约每小时切换\
    \ 2 到 6 次。你不希望它们切换得太频繁，因为日志切换本身有开销。Oracle 会将检查点作为日志切换的一部分来启动。在检查点期间，数据库写入器后台进程将已修改（也称为脏）的数据块写入磁盘，这是资源密集型的操作。\n\
    \n另一方面，你也不希望在线重做日志文件从不切换，因为当前的在线重做日志包含在恢复事件中你可能需要的事务。如果灾难导致当前在线重做日志发生介质故障，你可能会丢失那些尚未归档的事务。\n\
    \n`![Image](img/sq.jpg)` `提示` 使用 `ARCHIVE_LAG_TARGET` 初始化参数来设置日志切换之间的最大时间（以秒为单位）。此参数的典型设置是\
    \ 1800 秒（30 分钟）。值为 0（默认值）会禁用此功能。此参数通常用于 Oracle Data Guard 环境中，以在指定的时间过后强制进行日志切换。\n\
    \n你也可以查询 `V$INSTANCE_RECOVERY` 视图中的 `OPTIMAL_LOGFILE_SIZE` 列，以确定你的在线重做日志文件大小是否设置正确：\n\
    \n```\nSQL> select optimal_logfile_size from v$instance_recovery;\n```\n\n此列报告了被认为是“最优”的重做日志文件大小（以兆字节为单位），该大小是基于初始化参数\
    \ `FAST_START_MTTR_TARGET` 的设置。Oracle 建议你将所有在线重做日志配置为至少达到 `OPTIMAL_LOGFILE_SIZE`\
    \ 的值。然而，在调整在线重做日志大小时，你必须考虑你的环境信息（例如切换频率）。\n\n## 确定重做日志组的最佳数量\n\nOracle 至少需要两个重做日志组才能运行。但是，只有两个组有时是不够的。要理解原因，请记住每次日志切换发生时，都会启动一个检查点。作为检查点的一部分，数据库写入器会将所有已修改（脏）的数据块从\
    \ SGA 写入磁盘上的数据文件。同时回想一下，在线重做日志是按轮询方式写入的，最终给定日志中的信息会被覆盖。在日志写入器可以开始覆盖在线重做日志中的信息之前，必须先将\
    \ SGA 中与该重做日志关联的所有已修改块写入数据文件。如果并非所有已修改块都已写入数据文件，你会在 `alert.log` 文件中看到此消息：\n\n\
    ```\nThread 1 cannot allocate new log, sequence <sequence number>\nCheckpoint\
    \ not complete\n```\n\n解释此问题的另一种方式是，Oracle 需要在在线重做日志中存储任何可能用于执行崩溃恢复的信息。为了帮助你可视化这一点，请参见\
    \ 图 2-2。\n\n![9781484207642_Fig02-02.jpg](img/9781484207642_Fig02-02.jpg)\n\n\
    图 2-2. 在修改的（脏）缓冲区写入磁盘之前，重做受保护。\n\n在时间 1，块 A 从数据文件 AA 读入缓冲区高速缓存并被修改。在时间 2，重做更改向量信息（块如何更改）被写入日志缓冲区。在时间\
    \ 3，日志写入器进程将块 A 的更改向量信息写入在线重做日志 1。在时间 4，发生日志切换，在线重做日志 2 成为当前的在线重做日志。\n\n现在，假设在线重做日志\
    \ 2 很快填满并发生另一次日志切换，此时日志写入器尝试写入在线重做日志 1。在数据库块写入器将块 A 写入数据文件 AA 之前，日志写入器不被允许覆盖在线重做日志\
    \ 1 中的信息。在块 A 被写入数据文件 AA 之前，如果发生电源故障或 `shutdown abort`，Oracle 需要在线重做日志中的信息来恢复此块。在覆盖在线重做日志中的信息之前，Oracle\
    \ 会确保受重做保护的数据块已写入磁盘。如果这些修改的块尚未写入磁盘，Oracle 会暂时挂起处理，直到写入完成。有几种方法可以解决此问题：\n\n*  \
    \ 添加更多的重做日志组。\n*   降低 `FAST_START_MTTR_TARGET` 的值。这样做会使数据库写入器进程在更短的时间内将较旧的修改块写入磁盘。\n\
    *   调优数据库写入器进程（修改 `DB_WRITER_PROCESSES`）。\n\n如果你注意到 `Checkpoint not complete`\
    \ 消息经常出现（比如一天多次），我建议你添加一个或多个日志组来解决此问题。添加一个额外的重做日志为数据库写入器提供了更多时间，在关联的重做信息被覆盖之前，将数据库缓冲区高速缓存中的修改块写入数据文件。添加更多的重做日志组几乎没有缺点。主要的问题是，你可能会遇到创建数据库时使用的\
    \ `MAXLOGFILES` 值的限制。如果你需要添加更多的组并且已经超出了 `MAXLOGFILES` 的值，那么你必须重新创建控制文件并为此参数指定一个更高的值。\n\
    \n如果添加更多的重做日志组不能解决问题，你应该仔细考虑降低 `FAST_START_MTTR_TARGET` 的值。当你降低此值时，可能会看到更多的 I/O，因为数据库写入器进程更积极地将修改块写入数据文件。理想情况下，最好在生产环境进行更改之前，在测试环境中验证修改\
    \ `FAST_START_MTTR_TARGET` 的影响。你可以在实例运行时修改此参数；这意味着如果出现不可预见的副作用，你可以快速将其修改回原始设置。\n\
    \n最后，考虑增加 `DB_WRITER_PROCESSES` 参数的值。在生产环境应用此更改之前，请仔细分析在测试环境中修改此参数的影响。此值的修改需要停止并启动数据库；因此，如果产生不利影响，则需要停机才能将此值更改回原始设置。\n\
    \n## 添加在线重做日志组\n\n如果你确定需要添加在线重做日志组，请使用 `ADD LOGFILE GROUP` 语句。在此示例中，数据库已包含两个大小各为\
    \ 50M 的在线重做日志组。添加了一个额外的日志组，该组有两个成员，大小为 50MB：\n\n```\nalter database add logfile\
    \ group 3\n('/u01/oraredo/O12C/redo03a.rdo',\n '/u02/oraredo/O12C/redo03b.rdo')\
    \ SIZE 50M;\n```"
- fmt: "In this scenario I highly recommend that the log group you add be the same\
    \ size and have the same number of members as the existing online redo logs. If\
    \ the newly added group doesn’t have the same physical characteristics as the\
    \ existing groups, it’s harder to accurately determine performance issues.\n\n\
    For example, if you have two log groups sized at 50MB, and you add a new log group\
    \ sized at 500MB, this is very likely to produce the `Checkpoint not complete`\
    \ issue described in the previous section. This is because flushing all modified\
    \ blocks from the SGA that are protected by the redo in a 500MB log file can potentially\
    \ take much longer than flushing modified blocks from the SGA that are protected\
    \ by a 50MB log file.\n\n## Resizing and Dropping Online Redo Log Groups\n\nYou\
    \ may need to change the size of your online redo logs (see the section “Determining\
    \ the Optimal Size of Online Redo Log Groups,” earlier in this chapter). You can’t\
    \ directly modify the size of an existing online redo log. To resize an online\
    \ redo log, you have to first add online redo log groups that are the size you\
    \ want, and then drop the online redo logs that are the old size.\n\nSay you want\
    \ to resize the online redo logs to be 200MB each. First, you add new groups that\
    \ are 200MB, using the `ADD LOGFILE GROUP` statement. The following example adds\
    \ log group 4, with two members sized at 200MB:\n\n```\nalter database add logfile\
    \ group 4\n('/u01/oraredo/O12C/redo04a.rdo',\n '/u02/oraredo/O12C/redo04b.rdo')\
    \ SIZE 200M;\n```\n\n![Image](images/sq.jpg) **Note** You can specify the size\
    \ of the log file in bytes, kilobytes, megabytes, or gigabytes.\n\nAfter you’ve\
    \ added the log files with the new size, you can drop the old online redo logs.\
    \ A log group must have an `INACTIVE` status before you can drop it. You can check\
    \ the status of the log group, as shown here:\n\n```\nSQL> select group#, status,\
    \ archived, thread#, sequence# from v$log;\n```\n\nYou can drop an inactive log\
    \ group with the `ALTER DATABASE DROP LOGFILE GROUP` statement:\n\n```\nSQL> alter\
    \ database drop logfile group <group #>;\n```\n\nIf you attempt to drop the current\
    \ online log group, Oracle returns an `ORA-01623` error, stating that you can’t\
    \ drop the current group. Use the `ALTER SYSTEM SWITCH LOGFILE` statement to switch\
    \ the logs and make the next group the current group:\n\n```\nSQL> alter system\
    \ switch logfile;\n```\n\nAfter a log switch the log group that was previously\
    \ the current group retains an active status as long as it contains redo that\
    \ Oracle requires to perform crash recovery. If you attempt to drop a log group\
    \ with an active status, Oracle throws an `ORA-01624` error, indicating that the\
    \ log group is required for crash recovery. Issue an `ALTER SYSTEM CHECKPOINT`\
    \ command to make the log group inactive:\n\n```\nSQL> alter system checkpoint;\n\
    ```\n\nAdditionally, you can’t drop an online redo log group if doing so leaves\
    \ your database with only one log group. If you attempt to do this, Oracle throws\
    \ an `ORA-01567` error and informs you that dropping the log group isn’t permitted\
    \ because it would leave you with fewer than two log groups for your database\
    \ (as mentioned earlier, Oracle requires at least two redo log groups in order\
    \ to function).\n\nDropping an online redo log group doesn’t remove the log files\
    \ from the OS. You have to use an OS command to do this (such as the `rm` Linux/Unix\
    \ command). Before you remove a file from the OS, ensure that it isn’t in use\
    \ and that you don’t remove a live online redo log file. For every database on\
    \ the server, issue this query to view which online redo log files are in use:\n\
    \n```\nSQL> select member from v$logfile;\n```\n\nBefore you physically remove\
    \ a log file, first switch the online redo logs enough times that all online redo\
    \ log groups have recently been switched; doing so causes the OS to write to the\
    \ file and thus give it a new timestamp. For example, if you have three groups,\
    \ make sure you perform at least three log switches:\n\n```\nSQL> alter system\
    \ switch logfile;\nSQL> /\nSQL> /\n```\n\nNow, verify at the OS prompt that the\
    \ log file you intend to remove doesn’t have a new timestamp. First, go to the\
    \ directory containing the online redo log files:\n\n```\n$ cd  /u01/oraredo/O12C\n\
    ```\n\nThen, list the files to view the latest modification date:\n\n```\n$ ls\
    \ -altr\n```\n\nWhen you’re absolutely sure the file isn’t in use, you can remove\
    \ it. The danger in removing a file is that if it happens to be an in-use online\
    \ redo log, and the only member of a group, you can cause serious damage to your\
    \ database. Ensure that you have a good backup of your database and that the file\
    \ you’re removing isn’t used by any databases on the server.\n\n## Adding Online\
    \ Redo Log Files to a Group\n\nYou may occasionally need to add a log file to\
    \ an existing group. For example, if you have an online redo log group that contains\
    \ only one member, you should consider adding a log file (to provide a higher\
    \ level of protection against a single–log file member failure). Use the `ALTER\
    \ DATABASE ADD LOGFILE MEMBER` statement to add a member file to an existing online\
    \ redo log group. You need to specify the new member file location, name, and\
    \ group to which you want to add the file:\n\n```\nSQL> alter database add logfile\
    \ member '/u02/oraredo/O12C/redo01b.rdo' to group 1;\n```\n\nMake certain you\
    \ follow standards with regard to the location and names of any newly added redo\
    \ log files.\n\n## Removing Online Redo Log Files from a Group\n\nOccasionally,\
    \ you may need to remove an online redo log file from a group. For example, your\
    \ database may have experienced a failure with one member of a multiplexed group,\
    \ and you want to remove the apostate member. First, make sure the log file you\
    \ want to drop isn’t in the current group:\n\n```\nSELECT a.group#, a.member,\
    \ b.status, b.archived, SUM(b.bytes)/1024/1024 mbytes\nFROM v$logfile a, v$log\
    \ b\nWHERE a.group# = b.group#\nGROUP BY a.group#, a.member, b.status, b.archived\n\
    ORDER BY 1, 2;\n```\n\nIf you attempt to drop a log file that is in the group\
    \ with the `CURRENT` status, you receive the following error:\n\n```\nORA-01623:\
    \ log 2 is current log for instance O12C (thread 1) - cannot drop\n```\n\nIf you’re\
    \ attempting to drop a member from the current online redo log group, then force\
    \ a switch, as follows:\n\n```\nSQL> alter system switch logfile;\n```\n\nUse\
    \ the `ALTER DATABASE DROP LOGFILE MEMBER` statement to remove a member file from\
    \ an existing online redo log group. You don’t need to specify the group number\
    \ because you’re removing a specific file:\n\n```\nSQL> alter database drop logfile\
    \ member '/u01/oraredo/O12C/redo04a.rdo';\n```\n\nYou also can’t drop the last\
    \ remaining log file of a group. A group must contain at least one log file. If\
    \ you attempt to drop the last remaining log file of a group, you receive the\
    \ following error:\n\n```\nORA-00361: cannot remove last log member ...\n```\n\
    \n## Moving or Renaming Redo Log Files\n\nSometimes, you need to move or rename\
    \ online redo log files. For example, you may have added some new mount points\
    \ to the system, and you want to move the online redo logs to the new storage.\
    \ You can use two methods to accomplish this task:\n\n*   Add the new log files\
    \ in the new location, and drop the old log files.\n*   Physically rename the\
    \ files from the OS.\n\nIf you can’t afford any downtime, consider adding new\
    \ log files in the new location and then dropping the old log files. See the section\
    \ “Adding Online Redo Log Groups,” earlier in this chapter, for details on how\
    \ to add a log group. See also the section “Resizing and Dropping Online Redo\
    \ Log Groups,” earlier in this chapter, for details on how to drop a log group."
  raw: 'In this scenario I highly recommend that the log group you add be the same
    size and have the same number of members as the existing online redo logs. If
    the newly added group doesn’t have the same physical characteristics as the existing
    groups, it’s harder to accurately determine performance issues.


    For example, if you have two log groups sized at 50MB, and you add a new log group
    sized at 500MB, this is very likely to produce the `Checkpoint not complete` issue
    described in the previous section. This is because flushing all modified blocks
    from the SGA that are protected by the redo in a 500MB log file can potentially
    take much longer than flushing modified blocks from the SGA that are protected
    by a 50MB log  file.


    Resizing and Dropping Online Redo Log Groups


    You may need to change the size of your online redo logs (see the section “Determining
    the Optimal Size of Online Redo Log Groups,” earlier in this chapter). You can’t
    directly modify the size of an existing online redo log. To resize an online redo
    log, you have to first add online redo log groups that are the size you want,
    and then drop the online redo logs that are the old size.


    Say you want to resize the online redo logs to be 200MB each. First, you add new
    groups that are 200MB, using the `ADD LOGFILE GROUP` statement. The following
    example adds log group 4, with two members sized at 200MB:


    ```

    alter database add logfile group 4

    (''/u01/oraredo/O12C/redo04a.rdo'',

     ''/u02/oraredo/O12C/redo04b.rdo'') SIZE 200M;

    ```


    ![Image](images/sq.jpg) **Note**  You can specify the size of the log file in
    bytes, kilobytes, megabytes, or gigabytes.


    After you’ve added the log files with the new size, you can drop the old online
    redo logs. A log group must have an `INACTIVE` status before you can drop it.
    You can check the status of the log group, as shown here:


    ```

    SQL> select group#, status, archived, thread#, sequence# from v$log;

    ```


    You can drop an inactive log group with the `ALTER DATABASE DROP LOGFILE GROUP`
    statement:


    ```

    SQL> alter database drop logfile group <group #>;

    ```


    If you attempt to drop the current online log group, Oracle returns an `ORA-01623`
    error, stating that you can’t drop the current group. Use the `ALTER SYSTEM SWITCH
    LOGFILE` statement to switch the logs and make the next group the current group:


    ```

    SQL> alter system switch logfile;

    ```


    After a log switch the log group that was previously the current group retains
    an active status as long as it contains redo that Oracle requires to perform crash
    recovery. If you attempt to drop a log group with an active status, Oracle throws
    an `ORA-01624` error, indicating that the log group is required for crash recovery.
    Issue an `ALTER SYSTEM CHECKPOINT` command to make the log group inactive:


    ```

    SQL> alter system checkpoint;

    ```


    Additionally, you can’t drop an online redo log group if doing so leaves your
    database with only one log group. If you attempt to do this, Oracle throws an
    `ORA-01567` error and informs you that dropping the log group isn’t permitted
    because it would leave you with fewer than two log groups for your database (as
    mentioned earlier, Oracle requires at least two redo log groups in order to function).


    Dropping an online redo log group doesn’t remove the log files from the OS. You
    have to use an OS command to do this (such as the `rm` Linux/Unix command). Before
    you remove a file from the OS, ensure that it isn’t in use and that you don’t
    remove a live online redo log file. For every database on the server, issue this
    query to view which online redo log files are in use:


    ```

    SQL> select member from v$logfile;

    ```


    Before you physically remove a log file, first switch the online redo logs enough
    times that all online redo log groups have recently been switched; doing so causes
    the OS to write to the file and thus give it a new timestamp. For example, if
    you have three groups, make sure you perform at least three log switches:


    ```

    SQL> alter system switch logfile;

    SQL> /

    SQL> /

    ```


    Now, verify at the OS prompt that the log file you intend to remove doesn’t have
    a new timestamp. First, go to the directory containing the online redo log files:


    ```

    $ cd  /u01/oraredo/O12C

    ```


    Then, list the files to view the latest modification date:


    ```

    $ ls -altr

    ```


    When you’re absolutely sure the file isn’t in use, you can remove it. The danger
    in removing a file is that if it happens to be an in-use online redo log, and
    the only member of a group, you can cause serious damage to your database. Ensure
    that you have a good backup of your database and that the file you’re removing
    isn’t used by any databases on the server.


    Adding Online Redo Log Files to a Group


    You may occasionally need to add a log file to an existing group. For example,
    if you have an online redo log group that contains only one member, you should
    consider adding a log file (to provide a higher level of protection against a
    single–log file member failure). Use the `ALTER DATABASE ADD LOGFILE MEMBER` statement
    to add a member file to an existing online redo log group. You need to specify
    the new member file location, name, and group to which you want to add the file:


    ```

    SQL> alter database add logfile member ''/u02/oraredo/O12C/redo01b.rdo'' to group
    1;

    ```


    Make certain you follow standards with regard to the location and names of any
    newly added redo log  files.


    Removing Online Redo Log Files from a Group


    Occasionally, you may need to remove an online redo log file from a group. For
    example, your database may have experienced a failure with one member of a multiplexed
    group, and you want to remove the apostate member. First, make sure the log file
    you want to drop isn’t in the current group:


    ```

    SELECT a.group#, a.member, b.status, b.archived, SUM(b.bytes)/1024/1024 mbytes

    FROM v$logfile a, v$log b

    WHERE a.group# = b.group#

    GROUP BY a.group#, a.member, b.status, b.archived

    ORDER BY 1, 2;

    ```


    If you attempt to drop a log file that is in the group with the `CURRENT` status,
    you receive the following error:


    ```

    ORA-01623: log 2 is current log for instance O12C (thread 1) - cannot drop

    ```


    If you’re attempting to drop a member from the current online redo log group,
    then force a switch, as follows:


    ```

    SQL> alter system switch logfile;

    ```


    Use the `ALTER DATABASE DROP LOGFILE MEMBER` statement to remove a member file
    from an existing online redo log group. You don’t need to specify the group number
    because you’re removing a specific file:


    ```

    SQL> alter database drop logfile member ''/u01/oraredo/O12C/redo04a.rdo'';

    ```


    You also can’t drop the last remaining log file of a group. A group must contain
    at least one log file. If you attempt to drop the last remaining log file of a
    group, you receive the following error:


    ```

    ORA-00361: cannot remove last log member ...

    ```


    Moving or Renaming Redo Log Files


    Sometimes, you need to move or rename online redo log files. For example, you
    may have added some new mount points to the system, and you want to move the online
    redo logs to the new storage. You can use two methods to accomplish this task:


    *   Add the new log files in the new location, and drop the old log files.

    *   Physically rename the files from the OS.


    If you can’t afford any downtime, consider adding new log files in the new location
    and then dropping the old log files. See the section “Adding Online Redo Log Groups,”
    earlier in this chapter, for details on how to add a log group. See also the section
    “Resizing and Dropping Online Redo Log Groups,” earlier in this chapter, for details
    on how to drop a log group.'
  trans: "\n在此场景下，我强烈建议你添加的日志组应与现有的在线重做日志大小相同，并且包含相同数量的成员。如果新添加的组与现有组的物理特性不一致，将更难准确判断性能问题。\n\
    \n例如，如果你有两个大小为 50MB 的日志组，而你添加了一个大小为 500MB 的新日志组，这很可能会产生前一节描述的`Checkpoint not complete`（检查点未完成）问题。这是因为，从\
    \ SGA 中刷出由 500MB 日志文件保护的所有已修改数据块，所需时间可能远比刷出由 50MB 日志文件保护的已修改数据块长得多。\n\n## 调整大小与删除在线重做日志组\n\
    \n你可能需要更改在线重做日志的大小（参见本章前面的“确定在线重做日志组的最佳大小”一节）。你无法直接修改现有在线重做日志的大小。要调整在线重做日志的大小，必须先添加符合你目标大小的在线重做日志组，然后删除旧大小的日志。\n\
    \n假设你想将每个在线重做日志的大小调整为 200MB。首先，使用`ADD LOGFILE GROUP`语句添加大小为 200MB 的新组。以下示例添加了日志组\
    \ 4，包含两个大小为 200MB 的成员：\n\n```\nalter database add logfile group 4\n('/u01/oraredo/O12C/redo04a.rdo',\n\
    \ '/u02/oraredo/O12C/redo04b.rdo') SIZE 200M;\n```\n\n![Image](img/sq.jpg) **注意**\
    \ 你可以指定日志文件的大小，单位可以是字节、千字节、兆字节或千兆字节。\n\n添加了新大小的日志文件后，就可以删除旧的在线重做日志了。一个日志组必须处于`INACTIVE`（非活动）状态才能被删除。你可以检查日志组的状态，如下所示：\n\
    \n```\nSQL> select group#, status, archived, thread#, sequence# from v$log;\n\
    ```\n\n你可以使用`ALTER DATABASE DROP LOGFILE GROUP`语句删除一个非活动的日志组：\n\n```\nSQL> alter\
    \ database drop logfile group <group #>;\n```\n\n如果你尝试删除当前的在线日志组，Oracle 会返回一个`ORA-01623`错误，提示你不能删除当前组。使用`ALTER\
    \ SYSTEM SWITCH LOGFILE`语句切换日志，使下一个组成为当前组：\n\n```\nSQL> alter system switch logfile;\n\
    ```\n\n日志切换后，先前作为当前组的日志组，只要其中包含 Oracle 执行崩溃恢复所需的重做信息，就会保持活动状态。如果你尝试删除一个状态为活动的日志组，Oracle\
    \ 会抛出一个`ORA-01624`错误，指出该日志组是崩溃恢复所必需的。执行`ALTER SYSTEM CHECKPOINT`命令使日志组变为非活动状态：\n\
    \n```\nSQL> alter system checkpoint;\n```\n\n此外，如果删除一个在线重做日志组会导致你的数据库只剩下最后一个日志组，那么你不能删除它。如果你尝试这样做，Oracle\
    \ 会抛出`ORA-01567`错误，并告知你删除该日志组不被允许，因为这会使你的数据库少于两个日志组（如前所述，Oracle 至少需要两个重做日志组才能运行）。\n\
    \n删除一个在线重做日志组并不会从操作系统中删除日志文件。你必须使用操作系统命令（例如 Linux/Unix 命令`rm`）来删除文件。在从操作系统中删除文件之前，请确保该文件未在使用，并且你删除的不是活动的在线重做日志文件。针对服务器上的每个数据库，执行此查询以查看哪些在线重做日志文件正在使用中：\n\
    \n```\nSQL> select member from v$logfile;\n```\n\n在物理删除日志文件之前，先执行足够多次的日志切换，确保所有在线重做日志组最近都已被切换过；这样做会使操作系统写入该文件，从而为其更新时间戳。例如，如果你有三个组，请确保执行至少三次日志切换：\n\
    \n```\nSQL> alter system switch logfile;\nSQL> /\nSQL> /\n```\n\n现在，在操作系统提示符下验证你打算删除的日志文件是否没有新的时间戳。首先，进入包含在线重做日志文件的目录：\n\
    \n```\n$ cd  /u01/oraredo/O12C\n```\n\n然后，列出文件以查看最新的修改日期：\n\n```\n$ ls -altr\n\
    ```\n\n当你完全确定该文件未被使用时，才可以删除它。删除文件的风险在于，如果它恰好是一个正在使用的在线重做日志，并且是某个组的唯一成员，则可能对你的数据库造成严重损害。确保你拥有数据库的良好备份，并且要删除的文件未被服务器上的任何数据库使用。\n\
    \n## 向组中添加在线重做日志文件\n\n你可能偶尔需要向现有组中添加一个日志文件。例如，如果你有一个仅包含一个成员的在线重做日志组，你应该考虑添加一个日志文件（以提供更高级别的保护，防止单一日志文件成员故障）。使用`ALTER\
    \ DATABASE ADD LOGFILE MEMBER`语句向现有的在线重做日志组添加一个成员文件。你需要指定新成员文件的位置、名称以及要添加到的组：\n\
    \n```\nSQL> alter database add logfile member '/u02/oraredo/O12C/redo01b.rdo'\
    \ to group 1;\n```\n\n请确保你遵循关于任何新添加的重做日志文件的位置和命名的标准。\n\n## 从组中移除在线重做日志文件\n\n偶尔，你可能需要从一个组中移除一个在线重做日志文件。例如，你的数据库可能经历了一个多路复用组中某个成员的故障，而你希望移除这个失效的成员。首先，确保你要删除的日志文件不在当前组中：\n\
    \n```\nSELECT a.group#, a.member, b.status, b.archived, SUM(b.bytes)/1024/1024\
    \ mbytes\nFROM v$logfile a, v$log b\nWHERE a.group# = b.group#\nGROUP BY a.group#,\
    \ a.member, b.status, b.archived\nORDER BY 1, 2;\n```\n\n如果你尝试删除状态为`CURRENT`（当前）的组中的日志文件，你会收到以下错误：\n\
    \n```\nORA-01623: log 2 is current log for instance O12C (thread 1) - cannot drop\n\
    ```\n\n如果你正在尝试从当前的在线重做日志组中删除一个成员，则强制进行一次切换，如下所示：\n\n```\nSQL> alter system switch\
    \ logfile;\n```\n\n使用`ALTER DATABASE DROP LOGFILE MEMBER`语句从现有的在线重做日志组中移除一个成员文件。你不需要指定组号，因为你是在移除一个特定的文件：\n\
    \n```\nSQL> alter database drop logfile member '/u01/oraredo/O12C/redo04a.rdo';\n\
    ```\n\n你也不能删除一个组中最后一个剩余的日志文件。一个组必须至少包含一个日志文件。如果你尝试删除一个组中最后一个剩余的日志文件，你会收到以下错误：\n\
    \n```\nORA-00361: cannot remove last log member ...\n```\n\n## 移动或重命名重做日志文件\n\n\
    有时，你需要移动或重命名在线重做日志文件。例如，你可能向系统添加了一些新的挂载点，并希望将在线重做日志移动到新的存储设备上。你可以使用两种方法来完成此任务：\n\
    \n*   在新位置添加新的日志文件，然后删除旧的日志文件。\n*   在操作系统层面物理重命名文件。\n\n如果你无法承担任何停机时间，请考虑在新位置添加新的日志文件，然后删除旧的日志文件。有关如何添加日志组的详细信息，请参阅本章前面的“添加在线重做日志组”一节。另请参阅本章前面的“调整大小与删除在线重做日志组”一节，了解如何删除日志组。\n"
- fmt: "## 移动在线重做日志文件\n\n或者，您可以从操作系统层面物理移动文件。您可以在数据库打开或关闭的状态下执行此操作。如果您的数据库是打开的，请确保您移动的文件不属于当前的在线重做日志组（因为这些文件正被日志写入器后台进程写入）。在数据库打开时尝试执行此任务是危险的，因为在活动系统中，在线重做日志可能正在快速切换，这会导致您有可能在文件被切换为当前在线重做日志时尝试移动它。因此，我强烈建议您仅在数据库关闭时执行此操作。\n\
    \n下一个示例展示了如何在数据库关闭时移动在线重做日志文件。步骤如下：\n\n1.  关闭数据库：\n\n    ```\n    SQL> shutdown\
    \ immediate;\n    ```\n\n2.  在操作系统提示符下，移动文件。此示例使用 `mv` 命令完成此任务：\n\n    ```\n \
    \   $ mv /u02/oraredo/O12C/redo02b.rdo /u01/oraredo/O12C/redo02b.rdo\n    ```\n\
    \n3.  以 `mount` 模式启动数据库：\n\n    ```\n    SQL> startup mount;\n    ```\n\n4.  用新的文件位置和名称更新控制文件：\n\
    \n    ```\n    SQL> alter database rename file '/u02/oraredo/O12C/redo02b.rdo'\n\
    \         to '/u01/oraredo/O12C/redo02b.rdo';\n    ```\n\n5.  打开数据库：\n\n    ```\n\
    \    SQL> alter database open;\n    ```\n\n您可以通过查询 `V$LOGFILE` 视图来验证您的在线重做日志是否已位于新位置。我还建议您切换几次在线重做日志，然后从操作系统验证这些文件是否具有最近的时间戳。同时检查\
    \ `alert.log` 文件是否有任何相关错误。\n\n## 实现归档日志模式\n\n回顾本章前面的讨论，只有当您的数据库处于归档日志模式时，才会创建归档重做日志。如果您希望保留数据库事务历史以支持时间点恢复和其他类型的恢复，就需要启用该模式。\n\
    \n在正常操作中，对数据的更改会在数据库重做日志文件中生成条目。当每个在线重做日志组填满时，会启动日志切换。当发生日志切换时，日志写入器进程停止向最近填满的在线重做日志组写入，并开始向一个新的在线重做日志组写入。在线重做日志组以轮转方式被写入——这意味着任何给定的在线重做日志组的内容最终将被覆盖。归档日志模式通过使用归档器后台进程将已填满的在线重做日志的内容复制到所谓的\
    \ `archive redo log file` 中，从而长期保留重做数据。归档重做日志文件的轨迹对于您能够恢复数据库并保留所有更改直至故障发生的确切时刻至关重要。\n\
    \n## 做出架构决策\n\n当您实现归档日志模式时，您还需要一个管理归档日志文件的策略。归档重做日志会消耗磁盘空间。如果置之不理，这些文件最终将用完分配给它们的所有空间。如果发生这种情况，归档器就无法将新的归档重做日志文件写入磁盘，而您的数据库将停止处理事务。那时，您将面对一个挂起的数据库。然后您需要手动干预，为归档器创建空间以恢复工作。由于这些原因，在启用归档之前，您必须仔细考虑几个架构决策：\n\
    \n*   将归档重做日志放置在何处，以及是否使用 `FRA` 来存储它们\n*   如何命名归档重做日志\n*   为归档重做日志位置分配多少空间\n*\
    \   多久备份一次归档重做日志\n*   何时可以从磁盘永久删除归档重做日志\n*   如何删除归档重做日志（例如，让 `RMAN` 根据保留策略删除日志）\n\
    *   是否应启用多个归档重做日志位置\n*   （何时安排所需的少量停机时间（如果是生产数据库）\n\n作为一般经验法则，您的主要归档重做位置应有足够的空间来容纳至少一天的归档重做日志。这允许您每天备份它们，并在备份后从磁盘中删除它们。\n\
    \n如果您决定使用 `FRA` 作为归档重做日志位置，您必须确保它包含足够的空间来容纳备份之间生成的归档重做日志数量。请记住，`FRA` 通常包含其他类型的文件，例如\
    \ `RMAN` 备份文件、闪回日志等。如果您使用 `FRA`，请注意其他类型文件的生成可能会潜在地影响归档重做日志文件所需的空间。\n\n您需要一个自动化备份和删除归档重做日志文件的策略。对于用户管理的备份，可以通过一个\
    \ shell 脚本来实现，该脚本定期将归档重做日志复制到备份位置，然后从主要位置删除它们。正如您将在后续章节中看到的，`RMAN` 可以自动化归档重做日志文件的备份和删除。\n\
    \n如果您的业务要求是必须具备一定程度的高可用性和冗余，那么您应该考虑将归档重做日志写入多个位置。一些机构设置作业，定期将归档重做日志复制到磁盘上的不同位置，甚至是不同的服务器。\n\
    \n## 设置归档重做文件位置\n\n在将数据库模式设置为归档之前，您应明确指示 `Oracle` 您希望归档重做日志放置的位置。您可以使用以下技术设置归档重做日志文件目标：\n\
    \n*   设置 `LOG_ARCHIVE_DEST_N` 数据库初始化参数。\n*   实现 `FRA`。\n\n这两种方法将在以下部分详细讨论。\n\n\
    `images/sq.jpg` **Tip** 如果您未通过初始化参数或启用 `FRA` 明确设置归档重做日志位置，那么归档重做日志将被写入默认位置。对于\
    \ `Linux/Unix`，默认位置是 `ORACLE_HOME/dbs`。对于 `Windows`，默认位置是 `ORACLE_HOME\\database`。对于活动的生产数据库系统，默认的归档重做日志位置通常不合适。\n\
    \n### 设置归档位置到用户定义的磁盘位置（非FRA）\n\n如果您使用的是 `init<SID>.ora` 文件，请使用操作系统实用程序（例如 `vi`）修改该文件。在此示例中，归档重做日志位置设置为\
    \ `/u01/oraarch/O12C`：\n\n```\nlog_archive_dest_1='location=/u01/oraarch/O12C'\n\
    log_archive_format='O12C_%t_%s_%r.arc'\n```\n\n在之前的代码行中，我命名归档重做日志文件的标准包括 `ORACLE_SID`（在此示例中，以\
    \ `O12C` 开始字符串）；强制参数 `%t`、`%s` 和 `%r`；以及字符串 `.arc` 作为结尾。我喜欢在字符串中嵌入 `ORACLE_SID`\
    \ 的名称，以避免在一台服务器上托管多个数据库时产生混淆。我喜欢使用扩展名 `.arc` 来将这些文件与其他类型的数据库文件区分开来。\n\n`images/sq.jpg`\
    \ **Tip** 如果您没有为 `LOG_ARCHIVE_FORMAT` 指定值，`Oracle` 会使用默认值，例如 `%t_%s_%r.dbf`。默认格式的一个我不喜欢的方面是它以扩展名\
    \ `.dbf` 结尾，该扩展名广泛用于数据文件。这可能会引起关于某个特定文件是否可以安全删除的混淆，因为它是一个旧的归档重做日志文件，还是不应该触动的实时数据文件。大多数\
    \ `DBA` 不愿意发出诸如 `rm *.dbf` 之类的命令，因为担心意外删除实时数据文件。\n\n如果您使用的是 `spfile`，请使用 `ALTER\
    \ SYSTEM` 修改相应的初始化变量：\n\n```\nSQL> alter system set log_archive_dest_1='location=/u01/oraarch/O12C'\
    \ scope=both;\nSQL> alter system set log_archive_format='O12C_%t_%s_%r.arc' scope=spfile;\n\
    ```"
  raw: "Alternatively, you can physically move the files from the OS. You can do this\
    \ with the database open or closed. If your database is open, ensure that the\
    \ files you move aren’t part of the current online redo log group (because those\
    \ are actively written to by the log writer background process). It’s dangerous\
    \ to try to do this task while your database is open because on an active system,\
    \ the online redo logs may be switching at a rapid rate, which creates the possibility\
    \ of attempting to move a file while it’s being switched to be the current online\
    \ redo log. Therefore, I strongly recommend that you only try to do this while\
    \ your database is closed.\n\nThe next example shows how to move the online redo\
    \ log files with the database shut down. Here are the steps:\n\n1.  Shut down\
    \ your database:\n\n```\n    SQL> shutdown immediate;\n    ```\n\n2.  From the\
    \ OS prompt, move the files. This example uses the `mv` command to accomplish\
    \ this task:\n\n```\n    $ mv /u02/oraredo/O12C/redo02b.rdo /u01/oraredo/O12C/redo02b.rdo\n\
    \    ```\n\n3.  Start up your database in mount mode:\n\n```\n    SQL> startup\
    \ mount;\n    ```\n\n4.  Update the control file with the new file locations and\
    \ names:\n\n```\n    SQL> alter database rename file '/u02/oraredo/O12C/redo02b.rdo'\n\
    \         to '/u01/oraredo/O12C/redo02b.rdo';\n    ```\n\n5.  Open your database:\n\
    \n```\n    SQL> alter database open;\n    ```\n\nYou can verify that your online\
    \ redo logs are in the new locations by querying the `V$LOGFILE` view. I recommend\
    \ as well that you switch your online redo logs several times and then verify\
    \ from the OS that the files have recent timestamps. Also check the `alert.log`\
    \ file for any pertinent errors.\n\nImplementing Archivelog Mode\n\nRecall from\
    \ the discussion earlier in this chapter that archive redo logs are created only\
    \ if your database is in archivelog mode. If you want to preserve your database\
    \ transaction history to facilitate point-in-time and other types of recovery,\
    \ you need to enable that mode.\n\nIn normal operation, changes to your data generate\
    \ entries in the database redo log files. As each online redo log group fills\
    \ up, a log switch is initiated. When a log switch occurs, the log writer process\
    \ stops writing to the most recently filled online redo log group and starts writing\
    \ to a new online redo log group. The online redo log groups are written to in\
    \ a round-robin fashion—meaning the contents of any given online redo log group\
    \ will eventually be overwritten. Archivelog mode preserves redo data for the\
    \ long term by employing an archiver background process to copy the contents of\
    \ a filled online redo log to what is termed an *archive redo log file*. The trail\
    \ of archive redo log files is crucial to your ability to recover the database\
    \ with all changes intact, right up to the precise point of failure.\n\nMaking\
    \ Architectural Decisions\n\nWhen you implement archivelog mode, you also need\
    \ a strategy for managing the archived log files. The archive redo logs consume\
    \ disk space. If left unattended, these files will eventually use up all the space\
    \ allocated for them. If this happens, the archiver can’t write a new archive\
    \ redo log file to disk, and your database will stop processing transactions.\
    \ At that point, you have a hung database. You then need to intervene manually\
    \ by creating space for the archiver to resume work. For these reasons, there\
    \ are several architectural decisions you must carefully consider before you enable\
    \ archiving:\n\n*   Where to place the archive redo logs and whether to use the\
    \ FRA to store them\n*   How to name the archive redo logs\n*   How much space\
    \ to allocate to the archive redo log location\n*   How often to back up the archive\
    \ redo logs\n*   When it’s okay to permanently remove archive redo logs from disk\n\
    *   How to remove archive redo logs (e.g., have RMAN remove the logs, based on\
    \ a retention policy)\n*   Whether multiple archive redo log locations should\
    \ be enabled\n*   (When to schedule the small amount of downtime that’s required\
    \ (if a production database)\n\nAs a general rule of thumb, you should have enough\
    \ space in your primary archive redo location to hold at least a day’s worth of\
    \ archive redo logs. This lets you back them up on a daily basis and then remove\
    \ them from disk after they’ve been backed up.\n\nIf you decide to use a FRA for\
    \ your archive redo log location, you must ensure that it contains sufficient\
    \ space to hold the number of archive redo logs generated between backups. Keep\
    \ in mind that the FRA typically contains other types of files, such as RMAN backup\
    \ files, flashback logs, and so on. If you use a FRA, be aware that the generation\
    \ of other types of files can potentially impact the space required by the archive\
    \ redo log files.\n\nYou need a strategy for automating the backup and removal\
    \ of archive redo log files. For user-managed backups, this can be implemented\
    \ with a shell script that periodically copies the archive redo logs to a backup\
    \ location and then removes them from the primary location. As you will see in\
    \ later chapters, RMAN automates the backup and removal of archive redo log files.\n\
    \nIf your business requirements are such that you must have a certain degree of\
    \ high availability and redundancy, then you should consider writing your archive\
    \ redo logs to more than one location. Some shops set up jobs to copy the archive\
    \ redo logs periodically to a different location on disk or even to a different\
    \ server.\n\nSetting the Archive Redo File Location\n\nBefore you set your database\
    \ mode to archiving, you should specifically instruct Oracle where you want the\
    \ archive redo logs to be placed. You can set the archive redo log file destination\
    \ with the following techniques:\n\n*   Set the `LOG_ARCHIVE_DEST_N` database\
    \ initialization parameter.\n*   Implement a FRA.\n\nThese two approaches are\
    \ discussed in detail in the following sections.\n\n![Image](images/sq.jpg) **Tip**  If\
    \ you don’t specifically set the archive redo log location via an initialization\
    \ parameter or by enabling the FRA, then the archive redo logs are written to\
    \ a default location. For Linux/Unix the default location is `ORACLE_HOME/dbs`.\
    \ For Windows the default location is `ORACLE_HOME\\database`. For active production\
    \ database systems, the default archive redo log location is rarely appropriate.\n\
    \nSetting the Archive Location to a User-Defined Disk Location (non-FRA)\n\nIf\
    \ you’re using an `init<SID>.ora` file, modify the file with an OS utility (such\
    \ as `vi`). In this example the archive redo log location is set to `/u01/oraarch/O12C`:\n\
    \n```\nlog_archive_dest_1='location=/u01/oraarch/O12C'\nlog_archive_format='O12C_%t_%s_%r.arc'\n\
    ```\n\nIn the prior line of code, my standard for naming archive redo log files\
    \ includes the `ORACLE_SID` (in this example, `O12C` to start the string); the\
    \ mandatory parameters `%t`, `%s`, and `%r`; and the string `.arc`, to end. I\
    \ like to embed the name of the `ORACLE_SID` in the string to avoid confusion\
    \ when multiple databases are housed on one server. I like to use the extension\
    \ `.arc` to differentiate the files from other types of database files.\n\n![Image](images/sq.jpg) **Tip**  If\
    \ you don’t specify a value for `LOG_ARCHIVE_FORMAT`, Oracle uses a default, such\
    \ as `%t_%s_%r.dbf`. One aspect of the default format that I don’t like is that\
    \ it ends with the extension `.dbf`, which is widely used for data files. This\
    \ can cause confusion about whether a particular file can be safely removed because\
    \ it’s an old archive redo log file or shouldn’t be touched because it’s a live\
    \ data file. Most DBAs are reluctant to issue commands such as `rm *.dbf` for\
    \ fear of accidentally removing live data files.\n\nIf you’re using an `spfile`,\
    \ use `ALTER SYSTEM` to modify the appropriate initialization variables:\n\n```\n\
    SQL> alter system set log_archive_dest_1='location=/u01/oraarch/O12C' scope=both;\n\
    SQL> alter system set log_archive_format='O12C_%t_%s_%r.arc' scope=spfile;\n```"
  trans: "## 移动在线重做日志文件\n\n或者，您可以从操作系统层面物理移动文件。您可以在数据库打开或关闭的状态下执行此操作。如果您的数据库是打开的，请确保您移动的文件不属于当前的在线重做日志组（因为这些文件正被日志写入器后台进程写入）。在数据库打开时尝试执行此任务是危险的，因为在活动系统中，在线重做日志可能正在快速切换，这会导致您有可能在文件被切换为当前在线重做日志时尝试移动它。因此，我强烈建议您仅在数据库关闭时执行此操作。\n\
    \n下一个示例展示了如何在数据库关闭时移动在线重做日志文件。步骤如下：\n\n1.  关闭数据库：\n\n    ```\n    SQL> shutdown\
    \ immediate;\n    ```\n\n2.  在操作系统提示符下，移动文件。此示例使用 `mv` 命令完成此任务：\n\n    ```\n \
    \   $ mv /u02/oraredo/O12C/redo02b.rdo /u01/oraredo/O12C/redo02b.rdo\n    ```\n\
    \n3.  以 `mount` 模式启动数据库：\n\n    ```\n    SQL> startup mount;\n    ```\n\n4.  用新的文件位置和名称更新控制文件：\n\
    \n    ```\n    SQL> alter database rename file '/u02/oraredo/O12C/redo02b.rdo'\n\
    \         to '/u01/oraredo/O12C/redo02b.rdo';\n    ```\n\n5.  打开数据库：\n\n    ```\n\
    \    SQL> alter database open;\n    ```\n\n您可以通过查询 `V$LOGFILE` 视图来验证您的在线重做日志是否已位于新位置。我还建议您切换几次在线重做日志，然后从操作系统验证这些文件是否具有最近的时间戳。同时检查\
    \ `alert.log` 文件是否有任何相关错误。\n\n## 实现归档日志模式\n\n回顾本章前面的讨论，只有当您的数据库处于归档日志模式时，才会创建归档重做日志。如果您希望保留数据库事务历史以支持时间点恢复和其他类型的恢复，就需要启用该模式。\n\
    \n在正常操作中，对数据的更改会在数据库重做日志文件中生成条目。当每个在线重做日志组填满时，会启动日志切换。当发生日志切换时，日志写入器进程停止向最近填满的在线重做日志组写入，并开始向一个新的在线重做日志组写入。在线重做日志组以轮转方式被写入——这意味着任何给定的在线重做日志组的内容最终将被覆盖。归档日志模式通过使用归档器后台进程将已填满的在线重做日志的内容复制到所谓的\
    \ `archive redo log file` 中，从而长期保留重做数据。归档重做日志文件的轨迹对于您能够恢复数据库并保留所有更改直至故障发生的确切时刻至关重要。\n\
    \n## 做出架构决策\n\n当您实现归档日志模式时，您还需要一个管理归档日志文件的策略。归档重做日志会消耗磁盘空间。如果置之不理，这些文件最终将用完分配给它们的所有空间。如果发生这种情况，归档器就无法将新的归档重做日志文件写入磁盘，而您的数据库将停止处理事务。那时，您将面对一个挂起的数据库。然后您需要手动干预，为归档器创建空间以恢复工作。由于这些原因，在启用归档之前，您必须仔细考虑几个架构决策：\n\
    \n*   将归档重做日志放置在何处，以及是否使用 `FRA` 来存储它们\n*   如何命名归档重做日志\n*   为归档重做日志位置分配多少空间\n*\
    \   多久备份一次归档重做日志\n*   何时可以从磁盘永久删除归档重做日志\n*   如何删除归档重做日志（例如，让 `RMAN` 根据保留策略删除日志）\n\
    *   是否应启用多个归档重做日志位置\n*   （何时安排所需的少量停机时间（如果是生产数据库）\n\n作为一般经验法则，您的主要归档重做位置应有足够的空间来容纳至少一天的归档重做日志。这允许您每天备份它们，并在备份后从磁盘中删除它们。\n\
    \n如果您决定使用 `FRA` 作为归档重做日志位置，您必须确保它包含足够的空间来容纳备份之间生成的归档重做日志数量。请记住，`FRA` 通常包含其他类型的文件，例如\
    \ `RMAN` 备份文件、闪回日志等。如果您使用 `FRA`，请注意其他类型文件的生成可能会潜在地影响归档重做日志文件所需的空间。\n\n您需要一个自动化备份和删除归档重做日志文件的策略。对于用户管理的备份，可以通过一个\
    \ shell 脚本来实现，该脚本定期将归档重做日志复制到备份位置，然后从主要位置删除它们。正如您将在后续章节中看到的，`RMAN` 可以自动化归档重做日志文件的备份和删除。\n\
    \n如果您的业务要求是必须具备一定程度的高可用性和冗余，那么您应该考虑将归档重做日志写入多个位置。一些机构设置作业，定期将归档重做日志复制到磁盘上的不同位置，甚至是不同的服务器。\n\
    \n## 设置归档重做文件位置\n\n在将数据库模式设置为归档之前，您应明确指示 `Oracle` 您希望归档重做日志放置的位置。您可以使用以下技术设置归档重做日志文件目标：\n\
    \n*   设置 `LOG_ARCHIVE_DEST_N` 数据库初始化参数。\n*   实现 `FRA`。\n\n这两种方法将在以下部分详细讨论。\n\n\
    `images/sq.jpg` **提示** 如果您未通过初始化参数或启用 `FRA` 明确设置归档重做日志位置，那么归档重做日志将被写入默认位置。对于 `Linux/Unix`，默认位置是\
    \ `ORACLE_HOME/dbs`。对于 `Windows`，默认位置是 `ORACLE_HOME\\database`。对于活动的生产数据库系统，默认的归档重做日志位置通常不合适。\n\
    \n### 设置归档位置到用户定义的磁盘位置（非 FRA）\n\n如果您使用的是 `init<SID>.ora` 文件，请使用操作系统实用程序（例如 `vi`）修改该文件。在此示例中，归档重做日志位置设置为\
    \ `/u01/oraarch/O12C`：\n\n```\nlog_archive_dest_1='location=/u01/oraarch/O12C'\n\
    log_archive_format='O12C_%t_%s_%r.arc'\n```\n\n在之前的代码行中，我命名归档重做日志文件的标准包括 `ORACLE_SID`（在此示例中，以\
    \ `O12C` 开始字符串）；强制参数 `%t`、`%s` 和 `%r`；以及字符串 `.arc` 作为结尾。我喜欢在字符串中嵌入 `ORACLE_SID`\
    \ 的名称，以避免在一台服务器上托管多个数据库时产生混淆。我喜欢使用扩展名 `.arc` 来将这些文件与其他类型的数据库文件区分开来。\n\n`images/sq.jpg`\
    \ **提示** 如果您没有为 `LOG_ARCHIVE_FORMAT` 指定值，`Oracle` 会使用默认值，例如 `%t_%s_%r.dbf`。默认格式的一个我不喜欢的方面是它以扩展名\
    \ `.dbf` 结尾，该扩展名广泛用于数据文件。这可能会引起关于某个特定文件是否可以安全删除的混淆，因为它是一个旧的归档重做日志文件，还是不应该触动的实时数据文件。大多数\
    \ `DBA` 不愿意发出诸如 `rm *.dbf` 之类的命令，因为担心意外删除实时数据文件。\n\n如果您使用的是 `spfile`，请使用 `ALTER\
    \ SYSTEM` 修改相应的初始化变量：\n\n```\nSQL> alter system set log_archive_dest_1='location=/u01/oraarch/O12C'\
    \ scope=both;\nSQL> alter system set log_archive_format='O12C_%t_%s_%r.arc' scope=spfile;\n\
    ```"
- fmt: 'You can dynamically change the `LOG_ARCHIVE_DEST_n` parameters while your
    database is open. However, you have to stop and start your database for the `LOG_ARCHIVE_FORMAT`
    parameter to take effect.


    ## Recovering From Setting a Bad SPFILE Parameter


    Take care not to set the `LOG_ARCHIVE_FORMAT` to an invalid value; for example,


    ```sql

    SQL> alter system set log_archive_format=''%r_%y_%dk.arc'' scope=spfile;

    ```


    If you do so, when you attempt to stop and start your database, you won’t even
    get to the `nomount` phase (because the `spfile` contains an invalid parameter):


    ```sql

    SQL> startup nomount;

    ORA-19905: log_archive_format must contain %s, %t and %r

    ```


    In this situation, if you’re using an `spfile`, you can’t start your instance.
    The easiest thing to do at this point is to create a text based `init.ora` file
    from the contents of the `spfile`. You can use the Linux/Unix `strings` command
    to accomplish this:


    ```bash

    $ cd $ORACLE_HOME/dbs

    $ strings spfile$ORACLE_SID.ora

    ```


    The prior command will extract the text out of the binary `spfile` and display
    it on your screen. You can then cut and paste that text into an `init.ora` file
    and use that to start your database. If you’re using Windows, you can use a utility
    such as `write.exe` to display the text in a binary file.


    When you specify `LOG_ARCHIVE_FORMAT`, you must include `%t` (or `%T`), `%s` (or
    `%S`), and `%r` in the format string. [Table 2-1](#9781484207642_Ch02.xhtml#Tab1)
    lists the valid variables you can use with the `LOG_ARCHIVE_FORMAT` initialization
    parameter.


    [Table 2-1](#9781484207642_Ch02.xhtml#_Tab1). Valid Variables for the Log Archive
    Format String


    | Format String | Meaning |

    | --- | --- |

    | `%s` | Log sequence number |

    | `%S` | Log sequence number padded to the left with zeros |

    | `%t` | Thread number |

    | `%T` | Thread number padded to the left with zeros |

    | `%a` | Activation ID |

    | `%d` | Database ID |

    | `%r` | `Resetlogs` ID required to ensure uniqueness across multiple incarnations
    of the database |


    You can view the value of the `LOG_ARCHIVE_DEST_N` parameter by running the following:


    ```sql

    SQL> show parameter log_archive_dest

    ```


    Here is a partial listing of the output:


    ```

    NAME                   TYPE        VALUE

    ---------------------- ----------- --------------------------

    log_archive_dest       string

    log_archive_dest_1     string      location=/u01/oraarch/O12C

    log_archive_dest_10    string

    ```


    For Oracle 11g and higher you can enable up to 31 different locations for the
    archive redo log file destination. For most production systems one archive redo
    log destination location is usually sufficient. If you need a higher degree of
    protection, you can enable multiple destinations. Keep in mind that when you use
    multiple destinations, the archiver must be able to write to at least one location
    successfully. If you enable multiple mandatory locations and set `LOG_ARCHIVE_MIN_SUCCEED_DEST`
    to be higher than 1, then your database may hang if the archiver can’t write to
    all mandatory locations.


    You can check the details regarding the status of archive redo log locations via
    this query:


    ```sql

    SQL> select dest_name, destination, status, binding from v$archive_dest;


    DEST_NAME            DESTINATION          STATUS    BINDING

    -------------------- -------------------- --------- ---------

    LOG_ARCHIVE_DEST_1   /u01/archive/O12C    VALID     OPTIONAL

    LOG_ARCHIVE_DEST_2                       INACTIVE  OPTIONAL

    ...

    ```


    ## Using the FRA for Archive Log Files


    The FRA is an area on disk—specified via database initialization parameters—that
    can be used to store files, such as archive redo logs, RMAN backup files, flashback
    logs, and multiplexed control files and online redo logs. To enable the use of
    a FRA, you must set two initialization parameters (in this order):


    *   `DB_RECOVERY_FILE_DEST_SIZE` specifies the maximum space to be used for all
    files that are stored in the FRA for a database.

    *   `DB_RECOVERY_FILE_DEST` specifies the base directory for the FRA.


    When you create a FRA, you’re not really creating anything—you’re telling Oracle
    which directory to use when storing files that go in the FRA. For example, say
    200GB of space are reserved on a mount point, and you want the base directory
    for the FRA to be `/u01/fra`. To enable the FRA, first set `DB_RECOVERY_FILE_DEST_SIZE`:


    ```sql

    SQL> alter system set db_recovery_file_dest_size=200g scope=both;

    ```


    Next, set the `DB_RECOVERY_FILE_DEST` parameter:


    ```sql

    SQL> alter system set db_recovery_file_dest=''/u01/fra'' scope=both;

    ```


    If you’re using an `init.ora` file, modify it with an OS utility (such as `vi`)
    with the appropriate entries.


    After you enable a FRA, by default, Oracle writes archive redo logs to subdirectories
    in the FRA.


    > **Note:** If you’ve set the `LOG_ARCHIVE_DEST_N` parameter to be a location
    on disk, archive redo logs aren’t written to the FRA.


    You can verify that the archive location is using a FRA:


    ```sql

    SQL> archive log list;

    ```


    If archive files are being written to the FRA, you should see output like this:


    ```

    Database log mode              Archive Mode

    Automatic archival             Enabled

    Archive destination            USE_DB_RECOVERY_FILE_DEST

    ```


    You can display the directory associated with the FRA like this:


    ```sql

    SQL> show parameter db_recovery_file_dest

    ```


    When you first implement a FRA, there are no subdirectories beneath the base FRA
    directory (specified with `DB_RECOVERY_FILE_DEST`). The first time Oracle needs
    to write a file to the FRA, it creates any required directories beneath the base
    directory. For example, after you implement a FRA, if archiving for your database
    is enabled, then the first time a log switch occurs, Oracle creates the following
    directories beneath the base FRA directory:


    ```

    <SID>/archivelog/<YYYY_MM_DD>

    ```


    Each day that archive redo logs are generated results in a new directory’s being
    created in the FRA, using the directory name format `YYYY_MM_DD`. Archive redo
    logs written to the FRA use the OMF format naming convention (regardless of whether
    you’ve set the `LOG_ARCHIVE_FORMAT` parameter).


    If you want archive redo logs written to both a FRA and a non-FRA location, you
    can enable that, as follows:


    ```sql

    SQL> alter system set log_archive_dest_1=''location=/u01/oraarch/O12C'';

    SQL> alter system set log_archive_dest_2=''location=USE_DB_RECOVERY_FILE_DEST'';

    ```


    The archive destination of `USE_DB_RECOVERY_FILE_DEST` indicates a FRA is in use.
    If you want to disable the use of a FRA, simply set the `db_recovery_file_dest`
    parameter to a null string:


    ```sql

    SQL> alter system set db_recovery_file_dest='''';

    ```


    I’m not going to discuss all aspects of enabling and managing a FRA. Just be aware
    that once enabled, you’ll need to take care when issuing RMAN backup commands
    and ensure that you have a strategy in place for regularly removing old backups.
    [Chapter 4](#9781484207642_Ch04.xhtml) contains more details on the use of a FRA
    and RMAN backups.


    ## Enabling Archivelog Mode


    After you’ve set the location for your archive redo log files, you can enable
    archiving. To enable archiving, you need to connect to the database as `SYS` (or
    a user with the `SYSDBA` privilege) and do the following:


    ```sql

    SQL> shutdown immediate;

    SQL> startup mount;

    SQL> alter database archivelog;

    SQL> alter database open;

    ```


    You can confirm archivelog mode with this query:


    ```sql

    SQL> archive log list;

    ```


    You can also confirm it as follows:


    ```sql

    SQL> select log_mode from v$database;


    LOG_MODE

    ------------

    ARCHIVELOG

    ```


    ## Disabling Archivelog Mode


    Usually, you don’t disable archivelog mode for a production database. However,
    you may be doing a big data load and want to reduce any overhead associated with
    the archiving process, and so you want to turn off archivelog mode before the
    load begins and then reenable it after the load. If you do this, be sure you make
    a backup as soon as possible after reenabling archiving.


    To disable archiving, do the following as `SYS` (or a user with the `SYSDBA` privilege):'
