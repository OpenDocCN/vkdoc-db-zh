    \ select object_name, original_name, type from recyclebin;\n```\n\n输出如下：\n\n```\n\
    OBJECT_NAME                              ORIGINAL_NAME        TYPE\n----------------------------------------\
    \ -------------------- ----------\nBIN$BCRjF6KSbi/gU7fQTwrP+Q==$0           INV\
    \                  TABLE\nBIN$BCRjF6KRbi/gU7fQTwrP+Q==$0           INV_TRIG  \
    \           TRIGGER\nBIN$BCRjF6KQbi/gU7fQTwrP+Q==$0           INV_PK         \
    \      INDEX\n```\n\n在此输出中，该表还有一个在对象删除时被重命名的主键。要恢复（取消删除）该表，请执行：\n\n```sql\nSQL>\
    \ flashback table inv to before drop;\n```\n\n前面的命令将表恢复为其原始名称。但是，此语句不会将索引恢复为其原始名称：\n\
    \n```sql\nSQL> select index_name from user_indexes where table_name='INV';\n\n\
    INDEX_NAME\n----------------------------------------\nBIN$BCRjF6KQbi/gU7fQTwrP+Q==$0\n\
    ```\n\n在这种情况下，你必须重命名索引：\n\n```sql\nSQL> alter index \"BIN$BCRjF6KQbi/gU7fQTwrP+Q==$0\"\
    \ rename to inv_pk;\n```\n\n你还必须以同样的方式重命名任何触发器对象。如果在删除表之前存在引用约束，你必须手动重新创建它们。\n\
    \n如果由于某些原因，你需要将表闪回到一个与原始名称不同的名称，可以按如下方式操作：\n\n```sql\nSQL> flashback table inv\
    \ to before drop rename to inv_bef;\n```\n\n### 将表闪回到之前的时点\n\n如果表被错误地删除了数据，你可以选择将表闪回到之前的某个时间点。闪回表功能使用回滚表空间中的信息来恢复表。过去的那个时间点取决于你的回滚表空间保留期，它指定了回滚信息保留的最短时间。\n\
    \n如果所需的闪回信息不在回滚表空间中，你会收到类似以下的错误：\n\n```\nORA-01555: snapshot too old\n```\n\n\
    换句话说，要能够闪回到过去的某个时间点，回滚表空间中所需的信息不能被覆盖。\n\n### FLASHBACK TABLE TO SCN\n\n假设你正在测试一个应用程序功能，并希望快速将表恢复到某个特定的\
    \ SCN。作为应用程序测试的一部分，你在测试开始前记录了 SCN：\n\n```sql\nSQL> select current_scn from v$database;\n\
    \nCURRENT_SCN\n-----------\n    4760089\n```\n\n你执行了一些测试，然后希望将表闪回到之前记录的 SCN。首先，确保为表启用了行移动：\n\
    \n```sql\nSQL> alter table inv enable row movement;\nSQL> flashback table inv\
    \ to scn 4760089;\n```\n\n该表现在应该反映截至在 `FLASHBACK` 语句中指定的历史 SCN 值时已提交的事务。\n\n###\
    \ FLASHBACK TABLE TO TIMESTAMP\n\n（此处原文内容不完整，故保留原有标题）\n"
- fmt: "You can also flash back a table to a prior point in time. For example, to\
    \ flash back a table to 15 minutes in the past, first enable row movement, and\
    \ then use `FLASHBACK TABLE`:\n\n```\nSQL> alter table inv enable row movement;\n\
    SQL> flashback table inv to timestamp(sysdate-1/96);\n```\n\nThe timestamp you\
    \ provide must evaluate to a valid format for an Oracle timestamp. You can also\
    \ explicitly specify a time, as follows:\n\n```\nSQL> flashback table inv to timestamp\n\
    \     to_timestamp('14-jan-15 12:07:33','dd-mon-yy hh24:mi:ss');\n```\n\n## FLASHBACK\
    \ TABLE TO RESTORE POINT\n\nA restore point is a name associated with a timestamp\
    \ or an SCN in the database. You can create a restore point that contains the\
    \ current SCN of the database, as shown:\n\n```\nSQL> create restore point point_a;\n\
    ```\n\nLater, if you decide to flash back a table to that restore point, first\
    \ enable row movement:\n\n```\nSQL> alter table inv enable row movement;\nSQL>\
    \ flashback table inv to restore point point_a;\n```\n\nThe table should now contain\
    \ transactions as they were at the SCN associated with the specified restore point.\n\
    \n## Flashback Database\n\nThe Flashback Database feature allows you to perform\
    \ an incomplete recovery back to a point in time in the past. Flashback Database\
    \ uses information stored in flashback logs; it doesn’t rely on restoring database\
    \ files (as do cold backup, hot backup, and RMAN).\n\n`Tip`: Flashback Database\
    \ isn’t a substitute for a backup of your database. If you experience a media\
    \ failure with a data file, you can’t use Flashback Database to flash back to\
    \ before the failure. If a data file is damaged, you have to restore and recover,\
    \ using a physical backup (hot, cold, or RMAN).\n\nThe Flashback Database feature\
    \ may be desirable in situations in which you want to consistently reset your\
    \ database back to a point in time in the past. For instance, you may periodically\
    \ want to set a test or training database back to a known baseline. Or, you may\
    \ be upgrading an application and, before making large-scale changes to the application\
    \ database objects, mark the starting point. After the upgrade, if things don’t\
    \ go well, you want the ability to quickly reset the database back to the point\
    \ in time before the upgrade took place.\n\nThere are several prerequisites for\
    \ Flashback Database:\n\n*   The database must be in archivelog mode.\n*   You\
    \ must be using an FRA.\n*   The Flashback Database feature must be enabled.\n\
    \nSee [Chapter 2](#9781484207642_Ch02.xhtml) for details on enabling archivelog\
    \ mode and/or enabling an FRA. You can verify the status of these features using\
    \ the following SQL*Plus statements:\n\n```\nSQL> archive log list;\nSQL> show\
    \ parameter db_recovery_file_dest;\n```\n\nTo enable the Flashback Database feature,\
    \ alter your database into flashback mode, as shown:\n\n```\nSQL> alter database\
    \ flashback on;\n```\n\n`Note`: In Oracle 10g the database must be in mount mode\
    \ to enable Flashback Database.\n\nYou can verify the flashback status, as follows:\n\
    \n```\nSQL> select flashback_on from v$database;\n```\n\nAfter you enable Flashback\
    \ Database, you can view the flashback logs in your FRA with this query:\n\n```\n\
    select name, log#, thread#, sequence#, bytes\nfrom v$flashback_database_logfile;\n\
    ```\n\nThe range of time in which you can flash back is determined by the `DB_FLASHBACK_RETENTION_TARGET`\
    \ parameter. This specifies the upper limit, in minutes, of how far your database\
    \ can be flashed back.\n\nYou can view the oldest SCN and time you can flash back\
    \ your database to by running the following SQL:\n\n```\nselect\n oldest_flashback_scn\n\
    ,to_char(oldest_flashback_time,'dd-mon-yy hh24:mi:ss')\nfrom v$flashback_database_log;\n\
    ```\n\nIf, for any reason, you need to disable Flashback Database, you can turn\
    \ it off, as follows:\n\n```\nSQL> alter database flashback off;\n```\n\nYou can\
    \ use either RMAN or SQL*Plus to flash back a database. You can specify a point\
    \ in time in the past, using one of the following:\n\n*   SCN\n*   Timestamp\n\
    *   Restore point\n*   Last `RESETLOGS` operation (works from RMAN only)\n\nThis\
    \ example creates a restore point:\n\n```\nSQL> create restore point flash_1;\n\
    ```\n\nNext, the application performs some testing, after which the database is\
    \ flashed back to the restore point so that a new round of testing can begin:\n\
    \n```\nSQL> shutdown immediate;\nSQL> startup mount;\nSQL> flashback database\
    \ to restore point flash_1;\nSQL> alter database open resetlogs;\n```\n\nAt this\
    \ point, your database should be transactionally consistent with how it was at\
    \ the SCN associated with the restore point.\n\n## Restoring and Recovering to\
    \ Different Server\n\nWhen you think about architecting your backup strategy,\
    \ as part of the process, you must also consider how you’re going to restore and\
    \ recover. Your backups are only as good as the last time you tested a restore\
    \ and recovery. A backup strategy can be rendered worthless without a good restore-and-recovery\
    \ strategy. The last thing you want to happen is to have a media failure, go to\
    \ restore your database, and then find out you’re missing critical pieces, you\
    \ don’t have enough space to restore, something is corrupt, and so on.\n\nOne\
    \ of the best ways to test an RMAN backup is to restore and recover it to a different\
    \ database server. This will exercise all your backup, restore, and recovery DBA\
    \ skills. If you can restore and recover an RMAN backup on a different server,\
    \ it will give you confidence when a real disaster hits. You can think of all\
    \ the prior material in this book as the building blocks for performing technically\
    \ challenging tasks. Moving a database from one server to another using an RMAN\
    \ backup requires an expert level understanding of the Oracle architecture and\
    \ how B&R works.\n\n`Note`: RMAN does have a `DUPLICATE DATABASE` command, which\
    \ works well for copying a database from one server to another. If you’re going\
    \ to be performing this type of task often, I would recommend that you use RMAN's\
    \ duplicate database functionality. However, you may still have to copy a backup\
    \ of a database manually from one server to another, especially when the security\
    \ is such that you can’t directly connect a production server to a development\
    \ environment. I work with many production databases in which there is no direct\
    \ access to a production server, so the only way to duplicate a database is by\
    \ manually copying the RMAN backups from production to a test environment. Starting\
    \ with Oracle 11g Release 2, you can use RMAN to duplicate a database based on\
    \ backups you copy from the target to the auxiliary server. See MOS note 874352.1\
    \ for details on targetless duplication.\n\nIn this example the originating server\
    \ and destination server have different mount points. Listed next are the high-level\
    \ steps required to take an RMAN backup and use it to recreate a database on a\
    \ separate server:\n\n1.  Create an RMAN backup on the originating database.\n\
    2.  Copy the RMAN backup to the destination server. All steps that follow are\
    \ performed on the destination database server.\n3.  Ensure that Oracle is installed.\n\
    4.  Source the required OS variables.\n5.  Create an `init.ora` file for the database\
    \ to be restored.\n6.  Create any required directories for data files, control\
    \ files, and dump/trace files.\n7.  Start up the database in nomount mode.\n8.\
    \  Restore the control file from the RMAN backup.\n9.  Start up the database in\
    \ mount mode.\n10. Make the control file aware of the location of the RMAN backups.\n\
    11. Rename and restore the data files to reflect new directory locations.\n12.\
    \ Recover the database.\n13. Set the new location for the online redo logs.\n\
    14. Open the database.\n15. Add the temp file.\n16. Rename the database (optional).\n\
    \nEach of the prior steps is covered in detail in the next several sections. Steps\
    \ 1 and 2 occur on the source database server. All remaining steps are performed\
    \ on the destination server. For this example the source database is named `O12C`,\
    \ and the destination database will be named `DEVDB`."
  raw: 'You can also flash back a table to a prior point in time. For example, to
    flash back a table to 15 minutes in the past, first enable row movement, and then
    use `FLASHBACK TABLE`:


    ```

    SQL> alter table inv enable row movement;

    SQL> flashback table inv to timestamp(sysdate-1/96) ;

    ```


    The timestamp you provide must evaluate to a valid format for an Oracle timestamp.
    You can also explicitly specify a time, as follows:


    ```

    SQL> flashback table inv to timestamp

         to_timestamp(''14-jan-15 12:07:33'',''dd-mon-yy hh24:mi:ss'');

    ```


    FLASHBACK TABLE TO RESTORE POINT


    A restore point is a name associated with a timestamp or an SCN in the database.
    You can create a restore point that contains the current SCN of the database,
    as shown:


    ```

    SQL> create restore point point_a;

    ```


    Later, if you decide to flash back a table to that restore point, first enable
    row movement:


    ```

    SQL> alter table inv enable row movement;

    SQL> flashback table inv to restore point point_a;

    ```


    The table should now contain transactions as they were at the SCN associated with
    the specified restore point.


    Flashing Back a Database


    The Flashback Database feature allows you to perform an incomplete recovery back
    to a point in time in the past. Flashback Database uses information stored in
    flashback logs; it doesn’t rely on restoring database files (as do cold backup,
    hot backup, and RMAN).


    ![Image](images/sq.jpg) **Tip**  Flashback Database isn’t a substitute for a backup
    of your database. If you experience a media failure with a data file, you can’t
    use Flashback Database to flash back to before the failure. If a data file is
    damaged, you have to restore and recover, using a physical backup (hot, cold,
    or RMAN).


    The Flashback Database feature may be desirable in situations in which you want
    to consistently reset your database back to a point in time in the past. For instance,
    you may periodically want to set a test or training database back to a known baseline.
    Or, you may be upgrading an application and, before making large-scale changes
    to the application database objects, mark the starting point. After the upgrade,
    if things don’t go well, you want the ability to quickly reset the database back
    to the point in time before the upgrade took place.


    There are several prerequisites for Flashback Database:


    *   The database must be in archivelog mode.

    *   You must be using an FRA.

    *   The Flashback Database feature must be enabled.


    See [Chapter 2](#9781484207642_Ch02.xhtml) for details on enabling archivelog
    mode and/or enabling an FRA. You can verify the status of these features using
    the following SQL*Plus statements:


    ```

    SQL> archive log list;

    SQL> show parameter db_recovery_file_dest;

    ```


    To enable the Flashback Database feature, alter your database into flashback mode,
    as shown:


    ```

    SQL> alter database flashback on;

    ```


    ![Image](images/sq.jpg) **Note**  In Oracle 10g the database must be in mount
    mode to enable Flashback Database.


    You can verify the flashback status, as follows:


    ```

    SQL> select flashback_on from v$database;

    ```


    After you enable Flashback Database, you can view the flashback logs in your FRA
    with this query:


    ```

    select name, log#, thread#, sequence#, bytes

    from v$flashback_database_logfile;

    ```


    The range of time in which you can flash back is determined by the `DB_FLASHBACK_RETENTION_TARGET`
    parameter. This specifies the upper limit, in minutes, of how far your database
    can be flashed back.


    You can view the oldest SCN and time you can flash back your database to by running
    the following SQL:


    ```

    select

     oldest_flashback_scn

    ,to_char(oldest_flashback_time,''dd-mon-yy hh24:mi:ss'')

    from v$flashback_database_log;

    ```


    If, for any reason, you need to disable Flashback Database, you can turn it off,
    as follows:


    ```

    SQL> alter database flashback off;

    ```


    You can use either RMAN or SQL*Plus to flash back a database. You can specify
    a point in time in the past, using one of the following:


    *   SCN

    *   Timestamp

    *   Restore point

    *   Last `RESETLOGS` operation (works from RMAN only)


    This example creates a restore point:


    ```

    SQL> create restore point flash_1;

    ```


    Next, the application performs some testing, after which the database is flashed
    back to the restore point so that a new round of testing can begin:


    ```

    SQL> shutdown immediate;

    SQL> startup mount;

    SQL> flashback database to restore point flash_1;

    SQL> alter database open resetlogs;

    ```


    At this point, your database should be transactionally consistent with how it
    was at the SCN associated with the restore point.


    Restoring and Recovering to Different Server


    When you think about architecting your backup strategy, as part of the process,
    you must also consider how you’re going to restore and recover. Your backups are
    only as good as the last time you tested a restore and recovery. A backup strategy
    can be rendered worthless without a good restore-and-recovery strategy. The last
    thing you want to happen is to have a media failure, go to restore your database,
    and then find out you’re missing critical pieces, you don’t have enough space
    to restore, something is corrupt, and so on.


    One of the best ways to test an RMAN backup is to restore and recover it to a
    different database server. This will exercise all your backup, restore, and recovery
    DBA skills. If you can restore and recover an RMAN backup on a different server,
    it will give you confidence when a real disaster hits. You can think of all the
    prior material in this book as the building blocks for performing technically
    challenging tasks. Moving a database from one server to another using an RMAN
    backup requires an expert level understanding of the Oracle architecture and how
    B&R works.


    ![Image](images/sq.jpg) **Note**  RMAN does have a `DUPLICATE DATABASE` command,
    which works well for copying a database from one server to another. If you’re
    going to be performing this type of task often, I would recommend that you use
    RMAN''s duplicate database functionality. However, you may still have to copy
    a backup of a database manually from one server to another, especially when the
    security is such that you can’t directly connect a production server to a development
    environment. I work with many production databases in which there is no direct
    access to a production server, so the only way to duplicate a database is by manually
    copying the RMAN backups from production to a test environment. Starting with
    Oracle 11g Release 2, you can use RMAN to duplicate a database based on backups
    you copy from the target to the auxiliary server. See MOS note 874352.1 for details
    on targetless duplication.


    In this example the originating server and destination server have different mount
    points. Listed next are the high-level steps required to take an RMAN backup and
    use it to recreate a database on a separate server:


    1.  Create an RMAN backup on the originating database.

    2.  Copy the RMAN backup to the destination server. All steps that follow are
    performed on the destination database server.

    3.  Ensure that Oracle is installed.

    4.  Source the required OS variables.

    5.  Create an `init.ora` file for the database to be restored.

    6.  Create any required directories for data files, control files, and dump/trace
    files.

    7.  Start up the database in nomount mode.

    8.  Restore the control file from the RMAN backup.

    9.  Start up the database in mount mode.

    10.  Make the control file aware of the location of the RMAN backups.

    11.  Rename and restore the data files to reflect new directory locations.

    12.  Recover the database.

    13.  Set the new location for the online redo logs.

    14.  Open the database.

    15.  Add the temp file.

    16.  Rename the database (optional).


    Each of the prior steps is covered in detail in the next several sections. Steps
    1 and 2 occur on the source database server. All remaining steps are performed
    on the destination server. For this example the source database is named `O12C`,
    and the destination database will be named `DEVDB`.'
  trans: "\n你也可以将表闪回到之前的某个时间点。例如，要将表闪回到 15 分钟前，首先启用行移动，然后使用 `FLASHBACK TABLE`：\n\n\
    ```\nSQL> alter table inv enable row movement;\nSQL> flashback table inv to timestamp(sysdate-1/96);\n\
    ```\n\n你提供的时间戳必须能解析为有效的 Oracle 时间戳格式。你也可以显式指定一个时间，如下所示：\n\n```\nSQL> flashback\
    \ table inv to timestamp\n     to_timestamp('14-jan-15 12:07:33','dd-mon-yy hh24:mi:ss');\n\
    ```\n\n## FLASHBACK TABLE TO RESTORE POINT（闪回表到还原点）\n\n还原点（restore point）是数据库中与时间戳或\
    \ SCN 关联的一个名称。你可以创建一个包含数据库当前 SCN 的还原点，如下所示：\n\n```\nSQL> create restore point\
    \ point_a;\n```\n\n之后，如果你决定将表闪回到该还原点，同样需要先启用行移动：\n\n```\nSQL> alter table inv\
    \ enable row movement;\nSQL> flashback table inv to restore point point_a;\n```\n\
    \n此时，表中的数据应恢复到与指定还原点所关联的 SCN 时相同的事务状态。\n\n## Flashback Database（闪回数据库）\n\n闪回数据库（Flashback\
    \ Database）功能允许你执行不完全恢复，回退到过去的某个时间点。闪回数据库使用存储在闪回日志中的信息；它不依赖于还原数据库文件（如冷备份、热备份和\
    \ RMAN 那样）。\n\n`提示`：闪回数据库并不能替代你的数据库备份。如果遇到数据文件介质故障，你无法使用闪回数据库闪回到故障发生之前。如果数据文件损坏，你必须使用物理备份（热备、冷备或\
    \ RMAN）进行还原和恢复。\n\n在需要将数据库一致地重置到过去某个时间点的场景下，闪回数据库功能可能非常有用。例如，你可能需要定期将测试或培训数据库重置回已知基线。或者，在升级应用程序时，在对应用程序数据库对象进行大规模更改之前标记一个起始点。升级后，如果情况不顺利，你希望能够快速将数据库重置回升级前的时间点。\n\
    \n启用闪回数据库有几个先决条件：\n\n*   数据库必须处于归档日志模式（archivelog mode）。\n*   你必须使用闪回恢复区（FRA）。\n\
    *   闪回数据库功能必须已启用。\n\n关于启用归档日志模式和/或启用 FRA 的详细信息，请参见第 2 章。你可以使用以下 SQL*Plus 语句验证这些功能的状态：\n\
    \n```\nSQL> archive log list;\nSQL> show parameter db_recovery_file_dest;\n```\n\
    \n要启用闪回数据库功能，需将数据库切换到闪回模式，如下所示：\n\n```\nSQL> alter database flashback on;\n```\n\
    \n`注意`：在 Oracle 10g 中，数据库必须处于装载（mount）模式才能启用闪回数据库。\n\n你可以通过以下方式验证闪回状态：\n\n```\n\
    SQL> select flashback_on from v$database;\n```\n\n启用闪回数据库后，你可以使用以下查询查看 FRA 中的闪回日志：\n\
    \n```\nselect name, log#, thread#, sequence#, bytes\nfrom v$flashback_database_logfile;\n\
    ```\n\n你可以闪回的时间范围由 `DB_FLASHBACK_RETENTION_TARGET` 参数决定。该参数指定了数据库可以闪回的最大时间上限（以分钟计）。\n\
    \n你可以通过运行以下 SQL 来查看可以闪回数据库到的最早 SCN 和时间：\n\n```\nselect\n oldest_flashback_scn\n\
    ,to_char(oldest_flashback_time,'dd-mon-yy hh24:mi:ss')\nfrom v$flashback_database_log;\n\
    ```\n\n如果因任何原因需要禁用闪回数据库，你可以将其关闭，如下所示：\n\n```\nSQL> alter database flashback off;\n\
    ```\n\n你可以使用 RMAN 或 SQL*Plus 来闪回数据库。你可以使用以下方式之一指定过去的时间点：\n\n*   SCN\n*   时间戳（Timestamp）\n\
    *   还原点（Restore point）\n*   上次 `RESETLOGS` 操作（仅适用于 RMAN）\n\n此示例创建一个还原点：\n\n```\n\
    SQL> create restore point flash_1;\n```\n\n接着，应用程序执行一些测试，之后将数据库闪回到该还原点，以便开始新一轮测试：\n\
    \n```\nSQL> shutdown immediate;\nSQL> startup mount;\nSQL> flashback database\
    \ to restore point flash_1;\nSQL> alter database open resetlogs;\n```\n\n至此，你的数据库在事务一致性方面应与该还原点所关联的\
    \ SCN 时的状态相同。\n\n## Restoring and Recovering to Different Server（还原和恢复到不同的服务器）\n\
    \n在规划备份策略时，作为该过程的一部分，你还必须考虑如何进行还原和恢复。你的备份的有效性取决于你上次测试还原和恢复的时间。没有一个好的还原恢复策略，备份策略可能变得毫无价值。最糟糕的情况莫过于发生介质故障后，去还原数据库时，才发现缺少关键部分、没有足够的空间进行还原、某些文件已损坏等等。\n\
    \n测试 RMAN 备份的最佳方法之一是将其还原和恢复到不同的数据库服务器上。这将全面锻炼你的备份、还原和恢复 DBA 技能。如果你能在不同的服务器上成功还原和恢复\
    \ RMAN 备份，那么当真正的灾难来袭时，这将给你带来信心。你可以将本书之前的所有内容视为执行这些技术挑战性任务的基础。使用 RMAN 备份将数据库从一个服务器迁移到另一个服务器，需要对\
    \ Oracle 架构以及备份与恢复（B&R）的工作原理有专家级的理解。\n\n`注意`：RMAN 确实有一个 `DUPLICATE DATABASE` 命令，非常适合将数据库从一个服务器复制到另一个。如果你经常执行此类任务，我建议你使用\
    \ RMAN 的复制数据库功能。然而，有时你可能仍需要手动将数据库备份从一台服务器复制到另一台，尤其是在安全策略禁止直接连接生产服务器到开发环境的情况下。我接触过许多生产数据库，它们无法直接访问生产服务器，因此复制数据库的唯一方法就是手动将\
    \ RMAN 备份从生产环境复制到测试环境。从 Oracle 11g Release 2 开始，你可以使用 RMAN 基于从目标服务器复制到辅助服务器的备份来复制数据库。有关无目标（targetless）复制的详细信息，请参见\
    \ MOS 注释 874352.1。\n\n在此示例中，源服务器和目标服务器具有不同的挂载点。以下是使用 RMAN 备份在单独的服务器上重建数据库所需的高级步骤：\n\
    \n1.  在源数据库上创建 RMAN 备份。\n2.  将 RMAN 备份复制到目标服务器。以下所有步骤均在目标数据库服务器上执行。\n3.  确保已安装\
    \ Oracle 软件。\n4.  设置所需的 OS 环境变量。\n5.  为要还原的数据库创建 `init.ora` 文件。\n6.  为数据文件、控制文件和转储/跟踪文件创建任何必需的目录。\n\
    7.  在 `nomount` 模式下启动数据库。\n8.  从 RMAN 备份中还原控制文件。\n9.  在 `mount` 模式下启动数据库。\n10.\
    \ 使控制文件知晓 RMAN 备份的位置。\n11. 重命名并还原数据文件以反映新的目录位置。\n12. 恢复数据库。\n13. 设置联机重做日志的新位置。\n\
    14. 打开数据库。\n15. 添加临时文件（temp file）。\n16. 重命名数据库（可选）。\n\n以上每个步骤都将在接下来的章节中详细说明。步骤\
    \ 1 和 2 在源数据库服务器上执行。所有剩余步骤在目标服务器上执行。在本示例中，源数据库名为 `O12C`，目标数据库将命名为 `DEVDB`。\n"
- fmt: "## 使用RMAN跨平台/跨版本迁移数据库\n\nFurthermore, the originating server and destination\
    \ server have different mount point names. On the source database the data files\
    \ and control files are here:\n\n```\n/u01/dbfile/O12C\n```\n\nOn the destination\
    \ database the data files and control files will be renamed and restored to this\
    \ directory:\n\n```\n/ora01/dbfile/DEVDB\n```\n\nThe destination database online\
    \ redo logs will be placed in this directory:\n\n```\n/ora01/oraredo/DEVDB\n```\n\
    \nThe destination database archive redo log file location will be set as follows:\n\
    \n```\n/ora01/arc/DEVDB\n```\n\nKeep in mind that these are the directories used\
    \ on servers in my test environment. You’ll have to adjust these directory names\
    \ to reflect the directory structures on your database servers.\n\n## Step 1.\
    \ Create an RMAN Backup on the Originating Database\n\nWhen backing up a database,\
    \ make sure you have the autobackup control file feature turned on. Also, include\
    \ the archive redo logs as part of the backup, like so:\n\n```\nRMAN> backup database\
    \ plus archivelog;\n```\n\nYou can verify the names and locations of the backup\
    \ pieces via the `LIST BACKUP` command. For example, this is what the backup pieces\
    \ look like for the source database:\n\n```\nrman1_bonvb2js_1_1.bk\nrman1_bqnvb2k5_1_1.bk\n\
    rman1_bsnvb2p3_1_1.bk\nrman_ctl_c-3423216220-20130113-06.bk\n```\n\nIn the prior\
    \ output the file with the `c-3423216220` string in the name is the backup piece\
    \ that contains the control file. You’ll have to inspect the output of your `LIST\
    \ BACKUP` command to determine which backup piece contains the control file. You’ll\
    \ need to reference that backup piece in step 8.\n\n## Step 2. Copy the RMAN Backup\
    \ to the Destination Server\n\nFor this step, use a utility such as `rsync` or\
    \ `scp` to copy the backup pieces from one server to another. This example uses\
    \ the `scp` command to copy the backup pieces:\n\n```\n$ scp rman*  oracle@DEVBOX:/ora01/rman/DEVDB\n\
    ```\n\nIn this example the `/ora01/rman/DEVDB` directory must be created on the\
    \ destination server before copying the backup files. Depending on your environment,\
    \ this step might require copying the RMAN backups twice: once from the production\
    \ server to a secure server and once from the secure server to a test server.\n\
    \n![Image](images/sq.jpg) Note If the RMAN backups are on tape instead of on disk,\
    \ then the same media manager software must be installed/configured on the destination\
    \ server. Also, that server must have direct access to the RMAN backups on tape.\n\
    \n## Step 3. Ensure That Oracle Is Installed\n\nMake sure you have the same version\
    \ of the Oracle binaries installed on the destination server as you do on the\
    \ originating database.\n\n## Step 4. Source the Required OS Variables\n\nYou\
    \ need to establish the OS variables, such as `ORACLE_SID`, `ORACLE_HOME`, and\
    \ `PATH`. Typically, the `ORACLE_SID` variable is initially set to match what\
    \ it was on the original database. The database name will be changed as part of\
    \ the last step in this recipe (optional). Here are the settings for `ORACLE_SID`\
    \ and `ORACLE_HOME` on the destination server:\n\n```\n$ echo $ORACLE_SID\nO12C\n\
    \n$ echo $ORACLE_HOME\n/ora01/app/oracle/product/12.1.0.1/db_1\n```\n\nAt this\
    \ point also consider adding the Oracle SID to the `oratab` file. If you plan\
    \ on using this database after you’ve replicated it, then you should have an automated\
    \ method for setting the required OS variables. See [Chapter 1](#9781484207642_Ch01.xhtml)\
    \ for details on sourcing OS variables in conjunction with the `oratab` file.\n\
    \n## Step 5. Create an init.ora File for the Database to Be Restored\n\nCopy the\
    \ `init.ora` file from the original server to the destination server, and modify\
    \ it so that it matches the destination box in terms of any directory paths. Ensure\
    \ that you change the parameters, such as the `CONTROL_FILES`, to reflect the\
    \ new path directories on the destination server (`/ora01/dbfile/DEVDB`, in this\
    \ example).\n\nInitially, the name of the `init.ora` file is `ORACLE_HOME/dbs/inito12c.ora`,\
    \ and the name of the database is `O12C`. Both will be renamed in a later step.\
    \ Here are the contents of the `init.ora` file:\n\n```\ncontrol_files='/ora01/dbfile/DEVDB/control01.ctl',\n\
    \              '/ora01/dbfile/DEVDB/control02.ctl'\ndb_block_size=8192\ndb_name='O12C'\n\
    log_archive_dest_1='location=/ora01/arc/DEVDB'\njob_queue_processes=10\nmemory_max_target=300000000\n\
    memory_target=300000000\nopen_cursors=100\nos_authent_prefix=''\nprocesses=100\n\
    remote_login_passwordfile='EXCLUSIVE'\nresource_limit=true\nshared_pool_size=80M\n\
    sql92_security=TRUE\nundo_management='AUTO'\nundo_tablespace='UNDOTBS1'\nworkarea_size_policy='AUTO'\n\
    ```\n\n![Image](images/sq.jpg) Note If this were an Oracle 10g example, you would\
    \ need to set the parameters `background_dump_dest`, `user_dump_dest`, `core_dump_dest`.\n\
    \n## Step 6. Create Any Required Directories for Data Files, Control Files, and\
    \ Dump/Trace Files\n\nFor this example the directories `/ora01/dbfile/DEVDB` and\
    \ `/ora01/oraredo/DEVDB` are created:\n\n```\n$ mkdir -p /ora01/dbfile/DEVDB\n\
    $ mkdir -p /ora01/oraredo/DEVDB\n$ mkdir -p /ora01/arc/DEVDB\n```\n\n## Step 7.\
    \ Start Up the Database in Nomount Mode\n\nYou should now be able to start up\
    \ the database in nomount mode:\n\n```\n$ rman target /\nRMAN> startup nomount;\n\
    ```\n\n## Step 8. Restore the Control File from the RMAN Backup\n\nNext, restore\
    \ the control file from the backup that was previously copied; for example,\n\n\
    ```\nRMAN> restore controlfile from\n'/ora01/rman/DEVDB/rman_ctl_c-3423216220-20130113-06.bk';\n\
    ```\n\nThe control file will be restored to all locations specified by the `CONTROL_FILES`\
    \ initialization parameter. Here is some sample output:\n\n```\nchannel ORA_DISK_1:\
    \ restore complete, elapsed time: 00:00:03\noutput file name=/ora01/dbfile/DEVDB/control01.ctl\n\
    output file name=/ora01/dbfile/DEVDB/control02.ctl\n```\n\n## Step 9. Start Up\
    \ the Database in Mount Mode\n\nYou should now be able to start up your database\
    \ in mount mode:\n\n```\nRMAN> alter database mount;\n```\n\nAt this point, your\
    \ control files exist and have been opened, but none of the data files or online\
    \ redo logs exist yet.\n\n## Step 10. Make the Control File Aware of the Location\
    \ of the RMAN Backups\n\nFirst, use the `CROSSCHECK` command to let the control\
    \ file know that none of the backups or archive redo logs are in the same location\
    \ that they were in on the original server:\n\n```\nRMAN> crosscheck backup; #\
    \ Crosscheck backups\nRMAN> crosscheck copy;   # Crosscheck image copies and archive\
    \ logs\n```\n\nThen, use the `CATALOG` command to make the control file aware\
    \ of the location and names of the backup pieces that were copied to the destination\
    \ server.\n\n![Image](images/sq.jpg) Note Don’t confuse the `CATALOG` command\
    \ with the recovery catalog schema. The `CATALOG` command adds RMAN metadata to\
    \ the control file, whereas the recovery catalog schema is a user, generally created\
    \ in a separate database, that can be used to store RMAN metadata.\n\nIn this\
    \ example any RMAN files that are in the `/ora01/rman/DEVDB` directory will be\
    \ cataloged in the control file:\n\n```\nRMAN> catalog start with '/ora01/rman/DEVDB';\n\
    ```\n\nHere is some sample output:\n\n```\nList of Files Unknown to the Database\n\
    =====================================\nFile Name: /ora01/rman/DEVDB/rman1_bqnvb2k5_1_1.bk\n\
    File Name: /ora01/rman/DEVDB/rman1_bonvb2js_1_1.bk\nFile Name: /ora01/rman/DEVDB/rman_ctl_c-3423216220-20130113-06.bk\n\
    File Name: /ora01/rman/DEVDB/rman1_bsnvb2p3_1_1.bk\n\nDo you really want to catalog\
    \ the above files (enter YES or NO)?\n```\n\nNow, type `YES` (if everything looks\
    \ okay). You should then be able to use the RMAN `LIST BACKUP` command to view\
    \ the newly cataloged backup pieces:\n\n```\nRMAN> list backup;\n```\n\n## Step\
    \ 11. Rename and Restore the Data Files to Reflect New Directory Locations\n\n\
    If your destination server has the exact same directory structure as the original\
    \ server directories, you can issue the `RESTORE` command directly:\n\n```\nRMAN>\
    \ restore database;\n```"
  raw: 'Furthermore, the originating server and destination server have different
    mount point names. On the source database the data files and control files are
    here:


    ```

    /u01/dbfile/O12C

    ```


    On the destination database the data files and control files will be renamed and
    restored to this directory:


    ```

    /ora01/dbfile/DEVDB

    ```


    The destination database online redo logs will be placed in this directory:


    ```

    /ora01/oraredo/DEVDB

    ```


    The destination database archive redo log file location will be set as follows:


    ```

    /ora01/arc/DEVDB

    ```


    Keep in mind that these are the directories used on servers in my test environment.
    You’ll have to adjust these directory names to reflect the directory structures
    on your database servers.


    Step 1\. Create an RMAN Backup on the Originating Database


    When backing up a database, make sure you have the autobackup control file feature
    turned on. Also, include the archive redo logs as part of the backup, like so:


    ```

    RMAN> backup database plus archivelog;

    ```


    You can verify the names and locations of the backup pieces via the `LIST BACKUP`
    command. For example, this is what the backup pieces look like for the source
    database:


    ```

    rman1_bonvb2js_1_1.bk

    rman1_bqnvb2k5_1_1.bk

    rman1_bsnvb2p3_1_1.bk

    rman_ctl_c-3423216220-20130113-06.bk

    ```


    In the prior output the file with the `c-3423216220` string in the name is the
    backup piece that contains the control file. You’ll have to inspect the output
    of your `LIST BACKUP` command to determine which backup piece contains the control
    file. You’ll need to reference that backup piece in step 8.


    Step 2\. Copy the RMAN Backup to the Destination Server


    For this step, use a utility such as `rsync` or `scp` to copy the backup pieces
    from one server to another. This example uses the `scp` command to copy the backup
    pieces:


    ```

    $ scp rman*  oracle@DEVBOX:/ora01/rman/DEVDB

    ```


    In this example the `/ora01/rman/DEVDB` directory must be created on the destination
    server before copying the backup files. Depending on your environment, this step
    might require copying the RMAN backups twice: once from the production server
    to a secure server and once from the secure server to a test server.


    ![Image](images/sq.jpg) **Note**  If the RMAN backups are on tape instead of on
    disk, then the same media manager software must be installed/configured on the
    destination server. Also, that server must have direct access to the RMAN backups
    on tape.


    Step 3\. Ensure That Oracle Is Installed


    Make sure you have the same version of the Oracle binaries installed on the destination
    server as you do on the originating database.


    Step 4\. Source the Required OS Variables


    You need to establish the OS variables, such as `ORACLE_SID`, `ORACLE_HOME`, and
    `PATH`. Typically, the `ORACLE_SID` variable is initially set to match what it
    was on the original database. The database name will be changed as part of the
    last step in this recipe (optional). Here are the settings for `ORACLE_SID` and
    `ORACLE_HOME` on the destination server:


    ```

    $ echo $ORACLE_SID

    O12C


    $ echo $ORACLE_HOME

    /ora01/app/oracle/product/12.1.0.1/db_1

    ```


    At this point also consider adding the Oracle SID to the `oratab` file. If you
    plan on using this database after you’ve replicated it, then you should have an
    automated method for setting the required OS variables. See [Chapter 1](#9781484207642_Ch01.xhtml)
    for details on sourcing OS variables in conjunction with the `oratab` file.


    Step 5\. Create an init.ora File for the Database to Be Restored


    Copy the `init.ora` file from the original server to the destination server, and
    modify it so that it matches the destination box in terms of any directory paths.
    Ensure that you change the parameters, such as the `CONTROL_FILES`, to reflect
    the new path directories on the destination server (`/ora01/dbfile/DEVDB`, in
    this example).


    Initially, the name of the `init.ora` file is `ORACLE_HOME/dbs/inito12c.ora`,
    and the name of the database is `O12C`. Both will be renamed in a later step.
    Here are the contents of the `init.ora` file:


    ```

    control_files=''/ora01/dbfile/DEVDB/control01.ctl'',

                  ''/ora01/dbfile/DEVDB/control02.ctl''

    db_block_size=8192

    db_name=''O12C''

    log_archive_dest_1=''location=/ora01/arc/DEVDB''

    job_queue_processes=10

    memory_max_target=300000000

    memory_target=300000000

    open_cursors=100

    os_authent_prefix=''''

    processes=100

    remote_login_passwordfile=''EXCLUSIVE''

    resource_limit=true

    shared_pool_size=80M

    sql92_security=TRUE

    undo_management=''AUTO''

    undo_tablespace=''UNDOTBS1''

    workarea_size_policy=''AUTO''

    ```


    ![Image](images/sq.jpg) **Note**  If this were an Oracle 10g example, you would
    need to set the parameters `background_dump_dest`, `user_dump_dest`, `core_dump_dest`.


    Step 6\. Create Any Required Directories for Data Files, Control Files, and Dump/Trace
    Files


    For this example the directories `/ora01/dbfile/DEVDB` and `/ora01/oraredo/DEVDB`
    are created:


    ```

    $ mkdir -p /ora01/dbfile/DEVDB

    $ mkdir -p /ora01/oraredo/DEVDB

    $ mkdir -p /ora01/arc/DEVDB

    ```


    Step 7\. Start Up the Database in Nomount Mode


    You should now be able to start up the database in nomount mode:


    ```

    $ rman target /

    RMAN> startup nomount;

    ```


    Step 8\. Restore the Control File from the RMAN Backup


    Next, restore the control file from the backup that was previously copied; for
    example,


    ```

    RMAN> restore controlfile from

    ''/ora01/rman/DEVDB/rman_ctl_c-3423216220-20130113-06.bk'';

    ```


    The control file will be restored to all locations specified by the `CONTROL_FILES`
    initialization parameter. Here is some sample output:


    ```

    channel ORA_DISK_1: restore complete, elapsed time: 00:00:03

    output file name=/ora01/dbfile/DEVDB/control01.ctl

    output file name=/ora01/dbfile/DEVDB/control02.ctl

    ```


    Step 9\. Start Up the Database in Mount Mode


    You should now be able to start up your database in mount mode:


    ```

    RMAN> alter database mount;

    ```


    At this point, your control files exist and have been opened, but none of the
    data files or online redo logs exist yet.


    Step 10\. Make the Control File Aware of the Location of the RMAN Backups


    First, use the `CROSSCHECK` command to let the control file know that none of
    the backups or archive redo logs are in the same location that they were in on
    the original server:


    ```

    RMAN> crosscheck backup; # Crosscheck backups

    RMAN> crosscheck copy;   # Crosscheck image copies and archive logs

    ```


    Then, use the `CATALOG` command to make the control file aware of the location
    and names of the backup pieces that were copied to the destination server.


    ![Image](images/sq.jpg) **Note**  Don’t confuse the `CATALOG` command with the
    recovery catalog schema. The `CATALOG` command adds RMAN metadata to the control
    file, whereas the recovery catalog schema is a user, generally created in a separate
    database, that can be used to store RMAN metadata.


    In this example any RMAN files that are in the `/ora01/rman/DEVDB` directory will
    be cataloged in the control file:


    ```

    RMAN> catalog start with ''/ora01/rman/DEVDB'';

    ```


    Here is some sample output:


    ```

    List of Files Unknown to the Database

    =====================================

    File Name: /ora01/rman/DEVDB/rman1_bqnvb2k5_1_1.bk

    File Name: /ora01/rman/DEVDB/rman1_bonvb2js_1_1.bk

    File Name: /ora01/rman/DEVDB/rman_ctl_c-3423216220-20130113-06.bk

    File Name: /ora01/rman/DEVDB/rman1_bsnvb2p3_1_1.bk


    Do you really want to catalog the above files (enter YES or NO)?

    ```


    Now, type `YES` (if everything looks okay). You should then be able to use the
    RMAN `LIST BACKUP` command to view the newly cataloged backup pieces:


    ```

    RMAN> list backup;

    ```


    Step 11\. Rename and Restore the Data Files to Reflect New Directory Locations


    If your destination server has the exact same directory structure as the original
    server directories, you can issue the `RESTORE` command directly:


    ```

    RMAN> restore database;

    ```'
  trans: "\n## 使用 RMAN 跨平台/跨版本迁移数据库\n\n此外，源服务器与目标服务器的挂载点名称不同。源数据库的数据文件和控制文件位于：\n\n\
    ```\n/u01/dbfile/O12C\n```\n\n在目标数据库上，数据文件和控制文件将被重命名并恢复到此目录：\n\n```\n/ora01/dbfile/DEVDB\n\
    ```\n\n目标数据库的在线重做日志将放置在此目录：\n\n```\n/ora01/oraredo/DEVDB\n```\n\n目标数据库的归档重做日志文件位置将设置如下：\n\
    \n```\n/ora01/arc/DEVDB\n```\n\n请记住，这些是我测试环境中服务器使用的目录。您需要调整这些目录名称，以反映您数据库服务器上的实际目录结构。\n\
    \n## 步骤 1. 在源数据库上创建 RMAN 备份\n\n备份数据库时，请确保已开启控制文件自动备份功能。同时，将归档重做日志作为备份的一部分包含进来，如下所示：\n\
    \n```\nRMAN> backup database plus archivelog;\n```\n\n您可以通过 `LIST BACKUP` 命令验证备份片的名称和位置。例如，源数据库的备份片如下所示：\n\
    \n```\nrman1_bonvb2js_1_1.bk\nrman1_bqnvb2k5_1_1.bk\nrman1_bsnvb2p3_1_1.bk\nrman_ctl_c-3423216220-20130113-06.bk\n\
    ```\n\n在上面的输出中，名称中包含 `c-3423216220` 字符串的文件是包含控制文件的备份片。您需要检查 `LIST BACKUP` 命令的输出，以确定哪个备份片包含控制文件。在步骤\
    \ 8 中，您将需要引用该备份片。\n\n## 步骤 2. 将 RMAN 备份复制到目标服务器\n\n在此步骤中，使用 `rsync` 或 `scp` 等工具将备份片从一台服务器复制到另一台。此示例使用\
    \ `scp` 命令复制备份片：\n\n```\n$ scp rman*  oracle@DEVBOX:/ora01/rman/DEVDB\n```\n\n\
    在此示例中，复制备份文件之前，必须在目标服务器上创建 `/ora01/rman/DEVDB` 目录。根据您的环境，此步骤可能需要复制两次 RMAN 备份：一次从生产服务器到安全服务器，另一次从安全服务器到测试服务器。\n\
    \n![Image](img/sq.jpg) 注意 如果 RMAN 备份在磁带上而非磁盘上，则目标服务器必须安装/配置相同的介质管理器软件。此外，该服务器必须能够直接访问磁带上的\
    \ RMAN 备份。\n\n## 步骤 3. 确保已安装 Oracle\n\n确保在目标服务器上安装了与源数据库相同版本的 Oracle 二进制文件。\n\n\
    ## 步骤 4. 设置所需的 OS 变量\n\n您需要设置操作系统变量，例如 `ORACLE_SID`、`ORACLE_HOME` 和 `PATH`。通常，`ORACLE_SID`\
    \ 变量最初设置为与原始数据库上的名称一致。作为本配方最后一步（可选）的一部分，数据库名称将被更改。以下是目标服务器上 `ORACLE_SID` 和 `ORACLE_HOME`\
    \ 的设置：\n\n```\n$ echo $ORACLE_SID\nO12C\n\n$ echo $ORACLE_HOME\n/ora01/app/oracle/product/12.1.0.1/db_1\n\
    ```\n\n此时，也请考虑将 Oracle SID 添加到 `oratab` 文件中。如果您计划在复制后使用此数据库，则应具备设置所需 OS 变量的自动化方法。有关结合\
    \ `oratab` 文件设置 OS 变量的详细信息，请参阅第 1 章。\n\n## 步骤 5. 为要还原的数据库创建 init.ora 文件\n\n将 `init.ora`\
    \ 文件从原始服务器复制到目标服务器，并修改它，使其在目录路径方面与目标机器匹配。确保更改参数，例如 `CONTROL_FILES`，以反映目标服务器上的新路径目录（在此示例中为\
    \ `/ora01/dbfile/DEVDB`）。\n\n最初，`init.ora` 文件名为 `ORACLE_HOME/dbs/inito12c.ora`，数据库名称为\
    \ `O12C`。两者都将在后续步骤中重命名。以下是 `init.ora` 文件的内容：\n\n```\ncontrol_files='/ora01/dbfile/DEVDB/control01.ctl',\n\
    \              '/ora01/dbfile/DEVDB/control02.ctl'\ndb_block_size=8192\ndb_name='O12C'\n\
    log_archive_dest_1='location=/ora01/arc/DEVDB'\njob_queue_processes=10\nmemory_max_target=300000000\n\
    memory_target=300000000\nopen_cursors=100\nos_authent_prefix=''\nprocesses=100\n\
    remote_login_passwordfile='EXCLUSIVE'\nresource_limit=true\nshared_pool_size=80M\n\
    sql92_security=TRUE\nundo_management='AUTO'\nundo_tablespace='UNDOTBS1'\nworkarea_size_policy='AUTO'\n\
    ```\n\n![Image](img/sq.jpg) 注意 如果这是一个 Oracle 10g 示例，您将需要设置参数 `background_dump_dest`、`user_dump_dest`、`core_dump_dest`。\n\
    \n## 步骤 6. 为数据文件、控制文件以及转储/跟踪文件创建任何必需的目录\n\n在此示例中，创建目录 `/ora01/dbfile/DEVDB` 和\
    \ `/ora01/oraredo/DEVDB`：\n\n```\n$ mkdir -p /ora01/dbfile/DEVDB\n$ mkdir -p /ora01/oraredo/DEVDB\n\
    $ mkdir -p /ora01/arc/DEVDB\n```\n\n## 步骤 7. 以 NOMOUNT 模式启动数据库\n\n您现在应该能够以 nomount\
    \ 模式启动数据库：\n\n```\n$ rman target /\nRMAN> startup nomount;\n```\n\n## 步骤 8. 从\
    \ RMAN 备份还原控制文件\n\n接下来，从先前复制的备份中还原控制文件；例如，\n\n```\nRMAN> restore controlfile from\n\
    '/ora01/rman/DEVDB/rman_ctl_c-3423216220-20130113-06.bk';\n```\n\n控制文件将被还原到 `CONTROL_FILES`\
    \ 初始化参数指定的所有位置。以下是一些示例输出：\n\n```\nchannel ORA_DISK_1: restore complete, elapsed\
    \ time: 00:00:03\noutput file name=/ora01/dbfile/DEVDB/control01.ctl\noutput file\
    \ name=/ora01/dbfile/DEVDB/control02.ctl\n```\n\n## 步骤 9. 以 MOUNT 模式启动数据库\n\n\
    您现在应该能够以 mount 模式启动数据库：\n\n```\nRMAN> alter database mount;\n```\n\n此时，您的控制文件已存在并已打开，但任何数据文件或在线重做日志都还不存在。\n\
    \n## 步骤 10. 让控制文件知晓 RMAN 备份的位置\n\n首先，使用 `CROSSCHECK` 命令让控制文件知道，没有任何备份或归档重做日志位于它们在原始服务器上的同一位置：\n\
    \n```\nRMAN> crosscheck backup; # 交叉检查备份\nRMAN> crosscheck copy;   # 交叉检查映像副本和归档日志\n\
    ```\n\n然后，使用 `CATALOG` 命令让控制文件知晓复制到目标服务器的备份片的位置和名称。\n\n![Image](img/sq.jpg) 注意\
    \ 不要将 `CATALOG` 命令与恢复目录模式混淆。`CATALOG` 命令将 RMAN 元数据添加到控制文件，而恢复目录模式是一个用户（通常在单独的数据库中创建），可用于存储\
    \ RMAN 元数据。\n\n在此示例中，位于 `/ora01/rman/DEVDB` 目录中的任何 RMAN 文件都将在控制文件中编目：\n\n```\n\
    RMAN> catalog start with '/ora01/rman/DEVDB';\n```\n\n以下是一些示例输出：\n\n```\nList\
    \ of Files Unknown to the Database\n=====================================\nFile\
    \ Name: /ora01/rman/DEVDB/rman1_bqnvb2k5_1_1.bk\nFile Name: /ora01/rman/DEVDB/rman1_bonvb2js_1_1.bk\n\
    File Name: /ora01/rman/DEVDB/rman_ctl_c-3423216220-20130113-06.bk\nFile Name:\
    \ /ora01/rman/DEVDB/rman1_bsnvb2p3_1_1.bk\n\nDo you really want to catalog the\
    \ above files (enter YES or NO)?\n```\n\n现在，键入 `YES`（如果一切看起来正常）。然后，您应该能够使用 RMAN\
    \ 的 `LIST BACKUP` 命令来查看新编目的备份片：\n\n```\nRMAN> list backup;\n```\n\n## 步骤 11. 重命名并还原数据文件以反映新的目录位置\n\
    \n如果您的目标服务器具有与原始服务器目录完全相同的目录结构，您可以直接发出 `RESTORE` 命令：\n\n```\nRMAN> restore database;\n\
    ```\n"
- fmt: "# 将数据库文件恢复到不同目录\n\n然而，当将数据文件恢复到与原始目录不同的位置时，必须使用`SET NEWNAME`命令。创建一个文件，该文件包含一个RMAN\
    \ `run{}`块，其中有适当的`SET NEWNAME`和`RESTORE`命令。我喜欢使用一个SQL脚本来生成SQL，作为我的起点。以下是一个示例脚本：\n\
    \n```\nset head off feed off verify off echo off pages 0 trimspool on\nset lines\
    \ 132 pagesize 0\nspo newname.sql\n--\nselect 'run{' from dual;\n--\nselect\n\
    'set newname for datafile ' || file# || ' to ' || '''' || name || '''' || ';'\n\
    from v$datafile;\n--\nselect\n'restore database;' || chr(10) ||\n'switch datafile\
    \ all;' || chr(10) ||\n'}'\nfrom dual;\n--\nspo off;\n```\n\n运行脚本后，生成的`newname.sql`脚本内容如下：\n\
    \n```\nrun{\nset newname for datafile 1 to '/u01/dbfile/O12C/system01.dbf';\n\
    set newname for datafile 2 to '/u01/dbfile/O12C/sysaux01.dbf';\nset newname for\
    \ datafile 3 to '/u01/dbfile/O12C/undotbs01.dbf';\nset newname for datafile 4\
    \ to '/u01/dbfile/O12C/users01.dbf';\nrestore database;\nswitch datafile all;\n\
    }\n```\n\n然后，修改`newname.sql`脚本的内容，以反映目标数据库服务器上的目录。本例中最终的`newname.sql`脚本如下所示：\n\
    \n```\nrun{\nset newname for datafile 1 to '/ora01/dbfile/DEVDB/system01.dbf';\n\
    set newname for datafile 2 to '/ora01/dbfile/DEVDB/sysaux01.dbf';\nset newname\
    \ for datafile 3 to '/ora01/dbfile/DEVDB/undotbs01.dbf';\nset newname for datafile\
    \ 4 to '/ora01/dbfile/DEVDB/users01.dbf';\nrestore database;\nswitch datafile\
    \ all;\n}\n```\n\n现在，连接到RMAN，并运行前面的脚本以将数据文件恢复到新位置：\n\n```\n$ rman target /\nRMAN>\
    \ @newname.sql\n```\n\n以下是输出的片段：\n\n```\ndatafile 1 switched to datafile copy\n\
    input datafile copy RECID=5 STAMP=790357985 file name=/ora01/dbfile/DEVDB/system01.dbf\n\
    ```\n\n所有数据文件都已恢复到新的数据库服务器。你可以使用RMAN的`REPORT SCHEMA`命令来验证文件是否已恢复且位置正确：\n\n```\n\
    RMAN> report schema;\n```\n\n以下是部分示例输出：\n\n```\nRMAN-06139: WARNING: control file\
    \ is not current for REPORT SCHEMA\nReport of database schema for database with\
    \ db_unique_name O12C\nList of Permanent Datafiles\n===========================\n\
    File Size(MB) Tablespace           RB segs Datafile Name\n---- -------- --------------------\
    \ ------- ------------------------\n1    500      SYSTEM               ***   \
    \  /ora01/dbfile/DEVDB/system01.dbf\n2    500      SYSAUX               ***  \
    \   /ora01/dbfile/DEVDB/sysaux01.dbf\n3    800      UNDOTBS1             *** \
    \    /ora01/dbfile/DEVDB/undotbs01.dbf\n4    50       USERS                ***\
    \     /ora01/dbfile/DEVDB/users01.dbf\n\nList of Temporary Files\n=======================\n\
    File Size(MB) Tablespace           Maxsize(MB) Tempfile Name\n---- -------- --------------------\
    \ ----------- --------------------\n1    500      TEMP                 500   \
    \      /u01/dbfile/O12C/temp01.dbf\n```\n\n从上述输出中可以看到，数据库名称和临时表空间数据文件仍未反映目标数据库（`DEVDB`）。这些将在后续步骤中进行修改。\n\
    \n### 步骤12：恢复数据库\n\n接下来，你需要应用备份期间生成的所有归档重做文件。这些文件应包含在备份中，因为使用了`ARCHIVELOG ALL`子句来执行备份。通过`RECOVER\
    \ DATABASE`命令启动重做的应用：\n\n```\nRMAN> recover database;\n```\n\nRMAN将恢复并应用备份集中它拥有的尽可能多的归档重做日志，然后在遇到一个不存在的归档重做日志时可能会抛出错误；例如，\n\
    \n```\nRMAN-06054: media recovery requesting unknown archived log for...\n```\n\
    \n那个错误信息是正常的。恢复过程将恢复并应用备份中包含的归档重做日志，这应该足以打开数据库。恢复过程不知道应该在何处停止应用归档重做日志，因此将继续尝试，直到找不到下一个日志为止。话虽如此，现在是验证你的数据文件是否在线且不处于模糊状态的好时机：\n\
    \n```\nselect file#, status, fuzzy, error, checkpoint_change#,\nto_char(checkpoint_time,'dd-mon-rrrr\
    \ hh24:mi:ss') as checkpoint_time\nfrom v$datafile_header;\n```\n\n### 步骤13：设置联机重做日志的新位置\n\
    \n如果你的源服务器和目标服务器具有完全相同的目录结构，那么你不需要为联机重做日志设置新位置（因此可以跳过此步骤）。\n\n然而，如果目录结构不同，那么你将需要更新控制文件以反映联机重做日志的新目录。我有时使用一个生成SQL的SQL脚本来协助完成此步骤：\n\
    \n```\nset head off feed off verify off echo off pages 0 trimspool on\nset lines\
    \ 132 pagesize 0\nspo renlog.sql\nselect\n'alter database rename file ' || chr(10)\n\
    || '''' || member || '''' || ' to ' || chr(10) || '''' || member || '''' ||';'\n\
    from v$logfile;\nspo off;\n```\n\n对于本例，以下是生成的`renlog.sql`文件的片段：\n\n```\nalter\
    \ database rename file\n'/u01/oraredo/O12C/redo01a.rdo' to\n'/u01/oraredo/O12C/redo01a.rdo';\n\
    ...\nalter database rename file\n'/u02/oraredo/O12C/redo03b.rdo' to\n'/u02/oraredo/O12C/redo03b.rdo';\n\
    ```\n\n`renlog.sql`的内容需要进行修改，以反映目标服务器上的目录结构。以下是编辑后的`renlog.sql`：\n\n```\nalter\
    \ database rename file\n'/u01/oraredo/O12C/redo01a.rdo' to\n'/ora01/oraredo/DEVDB/redo01a.rdo';\n\
    ...\nalter database rename file\n'/u02/oraredo/O12C/redo03b.rdo' to\n'/ora01/oraredo/DEVDB/redo03b.rdo';\n\
    ```\n\n通过运行`renlog.sql`脚本来更新控制文件：\n\n```\nSQL> @renlog.sql\n```\n\n你可以从`V$LOGFILE`中查询以验证联机重做日志名称是否正确：\n\
    \n```\nSQL> select member from v$logfile;\n```\n\n以下是本例的输出：\n\n```\n/ora01/oraredo/DEVDB/redo01a.rdo\n\
    /ora01/oraredo/DEVDB/redo02a.rdo\n/ora01/oraredo/DEVDB/redo03a.rdo\n/ora01/oraredo/DEVDB/redo01b.rdo\n\
    /ora01/oraredo/DEVDB/redo02b.rdo\n/ora01/oraredo/DEVDB/redo03b.rdo\n```\n\n确保新服务器上包含联机重做日志的目录存在。对于本例，`mkdir`命令如下：\n\
    \n```\n$ mkdir -p /ora01/oraredo/DEVDB\n```\n\n### 步骤14：打开数据库\n\n你必须使用`OPEN RESETLOGS`命令打开数据库（因为此时没有重做日志，必须重新创建）：\n\
    \n```\nSQL> alter database open resetlogs;\n```\n\n如果成功，你应该会看到此消息：\n\n```\nStatement\
    \ processed\n```\n\n`Note` 请记住，新恢复副本的所有密码都与源数据库中的一样。你可能希望在复制的数据库中更改密码，特别是如果它是从生产环境复制的。\n\
    \n### 步骤15：添加临时文件\n\n当你启动数据库时，Oracle会自动尝试向数据库添加任何缺失的临时文件。如果目标服务器上的目录结构与源服务器不同，Oracle将无法做到这一点。在这种情况下，你将必须手动添加任何缺失的临时文件。为此，首先将临时表空间的临时文件脱机。来自源数据库的文件定义像这样脱机：\n\
    \n```\nSQL> alter database tempfile '/u01/dbfile/O12C/temp01.dbf' offline;\nSQL>\
    \ alter database tempfile '/u01/dbfile/O12C/temp01.dbf' drop;\n```\n\n接下来，向`TEMP`表空间添加一个临时表空间文件，该文件匹配目标数据库服务器的目录结构：\n\
    \n```\nSQL> alter tablespace temp add tempfile '/ora01/dbfile/DEVDB/temp01.dbf'\n\
    \     size 100m;\n```"
  raw: 'However, when restoring data files to locations that are different from the
    original directories, you’ll have to use the `SET NEWNAME` command. Create a file
    that uses an RMAN `run{}` block that contains the appropriate `SET NEWNAME` and
    `RESTORE` commands. I like to use an SQL script that generates SQL to give me
    a starting point. Here is a sample script:


    ```

    set head off feed off verify off echo off pages 0 trimspool on

    set lines 132 pagesize 0

    spo newname.sql

    --

    select ''run{'' from dual;

    --

    select

    ''set newname for datafile '' || file# || '' to '' || '''''''' || name || ''''''''
    || '';''

    from v$datafile;

    --

    select

    ''restore database;'' || chr(10) ||

    ''switch datafile all;'' || chr(10) ||

    ''}''

    from dual;

    --

    spo off;

    ```


    After running the script, these are the contents of the `newname.sql` script that
    was generated:


    ```

    run{

    set newname for datafile 1 to ''/u01/dbfile/O12C/system01.dbf'';

    set newname for datafile 2 to ''/u01/dbfile/O12C/sysaux01.dbf'';

    set newname for datafile 3 to ''/u01/dbfile/O12C/undotbs01.dbf'';

    set newname for datafile 4 to ''/u01/dbfile/O12C/users01.dbf'';

    restore database;

    switch datafile all;

    }

    ```


    Then, modify the contents of the `newname.sql` script to reflect the directories
    on the destination database server. Here is what the final `newname.sql` script
    looks like for this example:


    ```

    run{

    set newname for datafile 1 to ''/ora01/dbfile/DEVDB/system01.dbf'';

    set newname for datafile 2 to ''/ora01/dbfile/DEVDB/sysaux01.dbf'';

    set newname for datafile 3 to ''/ora01/dbfile/DEVDB/undotbs01.dbf'';

    set newname for datafile 4 to ''/ora01/dbfile/DEVDB/users01.dbf'';

    restore database;

    switch datafile all;

    }

    ```


    Now, connect to RMAN, and run the prior script to restore the data files to the
    new locations:


    ```

    $ rman target /

    RMAN> @newname.sql

    ```


    Here is a snippet of the output:


    ```

    datafile 1 switched to datafile copy

    input datafile copy RECID=5 STAMP=790357985 file name=/ora01/dbfile/DEVDB/system01.dbf

    ```


    All the data files have been restored to the new database server. You can use
    the RMAN `REPORT SCHEMA` command to verify that the files have been restored and
    are in the correct locations:


    ```

    RMAN> report schema;

    ```


    Here is some sample output:


    ```

    RMAN-06139: WARNING: control file is not current for REPORT SCHEMA

    Report of database schema for database with db_unique_name O12C

    List of Permanent Datafiles

    ===========================

    File Size(MB) Tablespace           RB segs Datafile Name

    ---- -------- -------------------- ------- ------------------------

    1    500      SYSTEM               ***     /ora01/dbfile/DEVDB/system01.dbf

    2    500      SYSAUX               ***     /ora01/dbfile/DEVDB/sysaux01.dbf

    3    800      UNDOTBS1             ***     /ora01/dbfile/DEVDB/undotbs01.dbf

    4    50       USERS                ***     /ora01/dbfile/DEVDB/users01.dbf


    List of Temporary Files

    =======================

    File Size(MB) Tablespace           Maxsize(MB) Tempfile Name

    ---- -------- -------------------- ----------- --------------------

    1    500      TEMP                 500         /u01/dbfile/O12C/temp01.dbf

    ```


    From the prior output you can see that the database name and temporary tablespace
    data file still don’t reflect the destination database (`DEVDB`). These will be
    modified in subsequent steps.


    Step 12\. Recover the Database


    Next, you need to apply any archive redo files that were generated during the
    backup. These should be included in the backup because the `ARCHIVELOG ALL` clause
    was used to take the backup. Initiate the application of redo via the `RECOVER
    DATABASE` command:


    ```

    RMAN> recover database;

    ```


    RMAN will restore and apply as many archive redo logs as it has in the backup
    pieces and then may throw an error when it reaches an archive redo log that doesn’t
    exist; for example,


    ```

    RMAN-06054: media recovery requesting unknown archived log for...

    ```


    That error message is fine. The recovery process will restore and recover archive
    redo logs contained in the backups, which should be sufficient to open the database.
    The recovery process doesn’t know where to stop applying archive redo logs and
    therefore will continue to attempt to do so until it can’t find the next log.
    Having said that, now is a good time to verify that your data files are online
    and not in a fuzzy state:


    ```

    select file#, status, fuzzy, error, checkpoint_change#,

    to_char(checkpoint_time,''dd-mon-rrrr hh24:mi:ss'') as checkpoint_time

    from v$datafile_header;

    ```


    Step 13\. Set the New Location for the Online Redo Logs


    If your source and destination servers have the exact same directory structures,
    then you don’t need to set a new location for the online redo logs (so you can
    skip this step).


    However, if the directory structures are different, then you’ll need to update
    the control file to reflect the new directory for the online redo logs. I sometimes
    use an SQL script that generates SQL to assist with this step:


    ```

    set head off feed off verify off echo off pages 0 trimspool on

    set lines 132 pagesize 0

    spo renlog.sql

    select

    ''alter database rename file '' || chr(10)

    || '''''''' || member || '''''''' || '' to '' || chr(10) || '''''''' || member
    || '''''''' ||'';''

    from v$logfile;

    spo off;

    ```


    For this example, here is a snippet of the `renlog.sql` file that was generated:


    ```

    alter database rename file

    ''/u01/oraredo/O12C/redo01a.rdo'' to

    ''/u01/oraredo/O12C/redo01a.rdo'';

    ...

    alter database rename file

    ''/u02/oraredo/O12C/redo03b.rdo'' to

    ''/u02/oraredo/O12C/redo03b.rdo'';

    ```


    The contents of `renlog.sql` need to be modified to reflect the directory structure
    on the destination server. Here is what `renlog.sql` looks like after being edited:


    ```

    alter database rename file

    ''/u01/oraredo/O12C/redo01a.rdo'' to

    ''/ora01/oraredo/DEVDB/redo01a.rdo'';

    ...

    alter database rename file

    ''/u02/oraredo/O12C/redo03b.rdo'' to

    ''/ora01/oraredo/DEVDB/redo03b.rdo'';

    ```


    Update the control file by running the `renlog.sql` script:


    ```

    SQL> @renlog.sql

    ```


    You can select from `V$LOGFILE` to verify that the online redo log names are correct:


    ```

    SQL> select member from v$logfile;

    ```


    Here is the output for this example:


    ```

    /ora01/oraredo/DEVDB/redo01a.rdo

    /ora01/oraredo/DEVDB/redo02a.rdo

    /ora01/oraredo/DEVDB/redo03a.rdo

    /ora01/oraredo/DEVDB/redo01b.rdo

    /ora01/oraredo/DEVDB/redo02b.rdo

    /ora01/oraredo/DEVDB/redo03b.rdo

    ```


    Make sure the directories exist on the new server that will contain the online
    redo logs. For this example, here is the `mkdir` command:


    ```

    $ mkdir -p /ora01/oraredo/DEVDB

    ```


    Step 14\. Open the Database


    You must open the database with the `OPEN RESETLOGS` command (because there are
    no redo logs, and they must be re-created at this point):


    ```

    SQL> alter database open resetlogs;

    ```


    If successful, you should see this message:


    ```

    Statement processed

    ```


    ![Image](images/sq.jpg) **Note**  Keep in mind that all the passwords from the
    newly restored copy are as they were in the source database. You may want to change
    the passwords in a replicated database, especially if it was copied from production.


    Step 15\. Add the Temp File


    When you start your database, Oracle will automatically try to add any missing
    temp files to the database. Oracle won’t be able to do this if the directory structure
    on the destination server is different from that of the source server. In this
    scenario, you will have to add any missing temp files manually. To do this, first
    take offline the temporary tablespace temp file. The file definition from the
    originating database is taken offline like so:


    ```

    SQL> alter database tempfile ''/u01/dbfile/O12C/temp01.dbf'' offline;

    SQL> alter database tempfile ''/u01/dbfile/O12C/temp01.dbf'' drop;

    ```


    Next, add a temporary tablespace file to the `TEMP` tablespace that matches the
    directory structure of the destination database server:


    ```

    SQL> alter tablespace temp add tempfile ''/ora01/dbfile/DEVDB/temp01.dbf''

         size 100m;

    ```'
  trans: "\n# 将数据库文件恢复到不同目录\n\n然而，当将数据文件恢复到与原始目录不同的位置时，必须使用`SET NEWNAME`命令。创建一个文件，该文件包含一个\
    \ RMAN `run{}`块，其中有适当的`SET NEWNAME`和`RESTORE`命令。我喜欢使用一个 SQL 脚本来生成 SQL，作为我的起点。以下是一个示例脚本：\n\
    \n```\nset head off feed off verify off echo off pages 0 trimspool on\nset lines\
    \ 132 pagesize 0\nspo newname.sql\n--\nselect 'run{' from dual;\n--\nselect\n\
    'set newname for datafile ' || file# || ' to ' || '''' || name || '''' || ';'\n\
    from v$datafile;\n--\nselect\n'restore database;' || chr(10) ||\n'switch datafile\
    \ all;' || chr(10) ||\n'}'\nfrom dual;\n--\nspo off;\n```\n\n运行脚本后，生成的`newname.sql`脚本内容如下：\n\
    \n```\nrun{\nset newname for datafile 1 to '/u01/dbfile/O12C/system01.dbf';\n\
    set newname for datafile 2 to '/u01/dbfile/O12C/sysaux01.dbf';\nset newname for\
    \ datafile 3 to '/u01/dbfile/O12C/undotbs01.dbf';\nset newname for datafile 4\
    \ to '/u01/dbfile/O12C/users01.dbf';\nrestore database;\nswitch datafile all;\n\
    }\n```\n\n然后，修改`newname.sql`脚本的内容，以反映目标数据库服务器上的目录。本例中最终的`newname.sql`脚本如下所示：\n\
    \n```\nrun{\nset newname for datafile 1 to '/ora01/dbfile/DEVDB/system01.dbf';\n\
    set newname for datafile 2 to '/ora01/dbfile/DEVDB/sysaux01.dbf';\nset newname\
    \ for datafile 3 to '/ora01/dbfile/DEVDB/undotbs01.dbf';\nset newname for datafile\
    \ 4 to '/ora01/dbfile/DEVDB/users01.dbf';\nrestore database;\nswitch datafile\
    \ all;\n}\n```\n\n现在，连接到 RMAN，并运行前面的脚本以将数据文件恢复到新位置：\n\n```\n$ rman target /\n\
    RMAN> @newname.sql\n```\n\n以下是输出的片段：\n\n```\ndatafile 1 switched to datafile copy\n\
    input datafile copy RECID=5 STAMP=790357985 file name=/ora01/dbfile/DEVDB/system01.dbf\n\
    ```\n\n所有数据文件都已恢复到新的数据库服务器。你可以使用 RMAN 的`REPORT SCHEMA`命令来验证文件是否已恢复且位置正确：\n\n```\n\
    RMAN> report schema;\n```\n\n以下是部分示例输出：\n\n```\nRMAN-06139: WARNING: control file\
    \ is not current for REPORT SCHEMA\nReport of database schema for database with\
    \ db_unique_name O12C\nList of Permanent Datafiles\n===========================\n\
    File Size(MB) Tablespace           RB segs Datafile Name\n---- -------- --------------------\
    \ ------- ------------------------\n1    500      SYSTEM               ***   \
    \  /ora01/dbfile/DEVDB/system01.dbf\n2    500      SYSAUX               ***  \
    \   /ora01/dbfile/DEVDB/sysaux01.dbf\n3    800      UNDOTBS1             *** \
    \    /ora01/dbfile/DEVDB/undotbs01.dbf\n4    50       USERS                ***\
    \     /ora01/dbfile/DEVDB/users01.dbf\n\nList of Temporary Files\n=======================\n\
    File Size(MB) Tablespace           Maxsize(MB) Tempfile Name\n---- -------- --------------------\
    \ ----------- --------------------\n1    500      TEMP                 500   \
    \      /u01/dbfile/O12C/temp01.dbf\n```\n\n从上述输出中可以看到，数据库名称和临时表空间数据文件仍未反映目标数据库（`DEVDB`）。这些将在后续步骤中进行修改。\n\
    \n### 步骤 12：恢复数据库\n\n接下来，你需要应用备份期间生成的所有归档重做文件。这些文件应包含在备份中，因为使用了`ARCHIVELOG ALL`子句来执行备份。通过`RECOVER\
    \ DATABASE`命令启动重做的应用：\n\n```\nRMAN> recover database;\n```\n\nRMAN 将恢复并应用备份集中它拥有的尽可能多的归档重做日志，然后在遇到一个不存在的归档重做日志时可能会抛出错误；例如，\n\
    \n```\nRMAN-06054: media recovery requesting unknown archived log for...\n```\n\
    \n那个错误信息是正常的。恢复过程将恢复并应用备份中包含的归档重做日志，这应该足以打开数据库。恢复过程不知道应该在何处停止应用归档重做日志，因此将继续尝试，直到找不到下一个日志为止。话虽如此，现在是验证你的数据文件是否在线且不处于模糊状态的好时机：\n\
    \n```\nselect file#, status, fuzzy, error, checkpoint_change#,\nto_char(checkpoint_time,'dd-mon-rrrr\
    \ hh24:mi:ss') as checkpoint_time\nfrom v$datafile_header;\n```\n\n### 步骤 13：设置联机重做日志的新位置\n\
    \n如果你的源服务器和目标服务器具有完全相同的目录结构，那么你不需要为联机重做日志设置新位置（因此可以跳过此步骤）。\n\n然而，如果目录结构不同，那么你将需要更新控制文件以反映联机重做日志的新目录。我有时使用一个生成\
    \ SQL 的 SQL 脚本来协助完成此步骤：\n\n```\nset head off feed off verify off echo off pages\
    \ 0 trimspool on\nset lines 132 pagesize 0\nspo renlog.sql\nselect\n'alter database\
    \ rename file ' || chr(10)\n|| '''' || member || '''' || ' to ' || chr(10) ||\
    \ '''' || member || '''' ||';'\nfrom v$logfile;\nspo off;\n```\n\n对于本例，以下是生成的`renlog.sql`文件的片段：\n\
    \n```\nalter database rename file\n'/u01/oraredo/O12C/redo01a.rdo' to\n'/u01/oraredo/O12C/redo01a.rdo';\n\
    ...\nalter database rename file\n'/u02/oraredo/O12C/redo03b.rdo' to\n'/u02/oraredo/O12C/redo03b.rdo';\n\
    ```\n\n`renlog.sql`的内容需要进行修改，以反映目标服务器上的目录结构。以下是编辑后的`renlog.sql`：\n\n```\nalter\
    \ database rename file\n'/u01/oraredo/O12C/redo01a.rdo' to\n'/ora01/oraredo/DEVDB/redo01a.rdo';\n\
    ...\nalter database rename file\n'/u02/oraredo/O12C/redo03b.rdo' to\n'/ora01/oraredo/DEVDB/redo03b.rdo';\n\
    ```\n\n通过运行`renlog.sql`脚本来更新控制文件：\n\n```\nSQL> @renlog.sql\n```\n\n你可以从`V$LOGFILE`中查询以验证联机重做日志名称是否正确：\n\
    \n```\nSQL> select member from v$logfile;\n```\n\n以下是本例的输出：\n\n```\n/ora01/oraredo/DEVDB/redo01a.rdo\n\
    /ora01/oraredo/DEVDB/redo02a.rdo\n/ora01/oraredo/DEVDB/redo03a.rdo\n/ora01/oraredo/DEVDB/redo01b.rdo\n\
    /ora01/oraredo/DEVDB/redo02b.rdo\n/ora01/oraredo/DEVDB/redo03b.rdo\n```\n\n确保新服务器上包含联机重做日志的目录存在。对于本例，`mkdir`命令如下：\n\
    \n```\n$ mkdir -p /ora01/oraredo/DEVDB\n```\n\n### 步骤 14：打开数据库\n\n你必须使用`OPEN RESETLOGS`命令打开数据库（因为此时没有重做日志，必须重新创建）：\n\
    \n```\nSQL> alter database open resetlogs;\n```\n\n如果成功，你应该会看到此消息：\n\n```\nStatement\
    \ processed\n```\n\n`Note` 请记住，新恢复副本的所有密码都与源数据库中的一样。你可能希望在复制的数据库中更改密码，特别是如果它是从生产环境复制的。\n\
    \n### 步骤 15：添加临时文件\n\n当你启动数据库时，Oracle 会自动尝试向数据库添加任何缺失的临时文件。如果目标服务器上的目录结构与源服务器不同，Oracle\
    \ 将无法做到这一点。在这种情况下，你将必须手动添加任何缺失的临时文件。为此，首先将临时表空间的临时文件脱机。来自源数据库的文件定义像这样脱机：\n\n```\n\
    SQL> alter database tempfile '/u01/dbfile/O12C/temp01.dbf' offline;\nSQL> alter\
    \ database tempfile '/u01/dbfile/O12C/temp01.dbf' drop;\n```\n\n接下来，向`TEMP`表空间添加一个临时表空间文件，该文件匹配目标数据库服务器的目录结构：\n\
    \n```\nSQL> alter tablespace temp add tempfile '/ora01/dbfile/DEVDB/temp01.dbf'\n\
    \     size 100m;\n```\n"
- fmt: "You can run the `REPORT SCHEMA` command to verify that all files are in the\
    \ correct locations.\n\n## Step 16. Rename the Database\n\nThis step is optional.\
    \ If you need to rename the database to reflect the name for a development or\
    \ test database, create a trace file that contains the `CREATE CONTROLFILE` statement,\
    \ and use it to rename your database.\n\n![Image](images/sq.jpg) `Tip` If you\
    \ don’t rename the database, be careful about connect and resync operations to\
    \ the same recovery catalog used by the original/source database. This causes\
    \ confusion in the recovery catalog as to which is the real source database and\
    \ may jeopardize your ability to recover and restore the real source database.\n\
    \nThe steps for renaming your database are as follows:\n\n### 1. Generate a trace\
    \ file\n\nGenerate a trace file that contains the SQL command to recreate the\
    \ control files:\n\n```sql\nSQL> alter database backup controlfile to trace as\
    \ '/tmp/cf.sql' resetlogs;\n```\n\n### 2. Shut down the database\n\nShut down\
    \ the database:\n\n```sql\nSQL> shutdown immediate;\n```\n\n### 3. Modify the\
    \ trace file\n\nModify the `/tmp/cf.sql` trace file; be sure to specify `SET DATABASE\
    \ \"<NEW DATABASE NAME>\"` in the top line of the output:\n\n```sql\nCREATE CONTROLFILE\
    \ REUSE SET DATABASE \"DEVDB\" RESETLOGS ARCHIVELOG\n    MAXLOGFILES 16\n    MAXLOGMEMBERS\
    \ 4\n    MAXDATAFILES 1024\n    MAXINSTANCES 1\n    MAXLOGHISTORY 876\nLOGFILE\n\
      GROUP 1 (\n    '/ora01/oraredo/DEVDB/redo01a.rdo',\n    '/ora01/oraredo/DEVDB/redo01b.rdo'\n\
      ) SIZE 50M BLOCKSIZE 512,\n  GROUP 2 (\n    '/ora01/oraredo/DEVDB/redo02a.rdo',\n\
        '/ora01/oraredo/DEVDB/redo02b.rdo'\n  ) SIZE 50M BLOCKSIZE 512,\n  GROUP 3\
    \ (\n    '/ora01/oraredo/DEVDB/redo03a.rdo',\n    '/ora01/oraredo/DEVDB/redo03b.rdo'\n\
      ) SIZE 50M BLOCKSIZE 512\nDATAFILE\n  '/ora01/dbfile/DEVDB/system01.dbf',\n\
      '/ora01/dbfile/DEVDB/sysaux01.dbf',\n  '/ora01/dbfile/DEVDB/undotbs01.dbf',\n\
      '/ora01/dbfile/DEVDB/users01.dbf'\nCHARACTER SET AL32UTF8;\n```\n\n![Image](images/sq.jpg)\
    \ `Note` If you don’t specify `SET DATABASE` in the top line of the prior script,\
    \ when you run the script (as shown later in this example), you’ll receive an\
    \ error such as this: `ORA-01161: database name ... in file header does not match`.\n\
    \n### 4. Create a new init.ora file\n\nCreate an `init.ora` file that matches\
    \ the new database name:\n\n```bash\n$ cd $ORACLE_HOME/dbs\n$ cp init<old_sid>.ora\
    \ init<new_sid>.ora\n$ cp inito12c.ora initDEVDB.ora\n```\n\n### 5. Modify the\
    \ DB_NAME variable\n\nModify the `DB_NAME` variable within the new `init.ora`\
    \ file (in this example, it’s set to `DEVDB`):\n\n```bash\ndb_name='DEVDB'\n```\n\
    \n### 6. Set the ORACLE_SID variable\n\nSet the `ORACLE_SID` OS variable to reflect\
    \ the new `SID` name (in this example, it’s set to `DEVDB`):\n\n```bash\n$ echo\
    \ $ORACLE_SID\nDEVDB\n```\n\n### 7. Start up the instance\n\nStart up the instance\
    \ in nomount mode:\n\n```sql\nSQL> startup nomount;\n```\n\n### 8. Run the trace\
    \ file\n\nRun the trace file (from step 2) to re-create the control file:\n\n\
    ```sql\nSQL> @/tmp/cf.sql\n```\n\n![Image](images/sq.jpg) `Note` In this example\
    \ the control files already exist in the location specified by the `CONTROL_FILES`\
    \ initialization parameter; therefore, the `REUSE` parameter is used in the `CREATE\
    \ CONTROL FILE` statement.\n\n### 9. Open the database\n\nOpen the database with\
    \ `OPEN RESETLOGS`:\n\n```sql\nSQL> alter database open resetlogs;\n```\n\nIf\
    \ successful, you should have a database that is a copy of the original database.\
    \ All the data files, control files, archive redo logs, and online redo logs are\
    \ in the new locations, and the database has a new name.\n\n### 10. Ensure temporary\
    \ tablespace exists\n\nAs a last step, ensure that your temporary tablespace exists:\n\
    \n```sql\nALTER TABLESPACE TEMP ADD TEMPFILE '/ora01/dbfile/DEVDB/temp01.dbf'\n\
    \     SIZE 104857600  REUSE AUTOEXTEND OFF;\n```\n\n![Image](images/sq.jpg) `Tip`\
    \ You can also use the `NID` utility to change the database name and database\
    \ identifier (DBID). See MOS note 863800.1 for more details.\n\n## Summary\n\n\
    RMAN is an acronym for Recovery Manager. It’s worth noting that Oracle did not\
    \ name this tool Backup Manager. The Oracle team recognized that although backups\
    \ are important, the real value of a B&R tool is its ability to restore and recover\
    \ the database. Being able to manage the recovery process is the critical skill.\
    \ When a database is damaged and needs to be restored, everybody looks to the\
    \ DBA to perform a smooth and speedy recovery of the database. Oracle DBAs should\
    \ use RMAN to protect, secure, and ensure the availability of the company’s data\
    \ assets.\n\nThe restore-and-recovery process is analogous to the healing process\
    \ involved when you break a bone. Restoring data files from a backup and placing\
    \ them in their original directories can be likened to setting a bone back to\
    \ its original position. Recovering a data file is similar to the healing of a\
    \ broken bone—returning the bone back to the state it was in before it was broken.\
    \ When you recover data files, you apply transactions (obtained from archive redo\
    \ and online redo) to transform the restored data files back to the state they\
    \ were in before the media failure occurred.\n\nRMAN can be used for any type\
    \ of restore-and-recovery scenario. Depending on the situation, RMAN can be used\
    \ to restore the entire database, specific data files, control files, server parameter\
    \ files, archive redo logs, or just specific data blocks. You can instruct RMAN\
    \ to perform a complete or an incomplete recovery.\n\nThe last section in this\
    \ chapter details how to use RMAN to restore and recover a database to a remote\
    \ server. I recommend that you periodically attempt this type of recovery in order\
    \ to exercise your B&R strategy. You will gain much confidence and fully understand\
    \ B&R internals once you can successfully restore a database to a server that\
    \ is different from the original.\n\n# CHAPTER 7\n\n![image](images/frontdot.jpg)\n\
    \n## Handling Online Redo Log Failures\n\nI worked for a company that had just\
    \ implemented an expensive database server with redundancy built into every component,\
    \ or so I thought. The server was configured with RAID disks for all database\
    \ files and the online redo log groups. The team was confident that there was\
    \ minimal risk of failure with these disks.\n\nTherefore, I decided not to multiplex\
    \ the online redo log groups. A few days later, an inexpensive battery that maintained\
    \ the cache for a disk controller failed. This caused corruption in the current\
    \ online redo log group. As a result, the company lost data, experienced costly\
    \ downtime, and had to perform an incomplete recovery.\n\nAs detailed in [Chapter\
    \ 2](#9781484207642_Ch02.xhtml), online redo logs are crucial database files that\
    \ store a record of transactions that have occurred in your database. Since RMAN\
    \ doesn’t back up online redo log files, you can’t use RMAN to restore these critical\
    \ files. Given their criticality, I thought it was important to include a chapter\
    \ on how to deal with failures with online redo log files.\n\nMedia failures with\
    \ the online redo logs are usually noticed either when the database ceases to\
    \ work (all members of a group have experienced media failure) or you notice an\
    \ error in the `alert.log` indicating issues, for example:\n\n```\nORA-00312:\
    \ online log 3 thread 1: '/u01/oraredo/O12C/redo02b.rdo'\n```\n\nOnce you’ve discovered\
    \ an issue, the first step is to determine how to recover from this failure.\n\
    \n![Image](images/sq.jpg) `Tip` Use the RMAN `backup database plus archivelog`\
    \ command to ensure your current online redo log files (of all the threads) are\
    \ switched and archived before and after the backup of the database.\n\n### Determining\
    \ a Course of Action\n\nIf you’ve experienced a problem with your online redo\
    \ log files and need to determine what shape they are in and what action to take.\
    \ Follow these steps when dealing with online redo log file failures:"
