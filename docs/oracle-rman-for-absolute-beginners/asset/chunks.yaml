    ## 操作系统认证与密码文件


    对于本地连接（在物理登录到数据库服务器时进行），操作系统认证优先于密码文件认证。换句话说，如果您登录到一个属于已认证组（如 `dba`）的操作系统帐户，那么在使用
    `sys*` 权限连接到本地数据库时，您输入什么用户名和密码并不重要。例如，您可以使用不存在的用户名/密码以 `sysdba` 身份连接：


    ```

    $ sqlplus bogus/wrong as sysdba

    SQL> show user;

    USER is "SYS"

    ```


    前面的连接有效，因为 Oracle 忽略了提供的用户名/密码，因为用户首先通过操作系统认证进行了验证。但是，当您不使用操作系统认证来建立特权本地连接，或者当您尝试通过网络连接到远程数据库时，则会使用密码文件。

    '
- fmt: '# 使用密码文件与数据库连接


    一个关于使用密码文件的重要方面是，该机制允许你通过网络使用 `sqlplus` 或 `rman` 以 `sys*` 特权连接到远程数据库。例如，如果你想以
    `sysdba` 特权，使用用户名 `chaya` 和密码 `heera` 连接到名为 `HATHI` 的远程数据库，你将按如下操作：


    ```

    $ sqlplus chaya/heera@HATHI as sysdba

    ```


    Oracle 将核实该用户名密码组合是否存在远程服务器上与 `HATHI` 网络服务名所定义的数据库相关联的密码文件中。在此示例中，Oracle 使用本地
    `tnsnames.ora` 文件中的信息来确定数据库在网络上的位置（主机、端口和数据库）。


    ![Image](images/sq.jpg) **提示** 使用本地 `tnsnames.ora` 文件被称为*本地命名*连接方法。还有其他远程数据库名称解析方法，例如简易连接、目录命名和外部命名。有关如何实现这些方法的详细信息，请参阅
    *Oracle Database Net Services Administrator’s Guide*。


    ## 简易连接


    简易连接方法允许你连接到远程数据库，而无需 `tnsnames.ora` 文件（或其他解析数据库位置的方法）。如果你知道主机名、服务器端口和服务名，可以直接在命令行中输入这些信息。语法如下：


    `sqlplus username@[//]host[:port][/service_name][:server][/instance_name]`


    例如，假设主机名为 `hesta`，端口为 1521，服务名为 `O12C`，那么你可以按如下方式连接：


    `$ sqlplus user/pass@hesta:1521/O12C`


    简易连接方法在排除连接问题故障或当没有可用的 `tnsnames.ora` 文件（或其他解析远程连接的方法）时非常方便。


    # 启动数据库


    启动和停止数据库是你将频繁执行的任务。要启动/停止数据库，请使用具有 `SYSDBA` 或 `SYSOPER` 特权的用户帐户连接，并发出 `STARTUP`
    和 `SHUTDOWN` 语句。以下示例使用操作系统认证连接到数据库：


    ```

    $ sqlplus / as sysdba

    ```


    以特权帐户连接后，你可以启动数据库，如下所示：


    ```

    SQL> startup;

    ```


    ![Image](images/sq.jpg) **注意** 要使上述命令生效，`ORACLE_HOME/dbs` 目录中需要有一个 `spfile` 或
    `init.ora` 文件。


    当你的实例成功启动时，你应该会看到来自 Oracle 的消息，表明系统全局区（SGA）已分配。数据库已装载然后打开：


    ```

    ORACLE instance started.


    Total System Global Area 2137886720 bytes

    Fixed Size                  2290416 bytes

    Variable Size            1207962896 bytes

    Database Buffers          922746880 bytes

    Redo Buffers                4886528 bytes

    Database mounted.

    Database opened.

    ```


    从以上输出可以看出，打开 Oracle 数据库的启动操作经历了三个不同的阶段：


    1.  启动实例

    2.  装载数据库

    3.  打开数据库


    启动数据库时，你可以逐步执行这些阶段。首先，启动 Oracle 实例（后台进程和内存结构）：


    ```

    SQL> startup nomount;

    ```


    接下来，装载数据库。此时，Oracle 读取控制文件：


    ```

    SQL> alter database mount;

    ```


    最后，打开数据文件和联机重做日志文件：


    ```

    SQL> alter database open;

    ```


    ![Image](images/sq.jpg) **提示** 正如你将在本书后面看到的，在执行 RMAN 备份和恢复任务时，理解这些启动阶段尤为重要。例如，在某些场景下，你可能需要数据库处于装载模式。在该模式下，重要的是要理解控制文件已打开，但数据文件和联机重做日志尚未打开。


    此启动过程在[图 1-1](#9781484207642_Ch01.xhtml#Fig1)中以图形方式描述。


    ![9781484207642_Fig01-01.jpg](images/9781484207642_Fig01-01.jpg)


    [图 1-1](#9781484207642_Ch01.xhtml#_Fig1). Oracle 启动阶段


    当你发出不带任何参数的 `STARTUP` 语句时，Oracle 会自动逐步执行三个启动阶段（nomount、mount、open）。在大多数情况下，你将发出不带参数的
    `STARTUP` 语句来启动数据库。在许多 RMAN 备份和恢复场景中，你会发出 `STARTUP MOUNT` 来将数据库置于装载模式（实例已启动，控制文件已打开）。[表
    1-2](#9781484207642_Ch01.xhtml#Tab2) 描述了可与数据库 `STARTUP` 语句一起使用的参数含义。


    [表 1-2](#9781484207642_Ch01.xhtml#_Tab2). STARTUP 命令可用参数


    | 参数 | 含义 |

    | --- | --- |

    | `FORCE` | 在重新启动前使用 `ABORT` 关闭实例；对于排除启动问题故障很有用 |

    | `RESTRICT` | 仅允许具有 `RESTRICTED SESSION` 特权的用户连接到数据库 |

    | `PFILE` | 指定启动实例时要使用的客户端参数文件 |

    | `QUIET` | 在启动实例时抑制显示 SGA 信息 |

    | `NOMOUNT` | 启动后台进程并分配内存；不读取控制文件 |

    | `MOUNT` | 启动后台进程，分配内存，并读取控制文件 |

    | `OPEN` | 启动后台进程，分配内存，读取控制文件，并打开联机重做日志和数据文件 |

    | `OPEN RECOVER` | 在打开数据库前尝试进行介质恢复 |

    | `OPEN READ ONLY` | 以只读模式打开数据库 |

    | `UPGRADE` | 在升级数据库时使用 |

    | `DOWNGRADE` | 在降级数据库时使用 |


    # 停止数据库


    通常，你使用 `SHUTDOWN IMMEDIATE` 语句来停止数据库。`IMMEDIATE` 参数指示 Oracle 停止数据库活动并回滚任何打开的事务，例如：


    ```

    SQL> shutdown immediate;

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    ```


    [表 1-3](#9781484207642_Ch01.xhtml#Tab3) 详细定义了 `SHUTDOWN` 语句可用的参数。在大多数情况下，`SHUTDOWN
    IMMEDIATE` 是关闭数据库的可接受方法。如果你发出不带参数的 `SHUTDOWN` 命令，则等同于发出 `SHUTDOWN NORMAL`。


    [表 1-3](#9781484207642_Ch01.xhtml#_Tab3). SHUTDOWN 命令可用参数


    | 参数 | 含义 |

    | --- | --- |

    | `NORMAL` | 等待用户退出活动会话后再关闭。 |

    | `TRANSACTIONAL` | 等待事务完成，然后终止会话。 |

    | `TRANSACTIONAL LOCAL` | 仅对本地实例执行事务性关闭。 |

    | `IMMEDIATE` | 立即终止活动会话。打开的事务将被回滚。 |

    | `ABORT` | 立即终止实例。事务被终止且不会被回滚。 |


    你很少需要使用 `SHUTDOWN ABORT` 语句。通常，`SHUTDOWN IMMEDIATE` 就足够了。话虽如此，使用 `SHUTDOWN ABORT`
    也没有问题。如果 `SHUTDOWN IMMEDIATE` 因任何原因不工作，那么就使用 `SHUTDOWN ABORT`。


    ![Image](images/sq.jpg) **注意** 快速连续停止和重新启动数据库在俗称“弹跳数据库”。


    启动和停止数据库是一个相当简单的过程。如果环境设置正确，你应该能够以特权用户身份连接到数据库，并发出适当的启动和关闭语句。


    ## 启动力


    有时在开发环境中，我需要快速停止并启动数据库。例如，我可能想这样做是因为我修改了一个需要数据库重新启动的初始化参数。你可以用一个命令停止/启动数据库：


    `SQL> startup force;`'
  raw: 'One key aspect about using a password file is that this is the mechanism that
    allows you to use SQL*Plus or RMAN to connect to a remote database over the network
    with `sys*` privileges. For example, if you want to connect to a user named `chaya`
    with a password of `heera` to a remote database named `HATHI` with `sysdba` privileges,
    you would do as follows:


    ```

    $ sqlplus chaya/heera@HATHI as sysdba

    ```


    Oracle will verify that the username password combination exists in a password
    file on the remote server that is associated with the database defined by the
    `HATHI` net service name. In this example, Oracle uses the information in a local
    `tnsnames.ora` file to determine the location of the database on the network (host,
    port, and database).


    ![Image](images/sq.jpg) **Tip**  Using a local `tnsnames.ora` file is known as
    the *local naming* connection method. There are other remote database name resolution
    methods, such as easy connect, directory naming, and external naming. See the
    *Oracle Database Net Services Administrator’s Guide* for details on how to implement
    these.


    **EASY CONNECT**


    The easy connect method allows you to connect to a remote database without the
    need of a `tnsnames.ora` file (or other methods of resolving the location of the
    database). If you know the name of the host, server, port, and service name, you
    can directly enter those on the command line. The syntax is as follows:


    `sqlplus username@[//]host[:port][/service_name][:server][/instance_name]`


    For example, assuming the host name is `hesta`, the port is 1521, and the service
    name is `O12C`, then you can connect as follows:


    `$ sqlplus user/pass@hesta:1521/O12C`


    The easy connect method is handy for situations in which you’re troubleshooting
    connectivity issues or when you don’t have a `tnsnames.ora` file available (or
    other ways to resolve the remote connection).


    Starting the Database


    Starting and stopping your database is a task that you’ll perform frequently.
    To start/stop your database, connect with a `SYSDBA` or `SYSOPER` privileged user
    account, and issue the `STARTUP` and `SHUTDOWN` statements. The following example
    uses OS authentication to connect to the database:


    ```

    $ sqlplus / as sysdba

    ```


    After you’re connected as a privileged account, you can start your database, as
    follows:


    ```

    SQL> startup;

    ```


    ![Image](images/sq.jpg) **Note**  For the prior command to work, you need either
    an `spfile` or `init.ora` file in the `ORACLE_HOME/dbs` directory.


    When your instance starts successfully, you should see messages from Oracle indicating
    that the system global area (SGA) has been allocated. The database is mounted
    and then opened:


    ```

    ORACLE instance started.


    Total System Global Area 2137886720 bytes

    Fixed Size                  2290416 bytes

    Variable Size            1207962896 bytes

    Database Buffers          922746880 bytes

    Redo Buffers                4886528 bytes

    Database mounted.

    Database opened.

    ```


    From the prior output the database startup operation goes through three distinct
    phases in opening an Oracle database:


    1.  Starting the instance

    2.  Mounting the database

    3.  Opening the database


    You can step through these one at a time when you start your database. First,
    start the Oracle instance (background processes and memory structures):


    ```

    SQL> startup nomount;

    ```


    Next, mount the database. At this point, Oracle reads the control files:


    ```

    SQL> alter database mount;

    ```


    Finally, open the data files and online redo log files:


    ```

    SQL> alter database open;

    ```


    ![Image](images/sq.jpg) **Tip**  As you’ll see later in this book, it’s especially
    important to understand these startup phases when performing RMAN backup and recovery
    tasks. For example, in some scenarios you may need your database to be in mount
    mode. In that mode, it’s important to understand that the control file is open
    but the data files and online redo logs have not been opened yet.


    This startup process is depicted graphically in [Figure 1-1](#9781484207642_Ch01.xhtml#Fig1).


    ![9781484207642_Fig01-01.jpg](images/9781484207642_Fig01-01.jpg)


    [Figure 1-1](#9781484207642_Ch01.xhtml#_Fig1). Phases of Oracle startup


    When you issue a `STARTUP` statement without any parameters, Oracle automatically
    steps through the three startup phases (nomount, mount, open). In most cases,
    you will issue a `STARTUP` statement with no parameters to start your database.
    In many RMAN backup and recovery scenarios, you’ll issue a `STARTUP MOUNT` to
    place your database in mount mode (instance started and control files opened).
    [Table 1-2](#9781484207642_Ch01.xhtml#Tab2) describes the meanings of parameters
    that you can use with the database `STARTUP` statement.


    [Table 1-2](#9781484207642_Ch01.xhtml#_Tab2). Parameters Available with the STARTUP
    Command


    | Parameter | Meaning |

    | --- | --- |

    | `FORCE` | Shuts down the instance with `ABORT` before restarting it; useful
    for troubleshooting startup issues |

    | `RESTRICT` | Only allows users with the `RESTRICTED SESSION` privilege to connect
    to the database |

    | `PFILE` | Specifies the client parameter file to be used when starting the instance
    |

    | `QUIET` | Suppresses the display of SGA information when starting the instance
    |

    | `NOMOUNT` | Starts background processes and allocates memory; doesn’t read control
    files |

    | `MOUNT` | Starts background processes, allocates memory, and reads control files
    |

    | `OPEN` | Starts background processes, allocates memory, reads control files,
    and opens online redo logs and data files |

    | `OPEN RECOVER` | Attempts media recovery before opening the database |

    | `OPEN READ ONLY` | Opens the database in read-only mode |

    | `UPGRADE` | Used when upgrading a database |

    | `DOWNGRADE` | Used when downgrading a database |


    Stopping the Database


    Normally, you use the `SHUTDOWN IMMEDIATE` statement to stop a database. The `IMMEDIATE`
    parameter instructs Oracle to halt database activity and roll back any open transactions,
    for example:


    ```

    SQL> shutdown immediate;

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    ```


    [Table 1-3](#9781484207642_Ch01.xhtml#Tab3) provides a detailed definition of
    the parameters available with the `SHUTDOWN` statement. In most cases, `SHUTDOWN
    IMMEDIATE` is an acceptable method of shutting down your database. If you issue
    the `SHUTDOWN` command with no parameters, it’s equivalent to issuing `SHUTDOWN
    NORMAL`.


    [Table 1-3](#9781484207642_Ch01.xhtml#_Tab3). Parameters Available with the SHUTDOWN
    Command


    | Parameter | Meaning |

    | --- | --- |

    | `NORMAL` | Wait for users to log out of active sessions before shutting down.
    |

    | `TRANSACTIONAL` | Wait for transactions to finish, and then terminate the session.
    |

    | `TRANSACTIONAL LOCAL` | Perform a transactional shutdown for local instance
    only. |

    | `IMMEDIATE` | Terminate active sessions immediately. Open transactions are rolled
    back. |

    | `ABORT` | Terminate the instance immediately. Transactions are terminated and
    aren’t rolled back. |


    You should rarely need to use the `SHUTDOWN ABORT` statement. Usually, `SHUTDOWN
    IMMEDIATE` is sufficient. Having said that, there is nothing wrong with using
    `SHUTDOWN ABORT`. If `SHUTDOWN IMMEDIATE` isn’t working for any reason, then use
    `SHUTDOWN ABORT`.


    ![Image](images/sq.jpg) **Note**  Stopping and restarting your database in quick
    succession is known colloquially as “bouncing the database.”


    Starting and stopping your database is a fairly simple process. If the environment
    is set up correctly, you should be able to connect to your database as a privileged
    user, and issue the appropriate startup and shutdown statements.


    **STARTUP FORCE**


    Sometimes in development environments, I’ll quickly want to stop and start my
    database. For example, I might want to do this because I’ve modified an initialization
    parameter that requires a database restart. You can stop/start your database with
    one command:


    `SQL> startup force;`'
