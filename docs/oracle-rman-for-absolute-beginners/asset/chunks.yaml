    第 18–24 行检查锁文件是否存在。如果脚本已经在运行，你就不希望再次运行它。脚本检查锁文件，如果存在，脚本就退出。备份完成后，锁文件被删除（第 49–51
    行）。


    第 28 行将 `ECHO` 参数设置为 `on`。这指示 RMAN 在运行命令前在输出中显示该命令。这对于调试问题非常有价值。第 29 行显示所有可配置的变量。这对于故障排除也很有用，因为你可以看到在执行任何命令之前
    RMAN 变量被设置为什么。


    第 32–37 行使用 `CONFIGURE` 命令。这些命令在每次执行脚本时都会运行。为什么要这样做？`CONFIGURE` 命令只需要运行一次，它会存储在控制文件中——你不必再次运行它，对吗？这是正确的。然而，我偶尔会因为一个习惯不好的
    DBA 为数据库配置了一个设置却没有告诉任何人，而我直到尝试进行另一次备份时才发现这个错误配置而吃过亏。我强烈倾向于将 `CONFIGURE` 命令放在脚本中，这样无论其他
    DBA 在脚本外做了什么，行为都是一致的。脚本中的 `CONFIGURE` 设置也起到一种文档的作用：我可以轻松地查看脚本并确定设置是如何配置的。


    第 30 和 31 行运行 `CROSSCHECK` 命令。为什么要这样做？有时，文件会丢失，或者一个鲁莽的 DBA 可能会在 RMAN 之外使用操作系统命令从磁盘删除归档重做日志文件。当
    RMAN 运行时，如果它找不到它认为应该存在的文件，就会抛出错误并停止备份。我倾向于运行 `CROSSCHECK` 命令，让 RMAN 调和它认为应该在磁盘上的文件与实际在磁盘上的文件。这使得
    RMAN 能够平稳运行。


    你在第 39 行运行 `DELETE NOPROMPT OBSOLETE`。这会删除所有被 RMAN 根据保留策略标记为 `OBSOLETE` 的备份文件和归档重做日志文件。这让
    RMAN 管理哪些文件应该保留在磁盘上。我倾向于在备份完成后运行 `DELETE` 命令（而不是在备份之前运行）。保留策略定义为 1，因此如果你在备份后运行
    `DELETE`，RMAN 会在磁盘上保留一份备份副本。如果你在备份之前运行 `DELETE`，RMAN 会在磁盘上保留一份备份副本。备份运行后，磁盘上会有两份备份副本，而我这台服务器上没有足够的空间。


    你可以从 Linux/Unix 调度工具 `cron` 执行 shell 脚本，如下所示：


    ```

    0 16 * * * $HOME/bin/rmanback.bsh >$HOME/bin/log/INVPRDRMAN.log 2>&1

    ```


    该脚本在数据库服务器上于每天 1600 时（军用时间）运行。会创建一个日志文件 (`INVPRDRMAN.log`) 来捕获与 RMAN 作业相关的任何输出和错误。


    再次说明，本节中的脚本是基础的；你无疑会想要增强和修改它以满足你的需求。这个脚本为你提供了一个起点，包含具体的 RMAN 建议以及如何实现它们。


    ## 总结


    RMAN 是 Oracle 的旗舰级 B&R（备份与恢复）工具。如果你仍在使用较旧的、用户管理的备份技术，那么我强烈建议你切换到 RMAN。RMAN 包含一套强大的功能，是其他任何备份工具都无法比拟的。RMAN
    易于使用和配置。在实施稳固的 B&R 策略时，它将为你节省时间和精力，并让你高枕无忧。


    如果你是 RMAN 的新手，可能不清楚哪些功能应该始终启用和实现，同样，哪些方面你很少需要。本章包含一个检查清单，引导你了解每个架构决策点。你可能不同意我的一些结论，或者某些推荐可能无法满足你的业务需求——这没关系。关键在于你应该仔细考虑每个组件以及如何实现有意义的功能。


    本章以一个在生产环境中用于实现 RMAN 的脚本的实际示例结束。现在你对 RMAN 的功能及其使用方法有了很好的了解，可以开始进行备份了。下一章将介绍 RMAN
    备份场景。


