- fmt: '# 1. Running the RMAN Client Remotely or Locally


    It’s possible to run the `rman` utility from a remote server and connect to a
    target database via Oracle Net:


    ```bash

    $ rman target sys/foo@remote_db

    ```


    This allows you to run RMAN backups on disparate remote servers from one central
    location. When you run RMAN remotely, the backup files are always created on the
    target database server.


    Whenever possible, I run the `rman` client locally on the target server and connect,
    like this:


    ```bash

    $ rman target /

    ```


    This approach is simple and adequate for most requirements. You don’t have to
    worry about network issues or password files, and there are never compatibility
    issues with the `rman` client and the target database. If you run RMAN remotely,
    you need to be sure the remote `rman` executable is compatible with the target
    database. For example, you may establish that the remote `rman` executable you’re
    running is an Oracle 12c version of the RMAN client and need to determine if it’s
    possible to connect that client to a remote Oracle 9i target database. If you
    run the `rman` client locally on the target server, there is never a compatibility
    issue because the `rman` client is always the same version as the target database.


    # 2. Specifying the Backup User


    As discussed previously, RMAN requires that you use a database user with `SYSDBA`
    privileges. Whether I’m running RMAN from the command line or invoking RMAN in
    a script, in most scenarios, I connect directly as `SYS` to the target database.
    For example, here is how I connect to RMAN from the command line:


    ```bash

    $ rman target /

    ```


    Some DBAs don’t use this approach; they opt to set up a user separate from `SYS`
    and cite security concerns as a rationale for doing this.


    I prefer to use the `SYS` account directly, because when connecting to RMAN locally
    on the server, there is no need to specify a username and password. This means
    that you never have to hard-code usernames and passwords into any backup scripts
    or specify a username and password on the command line that can be viewed by rogue
    developers or managers looking over your shoulder.


    # 3. Using Online or Offline Backups


    Most production databases have 24-7 availability requirements. Therefore, your
    only option is online RMAN backups. Your database must be in archivelog mode for
    online backups. You need to consider carefully to place archive redo logs, how
    to format them, how often to back them up, and how long to retain them before
    deletion. These topics are discussed in subsequent sections.


    ![Image](images/sq.jpg) **Note** If you make offline backups, you must shut down
    your database with `IMMEDIATE`, `NORMAL`, or `TRANSACTIONAL` and then place it
    in mount mode. RMAN needs the database in mount mode so that it can read from
    and write to the control file.


    # 4. Setting the Archive Redo Log Destination and File Format


    Enabling archive redo log mode is a prerequisite for making online backups (see
    [Chapter 2](#9781484207642_Ch02.xhtml) for a full discussion of architectural
    decisions regarding the archive redo log destination and format and how to enable/disable
    archivelog mode).


    When archivelog mode is enabled, Oracle writes the archive redo logs to one or
    more of the following locations (you can configure archive redo logs to be written
    to the FRA as well as to several other locations that you manually set via initialization
    parameters):


    *   Default location

    *   FRA

    *   Location specified via the `LOG_ARCHIVE_DEST_N` initialization parameter(s)


    If you don’t use an FRA, and if you don’t explicitly set the archive redo log
    destination via a `LOG_ARCHIVE_DEST_N` initialization parameter, then by default
    the archive redo logs are written to an OS-dependent location. On many Linux/Unix
    boxes the default location is the `ORACLE_HOME/dbs` directory. The default file
    name format for archive redo logs is `%t_%s_%r.dbf`.


    If you enable an FRA (and don’t set `LOG_ARCHIVE_DEST_N`), then, by default, the
    archive redo logs are written to a directory in the FRA. The default file name
    format of the of archive redo log files created in the FRA is an OMF format. The
    files are stored in a subdirectory given the same name as the database’s unique
    name; for example,


    ```text

    /<fra>/<dbuname>/archivelog/<YYYY_MM_DD>/o1_mf_1_1078_68dx5dyj_.arc

    ```


    Oracle recommends using an FRA. I prefer not to use an FRA because I don’t like
    to be surprised with a hung database when there are issues with the FRA’s filling
    up and not being purged of old files quickly enough. Instead, I use the `LOG_ARCHIVE_DEST_N`
    parameter to set the location of the archive redo log files. Here is an example:


    ```sql

    log_archive_dest_1=''LOCATION=/oraarch1/CHNPRD''

    ```


    I also prefer to use this format for the default archivelog file name:


    ```sql

    log_archive_format=''%t_%s_%r.arc''

    ```


    ![Image](images/sq.jpg) **Tip** Sometimes, DBAs use `.dbf` as an extension for
    both data files and archive redo log files. I prefer to use `.arc` for the archive
    redo log files. The `.arc` extension avoids the potentially confusing task of
    identifying a file as an archive redo log file or a live database data file.


    # 5. Configuring the RMAN Backup Location and File Format


    When you run a `BACKUP` command for disk-based backups, RMAN creates backup pieces
    in one of the following locations:


    *   Default location

    *   FRA

    *   Location specified via the `BACKUP...FORMAT` command

    *   Location specified via the `CONFIGURE CHANNEL...FORMAT` command


    Of these choices, I lean toward the last of them; I prefer specifying a target
    location via a backup channel.


    ## Default Location


    If you don’t configure any RMAN variables and don’t set up an FRA, by default
    RMAN allocates one disk-based channel and writes the backup files to a default
    location. For example, you can run the following command without configuring any
    RMAN parameters:


    ```sql

    RMAN> backup database;

    ```


    The default location varies by OS. In many Linux/Unix environments the default
    location is `ORACLE_HOME/dbs`. The default format of the name of the backup files
    created is an OMF format; for example,


    ```text

    <ORACLE_HOME>/dbs/01ln9g7e_1_1

    ```


    ![Image](images/sq.jpg) **Tip** The default location is okay for small development
    databases. However, for most other environments (especially production), you’ll
    need to plan ahead for how much disk space you’ll need for backups and explicitly
    set the location for the backups via one of the other methods (such as implementing
    an FRA or `CONFIGURE CHANNEL`).


    ## FRA


    When backing up to disk, if you don’t explicitly instruct RMAN to write the backups
    to a specific location (via the `FORMAT` or `CONFIGURE` command), and you’re using
    an FRA, RMAN automatically writes the backup files to directories in the FRA.
    The files are stored in a subdirectory with the same name as the database’s unique
    name. Also, the default format of the name of the backup files created in the
    FRA is an OMF format; for example,


    ```text

    /<fra>/<dbuname>/backupset/<YYYY_MM_DD>/o1_mf_nnndf_TAG20100907T025402_68czfbdf_.bkp

    ```


    I don’t usually use an FRA for the placement of RMAN backups. In many of the environments
    I work in, there isn’t enough disk space on a single mount point to accommodate
    the entirety of the database backups. In such situations, you need to allocate
    two or more channels that point to different mount points. Using an FRA in these
    environments is somewhat unwieldy.


    Also, for performance reasons, you may want to instruct RMAN to write to multiple
    disk locations. If you can ensure that different mount points are based on different
    physical disks and are written to by separate controllers, you can reduce I/O
    contention by allocating multiple channels pointing to separate mount points.'
