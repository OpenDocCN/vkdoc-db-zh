  trans: "\n# 管理在线重做日志\n\n此数据库当前仅关联了一个控制文件。您绝不应只用一个控制文件来运行生产数据库。有关如何向数据库添加更多控制文件的详细信息，请参阅本章前面的“添加控制文件”部分。\n\
    \n3.  停止并启动数据库：\n\n```sql\nSQL> shutdown immediate;\nSQL> startup;\n```\n\n##\
    \ 在线重做日志的用途\n\n在线重做日志存储了数据库中发生事务的记录。这些日志具有以下用途：\n\n*   提供一种记录数据库更改的机制，以便在发生介质故障时，您有一种恢复事务的方法。\n\
    *   确保在发生实例完全故障时，即使已提交的数据更改尚未写入数据文件，已提交的事务也可以被恢复（崩溃恢复）。\n*   允许管理员通过 Oracle LogMiner\
    \ 实用程序检查历史数据库事务。\n*   它们被 Oracle 工具（如 GoldenGate 或 Streams）读取以复制数据。\n\n您的数据库中必须至少有两个在线重做日志组。每个在线重做日志组必须至少包含一个在线重做日志成员。成员是磁盘上存在的物理文件。您可以在每个重做日志组中创建多个成员，这称为对在线重做日志组进行**多路复用**。\n\
    \n![Image](img/sq.jpg) **提示** 我强烈建议您对在线重做日志组进行多路复用，如果可能，让每个成员位于由独立控制器管理的独立物理设备上。\n\
    \n## 日志写入器进程\n\n日志写入器是一个后台进程，负责将事务信息从重做日志缓冲区（在 SGA 中）写入在线重做日志文件（在磁盘上）。在以下任一情况发生时，日志写入器会刷新重做日志缓冲区的内容：\n\
    \n*   发出 `COMMIT` 或 `ROLLBACK`。\n*   发生日志切换。\n*   三秒钟过去。\n*   重做日志缓冲区已满三分之一。\n\
    *   重做日志缓冲区填满到一兆字节。\n\n## 当前在线重做日志组与日志切换\n\n日志写入器正在主动写入的在线重做日志组是 `当前在线重做日志组`。日志写入器同时写入重做日志组的所有成员。日志写入器只需成功写入一个成员，数据库即可继续运行。如果日志写入器无法成功写入当前组中的至少一个成员，数据库将停止运行。\n\
    \n当当前在线重做日志组填满时，会发生日志切换，日志写入器开始写入下一个在线重做日志组。日志写入器以轮询方式写入在线重做日志组。因为在线重做日志组的数量是有限的，最终每个在线重做日志组的内容将被覆盖。如果您想保存事务信息的历史记录，必须将数据库置于归档日志模式（请参阅本章后面的“实现归档日志模式”部分）。\n\
    \n当数据库处于归档日志模式时，每次日志切换后，归档器后台进程会将在线重做日志文件的内容复制到归档重做日志文件。在发生故障时，归档重做日志文件允许您还原自上次数据库备份以来发生的所有事务的完整历史记录。\n\
    \n图 2-1 展示了一个典型的在线重做日志文件设置。此图显示了三个在线重做日志组，每组包含两个成员。数据库处于归档日志模式。图中，第 2 组已因事务填满，发生了日志切换，日志写入器现在正在写入第\
    \ 3 组。归档器进程正在将第 2 组的内容复制到归档重做日志文件。当第 3 组填满时，将再次发生日志切换，日志写入器将开始写入第 1 组。同时，归档器进程会将第\
    \ 3 组的内容复制到归档日志序列 3（依此类推）。\n\n![9781484207642_Fig02-01.jpg](img/9781484207642_Fig02-01.jpg)\n\
    \n**图 2-1.** 在线重做日志配置\n\n在线重做日志文件不用于备份。这些文件仅包含数据库生成的最新重做事务信息。当您启用归档时，归档重做日志文件是保护数据库事务历史的机制。\n\
    \n![Image](img/sq.jpg) **注意** 在 Oracle 真应用集群（RAC）数据库中，每个实例都有自己的一组在线重做日志。这被称为一个重做\
    \ `线程`。每个 RAC 实例写入自己的在线重做日志，并生成自己线程的归档重做日志文件。此外，每个实例必须能够读取任何其他实例的在线重做日志。这一点很重要，因为如果一个实例崩溃，其他幸存的实例可以通过读取崩溃实例的在线重做日志来启动实例恢复。\n\
    \n## 保护在线重做日志文件\n\n当前在线重做日志文件的内容在发生日志切换之前不会被归档。这意味着如果您丢失了当前在线重做日志文件的所有成员，您将丢失事务。下面列出了几种您可以实施的机制，以最大限度地降低在线重做日志文件故障的可能性：\n\
    \n*   对组进行多路复用。\n*   如果可能，切勿让同一组的两个成员共享同一个控制器。\n*   如果可能，切勿将同一组的两个成员放在同一个物理磁盘上。\n\
    *   确保操作系统文件权限设置得当（限制性，只有 Oracle 二进制文件的所有者具有读写权限）。\n*   使用冗余的物理存储设备（例如，RAID [廉价磁盘冗余阵列]）。\n\
    *   合理设置日志文件大小，以便它们定期切换和归档。\n*   考虑设置 `ARCHIVE_LAG_TARGET` 初始化参数，以确保在线重做日志定期切换。\n\
    \n![Image](img/sq.jpg) **注意** Oracle 提供的唯一能在您丢失当前在线重做日志组所有成员时保护您并保留所有已提交事务的工具是\
    \ Oracle Data Guard，需以最大保护模式实施。有关 Oracle Data Guard 保护模式的更多详细信息，请参阅 MOS 说明 239100.1。\n\
    \n## 在线重做日志与备份\n\n在线重做日志文件绝不会被 RMAN 备份或用户管理的热备份所备份。如果您确实备份了在线重做日志文件，那么还原它们也是没有意义的。在线重做日志文件包含数据库生成的最新重做信息。您不会希望用备份中包含旧重做信息的文件来覆盖它们。对于处于归档日志模式的数据库，其中的在线重做日志文件包含执行完全恢复所需的最新生成的事务。\n\
    \n## 显示在线重做日志信息\n\n使用 `V$LOG` 和 `V$LOGFILE` 视图显示有关在线重做日志组及相应成员的信息：\n\n```sql\n\
    COL group#     FORM 99999\nCOL thread#    FORM 99999\nCOL grp_status FORM a10\n\
    COL member     FORM a30\nCOL mem_status FORM a10\nCOL mbytes     FORM 999999\n\
    --\nSELECT\n a.group#\n,a.thread#\n,a.status grp_status\n,b.member member\n,b.status\
    \ mem_status\n,a.bytes/1024/1024 mbytes\nFROM v$log     a,\n     v$logfile b\n\
    WHERE a.group# = b.group#\nORDER BY a.group#, b.member;\n\nGROUP# THREAD# GRP_STATUS\
    \ MEMBER                         MEM_STATUS  MBYTES\n------ ------- ----------\
    \ ------------------------------ ---------- -------\n     1       1 CURRENT  \
    \  /u01/oraredo/O12C/redo01a.rdo            50\n     1       1 CURRENT    /u02/oraredo/O12C/redo01b.rdo\
    \            50\n     2       1 INACTIVE   /u01/oraredo/O12C/redo02a.rdo     \
    \       50\n     2       1 INACTIVE   /u02/oraredo/O12C/redo02b.rdo          \
    \  50\n     3       1 INACTIVE   /u01/oraredo/O12C/redo03a.rdo            50\n\
    \     3       1 INACTIVE   /u02/oraredo/O12C/redo03b.rdo            50\n```\n"
- fmt: "# Oracle 在线重做日志诊断与优化\n\n当你正在诊断在线重做日志问题时，`V$LOG` 和 `V$LOGFILE` 视图特别有用。在数据库处于已挂载或打开状态时，你都可以查询这些视图。\n\
    \n## 确定在线重做日志组的最佳大小\n\n尝试将在线重做日志的大小调整为每小时切换 2 到 6 次。`V$LOG_HISTORY` 视图包含在线重做日志切换频率的历史记录。执行以下查询可以查看每小时的日志切换次数：\n\
    \n```\nselect count(*)\n,to_char(first_time,'YYYY:MM:DD:HH24')\nfrom v$log_history\n\
    group by to_char(first_time,'YYYY:MM:DD:HH24')\norder by 2;\n\nCOUNT(*) TO_CHAR(FIRST\n\
    ---------- -------------\n         2 2014:09:24:04\n        80 2014:09:24:05\n\
    \        44 2014:09:24:06\n        10 2014:09:24:12\n```\n\n从上面的输出可以看到，大约在凌晨 4:00\
    \ 到 6:00 发生了大量的日志切换活动。这可能是由于夜间批处理作业或不同时区的用户更新数据所致。对于这个数据库，应增加在线重做日志的大小。你应该尝试调整在线重做日志的大小，以适应数据库的峰值事务负载。\n\
    \n`V$LOG_HISTORY` 视图的数据来源于控制文件。每次发生日志切换时，该视图中会记录一条详细信息，如切换时间和系统变更号 (SCN)。如前所述，一个经验法则是，你应该将在线重做日志文件的大小调整为大约每小时切换\
    \ 2 到 6 次。你不希望它们切换得太频繁，因为日志切换本身有开销。Oracle 会将检查点作为日志切换的一部分来启动。在检查点期间，数据库写入器后台进程将已修改（也称为脏）的数据块写入磁盘，这是资源密集型的操作。\n\
    \n另一方面，你也不希望在线重做日志文件从不切换，因为当前的在线重做日志包含在恢复事件中你可能需要的事务。如果灾难导致当前在线重做日志发生介质故障，你可能会丢失那些尚未归档的事务。\n\
    \n`![Image](images/sq.jpg)` `Tip` 使用 `ARCHIVE_LAG_TARGET` 初始化参数来设置日志切换之间的最大时间（以秒为单位）。此参数的典型设置是\
    \ 1800 秒（30 分钟）。值为 0（默认值）会禁用此功能。此参数通常用于 Oracle Data Guard 环境中，以在指定的时间过后强制进行日志切换。\n\
    \n你也可以查询 `V$INSTANCE_RECOVERY` 视图中的 `OPTIMAL_LOGFILE_SIZE` 列，以确定你的在线重做日志文件大小是否设置正确：\n\
    \n```\nSQL> select optimal_logfile_size from v$instance_recovery;\n```\n\n此列报告了被认为是“最优”的重做日志文件大小（以兆字节为单位），该大小是基于初始化参数\
    \ `FAST_START_MTTR_TARGET` 的设置。Oracle 建议你将所有在线重做日志配置为至少达到 `OPTIMAL_LOGFILE_SIZE`\
    \ 的值。然而，在调整在线重做日志大小时，你必须考虑你的环境信息（例如切换频率）。\n\n## 确定重做日志组的最佳数量\n\nOracle 至少需要两个重做日志组才能运行。但是，只有两个组有时是不够的。要理解原因，请记住每次日志切换发生时，都会启动一个检查点。作为检查点的一部分，数据库写入器会将所有已修改（脏）的数据块从\
    \ SGA 写入磁盘上的数据文件。同时回想一下，在线重做日志是按轮询方式写入的，最终给定日志中的信息会被覆盖。在日志写入器可以开始覆盖在线重做日志中的信息之前，必须先将\
    \ SGA 中与该重做日志关联的所有已修改块写入数据文件。如果并非所有已修改块都已写入数据文件，你会在 `alert.log` 文件中看到此消息：\n\n\
    ```\nThread 1 cannot allocate new log, sequence <sequence number>\nCheckpoint\
    \ not complete\n```\n\n解释此问题的另一种方式是，Oracle 需要在在线重做日志中存储任何可能用于执行崩溃恢复的信息。为了帮助你可视化这一点，请参见\
    \ [图 2-2](#9781484207642_Ch02.xhtml#Fig2)。\n\n![9781484207642_Fig02-02.jpg](images/9781484207642_Fig02-02.jpg)\n\
    \n[图 2-2](#9781484207642_Ch02.xhtml#_Fig2). 在修改的（脏）缓冲区写入磁盘之前，重做受保护。\n\n在时间 1，块\
    \ A 从数据文件 AA 读入缓冲区高速缓存并被修改。在时间 2，重做更改向量信息（块如何更改）被写入日志缓冲区。在时间 3，日志写入器进程将块 A 的更改向量信息写入在线重做日志\
    \ 1。在时间 4，发生日志切换，在线重做日志 2 成为当前的在线重做日志。\n\n现在，假设在线重做日志 2 很快填满并发生另一次日志切换，此时日志写入器尝试写入在线重做日志\
    \ 1。在数据库块写入器将块 A 写入数据文件 AA 之前，日志写入器不被允许覆盖在线重做日志 1 中的信息。在块 A 被写入数据文件 AA 之前，如果发生电源故障或\
    \ `shutdown abort`，Oracle 需要在线重做日志中的信息来恢复此块。在覆盖在线重做日志中的信息之前，Oracle 会确保受重做保护的数据块已写入磁盘。如果这些修改的块尚未写入磁盘，Oracle\
    \ 会暂时挂起处理，直到写入完成。有几种方法可以解决此问题：\n\n*   添加更多的重做日志组。\n*   降低 `FAST_START_MTTR_TARGET`\
    \ 的值。这样做会使数据库写入器进程在更短的时间内将较旧的修改块写入磁盘。\n*   调优数据库写入器进程（修改 `DB_WRITER_PROCESSES`）。\n\
    \n如果你注意到 `Checkpoint not complete` 消息经常出现（比如一天多次），我建议你添加一个或多个日志组来解决此问题。添加一个额外的重做日志为数据库写入器提供了更多时间，在关联的重做信息被覆盖之前，将数据库缓冲区高速缓存中的修改块写入数据文件。添加更多的重做日志组几乎没有缺点。主要的问题是，你可能会遇到创建数据库时使用的\
    \ `MAXLOGFILES` 值的限制。如果你需要添加更多的组并且已经超出了 `MAXLOGFILES` 的值，那么你必须重新创建控制文件并为此参数指定一个更高的值。\n\
    \n如果添加更多的重做日志组不能解决问题，你应该仔细考虑降低 `FAST_START_MTTR_TARGET` 的值。当你降低此值时，可能会看到更多的 I/O，因为数据库写入器进程更积极地将修改块写入数据文件。理想情况下，最好在生产环境进行更改之前，在测试环境中验证修改\
    \ `FAST_START_MTTR_TARGET` 的影响。你可以在实例运行时修改此参数；这意味着如果出现不可预见的副作用，你可以快速将其修改回原始设置。\n\
    \n最后，考虑增加 `DB_WRITER_PROCESSES` 参数的值。在生产环境应用此更改之前，请仔细分析在测试环境中修改此参数的影响。此值的修改需要停止并启动数据库；因此，如果产生不利影响，则需要停机才能将此值更改回原始设置。\n\
    \n## 添加在线重做日志组\n\n如果你确定需要添加在线重做日志组，请使用 `ADD LOGFILE GROUP` 语句。在此示例中，数据库已包含两个大小各为\
    \ 50M 的在线重做日志组。添加了一个额外的日志组，该组有两个成员，大小为 50MB：\n\n```\nalter database add logfile\
    \ group 3\n('/u01/oraredo/O12C/redo03a.rdo',\n '/u02/oraredo/O12C/redo03b.rdo')\
    \ SIZE 50M;\n```"
  raw: 'When you’re diagnosing online redo log issues, the `V$LOG` and `V$LOGFILE`
    views are particularly helpful. You can query these views while the database is
    mounted or open.


    Determining the Optimal Size of Online Redo Log Groups


    Try to size the online redo logs so that they switch anywhere from two to six
    times per hour. The `V$LOG_HISTORY` contains a history of how frequently the online
    redo logs have switched. Execute this query to view the number of log switches
    per hour:


    ```

    select count(*)

    ,to_char(first_time,''YYYY:MM:DD:HH24'')

    from v$log_history

    group by to_char(first_time,''YYYY:MM:DD:HH24'')

    order by 2;


    COUNT(*) TO_CHAR(FIRST

    ---------- -------------

             2 2014:09:24:04

            80 2014:09:24:05

            44 2014:09:24:06

            10 2014:09:24:12

    ```


    From the previous output, you can see that a great deal of log switch activity
    occurred from approximately 4:00 `am` to 6:00 `am` This could be due to a nightly
    batch job or users’ in different time zones updating data. For this database the
    size of the online redo logs should be increased. You should try to size the online
    redo logs to accommodate peak transaction loads on the database.


    The `V$LOG_HISTORY` derives its data from the control file. Each time there is
    a log switch, an entry is recorded in this view that details information such
    as the time of the switch and the system change number (SCN). As stated, a general
    rule of thumb is that you should size your online redo log files so that they
    switch approximately two to six times per hour. You don’t want them switching
    too often because there is overhead with the log switch. Oracle initiates a checkpoint
    as part of a log switch. During a checkpoint the database writer background process
    writes modified (also called dirty) blocks to disk, which is resource intensive.


    Then again, you don’t want online redo log files never to switch, because the
    current online redo log contains transactions that you may need in the event of
    a recovery. If a disaster causes a media failure in your current online redo log,
    you can lose those transactions that haven’t been archived.


    ![Image](images/sq.jpg) **Tip**  Use the `ARCHIVE_LAG_TARGET` initialization parameter
    to set a maximum amount of time (in seconds) between log switches. A typical setting
    for this parameter is 1,800 seconds (30 minutes). A value of 0 (default) disables
    this feature. This parameter is commonly used in Oracle Data Guard environments
    to force log switches after the specified amount of time elapses.


    You can also query the `OPTIMAL_LOGFILE_SIZE` column from the `V$INSTANCE_RECOVERY`
    view to determine if your online redo log files have been sized correctly:


    ```

    SQL> select optimal_logfile_size from v$instance_recovery;

    ```


    This column reports the redo log file size (in megabytes) that is considered optimal,
    based on the initialization parameter setting of `FAST_START_MTTR_TARGET`. Oracle
    recommends that you configure all online redo logs to be at least the value of
    `OPTIMAL_LOGFILE_SIZE`. However, when sizing your online redo logs, you must take
    into consideration information about your environment (such as the frequency of
    the switches).


    Determining the Optimal Number of Redo Log Groups


    Oracle requires at least two redo log groups in order to function. But, having
    just two groups sometimes isn’t enough. To understand why this is so, remember
    that every time a log switch occurs, it initiates a checkpoint. As part of a checkpoint
    the database writer writes all modified (dirty) blocks from the SGA to the data
    files on disk. Also recall that the online redo logs are written to in a round-robin
    fashion and that eventually the information in a given log is overwritten. Before
    the log writer can begin to overwrite information in an online redo log, all modified
    blocks in the SGA associated with the redo log must first be written to a data
    file. If not all modified blocks have been written to the data files, you see
    this message in the `alert.log` file:


    ```

    Thread 1 cannot allocate new log, sequence <sequence number>

    Checkpoint not complete

    ```


    Another way to explain this issue is that Oracle needs to store in the online
    redo logs any information that would be required to perform a crash recovery.
    To help you visualize this, see [Figure 2-2](#9781484207642_Ch02.xhtml#Fig2).


    ![9781484207642_Fig02-02.jpg](images/9781484207642_Fig02-02.jpg)


    [Figure 2-2](#9781484207642_Ch02.xhtml#_Fig2). Redo protected until the modified
    (dirty) buffer is written to disk


    At time 1, Block A is read from Data File AA into the buffer cache and modified.
    At time 2 the redo-change vector information (how the block changed) is written
    to the log buffer. At time 3 the log-writer process writes the Block A change-vector
    information to online redo log 1\. At time 4 a log switch occurs, and online redo
    log 2 becomes the current online redo log.


    Now, suppose that online redo log 2 fills up quickly and another log switch occurs,
    at which point the log writer attempts to write to online redo log 1\. The log
    writer isn’t allowed to overwrite information in online redo log 1 until the database
    block writer writes Block A to Data File AA. Until Block A is written to Data
    File AA, Oracle needs information in the online redo logs to recover this block
    in the event of a power failure or shutdown abort. Before Oracle overwrites information
    in the online redo logs, it ensures that blocks protected by redo have been written
    to disk. If these modified blocks haven’t been written to disk, Oracle temporarily
    suspends processing until this occurs. There are a few ways to resolve this issue:


    *   Add more redo log groups.

    *   Lower the value of `FAST_START_MTTR_TARGET`. Doing so causes the database
    writer process to write older modified blocks to disk in a shorter time frame.

    *   Tune the database-writer process (modify `DB_WRITER_PROCESSES`).


    If you notice that the `Checkpoint not complete` message is occurring often (say,
    several times a day), I recommend that you add one or more log groups to resolve
    the issue. Adding an extra redo log gives the database writer more time to write
    modified blocks in the database buffer cache to the data files before the associated
    redo with a block is overwritten. There is little downside to adding more redo
    log groups. The main concern is that you could bump up against the `MAXLOGFILES`
    value that was used when you created the database. If you need to add more groups
    and have exceeded the value of `MAXLOGFILES`, then you must re-create your control
    file and specify a high value for this parameter.


    If adding more redo log groups doesn’t resolve the issue, you should carefully
    consider lowering the value of `FAST_START_MTTR_TARGET`. When you lower this value,
    you can potentially see more I/O because the database writer process is more actively
    writing modified blocks to data files. Ideally, it would be nice to verify the
    impact of modifying `FAST_START_MTTR_TARGET` in a test environment before making
    the change in production. You can modify this parameter while your instance is
    up; this means you can quickly modify it back to its original setting if there
    are unforeseen side effects.


    Finally, consider increasing the value of the `DB_WRITER_PROCESSES` parameter.
    Carefully analyze the impact of modifying this parameter in a test environment
    before you apply it to production. This value requires that you stop and start
    your database; therefore, if there are adverse effects, downtime is required to
    change this value back to the original setting.


    Adding Online Redo Log Groups


    If you determine that you need to add an online redo log group, use the `ADD LOGFILE
    GROUP` statement. In this example the database already contains two online redo
    log groups that are sized at 50M each. An additional log group is added that has
    two members and is sized at 50MB:


    ```

    alter database add logfile group 3

    (''/u01/oraredo/O12C/redo03a.rdo'',

     ''/u02/oraredo/O12C/redo03b.rdo'') SIZE 50M;

    ```'
