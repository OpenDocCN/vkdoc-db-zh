- fmt: 'To exit RMAN, enter the `exit` command as follows:


    ```

    RMAN> exit

    ```


    ![Image](images/sq.jpg) **Tip** On Linux systems, when typing in the `rman` command
    from the OS prompt, if you get an error, such as “rman: can’t open target,” make
    sure your `PATH` variable includes `ORACLE_HOME/bin` directory before the `/usr/X11R6/bin`
    directory.


    ## NOT CALLING RMAN FROM SQL*PLUS


    I teach Oracle B&R classes at a local institute of higher learning. Nearly every
    term, one of the students asks why the following RMAN command doesn’t work:


    ```

    SQL> rman

    SP2-0042: unknown command "rman" - rest of line ignored.

    ```


    The answer is short: the `rman` client is an OS utility, not an SQL*Plus function.
    You must invoke the `rman` client from the OS prompt.


    Notice that when connecting to RMAN, you do not have to specify the `sys*` clause
    (like you do when connecting as a `SYSDBA` privileged user via SQL*Plus). This
    is because RMAN always requires that you connect as a user with `sys*` privileges.
    Therefore, you must connect to RMAN with either a user who is OS authenticated
    or a username/password with `sys*` privileges granted to it (and therefore exists
    in the password file). This is unlike SQL*Plus, where you have the option of connecting
    as a non-privileged user. In SQL*Plus, if you want to connect as a user with `sys*`
    privileges, you are required to specify a `sys*` clause when connecting.


    If you attempt to connect to RMAN without the proper privileges, you’ll receive
    this error:


    ```

    ORA-01031: insufficient privileges

    ```


    A useful way to troubleshoot the root cause of an `ORA-01031` error is to attempt
    to log in to SQL*Plus with the same authentication information as when trying
    to connect through RMAN. This will help verify either that you are using an OS-authenticated
    account or that the username and password are correct. If OS authentication is
    working, you should be able to log in to SQL*Plus as follows:


    ```

    $ sqlplus / as sysdba

    ```


    If you’re using a password file, you can verify that the username and password
    are correct (and that the user has `sysdba` privileges) by logging in as shown
    here:


    ```

    $ sqlplus <username>/<password> as sysdba

    ```


    If you receive an `ORA-01031` error from attempting to log in to SQL*Plus, then
    either you aren’t using an OS-authenticated account or your username and password
    combination does not match what is stored in the password file (for users attempting
    to connect with `sys*` privileges).


    Once connected to RMAN, you can issue administrative commands, such as `startup`,
    `shutdown`, `backup`, `restore`, and `recover`. For example, if you want to start
    and stop your database, you can do so from within RMAN as follows:


    ```

    $ rman target /

    RMAN> startup;

    RMAN> shutdown immediate;

    ```


    This saves you the inconvenience of having to jump back and forth between SQL*Plus
    and RMAN (when issuing administrative commands).


    ## RUNNING SQL COMMANDS FROM WITHIN RMAN


    Starting with Oracle 12c, you can run many SQL commands directly from the RMAN
    command line. In prior versions of Oracle, when running certain SQL commands from
    within RMAN, you had to specify the `sql` clause. For example, say you wanted
    to run the `alter system switch logfile` command. Prior to Oracle 12c, you would
    have to specify that command as shown:


    ```

    RMAN> sql ''alter system switch logfile'';

    ```


    In Oracle 12c, you can now run the SQL directly:


    ```

    RMAN> alter system switch logfile;

    ```


    This is a nice ease-of-use enhancement because it eliminates the need for additional
    clauses and quotes around the command.


    ## RMAN Architectural Decisions


    If archiving is enabled for your database (see [Chapter 2](#9781484207642_Ch02.xhtml)
    for details on archiving), you can use RMAN out of the box to run commands such
    as this to back up your entire target database:


    ```

    $ rman target /

    RMAN> backup database;

    ```


    If you experience a media failure, you can restore all data files, as follows:


    ```

    RMAN> shutdown immediate;

    RMAN> startup mount;

    RMAN> restore database;

    ```


    After your database is restored, you can fully recover it:


    ```

    RMAN> recover database;

    RMAN> alter database open;

    ```


    You’re good to go, right? No, not quite. RMAN’s default attributes are reasonably
    set for simple backup requirements. The RMAN out-of-the-box settings may be appropriate
    for small development or test databases. But, for any type of business critical
    database, you need to consider carefully where the backups are stored, how long
    to store backups on disk or tape, which RMAN features are appropriate for the
    database, and so on. The following sections in this chapter walk you through many
    of the B&R architectural decisions necessary to implementing RMAN in a production
    environment. RMAN has a vast and robust variety of options for customizing B&R;
    and, typically, you don’t need to implement many of RMAN’s features. However,
    each time you implement RMAN to back up a production database, you should think
    through each decision point and decide whether you require an attribute.


    [Table 4-1](#9781484207642_Ch04.xhtml#Tab1) summarizes the RMAN implementation
    decisions and recommendations. Each of the decision points in the table is elaborated
    on in subsequent sections. Many DBAs will have differing opinions concerning some
    of these recommendations; that’s fine. The point is that you need to consider
    each architectural aspect and determine what makes sense for your business requirements.


    [Table 4-1](#9781484207642_Ch04.xhtml#_Tab1). Overview of Architectural Decisions
    and Recommendations'
  raw: 'To exit RMAN, enter the `exit` command as follows:


    ```

    RMAN> exit

    ```


    ![Image](images/sq.jpg) **Tip**  On Linux systems, when typing in the `rman` command
    from the OS prompt, if you get an error, such as “rman: can’t open target,” make
    sure your PATH variable includes ORACLE_HOME/bin directory before the /usr/X11R6/bin
    directory.


    (NOT) CALLING RMAN FROM SQL*PLUS


    I teach Oracle B&R classes at a local institute of higher learning. Nearly every
    term, one of the students asks why the following RMAN command doesn’t work:


    `SQL> rman`

    `SP2-0042: unknown command "rman" - rest of line ignored.`


    The answer is short: the `rman` client is an OS utility, not an SQL*Plus function.
    You must invoke the `rman` client from the OS prompt.


    Notice that when connecting to RMAN, you do not have to specify the `sys*` clause
    (like you do when connecting as a `SYSDBA` privileged user via SQL*Plus). This
    is because RMAN always requires that you connect as a user with `sys*` privileges.
    Therefore, you must connect to RMAN with either a user who is OS authenticated
    or a username/password with `sys*` privileges granted to it (and therefore exists
    in the password file). This is unlike SQL*Plus, where you have the option of connecting
    as a non-privileged user. In SQL*Plus, if you want to connect as a user with `sys*`
    privileges, you are required to specify a `sys*` clause when connecting.


    If you attempt to connect to RMAN without the proper privileges, you’ll receive
    this error:


    ```

    ORA-01031: insufficient privileges

    ```


    A useful way to troubleshoot the root cause of an `ORA-01031` error is to attempt
    to log in to SQL*Plus with the same authentication information as when trying
    to connect through RMAN. This will help verify either that you are using an OS-authenticated
    account or that the username and password are correct. If OS authentication is
    working, you should be able to log in to SQL*Plus as follows:


    ```

    $ sqlplus / as sysdba

    ```


    If you’re using a password file, you can verify that the username and password
    are correct (and that the user has `sysdba` privileges) by logging in as shown
    here:


    ```

    $ sqlplus <username>/<password> as sysdba

    ```


    If you receive an `ORA-01031` error from attempting to log in to SQL*Plus, then
    either you aren’t using an OS-authenticated account or your username and password
    combination does not match what is stored in the password file (for users attempting
    to connect with `sys*` privileges).


    Once connected to RMAN, you can issue administrative commands, such as startup,
    shutdown, backup, restore, and recover. For example, if you want to start and
    stop your database, you can do so from within RMAN as follows:


    ```

    $ rman target /

    RMAN> startup;

    RMAN> shutdown immediate;

    ```


    This saves you the inconvenience of having to jump back and forth between SQL*Plus
    and RMAN (when issuing administrative commands).


    RUNNING SQL COMMANDS FROM WITHIN RMAN


    Starting with Oracle 12c, you can run many SQL commands directly from the RMAN
    command line. In prior versions of Oracle, when running certain SQL commands from
    within RMAN, you had to specify the `sql` clause. For example, say you wanted
    to run the `alter system switch logfile` command. Prior to Oracle 12c, you would
    have to specify that command as shown:


    `RMAN> sql ''alter system switch logfile'';`


    In Oracle 12c, you can now run the SQL directly:


    `RMAN> alter system switch logfile;`


    This is a nice ease-of-use enhancement because it eliminates the need for additional
    clauses and quotes around the command.


    RMAN Architectural Decisions


    If archiving is enabled for your database (see [Chapter 2](#9781484207642_Ch02.xhtml)
    for details on archiving), you can use RMAN out of the box to run commands such
    as this to back up your entire target database:


    ```

    $ rman target /

    RMAN> backup database;

    ```


    If you experience a media failure, you can restore all data files, as follows:


    ```

    RMAN> shutdown immediate;

    RMAN> startup mount;

    RMAN> restore database;

    ```


    After your database is restored, you can fully recover it:


    ```

    RMAN> recover database;

    RMAN> alter database open;

    ```


    You’re good to go, right? No, not quite. RMAN’s default attributes are reasonably
    set for simple backup requirements. The RMAN out-of-the-box settings may be appropriate
    for small development or test databases. But, for any type of business critical
