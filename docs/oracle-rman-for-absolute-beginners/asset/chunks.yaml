    *   完整数据库备份\n*   增量 0 级备份\n*   由`BACKUP AS COPY`命令生成的映像副本备份\n\n您不能在数据库联机数据文件的子集上执行不完全数据库恢复。执行不完全恢复时，在使用`ALTER\
