- fmt: '# RMAN Backups and Reporting


    [Chapter 4](#9781484207642_Ch04.xhtml) provided the details on configuring RMAN
    and using specialized features to control the behavior of RMAN. After you consider
    which features you require, you’re ready to create backups. RMAN can back up the
    following types of files:


    *   Data files

    *   Control files

    *   Archived redo log files

    *   `spfile`s

    *   Backup pieces


    For most scenarios, you will use RMAN to back up data files, control files, and
    archive redo log files. If you have the autobackup of the control file feature
    enabled, then RMAN will automatically back up the control file and the `spfile`
    (if you’re using one) when a `BACKUP` or `COPY` command is issued. You can also
    back up the backup piece files that RMAN has created.


    RMAN does not back up Oracle Net files, password files, block change tracking
    files, flashback logs, or the Oracle binary files (files created when you installed
    Oracle). If required, you should put in place OS backups that include those files.


    Also note that RMAN does not back up online redo log files. If you were to back
    up the online redo log files, it would be pointless to restore them. The online
    redo log files contain the latest redo generated by the database. You would not
    want to overwrite them from a backup with old redo information. When your database
    is in archivelog mode, the online redo log files contain the most recently generated
    transactions required to perform complete recovery.


    This chapter details many of the features related to running the RMAN `BACKUP`
    command. Also covered are creating a recovery catalog and techniques for logging
    output and reporting on RMAN backup operations. This chapter begins by discussing
    a few common practices used to enhance what is displayed in the RMAN output when
    running commands.


    ## Preparing to Run RMAN Backup Commands


    Before I run RMAN backups, I usually set a few things so as to enhance what is
    shown in the output. You don’t need to set these variables every time you log
    in and run an RMAN command. However, when troubleshooting or debugging issues,
    it’s almost always a good idea to perform the following tasks:


    *   Set `NLS_DATE_FORMAT` OS variable

    *   Set `ECHO`

    *   Show RMAN variables


    The bulleted items are discussed in the following sections.


    ### Setting NLS_DATE_FORMAT


    Before running any RMAN job, I set the OS variable `NLS_DATE_FORMAT` to include
    a time (hours, minutes, seconds) component; for example,


    ```

    $ export NLS_DATE_FORMAT=''dd-mon-yyyy hh24:mi:ss''

    ```


    Additionally, if I have a shell script that calls RMAN, I put the prior line directly
    in the shell script (see the shell script at the end of [Chapter 4](#9781484207642_Ch04.xhtml)
    for an example):


    ```

    NLS_DATE_FORMAT=''dd-mon-yyyy hh24:mi:ss''

    ```


    This ensures that when RMAN displays a date, it always includes the hours, minutes,
    and seconds as part of the output. By default, RMAN only includes the date component
    (`DD-MON-YY`) in the output. For instance, without setting `NLS_DATE_FORMAT`,
    when starting a backup, here is what RMAN displays:


    ```

    Starting backup at 04-SEP-14

    ```


    When you set the `NLS_DATE_FORMAT` OS variable to include a time component, the
    output will look like this instead:


    ```

    Starting backup at 04-sep-2014 16:43:04

    ```


    When troubleshooting, it’s essential to have a time component so that you can
    determine how long a command took to run or how long a command was running before
    a failure occurred. Oracle Support will almost always ask you to set this variable
    to include the time component before capturing output and sending it to them.


    The only downside to setting the `NLS_DATE_FORMAT` is that if you set it to a
    value unknown to RMAN, connectivity issues can occur. For example, here the `NLS_DATE_FORMAT`
    is set to an invalid value:


    ```

    $ export NLS_DATE_FORMAT=''dd-mon-yyyy hh24:mi:sd''

    $ rman target /

    ```


    When set to an invalid value, you get this error when logging in to RMAN:


    ```

    RMAN-03999: Oracle error occurred while converting a date: ORA-01821:

    ```'
