- fmt: "## Step 3: Start the Database in Mount Mode, and Initiate Database Recovery\n\
    \nNext, start the database in mount mode:\n```sql\nSQL> startup mount;\n```\n\n\
    After the control file(s) and data files have been copied back, you can perform\
    \ a recovery. Oracle knows that the control file was from a backup (because it\
    \ was created with the `ALTER DATABASE BACKUP CONTROLFILE` statement), so the\
    \ recovery must be performed with the `USING BACKUP CONTROLFILE` clause:\n```sql\n\
    SQL> recover database using backup controlfile;\n```\n\nAt this point, you’re\
    \ prompted for the application of archive redo log files:\n```text\nORA-00279:\
    \ change 3584431 generated at 11/02/2012 11:48:46 needed for thread 1\nORA-00289:\
    \ suggestion : /u01/oraarch/O12C/1_8_798283209.dbf\nORA-00280: change 3584431\
    \ for thread 1 is in sequence #8\n\nSpecify log: {<RET>=suggested | filename |\
    \ AUTO | CANCEL}\n```\n\nType `AUTO` to instruct the recovery process to apply\
    \ all archive redo logs automatically:\n```text\nAUTO\n```\n\nThe recovery process\
    \ applies all available archive redo logs. The recovery process has no one way\
    \ of determining where the archive redo stream ends and therefore tries to apply\
    \ an archive redo log that doesn’t exist, resulting in a message such as this:\n\
    ```text\nORA-00308: cannot open archived log '/u01/oraarch/O12C/1_10_798283209.dbf'\n\
    ORA-27037: unable to obtain file status\n```\n\nThe prior message is to be expected.\
    \ Now, attempt to open the database:\n```sql\nSQL> alter database open resetlogs;\n\
    ```\n\nOracle throws the following error in this situation:\n```text\nORA-01113:\
    \ file 1 needs media recovery\nORA-01110: data file 1: '/u01/dbfile/O12C/system01.dbf'\n\
    ```\n\n## Step 4: Apply Redo Contained in the Online Redo Logs\n\nOracle needs\
    \ to apply more redo to synchronize the SCN in the control file with the SCN in\
    \ the data file header. In this scenario the online redo logs are still intact\
    \ and contain the required redo. To apply redo contained in the online redo logs,\
    \ first identify the locations and names of the online redo log files:\n```sql\n\
    select a.sequence#, a.status, a.first_change#, b.member\nfrom v$log a, v$logfile\
    \ b\nwhere a.group# = b.group#\norder by a.sequence#;\n```\n\nHere is the partial\
    \ output for this example:\n```text\nSEQUENCE#  STATUS           FIRST_CHANGE#\
    \ MEMBER\n---------- ---------------- ------------- ------------------------------\n\
    \         6 INACTIVE               3543960 /u01/oraredo/O12C/redo03a.rdo\n   \
    \      6 INACTIVE               3543960 /u02/oraredo/O12C/redo03b.rdo\n      \
    \   7 INACTIVE               3543963 /u02/oraredo/O12C/redo01b.rdo\n         7\
    \ INACTIVE               3543963 /u01/oraredo/O12C/redo01a.rdo\n         8 CURRENT\
    \                3583986 /u02/oraredo/O12C/redo02b.rdo\n         8 CURRENT   \
    \             3583986 /u01/oraredo/O12C/redo02a.rdo\n```\n\nNow, reinitiate the\
    \ recovery process:\n```sql\nSQL> recover database using backup controlfile;\n\
    ```\n\nThe recovery process prompts for an archive redo log that doesn’t exist:\n\
    ```text\nORA-00279: change 3584513 generated at 11/02/2012 11:50:50 needed for\
    \ thread 1\nORA-00289: suggestion : /u01/oraarch/O12C/1_10_798283209.dbf\nORA-00280:\
    \ change 3584513 for thread 1 is in sequence #10\n\nSpecify log: {<RET>=suggested\
    \ | filename | AUTO | CANCEL}\n```\n\nInstead of supplying the recovery process\
    \ with an archive redo log file, type in the name of a current online redo log\
    \ file (you may have to attempt each online redo log until you find the one that\
