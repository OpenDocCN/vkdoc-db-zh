- fmt: '# RMAN 备份概念详解


    ## RMAN 完整备份与增量0级备份


    术语 *RMAN full backup* 有时会引起混淆。更贴切地描述此任务的方式是 *RMAN backing up all modified blocks
    within one or more data files*。术语 *full* 并不意味着备份所有块或所有数据文件。它仅表示正在备份在故障事件中重建数据文件所需的所有块。你可以对单个数据文件进行完整备份，而该备份片的内容可能比数据文件本身小得多。


    术语 *RMAN level 0 incremental backup* 本身也描述得不够准确。增量0级备份所备份的块与完整备份相同。换句话说，以下两条命令备份数据库中的相同块：


    ```

    RMAN> backup as backupset full database;

    RMAN> backup as backupset incremental level=0 database;

    ```


    前述两条命令的唯一区别在于，增量0级备份可以与其他增量备份结合使用，而完整备份不能参与增量备份策略。因此，我几乎总是更喜欢使用 `INCREMENTAL LEVEL=0`
    语法（而不是完整备份）；它让我可以灵活地将0级增量备份与后续的1级增量备份一起使用。


    ## 备份集与映像副本


    RMAN 默认的备份模式指示其仅备份数据文件中已使用的块；这些称为备份集。RMAN 也可以对数据文件进行逐字节的复制；这些称为映像副本。创建备份集是 RMAN
    创建的默认备份类型。以下命令创建数据库的备份集备份：


    ```

    RMAN> backup database;

    ```


    如果愿意，你可以在创建备份时显式指定 `AS BACKUPSET` 命令：


    ```

    RMAN> backup as backupset database;

    ```


    你可以通过使用 `AS COPY` 命令指示 RMAN 创建映像副本。此命令为数据库中的每个数据文件创建映像副本：


    ```

    RMAN> backup as copy database;

    ```


    由于映像副本是数据文件的完全相同的副本，DBA 可以通过操作系统命令直接访问它们。例如，假设你遇到了媒体故障，并且不想使用 RMAN 来还原映像副本。你可以使用操作系统命令将数据文件的映像副本复制到数据库可以使用的位置。相比之下，备份集由二进制文件组成，只有
    RMAN 工具可以写入或读取。


    我在使用 RMAN 时更喜欢使用备份集。备份集往往比数据文件小，并且可以应用真正的二进制压缩。此外，我并不觉得使用 RMAN 作为只能由 RMAN 还原的备份文件的创建机制有什么不便。使用
    RMAN 和备份集既高效又非常可靠。


    ## 备份表空间与数据文件


    RMAN 能够在数据库级别（如前一节所示）、表空间级别，或者更精细地在数据文件级别进行备份。当你备份表空间时，RMAN 会备份你所指定的表空间关联的所有数据文件。例如，以下命令将备份与
    `SYSTEM` 和 `SYSAUX` 表空间关联的所有数据文件：


    ```

    RMAN> backup tablespace system, sysaux;

    ```


    我进行表空间级别备份的一种情况是，如果我最近创建了一个新表空间，并希望仅备份与新增表空间关联的数据文件。请注意，在遇到备份与恢复问题时，使用一个表空间通常更高效（因为备份一个表空间通常比备份整个数据库快得多）。


    你可能偶尔需要备份单个数据文件。例如，在排查备份问题时，尝试成功备份一个数据文件通常很有帮助。你可以按文件名或文件号指定数据文件，如下所示：'
  raw: 'The term *RMAN full backup* sometimes causes confusion. A more apt way of
    phrasing this task would be *RMAN backing up all modified blocks within one or
    more data files*. The term *full* does not mean that all blocks are backed up
    or that all data files are backed up. It simply means that all blocks that would
    be required to rebuild a data file (in the event of a failure) are being backed
    up. You can take a full backup of a single data file, and the contents of that
    backup piece may be quite a bit smaller than the data file itself.


    The term *RMAN level 0 incremental backup* doesn’t exactly describe itself very
    well, either. A level 0 incremental backup is backing up the same blocks as a
    full backup. In other words, the following two commands back up the same blocks
    in a database:


    ```

    RMAN> backup as backupset full database;

    RMAN> backup as backupset incremental level=0 database;

    ```


    The only difference between the prior two commands is that an incremental level
    0 backup can be used in conjunction with other incremental backups, whereas a
    full backup cannot participate in an incremental backup strategy. Therefore, I
    almost always prefer to use the `INCREMENTAL LEVEL=0` syntax (as opposed to a
    full backup); it gives me the flexibility to use the level 0 incremental backup
    along with subsequent incremental level 1 backups.


    Backup Sets vs. Image Copies


    The default backup mode of RMAN instructs it to back up only blocks that have
    been used in a data file; these are known as backup sets. RMAN can also make byte-for-byte
    copies of the data files; these are known as image copies. Creating a backup set
    is the default type of backup that RMAN creates. The next command creates a backup
    set backup of the database:


    ```

    RMAN> backup database;

    ```


    If you prefer, you can explicitly place the `AS BACKUPSET` command when creating
    backups:


    ```

    RMAN> backup as backupset database;

    ```


    You can instruct RMAN to create image copies by using the `AS COPY` command. This
    command creates image copies of every data file in the database:


    ```

    RMAN> backup as copy database;

    ```


    Because image copies are identical copies of the data files, they can be directly
    accessed by the DBA with OS commands. For example, say you had a media failure,
    and you didn’t want to use RMAN to restore an image copy. You could use an OS
    command to copy the image copy of a data file to a location where it could be
    used by the database. In contrast, a backup set consists of binary files that
    only the RMAN utility can write to or read from.


    I prefer to use backup sets when working with RMAN. The backup sets tend to be
    smaller than the data files and can have true binary compression applied to them.
    Also, I don’t find it inconvenient to use RMAN as the mechanism for creating backup
    files that only RMAN can restore. Using RMAN with backup sets is efficient and
    very reliable.


    Backing Up Tablespaces


    RMAN has the ability to back up at the database level (as shown in the prior section),
    the tablespace level, or, even more granularly, at the data file level. When you
    back up a tablespace, RMAN backs up any data files associated with the tablespaces(s)
    that you specify. For instance, the following command will back up all the data
    files associated with the `SYSTEM` and `SYSAUX` tablespaces:


    ```

    RMAN> backup tablespace system, sysaux;

    ```


    One scenario in which I back up at the tablespace level is if I’ve recently created
    a new tablespace and want to take a backup of just the data files associated with
    the newly added tablespace. Note that when B&R issues, it’s often more efficient
    to work with one tablespace (because it’s generally much faster to back up one
    tablespace than the entire database).


    Backing Up Data Files


    You may occasionally need to back up individual data files. For example, when
    troubleshooting issues with backups, it’s often helpful to attempt to successfully
    backup one data file. You can specify data files by file name or by file number,
    as follows:'
  trans: '

    # RMAN 备份概念详解


    ## RMAN 完整备份与增量 0 级备份


    术语 *RMAN 完整备份* 有时会引起混淆。更贴切地描述此任务的方式是 *RMAN 备份一个或多个数据文件中所有已修改的块*。术语 *完整* 并不意味着备份所有块或所有数据文件。它仅表示正在备份在故障事件中重建数据文件所需的所有块。你可以对单个数据文件进行完整备份，而该备份片的内容可能比数据文件本身小得多。


    术语 *RMAN 增量 0 级备份* 本身也描述得不够准确。增量 0 级备份所备份的块与完整备份相同。换句话说，以下两条命令备份数据库中的相同块：


    ```

    RMAN> backup as backupset full database;

    RMAN> backup as backupset incremental level=0 database;

    ```


    前述两条命令的唯一区别在于，增量 0 级备份可以与其他增量备份结合使用，而完整备份不能参与增量备份策略。因此，我几乎总是更喜欢使用 `INCREMENTAL
    LEVEL=0` 语法（而不是完整备份）；它让我可以灵活地将 0 级增量备份与后续的 1 级增量备份一起使用。


    ## 备份集与映像副本


    RMAN 默认的备份模式指示其仅备份数据文件中已使用的块；这些称为备份集。RMAN 也可以对数据文件进行逐字节的复制；这些称为映像副本。创建备份集是 RMAN
    创建的默认备份类型。以下命令创建数据库的备份集备份：


    ```

    RMAN> backup database;

    ```


    如果愿意，你可以在创建备份时显式指定 `AS BACKUPSET` 命令：


    ```

    RMAN> backup as backupset database;

    ```


    你可以通过使用 `AS COPY` 命令指示 RMAN 创建映像副本。此命令为数据库中的每个数据文件创建映像副本：


    ```

    RMAN> backup as copy database;

    ```


    由于映像副本是数据文件的完全相同的副本，DBA 可以通过操作系统命令直接访问它们。例如，假设你遇到了媒体故障，并且不想使用 RMAN 来还原映像副本。你可以使用操作系统命令将数据文件的映像副本复制到数据库可以使用的位置。相比之下，备份集由二进制文件组成，只有
    RMAN 工具可以写入或读取。


    我在使用 RMAN 时更喜欢使用备份集。备份集往往比数据文件小，并且可以应用真正的二进制压缩。此外，我并不觉得使用 RMAN 作为只能由 RMAN 还原的备份文件的创建机制有什么不便。使用
    RMAN 和备份集既高效又非常可靠。


    ## 备份表空间与数据文件


    RMAN 能够在数据库级别（如前一节所示）、表空间级别，或者更精细地在数据文件级别进行备份。当你备份表空间时，RMAN 会备份你所指定的表空间关联的所有数据文件。例如，以下命令将备份与
    `SYSTEM` 和 `SYSAUX` 表空间关联的所有数据文件：


    ```

    RMAN> backup tablespace system, sysaux;

    ```


    我进行表空间级别备份的一种情况是，如果我最近创建了一个新表空间，并希望仅备份与新增表空间关联的数据文件。请注意，在遇到备份与恢复问题时，使用一个表空间通常更高效（因为备份一个表空间通常比备份整个数据库快得多）。


    你可能偶尔需要备份单个数据文件。例如，在排查备份问题时，尝试成功备份一个数据文件通常很有帮助。你可以按文件名或文件号指定数据文件，如下所示：

    '
- fmt: '## 备份数据文件


    ```

    RMAN> backup datafile ''/u01/dbfile/O12C/system01.dbf'';

    ```


    在此示例中，指定了文件编号：


    ```

    RMAN> backup datafile 1,4;

    ```


    以下是一些使用不同特性备份数据文件的其他示例：


    ```

    RMAN> backup as copy datafile 4;

    RMAN> backup incremental level 1 datafile 4;

    ```


    ![Image](images/sq.jpg) **提示** 使用`RMAN`的`REPORT SCHEMA`命令可以列出表空间、数据文件名和数据文件编号信息。


    ## 备份控制文件


    备份控制文件最可靠的方法是配置自动备份功能：


    ```

    RMAN> configure controlfile autobackup on;

    ```


    此命令确保在发出`BACKUP`或`COPY`命令时自动备份控制文件。我通常启用控制文件的自动备份功能，这样就永远不必担心需要显式发出单独的命令来备份控制文件。在此模式下，控制文件总是在数据文件备份片段创建后，在其自身的备份集和备份片段中创建。


    如果需要手动备份控制文件，可以这样做：


    ```

    RMAN> backup current controlfile;

    ```


    备份的位置可以是默认的操作系统位置、快速恢复区（如果使用的话）或手动配置的位置。如[第4章](#9781484207642_Ch04.xhtml)所示，我更喜欢将控制文件备份片段的位置设置为与数据文件备份相同的位置：


    ```

    RMAN> configure controlfile autobackup format for device type disk to

    ''/u01/O12C/rman/rman_ctl_%F.bk'';

    ```


    ## 备份spfile


    如果启用了控制文件的自动备份功能，则在发出任何`BACKUP`或`COPY`命令时，`spfile`（连同控制文件）都会被自动备份。如果需要手动备份`spfile`，请使用以下命令：


    ```

    RMAN> backup spfile;

    ```


    包含`spfile`备份的文件位置取决于您为控制文件自动备份配置的内容（有关示例，请参阅上一节）。默认情况下，如果您没有使用快速恢复区，并且没有通过通道显式配置位置，那么在Linux/Unix服务器上，备份会转到`ORACLE_HOME/dbs`目录。


    ![Image](images/sq.jpg) **注意** 只有实例是使用`spfile`启动时，`RMAN`才能备份`spfile`。


    ## 备份归档重做日志


    我通常不会将归档重做日志与数据库备份分开备份。如前所述，我通常使用以下命令备份数据库文件和归档重做日志文件：


    ```

    RMAN> backup incremental level=0 database plus archivelog;

    ```


    然而，您偶尔会遇到需要特殊、一次性备份归档重做日志的情况。您可以发出以下命令来备份归档重做日志文件：


    ```

    RMAN> backup archivelog all;

    ```


    如果您有一个几乎已满的挂载点，并且您确定要备份归档重做日志（以便它们存在于备份文件中），但随后又希望立即将刚备份的文件从磁盘上删除，则可以使用以下语法备份归档重做日志，然后让`RMAN`从存储介质中删除它们：


    ```

    RMAN> backup archivelog all delete input;

    ```


    下面列出了备份归档重做日志文件的其他一些方法：


    ```

    RMAN> backup archivelog sequence 300;

    RMAN> backup archivelog sequence between 300 and 400 thread 1;

    RMAN> backup archivelog from time "sysdate-7" until time "sysdate-1";

    ```


    如果某个归档重做日志已通过操作系统删除命令从磁盘上手动删除，则在尝试备份不存在的归档重做日志文件时，`RMAN`将抛出以下错误：


    ```

    RMAN-06059: expected archived log not found, loss of archived log compromises
    recoverability

    ```


    在这种情况下，首先运行`CROSSCHECK`命令，让`RMAN`知道磁盘上哪些文件是物理可用的：


    ```

    RMAN> crosscheck archivelog all;

    ```'
  raw: '```

    RMAN> backup datafile ''/u01/dbfile/O12C/system01.dbf'';

    ```


    In this example, file numbers are specified:


    ```

    RMAN> backup datafile 1,4;

    ```


    Here are some other examples of backing up data files, using various features:


    ```

    RMAN> backup as copy datafile 4;

    RMAN> backup incremental level 1 datafile 4;

    ```


    ![Image](images/sq.jpg) **Tip**  Use the RMAN `REPORT SCHEMA` command to list
    tablespace, data file name, and data file number information.


    Backing Up the Control File


    The most reliable way to back up the control file is to configure the autobackup
    feature:


    ```

    RMAN> configure controlfile autobackup on;

    ```


    This command ensures that the control file is automatically backed up when a `BACKUP`
    or `COPY` command is issued. I usually enable the autobackup of the control file
    feature and then never have to worry about explicitly issuing a separate command
    to back up the control file. When in this mode the control file is always created
    in its own backup set and backup piece after the data file backup pieces have
    been created.


    If you need to back up the control file manually, you can do so like this:


    ```

    RMAN> backup current controlfile;

    ```


    The location of the backup is either a default OS location, the FRA (if using),
    or a manually configured location. As shown in [Chapter 4](#9781484207642_Ch04.xhtml),
    I prefer to set the location of the control file backup piece to the same location
    as that of the data file backups:


    ```

    RMAN> configure controlfile autobackup format for device type disk to

    ''/u01/O12C/rman/rman_ctl_%F.bk'';

    ```


    Backing up the spfile


    If you have enabled the autobackup of the control file feature, the `spfile` will
    be backed up automatically (along with the control file) anytime a `BACKUP` or
    `COPY` command is issued. If you need to back up the `spfile` manually, use the
    following command:


    ```

    RMAN> backup spfile;

    ```


    The location of the file that contains the backup of the `spfile` is dependent
    on what you have configured for the autobackup of the control file (see the previous
    section for an example). By default, if you don’t use an FRA, and you haven’t
    explicitly configured a location via a channel, then for Linux/Unix servers, the
    backup goes to the `ORACLE_HOME/dbs` directory.


    ![Image](images/sq.jpg) **Note**  RMAN can only back up the `spfile` if the instance
    was started using a `spfile`.


    Backing Up Archive Redo Logs


    I don’t usually back up the archive redo logs separately from the database backups.
    As mentioned earlier, I normally back up the database files and the archive redo
    log files by using the following command:


    ```

    RMAN> backup incremental level=0 database plus archivelog;

    ```


    However, you will occasionally find yourself in a situation in which you need
    to take a special, one-off backup of the archive redo logs. You can issue the
    following command to back up the archive redo logs files:


    ```

    RMAN> backup archivelog all;

    ```


    If you have a mount point that is nearly full, and you determine that you want
    to back up the archive redo logs (so that they exist in a backup file), but then
    you want to immediately delete the files (that were just backed up) from disk,
    you can use the following syntax to back up the archive redo logs and then have
    RMAN delete them from the storage media:


    ```

    RMAN> backup archivelog all delete input;

    ```


    Listed next are some other ways in which you can back up the archive redo log
    files:


    ```

    RMAN> backup archivelog sequence 300;

    RMAN> backup archivelog sequence between 300 and 400 thread 1;

    RMAN> backup archivelog from time "sysdate-7" until time "sysdate-1";

    ```


    If an archive redo log has been removed from disk manually via an OS delete command,
    RMAN will throw the following error when attempting to back up the nonexistent
    archive redo log file:


    ```

    RMAN-06059: expected archived log not found, loss of archived log compromises
    recoverability

    ```


    In this situation, first run a `CROSSCHECK` command to let RMAN know which files
    are physically available on disk:


    ```

    RMAN> crosscheck archivelog all;

    ```'
