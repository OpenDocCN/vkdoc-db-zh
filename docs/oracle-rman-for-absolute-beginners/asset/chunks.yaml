  trans: "\n这意味着在指定的 SCN 之后提交的任何事务都不会包含在导出文件中。\n\n`注意`：如果将 `NETWORK_LINK` 参数与 `FLASHBACK_SCN`\
    \ 结合使用，则导出将使用与数据库链接中引用的数据库一致的 SCN 进行。\n\n## 使用 FLASHBACK_TIME 指定导出一致性\n\n您还可以使用\
    \ `FLASHBACK_TIME` 来指定导出文件应基于指定时间点的、一致的已提交事务来创建。使用 `FLASHBACK_TIME` 时，Oracle 会确定与指定时间最匹配的\
    \ SCN，并使用该 SCN 来生成一致的导出。使用 `FLASHBACK_TIME` 的语法如下：\n\n```\nFLASHBACK_TIME=\"TO_TIMESTAMP{<value>}\"\
    \n\"\n```\n\n对于某些操作系统，直接在命令行上出现的双引号必须用反斜杠 (`\\`) 转义，因为操作系统将它们视为特殊字符。因此，使用参数文件要直接得多。以下是一个使用\
    \ `FLASHBACK_TIME` 的参数文件内容：\n\n```\ndirectory=dp_dir\ncontent=metadata_only\n\
    dumpfile=inv.dmp\nflashback_time=\"to_timestamp('24-jan-2014 07:03:00','dd-mon-yyyy\
    \ hh24:mi:ss')\"\n```\n\n根据您的操作系统，前述示例的命令行版本必须指定如下：\n\n```\nflashback_time=\\\"\
    to_timestamp\\(\\'24-jan-2014 07:03:00\\', \\'dd-mon-yyyy hh24:mi:ss\\'\\)\\\"\
    \n```\n\n此行代码应在一行上指定。这里，为了适应页面，代码被放在了两行上。\n\n`注意`：执行导出时，不能同时指定 `FLASHBACK_SCN`\
    \ 和 `FLASHBACK_TIME`；这两个参数是互斥的。如果您尝试同时使用这两个参数，Data Pump 将抛出以下错误消息并停止导出作业：\n\n\
    ```\nORA-39050: parameter FLASHBACK_TIME is incompatible with parameter FLASHBACK_SCN\n\
    ```\n\n## 当对象已存在时进行导入\n\n在导出和导入数据时，您经常需要导入到其中对象（表、索引等）已创建的模式中。在这种情况下，您应该导入数据，但指示\
    \ Data Pump 尝试不创建已存在的对象。\n\n您可以使用 `TABLE_EXISTS_ACTION` 和 `CONTENT` 参数来实现这一点。下一个示例通过\
    \ `TABLE_EXISTS_ACTION=APPEND` 选项指示 Data Pump 将数据附加到任何已存在的表中。同时还使用了 `CONTENT=DATA_ONLY`\
    \ 选项，该选项指示 Data Pump 不要运行任何 DDL 来创建对象（仅加载数据）：\n\n```\n$ impdp mv_maint/foo directory=dp_dir\
    \ dumpfile=inv.dmp \\\ntable_exists_action=append content=data_only\n```\n\n现有对象不会以任何方式被修改，而转储文件中存在的任何新数据都会插入到相应的表中。\n\
    \n您可能想知道如果只使用 `TABLE_EXISTS_ACTION` 选项而不将其与 `CONTENT` 选项结合会发生什么：\n\n```\n$ impdp\
    \ mv_maint/foo directory=dp_dir dumpfile=inv.dmp \\\ntable_exists_action=append\n\
    ```\n\n唯一的区别是，如果对象存在，Data Pump 会尝试运行 DDL 命令来创建它们。这不会阻止作业运行，但您会在输出中看到一条错误消息，指示对象已存在。以下是前述命令输出的一个片段：\n\
    \n```\nTable \"MV_MAINT\".\"INV\" exists. Data will be appended ...\n```\n\n`TABLE_EXISTS_ACTION`\
    \ 参数的默认值是 `SKIP`，除非您还指定了 `CONTENT=DATA_ONLY` 参数。如果您使用 `CONTENT=DATA_ONLY`，那么 `TABLE_EXISTS_ACTION`\
    \ 的默认值是 `APPEND`。\n\n### TABLE_EXISTS_ACTION 选项\n\n`TABLE_EXISTS_ACTION` 参数接受以下选项：\n\
    \n*   `SKIP`（默认，如果未与 `CONTENT=DATA_ONLY` 结合使用）\n*   `APPEND`（默认，如果与 `CONTENT=DATA_ONLY`\
    \ 结合使用）\n*   `REPLACE`\n*   `TRUNCATE`\n\n`SKIP` 选项告诉 Data Pump，如果对象存在则不处理该对象。`APPEND`\
    \ 选项指示 Data Pump 不要删除现有数据，而是向表中添加数据，而不修改任何现有数据。\n\n`REPLACE` 选项指示 Data Pump 删除并重新创建对象；当\
    \ `CONTENT` 参数与 `DATA_ONLY` 选项一起使用时，此参数无效。`TRUNCATE` 参数告诉 Data Pump 通过 `TRUNCATE`\
    \ 语句删除表中的行。\n\n### CONTENT 选项\n\n`CONTENT` 参数接受以下选项：\n\n*   `ALL`（默认）\n*   `DATA_ONLY`\n\
    *   `METADATA_ONLY`\n\n`ALL` 选项指示 Data Pump 加载转储文件中包含的数据和元数据；这是默认行为。`DATA_ONLY`\
    \ 选项告诉 Data Pump 仅将表数据加载到现有表中；不创建任何数据库对象。`METADATA_ONLY` 选项仅创建对象；不加载任何数据。\n\n\
    ## 重命名表\n\n从 Oracle 11g 开始，您可以在导入操作期间选择重命名表。导入时重命名表的原因有很多。例如，目标模式中可能有一个表与您要导入的表同名。您可以使用\
    \ `REMAP_TABLE` 参数在导入时重命名表。此示例将 `HEERA` 用户的 `INV` 表从转储文件导入为 `HEERA` 用户的 `INVEN`\
    \ 表：\n\n```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp tables=heera.inv\
    \ \\\nremap_table=heera.inv:inven\n```\n\n以下是重命名表的一般语法：\n\n```\nREMAP_TABLE=[schema.]old_tablename[.partition]:new_tablename\n\
    ```\n\n`注意`：此语法不允许您将表重命名到不同的模式中。如果不小心，您可能会尝试执行以下操作（认为您是在一个操作中移动并重命名表）：\n\n```\n\
    $ impdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp tables=heera.inv \\\nremap_table=heera.inv:scott.inven\n\
    ```\n\n在前面的示例中，您最终会在 `HEERA` 模式中得到一个名为 `SCOTT` 的表。这可能会引起混淆。\n\n`注意`：在 Oracle 11g\
    \ Release 1 中，重命名表的过程并非完全没有错误，但在 Oracle 11g Release 2 中已得到纠正。有关更多详细信息，请参阅 MOS\
    \ Note 886762.1。\n\n## 重映射数据\n\n从 Oracle 11g 开始，在导出或导入时，您可以应用 PL/SQL 函数来更改列值。例如，您可能有一位审计员需要查看数据，其中一个要求是对敏感列应用简单的混淆函数。数据不需要加密；只需要进行足够改变，使得审计员无法轻易确定\
    \ `CUSTOMERS` 表中 `LAST_NAME` 列的值。\n\n此示例首先创建一个用于混淆数据的简单包：\n\n```\ncreate or replace\
    \ package obfus is\n  function obf(clear_string varchar2) return varchar2;\n \
    \ function unobf(obs_string varchar2) return varchar2;\nend obfus;\n/\ncreate\
    \ or replace package body obfus is\n  fromstr varchar2(62) := '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'\
    \ ||\n             'abcdefghijklmnopqrstuvwxyz';\n  tostr varchar2(62)   := 'defghijklmnopqrstuvwxyzabc3456789012'\
    \ ||\n             'KLMNOPQRSTUVWXYZABCDEFGHIJ';\n  function obf(clear_string\
    \ varchar2) return varchar2 is\n  begin\n    return translate(clear_string, fromstr,\
    \ tostr);\n  end obf;\n  function unobf(obs_string varchar2) return varchar2 is\n\
    \  begin\n    return translate(obs_string, tostr, fromstr);\n  end unobf;\nend\
    \ obfus;\n/\n```\n\n现在，当您将数据导入数据库时，您将混淆函数应用于 `CUSTOMERS` 表的 `LAST_NAME` 列：\n\n\
    ```\n$ impdp mv_maint/foo directory=dp_dir dumpfile=cust.dmp tables=customers\
    \  \\\nremap_data=customers.last_name:obfus.obf\n```\n\n从 `CUSTOMERS` 表中选择 `LAST_NAME`\
    \ 显示它已被混淆的方式导入：\n\n```\nSQL> select last_name from customers;\nLAST_NAME\n------------------\n\
    yYZEJ\ntOXXSMU\nxERX\n```\n\n您可以手动应用包的 `UNOBF` 函数来查看列的真实值：\n\n```\nSQL> select\
    \ obfus.unobf(last_name) from customers;\nOBFUS.UNOBF(LAST_NAME)\n------------------------\n\
    Smith\nJohnson\nWilliams\n```\n"
- fmt: "## 抑制日志文件\n默认情况下，Data Pump 在执行导出或导入时会创建一个日志文件。如果您知道不需要生成日志文件，可以通过指定 `NOLOGFILE`\
    \ 参数来抑制它。这是一个示例：\n\n```bash\n$ expdp mv_maint/foo directory=dp_dir tables=inv\
    \ nologfile=y\n```\n\n如果您选择不创建日志文件，Data Pump 仍然会在输出设备上显示状态消息。一般来说，我建议您为每个 Data\
    \ Pump 操作都创建一个日志文件。这为您提供了操作的审计跟踪。\n\n## 使用并行\n使用 `PARALLEL` 参数来并行化一个 Data Pump\
    \ 作业。例如，如果您知道一台服务器上有四个 CPU，并希望将并行度设置为 4，可以如下使用 `PARALLEL`：\n\n```bash\n$ expdp\
    \ mv_maint/foo parallel=4 dumpfile=exp.dmp directory=dp_dir full=y\n```\n\n为了充分利用并行功能，请确保在导出时指定多个文件。以下示例为每个并行线程创建一个文件：\n\
    \n```bash\n$ expdp mv_maint/foo parallel=4 dumpfile=exp1.dmp,exp2.dmp,exp3.dmp,exp4.dmp\n\
    ```\n\n您也可以使用 `%U` 替代变量来指示 Data Pump 自动创建与并行度匹配的转储文件。`%U` 变量从值 01 开始，并在分配额外的转储文件时递增。此示例使用了\
    \ `%U` 变量：\n\n```bash\n$ expdp mv_maint/foo parallel=4 dumpfile=exp%U.dmp\n```\n\
    \n现在，假设您需要从由导出创建的转储文件中导入。您可以单独指定转储文件，或者，如果转储文件是使用 `%U` 变量创建的，则在导入时也使用它：\n\n```bash\n\
    $ impdp mv_maint/foo parallel=4 dumpfile=exp%U.dmp\n```\n\n在上面的示例中，导入进程首先查找名为\
    \ `exp01.dmp` 的文件，然后是 `exp02.dmp`，依此类推。\n\n![Image](images/sq.jpg) **Tip** Oracle\
    \ 建议并行度不要设置为服务器上可用 CPU 数量的两倍以上。\n\n您也可以在作业运行时修改并行度。首先，以交互命令模式附加到要修改并行度的作业（请参阅本章后面的“交互命令模式”部分），然后使用\
    \ `PARALLEL` 选项。此示例中附加到的作业是 `SYS_IMPORT_TABLE_01`：\n\n```bash\n$ impdp mv_maint/foo\
    \ attach=sys_import_table_01\nImport> parallel=6\n```\n\n您可以通过 `STATUS` 命令检查并行度：\n\
    \n```bash\nImport> status\n```\n\n这是一些示例输出：\n\n```\nJob: SYS_IMPORT_TABLE_01\n\
    \  Operation: IMPORT\n  Mode: TABLE\n  State: EXECUTING\n  Bytes Processed: 0\n\
    \  Current Parallelism: 6\n```\n\n![Image](images/sq.jpg) **Note** `PARALLEL`\
    \ 功能仅在 Oracle 企业版中可用。\n\n## 指定额外的转储文件\n如果主数据泵位置空间不足，您可以动态指定额外的数据泵位置。使用交互式命令提示符下的\
    \ `ADD_FILE` 命令。以下是添加额外文件的基本语法：\n\n```\nADD_FILE=[directory_object:]file_name\
    \ [,...]\n```\n\n此示例向已存在的 Data Pump 导出作业添加另一个输出文件：\n\n```bash\nExport> add_file=alt2.dmp\n\
    ```\n\n您也可以指定一个单独的数据库目录对象：\n\n```bash\nExport> add_file=alt_dir:alt3.dmp\n```\n\
    \n## 重用输出文件名\n默认情况下，Data Pump 不会覆盖现有的转储文件。例如，第一次运行此作业时，它会正常运行，因为所使用的目录中没有名为 `inv.dmp`\
    \ 的转储文件：\n\n```bash\n$ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp\n\
    ```\n\n如果您尝试使用相同的目录和数据泵名称再次运行上述命令，将会抛出此错误：\n\n```\nORA-31641: unable to create\
    \ dump file \"/oradump/inv.dmp\"\n```\n\n您可以为导出作业指定一个新的数据泵名称，或者使用 `REUSE_DUMPFILES`\
    \ 参数来指示 Data Pump 覆盖现有的转储文件；例如：\n\n```bash\n$ expdp mv_maint/foo directory=dp_dir\
    \ dumpfile=inv.dmp reuse_dumpfiles=y\n```\n\n现在，无论输出目录中是否存在同名的现有转储文件，您都应该能够运行\
    \ Data Pump 导出。当您将 `REUSE_DUMPFILES` 设置为 `y` 时，如果 Data Pump 找到同名的转储文件，它将覆盖该文件。\n\
    \n![Image](images/sq.jpg) **Note** `REUSE_DUMPFILES` 的默认值为 `n`。`REUSE_DUMPFILES`\
    \ 参数仅在 Oracle 11g 及更高版本中可用。\n\n## 创建每日 DDL 文件\n有时，在数据库环境中，数据库对象会以意想不到的方式发生变化。您可能有一位开发人员以某种方式获得了生产用户密码，并决定在未经任何人告知的情况下即时进行更改。或者，DBA\
    \ 在排查问题时可能决定不遵循标准发布流程而更改对象。这些情况对于生产支持 DBA 来说可能是令人沮丧的。每当出现问题时，首先被提出的问题是：“什么发生了变化？”\n\
    \n当您使用 Data Pump 时，创建一个包含用于重新创建数据库中所有对象的 DDL 的文件相当简单。您可以通过 `CONTENT=METADATA_ONLY`\
    \ 选项指示 Data Pump 仅导出或导入元数据。\n\n例如，在生产环境中，您可以设置一个每日作业来捕获此 DDL。如果对发生了什么变化以及何时发生变化有疑问，您可以回溯并比较每日转储文件中的\
    \ DDL。\n\n下面列出的是一个简单的 shell 脚本，它首先从数据库导出元数据内容，然后使用 Data Pump 导入从该导出创建 DDL 文件：\n\
    \n```bash\n#!/bin/bash\nexport ORACLE_SID=O12C\nexport ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1\n\
    export PATH=$PATH:$ORACLE_HOME/bin\n#\nDAY=$(date +%Y_%m_%d)\nSID=DWREP\n#---------------------------------------------------\n\
    # 首先创建仅包含元数据的导出转储文件\nexpdp mv_maint/foo dumpfile=${SID}.${DAY}.dmp content=metadata_only\
    \ \\\ndirectory=dp_dir full=y logfile=${SID}.${DAY}.log\n#---------------------------------------------------\n\
    # 现在从导出转储文件创建 DDL 文件。\nimpdp mv_maint/foo directory=dp_dir dumpfile=${SID}.${DAY}.dmp\
    \ \\\nSQLFILE=${SID}.${DAY}.sql logfile=${SID}.${DAY}.sql.log\n#\n# exit 0\n```\n\
    \n此代码清单依赖于已创建一个数据库目录对象，该对象指向您希望每日转储文件写入的位置。您可能还想设置另一个作业，该作业定期删除超过一定时间的文件。\n\n\
    ## 压缩输出\n当您使用 Data Pump 创建大文件时，应该考虑压缩输出。从 Oracle 11g 开始，`COMPRESSION` 参数可以是以下值之一：`ALL`、`DATA_ONLY`、`METADATA_ONLY`\
    \ 或 `NONE`。如果您指定 `ALL`，则输出中的数据和元数据都将被压缩。此示例导出一个表并压缩输出文件中的数据和元数据：\n\n```bash\n\
    $ expdp dbauser/foo tables=locations directory=datapump \\\ndumpfile=compress.dmp\
    \ compression=all\n```\n\n如果您使用的是 Oracle 10g，则 `COMPRESSION` 参数只有 `METADATA_ONLY`\
    \ 和 `NONE` 值。\n\n![Image](images/sq.jpg) **Note** `COMPRESS` 参数的 `ALL` 和 `DATA_ONLY`\
    \ 选项需要 Oracle 高级压缩选项的许可。\n\nOracle 12c 的新功能是，您可以指定一种压缩算法。选择有 `BASIC`、`LOW`、`MEDIUM`\
    \ 和 `HIGH`。这是一个使用 `MEDIUM` 压缩的示例：\n\n```bash\n$ expdp mv_maint/foo dumpfile=full.dmp\
    \ compression=medium\n```"
  raw: 'UNOBF(LAST_NAME) ------------------------- Lopuz Gennick Kuhn ```    Suppressing
    a Log File    By default, Data Pump creates a log file when generating an export
    or an import. If you know that you don’t want a log file generated, you can suppress
    it by specifying the `NOLOGFILE` parameter. Here is an example:    ``` $ expdp
    mv_maint/foo directory=dp_dir tables=inv nologfile=y ```    If you choose not
    to create a log file, Data Pump still displays status messages on the output device.
    In general, I recommend that you create a log file with every Data Pump operation.
    This gives you an audit trail of your actions.    Using Parallelism    Use the
    `PARALLEL` parameter to parallelize a Data Pump job. For instance, if you know
    you have four CPUs on a box, and you want to set the degree of parallelism to
    4, use `PARALLEL` as follows:    ``` $ expdp mv_maint/foo parallel=4 dumpfile=exp.dmp
    directory=dp_dir full=y ```    To take full advantage of the parallel feature,
    ensure that you specify multiple files when exporting. The following example creates
    one file for each thread of parallelism:    ``` $ expdp mv_maint/foo parallel=4
    dumpfile=exp1.dmp,exp2.dmp,exp3.dmp,exp4.dmp ```    You can also use the `%U`
    substitution variable to instruct Data Pump to create dump files automatically
    to match the degree of parallelism. The `%U` variable starts at the value 01 and
    increments as additional dump files are allocated. This example uses the `%U`
    variable:    ``` $ expdp mv_maint/foo parallel=4 dumpfile=exp%U.dmp ```    Now,
    say you need to import from the dump files created from an export. You can either
    individually specify the dump files or, if the dump files were created with the
    `%U` variable, use that on import:    ``` $ impdp mv_maint/foo parallel=4 dumpfile=exp%U.dmp
    ```    In the prior example the import process starts by looking for a file with
    the name `exp01.dmp`, then `exp02.dmp`, and so on.    ![Image](images/sq.jpg) **Tip**  Oracle
    recommends that the degree of parallelism not be set to more than two times the
    number of CPUs available on the server.    You can also modify the degree of parallelism
    while the job is running. First, attach in the interactive command mode to the
    job (see the section “Interactive Command Mode,” later in this chapter) for which
    you want to modify the degree of parallelism. Then, use the `PARALLEL` option.
    In this example the job attached to is `SYS_IMPORT_TABLE_01`:    ``` $ impdp mv_maint/foo
    attach=sys_import_table_01 Import> parallel=6 ```    You can check the degree
    of parallelism via the `STATUS` command:    ``` Import> status ```    Here is
    some sample output:    ``` Job: SYS_IMPORT_TABLE_01   Operation: IMPORT   Mode:
    TABLE   State: EXECUTING   Bytes Processed: 0   Current Parallelism: 6 ```    ![Image](images/sq.jpg) **Note**  The
    `PARALLEL` feature is only available in the Enterprise Edition of Oracle.    Specifying
    Additional Dump Files    If you run out of space in the primary data pump location,
    then you can specify additional data pump locations on the fly. Use the `ADD_FILE`
    command from the interactive command prompt. Here is the basic syntax for adding
    additional files:    ``` ADD_FILE=[directory_object:]file_name [,...] ```    This
    example adds another output file to an already existing Data Pump export job:    ```
    Export> add_file=alt2.dmp ```    You can also specify a separate database directory
    object:    ``` Export> add_file=alt_dir:alt3.dmp ```    Reusing Output File Names    By
    default, Data Pump doesn’t overwrite an existing dump file. For example, the first
    time you run this job, it will run fine because there is no dump file named `inv.dmp`
    in the directory being used:    ``` $ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp
    ```    If you attempt to run the previous command again with the same directory
    and the same data pump name, this error is thrown:    ``` ORA-31641: unable to
    create dump file "/oradump/inv.


    dmp" ```    You can either specify a new data pump name for the export job or
    use the `REUSE_DUMPFILES` parameter to direct Data Pump to overwrite an existing
    dump file; for example,    ``` $ expdp mv_maint/foo directory=dp_dir dumpfile=inv.dmp
    reuse_dumpfiles=y ```    You should now be able to run the Data Pump export regardless
    of an existing dump file with the same name in the output directory. When you
    set `REUSE_DUMPFILES` to a value of `y`, if Data Pump finds a dump file with the
    same name, it overwrites the file.    ![Image](images/sq.jpg) **Note**  The default
    value for `REUSE_DUMPFILES` is `n`. The `REUSE_DUMPFILES` parameter is available
    only in Oracle 11g and higher.    Creating a Daily DDL File    Sometimes, in database
    environments, changes occur to database objects in unexpected ways. You may have
    a developer who somehow obtains the production user passwords and decides to make
    a change on the fly, without telling anybody. Or a DBA may decide not to follow
    the standard release process and make a change to an object while troubleshooting
    an issue. These scenarios can be frustrating for production-support DBAs. Whenever
    there is an issue, the first question raised is, “What changed?”    When you use
    Data Pump, it’s fairly simple to create a file that contains all the DDL to recreate
    every object in your database. You can instruct Data Pump to export or import
    just the metadata via the `CONTENT=METADATA_ONLY` option.    For instance, in
    a production environment, you can set up a daily job to capture this DDL. If there
    is ever a question about what changed and when, you can go back and compare the
    DDL in the daily dump files.    Listed next is a simple shell script that first
    exports the metadata content from the database and then uses Data Pump import
    to create a DDL file from that export:    ``` #!/bin/bash export ORACLE_SID=O12C
    export ORACLE_HOME=/orahome/app/oracle/product/12.1.0.1/db_1 export PATH=$PATH:$ORACLE_HOME/bin
    # DAY=$(date +%Y_%m_%d) SID=DWREP #---------------------------------------------------
    # First create export dump file with metadata only expdp mv_maint/foo dumpfile=${SID}.${DAY}.dmp
    content=metadata_only \ directory=dp_dir full=y logfile=${SID}.${DAY}.log #---------------------------------------------------
    # Now create DDL file from the export dump file. impdp mv_maint/foo directory=dp_dir
    dumpfile=${SID}.${DAY}.dmp \ SQLFILE=${SID}.${DAY}.sql logfile=${SID}.${DAY}.sql.log
    # exit 0 ```    This code listing depends on a database directory object’s being
    created that points to where you want the daily dump file to be written. You may
    also want to set up another job that periodically deletes any files older than
    a certain amount of time.    Compressing Output    When you use Data Pump to create
    large files, you should consider compressing the output. As of Oracle 11g, the
    `COMPRESSION` parameter can be one of the following values: `ALL`, `DATA_ONLY`,
    `METADATA_ONLY`, or `NONE`. If you specify `ALL`, then both data and metadata
    are compressed in the output. This example exports one table and compresses both
    the data and metadata in the output file:    ``` $ expdp dbauser/foo tables=locations
    directory=datapump \ dumpfile=compress.dmp compression=all ```    If you’re using
    Oracle 10g, then the `COMPRESSION` parameter only has the `METADATA_ONLY` and
    `NONE` values.    ![Image](images/sq.jpg) **Note**  The `ALL` and `DATA_ONLY`
    options of the `COMPRESS` parameter require a license for the Oracle Advanced
    Compression option.    New with Oracle 12c, you can specify a compression algorithm.
    The choices are `BASIC`, `LOW`, `MEDIUM`, and `HIGH`. Here is an example of using
    `MEDIUM` compression:    ``` $ expdp mv_maint/foo dumpfile=full.'
