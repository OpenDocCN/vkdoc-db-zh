    *   CentOS 或 Ubuntu 上运行 `ip addr`


    在尝试连接到容器内的 SQL Server 实例之前，先进行基本的网络测试，比如 PING 和 TELNET。我总是从这两个测试开始，以确保连接问题与 SQL
    Server 无关。我不想浪费大量时间排查 SQL Server 问题，结果却发现是端口被防火墙规则阻止了。如果 PING 测试没有得到响应，我并不会总是假设服务宕机了。也可能只是网络管理员作为其安全策略的一部分禁用了
    ICMP 响应。对 SQL Server 端口号进行 TELNET 测试会告诉我 SQL Server 是否正在监听。只有当我没有收到“无法打开到主机的连接”这样的错误消息时，我才会继续使用客户端应用程序进行测试。


    启动 SQL Server Management Studio，使用你指定的 IP 地址和 `sysadmin` 凭据连接到 SQL Server Docker
    容器。图 4-19 显示了一个简单查询的结果，用于显示实例名称和 SQL Server 版本。我在运行查询时使用了 SQLCMD 模式，这样在连接到远程 SQL
    Server 实例时就不必不断提供实例名称和凭据。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig19_HTML.jpg](img/484552_1_En_4_Fig19_HTML.jpg)

    **图 4-19**

    使用 SSMS 远程连接到容器上的 SQL Server


    回想一下 `-h` 参数的用途，它用于反映服务器主机名——服务器主机名就是默认 SQL Server 实例的实例名称。此外，可用的 SQL Server on
    Linux 容器运行在 Ubuntu Linux 16.04.6 LTS 上，即使你的 Docker 主机是 CentOS Linux 7。


    一旦你进入 SQL Server Management Studio，用户体验就是相同的。你不必在命令行中操作，也不必学习所有新的 SQL Server 命令行工具。你可以在一个熟悉的环境中，舒适地执行所有你曾经做过的管理任务。


    ## 容器的生命周期


    运行 `hello-world` 容器让你对其生命周期有了一个简单的概述——从创建、执行到终止。请记住，容器只有在内部的主要进程仍在运行时才会存在——这就是为什么
    `hello-world` 容器在屏幕上打印完整文本后立即退出。


    一个容器会经历以下不同的状态，当你运行 `docker ps -a` 时，可以在 `STATUS` 列中看到它们：


    *   `Created`：当你使用 `docker create` 命令创建了一个容器但尚未运行它时，就是这个状态，可能是为稍后运行做准备。

    *   `Running`：容器正在启动并运行，执行其任务。

    *   `Exited`：容器已经经过了 `RUNNING` 状态并完成了任务。由于其内部的主要进程不再运行，容器退出。

    *   `Paused`：当你选择使用 `docker pause` 命令暂停一个正在运行的容器时的状态，这会挂起容器中所有正在运行的进程。

    *   `Restarting`：一种容器状态，表示已配置了重启策略。你可以将其视为服务器重启，这是我们不希望 SQL Server 容器发生的事情。

    *   `Dead`：当 Docker 守护进程尝试停止容器但失败时的状态。


    可以认为运行 `docker run` 命令是运行 `docker create` 命令和 `docker start` 命令的组合。假设你想对 `hello-world`
    容器分别使用 `docker create` 和 `docker start` 命令：


    ```

    docker create hello-world

    ```


    与 `docker run` 命令类似，这将返回容器 ID 值。你将这个值作为参数传递给 `docker start` 命令，包括 `-a` 参数，以将容器的输出附加到你的终端控制台。我通常在
    `docker` 命令中只传递容器 ID 的前 12 个字符。图 4-20 展示了运行 `docker create` 和 `docker start` 作为运行
    `docker run` 的替代方法。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig20_HTML.jpg](img/484552_1_En_4_Fig20_HTML.jpg)

    **图 4-20**

    运行 `docker create` 和 `docker start` 命令


    ```

    docker start -a 3df6324e4c12

    ```


    我很少单独使用这两个命令，而只是依赖 `docker run` 命令来创建和运行容器。


    容器的状态与虚拟机（VM）经历的不同状态相似——你可以随时启动、停止或暂停它们。而且很像虚拟机，当你停止容器时，运行在其中的进程也会变得不可用。容器及其关联的数据会保留在
    Docker 主机的文件系统中，直到你显式移除它。移除容器并不会移除镜像。回想一下，容器是镜像的运行时实例。你可以从参考镜像中创建、启动、停止和移除任意数量的容器——这不会影响镜像本身。你可以从
    Docker 主机删除该镜像。这样做会触发 Docker 守护进程在你决定再次运行它时，从配置的容器镜像仓库中拉取该镜像。我们将在第 5 章更详细地介绍镜像和容器的内部原理。'
- fmt: "## Summary\n\n对构成 Docker 生态系统的不同组件有所了解，可以帮助你意识到运行一个容器需要什么。这为你开始在生产环境部署容器做好了准备。\n\
    \n我们已经了解了 Docker CLI 客户端的角色以及如何使用它来运行 Docker 命令。我们探讨了 Docker 守护进程如何成为你与 Docker\
    \ 交互的核心。我们还研究了镜像与容器之间的区别，以及 Docker 守护进程如何与 Docker Hub 交互以拉取（以及在你开始创建自己的自定义镜像时推送）镜像。理解镜像命名约定可以帮助你同时使用公开可用的镜像和你将创建的镜像。\n\
    \n在容器上运行一个 SQL Server 并远程连接到它并非难事，特别是 Microsoft 已经提供了可用的镜像。并且一旦你连接到容器内的 SQL Server\
    \ 实例，真的没有什么区别。你可以使用那些你多年来用于操作 SQL Server 的工具和命令。\n\n在本章中，我向你介绍了一些 `docker` 命令，以帮助你开始使用容器。你肯定需要掌握这些命令，因为你将会经常用到它们：\n\
    \n*   `docker version`: 显示 Docker 版本信息；用于验证安装\n*   `docker info`: 显示系统范围的信息；也用于验证安装和检查配置\n\
    *   `docker run`: 在一个新容器中运行一个命令，或者从 SQL Server 的角度来看，运行一个带有 SQL Server 实例的容器\n\
    *   `docker search`: 在 Docker Hub 中搜索可用的容器镜像\n*   `docker pull`: 从容器注册表中拉取一个或一组镜像\n\
    *   `docker images`: 显示存储在 Docker 主机本地文件系统中的所有镜像\n*   `docker ps`: 列出可用的容器\n\n\
    准备好迎接下一章，我们将更详细地从文件系统的角度来探讨镜像和容器。\n\n## 5. Docker Images and Containers\n\n> “美：所有部分比例协调，使得无法增、删或改变，而不损害整体的和谐。”\n\
    > \n> —莱昂·巴蒂斯塔·阿尔贝蒂\n\n出生和成长在一个发展中国家自有其挑战，有趣的是，至少可以这么说。我们家属于中低收入阶层，只有一个挣钱的人。所以，像零食和看电影这样的事情被认为是奢侈。想象一下，我8岁时第一次走进麦当劳餐厅时的感受。\n\
    \n1984年的一个夏日午后，我们的“提塔”（阿姨）带我和我哥哥去了麦当劳餐厅。我第一次接触开心乐园餐的经历平淡无奇—— regular burger（ regular\
    \ 汉堡）配上薯条和一杯饮料，还附赠了一套乐高积木。就一个8岁的孩子而言，这是一顿附带玩具套餐的盛宴（事实上，当时的份量也很大）。我从阿姨的脸上看出，如果我们要求更多，她会非常乐意满足。我不需要任何说服。菜单上展示了一杯诱人的巧克力奶昔图片，是炎炎夏日的完美饮品。\n\
    \n当服务员准备我的奶昔时，我忍不住注意到旁边有一个巨大的 soda dispenser（苏打水机）。每个准备带饮料订单的服务员都会把一个空杯子放在其中一个分配器下面，按下其中一个可爱的小按钮，饮料就出来了。我幼小的大脑立刻充满了问题。饮料是从哪里来的？它怎么知道去哪里取水、可口可乐或根汁汽水？它怎么能把所有饮料都装进那个小机器里？机器后面是不是有个人，他唯一的工作就是给苏打水机加饮料？真的会下芝士汉堡雨吗？\n\
    \n当你在一家销售十几种或更多饮料的全球快餐连锁店工作时，了解像 soda dispenser（苏打水机）这样的机器如何工作是有帮助的。你想知道饮料供应商是谁，如何将正确的饮料罐连接到\
    \ soda dispenser（苏打水机），以及如果机器停止分配饮料该怎么办。我8岁时的问题，无论是针对那台苏打水机，还是现在处理 Docker 镜像和容器，都同样有效。\n\
    \n本章将从存储的角度介绍 Docker 镜像和容器的内部工作原理。我们将探讨镜像的构成、如何描述它们以及它们如何在文件系统中存储。你越了解 Docker\
    \ 如何处理镜像，就越有能力设计自己的自定义镜像。\n\n**注意**\n\n除非另有说明，本章中的大部分示例都将与 Linux 相关。这将给你一个机会，在同时学习\
    \ Docker 镜像和容器的同时，提高你使用 Linux 文件系统的技能。"
  raw: "## Summary\n\nAn understanding of the different components that make up the\
    \ Docker ecosystem can help you become aware of what goes into running a container.\
    \ This prepares you for when you start deploying containers in a production environment.\n\
    \nWe’ve looked at the roles of the Docker CLI client and how to use it to run\
    \ Docker commands. We’ve explored how the Docker daemon is the center of your\
    \ interactions with Docker. We also looked at the difference between images and\
    \ containers and how the Docker daemon interacts with Docker Hub for pulling (and\
    \ pushing when you start creating your own custom) images. And an understanding\
    \ of the image naming convention can help you work with both publicly available\
    \ images and the ones that you’ll create.\n\nRunning a SQL Server on container\
    \ and connecting to it remotely are no big deal, especially when Microsoft has\
    \ already provided images available for use. And there really isn’t any difference\
    \ once you’ve connected to the SQL Server instance inside the container. You can\
    \ use the tools and commands that you’ve already known for years working with\
    \ SQL Server.\n\nI’ve introduced you to a couple of *docker* commands in this\
    \ chapter to get you started working with containers. You definitely need to get\
    \ these under your belt since you will be using them a lot:\n\n*   *docker version*:\
    \ Displays the Docker version information; used for verifying your installation\n\
    \n*   *docker info*: Displays system-wide information; also used for verifying\
    \ installation and checking configuration\n\n*   *docker run*: Runs a command\
    \ in a new container or, from SQL Server’s point of view, runs a container with\
    \ a SQL Server instance\n\n*   *docker search*: Searches Docker Hub for available\
    \ container images\n\n*   *docker pull*: Pulls an image or a set of images from\
    \ a container registry\n\n*   *docker images*: Displays all images stored in the\
    \ Docker host’s local filesystem\n\n*   *docker ps*: Lists available containers\n\
    \nGet ready for the next chapter as we’ll be looking at images and containers –\
    \ from the point of view of the filesystem – in more detail.\n\n# 5. Docker Images\
    \ and Containers\n\n> “Beauty: the adjustment of all parts proportionately so\
    \ that one cannot add or subtract or change without impairing the harmony of the\
    \ whole.”\n> \n> —Leon Battista Alberti\n\nBeing born and raised in a developing\
    \ country has its own challenges, interesting ones, to say the least. Our family\
    \ was in the lower-middle class with a single wage earner. So, things like snacks\
    \ and movies were considered luxury. Imagine how it felt like entering a McDonald’s\
    \ store for the first time when I was 8 years old.\n\nOur “tita” brought me and\
    \ my elder brother to a McDonald’s store one summer afternoon in 1984\\. My first\
    \ ever encounter with the Happy Meal was uneventful – the regular burger coupled\
    \ with fries and a drink came with the Lego building set. As far as an 8-year-old\
    \ is concerned, it was a feast that came with a toy set (the fact is the servings\
    \ were also huge back in those days). I saw from my aunt’s face that she was more\
    \ than happy to oblige if we asked for more. I didn’t need any convincing. The\
    \ menu displayed an enticing picture of a chocolate milkshake, a perfect beverage\
    \ for the scorching hot summer day.\n\nAs the server was preparing my milkshake,\
    \ I couldn’t help but notice a large soda dispenser beside it. Every server preparing\
    \ orders with drinks would place an empty cup below one of the dispensers, pressed\
    \ one of those cute little buttons, and out comes the drink. My little kid brain\
    \ was immediately flooded with questions. Where was the drink coming from? How\
    \ does it know where to get water or Coca-Cola or root beer? How can it fit all\
    \ the drinks in that small machine? Was there a guy behind the machine whose only\
    \ job is to fill up the soda dispenser? Does it really rain cheeseburgers?\n\n\
    When you’re working for a global fast food chain that sells a dozen or more beverages,\
    \ it helps to know how a machine like the soda dispenser works. You want to know\
    \ who the beverage supplier is, how to connect the right beverage tank to the\
    \ soda dispenser, and what to do in case the machine stopped dispensing drinks.\
    \ My 8-year-old questions were as valid as they were with that soda machine as\
    \ they are working with Docker images and containers.\n\nThis chapter will cover\
    \ the internals of working with Docker images and containers from a storage point\
    \ of view. We’ll be exploring what images are made of, how they are described,\
    \ and how they are stored in the filesystem. The more you understand how Docker\
    \ deals with images, the better equipped you are at designing your own custom\
    \ images.\n\nNote\n\nMost of the examples shown in this chapter will pertain to\
    \ Linux unless otherwise specified. This will give you a chance to improve your\
    \ skills working with the Linux filesystem while learning about Docker images\
    \ and containers at the same time."
