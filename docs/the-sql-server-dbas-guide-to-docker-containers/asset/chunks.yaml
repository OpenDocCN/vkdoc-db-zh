  trans: '

    ## 在 Linux 容器上运行 SQL Server


    运行以下命令，在你的 Linux Docker 主机上拉取并运行一个 `SQL Server 2017 Developer Edition with CU14
    on Ubuntu Linux` 镜像。由于只有带 `latest` 标签的镜像在 Docker Hub 上可用，我们将使用 MCR 作为公共容器注册表。别担心，你可以在
    Ubuntu 或 CentOS Linux Docker 主机上运行这个。而且你等待的时间不会像拉取 Windows 版 SQL Server 镜像时那么长。图
    4-13 展示了在你的 Linux Docker 主机上运行 `docker run` 命令的结果。


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevlinuxcon01 -d -h linuxsqldev01 mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    **注意**


    在第 3 章中，我讨论了将用户添加到 `docker` 组的安全影响。这是因为 Docker 守护进程以 `root` 身份运行。这意味着你在 Docker
    主机上运行的任何容器都拥有 `root` 权限，不仅在容器内部，也在宿主机上。任何能够恶意获得容器访问权限的人都可以轻松地利用 Docker 主机。我确实说过这很可怕。不幸的是，以非
    root 用户（也称为 `无根` 模式）运行 Docker 守护进程仍是一项实验性功能。你不会想在生产环境中使用实验性功能。微软不得不在这个限制下工作，因此在
    Linux 容器上部署 SQL Server 是使用 `root` 完成的。SQL Server 2019 改变了这一点，允许以非 root 用户身份在 Linux
    容器上运行 SQL Server。我将在第 10 章介绍如何以 `root` 或非 root 用户身份构建和运行 Linux 容器上的 SQL Server。


    ## 开始探索容器和镜像


    所以，你拉取并运行了容器上的 SQL Server 镜像。你没有看到任何错误信息。或者也许你看到了。如果你想开始探索你拉取的镜像，可以运行 `docker
    images` 命令。这会让你明白为什么 Windows 版 SQL Server 镜像的拉取时间相比 Linux 版 SQL Server 镜像如此漫长，这也解释了为什么
    Docker 版的 `hello world` 在 Windows 上运行比在 Linux 上花费更长时间。图 4-14 可能会让你震惊——它显示了在我的
    Windows Server 主机和 Linux Server 主机上运行 `docker images` 命令的结果。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig14_HTML.jpg](img/484552_1_En_4_Fig14_HTML.jpg)


    图 4-14：比较 Windows 版 SQL Server 与 Linux 版 SQL Server 镜像


    仅仅因为在运行容器时没有看到任何错误信息，并不意味着一切正常。要查找所有正在运行的容器的状态，请运行 `docker ps` 命令。图 4-15 显示了我
    Windows Server 和 Linux 服务器主机上当前正在运行的容器。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig15_HTML.jpg](img/484552_1_En_4_Fig15_HTML.jpg)


    图 4-15：当前正在运行的 Docker 容器


    `STATUS` 列告诉你容器当前是否正在运行。如果你刚刚运行的容器没有出现在这个列表中，并且你没有收到任何错误信息，这可能意味着它运行了一段时间后被终止了。一个已终止的容器可能意味着它预期要完成的工作已经完成（比如
    `hello-world` 容器），或者容器内部发生了致命错误导致其停止。了解容器的功能是很重要的，这样你才能知道对它有什么预期。


    运行 `docker ps -a` 命令会显示所有容器——无论是正在运行的还是已终止的。图 4-16 显示了我运行过的所有容器列表，包括状态为 Exited
    (0) 的已终止的 `hello-world` 容器。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig16_HTML.jpg](img/484552_1_En_4_Fig16_HTML.jpg)


    图 4-16：显示所有 Docker 容器——包括当前运行的和已终止的


    在你处理容器的过程中，会经常运行这两个命令。但我们这里只是浅尝辄止。第 6 章将介绍使用这些命令的变体来执行基本的容器管理。

