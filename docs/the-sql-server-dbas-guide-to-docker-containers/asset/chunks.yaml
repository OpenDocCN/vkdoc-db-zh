    # 在 Windows 上构建自定义 SQL Server Docker 镜像


    ```

    #Step 1

    FROM mcr.microsoft.com/windows/servercore:10.0.14393.2972

    #Step 2

    RUN powershell -Command (mkdir C:\SQL2016Dev_SP2)

    #Step 3

    COPY /SQL2016Dev_SP2 C:/SQL2016Dev_SP2

    #Step 4

    RUN C:/SQL2016Dev_SP2/SETUP.exe /Q /ACTION=INSTALL /UPDATEENABLED=True /UPDATESOURCE=./SQLServer2016SP2CU11
    /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER /SECURITYMODE=SQL /SAPWD="y0urSecUr3PAssw0rd"
    /SQLSVCACCOUNT="NT AUTHORITY\System" /AGTSVCACCOUNT="NT AUTHORITY\System" /SQLSYSADMINACCOUNTS="BUILTIN\Administrators"
    /IACCEPTSQLSERVERLICENSETERMS=1 /TCPENABLED=1

    #Step 5

    RUN powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

    #Step 6

    RUN powershell -Command (Remove-Item -Path C:/SQL2016Dev_SP2 -Recurse -Force)

    #Step 7

    SHELL ["powershell", "-Command", "$ErrorActionPreference = ''Stop''; $ProgressPreference
    = ''SilentlyContinue'';"]

    #Step 8

    COPY /start.ps1 /

    #Step 9

    WORKDIR /

    ENV SA_PASSWORD "y0urSecUr3PAssw0rd"

    ENV ACCEPT_EULA "Y"

    #Step 10

    CMD ./start -sa_password $env:SA_PASSWORD -ACCEPT_EULA $env:ACCEPT_EULA -Verbose

    ```


    仅仅查看 `Dockerfile` 中的指令，你已经能看出一些潜在的优化改进点。我们稍后再讨论这些。现在，是时候在 Windows 容器上构建我们的自定义
    SQL Server 了。


    ## 构建 Windows 镜像上的自定义 SQL Server


    将 `Dockerfile` 文件与 `SQL2016Dev_SP2` 目录以及 `start.ps1` PowerShell 脚本一起保存在 `<驱动器>:\dockerBuild`
    目录中。你将在该目录的上下文中运行以下 `docker build` 命令。我们将新镜像命名为 `sql2016windev` 并打上 `v1.0` 标签。`docker
    build` 命令末尾的点（`.`）指定了路径。在本例中，`docker build` 命令将查看当前路径，并相对于当前路径评估 `Dockerfile`
    内的所有指令。如果未明确指定，它还会告知 `docker build` 命令在该路径下查找名为 `Dockerfile` 的文件。


    ```

    docker build -t sql2016windev:v1.0 .

    ```


    图 9-4 显示了 `docker build` 命令输出的前几行。


    ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig4_HTML.jpg](img/484552_1_En_9_Fig4_HTML.jpg)

    图 9-4: docker build 命令的输出


    请注意以下几点：


    *   消息“将构建上下文发送到 Docker 守护进程 4.358GB”字面意思与其表述完全一致。Docker CLI 客户端正在将 `<驱动器>:\dockerBuild`
    目录的全部内容发送给 Docker 守护进程。我创建 `<驱动器>:\dockerBuild` 目录并将其用作构建自定义镜像的路径，是因为我只想将此目录的内容复制到
    Docker 守护进程。如果你在根目录（`<驱动器>:\`）上运行 `docker build` 命令，它会将根目录下的所有内容复制到 Docker 守护进程。你肯定不希望自己的私人
    MP3 文件、简历或照片集最终出现在别人的容器里，对吧？


    *   步骤 1/12。我们 `Dockerfile` 里不是只有 10 个步骤吗？为什么 `docker build` 命令识别出了 12 个？这是因为每一条指令都会创建一个步骤，包括步骤
    10 之前的两条 `ENV` 指令。而且我们甚至还没有添加 `LABEL` 指令。


    *   在步骤 2/12，消息“---> 在 968b5452879d 中运行”告诉你，这是 `RUN` 指令为此步骤运行命令而创建的临时容器。


    *   在步骤 2/12，消息“---> 正在移除中间容器 968b5452879d”告诉你，此步骤创建的临时容器已被删除，其变更已提交以创建一个新镜像。这个新的文件系统层名为“de9a3de04fd0”。


    *   通过命令行安装 SQL Server 时传递给 `SETUP.EXE` 命令的参数来源于 [*https://docs.microsoft.com/en-us/sql/database-engine/install-windows/install-sql-server-from-the-command-prompt?view=sql-server-ver15*](https://docs.microsoft.com/en-us/sql/database-engine/install-windows/install-sql-server-from-the-command-prompt%253Fview%253Dsql-server-ver15)。


    *   每一条指令，包括 `ENV` 指令，都会创建一个文件系统层。


    *   你会感到困倦。你的眼皮越来越重。现在，清醒一下。


    构建完成后，你现在就可以使用这个自定义镜像来创建和运行一个新容器了。运行 `docker images` 命令查看新构建的镜像。图 9-5 显示了我的 Docker
    主机中可用的镜像列表，包括刚构建的那个。Windows 容器的大小是我尽可能避免使用它们的主要原因。


    ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig5_HTML.jpg](img/484552_1_En_9_Fig5_HTML.jpg)

    图 9-5: 列出新构建的自定义 Docker 镜像


    运行以下命令开始使用这个自定义镜像。图 9-6 展示了验证构建的 Windows 容器上的自定义 SQL Server——运行在 Windows Server
    2016 Core 内部版本 14393.2972 上的 SQL Server 2016 Service Pack 2 Cumulative Update
    11。


    ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig6_HTML.jpg](img/484552_1_En_9_Fig6_HTML.jpg)

    图 9-6: 验证 Windows 上的自定义 SQL Server Docker 镜像


    ```

    docker run -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=y0urSecUr3PAssw0rd'' -p 1433:1433
    --name sql-windevcon01 -d -h windevsql01 sql2016windev:v1.0

    ```


    还记得我说过你可以为 `Dockerfile` 使用不同的文件名吗？假设你想将其命名为 `dockerFile.dev`，以表明这是开发人员使用的文件，而
    `Dockerfile` 将严格用于生产环境（嗯，从开发人员的角度来看是生产环境）。你可以使用 `docker build` 命令的 `-f` 参数来指定要使用的文件名。下面的示例命令使用
    `dockerFile.dev` 文件构建自定义镜像。点（`.`）字符仍然告诉 `docker build` 命令使用当前路径。


    ```

    docker build -t sql2016windev:v1.01 -f dockerFile.dev .

    ```


    你也可以向 `docker build` 命令传递绝对路径或 URL。下面的示例命令使用微软从 GitHub 提供的 `Dockerfile` 来构建一个以非
    root 用户身份运行的自定义 SQL Server on Linux 镜像。我不能使用微软提供的 Windows 的 `Dockerfile` 来构建自定义
    SQL Server on Windows 镜像，因为它没有更新——`FROM` 指令仍然指向一个过时的 Windows Server Core 镜像。


    ```

    docker build -t sql2017linuxnonroot:v1.0  https://raw.githubusercontent.com/microsoft/mssql-docker/master/linux/preview/examples/mssql-server-linux-non-root/Dockerfile

    ```


    请记住，`Dockerfile` 中的指令将在当前构建路径的上下文中执行。确保 `COPY` 或 `ADD` 指令中定义的所有依赖项，如脚本、安装文件等，都是可用的。


    一旦你构建了自己的自定义镜像，你现在就可以将其用作创建其他自定义镜像的基础镜像。例如，你可以在你的 `Dockerfile` 的 `FROM` 指令中引用新构建的镜像，如下所示：


    ```

    FROM sql2016windev:v1.01

    ```


    **注意：** 如果你在微软提供的 SQL Server on Windows Docker 镜像的基础上构建自定义镜像，请记住它们在生产环境中**不受支持**。这在
    [*https://hub.docker.com/r/microsoft/mssql-server-windows-developer/*](https://hub.docker.com/r/microsoft/mssql-server-windows-developer/)
    的“预期用途”部分有重点说明。这也是为什么我更倾向于创建自己的自定义 Docker 镜像，本例中是一个运行在 Windows Server 2016 上的
    SQL Server 2016 镜像。如果你决定将其部署到生产环境，请确保你运行的是受支持的 Windows Server 和 SQL Server 版本。Windows
    Server 2008 和 Windows Server 2008 R2 已不再处于扩展支持期。别费心了。

    '
- fmt: '## Optimizing the Dockerfile


    There are several ways you can optimize the image build process and the resulting
    Docker image. One of my biggest concerns is the size of the filesystem layers.
    It’s the 11.1GB size of the base Windows Server 2016 Core image that makes me
    avoid using Windows containers. And that’s just the operating system alone. The
    publicly available SQL Server on Linux image is 1.4GB. Not to mention the size
    of the SQL Server installation files on Windows. Figure [9-7](#484552_1_En_9_Chapter.xhtml#Fig7)
    shows the result of the `docker history` command for the custom SQL Server on
    Windows image.


    ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig7_HTML.jpg](images/484552_1_En_9_Chapter/484552_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Listing the different filesystem layers for the custom SQL Server on Windows Docker
    image


    These file sizes affect the speed of pulling and pushing the filesystem layers
    as part of both the build process and the container runtime. Just running the
    `docker build` command with the custom `Dockerfile` took an average of 25 minutes
    in my test environment. And while you’re not going to be running `docker build`
    commands every hour, you still need to worry about the image sizes and the disk
    space requirements.


    The two common ways of optimizing the `Dockerfile` are by reducing the number
    of instructions and reducing the size of the filesystem layers. But before we
    look at reducing the number of instructions, let’s see if we can identify some
    of the existing commands that can be rolled up into the other instructions. Take
    a look at Step 5:


    ```

    #Step 5

    RUN powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

    ```


    It simply calls the PowerShell command shell and sets the startup type of the
    `MSSQLSERVER` service to `Automatic`. We can roll this instruction up and include
    it as the `/SQLSVCSTARTUPTYPE` parameter in Step 4 which looks something like
    this, with emphasis on the last parameter:


    ```

    #Step 4

    RUN C:/SQL2016Dev_SP2/SETUP.exe /Q /ACTION=INSTALL /UPDATEENABLED=True /UPDATESOURCE=./SQLServer2016SP2CU11
    /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER /SECURITYMODE=SQL /SAPWD="y0urSecUr3PAssw0rd"
    /SQLSVCACCOUNT="NT AUTHORITY\System" /AGTSVCACCOUNT="NT AUTHORITY\System" /SQLSYSADMINACCOUNTS="BUILTIN\Administrators"
    /IACCEPTSQLSERVERLICENSETERMS=1 /TCPENABLED=1 /SQLSVCSTARTUPTYPE="Automatic"

    ```


    Tip


    I like using a `ConfigurationFile.ini` file to replace the SQL Server setup command-line
    parameters and shorten Step 4\. If you choose to do so, be sure to copy the `ConfigurationFile.ini`
    file inside the `SQL2016Dev_SP2` directory and call it as part of the command-line
    parameters. And validate before you automate.


    The size savings for removing Step 5 – 75.5MB as per Figure [9-7](#484552_1_En_9_Chapter.xhtml#Fig7)
    – is trivial compared to the overall size of the image. But it’s a start. Evaluate
    existing instructions and see if you can roll them up into the other instructions.
    Once you’ve exhausted every possible instruction that you can roll up into other
    instructions, it’s time to combine related instructions.


    Take a look at Steps 4 and 6\. Both use the `RUN` instruction. And since Step
    2 is also a PowerShell command, why not use PowerShell as the default command
    shell? We can introduce a new `SHELL` instruction after Step 1 as follows:


    ```

    SHELL ["powershell", "-Command"]

    ```


    Because we can call Step 4 as a PowerShell command, we can combine it with Step
    6 using a semicolon (`;`) character as follows, turning it into a single `RUN`
    instruction. I’ve also replaced the double quotes used in the parameter values
    of `setup.exe` to single quotes to avoid string misinterpretation. I don’t want
    the double quotes to be interpreted as a special character within PowerShell.


    ```

    #Step 4 and 6 combined in a single line

    RUN C:/SQL2016Dev_SP2/SETUP.exe /Q /ACTION=INSTALL /UPDATEENABLED=True /UPDATESOURCE=./SQLServer2016SP2CU11
    /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER /SECURITYMODE=SQL /SAPWD=''y0urSecUr3PAssw0rd''
    /SQLSVCACCOUNT=''NT AUTHORITY\System'' /AGTSVCACCOUNT=''NT AUTHORITY\System''
    /SQLSYSADMINACCOUNTS=''BUILTIN\Administrators'' /IACCEPTSQLSERVERLICENSETERMS=1
    /TCPENABLED=1 /SQLSVCSTARTUPTYPE=''Automatic'' ; Remove-Item -Path C:/SQL2016Dev_SP2
    -Recurse -Force

    ```


    A knowledge of the different Windows commands and PowerShell cmdlets will be helpful
    to know which `RUN` instructions you can combine. Refer to the list of Windows
    commands from [*https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/windows-commands*](https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/windows-commands).
    You can also run the `Get-Command` PowerShell cmdlet to retrieve all the native
    PowerShell cmdlets available in your Windows installation.


    What else? We can remove Steps 7, 8, and 9 and the two `ENV` instructions. I really
    don’t like the `start.ps1` PowerShell script since I already provided the required
    parameters – `SA_PASSWORD` and `ACCEPT_EULA` – in the `setup.exe`, `/SAPWD` and
    `/IACCEPTSQLSERVERLICENSETERMS`, respectively. Plus, I don’t have any sample databases
    on Azure Blob storage that I need to attach. And I can replace Step 10 with a
    call to the SQL Server executable using the `ENTRYPOINT` instruction. The following
    is how the modified, trimmed down `Dockerfile` would look like:


    ```

    #Step 1

    FROM mcr.microsoft.com/windows/servercore:10.0.14393.2972

    #Step 1A – switch the default command shell to PowerShell

    SHELL ["powershell", "-Command"]

    #Step 2

    RUN mkdir C:/SQL2016Dev_SP2

    #Step 3

    COPY /SQL2016Dev_SP2 C:/SQL2016Dev_SP2

    #Step 4 and 6 combined in a single line

    RUN C:/SQL2016Dev_SP2/SETUP.exe /Q /ACTION=INSTALL /UPDATEENABLED=True /UPDATESOURCE=./SQLServer2016SP2CU11
    /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER /SECURITYMODE=SQL /SAPWD=''y0urSecUr3PAssw0rd''
    /SQLSVCACCOUNT=''NT AUTHORITY\System'' /AGTSVCACCOUNT=''NT AUTHORITY\System''
    /SQLSYSADMINACCOUNTS=''BUILTIN\Administrators'' /IACCEPTSQLSERVERLICENSETERMS=1
    /TCPENABLED=1 /SQLSVCSTARTUPTYPE=''Automatic'' ; Remove-Item -Path C:/SQL2016Dev_SP2
    -Recurse -Force

    #New Step 10

    ENTRYPOINT ["C:/Program Files/Microsoft SQL Server/MSSQL13.MSSQLSERVER/MSSQL/Binn/sqlservr.exe"]

    ```


    Figure [9-8](#484552_1_En_9_Chapter.xhtml#Fig8) shows the result of the `docker
    history` command for the updated custom SQL Server on Windows image, including
    the image size difference between the first image and the new image using the
    modified `Dockerfile`. We’ve reduced the size of the image from 19.7GB to 17.9GB
    and from 12 instructions down to 6 instructions. Not bad.


    ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig8_HTML.jpg](images/484552_1_En_9_Chapter/484552_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Listing the image size and the different filesystem layers after making changes
    to the Dockerfile


    Like I said, we can’t really do much to size of the Windows Server 2016 Core base
    image. It is what it is. You can remove another image layer by using the LTSC2016
    image instead, but you’re still dealing with an 11.1GB-sized image.


    I’ve given you several ways to reduce the number of instructions to optimize the
    `Dockerfile` and the resulting image. Try it out as an exercise and think of other
    ways that you can roll up or combine instructions.


