    \ SQL Server on Linux.\n\n*   *Operating system*: There are other supported Linux\
    \ distros you can use. Docker supports a minimum of CentOS 7 (you need at least\
    \ version 7.4 for RHEL) and Ubuntu Server Xenial 16.04 (LTS). To get you started\
    \ on running Docker on Linux, we will be using CentOS 7.6 (1810) and Ubuntu Server\
    \ Xenial 16.04 (LTS). You can download the CentOS ISO image from [*www.centos.org/download/*](https://www.centos.org/download/)\
    \ and the Ubuntu Server Xenial ISO image from [*http://releases.ubuntu.com/16.04/*](http://releases.ubuntu.com/16.04/).\
    \ Be sure to select the *Server install image* and not the *Desktop image* for\
    \ Ubuntu.\n\n*   *Disk space*: You will be surprised at the disk space requirements\
    \ for Linux – even when running SQL Server. You will see in *Chapter* [*5*](#484552_1_En_5_Chapter.xhtml)\
    \ the difference in disk space requirements between a container running SQL Server\
    \ on Linux and SQL Server on Windows. 20GB is my bare minimum for any Linux installation\
    \ .\n\nNote\n\nThere really isn’t an official supported minimum system requirement\
    \ for running the Docker engine on a Linux operating system. I spent hours searching\
    \ the Docker documentation for what they consider a supported minimum system requirement.\
    \ What you’ll find, however, is the minimum system requirements for running Docker\
    \ Universal Control Plane – the cluster management solution for multi-host Docker\
    \ clusters. Save that for a more advanced configuration since you’re in the early\
    \ stages of learning Docker."
  trans: '# 3. 在 Linux 上安装与配置 Docker


    > *生命的关键在于接受挑战。一旦有人停止这样做，他就如同死去。*

    > —贝蒂·戴维斯


    我仍然不敢相信我正在撰写这一章——面向 SQL Server 数据库管理员（DBA）的 Linux 内容。在第 1 章中，我提到微软如何在 2017 年将
    SQL Server 带到了 Linux 上。这对许多只了解 SQL Server 是运行在 Windows 操作系统上的关系数据库引擎的 DBA 来说，是一个巨大的意外。但就像任何技术创新一样，你可以选择拥抱它，也可以选择忽略它。拥抱它，能给你一个成长的机会，将你的职业生涯提升到一个全新的高度。


    我假设你对 Linux 的经验非常少，甚至为零。因此，我们将从熟悉 Linux 开始——了解使用操作系统、文件系统和 Docker 所需掌握的简单基础命令。这意味着大部分时间将在命令行中工作。在安全性方面，你还需要改变思维方式。在讲解更新
    Linux 系统的章节时，你会看到这方面的实际应用。


    一旦你对 Linux 有了些许熟悉，我们就会着手在 Linux 上安装和配置 Docker 引擎。与 Windows 不同，Linux 有非常多的发行版（通常简称为
    distros），要了解每一个都具有挑战性。我们将只关注两个 Linux 发行版——CentOS 和 Ubuntu。它们不仅 consistently 位居最受欢迎的
    Linux 服务器发行版前十，也是微软支持运行 SQL Server on Linux 的三个发行版中的两个。CentOS 是一个免费的、企业级的、由社区支持的发行版，基于
    Red Hat Enterprise Linux（RHEL）。你可以在不签订企业支持协议的情况下，获得使用类似 RHEL 的 Linux 发行版的体验。另一方面，Ubuntu
    是基于 Debian GNU/Linux、深受开发者欢迎的 Linux 发行版。我们仍然需要让开发者满意，不是吗？


    为了让学习 Linux 更容易一些，请选择一个发行版并坚持使用它。当你对第一个选择感到得心应手后，再学习其他发行版。


    **注意**

    与第 2 章一样，本章不涉及安装 Linux 操作系统的过程。那是*附录 A*的内容。本章假设你已经安装好了一个干净的 CentOS 或 Ubuntu Linux
    服务器，并配置了安全外壳（SSH）客户端以远程连接到这些机器。


    ## 最低系统要求


    与 Windows 不同，Linux 运行不需要大量的系统资源。因此，如果你遵循在 Windows Server 上运行 Docker 的最低系统要求，那就没问题。


    *   *内存*：至少 4GB。即使在 Linux 机器上，我也总是从 4GB 内存起步，因为我会假设它将运行 SQL Server。我的 Linux 系统管理员同事几年前曾嘲笑我这样做。我不怪他们。但是，在那个时候，没人梦想过在
    Linux 上运行 SQL Server。此外，在 Linux 上运行 SQL Server 的最低内存要求是 2GB。


    *   *操作系统*：你也可以使用其他支持的 Linux 发行版。Docker 支持的最低版本是 CentOS 7（对于 RHEL，你至少需要 7.4 版本）和
    Ubuntu Server Xenial 16.04（LTS）。为了让你开始在 Linux 上运行 Docker，我们将使用`CentOS 7.6 (1810)`和`Ubuntu
    Server Xenial 16.04 (LTS)`。你可以从[`www.centos.org/download/`](https://www.centos.org/download/)下载
    CentOS 的 ISO 镜像，从[`http://releases.ubuntu.com/16.04/`](http://releases.ubuntu.com/16.04/)下载
    Ubuntu Server Xenial 的 ISO 镜像。对于 Ubuntu，请务必选择*Server install image*，而不是*Desktop
    image*。


    *   *磁盘空间*：你可能会对 Linux 的磁盘空间需求感到惊讶——即使在运行 SQL Server 时也是如此。在第*5*章中，你将看到在 Linux
    上运行 SQL Server 容器与在 Windows 上运行 SQL Server 在磁盘空间需求上的差异。对于任何 Linux 安装，20GB 是我的绝对最低要求。


    **注意**

    关于在 Linux 操作系统上运行 Docker 引擎，确实没有官方支持的最低系统要求。我花了几个小时在 Docker 文档中搜索他们认定的支持最低系统要求。然而，你找到的会是运行
    Docker Universal Control Plane（用于多主机 Docker 集群的集群管理解决方案）的最低系统要求。在学习的早期阶段，请先忽略这个，留待更高级的配置时使用。'
- fmt: '## Basic Linux Commands You Need to Get Started


    This is not a book about Linux. The purpose of this book is not to turn you into
    a full-blown Linux geek (although I’m not going to stop you from being one). However,
    since you will be deploying Docker on a Linux operating system, you need to learn
    a few basic commands, just enough to get you started. Once you’re comfortable
    working with Linux, you can get deeper on some of these commands.


    I used to refer to the Linux man (short for manual) pages for documentation on
    any command that I would like to use. Now, a few keystrokes and your favorite
    search engine are all you need – the Internet has everything you need.


    The goal in this chapter is to install and configure Docker on Linux. The following
    are the Linux commands that you need to accomplish this task:


    *   `sudo` : Short for “substitute user, do.” A security best practice in Linux
    is to log in as an ordinary user, not the superuser (or root). `Root` is like
    the local administrator account in Windows – it can do just about anything. Since
    you’re not going to log in using the `root` account, you must prefix all administrative
    commands with `sudo` (nobody’s going to stop you from logging in as `root` but,
    please, I beg you not to). By default, this will switch the security context of
    your interactive shell user to that of `root`.

    *   `yum` : Short for Yellow Update Manager, a package management utility developed
    by Red Hat for installation, updates, and removal for Red Hat package manager
    (RPM) systems. This is the package management utility available on both RHEL and
    CentOS.

    *   `yum-config-manager` : A utility to manage package repositories, commonly
    on RHEL/CentOS systems.

    *   `apt-get` : Used with the Advanced Package Tool (APT). It’s Ubuntu and other
    Debian-based Linux’s version of `yum`. For managing packages on Ubuntu, this is
    the tool of choice.

    *   `add-apt-repository` : Utility for adding a repository on Ubuntu and other
    Debian-based Linux distros.

    *   `ls`: Linux’s version of `dir` on Windows, used to list directories and the
    files in them.

    *   `grep` : Comes from the name `globally search a regular expression and print`.
    A tool for searching plaintext data sets for lines that match a regular expression.
    I use this mostly to search either a text file or an output of a command for specific
    text.

    *   `cat` : Short for catenate. A utility used to process files such as reading
    a text file and displaying its contents, copying contents of a text file into
    another file, or combining contents of multiple files. I use this a lot for displaying
    contents of files on the screen.

    *   `systemctl` : A command used to manage `systemd` – a system and service management
    utility on Linux. You use this to stop, start, restart, and check status of daemons
    on Linux.


    Also be sure to learn the pipe operator (`|`). You use the `pipe` operator to
    send output from one command to another. It’s like the `pipe` operator in PowerShell.


    *Be sure to remember your password!* You will be running `sudo` a lot to run other
    commands, so you had better remember your password. And, please don’t write it
    on a Post-it note or a piece of paper for everyone to see. I’ll shoot you with
    a Nerf gun if I see you. I recommend using a password manager to store your login
    information. LastPass is a popular password manager for Windows that stores encrypted
    password online.


    There are other Linux packages that you need to install, and each one of them
    has their own syntax. Usage of these packages will be covered later in the chapter
    where they are needed.


    ## Installing Docker on CentOS Linux


    The process of installing Docker on CentOS is a little bit different from that
    of Ubuntu. So, I decided to break the installation process down into two sections
    – one for CentOS and one for Ubuntu. Should you decide to install Docker on a
    CentOS machine, this section outlines the process for you.


    ### Update the CentOS System Packages


    Use the following `yum` command to update all installed packages with available
    updates. The following example command demonstrates the use of the Linux commands
    you’ve learned in the previous section:


    ```

    sudo yum update

    ```


    Here, you prefix the `yum` command with the `sudo` command, so you can run it
    in the security context of the root user. And like most Linux commands, the `yum`
    command has several subcommands that you can use to perform tasks. The `update`
    subcommand is used to update all installed packages. Think of this as the CentOS
    equivalent of running Windows Updates.


    Notice the prompt for password when you run the command in Figure [3-1](#484552_1_En_3_Chapter.xhtml#Fig1).
    This is the password of the currently logged in user who wants to run the command,
    not of the root user.


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig1_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig1_HTML.jpg)

    Figure 3-1

    Password prompt for running Linux commands with `sudo`


    As a security best practice, this is how you will be running commands in Linux.


    Depending on the state of your CentOS machine, running `yum update` may require
    you to download all the necessary updates. Figure [3-2](#484552_1_En_3_Chapter.xhtml#Fig2)
    shows a prompt to install and upgrade all the necessary packages on the system.


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig2_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig2_HTML.jpg)

    Figure 3-2

    Prompt to download all the necessary packages


    Type `y` to download and install all the updates.


    ### Install the Required Dependencies


    One thing I like about Linux is that using package managers will install what
    you tell it to, including the required dependencies. This practice reduces the
    disk space requirements and potential attack surface. So, when you have a package
    like Docker that depends on other packages, you need to either manually install
    those other packages or install Docker using a package manager that automates
    the installing of dependent packages. You only have to do the installation of
    all the packages once, though.


    You need to install several packages that Docker depends on. These other packages
    are


    *   `yum-utils` : This is more of an extension to the `yum` command. It’s a collection
    of tools that integrate with `yum` to perform tasks such as managing repositories,
    installing debugging packages, cleaning up packages, and the like. You can think
    of this as `yum` on steroids.

    *   `device-mapper-persistent-data` : This package provides storage virtualization
    and abstraction capabilities for Linux. Docker’s own Device Mapper storage driver
    leverages this package’s capabilities for advanced volume and storage management.
    `Chapter 5` covers how the filesystem works when working with Docker containers
    in more detail.

    *   `lvm2` : The LVM2 or Logical Volume Manager package provides common logical
    volume management for the Linux kernel such as RAID configuration, volume resizing,
    volume snapshots, and the like. Think of this as Linux’s version of Windows’ Disk
    Management utility.


    Run each of the following `yum install` commands to install the required dependencies:


    ```

    sudo yum install yum-utils

    sudo yum install device-mapper-persistent-data

    sudo yum install lvm2

    ```


    If you’re as lazy as I am, you can run the following single `yum install` command
    to do the same:


    ```

    sudo yum install yum-utils device-mapper-persistent-data lvm2

    ```'
