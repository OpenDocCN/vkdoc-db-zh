    # 探索容器日志


    在`第 4 章`中，我讨论了未能满足 SQL Server 密码复杂性策略如何可能导致容器无法启动。如果它运行在 Windows 或 Linux 主机上，我本可以轻松地使用文本编辑器打开
    SQL Server 错误日志来检查可能的原因。但由于 SQL Server 错误日志位于容器内部，除非容器启动，或者将`/var/opt/mssql`目录挂载到
    Linux Docker 主机上，否则我无法访问它。这就像试图访问一个已停止的虚拟机内部的 SQL Server 错误日志。好在 Docker 通过`docker
    logs`命令暴露了这些日志。


    ## 使用`docker logs`查看容器日志


    以下命令将创建一个新的 Linux 上的 SQL Server 容器。请注意`SA_PASSWORD`参数值如何不符合 SQL Server 密码复杂性策略。


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=password12" -p 1433:1433 --name
    sqldevlinuxcon01 -d -h linuxsqldev01 mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    如果使用`docker ps -a`命令检查所有容器的状态，您会看到容器立即退出，如图 6-15 所示。


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig15_HTML.jpg](img/484552_1_En_6_Fig15_HTML.jpg)


    图 6-15：Linux 上的 SQL Server 容器在启动后立即终止


    正如我在`第 4 章`中提到的，我花了很多时间试图找出导致容器停止的原因。直到我查看了日志，才发现真正的问题所在。使用`docker logs <容器名称>`命令可以查看容器内部生成的
    SQL Server 错误日志，如图 6-16 所示。在发现真正的问题与`SA_PASSWORD`参数值有关后，我进行了必要的修改并重新运行了命令。


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig16_HTML.jpg](img/484552_1_En_6_Fig16_HTML.jpg)


    图 6-16：运行`docker logs`以探索 SQL Server 错误日志


    ## 关于 Windows 行为的重要说明


    与 Linux 不同，在 Windows 上未能满足 SQL Server 密码复杂性策略不会终止容器，也不会在 SQL Server 错误日志中创建条目。容器将继续运行，但不允许您使用提供的`sa`凭据登录。您将需要运用您的
    DBA 技能，使用`docker exec`命令以交互方式登录到容器，并在单用户模式下启动 SQL Server 实例，以便更改`sa`密码。


    ## 实时查看日志


    您还可以使用带有`-f`参数的`docker logs`命令来实时查看 SQL Server 错误日志。我发现这在排查 SQL Server 相关问题时，比运行`sp_readerrorlog`要好得多，因为我可以在事情发生时准确看到正在发生的情况。这就像在
    SQL Server 错误日志中拥有一个实时跟踪。图 6-17 并排展示了使用`sp_readerrorlog`和`docker logs`命令的情况。


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig17_HTML.jpg](img/484552_1_En_6_Fig17_HTML.jpg)


    图 6-17：使用`sp_readerrorlog`与`docker logs`命令探索 SQL Server 错误日志的对比


    # 检查 Docker 守护进程的状态


    了解 Docker 守护进程的状态也是确保其平稳运行的关键。在需要进行故障排除时，它也能引导您发现问题。在`第 3 章`于 Linux 主机上安装 Docker
    守护进程后，我们做的一件事就是使用以下命令检查其状态。`-l`参数会显示完整消息，而不会用省略号截断。图 6-18 显示了 Linux 主机上 Docker
    守护进程的状态。


    ```

    sudo systemctl status docker -l

    ```


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig18_HTML.jpg](img/484552_1_En_6_Fig18_HTML.jpg)


    图 6-18：在 Linux 中显示 Docker 守护进程的状态


    由于 Docker 就像其他任何 Linux 守护进程一样，它也会将其日志发送到`systemd`日志。您可以将`systemd`日志视为 Windows
    事件日志。通过运行以下命令，您可以从`systemd`日志访问所有系统事件：


    ```

    sudo journalctl

    ```


    但是，鉴于它包含所有系统事件和日志，信息量可能有点大。我们只想要来自 Docker 守护进程的系统日志。要显示`systemd`日志中的 Docker 守护进程日志，请运行以下`journalctl`命令。如果需要显示每个条目的更详细信息，也可以传递`-o
    verbose`参数。


    ```

    sudo journalctl -u docker

    ```


    这些日志存储在 Ubuntu 的`/var/log/syslog`文件或 CentOS 的`/var/log/messages`文件中。您可以使用以下命令检索与
    Docker 相关的事件。只需根据您的 Linux 发行版替换适当的文件名即可。图 6-19 显示了在 CentOS Docker 主机上运行该命令时显示的与
    Docker 相关的事件。


    ```

    sudo cat /var/log/messages | grep docker

    ```


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig19_HTML.jpg](img/484552_1_En_6_Fig19_HTML.jpg)


    图 6-19：在 Linux 中显示 Docker 守护进程的状态


    在 Windows 主机上，由于事件被写入 Windows 事件日志，您可以筛选应用程序日志以仅显示来自`docker`的事件源。或者，您可以使用以下 PowerShell
    命令：


    ```

    Get-EventLog -LogName Application -Source Docker

    ```


    # 总结


    在本章中，就管理 Docker 和容器而言，我们涵盖了很多内容。但这还不是全部。这足以让您从 SQL Server DBA 的角度开始管理容器和 Docker
    主机。随着您更多地使用 Docker，您将更深入地接触 Linux 操作系统。我相信您从`第 3 章`开始已经学到了很多关于 Linux 的知识。而我们只是触及了表面。我可以保证，当您读完本书时，您将能够处理
    Linux 文件系统、配置守护进程、管理系统资源等等。当您在 Docker 容器中运行更多 SQL Server 时，您别无选择，只能精通 Linux。


    在“在主机和容器之间共享文件”一节中，我介绍了使用卷（volumes）使 Docker 主机上的目录在容器内部可用。下一章将更详细地介绍这一点，以及如何为有状态的应用程序（特别是
    SQL Server）管理和持久化容器内的数据。此外，如果无法在其中持久化数据，关系数据库又有何用？我们将确保这种情况不会发生在您容器内的 SQL Server
    数据库中。

