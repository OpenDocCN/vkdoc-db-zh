  trans: '

    # 云服务商如何实现基础设施即服务


    您是否曾好奇过，像亚马逊网络服务（AWS）、微软 Azure 或谷歌云平台这样的云服务商，如何能以极短的停机时间轻松扩展虚拟机的规模？他们会告诉您选择一个更大的虚拟机规格并重启机器。仅此而已。起初，我对这种“最小停机时间的扩展”方法持怀疑态度，因为它违背了我所知的关于升级和扩展服务器的一切认知。我作为数据中心工程师从事这项工作多年，这肯定不是几分钟就能完成的——尤其是对于拥有大型数据库的
    SQL Server 而言。于是，我在微软 Azure 和 AWS 上都进行了尝试。图 7-1 展示了云服务商从概念上如何实现这种虚拟机的扩展方法。


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig1_HTML.jpg](img/484552_1_En_7_Fig1_HTML.jpg)


    *图 7-1：虚拟机如何在云端以最小停机时间进行扩展*


    我感到震惊。它确实如文档所述那样有效。但我仍未完全信服。我结合自己所有关于扩展运行 SQL Server 数据库的服务器的知识，开始进行思想实验（您知道的，就是那种我们用来假装自己比普通数据库管理员聪明的实验）。以下是事实。


    SQL Server 数据库本质上就是文件——`MDF`、`NDF`和`LDF`文件——数据库引擎通过访问这些文件来读写数据。这些文件存储在连接到具有计算资源（CPU
    和内存）的服务器的存储子系统上。如果我需要扩展一台服务器以增加计算能力，并要求停机时间极短，我通常会有另一台安装了相同版本和版本的操作系统及 SQL Server
    的服务器可用。然后，我会开始在机器之间复制数据库，使用`数据库镜像`或`日志传送`。如果有可用的存储资源，我会复制整个存储子系统——同时让目标机器上的 SQL
    Server 数据库引擎保持停止状态——而不仅仅是复制数据库。一旦准备好切换到扩展后的机器，我只需停止源机器，完成复制过程，然后在目标机器上启动 SQL Server
    数据库引擎。停止源机器上的 SQL Server 数据库引擎会使其干净地关闭所有数据库，然后终止服务。这涉及提交或回滚事务、将所有脏页写入磁盘，然后在事务日志中写入一个条目。在目标机器上启动
    SQL Server 数据库引擎会使其运行恢复过程——读取事务日志并在将数据库联机之前提交或回滚事务。自 SQL Server 诞生以来，它就是这样工作的。所以，这里没什么新东西。


    **提示**


    文章《Understanding Logging and Recovery in SQL Server》（理解 SQL Server 中的日志记录和恢复）包含了更多关于
    SQL Server 在日志记录和恢复方面内部原理的信息。这是基础性信息，其概念也适用于除 SQL Server 之外的所有商业关系数据库管理系统。请访问
    [`https://docs.microsoft.com/en-us/previous-versions/technet-magazine/dd392031(v=msdn.10)`](https://docs.microsoft.com/en-us/previous-versions/technet-magazine/dd392031%2528v%253Dmsdn.10%2529)
    查阅该文章。


    还记得我说的思想实验吗？如果不再需要为源和目标机器分别配备两个独立的存储子系统来存放数据库文件，而是简单地将存储与服务器解耦呢？如果存储不是直接连接到服务器，而我们只是有一个指向存储的指针呢？服务器可以访问远程存储，SQL
    Server 数据库引擎也可以访问这些文件。将计算与存储解耦，使您能够以最小的停机时间执行扩展过程，因为您所需要做的就是将新的计算资源指向旧的存储。这不已经在
    SQL Server 2012 中可用了吗——将数据库文件存储在`SMB`文件共享中？SQL Server 2014 中呢——将数据库文件存储在`Azure
    Blob 存储`中？


    **注意**


    当被问及我跟上并掌握新技术的秘诀时，我通常的回答是“不要忘记旧的”。有趣的是，我们看到这些新技术特性要么是旧技术的改进，要么是旧技术的组合。以`SQL Server
    Always On 可用性组`为例。它是`数据库镜像`和`Windows Server 故障转移群集`的结合——这两者自 SQL Server 2005 起就已可用（故障转移群集则更早）。可读的辅助副本呢？它是`行版本控制`的实时实现，同样，这个特性自
    SQL Server 2005 起就已可用。SQL Server 2008 中引入的`文件流`特性呢？它是`内存中 OLTP`的支柱。我可以没完没了地列举每个新版
    SQL Server 引入的不同特性，并且我能找到它们在某个旧特性中的根源。要么是微软已经预见到了未来并正在引领市场走向他们的方向，要么是他们非常擅长最大化利用现有的技术投资。我认为这是一个绝妙的策略。我猜我的主日学老师甚至在
    Oracle 与 Neo 进行那场对话之前就对技术有所了解。她一直告诉我《圣经》中一句非常著名的话：“已有的事，后必再有；已行的事，后必再行。日光之下，并无新事。”


    啊，原来他们就是这样做的。图 7-2 展示了云服务商通过将计算与存储解耦，从概念上如何实现虚拟机的这种扩展方法。


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig2_HTML.jpg](img/484552_1_En_7_Fig2_HTML.jpg)


    *图 7-2：计算与存储解耦使得虚拟机能够以最小的停机时间进行扩展*


    仔细想想，我们几十年来一直在使用这种方法，自从 2000 年代初`存储区域网络（SAN）`出现以来就是如此。服务器（计算）运行应用程序，而数据存储在其外部——即存储中。进行这个思想实验让我想起了
    2006 年为一个大型 SQL Server 2000 `故障转移群集实例（FCI）`所做的迁移项目。由于 SQL Server `FCI`的计算与存储是解耦的，我们通过将其连接到现有的`SAN`并（当然经过适当验证后）将其加入群集，相当迅速地更换了其中一个有问题的故障转移群集节点。这也让我想起了
    2010 年做的另一个数据中心迁移项目。遵循前面描述的工作流顺序，并在地理位置之间复制存储子系统，使我能够在不到一小时内将 400 多台 SQL Server
    物理机从洛杉矶的一个数据中心迁移到拉斯维加斯的另一个数据中心。


    由于虚拟机只是一个存储在磁盘上的文件系统格式，加上代表计算资源（CPU、内存、网络）的元数据，扩展起来就容易多了。只需将存储从旧虚拟机重定向到新虚拟机即可。云服务商可以在后台通过自动化的工作流过程完成这一切，包括在源和目标虚拟机上分别正确停止和启动
    SQL Server 服务的步骤，只要底层硬件拥有支持新虚拟机的适当计算资源。

    '
- fmt: '## Docker Volumes


    容器短暂且不可变的概念，与计算和存储解耦的设计，共同使得Docker能够运行像关系型数据库这样的有状态应用。尽管容器最初是为运行无状态应用而设计的，但将数据存储在容器之外，使你能够利用其短暂和不可变的特性，同时也能在你决定删除程序（我指的是容器）时保留数据。


    回想第5章，容器由一个存储在Docker主机本地存储上的文件系统层组成。该文件系统层构成了容器本身，并与其生命周期绑定。文件系统层——包括你在其中存储的数据——在创建容器时被创建，在删除容器时被删除。非常直接，对吧？为了将计算与存储解耦，我们需要一个存在于容器之外的对象。这时就需要Docker
    Volumes。


    Docker Volume是一个表示容器外部文件系统的对象。它是容器联合文件系统之外的一个目录，在Docker主机的文件系统上作为一个普通的目录存在。Docker
    Volumes是持久化容器生成和使用的数据的首选方式。我喜欢把Docker Volumes想象成一个网络共享文件夹——它在操作系统（容器）内看起来像一个文件夹，但实际上是外部的。卷存在于容器之外，允许你向其中添加任意多的数据而不影响容器的大小，这对于SQL
    Server数据库来说是完美的。而且，因为它是一个存在于容器之外的对象，所以使用其专属的 `docker volume` 子命令进行管理。例如，如果你想创建一个Docker
    Volume，可以运行以下命令。请务必提供一个有意义的名称。否则，Docker会为它分配一个64字符的GUID值作为名称。我相信在读完第5章后，你肯定不想再看到更多那样的64字符GUID值名称了。


    ```

    docker volume create samplevolume

    ```


    默认情况下，创建Docker Volume会在主机上创建一个目录，在Linux中位于 `/var/lib/docker/volumes`，在Windows中位于
    `C:\ProgramData\docker\volumes`。


    创建Docker Volume后，你可以使用 `docker volume inspect` 命令检查其元数据：


    ```

    docker volume inspect samplevolume

    ```


    图7-3展示了在Windows主机和Linux主机上创建的Docker Volume的元数据。请注意以下信息：


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig3_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig3_HTML.jpg)


    图7-3

    创建和检查Docker Volume元数据


    *   **Driver**: 这显示了存储卷驱动程序的名称。默认情况下，Docker会使用内置的 `local` 驱动创建卷。这意味着这些卷只在其创建所在的主机上的容器可用。

    *   **Mountpoint**: 这显示了Docker主机本地文件系统中目录的完整路径。当你将卷挂载到容器时，容器中生成的任何数据都将存储在这里。


    因为Docker Volumes本质上只是文件系统层中的目录，我可以直接从主机向这些目录添加和修改文件，而无需运行容器。


    提示


    在Linux上工作时，请始终注意权限。在Windows中，我只需是本地管理员组的成员就可以访问 `C:\ProgramData\docker\volumes`
    目录，但在Linux中情况并非如此。`root` 用户拥有 `/var/lib/docker/volumes` 目录（以及 `/var/lib/docker`
    下的所有内容）。为了直接访问这些目录并进行任何更改，你需要拥有 `root` 权限。你可以切换到 `root` 用户，或者在命令前加上 `sudo`。


    图7-4显示了我分别在Linux主机和Windows主机上复制到Docker Volume中的一个简单文件。请记住，我当前没有任何正在运行的容器。


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig4_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig4_HTML.jpg)


    图7-4

    对Docker Volume进行更改


    你可以使用 `docker volume ls` 命令列出所有可用的Docker Volumes。最后，你可以使用 `docker volume rm` 命令删除特定的Docker
    Volume，如下所示：


    ```

    docker volume rm samplevolume

    ```


    我不会删除这里创建的卷。我将在下一节中将其与一个容器一起使用并作为卷挂载。


    你可以运行 `docker volume` 命令（如图7-5所示）来显示管理Docker Volumes的可用子命令列表。


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig5_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig5_HTML.jpg)


    图7-5

    列出管理Docker Volume的所有命令


    ## 将卷挂载到容器


    让我们使用上一节创建的Docker Volumes，并将其挂载到容器。对于Linux容器，我将使用CentOS 7镜像，并将 `samplevolume`
    卷挂载到它。使用 `docker run` 命令的 `--mount` 参数，如下所示。我传入了 `-it` 参数（`i` 用于交互，`t` 用于伪TTY或终端会话），以便检查其内部的文件系统。`docker
    run` 命令的 `--mount` 参数使用易于理解的 `key=value` 对。在提供的示例中，`source` 是Docker Volume的名称，`target`
    是容器内的目录。


    ```

    docker run --mount source=samplevolume,target=/tmp/dockervolume -it centos:7

    ```


    你将看到在创建容器之前复制到卷中的 `thisIsLinux.txt` 文件。图7-6展示了从容器内部看到的该文件。


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig6_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig6_HTML.jpg)


    图7-6

    将卷挂载到Linux容器并显示其内容


    对于Windows容器，我将使用Windows Server 2016 Nano Server镜像，并将 `samplevolume` 卷挂载到它。但我不使用
    `docker run` 命令的 `--mount` 参数，而是使用 `-v`（或 `--volume`）参数。这是在Windows Server容器中挂载卷的支持方式。有关如何处理Windows
    Server容器中的持久存储，请参考 [*https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/persistent-storage*](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/persistent-storage)。


    ```

    docker run -v samplevolume:c:\dockervolume -it microsoft/nanoserver:sac2016 powershell

    ```


    你将看到在创建容器之前复制到卷中的 `thisIsWindows.txt` 文件，如图7-7所示。


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig7_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig7_HTML.jpg)


    图7-7

    将卷挂载到Windows容器并显示其内容'
  raw: '## Docker Volumes


    The concept behind containers being ephemeral and immutable together with decoupling
    compute from storage is what allows Docker to run stateful applications like relational
    databases. Despite having been originally designed to run stateless applications,
    storing data outside of the containers allows you to leverage their ephemeral
    and immutable nature while being able to store data if and when you decide to
    delete programs. I mean, containers.


    Recall in *Chapter* [*5*](#484552_1_En_5_Chapter.xhtml) that a container consists
    of a filesystem layer stored on the local storage of the Docker host. The filesystem
    layer is what makes up the container and is tied to its lifecycle. The filesystem
    layer – including the data you store inside it – gets created when you create
    the container and deleted when you delete the container. Pretty straightforward,
    isn’t it? To decouple the compute from the storage, we need an object that exists
    outside of the container. Enter Docker volumes.


    A Docker volume is an object that represents a filesystem outside of the container.
    It is a directory outside of the container’s union filesystem and exists as normal
    directory with files on the Docker host’s filesystem. Docker volumes are the preferred
    way to persist data generated and used by containers. I like to think of Docker
    volumes as a network shared folder – it looks like a folder inside the operating
    system (container) but is external to it. Volumes being outside of the container
    allow you to add as much data into it without affecting the size of the container,
    which are perfect for SQL Server databases. And because it is an object that exists
    outside of the container, it is managed using its own `docker volume` subcommand.
    For example, you can run the following command if you want to create a Docker
    volume. Be sure to provide a meaningful name. Otherwise, Docker will assign a
    64-character GUID value for the name. I’m sure you don’t want to see more of those
    64-character GUID value names after reading *Chapter* [*5*](#484552_1_En_5_Chapter.xhtml).


    ```

    docker volume create samplevolume

    ```


    By default, creating a Docker volume creates a directory on the host, which is
    located in */var/lib/docker/volumes* in Linux and *C:\ProgramData\docker\volumes*
    on Windows.


    After creating the Docker volume, you can inspect the metadata by using the `docker
    volume inspect` command here:


    ```

    docker volume inspect samplevolume

    ```


    Figure [7-3](#484552_1_En_7_Chapter.xhtml#Fig3) displays the metadata of the created
    Docker volume on both Windows host and Linux host. Pay attention to the following:


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig3_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Creating and inspecting Docker volume metadata


    *   *Driver*: This displays the name of the storage volume driver. By default,
    Docker will create volumes with the built-in local driver. This means that the
    volumes will only be available to containers on the host they are created on.


    *   *Mountpoint*: This displays the full path of the directory in the Docker host’s
    local filesystem. When you attach the volume to a container, any data generated
    in the container will be stored here.


    Because Docker volumes are simply directories in the filesystem layer, I can add
    and modify files in these directories directly from the host without having to
    run a container.


    Tip


    Always keep permissions in mind when working on Linux. Unlike in Windows where
    I can access the *C:\ProgramData\docker\volumes* directory simply by being a member
    of the local administrator group, that’s not the case in Linux. The *root* user
    owns the */var/lib/docker/volumes* (and everything else in the */var/lib/docker*)
    directory. In order to directly access the directories and make any changes, you
    need to have *root* privileges. You either switch to *root* or prefix commands
    with *sudo*.


    Figure [7-4](#484552_1_En_7_Chapter.xhtml#Fig4) shows a simple file that I copied
    to the Docker volume on both the Linux host and Windows host. Keep in mind that
    I do not currently have any running containers.


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig4_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Making changes to the Docker volume


    You can list all the available Docker volumes by using the `docker volume ls`
    command . Finally, you can delete a specific Docker volume by using the `docker
    volume rm` command like the one here:


    ```

    docker volume rm samplevolume

    ```


    I won’t delete the volume that I created here. I’ll use it with a container and
    mount it as a volume in the next section.


    You can display the list of available subcommands for managing Docker volumes
    by running the `docker volume` command as shown in Figure [7-5](#484552_1_En_7_Chapter.xhtml#Fig5).


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig5_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    List all commands for managing Docker volume


    ## Attach Volumes to Containers


    Let’s use the Docker volumes created in the previous section and attach them to
    a container. For a Linux container, I’ll use a CentOS 7 image and attach the *samplevolume*
    volume to it. Use the *--mount* parameter of the *docker run* command as shown
    in the following. I’m passing a *-it* parameter (*i* for interactive and *t* for
    pseudo-TTY or a terminal session) so I can inspect the filesystem inside it. The
    *--mount* parameter of the *docker run* command uses *key=value* pairs that are
    easy to understand. In the example provided, *source* is the name of the Docker
    volume and *target* is the directory inside the container.


    ```

    docker run --mount source=samplevolume,target=/tmp/dockervolume -it centos:7

    ```


    You will see the *thisIsLinux.txt* file that was copied into the volume before
    the container was created. Figure [7-6](#484552_1_En_7_Chapter.xhtml#Fig6) displays
    the file as seen from inside the container.


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig6_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Attaching a volume to a Linux container and displaying its contents


    For a Windows container, I’ll use the Windows Server 2016 Nano Server image and
    attach the *samplevolume* volume to it. But instead of using the *--mount* parameter
    of the *docker run* command, I’ll be using the *-v* (or *--volume*) parameter.
    This is the supported way of attaching volumes in Windows Server containers. Refer
    to [*https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/persistent-storage*](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/persistent-storage)
    on how to deal with persistent storage in Windows Server containers.


    ```

    docker run -v samplevolume:c:\dockervolume -it microsoft/nanoserver:sac2016 powershell

    ```


    You will see the *thisIsWindows.txt* file that was copied into the volume before
    the container was created, as shown in Figure [7-7](#484552_1_En_7_Chapter.xhtml#Fig7).


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig7_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Attaching a volume to a Windows container and displaying its contents'
