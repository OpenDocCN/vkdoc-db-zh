    Linux system. The following command is specific to SQL Server 2017:


    ```

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    ```


    The following command is specific to SQL Server 2019:


    ```

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2019
    xenial main"

    ```


    Note


    Recall the */etc/apt/sources.list* file described in Chapter [3](#484552_1_En_3_Chapter.xhtml).
    This file contains the list of APT software repositories, the location of the
    packages that you want to install on your Ubuntu Linux system. The previous command
    simply adds an entry in the file for the Microsoft SQL Server Ubuntu package.
    But you might be wondering where I got that value. The value to add to the */etc/apt/sources.list*
    file using the *add-apt-repository* command is from the [*https://packages.microsoft.com/config/ubuntu/16.04/mssql-server-2017.list*](https://packages.microsoft.com/config/ubuntu/16.04/mssql-server-2017.list)
    file. You can download the specific list file for the version of SQL Server on
    Ubuntu package that you want to install.


    After adding the Microsoft SQL Server Ubuntu repository to the */etc/apt/sources.list*
    file, you can run the following command to install SQL Server. Because you have
    made modifications to your Ubuntu system by adding the Microsoft SQL Server Ubuntu
    package repo, you need to run the `apt-get update` command prior to installing
    SQL Server:


    ```

    sudo apt-get update

    sudo apt-get install -y mssql-server

    ```


    After the package installation completes, run the *mssql-conf* script with the
    following *setup* parameter to configure SQL Server using the default configuration.
    Follow the prompts to choose your SQL Server edition and set the *sa* password.


    ```

    sudo /opt/mssql/bin/mssql-conf setup

    ```


    If you observe the installation process, it consists of running some commands
    and passing parameter values. If you can combine all the steps in a script, you
    can automate the installation process and not have to type responses to prompts.
    That’s the idea behind unattended installation.


    ### Unattended Installation


    Performing an unattended installation of SQL Server on Linux requires an understanding
    of running scripts in Linux. I’ll save the details of how to run scripts on Linux
    at a later section. This section will describe what goes into the script for performing
    an unattended installation.


    Recall how you manually installed SQL Server on both CentOS and Ubuntu systems.
    You run several commands that consist of parameters. If you look at the command
    to install SQL Server on both CentOS and Ubuntu – *sudo yum/apt-get install -y
    mssql-server* – you will see a *-y* parameter. This is a parameter that all package
    managers use, and it assumes that the answer to any question which would be asked
    during the installation process is *yes*. This also allows users to perform installation
    without user interaction. I usually do the manual installation several times before
    I perform an unattended installation to see exactly what the package is asking
    me to do that requires a *yes/no* response. I certainly don’t want a prompt that
    asks, “have you killed anyone recently?” and carelessly typing *yes*. I may not
    be a lawyer but I try my best and read the fineprint when installing software
    on my computer or smartphone.


    Similarly, you can pass different parameters when running the */opt/mssql/bin/mssql-conf*
    script as part of the setup process. These parameters, also called *environment
    variables* , are described in [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables?view=sql-server-linux-2017*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables%253Fview%253Dsql-server-linux-2017)
    for SQL Server 2017 (the list is similar for SQL Server 2019). Recall the environment
    variables passed to the *docker run* command in *Chapter* [*4*](#484552_1_En_4_Chapter.xhtml).
    They are the same environment variables and can be used to configure SQL Server
    on Linux during the setup process so as not to require user interaction. If you
    took note of the manual installation process, there are three prompts that required
    user input:


    *   *MSSQL_PID*: Similar to the PID parameter when installing SQL Server on Windows –
    either the product ID or the SQL Server edition. If not specified, it will default
    to Developer Edition.


    *   *ACCEPT_EULA*: I’m sure you already know this by now.


    *   *MSSQL_SA_PASSWORD*: The *sa* login’s complex password.


    Given these three environment variables, you can run the */opt/mssql/bin/mssql-conf*
    script with their corresponding values as shown here:


    ```

    sudo MSSQL_PID=Enterprise ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    ```


    Note


    I’ve seen examples from Microsoft documentation, blog posts, and sample codes
    on GitHub of running the */opt/mssql/bin/mssql-conf* script as part of the setup
    process using the *-n* parameter. One example can be found on [*https://docs.microsoft.com/en-ca/sql/linux/sample-unattended-install-redhat?view=sql-server-ver15#sample-script*](https://docs.microsoft.com/en-ca/sql/linux/sample-unattended-install-redhat%253Fview%253Dsql-server-ver15%2523sample-script).
    Refer to the line *echo Running mssql-conf setup...* where it shows the `/opt/mssql/bin/mssql-conf
    -n setup` code with the environment variables. The *-n* (also *--noprompt*) parameter
    does not prompt the user and uses environment variables or the default settings
    during the installation. My curious mind wanted to know if there is any difference
    in behavior so I tested running the command with and without the *-n* parameter.
    It turns out that there really is no difference between the two. So, to save on
    a few keystrokes and several bytes of characters, I opted not to use the *-n*
    parameter in my unattended installation.


    Combining all the commands on a CentOS Linux system to


    *   Download the Microsoft SQL Server Red Hat repository configuration file for
    SQL Server 2017


    *   Download and install the SQL Server installation packages for RHEL


    *   Run the */opt/mssql/bin/mssql-conf* script with the *setup* parameter and
    environment variables


    *   Enable the SQL Server daemon to start on system boot


    your script will include the commands as shown in the following:


    ```

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    sudo yum install -y mssql-server

    sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    ```


    Going through the steps in performing the manual installation of SQL Server on
    an Ubuntu Linux system, the corresponding script to perform an unattended installation
    will include the commands as shown in the following:


    ```

    curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    sudo apt-get update

    sudo apt-get install -y mssql-server

    sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    ```


    Even running these commands and providing the password to run them as *sudo* give
    you some form of unattended installation. But we’re not done yet. You have to
    wait until later in the chapter to have a fully automated script that will perform
    an unattended installation of SQL Server on Linux.'
  trans: '

    接下来，你需要将 Microsoft SQL Server Ubuntu 软件仓库添加到你的 Ubuntu Linux 系统中。以下命令专门适用于 SQL
    Server 2017：


    ```

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    ```


    以下命令专门适用于 SQL Server 2019：


    ```

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2019
    xenial main"

    ```


    注意


    回想一下第 3 章描述的 `/etc/apt/sources.list` 文件。该文件包含了 APT 软件仓库的列表，即你想要在 Ubuntu Linux
    系统上安装的软件包的位置。前面的命令只是在该文件中为 Microsoft SQL Server Ubuntu 软件包添加了一个条目。但你可能想知道这个值是从哪里来的。通过
    `add-apt-repository` 命令添加到 `/etc/apt/sources.list` 文件中的值，来自于 `https://packages.microsoft.com/config/ubuntu/16.04/mssql-server-2017.list`
    文件。你可以下载与你想要安装的 Ubuntu SQL Server 版本对应的特定列表文件。


    在将 Microsoft SQL Server Ubuntu 软件仓库添加到 `/etc/apt/sources.list` 文件后，你可以运行以下命令来安装
    SQL Server。因为你通过添加 Microsoft SQL Server Ubuntu 软件包仓库修改了你的 Ubuntu 系统，所以在安装 SQL
    Server 之前，你需要先运行 `apt-get update` 命令：


    ```

    sudo apt-get update

    sudo apt-get install -y mssql-server

    ```


    软件包安装完成后，运行带有以下 `setup` 参数的 `mssql-conf` 脚本，以使用默认配置配置 SQL Server。根据提示选择你的 SQL
    Server 版本并设置 `sa` 密码。


    ```

    sudo /opt/mssql/bin/mssql-conf setup

    ```


    如果你观察安装过程，它包括运行一些命令和传递参数值。如果你能将这些步骤全部组合到一个脚本中，你就可以自动化安装过程，而不必手动输入对提示的响应。这就是无人参与安装背后的思想。


    ### 无人参与安装


    在 Linux 上执行 SQL Server 的无人参与安装需要了解如何在 Linux 中运行脚本。我将在后面的章节中保存关于如何在 Linux 上运行脚本的细节。本节将描述执行无人参与安装的脚本中包含哪些内容。


    回想一下你如何在 CentOS 和 Ubuntu 系统上手动安装 SQL Server。你运行了几个包含参数的命令。如果你查看在 CentOS 和 Ubuntu
    上安装 SQL Server 的命令——`sudo yum/apt-get install -y mssql-server`——你会看到一个 `-y` 参数。这是所有软件包管理器都使用的参数，它假定对安装过程中可能提出的任何问题的回答都是
    `是`。这也允许用户无需用户交互即可执行安装。我通常在进行无人参与安装之前，会手动安装几次，以确切了解软件包要求我做什么需要*是/否*响应的操作。我当然不想遇到一个提示问“你最近杀过人吗？”，然后粗心地输入
    `是`。我可能不是律师，但我尽力而为，在我的计算机或智能手机上安装软件时会仔细阅读细则。


    类似地，在作为设置过程的一部分运行 `/opt/mssql/bin/mssql-conf` 脚本时，可以传递不同的参数。这些参数也称为 `环境变量`，在 `https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables?view=sql-server-linux-2017`
    中有针对 SQL Server 2017 的描述（SQL Server 2019 的列表类似）。回想一下在*第*4 章中传递给 `docker run` 命令的环境变量。它们是相同的环境变量，可用于在设置过程中配置
    Linux 上的 SQL Server，从而无需用户交互。如果你注意到了手动安装过程，有三个提示需要用户输入：


    *   `MSSQL_PID`：类似于在 Windows 上安装 SQL Server 时的 PID 参数——可以是产品 ID 或 SQL Server 版本。如果未指定，则默认为开发版。

    *   `ACCEPT_EULA`：我相信你现在已经知道这个了。

    *   `MSSQL_SA_PASSWORD`：`sa` 登录的复杂密码。


    给定这三个环境变量，你可以运行带有其对应值的 `/opt/mssql/bin/mssql-conf` 脚本，如下所示：


    ```

    sudo MSSQL_PID=Enterprise ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    ```


    注意


    我在 Microsoft 文档、博客文章和 GitHub 上的示例代码中看到过使用 `-n` 参数运行 `/opt/mssql/bin/mssql-conf`
    脚本作为设置过程一部分的例子。一个例子可以在 `https://docs.microsoft.com/en-ca/sql/linux/sample-unattended-install-redhat?view=sql-server-ver15#sample-script`
    找到。参考行 `echo Running mssql-conf setup...`，它显示了带有环境变量的 `/opt/mssql/bin/mssql-conf
    -n setup` 代码。`-n`（也是 `--noprompt`）参数不会提示用户，并在安装过程中使用环境变量或默认设置。我好奇的心想知道行为上是否有任何不同，所以我测试了带
    `-n` 参数和不带 `-n` 参数运行命令。结果证明两者之间确实没有区别。因此，为了节省几次击键和几个字节的字符，我选择在我的无人参与安装中不使用 `-n`
    参数。


    将 CentOS Linux 系统上的所有命令组合起来以


    *   下载 SQL Server 2017 的 Microsoft SQL Server Red Hat 仓库配置文件

    *   下载并安装适用于 RHEL 的 SQL Server 安装包

    *   运行带有 `setup` 参数和环境变量的 `/opt/mssql/bin/mssql-conf` 脚本

    *   启用 SQL Server 守护进程在系统启动时启动


    你的脚本将包含如下所示的命令：


    ```

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    sudo yum install -y mssql-server

    sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    ```


    回顾在 Ubuntu Linux 系统上手动安装 SQL Server 的步骤，执行无人参与安装的相应脚本将包含如下所示的命令：


    ```

    curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    sudo apt-get update

    sudo apt-get install -y mssql-server

    sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    ```


    即使运行这些命令并提供以 `sudo` 身份运行它们的密码，也给了你某种形式的无人参与安装。但我们还没有完成。你必须等到本章后面才能拥有一个完全自动化的脚本，该脚本将在
    Linux 上执行 SQL Server 的无人参与安装。

