  trans: '

    # 11. 面向 SQL Server 数据库管理员的 Docker 网络指南


    > *任何领域的专家都曾是个初学者。*

    >

    > —佚名


    我们 IT 专业人士在社交活动方面并不那么在行。与其在谈话中为填补沉默而搜肠刮肚、感到无比尴尬，我们更愿意待在办公桌前解决和排查技术问题。但是社交活动，特别是专业活动，为个人和职业成长提供了机会，让我们能与志同道合的人建立联系。


    我记得 2007 年在科罗拉多州丹佛市参加的第一次 PASS 峰会。那是我在北美参加的第一个专业活动，我真不知道会发生什么。我知道自己要做演讲，所以需要了解活动组织者是谁以及我那场会议所需的后勤信息。除了懂
    T-SQL 语言，至少我还知道如何用英语交流以应对各种情况，不至于成为那个在社交上很尴尬的亚洲人——直到我在活动上被介绍给几位 SQL Server MVP。那正是我冒险之旅的开始。MVP
    们让我感觉像家人一样，对我照顾有加，并为我介绍了许多促进我个人和职业成长的机会。与 SQL Server 专家 Aaron Bertrand 的一局台球，确立了我是个“好人”的形象，因为据他说，我让他赢了（并非所有来自菲律宾的人都是台球大师）。正是在其中一次谈话中，我被介绍给了
    MSSQLTips.com 的创始人。我的一位朋友将我介绍给了微软的项目经理 Dandy Weyn，直到今天，她依然为我提供咨询机会。与 SQL Server
    专家 Adam Machanic 的一次交谈，让我认识了一家在 2008 年帮助我移居加拿大的公司。


    **建立连接确实能打开大量的机会之门**。对于 Docker 容器来说也是如此。本章将带你进入容器网络的世界，目标是让你了解足够的细节，从而能将运行在容器中的
    SQL Server 连接到其他服务和应用程序。由于本书不涵盖多主机部署，因此内容将仅限于单主机部署。学完本章后，你无需取代你的网络工程师，但你会了解他们所知的一部分知识，足以在将容器内的
    SQL Server 与外部世界连接时，与他们进行有深度的对话。此外，即便提供了这些细节，从网络专家的角度来看，我们仍然停留在非常高的层面。


    ## docker0 网桥


    自第 4 章以来，你已经在不知不觉中使用了 Docker 网络。你能从远程机器访问容器内的 SQL Server 数据库这一事实，就证明了其有效性。第 8
    章让你初步了解了其工作原理：Docker 在 Linux 上操作`iptables`，以允许通过`docker run`命令的`-p`参数发布端口的流量进出容器。第
    10 章在你使用 Docker Compose 创建多容器应用时，向你介绍了`bridge`网络。现在，让我们进一步探索使所有这些连接成为可能的 Docker
    网络组件。


    Docker 的默认安装会在主机上创建一个名为`docker0`的 Linux 网桥网络。从本书开始，我们就一直在使用这个网桥网络。在 Linux 中，网桥网络用于连接两个或多个网段，其工作方式很像网络交换机。该网桥网络根据主机的
    MAC 地址，在连接到其上的网络之间转发流量。在 Windows 上，与之对应的是`nat`网络——即网络地址转换（Network Address Translation）的缩写。你可以把网桥网络想象成一个在连接两个不同国家的桥梁上工作的移民官。我将以美加边境为例进一步说明，因为我经常驾车往返于纽约州和安大略省之间，通过连接两国的桥梁。移民官的职责是检查护照上盖的旅行签证（目的地的
    MAC 地址），允许车内人员通过边境。如果个人没有适当的旅行签证，他们将不被允许通过。如果你熟悉虚拟化领域的网络术语，可以将网桥网络视为一个`vSwitch`或虚拟交换机。在
    Windows 上，`docker0`的实现是一个利用 Windows 主机网络服务（HNS）的 Hyper-V 虚拟交换机。


    在`docker0`网桥之上，是一个网络驱动的实现，该驱动可以根据 Docker 主机的操作系统进行定制，其工作方式类似于设备驱动。这就是 Docker 与主机操作系统通信以实现网络功能的方式，从而允许容器连接到网络。还记得第
    8 章中如何更新 Linux 上的`iptables`以允许流量进出运行中的容器吗？那就是网络驱动通过 Docker 命令与`docker0`网桥进行通信。Docker
    上实现的驱动类型描述了使其工作所使用的网络驱动。由于我们只涵盖单主机部署，因此我们将只关注`bridge`网络。而默认的 Docker 网桥网络名称也恰好叫`bridge`，这是多么方便啊！


    `bridge`网络拥有一个与之关联的私有 IP 地址和子网。分配给`bridge`网络的子网是从以下列表中选择的第一个无冲突子网：`172.[17-31].42.1/16`、`10.[0-255].42.1/16`、`192.168.[42-44].1/24`。你可以通过在
    Linux 上运行`ip addr`命令或在 Windows 上运行`ipconfig`来检查这一点。图 11-1 显示了我的 CentOS Linux Docker
    主机上`docker0`网桥的详细信息。请记住，这映射到 Docker 的`bridge`网络。


    ![作为 CentOS Linux 主机网络接口显示的 docker0 网桥](img/484552_1_En_11_Fig1_HTML.jpg)


    **图 11-1**


    作为 CentOS Linux 主机网络接口显示的 docker0 网桥

    '
- fmt: '# Docker 网络基础：Bridge 网络与虚拟适配器


    所有连接到此 `bridge` 网络的容器将获得与其关联网络内的 IP 地址。在我的 Linux Docker 主机上，每个容器都将拥有 `172.18.0.0/16`
    网络内的 IP 地址。默认情况下，所有容器都启用网络连接，允许它们建立到其他容器或其他外部服务（包括互联网）的传出连接。


    如果在 `docker run` 命令中未指定 `--network` 参数，它会自动将容器连接到 `docker0` 网桥。由于我们实际上并未创建任何其他桥接网络，也没有在使用的任何
    `docker run` 命令中添加 `--network` 参数，正是 `bridge` 网络使所有网络连接成为可能，将连接到它的容器以及连接到外部网络的主机和服务连接起来。


    此外，请注意 `state DOWN` 值。这意味着没有正在运行的容器连接到它。如果有正在运行的容器连接，该状态将变为 `state UP`。


    ## 查看与检查网络


    如前所述，Docker 在默认安装中提供了网络驱动程序，其中 `bridge` 驱动程序映射到 `docker0` 网桥。你可以使用 `docker network
    ls` 命令来显示可用的 Docker 网络。要检查名为 `bridge` 的网络，可以运行 `docker network inspect bridge`
    命令。


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig2_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig2_HTML.jpg)

    *图 11-2：默认 Docker 安装附带的可用网络以及名为 bridge 的网络的详细信息*


    > **注意**

    > Docker 网络有其专属的子命令 `docker network` 来管理 Docker 网络。这允许你创建、检查、列出、删除、连接和断开网络。在本章中，我们将使用其中几个子命令来说明其用法。`docker
    network` 命令的完整列表可在 Docker 文档中找到：[https://docs.docker.com/engine/reference/commandline/network/](https://docs.docker.com/engine/reference/commandline/network/)。


    查看 `Options` 下的 `com.docker.network.bridge.name` 值。我相信你现在能认出这个名字了。另外，如果你查看 `Containers`
    选项，它当前是空的。它只会在容器运行时，填充连接到它的容器名称。


    ## 虚拟网络适配器


    默认情况下，Docker 每次启动容器时都会创建一对虚拟网络适配器，一端通过 `bridge` 网络连接到主机系统，另一端连接到正在运行的容器。


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig3_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig3_HTML.jpg)

    *图 11-3：连接到物理网络的正在运行的容器的网络示意图*


    > **提示**

    > 没有什么能阻止你创建一个像物理或虚拟机一样具有多个网络接口的容器。如果你想将容器配置为连接到两个或多个网络的多宿主机，这很有用。我们将保持简单，只使用一个网络接口。毕竟，学完本章后你也不会因此替换掉你的网络工程师。


    让我们在启动容器后探索 Docker 主机上的网络接口列表。图 11-4 显示在我的 Linux Docker 主机上，一个名为 `veth2a62842@if8`
    的新虚拟网络接口连接到了一个正在运行的容器。显然，在你的 Docker 主机上名称会不同。你的 Docker 主机上创建的虚拟网络接口数量将取决于当前正在运行的容器数量。此外，如果你停止并重新启动同一个容器，名称也会改变。随着运行中的容器连接到
    `docker0` 网桥，该值现在变为 `state UP`。


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig4_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig4_HTML.jpg)

    *图 11-4：Docker 主机上新创建的与运行容器关联的虚拟网络接口*


    查看网络示意图，连接到 `bridge` 网络的运行容器现在可以连接到连接到它的其他容器，以及 Docker 主机外部可用服务和应用程序。'
  raw: 'All containers attached to this *bridge* network will get an IP address in
    the network associated with it. In my Linux Docker host, every single container
    will have an IP address in the *172.18.0.0/16* network. By default, all containers
    have networking enabled, allowing them to make outgoing connections to other containers
    or other external services – including the Internet. Without specifying the *--network*
    parameter in the *docker run* command, it automatically connects the container
    to the *docker0* bridge. Since we haven’t really created any other bridge network
    nor added the *--network* parameter in any of the *docker run* commands we used,
    the *bridge* network is what made all the networking possible, connecting the
    containers attached to it to the hosts and services attached to the external network.
    Also, notice the *state DOWN* value. This means there are no running containers
    attached to it. That will change to *state UP* if there are running containers
    attached.


    As I mentioned, Docker provides network drivers as part of the default installation,
    with the *bridge* driver mapped to the *docker0* bridge. You can use the `docker
    network ls` command to display the available Docker networks. To inspect the network
    named *bridge*, you can run the `docker network inspect bridge` command. Figure
    [11-2](#484552_1_En_11_Chapter.xhtml#Fig2) displays the default networks that
    come with the default Docker installation and the details of the network named
    *bridge*.


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig2_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Default Docker networks available and the details of the network named bridge


    Note


    Docker networking has its own subcommand – *docker network* – for managing Docker
    networks. This allows you to create, inspect, list, remove, connect, and disconnect
    networks. We will be using several of these subcommands throughout the chapter
    to illustrate their usage. A complete list of *docker network* commands is available
    on the Docker documentation: [*https://docs.docker.com/engine/reference/commandline/network/*](https://docs.docker.com/engine/reference/commandline/network/).


    Have a look at the *com.docker.network.bridge.name* value under *Options*. I’m
    sure you can recognize the name by now. Also, if you look at the *Containers*
    option, it’s currently empty. It only gets populated with the names of the containers
    attached to it when they are running.


    ## Virtual Network Adapters


    By default, Docker creates a pair of virtual network adapters every time a container
    is started, one end of which is attached to the host system via the *bridge* network
    and the other end to the running container. Figure [11-3](#484552_1_En_11_Chapter.xhtml#Fig3)
    shows a high-level network diagram of running containers, leveraging the default
    *bridge* network that connects to the *docker0* (or HNS internal NIC on Windows)
    bridge.


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig3_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Network diagram of running containers connected to the physical network


    Tip


    Nothing is stopping you from creating a container that has multiple network interfaces
    just like how you would with a physical or virtual machine. This is useful if
    you want to configure a container as a multihomed host connected to two or more
    networks. We’ll keep it simple and just use a single network interface. After
    all, you’re not going to replace your network engineers after finishing this chapter.


    Let’s explore the list of network interfaces on the Docker host after starting
    a container. Figure [11-4](#484552_1_En_11_Chapter.xhtml#Fig4) shows a new virtual
    network interface named *veth2a62842@if8* attached to a running container in my
    Linux Docker host. Obviously, the name will be different on your Docker host.
    The number of virtual network interfaces created on your Docker host will depend
    on the number of currently running containers. Also, the name will change if you
    stop and restart the same container. With running containers attached to the *docker0*
    bridge, the value now changes to *state UP*.


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig4_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Newly created virtual network interface on the Docker host associated with a running
    container


    Looking at the network diagram , running containers connected to the *bridge*
    network can now connect to other containers attached to it as well as services
    and apps available outside of the Docker host*.*'
