    has already been mapped to a container, it will no longer be available to other
    containers. And while you have port numbers between 1024 and 65535, you must explicitly
    define the port numbers if you want to connect to a remote container instead of
    just leveraging the default values. An example of this is when you’re running
    a web app in a container. Ports 80 and 443 are the default port numbers for connecting
    to a web app via HTTP or HTTPS, respectively. If you run multiple web app containers
    on a single Docker host, you need to map the other containers to different, nonstandard
    port numbers. And ordinary people like me may or may not be aware of those nonstandard
    port numbers.


    The same is true with SQL Server. People working with SQL Server know that they
    can access it via port 1433\. Application connection strings use the default port
    number, hence why you rarely see a connection string that explicitly defines a
