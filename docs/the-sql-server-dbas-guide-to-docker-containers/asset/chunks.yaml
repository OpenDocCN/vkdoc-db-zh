    ## Docker 镜像命名约定


    你可能已经迫不及待想在容器上使用 SQL Server 了，但请稍等片刻。我们很快就讲到。让我们先看看容器命名约定，因为在搜索、拉取、构建甚至推送 Docker
    镜像时，这有助于你为成功做好准备。


    与使用 SQL Server 类似，在安装过程中已经为你提供了一些默认的 Docker 配置设置。例如，默认的容器注册表就是 Docker Hub。当你运行
    `docker run` 命令来执行 Docker 版的“hello world”时，你无需提供注册表名称。它直接使用了 Docker Hub。你可以选择使用其他公共容器注册表。但要做到这一点，你需要了解使用
    Docker 镜像时所采用的命名约定。


    Docker 镜像使用标准的命名约定进行引用。这是为了给使用镜像的用户提供可预测性。标准命名约定类似于 GitHub 仓库名称，使用以下格式：


    `REGISTRY[:PORT]/REPO/IMAGE[:TAG]`


    镜像名称由斜杠分隔的名称组件组成，前面可选择性地加上注册表主机名。注册表主机名必须符合标准 DNS 规则。如果未提供注册表主机名，则默认为 Docker Hub。Docker
    Hub 的完全限定主机名是 [`https://index.docker.io`](https://index.docker.io) 或简写为 `docker.io`。你可以在运行
    `docker info` 时看到 `Registry:` 字段中显示此信息，如图 4-10 所示。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig10_HTML.jpg](img/484552_1_En_4_Fig10_HTML.jpg)


    图 4-10


    Docker Hub 的完全限定 DNS 主机名


    你可以在 `docker` 命令中使用除 Docker Hub 以外的任何可用公共容器注册表及其对应的注册表主机名。以下是一些你可以选择的列表。具体用法取决于公共容器注册表的访问方式。


    *   `Microsoft 容器注册表 (MCR)`：mcr.microsoft.com

    *   `Amazon 弹性容器注册表 (ECR)`：dkr.<region>.amazonaws.com

    *   `Google 容器注册表 (GCR)`：gcr.io


    注册表主机名之后是仓库（简称 repo）名称。仓库结构取决于镜像在容器注册表上的存储方式。由于许多软件供应商使用 Docker Hub 作为公共容器注册表，一级仓库名称是软件公司的名称。例如，`docker.io/microsoft`
    是 Docker Hub 上 Microsoft 的官方仓库。


    接下来是镜像名称，它用于标识 Docker 镜像的内容。查看图 4-7 中 `docker search` 命令的结果，你可以看到以下内容：


    *   `mssql-server-linux` 是包含 Linux 上 SQL Server 的镜像。

    *   `windowsservercore` 是官方的 Windows Server Core 基础镜像。

    *   `mssql-server-windows-express` 是包含 Windows 上 SQL Server Express 版的镜像。


    但考虑到 SQL Server 现在拥有的众多版本、版本级别和操作系统组合——即使排除早于 SQL Server 2016 的版本——仅依赖镜像名称是不够的。如果你需要一个在
    Windows Server 2016 上运行 SQL Server 2017 并安装了累积更新 5 的 Docker 镜像呢？


    这就是 `标签` 发挥作用的地方。标签进一步标识 Docker 镜像的内容，并在可能的情况下提供额外的详细信息。当你运行容器或从仓库拉取镜像时，如果没有提供标签，Docker
    会默认你想要带有 `latest` 标签的镜像，并假设该镜像存在。参考你在 Linux 上运行的 `docker run` 命令：


    ```

    docker run hello-world

    ```


    这等同于运行命令 `docker run hello-world:latest`，因为你没有在镜像名称后提供标签，而在 Windows 上运行的 `docker
    run` 命令在镜像名称中带有标签。

    '
- fmt: '```

    docker run hello-world:nanoserver-sac2016

    ```


    That’s because the `hello-world` Windows container image with the `latest` tag
    no longer exists – hence, the error message earlier in Figure 4-2.


    ## Docker Image Tags and Naming Conventions


    As you can see, tags make it easier for users to further identify the Docker image.
    This becomes more relevant when you start creating your own custom images. You
    want to provide as much information as possible for users to identify the right
    image that they need. Refer to Figure 4-11 for a list of available tags that you
    can use for the SQL Server on Linux image, available at [`https://hub.docker.com/_/microsoft-mssql-server`](https://hub.docker.com/_/microsoft-mssql-server).


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig11_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig11_HTML.jpg)

    *Figure 4-11. Available tags for SQL Server on Linux image*


    **Tip**


    Another reason why you need to specify a tag is because you’ll never know what
    `latest` image you actually get from the public container registry. If you look
    at the SQL Server on Linux image tags in Figure 4-11, the image with the `latest`
    tag shows the `LastUpdatedTime` as `09/21/2018 01:01:16`. However, in the image
    with the `2017-latest-ubuntu` tag, the `LastUpdatedTime` shows `07/09/2019 19:15:57`.
    So, which one really is the latest? You can pull and run both the `latest` and
    `2017-latest-ubuntu` images to find out. At the time of writing, the image with
    the `latest` tag is running SQL Server 2017 with CU13, whereas the image with
    the `2017-latest-ubuntu` tag is running SQL Server 2017 with CU15 with security
    update (KB4505225). You don’t want to be pulling and deploying a SQL Server image
    that is incompatible with what you want to use both for testing and production.
    Using tags make sure that you get what you really need.


    Now that you understand how the naming conventions work with Docker images, let’s
    examine the `docker` commands you ran earlier in this chapter. The `docker run`
    command you ran on Windows can be written as


    ```

    docker run docker.io/library/hello-world:nanoserver-sac2016

    ```


    while on Linux,


    ```

    docker run docker.io/library/hello-world:latest

    ```


    with `library` as the repo name.


    To make this even more relevant, let’s say you want to pull a SQL Server on Linux
    image on your Linux Docker host. To do so, run the following command. Pulling
    the image does not create and run a container. It just stores it in the local
    container registry’s filesystem. You have the option to pull all of the images
    you need and store it in the local filesystem. This has the advantage of running
    containers quickly because the Docker daemon no longer has to wait for the image
    to be fully downloaded.


    ```

    docker pull microsoft/mssql-server-linux

    ```


    This can be written as


    ```

    docker pull docker.io/microsoft/mssql-server-linux:latest

    ```


    You can also refer to Microsoft Container Registry (MCR) to download the image:


    ```

    docker pull mcr.microsoft.com/mssql/server:latest

    ```


    Given that this is a dedicated public registry for Microsoft and that they have
    several products available as Docker images, the repo name now represents the
    product name (in this case, `mssql`) instead of the software vendor’s name.


    **Note**


    Because Docker Hub was the pioneer in public container registries, almost all
    software vendors have their images and documentation up on their portal. It has
    become the go-to public container registry for Docker images – Docker Hub hosts
    both the metadata and the images. As software vendors started creating forks to
    the Docker source code and created their own versions, they also created their
    own public container registries. In an effort to avoid any breaking changes and
    still provide a seamless user experience, most software vendors leveraged the
    syndication model to keep the content on Docker Hub up to date. This is what Microsoft
    did with MCR. MCR hosts all of the Microsoft images and syndicates the metadata
    to Docker Hub. Anytime Microsoft adds or updates a SQL Server on Windows or Linux
    image, they will syndicate the metadata to Docker Hub. When you pull a SQL Server
    image from Docker Hub, you get redirected to MCR for the image files. Unfortunately,
    there is no portal-like experience for MCR like that of Docker Hub. So, you still
    need Docker Hub to search for Microsoft images. You can read more about the creation
    of the MCR in this blog post: [`https://azure.microsoft.com/en-ca/blog/microsoft-syndicates-container-catalog/`](https://azure.microsoft.com/en-ca/blog/microsoft-syndicates-container-catalog/)


    Enough with these concepts. With the knowledge of how the different components
    work in the Docker ecosystem, it’s time to see them in action – SQL Server DBA
    style.


    ## Running SQL Server on Windows Containers


    There are two ways to run a Docker container:


    1.  Pull the image first using the `docker pull` command and, then, run it using
    the `docker run` command.

    2.  Use the `docker run` command. If the image doesn’t exist in the local filesystem,
    the docker daemon will implicitly pull the image first before running.


    Run the following command to pull and run the `SQL Server 2017 Developer Edition
    on Windows` with the `latest` tag image on your Windows Docker host. Go grab a
    snack as the process to pull and run will take some time.


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevwincon01 -d -h winsqldev01 microsoft/mssql-server-windows-developer

    ```


    Now, this `docker run` command is a little bit more than the “hello world” image
    that we started with in this chapter. This is where the real fun starts.


    The following parameters are used with the `docker run` command. They will be
    the same parameters that you’ll use for your Linux server host:


    *   `-e`: Set required environment variables; these are specific to SQL Server.
    The `ACCEPT_EULA` and `SA_PASSWORD` parameters are self-explanatory. I’m sure
    you’ve read the EULA every time you installed SQL Server.

    *   `-p`: Publish a container''s TCP port (or a range of ports) to the host using
    this format `ip:hostPort:containerPort`. This allows you to connect to the SQL
    Server instance in the container from a remote client, mapping port 1433 on the
    host to port 1433 on the container.

    *   `--name`: A unique custom name to help identify the container instead of a
    system-generated one. This helps you easily identify the container when performing
    additional tasks.

    *   `-d`: Run the container in detached mode (background process) and print the
    container ID. This means that after running the `docker run` command, the container
    still runs in the background. Use this parameter since SQL Server runs as a service.
    Without this parameter, the container will run, complete its task, and exit.

    *   `-h`: Server hostname that you want to assign to the container. Assigning
    the same value to the `-h` and `--name` parameters makes it easy to identify the
    container.


    Figure 4-12 shows the result of running the `docker run` command on your Windows
    Server host.


