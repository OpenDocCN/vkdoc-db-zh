- fmt: '# Leveraging Volumes with SQL Server on Containers


    In [Chapter 6](#484552_1_En_6_Chapter.xhtml), I highlighted the use of volumes
    in the section “Sharing Files Between Host and Container.” Now that you understand
    Docker volumes and how they work, it is clear that this is how we persist data
    with SQL Server running in containers.


    Run the following command on a Linux host to attach the created volume `samplevolume`
    to a SQL Server on Linux container:


    ```bash

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevlinuxcon01 -d -h linuxsqldev01 --mount source=samplevolume,target=/var/opt/mssql
    mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    The `/var/opt/mssql` directory is the default SQL Server directory in Linux. This
    directory contains the following structure:


    *   `data`: Directory containing system database files, user database files, and
    transaction log files

    *   `log`: Directory containing the SQL Server error log files, the default trace
    files, and default Extended Event sessions

    *   `secrets`: Directory containing the Server Master Key that is generated for
    the SQL Server instance


    During the creation of the SQL Server on Linux container, the contents of the
    `/var/opt/mssql` directory get copied to the container as part of the setup process.
    Because we are telling Docker to mount the `/var/opt/mssql` directory inside the
    container to the `samplevolume` volume, the contents of the directory get created
    in the Docker host’s local filesystem – `/var/lib/docker/volumes/samplevolume/_data`.
    And just like in Figure [7-6](#484552_1_En_7_Chapter.xhtml#Fig6), you will see
    the `thisIsLinux.txt` file that was copied into the volume before the container
    was created. Figure [7-9](#484552_1_En_7_Chapter.xhtml#Fig9) displays the file
    as seen from inside the Docker host’s filesystem together with the contents of
    the `/var/opt/mssql` directory.


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig9_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Contents of the mounted volume to a SQL Server on Linux container


    With the container up and running, I can create a sample user database in SQL
    Server, and the database files will get created in the `samplevolume` volume.
    Figure [7-10](#484552_1_En_7_Chapter.xhtml#Fig10) shows the database files as
    seen from inside the container filesystem and from the Docker host’s filesystem.
    And, yes, I did create a sample database named `sampleDB`.


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig10_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig10_HTML.jpg)


    Figure 7-10


    SQL Server database files getting created in volumes


    ## Placing System and User Databases in Different Locations


    Keep in mind that because the default SQL Server directory in Linux is what we
    mounted to a volume, both the system and user databases will get created in the
    same location. But nothing is stopping you from keeping the default database file
    location for system databases and just using a volume for user databases. Run
    the following command on a Linux host to attach the created volume `samplevolume`
    to a SQL Server on Linux container, using the `/tmp/dbdata` directory inside the
    container as the user database file location. Be sure to stop and remove the existing
    SQL Server on Linux container so you can reuse the container name and port number.


    ```bash

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevlinuxcon01 -d -h linuxsqldev01 --mount source=samplevolume,target=/tmp/dbdata
    mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    In my example, I also cleaned up the SQL Server–related contents of the `samplevolume`
    volume and just kept the `thisIsLinux.txt` file. Deleting the container does not
    delete the contents of the volume. Remember, the volume exists outside of the
    container. I also used the following `CREATE DATABASE` command to create the sample
    database. Note the use of the `target` directory – `/tmp/dbdata`.


    ```sql

    CREATE DATABASE [sampleDB]

    ON PRIMARY

    (NAME = N''sampleDB'', FILENAME = N''/tmp/dbdata/sampleDB.mdf'')

    LOG ON

    (NAME = N''sampleDB_log'', FILENAME = N''/tmp/dbdata/sampleDB_log.ldf'')

    ```


    Figure [7-11](#484552_1_En_7_Chapter.xhtml#Fig11) shows the system databases inside
    the default SQL Server directory and the sample user database inside the `samplevolume`
    volume.


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig11_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    SQL Server user databases getting created in volumes


    ## Configuring Volumes on Windows Containers


    In fact, this is how the SQL Server on Windows container is configured. Unlike
    the SQL Server on Linux container where the entire `/var/opt/mssql` directory
    is copied to the container, the publicly available SQL Server on Windows container
    still leverages the default SQL Server directory – `C:\Program Files\Microsoft
    SQL Server\MSSQL{nn}.MSSQL\`. Mounting a volume to a SQL Server on Windows container
    will only create the target directory inside the container filesystem, it won’t
    change the default database file location because the SQL Server instance is already
    installed.


    Run the following command on a Windows Server host to attach the created volume
    `samplevolume` to a SQL Server on Windows container, using the `C:/dbdata` directory
    inside the container. Again, be sure to stop and remove the existing SQL Server
    on Windows container so you can reuse the container name and port number.


    ```powershell

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevwincon01 -d -h winsqldev01 -v samplevolume:C:/dbdata microsoft/mssql-server-windows-developer

    ```


    Figure [7-12](#484552_1_En_7_Chapter.xhtml#Fig12) shows the Windows container
    equivalent of system databases inside the default SQL Server directory and the
    sample user database inside the `samplevolume` volume.


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig12_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig12_HTML.jpg)


    Figure 7-12


    SQL Server user databases getting created in volumes – Windows container


    ## Customizing the Default Database Location


    Note


    You can modify the default SQL Server database file location on a SQL Server running
    on a container – either on Windows or Linux. You do this by creating a custom
    SQL Server image instead of using the publicly available images from Microsoft.
    Chapters [9](#484552_1_En_9_Chapter.xhtml) and [10](#484552_1_En_10_Chapter.xhtml)
    cover how to create a custom SQL Server image for Windows and Linux, respectively.


    I’ve seen customers deploy SQL Server databases like this – system databases are
    stored on a different location than the user databases. And I’ve also seen customers
    who deploy SQL Server databases – both system and user – in the same location.
    Neither is right nor wrong, nor is one a best practice while the other isn’t.
    But there’s a benefit to keeping both the system and user databases in the same
    location. You’ll see a really good example in the next section.


    ## Volume Deletion and Persistence


    Removing a container does not remove the volume. Because the volume exists outside
    of the container, you don’t have to worry about somebody accidentally deleting
    a container and wiping out all of the databases inside it – not that you have
    to worry about it because it never happens.


    Despite the fact that volumes are objects that exist outside of containers, you
    won’t be able to delete a volume while an existing container is using it. Good
    luck with that. Docker knows when a volume is attached to a container and will
    not allow you to remove it, even if you use the `-f` parameter of the `docker
    volume rm` command. Figure [7-13](#484552_1_En_7_Chapter.xhtml#Fig13) shows my
    attempt at deleting the `samplevolume` volume that my SQL Server on Windows and
    Linux container is using. The error message also shows the CONTAINER ID value
    of the container using it.


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig13_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig13_HTML.jpg)


    Figure 7-13


    Docker preventing deletion of a volume attached to a running container'
