    --ip="10.0.0.2" --name sql-linuxcon02 -d -h linuxsql02 mcr.microsoft.com/mssql/server:2017-latest

    ```


    Let’s explore the sample code to understand what it is doing. In *Step 1*, we
    create a Docker network named *bridgenet1* using the *-d* parameter to define
    it using a *bridge* driver. The *--subnet* parameter defines the IP address range
    and the subnet mask – *172.19.0.1/24*. Any container attached to this network
    will have an IP address in this specific range. In *Step 2*, we create and run
    a new SQL Server on Linux container. Notice the use of the *--network* and *--ip*
    parameters instead of the usual *-p* parameter. Here, we are telling Docker to
    attach this container to the *bridgenet1* network and assign it a *172.19.0.2*
    IP address instead of relying on the *bridge* network to assign the IP address
    (the Docker daemon effectively acts as a DHCP server providing IP addresses to
    the containers attached to the *bridge* network). We do the same thing in Steps
    3 and 4\. Figure [11-5](#484552_1_En_11_Chapter.xhtml#Fig5) shows the TCP/IP properties
    of the Docker host after creating the user-defined Docker networks and attaching
    containers to them.


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig5_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


