- fmt: '### Fat Manifest?


    Step #4a introduced what is called a “fat” manifest. I don’t really know why it’s
    called a “fat” manifest, but the official term is `manifest list`. Think of a
    manifest list as a “manifest of manifest.” The idea behind having a “fat” manifest
    is to provide seamless user experience for multi-architecture support, the true
    essence behind “write once, deploy anywhere” principle that Java used to brag
    about. With a “fat” manifest, I don’t need to worry about finding the correct
    image name and tag combinations that will work for my current platform. For example,
    I can run the `docker run hello-world` command across different operating systems
    and different CPU architectures.


    Let’s examine the “fat” manifest for the `hello-world` image using the `docker
    manifest` command. Since this is an experimental command, you need to enable the
    `DOCKER_CLI_EXPERIMENTAL` environment variable using the `export` command. Run
    the following commands to examine the manifest list for the `hello-world` image.
    Figure [5-5](#484552_1_En_5_Chapter.xhtml#Fig5) shows a snippet of the different
    architectures that the `hello-world` image supports and the fields that define
    it.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig5_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Fat manifest for the hello-world image


    ```

    export DOCKER_CLI_EXPERIMENTAL=enabled

    docker manifest inspect hello-world

    ```


    The “fat” manifest for the `hello-world` image tells us that we can run the container
    on several OS and CPU architecture combinations – Linux on x86 and amd64, Windows
    10 Build 10.0.17134.885, and Linux on ARM, among others. Imagine running a Docker
    container on a Raspberry Pi device.


    Note


    I wish this was the case with SQL Server on containers. Unfortunately, the Microsoft
    documentation specifically mentions “x64-compatible only” processor types for
    SQL Server 2017 and higher on Windows Server and Linux. Gone are the days when
    SQL Server ran on non-x64 platforms like the DEC Alpha. However, Azure SQL Database
    Edge looks promising for ARM-based Linux devices. Check out [*https://azure.microsoft.com/en-us/services/sql-database-edge/*](https://azure.microsoft.com/en-us/services/sql-database-edge/)
    for more details. It’s still in the early days of development.


    What gives this away as a “fat” manifest are the following fields:


    *   `mediaType`: This will have the value `application/vnd.docker.distribution.manifest.list.v2+json`.

    *   `schemaVersion`: This will have a value of 2.


    The “fat” manifest is optional – you can create a Docker image without it. If
    it doesn’t exist, Step #4a is skipped and the Docker daemon’s query is sent directly
    to the image manifest (Step #4b). An example of this is the SQL Server on Linux
    image. Since it was specifically created for the Linux on amd64 platform, the
    `mediaType` field will only show an image manifest. Refer to the following `mediaType`
    value to distinguish it from a “fat” manifest:


    *   `"mediaType": "application/vnd.docker.distribution.manifest.v2+json"`


    Run the following commands to examine the image manifest for the `SQL Server on
    Linux` image. Figure [5-6](#484552_1_En_5_Chapter.xhtml#Fig6) shows a snippet
    of the SQL Server on Linux image manifest.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig6_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Manifest for the SQL Server on Linux image


    ```

    export DOCKER_CLI_EXPERIMENTAL=enabled

    docker manifest inspect mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    I didn’t say I like working with JSON data. But the reality is that JSON is a
    very popular data interchange format that even SQL Server included support for
    it starting with SQL Server 2016. Good thing there are alternatives. A tool that
    you can use to query whether or not a Docker image has a “fat” manifest without
    having to deal with all those JSON data is the `mquery` utility. It also tells
    you, if a “fat” manifest exists, what other platforms are supported. For more
    information on the `mquery` utility, check out [*https://github.com/estesp/mquery*](https://github.com/estesp/mquery).


    Run the following command to check the SQL Server on Linux image using the `mquery`
    utility. Keep in mind that this will also pull the corresponding image that contains
    the tool. Figure [5-7](#484552_1_En_5_Chapter.xhtml#Fig7) displays the output
    of the command, confirming that the SQL Server on Linux image does not have a
    “fat” manifest (Manifest List: No) and only supports Linux on the amd64 platform.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig7_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Running the mquery tool against the SQL Server on Linux image


    ```

    docker run mplatform/mquery mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    If you run the tool against the official Linux Ubuntu image, you will see the
    different platforms it supports, as shown in Figure [5-8](#484552_1_En_5_Chapter.xhtml#Fig8).
    Most of the Docker official images now support multiple architectures.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig8_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Running the mquery tool against the official Ubuntu image'
  raw: '### Fat Manifest?


    Step #4a introduced what is called a “fat” manifest. I don’t really know why it’s
    called a “fat” manifest, but the official term is *manifest list* . Think of a
    manifest list as a “manifest of manifest.” The idea behind having a “fat” manifest
    is to provide seamless user experience for multi-architecture support, the true
    essence behind “write once, deploy anywhere” principle that Java used to brag
    about. With a “fat” manifest, I don’t need to worry about finding the correct
    image name and tag combinations that will work for my current platform. For example,
    I can run the `docker run hello-world` command across different operating systems
    and different CPU architectures.


    Let’s examine the “fat” manifest for the *hello-world* image using the *docker
    manifest* command. Since this is an experimental command, you need to enable the
    DOCKER_CLI_EXPERIMENTAL environment variable using the *export* command. Run the
    following commands to examine the manifest list for the *hello-world* image. Figure
    [5-5](#484552_1_En_5_Chapter.xhtml#Fig5) shows a snippet of the different architectures
    that the *hello-world* image supports and the fields that define it.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig5_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Fat manifest for the hello-world image


    ```

    export DOCKER_CLI_EXPERIMENTAL=enabled

    docker manifest inspect hello-world

    ```


    The “fat” manifest for the *hello-world* image tells us that we can run the container
    on several OS and CPU architecture combinations – Linux on x86 and amd64, Windows
    10 Build 10.0.17134.885, and Linux on ARM, among others. Imagine running a Docker
    container on a Raspberry Pi device.


    Note


    I wish this was the case with SQL Server on containers. Unfortunately, the Microsoft
    documentation specifically mentions “x64-compatible only” processor types for
    SQL Server 2017 and higher on Windows Server and Linux. Gone are the days when
    SQL Server ran on non-x64 platforms like the DEC Alpha. However, Azure SQL Database
    Edge looks promising for ARM-based Linux devices. Check out [*https://azure.microsoft.com/en-us/services/sql-database-edge/*](https://azure.microsoft.com/en-us/services/sql-database-edge/)
    for more details. It’s still in the early days of development.


    What gives this away as a “fat” manifest are the following fields:


    *   *mediaType*: This will have the value application/vnd.docker.distribution.manifest.list.v2+json.


    *   *schemaVersion*: This will have a value of 2.


    The “fat” manifest is optional – you can create a Docker image without it. If
    it doesn’t exist, Step #4a is skipped and the Docker daemon’s query is sent directly
    to the image manifest (Step #4b). An example of this is the SQL Server on Linux
    image. Since it was specifically created for the Linux on amd64 platform, the
    *mediaType* field will only show an image manifest. Refer to the following *mediaType*
    value to distinguish it from a “fat” manifest:


    *   *"mediaType": "application/vnd.docker.distribution.manifest.v2+json"*


    Run the following commands to examine the image manifest for the *SQL Server on
    Linux* image. Figure [5-6](#484552_1_En_5_Chapter.xhtml#Fig6) shows a snippet
    of the SQL Server on Linux image manifest.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig6_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Manifest for the SQL Server on Linux image


    ```

    export DOCKER_CLI_EXPERIMENTAL=enabled

    docker manifest inspect mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    I didn’t say I like working with JSON data. But the reality is that JSON is a
    very popular data interchange format that even SQL Server included support for
    it starting with SQL Server 2016\. Good thing there are alternatives. A tool that
    you can use to query whether or not a Docker image has a “fat” manifest without
    having to deal with all those JSON data is the *mquery* utility. It also tells
    you, if a “fat” manifest exists, what other platforms are supported. For more
    information on the *mquery* utility, check out [*https://github.com/estesp/mquery*](https://github.com/estesp/mquery).


    Run the following command to check the SQL Server on Linux image using the *mquery*
    utility. Keep in mind that this will also pull the corresponding image that contains
    the tool. Figure [5-7](#484552_1_En_5_Chapter.xhtml#Fig7) displays the output
    of the command, confirming that the SQL Server on Linux image does not have a
    “fat” manifest (Manifest List: No) and only supports Linux on the amd64 platform.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig7_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Running the mquery tool against the SQL Server on Linux image


    ```

    docker run mplatform/mquery mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    If you run the tool against the official Linux Ubuntu image, you will see the
    different platforms it supports, as shown in Figure [5-8](#484552_1_En_5_Chapter.xhtml#Fig8).
    Most of the Docker official images now support multiple architectures.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig8_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Running the mquery tool against the official Ubuntu image'
  trans: '### 胖清单？


    步骤 #4a 引入了所谓的“胖”清单。我其实不太清楚它为什么被称为“胖”清单，但官方术语是 `manifest list`。你可以把清单列表想象成“清单的清单”。拥有“胖”清单的理念是为了提供无缝的多架构支持用户体验，这正是
    Java 曾经吹嘘的“一次编写，随处部署”原则的真正精髓。有了“胖”清单，我就不必再为寻找适用于当前平台的正确镜像名称和标签组合而担心了。例如，我可以在不同的操作系统和
    CPU 架构上运行 `docker run hello-world` 命令。


    让我们使用 `docker manifest` 命令来检查 `hello-world` 镜像的“胖”清单。由于这是一个实验性命令，你需要使用 `export`
    命令启用 `DOCKER_CLI_EXPERIMENTAL` 环境变量。运行以下命令来查看 `hello-world` 镜像的清单列表。图 5-5 展示了
    `hello-world` 镜像支持的不同架构片段以及定义它的字段。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig5_HTML.jpg](img/484552_1_En_5_Fig5_HTML.jpg)


    图 5-5


    hello-world 镜像的胖清单


    ```

    export DOCKER_CLI_EXPERIMENTAL=enabled

    docker manifest inspect hello-world

    ```


    `hello-world` 镜像的“胖”清单告诉我们，我们可以在多种操作系统和 CPU 架构组合上运行容器——例如 x86 和 amd64 上的 Linux、Windows
    10 Build 10.0.17134.885，以及 ARM 上的 Linux 等。想象一下在树莓派设备上运行 Docker 容器。


    注意


    我希望 SQL Server 容器也能如此。不幸的是，微软的文档明确指出，Windows Server 和 Linux 上的 SQL Server 2017
    及更高版本仅支持“与 x64 兼容”的处理器类型。SQL Server 运行在像 DEC Alpha 这样的非 x64 平台上的日子已经一去不复返了。不过，Azure
    SQL Database Edge 对于基于 ARM 的 Linux 设备来说看起来很有前景。更多详情请查看 [*https://azure.microsoft.com/en-us/services/sql-database-edge/*](https://azure.microsoft.com/en-us/services/sql-database-edge/)。它仍处于开发的早期阶段。


    以下是表明其为“胖”清单的字段：


    *   `mediaType`：其值为 `application/vnd.docker.distribution.manifest.list.v2+json`。

    *   `schemaVersion`：其值为 2。


    “胖”清单是可选的——你可以在没有它的情况下创建 Docker 镜像。如果它不存在，则会跳过步骤 #4a，Docker 守护进程的查询会直接发送到镜像清单（步骤
    #4b）。Linux 上的 SQL Server 镜像就是一个这样的例子。由于它是专门为 Linux on amd64 平台创建的，`mediaType`
    字段将只显示一个镜像清单。请参考以下 `mediaType` 值以区分它与“胖”清单：


    *   `"mediaType": "application/vnd.docker.distribution.manifest.v2+json"`


    运行以下命令来检查 `SQL Server on Linux` 镜像的镜像清单。图 5-6 展示了 SQL Server on Linux 镜像清单的片段。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig6_HTML.jpg](img/484552_1_En_5_Fig6_HTML.jpg)


    图 5-6


    SQL Server on Linux 镜像的清单


    ```

    export DOCKER_CLI_EXPERIMENTAL=enabled

    docker manifest inspect mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    我并不是说我喜欢处理 JSON 数据。但现实是，JSON 是一种非常流行的数据交换格式，以至于 SQL Server 从 2016 版开始就加入了对其的支持。好在还有替代工具。`mquery`
    实用程序就是一种你可以用来查询 Docker 镜像是否具有“胖”清单的工具，而无需处理所有那些 JSON 数据。如果存在“胖”清单，它还会告诉你支持哪些其他平台。有关
    `mquery` 实用程序的更多信息，请查看 [*https://github.com/estesp/mquery*](https://github.com/estesp/mquery)。


    运行以下命令，使用 `mquery` 实用程序检查 SQL Server on Linux 镜像。请注意，这也会拉取包含该工具的相应镜像。图 5-7 显示了命令的输出，确认了
    SQL Server on Linux 镜像没有“胖”清单（Manifest List: No），并且仅支持 amd64 平台上的 Linux。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig7_HTML.jpg](img/484552_1_En_5_Fig7_HTML.jpg)


    图 5-7


    对 SQL Server on Linux 镜像运行 mquery 工具


    ```

    docker run mplatform/mquery mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    如果你对官方的 Linux Ubuntu 镜像运行该工具，你将看到它支持的不同平台，如图 5-8 所示。现在大多数 Docker 官方镜像都支持多架构。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig8_HTML.jpg](img/484552_1_En_5_Fig8_HTML.jpg)


    图 5-8


    对官方 Ubuntu 镜像运行 mquery 工具'
- fmt: '### Image Manifest


    If a "fat" manifest exists, inside it is the `manifests` field that contains a
    list of image manifests for the different platforms that it supports, like a pointer
    to the image manifest. If it doesn’t exist, what you get when you run the `docker
    manifest inspect` command is the `image manifest`. The image manifest provides
    the details of the different filesystem layers needed to build the image and a
    configuration that tells the Docker daemon how to piece together all those layers
    to run a container. Think of the different filesystem layers as Lego pieces and
    the image manifest as the building instruction manual (that’s how memorable my
    very first Happy Meal was). The generic Lego pieces are unaware of how they are
    related to one another. Only the building instruction manual has the details that
    connect them all so you can build a Star Wars Millennium Falcon. You can even
    create your own Lego structure (Docker image) from the available pieces (filesystem
    layers) so long as you also create your own building instruction manual (image
    manifest) – even if the manual is just in your head. The process of pulling a
    Docker image from a repository consists of retrieving the image manifest and the
    filesystem layers.


    Run the following `docker inspect` command to explore the low-level details of
    the `hello-world` image. Note that you are inspecting an image, not a container.
    You can use the `docker inspect` command to inspect both the image and the container.
    But we’re only interested in the image at this point.


    ```

    docker inspect hello-world

    ```


    If you scroll down the output to the `Layers` section, it will tell you how many
    filesystem layers this image has. Figure [5-9](#484552_1_En_5_Chapter.xhtml#Fig9)
    shows the `hello-world` image as having only one filesystem layer.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig9_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    The hello-world image with one filesystem layer


    Tip


    Don’t be confused between the `docker manifest inspect` and the `docker inspect`
    commands. They may both have the same `inspect` subcommand but they function differently.
    If you want to explore a manifest – either a "fat" manifest or image manifest
    – use the `docker manifest inspect` command. If you want to explore low-level
    details of a Docker object such as an image or a container, use the `docker inspect`
    command. Too bad they both return results in a JSON array. There’s just no escaping
    the pervasiveness of JSON.


    Recall the output of the `docker run hello-world` command as shown in Figure [5-10](#484552_1_En_5_Chapter.xhtml#Fig10).
    It is consistent with the number of filesystem layers pulled from the Docker Hub.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig10_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Running the hello-world container, pulling one filesystem layer


    Similarly, you can run the following command to explore the SQL Server on Linux
    image:


    ```

    docker inspect mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    Figure [5-11](#484552_1_En_5_Chapter.xhtml#Fig11) shows the `Layers` section with
    nine filesystem layers, also consistent with the number of filesystem layers shown
    in Figure [5-1](#484552_1_En_5_Chapter.xhtml#Fig1).


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig11_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Filesystem layers of the SQL Server on Linux image


    Check out [https://docs.docker.com/registry/spec/manifest-v2-2/](https://docs.docker.com/registry/spec/manifest-v2-2/)
    for additional information regarding manifests. Although the image manifest is
    the only one relevant to us working with SQL Server on containers, knowing that
    you can run a Docker container on multiple platforms gives you an idea on what’s
    possible. Who knows, Microsoft may decide to run SQL Server on other platforms
    other than x64 in the future.


    ### Content Digest


    In the wild world of the Internet, it would be unwise for you to download anything
    without validating its integrity and authenticity. You wouldn’t know if the contents
    have been maliciously tampered with or modified as part of a change request. This
    is where the concept of a content-addressable storage comes in. Content-addressable
    storage is used to store information so it can be retrieved based on its content,
    not location. It uses a cryptographic hash function’s digest that is generated
    from the content. How this works is that a hash function is generated based on
    the contents of a file – or in Docker’s case, the filesystem layer. The generated
    hash is called the `content digest`. Since the content digest is a hash of the
    filesystem layer’s contents, changing the contents in the layers requires changing
    the content digest.


    So, when you run a `docker pull` or a `docker run` command, the content digest
    is included as part of the return code. Docker Hub sends the filesystem layers
    that have the same content digest as the ones defined in the image manifest. Once
    downloaded, the Docker daemon reruns the hash and verifies if the content digest
    of the filesystem layers is the same as the one defined in the image manifest.
    This guarantees the integrity and authenticity of the filesystem layers that make
    up the image regardless of where they are stored – be it on Docker Hub or your
    own container registry.'
