    ### 创建以非 root 用户身份运行的自定义镜像


    我参加了微软 MVP Anthony Nocentino 在 2019 年 PASS 大会上关于 Kubernetes 架构的演讲，因为这是我在如此大型的会议上唯一能百分百确定能和他见面的方式。如今的大多数交流都是虚拟的——通过电子邮件、即时通讯、社交媒体、电话或电话会议。但没有什么能比得上面对面交流。说我老派也好，但面对面的交流是我们建立高质量人际关系的方式。只要有机会，我都会尽力与家人、朋友和熟人面对面交流。


    当他结束演讲进入问答环节时，观众席中有人走上前来，为他的演示失败道歉。她说她一直在四处走动，参加专注于 Linux 的 Docker 相关会议，并询问演讲者为什么他们的演示会失败。她恰好是
    SQL Server 团队的一名开发人员，负责更新 Linux 版 SQL Server 2019 的 Docker 镜像。由于 SQL Server 2019
    在 PASS 大会周正式发布，他们也发布了所有更新的 Linux 版 SQL Server 2019 Docker 镜像，并引入了他们所做的更改：运行非 `root`
    容器。


    正如我在前面章节中反复提到的，以 `root` 身份运行容器存在安全风险。遵循最小权限原则，我们可以创建一个以非 `root` 身份运行的自定义 Linux
    版 SQL Server 镜像。公开可用的 Linux 版 SQL Server 2017 镜像都是在假设容器将以 `root` 身份运行的前提下创建的。随着
    SQL Server 2019 的发布，微软也发布了一个 `Dockerfile`，其中包含对现有公共镜像的修改，使其能够以非 `root` 用户身份运行容器。请在此处查看
    `Dockerfile`：[`github.com/microsoft/mssql-docker/blob/master/linux/preview/examples/mssql-server-linux-non-root/Dockerfile`](https://github.com/microsoft/mssql-docker/blob/master/linux/preview/examples/mssql-server-linux-non-root/Dockerfile)。我们将探讨其中的附加指令及其作用。请参考
    `Dockerfile` 的行号。


    **第 10 行**: `RUN useradd -M -s /bin/bash -u 10001 -g 0 mssql`


    这条指令运行 `useradd` 命令，向现有的 Linux 版 SQL Server 2017 镜像中添加一个名为 `mssql` 的新用户。`-M` 参数将跳过为新用户创建主目录。`-s`
    参数指定使用 `/bin/bash` 作为用户的登录 shell。`-u` 参数指定用户的 UID 值——10001——而 `-g` 参数指定 GID 值，0。请记住，此用户是在容器内部创建的，而不是在主机上创建的。


    **提示**


    在我对 SQL Server 2019（以及 Ubuntu 上的 SQL Server 2017）的测试中，这条指令可能导致镜像构建过程失败——但在 RHEL/CentOS
    上的 SQL Server 2017 却没有出现这种情况，我觉得这很奇怪。Linux 版 SQL Server 安装过程的一部分就是创建名为 `mssql`
    的用户和组。`UID` 和 `用户名` 值必须是唯一的。由于 `mssql` 用户已存在（尽管 UID 不同），该命令会失败。添加已存在的用户会抛出错误并导致镜像构建失败。请相应地进行测试。在创建自定义的
    Linux 版 SQL Server 2019（或 Ubuntu 上的 SQL Server 2017）镜像时，可以省略此行。但是，这样做意味着接受在安装过程中创建的具有不同
    UID 值 (999) 的 `mssql` 用户。此 UID 值可能已存在于你的 Linux Docker 主机上，并可能导致关于究竟是谁在运行容器的混淆。请参阅图
    10-10。另一个选择是将其命名为其他名称，但使用 10001 UID 值。


    **第 11 行**: `RUN mkdir -p -m 770 /var/opt/mssql && chgrp -R 0 /var/opt/mssql`

    '
- fmt: 'This instruction runs the `mkdir` command to create a new directory named
    `/var/opt/mssql` with the `-m` parameter assigning 770 permissions – RWX for owner,
    RWX for group, and no permissions for others. The `&&` characters simply append
    the `chgrp` command instead of creating a new `RUN` instruction. This looks a
    lot like Step 4 but with more granular permissions. Plus, appending commands instead
    of creating another instruction is an optimization trick that we can implement
    in our `Dockerfile`.


    Note: If you follow the sequence of the commands in the `Dockerfile`, it’s the
    `root` user that implicitly creates the `/var/opt/mssql` directory. This means
    running the `chgrp` command is simply assigning the same group permissions from
    `root`. That’s not going to work if we assign the `mssql` user to run the `sqlservr`
    process. Either we let the `mssql` user create the `/var/opt/mssql` directory
    or explicitly change the ownership to the `mssql` user using the command `chown
    -R mssql:0 /var/opt/mssql`. The available `Dockerfile` from Microsoft works, but
    the image is built from an existing SQL Server on Linux image (note the `FROM`
    instruction isn’t a base operating system image). I’m not sure if the script that
    they used to build the base image has already included making the `mssql` user
    as the owner of the SQL Server directories.


    I rewrote the instruction to explicitly assign the `mssql` user ownership of the
    `/var/opt/mssql` directory as shown in the following. I’ve also optimized it and
    combined multiple commands in a single `RUN` instruction instead of having multiple
    lines:


    ```

    RUN mkdir -p -m 770 /var/opt/mssql && chown -R mssql:0 /var/opt/mssql && chgrp
    -R 0 /var/opt/mssql

    ```


    **Line 15**: `RUN setcap ‘cap_net_bind_service+ep’ /opt/mssql/bin/sqlservr`


    This instruction runs the `setcap` command to set Linux capabilities on a file,
    in this case the `sqlservr` executable. The capability `cap_net_bind_service`
    binds the `sqlservr` executable to a low-numbered port number (anything below
    1024) without running as `root`. The `+ep` means we are assigning (the `+` operator)
    `Explicit` and `Permitted` capabilities.


    Note: Linux capabilities are a security concept. They provide a process a subset
    of the available `root` privileges. You don’t want to grant a process full `root`
    privileges (e.g., the docker container process), or you run the risk of exploiting
    that process and taking over the entire machine. A process may need special privileges
    to perform its function, but simply granting it `root` access is a little bit
    too much. So, you grant the Linux process the appropriate capability it needs
    to do its work. The example in Line 15 grants the `sqlservr` process the `cap_net_bind_service`
    capability to bind it to a low-numbered port number. It’s much safer than granting
    it `root` privileges.


    **Line 19**: `RUN setcap ‘cap_sys_ptrace+ep’ /opt/mssql/bin/paldumper`


    Similar to Line 15, this instruction runs the `setcap` command to set the `cap_sys_ptrace`
    capability to the `paldumper` file. You can probably guess what this file is just
    from its name – it’s a SQL Server utility to generate core dumps, mainly for troubleshooting
    purposes. This has to be explicitly defined because we will no longer run the
    container as `root`, yet we need `root` privileges to perform troubleshooting.


    **Line 20**: `RUN setcap ‘cap_sys_ptrace+ep’ /usr/bin/gdb`


    This is similar to Line 19 but for the `gdb` file, short for GNU debugger which
    is the most common debugging utility for Linux.


    **Line 25**: `RUN mkdir -p /etc/ld.so.conf.d && touch /etc/ld.so.conf.d/mssql.conf`


    This instruction creates a `ldconfig` file using the `touch` command that SQL
    Server will use – `mssql.conf`. The `ldconfig` command is used to create necessary
    links and cache for shared libraries. Shared libraries are libraries that are
    loaded by programs when they start. The location of these shared libraries is
    stored in the environment variable `LD_LIBRARY_PATH`. The next few instructions
    further explain why this is needed.


    **Line 26**: `RUN echo -e "# mssql libs\n/opt/mssql/lib" >> /etc/ld.so.conf.d/mssql.conf`


    Building on Line 25, a new line containing `# mssql libs\n/opt/mssql/lib` is added
    to the `/etc/ld.so.conf.d/mssql.conf` file. The `mssql.conf` file is read to search
    for the location of the shared libraries used, in this case `libs` and `/opt/mssql/lib`
    (the `\n` is used to introduce a new line). The reason for this is because the
    `setcap` commands used in earlier instructions remove the `LD_LIBRARY_PATH` and
    other environment variables that control dynamic linking. This is for security
    reasons. Since you will run the container with a non-`root` user, all unsecured
    environment variables will be removed, rendering running `paldumper` and `gdb`
    during troubleshooting useless.


    **Line 27**: `RUN ldconfig`


    This instruction runs the `ldconfig` command to apply the configuration settings
    created in Lines 25 and 26.


    **Line 29**: `USER mssql`


    This instruction sets the `mssql` as the user when running the container.


    The following `Dockerfile` integrates these lines to create a custom SQL Server
    on CentOS Linux image that runs as non-`root`. I’ve added step and line numbers
    as comments to identify the added instructions:


    ```

    #Step 1

    FROM centos:7.6.1810

    #Step 2

    RUN curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    #Step 3

    RUN yum install -y mssql-server

    #Line 10–change to a different user like mssql2 if you are

    #installing SQL Server 2019 or SQL Server 2017 on Ubuntu

    RUN useradd -M -s /bin/bash -u 10001 -g 0 mssql

    #Modified Line 11

    RUN mkdir -p -m 770 /var/opt/mssql && chown -R mssql:0 /var/opt/mssql && chgrp
    -R 0 /var/opt/mssql

    #Lines 15, 19, and 20

    RUN setcap ''cap_net_bind_service+ep'' /opt/mssql/bin/sqlservr

    RUN setcap ''cap_sys_ptrace+ep'' /opt/mssql/bin/paldumper

    RUN setcap ''cap_sys_ptrace+ep'' /usr/bin/gdb

    #Lines 25, 26, and 27

    RUN mkdir -p /etc/ld.so.conf.d && touch /etc/ld.so.conf.d/mssql.conf

    RUN echo -e "# mssql libs\n/opt/mssql/lib" >> /etc/ld.so.conf.d/mssql.conf

    RUN ldconfig

    #Tell user what port this container will use

    EXPOSE 1433

    #Line 29

    USER mssql

    #Step 5

    ENV PATH=${PATH}:/opt/mssql/bin

    #Step 6

    CMD sqlservr

    ```


    Save the `Dockerfile` and build the image. Once completed, you can use this custom
    SQL Server on Linux image for running containers as non-`root`.'
