    data-root\": \"/mnt/docker\",\n\"storage-driver\": \"overlay2\"\n}\n```\n\nThe\
    \ */mnt/docker* directory will become the new location for all the images and\
    \ containers. Be sure that the directory exists prior to configuring the new Docker\
    \ root directory.\n\nHere are the steps to change the default Docker root directory\
    \ on Linux:\n\n1.  Stop the Docker daemon:\n\n```\n    sudo systemctl stop docker\n\
    \    ```\n\n2.  Modify the *daemon.json* file to include the preceding settings.\n\
    \n3.  Start the Docker daemon:\n\n```\nsudo systemctl start docker\n```\n\nThe\
    \ same steps apply to Windows. Just change the */mnt/docker* directory to a valid\
    \ Windows directory such as *C:\\\\mnt\\\\docker* (notice the use of two backslashes\
    \ instead of one because a backslash character is interpreted differently in the\
    \ Go language) and remove the line *“storage-driver”: “overlay2”*. And, of course,\
    \ using either the Services management console or the command line to stop and\
    \ start the Docker service.\n\nYou can verify that the changes have taken effect\
    \ by running the `docker info` command as well as pulling a new image and reviewing\
    \ the contents of the */mnt/docker/overlay2* directory. Figure [6-1](#484552_1_En_6_Chapter.xhtml#Fig1)\
    \ shows the new Docker root directory on a CentOS Linux host.\n\n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig1_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\n\nNew Docker root directory on CentOS Linux host\n\nFigure [6-2](#484552_1_En_6_Chapter.xhtml#Fig2)\
    \ shows the new Docker root directory on a Windows Server host together with contents\
    \ of the *daemon.json* file.\n\n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig2_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\n\nNew Docker root directory on Windows Server host\n\nChanging the\
    \ default Docker root directory creates a new directory structure but does not\
    \ remove the previous one. This also means that Docker becomes unaware of the\
    \ previous directory containing all the pulled images and created containers –\
    \ they are still there. If you want to reuse all the image layers to avoid pulling\
    \ them again and reclaim disk space, move the entire */var/lib/docker* directory\
    \ to the new directory prior to restarting the Docker daemon. Otherwise, you’ll\
    \ be duplicating image layers and using up more disk space. Docker is not going\
    \ to tell you whether or not an image already exists after you configure a new\
    \ root directory – it is no longer aware of the old root directory.\n\nUse the\
    \ following command on Linux to move the entire */var/lib/docker* directory to\
    \ the new directory (on Windows, it’s a simple copy and paste). Be sure to create\
    \ the target directory first before running the command.\n\n```\nmv /var/lib/docker/*\
    \ /mnt/docker/\n```\n\nAdd this command between Steps #2 and #3\\. If it’s a brand-new\
    \ installation with no pulled images, you can skip this step.\n\n## Stopping and\
    \ Restarting the Docker Daemon\n\nI may have jumped ahead and already mentioned\
    \ stopping and restarting the Docker daemon without showing it. Actually, I’ve\
    \ covered how to start the Docker daemon in Chapter [3](#484552_1_En_3_Chapter.xhtml)\
    \ in the section “Installing Docker on CentOS Linux.” Learning the command comes\
    \ in handy for other stuff, like stopping and restarting other daemons. Plus,\
    \ whenever you make configuration changes to Docker, you would need to restart\
    \ it.\n\nRun the following command to stop the Docker daemon:\n\n```\nsudo systemctl\
    \ stop docker\n```\n\nRun the following command to start the Docker daemon:\n\n\
    ```\nsudo systemctl start docker\n```\n\nRun the following command to restart\
    \ the Docker daemon:\n\n```\nsudo systemctl restart docker\n```\n\nSee, that was\
    \ easy.\n\n## Configure the Docker Daemon for Remote Access on CentOS Linux\n\n\
    So far, we’ve been connecting to the Docker daemon remotely on a Linux host using\
    \ an SSH client. While you may consider this “remote access,” the fact that the\
    \ Docker CLI client and the Docker daemon are still on the same host means the\
    \ two are interacting locally. True remote access is when you have the Docker\
    \ CLI client interacting with a remote Docker daemon, calling the Docker API from\
    \ a different machine. An example of this is using the Docker CLI client on a\
    \ Windows machine and connecting to a Docker daemon on a Linux host. By default,\
    \ the Docker daemon binds to a Unix socket instead of a TCP/IP port. In order\
    \ to access the Docker daemon remotely, you need to configure it to listen on\
    \ an IP address and specific port number.\n\nHere’s a high-level overview of the\
    \ process involved in configuring remote access to the Docker daemon on Linux:\n\
    \n1.  Configure remote access to the Docker daemon with the *systemd* unit file.\n\
    \n2.  Protect the Docker daemon socket by configuring mutual TLS encryption.\n\
    \n3.  Update the *daemon.json* to include the settings for mutual TLS encryption.\n\
    \n4.  Enable firewall port to allow traffic to Docker daemon."
  trans: "## 更改默认镜像与容器目录\n\n在使用 Docker 时，我遇到的最常见的问题之一就是磁盘空间管理。这难道不正是我们作为 SQL Server\
    \ 数据库管理员也要面对的问题吗？你的数据库文件不断增长或备份文件占用过多空间，导致磁盘空间耗尽。这通常是由于疏忽或缺乏规划造成的。但对于像 Docker\
    \ 这样的新兴技术——它们通常首先在开发和测试环境中被采用——在平台变得关键之前（还记得你是如何被迫将那些 Microsoft Access 数据库升级到\
    \ SQL Server 的吗？），规划甚至不会被考虑。当你刚起步时，磁盘空间不足可能不会给你带来太大问题。但最终，它会的。\n\n回顾第 5 章，Docker\
    \ 的默认根目录在 Linux 上是 `/var/lib/docker/overlay2` 目录，在 Windows 上是 `C:\\ProgramData\\\
    docker\\windowsfilter` 文件夹。你从 Docker Hub 拉取的 Docker 镜像以及容器文件都将存储在这些目录中。你可以通过修改\
    \ Linux 上的 `daemon.json` 文件并添加以下内容来更改这些默认位置：\n\n```json\n{\n\"data-root\": \"\
    /mnt/docker\",\n\"storage-driver\": \"overlay2\"\n}\n```\n\n`/mnt/docker` 目录将成为所有镜像和容器的新位置。确保在配置新的\
    \ Docker 根目录之前该目录已存在。\n\n以下是在 Linux 上更改默认 Docker 根目录的步骤：\n\n1.  停止 Docker 守护进程：\n\
    \n    ```bash\n    sudo systemctl stop docker\n    ```\n\n2.  修改 `daemon.json`\
    \ 文件以包含上述设置。\n\n3.  启动 Docker 守护进程：\n\n    ```bash\n    sudo systemctl start docker\n\
    \    ```\n\n同样的步骤适用于 Windows。只需将 `/mnt/docker` 目录更改为一个有效的 Windows 目录，例如 `C:\\\\\
    mnt\\\\docker`（注意使用两个反斜杠而不是一个，因为反斜杠字符在 Go 语言中有不同的解释），并删除 `\"storage-driver\":\
    \ \"overlay2\"` 这一行。当然，使用服务管理控制台或命令行来停止和启动 Docker 服务。\n\n你可以通过运行 `docker info`\
    \ 命令，以及拉取一个新镜像并检查 `/mnt/docker/overlay2` 目录的内容来验证更改是否生效。图 6-1 显示了在 CentOS Linux\
    \ 主机上的新 Docker 根目录。\n\n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig1_HTML.jpg](img/484552_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1：CentOS Linux 主机上的新 Docker 根目录\n\n图 6-2 显示了 Windows Server 主机上的新 Docker\
    \ 根目录以及 `daemon.json` 文件的内容。\n\n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig2_HTML.jpg](img/484552_1_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2：Windows Server 主机上的新 Docker 根目录\n\n更改默认的 Docker 根目录会创建一个新的目录结构，但不会删除旧的结构。这也意味着\
    \ Docker 将不再知道包含所有已拉取镜像和已创建容器的旧目录——它们仍然在那里。如果你想要重用所有镜像层以避免再次拉取并回收磁盘空间，请在重启 Docker\
    \ 守护进程之前，将整个 `/var/lib/docker` 目录移动到新目录中。否则，你将会复制镜像层并占用更多磁盘空间。配置新的根目录后，Docker\
    \ 不会告诉你某个镜像是否已经存在——它已经不再感知旧的根目录了。\n\n在 Linux 上使用以下命令将整个 `/var/lib/docker` 目录移动到新目录（在\
    \ Windows 上，则是简单的复制粘贴）。请确保在运行命令之前先创建目标目录。\n\n```bash\nmv /var/lib/docker/* /mnt/docker/\n\
    ```\n\n在步骤 #2 和 #3 之间添加此命令。如果是没有拉取过镜像的全新安装，则可以跳过此步骤。\n\n## 停止并重启 Docker 守护进程\n\
    \n我可能有些超前，已经提到了停止并重启 Docker 守护进程，但并未演示。实际上，我在第 3 章“在 CentOS Linux 上安装 Docker”一节中已经介绍了如何启动\
    \ Docker 守护进程。学习这个命令对其他操作也很有用，比如停止和重启其他守护进程。另外，每当你对 Docker 做配置更改时，你都需要重启它。\n\n\
    运行以下命令以停止 Docker 守护进程：\n\n```bash\nsudo systemctl stop docker\n```\n\n运行以下命令以启动\
    \ Docker 守护进程：\n\n```bash\nsudo systemctl start docker\n```\n\n运行以下命令以重启 Docker\
    \ 守护进程：\n\n```bash\nsudo systemctl restart docker\n```\n\n看，这很简单。\n\n## 在 CentOS\
    \ Linux 上为 Docker 守护进程配置远程访问\n\n到目前为止，我们一直在使用 SSH 客户端远程连接到 Linux 主机上的 Docker 守护进程。虽然你可能认为这是“远程访问”，但\
    \ Docker CLI 客户端和 Docker 守护进程仍然在同一台主机上，这意味着两者是在本地交互。真正的远程访问是让你的 Docker CLI 客户端与远程的\
    \ Docker 守护进程交互，从另一台机器调用 Docker API。例如，在 Windows 机器上使用 Docker CLI 客户端连接到 Linux\
    \ 主机上的 Docker 守护进程。默认情况下，Docker 守护进程绑定到 Unix 套接字而不是 TCP/IP 端口。为了能够远程访问 Docker\
    \ 守护进程，你需要配置它监听一个 IP 地址和特定的端口号。\n\n以下是在 Linux 上配置 Docker 守护进程远程访问所涉及过程的高级概述：\n\
    \n1.  使用 `systemd` 单元文件配置 Docker 守护进程的远程访问。\n2.  通过配置双向 TLS 加密来保护 Docker 守护进程套接字。\n\
    3.  更新 `daemon.json` 以包含双向 TLS 加密的设置。\n4.  启用防火墙端口以允许流量访问 Docker 守护进程。"
- fmt: '## Configure Remote Access to the Docker Daemon with the systemd Unit File


    Instead of using either `dockerd` or the `daemon.json` file, we will use `systemd`
    to configure remote access to the Docker daemon. The Docker documentation mentions
    setting the `hosts` array in the `daemon.json` file to allow remote access to
    the Docker daemon. Unfortunately, I’ve tested as many possible variations as I
    can based on the documentation without any luck. So, I tried other approaches
    mentioned in the documentation. This is where using `systemd` comes in.


    `systemd` provides a standard process for controlling programs and processes on
    Linux. It’s an initialization system and service manager that includes features
    like on-demand starting of daemons, parallel processing at boot, and process tracking
    using Linux control groups. An initialization system is a daemon process that
    starts as soon as the computer starts and continues running until it is shut down.
    In `systemd`, a `unit` refers to any resource that the system knows how to control.
    These resources are defined using configuration files called unit files. You can
    define how these resources are managed on the system with the use of unit files.
    Other than using `dockerd` flags and `daemon.json`, the Docker daemon can also
    be configured with the use of `systemd` unit files.


    **Note**


    I didn’t include using `systemd` as a way to configure the Docker daemon because
    it requires an understanding of Linux internals. Since the Docker daemon is just
    like any other daemons running on Linux, the way you configure Docker using `systemd`
    is no different from how you would configure other daemons. But be very careful.
    Choose only one way to configure the Docker daemon. Configuring Docker using either
    `systemd`, the `dockerd` flags, or `daemon.json` can cause conflicts that can
    prevent the Docker daemon from starting.


    For this task, we will use `systemd` to make changes to the default Docker configuration:


    1.  Run the following command to create an override file for the Docker daemon
    using the default text editor on Linux. An override file is a way to change the
    behavior of a daemon without modifying its corresponding `systemd` unit file.
    The `systemctl edit` command ensures that the override settings are properly loaded.


    ```

    sudo systemctl edit docker.service

    ```


    2.  Add the following content in the file and save it:


    ```

    [Service]

    ExecStart=

    ExecStart=/usr/bin/dockerd -H fd:// -H tcp://172.28.106.158:2376

    ```


    Substitute the provided IP address with the IP address of your CentOS Linux Docker
    host. Also, the default port numbers that the Docker daemon listen on are 2375
    (unencrypted) and 2376 (encrypted). Port 2376 will be used for secure communications
    between the Docker CLI client and the Docker daemon.


    The `-H` flag binds the Docker daemon to a listening socket, either a Unix socket
    or a TCP/IP port. You can specify multiple `-H` flags to bind to multiple sockets/ports,
    like in the example provided.


    Don’t be confused about the `ExecStart` parameter specified twice. There are parameters
    that need to be cleared out before setting the new override value. The `ExecStart`
    parameter is one of them.


    3.  Run the following command to reload the `systemd` unit file:


    ```

    sudo systemctl daemon-reload

    ```


    4.  Finally, restart the Docker daemon:


    ```

    sudo systemctl restart docker

    ```


    Once completed, the Docker daemon is now configured to listen on a TCP/IP port
    and can be accessed remotely. You can check the status of the Docker daemon to
    verify as shown in Figure [6-3](#484552_1_En_6_Chapter.xhtml#Fig3).


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig3_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig3_HTML.jpg)


    Figure 6-3

    Remote access on TCP port configured on a CentOS Linux Docker host


    In addition, you can use the following `netstat` command to validate that the
    Docker daemon is indeed listening on port 2376 (if the `netstat` command is not
    installed on your Linux host, run the `yum -y install net-tools` command to install
    the necessary package):


    ```

    sudo netstat -lntp | grep dockerd

    ```


    You definitely need to know how to use `vi` – the default text editor on Linux
    – for this. Otherwise, use your favorite text editor on Windows to create the
    override file named `override.conf`. You can then copy the `override.conf` file
    using WinSCP to the `/etc/systemd/system/docker.service.d/` directory. You need
    to manually create the `docker.service.d` directory if you didn’t use the `systemctl
    edit` command.


    **Tip**


    Earlier in the chapter, I mentioned the use of `dockerd` with flags or the `daemon.json`
    file to make configuration changes to the Docker daemon. I wish that was always
    the case. But my experience working with open source software has taught me to
    expect several challenges. One of them is inconsistencies with how things are
    done. Configuring the Docker daemon for remote access is an example. Inconsistencies
    are expected when working with open source software. I’m just setting the right
    expectations in case you get frustrated.'
