  raw: '### The ADD Instruction


    The *ADD* instruction is like the *COPY* instruction but with additional capabilities
    other than just copying from and to a filesystem. You can use the *ADD* instruction
    to copy from a remote location with a URL. Let’s say you want to copy the *start.ps1*
    PowerShell script from [*https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/start.ps1*](https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/start.ps1)
    to C:/ of your custom SQL Server on Windows image. You can use the following *ADD*
    instruction:


    ```

    ADD https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/start.ps1
    /

    ```


    You may already have an idea what the *start.ps1* PowerShell script is for. If
    you review the *Dockerfile* provided on [*https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/dockerfile*](https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/dockerfile)
    for creating custom SQL Server on Windows image, the *start.ps1* PowerShell script
    is called in the last instruction – the *CMD* instruction.


    I prefer making files available locally instead of copying them from a URL. I
    want to make sure that the file that I’m using – whether it’s a script or an installation
    file – is free of any potential file corruption errors. I want to be able to test
    them manually first in my local filesystem before including them in any automated
    process. In fact, when I built an automated process for deploying different versions
    and editions of SQL Server in the past, all the installation media have already
    been downloaded to a network file share and manually tested. It saves you the
    headache of troubleshooting a failed installation because one of the CAB files
    is corrupted. I’m sure you’ve had one of those in the past while installing SQL
    Server.


    ### The SHELL Instruction


    The *SHELL* instruction allows the default shell used for the shell form of commands
    to be overridden. It is more common to use this instruction on Windows containers
    since Windows has both *cmd.exe* and *powershell.exe* shells. The Windows default
    shell is *cmd.exe*. As a PowerShell guy, I prefer using the *SHELL* instruction
    on Windows so I can take full advantage of the built-in cmdlets that make command
    execution easier. The *SHELL* instruction is written in the form *SHELL [“executable”,
    “parameters”]*. Translating the example used in the *RUN* instruction to use the
    *SHELL* instruction:


    ```

    SHELL ["powershell", "-Command", "Set-Service MSSQLSERVER -StartupType Automatic"]

    ```


    This makes it a lot simpler if you have a sequence of PowerShell commands that
    you want to run in the *Dockerfile*. Let’s say you want to delete the *SQL2016Dev_SP2*
    directory from the container after the installation completes. You can use the
    *SHELL* instruction to define the default shell and use the *RUN* instruction
    to execute PowerShell commands:


    ```

    #Set PowerShell as the command shell

    SHELL ["powershell", "-Command"]

    #Run Set-Service PowerShell cmdlet to configure MSSQLSERVER

    RUN Set-Service MSSQLSERVER -StartupType Automatic

    #Run Remove-Item PowerShell cmdlet to delete directory

    RUN Remove-Item -Path C:/SQL2016Dev_SP2 -Recurse -Force

    ```


    Clearly, using the *SHELL* instruction is more efficient than using the *RUN*
    instruction when leveraging PowerShell while building the image. And while you
    may start to think that the *SHELL* instruction was only written specifically
    for Windows containers, you can also use it on Linux to change to a different
    shell. But why would you want to do that inside a Linux container when the default
    shell can do most of the things you need?


    ### The CMD Instruction


    The *CMD* instruction allows you to set a default command and default parameters
    when you run a container using the *docker run* command. If you don’t provide
    a command when running a container, this instruction is executed. However, it
    is overridden should you choose to run a container with a specific command. Unlike
    the *RUN* and *SHELL* instructions where you can have multiple of these instructions
    in a *Dockerfile*, only the last *CMD* instruction will be evaluated. It doesn’t
    make sense to have multiple *CMD* instructions. Plus, you want the *CMD* instruction
    to execute something that runs and doesn’t exit. If you execute a command that
    exits after completion, the container will terminate as well. You don’t want the
    *CMD* instruction to run a service in Windows like `NET START MSSQLSERVER` because
    it will exit once the command completes, terminating the container with it. So
    much for running SQL Server as a service inside a container.


    The *CMD* instruction comes in not two but three forms:


    *   *CMD [“executable”, “param1”, “param2”]* (EXEC form, this is the preferred
    form)


    *   *CMD [“param1”, “param2”]* (as default parameters to ENTRYPOINT)


    *   *CMD command param1 param2* (*SHELL* form)


    The following is the *CMD* instruction, in *EXEC* form, if you want to run a PowerShell
    script named *start.ps1* as the last instruction in your *Dockerfile*. This assumes
    you’ve already copied the PowerShell script inside the image prior to running
    it.


    ```

    CMD ["powershell", "-Command", "C:/start.ps1"]

    ```


    Running the *CMD* instruction in *SHELL* form makes it behave like the *RUN* instruction
    in *SHELL* form, using the default operating system command shell. If you want
    to run your own command, you need to express the command as a JSON array, passing
    the full path to the executable and enclosed in double quotes – unless you use
    the *WORKDIR* instruction. The following is an example of running a .NET Console
    application named *sampleConsole.exe* using the CMD instruction:


    ```

    CMD ["C:/sampleConsole.exe", "--run"]

    ```


    As I mentioned, you can override the default command defined in the *CMD* instruction
    when you run a container. For example, running the Windows Server 2016 Core Docker
    image using the *docker run* command will immediately terminate the container
    after creation. I couldn’t find the reference *Dockerfile* that created this image
    to look at the *CMD* instruction. But it does terminate after creation. If I want
    to keep the container running, I can pass a command that doesn’t exit to the container
    to override whatever was written in the *CMD* instruction. The following is an
    example of passing the `ping localhost -t` command to the *docker run* command
    :


    ```

    docker run mcr.microsoft.com/windows/servercore:ltsc2016 ping localhost -t

    ```'
