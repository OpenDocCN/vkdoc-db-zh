- fmt: '### Add the Official GPG Key from Docker


    Validating the integrity of a software package before installation is one way
    to guarantee that it is indeed what the developer originally distributed. You
    certainly don’t want to download a file that has been maliciously modified and
    redistributed. Of course, this assumes that the developer signs the package and
    makes the public key available.


    Most Linux packages are validated by verifying its GPG key. Docker created their
    own GPG key that they use to create their package so you can validate its integrity
    before installing.


    Use the following `curl` command to download and add the official GPG key from
    Docker into the Ubuntu system:


    ```

    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -

    ```


    Using the pipe operator, the output of the `curl` command is piped to the `apt-key`
    command to add the downloaded key to the list of trusted keys in the system.


    It wouldn’t make sense for you to simply accept the key as it is without verifying
    whether or not it is the original key from Docker. This is where fingerprints
    are useful. Docker provided the fingerprint in their documentation so you can
    verify it with the key you downloaded:


    ```

    9DC8 5822 9FC7 DD38 854A E2D8 8D81 803C 0EBF CD88

    ```


    You can use the following `apt-key` command to verify the fingerprint, passing
    the fingerprint value without spaces. Figure [3-8](#484552_1_En_3_Chapter.xhtml#Fig8)
    displays the key with the matching fingerprint that you passed.


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig8_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig8_HTML.jpg)


    Figure 3-8: Displaying the Docker GPG key fingerprint


    ```

    sudo apt-key finger 9DC858229FC7DD38854AE2D88D81803C0EBFCD88

    ```


    ### Add the Docker Stable Repository to Your System


    Same as with CentOS, you need to add the Docker stable repository to your Ubuntu
    system. Use the following `add-apt-repository` command to do this. The `lsb_release`
    command with the `-cs` parameter appended to the repo information displays the
    Linux Standard Base (LSB) information containing the short format of the codename.
    In the case of this Ubuntu distro, it’s `xenial`.


    ```

    sudo add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu
    $(lsb_release -cs) stable"

    ```


    This command will add the information in the `/etc/apt/sources.list`. You can
    verify this by displaying the contents of the `/etc/apt/sources.list` using the
    following `cat` command. Figure [3-9](#484552_1_En_3_Chapter.xhtml#Fig9) displays
    the URL source of the Docker CE package repo for Ubuntu.


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig9_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig9_HTML.jpg)


    Figure 3-9: Docker CE repo added to the /etc/apt/sources.list


    ```

    sudo cat /etc/apt/sources.list

    ```


    Because you have made modifications to your Ubuntu system by installing additional
    packages and adding the Docker CE repo, you need to rerun the `apt-get update`
    command:


    ```

    sudo apt-get update

    ```


    Now, you’re ready to install the Docker CE package.


    ### Install Docker CE


    While CentOS uses `yum install` to download and install the Docker CE package,
    Ubuntu uses `apt-get install`.


    ```

    sudo apt-get install docker-ce

    ```


    Type `y` when prompted to continue. Like when you installed Docker CE on CentOS,
    other package dependencies will be installed alongside `docker`, including `docker-ce-cli`
    and `containerd.io`, as shown in Figure [3-10](#484552_1_En_3_Chapter.xhtml#Fig10).


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig10_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig10_HTML.jpg)


    Figure 3-10: List of dependent packages when installing Docker


    Unlike with CentOS, you don’t have to manually configure the Docker daemon to
    start and enable on server reboot. That has been done for you as part of the installation
    process.


    ### Verifying the Docker Engine Installation


    Now that Docker CE has been installed on your Linux machine, it’s pretty much
    the same as with any operating system. The Docker command-line interface and the
    Docker commands are the same across the board. You can run the following command
    to check the version of Docker installed on the server:


    ```

    sudo docker version

    ```


    Figure [3-11](#484552_1_En_3_Chapter.xhtml#Fig11) shows the output of the command
    on an Ubuntu machine side by side with a CentOS machine, displaying the version
    of the Docker client and the Docker engine. I used the command `cat /etc/os-release
    | grep PRETTY_NAME` to display the friendly name of the Linux distro. As you can
    see, the versions are the same.


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig11_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig11_HTML.jpg)


    Figure 3-11: Displaying the version of Docker client and Docker engine


    Don’t make the mistake of running `docker` commands on Linux without `sudo`. Oftentimes,
    administrators coming from the Windows platform bring their practices and way
    of thinking as they come into the Linux world. And they wonder why something isn’t
    working. Running `docker version` without `sudo` will return an error message
    such as the one in Figure [3-12](#484552_1_En_3_Chapter.xhtml#Fig12).


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig12_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig12_HTML.jpg)


    Figure 3-12: Running Docker commands without sudo


    You don’t want to end up troubleshooting a perceived installation issue like this
    and spending hours trying to figure out what’s wrong only to realize that you
    simply did not run the command with elevated privileges.


    Run the following command to display system-wide information regarding the docker
    installation on the server. Figure [3-13](#484552_1_En_3_Chapter.xhtml#Fig13)
    shows the output of the command. And there’s clearly more information provided
    on a Linux system than there is on the Windows system.


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig13_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig13_HTML.jpg)


    Figure 3-13: Displaying the system-wide information of the Docker installation


    ```

    sudo docker info

    ```


    You now have a fully functional Docker container host running on Linux. Not bad
    for somebody who is just getting started with Linux.'
