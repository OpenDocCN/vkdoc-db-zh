    to a single network adapter. This made it possible to connect to multiple SQL
    Server named instances on the same host using port 1433 – same concept, different
    implementation. However, it’s not something I recommend unless you have a strong
    foundation on the basics of TCP/IP or work with a system administrator who does.
    Troubleshooting network connectivity can be a pain with complex implementations
    like this.'
  trans: '## 在多个容器上使用相同端口


    在同一 Docker 主机上运行的多个容器上利用默认 SQL Server 端口号的另一种方法是，为每个容器创建不同的 Docker 网络。由于每个 Docker
    网络将拥有自己的 IP 地址范围和子网，因此可以为每个容器分配一个唯一的 IP 地址，从而允许所有容器都使用 1433 端口。请记住，TCP 或 UDP 端口是
    IP 地址加端口号的唯一组合。如果我们为不同的主机（或者在本例中是不同的容器）分配不同的 IP 地址，就可以重用相同的端口号。以下是使用 `bridge`
    驱动程序创建用户定义的 Docker 网络并为来自该用户定义网络的容器分配特定 IP 地址的示例：


    ```

    #步骤 1：创建一个名为 bridgenet1 的用户定义网络

    docker network create -d bridge --subnet 172.19.0.1/24 bridgenet1

    #步骤 2：运行一个容器并将其连接到 bridgenet1

    docker run --network bridgenet1 -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=y0urSecUr3PAssw0rd''
    --ip="172.19.0.2" --name sql-linuxcon01 -d -h linuxsql01 mcr.microsoft.com/mssql/server:2017-latest

    #步骤 3：创建一个名为 bridgenet2 的用户定义网络

    docker network create -d bridge --subnet 10.0.0.1/16 bridgenet2

    #步骤 4：运行一个容器并将其连接到 bridgenet2

    docker run --network bridgenet2 -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=y0urSecUr3PAssw0rd''
    --ip="10.0.0.2" --name sql-linuxcon02 -d -h linuxsql02 mcr.microsoft.com/mssql/server:2017-latest

    ```


    让我们来探究一下这段示例代码，了解它的作用。在步骤 1 中，我们使用 `-d` 参数创建了一个名为 `bridgenet1` 的 Docker 网络，该参数指定使用
    `bridge` 驱动程序来定义它。`--subnet` 参数定义了 IP 地址范围和子网掩码——`172.19.0.1/24`。任何连接到此网络的容器都将拥有此特定范围内的
    IP 地址。在步骤 2 中，我们创建并运行了一个新的 SQL Server on Linux 容器。请注意这里使用了 `--network` 和 `--ip`
    参数，而非通常的 `-p` 参数。在这里，我们告诉 Docker 将此容器连接到 `bridgenet1` 网络，并为其分配 `172.19.0.2` 的
    IP 地址，而不是依赖 `bridge` 网络来分配 IP 地址（Docker 守护进程有效地充当 DHCP 服务器，为连接到 `bridge` 网络的容器提供
    IP 地址）。我们在步骤 3 和 4 中执行了相同的操作。图 11-5 显示了在创建用户定义的 Docker 网络并将容器连接到它们之后，Docker 主机的
    TCP/IP 属性。


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig5_HTML.jpg](img/484552_1_En_11_Fig5_HTML.jpg)


    图 11-5

    创建用户定义的网络并将容器连接到它们之后，Docker 主机的 TCP/IP 设置


    请注意以下几点：


    *   `docker0` 网桥状态为 `DOWN`，因为没有正在运行的容器连接到它。

    *   创建了两个名为 `br-a65abe44e690` 和 `br-944424a1e3a4` 的新 Linux 网桥。它们分别对应于 `bridgenet1`
    和 `bridgenet2`。同样，在您的 Docker 主机上名称会有所不同。

    *   同样地，创建了两个名为 `veth41f58c2@if59` 和 `veth478416d@if62` 的新虚拟网络适配器。回想一下，Docker
    每次启动容器时都会创建一对虚拟网络适配器，一端通过网桥网络连接到主机系统，另一端连接到正在运行的容器。这些虚拟网络适配器分别对应于连接到 `bridgenet1`
    和 `bridgenet2` 的容器。


    您可以通过使用它们各自的 IP 地址连接到容器上相应的 SQL Server 实例来测试这一点，如图 11-6 所示。


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig6_HTML.jpg](img/484552_1_En_11_Fig6_HTML.jpg)


    图 11-6

    使用不同的 IP 地址连接到同一 Docker 主机上的容器中的 SQL Server


    **注意**

    请记住，虽然可以通过 IP 地址访问容器，但您只能从 Docker 主机连接到它们。这是因为只有 Docker 主机知道这些新的 IP 地址。为了远程访问它们，您需要配置从网络上的客户端机器到
    Docker 主机的适当路由。请咨询您的网络管理员，了解如何正确配置此路由以远程访问这些容器。


    这是互联网服务提供商在互联网早期使用的一个非常古老的技巧，当时 Web 服务器托管着数百个甚至更多的网站，每个网站都有自己的域名和 IP 地址。与其启动数百个
    Web 服务器，不如为单个 Web 服务器分配多个 IP 地址更具成本效益。SQL Server 在命名实例中采用了这一技巧，要么在单个数据库服务器上附加多个网络适配器，要么为单个网络适配器分配多个
    IP 地址。这使得可以使用 1433 端口连接到同一主机上的多个 SQL Server 命名实例——概念相同，实现方式不同。然而，除非您对 TCP/IP 的基础知识有扎实的掌握，或者与懂这方面的系统管理员合作，否则我不推荐这样做。对于像这样的复杂实现，排查网络连接问题可能会非常麻烦。'
- fmt: "## Intra-container Communications\n\n`docker0` 桥接网络是 Docker *bridge* 网络的一个例子。虽然我们已经介绍过\
    \ *bridge* 网络是什么以及能做什么，但 `docker0` 桥接网络有些特殊。让我们来看看基于 *bridge* 网络的容器间通信是如何实现的。\n\
    \n将容器连接到 *bridge* 网络，可以让它们利用 Docker 主机上的网络能力。就像任何网络交换机一样，连接到桥接网络的容器可以相互通信。然而，它们与其他连接到不同桥接网络的容器是完全隔离的。图\
    \ 11-7 展示了我们在上一节中创建的用户定义桥接网络的网络示意图。\n\n![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig7_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig7_HTML.jpg)\n\
    \n**图 11-7**\n上一节创建的用户定义桥接网络的网络示意图\n\n因为它们位于两个隔离的网络上，所以 `sql-linuxcon01` 无法与 `sql-linuxcon02`\
    \ 通信，反之亦然。根据网络管理员的设计方式，实施网络分段有多种原因——安全隔离是最常见的原因之一，此外还有合规性、服务质量（QoS）等。将容器部署在不同的用户定义桥接网络上也是同样的道理。请与您的网络管理员讨论网络设计，这是了解网络为何如此设计的好机会。但无论网络设计简单还是复杂，服务与应用都需要相互通信。这就是网络路由和\
    \ DNS 等其他网络服务的用武之地。\n\n假设我们使用默认的 `docker0` 桥接网络创建了两个容器。我提到过 `docker0` 桥接网络有些特殊，因为连接到它的容器虽然可以相互通信，但只能通过\
    \ IP 地址进行，不能使用主机名。相比之下，连接到用户定义桥接网络的容器可以利用内置的 DNS 服务，允许它们使用 IP 地址、主机名或别名进行通信。请回忆第\
    \ 10 章“Docker Compose 和 YAML 文件”一节中提供的示例。以下 YAML 文件描述了构成多容器应用所需的两个容器的部分网络组件：\n\
    \n```\nversion: \"3\"\nservices:\n  wfe:\n    build: ./mssql-aspcore-example-app\n\
    \    ports:\n      - \"5000:5000\"\n    depends_on:\n      - db\n  db:\n    build:\
    \ ./mssql-aspcore-example-db\n    environment:\n      SA_PASSWORD: \"mySecUr3PAssw0rd\"\
    \n      ACCEPT_EULA: \"Y\"\n    ports:\n      - \"1500:1433\"\n```\n\n这个多容器应用由两个服务组成——`wfe`\
    \ 服务和 `db` 服务。如果您查看 ASP.NET Core 应用的 `appsettings.json` 文件，数据库连接字符串指定了数据库服务器。我特意强调了一下数据库服务器名称：\n\
    \n```\n\"ConnectionStrings\": {\n  \"BelgradeDemo\": \"Server=db;Database=ProductCatalog;User\
    \ ID=WebLogin; password=SQLPass1234!\"\n}\n```\n\n那么，ASP.NET Core 应用是如何知道它需要连接的\
    \ SQL Server on Linux 容器就是数据库服务器呢？当您运行 Docker Compose 来构建多容器应用时，Docker 首先要做的是创建一个名为\
    \ `<projectName>_default` 的用户定义桥接网络。由于项目名称是 `mssql-aspcore-example`，所以用户定义的桥接网络被命名为\
    \ `mssql-aspcore-example_default`。图 11-8 显示了作为多容器应用一部分创建的用户定义桥接网络。它还显示了两个容器——对应\
    \ `wfe` 的 `mssql-aspcore-example_wfe_1` 和对应 `db` 的 `mssql-aspcore-example_db_1`——连接到该桥接网络及其对应的\
    \ IP 地址。到目前为止一切顺利。\n\n![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig8_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig8_HTML.jpg)\n\
    \n**图 11-8**\n作为多容器应用一部分创建的用户定义桥接网络\n\n但我们还没有回答这个问题：*ASP.NET Core 应用是如何知道它需要连接的\
    \ SQL Server on Linux 容器就是数据库服务器？* 因为两个容器连接到同一个用户定义的桥接网络，`wfe` 容器能够通过 YAML 文件中定义的服务名访问\
    \ `db` 容器。用户定义的桥接网络提供 DNS 名称或别名解析，在本例中，就是 YAML 文件中为服务定义的别名。由于容器是使用 Docker Compose\
    \ 创建的，因此没有提供主机名，这与我们使用 `docker run` 命令并传递 `-h` 参数时不同。Docker 会为容器分配容器 ID 作为主机名。但是，借助为服务定义的别名，并且两个容器连接到同一个用户定义的桥接网络，它们可以使用\
    \ DNS 名称（或者在本例中是别名解析）进行通信。如果您决定将 YAML 文件中的服务名称从 `db` 更改为 `dbserver`，那么您也需要修改 `appsettings.json`\
    \ 文件中的连接字符串值。"
  raw: '## Intra-container Communications


    The *docker0* bridge is an example of a Docker *bridge* network . And while we’ve
    already covered a bit of what *bridge* networks are and what they can do, the
    *docker0* bridge is a bit special. Let’s look at what makes intra-container communications
    possible using the *bridge* network.


    Connecting containers to a *bridge* network allows them to take advantage of networking
    capabilities on the Docker host. Just like any network switch, containers connected
    to a bridge network can communicate with each other. However, they are totally
    isolated to other containers connected to other bridge networks. Figure [11-7](#484552_1_En_11_Chapter.xhtml#Fig7)
    shows the network diagram of the user-defined bridge networks we created in the
    previous section.


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig7_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig7_HTML.jpg)


    Figure 11-7


    Network diagram of the user-defined bridge network created in the previous section


    Because they are on two isolated networks, *sql-linuxcon01* cannot communicate
    with *sql-linuxcon02* and vice versa. Depending on how your network administrators
    designed the network, there are reasons why they would implement network segmentation –
    security isolation being one of the most common reasons, compliance, and quality
    of service (QoS), just to name a few. The same is true for deploying containers
    on different user-defined bridge networks. Talk to your network administrators
    about your network design. It is a great opportunity to understand why your network
    is designed the way it is. But whether the network design is simple or complex,
    services and applications need to talk to each other. This is where network routing
    and other network services like DNS come in.


    Let’s say we created two containers using the default bridge network, *docker0*.
    I did mention that the *docker0* bridge is a bit special given that while containers
    connected to it can communicate with each other, they can only talk to each other
    via IP address, not hostnames. In contrast, containers connected to a user-defined
    bridge network can take advantage of the built-in DNS service, allowing them to
    communicate with each other using either IP addresses, hostnames, or aliases.
    Recall the example provided in the section “Docker Compose and YAML Files” in
    *Chapter* [*10*](#484552_1_En_10_Chapter.xhtml). The following YAML file describes
    a bit of the networking components that make up the two containers needed for
    the multi-container app:


    ```

    version: "3"

    services:

    wfe:

    build: ./mssql-aspcore-example-app

    ports:

    - "5000:5000"

    depends_on:

    - db

    db:

    build: ./mssql-aspcore-example-db

    environment:

    SA_PASSWORD: "mySecUr3PAssw0rd"

    ACCEPT_EULA: "Y"

    - "1500:1433"

    ```


    There are two services that make up the multi-container app – the *wfe* service
    and the *db* service. If you explore the *appsettings.json* file of the ASP.NET
    Core application, the database connection string specifies the database server.
    I’ve highlighted the database server name for emphasis:


    ```

    "ConnectionStrings": {

    "BelgradeDemo": "Server=db;Database=ProductCatalog;User ID=WebLogin; password=SQLPass1234!"

    }

    ```


    So, how did the ASP.NET Core app know that the SQL Server on Linux container was
    the database server that it needs to connect to? When you ran Docker Compose to
    build the multi-container app, the first thing that Docker did was to create a
    user-defined bridge network named *<projectName>_default*. Since the name of the
    project is *mssql-aspcore-example*, the user-defined bridge network is named *mssql-aspcore-example_default*.
    Figure [11-8](#484552_1_En_11_Chapter.xhtml#Fig8) shows the user-defined bridge
    network created as part of the multi-container app. It also shows the two containers –
    *mssql-aspcoreexample_wfe_1* for the *wfe* and *mssql-aspcore-example_db_1* for
    the *db* – attached to the bridge network with their corresponding IP addresses.
    So far, so good.


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig8_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig8_HTML.jpg)


    Figure 11-8


    User-defined bridge network created as part of the multi-container app


    But we still haven’t answered the question, *how did the ASP.NET Core app know
    that the SQL Server on Linux container was the database server that it needs to
    connect to?* Because the two containers are connected to the same user-defined
    bridge network, the *wfe* container was able to access the *db* container via
    the service name as defined in the YAML file. User-defined bridge networks provide
    DNS name or alias resolution, in this case, aliases for the services as defined
    in the YAML file. Because the containers were created using Docker Compose, no
    hostnames were provided, unlike when we were using the *docker run* command and
    passing the *-h* parameter. Docker will assign the container ID as the hostname
    for the containers. But with the aliases defined for the services and having both
    containers connected to the same user-defined bridge network, they can communicate
    with each other using DNS name or, in this case, alias resolution. Should you
    decide to change the service name in the YAML file from *db* to *dbserver*, you
    would need to modify the connection string value in the *appsettings.json* file
    as well.'
  trans: "\n## 容器间通信\n\n`docker0` 桥接网络是 Docker *bridge* 网络的一个例子。虽然我们已经介绍过 *bridge*\
    \ 网络是什么以及能做什么，但 `docker0` 桥接网络有些特殊。让我们来看看基于 *bridge* 网络的容器间通信是如何实现的。\n\n将容器连接到\
    \ *bridge* 网络，可以让它们利用 Docker 主机上的网络能力。就像任何网络交换机一样，连接到桥接网络的容器可以相互通信。然而，它们与其他连接到不同桥接网络的容器是完全隔离的。图\
    \ 11-7 展示了我们在上一节中创建的用户定义桥接网络的网络示意图。\n\n![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig7_HTML.jpg](img/484552_1_En_11_Fig7_HTML.jpg)\n\
    \n**图 11-7**\n上一节创建的用户定义桥接网络的网络示意图\n\n因为它们位于两个隔离的网络上，所以 `sql-linuxcon01` 无法与 `sql-linuxcon02`\
    \ 通信，反之亦然。根据网络管理员的设计方式，实施网络分段有多种原因——安全隔离是最常见的原因之一，此外还有合规性、服务质量（QoS）等。将容器部署在不同的用户定义桥接网络上也是同样的道理。请与您的网络管理员讨论网络设计，这是了解网络为何如此设计的好机会。但无论网络设计简单还是复杂，服务与应用都需要相互通信。这就是网络路由和\
    \ DNS 等其他网络服务的用武之地。\n\n假设我们使用默认的 `docker0` 桥接网络创建了两个容器。我提到过 `docker0` 桥接网络有些特殊，因为连接到它的容器虽然可以相互通信，但只能通过\
    \ IP 地址进行，不能使用主机名。相比之下，连接到用户定义桥接网络的容器可以利用内置的 DNS 服务，允许它们使用 IP 地址、主机名或别名进行通信。请回忆第\
    \ 10 章“Docker Compose 和 YAML 文件”一节中提供的示例。以下 YAML 文件描述了构成多容器应用所需的两个容器的部分网络组件：\n\
    \n```\nversion: \"3\"\nservices:\n  wfe:\n    build: ./mssql-aspcore-example-app\n\
    \    ports:\n      - \"5000:5000\"\n    depends_on:\n      - db\n  db:\n    build:\
    \ ./mssql-aspcore-example-db\n    environment:\n      SA_PASSWORD: \"mySecUr3PAssw0rd\"\
    \n      ACCEPT_EULA: \"Y\"\n    ports:\n      - \"1500:1433\"\n```\n\n这个多容器应用由两个服务组成——`wfe`\
    \ 服务和 `db` 服务。如果您查看 ASP.NET Core 应用的 `appsettings.json` 文件，数据库连接字符串指定了数据库服务器。我特意强调了一下数据库服务器名称：\n\
    \n```\n\"ConnectionStrings\": {\n  \"BelgradeDemo\": \"Server=db;Database=ProductCatalog;User\
    \ ID=WebLogin; password=SQLPass1234!\"\n}\n```\n\n那么，ASP.NET Core 应用是如何知道它需要连接的\
    \ SQL Server on Linux 容器就是数据库服务器呢？当您运行 Docker Compose 来构建多容器应用时，Docker 首先要做的是创建一个名为\
    \ `<projectName>_default` 的用户定义桥接网络。由于项目名称是 `mssql-aspcore-example`，所以用户定义的桥接网络被命名为\
    \ `mssql-aspcore-example_default`。图 11-8 显示了作为多容器应用一部分创建的用户定义桥接网络。它还显示了两个容器——对应\
    \ `wfe` 的 `mssql-aspcore-example_wfe_1` 和对应 `db` 的 `mssql-aspcore-example_db_1`——连接到该桥接网络及其对应的\
    \ IP 地址。到目前为止一切顺利。\n\n![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig8_HTML.jpg](img/484552_1_En_11_Fig8_HTML.jpg)\n\
    \n**图 11-8**\n作为多容器应用一部分创建的用户定义桥接网络\n\n但我们还没有回答这个问题：*ASP.NET Core 应用是如何知道它需要连接的\
    \ SQL Server on Linux 容器就是数据库服务器？* 因为两个容器连接到同一个用户定义的桥接网络，`wfe` 容器能够通过 YAML 文件中定义的服务名访问\
    \ `db` 容器。用户定义的桥接网络提供 DNS 名称或别名解析，在本例中，就是 YAML 文件中为服务定义的别名。由于容器是使用 Docker Compose\
    \ 创建的，因此没有提供主机名，这与我们使用 `docker run` 命令并传递 `-h` 参数时不同。Docker 会为容器分配容器 ID 作为主机名。但是，借助为服务定义的别名，并且两个容器连接到同一个用户定义的桥接网络，它们可以使用\
    \ DNS 名称（或者在本例中是别名解析）进行通信。如果您决定将 YAML 文件中的服务名称从 `db` 更改为 `dbserver`，那么您也需要修改 `appsettings.json`\
    \ 文件中的连接字符串值。\n"
- fmt: '## Putting It All Together


    使用我们在*第10章*中构建的多容器应用，让我们探索不同组件如何协同工作以理解Docker网络栈，整合我们在本书中涵盖的所有内容。图11-9展示了这个多容器应用的网络示意图。


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig9_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig9_HTML.jpg)


    图 11-9

    多容器应用的网络示意图


    由于容器运行在单个Docker主机上：


    *   两个容器都连接到用户定义的桥接网络`mssql-aspcore-example_default`，并将被分配到如图11-8所示的子网`172.20.0.0/16`中的一个IP地址。IP地址范围取决于分配给用户定义的桥接网络的地址。


    *   两个容器都可以使用Docker主机的IP地址及其相应的端口进行远程访问。`wfe`容器可以通过`http://172.18.38.105:5000`从任何浏览器访问，而`db`容器可以通过`172.18.38.105:1500`使用你喜欢的SQL
    Server工具（SSMS、Azure Data Studio、sqlcmd、Visual Studio等）访问。即使不修改默认的Linux防火墙规则，这也是可能的，因为Docker守护进程在后台修改了`iptables`。回顾*第8章*中“关于Linux防火墙和Docker的注意事项”一节。


    *   用户定义的桥接网络`mssql-aspcore-example_default`为从外部网络进入容器的流量提供网络地址转换。这允许多个容器通过单个IP地址（即Docker主机的IP地址）访问外部网络，反之亦然。对`wfe`在`http://172.18.38.105:5000`的浏览器请求将被重定向到`wfe`的内部IP地址的`5000`端口——`http://172.20.0.3:5000`。类似地，对`db`在`172.18.38.105:1500`的数据库请求将被重定向到`db`的内部IP地址的`1433`端口——`172.20.0.2:1433`。


    *   因为它们连接到用户定义的桥接网络，容器可以使用IP地址、主机名或别名相互通信。因此，数据库连接字符串只需引用服务（或别名）名称即可工作。如果它们连接到默认的`docker0`桥接网络，则只能使用IP地址进行通信，这可能导致数据库调用失败。


    *   由于端口被发布并映射到Docker主机，两个容器都可以远程访问。你可以通过移除端口映射来限制对`db`容器的远程访问。如果这样做，你仍然可以从`wfe`容器或Docker主机访问`db`容器。


    *   我们需要在此停止，以免你最终接手了网络管理员的工作。


    由于容器的IP地址没有显式定义，你可以使用`docker inspect`命令来获取它们的IP地址，如下所示，传入容器名称或ID值：


    ```

    docker inspect <container_name_or_id> | grep IPAddress

    ```


    但你可能不想对所有运行中的容器手动执行此操作。以下命令将显示所有运行中的容器及其对应的IP地址：


    ```

    docker inspect --format=''{{.Name}} {{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}''
    $(docker ps -q)

    ```


    请记住，这仅涵盖单主机网络。要了解更多可与Docker一起使用的其他类型的网络驱动程序，请查看Docker网络概述：`https://docs.docker.com/network/`。


    ## Summary


    当我为本书准备大纲时，本章甚至不在初稿中。直到我想起处理任何与云相关的网络栈是多么具有挑战性。我清楚地记得，我曾浪费数小时在AWS和Microsoft Azure上部署SQL
    Server时排查问题，结果发现问题与SQL Server无关——是网络问题。无论你使用的是公有云还是私有云，理解网络栈的基础在今天都尤为重要，尤其是当你面对所谓的网络即服务提供的所有抽象层时。因此，我包含了单主机部署的Docker网络基础知识。本章介绍了Docker如何利用Linux桥接来实现其网络功能，容器如何通过端口映射暴露给外部网络，以及即使Microsoft文档明确说明不可能，如何通过容器在单个Linux机器上运行多个SQL
    Server on Linux实例。事实是，TCP/IP和网络基础知识保持不变，只是其实现方式发生了变化。所以，下次当你在Docker、VMWare、Microsoft
    Azure或AWS等云平台上遇到网络问题时，回归基础。你会很高兴你学习了这些基础知识。'
  raw: '## Putting It All Together


    Using the multi-container app we built in *Chapter* [*10*](#484552_1_En_10_Chapter.xhtml),
    let’s explore how the different components work together to understand the Docker
    networking stack, incorporating everything we’ve covered throughout this book.
    Figure [11-9](#484552_1_En_11_Chapter.xhtml#Fig9) shows the network diagram of
    the multi-container app.


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig9_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig9_HTML.jpg)


    Figure 11-9


    Network diagram of multi-container app


    Since the containers are running on a single Docker host


    *   Both containers are connected to the *mssql-aspcore-example_default* user-defined
    bridge and will be assigned an IP address in the subnet *172.20.0.0/16* as shown
    in Figure [11-8](#484552_1_En_11_Chapter.xhtml#Fig8). The IP address range will
    depend on what was assigned to the user-defined bridge network.


    *   Both containers can be accessed remotely using the Docker host’s IP address
    with their corresponding ports. The *wfe* can be accessed via *http://172.18.38.105:5000*
    from any browser, while the *db* can be accessed via *172.18.38.105:1500* using
    your favorite SQL Server tool – SSMS, Azure Data Studio, sqlcmd, Visual Studio,
    and so on. This is possible even without modifying the default Linux firewall
    rules because the Docker daemon modifies the *iptables* behind the scenes. Recall
    the section “A Note on the Linux Firewalls and Docker” in *Chapter* [*8*](#484552_1_En_8_Chapter.xhtml).


    *   The *mssql-aspcore-example_default* user-defined bridge provides network address
    translation (NAT) for the traffic coming into the containers from the external
    network. This allows multiple containers to access the external network and vice
    versa through a single IP address – the IP address of the Docker host. A browser
    request to the *wfe* on *http://172.18.38.105:5000* will be redirected to the
    internal IP of the *wfe* on port *5000* – *http://172.20.0.3:5000*. Similarly,
    a database request to the *db* on *172.18.38.105:1500* will be redirected to the
    internal IP of the *db* on port *1433* – *172.20.0.2:1433*.


    *   Because they are connected to the user-defined bridge, the containers can
    communicate with each other using either the IP address, hostname, or aliases.
    Therefore, the database connection string works simply by referencing the service
    (or alias) name. If they were connected to the default *docker0* bridge, they
    can only communicate using their IP addresses which can cause the database call
    to fail.


    *   As the ports are published and mapped to the Docker host, both containers
    can be accessed remotely. You can restrict remote access to the *db* container
    by removing the port mapping. If you do so, you can still access the *db* container
    from the *wfe* container or from the Docker host.


    *   We need to stop right here before you end up taking the job of your network
    administrator.


    Since the IP address of the container wasn’t explicitly defined, you can retrieve
    their IP addresses by using the *docker inspect* command as shown in the following,
    passing either the container name or ID value:


    ```

    docker inspect  | grep IPAddress

    ```


    But you wouldn’t want to manually do this for all the running containers. The
    following command will display all the running containers with their corresponding
    IP addresses:


    ```

    docker inspect --format=''{{.Name}} {{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}''
    $(docker ps -q)

    ```


    Keep in mind that this only covers single-host networking. To learn more about
    the other types of network drivers that you can use with Docker, check out the
    Docker networking overview on [*https://docs.docker.com/network/*](https://docs.docker.com/network/).


    ## Summary


    When I was preparing the outline for this book, this chapter wasn’t even on the
    initial draft. Until I remembered how challenging it was to deal with the network
    stack on anything related to the cloud. I vividly remember how I wasted hours
    troubleshooting issues with deploying SQL Server on AWS and Microsoft Azure only
    to realize that the problem had nothing to do with SQL Server – it was the network.
    Whether you’re working with public or private cloud, understanding the fundamentals
    of the network stack is even more important today, especially when you’re dealing
    with all the abstractions that the so-called networking-as-a-service provides.
    Hence, I included the basics of Docker networking for single-host deployments.
    This chapter covers how Docker leverages the Linux bridge to implement their networking
    capabilities, how containers are exposed to external networks via port mapping,
    and how it is even possible to run multiple SQL Server on Linux instances on a
    single Linux machine through containers even when the Microsoft documentation
    clearly says you can’t. The truth is that the TCP/IP and networking fundamentals
    remain the same. Only their implementation has changed. So, the next time you’re
    faced with a networking issue on a cloud platform like Docker, VMWare, Microsoft
    Azure, or AWS, go back to the basics. You’ll be glad you learned the fundamentals.'
  trans: '

