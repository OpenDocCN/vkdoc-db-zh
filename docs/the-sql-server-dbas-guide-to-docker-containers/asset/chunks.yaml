- fmt: '## Sharing Files Between Host and Container


    There might be some cases where you have files on your Docker host that you want
    to share with the container. For example, you may want to restore a backup of
    a SQL Server database on the SQL Server instance inside a container. You can copy
    the backup file in a directory on your Docker host and make it available to your
    container. This is where the `-v` or `--volume` parameter of the `docker run`
    command comes in. First, create a `/tmp/dbData` directory in your Linux Docker
    host. Then, copy your database backups in that directory. Using the following
    command, mount the `/tmp/dbData` directory on the Linux Docker host to the `/var/opt/mssql`
    directory inside the container. It’s the same `docker run` command we’ve been
    using except that this one has the `-v` parameter.


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevlinuxcon01 -d -h linuxsqldev01 -v /tmp/dbData:/var/opt/mssql mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    You can think of the `/var/opt/mssql` directory inside the container as the `/tmp/dbData`
    directory in your Linux Docker host, like that of a network shared folder. Any
    data stored in the `/var/opt/mssql` directory inside the container will be persisted
    on `/tmp/dbData` directory in the Linux Docker host, which means you can delete
    the SQL Server container and keep your database files. Not only are you sharing
    data and files between the Linux Docker host and your container, you’re also persisting
    the data created inside your container. More details about this coming up in Chapter
    7.


    Once the `/tmp/dbData` directory has been mounted in the container, the SQL Server
    instance can access the backup files inside it. You can, then, restore the backup
    on the SQL Server instance inside the container. Of course, since the `/var/opt/mssql`
    directory inside the container points to the `/tmp/dbData` directory in the Linux
    Docker host, every database you create will also be stored in the `/tmp/dbData`
    directory. You can test this out by restoring the database backup followed by
    deleting the container. Figure 6-11 shows the contents of the `/tmp/dbData` directory
    in the Linux Docker host after deleting the SQL Server container.


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig11_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig11_HTML.jpg)


    Figure 6-11 Sharing data between Linux Docker host and the container


    Run the following command on Windows to create a container and map the `C:\dbData`
    folder on the Windows Docker host to the `C:\dbData` folder inside the container.
    The folder doesn’t have to exist inside the container, it will get created in
    the process of running the container. Note the use of a forward slash (/) instead
    of a backslash (\) to define the path. In the past, only the forward slash character
    worked when defining the path due to how the Go language interpreted the character.
    Now, you can use both. I use forward slash just to be consistent with both Windows
    and Linux paths.


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" –p 1433:1433 --name
    sqldevwincon01 -d -h winsqldev01 –v  C:/dbData:C:/dbData microsoft/mssql-server-windows-developer

    ```


    Another way to share files between the host and the container is by using the
    `docker cp` command. Using the same example, run the following command if you
    wanted to copy the `/tmp/dbData/NorthwindBackup.bak` file from your Linux Docker
    host inside the `sqldevlinuxcon01` container. You can use either the container
    ID or the container name, but I prefer using the container name so I know exactly
    what I’m working with.


    ```

    docker cp /tmp/dbData/NorthwindBackup.bak sqldevlinuxcon01:/var/opt/mssql/data

    ```


    On Windows, just replace the path with the proper Windows directory path, taking
    into account the forward slash instead of the backslash.


    ```

    docker cp C:/dbData/NorthwindBackup.bak sqldevwincon01:C:/

    ```


    You can also do the reverse and copy a file – in this case, the `testDB.bak` file
    – from the container into the Linux Docker host using the following command:


    ```

    docker cp sqldevlinuxcon01:/var/opt/mssql/data/testDB.bak /tmp/dbData/

    ```


    There’s clearly more than one way to share files between your Docker host and
    container.


    ## Configuring Container Resources


    By default, a container has no resource constraints. It can use as much of a given
    resource as the host’s kernel scheduler allows. This is not a good thing as far
    as SQL Server is concerned. We know that SQL Server will use up as much memory
    resource as is available in the system. Similarly, it will take up all available
    CPU cores. Think about how that would affect your licensing (not a big deal if
    this was a test environment and you’re only running Enterprise Evaluation, Developer,
    or Express Editions). But if you’ve licensed all the CPU cores on your Docker
    host, no need to worry about SQL Server licensing.


    The way you configure CPU and memory resources that your container consumes is
    similar to how you assign resources to virtual machines. Using the `docker run`
    command, add the `--cpus` parameter to assign the number of CPU resources your
    container can use and the `--memory` parameter to set the maximum amount of memory
    (you could argue that this can be done with `sp_configure` inside SQL Server,
    but it would be a lot better if this was done at the container level since you
    cannot run multiple SQL Server instances in the same Linux host). In my test environment,
    my Linux Docker host is configured to have 4 CPU cores and 8GB of memory, as shown
    in Figure 6-12.


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig12_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig12_HTML.jpg)


    Figure 6-12 Configured hardware resources for Docker host


    Running the following `docker stats` command with the formatting provided displays
    the CPU and memory utilization for my SQL Server on Linux container while running
    multiple queries, as shown in Figure 6-13. Clearly, it is taking up most of the
    CPU and memory resources (using up all 7.62GB memory) available on the Docker
    host.


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig13_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig13_HTML.jpg)


    Figure 6-13 Container resource utilization


    ```

    docker stats sqldevlinuxcon01 --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}"

    ```


    Run the following command to create and run the SQL Server on Linux container,
    assigning only 2 CPUs and 4GB of memory using the `--cpus` and `--memory` parameters,
    respectively:


    ```

    docker run -e "ACCEPT_EULA=Y" -e "    SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433
    --name sqldevlinuxcon01 -d -h linuxsqldev01 --cpus="2" --memory=4g mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    After restricting the amount of CPU and memory resources that the container can
    use, rerunning my queries on the SQL Server instance displays the new resource
    utilization using the `docker stats` command, as shown in Figure 6-14. Of course,
    the results of your tests depend on a lot of different factors – hardware configuration,
    SQL Server instance configuration, database schema, indexes, queries, and so on.
    This is just to demonstrate how you can configure container resource utilization.


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig14_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig14_HTML.jpg)


    Figure 6-14 After configuring container CPU and memory resource utilization


    Additional ways to configure container resource utilization are available at [https://docs.docker.com/config/containers/resource_constraints/](https://docs.docker.com/config/containers/resource_constraints/).'
