- fmt: '## Exploring Docker Hub


    I did mention that Docker Hub is your first stop if you want to search for specific
    Docker images that you intend to use. But nowhere in the output of when you ran
    Docker’s version of “hello world” did you see a web browser open up, searched
    for the `hello-world` image on Docker Hub, and initiated a pull. Besides, you
    don’t have a graphical user interface on Linux. How do you explore what images
    are available on Docker Hub? Use the `docker search` command and pass it the appropriate
    search term and parameters. For example, you can run the following command if
    you want to search Docker Hub for all images that contain the name “microsoft”,
    as shown in Figure [4-7](#484552_1_En_4_Chapter.xhtml#Fig7):


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig7_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Search results for Docker images with names containing microsoft


    ```

    docker search microsoft

    ```


    The results of the command are sorted according to “stars” or popularity. Looking
    at the ranking, it seems the SQL Server on Linux image is more popular than the
    ASP.NET Core on Windows image, considering that .NET Core has been released a
    year earlier than SQL Server on Linux.


    I wish the `docker search` command is as feature rich as the Docker Hub website
    where I can search by name of publisher, whether or not it’s a Docker certified
    image, or it’s a Windows or Linux container. But that shouldn’t stop you from
    leveraging your PowerShell or Linux scripting superpowers to manipulate and further
    filter the results you get from `docker search`. Let’s say you only want to list
    all the SQL Server–specific images. Since the results of the `docker search` command
    are a stream of text, you can use the `Select-String` PowerShell cmdlet to find
    specific string values. Run the following `docker search` command on your Windows
    Server host, using the PowerShell pipe character with the `Select-String` cmdlet
    to filter the results for anything with “sql”. Figure [4-8](#484552_1_En_4_Chapter.xhtml#Fig8)
    shows all Docker images with names containing “microsoft” filtered to only display
    those with “sql”. As a SQL Server DBA, these are the ones we’re more interested
    in.


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig8_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    On Windows, search results for Docker images with names containing microsoft and
    sql


    ```

    docker search microsoft | Select-String sql

    ```


    You can do the same with Linux by using the `grep` command , as shown in Figure
    [4-9](#484552_1_En_4_Chapter.xhtml#Fig9).


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig9_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    On Linux, search results for Docker images with names containing microsoft and
    sql


    ```

    docker search microsoft | grep sql

    ```


    Tip


    This is where you need to be cautious of the environment – Windows or Linux –
    that you’re working on. Keep in mind, containers virtualize the underlying operating
    system. Unlike other relational database management systems that only have Linux-based
    images available on Docker Hub, SQL Server is available on both Windows and Linux.
    You don’t want to make the mistake of pulling and running a SQL Server on Linux
    image on a Windows Server host and vice versa. It’s not going to work.


    ## Docker Image Naming Conventions


    You might be itching to work with SQL Server on containers but bear with me for
    a moment. We’ll get there soon. Let’s first look at container naming conventions
    because it helps set you up for the win when it comes to searching, pulling, building,
    or even pushing Docker images.


    Similar to working with SQL Server, there are default Docker configuration settings
    that have been provided for you during installation. Take, for instance, the default
    container registry that is Docker Hub. When you ran the `docker run` command to
    run Docker’s version of “hello world”, you didn’t have to provide the registry
    name. It simply used Docker Hub. You can opt to use other public container registries.
    But to do so, you need to understand the naming conventions used when working
    with Docker images.


    Docker images are referenced using a standard naming convention. This is to provide
    predictability for users consuming the images. The standard naming convention
    is similar to GitHub repository names, using the following format:


    `REGISTRY[:PORT]/REPO/IMAGE[:TAG]`


    An image name is made up of slash-separated name components, optionally prefixed
    by a registry hostname. The registry hostname must comply with standard DNS rules.
    If a registry hostname isn’t provided, it defaults to Docker Hub. Docker Hub’s
    fully qualified hostname is [`https://index.docker.io`](https://index.docker.io)
    or simply `docker.io`. You can see this in the `Registry:` field when you run
    `docker info`, as shown in Figure [4-10](#484552_1_En_4_Chapter.xhtml#Fig10).


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig10_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Fully qualified DNS hostname of Docker Hub


    You can use any available public container registries other than Docker Hub with
    their corresponding registry hostname in your `docker` commands. The following
    is a list of some that you may choose from. Usage will depend on how the public
    container registries are accessed.


    *   `Microsoft Container Registry (MCR)`: mcr.microsoft.com

    *   `Amazon Elastic Container Registry (ECR)`: dkr.<region>.amazonaws.com

    *   `Google Container Registry (GCR)`: gcr.io


    After the registry hostname comes the repository (or repo, for short) name. The
    repo structure varies depending on how the images are stored on the container
    registry. With so many software vendors using Docker Hub as a public container
    registry, the first-level repo name is the name of the software company. For example,
    `docker.io/microsoft` is Microsoft''s official repo on Docker Hub.


    The image name comes next after the repo and it is what identifies the contents
    of the Docker image. Looking at the results of the `docker search` command in
    Figure [4-7](#484552_1_En_4_Chapter.xhtml#Fig7), you can see the following:


    *   `mssql-server-linux` is the image that contains SQL Server on Linux.

    *   `windowsservercore` is the official Windows Server Core base image.

    *   `mssql-server-windows-express` is the image that contains SQL Server Express
    Edition on Windows.


    But given the numerous versions, editions, and operating system combinations that
    SQL Server now has – even excluding versions earlier than SQL Server 2016 – relying
    solely on the image name isn’t enough. What if you need a Docker image running
    SQL Server 2017 with Cumulative Update 5 on Windows Server 2016?


    This is where `tags` come in. Tags further identify the contents of the Docker
    image, providing additional detail whenever possible. If you don’t provide the
    tag when you run a container or pull an image from a repo, Docker will assume
    that you want the image that has the `latest` tag and that the image exists. Refer
    to the `docker run` command that you ran on Linux:


    ```

    docker run hello-world

    ```


    This is the same as running the command `docker run hello-world:latest` since
    you didn’t provide the tag with the image name, whereas the `docker run` command
    you ran on Windows has a tag on the image name.'
