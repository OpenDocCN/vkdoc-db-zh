- fmt: "## Summary\n\nIn this chapter, I’ve pointed out some of the things you need\
    \ to watch out for when working with SQL Server on containers. While containers\
    \ were originally designed for stateless applications and to be ephemeral and\
    \ immutable, decoupling the storage from the compute using Docker volumes allowed\
    \ containers to run stateful applications like SQL Server. The examples provided\
    \ demonstrate using Docker volumes to store SQL Server databases and leverage\
    \ them for operational tasks like updating the database engine with minimal downtime.\n\
    \nIn the next chapter, I’ll cover working with SQL Server on Linux in preparation\
    \ for creating your own SQL Server on Linux images. As a SQL Server DBA, I’ll\
    \ assume that you already have the basic knowledge of how SQL Server on Windows\
    \ works so I’ll just point out the key differences on how it works on Linux.\n\
    \nI’ll end this chapter with the final words that the Oracle left with Neo: “Be\
    \ there, at that exact time, and you will have a chance.” When the right time\
    \ comes, your preparation will make way for you.\n\n## 8. Working with SQL Server\
    \ on Linux\n\n> Policies are many, Principles are few, Policies will change, Principles\
    \ never do.\n> \n> —Dr. John C. Maxwell\n\nAs the staff at the rental car company\
    \ handed me the keys, she briefly explained how they only have manual transmission\
    \ cars available. She assumed I didn’t know how to drive a stick shift car just\
    \ because I had a driver’s license from North America. I had to tell the story\
    \ of how my elder brother taught me how to drive when I was 15 with a 1986 Suzuki\
    \ Samurai jeep. Her face immediately lit up when I told her about the jeep – it\
    \ was what her family drove when she was a kid. I guess the simple mention of\
    \ the jeep brought up amazing childhood memories with her family.\n\nShe completed\
    \ the paperwork and gave me directions to the parking lot where I can pick up\
    \ the rental car. As I was approaching the car, I noticed something strange. “Why\
    \ are people walking on the other side of the street?”, I asked myself. Or maybe\
    \ I was still trying to get acquainted to the city after being on the plane for\
    \ almost 12 hours. “That’s just jetlag,” I told myself. But it got even more weird\
    \ when I opened the door of the car – it’s a right-hand drive vehicle. That’s\
    \ when I realized it wasn’t weird at all. I was in the UK and people here drive\
    \ on the other side of the road. This is their normal.\n\nI didn’t really have\
    \ any issues with driving on the other side of the road. Living in Singapore for\
    \ three-and-a-half years taught me how to deal with taking the bus, walking on\
    \ the street, and even riding on the passenger side of a car – on the other side\
    \ of the road. “No big deal,” I thought, “How hard can it be?”. I knew how to\
    \ drive a stick shift car, and I knew how to deal with being on the other side\
    \ of the road. I was wrong. Driving out of that parking lot made me feel like\
    \ I was a student driver all over again. The frustrations of stalling, when I\
    \ was about to come near a speed bump, slow turning a corner, or even driving\
    \ forward as I start the car. You know that feeling of knowing what to do – because\
    \ you’ve been doing it your entire life – but couldn’t? It took me around 2 days\
    \ to finally find my rhythm and drive normally. I started to like it. But, then,\
    \ I had to return the car.\n\nIf you’ve been working with SQL Server your entire\
    \ career, I can understand your reluctance with even thinking about running it\
    \ on Linux. You’ve built your entire career on working with Windows – both your\
    \ work computer and the servers you manage. You know the shortcuts, you wrote\
    \ scripts, and you’re very comfortable fixing issues (there’s a reason you’re\
    \ the computer tech support guy during family holiday gatherings). I’m guessing\
    \ you’re thinking of joining the ranks of thousands of IT professionals who retired\
    \ knowing how to manage Windows servers only. And I don’t blame you. Large enterprises\
    \ run mission-critical SQL Server databases on Windows servers. And that is already\
    \ taking too much of your time. Why move to Linux?\n\nThe reality is that businesses\
    \ are already starting to move their SQL Server databases to Linux after Microsoft\
    \ announced support for it back in 2017\\. Given that Docker was originally a\
    \ developer for the Linux operating system, the move to run SQL Server on Docker\
    \ containers was the next logical step. So, while you’re still reluctant to even\
    \ look at the penguin icon, your career will depend on it.\n\nThis chapter covers\
    \ working with SQL Server on Linux. We’ll look at the architecture and setup experience.\
    \ We’ll compare running SQL Server on Windows vs. Linux. And we’ll write simple\
    \ Linux `bash` scripts. The goal of this chapter is to give you a good understanding\
    \ of what it takes to create a custom SQL Server on Linux image that you can deploy\
    \ as a container. And I can guarantee you, it won’t be as stressful and frustrating\
    \ as driving a stick shift car in the busy streets of London.\n\n## SQL Server\
    \ on Linux Architecture\n\nIn Chapter [1](#484552_1_En_1_Chapter.xhtml), I told\
    \ the story of how I found out about Project Helsinki in one of the executive\
    \ roundtables at the annual Microsoft MVP Summit. Immediately after that announcement,\
    \ I started asking questions regarding how the `SQL Server` engineering team managed\
    \ to pull off an almost impossible task of porting `SQL Server` to `Linux`. My\
    \ limited understanding of Oracle made me assume that Microsoft engineers had\
    \ to rewrite the entire code base to support running `SQL Server` on `Linux`.\
    \ Besides, Oracle had a different code base for Windows and Linux. How did the\
    \ engineering team manage to release `SQL Server` on `Linux` given the very short\
    \ timeframe?"
