- fmt: '## Add the Docker Stable Repository to Your System


    In Linux, a repository (or repo) is a location from which your machine retrieves
    and installs OS and application updates. Think of `yum` as Apple iTunes and repos
    as the Apple App Store. When you install an app on your phone, the package manager
    takes care of locating the repo, installing, updating, and even deleting the app.
    You don’t have to worry about where the app can be downloaded from.


    But since your system is not aware of additional packages that you want to install
    other than those that came preinstalled, you must define the repo. This tells
    Linux where to find the package during installation.


    Run the following `yum-config-manager` command to add the Docker stable repository
    to your system:


    ```

    sudo yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo

    ```


    Figure 3-3 shows the `docker-ce.repo` file being downloaded from the URL source
    and added to the `/etc/yum.repos.d/` directory.


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig3_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig3_HTML.jpg)


    Figure 3-3

    Adding the Docker Community Edition repo


    Run the following `cat` command if you’re curious to know what’s inside the `docker-ce.repo`
    file:


    ```

    sudo cat /etc/yum.repos.d/docker-ce.repo

    ```


    Figure 3-4 displays the content of the `docker-ce.repo` file. It shows you the
    URL sources of the Docker CE packages for CentOS Linux.


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig4_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig4_HTML.jpg)


    Figure 3-4

    The `docker-ce.repo` file


    Note: You might be wondering why we’re working with Docker CE (Community Edition)
    on Linux instead of the Docker EE (Enterprise Edition) like on a Windows Server
    machine. Docker CE is the free, open source version of Docker that you can use
    without having to pay for licenses nor support. This means you can deploy a Docker
    container host on an open source Linux distro like CentOS with no software-related
    cost. Deploying a Docker container host on a Windows Server machine requires a
    Windows Server license. And since you’re already paying for a Windows Server license,
    Microsoft decided to bundle Docker EE instead of Docker CE.


    ## Install Docker CE


    After updating your system and adding the Docker CE repo, you can now install
    the Docker CE package. Run the following command to download and install the Docker
    CE installation package for CentOS:


    ```

    sudo yum install docker-ce

    ```


    Type `y` when prompted to download the GPG key for CentOS from the Docker repo.


    There are other dependent packages that will be installed alongside Docker. Figure
    3-5 shows a list of package dependencies that will be installed as part of installing
    Docker. The two packages worth noting are `docker-ce-cli`, the Docker client command-line
    interface, and `containerd.io`, the one responsible for managing the complete
    lifecycle of a container on the Docker host.


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig5_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig5_HTML.jpg)


    Figure 3-5

    List of dependent packages when installing Docker


    The installation will create a Linux daemon named `docker` on the system. By default,
    the `docker` daemon is disabled. Run the following `systemctl` command to check
    the status of the `docker` daemon. Figure 3-6 shows the status of the `docker`
    daemon after installation. A status of `Active: inactive (dead)` is a giveaway.


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig6_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig6_HTML.jpg)


    Figure 3-6

    Status of Docker daemon


    ```

    sudo systemctl status docker

    ```


    ## Starting the Docker Daemon and Enabling on Startup


    Run the following command to start the `docker` daemon:


    ```

    sudo systemctl start docker

    ```


    And much like on a Windows Server installation, you want the `docker` daemon to
    automatically start on server reboot. Run the following command to enable the
    `docker` daemon to automatically start when the server starts or is rebooted:


    ```

    sudo systemctl enable docker

    ```


    This time, when you rerun the same command to check the status, you’ll see a status
    of `Active: active (running)`. Figure 3-7 shows the status of the `docker` daemon
    with a snippet of the log.


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig7_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig7_HTML.jpg)


    Figure 3-7

    Status of Docker daemon with the log


    We’ll save the verification of the Docker installation for later.


    ## Installing Docker on Ubuntu Linux


    Should you decide to install Docker on an Ubuntu machine, this section outlines
    the process for you. While there are some differences in commands used between
    Linux distros, the process is similar.


    ### Update the Ubuntu System Packages


    If CentOS uses `yum` for package management, Debian-based Linux distros such as
    Ubuntu use `apt-get`. Prior to installing Docker and other dependent packages,
    you need to update the system. Run the following command to update your Ubuntu
    system:


    ```

    sudo apt-get update

    ```


    The next command is to install the newest versions of all packages currently installed
    on the system:


    ```

    sudo apt-get upgrade

    ```


    I got a little bit confused the first time I ran these two commands. And maybe
    you were asking the same question that I had: *what’s the difference between update
    and upgrade?* The `apt-get update` command doesn’t actually install new versions
    of the packages installed on the system. It merely updates package information
    so the system knows which ones need upgrading. It’s like updating your phone contact
    list with new numbers and addresses before calling them to verify the new information.
    Since packages and their dependencies can change over time – maybe due to bug
    fixes, security updates, or even metadata changes – your system might try to download
    a package that no longer exists or has been moved to a different location. The
    `apt-get upgrade` command is the one that does the actual upgrade of all the packages
    installed on the system to their newest version. If new packages are required
    because of package dependencies, they will be installed as well. This is the reason
    why `apt-get update` should always be performed before `apt-get upgrade`.


    ### Install the Required Dependencies for Connecting to a Repository over HTTPS


    Similar to CentOS, you need to install several packages that Docker depends on.
    These are for use with connecting to a repo over HTTPS.


    - `apt-transport-https`: Ubuntu uses this to allow `apt-get` to download packages
    via HTTPS.

    - `ca-certificates`: This package contains a list of common certificate authorities,
    also used in combination with `apt-transport-https`.

    - `curl`: Short for Client URL Request Library, a tool to get or send files using
    a URL syntax. I use this mostly to download files from the Internet, such as repo
    files for a package.

    - `gnupg-agent`: This is used to manage secrets (or private keys). You need to
    add Docker’s official GPG key on your system and that needs to be handled properly.

    - `software-properties-common`: A tool used to manage package sources. Without
    this, you would have to manually add and/or remove package repos on your system.


    Run the following command to install the required dependencies:


    ```

    sudo apt-get install apt-transport-https ca-certificates curl gnupg-agent software-properties-common

    ```


    Don’t be surprised if not all of the packages will be installed. Some of them
    may have already been updated via the `apt-get upgrade` command.'
