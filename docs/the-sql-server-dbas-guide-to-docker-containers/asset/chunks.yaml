- fmt: '## Configuring the Firewall


    Depending on your Linux system configuration, you may need to configure the Linux
    firewall to allow remote connections to SQL Server. Linux systems use `iptables`,
    a rule-based firewall that comes preinstalled on most Linux distributions. It
    uses the concept of network address translation (NAT) and packet filtering to
    control network access to the system. But given the open source nature of Linux,
    many have attempted to build utilities and tools to make managing it a lot easier
    – hence, the availability of these utilities. For instance, the default system
    firewall on RHEL and CentOS 7 and higher is `FirewallD`. `FirewallD` exposes `iptables`
    via an API and allows administrators and developers to easily configure firewall
    settings using a command-line tool called `firewall-cmd`. You can learn more about
    `FirewallD` from [*https://firewalld.org/*](https://firewalld.org/). On the other
    hand, Ubuntu uses a command-line tool called `UFW` (short for uncomplicated firewall)
    that directly interacts with `iptables`. You can learn more about `UFW` from [*https://help.ubuntu.com/community/UFW*](https://help.ubuntu.com/community/UFW).
    Fun fact, you can install `FirewallD` on an Ubuntu system if you prefer. This
    makes it easier to standardize management of system firewall across these two
    Linux distributions. But where’s the fun in that? I won’t go into the details
    of how `iptables`, `firewalld`, `firewall-cmd`, and `ufw` work. I’ll just provide
    enough information to allow you to configure remote connectivity to your SQL Server
    on Linux using the tools available for your specific distribution.


    Let’s start with CentOS. First, run the following command to check whether `FirewallD`
    is running or not. Figure [8-2](#484552_1_En_8_Chapter.xhtml#Fig2) shows the status
    of a running `FirewallD` daemon on a CentOS Linux system.


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig2_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    FirewallD running on a CentOS Linux system


    ```

    sudo systemctl status firewalld

    ```


    Next, run the following `firewall-cmd` command with the corresponding parameters
    to open TCP port 1433 from the firewall:


    ```

    sudo firewall-cmd --zone=public --add-port=1433/tcp --permanent

    ```


    A key feature of `FirewallD` is the concept of zones. Every other feature is bound
    to a zone, and this describes the trust level for a connection, interface, or
    source address binding. `Public`, the zone used for this command, means you do
    not trust the other computers on the network, and only incoming traffic to TCP
    port 1433 will be allowed. The `--permanent` parameter means you want to permanently
    apply this firewall rule. But just because you configured it doesn’t mean it is
    automatically applied nor will it be persisted during system restarts. Another
    concept in `FirewallD` is the separation of runtime configuration vs. the permanent
    configuration. Runtime configuration is what the firewall is currently using to
    manage the rules and can be lost when the firewall rules are reloaded or the system
    is rebooted. Permanent configuration is stored in the `iptables` and loaded during
    system startup or when firewall rules are reloaded. This means you can make temporary
    changes to the firewall rules and load them in the runtime configuration. If you
    remove the `--permanent` parameter, you will be able to temporarily connect to
    the SQL Server instance on Linux remotely. But once the system is restarted or
    the firewall rules reloaded, the connection will be blocked because the firewall
    rule is lost. Also, because the `--permanent` parameter was used with the command,
    the firewall rule only exists as a permanent configuration, not a runtime configuration,
    and won’t take effect immediately. To apply the firewall rule, run the following
    command to reload it as a new runtime configuration:


    ```

    sudo firewall-cmd --reload

    ```


    A simple TELNET test on port 1433 to your CentOS Linux system will verify if the
    firewall rule has been applied. You can also run the following command to display
    runtime configuration of the opened ports in the firewall. Figure [8-3](#484552_1_En_8_Chapter.xhtml#Fig3)
    displays the opened TCP port 1433.


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig3_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    List opened ports in the system firewall


    ```

    sudo firewall-cmd --list-ports

    ```


    Didn’t I say we’ll use a different tool for Ubuntu systems? Run the following
    commands to check the status of `UFW`. Figure [8-4](#484552_1_En_8_Chapter.xhtml#Fig4)
    shows the status of the `UFW` daemon on an Ubuntu Linux system. But unlike `FirewallD`,
    `UFW` is disabled by default. Note the `Status: inactive` message.


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig4_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    UFW on an Ubuntu Linux system is disabled by default


    ```

    sudo systemctl status ufw

    sudo ufw status

    ```


    Run the following command to enable `UFW`. When prompted, type `y` for `Yes`.
    This will enable `UFW` and configure to start on system boot.


    ```

    sudo ufw enable

    ```


    Note


    A word of caution regarding the `UFW` firewall on Ubuntu. The previous chapters
    allowed you to connect to your Ubuntu Linux system via an SSH client. That’s because
    the firewall is disabled by default and the system is wide open for any remote
    connections – including SSH on port 22. This is unlike CentOS Linux where the
    firewall is enabled, blocking all access except remote connection through SSH.
    After enabling `UFW` on an Ubuntu Linux system, no other connections will be allowed
    unless you define a firewall rule for it. This also means that your existing SSH
    session is only valid so long as you are still connected. Once you disconnect,
    you’re locked out. Don’t make the mistake of closing your existing SSH connection
    without enabling port 22 on the firewall. Allow SSH connections by running this
    command: `sudo ufw allow 22/tcp`. To validate, run another SSH session and confirm
    that you can connect.


    After enabling `UFW` and allowing SSH connections, you can now open TCP port 1433
    from the firewall by running the following command. Figure [8-5](#484552_1_En_8_Chapter.xhtml#Fig5)
    displays the opened port numbers – 22 for SSH and 1433 for SQL Server.


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig5_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    UFW displaying all opened ports


    ```

    sudo ufw allow 1433/tcp

    ```


    As I mentioned in *Chapter* [*4*](#484552_1_En_4_Chapter.xhtml), the ultimate
    test is when you can connect remotely to the SQL Server instance on Linux via
    SQL Server Management Studio.'
