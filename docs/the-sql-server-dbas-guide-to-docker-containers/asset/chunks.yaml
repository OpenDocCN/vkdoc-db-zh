- fmt: "# 7. Persisting Data\n\n> *The faintest ink is more powerful than the strongest\
    \ memory.*\n> \n> —a Chinese proverb\n\nImmediately after getting settled in on\
    \ my desk, I asked my Sunday school teacher for some sheets of paper and crayons.\
    \ It’s not that I like writing, it’s just one of the very few things that I can\
    \ do as a sick kid. According to my doctor, I can’t play rough, I can’t do sports,\
    \ I can’t even laugh hard (that’s what I was told). So, it’s reading books, playing\
    \ the piano, and writing – or scribbling, because I can’t even read my own handwriting.\n\
    \nMy Sunday school teacher handed me a Magic Slate, and, according to her, it’s\
    \ a reusable drawing device. My 4-year-old brain tried to comprehend what it was\
    \ and how it worked. Besides, all I knew at that point were pencil – sometimes\
    \ crayons – and paper. I was told that I can draw on it, lift the sheets of filmy\
    \ paper to erase my drawing, and do it over and over and over again as many times\
    \ as I want. It came with a stylus but my fingernails were good enough to scribble\
    \ with. So, I started scribbling and drawing. I wrote my name on it. I even tried\
    \ to draw one of the kids’ face while being as detailed as I can. It’s interesting\
    \ how we both ended up laughing when I showed him my artistic sketch.\n\nOur laughter\
    \ was broken when he lifted the sheet of filmy paper on the Magic Slate. My drawing,\
    \ the one that took me hours to carefully sketch, was all gone in less than the\
    \ time I was able to say “Ben!” (if you’re reading this, sorry, Ben. Somebody\
    \ had to be thrown under the bus, and I happen to be the one telling the story).\
    \ I was devastated. How could that ever happen? I busted out crying until my Sunday\
    \ school teacher approached us and asked what happened. As I was trying to explain\
    \ the disappearing act that my drawing did, she reminded me that it was how the\
    \ Magic Slate worked. You write on it and erase everything by lifting the sheet\
    \ of filmy paper. It was designed that way. It took me a good half an hour to\
    \ finally settle down and ask for paper and crayons. I went back to what I knew\
    \ worked and vowed not to touch the Magic Slate ever again. Or so I thought.\n\
    \nBefore you get too involved with deploying your SQL Server databases on containers,\
    \ I want to make sure you get one thing straight: Docker containers were originally\
    \ designed specifically to be stateless. That means they do not have data persistence\
    \ and they can’t maintain data when they’re either moved to another server (in\
    \ case you decide to deploy a Docker Swarm cluster with multiple hosts) or the\
    \ container is destroyed. As SQL Server database professionals, that’s a big no-no.\
    \ We want to store and persist data. We want to protect it, back it up, and make\
    \ sure it’s there when we need it. How can this Docker thing be right for SQL\
    \ Server or any type of data storage platform?\n\nI could have skipped writing\
    \ this chapter if that was the case. But I didn’t. This chapter covers working\
    \ with stateful applications like relational databases in containers. I’ll introduce\
    \ you to Docker volumes, how to work with them, and using volumes to store SQL\
    \ Server database files. Once you’ve gone through the configuration, you will\
    \ see how Docker containers can be used for stateful applications and SQL Server,\
    \ in particular.\n\n## Stateful vs. Stateless Applications\n\nI mentioned in the\
    \ previous section that Docker was originally designed to be stateless. Stateless\
    \ applications are those that do not save client data generated in one session\
    \ for use in the next session. Imagine getting a haircut from your favorite barber\
    \ every other week. Being stateless means you’re always telling your barber how\
    \ you would like your haircut every time you visit. Your barber does not keep\
    \ a record of your preferred hairstyle, nor your favorite chair in the shop, nor\
    \ give you their signature scalp massage with shampoo; you get the picture.\n\n\
    In contrast, stateful applications are those that do save client data generated\
    \ in every session and use that data the next time the client makes a request.\
    \ This is your barber preparing your favorite chair and the shampoo that will\
    \ be used for their signature scalp massage and already set to do your preferred\
    \ hairstyle the minute you walk into the shop. All this information about you\
    \ and your preferences are stored and persisted in your barber’s brain. However,\
    \ you might argue that the brain is a temporary storage because if your barber\
    \ decides to go on vacation, you would have to tell the replacement barber everything\
    \ about your preferences. A better way to store this information is to write it\
    \ on a piece of paper for all barbers to access – or if the shop is sophisticated\
    \ enough, a customer relationship management (CRM) system that has a back-end\
    \ database.\n\nI’m pretending to know all about hairstyles and barbershops but\
    \ I really don’t. I haven’t seen a barber in 10 years. Don’t judge me.\n\n## Containers\
    \ Are Ephemeral and Immutable\n\nOne of my favorite scenes in the movie *The Matrix\
    \ Reloaded* is about Neo having a conversation with the Oracle. And while the\
    \ philosophical ideas conveyed in their discussion fascinate me more, this specific\
    \ Q&A in their dialog caught my attention. The conversation went like this:\n\n\
    *   *Neo: And why would a program be deleted?*\n*   *The Oracle: Maybe it breaks\
    \ down. Maybe a better program is created to replace it – happens all the time.*\n\
    \nI’m not sure if this conversation was the inspiration behind these two tenets\
    \ of containers: ephemeral and immutable. But it sure is a great way to explain\
    \ how they apply to containers.\n\nEphemeral means that containers are short-lived\
    \ – temporary. Immutable means that containers are unchanging; the state and contents\
    \ cannot be modified after they are created. Just like how the Oracle explained\
    \ to Neo why a program would be deleted, an app can malfunction or upgraded to\
    \ provide additional functionality. And the Oracle was right, it does happen all\
    \ the time. But the way we have been dealing with software running on servers\
    \ in the past to address these two possible outcomes has been so unlike Neo. When\
    \ an app malfunctions or needs an upgrade, we don’t delete it. We move it to a\
    \ different server – or to a different virtual machine (VM). We maintain, patch,\
    \ update, migrate, and so on. The servers running the app have a longer lifecycle\
    \ and are constantly updated – but seldom deleted. We carry them over to the next\
    \ version of the software, bringing with it all the baggage and junk that could\
    \ potentially affect stability and performance of the app. It’s no wonder an upgrade\
    \ or a migration project takes so much time and resources.\n\nContainers, on the\
    \ other hand, have a very short lifecycle. Want a new version of the app running\
    \ on a container? Simple. Don’t update the container. Just delete and deploy a\
    \ new one with the new version of the app. Sounds too simplistic? You will have\
    \ to wait until later in the chapter to see this in action."
