    ```


    注销当前会话并重新登录。你可以尝试输入`docker images m`然后按 TAB 键。这可以为你节省输入 SQL Server on Linux 镜像名称`mcr.microsoft.com/mssql/server:2017-CU14-ubuntu`的时间。你还可以用它来显示特定命令的可用参数。例如，尝试运行`docker
