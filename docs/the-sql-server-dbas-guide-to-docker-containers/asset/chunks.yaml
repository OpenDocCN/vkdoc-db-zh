    time on my computer. I’m either on my desk with pen and paper or on a whiteboard
    drawing workflows that define processes. That’s because good automation is based
    on a solid process. So, when we did our quarterly disaster recovery exercises,
    all we had to do was run automation scripts and monitor the outcomes. If a specific
    process needs improvement, we go back to the drawing board and make modifications
    to meet our recovery objectives and service-level agreements. Our process-driven
    automation was the key behind having a very small but effective team managing
    hundreds of servers.


    Now that we have the framework to install and configure SQL Server on Linux, it’s
    time to write the automation script. But before we do so, we need to know how
    to write the script and how to execute it.


    A *bash script* is a plain text file that contains a series of commands. It’s
    called a bash script because the commands are interpreted using Bash (or **B**ourne
    **A**gain **Sh**ell ). Bash is the default shell for most Linux distributions.
    In fact, you can check by running the command `echo $0` in your Linux command
    prompt. A bash script is a fully-fledged programming language in itself. This
    means you can define programming constructs such as variables, functions, and
    conditional execution of shell commands. Any command that you can run from the
    command line can be used in a bash script. Normally, a bash script has a *.sh*
    file extension to make it clear that it is a shell script. But as I mentioned
    in the previous section, Linux doesn’t really care about file extensions. But
    we humans do. And having some form of identification can immediately tell us what
    a file is for without opening it.


    Create a simple text file on your computer. It doesn’t really matter whether you
    create it on a Linux or Windows computer. If you can create the file on Windows
    and copy it later to a Linux machine, that’s more than enough for now. Once you
    get the hang of creating and modifying files on Linux using utilities such as
    *vi* or *nano*, you can write your scripts inside a Linux shell terminal. I use
    *vi* on Linux because it is installed by default.


    The first line of the file is what tells the interpreter that it is an executable
    file. It is known as *shebang* (or a hashbang), and it is simply the absolute
    path to the Bash interpreter. The first line of the file should contain the following
    command:


    ```

    #!/bin/bash

    ```


    From here onward, you can write any command that you want to run from inside the
    script. Recall the sequence of tasks that we outlined in the previous sections
    to install and configure SQL Server on Linux. On a CentOS Linux system


    *   Download the Microsoft SQL Server Red Hat repository configuration file for
    SQL Server 2017.


    *   Download and install the SQL Server installation packages for RHEL.


    *   Run the */opt/mssql/bin/mssql-conf* script with the *setup* parameter and
    environment variables.


    *   Enable the SQL Server daemon to start on system boot.


    *   Configure the Linux firewall to allow traffic to port 1433.


    *   Enable the SQL Server Agent.


    *   Change the default data and log file directory.


    *   Change the default backup directory.


    *   Enable trace flag 3226.


    *   Restart SQL Server for the configuration changes to take effect.


    Be mindful of the sequence of tasks. The commands should meet the requirements
    for dependencies. For instance, I won’t be able to configure SQL Server unless
    it is first installed. I won’t be able to install it if the packages have not
    been downloaded. And I won’t be able to download the packages properly unless
    the repo file is already available on the system. You get the picture.


    Combining all the commands that we used to accomplish every single task in the
    list, your script should look something like this:


    ```

    #!/bin/bash

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    sudo yum install -y mssql-server

    sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    sudo firewall-cmd --zone=public --add-port=1433/tcp --permanent

    sudo firewall-cmd --reload

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo mkdir /tmp/dbdata

    sudo chown mssql /tmp/dbdata

    sudo chgrp mssql /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    sudo systemctl restart mssql-server

    ```


    I normally write comments on my script to let other people know what it is doing.
    I’ve omitted them here for brevity. The corresponding script on Ubuntu is shown
    here:


    ```

    #!/bin/bash

    curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    sudo apt-get update

    sudo apt-get install -y mssql-server

    sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    sudo ufw --force enable

    sudo ufw allow 22/tcp

    sudo ufw allow 1433/tcp

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo mkdir /tmp/dbdata

    sudo chown mssql /tmp/dbdata

    sudo chgrp mssql /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    sudo systemctl restart mssql-server

    ```


    Save the script as *automateSQLinstall.sh*. If you created the script on your
    Windows machine, just copy it on your Linux *home* directory. Once it is in your
    *home* directory, you can assign the *execute* permission on the file using the
    following command:


    ```

    chmod +x automateSQLinstall.sh

    ```'
  trans: '## 编写简单的 Linux Bash 脚本


    我在前几部分所做的，仅仅是为创建一个在 Linux 上自动安装 SQL Server 的脚本提供了框架。实际上，本章的标题本应是*为在 Linux 上自动化安装
    SQL Server 做准备*。但是，每当我需要处理客户编写的、执行特定任务的自动化脚本时，总会看到一些人一脸茫然，他们完全不知道脚本是如何编写的，也不清楚脚本执行了哪些不同的任务。很多时候，这些脚本只是将网上找到的代码片段拼接在一起。别误会，如果你知道代码片段的功能、测试过它，并且做了恰当的文档记录，那么将网上找到的代码片段拼接起来并没有什么错。尽管我非常相信并倡导自动化，但我更加强调流程的重要性。当我担任数据中心工程师时，我几乎不怎么坐在电脑前。我要么是坐在办公桌前用纸笔，要么是在白板上绘制定义流程的工作图。这是因为良好的自动化建立在坚实的流程基础之上。所以，当我们进行季度灾难恢复演练时，我们只需要运行自动化脚本并监控结果即可。如果某个特定流程需要改进，我们会回到绘图板，进行修改以满足我们的恢复目标和服务级别协议。我们这种以流程为导向的自动化，是一个非常精简但高效的团队能够管理数百台服务器的关键所在。


    现在我们已经掌握了在 Linux 上安装和配置 SQL Server 的框架，是时候编写自动化脚本了。但在编写之前，我们需要知道如何编写脚本以及如何执行它。


    ### 什么是 Bash 脚本？


    一个*Bash 脚本*是一个包含一系列命令的纯文本文件。它被称为 Bash 脚本，是因为这些命令是使用 Bash（**B**ourne **A**gain
    **Sh**ell）来解释的。Bash 是大多数 Linux 发行版的默认 Shell。事实上，你可以在 Linux 命令提示符下运行命令 `echo $0`
    来进行检查。Bash 脚本本身是一种功能齐全的编程语言。这意味着你可以定义编程结构，例如变量、函数以及 shell 命令的条件执行。任何可以从命令行运行的命令都可以在
    Bash 脚本中使用。通常，Bash 脚本使用 `.sh` 文件扩展名，以明确表明它是一个 Shell 脚本。但正如我在前一节提到的，Linux 并不真正关心文件扩展名。但我们人类关心。拥有某种形式的标识可以让我们无需打开文件就能立即知道它的用途。


    ### 创建脚本文件


    在你的电脑上创建一个简单的文本文件。你是在 Linux 还是 Windows 电脑上创建它，其实并不重要。如果你能在 Windows 上创建文件，稍后复制到
    Linux 机器上，目前就足够了。一旦你习惯了使用 `vi` 或 `nano` 等工具在 Linux 上创建和修改文件，你就可以在 Linux Shell
    终端内编写脚本了。我在 Linux 上使用 `vi`，因为它是默认安装的。


    文件的第一行是告诉解释器这是一个可执行文件。它被称为 *shebang*（或 hashbang），它就是指向 Bash 解释器的绝对路径。文件的第一行应包含以下命令：


    ```

    #!/bin/bash

    ```


    从这里开始，你可以编写任何你想在脚本内部运行的命令。回想一下我们在前几部分概述的在 Linux 上安装和配置 SQL Server 的任务序列。在一个 CentOS
    Linux 系统上：


    *   下载用于 SQL Server 2017 的 Microsoft SQL Server Red Hat 仓库配置文件。

    *   下载并安装适用于 RHEL 的 SQL Server 安装包。

    *   使用 `setup` 参数和环境变量运行 `/opt/mssql/bin/mssql-conf` 脚本。

    *   启用 SQL Server 守护进程在系统启动时自动启动。

    *   配置 Linux 防火墙以允许到 1433 端口的流量。

    *   启用 SQL Server Agent。

    *   更改默认的数据和日志文件目录。

    *   更改默认的备份目录。

    *   启用跟踪标志 3226。

    *   重启 SQL Server 以使配置更改生效。


    请注意任务的顺序。命令需要满足依赖项的要求。例如，除非 SQL Server 已经安装，否则我无法配置它。如果软件包尚未下载，我就无法安装它。除非仓库文件已经存在于系统上，否则我无法正确下载软件包。你明白这个意思了。


    ### 脚本示例


    结合我们用来完成列表中每一项任务的所有命令，你的脚本应该看起来像这样（针对 CentOS/RHEL）：


    ```

    #!/bin/bash

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    sudo yum install -y mssql-server

    sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    sudo firewall-cmd --zone=public --add-port=1433/tcp --permanent

    sudo firewall-cmd --reload

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo mkdir /tmp/dbdata

    sudo chown mssql /tmp/dbdata

    sudo chgrp mssql /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    sudo systemctl restart mssql-server

    ```


    我通常会在我的脚本上写注释，让其他人知道它在做什么。为了简洁，我在这里省略了它们。适用于 Ubuntu 的对应脚本如下所示：


    ```

    #!/bin/bash

    curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    sudo apt-get update

    sudo apt-get install -y mssql-server

    sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    sudo ufw --force enable

    sudo ufw allow 22/tcp

    sudo ufw allow 1433/tcp

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo mkdir /tmp/dbdata

    sudo chown mssql /tmp/dbdata

    sudo chgrp mssql /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    sudo systemctl restart mssql-server

    ```


    ### 设置执行权限


    将脚本保存为 `automateSQLinstall.sh`。如果你在 Windows 机器上创建了脚本，只需将其复制到你的 Linux `home` 目录中。一旦它在你的
    `home` 目录中，你就可以使用以下命令为该文件分配 `execute`（执行）权限：


    ```

    chmod +x automateSQLinstall.sh

    ```'
- fmt: '### Running the Script


    Because some of the commands in the script require `root` privileges, you have
    to run it with `root` privileges. Either you switch to `root` before running the
    script or run it with `sudo`. I prefer running it with `sudo` so I don’t mistakenly
    do something stupid while running as `root`.


    Run the following command to execute the script. Note that the script file name
    is prefixed by the “`./`” characters:


    ```bash

    sudo ./automateSQLinstall.sh

    ```


    Others prefix the script file name with `bash` like the one as follows:


    ```bash

    sudo bash automateSQLinstall.sh

    ```


    I prefer the first command as it is similar to running PowerShell scripts on Windows.


    An alternative to running with `root` privileges would be to change the ownership
    of the script to `root` to prevent password prompts. Run the following command
    to change the script ownership to `root` and grant the `execute` permission on
    the file:


    ```bash

    sudo chown root:root automateSQLinstall.sh

    sudo chmod 775 automateSQLinstall.sh

    ```


    Now, run the script and watch the magic happen. Figure [8-14](#484552_1_En_8_Chapter.xhtml#Fig14)
    shows all the configuration settings made after the script executes.


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig14_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig14_HTML.jpg)


    Figure 8-14: Validating configuration changes after script execution


    ### Passing Parameters to the Script


    While the script works as expected, I don’t like the idea of hard-coding passwords
    in files. Anyone who can grab a hold of the script file can read the password
    of the `sa` login, and the SQL Server instance can potentially be compromised.
    What if we instead pass the `sa` login password as a command-line parameter to
    the script?


    Like any other command-line scripts, bash scripts also accept command-line arguments
    as parameters. All command-line parameters can be accessed by their position number
    using `$`. Have a look at the following sample command:


    ```bash

    sudo ./automateSQLinstall.sh mYSecUr3PAssw0rd enterprise

    ```


    Here I’m calling the `automateSQLinstall.sh` file and passing it two command-line
    parameters – `mYSecUr3PAssw0rd` and `enterprise`. You might have guessed that
    the first parameter is the `sa` login password and the second one is the SQL Server
    edition. Inside the script, these parameter values can be accessed using their
    position numbers. The `mYSecUr3PAssw0rd` parameter value can be accessed via `$1`
    while the `enterprise` parameter value via `$2`. I can declare these parameter
    values as variables inside the script using the following code snippet:


    ```bash

    #VARIABLES

    MSSQL_SA_PASSWORD=$1

    MSSQL_PID=$2

    ```


    I can then run the `/opt/mssql/bin/mssql-conf` script with the corresponding environment
    variables using the command-line parameter values as follows:


    ```bash

    sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD /opt/mssql/bin/mssql-conf
    setup

    ```


    ### Adding Conditional Logic in Bash Scripts


    Now that we’re making the script dynamic and passing command-line parameter values,
    we need to validate the user input. Recall that the `sa` login password is a required
    parameter when installing SQL Server. We’ll add conditional logic to evaluate
    whether or not the user provided a value for the `sa` login password. The code
    snippet to do this is shown as follows:


    ```bash

    #Check if the sa password string is null or has zero length

    if [ -z $MSSQL_SA_PASSWORD ]

    then

    echo Environment variable MSSQL_SA_PASSWORD must be set for unattended install

    exit 1

    fi

    ```


    A simple `if...then` condition evaluates whether or not the `$MSSQL_SA_PASSWORD`
    parameter value is null or has zero length. Exit code `1` sets the script execution
    to failure, causing it to terminate. There’s more to validating the `sa` login
    password such as the complexity requirements which include minimum password length,
    inclusion of uppercase, lowercase, non-alphanumeric characters, and base 10 digits.
    This is just a simple example to validate whether or not the user provided a value
    for the `sa` login password.


    What about the edition? Since we initially provided an environment variable for
    the edition, we need to provide a value for it. This means we also need to evaluate
    whether or not the user provided a value in the command-line argument. The code
    snippet to do this is shown in the following. Here we’re setting a default value
    if the user didn’t provide anything – in this case, Developer Edition:


    ```bash

    #Check if the edition parameter is null or has zero length

    if [ -z $MSSQL_PID ]

    then

    MSSQL_PID=Developer

    fi

    ```


    An updated version of the script for a RHEL/CentOS Linux system is shown in the
    following with parameter values and conditional logic evaluation:


    ```bash

    #!/bin/bash

    # VARIABLES

    MSSQL_SA_PASSWORD=$1

    MSSQL_PID=$2

    if [ -z $MSSQL_SA_PASSWORD ]

    then

    echo Environment variable MSSQL_SA_PASSWORD must be set for unattended install

    exit 1

    fi

    if [ -z $MSSQL_PID ]

    then

    MSSQL_PID=Developer

    fi

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    sudo yum install -y mssql-server

    sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    sudo firewall-cmd --zone=public --add-port=1433/tcp --permanent

    sudo firewall-cmd --reload

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo mkdir /tmp/dbdata

    sudo chown mssql /tmp/dbdata

    sudo chgrp mssql /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    sudo systemctl restart mssql-server

    ```


    And here’s the corresponding script in Ubuntu:


    ```bash

    #!/bin/bash

    #VARIABLES

    MSSQL_SA_PASSWORD=$1

    MSSQL_PID=$2

    if [ -z $MSSQL_SA_PASSWORD ]

    then

    echo Environment variable MSSQL_SA_PASSWORD must be set for unattended install

    exit 1

    fi

    if [ -z $MSSQL_PID ]

    then

    MSSQL_PID=Developer

    fi

    curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    sudo apt-get update

    sudo apt-get install -y mssql-server

    sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    sudo ufw --force enable

    sudo ufw allow 22/tcp

    sudo ufw allow 1433/tcp

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo mkdir /tmp/dbdata

    sudo chown mssql /tmp/dbdata

    sudo chgrp mssql /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    sudo systemctl restart mssql-server

    ```


    You can now run the script with positional command-line arguments as shown in
    the following:


    ```bash

    sudo ./automateSQLinstall.sh mYSecUr3PAssw0rd enterprise

    ```


    Again, sit back, relax, and watch the magic happen.'
