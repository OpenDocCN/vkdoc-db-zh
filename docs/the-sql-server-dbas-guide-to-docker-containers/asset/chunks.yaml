  trans: "\n## 最低系统要求\n\n与任何软件安装一样，您需要满足最低系统要求，才能成功地将 Windows Server 操作系统用作 `Docker\
    \ 容器主机`。Docker 容器主机是运行 Docker `守护进程` 的操作系统（守护进程简单来说就是 Linux 中相当于 Windows 服务的程序）。\n\
    \n*   **内存**：至少 4GB。您肯定不希望花费大量时间排查容器部署问题，最后却发现只是内存资源不足。此外，一个 SQL Server 实例会尽可能占用所有可用的内存资源。在容器中运行时也是如此。\n\
    *   **操作系统**：我们使用的是 Windows Server 2016，但这并不意味着您只需要了解这一点。请记住，容器共享相同的操作系统内核。这意味着容器主机的操作系统应支持容器镜像的操作系统。由于我们部署的是\
    \ Windows Server 2016 容器主机，因此只能部署运行 Server Core 或 Nano Server 的 Windows Server\
    \ 2016 容器镜像。我们将跳过 Nano Server，因为 SQL Server 不支持在其上运行。\n*   **磁盘空间**：最低限度是 32GB。与虚拟机类似，每个容器镜像都需要自己的磁盘空间。请分配足够的磁盘空间，以便同时运行多个容器。\n\
    \n## 在 Windows Server 2016 中启用容器功能\n\n在 Windows Server 2016 机器上安装和配置 Docker 容器主机是一个三步过程。您需要让这台机器连接到互联网，以下载二进制文件、PowerShell\
    \ 包和基于 Windows 的容器镜像。\n\n第一步是在 Windows Server 2016 上启用容器功能：\n\n1.  从 **开始** 菜单中，选择\
    \ **服务器管理器**。\n2.  在服务器管理器仪表板中，单击 **添加角色和功能** 链接。这将运行 **添加角色和功能向导**。\n3.  单击“下一步”，直到到达\
    \ **选择功能** 对话框。如图 2-1 所示，选中 **容器** 复选框，然后单击“下一步”。请注意，在 Windows Server 2016 版本\
    \ 1607 上，默认会选中 **.NET Framework 4.6 功能** 复选框。如果未选中，请展开 **.NET Framework 4.6 功能**\
    \ 复选框，并确保显示 **.NET Framework 4.6 (已安装)**。\n    ![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig1_HTML.jpg](img/484552_1_En_2_Fig1_HTML.jpg)\n\
    \    **图 2-1**\n    在“选择功能”对话框中选中“容器”复选框\n4.  在 **确认安装选定内容** 对话框中，单击“安装”。\n\n\
    由于您将通过命令行处理 Docker 命令——在 Windows 和 Linux 上都是如此——这是一个在 Windows 环境中开始使用命令行的绝佳机会。请拥抱闪烁的光标并熟悉它。启用容器功能的另一种方法是使用\
    \ `Install-WindowsFeature` PowerShell cmdlet。打开一个具有管理员权限的 PowerShell 命令窗口，并运行以下命令：\n\
    ```\nInstall-WindowsFeature –Name Containers\n```\n启用容器功能后，系统将提示您重新启动计算机以完成安装过程。您可以使用熟悉的方法执行重启，也可以使用\
    \ `Restart-Computer` PowerShell cmdlet。\n\n## 下载并安装 Docker-Microsoft PackageManagement\
    \ 提供程序\n\n第二步是下载并安装 `Docker-Microsoft PackageManagement 提供程序`。包管理系统的作用是自动化地持续发现、安装、更新、配置和移除计算机软件。在这种情况下，您将安装一个专门用于与\
    \ Docker 配合使用的包管理系统。\n\n运行以下 PowerShell 命令以下载并安装 Docker-Microsoft PackageManagement\
    \ 提供程序：\n```\nInstall-Module -Name DockerMsftProvider -Force\n```\n当提示下载并安装 `NuGet`\
    \ 提供程序时，输入 **Y** 表示“是”，如图 2-2 所示。\n![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig2_HTML.jpg](img/484552_1_En_2_Fig2_HTML.jpg)\n\
    **图 2-2**\n使用 Docker-Microsoft PackageManagement 提供程序下载 NuGet 提供程序\n\n**注意**\n\
    对于主要工作在 Windows 平台上的 IT 专业人士来说，包管理系统的主题可能会有点令人困惑。多年来，Windows 上的软件是通过 EXE、MSI 和\
    \ MSU 文件分发的——只需下载安装文件，双击并安装即可。Linux 的情况则不同。鉴于 Linux 的开源性质以及软件来源的多样性，需要使用包管理器来安装和管理软件。PowerShell\
    \ 5.0 引入了利用包管理器的功能，以简化安装软件和 PowerShell 模块的复杂性。\n\n如果您想深入了解 `Docker-Microsoft PackageManagement\
    \ 提供程序` 的实现细节，请查看 GitHub 仓库：[*https://github.com/OneGet/MicrosoftDockerProvider*](https://github.com/OneGet/MicrosoftDockerProvider)。\n\
    \n## 下载并安装 Docker 软件包\n\n第三步是下载并安装 Docker 软件包。运行以下 PowerShell 命令，使用您在上一步中下载的 `Docker-Microsoft\
    \ PackageManagement 提供程序` 来下载并安装 Docker 软件包。图 2-3 显示了成功安装 Docker 企业版 (EE)。\n![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig3_HTML.jpg](img/484552_1_En_2_Fig3_HTML.jpg)\n\
    **图 2-3**\n下载并安装 Docker 软件包\n```\nInstall-Package -Name docker -ProviderName DockerMsftProvider\
    \ -Force\n```\n这将创建一个名为 **Docker Engine** 的 Windows 服务，该服务调用命令 `\"C:\\Program\
    \ Files\\Docker\\dockerd.exe\" --run-service`\n\n该服务配置为在服务器启动时自动启动，但安装过程不会显式启动该服务。这时您需要进行一次不太受欢迎的服务器重启，以更新环境变量，从而可以从命令提示符或\
    \ PowerShell 命令 shell 运行 Docker 命令。别担心。这将是您最后一次需要重启服务器。\n"
- fmt: '## Verifying the Docker Engine Installation


    I did say you need to start being comfortable working with the command line. From
    here onward, you will be working with the command line – either the command prompt
    or PowerShell command shell. I prefer using PowerShell so I can leverage the available
    PowerShell cmdlets alongside the Docker commands. Just remember that the output
    of a PowerShell command or cmdlet is either an object or a collection of objects,
    while the output of a Docker command is text. Also, run every command in an elevated
    administrative PowerShell command shell.


    Run the following command to check the version of Docker installed on the server:

    ```

    docker version

    ```

    Figure 2-4 shows the output of the command, displaying the version of the Docker
    client and the Docker engine running on the machine.


    ![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig4_HTML.jpg](images/484552_1_En_2_Chapter/484552_1_En_2_Fig4_HTML.jpg)


    Figure 2-4: Displaying the version of Docker client and Docker engine


    The `OS/Arch:` properties for both client and server show `windows/amd64` since
    the Docker engine is running on a Windows Server 2016 machine. Also, what was
    installed is the Docker Engine – Enterprise Edition. This means that you have
    full support from both Microsoft and Docker when you deploy containers on your
    Docker host. In fact, even though the Docker engine is the one responsible for
    running containers on a Windows Server machine, Microsoft is the first point of
    contact for support. Chapter 4 describes the difference between Docker Enterprise
    Edition and Docker Community Edition in more detail.


    Run the following command to display system-wide information regarding the docker
    installation on the server:

    ```

    docker info

    ```

    Figure 2-5 shows the output of the command.


    ![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig5_HTML.jpg](images/484552_1_En_2_Chapter/484552_1_En_2_Fig5_HTML.jpg)


    Figure 2-5: Displaying the system-wide information of the Docker installation


    At this point, your Windows Server 2016 machine is a fully functional Docker container
    host.


    ## Docker Desktop for Windows


    The idea behind using a server operating system for deploying a Docker container
    host instead of a desktop operating system like Windows 10 is to get you to experience
    how it is like to deploy Docker in “the real world,” much like how data center
    engineers would deploy it in a production environment. Understanding the underlying
    infrastructure that runs an application helps you become a more well-rounded IT
    professional.


    Docker Desktop for Windows is what most developers use to get started with learning
    Docker on a Windows operating system. It is a native Windows application that
    leverages Hyper-V virtualization. I like to think of it as some form of nested
    virtualization – it will create a MobyLinux virtual machine inside the Hyper-V
    host. The MobyLinux virtual machine will run as a Docker container host to run
    Linux-based containers. But because it’s a native Windows application, you can
    run Windows-based containers directly on the host. You can switch between running
    Linux-based and Windows-based containers with Docker Desktop for Windows. Figures
    2-6 and 2-7 show how you can switch between Windows containers and Linux containers
    from within Docker Desktop for Windows.


    ![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig7_HTML.jpg](images/484552_1_En_2_Chapter/484552_1_En_2_Fig7_HTML.jpg)


    Figure 2-7: Switching to Linux containers


    ![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig6_HTML.jpg](images/484552_1_En_2_Chapter/484552_1_En_2_Fig6_HTML.jpg)


    Figure 2-6: Switching to Windows containers


    Running the `docker version` command displays different results depending on whether
    you’re running Linux or Windows containers. Figure 2-8 shows the output of the
    command when running Linux containers. Notice that the `OS/Arch:` property of
    the client is `windows/amd64` while that of the server is `linux/amd64` (this
    is the MobyLinux virtual machine that was created to run on top of Hyper-V).


    ![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig8_HTML.jpg](images/484552_1_En_2_Chapter/484552_1_En_2_Fig8_HTML.jpg)


    Figure 2-8: Docker Desktop on Windows – client and server details (Linux containers)


    The installation of Docker Desktop on Windows is straightforward. Just download
    and run the installation file from the Docker Hub.


    Should any of your developer colleagues want to try out Docker, Docker Desktop
    on Windows is what you recommend. We big boys play with real toys – servers, that
    is.


    ## Summary


    This chapter walked you through the process of installing and configuring a Windows
    Server 2016 as a Docker container host. The server is now ready to run any Windows-based
    containers that have the same operating system kernel as Windows Server 2016.
    Note that this is the same setup as you would deploy in a production environment,
    minus all custom configuration that your organization requires for security, reliability,
    and standardization.


    And while Docker was initially created for the Linux operating system, you didn’t
    have to learn anything Linux – yet. That’s what’s up in the next chapter. So,
    buckle up. It’s time to dive into the world of Linux.'
