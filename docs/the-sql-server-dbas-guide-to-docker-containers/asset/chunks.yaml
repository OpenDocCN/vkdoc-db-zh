    \    docker exec temp chown -R 10001:0 /data\n    #Delete the temporary container\
    \ after use\n    docker rm temp -f\n    ```\n\n```\n#Create a temporary container\
    \ using the Alpine Linux image\n#just so we can copy files into the Docker volume\n\
    docker run --name temp -d -v sqldbdata:/data alpine sleep 10000\n#Copy files from\
    \ the current working directory that contains\n#the SQL Server database backups\
    \ into the Docker volume\ndocker cp . temp:/data\n```\n\nYou could create multiple\
    \ Docker volumes, each with a copy of the database backups, and just tell the\
    \ users to mount the specific volume to their container. This really depends on\
    \ your deployment strategy.\n\nBecause you now have the SQL Server command-line\
    \ tools in your custom SQL Server on Linux image, you can run T-SQL scripts using\
    \ *sqlcmd* to do anything you want as DBAs inside the container. You could write\
    \ your own T-SQL script that checks for database backups and restores them and\
    \ call the script from *sqlcmd*. Here’s a code snippet from the bash script that\
    \ loops through the database backups in the specified directory and restores them\
    \ :\n\n```\n#Iterate thru all the BAK files in Docker volume\n#/var/opt/mssql\
    \ is mounted on Docker volume=sqldbdata\nfor files in /var/opt/mssql/∗.bak\ndo\n\
    /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $SA_PASSWORD -d master -Q \"\
    RESTORE DATABASE [${files:15:-4}] FROM DISK ='$files'\"\ndone\n```\n\nI’m sure\
    \ you recognize the *sqlcmd* call with the *RESTORE DATABASE* command. You may\
    \ have done something similar in the past with batch files on Windows. I’m keeping\
    \ the script simple for demonstration purposes, but you can go crazy with your\
    \ T-SQL scripts. The database backups are named with the format *databaseName.bak*\
    \ and were all taken from a SQL Server on Linux instance with the default configuration.\
    \ That way, we don’t need to specify the *WITH MOVE* option when running the *RESTORE\
    \ DATABASE* command. The *${files:15:-4}* inside the square brackets performs\
    \ string manipulation to extract the database name. Since the */var/opt/mssql*\
    \ directory in the container will be mapped to the Docker volume, the full path\
    \ of the backup files will be in the form */var/opt/mssql/databaseName.bak*. There\
    \ are 15 characters before the beginning of the database name (*/var/opt/mssql/*)\
    \ and 4 characters after it (*.bak*). The $ symbol refers to the variable named\
    \ *files* that contains the full path of the backup file. For every backup file\
    \ in the specified directory, the script will generate and run the corresponding\
    \ *sqlcmd* command in the following. Don’t make fun of me. I still use the classic\
    \ Northwind database for examples.\n\n```\n/opt/mssql-tools/bin/sqlcmd -S localhost\
    \ -U sa -P $SA_PASSWORD -d master -Q \"RESTORE DATABASE [Northwind] FROM DISK\
    \ ='/var/opt/mssql/Northwind.bak'\"\n```\n\nI’ve also included a *sleep* command\
    \ before running the *RESTORE DATABASE* command in the script. Remember the in-place\
    \ upgrade from *Chapter* [*7*](#484552_1_En_7_Chapter.xhtml)? Even a new deployment\
    \ of a SQL Server on Linux container will look like an upgrade because it starts\
    \ from the RTM release. And that takes time. The *sleep* command takes this into\
    \ account and won’t run the RESTORE DATABASE command until after the upgrade process\
    \ completes which is roughly 2 minutes. You can bump up the wait time if you want.\
    \ It’s a quick and dirty way to accomplish this, but there are other ways like\
    \ reading the SQL Server error log to check for a specific text like the following\
    \ code snippet :\n\n```\n#Check SQL Server errorlog to see if recovery is complete\n\
    while ! grep \"Recovery is complete. This is an informational message only. No\
    \ user action is required\" /var/opt/mssql/log/errorlog\ndo sleep 10; done\n```\n\
    \nThe following is the complete bash script to check for database backups and\
    \ restoring them:\n\n```\n#!/bin/bash\n#Make script wait until the upgrade process\
    \ completes\nsleep 120\n#Iterate thru all the BAK files in Docker volume\n#directory\
    \ /var/opt/mssql/data is mounted on Docker volume\nfor f in /var/opt/mssql/∗.bak\n\
    do\n/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $SA_PASSWORD -d master -Q\
    \ \"RESTORE DATABASE [${f:15:-4}] FROM DISK ='$f'\"\ndone\n```\n\nName the script\
    \ *checkbackups_restore.sh*. You’re going to need it later.\n\nNote\n\nUnlike\
    \ in *Chapter* [*8*](#484552_1_En_8_Chapter.xhtml) where we assigned *execute*\
    \ permission on the bash script file on the Linux host, you don’t need to do that\
    \ here. Assigning *execute* permission on the bash script files will be done inside\
    \ the custom Docker image. An additional instruction will be added in the *Dockerfile*\
    \ as you’ll see in the next section.\n\nThere’s another bash script that you need.\
    \ You can call it the “startup” script. What it does is it calls the *checkbackups_restore.sh*\
    \ script and, while the script executes in the background, calls the *sqlservr*\
    \ process. Recall that the last instruction in a *Dockerfile* should be something\
    \ that does not terminate. Otherwise, the container will terminate as well. So,\
    \ in order to run the *checkbackups_restore.sh* script and start the *sqlservr*\
    \ process, we need to call them both from a startup script . The following is\
    \ the code for the startup bash script. You can save this as *startup.sh*:\n\n\
    ```\n#!/bin/bash\n#Start the script to restore all database backups\n#from Docker\
    \ volume; run script in the background\n/tmp/startup/checkbackups_restore.sh &\n\
    # Start SQL Server\n/opt/mssql/bin/sqlservr\n```\n\nObserve the startup script\
    \ and you will notice that it is being called from inside the */tmp/startup* directory.\
    \ This means that both the startup script and the *checkbackups_restore.sh* script\
    \ should be in a directory named */tmp/startup* inside the container. This also\
    \ means that we need to create the */tmp/startup* directory and grant *execute*\
    \ permission to the *checkbackups_restore.sh* and *startup.sh* scripts. This gives\
    \ you an idea on how the new *Dockerfile* would look like. Also, the “&” symbol\
    \ after the script tells it to run in the background ."
  trans: "\n### 编写用于检查备份的 Bash 脚本\n\n以下是部署 SQL Server 到开发环境的一个常见用例。假设你希望将数据库备份复制到\
    \ Docker 卷中，并在部署自定义的 Linux 版 SQL Server 镜像时还原它们。任何将映射到 Docker 卷的 SQL Server on\
    \ Linux 容器启动的用户，都将自动拥有这些可用的用户数据库。让我们从将数据库备份复制到 Docker 卷开始：\n\n1.  创建一个名为 `sqldbdata`\
    \ 的 Docker 卷：\n    ```\n    docker volume create sqldbdata\n    ```\n2.  将数据库备份复制到\
    \ Docker 卷中。\n\n有多种方法可以将文件复制到 Docker 卷。但由于我们假设你没有 `root` 权限，因此我们将创建一个临时容器来完成此操作。这样做是可行的，因为默认情况下，容器以\
    \ `root` 用户的安全上下文运行，除非你专门配置源镜像以非 `root` 身份运行。同时，这也假设你所有的 SQL Server 数据库备份文件都位于当前工作目录中。\n\
    \n1.  将 Docker 卷的所有权更改为非 `root` 用户：\n    ```\n    #使用临时容器运行 chown 命令\n    #以更改\
    \ Docker 卷中文件的所有权\n    docker exec temp chown -R 10001:0 /data\n    #使用后删除临时容器\n\
    \    docker rm temp -f\n    ```\n    ```\n    #使用 Alpine Linux 镜像创建一个临时容器\n  \
    \  #只是为了能够将文件复制到 Docker 卷中\n    docker run --name temp -d -v sqldbdata:/data alpine\
    \ sleep 10000\n    #从包含 SQL Server 数据库备份的当前工作目录\n    #复制文件到 Docker 卷\n    docker\
    \ cp . temp:/data\n    ```\n\n你可以创建多个 Docker 卷，每个卷包含一份数据库备份副本，然后只需告诉用户将特定卷挂载到他们的容器上。这实际上取决于你的部署策略。\n\
    \n由于你现在在自定义的 Linux 版 SQL Server 镜像中拥有了 SQL Server 命令行工具，你可以运行 `sqlcmd` 来执行 T-SQL\
    \ 脚本，从而在容器内完成任何 DBA 想要的操作。你可以编写自己的 T-SQL 脚本来检查数据库备份并还原它们，然后通过 `sqlcmd` 调用该脚本。以下是一个\
    \ Bash 脚本片段，它遍历指定目录中的数据库备份并还原它们：\n```\n#遍历 Docker 卷中的所有 BAK 文件\n#/var/opt/mssql\
    \ 挂载在 Docker volume=sqldbdata 上\nfor files in /var/opt/mssql/*.bak\ndo\n/opt/mssql-tools/bin/sqlcmd\
    \ -S localhost -U sa -P $SA_PASSWORD -d master -Q \"RESTORE DATABASE [${files:15:-4}]\
    \ FROM DISK ='$files'\"\ndone\n```\n\n我相信你认出了这个带有 `RESTORE DATABASE` 命令的 `sqlcmd`\
    \ 调用。你可能过去在 Windows 上用批处理文件做过类似的事情。为了演示，我保持了脚本的简洁，但你可以尽情发挥你的 T-SQL 脚本。数据库备份文件的命名格式为\
    \ `databaseName.bak`，并且都是从采用默认配置的 Linux 版 SQL Server 实例中获取的。这样，在运行 `RESTORE DATABASE`\
    \ 命令时，我们就不需要指定 `WITH MOVE` 选项。方括号内的 `${files:15:-4}` 执行字符串操作以提取数据库名称。由于容器中的 `/var/opt/mssql`\
    \ 目录将映射到 Docker 卷，备份文件的完整路径将采用 `/var/opt/mssql/databaseName.bak` 的形式。数据库名称之前有\
    \ 15 个字符 (`/var/opt/mssql/`)，其后有 4 个字符 (`.bak`)。`$` 符号指的是名为 `files` 的变量，该变量包含备份文件的完整路径。对于指定目录中的每个备份文件，脚本将生成并运行相应的\
    \ `sqlcmd` 命令，如下所示。请不要取笑我，我仍在使用经典的 Northwind 数据库作为示例。\n```\n/opt/mssql-tools/bin/sqlcmd\
    \ -S localhost -U sa -P $SA_PASSWORD -d master -Q \"RESTORE DATABASE [Northwind]\
    \ FROM DISK ='/var/opt/mssql/Northwind.bak'\"\n```\n\n我还在脚本中 `RESTORE DATABASE`\
    \ 命令运行前加入了一个 `sleep` 命令。还记得*第 7 章*中的原地升级吗？即使是新部署的 SQL Server on Linux 容器，看起来也会像一次升级，因为它从\
    \ RTM 版本开始。这需要时间。`sleep` 命令考虑到了这一点，它会等待大约 2 分钟，直到升级过程完成后再运行 RESTORE DATABASE 命令。如果你愿意，可以增加等待时间。这是一个快速但不够优雅的方法，不过也有其他方法，例如读取\
    \ SQL Server 错误日志以检查特定文本，如下代码片段所示：\n```\n#检查 SQL Server 错误日志，查看恢复是否完成\nwhile !\
    \ grep \"Recovery is complete. This is an informational message only. No user\
    \ action is required\" /var/opt/mssql/log/errorlog\ndo sleep 10; done\n```\n\n\
    以下是用于检查数据库备份并还原它们的完整 Bash 脚本：\n```\n#!/bin/bash\n#让脚本等待升级过程完成\nsleep 120\n#遍历\
    \ Docker 卷中的所有 BAK 文件\n#目录 /var/opt/mssql/data 挂载在 Docker 卷上\nfor f in /var/opt/mssql/*.bak\n\
    do\n/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $SA_PASSWORD -d master -Q\
    \ \"RESTORE DATABASE [${f:15:-4}] FROM DISK ='$f'\"\ndone\n```\n\n将此脚本命名为 `checkbackups_restore.sh`。你稍后会需要用到它。\n\
    \n注意\n\n与*第 8 章*中我们在 Linux 主机上为 Bash 脚本文件分配 `execute` 权限不同，这里你不需要这样做。为 Bash 脚本文件分配\
    \ `execute` 权限的操作将在自定义的 Docker 镜像内部完成。正如你将在下一节看到的，我们将在 `Dockerfile` 中添加一条额外的指令。\n\
    \n你还需要另一个 Bash 脚本。你可以称之为“启动”脚本。它的作用是调用 `checkbackups_restore.sh` 脚本，并在该脚本在后台执行的同时，调用\
    \ `sqlservr` 进程。回想一下，`Dockerfile` 中的最后一条指令应该是某种不会终止的命令。否则，容器也会终止。因此，为了运行 `checkbackups_restore.sh`\
    \ 脚本并启动 `sqlservr` 进程，我们需要从一个启动脚本中调用它们两个。以下是启动 Bash 脚本的代码。你可以将其保存为 `startup.sh`：\n\
    ```\n#!/bin/bash\n#启动脚本，从 Docker 卷还原所有数据库备份；\n#在后台运行脚本\n/tmp/startup/checkbackups_restore.sh\
    \ &\n# 启动 SQL Server\n/opt/mssql/bin/sqlservr\n```\n\n观察这个启动脚本，你会发现它是在 `/tmp/startup`\
    \ 目录内部被调用的。这意味着启动脚本和 `checkbackups_restore.sh` 脚本都应该位于容器内部一个名为 `/tmp/startup`\
    \ 的目录中。这也意味着我们需要创建 `/tmp/startup` 目录，并授予 `checkbackups_restore.sh` 和 `startup.sh`\
    \ 脚本 `execute` 权限。这让你对新的 `Dockerfile` 会是什么样子有了概念。另外，脚本后的 “&” 符号表示让它在后台运行。\n"
- fmt: '### Run the Bash Script in the Last Instruction


    Now that we have the necessary scripts, we can call the startup script as the
    last instruction in the `Dockerfile` as shown in the following:


    ```

    CMD ["/tmp/startup/startup.sh"]

    ```


    The following is the updated `Dockerfile` with comments. Note that this new custom
    image builds on the other custom SQL Server 2017 on Linux image with the SQL Server
    command-line tools installed running as non-`root`.


    ```

    #Start from custom SQL Server 2017 on Linux image

    #running as non-root with command line tools

    #NOTE: Use the correct Docker image name

    FROM customsql2017oncentoswithtools-nonroot:v1.0

    #Create working directory

    RUN mkdir -p /tmp/startup

    #Copy bash scripts into working directory

    # and assign the mssql user as owner

    COPY --chown=mssql:0 . /tmp/startup

    #Grant executable permissions to bash scripts

    RUN chmod +x /tmp/startup/checkbackups_restore.sh

    RUN chmod +x /tmp/startup/startup.sh

    #Run startup script startup.sh

    CMD ["/tmp/startup/startup.sh"]

    ```


    Save the `Dockerfile`, the `checkbackups_restore.sh`, and the `startup.sh` files
    in a directory and use that directory as the build context for this new custom
    image. You only want these three files copied in the custom image, nothing more.
    Figure [10-14](#484552_1_En_10_Chapter.xhtml#Fig14) shows the directory structure
    that contains these files.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig14_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig14_HTML.jpg)


    Figure 10-14


    Directory structure and files for building the custom image


    Run the following command to build this new custom image:


    ```

    docker build -t customsql2017oncentos4dev-nonroot:v1.0 .

    ```


    And now, for the ultimate test, run a new container based on this custom image
    using the following `docker run` command. Be sure to use the correct image name.


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevlinuxcon01 --mount source=sqldbdata,target=/var/opt/mssql -d -h linuxsqldev01
    customsql2017oncentos4dev-nonroot:v1.0

    ```


    Mapping the Docker volume `sqldbdata` to the container means that the backup files
    are now accessible to the container. During startup, the container will run the
    `startup.sh` script which will call the `checkbackups_restore.sh` script to iterate
    through the BAK files in the `/var/opt/mssql` directory. Since we are starting
    from the `customsql2017oncentoswithtools-nonroot:v1.0` custom image that already
    has the SQL Server command-line tools installed and `sqlservr` process running,
    we can call `sqlcmd` and pass it the `RESTORE DATABASE` command to restore databases
    from backups.


    Pretty cool, don’t you think?


    Caution


    I may have simplified the process a bit to show how you can automate deployment
    of SQL Server instances with user databases via containers running as non-`root`.
    It’s pretty obvious I’m serious about security as I’ve mentioned in previous chapters.
    And I’m clearly leaving a lot of details when it comes to dealing with restoring
    database backups in development environments, especially those that come from
    production environments. Not only do you need to restrict access to both production
    and development environments but also implement ways to obscure sensitive data.
    I totally understand that developers need to work with real data to perform proper
    testing. But that doesn’t mean we can take backups from production and just restore
    it in development environments. Include processes to scramble data before even
    taking backups. Or have a dedicated server whose purpose is to scramble data for
    use in development environments. You certainly don’t want to end up being on tomorrow’s
    headlines regarding security breaches.


    ## Multi-stage Builds


    I had second thoughts about including this section as it pertains more to developers
    than DBAs. But ever since I started doing my `SQL Server DBA’s Guide to Docker
    Containers` workshop, I’ve gotten a ton of questions regarding multi-stage builds
    and what they are. This section gives you a high-level overview of what multi-stage
    builds are and how they are used. Bear with me until the end of this chapter.
    Pretend you’re a developer reading this. I know, I’m asking too much of you.


    The idea behind multi-stage builds came about due to the development practice
    of writing, testing, and compiling apps. Multi-stage builds are used to optimize
    builds and reduce size of Docker images without adding complexity. And you do
    this with a single `Dockerfile`. Imagine a developer writing code in his or her
    workstation. While the workstation has the development tools, only the compiled
    code is needed in a production environment. You certainly don’t want your development
    tools included in the final custom image for the app. One major side effect of
    containerizing apps is producing massively large images that contain source code,
    compiled code, and sometimes even development tools (although, I doubt, they’re
    as large as the SQL Server on Windows images). Take a look at the following sample
    `Dockerfile`. I’m using the sample code from [*https://github.com/microsoft/sqllinuxlabs/tree/master/containers/mssql-aspcore-example/mssql-aspcore-example-app/belgrade-product-catalog-demo*](https://github.com/microsoft/sqllinuxlabs/tree/master/containers/mssql-aspcore-example/mssql-aspcore-example-app/belgrade-product-catalog-demo)
    to create the custom images.


    ```

    #Use the .NET Core with SDK on Linux image

    FROM mcr.microsoft.com/dotnet/core/sdk:2.2

    WORKDIR /app

    #Copy csproj and restore as distinct layers

    COPY belgrade-product-catalog-demo/*.csproj ./belgrade-product-catalog-demo/

    RUN dotnet restore ./belgrade-product-catalog-demo/

    #Copy everything else and build app

    COPY belgrade-product-catalog-demo/. ./belgrade-product-catalog-demo/

    WORKDIR /app/belgrade-product-catalog-demo

    RUN dotnet publish -c Release -o out

    ```


    Building this custom image would yield a large image size, even larger than my
    custom SQL Server on Linux image that has the SQL Server command-line tools installed.
    Figure [10-15](#484552_1_En_10_Chapter.xhtml#Fig15) shows the size of the custom
    ASP.NET web app image.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig15_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig15_HTML.jpg)


    Figure 10-15


    Size of custom ASP.NET web app image with SDK


    The 1.81GB image contains the .NET SDK, the source code, and the compiled code.
    We only need the compiled code and the dependencies for deploying into production
    – everything in the `out` directory as specified in the `RUN` instruction. What
    if we just use the output of this custom image instead of including everything
    that came with the development project? This is where multi-stage build comes
    in. Have a look at the following new `Dockerfile`. I’ve included step numbers
    to explain what is going on in the `Dockerfile`:


    ```

    #Step 1: Use the .NET Core with SDK on Linux image

    FROM mcr.microsoft.com/dotnet/core/sdk:2.2 AS build

    #Step 2

    WORKDIR /app

    #Step 3: copy csproj and restore as distinct layers

    COPY belgrade-product-catalog-demo/*.csproj ./belgrade-product-catalog-demo/

    #Step 4

    RUN dotnet restore ./belgrade-product-catalog-demo/

    #Step 5 copy everything else and build app

    COPY belgrade-product-catalog-demo/. ./belgrade-product-catalog-demo/

    #Step 6

    WORKDIR /app/belgrade-product-catalog-demo

    RUN dotnet publish -c Release -o out

    #Step 7:

    FROM mcr.microsoft.com/dotnet/core/aspnet:2.2 AS runtime

    #Step 8

    WORKDIR /app

    #Step 9

    COPY --from=build /app/belgrade-product-catalog-demo/out ./

    #Step 10

    EXPOSE 5000

    #Step 11

    ENTRYPOINT ["dotnet", "belgrade-product-catalog-demo.dll"]

    ```'
