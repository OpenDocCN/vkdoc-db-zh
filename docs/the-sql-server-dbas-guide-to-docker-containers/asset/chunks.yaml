    ```

    ENV PATH=${PATH}:/opt/mssql/bin:/opt/mssql-tools/bin

    ```


    在自定义 SQL Server on Linux 镜像上安装了 SQL Server 命令行工具后，你就可以在部署用于开发环境的容器时运行不同的 T-SQL
    脚本了。'
- fmt: "### Write the Bash Script to Check for Backups\n\nHere’s a common use case\
    \ for deploying SQL Server in development environments. Let’s say you want to\
    \ copy database backups into Docker volumes and restore them as part of deploying\
    \ your custom SQL Server on Linux image. Anyone who would run a SQL Server on\
    \ Linux container mapped to a Docker volume will automatically have those user\
    \ databases ready to use. Let’s start by copying your database backups in the\
    \ Docker volume:\n\n1.  Create a Docker volume named `sqldbdata`:\n    ```\n \
    \   docker volume create sqldbdata\n    ```\n2.  Copy the database backups in\
    \ the Docker volume.\n\nThere are several ways to copy files into the Docker volume.\
    \ But because we’re assuming that you don’t have `root` privileges, we’ll create\
    \ a temporary container to do this. This works because, by default, containers\
    \ run in the security context of `root` unless you specifically configure the\
    \ source image to run as non-`root`. Also, this assumes that all of your SQL Server\
    \ database backup files are in the current working directory.\n\n1.  Change ownership\
    \ of the Docker volume to non-`root` user:\n    ```\n    #Use the temporary container\
    \ to run the chown command\n    #to change ownership of files in the Docker volume\n\
    \    docker exec temp chown -R 10001:0 /data\n    #Delete the temporary container\
    \ after use\n    docker rm temp -f\n    ```\n    ```\n    #Create a temporary\
    \ container using the Alpine Linux image\n    #just so we can copy files into\
    \ the Docker volume\n    docker run --name temp -d -v sqldbdata:/data alpine sleep\
    \ 10000\n    #Copy files from the current working directory that contains\n  \
    \  #the SQL Server database backups into the Docker volume\n    docker cp . temp:/data\n\
    \    ```\n\nYou could create multiple Docker volumes, each with a copy of the\
    \ database backups, and just tell the users to mount the specific volume to their\
    \ container. This really depends on your deployment strategy.\n\nBecause you now\
    \ have the SQL Server command-line tools in your custom SQL Server on Linux image,\
    \ you can run T-SQL scripts using `sqlcmd` to do anything you want as DBAs inside\
    \ the container. You could write your own T-SQL script that checks for database\
    \ backups and restores them and call the script from `sqlcmd`. Here’s a code snippet\
    \ from the bash script that loops through the database backups in the specified\
    \ directory and restores them:\n```\n#Iterate thru all the BAK files in Docker\
    \ volume\n#/var/opt/mssql is mounted on Docker volume=sqldbdata\nfor files in\
    \ /var/opt/mssql/*.bak\ndo\n/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P\
    \ $SA_PASSWORD -d master -Q \"RESTORE DATABASE [${files:15:-4}] FROM DISK ='$files'\"\
    \ndone\n```\n\nI’m sure you recognize the `sqlcmd` call with the `RESTORE DATABASE`\
    \ command. You may have done something similar in the past with batch files on\
    \ Windows. I’m keeping the script simple for demonstration purposes, but you can\
    \ go crazy with your T-SQL scripts. The database backups are named with the format\
    \ `databaseName.bak` and were all taken from a SQL Server on Linux instance with\
    \ the default configuration. That way, we don’t need to specify the `WITH MOVE`\
    \ option when running the `RESTORE DATABASE` command. The `${files:15:-4}` inside\
    \ the square brackets performs string manipulation to extract the database name.\
    \ Since the `/var/opt/mssql` directory in the container will be mapped to the\
    \ Docker volume, the full path of the backup files will be in the form `/var/opt/mssql/databaseName.bak`.\
    \ There are 15 characters before the beginning of the database name (`/var/opt/mssql/`)\
    \ and 4 characters after it (`.bak`). The `$` symbol refers to the variable named\
    \ `files` that contains the full path of the backup file. For every backup file\
    \ in the specified directory, the script will generate and run the corresponding\
    \ `sqlcmd` command in the following. Don’t make fun of me. I still use the classic\
    \ Northwind database for examples.\n```\n/opt/mssql-tools/bin/sqlcmd -S localhost\
    \ -U sa -P $SA_PASSWORD -d master -Q \"RESTORE DATABASE [Northwind] FROM DISK\
    \ ='/var/opt/mssql/Northwind.bak'\"\n```\n\nI’ve also included a `sleep` command\
    \ before running the `RESTORE DATABASE` command in the script. Remember the in-place\
    \ upgrade from *Chapter 7*? Even a new deployment of a SQL Server on Linux container\
    \ will look like an upgrade because it starts from the RTM release. And that takes\
    \ time. The `sleep` command takes this into account and won’t run the RESTORE\
    \ DATABASE command until after the upgrade process completes which is roughly\
    \ 2 minutes. You can bump up the wait time if you want. It’s a quick and dirty\
    \ way to accomplish this, but there are other ways like reading the SQL Server\
    \ error log to check for a specific text like the following code snippet:\n```\n\
    #Check SQL Server errorlog to see if recovery is complete\nwhile ! grep \"Recovery\
    \ is complete. This is an informational message only. No user action is required\"\
    \ /var/opt/mssql/log/errorlog\ndo sleep 10; done\n```\n\nThe following is the\
    \ complete bash script to check for database backups and restoring them:\n```\n\
    #!/bin/bash\n#Make script wait until the upgrade process completes\nsleep 120\n\
    #Iterate thru all the BAK files in Docker volume\n#directory /var/opt/mssql/data\
    \ is mounted on Docker volume\nfor f in /var/opt/mssql/*.bak\ndo\n/opt/mssql-tools/bin/sqlcmd\
    \ -S localhost -U sa -P $SA_PASSWORD -d master -Q \"RESTORE DATABASE [${f:15:-4}]\
    \ FROM DISK ='$f'\"\ndone\n```\n\nName the script `checkbackups_restore.sh`. You’re\
    \ going to need it later.\n\nNote\n\nUnlike in *Chapter 8* where we assigned `execute`\
    \ permission on the bash script file on the Linux host, you don’t need to do that\
    \ here. Assigning `execute` permission on the bash script files will be done inside\
    \ the custom Docker image. An additional instruction will be added in the `Dockerfile`\
    \ as you’ll see in the next section.\n\nThere’s another bash script that you need.\
    \ You can call it the “startup” script. What it does is it calls the `checkbackups_restore.sh`\
    \ script and, while the script executes in the background, calls the `sqlservr`\
    \ process. Recall that the last instruction in a `Dockerfile` should be something\
    \ that does not terminate. Otherwise, the container will terminate as well. So,\
    \ in order to run the `checkbackups_restore.sh` script and start the `sqlservr`\
    \ process, we need to call them both from a startup script. The following is the\
    \ code for the startup bash script. You can save this as `startup.sh`:\n```\n\
    #!/bin/bash\n#Start the script to restore all database backups\n#from Docker volume;\
    \ run script in the background\n/tmp/startup/checkbackups_restore.sh &\n# Start\
    \ SQL Server\n/opt/mssql/bin/sqlservr\n```\n\nObserve the startup script and you\
    \ will notice that it is being called from inside the `/tmp/startup` directory.\
    \ This means that both the startup script and the `checkbackups_restore.sh` script\
    \ should be in a directory named `/tmp/startup` inside the container. This also\
    \ means that we need to create the `/tmp/startup` directory and grant `execute`\
    \ permission to the `checkbackups_restore.sh` and `startup.sh` scripts. This gives\
    \ you an idea on how the new `Dockerfile` would look like. Also, the “&” symbol\
    \ after the script tells it to run in the background."
