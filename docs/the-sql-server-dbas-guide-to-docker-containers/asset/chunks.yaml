  trans: '## 验证 Docker 引擎安装


    我确实说过，你需要开始习惯使用命令行。从现在起，你将主要使用命令行进行操作——无论是命令提示符还是 PowerShell 命令 shell。我更喜欢使用 PowerShell，这样我可以同时利用可用的
    PowerShell cmdlet 和 Docker 命令。请记住，PowerShell 命令或 cmdlet 的输出是一个对象或对象集合，而 Docker
    命令的输出是文本。此外，请务必在提升权限的管理员 PowerShell 命令 shell 中运行每条命令。


    运行以下命令以检查服务器上安装的 Docker 版本：

    ```

    docker version

    ```

    图 2-4 展示了该命令的输出，显示了 Docker 客户端以及运行在机器上的 Docker 引擎的版本。


    ![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig4_HTML.jpg](img/484552_1_En_2_Fig4_HTML.jpg)


    图 2-4：显示 Docker 客户端和 Docker 引擎的版本


    客户端和服务器的 `OS/Arch:` 属性都显示 `windows/amd64`，因为 Docker 引擎运行在 Windows Server 2016
    机器上。此外，安装的是 Docker 引擎 - 企业版。这意味着你在 Docker 主机上部署容器时，将获得来自 Microsoft 和 Docker 的双重支持。事实上，尽管
    Docker 引擎是负责在 Windows Server 机器上运行容器的组件，但 Microsoft 是首要的支持联系点。第 4 章将更详细地描述 Docker
    企业版与社区版之间的区别。


    运行以下命令以显示关于服务器上 docker 安装的系统级信息：

    ```

    docker info

    ```

    图 2-5 展示了该命令的输出。


    ![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig5_HTML.jpg](img/484552_1_En_2_Fig5_HTML.jpg)


    图 2-5：显示 Docker 安装的系统级信息


    至此，你的 Windows Server 2016 机器已成为一个功能完备的 Docker 容器主机。


    ## Windows 版 Docker Desktop


    使用服务器操作系统（如 Windows Server）而非桌面操作系统（如 Windows 10）来部署 Docker 容器主机的理念，是为了让你体验在“真实世界”中部署
    Docker 的过程，类似于数据中心工程师在生产环境中的部署方式。理解运行应用程序的底层基础设施有助于你成为一名更全面的 IT 专业人士。


    Windows 版 Docker Desktop 是大多数开发者在 Windows 操作系统上开始学习 Docker 时使用的工具。它是一个利用 Hyper-V
    虚拟化的原生 Windows 应用程序。我喜欢将其视为某种形式的嵌套虚拟化——它会在 Hyper-V 主机内创建一个 MobyLinux 虚拟机。这个 MobyLinux
    虚拟机将作为 Docker 容器主机运行，以承载基于 Linux 的容器。但由于它是一个原生 Windows 应用程序，你也可以在主机上直接运行基于 Windows
    的容器。借助 Windows 版 Docker Desktop，你可以在运行 Linux 容器和 Windows 容器之间进行切换。图 2-6 和图 2-7
    展示了如何在 Docker Desktop 中切换 Windows 容器和 Linux 容器。


    ![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig7_HTML.jpg](img/484552_1_En_2_Fig7_HTML.jpg)


    图 2-7：切换到 Linux 容器


    ![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig6_HTML.jpg](img/484552_1_En_2_Fig6_HTML.jpg)


    图 2-6：切换到 Windows 容器


    运行 `docker version` 命令会根据你运行的是 Linux 容器还是 Windows 容器而显示不同的结果。图 2-8 展示了运行 Linux
    容器时该命令的输出。请注意，客户端的 `OS/Arch:` 属性是 `windows/amd64`，而服务器的则是 `linux/amd64`（这是为在 Hyper-V
    上运行而创建的 MobyLinux 虚拟机）。


    ![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig8_HTML.jpg](img/484552_1_En_2_Fig8_HTML.jpg)


    图 2-8：Windows 上的 Docker Desktop – 客户端和服务器详情（Linux 容器）


    在 Windows 上安装 Docker Desktop 非常简单。只需从 Docker Hub 下载并运行安装文件即可。


    如果你的开发者同事中有任何想要尝试 Docker 的，Windows 版 Docker Desktop 就是你该推荐的工具。而我们这些“大孩子”玩的是真正的“玩具”——也就是服务器。


    ## 总结


    本章引导你完成了将 Windows Server 2016 安装并配置为 Docker 容器主机的全过程。该服务器现在已准备好运行任何与 Windows Server
    2016 具有相同操作系统内核的基于 Windows 的容器。请注意，这与你在生产环境中的部署设置相同，只是省略了你的组织出于安全、可靠性和标准化要求而进行的所有自定义配置。


    虽然 Docker 最初是为 Linux 操作系统创建的，但到目前为止，你还无需学习任何 Linux 知识——这部分内容将在下一章介绍。所以，请系好安全带。是时候潜入
    Linux 的世界了。'
- fmt: '# 3. Install and Configure Docker on Linux


    > *The key to life is accepting challenges. Once someone stops doing this, he’s
    dead.*

    > —Bette Davis


    I still cannot believe I’m writing this chapter – about Linux, for SQL Server
    DBAs. In Chapter [1](#484552_1_En_1_Chapter.xhtml), I mentioned how Microsoft
    brought SQL Server to Linux in 2017. That came as a big surprise to a lot of SQL
    Server DBAs who have only known SQL Server as a relational database engine that
    runs on a Windows operating system. But just like any technological innovation,
    you can either choose to embrace it or ignore it. Embracing it gives you an opportunity
    to grow and take your career to a whole new level.


    I’m assuming you have very little to no experience with Linux. So, we’ll start
    with getting yourself familiar with Linux – knowing the simple and basic commands
    that you need to work with the operating system, the filesystem, and Docker. That
    means spending majority of the time working with the command line. You also need
    to change your way of thinking when it comes to security. You’ll see that in action
    when we get to the section on updating your Linux system.


    Once you’ve gotten a little bit comfortable with Linux, we will go ahead and install
    and configure the Docker engine on Linux. Unlike Windows, Linux has so many distributions
    (or distros, as they are commonly known) available, making it challenging to know
    every single one of them. We will only focus on two Linux distros – CentOS and
    Ubuntu. Apart from consistently being in the top ten list of the most popular
    Linux server distros, these are two out of three that Microsoft support for running
    SQL Server on Linux. CentOS is a free, enterprise-class, community-supported distribution
    based on Red Hat Enterprise Linux (RHEL). You get the experience of working on
    a RHEL-like Linux distribution without the price of an enterprise support agreement.
    Ubuntu, on the other hand, is a popular Linux distro for developers that is based
    on Debian GNU/Linux. We still need to keep developers happy, don’t we?


    To make learning Linux a little bit easier, pick a distro and stick to it. You
    can learn other distros once you feel comfortable with your first choice.


    **Note**

    Same as Chapter [2](#484552_1_En_2_Chapter.xhtml), this chapter does not go into
    the process of installing a Linux operating system. That is what *Appendix A*
    is for. This chapter assumes that you already have a clean installation of either
    a CentOS or Ubuntu Linux server with a secure shell (SSH) client configured to
    connect remotely to the machines.


    ## Minimum System Requirements


    Unlike Windows, Linux does not require a lot of system resources to run. So, if
    you follow the minimum system requirements for running Docker on Windows Server,
    you’ll be fine.


    *   *RAM*: At least 4GB. The reason why I always start with 4GB of RAM even on
    a Linux machine is because I assume it will be running SQL Server. My Linux sysadmin
    colleagues laughed at me years ago for doing this. I can’t blame them. But, back
    then, nobody dreamed of running SQL Server on Linux. Besides, 2GB is the minimum
    memory requirement for running SQL Server on Linux.


    *   *Operating system*: There are other supported Linux distros you can use. Docker
    supports a minimum of CentOS 7 (you need at least version 7.4 for RHEL) and Ubuntu
    Server Xenial 16.04 (LTS). To get you started on running Docker on Linux, we will
    be using `CentOS 7.6 (1810)` and `Ubuntu Server Xenial 16.04 (LTS)`. You can download
    the CentOS ISO image from [`www.centos.org/download/`](https://www.centos.org/download/)
    and the Ubuntu Server Xenial ISO image from [`http://releases.ubuntu.com/16.04/`](http://releases.ubuntu.com/16.04/).
    Be sure to select the *Server install image* and not the *Desktop image* for Ubuntu.


    *   *Disk space*: You will be surprised at the disk space requirements for Linux
    – even when running SQL Server. You will see in *Chapter* [*5*](#484552_1_En_5_Chapter.xhtml)
    the difference in disk space requirements between a container running SQL Server
    on Linux and SQL Server on Windows. 20GB is my bare minimum for any Linux installation.


    **Note**

    There really isn’t an official supported minimum system requirement for running
    the Docker engine on a Linux operating system. I spent hours searching the Docker
    documentation for what they consider a supported minimum system requirement. What
    you’ll find, however, is the minimum system requirements for running Docker Universal
    Control Plane – the cluster management solution for multi-host Docker clusters.
    Save that for a more advanced configuration since you’re in the early stages of
    learning Docker.'
