    where one uses the default port 1433 while the other uses port 5000\. I’ve highlighted
    the use of the *-p* parameter to illustrate this.


    ```

    docker run -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=y0urSecUr3PAssw0rd'' -p 1433:1433
    --name sql-linuxcon01 -d -h linuxsql01 mcr.microsoft.com/mssql/server:2017-latest

    docker run -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=y0urSecUr3PAssw0rd'' -p 5000:1433
    --name sql-linuxcon02 -d -h linuxsql02 mcr.microsoft.com/mssql/server:2017-latest

    ```


    For people working with SQL Server, this is normal. We can run as many SQL Server
    instances as we want (well, technically, the maximum supported is 50) on the same
    host by leveraging named instances. In fact, this is how a lot of customers reduced
    their licensing costs prior to virtualization. The same concept that made running
    multiple SQL Server instances possible on a single host is how we can run multiple
    SQL Server instances on a Linux host – via containers and port mapping. Even better,
    you’re no longer limited to a maximum of 50 SQL Server instances on the same host.
    You can run as many as there are ports and resources available on your Docker
    host .'
  trans: '## 端口处理与暴露：通过容器在 Linux 上运行多个 SQL Server 实例


    自本书前几章起，我们一直在使用 `docker run` 命令的 `-p` 参数。在 第 10 章 中，我们也介绍了 `Dockerfile` 中 `EXPOSE`
    指令的用途。从容器外部或 Docker 主机本地访问容器内应用程序的方式，是使用 `docker run` 命令的 `-p` 参数，它将容器的端口号映射到主机的端口号。如果我们不这样做，容器将只能被连接到同一个
    Docker 网络（即 `bridge` 网络）的其他容器访问。请思考一下这一点。到目前为止，我们在本书中创建的每个 SQL Server 容器默认都附加到了
    `bridge` 网络。而且直到 第 10 章 创建多容器应用之前，我们都只创建单个容器。如果我们在每次使用 `docker run` 命令时都没有提供 `-p`
    参数，那么我们的 SQL Server 实例将完全被隔离——从而变得毫无用处。容器可能在监听 1433 端口，但如果该端口没有发布到 Docker 主机上，我们就无法远程访问它。虽然从安全角度来看，这是最安全的
    SQL Server 实例。只是你将无法使用它。


    端口映射是将容器发布到外部网络上的其他服务和应用程序的好方法。然而，你会看到很多文章和博客文章告诉不要进行端口映射，因为它不具备可扩展性。一旦主机上的某个端口已经映射到某个容器，它就不再对其他容器可用。尽管端口号范围在
    1024 到 65535 之间，但如果你想连接到远程容器而不仅仅是使用默认值，就必须明确定义端口号。一个例子是当你在容器中运行 Web 应用程序时。端口 80
    和 443 分别是通过 HTTP 或 HTTPS 连接到 Web 应用程序的默认端口号。如果你在单个 Docker 主机上运行多个 Web 应用容器，你需要将其他容器映射到不同的、非标准的端口号。而像我这样的普通人可能知道，也可能不知道这些非标准端口号。


    对于 SQL Server 也是同样的情况。使用 SQL Server 的工作人员知道他们可以通过端口 1433 访问它。应用程序连接字符串使用默认端口号，因此你很少会看到明确指定端口号的连接字符串。但同样真实的是，使用
    SQL Server 的人员了解命名实例以及它们如何利用非标准端口号。事实上，虽然微软不支持在 Linux 上运行多个 SQL Server 实例，但绕过这一限制的方法是在
    Docker 主机上运行多个 SQL Server 容器，并将每个容器映射到不同的端口号。以下是在同一个 Linux Docker 主机上运行两个 SQL
    Server 容器的示例，其中一个使用默认端口 1433，另一个使用端口 5000。我重点标出了 `-p` 参数的使用以说明这一点。


    ```

    docker run -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=y0urSecUr3PAssw0rd'' -p 1433:1433
    --name sql-linuxcon01 -d -h linuxsql01 mcr.microsoft.com/mssql/server:2017-latest

    docker run -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=y0urSecUr3PAssw0rd'' -p 5000:1433
    --name sql-linuxcon02 -d -h linuxsql02 mcr.microsoft.com/mssql/server:2017-latest

    ```


    对于使用 SQL Server 的人员来说，这很正常。通过利用命名实例，我们可以在同一主机上运行任意数量的 SQL Server 实例（嗯，从技术上讲，最大支持数量是
    50）。事实上，这就是许多客户在虚拟化技术普及之前降低许可成本的方式。使得在单个主机上运行多个 SQL Server 实例成为可能的概念，正是我们可以在 Linux
    主机上运行多个 SQL Server 实例的方式——通过容器和端口映射。更好的是，你现在不再受限于同一主机上最多 50 个 SQL Server 实例的限制。只要你的
    Docker 主机上有可用的端口和资源，你就可以运行任意多个实例。'
- fmt: '## Using the Same Port on Multiple Containers


    Another way to leverage the default SQL Server port number on multiple containers
    running on the same Docker host is by creating a different Docker network for
    each container. Since each Docker network will have its own IP address range and
    subnet, each container can be assigned a unique IP address, allowing all of them
    to use port 1433. Keep in mind that a TCP or UDP port is a unique combination
    of an IP address plus a port number. We can reuse the same port number for a different
    host (or, in this case, a different container) if we are assigning a different
    IP address to it. The following is an example of creating a user-defined Docker
    network using the `bridge` driver and assigning a specific IP address to a container
    from that user-defined network:


    ```

    #Step 1: Create a user-defined network named bridgenet1

    docker network create -d bridge --subnet 172.19.0.1/24 bridgenet1

    #Step 2: Run a container and attach it to bridgenet1

    docker run --network bridgenet1 -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=y0urSecUr3PAssw0rd''
    --ip="172.19.0.2" --name sql-linuxcon01 -d -h linuxsql01 mcr.microsoft.com/mssql/server:2017-latest

    #Step 3: Create a user-defined network named bridgenet2

    docker network create -d bridge --subnet 10.0.0.1/16 bridgenet2

    #Step 4: Run a container and attach it to bridgenet2

    docker run --network bridgenet2 -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=y0urSecUr3PAssw0rd''
    --ip="10.0.0.2" --name sql-linuxcon02 -d -h linuxsql02 mcr.microsoft.com/mssql/server:2017-latest

    ```


    Let''s explore the sample code to understand what it is doing. In Step 1, we create
    a Docker network named `bridgenet1` using the `-d` parameter to define it using
    a `bridge` driver. The `--subnet` parameter defines the IP address range and the
    subnet mask – `172.19.0.1/24`. Any container attached to this network will have
    an IP address in this specific range. In Step 2, we create and run a new SQL Server
    on Linux container. Notice the use of the `--network` and `--ip` parameters instead
    of the usual `-p` parameter. Here, we are telling Docker to attach this container
    to the `bridgenet1` network and assign it a `172.19.0.2` IP address instead of
    relying on the `bridge` network to assign the IP address (the Docker daemon effectively
    acts as a DHCP server providing IP addresses to the containers attached to the
    `bridge` network). We do the same thing in Steps 3 and 4. Figure 11-5 shows the
    TCP/IP properties of the Docker host after creating the user-defined Docker networks
    and attaching containers to them.


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig5_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig5_HTML.jpg)


    Figure 11-5

    TCP/IP settings of the Docker host after creating user-defined networks and attached
    containers to them


    Notice the following:


    *   The `docker0` bridge `state DOWN` status because there are no running containers
    attached to it.

    *   Two new Linux bridges named `br-a65abe44e690` and `br-944424a1e3a4` were created.
    These correspond to `bridgenet1` and `bridgenet2`, respectively. Again, names
    will be different on your Docker host.

    *   In the same way, two new virtual network adapters named `veth41f58c2@if59`
    and `veth478416d@if62` were created. Recall that Docker creates a pair of virtual
    network adapters every time a container is started, one end of which is attached
    to the host system via the bridge network and the other end to the running container.
    These virtual network adapters correspond to containers attached to `bridgenet1`
    and `bridgenet2`, respectively.


    You can test this by connecting to the corresponding SQL Server instance on containers
    via their respective IP addresses, as shown in Figure 11-6.


    ![../images/484552_1_En_11_Chapter/484552_1_En_11_Fig6_HTML.jpg](images/484552_1_En_11_Chapter/484552_1_En_11_Fig6_HTML.jpg)


    Figure 11-6

    Connecting to SQL Server on containers on the same Docker host using different
    IP addresses


    **Note**

    Keep in mind that while the containers are accessible via their IP addresses,
    you can only connect to them from the Docker host. That''s because only the Docker
    host is aware of these new IP addresses. In order to access them remotely, you
    need to configure a proper route from a client machine on the network to the Docker
    host. Consult your network administrators on how to properly configure this to
    access these containers remotely.


    This is a very old trick used by Internet service providers in the early days
    of the Internet where web servers host hundreds or more websites, each with their
    own domain name and IP address. Instead of spinning up hundreds of web servers,
    it''s more cost-effective to assign multiple IP addresses to a single web server.
    SQL Server adopted this trick with named instances and either attached multiple
    network adapters on a single database server or assigned multiple IP addresses
    to a single network adapter. This made it possible to connect to multiple SQL
    Server named instances on the same host using port 1433 – same concept, different
    implementation. However, it''s not something I recommend unless you have a strong
    foundation on the basics of TCP/IP or work with a system administrator who does.
    Troubleshooting network connectivity can be a pain with complex implementations
    like this.'
