    此指令运行 `mkdir` 命令以创建一个新目录 `/var/opt/mssql`，并使用 `-m` 参数赋予 770 权限——所有者具有读写执行（RWX）权限，组具有读写执行（RWX）权限，其他用户无权限。`&&`
    字符仅仅是追加了 `chgrp` 命令，而非创建一个新的 `RUN` 指令。这看起来与第 4 步很像，但权限设置更为精细。另外，追加命令而不是创建另一个指令是一种优化技巧，我们可以在
    `Dockerfile` 中实施。


    注意：如果你遵循 `Dockerfile` 中的命令顺序，是隐式地由 `root` 用户创建了 `/var/opt/mssql` 目录。这意味着运行 `chgrp`
    命令只是从 `root` 分配了相同的组权限。如果我们指派 `mssql` 用户来运行 `sqlservr` 进程，这种方式就行不通了。我们要么让 `mssql`
    用户创建 `/var/opt/mssql` 目录，要么使用命令 `chown -R mssql:0 /var/opt/mssql` 显式地将所有权更改为 `mssql`
    用户。微软提供的可用 `Dockerfile` 是有效的，但该镜像是从一个现有的 SQL Server on Linux 镜像构建的（注意 `FROM` 指令并非一个基础操作系统镜像）。我不确定他们用于构建基础镜像的脚本是否已经包含了将
    `mssql` 用户设为 SQL Server 目录所有者的步骤。


    我重写了该指令，以显式地将 `/var/opt/mssql` 目录的所有权分配给 `mssql` 用户，如下所示。我还对其进行了优化，并将多个命令合并到一个
    `RUN` 指令中，而不是使用多行：


    ```

    RUN mkdir -p -m 770 /opt/mssql && chown -R mssql:0 /opt/mssql && chgrp -R 0 /opt/mssql

    ```


    **第 15 行**: `RUN setcap ‘cap_net_bind_service+ep’ /opt/mssql/bin/sqlservr`


    此指令运行 `setcap` 命令以在文件上设置 Linux capabilities，本例中是 `sqlservr` 可执行文件。`cap_net_bind_service`
    capability 允许 `sqlservr` 可执行文件绑定到低端口号（1024 以下的任何端口），而无需以 `root` 身份运行。`+ep` 表示我们正在分配（`+`
    操作符）`Explicit`（显式）和 `Permitted`（允许）的 capabilities。


    注意：Linux capabilities 是一个安全概念。它们为一个进程提供可用 `root` 权限的一个子集。你不想授予一个进程完整的 `root` 权限（例如，docker
    容器进程），否则你将面临该进程被利用并接管整个机器的风险。一个进程可能需要特殊权限来执行其功能，但直接授予其 `root` 访问权限有点过分了。因此，你授予
    Linux 进程其工作所需的适当 capability。第 15 行的示例授予了 `sqlservr` 进程 `cap_net_bind_service`
    capability，以便将其绑定到低端口号。这比授予其 `root` 权限要安全得多。


    **第 19 行**: `RUN setcap ‘cap_sys_ptrace+ep’ /opt/mssql/bin/paldumper`


    与第 15 行类似，此指令运行 `setcap` 命令，为 `paldumper` 文件设置 `cap_sys_ptrace` capability。你大概可以从它的名字猜出这个文件是什么——它是一个
    SQL Server 实用工具，用于生成核心转储，主要用于故障排除。这必须显式定义，因为我们将不再以 `root` 身份运行容器，然而我们又需要 `root`
    权限来执行故障排除。


    **第 20 行**: `RUN setcap ‘cap_sys_ptrace+ep’ /usr/bin/gdb`


    这与第 19 行类似，但针对的是 `gdb` 文件，它是 GNU 调试器的缩写，是 Linux 最常用的调试实用工具。


    **第 25 行**: `RUN mkdir -p /etc/ld.so.conf.d && touch /etc/ld.so.conf.d/mssql.conf`


    此指令使用 `touch` 命令创建一个 SQL Server 将使用的 `ldconfig` 文件——`mssql.conf`。`ldconfig` 命令用于为共享库创建必要的链接和缓存。共享库是程序启动时加载的库。这些共享库的位置存储在环境变量
    `LD_LIBRARY_PATH` 中。接下来的几个指令将进一步解释为何需要此步骤。


    **第 26 行**: `RUN echo -e "# mssql libs\n/opt/mssql/lib" >> /etc/ld.so.conf.d/mssql.conf`


    在第 25 行的基础上，一行包含 `# mssql libs\n/opt/mssql/lib` 的新内容被添加到 `/etc/ld.so.conf.d/mssql.conf`
    文件中。系统会读取 `mssql.conf` 文件以搜索所使用的共享库位置，在本例中是 `libs` 和 `/opt/mssql/lib`（`\n` 用于引入新行）。这样做的原因是，先前指令中使用的
    `setcap` 命令移除了 `LD_LIBRARY_PATH` 和其他控制动态链接的环境变量。这是出于安全原因。由于你将使用非 `root` 用户运行容器，所有不安全的环境变量都将被移除，导致在故障排除期间运行
    `paldumper` 和 `gdb` 变得无效。


    **第 27 行**: `RUN ldconfig`


    此指令运行 `ldconfig` 命令以应用第 25 和 26 行中创建的配置设置。


    **第 29 行**: `USER mssql`


    此指令将 `mssql` 设置为运行容器时的用户。


    以下的 `Dockerfile` 集成了这些行，以创建一个以非 `root` 用户运行的基于 CentOS Linux 的自定义 SQL Server 镜像。我添加了步骤和行号作为注释，以标识添加的指令：


    ```

    #步骤 1

    FROM centos:7.6.1810

    #步骤 2

    RUN curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    #步骤 3

    RUN yum install -y mssql-server

    #第 10 行–如果你在 Ubuntu 上安装 SQL Server 2019 或 SQL Server 2017，

    #请更改为其他用户，例如 mssql2

    RUN useradd -M -s /bin/bash -u 10001 -g 0 mssql

    #修改的第 11 行

    RUN mkdir -p -m 770 /opt/mssql && chown -R mssql:0 /opt/mssql && chgrp -R 0 /opt/mssql

    #第 15、19 和 20 行

    RUN setcap ''cap_net_bind_service+ep'' /opt/mssql/bin/sqlservr

    RUN setcap ''cap_sys_ptrace+ep'' /opt/mssql/bin/paldumper

    RUN setcap ''cap_sys_ptrace+ep'' /usr/bin/gdb

    #第 25、26 和 27 行

    RUN mkdir -p /etc/ld.so.conf.d && touch /etc/ld.so.conf.d/mssql.conf

    RUN echo -e "# mssql libs\n/opt/mssql/lib" >> /etc/ld.so.conf.d/mssql.conf

    RUN ldconfig

    #告知用户此容器将使用的端口

    EXPOSE 1433

    #第 29 行

    USER mssql

    #步骤 5

    ENV PATH=${PATH}:/opt/mssql/bin

    #步骤 6

    CMD sqlservr

    ```


    保存 `Dockerfile` 并构建镜像。完成后，你便可以使用这个自定义的 SQL Server on Linux 镜像来以非 `root` 身份运行容器。

    '
- fmt: '# Running a Container As Non-root


    By default, running a container using the `docker run` command will run it as
    `root`. But now that the custom image you’ve built no longer runs as `root`, running
    a container from the custom image means that while the `root` still owns the container’s
    read-write filesystem layer (the Docker daemon runs as `root` and it creates the
    read-write filesystem layer), it no longer runs as `root`. Run the following `docker
    container inspect` command to check the container’s read-write filesystem layer.
    I used the `--format` parameter to keep the result of the `docker container inspect`
    command clean and only display the `UpperDir` directory – the directory containing
    the read-write filesystem layer. Replace `sqldevlinuxcon01` with the name of your
    container. Refer to Chapter [5](#484552_1_En_5_Chapter.xhtml) for a quick review
    of the filesystem layers and their location.


    ```

    docker container inspect sqldevlinuxcon01 --format ''{{.GraphDriver.Data.UpperDir}}''

    ```


    Tip


    The `--format` parameter is very handy for displaying only the information you
    need from the JSON output of the `docker container inspect` or any `docker` commands
    that return a JSON output. The reality is all the `docker` commands return a JSON
    output, hence why a lot of the commands have a `--format` parameter. It’s just
    that the most common commands already have a template applied to them. You can
    format the JSON output yourself by applying a Golang package template since Docker
    was written using the Go programming language. Check out the Golang package template
    from [*https://golang.org/pkg/text/template/*](https://golang.org/pkg/text/template/).


    You can pass this as a parameter to the `ls` command to see the owner of the directory
    as shown in the following. Be sure to prefix the command with `sudo` as the `root`
    owns the `/var/lib/docker` directory. Figure [10-5](#484552_1_En_10_Chapter.xhtml#Fig5)
    shows the owner of the directory – it is still `root`.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig5_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig5_HTML.jpg)


    Figure 10-5

    root still owns the container’s filesystem layer


    ```

    sudo ls -ld "$(docker container inspect sqldevlinuxcon01 --format ''{{.GraphDriver.Data.UpperDir}}'')"

    ```


    But if you look at the process that runs `sqlservr` from the Linux Docker host
    using the following command, you will see that it no longer runs as `root`. Figure
    [10-6](#484552_1_En_10_Chapter.xhtml#Fig6) shows the `UID 10001` as the user ID
    that runs the `sqlservr` process. This is the user ID we assigned when we created
    the `mssql` user using `Line 10` in the `Dockerfile`.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig6_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig6_HTML.jpg)


    Figure 10-6

    UID 10001 runs the sqlservr process in the Linux Docker host


    ```

    ps aux | grep sqlservr

    ```


    You can confirm that the container also runs as the `mssql` user by running the
    following `docker exec` command passing the previous command:


    ```

    docker exec -it sqldevlinuxcon01 ps aux | grep sqlservr

    ```


    You can also run the following `docker container inspect` command:


    ```

    docker container inspect sqldevlinuxcon01 --format ''{{.Config.User}} {{.Name}}''

    ```


    Figure [10-7](#484552_1_En_10_Chapter.xhtml#Fig7) shows the `mssql` user that
    runs the `sqlservr` process inside the container.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig7_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig7_HTML.jpg)


    Figure 10-7

    mssql user runs the sqlservr process in the container


    Inspecting the container’s read-write filesystem layer for the ownership of the
    files and directories confirms this as shown in Figure [10-8](#484552_1_En_10_Chapter.xhtml#Fig8).


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig8_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig8_HTML.jpg)


    Figure 10-8

    mssql user with UID 10001 owns the directories


    The reason why only the user ID value is displayed in Figures [10-6](#484552_1_En_10_Chapter.xhtml#Fig6)
    and [10-8](#484552_1_En_10_Chapter.xhtml#Fig8) is because we didn’t create the
    `mssql` user with the corresponding user ID value on the Linux Docker host. I
    highly recommend creating the `mssql` user with the same UID value on the Linux
    Docker host so you can easily map it to the user running inside the container.
    Use the following command to create the user on the Linux Docker host:


    ```

    sudo useradd -M -s /bin/bash -u 10001 -g 0 mssql

    ```


    Rerunning the command used to show Figure [10-6](#484552_1_En_10_Chapter.xhtml#Fig6)
    will no longer display a UID value but a user-friendly name.


    The one thing that you have to be very careful of is the assignment of the UID
    value for the user account that you’re creating inside the container. There’s
    a reason Microsoft decided to use UID 10001 for the `mssql` user – the value is
    large enough to prevent any possible conflicts on the Linux Docker host. Keep
    in mind that the containers share the same kernel as the Docker host. The Linux
    kernel is responsible for managing the UID and GID space, and these are used to
    determine if requested privileges should be granted. When we created the `mssql`
    user in `Line 10` of the `Dockerfile`, the UID is checked against the Linux kernel
    to see if it already exists. If it does, it will just use the existing UID. If
    it doesn’t, it gets created in an isolated UID space that only lives in the context
    of the container. When the container is created, the Docker daemon creates the
    read-write filesystem layer in the Linux Docker host via the `root` user. When
    we granted the `mssql` user ownership of the `/var/opt/mssql` directory, the Linux
    kernel of the Docker host checks if a process has permissions to make modifications
    to the files inside the directory. The UID value is used for checking, not the
    username. That’s why Figure [10-8](#484552_1_En_10_Chapter.xhtml#Fig8) shows a
    UID value and not a username. However, if an existing Linux user in the Docker
    host has the same UID value as the one you used inside the container, the user
    in the Linux Docker host wins. Figure [10-9](#484552_1_En_10_Chapter.xhtml#Fig9)
    demonstrates this. The Linux user `emsarmiento` has a UID value of 1000 in my
    Linux Docker host. I fat-fingered `Line 10` in the `Dockerfile` and assigned a
    UID value of 1000 for the `mssql` user – same as the user `emsarmiento` – instead
    of 10001.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig9_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig9_HTML.jpg)


    Figure 10-9

    emsarmiento user with UID 1000 owns the directories, not mssql


    You can confirm this by checking the SQL Server process running inside the container
    and on the Linux Docker host. Figure [10-10](#484552_1_En_10_Chapter.xhtml#Fig10)
    shows the same UID used in the container as what’s on the Linux Docker host. You
    might think that they’re different users because of the different names. The truth
    is they’re the same UID.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig10_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig10_HTML.jpg)


    Figure 10-10

    Effect of using a UID on the container that already exists on the Linux Docker
    host


    Tip


    Properly document all the users you create when building custom Docker images.
    This becomes helpful not only for running containers as non-`root` but also for
    security and auditing. In large enterprises where there is a separate team that
    manages the Docker infrastructure, informing them about non-`root` users running
    containers can help them answer security-related questions from auditors.'
