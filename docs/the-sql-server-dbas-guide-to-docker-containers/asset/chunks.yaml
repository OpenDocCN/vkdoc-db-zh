- fmt: '## Things to Consider


    Doesn’t it feel good to pull and run a SQL Server on Windows and Linux containers
    just by running the commands provided? Of course, it does. But don’t get too excited.
    Working with a new environment like Docker presents new challenges that you need
    to be aware of.


    ### Licensing


    The first one is licensing. I’m not going to pretend to be a licensing expert,
    but I’ve dealt with SQL Server licensing for years that I know how to talk about
    it. You might be wondering what edition of SQL Server on Linux is available on
    the image you pulled. The name nor the tag doesn’t mention anything unlike the
    SQL Server on Windows container. The image defaults to the free Developer Edition.
    For any testing or learning purposes, I stick with the free editions – Developer
    and Express. You can’t go wrong with that. You can choose other editions by including
    the `MSSQL_PID` environment variable in your `docker run` command provided you
    have a valid license for them. And be sure to talk to your Microsoft licensing
    expert for deploying SQL Server on containers in a production environment. They
    have the last say on this.


    ### Password Complexity


    The second one is the `SA_PASSWORD` environment variable. The `sysadmin` password
    should meet the SQL Server password complexity requirements as described in [https://docs.microsoft.com/en-us/sql/relational-databases/security/password-policy](https://docs.microsoft.com/en-us/sql/relational-databases/security/password-policy).
    Since this is a required parameter in the installation process, failing this policy
    would cause the installation to fail and the container to stop.


    I found out about this the hard way when I first ran the preceding commands to
    run a SQL Server on Linux container. After running the `docker run` command and
    expecting it to work, I couldn’t figure out why I cannot connect to the SQL Server
    instance remotely (I’ll cover this in more detail in the next section). I thought
    it was due to firewall ports not being opened. So, I did the usual PING and TELNET
    tests. Zilch. I can connect to port 1433 for a while, but after a few minutes,
    the port was no longer responding. I checked if the container was still running,
    and I noticed that it terminates and exits after a few minutes. That got me curious
    about what’s really going on. After reading the logs, I saw the SQL Server error
    message shown in Figure [4-17](#484552_1_En_4_Chapter.xhtml#Fig17).


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig17_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig17_HTML.jpg)

    *Figure 4-17: SQL Server error log from the container logs*


    I spent hours trying to figure out why the container would terminate immediately
    after running only to find out that my `sysadmin` password did not meet the password
    policy.


    Similarly, the use of special characters that may mean something to your shell
    environment like PowerShell or SSH can potentially cause issues, especially when
    used with single quotes instead of double quotes like the following example:


    ```

    docker run -e ''SA_PASSWORD=$Qlu=j&Q7a0N'' ...

    ```


    I wrote a simple PowerShell script years ago that generates complex passwords.
    Occasionally, the script would generate a password that starts with a special
    character, one that means something to the shell environment that I was using.
    Here’s one of the passwords I used to create a SQL Server on Linux container.
    Note that it starts with the `$` character.


    ```

    $Qlu=j&Q7a0N

    ```


    Because the `$` character has a special meaning in both PowerShell and Linux (the
    `$` character represents a variable expression), it was interpreted as a variable
    expression when passed as a value in the `SA_PASSWORD` environment variable. It
    also failed SQL Server’s password policy requirements.


    ### Container Naming


    Last is the assigning of names to containers using the `--name` parameter. Not
    only is it a good practice to properly name your containers, it also avoids scrambling
    around trying to figure out what container `cranky_haslett` is and what is it
    for. I ran the `hello-world` container several times on my Linux host to show
    the different names that the system automatically generated. If not for the image
    name, there’s no way I can figure out what `relaxed_sammet` container is. Refer
    to Figure [4-18](#484552_1_En_4_Chapter.xhtml#Fig18) for a list of really interesting
    system-generated names.


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig18_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig18_HTML.jpg)

    *Figure 4-18: System-generated Docker container names*


    If you’re curious about how Docker generates these names, refer to the source
    code at [https://github.com/moby/moby/blob/master/pkg/namesgenerator/names-generator.go](https://github.com/moby/moby/blob/master/pkg/namesgenerator/names-generator.go).
    There’s no reason to not have fun doing your job.'
