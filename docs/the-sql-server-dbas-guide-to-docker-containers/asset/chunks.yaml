  trans: '# 以非 root 用户运行容器


    默认情况下，使用 `docker run` 命令运行容器会以 `root` 用户身份运行。但既然你构建的自定义镜像不再以 `root` 身份运行，那么从该自定义镜像运行容器意味着，虽然
    `root` 仍然拥有容器的读写文件系统层（Docker 守护进程以 `root` 身份运行并创建该读写层），但容器进程本身不再以 `root` 身份运行。运行以下
    `docker container inspect` 命令以检查容器的读写文件系统层。我使用了 `--format` 参数来让 `docker container
    inspect` 命令的输出保持简洁，只显示包含读写文件系统层的 `UpperDir` 目录——请将 `sqldevlinuxcon01` 替换为你的容器名称。有关文件系统层及其位置的快速回顾，请参阅第
    5 章。


    ```

    docker container inspect sqldevlinuxcon01 --format ''{{.GraphDriver.Data.UpperDir}}''

    ```


    **提示**


    `--format` 参数对于仅从 `docker container inspect` 或任何返回 JSON 输出的 `docker` 命令的输出中筛选你需要的信息非常方便。实际上，所有
    `docker` 命令都返回 JSON 输出，这就是为什么很多命令都带有 `--format` 参数。只不过最常见的命令已经预设了模板。由于 Docker
    是使用 Go 语言编写的，你可以通过应用 Golang 包模板来自行格式化 JSON 输出。请参阅 [*https://golang.org/pkg/text/template/*](https://golang.org/pkg/text/template/)
    了解 Golang 包模板。


    你可以将这个输出作为参数传递给 `ls` 命令，以查看目录的所有者，如下所示。务必在命令前加上 `sudo`，因为 `root` 拥有 `/var/lib/docker`
    目录。图 10-5 显示了目录的所有者——仍然是 `root`。


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig5_HTML.jpg](img/484552_1_En_10_Fig5_HTML.jpg)


    图 10-5

    root 仍然拥有容器的文件系统层


    ```

    sudo ls -ld "$(docker container inspect sqldevlinuxcon01 --format ''{{.GraphDriver.Data.UpperDir}}'')"

    ```


    但是，如果你使用以下命令从 Linux Docker 主机查看运行 `sqlservr` 的进程，你会发现它不再以 `root` 身份运行。图 10-6 显示运行
    `sqlservr` 进程的用户 ID 是 `UID 10001`。这就是我们在 `Dockerfile` 的 `第 10 行` 创建 `mssql` 用户时分配的用户
    ID。


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig6_HTML.jpg](img/484552_1_En_10_Fig6_HTML.jpg)


    图 10-6

    在 Linux Docker 主机上，UID 10001 运行 sqlservr 进程


    ```

    ps aux | grep sqlservr

    ```


    你可以通过运行以下 `docker exec` 命令来确认容器也以 `mssql` 用户身份运行：


    ```

    docker exec -it sqldevlinuxcon01 ps aux | grep sqlservr

    ```


    你也可以运行以下 `docker container inspect` 命令：


    ```

    docker container inspect sqldevlinuxcon01 --format ''{{.Config.User}} {{.Name}}''

    ```


    图 10-7 显示了在容器内部运行 `sqlservr` 进程的 `mssql` 用户。


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig7_HTML.jpg](img/484552_1_En_10_Fig7_HTML.jpg)


    图 10-7

    mssql 用户在容器内运行 sqlservr 进程


    检查容器的读写文件系统层中文件和目录的所有权可以证实这一点，如图 10-8 所示。


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig8_HTML.jpg](img/484552_1_En_10_Fig8_HTML.jpg)


    图 10-8

    UID 为 10001 的 mssql 用户拥有这些目录


    在图 10-6 和 10-8 中仅显示用户 ID 值的原因是，我们在 Linux Docker 主机上没有创建具有相应用户 ID 值的 `mssql` 用户。我强烈建议在
    Linux Docker 主机上创建具有相同 UID 值的 `mssql` 用户，这样你就可以轻松地将其映射到容器内运行的用户。使用以下命令在 Linux
    Docker 主机上创建用户：


    ```

    sudo useradd -M -s /bin/bash -u 10001 -g 0 mssql

    ```


    重新运行用于生成图 10-6 的命令，将不再显示 UID 值，而是显示一个用户友好的名称。


    你需要非常小心的一件事是，在容器内创建用户帐户时为其分配的 UID 值。微软决定为 `mssql` 用户使用 UID 10001 是有原因的——这个值足够大，可以防止在
    Linux Docker 主机上发生任何可能的冲突。请记住，容器与 Docker 主机共享同一个内核。Linux 内核负责管理 UID 和 GID 空间，并用它们来确定是否应授予权限。当我们在
    `Dockerfile` 的 `第 10 行` 创建 `mssql` 用户时，系统会根据 Linux 内核检查该 UID 是否已存在。如果已存在，则直接使用现有的
    UID。如果不存在，则会在一个仅在容器上下文中存在的隔离 UID 空间中创建它。当容器被创建时，Docker 守护进程通过 `root` 用户在 Linux
    Docker 主机上创建读写文件系统层。当我们授予 `mssql` 用户对 `/var/opt/mssql` 目录的所有权时，Docker 主机的 Linux
    内核会检查进程是否有权修改该目录内的文件。用于检查的是 UID 值，而不是用户名。这就是为什么图 10-8 显示的是 UID 值而不是用户名。但是，如果 Docker
    主机中已有的 Linux 用户具有与你容器内所用相同的 UID 值，那么 Linux Docker 主机上的该用户将胜出。图 10-9 演示了这一点。在我的
    Linux Docker 主机上，Linux 用户 `emsarmiento` 的 UID 值为 1000。我在 `Dockerfile` 的 `第 10
    行` 操作失误，为 `mssql` 用户分配了 UID 值 1000——与用户 `emsarmiento` 相同——而不是 10001。


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig9_HTML.jpg](img/484552_1_En_10_Fig9_HTML.jpg)


    图 10-9

    拥有目录的是 UID 为 1000 的 emsarmiento 用户，而不是 mssql


    你可以通过检查在容器内部和 Linux Docker 主机上运行的 SQL Server 进程来确认这一点。图 10-10 显示容器中使用的 UID 与 Linux
    Docker 主机上的相同。你可能因为用户名不同而认为它们是不同的用户。事实是，它们是同一个 UID。


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig10_HTML.jpg](img/484552_1_En_10_Fig10_HTML.jpg)


    图 10-10

    在容器上使用已存在于 Linux Docker 主机上的 UID 的影响


    **提示**


    在构建自定义 Docker 镜像时，务必妥善记录你创建的所有用户。这不仅有助于以非 `root` 身份运行容器，也对安全性和审计工作大有裨益。在有独立团队管理
    Docker 基础设施的大型企业中，告知他们有非 `root` 用户在运行容器，可以帮助他们回答审计员提出的安全相关问题。'
- fmt: '## Non-root User and Docker Volumes


    在第7章中，我们讨论了将 SQL Server 数据库存储在 Docker 卷中以实现数据持久化。但当时，Docker 卷内创建的目录由 `root` 用户拥有。图10-11展示了一个以
    `root` 身份运行的 SQL Server 2017 on Linux 镜像，它利用 Docker 卷时的目录结构和所有权。


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig11_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig11_HTML.jpg)


    图 10-11


    当容器以 root 身份运行时，Docker 卷上的文件系统所有权


    按照第7章中概述的步骤，将一个以 `root` 身份运行的容器智能更新或升级为另一个不以 `root` 身份运行的容器，你最终会遇到如图10-12所示的 `Permission
    denied (13)` 错误。看来并不那么智能，对吧？


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig12_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig12_HTML.jpg)


    图 10-12


    当非 root 容器以 root 身份运行时，Docker 卷上的文件系统所有权错误


    这是因为非 `root` 容器内的 `sqlservr` 进程正试图访问 Docker 卷中由 `root` 用户拥有的数据库文件。这就像在 Windows
    上使用特定的 Active Directory 域账户运行 SQL Server，然后将该服务账户更改为另一个对系统数据库和用户数据库没有读写访问权限的账户一样——SQL
    Server 将无法启动。


    提示


    如果你以前这样做过但没有遇到此问题，你为什么要授予 SQL Server 服务账户管理员权限？你应该限制 SQL Server 服务账户的权限，而不是给它无限制的访问权限。我厌倦了看到
    SQL Server 服务账户以 Active Directory 域管理员身份运行。不要成为那样的 DBA。请遵循此 Microsoft 文档中的指南为
    Windows 上的 SQL Server 配置服务账户：`https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/configure-windows-service-accounts-and-permissions?view=sql-server-ver15#Serv_Perm`。


    现在你知道为什么来自 SQL Server 团队的开发者在 PASS Summit 上围绕着做 SQL Server on Linux 容器演讲的演讲者跑来跑去——并道歉了吧。她知道这是一个定时炸弹。她是对的。每一个演示如何对
    SQL Server on Linux 容器进行就地升级的演讲者都失败了。


    对以 `root` 身份运行的容器进行就地更新或升级的方法是，首先授予非 `root` 用户对 Docker 卷中目录的权限。以下是对执行智能就地更新或升级容器步骤的修改版本。这假设你知道自定义镜像中定义的非
    `root` 用户。


    1.  停止容器。


    2.  将 Docker 卷内 SQL Server 目录和文件的所有权分配给非 `root` 用户。


    在继续更新或升级容器之前，你需要将非 `root` 用户设置为 Docker 卷内文件的新所有者。假设你没有 `root` 权限来更改映射到 Docker
    卷的目录，你可以创建一个临时容器来完成此操作。以下 `docker run` 命令使用 Alpine Linux 镜像运行一个容器；挂载 Docker 卷并运行
    `chown` 命令，将目录和文件所有权更改为 UID 值为 10001 的 `mssql` 用户。我使用 Alpine Linux 镜像因为它非常轻量级。此外，我只需要它来运行
    `chown` 命令。我使用了 UID 值而不是用户名，以防它尚未在 Linux Docker 主机上创建。`sqldbdata` 是 Docker 卷的名称。


    ```

    #Run a temporary Alpine Linux container, mount the Docker volume,

    #and run the chown command

    docker run --name temp -d --mount source=sqldbdata,target=/data alpine chown -R
    10001:0 /data

    #Remove the temporary container

    docker rm temp -f

    ```


    提示


    你也可以在 Linux Docker 主机上直接更改目录和文件的所有权。唯一的挑战是需要 `root` 权限来更改映射到文件系统中 Docker 卷的目录。默认情况下，Docker
    卷创建在 `/var/lib/docker/volumes` 目录中。你可以对 `/var/lib/docker/volumes/sqldbdata/_data`
    目录运行相同的 `chown` 命令。你需要 `root` 权限才能执行此操作。


    1.  使用新名称 `sqldevlinuxcon02` 创建一个新的 SQL Server on Linux 容器，基于以非 `root` 用户身份运行的自定义
    SQL Server on Linux 镜像。将相同的卷 `sqldbdata` 挂载到这个新容器，并重用相同的端口号和主机名。


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevlinuxcon02 -d -h linuxsqldev01 --mount source=sqldbdata,target=/var/opt/mssql
    customsql2019-nonroot:v1.0

    ```


    请记住，一旦你升级——从 SQL Server 2017 到 SQL Server 2019——就无法回头。这与更新具有相同版本但不同 CU 的容器不同，如果事情没有按计划进行，你可以回滚到之前的版本。好的旧式、经过验证的备份确实是无可替代的。'
  raw: '## Non-root User and Docker Volumes


    In *Chapter* [*7*](#484552_1_En_7_Chapter.xhtml), we looked at storing SQL Server
    databases in Docker volumes for persisting data. But back then, the *root* user
    owns the directories created inside the Docker volume. Figure [10-11](#484552_1_En_10_Chapter.xhtml#Fig11)
    shows the directory structure and ownership of a SQL Server 2017 on Linux image
    running as *root* that leverages Docker volumes.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig11_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig11_HTML.jpg)


    Figure 10-11


    Filesystem ownership on Docker volume when container is run as root


    Following the steps outlined in *Chapter* [*7*](#484552_1_En_7_Chapter.xhtml)
    for performing a smart update or upgrade of a container that ran as *root* with
    another one that doesn’t, you will end up with a *Permission denied (13)* error
    as shown in Figure [10-12](#484552_1_En_10_Chapter.xhtml#Fig12). Not so smart
    after all, huh?


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig12_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig12_HTML.jpg)


    Figure 10-12


    Filesystem ownership error on Docker volume when a non-root container is run as
    root


    That’s because the *sqlservr* process inside the non-*root* container is trying
    to access the database files inside the Docker volume that the *root* user owns.
    It’s like running SQL Server on Windows with a specific Active Directory domain
    account and then changing that service account with another one that does not
    have read-write access to the system and user databases – SQL Server will not
    start.


    Tip


    If you’ve done this before and did not experience this issue, why are you granting
    the SQL Server service account administrator privileges? You’re supposed to restrict
    permissions of the SQL Server service account, not give it unlimited access. I’m
    sick and tired of seeing SQL Server service accounts running as Active Directory
    domain administrators. Don’t be one of those DBAs. Follow the guidelines in this
    Microsoft document to configure service accounts for SQL Server on Windows: [*https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/configure-windows-service-accounts-and-permissions?view=sql-server-ver15#Serv_Perm*](https://docs.microsoft.com/en-sus/sql/database-engine/configure-windows/configure-windows-service-accounts-and-permissions%253Fview%253Dsql-server-ver15%2523Serv_Perm).


    Now you know why the developer from the SQL Server team was running around talking –
    and apologizing – to the speakers at the PASS Summit doing talks on SQL Server
    on Linux containers. She knew it was a ticking time bomb. And she was right. Every
    speaker who demonstrated how to perform an in-place upgrade of a SQL Server on
    Linux container failed.


    The way to perform an in-place update or upgrade of a container running as *root*
    with another one that doesn’t is to first grant the non-*root* user permissions
    to the directories in the Docker volume. The following is the modified version
    of the steps to perform a smart in-place update or upgrade of a container. This
    assumes that you know the non-*root* user defined in the custom image.


    1.  Stop the container.


    2.  Assign ownership of the SQL Server directories and files inside the Docker
    volume to the non-*root* user.


    Before you proceed to update or upgrade the container, you need to set the non-*root*
    user as the new owner of the files inside the Docker volume. You can create a
    temporary container to do this assuming you don’t have *root* privileges to make
    changes to the directory mapped to the Docker volume. The following *docker run*
    command runs a container using the Alpine Linux image; attach the Docker volume
    and run a *chown* command to change directory and file ownership to the *mssql*
    user with a UID value of 10001\. I used the Alpine Linux image because it is very
    lightweight. Besides, I only need it to run the *chown* command. I used a UID
    value instead of a username in case it has not been created on the Linux Docker
    host. *sqldbdata* is the name of the Docker volume.


    ```

    #Run a temporary Alpine Linux container, mount the Docker volume,

    #and run the chown command

    docker run --name temp -d --mount source=sqldbdata,target=/data alpine chown -R
    10001:0 /data

    #Remove the temporary container

    docker rm temp -f

    ```


    Tip


    You can also change the ownership of the directories and files directly in the
    Linux Docker host. The only challenge is having *root* privileges to make changes
    to the directory mapped to the Docker volume in the filesystem. By default, Docker
    volumes are created in the */var/lib/docker/volumes* directory. You can run the
    same *chown* command against the */var/lib/docker/volumes/sqldbdata/_data* directory.
    You need *root* privileges to do this.


    1.  Create a new SQL Server on Linux container with a new name – *sqldevlinuxcon02* –
    based on the custom SQL Server on Linux image running as non-*root* user. Attach
    the same volume – *sqldbdata* – to this new container and reuse the same port
    number and hostname.


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevlinuxcon02 -d -h linuxsqldev01 --mount source=sqldbdata,target=/var/opt/mssql
    customsql2019-nonroot:v1.0

    ```


    Just remember that once you upgrade – from SQL Server 2017 to SQL Server 2019 –
    there’s no turning back. It’s not the same as updating a container with the same
    version but different CU where you can roll back to the previous one if things
    didn’t work out as planned. There’s really no substitute for good-old working
    and validated backups.'
