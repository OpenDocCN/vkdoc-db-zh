- fmt: '## Stitching Layers: Assembling the Image


    Once the filesystem layers are stored on disk and identifiers defined, the Docker
    daemon starts piecing them together to form a complete image. The manifest tells
    the Docker daemon which filesystem layers are needed to build the image and run
    a container. This is also where the storage driver works with the Docker daemon
    to build a unified view of the different filesystem layers. I’ll describe how
    this is done using the `overlay2` storage driver since this is the default storage
    driver on Linux.


    You’ve seen how the filesystem layers are stored as directories in the `/var/lib/docker/overlay2/`
    directory, named using their corresponding cache id. Recall the image in Figure
    [5-1](#484552_1_En_5_Chapter.xhtml#Fig1) where it displays the different filesystem
    layers that make up the SQL Server on Linux image. The lowest layer in the image
    contains the following:


    *   A file named `link`. This contains the symbolic link between the cache id
    value and the directory containing the contents of the layer.

    *   A directory named `diff`. This contains the contents of the layer.


    The next and succeeding layers in the image also contain the following in addition
    to the `link` file and `diff` directory:


    *   A file named `lower`. This file contains the symbolic link to the layer below
    it (parent).

    *   A directory named `merged`. A view that contains the unified contents of itself
    and the layer below it. This directory gets created under a new directory that
    represents the read-write layer (container), not the read-only filesystem layer.

    *   A directory named `work`. A directory that `overlay2` uses internally.


    Also, Windows does not have an `l` folder. The folders in the `C:\ProgramData\docker\windowsfilter`
    are the cache id values themselves, not symbolic links. Plus, everything else
    about the filesystem structure is the same – except they are on `C:\ProgramData\docker\`.


    ### How a Union FileSystem Works


    To better understand how Docker leverages the storage driver to build the image,
    let’s use the `mount` command to create directories as layers and “mount” them
    as a union filesystem layer. First, create the directories – `lower`, `diff`,
    `merged`, `work`. Be sure you are logged in using your user account so you don’t
    mess around with any Docker-related files and folders. Run the following command
    to create the directories using the `mkdir` command:


    ```

    mkdir lower diff merged work

    ```


    Next, let’s create a file inside the `lower` directory. This directory will function
    as the lowest/base layer. Run the following command to create a file named `fileInLower.txt`
    with the provided text:


    ```

    echo "LOWER: This file is in the LOWER directory" > lower/fileInLower.txt

    ```


    Now, run the following `mount` command to unify the directories we created:


    ```

    sudo mount -t overlay -o lowerdir=lower,upperdir=diff,workdir=work none merged

    ```


    We’re using the `overlay` filesystem type and the `merged` directory as the location
    of the unified view. Since we are not mounting any device but a directory, we
    use `none` as a placeholder. To verify, run the following command to display the
    mount that you just created as shown in Figure [5-19](#484552_1_En_5_Chapter.xhtml#Fig19):


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig19_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig19_HTML.jpg)


    Figure 5-19: Properties of the newly created mount


    ```

    mount | grep overlay

    ```


    You now have a file in the `lower` directory and a `merged` directory that displays
    a unified view of all directories. It’s time to test out the union filesystem.
    Create a new file in the `merged` directory.


    ```

    echo "MERGED: This file is in the MERGED directory" > merged/fileInMerged.txt

    ```


    When you browse the contents of the `merged` directory, you will see the file
    you created in the `lower` directory and the one you just created in the `merged`
    directory, as shown in Figure [5-20](#484552_1_En_5_Chapter.xhtml#Fig20).


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig20_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig20_HTML.jpg)


    Figure 5-20: Union filesystem in action


    This is just one aspect of how a unified filesystem works and how Docker leverages
    it to create a read-write filesystem layer for the container. You still have other
    aspects like working with read-only filesystem layers and working with multiple
    filesystem layers. A great resource on how OverlayFS works and how Docker leverages
    it to build images based on filesystem layers can be found here: [*http://blog.programster.org/overlayfs*](http://blog.programster.org/overlayfs).'
