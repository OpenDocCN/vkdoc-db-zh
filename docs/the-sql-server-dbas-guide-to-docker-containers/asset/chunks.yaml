- fmt: '## Working with and Exposing Ports: Running Multiple SQL Server Instances
    on Linux via Containers


    We’ve been using the ``-p`` parameter of the ``docker run`` command since the
    earlier chapters of this book. In ``Chapter`` [``10``](#484552_1_En_10_Chapter.xhtml),
    we also covered the purpose of the ``EXPOSE`` instruction in the ``Dockerfile``.
    The way the application inside the container is accessed from either outside of
    the container or locally from the Docker host is by using the ``-p`` parameter
    of the ``docker run`` command, which maps the port number of the container to
    the port number of the host. If we don’t do this, the container will only be accessible
    to other containers connected to the same Docker network – the ``bridge`` network.
    Think about that for a second. Every SQL Server container we’ve created throughout
    the book is attached to the ``bridge`` network by default. And we’ve only been
    creating a single container up until ``Chapter`` [``10``](#484552_1_En_10_Chapter.xhtml)
    when we created multi-container apps. If we didn’t provide the ``-p`` parameter
    with every ``docker run`` command that we used, our SQL Server instances will
    be totally isolated – and useless. The container may have been listening on port
    1433, but there’s no way we can access it remotely if the port isn’t published
    on the Docker host. Although from a security standpoint, it’s the most secure
    SQL Server instance. You just won’t be able to use it.


    Port mapping is a great way to publish a container to other services and apps
    on external networks. However, you’ll see a lot of articles and blog posts telling
    you not to do port mapping because it isn’t scalable. Once a port on the host
    has already been mapped to a container, it will no longer be available to other
    containers. And while you have port numbers between 1024 and 65535, you must explicitly
    define the port numbers if you want to connect to a remote container instead of
    just leveraging the default values. An example of this is when you’re running
    a web app in a container. Ports 80 and 443 are the default port numbers for connecting
    to a web app via HTTP or HTTPS, respectively. If you run multiple web app containers
    on a single Docker host, you need to map the other containers to different, nonstandard
    port numbers. And ordinary people like me may or may not be aware of those nonstandard
    port numbers.


    The same is true with SQL Server. People working with SQL Server know that they
    can access it via port 1433. Application connection strings use the default port
    number, hence why you rarely see a connection string that explicitly defines a
    port number. But it is also true that people working with SQL Server are aware
    of named instances and how they leverage nonstandard port numbers. In fact, while
    Microsoft does not support running multiple SQL Server instances on Linux, the
    way you work around that limitation is by running multiple SQL Server containers
    on a Docker host, mapping each one of them to a different port number. The following
    is an example of running two SQL Server containers on the same Linux Docker host
    where one uses the default port 1433 while the other uses port 5000. I’ve highlighted
    the use of the ``-p`` parameter to illustrate this.


    ```

    docker run -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=y0urSecUr3PAssw0rd'' -p 1433:1433
    --name sql-linuxcon01 -d -h linuxsql01 mcr.microsoft.com/mssql/server:2017-latest

    docker run -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=y0urSecUr3PAssw0rd'' -p 5000:1433
    --name sql-linuxcon02 -d -h linuxsql02 mcr.microsoft.com/mssql/server:2017-latest

    ```


    For people working with SQL Server, this is normal. We can run as many SQL Server
    instances as we want (well, technically, the maximum supported is 50) on the same
    host by leveraging named instances. In fact, this is how a lot of customers reduced
    their licensing costs prior to virtualization. The same concept that made running
    multiple SQL Server instances possible on a single host is how we can run multiple
    SQL Server instances on a Linux host – via containers and port mapping. Even better,
    you’re no longer limited to a maximum of 50 SQL Server instances on the same host.
    You can run as many as there are ports and resources available on your Docker
    host.'
  raw: '## Working with and Exposing Ports: Running Multiple SQL Server Instances
    on Linux via Containers


    We’ve been using the *-p* parameter of the *docker run* command since the earlier
    chapters of this book. In *Chapter* [*10*](#484552_1_En_10_Chapter.xhtml), we
    also covered the purpose of the *EXPOSE* instruction in the *Dockerfile*. The
    way the application inside the container is accessed from either outside of the
    container or locally from the Docker host is by using the *-p* parameter of the
    *docker run* command, which maps the port number of the container to the port
    number of the host. If we don’t do this, the container will only be accessible
    to other containers connected to the same Docker network – the *bridge* network.
    Think about that for a second. Every SQL Server container we’ve created throughout
    the book is attached to the *bridge* network by default. And we’ve only been creating
    a single container up until *Chapter* [*10*](#484552_1_En_10_Chapter.xhtml) when
    we created multi-container apps. If we didn’t provide the *-p* parameter with
    every *docker run* command that we used, our SQL Server instances will be totally
    isolated – and useless. The container may have been listening on port 1433, but
    there’s no way we can access it remotely if the port isn’t published on the Docker
    host. Although from a security standpoint, it’s the most secure SQL Server instance.
    You just won’t be able to use it.


    Port mapping is a great way to publish a container to other services and apps
    on external networks. However, you’ll see a lot of articles and blog posts telling
