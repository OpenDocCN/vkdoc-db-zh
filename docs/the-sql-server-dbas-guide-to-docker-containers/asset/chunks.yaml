    instance remotely (I’ll cover this in more detail in the next section). I thought
    it was due to firewall ports not being opened. So, I did the usual PING and TELNET
    tests. Zilch. I can connect to port 1433 for a while, but after a few minutes,
    the port was no longer responding. I checked if the container was still running,
    and I noticed that it terminates and exits after a few minutes. That got me curious
    about what’s really going on. After reading the logs, I saw the SQL Server error
    message shown in Figure [4-17](#484552_1_En_4_Chapter.xhtml#Fig17).


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig17_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig17_HTML.jpg)


    Figure 4-17


    SQL Server error log from the container logs


    I spent hours trying to figure out why the container would terminate immediately
    after running only to find out that my *sysadmin* password did not meet the password
    policy.


    Similarly, the use of special characters that may mean something to your shell
    environment like PowerShell or SSH can potentially cause issues, especially when
    used with single quotes instead of double quotes like the following example:


    ```

    docker run -e ''SA_PASSWORD=$Qlu=j&Q7a0N'' ...

    ```


    I wrote a simple PowerShell script years ago that generates complex passwords.
    Occasionally, the script would generate a password that starts with a special
    character, one that means something to the shell environment that I was using.
    Here’s one of the passwords I used to create a SQL Server on Linux container.
    Note that it starts with the $ character.


    ```

    $Qlu=j&Q7a0N

    ```


    Because the $ character has a special meaning in both PowerShell and Linux (the
    $ character represents a variable expression), it was interpreted as a variable
    expression when passed as a value in the *SA_PASSWORD* environment variable. It
    also failed SQL Server’s password policy requirements.


    Last is the assigning of names to containers using the *--name* parameter . Not
    only is it a good practice to properly name your containers, it also avoids scrambling
    around trying to figure out what container *cranky_haslett* is and what is it
    for. I ran the *hello-world* container several times on my Linux host to show
    the different names that the system automatically generated. If not for the image
    name, there’s no way I can figure out what *relaxed_sammet* container is. Refer
    to Figure [4-18](#484552_1_En_4_Chapter.xhtml#Fig18) for a list of really interesting
    system-generated names.


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig18_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig18_HTML.jpg)


    Figure 4-18


    System-generated Docker container names


    If you’re curious about how Docker generates these names, refer to the source
    code at [*https://github.com/moby/moby/blob/master/pkg/namesgenerator/names-generator.go*](https://github.com/moby/moby/blob/master/pkg/namesgenerator/names-generator.go).
    There’s no reason to not have fun doing your job.'
  trans: '

    ## 需要考虑的事项


    通过运行几条命令就能在 Windows 和 Linux 容器上轻松拉取并运行一个 SQL Server，这种感觉是不是很棒？确实如此。但请不要过于兴奋。使用像
    Docker 这样的新环境也带来了新的挑战，你需要对此有所了解。


    ### 许可证


    第一个问题是许可证。我无意冒充许可专家，但我处理 SQL Server 许可事务已有多年，深知如何谈论它。你可能想知道你拉取的镜像中运行的是哪个版本的 SQL
    Server。无论是名称还是标签都没有像 Windows 容器版的 SQL Server 那样明确指出。该镜像默认是免费的**开发者版**。对于任何测试或学习目的，我坚持使用免费版本——开发者版和
    Express 版。这样选择不会错。你可以通过在`docker run`命令中包含`MSSQL_PID`环境变量来选择其他版本，前提是你拥有这些版本的有效许可证。并且在生产环境中部署容器化的
    SQL Server 时，务必咨询你的 Microsoft 许可专家。他们对此有最终决定权。


    ### 密码复杂性


    第二个是`SA_PASSWORD`环境变量。`sysadmin`密码应满足[SQL Server 密码策略](https://docs.microsoft.com/en-us/sql/relational-databases/security/password-policy)中所述的复杂性要求。由于这是安装过程中的必需参数，不符合此策略将导致安装失败并使容器停止。


    我第一次运行前述命令在 Linux 容器上运行 SQL Server 时，就通过惨痛教训明白了这一点。运行`docker run`命令并期待其正常工作后，我无法弄清楚为什么不能远程连接到
    SQL Server 实例（我将在下一节更详细地讨论这一点）。我当时以为是防火墙端口未开放导致的。于是，我进行了常规的 PING 和 TELNET 测试。一无所获。我能够连接到
    1433 端口一小会儿，但几分钟后，该端口就不再响应了。我检查了容器是否仍在运行，发现它在几分钟后就终止并退出了。这激起了我的好奇心，想知道到底发生了什么。查看日志后，我看到了如图
    4-17 所示的 SQL Server 错误消息。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig17_HTML.jpg](img/484552_1_En_4_Fig17_HTML.jpg)

    *图 4-17：来自容器日志的 SQL Server 错误日志*


    我花了几个小时试图弄清楚为什么容器一运行就终止，最终才发现我的`sysadmin`密码不符合密码策略。


    同样，使用对你的 shell 环境（如 PowerShell 或 SSH）有特殊含义的特殊字符，尤其是像下面的示例那样使用单引号而非双引号时，也可能导致问题：


    ```

    docker run -e ''SA_PASSWORD=$Qlu=j&Q7a0N'' ...

    ```


    几年前我写了一个简单的 PowerShell 脚本来生成复杂密码。偶尔，该脚本会生成一个以特殊字符开头的密码，这个字符在我使用的 shell 环境中有特殊含义。以下是我曾用于创建
    Linux 容器版 SQL Server 的其中一个密码。注意它以`$`字符开头。


    ```

    $Qlu=j&Q7a0N

    ```


    因为`$`字符在 PowerShell 和 Linux 中都有特殊含义（`$`字符代表变量表达式），当它作为`SA_PASSWORD`环境变量的值传递时，会被解释为变量表达式。它也不符合
    SQL Server 的密码策略要求。


    ### 容器命名


    最后是使用`--name`参数为容器分配名称。为容器恰当命名不仅是一个好习惯，也能避免四处忙乱地试图弄清楚`cranky_haslett`这个容器是什么以及它的用途。我在
    Linux 主机上多次运行了`hello-world`容器，以展示系统自动生成的不同名称。如果不是镜像名称，我根本无法弄清楚`relaxed_sammet`容器是什么。关于一些非常有趣的系统生成名称列表，请参考图
    4-18。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig18_HTML.jpg](img/484552_1_En_4_Fig18_HTML.jpg)

    *图 4-18：系统生成的 Docker 容器名称*


    如果你对 Docker 如何生成这些名称感到好奇，请参考其源代码：[`github.com/moby/moby/blob/master/pkg/namesgenerator/names-generator.go`](https://github.com/moby/moby/blob/master/pkg/namesgenerator/names-generator.go)。没有理由不在工作中寻找乐趣。

    '
- fmt: '## 远程连接 SQL Server 实例


    我通常不喜欢在生产服务器上安装任何不必要的客户端工具。事实上，自从 Windows Server Core 开始支持 SQL Server 数据库引擎以来，我就一直试图说服我的客户在上面安装它（虽然成功案例很少，但我至少尝试过）。我的目标是尽可能缩小服务器的暴露面，并阻止人们直接登录到服务器。这减少了攻击面，并最大限度地减少了人为错误和管理开销。我数不清有多少次，有人因为误以为自己登录的是测试服务器而不小心重启了生产服务器——或者有人使用专用的终端服务会话来运行一个简单的查询，从而阻止了其他管理员登录。


    我的做法是，在一台客户端工作站上安装所有管理服务器所需的客户端工具——远程服务器管理工具（RSAT）、TELNET 客户端、SFTP 客户端、SQL Server
    Management Studio 等等。然后使用这台客户端工作站远程连接并管理服务器。此外，企业应用的部署通常也是如此，客户端远程连接到服务。


    在单服务器部署中，连接到容器的最简单方法是利用 Docker 主机的 IP 地址或 DNS 名称（如果你有 DNS 服务器）。你在使用 `docker run`
    时用到的 `-p` 参数，允许你使用 Docker 主机的 IP 地址远程访问容器，并将 Docker 主机上的指定端口映射到容器上的指定端口。在示例的 `docker
    run` 命令中，我们将主机的 1433 端口映射到容器的 1433 端口。


    要找出主机的 IP 地址，你可以运行：


    *   Windows 上运行 `ipconfig`

    *   CentOS 或 Ubuntu 上运行 `ip addr`


    在尝试连接到容器内的 SQL Server 实例之前，先进行基本的网络测试，比如 PING 和 TELNET。我总是从这两个测试开始，以确保连接问题与 SQL
    Server 无关。我不想浪费大量时间排查 SQL Server 问题，结果却发现是端口被防火墙规则阻止了。如果 PING 测试没有得到响应，我并不会总是假设服务宕机了。也可能只是网络管理员作为其安全策略的一部分禁用了
    ICMP 响应。对 SQL Server 端口号进行 TELNET 测试会告诉我 SQL Server 是否正在监听。只有当我没有收到“无法打开到主机的连接”这样的错误消息时，我才会继续使用客户端应用程序进行测试。


    启动 SQL Server Management Studio，使用你指定的 IP 地址和 `sysadmin` 凭据连接到 SQL Server Docker
    容器。图 4-19 显示了一个简单查询的结果，用于显示实例名称和 SQL Server 版本。我在运行查询时使用了 SQLCMD 模式，这样在连接到远程 SQL
    Server 实例时就不必不断提供实例名称和凭据。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig19_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig19_HTML.jpg)

    **图 4-19**

    使用 SSMS 远程连接到容器上的 SQL Server


    回想一下 `-h` 参数的用途，它用于反映服务器主机名——服务器主机名就是默认 SQL Server 实例的实例名称。此外，可用的 SQL Server on
    Linux 容器运行在 Ubuntu Linux 16.04.6 LTS 上，即使你的 Docker 主机是 CentOS Linux 7。


    一旦你进入 SQL Server Management Studio，用户体验就是相同的。你不必在命令行中操作，也不必学习所有新的 SQL Server 命令行工具。你可以在一个熟悉的环境中，舒适地执行所有你曾经做过的管理任务。


    ## 容器的生命周期


    运行 `hello-world` 容器让你对其生命周期有了一个简单的概述——从创建、执行到终止。请记住，容器只有在内部的主要进程仍在运行时才会存在——这就是为什么
    `hello-world` 容器在屏幕上打印完整文本后立即退出。


    一个容器会经历以下不同的状态，当你运行 `docker ps -a` 时，可以在 `STATUS` 列中看到它们：


    *   `Created`：当你使用 `docker create` 命令创建了一个容器但尚未运行它时，就是这个状态，可能是为稍后运行做准备。

    *   `Running`：容器正在启动并运行，执行其任务。

    *   `Exited`：容器已经经过了 `RUNNING` 状态并完成了任务。由于其内部的主要进程不再运行，容器退出。

    *   `Paused`：当你选择使用 `docker pause` 命令暂停一个正在运行的容器时的状态，这会挂起容器中所有正在运行的进程。

    *   `Restarting`：一种容器状态，表示已配置了重启策略。你可以将其视为服务器重启，这是我们不希望 SQL Server 容器发生的事情。

    *   `Dead`：当 Docker 守护进程尝试停止容器但失败时的状态。


    可以认为运行 `docker run` 命令是运行 `docker create` 命令和 `docker start` 命令的组合。假设你想对 `hello-world`
    容器分别使用 `docker create` 和 `docker start` 命令：


    ```

    docker create hello-world

    ```


    与 `docker run` 命令类似，这将返回容器 ID 值。你将这个值作为参数传递给 `docker start` 命令，包括 `-a` 参数，以将容器的输出附加到你的终端控制台。我通常在
    `docker` 命令中只传递容器 ID 的前 12 个字符。图 4-20 展示了运行 `docker create` 和 `docker start` 作为运行
    `docker run` 的替代方法。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig20_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig20_HTML.jpg)

    **图 4-20**

    运行 `docker create` 和 `docker start` 命令


    ```

    docker start -a 3df6324e4c12

    ```


    我很少单独使用这两个命令，而只是依赖 `docker run` 命令来创建和运行容器。


    容器的状态与虚拟机（VM）经历的不同状态相似——你可以随时启动、停止或暂停它们。而且很像虚拟机，当你停止容器时，运行在其中的进程也会变得不可用。容器及其关联的数据会保留在
    Docker 主机的文件系统中，直到你显式移除它。移除容器并不会移除镜像。回想一下，容器是镜像的运行时实例。你可以从参考镜像中创建、启动、停止和移除任意数量的容器——这不会影响镜像本身。你可以从
    Docker 主机删除该镜像。这样做会触发 Docker 守护进程在你决定再次运行它时，从配置的容器镜像仓库中拉取该镜像。我们将在第 5 章更详细地介绍镜像和容器的内部原理。'
  raw: '## Connecting to the SQL Server Instance Remotely


    I don’t like installing anything unnecessary on production servers, including
    client tools. In fact, I try to convince my customers to install the SQL Server
    database engine on Windows Server Core since the day it became supported (I have
    very few successes but at least I tried). My goal is to minimize the surface area
    of the servers and prevent people from logging in directly to them. This reduces
    the attack surface and minimizes human error and administrative overhead. I can’t
    count the number of times somebody accidentally rebooted a production server because
    they thought they were logged in to a test server – or somebody using the dedicated
    Terminal Services session to run a simple query and preventing other administrators
    from logging in.


    What I do is install all the client tools I need to manage servers – Remote Server
    Administration Tools (RSAT), TELNET client, SFTP client, SQL Server Management
    Studio, and so on – on a client workstation. Use the client workstation to connect
    to and manage servers remotely. Besides, this is how you’ll deploy enterprise
    applications anyway, with the client remotely connecting to the service.


    In a single server deployment, the simplest way to connect to the container is
    to leverage the IP address or the DNS name (if you have a DNS server) of the Docker
    host. The *-p* parameter you used with *docker run* allows you to use the Docker
    host’s IP address to access the container remotely and maps the specified port
    on the Docker host to the specified port on the container. In the example *docker
    run* command, we’re mapping port 1433 on the host to port 1433 on the container.


    To find out the IP address of the host machine, you could run


    *   `ipconfig` on Windows


    *   `ip addr` on CentOS or Ubuntu


    Before attempting to connect to the SQL Server instance inside the container,
    perform basic networking tests like PING and TELNET. I always start with these
    two to make sure connectivity issues have nothing to do with SQL Server. I don’t
    want to waste a lot of time troubleshooting SQL Server only to find out that a
    port has been blocked by a firewall rule. If I don’t get a response from a PING
    test, I don’t always assume that the service is down. It might just be that the
    network administrators have disabled ICMP responses as part of their security
    policy. A TELNET test on the SQL Server port number would tell me if SQL Server
    is listening. If I don’t get a “could not open a connection to the host” error
    message, that’s the only time I proceed to test using a client application.


    Launch SQL Server Management Studio and connect to the SQL Server Docker container
    using the IP address and the *sysadmin* credentials you specified. Figure [4-19](#484552_1_En_4_Chapter.xhtml#Fig19)
    shows the results of a simple query to display the instance name and SQL Server
    version. I used SQLCMD mode when running queries so I don’t have to constantly
    provide instance names and credentials when connecting to remote SQL Server instances.


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig19_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig19_HTML.jpg)


    Figure 4-19


    Connecting remotely to SQL Server on containers using SSMS


    Recall the use of the *-h* parameter to reflect the server hostname – the server
    hostname is the instance name of a default SQL Server instance. Also, the available
    SQL Server on Linux container runs on Ubuntu Linux 16.04.6 LTS, even when you’re
    running CentOS Linux 7 as your Docker host.


    Once you’re inside SQL Server Management Studio, the user experience is the same.
    You don’t have to be in the command line or learn all the new SQL Server command-line
    tools. You can perform all the management tasks you’ve ever done in the comforts
    of a familiar environment.


    ## Lifecycle of a Container


    Running the *hello-world* container gave you a little bit of an overview of its
    lifecycle – from creation to execution to termination. Keep in mind that a container
    only exists so long as the primary process inside it is still running – hence,
    why the *hello-world* container exited the moment it has printed the entire text
    it did on your screen.


    A container goes through these different states, each of which can be seen in
    the *STATUS* column of when you run `docker ps -a`:


    *   *Created*: This is when you create a container using the *docker create* command
    but not run it, maybe in preparation for running it later.


    *   *Running*: This is when the container is up and running, doing its job.


    *   *Exited*: This is when a container has gone through a RUNNING state and completed
    its job. Since the primary process inside it is no longer running, the container
    exits.


    *   *Paused*: This is when you choose to pause a running container using the *docker
    pause* command, suspending all running processes in the container.


    *   *Restarting*: A container state where a restart policy has been configured.
    You can think of it as a server reboot, something that we don’t want for our SQL
    Server containers.


    *   *Dead*: This is when the Docker daemon attempted to stop a container but failed.


    Think of running the *docker run* command as a combination of running the *docker
    create* command and *docker start* command. Let’s say you want to use both the
    *docker create* and *docker start* command for the *hello-world* container:


    ```

    docker create hello-world

    ```


    Like the *docker run* command, this will return the container ID value. You pass
    this as a parameter to the *docker start* command, including the *-a* parameter,
    to attach the output of the container to your terminal console. I usually just
    pass the first 12 characters of the container ID in my *docker* commands. Figure
    [4-20](#484552_1_En_4_Chapter.xhtml#Fig20) shows running *docker create* and *docker
    start* as an alternative to running *docker run*.


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig20_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig20_HTML.jpg)


    Figure 4-20


    Running docker create and docker start commands


    ```

    docker start -a 3df6324e4c12

    ```


    I rarely use these two commands separately and just rely on the *docker run* command
    for creating and running containers.


    Container states are similar to the different states that virtual machines (VM)
    go through – you can start, stop, or pause them whenever you like. And much like
    VMs, the processes running inside a container become unavailable when you stop
    the container. The container remains – together with the data associated with
    it – in the filesystem of the Docker host until you explicitly remove it. Removing
    the container does not remove the image. Recall that a container is a runtime
    instance of the image. You can create, start, stop, and remove as many containers
    as you want from the reference image – it’s not going to affect the image. You
    could delete the image from the Docker host. Doing so will trigger the Docker
    daemon to pull the image from the configured container registry when you decide
    to run it again. We’ll cover the internals of images and containers in more detail
    in *Chapter* [*5*](#484552_1_En_5_Chapter.xhtml).'
