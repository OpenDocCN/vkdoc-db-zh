- fmt: 'Alongside the launch of SQL Server on Linux came another technological innovation
    already emerging: the container technology. While originally designed for the
    Linux operating system, containers solve a unique business problem that every
    IT organization has: reliably run software when moved from one computing environment
    to another. Imagine upgrading or migrating from a physical machine to another
    physical machine or to a virtual machine or to a public cloud. Even moving code
    from a developer’s laptop to a production environment. I’m sure you’ve heard your
    developers say “but it worked in my laptop” more than a dozen times. Containers
    are here to eliminate these challenges.


    With both technologies already available, it’s not surprising to see Microsoft
    not only support SQL Server on Linux running in container technologies but also
    leverage it in their own internal development and build processes. It’s only a
    matter of time when SQL Server on Linux running on containers becomes more common
    than the SQL Server on Windows that we’ve known for the past two-and-a-half decades.


    And that’s the goal of this book. SQL Server database administrators and developers
    like yourself who have been working with SQL Server for a while already know a
    thing or two about the relational database engine . You already know how SQL Server
    stores data on data pages, how indexes speed up (or not) queries, and how it achieves
    high availability. I want you to take the same knowledge and experience as you
    prepare yourself for the next wave of technological innovation in container technologies.
    Imagine you’re on a journey and this book will be your guide, each chapter laying
    out steps along the way toward your final destination.


    ## How This Book Is Structured


    This book consists of 11 chapters with an Appendix and is structured in the following
    way:


    *   Chapter [`1`](#484552_1_En_1_Chapter.xhtml) introduces you to container technologies,
    a bit of a history of how it started and how Microsoft adopted it for the Windows
    Server operating system as well as SQL Server on Linux.


    *   Chapter [`2`](#484552_1_En_2_Chapter.xhtml) walks you through how to configure
    a Windows Server operating system as a container host, allowing you to leverage
    your existing knowledge of Windows.


    *   Chapter [`3`](#484552_1_En_3_Chapter.xhtml) covers a bit of what you need
    to know to get started with the Linux operating system in preparation for configuring
    it to run as a container host.


    *   Chapter [`4`](#484552_1_En_4_Chapter.xhtml) covers the Docker ecosystem to
    better understand how container technologies work.


    *   Chapter [`5`](#484552_1_En_5_Chapter.xhtml) introduces you to Docker images
    and containers but with a focus on using them with SQL Server.


    *   Chapter [`6`](#484552_1_En_6_Chapter.xhtml) is where managing and administering
    containers come in, introducing the most common operational tasks that you need
    to perform when working with containers.


    *   Chapter [`7`](#484552_1_En_7_Chapter.xhtml) introduces the concept of persisting
    data with containers since SQL Server is designed to store and persist data.


    *   Chapter [`8`](#484552_1_En_8_Chapter.xhtml) covers a bit of working with SQL
    Server on Linux, the installation and management experience to get you started
    with administering SQL Server on Linux and, eventually, building custom SQL Server
    on Linux container images.


    *   Chapter [`9`](#484552_1_En_9_Chapter.xhtml) walks you through building a custom
    SQL Server on Windows container image that you can use for standardized deployments.


    *   Chapter [`10`](#484552_1_En_10_Chapter.xhtml) walks you through building a
    custom SQL Server on Linux container image.


    *   Chapter [`11`](#484552_1_En_11_Chapter.xhtml) covers a bit of Docker networking
    so you can better configure SQL Server on containers for interaction with other
    applications.


    I highly recommend that you start with the `Appendix` . While it is very easy
    nowadays to spin up a lab environment on a public cloud infrastructure such as
    Amazon AWS, Microsoft Azure, or Google Cloud Platform, I don’t want you to miss
    the experience of setting everything up from start to finish. I’m surprised to
    hear from senior SQL Server DBAs who have no experience installing a Windows Server
    operating system and configuring TCP/IP. There’s nothing wrong with that. But,
    oftentimes, it’s what determines whether an issue can easily be resolved or not.


    Plus, because the network infrastructure in public cloud environments is offered
    as a service, there are several layers that abstract what’s really going on. It
    can be very frustrating to try and test out something new in a safe environment
    only to find out that you wasted so many hours solving a problem that you have
    no control over or can only be solved by providing your credit card information.
    You’re here to learn container technologies, not get into financial debt.


    So, let’s get started and dive into the world of container technologies.


    ## Acknowledgments


    To my Creator, Jesus Christ. Your absolute belief in me compels me to believe
    in myself.


    To my parents. You should have told me earlier that I won’t be able to read my
    own handwriting. I should have invented a speech-to-text app years ago for people
    who don’t have a sense of humor.


    To my mom… who sent us to private school but couldn’t take us to McDonald’s. I
    wouldn’t be able to tell the stories in Chapters [`5`](#484552_1_En_5_Chapter.xhtml)
    and [`9`](#484552_1_En_9_Chapter.xhtml) if you could.


