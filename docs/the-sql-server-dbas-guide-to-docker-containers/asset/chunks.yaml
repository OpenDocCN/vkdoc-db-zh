    \ manage to release SQL Server on Linux given the very short timeframe?"
  trans: '

    ## 本章小结


    在本章中，我指出了在容器上运行 SQL Server 时需要注意的一些事项。虽然容器最初是为无状态应用设计的，旨在具备短暂性和不可变性，但通过使用 Docker
    卷将存储与计算解耦，使得容器能够运行像 SQL Server 这样的有状态应用。提供的示例展示了如何使用 Docker 卷存储 SQL Server 数据库，并利用它们执行诸如更新数据库引擎且停机时间最小化的运维任务。


    下一章，我将介绍如何在 Linux 上操作 SQL Server，为你创建自己的 Linux 版 SQL Server 镜像做准备。作为一名 SQL Server
    DBA，我将假定你已具备 Windows 上 SQL Server 如何运作的基础知识，因此我只会重点说明其在 Linux 上运作的关键差异。


    本章的结束语，我将引用 Oracle 留给 Neo 的那句话：“准时抵达彼处，你便有机会。” 当合适的时机来临，你的准备将为你铺平道路。


    ## 第 8 章：在 Linux 上操作 SQL Server


    > 策略繁多，原则寥寥；策略会变，原则永恒。

    >

    > ——约翰·C·麦克斯韦博士


    当租车公司的工作人员把钥匙递给我时，她简要地解释说，他们现在只有手动挡汽车了。她看到我拿着北美驾照，就假设我不会开手动挡车。我不得不讲述我 15 岁时，哥哥用一辆
    1986 年的铃木 Samurai 吉普车教我开车的故事。当我说起那辆吉普车时，她脸上顿时有了光彩——那是她小时候家里开的车。我猜，仅仅提到这辆吉普车就勾起了她与家人共度的奇妙童年回忆。


    她办完了手续，并指引我去停车场取车。当我走近那辆车时，我注意到有些奇怪。“为什么人们都走在街道的另一边？”我问自己。又或许，是因为在飞机上待了将近 12 个小时，我还在试图适应这座城市。“只是时差反应罢了，”我告诉自己。但当我拉开车门时，事情变得更加诡异——这是一辆右舵车。这时我才意识到，这根本不奇怪。我在英国，这里的人们靠道路的另一边行驶。这才是他们的常态。


    在道路的另一边开车，我其实没什么大问题。在新加坡生活三年半的经历，让我学会了如何应对在马路的另一边乘坐公交车、行走，甚至坐在汽车的副驾驶座上。“没什么大不了的，”我想，“能有多难？”我知道怎么开手动挡车，也知道如何在道路的另一边应对。我错了。开出那个停车场让我感觉自己又像个驾校学员了。熄火带来的挫败感，在即将驶近减速带时，在缓慢转弯时，甚至在启动汽车向前开时都会发生。你知道那种感觉吗？明明知道该怎么做——因为你这辈子都在这么做——却做不到？我花了大约两天时间才终于找到节奏，正常驾驶。我开始喜欢上这种感觉了。但是，然后，我就得还车了。


    如果你整个职业生涯都在与 SQL Server 打交道，我能理解你甚至不愿考虑在 Linux 上运行它的抵触心理。你整个职业生涯都建立在 Windows 之上——你的工作电脑和你管理的服务器都是如此。你熟悉各种快捷方式，你编写了脚本，你非常擅长解决问题（这就是为什么在家庭节日聚会上你总是那个技术支持）。我猜你正想着加入那成千上万只懂管理
    Windows 服务器的 IT 专业人士的退休大军。我并不怪你。大型企业在 Windows 服务器上运行着关键业务的 SQL Server 数据库。这已经占用了你大量时间。为什么要转向
    Linux？


    现实情况是，自微软在 2017 年宣布支持 SQL Server on Linux 以来，企业已经开始将其 SQL Server 数据库迁移到 Linux。鉴于
    Docker 最初就是为 Linux 操作系统开发的，下一步合乎逻辑的举措就是在 Docker 容器上运行 SQL Server。因此，当你还在犹豫是否要看一眼那个企鹅图标时，你的职业生涯将取决于它。


    本章涵盖在 Linux 上操作 SQL Server。我们将了解其架构和设置体验。我们将比较在 Windows 与 Linux 上运行 SQL Server
    的异同。我们还将编写简单的 Linux `bash` 脚本。本章的目标是让你深入理解如何创建一个可部署为容器的自定义 Linux 版 SQL Server
    镜像。我向你保证，这绝不会像在伦敦繁忙的街道上开手动挡车那样令人紧张和沮丧。


    ## SQL Server on Linux 架构


    在第 1 章中，我讲述了在年度微软 MVP 峰会的一个高管圆桌会议上，我如何了解到赫尔辛基项目的往事。在那次宣布之后，我立即开始提问，关于 `SQL Server`
    工程团队是如何成功完成将 `SQL Server` 移植到 `Linux` 这一几乎不可能的任务。我对 Oracle 的有限理解让我以为微软工程师必须重写整个代码库才能支持在
    `Linux` 上运行 `SQL Server`。此外，Oracle 对 Windows 和 Linux 使用不同的代码库。工程团队是如何在如此短的时间内成功发布
    Linux 版 `SQL Server` 的呢？

    '
- fmt: '### Project Drawbridge


    I like history. I wish I did when I was still in school. But history gives us
    an opportunity to learn from and possibly leverage the work that others have already
    done. So, I asked one of the engineers from the SQL Server team about how it all
    started. Over several bottles of our preferred beverages, he talked about `Project
    Drawbridge`, a research project within Microsoft that explored the concept of
    application sandboxing. While the project ran in 2011, the concept of application
    sandboxing isn’t new. Remember how the Unix V7 allowed processes to run in isolation
    back in 1979? That’s how old this concept is. The idea behind it is to limit (or
    isolate) the environment in which a certain code can execute. This project was
    designed to sandbox Windows-based applications. It addresses the same kind of
    problems that hypervisors solve but with a much lower overhead and disk footprint
    compared to a full-blown virtual machine. Think of it this way. You can download
    an application on the Internet and install it on your computer without it taking
    over your operating system. It’s the same concept behind running applications
    on mobile devices. And you can have the same user experience regardless of the
    device and the version of the operating system.


    `Project Drawbridge` combines two core technologies – the `library operating system`
    and a `picoprocess`. The `library operating system` is a collection of application
    programming interfaces (APIs) and dynamic link libraries (DLLs) that an application
    needs from the operating system in order to run. But instead of loading the entire
    copy of the operating system, only a refactored version of the operating system
    containing functions that the application needs is loaded and ran in the same
    address space (user mode vs. kernel mode). The reality is that while the Windows
    operating system provides a ton of features and functionalities, applications
    don’t necessarily need all of them. Think mini-Windows. The `picoprocess` is a
    process-based isolation container with a minimal kernel API surface. You can think
    of these two core technologies as condominium units inside a large apartment building.
    The condominium unit (`picoprocess`) has the utilities like electricity, water,
    and ventilation (`library operating system`) that a tenant (application) needs
    to live in that space. But the condominium unit cannot exist on its own. It must
    exist within the context of the apartment building (computer hardware plus operating
    system). Tenants can come and go without disturbing other tenants in the building.
    And it’s much faster for tenants to come and go within the condominium units instead
    of waiting for an entire apartment building to be built.


    The utilities tap into the main supply of the apartment building. But in order
    for the utilities to reach the apartment building, you need a central distribution
    system. Electrical distribution systems for electricity, pump and tank for water
    distribution, and centralized HVAC systems. This allows the owner of the apartment
    building to change to a different utility company should the need arise. Changing
    to a different utility company has minimal to no effect to the tenants other than
    maybe rate changes in their utility bills. In the context of `Project Drawbridge`,
    this is the `platform abstraction layer (PAL)`.


    Note


    I’m oversimplifying these concepts to avoid diving deep into the technical details
    of their implementation. My goal is not to explore the details of how operating
    systems work but rather to provide just enough information to explain how SQL
    Server on Linux was made possible given resources and time constraints. Two great
    resources on the high-level architecture of how the different pieces work together
    to make this work are the video `Drawbridge: A new form of virtualization for
    application sandboxing` on Channel 9 at [https://channel9.msdn.com/Shows/Going+Deep/Drawbridge-An-Experimental-Library-Operating-System](https://channel9.msdn.com/Shows/Going+Deep/Drawbridge-An-Experimental-Library-Operating-System)
    and the published research paper `Rethinking the Library OS from the Top Down`
    at [www.microsoft.com/en-us/research/wp-content/uploads/2016/02/asplos2011-drawbridge.pdf](http://www.microsoft.com/en-us/research/wp-content/uploads/2016/02/asplos2011-drawbridge.pdf).


    When you start to think about it, `Project Drawbridge` sounds a lot like containers.


    ### SQLOS and SQLPAL


    If you’ve been a SQL Server DBA for a while, you probably recall the significant
    change in the architecture between SQL Server 2000 and SQL Server 2005. Like other
    applications, SQL Server 2000 and earlier versions leveraged Windows for hardware
    resource management – things like thread scheduling, memory management, and I/O
    handling. Remember the famous `UMS.DLL` (SQL User Mode Scheduler DLL) file? This
    limited SQL Server’s ability to better handle hardware resources for scalability,
    especially given the advancements in hardware capabilities in the early 2000s.
    To take advantage of the hardware improvements for improved performance and scalability,
    the SQL Server engineering team decided to decouple that dependency on Windows
    for hardware resource management. Enter `SQLOS`.


    `SQLOS` is SQL Server’s attempt to bring the hardware resource management within
    its user mode process. It’s like SQL Server’s own `PAL` into Windows. `SQLOS`
    provides operating system services such as a non-preemptive scheduling, memory
    management, exception handling, and the like. You can read more about the introduction
    of `SQLOS` in SQL Server 2005 and the rationale behind it at [https://blogs.msdn.microsoft.com/slavao/2005/07/20/platform-layer-for-sql-server/](https://blogs.msdn.microsoft.com/slavao/2005/07/20/platform-layer-for-sql-server/).
    But while `SQLOS` provided abstraction into Windows, it’s still not a true operating
    system abstraction layer. `SQLOS` had to be rewritten in order to allow SQL Server
    to run on different operating systems other than Windows, making it a true `PAL`
    regardless of operating system.


    Luckily, the team working on `Project Drawbridge` already had a rough prototype
    ported on Linux. The idea to merge components that already existed in `Project
    Drawbridge` and `SQLOS` plus the rough prototype for Linux made porting SQL Server
    on Linux a reality given the limitations and constraints. Thank goodness they
    didn’t have to rewrite all the SQL Server source code written for the past two-and-a-half
    decades. What came out of that effort was an evolved version of `SQLOS`, combining
    the `library operating system` from `Project Drawbridge` together with `SQLOS`.
    They called it `SQL Platform Abstraction Layer (SQLPAL)`. This allowed the SQL
    Server team to utilize much of the executable SQL Server code written for Windows
    to run on Linux. They also created a `host extension layer`, an abstraction layer
    that interacts directly with the operating system. To make everything the same
    for both Windows and Linux, the team came up with a `host extension layer` for
    Windows and for Linux. I guess this was done to make it easy to maintain the source
    code for SQL Server regardless of the underlying operating system. Given all the
    details that make SQL Server on Linux possible, Figure 8-1 shows my interpretation
    of a very high-level diagram of the architecture. You will see similar diagrams
    available from the documentation, but I try my best to illustrate complexities
    using visuals so I can understand them better.


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig1_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    High-level architecture that made SQL Server on Linux a reality


    I’m sure Slava Oks and his team were not even thinking about porting SQL Server
    to Linux back in 2005 when they worked on `SQLOS`. It just magically happened.


    Tip


    Chapter 1 of the Apress book `Pro SQL Server on Linux` by Bob Ward covers this
    in more detail.'
