  trans: '

    ## Linux 文件系统中的重要目录


    要使用基于文件的操作系统，你需要了解文件系统的一些基础知识。这将帮助你正确导航和与目录及文件交互，以执行诸如移动文件、修改配置文件等任务。以下是 Linux
    文件系统中一些重要的目录列表：


    *   `/`：根目录。Linux 中的一切都位于此目录之下。它类似于 Windows 中的 `C:\` 目录。

    *   `/bin`：此目录包含系统管理员和非特权用户都使用的基本用户二进制程序（程序）。像 `cat`、`ls`、`rm` 等命令以及像 `bash` 这样的
    Shell 都位于此目录中。

    *   `/boot`：显然，此目录包含引导 Linux 系统所需的一切，除了引导时不需要的配置文件。

    *   `/dev`：此目录包含特殊文件或设备文件。我之前提到过，Linux 中的硬盘表示为设备文件，并存储在此目录中。

    *   `/etc`：此目录包含系统配置文件，被认为是你的 Linux 系统的指挥中心。你的 Linux 系统的行为和操作都存储在此目录的配置文件中。因此，请小心处理此目录中的文件，因为随意改动可能导致系统不稳定甚至无法启动。

    *   `/home`：此目录包含所有用户的 `home` 目录，类似于 Windows 中的 `C:\Users` 目录。当你登录 Linux 系统时，系统会在
    `/home` 目录下创建一个以你的用户名命名的目录，你对此目录拥有完全的、不受限制的访问权限。你的 `home` 目录也包含你的个人配置文件。

    *   `/lib`：此目录包含系统所需的有用库文件（供应用程序或系统正确执行时使用的文件）。

    *   `/media`：此目录包含可移动媒体（如 CD-ROM）的子目录。我确信你在服务器上已经好几年没用过这些东西了。

    *   `/opt`：此目录包含不属于默认安装的附加软件包。

    *   `/root`：这是 `root` 用户专用的 `home` 目录。注意，它不在 `/home` 目录中。

    *   `/sbin`：类似于 `/bin` 目录，但包含通常用于系统管理的基本二进制程序，通常需要 `root` 权限。

    *   `/srv`：此目录包含 Web 和 FTP 等服务的数据。与 SQL Server 无关。

    *   `/tmp`：此目录包含临时文件，通常在系统重启时被删除。

    *   `/usr`：此目录包含用户使用的应用程序和文件。

    *   `/var`：此目录包含可变数据，如系统日志文件、假脱机文件以及任何在 Linux 系统正常运行期间可能更改的内容。


    当你查看在 SQL Server 安装过程中创建的不同目录时，你会开始明白它们位置背后的目的。常见的有：


    *   `/opt/mssql/bin`：包含 SQL Server 二进制文件、`mssql-conf` 脚本以及其他用于处理 SQL Server 转储文件的脚本的目录。

    *   `/var/opt/mssql`：包含 SQL Server 数据和日志文件、secrets 以及 `mssql.conf` 配置文件的目录。`/opt`
    中软件包的可变数据必须安装在 `/var/opt/<子目录>` 中。因为 MDF、LDF、错误日志文件、扩展事件等都是 SQL Server 数据库引擎运行时随时间变化的可变数据。


    ## 文件权限


    Linux 中的文件权限在管理以及应用程序配置中扮演着重要角色。你已经看到，将权限提升到 `root` 允许你执行某些管理任务，甚至打开或修改文件。但是，如果你不知道
    `ls -l` 命令输出的含义，阅读它可能会让人不知所措。让我们从分析图 8-11 所示的 `/var/opt/mssql/` 和 `/opt/mssql/bin`
    目录的 `ls -l` 命令输出开始。注意使用 `sudo` 来列出 `/var/opt/mssql` 目录的内容。


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig11_HTML.jpg](img/484552_1_En_8_Fig11_HTML.jpg)


    图 8-11


    `ls -l` 命令的输出


    所有其他属性——`owner`（所有者）、`group`（组）、`file size`（文件大小）、`last modified`（最后修改时间）和 `filename`（文件名）——都容易理解。真正困扰我的是
    `mode`（模式）属性。它就像某种只有说克林贡语的人才能理解的代码。让我们更深入地分解 `mode` 属性，看看它如何影响文件和目录，如图 8-12 所示。


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig12_HTML.jpg](img/484552_1_En_8_Fig12_HTML.jpg)


    图 8-12


    文件和目录的模式属性


    `mode` 中的第一个字符代表类型。一个连字符 (`-`) 表示它是一个包含数据的普通文件，比如 `mssql.conf` 配置文件。一个 "d" 表示一个目录，比如
    `data`、`log` 和 `secrets` 目录。请记住，Linux 中的一切都是文件，甚至目录也是。特殊文件，例如目录，由非连字符字符（如字母）标识。回想一下
    *第* *5* *章* 中提到的符号链接文件，由 "l" 字符表示。


    `mode` 属性中的接下来三个字符代表用户权限。让我们看看我们可以分配给文件或目录的不同权限：


    *   `r`：读。对于文件，此权限允许用户读取内容。对于目录，此权限允许用户查看文件的名称。

    *   `w`：写。对于文件，此权限允许用户修改和删除文件。对于目录，`写`权限允许用户删除目录、修改其内容（在其中创建、删除和重命名文件）以及修改用户可读文件的内容。

    *   `x`：执行。对于文件，此权限允许用户执行文件（用户还必须具有读权限），应为可执行程序和脚本设置此权限。对于目录，此权限允许用户访问目录中的文件（包括其元数据）。


    参考图 8-12，`mssql` 用户对 `secrets` 目录拥有 `读`、`写` 和 `执行` 权限，但对 `mssql.conf` 文件只有 `读`
    和 `写` 权限（`mssql.conf` 文件是一个包含数据的普通文本文件，而不是像 `/opt/mssql/bin/mssql-conf` 文件那样的脚本）。


    `mode` 属性中的再接下来三个字符代表文件组所有者的权限。参考图 8-12，`mssql` 组（及其成员）对 `secrets` 目录拥有 `读` 和
    `执行` 权限，对 `mssql.conf` 文件拥有 `读` 和 `写` 权限。


    `mode` 属性中的最后三个字符代表所有其他用户的权限，通常称为其他用户。参考图 8-12，所有其他用户对 `secrets` 目录拥有 `读` 和 `执行`
    权限，但对 `mssql.conf` 文件只有 `读` 权限。

    '
- fmt: '# Assigning Permissions to Files and Directories


    Working with permissions means we also need to know the two most common commands
    that we need to use to assign appropriate permissions. `chown` (short for change
    owner) is the command to use when changing ownership of a file or directory. `chmod`
    (short for change mode) is the command to use to change the read, write, and execute
    permissions of a file or directory for owner, group, and others. The way to assign
    permissions with `chmod` involves two ways – the first one is by using alphanumeric
    characters (also known as symbolic mode) like the `r`, `w`, and `x`, while the
    second one is by using octal mode (and you thought you’ve escaped your basic computer
    science courses of converting decimal to octal).


    ## Changing Ownership and Group


    Refer to changing the default database backup directory. After creating the directory,
    you need to change its ownership to the `mssql` user. Since you were the one who
    created the directory in the first place, your user account (and the group you
    belong to) has ownership of it. You want the `mssql` user to have permissions
    to read and write to the new backup directory so your database backups won’t fail.
    Hence, the command is as follows:


    ```bash

    sudo chown mssql /tmp/dbbackup

    ```


    Here’s another useful command. The `chgrp` (short for change group) command changes
    the group ownership of files or directories. The following command changes the
    group ownership of the new backup directory to the `mssql` group:


    ```bash

    sudo chgrp mssql /tmp/dbbackup

    ```


    If you only change the ownership of a file or directory but not the group, there
    might be inconsistencies with permissions especially if the user account does
    not have the same permissions as the group. User accounts can be assigned more
    granular permissions, but doing so requires more work. There’s a reason why security
    groups in Windows exist. It is better to create a security group, assign permissions
    to it, and just add or remove users from the group. In the case of the `mssql`
    group, only the `mssql` user is in it and it makes sense to just assign the directory
    to both the user and the group for consistency.


    ## Assigning Execute Permissions


    Let’s get back to assigning permissions to files and directories. If you want
    to create a shell script named `automateSQLinstall.sh` that would automate and
    configure the installation of SQL Server on Linux, you need to assign the `execute`
    (`x`) permissions to the file using the (`+`) operator. Note that using the (`-`)
    operator will revoke permissions. The following command shows a simple way to
    do it:


    ```bash

    chmod +x automateSQLinstall.sh

    ```


    Doing so means granting your user account, the group you belong to, and all others
    the `execute` permissions. Figure 8-13 shows the effective permissions after assigning
    the `execute` permission to the file.


    ![Effective permissions before and after assigning the execute permission](images/484552_1_En_8_Chapter/484552_1_En_8_Fig13_HTML.jpg)


    Figure 8-13


    Let’s interpret the effective permissions on the file. The (`-`) symbol tells
    me that this is a normal file. Prior to running the `chmod +x automateSQLinstall.sh`
    command, the user and group named `emsarmiento` only has `read` and `write` permissions
    to the file. It does so because the user owns the file as a side effect of creating
    it. But if you notice, the user does not have an `execute` permission on the file.
    Unlike in Windows where a script with certain file extensions like `.vbs` or `.exe`
    is automatically marked for execution, file extensions on Linux don’t mean anything.
    You have to tell Linux that the file needs to be executed in order for a specific
    user to run it. After running the `chmod` command, the user and group named `emsarmiento`
    now has `read`, `write`, and `execute` permissions to the file. Also, Linux automatically
    assigns implicit permissions where applicable. The `other` group was granted `read`
    permission even though I only granted `execute` permission. That’s because a user
    needs to be able to read a file or directory before it can write to or execute
    it.


    A more explicit way to grant the `execute` permission to the file is shown in
    the following, with `u=user`, `g=group`, and `o=other`:


    ```bash

    chmod u+x,g+x,o+x automateSQLinstall.sh

    ```


    Or this one:


    ```bash

    chmod u=rwx,g=rwx,o=rx automateSQLinstall.sh

    ```


    Clearly, there are several ways to accomplish this goal. And this doesn’t even
    cover the octal mode yet. So, let’s continue.


    ## Using Octal Mode


    In octal mode, numbers represent permissions as shown in the following:


    *   4 = read

    *   2 = write

    *   1 = execute


    These values range from 0 to 7. Converting these numbers into their corresponding
    permissions:


    *   0 = `---`

    *   1 = `--x`

    *   2 = `-w-`

    *   3 = `-wx`

    *   4 = `r--`

    *   5 = `r-x`

    *   6 = `rw-`

    *   7 = `rwx`


    Each number from 0 to 7 can be assigned to the `user`, `group`, and `other` columns.
    If you want to assign the `execute` permission to the file, the following command
    accomplishes this using the octal mode:


    ```bash

    chmod 775 automateSQLinstall.sh

    ```


    > **Note:** This chapter is not intended to dive deep into the Linux filesystem
    and working with permissions. The topic alone requires an entire chapter in and
    of itself. The goal of this section is to provide a reference to how and why commands
    are used in this and other chapters. But as you can see, this topic is central
    to working with Linux. Remember, everything in Linux is a file and proper permissions
    need to be assigned for certain system processes and applications to run. You
    don’t want to be messing around with permissions in the `/var/opt` directory unless
    you know exactly what you’re doing. I highly recommend exploring some of the available
    Linux titles from Apress to dive deep into the Linux filesystem and managing permissions.'
