- fmt: '## Starting and Stopping Containers


    You’ve already had an experience running a container in Chapter 4. Using the `docker
    run` command is the fastest way to start a container. It pulls the image if it
    doesn’t yet exist in the local disk and starts it. The different parameters you
    pass to the `docker run` command determine how the container runs. We’ve already
    covered the most common parameters that you will use when running SQL Server on
    containers in Chapter 4 so just refer to those.


    A good practice is to pull all the images you need on your Docker host using the
    `docker pull` command so it doesn’t take time to run or start a container. Once
    pulled, you can pre-create containers using the `docker create` command. The following
    command creates a SQL Server on Linux container without running it. It’s almost
    the same command that we used in Chapter 4 but without the `-d` parameter (detached
    mode).


    ```

    docker create -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433
    --name sqldevlinuxcon01 -h linuxsqldev01 mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    You won’t see a created container just by running the `docker ps` command. You
    need to use the `-a` parameter with the `docker ps` command to display all the
    containers, regardless of their state. If you want to be more specific, you can
    use the `-f` parameter of the `docker ps` command to filter by specific conditions.
    The following command displays all created containers:


    ```

    docker ps -a -f status=created

    ```


    You can then use the following `docker start` command and just pass either the
    container name or the ID:


    ```

    docker start sqldevlinuxcon01

    ```


    Stopping a container is as easy as running the `docker stop` command and passing
    either the container name or the ID:


    ```

    docker stop sqldevlinuxcon01

    ```


    You might be tempted to run a `docker kill` command to kill a running container.
    Don’t. This is a SQL Server instance on a container we’re talking about, not just
    any random app. Recall that SQL Server must be properly shut down in order to
    commit or roll back all transactions, write all dirty pages to disk, and then
    write an entry in the transaction log. Running a `docker kill` command will prevent
    SQL Server from performing a clean shutdown and can potentially cause data loss
    or even worse, data corruption. A `docker stop` command will gracefully send a
    SIGTERM signal (request for termination) to the process running inside the container,
    in this case, SQL Server. It’s the proper way to shut down SQL Server on a Linux
    environment.


    Also, remember that stopping a container does not remove it from the Docker host.
    This is the reason why you cannot create another container with the same name.
    If you want to create another container with the same name that you used before,
    you need to delete it first.


    Tip


    You’re starting to see the benefit of using the `--name` parameter with the `docker
    run` command. We used the name of the container – sqldevlinuxcon01 – on both the
    `docker start` and `docker stop` commands instead of the container ID. This makes
    it easy to work with containers instead of relying on the system-generated IDs.
    When creating SQL Server containers, always use the `--name` parameter with the
    `docker run` command.


    A trick that you can use is to display all the containers and their corresponding
    container ID using the `-q` parameter as shown in the following command:


    ```

    docker ps -a -q

    ```


    You can then pass this to either the `docker start` or `docker stop` command to
    start or stop all containers, respectively, as shown in the following:


    ```

    docker start $(docker ps -a -q)

    ```


    ## Deleting Containers and Images


    If you want to clean up your Docker host, deleting old and unwanted containers,
    the `docker rm` command is what you need. However, you won’t be able to delete
    a running container. The container must be stopped first before you can delete
    it, as shown in the following command:


    ```

    docker stop sqldevlinuxcon01

    docker rm sqldevlinuxcon01

    ```


    There are a lot of examples on the Internet (and even the Docker documentation)
    that demonstrate the use of the `-f` parameter with the `docker rm` command to
    stop and delete a container at the same time. Avoid this temptation. Using the
    `-f` parameter with the `docker rm` command is like running a `docker kill` command
    and would cause SQL Server to abruptly terminate.


    Dealing with images is something else. Remember that containers are simply a read-write
    filesystem layer that sit on top of the image’s read-only filesystem layer, which
    means you can delete all the containers that are based on the image without affecting
    the image. However, when you delete an image, you will no longer be able to create
    a new container unless the image is made available on the Docker host by pulling
    it again from a repository. Similarly, you won’t be able to delete an image when
    it is in use by a running container. You have to stop and delete all of the containers
    using it before you can delete the image. The following commands show how to delete
    an image using the `docker rmi` command, following the sequence of events – from
    stopping and deleting a container to deleting the image:


    ```

    docker stop sqldevlinuxcon01

    docker rm sqldevlinuxcon01

    docker rmi mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    ## Interacting with Running Containers


    I mentioned in Chapter 4 that I’m not a big fan of logging in to servers and interacting
    with them directly. I would rather connect to them remotely unless I really need
    to for troubleshooting purposes – same thing with containers. But in case I really
    need to, I use the `docker exec` command. This allows me to run a command inside
    a running container. Let’s say I want to run a bash shell inside my existing SQL
    Server on Linux container so I can check the filesystem structure. Run the following
    `docker exec` command with the `-i` (interactive) and `-t` (pseudo-terminal) parameters,
    passing the command (`bash`) that you want to run. Figure 6-10 shows how the terminal
    changed from `CENTOSDOCKER01` (the name of my Linux Docker host) logged in as
    myself to `linuxsqldev01` (the name of the SQL Server on Linux container) logged
    in as root. I can now interactively work with the container from an operating
    system point of view.


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig10_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig10_HTML.jpg)


    Figure 6-10 Running bash on a running container


    ```

    docker exec -it sqldevlinuxcon01 bash

    ```


    Similarly, you can run the following command to run a PowerShell command shell
    inside a SQL Server on Windows container:


    ```

    docker exec -it sqldevwincon01 powershell

    ```


    In the past, terminating the bash or PowerShell shell will also terminate the
    container. Not anymore. However, it’s still a good practice to exit the interactive
    shell by pressing `Ctrl+PQ`.'
