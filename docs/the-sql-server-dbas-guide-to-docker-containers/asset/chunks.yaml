    ### 运行脚本


    由于脚本中的某些命令需要 `root` 权限，因此你必须以 `root` 权限来运行它。你可以在运行脚本前切换到 `root` 用户，或者使用 `sudo`
    来运行。我更倾向于使用 `sudo` 运行，这样可以避免在以 `root` 身份运行时误操作。


    运行以下命令来执行脚本。请注意，脚本文件名前带有 “`./`” 字符：


    ```bash

    sudo ./automateSQLinstall.sh

    ```


    其他人则会在脚本文件名前加上 `bash`，如下所示：


    ```bash

    sudo bash automateSQLinstall.sh

    ```


    我更喜欢第一个命令，因为它类似于在 Windows 上运行 PowerShell 脚本。


    另一种避免使用 `root` 权限运行的方法是，将脚本的所有权更改为 `root`，以避免密码提示。运行以下命令将脚本所有权更改为 `root` 并授予文件
    `execute` 权限：


    ```bash

    sudo chown root:root automateSQLinstall.sh

    sudo chmod 775 automateSQLinstall.sh

    ```


    现在，运行脚本，见证奇迹发生。图 8-14 展示了脚本执行后完成的所有配置设置。


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig14_HTML.jpg](img/484552_1_En_8_Fig14_HTML.jpg)


    图 8-14：验证脚本执行后的配置变更


    ### 向脚本传递参数


    虽然脚本能按预期工作，但我不喜欢在文件中硬编码密码的想法。任何能拿到脚本文件的人都可以读取 `sa` 登录的密码，这可能会危及 SQL Server 实例的安全。如果我们将
    `sa` 登录密码作为命令行参数传递给脚本，会怎样呢？


    像其他命令行脚本一样，bash 脚本也接受命令行参数。所有命令行参数都可以通过其位置编号使用 `$` 来访问。请看以下示例命令：


    ```bash

    sudo ./automateSQLinstall.sh mYSecUr3PAssw0rd enterprise

    ```


    这里我调用了 `automateSQLinstall.sh` 文件，并向它传递了两个命令行参数——`mYSecUr3PAssw0rd` 和 `enterprise`。你可能已经猜到，第一个参数是
    `sa` 登录密码，第二个是 SQL Server 版本。在脚本内部，可以使用它们的位置编号来访问这些参数值。`mYSecUr3PAssw0rd` 参数值可以通过
    `$1` 访问，而 `enterprise` 参数值可以通过 `$2` 访问。我可以使用以下代码片段在脚本内部将这些参数值声明为变量：


    ```bash

    #VARIABLES

    MSSQL_SA_PASSWORD=$1

    MSSQL_PID=$2

    ```


    然后，我可以使用命令行参数值，通过相应的环境变量来运行 `/opt/mssql/bin/mssql-conf` 脚本，如下所示：


    ```bash

    sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD /opt/mssql/bin/mssql-conf
    setup

    ```


    ### 在 Bash 脚本中添加条件逻辑


    既然我们正在使脚本动态化并传递命令行参数值，我们就需要验证用户输入。回想一下，安装 SQL Server 时 `sa` 登录密码是一个必需参数。我们将添加条件逻辑来评估用户是否提供了
    `sa` 登录密码的值。执行此操作的代码片段如下所示：


    ```bash

    #Check if the sa password string is null or has zero length

    if [ -z $MSSQL_SA_PASSWORD ]

    then

    echo Environment variable MSSQL_SA_PASSWORD must be set for unattended install

    exit 1

    fi

    ```


    一个简单的 `if...then` 条件语句评估 `$MSSQL_SA_PASSWORD` 参数值是否为 null 或长度为零。退出代码 `1` 会将脚本执行状态设置为失败，并导致其中止。验证
    `sa` 登录密码还有更多内容，例如复杂性要求，包括最小密码长度、大写、小写、非字母数字字符以及十进制数字的包含。这只是一个简单示例，用于验证用户是否为 `sa`
    登录密码提供了值。


    那么版本（edition）呢？由于我们最初为版本提供了一个环境变量，因此我们需要为其提供一个值。这意味着我们也需要评估用户是否在命令行参数中提供了值。以下代码片段展示了如何操作。这里，如果用户没有提供任何内容，我们会设置一个默认值——在本例中是开发者版（Developer
    Edition）：


    ```bash

    #Check if the edition parameter is null or has zero length

    if [ -z $MSSQL_PID ]

    then

    MSSQL_PID=Developer

    fi

    ```


    以下是一个针对 RHEL/CentOS Linux 系统的更新版脚本，其中包含了参数值和条件逻辑评估：


    ```bash

    #!/bin/bash

    # VARIABLES

    MSSQL_SA_PASSWORD=$1

    MSSQL_PID=$2

    if [ -z $MSSQL_SA_PASSWORD ]

    then

    echo Environment variable MSSQL_SA_PASSWORD must be set for unattended install

    exit 1

    fi

    if [ -z $MSSQL_PID ]

    then

    MSSQL_PID=Developer

    fi

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    sudo yum install -y mssql-server

    sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    sudo firewall-cmd --zone=public --add-port=1433/tcp --permanent

    sudo firewall-cmd --reload

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo mkdir /tmp/dbdata

    sudo chown mssql /tmp/dbdata

    sudo chgrp mssql /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    sudo systemctl restart mssql-server

    ```


    以下是 Ubuntu 中相应的脚本：


    ```bash

    #!/bin/bash

    #VARIABLES

    MSSQL_SA_PASSWORD=$1

    MSSQL_PID=$2

    if [ -z $MSSQL_SA_PASSWORD ]

    then

    echo Environment variable MSSQL_SA_PASSWORD must be set for unattended install

    exit 1

    fi

    if [ -z $MSSQL_PID ]

    then

    MSSQL_PID=Developer

    fi

    curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    sudo apt-get update

    sudo apt-get install -y mssql-server

    sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    sudo ufw --force enable

    sudo ufw allow 22/tcp

    sudo ufw allow 1433/tcp

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo mkdir /tmp/dbdata

    sudo chown mssql /tmp/dbdata

    sudo chgrp mssql /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    sudo systemctl restart mssql-server

    ```


    你现在可以像下面这样使用位置命令行参数来运行脚本：


    ```bash

    sudo ./automateSQLinstall.sh mYSecUr3PAssw0rd enterprise

    ```


    再次，坐好，放松，见证奇迹发生。

