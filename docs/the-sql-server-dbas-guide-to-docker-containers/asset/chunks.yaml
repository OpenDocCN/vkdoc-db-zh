    the image. However, when you delete an image, you will no longer be able to create
    a new container unless the image is made available on the Docker host by pulling
    it again from a repository. Similarly, you won’t be able to delete an image when
    it is in use by a running container. You have to stop and delete all of the containers
    using it before you can delete the image. The following commands show how to delete
    an image using the *docker rmi* command, following the sequence of events – from
    stopping and deleting a container to deleting the image:


    ```

    docker stop sqldevlinuxcon01

    docker rm sqldevlinuxcon01

    docker rmi mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    ## Interacting with Running Containers


    I mentioned in *Chapter* [*4*](#484552_1_En_4_Chapter.xhtml) that I’m not a big
    fan of logging in to servers and interacting with them directly. I would rather
    connect to them remotely unless I really need to for troubleshooting purposes –
    same thing with containers. But in case I really need to, I use the *docker exec*
    command. This allows me to run a command inside a running container. Let’s say
    I want to run a bash shell inside my existing SQL Server on Linux container so
    I can check the filesystem structure. Run the following *docker exec* command
    with the *-i* (interactive) and *-t* (pseudo-terminal) parameters, passing the
    command (bash) that you want to run. Figure [6-10](#484552_1_En_6_Chapter.xhtml#Fig10)
    shows how the terminal changed from *CENTOSDOCKER01* (the name of my Linux Docker
    host) logged in as myself to *linuxsqldev01* (the name of the SQL Server on Linux
    container) logged in as root. I can now interactively work with the container
    from an operating system point of view.


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig10_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Running bash on a running container


    ```

    docker exec -it sqldevlinuxcon01 bash

    ```


    Similarly, you can run the following command to run a PowerShell command shell
    inside a SQL Server on Windows container:


    ```

    docker exec -it sqldevwincon01 powershell

    ```


    In the past, terminating the bash or PowerShell shell will also terminate the
    container. Not anymore. However, it’s still a good practice to exit the interactive
    shell by pressing Ctrl+PQ.'
