  trans: '

    ### 项目吊桥


    我喜欢历史。我希望我在上学时就喜欢。但历史给予我们机会去学习并可能利用他人已经完成的工作。因此，我向 SQL Server 团队的一位工程师询问了这一切是如何开始的。在几瓶我们最喜欢的饮料陪伴下，他谈到了
    `Project Drawbridge`，这是微软内部一个探索应用沙盒化概念的研究项目。虽然该项目运行于 2011 年，但应用沙盒化的概念并不新鲜。还记得
    1979 年的 Unix V7 如何让进程在隔离环境中运行吗？这个概念就有那么古老。其背后的理念是限制（或隔离）特定代码可以执行的环境。该项目旨在为基于 Windows
    的应用创建沙盒。它解决了与虚拟机监控程序相同类型的问题，但与完整的虚拟机相比，开销和磁盘占用要小得多。可以这样想：你可以从互联网上下载一个应用并安装到你的电脑上，而它不会接管你的操作系统。这与在移动设备上运行应用的概念相同。而且，无论设备和操作系统版本如何，你都能获得相同的用户体验。


    `Project Drawbridge` 结合了两项核心技术——`library operating system`（库操作系统）和 `picoprocess`（微进程）。`library
    operating system` 是应用程序编程接口（API）和动态链接库（DLL）的集合，是应用运行所需从操作系统获得的东西。但它不是加载整个操作系统的副本，而是只加载一个包含应用所需功能的、重构过的操作系统版本，并在相同的地址空间（用户模式
    vs 内核模式）中运行。现实情况是，虽然 Windows 操作系统提供了海量的功能和特性，但应用并不一定需要全部。想象一下迷你版的 Windows。`picoprocess`
    是一个基于进程的隔离容器，具有最小的内核 API 表面。你可以把这两项核心技术想象成一栋大型公寓楼内的公寓单元。公寓单元（`picoprocess`）拥有租户（应用）在该空间生活所需的公用设施，如电、水和通风（`library
    operating system`）。但公寓单元无法独立存在。它必须存在于公寓大楼（计算机硬件加上操作系统）的上下文之中。租户可以来来往往，而不会打扰楼里的其他租户。而且，在公寓单元内让租户进出，比等待整栋公寓大楼建成要快得多。


    这些公用设施连接到公寓大楼的主供应系统。但要让公用设施到达公寓大楼，你需要一个中央分配系统：电力的配电系统、水的泵和罐，以及集中的暖通空调系统。这使得公寓大楼的业主能够在需要时更换不同的公用事业公司。更换不同的公用事业公司对租户的影响微乎其微，甚至没有影响，除了他们公用事业账单上的费率可能发生变化。在
    `Project Drawbridge` 的语境下，这就是 `platform abstraction layer (PAL)`（平台抽象层）。


    注意


    我极度简化了这些概念，以避免深入探讨它们实现的技术细节。我的目标不是探索操作系统如何工作的细节，而是在资源和时间限制下，提供足够的信息来解释在 Linux
    上运行 SQL Server 是如何成为可能的。关于不同部分如何协同工作以实现这一目标的高层架构，有两个很好的资源：Channel 9 上的视频 `Drawbridge:
    A new form of virtualization for application sandboxing` [`channel9.msdn.com/Shows/Going+Deep/Drawbridge-An-Experimental-Library-Operating-System`](https://channel9.msdn.com/Shows/Going+Deep/Drawbridge-An-Experimental-Library-Operating-System)
    以及已发表的研究论文 `Rethinking the Library OS from the Top Down` [www.microsoft.com/en-us/research/wp-content/uploads/2016/02/asplos2011-drawbridge.pdf](http://www.microsoft.com/en-us/research/wp-content/uploads/2016/02/asplos2011-drawbridge.pdf)。


    当你开始思考时，`Project Drawbridge` 听起来非常像容器。


    ### SQLOS 和 SQLPAL


    如果你担任 SQL Server DBA 有一段时间了，你可能还记得 SQL Server 2000 和 SQL Server 2005 之间架构上的重大变化。与其他应用一样，SQL
    Server 2000 及更早版本依赖 Windows 进行硬件资源管理——比如线程调度、内存管理和 I/O 处理。还记得著名的 `UMS.DLL`（SQL
    用户模式调度程序 DLL）文件吗？这限制了 SQL Server 更好地处理硬件资源以实现可扩展性的能力，尤其是在 21 世纪初硬件能力飞速发展的背景下。为了利用硬件改进来提升性能和可扩展性，SQL
    Server 工程团队决定解除对 Windows 硬件资源管理的这种依赖。于是 `SQLOS` 应运而生。


    `SQLOS` 是 SQL Server 尝试将硬件资源管理带入其用户模式进程的产物。它就像是 SQL Server 专属的面向 Windows 的 `PAL`。`SQLOS`
    提供操作系统服务，如非抢占式调度、内存管理、异常处理等。你可以在 [`blogs.msdn.microsoft.com/slavao/2005/07/20/platform-layer-for-sql-server/`](https://blogs.msdn.microsoft.com/slavao/2005/07/20/platform-layer-for-sql-server/)
    阅读关于 `SQLOS` 在 SQL Server 2005 中引入及其背后原理的更多信息。然而，尽管 `SQLOS` 提供了对 Windows 的抽象，它仍不是一个真正的操作系统抽象层。为了允许
    SQL Server 在 Windows 以外的不同操作系统上运行，`SQLOS` 必须被重写，使其成为一个与操作系统无关的真正 `PAL`。


    幸运的是，从事 `Project Drawbridge` 的团队已经有一个在 Linux 上移植好的粗略原型。鉴于存在的限制和约束，将 `Project Drawbridge`
    和 `SQLOS` 中已有的组件，加上 Linux 上的粗略原型进行合并的想法，使得在 Linux 上移植 SQL Server 成为现实。谢天谢地，他们不必重写过去二十五年里为
    SQL Server 编写的所有源代码。这项努力的成果是 `SQLOS` 的一个进化版本，它结合了来自 `Project Drawbridge` 的 `library
    operating system` 和 `SQLOS`。他们称之为 `SQL Platform Abstraction Layer (SQLPAL)`（SQL
    平台抽象层）。这使得 SQL Server 团队能够将大部分为 Windows 编写的可执行 SQL Server 代码利用起来在 Linux 上运行。他们还创建了一个
    `host extension layer`（宿主扩展层），这是一个直接与操作系统交互的抽象层。为了使 Windows 和 Linux 的所有体验保持一致，团队分别为
    Windows 和 Linux 设计了 `host extension layer`。我猜这样做是为了更容易维护 SQL Server 的源代码，而不必关心底层操作系统是什么。鉴于所有这些使
    SQL Server 在 Linux 上成为可能的细节，图 8-1 展示了我对这个架构非常高层级的解读。你会在文档中看到类似的图表，但我尽力用视觉方式来展示复杂性，以便更好地理解它们。


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig1_HTML.jpg](img/484552_1_En_8_Fig1_HTML.jpg)


    图 8-1


    使 SQL Server 在 Linux 上成为现实的高层架构


    我确信 Slava Oks 和他的团队在 2005 年研究 `SQLOS` 时，甚至没有想过将 SQL Server 移植到 Linux。它就这么神奇地发生了。


    提示


    Apress 书籍 `Pro SQL Server on Linux`（作者 Bob Ward）的第 1 章对此有更详细的介绍。

    '
- fmt: '# Difference Between SQL Server on Windows vs. Linux


    Having gone through the previous section “SQL Server on Linux Architecture,” it’s
    pretty obvious that there really isn’t any difference between SQL Server running
    on Windows and on Linux – it’s the same database engine. The SQL Server engineering
    team made every effort to use the same code base on both platforms. However, due
    to the long history of development for the Windows platform, SQL Server will definitely
    have more supported features on Windows than on Linux. For example, when SQL Server
    2017 came out, transactional and merge replication were not available yet. Transactional
    replication is already supported on SQL Server 2019, but merge replication still
    isn’t. As later versions are released, you bet that the features will be the same
    for both platforms. It’s just a matter of time. Refer to the documentation at
    [SQL Server 2017 on Linux](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017)
    for a complete list of supported features for SQL Server 2017 on Linux and [SQL
    Server 2019 on Linux](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019)
    for SQL Server 2019 on Linux.


    From my experience, the biggest difference that you’ll see will be your personal
    experience. When you’ve worked with SQL Server your entire career and have spent
    your working hours on a rich graphical user interface like the Microsoft Management
    Console interacting with the operating system, working on the command line like
    you’ve been doing running Docker commands can really feel very awkward. You’ll
    hear yourself say, “this task is way easier on Windows.” Or when you can’t run
    a command because you forgot to request for `root` privileges, you’ll whisper
    a few “#&%@$#%!” words as you hit the keys on your keyboard. On the other hand,
    if you’ve also been managing other database platforms running on Linux and have
    written shell scripts to automate boring tasks, running SQL Server on Linux will
    be like a heaven-sent gift, wondering why Microsoft didn’t do this years ago.
    Your personal experience, preference, and even biases will highlight those differences.
    But once you’re inside SQL Server Management Studio, you won’t be able to tell
    the difference.


    # Installing SQL Server on Linux


    Here’s something that most SQL Server DBAs will say is the biggest difference
    between SQL Server on Windows and on Linux: setup experience. On Linux, there’s
    no `setup.exe`, no SQL Server Installation Center, nor the `New SQL Server stand-alone
    installation or add features to an existing installation` link. How do you click
    and type and drag and select and…? But if you’ve deployed hundreds – or even thousands
    – of SQL Server instances, I’m sure you hate the wizard-driven setup experience.
    You probably have a batch file that calls `setup.exe` and passes all the parameters
    you need to install SQL Server. Maybe you have a `ConfigurationFile.ini` file
    stored in a central repository that you access as part of running `setup.exe`.
    The only times I use the SQL Server Installation Center are when I have to create
    a new (or validate an existing) `ConfigurationFile.ini` file or demonstrate how
    it is used to install SQL Server.


    This section is divided into two parts – installing SQL Server on Linux manually
    and using a script to perform an unattended installation. The goal is to give
    you an idea of how the installation process works in preparation for creating
    a custom SQL Server on Linux Docker image. But nothing is stopping you from using
    the steps outlined in the following to automate deployment of SQL Server on Linux
    on either a physical machine or virtual machine.


    ## Manual Installation


    In Chapter 3, I walked you through installing Docker on two different Linux distributions
    – CentOS and Ubuntu. Similarly, I’ll walk you through the process of installing
    SQL Server on both CentOS and Ubuntu so you can create a custom SQL Server on
    Linux Docker image that can run on either distribution. Recall that the publicly
    available SQL Server on Linux images from Microsoft were created using Ubuntu.
    You may want to create a custom SQL Server on Linux Docker image running on either
    Red Hat Enterprise Linux/RHEL (or CentOS like what I’m using in this book) or
    SUSE Linux Enterprise Server so you can standardize on a specific Linux distribution.
    You’re free to install SQL Server on a supported Linux distribution. A list of
    these supported Linux distributions is available at [SQL Server on Linux: supported
    platforms](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup?view=sql-server-ver15#supportedplatforms).


    Let’s start with installing SQL Server on CentOS. Similar to installing Docker
    on Linux, you need to tell your Linux system where to download the Microsoft SQL
    Server Red Hat (because CentOS is based on RHEL) repository configuration file.
    Be sure to specify the version of SQL Server that you want to download. Run the
    following command to download the Microsoft SQL Server Red Hat repository configuration
    file for SQL Server 2017:


    ```bash

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    ```


    Run the following command to download the Microsoft SQL Server Red Hat repository
    configuration file for SQL Server 2019. Notice the subtle difference. I’ll give
    you a hint – it’s the SQL Server version.


    ```bash

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2019.repo

    ```


    After you download the repository configuration file, run the following command
    to install SQL Server. This will download the SQL Server installation packages
    for RHEL (don’t worry, they’re compatible with CentOS). Once the download completes,
    it will automatically run the installation.


    ```bash

    sudo yum install -y mssql-server

    ```


    After the package installation completes, run the `/opt/mssql/bin/mssql-conf`
    script with the following `setup` parameter to configure SQL Server using the
    default configuration. Follow the prompts to choose your SQL Server edition and
    set the `sa` password.


    ```bash

    sudo /opt/mssql/bin/mssql-conf setup

    ```


    Be careful with the choice of edition. If you intend to use this for development
    and testing purposes, Developer Edition is free and has all the capabilities of
    Enterprise Edition. Choosing Developer Edition means you intend to deploy Enterprise
    Edition in production. Don’t make the mistake of deploying Developer Edition on
    development environments and eventually deploying on Standard Edition in production
    due to licensing cost. While SQL Server 2019 Standard Edition on Windows is almost
    at par with the available features on Enterprise Edition, it’s not the same with
    SQL Server on Linux.


    That’s it. It’s that simple. Installing SQL Server on RHEL or CentOS only requires
    running three commands. Well, actually four if you consider enabling the SQL Server
    daemon to start on system boot, which you’ll have to do on an Ubuntu system as
    well. The following command is how you do that:


    ```bash

    sudo systemctl enable mssql-server

    ```


    On the other hand, installing SQL Server on Ubuntu includes additional steps and
    uses the `apt-get` command instead of the `yum` command. We’ll start with importing
    the public GPG keys on the local Ubuntu Linux system. Run the following `curl`
    command to download and import the public GPG keys:


    ```bash

    curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

    ```'
  raw: '## Difference Between SQL Server on Windows vs. Linux


    Having gone through the previous section “SQL Server on Linux Architecture,” it’s
    pretty obvious that there really isn’t any difference between SQL Server running
    on Windows and on Linux – it’s the same database engine. The SQL Server engineering
    team made every effort to use the same code base on both platforms. However, due
    to the long history of development for the Windows platform, SQL Server will definitely
    have more supported features on Windows than on Linux. For example, when SQL Server
    2017 came out, transactional and merge replication were not available yet. Transactional
    replication is already supported on SQL Server 2019, but merge replication still
    isn’t. As later versions are released, you bet that the features will be the same
    for both platforms. It’s just a matter of time. Refer to the documentation at
    [*https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017*](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017)
    for a complete list of supported features for SQL Server 2017 on Linux and [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019)
    for SQL Server 2019 on Linux.


    From my experience, the biggest difference that you’ll see will be your personal
    experience. When you’ve worked with SQL Server your entire career and have spent
    your working hours on a rich graphical user interface like the Microsoft Management
    Console interacting with the operating system, working on the command line like
    you’ve been doing running Docker commands can really feel very awkward. You’ll
    hear yourself say, “this task is way easier on Windows.” Or when you can’t run
    a command because you forgot to request for *root* privileges, you’ll whisper
    a few “#&%@$#%!” words as you hit the keys on your keyboard. On the other hand,
    if you’ve also been managing other database platforms running on Linux and have
    written shell scripts to automate boring tasks, running SQL Server on Linux will
    be like a heaven-sent gift, wondering why Microsoft didn’t do this years ago.
    Your personal experience, preference, and even biases will highlight those differences.
    But once you’re inside SQL Server Management Studio, you won’t be able to tell
    the difference.


    ## Installing SQL Server on Linux


    Here’s something that most SQL Server DBAs will say is the biggest difference
    between SQL Server on Windows and on Linux: setup experience. On Linux, there’s
    no *setup.exe*, no SQL Server Installation Center, nor the *New SQL Server stand-alone
    installation or add features to an existing installation* link. How do you click
    and type and drag and select and…? But if you’ve deployed hundreds – or even thousands –
    of SQL Server instances, I’m sure you hate the wizard-driven setup experience.
    You probably have a batch file that calls *setup.exe* and passes all the parameters
    you need to install SQL Server. Maybe you have a *ConfigurationFile.ini* file
    stored in a central repository that you access as part of running *setup.exe*.
    The only times I use the SQL Server Installation Center are when I have to create
    a new (or validate an existing) *ConfigurationFile.ini* file or demonstrate how
    it is used to install SQL Server.


    This section is divided into two parts – installing SQL Server on Linux manually
    and using a script to perform an unattended installation. The goal is to give
    you an idea of how the installation process works in preparation for creating
    a custom SQL Server on Linux Docker image. But nothing is stopping you from using
    the steps outlined in the following to automate deployment of SQL Server on Linux
    on either a physical machine or virtual machine.


    ### Manual Installation


    In Chapter [3](#484552_1_En_3_Chapter.xhtml), I walked you through installing
    Docker on two different Linux distributions – CentOS and Ubuntu. Similarly, I’ll
    walk you through the process of installing SQL Server on both CentOS and Ubuntu
    so you can create a custom SQL Server on Linux Docker image that can run on either
    distribution. Recall that the publicly available SQL Server on Linux images from
    Microsoft were created using Ubuntu. You may want to create a custom SQL Server
    on Linux Docker image running on either Red Hat Enterprise Linux/RHEL (or CentOS
    like what I’m using in this book) or SUSE Linux Enterprise Server so you can standardize
    on a specific Linux distribution. You’re free to install SQL Server on a supported
    Linux distribution. A list of these supported Linux distributions is available
    at [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup?view=sql-server-ver15#supportedplatforms*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup%253Fview%253Dsql-server-ver15%2523supportedplatforms).


    Let’s start with installing SQL Server on CentOS. Similar to installing Docker
    on Linux, you need to tell your Linux system where to download the Microsoft SQL
    Server Red Hat (because CentOS is based on RHEL) repository configuration file.
    Be sure to specify the version of SQL Server that you want to download. Run the
    following command to download the Microsoft SQL Server Red Hat repository configuration
    file for SQL Server 2017:


    ```

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    ```


    Run the following command to download the Microsoft SQL Server Red Hat repository
    configuration file for SQL Server 2019\. Notice the subtle difference. I’ll give
    you a hint – it’s the SQL Server version.


    ```

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2019.repo

    ```


    After you download the repository configuration file, run the following command
    to install SQL Server. This will download the SQL Server installation packages
    for RHEL (don’t worry, they’re compatible with CentOS). Once the download completes,
    it will automatically run the installation.


    ```

    sudo yum install -y mssql-server

    ```


    After the package installation completes, run the */opt/mssql/bin/mssql-conf*
    script with the following *setup* parameter to configure SQL Server using the
    default configuration. Follow the prompts to choose your SQL Server edition and
    set the *sa* password.


    ```

    sudo /opt/mssql/bin/mssql-conf setup

    ```


    Be careful with the choice of edition. If you intend to use this for development
    and testing purposes, Developer Edition is free and has all the capabilities of
    Enterprise Edition. Choosing Developer Edition means you intend to deploy Enterprise
    Edition in production. Don’t make the mistake of deploying Developer Edition on
    development environments and eventually deploying on Standard Edition in production
    due to licensing cost. While SQL Server 2019 Standard Edition on Windows is almost
    at par with the available features on Enterprise Edition, it’s not the same with
    SQL Server on Linux.


    That’s it. It’s that simple. Installing SQL Server on RHEL or CentOS only requires
    running three commands. Well, actually four if you consider enabling the SQL Server
    daemon to start on system boot, which you’ll have to do on an Ubuntu system as
    well. The following command is how you do that:


    ```

    sudo systemctl enable mssql-server

    ```


    On the other hand, installing SQL Server on Ubuntu includes additional steps and
    uses the *apt-get* command instead of the *yum* command. We’ll start with importing
    the public GPG keys on the local Ubuntu Linux system. Run the following *curl*
    command to download and import the public GPG keys:


    ```

    curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

    ```'
  trans: '# SQL Server 在 Windows 与 Linux 上的差异


    在阅读了上一节“Linux 上的 SQL Server 架构”后，很明显，运行在 Windows 上的 SQL Server 与运行在 Linux 上的 SQL
    Server 之间其实没有任何差异——它们使用的是相同的数据库引擎。SQL Server 工程团队竭尽全力在两个平台上使用相同的代码库。然而，由于 Windows
    平台悠久的发展历史，SQL Server 在 Windows 上支持的功能肯定会多于 Linux。例如，当 SQL Server 2017 发布时，事务复制和合并复制尚不可用。事务复制在
    SQL Server 2019 上已得到支持，但合并复制仍然不支持。随着后续版本的发布，你可以相信两个平台的功能将会趋于一致。这只是时间问题。请参阅文档[Linux
    上的 SQL Server 2017](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017)获取
    SQL Server 2017 在 Linux 上支持功能的完整列表，以及[Linux 上的 SQL Server 2019](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019)获取
    SQL Server 2019 在 Linux 上的支持功能列表。


    根据我的经验，你将遇到的最大差异会是你的个人体验。如果你整个职业生涯都在使用 SQL Server，并且习惯于在像微软管理控制台这样丰富的图形用户界面下工作并与操作系统交互，那么像运行
    Docker 命令那样在命令行下工作可能会让你感到非常别扭。你会听到自己说：“这个任务在 Windows 上容易多了。”或者当你因为忘记申请`root`权限而无法运行命令时，你会一边敲击键盘一边低声咒骂几句“#&%@$#%!”。另一方面，如果你也一直在管理运行在
    Linux 上的其他数据库平台，并编写 Shell 脚本来自动化枯燥的任务，那么在 Linux 上运行 SQL Server 对你来说会像天赐之物，你会纳闷为什么微软不早点这么做。你的个人体验、偏好甚至偏见都会凸显这些差异。但一旦你进入
    SQL Server Management Studio，你就无法分辨出区别了。


    # 在 Linux 上安装 SQL Server


    大多数 SQL Server 数据库管理员会说，Windows 与 Linux 上的 SQL Server 之间最大的差异是安装体验。在 Linux 上，没有`setup.exe`，没有
    SQL Server 安装中心，也没有`新建 SQL Server 独立安装或向现有安装添加功能`链接。你怎么点击、输入、拖动和选择呢？但是，如果你已经部署了数百甚至数千个
    SQL Server 实例，我敢肯定你会讨厌这种向导驱动的安装体验。你可能已经有一个批处理文件，它调用`setup.exe`并传递安装 SQL Server
    所需的所有参数。也许你有一个存储在中央存储库中的`ConfigurationFile.ini`文件，在运行`setup.exe`时会访问它。我仅在需要创建新的（或验证现有的）`ConfigurationFile.ini`文件或演示如何使用它来安装
    SQL Server 时才会使用 SQL Server 安装中心。


    本节分为两部分——手动安装 SQL Server 和使用脚本执行无人值守安装。目的是让你了解安装过程的工作原理，为创建自定义的 Linux SQL Server
    Docker 镜像做准备。不过，你完全可以按照以下步骤在物理机或虚拟机上自动化部署 Linux 上的 SQL Server。


    ## 手动安装


    在第 3 章中，我指导你在两个不同的 Linux 发行版（CentOS 和 Ubuntu）上安装了 Docker。同样地，我将指导你在 CentOS 和 Ubuntu
    上安装 SQL Server 的过程，这样你就可以创建一个可以在任一发行版上运行的自定义 Linux SQL Server Docker 镜像。回想一下，微软公开提供的
    Linux SQL Server 镜像是使用 Ubuntu 创建的。你可能希望创建一个在红帽企业 Linux/RHEL（或像本书中使用的 CentOS）或
    SUSE Linux 企业服务器上运行的自定义 Linux SQL Server Docker 镜像，以便可以在特定的 Linux 发行版上实现标准化。你可以在任何支持的
    Linux 发行版上自由安装 SQL Server。这些支持的 Linux 发行版列表可在[Linux 上的 SQL Server：支持的平台](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup?view=sql-server-ver15#supportedplatforms)找到。


    让我们从在 CentOS 上安装 SQL Server 开始。与在 Linux 上安装 Docker 类似，你需要告诉你的 Linux 系统从哪里下载微软
    SQL Server Red Hat（因为 CentOS 基于 RHEL）仓库配置文件。请确保指定你要下载的 SQL Server 版本。运行以下命令以下载
    SQL Server 2017 的 Microsoft SQL Server Red Hat 仓库配置文件：


    ```bash

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    ```


    运行以下命令以下载 SQL Server 2019 的 Microsoft SQL Server Red Hat 仓库配置文件。注意细微的差别。给你个提示——是
    SQL Server 的版本。


    ```bash

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2019.repo

    ```


    下载仓库配置文件后，运行以下命令安装 SQL Server。这将下载适用于 RHEL 的 SQL Server 安装包（别担心，它们与 CentOS 兼容）。下载完成后，它将自动运行安装。


    ```bash

    sudo yum install -y mssql-server

    ```


    软件包安装完成后，运行带有以下`setup`参数的`/opt/mssql/bin/mssql-conf`脚本，使用默认配置配置 SQL Server。按照提示选择你的
    SQL Server 版本并设置`sa`密码。


    ```bash

    sudo /opt/mssql/bin/mssql-conf setup

    ```


    请谨慎选择版本。如果你打算将其用于开发和测试目的，Developer Edition 是免费的，并且具有 Enterprise Edition 的所有功能。选择
    Developer Edition 意味着你打算在生产环境中部署 Enterprise Edition。不要错误地将 Developer Edition 部署在开发环境中，最终由于许可成本而在生产环境中部署
    Standard Edition。虽然 Windows 上的 SQL Server 2019 Standard Edition 在可用功能上几乎与 Enterprise
    Edition 不相上下，但 Linux 上的 SQL Server 并非如此。


    就是这样。就这么简单。在 RHEL 或 CentOS 上安装 SQL Server 只需要运行三条命令。嗯，实际上如果你算上启用 SQL Server 守护程序在系统启动时启动的话是四条命令，这在
    Ubuntu 系统上你也需要做。以下命令是如何启用的方法：


    ```bash

    sudo systemctl enable mssql-server

    ```


    另一方面，在 Ubuntu 上安装 SQL Server 包含额外的步骤，并且使用`apt-get`命令而不是`yum`命令。我们将从在本地 Ubuntu
    Linux 系统上导入公共 GPG 密钥开始。运行以下`curl`命令下载并导入公共 GPG 密钥：


    ```bash

    curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

    ```'
- fmt: 'Next, you need to add the Microsoft SQL Server Ubuntu repository to your Ubuntu
    Linux system. The following command is specific to SQL Server 2017:


    ```

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    ```


    The following command is specific to SQL Server 2019:


    ```

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2019
    xenial main"

    ```


    Note


    Recall the `/etc/apt/sources.list` file described in Chapter [3](#484552_1_En_3_Chapter.xhtml).
    This file contains the list of APT software repositories, the location of the
    packages that you want to install on your Ubuntu Linux system. The previous command
    simply adds an entry in the file for the Microsoft SQL Server Ubuntu package.
    But you might be wondering where I got that value. The value to add to the `/etc/apt/sources.list`
    file using the `add-apt-repository` command is from the `https://packages.microsoft.com/config/ubuntu/16.04/mssql-server-2017.list`
    file. You can download the specific list file for the version of SQL Server on
    Ubuntu package that you want to install.


    After adding the Microsoft SQL Server Ubuntu repository to the `/etc/apt/sources.list`
    file, you can run the following command to install SQL Server. Because you have
    made modifications to your Ubuntu system by adding the Microsoft SQL Server Ubuntu
    package repo, you need to run the `apt-get update` command prior to installing
    SQL Server:


    ```

    sudo apt-get update

    sudo apt-get install -y mssql-server

    ```


    After the package installation completes, run the `mssql-conf` script with the
    following `setup` parameter to configure SQL Server using the default configuration.
    Follow the prompts to choose your SQL Server edition and set the `sa` password.


    ```

    sudo /opt/mssql/bin/mssql-conf setup

    ```


    If you observe the installation process, it consists of running some commands
    and passing parameter values. If you can combine all the steps in a script, you
    can automate the installation process and not have to type responses to prompts.
    That’s the idea behind unattended installation.


    ### Unattended Installation


    Performing an unattended installation of SQL Server on Linux requires an understanding
    of running scripts in Linux. I’ll save the details of how to run scripts on Linux
    at a later section. This section will describe what goes into the script for performing
    an unattended installation.


    Recall how you manually installed SQL Server on both CentOS and Ubuntu systems.
    You run several commands that consist of parameters. If you look at the command
    to install SQL Server on both CentOS and Ubuntu – `sudo yum/apt-get install -y
    mssql-server` – you will see a `-y` parameter. This is a parameter that all package
    managers use, and it assumes that the answer to any question which would be asked
    during the installation process is `yes`. This also allows users to perform installation
    without user interaction. I usually do the manual installation several times before
    I perform an unattended installation to see exactly what the package is asking
    me to do that requires a *yes/no* response. I certainly don’t want a prompt that
    asks, “have you killed anyone recently?” and carelessly typing `yes`. I may not
    be a lawyer but I try my best and read the fineprint when installing software
    on my computer or smartphone.


    Similarly, you can pass different parameters when running the `/opt/mssql/bin/mssql-conf`
    script as part of the setup process. These parameters, also called `environment
    variables`, are described in `https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables?view=sql-server-linux-2017`
    for SQL Server 2017 (the list is similar for SQL Server 2019). Recall the environment
    variables passed to the `docker run` command in *Chapter* [4](#484552_1_En_4_Chapter.xhtml).
    They are the same environment variables and can be used to configure SQL Server
    on Linux during the setup process so as not to require user interaction. If you
    took note of the manual installation process, there are three prompts that required
    user input:


    *   `MSSQL_PID`: Similar to the PID parameter when installing SQL Server on Windows
    – either the product ID or the SQL Server edition. If not specified, it will default
    to Developer Edition.

    *   `ACCEPT_EULA`: I’m sure you already know this by now.

    *   `MSSQL_SA_PASSWORD`: The `sa` login’s complex password.


    Given these three environment variables, you can run the `/opt/mssql/bin/mssql-conf`
    script with their corresponding values as shown here:


    ```

    sudo MSSQL_PID=Enterprise ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    ```


    Note


    I’ve seen examples from Microsoft documentation, blog posts, and sample codes
    on GitHub of running the `/opt/mssql/bin/mssql-conf` script as part of the setup
    process using the `-n` parameter. One example can be found on `https://docs.microsoft.com/en-ca/sql/linux/sample-unattended-install-redhat?view=sql-server-ver15#sample-script`.
    Refer to the line `echo Running mssql-conf setup...` where it shows the `/opt/mssql/bin/mssql-conf
    -n setup` code with the environment variables. The `-n` (also `--noprompt`) parameter
    does not prompt the user and uses environment variables or the default settings
    during the installation. My curious mind wanted to know if there is any difference
    in behavior so I tested running the command with and without the `-n` parameter.
    It turns out that there really is no difference between the two. So, to save on
    a few keystrokes and several bytes of characters, I opted not to use the `-n`
    parameter in my unattended installation.


    Combining all the commands on a CentOS Linux system to


    *   Download the Microsoft SQL Server Red Hat repository configuration file for
    SQL Server 2017

    *   Download and install the SQL Server installation packages for RHEL

    *   Run the `/opt/mssql/bin/mssql-conf` script with the `setup` parameter and
    environment variables

    *   Enable the SQL Server daemon to start on system boot


    your script will include the commands as shown in the following:


    ```

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    sudo yum install -y mssql-server

    sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    ```


    Going through the steps in performing the manual installation of SQL Server on
    an Ubuntu Linux system, the corresponding script to perform an unattended installation
    will include the commands as shown in the following:


    ```

    curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    sudo apt-get update

    sudo apt-get install -y mssql-server

    sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    ```


    Even running these commands and providing the password to run them as `sudo` give
    you some form of unattended installation. But we’re not done yet. You have to
    wait until later in the chapter to have a fully automated script that will perform
    an unattended installation of SQL Server on Linux.'
