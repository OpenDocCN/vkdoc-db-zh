  trans: '

    ## 探索 `Dockerfile`


    第二种——也是推荐的——创建自定义 Docker 镜像的方法是使用 `Dockerfile`。`Dockerfile` 本质上是一个文本文件，其中包含了用户可以在命令行上运行的所有命令，用以构建自定义的
    Docker 镜像。这就像使用 `ConfigurationFile.ini` 文件，通过相同的配置来部署 SQL Server。我喜欢把 `Dockerfile`
    想象成一份食材清单，你需要它来制作一个配方（你的 Docker 镜像），然后别人可以使用这个配方来烘焙一个蛋糕（你的容器）。你可以从不同来源获取食材，并用它们来制作配方。你可以把你的配方交给任何有耐心和创意的人去烘焙蛋糕（嘿，我得为开发者们说点好话）。


    与编写脚本类似，`Dockerfile` 包含一系列顺序列出的命令、指令或参数，这些指令将对您选择的基础 Docker 镜像执行操作，以创建一个自定义镜像。而且因为它包含了镜像构建的详细信息，对于那些想了解镜像是如何构建的人来说，它是一份很好的文档。当我刚开始时，我花了很多时间阅读
    [`https://github.com/microsoft/mssql-docker`](https://github.com/microsoft/mssql-docker)
    上不同 SQL Server 镜像的 `Dockerfile` 参考资料。这让我了解了如何使用我首选的操作系统平台和 SQL Server 版本来构建我自己的自定义
    SQL Server 镜像。另外，我旅行时晚上睡不好，所以我觉得读技术文档会有帮助。结果并没有。


    你可以将 `Dockerfile` 存储在像 GitHub 这样的版本控制系统上，这样你就可以跟踪团队中不同成员所做的更改。因为我们正在构建一个包含所需操作系统和配置的
    SQL Server 环境，你可以将 `Dockerfile` 视为一种实现*基础设施即代码*的方式。


    ### 文件本身


    我确实说过 `Dockerfile` 只是一个文本文件。你可以使用你喜欢的文本编辑器来创建和编写 `Dockerfile`。我通常在 Windows 工作站上用
    Notepad++ 开始编写。完成后，我会将其复制到 Windows Docker 主机、Linux Docker 主机或任何安装了 Docker CLI
    客户端的机器上。


    我觉得 `Dockerfile` 真正烦人的一点是文件名本身。它必须严格命名为 `Dockerfile`，首字母 "D" 大写，是一个没有空格的单词，并且没有文件扩展名。如果你使用的文本编辑器默认保存文件时带有
    ".txt" 扩展名，请务必删除它。我记不清有多少次我不得不排查我的 `Dockerfile` 到底哪里出了问题，结果发现只是文件有扩展名。这就是我喜欢用
    Notepad++ 的原因。


    **提示**


    不过，如果你想统一文件命名规范，实际上可以使用不同的文件名和扩展名。例如，你可以使用 `Dockerfile` 作为生产环境文件，而 `dockerFile.dev`
    用于开发环境。这里的想法是，即使对于代码文件，你也要有合适的文档管理策略。毕竟，代码文件也可以被视为文档。你不仅想要跟踪和管理代码变更，还希望对它们进行适当的分类，这样团队中就不会有人意外部署仍在开发中的代码。无论你是在自动化代码审查还是实施持续集成，都没关系。一个能最大限度减少人为错误的适当流程有助于改进
    DevOps 实践。在本章后面，你将看到一个如何使用不同文件名来构建自定义 Docker 镜像的示例。


    `Dockerfile` 的格式如下所示：


    ```

    #注释

    INSTRUCTION 参数

    ```


    `INSTRUCTION`（指令）不区分大小写，我觉得这很有趣，考虑到 Docker 最初是为 Linux 构建的。然而，惯例是将 `INSTRUCTION`
    大写，以便与参数轻易区分开。让我们看看你可以在 `Dockerfile` 中包含的不同指令。我将在这里定义这些指令，尽管并非所有指令都会用于创建 Windows
    上的自定义 SQL Server 镜像。其中一些将用于 Linux 上的 SQL Server。


    ### `FROM` 指令


    `Dockerfile` 必须以 `FROM` 指令开头，尽管你可以争辩说它可以以注释开头。`FROM` 指令指定了你想要开始构建的基础 Docker 镜像（双关语）。它可以是基础操作系统的镜像，也可以是你想要在其上构建的现有镜像。当你构建自定义的“黄金镜像”时，`FROM`
    指令引用一个基础操作系统镜像。以下是 `FROM` 指令，告诉 `Dockerfile` 使用 Windows Server 2016 Core OS Build
    14393.2972。可用的 Windows Server Core 镜像列表可在 [`https://hub.docker.com/_/microsoft-windows-servercore`](https://hub.docker.com/_/microsoft-windows-servercore)
    获取。


    ```

    FROM mcr.microsoft.com/windows/servercore:10.0.14393.2972

    ```


    与运行 `docker run` 命令类似，如果在构建期间 `FROM` 指令中的镜像在 Docker 主机上本地不存在，它将在创建自定义镜像之前从公共仓库中拉取。


    ### `LABEL` 指令


    `LABEL` 指令是一个键值对，用于向镜像添加元数据。可以将其视为关于自定义镜像的附加注释——它使用了什么基础镜像、上面运行什么应用程序、版本是什么等等。以下是一个如何编写多行
    `LABEL` 指令的示例：


    ```

    LABEL name="Windows Server 2016 上的 SQL Server 2016 SP2"

    LABEL version="1.00.00"

    LABEL environment="dev/test"

    LABEL maintainer="theawesomedbateam@testdomain.com"

    ```


    当你对正在检查的镜像运行 `docker inspect` 命令时，这些信息会显示在输出的 `Labels`（标签）部分，如图 9-2 所示。


    ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig2_HTML.jpg](img/484552_1_En_9_Fig2_HTML.jpg)


    图 9-2

    拥有多个 `LABEL` 指令的 Linux 上 SQL Server 镜像元数据


    就像任何类型的文档一样，你需要定义标准。你不希望你的一些 `Dockerfile` 文件使用 `LABEL` 指令，而其余的却使用注释。我建议在一种情况下将
    `LABEL` 指令作为标准：当使用你自定义镜像的人无法访问 `Dockerfile` 时。

    '
- fmt: '### The RUN Instruction


    Obviously, the `RUN` instruction will execute commands. This will be one of your
    most used instructions. You can use the `RUN` instruction in either of its two
    forms:


    *   `SHELL` form: The command is run in the operating system’s default command
    shell – `/bin/sh -c` on Linux or `cmd /S /C` on Windows.

    *   `EXEC` form : The command calls the executable directly without invoking a
    command shell. Using the EXEC form prevents possible destructive changes to the
    string passed to the command shell, which is common when performing string manipulation
    in the command line.


    The `RUN` instruction is not the only one that has two forms. You’ll see in later
    sections of this chapter that other instructions also have both the SHELL and
    EXEC forms.


    The following is an example of using the `RUN` instruction in SHELL form. The
    command will use the PowerShell command shell (instead of the default `cmd.exe`
    shell) and set the startup type of the `MSSQLSERVER` service to automatic. In
    case you’re wondering, Windows containers still use services unlike Linux containers
    where you simply run a process.


    ```

    RUN powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

    ```


    The equivalent `RUN` instruction in EXEC form is shown in the following:


    ```

    RUN ["powershell", "-Command", "Set-Service MSSQLSERVER -StartupType Automatic"]

    ```


    The difference between the SHELL and EXEC forms is in the way the `RUN` instruction
    is executed. In the SHELL form, the command is run in the context of the default
    shell. In the EXEC form, the command is run explicitly. Using the preceding `RUN`
    instruction example, the SHELL form will run the following command in the Docker
    image:


    ```

    cmd /S /C powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

    ```


    In contrast, in the EXEC form, the command executes explicitly. Of course, we’re
    assuming that the path to the command is defined in the system environment variables.


    ```

    powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

    ```


    You can execute different commands with the `RUN` instruction so long as you can
    run it using the base image layer – download files, create directories, configure
    settings, and so on. You have the power of the base image and the capabilities
    of the shell environment to do anything you want.


    The `RUN` instruction will execute any commands in a new read-write filesystem
    layer on top of the current image. This is a new, temporary container created
    based on the existing image. Once the command completes, the results will be committed
    to the image, like what was done with the `docker commit` command. This will appear
    as a new filesystem layer like the one shown in Figure [9-1](#484552_1_En_9_Chapter.xhtml#Fig1).
    This new image becomes the starting point of the next instruction in the `Dockerfile`.
    The temporary container will then be removed. Remember the Lego pieces analogy
    from *Chapter [5](#484552_1_En_5_Chapter.xhtml)*?


    ### The COPY Instruction


    The `COPY` instruction copies new files or directories from a source and adds
    them to the filesystem of the container at the path provided. Like the `RUN` instruction,
    it also has two forms:


    *   `COPY <source> <destination>`

    *   `COPY ["<source>", "<destination>"]`


    The second form is used for paths that contain blank spaces, such as `C:/Program
    Files/Microsoft SQL Server`, and is mostly applicable to Windows than Linux. The
    files and directories must be in a path relative to the `Dockerfile`, and the
    `<destination>` path needs to be referenced using a forward slash (it pays to
    think Linux even on Windows). The following is a `COPY` instruction to copy the
    SQL Server 2016 Developer Edition with Service Pack 2 installation media on the
    machine where the `Dockerfile` is stored to the C:/SQL2016Dev_SP2 directory:


    ```

    COPY /SQL2016Dev_SP2 C:/SQL2016Dev_SP2

    ```


    Note


    The one thing I found confusing when I was starting out was the use of forward
    slashes in the Docker for Windows documentation, both from Docker and Microsoft.
    For example, you need to write `C:\Windows\System32\cmd.exe` as `C:/Windows/System32/cmd.exe`.
    We’ve always used backslashes (`\`) in Windows as path separator. But since Docker
    was created initially for Linux, it follows Linux conventions like forward slashes
    (`/`) as path separators. If you want to use backslashes in Docker, you need to
    properly escape it. That’s because the backslash character is used as an escape
    character in Linux. If you want to stick to how you’ve done things in Windows,
    you need to “escape the escape character.” The preceding example would need to
    be written as `C:\\Windows\\System32\\cmd.exe`. Or just use forward slashes instead.


    The `<source>` path must be inside the context of the build. If you are storing
    the `Dockerfile` in the `E:/dockerBuild` directory on your Windows machine that
    has a Docker CLI client, the `SQL2016Dev_SP2` directory should be inside that
    directory. If the `<source>` is a directory like the one in the example, only
    the contents – including the filesystem metadata – will be copied, not the directory.
    Figure [9-3](#484552_1_En_9_Chapter.xhtml#Fig3) shows the filesystem structure
    of the build context on a Windows Docker host. I’ll explain what the `start.ps1`
    PowerShell script is for later in the chapter.


    ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig3_HTML.jpg](images/484552_1_En_9_Chapter/484552_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Filesystem structure of the build context on a Windows Docker host


    On Linux, you can pass the `chown` command together with the `COPY` instruction
    in the format `COPY [--chown=<user>:<group>] <src>... <dest>`. This is useful
    since the default `COPY` instruction will always assign a UID and GID value of
    0 - user and group equal to `root`. Keeping with the principle of least privilege,
    we don’t want to assign `root` to everything. However, it’s OK for `root` to have
    ownership of the files and directories inside the container so long as the container
    isn’t running as `root`. An example of building a custom Docker image running
    SQL Server on Linux that runs as a `non-root` user is provided in *Chapter [10](#484552_1_En_10_Chapter.xhtml)*.'
