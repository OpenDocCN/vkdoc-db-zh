    ```


    我不会删除这里创建的卷。我将在下一节中将其与一个容器一起使用并作为卷挂载。


    你可以运行 `docker volume` 命令（如图 7-5 所示）来显示管理 Docker 卷的可用子命令列表。


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig5_HTML.jpg](img/484552_1_En_7_Fig5_HTML.jpg)


    图 7-5

    列出管理 Docker 卷的所有命令


    ## 将卷挂载到容器


    让我们使用上一节创建的 Docker 卷，并将其挂载到容器。对于 Linux 容器，我将使用 CentOS 7 镜像，并将 `samplevolume` 卷挂载到它。使用
