    SQL Server 2017 CU14，因为你想要构建的标准化镜像需要这个特定版本。你当然不希望创建一个包含高于 CU14 版本的自定义 Linux 版
    SQL Server 镜像。你可以修改步骤 3 来安装一个指向你想要安装的 SQL Server 版本的特定软件包。你可以从 [`packages.microsoft.com/rhel/7/mssql-server-2017/`](https://packages.microsoft.com/rhel/7/mssql-server-2017/)（适用于
