- fmt: 'Should there be any issues when running the `docker build` command, you will
    end up with a stopped container. This container represents the step from which
    the build failed. If you want to keep your environment clean of unwanted containers,
    be sure to remove these stopped containers prior to fixing the issue and rerunning
    the build. Use the `docker ps -a` command to display the container used in the
    failed step and the `docker rm` command to remove it. You could also use the `prune`
    subcommand for specific Docker objects. For example, you can run the `docker image
    prune` command to remove all images that are not tagged nor referenced by any
    container (also called dangling images). You can also run the `docker container
    prune` command to delete stopped containers. Refer to [https://docs.docker.com/config/pruning/](https://docs.docker.com/config/pruning/)
    for pruning unused Docker objects.


    ## Summary


    This chapter provides the foundation for building custom Docker images using the
    `Dockerfile`. You can use this chapter as a reference to build any custom Docker
    image so long as you know the base operating system and the application that you
    want to run. While the examples provided were for building a custom SQL Server
    on Windows image, it’s the same `Dockerfile` using the same instructions. You
    can containerize a custom ASP.NET Core application running Windows Server Core
    or a .NET Core application running on Linux. Additional information about the
    `Dockerfile` can be found on [https://docs.docker.com/engine/reference/builder/](https://docs.docker.com/engine/reference/builder/).
    In the next chapter, we will explore creating a custom SQL Server on Linux image.
    While the steps are similar to how you build a custom SQL Server on Windows image,
    the concepts provided in *Chapter* [*8*](#484552_1_En_8_Chapter.xhtml) to install
    and configure SQL Server on Linux will be used as a pattern. We will spice it
    up a bit and include running scripts that contain additional customization like
    creating user databases or restoring from backups.


    # 10. 创建自定义SQL Server on Linux容器镜像


    > *The secret to learning new technologies – or just about anything – is to never
    forget the ones you already know.*

    >

    > —Edwin M. Sarmiento


    In the last chapter, you’ve learned how to combine the different instructions
    in a `Dockerfile` to create a custom SQL Server on Windows container. We’ll be
    using what we’ve covered in the previous chapter to create a custom SQL Server
    on Linux Docker image. But because Linux is a little bit different from Windows,
    I will be introducing additional `Dockerfile` instructions. I’ll also cover more
    details on further customizing your SQL Server on Linux image in preparation for
    deploying in either a development or production environment. So, let’s dive right
    in.


    ## Additional `Dockerfile` Instructions


    If you analyze the `Dockerfile` created in the previous chapter, the instructions
    used were based on our understanding of installing and configuring SQL Server
    on a Windows environment. In *Chapter* [*8*](#484552_1_En_8_Chapter.xhtml), we
    looked at automating the installation of SQL Server on Linux. We’ll translate
    the bash script for automating installation and configuration of SQL Server on
    Linux into a `Dockerfile`. But before we do that, let’s look at some of the additional
    instructions that we need to consider.


    ### The `EXPOSE` Instruction


    The `EXPOSE` instruction tells the Docker daemon that the container you run based
    on the image will listen on the specified network port at runtime. The default
    is TCP but you can choose to define whether you want the container to use a UDP
    port. The format of the `EXPOSE` instruction is shown in the following. I’m pretty
    sure you know why the specified port number is used.


    ```

    EXPOSE 1433

    ```


    I used to think that the `EXPOSE` instruction was intended to publish the port
    that the container will be listening on during runtime. After all, isn’t that
    what the word “expose” means in the context of computer networking? But that’s
    not the case. The `EXPOSE` instruction is merely a “hint” to tell users of the
    image which port will be useful when a container is created and run. The Docker
    daemon doesn’t do anything with that instruction by itself. In fact, if you are
    building a custom SQL Server on Linux image, you can simply ignore the `EXPOSE`
    instruction – like what we did with the SQL Server on Windows image – so long
    as the users of your image know that it is a default configuration of SQL Server
    and it listens on port 1433.


    I’m sure you know where I’m going with this. It’s like getting a smartphone without
    a user manual (although you might argue that no one actually reads the user manual).
    If you know how to use the smartphone, you don’t need a manual. But what if you
    don’t? That’s where the user manual comes in. The `EXPOSE` instruction acts as
    additional metadata regarding a Docker image. You can check the `ExposedPorts`
    value under the `Config` section when you run the `docker inspect` command on
    the image you’re reviewing as shown in Figure [10-1](#484552_1_En_10_Chapter.xhtml#Fig1).


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig1_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    `ExposedPorts` value of a publicly available SQL Server on Linux image


    What publishes the port that the application inside the container will be listening
    on is the `-p` parameter of the `docker run` command. Review the `docker run`
    command shown in the following with emphasis on the `-p` parameter:


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" --name sqldevlinuxcon01
    -p 1433:1433 -d -h linuxsqldev01 mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    This is the reason why we use the `-p` parameter – to expose SQL Server’s port
    number inside the container so we can access it via the Docker hosts’ port number
    via port mapping. But if we haven’t worked with SQL Server nor do we have any
    idea what SQL Server is, we wouldn’t know which default port number it listens
    on – hence, the use of the `EXPOSE` instruction.


    Another use of the `EXPOSE` instruction is if you decide to configure SQL Server
    to use a nondefault port, let’s say port 5000. The `EXPOSE` instruction can tell
    the users which port to publish when running the container. But the real value
    of having the `EXPOSE` instruction in your `Dockerfile` is by allowing containers
    to talk to each other without having to publish their port numbers using the `-p`
    parameter of the `docker run` command. I’ll cover Docker networking in more detail
    in *Chapter* [*11*](#484552_1_En_11_Chapter.xhtml).'
