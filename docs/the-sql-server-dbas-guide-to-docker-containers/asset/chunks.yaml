  raw: '### Testing Remote Client Connectivity


    The ultimate test, of course , is when you can run commands from a Docker CLI
    client that connects to a remote Docker host. Run the following command to connect
    to a remote Docker host. Be sure you are in the */tmp/dockerTLS* directory so
    you don’t have to provide the absolute path to the public key, the signed certificate,
    and the client key.


    ```

    docker --tlsverify --tlscacert=ca.pem --tlscert=cert.pem --tlskey=key.pem -H=172.28.106.158:2376
    info

    ```


    The -H parameter points to the IP address of the remote Docker host. Alternatively,
    you can use the hostname or the FQDN provided that it can be resolved on the network.
    Figure [6-7](#484552_1_En_6_Chapter.xhtml#Fig7) shows a Docker CLI client running
    on *CENTOSDOCKERCLIENT* connecting to a remote Docker host running on *CENTOSDOCKER01*.


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig7_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Docker CLI client connecting to a remote Docker host


    You can also avoid repeatedly providing the remote connection–related parameters
    when you run *docker* commands by setting the environment variables in your current
    session using the *export* command. Run the following commands prior to running
    any *docker* commands. Figure [6-8](#484552_1_En_6_Chapter.xhtml#Fig8) shows setting
    the environment variables and running *docker* commands to a remote Docker host.


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig8_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Setting environment variables to connect a Docker CLI client to a remote Docker
    host


    ```

    export DOCKER_TLS_VERIFY=1

    export DOCKER_HOST=tcp://172.28.106.158:2376

    export DOCKER_CERT_PATH=/tmp/dockerTLS/

    ```


    ### Cleanup


    After configuring the client and server for TLS mutual authentication , you no
    longer need the certificate signing requests. You can proceed to delete the *client.csr*
    and *server.csr* files on the client and server machines, respectively. You can
    do the same for the extensions configuration files – **extfile-client.cnf** and
    **extfile.cnf** .


    Also, to prevent your keys from accidentally being overwritten, remove their write
    permissions. Run the following command on the client machine to make the keys
    only readable by your user account:


    ```

    chmod -v 0400 ca-key.pem key.pem

    ```


    Similarly, run the following command on the server machine:


    ```

    chmod -v 0400 ca-key.pem server-key.pem

    ```


    You would need to do the same on the certificates to prevent them from accidentally
    being overwritten. Run the following command on the client machine to make the
    certificates only readable by your user account:


    ```

    chmod -v 0400 ca.pem cert.pem

    ```


    Similarly, run the following command on the server machine:


    ```

    chmod -v 0400 ca.pem server-cert.pem

    ```


    The process to configure a Docker CLI client running on Windows will be the same.
    But since OpenSSL isn’t natively available on Windows, it has to be installed
    manually. Refer to *Appendix A* to install and configure OpenSSL on a Windows
    workstation.


    Once you’re inside the OpenSSL command prompt, you can run the same commands as
    the one you used for Linux but without the *openssl* command. For example, the
    command `openssl genrsa -out key.pem 4096` should just be written as `genrsa -out
    key.pem 4096`. Figure [6-9](#484552_1_En_6_Chapter.xhtml#Fig9) shows a Windows
    10 machine running the Docker CLI client connecting to a Linux Docker host. Pay
    attention to the -H parameter, though. The format is similar to the one defined
    in the DOCKER_HOST environment variable. Also, instead of using the *export* keyword,
    use the *set* keyword to define the environment variables.


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig9_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Docker CLI client on a Windows 10 host connecting to a remote Linux Docker host


    ## Configure Docker CLI Bash Completion


    They say the laziest IT professionals are the former developers who became sysadmins.
    That may have a hint of truth in it as is my experience. I switched from Visual
    Basic to C#.NET because Visual Studio had IntelliSense in 2005\. When Monad (original
    name for PowerShell) came out, I immediately converted all my VBScript-based administrative
    scripts to take advantage of the tab autocomplete feature in the PowerShell command
    shell. I’m always thinking of ways to make my life easier.


    This leads me to configuring the Docker CLI bash completion. Bash completion allows
    you to use tab autocomplete when writing your *docker* commands. While this was
    originally intended for developers, there’s nothing stopping you from using it
    to make administering Docker a lot easier. You do need to enable bash autocompletion
    on your Linux distribution prior to using the Docker completion script.


    On Ubuntu, run the following command to refresh the package database and install
    the bash autocompletion package:


    ```

    sudo apt update

    sudo apt install bash-completion

    ```


    On CentOS, run the following command:


    ```

    sudo yum -y install bash-completion

    ```


    Once bash autocompletion is enabled, place the Docker completion script in the
    */etc/bash_completion.d/* directory by running the following command. Be sure
    to run this command every time you update Docker:


    ```

    sudo curl https://raw.githubusercontent.com/docker/docker-ce/master/components/cli/contrib/completion/bash/docker
    -o /etc/bash_completion.d/docker.sh

    ```


    Log out of your current session and log back in again. You can try typing *docker
    images m* followed by the TAB. It saves you time from typing the SQL Server on
    Linux image name *mcr.microsoft.com/mssql/server:2017-CU14-ubuntu*. You can also
    use it to display the available parameters for a specific command. For example,
    try running *docker run –* followed by the TAB. It will display all the available
    parameters for the *docker run* command.'
