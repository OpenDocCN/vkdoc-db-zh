    ### ADD 指令


    `ADD` 指令与 `COPY` 指令类似，但除了仅在文件系统之间复制外，还具有额外的功能。你可以使用 `ADD` 指令从一个带有 URL 的远程位置进行复制。假设你想将
    `start.ps1` PowerShell 脚本从 [`github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/start.ps1`](https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/start.ps1)
    复制到你 Windows 上自定义 SQL Server 镜像的 `C:/` 目录下。你可以使用以下 `ADD` 指令：


    ```

    ADD https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/start.ps1
    /

    ```


    你可能已经猜到了 `start.ps1` PowerShell 脚本的用途。如果你查看在 [`github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/dockerfile`](https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/dockerfile)
    提供的用于创建 Windows 上自定义 SQL Server 镜像的 `Dockerfile`，你会发现该 `start.ps1` PowerShell
    脚本是在最后一个指令——即 `CMD` 指令中被调用的。


    我更倾向于在本地提供文件，而不是从 URL 复制。我想确保我使用的文件——无论是脚本还是安装文件——都没有任何潜在的文件损坏错误。我希望在将它们纳入任何自动化流程之前，能先在本地文件系统中手动测试它们。事实上，在我过去构建用于部署不同版本和版本的
    SQL Server 的自动化流程时，所有安装介质都已提前下载到网络文件共享中并经过手动测试。这样可以避免因为某个 CAB 文件损坏而导致安装失败，从而省去了排查故障的麻烦。我相信你过去在安装
    SQL Server 时也遇到过这种情况。


    ### SHELL 指令


    `SHELL` 指令允许覆盖用于命令 shell 形式的默认 shell。在 Windows 容器上使用此指令更为常见，因为 Windows 同时拥有 `cmd.exe`
    和 `powershell.exe` 两种 shell。Windows 的默认 shell 是 `cmd.exe`。作为一个 PowerShell 爱好者，我更喜欢在
    Windows 上使用 `SHELL` 指令，这样我就能充分利用使命令执行更简便的内置 cmdlet。`SHELL` 指令以 `SHELL ["executable",
    "parameters"]` 的形式编写。将 `RUN` 指令中使用的示例改写为使用 `SHELL` 指令：


    ```

    SHELL ["powershell", "-Command", "Set-Service MSSQLSERVER -StartupType Automatic"]

    ```


    如果你在 `Dockerfile` 中有一系列想要运行的 PowerShell 命令，这会使事情变得简单得多。假设你想在安装完成后从容器中删除 `SQL2016Dev_SP2`
    目录。你可以使用 `SHELL` 指令定义默认 shell，并使用 `RUN` 指令来执行 PowerShell 命令：


    ```

    #将 PowerShell 设置为命令 shell

    SHELL ["powershell", "-Command"]

    #运行 Set-Service PowerShell cmdlet 来配置 MSSQLSERVER

    RUN Set-Service MSSQLSERVER -StartupType Automatic

    #运行 Remove-Item PowerShell cmdlet 来删除目录

    RUN Remove-Item -Path C:/SQL2016Dev_SP2 -Recurse -Force

    ```


    显然，在构建镜像时利用 PowerShell，使用 `SHELL` 指令比使用 `RUN` 指令更高效。尽管你可能开始认为 `SHELL` 指令是专门为 Windows
    容器编写的，但你也可以在 Linux 上使用它来切换到不同的 shell。但是，当默认 shell 已经能完成你需要的大部分工作时，为什么还要在 Linux
    容器内这样做呢？


    ### CMD 指令


    `CMD` 指令允许你在使用 `docker run` 命令运行容器时设置一个默认命令和默认参数。如果在运行容器时你没有提供命令，就会执行此指令。但是，如果你选择用特定的命令运行容器，它就会被覆盖。与你可以在
    `Dockerfile` 中拥有多个的 `RUN` 和 `SHELL` 指令不同，只有最后一个 `CMD` 指令会被评估。拥有多个 `CMD` 指令是没有意义的。另外，你希望
    `CMD` 指令执行某些会持续运行而不会退出的操作。如果你执行一个完成后就退出的命令，容器也会随之终止。你不希望 `CMD` 指令在 Windows 中运行像
    `NET START MSSQLSERVER` 这样的服务，因为它会在命令完成后退出，并随之终止容器。想在容器内以服务方式运行 SQL Server，这样可不行。


    `CMD` 指令不是两种，而是有三种形式：


    *   `CMD ["executable", "param1", "param2"]`（`EXEC` 形式，这是推荐的形式）

    *   `CMD ["param1", "param2"]`（作为 `ENTRYPOINT` 的默认参数）

    *   `CMD command param1 param2`（`SHELL` 形式）


    如果你想在 `Dockerfile` 中将最后一条指令设为运行一个名为 `start.ps1` 的 PowerShell 脚本，以下是以 `EXEC` 形式表示的
    `CMD` 指令。这假设你已经在运行该脚本之前将其复制到了镜像内部。


    ```

    CMD ["powershell", "-Command", "C:/start.ps1"]

    ```


    以 `SHELL` 形式运行 `CMD` 指令会使其行为类似于 `SHELL` 形式的 `RUN` 指令，使用默认的操作系统命令 shell。如果你想运行自己的命令，你需要将命令表达为一个
    JSON 数组，传入可执行文件的完整路径并用双引号括起来——除非你使用了 `WORKDIR` 指令。以下是使用 `CMD` 指令运行一个名为 `sampleConsole.exe`
    的 .NET 控制台应用程序的示例：


    ```

    CMD ["C:/sampleConsole.exe", "--run"]

    ```


    正如我提到的，在运行容器时，你可以覆盖在 `CMD` 指令中定义的默认命令。例如，使用 `docker run` 命令运行 Windows Server 2016
    Core Docker 镜像会在创建后立即终止容器。我找不到创建此镜像的参考 `Dockerfile` 来查看其中的 `CMD` 指令，但它确实会在创建后终止。如果我想让容器保持运行，我可以向容器传递一个不会退出的命令，以覆盖
    `CMD` 指令中写的任何内容。以下是向 `docker run` 命令传递 `ping localhost -t` 命令的示例：


    ```

    docker run mcr.microsoft.com/windows/servercore:ltsc2016 ping localhost -t

    ```

    '
- fmt: '## The ENTRYPOINT Instruction


    As if having `RUN`, `SHELL`, and `CMD` instructions aren’t enough, here’s another
    one to add to the list: the `ENTRYPOINT` instruction. The `ENTRYPOINT` instruction
    is used to treat a running container as if it was an executable. This is typically
    used when you want a container to function as a portable packaging for a specific
    executable without expecting the user to override that executable during runtime.
    It’s very useful if you want your container to run the same executable every time.
    This means you cannot override the command with the `docker run` command. However,
    anything added to the end of the `docker run` command is appended to the command
    defined in the `ENTRYPOINT` instruction. I used to think that there was no use
    for the `ENTRYPOINT` instruction for SQL Server containers, until I realized that
    you can use this if you want to restrict the container from running anything else
    other than SQL Server and possibly pass parameters during startup. Besides, there’s
    nothing stopping you from overriding the `CMD` instruction that runs the `start.ps1`
    PowerShell script in Windows and just running the `ipconfig` command. Or the SQL
    Server process in Linux and just run `bash`. Of course, doing that also means
    no more SQL Server until you restart the container and not override the `CMD`
    instruction.


    Just like the `RUN` instruction, the `ENTRYPOINT` instruction has two forms, the
    EXEC (the preferred) form and the SHELL form. The following is an example of using
    the ENTRYPOINT instruction in EXEC form to run the SQL Server executable in Windows.
    Just replace the `{nn}` with the SQL Server version number you are running :


    ```dockerfile

    ENTRYPOINT ["C:/Program Files/Microsoft SQL Server/MSSQL{nn}.MSSQLSERVER/MSSQL/Binn/sqlservr.exe"]

    ```


    ## CMD vs. RUN vs. SHELL vs. ENTRYPOINT


    It can be confusing to choose between these different instructions when creating
    your `Dockerfile`. Just remember the following:


    *   There is only one effective `CMD` instruction in a `Dockerfile` – only the
    last one will be evaluated. Use this if you want your containers to override the
    command defined in the `CMD` instruction.

    *   Use the `RUN` instruction to run commands to build your custom Docker image.

    *   Use the `SHELL` instruction if you want to change the default command shell
    and leverage it for most of your commands.

    *   Use the `ENTRYPOINT` instruction to prevent users from overriding the executable
    that you want your container to run.

    *   You can combine the `ENTRYPOINT` instruction with the `CMD` instruction in
    a `Dockerfile`. When doing so, the string in the `CMD` instruction will be appended
    to the `ENTRYPOINT` instruction. The `CMD` instruction needs to be the last instruction
    in the `Dockerfile`.

    *   You can run either a process or a script with either the `ENTRYPOINT` or the
    `CMD` instruction. If you’re running a script, just make sure that it runs a process
    or command that doesn’t exit.


    The good thing about this is that building custom SQL Server images doesn’t need
    so many configuration settings. You just need a base image and the SQL Server
    installation files, then configure the SQL Server instance after installation,
    and you’re all set. You will see how these instructions are used together when
    we start writing the `Dockerfile`.


    ## The WORKDIR Instruction


    The `WORKDIR` instruction sets a working directory for other instructions, such
    as `RUN`, `CMD`, `ENTRYPOINT`, `COPY`, and `ADD`. If the `WORKDIR` does not exist
    in the target image during the build process, it will get created. It’s very useful
    when you want to run an executable or a script from a custom path – define the
    `WORKDIR` and then run the executable relative to it. You can think of it as doing
    a `cd` command inside the container during the build process. This is also useful
    if the path to your executable is very long, like the default installation directory
    for SQL Server on Windows, and you don’t want to repeat it all throughout the
    `Dockerfile`. However, using the `ENV` instruction is more appropriate to define
    the path since it is common to define paths as an environment variable. The following
    is an example of using the `WORKDIR` instruction to set the working directory
    to `C:/` during the build process:


    ```dockerfile

    WORKDIR /

    ```


    Again, it pays to think Linux when doing this in Windows to minimize escaping
    the escape character. Get it?


    ## The ENV Instruction


    The `ENV` instruction is a key-value pair that sets a persistent environment variable
    that is available both during build time and container runtime. Remember those
    `-e` parameters you’ve been using in the `docker run` command?


    The `ENV` instruction has two forms:


    *   `ENV <key> <value>`

    *   `ENV <key>=<value>`


    I prefer using the second form – `ENV <key>=<value>` – because it is much more
    explicit. It also allows for setting multiple key-value pairs in a single line.
    The following is an example of setting a key-value pair for the SQL Server EULA
    and assigning the `sa` login password. I opted to show them in multiple lines
    to separate the two:


    ```dockerfile

    ENV SA_PASSWORD="y0urSecUr3PAssw0rd"

    ENV ACCEPT_EULA="Y"

    ```


    But they can be combined in a single line as follows :


    ```dockerfile

    ENV SA_PASSWORD="y0urSecUr3PAssw0rd" ACCEPT_EULA="Y"

    ```'
