    If you noticed, we have been installing the latest version of SQL Server that
    we wanted – including the latest update (CU19 for SQL Server 2017 and CU1 for
    SQL Server 2019 at the time of writing). While it is highly recommended to always
    keep your SQL Server installations updated, you may need a specific version because
    that’s the one you’ve tested with your applications. Let’s say you want to install
    SQL Server 2017 CU14 because the standardized image that you want to build needs
    this specific version. You certainly don’t want to create a custom SQL Server
    on Linux image that contains anything higher than CU14\. You can modify Step 3
    to install a specific package that refers to the version of SQL Server that you
    want to install. You can check the specific SQL Server 2017 package from [*https://packages.microsoft.com/rhel/7/mssql-server-2017/*](https://packages.microsoft.com/rhel/7/mssql-server-2017/)
    (for RHEL and CentOS 7) or [*https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017/pool/main/m/mssql-server/*](https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017/pool/main/m/mssql-server/)
    (for Ubuntu 16.04). Or you can run the following command to list all the available
    packages:


    ```

    yum --showduplicates list mssql-server #for RHEL/CentOS

    apt -a list mssql-server #for Ubuntu

    ```


    The results of this command will depend on the *repo* file you defined in Step
    2\. Figure [10-4](#484552_1_En_10_Chapter.xhtml#Fig4) displays all the packages
    available for SQL Server 2017 on RHEL.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig4_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Different packages for SQL Server 2017 on RHEL


    You can use the following command to install SQL Server 2017 CU14:


    ```

    sudo yum install -y mssql-server-14.0.3076.1-2 #for RHEL/CentOS

    sudo apt-get install -y mssql-server=14.0.3076.1-2 #for Ubuntu

    ```


    All you have to do now is to replace Step 3 in the *Dockerfile* with the following
    command, replacing the appropriate package management command for the Linux distro
    that you’re working with:


    ```

    #Step 3

    RUN yum install -y mssql-server-14.0.3076.1-2 #for RHEL/CentOS

