- fmt: '# Docker多阶段构建与Docker Compose概述


    你可能会注意到存在两个`FROM`指令。是的，如果你的目标是进行多阶段构建，可以在一个`Dockerfile`中使用任意多个`FROM`指令。每个`FROM`指令都有一个从0开始的索引作为引用。步骤1可以被称为0，而步骤7可以被称为1。为了便于引用，通常使用别名。步骤1被命名为`build`，而步骤7被命名为`runtime`。在整个`Dockerfile`中，你可以通过索引或别名来引用这些构建阶段。在步骤6中，`RUN`指令的输出是一个名为`out`的目录，其中包含编译好的代码及其依赖项。由于这正是运行Web应用所需的一切，我们将使用步骤6的输出来构建另一个自定义镜像。在步骤7中，运行ASP.NET
    Core Web应用所需的基础镜像，比包含SDK的.NET Core镜像要小得多，如图10-16所示。步骤9简单地将步骤6生成的`out`目录复制到这个新镜像中。它使用`COPY
    --from`从一个单独的镜像而非本地文件系统进行复制。这个源镜像可以位于本地文件系统，也可以来自Docker Hub或Microsoft Container
    Registry等公共注册中心。步骤10和11你可能现在看起来很熟悉了。看看由多阶段构建生成的自定义镜像：262MB 对比 1.81GB。镜像大小的差异是巨大的。而且我们这里只看了一个镜像。想象一下，如果要处理一个基于微服务架构设计的多容器应用。


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig16_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig16_HTML.jpg)


    图 10-16

    仅包含编译代码、依赖项和运行时的自定义ASP.NET Web应用镜像大小


    正如我所说，这只是对如何使用多阶段构建的一个高级概述。如果你想了解更多关于多阶段构建的信息，请参考 [*https://docs.docker.com/develop/develop-images/multistage-build/*](https://docs.docker.com/develop/develop-images/multistage-build/)。在SQL
    Server领域，我们只有一个应用——SQL Server数据库引擎。我们不需要为了部署一个数据库而构建多容器应用。如果你在考虑像SQL Server Always
    On可用性组或SQL Server复制这样的多实例架构，它们需要部署到超越单个Linux Docker主机的高可用性平台。Kubernetes是部署此类架构的事实上的高可用性和容器编排平台。虽然我很想介绍一点Kubernetes的内容，但这已经超出了本书的范围。不过，它将是你在掌握Docker容器之后的下一步学习路径。


    # Docker Compose 与 YAML 文件


    去年，我举办的“SQL Server DBA的Docker容器指南”研讨会的一位与会者问我，为什么在我的示例和演示中没有使用YAML文件和Docker Compose。与多阶段构建类似，这是另一个用于运行和管理多容器应用程序的工具。虽然SQL
    Server DBA不需要处理它，但既然我已经介绍了多阶段构建，不妨也包含这部分内容。


    还记得XML曾经风靡一时吗？我记得在SQL Server认证考试中，需要处理任何与XML相关的考题。当我参与SQL Server 2008的考题编写过程时，我尽力否决任何与XML相关的内容——因为那时，关系数据库引擎并不是存储非关系数据的理想选择。然后JSON出现了。无论Jason是谁，他很幸运被选作这种新数据交换格式的代称。几年前，我们团队中有一位名叫Jason的同事负责为Microsoft
    Azure数据平台认证考试编写考题。每当我们谈论JSON时，都会会心一笑。XML和JSON都被用来标准化数据格式，因此DBA需要学习如何处理它们。


    YAML代表“YAML Ain’t Markup Language”。与XML和JSON一样，YAML也用于标准化数据格式。Docker和Kubernetes分别使用YAML来配置容器和Pod。这意味着你需要使用`Dockerfile`来自定义镜像，并使用YAML文件来描述构成你应用的不同容器和服务。但与只需要一个`Dockerfile`文件就能构建镜像不同，在Docker中处理YAML文件需要安装Docker
    Compose。


    ## 安装 Docker Compose


    Docker Compose仍然依赖于Docker引擎来执行其任务。因此，你可以直接在你的Linux Docker主机所在的同一台机器上安装Docker Compose，也可以在可以远程连接到Docker主机的开发机上安装。以下说明假设你将在与Linux
    Docker主机相同的机器上安装Docker Compose。


    运行以下命令以下载当前稳定版的Docker Compose。注意，它正在将文件复制到`/usr/local/bin`目录，该目录用于存放普通用户也可以运行的程序：


    ```bash

    sudo curl -L "https://github.com/docker/compose/releases/download/1.25.3/docker-compose-$(uname
    -s)-$(uname -m)" -o /usr/local/bin/docker-compose

    ```


    下载Docker Compose软件包后，就像处理bash脚本一样，给该文件赋予可执行权限：


    ```bash

    sudo chmod +x /usr/local/bin/docker-compose

    ```


    测试Docker Compose是否正确安装的一个简单方法是运行以下命令。截至本文撰写时，当前的稳定版本是`1.25.3`。


    ```bash

    docker-compose --version

    ```


    现在我们已经安装了Docker Compose，让我们看看如何利用它和YAML文件来部署多容器应用程序。'
  raw: 'One thing you’ll notice is the existence of two *FROM* instructions. Yes,
    you can have as many *FROM* instructions in a *Dockerfile* if your goal is to
    do multi-stage builds. Each *FROM* instruction is referenced by an index starting
    at 0\. Step 1 can be referred to as 0, while Step 7 can be referred to as 1\.
    For ease of reference, an alias is used. Step 1 is named as *build*, while Step
    7 is named as *runtime*. Throughout the *Dockerfile*, you can reference these
    builds using either their index or alias. In Step 6, the output of the *RUN* instruction
    is the *out* directory that contains the compiled code including the dependencies.
    Since that’s all we need to run the web app, we will use the output of Step 6
    to build another custom image. In Step 7, the base image needed to run an ASP.NET
    Core web app is much smaller than the .NET Core with SDK image as shown in Figure
    [10-16](#484552_1_En_10_Chapter.xhtml#Fig16). Step 9 simply copies the *out* directory
    generated from Step 6 into this new image. It uses *COPY --from* to copy from
    a separate image instead of from the local filesystem. The image could also be
    on either the local filesystem or from a public registry like Docker Hub or Microsoft
    Container Registry. Steps 10 and 11 probably look familiar to you by now. Take
    a look at the custom image generated by the multi-stage build: 262MB vs. 1.81GB.
    That’s a massive difference in image size. And we’re just looking at one image
    here. Imagine having to deal with a multi-container app designed with microservices
    architecture in mind.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig16_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig16_HTML.jpg)


    Figure 10-16


    Size of custom ASP.NET web app image with just the compiled code, dependencies,
    and runtime


    As I said, this is just a high-level overview of how to use multi-stage builds.
    Refer to [*https://docs.docker.com/develop/develop-images/multistage-build/*](https://docs.docker.com/develop/develop-images/multistage-build/)
    if you want to learn more about multi-stage builds. In the SQL Server world, we
    only have one app – the SQL Server database engine. We don’t need to build multi-container
    apps just to deploy a database. If you’re thinking of multi-instance architectures
    like SQL Server Always On Availability Groups or SQL Server Replication, those
    require deploying to a high availability platform beyond a single Linux Docker
    host. Kubernetes is the de facto high availability and container orchestration
    platform for deploying such architectures. While I’d like to cover a little bit
    of Kubernetes, it’s beyond the scope of this book. But that’s going to be your
    next path after Docker containers.


    ## Docker Compose and YAML Files


    Last year, an attendee of my *SQL Server DBA’s Guide to Docker Containers* workshop
    asked why I wasn’t using YAML files and Docker Compose in my examples and demos.
    Like multi-stage builds, this is another one of those tools used for running and
    managing multi-container applications. It’s not something SQL Server DBAs will
    have to deal with, but since I’ve already covered multi-stage builds, I might
    as well include this.


    Remember when XML was a thing? I recall having to deal with exam questions on
    SQL Server certification exams that have anything to do with XML. When I was involved
    in the exam writing process for SQL Server 2008, I tried my best to shoot down
    anything XML related – because, back then, the relational database engine isn’t
    the ideal storage for nonrelational data. Then came JSON. Whoever Jason was, he
    was lucky to have been chosen as a moniker for this new data interchange format.
    We had a guy named Jason as part of the team writing questions for the Microsoft
    Azure Data Platform certification exams a few years ago. We had a chuckle whenever
    we talk about JSON. Both XML and JSON were used to standardize data formats, hence
    why DBAs need to learn how to deal with them.


    YAML stands for YAML Ain’t Markup Language. Like XML and JSON, YAML is also used
    to standardize data formats. Both Docker and Kubernetes use YAML to configure
    containers and pods, respectively. This means working with a *Dockerfile* for
    customizing an image and a YAML file to describe the different containers and
    services that make up your app. But unlike working with a *Dockerfile* where all
    you need is the file to build an image, you need to install Docker Compose to
    work with YAML files in Docker.


    ### Installing Docker Compose


    Docker Compose still relies on the Docker engine to do its tasks. So, you can
    install Docker Compose directly either on the same machine as your Linux Docker
    host or on a development machine that can connect remotely to one. The following
    instructions assume you are installing Docker Compose on the same machine as your
    Linux Docker host.


    Run the following command to download the current stable release of Docker Compose.
    Observe that it is copying the files into the */usr/local/bin* directory, the
    one meant for programs that a normal user may run:


    ```

    sudo curl -L "https://github.com/docker/compose/releases/download/1.25.3/docker-compose-$(uname
    -s)-$(uname -m)" -o /usr/local/bin/docker-compose

    ```


    After downloading the Docker Compose package, just like dealing with a bash script,
    assign the *executable* permission to the file:


    ```

    sudo chmod +x /usr/local/bin/docker-compose

    ```


    An easy way to test if Docker Compose is installed properly is to run the following
    command. The current stable release at the time of writing is *1.25.3*.


    ```

    docker-compose –version

    ```


    Now that we have Docker Compose installed, let’s look at how we can leverage it
    with YAML files to deploy multi-container applications.'
  trans: '

    # Docker 多阶段构建与 Docker Compose 概述


    你可能会注意到存在两个`FROM`指令。是的，如果你的目标是进行多阶段构建，可以在一个`Dockerfile`中使用任意多个`FROM`指令。每个`FROM`指令都有一个从
    0 开始的索引作为引用。步骤 1 可以被称为 0，而步骤 7 可以被称为 1。为了便于引用，通常使用别名。步骤 1 被命名为`build`，而步骤 7 被命名为`runtime`。在整个`Dockerfile`中，你可以通过索引或别名来引用这些构建阶段。在步骤
    6 中，`RUN`指令的输出是一个名为`out`的目录，其中包含编译好的代码及其依赖项。由于这正是运行 Web 应用所需的一切，我们将使用步骤 6 的输出来构建另一个自定义镜像。在步骤
    7 中，运行 ASP.NET Core Web 应用所需的基础镜像，比包含 SDK 的.NET Core 镜像要小得多，如图 10-16 所示。步骤 9 简单地将步骤
    6 生成的`out`目录复制到这个新镜像中。它使用`COPY --from`从一个单独的镜像而非本地文件系统进行复制。这个源镜像可以位于本地文件系统，也可以来自
    Docker Hub 或 Microsoft Container Registry 等公共注册中心。步骤 10 和 11 你可能现在看起来很熟悉了。看看由多阶段构建生成的自定义镜像：262MB
    对比 1.81GB。镜像大小的差异是巨大的。而且我们这里只看了一个镜像。想象一下，如果要处理一个基于微服务架构设计的多容器应用。


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig16_HTML.jpg](img/484552_1_En_10_Fig16_HTML.jpg)


    图 10-16

    仅包含编译代码、依赖项和运行时的自定义 ASP.NET Web 应用镜像大小


    正如我所说，这只是对如何使用多阶段构建的一个高级概述。如果你想了解更多关于多阶段构建的信息，请参考 [*https://docs.docker.com/develop/develop-images/multistage-build/*](https://docs.docker.com/develop/develop-images/multistage-build/)。在
    SQL Server 领域，我们只有一个应用——SQL Server 数据库引擎。我们不需要为了部署一个数据库而构建多容器应用。如果你在考虑像 SQL Server
    Always On 可用性组或 SQL Server 复制这样的多实例架构，它们需要部署到超越单个 Linux Docker 主机的高可用性平台。Kubernetes
    是部署此类架构的事实上的高可用性和容器编排平台。虽然我很想介绍一点 Kubernetes 的内容，但这已经超出了本书的范围。不过，它将是你在掌握 Docker
    容器之后的下一步学习路径。


    # Docker Compose 与 YAML 文件


    去年，我举办的“SQL Server DBA 的 Docker 容器指南”研讨会的一位与会者问我，为什么在我的示例和演示中没有使用 YAML 文件和 Docker
    Compose。与多阶段构建类似，这是另一个用于运行和管理多容器应用程序的工具。虽然 SQL Server DBA 不需要处理它，但既然我已经介绍了多阶段构建，不妨也包含这部分内容。


    还记得 XML 曾经风靡一时吗？我记得在 SQL Server 认证考试中，需要处理任何与 XML 相关的考题。当我参与 SQL Server 2008 的考题编写过程时，我尽力否决任何与
    XML 相关的内容——因为那时，关系数据库引擎并不是存储非关系数据的理想选择。然后 JSON 出现了。无论 Jason 是谁，他很幸运被选作这种新数据交换格式的代称。几年前，我们团队中有一位名叫
    Jason 的同事负责为 Microsoft Azure 数据平台认证考试编写考题。每当我们谈论 JSON 时，都会会心一笑。XML 和 JSON 都被用来标准化数据格式，因此
    DBA 需要学习如何处理它们。


    YAML 代表“YAML Ain’t Markup Language”。与 XML 和 JSON 一样，YAML 也用于标准化数据格式。Docker 和 Kubernetes
    分别使用 YAML 来配置容器和 Pod。这意味着你需要使用`Dockerfile`来自定义镜像，并使用 YAML 文件来描述构成你应用的不同容器和服务。但与只需要一个`Dockerfile`文件就能构建镜像不同，在
    Docker 中处理 YAML 文件需要安装 Docker Compose。


    ## 安装 Docker Compose


    Docker Compose 仍然依赖于 Docker 引擎来执行其任务。因此，你可以直接在你的 Linux Docker 主机所在的同一台机器上安装 Docker
    Compose，也可以在可以远程连接到 Docker 主机的开发机上安装。以下说明假设你将在与 Linux Docker 主机相同的机器上安装 Docker
    Compose。


    运行以下命令以下载当前稳定版的 Docker Compose。注意，它正在将文件复制到`/usr/local/bin`目录，该目录用于存放普通用户也可以运行的程序：


    ```bash

    sudo curl -L "https://github.com/docker/compose/releases/download/1.25.3/docker-compose-$(uname
    -s)-$(uname -m)" -o /usr/local/bin/docker-compose

    ```


    下载 Docker Compose 软件包后，就像处理 bash 脚本一样，给该文件赋予可执行权限：


    ```bash

    sudo chmod +x /usr/local/bin/docker-compose

    ```


    测试 Docker Compose 是否正确安装的一个简单方法是运行以下命令。截至本文撰写时，当前的稳定版本是`1.25.3`。


    ```bash

    docker-compose --version

    ```


    现在我们已经安装了 Docker Compose，让我们看看如何利用它和 YAML 文件来部署多容器应用程序。

    '
- fmt: '### Creating a YAML File for Multi-container Apps


    I’ll be using the samples from [https://github.com/microsoft/sqllinuxlabs/tree/master/containers/mssql-aspcore-example](https://github.com/microsoft/sqllinuxlabs/tree/master/containers/mssql-aspcore-example)
    to demonstrate this. In case you’re wondering, the ASP.NET web app that I used
    in the multi-stage build came from this. The app consists of a simple two-tier
    application – a web front end running on ASP.NET Core that connects to a back-end
    SQL Server database – two apps, two containers. Download all the contents so you
    can follow along.


    I used my custom SQL Server on Linux image created in the “Running Scripts Inside
    the Dockerfile” section to run bash scripts inside the container that creates
    the user database from the `db-init.sql` script. The following code is what we
    will be using for the YAML file:


    ```yaml

    version: "3"

    services:

    wfe:

    build: ./mssql-aspcore-example-app

    ports:

    - "8080:5000"

    depends_on:

    - db

    db:

    build: ./mssql-aspcore-example-db

    environment:

    SA_PASSWORD: "mYSecUr3PAssw0rd"

    ACCEPT_EULA: "Y"

    ports:

    - "1500:1433"

    ```


    Let’s analyze the YAML file to understand what it is doing:


    *   The `version`: Line describes the version number that the Compose file will
    use for syntax validation. Version 3 works with the Docker engine version 1.13.0
    and higher.

    *   The `services`: Line describes the different services that we will run for
    this multi-container app – the `wfe` and the `db` services. The `db` service is
    named in such a way as to map to the database connection string defined in the
    `appsettings.json` file.

    *   The `build`: Line is like running the `docker build` command. You’re telling
    Docker Compose to look for a `Dockerfile` inside the `./mssql-aspcore-example-app`
    directory to build the image for the `wfe` service and the `./mssql-aspcore-example-db`
    for the `db` service.

    *   The `ports`: Line is like the `-p` parameter in the `docker run` command,
    publishing the container’s TCP port to the host. The `wfe` service will use port
    8080 on the Linux Docker host that will be mapped to port 5000 on the container.
    The `db` service will use port 1500. You can also choose to remove the `ports`
    definition on the `db` service, and it will default to port 1433.

    *   The `depends_on`: Line sets a service as a dependency for the current block-defined
    container. In this case, the `wfe` service depends on the `db` service. Because
    of this, Docker Compose will first start (or run the container that contains)
    the `db` service before starting the `wfe` service. It’s like starting the SQL
    Server service before starting the SQL Server Agent service. The behavior is reversed
    when stopping the service. However, Docker Compose does not wait until the container
    is fully ready before starting the dependent container. It just waits until the
    container is running. Recall that creating a new SQL Server on Linux container
    is like performing an upgrade because everything starts from the RTM version.
    You have to account for delays until the container is fully ready – hence, why
    I used my custom SQL Server on Linux image with the scripts.

    *   The `environment`: Line is like the `-e` parameter of the `docker run` command.
    Here, we’re passing the two environment variables that we have been passing to
    the `docker run` command when we’re running a SQL Server instance on a container.


    Imagine how powerful this can be when you’re dealing with multi-container apps.
    You can have a single YAML file to describe the entire architecture. Save the
    file as `docker-compose.yml` – this is the default filename that Docker Compose
    references just like the `Dockerfile`. But don’t rush yet. Dealing with YAML files
    can be tricky due to the formatting. I sometimes have to use a YAML parser like
    this one from [https://codebeautify.org/yaml-validator](https://codebeautify.org/yaml-validator)
    to make sure that any error I get has nothing to do with formatting. Once you’re
    done, run the following command. The `up` subcommand is used to build, (re)create,
    start, and attach containers to a service. Figure [10-17](#484552_1_En_10_Chapter.xhtml#Fig17)
    shows what the `docker-compose` command is doing.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig17_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig17_HTML.jpg)


    Figure 10-17: Status of Docker Compose execution


    ```bash

    docker-compose up

    ```


    Docker Compose does the following tasks during execution:


    1.  Docker will create a `bridge` network for the two containers to communicate
    with each other. By default, Docker Compose will create a single docker network
    for your app. We will cover Docker networking in more detail in [Chapter 11](#484552_1_En_11_Chapter.xhtml).

    2.  Docker builds the `wfe` and `db` images based on their corresponding `Dockerfile`.
    Because the `wfe` is dependent on the `db`, the `db` image will be built first.
    Docker will only build the image if it doesn’t exist yet. If it does, it will
    simply use the available image. By default, the image name will be in the form
    `directoryName_service:latest`. The image name for the `wfe` will be `mssql-aspcore-example_wfe:latest`,
    while the image name for the `db` will be `mssql-aspcore-example_db:latest`.

    3.  After building the images, Docker creates and starts the corresponding containers
    based on these images. It will first create and run the `db` container, followed
    by the `wfe` container, as defined in the YAML file. The container names will
    be in the format `imageName_1` – `mssql-aspcore-example_wfe_1` for the `wfe` and
    `mssql-aspcore-example_db_1` for the `db`.


    Docker Compose allows you to do all of these instead of running `docker network
    create`, `docker build`, and `docker run` commands separately. And we’re just
    working with two containers here. Imagine having to deal with more. And it also
    allows you to define infrastructure as code with the YAML file.


    #### Note

    Because the containers are running in your current terminal interactively, you
    can’t just do a Ctrl+C to exit – this will also stop the containers. You can open
    another terminal session to explore and manage the containers.


    I’m barely scratching the surface of what you can do with Docker Compose in this
    section. Refer to [https://docs.docker.com/compose/](https://docs.docker.com/compose/)
    for additional information on how to leverage it with multi-container apps. But
    like I said, as SQL Server DBAs, you won’t be dealing with multi-container apps
    if all you need to do is deploy a SQL Server database. At least, you have an idea
    of what the developers are doing when they mention a thing or two about Docker
    Compose.


    ## Summary


    This chapter is an extension of the previous one on creating custom SQL Server
    on Docker images. And there’s a reason I decided to cover more topics despite
    already covering the basics in [Chapter 9](#484552_1_En_9_Chapter.xhtml). If you
    noticed, majority of the contents in this book revolve around Docker on Linux.
    Microsoft has fully invested on Linux and SQL Server is proof of that. That tells
    a lot about where SQL Server is headed in the future and how it will affect your
    career as a DBA. I see a future where most of the SQL Server deployments will
    be on Linux, be it on a physical machine, a virtual machine, or a container. That’s
    why this chapter combines everything you’ve learned from the previous chapters
    when it comes to working with both Linux and Docker – from installing SQL Server
    on Linux to writing bash scripts. My goal is to get you ready for that future.


    But we’re not done yet. The next chapter covers the basics of Docker networking
    and explores the `bridge` network that I mentioned in more detail.'
