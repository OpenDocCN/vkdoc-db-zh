    准备好迎接下一章，我们将更详细地从文件系统的角度来探讨镜像和容器。


    ## 5. Docker 镜像与容器


    > “美：所有部分比例协调，使得无法增、删或改变，而不损害整体的和谐。”

    >

    > —莱昂·巴蒂斯塔·阿尔贝蒂


    出生和成长在一个发展中国家自有其挑战，有趣的是，至少可以这么说。我们家属于中低收入阶层，只有一个挣钱的人。所以，像零食和看电影这样的事情被认为是奢侈。想象一下，我
    8 岁时第一次走进麦当劳餐厅时的感受。


    1984 年的一个夏日午后，我们的“提塔”（阿姨）带我和我哥哥去了麦当劳餐厅。我第一次接触开心乐园餐的经历平淡无奇—— regular burger（ regular
    汉堡）配上薯条和一杯饮料，还附赠了一套乐高积木。就一个 8 岁的孩子而言，这是一顿附带玩具套餐的盛宴（事实上，当时的份量也很大）。我从阿姨的脸上看出，如果我们要求更多，她会非常乐意满足。我不需要任何说服。菜单上展示了一杯诱人的巧克力奶昔图片，是炎炎夏日的完美饮品。


    当服务员准备我的奶昔时，我忍不住注意到旁边有一个巨大的 soda dispenser（苏打水机）。每个准备带饮料订单的服务员都会把一个空杯子放在其中一个分配器下面，按下其中一个可爱的小按钮，饮料就出来了。我幼小的大脑立刻充满了问题。饮料是从哪里来的？它怎么知道去哪里取水、可口可乐或根汁汽水？它怎么能把所有饮料都装进那个小机器里？机器后面是不是有个人，他唯一的工作就是给苏打水机加饮料？真的会下芝士汉堡雨吗？


    当你在一家销售十几种或更多饮料的全球快餐连锁店工作时，了解像 soda dispenser（苏打水机）这样的机器如何工作是有帮助的。你想知道饮料供应商是谁，如何将正确的饮料罐连接到
    soda dispenser（苏打水机），以及如果机器停止分配饮料该怎么办。我 8 岁时的问题，无论是针对那台苏打水机，还是现在处理 Docker 镜像和容器，都同样有效。


    本章将从存储的角度介绍 Docker 镜像和容器的内部工作原理。我们将探讨镜像的构成、如何描述它们以及它们如何在文件系统中存储。你越了解 Docker 如何处理镜像，就越有能力设计自己的自定义镜像。


    **注意**


    除非另有说明，本章中的大部分示例都将与 Linux 相关。这将给你一个机会，在同时学习 Docker 镜像和容器的同时，提高你使用 Linux 文件系统的技能。'
- fmt: '## A Quick Review (And Then Some…)


    在上一章中，我从高层次概述了镜像与容器的区别。我将重复一遍，因为重复是掌握的关键。但由于本书更侧重于深入探讨镜像和容器，我们将更详细地探索这些概念。那么，开始吧。


    一个 Docker 镜像是一个静态的、*只读*的模板，用于创建应用容器。它是运行应用程序所需的各种组件的非运行状态表示。镜像由一组按照文件系统层次结构组织的文件组成，其中包含应用文件、应用所需的操作系统依赖文件（如库）以及描述其内容的元数据。每个文件系统层仅仅是相对于前一层的差异集合，类似于一系列
    SQL Server 事务日志备份，它们与完整的数据库备份一起构成了一个日志序列链，而完整备份即为基础镜像。回想一下你在上一章运行`docker pull`命令的情景。图
    [5-1](#484552_1_En_5_Chapter.xhtml#Fig1) 展示了对应于`docker pull`命令输出的、SQL Server on
    Linux 镜像的分层文件系统。不要认为那一堆系统生成的、64个字符（通常显示为12位的短字符串）的十六进制字符串是无意义的。每条“Pull complete”消息都代表构成整个镜像的一个文件系统层。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig1_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig1_HTML.jpg)


    图 5-1


    包含镜像层的 SQL Server on Linux 镜像


    然而，一个 Docker 容器是该镜像的运行时实例。你创建和运行的每个 Docker 容器都将基于这个只读的镜像模板。你可以将 Docker 镜像视为蓝图，就像汽车的技术图纸。你根据你希望汽车（Docker
    容器）的外观和功能来创建蓝图（Docker 镜像）。一旦蓝图最终确定，你就可以根据该蓝图创建任意数量的汽车实例。你可以自由地改变汽车的美学——颜色、配件、内饰等——而无需修改蓝图。如果你决定对汽车进行重大修改，你必须回到绘图板重新编写蓝图。


    如果 Docker 镜像是只读模板，那么你如何可能运行需要对文件系统进行更改的容器呢？向只读介质写入数据就像试图向一次性写入的 CD-ROM 写入数据一样。第二次是行不通的（而且在当今世界，谁还用
    CD-ROM 呢？）。当然，如果我们要修改只读模板内的文件，底下一定有些魔法在起作用。此外，一个只读数据库除了用于报告和分析之外，还有什么用处呢？即使是对
    SQL Server 实例的简单配置更改也需要修改`master`数据库数据文件。


    秘密在于，容器实际上是一个位于只读层之上的薄薄的可读写文件系统层。图 [5-2](#484552_1_En_5_Chapter.xhtml#Fig2) 展示了
    Docker 容器如何作为一个薄薄的可读写文件系统层，在只读层之上运行。`docker run`命令返回代表这个薄薄的可读写层的容器 ID。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig2_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig2_HTML.jpg)


    图 5-2


    作为可读写文件系统层的 SQL Server on Linux 容器


    这个可读写文件系统层类似于 Microsoft Hyper-V 中的差异磁盘和 VMWare 中的链接克隆的工作原理。你可以从同一个镜像创建任意多的容器，在镜像和容器之间形成一对多的关系。你对容器所做的任何更改都只发生在可读写文件系统层中，不会影响基础的只读层。这个薄薄的可读写层也解释了为什么容器比物理机或虚拟机启动得更快。与虚拟机不同，你不需要在容器中启动整个系统。你只是在启动它们，跳过了启动操作系统所需的所有进程。由于
    Docker 主机的操作系统基础已经启动，容器所要做的就是创建可读写文件系统层并加载所有必要的文件来启动其中的应用程序。


    既然我们已经确立了 Docker 容器实际上是一个运行在只读文件系统层之上的薄薄的可读写文件系统层这一事实，让我们开始更深入地挖掘一下。


    ## 拉取镜像的背后原理


    在上一章中，“Docker 如何运行容器”一节让你了解了 Docker 生态系统中的不同组件如何协同工作以运行容器。第 4 步是 Docker 守护进程联系
    Docker Hub 搜索并拉取镜像，为运行它做准备。但是，你是否想过 Docker Hub 如何知道你的 Docker 主机运行在什么平台上，以及如何提供正确的镜像呢？我指的是当你运行`docker
    info`命令时获得的平台信息，如图 [5-3](#484552_1_En_5_Chapter.xhtml#Fig3) 所示。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig3_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig3_HTML.jpg)


    图 5-3


    来自`docker info`命令的你的 Docker 主机平台信息


    回想一下，在 Microsoft 废弃他们的`hello-world`镜像版本之前，我可以在 Windows Server 和 Linux Docker 主机上运行相同的`docker
    run hello-world`命令，并得到相同的输出。只要存在可用的镜像，Docker Hub 就会根据平台信息为你的 Docker 主机提供正确的镜像。


    在上一章的第 4 步和第 5 步之间，有一些处理*清单（manifests）*的中间步骤。不要对清单是什么感到困惑。它只是一个描述镜像内容的 JSON 文件的华丽说法：构成镜像的文件系统层、它们的大小和摘要（digest）。图
    [5-4](#484552_1_En_5_Chapter.xhtml#Fig4) 介绍了这些中间步骤。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig4_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig4_HTML.jpg)


    图 5-4


    Docker Hub 根据清单发送正确的镜像


    让我们探索第 4 步和第 5 步之间的中间步骤：


    1.  如果 Docker 守护进程没有`hello-world`容器镜像的本地副本，它会在 Docker Hub 中搜索该镜像（第 4 步）。Docker
    守护进程还发送平台信息——主要是操作系统和 CPU 架构——到 Docker Hub 并查询清单。

    2.  如果存在一个“胖”清单，Docker Hub 会在其中搜索与 Docker 守护进程的平台信息（来自第 4a 步）匹配的部分，并将查询重定向到相应的镜像清单（第
    4b 步）。

    3.  解析镜像清单，读取构建镜像所需的相应文件系统层。然后，这些文件系统层被发送到 Docker 守护进程（第 4c 步）。

    4.  一旦下载完成，Docker 守护进程就会基于`hello-world`镜像创建并运行一个新容器（第 5 步）。


    使用胖清单允许像 Docker Hub 这样的镜像仓库向 Docker 主机提供正确的镜像。你肯定不希望一个 Linux Docker 主机从镜像仓库拉取一个基于
    Windows 的镜像，对吧？那是无法工作的。'
  raw: '## A Quick Review (And Then Some…)


    In the previous chapter, I gave you a high-level overview of the difference between
    an image and a container. I’m going to repeat it because repetition is key to
    mastery. But since this is more of a deep dive coverage into images and containers,
    we’re going to explore the concepts in more detail. So, here goes.


    A Docker image is a static, *read-only* template for creating application containers.
    It’s a non-running representation of all the various components required to run
    the application. An image consists of a set of files structured in a filesystem
    layer that contains application files, operating system–dependent files like libraries
    that your application needs, and metadata that describes what it is. Each filesystem
    layer is only a set of differences from the layer before it, much like a series
    of SQL Server transaction log backups that make up a log sequence chain with the
    full database backup being the base image. Think back to when you ran the *docker
    pull* command in the previous chapter. Figure [5-1](#484552_1_En_5_Chapter.xhtml#Fig1)
    illustrates this layered filesystem corresponding to the output of the *docker
    pull* command for the SQL Server on Linux image. Don’t think that the bunch of
    system-generated, 64-character – represented by short 12-digit – hex strings are
    meaningless. Each *Pull complete* message represents a filesystem layer that makes
    up the entire image.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig1_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    SQL Server on Linux image with image layers


    A Docker container, however, is a runtime instance of the image. Every Docker
    container you create and run will be based on the read-only image template. You
    can think of a Docker image as a blueprint, like a technical drawing for a car.
    You create the blueprint (Docker image) according to how you want the car (Docker
    container) to look like and function. Once the blueprint has been finalized, you
    can create as many instances as you want of the car from the blueprint. You have
    the freedom to make changes to the aesthetic of the car – color, accessories,
    interiors, and the like – without the need to modify the blueprint. Should you
    decide to make major modifications to the car, you have to go back to the drawing
    board and rewrite the blueprint.


    If a Docker image is a read-only template, how can you possibly run containers
    that require making changes to the filesystem? Writing to a read-only media is
    like trying to write data to a write-once CD-ROM. It doesn’t work the second time
    (and who still uses CD-ROMs in today’s world?). Surely, there’s some magic happening
    under the covers if we need to make changes to the files inside the read-only
    template. Besides, how useful will a read-only database be outside of reporting
    and analytics? Even a simple configuration change to the SQL Server instance requires
    making changes to the *master* database data files.


    The secret lies in the fact that a container is really a thin, read-write filesystem
    layer that sits on top of the read-only layer. Figure [5-2](#484552_1_En_5_Chapter.xhtml#Fig2)
    illustrates how a Docker container functions as a thin, read-write filesystem
    layer sitting on top of the read-only layer. The *docker run* command returns
    the container ID representing the thin, read-write layer.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig2_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    SQL Server on Linux container as a read-write filesystem layer


    This read-write filesystem layer is similar to how differencing disks work in
    Microsoft Hyper-V and linked clones in VMWare. You can create as many containers
    as you want from the same image, creating a one-to-many relationship between the
    image and the container. Any change you make to the container only happens in
    the read-write filesystem layer and does not affect the base read-only layer.
    This thin, read-write layer also explains why containers start up quickly compared
    to physical or virtual machines. Unlike with virtual machines, you are not booting
    up an entire system with containers. You are simply starting them up, skipping
    all the processes required to boot up an operating system. Since the base operating
    system of the Docker host is already started, all the container has to do is create
    the read-write filesystem layer and load all the necessary files to start the
    app inside it.


    Now that we’ve established the fact that a Docker container is really a thin,
    read-write filesystem running on top of a read-only filesystem layer, let’s start
    digging a little bit deeper.


    ## Behind the Scenes of Pulling Images


    In the previous chapter, the section on “How Docker Runs Containers” gave you
    an idea of how the different components in the Docker ecosystem work together
    to run a container. Step #4 is where the Docker daemon would reach out to Docker
    Hub to search for and pull an image in preparation for running it. But have you
    ever wondered how Docker Hub knew what platform your Docker host is running on
    and how to give it the correct image? And I mean the platform information that
    you get when you run the `docker info` command , like the one shown in Figure
    [5-3](#484552_1_En_5_Chapter.xhtml#Fig3).


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig3_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Platform information of your Docker host from the docker info command


    Recall that prior to Microsoft deprecating their version of the *hello-world*
    image, I can run the same `docker run hello-world` command on both Windows Server
    and Linux Docker hosts and would get the same output. Docker Hub will give your
    Docker host the correct image based on the platform information so long as there
    is an available image.


    In between the previous chapter’s Step #4 and Step #5 are intermediate steps that
    deal with *manifests*. Don’t get confused about what a manifest is. It’s just
    a fancy term for a JSON file that describes what the image is: the filesystem
    layers that make up the image, their sizes, and the digest. Figure [5-4](#484552_1_En_5_Chapter.xhtml#Fig4)
    introduces those intermediate steps.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig4_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Docker Hub sending the correct image based on manifests


    Let’s explore the intermediate steps between Step #4 and Step #5:


    1.  If the Docker daemon doesn’t have a local copy of the *hello-world* container
    image, it searches Docker Hub for the image (Step #4). The Docker daemon also
    sends platform information – mainly OS and CPU architecture – to Docker Hub and
    queries for manifest.


    2.  If a “fat” manifest exists, Docker Hub searches it for the section that matches
    the Docker daemon’s platform information (from Step #4a) and redirects the query
    to the corresponding image manifest (Step #4b).


    3.  The image manifest gets parsed, reading the corresponding filesystem layers
    required to build the image. Those filesystem layers are then sent to the Docker
    daemon (Step #4c).


    4.  Once the download completes, the Docker daemon created and ran a new container
    based on the *hello-world* image (Step #5).


    The use of a fat manifest allows an image repository like Docker Hub to serve
    the right image to a Docker host. You wouldn’t want a Linux Docker host pulling
    a Windows-based image from an image repository, would you? That’s not going to
    work.'
