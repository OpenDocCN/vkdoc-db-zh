- fmt: "## The Container Layer\n\nWe spent a lot of time digging deep into the read-only\
    \ filesystem layers of the image because that sets you up to understand the read-write\
    \ filesystem layer that is the container. Recall that a container is simply a\
    \ thin read-write layer that sits on top of the read-only layers. After the Docker\
    \ daemon builds the read-only filesystem layers for the image from the contents\
    \ of the directories, it creates the thin read-write layer for the container.\
    \ This read-write layer gets created inside the `/var/lib/docker/overlay2` directory,\
    \ with the same file structure and link references as the read-only layers.\n\n\
    Modifying data in the container happens in this read-write layer. This is made\
    \ possible via the `copy-on-write` (CoW) strategy. Go back to how the union filesystem\
    \ works. The `diff` directory of the read-write layer has the contents of the\
    \ container. If you perform a change on a file that exists on any of the read-only\
    \ filesystem layer, the union filesystem will perform a `copy_up` operation to\
    \ copy the file from the `diff` directory of the filesystem layer containing the\
    \ file to the `diff` directory of the container. Once the file has been copied,\
    \ the change is then performed. Subsequent changes made to the file will be written\
    \ to the `diff` directory of the read-write layer. But unlike SQL Server where\
    \ it copies data pages (or extents, depending on the number of data pages affected)\
    \ to a database snapshot when a record is modified, Docker copies the entire file.\
    \ This makes it inefficient working with large, write-intensive processes like\
    \ relational databases. Containers that write a lot of data will require more\
    \ disk space on the read-write layer. Dealing with storage requirements of write-intensive\
    \ applications like relational databases will be covered in [Chapter 7](#484552_1_En_7_Chapter.xhtml).\n\
    \nNote\n\nI only used database snapshots in SQL Server as an illustration to showcase\
    \ how the copy-on-write strategy works similarly with containers. However, the\
    \ write process is reversed. With SQL Server database snapshots, the original\
    \ data is written in the snapshot and is not modified, giving you a point-in-time\
    \ view of the database. With containers, the original file is written in the read-write\
    \ layer and is the one being modified.\n\nDeleting data in a container involves\
    \ creating a `whiteout` file in the `diff` directory of the read-write layer.\
    \ A `whiteout` file in a union filesystem is a special file with a `.wh.` extension\
    \ similar to those whiteout correction tapes you see in office supply stores.\
    \ It’s like painting a file white so it appears to be gone from the point of view\
    \ of the container. You can’t see it but it’s there, just beneath the white paint.\n\
    \nMuch like stopping a running virtual machine, stopping a container does not\
    \ remove the read-write layer. Everything that Docker wrote on the read-write\
    \ layer remains in the local disk. The only time the directory of the read-write\
    \ layer gets deleted from disk is when you delete the container. Imagine creating\
    \ user databases in your SQL Server instance in a container. The data and log\
    \ files get created on the read-write layer. If you delete the container, the\
    \ SQL Server data and log files get deleted as well. We need to be able to deal\
    \ with SQL Server databases in a way that is outside the container. We’ll cover\
    \ this more detail in [Chapter 7](#484552_1_En_7_Chapter.xhtml).\n\n## Summary\n\
    \nThis chapter covered how Docker images and containers work under the covers\
    \ from the storage point of view. We’ve looked at how the filesystem layers are\
    \ stored on disk with the use of content digests and distribution hashes, how\
    \ they are referenced by the Docker daemon to create an image using a union filesystem,\
    \ and how a container is simply a thin, read-write filesystem layer sitting on\
    \ top of the read-only layers. In the next chapter, we’ll look at the most common\
    \ administrative tasks that you’ll perform when working with SQL Server on containers.\n\
    \n# 6. Managing and Administering Containers\n\n> Never be afraid to take on a\
    \ really tough problem. When you solve it, the benefits will be that much greater.\n\
    > \n> —Carl Gerstacker\n\nWorking with digital audio workstations (DAW) as a musician\
    \ has created a lot of opportunities for creating music. When I was learning how\
    \ to play the piano, all I knew was the 88 different keys that I could play across\
    \ the keyboard. As I progressed into playing with different bands, it became impractical\
    \ for me to always ask for a venue that had an analog upright piano. Besides,\
    \ there was no way I would carry a 300-lb piano with me during performances. That’s\
    \ when I decided to invest in a lightweight digital synthesizer.\n\nAs I was getting\
    \ ready for one of our performances, I noticed the keyboard player of the next\
    \ band set up his MacBook Pro and plugged it into the digital synthesizer. The\
    \ mere presence of a MacBook Pro working alongside a musical instrument got me\
    \ curious. I’d never seen this before. I’m pretty sure he was not about to write\
    \ a Python script during the performance. So, I asked the guy about his setup.\
    \ He explained how the software on his MacBook Pro created different sounds that\
    \ he used when playing. He let me listen to the sound of a piano layered with\
    \ a beautiful violin and strings to evoke a feeling of tranquility, as if spending\
    \ a quiet afternoon near the lake. An arpeggiated techno sound can evoke an upbeat\
    \ feeling and can make you move your feet. It’s a totally different world of music.\
    \ I decided to try it out and played around with a copy of the Ableton Live software\
    \ on my MacBook Pro. I was hooked. I was making my own sound samples, audio tracks,\
    \ loops – anything that would expand my musical creativity. My setup now included\
    \ the MacBook Pro together with my digital synthesizer.\n\nBut working with any\
    \ new tools comes with its own set of challenges. I now have to worry about managing\
    \ the large audio files that my DAW created, moving them around so as to avoid\
    \ filling up my main hard drive. I also have to keep a list of configuration settings\
    \ that I need when playing at different venues and different equipment. And the\
    \ more audio files I create, the more I need to properly name them so I know what\
    \ they are and how I use them. The last thing I want is to be fumbling around\
    \ trying to find an audio file that I need right in the middle of a performance.\n\
    \nI did say working with any new tools and technology comes with its own set of\
    \ challenges. The same is true working with `docker` – or any technology you might\
    \ get your hands on. This chapter will cover the most common tasks that you will\
    \ perform as someone who manages Docker, tasks such as creating, starting, and\
    \ stopping SQL Server on containers. In the previous chapters, you’ve already\
    \ been introduced to some of the `docker` commands that we will be using. So,\
    \ you should be familiar with them at this point. We’ll also look at making configuration\
    \ changes to the Docker daemon outside of the default. I won’t be covering any\
    \ SQL Server administrative tasks as I would assume you’re already familiar with\
    \ that. You’re a SQL Server DBA after all, aren’t you?"
  raw: "## The Container Layer\n\nWe spent a lot of time digging deep into the read-only\
    \ filesystem layers of the image because that sets you up to understand the read-write\
    \ filesystem layer that is the container. Recall that a container is simply a\
    \ thin read-write layer that sits on top of the read-only layers. After the Docker\
    \ daemon builds the read-only filesystem layers for the image from the contents\
    \ of the directories, it creates the thin read-write layer for the container.\
    \ This read-write layer gets created inside the */var/lib/docker/overlay2* directory,\
    \ with the same file structure and link references as the read-only layers.\n\n\
    Modifying data in the container happens in this read-write layer. This is made\
    \ possible via the *copy-on-write* (CoW) strategy. Go back to how the union filesystem\
    \ works. The *diff* directory of the read-write layer has the contents of the\
    \ container. If you perform a change on a file that exists on any of the read-only\
    \ filesystem layer, the union filesystem will perform a *copy_up* operation to\
    \ copy the file from the *diff* directory of the filesystem layer containing the\
    \ file to the *diff* directory of the container. Once the file has been copied,\
    \ the change is then performed. Subsequent changes made to the file will be written\
    \ to the *diff* directory of the read-write layer. But unlike SQL Server where\
    \ it copies data pages (or extents, depending on the number of data pages affected)\
    \ to a database snapshot when a record is modified, Docker copies the entire file.\
    \ This makes it inefficient working with large, write-intensive processes like\
    \ relational databases. Containers that write a lot of data will require more\
    \ disk space on the read-write layer. Dealing with storage requirements of write-intensive\
    \ applications like relational databases will be covered in *Chapter* [*7*](#484552_1_En_7_Chapter.xhtml).\n\
    \nNote\n\nI only used database snapshots in SQL Server as an illustration to showcase\
    \ how the copy-on-write strategy works similarly with containers. However, the\
    \ write process is reversed. With SQL Server database snapshots, the original\
    \ data is written in the snapshot and is not modified, giving you a point-in-time\
    \ view of the database. With containers, the original file is written in the read-write\
    \ layer and is the one being modified.\n\nDeleting data in a container involves\
    \ creating a *whiteout* file in the *diff* directory of the read-write layer.\
    \ A *whiteout* file in a union filesystem is a special file with a *.wh.* extension\
    \ similar to those whiteout correction tapes you see in office supply stores.\
    \ It’s like painting a file white so it appears to be gone from the point of view\
    \ of the container. You can’t see it but it’s there, just beneath the white paint.\n\
    \nMuch like stopping a running virtual machine, stopping a container does not\
    \ remove the read-write layer. Everything that Docker wrote on the read-write\
    \ layer remains in the local disk. The only time the directory of the read-write\
    \ layer gets deleted from disk is when you delete the container. Imagine creating\
    \ user databases in your SQL Server instance in a container. The data and log\
    \ files get created on the read-write layer. If you delete the container, the\
    \ SQL Server data and log files get deleted as well. We need to be able to deal\
    \ with SQL Server databases in a way that is outside the container. We’ll cover\
    \ this in more detail in *Chapter* [*7*](#484552_1_En_7_Chapter.xhtml).\n\n##\
    \ Summary\n\nThis chapter covered how Docker images and containers work under\
    \ the covers from the storage point of view. We’ve looked at how the filesystem\
    \ layers are stored on disk with the use of content digests and distribution hashes,\
    \ how they are referenced by the Docker daemon to create an image using a union\
    \ filesystem, and how a container is simply a thin, read-write filesystem layer\
    \ sitting on top of the read-only layers. In the next chapter, we’ll look at the\
    \ most common administrative tasks that you’ll perform when working with SQL Server\
    \ on containers.\n\n# 6. Managing and Administering Containers\n\n> *Never be\
    \ afraid to take on a really tough problem. When you solve it, the benefits will\
    \ be that much greater.*\n> \n> —Carl Gerstacker\n\nWorking with digital audio\
    \ workstations (DAW) as a musician has created a lot of opportunities for creating\
    \ music. When I was learning how to play the piano, all I knew was the 88 different\
    \ keys that I could play across the keyboard. As I progressed into playing with\
    \ different bands, it became impractical for me to always ask for a venue that\
    \ had an analog upright piano. Besides, there was no way I would carry a 300-lb\
    \ piano with me during performances. That’s when I decided to invest in a lightweight\
    \ digital synthesizer.\n\nAs I was getting ready for one of our performances,\
    \ I noticed the keyboard player of the next band set up his MacBook Pro and plugged\
    \ it into the digital synthesizer. The mere presence of a MacBook Pro working\
    \ alongside a musical instrument got me curious. I’d never seen this before. I’m\
    \ pretty sure he was not about to write a Python script during the performance.\
    \ So, I asked the guy about his setup. He explained how the software on his MacBook\
    \ Pro created different sounds that he used when playing. He let me listen to\
    \ the sound of a piano layered with a beautiful violin and strings to evoke a\
    \ feeling of tranquility, as if spending a quiet afternoon near the lake. An arpeggiated\
    \ techno sound can evoke an upbeat feeling and can make you move your feet. It’s\
    \ a totally different world of music. I decided to try it out and played around\
    \ with a copy of the Ableton Live software on my MacBook Pro. I was hooked. I\
    \ was making my own sound samples, audio tracks, loops – anything that would expand\
    \ my musical creativity. My setup now included the MacBook Pro together with my\
    \ digital synthesizer.\n\nBut working with any new tools comes with its own set\
    \ of challenges. I now have to worry about managing the large audio files that\
    \ my DAW created, moving them around so as to avoid filling up my main hard drive.\
    \ I also have to keep a list of configuration settings that I need when playing\
    \ at different venues and different equipment. And the more audio files I create,\
    \ the more I need to properly name them so I know what they are and how I use\
    \ them. The last thing I want is to be fumbling around trying to find an audio\
    \ file that I need right in the middle of a performance.\n\nI did say working\
    \ with any new tools and technology comes with its own set of challenges. The\
    \ same is true working with Docker – or any technology you might get your hands\
    \ on. This chapter will cover the most common tasks that you will perform as someone\
    \ who manages Docker, tasks such as creating, starting, and stopping SQL Server\
    \ on containers. In the previous chapters, you’ve already been introduced to some\
    \ of the *docker* commands that we will be using. So, you should be familiar with\
    \ them at this point. We’ll also look at making configuration changes to the Docker\
    \ daemon outside of the default. I won’t be covering any SQL Server administrative\
    \ tasks as I would assume you’re already familiar with that. You’re a SQL Server\
    \ DBA after all, aren’t you?"
  trans: '## 容器层


    我们花了大量时间深入研究镜像的只读文件系统层，因为这为你理解作为容器的读写文件系统层打下了基础。回顾一下，容器本质上就是一个位于只读层之上的薄薄的读写层。在
    Docker 守护进程根据目录内容构建好镜像的只读文件系统层之后，它会为容器创建这个薄薄的读写层。该读写层在 `/var/lib/docker/overlay2`
    目录内创建，其文件结构和链接引用与只读层相同。


    容器中的数据修改发生在这个读写层中。这是通过`写时复制`策略实现的。回想一下联合文件系统的工作原理。读写层的 `diff` 目录包含了容器的内容。如果你对任何一个只读文件系统层上存在的文件执行更改，联合文件系统将执行一个
    `copy_up` 操作，将该文件从其所在文件系统层的 `diff` 目录复制到容器的 `diff` 目录中。文件一旦被复制，更改就会被执行。对该文件的后续更改将被写入读写层的
    `diff` 目录。但是，与 SQL Server 不同——SQL Server 在记录被修改时，会将数据页（或区，取决于受影响的数据页数量）复制到数据库快照中——Docker
    会复制整个文件。这使得它在处理像关系型数据库这样的大型、写密集型流程时效率低下。写入大量数据的容器将在读写层上需要更多的磁盘空间。处理关系型数据库等写密集型应用的存储需求将在第
    7 章中讨论。


    > 注意

    >

    > 我在这里使用 SQL Server 的数据库快照仅作为示例，以展示写时复制策略与容器的工作原理相似。然而，写入过程是相反的。对于 SQL Server
    数据库快照，原始数据被写入快照中且不会被修改，从而为你提供数据库的某个时间点视图。而对于容器，原始文件被写入读写层，并且就是被修改的对象。


    删除容器中的数据涉及在读写层的 `diff` 目录中创建一个 `whiteout` 文件。联合文件系统中的 `whiteout` 文件是一种特殊文件，带有
    `.wh.` 扩展名，类似于你在办公用品店看到的白色修正带。这就像将文件涂成白色，从容器的角度看它似乎消失了。你看不到它，但它还在那里，就在白色涂层下面。


    就像停止一个正在运行的虚拟机一样，停止容器并不会删除读写层。Docker 写入读写层的所有内容仍然保留在本地磁盘上。只有当你删除容器时，读写层的目录才会从磁盘上删除。想象一下，在你的容器内的
    SQL Server 实例中创建用户数据库。数据和日志文件会在读写层上创建。如果你删除容器，SQL Server 的数据和日志文件也会被删除。我们需要能够以一种在容器外部处理
    SQL Server 数据库的方式。我们将在第 7 章中更详细地讨论这一点。


    ## 总结


    本章从存储的角度介绍了 Docker 镜像和容器的工作原理。我们探讨了文件系统层如何利用内容摘要和分发哈希存储在磁盘上，Docker 守护进程如何通过联合文件系统引用它们来创建镜像，以及容器如何仅仅是一个位于只读层之上的、薄薄的读写文件系统层。在下一章中，我们将了解在使用容器上的
    SQL Server 时，你将执行的最常见的管理任务。


    # 6. 管理和维护容器


    > 永远不要害怕接手一个真正棘手的问题。当你解决它时，收益也会成倍增加。

    >

    > ——卡尔·格斯塔克


    作为一名音乐家，使用数字音频工作站为创作音乐带来了很多机会。当我刚开始学习弹钢琴时，我只知道可以在键盘上演奏的 88 个不同的琴键。随着我逐渐加入不同的乐队演出，总是要求演出场地提供一台模拟立式钢琴变得不切实际。而且，在演出时携带一台
    300 磅重的钢琴也是不可能的。那时我决定投资一台轻便的数字合成器。


    有一次在准备我们的一场演出时，我注意到下一个乐队的键盘手架设了他的 MacBook Pro，并将其插入到数字合成器中。仅仅是一台 MacBook Pro 与乐器协同工作这个事实就引起了我的好奇心。我以前从未见过这种情况。我很确定他不是要在演出时写
    Python 脚本。于是，我询问了他关于他的设备设置。他解释了 MacBook Pro 上的软件如何创造出不同的声音供他演奏时使用。他让我听了叠加了优美小提琴和弦乐的钢琴声，营造出一种宁静的感觉，仿佛在湖边度过一个安静的下午。一段琶音的电子音效能唤起欢快的感觉，让你忍不住想动起来。这是一个完全不同的音乐世界。我决定尝试一下，并在自己的
    MacBook Pro 上试用了 Ableton Live 软件。我迷上了它。我开始制作自己的声音样本、音轨、循环乐段——任何能拓展我音乐创造力的东西。现在我的设备设置中除了数字合成器，还多了
    MacBook Pro。


    但是，使用任何新工具都会带来一系列新的挑战。我现在必须管理我的数字音频工作站创建的大型音频文件，四处移动它们以避免填满我的主硬盘。我还需要维护一份在不同场地和不同设备上演奏时所需的配置设置列表。而且，我创建的音频文件越多，就越需要妥善命名它们，以便我知道它们是什么以及如何使用。我最不希望发生的事情就是在演出过程中手忙脚乱地寻找一个急需的音频文件。


    我确实说过，使用任何新的工具和技术都会带来一系列挑战。使用`docker`也是如此——或者你可能接触到的任何技术。本章将涵盖作为一名 Docker 管理者，你将执行的最常见任务，例如创建、启动和停止容器上的
    SQL Server。在前面的章节中，你已经接触过一些我们将要使用的`docker`命令。所以，到这个阶段你应该已经熟悉了它们。我们还将探讨在默认设置之外对
    Docker 守护进程进行配置更改。我不会涵盖任何 SQL Server 管理任务，因为我假设你已经熟悉这些了。毕竟，你是一名 SQL Server DBA，不是吗？'
- fmt: "## Configuring the Docker Daemon\n\nLike your default SQL Server installation,\
    \ the configuration settings that you got from the default Docker installation\
    \ work just fine. But there are configuration settings that you can change to\
    \ enhance the overall experience working with Docker as a SQL Server administrator.\n\
    \nThere are two ways to configure the Docker daemon. The first one is by using\
    \ flags when starting the Docker daemon, like using startup parameters in SQL\
    \ Server. The second one is by using the `daemon.json` configuration file.\n\n\
    To illustrate the use of these two options, let’s say you want to test out new\
    \ Docker daemon features. Unless you are using the Edge Channel – version that\
    \ contains new features but isn’t fully tested – of the Docker daemon, all experimental\
    \ features are turned off. You certainly don’t want to deploy a non-stable version\
    \ in a production environment.\n\n### Working with dockerd\n\nTo enable flags\
    \ when starting the Docker daemon, run the `dockerd` command and pass the corresponding\
    \ flag. Using the preceding example to enable experimental features, run the following\
    \ command. Just like a Windows service, the Docker daemon should be in a stopped\
    \ state before running this command:\n\n```\nsudo dockerd –experimental\n```\n\
    \nNote the use of `sudo` when starting the Docker daemon using the `dockerd` command\
    \ – you need `root` privileges on Linux. And, similar to starting SQL Server using\
    \ the command line, you need to open another terminal session to interact with\
    \ Docker after starting the daemon using `dockerd`. Otherwise, you might end up\
    \ terminating the process when you quit the current terminal session.\n\nYou can\
    \ do the same thing on Windows but without `sudo`.\n\nA full list of the available\
    \ flags and options when working with `dockerd` is available at [https://docs.docker.com/engine/reference/commandline/dockerd/](https://docs.docker.com/engine/reference/commandline/dockerd/).\
    \ On Windows, it’s on [https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-on-the-docker-service](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-on-the-docker-service).\n\
    \n### Working with daemon.json\n\nThe `daemon.json` file contains configuration\
    \ settings for your Docker daemon. By default, the `daemon.json` file does not\
    \ exist. You have to manually create it to set custom configuration on your Docker\
    \ daemon.\n\nOn Linux, the file should be stored in the `/etc/docker` directory.\
    \ On Windows, it should be in the `C:\\ProgramData\\docker\\config` folder.\n\n\
    > **Tip**\n>\n> If the `daemon.json` file already exists, be sure to make a copy\
    \ of the file prior to making modifications to it. Having a backup of a configuration\
    \ file before making modifications is always a great idea. After all, if the configuration\
    \ changes didn’t produce the desired effect, having a backup that you can use\
    \ to roll back the change is a lot faster than trying to remember what you did\
    \ a few minutes before making the change.\n\nYou can use your favorite text editor\
    \ to create the `daemon.json` file and simply copy it to the appropriate directory\
    \ on your Docker host. On Linux, you need to have `root` privileges to copy the\
    \ file to the `/etc/docker` directory.\n\nUsing the same example earlier of enabling\
    \ experimental features on your Docker daemon, add the following content to it:\n\
    \n```\n{\n  \"experimental\": true\n}\n```\n\nAfter creating and updating the\
    \ file, restart the Docker daemon. Run the following command on Linux to do so:\n\
    \n```\nsudo systemctl restart docker\n```\n\nOn Windows, it’s just like how you\
    \ would restart any Windows service.\n\n> **Tip**\n>\n> Don’t be overwhelmed when\
    \ working with the Linux filesystem. You don’t always have to be on the command\
    \ line when you’re just getting started. Tasks like creating, copying, or modifying\
    \ files can be done using a Windows-based app. I use a tool called WinSCP for\
    \ this. I will create the file on my Windows machine using a text editor and use\
    \ WinSCP to copy it to a Linux machine. You do need `root` privileges on Linux\
    \ when working on most configuration settings. Refer to *Appendix A* for installing\
    \ and configuring WinSCP to connect to a Linux machine.\n\nBe sure to revert the\
    \ changes if you don’t need to enable the experimental features on your Docker\
    \ daemon. A full list of configuration options that you can add to the `daemon.json`\
    \ file can be found at [https://docs.docker.com/engine/reference/commandline/dockerd/#daemon-configuration-file](https://docs.docker.com/engine/reference/commandline/dockerd/#daemon-configuration-file).\
    \ On Windows, it’s on [https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-with-a-configuration-file](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-with-a-configuration-file).\n\
    \nThis is just a very simple example of how to use either the `dockerd` command\
    \ or the `daemon.json` file to make configuration changes to your Docker daemon.\
    \ The real value comes from knowing how to use these two ways to configure the\
    \ Docker daemon.\n\n> **Note**\n>\n> You might be wondering, “which one do I use\
    \ to make configuration changes to my Docker daemon?” To answer this question,\
    \ think back to how you use startup parameters vs. `sp_configure` in SQL Server.\
    \ If you are going to make a one-time change as part of a troubleshooting exercise,\
    \ you use startup parameters in SQL Server; the `-m` parameter for single-user\
    \ mode, the `-T` to specify trace flags, or the `-f` to start with minimal configuration.\
    \ If you want to make permanent configuration changes like enabling backup compression,\
    \ setting recovery interval, and so on, you use `sp_configure` (although you might\
    \ argue that some configuration settings are only available via startup parameters,\
    \ while some are only available via `sp_configure`). Similarly, use `dockerd`\
    \ for one-time changes and `daemon.json` for permanent changes."
  raw: '## Configuring the Docker Daemon


    Like your default SQL Server installation, the configuration settings that you
    got from the default Docker installation work just fine. But there are configuration
    settings that you can change to enhance the overall experience working with Docker
    as a SQL Server administrator.


    There are two ways to configure the Docker daemon. The first one is by using flags
    when starting the Docker daemon, like using startup parameters in SQL Server.
    The second one is by using the *daemon.json* configuration file.


    To illustrate the use of these two options, let’s say you want to test out new
    Docker daemon features. Unless you are using the Edge Channel – version that contains
    new features but isn’t fully tested – of the Docker daemon, all experimental features
    are turned off. You certainly don’t want to deploy a non-stable version in a production
    environment.


    ### Working with dockerd


    To enable flags when starting the Docker daemon, run the *dockerd* command and
    pass the corresponding flag. Using the preceding example to enable experimental
    features, run the following command. Just like a Windows service, the Docker daemon
    should be in a stopped state before running this command:


    ```

    sudo dockerd –experimental

    ```


    Note the use of *sudo* when starting the Docker daemon using the *dockerd* command –
    you need *root* privileges on Linux. And, similar to starting SQL Server using
    the command line, you need to open another terminal session to interact with Docker
    after starting the daemon using *dockerd*. Otherwise, you might end up terminating
    the process when you quit the current terminal session.


    You can do the same thing on Windows but without *sudo*.


    A full list of the available flags and options when working with *dockerd* is
    available at [*https://docs.docker.com/engine/reference/commandline/dockerd/*](https://docs.docker.com/engine/reference/commandline/dockerd/).
    On Windows, it’s on [*https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-on-the-docker-service*](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon%2523configure-docker-on-the-docker-service).


    ### Working with daemon.json


    The *daemon.json* file contains configuration settings for your Docker daemon.
    By default, the *daemon.json* file does not exist. You have to manually create
    it to set custom configuration on your Docker daemon.


    On Linux, the file should be stored in the */etc/docker* directory. On Windows,
    it should be in the *C:\ProgramData\docker\config* folder.


    Tip


    If the *daemon.json* file already exists, be sure to make a copy of the file prior
    to making modifications to it. Having a backup of a configuration file before
    making modifications is always a great idea. After all, if the configuration changes
    didn’t produce the desired effect, having a backup that you can use to roll back
    the change is a lot faster than trying to remember what you did a few minutes
    before making the change.


    You can use your favorite text editor to create the *daemon.json* file and simply
    copy it to the appropriate directory on your Docker host. On Linux, you need to
    have *root* privileges to copy the file to the */etc/docker* directory.


    Using the same example earlier of enabling experimental features on your Docker
    daemon , add the following content to it:


    ```

    {

    "experimental": true

    }

    ```


    After creating and updating the file, restart the Docker daemon. Run the following
    command on Linux to do so:


    ```

    sudo systemctl restart docker

    ```


    On Windows, it’s just like how you would restart any Windows service.


    Tip


    Don’t be overwhelmed when working with the Linux filesystem. You don’t always
    have to be on the command line when you’re just getting started. Tasks like creating,
    copying, or modifying files can be done using a Windows-based app. I use a tool
    called WinSCP for this. I will create the file on my Windows machine using a text
    editor and use WinSCP to copy it to a Linux machine. You do need *root* privileges
    on Linux when working on most configuration settings. Refer to *Appendix A* for
    installing and configuring WinSCP to connect to a Linux machine.


    Be sure to revert the changes if you don’t need to enable the experimental features
    on your Docker daemon. A full list of configuration options that you can add to
    the *daemon.json* file can be found at [*https://docs.docker.com/engine/reference/commandline/dockerd/#daemon-configuration-file*](https://docs.docker.com/engine/reference/commandline/dockerd//%2523daemon-configuration-file).
    On Windows, it’s on [*https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-with-a-configuration-file*](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon%2523configure-docker-with-a-configuration-file).


    This is just a very simple example of how to use either the *dockerd* command
    or the *daemon.json* file to make configuration changes to your Docker daemon.
    The real value comes from knowing how to use these two ways to configure the Docker
    daemon.


    Note


    You might be wondering, “which one do I use to make configuration changes to my
    Docker daemon?” To answer this question, think back to how you use startup parameters
    vs. *sp_configure* in SQL Server. If you are going to make a one-time change as
    part of a troubleshooting exercise, you use startup parameters in SQL Server;
    the -m parameter for single-user mode, the -T to specify trace flags, or the -f
    to start with minimal configuration. If you want to make permanent configuration
    changes like enabling backup compression, setting recovery interval, and so on,
    you use *sp_configure* (although you might argue that some configuration settings
    are only available via startup parameters, while some are only available via *sp_configure*).
    Similarly, use *dockerd* for one-time changes and *daemon.json* for permanent
    changes.'
  trans: "## 配置 Docker 守护进程\n\n与默认的 SQL Server 安装类似，您从默认的 Docker 安装中获得的配置设置可以正常工作。但有一些您可以更改的配置设置，以提升作为\
    \ SQL Server 管理员使用 Docker 的整体体验。\n\n有两种方法可以配置 Docker 守护进程。第一种是在启动 Docker 守护进程时使用标志，类似于在\
    \ SQL Server 中使用启动参数。第二种是使用 `daemon.json` 配置文件。\n\n为了说明这两种选项的用法，假设您想测试新的 Docker\
    \ 守护进程功能。除非您使用的是 Docker 守护进程的 Edge 通道——包含新功能但未经充分测试的版本——否则所有实验性功能都是关闭的。您肯定不希望在生产环境中部署非稳定版本。\n\
    \n### 使用 dockerd\n\n要在启动 Docker 守护进程时启用标志，请运行 `dockerd` 命令并传递相应的标志。使用前面的例子来启用实验性功能，运行以下命令。与\
    \ Windows 服务类似，在运行此命令之前，Docker 守护进程应处于停止状态：\n\n```\nsudo dockerd –experimental\n\
    ```\n\n请注意使用 `dockerd` 命令启动 Docker 守护进程时使用 `sudo`——在 Linux 上您需要 `root` 权限。并且，与使用命令行启动\
    \ SQL Server 类似，在使用 `dockerd` 启动守护进程后，您需要打开另一个终端会话来与 Docker 交互。否则，当您退出当前终端会话时，可能会终止该进程。\n\
    \n在 Windows 上您可以执行相同的操作，但无需 `sudo`。\n\n有关使用 `dockerd` 时可用的标志和选项的完整列表，请访问 [`docs.docker.com/engine/reference/commandline/dockerd/`](https://docs.docker.com/engine/reference/commandline/dockerd/)。在\
    \ Windows 上，可在 [`docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-on-the-docker-service`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-on-the-docker-service)\
    \ 找到。\n\n### 使用 daemon.json\n\n`daemon.json` 文件包含您的 Docker 守护进程的配置设置。默认情况下，`daemon.json`\
    \ 文件不存在。您必须手动创建它以在您的 Docker 守护进程上设置自定义配置。\n\n在 Linux 上，该文件应存储在 `/etc/docker` 目录中。在\
    \ Windows 上，它应位于 `C:\\ProgramData\\docker\\config` 文件夹中。\n\n> **提示**\n>\n> 如果\
    \ `daemon.json` 文件已存在，请务必在修改前复制一份副本。在修改配置文件之前保留备份总是一个好主意。毕竟，如果配置更改没有产生预期效果，拥有一个可以用来回滚更改的备份比尝试记住您在更改前几分钟所做的操作要快得多。\n\
    \n您可以使用您喜欢的文本编辑器创建 `daemon.json` 文件，并将其复制到 Docker 主机上的相应目录。在 Linux 上，您需要 `root`\
    \ 权限才能将文件复制到 `/etc/docker` 目录。\n\n使用前面启用 Docker 守护进程实验性功能的相同示例，向其中添加以下内容：\n\n\
    ```\n{\n  \"experimental\": true\n}\n```\n\n创建并更新文件后，重新启动 Docker 守护进程。在 Linux\
    \ 上运行以下命令来执行此操作：\n\n```\nsudo systemctl restart docker\n```\n\n在 Windows 上，这就像重新启动任何\
    \ Windows 服务一样。\n\n> **提示**\n>\n> 处理 Linux 文件系统时不要感到不知所措。当您刚开始时，并不总是需要在命令行上操作。创建、复制或修改文件等任务可以使用基于\
    \ Windows 的应用程序完成。我为此使用一个名为 WinSCP 的工具。我将在 Windows 机器上使用文本编辑器创建文件，并使用 WinSCP 将其复制到\
    \ Linux 机器。在处理大多数配置设置时，您确实需要在 Linux 上拥有 `root` 权限。请参阅 *附录 A* 了解如何安装和配置 WinSCP\
    \ 以连接到 Linux 机器。\n\n如果您不需要在 Docker 守护进程上启用实验性功能，请务必还原更改。可以添加到 `daemon.json` 文件的配置选项的完整列表可在\
    \ [`docs.docker.com/engine/reference/commandline/dockerd/#daemon-configuration-file`](https://docs.docker.com/engine/reference/commandline/dockerd/#daemon-configuration-file)\
    \ 找到。在 Windows 上，可在 [`docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-with-a-configuration-file`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-with-a-configuration-file)\
    \ 找到。\n\n这只是一个非常简单的例子，说明如何使用 `dockerd` 命令或 `daemon.json` 文件来更改您的 Docker 守护进程的配置。真正的价值在于知道如何使用这两种方法来配置\
    \ Docker 守护进程。\n\n> **注意**\n>\n> 您可能想知道，“我该用哪一种来更改我的 Docker 守护进程配置？”要回答这个问题，请回想一下您在\
    \ SQL Server 中如何使用启动参数与 `sp_configure`。如果您要进行一次性更改（作为故障排除的一部分），您会在 SQL Server\
    \ 中使用启动参数；例如使用 `-m` 参数进入单用户模式，使用 `-T` 指定跟踪标志，或使用 `-f` 以最小配置启动。如果您想进行永久性的配置更改，例如启用备份压缩、设置恢复间隔等，您会使用\
    \ `sp_configure`（尽管您可能会争辩说有些配置设置只能通过启动参数获得，而有些只能通过 `sp_configure` 获得）。类似地，对于一次性更改使用\
    \ `dockerd`，对于永久性更改使用 `daemon.json`。"
- fmt: "## Changing the Default Image and Container Directory\n\nOne of the most common\
    \ issues that I see when working with Docker is the challenge of dealing with\
    \ disk space. Isn’t this the same thing that we deal with as SQL Server DBAs?\
    \ You run out of disk space because your database files keep growing or your backup\
    \ files are taking up too much space. This is usually caused by an oversight or\
    \ lack of planning. But with emerging technologies such as Docker that usually\
    \ get adopted first in development and test environments, planning isn’t even\
    \ considered until the platform becomes mission critical (remember how you were\
    \ forced to upgrade those Microsoft Access databases to SQL Server?). When you’re\
    \ getting started, lack of disk space wouldn’t be much of an issue for you. Eventually,\
    \ it will.\n\nRecall from Chapter 5 that the default Docker root directory is\
    \ in the `/var/lib/docker/overlay2` directory on Linux and `C:\\ProgramData\\\
    docker\\windowsfilter` folder on Windows. The Docker images you pulled from Docker\
    \ Hub together with the container files will be stored in these directories. You\
    \ can change these default locations by modifying the `daemon.json` file on Linux\
    \ and adding the following to it:\n\n```json\n{\n\"data-root\": \"/mnt/docker\"\
    ,\n\"storage-driver\": \"overlay2\"\n}\n```\n\nThe `/mnt/docker` directory will\
    \ become the new location for all the images and containers. Be sure that the\
    \ directory exists prior to configuring the new Docker root directory.\n\nHere\
    \ are the steps to change the default Docker root directory on Linux:\n\n1.  Stop\
    \ the Docker daemon:\n\n    ```bash\n    sudo systemctl stop docker\n    ```\n\
    \n2.  Modify the `daemon.json` file to include the preceding settings.\n\n3. \
    \ Start the Docker daemon:\n\n    ```bash\n    sudo systemctl start docker\n \
    \   ```\n\nThe same steps apply to Windows. Just change the `/mnt/docker` directory\
    \ to a valid Windows directory such as `C:\\\\mnt\\\\docker` (notice the use of\
    \ two backslashes instead of one because a backslash character is interpreted\
    \ differently in the Go language) and remove the line `“storage-driver”: “overlay2”`.\
    \ And, of course, using either the Services management console or the command\
    \ line to stop and start the Docker service.\n\nYou can verify that the changes\
    \ have taken effect by running the `docker info` command as well as pulling a\
    \ new image and reviewing the contents of the `/mnt/docker/overlay2` directory.\
    \ Figure 6-1 shows the new Docker root directory on a CentOS Linux host.\n\n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig1_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1: New Docker root directory on CentOS Linux host\n\nFigure 6-2 shows\
    \ the new Docker root directory on a Windows Server host together with contents\
    \ of the `daemon.json` file.\n\n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig2_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2: New Docker root directory on Windows Server host\n\nChanging the\
    \ default Docker root directory creates a new directory structure but does not\
    \ remove the previous one. This also means that Docker becomes unaware of the\
    \ previous directory containing all the pulled images and created containers –\
    \ they are still there. If you want to reuse all the image layers to avoid pulling\
    \ them again and reclaim disk space, move the entire `/var/lib/docker` directory\
    \ to the new directory prior to restarting the Docker daemon. Otherwise, you’ll\
    \ be duplicating image layers and using up more disk space. Docker is not going\
    \ to tell you whether or not an image already exists after you configure a new\
    \ root directory – it is no longer aware of the old root directory.\n\nUse the\
    \ following command on Linux to move the entire `/var/lib/docker` directory to\
    \ the new directory (on Windows, it’s a simple copy and paste). Be sure to create\
    \ the target directory first before running the command.\n\n```bash\nmv /var/lib/docker/*\
    \ /mnt/docker/\n```\n\nAdd this command between Steps #2 and #3. If it’s a brand-new\
    \ installation with no pulled images, you can skip this step.\n\n## Stopping and\
    \ Restarting the Docker Daemon\n\nI may have jumped ahead and already mentioned\
    \ stopping and restarting the Docker daemon without showing it. Actually, I’ve\
    \ covered how to start the Docker daemon in Chapter 3 in the section “Installing\
    \ Docker on CentOS Linux.” Learning the command comes in handy for other stuff,\
    \ like stopping and restarting other daemons. Plus, whenever you make configuration\
    \ changes to Docker, you would need to restart it.\n\nRun the following command\
    \ to stop the Docker daemon:\n\n```bash\nsudo systemctl stop docker\n```\n\nRun\
    \ the following command to start the Docker daemon:\n\n```bash\nsudo systemctl\
    \ start docker\n```\n\nRun the following command to restart the Docker daemon:\n\
    \n```bash\nsudo systemctl restart docker\n```\n\nSee, that was easy.\n\n## Configure\
    \ the Docker Daemon for Remote Access on CentOS Linux\n\nSo far, we’ve been connecting\
    \ to the Docker daemon remotely on a Linux host using an SSH client. While you\
    \ may consider this “remote access,” the fact that the Docker CLI client and the\
    \ Docker daemon are still on the same host means the two are interacting locally.\
    \ True remote access is when you have the Docker CLI client interacting with a\
    \ remote Docker daemon, calling the Docker API from a different machine. An example\
    \ of this is using the Docker CLI client on a Windows machine and connecting to\
    \ a Docker daemon on a Linux host. By default, the Docker daemon binds to a Unix\
    \ socket instead of a TCP/IP port. In order to access the Docker daemon remotely,\
    \ you need to configure it to listen on an IP address and specific port number.\n\
    \nHere’s a high-level overview of the process involved in configuring remote access\
    \ to the Docker daemon on Linux:\n\n1.  Configure remote access to the Docker\
    \ daemon with the `systemd` unit file.\n2.  Protect the Docker daemon socket by\
    \ configuring mutual TLS encryption.\n3.  Update the `daemon.json` to include\
    \ the settings for mutual TLS encryption.\n4.  Enable firewall port to allow traffic\
    \ to Docker daemon."
