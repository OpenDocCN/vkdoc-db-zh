    图 7-4 显示了我分别在 Linux 主机和 Windows 主机上复制到 Docker 卷中的一个简单文件。请记住，我当前没有任何正在运行的容器。


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig4_HTML.jpg](img/484552_1_En_7_Fig4_HTML.jpg)


    图 7-4

    对 Docker 卷进行更改


    你可以使用 `docker volume ls` 命令列出所有可用的 Docker 卷。最后，你可以使用 `docker volume rm` 命令删除特定的
    Docker 卷，如下所示：


    ```

