    ## 摆脱 sudo？


    积习难改（不，这不是下一部布鲁斯·威利斯电影的片名）。由于我职业生涯的大部分时间都在与 Windows 打交道，以至于每次在 Linux 上运行命令时，我仍然会忘记使用
    `sudo`。我相信你也会这样。还记得图 3-12 中的错误信息吗？它可能很烦人。然而，避免使用 `root` 登录，并在你运行的每条命令中始终使用 `sudo`，是一个良好的安全实践。


    不过，既然你刚开始接触 Linux，我就给你一个临时通行证来绕过这个小小的烦恼。不，我不会允许你通过 `root` 登录来逃避——这在我的书里是致命的原罪。我只允许你**暂时**在运行
    `docker` 命令时不用 `sudo`。


    **注意**

    你需要使用 `sudo` 运行 `docker` 命令的原因在于，docker 守护进程绑定到的是一个 Unix 套接字，而不是一个 TCP/IP 端口（Unix
    套接字通过消除 TCP/IP 所需的一些检查和操作——如路由——使得同一台机器内的进程间通信更快）。默认情况下，`root` 用户拥有该 Unix 套接字，其他用户访问它的唯一方式就是使用
    `sudo`。这就是为什么 docker 守护进程总是以 `root` 身份运行。


    要在不使用 `sudo` 的情况下运行 `docker` 命令，你需要：

    1.  创建一个名为 `docker` 的组

    2.  将你的用户账户添加到该组中


    当 docker 守护进程启动时，`docker` 组的成员将能够访问 Unix 套接字。这就像旧版本 SQL Server 中的 `SQLServerMSSQLUser$instancename`
    本地 Windows 组——该组的成员有权访问 SQL Server 服务。


    运行以下 `groupadd` 命令来创建一个名为 `docker` 的组：

    ```

    sudo groupadd docker

    ```

    如果 `docker` 组已经存在，你会收到类似图 3-14 中的信息。

    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig14_HTML.jpg](img/484552_1_En_3_Fig14_HTML.jpg)

    图 3-14 创建名为 docker 的组


    如果是这种情况，请继续将你的用户账户添加到 `docker` 组。运行以下 `usermod` 命令来执行此操作：

    ```

    sudo usermod -aG docker $USER

    ```

    `-a` 参数用于将用户追加（或添加）到一个组（后面跟着 `G` 参数）。`$USER` 环境变量代表当前登录的用户（也就是你）。

    就像在 Windows 中一样，你必须注销并重新登录才能使更改生效。然后，你就可以重新运行 `docker version` 和 `docker info`
    命令，而无需使用 `sudo`。图 3-15 显示了使用我添加到 `docker` 组的用户账户运行 `docker info` 命令的输出。

    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig15_HTML.jpg](img/484552_1_En_3_Fig15_HTML.jpg)

    图 3-15 无需 sudo 运行 docker 命令


    **警告**

    请注意——安全是严肃的事情，我不会掉以轻心。只有受信任的用户，如管理员，才应该被添加到 `docker` 组。该组的任何成员都有权限控制 docker 守护进程。这意味着将某人添加到这个组，相当于授予他们永久的、无需密码保护的
    `root` 访问权限。这比 `SQLServerMSSQLUser$instancename` 本地 Windows 组的权限更危险，因为它拥有 `root`
    访问权限。很可怕，不是吗？

    请务必阅读关于 Docker 安全的文档，特别是关于 `Docker 守护进程攻击面` 的部分，网址是 [`docs.docker.com/engine/security/security/`](https://docs.docker.com/engine/security/security/)。

    并且别忘了记录所有添加到此组的用户，以便你跟踪成员是谁。


    ## 本章小结


    本章带你逐步完成了将 CentOS 和 Ubuntu Linux 安装和配置为 Docker 容器主机的过程。它还向你介绍了一些基本的 Linux 命令，这些是你开始使用
    Linux 和安装 Docker 所需的。下一章将全部关于 Docker 生态系统、构成其运作的不同组件以及它们如何协同工作。


    # 4. Docker 生态系统


    > *相互依存应当与自给自足一样，成为人类的理想。*

    >

    > ——圣雄甘地


    我一直对飞机着迷。小时候，我想成为一名飞行员环游世界。也许是前往新地方的兴奋感，或者是弄清楚复杂系统如何工作的挑战感。或者两者兼而有之。


    在 2008 年感恩节等待登机时，我不禁想知道整个飞行旅行体验有多么复杂。如果你以前乘坐过商业航班，你就会明白我在说什么。当你在柜台办理登机手续时，航空公司的工作人员会递给你一张登机牌，并给你的行李贴上标签，以便它能送达最终目的地。你的登机牌上有航班的详细信息——登机口信息、座位分配、登机和起飞时间、乘客详情等。飞机将被分配一个登机口供乘客前往并登机。当你准备登机时，登机口工作人员会根据你的登机牌核对你的身份。当飞机即将离开登机口时，飞行员会检查他们的飞行数据计划，并核实其是否符合空中交通管制员的指示。如果一切按计划进行，飞机将离开登机口，飞往目的地（一位地勤人员在等待我们延误的航班时，好心分享了这些信息）。


    每一个复杂的系统都是由协同工作的不同部分组成的。如果你只是产品或服务的消费者（比如航班服务），不知道其运作的复杂细节也没关系。你只需要知道足够多关于如何正确使用它的知识即可。但是，如果你将负责交付该产品或服务的一部分，那么无论是为了你自己还是使用它的人，你都有责任去理解它是如何工作的，特别是你负责的那一部分。


    本章的目标是让你熟悉 Docker 这个复杂的系统。为了实现这个目标，我将向你介绍构成整个生态系统的不同组件，同时，介绍开始使用 Docker 所需的最常用命令。所以，准备好进行一次更偏向于“动手敲代码”的学习之旅吧。


    **注意**

    本章涵盖的示例命令将在 Windows PowerShell 命令行 shell 或 Linux 安全 shell（CentOS 或 Ubuntu）中展示，且不包含
    `sudo` 命令（请参阅第 3 章中“摆脱 sudo？”部分）。这是为了说明 `docker` 命令的互操作性。但这并不意味着我允许你忽视在 Windows
    Server 和 Linux 服务器操作系统上运行命令的安全实践。记住，在 Linux 上，只有 `docker` 命令可以不用 `sudo` 运行。所有其他需要提升权限的命令仍然需要
    `sudo`。

    '
- fmt: '## Hello World: Docker Edition


    I’m sure you’ve had your share of “hello world” while learning a computer programming
    language. I got introduced to “hello world” more than two-and-a-half decades ago
    while learning computer programming for the first time in my sophomore year in
    university. I wish I could say that it was the beginning of my journey into computer
    programming (the only reason I passed the course was because my best friend wrote
    my final project). But it did open my eyes to what “hello world” was and what
    it was for – a test as to whether or not the operator knows how to use it. It’s
    no wonder every programming language starts out with displaying “hello world”
    as a standard output.


    Docker is no different. And while it isn’t really a programming language, they
    embraced the “hello world” concept and came up with their own. But the way they
    created their version of “hello world” is amazingly brilliant, in my opinion.
    More than displaying a simple “hello world” message on your screen, their version
    gave you an idea of how Docker works. On your Linux system, run the following
    command to see what I mean:


    ```

    docker run hello-world

    ```


    Figure [4-1](#484552_1_En_4_Chapter.xhtml#Fig1) shows the Docker’s version of
    “hello world”. Brilliant, isn’t it?


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig1_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Hello World: Docker edition


    Unfortunately, the same command – `docker run hello-world` – no longer works for
    Docker on Windows Server 2016. It has nothing to do with the command, it has everything
    to do with the version of the container image as we will cover at a later section.
    Even when you follow Docker’s documentation on installing Docker Enterprise on
    Windows Servers, running the same command will still return a message like the
    one in Figure [4-2](#484552_1_En_4_Chapter.xhtml#Fig2).


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig2_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Running Hello World: Docker edition on Windows Server


    That’s because of the introduction of Microsoft’s semi-annual channel (SAC) servicing
    model. The image used to build Microsoft’s version of Docker’s `hello-world` container
    image has been deprecated for Windows Server 2016 (refer to [https://github.com/docker/for-win/issues/3775](https://github.com/docker/for-win/issues/3775)).
    Don’t get me started on how confusing this servicing model to businesses is.


    To get the same output as the container image you ran on Linux, run the following
    command instead. Note the use of a tag, a label specifically defining what image
    to use to run the container. Usage of tags will be covered in more detail at a
    later section.


    ```

    docker run hello-world:nanoserver-sac2016

    ```


    Figure [4-3](#484552_1_En_4_Chapter.xhtml#Fig3) shows the output of Docker’s version
    of “hello world” on Windows Server 2016. Don’t be surprised if the Windows Server
    image takes much longer to download compared to the Linux image.


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig3_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    The working Hello World: Docker edition on Windows Server


    Beyond the output of the `docker version` and `docker info` commands you ran in
    previous chapters, if you get this result, you’re guaranteed that Docker is working
    correctly on your system. You’ve passed the simple sanity check. But that’s not
    the goal of this chapter. Let’s have a look at the output of Docker’s “hello world”
    to understand how Docker works and identify the different components that make
    up this complex system.


    ## How Docker Runs Containers


    The `docker run hello-world` command you ran is a very simple example of how to
    run a Docker container. Docker’s version of “hello world” explains how Docker
    actually does it. Figure [4-4](#484552_1_En_4_Chapter.xhtml#Fig4) illustrates
    the processes involved in running a Docker container.


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig4_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    How Docker runs containers


    The following is an explanation of the process by which Docker runs containers.
    The `hello-world` container is used for purposes of example, but the process is
    the same no matter the container.


    1.  You run the `docker run hello-world` command from the Docker CLI client.


    2.  The Docker CLI client makes API calls to the Docker daemon. In this case,
    it passes the `run` subcommand to run a new container based on the `hello-world`
    container image as a template (#1 in the output).


    3.  The first thing that the Docker daemon does when it receives a request to
    run a container is to check whether it already has a local copy of the `hello-world`
    container image in its local filesystem. Since this is a brand-new installation,
    no local copy of the image is available.


    4.  Because it doesn’t have a local copy of the `hello-world` container image,
    the Docker daemon searched and pulled the image from Docker Hub – a public repository
    of container images (#2 in the output).


    5.  Once the download completes, the Docker daemon created and ran a new container
    based on the `hello-world` image (#3 in the output).


    6.  After the `hello-world` container completed the tasks it needs to perform,
    the container exited or entered in a `Stopped` state (#4 in the output).


    Now you know why I think this “hello world” example is brilliant. Docker packed
    so much information in their version of “hello world” that, if you asked the right
    questions, can really give you a lot of details as to how Docker works and what
    makes up its ecosystem.


    ## The Docker Ecosystem


    I’ve used several names, terms, and keywords in the previous section to describe
    how Docker runs a simple container. But I haven’t defined those terms yet, so
    I’ll do just that in the following sections.


    ### Docker CLI


    Let’s start with what you can infer from #1 in the output in Figure [4-4](#484552_1_En_4_Chapter.xhtml#Fig4):
    what is the Docker CLI? The Docker CLI (command-line interface) is your point
    of interaction with the Docker daemon. Docker commands are executed through the
    Docker CLI client and sent to the Docker daemon. You can think of this as SQL
    Server Query Analyzer (I wish Microsoft will bring back this lightweight tool)
    or SQL Server Management Studio. By default, this is installed on the machine
    together with the Docker daemon. All the `docker` commands you ran from the previous
    chapters were executed locally from the point of view of the Docker host machine.
    On the Windows Server machine, you logged in via Remote Desktop, opened Windows
    PowerShell, and ran the `docker` commands – locally. On the Linux machine, you
    initiated an SSH session to connect remotely, but, once logged in, you ran the
    `docker` commands locally. This is the approach we will be using throughout the
    book. However, nobody is stopping you from configuring the Docker CLI client to
    connect to a remote Docker host, similar to installing SQL Server Management Studio
    on your Windows client workstation and connecting to a remote SQL Server instance.


    ### Docker Daemon


    Docker daemon (or service in Windows) is a client-server application and the runtime
    engine responsible for creating and running Docker objects. It is the center of
    your interactions with Docker and the best place to start understanding all the
    moving parts in the Docker ecosystem. You can think of it like the SQL Server
    relational database engine. The Docker daemon interacts with the Docker CLI client
    through a REST API. Because of the default installation where the Docker CLI client
    is installed on the same machine as the Docker daemon, the Docker engine is often
    referred to having these three major components – the Docker daemon, the REST
    API, and the Docker CLI client.'
  raw: '## Hello World: Docker Edition


    I’m sure you’ve had your share of “hello world” while learning a computer programming
    language. I got introduced to “hello world” more than two-and-a-half decades ago
    while learning computer programming for the first time in my sophomore year in
    university. I wish I could say that it was the beginning of my journey into computer
    programming (the only reason I passed the course was because my best friend wrote
    my final project). But it did open my eyes to what “hello world” was and what
    it was for – a test as to whether or not the operator knows how to use it. It’s
    no wonder every programming language starts out with displaying “hello world”
    as a standard output.


    Docker is no different. And while it isn’t really a programming language, they
    embraced the “hello world” concept and came up with their own. But the way they
    created their version of “hello world” is amazingly brilliant, in my opinion.
    More than displaying a simple “hello world” message on your screen, their version
    gave you an idea of how Docker works. On your Linux system, run the following
    command to see what I mean:


    ```

    docker run hello-world

    ```


    Figure [4-1](#484552_1_En_4_Chapter.xhtml#Fig1) shows the Docker’s version of
    “hello world”. Brilliant, isn’t it?


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig1_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Hello World: Docker edition


    Unfortunately, the same command – `docker run hello-world` – no longer works for
    Docker on Windows Server 2016. It has nothing to do with the command, it has everything
    to do with the version of the container image as we will cover at a later section.
    Even when you follow Docker’s documentation on installing Docker Enterprise on
    Windows Servers, running the same command will still return a message like the
    one in Figure [4-2](#484552_1_En_4_Chapter.xhtml#Fig2).


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig2_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Running Hello World: Docker edition on Windows Server


    That’s because of the introduction of Microsoft’s semi-annual channel (SAC) servicing
    model. The image used to build Microsoft’s version of Docker’s *hello-world* container
    image has been deprecated for Windows Server 2016 (refer to [*https://github.com/docker/for-win/issues/3775*](https://github.com/docker/for-win/issues/3775)).
    Don’t get me started on how confusing this servicing model to businesses is.


    To get the same output as the container image you ran on Linux, run the following
    command instead. Note the use of a tag, a label specifically defining what image
    to use to run the container. Usage of tags will be covered in more detail at a
    later section.


    ```

    docker run hello-world:nanoserver-sac2016

    ```


    Figure [4-3](#484552_1_En_4_Chapter.xhtml#Fig3) shows the output of Docker’s version
    of “hello world” on Windows Server 2016\. Don’t be surprised if the Windows Server
    image takes much longer to download compared to the Linux image.


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig3_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    The working Hello World: Docker edition on Windows Server


    Beyond the output of the `docker version` and `docker info` commands you ran in
    previous chapters, if you get this result, you’re guaranteed that Docker is working
    correctly on your system. You’ve passed the simple sanity check. But that’s not
    the goal of this chapter. Let’s have a look at the output of Docker’s “hello world”
    to understand how Docker works and identify the different components that make
    up this complex system.


    ## How Docker Runs Containers


    The `docker run hello-world` command you ran is a very simple example of how to
    run a Docker container. Docker’s version of “hello world” explains how Docker
    actually does it. Figure [4-4](#484552_1_En_4_Chapter.xhtml#Fig4) illustrates
    the processes involved in running a Docker container.


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig4_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    How Docker runs containers


    The following is an explanation of the process by which Docker runs containers.
    The *hello-world* container is used for purposes of example, but the process is
    the same no matter the container.


    1.  You run the `docker run hello-world` command from the Docker CLI client.


    2.  The Docker CLI client makes API calls to the Docker daemon. In this case,
    it passes the *run* subcommand to run a new container based on the *hello-world*
    container image as a template (#1 in the output).


    3.  The first thing that the Docker daemon does when it receives a request to
    run a container is to check whether it already has a local copy of the *hello-world*
    container image in its local filesystem. Since this is a brand-new installation,
    no local copy of the image is available.


    4.  Because it doesn’t have a local copy of the *hello-world* container image,
    the Docker daemon searched and pulled the image from Docker Hub – a public repository
    of container images (#2 in the output).


    5.  Once the download completes, the Docker daemon created and ran a new container
    based on the *hello-world* image (#3 in the output).


    6.  After the *hello-world* container completed the tasks it needs to perform,
    the container exited or entered in a *Stopped* state (#4 in the output).


    Now you know why I think this “hello world” example is brilliant. Docker packed
    so much information in their version of “hello world” that, if you asked the right
    questions, can really give you a lot of details as to how Docker works and what
    makes up its ecosystem.


    ## The Docker Ecosystem


    I’ve used several names, terms, and keywords in the previous section to describe
    how Docker runs a simple container. But I haven’t defined those terms yet, so
    I’ll do just that in the following sections.


    ### Docker CLI


    Let’s start with what you can infer from #1 in the output in Figure [4-4](#484552_1_En_4_Chapter.xhtml#Fig4):
    what is the Docker CLI ? The Docker CLI (command-line interface) is your point
    of interaction with the Docker daemon. Docker commands are executed through the
    Docker CLI client and sent to the Docker daemon. You can think of this as SQL
    Server Query Analyzer (I wish Microsoft will bring back this lightweight tool)
    or SQL Server Management Studio. By default, this is installed on the machine
    together with the Docker daemon. All the *docker* commands you ran from the previous
    chapters were executed locally from the point of view of the Docker host machine.
    On the Windows Server machine, you logged in via Remote Desktop, opened Windows
    PowerShell, and ran the *docker* commands – locally. On the Linux machine, you
    initiated an SSH session to connect remotely, but, once logged in, you ran the
    *docker* commands locally. This is the approach we will be using throughout the
    book. However, nobody is stopping you from configuring the Docker CLI client to
    connect to a remote Docker host, similar to installing SQL Server Management Studio
    on your Windows client workstation and connecting to a remote SQL Server instance
    .


    ## Docker Daemon


    Docker daemon (or service in Windows) is a client-server application and the runtime
    engine responsible for creating and running Docker objects. It is the center of
    your interactions with Docker and the best place to start understanding all the
    moving parts in the Docker ecosystem. You can think of it like the SQL Server
    relational database engine. The Docker daemon interacts with the Docker CLI client
    through a REST API. Because of the default installation where the Docker CLI client
    is installed on the same machine as the Docker daemon, the Docker engine is often
    referred to having these three major components – the Docker daemon, the REST
    API, and the Docker CLI client.'
  trans: '

    ## 你好世界：Docker 版


    我相信你在学习计算机编程语言时，都有过编写“hello world”的经历。我第一次接触“hello world”是在二十多年前，当时我在大学二年级，第一次学习计算机编程。我多希望那能说是我编程之旅的开端（我之所以能通过那门课，唯一原因是我最好的朋友帮我写了期末项目）。但它确实让我明白了“hello
    world”是什么以及它的用途——它是检验操作者是否知道如何使用该语言的一个测试。难怪每种编程语言都从显示“hello world”作为标准输出开始。


    Docker 也不例外。虽然它并非真正的编程语言，但他们也采纳了“hello world”这个概念，并提出了自己的版本。但在我看来，他们创造自己版本“hello
    world”的方式极其出色。它不仅仅是在屏幕上显示一条简单的“hello world”信息，其版本还让你了解到 Docker 是如何工作的。在你的 Linux
    系统上，运行以下命令看看我的意思：


    ```

    docker run hello-world

    ```


    图 4-1 展示了 Docker 版本的“hello world”。很精彩，不是吗？


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig1_HTML.jpg](img/484552_1_En_4_Fig1_HTML.jpg)


    图 4-1


    你好世界：Docker 版


    不幸的是，同样的命令——`docker run hello-world`——在 Windows Server 2016 上的 Docker 中不再有效。这与命令无关，而完全与容器镜像的版本有关，我们将在后面的章节中介绍。即使你遵循
    Docker 官方文档在 Windows Server 上安装 Docker Enterprise，运行相同的命令仍然会返回类似图 4-2 的信息。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig2_HTML.jpg](img/484552_1_En_4_Fig2_HTML.jpg)


    图 4-2


    在 Windows Server 上运行“你好世界：Docker 版”


    这是因为引入了微软的半年度通道（SAC）服务模型。用于构建微软版 Docker `hello-world`容器镜像的镜像已被 Windows Server
    2016 弃用（请参考[`github.com/docker/for-win/issues/3775`](https://github.com/docker/for-win/issues/3775)）。别让我开始谈论这个服务模型让企业感到多么困惑。


    为了获得与在 Linux 上运行的容器镜像相同的输出，请改用以下命令运行。注意标签的使用，这是一个专门定义使用哪个镜像来运行容器的标记。标签的用法将在后面的章节中更详细地介绍。


    ```

    docker run hello-world:nanoserver-sac2016

    ```


    图 4-3 展示了在 Windows Server 2016 上 Docker 版“hello world”的输出。如果 Windows Server 镜像的下载时间比
    Linux 镜像长很多，不必惊讶。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig3_HTML.jpg](img/484552_1_En_4_Fig3_HTML.jpg)


    图 4-3


    在 Windows Server 上成功运行的“你好世界：Docker 版”


    除了你在前面章节中运行的 `docker version` 和 `docker info` 命令的输出之外，如果你得到了这个结果，就可以保证 Docker
    在你的系统上正常工作。你通过了简单的完整性检查。但这并非本章的目标。让我们看看 Docker“hello world”的输出，以理解 Docker 的工作原理，并识别构成这个复杂系统的不同组件。


    ## Docker 如何运行容器


    你运行的 `docker run hello-world` 命令是如何运行 Docker 容器的一个非常简单的例子。Docker 版的“hello world”解释了
    Docker 实际是如何做到的。图 4-4 说明了运行 Docker 容器所涉及的流程。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig4_HTML.jpg](img/484552_1_En_4_Fig4_HTML.jpg)


    图 4-4


    Docker 如何运行容器


    以下是 Docker 运行容器的流程说明。此处使用 `hello-world` 容器为例，但无论什么容器，流程都是一样的。


    1.  你从 Docker CLI 客户端运行 `docker run hello-world` 命令。

    2.  Docker CLI 客户端向 Docker 守护进程发起 API 调用。在本例中，它传递 `run` 子命令，以 `hello-world` 容器镜像为模板来运行一个新容器（输出中的#1）。

    3.  Docker 守护进程收到运行容器的请求后，首先检查其本地文件系统中是否已有 `hello-world` 容器镜像的本地副本。由于这是一个全新的安装，没有可用的本地镜像副本。

    4.  因为没有 `hello-world` 容器镜像的本地副本，Docker 守护进程从 Docker Hub——一个公共的容器镜像仓库——搜索并拉取该镜像（输出中的#2）。

    5.  下载完成后，Docker 守护进程基于 `hello-world` 镜像创建并运行了一个新容器（输出中的#3）。

    6.  `hello-world` 容器完成其需要执行的任务后，容器退出或进入 `已停止` 状态（输出中的#4）。


    现在你明白为什么我认为这个“hello world”例子很出色了吧。Docker 在他们的“hello world”版本中打包了如此多的信息，如果你能提出正确的问题，它真的能让你了解很多关于
    Docker 如何工作以及其生态系统组成的细节。


    ## Docker 生态系统


    我在前一节中使用了几个名称、术语和关键词来描述 Docker 如何运行一个简单的容器。但我还没有定义这些术语，所以我会在接下来的章节中做这件事。


    ### Docker CLI


    让我们从你在图 4-4 输出#1 中可以推断出的内容开始：什么是 Docker CLI？Docker CLI（命令行界面）是你与 Docker 守护进程交互的入口。Docker
    命令通过 Docker CLI 客户端执行并发送给 Docker 守护进程。你可以把它想象成 SQL Server 查询分析器（我希望微软能重新带来这个轻量级工具）或
    SQL Server Management Studio。默认情况下，它与 Docker 守护进程一起安装在机器上。你在前面章节中运行的所有 `docker`
    命令，从 Docker 主机的角度看，都是在本地执行的。在 Windows Server 机器上，你通过远程桌面登录，打开 Windows PowerShell，并运行了
    `docker` 命令——这是在本地运行的。在 Linux 机器上，你发起了 SSH 会话进行远程连接，但一旦登录后，你就在本地运行了 `docker` 命令。这是我们在本书中将采用的方法。然而，没有人阻止你配置
    Docker CLI 客户端以连接到远程 Docker 主机，这类似于在你的 Windows 客户端工作站上安装 SQL Server Management
    Studio 并连接到远程 SQL Server 实例。


    ### Docker 守护进程


    Docker 守护进程（在 Windows 中是服务）是一个客户端-服务器应用程序，也是负责创建和运行 Docker 对象的运行时引擎。它是你与 Docker
    交互的中心，也是开始了解 Docker 生态系统所有活动组件的最佳起点。你可以把它想象成 SQL Server 关系数据库引擎。Docker 守护进程通过
    REST API 与 Docker CLI 客户端交互。由于默认安装将 Docker CLI 客户端与 Docker 守护进程安装在同一台机器上，Docker
    引擎通常被认为拥有这三大主要组件——Docker 守护进程、REST API 和 Docker CLI 客户端。

    '
- fmt: '## Docker 命令


    `docker` 命令是通过 Docker CLI 客户端与 Docker 守护进程交互时使用的基础命令。要执行 Docker 管理任务，你需要使用子命令或管理命令及其相应的参数。探索所有不同子命令或管理命令的一个好方法是运行
    `docker` 或 `docker help` 命令。图 [4-5](#484552_1_En_4_Chapter.xhtml#Fig5) 显示了所有可用的选项和命令。完整的
    docker 命令列表可在 Docker 文档 [*https://docs.docker.com/engine/reference/commandline/docker/*](https://docs.docker.com/engine/reference/commandline/docker/)
    中找到。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig5_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig5_HTML.jpg)

    *图 4-5：显示所有可用的 Docker 选项和命令*


    你已经使用过其中一些命令，例如 `docker run`、`docker version` 和 `docker info`。


    不要操之过急。我们将在本书中使用其中几个选项和命令来执行 Docker 管理任务。


    ## Docker 镜像与容器


    我第一次看到 *Docker 镜像* 这个术语时感到困惑，因为它通常与 *Docker 容器* 一起出现。我来帮你避免可能由这种混淆带来的麻烦。


    Docker 镜像是用于创建应用程序容器的静态、*只读* 模板。它是运行应用程序所需的各种组件的非运行时表示。而 Docker 容器则是该镜像的一个运行时实例。当你运行
    `docker run hello-world` 命令时，`hello-world` 就是 Docker 镜像的名称。你可以将 Docker 镜像想象成一个蓝图，就像汽车的工艺图。你根据想要的汽车（Docker
    容器）外观和功能来创建蓝图（Docker 镜像）。蓝图确定后，你就可以基于它创建任意多份汽车实例。你可以自由更改汽车的外观——颜色、配件、内饰等——而无需修改蓝图。如果你决定对汽车进行重大修改，就必须回到绘图板重绘蓝图。


    这只是一个关于 Docker 容器和 Docker 镜像是什么的概述，足以让你开始理解 Docker 生态系统的组成部分。*第* [*5*](#484552_1_En_5_Chapter.xhtml)
    *章* 将深入探讨它们的内部原理以及它们如何在文件系统中存储。


    ## Docker Hub


    Docker Hub 是一个容器注册中心。它是 Docker, Inc. 提供的一个基于云的公共仓库，用于创建、测试、存储和分发 Docker 镜像。可以将其视为
    Docker 镜像的 Apple App Store 或 Google Play 商店。Docker Hub 提供多项服务和功能：


    *   *仓库*：你可以在此存储 Docker 镜像，无论是私有还是公共使用。

    *   *团队和组织*：这是一种管理对仓库中存储的 Docker 镜像的权限和访问方式。你可以创建团队并分配用户，也可以创建一个包含团队和不同仓库的组织。

    *   *官方镜像*：这是一组托管在 Docker Hub 上的精选 Docker 仓库，用于提供基础操作系统镜像、流行编程语言和平台的即用型镜像，以及如何使用它们的最佳实践参考。这些镜像存储在顶级仓库中（更多内容见“Docker
    镜像命名惯例”部分），可以安全地假设它们来自可靠和值得信赖的来源。

    *   *发布者镜像*：Docker Hub 托管来自软件供应商的 Docker 镜像，如 Microsoft、Oracle、Red Hat、IBM 等。这些镜像由相应供应商维护和支持。我们将在后面章节中使用的
    Linux 上的 SQL Server 和 Windows 上的 SQL Server 容器就是发布者镜像的例子。

    *   *构建*：这允许你从 Git 仓库（如 GitHub、GitLab 和 Bitbucket）自动构建并上传 Docker 镜像。

    *   *Webhook*：这允许你通过自动化与其他服务集成，例如在成功上传 Docker 镜像到 Docker Hub 时触发自动化服务器。


    Docker Hub 可通过 [*https://hub.docker.com/*](https://hub.docker.com/) 访问，并且是 Docker
    引擎用于搜索、推送或拉取 Docker 镜像的默认容器注册中心。如果你想搜索要使用的特定 Docker 镜像，这是你的第一站。图 [4-6](#484552_1_En_4_Chapter.xhtml#Fig6)
    显示了在 Docker Hub 上搜索 SQL Server 的结果。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig6_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig6_HTML.jpg)

    *图 4-6：在 Docker Hub 上搜索 SQL Server 的结果*


    除了 Docker Hub，你还可以使用其他可用的公共容器注册中心。更流行的是来自主要云提供商的注册中心，如 Amazon Elastic Container
    Registry (ECR)、Microsoft Container Registry (MCR) 和 Google Container Registry
    (GCR)。你可以让 Docker 覆盖默认配置，与不同的公共容器注册中心一起工作。后面章节将展示一个例子。如果你不想使用公共容器注册中心，你可以在本地部署自己的私有容器注册中心。


    与容器注册中心相关的一个术语是 *pull*（拉取）。Pull 只是下载的一个花哨说法。当 Docker 守护进程拉取了 `hello-world` 镜像时，只是意味着它从
    Docker Hub 下载了该镜像并放入其本地文件系统。伴随着拉取（pull）这个词的是它的对应词——*push*（推送）。同样，这只是上传的一个花哨说法。


    由于 Docker Hub 是一个公共仓库，你无需创建 Docker ID 即可拉取可用的 Docker 镜像。但是，如果你决定将自己定制的 Docker
    镜像推送到 Docker Hub，你需要注册一个 Docker ID（如果你超出免费套餐，还需要准备好信用卡信息）。'
  raw: '## Docker Commands


    The *docker* command is the base command that you use when interacting with the
    Docker daemon through the Docker CLI client. To perform Docker administrative
    tasks, you either use subcommands or management commands with their corresponding
    parameters. A great way to explore all the different subcommands or management
    commands is to run the `docker` or `docker help` commands. Figure [4-5](#484552_1_En_4_Chapter.xhtml#Fig5)
    shows all the available options and commands. A complete list of docker commands
    is available on the Docker documentation [*https://docs.docker.com/engine/reference/commandline/docker/*](https://docs.docker.com/engine/reference/commandline/docker/).


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig5_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Display all available Docker options and commands


    You’ve already used some of these commands like *docker run*, `docker version`,
    and `docker info`.


    Don’t get ahead of yourself. We will be using several of these options and commands
    throughout the book to perform Docker administrative tasks .


    ## Docker Images and Containers


    I got confused the first time I’ve seen the term *Docker image* as it usually
    appears together with the term *Docker containers*. I’ll save you the hassle that
    this confusion might cause.


    A Docker image is a static, *read-only* template for creating application containers.
    It’s a non-running representation of all the various components required to run
    the application. A Docker container, however, is a runtime instance of the image.
    When you ran the `docker run hello-world` command, *hello-world* is the name of
    the Docker image. You can think of a Docker image as a blueprint, like a technical
    drawing for a car. You create the blueprint (Docker image) based on how you want
    the car (Docker container) to look like and function. Once the blueprint has been
    finalized, you can create as many instances as you want of the car based on the
    blueprint. You have the freedom to make changes to the aesthetic of the car –
    color, accessories, interiors, and the like – without the need to modify the blueprint.
    Should you decide to make major modifications to the car, you have to go back
    to the drawing board and rewrite the blueprint.


    This is just a high-level overview of what Docker containers and Docker images
    are, just enough to get you started with understanding the components of the Docker
    ecosystem. *Chapter* [*5*](#484552_1_En_5_Chapter.xhtml) dives deeper into the
    internals of what they are and how they are stored in the filesystem.


    ## Docker Hub


    Docker Hub is a container registry. It’s a cloud-based, public repository from
    Docker, Inc. used for creating, testing, storing, and distributing Docker images.
    Think of it as the Apple App Store or the Google Play store of Docker images.
    Docker Hub provides several services and features:


    *   *Repository*: It is where you can store your Docker images, either for private
    or public use.


    *   *Teams and organizations*: This is a way to manage permissions and access
    to Docker images stored on your repository. You can create teams and assign users
    to them as well as create an organization that consists of teams and different
    repositories.


    *   *Official images*: These are a curated set of Docker repositories hosted on
    Docker Hub for providing base operating system images, a download-and-use image
    for popular programming languages and platforms, and reference for best practices
    on how to use them. These images are stored in the top-level repositories (more
    of this in the section on “Docker Image Naming Convention”), and it’s safe to
    assume that they are from reliable and trustworthy sources.


    *   *Publisher images*: Docker Hub hosts Docker images from software vendors like
    Microsoft, Oracle, Red Hat, IBM, and so on. These images are maintained and supported
    by the corresponding vendors. The SQL Server on Linux and SQL Server on Windows
    containers that we will be using in later chapters are examples of publisher images.


    *   *Builds*: This allows you to automatically build and upload Docker images
    from a Git repository like GitHub, GitLab, and Bitbucket.


    *   *Webhooks* : This allows you to integrate with other services through automation,
    such as triggering an automation server when you successfully uploaded a Docker
    image to Docker Hub.


    Docker Hub is accessible through [*https://hub.docker.com/*](https://hub.docker.com/)
    and is the default container registry that the Docker engine uses to search, push,
    or pull Docker images. This is your first stop if you want to search for specific
    Docker images that you want to use. Figure [4-6](#484552_1_En_4_Chapter.xhtml#Fig6)
    displays the search results for SQL Server on Docker Hub.


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig6_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Search results for SQL Server on Docker Hub


    There are available public container registries other than Docker Hub that you
    can use. The more popular ones are from the major cloud providers like Amazon
    Elastic Container Registry (ECR), Microsoft Container Registry (MCR), and Google
    Container Registry (GCR). You can tell Docker to override the default configuration
    and work with a different public container registry. An example will be shown
    at a later section. In case you don’t want to use public container registries,
    you can deploy your own private container registry on-premises.


    A term associated with container registries is *pull*. Pull is simply a fancy
    word for download. When the Docker daemon pulled the *hello-world* image, it just
    means it downloaded the image from Docker Hub and into its own local filesystem.
    And with the term pull comes its counterpart – *push*. Again, it’s just a fancy
    word for upload.


    Since Docker Hub is a public repository, you can pull available Docker images
    without the need to create a Docker ID. However, should you decide to push your
    own custom Docker images to Docker Hub, you need to sign up for a Docker ID (and
    have your credit card information available if you go beyond the FREE tier).'
