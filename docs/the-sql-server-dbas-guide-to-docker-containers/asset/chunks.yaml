    # Linux 防火墙与 Docker 注意事项


    我本想在 **第 4 章** 介绍 Linux 防火墙时稍作提及，因为当时正在介绍如何在 Docker 上运行 SQL Server 并远程连接。此外，为了访问资源，你也需要能够远程连接到服务器。但如果你注意观察，之前的章节都没有涉及创建防火墙规则和开放端口号以访问容器内的
    SQL Server 实例。因此，我在此替你提出一个显而易见的问题：如果 CentOS Linux 系统默认启用了 **FirewallD**，它不应该阻止除
    SSH 外的所有连接吗？而如果我在 Ubuntu Linux 系统上启用了 **UFW**，它不也应该阻止除我明确允许之外的所有连接吗？不过，你可能不太关心
    Ubuntu 上的 **UFW**，因为它默认是禁用的。


    答案在于 Docker 在幕后施展的“魔法”。还记得我说过 **iptables** 是大多数 Linux 发行版上基于规则的防火墙吗？每次你创建一个 Docker
    容器并在 `docker run` 命令中使用 `-p` 参数配置端口映射时，Docker 都会直接在 **iptables** 中创建一个防火墙规则作为你实现的一部分。Docker
    在 RHEL/CentOS 上不使用 **FirewallD**，在 Ubuntu 上也不使用 **UFW**，因此当你使用这些工具时，你不会看到任何关于区域、端口号或服务的信息。图
    8-6 展示了在我的 CentOS Docker 主机上已开放的端口和服务列表。请注意，`firewall-cmd` 仅在可用服务列表中显示 `ssh` 和
    `dhcpv6-client`（用于从 DHCP 服务器获取 IP 地址）。然而，查询 **iptables** 显示了一个映射：从任意源（0.0.0.0/0
    IP 地址范围）到 IP 地址 172.18.0.2（这是我 CentOS Docker 主机上分配给 `docker0` 网络接口的 IP 地址，我将在
    **第 11 章** 中更详细地介绍）的 TCP 端口 1433。在 Ubuntu Docker 主机上查询 **iptables** 时，你会看到同样的规则。


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig6_HTML.jpg](img/484552_1_En_8_Fig6_HTML.jpg)


    **图 8-6**

    在 CentOS Docker 主机上，为端口 1433 在 FirewallD 和 iptables 中显示的开放端口及允许的服务


    你可以在 [*https://docs.docker.com/network/iptables/*](https://docs.docker.com/network/iptables/)
    阅读更多关于 Docker 实现的这种防火墙规则“魔法”。他们明确强调不要修改 Docker 在你的 **iptables** 中创建的防火墙规则。如果你的安全策略禁止从任何源访问
    Docker 容器内的 SQL Server 实例，请咨询你的网络工程师如何正确控制网络流量。


    # 在 Linux 上配置 SQL Server


    虽然大多数开箱即用的安装设置没有问题，但你可能希望标准化 SQL Server 部署，以符合你们的内部最佳实践，或者只是为了证明你比普通 SQL Server
    DBA 更聪明。我们在 Windows 上使用 SQL Server 安装中心做过这件事，创建一个 `ConfigurationFile.ini` 文件并用它来部署具有所需配置设置的多个
    SQL Server 实例。我们也曾手动使用 SQL Server 配置管理器对每个实例进行配置。在 Linux 上的 SQL Server，我们该如何做呢？


    `/opt/mssql/bin/mssql-conf` 脚本可用于为你的 Linux 上的 SQL Server 安装设置不同的配置。但除了在安装过程中使用它，我还没有真正描述过这个脚本的用法。让我们以
    Linux 的方式更详细地探讨这个脚本。我在 **第 3 章** 简要提到了使用 Linux `man`（manual 的缩写）页面。虽然现在由于互联网资源丰富，我很少使用
    `man` 页面来查阅文档，但在某些情况下，我确实无法在网上找到关于特定命令的信息。这个脚本就是其中之一。运行以下命令以显示如何使用此脚本：


    ```

    man mssql-conf

    ```


    图 8-7 显示了使用此脚本时的不同选项。


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig7_HTML.jpg](img/484552_1_En_8_Fig7_HTML.jpg)


    **图 8-7**

    mssql-conf 的 man 页面


    使用 `list` 参数显示所有不同的可配置设置，如图 8-8 所示：


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig8_HTML.jpg](img/484552_1_En_8_Fig8_HTML.jpg)


    **图 8-8**

    Linux 上 SQL Server 的可配置设置列表


    ```

    sudo /opt/mssql/bin/mssql-conf list

    ```


    这些是 SQL Server 实例上无法通过 T-SQL 完成的可配置设置。让我们用这些设置来展示如何更改一些最常见的 SQL Server 实例配置设置。下文展示的设置都需要重启
    SQL Server 守护进程，因此我会在最后再执行重启步骤，只展示如何完成所有配置更改。


    ## 启用 SQL Server Agent


    默认情况下，SQL Server Agent 在安装后是禁用的。实际上，在 SQL Server 2017 累积更新 4 之前，你必须使用不同的包单独安装
    SQL Server Agent。我猜社区和 Microsoft MVP 的反馈（或抱怨）导致 SQL Server 产品团队将 SQL Server Agent
    包含在 `mssql-server` 包中。试想一下，如果需要分别更新 SQL Server 数据库引擎和 SQL Server Agent。即使有适当的变更管理流程，任何人也有可能因为这不是我们
    DBA 更新 SQL Server 的常规操作而忘记更新 SQL Server Agent。这样，你的补丁级别最终可能会在两者之间不同。我认为将 SQL Server
    Agent 作为安装 SQL Server 的一部分是一个很棒的主意。


    运行以下命令以启用 SQL Server Agent：


    ```

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    ```


    ## 配置默认数据库数据和日志目录


    数据库数据和日志文件的默认目录是 `/var/opt/mssql/data`。你可能希望配置一个包含固态硬盘的专用存储阵列，并将其挂载为 Linux 系统上的一个目录。但在将一个目录配置为默认数据库数据和日志目录之前，必须先创建它，并将所有权更改为
    `mssql` 用户和 `mssql` 组。运行以下命令创建一个名为 `/tmp/dbdata` 的新目录：


    ```

    sudo mkdir /tmp/dbdata

    ```


    接下来，运行以下命令将目录的所有权更改为 `mssql` 用户：


    ```

    sudo chown mssql /tmp/dbdata

    ```


    你还需要通过运行以下命令将目录的组所有权更改为 `mssql` 组：


    ```

    sudo chgrp mssql /tmp/dbdata

    ```


    目录创建并分配所有权后，你现在可以使用以下命令将默认数据库数据和日志目录设置为新位置：


    ```

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    ```

    '
- fmt: '### Configuring Default Database Backup Directory


    The default database backup directory is also the same as the default database
    data and log directory – `/var/opt/mssql/data`. I like to keep my databases and
    backups separately for disaster recovery purposes. Similar to how you configure
    the default database data and log directory, you have to first create the directory
    and ownership changed to the `mssql` user and `mssql` group. Let’s use the `/tmp/dbbackup`
    directory as the default database backup directory. Run the following commands
    to perform the necessary configuration changes:


    ```

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    ```


    Note


    In case you are wondering what the `mssql` user and `mssql` group are, these are
    the noninteractive login and group assigned to SQL Server nonbinary files. Think
    of it as the SQL Server service account on Windows. The noninteractive login runs
    SQL Server as a background process. But unlike the usual SQL Server service account
    in Windows where you can use the account and its credentials to log in to a Windows
    machine unless you configure it to *Log on as a service*, a noninteractive login
    won''t be able to log in and run commands from a shell. Also, you cannot change
    this to any other user account. I hope this changes in future release.


    ### Enabling Trace Flags


    One of the trace flags that I enable when deploying a new SQL Server instance
    is trace flag `3226`. This suppresses every successful backup entry in the SQL
    Server error log and in the system event log. I used to filter successful backup
    messages from our monitoring server to avoid getting alerted every time a backup
    job completes. This trace flag is a lifesaver. Run the following command to enable
    trace flag `3226` on the SQL Server instance:


    ```

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    ```


    As all of these settings require restarting the SQL Server daemon, it makes sense
    to do everything at once and just restart SQL Server at the end of the configuration.
    Run the following command to restart SQL Server:


    ```

    sudo systemctl restart mssql-server

    ```


    ### Viewing All Instance-Level Configuration Settings


    I wish there was a simple command to display all of the instance-level configuration
    settings other than programmatically querying the SQL Server Management Objects
    (SMO). What if you want to review all of the configuration settings you just did?
    Well, you have to manually read the `/var/opt/mssql/mssql.conf` file for this.
    This file is where SQL Server stores the configuration changes you made and is
    read during startup to load configuration settings other than the defaults. I
    think this is better than programmatically querying SMO. Run the following command
    to view all of the configuration settings of the SQL Server instance. Figure [8-9](#484552_1_En_8_Chapter.xhtml#Fig9)
    displays the instance-level configuration settings set in this section.


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig9_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Viewing configured settings for SQL Server on Linux


    ```

    sudo cat /var/opt/mssql/mssql.conf

    ```


    The `/var/opt/mssql/mssql.conf` file is like any other text file that you can
    modify using your favorite text editor. The format for the file is available at
    [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf?view=sql-server-ver15#mssql-conf-format*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf%253Fview%253Dsql-server-ver15%2523mssql-conf-format).
    Should you decide to manually modify the configuration file, you need to restart
    the SQL Server daemon for the changes to take effect.


    I’m not a big fan of manually modifying file formats because parsers could be
    very strict when it comes to dealing with unnecessary characters. Besides, we’re
    humans and we’re bound to make mistakes. I’ve done my fair share of modifying
    YAML, JSON, and XML files, and a simple mistake like introducing unnecessary characters
    in files can cost a lot of time troubleshooting issues. There’s a reason the phrase
    “fat finger” exists in our line of work. I always use the supported tools like
    the `/opt/mssql/bin/mssql-conf` script to make changes to files. Figure [8-10](#484552_1_En_8_Chapter.xhtml#Fig10)
    shows the side effect of fat-fingering an extra character in the `/var/opt/mssql/mssql.conf`
    file. Restarting the SQL Server daemon didn’t tell me that there was an error
    loading the settings stored in the configuration file. Besides, if there was an
    error reading the configuration file, the parser will just ignore it and load
    the default values. I had to run the command `sudo /opt/mssql/bin/mssql-conf validate`
    to find out that there was an error in the configuration. Can you guess what the
    error was?


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig10_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Potential errors caused by manually modifying the `/var/opt/mssql/mssql.conf`
    file


    ## Working with the Filesystem


    Linux is a file-based operating system. This concept is a little bit hard to grasp
    coming from the Windows operating system. On Windows, we work with the registry,
    system services, representation of hardware devices such as network adapters,
    and the like. On Linux (or Unix, in general), everything is a file. Your hard
    disk is represented by a device file. The configuration settings are stored in
    a file. Even the directory that contains files is a special type of file that
    you can read using a text editor. Recall everything you did since Chapter [3](#484552_1_En_3_Chapter.xhtml)
    – they all reference a file: the repo file, the package files, the filesystem
    layer that the container uses, the container manifest file, the symbolic link
    files, the `daemon.json` file, and so on. If you want to make an application behave
    differently, all you need to do is modify its corresponding configuration file
    (provided you know exactly what you’re doing).'
