  trans: '

    ## 使用 systemd 单元文件配置 Docker 守护进程的远程访问


    我们将使用 `systemd` 来配置 Docker 守护进程的远程访问，而不是使用 `dockerd` 或 `daemon.json` 文件。Docker
    文档提到了在 `daemon.json` 文件中设置 `hosts` 数组以允许远程访问 Docker 守护进程。遗憾的是，我已经根据文档测试了尽可能多的可能变体，但均未成功。因此，我尝试了文档中提到的其他方法。这就引出了使用
    `systemd` 的方法。


    `systemd` 提供了在 Linux 上控制程序和进程的标准流程。它是一个初始化系统和服务管理器，包含了按需启动守护进程、启动时的并行处理以及使用 Linux
    控制组进行进程跟踪等功能。初始化系统是一个守护进程，在计算机启动时开始运行，并一直运行到计算机关机。在 `systemd` 中，一个 `单元` 指的是系统知道如何控制的任何资源。这些资源是通过称为单元文件的配置文件来定义的。你可以使用单元文件来定义这些资源在系统上的管理方式。除了使用
    `dockerd` 标志和 `daemon.json` 外，Docker 守护进程也可以通过 `systemd` 单元文件进行配置。


    **注意**


    我没有将使用 `systemd` 作为配置 Docker 守护进程的方式包含在内，因为它需要了解 Linux 内部机制。由于 Docker 守护进程就像 Linux
    上运行的任何其他守护进程一样，你使用 `systemd` 配置 Docker 的方式与配置其他守护进程的方式并无不同。但请务必非常小心。**只选择一种方式**来配置
    Docker 守护进程。使用 `systemd`、`dockerd` 标志或 `daemon.json` 配置 Docker 可能会导致冲突，从而阻止 Docker
    守护进程启动。


    在此任务中，我们将使用 `systemd` 来修改默认的 Docker 配置：


    1.  运行以下命令，使用 Linux 上的默认文本编辑器为 Docker 守护进程创建一个覆盖文件。覆盖文件是一种在不修改相应 `systemd` 单元文件的情况下更改守护进程行为的方法。`systemctl
    edit` 命令确保覆盖设置被正确加载。


    ```

    sudo systemctl edit docker.service

    ```


    2.  在文件中添加以下内容并保存：


    ```

    [Service]

    ExecStart=

    ExecStart=/usr/bin/dockerd -H fd:// -H tcp://172.28.106.158:2376

    ```


    将提供的 IP 地址替换为你的 CentOS Linux Docker 主机的 IP 地址。另外，Docker 守护进程默认监听的端口号是 2375（未加密）和
    2376（加密）。端口 2376 将用于 Docker CLI 客户端与 Docker 守护进程之间的安全通信。


    `-H` 标志将 Docker 守护进程绑定到一个监听套接字，可以是 Unix 套接字或 TCP/IP 端口。你可以指定多个 `-H` 标志来绑定多个套接字/端口，如示例所示。


    对于 `ExecStart` 参数被指定两次，不要困惑。有些参数在设置新的覆盖值之前需要先被清除。`ExecStart` 参数就是其中之一。


    3.  运行以下命令重新加载 `systemd` 单元文件：


    ```

    sudo systemctl daemon-reload

    ```


    4.  最后，重启 Docker 守护进程：


    ```

    sudo systemctl restart docker

    ```


    一旦完成，Docker 守护进程现在就被配置为监听一个 TCP/IP 端口，并且可以远程访问。你可以检查 Docker 守护进程的状态进行验证，如图 6-3
    所示。


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig3_HTML.jpg](img/484552_1_En_6_Fig3_HTML.jpg)


    图 6-3

    在 CentOS Linux Docker 主机上配置的 TCP 端口远程访问


    此外，你可以使用以下 `netstat` 命令来验证 Docker 守护进程确实在监听端口 2376（如果你的 Linux 主机上没有安装 `netstat`
    命令，请运行 `yum -y install net-tools` 命令来安装必要的软件包）：


    ```

    sudo netstat -lntp | grep dockerd

    ```


    你肯定需要知道如何使用 `vi` —— Linux 上的默认文本编辑器。否则，就在 Windows 上使用你喜欢的文本编辑器创建名为 `override.conf`
    的覆盖文件。然后，你可以使用 WinSCP 将 `override.conf` 文件复制到 `/etc/systemd/system/docker.service.d/`
    目录。如果你没有使用 `systemctl edit` 命令，则需要手动创建 `docker.service.d` 目录。


    **提示**


    在本章前面，我提到了使用带标志的 `dockerd` 或 `daemon.json` 文件来对 Docker 守护进程进行配置更改。我希望情况总是如此。但我使用开源软件的经验教会了我要预料到几个挑战。其中之一就是做事方式的不一致性。为远程访问配置
    Docker 守护进程就是一个例子。在处理开源软件时，不一致性是意料之中的。我只是在设定合理的预期，以防你感到沮丧。

