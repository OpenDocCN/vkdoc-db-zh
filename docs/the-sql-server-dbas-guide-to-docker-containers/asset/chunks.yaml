  trans: '

    ### 镜像清单


    如果存在一个“胖”清单，其内部会有一个 `manifests` 字段，其中包含一个指向不同平台镜像清单的列表，就像指向镜像清单的指针。如果不存在，当你运行
    `docker manifest inspect` 命令时，你得到的就是 `镜像清单`。镜像清单提供了构建镜像所需的不同文件系统层的详细信息，以及一个配置，该配置告诉
    Docker 守护进程如何将所有层拼凑在一起以运行容器。你可以把不同的文件系统层看作乐高积木，把镜像清单看作搭建说明书（这就是我第一次吃到“开心乐园餐”时如此难忘的原因）。通用的乐高积木本身并不知道它们之间是如何关联的。只有搭建说明书拥有将它们全部连接起来的细节，这样你才能拼出一个星球大战千年隼号。你甚至可以用现有的积木（文件系统层）创建自己的乐高结构（Docker
    镜像），只要你同时也创建了自己的搭建说明书（镜像清单）——即使说明书只存在于你的脑海中。从仓库中拉取 Docker 镜像的过程包括获取镜像清单和文件系统层。


    运行以下 `docker inspect` 命令来探索 `hello-world` 镜像的低层级细节。请注意，你是在检查一个镜像，而不是容器。你可以使用 `docker
    inspect` 命令来检查镜像和容器。但此刻我们只对镜像感兴趣。


    ```

    docker inspect hello-world

    ```


    如果你在输出中向下滚动到 `Layers` 部分，它会告诉你这个镜像有多少个文件系统层。图 5-9 显示 `hello-world` 镜像只有一个文件系统层。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig9_HTML.jpg](img/484552_1_En_5_Fig9_HTML.jpg)


    图 5-9


    只有一个文件系统层的 hello-world 镜像


    提示


    不要混淆 `docker manifest inspect` 和 `docker inspect` 命令。它们可能都有相同的 `inspect` 子命令，但功能不同。如果你想探索一个清单——无论是“胖”清单还是镜像清单——请使用
    `docker manifest inspect` 命令。如果你想探索 Docker 对象（如镜像或容器）的低层级细节，请使用 `docker inspect`
    命令。可惜它们都以 JSON 数组返回结果。JSON 的普遍性真是无处不在。


    回想一下图 5-10 所示的 `docker run hello-world` 命令的输出。它与从 Docker Hub 拉取的文件系统层的数量是一致的。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig10_HTML.jpg](img/484552_1_En_5_Fig10_HTML.jpg)


    图 5-10


    运行 hello-world 容器，拉取一个文件系统层


    同样地，你可以运行以下命令来探索 SQL Server on Linux 镜像：


    ```

    docker inspect mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    图 5-11 显示了 `Layers` 部分有九个文件系统层，这也与图 5-1 所示的文件系统层数量一致。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig11_HTML.jpg](img/484552_1_En_5_Fig11_HTML.jpg)


    图 5-11


    SQL Server on Linux 镜像的文件系统层


    请访问 [`docs.docker.com/registry/spec/manifest-v2-2/`](https://docs.docker.com/registry/spec/manifest-v2-2/)
    获取有关清单的更多信息。虽然对于我们使用容器上的 SQL Server 来说，只有镜像清单是相关的，但知道你可以让 Docker 容器在多个平台上运行，会让你了解到其可能性。谁知道呢，也许微软未来会决定在
    x64 以外的其他平台上运行 SQL Server。


    ### 内容摘要


    在广袤的互联网世界中，下载任何东西而不验证其完整性和真实性是不明智的。你无法知道内容是否被恶意篡改过，或是作为变更请求的一部分被修改过。这就是内容寻址存储概念的用武之地。内容寻址存储用于存储信息，以便可以根据其内容而非位置来检索。它使用根据内容生成的加密哈希函数的摘要。其工作原理是：根据文件（或
    Docker 中的文件系统层）的内容生成一个哈希函数。生成的哈希被称为 `内容摘要`。由于内容摘要哈希值是文件系统层内容的哈希，改变层中的内容就需要改变内容摘要。


    因此，当你运行 `docker pull` 或 `docker run` 命令时，内容摘要会作为返回码的一部分包含在内。Docker Hub 发送的文件系统层具有与镜像清单中定义的内容摘要相同的值。下载后，Docker
    守护进程会重新运行哈希计算，并验证文件系统层的内容摘要是否与镜像清单中定义的一致。这保证了构成镜像的文件系统层的完整性和真实性，无论它们存储在哪里——无论是在
    Docker Hub 上还是你自己的容器注册表中。

    '
- fmt: '### Distribution Hash


    I wish I can say that the digest values in the image manifest are the same as
    what you get from the `Layers` section of the output from the `docker inspect`
    command. That would make it easy for us to identify which digest corresponds to
    which layer just by looking at both the image manifest and the `Layers` section.
    Unfortunately, it’s more complicated than that. Just have a look at the hash in
    the image manifest for the SQL Server on Linux image and compare it to the `Layers`
    section, as shown in Figure [5-12](#484552_1_En_5_Chapter.xhtml#Fig12).


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig12_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig12_HTML.jpg)


    Figure 5-12

    Comparing the digest values for the SQL Server on Linux image layers


    That’s because when you are working with files across the network, a form of file
    compression is implemented to improve network bandwidth and storage space requirements.
    It’s the same thing when working with other file types on the Internet. But compressing
    a file changes its content and, as a result, also changes its content digest.
    Surely, this would be an issue when you are pushing and/or pulling the filesystem
    layers because the content digests no longer match – the hash verification would
    fail.


    To address this issue, a `distribution hash` is generated. Distribution hashes
    are generated after the filesystem layers are compressed. Every single filesystem
    layer used to build an image will be compressed and distribution hash generated.
    The distribution hash for each filesystem layer is what gets written in the image
    manifest. Once the distribution hashes have been written in the image manifest,
    the image can now be pushed to Docker Hub or other container registries.


    The hash that you see in the `Layers` section when you run the `docker inspect`
    command for the image is the uncompressed hash – the content digest – of the filesystem
    layer. Meanwhile, the hash value in the `digest` field of the image manifest is
    that of the compressed filesystem layer – the distribution hash. Given the details
    of how the content digest and distribution hashes work with manifests, Docker
    images, and filesystem layers, Figure [5-13](#484552_1_En_5_Chapter.xhtml#Fig13)
    presents a better picture of the SQL Server on Linux image manifest shown in Figure
    [5-6](#484552_1_En_5_Chapter.xhtml#Fig6). Also, run the following command to display
    the details of the SQL Server on Linux image:


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig13_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig13_HTML.jpg)


    Figure 5-13

    Content digest and distribution hashes for the SQL Server on Linux image


    ```

    docker images mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    ## Your Docker Host’s Local Filesystem


    Once the filesystem layers required to build the image have been downloaded into
    your Docker host’s local filesystem, the Docker daemon cooks up its magic to assemble
    the pieces so you can run a container. Well, only the assembling of the pieces
    is true in that statement. But it may seem like magic when you do think about
    what is going on under the covers. Let’s have a look at the different components
    that make this magic happen.


    ### Union Filesystem


    Working with Docker containers and how they work with the filesystem require an
    understanding of `union filesystems`. A union filesystem allows you to take different
    filesystem layers and create a union of their contents, with the topmost layer
    overriding any similar files found in the layers below. The simplest way I can
    describe this without overwhelming you with the technical details is like writing
    something – like ABC – on a transparent tape. I can stick another layer of transparent
    tape on top of the existing one with a totally different writing – like DEF. I’ll
    stick another layer above the topmost layer with a different writing – like GHI.
    When I look at the layers of transparent tape from the top, what I would see is
    a single layer with the writing ABCDEFGHI, assuming you didn’t write directly
    on top of the transparent tape layer below it. From Docker’s point of view, all
    of these layers of transparent tape are what make up an image. Regardless of how
    many layers there are, there’s just one image.


    The way a union filesystem is implemented is through storage drivers. In Linux,
    the most common ones are OverlayFS and AUFS (formerly known as AnotherUnionFS
    until it was renamed to advanced multilayered unification filesystem). AUFS was
    the default storage driver in earlier versions of Docker. Newer installations
    leverage `overlay2`, which is an improved version of OverlayFS .'
