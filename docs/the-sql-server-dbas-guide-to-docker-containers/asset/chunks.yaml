- fmt: '# 1. Introduction to Containers


    > Those who cannot remember the past are condemned to repeat it.

    >

    > —George Santayana


    Container technologies are changing the way we develop, deploy, and run software.
    While it may seem like a technology that came out of nowhere and is now taking
    over IT organizations, nothing could be further from the truth.


    In this chapter, we’ll travel back in time to look at a bit of the history around
    container technologies and how it evolved. You might be thinking: “I hated history
    in high school.” And I can totally relate. I only read history in high school
    and college for the sole purpose of answering test questions. I hated memorizing
    names and dates. So, why even bother with the history of container technologies?


    History gives us the benefit of hindsight, something you don’t have when you are
    experiencing something for the very first time. When somebody else has already
    done what you are trying to accomplish, you have the benefit of the lessons they
    have learned, their mistakes that you can avoid, and possibly the patterns that
    seem to appear out of nowhere. These history lessons are full of insights that
    can help you better understand the technology or the world, in general. Over the
    years, I’ve learned to appreciate history and how it shaped our current reality
    – better yet, how I can change my present so I can shape the future.


    We’ll also look at the company – `Docker, Inc.` – behind the development of the
    most widely used and recognized container technology today.


    Conversations around container technologies wouldn’t be complete without comparing
    it with virtualization technologies. We’ll spend a little bit of time looking
    at the similarities and differences between the two.


    Finally, we’ll look at how `Microsoft` adopted the container technology for both
    `Windows` and `SQL Server`.


    ## The Latest 30-Year-Old Technology


    I was surprised when I learned that container technologies date back to 1979.
    It was the `Unix V7` that allowed processes to run in isolation – the ability
    to isolate and protect one process from another – at the operating system level.
    The idea came about due to the need to share very expensive computing resources
    among many users at the same time. Think back to the days when mainframes can
    only do one specific task that can take days or even weeks to run.


    However, like any other technological innovation that didn’t get as much adoption,
    process isolation technologies became stagnant. It wasn’t until the year 2000
    when the Unix-like operating system `FreeBSD` introduced `Jails` – a mechanism
    to partition a computer system into several independent mini-systems, each with
    its own files, processes, and security. You can think of this as the early days
    of the virtualization technologies that we know of today.


    Several variations of implementing process isolation technologies evolved afterward,
    including the `Linux VServer` in 2001 (a patch to the Linux kernel that allowed
    operating system–level virtualization), `Solaris Containers` in 2004 (former `Sun
    Microsystems`’ implementation of operating system–level virtualization), and `Open
    Virtuozzo` in 2005. In 2006, `Google` came up with their own addition to the Linux
    kernel and named it `Process Containers`, later renaming it to `Control Groups`
    (`cgroups`) to avoid confusion with the word container in the context of the Linux
    containers.


    The year 2008 became the pivotal moment for the evolution of container technologies
    when the `Linux Containers` (`LXC`) project was created, merging the work that
    `Google` engineers have done in `cgroups` into the Linux kernel. It allowed for
    running multiple isolated Linux systems on a host using a single Linux kernel
    – without the need for an additional patch.


    The `LXC` became the building block of the modern container technologies that
    came after it. In 2011, `VMWare` with `EMC` and `General Electric` started an
    open source initiative named `Cloud Foundry Warden` for managing a collection
    of containers across multiple hosts. In 2013, `Google` created yet another open
    source version of their container stack called `lmctfy` (which stands for Let
    Me Contain That For You) and have since collaborated with `Docker, Inc.` for the
    development of the container runtime environment, `libcontainer`.


    Container technologies may seem like the latest technology that is sweeping the
    IT world. The fact of the matter is that it isn’t new. It was just way ahead of
    its time. And now that its time has arrived, you just cannot afford to ignore
    it.


    ## Docker – The Company and the Container Runtime


    `Docker` is to container runtime engine much like how `VMWare` is to virtualization
    or `Red Hat` is to `Linux` – it has become a huge brand name in the IT world.
    The `Docker` runtime engine was developed by the company `Docker, Inc.` The company
    didn’t start out as a development company. In fact, they started as a platform-as-a-service
    company that allowed developers to build and run apps without worrying about the
    underlying infrastructure. Unfortunately, the company was struggling to generate
    revenue and pay their bills. The good thing about it is that they learned how
    to make the most out of the situation they were in.


    While `Docker, Inc.` was having financial difficulties, the engineers decided
    to open source the underlying technology – `Docker`, the container runtime engine
    – behind their platform-as-a-service offering in 2013. They didn’t expect it to
    take off. And when it did, the company pivoted their business and focused on `Docker`.
    They even changed their name from `dotCloud`, the original name when the company
    was founded, to `Docker, Inc.` Thus, the modern container technology was born.
    Early versions of `Docker` leveraged `LXC` as the container runtime engine. Later
    versions use `libcontainer`.


    It’s interesting to see how `Docker` pivoted from a struggling business to what
    can now be considered a profitable software company. We, IT professionals, need
    to learn from their example. We need to learn how to pivot when the need arise.
    Learn emerging technologies instead of settling for old ones so long as they meet
    business objectives. We need to learn how to pivot our roles from purely technical
    to more of leadership. And since technology is constantly evolving, we need to
    evolve with it, changing roles whenever necessary.


    This is key to success in the IT industry.


    ## The Case for Containers


    We IT professionals like to geek out on technology because they are cool and fun.
    It’s easy to fall into the trap of focusing on technology for technology’s sake.
    But realize that every successful technology is meant to solve a business problem.
    To be successful as an IT professional, we need to focus on the business problem
    that a technology solution is meant to solve.


    So what business problem does container technology solve? Reliably run software
    when moved from one computing environment to another. `SQL Server` administrators
    deal with this every time a database is migrated or upgraded from one platform
    to another – from physical machine to another physical machine, from physical
    machine to virtual machine, from older version to newer version, or from on-premises
    to the cloud. A more common scenario is when a developer writes `T-SQL` code from
    their development environment and promotes the code in staging environment and
    even production. Even with a proper change management process, this can still
    be an issue because there is no guarantee that the different computing environments
    will be the same. Configuration drift accounts for many high availability and
    disaster recovery system failures that I have to deal with as a consultant.


    Container technology addresses this problem. It does so by packaging an application
    and all of its dependencies like binaries, kernel libraries, configuration files,
    system tools, and so on and creating an entire runtime environment. A container
    image is created and packaged with the application and all of its dependencies.
    The image is then deployed as a container at runtime.'
