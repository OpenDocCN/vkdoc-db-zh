    SQL Server on Linux 镜像。将相同的卷 `sqldbdata` 挂载到这个新容器，并重用相同的端口号和主机名。


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevlinuxcon02 -d -h linuxsqldev01 --mount source=sqldbdata,target=/var/opt/mssql
    customsql2019-nonroot:v1.0

    ```


    请记住，一旦你升级——从 SQL Server 2017 到 SQL Server 2019——就无法回头。这与更新具有相同版本但不同 CU 的容器不同，如果事情没有按计划进行，你可以回滚到之前的版本。好的旧式、经过验证的备份确实是无可替代的。'
- fmt: '## Optimizing the Dockerfile


    让我们在 *Chapter 9* 中关于优化 *Dockerfile* 的内容基础上继续。然而，当你查看镜像大小时，其实并没有太多可优化的空间。图 10-13
    展示了自定义的 SQL Server 2017 on Linux 镜像的层结构，该镜像以非 `root` 用户运行，你可以通过 `docker history`
    命令查看。


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig13_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig13_HTML.jpg)


    **图 10-13**


    列出自定义 SQL Server on Linux Docker 镜像的不同文件系统层


    最大的层是包含安装 SQL Server 指令的层。对于这一层，我们确实无能为力，除非你想采用我们在自定义 SQL Server on Windows 镜像中所做的那样，删除安装文件。方法是在使用以下指令安装
    SQL Server 后，清空 `yum cache`：


    ```

    RUN yum cache all

    ```


    但是，与其添加另一条指令，不如将其附加到第 3 行，如下列命令所示，这样不会创建额外的镜像层：


    ```

    #Step 3

    RUN yum install -y mssql-server && yum cache all

    ```


    **提示**


    在 Linux 中，你可以在单行中运行多个命令，就像 `#Step 3` 中的例子一样。你甚至可以在单行中组合多个不同的命令，只需用连接符将它们分开即可。这被称为“命令链”，即在单行中拼接多个命令。在前面的例子中，使用了
    `&&` 操作符。还有其他命令链操作符可用，例如分号操作符 `;`，但为了简单起见，在 *Dockerfiles* 中我们将坚持使用 `&&` 操作符。


    这不会节省大量空间，大概 80MB 左右。SQL Server on Linux 的安装包不像 SQL Server on Windows 安装文件那么大。


    你可能想做的另一件事是将第 25、26 和 27 行合并为一个 `RUN` 指令。但由于这些只是为 `sqlservr`、`paldumper` 和 `gdb`
    添加功能，将它们合并到一个 `RUN` 指令中并不会真正节省空间，只是减少了镜像层的数量。


    你可以消除第 5 步中的 `ENV` 指令，并将其包含在第 6 步的 `CMD` 指令中，如下所示：


    ```

    CMD ["/opt/mssql/bin/sqlservr"]

    ```


    但这只是一个表面上的优化——减少了镜像层的数量，但没有减小镜像大小。我留给你去创建一个以非 root 用户运行的自定义 SQL Server on Linux
    镜像，并尽可能优化它。


    ## Running Scripts Inside the Dockerfile


    到目前为止，我们构建的自定义 SQL Server on Linux 镜像都是为生产环境部署而设计的。请注意，我没有包含安装 SQL Server 命令行工具。正如我在
    *Chapter 4* 中提到的，我不喜欢在生产服务器上安装任何不必要的东西，包括客户端工具。对于开发环境，我只安装真正需要的东西，比如 SQL Server
    命令行工具。


    ### Install the SQL Server Command-Line Utilities


    要在 Linux 上安装 SQL Server 命令行工具，需要下载一个不同的 `repo` 文件。你可以在 *Dockerfile* 的第 2 步包含以下命令：


    ```

    #For RHEL/CentOS

    curl -o /etc/yum.repos.d/msprod.repo https://packages.microsoft.com/config/rhel/7/prod.repo

    #For Ubuntu

    add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/prod
    xenial main"

    ```


    更新后的 *Dockerfile* 第 2 步看起来像下面这样，优化为一个 `RUN` 指令：


    ```

    #For RHEL/CentOS

    RUN curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo
    && curl -o /etc/yum.repos.d/msprod.repo https://packages.microsoft.com/config/rhel/7/prod.repo

    #For Ubuntu

    RUN add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main" && add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/prod
    xenial main"

    ```


    更新后的第 3 步现在将包括在 Linux 上安装 SQL Server 命令行工具，如下所示。你需要传递 `ACCEPT_EULA` 参数，值为 `Y`，以便在安装过程中自动响应
    EULA 提示。当我们只安装 SQL Server 时不需要这个，因为我们将其作为 `docker run` 命令的参数传递。


    ```

    #For RHEL/CentOS

    RUN ACCEPT_EULA=Y yum install -y mssql-server mssql-tools unixODBC-devel

    #For Ubuntu

    RUN ACCEPT_EULA=Y apt-get install -y mssql-server mssql-tools unixODBC-devel

    ```


    由于 SQL Server 命令行工具存储在不同的目录中，你需要更新第 5 步，添加一个额外的路径，如下所示：


    ```

    ENV PATH=${PATH}:/opt/mssql/bin:/opt/mssql-tools/bin

    ```


    在自定义 SQL Server on Linux 镜像上安装了 SQL Server 命令行工具后，你就可以在部署用于开发环境的容器时运行不同的 T-SQL
    脚本了。'
  raw: '## Optimizing the Dockerfile


    Let’s build on what we’ve covered in *Chapter* [*9*](#484552_1_En_9_Chapter.xhtml)
    on optimizing the *Dockerfile*. However, there really isn’t much to optimize when
    you look at the image size. Figure [10-13](#484552_1_En_10_Chapter.xhtml#Fig13)
    shows the image layers of the custom SQL Server 2017 on Linux image that runs
    as a non-*root* user when you run the *docker history* command.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig13_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig13_HTML.jpg)


    Figure 10-13


    Listing the different filesystem layers for the custom SQL Server on Linux Docker
    image


    The biggest layer is the one that has the instruction to install SQL Server. And
    we can’t really do anything about that layer unless you want to do what we did
    on the custom SQL Server on Windows image and delete the installation files. The
    way to do this is to clear the *yum cache* after installing SQL Server using the
    following instruction:


    ```

    RUN yum cache all

    ```


    But instead of adding another instruction, you can append it to Line 3 like the
    following command so it doesn’t create an additional image layer:


    ```

    #Step 3

    RUN yum install -y mssql-server && yum cache all

    ```


    Tip


    In Linux, you can run multiple commands in a single line, like the example in
    *#Step 3*. You can even combine multiple different commands in a single line.
    You just have to separate them with a chaining operator. This is known as “command
    chaining,” where you are stitching together multiple commands in a single line.
    In the preceding example, the AND operator (&&) is used. There are other command
    chaining operators that you can use like the semicolon operator (;), but we’ll
    keep it simple and stick with the AND operator in *Dockerfiles*.


    There won’t be a huge space saving, probably around 80MB. The SQL Server on Linux
    packages are not as huge as the SQL Server on Windows installation files.


    The other thing that you might be tempted to do is to combine Lines 25, 26, and
    27 into a single *RUN* instruction. But because these are just adding capabilities
    to the *sqlservr*, *paldumper*, and *gdb*, you’re not really saving space when
    you combine them in a single *RUN* instruction. You’re just reducing the number
    of image layers.


    You could eliminate the *ENV* instruction in Step 5 and include it in the *CMD*
    instruction in Step 6 as shown in the following:


    ```

    CMD ["/opt/mssql/bin/sqlservr"]

    ```


    But it’s just going to be a cosmetic optimization  – reducing the number of image
    layers but not reducing the image size. I’ll leave it up to you to create a custom
    SQL Server on Linux image that runs as non-root and optimize it as much as you
    can.


    ## Running Scripts Inside the Dockerfile


    The custom SQL Server on Linux images that we’ve built up to this point were designed
    for deployment in a production environment. Notice that I didn’t include the installation
    of the SQL Server command-line utilities. As I mentioned in *Chapter* [*4*](#484552_1_En_4_Chapter.xhtml),
    I don’t like installing anything unnecessary on production servers, including
    client tools. For development environments, I only install the things that I really
    need like the SQL Server command-line utilities.


    ### Install the SQL Server Command-Line Utilities


    To install the SQL Server command-line utilities on Linux, it requires downloading
    a different *repo* file. You can include the following command on Step 2 of the
    *Dockerfile*:


    ```

    #For RHEL/CentOS

    curl -o /etc/yum.repos.d/msprod.repo https://packages.microsoft.com/config/rhel/7/prod.repo

    #For Ubuntu

    add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/prod
    xenial main"

    ```


    The updated Step 2 on your *Dockerfile* looks something like the one in the following
    optimized as a single *RUN* instruction:


    ```

    #For RHEL/CentOS

    RUN curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo
    && curl -o /etc/yum.repos.d/msprod.repo https://packages.microsoft.com/config/rhel/7/prod.repo

    #For Ubuntu

    RUN add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main" && add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/prod
    xenial main"

    ```


    The updated Step 3 will now include installing the SQL Server command-line tools
    on Linux as shown in the following. You need to pass the *ACCEPT_EULA* parameter
    with a value of *Y* to automatically respond to EULA prompts during installation.
    We didn’t need this when we were just installing SQL Server since we’re passing
    it as a parameter of the *docker run* command.


    ```

    #For RHEL/CentOS

    RUN ACCEPT_EULA=Y yum install -y mssql-server mssql-tools unixODBC-devel

    #For Ubuntu

    RUN ACCEPT_EULA=Y apt-get install -y mssql-server mssql-tools unixODBC-devel

    ```


    Since the SQL Server command-line tools are stored in a different directory, you
    need to update Step 5 with an additional path as shown in the following:


    ```

    ENV PATH=${PATH}:/opt/mssql/bin:/opt/mssql-tools/bin

    ```


    With the SQL Server command-line tools installed on the custom SQL Server on Linux
    image, you can run different T-SQL scripts as part of deploying the container
    for the development environment.'
  trans: '## 优化 Dockerfile


