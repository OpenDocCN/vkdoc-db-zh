  trans: '

    伴随着 SQL Server 在 Linux 上的发布，另一项早已兴起的技术创新也随之而来：容器技术。虽然容器最初是为 Linux 操作系统设计的，但它解决了一个每个
    IT 组织都面临的独特业务问题：当软件从一个计算环境迁移到另一个计算环境时，能够可靠地运行。想象一下，升级或迁移从物理机到另一台物理机，或者到虚拟机，或者到公有云。甚至将代码从开发者的笔记本电脑移动到生产环境。我相信你肯定不止十几次听过你的开发者说“但它在我笔记本上是可以运行的”。容器技术就是来消除这些挑战的。


    既然这两项技术都已可用，那么看到微软不仅支持在容器技术中运行的 Linux 版 SQL Server，还将其用于自身的内部开发和构建流程，也就不足为奇了。在容器上运行的
    Linux 版 SQL Server 比我们过去二十五年来熟知的 Windows 版 SQL Server 变得更加普遍，这只是时间问题。


    而这正是本书的目标。像你这样已经使用 SQL Server 一段时间的数据库管理员和开发人员，对关系数据库引擎已经略知一二。你已经知道 SQL Server
    如何在数据页上存储数据，索引如何加速（或不加速）查询，以及它如何实现高可用性。我希望你带着这些相同的知识和经验，为迎接容器技术的下一波技术创新浪潮做好准备。想象你正在一段旅程中，这本书将是你的向导，每一章都为你铺就通往最终目的地的步骤。


    ## 本书结构


    本书包含 11 个章节和一个附录，结构如下：


    *   第 `1` 章向你介绍容器技术，简要回顾其起源历史，以及微软如何将其应用于 Windows Server 操作系统和 Linux 上的 SQL Server。

    *   第 `2` 章将引导你如何将 Windows Server 操作系统配置为容器主机，让你能够利用现有的 Windows 知识。

    *   第 `3` 章涵盖了一些关于 Linux 操作系统的基础知识，为你将其配置为容器主机做好准备。

    *   第 `4` 章介绍 Docker 生态系统，以更好地理解容器技术的工作原理。

    *   第 `5` 章向你介绍 Docker 镜像和容器，但重点在于如何将其与 SQL Server 配合使用。

    *   第 `6` 章讲解容器的管理和运维，介绍操作容器时你需要执行的最常见任务。

    *   第 `7` 章介绍在容器中持久化数据的概念，因为 SQL Server 的设计目的就是存储和持久化数据。

    *   第 `8` 章涉及一些在 Linux 上使用 SQL Server 的内容，包括安装和管理体验，帮助你开始管理 Linux 上的 SQL Server，并最终构建自定义的
    Linux 版 SQL Server 容器镜像。

    *   第 `9` 章将引导你构建一个自定义的 Windows 版 SQL Server 容器镜像，可用于标准化部署。

    *   第 `10` 章将引导你构建一个自定义的 Linux 版 SQL Server 容器镜像。

    *   第 `11` 章介绍一些 Docker 网络知识，以便你更好地配置容器上的 SQL Server，使其能与其他应用程序交互。


    我强烈建议你从`附录`开始。虽然现在在亚马逊 AWS、微软 Azure 或谷歌云平台等公有云基础设施上快速搭建一个实验环境非常容易，但我不希望你错过从头开始完整搭建一切的体验。听到资深
    SQL Server DBA 没有安装 Windows Server 操作系统和配置 TCP/IP 的经验，我感到很惊讶。这本身没什么错。但很多时候，这恰恰决定了一个问题能否被轻松解决。


    另外，由于公有云环境中的网络基础设施是以服务形式提供的，存在多个抽象层掩盖了真实情况。当你试图在一个安全的环境中测试新东西，结果却发现你浪费了那么多小时去解决一个你无法控制、或者只有提供信用卡信息才能解决的问题时，这可能会非常令人沮丧。你来这里是为了学习容器技术，而不是陷入财务困境。


    那么，让我们开始吧，深入容器技术的世界。


    ## 致谢


    献给我的造物主，耶稣基督。你对我绝对的信任促使我相信自己。


    献给我的父母。你们应该早点告诉我，我根本看不懂自己的笔迹。我应该几年前就为那些没有幽默感的人发明一个语音转文字应用。


    献给我的妈妈……是你送我们去了私立学校，却没能带我们去麦当劳。如果你带我们去了，我就无法讲述第 `5` 章和第 `9` 章中的故事了。


    献给我的爸爸……你不想让我成为飞行员。如果我当时在驾驶飞机，我就无法体会航空旅行的复杂性，也无法在第 `4` 章中讲述关于它们的故事了。


    献给 Daniel、Earl 和 Nerisse。我每天都被你们非凡的创造力包围。难怪我们最终会创造出像“创意生成器”这样疯狂的东西。仅仅是在`D.E.N`里闲逛，我就学到了很多关于发展自身创造力的方法。


    献给我所在的 myChurch Canada 敬拜团队……你们敦促我在能用键盘演奏之前先学会使用数字音频工作站。我确实需要第 `6` 章的一个入门故事。


    献给我在 Apress 的编辑们——Jonathan、Laura 和 Jill。你们让我们的作者看起来像摇滚明星（好吧，只是写作方面，因为我的好长相要归功于我的父母）。


    献给我的技术编辑，Borbala。你的审阅和评论让我在技术细节上保持严谨，并帮助它们变得更加清晰。


    献给 Audi、Locky、Lexy 和 Lodgi。很快就会有新成员加入你们了。


    ## 关于作者和技术审校者


    ### 关于作者


    ### 关于技术审校者

