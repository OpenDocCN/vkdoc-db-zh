  trans: '## 使用转义字符


    我不知道你怎么想，但我不喜欢将长命令拆分成多行。我的大脑更倾向于把命令看成单行形式，无论它有多长，就像直接在命令行里输入一样。回想第 8 章中用于创建 Linux
    上 SQL Server 自动化安装脚本的命令，每一条命令都是单行写成的——尤其是调用`/opt/mssql/bin/mssql-conf`的那一条。


    然而，有些人不喜欢将很长的命令写在单行里。他们将其拆分成较小的部分，以便在屏幕的单页内可读。就好像他们的终端窗口或命令行 Shell 不会自动将文本换行到下一行。我并不怪他们。长时间盯着电脑屏幕可能导致所谓的数字眼疲劳（我非正式的研究也表明这会影响理智）。而转义字符就能在这里派上用场。


    你可以在 Linux 和 PowerShell 中使用转义字符。在 Linux 中，使用反斜杠（`\`）来转义下一个字符，使其不被 Shell 解释。这常用于将长命令行写成多行。下面是一个使用反斜杠编写命令来配置
    Linux 上的 SQL Server 并传递所需参数的示例：


    ```

    sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y \

    MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD \

    /opt/mssql/bin/mssql-conf setup

    ```


    如果你想在`Dockerfile`内部传递所需参数，而不是在`docker run`命令中，你可以对`RUN`指令做同样的事情。我更喜欢用`docker run`命令来传递参数。


    ```

    RUN sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y \

    MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD \

    /opt/mssql/bin/mssql-conf setup

    ```


    PowerShell 使用反引号（`` ` ``）操作符将一条很长的命令写成多行。假设你想重写`SHELL`指令部分使用的 PowerShell 命令示例，以便在设置`StartupType`属性之前先检查
    MSSQLSERVER 服务是否存在；你可以使用下面这个`RUN`指令示例来实现：


    ```

    RUN Get-Service | Where {$_.Name -eq "MSSQLSERVER"} | `

    Set-Service -StartupType Automatic

    ```


    此外，你可以在`Dockerfile`内部定义一个转义字符。这在 Windows 上尤其有用，因为目录路径分隔符是反斜杠——与`Dockerfile`中默认的转义字符相同。这就是为什么你使用双反斜杠`C:\\Windows\\System32\\cmd.exe`而不是单反斜杠的原因。你可以通过定义一个解析器指令来更改`Dockerfile`中默认的转义字符。下面的指令将`Dockerfile`中默认的转义字符从反斜杠改为反引号。这使得它与
    PowerShell 保持一致。


    ```

    # escape=`

    ```


    解析器指令是可选的。但如果你决定使用它们，它们必须写在`Dockerfile`的顶部，甚至要在`FROM`指令之前。


    既然我们已经掌握了为构建 Windows 上的自定义 SQL Server 镜像编写`Dockerfile`所需的知识，是时候将所有部分整合在一起了。


    ## 使用 Dockerfile 整合所有部分


    我在第 8 章提到过，我非常热衷于流程。因此，我概述了以下流程来创建一个基于 Windows Server 2016 Core 的自定义 SQL Server
    2016 开发者版镜像。这些步骤是模仿了[`github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/dockerfile`](https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/dockerfile)中的
    Dockerfile，以捕获在 Windows 上创建自定义 SQL Server 镜像所需的步骤。对流程有一个高层次的概览，可以让你优化和改进这些步骤，并可能用你自己的命令和脚本替换它们。


    1.  从微软容器注册表（Microsoft Container Registry）中公开可用的 Windows Server 2016 Core 10.0.14393.2972
    基础镜像开始。

    2.  在镜像内部创建一个临时目录来存放 SQL Server 2016 开发者版的安装文件。

    3.  将 SQL Server 2016 开发者版的安装文件从你的机器复制到镜像中。

    4.  通过命令行安装 SQL Server 2016。

    5.  将 SQL Server 服务启动类型设置为自动。

    6.  从镜像中删除临时的 SQL Server 2016 开发者版安装介质文件夹。

    7.  将命令 Shell 切换到 PowerShell，为运行脚本`start.ps1`做准备。

    8.  将 PowerShell 脚本`start.ps1`复制到镜像的根目录——C:/。

    9.  为 PowerShell 脚本执行设置当前工作目录。

    10. 当容器启动时运行 PowerShell 脚本`start.ps1`。


    我在本章中已经多次提到 PowerShell 脚本`start.ps1`。这个脚本做了几件事：


    *   检查三个参数——`sa`登录密码、EULA 接受确认，以及如果你有想附加到 SQL Server 实例的数据库文件时 Azure Blob 存储的位置。

    *   如果使用了 Docker secrets 来存储`sa`登录密码，则利用它。

    *   进入一个无限循环，这样当你运行容器时脚本不会终止。


    我只需要第一点中不包括从 Azure Blob 存储附加数据库的部分。但我使用这个脚本来演示如何利用`Dockerfile`中的不同指令来构建你的自定义镜像。你可以从[`github.com/Microsoft/mssql-docker/blob/master/windows/mssql-server-windows/start.ps1`](https://github.com/Microsoft/mssql-docker/blob/master/windows/mssql-server-windows/start.ps1)下载这个脚本。


    为安装做准备，我从[`go.microsoft.com/fwlink/?LinkID=799009`](http://go.microsoft.com/fwlink/?LinkID=799009)下载了带有
    Service Pack 2 的 SQL Server 2016 开发者版安装介质。由你决定下载 ISO 文件还是 CAB 文件。只需确保你将安装文件正确地提取到一个名为`SQL2016Dev_SP2`的目录中。如果你想添加最新的累积更新，请在安装前将其整合到安装介质中，并在从命令行安装
    SQL Server 时使用`/UpdateSource`参数。请参考下面步骤 4 中的`RUN`指令。请遵循图 9-3 所示的文件系统结构。


    以下是用于构建基于 Windows Server 2016 Core 的自定义 SQL Server 2016 开发者版（带 Service Pack 2
    累积更新 11）镜像的`Dockerfile`。我将使用项目编号作为步骤，并在注释中标识它们：'
- fmt: '# 在 Windows 上构建自定义 SQL Server Docker 镜像


    ```

    #Step 1

    FROM mcr.microsoft.com/windows/servercore:10.0.14393.2972

    #Step 2

    RUN powershell -Command (mkdir C:\SQL2016Dev_SP2)

    #Step 3

    COPY /SQL2016Dev_SP2 C:/SQL2016Dev_SP2

    #Step 4

    RUN C:/SQL2016Dev_SP2/SETUP.exe /Q /ACTION=INSTALL /UPDATEENABLED=True /UPDATESOURCE=./SQLServer2016SP2CU11
    /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER /SECURITYMODE=SQL /SAPWD="y0urSecUr3PAssw0rd"
    /SQLSVCACCOUNT="NT AUTHORITY\System" /AGTSVCACCOUNT="NT AUTHORITY\System" /SQLSYSADMINACCOUNTS="BUILTIN\Administrators"
    /IACCEPTSQLSERVERLICENSETERMS=1 /TCPENABLED=1

    #Step 5

    RUN powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

    #Step 6

    RUN powershell -Command (Remove-Item -Path C:/SQL2016Dev_SP2 -Recurse -Force)

    #Step 7

    SHELL ["powershell", "-Command", "$ErrorActionPreference = ''Stop''; $ProgressPreference
    = ''SilentlyContinue'';"]

    #Step 8

    COPY /start.ps1 /

    #Step 9

    WORKDIR /

    ENV SA_PASSWORD "y0urSecUr3PAssw0rd"

    ENV ACCEPT_EULA "Y"

    #Step 10

    CMD ./start -sa_password $env:SA_PASSWORD -ACCEPT_EULA $env:ACCEPT_EULA -Verbose

    ```


    Just by looking at the instructions in the `Dockerfile`, you can already see some
    potential improvements for optimization. We’ll save that for later. It’s time
    to build our custom SQL Server on Windows container.


    ## Build the Custom SQL Server on Windows Image


    Save the `Dockerfile` in the `<drive>:\dockerBuild` directory together with the
    `SQL2016Dev_SP2` directory and the `start.ps1` PowerShell script. You will be
    running the following `docker build` command in the context of that directory.
    We will call the new image `sql2016windev` and tag it as `v1.0`. The dot (`.`)
    at the end of the `docker build` command specifies the path. In this case, the
    `docker build` command will look at the current path and evaluate all the instructions
    inside the `Dockerfile` relative to the current path. If not explicitly specified,
    it will also tell the `docker build` command to look for a file named `Dockerfile`
    in that path.


    ```

    docker build -t sql2016windev:v1.0 .

    ```


    Figure [9-4](#484552_1_En_9_Chapter.xhtml#Fig4) shows the first few lines of output
    from the `docker build` command.


    ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig4_HTML.jpg](images/484552_1_En_9_Chapter/484552_1_En_9_Fig4_HTML.jpg)

    Figure 9-4: Output of the docker build command


    Notice the following:


    *   The message “Sending build context to Docker daemon 4.358GB” literally means
    exactly what it says. The Docker CLI client is sending the entire contents of
    the `<drive>:\dockerBuild` directory to the Docker daemon. The reason I created
    the `<drive>:\dockerBuild` directory and used that as the path for building the
    custom image is because I only want to copy the contents of this directory to
    the Docker daemon. If you run the `docker build` command on your root directory
    – `<drive>:\` – it will copy all its contents to the Docker daemon. You wouldn’t
    want your personal MP3 files, your resume, nor your photo collection to end up
    on someone else’s container, would you?


    *   Step 1/12. Didn’t we only have 10 steps in the `Dockerfile`? How come the
    `docker build` command identified 12? That’s because every instruction will create
    a step, including the two `ENV` instructions before Step 10. And we haven’t even
    added a `LABEL` instruction.


    *   In Step 2/12, the message “---> Running in 968b5452879d” tells you that this
    is the temporary container that the `RUN` instruction created to run the command
    in this step.


    *   In Step 2/12, the message “---> Removing intermediate container 968b5452879d”
    tells you that the temporary container created in this step is deleted and changes
    have been committed to create a new image. This new filesystem layer is named
    “de9a3de04fd0”.


    *   The parameters passed to the `SETUP.EXE` command for installing SQL Server
    using the command line are from [*https://docs.microsoft.com/en-us/sql/database-engine/install-windows/install-sql-server-from-the-command-prompt?view=sql-server-ver15*](https://docs.microsoft.com/en-us/sql/database-engine/install-windows/install-sql-server-from-the-command-prompt%253Fview%253Dsql-server-ver15).


    *   Every instruction, including the `ENV` instructions, creates a filesystem
    layer.


    *   You are feeling sleepy. Your eyes are getting heavy. Now, snap out of it.


    Once the build completes, you can now use the custom image to create and run a
    new container. Run the `docker images` command to see the newly built image. Figure
    [9-5](#484552_1_En_9_Chapter.xhtml#Fig5) shows the list of the available images
    in my Docker host, including the one that is newly built. The size of Windows
    containers is the main reason I try to avoid them if I can.


    ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig5_HTML.jpg](images/484552_1_En_9_Chapter/484552_1_En_9_Fig5_HTML.jpg)

    Figure 9-5: Listing the newly built custom Docker image


    Run the following command to start using this custom image. Figure [9-6](#484552_1_En_9_Chapter.xhtml#Fig6)
    displays validating the custom SQL Server on Windows container built – SQL Server
    2016 with Service Pack 2 Cumulative Update 11 running on Windows Server 2016 Core
    OS Build 14393.2972.


    ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig6_HTML.jpg](images/484552_1_En_9_Chapter/484552_1_En_9_Fig6_HTML.jpg)

    Figure 9-6: Validating custom SQL Server on Windows Docker image


    ```

    docker run -e ''ACCEPT_EULA=Y'' -e ''SA_PASSWORD=y0urSecUr3PAssw0rd'' -p 1433:1433
    --name sql-windevcon01 -d -h windevsql01 sql2016windev:v1.0

    ```


    Remember when I said you can use a different filename for the `Dockerfile`? Let’s
    say you want to call it `dockerFile.dev` to indicate that this is what the developers
    will be using while `Dockerfile` will be strictly for use in production (well,
    production from the developers’ point of view). You can use the `-f` parameter
    of the `docker build` command to specify the name of the file that you want to
    use. The following example command uses the `dockerFile.dev` file to build the
    custom image. The dot (`.`) character still tells the `docker build` command to
    use the current path.


    ```

    docker build -t sql2016windev:v1.01 -f dockerFile.dev .

    ```


    You can also pass an absolute path or a URL to the `docker build` command. The
    following example command uses the Microsoft-provided `Dockerfile` from GitHub
    to build a custom SQL Server on Linux image that runs as a non-root user. I can’t
    use the Microsoft-provided `Dockerfile` for Windows to build a custom SQL Server
    on Windows image as it isn’t updated – the `FROM` instruction still points to
    an outdated Windows Server Core image.


    ```

    docker build -t sql2017linuxnonroot:v1.0  https://raw.githubusercontent.com/microsoft/mssql-docker/master/linux/preview/examples/mssql-server-linux-non-root/Dockerfile

    ```


    Just remember that the instructions in the `Dockerfile` will be executed in the
    context of the current build path. Make sure all the dependencies like scripts,
    installation files, and so on defined in the `COPY` or `ADD` instructions are
    available.


    Once you’ve built your custom image, you can now use it as a base image for creating
    other custom images. For example, you can refer to the newly built image in the
    `FROM` instruction of your `Dockerfile` as shown in the following:


    ```

    FROM sql2016windev:v1.01

    ```


    **Note:** If you’re building on top of the Microsoft-provided SQL Server on Windows
    Docker images to create your custom images, keep in mind that they are not supported
    in production environments. This is highlighted in the “Intended Use” section
    on [*https://hub.docker.com/r/microsoft/mssql-server-windows-developer/*](https://hub.docker.com/r/microsoft/mssql-server-windows-developer/).
    It’s another reason why I prefer creating my custom Docker images, in this case,
    a SQL Server 2016 running on Windows Server 2016 image. Just make sure you’re
    running a supported version of both Windows Server and SQL Server should you decide
    to roll it out in production. Windows Server 2008 and Windows Server 2008 R2 are
    no longer under extended support. Don’t even bother.'
