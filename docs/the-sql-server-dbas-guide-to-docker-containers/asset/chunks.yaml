    ## ENTRYPOINT 指令


    仿佛拥有 `RUN`、`SHELL` 和 `CMD` 指令还不够，现在又多了一个要加入列表的：`ENTRYPOINT` 指令。`ENTRYPOINT` 指令用于将正在运行的容器视作一个可执行文件。这通常在你希望容器作为一个特定可执行文件的便携式封装，而不期望用户在运行时覆盖该可执行文件时使用。如果你希望容器每次运行相同的可执行文件，这将非常有用。这意味着你无法使用
    `docker run` 命令覆盖该命令。但是，任何添加到 `docker run` 命令末尾的内容都会被追加到 `ENTRYPOINT` 指令中定义的命令后面。我曾经认为
    `ENTRYPOINT` 指令对 SQL Server 容器没什么用，直到我意识到，如果你希望限制容器只能运行 SQL Server 而不能运行其他东西，并且可能需要在启动时传递参数，就可以使用它。此外，没有什么能阻止你覆盖
    Windows 中运行 `start.ps1` PowerShell 脚本的 `CMD` 指令，而只运行 `ipconfig` 命令。或者在 Linux 中覆盖运行
    SQL Server 进程的指令，而只运行 `bash`。当然，这样做也意味着在你重启容器并且不覆盖 `CMD` 指令之前，SQL Server 将不再运行。


    与 `RUN` 指令类似，`ENTRYPOINT` 指令有两种形式，EXEC 形式（首选）和 SHELL 形式。以下是一个在 Windows 中使用 EXEC
    形式的 `ENTRYPOINT` 指令来运行 SQL Server 可执行文件的示例。只需将 `{nn}` 替换为你正在运行的 SQL Server 版本号：


    ```dockerfile

    ENTRYPOINT ["C:/Program Files/Microsoft SQL Server/MSSQL{nn}.MSSQLSERVER/MSSQL/Binn/sqlservr.exe"]

    ```


    ## CMD vs. RUN vs. SHELL vs. ENTRYPOINT


    在创建 `Dockerfile` 时，选择这些不同的指令可能会令人困惑。请记住以下几点：


    *   一个 `Dockerfile` 中只能有一个有效的 `CMD` 指令——只有最后一个会被评估。如果你想让你的容器覆盖 `CMD` 指令中定义的命令，请使用此指令。

    *   使用 `RUN` 指令来运行命令以构建你的自定义 Docker 镜像。

    *   如果你想更改默认的命令 shell 并将其用于大多数命令，请使用 `SHELL` 指令。

    *   使用 `ENTRYPOINT` 指令来防止用户覆盖你希望容器运行的可执行文件。

    *   你可以在 `Dockerfile` 中将 `ENTRYPOINT` 指令与 `CMD` 指令结合使用。这样做时，`CMD` 指令中的字符串将被追加到
    `ENTRYPOINT` 指令之后。`CMD` 指令必须是 `Dockerfile` 中的最后一条指令。

    *   你可以使用 `ENTRYPOINT` 或 `CMD` 指令来运行一个进程或一个脚本。如果你正在运行一个脚本，请确保它运行的是一个不会退出的进程或命令。


    这样做的好处是，构建自定义 SQL Server 镜像不需要太多的配置设置。你只需要一个基础镜像和 SQL Server 安装文件，然后在安装后配置 SQL
    Server 实例，就一切就绪了。当我们开始编写 `Dockerfile` 时，你会看到这些指令是如何一起使用的。


    ## WORKDIR 指令


    `WORKDIR` 指令为其他指令（如 `RUN`、`CMD`、`ENTRYPOINT`、`COPY` 和 `ADD`）设置一个工作目录。如果构建过程中目标镜像中不存在
    `WORKDIR`，则会创建它。当你希望从自定义路径运行可执行文件或脚本时，它非常有用——定义 `WORKDIR`，然后相对于它运行可执行文件。你可以将其视为在构建过程中在容器内部执行
    `cd` 命令。如果你的可执行文件路径非常长（例如 Windows 上 SQL Server 的默认安装目录），并且你不想在整个 `Dockerfile`
    中重复它，这也很有用。然而，使用 `ENV` 指令来定义路径更为合适，因为通常将路径定义为环境变量。以下是一个在构建过程中使用 `WORKDIR` 指令将工作目录设置为
    `C:/` 的示例：


    ```dockerfile

    WORKDIR /

    ```


    再次强调，在 Windows 中执行此操作时，考虑 Linux 的思维方式有助于最小化转义字符的使用。明白了吗？


    ## ENV 指令


    `ENV` 指令是一个键值对，用于设置一个持久的环境变量，该变量在构建时和容器运行时都可用。还记得你一直在 `docker run` 命令中使用的 `-e`
    参数吗？


    `ENV` 指令有两种形式：


    *   `ENV <key> <value>`

    *   `ENV <key>=<value>`


    我更喜欢使用第二种形式——`ENV <key>=<value>`——因为它更加明确。它还允许在一行中设置多个键值对。以下是一个为 SQL Server EULA
    设置键值对并分配 `sa` 登录密码的示例。我选择将它们显示在多行中以示区分：


    ```dockerfile

    ENV SA_PASSWORD="y0urSecUr3PAssw0rd"

    ENV ACCEPT_EULA="Y"

    ```


    但它们也可以合并为一行，如下所示：


    ```dockerfile

    ENV SA_PASSWORD="y0urSecUr3PAssw0rd" ACCEPT_EULA="Y"

    ```

    '
- fmt: '## Using Escape Characters


    I don’t know about you, but I don’t like breaking long commands in multiple lines.
    My brain just looks at a command in a single line, regardless of how long it is,
    as if I’m writing them directly in the command line. Recall the commands I used
    to create the script for automated installation of SQL Server on Linux in Chapter
    8. Every single command was written as a single line – especially the one that
    calls the `/opt/mssql/bin/mssql-conf`.


    However, some people don’t like writing very long commands in a single line. They
    break them down into smaller chunks so they can be readable in a single page of
    their screen. It’s like their terminal windows or command-line shells are not
    going to wrap the text around to the next line. I don’t blame them. Looking at
    the computer screen for too long can cause what is known as digital eye strain
    (my informal research also tells me that it affects sanity). And this is where
    escape characters can help.


    You can use escape characters in both Linux and PowerShell. A backslash is used
    in Linux to escape the next character from being interpreted by the shell. This
    is used to write a long command line in multiple lines. The following is an example
    of using the backslash to write the command to configure SQL Server on Linux and
    pass required parameters:


    ```

    sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y \

    MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD \

    /opt/mssql/bin/mssql-conf setup

    ```


    You can do the same with the `RUN` instruction if you want to pass the required
    parameters inside the `Dockerfile` instead of the `docker run` command. I prefer
    passing them with the `docker run` command.


    ```

    RUN sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y \

    MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD \

    /opt/mssql/bin/mssql-conf setup

    ```


    PowerShell uses the backtick (`` ` ``) operator for writing a very long command
    in multiple lines. Let’s say you want to rewrite the PowerShell command example
    used in the `SHELL` instruction section to first check if the MSSQLSERVER service
    exists before setting the StartupType property; you can do it using the following
    sample `RUN` instruction:


    ```

    RUN Get-Service | Where {$_.Name -eq "MSSQLSERVER"} | `

    Set-Service -StartupType Automatic

    ```


    In addition, you can define an escape character inside the `Dockerfile`. This
    is very helpful especially in Windows where the directory path separator is the
    backslash character – the same as the default escape character used in a `Dockerfile`.
    That’s the reason why you use a double backslash instead of a single backslash
    to write `C:\\Windows\\System32\\cmd.exe`. You can change the default escape character
    in a `Dockerfile` by defining it as a parser directive. The following directive
    changes the default escape character in a `Dockerfile` from backslash to a backtick.
    This makes it consistent with PowerShell.


    ```

    # escape=`

    ```


    Parser directives are optional. But if you decide to use them, they must be written
    on top of the `Dockerfile`, even before the `FROM` instruction.


    Now that we have what we need to write a `Dockerfile` for building a custom SQL
    Server on Windows image, it’s time to put all the pieces together.


    ## Putting the Pieces Together with a Dockerfile


    I did mention in Chapter 8 that I’m a big fan of processes. So, I’ve outlined
    the following process for creating a custom SQL Server 2016 Developer Edition
    on Windows Server 2016 Core image. The steps were patterned after the Dockerfile
    from [https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/dockerfile](https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/dockerfile)
    to capture the required steps in creating a custom SQL Server on Windows image.
    Having a high-level overview of the process allows you to optimize and improve
    the steps and possibly replace them with your own commands and scripts.


    1.  Start from the publicly available Windows Server 2016 Core 10.0.14393.2972
    base image from the Microsoft Container Registry.

    2.  Create a temporary directory inside the image to store the SQL Server 2016
    Developer Edition installation files.

    3.  Copy the SQL Server 2016 Developer Edition installation files from your machine
    to the image.

    4.  Install SQL Server 2016 via the command line.

    5.  Set SQL Server service startup type to Automatic.

    6.  Remove the temporary SQL Server 2016 Developer Edition installation media
    folder from the image.

    7.  Switch the command shell to PowerShell in preparation for running script `start.ps1`.

    8.  Copy the PowerShell script `start.ps1` to the image on root directory – C:/.

    9.  Set the current working directory for PowerShell script execution.

    10. Run PowerShell script `start.ps1` when the container is started.


    I mentioned the PowerShell script `start.ps1` a few times now throughout the chapter.
    The script does a couple of things:


    *   Checks for three parameters – the `sa` login password, acceptance of the EULA,
    and location of Azure Blob storage should you have database files that you want
    to attach to the SQL Server instance

    *   Leverages Docker secret if used to store the `sa` login password

    *   Goes into an infinite loop so the script does not terminate when you run the
    container


    I only need the first bullet point minus attaching databases from Azure Blob storage.
    But I used the script to demonstrate how you can leverage the different instructions
    in the `Dockerfile` to build your custom image. You can download the script from
    [https://github.com/Microsoft/mssql-docker/blob/master/windows/mssql-server-windows/start.ps1](https://github.com/Microsoft/mssql-docker/blob/master/windows/mssql-server-windows/start.ps1).


    In preparation for the installation, I downloaded the SQL Server 2016 Developer
    Edition with Service Pack 2 installation media from [http://go.microsoft.com/fwlink/?LinkID=799009](http://go.microsoft.com/fwlink/?LinkID=799009).
    It’s up to you to download either the ISO file or the CAB file. Just make sure
    you properly extract the installation files into a directory named `SQL2016Dev_SP2`.
    And if you want to add the latest cumulative update, slipstream it into the installation
    media prior to installation and use the `/UpdateSource` parameter when installing
    SQL Server from the command line. Refer to the `RUN` instruction in Step 4 in
    the following. Follow the filesystem structure shown in Figure 9-3.


    The following is the `Dockerfile` for building the custom SQL Server 2016 Developer
    Edition with Service Pack 2 Cumulative Update 11 on Windows Server 2016 Core image.
    I’ll use the item numbers as steps and identify them in the comments:'
