    \ business and focused on Docker. They even changed their name from dotCloud,\
    \ the original name when the company was founded, to Docker, Inc. Thus, the modern\
    \ container technology was born. Early versions of Docker leveraged LXC as the\
    \ container runtime engine. Later versions use libcontainer.\n\nIt’s interesting\
    \ to see how Docker pivoted from a struggling business to what can now be considered\
    \ a profitable software company. We, IT professionals, need to learn from their\
    \ example. We need to learn how to pivot when the need arise. Learn emerging technologies\
    \ instead of settling for old ones so long as they meet business objectives. We\
    \ need to learn how to pivot our roles from purely technical to more of leadership.\
    \ And since technology is constantly evolving, we need to evolve with it, changing\
    \ roles whenever necessary.\n\nThis is key to success in the IT industry.\n\n\
    ## The Case for Containers\n\nWe IT professionals like to geek out on technology\
    \ because they are cool and fun. It’s easy to fall into the trap of focusing on\
    \ technology for technology’s sake. But realize that every successful technology\
    \ is meant to solve a business problem. To be successful as an IT professional,\
    \ we need to focus on the business problem that a technology solution is meant\
    \ to solve.\n\nSo what business problem does container technology solve? Reliably\
    \ run software when moved from one computing environment to another. SQL Server\
    \ administrators deal with this every time a database is migrated or upgraded\
    \ from one platform to another – from physical machine to another physical machine,\
    \ from physical machine to virtual machine, from older version to newer version,\
    \ or from on-premises to the cloud. A more common scenario is when a developer\
    \ writes T-SQL code from their development environment and promotes the code in\
    \ staging environment and even production. Even with a proper change management\
    \ process, this can still be an issue because there is no guarantee that the different\
    \ computing environments will be the same. Configuration drift accounts for many\
    \ high availability and disaster recovery system failures that I have to deal\
    \ with as a consultant.\n\nContainer technology addresses this problem. It does\
    \ so by packaging an application and all of its dependencies like binaries, kernel\
    \ libraries, configuration files, system tools, and so on and creating an entire\
    \ runtime environment. A container image is created and packaged with the application\
    \ and all of its dependencies. The image is then deployed as a container at runtime."
  trans: '# 1. 容器简介


    > 无法铭记过去的人注定会重蹈覆辙。

    >

    > —乔治·桑塔亚纳


    容器技术正在改变我们开发、部署和运行软件的方式。尽管它看起来像是一夜之间冒出来并正在接管 IT 组织的技术，但事实远非如此。


    在本章中，我们将回溯历史，看看容器技术的一些历史及其演变过程。你可能在想：“我高中时最讨厌历史了。” 我完全能理解。我在高中和大学读历史，唯一的目的就是应付考试。我讨厌记人名和日期。那么，为什么还要费心去了解容器技术的历史呢？


    历史赋予我们后见之明的好处，这是你在第一次经历某事时所不具备的。当别人已经完成了你正试图完成的事情时，你就拥有了他们从经验教训中获益的优势，可以避免他们犯过的错误，并且可能理解那些看似凭空出现的模式。这些历史课程充满了深刻的见解，可以帮助你更好地理解技术或更广阔的世界。这些年来，我学会了欣赏历史以及它如何塑造了我们当前的现实——更妙的是，学会了如何改变我的现在，从而塑造未来。


    我们还将关注当今最广泛使用和认可的容器技术背后的公司——`Docker, Inc.`。


    讨论容器技术，如果不将其与虚拟化技术进行比较，就是不完整的。我们将花一点时间看看两者之间的异同。


    最后，我们将看看`Microsoft`如何为`Windows`和`SQL Server`采用容器技术。


    ## 最新的 30 年老技术


    当我了解到容器技术可以追溯到 1979 年时，我很惊讶。正是`Unix V7`首次允许进程在操作系统级别隔离运行——即隔离和保护一个进程不受另一个进程影响的能力。这个想法的产生源于需要同时在许多用户之间共享非常昂贵的计算资源。回想一下大型机只能执行一项特定任务的日子，而这项任务可能需要几天甚至几周才能运行完。


    然而，像任何其他未被广泛采用的技术创新一样，进程隔离技术变得停滞不前。直到 2000 年，类 Unix 操作系统`FreeBSD`引入了`Jails`——一种将计算机系统划分为几个独立微型系统的机制，每个系统拥有自己的文件、进程和安全性。你可以将其视为我们今天所知的虚拟化技术的早期雏形。


    此后，实现进程隔离技术的多种变体相继出现，包括 2001 年的`Linux VServer`（一个允许操作系统级虚拟化的 Linux 内核补丁）、2004
    年的`Solaris Containers`（前`Sun Microsystems`对操作系统级虚拟化的实现）以及 2005 年的`Open Virtuozzo`。2006
    年，`Google`对 Linux 内核做出了自己的贡献，并将其命名为`Process Containers`，后来为了避免与 Linux 容器上下文中的“容器”一词混淆，将其更名为`Control
    Groups`（`cgroups`）。


    2008 年成为容器技术发展的关键时刻，`Linux Containers`（`LXC`）项目被创建，将`Google`工程师在`cgroups`方面的工作合并到了
    Linux 内核中。它允许在一台主机上使用单个 Linux 内核运行多个隔离的 Linux 系统——而无需额外的补丁。


    `LXC`成为了后续现代容器技术的基石。2011 年，`VMWare`与`EMC`和`General Electric`共同启动了一个名为`Cloud Foundry
    Warden`的开源计划，用于跨多个主机管理容器集合。2013 年，`Google`又创建了一个他们容器栈的开源版本，名为`lmctfy`（代表“让我为你包含那个”），并从此开始与`Docker,
    Inc.`合作开发容器运行时环境`libcontainer`。


    容器技术看起来像是席卷 IT 界的最新技术。但事实是，它并不新。它只是远远超前于它的时代。而现在它的时代已经到来，你根本无法忽视它。


    ## Docker——公司与容器运行时


    `Docker`之于容器运行时引擎，就像`VMWare`之于虚拟化或`Red Hat`之于`Linux`——它已成为 IT 界一个巨大的品牌。`Docker`运行时引擎是由`Docker,
    Inc.`这家公司开发的。该公司最初并非一家开发公司。事实上，他们最初是一家平台即服务公司，允许开发人员构建和运行应用程序，而无需担心底层基础设施。不幸的是，该公司难以产生收入来支付账单。但好处是，他们学会了如何最大限度地利用当时的处境。


    当`Docker, Inc.`陷入财务困境时，工程师们决定在 2013 年将其平台即服务产品的底层技术——容器运行时引擎`Docker`——开源。他们并没有期望它会大受欢迎。但当它确实火起来后，公司转型了业务，专注于`Docker`。他们甚至将公司名称从创立时的原名`dotCloud`改为`Docker,
    Inc.`。于是，现代容器技术诞生了。早期版本的`Docker`利用`LXC`作为容器运行时引擎。后来的版本则使用`libcontainer`。


    看到`Docker`从一个举步维艰的企业转型为现在可被认为是一家盈利的软件公司，这很有趣。我们 IT 专业人士需要从他们的例子中学习。我们需要学会在需要时进行转型。学习新兴技术，而不是只要能满足业务目标就满足于旧技术。我们需要学会将我们的角色从纯技术性转向更多领导性。而且，由于技术在不断发展，我们需要与时俱进，在必要时改变角色。


    这是在 IT 行业取得成功的关键。


    ## 容器的价值主张


    我们 IT 专业人士喜欢钻研技术，因为它们很酷、很有趣。很容易陷入为技术而技术的陷阱。但要认识到，每一项成功的技术都是为了解决某个业务问题。要成为一名成功的
    IT 专业人士，我们需要关注技术解决方案旨在解决的业务问题。


    那么容器技术解决了什么业务问题呢？可靠地运行软件，当它从一个计算环境迁移到另一个计算环境时。`SQL Server`管理员在每次将数据库从一个平台迁移到另一个平台时都会处理这个问题——从物理机到另一台物理机，从物理机到虚拟机，从旧版本到新版本，或从本地迁移到云端。一个更常见的场景是，开发人员在其开发环境中编写`T-SQL`代码，然后将代码提升到预演环境甚至生产环境。即使有适当的变更管理流程，这仍然可能是个问题，因为无法保证不同的计算环境是相同的。配置漂移是我作为顾问不得不处理的许多高可用性和灾难恢复系统故障的原因。


    容器技术解决了这个问题。它通过打包一个应用程序及其所有依赖项（如二进制文件、内核库、配置文件、系统工具等）并创建一个完整的运行时环境来实现这一点。一个容器镜像被创建出来，并与应用程序及其所有依赖项打包在一起。然后，该镜像在运行时被部署为一个容器。'
- fmt: '## Containers vs. Virtualization


    At first glance, it may seem that containers look a lot like virtualization given
    their nature and functionality. Don’t be confused. Have a look at the diagram
    of the hypervisor architecture in Figure [1-1](#484552_1_En_1_Chapter.xhtml#Fig1).


    ![../images/484552_1_En_1_Chapter/484552_1_En_1_Fig1_HTML.jpg](images/484552_1_En_1_Chapter/484552_1_En_1_Fig1_HTML.jpg)


    Figure 1-1 Hypervisor architecture


    In the world of virtualization, you run a hypervisor – `VMWare`, `Hyper-V`, `Xen`,
    and so on – on top of a hardware. You, then, create a virtual machine with its
    own operating system before you can install and run your application. Each virtual
    machine is configured to use a portion of the hardware’s CPU, memory, network,
    and storage resources. For years, virtualization solved a major business problem
    that the IT organization faced: overprovisioning physical hardware. In the past,
    we simply guessed and overprovisioned the specifications of the physical machine,
    letting it run while barely using even a quarter of the hardware resources. Virtualization
    allowed us to create multiple virtual machines on a single physical machine to
    maximize every bit of hardware resource available. It also allowed for process
    and application isolation – they run within the boundaries of the virtual machine.
    This made the finance people very happy. But not us.


    We spend a huge amount of time managing operating systems – patching, securing,
    monitoring, updating, auditing, licensing, and even allocating resources for them.
    It’s like managing operating systems has become a business unit on its own. We’re
    not in the business of managing operating systems, but our day-to-day tasks sure
    seem like we are. Wouldn’t it be great if you only had one operating system that
    runs the different applications but in an isolated process, so they don’t interfere
    with one another, much like how one application is isolated from another through
    virtual machines? We don’t need to get rid of operating systems, we just need
    less of them.


    This is where containers come in.


    ![../images/484552_1_En_1_Chapter/484552_1_En_1_Fig2_HTML.jpg](images/484552_1_En_1_Chapter/484552_1_En_1_Fig2_HTML.jpg)


    Figure 1-2 Container architecture


    In Figure [1-2](#484552_1_En_1_Chapter.xhtml#Fig2), you only have one operating
    system. The containers share the same operating system kernel with other containers,
    each one running as isolated processes in user space. Containers abstract the
    operating system kernel instead of abstracting the hardware like what virtualization
    does. Imagine the impact this has on your resources. Instead of having multiple
    copies of the operating system running on guest virtual machines, you only have
    a single copy, thus reducing the amount of storage space requirement. You are
    also reducing the amount of administrative overhead necessary with managing operating
    systems. If you have ever had to work during the weekends and holidays just to
    install that critical security patch on all of your servers, you know how big
    of a deal this is. Plus, given the resource requirements for containers, you can
    run more of them in a single host compared to virtual machines.


    ## Microsoft, Containers, and SQL Server on Linux


    In the short period that I had working as an Oracle DBA, I made my own decision
    to pivot. Back then, Oracle was the name when it comes to relational databases.
    My peers were moving into Oracle and Java. But I decided to go the opposite way
    – I switched to Microsoft `SQL Server` and `.NET`. I did it because I saw how
    Microsoft did software, focusing more on the users rather than merely the technology.
    They created user interfaces, accessible documentation, tutorials, blog posts,
    online communities, and the like. The hard-core geeks made fun of it. But customers
    loved it. So, I pivoted.


    The year was 2015. At the annual Microsoft MVP Summit, I was listening to Microsoft
    executives from the database systems group talk about a project that they were
    working on. They called it `Project Helsinki`. The mission is to bring `SQL Server`
    to Linux. Microsoft had customers asking whether they would make `SQL Server`
    available on Linux. The executives talked about how the next generation of developers
    didn’t really care about the underlying operating system – they just want a data
    platform. Microsoft was still focusing on the customers.


    When `SQL Server 2017` was released, it was made available for both Windows and
    Linux. It was no longer an April Fool’s joke (I wish they did not release it on
    April 1st). This was real. `SQL Server 2017` was the first version that ran on
    Windows, Linux, and Docker containers. I immediately downloaded and installed
    `SQL Server` on my `CentOS` Linux virtual machine, and within a few minutes, I
    was able to connect to it remotely using my `SQL Server Management Studio` installation
    on my Windows 8 machine.


    > **Tip**

    >

    > The Apress book `Pro SQL Server on Linux` by Bob Ward provides a back story
    on how Microsoft managed to make this seemingly impossible task a reality.


    It was also during this time that Microsoft incorporated the Docker engine in
    the `Windows Server 2016` operating system – `Windows Server Containers`. They
    partnered with `Docker, Inc.` to create a container runtime engine that is native
    inside the `Windows Server` operating system. Since `Docker` is open source, it
    allowed Microsoft to make modifications to it and make it work on Windows.


    Open source, Microsoft, `SQL Server` on Linux, Containers. I’m sure the Steve
    Ballmer of 2001 didn’t see this coming.


    ## Summary


    As container technology is taking over the IT landscape, administrators need to
    be prepared to modernize their `SQL Server` databases and deploy them on newer
    platforms like Linux, specifically Docker containers. This is the goal of this
    book.


    In the next chapter, we will look at how to leverage container technologies in
    a platform that `SQL Server` administrators are familiar with – the `Windows Server`
    operating system.


    # 2. Install and Configure Docker on Windows Server


    > Learning is the creation of a relationship between the known and the unknown.

    > —Tony Robbins


    The previous chapter introduced the container technology, its origins, and how
    `SQL Server` now runs on Linux and Docker containers. But for someone who has
    minimal to no experience with Linux, this can be a bit overwhelming. So, instead
    of jumping straight into Linux, this chapter will help you get started with Docker
    containers using a platform that you are already familiar with – the `Windows
    Server` operating system. Microsoft partnered with `Docker, Inc.` to bring Docker
    containers on the `Windows Server` operating system, making it easy for Windows
    and `SQL Server` administrators to learn and deploy Docker containers.


    We will be using `Windows Server 2016 Build 1607` for this chapter, but later
    versions such as `1709` and `1803` can be used as well. However, you certainly
    don’t want to be learning container technologies while having to deal with the
    issues of prerelease software. Trust me, I lost a lot of hair in the early 2000s
    dealing with prerelease software.


    > **Note**

    >

    > This chapter does not go into the process of installing the `Windows Server`
    operating system. It is assumed that an existing clean installation of a `Windows
    Server 2016` is available and has Internet connectivity. For a walk-through of
    installing `Windows Server 2016`, refer to *Appendix A*.

    >

    > Also, the default `Windows Server` installation will opt for `Server Core`,
    unless you specifically choose `Desktop Experience`. You will be working with
    the command line when you start working with `Docker` and Linux so just stick
    with the graphical user interface on Windows for now.'
