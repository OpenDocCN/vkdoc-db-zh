    edition. Inside the script, these parameter values can be accessed using their
    position numbers. The *mYSecUr3PAssw0rd* parameter value can be accessed via *$1*
    while the *enterprise* parameter value via *$2*. I can declare these parameter
    values as variables inside the script using the following code snippet:


    ```

    #VARIABLES

    MSSQL_SA_PASSWORD=$1

    MSSQL_PID=$2

    ```


    I can then run the */opt/mssql/bin/mssql-conf* script with the corresponding environment
    variables using the command-line parameter values as follows:


    ```

    sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD /opt/mssql/bin/mssql-conf
    setup

    ```


    ### Adding Conditional Logic in Bash Scripts


    Now that we’re making the script dynamic and passing command-line parameter values,
    we need to validate the user input. Recall that the *sa* login password is a required
    parameter when installing SQL Server. We’ll add conditional logic to evaluate
    whether or not the user provided a value for the *sa* login password. The code
    snippet to do this is shown as follows:


    ```

    #Check if the sa password string is null or has zero length

    if [ -z $MSSQL_SA_PASSWORD ]

    then

    echo Environment variable MSSQL_SA_PASSWORD must be set for unattended install

    exit 1

    fi

    ```


    A simple *if...then* condition evaluates whether or not the *$MSSQL_SA_PASSWORD*
    parameter value is null or has zero length. Exit code 1 sets the script execution
    to failure, causing it to terminate. There’s more to validating the *sa* login
    password such as the complexity requirements which include minimum password length,
    inclusion of uppercase, lowercase, non-alphanumeric characters, and base 10 digits.
    This is just a simple example to validate whether or not the user provided a value
    for the *sa* login password.


    What about the edition? Since we initially provided an environment variable for
    the edition, we need to provide a value for it. This means we also need to evaluate
    whether or not the user provided a value in the command-line argument. The code
    snippet to do this is shown in the following. Here we’re setting a default value
    if the user didn’t provide anything – in this case, Developer Edition:


    ```

    #Check if the edition parameter is null or has zero length

    if [ -z $MSSQL_PID ]

    then

    MSSQL_PID=Developer

    fi

    ```


    An updated version of the script for a RHEL/CentOS Linux system is shown in the
    following with parameter values and conditional logic evaluation:


    ```

    #!/bin/bash

    # VARIABLES

    MSSQL_SA_PASSWORD=$1

    MSSQL_PID=$2

    if [ -z $MSSQL_SA_PASSWORD ]

    then

    echo Environment variable MSSQL_SA_PASSWORD must be set for unattended install

    exit 1

    fi

    if [ -z $MSSQL_PID ]

    then

    MSSQL_PID=Developer

    fi

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    sudo yum install -y mssql-server

    sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    sudo firewall-cmd --zone=public --add-port=1433/tcp --permanent

    sudo firewall-cmd --reload

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo mkdir /tmp/dbdata

    sudo chown mssql /tmp/dbdata

    sudo chgrp mssql /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    sudo systemctl restart mssql-server

    ```


    And here’s the corresponding script in Ubuntu:


    ```

    #!/bin/bash

    #VARIABLES

    MSSQL_SA_PASSWORD=$1

    MSSQL_PID=$2

    if [ -z $MSSQL_SA_PASSWORD ]

    then

    echo Environment variable MSSQL_SA_PASSWORD must be set for unattended install

    exit 1

    fi

    if [ -z $MSSQL_PID ]

    then

    MSSQL_PID=Developer

    fi

    curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    sudo apt-get update

    sudo apt-get install -y mssql-server

    sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    sudo ufw --force enable

    sudo ufw allow 22/tcp

    sudo ufw allow 1433/tcp

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo mkdir /tmp/dbdata

    sudo chown mssql /tmp/dbdata

    sudo chgrp mssql /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    sudo systemctl restart mssql-server

    ```


    You can now run the script with positional command-line arguments as shown in
    the following:


    ```

    sudo ./automateSQLinstall.sh mYSecUr3PAssw0rd enterprise

    ```


    Again, sit back, relax, and watch the magic happen.'
