  trans: '

    ## 拼接图层：组装镜像


    一旦文件系统图层存储到磁盘并定义了标识符，Docker 守护进程就开始将它们拼接起来，以形成完整的镜像。清单（manifest）告诉 Docker 守护进程构建镜像和运行容器需要哪些文件系统图层。这也是存储驱动程序与
    Docker 守护进程协作，构建不同文件系统图层统一视图的地方。我将描述如何使用 `overlay2` 存储驱动程序来完成此操作，因为它是 Linux 上的默认存储驱动程序。


    你已经看到文件系统图层是如何以目录形式存储在 `/var/lib/docker/overlay2/` 目录中的，它们使用相应的缓存 ID 命名。回想图 5-1
    中显示的构成 SQL Server on Linux 镜像的不同文件系统图层。该镜像中的最底层包含以下内容：


    *   一个名为 `link` 的文件。它包含了缓存 ID 值与包含该图层内容的目录之间的符号链接。

    *   一个名为 `diff` 的目录。它包含了该图层的内容。


    镜像中的下一个及后续图层，除了包含 `link` 文件和 `diff` 目录外，还包含以下内容：


    *   一个名为 `lower` 的文件。该文件包含指向下一层（父层）的符号链接。

    *   一个名为 `merged` 的目录。这是一个视图，包含了其自身及其下方图层的统一内容。该目录是在一个代表读写层（容器）的新目录下创建的，而不是在只读文件系统图层下。

    *   一个名为 `work` 的目录。`overlay2` 在内部使用的一个目录。


    此外，Windows 没有 `l` 文件夹。`C:\ProgramData\docker\windowsfilter` 中的文件夹本身就是缓存 ID 值，而不是符号链接。除此之外，文件系统结构的其他部分都是相同的——只是它们位于
    `C:\ProgramData\docker\` 下。


    ### 联合文件系统如何工作


    为了更好地理解 Docker 如何利用存储驱动程序构建镜像，让我们使用 `mount` 命令创建目录作为图层，并将它们“挂载”为一个联合文件系统层。首先，创建目录——`lower`、`diff`、`merged`、`work`。请确保你使用自己的用户账户登录，这样就不会弄乱任何与
    Docker 相关的文件和文件夹。运行以下命令，使用 `mkdir` 命令创建目录：


    ```

    mkdir lower diff merged work

    ```


    接下来，让我们在 `lower` 目录中创建一个文件。该目录将作为最底层/基础层。运行以下命令，创建一个名为 `fileInLower.txt` 的文件，其中包含指定文本：


    ```

    echo "LOWER: This file is in the LOWER directory" > lower/fileInLower.txt

    ```


    现在，运行以下 `mount` 命令来统一我们创建的目录：


    ```

    sudo mount -t overlay -o lowerdir=lower,upperdir=diff,workdir=work none merged

    ```


    我们使用 `overlay` 文件系统类型，并将 `merged` 目录作为统一视图的位置。由于我们挂载的不是设备而是一个目录，因此我们使用 `none`
    作为占位符。要进行验证，请运行以下命令，显示你刚刚创建的挂载点，如图 5-19 所示：


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig19_HTML.jpg](img/484552_1_En_5_Fig19_HTML.jpg)


    图 5-19：新创建挂载点的属性


    ```

    mount | grep overlay

    ```


    现在，在 `lower` 目录中有一个文件，并且有一个 `merged` 目录显示所有目录的统一视图。是时候测试联合文件系统了。在 `merged` 目录中创建一个新文件。


    ```

    echo "MERGED: This file is in the MERGED directory" > merged/fileInMerged.txt

    ```


    当你浏览 `merged` 目录的内容时，你将看到在 `lower` 目录中创建的文件和刚刚在 `merged` 目录中创建的文件，如图 5-20 所示。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig20_HTML.jpg](img/484552_1_En_5_Fig20_HTML.jpg)


    图 5-20：运行中的联合文件系统


    这只是统一文件系统工作原理的一个方面，也是 Docker 如何利用它为容器创建可读写文件系统层的一个方面。你还需要了解其他方面，例如处理只读文件系统层和处理多个文件系统层。关于
    OverlayFS 如何工作以及 Docker 如何利用它基于文件系统层构建镜像的一个很好的资源可以在这里找到：[*http://blog.programster.org/overlayfs*](http://blog.programster.org/overlayfs)。

    '
- fmt: '### Traversing the Layers


    Let’s find the lowest layer in the image and the succeeding layers above it. All
    the layers have the `lower` directory – except for the lowest layer (why would
    it if it’s the lowest layer, duh). Let’s use this information to search for the
    directory inside `/var/lib/docker/overlay2/` that does not have a `lower` directory.
    You could manually search every directory to find the one that does not have the
    `lower` directory (or the one that only has the `link` file and `diff` directory),
    like how you would with Windows Explorer. But that’s time-consuming. Instead,
    run the following command to do so:


    ```

    find -maxdepth 1 -type d ''!'' -exec test -e "{}/lower" '';'' -print

    ```


    The `find` command is used to search the `/var/lib/docker/overlay2/` directory
    and uses the following arguments:


    *   `maxdepth`: The number of levels to traverse below the starting point. A value
    of 1 means we only want to find the directory one level below.

    *   `type`: Find a specific type. A value of `d` means we want to find directories.

    *   `!`: The NOT operator. We want to evaluate the condition after the operator
    and check if it is the opposite. In this example, we are looking for folders that
    DO NOT contain the `lower` directory.

    *   `exec`: Parameter of the `find` command to perform actions on files or folders
    that match the search expression.

    *   `test`: Used for evaluating conditional expressions. The `-e` parameter evaluates
    whether the `lower` directory exists. The `{}` represents the current name of
    either a file or directory being processed.

    *   `print`: Parameter of the `find` command used to print the name of the current
    file or directory.


    Figure 5-21 shows the result of running the command. Since we know that the `l`
    directory contains the symbolic links, it’s safe to say that the other directory
    is the lowest layer. You can verify by listing the contents using the `cat` command.
    Note that only the `diff` directory and the `link` file are there. Also, if you
    look at the contents of the `link` file, it displays the cache id value, which
    is a symbolic link to the directory.


    ![Figure 5-21: Displaying the lowest layer](images/484552_1_En_5_Chapter/484552_1_En_5_Fig21_HTML.jpg)


    After finding the lowest layer, we can start searching the other directories to
    find the succeeding layers. Again, you can either do a manual search or automate
    the process. But how do you know which is the next filesystem layer after the
    lowest? From the definition, the `lower` file of the next filesystem layer after
    the lowest contains only one symbolic link to the layer below it – the lowest/base
    layer. The one after it will have two and so on and so forth. If you look at the
    `lower` file of the topmost layer of the SQL Server on Linux image, you will see
    eight entries of the symbolic links. Figure 5-22 shows the `lower` file of the
    topmost layer. OK, I cheated and manually searched for the file. But you don’t
    have to.


    ![Figure 5-22: The lower file of the topmost layer](images/484552_1_En_5_Chapter/484552_1_En_5_Fig22_HTML.jpg)


    If you observe the contents of the file, the existence of the characters `l/`,
    which refer to the relative path of the symbolic links to the directory, precedes
    the symbolic links. We can use this to count the number of `l/` characters in
    each of the `lower` files to figure out the sequence of filesystem layers stacked
    one on top of the other. Run the following command to do so. It’s a little bit
    crude but it does the trick. The concept is similar to finding the lowest layer
    except that this one searches the `lower` file for the `l/` characters and displays
    each line. Figure 5-23 displays the output of the command.


    ![Figure 5-23: Displaying the lines of the lower files in each directory with
    the "l/" characters](images/484552_1_En_5_Chapter/484552_1_En_5_Fig23_HTML.jpg)


    ```

    find -type f -name "lower" -print0 | xargs -0 grep -o ''l/''

    ```


    Reconstructing the filesystem layers for the SQL Server on Linux image in Figure
    5-1 using the directory names, it would look like Figure 5-24.


    ![Figure 5-24: SQL Server on Linux image with image layers using directory names](images/484552_1_En_5_Chapter/484552_1_En_5_Fig24_HTML.jpg)'
