- fmt: "## Minimum System Requirements\n\nLike any software installation, you need\
    \ to meet the minimum system requirements to successfully use a Windows Server\
    \ operating system as a `Docker container host`. A Docker container host is the\
    \ operating system that runs the Docker `daemon` (a daemon is simply the Linux\
    \ equivalent of a service in Windows).\n\n*   **RAM**: At least 4GB. You don’t\
    \ want to end up spending a lot of time troubleshooting a container deployment\
    \ issue only to find out that you don’t have enough memory resources. Plus, a\
    \ SQL Server instance will use up as much memory resource as it possibly can.\
    \ It’s the same behavior when running it in a container.\n*   **Operating system**:\
    \ Just because we’re using Windows Server 2016 doesn’t mean that’s all you need\
    \ to know. Remember, containers share the same operating system kernel. This means\
    \ the operating system of the container host should support the operating system\
    \ of the container image. Since we’re deploying a Windows Server 2016 container\
    \ host, you can only deploy a Windows Server 2016 container image running Server\
    \ Core or Nano Server. We’ll skip Nano Server since SQL Server is not supported\
    \ to run on top of Nano Server.\n*   **Disk space**: The bare minimum is 32GB.\
    \ Much like virtual machines, each container image requires its own disk space.\
    \ Allocate enough disk space so you can run multiple containers at the same time.\n\
    \n## Enable Containers Feature in Windows Server 2016\n\nInstalling and configuring\
    \ a Docker container host on a Windows Server 2016 machine is a three-step process.\
    \ You need the machine to be connected to the Internet to download the binaries,\
    \ the PowerShell packages, and the Windows-based container images.\n\nThe first\
    \ step is to enable the Containers feature on Windows Server 2016:\n\n1.  From\
    \ the **Start** menu, select **Server Manager**.\n2.  In Server Manager Dashboard,\
    \ click the **Add roles and features** link. This will run the **Add Roles and\
    \ Features Wizard**.\n3.  Click Next until you get to the **Select features**\
    \ dialog box. Select the **Containers** checkbox as shown in Figure [2-1](#484552_1_En_2_Chapter.xhtml#Fig1)\
    \ and click Next. Note that the **.NET Framework 4.6 Features** checkbox is selected\
    \ by default on Windows Server 2016 Build 1607. If it isn’t, expand the **.NET\
    \ Framework 4.6 Features** checkbox and make sure that **.NET Framework 4.6 (Installed)**\
    \ is shown.\n    ![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig1_HTML.jpg](images/484552_1_En_2_Chapter/484552_1_En_2_Fig1_HTML.jpg)\n\
    \    **Figure 2-1**\n    Check the Containers checkbox in the Select features\
    \ dialog box\n4.  In the **Confirm installation selections** dialog box, click\
    \ Install.\n\nSince you will be working with Docker commands via the command line –\
    \ both on Windows and Linux – this is a great opportunity to start working with\
    \ the command line from within a Windows environment. Embrace the blinking cursor\
    \ and get comfortable with it. An alternative to enabling the Containers feature\
    \ is by using the `Install-WindowsFeature` PowerShell cmdlet. Open an elevated\
    \ administrative PowerShell command shell and run the following command:\n```\n\
    Install-WindowsFeature –Name Containers\n```\nYou will be prompted to restart\
    \ the machine after enabling the Containers feature to complete the installation\
    \ process. Either you perform the restart using the method you’re familiar with\
    \ or use the `Restart-Computer` PowerShell cmdlet.\n\n## Download and Install\
    \ the Docker-Microsoft PackageManagement Provider\n\nThe second step is to download\
    \ and install the `Docker-Microsoft PackageManagement provider`. The role of a\
    \ package management system is to automate the process of consistently discovering,\
    \ installing, updating, configuring, and removing a computer software. In this\
    \ case, you will be installing a package management system specifically for use\
    \ with Docker.\n\nRun the following PowerShell command to download and install\
    \ the Docker-Microsoft PackageManagement provider:\n```\nInstall-Module -Name\
    \ DockerMsftProvider -Force\n```\nWhen prompted to download and install the `NuGet`\
    \ provider, type **Y** to respond Yes, as shown in Figure [2-2](#484552_1_En_2_Chapter.xhtml#Fig2).\n\
    ![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig2_HTML.jpg](images/484552_1_En_2_Chapter/484552_1_En_2_Fig2_HTML.jpg)\n\
    **Figure 2-2**\nDownloading the NuGet provider with the Docker-Microsoft PackageManagement\
    \ provider\n\n**Note**\nThe topic of package management systems can be a bit confusing\
    \ for IT professionals who mainly work on the Windows platform. For years, software\
    \ on Windows was distributed through EXE, MSI, and MSU files – just download the\
    \ installation file, double-click, and install. This isn’t the case with Linux.\
    \ Given the open source nature of Linux and the availability of software from\
    \ different sources, package managers are used to install and manage software.\
    \ PowerShell 5.0 introduced the capability to leverage a package manager to simplify\
    \ the complexity of installing software and PowerShell modules.\n\nIf you want\
    \ to geek out on the details of how the `Docker-Microsoft PackageManagement provider`\
    \ is implemented, check out the GitHub repository at [*https://github.com/OneGet/MicrosoftDockerProvider*](https://github.com/OneGet/MicrosoftDockerProvider).\n\
    \n## Download and Install the Docker Package\n\nThe third step is to download\
    \ and install the Docker software package. Run the following PowerShell command\
    \ to download and install the Docker software package using the `Docker-Microsoft\
    \ PackageManagement provider` that you downloaded in the previous step. Figure\
    \ [2-3](#484552_1_En_2_Chapter.xhtml#Fig3) shows a successful installation of\
    \ Docker Enterprise Edition (EE).\n![../images/484552_1_En_2_Chapter/484552_1_En_2_Fig3_HTML.jpg](images/484552_1_En_2_Chapter/484552_1_En_2_Fig3_HTML.jpg)\n\
    **Figure 2-3**\nDownloading and installing the Docker software package\n```\n\
    Install-Package -Name docker -ProviderName DockerMsftProvider -Force\n```\nThis\
    \ will create a Windows service named **Docker Engine** that calls the command\
    \ `\"C:\\Program Files\\Docker\\dockerd.exe\" --run-service`\n\nThe service is\
    \ configured to automatically start when the server starts, but the installation\
    \ process does not explicitly start the service. This is where you need to do\
    \ the unpopular server reboot to update the environment variables so you can run\
    \ Docker commands from either the command prompt or the PowerShell command shell.\
    \ Don’t worry. This will be the last time you need to reboot your server."
