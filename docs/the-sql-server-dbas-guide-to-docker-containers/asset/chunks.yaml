    回想第 5 章，容器由一个存储在 Docker 主机本地存储上的文件系统层组成。该文件系统层构成了容器本身，并与其生命周期绑定。文件系统层——包括你在其中存储的数据——在创建容器时被创建，在删除容器时被删除。非常直接，对吧？为了将计算与存储解耦，我们需要一个存在于容器之外的对象。这时就需要
    Docker 卷。


    Docker 卷是一个表示容器外部文件系统的对象。它是容器联合文件系统之外的一个目录，在 Docker 主机的文件系统上作为一个普通的目录存在。Docker
    卷是持久化容器生成和使用的数据的首选方式。我喜欢把 Docker 卷想象成一个网络共享文件夹——它在操作系统（容器）内看起来像一个文件夹，但实际上是外部的。卷存在于容器之外，允许你向其中添加任意多的数据而不影响容器的大小，这对于
    SQL Server 数据库来说是完美的。而且，因为它是一个存在于容器之外的对象，所以使用其专属的 `docker volume` 子命令进行管理。例如，如果你想创建一个
    Docker 卷，可以运行以下命令。请务必提供一个有意义的名称。否则，Docker 会为它分配一个 64 字符的 GUID 值作为名称。我相信在读完第 5
