  trans: '

    ### 配置默认数据库备份目录


    默认的数据库备份目录与默认的数据库数据和日志目录相同，都是 `/var/opt/mssql/data`。出于灾难恢复的目的，我喜欢将数据库和备份分开存放。与配置默认数据库数据和日志目录类似，您需要先创建目录，并将所有权更改为
    `mssql` 用户和 `mssql` 组。让我们使用 `/tmp/dbbackup` 目录作为默认数据库备份目录。运行以下命令以执行必要的配置更改：


    ```

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    ```


    注意


    如果您好奇 `mssql` 用户和 `mssql` 组是什么，它们是分配给 SQL Server 非二进制文件的非交互式登录和组。可以将其视为 Windows
    上的 SQL Server 服务账户。非交互式登录在后台运行 SQL Server 进程。但与通常的 Windows SQL Server 服务账户不同（除非将其配置为
    *作为服务登录*，否则您可以使用该账户及其凭据登录 Windows 机器），非交互式登录将无法登录并从 shell 运行命令。此外，您无法将其更改为任何其他用户账户。我希望这在未来的版本中有所改变。


    ### 启用跟踪标志


    在部署新的 SQL Server 实例时，我启用的跟踪标志之一是跟踪标志 `3226`。这会抑制 SQL Server 错误日志和系统事件日志中每一个成功的备份条目。过去，我需要从我们的监控服务器中过滤成功的备份消息，以避免每次备份作业完成时都收到警报。这个跟踪标志真是救星。运行以下命令在
    SQL Server 实例上启用跟踪标志 `3226`：


    ```

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    ```


    由于所有这些设置都需要重启 SQL Server 守护进程，所以一次性完成所有操作并在配置结束时重启 SQL Server 是合理的。运行以下命令以重启 SQL
    Server：


    ```

    sudo systemctl restart mssql-server

    ```


    ### 查看所有实例级配置设置


    我希望能有一个简单的命令来显示所有实例级配置设置，而不是通过编程方式查询 SQL Server 管理对象 (SMO)。如果您想回顾刚刚进行的所有配置设置怎么办？嗯，为此您必须手动读取
    `/var/opt/mssql/mssql.conf` 文件。SQL Server 将您所做的配置更改存储在此文件中，并在启动时读取以加载除默认值之外的配置设置。我认为这比通过编程方式查询
    SMO 更好。运行以下命令以查看 SQL Server 实例的所有配置设置。图 8-9 显示了本节中设置的实例级配置设置。


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig9_HTML.jpg](img/484552_1_En_8_Fig9_HTML.jpg)


    图 8-9


    查看 Linux 上 SQL Server 的已配置设置


    ```

    sudo cat /var/opt/mssql/mssql.conf

    ```


    `/var/opt/mssql/mssql.conf` 文件就像任何其他文本文件一样，您可以使用喜欢的文本编辑器进行修改。该文件的格式可在 [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf?view=sql-server-ver15#mssql-conf-format*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf%253Fview%253Dsql-server-ver15%2523mssql-conf-format)
    找到。如果您决定手动修改配置文件，则需要重启 SQL Server 守护进程才能使更改生效。


    我并不太喜欢手动修改文件格式，因为解析器在处理不必要字符时可能非常严格。此外，我们是人类，难免会犯错。我修改 YAML、JSON 和 XML 文件的经验也不少，一个简单的错误，比如在文件中引入多余的字符，可能会花费大量时间排查问题。“Fat
    finger”（误触）这个词在我们这行是存在的，这是有原因的。我总是使用像 `/opt/mssql/bin/mssql-conf` 脚本这样的支持工具来更改文件。图
    8-10 展示了在 `/var/opt/mssql/mssql.conf` 文件中误触多打一个字符带来的副作用。重启 SQL Server 守护进程并没有告诉我加载配置文件中存储的设置时出错。此外，如果读取配置文件时出错，解析器只会忽略它并加载默认值。我不得不运行命令
    `sudo /opt/mssql/bin/mssql-conf validate` 才发现配置有错误。您能猜出是什么错误吗？


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig10_HTML.jpg](img/484552_1_En_8_Fig10_HTML.jpg)


    图 8-10


    手动修改 `/var/opt/mssql/mssql.conf` 文件可能导致的潜在错误


    ## 处理文件系统


    Linux 是一个基于文件的操作系统。对于习惯了 Windows 操作系统的人来说，这个概念有点难以理解。在 Windows 上，我们处理注册表、系统服务、硬件设备（如网络适配器）的表示等等。在
    Linux（或通常的 Unix）中，一切都是文件。您的硬盘由一个设备文件表示。配置设置存储在文件中。甚至包含文件的目录也是一种特殊类型的文件，您可以使用文本编辑器读取。回想一下自从第
    3 章以来您所做的一切——它们都引用了一个文件：仓库文件、软件包文件、容器使用的文件系统层、容器清单文件、符号链接文件、`daemon.json` 文件等等。如果您想让一个应用程序的行为有所不同，您只需要修改其相应的配置文件（前提是您确切知道自己在做什么）。

    '
- fmt: '## Important Directories in the Linux Filesystem


    To work with a file-based operating system, you need to understand some of the
    basics of the filesystem. This will help you properly navigate and interact with
    directories and files to perform tasks such as moving files around, modifying
    configuration files, and so on. The following is a list of the important directories
    in the Linux filesystem:


    *   `/`: The root directory. Everything in Linux is located under this directory.
    It’s like the `C:\` directory on Windows.

    *   `/bin`: This directory contains essential user binaries (programs) that both
    system administrators and nonprivileged users use. Commands like `cat`, `ls`,
    `rm`, and so on and the shells like `bash` are in this directory.

    *   `/boot`: Obviously, this directory contains everything required to boot the
    Linux system except for configuration files not needed at boot time.

    *   `/dev`: This directory contains special or device files. I did mention that
    the hard drive in Linux is represented as a device file and it is stored in this
    directory.

    *   `/etc`: This directory contains system configuration files and is considered
    the command center of your Linux system. The behavior and operation of your Linux
    system are stored in a configuration file found in this directory. So, be careful
    with messing around with the files in this directory as it can render your system
    unstable or even unbootable.

    *   `/home`: This directory contains the `home` directories of all the users and
    is similar to the `C:\Users` directory on Windows. When you log in to your Linux
    system, a directory is created under the `/home` directory with your username
    and that which you have full, unrestricted access. Your `home` directory also
    contains your personal configuration files.

    *   `/lib`: This directory contains helpful library files (files used by an application
    or system for proper execution) needed by the system.

    *   `/media`: This directory contains subdirectories for removable media such
    as CD-ROMs. I’m sure you haven’t used one of these on servers in years.

    *   `/opt`: This directory contains add-on packages that are not part of the default
    installation.

    *   `/root`: This is the special `home` directory of the `root` user. Note that
    it is not in the `/home` directory.

    *   `/sbin`: Similar to the `/bin` directory but contains essential binaries that
    are generally intended for system administration, typically requires `root` privileges.

    *   `/srv`: This directory contains data for services such as Web and FTP. Not
    relevant to SQL Server.

    *   `/tmp`: This directory contains temporary files, which are generally deleted
    during a system restart.

    *   `/usr`: This directory contains applications and files used by users.

    *   `/var`: This directory contains variable data like system log files, spool
    files, and anything that can change during normal operation of your Linux system.


    When you look at the different directories created during SQL Server installation,
    you’ll start to see the purpose behind their locations. The common ones are


    *   `/opt/mssql/bin`: Directory containing the SQL Server binary file, the `mssql-conf`
    script, and other scripts used for dealing with SQL Server dump files.

    *   `/var/opt/mssql`: Directory containing the SQL Server data and log files,
    secrets, and the `mssql.conf` configuration file. Variable data of the packages
    in `/opt` must be installed in `/var/opt/<subdirectory>`. Because the MDF, LDF,
    error log files, Extended Events, and so on are variable data that change over
    time while the SQL Server database engine is running.


    ## File Permissions


    File permissions in Linux play an important role in administration as well as
    application configuration. You’ve seen how elevating privileges to `root` allows
    you to perform certain administrative tasks and even opening or modifying files.
    But reading the output of the `ls -l` command can be overwhelming if you don’t
    know what it means. Let’s start by analyzing the output of the `ls -l` command
    on the `/var/opt/mssql/` and `/opt/mssql/bin` directories as shown in Figure [8-11](#484552_1_En_8_Chapter.xhtml#Fig11).
    Note the use of `sudo` to list the contents of the `/var/opt/mssql` directory.


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig11_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Output of the `ls -l` command


    All the other attributes – `owner`, `group`, `file size`, `last modified`, and
    `filename` – are easy to understand. The one that really bothers me is the `mode`
    attribute. It’s like some kind of code that only those who speak Klingon can understand.
    Let’s break down the `mode` attribute even more to see how it affects the files
    and directories, as shown in Figure [8-12](#484552_1_En_8_Chapter.xhtml#Fig12).


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig12_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig12_HTML.jpg)


    Figure 8-12


    Mode attribute of files and directories


    The first character in the `mode` represents the type. A `hyphen` (`-`) signifies
    that it is a normal file that contains data, like the `mssql.conf` configuration
    file. A “d” signifies a directory, like the `data`, `log`, and `secrets` directories.
    Keep in mind that everything in Linux is a file, even a directory. Special files,
    such as a directory, are identified by a nonhyphen character such as a letter.
    Recall the symbolic link file mentioned in *Chapter* [*5*](#484552_1_En_5_Chapter.xhtml),
    represented by an “l” character.


    The next three characters in the `mode` attribute represent the permissions for
    a user. Let’s look at the different permissions that we can assign to a file or
    a directory:


    *   `r`: Read. For files, this permission allows a user to read the contents.
    For directories, this permission allows a user to view the names of the file.

    *   `w`: Write. For files, this permission allows a user to modify and delete
    the file. For directories, a `write` permission allows a user to delete the directory,
    modify its contents (create, delete, and rename files in it), and modify the contents
    of files that the user can read.

    *   `x`: Execute. For files, this permission allows a user to execute a file (the
    user must also have read permission) and should be set for executable programs
    and scripts. For directories, this permission allows a user to access files (including
    their metadata) in the directory.


    Referring to Figure [8-12](#484552_1_En_8_Chapter.xhtml#Fig12), the `mssql` user
    has `read`, `write`, and `execute` permissions on the `secrets` directory but
    only `read` and `write` permissions on the `mssql.conf` file (the `mssql.conf`
    file is a normal text file that contains data and not a script like the `/opt/mssql/bin/mssql-conf`
    file).


    The next three characters in the `mode` attribute represent the permissions for
    the group owner of the file. Referring to Figure [8-12](#484552_1_En_8_Chapter.xhtml#Fig12),
    the `mssql` group (and its members) has `read` and `execute` permissions on the
    `secrets` directory and `read` and `write` permissions on the `mssql.conf` file.


    The last three characters in the `mode` attribute represent the permissions of
    all other users, or commonly known as the rest of the world. Referring to Figure
    [8-12](#484552_1_En_8_Chapter.xhtml#Fig12), all other users have `read` and `execute`
    permissions on the `secrets` directory but only `read` permissions on the `mssql.conf`
    file.'
