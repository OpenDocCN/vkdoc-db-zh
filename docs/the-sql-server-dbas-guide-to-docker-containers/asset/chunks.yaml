    ## 在主机和容器之间共享文件


    可能会有一些情况，你需要将 Docker 主机上的文件与容器共享。例如，你可能希望还原 SQL Server 数据库的备份到容器内的 SQL Server
    实例中。你可以将备份文件复制到 Docker 主机上的某个目录，并使其对容器可用。这正是 `docker run` 命令的 `-v` 或 `--volume`
    参数的用武之地。首先，在你的 Linux Docker 主机上创建一个 `/tmp/dbData` 目录。然后，将你的数据库备份复制到该目录中。使用以下命令，将
    Linux Docker 主机上的 `/tmp/dbData` 目录挂载到容器内的 `/var/opt/mssql` 目录。这和我们一直在使用的 `docker
    run` 命令相同，只是多了 `-v` 参数。


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevlinuxcon01 -d -h linuxsqldev01 -v /tmp/dbData:/var/opt/mssql mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    你可以将容器内的 `/var/opt/mssql` 目录看作是 Linux Docker 主机上的 `/tmp/dbData` 目录，就像一个网络共享文件夹。存储在容器内
    `/var/opt/mssql` 目录中的任何数据都将持久化在 Linux Docker 主机的 `/tmp/dbData` 目录上，这意味着你可以删除 SQL
    Server 容器并保留你的数据库文件。你不仅在 Linux Docker 主机和容器之间共享了数据和文件，还持久化了容器内创建的数据。更多细节将在第 7
    章介绍。


    一旦 `/tmp/dbData` 目录被挂载到容器中，SQL Server 实例就可以访问其中的备份文件。然后，你就可以在容器内的 SQL Server 实例上还原备份了。当然，由于容器内的
    `/var/opt/mssql` 目录指向 Linux Docker 主机上的 `/tmp/dbData` 目录，你创建的每个数据库也将存储在 `/tmp/dbData`
    目录中。你可以通过还原数据库备份然后删除容器来测试这一点。图 6-11 显示了删除 SQL Server 容器后，Linux Docker 主机上 `/tmp/dbData`
    目录的内容。


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig11_HTML.jpg](img/484552_1_En_6_Fig11_HTML.jpg)


    图 6-11 在 Linux Docker 主机和容器之间共享数据


    在 Windows 上运行以下命令以创建一个容器，并将 Windows Docker 主机上的 `C:\dbData` 文件夹映射到容器内的 `C:\dbData`
    文件夹。该文件夹不必存在于容器内部，它会在运行容器的过程中被创建。注意这里使用正斜杠 (/) 而不是反斜杠 (\) 来定义路径。过去，由于 Go 语言对字符的解释方式，只有正斜杠字符在定义路径时有效。现在，两种都可以使用。为了与
    Windows 和 Linux 路径保持一致，我使用正斜杠。


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" –p 1433:1433 --name
    sqldevwincon01 -d -h winsqldev01 –v  C:/dbData:C:/dbData microsoft/mssql-server-windows-developer

    ```


    另一种在主机和容器之间共享文件的方法是使用 `docker cp` 命令。使用相同的例子，如果你想将 Linux Docker 主机上的 `/tmp/dbData/NorthwindBackup.bak`
    文件复制到 `sqldevlinuxcon01` 容器内，可以运行以下命令。你可以使用容器 ID 或容器名称，但我更喜欢使用容器名称，这样我能确切知道我在操作什么。


    ```

    docker cp /tmp/dbData/NorthwindBackup.bak sqldevlinuxcon01:/var/opt/mssql/data

    ```


    在 Windows 上，只需将路径替换为适当的 Windows 目录路径，并注意使用正斜杠代替反斜杠。


    ```

    docker cp C:/dbData/NorthwindBackup.bak sqldevwincon01:C:/

    ```


    你也可以反过来，使用以下命令将文件（本例中是 `testDB.bak` 文件）从容器复制到 Linux Docker 主机：


    ```

    docker cp sqldevlinuxcon01:/var/opt/mssql/data/testDB.bak /tmp/dbData/

    ```


    显然，在 Docker 主机和容器之间共享文件的方法不止一种。


    ## 配置容器资源


    默认情况下，容器没有资源限制。它可以使用主机内核调度器允许的尽可能多的给定资源。就 SQL Server 而言，这不是一件好事。我们知道 SQL Server
    会占用系统中所有可用的内存资源。同样，它会占用所有可用的 CPU 核心。想象一下这会对你的许可产生什么影响（如果这是测试环境，并且你只运行企业评估版、开发版或速成版，那问题不大）。但如果你已经为
    Docker 主机上的所有 CPU 核心购买了许可，就不需要担心 SQL Server 的许可问题了。


    配置容器消耗的 CPU 和内存资源的方式类似于为虚拟机分配资源。使用 `docker run` 命令，添加 `--cpus` 参数来指定容器可以使用的 CPU
    资源数量，并添加 `--memory` 参数来设置内存上限（你可能会说这可以在 SQL Server 内部通过 `sp_configure` 完成，但如果在容器级别完成会好得多，因为你不能在同一个
    Linux 主机上运行多个 SQL Server 实例）。在我的测试环境中，我的 Linux Docker 主机配置为拥有 4 个 CPU 核心和 8GB
    内存，如图 6-12 所示。


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig12_HTML.jpg](img/484552_1_En_6_Fig12_HTML.jpg)


    图 6-12 为 Docker 主机配置的硬件资源


    运行以下带有格式化参数的 `docker stats` 命令，可以显示我的 SQL Server on Linux 容器在运行多个查询时的 CPU 和内存利用率，如图
    6-13 所示。显然，它占用了 Docker 主机上大部分的 CPU 和内存资源（使用了全部 7.62GB 内存）。


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig13_HTML.jpg](img/484552_1_En_6_Fig13_HTML.jpg)


    图 6-13 容器资源利用率


    ```

    docker stats sqldevlinuxcon01 --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}"

    ```


    运行以下命令来创建并运行 SQL Server on Linux 容器，分别使用 `--cpus` 和 `--memory` 参数，仅分配 2 个 CPU
    和 4GB 内存：


    ```

    docker run -e "ACCEPT_EULA=Y" -e "    SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433
    --name sqldevlinuxcon01 -d -h linuxsqldev01 --cpus="2" --memory=4g mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    在限制了容器可以使用的 CPU 和内存资源量之后，在 SQL Server 实例上重新运行我的查询，使用 `docker stats` 命令显示新的资源利用率，如图
    6-14 所示。当然，你的测试结果取决于许多不同的因素——硬件配置、SQL Server 实例配置、数据库架构、索引、查询等等。这只是为了演示如何配置容器资源利用率。


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig14_HTML.jpg](img/484552_1_En_6_Fig14_HTML.jpg)


    图 6-14 配置容器 CPU 和内存资源利用率后


    配置容器资源利用率的更多方法请访问：[`docs.docker.com/config/containers/resource_constraints/`](https://docs.docker.com/config/containers/resource_constraints/)。

    '
- fmt: '# Exploring the Container Logs


    In `Chapter 4`, I talked about how failing the SQL Server password complexity
    policy can prevent the container from starting. If it was running on a Windows
    or Linux host, I could have easily opened the SQL Server error log using a text
    editor to check for possible causes. But because the SQL Server error log is inside
    the container, there’s no way I can access it unless the container is started
    or the `/var/opt/mssql` directory is mounted on the Linux Docker host. It’s like
    trying to access the SQL Server error log inside a stopped virtual machine. Good
    thing Docker exposes those logs through the `docker logs` command.


    ## Viewing Container Logs with `docker logs`


    The following command will create a new SQL Server on Linux container. Observe
    how the `SA_PASSWORD` parameter value does not meet the SQL Server password complexity
    policy.


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=password12" -p 1433:1433 --name
    sqldevlinuxcon01 -d -h linuxsqldev01 mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    If you check the status of all the containers using the `docker ps -a` command,
    you will see that the container exited immediately, as shown in Figure 6-15.


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig15_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig15_HTML.jpg)


    Figure 6-15: SQL Server on Linux container terminating immediately after starting


    As I mentioned in `Chapter 4`, I wasted a lot of time trying to figure out what
    could have caused the container to stop. It wasn’t until I reviewed the logs that
    I found out what the real problem was. Use the `docker logs <container name>`
    command to review the SQL Server error logs generated inside the container, as
    shown in Figure 6-16. After finding out that the real issue has something to do
    with the `SA_PASSWORD` parameter value, I made the necessary modifications and
    reran the command.


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig16_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig16_HTML.jpg)


    Figure 6-16: Running `docker logs` to explore the SQL Server error logs


    ## Important Note on Windows Behavior


    Unlike in Linux, failing the SQL Server password complexity policy on Windows
    does not terminate the container nor does it create an entry in the SQL Server
    error log. The container will continue to run but it won’t allow you to log in
    using the `sa` credentials that you provided. You’re going to need your DBA skills
    to log in interactively to the container using the `docker exec` command and start
    the SQL Server instance in single-user mode so you can change the `sa` password.


    ## Real-Time Log Viewing


    You can also use the `docker logs` command with the `-f` parameter to review the
    SQL Server error log – in real time. I find it a much better approach than running
    `sp_readerrorlog` when troubleshooting SQL Server–related issues since I can see
    exactly what is going on while it is happening. It’s like having a live trace
    in the SQL Server error log. Figure 6-17 shows using both `sp_readerrorlog` and
    the `docker logs` command side by side.


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig17_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig17_HTML.jpg)


    Figure 6-17: `sp_readerrorlog` vs. the `docker logs` command to explore the SQL
    Server error logs


    # Reviewing the Status of the Docker Daemon


    Knowing the status of the Docker daemon is also key to making sure it runs smoothly.
    It can also lead you to finding out issues should you need to perform some troubleshooting.
    After installing the Docker daemon on a Linux host in `Chapter 3`, one of the
    things we did was to check its status using the following command. The `-l` parameter
    displays the entire message without truncating them with ellipses. Figure 6-18
    shows the status of the Docker daemon on a Linux host.


    ```

    sudo systemctl status docker -l

    ```


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig18_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig18_HTML.jpg)


    Figure 6-18: Display the status of the Docker daemon in Linux


    Since Docker is just like any other Linux daemon, it also sends its logs to the
    `systemd` journal. You can think of `systemd` journal as the Windows event log.
    You can access all the system events from the `systemd` journal by running the
    following command:


    ```

    sudo journalctl

    ```


    But given that it contains all system events and logs, it can be a bit overwhelming.
    We only want the system logs from the Docker daemon. To display the Docker daemon
    logs from the `systemd` journal, run the following `journalctl` command. You can
    also pass the `-o verbose` parameter if you want to display a more detailed information
    for each entry.


    ```

    sudo journalctl -u docker

    ```


    These are stored in the `/var/log/syslog` file on Ubuntu or `/var/log/messages`
    file on CentOS. You can retrieve Docker-related events using the following command.
    Just replace the appropriate filename depending on your Linux distribution. Figure
    6-19 displays Docker-related events when you run the command on a CentOS Docker
    host.


    ```

    sudo cat /var/log/messages | grep docker

    ```


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig19_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig19_HTML.jpg)


    Figure 6-19: Display the status of the Docker daemon in Linux


    On a Windows host, since the events are written to the Windows event log, you
    can filter the application logs to only display event sources from `docker`. Alternatively,
    you can use the following PowerShell command:


    ```

    Get-EventLog -LogName Application -Source Docker

    ```


    # Summary


    We’ve covered a lot of ground in this chapter as far as managing Docker and containers
    is concerned. But that’s not all of it. It’s just enough to get you started on
    managing containers and the Docker host from a SQL Server DBA’s point of view.
    As you do more work with Docker, you’ll get more involved with the Linux operating
    system. I’m sure you’ve learned a lot about Linux since `Chapter 3`. And we’re
    just scratching the surface. I can guarantee that you’ll be working with the Linux
    filesystem, configuring daemons, managing system resources, and much more by the
    time you finish this book. You have no other choice but to be really good with
    Linux when you do more work with SQL Server running in a Docker container.


    In the section “Sharing Files Between Host and Container,” I covered the use of
    volumes to make a directory on the Docker host available inside the container.
    The next chapter will cover this in more detail and how to manage and persist
    data inside a container for stateful applications, specifically SQL Server. Besides,
    how good is a relational database if you can’t persist data in it? We’ll make
    sure that doesn’t happen to your SQL Server databases inside containers.'
