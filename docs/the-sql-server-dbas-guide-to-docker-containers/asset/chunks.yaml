    Both parameters will create the directory on the Docker host in case it doesn’t
    already exist. But they won’t tell you if the volume that you are trying to attach
    to a container already exists. This is fine for any other type of app but certainly
    not for SQL Server. Imagine a SQL Server on Linux container using a volume to
    store both system and user databases. If you start up a new container and attach
    the existing volume that another SQL Server container is already using, you’ll
    get an *Error 17113* as shown in Figure [7-8](#484552_1_En_7_Chapter.xhtml#Fig8)
    with an *Access is denied* error message. That’s because the *sqlservr* process
    from the existing container already has an exclusive lock to the system database
    files used to run the SQL Server instance.


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig8_HTML.jpg](images/484552_1_En_7_Chapter/484552_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Attaching a volume to a new SQL Server container that is already being used by
    an existing SQL Server container


    It is recommended to use the *--mount* parameter for new deployments unless you
    are deploying SQL Server on Windows containers, or any Windows Server containers,
    for that matter. For more information, refer to the Docker documentation on using
    volumes at [*https://docs.docker.com/storage/volumes/*](https://docs.docker.com/storage/volumes/).


    ### Sharing Volumes Between Containers?


    While I was researching about how to share data between containers, the topic
    of Docker volumes came up a lot. This isn’t surprising, given that even Docker
    recommends it. When you read the documentation on using volumes, this is one of
    the items listed as an advantage: *Volumes can be more safely shared among multiple
    containers.*


    Wait, what? Docker, the creator of the Docker container runtime engine, is telling
    you to use volumes so you can share them among multiple containers? You’ve got
    to be kidding me! And everyone else is saying the same thing.


    Having already done thought experiments to understand the “scale-up-with-minimal-downtime”
    approach I mentioned in an earlier section, I decided to again gather what I knew
    about SQL Server and filter the statement about Docker volumes to see if it makes
    sense. So here goes. The SQL Server database engine initiates an exclusive lock
    to the database files for access. It does so because part of being able to use
    a database is opening all the files that belong to it and performing recovery.
    If the SQL Server database engine has an exclusive lock on all of the database
    files, there’s no way another process – like another SQL Server database engine –
    could gain exclusive access to the same set of database files. There’s a reason
    why Microsoft recommends excluding the SQL Server database files from antivirus
    scanning: to make sure that the files are not locked when the SQL Server process
    must use them. And don’t get me started with third-party tools that bypass the
    SQL Server APIs to quiesce the database files while performing backups. The very
    tools that you thought were there to protect you are the very ones causing disasters.


    Given that the SQL Server process requires an exclusive lock on the database files,
    it doesn’t make sense to have multiple SQL Server containers accessing the same
    volume. I repeat: it doesn’t make sense to have multiple SQL Server containers
    accessing the same volume. Remember the error message in Figure [7-8](#484552_1_En_7_Chapter.xhtml#Fig8)?
    I hope I made myself very clear.


    To Docker’s defense, since containers were originally designed for stateless applications,
    the practice of having multiple containers access the same volume makes total
    sense. Let’s say you have a logging module for all of your applications. The logging
    module can be implemented in a container and write the log files in a volume that
    can be shared across multiple logging containers. Since most logging applications
    are predominantly write intensive with very minimal read access (until after an
    auditor who wakes up on the wrong side of the bed decides to ask for a detailed
    audit report), storing the log files in a single volume has the benefit of a “single-source-of-truth”
    for all the logs. Plus, you don’t have to do any of those extract-transform-load
    (ETL) or extract-load-transform (ELT) processes since all of the data is stored
    in one place – the volume.


    It does bear repeating: it doesn’t make sense to have multiple SQL Server containers
    accessing the same volume.'
  trans: '

    ### 选择 `-v` 还是 `--mount`


    除了 Windows Server 容器和 Linux 容器之间的支持差异外，您可能想知道 `docker run` 命令的 `-v` 和 `--mount`
    参数之间还有什么区别。 `-v` 参数出现得更早，因此您会在文档和在线资源中看到更多它的用法。 `--mount` 参数是在 Docker 17.06 版本中才引入的。最初，`-v`
    参数用于独立容器，而 `--mount` 参数用于 Docker Swarm 中的服务。现在，您可以在两种场景下都使用 `--mount` 参数。此外，`--mount`
    参数的语法通过显式使用 `key=value` 对，更易于理解。请看这个将卷挂载到 Linux 容器的示例 `docker run` 命令。


    如果目录不存在，这两个参数都会在 Docker 主机上创建该目录。但它们不会告诉您您试图挂载到容器上的卷是否已经存在。这对于任何其他类型的应用程序来说都没问题，但对于
    SQL Server 来说肯定不行。想象一个在 Linux 容器上运行的 SQL Server，它使用一个卷来存储系统数据库和用户数据库。如果您启动一个新容器并挂载另一个
    SQL Server 容器已在使用的现有卷，您会收到一个 `Error 17113`，如图 7-8 所示，并附有 `Access is denied`（访问被拒绝）的错误信息。这是因为现有容器中的
    `sqlservr` 进程已经对用于运行 SQL Server 实例的系统数据库文件持有独占锁。


    ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig8_HTML.jpg](img/484552_1_En_7_Fig8_HTML.jpg)


    图 7-8


    将卷挂载到一个新的 SQL Server 容器，而该卷已被现有的 SQL Server 容器使用


    除非您是在 Windows 容器（或就此而言，任何 Windows Server 容器）上部署 SQL Server，否则建议在新部署中使用 `--mount`
    参数。更多信息，请参阅 Docker 关于使用卷的文档：[*https://docs.docker.com/storage/volumes/*](https://docs.docker.com/storage/volumes/)。


    ### 在容器之间共享卷？


    在我研究如何在容器之间共享数据时，Docker 卷这个话题经常被提及。这并不奇怪，因为连 Docker 都推荐这样做。当您阅读关于使用卷的文档时，这是列出的优势之一：*卷可以在多个容器之间更安全地共享。*


    等等，什么？Docker 容器运行时引擎的创造者 Docker，告诉你要使用卷以便在多个容器之间共享它们？你一定是在开玩笑吧！而且其他所有人也都这么说。


    在完成了之前章节中提到的“最小化停机时间的向上扩展”方法的思考实验后，我决定再次整合我对 SQL Server 的了解，并审视关于 Docker 卷的这个说法是否合理。那么，我们来分析一下。SQL
    Server 数据库引擎会为访问数据库文件发起独占锁。它这样做是因为能够使用数据库的一部分前提是打开属于它的所有文件并执行恢复操作。如果 SQL Server
    数据库引擎对所有数据库文件都持有独占锁，那么其他进程——比如另一个 SQL Server 数据库引擎——就不可能获得对同一组数据库文件的独占访问权。Microsoft
    建议将 SQL Server 数据库文件排除在防病毒扫描之外是有原因的：就是为了确保在 SQL Server 进程需要使用这些文件时，它们没有被锁定。更别提那些绕过
    SQL Server API 在执行备份时静默数据库文件的第三方工具了。那些你以为是来保护你的工具，恰恰就是造成灾难的元凶。


    鉴于 SQL Server 进程需要对数据库文件持有独占锁，让多个 SQL Server 容器访问同一个卷是没有意义的。我重申一遍：让多个 SQL Server
    容器访问同一个卷是没有意义的。还记得图 7-8 中的错误信息吗？我希望我已经说得很清楚了。


    为 Docker 说句公道话，既然容器最初是为无状态应用程序设计的，那么让多个容器访问同一个卷的做法是完全合理的。假设你有一个所有应用程序通用的日志记录模块。该模块可以在一个容器中实现，并将日志文件写入一个可以在多个日志记录容器之间共享的卷中。由于大多数日志应用程序主要是写入密集型，读取访问非常少（除非在某个心情不佳的审计员突然要求提供详细审计报告时），将日志文件存储在单个卷中具有“单一事实来源”的好处。另外，你也不必进行那些提取-转换-加载（ETL）或提取-加载-转换（ELT）过程，因为所有数据都存储在一个地方——这个卷。


    这一点值得重申：让多个 SQL Server 容器访问同一个卷是没有意义的。

