    ## Your Docker Host’s Local Filesystem


    Once the filesystem layers required to build the image have been downloaded into
    your Docker host’s local filesystem, the Docker daemon cooks up its magic to assemble
    the pieces so you can run a container. Well, only the assembling of the pieces
    is true in that statement. But it may seem like magic when you do think about
    what is going on under the covers. Let’s have a look at the different components
    that make this magic happen.


    ### Union Filesystem


    Working with Docker containers and how they work with the filesystem require an
    understanding of *union filesystems*. A union filesystem allows you to take different
    filesystem layers and create a union of their contents, with the topmost layer
    overriding any similar files found in the layers below. The simplest way I can
    describe this without overwhelming you with the technical details is like writing
    something – like ABC – on a transparent tape. I can stick another layer of transparent
    tape on top of the existing one with a totally different writing – like DEF. I’ll
    stick another layer above the topmost layer with a different writing – like GHI.
    When I look at the layers of transparent tape from the top, what I would see is
    a single layer with the writing ABCDEFGHI, assuming you didn’t write directly
    on top of the transparent tape layer below it. From Docker’s point of view, all
    of these layers of transparent tape are what make up an image. Regardless of how
    many layers there are, there’s just one image.


    The way a union filesystem is implemented is through storage drivers. In Linux,
    the most common ones are OverlayFS and AUFS (formerly known as AnotherUnionFS
    until it was renamed to advanced multilayered unification filesystem). AUFS was
    the default storage driver in earlier versions of Docker. Newer installations
    leverage *overlay2*, which is an improved version of OverlayFS .'
  trans: '

    ### 分发哈希


    我本希望能告诉你，镜像清单中的摘要值与 `docker inspect` 命令输出的 `Layers` 部分所显示的值相同。那样我们就能通过直接查看镜像清单和
    `Layers` 部分，轻松识别出哪个摘要对应哪个层。不幸的是，事情要复杂一些。只需看一下 Linux 版 SQL Server 镜像在镜像清单中的哈希值，并将其与
    `Layers` 部分进行比较，如图 5-12 所示。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig12_HTML.jpg](img/484552_1_En_5_Fig12_HTML.jpg)


    图 5-12

    比较 Linux 版 SQL Server 镜像各层的摘要值


    这是因为当你通过网络处理文件时，会实施某种形式的文件压缩，以改善网络带宽和存储空间需求。在互联网上处理其他类型的文件时也是如此。但是，压缩文件会改变其内容，因此也会改变其内容摘要。当然，当你推送和/或拉取文件系统层时，这就会成为问题，因为内容摘要不再匹配——哈希验证会失败。


    为了解决这个问题，便生成了 `分发哈希`。分发哈希是在文件系统层被压缩后生成的。用于构建镜像的每一个文件系统层都会被压缩，并生成其分发哈希。每个文件系统层的分发哈希会被写入镜像清单。一旦分发哈希被写入镜像清单，镜像现在就可以被推送到
    Docker Hub 或其他容器注册中心了。


    当你为镜像运行 `docker inspect` 命令时，在 `Layers` 部分看到的哈希是未压缩的哈希——即文件系统层的内容摘要。同时，镜像清单的 `digest`
    字段中的哈希值则是压缩后的文件系统层的哈希——即分发哈希。鉴于内容摘要和分发哈希在清单、Docker 镜像和文件系统层方面的工作细节，图 5-13 更好地展示了图
    5-6 中所示的 Linux 版 SQL Server 镜像清单。同时，运行以下命令以显示 Linux 版 SQL Server 镜像的详细信息：


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig13_HTML.jpg](img/484552_1_En_5_Fig13_HTML.jpg)


    图 5-13

    Linux 版 SQL Server 镜像的内容摘要与分发哈希


    ```

    docker images mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    ## 你的 Docker 主机的本地文件系统


    一旦构建镜像所需的文件系统层被下载到你的 Docker 主机的本地文件系统中，Docker 守护进程就会施展它的魔法，将这些部分组装起来，以便你可以运行容器。嗯，上述说法中只有组装部分是真实的。但当你真正思考底层发生了什么时，这可能看起来像魔法。让我们来看看促成这个魔法的不同组件。


    ### 联合文件系统


    使用 Docker 容器以及它们如何与文件系统交互，需要理解 `联合文件系统`。联合文件系统允许你获取不同的文件系统层，并创建它们内容的联合体，其中最顶层会覆盖其下层中发现的任何同名文件。在不让你被技术细节淹没的情况下，我能描述它的最简单方式就像是在透明胶带上写点东西——比如
    ABC。我可以在现有的胶带上面再粘一层透明胶带，上面写上完全不同的内容——比如 DEF。我再在最上面那层上粘另一层，写上不同的内容——比如 GHI。当我从顶部看这些透明胶带层时，我看到的会是一个写有
    ABCDEFGHI 的单层，前提是你没有直接写在下层胶带上。从 Docker 的角度来看，所有这些透明胶带层就构成了一个镜像。无论有多少层，最终只有一个镜像。


    联合文件系统的实现方式是通过存储驱动程序。在 Linux 中，最常见的是 OverlayFS 和 AUFS（在更名为高级多层统一文件系统之前，曾被称为 AnotherUnionFS）。AUFS
    是早期 Docker 版本的默认存储驱动程序。较新的安装则利用 `overlay2`，这是 OverlayFS 的一个改进版本。

    '
- fmt: '### Files, Directory Names, and Symbolic Links


    Since each filesystem layer that gets pulled from Docker Hub is stored in the
    Docker host’s local filesystem, it makes sense for you to know where they are
    stored so you can examine them later on for performing administrative tasks such
    as cleaning up your drive, managing images, moving files around, and the like.
    You also need to know what the files are and how they are referenced.


    The location of the filesystem layers in the local disk depends on the storage
    driver that you are using. Run the following command on a Linux host to find the
    installed storage driver:


    ```

    docker info | grep -w ''Storage Driver:''

    ```


    Run the following command on a Windows Server host to find the installed storage
    driver:


    ```

    docker info | Select-String "Storage Driver"

    ```


    Figure [5-14](#484552_1_En_5_Chapter.xhtml#Fig14) shows the storage driver for
    Linux and Windows Server hosts, respectively.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig14_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Displaying Docker storage drivers


    On a Linux host, you can find the filesystem layers in the `/var/lib/docker/aufs`
    directory if you are using AUFS or `/var/lib/docker/overlay2` directory if you
    are using overlay2. On a Windows Server host, it’s on `C:\ProgramData\docker\windowsfilter`.
    Remember that the `C:\ProgramData` is a hidden folder so you might not see it
    through Windows Explorer unless you have it configured to display hidden items.


    Let’s explore the contents of the `/var/lib/docker/overlay2` directory on a Linux
    host. You would need `sudo` privileges to explore the `/var/lib/docker` directory
    and everything in it. Remember to prefix your commands with `sudo`. The following
    examples run as `root` to simplify the commands. I also cleaned up my Linux host
    so it only contains the SQL Server on Linux image.


    Refer to Figure [5-15](#484552_1_En_5_Chapter.xhtml#Fig15). We’ll keep using the
    `ls -l` command to list the files and directories in Linux. Inside the `overlay2`
    directory are nine directories that have 64-character hex strings as names. Each
    of them represents the filesystem layers of the SQL Server on Linux image. I also
    wish there was an easy way to correlate the directory names with the hash of the
    image layers that you get when you pull the image layers. Unfortunately, the directory
    names are neither the content digest of the uncompressed layers nor their distribution
    hash. They are based on a randomly generated “cache id” that the Docker daemon
    keeps track of where the layers’ contents are on disk. Let’s park this concept
    here for a minute and come back to it later.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig15_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Displaying /var/lib/docker/overlay2 directory


    There’s also another directory named `l` (lowercase L). This directory contains
    the shortened layer identifiers as *symbolic links* . In Linux, a symbolic link
    is a text file whose content is a path to another file or directory in the form
    of an absolute or relative path and that affects pathname resolution. Think of
    it as a shortcut in Windows. The big difference is that a symbolic link in Linux
    can act like a substitute for a directory or a file, whereas a shortcut in Windows
    is just a regular file that has a reference to a destination file or folder. Figure
    [5-16](#484552_1_En_5_Chapter.xhtml#Fig16) displays the content of the `/var/lib/docker/overlay2/l`
    directory.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig16_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Inside the /var/lib/docker/overlay2/l directory


    The 26-character symbolic link points to the path after the `->`. For example,
    the symbolic link `2YO42XXOU7E2ATZNCX7GOOKUBI` points to the `92e3c43506014db9778446e3a21d9663428302a49e4ae3f7b654acc2952249c0/diff`
    directory. So far, so good.


    But remember, these are not hashes. These are cache id values that the Docker
    daemon uses to keep track of where the layers’ contents are on disk. To find out
    which directory maps to this cache id, we need to search for this cache id value
    inside a file named `cache-id`. This file contains the directory name that contains
    the filesystem layer. And it’s inside one of the directories in `/var/lib/docker/image/overlay2/layerdb/sha256`.
    Run the following `grep` command to search for files inside the `/var/lib/docker/image/overlay2/layerdb/sha256`
    directory that contain the cache id value you’re looking for. For the symbolic
    link `2YO42XXOU7E2ATZNCX7GOOKUBI`, I’ll just use the first 12 characters of the
    directory name.


    ```

    grep -Ril "92e3c4350601"

    ```


    The following parameters are used with the `grep` command:


    *   `R`: Recursive; I want `grep` to search for the content within the files inside
    the directory and subdirectory.

    *   `i`: Ignore case.

    *   `l`: Displays the filename and not the result.


    Figure [5-17](#484552_1_En_5_Chapter.xhtml#Fig17) displays the output of the `grep`
    command. Note that the 64-character hex string directory name is now the content
    digest of the filesystem layer. You also get the file named `cache-id`.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig17_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig17_HTML.jpg)


    Figure 5-17


    The cache-id file containing the directory name of the symbolic link


    Run the following `cat` command to display the contents of this `cache-id` file.
    Be aware of the path to the file. I’m running the command from inside the `/var/lib/docker/image/overlay2/layerdb/sha256`
    directory. Figure [5-18](#484552_1_En_5_Chapter.xhtml#Fig18) shows the cache id
    value representing the directory name.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig18_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig18_HTML.jpg)


    Figure 5-18


    The cache-id value corresponding to the directory name


    ```

    cat 98fc4d5421178c7be7d5718d2d44abba8053dc5c712e51658fe5b872675b4f7a/cache-id

    ```


    Be sure to use the values that you get in your Linux host when exploring these
    directories and files. But I’ll stop right here before we end up going down the
    rabbit hole of hashes translated into cache ids and into directory names and what
    have you. For now, it’s enough to know where the filesystem layers are stored
    on disk and how the Docker daemon keeps track of where they are. If you really
    want to dig deeper on Docker’s local storage architecture, check out [*https://programmer.group/docker-learning-image-s-local-storage-architecture.html*](https://programmer.group/docker-learning-image-s-local-storage-architecture.html).


    There are a few more files to be aware of:


    *   `/var/lib/docker/image/overlay2/repositories.json`: Stores information of
    all pulled images in your local disk.

    *   `/var/lib/docker/image/overlay2/imagedb/content/sha256/<hex value>`: The filenames
    inside this directory are the image IDs of the images you pulled; they are the
    basis for when you run some of the Docker commands like `docker inspect` and `docker
    history`.

    *   `/var/lib/docker/image/overlay2/distribution/diffid-by-digest/sha256/<hex
    value>`: The filenames inside this directory are the mappings between the content
    digest and the distribution hash (based on the `docker manifest inspect` command)
    of the filesystem layers you pulled.


    There are still more of these files and directories, most of them undocumented.
    I’ll leave them for you to poke around and figure out on your own. But don’t mess
    around with them unless you know exactly what they are for.


    Note


    The names of directories can change should you decide to delete and repull all
    of the filesystem layers and images in your Docker host. What doesn’t change is
    the hash of the filesystem layers. The hashes are what make the images immutable.'
  raw: '### Files, Directory Names, and Symbolic Links


    Since each filesystem layer that gets pulled from Docker Hub is stored in the
    Docker host’s local filesystem, it makes sense for you to know where they are
    stored so you can examine them later on for performing administrative tasks such
    as cleaning up your drive, managing images, moving files around, and the like.
    You also need to know what the files are and how they are referenced.


    The location of the filesystem layers in the local disk depends on the storage
    driver that you are using. Run the following command on a Linux host to find the
    installed storage driver:


    ```

    docker info | grep -w ''Storage Driver:''

    ```


    Run the following command on a Windows Server host to find the installed storage
    driver:


    ```

    docker info | Select-String "Storage Driver"

    ```


    Figure [5-14](#484552_1_En_5_Chapter.xhtml#Fig14) shows the storage driver for
    Linux and Windows Server hosts, respectively.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig14_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Displaying Docker storage drivers


    On a Linux host, you can find the filesystem layers in the */var/lib/docker/aufs*
    directory if you are using AUFS or */var/lib/docker/overlay2* directory if you
    are using overlay2. On a Windows Server host, it’s on *C:\ProgramData\docker\windowsfilter*.
    Remember that the *C:\ProgramData* is a hidden folder so you might not see it
    through Windows Explorer unless you have it configured to display hidden items.


    Let’s explore the contents of the */var/lib/docker/overlay2* directory on a Linux
    host. You would need *sudo* privileges to explore the */var/lib/docker* directory
    and everything in it. Remember to prefix your commands with *sudo*. The following
    examples run as *root* to simplify the commands. I also cleaned up my Linux host
    so it only contains the SQL Server on Linux image.


    Refer to Figure [5-15](#484552_1_En_5_Chapter.xhtml#Fig15). We’ll keep using the
    `ls -l` command to list the files and directories in Linux. Inside the *overlay2*
    directory are nine directories that have 64-character hex strings as names. Each
    of them represents the filesystem layers of the SQL Server on Linux image. I also
    wish there was an easy way to correlate the directory names with the hash of the
    image layers that you get when you pull the image layers. Unfortunately, the directory
    names are neither the content digest of the uncompressed layers nor their distribution
    hash. They are based on a randomly generated “cache id” that the Docker daemon
    keeps track of where the layers’ contents are on disk. Let’s park this concept
    here for a minute and come back to it later.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig15_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Displaying /var/lib/docker/overlay2 directory


    There’s also another directory named *l* (lowercase L). This directory contains
    the shortened layer identifiers as *symbolic links* . In Linux, a symbolic link
    is a text file whose content is a path to another file or directory in the form
    of an absolute or relative path and that affects pathname resolution. Think of
    it as a shortcut in Windows. The big difference is that a symbolic link in Linux
    can act like a substitute for a directory or a file, whereas a shortcut in Windows
    is just a regular file that has a reference to a destination file or folder. Figure
    [5-16](#484552_1_En_5_Chapter.xhtml#Fig16) displays the content of the */var/lib/docker/overlay2/l*
    directory.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig16_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Inside the /var/lib/docker/overlay2/l directory


    The 26-character symbolic link points to the path after the ->. For example, the
    symbolic link 2YO42XXOU7E2ATZNCX7GOOKUBI points to the *92e3c43506014db9778446e3a21d9663428302a49e4ae3f7b654acc2952249c0/diff*
    directory. So far, so good.


    But remember, these are not hashes. These are cache id values that the Docker
    daemon uses to keep track of where the layers’ contents are on disk. To find out
    which directory maps to this cache id, we need to search for this cache id value
    inside a file named *cache-id*. This file contains the directory name that contains
    the filesystem layer. And it’s inside one of the directories in */var/lib/docker/image/overlay2/layerdb/sha256*.
    Run the following *grep* command to search for files inside the */var/lib/docker/image/overlay2/layerdb/sha256*
    directory that contain the cache id value you’re looking for. For the symbolic
    link 2YO42XXOU7E2ATZNCX7GOOKUBI, I’ll just use the first 12 characters of the
    directory name.


    ```

    grep -Ril "92e3c4350601"

    ```


    The following parameters are used with the *grep* command:


    *   *R*: Recursive; I want *grep* to search for the content within the files inside
    the directory and subdirectory.


    *   *i*: Ignore case.


    *   *l*: Displays the filename and not the result.


    Figure [5-17](#484552_1_En_5_Chapter.xhtml#Fig17) displays the output of the *grep*
    command. Note that the 64-character hex string directory name is now the content
    digest of the filesystem layer. You also get the file named *cache-id*.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig17_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig17_HTML.jpg)


    Figure 5-17


    The cache-id file containing the directory name of the symbolic link


    Run the following *cat* command to display the contents of this *cache-id* file.
    Be aware of the path to the file. I’m running the command from inside the */var/lib/docker/image/overlay2/layerdb/sha256*
    directory. Figure [5-18](#484552_1_En_5_Chapter.xhtml#Fig18) shows the cache id
    value representing the directory name.


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig18_HTML.jpg](images/484552_1_En_5_Chapter/484552_1_En_5_Fig18_HTML.jpg)


    Figure 5-18


    The cache-id value corresponding to the directory name


    ```

    cat 98fc4d5421178c7be7d5718d2d44abba8053dc5c712e51658fe5b872675b4f7a/cache-id

    ```


    Be sure to use the values that you get in your Linux host when exploring these
    directories and files. But I’ll stop right here before we end up going down the
    rabbit hole of hashes translated into cache ids and into directory names and what
    have you. For now, it’s enough to know where the filesystem layers are stored
    on disk and how the Docker daemon keeps track of where they are. If you really
    want to dig deeper on Docker’s local storage architecture, check out [*https://programmer.group/docker-learning-image-s-local-storage-architecture.html*](https://programmer.group/docker-learning-image-s-local-storage-architecture.html).


    There are a few more files to be aware of:


    *   */var/lib/docker/image/overlay2/repositories.json*: Stores information of
    all pulled images in your local disk.


    *   */var/lib/docker/image/overlay2/imagedb/content/sha256/<hex value>*: The filenames
    inside this directory are the image IDs of the images you pulled; they are the
    basis for when you run some of the Docker commands like *docker inspect* and *docker
    history*.


    *   */var/lib/docker/image/overlay2/distribution/diffid-by-digest/sha256/<hex
    value>*: The filenames inside this directory are the mappings between the content
    digest and the distribution hash (based on the *docker manifest inspect* command)
    of the filesystem layers you pulled.


    There are still more of these files and directories, most of them undocumented.
    I’ll leave them for you to poke around and figure out on your own. But don’t mess
    around with them unless you know exactly what they are for.


    Note


    The names of directories can change should you decide to delete and repull all
    of the filesystem layers and images in your Docker host. What doesn’t change is
    the hash of the filesystem layers. The hashes are what make the images immutable.'
  trans: '

    ### 文件、目录名称与符号链接


    由于从 Docker Hub 拉取的每个文件系统层都存储在 Docker 主机的本地文件系统中，了解它们的存储位置对你来说就很有意义，以便日后检查它们来执行管理任务，例如清理磁盘、管理镜像、移动文件等。你还需要了解这些文件是什么以及它们是如何被引用的。


    文件系统层在本地磁盘上的位置取决于你所使用的存储驱动。在 Linux 主机上运行以下命令以查找已安装的存储驱动：


    ```

    docker info | grep -w ''Storage Driver:''

    ```


    在 Windows Server 主机上运行以下命令以查找已安装的存储驱动：


    ```

    docker info | Select-String "Storage Driver"

    ```


    图 5-14 分别展示了 Linux 和 Windows Server 主机的存储驱动。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig14_HTML.jpg](img/484552_1_En_5_Fig14_HTML.jpg)


    图 5-14


    显示 Docker 存储驱动


    在 Linux 主机上，如果你使用的是 AUFS，可以在 `/var/lib/docker/aufs` 目录找到文件系统层；如果你使用的是 overlay2，则在
    `/var/lib/docker/overlay2` 目录。在 Windows Server 主机上，它位于 `C:\ProgramData\docker\windowsfilter`。请记住，`C:\ProgramData`
    是一个隐藏文件夹，因此除非你配置了 Windows 资源管理器显示隐藏项目，否则可能看不到它。


    让我们来探索一下 Linux 主机上的 `/var/lib/docker/overlay2` 目录内容。你需要 `sudo` 权限才能浏览 `/var/lib/docker`
    目录及其下的所有内容。记得在命令前加上 `sudo`。为了简化命令，以下示例均以 `root` 用户运行。我还清理了我的 Linux 主机，因此它只包含 SQL
    Server on Linux 镜像。


    参考图 5-15。我们将继续使用 `ls -l` 命令来列出 Linux 中的文件和目录。在 `overlay2` 目录内是九个以 64 个字符的十六进制字符串命名的目录。每个目录都代表
    SQL Server on Linux 镜像的文件系统层。我也希望有一种简单的方法可以将这些目录名与你拉取镜像层时得到的镜像层哈希值关联起来。不幸的是，这些目录名既不是未压缩层的内容摘要，也不是它们的分发哈希值。它们基于一个随机生成的“缓存
    ID”，Docker 守护进程用它来跟踪层内容在磁盘上的位置。让我们先把这个概念放一放，稍后再回来讨论。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig15_HTML.jpg](img/484552_1_En_5_Fig15_HTML.jpg)


    图 5-15


    显示 /var/lib/docker/overlay2 目录


    还有另一个名为 `l`（小写 L）的目录。该目录包含作为*符号链接*的缩短的层标识符。在 Linux 中，符号链接是一个文本文件，其内容是指向另一个文件或目录的路径（以绝对路径或相对路径形式），并且会影响路径名解析。可以将其视为
    Windows 中的快捷方式。最大的区别在于，Linux 中的符号链接可以充当目录或文件的替代品，而 Windows 中的快捷方式只是一个普通文件，它包含对目标文件或文件夹的引用。图
    5-16 展示了 `/var/lib/docker/overlay2/l` 目录的内容。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig16_HTML.jpg](img/484552_1_En_5_Fig16_HTML.jpg)


    图 5-16


    /var/lib/docker/overlay2/l 目录内部


    这个 26 个字符的符号链接指向 `->` 之后的路径。例如，符号链接 `2YO42XXOU7E2ATZNCX7GOOKUBI` 指向 `92e3c43506014db9778446e3a21d9663428302a49e4ae3f7b654acc2952249c0/diff`
    目录。到目前为止，一切顺利。


    但请记住，这些不是哈希值。这些是 Docker 守护进程用来跟踪层内容在磁盘上位置的缓存 ID 值。要找出哪个目录映射到这个缓存 ID，我们需要在一个名为
    `cache-id` 的文件中搜索这个缓存 ID 值。该文件包含存有文件系统层的目录名。而它位于 `/var/lib/docker/image/overlay2/layerdb/sha256`
    目录下的其中一个子目录中。运行以下 `grep` 命令来搜索 `/var/lib/docker/image/overlay2/layerdb/sha256`
    目录中包含你查找的缓存 ID 值的文件。对于符号链接 `2YO42XXOU7E2ATZNCX7GOOKUBI`，我将仅使用目录名的前 12 个字符。


    ```

    grep -Ril "92e3c4350601"

    ```


    以下参数与 `grep` 命令一起使用：


    *   `R`：递归；我希望 `grep` 搜索目录及子目录内文件中的内容。

    *   `i`：忽略大小写。

    *   `l`：只显示文件名，而不是匹配结果。


    图 5-17 展示了 `grep` 命令的输出。请注意，64 个字符的十六进制字符串目录名现在变成了文件系统层的内容摘要。你还得到了名为 `cache-id`
    的文件。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig17_HTML.jpg](img/484552_1_En_5_Fig17_HTML.jpg)


    图 5-17


    包含符号链接目录名的 cache-id 文件


    运行以下 `cat` 命令以显示此 `cache-id` 文件的内容。请注意文件的路径。我是从 `/var/lib/docker/image/overlay2/layerdb/sha256`
    目录内部运行该命令的。图 5-18 展示了代表目录名的缓存 ID 值。


    ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig18_HTML.jpg](img/484552_1_En_5_Fig18_HTML.jpg)


    图 5-18


    对应于目录名的 cache-id 值


    ```

    cat 98fc4d5421178c7be7d5718d2d44abba8053dc5c712e51658fe5b872675b4f7a/cache-id

    ```


    在探索这些目录和文件时，请务必使用你在 Linux 主机上获得的值。但在我们最终深入探究哈希值如何转换为缓存 ID、再转换为目录名等问题之前，我就此打住。目前，知道文件系统层在磁盘上的存储位置以及
    Docker 守护进程如何跟踪它们的位置就足够了。如果你真想深入了解 Docker 的本地存储架构，请查阅 [*https://programmer.group/docker-learning-image-s-local-storage-architecture.html*](https://programmer.group/docker-learning-image-s-local-storage-architecture.html)。


    还有一些其他文件需要了解：


    *   `/var/lib/docker/image/overlay2/repositories.json`：存储本地磁盘上所有已拉取镜像的信息。

    *   `/var/lib/docker/image/overlay2/imagedb/content/sha256/<hex value>`：此目录内的文件名是你拉取的镜像的镜像
    ID；它们是运行某些 Docker 命令（如 `docker inspect` 和 `docker history`）时的基础。

    *   `/var/lib/docker/image/overlay2/distribution/diffid-by-digest/sha256/<hex
    value>`：此目录内的文件名是文件系统层的内容摘要和分发哈希值（基于 `docker manifest inspect` 命令）之间的映射。


    还有更多这样的文件和目录，其中大部分都未文档化。我将它们留给你自己去探索和研究。除非你确切知道它们的用途，否则不要随意改动它们。


    注意


    如果你决定删除并重新拉取 Docker 主机中的所有文件系统层和镜像，目录的名称可能会改变。不会改变的是文件系统层的哈希值。正是这些哈希值使得镜像具有不可变性。

