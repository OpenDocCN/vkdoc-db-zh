    docker pull docker.io/microsoft/mssql-server-linux:latest

    ```


    你也可以通过 Microsoft 容器注册表 (MCR) 下载镜像：


    ```

    docker pull mcr.microsoft.com/mssql/server:latest

    ```


    鉴于这是 Microsoft 专用的公共注册表，并且他们有多个产品以 Docker 镜像形式提供，此时仓库名称代表的是产品名称（本例中是 `mssql`），而不是软件供应商的名称。


    **注意**


    因为 Docker Hub 是公共容器注册表的先驱，几乎所有软件供应商都将其镜像和文档放在其门户网站上。它已经成为获取 Docker 镜像的首选公共容器注册表——Docker
    Hub 同时托管元数据和镜像本身。随着软件供应商开始创建 Docker 源代码的分支并制作他们自己的版本，他们也创建了自己的公共容器注册表。为了避免任何破坏性变更并仍然提供无缝的用户体验，大多数软件供应商利用联合发布模型来保持
    Docker Hub 上内容的更新。这正是 Microsoft 对 MCR 所做的。MCR 托管所有 Microsoft 镜像，并将元数据联合发布到 Docker
    Hub。每当 Microsoft 添加或更新 Windows 或 Linux 上的 SQL Server 镜像时，他们都会将元数据联合发布到 Docker
    Hub。当你从 Docker Hub 拉取 SQL Server 镜像时，你会被重定向到 MCR 获取镜像文件。遗憾的是，MCR 没有像 Docker Hub
    那样的门户网站体验。因此，你仍然需要 Docker Hub 来搜索 Microsoft 镜像。你可以在本文博客中阅读有关 MCR 创建的更多信息：[`https://azure.microsoft.com/en-ca/blog/microsoft-syndicates-container-catalog/`](https://azure.microsoft.com/en-ca/blog/microsoft-syndicates-container-catalog/)


    概念就讲这么多。了解了 Docker 生态系统中不同组件的工作原理后，是时候看看它们在实际中的表现了——以 SQL Server DBA 的风格。


    ## 在 Windows 容器上运行 SQL Server


    有两种方式可以运行 Docker 容器：


    1.  先使用 `docker pull` 命令拉取镜像，然后使用 `docker run` 命令运行它。

    2.  直接使用 `docker run` 命令。如果镜像在本地文件系统中不存在，docker 守护进程会隐式地先拉取镜像然后再运行。


    运行以下命令，在你的 Windows Docker 主机上拉取并运行带有 `latest` 标签的 `Windows 上的 SQL Server 2017
    开发者版` 镜像。去拿点零食吧，因为拉取和运行的过程需要一些时间。


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevwincon01 -d -h winsqldev01 microsoft/mssql-server-windows-developer

    ```


    现在，这个 `docker run` 命令比我们本章开始时使用的 “hello world” 镜像要复杂一些。真正的乐趣从这里开始。


    `docker run` 命令使用了以下参数。这些参数与你用于 Linux 服务器主机时相同：


    *   `-e`: 设置所需的环境变量；这些变量特定于 SQL Server。`ACCEPT_EULA` 和 `SA_PASSWORD` 参数不言自明。我相信你每次安装
    SQL Server 时都阅读了 EULA（最终用户许可协议）。

    *   `-p`: 使用此格式 `ip:hostPort:containerPort` 将容器的 TCP 端口（或端口范围）发布到主机。这允许你从远程客户端连接到容器中的
    SQL Server 实例，将主机上的 1433 端口映射到容器上的 1433 端口。

    *   `--name`: 一个唯一的自定义名称，用于帮助识别容器，而不是系统生成的名称。这使你在执行额外任务时能轻松识别容器。

    *   `-d`: 在分离模式（后台进程）下运行容器并打印容器 ID。这意味着在运行 `docker run` 命令后，容器仍在后台运行。使用此参数是因为
    SQL Server 作为服务运行。没有此参数，容器将会运行，完成其任务后退出。

    *   `-h`: 你希望分配给容器的服务器主机名。将 `-h` 和 `--name` 参数设置为相同的值，可以更容易地识别容器。


    图 4-12 展示了在你的 Windows Server 主机上运行 `docker run` 命令的结果。


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig12_HTML.jpg](img/484552_1_En_4_Fig12_HTML.jpg)

    *图 4-12. 拉取并运行 Windows 上的 SQL Server 容器*


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig13_HTML.jpg](img/484552_1_En_4_Fig13_HTML.jpg)

    *图 4-13. 拉取并运行 Linux 上的 SQL Server 容器*


    稍后你会明白为什么拉取镜像会花费一些时间。

    '
- fmt: '## Running SQL Server on Linux Containers


    Run the following command to pull and run a `SQL Server 2017 Developer Edition
    with CU14 on Ubuntu Linux` image on your Linux Docker host. We’ll also use the
    MCR for the public container registry since only the image with the `latest` tag
    is available on Docker Hub. Don’t worry, you can run this on either an Ubuntu
    or CentOS Linux Docker host. And you don’t have to wait as long as when you pulled
    the SQL Server on Windows image. Figure [4-13](#484552_1_En_4_Chapter.xhtml#Fig13)
    shows the result of running the `docker run` command on your Linux Docker host.


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevlinuxcon01 -d -h linuxsqldev01 mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

    ```


    **Note**


    In [Chapter 3](#484552_1_En_3_Chapter.xhtml), I talk about the security implications
    of adding users to the `docker` group. That’s because the Docker daemon runs as
    `root`. This means any container you run on your Docker host has `root` privileges,
    not only inside the container but also on the host machine. Anyone who can maliciously
    gain access to the container will have no problems exploiting the Docker host.
    I did say this is scary. Unfortunately, running the Docker daemon as a non-root
    user (also called the `rootless` mode) is still an experimental feature. You wouldn’t
    want to use an experimental feature on a production environment. Microsoft had
    to work with this limitation, and deployment of SQL Server on Linux containers
    were done using `root`. SQL Server 2019 changed that and allowed running a SQL
    Server on Linux container as a non-root user. I’ll cover how to build and run
    a SQL Server on Linux container as either `root` or non-root user in [Chapter
    10](#484552_1_En_10_Chapter.xhtml).


    ## Beginning to Explore Containers and Images


    So, you pulled and ran the SQL Server on container images. You didn’t see any
    error message. Or maybe you did. If you want to start exploring the images you
    pulled, run the `docker images` command. This will give you an idea as to why
    the SQL Server on Windows image took ages to pull compared to the SQL Server on
    Linux image, the same reason why Docker’s version of `hello world` took longer
    to run on Windows than it did on Linux. Figure [4-14](#484552_1_En_4_Chapter.xhtml#Fig14)
    may shock you – it shows the results of the `docker images` command on both my
    Windows Server host and Linux Server host.


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig14_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig14_HTML.jpg)


    Figure 4-14: Comparing SQL Server on Windows vs. SQL Server on Linux images


    Just because you didn’t see any error message when you ran a container doesn’t
    mean everything is fine. To find the status of all the running containers, run
    the `docker ps` command. Figure [4-15](#484552_1_En_4_Chapter.xhtml#Fig15) shows
    the currently running containers on my Windows Server and Linux server hosts.


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig15_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig15_HTML.jpg)


    Figure 4-15: Docker containers currently running


    The `STATUS` column tells you whether your container is currently running. If
    the container you just ran doesn’t appear in this list and you didn’t get any
    error message, it could mean that it ran for a while and got terminated afterward.
    A container that has been terminated could mean that the job it was supposed to
    do has already been completed (like the `hello-world` container) or that a fatal
    error occurred inside the container that forced it to stop. It’s important to
    know what the container does so you know what to expect from it.


    Running the `docker ps -a` command displays all containers – whether running or
    terminated. Figure [4-16](#484552_1_En_4_Chapter.xhtml#Fig16) shows a list of
    all the containers I ran, including the `hello-world` containers that have terminated
    – those with `STATUS` value of Exited (0).


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig16_HTML.jpg](images/484552_1_En_4_Chapter/484552_1_En_4_Fig16_HTML.jpg)


    Figure 4-16: Displaying all Docker containers – both currently running and terminated


    You’ll be running these two commands a lot as you work with containers. But we’re
    barely scratching the surface here. [Chapter 6](#484552_1_En_6_Chapter.xhtml)
    will cover variations of using these commands to perform basic container administration.'
