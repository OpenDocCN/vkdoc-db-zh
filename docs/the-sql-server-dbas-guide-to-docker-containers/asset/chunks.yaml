  trans: '### 添加 Docker 官方 GPG 密钥


    在安装前验证软件包的完整性是确保其确实为开发者原始分发版本的方法之一。您当然不希望下载到被恶意修改并重新分发的文件。当然，这假设开发者已对软件包进行签名并提供了公钥。


    大多数 Linux 软件包通过验证其 GPG 密钥来确认完整性。Docker 创建了他们自己的 GPG 密钥，用于签名其软件包，因此您可以在安装前验证其完整性。


    使用以下 `curl` 命令将 Docker 官方 GPG 密钥下载并添加到 Ubuntu 系统中：


    ```

    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -

    ```


    通过管道操作符，`curl` 命令的输出被传递给 `apt-key` 命令，以将下载的密钥添加到系统的受信任密钥列表中。


    您直接接受该密钥而不验证其是否确实来自 Docker 原始密钥是没有意义的。这就是指纹发挥作用的地方。Docker 在其文档中提供了指纹，以便您使用下载的密钥进行验证：


    ```

    9DC8 5822 9FC7 DD38 854A E2D8 8D81 803C 0EBF CD88

    ```


    您可以使用以下 `apt-key` 命令验证指纹，传入不带空格的指纹值。图 3-8 显示了您传递的指纹所匹配的密钥。


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig8_HTML.jpg](img/484552_1_En_3_Fig8_HTML.jpg)


    图 3-8：显示 Docker GPG 密钥指纹


    ```

    sudo apt-key finger 9DC858229FC7DD38854AE2D88D81803C0EBFCD88

    ```


    ### 将 Docker 稳定仓库添加到您的系统


    与 CentOS 类似，您需要将 Docker 稳定仓库添加到您的 Ubuntu 系统中。使用以下 `add-apt-repository` 命令执行此操作。命令中附加了
    `-cs` 参数的 `lsb_release` 命令会显示包含代号短格式的 Linux 标准基（LSB）信息。在本例的 Ubuntu 发行版中，它是 `xenial`。


    ```

    sudo add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu
    $(lsb_release -cs) stable"

    ```


    此命令会将信息添加到 `/etc/apt/sources.list` 文件中。您可以通过使用以下 `cat` 命令显示 `/etc/apt/sources.list`
    的内容来验证这一点。图 3-9 显示了用于 Ubuntu 的 Docker CE 软件包仓库的 URL 源。


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig9_HTML.jpg](img/484552_1_En_3_Fig9_HTML.jpg)


    图 3-9：已添加到 /etc/apt/sources.list 的 Docker CE 仓库


    ```

    sudo cat /etc/apt/sources.list

    ```


    由于您通过安装额外的软件包并添加 Docker CE 仓库对 Ubuntu 系统进行了修改，因此您需要重新运行 `apt-get update` 命令：


    ```

    sudo apt-get update

    ```


    现在，您已准备好安装 Docker CE 软件包。


    ### 安装 Docker CE


    CentOS 使用 `yum install` 下载并安装 Docker CE 软件包，而 Ubuntu 使用 `apt-get install`。


    ```

    sudo apt-get install docker-ce

    ```


    出现提示时输入 `y` 继续。就像在 CentOS 上安装 Docker CE 一样，其他软件包依赖项将与 `docker` 一起安装，包括 `docker-ce-cli`
    和 `containerd.io`，如图 3-10 所示。


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig10_HTML.jpg](img/484552_1_En_3_Fig10_HTML.jpg)


    图 3-10：安装 Docker 时的依赖软件包列表


    与 CentOS 不同，您无需手动配置 Docker 守护进程以在服务器启动时启动和启用。这作为安装过程的一部分已为您完成。


    ### 验证 Docker 引擎安装


    现在 Docker CE 已安装在您的 Linux 机器上，其操作与任何操作系统基本相同。Docker 命令行界面和 Docker 命令在所有平台上都是相同的。您可以运行以下命令检查服务器上安装的
    Docker 版本：


    ```

    sudo docker version

    ```


    图 3-11 显示了该命令在 Ubuntu 机器和 CentOS 机器上的并排输出，显示了 Docker 客户端和 Docker 引擎的版本。我使用了命令
    `cat /etc/os-release | grep PRETTY_NAME` 来显示 Linux 发行版的友好名称。如您所见，版本是相同的。


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig11_HTML.jpg](img/484552_1_En_3_Fig11_HTML.jpg)


    图 3-11：显示 Docker 客户端和 Docker 引擎的版本


    不要在 Linux 上不加 `sudo` 运行 `docker` 命令。通常，从 Windows 平台转来的管理员会将他们的实践和思维方式带入 Linux
    世界。然后他们疑惑为什么某些东西不工作。不带 `sudo` 运行 `docker version` 将返回错误消息，如图 3-12 所示。


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig12_HTML.jpg](img/484552_1_En_3_Fig12_HTML.jpg)


    图 3-12：不带 sudo 运行 Docker 命令


    您肯定不想最终像这样排查一个自认为的安装问题，花费数小时试图找出问题所在，结果却发现只是没有使用提升的权限运行命令。


    运行以下命令以显示有关服务器上 Docker 安装的系统级信息。图 3-13 显示了该命令的输出。显然，Linux 系统提供的信息比 Windows 系统多得多。


    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig13_HTML.jpg](img/484552_1_En_3_Fig13_HTML.jpg)


    图 3-13：显示 Docker 安装的系统级信息


    ```

    sudo docker info

    ```


    您现在拥有一个在 Linux 上运行的、功能齐全的 Docker 容器主机。对于一个刚刚开始使用 Linux 的人来说，这已经很不错了。'
- fmt: '## Getting Rid of sudo?


    Old habits die hard (no, this is not the title of the next Bruce Willis movie).
    Having worked with Windows for most of my career, I still forget to use `sudo`
    every time I run a command on Linux. And I’m sure you will, too. Remember the
    error message in Figure [3-12](#484552_1_En_3_Chapter.xhtml#Fig12)? It can be
    annoying. However, it is a good security practice to avoid logging in using `root`
    and always use `sudo` in every command you run.

    But since you’re still getting started with Linux, I’ll give you a temporary pass
    to work around this subtle annoyance. No, I’m not going to let you get away with
    logging in as `root` – that’s a deadly sin in my book. I’ll only allow you to
    run `docker` commands without `sudo` – for now.


    **Note**

    The reason why you need to run `docker` commands with `sudo` is because the docker
    daemon binds to a Unix socket instead of a TCP/IP port (Unix sockets make interprocess
    communications within the same machine much faster by eliminating some checks
    and operations – like routing – that TCP/IP uses). By default, the `root` user
    owns that Unix socket, and the only way that other users can access it is by using
    `sudo`. This is why the docker daemon always runs as `root`.


    To run `docker` commands without `sudo` , you need to:

    1.  Create a group named `docker`

    2.  Add your user account to it


    When the docker daemon starts, members of the `docker` group will have access
    to the Unix socket. It’s like the old `SQLServerMSSQLUser$instancename` local
    Windows group in older versions of SQL Server – members of this group have access
    to the SQL Server service.


    Run the following `groupadd` command to create a group named `docker`:

    ```

    sudo groupadd docker

    ```

    You’ll get a message like the one in Figure [3-14](#484552_1_En_3_Chapter.xhtml#Fig14)
    if the `docker` group already exists.

    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig14_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig14_HTML.jpg)

    Figure 3-14 Creating the group named docker


    If that’s the case, proceed to add your user account to the `docker` group. Run
    the following `usermod` command to do so:

    ```

    sudo usermod -aG docker $USER

    ```

    The `-a` parameter is used to append (or add) a user to a group (the `G` parameter
    following). The `$USER` environment variable is for the currently logged on user
    (that’s you).

    Just like in Windows, you must log out and log back in for the changes to take
    effect. You can then rerun the `docker version` and `docker info` commands without
    having to use `sudo`. Figure [3-15](#484552_1_En_3_Chapter.xhtml#Fig15) shows
    the output of running the `docker info` command using the user account that I
    added to the `docker` group.

    ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig15_HTML.jpg](images/484552_1_En_3_Chapter/484552_1_En_3_Fig15_HTML.jpg)

    Figure 3-15 Running docker commands without sudo


    **Caution**

    Be warned – security is a serious matter and I don’t take it lightly. Only trusted
    users such as administrators should be added to the `docker` group. Any member
    of this group has permissions to control the docker daemon. This means adding
    someone to this group is equivalent to giving them permanent, non-password-protected
    `root` access. This is more dangerous than the permissions of the `SQLServerMSSQLUser$instancename`
    local Windows group because it has `root` access. Scary, isn’t it?

    Be sure to read the documentation on Docker security, particularly the section
    on `Docker daemon attack surface` at [https://docs.docker.com/engine/security/security/](https://docs.docker.com/engine/security/security/).

    And don’t forget to document all users added to this group so you can keep track
    of who the members are.


    ## Summary


    This chapter walked you through the process of installing and configuring a CentOS
    and Ubuntu Linux as a Docker container host. It also introduced you to some of
    the basic Linux commands that you need to get started working with Linux and install
    Docker. The next chapter will be all about the Docker ecosystem, the different
    components that make it work and how they all work together.


    # 4. The Docker Ecosystem


    > *Interdependence is and ought to be as much the ideal of man as self-sufficiency.*

    >

    > —Mahatma Gandhi


    I’ve always been fascinated by airplanes. When I was a kid, I wanted to become
    a pilot and travel around the world. Maybe it’s the excitement of traveling to
    a new place or the challenge of figuring out how a complex system works. Or maybe
    it was both.

    While I was waiting to board my flight on the Thanksgiving of 2008, I couldn’t
    help but wonder how complex the whole flight travel experience is. If you’ve been
    on a commercial flight before, you know what I’m talking about. When you check
    in to the counter, the airline agent will hand you a boarding pass and tag your
    luggage so it reaches your final destination. Your boarding pass has details of
    the flight – the gate information, your seat assignment, boarding and departure
    times, passenger details, and the like. A gate will be assigned to the plane for
    passengers to go to and board the flight. As you are getting ready to board, the
    gate attendant will check your identity based on your boarding pass. As the plane
    is about to leave the gate, the pilot will check their flight data plan and verify
    if it is in accordance with the air traffic controller instructions. If everything
    goes according to plan, the flight leaves the gate and heads off to its destination
    (one of the ground crew was kind enough to share this information as we were passing
    time waiting for our delayed flight).

    Every complex system is composed of different parts working together. If you’re
    just a consumer of a product or service (like that of a flight), it’s fine not
    knowing the intricate details of how it works. You only need to know enough on
    how to properly use it. But if you will be responsible for delivering even a part
    of that product or service, you owe it to yourself and the people using it to
    understand how it works, specifically your part.

    The goal of this chapter is to get you acquainted with the complex system that
    is Docker. To achieve this goal, I will introduce you to the different components
    that make up the entire ecosystem while, at the same time, introducing the most
    common commands that you need to start working with Docker. So, be ready for a
    more keyboard-banging approach to learning.


    **Note**

    The sample commands covered in this chapter will be shown in either a Windows
    PowerShell command shell or a Linux secure shell – CentOS or Ubuntu – without
    the inclusion of the `sudo` command (refer to the section on “Getting Rid of sudo?”
    in Chapter [3](#484552_1_En_3_Chapter.xhtml)). This is to illustrate the interoperability
    of the `docker` command. But this doesn’t mean I’m giving you the permission to
    ignore the security practices of running commands on both Windows Server and Linux
    server operating systems. Remember, only the `docker` commands will run without
    `sudo` on Linux. All the other commands that require elevated privileges will
    still require `sudo`.'
