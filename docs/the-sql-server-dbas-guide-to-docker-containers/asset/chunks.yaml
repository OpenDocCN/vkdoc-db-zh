- fmt: '# Build the Custom SQL Server on Linux Image


    ### The VOLUME Instruction


    The `VOLUME` instruction creates a mountpoint with the specified name inside the
    container and marks it as holding externally mounted volumes. The format of the
    `VOLUME` instruction is shown in the following:


    ```dockerfile

    VOLUME /var/opt/mssql/data

    ```


    The mountpoints are dynamically generated when you first run a container from
    the image because there is no guarantee that the volume will be available on the
    Docker host where you intend to run the container on. And because of the nature
    of Docker containers being portable, the Docker volumes created during runtime
    will have a GUID-like name inside `/var/lib/docker/volumes` directory on the host
    – you cannot specify a meaningful name. These Docker volumes are called `anonymous`
    volumes because Docker decides where to store the files and directories. And it
    can be difficult to access the volume over time. Anonymous volumes are not commonly
    used nowadays given that we already have named volumes. Review the “Docker Volumes”
    section in Chapter 7 on how to configure volumes for use with SQL Server on containers.
    Figure 10-2 shows the name of the Docker volume created when you run a container
    from an image that has a `VOLUME` instruction.


    ![Figure 10-2: Example of the name of a Docker volume created with the VOLUME
    instruction](images/484552_1_En_10_Chapter/484552_1_En_10_Fig2_HTML.jpg)


    ### The USER Instruction


    Back in SQL Server 2017, the `USER` instruction wasn’t really meaningful given
    that the publicly available SQL Server on Linux images were configured to run
    as `root`. Given that `root` can do anything, running containers as `root` means
    anyone who can maliciously access containers can further exploit the host. We
    don’t want that for security reasons. Hence, we want to run containers as a user
    with limited privileges.


    The `USER` instruction sets the username (or UID) and optionally the user group
    (or GID) to use when running the container. But in order to do so, the custom
    image needs to have instructions that restrict execution of either the `CMD` or
    `ENTRYPOINT` instructions. The format of the `USER` instruction is shown in the
    following:


    ```dockerfile

    USER mssql

    ```


    We’ll explore this in more detail later in this chapter. For now, let’s start
    building a custom SQL Server on Linux image.


    We will save our `Dockerfile` in the `/tmp/dockerBuild` directory of the Linux
    Docker host. But before we create the `Dockerfile`, let’s first define the steps
    to install and configure a SQL Server 2017 instance in a CentOS Linux image:


    1.  Start from the publicly available CentOS Linux 7.6.1810. Keep in mind that
    CentOS is not a supported Linux distribution. I’m merely using this as an example
    for building development environments. If you want to deploy a SQL Server on Linux
    container in production, your base Linux image should be one of the supported
    distributions – Red Hat Enterprise Linux, SUSE, or Ubuntu.

    2.  Create a `repo` file containing the location of the SQL Server 2017 installation
    packages.

    3.  Install the SQL Server 2017 packages.

    4.  Configure SQL Server 2017 on Linux.

    5.  Set working directory for running the SQL Server process.

    6.  Run the SQL Server process.


    Step 4 will contain additional details as we go through creating the `Dockerfile`.
    What’s important is we have a high-level overview of what we need to do to create
    our custom SQL Server on Linux image. Let’s translate the six steps outlined earlier
    into a `Dockerfile`. I’ll use the item numbers as steps and identify them in the
    comments. I’ve also excluded `LABEL` instructions for brevity, but make sure you
    include them in every `Dockerfile` you create:


    ```dockerfile

    #Step 1

    FROM centos:7.6.1810

    #Step 2

    RUN curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    #Step 3

    RUN yum install -y mssql-server

    #Step 4

    #Create the /var/opt/mssql/data directory to store the databases

    RUN mkdir -p /var/opt/mssql/data

    #Recursively change permissions of directories and files inside

    # /var/opt/mssql and /etc/pwd from user to group

    RUN chmod -R g=u /var/opt/mssql /etc/passwd

    #Tell user what port this container will use

    EXPOSE 1433

    #Step 5

    ENV PATH=${PATH}:/opt/mssql/bin

    #Step 6

    CMD sqlservr

    ```


    The corresponding `Dockerfile` to use an Ubuntu Linux 16.04 base image is shown
    in the following. It will give you a few hints as to why I prefer RHEL/CentOS
    over Ubuntu. Refer to the steps to install the required dependencies in Ubuntu
    in Chapter 3 and SQL Server on Ubuntu in Chapter 8. I’ve included them as Steps
    1a and 1b:


    ```dockerfile

    #Step 1

    FROM ubuntu:16.04

    #Step 1a–install Ubuntu packages needed for installing SQL Server

    RUN apt-get update && apt-get install -y curl apt-utils apt-transport-https software-properties-common

    #Step 1b-download and install public GPG keys for SQL Server

    RUN curl https://packages.microsoft.com/keys/microsoft.asc | apt-key add -

    #Step 2

    RUN add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    RUN apt-get update

    #Step 3

    RUN apt-get install -y mssql-server

    #Step 4

    RUN mkdir -p /var/opt/mssql/data

    RUN chmod -R g=u /var/opt/mssql /etc/passwd

    EXPOSE 1433

    #Step 5

    ENV PATH=${PATH}:/opt/mssql/bin

    #Step 6

    CMD sqlservr

    ```


    Replace Step 2 with the appropriate `repo` file if you want to install SQL Server
    2019. Build the custom image using the following `docker build` command:


    ```bash

    docker build -t customsql2017centoslinux:v1.0 .

    ```


    Didn’t I say I prefer working with SQL Server on Linux images? That’s because
    they take less time to build and consume less storage space. Figure 10-3 shows
    the size of this custom SQL Server on Linux image – 1.3+GB compared to the 17.9GB
    SQL Server on Windows image created in the previous chapter. And look at the sizes
    of the CentOS Linux 7.6.1810 and Ubuntu Linux 16.04 base images.


    ![Figure 10-3: Size of the custom SQL Server on Linux image](images/484552_1_En_10_Chapter/484552_1_En_10_Fig3_HTML.jpg)


    Pretty straightforward, don’t you think? We can build on this by adding the configuration
    settings we’ve made in Chapter 8 such as enabling the SQL Server Agent, setting
    trace flags, and so on as additional instructions in Step 4. We don’t need to
    change the default locations for the database and backup files because we can
    run a container and mount the `/var/opt/mssql` directory to a Docker volume. Also,
    configuring the firewall won’t be necessary, Docker will work its magic to update
    `iptables` when you run the container. The only thing we need to worry about is
    setting trace flags during startup – and only if you need to. We can replace Step
    6 with an `ENTRYPOINT` instruction instead of a `CMD` instruction and pass SQL
    Server startup parameters as part of the `docker run` command.


    Let’s look at several ways to tweak our custom SQL Server on Linux image by changing
    the `Dockerfile`. I’ll only introduce specific changes to the steps so you can
    play around with these changes as you see fit.'
  raw: '### The VOLUME Instruction


    The *VOLUME* instruction creates a mountpoint with the specified name inside the
    container and marks it as holding externally mounted volumes. The format of the
    *VOLUME* instruction is shown in the following:


    ```

    VOLUME /var/opt/mssql/data

    ```


    The mountpoints are dynamically generated when you first run a container from
    the image because there is no guarantee that the volume will be available on the
    Docker host where you intend to run the container on. And because of the nature
    of Docker containers being portable, the Docker volumes created during runtime
    will have a GUID-like name inside */var/lib/docker/volumes* directory on the host –
    you cannot specify a meaningful name. These Docker volumes are called *anonymous*
    volumes because Docker decides where to store the files and directories. And it
    can be difficult to access the volume over time. Anonymous volumes are not commonly
    used nowadays given that we already have named volumes. Review the “Docker Volumes”
    section in *Chapter* [*7*](#484552_1_En_7_Chapter.xhtml) on how to configure volumes
    for use with SQL Server on containers. Figure [10-2](#484552_1_En_10_Chapter.xhtml#Fig2)
    shows the name of the Docker volume created when you run a container from an image
    that has a *VOLUME* instruction.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig2_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Example of the name of a Docker volume created with the VOLUME instruction


    ### The USER Instruction


    Back in SQL Server 2017, the *USER* instruction wasn’t really meaningful given
    that the publicly available SQL Server on Linux images were configured to run
    as *root*. Given that *root* can do anything, running containers as *root* means
    anyone who can maliciously access containers can further exploit the host. We
    don’t want that for security reasons. Hence, we want to run containers as a user
    with limited privileges.


    The *USER* instruction sets the username (or UID) and optionally the user group
    (or GID) to use when running the container. But in order to do so, the custom
    image needs to have instructions that restrict execution of either the *CMD* or
    *ENTRYPOINT* instructions. The format of the *USER* instruction is shown in the
    following:


    ```

    USER mssql

    ```


    We’ll explore this in more detail later in this chapter. For now, let’s start
    building a custom SQL Server on Linux image.


    ## Build the Custom SQL Server on Linux Image


    We will save our *Dockerfile* in the */tmp/dockerBuild* directory of the Linux
    Docker host. But before we create the *Dockerfile*, let’s first define the steps
    to install and configure a SQL Server 2017 instance in a CentOS Linux image:


    1.  Start from the publicly available CentOS Linux 7.6.1810\. Keep in mind that
    CentOS is not a supported Linux distribution. I’m merely using this as an example
    for building development environments. If you want to deploy a SQL Server on Linux
    container in production, your base Linux image should be one of the supported
    distributions – Red Hat Enterprise Linux, SUSE, or Ubuntu.


    2.  Create a *repo* file containing the location of the SQL Server 2017 installation
    packages.


    3.  Install the SQL Server 2017 packages.


    4.  Configure SQL Server 2017 on Linux.


    5.  Set working directory for running the SQL Server process.


    6.  Run the SQL Server process.


    Step 4 will contain additional details as we go through creating the *Dockerfile*.
    What’s important is we have a high-level overview of what we need to do to create
    our custom SQL Server on Linux image. Let’s translate the six steps outlined earlier
    into a *Dockerfile*. I’ll use the item numbers as steps and identify them in the
    comments. I’ve also excluded *LABEL* instructions for brevity, but make sure you
    include them in every *Dockerfile* you create:


    ```

    #Step 1

    FROM centos:7.6.1810

    #Step 2

    RUN curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    #Step 3

    RUN yum install -y mssql-server

    #Step 4

    #Create the /var/opt/mssql/data directory to store the databases

    RUN mkdir -p /var/opt/mssql/data

    #Recursively change permissions of directories and files inside

    # /var/opt/mssql and /etc/pwd from user to group

    RUN chmod -R g=u /var/opt/mssql /etc/passwd

    #Tell user what port this container will use

    EXPOSE 1433

    #Step 5

    ENV PATH=${PATH}:/opt/mssql/bin

    #Step 6

    CMD sqlservr

    ```


    The corresponding *Dockerfile* to use an Ubuntu Linux 16.04 base image is shown
    in the following. It will give you a few hints as to why I prefer RHEL/CentOS
    over Ubuntu. Refer to the steps to install the required dependencies in Ubuntu
    in *Chapter* [*3*](#484552_1_En_3_Chapter.xhtml) and SQL Server on Ubuntu in *Chapter*
    [*8*](#484552_1_En_8_Chapter.xhtml). I’ve included them as Steps 1a and 1b:


    ```

    #Step 1

    FROM ubuntu:16.04

    #Step 1a–install Ubuntu packages needed for installing SQL Server

    RUN apt-get update && apt-get install -y curl apt-utils apt-transport-https software-properties-common

    #Step 1b-download and install public GPG keys for SQL Server

    RUN curl https://packages.microsoft.com/keys/microsoft.asc | apt-key add -

    #Step 2

    RUN add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    RUN apt-get update

    #Step 3

    RUN apt-get install -y mssql-server

    #Step 4

    RUN mkdir -p /var/opt/mssql/data

    RUN chmod -R g=u /var/opt/mssql /etc/passwd

    EXPOSE 1433

    #Step 5

    ENV PATH=${PATH}:/opt/mssql/bin

    #Step 6

    CMD sqlservr

    ```


    Replace Step 2 with the appropriate *repo* file if you want to install SQL Server
    2019\. Build the custom image using the following docker build command:


    ```

    docker build -t customsql2017centoslinux:v1.0 .

    ```


    Didn’t I say I prefer working with SQL Server on Linux images? That’s because
    they take less time to build and consume less storage space. Figure [10-3](#484552_1_En_10_Chapter.xhtml#Fig3)
    shows the size of this custom SQL Server on Linux image – 1.3+GB compared to the
    17.9GB SQL Server on Windows image created in the previous chapter. And look at
    the sizes of the CentOS Linux 7.6.1810 and Ubuntu Linux 16.04 base images.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig3_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Size of the custom SQL Server on Linux image


    Pretty straightforward, don’t you think? We can build on this by adding the configuration
    settings we’ve made in Chapter [8](#484552_1_En_8_Chapter.xhtml) such as enabling
    the SQL Server Agent, setting trace flags, and so on as additional instructions
    in Step 4\. We don’t need to change the default locations for the database and
    backup files because we can run a container and mount the */var/opt/mssql* directory
    to a Docker volume. Also, configuring the firewall won’t be necessary, Docker
    will work its magic to update *iptables* when you run the container. The only
    thing we need to worry about is setting trace flags during startup – and only
    if you need to. We can replace Step 6 with an *ENTRYPOINT* instruction instead
    of a *CMD* instruction and pass SQL Server startup parameters as part of the *docker
    run* command.


    Let’s look at several ways to tweak our custom SQL Server on Linux image by changing
    the *Dockerfile*. I’ll only introduce specific changes to the steps so you can
    play around with these changes as you see fit.'
  trans: '# 构建自定义的 Linux 版 SQL Server 镜像


    ### VOLUME 指令


    `VOLUME` 指令在容器内创建一个指定名称的挂载点，并将其标记为保存外部挂载的卷。`VOLUME` 指令的格式如下所示：


    ```dockerfile

    VOLUME /var/opt/mssql/data

    ``


    这些挂载点是在你首次从镜像运行容器时动态生成的，因为无法保证在你打算运行容器的 Docker 主机上该卷一定是可用的。并且，由于 Docker 容器具有可移植性的特点，运行时创建的
    Docker 卷在宿主机的 `/var/lib/docker/volumes` 目录下会有一个类似 GUID 的名称——你无法指定一个有意义的名称。这些 Docker
    卷被称为 `anonymous` 卷，因为由 Docker 决定文件和目录的存储位置。随着时间的推移，访问该卷可能会变得困难。鉴于我们已经有了命名卷，匿名卷如今已不常用。回顾第
    7 章的“Docker 卷”部分，了解如何配置供容器上的 SQL Server 使用的卷。图 10-2 显示了当你从一个包含 `VOLUME` 指令的镜像运行容器时创建的
    Docker 卷的名称。


    ![图 10-2：使用 VOLUME 指令创建的 Docker 卷名称示例](img/484552_1_En_10_Fig2_HTML.jpg)


    ### USER 指令


    回到 SQL Server 2017，`USER` 指令其实并没有太大意义，因为当时公开可用的 Linux 版 SQL Server 镜像被配置为以 `root`
    身份运行。鉴于 `root` 用户可以执行任何操作，以 `root` 身份运行容器意味着任何能够恶意访问容器的人都可以进一步入侵主机。出于安全原因，我们不希望发生这种情况。因此，我们希望以权限受限的用户身份运行容器。


    `USER` 指令设置运行容器时使用的用户名（或 UID），以及可选的用户组（或 GID）。但为了实现这一点，自定义镜像需要有限制 `CMD` 或 `ENTRYPOINT`
    指令执行的指令。`USER` 指令的格式如下所示：


    ```dockerfile

    USER mssql

    ``


    我们将在本章后面更详细地探讨这一点。现在，让我们开始构建自定义的 Linux 版 SQL Server 镜像。


    我们将把 `Dockerfile` 保存在 Linux Docker 主机的 `/tmp/dockerBuild` 目录中。但在创建 `Dockerfile`
    之前，让我们先定义在 CentOS Linux 镜像中安装和配置 SQL Server 2017 实例的步骤：


    1.  从公开可用的 CentOS Linux 7.6.1810 开始。请记住，CentOS 并非受支持的 Linux 发行版。我仅仅是将其用作构建开发环境的示例。如果你想在生产环境中部署
    Linux 版 SQL Server 容器，你的基础 Linux 镜像应选择受支持的发行版之一——Red Hat Enterprise Linux、SUSE
    或 Ubuntu。

    2.  创建一个包含 SQL Server 2017 安装包位置的 `repo` 文件。

    3.  安装 SQL Server 2017 包。

    4.  配置 Linux 上的 SQL Server 2017。

    5.  为运行 SQL Server 进程设置工作目录。

    6.  运行 SQL Server 进程。


    在创建 `Dockerfile` 的过程中，第 4 步将包含更多细节。重要的是，我们对创建自定义 Linux 版 SQL Server 镜像需要做的事情有了一个高层概览。让我们将前面概述的六个步骤转化为一个
    `Dockerfile`。我将使用项目编号作为步骤，并在注释中加以标识。为简洁起见，我省略了 `LABEL` 指令，但请确保在你创建的每个 `Dockerfile`
    中都包含它们：


    ```dockerfile

    #Step 1

    FROM centos:7.6.1810

    #Step 2

    RUN curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    #Step 3

    RUN yum install -y mssql-server

    #Step 4

    #创建 /var/opt/mssql/data 目录以存储数据库

    RUN mkdir -p /var/opt/mssql/data

    #递归更改 /var/opt/mssql 和 /etc/pwd 内部目录和文件的权限

    #从用户权限更改为组权限

    RUN chmod -R g=u /var/opt/mssql /etc/passwd

    #告知用户此容器将使用的端口

    EXPOSE 1433

    #Step 5

    ENV PATH=${PATH}:/opt/mssql/bin

    #Step 6

    CMD sqlservr

    ```


    以下展示了使用 Ubuntu Linux 16.04 基础镜像的相应 `Dockerfile`。它会给你一些提示，说明为什么我更喜欢 RHEL/CentOS
    而不是 Ubuntu。参考第 3 章在 Ubuntu 中安装所需依赖项的步骤以及第 8 章在 Ubuntu 上安装 SQL Server 的步骤。我将它们列为步骤
    1a 和 1b：


    ```dockerfile

    #Step 1

    FROM ubuntu:16.04

    #Step 1a–安装安装 SQL Server 所需的 Ubuntu 软件包

    RUN apt-get update && apt-get install -y curl apt-utils apt-transport-https software-properties-common

    #Step 1b-下载并安装 SQL Server 的公共 GPG 密钥

    RUN curl https://packages.microsoft.com/keys/microsoft.asc | apt-key add -

    #Step 2

    RUN add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    RUN apt-get update

    #Step 3

    RUN apt-get install -y mssql-server

    #Step 4

    RUN mkdir -p /var/opt/mssql/data

    RUN chmod -R g=u /var/opt/mssql /etc/passwd

    EXPOSE 1433

    #Step 5

    ENV PATH=${PATH}:/opt/mssql/bin

    #Step 6

    CMD sqlservr

    ```


    如果你想安装 SQL Server 2019，请将第 2 步替换为相应的 `repo` 文件。使用以下 `docker build` 命令构建自定义镜像：


    ```bash

    docker build -t customsql2017centoslinux:v1.0 .

    ```


    我是不是说过我更喜欢使用 Linux 版 SQL Server 镜像？那是因为它们构建所需时间更短，占用的存储空间也更少。图 10-3 显示了这个自定义 Linux
    版 SQL Server 镜像的大小——1.3+GB，而前一章创建的 Windows 版 SQL Server 镜像则为 17.9GB。看看 CentOS
    Linux 7.6.1810 和 Ubuntu Linux 16.04 基础镜像的大小。


    ![图 10-3：自定义 Linux 版 SQL Server 镜像的大小](img/484552_1_En_10_Fig3_HTML.jpg)


    相当直接，不是吗？我们可以在此基础上，添加第 8 章中所做的配置设置作为第 4 步的额外指令，例如启用 SQL Server Agent、设置跟踪标志等。我们不需要更改数据库和备份文件的默认位置，因为我们可以运行一个容器并将
    `/var/opt/mssql` 目录挂载到一个 Docker 卷。此外，配置防火墙也不是必需的，当你运行容器时，Docker 会自动更新 `iptables`。我们唯一需要担心的是在启动时设置跟踪标志——而且只有在你确实需要时才这样做。我们可以用
    `ENTRYPOINT` 指令替换第 6 步的 `CMD` 指令，并将 SQL Server 启动参数作为 `docker run` 命令的一部分传递。


    让我们看看通过更改 `Dockerfile` 来调整我们的自定义 Linux 版 SQL Server 镜像的几种方法。我只会介绍对特定步骤的更改，以便你可以根据自己的需要随意尝试这些更改。'
- fmt: '### Installing a Specific SQL Server Version


    If you noticed, we have been installing the latest version of SQL Server that
    we wanted – including the latest update (CU19 for SQL Server 2017 and CU1 for
    SQL Server 2019 at the time of writing). While it is highly recommended to always
    keep your SQL Server installations updated, you may need a specific version because
    that’s the one you’ve tested with your applications. Let’s say you want to install
    SQL Server 2017 CU14 because the standardized image that you want to build needs
    this specific version. You certainly don’t want to create a custom SQL Server
    on Linux image that contains anything higher than CU14. You can modify Step 3
    to install a specific package that refers to the version of SQL Server that you
    want to install. You can check the specific SQL Server 2017 package from [https://packages.microsoft.com/rhel/7/mssql-server-2017/](https://packages.microsoft.com/rhel/7/mssql-server-2017/)
    (for RHEL and CentOS 7) or [https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017/pool/main/m/mssql-server/](https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017/pool/main/m/mssql-server/)
    (for Ubuntu 16.04). Or you can run the following command to list all the available
    packages:


    ```

    yum --showduplicates list mssql-server #for RHEL/CentOS

    apt -a list mssql-server #for Ubuntu

    ```


    The results of this command will depend on the `repo` file you defined in Step
    2. Figure 10-4 displays all the packages available for SQL Server 2017 on RHEL.


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig4_HTML.jpg](images/484552_1_En_10_Chapter/484552_1_En_10_Fig4_HTML.jpg)


    Figure 10-4: Different packages for SQL Server 2017 on RHEL


    You can use the following command to install SQL Server 2017 CU14:


    ```

    sudo yum install -y mssql-server-14.0.3076.1-2 #for RHEL/CentOS

    sudo apt-get install -y mssql-server=14.0.3076.1-2 #for Ubuntu

    ```


    All you have to do now is to replace Step 3 in the `Dockerfile` with the following
    command, replacing the appropriate package management command for the Linux distro
    that you’re working with:


    ```

    #Step 3

    RUN yum install -y mssql-server-14.0.3076.1-2 #for RHEL/CentOS

    RUN apt-get install -y mssql-server=14.0.3076.1-2 #for Ubuntu

    ```


    ### Creating a Custom Image That Runs As Non-root


    I attended a presentation on Kubernetes Architecture by Microsoft MVP Anthony
    Nocentino at the 2019 PASS Summit because it’s the only way I’m 100% sure I can
    catch up with him in a conference this big. Most communications nowadays happen
    virtually – through email, instant messaging, social media, phone, or conference
    calls. But nothing beats face to face. Call me old school but face-to-face communication
    is how we build quality relationships. And I do my best to catch up with family,
    friends, and acquaintances face to face whenever I have an opportunity to do so.


    As he wrapped up his presentation for Q&A, somebody from the audience approached
    him and apologized for why his demos failed. She said she’d been going around
    and attending Docker-related sessions focused on Linux and talking to the speakers
    as to why their demos failed. She happened to be a developer from the SQL Server
    team, and she takes care of updating the SQL Server 2019 on Linux Docker image.
    And since SQL Server 2019 was officially released during the week of the PASS
    Summit, they also released all the updated SQL Server 2019 on Linux Docker images
    with the changes they introduced: running non-`root` containers.


    As I’ve already mentioned repeatedly in the earlier chapters, running containers
    as `root` poses security risks. Keeping with the principle of least privilege,
    we can create a custom SQL Server on Linux image that runs as non-`root`. The
    publicly available SQL Server 2017 on Linux images were all created with the assumption
    that the container will be running as `root`. As SQL Server 2019 was released,
    Microsoft also released a `Dockerfile` that contains modifications to the existing
    public images so they can run containers as a non-`root` user. Have a look at
    the `Dockerfile` here: [https://github.com/microsoft/mssql-docker/blob/master/linux/preview/examples/mssql-server-linux-non-root/Dockerfile](https://github.com/microsoft/mssql-docker/blob/master/linux/preview/examples/mssql-server-linux-non-root/Dockerfile).
    We’ll explore the additional instructions and what they do. Refer to the `Dockerfile`
    for the line numbers.


    **Line 10**: `RUN useradd -M -s /bin/bash -u 10001 -g 0 mssql`


    This instruction runs the `useradd` command to add a new user named `mssql` to
    the existing SQL Server 2017 on Linux image. The `-M` parameter will skip creating
    a home directory for the new user. The `-s` parameter specifies using the `/bin/bash`
    as the login shell for the user. The `-u` parameter specifies the users UID value
    – 10001 – while the `-g` parameter specifies the GID value, 0. Keep in mind that
    this user is created inside the container, not the host.


    **Tip**


    In my testing with SQL Server 2019 (and SQL Server 2017 on Ubuntu), this instruction
    can cause the image build process to fail – but not so with SQL Server 2017 on
    RHEL/CentOS which I find weird. Part of the SQL Server on Linux installation process
    is the creation of a user and group named `mssql`. The `UID` and `username` values
    must be unique. Since the `mssql` user already exists, albeit with a different
    UID, the command fails. Adding a user that already exists will throw an error
    and cause the image build process to fail. Test accordingly. You can exclude this
    line when creating a custom SQL Server 2019 on Linux (or SQL Server 2017 on Ubuntu)
    image. However, doing so would mean accepting the `mssql` user with a different
    UID value (999) that gets created during the installation process. This UID value
    may already exist on your Linux Docker host and can cause confusion as to who
    is really running the container. Refer to Figure 10-10. Another option is to name
    it something else but use the 10001 UID value.


    **Line 11**: `RUN mkdir -p -m 770 /var/opt/mssql && chgrp -R 0 /var/opt/mssql`'
