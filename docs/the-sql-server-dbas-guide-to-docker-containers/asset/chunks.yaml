    ## 探索 Docker Hub


    我确实提到过，如果你打算使用特定的 Docker 镜像，Docker Hub 是你的第一站。但是，在你运行 Docker 版的“hello world”的输出中，你并没有看到网页浏览器打开、在
    Docker Hub 上搜索 `hello-world` 镜像并发起拉取操作。此外，Linux 上没有图形用户界面。那么，你如何探索 Docker Hub
    上有哪些可用的镜像呢？使用 `docker search` 命令，并为其传递适当的搜索词和参数。例如，如果你想在 Docker Hub 上搜索所有名称包含“microsoft”的镜像，可以运行以下命令，如图
    4-7 所示：


    ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig7_HTML.jpg](img/484552_1_En_4_Fig7_HTML.jpg)


    图 4-7


