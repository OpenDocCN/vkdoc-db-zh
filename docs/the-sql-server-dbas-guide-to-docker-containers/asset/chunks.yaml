- fmt: "# Protect the Docker Daemon Socket by Configuring Mutual TLS Encryption\n\n\
    Now that the Docker daemon is available on your network, it’s your responsibility\
    \ to protect it from unsecure connections. The good thing is that the Docker daemon\
    \ only allows connections from clients authenticated by a certificate signed by\
    \ a trusted certificate authority (CA). In the same way, the Docker CLI client\
    \ only connects to Docker daemons with a certificate signed by the trusted CA.\
    \ If you’ve configured SQL Server database mirroring with certificates in the\
    \ past, the process is very similar. For this example, instead of using a certificate\
    \ from a trusted public CA, we will create our own. It’s not something that you\
    \ would do on a production environment, but it does get the job done.\n\nThis\
    \ process walks you through configuring mutual TLS encryption for a Docker daemon.\
    \ On the CentOS Linux Docker host\n\n1.  Create a temporary directory to store\
    \ the CA private and public keys. This directory will be referred to later to\
    \ point to the location of the certificates.\n\n    ```\n    mkdir /tmp/dockerTLS\n\
    \    cd /tmp/dockerTLS\n    ```\n\n2.  Run the following `openssl` command to\
    \ create the CA private key. When prompted, provide the passphrase for the private\
    \ key.\n\n    ```\n    openssl genrsa -aes256 -out ca-key.pem 4096\n    ```\n\n\
    3.  Run the following `openssl` command to create the CA public key. When prompted,\
    \ provide details to identify the public key. Figure [6-4](#484552_1_En_6_Chapter.xhtml#Fig4)\
    \ provides an example of this. For the `Common Name` field, be sure to provide\
    \ the hostname that you use to connect to your Docker daemon and can be resolved\
    \ in the network. In this example, the fully qualified domain name (FQDN) of my\
    \ CentOS Linux Docker host is `CENTOSDOCKER01.TESTDOMAIN.COM`.\n\n    ```\n  \
    \  openssl req -new -x509 -days 365 -key ca-key.pem -sha256 -out ca.pem\n    ```\n\
    \n    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig4_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig4_HTML.jpg)\n\
    \    Figure 6-4 Details for the CA public key\n\n4.  Run the following `openssl`\
    \ command to create the server key:\n\n    ```\n    openssl genrsa -out server-key.pem\
    \ 4096\n    ```\n\n5.  Run the following `openssl` command to create the certificate\
    \ signing request. Be sure that the `Common Name` value matches the Docker daemon’s\
    \ hostname that you provided in Step #3.\n\n    ```\n    openssl req -subj \"\
    /CN=CENTOSDOCKER01.TESTDOMAIN.COM\" -sha256 -new -key server-key.pem -out server.csr\n\
    \    ```\n\n6.  Run the following command to create an extensions configuration\
    \ file. Since TLS connections can be made through IP address as well as FQDN,\
    \ the IP addresses need to be specified when creating the certificate. The extensions\
    \ configuration file will contain the FQDN of the Linux Docker host, its IP address,\
    \ and the loopback IP address so you can still connect to the Docker daemon locally\
    \ via a TCP port.\n\n    ```\n    echo subjectAltName = DNS:CENTOSDOCKER01.TESTDOMAIN.COM,IP:172.28.106.158,IP:127.0.0.1\
    \ >> extfile.cnf\n    ```\n\n7.  Run the following command to append the extensions\
    \ configuration file and add the extended usage attributes so that the Docker\
    \ daemon’s key can only be used for server authentication:\n\n    ```\n    echo\
    \ extendedKeyUsage = serverAuth >> extfile.cnf\n    ```\n\n8.  Run the following\
    \ `openssl` command to sign the public key with the CA and pass it the extensions\
    \ configuration file:\n\n    ```\n    openssl x509 -req -days 365 -sha256 -in\
    \ server.csr -CA ca.pem -CAkey ca-key.pem -CAcreateserial -out server-cert.pem\
    \ -extfile extfile.cnf\n    ```\n\nYou should have the following files in the\
    \ `/tmp/dockerTLS` directory as shown in Figure [6-5](#484552_1_En_6_Chapter.xhtml#Fig5).\n\
    \n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig5_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig5_HTML.jpg)\n\
    Figure 6-5 Files created after completing all the steps\n\nNow we’re ready to\
    \ work on the Docker CLI client. For this example, the Docker CLI client is also\
    \ running on a CentOS Linux machine named `CENTOSDOCKERCLIENT`.\n\nOn the CentOS\
    \ Docker client machine\n\n1.  Create a temporary directory to store the CA private\
    \ and public keys. This directory will be referred to later to point to the location\
    \ of the certificates.\n\n    ```\n    mkdir /tmp/dockerTLS\n    cd /tmp/dockerTLS\n\
    \    ```\n\n2.  Run the following `openssl` command to create the client key:\n\
    \n    ```\n    openssl genrsa -out key.pem 4096\n    ```\n\n3.  Run the following\
    \ `openssl` command to create the certificate signing request:\n\n    ```\n  \
    \  openssl req -subj '/CN=client' -new -key key.pem -out client.csr\n    ```\n\
    \n4.  Run the following command to create an extensions configuration file to\
    \ make the client key suitable for client authentication:\n\n    ```\n    echo\
    \ extendedKeyUsage = clientAuth > extfile-client.cnf\n    ```\n\n5.  Copy the\
    \ `ca.pem` and `ca-key.pem` files that you generated on the Docker daemon’s host\
    \ machine to the `/tmp/dockerTLS` directory on the client machine. You can use\
    \ WinSCP or the `scp` command on Linux to do so. You should have the following\
    \ files in the `/tmp/dockerTLS` directory as shown in Figure [6-6](#484552_1_En_6_Chapter.xhtml#Fig6).\
    \ Don’t proceed to the next step unless you have all the files available.\n\n\
    \    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig6_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig6_HTML.jpg)\n\
    \    Figure 6-6 Files created after completing all the steps\n\n6.  Run the following\
    \ `openssl` command to generate the signed certificate, passing the public key,\
    \ private key, and the extensions configuration file. When prompted, provide the\
    \ passphrase for the CA private key.\n\n    ```\n    openssl x509 -req -days 365\
    \ -sha256 -in client.csr -CA ca.pem -CAkey ca-key.pem -CAcreateserial -out cert.pem\
    \ -extfile extfile-client.cnf\n    ```\n\nWe now have all the files that we need\
    \ to establish mutual TLS encryption between the Docker CLI client and the remote\
    \ Docker daemon. But we’re not done yet.\n\n## Update the daemon.json to Include\
    \ the Settings for Mutual TLS Encryption\n\nWe have to tell the Docker daemon\
    \ to enforce encrypted and authenticated remote connections. The following configuration\
    \ options will be added to the `daemon.json` file :\n\n*   `tlsverify`: A value\
    \ of `true` enforces encrypted and authenticated remote connections.\n*   `tlscacert`:\
    \ The Docker daemon will only trust certificates signed by this CA.\n*   `tlscert`:\
    \ The path to TLS certificate file.\n*   `tlskey`: The path to TLS key file.\n\
    \nAdd the following content to the `daemon.json` file and save it. Note the path\
    \ of the files you generated on the Docker host.\n\n```\n\"tlscacert\": \"/tmp/dockerTLS/ca.pem\"\
    ,\n\"tlscert\": \"/tmp/dockerTLS/server-cert.pem\",\n\"tlskey\": \"/tmp/dockerTLS/server-key.pem\"\
    ,\n\"tlsverify\": true\n```\n\nAfter updating the `daemon.json` file, restart\
    \ the Docker daemon:\n\n```\nsudo systemctl restart docker\n```\n\n## Enable Firewall\
    \ Port to Allow Traffic to Docker Daemon\n\nYou didn’t need to worry about the\
    \ firewall when you were connecting to the Docker daemon locally using the Docker\
    \ CLI client. That’s because you were already logged in on the machine via SSH\
    \ (on port 22) and running commands locally. Enabling remote access to the Docker\
    \ daemon means you need to open port 2376 on the Linux firewall.\n\nRun the following\
    \ command to enable the firewall to allow remote connections on port 2376. By\
    \ default, FirewallD is the firewall solution available on CentOS Linux.\n\n```\n\
    sudo firewall-cmd --zone=public --add-port=2376/tcp --permanent\n```\n\nRun the\
    \ following command to reload the new firewall rule added:\n\n```\nsudo firewall-cmd\
    \ --reload\n```\n\nAfter enabling the firewall port, use TELNET to test connectivity\
    \ to port 2376."
  raw: "### Protect the Docker Daemon Socket by Configuring Mutual TLS Encryption\n\
    \nNow that the Docker daemon is available on your network, it’s your responsibility\
    \ to protect it from unsecure connections. The good thing is that the Docker daemon\
    \ only allows connections from clients authenticated by a certificate signed by\
    \ a trusted certificate authority (CA). In the same way, the Docker CLI client\
    \ only connects to Docker daemons with a certificate signed by the trusted CA.\
    \ If you’ve configured SQL Server database mirroring with certificates in the\
    \ past, the process is very similar. For this example, instead of using a certificate\
    \ from a trusted public CA, we will create our own. It’s not something that you\
    \ would do on a production environment, but it does get the job done.\n\nThis\
    \ process walks you through configuring mutual TLS encryption for a Docker daemon.\
    \ On the CentOS Linux Docker host\n\n1.  Create a temporary directory to store\
    \ the CA private and public keys. This directory will be referred to later to\
    \ point to the location of the certificates.\n\n```\n    mkdir /tmp/dockerTLS\n\
    \    cd /tmp/dockerTLS\n    ```\n\n2.  Run the following *openssl* command to\
    \ create the CA private key. When prompted, provide the passphrase for the private\
    \ key.\n\n```\n    openssl genrsa -aes256 -out ca-key.pem 4096\n    ```\n\n3.\
    \  Run the following *openssl* command to create the CA public key. When prompted,\
    \ provide details to identify the public key. Figure [6-4](#484552_1_En_6_Chapter.xhtml#Fig4)\
    \ provides an example of this. For the *Common Name* field, be sure to provide\
    \ the hostname that you use to connect to your Docker daemon and can be resolved\
    \ in the network. In this example, the fully qualified domain name (FQDN) of my\
    \ CentOS Linux Docker host is *CENTOSDOCKER01.TESTDOMAIN.COM*.\n\n```\n    openssl\
    \ req -new -x509 -days 365 -key ca-key.pem -sha256 -out ca.pem\n    ```\n\n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig4_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4\n\nDetails for the CA public key\n\n4.  Run the following *openssl*\
    \ command to create the server key:\n\n```\n    openssl genrsa -out server-key.pem\
    \ 4096\n    ```\n\n5.  Run the following *openssl* command to create the certificate\
    \ signing request. Be sure that the *Common Name* value matches the Docker daemon’s\
    \ hostname that you provided in Step #3.\n\n```\n    openssl req -subj \"/CN=CENTOSDOCKER01.TESTDOMAIN.COM\"\
    \ -sha256 -new -key server-key.pem -out server.csr\n    ```\n\n6.  Run the following\
    \ command to create an extensions configuration file. Since TLS connections can\
    \ be made through IP address as well as FQDN, the IP addresses need to be specified\
    \ when creating the certificate. The extensions configuration file will contain\
    \ the FQDN of the Linux Docker host, its IP address, and the loopback IP address\
    \ so you can still connect to the Docker daemon locally via a TCP port.\n\n```\n\
    \    echo subjectAltName = DNS:CENTOSDOCKER01.TESTDOMAIN.COM,IP:172.28.106.158,IP:127.0.0.1\
    \ >> extfile.cnf\n    ```\n\n7.  Run the following command to append the extensions\
    \ configuration file and add the extended usage attributes so that the Docker\
    \ daemon’s key can only be used for server authentication:\n\n```\n    echo extendedKeyUsage\
    \ = serverAuth >> extfile.cnf\n    ```\n\n8.  Run the following *openssl* command\
    \ to sign the public key with the CA and pass it the extensions configuration\
    \ file:\n\n```\n    openssl x509 -req -days 365 -sha256 -in server.csr -CA ca.pem\
    \ -CAkey ca-key.pem -CAcreateserial -out server-cert.pem -extfile extfile.cnf\n\
    \    ```\n\nYou should have the following files in the */tmp/dockerTLS* directory\
    \ as shown in Figure [6-5](#484552_1_En_6_Chapter.xhtml#Fig5).\n\n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig5_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5\n\nFiles created after completing all the steps\n\nNow we’re ready\
    \ to work on the Docker CLI client. For this example, the Docker CLI client is\
    \ also running on a CentOS Linux machine named *CENTOSDOCKERCLIENT*.\n\nOn the\
    \ CentOS Docker client machine\n\n1.  Create a temporary directory to store the\
    \ CA private and public keys. This directory will be referred to later to point\
    \ to the location of the certificates.\n\n```\n    mkdir /tmp/dockerTLS\n    cd\
    \ /tmp/dockerTLS\n    ```\n\n2.  Run the following *openssl* command to create\
    \ the client key:\n\n```\n    openssl genrsa -out key.pem 4096\n    ```\n\n3.\
    \  Run the following *openssl* command to create the certificate signing request:\n\
    \n```\n    openssl req -subj '/CN=client' -new -key key.pem -out client.csr\n\
    \    ```\n\n4.  Run the following command to create an extensions configuration\
    \ file to make the client key suitable for client authentication:\n\n```\n   \
    \ echo extendedKeyUsage = clientAuth > extfile-client.cnf\n    ```\n\n5.  Copy\
    \ the *ca.pem* and *ca-key.pem* files that you generated on the Docker daemon’s\
    \ host machine to the */tmp/dockerTLS* directory on the client machine. You can\
    \ use WinSCP or the *scp* command on Linux to do so. You should have the following\
    \ files in the */tmp/dockerTLS* directory as shown in Figure [6-6](#484552_1_En_6_Chapter.xhtml#Fig6).\
    \ Don’t proceed to the next step unless you have all the files available.\n\n\
    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig6_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6\n\nFiles created after completing all the steps\n\n6.  Run the following\
    \ *openssl* command to generate the signed certificate, passing the public key,\
    \ private key, and the extensions configuration file. When prompted, provide the\
    \ passphrase for the CA private key.\n\n```\n    openssl x509 -req -days 365 -sha256\
    \ -in client.csr -CA ca.pem -CAkey ca-key.pem -CAcreateserial -out cert.pem -extfile\
    \ extfile-client.cnf\n    ```\n\nWe now have all the files that we need to establish\
    \ mutual TLS encryption between the Docker CLI client and the remote Docker daemon.\
    \ But we’re not done yet.\n\n### Update the daemon.json to Include the Settings\
    \ for Mutual TLS Encryption\n\nWe have to tell the Docker daemon to enforce encrypted\
    \ and authenticated remote connections. The following configuration options will\
    \ be added to the *daemon.json* file :\n\n*   *tlsverify*: A value of *true* enforces\
    \ encrypted and authenticated remote connections.\n\n*   *tlscacert*: The Docker\
    \ daemon will only trust certificates signed by this CA.\n\n*   *tlscert*: The\
    \ path to TLS certificate file.\n\n*   *tlskey*: The path to TLS key file.\n\n\
    Add the following content to the *daemon.json* file and save it. Note the path\
    \ of the files you generated on the Docker host.\n\n```\n\"tlscacert\": \"/tmp/dockerTLS/ca.pem\"\
    ,\n\"tlscert\": \"/tmp/dockerTLS/server-cert.pem\",\n\"tlskey\": \"/tmp/dockerTLS/server-key.pem\"\
    ,\n\"tlsverify\": true\n```\n\nAfter updating the *daemon.json* file, restart\
    \ the Docker daemon:\n\n```\nsudo systemctl restart docker\n```\n\n### Enable\
    \ Firewall Port to Allow Traffic to Docker Daemon\n\nYou didn’t need to worry\
    \ about the firewall when you were connecting to the Docker daemon locally using\
    \ the Docker CLI client. That’s because you were already logged in on the machine\
    \ via SSH (on port 22) and running commands locally. Enabling remote access to\
    \ the Docker daemon means you need to open port 2376 on the Linux firewall.\n\n\
    Run the following command to enable the firewall to allow remote connections on\
    \ port 2376\\. By default, FirewallD is the firewall solution available on CentOS\
    \ Linux.\n\n```\nsudo firewall-cmd --zone=public --add-port=2376/tcp --permanent\n\
    ```\n\nRun the following command to reload the new firewall rule added:\n\n```\n\
    sudo firewall-cmd --reload\n```\n\nAfter enabling the firewall port, use TELNET\
    \ to test connectivity to port 2376."
  trans: "\n# 通过配置双向 TLS 加密来保护 Docker 守护进程套接字\n\n既然 Docker 守护进程已在您的网络上可用，保护其免受不安全连接的影响便是您的责任。好消息是，Docker\
    \ 守护进程只接受由受信任的证书颁发机构（CA）签署的证书所认证的客户端的连接。同样，Docker CLI 客户端也只连接到具有由该受信任 CA 签署的证书的\
    \ Docker 守护进程。如果您过去曾使用证书配置过 SQL Server 数据库镜像，那么此过程非常相似。在本示例中，我们将创建自己的证书，而不是使用来自受信任公共\
    \ CA 的证书。这不是在生产环境中会做的事情，但它确实能完成任务。\n\n此过程将引导您为 Docker 守护进程配置双向 TLS 加密。在 CentOS\
    \ Linux Docker 主机上：\n\n1.  创建一个临时目录来存储 CA 私钥和公钥。稍后将引用此目录以指向证书的位置。\n\n    ```\n\
    \    mkdir /tmp/dockerTLS\n    cd /tmp/dockerTLS\n    ```\n\n2.  运行以下 `openssl`\
    \ 命令以创建 CA 私钥。系统提示时，提供私钥的密码短语。\n\n    ```\n    openssl genrsa -aes256 -out ca-key.pem\
    \ 4096\n    ```\n\n3.  运行以下 `openssl` 命令以创建 CA 公钥。系统提示时，提供标识公钥的详细信息。图 6-4 提供了一个示例。对于\
    \ `Common Name` 字段，请务必提供您用于连接 Docker 守护进程的主机名，并且该主机名必须可在网络中解析。在此示例中，我的 CentOS\
    \ Linux Docker 主机的完全限定域名（FQDN）是 `CENTOSDOCKER01.TESTDOMAIN.COM`。\n\n    ```\n\
    \    openssl req -new -x509 -days 365 -key ca-key.pem -sha256 -out ca.pem\n  \
    \  ```\n\n    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig4_HTML.jpg](img/484552_1_En_6_Fig4_HTML.jpg)\n\
    \    图 6-4 CA 公钥的详细信息\n\n4.  运行以下 `openssl` 命令以创建服务器密钥：\n\n    ```\n    openssl\
    \ genrsa -out server-key.pem 4096\n    ```\n\n5.  运行以下 `openssl` 命令以创建证书签名请求。确保\
    \ `Common Name` 值与您在步骤 3 中提供的 Docker 守护进程主机名相匹配。\n\n    ```\n    openssl req -subj\
    \ \"/CN=CENTOSDOCKER01.TESTDOMAIN.COM\" -sha256 -new -key server-key.pem -out\
    \ server.csr\n    ```\n\n6.  运行以下命令创建扩展配置文件。由于 TLS 连接可以通过 IP 地址和 FQDN 建立，因此在创建证书时需要指定\
    \ IP 地址。扩展配置文件将包含 Linux Docker 主机的 FQDN、其 IP 地址以及环回 IP 地址，以便您仍可以通过 TCP 端口本地连接到\
    \ Docker 守护进程。\n\n    ```\n    echo subjectAltName = DNS:CENTOSDOCKER01.TESTDOMAIN.COM,IP:172.28.106.158,IP:127.0.0.1\
    \ >> extfile.cnf\n    ```\n\n7.  运行以下命令追加扩展配置文件并添加扩展使用属性，使得 Docker 守护进程的密钥只能用于服务器认证：\n\
    \n    ```\n    echo extendedKeyUsage = serverAuth >> extfile.cnf\n    ```\n\n\
    8.  运行以下 `openssl` 命令，使用 CA 对公钥进行签名，并传入扩展配置文件：\n\n    ```\n    openssl x509 -req\
    \ -days 365 -sha256 -in server.csr -CA ca.pem -CAkey ca-key.pem -CAcreateserial\
    \ -out server-cert.pem -extfile extfile.cnf\n    ```\n\n您在 `/tmp/dockerTLS` 目录中应拥有以下文件，如图\
    \ 6-5 所示。\n\n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig5_HTML.jpg](img/484552_1_En_6_Fig5_HTML.jpg)\n\
    图 6-5 完成所有步骤后创建的文件\n\n现在我们准备好处理 Docker CLI 客户端了。在此示例中，Docker CLI 客户端也运行在一台名为 `CENTOSDOCKERCLIENT`\
    \ 的 CentOS Linux 机器上。\n\n在 CentOS Docker 客户端机器上：\n\n1.  创建一个临时目录来存储 CA 私钥和公钥。稍后将引用此目录以指向证书的位置。\n\
    \n    ```\n    mkdir /tmp/dockerTLS\n    cd /tmp/dockerTLS\n    ```\n\n2.  运行以下\
    \ `openssl` 命令以创建客户端密钥：\n\n    ```\n    openssl genrsa -out key.pem 4096\n   \
    \ ```\n\n3.  运行以下 `openssl` 命令以创建证书签名请求：\n\n    ```\n    openssl req -subj '/CN=client'\
    \ -new -key key.pem -out client.csr\n    ```\n\n4.  运行以下命令创建一个扩展配置文件，以使客户端密钥适用于客户端认证：\n\
    \n    ```\n    echo extendedKeyUsage = clientAuth > extfile-client.cnf\n    ```\n\
    \n5.  将您在 Docker 守护进程主机上生成的 `ca.pem` 和 `ca-key.pem` 文件复制到客户端机器的 `/tmp/dockerTLS`\
    \ 目录。您可以使用 WinSCP 或 Linux 上的 `scp` 命令来完成。您在 `/tmp/dockerTLS` 目录中应拥有以下文件，如图 6-6\
    \ 所示。除非所有文件都可用，否则请勿进行下一步。\n\n    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig6_HTML.jpg](img/484552_1_En_6_Fig6_HTML.jpg)\n\
    \    图 6-6 完成所有步骤后创建的文件\n\n6.  运行以下 `openssl` 命令生成已签名的证书，传入公钥、私钥和扩展配置文件。系统提示时，提供\
    \ CA 私钥的密码短语。\n\n    ```\n    openssl x509 -req -days 365 -sha256 -in client.csr\
    \ -CA ca.pem -CAkey ca-key.pem -CAcreateserial -out cert.pem -extfile extfile-client.cnf\n\
    \    ```\n\n我们现在拥有了在 Docker CLI 客户端和远程 Docker 守护进程之间建立双向 TLS 加密所需的所有文件。但我们还没有完成。\n\
    \n## 更新 daemon.json 以包含双向 TLS 加密设置\n\n我们必须告诉 Docker 守护进程强制执行加密和认证的远程连接。以下配置选项将被添加到\
    \ `daemon.json` 文件中：\n\n*   `tlsverify`: 值为 `true` 时强制执行加密和认证的远程连接。\n*   `tlscacert`:\
    \ Docker 守护进程将仅信任由此 CA 签署的证书。\n*   `tlscert`: TLS 证书文件的路径。\n*   `tlskey`: TLS\
    \ 密钥文件的路径。\n\n将以下内容添加到 `daemon.json` 文件并保存。注意您在 Docker 主机上生成的文件的路径。\n\n```\n\"\
    tlscacert\": \"/tmp/dockerTLS/ca.pem\",\n\"tlscert\": \"/tmp/dockerTLS/server-cert.pem\"\
    ,\n\"tlskey\": \"/tmp/dockerTLS/server-key.pem\",\n\"tlsverify\": true\n```\n\n\
    更新 `daemon.json` 文件后，重启 Docker 守护进程：\n\n```\nsudo systemctl restart docker\n```\n\
    \n## 启用防火墙端口以允许到 Docker 守护进程的流量\n\n当您使用 Docker CLI 客户端本地连接到 Docker 守护进程时，您无需担心防火墙。这是因为您已经通过\
    \ SSH（在端口 22 上）登录到机器并在本地运行命令。启用对 Docker 守护进程的远程访问意味着您需要在 Linux 防火墙上打开端口 2376。\n\
    \n运行以下命令启用防火墙以允许端口 2376 上的远程连接。默认情况下，FirewallD 是 CentOS Linux 上可用的防火墙解决方案。\n\n\
    ```\nsudo firewall-cmd --zone=public --add-port=2376/tcp --permanent\n```\n\n\
    运行以下命令重新加载新添加的防火墙规则：\n\n```\nsudo firewall-cmd --reload\n```\n\n启用防火墙端口后，使用 TELNET\
    \ 测试到端口 2376 的连接。\n"
- fmt: '# Docker CLI 客户端配置与管理


    ## 测试远程客户端连接


    当然，最终的测试是当你能够从一个 Docker CLI 客户端运行命令并连接到远程 Docker 主机时。运行以下命令连接到远程 Docker 主机。确保你位于`/tmp/dockerTLS`目录中，这样就不必提供公钥、签名证书和客户端密钥的绝对路径。


    ```

    docker --tlsverify --tlscacert=ca.pem --tlscert=cert.pem --tlskey=key.pem -H=172.28.106.158:2376
    info

    ```


    `-H`参数指向远程 Docker 主机的 IP 地址。或者，你也可以使用主机名或 FQDN，前提是它可以在网络上解析。图 [6-7](#484552_1_En_6_Chapter.xhtml#Fig7)
    显示了在`CENTOSDOCKERCLIENT`上运行的 Docker CLI 客户端连接到在`CENTOSDOCKER01`上运行的远程 Docker 主机。


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig7_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig7_HTML.jpg)


    **图 6-7**


    Docker CLI 客户端连接到远程 Docker 主机


    你还可以通过在当前会话中使用`export`命令设置环境变量，避免在运行`docker`命令时反复提供远程连接相关参数。在运行任何`docker`命令之前，运行以下命令。图
    [6-8](#484552_1_En_6_Chapter.xhtml#Fig8) 显示了设置环境变量并运行`docker`命令连接到远程 Docker 主机。


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig8_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig8_HTML.jpg)


    **图 6-8**


    设置环境变量以将 Docker CLI 客户端连接到远程 Docker 主机


    ```

    export DOCKER_TLS_VERIFY=1

    export DOCKER_HOST=tcp://172.28.106.158:2376

    export DOCKER_CERT_PATH=/tmp/dockerTLS/

    ```


    ## 清理


    在为 TLS 双向认证配置好客户端和服务器后，你不再需要证书签名请求。你可以继续删除客户端和服务器机器上的`client.csr`和`server.csr`文件。对于扩展配置文件`extfile-client.cnf`和`extfile.cnf`，也可以做同样的处理。


    此外，为防止密钥被意外覆盖，移除它们的写入权限。在客户端机器上运行以下命令，使密钥仅对你的用户账户可读：


    ```

    chmod -v 0400 ca-key.pem key.pem

    ```


    类似地，在服务器机器上运行以下命令：


    ```

    chmod -v 0400 ca-key.pem server-key.pem

    ```


    你需要对证书做同样的处理，以防止它们被意外覆盖。在客户端机器上运行以下命令，使证书仅对你的用户账户可读：


    ```

    chmod -v 0400 ca.pem cert.pem

    ```


    类似地，在服务器机器上运行以下命令：


    ```

    chmod -v 0400 ca.pem server-cert.pem

    ```


    在 Windows 上配置 Docker CLI 客户端的过程是相同的。但由于 Windows 上原生不支持 OpenSSL，因此需要手动安装。请参考*附录
    A*在 Windows 工作站上安装和配置 OpenSSL。


    一旦你进入 OpenSSL 命令提示符，就可以运行与 Linux 相同的命令，但无需`openssl`命令。例如，命令`openssl genrsa -out
    key.pem 4096`应该写为`genrsa -out key.pem 4096`。图 [6-9](#484552_1_En_6_Chapter.xhtml#Fig9)
    显示了一台 Windows 10 机器运行 Docker CLI 客户端连接到 Linux Docker 主机。不过要注意`-H`参数，其格式类似于`DOCKER_HOST`环境变量中定义的格式。此外，不是使用`export`关键字，而是使用`set`关键字来定义环境变量。


    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig9_HTML.jpg](images/484552_1_En_6_Chapter/484552_1_En_6_Fig9_HTML.jpg)


    **图 6-9**


    Windows 10 主机上的 Docker CLI 客户端连接到远程 Linux Docker 主机


    ## 配置 Docker CLI Bash 自动补全


    人们常说，最懒惰的 IT 专业人士是那些从开发者转行做系统管理员的人。根据我的经验，这话可能有点道理。我在 2005 年从 Visual Basic 转到了
    C#.NET，因为 Visual Studio 有 IntelliSense。当 Monad（PowerShell 的原名）推出时，我立即将所有基于 VBScript
