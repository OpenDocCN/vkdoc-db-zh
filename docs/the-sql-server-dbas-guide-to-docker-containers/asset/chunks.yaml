- fmt: '## Summary


    My original intent for this chapter was to get you started with SQL Server on
    Linux. As a SQL Server DBA who has only worked with the Windows operating system,
    I understand your hesitation on working with an unfamiliar system. Now that you
    have an understanding of how SQL Server on Linux works, how to install and configure
    it, working with the Linux filesystem and permissions, and writing a simple bash
    script, you can no longer call yourself a Linux newbie. Give yourself a pat on
    the back for doing a great job of facing your fears and conquering the mighty
    penguin. But we’re going to shift gears a bit in the next chapter and switch back
    to working on Windows building custom SQL Server Docker images.


    # 9. Creating Custom SQL Server on Windows Container Images


    > *Just because something is traditional is no reason to do it, of course.*

    >

    > —Lemony Snicket, *The Blank Book*


    Being in private school means following certain dress codes – white collared shirt
    with the school logo, navy blue dress pants, and black leather shoes. Come rain
    or shine, school uniforms must be worn. Imagine carrying a 15-lb backpack with
    all your books and notebooks as you walk across the campus while the monsoon rain
    is pouring. It doesn’t matter how good your ready-to-wear leather shoes are, they
    won’t last an entire semester. It didn’t help that ninth grader boys like playing
    rough and running around during recess. My mom had given me a good amount of scolding
    whenever I complained about my worn-out leather shoes.


    That was until my brother’s friend told us about custom-made leather shoes. An
    old man from the shoe capital of the Philippines decided to start his own business
    making custom leather shoes using upcycled airplane tires for the soles. I have
    no clue how he came up with the idea of using upcycled airplane tires for shoes
    or where he sourced them from (I’m pretty sure he didn’t go around breaking into
    airports and slashing airplane tires just so he can get them). But we were not
    about to pass up the opportunity. We paid the old man a visit, had our measurements
    taken, and were told to wait for two weeks, because that’s how long it took to
    make these shoes – two long weeks. That felt like eternity when you’re a teen.
    But wait we must. And, in case you were wondering, we did pay for our shoes. They
    were almost twice as expensive as the ready-to-wear leather shoes that we used
    to get.


    I put on my shoes and started running the minute I got my pair. I wanted to see
    if they lived up to my expectations. And I was impressed. I wore them every single
    day. They’re not as comfortable as my previous leather shoes, but they do meet
    my needs. They lasted for more than several school years that I still saw them
    at my mom’s house when I visited three years ago. I’ve outgrown them but they
    still look great and can still be worn. It just proves that you can find something
    that specifically meets your needs – either by finding someone who can provide
    it for you or by making it yourself.


    The containers that we’ve been working with in the previous chapters were all
    publicly available images from registries like Docker Hub or Microsoft Container
    Registry (MCR). There might be cases where you need custom-built images that follow
    your corporate standards, meet compliance requirements, or just standardize your
    deployments. On the Windows side, one example could be building a SQL Server 2016
    with Service Pack 2 on a Windows Server 2016 container. Only SQL Server 2017 on
    Windows containers are publicly available from Microsoft. On the Linux side, maybe
    you want to standardize on Red Hat Enterprise (or CentOS) Linux for your container
    operating system and not Ubuntu.


    This chapter covers creating custom SQL Server on Windows images that you can
    deploy as containers. We will look at working with the `Dockerfile`, a text document
    that contains all the commands a user could run on the command line to create
    a custom Docker image. After creating the custom Docker image, we will deploy
    a container and connect to it to verify if it meets all our customization requirements.


    ## Creating Custom Docker Images


    There are two ways to create custom Docker images. The first one is to update
    a running container and using the `docker commit` command to create a new image
    that includes the changes. The idea here is that you want to make modifications
    to a base image and use it as a reference for your new custom image.


    Let’s use the publicly available SQL Server on Linux Docker images. Don’t be confused.
    This chapter is still focused on Windows. I’m just using Linux Docker images as
    an example to simplify things. You’ll see why later in this chapter. You can add
    databases in those containers and make modifications as necessary. Once you’re
    done, you can run the following `docker commit` command to create a new image
    based on the changed container, with `sqldevlinuxcon01` as the name of the running
    container and `sqlserver2017-cu18-ubuntu-16.04-with-dbs:v2.0` as the name of the
    new image. As a best practice, I added a tag to the image so I can easily identify
    what it is.


    ```

    docker commit sqldevlinuxcon01 sqlserver2017-cu18-ubuntu-16.04-with-dbs:v2.0

    ```


    Review *Chapter* [*5*](#484552_1_En_5_Chapter.xhtml). Running this command will
    create a new filesystem layer that contains the changes you made. If you run the
    `docker inspect` command against this new image and compare it against the one
    from the MCR, you’ll see the new filesystem layer, as shown in Figure [9-1](#484552_1_En_9_Chapter.xhtml#Fig1).
    Everything else looks the same.


    ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig1_HTML.jpg](images/484552_1_En_9_Chapter/484552_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    New filesystem layer added to the image containing the changes


    You can use this new image to create containers that have the additional changes.
    Have a look at the following `docker run` command that uses the newly created
    image:


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1413:1433 --name
    sqldevlinuxcon03 -d -h linuxsqldev01 sqlserver2017-cu18-ubuntu-16.04-with-dbs:v2.0

    ```


    There’s just one problem: the commit operation will not include any data contained
    in volumes mounted inside the container. If the `sqldevlinuxcon01` container was
    mounted on a Docker volume and your user databases were created and stored in
    the volume, none of those will be included. That’s one of the main reasons I don’t
    use the `docker commit` command to create custom Docker images.'
