    firewall rule has been applied. You can also run the following command to display
    runtime configuration of the opened ports in the firewall. Figure [8-3](#484552_1_En_8_Chapter.xhtml#Fig3)
    displays the opened TCP port 1433.


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig3_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    List opened ports in the system firewall


    ```

    sudo firewall-cmd --list-ports

    ```


    Didn’t I say we’ll use a different tool for Ubuntu systems? Run the following
    commands to check the status of *UFW*. Figure [8-4](#484552_1_En_8_Chapter.xhtml#Fig4)
    shows the status of the *UFW* daemon on an Ubuntu Linux system. But unlike *FirewallD*,
    *UFW* is disabled by default. Note the *Status: inactive* message.


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig4_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    UFW on an Ubuntu Linux system is disabled by default


    ```

    sudo systemctl status ufw

    sudo ufw status

    ```


    Run the following command to enable *UFW*. When prompted, type *y* for *Yes*.
    This will enable *UFW* and configure to start on system boot.


    ```

    sudo ufw enable

    ```


    Note


    A word of caution regarding the *UFW* firewall on Ubuntu. The previous chapters
    allowed you to connect to your Ubuntu Linux system via an SSH client. That’s because
    the firewall is disabled by default and the system is wide open for any remote
    connections – including SSH on port 22\. This is unlike CentOS Linux where the
    firewall is enabled, blocking all access except remote connection through SSH.
    After enabling *UFW* on an Ubuntu Linux system, no other connections will be allowed
    unless you define a firewall rule for it. This also means that your existing SSH
    session is only valid so long as you are still connected. Once you disconnect,
    you’re locked out. Don’t make the mistake of closing your existing SSH connection
    without enabling port 22 on the firewall. Allow SSH connections by running this
    command: `sudo ufw allow 22/tcp`. To validate, run another SSH session and confirm
    that you can connect.


    After enabling *UFW* and allowing SSH connections, you can now open TCP port 1433
    from the firewall by running the following command. Figure [8-5](#484552_1_En_8_Chapter.xhtml#Fig5)
    displays the opened port numbers – 22 for SSH and 1433 for SQL Server.


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig5_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    UFW displaying all opened ports


    ```

    sudo ufw allow 1433/tcp

    ```


    As I mentioned in *Chapter* [*4*](#484552_1_En_4_Chapter.xhtml), the ultimate
    test is when you can connect remotely to the SQL Server instance on Linux via
    SQL Server Management Studio.'
  trans: '

    ## 配置防火墙


    根据您的 Linux 系统配置，您可能需要配置 Linux 防火墙以允许到 SQL Server 的远程连接。Linux 系统使用 `iptables`，这是一个基于规则的防火墙，预装在大多数
    Linux 发行版中。它使用网络地址转换 (NAT) 和数据包过滤的概念来控制对系统的网络访问。但鉴于 Linux 的开源特性，许多人尝试构建实用程序和工具以使其管理变得更容易——因此，有了这些可用的实用程序。例如，在
    RHEL 和 CentOS 7 及更高版本上，默认的系统防火墙是 `FirewallD`。`FirewallD` 通过 API 暴露 `iptables`，并允许管理员和开发人员使用一个名为
    `firewall-cmd` 的命令行工具轻松配置防火墙设置。您可以从 [*https://firewalld.org/*](https://firewalld.org/)
    了解更多关于 `FirewallD` 的信息。另一方面，Ubuntu 使用一个名为 `UFW`（uncomplicated firewall 的缩写）的命令行工具，它直接与
    `iptables` 交互。您可以从 [*https://help.ubuntu.com/community/UFW*](https://help.ubuntu.com/community/UFW)
    了解更多关于 `UFW` 的信息。有趣的是，如果您愿意，可以在 Ubuntu 系统上安装 `FirewallD`。这使得在这两个 Linux 发行版之间标准化管理系统防火墙变得更容易。但那样还有什么乐趣呢？我不会深入探讨
    `iptables`、`firewalld`、`firewall-cmd` 和 `ufw` 的工作原理。我只会提供足够的信息，让您能够使用您特定发行版可用的工具配置到
    Linux 上 SQL Server 的远程连接。


    让我们从 CentOS 开始。首先，运行以下命令检查 `FirewallD` 是否正在运行。图 8-2 显示了 CentOS Linux 系统上运行中的 `FirewallD`
    守护进程状态。


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig2_HTML.jpg](img/484552_1_En_8_Fig2_HTML.jpg)


    图 8-2


    FirewallD 在 CentOS Linux 系统上运行


    ```

    sudo systemctl status firewalld

    ```


    接下来，运行以下带有相应参数的 `firewall-cmd` 命令以从防火墙打开 TCP 端口 1433：


    ```

    sudo firewall-cmd --zone=public --add-port=1433/tcp --permanent

    ```


    `FirewallD` 的一个关键特性是区域 (zone) 的概念。所有其他特性都绑定到一个区域，这描述了连接、接口或源地址绑定的信任级别。此命令使用的区域
    `Public` 表示您不信任网络上的其他计算机，并且只允许到 TCP 端口 1433 的传入流量。`--permanent` 参数表示您希望永久应用此防火墙规则。但配置了它并不意味着它会自动应用，也不会在系统重启期间持久保存。`FirewallD`
    中的另一个概念是运行时配置与永久配置的分离。运行时配置是防火墙当前用于管理规则的配置，在防火墙规则重新加载或系统重启时可能会丢失。永久配置存储在 `iptables`
    中，并在系统启动或防火墙规则重新加载时加载。这意味着您可以临时更改防火墙规则并将其加载到运行时配置中。如果您移除 `--permanent` 参数，您将能够临时远程连接到
    Linux 上的 SQL Server 实例。但一旦系统重启或防火墙规则重新加载，连接将被阻止，因为防火墙规则丢失了。此外，因为命令中使用了 `--permanent`
    参数，防火墙规则仅作为永久配置存在，而不是运行时配置，并且不会立即生效。要应用防火墙规则，运行以下命令将其作为新的运行时配置重新加载：


    ```

    sudo firewall-cmd --reload

    ```


    在端口 1433 上对您的 CentOS Linux 系统进行简单的 TELNET 测试将验证防火墙规则是否已应用。您还可以运行以下命令显示防火墙中已打开端口的运行时配置。图
    8-3 显示了已打开的 TCP 端口 1433。


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig3_HTML.jpg](img/484552_1_En_8_Fig3_HTML.jpg)


    图 8-3


    列出系统防火墙中已打开的端口


    ```

    sudo firewall-cmd --list-ports

    ```


    我不是说过我们会对 Ubuntu 系统使用不同的工具吗？运行以下命令检查 `UFW` 的状态。图 8-4 显示了 Ubuntu Linux 系统上 `UFW`
    守护进程的状态。但与 `FirewallD` 不同，`UFW` 默认是禁用的。请注意 `Status: inactive` 消息。


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig4_HTML.jpg](img/484552_1_En_8_Fig4_HTML.jpg)


    图 8-4


    Ubuntu Linux 系统上的 UFW 默认被禁用


    ```

    sudo systemctl status ufw

    sudo ufw status

    ```


    运行以下命令启用 `UFW`。当提示时，输入 `y` 表示 `Yes`。这将启用 `UFW` 并配置为在系统启动时启动。


    ```

    sudo ufw enable

    ```


    注意


    关于 Ubuntu 上的 `UFW` 防火墙的一句警告。前面的章节允许您通过 SSH 客户端连接到您的 Ubuntu Linux 系统。这是因为防火墙默认是禁用的，系统对任何远程连接都是完全开放的——包括端口
    22 上的 SSH。这与 CentOS Linux 不同，后者的防火墙是启用的，除了通过 SSH 的远程连接外，阻止所有访问。在 Ubuntu Linux
    系统上启用 `UFW` 后，除非您为其定义防火墙规则，否则将不允许任何其他连接。这也意味着您现有的 SSH 会话仅在您仍然连接时有效。一旦您断开连接，您将被锁定在外。不要犯这样的错误：在未启用防火墙端口
    22 的情况下关闭您现有的 SSH 连接。运行此命令以允许 SSH 连接：`sudo ufw allow 22/tcp`。要验证，请启动另一个 SSH 会话并确认您可以连接。


    启用 `UFW` 并允许 SSH 连接后，您现在可以通过运行以下命令从防火墙打开 TCP 端口 1433。图 8-5 显示了已打开的端口号——22 用于 SSH，1433
    用于 SQL Server。


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig5_HTML.jpg](img/484552_1_En_8_Fig5_HTML.jpg)


    图 8-5


    UFW 显示所有已打开的端口


    ```

    sudo ufw allow 1433/tcp

    ```


    正如我在 *第* *4* *章* 中提到的，最终测试是当您可以通过 SQL Server Management Studio 远程连接到 Linux 上的
    SQL Server 实例时。

    '
- fmt: '# Linux 防火墙与 Docker 注意事项


    我本想在 [**Chapter 4**](#484552_1_En_4_Chapter.xhtml) 介绍 Linux 防火墙时稍微提及，因为当时正在介绍如何在
    Docker 上运行 SQL Server 并远程连接。此外，为了访问资源，你也需要能够远程连接到服务器。但如果你注意观察，之前的章节都没有涉及创建防火墙规则和开放端口号以访问容器内的
    SQL Server 实例。因此，我在此替你提出一个显而易见的问题：如果 CentOS Linux 系统默认启用了 **FirewallD**，它不应该阻止除
    SSH 外的所有连接吗？而如果我在 Ubuntu Linux 系统上启用了 **UFW**，它不也应该阻止除我明确允许之外的所有连接吗？不过，你可能不太关心
    Ubuntu 上的 **UFW**，因为它默认是禁用的。


    答案在于 Docker 在幕后施展的“魔法”。还记得我说过 **iptables** 是大多数 Linux 发行版上基于规则的防火墙吗？每次你创建一个 Docker
    容器并在 `docker run` 命令中使用 `-p` 参数配置端口映射时，Docker 都会直接在 **iptables** 中创建一个防火墙规则作为你实现的一部分。Docker
    在 RHEL/CentOS 上不使用 **FirewallD**，在 Ubuntu 上也不使用 **UFW**，因此当你使用这些工具时，你不会看到任何关于区域、端口号或服务的信息。图
    [8-6](#484552_1_En_8_Chapter.xhtml#Fig6) 展示了在我的 CentOS Docker 主机上已开放的端口和服务列表。请注意，`firewall-cmd`
    仅在可用服务列表中显示 `ssh` 和 `dhcpv6-client`（用于从 DHCP 服务器获取 IP 地址）。然而，查询 **iptables** 显示了一个映射：从任意源（0.0.0.0/0
    IP 地址范围）到 IP 地址 172.18.0.2（这是我 CentOS Docker 主机上分配给 `docker0` 网络接口的 IP 地址，我将在
    [**Chapter 11**](#484552_1_En_11_Chapter.xhtml) 中更详细地介绍）的 TCP 端口 1433。在 Ubuntu
    Docker 主机上查询 **iptables** 时，你会看到同样的规则。


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig6_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig6_HTML.jpg)


    **图 8-6**

    在 CentOS Docker 主机上，为端口 1433 在 FirewallD 和 iptables 中显示的开放端口及允许的服务


    你可以在 [*https://docs.docker.com/network/iptables/*](https://docs.docker.com/network/iptables/)
    阅读更多关于 Docker 实现的这种防火墙规则“魔法”。他们明确强调不要修改 Docker 在你的 **iptables** 中创建的防火墙规则。如果你的安全策略禁止从任何源访问
    Docker 容器内的 SQL Server 实例，请咨询你的网络工程师如何正确控制网络流量。


    # 在 Linux 上配置 SQL Server


    虽然大多数开箱即用的安装设置没有问题，但你可能希望标准化 SQL Server 部署，以符合你们的内部最佳实践，或者只是为了证明你比普通 SQL Server
    DBA 更聪明。我们在 Windows 上使用 SQL Server 安装中心做过这件事，创建一个 `ConfigurationFile.ini` 文件并用它来部署具有所需配置设置的多个
    SQL Server 实例。我们也曾手动使用 SQL Server 配置管理器对每个实例进行配置。在 Linux 上的 SQL Server，我们该如何做呢？


    `/opt/mssql/bin/mssql-conf` 脚本可用于为你的 Linux 上的 SQL Server 安装设置不同的配置。但除了在安装过程中使用它，我还没有真正描述过这个脚本的用法。让我们以
    Linux 的方式更详细地探讨这个脚本。我在 [**Chapter 3**](#484552_1_En_3_Chapter.xhtml) 简要提到了使用 Linux
    `man`（manual 的缩写）页面。虽然现在由于互联网资源丰富，我很少使用 `man` 页面来查阅文档，但在某些情况下，我确实无法在网上找到关于特定命令的信息。这个脚本就是其中之一。运行以下命令以显示如何使用此脚本：


    ```

    man mssql-conf

    ```


    图 [8-7](#484552_1_En_8_Chapter.xhtml#Fig7) 显示了使用此脚本时的不同选项。


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig7_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig7_HTML.jpg)


    **图 8-7**

    mssql-conf 的 man 页面


    使用 `list` 参数显示所有不同的可配置设置，如图 [8-8](#484552_1_En_8_Chapter.xhtml#Fig8) 所示：


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig8_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig8_HTML.jpg)


    **图 8-8**

    Linux 上 SQL Server 的可配置设置列表


    ```

    sudo /opt/mssql/bin/mssql-conf list

    ```


    这些是 SQL Server 实例上无法通过 T-SQL 完成的可配置设置。让我们用这些设置来展示如何更改一些最常见的 SQL Server 实例配置设置。下文展示的设置都需要重启
    SQL Server 守护进程，因此我会在最后再执行重启步骤，只展示如何完成所有配置更改。


    ## 启用 SQL Server Agent


    默认情况下，SQL Server Agent 在安装后是禁用的。实际上，在 SQL Server 2017 累积更新 4 之前，你必须使用不同的包单独安装
    SQL Server Agent。我猜社区和 Microsoft MVP 的反馈（或抱怨）导致 SQL Server 产品团队将 SQL Server Agent
    包含在 `mssql-server` 包中。试想一下，如果需要分别更新 SQL Server 数据库引擎和 SQL Server Agent。即使有适当的变更管理流程，任何人也有可能因为这不是我们
    DBA 更新 SQL Server 的常规操作而忘记更新 SQL Server Agent。这样，你的补丁级别最终可能会在两者之间不同。我认为将 SQL Server
    Agent 作为安装 SQL Server 的一部分是一个很棒的主意。


    运行以下命令以启用 SQL Server Agent：


    ```

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    ```


    ## 配置默认数据库数据和日志目录


    数据库数据和日志文件的默认目录是 `/var/opt/mssql/data`。你可能希望配置一个包含固态硬盘的专用存储阵列，并将其挂载为 Linux 系统上的一个目录。但在将一个目录配置为默认数据库数据和日志目录之前，必须先创建它，并将所有权更改为
    `mssql` 用户和 `mssql` 组。运行以下命令创建一个名为 `/tmp/dbdata` 的新目录：


    ```

    sudo mkdir /tmp/dbdata

    ```


    接下来，运行以下命令将目录的所有权更改为 `mssql` 用户：


    ```

    sudo chown mssql /tmp/dbdata

    ```


    你还需要通过运行以下命令将目录的组所有权更改为 `mssql` 组：


    ```

    sudo chgrp mssql /tmp/dbdata

    ```


    目录创建并分配所有权后，你现在可以使用以下命令将默认数据库数据和日志目录设置为新位置：


    ```

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    ```'
  raw: '## A Note on the Linux Firewalls and Docker


    I was tempted to cover a bit of the Linux firewall in *Chapter* [*4*](#484552_1_En_4_Chapter.xhtml)
    as you were being introduced to running SQL Server on Docker and connecting to
    it remotely. Besides, you need to be able to connect to a server remotely in order
    to access its resources. But if you observe, there’s nothing in the previous chapters
    that cover creating a firewall rule and opening port numbers to access the SQL
    Server instance inside the container. So, I’ll ask an obvious question on your
    behalf. If *FirewallD* is enabled by default on a CentOS Linux system, shouldn’t
    it be blocking all connections except for SSH? And if I enabled *UFW* on an Ubuntu
    Linux system, shouldn’t it also block all connections except the ones I explicitly
    allow? However, you wouldn’t be too much concerned with *UFW* on Ubuntu because
    it is disabled by default.


    The answer lies in the magic that Docker does behind the scenes. Remember what
    I said about *iptables* being the rule-based firewall available on most Linux
    distributions? Every time you create a Docker container and configure port mapping
    using the *-p* parameter in the *docker run* command, Docker creates a firewall
    rule directly into *iptables* as part of your implementation. Docker doesn’t use
    *FirewallD* on RHEL/CentOS nor *UFW* on Ubuntu so you won’t see any information
    about zones or port numbers or services when you use these tools. Figure [8-6](#484552_1_En_8_Chapter.xhtml#Fig6)
    displays the list of opened ports and services in my CentOS Docker host. Note
    that *firewall-cmd* only displays *ssh* and *dhcpv6-client* (for acquiring IP
    addresses from a DHCP server) in the list of available services. Yet querying
    *iptables* shows a mapping of TCP port 1433 from any source (0.0.0.0/0 IP address
    range) to the IP address 172.18.0.2 (this is the IP address assigned to the *docker0*
    network interface on my CentOS Docker host which I’ll cover in more detail in
    *Chapter* [*11*](#484552_1_En_11_Chapter.xhtml)). You’ll see the same rule displayed
    on an Ubuntu Docker host when you query *iptables*.


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig6_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Displaying opened ports and allowed services in FirewallD and iptables for port
    1433 on a CentOS Docker host


    You can read more about this firewall rule implementation magic that Docker does
    at [*https://docs.docker.com/network/iptables/*](https://docs.docker.com/network/iptables/).
    They explicitly highlight not to modify the firewall rules that Docker creates
    in your *iptables*. In case you have security policies that prevent access from
    any source to your SQL Server instance inside a Docker container, talk to your
    network engineers on how to properly control network traffic.


    ## Configuring SQL Server on Linux


    While most of the out-of-the-box installation settings are fine, you may want
    to standardize your SQL Server deployments to comply with your internal best practices
    or maybe just to prove that you’re smarter than the average SQL Server DBA. We’ve
    done this with the SQL Server Installation Center on Windows, creating a *ConfigurationFile.ini*
    file and using it to deploy multiple SQL Server instances with the desired configuration
    settings. We’ve also used SQL Server Configuration Manager to do it manually per
    instance. How do we do this with SQL Server on Linux?


    The */opt/mssql/bin/mssql-conf* script can be used to set the different configuration
    settings for your SQL Server on Linux installation. But I haven’t really described
    how this script is used other than using it as part of the installation process.
    Let’s explore this script in more detail, Linux style. I briefly mentioned using
    Linux *man* (short for manual) pages in *Chapter* [*3*](#484552_1_En_3_Chapter.xhtml).
    While I rarely use the *man* pages for documentation nowadays due to the availability
    of resources on the Internet, there are cases where I couldn’t find any information
    online about specific commands. This script is one of them. Run the following
    command to show how to use this script:


    ```

    man mssql-conf

    ```


    Figure [8-7](#484552_1_En_8_Chapter.xhtml#Fig7) shows the different options when
    using the script.


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig7_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    The mssql-conf man page


    Use the *list* parameter to display all the different configurable settings, as
    shown in Figure [8-8](#484552_1_En_8_Chapter.xhtml#Fig8):


    ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig8_HTML.jpg](images/484552_1_En_8_Chapter/484552_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    List of configurable settings for SQL Server on Linux


    ```

    sudo /opt/mssql/bin/mssql-conf list

    ```


    These are configurable settings on the SQL Server instance that cannot be done
    through T-SQL. Let’s use these to show how to change some of the most common SQL
    Server instance configuration settings. The ones shown in the following all require
    restarting the SQL Server daemon so I’ll skip this step and just show how it is
    done at the end of making all the configuration changes.


    ### Enabling the SQL Server Agent


    By default, the SQL Server Agent is disabled after installation. In fact, prior
    to SQL Server 2017 Cumulative Update 4, you have to install the SQL Server Agent
    separately using a different package. I guess the feedback (or complaints) from
    the community and the Microsoft MVPs has caused the SQL Server product team to
    include the SQL Server Agent in the *mssql-server* package. Think about having
    to update the SQL Server database engine and the SQL Server Agent separately.
    Even with proper change management process, anyone could potentially forget updating
    the SQL Server Agent because it’s not something that we DBAs do to update SQL
    Server. So, your patch levels could end up being different on both. I think it’s
    a great idea to include the SQL Server Agent as part of installing SQL Server
    .


    Run the following command to enable the SQL Server Agent:


    ```

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    ```


    ### Configuring Default Database Data and Log Directory


    The default directory for the database data and log files is */var/opt/mssql/data*.
    You may want to provision a dedicated storage array that contains solid-state
    drives and mounted as a directory on your Linux system. But before you can configure
    a directory as a default database data and log directory, it has to be created
    first and ownership changed to the *mssql* user and *mssql* group. Run the following
    command to create a new directory named */tmp/dbdata*:


    ```

    sudo mkdir /tmp/dbdata

    ```


    Next, run the following command to change the ownership of the directory to the
    *mssql* user:


    ```

    sudo chown mssql /tmp/dbdata

    ```


    You also need to change the group ownership of the directory to the *mssql* group
    by running the following command:


    ```

    sudo chgrp mssql /tmp/dbdata

    ```


    Once the directory has been created and ownership assigned, you can now set the
    default database data and log directory to the new location using the following
    commands:


    ```

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    ```'
