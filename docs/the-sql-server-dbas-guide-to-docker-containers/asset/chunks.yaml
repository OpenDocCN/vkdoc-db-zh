    RUN chmod +x /tmp/startup/checkbackups_restore.sh

    RUN chmod +x /tmp/startup/startup.sh

    #运行启动脚本 startup.sh

    CMD ["/tmp/startup/startup.sh"]

    ```


    将 `Dockerfile`、`checkbackups_restore.sh` 和 `startup.sh` 文件保存在一个目录中，并使用该目录作为此新自定义镜像的构建上下文。你只希望这三个文件被复制到自定义镜像中，仅此而已。图
    10-14 展示了包含这些文件的目录结构。


    ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig14_HTML.jpg](img/484552_1_En_10_Fig14_HTML.jpg)


    图 10-14


    用于构建自定义镜像的目录结构和文件


    运行以下命令来构建这个新的自定义镜像：


    ```

    docker build -t customsql2017oncentos4dev-nonroot:v1.0 .

    ```


    现在，进行最终测试，使用以下 `docker run` 命令，基于此自定义镜像运行一个新容器。请确保使用正确的镜像名称。


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
    sqldevlinuxcon01 --mount source=sqldbdata,target=/var/opt/mssql -d -h linuxsqldev01
    customsql2017oncentos4dev-nonroot:v1.0

    ```


    将 Docker 卷 `sqldbdata` 映射到容器，意味着备份文件现在可以被容器访问。在启动期间，容器将运行 `startup.sh` 脚本，该脚本会调用
    `checkbackups_restore.sh` 脚本来遍历 `/var/opt/mssql` 目录中的 BAK 文件。因为我们是从已经安装了 SQL Server
