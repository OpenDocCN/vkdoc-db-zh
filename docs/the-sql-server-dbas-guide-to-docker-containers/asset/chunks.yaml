    \ sqlserver2017-cu18-ubuntu-16.04-with-dbs:v2.0\n```\n\nReview *Chapter* [*5*](#484552_1_En_5_Chapter.xhtml).\
    \ Running this command will create a new filesystem layer that contains the changes\
    \ you made. If you run the *docker inspect* command against this new image and\
    \ compare it against the one from the MCR, you’ll see the new filesystem layer,\
    \ as shown in Figure [9-1](#484552_1_En_9_Chapter.xhtml#Fig1). Everything else\
    \ looks the same.\n\n![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig1_HTML.jpg](images/484552_1_En_9_Chapter/484552_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\n\nNew filesystem layer added to the image containing the changes\n\
    \nYou can use this new image to create containers that have the additional changes.\
    \ Have a look at the following *docker run* command that uses the newly created\
    \ image:\n\n```\ndocker run -e \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=mYSecUr3PAssw0rd\"\
    \ -p 1413:1433 --name sqldevlinuxcon03 -d -h linuxsqldev01 sqlserver2017-cu18-ubuntu-16.04-with-dbs:v2.0\n\
    ```\n\nThere’s just one problem: the commit operation will not include any data\
    \ contained in volumes mounted inside the container. If the *sqldevlinuxcon01*\
    \ container was mounted on a Docker volume and your user databases were created\
    \ and stored in the volume, none of those will be included. That’s one of the\
    \ main reasons I don’t use the *docker commit* command to create custom Docker\
    \ images."
  trans: '## 总结


    本章的初衷是帮助你开始在 Linux 上使用 SQL Server。作为一名只在 Windows 操作系统上工作过的 SQL Server DBA，我理解你对于接触陌生系统的犹豫。现在，你已经了解了
    SQL Server on Linux 的工作原理、如何安装和配置它、如何处理 Linux 文件系统和权限，以及如何编写简单的 bash 脚本，你再也无法自称
    Linux 新手了。请为自己鼓掌，因为你出色地面对并征服了强大的企鹅（Linux）。不过，下一章我们将稍作调整，重新回到 Windows 上工作，构建自定义
    SQL Server Docker 镜像。


    # 9. 在 Windows 上创建自定义 SQL Server 容器镜像


    > *当然，仅仅因为某件事是传统，并不构成去做的理由。*

    >

    > ——雷蒙尼·斯尼奇，《空白之书》


    上私立学校意味着要遵守某些着装规范——带有校徽的白色有领衬衫、海军蓝正装裤和黑色皮鞋。无论刮风下雨，都必须穿校服。想象一下，在季风暴雨中，你背着一个装满所有书本和笔记本的
    15 磅重背包穿过校园。无论你的现成皮鞋质量有多好，它们都撑不过一个学期。更糟糕的是，九年级的男生在课间休息时喜欢打闹和奔跑。每当我抱怨磨坏的皮鞋时，妈妈都会狠狠地责骂我。


    直到我哥哥的朋友向我们介绍了定制皮鞋。菲律宾鞋都的一位老人决定开创自己的事业，用升级改造的飞机轮胎作为鞋底制作定制皮鞋。我不知道他是怎么想到用升级改造的飞机轮胎做鞋底的，也不知道他从哪里弄来的轮胎（我相当确定他并没有到处闯入机场去割破飞机轮胎来获取它们）。但我们可不想错过这个机会。我们拜访了那位老人，量了尺寸，并被告知要等两周，因为做这些鞋需要这么长时间——漫长的两周。对于一个青少年来说，那感觉像永恒一样漫长。但我们必须等待。另外，如果你好奇的话，我们确实付了鞋钱。它们的价格几乎是以前买的现成皮鞋的两倍。


    拿到我的鞋后，我立刻穿上并开始奔跑。我想看看它们是否符合我的期望。结果让我印象深刻。我每天都穿着它们。它们虽然不像我之前的皮鞋那么舒适，但确实满足了我的需求。它们撑过了好几个学年，三年前我去我妈妈家时还看到了它们。我已经穿不下了，但它们看起来仍然很棒，还能穿。这证明，你可以找到专门满足你需求的东西——无论是找到能提供它的人，还是自己动手制作。


    我们在前几章中使用的容器都是来自 Docker Hub 或 Microsoft Container Registry (MCR) 等注册表的公开可用镜像。在某些情况下，你可能需要遵循公司标准、满足合规性要求或仅仅是标准化部署的自定义构建镜像。在
    Windows 方面，一个例子可能是在 Windows Server 2016 容器上构建带有 Service Pack 2 的 SQL Server 2016。只有
    Windows 容器上的 SQL Server 2017 是微软公开提供的。在 Linux 方面，也许你希望将容器操作系统标准化为 Red Hat Enterprise（或
    CentOS）Linux，而不是 Ubuntu。


    本章将介绍如何创建可部署为容器的自定义 SQL Server on Windows 镜像。我们将学习使用 `Dockerfile`，这是一个文本文件，包含用户在命令行上可以运行的所有命令，以创建自定义的
    Docker 镜像。创建自定义 Docker 镜像后，我们将部署一个容器并连接到它，以验证它是否满足我们所有的定制要求。


    ## 创建自定义 Docker 镜像


    有两种方法可以创建自定义 Docker 镜像。第一种是更新一个正在运行的容器，并使用 `docker commit` 命令来创建一个包含这些更改的新镜像。这里的想法是，你想修改一个基础镜像，并将其用作新的自定义镜像的参考。


    让我们使用公开可用的 SQL Server on Linux Docker 镜像。别混淆了。本章仍然专注于 Windows。我只是用 Linux Docker
    镜像作为例子来简化说明。稍后你会明白为什么。你可以在这些容器中添加数据库并进行必要的修改。完成后，你可以运行以下 `docker commit` 命令来基于更改后的容器创建一个新镜像，其中
    `sqldevlinuxcon01` 是正在运行的容器的名称，`sqlserver2017-cu18-ubuntu-16.04-with-dbs:v2.0`
    是新镜像的名称。作为最佳实践，我为镜像添加了一个标签，以便我可以轻松识别它是什么。


    ```

    docker commit sqldevlinuxcon01 sqlserver2017-cu18-ubuntu-16.04-with-dbs:v2.0

    ```


    回顾*第* *5**章*。运行此命令将创建一个新的文件系统层，其中包含你所做的更改。如果你对这个新镜像运行 `docker inspect` 命令，并与来自
    MCR 的镜像进行比较，你会看到新的文件系统层，如图 9-1 所示。其他所有内容看起来都一样。


    ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig1_HTML.jpg](img/484552_1_En_9_Fig1_HTML.jpg)


    图 9-1


    添加到包含更改的镜像中的新文件系统层


    你可以使用这个新镜像来创建包含额外更改的容器。看看下面这个使用新创建镜像的 `docker run` 命令：


    ```

    docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1413:1433 --name
    sqldevlinuxcon03 -d -h linuxsqldev01 sqlserver2017-cu18-ubuntu-16.04-with-dbs:v2.0

    ```


    这里有一个问题：commit 操作不会包含挂载到容器内的卷中存储的任何数据。如果 `sqldevlinuxcon01` 容器挂载在一个 Docker 卷上，并且你的用户数据库是在该卷中创建和存储的，那么这些都不会被包含进来。这是我**不**使用
    `docker commit` 命令来创建自定义 Docker 镜像的主要原因之一。'
- fmt: '## Exploring the `Dockerfile`


    The second – and recommended – way to create custom Docker images is by using
    a `Dockerfile`. A `Dockerfile` is simply a text file that contains all the commands
    a user could run on the command line to build a custom Docker image. It’s like
    using the `ConfigurationFile.ini` file to deploy SQL Server using the same configuration.
    I like to think of the `Dockerfile` as a list of ingredients that you need to
    make a recipe (your Docker image) that someone else can use to bake a cake (your
    container). You can get your ingredients from different sources and use them to
    make a recipe. You can give your recipe to anyone who has the patience and creativity
    to bake a cake (hey, I need to say something nice about developers).


    Similar to writing a script, the `Dockerfile` consists of several commands, instructions,
    or arguments listed sequentially to perform actions on a base Docker image of
    your choice to create a custom one. And because it contains details of how the
    image was built, it’s a good piece of documentation for those who want to learn
    about how the image was built. When I was starting out, I spent a lot of time
    reading the `Dockerfile` references of the different SQL Server images on [`https://github.com/microsoft/mssql-docker`](https://github.com/microsoft/mssql-docker).
    This gave me an idea on how to build my own custom SQL Server images using my
    preferred operating system platform and version of SQL Server. Plus, I couldn’t
    sleep well at night when I’m traveling so I figured reading technical documentation
    would help. It didn’t.


    You can store a `Dockerfile` on a version control system like GitHub so you can
    track changes made by different folks on your team. Because we are building a
    SQL Server environment with the required operating system and configuration, you
    can think of a `Dockerfile` as a way to implement *infrastructure as code*.


    ### The File


    I did say that the `Dockerfile` is simply a text file. You can use your favorite
    text editor to create and write the `Dockerfile`. I usually start writing it with
    Notepad++ on my Windows workstation. Once completed, I copy it to either a Windows
    Docker host, Linux Docker host, or any machine that has the Docker CLI client
    installed.


    What I find really annoying with the `Dockerfile` is the filename itself. It must
    be specifically named `Dockerfile`, written with an uppercase “D”, single word
    with no space in between, and no file extension. If you use a text editor that
    saves a file with a “.txt” file extension by default, be sure to remove it. I
    can’t count the number of times that I had to troubleshoot what’s wrong with my
    `Dockerfile` only to find out that my file had a file extension. That’s why I
    like using Notepad++.


    **Tip**


    Well, you can actually use a different filename with a different file extension
    should you want to standardize your file naming convention. For example, you can
    use `Dockerfile` as the production-grade file while `dockerFile.dev` for use with
    development. The idea here is you have a proper document management strategy even
    for code files. After all, code files can be considered as documents. You don’t
    just want to track and manage code changes. You also want to properly classify
    them so that no one on your team accidentally deploys code that are still in development.
    It doesn’t matter if you’re automating code reviews or implementing continuous
    integration. A proper process to minimize human errors can help improve the DevOps
    practice. You will see an example of how to use a different filename to build
    a custom Docker image later in the chapter.


    The format of the `Dockerfile` looks like this:


    ```

    #Comment

    INSTRUCTION arguments

    ```


    The `INSTRUCTION` is not case-sensitive, which I find interesting given that Docker
    was originally built for Linux. However, the convention is to make the `INSTRUCTION`
    uppercase to easily distinguish them from the arguments. Let’s look at the different
    instructions that you can include in the `Dockerfile`. I’ll define the instructions
    here although not all of them will be used to create a custom SQL Server on Windows
    image. Some of them will be used for SQL Server on Linux.


    ### The `FROM` Instruction


    A `Dockerfile` must begin with a `FROM` instruction, although you can argue that
    it can begin with a comment. The `FROM` instruction specifies the base Docker
    image that you want to start from (pun intended). It could be an image of the
    base operating system or an existing image that you want to build from. When you’re
    building a custom golden image, the `FROM` instruction references a base operating
    system image. The following is the `FROM` instruction to tell the `Dockerfile`
    to use the Windows Server 2016 Core OS Build 14393.2972. A list of the available
    Windows Server Core images is available on [`https://hub.docker.com/_/microsoft-windows-servercore`](https://hub.docker.com/_/microsoft-windows-servercore).


    ```

    FROM mcr.microsoft.com/windows/servercore:10.0.14393.2972

    ```


    Similar to running the `docker run` command, if the image in the `FROM` instruction
    does not exist locally on the Docker host during the build, it will be pulled
    from the public repository before the custom image gets created.


    ### The `LABEL` Instruction


    The `LABEL` instruction is a key-value pair that adds metadata to an image. Think
    of it as additional comments about the custom image – what base image it uses,
    what application runs on it, what version it is, and the like. The following is
    an example of how you can write a multiline `LABEL` instruction:


    ```

    LABEL name="SQL Server 2016 with SP2 on Windows Server 2016"

    LABEL version="1.00.00"

    LABEL environment="dev/test"

    LABEL maintainer="theawesomedbateam@testdomain.com"

    ```


    This information is displayed in the `Labels` section output when you run the
    `docker inspect` command on the image you’re reviewing, as shown in Figure 9-2.


    ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig2_HTML.jpg](images/484552_1_En_9_Chapter/484552_1_En_9_Fig2_HTML.jpg)


    Figure 9-2

    SQL Server on Linux image metadata having multiple `LABEL` instructions


    Just like any kind of documentation, you need to define standards. You don’t want
    some of your `Dockerfile` files using the `LABEL` instruction while the rest use
    comments. I recommend using `LABEL` instructions as a standard in cases where
    someone using your custom image does not have access to the `Dockerfile`.'
