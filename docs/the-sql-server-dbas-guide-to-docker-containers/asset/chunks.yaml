  trans: '

    # 为文件和目录分配权限


    处理权限问题意味着我们也需要了解两种最常用的命令，用于分配适当的权限。`chown`（change owner 的缩写）是用于更改文件或目录所有权的命令。`chmod`（change
    mode 的缩写）是用于更改文件或目录对于所有者、所属组和其他用户的读、写和执行权限的命令。使用`chmod`分配权限有两种方式——第一种是使用字母数字字符（也称为符号模式），如`r`、`w`和`x`；第二种是使用八进制模式（你以为你已经逃过了将十进制转换为八进制的基础计算机课程？）。


    ## 更改所有者和所属组


    参考更改默认数据库备份目录的操作。创建目录后，你需要将其所有者更改为`mssql`用户。因为是你最初创建了这个目录，所以你的用户账户（以及你所属的组）拥有它。你希望`mssql`用户拥有对新的备份目录的读写权限，这样你的数据库备份才不会失败。因此，命令如下：


    ```bash

    sudo chown mssql /tmp/dbbackup

    ```


    这里还有一个有用的命令。`chgrp`（change group 的缩写）命令用于更改文件或目录的所属组。以下命令将新的备份目录的所属组更改为`mssql`组：


    ```bash

    sudo chgrp mssql /tmp/dbbackup

    ```


    如果你只更改了文件或目录的所有者而没有更改所属组，可能会出现权限不一致的情况，特别是当用户账户与所属组的权限不同时。用户账户可以被分配更精细的权限，但这需要更多工作。这就是
    Windows 中存在安全组的原因。更好的做法是创建一个安全组，为其分配权限，然后只需向该组中添加或从中移除用户即可。在`mssql`组的情况下，只有`mssql`用户在其中，为了保持一致性，将目录同时分配给该用户和该组是合理的。


    ## 分配执行权限


    让我们回到为文件和目录分配权限的问题上。如果你想创建一个名为`automateSQLinstall.sh`的 shell 脚本，用于自动化和配置在 Linux
    上安装 SQL Server，你需要使用（`+`）运算符为该文件分配`执行`（`x`）权限。请注意，使用（`-`）运算符将撤销权限。以下命令展示了一个简单的方法：


    ```bash

    chmod +x automateSQLinstall.sh

    ```


    这样做意味着授予你的用户账户、你所属的组以及所有其他用户`执行`权限。图 8-13 显示了为文件分配`执行`权限后的有效权限。


    ![分配执行权限前后的有效权限](img/484552_1_En_8_Fig13_HTML.jpg)


    图 8-13


    让我们解读文件上的有效权限。（`-`）符号告诉我这是一个普通文件。在运行`chmod +x automateSQLinstall.sh`命令之前，名为`emsarmiento`的用户和组只对该文件拥有`读`和`写`权限。之所以如此，是因为用户创建了该文件，作为副作用而拥有它。但如果你注意到，该用户对文件没有`执行`权限。与
    Windows 中具有特定文件扩展名（如`.vbs`或`.exe`）的脚本会自动标记为可执行不同，Linux 中的文件扩展名没有任何意义。你必须告诉 Linux
    该文件需要被执行，特定用户才能运行它。运行`chmod`命令后，名为`emsarmiento`的用户和组现在对该文件拥有了`读`、`写`和`执行`权限。此外，Linux
    在适用的情况下会自动分配隐式权限。即使我只授予了`执行`权限，`其他`组也被授予了`读`权限。这是因为用户在读写或执行文件或目录之前，需要先能够读取它。


    以下是一种更明确地授予文件`执行`权限的方式，其中`u=所有者`，`g=所属组`，`o=其他`：


    ```bash

    chmod u+x,g+x,o+x automateSQLinstall.sh

    ```


    或者这样：


    ```bash

    chmod u=rwx,g=rwx,o=rx automateSQLinstall.sh

    ```


    显然，有几种方法可以实现这个目标。而这甚至还没有涉及八进制模式。那么，让我们继续。


    ## 使用八进制模式


    在八进制模式中，数字代表权限，如下所示：


    *   4 = 读

    *   2 = 写

    *   1 = 执行


    这些值范围从 0 到 7。将这些数字转换为对应的权限：


    *   0 = `---`

    *   1 = `--x`

    *   2 = `-w-`

    *   3 = `-wx`

    *   4 = `r--`

    *   5 = `r-x`

    *   6 = `rw-`

    *   7 = `rwx`


    从 0 到 7 的每个数字都可以分配给`所有者`、`所属组`和`其他`列。如果你想为文件分配`执行`权限，以下命令使用八进制模式实现这一点：


    ```bash

    chmod 775 automateSQLinstall.sh

    ```


    > **注意：** 本章无意深入探讨 Linux 文件系统和权限操作。这个主题本身就需要单独的一整章来讨论。本节的目标是为本章及其他章节中命令的使用方式和原因提供参考。但正如你所见，这个主题是使用
    Linux 的核心。请记住，Linux 中的一切都是文件，必须为特定的系统进程和应用程序分配适当的权限才能运行。除非你确切知道自己在做什么，否则不要随意改动`/var/opt`目录下的权限。我强烈建议探索
    Apress 出版社提供的一些关于 Linux 文件系统和权限管理的书籍，以进行深入学习。

    '
- fmt: '## Writing a Simple Linux Bash Script


    What I’ve done in the preceding sections was simply provide the framework for
    creating a script to automatically install SQL Server on Linux. In fact, the title
    of this chapter should have been *Preparing to Automate Installation of SQL Server
    on Linux*. But whenever I have to deal with an automation script from a customer
    that performs a specific task, I get blank stares from people who have no clue
    how the script was written and the different tasks that it is doing. More often
    than not, the script was stitched together using snippets of code found online.
    Don’t get me wrong, there’s nothing wrong with stitching snippets of code found
    on the Internet so long as you know what it does, tested it, and properly document
    it. While I’m a big believer and advocate of automation, I highly emphasize the
    importance of process. When I worked as a data center engineer, I barely spent
    time on my computer. I’m either on my desk with pen and paper or on a whiteboard
    drawing workflows that define processes. That’s because good automation is based
    on a solid process. So, when we did our quarterly disaster recovery exercises,
    all we had to do was run automation scripts and monitor the outcomes. If a specific
    process needs improvement, we go back to the drawing board and make modifications
    to meet our recovery objectives and service-level agreements. Our process-driven
    automation was the key behind having a very small but effective team managing
    hundreds of servers.


    Now that we have the framework to install and configure SQL Server on Linux, it’s
    time to write the automation script. But before we do so, we need to know how
    to write the script and how to execute it.


    ### What is a Bash Script?


    A *bash script* is a plain text file that contains a series of commands. It’s
    called a bash script because the commands are interpreted using Bash (or **B**ourne
    **A**gain **Sh**ell). Bash is the default shell for most Linux distributions.
    In fact, you can check by running the command `echo $0` in your Linux command
    prompt. A bash script is a fully-fledged programming language in itself. This
    means you can define programming constructs such as variables, functions, and
    conditional execution of shell commands. Any command that you can run from the
    command line can be used in a bash script. Normally, a bash script has a `.sh`
    file extension to make it clear that it is a shell script. But as I mentioned
    in the previous section, Linux doesn’t really care about file extensions. But
    we humans do. And having some form of identification can immediately tell us what
    a file is for without opening it.


    ### Creating a Script File


    Create a simple text file on your computer. It doesn’t really matter whether you
    create it on a Linux or Windows computer. If you can create the file on Windows
    and copy it later to a Linux machine, that’s more than enough for now. Once you
    get the hang of creating and modifying files on Linux using utilities such as
    `vi` or `nano`, you can write your scripts inside a Linux shell terminal. I use
    `vi` on Linux because it is installed by default.


    The first line of the file is what tells the interpreter that it is an executable
    file. It is known as *shebang* (or a hashbang), and it is simply the absolute
    path to the Bash interpreter. The first line of the file should contain the following
    command:


    ```

    #!/bin/bash

    ```


    From here onward, you can write any command that you want to run from inside the
    script. Recall the sequence of tasks that we outlined in the previous sections
    to install and configure SQL Server on Linux. On a CentOS Linux system:


    *   Download the Microsoft SQL Server Red Hat repository configuration file for
    SQL Server 2017.

    *   Download and install the SQL Server installation packages for RHEL.

    *   Run the `/opt/mssql/bin/mssql-conf` script with the `setup` parameter and
    environment variables.

    *   Enable the SQL Server daemon to start on system boot.

    *   Configure the Linux firewall to allow traffic to port 1433.

    *   Enable the SQL Server Agent.

    *   Change the default data and log file directory.

    *   Change the default backup directory.

    *   Enable trace flag 3226.

    *   Restart SQL Server for the configuration changes to take effect.


    Be mindful of the sequence of tasks. The commands should meet the requirements
    for dependencies. For instance, I won’t be able to configure SQL Server unless
    it is first installed. I won’t be able to install it if the packages have not
    been downloaded. And I won’t be able to download the packages properly unless
    the repo file is already available on the system. You get the picture.


    ### Script Examples


    Combining all the commands that we used to accomplish every single task in the
    list, your script should look something like this (for CentOS/RHEL):


    ```

    #!/bin/bash

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

    sudo yum install -y mssql-server

    sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    sudo firewall-cmd --zone=public --add-port=1433/tcp --permanent

    sudo firewall-cmd --reload

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo mkdir /tmp/dbdata

    sudo chown mssql /tmp/dbdata

    sudo chgrp mssql /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    sudo systemctl restart mssql-server

    ```


    I normally write comments on my script to let other people know what it is doing.
    I’ve omitted them here for brevity. The corresponding script on Ubuntu is shown
    here:


    ```

    #!/bin/bash

    curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

    sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
    xenial main"

    sudo apt-get update

    sudo apt-get install -y mssql-server

    sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
    setup

    sudo systemctl enable mssql-server

    sudo ufw --force enable

    sudo ufw allow 22/tcp

    sudo ufw allow 1433/tcp

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo mkdir /tmp/dbdata

    sudo chown mssql /tmp/dbdata

    sudo chgrp mssql /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

    sudo mkdir /tmp/dbbackup

    sudo chown mssql /tmp/dbbackup

    sudo chgrp mssql /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    sudo systemctl restart mssql-server

    ```


    ### Setting Execute Permissions


    Save the script as `automateSQLinstall.sh`. If you created the script on your
    Windows machine, just copy it on your Linux `home` directory. Once it is in your
    `home` directory, you can assign the `execute` permission on the file using the
    following command:


    ```

    chmod +x automateSQLinstall.sh

    ```'
