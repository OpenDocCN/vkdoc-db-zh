  ## 优化 Dockerfile


  有几种方法可以优化镜像构建过程及最终生成的 Docker 镜像。我最关心的问题之一是文件系统层的大小。正是 Windows Server 2016 Core 基础镜像那
  11.1GB 的大小，让我避免使用 Windows 容器。而这还仅仅是操作系统本身。公开可用的 Linux 版 SQL Server 镜像大小为 1.4GB。更不用说
  Windows 上 SQL Server 安装文件的大小了。图 9-7 展示了针对自定义 Windows 版 SQL Server 镜像执行 `docker history`
  命令的结果。


  ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig7_HTML.jpg](img/484552_1_En_9_Fig7_HTML.jpg)


  图 9-7


  列出自定义 Windows 版 SQL Server Docker 镜像的不同文件系统层


  这些文件大小会影响作为构建过程和容器运行时一部分的文件系统层的拉取和推送速度。在我的测试环境中，仅使用自定义 `Dockerfile` 运行 `docker build`
  命令平均就需要 25 分钟。虽然你不会每小时都运行 `docker build` 命令，但你仍然需要考虑镜像大小和磁盘空间需求。


  优化 `Dockerfile` 的两种常见方法是减少指令数量和减小文件系统层的大小。但在我们探讨减少指令数量之前，先看看是否可以识别出一些可以合并到其他指令中的现有命令。看一下第
  5 步：


  ```

  #Step 5

  RUN powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

  ```


  它只是调用 PowerShell 命令行并将 `MSSQLSERVER` 服务的启动类型设置为 `自动`。我们可以将此指令合并，作为 `/SQLSVCSTARTUPTYPE`
  参数包含在第 4 步中，第 4 步大致如下所示（重点在最后一个参数）：


  ```

  #Step 4

  RUN C:/SQL2016Dev_SP2/SETUP.exe /Q /ACTION=INSTALL /UPDATEENABLED=True /UPDATESOURCE=./SQLServer2016SP2CU11
  /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER /SECURITYMODE=SQL /SAPWD="y0urSecUr3PAssw0rd"
  /SQLSVCACCOUNT="NT AUTHORITY\System" /AGTSVCACCOUNT="NT AUTHORITY\System" /SQLSYSADMINACCOUNTS="BUILTIN\Administrators"
  /IACCEPTSQLSERVERLICENSETERMS=1 /TCPENABLED=1 /SQLSVCSTARTUPTYPE="Automatic"

  ```


  提示


  我喜欢使用 `ConfigurationFile.ini` 文件来替代 SQL Server 安装命令行参数，从而缩短第 4 步。如果你选择这样做，请务必将 `ConfigurationFile.ini`
  文件复制到 `SQL2016Dev_SP2` 目录内，并将其作为命令行参数的一部分调用。并且在自动化之前进行验证。


  移除第 5 步所节省的空间——根据图 9-7 是 75.5MB——相对于镜像的总体大小来说微不足道。但这只是一个开始。评估现有指令，看看能否将它们合并到其他指令中。一旦你穷尽了所有可以合并到其他指令中的可能指令，就该组合相关的指令了。


  看看第 4 和第 6 步。两者都使用了 `RUN` 指令。并且由于第 2 步也是一个 PowerShell 命令，为什么不使用 PowerShell 作为默认命令行呢？我们可以在第
  1 步之后引入一个新的 `SHELL` 指令，如下所示：


  ```

  SHELL ["powershell", "-Command"]

  ```


  因为我们可以将第 4 步作为 PowerShell 命令调用，所以我们可以使用分号 (`;`) 将其与第 6 步合并，如下所示，将其变成一个单独的 `RUN`
  指令。我还把 `setup.exe` 参数值中使用的双引号替换为单引号，以避免字符串被错误解释。我不想让双引号在 PowerShell 中被解释为特殊字符。


  ```

  #Step 4 and 6 combined in a single line

  RUN C:/SQL2016Dev_SP2/SETUP.exe /Q /ACTION=INSTALL /UPDATEENABLED=True /UPDATESOURCE=./SQLServer2016SP2CU11
  /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER /SECURITYMODE=SQL /SAPWD=''y0urSecUr3PAssw0rd''
  /SQLSVCACCOUNT=''NT AUTHORITY\System'' /AGTSVCACCOUNT=''NT AUTHORITY\System'' /SQLSYSADMINACCOUNTS=''BUILTIN\Administrators''
  /IACCEPTSQLSERVERLICENSETERMS=1 /TCPENABLED=1 /SQLSVCSTARTUPTYPE=''Automatic'' ;
  Remove-Item -Path C:/SQL2016Dev_SP2 -Recurse -Force

  ```


  了解不同的 Windows 命令和 PowerShell cmdlet 将有助于你知道哪些 `RUN` 指令可以合并。请参考 Windows 命令列表 [*https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/windows-commands*](https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/windows-commands)。你也可以运行
  `Get-Command` PowerShell cmdlet 来检索你的 Windows 安装中所有原生的 PowerShell cmdlet。


  还有什么？我们可以移除第 7、8、9 步以及两个 `ENV` 指令。我真的不喜欢 `start.ps1` PowerShell 脚本，因为我已经在 `setup.exe`
  中提供了所需的参数——`SA_PASSWORD` 和 `ACCEPT_EULA`——分别对应 `/SAPWD` 和 `/IACCEPTSQLSERVERLICENSETERMS`。另外，我没有任何需要附加的
  Azure Blob 存储上的示例数据库。而且，我可以用 `ENTRYPOINT` 指令调用 SQL Server 可执行文件来替换第 10 步。以下是经过修改、精简后的
  `Dockerfile` 的样子：


  ```

  #Step 1

  FROM mcr.microsoft.com/windows/servercore:10.0.14393.2972

  #Step 1A – switch the default command shell to PowerShell

  SHELL ["powershell", "-Command"]

  #Step 2

  RUN mkdir C:/SQL2016Dev_SP2

  #Step 3

  COPY /SQL2016Dev_SP2 C:/SQL2016Dev_SP2

  #Step 4 and 6 combined in a single line

  RUN C:/SQL2016Dev_SP2/SETUP.exe /Q /ACTION=INSTALL /UPDATEENABLED=True /UPDATESOURCE=./SQLServer2016SP2CU11
  /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER /SECURITYMODE=SQL /SAPWD=''y0urSecUr3PAssw0rd''
  /SQLSVCACCOUNT=''NT AUTHORITY\System'' /AGTSVCACCOUNT=''NT AUTHORITY\System'' /SQLSYSADMINACCOUNTS=''BUILTIN\Administrators''
  /IACCEPTSQLSERVERLICENSETERMS=1 /TCPENABLED=1 /SQLSVCSTARTUPTYPE=''Automatic'' ;
  Remove-Item -Path C:/SQL2016Dev_SP2 -Recurse -Force

  #New Step 10

  ENTRYPOINT ["C:/Program Files/Microsoft SQL Server/MSSQL13.MSSQLSERVER/MSSQL/Binn/sqlservr.exe"]

  ```


