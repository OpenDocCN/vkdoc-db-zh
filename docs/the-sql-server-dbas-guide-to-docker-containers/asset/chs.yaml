- '# 总结


  在本章中，就管理 Docker 和容器而言，我们涵盖了很多内容。但这还不是全部。这足以让您从 SQL Server DBA 的角度开始管理容器和 Docker
  主机。随着您更多地使用 Docker，您将更深入地接触 Linux 操作系统。我相信您从`第 3 章`开始已经学到了很多关于 Linux 的知识。而我们只是触及了表面。我可以保证，当您读完本书时，您将能够处理
  Linux 文件系统、配置守护进程、管理系统资源等等。当您在 Docker 容器中运行更多 SQL Server 时，您别无选择，只能精通 Linux。


  在“在主机和容器之间共享文件”一节中，我介绍了使用卷（volumes）使 Docker 主机上的目录在容器内部可用。下一章将更详细地介绍这一点，以及如何为有状态的应用程序（特别是
  SQL Server）管理和持久化容器内的数据。此外，如果无法在其中持久化数据，关系数据库又有何用？我们将确保这种情况不会发生在您容器内的 SQL Server
  数据库中。




  '
- '# 7. 数据持久化


  > *好记性不如烂笔头。*

  >

  > ——中国谚语


  刚在我的书桌前安顿下来不久，我就向我的主日学老师要了一些纸和蜡笔。并不是因为我喜欢写字，而是作为一个生病的孩子，这几乎是为数不多我能做的事情之一。根据我的医生所说，我不能进行剧烈运动，不能做体育活动，甚至不能大笑（他们就是这么告诉我的）。所以，我只能读书、弹钢琴和写字——或者说涂鸦，因为我连自己写的字都认不出来。


  我的主日学老师递给我一个 Magic Slate（魔法画板），据她说，这是一个可以反复使用的绘画工具。我四岁的小脑瓜试图理解它是什么以及它是如何工作的。而且，那时我只知道铅笔——有时是蜡笔——和纸。我被告知可以在上面画画，掀起那层薄薄的纸就能擦掉我的画，然后可以一遍又一遍地想画多少次就画多少次。它配有一支触控笔，但我的指甲就足够用来涂鸦了。于是，我开始涂鸦和画画。我在上面写下了我的名字。我甚至尽可能详细地试着画了一个孩子的脸。有趣的是，当我给我的“模特”看我这幅“艺术肖像”时，我们俩都笑了起来。


  当他在魔法画板上掀起那层薄薄的纸时，我们的笑声戛然而止。我那幅花了好几个小时精心绘制的画，在不到我说出“本！”所需的时间里就消失了（如果你正在读这个，抱歉，本。总得有人当替罪羊，而我碰巧是讲这个故事的人）。我崩溃了。这怎么可能发生？我放声大哭，直到我的主日学老师走过来问我们发生了什么。当我试图解释我的画所表演的“消失术”时，她提醒我，魔法画板就是这么工作的。你在上面写写画画，然后掀起那层薄膜就能擦掉一切。它就是那样设计的。我花了足足半个小时才最终平静下来，重新要了纸和蜡笔。我回到了我知道有效的方法上，并发誓再也不碰那个魔法画板了。至少我当时是这么想的。


  在你过于投入于将 SQL Server 数据库部署到容器上之前，我想确保你明确一点：Docker 容器最初被设计为**无状态**的。这意味着它们不具备数据持久性，当它们被移动到另一台服务器（例如你决定部署一个包含多个主机的
  Docker Swarm 集群）或容器被销毁时，它们无法维持数据。对于 SQL Server 数据库专业人员来说，这是一个大忌。我们想要存储并持久化数据。我们想要保护它，备份它，并确保需要时它就在那里。这个
  Docker 东西怎么可能适合 SQL Server 或任何类型的数据存储平台呢？


  如果情况果真如此，我本可以跳过撰写本章。但我没有。本章涵盖了在容器中处理有状态应用程序（如关系数据库）的内容。我将向你介绍 Docker 卷，如何使用它们，以及如何使用卷来存储
  SQL Server 数据库文件。一旦你完成配置，你就会看到 Docker 容器如何用于有状态应用，尤其是 SQL Server。


  ## 有状态应用 vs. 无状态应用


  我在前一节提到，Docker 最初是被设计为无状态的。无状态应用不会保存在一个会话中产生的客户端数据供下一个会话使用。想象一下，每隔一周从你最喜欢的理发师那里理发。无状态意味着你每次去都要告诉理发师你想要什么样的发型。你的理发师不会记录你偏好的发型，也不会记住你在店里最喜欢的椅子，更不会给你他们招牌的洗发头皮按摩；你明白这个意思了。


  相比之下，有状态应用则会保存每次会话中产生的客户端数据，并在客户端下次请求时使用这些数据。这就好比你的理发师，在你踏进店门的那一刻，就已经为你准备好了你最喜欢的椅子、将要用于招牌头皮按摩的洗发水，并且已经准备好为你做你偏好的发型。所有关于你和你的偏好的信息都存储并持久化在理发师的大脑中。然而，你可能会争辩说大脑是临时存储，因为如果你的理发师决定去度假，你就不得不告诉替代理发师你所有的偏好。更好的存储这些信息的方法是写在一张纸上供所有理发师查阅——或者，如果理发店足够高级，可以使用一个带有后端数据库的客户关系管理（CRM）系统。


  我假装很了解发型和理发店，但我其实并不懂。我已经十年没去理发店了。请不要评判我。


  ## 容器是短暂且不可变的


  我最喜欢的电影《黑客帝国 2：重装上阵》中的一个场景是尼奥与先知的对话。虽然他们讨论中传达的哲学思想更让我着迷，但他们对话中的这段特定问答引起了我的注意。对话是这样的：


  *   *尼奥：那为什么一个程序会被删除呢？*

  *   *先知：也许它崩溃了。也许一个更好的程序被创建出来替代它——这种事一直在发生。*


  我不确定这段对话是否是容器这两个原则背后的灵感：**短暂**和**不可变**。但它确实是解释它们如何应用于容器的一个好方法。


  短暂意味着容器的生命周期很短——是临时的。不可变意味着容器是不变的；它们在创建之后，状态和内容就无法被修改。就像先知向尼奥解释程序为什么会被删除一样，一个应用可能故障，也可能为了提供额外功能而被升级。先知说得对，这种事确实一直在发生。但我们过去处理服务器上运行的软件以应对这两种可能结果的方式，却与尼奥的做法大相径庭。当一个应用出现故障或需要升级时，我们不会删除它。我们会把它迁移到不同的服务器——或者不同的虚拟机（VM）上。我们维护、打补丁、更新、迁移等等。运行应用的服务器有更长的生命周期，并且会不断更新——但很少被删除。我们将它们带入软件的下一个版本，随之带来所有可能影响应用稳定性和性能的包袱和垃圾。难怪升级或迁移项目会耗费如此多的时间和资源。


  另一方面，容器的生命周期非常短。想要在容器上运行应用的新版本？很简单。不要更新容器。只需删除它，然后部署一个包含新版本应用的新容器。听起来太简单了？你将不得不等到本章稍后部分才能看到实际操作。




  '
- '# 云服务商如何实现基础设施即服务


  您是否曾好奇过，像亚马逊网络服务（AWS）、微软 Azure 或谷歌云平台这样的云服务商，如何能以极短的停机时间轻松扩展虚拟机的规模？他们会告诉您选择一个更大的虚拟机规格并重启机器。仅此而已。起初，我对这种“最小停机时间的扩展”方法持怀疑态度，因为它违背了我所知的关于升级和扩展服务器的一切认知。我作为数据中心工程师从事这项工作多年，这肯定不是几分钟就能完成的——尤其是对于拥有大型数据库的
  SQL Server 而言。于是，我在微软 Azure 和 AWS 上都进行了尝试。图 7-1 展示了云服务商从概念上如何实现这种虚拟机的扩展方法。


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig1_HTML.jpg](img/484552_1_En_7_Fig1_HTML.jpg)


  *图 7-1：虚拟机如何在云端以最小停机时间进行扩展*


  我感到震惊。它确实如文档所述那样有效。但我仍未完全信服。我结合自己所有关于扩展运行 SQL Server 数据库的服务器的知识，开始进行思想实验（您知道的，就是那种我们用来假装自己比普通数据库管理员聪明的实验）。以下是事实。


  SQL Server 数据库本质上就是文件——`MDF`、`NDF`和`LDF`文件——数据库引擎通过访问这些文件来读写数据。这些文件存储在连接到具有计算资源（CPU
  和内存）的服务器的存储子系统上。如果我需要扩展一台服务器以增加计算能力，并要求停机时间极短，我通常会有另一台安装了相同版本和版本的操作系统及 SQL Server
  的服务器可用。然后，我会开始在机器之间复制数据库，使用`数据库镜像`或`日志传送`。如果有可用的存储资源，我会复制整个存储子系统——同时让目标机器上的 SQL
  Server 数据库引擎保持停止状态——而不仅仅是复制数据库。一旦准备好切换到扩展后的机器，我只需停止源机器，完成复制过程，然后在目标机器上启动 SQL Server
  数据库引擎。停止源机器上的 SQL Server 数据库引擎会使其干净地关闭所有数据库，然后终止服务。这涉及提交或回滚事务、将所有脏页写入磁盘，然后在事务日志中写入一个条目。在目标机器上启动
  SQL Server 数据库引擎会使其运行恢复过程——读取事务日志并在将数据库联机之前提交或回滚事务。自 SQL Server 诞生以来，它就是这样工作的。所以，这里没什么新东西。


  **提示**


  文章《Understanding Logging and Recovery in SQL Server》（理解 SQL Server 中的日志记录和恢复）包含了更多关于
  SQL Server 在日志记录和恢复方面内部原理的信息。这是基础性信息，其概念也适用于除 SQL Server 之外的所有商业关系数据库管理系统。请访问 [`https://docs.microsoft.com/en-us/previous-versions/technet-magazine/dd392031(v=msdn.10)`](https://docs.microsoft.com/en-us/previous-versions/technet-magazine/dd392031%2528v%253Dmsdn.10%2529)
  查阅该文章。


  还记得我说的思想实验吗？如果不再需要为源和目标机器分别配备两个独立的存储子系统来存放数据库文件，而是简单地将存储与服务器解耦呢？如果存储不是直接连接到服务器，而我们只是有一个指向存储的指针呢？服务器可以访问远程存储，SQL
  Server 数据库引擎也可以访问这些文件。将计算与存储解耦，使您能够以最小的停机时间执行扩展过程，因为您所需要做的就是将新的计算资源指向旧的存储。这不已经在
  SQL Server 2012 中可用了吗——将数据库文件存储在`SMB`文件共享中？SQL Server 2014 中呢——将数据库文件存储在`Azure Blob
  存储`中？


  **注意**


  当被问及我跟上并掌握新技术的秘诀时，我通常的回答是“不要忘记旧的”。有趣的是，我们看到这些新技术特性要么是旧技术的改进，要么是旧技术的组合。以`SQL Server
  Always On 可用性组`为例。它是`数据库镜像`和`Windows Server 故障转移群集`的结合——这两者自 SQL Server 2005 起就已可用（故障转移群集则更早）。可读的辅助副本呢？它是`行版本控制`的实时实现，同样，这个特性自
  SQL Server 2005 起就已可用。SQL Server 2008 中引入的`文件流`特性呢？它是`内存中 OLTP`的支柱。我可以没完没了地列举每个新版
  SQL Server 引入的不同特性，并且我能找到它们在某个旧特性中的根源。要么是微软已经预见到了未来并正在引领市场走向他们的方向，要么是他们非常擅长最大化利用现有的技术投资。我认为这是一个绝妙的策略。我猜我的主日学老师甚至在
  Oracle 与 Neo 进行那场对话之前就对技术有所了解。她一直告诉我《圣经》中一句非常著名的话：“已有的事，后必再有；已行的事，后必再行。日光之下，并无新事。”


  啊，原来他们就是这样做的。图 7-2 展示了云服务商通过将计算与存储解耦，从概念上如何实现虚拟机的这种扩展方法。


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig2_HTML.jpg](img/484552_1_En_7_Fig2_HTML.jpg)


  *图 7-2：计算与存储解耦使得虚拟机能够以最小的停机时间进行扩展*


  仔细想想，我们几十年来一直在使用这种方法，自从 2000 年代初`存储区域网络（SAN）`出现以来就是如此。服务器（计算）运行应用程序，而数据存储在其外部——即存储中。进行这个思想实验让我想起了
  2006 年为一个大型 SQL Server 2000 `故障转移群集实例（FCI）`所做的迁移项目。由于 SQL Server `FCI`的计算与存储是解耦的，我们通过将其连接到现有的`SAN`并（当然经过适当验证后）将其加入群集，相当迅速地更换了其中一个有问题的故障转移群集节点。这也让我想起了
  2010 年做的另一个数据中心迁移项目。遵循前面描述的工作流顺序，并在地理位置之间复制存储子系统，使我能够在不到一小时内将 400 多台 SQL Server
  物理机从洛杉矶的一个数据中心迁移到拉斯维加斯的另一个数据中心。


  由于虚拟机只是一个存储在磁盘上的文件系统格式，加上代表计算资源（CPU、内存、网络）的元数据，扩展起来就容易多了。只需将存储从旧虚拟机重定向到新虚拟机即可。云服务商可以在后台通过自动化的工作流过程完成这一切，包括在源和目标虚拟机上分别正确停止和启动
  SQL Server 服务的步骤，只要底层硬件拥有支持新虚拟机的适当计算资源。



  ## Docker 卷


  容器短暂且不可变的概念，与计算和存储解耦的设计，共同使得 Docker 能够运行像关系型数据库这样的有状态应用。尽管容器最初是为运行无状态应用而设计的，但将数据存储在容器之外，使你能够利用其短暂和不可变的特性，同时也能在你决定删除程序（我指的是容器）时保留数据。


  回想第 5 章，容器由一个存储在 Docker 主机本地存储上的文件系统层组成。该文件系统层构成了容器本身，并与其生命周期绑定。文件系统层——包括你在其中存储的数据——在创建容器时被创建，在删除容器时被删除。非常直接，对吧？为了将计算与存储解耦，我们需要一个存在于容器之外的对象。这时就需要
  Docker 卷。


  Docker 卷是一个表示容器外部文件系统的对象。它是容器联合文件系统之外的一个目录，在 Docker 主机的文件系统上作为一个普通的目录存在。Docker 卷是持久化容器生成和使用的数据的首选方式。我喜欢把
  Docker 卷想象成一个网络共享文件夹——它在操作系统（容器）内看起来像一个文件夹，但实际上是外部的。卷存在于容器之外，允许你向其中添加任意多的数据而不影响容器的大小，这对于
  SQL Server 数据库来说是完美的。而且，因为它是一个存在于容器之外的对象，所以使用其专属的 `docker volume` 子命令进行管理。例如，如果你想创建一个
  Docker 卷，可以运行以下命令。请务必提供一个有意义的名称。否则，Docker 会为它分配一个 64 字符的 GUID 值作为名称。我相信在读完第 5 章后，你肯定不想再看到更多那样的
  64 字符 GUID 值名称了。


  ```

  docker volume create samplevolume

  ```


  默认情况下，创建 Docker 卷会在主机上创建一个目录，在 Linux 中位于 `/var/lib/docker/volumes`，在 Windows 中位于
  `C:\ProgramData\docker\volumes`。


  创建 Docker 卷后，你可以使用 `docker volume inspect` 命令检查其元数据：


  ```

  docker volume inspect samplevolume

  ```


  图 7-3 展示了在 Windows 主机和 Linux 主机上创建的 Docker 卷的元数据。请注意以下信息：


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig3_HTML.jpg](img/484552_1_En_7_Fig3_HTML.jpg)


  图 7-3

  创建和检查 Docker 卷元数据


  *   **驱动程序**：这显示了存储卷驱动程序的名称。默认情况下，Docker 会使用内置的 `local` 驱动创建卷。这意味着这些卷只在其创建所在的主机上的容器可用。

  *   **挂载点**：这显示了 Docker 主机本地文件系统中目录的完整路径。当你将卷挂载到容器时，容器中生成的任何数据都将存储在这里。


  因为 Docker 卷本质上只是文件系统层中的目录，我可以直接从主机向这些目录添加和修改文件，而无需运行容器。


  **提示**


  在 Linux 上工作时，请始终注意权限。在 Windows 中，我只需是本地管理员组的成员就可以访问 `C:\ProgramData\docker\volumes`
  目录，但在 Linux 中情况并非如此。`root` 用户拥有 `/var/lib/docker/volumes` 目录（以及 `/var/lib/docker`
  下的所有内容）。为了直接访问这些目录并进行任何更改，你需要拥有 `root` 权限。你可以切换到 `root` 用户，或者在命令前加上 `sudo`。


  图 7-4 显示了我分别在 Linux 主机和 Windows 主机上复制到 Docker 卷中的一个简单文件。请记住，我当前没有任何正在运行的容器。


