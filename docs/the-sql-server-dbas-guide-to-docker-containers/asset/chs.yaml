  ## 需要考虑的事项


  通过运行几条命令就能在 Windows 和 Linux 容器上轻松拉取并运行一个 SQL Server，这种感觉是不是很棒？确实如此。但请不要过于兴奋。使用像
  Docker 这样的新环境也带来了新的挑战，你需要对此有所了解。


  ### 许可证


  第一个问题是许可证。我无意冒充许可专家，但我处理 SQL Server 许可事务已有多年，深知如何谈论它。你可能想知道你拉取的镜像中运行的是哪个版本的 SQL
  Server。无论是名称还是标签都没有像 Windows 容器版的 SQL Server 那样明确指出。该镜像默认是免费的**开发者版**。对于任何测试或学习目的，我坚持使用免费版本——开发者版和
  Express 版。这样选择不会错。你可以通过在`docker run`命令中包含`MSSQL_PID`环境变量来选择其他版本，前提是你拥有这些版本的有效许可证。并且在生产环境中部署容器化的
  SQL Server 时，务必咨询你的 Microsoft 许可专家。他们对此有最终决定权。


  ### 密码复杂性


  第二个是`SA_PASSWORD`环境变量。`sysadmin`密码应满足[SQL Server 密码策略](https://docs.microsoft.com/en-us/sql/relational-databases/security/password-policy)中所述的复杂性要求。由于这是安装过程中的必需参数，不符合此策略将导致安装失败并使容器停止。


  我第一次运行前述命令在 Linux 容器上运行 SQL Server 时，就通过惨痛教训明白了这一点。运行`docker run`命令并期待其正常工作后，我无法弄清楚为什么不能远程连接到
  SQL Server 实例（我将在下一节更详细地讨论这一点）。我当时以为是防火墙端口未开放导致的。于是，我进行了常规的 PING 和 TELNET 测试。一无所获。我能够连接到
  1433 端口一小会儿，但几分钟后，该端口就不再响应了。我检查了容器是否仍在运行，发现它在几分钟后就终止并退出了。这激起了我的好奇心，想知道到底发生了什么。查看日志后，我看到了如图
  4-17 所示的 SQL Server 错误消息。


  ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig17_HTML.jpg](img/484552_1_En_4_Fig17_HTML.jpg)

  *图 4-17：来自容器日志的 SQL Server 错误日志*


  我花了几个小时试图弄清楚为什么容器一运行就终止，最终才发现我的`sysadmin`密码不符合密码策略。


  同样，使用对你的 shell 环境（如 PowerShell 或 SSH）有特殊含义的特殊字符，尤其是像下面的示例那样使用单引号而非双引号时，也可能导致问题：


  ```

  docker run -e ''SA_PASSWORD=$Qlu=j&Q7a0N'' ...

  ```


  几年前我写了一个简单的 PowerShell 脚本来生成复杂密码。偶尔，该脚本会生成一个以特殊字符开头的密码，这个字符在我使用的 shell 环境中有特殊含义。以下是我曾用于创建
  Linux 容器版 SQL Server 的其中一个密码。注意它以`$`字符开头。


  ```

  $Qlu=j&Q7a0N

  ```


  因为`$`字符在 PowerShell 和 Linux 中都有特殊含义（`$`字符代表变量表达式），当它作为`SA_PASSWORD`环境变量的值传递时，会被解释为变量表达式。它也不符合
  SQL Server 的密码策略要求。


  ### 容器命名


  最后是使用`--name`参数为容器分配名称。为容器恰当命名不仅是一个好习惯，也能避免四处忙乱地试图弄清楚`cranky_haslett`这个容器是什么以及它的用途。我在
  Linux 主机上多次运行了`hello-world`容器，以展示系统自动生成的不同名称。如果不是镜像名称，我根本无法弄清楚`relaxed_sammet`容器是什么。关于一些非常有趣的系统生成名称列表，请参考图
  4-18。


  ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig18_HTML.jpg](img/484552_1_En_4_Fig18_HTML.jpg)

  *图 4-18：系统生成的 Docker 容器名称*


  如果你对 Docker 如何生成这些名称感到好奇，请参考其源代码：[`github.com/moby/moby/blob/master/pkg/namesgenerator/names-generator.go`](https://github.com/moby/moby/blob/master/pkg/namesgenerator/names-generator.go)。没有理由不在工作中寻找乐趣。



  ## 远程连接 SQL Server 实例


  我通常不喜欢在生产服务器上安装任何不必要的客户端工具。事实上，自从 Windows Server Core 开始支持 SQL Server 数据库引擎以来，我就一直试图说服我的客户在上面安装它（虽然成功案例很少，但我至少尝试过）。我的目标是尽可能缩小服务器的暴露面，并阻止人们直接登录到服务器。这减少了攻击面，并最大限度地减少了人为错误和管理开销。我数不清有多少次，有人因为误以为自己登录的是测试服务器而不小心重启了生产服务器——或者有人使用专用的终端服务会话来运行一个简单的查询，从而阻止了其他管理员登录。


  我的做法是，在一台客户端工作站上安装所有管理服务器所需的客户端工具——远程服务器管理工具（RSAT）、TELNET 客户端、SFTP 客户端、SQL Server
  Management Studio 等等。然后使用这台客户端工作站远程连接并管理服务器。此外，企业应用的部署通常也是如此，客户端远程连接到服务。


  在单服务器部署中，连接到容器的最简单方法是利用 Docker 主机的 IP 地址或 DNS 名称（如果你有 DNS 服务器）。你在使用 `docker run`
  时用到的 `-p` 参数，允许你使用 Docker 主机的 IP 地址远程访问容器，并将 Docker 主机上的指定端口映射到容器上的指定端口。在示例的 `docker
  run` 命令中，我们将主机的 1433 端口映射到容器的 1433 端口。


  要找出主机的 IP 地址，你可以运行：


  *   Windows 上运行 `ipconfig`

  *   CentOS 或 Ubuntu 上运行 `ip addr`


  在尝试连接到容器内的 SQL Server 实例之前，先进行基本的网络测试，比如 PING 和 TELNET。我总是从这两个测试开始，以确保连接问题与 SQL
  Server 无关。我不想浪费大量时间排查 SQL Server 问题，结果却发现是端口被防火墙规则阻止了。如果 PING 测试没有得到响应，我并不会总是假设服务宕机了。也可能只是网络管理员作为其安全策略的一部分禁用了
  ICMP 响应。对 SQL Server 端口号进行 TELNET 测试会告诉我 SQL Server 是否正在监听。只有当我没有收到“无法打开到主机的连接”这样的错误消息时，我才会继续使用客户端应用程序进行测试。


  启动 SQL Server Management Studio，使用你指定的 IP 地址和 `sysadmin` 凭据连接到 SQL Server Docker
  容器。图 4-19 显示了一个简单查询的结果，用于显示实例名称和 SQL Server 版本。我在运行查询时使用了 SQLCMD 模式，这样在连接到远程 SQL
  Server 实例时就不必不断提供实例名称和凭据。


  ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig19_HTML.jpg](img/484552_1_En_4_Fig19_HTML.jpg)

  **图 4-19**

  使用 SSMS 远程连接到容器上的 SQL Server


  回想一下 `-h` 参数的用途，它用于反映服务器主机名——服务器主机名就是默认 SQL Server 实例的实例名称。此外，可用的 SQL Server on
  Linux 容器运行在 Ubuntu Linux 16.04.6 LTS 上，即使你的 Docker 主机是 CentOS Linux 7。


  一旦你进入 SQL Server Management Studio，用户体验就是相同的。你不必在命令行中操作，也不必学习所有新的 SQL Server 命令行工具。你可以在一个熟悉的环境中，舒适地执行所有你曾经做过的管理任务。


  ## 容器的生命周期


  运行 `hello-world` 容器让你对其生命周期有了一个简单的概述——从创建、执行到终止。请记住，容器只有在内部的主要进程仍在运行时才会存在——这就是为什么
  `hello-world` 容器在屏幕上打印完整文本后立即退出。


  一个容器会经历以下不同的状态，当你运行 `docker ps -a` 时，可以在 `STATUS` 列中看到它们：


  *   `Created`：当你使用 `docker create` 命令创建了一个容器但尚未运行它时，就是这个状态，可能是为稍后运行做准备。

  *   `Running`：容器正在启动并运行，执行其任务。

  *   `Exited`：容器已经经过了 `RUNNING` 状态并完成了任务。由于其内部的主要进程不再运行，容器退出。

  *   `Paused`：当你选择使用 `docker pause` 命令暂停一个正在运行的容器时的状态，这会挂起容器中所有正在运行的进程。

  *   `Restarting`：一种容器状态，表示已配置了重启策略。你可以将其视为服务器重启，这是我们不希望 SQL Server 容器发生的事情。

  *   `Dead`：当 Docker 守护进程尝试停止容器但失败时的状态。


  可以认为运行 `docker run` 命令是运行 `docker create` 命令和 `docker start` 命令的组合。假设你想对 `hello-world`
  容器分别使用 `docker create` 和 `docker start` 命令：


  ```

  docker create hello-world

  ```


  与 `docker run` 命令类似，这将返回容器 ID 值。你将这个值作为参数传递给 `docker start` 命令，包括 `-a` 参数，以将容器的输出附加到你的终端控制台。我通常在
  `docker` 命令中只传递容器 ID 的前 12 个字符。图 4-20 展示了运行 `docker create` 和 `docker start` 作为运行
  `docker run` 的替代方法。


  ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig20_HTML.jpg](img/484552_1_En_4_Fig20_HTML.jpg)

  **图 4-20**

  运行 `docker create` 和 `docker start` 命令


  ```

  docker start -a 3df6324e4c12

  ```


  我很少单独使用这两个命令，而只是依赖 `docker run` 命令来创建和运行容器。


  容器的状态与虚拟机（VM）经历的不同状态相似——你可以随时启动、停止或暂停它们。而且很像虚拟机，当你停止容器时，运行在其中的进程也会变得不可用。容器及其关联的数据会保留在
  Docker 主机的文件系统中，直到你显式移除它。移除容器并不会移除镜像。回想一下，容器是镜像的运行时实例。你可以从参考镜像中创建、启动、停止和移除任意数量的容器——这不会影响镜像本身。你可以从
  Docker 主机删除该镜像。这样做会触发 Docker 守护进程在你决定再次运行它时，从配置的容器镜像仓库中拉取该镜像。我们将在第 5 章更详细地介绍镜像和容器的内部原理。


  '
- '# 总结


  对构成 Docker 生态系统的不同组件有所了解，可以帮助你意识到运行一个容器需要什么。这为你开始在生产环境部署容器做好了准备。


  我们已经了解了 Docker CLI 客户端的角色以及如何使用它来运行 Docker 命令。我们探讨了 Docker 守护进程如何成为你与 Docker 交互的核心。我们还研究了镜像与容器之间的区别，以及
  Docker 守护进程如何与 Docker Hub 交互以拉取（以及在你开始创建自己的自定义镜像时推送）镜像。理解镜像命名约定可以帮助你同时使用公开可用的镜像和你将创建的镜像。


  在容器上运行一个 SQL Server 并远程连接到它并非难事，特别是 Microsoft 已经提供了可用的镜像。并且一旦你连接到容器内的 SQL Server
  实例，真的没有什么区别。你可以使用那些你多年来用于操作 SQL Server 的工具和命令。


  在本章中，我向你介绍了一些 `docker` 命令，以帮助你开始使用容器。你肯定需要掌握这些命令，因为你将会经常用到它们：


  *   `docker version`: 显示 Docker 版本信息；用于验证安装

  *   `docker info`: 显示系统范围的信息；也用于验证安装和检查配置

  *   `docker run`: 在一个新容器中运行一个命令，或者从 SQL Server 的角度来看，运行一个带有 SQL Server 实例的容器

  *   `docker search`: 在 Docker Hub 中搜索可用的容器镜像

  *   `docker pull`: 从容器注册表中拉取一个或一组镜像

  *   `docker images`: 显示存储在 Docker 主机本地文件系统中的所有镜像

  *   `docker ps`: 列出可用的容器


  准备好迎接下一章，我们将更详细地从文件系统的角度来探讨镜像和容器。


  ## 5. Docker 镜像与容器


  > “美：所有部分比例协调，使得无法增、删或改变，而不损害整体的和谐。”

  >

  > —莱昂·巴蒂斯塔·阿尔贝蒂


  出生和成长在一个发展中国家自有其挑战，有趣的是，至少可以这么说。我们家属于中低收入阶层，只有一个挣钱的人。所以，像零食和看电影这样的事情被认为是奢侈。想象一下，我
  8 岁时第一次走进麦当劳餐厅时的感受。


  1984 年的一个夏日午后，我们的“提塔”（阿姨）带我和我哥哥去了麦当劳餐厅。我第一次接触开心乐园餐的经历平淡无奇—— regular burger（ regular
  汉堡）配上薯条和一杯饮料，还附赠了一套乐高积木。就一个 8 岁的孩子而言，这是一顿附带玩具套餐的盛宴（事实上，当时的份量也很大）。我从阿姨的脸上看出，如果我们要求更多，她会非常乐意满足。我不需要任何说服。菜单上展示了一杯诱人的巧克力奶昔图片，是炎炎夏日的完美饮品。


  当服务员准备我的奶昔时，我忍不住注意到旁边有一个巨大的 soda dispenser（苏打水机）。每个准备带饮料订单的服务员都会把一个空杯子放在其中一个分配器下面，按下其中一个可爱的小按钮，饮料就出来了。我幼小的大脑立刻充满了问题。饮料是从哪里来的？它怎么知道去哪里取水、可口可乐或根汁汽水？它怎么能把所有饮料都装进那个小机器里？机器后面是不是有个人，他唯一的工作就是给苏打水机加饮料？真的会下芝士汉堡雨吗？


  当你在一家销售十几种或更多饮料的全球快餐连锁店工作时，了解像 soda dispenser（苏打水机）这样的机器如何工作是有帮助的。你想知道饮料供应商是谁，如何将正确的饮料罐连接到
  soda dispenser（苏打水机），以及如果机器停止分配饮料该怎么办。我 8 岁时的问题，无论是针对那台苏打水机，还是现在处理 Docker 镜像和容器，都同样有效。


  本章将从存储的角度介绍 Docker 镜像和容器的内部工作原理。我们将探讨镜像的构成、如何描述它们以及它们如何在文件系统中存储。你越了解 Docker 如何处理镜像，就越有能力设计自己的自定义镜像。


  **注意**


  除非另有说明，本章中的大部分示例都将与 Linux 相关。这将给你一个机会，在同时学习 Docker 镜像和容器的同时，提高你使用 Linux 文件系统的技能。



  ## 快速回顾（然后再深入一点…）


  在上一章中，我从高层次概述了镜像与容器的区别。我将重复一遍，因为重复是掌握的关键。但由于本书更侧重于深入探讨镜像和容器，我们将更详细地探索这些概念。那么，开始吧。


  一个 Docker 镜像是一个静态的、*只读*的模板，用于创建应用容器。它是运行应用程序所需的各种组件的非运行状态表示。镜像由一组按照文件系统层次结构组织的文件组成，其中包含应用文件、应用所需的操作系统依赖文件（如库）以及描述其内容的元数据。每个文件系统层仅仅是相对于前一层的差异集合，类似于一系列
  SQL Server 事务日志备份，它们与完整的数据库备份一起构成了一个日志序列链，而完整备份即为基础镜像。回想一下你在上一章运行`docker pull`命令的情景。图
  5-1 展示了对应于`docker pull`命令输出的、SQL Server on Linux 镜像的分层文件系统。不要认为那一堆系统生成的、64 个字符（通常显示为
  12 位的短字符串）的十六进制字符串是无意义的。每条“Pull complete”消息都代表构成整个镜像的一个文件系统层。


  ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig1_HTML.jpg](img/484552_1_En_5_Fig1_HTML.jpg)


  图 5-1


  包含镜像层的 SQL Server on Linux 镜像


  然而，一个 Docker 容器是该镜像的运行时实例。你创建和运行的每个 Docker 容器都将基于这个只读的镜像模板。你可以将 Docker 镜像视为蓝图，就像汽车的技术图纸。你根据你希望汽车（Docker
  容器）的外观和功能来创建蓝图（Docker 镜像）。一旦蓝图最终确定，你就可以根据该蓝图创建任意数量的汽车实例。你可以自由地改变汽车的美学——颜色、配件、内饰等——而无需修改蓝图。如果你决定对汽车进行重大修改，你必须回到绘图板重新编写蓝图。


  如果 Docker 镜像是只读模板，那么你如何可能运行需要对文件系统进行更改的容器呢？向只读介质写入数据就像试图向一次性写入的 CD-ROM 写入数据一样。第二次是行不通的（而且在当今世界，谁还用
  CD-ROM 呢？）。当然，如果我们要修改只读模板内的文件，底下一定有些魔法在起作用。此外，一个只读数据库除了用于报告和分析之外，还有什么用处呢？即使是对 SQL
  Server 实例的简单配置更改也需要修改`master`数据库数据文件。


  秘密在于，容器实际上是一个位于只读层之上的薄薄的可读写文件系统层。图 5-2 展示了 Docker 容器如何作为一个薄薄的可读写文件系统层，在只读层之上运行。`docker
  run`命令返回代表这个薄薄的可读写层的容器 ID。


  ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig2_HTML.jpg](img/484552_1_En_5_Fig2_HTML.jpg)


  图 5-2


  作为可读写文件系统层的 SQL Server on Linux 容器


  这个可读写文件系统层类似于 Microsoft Hyper-V 中的差异磁盘和 VMWare 中的链接克隆的工作原理。你可以从同一个镜像创建任意多的容器，在镜像和容器之间形成一对多的关系。你对容器所做的任何更改都只发生在可读写文件系统层中，不会影响基础的只读层。这个薄薄的可读写层也解释了为什么容器比物理机或虚拟机启动得更快。与虚拟机不同，你不需要在容器中启动整个系统。你只是在启动它们，跳过了启动操作系统所需的所有进程。由于
  Docker 主机的操作系统基础已经启动，容器所要做的就是创建可读写文件系统层并加载所有必要的文件来启动其中的应用程序。


  既然我们已经确立了 Docker 容器实际上是一个运行在只读文件系统层之上的薄薄的可读写文件系统层这一事实，让我们开始更深入地挖掘一下。


  ## 拉取镜像的背后原理


  在上一章中，“Docker 如何运行容器”一节让你了解了 Docker 生态系统中的不同组件如何协同工作以运行容器。第 4 步是 Docker 守护进程联系 Docker
  Hub 搜索并拉取镜像，为运行它做准备。但是，你是否想过 Docker Hub 如何知道你的 Docker 主机运行在什么平台上，以及如何提供正确的镜像呢？我指的是当你运行`docker
  info`命令时获得的平台信息，如图 5-3 所示。


  ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig3_HTML.jpg](img/484552_1_En_5_Fig3_HTML.jpg)


  图 5-3


  来自`docker info`命令的你的 Docker 主机平台信息


  回想一下，在 Microsoft 废弃他们的`hello-world`镜像版本之前，我可以在 Windows Server 和 Linux Docker 主机上运行相同的`docker
  run hello-world`命令，并得到相同的输出。只要存在可用的镜像，Docker Hub 就会根据平台信息为你的 Docker 主机提供正确的镜像。


  在上一章的第 4 步和第 5 步之间，有一些处理*清单（manifests）*的中间步骤。不要对清单是什么感到困惑。它只是一个描述镜像内容的 JSON 文件的华丽说法：构成镜像的文件系统层、它们的大小和摘要（digest）。图
  5-4 介绍了这些中间步骤。


  ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig4_HTML.jpg](img/484552_1_En_5_Fig4_HTML.jpg)


  图 5-4


  Docker Hub 根据清单发送正确的镜像


  让我们探索第 4 步和第 5 步之间的中间步骤：


  1.  如果 Docker 守护进程没有`hello-world`容器镜像的本地副本，它会在 Docker Hub 中搜索该镜像（第 4 步）。Docker 守护进程还发送平台信息——主要是操作系统和
  CPU 架构——到 Docker Hub 并查询清单。

  2.  如果存在一个“胖”清单，Docker Hub 会在其中搜索与 Docker 守护进程的平台信息（来自第 4a 步）匹配的部分，并将查询重定向到相应的镜像清单（第
  4b 步）。

  3.  解析镜像清单，读取构建镜像所需的相应文件系统层。然后，这些文件系统层被发送到 Docker 守护进程（第 4c 步）。

  4.  一旦下载完成，Docker 守护进程就会基于`hello-world`镜像创建并运行一个新容器（第 5 步）。


  使用胖清单允许像 Docker Hub 这样的镜像仓库向 Docker 主机提供正确的镜像。你肯定不希望一个 Linux Docker 主机从镜像仓库拉取一个基于
  Windows 的镜像，对吧？那是无法工作的。



  ### 胖清单？


  步骤 #4a 引入了所谓的“胖”清单。我其实不太清楚它为什么被称为“胖”清单，但官方术语是 `manifest list`。你可以把清单列表想象成“清单的清单”。拥有“胖”清单的理念是为了提供无缝的多架构支持用户体验，这正是
  Java 曾经吹嘘的“一次编写，随处部署”原则的真正精髓。有了“胖”清单，我就不必再为寻找适用于当前平台的正确镜像名称和标签组合而担心了。例如，我可以在不同的操作系统和
  CPU 架构上运行 `docker run hello-world` 命令。


  让我们使用 `docker manifest` 命令来检查 `hello-world` 镜像的“胖”清单。由于这是一个实验性命令，你需要使用 `export`
  命令启用 `DOCKER_CLI_EXPERIMENTAL` 环境变量。运行以下命令来查看 `hello-world` 镜像的清单列表。图 5-5 展示了 `hello-world`
  镜像支持的不同架构片段以及定义它的字段。


  ![../images/484552_1_En_5_Chapter/484552_1_En_5_Fig5_HTML.jpg](img/484552_1_En_5_Fig5_HTML.jpg)


  图 5-5


  hello-world 镜像的胖清单


  ```

  export DOCKER_CLI_EXPERIMENTAL=enabled

  docker manifest inspect hello-world

  ```


  `hello-world` 镜像的“胖”清单告诉我们，我们可以在多种操作系统和 CPU 架构组合上运行容器——例如 x86 和 amd64 上的 Linux、Windows
  10 Build 10.0.17134.885，以及 ARM 上的 Linux 等。想象一下在树莓派设备上运行 Docker 容器。


  注意


  我希望 SQL Server 容器也能如此。不幸的是，微软的文档明确指出，Windows Server 和 Linux 上的 SQL Server 2017 及更高版本仅支持“与
  x64 兼容”的处理器类型。SQL Server 运行在像 DEC Alpha 这样的非 x64 平台上的日子已经一去不复返了。不过，Azure SQL Database
  Edge 对于基于 ARM 的 Linux 设备来说看起来很有前景。更多详情请查看 [*https://azure.microsoft.com/en-us/services/sql-database-edge/*](https://azure.microsoft.com/en-us/services/sql-database-edge/)。它仍处于开发的早期阶段。


  以下是表明其为“胖”清单的字段：


  *   `mediaType`：其值为 `application/vnd.docker.distribution.manifest.list.v2+json`。

  *   `schemaVersion`：其值为 2。


  “胖”清单是可选的——你可以在没有它的情况下创建 Docker 镜像。如果它不存在，则会跳过步骤 #4a，Docker 守护进程的查询会直接发送到镜像清单（步骤
  #4b）。Linux 上的 SQL Server 镜像就是一个这样的例子。由于它是专门为 Linux on amd64 平台创建的，`mediaType` 字段将只显示一个镜像清单。请参考以下
  `mediaType` 值以区分它与“胖”清单：


  *   `"mediaType": "application/vnd.docker.distribution.manifest.v2+json"`


  运行以下命令来检查 `SQL Server on Linux` 镜像的镜像清单。图 5-6 展示了 SQL Server on Linux 镜像清单的片段。


