  ### 镜像清单


  如果存在一个“胖”清单，其内部会有一个 `manifests` 字段，其中包含一个指向不同平台镜像清单的列表，就像指向镜像清单的指针。如果不存在，当你运行 `docker
  manifest inspect` 命令时，你得到的就是 `镜像清单`。镜像清单提供了构建镜像所需的不同文件系统层的详细信息，以及一个配置，该配置告诉 Docker
  守护进程如何将所有层拼凑在一起以运行容器。你可以把不同的文件系统层看作乐高积木，把镜像清单看作搭建说明书（这就是我第一次吃到“开心乐园餐”时如此难忘的原因）。通用的乐高积木本身并不知道它们之间是如何关联的。只有搭建说明书拥有将它们全部连接起来的细节，这样你才能拼出一个星球大战千年隼号。你甚至可以用现有的积木（文件系统层）创建自己的乐高结构（Docker
  镜像），只要你同时也创建了自己的搭建说明书（镜像清单）——即使说明书只存在于你的脑海中。从仓库中拉取 Docker 镜像的过程包括获取镜像清单和文件系统层。


  运行以下 `docker inspect` 命令来探索 `hello-world` 镜像的低层级细节。请注意，你是在检查一个镜像，而不是容器。你可以使用 `docker
  inspect` 命令来检查镜像和容器。但此刻我们只对镜像感兴趣。


  ```

  docker inspect hello-world

  ```


