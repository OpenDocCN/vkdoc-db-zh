  ## 将卷挂载到容器


  让我们使用上一节创建的 Docker 卷，并将其挂载到容器。对于 Linux 容器，我将使用 CentOS 7 镜像，并将 `samplevolume` 卷挂载到它。使用
  `docker run` 命令的 `--mount` 参数，如下所示。我传入了 `-it` 参数（`i` 用于交互，`t` 用于伪 TTY 或终端会话），以便检查其内部的文件系统。`docker
  run` 命令的 `--mount` 参数使用易于理解的 `key=value` 对。在提供的示例中，`source` 是 Docker 卷的名称，`target`
  是容器内的目录。


  ```

  docker run --mount source=samplevolume,target=/tmp/dockervolume -it centos:7

  ```


  你将看到在创建容器之前复制到卷中的 `thisIsLinux.txt` 文件。图 7-6 展示了从容器内部看到的该文件。


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig6_HTML.jpg](img/484552_1_En_7_Fig6_HTML.jpg)


  图 7-6

  将卷挂载到 Linux 容器并显示其内容


  对于 Windows 容器，我将使用 Windows Server 2016 Nano Server 镜像，并将 `samplevolume` 卷挂载到它。但我不使用
  `docker run` 命令的 `--mount` 参数，而是使用 `-v`（或 `--volume`）参数。这是在 Windows Server 容器中挂载卷的支持方式。有关如何处理
  Windows Server 容器中的持久存储，请参考 [*https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/persistent-storage*](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/persistent-storage)。


  ```

  docker run -v samplevolume:c:\dockervolume -it microsoft/nanoserver:sac2016 powershell

  ```


  你将看到在创建容器之前复制到卷中的 `thisIsWindows.txt` 文件，如图 7-7 所示。


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig7_HTML.jpg](img/484552_1_En_7_Fig7_HTML.jpg)


  图 7-7

  将卷挂载到 Windows 容器并显示其内容



  ### 选择 `-v` 还是 `--mount`


  除了 Windows Server 容器和 Linux 容器之间的支持差异外，您可能想知道 `docker run` 命令的 `-v` 和 `--mount`
  参数之间还有什么区别。 `-v` 参数出现得更早，因此您会在文档和在线资源中看到更多它的用法。 `--mount` 参数是在 Docker 17.06 版本中才引入的。最初，`-v`
  参数用于独立容器，而 `--mount` 参数用于 Docker Swarm 中的服务。现在，您可以在两种场景下都使用 `--mount` 参数。此外，`--mount`
  参数的语法通过显式使用 `key=value` 对，更易于理解。请看这个将卷挂载到 Linux 容器的示例 `docker run` 命令。


  如果目录不存在，这两个参数都会在 Docker 主机上创建该目录。但它们不会告诉您您试图挂载到容器上的卷是否已经存在。这对于任何其他类型的应用程序来说都没问题，但对于
  SQL Server 来说肯定不行。想象一个在 Linux 容器上运行的 SQL Server，它使用一个卷来存储系统数据库和用户数据库。如果您启动一个新容器并挂载另一个
  SQL Server 容器已在使用的现有卷，您会收到一个 `Error 17113`，如图 7-8 所示，并附有 `Access is denied`（访问被拒绝）的错误信息。这是因为现有容器中的
  `sqlservr` 进程已经对用于运行 SQL Server 实例的系统数据库文件持有独占锁。


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig8_HTML.jpg](img/484552_1_En_7_Fig8_HTML.jpg)


  图 7-8


  将卷挂载到一个新的 SQL Server 容器，而该卷已被现有的 SQL Server 容器使用


  除非您是在 Windows 容器（或就此而言，任何 Windows Server 容器）上部署 SQL Server，否则建议在新部署中使用 `--mount`
  参数。更多信息，请参阅 Docker 关于使用卷的文档：[*https://docs.docker.com/storage/volumes/*](https://docs.docker.com/storage/volumes/)。


  ### 在容器之间共享卷？


  在我研究如何在容器之间共享数据时，Docker 卷这个话题经常被提及。这并不奇怪，因为连 Docker 都推荐这样做。当您阅读关于使用卷的文档时，这是列出的优势之一：*卷可以在多个容器之间更安全地共享。*


  等等，什么？Docker 容器运行时引擎的创造者 Docker，告诉你要使用卷以便在多个容器之间共享它们？你一定是在开玩笑吧！而且其他所有人也都这么说。


  在完成了之前章节中提到的“最小化停机时间的向上扩展”方法的思考实验后，我决定再次整合我对 SQL Server 的了解，并审视关于 Docker 卷的这个说法是否合理。那么，我们来分析一下。SQL
  Server 数据库引擎会为访问数据库文件发起独占锁。它这样做是因为能够使用数据库的一部分前提是打开属于它的所有文件并执行恢复操作。如果 SQL Server
  数据库引擎对所有数据库文件都持有独占锁，那么其他进程——比如另一个 SQL Server 数据库引擎——就不可能获得对同一组数据库文件的独占访问权。Microsoft
  建议将 SQL Server 数据库文件排除在防病毒扫描之外是有原因的：就是为了确保在 SQL Server 进程需要使用这些文件时，它们没有被锁定。更别提那些绕过
  SQL Server API 在执行备份时静默数据库文件的第三方工具了。那些你以为是来保护你的工具，恰恰就是造成灾难的元凶。


  鉴于 SQL Server 进程需要对数据库文件持有独占锁，让多个 SQL Server 容器访问同一个卷是没有意义的。我重申一遍：让多个 SQL Server
  容器访问同一个卷是没有意义的。还记得图 7-8 中的错误信息吗？我希望我已经说得很清楚了。


  为 Docker 说句公道话，既然容器最初是为无状态应用程序设计的，那么让多个容器访问同一个卷的做法是完全合理的。假设你有一个所有应用程序通用的日志记录模块。该模块可以在一个容器中实现，并将日志文件写入一个可以在多个日志记录容器之间共享的卷中。由于大多数日志应用程序主要是写入密集型，读取访问非常少（除非在某个心情不佳的审计员突然要求提供详细审计报告时），将日志文件存储在单个卷中具有“单一事实来源”的好处。另外，你也不必进行那些提取-转换-加载（ETL）或提取-加载-转换（ELT）过程，因为所有数据都存储在一个地方——这个卷。


  这一点值得重申：让多个 SQL Server 容器访问同一个卷是没有意义的。




  '
- '# 在容器中利用卷与 SQL Server


  在第 6 章中，我在“在主机和容器之间共享文件”一节重点介绍了卷的使用。既然你已经理解了 Docker 卷及其工作原理，就很清楚这就是我们在容器中运行 SQL
  Server 时持久化数据的方式。


  在 Linux 主机上运行以下命令，将已创建的卷`samplevolume`附加到 Linux 容器上的 SQL Server：


  ```bash

  docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
  sqldevlinuxcon01 -d -h linuxsqldev01 --mount source=samplevolume,target=/var/opt/mssql
  mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

  ```


  `/var/opt/mssql`目录是 Linux 中 SQL Server 的默认目录。该目录包含以下结构：


  *   `data`：包含系统数据库文件、用户数据库文件和事务日志文件的目录

  *   `log`：包含 SQL Server 错误日志文件、默认跟踪文件和默认扩展事件会话的目录

  *   `secrets`：包含为 SQL Server 实例生成的服务主密钥的目录


  在创建 Linux 容器上的 SQL Server 期间，`/var/opt/mssql`目录的内容作为安装过程的一部分被复制到容器中。因为我们告诉 Docker
  将容器内的`/var/opt/mssql`目录挂载到`samplevolume`卷，所以该目录的内容会在 Docker 主机的本地文件系统中创建——即`/var/lib/docker/volumes/samplevolume/_data`。就像图
  7-6 中一样，你会看到在容器创建前复制到卷中的`thisIsLinux.txt`文件。图 7-9 展示了从 Docker 主机文件系统内部看到的该文件以及`/var/opt/mssql`目录的内容。


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig9_HTML.jpg](img/484552_1_En_7_Fig9_HTML.jpg)


  图 7-9


  挂载到 Linux 容器上 SQL Server 的卷的内容


  容器启动并运行后，我可以在 SQL Server 中创建一个示例用户数据库，数据库文件将在`samplevolume`卷中创建。图 7-10 展示了从容器文件系统和
  Docker 主机文件系统内部看到的数据库文件。是的，我确实创建了一个名为`sampleDB`的示例数据库。


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig10_HTML.jpg](img/484552_1_En_7_Fig10_HTML.jpg)


  图 7-10


  在卷中创建的 SQL Server 数据库文件


  ## 将系统数据库和用户数据库放置在不同位置


  请记住，由于 Linux 中 SQL Server 的默认目录是我们挂载到卷的位置，因此系统和用户数据库都将在同一位置创建。但没有任何限制阻止你保持系统数据库的默认数据库文件位置，而仅为用户数据库使用卷。在
  Linux 主机上运行以下命令，将已创建的卷`samplevolume`附加到 Linux 容器上的 SQL Server，使用容器内的`/tmp/dbdata`目录作为用户数据库文件位置。请务必停止并删除现有的
  Linux 容器上的 SQL Server，以便重用容器名称和端口号。


  ```bash

  docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
  sqldevlinuxcon01 -d -h linuxsqldev01 --mount source=samplevolume,target=/tmp/dbdata
  mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

  ```


  在我的示例中，我还清理了`samplevolume`卷中与 SQL Server 相关的内容，只保留了`thisIsLinux.txt`文件。删除容器不会删除卷的内容。请记住，卷存在于容器之外。我还使用了以下`CREATE
  DATABASE`命令来创建示例数据库。注意`target`目录——`/tmp/dbdata`的使用。


  ```sql

  CREATE DATABASE [sampleDB]

  ON PRIMARY

  (NAME = N''sampleDB'', FILENAME = N''/tmp/dbdata/sampleDB.mdf'')

  LOG ON

  (NAME = N''sampleDB_log'', FILENAME = N''/tmp/dbdata/sampleDB_log.ldf'')

  ```


  图 7-11 显示了默认 SQL Server 目录内的系统数据库和`samplevolume`卷内的示例用户数据库。


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig11_HTML.jpg](img/484552_1_En_7_Fig11_HTML.jpg)


  图 7-11


  在卷中创建的 SQL Server 用户数据库


  ## 在 Windows 容器上配置卷


  实际上，这就是 Windows 容器上 SQL Server 的配置方式。与 Linux 容器上 SQL Server 将整个`/var/opt/mssql`目录复制到容器不同，公开可用的
  Windows 容器上的 SQL Server 仍然利用默认的 SQL Server 目录——`C:\Program Files\Microsoft SQL Server\MSSQL{nn}.MSSQL\`。将卷挂载到
  Windows 容器上的 SQL Server 只会在容器文件系统内创建目标目录，它不会更改默认数据库文件位置，因为 SQL Server 实例已经安装好了。


  在 Windows Server 主机上运行以下命令，将已创建的卷`samplevolume`附加到 Windows 容器上的 SQL Server，使用容器内的`C:/dbdata`目录。同样，请务必停止并删除现有的
  Windows 容器上的 SQL Server，以便重用容器名称和端口号。


  ```powershell

  docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
  sqldevwincon01 -d -h winsqldev01 -v samplevolume:C:/dbdata microsoft/mssql-server-windows-developer

  ```


  图 7-12 展示了 Windows 容器的等效情况：默认 SQL Server 目录内的系统数据库和`samplevolume`卷内的示例用户数据库。


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig12_HTML.jpg](img/484552_1_En_7_Fig12_HTML.jpg)


  图 7-12


  在卷中创建的 SQL Server 用户数据库 - Windows 容器


  ## 自定义默认数据库位置


  注意


  你可以修改在容器上运行的 SQL Server 的默认 SQL Server 数据库文件位置——无论是 Windows 还是 Linux。你可以通过创建自定义
  SQL Server 镜像来实现，而不是使用 Microsoft 提供的公开镜像。第 9 章和第 10 章分别介绍了如何为 Windows 和 Linux 创建自定义
  SQL Server 镜像。


  我见过客户这样部署 SQL Server 数据库——系统数据库存储在与用户数据库不同的位置。我也见过客户将 SQL Server 数据库——包括系统和用户——部署在同一位置。两种做法没有对错之分，也不是一种是最佳实践而另一种不是。但将系统和用户数据库保留在同一位置有一个好处。你将在下一节看到一个非常好的例子。


  ## 卷的删除和持久性


  移除容器不会移除卷。因为卷存在于容器之外，你不必担心有人意外删除容器并抹掉其中的所有数据库——当然你也不必担心这个，因为它从未发生。


  尽管卷是存在于容器之外的对象，但只要有一个现有容器正在使用它，你就无法删除该卷。祝你好运。Docker 知道卷何时附加到容器，并且不允许你移除它，即使你使用`docker
  volume rm`命令的`-f`参数也不行。图 7-13 显示了我尝试删除我的 Windows 和 Linux 容器上 SQL Server 正在使用的`samplevolume`卷的结果。错误消息还显示了正在使用它的容器的容器
  ID 值。


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig13_HTML.jpg](img/484552_1_En_7_Fig13_HTML.jpg)


  图 7-13


  Docker 阻止删除附加到正在运行容器的卷




  确保您跟踪 SQL Server 容器使用的卷。您不希望将一个已被其他 SQL Server 容器使用的现有卷挂载到一个新容器上。即使在当今持续集成、持续交付和
  DevOps 的世界中，恰当的流程和文档仍然无可替代。


  ## 智能 SQL Server 就地升级


  过去我们更新或升级 SQL Server 的方式是下载累积更新（是的，从 SQL Server 2017 开始，微软不再发布服务包）并将其安装到 SQL Server
  实例上。安装过程会停止 SQL Server 服务，应用二进制文件，然后重新启动 SQL Server 服务。这适用于 Windows 和 Linux 上的 SQL
  Server。


  此过程存在风险，可能影响您的服务级别协议 (SLA)。首先，SQL Server 实例所需的停机时间取决于整个更新过程运行的时间长度。我过去见过 SQL Server
  服务包安装耗时长达一小时甚至更久的情况。对于 SLA 要求非常严格的系统来说，这是无法接受的。其次，如果更新的安装未按计划进行，回滚过程可能从令人烦恼到绝对痛苦不等。还记得过去因为服务包安装失败而不得不恢复所有数据库备份的时候吗？


  在上一节中，我提到了将系统数据库和用户数据库保存在同一位置的一个极大好处：快速更新 SQL Server 实例。还记得我们如何将计算与存储解耦吗？与其安装 SQL
  Server 更新，不如用新版本的 SQL Server 切换计算部分？让我来演示一下。


  在 Linux 主机上运行以下命令，将创建的卷 `samplevolume02` 挂载到 SQL Server on Linux 容器。我们将把 SQL Server
  on Linux 的默认目录（`/var/opt/mssql`）挂载到该卷。再次提醒，请务必停止并移除现有的 SQL Server on Linux 容器，以便您可以重用容器名称和端口号。


  ```

  docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
  sqldevlinuxcon01 -d -h linuxsqldev01 --mount source=samplevolume02,target=/var/opt/mssql
  mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

  ```


  创建一个示例数据库，以便您可以验证系统数据库和用户数据库是否已创建并存储在 `samplevolume02` 卷中。图 7-14 显示了我所用镜像的 SQL Server
  版本（SQL Server 2017 CU14，版本号 14.0.3076.1）以及示例数据库的数据库版本号（869）。


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig14_HTML.jpg](img/484552_1_En_7_Fig14_HTML.jpg)


  图 7-14


  镜像的 SQL Server 版本和数据库版本号


  为更新做准备，我将从 Microsoft Container Registry 拉取公开可用的 SQL Server 2017 CU17 镜像。这样，我就不必将拉取镜像所需的时间计入维护窗口。我的有效停机时间将只包括在容器之间切换和更新
  SQL Server 的时间。


  ```

  docker pull mcr.microsoft.com/mssql/server:2017-CU17-ubuntu

  ```


  我将使用此镜像创建一个运行 SQL Server 2017 CU17 的新容器。此时，我的 SQL Server 2017 数据库仍在运行，并且没有经历任何停机。这里概述的流程就是我升级
  SQL Server 2017 的方式：


  1.  停止现有的 SQL Server on Linux 容器：


  ```

  docker stop sqldevlinuxcon01

  ```


  2.  创建一个新的 SQL Server on Linux 容器，赋予一个新名称 `sqldevlinuxcon02`，基于 SQL Server 2017
  CU17 镜像。将 `samplevolume02` 卷挂载到这个新容器。我重用了相同的端口号和主机名。


  ```

  docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
  sqldevlinuxcon02 -d -h linuxsqldev01 --mount source=samplevolume02,target=/var/opt/mssql
  mcr.microsoft.com/mssql/server:2017-CU17-ubuntu

  ```


  就这样，您的 SQL Server 2017 CU14 实例及所有数据库已更新为 SQL Server 2017 CU17。图 7-15 显示了包含更新过程痕迹的
  SQL Server 错误日志。


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig15_HTML.jpg](img/484552_1_En_7_Fig15_HTML.jpg)


  图 7-15


  更新容器时的 SQL Server 错误日志


  重新运行图 7-14 中使用的相同查询，现在得到了一个不同的 SQL Server 版本号（14.0.3238.1），但数据库版本号相同，如图 7-16 所示。


  ![../images/484552_1_En_7_Chapter/484552_1_En_7_Fig16_HTML.jpg](img/484552_1_En_7_Fig16_HTML.jpg)


  图 7-16


  已更新的 SQL Server on Linux 容器


  注意


  如果您决定将 SQL Server 2017 on Linux 容器升级到 SQL Server 2019，您需要从拥有一个非 root 用户运行的 SQL Server
  2017 容器开始。微软修改了 SQL Server on Linux 容器的部署方式，以最小化安全风险。大多数 Docker 容器内的进程以 `root` 用户身份运行。容器中的
  `root` 用户也是 Linux 主机上的同一个 `root` 用户。这基本上意味着如果容器被攻破，Linux 主机也会被攻破。还记得在 Windows 机器上拥有本地管理员权限的
  SQL Server 服务账户吗？或者拥有 Active Directory 域管理员权限的那个？


  升级现有的 SQL Server 2017 on Linux 容器并不像运行一个新的 SQL Server 2019 容器并将现有卷挂载到它那么简单。因为 SQL
  Server 2017 on Linux 容器默认以 `root` 身份运行，`root` 用户拥有卷中所有 SQL Server 文件夹和文件的所有权。为了使
  SQL Server 能够启动，必须将文件夹和文件的所有权重新分配给非 root 用户。更多信息，请参阅构建和运行非 root SQL Server 2017
  容器的过程：[*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-docker?view=sql-server-2017#buildnonrootcontainer*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-docker%253Fview%253Dsql-server-2017%2523buildnonrootcontainer)。


  我没有删除 SQL Server 2017 CU14 容器，这样我可以将其用作回滚计划。该容器仍然存在，处于 `Stopped` 状态。这就是我创建了一个新容器并赋予新名称
  `sqldevlinuxcon02` 的原因——Docker 无法使用与现有容器相同的名称创建新容器，除非您像之前练习中那样删除旧容器再创建同名的新容器。如果更新过程失败，我可以像切换到
  SQL Server 2017 CU17 容器一样快地回退到 SQL Server 2017 CU14 容器。


  但请注意，老牌的备份仍然无可替代。虽然使用容器执行 SQL Server 更新非常容易且快速，但事实是，在停止现有容器和创建新容器之间，数据库文件并未被锁定。这可能会导致
  Docker 主机上的其他进程在更新过程中获取对 SQL Server 数据库文件的独占锁。在进行更新之前，请使用原生 SQL Server 备份或任何受支持的
  SQL Server on Linux VDI 客户端来备份数据库。




  ## 本章小结


  在本章中，我指出了在容器上运行 SQL Server 时需要注意的一些事项。虽然容器最初是为无状态应用设计的，旨在具备短暂性和不可变性，但通过使用 Docker
  卷将存储与计算解耦，使得容器能够运行像 SQL Server 这样的有状态应用。提供的示例展示了如何使用 Docker 卷存储 SQL Server 数据库，并利用它们执行诸如更新数据库引擎且停机时间最小化的运维任务。


  下一章，我将介绍如何在 Linux 上操作 SQL Server，为你创建自己的 Linux 版 SQL Server 镜像做准备。作为一名 SQL Server
  DBA，我将假定你已具备 Windows 上 SQL Server 如何运作的基础知识，因此我只会重点说明其在 Linux 上运作的关键差异。


  本章的结束语，我将引用 Oracle 留给 Neo 的那句话：“准时抵达彼处，你便有机会。” 当合适的时机来临，你的准备将为你铺平道路。


  '
- '# 第 8 章：在 Linux 上操作 SQL Server


  > 策略繁多，原则寥寥；策略会变，原则永恒。

  >

  > ——约翰·C·麦克斯韦博士


  当租车公司的工作人员把钥匙递给我时，她简要地解释说，他们现在只有手动挡汽车了。她看到我拿着北美驾照，就假设我不会开手动挡车。我不得不讲述我 15 岁时，哥哥用一辆
  1986 年的铃木 Samurai 吉普车教我开车的故事。当我说起那辆吉普车时，她脸上顿时有了光彩——那是她小时候家里开的车。我猜，仅仅提到这辆吉普车就勾起了她与家人共度的奇妙童年回忆。


  她办完了手续，并指引我去停车场取车。当我走近那辆车时，我注意到有些奇怪。“为什么人们都走在街道的另一边？”我问自己。又或许，是因为在飞机上待了将近 12 个小时，我还在试图适应这座城市。“只是时差反应罢了，”我告诉自己。但当我拉开车门时，事情变得更加诡异——这是一辆右舵车。这时我才意识到，这根本不奇怪。我在英国，这里的人们靠道路的另一边行驶。这才是他们的常态。


  在道路的另一边开车，我其实没什么大问题。在新加坡生活三年半的经历，让我学会了如何应对在马路的另一边乘坐公交车、行走，甚至坐在汽车的副驾驶座上。“没什么大不了的，”我想，“能有多难？”我知道怎么开手动挡车，也知道如何在道路的另一边应对。我错了。开出那个停车场让我感觉自己又像个驾校学员了。熄火带来的挫败感，在即将驶近减速带时，在缓慢转弯时，甚至在启动汽车向前开时都会发生。你知道那种感觉吗？明明知道该怎么做——因为你这辈子都在这么做——却做不到？我花了大约两天时间才终于找到节奏，正常驾驶。我开始喜欢上这种感觉了。但是，然后，我就得还车了。


  如果你整个职业生涯都在与 SQL Server 打交道，我能理解你甚至不愿考虑在 Linux 上运行它的抵触心理。你整个职业生涯都建立在 Windows 之上——你的工作电脑和你管理的服务器都是如此。你熟悉各种快捷方式，你编写了脚本，你非常擅长解决问题（这就是为什么在家庭节日聚会上你总是那个技术支持）。我猜你正想着加入那成千上万只懂管理
  Windows 服务器的 IT 专业人士的退休大军。我并不怪你。大型企业在 Windows 服务器上运行着关键业务的 SQL Server 数据库。这已经占用了你大量时间。为什么要转向
  Linux？


  现实情况是，自微软在 2017 年宣布支持 SQL Server on Linux 以来，企业已经开始将其 SQL Server 数据库迁移到 Linux。鉴于
  Docker 最初就是为 Linux 操作系统开发的，下一步合乎逻辑的举措就是在 Docker 容器上运行 SQL Server。因此，当你还在犹豫是否要看一眼那个企鹅图标时，你的职业生涯将取决于它。


  本章涵盖在 Linux 上操作 SQL Server。我们将了解其架构和设置体验。我们将比较在 Windows 与 Linux 上运行 SQL Server 的异同。我们还将编写简单的
  Linux `bash` 脚本。本章的目标是让你深入理解如何创建一个可部署为容器的自定义 Linux 版 SQL Server 镜像。我向你保证，这绝不会像在伦敦繁忙的街道上开手动挡车那样令人紧张和沮丧。


  ## SQL Server on Linux 架构


  在第 1 章中，我讲述了在年度微软 MVP 峰会的一个高管圆桌会议上，我如何了解到赫尔辛基项目的往事。在那次宣布之后，我立即开始提问，关于 `SQL Server`
  工程团队是如何成功完成将 `SQL Server` 移植到 `Linux` 这一几乎不可能的任务。我对 Oracle 的有限理解让我以为微软工程师必须重写整个代码库才能支持在
  `Linux` 上运行 `SQL Server`。此外，Oracle 对 Windows 和 Linux 使用不同的代码库。工程团队是如何在如此短的时间内成功发布
  Linux 版 `SQL Server` 的呢？




  ### 项目吊桥


  我喜欢历史。我希望我在上学时就喜欢。但历史给予我们机会去学习并可能利用他人已经完成的工作。因此，我向 SQL Server 团队的一位工程师询问了这一切是如何开始的。在几瓶我们最喜欢的饮料陪伴下，他谈到了
  `Project Drawbridge`，这是微软内部一个探索应用沙盒化概念的研究项目。虽然该项目运行于 2011 年，但应用沙盒化的概念并不新鲜。还记得 1979
  年的 Unix V7 如何让进程在隔离环境中运行吗？这个概念就有那么古老。其背后的理念是限制（或隔离）特定代码可以执行的环境。该项目旨在为基于 Windows
  的应用创建沙盒。它解决了与虚拟机监控程序相同类型的问题，但与完整的虚拟机相比，开销和磁盘占用要小得多。可以这样想：你可以从互联网上下载一个应用并安装到你的电脑上，而它不会接管你的操作系统。这与在移动设备上运行应用的概念相同。而且，无论设备和操作系统版本如何，你都能获得相同的用户体验。


  `Project Drawbridge` 结合了两项核心技术——`library operating system`（库操作系统）和 `picoprocess`（微进程）。`library
  operating system` 是应用程序编程接口（API）和动态链接库（DLL）的集合，是应用运行所需从操作系统获得的东西。但它不是加载整个操作系统的副本，而是只加载一个包含应用所需功能的、重构过的操作系统版本，并在相同的地址空间（用户模式
  vs 内核模式）中运行。现实情况是，虽然 Windows 操作系统提供了海量的功能和特性，但应用并不一定需要全部。想象一下迷你版的 Windows。`picoprocess`
  是一个基于进程的隔离容器，具有最小的内核 API 表面。你可以把这两项核心技术想象成一栋大型公寓楼内的公寓单元。公寓单元（`picoprocess`）拥有租户（应用）在该空间生活所需的公用设施，如电、水和通风（`library
  operating system`）。但公寓单元无法独立存在。它必须存在于公寓大楼（计算机硬件加上操作系统）的上下文之中。租户可以来来往往，而不会打扰楼里的其他租户。而且，在公寓单元内让租户进出，比等待整栋公寓大楼建成要快得多。


  这些公用设施连接到公寓大楼的主供应系统。但要让公用设施到达公寓大楼，你需要一个中央分配系统：电力的配电系统、水的泵和罐，以及集中的暖通空调系统。这使得公寓大楼的业主能够在需要时更换不同的公用事业公司。更换不同的公用事业公司对租户的影响微乎其微，甚至没有影响，除了他们公用事业账单上的费率可能发生变化。在
  `Project Drawbridge` 的语境下，这就是 `platform abstraction layer (PAL)`（平台抽象层）。


  注意


  我极度简化了这些概念，以避免深入探讨它们实现的技术细节。我的目标不是探索操作系统如何工作的细节，而是在资源和时间限制下，提供足够的信息来解释在 Linux 上运行
  SQL Server 是如何成为可能的。关于不同部分如何协同工作以实现这一目标的高层架构，有两个很好的资源：Channel 9 上的视频 `Drawbridge:
  A new form of virtualization for application sandboxing` [`channel9.msdn.com/Shows/Going+Deep/Drawbridge-An-Experimental-Library-Operating-System`](https://channel9.msdn.com/Shows/Going+Deep/Drawbridge-An-Experimental-Library-Operating-System)
  以及已发表的研究论文 `Rethinking the Library OS from the Top Down` [www.microsoft.com/en-us/research/wp-content/uploads/2016/02/asplos2011-drawbridge.pdf](http://www.microsoft.com/en-us/research/wp-content/uploads/2016/02/asplos2011-drawbridge.pdf)。


  当你开始思考时，`Project Drawbridge` 听起来非常像容器。


  ### SQLOS 和 SQLPAL


  如果你担任 SQL Server DBA 有一段时间了，你可能还记得 SQL Server 2000 和 SQL Server 2005 之间架构上的重大变化。与其他应用一样，SQL
  Server 2000 及更早版本依赖 Windows 进行硬件资源管理——比如线程调度、内存管理和 I/O 处理。还记得著名的 `UMS.DLL`（SQL 用户模式调度程序
  DLL）文件吗？这限制了 SQL Server 更好地处理硬件资源以实现可扩展性的能力，尤其是在 21 世纪初硬件能力飞速发展的背景下。为了利用硬件改进来提升性能和可扩展性，SQL
  Server 工程团队决定解除对 Windows 硬件资源管理的这种依赖。于是 `SQLOS` 应运而生。


  `SQLOS` 是 SQL Server 尝试将硬件资源管理带入其用户模式进程的产物。它就像是 SQL Server 专属的面向 Windows 的 `PAL`。`SQLOS`
  提供操作系统服务，如非抢占式调度、内存管理、异常处理等。你可以在 [`blogs.msdn.microsoft.com/slavao/2005/07/20/platform-layer-for-sql-server/`](https://blogs.msdn.microsoft.com/slavao/2005/07/20/platform-layer-for-sql-server/)
  阅读关于 `SQLOS` 在 SQL Server 2005 中引入及其背后原理的更多信息。然而，尽管 `SQLOS` 提供了对 Windows 的抽象，它仍不是一个真正的操作系统抽象层。为了允许
  SQL Server 在 Windows 以外的不同操作系统上运行，`SQLOS` 必须被重写，使其成为一个与操作系统无关的真正 `PAL`。


  幸运的是，从事 `Project Drawbridge` 的团队已经有一个在 Linux 上移植好的粗略原型。鉴于存在的限制和约束，将 `Project Drawbridge`
  和 `SQLOS` 中已有的组件，加上 Linux 上的粗略原型进行合并的想法，使得在 Linux 上移植 SQL Server 成为现实。谢天谢地，他们不必重写过去二十五年里为
  SQL Server 编写的所有源代码。这项努力的成果是 `SQLOS` 的一个进化版本，它结合了来自 `Project Drawbridge` 的 `library
  operating system` 和 `SQLOS`。他们称之为 `SQL Platform Abstraction Layer (SQLPAL)`（SQL
  平台抽象层）。这使得 SQL Server 团队能够将大部分为 Windows 编写的可执行 SQL Server 代码利用起来在 Linux 上运行。他们还创建了一个
  `host extension layer`（宿主扩展层），这是一个直接与操作系统交互的抽象层。为了使 Windows 和 Linux 的所有体验保持一致，团队分别为
  Windows 和 Linux 设计了 `host extension layer`。我猜这样做是为了更容易维护 SQL Server 的源代码，而不必关心底层操作系统是什么。鉴于所有这些使
  SQL Server 在 Linux 上成为可能的细节，图 8-1 展示了我对这个架构非常高层级的解读。你会在文档中看到类似的图表，但我尽力用视觉方式来展示复杂性，以便更好地理解它们。


  ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig1_HTML.jpg](img/484552_1_En_8_Fig1_HTML.jpg)


  图 8-1


  使 SQL Server 在 Linux 上成为现实的高层架构


  我确信 Slava Oks 和他的团队在 2005 年研究 `SQLOS` 时，甚至没有想过将 SQL Server 移植到 Linux。它就这么神奇地发生了。


  提示


  Apress 书籍 `Pro SQL Server on Linux`（作者 Bob Ward）的第 1 章对此有更详细的介绍。



  ## SQL Server 在 Windows 与 Linux 上的差异


  在阅读了上一节“Linux 上的 SQL Server 架构”后，很明显，运行在 Windows 上的 SQL Server 与运行在 Linux 上的 SQL
  Server 之间其实没有任何差异——它们使用的是相同的数据库引擎。SQL Server 工程团队竭尽全力在两个平台上使用相同的代码库。然而，由于 Windows
  平台悠久的发展历史，SQL Server 在 Windows 上支持的功能肯定会多于 Linux。例如，当 SQL Server 2017 发布时，事务复制和合并复制尚不可用。事务复制在
  SQL Server 2019 上已得到支持，但合并复制仍然不支持。随着后续版本的发布，你可以相信两个平台的功能将会趋于一致。这只是时间问题。请参阅文档[Linux
  上的 SQL Server 2017](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2017)获取
  SQL Server 2017 在 Linux 上支持功能的完整列表，以及[Linux 上的 SQL Server 2019](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-editions-and-components-2019)获取
  SQL Server 2019 在 Linux 上的支持功能列表。


  根据我的经验，你将遇到的最大差异会是你的个人体验。如果你整个职业生涯都在使用 SQL Server，并且习惯于在像微软管理控制台这样丰富的图形用户界面下工作并与操作系统交互，那么像运行
  Docker 命令那样在命令行下工作可能会让你感到非常别扭。你会听到自己说：“这个任务在 Windows 上容易多了。”或者当你因为忘记申请`root`权限而无法运行命令时，你会一边敲击键盘一边低声咒骂几句“#&%@$#%!”。另一方面，如果你也一直在管理运行在
  Linux 上的其他数据库平台，并编写 Shell 脚本来自动化枯燥的任务，那么在 Linux 上运行 SQL Server 对你来说会像天赐之物，你会纳闷为什么微软不早点这么做。你的个人体验、偏好甚至偏见都会凸显这些差异。但一旦你进入
  SQL Server Management Studio，你就无法分辨出区别了。


  ## 在 Linux 上安装 SQL Server


  大多数 SQL Server 数据库管理员会说，Windows 与 Linux 上的 SQL Server 之间最大的差异是安装体验。在 Linux 上，没有`setup.exe`，没有
  SQL Server 安装中心，也没有`新建 SQL Server 独立安装或向现有安装添加功能`链接。你怎么点击、输入、拖动和选择呢？但是，如果你已经部署了数百甚至数千个
  SQL Server 实例，我敢肯定你会讨厌这种向导驱动的安装体验。你可能已经有一个批处理文件，它调用`setup.exe`并传递安装 SQL Server 所需的所有参数。也许你有一个存储在中央存储库中的`ConfigurationFile.ini`文件，在运行`setup.exe`时会访问它。我仅在需要创建新的（或验证现有的）`ConfigurationFile.ini`文件或演示如何使用它来安装
  SQL Server 时才会使用 SQL Server 安装中心。


  本节分为两部分——手动安装 SQL Server 和使用脚本执行无人值守安装。目的是让你了解安装过程的工作原理，为创建自定义的 Linux SQL Server
  Docker 镜像做准备。不过，你完全可以按照以下步骤在物理机或虚拟机上自动化部署 Linux 上的 SQL Server。


  ### 手动安装


  在第 3 章中，我指导你在两个不同的 Linux 发行版（CentOS 和 Ubuntu）上安装了 Docker。同样地，我将指导你在 CentOS 和 Ubuntu
  上安装 SQL Server 的过程，这样你就可以创建一个可以在任一发行版上运行的自定义 Linux SQL Server Docker 镜像。回想一下，微软公开提供的
  Linux SQL Server 镜像是使用 Ubuntu 创建的。你可能希望创建一个在红帽企业 Linux/RHEL（或像本书中使用的 CentOS）或 SUSE
  Linux 企业服务器上运行的自定义 Linux SQL Server Docker 镜像，以便可以在特定的 Linux 发行版上实现标准化。你可以在任何支持的
  Linux 发行版上自由安装 SQL Server。这些支持的 Linux 发行版列表可在[Linux 上的 SQL Server：支持的平台](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup?view=sql-server-ver15#supportedplatforms)找到。


  让我们从在 CentOS 上安装 SQL Server 开始。与在 Linux 上安装 Docker 类似，你需要告诉你的 Linux 系统从哪里下载微软 SQL
  Server Red Hat（因为 CentOS 基于 RHEL）仓库配置文件。请确保指定你要下载的 SQL Server 版本。运行以下命令以下载 SQL Server
  2017 的 Microsoft SQL Server Red Hat 仓库配置文件：


  ```bash

  sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

  ```


  运行以下命令以下载 SQL Server 2019 的 Microsoft SQL Server Red Hat 仓库配置文件。注意细微的差别。给你个提示——是
  SQL Server 的版本。


  ```bash

  sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2019.repo

  ```


  下载仓库配置文件后，运行以下命令安装 SQL Server。这将下载适用于 RHEL 的 SQL Server 安装包（别担心，它们与 CentOS 兼容）。下载完成后，它将自动运行安装。


  ```bash

  sudo yum install -y mssql-server

  ```


  软件包安装完成后，运行带有以下`setup`参数的`/opt/mssql/bin/mssql-conf`脚本，使用默认配置配置 SQL Server。按照提示选择你的
  SQL Server 版本并设置`sa`密码。


  ```bash

  sudo /opt/mssql/bin/mssql-conf setup

  ```


  请谨慎选择版本。如果你打算将其用于开发和测试目的，Developer Edition 是免费的，并且具有 Enterprise Edition 的所有功能。选择
  Developer Edition 意味着你打算在生产环境中部署 Enterprise Edition。不要错误地将 Developer Edition 部署在开发环境中，最终由于许可成本而在生产环境中部署
  Standard Edition。虽然 Windows 上的 SQL Server 2019 Standard Edition 在可用功能上几乎与 Enterprise
  Edition 不相上下，但 Linux 上的 SQL Server 并非如此。


  就是这样。就这么简单。在 RHEL 或 CentOS 上安装 SQL Server 只需要运行三条命令。嗯，实际上如果你算上启用 SQL Server 守护程序在系统启动时启动的话是四条命令，这在
  Ubuntu 系统上你也需要做。以下命令是如何启用的方法：


  ```bash

  sudo systemctl enable mssql-server

  ```


  另一方面，在 Ubuntu 上安装 SQL Server 包含额外的步骤，并且使用`apt-get`命令而不是`yum`命令。我们将从在本地 Ubuntu Linux
  系统上导入公共 GPG 密钥开始。运行以下`curl`命令下载并导入公共 GPG 密钥：


  ```bash

  curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

  ```



  接下来，你需要将 Microsoft SQL Server Ubuntu 软件仓库添加到你的 Ubuntu Linux 系统中。以下命令专门适用于 SQL Server
  2017：


  ```

  sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
  xenial main"

  ```


  以下命令专门适用于 SQL Server 2019：


  ```

  sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2019
  xenial main"

  ```


  注意


  回想一下第 3 章描述的 `/etc/apt/sources.list` 文件。该文件包含了 APT 软件仓库的列表，即你想要在 Ubuntu Linux 系统上安装的软件包的位置。前面的命令只是在该文件中为
  Microsoft SQL Server Ubuntu 软件包添加了一个条目。但你可能想知道这个值是从哪里来的。通过 `add-apt-repository`
  命令添加到 `/etc/apt/sources.list` 文件中的值，来自于 `https://packages.microsoft.com/config/ubuntu/16.04/mssql-server-2017.list`
  文件。你可以下载与你想要安装的 Ubuntu SQL Server 版本对应的特定列表文件。


  在将 Microsoft SQL Server Ubuntu 软件仓库添加到 `/etc/apt/sources.list` 文件后，你可以运行以下命令来安装
  SQL Server。因为你通过添加 Microsoft SQL Server Ubuntu 软件包仓库修改了你的 Ubuntu 系统，所以在安装 SQL Server
  之前，你需要先运行 `apt-get update` 命令：


  ```

  sudo apt-get update

  sudo apt-get install -y mssql-server

  ```


  软件包安装完成后，运行带有以下 `setup` 参数的 `mssql-conf` 脚本，以使用默认配置配置 SQL Server。根据提示选择你的 SQL Server
  版本并设置 `sa` 密码。


  ```

  sudo /opt/mssql/bin/mssql-conf setup

  ```


  如果你观察安装过程，它包括运行一些命令和传递参数值。如果你能将这些步骤全部组合到一个脚本中，你就可以自动化安装过程，而不必手动输入对提示的响应。这就是无人参与安装背后的思想。


  #### 无人参与安装


  在 Linux 上执行 SQL Server 的无人参与安装需要了解如何在 Linux 中运行脚本。我将在后面的章节中保存关于如何在 Linux 上运行脚本的细节。本节将描述执行无人参与安装的脚本中包含哪些内容。


  回想一下你如何在 CentOS 和 Ubuntu 系统上手动安装 SQL Server。你运行了几个包含参数的命令。如果你查看在 CentOS 和 Ubuntu
  上安装 SQL Server 的命令——`sudo yum/apt-get install -y mssql-server`——你会看到一个 `-y` 参数。这是所有软件包管理器都使用的参数，它假定对安装过程中可能提出的任何问题的回答都是
  `是`。这也允许用户无需用户交互即可执行安装。我通常在进行无人参与安装之前，会手动安装几次，以确切了解软件包要求我做什么需要*是/否*响应的操作。我当然不想遇到一个提示问“你最近杀过人吗？”，然后粗心地输入
  `是`。我可能不是律师，但我尽力而为，在我的计算机或智能手机上安装软件时会仔细阅读细则。


  类似地，在作为设置过程的一部分运行 `/opt/mssql/bin/mssql-conf` 脚本时，可以传递不同的参数。这些参数也称为 `环境变量`，在 `https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables?view=sql-server-linux-2017`
  中有针对 SQL Server 2017 的描述（SQL Server 2019 的列表类似）。回想一下在*第*4 章中传递给 `docker run` 命令的环境变量。它们是相同的环境变量，可用于在设置过程中配置
  Linux 上的 SQL Server，从而无需用户交互。如果你注意到了手动安装过程，有三个提示需要用户输入：


  *   `MSSQL_PID`：类似于在 Windows 上安装 SQL Server 时的 PID 参数——可以是产品 ID 或 SQL Server 版本。如果未指定，则默认为开发版。

  *   `ACCEPT_EULA`：我相信你现在已经知道这个了。

  *   `MSSQL_SA_PASSWORD`：`sa` 登录的复杂密码。


  给定这三个环境变量，你可以运行带有其对应值的 `/opt/mssql/bin/mssql-conf` 脚本，如下所示：


  ```

  sudo MSSQL_PID=Enterprise ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
  setup

  ```


  注意


  我在 Microsoft 文档、博客文章和 GitHub 上的示例代码中看到过使用 `-n` 参数运行 `/opt/mssql/bin/mssql-conf`
  脚本作为设置过程一部分的例子。一个例子可以在 `https://docs.microsoft.com/en-ca/sql/linux/sample-unattended-install-redhat?view=sql-server-ver15#sample-script`
  找到。参考行 `echo Running mssql-conf setup...`，它显示了带有环境变量的 `/opt/mssql/bin/mssql-conf
  -n setup` 代码。`-n`（也是 `--noprompt`）参数不会提示用户，并在安装过程中使用环境变量或默认设置。我好奇的心想知道行为上是否有任何不同，所以我测试了带
  `-n` 参数和不带 `-n` 参数运行命令。结果证明两者之间确实没有区别。因此，为了节省几次击键和几个字节的字符，我选择在我的无人参与安装中不使用 `-n`
  参数。


  将 CentOS Linux 系统上的所有命令组合起来以


  *   下载 SQL Server 2017 的 Microsoft SQL Server Red Hat 仓库配置文件

  *   下载并安装适用于 RHEL 的 SQL Server 安装包

  *   运行带有 `setup` 参数和环境变量的 `/opt/mssql/bin/mssql-conf` 脚本

  *   启用 SQL Server 守护进程在系统启动时启动


  你的脚本将包含如下所示的命令：


  ```

  sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

  sudo yum install -y mssql-server

  sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
  setup

  sudo systemctl enable mssql-server

  ```


  回顾在 Ubuntu Linux 系统上手动安装 SQL Server 的步骤，执行无人参与安装的相应脚本将包含如下所示的命令：


  ```

  curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

  sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
  xenial main"

  sudo apt-get update

  sudo apt-get install -y mssql-server

  sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
  setup

  sudo systemctl enable mssql-server

  ```


  即使运行这些命令并提供以 `sudo` 身份运行它们的密码，也给了你某种形式的无人参与安装。但我们还没有完成。你必须等到本章后面才能拥有一个完全自动化的脚本，该脚本将在
  Linux 上执行 SQL Server 的无人参与安装。




  ## 配置防火墙


  根据您的 Linux 系统配置，您可能需要配置 Linux 防火墙以允许到 SQL Server 的远程连接。Linux 系统使用 `iptables`，这是一个基于规则的防火墙，预装在大多数
  Linux 发行版中。它使用网络地址转换 (NAT) 和数据包过滤的概念来控制对系统的网络访问。但鉴于 Linux 的开源特性，许多人尝试构建实用程序和工具以使其管理变得更容易——因此，有了这些可用的实用程序。例如，在
  RHEL 和 CentOS 7 及更高版本上，默认的系统防火墙是 `FirewallD`。`FirewallD` 通过 API 暴露 `iptables`，并允许管理员和开发人员使用一个名为
  `firewall-cmd` 的命令行工具轻松配置防火墙设置。您可以从 [*https://firewalld.org/*](https://firewalld.org/)
  了解更多关于 `FirewallD` 的信息。另一方面，Ubuntu 使用一个名为 `UFW`（uncomplicated firewall 的缩写）的命令行工具，它直接与
  `iptables` 交互。您可以从 [*https://help.ubuntu.com/community/UFW*](https://help.ubuntu.com/community/UFW)
  了解更多关于 `UFW` 的信息。有趣的是，如果您愿意，可以在 Ubuntu 系统上安装 `FirewallD`。这使得在这两个 Linux 发行版之间标准化管理系统防火墙变得更容易。但那样还有什么乐趣呢？我不会深入探讨
  `iptables`、`firewalld`、`firewall-cmd` 和 `ufw` 的工作原理。我只会提供足够的信息，让您能够使用您特定发行版可用的工具配置到
  Linux 上 SQL Server 的远程连接。


  让我们从 CentOS 开始。首先，运行以下命令检查 `FirewallD` 是否正在运行。图 8-2 显示了 CentOS Linux 系统上运行中的 `FirewallD`
  守护进程状态。


  ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig2_HTML.jpg](img/484552_1_En_8_Fig2_HTML.jpg)


  图 8-2


  FirewallD 在 CentOS Linux 系统上运行


  ```

  sudo systemctl status firewalld

  ```


  接下来，运行以下带有相应参数的 `firewall-cmd` 命令以从防火墙打开 TCP 端口 1433：


  ```

  sudo firewall-cmd --zone=public --add-port=1433/tcp --permanent

  ```


  `FirewallD` 的一个关键特性是区域 (zone) 的概念。所有其他特性都绑定到一个区域，这描述了连接、接口或源地址绑定的信任级别。此命令使用的区域 `Public`
  表示您不信任网络上的其他计算机，并且只允许到 TCP 端口 1433 的传入流量。`--permanent` 参数表示您希望永久应用此防火墙规则。但配置了它并不意味着它会自动应用，也不会在系统重启期间持久保存。`FirewallD`
  中的另一个概念是运行时配置与永久配置的分离。运行时配置是防火墙当前用于管理规则的配置，在防火墙规则重新加载或系统重启时可能会丢失。永久配置存储在 `iptables`
  中，并在系统启动或防火墙规则重新加载时加载。这意味着您可以临时更改防火墙规则并将其加载到运行时配置中。如果您移除 `--permanent` 参数，您将能够临时远程连接到
  Linux 上的 SQL Server 实例。但一旦系统重启或防火墙规则重新加载，连接将被阻止，因为防火墙规则丢失了。此外，因为命令中使用了 `--permanent`
  参数，防火墙规则仅作为永久配置存在，而不是运行时配置，并且不会立即生效。要应用防火墙规则，运行以下命令将其作为新的运行时配置重新加载：


  ```

  sudo firewall-cmd --reload

  ```


  在端口 1433 上对您的 CentOS Linux 系统进行简单的 TELNET 测试将验证防火墙规则是否已应用。您还可以运行以下命令显示防火墙中已打开端口的运行时配置。图
  8-3 显示了已打开的 TCP 端口 1433。


  ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig3_HTML.jpg](img/484552_1_En_8_Fig3_HTML.jpg)


  图 8-3


  列出系统防火墙中已打开的端口


  ```

  sudo firewall-cmd --list-ports

  ```


  我不是说过我们会对 Ubuntu 系统使用不同的工具吗？运行以下命令检查 `UFW` 的状态。图 8-4 显示了 Ubuntu Linux 系统上 `UFW`
  守护进程的状态。但与 `FirewallD` 不同，`UFW` 默认是禁用的。请注意 `Status: inactive` 消息。


  ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig4_HTML.jpg](img/484552_1_En_8_Fig4_HTML.jpg)


  图 8-4


  Ubuntu Linux 系统上的 UFW 默认被禁用


  ```

  sudo systemctl status ufw

  sudo ufw status

  ```


  运行以下命令启用 `UFW`。当提示时，输入 `y` 表示 `Yes`。这将启用 `UFW` 并配置为在系统启动时启动。


  ```

  sudo ufw enable

  ```


  注意


  关于 Ubuntu 上的 `UFW` 防火墙的一句警告。前面的章节允许您通过 SSH 客户端连接到您的 Ubuntu Linux 系统。这是因为防火墙默认是禁用的，系统对任何远程连接都是完全开放的——包括端口
  22 上的 SSH。这与 CentOS Linux 不同，后者的防火墙是启用的，除了通过 SSH 的远程连接外，阻止所有访问。在 Ubuntu Linux 系统上启用
  `UFW` 后，除非您为其定义防火墙规则，否则将不允许任何其他连接。这也意味着您现有的 SSH 会话仅在您仍然连接时有效。一旦您断开连接，您将被锁定在外。不要犯这样的错误：在未启用防火墙端口
  22 的情况下关闭您现有的 SSH 连接。运行此命令以允许 SSH 连接：`sudo ufw allow 22/tcp`。要验证，请启动另一个 SSH 会话并确认您可以连接。


  启用 `UFW` 并允许 SSH 连接后，您现在可以通过运行以下命令从防火墙打开 TCP 端口 1433。图 8-5 显示了已打开的端口号——22 用于 SSH，1433
  用于 SQL Server。


  ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig5_HTML.jpg](img/484552_1_En_8_Fig5_HTML.jpg)


  图 8-5


  UFW 显示所有已打开的端口


  ```

  sudo ufw allow 1433/tcp

  ```


  正如我在 *第* *4* *章* 中提到的，最终测试是当您可以通过 SQL Server Management Studio 远程连接到 Linux 上的 SQL
  Server 实例时。




  ## Linux 防火墙与 Docker 注意事项


  我本想在 **第 4 章** 介绍 Linux 防火墙时稍作提及，因为当时正在介绍如何在 Docker 上运行 SQL Server 并远程连接。此外，为了访问资源，你也需要能够远程连接到服务器。但如果你注意观察，之前的章节都没有涉及创建防火墙规则和开放端口号以访问容器内的
  SQL Server 实例。因此，我在此替你提出一个显而易见的问题：如果 CentOS Linux 系统默认启用了 **FirewallD**，它不应该阻止除
  SSH 外的所有连接吗？而如果我在 Ubuntu Linux 系统上启用了 **UFW**，它不也应该阻止除我明确允许之外的所有连接吗？不过，你可能不太关心 Ubuntu
  上的 **UFW**，因为它默认是禁用的。


  答案在于 Docker 在幕后施展的“魔法”。还记得我说过 **iptables** 是大多数 Linux 发行版上基于规则的防火墙吗？每次你创建一个 Docker
  容器并在 `docker run` 命令中使用 `-p` 参数配置端口映射时，Docker 都会直接在 **iptables** 中创建一个防火墙规则作为你实现的一部分。Docker
  在 RHEL/CentOS 上不使用 **FirewallD**，在 Ubuntu 上也不使用 **UFW**，因此当你使用这些工具时，你不会看到任何关于区域、端口号或服务的信息。图
  8-6 展示了在我的 CentOS Docker 主机上已开放的端口和服务列表。请注意，`firewall-cmd` 仅在可用服务列表中显示 `ssh` 和 `dhcpv6-client`（用于从
  DHCP 服务器获取 IP 地址）。然而，查询 **iptables** 显示了一个映射：从任意源（0.0.0.0/0 IP 地址范围）到 IP 地址 172.18.0.2（这是我
  CentOS Docker 主机上分配给 `docker0` 网络接口的 IP 地址，我将在 **第 11 章** 中更详细地介绍）的 TCP 端口 1433。在
  Ubuntu Docker 主机上查询 **iptables** 时，你会看到同样的规则。


  ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig6_HTML.jpg](img/484552_1_En_8_Fig6_HTML.jpg)


  **图 8-6**

  在 CentOS Docker 主机上，为端口 1433 在 FirewallD 和 iptables 中显示的开放端口及允许的服务


  你可以在 [*https://docs.docker.com/network/iptables/*](https://docs.docker.com/network/iptables/)
  阅读更多关于 Docker 实现的这种防火墙规则“魔法”。他们明确强调不要修改 Docker 在你的 **iptables** 中创建的防火墙规则。如果你的安全策略禁止从任何源访问
  Docker 容器内的 SQL Server 实例，请咨询你的网络工程师如何正确控制网络流量。


  ## 在 Linux 上配置 SQL Server


  虽然大多数开箱即用的安装设置没有问题，但你可能希望标准化 SQL Server 部署，以符合你们的内部最佳实践，或者只是为了证明你比普通 SQL Server
  DBA 更聪明。我们在 Windows 上使用 SQL Server 安装中心做过这件事，创建一个 `ConfigurationFile.ini` 文件并用它来部署具有所需配置设置的多个
  SQL Server 实例。我们也曾手动使用 SQL Server 配置管理器对每个实例进行配置。在 Linux 上的 SQL Server，我们该如何做呢？


  `/opt/mssql/bin/mssql-conf` 脚本可用于为你的 Linux 上的 SQL Server 安装设置不同的配置。但除了在安装过程中使用它，我还没有真正描述过这个脚本的用法。让我们以
  Linux 的方式更详细地探讨这个脚本。我在 **第 3 章** 简要提到了使用 Linux `man`（manual 的缩写）页面。虽然现在由于互联网资源丰富，我很少使用
  `man` 页面来查阅文档，但在某些情况下，我确实无法在网上找到关于特定命令的信息。这个脚本就是其中之一。运行以下命令以显示如何使用此脚本：


  ```

  man mssql-conf

  ```


  图 8-7 显示了使用此脚本时的不同选项。


  ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig7_HTML.jpg](img/484552_1_En_8_Fig7_HTML.jpg)


  **图 8-7**

  mssql-conf 的 man 页面


  使用 `list` 参数显示所有不同的可配置设置，如图 8-8 所示：


  ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig8_HTML.jpg](img/484552_1_En_8_Fig8_HTML.jpg)


  **图 8-8**

  Linux 上 SQL Server 的可配置设置列表


  ```

  sudo /opt/mssql/bin/mssql-conf list

  ```


  这些是 SQL Server 实例上无法通过 T-SQL 完成的可配置设置。让我们用这些设置来展示如何更改一些最常见的 SQL Server 实例配置设置。下文展示的设置都需要重启
  SQL Server 守护进程，因此我会在最后再执行重启步骤，只展示如何完成所有配置更改。


  ### 启用 SQL Server Agent


  默认情况下，SQL Server Agent 在安装后是禁用的。实际上，在 SQL Server 2017 累积更新 4 之前，你必须使用不同的包单独安装 SQL
  Server Agent。我猜社区和 Microsoft MVP 的反馈（或抱怨）导致 SQL Server 产品团队将 SQL Server Agent 包含在
  `mssql-server` 包中。试想一下，如果需要分别更新 SQL Server 数据库引擎和 SQL Server Agent。即使有适当的变更管理流程，任何人也有可能因为这不是我们
  DBA 更新 SQL Server 的常规操作而忘记更新 SQL Server Agent。这样，你的补丁级别最终可能会在两者之间不同。我认为将 SQL Server
  Agent 作为安装 SQL Server 的一部分是一个很棒的主意。


  运行以下命令以启用 SQL Server Agent：


  ```

  sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

  ```


  ### 配置默认数据库数据和日志目录


  数据库数据和日志文件的默认目录是 `/var/opt/mssql/data`。你可能希望配置一个包含固态硬盘的专用存储阵列，并将其挂载为 Linux 系统上的一个目录。但在将一个目录配置为默认数据库数据和日志目录之前，必须先创建它，并将所有权更改为
  `mssql` 用户和 `mssql` 组。运行以下命令创建一个名为 `/tmp/dbdata` 的新目录：


  ```

  sudo mkdir /tmp/dbdata

  ```


  接下来，运行以下命令将目录的所有权更改为 `mssql` 用户：


  ```

  sudo chown mssql /tmp/dbdata

  ```


  你还需要通过运行以下命令将目录的组所有权更改为 `mssql` 组：


  ```

  sudo chgrp mssql /tmp/dbdata

  ```


  目录创建并分配所有权后，你现在可以使用以下命令将默认数据库数据和日志目录设置为新位置：


  ```

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

  ```




  #### 配置默认数据库备份目录


  默认的数据库备份目录与默认的数据库数据和日志目录相同，都是 `/var/opt/mssql/data`。出于灾难恢复的目的，我喜欢将数据库和备份分开存放。与配置默认数据库数据和日志目录类似，您需要先创建目录，并将所有权更改为
  `mssql` 用户和 `mssql` 组。让我们使用 `/tmp/dbbackup` 目录作为默认数据库备份目录。运行以下命令以执行必要的配置更改：


  ```

  sudo mkdir /tmp/dbbackup

  sudo chown mssql /tmp/dbbackup

  sudo chgrp mssql /tmp/dbbackup

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

  ```


  注意


  如果您好奇 `mssql` 用户和 `mssql` 组是什么，它们是分配给 SQL Server 非二进制文件的非交互式登录和组。可以将其视为 Windows
  上的 SQL Server 服务账户。非交互式登录在后台运行 SQL Server 进程。但与通常的 Windows SQL Server 服务账户不同（除非将其配置为
  *作为服务登录*，否则您可以使用该账户及其凭据登录 Windows 机器），非交互式登录将无法登录并从 shell 运行命令。此外，您无法将其更改为任何其他用户账户。我希望这在未来的版本中有所改变。


  #### 启用跟踪标志


  在部署新的 SQL Server 实例时，我启用的跟踪标志之一是跟踪标志 `3226`。这会抑制 SQL Server 错误日志和系统事件日志中每一个成功的备份条目。过去，我需要从我们的监控服务器中过滤成功的备份消息，以避免每次备份作业完成时都收到警报。这个跟踪标志真是救星。运行以下命令在
  SQL Server 实例上启用跟踪标志 `3226`：


  ```

  sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

  ```


  由于所有这些设置都需要重启 SQL Server 守护进程，所以一次性完成所有操作并在配置结束时重启 SQL Server 是合理的。运行以下命令以重启 SQL
  Server：


  ```

  sudo systemctl restart mssql-server

  ```


  #### 查看所有实例级配置设置


  我希望能有一个简单的命令来显示所有实例级配置设置，而不是通过编程方式查询 SQL Server 管理对象 (SMO)。如果您想回顾刚刚进行的所有配置设置怎么办？嗯，为此您必须手动读取
  `/var/opt/mssql/mssql.conf` 文件。SQL Server 将您所做的配置更改存储在此文件中，并在启动时读取以加载除默认值之外的配置设置。我认为这比通过编程方式查询
  SMO 更好。运行以下命令以查看 SQL Server 实例的所有配置设置。图 8-9 显示了本节中设置的实例级配置设置。


  ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig9_HTML.jpg](img/484552_1_En_8_Fig9_HTML.jpg)


  图 8-9


  查看 Linux 上 SQL Server 的已配置设置


  ```

  sudo cat /var/opt/mssql/mssql.conf

  ```


  `/var/opt/mssql/mssql.conf` 文件就像任何其他文本文件一样，您可以使用喜欢的文本编辑器进行修改。该文件的格式可在 [*https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf?view=sql-server-ver15#mssql-conf-format*](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf%253Fview%253Dsql-server-ver15%2523mssql-conf-format)
  找到。如果您决定手动修改配置文件，则需要重启 SQL Server 守护进程才能使更改生效。


  我并不太喜欢手动修改文件格式，因为解析器在处理不必要字符时可能非常严格。此外，我们是人类，难免会犯错。我修改 YAML、JSON 和 XML 文件的经验也不少，一个简单的错误，比如在文件中引入多余的字符，可能会花费大量时间排查问题。“Fat
  finger”（误触）这个词在我们这行是存在的，这是有原因的。我总是使用像 `/opt/mssql/bin/mssql-conf` 脚本这样的支持工具来更改文件。图
  8-10 展示了在 `/var/opt/mssql/mssql.conf` 文件中误触多打一个字符带来的副作用。重启 SQL Server 守护进程并没有告诉我加载配置文件中存储的设置时出错。此外，如果读取配置文件时出错，解析器只会忽略它并加载默认值。我不得不运行命令
  `sudo /opt/mssql/bin/mssql-conf validate` 才发现配置有错误。您能猜出是什么错误吗？


  ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig10_HTML.jpg](img/484552_1_En_8_Fig10_HTML.jpg)


  图 8-10


  手动修改 `/var/opt/mssql/mssql.conf` 文件可能导致的潜在错误


  ### 处理文件系统


  Linux 是一个基于文件的操作系统。对于习惯了 Windows 操作系统的人来说，这个概念有点难以理解。在 Windows 上，我们处理注册表、系统服务、硬件设备（如网络适配器）的表示等等。在
  Linux（或通常的 Unix）中，一切都是文件。您的硬盘由一个设备文件表示。配置设置存储在文件中。甚至包含文件的目录也是一种特殊类型的文件，您可以使用文本编辑器读取。回想一下自从第
  3 章以来您所做的一切——它们都引用了一个文件：仓库文件、软件包文件、容器使用的文件系统层、容器清单文件、符号链接文件、`daemon.json` 文件等等。如果您想让一个应用程序的行为有所不同，您只需要修改其相应的配置文件（前提是您确切知道自己在做什么）。




  #### Linux 文件系统中的重要目录


  要使用基于文件的操作系统，你需要了解文件系统的一些基础知识。这将帮助你正确导航和与目录及文件交互，以执行诸如移动文件、修改配置文件等任务。以下是 Linux 文件系统中一些重要的目录列表：


  *   `/`：根目录。Linux 中的一切都位于此目录之下。它类似于 Windows 中的 `C:\` 目录。

  *   `/bin`：此目录包含系统管理员和非特权用户都使用的基本用户二进制程序（程序）。像 `cat`、`ls`、`rm` 等命令以及像 `bash` 这样的
  Shell 都位于此目录中。

  *   `/boot`：显然，此目录包含引导 Linux 系统所需的一切，除了引导时不需要的配置文件。

  *   `/dev`：此目录包含特殊文件或设备文件。我之前提到过，Linux 中的硬盘表示为设备文件，并存储在此目录中。

  *   `/etc`：此目录包含系统配置文件，被认为是你的 Linux 系统的指挥中心。你的 Linux 系统的行为和操作都存储在此目录的配置文件中。因此，请小心处理此目录中的文件，因为随意改动可能导致系统不稳定甚至无法启动。

  *   `/home`：此目录包含所有用户的 `home` 目录，类似于 Windows 中的 `C:\Users` 目录。当你登录 Linux 系统时，系统会在
  `/home` 目录下创建一个以你的用户名命名的目录，你对此目录拥有完全的、不受限制的访问权限。你的 `home` 目录也包含你的个人配置文件。

  *   `/lib`：此目录包含系统所需的有用库文件（供应用程序或系统正确执行时使用的文件）。

  *   `/media`：此目录包含可移动媒体（如 CD-ROM）的子目录。我确信你在服务器上已经好几年没用过这些东西了。

  *   `/opt`：此目录包含不属于默认安装的附加软件包。

  *   `/root`：这是 `root` 用户专用的 `home` 目录。注意，它不在 `/home` 目录中。

  *   `/sbin`：类似于 `/bin` 目录，但包含通常用于系统管理的基本二进制程序，通常需要 `root` 权限。

  *   `/srv`：此目录包含 Web 和 FTP 等服务的数据。与 SQL Server 无关。

  *   `/tmp`：此目录包含临时文件，通常在系统重启时被删除。

  *   `/usr`：此目录包含用户使用的应用程序和文件。

  *   `/var`：此目录包含可变数据，如系统日志文件、假脱机文件以及任何在 Linux 系统正常运行期间可能更改的内容。


  当你查看在 SQL Server 安装过程中创建的不同目录时，你会开始明白它们位置背后的目的。常见的有：


  *   `/opt/mssql/bin`：包含 SQL Server 二进制文件、`mssql-conf` 脚本以及其他用于处理 SQL Server 转储文件的脚本的目录。

  *   `/var/opt/mssql`：包含 SQL Server 数据和日志文件、secrets 以及 `mssql.conf` 配置文件的目录。`/opt`
  中软件包的可变数据必须安装在 `/var/opt/<子目录>` 中。因为 MDF、LDF、错误日志文件、扩展事件等都是 SQL Server 数据库引擎运行时随时间变化的可变数据。


  #### 文件权限


  Linux 中的文件权限在管理以及应用程序配置中扮演着重要角色。你已经看到，将权限提升到 `root` 允许你执行某些管理任务，甚至打开或修改文件。但是，如果你不知道
  `ls -l` 命令输出的含义，阅读它可能会让人不知所措。让我们从分析图 8-11 所示的 `/var/opt/mssql/` 和 `/opt/mssql/bin`
  目录的 `ls -l` 命令输出开始。注意使用 `sudo` 来列出 `/var/opt/mssql` 目录的内容。


  ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig11_HTML.jpg](img/484552_1_En_8_Fig11_HTML.jpg)


  图 8-11


  `ls -l` 命令的输出


  所有其他属性——`owner`（所有者）、`group`（组）、`file size`（文件大小）、`last modified`（最后修改时间）和 `filename`（文件名）——都容易理解。真正困扰我的是
  `mode`（模式）属性。它就像某种只有说克林贡语的人才能理解的代码。让我们更深入地分解 `mode` 属性，看看它如何影响文件和目录，如图 8-12 所示。


  ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig12_HTML.jpg](img/484552_1_En_8_Fig12_HTML.jpg)


  图 8-12


  文件和目录的模式属性


  `mode` 中的第一个字符代表类型。一个连字符 (`-`) 表示它是一个包含数据的普通文件，比如 `mssql.conf` 配置文件。一个 "d" 表示一个目录，比如
  `data`、`log` 和 `secrets` 目录。请记住，Linux 中的一切都是文件，甚至目录也是。特殊文件，例如目录，由非连字符字符（如字母）标识。回想一下
  *第* *5* *章* 中提到的符号链接文件，由 "l" 字符表示。


  `mode` 属性中的接下来三个字符代表用户权限。让我们看看我们可以分配给文件或目录的不同权限：


  *   `r`：读。对于文件，此权限允许用户读取内容。对于目录，此权限允许用户查看文件的名称。

  *   `w`：写。对于文件，此权限允许用户修改和删除文件。对于目录，`写`权限允许用户删除目录、修改其内容（在其中创建、删除和重命名文件）以及修改用户可读文件的内容。

  *   `x`：执行。对于文件，此权限允许用户执行文件（用户还必须具有读权限），应为可执行程序和脚本设置此权限。对于目录，此权限允许用户访问目录中的文件（包括其元数据）。


  参考图 8-12，`mssql` 用户对 `secrets` 目录拥有 `读`、`写` 和 `执行` 权限，但对 `mssql.conf` 文件只有 `读` 和
  `写` 权限（`mssql.conf` 文件是一个包含数据的普通文本文件，而不是像 `/opt/mssql/bin/mssql-conf` 文件那样的脚本）。


  `mode` 属性中的再接下来三个字符代表文件组所有者的权限。参考图 8-12，`mssql` 组（及其成员）对 `secrets` 目录拥有 `读` 和 `执行`
  权限，对 `mssql.conf` 文件拥有 `读` 和 `写` 权限。


  `mode` 属性中的最后三个字符代表所有其他用户的权限，通常称为其他用户。参考图 8-12，所有其他用户对 `secrets` 目录拥有 `读` 和 `执行`
  权限，但对 `mssql.conf` 文件只有 `读` 权限。




  ## 为文件和目录分配权限


  处理权限问题意味着我们也需要了解两种最常用的命令，用于分配适当的权限。`chown`（change owner 的缩写）是用于更改文件或目录所有权的命令。`chmod`（change
  mode 的缩写）是用于更改文件或目录对于所有者、所属组和其他用户的读、写和执行权限的命令。使用`chmod`分配权限有两种方式——第一种是使用字母数字字符（也称为符号模式），如`r`、`w`和`x`；第二种是使用八进制模式（你以为你已经逃过了将十进制转换为八进制的基础计算机课程？）。


  ### 更改所有者和所属组


  参考更改默认数据库备份目录的操作。创建目录后，你需要将其所有者更改为`mssql`用户。因为是你最初创建了这个目录，所以你的用户账户（以及你所属的组）拥有它。你希望`mssql`用户拥有对新的备份目录的读写权限，这样你的数据库备份才不会失败。因此，命令如下：


  ```bash

  sudo chown mssql /tmp/dbbackup

  ```


  这里还有一个有用的命令。`chgrp`（change group 的缩写）命令用于更改文件或目录的所属组。以下命令将新的备份目录的所属组更改为`mssql`组：


  ```bash

  sudo chgrp mssql /tmp/dbbackup

  ```


  如果你只更改了文件或目录的所有者而没有更改所属组，可能会出现权限不一致的情况，特别是当用户账户与所属组的权限不同时。用户账户可以被分配更精细的权限，但这需要更多工作。这就是
  Windows 中存在安全组的原因。更好的做法是创建一个安全组，为其分配权限，然后只需向该组中添加或从中移除用户即可。在`mssql`组的情况下，只有`mssql`用户在其中，为了保持一致性，将目录同时分配给该用户和该组是合理的。


  ### 分配执行权限


  让我们回到为文件和目录分配权限的问题上。如果你想创建一个名为`automateSQLinstall.sh`的 shell 脚本，用于自动化和配置在 Linux
  上安装 SQL Server，你需要使用（`+`）运算符为该文件分配`执行`（`x`）权限。请注意，使用（`-`）运算符将撤销权限。以下命令展示了一个简单的方法：


  ```bash

  chmod +x automateSQLinstall.sh

  ```


  这样做意味着授予你的用户账户、你所属的组以及所有其他用户`执行`权限。图 8-13 显示了为文件分配`执行`权限后的有效权限。


  ![分配执行权限前后的有效权限](img/484552_1_En_8_Fig13_HTML.jpg)


  图 8-13


  让我们解读文件上的有效权限。（`-`）符号告诉我这是一个普通文件。在运行`chmod +x automateSQLinstall.sh`命令之前，名为`emsarmiento`的用户和组只对该文件拥有`读`和`写`权限。之所以如此，是因为用户创建了该文件，作为副作用而拥有它。但如果你注意到，该用户对文件没有`执行`权限。与
  Windows 中具有特定文件扩展名（如`.vbs`或`.exe`）的脚本会自动标记为可执行不同，Linux 中的文件扩展名没有任何意义。你必须告诉 Linux
  该文件需要被执行，特定用户才能运行它。运行`chmod`命令后，名为`emsarmiento`的用户和组现在对该文件拥有了`读`、`写`和`执行`权限。此外，Linux
  在适用的情况下会自动分配隐式权限。即使我只授予了`执行`权限，`其他`组也被授予了`读`权限。这是因为用户在读写或执行文件或目录之前，需要先能够读取它。


  以下是一种更明确地授予文件`执行`权限的方式，其中`u=所有者`，`g=所属组`，`o=其他`：


  ```bash

  chmod u+x,g+x,o+x automateSQLinstall.sh

  ```


  或者这样：


  ```bash

  chmod u=rwx,g=rwx,o=rx automateSQLinstall.sh

  ```


  显然，有几种方法可以实现这个目标。而这甚至还没有涉及八进制模式。那么，让我们继续。


  ### 使用八进制模式


  在八进制模式中，数字代表权限，如下所示：


  *   4 = 读

  *   2 = 写

  *   1 = 执行


  这些值范围从 0 到 7。将这些数字转换为对应的权限：


  *   0 = `---`

  *   1 = `--x`

  *   2 = `-w-`

  *   3 = `-wx`

  *   4 = `r--`

  *   5 = `r-x`

  *   6 = `rw-`

  *   7 = `rwx`


  从 0 到 7 的每个数字都可以分配给`所有者`、`所属组`和`其他`列。如果你想为文件分配`执行`权限，以下命令使用八进制模式实现这一点：


  ```bash

  chmod 775 automateSQLinstall.sh

  ```


  > **注意：** 本章无意深入探讨 Linux 文件系统和权限操作。这个主题本身就需要单独的一整章来讨论。本节的目标是为本章及其他章节中命令的使用方式和原因提供参考。但正如你所见，这个主题是使用
  Linux 的核心。请记住，Linux 中的一切都是文件，必须为特定的系统进程和应用程序分配适当的权限才能运行。除非你确切知道自己在做什么，否则不要随意改动`/var/opt`目录下的权限。我强烈建议探索
  Apress 出版社提供的一些关于 Linux 文件系统和权限管理的书籍，以进行深入学习。



  ## 编写简单的 Linux Bash 脚本


  我在前几部分所做的，仅仅是为创建一个在 Linux 上自动安装 SQL Server 的脚本提供了框架。实际上，本章的标题本应是*为在 Linux 上自动化安装
  SQL Server 做准备*。但是，每当我需要处理客户编写的、执行特定任务的自动化脚本时，总会看到一些人一脸茫然，他们完全不知道脚本是如何编写的，也不清楚脚本执行了哪些不同的任务。很多时候，这些脚本只是将网上找到的代码片段拼接在一起。别误会，如果你知道代码片段的功能、测试过它，并且做了恰当的文档记录，那么将网上找到的代码片段拼接起来并没有什么错。尽管我非常相信并倡导自动化，但我更加强调流程的重要性。当我担任数据中心工程师时，我几乎不怎么坐在电脑前。我要么是坐在办公桌前用纸笔，要么是在白板上绘制定义流程的工作图。这是因为良好的自动化建立在坚实的流程基础之上。所以，当我们进行季度灾难恢复演练时，我们只需要运行自动化脚本并监控结果即可。如果某个特定流程需要改进，我们会回到绘图板，进行修改以满足我们的恢复目标和服务级别协议。我们这种以流程为导向的自动化，是一个非常精简但高效的团队能够管理数百台服务器的关键所在。


  现在我们已经掌握了在 Linux 上安装和配置 SQL Server 的框架，是时候编写自动化脚本了。但在编写之前，我们需要知道如何编写脚本以及如何执行它。


  ### 什么是 Bash 脚本？


  一个*Bash 脚本*是一个包含一系列命令的纯文本文件。它被称为 Bash 脚本，是因为这些命令是使用 Bash（**B**ourne **A**gain **Sh**ell）来解释的。Bash
  是大多数 Linux 发行版的默认 Shell。事实上，你可以在 Linux 命令提示符下运行命令 `echo $0` 来进行检查。Bash 脚本本身是一种功能齐全的编程语言。这意味着你可以定义编程结构，例如变量、函数以及
  shell 命令的条件执行。任何可以从命令行运行的命令都可以在 Bash 脚本中使用。通常，Bash 脚本使用 `.sh` 文件扩展名，以明确表明它是一个 Shell
  脚本。但正如我在前一节提到的，Linux 并不真正关心文件扩展名。但我们人类关心。拥有某种形式的标识可以让我们无需打开文件就能立即知道它的用途。


  ### 创建脚本文件


  在你的电脑上创建一个简单的文本文件。你是在 Linux 还是 Windows 电脑上创建它，其实并不重要。如果你能在 Windows 上创建文件，稍后复制到 Linux
  机器上，目前就足够了。一旦你习惯了使用 `vi` 或 `nano` 等工具在 Linux 上创建和修改文件，你就可以在 Linux Shell 终端内编写脚本了。我在
  Linux 上使用 `vi`，因为它是默认安装的。


  文件的第一行是告诉解释器这是一个可执行文件。它被称为 *shebang*（或 hashbang），它就是指向 Bash 解释器的绝对路径。文件的第一行应包含以下命令：


  ```

  #!/bin/bash

  ```


  从这里开始，你可以编写任何你想在脚本内部运行的命令。回想一下我们在前几部分概述的在 Linux 上安装和配置 SQL Server 的任务序列。在一个 CentOS
  Linux 系统上：


  *   下载用于 SQL Server 2017 的 Microsoft SQL Server Red Hat 仓库配置文件。

  *   下载并安装适用于 RHEL 的 SQL Server 安装包。

  *   使用 `setup` 参数和环境变量运行 `/opt/mssql/bin/mssql-conf` 脚本。

  *   启用 SQL Server 守护进程在系统启动时自动启动。

  *   配置 Linux 防火墙以允许到 1433 端口的流量。

  *   启用 SQL Server Agent。

  *   更改默认的数据和日志文件目录。

  *   更改默认的备份目录。

  *   启用跟踪标志 3226。

  *   重启 SQL Server 以使配置更改生效。


  请注意任务的顺序。命令需要满足依赖项的要求。例如，除非 SQL Server 已经安装，否则我无法配置它。如果软件包尚未下载，我就无法安装它。除非仓库文件已经存在于系统上，否则我无法正确下载软件包。你明白这个意思了。


  ### 脚本示例


  结合我们用来完成列表中每一项任务的所有命令，你的脚本应该看起来像这样（针对 CentOS/RHEL）：


  ```

  #!/bin/bash

  sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

  sudo yum install -y mssql-server

  sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
  setup

  sudo systemctl enable mssql-server

  sudo firewall-cmd --zone=public --add-port=1433/tcp --permanent

  sudo firewall-cmd --reload

  sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

  sudo mkdir /tmp/dbdata

  sudo chown mssql /tmp/dbdata

  sudo chgrp mssql /tmp/dbdata

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

  sudo mkdir /tmp/dbbackup

  sudo chown mssql /tmp/dbbackup

  sudo chgrp mssql /tmp/dbbackup

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

  sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

  sudo systemctl restart mssql-server

  ```


  我通常会在我的脚本上写注释，让其他人知道它在做什么。为了简洁，我在这里省略了它们。适用于 Ubuntu 的对应脚本如下所示：


  ```

  #!/bin/bash

  curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

  sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
  xenial main"

  sudo apt-get update

  sudo apt-get install -y mssql-server

  sudo MSSQL_PID=Developer ACCEPT_EULA=Y MSSQL_SA_PASSWORD="mYSecUr3PAssw0rd" /opt/mssql/bin/mssql-conf
  setup

  sudo systemctl enable mssql-server

  sudo ufw --force enable

  sudo ufw allow 22/tcp

  sudo ufw allow 1433/tcp

  sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

  sudo mkdir /tmp/dbdata

  sudo chown mssql /tmp/dbdata

  sudo chgrp mssql /tmp/dbdata

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

  sudo mkdir /tmp/dbbackup

  sudo chown mssql /tmp/dbbackup

  sudo chgrp mssql /tmp/dbbackup

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

  sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

  sudo systemctl restart mssql-server

  ```


  ### 设置执行权限


  将脚本保存为 `automateSQLinstall.sh`。如果你在 Windows 机器上创建了脚本，只需将其复制到你的 Linux `home` 目录中。一旦它在你的
  `home` 目录中，你就可以使用以下命令为该文件分配 `execute`（执行）权限：


  ```

  chmod +x automateSQLinstall.sh

  ```



  ### 运行脚本


  由于脚本中的某些命令需要 `root` 权限，因此你必须以 `root` 权限来运行它。你可以在运行脚本前切换到 `root` 用户，或者使用 `sudo` 来运行。我更倾向于使用
  `sudo` 运行，这样可以避免在以 `root` 身份运行时误操作。


  运行以下命令来执行脚本。请注意，脚本文件名前带有 “`./`” 字符：


  ```bash

  sudo ./automateSQLinstall.sh

  ```


  其他人则会在脚本文件名前加上 `bash`，如下所示：


  ```bash

  sudo bash automateSQLinstall.sh

  ```


  我更喜欢第一个命令，因为它类似于在 Windows 上运行 PowerShell 脚本。


  另一种避免使用 `root` 权限运行的方法是，将脚本的所有权更改为 `root`，以避免密码提示。运行以下命令将脚本所有权更改为 `root` 并授予文件 `execute`
  权限：


  ```bash

  sudo chown root:root automateSQLinstall.sh

  sudo chmod 775 automateSQLinstall.sh

  ```


  现在，运行脚本，见证奇迹发生。图 8-14 展示了脚本执行后完成的所有配置设置。


  ![../images/484552_1_En_8_Chapter/484552_1_En_8_Fig14_HTML.jpg](img/484552_1_En_8_Fig14_HTML.jpg)


  图 8-14：验证脚本执行后的配置变更


  ### 向脚本传递参数


  虽然脚本能按预期工作，但我不喜欢在文件中硬编码密码的想法。任何能拿到脚本文件的人都可以读取 `sa` 登录的密码，这可能会危及 SQL Server 实例的安全。如果我们将
  `sa` 登录密码作为命令行参数传递给脚本，会怎样呢？


  像其他命令行脚本一样，bash 脚本也接受命令行参数。所有命令行参数都可以通过其位置编号使用 `$` 来访问。请看以下示例命令：


  ```bash

  sudo ./automateSQLinstall.sh mYSecUr3PAssw0rd enterprise

  ```


  这里我调用了 `automateSQLinstall.sh` 文件，并向它传递了两个命令行参数——`mYSecUr3PAssw0rd` 和 `enterprise`。你可能已经猜到，第一个参数是
  `sa` 登录密码，第二个是 SQL Server 版本。在脚本内部，可以使用它们的位置编号来访问这些参数值。`mYSecUr3PAssw0rd` 参数值可以通过
  `$1` 访问，而 `enterprise` 参数值可以通过 `$2` 访问。我可以使用以下代码片段在脚本内部将这些参数值声明为变量：


  ```bash

  #VARIABLES

  MSSQL_SA_PASSWORD=$1

  MSSQL_PID=$2

  ```


  然后，我可以使用命令行参数值，通过相应的环境变量来运行 `/opt/mssql/bin/mssql-conf` 脚本，如下所示：


  ```bash

  sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD /opt/mssql/bin/mssql-conf
  setup

  ```


  ### 在 Bash 脚本中添加条件逻辑


  既然我们正在使脚本动态化并传递命令行参数值，我们就需要验证用户输入。回想一下，安装 SQL Server 时 `sa` 登录密码是一个必需参数。我们将添加条件逻辑来评估用户是否提供了
  `sa` 登录密码的值。执行此操作的代码片段如下所示：


  ```bash

  #Check if the sa password string is null or has zero length

  if [ -z $MSSQL_SA_PASSWORD ]

  then

  echo Environment variable MSSQL_SA_PASSWORD must be set for unattended install

  exit 1

  fi

  ```


  一个简单的 `if...then` 条件语句评估 `$MSSQL_SA_PASSWORD` 参数值是否为 null 或长度为零。退出代码 `1` 会将脚本执行状态设置为失败，并导致其中止。验证
  `sa` 登录密码还有更多内容，例如复杂性要求，包括最小密码长度、大写、小写、非字母数字字符以及十进制数字的包含。这只是一个简单示例，用于验证用户是否为 `sa`
  登录密码提供了值。


  那么版本（edition）呢？由于我们最初为版本提供了一个环境变量，因此我们需要为其提供一个值。这意味着我们也需要评估用户是否在命令行参数中提供了值。以下代码片段展示了如何操作。这里，如果用户没有提供任何内容，我们会设置一个默认值——在本例中是开发者版（Developer
  Edition）：


  ```bash

  #Check if the edition parameter is null or has zero length

  if [ -z $MSSQL_PID ]

  then

  MSSQL_PID=Developer

  fi

  ```


  以下是一个针对 RHEL/CentOS Linux 系统的更新版脚本，其中包含了参数值和条件逻辑评估：


  ```bash

  #!/bin/bash

  ### VARIABLES

  MSSQL_SA_PASSWORD=$1

  MSSQL_PID=$2

  if [ -z $MSSQL_SA_PASSWORD ]

  then

  echo Environment variable MSSQL_SA_PASSWORD must be set for unattended install

  exit 1

  fi

  if [ -z $MSSQL_PID ]

  then

  MSSQL_PID=Developer

  fi

  sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

  sudo yum install -y mssql-server

  sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD /opt/mssql/bin/mssql-conf
  setup

  sudo systemctl enable mssql-server

  sudo firewall-cmd --zone=public --add-port=1433/tcp --permanent

  sudo firewall-cmd --reload

  sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

  sudo mkdir /tmp/dbdata

  sudo chown mssql /tmp/dbdata

  sudo chgrp mssql /tmp/dbdata

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

  sudo mkdir /tmp/dbbackup

  sudo chown mssql /tmp/dbbackup

  sudo chgrp mssql /tmp/dbbackup

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

  sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

  sudo systemctl restart mssql-server

  ```


  以下是 Ubuntu 中相应的脚本：


  ```bash

  #!/bin/bash

  #VARIABLES

  MSSQL_SA_PASSWORD=$1

  MSSQL_PID=$2

  if [ -z $MSSQL_SA_PASSWORD ]

  then

  echo Environment variable MSSQL_SA_PASSWORD must be set for unattended install

  exit 1

  fi

  if [ -z $MSSQL_PID ]

  then

  MSSQL_PID=Developer

  fi

  curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -

  sudo add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
  xenial main"

  sudo apt-get update

  sudo apt-get install -y mssql-server

  sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD /opt/mssql/bin/mssql-conf
  setup

  sudo systemctl enable mssql-server

  sudo ufw --force enable

  sudo ufw allow 22/tcp

  sudo ufw allow 1433/tcp

  sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

  sudo mkdir /tmp/dbdata

  sudo chown mssql /tmp/dbdata

  sudo chgrp mssql /tmp/dbdata

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultdatadir /tmp/dbdata

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultlogdir /tmp/dbdata

  sudo mkdir /tmp/dbbackup

  sudo chown mssql /tmp/dbbackup

  sudo chgrp mssql /tmp/dbbackup

  sudo /opt/mssql/bin/mssql-conf set filelocation.defaultbackupdir /tmp/dbbackup

  sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

  sudo systemctl restart mssql-server

  ```


  你现在可以像下面这样使用位置命令行参数来运行脚本：


  ```bash

  sudo ./automateSQLinstall.sh mYSecUr3PAssw0rd enterprise

  ```


  再次，坐好，放松，见证奇迹发生。



  '
- '# 总结


  本章的初衷是帮助你开始在 Linux 上使用 SQL Server。作为一名只在 Windows 操作系统上工作过的 SQL Server DBA，我理解你对于接触陌生系统的犹豫。现在，你已经了解了
  SQL Server on Linux 的工作原理、如何安装和配置它、如何处理 Linux 文件系统和权限，以及如何编写简单的 bash 脚本，你再也无法自称
  Linux 新手了。请为自己鼓掌，因为你出色地面对并征服了强大的企鹅（Linux）。不过，下一章我们将稍作调整，重新回到 Windows 上工作，构建自定义 SQL
  Server Docker 镜像。


  '
- '# 9. 在 Windows 上创建自定义 SQL Server 容器镜像


  > *当然，仅仅因为某件事是传统，并不构成去做的理由。*

  >

  > ——雷蒙尼·斯尼奇，《空白之书》


  上私立学校意味着要遵守某些着装规范——带有校徽的白色有领衬衫、海军蓝正装裤和黑色皮鞋。无论刮风下雨，都必须穿校服。想象一下，在季风暴雨中，你背着一个装满所有书本和笔记本的
  15 磅重背包穿过校园。无论你的现成皮鞋质量有多好，它们都撑不过一个学期。更糟糕的是，九年级的男生在课间休息时喜欢打闹和奔跑。每当我抱怨磨坏的皮鞋时，妈妈都会狠狠地责骂我。


  直到我哥哥的朋友向我们介绍了定制皮鞋。菲律宾鞋都的一位老人决定开创自己的事业，用升级改造的飞机轮胎作为鞋底制作定制皮鞋。我不知道他是怎么想到用升级改造的飞机轮胎做鞋底的，也不知道他从哪里弄来的轮胎（我相当确定他并没有到处闯入机场去割破飞机轮胎来获取它们）。但我们可不想错过这个机会。我们拜访了那位老人，量了尺寸，并被告知要等两周，因为做这些鞋需要这么长时间——漫长的两周。对于一个青少年来说，那感觉像永恒一样漫长。但我们必须等待。另外，如果你好奇的话，我们确实付了鞋钱。它们的价格几乎是以前买的现成皮鞋的两倍。


  拿到我的鞋后，我立刻穿上并开始奔跑。我想看看它们是否符合我的期望。结果让我印象深刻。我每天都穿着它们。它们虽然不像我之前的皮鞋那么舒适，但确实满足了我的需求。它们撑过了好几个学年，三年前我去我妈妈家时还看到了它们。我已经穿不下了，但它们看起来仍然很棒，还能穿。这证明，你可以找到专门满足你需求的东西——无论是找到能提供它的人，还是自己动手制作。


  我们在前几章中使用的容器都是来自 Docker Hub 或 Microsoft Container Registry (MCR) 等注册表的公开可用镜像。在某些情况下，你可能需要遵循公司标准、满足合规性要求或仅仅是标准化部署的自定义构建镜像。在
  Windows 方面，一个例子可能是在 Windows Server 2016 容器上构建带有 Service Pack 2 的 SQL Server 2016。只有
  Windows 容器上的 SQL Server 2017 是微软公开提供的。在 Linux 方面，也许你希望将容器操作系统标准化为 Red Hat Enterprise（或
  CentOS）Linux，而不是 Ubuntu。


  本章将介绍如何创建可部署为容器的自定义 SQL Server on Windows 镜像。我们将学习使用 `Dockerfile`，这是一个文本文件，包含用户在命令行上可以运行的所有命令，以创建自定义的
  Docker 镜像。创建自定义 Docker 镜像后，我们将部署一个容器并连接到它，以验证它是否满足我们所有的定制要求。


  ## 创建自定义 Docker 镜像


  有两种方法可以创建自定义 Docker 镜像。第一种是更新一个正在运行的容器，并使用 `docker commit` 命令来创建一个包含这些更改的新镜像。这里的想法是，你想修改一个基础镜像，并将其用作新的自定义镜像的参考。


  让我们使用公开可用的 SQL Server on Linux Docker 镜像。别混淆了。本章仍然专注于 Windows。我只是用 Linux Docker
  镜像作为例子来简化说明。稍后你会明白为什么。你可以在这些容器中添加数据库并进行必要的修改。完成后，你可以运行以下 `docker commit` 命令来基于更改后的容器创建一个新镜像，其中
  `sqldevlinuxcon01` 是正在运行的容器的名称，`sqlserver2017-cu18-ubuntu-16.04-with-dbs:v2.0` 是新镜像的名称。作为最佳实践，我为镜像添加了一个标签，以便我可以轻松识别它是什么。


  ```

  docker commit sqldevlinuxcon01 sqlserver2017-cu18-ubuntu-16.04-with-dbs:v2.0

  ```


  回顾*第* *5**章*。运行此命令将创建一个新的文件系统层，其中包含你所做的更改。如果你对这个新镜像运行 `docker inspect` 命令，并与来自 MCR
  的镜像进行比较，你会看到新的文件系统层，如图 9-1 所示。其他所有内容看起来都一样。


  ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig1_HTML.jpg](img/484552_1_En_9_Fig1_HTML.jpg)


  图 9-1


  添加到包含更改的镜像中的新文件系统层


  你可以使用这个新镜像来创建包含额外更改的容器。看看下面这个使用新创建镜像的 `docker run` 命令：


  ```

  docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1413:1433 --name
  sqldevlinuxcon03 -d -h linuxsqldev01 sqlserver2017-cu18-ubuntu-16.04-with-dbs:v2.0

  ```


  这里有一个问题：commit 操作不会包含挂载到容器内的卷中存储的任何数据。如果 `sqldevlinuxcon01` 容器挂载在一个 Docker 卷上，并且你的用户数据库是在该卷中创建和存储的，那么这些都不会被包含进来。这是我**不**使用
  `docker commit` 命令来创建自定义 Docker 镜像的主要原因之一。



  ## 探索 `Dockerfile`


  第二种——也是推荐的——创建自定义 Docker 镜像的方法是使用 `Dockerfile`。`Dockerfile` 本质上是一个文本文件，其中包含了用户可以在命令行上运行的所有命令，用以构建自定义的
  Docker 镜像。这就像使用 `ConfigurationFile.ini` 文件，通过相同的配置来部署 SQL Server。我喜欢把 `Dockerfile`
  想象成一份食材清单，你需要它来制作一个配方（你的 Docker 镜像），然后别人可以使用这个配方来烘焙一个蛋糕（你的容器）。你可以从不同来源获取食材，并用它们来制作配方。你可以把你的配方交给任何有耐心和创意的人去烘焙蛋糕（嘿，我得为开发者们说点好话）。


  与编写脚本类似，`Dockerfile` 包含一系列顺序列出的命令、指令或参数，这些指令将对您选择的基础 Docker 镜像执行操作，以创建一个自定义镜像。而且因为它包含了镜像构建的详细信息，对于那些想了解镜像是如何构建的人来说，它是一份很好的文档。当我刚开始时，我花了很多时间阅读
  [`https://github.com/microsoft/mssql-docker`](https://github.com/microsoft/mssql-docker)
  上不同 SQL Server 镜像的 `Dockerfile` 参考资料。这让我了解了如何使用我首选的操作系统平台和 SQL Server 版本来构建我自己的自定义
  SQL Server 镜像。另外，我旅行时晚上睡不好，所以我觉得读技术文档会有帮助。结果并没有。


  你可以将 `Dockerfile` 存储在像 GitHub 这样的版本控制系统上，这样你就可以跟踪团队中不同成员所做的更改。因为我们正在构建一个包含所需操作系统和配置的
  SQL Server 环境，你可以将 `Dockerfile` 视为一种实现*基础设施即代码*的方式。


  ### 文件本身


  我确实说过 `Dockerfile` 只是一个文本文件。你可以使用你喜欢的文本编辑器来创建和编写 `Dockerfile`。我通常在 Windows 工作站上用
  Notepad++ 开始编写。完成后，我会将其复制到 Windows Docker 主机、Linux Docker 主机或任何安装了 Docker CLI 客户端的机器上。


  我觉得 `Dockerfile` 真正烦人的一点是文件名本身。它必须严格命名为 `Dockerfile`，首字母 "D" 大写，是一个没有空格的单词，并且没有文件扩展名。如果你使用的文本编辑器默认保存文件时带有
  ".txt" 扩展名，请务必删除它。我记不清有多少次我不得不排查我的 `Dockerfile` 到底哪里出了问题，结果发现只是文件有扩展名。这就是我喜欢用 Notepad++
  的原因。


  **提示**


  不过，如果你想统一文件命名规范，实际上可以使用不同的文件名和扩展名。例如，你可以使用 `Dockerfile` 作为生产环境文件，而 `dockerFile.dev`
  用于开发环境。这里的想法是，即使对于代码文件，你也要有合适的文档管理策略。毕竟，代码文件也可以被视为文档。你不仅想要跟踪和管理代码变更，还希望对它们进行适当的分类，这样团队中就不会有人意外部署仍在开发中的代码。无论你是在自动化代码审查还是实施持续集成，都没关系。一个能最大限度减少人为错误的适当流程有助于改进
  DevOps 实践。在本章后面，你将看到一个如何使用不同文件名来构建自定义 Docker 镜像的示例。


  `Dockerfile` 的格式如下所示：


  ```

  #注释

  INSTRUCTION 参数

  ```


  `INSTRUCTION`（指令）不区分大小写，我觉得这很有趣，考虑到 Docker 最初是为 Linux 构建的。然而，惯例是将 `INSTRUCTION`
  大写，以便与参数轻易区分开。让我们看看你可以在 `Dockerfile` 中包含的不同指令。我将在这里定义这些指令，尽管并非所有指令都会用于创建 Windows
  上的自定义 SQL Server 镜像。其中一些将用于 Linux 上的 SQL Server。


  ### `FROM` 指令


  `Dockerfile` 必须以 `FROM` 指令开头，尽管你可以争辩说它可以以注释开头。`FROM` 指令指定了你想要开始构建的基础 Docker 镜像（双关语）。它可以是基础操作系统的镜像，也可以是你想要在其上构建的现有镜像。当你构建自定义的“黄金镜像”时，`FROM`
  指令引用一个基础操作系统镜像。以下是 `FROM` 指令，告诉 `Dockerfile` 使用 Windows Server 2016 Core OS Build
  14393.2972。可用的 Windows Server Core 镜像列表可在 [`https://hub.docker.com/_/microsoft-windows-servercore`](https://hub.docker.com/_/microsoft-windows-servercore)
  获取。


  ```

  FROM mcr.microsoft.com/windows/servercore:10.0.14393.2972

  ```


  与运行 `docker run` 命令类似，如果在构建期间 `FROM` 指令中的镜像在 Docker 主机上本地不存在，它将在创建自定义镜像之前从公共仓库中拉取。


  ### `LABEL` 指令


  `LABEL` 指令是一个键值对，用于向镜像添加元数据。可以将其视为关于自定义镜像的附加注释——它使用了什么基础镜像、上面运行什么应用程序、版本是什么等等。以下是一个如何编写多行
  `LABEL` 指令的示例：


  ```

  LABEL name="Windows Server 2016 上的 SQL Server 2016 SP2"

  LABEL version="1.00.00"

  LABEL environment="dev/test"

  LABEL maintainer="theawesomedbateam@testdomain.com"

  ```


  当你对正在检查的镜像运行 `docker inspect` 命令时，这些信息会显示在输出的 `Labels`（标签）部分，如图 9-2 所示。


  ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig2_HTML.jpg](img/484552_1_En_9_Fig2_HTML.jpg)


  图 9-2

  拥有多个 `LABEL` 指令的 Linux 上 SQL Server 镜像元数据


  就像任何类型的文档一样，你需要定义标准。你不希望你的一些 `Dockerfile` 文件使用 `LABEL` 指令，而其余的却使用注释。我建议在一种情况下将 `LABEL`
  指令作为标准：当使用你自定义镜像的人无法访问 `Dockerfile` 时。




  ### RUN 指令


  显然，`RUN` 指令用于执行命令。这将是你最常用的指令之一。你可以使用其两种形式中的任意一种来使用 `RUN` 指令：


  *   `SHELL` 形式：命令在操作系统的默认命令 shell 中运行——在 Linux 上是 `/bin/sh -c`，在 Windows 上是 `cmd
  /S /C`。

  *   `EXEC` 形式：命令直接调用可执行文件，而不调用命令 shell。使用 EXEC 形式可以防止传递给命令 shell 的字符串发生可能的破坏性更改，这在命令行中进行字符串操作时很常见。


  `RUN` 指令并非唯一拥有两种形式的指令。你将在本章后面的章节中看到，其他指令也同时具有 SHELL 和 EXEC 形式。


  以下是使用 SHELL 形式的 `RUN` 指令的示例。该命令将使用 PowerShell 命令 shell（而不是默认的 `cmd.exe` shell）并将
  `MSSQLSERVER` 服务的启动类型设置为自动。如果你想知道的话，Windows 容器仍然使用服务，这与 Linux 容器不同，后者只需运行一个进程。


  ```

  RUN powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

  ```


  等效的 EXEC 形式的 `RUN` 指令如下所示：


  ```

  RUN ["powershell", "-Command", "Set-Service MSSQLSERVER -StartupType Automatic"]

  ```


  SHELL 和 EXEC 形式之间的区别在于 `RUN` 指令的执行方式。在 SHELL 形式中，命令在默认 shell 的上下文中运行。在 EXEC 形式中，命令被显式运行。使用前面的
  `RUN` 指令示例，SHELL 形式将在 Docker 镜像中运行以下命令：


  ```

  cmd /S /C powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

  ```


  相反，在 EXEC 形式中，命令显式执行。当然，我们假设命令的路径已在系统环境变量中定义。


  ```

  powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

  ```


  只要你能使用基础镜像层运行它，你就可以使用 `RUN` 指令执行不同的命令——下载文件、创建目录、配置设置等等。你可以利用基础镜像的能力和 shell 环境的功能来做任何你想做的事情。


  `RUN` 指令将在当前镜像之上的一个新的可读写文件系统层中执行任何命令。这是一个基于现有镜像创建的新的、临时的容器。一旦命令完成，结果将被提交到镜像，就像使用
  `docker commit` 命令所做的那样。这将显示为一个新的文件系统层，如图 9-1 所示。这个新镜像成为 `Dockerfile` 中下一个指令的起点。然后临时容器将被移除。还记得*第
  5* 章中关于乐高积木的比喻吗？


  ### COPY 指令


  `COPY` 指令从源位置复制新文件或目录，并将它们添加到容器文件系统中的指定路径。与 `RUN` 指令类似，它也有两种形式：


  *   `COPY <源路径> <目标路径>`

  *   `COPY ["<源路径>", "<目标路径>"]`


  第二种形式用于路径中包含空格的情况，例如 `C:/Program Files/Microsoft SQL Server`，这主要适用于 Windows 而非 Linux。文件和目录必须位于相对于
  `Dockerfile` 的路径中，并且 `<目标路径>` 需要使用正斜杠进行引用（即使在 Windows 上，也要考虑 Linux 风格）。以下是一个 `COPY`
  指令示例，用于将存储 `Dockerfile` 的机器上的 SQL Server 2016 Developer Edition with Service Pack
  2 安装介质复制到 C:/SQL2016Dev_SP2 目录：


  ```

  COPY /SQL2016Dev_SP2 C:/SQL2016Dev_SP2

  ```


  注意


  我刚开始时感到困惑的一件事是 Docker for Windows 文档中（包括来自 Docker 和 Microsoft 的文档）对正斜杠的使用。例如，你需要将
  `C:\Windows\System32\cmd.exe` 写成 `C:/Windows/System32/cmd.exe`。我们在 Windows 中一直使用反斜杠（`\`）作为路径分隔符。但由于
  Docker 最初是为 Linux 创建的，它遵循 Linux 的约定，使用正斜杠（`/`）作为路径分隔符。如果你想在 Docker 中使用反斜杠，你需要正确地转义它。这是因为反斜杠字符在
  Linux 中被用作转义字符。如果你想坚持在 Windows 中的做法，你需要“转义转义字符”。前面的例子需要写成 `C:\\Windows\\System32\\cmd.exe`。或者直接使用正斜杠代替。


  `<源路径>` 必须在构建上下文内部。如果你将 `Dockerfile` 存储在 Windows 机器上的 `E:/dockerBuild` 目录中（该机器具有
  Docker CLI 客户端），那么 `SQL2016Dev_SP2` 目录应该在该目录内部。如果 `<源路径>` 是一个目录（如示例中所示），则仅复制其内容——包括文件系统元数据——而不复制目录本身。图
  9-3 展示了 Windows Docker 主机上构建上下文的文件系统结构。本章稍后我将解释 `start.ps1` PowerShell 脚本的用途。


  ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig3_HTML.jpg](img/484552_1_En_9_Fig3_HTML.jpg)


  图 9-3


  Windows Docker 主机上构建上下文的文件系统结构


  在 Linux 上，你可以将 `chown` 命令与 `COPY` 指令一起传递，格式为 `COPY [--chown=<用户>:<组>] <源路径>... <目标路径>`。这很有用，因为默认的
  `COPY` 指令总是分配 UID 和 GID 值为 0 —— 即用户和组都等于 `root`。遵循最小权限原则，我们不想将所有内容都分配给 `root`。然而，只要容器不是以
  `root` 身份运行，让 `root` 拥有容器内的文件和目录所有权是可以的。*第 10* 章提供了一个构建在 Linux 上运行 SQL Server 并以
  `非 root` 用户身份运行的自定义 Docker 镜像的示例。




  ### ADD 指令


  `ADD` 指令与 `COPY` 指令类似，但除了仅在文件系统之间复制外，还具有额外的功能。你可以使用 `ADD` 指令从一个带有 URL 的远程位置进行复制。假设你想将
  `start.ps1` PowerShell 脚本从 [`github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/start.ps1`](https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/start.ps1)
  复制到你 Windows 上自定义 SQL Server 镜像的 `C:/` 目录下。你可以使用以下 `ADD` 指令：


  ```

  ADD https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/start.ps1
  /

  ```


  你可能已经猜到了 `start.ps1` PowerShell 脚本的用途。如果你查看在 [`github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/dockerfile`](https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/dockerfile)
  提供的用于创建 Windows 上自定义 SQL Server 镜像的 `Dockerfile`，你会发现该 `start.ps1` PowerShell 脚本是在最后一个指令——即
  `CMD` 指令中被调用的。


  我更倾向于在本地提供文件，而不是从 URL 复制。我想确保我使用的文件——无论是脚本还是安装文件——都没有任何潜在的文件损坏错误。我希望在将它们纳入任何自动化流程之前，能先在本地文件系统中手动测试它们。事实上，在我过去构建用于部署不同版本和版本的
  SQL Server 的自动化流程时，所有安装介质都已提前下载到网络文件共享中并经过手动测试。这样可以避免因为某个 CAB 文件损坏而导致安装失败，从而省去了排查故障的麻烦。我相信你过去在安装
  SQL Server 时也遇到过这种情况。


  ### SHELL 指令


  `SHELL` 指令允许覆盖用于命令 shell 形式的默认 shell。在 Windows 容器上使用此指令更为常见，因为 Windows 同时拥有 `cmd.exe`
  和 `powershell.exe` 两种 shell。Windows 的默认 shell 是 `cmd.exe`。作为一个 PowerShell 爱好者，我更喜欢在
  Windows 上使用 `SHELL` 指令，这样我就能充分利用使命令执行更简便的内置 cmdlet。`SHELL` 指令以 `SHELL ["executable",
  "parameters"]` 的形式编写。将 `RUN` 指令中使用的示例改写为使用 `SHELL` 指令：


  ```

  SHELL ["powershell", "-Command", "Set-Service MSSQLSERVER -StartupType Automatic"]

  ```


  如果你在 `Dockerfile` 中有一系列想要运行的 PowerShell 命令，这会使事情变得简单得多。假设你想在安装完成后从容器中删除 `SQL2016Dev_SP2`
  目录。你可以使用 `SHELL` 指令定义默认 shell，并使用 `RUN` 指令来执行 PowerShell 命令：


  ```

  #将 PowerShell 设置为命令 shell

  SHELL ["powershell", "-Command"]

  #运行 Set-Service PowerShell cmdlet 来配置 MSSQLSERVER

  RUN Set-Service MSSQLSERVER -StartupType Automatic

  #运行 Remove-Item PowerShell cmdlet 来删除目录

  RUN Remove-Item -Path C:/SQL2016Dev_SP2 -Recurse -Force

  ```


  显然，在构建镜像时利用 PowerShell，使用 `SHELL` 指令比使用 `RUN` 指令更高效。尽管你可能开始认为 `SHELL` 指令是专门为 Windows
  容器编写的，但你也可以在 Linux 上使用它来切换到不同的 shell。但是，当默认 shell 已经能完成你需要的大部分工作时，为什么还要在 Linux 容器内这样做呢？


  ### CMD 指令


  `CMD` 指令允许你在使用 `docker run` 命令运行容器时设置一个默认命令和默认参数。如果在运行容器时你没有提供命令，就会执行此指令。但是，如果你选择用特定的命令运行容器，它就会被覆盖。与你可以在
  `Dockerfile` 中拥有多个的 `RUN` 和 `SHELL` 指令不同，只有最后一个 `CMD` 指令会被评估。拥有多个 `CMD` 指令是没有意义的。另外，你希望
  `CMD` 指令执行某些会持续运行而不会退出的操作。如果你执行一个完成后就退出的命令，容器也会随之终止。你不希望 `CMD` 指令在 Windows 中运行像
  `NET START MSSQLSERVER` 这样的服务，因为它会在命令完成后退出，并随之终止容器。想在容器内以服务方式运行 SQL Server，这样可不行。


  `CMD` 指令不是两种，而是有三种形式：


  *   `CMD ["executable", "param1", "param2"]`（`EXEC` 形式，这是推荐的形式）

  *   `CMD ["param1", "param2"]`（作为 `ENTRYPOINT` 的默认参数）

  *   `CMD command param1 param2`（`SHELL` 形式）


  如果你想在 `Dockerfile` 中将最后一条指令设为运行一个名为 `start.ps1` 的 PowerShell 脚本，以下是以 `EXEC` 形式表示的
  `CMD` 指令。这假设你已经在运行该脚本之前将其复制到了镜像内部。


  ```

  CMD ["powershell", "-Command", "C:/start.ps1"]

  ```


  以 `SHELL` 形式运行 `CMD` 指令会使其行为类似于 `SHELL` 形式的 `RUN` 指令，使用默认的操作系统命令 shell。如果你想运行自己的命令，你需要将命令表达为一个
  JSON 数组，传入可执行文件的完整路径并用双引号括起来——除非你使用了 `WORKDIR` 指令。以下是使用 `CMD` 指令运行一个名为 `sampleConsole.exe`
  的 .NET 控制台应用程序的示例：


  ```

  CMD ["C:/sampleConsole.exe", "--run"]

  ```


  正如我提到的，在运行容器时，你可以覆盖在 `CMD` 指令中定义的默认命令。例如，使用 `docker run` 命令运行 Windows Server 2016
  Core Docker 镜像会在创建后立即终止容器。我找不到创建此镜像的参考 `Dockerfile` 来查看其中的 `CMD` 指令，但它确实会在创建后终止。如果我想让容器保持运行，我可以向容器传递一个不会退出的命令，以覆盖
  `CMD` 指令中写的任何内容。以下是向 `docker run` 命令传递 `ping localhost -t` 命令的示例：


  ```

  docker run mcr.microsoft.com/windows/servercore:ltsc2016 ping localhost -t

  ```




  ## ENTRYPOINT 指令


  仿佛拥有 `RUN`、`SHELL` 和 `CMD` 指令还不够，现在又多了一个要加入列表的：`ENTRYPOINT` 指令。`ENTRYPOINT` 指令用于将正在运行的容器视作一个可执行文件。这通常在你希望容器作为一个特定可执行文件的便携式封装，而不期望用户在运行时覆盖该可执行文件时使用。如果你希望容器每次运行相同的可执行文件，这将非常有用。这意味着你无法使用
  `docker run` 命令覆盖该命令。但是，任何添加到 `docker run` 命令末尾的内容都会被追加到 `ENTRYPOINT` 指令中定义的命令后面。我曾经认为
  `ENTRYPOINT` 指令对 SQL Server 容器没什么用，直到我意识到，如果你希望限制容器只能运行 SQL Server 而不能运行其他东西，并且可能需要在启动时传递参数，就可以使用它。此外，没有什么能阻止你覆盖
  Windows 中运行 `start.ps1` PowerShell 脚本的 `CMD` 指令，而只运行 `ipconfig` 命令。或者在 Linux 中覆盖运行
  SQL Server 进程的指令，而只运行 `bash`。当然，这样做也意味着在你重启容器并且不覆盖 `CMD` 指令之前，SQL Server 将不再运行。


  与 `RUN` 指令类似，`ENTRYPOINT` 指令有两种形式，EXEC 形式（首选）和 SHELL 形式。以下是一个在 Windows 中使用 EXEC
  形式的 `ENTRYPOINT` 指令来运行 SQL Server 可执行文件的示例。只需将 `{nn}` 替换为你正在运行的 SQL Server 版本号：


  ```dockerfile

  ENTRYPOINT ["C:/Program Files/Microsoft SQL Server/MSSQL{nn}.MSSQLSERVER/MSSQL/Binn/sqlservr.exe"]

  ```


  ## CMD vs. RUN vs. SHELL vs. ENTRYPOINT


  在创建 `Dockerfile` 时，选择这些不同的指令可能会令人困惑。请记住以下几点：


  *   一个 `Dockerfile` 中只能有一个有效的 `CMD` 指令——只有最后一个会被评估。如果你想让你的容器覆盖 `CMD` 指令中定义的命令，请使用此指令。

  *   使用 `RUN` 指令来运行命令以构建你的自定义 Docker 镜像。

  *   如果你想更改默认的命令 shell 并将其用于大多数命令，请使用 `SHELL` 指令。

  *   使用 `ENTRYPOINT` 指令来防止用户覆盖你希望容器运行的可执行文件。

  *   你可以在 `Dockerfile` 中将 `ENTRYPOINT` 指令与 `CMD` 指令结合使用。这样做时，`CMD` 指令中的字符串将被追加到 `ENTRYPOINT`
  指令之后。`CMD` 指令必须是 `Dockerfile` 中的最后一条指令。

  *   你可以使用 `ENTRYPOINT` 或 `CMD` 指令来运行一个进程或一个脚本。如果你正在运行一个脚本，请确保它运行的是一个不会退出的进程或命令。


  这样做的好处是，构建自定义 SQL Server 镜像不需要太多的配置设置。你只需要一个基础镜像和 SQL Server 安装文件，然后在安装后配置 SQL Server
  实例，就一切就绪了。当我们开始编写 `Dockerfile` 时，你会看到这些指令是如何一起使用的。


  ## WORKDIR 指令


  `WORKDIR` 指令为其他指令（如 `RUN`、`CMD`、`ENTRYPOINT`、`COPY` 和 `ADD`）设置一个工作目录。如果构建过程中目标镜像中不存在
  `WORKDIR`，则会创建它。当你希望从自定义路径运行可执行文件或脚本时，它非常有用——定义 `WORKDIR`，然后相对于它运行可执行文件。你可以将其视为在构建过程中在容器内部执行
  `cd` 命令。如果你的可执行文件路径非常长（例如 Windows 上 SQL Server 的默认安装目录），并且你不想在整个 `Dockerfile` 中重复它，这也很有用。然而，使用
  `ENV` 指令来定义路径更为合适，因为通常将路径定义为环境变量。以下是一个在构建过程中使用 `WORKDIR` 指令将工作目录设置为 `C:/` 的示例：


  ```dockerfile

  WORKDIR /

  ```


  再次强调，在 Windows 中执行此操作时，考虑 Linux 的思维方式有助于最小化转义字符的使用。明白了吗？


  ## ENV 指令


  `ENV` 指令是一个键值对，用于设置一个持久的环境变量，该变量在构建时和容器运行时都可用。还记得你一直在 `docker run` 命令中使用的 `-e` 参数吗？


  `ENV` 指令有两种形式：


  *   `ENV <key> <value>`

  *   `ENV <key>=<value>`


  我更喜欢使用第二种形式——`ENV <key>=<value>`——因为它更加明确。它还允许在一行中设置多个键值对。以下是一个为 SQL Server EULA
  设置键值对并分配 `sa` 登录密码的示例。我选择将它们显示在多行中以示区分：


  ```dockerfile

  ENV SA_PASSWORD="y0urSecUr3PAssw0rd"

  ENV ACCEPT_EULA="Y"

  ```


  但它们也可以合并为一行，如下所示：


  ```dockerfile

  ENV SA_PASSWORD="y0urSecUr3PAssw0rd" ACCEPT_EULA="Y"

  ```



  ## 使用转义字符


  我不知道你怎么想，但我不喜欢将长命令拆分成多行。我的大脑更倾向于把命令看成单行形式，无论它有多长，就像直接在命令行里输入一样。回想第 8 章中用于创建 Linux
  上 SQL Server 自动化安装脚本的命令，每一条命令都是单行写成的——尤其是调用`/opt/mssql/bin/mssql-conf`的那一条。


  然而，有些人不喜欢将很长的命令写在单行里。他们将其拆分成较小的部分，以便在屏幕的单页内可读。就好像他们的终端窗口或命令行 Shell 不会自动将文本换行到下一行。我并不怪他们。长时间盯着电脑屏幕可能导致所谓的数字眼疲劳（我非正式的研究也表明这会影响理智）。而转义字符就能在这里派上用场。


  你可以在 Linux 和 PowerShell 中使用转义字符。在 Linux 中，使用反斜杠（`\`）来转义下一个字符，使其不被 Shell 解释。这常用于将长命令行写成多行。下面是一个使用反斜杠编写命令来配置
  Linux 上的 SQL Server 并传递所需参数的示例：


  ```

  sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y \

  MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD \

  /opt/mssql/bin/mssql-conf setup

  ```


  如果你想在`Dockerfile`内部传递所需参数，而不是在`docker run`命令中，你可以对`RUN`指令做同样的事情。我更喜欢用`docker run`命令来传递参数。


  ```

  RUN sudo MSSQL_PID=$MSSQL_PID ACCEPT_EULA=Y \

  MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD \

  /opt/mssql/bin/mssql-conf setup

  ```


  PowerShell 使用反引号（`` ` ``）操作符将一条很长的命令写成多行。假设你想重写`SHELL`指令部分使用的 PowerShell 命令示例，以便在设置`StartupType`属性之前先检查
  MSSQLSERVER 服务是否存在；你可以使用下面这个`RUN`指令示例来实现：


  ```

  RUN Get-Service | Where {$_.Name -eq "MSSQLSERVER"} | `

  Set-Service -StartupType Automatic

  ```


  此外，你可以在`Dockerfile`内部定义一个转义字符。这在 Windows 上尤其有用，因为目录路径分隔符是反斜杠——与`Dockerfile`中默认的转义字符相同。这就是为什么你使用双反斜杠`C:\\Windows\\System32\\cmd.exe`而不是单反斜杠的原因。你可以通过定义一个解析器指令来更改`Dockerfile`中默认的转义字符。下面的指令将`Dockerfile`中默认的转义字符从反斜杠改为反引号。这使得它与
  PowerShell 保持一致。


  ```

  # escape=`

  ```


  解析器指令是可选的。但如果你决定使用它们，它们必须写在`Dockerfile`的顶部，甚至要在`FROM`指令之前。


  既然我们已经掌握了为构建 Windows 上的自定义 SQL Server 镜像编写`Dockerfile`所需的知识，是时候将所有部分整合在一起了。


  ## 使用 Dockerfile 整合所有部分


  我在第 8 章提到过，我非常热衷于流程。因此，我概述了以下流程来创建一个基于 Windows Server 2016 Core 的自定义 SQL Server
  2016 开发者版镜像。这些步骤是模仿了[`github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/dockerfile`](https://github.com/microsoft/mssql-docker/blob/master/windows/mssql-server-windows-developer/dockerfile)中的
  Dockerfile，以捕获在 Windows 上创建自定义 SQL Server 镜像所需的步骤。对流程有一个高层次的概览，可以让你优化和改进这些步骤，并可能用你自己的命令和脚本替换它们。


  1.  从微软容器注册表（Microsoft Container Registry）中公开可用的 Windows Server 2016 Core 10.0.14393.2972
  基础镜像开始。

  2.  在镜像内部创建一个临时目录来存放 SQL Server 2016 开发者版的安装文件。

  3.  将 SQL Server 2016 开发者版的安装文件从你的机器复制到镜像中。

  4.  通过命令行安装 SQL Server 2016。

  5.  将 SQL Server 服务启动类型设置为自动。

  6.  从镜像中删除临时的 SQL Server 2016 开发者版安装介质文件夹。

  7.  将命令 Shell 切换到 PowerShell，为运行脚本`start.ps1`做准备。

  8.  将 PowerShell 脚本`start.ps1`复制到镜像的根目录——C:/。

  9.  为 PowerShell 脚本执行设置当前工作目录。

  10. 当容器启动时运行 PowerShell 脚本`start.ps1`。


  我在本章中已经多次提到 PowerShell 脚本`start.ps1`。这个脚本做了几件事：


  *   检查三个参数——`sa`登录密码、EULA 接受确认，以及如果你有想附加到 SQL Server 实例的数据库文件时 Azure Blob 存储的位置。

  *   如果使用了 Docker secrets 来存储`sa`登录密码，则利用它。

  *   进入一个无限循环，这样当你运行容器时脚本不会终止。


  我只需要第一点中不包括从 Azure Blob 存储附加数据库的部分。但我使用这个脚本来演示如何利用`Dockerfile`中的不同指令来构建你的自定义镜像。你可以从[`github.com/Microsoft/mssql-docker/blob/master/windows/mssql-server-windows/start.ps1`](https://github.com/Microsoft/mssql-docker/blob/master/windows/mssql-server-windows/start.ps1)下载这个脚本。


