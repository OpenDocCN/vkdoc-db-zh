  图 7-4

  对 Docker 卷进行更改


  你可以使用 `docker volume ls` 命令列出所有可用的 Docker 卷。最后，你可以使用 `docker volume rm` 命令删除特定的
  Docker 卷，如下所示：


  ```

  docker volume rm samplevolume

  ```


  我不会删除这里创建的卷。我将在下一节中将其与一个容器一起使用并作为卷挂载。


  你可以运行 `docker volume` 命令（如图 7-5 所示）来显示管理 Docker 卷的可用子命令列表。


