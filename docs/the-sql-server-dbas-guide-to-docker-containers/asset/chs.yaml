  图 3-11：显示 Docker 客户端和 Docker 引擎的版本


  不要在 Linux 上不加 `sudo` 运行 `docker` 命令。通常，从 Windows 平台转来的管理员会将他们的实践和思维方式带入 Linux 世界。然后他们疑惑为什么某些东西不工作。不带
  `sudo` 运行 `docker version` 将返回错误消息，如图 3-12 所示。


  ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig12_HTML.jpg](img/484552_1_En_3_Fig12_HTML.jpg)


  图 3-12：不带 sudo 运行 Docker 命令


  您肯定不想最终像这样排查一个自认为的安装问题，花费数小时试图找出问题所在，结果却发现只是没有使用提升的权限运行命令。


  运行以下命令以显示有关服务器上 Docker 安装的系统级信息。图 3-13 显示了该命令的输出。显然，Linux 系统提供的信息比 Windows 系统多得多。


  ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig13_HTML.jpg](img/484552_1_En_3_Fig13_HTML.jpg)


  图 3-13：显示 Docker 安装的系统级信息


  ```

  sudo docker info

  ```


  您现在拥有一个在 Linux 上运行的、功能齐全的 Docker 容器主机。对于一个刚刚开始使用 Linux 的人来说，这已经很不错了。



  ## 摆脱 sudo？


  积习难改（不，这不是下一部布鲁斯·威利斯电影的片名）。由于我职业生涯的大部分时间都在与 Windows 打交道，以至于每次在 Linux 上运行命令时，我仍然会忘记使用
  `sudo`。我相信你也会这样。还记得图 3-12 中的错误信息吗？它可能很烦人。然而，避免使用 `root` 登录，并在你运行的每条命令中始终使用 `sudo`，是一个良好的安全实践。


  不过，既然你刚开始接触 Linux，我就给你一个临时通行证来绕过这个小小的烦恼。不，我不会允许你通过 `root` 登录来逃避——这在我的书里是致命的原罪。我只允许你**暂时**在运行
  `docker` 命令时不用 `sudo`。


  **注意**

  你需要使用 `sudo` 运行 `docker` 命令的原因在于，docker 守护进程绑定到的是一个 Unix 套接字，而不是一个 TCP/IP 端口（Unix
  套接字通过消除 TCP/IP 所需的一些检查和操作——如路由——使得同一台机器内的进程间通信更快）。默认情况下，`root` 用户拥有该 Unix 套接字，其他用户访问它的唯一方式就是使用
  `sudo`。这就是为什么 docker 守护进程总是以 `root` 身份运行。


  要在不使用 `sudo` 的情况下运行 `docker` 命令，你需要：

  1.  创建一个名为 `docker` 的组

  2.  将你的用户账户添加到该组中


  当 docker 守护进程启动时，`docker` 组的成员将能够访问 Unix 套接字。这就像旧版本 SQL Server 中的 `SQLServerMSSQLUser$instancename`
  本地 Windows 组——该组的成员有权访问 SQL Server 服务。


  运行以下 `groupadd` 命令来创建一个名为 `docker` 的组：

  ```

  sudo groupadd docker

  ```

  如果 `docker` 组已经存在，你会收到类似图 3-14 中的信息。

  ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig14_HTML.jpg](img/484552_1_En_3_Fig14_HTML.jpg)

  图 3-14 创建名为 docker 的组


  如果是这种情况，请继续将你的用户账户添加到 `docker` 组。运行以下 `usermod` 命令来执行此操作：

  ```

  sudo usermod -aG docker $USER

  ```

  `-a` 参数用于将用户追加（或添加）到一个组（后面跟着 `G` 参数）。`$USER` 环境变量代表当前登录的用户（也就是你）。

  就像在 Windows 中一样，你必须注销并重新登录才能使更改生效。然后，你就可以重新运行 `docker version` 和 `docker info` 命令，而无需使用
  `sudo`。图 3-15 显示了使用我添加到 `docker` 组的用户账户运行 `docker info` 命令的输出。

  ![../images/484552_1_En_3_Chapter/484552_1_En_3_Fig15_HTML.jpg](img/484552_1_En_3_Fig15_HTML.jpg)

  图 3-15 无需 sudo 运行 docker 命令


  **警告**

  请注意——安全是严肃的事情，我不会掉以轻心。只有受信任的用户，如管理员，才应该被添加到 `docker` 组。该组的任何成员都有权限控制 docker 守护进程。这意味着将某人添加到这个组，相当于授予他们永久的、无需密码保护的
  `root` 访问权限。这比 `SQLServerMSSQLUser$instancename` 本地 Windows 组的权限更危险，因为它拥有 `root`
  访问权限。很可怕，不是吗？

  请务必阅读关于 Docker 安全的文档，特别是关于 `Docker 守护进程攻击面` 的部分，网址是 [`docs.docker.com/engine/security/security/`](https://docs.docker.com/engine/security/security/)。

  并且别忘了记录所有添加到此组的用户，以便你跟踪成员是谁。


  ## 本章小结


  本章带你逐步完成了将 CentOS 和 Ubuntu Linux 安装和配置为 Docker 容器主机的过程。它还向你介绍了一些基本的 Linux 命令，这些是你开始使用
  Linux 和安装 Docker 所需的。下一章将全部关于 Docker 生态系统、构成其运作的不同组件以及它们如何协同工作。


  '
- '# 4. Docker 生态系统


  > *相互依存应当与自给自足一样，成为人类的理想。*

  >

  > ——圣雄甘地


  我一直对飞机着迷。小时候，我想成为一名飞行员环游世界。也许是前往新地方的兴奋感，或者是弄清楚复杂系统如何工作的挑战感。或者两者兼而有之。


  在 2008 年感恩节等待登机时，我不禁想知道整个飞行旅行体验有多么复杂。如果你以前乘坐过商业航班，你就会明白我在说什么。当你在柜台办理登机手续时，航空公司的工作人员会递给你一张登机牌，并给你的行李贴上标签，以便它能送达最终目的地。你的登机牌上有航班的详细信息——登机口信息、座位分配、登机和起飞时间、乘客详情等。飞机将被分配一个登机口供乘客前往并登机。当你准备登机时，登机口工作人员会根据你的登机牌核对你的身份。当飞机即将离开登机口时，飞行员会检查他们的飞行数据计划，并核实其是否符合空中交通管制员的指示。如果一切按计划进行，飞机将离开登机口，飞往目的地（一位地勤人员在等待我们延误的航班时，好心分享了这些信息）。


  每一个复杂的系统都是由协同工作的不同部分组成的。如果你只是产品或服务的消费者（比如航班服务），不知道其运作的复杂细节也没关系。你只需要知道足够多关于如何正确使用它的知识即可。但是，如果你将负责交付该产品或服务的一部分，那么无论是为了你自己还是使用它的人，你都有责任去理解它是如何工作的，特别是你负责的那一部分。


  本章的目标是让你熟悉 Docker 这个复杂的系统。为了实现这个目标，我将向你介绍构成整个生态系统的不同组件，同时，介绍开始使用 Docker 所需的最常用命令。所以，准备好进行一次更偏向于“动手敲代码”的学习之旅吧。


  **注意**

  本章涵盖的示例命令将在 Windows PowerShell 命令行 shell 或 Linux 安全 shell（CentOS 或 Ubuntu）中展示，且不包含
  `sudo` 命令（请参阅第 3 章中“摆脱 sudo？”部分）。这是为了说明 `docker` 命令的互操作性。但这并不意味着我允许你忽视在 Windows
  Server 和 Linux 服务器操作系统上运行命令的安全实践。记住，在 Linux 上，只有 `docker` 命令可以不用 `sudo` 运行。所有其他需要提升权限的命令仍然需要
  `sudo`。




  ## 你好世界：Docker 版


  我相信你在学习计算机编程语言时，都有过编写“hello world”的经历。我第一次接触“hello world”是在二十多年前，当时我在大学二年级，第一次学习计算机编程。我多希望那能说是我编程之旅的开端（我之所以能通过那门课，唯一原因是我最好的朋友帮我写了期末项目）。但它确实让我明白了“hello
  world”是什么以及它的用途——它是检验操作者是否知道如何使用该语言的一个测试。难怪每种编程语言都从显示“hello world”作为标准输出开始。


  Docker 也不例外。虽然它并非真正的编程语言，但他们也采纳了“hello world”这个概念，并提出了自己的版本。但在我看来，他们创造自己版本“hello
  world”的方式极其出色。它不仅仅是在屏幕上显示一条简单的“hello world”信息，其版本还让你了解到 Docker 是如何工作的。在你的 Linux
  系统上，运行以下命令看看我的意思：


  ```

  docker run hello-world

  ```


  图 4-1 展示了 Docker 版本的“hello world”。很精彩，不是吗？


  ![../images/484552_1_En_4_Chapter/484552_1_En_4_Fig1_HTML.jpg](img/484552_1_En_4_Fig1_HTML.jpg)


  图 4-1


  你好世界：Docker 版


  不幸的是，同样的命令——`docker run hello-world`——在 Windows Server 2016 上的 Docker 中不再有效。这与命令无关，而完全与容器镜像的版本有关，我们将在后面的章节中介绍。即使你遵循
  Docker 官方文档在 Windows Server 上安装 Docker Enterprise，运行相同的命令仍然会返回类似图 4-2 的信息。


