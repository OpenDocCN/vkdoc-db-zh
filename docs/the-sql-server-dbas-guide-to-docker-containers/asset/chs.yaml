  \n有一次在准备我们的一场演出时，我注意到下一个乐队的键盘手架设了他的 MacBook Pro，并将其插入到数字合成器中。仅仅是一台 MacBook Pro 与乐器协同工作这个事实就引起了我的好奇心。我以前从未见过这种情况。我很确定他不是要在演出时写\
  \ Python 脚本。于是，我询问了他关于他的设备设置。他解释了 MacBook Pro 上的软件如何创造出不同的声音供他演奏时使用。他让我听了叠加了优美小提琴和弦乐的钢琴声，营造出一种宁静的感觉，仿佛在湖边度过一个安静的下午。一段琶音的电子音效能唤起欢快的感觉，让你忍不住想动起来。这是一个完全不同的音乐世界。我决定尝试一下，并在自己的\
  \ MacBook Pro 上试用了 Ableton Live 软件。我迷上了它。我开始制作自己的声音样本、音轨、循环乐段——任何能拓展我音乐创造力的东西。现在我的设备设置中除了数字合成器，还多了\
  \ MacBook Pro。\n\n但是，使用任何新工具都会带来一系列新的挑战。我现在必须管理我的数字音频工作站创建的大型音频文件，四处移动它们以避免填满我的主硬盘。我还需要维护一份在不同场地和不同设备上演奏时所需的配置设置列表。而且，我创建的音频文件越多，就越需要妥善命名它们，以便我知道它们是什么以及如何使用。我最不希望发生的事情就是在演出过程中手忙脚乱地寻找一个急需的音频文件。\n\
  \n我确实说过，使用任何新的工具和技术都会带来一系列挑战。使用`docker`也是如此——或者你可能接触到的任何技术。本章将涵盖作为一名 Docker 管理者，你将执行的最常见任务，例如创建、启动和停止容器上的\
  \ SQL Server。在前面的章节中，你已经接触过一些我们将要使用的`docker`命令。所以，到这个阶段你应该已经熟悉了它们。我们还将探讨在默认设置之外对\
  \ Docker 守护进程进行配置更改。我不会涵盖任何 SQL Server 管理任务，因为我假设你已经熟悉这些了。毕竟，你是一名 SQL Server DBA，不是吗？\n\
  \n## 配置 Docker 守护进程\n\n与默认的 SQL Server 安装类似，您从默认的 Docker 安装中获得的配置设置可以正常工作。但有一些您可以更改的配置设置，以提升作为\
  \ SQL Server 管理员使用 Docker 的整体体验。\n\n有两种方法可以配置 Docker 守护进程。第一种是在启动 Docker 守护进程时使用标志，类似于在\
  \ SQL Server 中使用启动参数。第二种是使用 `daemon.json` 配置文件。\n\n为了说明这两种选项的用法，假设您想测试新的 Docker\
  \ 守护进程功能。除非您使用的是 Docker 守护进程的 Edge 通道——包含新功能但未经充分测试的版本——否则所有实验性功能都是关闭的。您肯定不希望在生产环境中部署非稳定版本。\n\
  \n### 使用 dockerd\n\n要在启动 Docker 守护进程时启用标志，请运行 `dockerd` 命令并传递相应的标志。使用前面的例子来启用实验性功能，运行以下命令。与\
  \ Windows 服务类似，在运行此命令之前，Docker 守护进程应处于停止状态：\n\n```\nsudo dockerd –experimental\n\
  ```\n\n请注意使用 `dockerd` 命令启动 Docker 守护进程时使用 `sudo`——在 Linux 上您需要 `root` 权限。并且，与使用命令行启动\
  \ SQL Server 类似，在使用 `dockerd` 启动守护进程后，您需要打开另一个终端会话来与 Docker 交互。否则，当您退出当前终端会话时，可能会终止该进程。\n\
  \n在 Windows 上您可以执行相同的操作，但无需 `sudo`。\n\n有关使用 `dockerd` 时可用的标志和选项的完整列表，请访问 [`docs.docker.com/engine/reference/commandline/dockerd/`](https://docs.docker.com/engine/reference/commandline/dockerd/)。在\
  \ Windows 上，可在 [`docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-on-the-docker-service`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-on-the-docker-service)\
  \ 找到。\n\n### 使用 daemon.json\n\n`daemon.json` 文件包含您的 Docker 守护进程的配置设置。默认情况下，`daemon.json`\
  \ 文件不存在。您必须手动创建它以在您的 Docker 守护进程上设置自定义配置。\n\n在 Linux 上，该文件应存储在 `/etc/docker` 目录中。在\
  \ Windows 上，它应位于 `C:\\ProgramData\\docker\\config` 文件夹中。\n\n> **提示**\n>\n> 如果 `daemon.json`\
  \ 文件已存在，请务必在修改前复制一份副本。在修改配置文件之前保留备份总是一个好主意。毕竟，如果配置更改没有产生预期效果，拥有一个可以用来回滚更改的备份比尝试记住您在更改前几分钟所做的操作要快得多。\n\
  \n您可以使用您喜欢的文本编辑器创建 `daemon.json` 文件，并将其复制到 Docker 主机上的相应目录。在 Linux 上，您需要 `root`\
  \ 权限才能将文件复制到 `/etc/docker` 目录。\n\n使用前面启用 Docker 守护进程实验性功能的相同示例，向其中添加以下内容：\n\n```\n\
  {\n  \"experimental\": true\n}\n```\n\n创建并更新文件后，重新启动 Docker 守护进程。在 Linux 上运行以下命令来执行此操作：\n\
  \n```\nsudo systemctl restart docker\n```\n\n在 Windows 上，这就像重新启动任何 Windows 服务一样。\n\
  \n> **提示**\n>\n> 处理 Linux 文件系统时不要感到不知所措。当您刚开始时，并不总是需要在命令行上操作。创建、复制或修改文件等任务可以使用基于\
  \ Windows 的应用程序完成。我为此使用一个名为 WinSCP 的工具。我将在 Windows 机器上使用文本编辑器创建文件，并使用 WinSCP 将其复制到\
  \ Linux 机器。在处理大多数配置设置时，您确实需要在 Linux 上拥有 `root` 权限。请参阅 *附录 A* 了解如何安装和配置 WinSCP 以连接到\
  \ Linux 机器。\n\n如果您不需要在 Docker 守护进程上启用实验性功能，请务必还原更改。可以添加到 `daemon.json` 文件的配置选项的完整列表可在\
  \ [`docs.docker.com/engine/reference/commandline/dockerd/#daemon-configuration-file`](https://docs.docker.com/engine/reference/commandline/dockerd/#daemon-configuration-file)\
  \ 找到。在 Windows 上，可在 [`docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-with-a-configuration-file`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-docker/configure-docker-daemon#configure-docker-with-a-configuration-file)\
  \ 找到。\n\n这只是一个非常简单的例子，说明如何使用 `dockerd` 命令或 `daemon.json` 文件来更改您的 Docker 守护进程的配置。真正的价值在于知道如何使用这两种方法来配置\
  \ Docker 守护进程。\n\n> **注意**\n>\n> 您可能想知道，“我该用哪一种来更改我的 Docker 守护进程配置？”要回答这个问题，请回想一下您在\
  \ SQL Server 中如何使用启动参数与 `sp_configure`。如果您要进行一次性更改（作为故障排除的一部分），您会在 SQL Server 中使用启动参数；例如使用\
  \ `-m` 参数进入单用户模式，使用 `-T` 指定跟踪标志，或使用 `-f` 以最小配置启动。如果您想进行永久性的配置更改，例如启用备份压缩、设置恢复间隔等，您会使用\
  \ `sp_configure`（尽管您可能会争辩说有些配置设置只能通过启动参数获得，而有些只能通过 `sp_configure` 获得）。类似地，对于一次性更改使用\
  \ `dockerd`，对于永久性更改使用 `daemon.json`。\n\n## 更改默认镜像与容器目录\n\n在使用 Docker 时，我遇到的最常见的问题之一就是磁盘空间管理。这难道不正是我们作为\
  \ SQL Server 数据库管理员也要面对的问题吗？你的数据库文件不断增长或备份文件占用过多空间，导致磁盘空间耗尽。这通常是由于疏忽或缺乏规划造成的。但对于像\
  \ Docker 这样的新兴技术——它们通常首先在开发和测试环境中被采用——在平台变得关键之前（还记得你是如何被迫将那些 Microsoft Access 数据库升级到\
  \ SQL Server 的吗？），规划甚至不会被考虑。当你刚起步时，磁盘空间不足可能不会给你带来太大问题。但最终，它会的。\n\n回顾第 5 章，Docker\
  \ 的默认根目录在 Linux 上是 `/var/lib/docker/overlay2` 目录，在 Windows 上是 `C:\\ProgramData\\\
  docker\\windowsfilter` 文件夹。你从 Docker Hub 拉取的 Docker 镜像以及容器文件都将存储在这些目录中。你可以通过修改 Linux\
  \ 上的 `daemon.json` 文件并添加以下内容来更改这些默认位置：\n\n```json\n{\n\"data-root\": \"/mnt/docker\"\
  ,\n\"storage-driver\": \"overlay2\"\n}\n```\n\n`/mnt/docker` 目录将成为所有镜像和容器的新位置。确保在配置新的\
  \ Docker 根目录之前该目录已存在。\n\n以下是在 Linux 上更改默认 Docker 根目录的步骤：\n\n1.  停止 Docker 守护进程：\n\
  \n    ```bash\n    sudo systemctl stop docker\n    ```\n\n2.  修改 `daemon.json` 文件以包含上述设置。\n\
  \n3.  启动 Docker 守护进程：\n\n    ```bash\n    sudo systemctl start docker\n    ```\n\
  \n同样的步骤适用于 Windows。只需将 `/mnt/docker` 目录更改为一个有效的 Windows 目录，例如 `C:\\\\mnt\\\\docker`（注意使用两个反斜杠而不是一个，因为反斜杠字符在\
  \ Go 语言中有不同的解释），并删除 `\"storage-driver\": \"overlay2\"` 这一行。当然，使用服务管理控制台或命令行来停止和启动\
  \ Docker 服务。\n\n你可以通过运行 `docker info` 命令，以及拉取一个新镜像并检查 `/mnt/docker/overlay2` 目录的内容来验证更改是否生效。图\
  \ 6-1 显示了在 CentOS Linux 主机上的新 Docker 根目录。\n\n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig1_HTML.jpg](img/484552_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1：CentOS Linux 主机上的新 Docker 根目录\n\n图 6-2 显示了 Windows Server 主机上的新 Docker 根目录以及\
  \ `daemon.json` 文件的内容。\n\n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig2_HTML.jpg](img/484552_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2：Windows Server 主机上的新 Docker 根目录\n\n更改默认的 Docker 根目录会创建一个新的目录结构，但不会删除旧的结构。这也意味着\
  \ Docker 将不再知道包含所有已拉取镜像和已创建容器的旧目录——它们仍然在那里。如果你想要重用所有镜像层以避免再次拉取并回收磁盘空间，请在重启 Docker\
  \ 守护进程之前，将整个 `/var/lib/docker` 目录移动到新目录中。否则，你将会复制镜像层并占用更多磁盘空间。配置新的根目录后，Docker 不会告诉你某个镜像是否已经存在——它已经不再感知旧的根目录了。\n\
  \n在 Linux 上使用以下命令将整个 `/var/lib/docker` 目录移动到新目录（在 Windows 上，则是简单的复制粘贴）。请确保在运行命令之前先创建目标目录。\n\
  \n```bash\nmv /var/lib/docker/* /mnt/docker/\n```\n\n在步骤 #2 和 #3 之间添加此命令。如果是没有拉取过镜像的全新安装，则可以跳过此步骤。\n\
  \n## 停止并重启 Docker 守护进程\n\n我可能有些超前，已经提到了停止并重启 Docker 守护进程，但并未演示。实际上，我在第 3 章“在 CentOS\
  \ Linux 上安装 Docker”一节中已经介绍了如何启动 Docker 守护进程。学习这个命令对其他操作也很有用，比如停止和重启其他守护进程。另外，每当你对\
  \ Docker 做配置更改时，你都需要重启它。\n\n运行以下命令以停止 Docker 守护进程：\n\n```bash\nsudo systemctl stop\
  \ docker\n```\n\n运行以下命令以启动 Docker 守护进程：\n\n```bash\nsudo systemctl start docker\n\
  ```\n\n运行以下命令以重启 Docker 守护进程：\n\n```bash\nsudo systemctl restart docker\n```\n\n\
  看，这很简单。\n\n## 在 CentOS Linux 上为 Docker 守护进程配置远程访问\n\n到目前为止，我们一直在使用 SSH 客户端远程连接到\
  \ Linux 主机上的 Docker 守护进程。虽然你可能认为这是“远程访问”，但 Docker CLI 客户端和 Docker 守护进程仍然在同一台主机上，这意味着两者是在本地交互。真正的远程访问是让你的\
  \ Docker CLI 客户端与远程的 Docker 守护进程交互，从另一台机器调用 Docker API。例如，在 Windows 机器上使用 Docker\
  \ CLI 客户端连接到 Linux 主机上的 Docker 守护进程。默认情况下，Docker 守护进程绑定到 Unix 套接字而不是 TCP/IP 端口。为了能够远程访问\
  \ Docker 守护进程，你需要配置它监听一个 IP 地址和特定的端口号。\n\n以下是在 Linux 上配置 Docker 守护进程远程访问所涉及过程的高级概述：\n\
  \n1.  使用 `systemd` 单元文件配置 Docker 守护进程的远程访问。\n2.  通过配置双向 TLS 加密来保护 Docker 守护进程套接字。\n\
  3.  更新 `daemon.json` 以包含双向 TLS 加密的设置。\n4.  启用防火墙端口以允许流量访问 Docker 守护进程。\n\n\n## 使用\
  \ systemd 单元文件配置 Docker 守护进程的远程访问\n\n我们将使用 `systemd` 来配置 Docker 守护进程的远程访问，而不是使用\
  \ `dockerd` 或 `daemon.json` 文件。Docker 文档提到了在 `daemon.json` 文件中设置 `hosts` 数组以允许远程访问\
  \ Docker 守护进程。遗憾的是，我已经根据文档测试了尽可能多的可能变体，但均未成功。因此，我尝试了文档中提到的其他方法。这就引出了使用 `systemd`\
  \ 的方法。\n\n`systemd` 提供了在 Linux 上控制程序和进程的标准流程。它是一个初始化系统和服务管理器，包含了按需启动守护进程、启动时的并行处理以及使用\
  \ Linux 控制组进行进程跟踪等功能。初始化系统是一个守护进程，在计算机启动时开始运行，并一直运行到计算机关机。在 `systemd` 中，一个 `单元`\
  \ 指的是系统知道如何控制的任何资源。这些资源是通过称为单元文件的配置文件来定义的。你可以使用单元文件来定义这些资源在系统上的管理方式。除了使用 `dockerd`\
  \ 标志和 `daemon.json` 外，Docker 守护进程也可以通过 `systemd` 单元文件进行配置。\n\n**注意**\n\n我没有将使用 `systemd`\
  \ 作为配置 Docker 守护进程的方式包含在内，因为它需要了解 Linux 内部机制。由于 Docker 守护进程就像 Linux 上运行的任何其他守护进程一样，你使用\
  \ `systemd` 配置 Docker 的方式与配置其他守护进程的方式并无不同。但请务必非常小心。**只选择一种方式**来配置 Docker 守护进程。使用\
  \ `systemd`、`dockerd` 标志或 `daemon.json` 配置 Docker 可能会导致冲突，从而阻止 Docker 守护进程启动。\n\n\
  在此任务中，我们将使用 `systemd` 来修改默认的 Docker 配置：\n\n1.  运行以下命令，使用 Linux 上的默认文本编辑器为 Docker\
  \ 守护进程创建一个覆盖文件。覆盖文件是一种在不修改相应 `systemd` 单元文件的情况下更改守护进程行为的方法。`systemctl edit` 命令确保覆盖设置被正确加载。\n\
  \n```\nsudo systemctl edit docker.service\n```\n\n2.  在文件中添加以下内容并保存：\n\n```\n[Service]\n\
  ExecStart=\nExecStart=/usr/bin/dockerd -H fd:// -H tcp://172.28.106.158:2376\n```\n\
  \n将提供的 IP 地址替换为你的 CentOS Linux Docker 主机的 IP 地址。另外，Docker 守护进程默认监听的端口号是 2375（未加密）和\
  \ 2376（加密）。端口 2376 将用于 Docker CLI 客户端与 Docker 守护进程之间的安全通信。\n\n`-H` 标志将 Docker 守护进程绑定到一个监听套接字，可以是\
  \ Unix 套接字或 TCP/IP 端口。你可以指定多个 `-H` 标志来绑定多个套接字/端口，如示例所示。\n\n对于 `ExecStart` 参数被指定两次，不要困惑。有些参数在设置新的覆盖值之前需要先被清除。`ExecStart`\
  \ 参数就是其中之一。\n\n3.  运行以下命令重新加载 `systemd` 单元文件：\n\n```\nsudo systemctl daemon-reload\n\
  ```\n\n4.  最后，重启 Docker 守护进程：\n\n```\nsudo systemctl restart docker\n```\n\n一旦完成，Docker\
  \ 守护进程现在就被配置为监听一个 TCP/IP 端口，并且可以远程访问。你可以检查 Docker 守护进程的状态进行验证，如图 6-3 所示。\n\n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig3_HTML.jpg](img/484552_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3\n在 CentOS Linux Docker 主机上配置的 TCP 端口远程访问\n\n此外，你可以使用以下 `netstat` 命令来验证 Docker\
  \ 守护进程确实在监听端口 2376（如果你的 Linux 主机上没有安装 `netstat` 命令，请运行 `yum -y install net-tools`\
  \ 命令来安装必要的软件包）：\n\n```\nsudo netstat -lntp | grep dockerd\n```\n\n你肯定需要知道如何使用 `vi`\
  \ —— Linux 上的默认文本编辑器。否则，就在 Windows 上使用你喜欢的文本编辑器创建名为 `override.conf` 的覆盖文件。然后，你可以使用\
  \ WinSCP 将 `override.conf` 文件复制到 `/etc/systemd/system/docker.service.d/` 目录。如果你没有使用\
  \ `systemctl edit` 命令，则需要手动创建 `docker.service.d` 目录。\n\n**提示**\n\n在本章前面，我提到了使用带标志的\
  \ `dockerd` 或 `daemon.json` 文件来对 Docker 守护进程进行配置更改。我希望情况总是如此。但我使用开源软件的经验教会了我要预料到几个挑战。其中之一就是做事方式的不一致性。为远程访问配置\
  \ Docker 守护进程就是一个例子。在处理开源软件时，不一致性是意料之中的。我只是在设定合理的预期，以防你感到沮丧。\n\n\n\n"
- "# 通过配置双向 TLS 加密来保护 Docker 守护进程套接字\n\n既然 Docker 守护进程已在您的网络上可用，保护其免受不安全连接的影响便是您的责任。好消息是，Docker\
  \ 守护进程只接受由受信任的证书颁发机构（CA）签署的证书所认证的客户端的连接。同样，Docker CLI 客户端也只连接到具有由该受信任 CA 签署的证书的\
  \ Docker 守护进程。如果您过去曾使用证书配置过 SQL Server 数据库镜像，那么此过程非常相似。在本示例中，我们将创建自己的证书，而不是使用来自受信任公共\
  \ CA 的证书。这不是在生产环境中会做的事情，但它确实能完成任务。\n\n此过程将引导您为 Docker 守护进程配置双向 TLS 加密。在 CentOS Linux\
  \ Docker 主机上：\n\n1.  创建一个临时目录来存储 CA 私钥和公钥。稍后将引用此目录以指向证书的位置。\n\n    ```\n    mkdir\
  \ /tmp/dockerTLS\n    cd /tmp/dockerTLS\n    ```\n\n2.  运行以下 `openssl` 命令以创建 CA\
  \ 私钥。系统提示时，提供私钥的密码短语。\n\n    ```\n    openssl genrsa -aes256 -out ca-key.pem 4096\n\
  \    ```\n\n3.  运行以下 `openssl` 命令以创建 CA 公钥。系统提示时，提供标识公钥的详细信息。图 6-4 提供了一个示例。对于 `Common\
  \ Name` 字段，请务必提供您用于连接 Docker 守护进程的主机名，并且该主机名必须可在网络中解析。在此示例中，我的 CentOS Linux Docker\
  \ 主机的完全限定域名（FQDN）是 `CENTOSDOCKER01.TESTDOMAIN.COM`。\n\n    ```\n    openssl req\
  \ -new -x509 -days 365 -key ca-key.pem -sha256 -out ca.pem\n    ```\n\n    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig4_HTML.jpg](img/484552_1_En_6_Fig4_HTML.jpg)\n\
  \    图 6-4 CA 公钥的详细信息\n\n4.  运行以下 `openssl` 命令以创建服务器密钥：\n\n    ```\n    openssl\
  \ genrsa -out server-key.pem 4096\n    ```\n\n5.  运行以下 `openssl` 命令以创建证书签名请求。确保\
  \ `Common Name` 值与您在步骤 3 中提供的 Docker 守护进程主机名相匹配。\n\n    ```\n    openssl req -subj\
  \ \"/CN=CENTOSDOCKER01.TESTDOMAIN.COM\" -sha256 -new -key server-key.pem -out server.csr\n\
  \    ```\n\n6.  运行以下命令创建扩展配置文件。由于 TLS 连接可以通过 IP 地址和 FQDN 建立，因此在创建证书时需要指定 IP 地址。扩展配置文件将包含\
  \ Linux Docker 主机的 FQDN、其 IP 地址以及环回 IP 地址，以便您仍可以通过 TCP 端口本地连接到 Docker 守护进程。\n\n\
  \    ```\n    echo subjectAltName = DNS:CENTOSDOCKER01.TESTDOMAIN.COM,IP:172.28.106.158,IP:127.0.0.1\
  \ >> extfile.cnf\n    ```\n\n7.  运行以下命令追加扩展配置文件并添加扩展使用属性，使得 Docker 守护进程的密钥只能用于服务器认证：\n\
  \n    ```\n    echo extendedKeyUsage = serverAuth >> extfile.cnf\n    ```\n\n8.\
  \  运行以下 `openssl` 命令，使用 CA 对公钥进行签名，并传入扩展配置文件：\n\n    ```\n    openssl x509 -req\
  \ -days 365 -sha256 -in server.csr -CA ca.pem -CAkey ca-key.pem -CAcreateserial\
  \ -out server-cert.pem -extfile extfile.cnf\n    ```\n\n您在 `/tmp/dockerTLS` 目录中应拥有以下文件，如图\
  \ 6-5 所示。\n\n![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig5_HTML.jpg](img/484552_1_En_6_Fig5_HTML.jpg)\n\
  图 6-5 完成所有步骤后创建的文件\n\n现在我们准备好处理 Docker CLI 客户端了。在此示例中，Docker CLI 客户端也运行在一台名为 `CENTOSDOCKERCLIENT`\
  \ 的 CentOS Linux 机器上。\n\n在 CentOS Docker 客户端机器上：\n\n1.  创建一个临时目录来存储 CA 私钥和公钥。稍后将引用此目录以指向证书的位置。\n\
  \n    ```\n    mkdir /tmp/dockerTLS\n    cd /tmp/dockerTLS\n    ```\n\n2.  运行以下\
  \ `openssl` 命令以创建客户端密钥：\n\n    ```\n    openssl genrsa -out key.pem 4096\n    ```\n\
  \n3.  运行以下 `openssl` 命令以创建证书签名请求：\n\n    ```\n    openssl req -subj '/CN=client'\
  \ -new -key key.pem -out client.csr\n    ```\n\n4.  运行以下命令创建一个扩展配置文件，以使客户端密钥适用于客户端认证：\n\
  \n    ```\n    echo extendedKeyUsage = clientAuth > extfile-client.cnf\n    ```\n\
  \n5.  将您在 Docker 守护进程主机上生成的 `ca.pem` 和 `ca-key.pem` 文件复制到客户端机器的 `/tmp/dockerTLS`\
  \ 目录。您可以使用 WinSCP 或 Linux 上的 `scp` 命令来完成。您在 `/tmp/dockerTLS` 目录中应拥有以下文件，如图 6-6 所示。除非所有文件都可用，否则请勿进行下一步。\n\
  \n    ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig6_HTML.jpg](img/484552_1_En_6_Fig6_HTML.jpg)\n\
  \    图 6-6 完成所有步骤后创建的文件\n\n6.  运行以下 `openssl` 命令生成已签名的证书，传入公钥、私钥和扩展配置文件。系统提示时，提供\
  \ CA 私钥的密码短语。\n\n    ```\n    openssl x509 -req -days 365 -sha256 -in client.csr\
  \ -CA ca.pem -CAkey ca-key.pem -CAcreateserial -out cert.pem -extfile extfile-client.cnf\n\
  \    ```\n\n我们现在拥有了在 Docker CLI 客户端和远程 Docker 守护进程之间建立双向 TLS 加密所需的所有文件。但我们还没有完成。\n\
  \n## 更新 daemon.json 以包含双向 TLS 加密设置\n\n我们必须告诉 Docker 守护进程强制执行加密和认证的远程连接。以下配置选项将被添加到\
  \ `daemon.json` 文件中：\n\n*   `tlsverify`: 值为 `true` 时强制执行加密和认证的远程连接。\n*   `tlscacert`:\
  \ Docker 守护进程将仅信任由此 CA 签署的证书。\n*   `tlscert`: TLS 证书文件的路径。\n*   `tlskey`: TLS 密钥文件的路径。\n\
  \n将以下内容添加到 `daemon.json` 文件并保存。注意您在 Docker 主机上生成的文件的路径。\n\n```\n\"tlscacert\": \"\
  /tmp/dockerTLS/ca.pem\",\n\"tlscert\": \"/tmp/dockerTLS/server-cert.pem\",\n\"tlskey\"\
  : \"/tmp/dockerTLS/server-key.pem\",\n\"tlsverify\": true\n```\n\n更新 `daemon.json`\
  \ 文件后，重启 Docker 守护进程：\n\n```\nsudo systemctl restart docker\n```\n\n## 启用防火墙端口以允许到\
  \ Docker 守护进程的流量\n\n当您使用 Docker CLI 客户端本地连接到 Docker 守护进程时，您无需担心防火墙。这是因为您已经通过 SSH（在端口\
  \ 22 上）登录到机器并在本地运行命令。启用对 Docker 守护进程的远程访问意味着您需要在 Linux 防火墙上打开端口 2376。\n\n运行以下命令启用防火墙以允许端口\
  \ 2376 上的远程连接。默认情况下，FirewallD 是 CentOS Linux 上可用的防火墙解决方案。\n\n```\nsudo firewall-cmd\
  \ --zone=public --add-port=2376/tcp --permanent\n```\n\n运行以下命令重新加载新添加的防火墙规则：\n\n\
  ```\nsudo firewall-cmd --reload\n```\n\n启用防火墙端口后，使用 TELNET 测试到端口 2376 的连接。\n\n\n\
  \n"
- '# Docker CLI 客户端配置与管理


  ## 测试远程客户端连接


  当然，最终的测试是当你能够从一个 Docker CLI 客户端运行命令并连接到远程 Docker 主机时。运行以下命令连接到远程 Docker 主机。确保你位于`/tmp/dockerTLS`目录中，这样就不必提供公钥、签名证书和客户端密钥的绝对路径。


  ```

  docker --tlsverify --tlscacert=ca.pem --tlscert=cert.pem --tlskey=key.pem -H=172.28.106.158:2376
  info

  ```


  `-H`参数指向远程 Docker 主机的 IP 地址。或者，你也可以使用主机名或 FQDN，前提是它可以在网络上解析。图 6-7 显示了在`CENTOSDOCKERCLIENT`上运行的
  Docker CLI 客户端连接到在`CENTOSDOCKER01`上运行的远程 Docker 主机。


  ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig7_HTML.jpg](img/484552_1_En_6_Fig7_HTML.jpg)


  **图 6-7**


  Docker CLI 客户端连接到远程 Docker 主机


  你还可以通过在当前会话中使用`export`命令设置环境变量，避免在运行`docker`命令时反复提供远程连接相关参数。在运行任何`docker`命令之前，运行以下命令。图
  6-8 显示了设置环境变量并运行`docker`命令连接到远程 Docker 主机。


  ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig8_HTML.jpg](img/484552_1_En_6_Fig8_HTML.jpg)


  **图 6-8**


  设置环境变量以将 Docker CLI 客户端连接到远程 Docker 主机


  ```

  export DOCKER_TLS_VERIFY=1

  export DOCKER_HOST=tcp://172.28.106.158:2376

  export DOCKER_CERT_PATH=/tmp/dockerTLS/

  ```


  ## 清理


  在为 TLS 双向认证配置好客户端和服务器后，你不再需要证书签名请求。你可以继续删除客户端和服务器机器上的`client.csr`和`server.csr`文件。对于扩展配置文件`extfile-client.cnf`和`extfile.cnf`，也可以做同样的处理。


  此外，为防止密钥被意外覆盖，移除它们的写入权限。在客户端机器上运行以下命令，使密钥仅对你的用户账户可读：


  ```

  chmod -v 0400 ca-key.pem key.pem

  ```


  类似地，在服务器机器上运行以下命令：


  ```

  chmod -v 0400 ca-key.pem server-key.pem

  ```


  你需要对证书做同样的处理，以防止它们被意外覆盖。在客户端机器上运行以下命令，使证书仅对你的用户账户可读：


  ```

  chmod -v 0400 ca.pem cert.pem

  ```


  类似地，在服务器机器上运行以下命令：


  ```

  chmod -v 0400 ca.pem server-cert.pem

  ```


  在 Windows 上配置 Docker CLI 客户端的过程是相同的。但由于 Windows 上原生不支持 OpenSSL，因此需要手动安装。请参考*附录 A*在
  Windows 工作站上安装和配置 OpenSSL。


  一旦你进入 OpenSSL 命令提示符，就可以运行与 Linux 相同的命令，但无需`openssl`命令。例如，命令`openssl genrsa -out
  key.pem 4096`应该写为`genrsa -out key.pem 4096`。图 6-9 显示了一台 Windows 10 机器运行 Docker CLI
  客户端连接到 Linux Docker 主机。不过要注意`-H`参数，其格式类似于`DOCKER_HOST`环境变量中定义的格式。此外，不是使用`export`关键字，而是使用`set`关键字来定义环境变量。


  ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig9_HTML.jpg](img/484552_1_En_6_Fig9_HTML.jpg)


  **图 6-9**


  Windows 10 主机上的 Docker CLI 客户端连接到远程 Linux Docker 主机


  ## 配置 Docker CLI Bash 自动补全


  人们常说，最懒惰的 IT 专业人士是那些从开发者转行做系统管理员的人。根据我的经验，这话可能有点道理。我在 2005 年从 Visual Basic 转到了 C#.NET，因为
  Visual Studio 有 IntelliSense。当 Monad（PowerShell 的原名）推出时，我立即将所有基于 VBScript 的管理脚本转换过来，以利用
  PowerShell 命令 shell 中的 Tab 自动补全功能。我总是想着各种方法让我的工作更轻松。


  这引导我配置 Docker CLI bash 自动补全。Bash 自动补全允许你在编写`docker`命令时使用 Tab 自动补全。虽然这原本是为开发者设计的，但你同样可以用它来简化
  Docker 的管理。在使用 Docker 补全脚本之前，你需要先在你的 Linux 发行版上启用 bash 自动补全功能。


  在 Ubuntu 上，运行以下命令刷新软件包数据库并安装 bash 自动补全包：


  ```

  sudo apt update

  sudo apt install bash-completion

  ```


  在 CentOS 上，运行以下命令：


  ```

  sudo yum -y install bash-completion

  ```


  启用 bash 自动补全后，通过运行以下命令将 Docker 补全脚本放置到`/etc/bash_completion.d/`目录中。请确保每次更新 Docker
  后都运行此命令：


  ```

  sudo curl https://raw.githubusercontent.com/docker/docker-ce/master/components/cli/contrib/completion/bash/docker
  -o /etc/bash_completion.d/docker.sh

  ```


  注销当前会话并重新登录。你可以尝试输入`docker images m`然后按 TAB 键。这可以为你节省输入 SQL Server on Linux 镜像名称`mcr.microsoft.com/mssql/server:2017-CU14-ubuntu`的时间。你还可以用它来显示特定命令的可用参数。例如，尝试运行`docker
  run –`然后按 TAB 键。它将显示`docker run`命令的所有可用参数。




  ## 启动和停止容器


  你在第 4 章已经有过运行容器的体验。使用 `docker run` 命令是启动容器最快的方式。如果镜像在本地磁盘中不存在，它会先拉取镜像然后启动它。传递给 `docker
  run` 命令的不同参数决定了容器的运行方式。我们在第 4 章已经介绍了在容器上运行 SQL Server 时你会用到的最常见参数，因此请参考那些内容。


  一个好的实践是，使用 `docker pull` 命令将所有需要的镜像预先拉取到你的 Docker 主机上，这样在运行或启动容器时就不会花费额外时间。一旦拉取完毕，你就可以使用
  `docker create` 命令预创建容器。下面的命令创建一个 SQL Server on Linux 容器但不立即运行它。它与我们在第 4 章使用的命令几乎相同，只是没有
  `-d` 参数（后台运行模式）。


  ```

  docker create -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433
  --name sqldevlinuxcon01 -h linuxsqldev01 mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

  ```


  仅运行 `docker ps` 命令，你不会看到已创建的容器。你需要使用 `docker ps` 命令的 `-a` 参数来显示所有容器，无论其状态如何。如果你想更精确地查看，可以使用
  `docker ps` 命令的 `-f` 参数，根据特定条件进行过滤。下面的命令显示所有已创建的容器：


  ```

  docker ps -a -f status=created

  ```


  然后，你可以使用下面的 `docker start` 命令，只需传入容器名称或 ID：


  ```

  docker start sqldevlinuxcon01

  ```


  停止容器就像运行 `docker stop` 命令并传入容器名称或 ID 一样简单：


  ```

  docker stop sqldevlinuxcon01

  ```


  你可能会忍不住使用 `docker kill` 命令来强行终止一个正在运行的容器。请不要这样做。我们讨论的是一个容器上的 SQL Server 实例，而不仅仅是一个随机的应用程序。回想一下，SQL
  Server 必须正确关闭，以便提交或回滚所有事务，将所有脏页写入磁盘，然后在事务日志中写入一条记录。运行 `docker kill` 命令将阻止 SQL Server
  执行干净的关闭过程，并可能导致数据丢失，甚至更糟的数据损坏。`docker stop` 命令会优雅地向容器内运行的进程（这里是 SQL Server）发送 SIGTERM
  信号（终止请求）。这是在 Linux 环境下关闭 SQL Server 的正确方式。


  另外，请记住，停止容器并不会将其从 Docker 主机上移除。这就是为什么你无法创建另一个同名容器的原因。如果你想创建一个使用之前用过的相同名称的新容器，你需要先删除旧的容器。


  **提示**


  你开始看到在 `docker run` 命令中使用 `--name` 参数的好处了。我们在 `docker start` 和 `docker stop` 命令中都使用了容器名称——sqldevlinuxcon01——而不是容器
  ID。这使得操作容器更加容易，而不必依赖系统生成的 ID。在创建 SQL Server 容器时，始终在 `docker run` 命令中使用 `--name`
  参数。


  一个你可以使用的技巧是，使用 `-q` 参数显示所有容器及其对应的容器 ID，如下列命令所示：


  ```

  docker ps -a -q

  ```


  然后，你可以将这个命令的结果传递给 `docker start` 或 `docker stop` 命令，分别来启动或停止所有容器，如下所示：


  ```

  docker start $(docker ps -a -q)

  ```


  ## 删除容器和镜像


  如果你想清理你的 Docker 主机，删除旧的和不需要的容器，你需要使用 `docker rm` 命令。但是，你无法删除一个正在运行的容器。必须先停止容器，然后才能删除它，如下列命令所示：


  ```

  docker stop sqldevlinuxcon01

  docker rm sqldevlinuxcon01

  ```


  互联网上（甚至 Docker 官方文档中）有很多示例演示了在 `docker rm` 命令中使用 `-f` 参数来同时停止和删除容器。请避免这种诱惑。在 `docker
  rm` 命令中使用 `-f` 参数类似于运行 `docker kill` 命令，会导致 SQL Server 突然终止。


  处理镜像则是另一回事。记住，容器只是一个位于镜像只读文件系统层之上的读写文件系统层，这意味着你可以删除所有基于该镜像的容器而不影响镜像本身。然而，当你删除一个镜像后，除非通过再次从仓库拉取使该镜像在
  Docker 主机上可用，否则你将无法再基于它创建新容器。同样地，当一个镜像正被一个运行中的容器使用时，你也无法删除它。你必须先停止并删除所有使用它的容器，然后才能删除该镜像。下面的命令展示了如何使用
  `docker rmi` 命令删除镜像，遵循事件顺序——从停止和删除容器到删除镜像：


  ```

  docker stop sqldevlinuxcon01

  docker rm sqldevlinuxcon01

  docker rmi mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

  ```


  ## 与运行中的容器交互


  我在第 4 章提到过，我不太喜欢登录到服务器并与它们直接交互。除非为了故障排除目的，我宁愿远程连接它们——对于容器也是如此。但如果确实需要，我会使用 `docker
  exec` 命令。这允许我在一个正在运行的容器内执行命令。假设我想在我现有的 SQL Server on Linux 容器内运行一个 bash shell，以便检查文件系统结构。运行下面的
  `docker exec` 命令，带上 `-i`（交互）和 `-t`（伪终端）参数，并传入你想运行的命令（`bash`）。图 6-10 显示了终端如何从以我自己的身份登录的
  `CENTOSDOCKER01`（我的 Linux Docker 主机名）变为以 root 身份登录的 `linuxsqldev01`（SQL Server on
  Linux 容器名）。我现在可以从操作系统层面与容器进行交互操作。


  ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig10_HTML.jpg](img/484552_1_En_6_Fig10_HTML.jpg)


  图 6-10 在运行中的容器上运行 bash


  ```

  docker exec -it sqldevlinuxcon01 bash

  ```


  类似地，你可以运行以下命令在 SQL Server on Windows 容器内启动一个 PowerShell 命令行：


  ```

  docker exec -it sqldevwincon01 powershell

  ```


  过去，终止 bash 或 PowerShell shell 也会终止容器。现在不会了。然而，通过按 `Ctrl+PQ` 退出交互式 shell 仍然是一个好习惯。




  ## 在主机和容器之间共享文件


  可能会有一些情况，你需要将 Docker 主机上的文件与容器共享。例如，你可能希望还原 SQL Server 数据库的备份到容器内的 SQL Server 实例中。你可以将备份文件复制到
  Docker 主机上的某个目录，并使其对容器可用。这正是 `docker run` 命令的 `-v` 或 `--volume` 参数的用武之地。首先，在你的 Linux
  Docker 主机上创建一个 `/tmp/dbData` 目录。然后，将你的数据库备份复制到该目录中。使用以下命令，将 Linux Docker 主机上的 `/tmp/dbData`
  目录挂载到容器内的 `/var/opt/mssql` 目录。这和我们一直在使用的 `docker run` 命令相同，只是多了 `-v` 参数。


  ```

  docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433 --name
  sqldevlinuxcon01 -d -h linuxsqldev01 -v /tmp/dbData:/var/opt/mssql mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

  ```


  你可以将容器内的 `/var/opt/mssql` 目录看作是 Linux Docker 主机上的 `/tmp/dbData` 目录，就像一个网络共享文件夹。存储在容器内
  `/var/opt/mssql` 目录中的任何数据都将持久化在 Linux Docker 主机的 `/tmp/dbData` 目录上，这意味着你可以删除 SQL
  Server 容器并保留你的数据库文件。你不仅在 Linux Docker 主机和容器之间共享了数据和文件，还持久化了容器内创建的数据。更多细节将在第 7 章介绍。


  一旦 `/tmp/dbData` 目录被挂载到容器中，SQL Server 实例就可以访问其中的备份文件。然后，你就可以在容器内的 SQL Server 实例上还原备份了。当然，由于容器内的
  `/var/opt/mssql` 目录指向 Linux Docker 主机上的 `/tmp/dbData` 目录，你创建的每个数据库也将存储在 `/tmp/dbData`
  目录中。你可以通过还原数据库备份然后删除容器来测试这一点。图 6-11 显示了删除 SQL Server 容器后，Linux Docker 主机上 `/tmp/dbData`
  目录的内容。


  ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig11_HTML.jpg](img/484552_1_En_6_Fig11_HTML.jpg)


  图 6-11 在 Linux Docker 主机和容器之间共享数据


  在 Windows 上运行以下命令以创建一个容器，并将 Windows Docker 主机上的 `C:\dbData` 文件夹映射到容器内的 `C:\dbData`
  文件夹。该文件夹不必存在于容器内部，它会在运行容器的过程中被创建。注意这里使用正斜杠 (/) 而不是反斜杠 (\) 来定义路径。过去，由于 Go 语言对字符的解释方式，只有正斜杠字符在定义路径时有效。现在，两种都可以使用。为了与
  Windows 和 Linux 路径保持一致，我使用正斜杠。


  ```

  docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" –p 1433:1433 --name
  sqldevwincon01 -d -h winsqldev01 –v  C:/dbData:C:/dbData microsoft/mssql-server-windows-developer

  ```


  另一种在主机和容器之间共享文件的方法是使用 `docker cp` 命令。使用相同的例子，如果你想将 Linux Docker 主机上的 `/tmp/dbData/NorthwindBackup.bak`
  文件复制到 `sqldevlinuxcon01` 容器内，可以运行以下命令。你可以使用容器 ID 或容器名称，但我更喜欢使用容器名称，这样我能确切知道我在操作什么。


  ```

  docker cp /tmp/dbData/NorthwindBackup.bak sqldevlinuxcon01:/var/opt/mssql/data

  ```


  在 Windows 上，只需将路径替换为适当的 Windows 目录路径，并注意使用正斜杠代替反斜杠。


  ```

  docker cp C:/dbData/NorthwindBackup.bak sqldevwincon01:C:/

  ```


  你也可以反过来，使用以下命令将文件（本例中是 `testDB.bak` 文件）从容器复制到 Linux Docker 主机：


  ```

  docker cp sqldevlinuxcon01:/var/opt/mssql/data/testDB.bak /tmp/dbData/

  ```


  显然，在 Docker 主机和容器之间共享文件的方法不止一种。


  ## 配置容器资源


  默认情况下，容器没有资源限制。它可以使用主机内核调度器允许的尽可能多的给定资源。就 SQL Server 而言，这不是一件好事。我们知道 SQL Server
  会占用系统中所有可用的内存资源。同样，它会占用所有可用的 CPU 核心。想象一下这会对你的许可产生什么影响（如果这是测试环境，并且你只运行企业评估版、开发版或速成版，那问题不大）。但如果你已经为
  Docker 主机上的所有 CPU 核心购买了许可，就不需要担心 SQL Server 的许可问题了。


  配置容器消耗的 CPU 和内存资源的方式类似于为虚拟机分配资源。使用 `docker run` 命令，添加 `--cpus` 参数来指定容器可以使用的 CPU
  资源数量，并添加 `--memory` 参数来设置内存上限（你可能会说这可以在 SQL Server 内部通过 `sp_configure` 完成，但如果在容器级别完成会好得多，因为你不能在同一个
  Linux 主机上运行多个 SQL Server 实例）。在我的测试环境中，我的 Linux Docker 主机配置为拥有 4 个 CPU 核心和 8GB 内存，如图
  6-12 所示。


  ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig12_HTML.jpg](img/484552_1_En_6_Fig12_HTML.jpg)


  图 6-12 为 Docker 主机配置的硬件资源


  运行以下带有格式化参数的 `docker stats` 命令，可以显示我的 SQL Server on Linux 容器在运行多个查询时的 CPU 和内存利用率，如图
  6-13 所示。显然，它占用了 Docker 主机上大部分的 CPU 和内存资源（使用了全部 7.62GB 内存）。


  ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig13_HTML.jpg](img/484552_1_En_6_Fig13_HTML.jpg)


  图 6-13 容器资源利用率


  ```

  docker stats sqldevlinuxcon01 --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}"

  ```


  运行以下命令来创建并运行 SQL Server on Linux 容器，分别使用 `--cpus` 和 `--memory` 参数，仅分配 2 个 CPU 和
  4GB 内存：


  ```

  docker run -e "ACCEPT_EULA=Y" -e "    SA_PASSWORD=mYSecUr3PAssw0rd" -p 1433:1433
  --name sqldevlinuxcon01 -d -h linuxsqldev01 --cpus="2" --memory=4g mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

  ```


  在限制了容器可以使用的 CPU 和内存资源量之后，在 SQL Server 实例上重新运行我的查询，使用 `docker stats` 命令显示新的资源利用率，如图
  6-14 所示。当然，你的测试结果取决于许多不同的因素——硬件配置、SQL Server 实例配置、数据库架构、索引、查询等等。这只是为了演示如何配置容器资源利用率。


  ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig14_HTML.jpg](img/484552_1_En_6_Fig14_HTML.jpg)


  图 6-14 配置容器 CPU 和内存资源利用率后


  配置容器资源利用率的更多方法请访问：[`docs.docker.com/config/containers/resource_constraints/`](https://docs.docker.com/config/containers/resource_constraints/)。




  '
- '# 探索容器日志


  在`第 4 章`中，我讨论了未能满足 SQL Server 密码复杂性策略如何可能导致容器无法启动。如果它运行在 Windows 或 Linux 主机上，我本可以轻松地使用文本编辑器打开
  SQL Server 错误日志来检查可能的原因。但由于 SQL Server 错误日志位于容器内部，除非容器启动，或者将`/var/opt/mssql`目录挂载到
  Linux Docker 主机上，否则我无法访问它。这就像试图访问一个已停止的虚拟机内部的 SQL Server 错误日志。好在 Docker 通过`docker
  logs`命令暴露了这些日志。


  ## 使用`docker logs`查看容器日志


  以下命令将创建一个新的 Linux 上的 SQL Server 容器。请注意`SA_PASSWORD`参数值如何不符合 SQL Server 密码复杂性策略。


  ```

  docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=password12" -p 1433:1433 --name sqldevlinuxcon01
  -d -h linuxsqldev01 mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

  ```


  如果使用`docker ps -a`命令检查所有容器的状态，您会看到容器立即退出，如图 6-15 所示。


  ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig15_HTML.jpg](img/484552_1_En_6_Fig15_HTML.jpg)


  图 6-15：Linux 上的 SQL Server 容器在启动后立即终止


  正如我在`第 4 章`中提到的，我花了很多时间试图找出导致容器停止的原因。直到我查看了日志，才发现真正的问题所在。使用`docker logs <容器名称>`命令可以查看容器内部生成的
  SQL Server 错误日志，如图 6-16 所示。在发现真正的问题与`SA_PASSWORD`参数值有关后，我进行了必要的修改并重新运行了命令。


  ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig16_HTML.jpg](img/484552_1_En_6_Fig16_HTML.jpg)


  图 6-16：运行`docker logs`以探索 SQL Server 错误日志


  ## 关于 Windows 行为的重要说明


  与 Linux 不同，在 Windows 上未能满足 SQL Server 密码复杂性策略不会终止容器，也不会在 SQL Server 错误日志中创建条目。容器将继续运行，但不允许您使用提供的`sa`凭据登录。您将需要运用您的
  DBA 技能，使用`docker exec`命令以交互方式登录到容器，并在单用户模式下启动 SQL Server 实例，以便更改`sa`密码。


  ## 实时查看日志


  您还可以使用带有`-f`参数的`docker logs`命令来实时查看 SQL Server 错误日志。我发现这在排查 SQL Server 相关问题时，比运行`sp_readerrorlog`要好得多，因为我可以在事情发生时准确看到正在发生的情况。这就像在
  SQL Server 错误日志中拥有一个实时跟踪。图 6-17 并排展示了使用`sp_readerrorlog`和`docker logs`命令的情况。


  ![../images/484552_1_En_6_Chapter/484552_1_En_6_Fig17_HTML.jpg](img/484552_1_En_6_Fig17_HTML.jpg)


  图 6-17：使用`sp_readerrorlog`与`docker logs`命令探索 SQL Server 错误日志的对比


