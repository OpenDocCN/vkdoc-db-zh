  的新镜像之间的大小差异。我们将镜像大小从 19.7GB 减少到 17.9GB，指令数量从 12 条减少到 6 条。还不错。


  ![../images/484552_1_En_9_Chapter/484552_1_En_9_Fig8_HTML.jpg](img/484552_1_En_9_Fig8_HTML.jpg)


  图 9-8


  列出修改 Dockerfile 后的镜像大小及不同的文件系统层


  就像我说的，我们对 Windows Server 2016 Core 基础镜像的大小确实做不了太多。它就是那个样子。你可以通过使用 LTSC2016 镜像来再减少一个镜像层，但你仍然在处理一个
  11.1GB 大小的镜像。


  我已经向你提供了几种减少指令数量以优化 `Dockerfile` 及其生成镜像的方法。将其作为一个练习尝试一下，并思考其他可以合并或组合指令的方法。

  提示




  如果在运行 `docker build` 命令时遇到任何问题，最终会产生一个已停止的容器。该容器代表了构建失败的那一步。如果你希望保持环境整洁，没有不需要的容器，请务必在修复问题并重新运行构建之前删除这些已停止的容器。使用
  `docker ps -a` 命令来显示失败步骤中使用的容器，并使用 `docker rm` 命令来删除它。你也可以使用针对特定 Docker 对象的 `prune`
  子命令。例如，你可以运行 `docker image prune` 命令来删除所有未被标记且未被任何容器引用的镜像（也称为悬空镜像）。你还可以运行 `docker
  container prune` 命令来删除已停止的容器。有关清理未使用的 Docker 对象的更多信息，请参考 [`docs.docker.com/config/pruning/`](https://docs.docker.com/config/pruning/)。


  ## 本章小结


  本章为使用 `Dockerfile` 构建自定义 Docker 镜像奠定了基础。只要你了解基础操作系统和想要运行的应用程序，就可以参考本章内容来构建任何自定义的
  Docker 镜像。虽然提供的示例是用于构建 Windows 上的自定义 SQL Server 镜像，但其使用的 `Dockerfile` 和指令是相同的。你可以将运行在
  Windows Server Core 上的自定义 ASP.NET Core 应用程序或运行在 Linux 上的 .NET Core 应用程序容器化。关于 `Dockerfile`
  的更多信息，请访问 [`docs.docker.com/engine/reference/builder/`](https://docs.docker.com/engine/reference/builder/)。在下一章中，我们将探讨创建自定义的
  Linux 上的 SQL Server 镜像。虽然步骤与构建 Windows 上的自定义 SQL Server 镜像相似，但 *第 [8] 章* 中提供的在 Linux
  上安装和配置 SQL Server 的概念将作为一个模式。我们会稍作调整，加入运行包含额外自定义内容的脚本，例如创建用户数据库或从备份中恢复。


  '
- '# 10. 创建自定义 SQL Server on Linux 容器镜像


  > *学习新技术——或者任何事物的秘诀，就是永远不要忘记你已经掌握的知识。*

  >

  > —Edwin M. Sarmiento


  在上一章中，你学习了如何结合 `Dockerfile` 中的不同指令来创建一个自定义的 Windows 上的 SQL Server 容器。我们将运用前一章所学的内容来创建一个自定义的
  Linux 上的 SQL Server Docker 镜像。但由于 Linux 与 Windows 略有不同，我将介绍一些额外的 `Dockerfile` 指令。我还将更详细地介绍如何进一步自定义你的
  Linux 上 SQL Server 镜像，为在开发或生产环境中部署做准备。那么，让我们开始吧。


  ## 额外的 `Dockerfile` 指令


  如果你分析上一章创建的 `Dockerfile`，所使用的指令是基于我们对在 Windows 环境中安装和配置 SQL Server 的理解。在 *第 [8]
  章* 中，我们探讨了如何自动化在 Linux 上安装 SQL Server。我们将把用于自动化在 Linux 上安装和配置 SQL Server 的 bash
  脚本转化为一个 `Dockerfile`。但在这样做之前，让我们看看一些需要考虑的额外指令。


  ### `EXPOSE` 指令


  `EXPOSE` 指令告诉 Docker 守护进程，基于该镜像运行的容器将在运行时侦听指定的网络端口。默认是 TCP，但你可以选择定义容器是否使用 UDP 端口。`EXPOSE`
  指令的格式如下所示。我相信你明白为什么使用这个特定的端口号。


  ```

  EXPOSE 1433

  ```


  我曾经认为 `EXPOSE` 指令旨在发布容器在运行时将侦听的端口。毕竟，在计算机网络的语境中，“expose”不就是这个意思吗？但事实并非如此。`EXPOSE`
  指令仅仅是一个“提示”，用于告诉镜像用户在创建和运行容器时哪个端口是有用的。Docker 守护进程本身并不会对该指令做任何处理。事实上，如果你正在构建一个 Linux
  上的自定义 SQL Server 镜像，只要镜像的用户知道这是 SQL Server 的默认配置并且它侦听端口 1433，你可以完全忽略 `EXPOSE` 指令——就像我们在
  Windows 上的 SQL Server 镜像中所做的那样。


  我确信你明白我接下来要说什么。这就像拿到一部没有用户手册的智能手机（尽管你可能会争辩说没人真的看用户手册）。如果你知道如何使用智能手机，就不需要手册。但如果你不知道呢？这时候用户手册就派上用场了。`EXPOSE`
  指令充当了关于 Docker 镜像的额外元数据。当你对正在检查的镜像运行 `docker inspect` 命令时，可以在 `Config` 部分下查看 `ExposedPorts`
  的值，如图 10-1 所示。


  ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig1_HTML.jpg](img/484552_1_En_10_Fig1_HTML.jpg)


  图 10-1


  一个公开可用的 Linux 上 SQL Server 镜像的 `ExposedPorts` 值


  真正发布容器内应用程序将侦听的端口的是 `docker run` 命令的 `-p` 参数。回顾下面所示的 `docker run` 命令，重点关注 `-p` 参数：


  ```

  docker run -e "ACCEPT_EULA=Y" -e "SA_PASSWORD=mYSecUr3PAssw0rd" --name sqldevlinuxcon01
  -p 1433:1433 -d -h linuxsqldev01 mcr.microsoft.com/mssql/server:2017-CU14-ubuntu

  ```


  这就是我们使用 `-p` 参数的原因——为了暴露容器内部 SQL Server 的端口号，这样我们就可以通过端口映射，使用 Docker 主机的端口号来访问它。但是，如果我们从未使用过
  SQL Server，或者对 SQL Server 一无所知，我们就不会知道它默认侦听哪个端口号——因此，就需要使用 `EXPOSE` 指令。


  `EXPOSE` 指令的另一个用途是，如果你决定将 SQL Server 配置为使用一个非默认端口，比如 5000 端口。`EXPOSE` 指令可以告诉用户在运行容器时应该发布哪个端口。但
  `EXPOSE` 指令在你的 `Dockerfile` 中的真正价值在于，它允许容器在不使用 `docker run` 命令的 `-p` 参数来发布其端口号的情况下相互通信。在
  *第 [11] 章* 中，我将更详细地介绍 Docker 网络。



  '
- '# 构建自定义的 Linux 版 SQL Server 镜像


  ### VOLUME 指令


  `VOLUME` 指令在容器内创建一个指定名称的挂载点，并将其标记为保存外部挂载的卷。`VOLUME` 指令的格式如下所示：


  ```dockerfile

  VOLUME /var/opt/mssql/data

  ``


  这些挂载点是在你首次从镜像运行容器时动态生成的，因为无法保证在你打算运行容器的 Docker 主机上该卷一定是可用的。并且，由于 Docker 容器具有可移植性的特点，运行时创建的
  Docker 卷在宿主机的 `/var/lib/docker/volumes` 目录下会有一个类似 GUID 的名称——你无法指定一个有意义的名称。这些 Docker
  卷被称为 `anonymous` 卷，因为由 Docker 决定文件和目录的存储位置。随着时间的推移，访问该卷可能会变得困难。鉴于我们已经有了命名卷，匿名卷如今已不常用。回顾第
  7 章的“Docker 卷”部分，了解如何配置供容器上的 SQL Server 使用的卷。图 10-2 显示了当你从一个包含 `VOLUME` 指令的镜像运行容器时创建的
  Docker 卷的名称。


  ![图 10-2：使用 VOLUME 指令创建的 Docker 卷名称示例](img/484552_1_En_10_Fig2_HTML.jpg)


  ### USER 指令


  回到 SQL Server 2017，`USER` 指令其实并没有太大意义，因为当时公开可用的 Linux 版 SQL Server 镜像被配置为以 `root`
  身份运行。鉴于 `root` 用户可以执行任何操作，以 `root` 身份运行容器意味着任何能够恶意访问容器的人都可以进一步入侵主机。出于安全原因，我们不希望发生这种情况。因此，我们希望以权限受限的用户身份运行容器。


  `USER` 指令设置运行容器时使用的用户名（或 UID），以及可选的用户组（或 GID）。但为了实现这一点，自定义镜像需要有限制 `CMD` 或 `ENTRYPOINT`
  指令执行的指令。`USER` 指令的格式如下所示：


  ```dockerfile

  USER mssql

  ``


  我们将在本章后面更详细地探讨这一点。现在，让我们开始构建自定义的 Linux 版 SQL Server 镜像。


  我们将把 `Dockerfile` 保存在 Linux Docker 主机的 `/tmp/dockerBuild` 目录中。但在创建 `Dockerfile`
  之前，让我们先定义在 CentOS Linux 镜像中安装和配置 SQL Server 2017 实例的步骤：


  1.  从公开可用的 CentOS Linux 7.6.1810 开始。请记住，CentOS 并非受支持的 Linux 发行版。我仅仅是将其用作构建开发环境的示例。如果你想在生产环境中部署
  Linux 版 SQL Server 容器，你的基础 Linux 镜像应选择受支持的发行版之一——Red Hat Enterprise Linux、SUSE 或
  Ubuntu。

  2.  创建一个包含 SQL Server 2017 安装包位置的 `repo` 文件。

  3.  安装 SQL Server 2017 包。

  4.  配置 Linux 上的 SQL Server 2017。

  5.  为运行 SQL Server 进程设置工作目录。

  6.  运行 SQL Server 进程。


  在创建 `Dockerfile` 的过程中，第 4 步将包含更多细节。重要的是，我们对创建自定义 Linux 版 SQL Server 镜像需要做的事情有了一个高层概览。让我们将前面概述的六个步骤转化为一个
  `Dockerfile`。我将使用项目编号作为步骤，并在注释中加以标识。为简洁起见，我省略了 `LABEL` 指令，但请确保在你创建的每个 `Dockerfile`
  中都包含它们：


  ```dockerfile

  #Step 1

  FROM centos:7.6.1810

  #Step 2

  RUN curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

  #Step 3

  RUN yum install -y mssql-server

  #Step 4

  #创建 /var/opt/mssql/data 目录以存储数据库

  RUN mkdir -p /var/opt/mssql/data

  #递归更改 /var/opt/mssql 和 /etc/pwd 内部目录和文件的权限

  #从用户权限更改为组权限

  RUN chmod -R g=u /var/opt/mssql /etc/passwd

  #告知用户此容器将使用的端口

  EXPOSE 1433

  #Step 5

  ENV PATH=${PATH}:/opt/mssql/bin

  #Step 6

  CMD sqlservr

  ```


  以下展示了使用 Ubuntu Linux 16.04 基础镜像的相应 `Dockerfile`。它会给你一些提示，说明为什么我更喜欢 RHEL/CentOS 而不是
  Ubuntu。参考第 3 章在 Ubuntu 中安装所需依赖项的步骤以及第 8 章在 Ubuntu 上安装 SQL Server 的步骤。我将它们列为步骤 1a
  和 1b：


  ```dockerfile

  #Step 1

  FROM ubuntu:16.04

  #Step 1a–安装安装 SQL Server 所需的 Ubuntu 软件包

  RUN apt-get update && apt-get install -y curl apt-utils apt-transport-https software-properties-common

  #Step 1b-下载并安装 SQL Server 的公共 GPG 密钥

  RUN curl https://packages.microsoft.com/keys/microsoft.asc | apt-key add -

  #Step 2

  RUN add-apt-repository "deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017
  xenial main"

  RUN apt-get update

  #Step 3

  RUN apt-get install -y mssql-server

  #Step 4

  RUN mkdir -p /var/opt/mssql/data

  RUN chmod -R g=u /var/opt/mssql /etc/passwd

  EXPOSE 1433

  #Step 5

  ENV PATH=${PATH}:/opt/mssql/bin

  #Step 6

  CMD sqlservr

  ```


  如果你想安装 SQL Server 2019，请将第 2 步替换为相应的 `repo` 文件。使用以下 `docker build` 命令构建自定义镜像：


  ```bash

  docker build -t customsql2017centoslinux:v1.0 .

  ```


  我是不是说过我更喜欢使用 Linux 版 SQL Server 镜像？那是因为它们构建所需时间更短，占用的存储空间也更少。图 10-3 显示了这个自定义 Linux
  版 SQL Server 镜像的大小——1.3+GB，而前一章创建的 Windows 版 SQL Server 镜像则为 17.9GB。看看 CentOS Linux
  7.6.1810 和 Ubuntu Linux 16.04 基础镜像的大小。


  ![图 10-3：自定义 Linux 版 SQL Server 镜像的大小](img/484552_1_En_10_Fig3_HTML.jpg)


  相当直接，不是吗？我们可以在此基础上，添加第 8 章中所做的配置设置作为第 4 步的额外指令，例如启用 SQL Server Agent、设置跟踪标志等。我们不需要更改数据库和备份文件的默认位置，因为我们可以运行一个容器并将
  `/var/opt/mssql` 目录挂载到一个 Docker 卷。此外，配置防火墙也不是必需的，当你运行容器时，Docker 会自动更新 `iptables`。我们唯一需要担心的是在启动时设置跟踪标志——而且只有在你确实需要时才这样做。我们可以用
  `ENTRYPOINT` 指令替换第 6 步的 `CMD` 指令，并将 SQL Server 启动参数作为 `docker run` 命令的一部分传递。


  让我们看看通过更改 `Dockerfile` 来调整我们的自定义 Linux 版 SQL Server 镜像的几种方法。我只会介绍对特定步骤的更改，以便你可以根据自己的需要随意尝试这些更改。



  ### 安装特定的 SQL Server 版本


  如果你注意到了，我们一直都在安装我们想要的最新版 SQL Server——包括最新的更新（在撰写本文时，SQL Server 2017 是 CU19，SQL Server
  2019 是 CU1）。虽然强烈建议始终保持 SQL Server 安装更新，但你可能需要一个特定的版本，因为那是你已在应用程序中测试过的版本。假设你想安装 SQL
  Server 2017 CU14，因为你想要构建的标准化镜像需要这个特定版本。你当然不希望创建一个包含高于 CU14 版本的自定义 Linux 版 SQL Server
  镜像。你可以修改步骤 3 来安装一个指向你想要安装的 SQL Server 版本的特定软件包。你可以从 [`packages.microsoft.com/rhel/7/mssql-server-2017/`](https://packages.microsoft.com/rhel/7/mssql-server-2017/)（适用于
  RHEL 和 CentOS 7）或 [`packages.microsoft.com/ubuntu/16.04/mssql-server-2017/pool/main/m/mssql-server/`](https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017/pool/main/m/mssql-server/)（适用于
  Ubuntu 16.04）查看特定的 SQL Server 2017 软件包。或者你可以运行以下命令列出所有可用的软件包：


  ```

  yum --showduplicates list mssql-server #for RHEL/CentOS

  apt -a list mssql-server #for Ubuntu

  ```


  此命令的结果取决于你在步骤 2 中定义的 `repo` 文件。图 10-4 显示了 RHEL 上所有可用的 SQL Server 2017 软件包。


  ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig4_HTML.jpg](img/484552_1_En_10_Fig4_HTML.jpg)


  图 10-4：RHEL 上 SQL Server 2017 的不同软件包


  你可以使用以下命令安装 SQL Server 2017 CU14：


  ```

  sudo yum install -y mssql-server-14.0.3076.1-2 #for RHEL/CentOS

  sudo apt-get install -y mssql-server=14.0.3076.1-2 #for Ubuntu

  ```


  你现在需要做的就是将 `Dockerfile` 中的步骤 3 替换为以下命令，并替换为你正在使用的 Linux 发行版对应的包管理命令：


  ```

  #Step 3

  RUN yum install -y mssql-server-14.0.3076.1-2 #for RHEL/CentOS

  RUN apt-get install -y mssql-server=14.0.3076.1-2 #for Ubuntu

  ```


  ### 创建以非 root 用户身份运行的自定义镜像


  我参加了微软 MVP Anthony Nocentino 在 2019 年 PASS 大会上关于 Kubernetes 架构的演讲，因为这是我在如此大型的会议上唯一能百分百确定能和他见面的方式。如今的大多数交流都是虚拟的——通过电子邮件、即时通讯、社交媒体、电话或电话会议。但没有什么能比得上面对面交流。说我老派也好，但面对面的交流是我们建立高质量人际关系的方式。只要有机会，我都会尽力与家人、朋友和熟人面对面交流。


  当他结束演讲进入问答环节时，观众席中有人走上前来，为他的演示失败道歉。她说她一直在四处走动，参加专注于 Linux 的 Docker 相关会议，并询问演讲者为什么他们的演示会失败。她恰好是
  SQL Server 团队的一名开发人员，负责更新 Linux 版 SQL Server 2019 的 Docker 镜像。由于 SQL Server 2019
  在 PASS 大会周正式发布，他们也发布了所有更新的 Linux 版 SQL Server 2019 Docker 镜像，并引入了他们所做的更改：运行非 `root`
  容器。


  正如我在前面章节中反复提到的，以 `root` 身份运行容器存在安全风险。遵循最小权限原则，我们可以创建一个以非 `root` 身份运行的自定义 Linux 版
  SQL Server 镜像。公开可用的 Linux 版 SQL Server 2017 镜像都是在假设容器将以 `root` 身份运行的前提下创建的。随着 SQL
  Server 2019 的发布，微软也发布了一个 `Dockerfile`，其中包含对现有公共镜像的修改，使其能够以非 `root` 用户身份运行容器。请在此处查看
  `Dockerfile`：[`github.com/microsoft/mssql-docker/blob/master/linux/preview/examples/mssql-server-linux-non-root/Dockerfile`](https://github.com/microsoft/mssql-docker/blob/master/linux/preview/examples/mssql-server-linux-non-root/Dockerfile)。我们将探讨其中的附加指令及其作用。请参考
  `Dockerfile` 的行号。


  **第 10 行**: `RUN useradd -M -s /bin/bash -u 10001 -g 0 mssql`


  这条指令运行 `useradd` 命令，向现有的 Linux 版 SQL Server 2017 镜像中添加一个名为 `mssql` 的新用户。`-M` 参数将跳过为新用户创建主目录。`-s`
  参数指定使用 `/bin/bash` 作为用户的登录 shell。`-u` 参数指定用户的 UID 值——10001——而 `-g` 参数指定 GID 值，0。请记住，此用户是在容器内部创建的，而不是在主机上创建的。


  **提示**


  在我对 SQL Server 2019（以及 Ubuntu 上的 SQL Server 2017）的测试中，这条指令可能导致镜像构建过程失败——但在 RHEL/CentOS
  上的 SQL Server 2017 却没有出现这种情况，我觉得这很奇怪。Linux 版 SQL Server 安装过程的一部分就是创建名为 `mssql` 的用户和组。`UID`
  和 `用户名` 值必须是唯一的。由于 `mssql` 用户已存在（尽管 UID 不同），该命令会失败。添加已存在的用户会抛出错误并导致镜像构建失败。请相应地进行测试。在创建自定义的
  Linux 版 SQL Server 2019（或 Ubuntu 上的 SQL Server 2017）镜像时，可以省略此行。但是，这样做意味着接受在安装过程中创建的具有不同
  UID 值 (999) 的 `mssql` 用户。此 UID 值可能已存在于你的 Linux Docker 主机上，并可能导致关于究竟是谁在运行容器的混淆。请参阅图
  10-10。另一个选择是将其命名为其他名称，但使用 10001 UID 值。


  **第 11 行**: `RUN mkdir -p -m 770 /var/opt/mssql && chgrp -R 0 /var/opt/mssql`




  此指令运行 `mkdir` 命令以创建一个新目录 `/var/opt/mssql`，并使用 `-m` 参数赋予 770 权限——所有者具有读写执行（RWX）权限，组具有读写执行（RWX）权限，其他用户无权限。`&&`
  字符仅仅是追加了 `chgrp` 命令，而非创建一个新的 `RUN` 指令。这看起来与第 4 步很像，但权限设置更为精细。另外，追加命令而不是创建另一个指令是一种优化技巧，我们可以在
  `Dockerfile` 中实施。


  注意：如果你遵循 `Dockerfile` 中的命令顺序，是隐式地由 `root` 用户创建了 `/var/opt/mssql` 目录。这意味着运行 `chgrp`
  命令只是从 `root` 分配了相同的组权限。如果我们指派 `mssql` 用户来运行 `sqlservr` 进程，这种方式就行不通了。我们要么让 `mssql`
  用户创建 `/var/opt/mssql` 目录，要么使用命令 `chown -R mssql:0 /var/opt/mssql` 显式地将所有权更改为 `mssql`
  用户。微软提供的可用 `Dockerfile` 是有效的，但该镜像是从一个现有的 SQL Server on Linux 镜像构建的（注意 `FROM` 指令并非一个基础操作系统镜像）。我不确定他们用于构建基础镜像的脚本是否已经包含了将
  `mssql` 用户设为 SQL Server 目录所有者的步骤。


  我重写了该指令，以显式地将 `/var/opt/mssql` 目录的所有权分配给 `mssql` 用户，如下所示。我还对其进行了优化，并将多个命令合并到一个 `RUN`
  指令中，而不是使用多行：


  ```

  RUN mkdir -p -m 770 /opt/mssql && chown -R mssql:0 /opt/mssql && chgrp -R 0 /opt/mssql

  ```


  **第 15 行**: `RUN setcap ‘cap_net_bind_service+ep’ /opt/mssql/bin/sqlservr`


  此指令运行 `setcap` 命令以在文件上设置 Linux capabilities，本例中是 `sqlservr` 可执行文件。`cap_net_bind_service`
  capability 允许 `sqlservr` 可执行文件绑定到低端口号（1024 以下的任何端口），而无需以 `root` 身份运行。`+ep` 表示我们正在分配（`+`
  操作符）`Explicit`（显式）和 `Permitted`（允许）的 capabilities。


  注意：Linux capabilities 是一个安全概念。它们为一个进程提供可用 `root` 权限的一个子集。你不想授予一个进程完整的 `root` 权限（例如，docker
  容器进程），否则你将面临该进程被利用并接管整个机器的风险。一个进程可能需要特殊权限来执行其功能，但直接授予其 `root` 访问权限有点过分了。因此，你授予 Linux
  进程其工作所需的适当 capability。第 15 行的示例授予了 `sqlservr` 进程 `cap_net_bind_service` capability，以便将其绑定到低端口号。这比授予其
  `root` 权限要安全得多。


  **第 19 行**: `RUN setcap ‘cap_sys_ptrace+ep’ /opt/mssql/bin/paldumper`


  与第 15 行类似，此指令运行 `setcap` 命令，为 `paldumper` 文件设置 `cap_sys_ptrace` capability。你大概可以从它的名字猜出这个文件是什么——它是一个
  SQL Server 实用工具，用于生成核心转储，主要用于故障排除。这必须显式定义，因为我们将不再以 `root` 身份运行容器，然而我们又需要 `root`
  权限来执行故障排除。


  **第 20 行**: `RUN setcap ‘cap_sys_ptrace+ep’ /usr/bin/gdb`


  这与第 19 行类似，但针对的是 `gdb` 文件，它是 GNU 调试器的缩写，是 Linux 最常用的调试实用工具。


  **第 25 行**: `RUN mkdir -p /etc/ld.so.conf.d && touch /etc/ld.so.conf.d/mssql.conf`


  此指令使用 `touch` 命令创建一个 SQL Server 将使用的 `ldconfig` 文件——`mssql.conf`。`ldconfig` 命令用于为共享库创建必要的链接和缓存。共享库是程序启动时加载的库。这些共享库的位置存储在环境变量
  `LD_LIBRARY_PATH` 中。接下来的几个指令将进一步解释为何需要此步骤。


  **第 26 行**: `RUN echo -e "# mssql libs\n/opt/mssql/lib" >> /etc/ld.so.conf.d/mssql.conf`


  在第 25 行的基础上，一行包含 `# mssql libs\n/opt/mssql/lib` 的新内容被添加到 `/etc/ld.so.conf.d/mssql.conf`
  文件中。系统会读取 `mssql.conf` 文件以搜索所使用的共享库位置，在本例中是 `libs` 和 `/opt/mssql/lib`（`\n` 用于引入新行）。这样做的原因是，先前指令中使用的
  `setcap` 命令移除了 `LD_LIBRARY_PATH` 和其他控制动态链接的环境变量。这是出于安全原因。由于你将使用非 `root` 用户运行容器，所有不安全的环境变量都将被移除，导致在故障排除期间运行
  `paldumper` 和 `gdb` 变得无效。


  **第 27 行**: `RUN ldconfig`


  此指令运行 `ldconfig` 命令以应用第 25 和 26 行中创建的配置设置。


  **第 29 行**: `USER mssql`


  此指令将 `mssql` 设置为运行容器时的用户。


  以下的 `Dockerfile` 集成了这些行，以创建一个以非 `root` 用户运行的基于 CentOS Linux 的自定义 SQL Server 镜像。我添加了步骤和行号作为注释，以标识添加的指令：


  ```

  #步骤 1

  FROM centos:7.6.1810

  #步骤 2

  RUN curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo

  #步骤 3

  RUN yum install -y mssql-server

  #第 10 行–如果你在 Ubuntu 上安装 SQL Server 2019 或 SQL Server 2017，

  #请更改为其他用户，例如 mssql2

  RUN useradd -M -s /bin/bash -u 10001 -g 0 mssql

  #修改的第 11 行

  RUN mkdir -p -m 770 /opt/mssql && chown -R mssql:0 /opt/mssql && chgrp -R 0 /opt/mssql

  #第 15、19 和 20 行

  RUN setcap ''cap_net_bind_service+ep'' /opt/mssql/bin/sqlservr

  RUN setcap ''cap_sys_ptrace+ep'' /opt/mssql/bin/paldumper

  RUN setcap ''cap_sys_ptrace+ep'' /usr/bin/gdb

  #第 25、26 和 27 行

  RUN mkdir -p /etc/ld.so.conf.d && touch /etc/ld.so.conf.d/mssql.conf

  RUN echo -e "# mssql libs\n/opt/mssql/lib" >> /etc/ld.so.conf.d/mssql.conf

  RUN ldconfig

  #告知用户此容器将使用的端口

  EXPOSE 1433

  #第 29 行

  USER mssql

  #步骤 5

  ENV PATH=${PATH}:/opt/mssql/bin

  #步骤 6

  CMD sqlservr

  ```


  保存 `Dockerfile` 并构建镜像。完成后，你便可以使用这个自定义的 SQL Server on Linux 镜像来以非 `root` 身份运行容器。



  '
- "# 以非 root 用户运行容器\n\n默认情况下，使用 `docker run` 命令运行容器会以 `root` 用户身份运行。但既然你构建的自定义镜像不再以\
  \ `root` 身份运行，那么从该自定义镜像运行容器意味着，虽然 `root` 仍然拥有容器的读写文件系统层（Docker 守护进程以 `root` 身份运行并创建该读写层），但容器进程本身不再以\
  \ `root` 身份运行。运行以下 `docker container inspect` 命令以检查容器的读写文件系统层。我使用了 `--format` 参数来让\
  \ `docker container inspect` 命令的输出保持简洁，只显示包含读写文件系统层的 `UpperDir` 目录——请将 `sqldevlinuxcon01`\
  \ 替换为你的容器名称。有关文件系统层及其位置的快速回顾，请参阅第 5 章。\n\n```\ndocker container inspect sqldevlinuxcon01\
  \ --format '{{.GraphDriver.Data.UpperDir}}'\n```\n\n**提示**\n\n`--format` 参数对于仅从\
  \ `docker container inspect` 或任何返回 JSON 输出的 `docker` 命令的输出中筛选你需要的信息非常方便。实际上，所有 `docker`\
  \ 命令都返回 JSON 输出，这就是为什么很多命令都带有 `--format` 参数。只不过最常见的命令已经预设了模板。由于 Docker 是使用 Go 语言编写的，你可以通过应用\
  \ Golang 包模板来自行格式化 JSON 输出。请参阅 [*https://golang.org/pkg/text/template/*](https://golang.org/pkg/text/template/)\
  \ 了解 Golang 包模板。\n\n你可以将这个输出作为参数传递给 `ls` 命令，以查看目录的所有者，如下所示。务必在命令前加上 `sudo`，因为 `root`\
  \ 拥有 `/var/lib/docker` 目录。图 10-5 显示了目录的所有者——仍然是 `root`。\n\n![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig5_HTML.jpg](img/484552_1_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5\nroot 仍然拥有容器的文件系统层\n\n```\nsudo ls -ld \"$(docker container inspect sqldevlinuxcon01\
  \ --format '{{.GraphDriver.Data.UpperDir}}')\"\n```\n\n但是，如果你使用以下命令从 Linux Docker\
  \ 主机查看运行 `sqlservr` 的进程，你会发现它不再以 `root` 身份运行。图 10-6 显示运行 `sqlservr` 进程的用户 ID 是 `UID\
  \ 10001`。这就是我们在 `Dockerfile` 的 `第 10 行` 创建 `mssql` 用户时分配的用户 ID。\n\n![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig6_HTML.jpg](img/484552_1_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6\n在 Linux Docker 主机上，UID 10001 运行 sqlservr 进程\n\n```\nps aux | grep sqlservr\n\
  ```\n\n你可以通过运行以下 `docker exec` 命令来确认容器也以 `mssql` 用户身份运行：\n\n```\ndocker exec -it\
  \ sqldevlinuxcon01 ps aux | grep sqlservr\n```\n\n你也可以运行以下 `docker container inspect`\
  \ 命令：\n\n```\ndocker container inspect sqldevlinuxcon01 --format '{{.Config.User}}\
  \ {{.Name}}'\n```\n\n图 10-7 显示了在容器内部运行 `sqlservr` 进程的 `mssql` 用户。\n\n![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig7_HTML.jpg](img/484552_1_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7\nmssql 用户在容器内运行 sqlservr 进程\n\n检查容器的读写文件系统层中文件和目录的所有权可以证实这一点，如图 10-8 所示。\n\
  \n![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig8_HTML.jpg](img/484552_1_En_10_Fig8_HTML.jpg)\n\
  \n图 10-8\nUID 为 10001 的 mssql 用户拥有这些目录\n\n在图 10-6 和 10-8 中仅显示用户 ID 值的原因是，我们在 Linux\
  \ Docker 主机上没有创建具有相应用户 ID 值的 `mssql` 用户。我强烈建议在 Linux Docker 主机上创建具有相同 UID 值的 `mssql`\
  \ 用户，这样你就可以轻松地将其映射到容器内运行的用户。使用以下命令在 Linux Docker 主机上创建用户：\n\n```\nsudo useradd -M\
  \ -s /bin/bash -u 10001 -g 0 mssql\n```\n\n重新运行用于生成图 10-6 的命令，将不再显示 UID 值，而是显示一个用户友好的名称。\n\
  \n你需要非常小心的一件事是，在容器内创建用户帐户时为其分配的 UID 值。微软决定为 `mssql` 用户使用 UID 10001 是有原因的——这个值足够大，可以防止在\
  \ Linux Docker 主机上发生任何可能的冲突。请记住，容器与 Docker 主机共享同一个内核。Linux 内核负责管理 UID 和 GID 空间，并用它们来确定是否应授予权限。当我们在\
  \ `Dockerfile` 的 `第 10 行` 创建 `mssql` 用户时，系统会根据 Linux 内核检查该 UID 是否已存在。如果已存在，则直接使用现有的\
  \ UID。如果不存在，则会在一个仅在容器上下文中存在的隔离 UID 空间中创建它。当容器被创建时，Docker 守护进程通过 `root` 用户在 Linux\
  \ Docker 主机上创建读写文件系统层。当我们授予 `mssql` 用户对 `/var/opt/mssql` 目录的所有权时，Docker 主机的 Linux\
  \ 内核会检查进程是否有权修改该目录内的文件。用于检查的是 UID 值，而不是用户名。这就是为什么图 10-8 显示的是 UID 值而不是用户名。但是，如果 Docker\
  \ 主机中已有的 Linux 用户具有与你容器内所用相同的 UID 值，那么 Linux Docker 主机上的该用户将胜出。图 10-9 演示了这一点。在我的\
  \ Linux Docker 主机上，Linux 用户 `emsarmiento` 的 UID 值为 1000。我在 `Dockerfile` 的 `第 10\
  \ 行` 操作失误，为 `mssql` 用户分配了 UID 值 1000——与用户 `emsarmiento` 相同——而不是 10001。\n\n![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig9_HTML.jpg](img/484552_1_En_10_Fig9_HTML.jpg)\n\
  \n图 10-9\n拥有目录的是 UID 为 1000 的 emsarmiento 用户，而不是 mssql\n\n你可以通过检查在容器内部和 Linux Docker\
  \ 主机上运行的 SQL Server 进程来确认这一点。图 10-10 显示容器中使用的 UID 与 Linux Docker 主机上的相同。你可能因为用户名不同而认为它们是不同的用户。事实是，它们是同一个\
  \ UID。\n\n![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig10_HTML.jpg](img/484552_1_En_10_Fig10_HTML.jpg)\n\
  \n图 10-10\n在容器上使用已存在于 Linux Docker 主机上的 UID 的影响\n\n**提示**\n\n在构建自定义 Docker 镜像时，务必妥善记录你创建的所有用户。这不仅有助于以非\
  \ `root` 身份运行容器，也对安全性和审计工作大有裨益。在有独立团队管理 Docker 基础设施的大型企业中，告知他们有非 `root` 用户在运行容器，可以帮助他们回答审计员提出的安全相关问题。\n\
  \n## 非 root 用户与 Docker 卷\n\n在第 7 章中，我们讨论了将 SQL Server 数据库存储在 Docker 卷中以实现数据持久化。但当时，Docker\
  \ 卷内创建的目录由 `root` 用户拥有。图 10-11 展示了一个以 `root` 身份运行的 SQL Server 2017 on Linux 镜像，它利用\
  \ Docker 卷时的目录结构和所有权。\n\n![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig11_HTML.jpg](img/484552_1_En_10_Fig11_HTML.jpg)\n\
  \n图 10-11\n\n当容器以 root 身份运行时，Docker 卷上的文件系统所有权\n\n按照第 7 章中概述的步骤，将一个以 `root` 身份运行的容器智能更新或升级为另一个不以\
  \ `root` 身份运行的容器，你最终会遇到如图 10-12 所示的 `Permission denied (13)` 错误。看来并不那么智能，对吧？\n\n\
  ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig12_HTML.jpg](img/484552_1_En_10_Fig12_HTML.jpg)\n\
  \n图 10-12\n\n当非 root 容器尝试访问时，Docker 卷上的文件系统所有权错误\n\n这是因为非 `root` 容器内的 `sqlservr`\
  \ 进程正试图访问 Docker 卷中由 `root` 用户拥有的数据库文件。这就像在 Windows 上使用特定的 Active Directory 域账户运行\
  \ SQL Server，然后将该服务账户更改为另一个对系统数据库和用户数据库没有读写访问权限的账户一样——SQL Server 将无法启动。\n\n**提示**\n\
  \n如果你以前这样做过但没有遇到此问题，你为什么要授予 SQL Server 服务账户管理员权限？你应该限制 SQL Server 服务账户的权限，而不是给它无限制的访问权限。我厌倦了看到\
  \ SQL Server 服务账户以 Active Directory 域管理员身份运行。不要成为那样的 DBA。请遵循此 Microsoft 文档中的指南为\
  \ Windows 上的 SQL Server 配置服务账户：`https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/configure-windows-service-accounts-and-permissions?view=sql-server-ver15#Serv_Perm`。\n\
  \n现在你知道为什么来自 SQL Server 团队的开发者在 PASS Summit 上围绕着做 SQL Server on Linux 容器演讲的演讲者跑来跑去——并道歉了吧。她知道这是一个定时炸弹。她是对的。每一个演示如何对\
  \ SQL Server on Linux 容器进行就地升级的演讲者都失败了。\n\n对以 `root` 身份运行的容器进行就地更新或升级的方法是，首先授予非\
  \ `root` 用户对 Docker 卷中目录的权限。以下是对执行智能就地更新或升级容器步骤的修改版本。这假设你知道自定义镜像中定义的非 `root` 用户。\n\
  \n1.  停止容器。\n\n2.  将 Docker 卷内 SQL Server 目录和文件的所有权分配给非 `root` 用户。\n\n在继续更新或升级容器之前，你需要将非\
  \ `root` 用户设置为 Docker 卷内文件的新所有者。假设你没有 `root` 权限来更改映射到 Docker 卷的目录，你可以创建一个临时容器来完成此操作。以下\
  \ `docker run` 命令使用 Alpine Linux 镜像运行一个容器；挂载 Docker 卷并运行 `chown` 命令，将目录和文件所有权更改为\
  \ UID 值为 10001 的 `mssql` 用户。我使用 Alpine Linux 镜像因为它非常轻量级。此外，我只需要它来运行 `chown` 命令。我使用了\
  \ UID 值而不是用户名，以防它尚未在 Linux Docker 主机上创建。`sqldbdata` 是 Docker 卷的名称。\n\n```\n#运行一个临时的\
  \ Alpine Linux 容器，挂载 Docker 卷，\n#并运行 chown 命令\ndocker run --name temp -d --mount\
  \ source=sqldbdata,target=/data alpine chown -R 10001:0 /data\n#移除临时容器\ndocker rm\
  \ temp -f\n```\n\n**提示**\n\n你也可以在 Linux Docker 主机上直接更改目录和文件的所有权。唯一的挑战是需要 `root`\
  \ 权限来更改映射到文件系统中 Docker 卷的目录。默认情况下，Docker 卷创建在 `/var/lib/docker/volumes` 目录中。你可以对\
  \ `/var/lib/docker/volumes/sqldbdata/_data` 目录运行相同的 `chown` 命令。你需要 `root` 权限才能执行此操作。\n\
  \n3.  使用新名称 `sqldevlinuxcon02` 创建一个新的 SQL Server on Linux 容器，基于以非 `root` 用户身份运行的自定义\
  \ SQL Server on Linux 镜像。将相同的卷 `sqldbdata` 挂载到这个新容器，并重用相同的端口号和主机名。\n\n```\ndocker\
  \ run -e \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=mYSecUr3PAssw0rd\" -p 1433:1433 --name\
  \ sqldevlinuxcon02 -d -h linuxsqldev01 --mount source=sqldbdata,target=/var/opt/mssql\
  \ customsql2019-nonroot:v1.0\n```\n\n请记住，一旦你升级——从 SQL Server 2017 到 SQL Server 2019——就无法回头。这与更新具有相同版本但不同\
  \ CU 的容器不同，如果事情没有按计划进行，你可以回滚到之前的版本。好的旧式、经过验证的备份确实是无可替代的。\n\n## 优化 Dockerfile\n\n\
  让我们在*第 9 章*关于优化*Dockerfile*的内容基础上继续。然而，当你查看镜像大小时，其实并没有太多可优化的空间。图 10-13 展示了自定义的 SQL\
  \ Server 2017 on Linux 镜像的层结构，该镜像以非 `root` 用户运行，你可以通过 `docker history` 命令查看。\n\n\
  ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig13_HTML.jpg](img/484552_1_En_10_Fig13_HTML.jpg)\n\
  \n**图 10-13**\n\n列出自定义 SQL Server on Linux Docker 镜像的不同文件系统层\n\n最大的层是包含安装 SQL Server\
  \ 指令的层。对于这一层，我们确实无能为力，除非你想采用我们在自定义 SQL Server on Windows 镜像中所做的那样，删除安装文件。方法是在使用以下指令安装\
  \ SQL Server 后，清空 `yum cache`：\n\n```\nRUN yum cache all\n```\n\n但是，与其添加另一条指令，不如将其附加到第\
  \ 3 行，如下列命令所示，这样不会创建额外的镜像层：\n\n```\n#Step 3\nRUN yum install -y mssql-server &&\
  \ yum cache all\n```\n\n**提示**\n\n在 Linux 中，你可以在单行中运行多个命令，就像 `#Step 3` 中的例子一样。你甚至可以在单行中组合多个不同的命令，只需用连接符将它们分开即可。这被称为“命令链”，即在单行中拼接多个命令。在前面的例子中，使用了\
  \ `&&` 操作符。还有其他命令链操作符可用，例如分号操作符 `;`，但为了简单起见，在*Dockerfiles*中我们将坚持使用 `&&` 操作符。\n\n\
  这不会节省大量空间，大概 80MB 左右。SQL Server on Linux 的安装包不像 SQL Server on Windows 安装文件那么大。\n\
  \n你可能想做的另一件事是将第 25、26 和 27 行合并为一个 `RUN` 指令。但由于这些只是为 `sqlservr`、`paldumper` 和 `gdb`\
  \ 添加功能，将它们合并到一个 `RUN` 指令中并不会真正节省空间，只是减少了镜像层的数量。\n\n你可以消除第 5 步中的 `ENV` 指令，并将其包含在第\
  \ 6 步的 `CMD` 指令中，如下所示：\n\n```\nCMD [\"/opt/mssql/bin/sqlservr\"]\n```\n\n但这只是一个表面上的优化——减少了镜像层的数量，但没有减小镜像大小。我留给你去创建一个以非\
  \ root 用户运行的自定义 SQL Server on Linux 镜像，并尽可能优化它。\n\n## 在 Dockerfile 中运行脚本\n\n到目前为止，我们构建的自定义\
  \ SQL Server on Linux 镜像都是为生产环境部署而设计的。请注意，我没有包含安装 SQL Server 命令行工具。正如我在*第 4 章*中提到的，我不喜欢在生产服务器上安装任何不必要的东西，包括客户端工具。对于开发环境，我只安装真正需要的东西，比如\
  \ SQL Server 命令行工具。\n\n### 安装 SQL Server 命令行实用工具\n\n要在 Linux 上安装 SQL Server 命令行工具，需要下载一个不同的\
  \ `repo` 文件。你可以在*Dockerfile*的第 2 步包含以下命令：\n\n```\n#For RHEL/CentOS\ncurl -o /etc/yum.repos.d/msprod.repo\
  \ https://packages.microsoft.com/config/rhel/7/prod.repo\n#For Ubuntu\nadd-apt-repository\
  \ \"deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/prod xenial main\"\
  \n```\n\n更新后的*Dockerfile*第 2 步看起来像下面这样，优化为一个 `RUN` 指令：\n\n```\n#For RHEL/CentOS\n\
  RUN curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/7/mssql-server-2017.repo\
  \ && curl -o /etc/yum.repos.d/msprod.repo https://packages.microsoft.com/config/rhel/7/prod.repo\n\
  #For Ubuntu\nRUN add-apt-repository \"deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/mssql-server-2017\
  \ xenial main\" && add-apt-repository \"deb [arch=amd64] https://packages.microsoft.com/ubuntu/16.04/prod\
  \ xenial main\"\n```\n\n更新后的第 3 步现在将包括在 Linux 上安装 SQL Server 命令行工具，如下所示。你需要传递 `ACCEPT_EULA`\
  \ 参数，值为 `Y`，以便在安装过程中自动响应 EULA 提示。当我们只安装 SQL Server 时不需要这个，因为我们将其作为 `docker run`\
  \ 命令的参数传递。\n\n```\n#For RHEL/CentOS\nRUN ACCEPT_EULA=Y yum install -y mssql-server\
  \ mssql-tools unixODBC-devel\n#For Ubuntu\nRUN ACCEPT_EULA=Y apt-get install -y\
  \ mssql-server mssql-tools unixODBC-devel\n```\n\n由于 SQL Server 命令行工具存储在不同的目录中，你需要更新第\
  \ 5 步，添加一个额外的路径，如下所示：\n\n```\nENV PATH=${PATH}:/opt/mssql/bin:/opt/mssql-tools/bin\n\
  ```\n\n在自定义 SQL Server on Linux 镜像上安装了 SQL Server 命令行工具后，你就可以在部署用于开发环境的容器时运行不同的\
  \ T-SQL 脚本了。\n\n\n### 编写用于检查备份的 Bash 脚本\n\n以下是部署 SQL Server 到开发环境的一个常见用例。假设你希望将数据库备份复制到\
  \ Docker 卷中，并在部署自定义的 Linux 版 SQL Server 镜像时还原它们。任何将映射到 Docker 卷的 SQL Server on Linux\
  \ 容器启动的用户，都将自动拥有这些可用的用户数据库。让我们从将数据库备份复制到 Docker 卷开始：\n\n1.  创建一个名为 `sqldbdata` 的\
  \ Docker 卷：\n    ```\n    docker volume create sqldbdata\n    ```\n2.  将数据库备份复制到\
  \ Docker 卷中。\n\n有多种方法可以将文件复制到 Docker 卷。但由于我们假设你没有 `root` 权限，因此我们将创建一个临时容器来完成此操作。这样做是可行的，因为默认情况下，容器以\
  \ `root` 用户的安全上下文运行，除非你专门配置源镜像以非 `root` 身份运行。同时，这也假设你所有的 SQL Server 数据库备份文件都位于当前工作目录中。\n\
  \n1.  将 Docker 卷的所有权更改为非 `root` 用户：\n    ```\n    #使用临时容器运行 chown 命令\n    #以更改 Docker\
  \ 卷中文件的所有权\n    docker exec temp chown -R 10001:0 /data\n    #使用后删除临时容器\n    docker\
  \ rm temp -f\n    ```\n    ```\n    #使用 Alpine Linux 镜像创建一个临时容器\n    #只是为了能够将文件复制到\
  \ Docker 卷中\n    docker run --name temp -d -v sqldbdata:/data alpine sleep 10000\n\
  \    #从包含 SQL Server 数据库备份的当前工作目录\n    #复制文件到 Docker 卷\n    docker cp . temp:/data\n\
  \    ```\n\n你可以创建多个 Docker 卷，每个卷包含一份数据库备份副本，然后只需告诉用户将特定卷挂载到他们的容器上。这实际上取决于你的部署策略。\n\
  \n由于你现在在自定义的 Linux 版 SQL Server 镜像中拥有了 SQL Server 命令行工具，你可以运行 `sqlcmd` 来执行 T-SQL\
  \ 脚本，从而在容器内完成任何 DBA 想要的操作。你可以编写自己的 T-SQL 脚本来检查数据库备份并还原它们，然后通过 `sqlcmd` 调用该脚本。以下是一个\
  \ Bash 脚本片段，它遍历指定目录中的数据库备份并还原它们：\n```\n#遍历 Docker 卷中的所有 BAK 文件\n#/var/opt/mssql\
  \ 挂载在 Docker volume=sqldbdata 上\nfor files in /var/opt/mssql/*.bak\ndo\n/opt/mssql-tools/bin/sqlcmd\
  \ -S localhost -U sa -P $SA_PASSWORD -d master -Q \"RESTORE DATABASE [${files:15:-4}]\
  \ FROM DISK ='$files'\"\ndone\n```\n\n我相信你认出了这个带有 `RESTORE DATABASE` 命令的 `sqlcmd`\
  \ 调用。你可能过去在 Windows 上用批处理文件做过类似的事情。为了演示，我保持了脚本的简洁，但你可以尽情发挥你的 T-SQL 脚本。数据库备份文件的命名格式为\
  \ `databaseName.bak`，并且都是从采用默认配置的 Linux 版 SQL Server 实例中获取的。这样，在运行 `RESTORE DATABASE`\
  \ 命令时，我们就不需要指定 `WITH MOVE` 选项。方括号内的 `${files:15:-4}` 执行字符串操作以提取数据库名称。由于容器中的 `/var/opt/mssql`\
  \ 目录将映射到 Docker 卷，备份文件的完整路径将采用 `/var/opt/mssql/databaseName.bak` 的形式。数据库名称之前有 15\
  \ 个字符 (`/var/opt/mssql/`)，其后有 4 个字符 (`.bak`)。`$` 符号指的是名为 `files` 的变量，该变量包含备份文件的完整路径。对于指定目录中的每个备份文件，脚本将生成并运行相应的\
  \ `sqlcmd` 命令，如下所示。请不要取笑我，我仍在使用经典的 Northwind 数据库作为示例。\n```\n/opt/mssql-tools/bin/sqlcmd\
  \ -S localhost -U sa -P $SA_PASSWORD -d master -Q \"RESTORE DATABASE [Northwind]\
  \ FROM DISK ='/var/opt/mssql/Northwind.bak'\"\n```\n\n我还在脚本中 `RESTORE DATABASE`\
  \ 命令运行前加入了一个 `sleep` 命令。还记得*第 7 章*中的原地升级吗？即使是新部署的 SQL Server on Linux 容器，看起来也会像一次升级，因为它从\
  \ RTM 版本开始。这需要时间。`sleep` 命令考虑到了这一点，它会等待大约 2 分钟，直到升级过程完成后再运行 RESTORE DATABASE 命令。如果你愿意，可以增加等待时间。这是一个快速但不够优雅的方法，不过也有其他方法，例如读取\
  \ SQL Server 错误日志以检查特定文本，如下代码片段所示：\n```\n#检查 SQL Server 错误日志，查看恢复是否完成\nwhile ! grep\
  \ \"Recovery is complete. This is an informational message only. No user action\
  \ is required\" /var/opt/mssql/log/errorlog\ndo sleep 10; done\n```\n\n以下是用于检查数据库备份并还原它们的完整\
  \ Bash 脚本：\n```\n#!/bin/bash\n#让脚本等待升级过程完成\nsleep 120\n#遍历 Docker 卷中的所有 BAK 文件\n\
  #目录 /var/opt/mssql/data 挂载在 Docker 卷上\nfor f in /var/opt/mssql/*.bak\ndo\n/opt/mssql-tools/bin/sqlcmd\
  \ -S localhost -U sa -P $SA_PASSWORD -d master -Q \"RESTORE DATABASE [${f:15:-4}]\
  \ FROM DISK ='$f'\"\ndone\n```\n\n将此脚本命名为 `checkbackups_restore.sh`。你稍后会需要用到它。\n\
  \n注意\n\n与*第 8 章*中我们在 Linux 主机上为 Bash 脚本文件分配 `execute` 权限不同，这里你不需要这样做。为 Bash 脚本文件分配\
  \ `execute` 权限的操作将在自定义的 Docker 镜像内部完成。正如你将在下一节看到的，我们将在 `Dockerfile` 中添加一条额外的指令。\n\
  \n你还需要另一个 Bash 脚本。你可以称之为“启动”脚本。它的作用是调用 `checkbackups_restore.sh` 脚本，并在该脚本在后台执行的同时，调用\
  \ `sqlservr` 进程。回想一下，`Dockerfile` 中的最后一条指令应该是某种不会终止的命令。否则，容器也会终止。因此，为了运行 `checkbackups_restore.sh`\
  \ 脚本并启动 `sqlservr` 进程，我们需要从一个启动脚本中调用它们两个。以下是启动 Bash 脚本的代码。你可以将其保存为 `startup.sh`：\n\
  ```\n#!/bin/bash\n#启动脚本，从 Docker 卷还原所有数据库备份；\n#在后台运行脚本\n/tmp/startup/checkbackups_restore.sh\
  \ &\n# 启动 SQL Server\n/opt/mssql/bin/sqlservr\n```\n\n观察这个启动脚本，你会发现它是在 `/tmp/startup`\
  \ 目录内部被调用的。这意味着启动脚本和 `checkbackups_restore.sh` 脚本都应该位于容器内部一个名为 `/tmp/startup` 的目录中。这也意味着我们需要创建\
  \ `/tmp/startup` 目录，并授予 `checkbackups_restore.sh` 和 `startup.sh` 脚本 `execute` 权限。这让你对新的\
  \ `Dockerfile` 会是什么样子有了概念。另外，脚本后的 “&” 符号表示让它在后台运行。\n\n\n\n### 在最后一个指令中运行 Bash 脚本\n\
  \n现在我们已经有了必要的脚本，可以将启动脚本作为 `Dockerfile` 中的最后一个指令来调用，如下所示：\n\n```\nCMD [\"/tmp/startup/startup.sh\"\
  ]\n```\n\n以下是更新后的 `Dockerfile`（带注释）。请注意，这个新的自定义镜像基于另一个已安装 SQL Server 命令行工具并以非 `root`\
  \ 用户身份运行的自定义 SQL Server 2017 on Linux 镜像构建。\n\n```\n#起始于自定义的 SQL Server 2017 on\
  \ Linux 镜像\n#以非 root 用户身份运行，且包含命令行工具\n#注意：请使用正确的 Docker 镜像名称\nFROM customsql2017oncentoswithtools-nonroot:v1.0\n\
  #创建工作目录\nRUN mkdir -p /tmp/startup\n#将 bash 脚本复制到工作目录\n# 并指定 mssql 用户为所有者\nCOPY\
  \ --chown=mssql:0 . /tmp/startup\n#为 bash 脚本授予可执行权限\nRUN chmod +x /tmp/startup/checkbackups_restore.sh\n\
  RUN chmod +x /tmp/startup/startup.sh\n#运行启动脚本 startup.sh\nCMD [\"/tmp/startup/startup.sh\"\
  ]\n```\n\n将 `Dockerfile`、`checkbackups_restore.sh` 和 `startup.sh` 文件保存在一个目录中，并使用该目录作为此新自定义镜像的构建上下文。你只希望这三个文件被复制到自定义镜像中，仅此而已。图\
  \ 10-14 展示了包含这些文件的目录结构。\n\n![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig14_HTML.jpg](img/484552_1_En_10_Fig14_HTML.jpg)\n\
  \n图 10-14\n\n用于构建自定义镜像的目录结构和文件\n\n运行以下命令来构建这个新的自定义镜像：\n\n```\ndocker build -t customsql2017oncentos4dev-nonroot:v1.0\
  \ .\n```\n\n现在，进行最终测试，使用以下 `docker run` 命令，基于此自定义镜像运行一个新容器。请确保使用正确的镜像名称。\n\n```\n\
  docker run -e \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=mYSecUr3PAssw0rd\" -p 1433:1433\
  \ --name sqldevlinuxcon01 --mount source=sqldbdata,target=/var/opt/mssql -d -h linuxsqldev01\
  \ customsql2017oncentos4dev-nonroot:v1.0\n```\n\n将 Docker 卷 `sqldbdata` 映射到容器，意味着备份文件现在可以被容器访问。在启动期间，容器将运行\
  \ `startup.sh` 脚本，该脚本会调用 `checkbackups_restore.sh` 脚本来遍历 `/var/opt/mssql` 目录中的 BAK\
  \ 文件。因为我们是从已经安装了 SQL Server 命令行工具并运行着 `sqlservr` 进程的 `customsql2017oncentoswithtools-nonroot:v1.0`\
  \ 自定义镜像开始的，所以我们可以调用 `sqlcmd` 并向其传递 `RESTORE DATABASE` 命令，以从备份中恢复数据库。\n\n相当酷，你觉得呢？\n\
  \n**注意**\n\n为了展示如何通过以非 `root` 身份运行的容器来自动化部署带有用户数据库的 SQL Server 实例，我可能简化了一些流程。正如我在前面章节中提到的，我对安全问题非常重视，这一点很明显。而且，在处理开发环境中恢复数据库备份（尤其是那些来自生产环境的备份）方面，我显然忽略了很多细节。你不仅需要限制对生产环境和开发环境的访问，还需要实施方法来混淆敏感数据。我完全理解开发人员需要使用真实数据来进行适当的测试。但这并不意味着我们可以直接从生产环境拿备份并在开发环境中恢复。应该包含在备份之前就对数据进行混淆处理的流程。或者使用一台专门用于为开发环境混淆数据的服务器。你肯定不想因为安全泄露事件而出现在明天的新闻头条上。\n\
  \n## 多阶段构建\n\n我曾犹豫是否要包含本节内容，因为它更关乎开发者而非 DBA。但自从我开始做 `SQL Server DBA 的 Docker 容器指南`\
  \ 研讨会以来，我收到了大量关于多阶段构建及其是什么的问题。本节将从高层次概述什么是多阶段构建以及如何使用它们。请耐心读完本章。假装你是一个正在阅读此文的开发者。我知道，这对你要求有点高。\n\
  \n多阶段构建的想法源于编写、测试和编译应用程序的开发实践。多阶段构建用于优化构建并减小 Docker 镜像的大小，而不会增加复杂性。并且你只需要一个 `Dockerfile`\
  \ 就能完成这件事。想象一下，一个开发者在自己的工作站上编写代码。虽然工作站上有开发工具，但生产环境只需要编译后的代码。你肯定不希望开发工具包含在应用最终的自定义镜像中。容器化应用的一个主要副作用是会产生巨大的镜像，其中包含源代码、编译后的代码，有时甚至还有开发工具（不过，我怀疑它们是否有\
  \ SQL Server on Windows 镜像那么大）。看看下面的示例 `Dockerfile`。我使用了来自 [*https://github.com/microsoft/sqllinuxlabs/tree/master/containers/mssql-aspcore-example/mssql-aspcore-example-app/belgrade-product-catalog-demo*](https://github.com/microsoft/sqllinuxlabs/tree/master/containers/mssql-aspcore-example/mssql-aspcore-example-app/belgrade-product-catalog-demo)\
  \ 的示例代码来创建自定义镜像。\n\n```\n#使用带有 SDK 的 .NET Core on Linux 镜像\nFROM mcr.microsoft.com/dotnet/core/sdk:2.2\n\
  WORKDIR /app\n#复制 csproj 文件并作为独立层还原\nCOPY belgrade-product-catalog-demo/*.csproj\
  \ ./belgrade-product-catalog-demo/\nRUN dotnet restore ./belgrade-product-catalog-demo/\n\
  #复制所有其他文件并构建应用\nCOPY belgrade-product-catalog-demo/. ./belgrade-product-catalog-demo/\n\
  WORKDIR /app/belgrade-product-catalog-demo\nRUN dotnet publish -c Release -o out\n\
  ```\n\n构建此自定义镜像将产生一个很大的镜像尺寸，甚至比我安装了 SQL Server 命令行工具的自定义 SQL Server on Linux 镜像还要大。图\
  \ 10-15 显示了这个自定义 ASP.NET Web 应用镜像的大小。\n\n![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig15_HTML.jpg](img/484552_1_En_10_Fig15_HTML.jpg)\n\
  \n图 10-15\n\n带有 SDK 的自定义 ASP.NET Web 应用镜像的大小\n\n这个 1.81GB 的镜像包含了 .NET SDK、源代码和编译后的代码。为了部署到生产环境，我们只需要编译后的代码和依赖项——即\
  \ `RUN` 指令中指定的 `out` 目录中的所有内容。如果我们只使用此自定义镜像的输出，而不是包含开发项目附带的所有内容，会怎样？这就是多阶段构建的用武之地。看看下面这个新的\
  \ `Dockerfile`。我加入了步骤编号来解释 `Dockerfile` 中发生了什么：\n\n```\n#步骤 1：使用带有 SDK 的 .NET Core\
  \ on Linux 镜像\nFROM mcr.microsoft.com/dotnet/core/sdk:2.2 AS build\n#步骤 2\nWORKDIR\
  \ /app\n#步骤 3：复制 csproj 文件并作为独立层还原\nCOPY belgrade-product-catalog-demo/*.csproj\
  \ ./belgrade-product-catalog-demo/\n#步骤 4\nRUN dotnet restore ./belgrade-product-catalog-demo/\n\
  #步骤 5 复制所有其他文件并构建应用\nCOPY belgrade-product-catalog-demo/. ./belgrade-product-catalog-demo/\n\
  #步骤 6\nWORKDIR /app/belgrade-product-catalog-demo\nRUN dotnet publish -c Release\
  \ -o out\n#步骤 7：\nFROM mcr.microsoft.com/dotnet/core/aspnet:2.2 AS runtime\n#步骤\
  \ 8\nWORKDIR /app\n#步骤 9\nCOPY --from=build /app/belgrade-product-catalog-demo/out\
  \ ./\n#步骤 10\nEXPOSE 5000\n#步骤 11\nENTRYPOINT [\"dotnet\", \"belgrade-product-catalog-demo.dll\"\
  ]\n```\n\n\n\n"
- '# Docker 多阶段构建与 Docker Compose 概述


  你可能会注意到存在两个`FROM`指令。是的，如果你的目标是进行多阶段构建，可以在一个`Dockerfile`中使用任意多个`FROM`指令。每个`FROM`指令都有一个从
  0 开始的索引作为引用。步骤 1 可以被称为 0，而步骤 7 可以被称为 1。为了便于引用，通常使用别名。步骤 1 被命名为`build`，而步骤 7 被命名为`runtime`。在整个`Dockerfile`中，你可以通过索引或别名来引用这些构建阶段。在步骤
  6 中，`RUN`指令的输出是一个名为`out`的目录，其中包含编译好的代码及其依赖项。由于这正是运行 Web 应用所需的一切，我们将使用步骤 6 的输出来构建另一个自定义镜像。在步骤
  7 中，运行 ASP.NET Core Web 应用所需的基础镜像，比包含 SDK 的.NET Core 镜像要小得多，如图 10-16 所示。步骤 9 简单地将步骤
  6 生成的`out`目录复制到这个新镜像中。它使用`COPY --from`从一个单独的镜像而非本地文件系统进行复制。这个源镜像可以位于本地文件系统，也可以来自
  Docker Hub 或 Microsoft Container Registry 等公共注册中心。步骤 10 和 11 你可能现在看起来很熟悉了。看看由多阶段构建生成的自定义镜像：262MB
  对比 1.81GB。镜像大小的差异是巨大的。而且我们这里只看了一个镜像。想象一下，如果要处理一个基于微服务架构设计的多容器应用。


  ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig16_HTML.jpg](img/484552_1_En_10_Fig16_HTML.jpg)


  图 10-16

  仅包含编译代码、依赖项和运行时的自定义 ASP.NET Web 应用镜像大小


  正如我所说，这只是对如何使用多阶段构建的一个高级概述。如果你想了解更多关于多阶段构建的信息，请参考 [*https://docs.docker.com/develop/develop-images/multistage-build/*](https://docs.docker.com/develop/develop-images/multistage-build/)。在
  SQL Server 领域，我们只有一个应用——SQL Server 数据库引擎。我们不需要为了部署一个数据库而构建多容器应用。如果你在考虑像 SQL Server
  Always On 可用性组或 SQL Server 复制这样的多实例架构，它们需要部署到超越单个 Linux Docker 主机的高可用性平台。Kubernetes
  是部署此类架构的事实上的高可用性和容器编排平台。虽然我很想介绍一点 Kubernetes 的内容，但这已经超出了本书的范围。不过，它将是你在掌握 Docker
  容器之后的下一步学习路径。


  '
- '# Docker Compose 与 YAML 文件


  去年，我举办的“SQL Server DBA 的 Docker 容器指南”研讨会的一位与会者问我，为什么在我的示例和演示中没有使用 YAML 文件和 Docker
  Compose。与多阶段构建类似，这是另一个用于运行和管理多容器应用程序的工具。虽然 SQL Server DBA 不需要处理它，但既然我已经介绍了多阶段构建，不妨也包含这部分内容。


  还记得 XML 曾经风靡一时吗？我记得在 SQL Server 认证考试中，需要处理任何与 XML 相关的考题。当我参与 SQL Server 2008 的考题编写过程时，我尽力否决任何与
  XML 相关的内容——因为那时，关系数据库引擎并不是存储非关系数据的理想选择。然后 JSON 出现了。无论 Jason 是谁，他很幸运被选作这种新数据交换格式的代称。几年前，我们团队中有一位名叫
  Jason 的同事负责为 Microsoft Azure 数据平台认证考试编写考题。每当我们谈论 JSON 时，都会会心一笑。XML 和 JSON 都被用来标准化数据格式，因此
  DBA 需要学习如何处理它们。


  YAML 代表“YAML Ain’t Markup Language”。与 XML 和 JSON 一样，YAML 也用于标准化数据格式。Docker 和 Kubernetes
  分别使用 YAML 来配置容器和 Pod。这意味着你需要使用`Dockerfile`来自定义镜像，并使用 YAML 文件来描述构成你应用的不同容器和服务。但与只需要一个`Dockerfile`文件就能构建镜像不同，在
  Docker 中处理 YAML 文件需要安装 Docker Compose。


  ## 安装 Docker Compose


  Docker Compose 仍然依赖于 Docker 引擎来执行其任务。因此，你可以直接在你的 Linux Docker 主机所在的同一台机器上安装 Docker
  Compose，也可以在可以远程连接到 Docker 主机的开发机上安装。以下说明假设你将在与 Linux Docker 主机相同的机器上安装 Docker Compose。


  运行以下命令以下载当前稳定版的 Docker Compose。注意，它正在将文件复制到`/usr/local/bin`目录，该目录用于存放普通用户也可以运行的程序：


  ```bash

  sudo curl -L "https://github.com/docker/compose/releases/download/1.25.3/docker-compose-$(uname
  -s)-$(uname -m)" -o /usr/local/bin/docker-compose

  ```


  下载 Docker Compose 软件包后，就像处理 bash 脚本一样，给该文件赋予可执行权限：


  ```bash

  sudo chmod +x /usr/local/bin/docker-compose

  ```


  测试 Docker Compose 是否正确安装的一个简单方法是运行以下命令。截至本文撰写时，当前的稳定版本是`1.25.3`。


  ```bash

  docker-compose --version

  ```


  现在我们已经安装了 Docker Compose，让我们看看如何利用它和 YAML 文件来部署多容器应用程序。



  ### 为多容器应用创建 YAML 文件


  我将使用来自 [`github.com/microsoft/sqllinuxlabs/tree/master/containers/mssql-aspcore-example`](https://github.com/microsoft/sqllinuxlabs/tree/master/containers/mssql-aspcore-example)
  的示例来演示。如果你好奇的话，我在多阶段构建中使用的 ASP.NET Web 应用就来源于此。该应用包含一个简单的两层应用——一个运行在 ASP.NET Core
  上的 Web 前端，连接到一个后端 SQL Server 数据库——两个应用，两个容器。请下载所有内容以便跟随操作。


  我使用了在“在 Dockerfile 内运行脚本”一节中创建的自定义 SQL Server on Linux 镜像，以在容器内运行 bash 脚本，该脚本从 `db-init.sql`
  脚本创建用户数据库。以下代码是我们将用于 YAML 文件的内容：


  ```yaml

  version: "3"

  services:

  wfe:

  build: ./mssql-aspcore-example-app

  ports:

  - "8080:5000"

  depends_on:

  - db

  db:

  build: ./mssql-aspcore-example-db

  environment:

  SA_PASSWORD: "mYSecUr3PAssw0rd"

  ACCEPT_EULA: "Y"

  ports:

  - "1500:1433"

  ```


  让我们分析这个 YAML 文件，以理解它的作用：


  *   `version`: 行描述了 Compose 文件将用于语法验证的版本号。版本 3 适用于 Docker 引擎版本 1.13.0 及更高。

  *   `services`: 行描述了我们将为这个多容器应用运行的不同服务——`wfe` 和 `db` 服务。`db` 服务的命名方式是为了映射到 `appsettings.json`
  文件中定义的数据库连接字符串。

  *   `build`: 行类似于运行 `docker build` 命令。你是在告诉 Docker Compose 在 `./mssql-aspcore-example-app`
  目录中查找 `Dockerfile` 来为 `wfe` 服务构建镜像，并在 `./mssql-aspcore-example-db` 中为 `db` 服务查找。

  *   `ports`: 行类似于 `docker run` 命令中的 `-p` 参数，用于将容器的 TCP 端口发布到主机。`wfe` 服务将使用 Linux
  Docker 主机上的 8080 端口，该端口将映射到容器上的 5000 端口。`db` 服务将使用 1500 端口。你也可以选择移除 `db` 服务上的 `ports`
  定义，它将默认为 1433 端口。

  *   `depends_on`: 行将一个服务设置为当前块定义的容器的依赖项。在这个例子中，`wfe` 服务依赖于 `db` 服务。因此，Docker Compose
  将在启动 `wfe` 服务之前首先启动（或运行包含 `db` 服务的）容器。这就像在启动 SQL Server Agent 服务之前先启动 SQL Server
  服务。停止服务时，行为是相反的。然而，Docker Compose 不会等待容器完全准备好才启动依赖容器。它只等到容器正在运行。回想一下，创建一个新的 SQL
  Server on Linux 容器就像执行升级一样，因为所有东西都是从 RTM 版本开始的。你必须考虑容器完全准备好之前的延迟——这就是为什么我使用了带脚本的自定义
  SQL Server on Linux 镜像。

  *   `environment`: 行类似于 `docker run` 命令的 `-e` 参数。这里，我们传递了两个环境变量，这些变量是我们在容器上运行 SQL
  Server 实例时一直传递给 `docker run` 命令的。


  想象一下，当你处理多容器应用时，这会有多么强大。你可以用一个 YAML 文件来描述整个架构。将文件保存为 `docker-compose.yml`——这是 Docker
  Compose 引用的默认文件名，就像 `Dockerfile` 一样。但先别急。由于格式问题，处理 YAML 文件可能很棘手。我有时不得不使用像 [`codebeautify.org/yaml-validator`](https://codebeautify.org/yaml-validator)
  这样的 YAML 解析器，以确保我遇到的任何错误与格式无关。完成后，运行以下命令。`up` 子命令用于构建、（重新）创建、启动容器并将其附加到服务。图 10-17
  展示了 `docker-compose` 命令正在执行的操作。


  ![../images/484552_1_En_10_Chapter/484552_1_En_10_Fig17_HTML.jpg](img/484552_1_En_10_Fig17_HTML.jpg)


  图 10-17：Docker Compose 执行状态


  ```bash

  docker-compose up

  ```


  Docker Compose 在执行期间会完成以下任务：


  1.  Docker 将为两个容器创建一个 `bridge` 网络以便相互通信。默认情况下，Docker Compose 会为你的应用创建一个单独的 docker
  网络。我们将在第 11 章更详细地讨论 Docker 网络。

  2.  Docker 根据它们对应的 `Dockerfile` 构建 `wfe` 和 `db` 镜像。因为 `wfe` 依赖于 `db`，所以 `db` 镜像将首先被构建。Docker
  仅在镜像尚不存在时才会构建它。如果已存在，它将直接使用可用的镜像。默认情况下，镜像名称将采用 `directoryName_service:latest` 的形式。`wfe`
  的镜像名称将是 `mssql-aspcore-example_wfe:latest`，而 `db` 的镜像名称将是 `mssql-aspcore-example_db:latest`。

  3.  构建镜像后，Docker 基于这些镜像创建并启动相应的容器。它将首先创建并运行 `db` 容器，然后是 `wfe` 容器，如 YAML 文件中所定义。容器名称将采用
  `imageName_1` 的格式——`wfe` 为 `mssql-aspcore-example_wfe_1`，`db` 为 `mssql-aspcore-example_db_1`。


  Docker Compose 允许你完成所有这些操作，而无需单独运行 `docker network create`、`docker build` 和 `docker
  run` 命令。而我们这里只处理两个容器。想象一下需要处理更多容器的情况。而且它还允许你通过 YAML 文件将基础设施定义为代码。


  #### 注意

  因为容器是在你当前的终端中交互式运行的，你不能简单地用 Ctrl+C 退出——这也会停止容器。你可以打开另一个终端会话来探索和管理容器。


  在本节中，我几乎没有触及 Docker Compose 功能的皮毛。请参考 [`docs.docker.com/compose/`](https://docs.docker.com/compose/)
  获取关于如何利用它处理多容器应用的更多信息。但就像我说的，作为 SQL Server DBA，如果你只需要部署 SQL Server 数据库，你将不会处理多容器应用。至少，当开发者提到一些关于
  Docker Compose 的事情时，你现在心里有数了。


  ## 本章小结


  本章是前一章关于创建自定义 SQL Server on Docker 镜像的延伸。尽管在第 9 章已经涵盖了基础知识，但我决定涵盖更多主题是有原因的。如果你注意到了，本书的大部分内容都围绕着
  Linux 上的 Docker。微软已经全力投入 Linux，而 SQL Server 就是证明。这在很大程度上说明了 SQL Server 未来的走向，以及它将如何影响你作为
  DBA 的职业生涯。我预见未来大多数 SQL Server 部署都将在 Linux 上进行，无论是物理机、虚拟机还是容器中。因此，本章结合了你从之前章节中学到的关于同时使用
  Linux 和 Docker 的一切知识——从在 Linux 上安装 SQL Server 到编写 bash 脚本。我的目标是为你迎接那个未来做好准备。


  但我们还没完成。下一章将涵盖 Docker 网络的基础知识，并更详细地探讨我提到的 `bridge` 网络。



  '
- '# 11. 面向 SQL Server 数据库管理员的 Docker 网络指南


