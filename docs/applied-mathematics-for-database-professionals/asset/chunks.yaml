    The next three sections will briefly discuss these reasons.


    **Inapplicable**


    Inapplicable data values arise from the failure to design specializations. This
    is the main reason of the manifestation of optional attributes in the implementation
    of a database design. By not introducing separate table structures to hold the
    attributes that are only applicable for a certain subset of the tuples in a given
    table structure, you’ll end up with optional attributes.


    In the example database design in Chapter 7, we specifically introduced SREP and
    MEMP to prevent the following optional attributes in EMP:


    • TARGET and COMM: Only applicable for (the subset of ) sales representatives


    • MGR: Only applicable for managed employees; that is, everybody but the president
    Frequently, you’ll find that neither SREP nor MEMP are introduced, and that attributes
    TARGET, COMM, and MGR are nullable attributes in the EMP table structure. With
    a bit of luck, all the following four CHECK constraints accompany them:


    CHECK( JOB<>''SALESREP'' or (TARGET is not null and COMM is not null) ) CHECK(
    JOB=''SALESREP'' or (TARGET is null and COMM is null) ) CHECK( JOB=''PRESIDENT''
    or MGR is not null )


    CHECK( JOB<>''PRESIDENT'' or MGR is null )


    The first two constraints represent the following two implications, specifying
    when the TARGET and COMM attributes should hold a value and when not: ( JOB =
    ''SALESREP'' ) ⇒ ( TARGET is not null and COMM is not null ) ( JOB <> ''SALESREP''
    ) ⇒ ( TARGET is null and COMM is null ) Note that the implications have been rewritten
    into disjunctions.


    The last two CHECK constraints represent the implications specifying when the
    MGR attribute should hold a value and when not:


    ( JOB <> ''PRESIDENT'' ) ⇒ ( MGR is not null )


    ( JOB = ''PRESIDENT'' ) ⇒ ( MGR is null )


    **■Note** Often you’ll find that the second and fourth CHECK constraints are erroneously
    left unspecified.


    The preceding four CHECK constraints would implement the applicability requirements
    of these specialization attributes, given that they are part of the EMP table
    structure. They are the counterparts of database constraints PSPEC1 and PSPEC2
    found in the example database design.


    **Not Yet Applicable**


    Not yet applicable data values also arise from failing to design specializations.
    As we mentioned in Chapter 7, the example database design holds two rather tricky
    hacks. The


