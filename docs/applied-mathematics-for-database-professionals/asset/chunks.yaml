- fmt: 'For maintaining this constraint, you only need to develop an after `INSERT`
    statement trigger on the `HIST` table structure. `Listing 11-41` lists this trigger.
    Note how the formal specification is again translated fairly easily into a constraint
    validation query. The following code assumes the availability of a transition
    effect view and also assumes the availability of function `f_get_start_scn` to
    retrieve the previously stored system change number.


    ## Listing 11-41: EM6 Implemention of DI Code for STC5 (Without Serialization)


    ```

    create or replace trigger HIST_AIS_STC5


    after insert on HIST


    declare pl_dummy varchar(40);


    begin


    -- Inserting a history record, requires validation of STC5.


    for r in (select empno,until


    from v_hist_ite i)


    loop


    begin


    --


    select ''Constraint STC5 is satisfied'' into pl_dummy


    from DUAL


    where exists (select ''The history record is OK''


    from HIST h


    where h.EMPNO = r.empno


    and h.UNTIL = r.until


    and h.UNTIL = sysdate


    and exists(select ''A corresponding update on EMP''


    from EMP as of scn f_get_tx_start_scn e1


    ,EMP e2


    where e1.EMPNO = h.EMPNO


    and e1.MSAL = h.MSAL


    and e1.DEPTNO = h.DEPTNO


    and e2.EMPNO = h.EMPNO


    and (e2.MSAL<>e1.MSAL or e2.DEPTNO<>e1.DEPTNO))); exception when no_data_found
    then


    --


    raise_application_error(-20999,''Constraint STC5 is violated ''||


    ''for history record ''||to_char(r.empno)||''/''||


    to_char(r.until)||''.'');


    --


    end;


    end loop;


    --


    end;

    ```


    Devising a serialization strategy for `DI` code of transition constraints is not
    trivial. For instance, consider the following scenario (in Table 11-5) of two
    concurrently executing transactions: `TX5` and `TX6`.


    ## Table 11-5: Serialization of TX5 and TX6


    | Time | TX5 | TX6 | Comment |

    |------|-----|-----|---------|

    | t=0 | `DML1`; | | `TX5` starts; `DML1` does not involve the `EMP` table structure.
    |

    | t=1 | | `UPDATE` | `TX6` starts; it updates the salary of employee 1042. |

    | t=2 | | `INSERT` | `TX6` inserts corresponding history record; `STC5` `DI` code
    fires. |

    | t=3 | | `COMMIT` | `TX6` ends. |

    | t=4 | `INSERT` | | `TX5` inserts similar history record for 1042, `STC5` `DI`
    code fires. |


    Given Oracle’s `read-committed` isolation level, when the `DI` code for constraint
    `STC5` fires at `t=4`, it sees the change in salary for employee 1042 established
    by transaction `TX6`. The old snapshot from `t=0` did not have this change. The
    new snapshot (that is, the current one at `t=4`) does have this change because
    `TX6` has already committed at `t=4`. `STC5`’s `DI` code could therefore approve
    the history record insert performed by `TX5` (given, of course, that it correctly
    reflects the salary update). Adding serialization lock calls won’t help in this
    case; any locks acquired by the `DI` code running in `TX6` will already have been
    released at `t=4`.


    Obviously, the reason why the current setup of `STC5`’s `DI` code doesn’t work
    correctly is because it wrongly deduces that the change it sees with respect to
    the `EMP` table structure is due to prior `DML` statements in the *same* transaction.


    We’ve given you this example to show that implementing `DI` code for (at least
    some) state transition constraints is by far not trivial and definitely requires
    further investigation.


    ### ■Note


    At the time of the writing of this book we have not yet fully investigated the
    issues with respect to correctly serializing state transition `DI` code. In this
    case, a possible fix could be to have the constraint validation query (the flashback
    query) run in Oracle’s `serializable` isolation level. Queries that run in this
    mode won’t see changes made by other transactions that were committed after the
    current transaction began; you only see the changes that the current transaction
    made. Unfortunately you cannot change the isolation mode of a single query; you
    would have to resort to running the whole transaction in Oracle’s `serializable`
    mode.


    In the next section you’ll find an exploration of another issue that we have ignored
    up to now.'
