  trans: '# 第九章 ■ 数据检索


    ## SEII

    `select d.* from DEPT d`


    这个查询很直接。它从给定的数据库状态`dbs(DEPT)`中检索部门表。另一种形式化表示方法（FEb）稍微不那么简洁。在 SEII 中，星号（`*`）符号被用作表示部门表所有属性的简写。SEII
    实际上列出了所有属性（顺序是任意的）。


    ## 代码清单 9-2. 查询 EXQ2(dbs)

    此清单给出了月薪超过 4800，或工资级别大于等于 6 的员工的工作。


    ### FEa:

    ```

    { e(JOB) | e∈dbs(EMP) ∧ (e(MSAL) > 4800 ∨ e(SGRADE) ≥ 6) }

    ```


    ### FEb:

    ```

    { e↓{JOB} | e∈dbs(EMP) ∧ (e(MSAL) > 4800 ∨ e(SGRADE) ≥ 6) }

    ```


    ### FEc:

    ```

    { e↓(JOB) | e∈dbs(EMP) ∧ (e(MSAL) ≤ 4800 ⇒ e(SGRADE) ≥ 6) }

    ```


    ### FEd:

    ```

    { e↓(JOB) | e∈dbs(EMP) ∧ (e(SGRADE) < 6 ⇒ e(MSAL) > 4800) }

    ```


    ### FEe:

    ```

    { e↓(JOB) | e∈dbs(EMP) ∧ ¬(e(MSAL) ≤ 4800 ∧ e(SGRADE) < 6) }

    ```


    ### FEf:

    ```

    { e↓(JOB) | e∈dbs(EMP) ∧ e(MSAL) > 4800 }

    ∪

    { e↓(JOB) | e∈dbs(EMP) ∧ e(SGRADE) ≥ 6 }

    ```


    ### SEI:

    ```

    select distinct e.JOB from EMP e where e.MSAL > 4800 or e.SGRADE >= 6

    ```


    ### SEII:

    ```

    select distinct e.JOB from EMP e where not (e.MSAL <= 4800 and e.SGRADE < 6)

    ```


    ### SEIII:

    ```

    select e.JOB from EMP e where e.MSAL > 4800

    union

    select e.JOB from EMP e where e.SGRADE >= 6

    ```


    你注意到 FEa 和 FEb 之间的细微差别了吗？前者产生的是一个工作值的集合（即这不是一张表）；后者产生的是一个元组集合（即一个在`{JOB}`上的表），因此是形式化指定`EXQ2`的首选方式。


    备选方案 FEc、FEd 和 FEe 是 FEb 的变体，其中析取被重写为蕴涵或合取。备选方案 FEf 使用并集运算符；收入超过 4800 的员工的工作与工资级别大于等于
    6 的员工的工作进行并集。


    **■注意** 这个查询的形式化指定方式意味着我们只检索*不同的*工作值。假设表`dbs(EMP)`当前有二十名员工，其中十名符合谓词“月薪大于 4800
    或工资级别等于 6 或更高”。如果这十名员工中有八名的工作是`TRAINER`，另外两名的工作是`MANAGER`，那么 FEa 的结果将是`{''TRAINER'',''MANAGER''}`：一个只有两个，而不是十个元素的集合。


    FEa 和 FEb 演示的细微差别无法用 SQL 表达。规范 SEI 是这两者的 SQL 变体。另请注意，在 SQL 中，必须添加`distinct`关键字以确保查询结果中不出现重复的工作值。


    备选方案 FEc 和 FEd 不能直接转换为 SQL，因为 SQL 缺乏蕴涵运算符；在 SQL 中只有析取、合取和否定可用。


    规范 SEII 是 FEe 的 SQL 版本，SEIII 代表 FEf 的 SQL 版本。


    请注意，在后一种情况下，使用`distinct`关键字不是必需的；当使用集合运算符（`union`、`minus`或`intersect`）时，SQL 总是返回不同的值。


    ## 代码清单 9-3. 查询 EXQ3(dbs)

    此清单给出了办事员的编号、姓名和工资，包括他们所属工资级别的下限和上限。


    ### FEa:

    ```

    { e↓{EMPNO,ENAME,MSAL,LLIMIT,ULIMIT} | e∈dbs(EMP)⊗

    (dbs(GRD)◊◊{(SGRADE;GRADE),(LLIMIT;LLIMIT),(ULIMIT;ULIMIT)}) ∧

    e(JOB)=''CLERK'' }

    ```


    ### SEI:

    ```

    select e.EMPNO, e.ENAME, e.MSAL, g.LLIMIT, g.ULIMIT

    from EMP e, GRD g

    where e.SGRADE = g.GRADE

    and e.JOB = ''CLERK''

    ```


    这个查询由员工表和工资级别表之间的连接表示。为了能够使用连接运算符，你必须重命名员工表中的属性`SGRADE`或工资级别表中的属性`GRADE`。规范 FEa
    执行了后者重命名。你可以直接从 FEa 推导出 SQL 表达式 SEI。


    现在你可能在想 SQL 表达式看起来比形式化表达式容易得多，对吧？这是因为这个例子太简单了。当我们看到更复杂的例子时，你会看到这种情况不再适用；那时 SQL
    表达式将变得比数学表达式更复杂。


    ## 代码清单 9-4. 查询 EXQ4(dbs)

    此清单给出了在两个不同地点恰好管理两个部门的员工（`EMPNO`和`ENAME`）。


    ### FEa:

    ```

    { e↓{EMPNO,ENAME} | e∈dbs(EMP) ∧

    #{ d(LOC) | d∈dbs(DEPT) ∧ d(MGR)=e(EMPNO) } = 2 }

    ```


    ### FEb:

    ```

    { e↓{EMPNO,ENAME} | e∈dbs(EMP) ∧

    (∃d1,d2∈dbs(DEPT): d1(MGR)=e(EMPNO) ∧

    d2(MGR)=e(EMPNO) ∧

    d1(LOC)≠d2(LOC)) }

    ```


    ### FEc:

    ```

    { e↓{EMPNO,ENAME} | e∈(dbs(EMP)⇓{EMPNO,ENAME})⊗

    (dbs(DEPT)◊◊{(EMPNO;MGR),(LOC1;LOC)})⊗

    (dbs(DEPT)◊◊{(EMPNO;MGR),(LOC2;LOC)}) ∧

    e(LOC1)≠e(LOC2) }

    ```


    ### SEI:

    ```

    select e.EMPNO, e.ENAME

    from EMP e

    where 2 = (select count(distinct d.LOC)

    from DEPT d

    where d.MGR = e.EMPNO)

    ```


    ### SEII:

    ```

    select e.EMPNO, e.ENAME

    from EMP e

    where exists(select d1.*

    from DEPT d1

    where d1.MGR = e.EMPNO

    and exists(select d2.*

    from DEPT d2

    where d2.MGR = e.EMPNO

    and d1.LOC <> d2.LOC))

    ```


    ### SEIII:

    ```

    select e.EMPNO, e.ENAME

    from EMP e

    where exists(select *

    from DEPT d1, DEPT d2

    where d1.MGR = e.EMPNO

    and d2.MGR = e.EMPNO

    and d1.LOC <> d2.LOC)

    ```


    ### SEIV:

    ```

    select distinct e.EMPNO, e.ENAME

    from EMP e, DEPT d1, DEPT d2

    where e.EMPNO = d1.MGR

    and e.EMPNO = d2.MGR

    and d1.LOC <> d2.LOC

    ```


    规范 FEa 指出，由该员工管理的部门地点集合的基数必须为 2。备选方案 FEb 通过对两个由该员工管理的不同地点的部门进行存在性量化来实现这一要求。


    **■注意** 在 FEb 中，使用了对同一集合的两个嵌套存在性量词的简写表示法。


    你可以直接将这两种形式化规范翻译成 SQL。注意，在 SEI 中，必须在`count`聚合函数内使用`distinct`关键字。规范 SEII 用于演示 SQL
    中可用的存在性量词——`exists(...)`表达式的嵌套使用。SEIII 是一个简写版本，类似于形式化规范 FEb 中使用的简写。


    规范 FEc 使用连接来定位由该员工管理的两个不同地点的部门。注意，在其 SQL 版本（SEIV）中，必须使用`distinct`关键字，以防止管理两个不同地点部门的员工在结果集中出现两次。


    ## 代码清单 9-5. 查询 EXQ5(dbs)

    此清单给出了所有收入超过其上司工资 90%的被管理员工的编号和姓名。


    ### FEa:

    ```

    { e1↓{EMPNO,ENAME} | e1∈dbs(EMP) ∧ m∈dbs(MEMP) ∧ e2∈dbs(EMP) ∧

    e1(EMPNO) = m(EMPNO) ∧ m(MGR) = e2(EMPNO) ∧

    e1(MSAL) > 0.9*e2(MSAL) }

    ```


    ### FEb:

    ```

    { e↓{EMPNO,ENAME} | e∈(dbs(EMP)⊗dbs(MEMP))⊗

    (dbs(EMP)◊◊{ (MGR;EMPNO), (MGR_MSAL;MSAL) }) ∧

    e(MSAL) > 0.9*e(MGR_MSAL) }

    ```


    ### FEc:

    ```

    { e1↓{EMPNO,ENAME} | e1∈dbs(EMP) ∧

    (∃m∈dbs(MEMP): m(EMPNO)=e1(EMPNO) ∧

    (∃e2∈dbs(EMP): e2(EMPNO)=m(MGR) ∧

    e1(MSAL) > 0.9*e2(MSAL) )) }

    ```


    ### SEI:

    ```

    select e1.EMPNO, e1.ENAME

    from EMP e1, MEMP m, EMP e2

    where e1.EMPNO = m.EMPNO

    and m.MGR = e2.EMPNO

    and e1.MSAL > 0.9 * e2.MSAL

    ```


    ### SEII:

    ```

    select e1.EMPNO, e1.ENAME

    from EMP e1

    where exists (select m.*

    from MEMP m

    where m.EMPNO = e1.EMPNO

    and exists (select e2.*

    from EMP e2

    where e2.EMPNO = m.MGR

    and e1.MSAL > 0.9 * e2.MSAL))

    ```'
- fmt: "通过结合每个 EMP 元组与对应的 MEMP 元组（通过特化 `PSPEC2`），然后将 MEMP 元组合并回 EMP 元组（通过子集要求 `PSSR3`），您可以将受管理员工的月薪与其经理的月薪进行比较。规范\
    \ `FEa` 通过绑定两个用于 `EMP` 的元组变量（一个用于员工，一个用于经理）和一个用于 `MEMP` 的元组变量，然后对这些变量施加组合限制来实现这一点。规范\
    \ `FEb` 通过绑定一个从执行组合的嵌套连接中提取值的单一元组变量来实现这一点。第一个连接将 `EMP` 与 `MEMP` 的元组合并（以找到经理的员工编号）。第二个连接将\
    \ `MEMP` 的元组合并回 `EMP`（以找到经理的薪资）并要求属性重命名。\n\n规范 `SEI` 代表了 `FEa` 和 `FEb` 的 SQL 版本。\n\
    \n规范 `FEc` 采用嵌套存在量化来实现相同的结果。\n\n您可以利用 SQL 中对存在量化的支持，将其直接翻译为 SQL（参见 `SEII`）。\n\n\
    代码清单 9-6 给出了所有课程的代码、描述和类别，这些课程的每个预定授课单元的最大容量都少于十名学生。\n\n**代码清单 9-6.** 查询 `EXQ6(dbs)`\n\
    \n`FEa`:\n\n```\n{ c↓{CODE,DESCR,CAT} | c∈dbs(CRS) ∧\n\n(∀o∈dbs(OFFR): (o(COURSE)\
    \ = c(CODE) ∧\n\no(STATUS) = 'SCHD') ⇒\n\no(MAXCAP) < 10 ) }\n```\n\n`FEb`:\n\n\
    ```\n{ c↓{CODE,DESCR,CAT} | c∈dbs(CRS) ∧\n\n¬(∃o∈dbs(OFFR): o(COURSE) = c(CODE)\
    \ ∧\n\no(STATUS) = 'SCHD' ∧\n\no(MAXCAP) ≥ 10 ) }\n```\n\n`FEc`:\n\n```\n{ c↓{CODE,DESCR,CAT}\
    \ | c∈dbs(CRS) ∧\n\nc(CODE) ∉ { o(COURSE) | o∈dbs(OFFR) ∧\n\no(STATUS) = 'SCHD'\
    \ ∧\n\no(MAXCAP) ≥ 10 ) } }\n```\n\n`FEd`:\n\n```\n{ c↓{CODE,DESCR,CAT} | c∈dbs(CRS)\
    \ ∧\n\n#{ o1 | o1∈dbs(OFFR) ∧ o1(COURSE) = c(CODE) ∧\n\no1(STATUS) = 'SCHD' }\n\
    \n=\n\n#{ o2 | o2∈dbs(OFFR) ∧ o2(COURSE) = c(CODE) ∧\n\no2(STATUS) = 'SCHD' ∧\n\
    \no2(MAXCAP) < 10 ) } }\n```\n\n`SEI`:\n\n```sql\nselect c.CODE, c.DESC, c.CAT\n\
    from CRS c\nwhere not exists (select o.*\n                  from OFFR o\n    \
    \              where o.COURSE = c.CODE\n                  and o.STATUS = 'SCHD'\n\
    \                  and o.MAXCAP >= 10)\n```\n\n`SEII`:\n\n```sql\nselect c.CODE,\
    \ c.DESC, c.CAT\nfrom CRS c\nwhere c.CODE not in (select o.COURSE\n          \
    \           from OFFR o\n                     where o.STATUS = 'SCHD'\n      \
    \               and o.MAXCAP >= 10)\n```\n\n`SEIII`:\n\n```sql\nselect c.CODE,\
    \ c.DESC, c.CAT\nfrom CRS c\nwhere (select count(*)\n       from OFFR o1\n   \
    \    where o1.COURSE = c.CODE\n       and o1.STATUS = 'SCHD')\n      =\n     \
    \ (select count(*)\n       from OFFR o2\n       where o2.COURSE = c.CODE\n   \
    \    and o2.STATUS = 'SCHD'\n       and o2.MAXCAP < 10)\n```\n\n规范 `FEa` 紧密遵循了查询的非正式描述。`FEb`\
    \ 是 `FEa` 的一个重写版本；全称量词被重写为存在量词。非正式地讲，它查询所有不存在最大容量为十或更多的预定授课单元的课程。因为将谓词重写为等价谓词的能力极其重要，我们将在此案例中再次演示其执行过程：\n\
    \n`(∀o∈dbs(OFFR): (o(COURSE)=c(CODE) ∧ o(STATUS)='SCHD') ⇒ o(MAXCAP)<10 )`\n\n\
    ```\n⇔ /* Add double negation */\n¬¬(∀o∈dbs(OFFR): (o(COURSE)=c(CODE) ∧ o(STATUS)\
    \ = 'SCHD') ⇒ o(MAXCAP)<10 )\n⇔ /* Bring one negation into the quantification,\
    \ quantifier changes */\n¬(∃o∈dbs(OFFR): ¬((o(COURSE)=c(CODE) ∧ o(STATUS)='SCHD')\
    \ ⇒ o(MAXCAP)<10 ))\n⇔ /* Transform implication into disjunction */\n¬(∃o∈dbs(OFFR):\
    \ ¬(¬(o(COURSE)=c(CODE) ∧ o(STATUS)='SCHD') ∨ o(MAXCAP)<10 ))\n⇔ /* Apply De Morgan,\
    \ disjunction changes into conjuction */\n¬(∃o∈dbs(OFFR): ¬¬(o(COURSE)=c(CODE)\
    \ ∧ o(STATUS)='SCHD') ∧ ¬o(MAXCAP)<10 )\n⇔ /* Get rid of negations */\n¬(∃o∈dbs(OFFR):\
    \ o(COURSE)=c(CODE) ∧ o(STATUS)='SCHD' ∧ o(MAXCAP)≥10 )\n```\n\n您经常会需要将全称量化重写为存在量化，原因很快就会明了。"
  raw: 'By combining every EMP tuple with the corresponding MEMP tuple (via specialization
    PSPEC2), and then combining the MEMP tuple back to an EMP tuple (via subset requirement
    PSSR3), you are able to compare the monthly salary of a managed employee with
    the monthly salary of his or her manager. Specification FEa achieves this by binding
    two tuple variables for EMP (one for the employee and one for the manager) and
    a tuple variable for MEMP, and then imposing the combination restrictions on those.
    Specification FEb does this by binding a single tuple variable that draws its
    values from a nested join that performs the combination. The first join combines
    tuples from EMP with MEMP (to find the employee number of the manager). The second
    join combines tuples from MEMP back to EMP (to find the salary of the manager)
    and requires attribute renaming.


    Specification SEI represents an SQL version for FEa and FEb.


    Specification FEc employs a nested existential quantification to achieve the same
    result.


    You can translate it directly into SQL (see SEII) using the support for existential
    quantification in SQL.


    Listing 9-6 gives the code, description, and category for all courses for which
    every scheduled offering has a maximum capacity of fewer than ten students.


    **Listing 9-6.** *Query EXQ6(dbs)*


    **FEa**:


    { c↓{CODE,DESCR,CAT} | c∈dbs(CRS) ∧


    (∀o∈dbs(OFFR): (o(COURSE) = c(CODE) ∧


    o(STATUS) = ''SCHD'') ⇒


    o(MAXCAP) < 10 ) }


    **FEb**:


    { c↓{CODE,DESCR,CAT} | c∈dbs(CRS) ∧


    ¬(∃o∈dbs(OFFR): o(COURSE) = c(CODE) ∧


    o(STATUS) = ''SCHD'' ∧


    o(MAXCAP) ≥ 10 ) }


    **FEc**:


    { c↓{CODE,DESCR,CAT} | c∈dbs(CRS) ∧


    c(CODE) ∉ { o(COURSE) | o∈dbs(OFFR) ∧


    o(STATUS) = ''SCHD'' ∧


    o(MAXCAP) ≥ 10 ) } }


    7451CH09.qxd 5/7/07 11:28 AM Page 206


    **206**


    C H A P T E R 9 **■** D ATA R E T R I E VA L


    **FEd**:


    { c↓{CODE,DESCR,CAT} | c∈dbs(CRS) ∧


    #{ o1 | o1∈dbs(OFFR) ∧ o1(COURSE) = c(CODE) ∧


    o1(STATUS) = ''SCHD'' }


    =


    #{ o2 | o2∈dbs(OFFR) ∧ o2(COURSE) = c(CODE) ∧


    o2(STATUS) = ''SCHD'' ∧


    o2(MAXCAP) < 10 ) } }


    **SEI**:


    select c.CODE, c.DESC, c.CAT


    from CRS c


    where not exists (select o.*


    from OFFR o


    where o.COURSE = c.CODE


    and o.STATUS = ''SCHD''


    and o.MAXCAP >= 10)


    **SEII**:


    select c.CODE, c.DESC, c.CAT


    from CRS c


    where c.CODE not in (select o.COURSE


    from OFFR o


    where o.STATUS = ''SCHD''


    and o.MAXCAP >= 10)


    **SEIII**: select c.CODE, c.DESC, c.CAT


    from CRS c


    where (select count(*)


    from OFFR o1


    where o1.COURSE = c.CODE


    and o1.STATUS = ''SCHD'')


    =


    (select count(*)


    from OFFR o2


    where o2.COURSE = c.CODE


    and o2.STATUS = ''SCHD''


    and o2.MAXCAP < 10)


    Specification FEa closely follows the informal description for the query. FEb
    is a rewritten version of FEa; the universal quantifier is rewritten into an existential
    quantifier. Informally it queries all courses for which there do not exist a scheduled
    offering with a maximum capacity of ten or more. Because the ability to rewrite
    predicates into equivalent predicates is extremely important, we’ll demonstrate
    once more how this is performed in this case: (∀o∈dbs(OFFR): (o(COURSE)=c(CODE)
    ∧ o(STATUS)=''SCHD'') ⇒ o(MAXCAP)<10 )


    ⇔ **/* Add double negation */**


    ¬¬(∀o∈dbs(OFFR): (o(COURSE)=c(CODE) ∧ o(STATUS) = ''SCHD'') ⇒ o(MAXCAP)<10 )


    ⇔ **/* Bring one negation into the quantification, quantifier changes */**


    ¬(∃o∈dbs(OFFR): ¬((o(COURSE)=c(CODE) ∧ o(STATUS)=''SCHD'') ⇒ o(MAXCAP)<10 ))


    ⇔ **/* Transform implication into disjunction */**


    ¬(∃o∈dbs(OFFR): ¬(¬(o(COURSE)=c(CODE) ∧ o(STATUS)=''SCHD'') ∨ o(MAXCAP)<10 ))


    ⇔ **/* Apply De Morgan, disjunction changes into conjuction */**


    7451CH09.qxd 5/7/07 11:28 AM Page 207


    C H A P T E R 9 **■** D ATA R E T R I E VA L


    **207**


    ¬(∃o∈dbs(OFFR): ¬¬(o(COURSE)=c(CODE) ∧ o(STATUS)=''SCHD'') ∧ ¬o(MAXCAP)<10 )


    ⇔ **/* Get rid of negations */**


    ¬(∃o∈dbs(OFFR): o(COURSE)=c(CODE) ∧ o(STATUS)=''SCHD'' ∧ o(MAXCAP)≥10 ) You’ll
    often have to rewrite a universal quantification into an existential quantification
    for reasons that will soon become clear.'
  trans: "\n通过结合每个 EMP 元组与对应的 MEMP 元组（通过特化 `PSPEC2`），然后将 MEMP 元组合并回 EMP 元组（通过子集要求\
    \ `PSSR3`），您可以将受管理员工的月薪与其经理的月薪进行比较。规范 `FEa` 通过绑定两个用于 `EMP` 的元组变量（一个用于员工，一个用于经理）和一个用于\
    \ `MEMP` 的元组变量，然后对这些变量施加组合限制来实现这一点。规范 `FEb` 通过绑定一个从执行组合的嵌套连接中提取值的单一元组变量来实现这一点。第一个连接将\
    \ `EMP` 与 `MEMP` 的元组合并（以找到经理的员工编号）。第二个连接将 `MEMP` 的元组合并回 `EMP`（以找到经理的薪资）并要求属性重命名。\n\
    \n规范 `SEI` 代表了 `FEa` 和 `FEb` 的 SQL 版本。\n\n规范 `FEc` 采用嵌套存在量化来实现相同的结果。\n\n您可以利用\
    \ SQL 中对存在量化的支持，将其直接翻译为 SQL（参见 `SEII`）。\n\n代码清单 9-6 给出了所有课程的代码、描述和类别，这些课程的每个预定授课单元的最大容量都少于十名学生。\n\
    \n**代码清单 9-6.** 查询 `EXQ6(dbs)`\n\n`FEa`:\n\n```\n{ c↓{CODE,DESCR,CAT} | c∈dbs(CRS)\
    \ ∧\n\n(∀o∈dbs(OFFR): (o(COURSE) = c(CODE) ∧\n\no(STATUS) = 'SCHD') ⇒\n\no(MAXCAP)\
    \ < 10 ) }\n```\n\n`FEb`:\n\n```\n{ c↓{CODE,DESCR,CAT} | c∈dbs(CRS) ∧\n\n¬(∃o∈dbs(OFFR):\
    \ o(COURSE) = c(CODE) ∧\n\no(STATUS) = 'SCHD' ∧\n\no(MAXCAP) ≥ 10 ) }\n```\n\n\
    `FEc`:\n\n```\n{ c↓{CODE,DESCR,CAT} | c∈dbs(CRS) ∧\n\nc(CODE) ∉ { o(COURSE) |\
    \ o∈dbs(OFFR) ∧\n\no(STATUS) = 'SCHD' ∧\n\no(MAXCAP) ≥ 10 ) } }\n```\n\n`FEd`:\n\
    \n```\n{ c↓{CODE,DESCR,CAT} | c∈dbs(CRS) ∧\n\n#{ o1 | o1∈dbs(OFFR) ∧ o1(COURSE)\
    \ = c(CODE) ∧\n\no1(STATUS) = 'SCHD' }\n\n=\n\n#{ o2 | o2∈dbs(OFFR) ∧ o2(COURSE)\
    \ = c(CODE) ∧\n\no2(STATUS) = 'SCHD' ∧\n\no2(MAXCAP) < 10 ) } }\n```\n\n`SEI`:\n\
    \n```sql\nselect c.CODE, c.DESC, c.CAT\nfrom CRS c\nwhere not exists (select o.*\n\
    \                  from OFFR o\n                  where o.COURSE = c.CODE\n  \
    \                and o.STATUS = 'SCHD'\n                  and o.MAXCAP >= 10)\n\
    ```\n\n`SEII`:\n\n```sql\nselect c.CODE, c.DESC, c.CAT\nfrom CRS c\nwhere c.CODE\
    \ not in (select o.COURSE\n                     from OFFR o\n                \
    \     where o.STATUS = 'SCHD'\n                     and o.MAXCAP >= 10)\n```\n\
    \n`SEIII`:\n\n```sql\nselect c.CODE, c.DESC, c.CAT\nfrom CRS c\nwhere (select\
    \ count(*)\n       from OFFR o1\n       where o1.COURSE = c.CODE\n       and o1.STATUS\
    \ = 'SCHD')\n      =\n      (select count(*)\n       from OFFR o2\n       where\
    \ o2.COURSE = c.CODE\n       and o2.STATUS = 'SCHD'\n       and o2.MAXCAP < 10)\n\
    ```\n\n规范 `FEa` 紧密遵循了查询的非正式描述。`FEb` 是 `FEa` 的一个重写版本；全称量词被重写为存在量词。非正式地讲，它查询所有不存在最大容量为十或更多的预定授课单元的课程。因为将谓词重写为等价谓词的能力极其重要，我们将在此案例中再次演示其执行过程：\n\
    \n`(∀o∈dbs(OFFR): (o(COURSE)=c(CODE) ∧ o(STATUS)='SCHD') ⇒ o(MAXCAP)<10 )`\n\n\
    ```\n⇔ /* Add double negation */\n¬¬(∀o∈dbs(OFFR): (o(COURSE)=c(CODE) ∧ o(STATUS)\
    \ = 'SCHD') ⇒ o(MAXCAP)<10 )\n⇔ /* Bring one negation into the quantification,\
    \ quantifier changes */\n¬(∃o∈dbs(OFFR): ¬((o(COURSE)=c(CODE) ∧ o(STATUS)='SCHD')\
    \ ⇒ o(MAXCAP)<10 ))\n⇔ /* Transform implication into disjunction */\n¬(∃o∈dbs(OFFR):\
    \ ¬(¬(o(COURSE)=c(CODE) ∧ o(STATUS)='SCHD') ∨ o(MAXCAP)<10 ))\n⇔ /* Apply De Morgan,\
    \ disjunction changes into conjuction */\n¬(∃o∈dbs(OFFR): ¬¬(o(COURSE)=c(CODE)\
    \ ∧ o(STATUS)='SCHD') ∧ ¬o(MAXCAP)<10 )\n⇔ /* Get rid of negations */\n¬(∃o∈dbs(OFFR):\
    \ o(COURSE)=c(CODE) ∧ o(STATUS)='SCHD' ∧ o(MAXCAP)≥10 )\n```\n\n您经常会需要将全称量化重写为存在量化，原因很快就会明了。\n"
- fmt: "Specification `FEc` is a variation of `FEb`; the “not exists” is now expressed\
    \ as a “not an element of” some set. `FEd` might seem somewhat far-fetched; only\
    \ those courses are included in the query result, for which the number of scheduled\
    \ course offerings equals the number of scheduled course offerings that have a\
    \ maximum capacity of fewer than ten students. By imposing this restriction, you\
    \ end up precisely with those courses for which every scheduled offering has a\
    \ maximum capacity of fewer than ten students.\n\nSQL lacks the possibility to\
    \ express universal quantification directly.\n\n## ■Note\n\nRemember we are using\
    \ `Oracle's version of SQL` in this book. The SQL standard offers a language construct\
    \ called `<quantified comparison predicate>` that can be used to specify universal\
    \ quantification in SQL. However, Oracle’s SQL DBMS doesn’t support this language\
    \ construct.\n\nFor this reason, you cannot directly translate `FEa` into SQL;\
    \ you must rewrite the universal quantification into an existential quantification\
    \ (which SQL does support). Once you have done this (which is what alternative\
    \ `FEb` is all about), you can straightforwardly compose the equivalent SQL expression\
    \ for the query; see `SEI`. Alternative `SEII` closely follows `FEb` too, but\
    \ instead of the “not exists,” it employs the “not in” operator available within\
    \ SQL.\n\nAlternative `SEIII` is the SQL version of `FEc`; this way of query formulation\
    \ can be considered a trick to mimic a universal quantification within SQL.\n\n\
    What is your opinion on courses that currently do *not* have any scheduled offering\
    \ at all? Should they appear in the result set of query `EXQ6`, or not?\n\n##\
    \ ■Note\n\nRemember the truth value of a universal quantification over the empty\
    \ set? Such a quantification is always true, regardless of the predicate that\
    \ is being quantified.\n\nCourses with no scheduled offerings will appear in the\
    \ result set of this query. Whenever you encounter a universal quantification—or\
    \ a negated existential quantification—you should be aware of this consequence\
    \ (warning bells should ring). Moreover, whenever the set that is quantified over\
    \ can possibly be the empty set, you should double check with your customer (the\
    \ end user) whether he or she is aware of this “side effect” and requires this\
    \ behavior of the query.\n\nIf courses with no scheduled offerings at all should\
    \ not appear in the result set of this query, then here is how you could change\
    \ `FEa` to reflect this:\n\n7451CH09.qxd 5/7/07 11:28 AM Page 208\n\n**208**\n\
    \nC H A P T E R 9 **■** D ATA R E T R I E VA L\n\n```\n{ c↓{CODE,DESCR,CAT} |\
    \ c∈dbs(CRS) ∧\n(∃o∈dbs(OFFR): o(COURSE) = c(CODE) ∧\no(STATUS) = 'SCHD') ∧\n\
    (∀o∈dbs(OFFR): (o(COURSE) = c(CODE) ∧\no(STATUS) = 'SCHD') ⇒\no(MAXCAP) < 10 )\
    \ }\n```\n\nAdding the existential quantification now ensures that courses with\
    \ no scheduled offerings won’t appear in the result set.\n\nIn the next example,\
    \ you’ll see the use of an `NVL` function and the outer join syntax `(+)`. Both\
    \ constructs are available with the Oracle SQL DBMS. We’ll explain their meaning\
    \ directly after Listing 9-7.\n\nListing 9-7 gives for each department the department\
