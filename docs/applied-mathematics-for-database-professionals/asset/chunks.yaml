- fmt: '# Logic Identities and Properties


    Just as the numeric value `1` is the identity under regular multiplication (a
    multiplication of any given number by `1` will result in that given number), and
    `0` is the identity under regular addition (`0` added to any number results in
    that number), you also have similar identities in logic, which are shown in `Listing
    3-2`.


    `Listing 3-2. Identities`

    ```

    P ∧ TRUE ⇔ P

    P ∨ FALSE ⇔ P

    P ∧ FALSE ⇔ FALSE

    P ∨ TRUE ⇔ TRUE

    ```


    The first expression states that `TRUE` is the identity with respect to AND. The
    second states that `FALSE` is the identity with respect to OR. The last two expressions
    are also known as the two *boundedness* identities; they state that anything ANDed
    with `FALSE` is `FALSE` and anything ORed with `TRUE` is `TRUE`.


    ## Commutativity


    An operator (or a connective) is *commutative* if and only if it is dyadic and
    its left and right operands can be interchanged without affecting the result.
    `Listing 3-3` shows the commutative properties of some logic operators.


    `Listing 3-3. Commutative Properties`

    ```

    ( P ∧ Q ) ⇔ ( Q ∧ P )

    ( P ∨ Q ) ⇔ ( Q ∨ P )

    ( P ⇔ Q ) ⇔ ( Q ⇔ P )

    ```


    Conjunction, disjunction, and equivalence are commutative connectives.


    ## Associativity


    If you want to repeat the same dyadic operator on a series of operands and it
    doesn’t matter in which order you process the occurrences of the operator, the
    operator is *associative*. Note the parentheses in the propositional forms shown
    in `Listing 3-4`.


    `Listing 3-4. Associative Properties`

    ```

    ( ( P ∧ Q ) ∧ R ) ⇔ ( P ∧ ( Q ∧ R ) )

    ( ( P ∨ Q ) ∨ R ) ⇔ ( P ∨ ( Q ∨ R ) )

    ```


    Conjunction and disjunction are associative. Associativity is the reason why you
    often see that parentheses are left out in expressions with iterated conjunctions
    or disjunctions that involve more than two operands.


    ## Distributivity


    Just like commutativity and associativity, you probably remember *distributivity*
    from regular arithmetic, typically expressed as a formula like the following,
    which was shown at the beginning of this section:

    ```

    a*(b+c) = (a*b) + (a*c)

    ```

    This algebraic property shows a certain relationship between addition and multiplication;
    in regular arithmetic, multiplication distributes over addition. In logic, something
    similar holds for the relationship between conjunction and disjunction, as shown
    in `Listing 3-5`.


    `Listing 3-5. Distributive Properties`

    ```

    ( P ∨ ( Q ∧ R ) ) ⇔ ( ( P ∨ Q ) ∧ ( P ∨ R ) )

    ( P ∧ ( Q ∨ R ) ) ⇔ ( ( P ∧ Q ) ∨ ( P ∧ R ) )

    ```


    As these tautologies demonstrate, conjunction is distributive over disjunction
    and vice versa. Note that in regular arithmetic, addition does *not* distribute
    over multiplication.


    ## Reflexivity


    The regular equality is an example of a *reflexive* operator; `x = x` is `TRUE`
    for any `x` (regardless of the type of `x`). In logic, the implication and equivalence
    connectives are reflexive, because the predicates shown in `Listing 3-6` are always
    `TRUE`.


    `Listing 3-6. Reflexive Properties`

    ```

    P ⇔ P

    P ⇒ P

    ```


    ## Transitivity


    The regular equality is *transitive*, as expressed by the following formula: `((x
    = y) ∧ (y = z)) ⇒ (x = z)`


    Conjunction, implication, and equivalence are transitive in logic, as shown in
    `Listing 3-7`.


    `Listing 3-7. Transitive Properties`

    ```

    ( ( P ∧ Q ) ∧ ( Q ∧ R ) ) ⇒ ( P ∧ R )

    ( ( P ⇒ Q ) ∧ ( Q ⇒ R ) ) ⇒ ( P ⇒ R )

    ( ( P ⇔ Q ) ∧ ( Q ⇔ R ) ) ⇒ ( P ⇔ R )

    ```


    Note that the disjunction is not transitive: `( P ∨ Q ) ∧ ( Q ∨ R )` does *not*
    imply `P ∨ R`.


    ## De Morgan Laws


    The laws of De Morgan (1806–1871) are quite useful for manipulating expressions
    involving negation, and are shown in `Listing 3-8`.


    `Listing 3-8. De Morgan Laws`

    ```

    ¬( P ∨ Q ) ⇔ ( ¬P ∧ ¬Q )

    ¬( P ∧ Q ) ⇔ ( ¬P ∨ ¬Q )

    ```


    Using plain English, these laws describe that “the negation of a disjunction equals
    the conjunction of the negations (of the operands)” and vice versa “the negation
    of a conjunction equals the disjunction of the negations.”


    ## Idempotence'
