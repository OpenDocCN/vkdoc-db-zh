    \                       and e3.JOB = 'ADMIN'))\n```\n\n在 EM2 中，您将仅为涉及此约束的`EMP`表结构创建三个`after\
    \ statement`触发器。这些触发器包含前面的查询，以验证新的数据库状态是否仍满足此约束。清单 11-29 展示了将这三个触发器合并为一个`create\
    \ trigger`语句。\n\n**清单 11-29.** *约束`EMP_TAB03`的 EM2 DI 代码*\n```sql\ncreate trigger\
    \ EMP_AIUDS_TAB03\nafter insert or update or delete on EMP\ndeclare pl_dummy varchar(40);\n\
    begin\n--\n  select 'Constraint EMP_TAB03 is satisfied' into pl_dummy\n  from\
    \ DUAL\n  where not exists(select d.DEPTNO\n                   from EMP d\n  \
    \                 where exists(select e2.*\n                                from\
    \ EMP e2\n                                where e2.DEPTNO = d.DEPTNO\n       \
    \                         and e2.JOB in ('PRESIDENT','MANAGER'))\n           \
    \        and not exists(select e3.*\n                                  from EMP\
    \ e3\n                                  where e3.DEPTNO = d.DEPTNO\n         \
    \                         and e3.JOB = 'ADMIN'));\n--\nexception when no_data_found\
    \ then\n--\n  raise_application_error(-20999,'Constraint EMP_TAB03 is violated.');\n\
    --\nend;\n```\n\n`■Note` 通过解析约束声明的形式规范，DBMS 可以*计算*出涉及的表。此外，DBMS 可以*计算*需要运行的验证查询，以验证约束是否仍然满足（这只需要应用重写规则，最终得到一个可以转换为\
    \ SQL 表达式的规范）。因此，DBMS 可以生成前面的触发器。换句话说，DBMS 供应商可以*以声明方式*完全支持这种执行模型！\n\n清单 11-30\
    \ 展示了使用此执行模型表示约束`DEPT_TAB01` DI 代码的三个触发器。\n\n**清单 11-30.** *约束`DEPT_TAB01`的 EM2\
    \ DI 代码*\n```sql\ncreate trigger DEPT_AIUDS_TAB01\nafter insert or update or delete\
    \ on DEPT\ndeclare pl_dummy varchar(40);\nbegin\n--\n  select 'Constraint DEPT_TAB01\
    \ is satisfied' into pl_dummy from DUAL\n  where not exists(select m.DEPTNO\n\
    \                   from DEPT m\n                   where 2 < (select count(*)\n\
    \                               from DEPT d\n                               where\
    \ d.MGR = m.MGR));\n--\nexception when no_data_found then\n--\n  raise_application_error(-20999,'Constraint\
    \ DEPT_TAB01 is violated.');\n--\nend;\n/\n```\n\n这种执行模型仍然效率低下。例如，当您更新员工姓名时，此执行模型将验证约束`EMP_TAB03`。显然，因为`ENAME`列完全不涉及在此约束中，更新`ENAME`的`DML`语句绝不应该引发检查约束`EMP_TAB03`的需要。类似的低效也适用于约束`DEPT_TAB01`；例如，当您更新部门位置（而属性`LOC`不涉及在约束`DEPT_TAB01`中）时，EM2\
    \ 将验证此约束。下一个执行模型解决了这种低效问题。\n\n### 执行模型 3：按涉及列\n\n这种执行模型（EM3）在`DML`语句是`INSERT`或`DELETE`的情况下与\
    \ EM2 相同。但是，当发生更新时，您现在还利用了每个约束（按表结构）涉及哪些属性的知识。对于给定的约束，只有当涉及的属性被`UPDATE`语句修改时，才需要验证此约束。`INSERT`和`DELETE`语句总是涉及所有属性，因此无论约束涉及哪些属性，每当它们发生时，都会引发需要验证涉及表结构的约束。\n\
    \n让我们再次使用示例表约束`EMP_TAB03`来演示。在这种情况下，插入和删除触发器与 EM2 中的保持相同。您只需更改更新触发器以提高效率。仅通过扫描约束`EMP_TAB03`的形式规范，您就可以发现涉及的属性；对于此约束，它们是`DEPTNO`和`JOB`。\n\
    \n每当发生`UPDATE`语句时，您现在仅当`UPDATE`语句更改了`DEPTNO`或`JOB`（或两者）属性时，才执行在 EM2 中开发的 DI 代码。\n\
    \n`■Note` 您可能很容易理解，更新`JOB`可能会违反此约束。例如，在给定部门中，当您将一名管理员提升为培训师时，很可能您刚刚“移除”了该部门要求存在的唯一管理员，因为该部门还雇佣了总裁或经理。此外，例如，当您将一名培训师提升为经理时，这可能是该部门的第一位经理。这现在将要求该部门还雇佣一名管理员。类似的情况也适用于更新`DEPTNO`；如果您将目前在部门\
    \ 10 工作的经理切换到部门 20 工作，那么该经理可能是部门 20 的第一位经理，因此……，等等。\n\nSQL 标准允许您在更新触发器中指定这些列。然后，更新触发器仅在其中一个涉及的列被更改时才会触发。以下是您如何在\
    \ Oracle 中编写`after statement update`触发器（参见清单 11-31）。\n\n**清单 11-31.** *约束`EMP_TAB03`的\
    \ EM3 更高效更新触发器*\n```sql\ncreate trigger EMP_AUS_TAB03\nafter update of DEPTNO,JOB\
    \ on EMP\ndeclare pl_dummy varchar(40);\nbegin\n--\n  select 'Constraint EMP_TAB03\
    \ is satisfied' into pl_dummy\n  from DUAL\n  where not exists(select d.DEPTNO\n\
    \                   from EMP d\n                   where exists(select e2.*\n\
    \                                from EMP e2\n                               \
    \ where e2.DEPTNO = d.DEPTNO\n                                and e2.JOB in ('PRESIDENT','MANAGER'))\n\
    \                   and not exists(select e3.*\n                             \
    \     from EMP e3\n                                  where e3.DEPTNO = d.DEPTNO\n\
    \                                  and e3.JOB = 'ADMIN'));\n--\nexception when\
    \ no_data_found then\n--\n  raise_application_error(-20999,'Constraint EMP_TAB03\
    \ is violated.');\n--\nend;\n/\n```\n\n清单 11-31 中的第二行指定了涉及的列。\n\n`■Note` 与 EM2\
    \ 的情况一样，DBMS 供应商也可以轻松地以声明方式支持此执行模型。与 EM2 相比，DBMS 为 EM3 需要做的额外工作是解析所有约束。它这样做不仅是为了确定\
    \ EM2 涉及的表结构，还要确定每个表结构涉及的属性是什么。DBMS 然后可以自动实现更复杂的更新触发器。\n\n清单 11-32 展示了在`UPDATE`语句执行情况下，约束`DEPT_TAB01`的优化\
    \ DI 代码（请注意，只有`MGR`属性涉及在此约束中）。\n\n**清单 11-32.** *更新情况下`DEPT_TAB01`的 DI 代码*\n```sql\n\
    create trigger DEPT_AUS_TAB01\nafter update of MGR on DEPT\ndeclare pl_dummy varchar(40);\n\
    begin\n--\n  select 'Constraint DEPT_TAB01 is satisfied' into pl_dummy from DUAL\n\
    ```\n"
- fmt: "```sql\nwhere not exists(select m.DEPTNO\n                 from DEPT m\n \
    \                where 2 < (select count(*)\n                            from\
    \ DEPT d\n                            where d.MGR = m.MGR));\n```\n\n```sql\n\
    exception\nwhen no_data_found then\n   raise_application_error(-20999,'Constraint\
    \ DEPT_TAB01 is violated.');\nend;\n/\n```\n\nThere is a way to further improve\
    \ on the efficiency of this execution model. For a given constraint, you can sometimes\
    \ deduce that an `INSERT` statement (into one of the involved table structures)\
    \ or a `DELETE` statement (on one of the involved table structures) can never\
    \ violate the constraint. In the case of table constraint `EMP_TAB03`, neither\
    \ can be deduced. You could be inserting a president, in which case the constraint\
    \ should be validated. Or, you could be deleting an administrator, in which case\
    \ the constraint should be validated too. However, in the case of table constraint\
    \ `DEPT_TAB01`, you can deduce that deleting a department can never violate this\
    \ constraint.\n\nThe next execution model addresses this further optimization\
    \ with regards to `INSERT` or `DELETE` statements.\n\n## Execution Model 4: On-Involved-Column(s)\
    \ Plus Polarity-of-Involved-Tables\n\nThis execution model (`EM4`) is the same\
    \ as `EM3` when the triggering `DML` statement is an `UPDATE` statement. However,\
    \ when inserts or deletes occur, you now also make use of the knowledge of what\
    \ the *polarity* of an involved table structure is per constraint.\n\nThe **polarity**\
    \ of a table structure for a given constraint is defined to be **positive** if\
    \ inserts into that table structure can violate the constraint and deletes cannot.\
    \ The polarity of a table structure for a given constraint is **negative** if\
    \ deletes from that table structure can violate the constraint and inserts cannot.\
    \ The polarity of a table structure is defined to be **neutral** if both an insert\
    \ and a delete give rise to a need for the constraint to be validated. The polarity\
    \ of a table structure for a given constraint is **undefined** if the table structure\
    \ is not involved in the constraint.\n\nIf the polarity of a table structure for\
    \ a given constraint is `neutral`, then `EM4` is equivalent to `EM3`; there is\
    \ no opportunity for you to further optimize (in comparison to `EM3`) the insert\
    \ or delete trigger. However, if it is `positive` or `negative`, then you can\
    \ further optimize the `DELETE` or `INSERT` statement trigger, respectively; in\
    \ fact, you can drop them.\n\nLet’s demonstrate this by examining the `DI` code\
    \ for constraint `DEPT_TAB01`. As mentioned earlier, only inserting a department\
    \ can potentially violate this constraint; if all department managers currently\
    \ manage no more than two departments, then deleting a department can never violate\
    \ this constraint. We say that the `DEPT` table structure has a `positive` polarity\
    \ with regards to the `DEPT_TAB01` constraint. In this case you can optimize the\
    \ delete trigger not to run any `DI` code at all for `DEPT_TAB01`; you simply\
    \ needn’t create the `DEPT` `DELETE` statement trigger that would have been created\
    \ in `EM3` for constraint `DEPT_TAB01`.\n\n> **Note** Scientific research has\
    \ shown that a `DBMS` can also fairly easily compute the polarity of an involved\
    \ table structure for a given (formally specified) constraint. This again implies\
    \ that a `DBMS` vendor should be capable of supplying us with full declarative\
    \ multi-tuple constraint support using execution model `EM4`.\n\nStill, execution\
    \ model `EM4` sometimes runs `DI` code when there is no need to. For instance,\
    \ considering constraint `EMP_TAB03`, when you insert a *sales rep*, or delete\
    \ a *trainer*, `EM4` will run the `DI` code for constraint `EMP_TAB03`. But obviously,\
    \ because neither sales reps nor trainers play any role in this constraint, then\
    \ inserts and/or deletes of them should never give rise to the need to check constraint\
    \ `EMP_TAB03`. The next execution model addresses this inefficiency.\n\n## Execution\
    \ Model 5: On-Transition-Effect-Property\n\nThis execution model (`EM5`) assumes\
    \ the availability of a *transition effect* of a given `DML`"
