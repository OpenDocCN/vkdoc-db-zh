    C H A P T E R 9


    Data Retrieval


    **B**ymeans of a *query*,you retrieve data from a database. In this chapter we’ll
    demonstrate how you can specify a query in a formal way. To do so, we won’t require
    the formal introduction of any new concepts; we’ve already presented all ingredients
    for specifying queries.


    The section “Formally Specifying Queries” introduces you to the formal concept
    of a *query over a database universe*. You’ll find out that you can specify a
    query as a set-theory expression based on a given database state. In this section,
    we’ll also give a few simple examples to familiarize you with this formal concept
    of a query.


    The section “Example Queries Over DB_UEX” provides example queries over DB_UEX,
    the example database universe that was introduced in Chapter 7\. It will start
    out with basic queries and gradually move to more complex queries. For every query,
    we’ll present you with multiple (equivalent) formal expressions to specify the
    query.


    For the first time in this book, you’ll see the use of SQL. Every example query
    will be accompanied by one or more equivalent SQL expressions. You’ll discover
    that expressing particular queries in SQL turns out to be not so trivial.


    **■Note** We assume you have a working knowledge of SQL. It is certainly not the
    goal of this book to teach the SQL language (although showing both the formal
    and the SQL expressions alongside each other might have this as a side effect).
    As mentioned in the book’s Introduction, the SQL expressions given in this chapter,
    as well as in the following two chapters, are compliant with the 10 *g* release
    of Oracle’s SQL DBMS.


    As usual, you’ll find a “Chapter Summary” at the end, followed by an “Exercises”
    section.


    **Formally Specifying Queries**


    Data retrieval is a crucial application of a database. Through queries, you can
    extract information that is relevant to you from the database. In this section,
    we’ll demonstrate how you can formally specify queries.


    Let’s first start with a simple example. We’ll use the example database design
    that was introduced in Chapter 7\. Assume E represents the employee table in some
    database state of universe DB_UEX. Here’s a formal specification of a query, named
    Q1, on E that extracts the trainers who earn more than 6000:


    Q1(E) := { e | e∈E ∧ e(JOB)=''TRAINER'' ∧ e(MSAL)>6000 }


    **199**


    7451CH09.qxd 5/7/07 11:28 AM Page 200


    **200**


    C H A P T E R 9 **■** D ATA R E T R I E VA L


    Query Q1 returns all employee tuples representing trainers earning more than 6000.


    Instead of the complete tuple, if all you were interested in was the employee
    number (EMPNO), name (ENAME), and salary (MSAL), of trainers earning more than
    6000, then the following query (Q2) would do the job:


    Q2(E) := { e↓{EMPNO,ENAME,MSAL} | e∈E ∧ e(JOB)=''TRAINER'' ∧ e(MSAL)>6000 }


    **■Note** Both Q1 and Q2 return a table as their result. As you’ll see shortly,
    this is not a requirement in the formal methodology set out by this book; queries
    are allowed to return simple values too (for instance, a single numeric or string
    value). However, in practice we prefer query specifications that return tables.


    As indicated through the preceding example, you can view a query as a function.
    In this case, you pass this function a table as its argument, and it then returns
    another value based on the argument. Of course, queries often involve more than
    just one table. In general, a query can be considered to accept a database state
    (our formal structure that contains all current tables) as its argument. The query
    can then inspect any table available within this database state to determine its
    return value.'
  trans: "\n## 章节总结\n\n本节以项目符号列表的形式提供了本章的摘要。你可以在继续下一节的练习之前，用它来检查自己对本章引入的各种概念的理解程度。\n\
    \n-   除了之前介绍的四类约束（属性约束、元组约束、表约束和数据库约束）外，还有第五类约束称为 `状态转换约束`。\n\n-   这些约束限制了数据库设计中允许的事务。\n\
    \n`状态转换谓词`是状态转换约束的基础。\n\n-   状态转换约束是引用一对数据库状态作为其参数的谓词，其中一个数据库状态代表事务的`起始状态`，另一个代表事务的`结束状态`。\n\
    \n-   状态转换约束的典型例子包括对新插入元组的属性值允许范围的限制，或者对值集表示一组代码的属性值转换（更新）的限制。\n\n-   状态转换约束是作为数据库设计`状态转换全域`规范的一部分来指定的。该全域代表了一个数据库设计所有可允许的事务集合。\n\
    \n-   状态转换（与静态相对）约束可以引用 DBMS 提供的`事务环境变量`。这些变量的典型例子是系统日期和时间（由`sysdate`表示）以及当前登录的用户（由`user`表示）。\n\
    \n## 练习题\n\n1.  使用表 1-13 中的重写规则或通过真值表，证明重写规则 `( P ⇒ (Q ∨ R) ) ⇔ ( (P ∧ ¬Q) ⇒ R\
    \ )`。\n2.  将清单 8-1 中的 `prop1` 重写为全称量化形式。你可能会发现这是一种更直观的规范。\n3.  形式化地指定以下状态转换约束：只有在同一时刻员工的薪资等级得到提升时，才能降低该员工的薪资。在“更多数据完整性谓词”一节中引入的事务\
    \ `TX1` 是否也违反了此约束？\n4.  给出一个涉及连接运算符的状态转换约束 `STC2` 的替代规范。\n5.  指定一个状态转换约束：新插入的\
    \ `EMP` 元组的 `HIRED` 属性值不能晚于 `sysdate` 之后一个月。非正式地说，新员工最早可以在其首个工作日前一个月注册。\n6.  状态转换约束\
    \ `STC7` 是否可以分解为多个合取项？`STC3` 呢？\n7.  指定一个状态转换约束：新的员工元组只能由使用人力资源部门员工（`DNAME = 'Human\
    \ resources'`）的 `USERNAME` 登录的会话插入。\n8.  如本章所述，课程评价的处理方式是：培训师必须首先通过将该课程所有注册参与者的评价属性重置为值\
    \ 0 来启用评价。在此事务之后（该事务必须由培训师的会话执行），参与者可以通过将 0 更改为 1 到 5 之间的值来评价课程。应只允许每个参与者更新其自身的注册评价。修改\
    \ `STC7` 的规范以反映这些额外的授权要求。\n9.  进一步修改 `STC7`，使得评价必须在课程的最后一天或之前完成。\n10. 你需要考虑到被终止雇佣的员工可能被复职的可能性。你的一位同事建议，在这种情况下，应删除涉及的\
    \ `TERM` 元组，同时更新相应 `EMP` 元组中的 `HIRED` 属性，以反映该员工重新雇佣的开始日期。\n\n    **a.** 给出一个形式化规范，声明只有在同时更新（即，更改为更近的日期）了员工的\
    \ `HIRED` 属性时，才能删除 `TERM` 元组。\n\n    **b.** 你认为这个解决方案存在潜在问题吗？在什么条件下这个解决方案是可行的？\n\
    \n## 第 9 章 数据检索\n\n通过`查询`，你可以从数据库中检索数据。在本章中，我们将演示如何以形式化的方式指定查询。为此，我们不需要正式引入任何新概念；我们已经呈现了指定查询的所有要素。\n\
    \n“形式化指定查询”一节向你介绍了`数据库全域上的查询`的形式化概念。你会发现，可以基于给定的数据库状态，将查询指定为一个基于集合论的表达式。在本节中，我们还将给出一些简单的例子，帮助你熟悉这个查询的形式化概念。\n\
    \n“基于 `DB_UEX` 的查询示例”一节提供了基于 `DB_UEX`（第 7 章引入的示例数据库全域）的查询示例。它将从基本查询开始，并逐渐过渡到更复杂的查询。对于每个查询，我们将为你提供多种（等价的）形式化表达式来指定它。\n\
    \n在本书中，你将首次看到 SQL 的使用。每个示例查询都会附带一个或多个等价的 SQL 表达式。你会发现，用 SQL 表达某些查询并不那么简单。\n\n\
    **注意** 我们假设你具备 SQL 的工作知识。本书的目标当然不是教授 SQL 语言（尽管同时展示形式化表达式和 SQL 表达式可能会有这个副作用）。正如本书引言中提到的，本章以及接下来两章中给出的\
    \ SQL 表达式符合 Oracle SQL DBMS 的 10 `g` 版本。\n\n照例，你会在章末找到“章节总结”，然后是“练习题”部分。\n\n###\
    \ 形式化指定查询\n\n数据检索是数据库的关键应用。通过查询，你可以从数据库中提取与你相关的信息。在本节中，我们将演示如何形式化地指定查询。\n\n让我们从一个简单的例子开始。我们将使用第\
    \ 7 章引入的示例数据库设计。假设 `E` 代表全域 `DB_UEX` 的某个数据库状态中的员工表。以下是一个名为 `Q1` 的在 `E` 上的查询的形式化规范，它提取收入超过\
    \ 6000 的培训师：\n\n`Q1(E) := { e | e∈E ∧ e(JOB)='TRAINER' ∧ e(MSAL)>6000 }`\n\n查询\
    \ `Q1` 返回所有表示收入超过 6000 的培训师的员工元组。\n\n如果你感兴趣的不是完整的元组，而只是收入超过 6000 的培训师的员工号 (`EMPNO`)、姓名\
    \ (`ENAME`) 和薪水 (`MSAL`)，那么以下查询 (`Q2`) 将完成这项工作：\n\n`Q2(E) := { e↓{EMPNO,ENAME,MSAL}\
    \ | e∈E ∧ e(JOB)='TRAINER' ∧ e(MSAL)>6000 }`\n\n**注意** `Q1` 和 `Q2` 都返回一个表作为结果。正如你将很快看到的，这在本书阐述的形式化方法中并非必须；查询也可以返回简单的值（例如，单个数值或字符串值）。然而，在实践中，我们更倾向于返回表的查询规范。\n\
    \n如前面的例子所示，你可以将查询视为一个函数。在这种情况下，你向该函数传递一个表作为其参数，然后它根据该参数返回另一个值。当然，查询通常涉及不止一个表。一般来说，一个查询可以被视为接受一个数据库状态（我们包含所有当前表的形式结构）作为其参数。然后，查询可以检查此数据库状态内的任何可用表，以确定其返回值。\n"
- fmt: 'Let’s demonstrate this with an example too. Assume `dbs` represents some database
    state of database universe `DB_UEX`. Take a look at query `Q3`; it returns the
    department that employs the president (if there is one):


    ```

    Q3(dbs) := { d | d∈dbs(DEPT) ∧


    (∃e∈dbs(EMP): e(DEPTNO)=d(DEPTNO) ∧ e(JOB)=''PRESIDENT'') }

    ```


    Query `Q3` inspects two tables held within state `dbs`; expression `dbs(DEPT)`
    denotes the department table, and expression `dbs(EMP)` denotes the employee table.
    Because the argument of the query now represents a database state, the query can
    inspect any table available within that state.


    As this example shows us, a query can formally be considered a `function over
    a database universe`. In other words, a query is a function whose domain is a
    set of database states. For every database state, the function returns (or if
    you will, `computes`) some value. The result of a query can be a value of any
    type. Query `Q3` results in a table. If there is a president, then the result
    will be a table with one tuple; if there is no president, then the result will
    be the empty table. Database queries will typically result in tables. In fact,
    given the query language `SQL`, a query always results in a table. In the formalism
    introduced in this book, the result of a query can be as simple as a single numeric
    or string value too. Here is an example. Query `Q4` returns the number of employees
    in department 10:


    ```

    Q4(dbs) := #{ e | e∈dbs(EMP) ∧ e(DEPTNO)=10 }

    ```


    The result of query `Q4` is a numeric value. Here is a formal specification of
    `Q4` that returns a table:


    ```

    Q4(dbs) := { { (DEPT_TEN_EMPS; #{ e | e∈dbs(EMP) ∧ e(DEPTNO)=10 }) } }

    ```


    This version of `Q4` returns a table over `{DEPT_TEN_EMPS}`. It contains one tuple,
    with one attribute-value pair.


    # Chapter 9 Data Retrieval


    ## Example Queries Over DB_UEX


    This section provides example queries. It starts out with basic queries and gradually
    moves to more complex queries. For every query, we’ll present you with the following:


    - An informal description for the query

    - One or more formal expressions to specify the query

    - One or more specifications expressed in `SQL` for the query


    Along the way, you’ll find out that it becomes increasingly more difficult to
    precisely specify a query informally; it becomes hard to avoid ambiguity. Also,
    you’ll see that `SQL` has some shortcomings that cause difficulties when you try
    to translate a formal query specification directly into a `SELECT` expression.


    Listings 9-1 through 9-11 introduce the example queries. All queries are named
    `EXQi` (`example query i`), where `i` represents a sequence number. In the formal
    specifications given for each query, `dbs` represents a database state of `DB_UEX`.
    The various alternative formal expressions are named `FEc` (`formal expression
    c`), where `c` represents a letter (a, b, c, and so on).


    The `SQL` expressions are based on an implementation of the `DB_UEX` database
    design. We’ll introduce this implementation in detail in Chapter 11. For now it
    suffices to mention that in the implementation of `DB_UEX`, every table universe
    is implemented one on one as an `SQL` table, and that `NULL`s (a concept not known
    in our formal methodology) are explicitly excluded from that implementation.


    In the `SQL` specifications we’ll use the table structure names introduced by
    database characterization `DB_CHREX` (see Listing 7-38) as the table names available
    for `SELECT` expressions. We’ll name alternative `SQL` specifications `SEr` (`SQL
    expression r`), where `r` represents a Roman numeral (I, II, III, and so on).


    **Note:** Unless pointed out in the accompanying text, there is no implied relationship
    between the respective formal and `SQL` alternative expressions that are listed
    for every query.


    Listing 9-1 gives the data of all departments.


    **Listing 9-1.** Query `EXQ1(dbs)`


    **FEa:**


    ```

    dbs(DEPT)

    ```


    **FEb:**


    ```

    { d | d∈dbs(DEPT) }

    ```


