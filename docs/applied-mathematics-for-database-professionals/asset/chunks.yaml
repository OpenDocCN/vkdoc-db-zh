    o(STATUS) = ''SCHD'') ∧


    (∀o∈dbs(OFFR): (o(COURSE) = c(CODE) ∧


    o(STATUS) = ''SCHD'') ⇒


    o(MAXCAP) < 10 ) }


    Adding the existential quantification now ensures that courses with no scheduled
    offerings won’t appear in the result set.


    In the next example, you’ll see the use of an NVL function and the outer join
