    \ PM Page 350\n\n**350**\nA P P E N D I X E **■** A N S W E R S TO S E L E C T\
    \ E D E X E R C I S E S\n\nThe following table proves the second De Morgan law\
    \ `¬(P ∧ Q) ⇔ (¬P ∨ ¬Q)` by using available rewrite rules.\n\n```\nDerivation\t\
    Comments\n¬(P ∧ Q)\t\n⇔\tDouble negation (twice)\n¬(¬¬P ∧ ¬¬Q)\t\n⇔\tFirst law\
    \ of De Morgan (right to left)\n¬¬(¬P ∨ ¬Q)\t\n⇔\tDouble negation\n(¬P ∨ ¬Q)\t\
    \n```\n\n## Exercise 4\n\n**b.** Using available rewrite rules.\n\n```\nDerivation\t\
    Comments\nP ⇒ Q\t\n⇔\tRewrite implication into disjunction\n¬P ∨ Q\t\n⇔\tCommutativity\n\
    Q ∨ ¬P\t\n⇔\tDouble negation\n¬¬Q ∨ ¬P\t\n⇔\tRewrite disjunction into implication\n\
    ¬Q ⇒ ¬P\t\n```\n\n**d.** `¬(P ⇒ Q) ⇔ (P ∧ ¬Q)`, using available rewrite rules.\n\
    \n```\nDerivation\tComments\n¬(P ⇒ Q)\t\n⇔\tRewrite implication into disjunction\n\
    ¬(¬P ∨ Q)\t\n⇔\tDe Morgan\n¬¬P ∧ ¬Q\t\n⇔\tDouble negation\nP ∧ ¬Q\t\n```\n\n**f.**\
    \ `( ( P ⇒ Q ) ∧ ( P ⇒ ¬Q ) ) ⇔ ¬P`, using truth table.\n\n| **P** | **Q** | **P**\
    \ ⇒ **Q** | ¬**Q** | **P** ⇒ ¬**Q** | (**P** ⇒ **Q**) ∧ (**P** ⇒ ¬**Q**) | ¬**P**\
    \ |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| T | T | T | F | F |\
    \ F | F |\n| T | F | F | T | T | F | F |\n| F | T | T | F | T | T | T |\n| F |\
    \ F | T | T | T | T | T |\n\n7451AppE.qxd 5/15/07 1:43 PM Page 351\n\nA P P E\
    \ N D I X E **■** A N S W E R S TO S E L E C T E D E X E R C I S E S\n\n**351**\n\
    \n## Exercise 5\n\nYou can use truth tables or existing rewrite rules. Alternatively,\
    \ you can bring up a valuation for the involved variables for which the predicate\
    \ evaluates to FALSE (that is, you give a counter example).\n\n**a.** `P ⇒ (P\
    \ ∧ Q)`\n*Counter Example: P = TRUE and Q = FALSE*\n```\nDerivation\nTRUE ⇒ (TRUE\
    \ ∧ FALSE)\n⇔\tTRUE ⇒ FALSE\n⇔\tFALSE\n```\nTherefore `P ⇒ (P ∧ Q)` is *not* a\
    \ tautology.\n\n**b.** `P ⇒ (P ∨ Q)`\n*Using Existing Rewrite Rules*\n```\nDerivation\t\
    Comments\nP ⇒ (P ∨ Q)\t\n⇔\tRewrite the implication into a disjunction\n¬P ∨ (P\
    \ ∨ Q)\t\n⇔\tAssociativity\n(¬P ∨ P) ∨ Q\t\n⇔\tSpecial case\nTRUE ∨ Q\t\n⇔\tSpecial\
    \ case\nTRUE\t\n```\nTherefore `P ⇒ (P ∨ Q)` is a tautology.\n\n**f.** `(P ⇒ Q)\
    \ ⇒ (P ∧ Q)` is not a tautology.\n*Counter Example: P = FALSE and Q = TRUE*\n\
    ```\nDerivation\n(FALSE ⇒ TRUE) ⇒ (FALSE ∧ TRUE)\n⇔\t(TRUE) ⇒ (FALSE)\n⇔\tFALSE\n\
