    **Ordered Pairs and Cartesian Product**


    If a set contains two elements, the order of those two elements is irrelevant.
    For example, the set {1,2} is identical to the set {2,1}. On the other hand, in
    geometry we normally represent points with x and y coordinates, where the order
    of the coordinates is important. If you swap the x and y coordinates of a given
    point, assuming they are not the same value, you end up with a different point.


    **Ordered Pairs**


    This section introduces the concept of ordered pairs, allowing you to make the
    distinction in the order of two values that are paired together. We use a special
    notation for this, as shown in Definition 2-10.


    **■Definition 2-10: Ordered Pair** An ordered pair is a pair of elements, say
    a and b, for which the order is important. The notation is (a;b).


    The concept of an ordered pair is important in this book. That’s not only because
    we’ll use ordered pairs to introduce the Cartesian product operator; but moreover,
    we will need them to introduce binary relations and functions in Chapter 4, which
    in turn will be used to represent *tuples* (we note now that this word is pronounced
    such that it rhymes with “couples”).


    **■Note** Generally a comma is used as the serialization operator for the elements
    of an ordered pair. An ordered pair would be depicted as (a,b). However, because
    the comma is already heavily used to separate the elements of an enumeratively
    specified set, this book uses the semicolon to separate the elements of an ordered
    pair. It makes various expressions easier to read.


    7451CH02.qxd 5/4/07 2:12 PM Page 39


    C H A P T E R 2 **■** S E T T H E O RY: I N T R O D U C T I O N


    **39**


    The two elements of an ordered pair are also referred to as the first and second
    *coordinates* of the ordered pair. Because the order of the coordinates of an
    ordered pair is important, the following two properties hold:


    (a ≠ b) ⇔ ( (a;b) ≠ (b;a) )


    ( (a;b) = (c;d) ) ⇔ ( (a = c) ∧ (b = d) )


    The second property in the preceding equation is also known as the “equality axiom.”


    Using De Morgan’s rewrite rules you can also specify this axiom as follows: (
    (a;b) ≠ (c;d) ) ⇔ ( (a ≠ c) ∨ (b ≠ d) )


    **■Note** Just like elements in a set, the two values that are paired together
    in an ordered pair can be of arbitrary complexity. For example, (A;{1,2,3}) is
    a valid ordered pair. This pair has A as its first coordinate and the set {1,2,3}
    as its second coordinate.


    We introduce operators π1 and π2 to retrieve the first and second coordinates
    from an ordered pair. For a given ordered pair—say (a;b)—the first coordinate
    can be retrieved using the expression π1(a;b), which results in a, and the second
    coordinate via expression π2(a;b), which equals b.


    **Cartesian Product**


    The Cartesian product of two given sets can now be defined using ordered pairs,
    as shown by Definition 2-11.


    **■Definition 2-11: Cartesian Product** The Cartesian product of two given sets
    A and B, notation A×B, equals { (a;b) | a∈A ∧ b∈B }.


    That is, the Cartesian product A×B is the set of all ordered pairs you can construct
    by choosing a first coordinate from set A and a second coordinate from set B.
    Let’s look at an example. Suppose the following sets are given:


    A := {1,2,3}


    B := {3,4}


    Then


    A×B = { (1;3), (1;4)


    , (2;3), (2;4)


    , (3;3), (3;4) }


    7451CH02.qxd 5/4/07 2:12 PM Page 40


    **40**


    C H A P T E R 2 **■** S E T T H E O RY: I N T R O D U C T I O N


    And


    B×A = { (3;1), (3;2), (3;3)


    , (4;1), (4;2), (4;3) }


    This example clearly shows that A×B is in general *not* the same as B×A. In other
    words, the Cartesian product operator is not commutative. You can even prove that
    in case A×B and B×A are the same, A and B must be equal (and vice versa):


    ( A×B = B×A ) ⇔ ( A = B )


    Note also that the two example sets A and B contain *numbers* as their elements,
    while the results of both Cartesian products contain *ordered pairs*. In this
    regard, the Cartesian product clearly differs from the operators we discussed
    before. The union, intersection, and difference operators all repeat (or leave
    out) elements of their operands; they don’t create new types of elements.


    Because the Cartesian product produces every possible combination of two coordinates
    from the two finite input sets, the following property is also rather intuitive
    (also see the preceding example):


    #A×B = #A ∗ #B


    The cardinality of a Cartesian product is equal to the product of the cardinalities
    of the two operands. Last but not least, let’s not forget to check the empty set:
    A×∅ = ∅×A = ∅


    **Sum Operator**


    We conclude this introductory chapter on set theory by establishing the sum operator
    (see Definition 2-12). With the sum operator, you can evaluate a numeric expression
    for every element in a given set and compute the sum of all these evaluations.


    **■Definition 2-12: Sum Operator (SUM)** The sum of a numeric expression f(x),
    where x is chosen from a given set S, is denoted as follows:


    ( SUM x∈S: f(x) )


    For every element x that can be chosen from set S, the sum operator evaluates
    expression f(x) and computes the sum of all such evaluations. In case S represents
    the empty set, then (by definition) the sum operator returns the numeric value
    0.


    Here are a few examples:


    ( SUM x∈{ -1, 2, 5 }: x )


    ( SUM x∈{ -1, 2, 5 }: 1 )


    ( SUM n∈{ x| x∈**N** ∧ x ≤ 4 }: 2*n )


    ( SUM p∈{ (A;1), (B;1), (C;5) }: π2(p) )


    7451CH02.qxd 5/4/07 2:12 PM Page 41


    C H A P T E R 2 **■** S E T T H E O RY: I N T R O D U C T I O N


    **41**


    The first example sums values -1, 2, and 5\. This results in 6\. The second example
    is a somewhat elaborate way to compute the cardinality of the set { -1, 2, 5 };
    it sums value 1


    for every element in this set and results in 3\. The third example computes the
    sum 2*0 + 2*1


    + 2*2 + 2*3 + 2*4 and results in 20\. The fourth example computes 1 + 1 + 5, resulting
    in 7.


    **Some Convenient Shorthand Set Notations**


    We use some (finite) sets frequently in the database world: dates, numbers, and
    strings. Therefore, we introduce the set specification shorthand listed in Table
    2-4.


    **Table 2-4.** *Some Convenient Set Specification Shorthand* **Shorthand**


    **Definition**


    date


    { d | d is a date between January 1, 4712 BC and December 31, 4712 AD }


    number(p,s)


    { n | n is a valid number with precision p and scale s }


    varchar(n)


    { s | s is a string with at least 1 and at most n characters }


    [n..m]


    { x∈**Z** | x ≥ n ∧ x ≤ m }


    As you can see, this shorthand shows a rather obvious resemblance with the common
    data types that are supported by SQL database management systems. For the date
    shorthand, the boundaries defined are those that are implemented by at least one
    common DBMS vendor. The last shorthand in Table 2-4 allows you to specify closed
    intervals of integers.'
  trans: '# 集合论导论


    ## 集合的划分


    *   划分的任意两个元素必须是*不相交*的。

    *   划分`P`的*并集*必须等于原始集合`S`。


    如果想用维恩图来理解，划分就是将原始集合分割成若干个非空、不重叠的部分，如图 2-5 所示。假设`S := {1,2,3,4,5,6,7,8,9}`且`P
    := {{1},{2,4},{3,6,7},{5},{8,9}}`。


    那么，`S`中的每个元素都恰好出现在划分`P`的一个元素中。


    **图 2-5.** *划分`P`的维恩图*


    让我们看另一个简单的数值例子：


    假设：`T := {1,2,3}`


    那么集合`P1`到`P5`都是`T`所有可能的划分：

    ```

    P1 := {{1},{2},{3}}

    P2 := {{1,2},{3}}

    P3 := {{1,3},{2}}

    P4 := {{2,3},{1}}

    P5 := {{1,2,3}}

    ```


    请注意，最后一个例子表明，一般情况下`{S}`总是`S`的一个划分。总是如此吗？


    即使`S`是空集？请仔细对照划分的定义检查这个陈述；此项检查留作本章末尾的练习。


    ## 有序对与笛卡尔积


    如果一个集合包含两个元素，这两个元素的顺序是无关紧要的。例如，集合`{1,2}`与集合`{2,1}`是相同的。另一方面，在几何学中，我们通常用`x`和`y`坐标来表示点，其中坐标的顺序很重要。如果交换一个给定点的`x`和`y`坐标（假设它们值不相同），你会得到一个不同的点。


    ### 有序对


    本节介绍有序对的概念，允许你对两个配对值的顺序进行区分。我们使用一种特殊的符号表示，如定义 2-10 所示。


    **■定义 2-10：有序对** 一个有序对是一对元素，例如`a`和`b`，其中顺序很重要。符号表示为`(a;b)`。


    有序对的概念在本书中很重要。这不仅是因为我们将使用有序对来引入笛卡尔乘积运算符；更重要的是，在第 4 章中，我们将需要用它们来引入二元关系和函数，这反过来又将用于表示*元组*（我们注意到这个词的发音与“couples”押韵）。


    **■注** 通常使用逗号作为有序对元素的序列化运算符。一个有序对将被描述为`(a,b)`。然而，由于逗号已经被大量用于分隔枚举指定集合的元素，本书使用分号来分隔有序对的元素。这使得各种表达式更易于阅读。


    有序对的两个元素也被称为该有序对的第一和第二*坐标*。由于有序对的坐标顺序很重要，因此成立以下两个性质：


    `(a ≠ b) ⇔ ( (a;b) ≠ (b;a) )`


    `( (a;b) = (c;d) ) ⇔ ( (a = c) ∧ (b = d) )`


    前面等式中的第二个性质也称为“相等公理”。


    使用德·摩根重写规则，你也可以如下指定此公理：

    `( (a;b) ≠ (c;d) ) ⇔ ( (a ≠ c) ∨ (b ≠ d) )`


    **■注** 就像集合中的元素一样，有序对中配对的两个值可以是任意复杂的。例如，`(A;{1,2,3})`是一个有效的有序对。这个对以`A`作为其第一坐标，以集合`{1,2,3}`作为其第二坐标。


    我们引入运算符`π1`和`π2`来从有序对中检索第一和第二坐标。对于一个给定的有序对——例如`(a;b)`——第一坐标可以使用表达式`π1(a;b)`检索，结果为`a`；第二坐标可以通过表达式`π2(a;b)`检索，结果等于`b`。


    ### 笛卡尔积


    两个给定集合的笛卡尔积现在可以使用有序对来定义，如定义 2-11 所示。


    **■定义 2-11：笛卡尔积** 两个给定集合`A`和`B`的笛卡尔积，记作`A×B`，等于`{ (a;b) | a∈A ∧ b∈B }`。


    也就是说，笛卡尔积`A×B`是你可以通过从集合`A`中选择一个第一坐标、从集合`B`中选择一个第二坐标来构造的所有有序对的集合。让我们看一个例子。假设给定以下集合：

    ```

    A := {1,2,3}

    B := {3,4}

    ```

    那么

    ```

    A×B = { (1;3), (1;4), (2;3), (2;4), (3;3), (3;4) }

    ```

    并且

    ```

    B×A = { (3;1), (3;2), (3;3), (4;1), (4;2), (4;3) }

    ```

    这个例子清楚地表明，`A×B`通常*不*等同于`B×A`。换句话说，笛卡尔积运算符不是交换的。你甚至可以证明，在`A×B`和`B×A`相同的情况下，`A`和`B`必须相等（反之亦然）：

    `( A×B = B×A ) ⇔ ( A = B )`


    另请注意，两个示例集合`A`和`B`包含*数字*作为其元素，而两个笛卡尔积的结果包含*有序对*。在这方面，笛卡尔积显然不同于我们之前讨论的运算符。并、交和差运算符都是重复（或省略）其操作数的元素；它们不会创建新类型的元素。


    因为笛卡尔积从两个有限输入集中产生两个坐标的所有可能组合，所以以下性质也相当直观（也见前面的例子）：

    `#A×B = #A * #B`


    笛卡尔积的基数等于两个操作数基数的乘积。最后但并非最不重要的一点是，别忘了检查空集：`A×∅ = ∅×A = ∅`


    ## 求和运算符


    我们通过建立求和运算符（见定义 2-12）来结束这个集合论的导论章节。使用求和运算符，你可以对给定集合中的每个元素计算一个数值表达式，并计算所有这些计算结果的和。


    **■定义 2-12：求和运算符（SUM）** 数值表达式`f(x)`的和，其中`x`取自给定集合`S`，表示如下：

    `( SUM x∈S: f(x) )`


    对于可以从集合`S`中选择的每个元素`x`，求和运算符计算表达式`f(x)`并计算所有这些计算结果的和。如果`S`代表空集，那么（根据定义）求和运算符返回数值`0`。


    这里有几个例子：

    ```

    ( SUM x∈{ -1, 2, 5 }: x )

    ( SUM x∈{ -1, 2, 5 }: 1 )

    ( SUM n∈{ x| x∈N ∧ x ≤ 4 }: 2*n )

    ( SUM p∈{ (A;1), (B;1), (C;5) }: π2(p) )

    ```


    第一个例子对值-1、2 和 5 求和。结果是 6。第二个例子是计算集合`{ -1, 2, 5 }`基数的某种复杂方式；它对集合中的每个元素求值 1，结果为
    3。第三个例子计算和`2*0 + 2*1 + 2*2 + 2*3 + 2*4`，结果为 20。第四个例子计算`1 + 1 + 5`，结果为 7。


    ## 一些方便的集合简写表示法


    我们在数据库世界中经常使用一些（有限的）集合：日期、数字和字符串。因此，我们引入表 2-4 中列出的集合指定简写。


    **表 2-4.** *一些方便的集合指定简写*


    | 简写 | 定义 |

    | :--- | :--- |

    | `date` | `{ d \| d 是一个介于公元前 4712 年 1 月 1 日和公元 4712 年 12 月 31 日之间的日期 }` |

    | `number(p,s)` | `{ n \| n 是一个精度为 p、标度为 s 的有效数字 }` |

    | `varchar(n)` | `{ s \| s 是一个长度至少为 1、最多为 n 个字符的字符串 }` |

    | `[n..m]` | `{ x∈Z \| x ≥ n ∧ x ≤ m }` |


    如你所见，这种简写与 SQL 数据库管理系统支持的常见数据类型有着相当明显的相似之处。对于`date`简写，定义的边界是至少一个常见 DBMS 供应商所实现的边界。表
    2-4 中的最后一个简写允许你指定整数的闭区间。'
- fmt: '## Chapter Summary


    This section provides a summary of this chapter, formatted as a bulleted list.
    You can use it to check your understanding of the various concepts introduced
    in this chapter before continuing with the exercises in the next section.


    *   Sets are fully characterized by their elements and nothing but their elements.

    *   You can specify sets by `enumeration`, by using the `predicative` method,
    by using the `substitutive` method, or a mixture of the predicative and substitutive
    methods.

    *   `Venn diagrams` are pictures of sets, and as such can provide a visual aid
    when working with sets; however, keep their limitations in mind.

    *   The number of elements of a finite set is known as its `cardinality`. We use
    the symbol `#` to represent the cardinality operator.

    *   A set with precisely one element is known as a `singleton`; for singletons
    we can use the "choose" operator (`↵`) to unpack the singleton element.

    *   `A` is a `subset` of `B` if every element of `A` is also an element of `B`;
    the notation is `A⊆B`. If `A` is also not equal to `B`, it is called a proper
    subset of `B` (the notation is `A⊂B`).

    *   Every set is a subset of itself, and the empty set is a subset of every set.

    *   The most common set operators are `union`, `intersection`, and (`symmetric`)
    `difference`.

    *   Two sets are called `disjoint` if their intersection is the empty set.

    *   The `powerset` `℘V` of a set `V` is the set consisting of all possible subsets
    of `V`. If `V` contains `n` elements, then the powerset `℘V` contains `2ⁿ` elements
    (including the empty set and `V` itself).

    *   The `union of a set of sets` is a generalization of the dyadic union operator,
    allowing you to produce the union of an arbitrary number of sets.

    *   A `partition` of a non-empty set `S` is a set of mutually disjoint, non-empty
    subsets of `S` for which the union equals `S`.

    *   An `ordered pair` `(a;b)` consists of two coordinates, `a` and `b`, for which
    the order is important; in other words, `(a;b) = (c;d) ⇔ (a = c ∧ b = d)`.

    *   The `π₁` and `π₂` operators enable you to retrieve the first and second coordinates
    from an ordered pair.

    *   The `Cartesian product` of two sets is the set consisting of all possible
    ordered pairs you can construct by choosing a first coordinate from the first
    set and a second coordinate from the second set.

    *   The `sum` operator enables you to compute the sum of a given expression across
    a given set.


    ## Exercises


    ### 1.

    Suppose the following set is given: `A := {1,2,3,4,5}`

    Which of the following expressions are TRUE?


    **a.** `3 ∈ A`

    **b.** `3 ⊂ A`

    **c.** `∅ ⊆ A`

    **d.** `∅ ∈ A`

    **e.** `{2} ⊂ A`

    **f.** `{3,4} ∈ A`

    **g.** `{3,4} ⊂ A`

    **h.** `{{3,4}} ⊄ A`

    **i.** `#{{3,4}} = 2`

    **j.** `∅ ∈ {∅}`

    **k.** `∅ ⊂ ∅`

    **l.** `∅ ∈ {0}`

    **m.** `{1,2,3,∅} = {1,2,3}`


    ### 2.

    Give an enumerative specification of the following sets:

    **a.**

    ```

    { 2x - 1 | x ∈ **N** ∧ 1 < x < 6 } = ...

    ```

    **b.**

    ```

    { y | y ∈ **N** ∧ y = y+1 } = ...

    ```

    **c.**

    ```

    { z | z ∈ **N** ∧ z = 2∗z } = ...

    ```


    ### 3.

    Give a formal (predicative) specification for the following sets:

    **a.** The set of all quadratics of the natural numbers

    **b.** The set of all even natural numbers

    **c.** The set of all ordered pairs with natural number coordinates such that
    the sum of both coordinates does not exceed 10


    ### 4.

    Draw a Venn diagram of the following three sets: `A := {1,2,4,7,8}`, `B := {3,4,5,7,9}`,
    `C := {2,4,5,6,7}`


    Enumerate the elements of the following set expressions:

    **a.** `B ∪ ∅`

    **b.** `B ∪ {∅}`

    **c.** `A – ( B – C )`

    **d.** `( A – B ) – C`

    **e.** `B ÷ C`

    **f.** `A – B ∩ C`


    ### 5.

    Which of the following seven sets are equal?

    `A := ∅`

    `B := {0}`

    `C := {∅}`

    `D := {{∅}}`

    `E := { x∈**N** | x = x+1 }`

    `F := { x∈**N** | x = 2x }`

    `G := { x∈**N** | x = x² }`


    ### 6.

    Suppose the following set is given:

    `S := {1,2,3,{1,2},{1,3}}`

    Which of the following expressions are TRUE?

    **a.** `{1,2} ⊂ S`'
