  trans: '

    # 引入延迟检查机制


    到目前为止，我们一直假设在事务中串行执行 DML 语句时，每个中间数据库状态都应满足所有约束；所有必需的 DI 代码都通过 DML 后触发器在语句级别立即执行。然而，有时你可能需要将
    DI 代码的执行延迟到事务结束时。


    ## 为何需要延迟检查？


    有一类数据完整性约束在事务执行过程中总是需要被暂时违反，并在事务结束时以延迟方式重新检查。特化约束就是这样一个例子。看看我们示例数据库设计中的约束 `PSPEC1`：


    ```

    PSPEC1(EMP,SREP) :=


    /* 销售代表有目标销售额和佣金 */


    { e(EMPNO) | e∈EMP ∧ e(JOB) = ''SALESREP'' } =


    { s(EMPNO) | s∈SREP }

    ```


    因为在 `SQL` 中，你无法同时插入 `EMP` 行和 `SREP` 行，所以插入新销售代表的事务将不得不执行两次插入操作。而且，无论插入顺序如何，中间数据库状态都会违反约束
    `PSPEC1`。


    这个例子给了我们第一个理由，说明为何在我们的 `SQL` 世界中，你必须处理暂时的约束违反。


    **DML 语句操作单一表结构**


    鉴于我们设定的数据完整性约束集，某些有效的数据库状态转换很可能需要对多个表结构执行 DML 语句。因为 `数据库约束` 类别的约束其数据范围跨越多个表结构，所以极有可能出现这样的情况：第一个对某个涉及表结构执行的
    DML 语句导致了数据库约束违反，而第二个在其他某个涉及表结构上执行的 DML 语句纠正了这一违反。


    注意"可能性"这个词的用法。有些事务总是需要暂时违反某个特定的数据库约束，无论该事务内部的 DML 语句以何种顺序执行（前述的 `PSPEC1` 就是一例）。然而，许多数据库约束永远不需要延迟检查。通过按约束所隐含的*特定顺序*执行不同的
    DML 语句，受这些约束约束的数据可以始终保持满足约束的状态。例如，子集要求就是这种情况。


    只要 DML 语句按正确的顺序执行，中间数据库状态总是能满足子集要求；你将需要先向超集插入新行，然后再向子集插入。


    下一节我们将讨论 SQL 语言的第二个缺陷，这引发了延迟检查的需要。


    7451CH11.qxd 5/15/07 2:26 PM Page 300


    300


    第 11 章 ■ 在 ORACLE 中实现数据库设计


    **DML 语句以单一方式操作**


    DML 语句是 `INSERT`、`UPDATE` 或 `DELETE` 语句。然而，一个表结构的有效状态转换可能需要多种类型的 DML 语句来实现，因此也可能导致需要允许表约束也存在暂时违反。


    例如，考虑以下（不太现实的）表约束："销售代表的数量加上文员数量的两倍必须等于 100 或零。" 看看引入一个文员的事务。假设当前 `EMP` 表包含 100
    名销售代表（这使我们的表约束为 `TRUE`）。一旦我们引入新文员，无论是通过更新销售代表的 `JOB` 字段还是插入新文员，我们总是会引入违反约束的情况，并需要第二种不同类型的
    DML 语句来恢复表约束的真值。


    `SQL` 语言的这个缺陷意味着，某些 `表约束` 的 DI 代码也可能需要延迟执行。我们将那些在事务内部需要暂时违反的表约束和数据库约束称为 `可延迟`
    约束。


    ## 延迟检查的执行模型概述


    '
- fmt: '# 事务中延迟约束的执行模型


    ## 在事务中处理约束违反


    如果一个DML语句（例如`DML1`）在事务中引入了违反约束的情况，那么在该事务结束前，必须有一个后续的DML语句（例如`DML2`）来纠正`DML1`引入的违反。在执行`DML1`时，你可能会：


    *   根本不想执行涉及的DI代码，而是将其安排在事务结束时执行，或者

    *   让涉及的DI代码以某种方式执行，使其仅在检测到违反时才被安排在事务结束时*重新执行*。


    在上述两种情况下，如果DI代码重新执行时约束仍然被违反，那么显然应该禁止该事务提交。


    那么，如何安排DI代码在事务结束时执行呢？实际上，你无法直接实现这一点；在Oracle的DBMS中，没有办法达到此目的。一个能够让你实现此功能的本应是*提交触发器*的概念。提交触发器会在提交之前、作为系统提交过程的一部分被触发，并且它可以检查事务即将提交的最终状态。通过将DI代码嵌入此触发器中，你可以重新检查后续DML语句是否已解决所有临时的约束违反。只有在这种情况下，触发器才允许提交过程成功。不幸的是，DBMS并未提供提交触发器的概念。


    然而，有另一种方法可以让你重新执行暂时被违反的约束的DI代码。在本节剩余部分，我们将概述如何修改执行模型`EM6`以支持延迟检查。


    ## 修改执行模型以支持延迟检查


    请看表 11-6。它描述了一个执行了四条DML语句的事务。


    `DML1`涉及约束`C1`，该约束已被标识为可延迟约束。


    **表 11-6.** 重新执行延迟约束`C1`的DI代码


    | TX | 注释 |

    | :--- | :--- |

    | `DML1;` | 涉及约束`C1`；DI代码触发并发现`DML1`违反了它。DI代码允许此操作。 |

    | `DML2;` | 其他约束的DI代码执行。`C1`的DI代码被重新执行；发现`C1`仍然违反。 |

    | `DML3;` | 其他约束的DI代码执行。`C1`被重新检查；DI代码现在发现`C1`已满足。 |

    | `DML4;` | 其他约束的DI代码执行。不再重新检查`C1`。 |

    | `COMMIT;` | |


    `DML1`语句引入了对约束`C1`的违反。由于`C1`已被标识为可延迟的，其DI代码不会引发错误以强制回滚`DML1`。相反，它会将`C1`当前被违反的事实信息存储在此事务上下文中的某处。


    当执行`DML2`时，可能涉及其他各种（不可延迟的）约束，这些约束的DI代码会相应地执行。在我们修改后的执行模型中，随后会检查事务的上下文，以找出某些约束当前是否被违反。如果发现这样的约束，那么修改后的执行模型现在也会重新执行此约束的DI代码。如果重新检查时发现约束仍然违反，则上下文保持不变。如果重新检查时发现约束已满足，则上下文将被修改以反映约束`C1`不再违反。


    在上述场景中，语句`DML3`修复了约束`C1`的违反。当执行`DML4`时，执行模型现在不再为`C1`重新执行DI代码。


    上述场景向你展示了，你可以使用后续DML语句触发的触发器来重新检查先前DML语句违反的可延迟约束。


    现在你还面临一个挑战。当事务上下文仍持有表明一个或多个可延迟约束处于违反状态的信息时，能否阻止提交成功执行？答案是肯定的，你可以。'
  raw: 'If a DML statement, say DML1, introduces a violation within a transaction,
    then there must be a subsequent DML statement within the same transaction, say
    DML2, that corrects the violation introduced by DML1 prior to the end of the transaction.
    On execution of DML1, you would either


    • Not want to execute the involved DI code at all, but instead *schedule* it to
    be executed at the end of the transaction, or


    • Have the involved DI code execute in such a way that only if it detects a violation
    is it scheduled to be *re-executed* at the end of the transaction.


    In both cases, if on re-execution of the DI code the constraint is still found
    to be violated, then the transaction should obviously be prohibited from committing.


    So, how do you schedule DI code to be executed at the end of a transaction? Well,
    you don’t; there is no way to achieve this in Oracle’s DBMS. A concept enabling
    you to do this would have been the concept of a *commit trigger*. A commit trigger
    would fire just prior, as part of the system commit procedure, and it could check
    the end state that is about to be committed by the transaction. By embedding DI
    code into this trigger, you could recheck whether subsequent DML statements have
    resolved all temporary violations of constraints. Only if this is the case does
    the trigger allow the commit procedure to succeed. Unfortunately, the DBMS


    doesn’t offer the concept of a commit trigger.


    However, there is another way that allows you to re-execute DI code of a temporarily
    violated constraint. In the remainder of this section, we’ll provide you with
    an outline of how you could modify execution model EM6 to also cater for deferred
    checking.


    Take a look at Table 11-6\. It describes a transaction that executes four DML
    statements.


    Statement DML1 involves constraint C1, which has been identified as a deferrable
    constraint.


    7451CH11.qxd 5/15/07 2:26 PM Page 301


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    **301**


    **Table 11-6.** *Re-Executing DI Code of Deferred Constraint C1*


    **TX**


    **Comment**


    DML1;


    Involves constraint C1; DI code fires and finds that DML1 violates it. DI code
    allows this.


    DML2;


    DI code of other constraints executes. C1 DI code is re-executed; finds C1 is
    still in violation.


    DML3;


    DI code of other constraints executes. C1 is rechecked; DI code now finds C1 is
    satisfied.


    DML4;


    DI code of other constraints executes. C1 is no longer rechecked.


    COMMIT;


    Statement DML1 introduces a violation of constraint C1\. Because C1 has been identified
    as deferrable, its DI code will not raise an error to force a rollback of DML1\.
    Instead, it stores information about the fact that C1 is currently violated somewhere
    inside the context of this transaction.


    When DML2 is executed, various other (non-deferrable) constraints might be involved,
    and the DI code for those constraints is executed accordingly. In our modified
    execution model, this is now followed by a check of the transaction’s context
    to find out if certain constraints are currently violated. If such a constraint
    is found, then the modified execution model will now also re-execute the DI code
    of this constraint. If on recheck the constraint is found to still be in violation,
    then the context remains unchanged. If on recheck the constraint is found to be
    satisfied, then the context will be modified to reflect that constraint C1 is
    no longer in violation.


    In the preceding scenario, statement DML3 repairs the violation of constraint
    C1\. When DML4 is executed, the execution model now no longer re-executes the
    DI code for C1.


    The preceding scenario shows you that you can use the triggers that fire for subsequent
    DML statements to recheck a deferrable constraint that a preceding DML statement
    violated.


    You have one challenge left now. Can you prevent a commit from successfully executing
    when the transaction context still holds information stating that one or more
    deferrable constraints are in violation? The answer is yes, you can.'
