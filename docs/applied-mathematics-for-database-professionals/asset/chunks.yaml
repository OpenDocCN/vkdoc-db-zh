    For this, we introduce the *attribute renaming* operator; Definition 5-5 formally
    defines this operator.


    **■Definition 5-5: The Attribute Renaming Operator** Let T be a table and f be
    a function. The renaming of attributes in T according to f (notation T◊◊f) is
    defined as follows: T◊◊f := { t◊f | t∈T }.


    You can view the attribute renaming operator as a version of the function composition
    operator that has been lifted to the table level.


    Using this operator, we can rename attribute deptno in T6 to dept# as follows:
    T6◊◊{(empno;empno),(ename;ename),(job;job),(sal;sal),(dept#;deptno)}


    Note that the renaming function f holds an ordered pair for every attribute in
    the heading of T6\. All second coordinates in the ordered pairs represent the
    current attribute names of the table. Only if an attribute needs to be renamed
    do the first and second coordinates of the ordered pair differ; the first coordinate
    will have the new name for the attribute.


    **Extension**


    Sometimes you want to add attributes to a given table. You want to introduce new
    attributes to the heading of the table, and supply values for these new attributes
    for every tuple in the table. Performing this type of operation on a table is
    referred to as *extending the table*, or performing *table extension*. Table extension
    does not require a new mathematical symbol; you can simply use the predicative
    method to specify a new set of tuples (that is, a new table) that’s based on the
    given table.


    Let’s take a look at an example of table extension. Figure 5-8 shows two tables.
    The one at the left is a table over {empno,ename}; it is the result of projecting
    table T6 (see Figure 5-5) on


    {empno,ename}. We’ll name this table T9\. The one at the right (T10) represents
    the extension of T9 with the attribute initial. For every tuple, the value of
    this attribute is equal to the first character of the value of attribute ename.


    **■Note** We’ll be using a function called substr to yield a substring from a
    given string. The expression substr(<some string value>,n,m) represents the substring
    of <some string value> that starts at position n and is m characters long. For
    instance, the expression substr(''I like this book'',13,4) is equal to the string
    value ''book''.


