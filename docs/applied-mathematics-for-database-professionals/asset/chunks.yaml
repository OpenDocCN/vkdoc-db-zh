    你明白这个定义是做什么的吗？并集 `∪A` 的结果包含所有出现在某个集合（例如 `A` 的一个元素 `Ai`）中的元素 `x`。请记住，为了使此定义有效，集合
    `A` 的每个元素都必须是一个集合。


    如果你看下面的例子，你会发现这个“集合的并集”确实是一个比我们迄今为止使用的二元并集运算符更强大和通用的并集运算符，因为现在你可以用一个方便的简写符号来产生任意数量集合的并集。在这些例子中，`S`
    和 `T` 代表一个集合：


    `∪{S} = S`


    `∪{S,T} = S∪T`


    `∪∅ = ∅`


    `∪℘S = S`


