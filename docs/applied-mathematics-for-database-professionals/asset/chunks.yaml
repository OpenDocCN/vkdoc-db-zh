    Given table T11 and T6, you can formally specify table T12 as follows: T12 :=
    { d ∪ { (emps;#{ e | e∈T6 ∧ e(deptno)=d(deptno)}) } | d∈T11 }


    Here we’ve used the cardinality operator (symbol #) to count the number of employees
    in each department.


    **Aggregation**


    Aggregate operators operate on a set. They yield a (numeric) value by aggregation,
    of some expression, over all elements in the set. There are five common aggregate
    operators: *sum*, *average*, *count*, *minimum*, and *maximum*.


    You were introduced to the sum operator in Chapter 2; you might quickly want to
    revisit Definition 2-12\. You can apply the sum operator to a table. Here is an
    example. Given table T6


    (see Figure 5-5), here is an expression yielding the sum of all salaries of employees
    working for the research department (deptno=10):


    (SUM x∈{ t | t∈T6 ∧ t(deptno)=10 }: x(sal))


    The resulting value of the preceding sum aggregation is 24100\. Now take a look
    at the following expression that again uses table T6:


    { e1 ∪ {(sumsal;(SUM x∈{ e2 | e2∈T6 ∧ e2(deptno)=e1(deptno) }: x(sal)))}


    | e1 ∈ T6⇓{deptno} }


    Here we first project T6 on {deptno} and then extend the resulting table with
    a sumsal attribute. For every tuple in this resulting table, we determine the
    value of this new attribute by computing the sum of the salaries of all employees
    who work in the department corresponding to the department represented by the
    tuple. Figure 5-10 shows the result of this expression.


    **Figure 5-10.** *Sum of T6, salaries per department* We don’t need to introduce
    a new definition for the count operator. We can simply use the set-theory symbol
    # (cardinality) to count the elements of a set. You already saw an example of
    this in the preceding “Extension” section; the formal specification of T12 is
    an example of the count aggregate operator.


    Definition 5-6 defines the average aggregate operator.


    7451CH05.qxd 5/4/07 3:57 PM Page 112


    **112**


    C H A P T E R 5 **■** TA B L E S A N D D ATA B A S E S TAT E S


    **■Definition 5-6: The Average Operator (AVG)** The average of an expression f(x),
    where x is chosen from a given, non-empty set S, and f represents an arbitrary
    numeric function over x, is denoted as follows:


    (AVG x∈S: f(x))


    For every element x that can be chosen from set S, the average operator evaluates
    expression f(x) and computes the average of all such evaluations. Note that this
    operator is not defined in case S is the empty set.


    In the same way as earlier, Definition 5-7 defines the maximum (MAX) and minimum
    (MIN) aggregate operators.


    **■Definition 5-7: The Maximum (MAX) and Minimum (MIN) Operators** The maximum
    and minimum of an expression f(x), where x is chosen from a given, non-empty set
    S, and f represents an arbitrary numeric function over x, are respectively denoted
    as follows: (MAX x∈S: f(x)) and (MIN x∈S: f(x))


    For every element x that can be chosen from set S, the maximum and minimum operators
    evaluate expression f(x) and compute the maximum, or respectively the minimum,
    of all such evaluations. Note that these operators are also not defined in case
    S is the empty set.'
