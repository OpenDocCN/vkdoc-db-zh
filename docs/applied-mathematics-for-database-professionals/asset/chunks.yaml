    # 前言


    ## 第十一章：理论与实践


    作者们在第十一章中从理论转向了实践。这里他们专门讨论*当前的*实践，展示如何通过一个著名的 `SQL` 实现，将第二部分描述的理论解决方案转化为具体的语法。在这样做时，他们不仅要面对
    `SQL` 众所周知偏离理论之处（尤其是偏离该理论中使用的经典逻辑），还要面对该语言许多实现中一些令人担忧的进一步缺陷。因此，本章可以被视为对 `DBMS`
    厂商一个**隐约可见的警钟**。我们愿借此机会，稍稍揭开这层面纱。


    作者示例解决方案所揭示的两个缺陷是：(a) 在表达声明式数据库约束的能力上存在严重限制，以及 (b) 对可串行性缺乏适当支持。如果一个 `DBMS` 没有缺陷
    (a)，那么缺陷 (b) 只有在声明式约束会导致不可接受的性能时才显现出来。在这种情况下，可能需要定制编写的程序（最好是触发器程序）作为变通方法。正如作者雄辩地证明的那样，此类程序需要非常仔细的设计，因此它们容易犯上一些关系方法从一开始就明确旨在避免的错误。缺陷
    (b) 则通过要求这些程序的开发者在其中设计和实现某种形式的并发控制，加剧了这种风险。作者描述了一种方法，要求开发者首先设计一个适合数据库特定需求的锁方案，然后在程序内部，根据该方案在适当的点获取锁。如果
    `DBMS` 存在缺陷 (a)，那么无论性能考虑如何，都需要为更多约束编写过程式变通方法。最糟糕的情况显然是 `DBMS` 同时存在缺陷 (a) 和 (b)。鉴于当前的技术状况，作者认为不得不假设这种情况。在我们看来，一个存在缺陷
    (a) 的关系 `DBMS` 不是一个真正的关系 `DBMS`。（当然，我们也有其他理由声称没有任何 `SQL` `DBMS` 是关系 `DBMS`。）一个存在缺陷
    (b) 的 `DBMS` 不是一个真正的 `DBMS`。


    标准 `SQL` 通过允许在约束声明的 `CHECK` 子句中包含查询表达式，在声明式约束的支持上是**关系完备的**。


    然而，似乎很少有 `SQL` 产品实际支持这个特定的标准特性。


    作者对这种状况给出了一个礼貌的解释。这个解释是众所周知的：一个包含对可能非常大的数据库进行可能复杂查询的约束，评估起来可能耗时极长，并且在高事务吞吐率下可能需要频繁评估。我们尚不清楚——这是一个重要且有趣的研究课题——如何进行必要的优化，以便
    `DBMS` 能够沿着作者定制解决方案的思路，制定出高效的评估策略。当前，性能考量会阻碍拥有超大数据库和高事务吞吐率的大企业以声明方式表达有问题的约束。


    此类企业会雇佣——并且能够负担得起——软件专家来开发所需的定制程序。但是，那些拥有小数据库和低事务吞吐率的小企业呢？还有，那些即使包含了查询表达式（例如，可能只是一个简单的存在性测试）也能足够快地评估的约束呢？无论如何，我们的历史上充斥着一些好点子（例如，1960
    年代的 `FORTRAN`，1970 年代的关系模型），它们最初因性能权威的建议而被回避，但最终证明这些建议是错误的。随着岁月流逝，机器变得更快，内存变得更大，研究带来了新的解决方案。


    关于那个借口，就说到这么多。


    令人悲伤的是，Lex de Haan 未能活到完成这个合作项目。我们谨向 Toon Koppelaars 表示赞赏，感谢他在其朋友（也是我们的朋友）于 2006
    年初不幸去世后，独自承担的工作。


    Hugh Darwen 和 Chris Date


    ![](img/00001.jpeg)


    ![](img/00003.jpeg)


    # 关于作者


    ## Lex de Haan


    **Lex de Haan** 在荷兰代尔夫特理工大学学习应用数学。他与 `Oracle` 的渊源可以追溯到 1980 年代中期的版本 4。他从 1990
    年到 2004 年在 `Oracle Corp.` 担任过多种与教育相关的职位，最终在服务器技术部（`Oracle` 产品开发部门）担任高级 `DBA` 课程组的课程经理。在该职位上，他参与了
    `Oracle9i` 和 `Oracle Database 10g` 的开发。2004 年 3 月，他决定独立并创办了自己的公司 `Natural Join
    B.V.` (http://www.naturaljoin.nl)。从 1999 年直到 2006 年去世，他作为荷兰国家机构的成员参与了 `ISO` `SQL`
    语言标准化进程。他也是 `OakTable` 网络 (http://www.oaktable.net) 的创始成员之一。他撰写了广受好评的 *Mastering
    Oracle SQL and SQL\*Plus* (Apress, 2005)。


    ## Toon Koppelaars


    **Toon Koppelaars** 在荷兰埃因霍温理工大学学习计算机科学。他是 `Oracle` 技术的长期用户，自 1987 年以来一直使用 `Oracle`
    数据库和工具软件。在他的职业生涯中，他参与过应用程序开发（早期是终端/主机，后来是 `GUI` 客户端/服务器，现在则是 `J2EE`/Web 开发）以及数据库管理。他的兴趣领域包括性能调优（确保可伸缩性和
    `SQL` 调优）、以数据库为中心的应用程序架构设计以及数据库设计。


    在数据库设计领域，数据库设计的数学规范和健壮实现——即包括数据完整性约束（通常称为业务规则）——是他的特殊兴趣领域之一。他受雇于荷兰一家知名的 `Oracle`
    公司 `Centraal Boekhuis B.V.`，担任高级 `IT` 架构师。


    Toon 也是 `Oracle` 相关会议上的常客演讲者。


