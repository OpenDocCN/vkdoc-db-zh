- fmt: "### **Tuple Constraints for GRD, MEMP, CRS, and OFFR Table Structures**\n\n\
    **Listing 11-25.** Tuple Constraints for GRD Table Structure\n```sql\nalter table\
    \ GRD add constraint grd_chk_bndw check (llimit <= (ulimit - 500));\nalter table\
    \ GRD add constraint grd_chk_bon2 check (bonus < llimit);\n```\n\n**Listing 11-26.**\
    \ Tuple Constraints for MEMP Table Structure\n```sql\nalter table MEMP add constraint\
    \ mmp_chk_cycl check (empno <> mgr);\n```\n\n**Listing 11-27.** Tuple Constraints\
    \ for CRS Table Structure\n```sql\nalter table CRS add constraint reg_chk_dur2\
    \ check ((cat <> 'BLD') or (dur <= 5));\n```\n\n**Listing 11-28.** Tuple Constraints\
    \ for OFFR Table Structure\n```sql\nalter table OFFR add constraint ofr_chk_trst\
    \ check (trainer is not null or status in ('CANC','SCHD'));\n```\n\nThe accompanying\
    \ formal specification for the tuple constraint stated in Listing 11-28 was the\
    \ following:\n\n```\ntup_OFFR :=\n{ o | o∈P(chr_OFFR) ∧\n/* Unassigned TRAINER\
    \ allowed only for certain STATUS values */\no(TRAINER) = -1 ⇒ o(STATUS)∈{'CANC','SCHD'}\n\
    }\n```\n\nAfter a rewrite of the implication into a disjunction, this changes\
    \ into the following:\n\n```\ntup_OFFR :=\n{ o | o∈P(chr_OFFR) ∧\n/* Unassigned\
    \ TRAINER allowed only for certain STATUS values */\no(TRAINER) ≠ -1 ∨ o(STATUS)∈{'CANC','SCHD'}\n\
    }\n```\n\nBecause we have decided to represent the `-1` with a `NULL` in the implementation\
    \ of the `OFFR` table structure (again for reasons that will be explained later\
    \ on), the first disjunct changes to `trainer is not null` in the preceding check\
    \ constraint.\n\nWe’ll end this section on implementing tuple constraints with\
    \ an observation that is also valid for the constraint classes that follow hereafter.\n\
    \nIt is good practice to write all tuple constraints in conjunctive normal form\
    \ (CNF; see the section “Normal Forms” in Chapter 3). This might require you to\
    \ apply various rewrite rules first. By rewriting a constraint into CNF, you’ll\
    \ end up with as many conjuncts as possible, where each conjunct represents a\
    \ separately implementable constraint. For tuple constraints, you would create\
    \ one declarative check constraint per conjunct. This in turn has the advantage\
    \ that the DBMS reports violations of tuple constraints in *as detailed a way\
    \ as possible*.\n\nLet’s explain this.\n\n**Note:** We again assume that SQL’s\
    \ 3VL behaves in a 2VL fashion because all columns that are involved in constraints\
    \ are mandatory.\n\nSuppose you create one check constraint for a tuple constraint\
    \ that is—when rewritten in CNF—of the form `A ∧ B`. When that check constraint\
    \ gets violated, all you know (in 2VL) is that `A ∧ B` is not `TRUE`. This, using\
    \ the laws of De Morgan, translates as either `A` is not `TRUE` or `B` is not\
    \ `TRUE`. Wouldn’t it be nicer if you knew exactly which one of the two was `FALSE`?\
    \ If you would have created two separate check constraints (one for `A` and one\
    \ for `B`), the DBMS could report which one of the two was causing the violation\
    \ (or maybe they both are). In other words, by rewriting a constraint specification\
    \ into CNF and implementing each conjunct separately, you’ll get more detailed\
    \ error messages.\n\nAs mentioned earlier, this observation also applies to the\
    \ constraint classes that follow (table, database, and transition).\n\n### **Table\
    \ Constraint Implementation Issues**\n\nUp until now, everything has been straightforward\
    \ concerning the implementation of data integrity constraints. However, when you\
    \ increase the scope from tuple constraints to table constraints, and thus start\
    \ dealing with constraints that span multiple tuples, implementing efficient DI\
    \ code rapidly becomes much more complex.\n\nThe main reason for this complexity\
    \ is the poor support for declaring these constraints to the DBMS. You can state\
    \ only two types of table constraints declaratively: uniquely identifying attributes\
    \ (keys) and subset requirements referencing back to the same table, in which\
    \ case a subset requirement is a table constraint (foreign key to the same table).\n\
    \nImplementing all other types of table constraints requires you to develop procedural\
    \ DI code. In practice, this means that you’ll often have to resort to the triggered\
    \ procedural strategy.\n\n**Note:** We think there’s a reason why DBMS vendors\
    \ offer us such poor declarative support. We’ll reveal this reason in the course\
    \ of this section.\n\nWe’ll introduce you to the complexity involved in implementing\
    \ table constraints by illustrating different DI code *execution models*. In the\
    \ first (rather large) subsection that follows, we’ll illustrate six different\
    \ execution models, ranging from very inefficient to more efficient.\n\nAs you’ll\
    \ see, implementing more efficient execution models for DI code is also more complex.\n\
    \nTo explain every execution model clearly, we’ll be using two example table constraints\
    \ and show how these constraints are implemented in every execution model. The\
    \ constraints we’ll use are the last one specified in table universe `tab_EMP`\
    \ in Listing 7-26 and the last one specified in table universe `tab_DEPT` in Listing\
    \ 7-30. For your convenience, we repeat the formal specifications of these two\
    \ constraints here (note that in these specifications `E` represents an employee\
    \ table and `D` represents a department table).\n\n```\n/* A department that employs\
    \ the president or a manager */\n/* should also employ at least one administrator\
    \ */\n( ∀d∈E⇓{DEPTNO}:\n  ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {'PRESIDENT','MANAGER'}\
    \ )\n  ⇒\n  ( ∃e3∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = 'ADMIN' )\n)\n\n/* You\
    \ cannot manage more than two departments */\n( ∀m∈D⇓{MGR}: #{ d | d∈D ∧ d(MGR)\
    \ = m(MGR) } ≤ 2 )\n```\n\nNext to implementing an efficient execution model,\
    \ another—rather serious—issue comes into play when implementing DI code for table\
    \ constraints. This concerns *transaction serialization*. Given that Oracle’s\
    \ SQL DBMS can execute transactions concurrently, you must ensure that the queries\
    \ inside DI code for a given constraint are executed in a serializable way: Oracle’s\
    \ SQL DBMS does not guarantee serializability. We’ll explain this issue to you\
    \ in detail in the section “DI Code Serialization.”\n\n### **DI Code Execution\
    \ Models**\n\nThis section will discuss various execution models for implementing\
    \ DI code for table constraints following the triggered procedural strategy. However,\
    \ before doing so we’ll first provide you with a few preliminary observations\
    \ with regards to the timing of DI code execution in relation to the DML statement\
    \ execution.\n\n#### **Some Observations**\n\nWith an SQL DBMS, you update the\
    \ database by executing `INSERT`, `UPDATE`, or `DELETE` statements. Each of these\
    \ statements operates on just one target table structure in just one manner—it’s\
