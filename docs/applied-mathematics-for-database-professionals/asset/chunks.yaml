  trans: '

    ### 练习 1


    **a.** 该命题指出，表 `PAR1` 中所有偶数编号部件的价格都小于或等于 15。这是一个 **真** 命题。


    **b.** 如果你将这个命题重写为全称量化形式，你会发现它声称所有部件的价格都是 5 且当前都有库存。显然，这是一个 **假** 命题。


    **c.** 如果你将这个蕴涵式重写为析取式，你会发现该命题指出 `PAR1` 表中有六个部件，其库存数量小于等于 10，或者成本小于等于 10。这是一个
    **真** 命题；`PAR1` 表中的所有六个部件都满足该蕴涵式。


    ### 练习 4


    这涉及指定三个子集要求和一个附加约束，以声明 `EMP1` 中的每个元组在其中一个特化关系中都有对应的元组。


    ```

    TRN1⇓{empno} ⊆ EMP1⇓{empno} ∧

    MAN1⇓{empno} ⊆ EMP1⇓{empno} ∧

    CLK1⇓{empno} ⊆ EMP1⇓{empno} ∧

    (∀ e∈EMP1: e(job)=''TRAINER''⇒(∃ t∈TRN1: t(empno)=e(empno)) ∧

    e(job)=''MANAGER''⇒(∃ m∈MAN1: m(empno)=e(empno)) ∧

    e(job)=''CLERK''

    ⇒(∃ c∈CLK1: c(empno)=e(empno)))

    ```


    ### 练习 5


    这涉及指定三个子集要求和一些附加约束，以声明 `EMP1` 中的所有元组都被其特化关系中的**恰好一个**元组所覆盖。


    ```

    TRN1⇓{empno} ⊆ EMP1⇓{empno} ∧

    MAN1⇓{empno} ⊆ EMP1⇓{empno} ∧

    CLK1⇓{empno} ⊆ EMP1⇓{empno} ∧

    TRN1⇓{empno} ∩ MAN1⇓{empno} = ∅ ∧

    TRN1⇓{empno} ∩ CLK1⇓{empno} = ∅ ∧

    MAN1⇓{empno} ∩ CLK1⇓{empno} = ∅ ∧

    #EMP1 = #TRN1 + #MGR1 + #CLK1

    ```


    ### 练习 7


    这是一个元组-连接谓词。我们根据 `empno` 属性连接 `EMP1` 和 `CLK1`，然后根据 `manager` 属性（这需要属性重命名）连接回 `EMP1`。


    ```

    (∀ e∈(EMP1⊗CLK1)⊗(EMP1◊◊{(manager;empno),(m_deptno;deptno)}): e(deptno)=e(m_deptno))

    ```


    这是一个 **假** 命题；职员 105 和 107 的经理在不同的部门工作。


    ## 第 7 章答案


    ### 练习 2


    谓词 `o(STATUS)=''CONF'' ⇒ o(TRAINER)≠-1` 等价于谓词 `o(TRAINER)=-1 ⇒ o(STATUS)∈{''CANC'',''SCHD''}`。这体现了以下重写规则：`(A
    ⇒ B) ⇔ (¬B ⇒ ¬A)`


    因此，你的回答应该是：添加该元组约束没有带来任何新的限制。


    ### 练习 3


    ```

    tab_MEMP :=

    { M | M∈℘(tup_MEMP) ∧

    /* EMPNO 唯一标识一个元组 */

    ( ∀m1,m2∈M: m1(EMPNO) = m2(EMPNO) ⇒ m1 = m2 ) ∧

    ( ∀m∈M: |{ e| e∈M ∧ e(MGR)=m(MGR) }| ≤ 10 )

    }

    ```


    在设计此约束时，你可能需要与用户确认 `TERM` 表结构是否应在此约束中发挥作用。


    ### 练习 6


    在 `tab_RESULT`（见清单 7-25）的十三个元素中，只有以下两个可以与给定的 `LIMIT` 表组合：


    ```

    { ∅

    , { { (POPULATION;''DP''),

    (COURSE;''set theory''), (AVG_SCORE;''C'') }

    , { (POPULATION;''DP''),

    (COURSE;''logic''),

    (AVG_SCORE;''B'') }

    , { (POPULATION;''NON-DP''), (COURSE;''set theory''), (AVG_SCORE;''E'') }

    , { (POPULATION;''NON-DP''), (COURSE;''logic''),

    (AVG_SCORE;''D'') } }

    }

    ```


    所有其他结果表要么有数据库专业人士（DP）的平均成绩为 A，要么有非数据库专业人士的平均成绩为 F；这些都被 `DB_U2` 中给定的数据库约束所禁止。


    ### 练习 7


    你可以通过以下方式表达：对于每个部门经理，其所属部门的部门编号必须是该经理所管理部门的部门编号集合中的一个元素。


    ```

    PTIJ5(EMP,DEPT) :=

    ( ∀d1∈DEPT⇓{MGR}: ↵{ e(DEPTNO)| e∈EMP ∧ e(EMPNO)=d1(MGR)} ∈

    { d2(DEPTNO)| d2∈DEPT ∧ d2(mgr)=d1(mgr) } )

    ```


    注意，这现在不再是一个元组-连接谓词。


    ### 练习 9


    约束 `PTIJ3` 和 `PTIJ4` 防止了这些循环。


    ### 练习 11


    给定的约束抽象地具有以下形式：`(∀o∈OFFR: (P(o) ⇒ (Q(o,REG) ∧ R(o,OFFR)))`


    这里 `P`、`Q` 和 `R` 是谓词，其自由变量分别为 `o`、`o` 加 `REG`，以及 `o` 加 `OFFR`。你可以将该谓词形式重写为：


    `(∀o∈OFFR: (P(o) ⇒ Q(o,REG)) ∧ (P(o) ⇒ R(o,OFFR)))`


    你进而可以将其重写为以下合取式：`(∀o∈OFFR: P(o) ⇒ Q(o,REG)) ∧ (∀o∈OFFR: P(o) ⇒ R(o,OFFR))`


    注意，第二个合取项现在只涉及 `OFFR` 表结构，因此是一个表谓词。


    ## 第 8 章答案


