    \ 中的元组限制了 `RESULT` 的可接受表。我们将通过数据库约束来精确指定它们是如何限制的。\n\n清单 7-36 指定了特征 `chr_LIMIT`、元组宇宙\
    \ `tup_LIMIT` 和表宇宙 `tab_LIMIT`。\n\n**清单 7-36.** `chr_LIMIT`、`tup_LIMIT` 和 `tab_LIMIT`\
    \ 的规范\n\n```\nchr_LIMIT :=\n{ ( POPULATION; {'DP','NON-DP'} )\n, ( SCORE; {'A','F'}\
    \ )\n}\n\ntup_LIMIT :=\n{ l | l∈Π(chr_LIMIT) ∧\n  l(POPULATION) = 'DP' ⇒ l(SCORE)\
    \ = 'A' ∧\n  l(POPULATION) = 'NON-DP' ⇒ l(SCORE) = 'F'\n}\n\ntab_LIMIT :=\n{ L\
    \ | L∈℘(tup_LIMIT) ∧\n  ( ∀l1,l2∈L: l1(POPULATION) = l2(POPULATION) ⇒ l1 = l2\
    \ )\n}\n```\n\n`LIMIT` 的元组宇宙和表宇宙都是相当小的集合。以下是它们两者的枚举式规范：\n\n```\ntup_LIMIT = {\
    \ { (POPULATION;'DP') , (SCORE;'A') }\n            , { (POPULATION;'NON-DP'),\
    \ (SCORE;'F') } }\n\ntab_LIMIT = { ∅\n            , { { (POPULATION;'DP') , (SCORE;'A')\
    \ } }\n            , { { (POPULATION;'NON-DP'), (SCORE;'F') } }\n            ,\
    \ { { (POPULATION;'DP') , (SCORE;'A') }\n              , { (POPULATION;'NON-DP'),\
    \ (SCORE;'F') } }\n            }\n```\n\n如你所见，只有四个可接受的 `LIMIT` 表：空表、两个包含一个元组的表和一个包含两个元组的表。\n\
    \n**注意：** `tab_LIMIT` 规范中的唯一标识表约束实际上是冗余的。它是由元组约束和特征隐含的。\n\n图 7-4 使用表的简写符号显示了 `tab_LIMIT`。\n\
    \n**图 7-4.** 使用表简写符号对 `tab_LIMIT` 的枚举式规范\n\n给定这两个表结构，我们现在可以看一下一个数据库状态。图 7-5 显示了一个名为\
    \ `DBS1` 的数据库状态，它涉及 `RESULT` 和 `LIMIT` 表结构。\n\n**图 7-5.** 数据库状态 `DBS1`\n\n如你所见，它是一个包含两个对的函数。第一个有序对的第二个坐标是一个可接受的\
    \ `RESULT` 表（即 `tab_RESULT` 的一个元素）。同样，第二个有序对的第二个坐标是一个可接受的 `LIMIT` 表（即 `tab_LIMIT`\
    \ 的一个元素）。\n\n这些表可以通过它们的表结构名称访问：作为第一个坐标出现的值 `RESULT` 和 `LIMIT`。使用 `DBS1` 的定义，你可以编写诸如\
    \ `DBS1(RESULT)` 和 `DBS1(LIMIT)` 的表达式，它们分别产生显示的 `RESULT` 和 `LIMIT` 表。\n\n现在看一下以下名为\
