    **Four-Valued Logic**


    In E. F. Codd’s *The Relational Model for Database Management: Version 2* (Addison-Wesley,
    1990), he proposes a revision of the first version of the relational model, RM/V1\.
    Earlier, in 1979, he presented a paper in Tasmania with the title “Extending the
    Database Relational Model to Capture More Meaning,” naming the extended version
    RM/T (T for Tasmania). The features of RM/T were supposed to be gradually incorporated
    into the sequence of versions RM/V2, RM/V3, and so on.


    The most debatable sections of the RM/V2 book are Chapter 8 (“Missing Information”)
    and Section 12.4 (“Manipulation of Missing Information”). In these sections, Codd
    proposes a 4VL in an attempt to make a distinction between the two most common
    reasons why information is missing: applicable and inapplicable, represented with
    the two discernible values A and I, respectively. The truth tables he provides
