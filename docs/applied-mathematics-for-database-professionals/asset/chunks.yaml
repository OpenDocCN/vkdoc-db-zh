    ## Listing 9-8. Query `EXQ8(dbs)`


    **FEa**:

    ```

    { d↓{DEPTNO,DNAME} ∪

    { (RICHEMP; { e1↓{EMPNO,ENAME,MSAL} | e1∈dbs(EMP) ∧ e1(DEPTNO)=d(DEPTNO) ∧

    ¬(∃e2∈dbs(EMP): e2(DEPTNO)=e1(DEPTNO) ∧

    e2(MSAL)>e1(MSAL)) }

    )

    }

    | d∈dbs(DEPT) }

    ```


    **FEb**:

    ```

    dbs(DEPT)⇓{DEPTNO,DNAME}⊗

    { e1↓{EMPNO,ENAME,MSAL,DEPTNO} | e1∈dbs(EMP) ∧

    ¬(∃e2∈dbs(EMP): e2(DEPTNO)=e1(DEPTNO) ∧

    e2(MSAL)>e1(MSAL)) }

    ```


    **FEc**:

    ```

    dbs(DEPT)⇓{DEPTNO,DNAME}⊗

    { e1↓{EMPNO,ENAME,MSAL,DEPTNO} | e1∈dbs(EMP) ∧

    (∀e2∈dbs(EMP): e2(DEPTNO)=e1(DEPTNO) ⇒

    e2(MSAL)≤e1(MSAL)) }

    ```


    **SEI**:

    ```

    select d.DEPTNO, d.DNAME

    ,cursor(select e1.EMPNO, e1.ENAME, e1.MSAL

    from EMP e1

    where e1.DEPTNO = d.DEPTNO

    and not exists(select e2.*

    from EMP e2

    where e2.DEPTNO = e1.DEPTNO

    and e2.MSAL > e1.MSAL)) as RICHEMP

    from DEPT d

    ```


    **SEII**:

    ```

    select d.DEPTNO, d.DNAME, e.EMPNO, e.ENAME, e.MSAL

    from DEPT d

    ,(select e1.EMPNO,e1.ENAME,e1.MSAL,e1.DEPTNO

    from EMP e1

    where not exists(select e2.*

    from EMP e2

    where e2.DEPTNO = e1.DEPTNO

    and e2.MSAL > e1.MSAL)) e

    where d.DEPTNO = e.DEPTNO

    ```


    The next query retrieves for each department the employee who has the highest
    salary within that department. Note that it’s possible for two or more employees
    to have that same highest salary. Listing 9-8 gives for each department (`DEPTNO`
    and `DNAME`) the one or more employees (`EMPNO`, `ENAME`, and `MSAL`) within that
    department who have the highest salary.


    Note the difference in structure of the result sets specified by `FEa` and `FEb`.
    Query `FEa` returns a table over `{DEPTNO,DNAME,RICHEMP}`; one tuple per department
    is returned (empty departments are returned too). Under attribute `RICHEMP`, a
    nested table over `{EMPNO,ENAME,MSAL}` is returned. Attribute `RICHEMP` holds
    the set of employee tuples (limited to three attributes) that represent the employees
    with the highest salary in that department. Query `FEb` returns a table over `{DEPTNO,DNAME,EMPNO,ENAME,MSAL}`.
    This query doesn’t return empty departments. Also, if multiple employees all earn
    the same highest salary within a department, then the department data is repeated
    for these employees.


    Let’s clarify this further by giving example tables for `dbs(DEPT)` and `dbs(EMP)`.
    Figure 9-1 shows projected versions of a department and an employee table in some
    given state `dbs` of `DB_UEX`.


    ## Figure 9-1. Example department and employee tables


    Given these two tables, version `FEa` for query `EXQ8` would return the following
    set:

    ```

    { {(DEPTNO;10), (DNAME;''RESEARCH''),

    (RICHEMP; { {(EMPNO;1002), (ENAME;''SUSAN''), (MSAL;5500)}

    ,{(EMPNO;1003), (ENAME;''BRITNEY''), (MSAL;5500)} })}

    }

    ,{(DEPTNO;11), (DNAME;''SALES''), (RICHEMP;∅)}

    ,{(DEPTNO;12), (DNAME;''MARKETING''),

    (RICHEMP; { {(EMPNO;1005), (ENAME;''DEBBY''), (MSAL;6200)} })}

    }

    ```


    Version `FEb` would return this set:

    ```

    { {(DEPTNO;10), (DNAME;''RESEARCH''), (EMPNO;1002), (ENAME;''SUSAN''), (MSAL;5500)}

    ,{(DEPTNO;10), (DNAME;''RESEARCH''), (EMPNO;1003), (ENAME;''BRITNEY''),(MSAL;5500)}

    ,{(DEPTNO;12), (DNAME;''MARKETING''),(EMPNO;1005), (ENAME;''DEBBY''), (MSAL;6200)}

    }

    ```


    Specification `FEc` once more demonstrates the rewriting of a quantifier; it differs
    from `FEb` in that the existential quantifier is rewritten into a universal quantifier.


    SQL expression `SEI` demonstrates that a specification such as `FEa` can be translated
    directly into SQL. By using the keyword `cursor`, you indicate that a subquery
    employed within the `SELECT` clause can potentially return multiple rows. SQL
    expression `SEII` is a direct translation for `FEb`; it employs a subquery within
    the `FROM` clause.


    **Note** In Listing 9-9 that follows, we use a function `to_year` in expressions
    `FEa` and `FEb`. This function is defined to return the year component of a given
    date value. In Oracle SQL, you can achieve the same through the `to_char` function,
    as demonstrated in `SEI` and `SEII`.


    Listing 9-9 gives the employees (`EMPNO` and `ENAME`) who attended at least one
    offering of every course that was given by trainer “De Haan” (employee number
    1206) in 2003.'
