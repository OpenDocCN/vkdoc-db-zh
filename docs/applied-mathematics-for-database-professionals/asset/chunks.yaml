- fmt: 'The body of the trigger (that is, the procedural code between `declare` and
    `end`), shown in `Listing 11-2`, represents the `how` of this constraint. First
    a query is executed to retrieve the number of presidents in the `EMP` table. Then,
    if this number is more than one, the trigger generates an error by calling `raise_application_error()`.
    This call raises an SQL exception, which in turn forces the triggering `DML` statement
    to fail and the changes it made to be undone. In this case, the `DBMS` will perform
    this `DML` statement rollback for you, contrary to the embedded procedural strategy
    that’s described hereafter.


    Note that it would be inefficient to have this trigger also fire for `DELETE`
    statements. This particular constraint cannot be violated when a transaction deletes
    rows from the `EMP` table structure; if there is at most one president before
    deleting a row from `EMP`, then there will still be at most one president after
    deletion of the row.


    In the triggered procedural strategy, you—the `DI` code developer—need to think
    about not only when `DI` code `should be run`, but also when it would be `unnecessary
    to run` `DI` code.


    This is part of ensuring that `DI` code is efficiently implemented. Of course,
    in the declarative strategy you needn’t think about either of these things.


    `■Note` The trigger in `Listing 11-2` now fires for every type of `INSERT` and
    every type of `UPDATE` statement executed against the `EMP` table structure. This
    is still rather inefficient. For instance, if you insert a new clerk or update
    the monthly salary of some employee, the trigger really needn’t be run. In both
    of these cases (similar to a `DELETE` statement, discussed earlier) the triggering
    `DML` statement can never violate the constraint.


    Apart from being suboptimal in terms of efficiency, we need to address a more
    serious issue about the trigger in `Listing 11-2`: it is not complete when it
    comes to implementing the given constraint. There are still issues, which we will
    address in more detail in the section “Table Constraint Implementation Issues,”
    in the area of transactions executing concurrently.


    ## Embedded Procedural


    Finally, in the `embedded procedural` strategy to implement `DI` code, you again
    need to write the `DI` code (the `how`) yourself. Instead of creating triggers
    that call your `DI` code, you now embed the `DI` code into the `wBL` code modules
    that hold the `DML` statements that might cause constraints to be violated. `DI`
    code then executes as part of the execution of `wBL` code.


    This is probably by far the most used procedural strategy for implementing `DI`
    code in `WoD` applications.


    `■Note` In this case, “most used” strategy certainly doesn’t imply “best” strategy.


    Let’s take a look at an example. Assume the application supplies a page where
    the user can enter data for a new employee to be inserted. The user supplies attributes
    `ENAME`, `BORN`, `JOB`, and `DEPTNO`. The `BL` code determines the other employee
    attributes (`EMPNO`, `SGRADE`, `MSAL`, `HIRED`, and `USERNAME`) according to rules
    that were agreed upon with the users. `Listing 11-3` lists the procedure the `UI`
    code calls to insert a new employee. It holds `BL` code first to determine the
    other employee attributes, and then executes an `INSERT` statement. Immediately
    following this `INSERT` statement, the `BL` code runs embedded `DI` code to ensure
    the “at most one president” constraint remains satisfied.


    **Listing 11-3.** *Embedding DI Code in wBL Code*


    ```

    create procedure p_new_employee

    (p_ename in varchar

    ,p_born in date

    ,p_job in varchar

    ,p_deptno in number) as

    --

    pl_sgrade number;

    pl_msal number;

    pl_hired date;

    pl_username varchar(15);

    --

    begin

    -- Determine monthly start salary.

    select grade, llimit into pl_sgrade, pl_msal

    from grd

    where grade = case p_job

    when ''ADMIN'' then 1

    when ''TRAINER'' then 3

    when ''SALESREP'' then 5

    when ''MANAGER'' then 7

    when ''PRESIDENT'' then 9;

    -- Determine date hired.

    pl_hired := trunc(sysdate);

    -- Determine username.

    ```'
