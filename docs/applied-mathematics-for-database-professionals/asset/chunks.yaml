  trans: '

    您可以按如下方式声明从 `DEPT` 到 `EMP` 的外键：`alter table offr add constraint offr_fk_dept foreign
    key(loc) references dept(loc);`


    这个外键将确保只引用已知的员工；但它仍然允许管理员或总裁管理部门。目前无法通过声明方式指定只允许引用员工的一个子集；为此，您需要编写额外的过程式代码。


    类似的限制也适用于只需要引用另一表中行键值的行子集的情况。这在子集要求 `PSSR8` 中有所体现：`PSSR8(OFFR,EMP) :=`


    `/* 课程授课的讲师是已知的讲师 */`


    ```

    { o(TRAINER) | o∈OFFR ∧ o(TRAINER) ≠ -1 } ⊆

    { e(EMPNO) | e∈EMP ∧ e(JOB) = ''TRAINER'' }

    ```


    无法向 DBMS 声明，只有 `TRAINER≠-1` 的 `OFFR` 行子集中的每一行都引用一个已知的讲师。


    不过，这种情况有一种技巧可以应用。通过选择使用 `NULL` 而不是值 `-1` 来表示尚未分配讲师，您至少可以声明一个外键，以强制讲师分配必须引用一个已知的员工。同样，您仍然需要开发额外的过程式代码来在另一端实现限制（只允许引用
    `JOB=''TRAINER''` 的员工）。


    现在让我们花点时间研究一下；在构建额外的过程式代码之前，明智的做法是首先思考一下这里需要实现的剩余谓词是什么（给定外键已经为实现 `PSSR8` 做了一些工作）。更准确地说，您能将
    `PSSR8` 重写为一个合取式，其中一个合取项恰好涵盖外键已经通过声明方式实现的内容，而另一个合取项涵盖需要通过过程式代码实现的内容吗？如下所示。


    7451CH11.qxd 5/15/07 2:26 PM Page 293


    ## 第 11 章 ■ 在 ORACLE 中实现数据库设计


    293


    ```

    (∀o∈OFFR: o(TRAINER)≠-1 ⇒ (∃e∈EMP: e(empno)=o(trainer))) ∧

    (∀t∈(OFFR◊◊{(trainer;empno)})⊗EMP: t(job)=''TRAINER'')

    ```


    前面的第一个合取项表明，对于每个课程授课，分配的讲师应该是一个已知的员工；这代表了外键所实现的内容。第二个合取项表明，对于 `OFFR`（需要属性重命名）与
    `EMP` 的连接中的所有元组，`JOB` 属性应持有值 `''TRAINER''`；这代表了需要通过过程式代码实现的内容。顺便问一下，您认出第二个合取项的谓词模式了吗？它实际上是一个元组连接谓词。


    ### ■ 注意


    您可能凭直觉就能理解，第二个谓词正是为 `PSSR8` 需要通过过程式代码实现的部分。值得一提的是，您实际上可以形式化地证明前面的合取式在逻辑上等同于 `PSSR8`
    谓词。这需要开发更多关于量词的重写规则，以及关于如何建立形式化证明的一些概念（这两方面在本书中我们都未涉及）。


    过程式地实现数据库约束的方式与表约束类似；只是现在因为涉及多个表结构，需要开发更多的触发器。请看一下 `清单 11-40`。它列出了使用 `EM6`（包括序列化逻辑）实现前述剩余的元组连接谓词以完成
    `PSSR8` 实现所需的所有触发器。在这种情况下，您需要一个在 `EMP` 表结构上的 after statement update 触发器，以及一个在
    `OFFR` 表结构上的 after `INSERT` statement 触发器和 after statement update 触发器。


    `清单 11-40` 没有列出维护转换效果视图所必需的全局临时表、pre-statement 触发器、after row 触发器和视图定义；您需要以类似 `清单
    11-33` 所示的方式，为 `OFFR` 和 `EMP` 两个表结构设置这些。

    '
- fmt: "**Listing 11-40.** EM6 Implementation of DI Code for Remaining PSSR8 Predicate\n\
    \n```\ncreate trigger EMP_AUS_PSSR8\nafter update on EMP\ndeclare\n  pl_dummy\
    \ varchar(40);\nbegin\n  -- Changing a trainers job, requires validation of PSSR8.\n\
    \  for r in (select n_empno as empno\n            from v_emp_ute e\n         \
    \   where (e.0_empno=e.n_empno and e.n_job<>'TRAINER' and e.o_job='TRAINER') or\
    \ (e.0_empno<>e.n_empno and e.n_job<>'TRAINER')) loop\n    begin\n      -- Acquire\
    \ serialization lock.\n      p_request_lock('PSSR8'||to_char(r.empno));\n    \
    \  --\n      select 'Constraint PSSR8 is satisfied' into pl_dummy\n      from\
    \ DUAL\n      where not exists(select 'This employee is assigned as a trainer\
    \ to an offering'\n                       from OFFR o\n                      \
    \ where o.TRAINER = r.empno);\n      --\n    exception when no_data_found then\n\
    \      --\n      raise_application_error(-20999,'Constraint PSSR8 is violated\
    \ '||\n        'for employee '||to_char(r.empno)||'.');\n      --\n    end;\n\
    \  end loop;\n  --\nend;\n/\n\ncreate trigger OFFR_AIS_PSSR8\nafter insert on\
    \ OFFR\ndeclare\n  pl_dummy varchar(40);\nbegin\n  -- Inserting an offering, requires\
    \ validation of PSSR8.\n  for r in (select distinct trainer\n            from\
    \ v_offr_ite i)\n  loop\n    begin\n      -- Acquire serialization lock.\n   \
    \   p_request_lock('PSSR8'||to_char(r.trainer));\n      --\n      select 'Constraint\
    \ PSSR8 is satisfied' into pl_dummy\n      from DUAL\n      where not exists(select\
    \ 'This employee is not a trainer'\n                       from EMP e\n      \
    \                 where e.EMPNO = r.trainer\n                       and e.JOB\
    \ <> 'TRAINER');\n      --\n    exception when no_data_found then\n      --\n\
    \      raise_application_error(-20999,'Constraint PSSR8 is violated '||\n    \
    \    'for trainer '||to_char(r.trainer)||'.');\n      --\n    end;\n  end loop;\n\
    \  --\nend;\n/\n\ncreate trigger OFFR_AUS_PSSR8\nafter update on OFFR\ndeclare\n\
    \  pl_dummy varchar(40);\nbegin\n  -- Updating the trainer of an offering, requires\
    \ validation of PSSR8.\n  for r in (select distinct n_trainer as trainer\n   \
    \         from v_offr_ute u\n            where o_trainer<>n_trainer)\n  loop\n\
    \    begin\n      -- Acquire serialization lock.\n      p_request_lock('PSSR8'||to_char(r.trainer));\n\
    \      --\n      select 'Constraint PSSR8 is satisfied' into pl_dummy\n      from\
    \ DUAL\n      where not exists(select 'This employee is not a trainer'\n     \
    \                  from EMP e\n                       where e.EMPNO = r.trainer\n\
    \                       and e.JOB <> 'TRAINER');\n      --\n    exception when\
    \ no_data_found then\n      --\n      raise_application_error(-20999,'Constraint\
    \ PSSR8 is violated '||\n        'for trainer '||to_char(r.trainer)||'.');\n \
    \     --\n    end;\n  end loop;\n  --\nend;\n/\n```\n\nWe’ll end this section\
    \ with an observation about the poor declarative support for multi-tuple constraints\
    \ offered by DBMS vendors. Because we believe that it is not possible for a DBMS\
    \ vendor to program an algorithm that accepts an arbitrarily complex predicate\
    \ and then computes efficient TE queries, a minimal validation query, and optimal\
    \ serialization code to implement execution model EM6, we should not expect full\
    \ support for multi-tuple constraints—in a practical, usable and acceptable way—from\
    \ these vendors in the future. The best we can hope for is that database researchers\
    \ first come up with more common classes of constraints and develop convenient\
    \ shorthands for these. The DBMS vendors, in their turn, should then provide us\
    \ with new declarative constructs, consistent with these shorthands, to state\
    \ these common classes of constraints easily to the DBMS. Given such a common\
    \ class declaration, the DBMS vendor should be able to program an algorithm that\
    \ provides us with an EM6-like execution model under the covers to implement the\
    \ constraint.\n\n`Note` We’ve hinted at a few common classes of constraints in\
    \ this book for which DBMS vendors should offer us full declarative support: specialization,\
    \ generalization, and tuple-in-join constraints. Also, in the area of subset requirement\
    \ constraints—where we currently only have the SQL foreign key construct available\
    \ to us—more declarative variations should be offered.\n\nThis concludes the investigation\
    \ of developing DI code for database constraints. The next section takes a look\
    \ at implementing transition constraints.\n\n### Implementing Transition Constraints\n\
    \nPlease go back to Listing 8-8 and take a moment to recall the transition constraints\
    \ of our example database universe. Do you notice that the way the state transition\
    \ constraints are specified is not different from the way you would specify a\
    \ database constraint? They are predicates that involve two or more parameters\
    \ of type table. Of course, in the case of transition constraints, these parameters\
    \ always represent old and new snapshots of involved table structures. But in\
    \ essence, a transition constraint is a predicate involving multiple table structures.\
    \ This means that the complexity involved in implementing DI code for transition\
    \ constraints is in principle not different from the complexity involved in database\
    \ constraints.\n\nA transition constraint deals with a transaction’s begin state\
    \ and end state. As explained before, transactions are implemented in SQL by the\
    \ consecutive execution of DML statements. Such implementation not only creates\
    \ intermediate database states, but—in the context of this section—also creates\
    \ *intermediate state transitions*. Formally you would only need to validate the\
    \ transition from the begin state to the end state of the transaction. DI code\
    \ for transition constraints should only execute after the last DML statement\
    \ of the transaction has created the end state; that is, its execution should\
    \ be deferred to the end of the transaction. In the section “Bringing Deferred\
    \ Checking into the Picture,” you’ll find a brief exploration of deferring execution\
    \ of DI code. For now we’ll demonstrate how you can develop DI code for transition\
    \ constraints (in the triggered procedural strategy), such that all intermediate\
    \ state transitions satisfy them too.\n\n`Note` As you probably know, there is\
    \ no support whatsoever in current SQL DBMSes to implement transition constraints\
    \ declaratively.\n\nIf you start thinking about implementing transition constraints,\
    \ you’ll immediately hit this question: “In an after statement trigger, how do\
    \ I query the old snapshot of an involved table structure?” The answer happens\
    \ to be simple. In Oracle’s SQL DBMS you can use *flashback queries* to do exactly\
    \ that: query an old snapshot of a table structure. To be able to use a flashback\
    \ query on a table structure, you’ll somehow need to administer what the *system\
    \ change number* was when the transaction started. You can do this using a packaged\
    \ variable, or a session temporary table. Note that only the table structures\
    \ whose old snapshot is involved in any of the state transition constraints will\
    \ ever need to be queried using a flashback query. So it is safe to administer\
    \ the system change number only when a DML statement changes one of these table\
    \ structures; you can use pre-statement triggers for this that determine the current\
    \ system change number via `dbms_flashback.get_system_change_number` and store\
    \ that in the packaged variable or session table. In the following example, we’ll\
    \ assume these triggers are already in place.\n\nWe’ll now present you with an\
    \ exploration of implementing the DI code for state transition constraint `STC5`.\n\
    \n`STC5(HISTB,EMPB,HISTE,EMPE) :=`\n\n`/* New history records must accurately\
    \ reflect employee updates */`\n\n`( ∀h∈(HISTE⇓{EMPNO,UNTIL} − HISTB⇓{EMPNO,UNTIL})⊗HISTE:`\n\
    \n`h(UNTIL) = sysdate ∧`\n\n`( ∃e1∈EMPB, e2∈EMPE:`\n\n`e1↓{EMPNO,MSAL,DEPTNO}\
    \ = h↓{EMPNO,MSAL,DEPTNO} ∧`\n\n`e2(EMPNO) = h(EMPNO) ∧`\n\n`( e2(MSAL) ≠ e1(MSAL)\
    \ ∨ e2(DEPTNO) ≠ e1(DEPTNO) ) ) )`"
