    attribute-value sets of the TRAINER attribute in the OFFR table structure, and
    the EVAL attribute in the REG table structure, hold a special -1 value. In both
    cases, this value is used to signify that the attribute value is not yet applicable.


    Apparently there are two sorts of offerings: offerings with a trainer assigned
    to them and offerings without one assigned to them. The following tuple constraint,
    taken from the example database universe specification, describes when a trainer
    needn’t be assigned yet (here o represents an offering tuple):


    **/* Unassigned TRAINER allowed only for canceled and scheduled offerings */**


    o(TRAINER) = -1 ⇒ o(STATUS)∈{''CANC'',''SCHD''}


    Note that this tuple constraint specifies that confirmed offerings must have an
    assigned trainer, and canceled or scheduled offerings may have an assigned trainer.


    We can make a similar remark about registrations: some registrations include an
    evaluation score for the course offering, and some of them don’t yet. In this
    case, no constraint describes exactly when registrations hold an evaluation and
    when not. The table constraint specified in the table universe tab_REG does state
    that whenever one registration of an offering holds an evaluation, then all registrations
    of that offering should hold an evaluation. Here’s the specification of that constraint
    (R represents a registration table):


    **/* Offering is evaluated by all attendees, or it is too early to */**


    **/* evaluate the offering */**


    ( ∀r1,r2∈R:


    ( r1↓{COURSE,STARTS} = r2↓{COURSE,STARTS} )


    ⇒


    ( ( r1(EVAL) = -1 ∧ r2(EVAL) = -1 ) ∨


    ( r1(EVAL) ≠ -1 ∧ r2(EVAL) ≠ -1 )


    ) )


    In the actual implementation of these kinds of designs, you’ll often see that
    the special -1


    value from the formal specification has been transformed to a NULL in an SQL DBMS.


    However, in a properly designed database, we should have created a specialization
    for both the offering table design and the registration table design such that
    each holds the attribute that is not always applicable in the current database
    design (TRAINER for offering and EVAL


    for registration). The attribute-value sets of these two attributes then do not
    hold the special


    -1 value, and in the implementation these specialization attributes will have
    become mandatory attributes. In case of the offering specialization, you should
    then also specify an appropriate database constraint replacing the tuple constraint
    that currently describes when a trainer must be assigned.


    **Nice to Know**


    The third reason why optional attributes are introduced in database designs is
    a subtle variation of the preceding reason. When optional attributes are introduced
    due to the second reason, you’ll typically find one or more data integrity constraints
    at the tuple, table, or database level that precisely describe when the attribute
    value is indeed applicable. In the absence of any such constraint, we regard the
    value of an optional attribute as “nice to know.”


    7451AppD.qxd 5/16/07 12:40 PM Page 340


    **340**


    A P P E N D I X D **■** N U L L S A N D T H R E E ( O R M O R E ) VA L U E D L
    O G I C


    In the implementation of the example database design, the COMMENTS attribute of
    the TERM


    table structure is an example of this category. The users apparently just allow
    a missing value for this attribute.


    **Implementation Guidelines**


    If an optional attribute is of the category “nice to know” (and thus not involved
    in any constraints), then chances are that this attribute is also not involved
    in any business logic. It’s probably an attribute that is predominantly used in
    reports, just to be printed on paper, or displayed on screen. As such, the NULLs
    stored in the column seldom give rise to the various issues surrounding the use
    of NULLs described in the next section. It is more convenient just to deal with
    the optional attribute, instead of creating a separate specialization table that
    holds the attribute as a mandatory attribute, and which would require the use
    of outer joins to always try to retrieve the value.


    **■Note** If you’re unfamiliar with the concept of an outer join, we refer you
    to the Oracle documentation.


    It is our opinion that inapplicable data values—the ones introduced due to the
    first reason—should be avoided at all times. Our main argument for this (besides
    the avoidance of the issues described in the next section) is that introducing
    specializations for these attributes benefits the clarity of the overall database
    design. This is particularly the case when there is not just a single attribute,
    but a whole group of attributes that would be transferred to one or more specialization
    tables.


    The cases of not yet applicable data values (the second reason) often give rise
    to heated debates as to how these should be dealt with. From a true relational
    point of view, you again would have to avoid them by creating specializations
    accompanied with the relevant constraints describing when tuples should be present
    in the specializations. If you decide not to, then you should not fail both to
    specify and implement the accompanying constraints that describe when the values
    are indeed applicable and when not.


    **Three (or More) Valued Logic**


    In this section, Lex briefly explores 3VL. He introduces you to the three-valued
    truth tables for the three connectives AND, OR, and NOT. He further investigates
    some problems around the implication connective in 3VL, and various other issues
    that arise in 3VL.


    **Unknown**


    The most crucial assumption in 3VL is that (besides the two values TRUE and FALSE)
    there is a third value to represent “possible” or (still) UNKNOWN. To avoid misunderstandings,
    let’s start with the following statement: there is nothing wrong with 3-valued
    (or multi-valued) logic.


    Many mathematicians have explored this area in the past; one of them worth mentioning
    is Jan ukasiewicz (1878–1956).


    7451AppD.qxd 5/16/07 12:40 PM Page 341


    A P P E N D I X D **■** N U L L S A N D T H R E E ( O R M O R E ) VA L U E D L
    O G I C


    **341**


    **■Note** ukasiewicz also introduced the *Polish notation*, which allows expressions
    to be written unambiguously without the use of brackets. This is the basis of
    the *Reverse Polish Notation* (RPN), which many pocket calculators and expression
    compilers use.


    In 3VL, predicates can change their truth values in time, but only from UNKNOWN
    to TRUE or from UNKNOWN to FALSE. This is rather slippery, because it means that
    in 3VL the value UNKNOWN


    seems to be somewhat special. This description is too vague anyway; we need formal
    rules, definitions, and truth tables. We’ll look at those details in a minute.


    3VL is counterintuitive, as opposed to the classical 2-valued logic (2VL). The
    main reason is that you lose the *tertium non datur* (the principle of the excluded
    middle). That is, if P is unknown, then ¬P is unknown as well, which in turn means
    that P ∨ ¬P is unknown. Consider the following famous Aristotelian example. “Tomorrow
    a sea battle will take place” is neither TRUE nor FALSE—it is unknown—yet the
    sentence “Either tomorrow there will be a sea battle, or tomorrow there won’t
    be a sea battle” is certainly true (in reality). However, it is unknown in 3VL,
    hence the counterintuitive nature.


    Another problem arises from the fact that if two predicates are “possible” (that
    is, their truth value could possibly be TRUE), then their conjunction is also
    “possible.” However, this is obviously wrong if one of them is a negation of the
    second. Ludwik Stefan Borkowski (1914–1993) proposed to “fix” this problem by
    introducing a 4-valued logic (4VL); this indeed makes the preceding problem disappear,
    but the solution is unsatisfactory and ad hoc.


    Furthermore, 3VL does *not* solve the problem of handling missing information;
    it does not allow you to represent the reason why information is missing. At the
    end of this section, you’ll see that Ted Codd proposed a 4VL in 1990, to distinguish
    between applicable and inapplicable values. However, a 4VL doesn’t tell you what
    to do if you don’t know whether a certain attribute value is applicable or not;
    for example, if commission is applicable for sales reps only, but you don’t know
    the job of a certain employee, what should you do with the commission attribute
    of that employee? One NULL implies 3VL, two NULLs (applicable and inapplicable)
    imply 4VL, n NULLs imply (n+2)-valued logic. Using the technique of full induction,
    you can prove that you’ll end up with an infinite number of (meanings of ) NULLs,
    and a corresponding infinite number of truth values. To repeat part of this paragraph’s
    opening sentence: 3VL does *not* solve the problem of handling missing information.


    Even worse, 3VL is not only counterintuitive in itself; it is ill-implemented
    in the SQL


    standard. Probably one of the biggest blunders in the SQL standard in this respect
    is that in an attribute of the BOOLEAN data type, a NULL represents the logical
    value UNKNOWN. Wasn’t a NULL


    supposed to represent the fact that you don’t know the value? There are more examples
    of such mistakes in the SQL standard.


    You’ll have to revisit all tautologies (and therefore all rewrite rules) from
    2VL to check whether they’re still valid in 3VL; you’ll find out that several
    tautologies don’t hold anymore.


    Actually, you could even argue that we should use different names and symbols
    for the connectives in 3VL; after all, they are different from the “corresponding”
    connectives in 2VL.


