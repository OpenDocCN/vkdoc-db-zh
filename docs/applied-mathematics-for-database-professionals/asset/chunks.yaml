    # CHAPTER 8 Specifying State Transition Constraints


    In Chapter 6 you were introduced to tuple, table, and database predicates. These
    predicates deal with data in an increasing scope order: attribute values within
    a single tuple, tuples within a single table, and tables within a single database
    state.


    The section “More Data Integrity Predicates” continues down this path of increasing
    scope by introducing the concept of a *state transition predicate*. A state transition
    predicate deals with a pair of database states that are referred to as the *begin
    state* and the *end state*.


    We’ll use state transition predicates to define the admissible database state
    transitions (otherwise known as *transactions*) for a database design.


    In the section “State Transition Constraints,” you’ll discover that a transaction
    can be modeled as an ordered pair of two database states: the database state that
    exists at the start of the transaction, and the database state that exists at
    the end of the transaction, which is the state that the transaction results into.


    We’ll define the notion of a *state transition universe*: the set that holds all
    admissible transactions for a database design. To define a state transition universe,
    you’ll define state transition predicates that represent the *state transition
    constraints* in the database design.


    The section “State Transition Constraints” concludes with a specification of the
    state transition universe for the example database design that was introduced
    in Chapter 7; it includes seven state transition constraints for this database
    design. The example state transition universe is also available in Appendix A.


    As usual, you’ll find a “Chapter Summary” at the end, followed by an “Exercises”
    section.


    ## More Data Integrity Predicates


    In the previous chapter you were introduced to four classes of data integrity
    constraints: attribute, tuple, table, and database constraints. These four classes
    of constraints accept or reject a given database state. They can be checked within
    the context of a database state and are referred to as static constraints. In
    the real world there is often a requirement to prohibit certain *database state
    transitions* on grounds other than the static constraints. These state transition
    limiting constraints are referred to as *dynamic* (or *state transition*) constraints.


    ## A Simple Example


    A classical illustration of a state transition constraint is the requirement that
    the salary of an employee is not allowed to decrease. As you can see, this requirement
    cannot be checked within the context of a single database state; you require the
    context of a transaction that changes the state of a database. To check this requirement,
    you need to inspect the salary values in the database state that exists at the
    start of the transaction (its *begin state*), as well as inspect the salary values
    in the database state that exists at the end of the transaction (its *end state*).


    **Note:** You’ll see shortly that we’ll use these two database states—the begin
    state and the end state—to characterize a transaction.


    Let’s demonstrate this with an example using the database design that was introduced
    in the previous chapter. Figure 8-1 shows two employee tables `E1` and `E2`.


    **Figure 8-1.** *Tables `E1` and `E2`*


    These two tables differ only in three attribute values.


    Let’s assume that a given transaction, say `TX1`, starts off in a begin state
    that contains `E1` and results in an end state that contains `E2`. As you can
    see in Figure 8-1, `TX1` has apparently decreased the salary of employee 101 (from
    8200 to 7900), and also changed the employee’s salary grade. `TX1` has also increased
    the salary of employee 105 (from 3000 to 4000). Transaction `TX1` has not changed
    the salary of all other employees.


    **Note:** Obviously, `TX1` violates the state transition constraint stating that
    salaries are not allowed to be decreased.'
