    \ an element of | `x ∈ A`, `y ∉ A` |\n| `=`, `≠` | Is (not) equal to | |\n| `≥`,\
    \ `≤`, `<`, `>` | Other comparison operators | |\n| `⊆` | Is a subset of | `A\
    \ ⊆ B` |\n| `⊇` | Is a superset of | `A ⊇ B` |\n| `⊂` | Is a proper subset of\
    \ | `A ⊂ B` |\n| `⊃` | Is a proper superset of | `A ⊃ B` |\n| `∪` | Union | `A\
    \ ∪ B` |\n| `∩` | Intersect | `A ∩ B` |\n| `−` | Difference | `A − B` |\n| `÷`\
    \ | Symmetric difference | `A ÷ B` |\n| `×` | Cartesian product | `A × B` |\n\
    | `⊗` | Natural join | `A ⊗ B` |\n| `∅` | The empty set | |\n| `( ; )` | Ordered\
    \ pair | `(EMPNO; 102)` |\n| `◊` | Function composition | `f◊g` |\n| `◊◊` | Attribute\
    \ renaming | `T◊◊g` |\n| `dom` | Domain of a function | `dom(F)` |\n| `rng` |\
    \ Range of a function | `rng(F)` |\n| `π` | First coordinate of a pair | `π (a;b)`\
    \ |\n| `π` | Second coordinate of a pair | `π (a;b)` |\n| `N` | The set of natural\
    \ numbers | |\n| `Z` | The set of all integers | |\n| `↓` | Limitation of a tuple\
    \ | `t↓{...}` |\n| `⇓` | Projection of a table | `T⇓{...}` |\n| `℘` | Powerset\
    \ of a set | `℘A`, `℘{...}` |\n| `∏` | Product of a set function | `∏(F)` |\n\
    | `#` | Cardinality of a set | `#A`, `#{...}` |\n| `SUM` | Sum (of f over A) |\
    \ `SUMx∈A: f(x)` |\n| `AVG` | Average (of f over A) | `AVGx∈A: f(x)` |\n| `MAX`\
    \ | Maximum (of f over A) | `MAXx∈A: f(x)` |\n| `MIN` | Minimum (of f over A)\
    \ | `MINx∈A: f(x)` |\n| `↵` | Choose operator | `↵S`, `↵{a}` |\n\n**Table B-2.**\
    \ `Mathematical Symbols Related to Logic`\n\n| Symbol | Description | Examples\
    \ |\n| :--- | :--- | :--- |\n| `t`, `T` | TRUE | |\n| `f`, `F` | FALSE | |\n|\
    \ `∃` | Existential quantifier | `∃x∈S: y < 42` |\n| `∀` | Universal quantifier\
    \ | `∀y∈S: y ≥ 27` |\n| `∧`, `∨`, `¬` | And, or, not | `P ∧ ( Q ∨ ¬R )` |\n| `⇒`\
    \ | Implication | `P ⇒ Q` |\n| `⇔` | Equivalence | `P ⇔ Q` |\n\n# Appendix C:\
