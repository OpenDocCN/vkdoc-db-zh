    - Stanat, Donald F. and David F. McAllister. *Discrete Mathematics in Computer\
    \ Science*. Englewood Cliffs, NJ: Prentice Hall, 1977.\n\n## Seminal Writings\
    \ That Introduce the General Theory of Data Management\n\n- Codd, E. F. “Derivability,\
