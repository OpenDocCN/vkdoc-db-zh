    给定函数 `DBS1` 的这个定义，你现在可以通过——函数应用——来引用诸如 `DBS1(EMPLOYEE)`（表示表 `EMP1`）和 `DBS1(DEPARTMENT)`（表示表
    `DEP1`）这样的表达式。


    ## `数据库骨架`


    要指定一个数据库状态，你不仅需要实际的表（如前面示例中的 `EMP1` 和 `DEP1`），还需要为表结构确定名称（如前面示例中的 `EMPLOYEE` 和
    `DEPARTMENT`）。


    你可能不会感到惊讶，数据库设计的正式规范（我们将在第 7 章演示）也包含了对所涉及的每个表设计的特征说明规范。当你为一个表设计指定特征说明时，你就选择了该表设计中涉及的属性名称。


    一个 `数据库骨架` 将所有这些名称——表结构的名称和所涉及的属性名称——收集到一个单一的正式结构中。数据库骨架是一个集合函数，它为每个表结构包含一个有序对。第一个坐标引入表结构名称，第二个坐标引入所涉及的属性名称集合。


    ### 清单 5-6. 数据库骨架 `SK1`


    `SK1 :=`

    `{ (EMPLOYEE; {empno,ename,job,sal,deptno} )`

    `,(DEPARTMENT; {deptno,dname,loc,salbudget} ) }`


    如你所见，集合函数 `SK1` 为员工/部门数据库设计中涉及的表结构引入了名称 `EMPLOYEE` 和 `DEPARTMENT`，并将相关属性的名称集合附加到它们之上。


    > **注意** 你应该仔细选择数据库骨架引入的名称，因为它们不仅构成了你（数据库专业人员）和你的客户（用户）之间的词汇表，也是理解数据库设计含义（语义）的第一块垫脚石。在接下来的章节中，你将会看到数据完整性约束是理解数据库设计语义的另一块重要垫脚石。


    ## `表上的操作`


    本节涵盖了一些重要的表运算符。当你在指定查询和事务（第 9 章和第 10 章），或某些类型的谓词（第 6、7 和 8 章）时，将会应用这些运算符。


    我们首先来看众所周知的集合运算符 `并集`、`交集` 和 `差集`。


    接下来，我们将研究表的 `投影` 和 `限制`，然后是数据库领域中的一个重要运算符——`连接`，以及与连接密切相关的 `属性重命名` 运算符。最后，我们将处理
    `扩展` 和 `聚合`。


    ### 并集、交集和差集


    因为表是集合，你可以将众所周知的集合运算符 `并集`、`交集` 和 `差集` 应用于以表为操作数的情况。本节将探讨这些集合运算符在表上的应用。


    在接下来的小节中，我们将使用三个名为 `E1`、`E2` 和 `E3` 的示例表。图 5-4 展示了这些表。


    ### 图 5-4. 示例表 `E1`、`E2` 和 `E3`


    如你所见，`E1` 和 `E2` 都是基于 `{EMPNO,ENAME,JOB}` 的表，而 `E3` 是基于 `{E#,NAME,JOB,SAL}` 的表。所有三个表都代表关于员工的信息。对于
    `E3`，一些属性的名称被选得不同，并且 `E3` 持有额外的信息（工资）。员工 `102` 同时出现在表 `E1` 和表 `E2` 中（具有相同的属性值）。员工
    `101` 同时出现在表 `E1` 和表 `E3` 中。


    #### 并集


    你可能知道，两个集合的并集包含所有属于第一个集合、或属于第二个集合、或同时属于两个集合的元素。以下是表 `E1` 和 `E2` 的并集，记作 `E1∪E2`：


    `E1∪E2 =`

    `{ {(EMPNO;101), (ENAME;''Anne''), (JOB;''TRAINER'') }`

