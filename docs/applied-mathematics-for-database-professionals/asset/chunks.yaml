  trans: "\n# 第 7 章详解\n\n第 7 章解释了以下内容：\n\n-   一个`属性值集`作为对应属性的数据类型。\n-   一个`元组全域`作为当前表的`元组变量`的数据类型。\n\
    -   一个`表全域`作为对应的`表变量`的数据类型。\n\n你会注意到，属性值集总是首先通过从当前 SQL 数据库管理系统中可用的基础数据类型（即`NUMBER`、`VARCHAR`和`DATE`）中取值来定义，然后通过指定属性约束来缩小这些集合的范围。在此过程中，将使用\
    \ SQL `CHECK`子句实现的属性约束表达式变得明确。\n\n在认为必要的地方，你会发现嵌入的注释（`/* ... */`）用于解释形式化定义。\n\n\
    所有的元组、表、数据库和动态约束都按顺序编号，以便于参考。\n\n## 一些便利的集合\n\n在我们的数据库定义中，有四个集合经常出现：员工编号、部门编号、与薪资相关的金额和课程代码。因此，我们在此定义它们，以便可以通过名称引用它们。你可以将它们视为用户定义的数据类型：\n\
    \n```\nEMPNO_TYP = { n | n∈number(4,0) ∧ n > 999 }\nDEPTNO_TYP = { n | n∈number(2,0)\
    \ ∧ n > 0 }\nSALARY_TYP = { n | n∈number(7,2) ∧ n > 0 }\nCRSCODE_TYP = { s | s∈varchar(6)\
    \ ∧ s = upper(s) }\n```\n\n## EMP 的表全域\n\n**外部谓词：** 员工编号为`EMPNO`的员工，姓名为`ENAME`，职位为`JOB`，出生于`BORN`，受雇于`HIRED`，月薪为`MSAL`美元，属于`SGRADE`薪资等级，分配到的账户为`USERNAME`，并且在部门编号为`DEPTNO`的部门工作。\n\
    \n以下三个列表（A-2、A-3 和 A-4）分别展示了`EMP`的属性值集、元组全域和表全域。\n\n**列表 A-2.** `特征化 chr_EMP`\n\
    \n```\nchr_EMP :=\n{ ( EMPNO; EMPNO_TYP )\n, ( ENAME; varchar(9) )\n, ( JOB; {\
    \ s | s∈varchar(8) ∧\ns∈{'PRESIDENT','MANAGER'\n,'SALESREP','TRAINER','ADMIN'}\
    \ )\n, ( BORN; date )\n, ( HIRED; date )\n, ( SGRADE; { n | n∈number(2,0) ∧ n\
    \ > 0 } )\n, ( MSAL; SALARY_TYP )\n, ( USERNAME; { s | s∈varchar(15) ∧\nupper(USERNAME)\
    \ = USERNAME } )\n, ( DEPTNO; DEPTNO_TYP )\n}\n```\n\n**列表 A-3.** `元组全域 tup_EMP`\n\
    \n```\ntup_EMP :=\n{ e | e∈Π(chr_EMP) ∧\n/* 我们只雇佣成年员工 r1 */\ne(BORN) + 18 ≤ e(HIRED)\n\
    ∧\n/* 总裁月薪超过 1 万 r2 */\ne(JOB) = 'PRESIDENT' ⇒ e(MSAL) > 10000\n∧\n/* 管理员月薪低于\
    \ 5 千 r3 */\ne(JOB) = 'ADMIN' ⇒ e(MSAL) < 5000\n}\n```\n\n**列表 A-4.** `表全域 tab_EMP`\n\
    \n```\ntab_EMP :=\n{ E | E∈℘(tup_EMP) ∧\n/* EMPNO 唯一标识一个员工元组 r4 */\n( ∀e1,e2∈E:\
    \ e1(EMPNO) = e2(EMPNO) ⇒ e1 = e2 )\n∧\n/* USERNAME 唯一标识一个员工元组 r4 */\n( ∀e1,e2∈E:\
    \ e1(USERNAME) = e2(USERNAME) ⇒ e1 = e2 )\n∧\n/* 最多只允许一名总裁 r5 */\n#{ e | e∈E ∧\
    \ e(JOB) = 'PRESIDENT' } ≤ 1\n∧\n/* 雇佣了总裁或经理的部门 r6 */\n/* 也应至少雇佣一名管理员 */\n( ∀d∈{\
    \ e1(DEPTNO) | e1∈E }:\n( ∃e2∈E: e2(DEPTNO) = d ∧ e2(JOB) ∈ {'PRESIDENT','MANAGER'}\
    \ )\n⇒\n( ∃e2∈E: e2(DEPTNO) = d ∧ e2(JOB) = 'ADMIN' )\n)\n}\n```\n\n## SREP 的表全域\n\
    \n**外部谓词：** 员工编号为`EMPNO`的销售代表，其年度销售目标为`TARGET`美元，年度佣金为`COMM`美元。\n\n以下三个列表（A-5、A-6\
    \ 和 A-7）分别展示了`SREP`的属性值集、元组全域和表全域。\n\n**列表 A-5.** `特征化 chr_SREP`\n\n```\nchr_SREP\
    \ :=\n{ ( EMPNO; EMPNO_TYP )\n, ( TARGET; { n | n∈number(5,0) ∧ n > 9999 } )\n\
    , ( COMM; SALARY_TYP )\n}\n```\n\n**列表 A-6.** `元组全域 tup_SREP`\n\n```\ntup_SREP\
    \ :=\n{ s | s∈Π(chr_SREP) }\n```\n\n**列表 A-7.** `表全域 tab_SREP`\n\n```\ntab_SREP\
    \ :=\n{ S | S∈℘(tup_SREP) ∧\n/* EMPNO 唯一标识一个元组 r7 */\n( ∀s1,s2∈S: s1(EMPNO) =\
    \ s2(EMPNO) ⇒ s1 = s2 )\n}\n```\n\n## MEMP 的表全域\n\n**外部谓词：** 员工编号为`EMPNO`的员工由员工编号为`MGR`的员工管理。\n\
    \n以下三个列表（A-8、A-9 和 A-10）分别展示了`MEMP`的属性值集、元组全域和表全域。\n\n**列表 A-8.** `特征化 chr_MEMP`\n\
    \n```\nchr_MEMP :=\n{ ( EMPNO; EMPNO_TYP )\n, ( MGR; EMPNO_TYP )\n}\n```\n\n**列表\
    \ A-9.** `元组全域 tup_MEMP`\n\n```\ntup_MEMP :=\n{ m | m∈Π(chr_MEMP) ∧\n/* 你不能管理自己\
    \ r8 */\nm(EMPNO) ≠ m(MGR)\n}\n```\n\n**列表 A-10.** `表全域 tab_MEMP`\n\n```\ntab_MEMP\
    \ :=\n{ M | M∈℘(tup_MEMP) ∧\n/* EMPNO 唯一标识一个元组 r9 */\n( ∀m1,m2∈M: m1(EMPNO) =\
    \ m2(EMPNO) ⇒ m1 = m2 )\n}\n```\n\n## TERM 的表全域\n\n**外部谓词：** 编号为`EMPNO`的员工在日期`LEFT`因`COMMENTS`所述原因辞职或被解雇。\n\
    \n以下三个列表（A-11、A-12 和 A-13）分别展示了`TERM`的属性值集、元组全域和表全域。\n\n**列表 A-11.** `特征化 chr_TERM`\n\
    \n```\nchr_TERM :=\n{ ( EMPNO; EMPNO_TYP )\n, ( LEFT; date )\n, ( COMMENTS; varchar(60)\
    \ )\n}\n```\n\n**列表 A-12.** `元组全域 tup_TERM`\n\n```\ntup_TERM :=\n{ t | t∈Π(chr_TERM)\
    \ }\n```\n\n**列表 A-13.** `表全域 tab_TERM`\n\n```\ntab_TERM :=\n{ T | T∈℘(tup_TERM)\
    \ ∧\n/* EMPNO 唯一标识一个元组 r10 */\n( ∀t1,t2∈T: t1(EMPNO) = t2(EMPNO) ⇒ t1 = t2 )\n\
    }\n```\n\n## DEPT 的表全域\n\n**外部谓词：** 部门编号为`DEPTNO`的部门，名称为`DNAME`，位于`LOC`，由员工编号为`MGR`的员工管理。\n\
    \n以下三个列表（A-14、A-15 和 A-16）分别展示了`DEPT`的属性值集、元组全域和表全域。\n\n**列表 A-14.** `特征化 chr_DEPT`\n\
    \n```\nchr_DEPT :=\n{ ( DEPTNO; DEPTNO_TYP )\n, ( DNAME; { s | s∈varchar(12) ∧\
    \ upper(DNAME) = DNAME } )\n, ( LOC; { s | s∈varchar(14) ∧ upper(LOC) = LOC }\
    \ )\n, ( MGR; EMPNO_TYP )\n}\n```\n\n**列表 A-15.** `元组全域 tup_DEPT`\n\n```\ntup_DEPT\
    \ :=\n{ d | d∈Π(chr_DEPT) }\n```\n\n**列表 A-16.** `表全域 tab_DEPT`\n\n```\ntab_DEPT\
    \ :=\n{ D | D∈℘(tab_DEPT) ∧\n/* 部门编号唯一标识一个元组 r11 */\n( ∀d1,d2∈D: d1(DEPTNO) =\
    \ d2(DEPTNO) ⇒ d1 = d2 )\n∧\n/* 部门名称和位置唯一标识一个元组 r12 */\n( ∀d1,d2∈D:\nd1↓{DNAME,LOC}\
    \ = d2↓{DNAME,LOC} ⇒ d1 = d2 )\n∧\n/* 你不能管理超过两个部门 r13 */\n( ∀m∈{ d(MGR) | d∈D\
    \ }: #{ d | d∈D ∧ d(MGR) = m } ≤ 2 )\n}\n```\n\n## GRD 的表全域\n\n**外部谓词：** ID 为`GRADE`的薪资等级，月薪下限为`LLIMIT`美元，月薪上限为`ULIMIT`美元，最高净月奖金为`BONUS`美元。\n\
    \n以下三个列表（A-17、A-18 和 A-19）分别展示了`GRD`的属性值集、元组全域和表全域。\n\n**列表 A-17.** `特征化 chr_GRD`\n\
    \n```\nchr_GRD :=\n{ ( GRADE; { n | n∈number(2,0) ∧ n > 0 } )\n, ( LLIMIT; SALARY_TYP\
    \ )\n, ( ULIMIT; SALARY_TYP )\n, ( BONUS; SALARY_TYP )\n}\n```\n\n**列表 A-18.**\
    \ `元组全域 tup_GRD`\n\n```\ntup_GRD :=\n{ g | g∈Π(chr_GRD) ∧\n/* 薪资等级的带宽至少为 500 美元\
    \ r14 */\ng(LLIMIT) ≤ g(ULIMIT) - 500\n∧\n/* 奖金必须低于下限 r15 */\ng(BONUS) < g(LLIMIT)\n\
    }\n```\n\n**列表 A-19.** `表全域 tab_GRD`\n\n```\ntab_GRD :=\n{ G | G∈℘(tup_GRD) ∧\n\
    /* 薪资等级代码唯一标识一个元组 r16 */\n( ∀g1,g2∈G: g1(GRADE) = g2(GRADE) ⇒ g1 = g2 )\n∧\n/*\
    \ 薪资等级下限唯一标识一个元组 r17 */\n( ∀g1,g2∈G: g1(LLIMIT) = g2(LLIMIT) ⇒ g1 = g2 )\n∧\n\
    /* 薪资等级上限唯一标识一个元组 r18 */\n( ∀g1,g2∈G: g1(ULIMIT) = g2(ULIMIT) ⇒ g1 = g2 )\n∧\n\
    /* 一个薪资等级最多与一个（较低）等级重叠 r20 */\n( ∀g1∈G:\n( ∃g2∈G: g2(LLIMIT) < g1(LLIMIT) )\n\
    ⇒\n#{ g3 | g3∈G ∧ g3(LLIMIT) < g1(LLIMIT) ∧\ng3(ULIMIT) ≥ g1(LLIMIT) ∧\ng3(ULIMIT)\
    \ < g1(ULIMIT) } = 1\n)\n}\n```\n\n## CRS 的表全域\n\n**外部谓词：** 代码为`CODE`的课程，描述为`DESCR`，属于课程类别`CAT`，持续时间为`DUR`天。\n\
    \n以下三个列表（A-20、A-21 和 A-22）分别展示了`CRS`的属性值集、元组全域和表全域。\n\n**列表 A-20.** `特征化 chr_CRS`\n\
    \n```\nchr_CRS :=\n{ ( CODE; CRSCODE_TYP )\n, ( DESCR; varchar(40) )\n/* 课程类别值：设计、生成、构建\
    \ */\n, ( CAT; { s | s∈varchar(3) ∧\ns∈{'DSG','GEN','BLD'} } )\n/* 课程持续时间必须在 1\
    \ 到 15 天之间 */\n, ( DUR; { n | n∈number(2,0) ∧ 1 ≤ n ≤ 15 } )\n}\n```\n\n**列表 A-21.**\
    \ `元组全域 tup_CRS`\n\n```\ntup_CRS :=\n{ c | c∈Π(chr_CRS) ∧\n/* 构建类课程从不超过 5 天 r21\
    \ */\nc(CAT) = 'BLD' ⇒ t(DUR) ≤ 5\n}\n```\n\n**列表 A-22.** `表全域 tab_CRS`\n\n```\n\
    tab_CRS :=\n{ C | C∈℘(tup_CRS) ∧\n/* 课程代码唯一标识一个元组 r22 */\n( ∀c1,c2∈C: c1(CODE)\
    \ = c2(CODE) ⇒ c1 = c2 )\n}\n```\n\n## OFFR 的表全域\n\n**外部谓词：** 课程代码为`COURSE`的课程，开课日期为`STARTS`，状态为`STATUS`，最大容纳`MAXCAP`名学员，由员工编号为`TRAINER`的员工教授，授课地点为`LOC`。\n\
    \n以下三个列表（A-23、A-24 和 A-25）分别展示了`OFFR`的属性值集、元组全域和表全域。\n\n**列表 A-23.** `特征化 chr_OFFR`\n\
    \n```\nchr_OFFR :=\n{ ( COURSE; CRSCODE_TYP )\n, ( STARTS; date )\n, ( STATUS;\
    \ { s | s∈varchar(4) ∧\n/* 允许三种状态值： */\ns∈{'SCHD','CONF','CANC'} } )\n/* 最大课程容量；最小值=6\
    \ */\n, ( MAXCAP; { n | n∈number(2,0) ∧ n ≥ 6 } )\n/* TRAINER = -1 表示“未分配培训师”（参见\
    \ r23） */\n, ( TRAINER; EMPNO_TYP ∪ { -1 } )\n, ( LOC; varchar(14) )\n}\n```\n\
    \n**列表 A-24.** `元组全域 tup_OFFR`\n\n```\ntup_OFFR :=\n{ o | o∈Π(chr_OFFR) ∧\n/*\
    \ 未分配的 TRAINER 仅允许用于某些状态值 r23 */\no(TRAINER) = -1 ⇒ o(STATUS)∈{'CANC','SCHD'}\n\
    }\n```\n\n**列表 A-25.** `表全域 tab_OFFR`\n\n```\ntab_OFFR :=\n{ O | O∈℘(tup_OFFR)\
    \ ∧\n/* 课程代码和开始日期唯一标识一个元组 r24 */\n( ∀o1,o2∈O:\no1↓{COURSE,STARTS} = o2↓{COURSE,STARTS}\
    \ ⇒ o1 = o2 )\n∧\n/* 开始日期和（已知的）培训师唯一标识一个元组 r25 */\n( ∀o1,o2∈{ o | o∈O ∧ o(TRAINER)\
    \ ≠ -1 }:\no1↓{STARTS,TRAINER} = o2↓{STARTS,TRAINER} ⇒ o1 = o2 )\n}\n```\n\n##\
    \ REG 的表全域\n\n**外部谓词：** 员工编号为`STUD`的员工已注册参加课程代码为`COURSE`、开课日期为`STARTS`的课程，并且该课程的评分为`EVAL`。\n\
    \n以下三个列表（A-26、A-27 和 A-28）分别展示了`REG`的属性值集、元组全域和表全域。\n\n**列表 A-26.** `特征化 chr_REG`\n\
    \n```\nchr_REG :=\n{ ( STUD; EMPNO_TYP )\n, ( COURSE; CRSCODE_TYP )\n, ( STARTS;\
    \ date )\n/* -1：为时过早，无法评估；0：尚未评估； */\n/* 1-5：常规评估值（从 1=差到 5=优秀） */\n, ( EVAL;\
    \ { n | n∈number(1,0)\n∧ -1 ≤ n ≤ 5 } )\n}\n```\n\n**列表 A-27.** `元组全域 tup_REG`\n\
    \n```\ntup_REG :=\n{ r | r∈Π(chr_REG) }\n```\n\n**列表 A-28.** `表全域 tab_REG`\n\n\
    ```\ntab_REG :=\n{ R | R∈℘(tup_REG) ∧\n/* 参与者和开始日期(!)唯一标识一个元组 r26 */\n( ∀r1,r2∈R:\n\
    r1↓{STUD,STARTS} = r2↓{STUD,STARTS} ⇒ r1 = r2 )\n∧\n/* 课程已被评估， */\n/* 或评估该课程为时过早\
    \ r27 */\n( ∀r1,r2∈R:\n( r1↓{COURSE,STARTS} = r2↓{COURSE,STARTS} )\n⇒\n( ( r1(EVAL)\
    \ = -1 ∧ r2(EVAL) = -1 ) ∨\n( r1(EVAL) ≠ -1 ∧ r2(EVAL) ≠ -1 )\n) )\n}\n```\n\n\
    ## HIST 的表全域\n\n**外部谓词：** 在日期`UNTIL`，对于员工编号为`EMPNO`的员工，其部门或月薪（或两者）发生了变更。在`UNTIL`日期之前，该员工的部门为`DEPTNO`，月薪为`MSAL`。\n\
    \n以下三个列表（A-29、A-30 和 A-31）分别展示了`HIST`的属性值集、元组全域和表全域。\n\n**列表 A-29.** `特征化 chr_HIST`\n\
    \n```\nchr_HIST :=\n{( EMPNO; EMPNO_TYP )\n,( UNTIL; date )\n,( DEPTNO; DEPTNO_TYP\
    \ )\n,( MSAL; SALARY_TYP )\n}\n```\n\n**列表 A-30.** `元组全域 tup_HIST`\n\n```\ntup_HIST\
    \ :=\n{ h | h∈Π(chr_HIST) }\n```\n\n**列表 A-31.** `表全域 tab_HIST`\n\n```\ntab_HIST\
    \ :=\n{ H | H∈℘(tup_HIST) ∧\n/* 员工编号和结束日期唯一标识一个元组 r28 */\n( ∀h1,h2∈H: h1↓{EMPNO,UNTIL}\
    \ = h2↓{EMPNO,UNTIL} ⇒ h1 = h2 )\n∧\n/* 部门编号或月薪（或两者） r29 */\n/* 必须在两个连续的历史记录之间发生变更\
    \ */\n( ∀h1,h2∈H:\n( h1(EMPNO) = h2(EMPNO) ∧\nh1(UNTIL) < h2(UNTIL) ∧\n¬ ( ∃h3∈H:\
    \ h3(EMPNO) = h1(EMPNO) ∧\nh3(UNTIL) > h1(UNTIL) ∧\nh3(UNTIL) < h2(UNTIL) )\n\
    ) ⇒\n( h1(MSAL) ≠ h2(MSAL) ∨ h1(DEPTNO) ≠ h2(DEPTNO) )\n)\n}\n```\n\n## 数据库特征化\
    \ DBCH\n\n数据库特征化`DBCH`将十个表全域（如本附录前一节所定义）附加到它们对应的表别名上；参见列表 A-32。这样，数据库特征化“重新审视”了数据库骨架，并提供了更多细节。\n\
    \n**列表 A-32.** `数据库特征化 DBCH`\n\n```\nDBCH :=\n{ ( EMP; tab_EMP )\n, ( SREP; tab_SREP\
    \ )\n, ( MEMP; tab_MEMP )\n, ( TERM; tab_TERM )\n, ( DEPT; tab_DEPT )\n, ( GRD;\
    \ tab_GRD )\n, ( CRS; tab_CRS )\n, ( OFFR; tab_OFFR )\n, ( REG; tab_REG )\n, (\
    \ HIST; tab_HIST )\n}\n```\n\n## 数据库全域 DB_UEX\n\n如列表 A-33 所示，数据库全域`DB_UEX`构建在数据库特征化`DBCH`之上。`DB_UEX`的规范包含了所有静态数据库约束。\n\
    \n**列表 A-33.** `数据库全域 DB_UEX`\n\n```\nDB_UEX :=\n{ v | v∈Π(DBCH) ∧\n/* ====================================================================\
    \ */\n/* 子集要求开始 */\n/* ====================================================================\
    \ */\n/* 员工为已知部门工作 r30 */\n{ e(DEPTNO) | e∈v(EMP) } ⊆ { d(DEPTNO) | d∈v(DEPT)\
    \ }\n∧\n/* 部门经理是已知员工，不包括管理员和总裁 r31 */\n{ d(MGR) | d∈v(DEPT) } ⊆\n{ e(EMPNO) |\
    \ e∈v(EMP) ∧ e(JOB) ∉ {'ADMIN','PRESIDENT'} }\n∧\n/* 员工只能向总裁或经理汇报 r32 */\n{ m(MGR)\
    \ | m∈v(MEMP) } ⊆\n{ e(EMPNO) | e∈v(EMP) ∧ e(JOB) ∈ {'PRESIDENT','MANAGER' } }\n\
    ∧\n/* 终止记录对应于已知员工；并非所有人都已离职 r33 */\n{ t(EMPNO) | t∈v(TERM) } ⊂ { e(EMPNO) | e∈v(EMP)\
    \ }\n∧\n/* 员工拥有已知的薪资等级 r34 */\n{ e(SGRADE) | e∈v(EMP) } ⊆ { g(GRADE) | g∈v(GRD)\
    \ }\n∧\n/* 课程开设对应于已知课程 r35 */\n{ o(COURSE) | o∈v(OFFR) } ⊆ { c(CODE) | c∈v(CRS)\
    \ }\n∧\n/* 课程在我们设有部门的地点进行 r36 */\n{ o(LOC) | o∈v(OFFR) } ⊆ { d(LOC) | d∈v(DEPT)\
    \ }\n∧\n/* 课程的培训师是已知的培训师 r37 */\n{ o(TRAINER) | o∈v(OFFR) ∧ o(TRAINER) ≠ -1 }\
    \ ⊆\n{ e(EMPNO) | e∈v(EMP) ∧ e(JOB) = 'TRAINER' }\n∧\n/* 课程注册对应于已知员工 r38 */\n\
    { r(STUD) | r∈v(REG) } ⊆ { e(EMPNO) | e∈v(EMP) }\n∧\n/* 课程注册对应于已知的课程开设 r39 */\n\
    { r↓{COURSE,STARTS} | r∈v(REG) } ⊆\n{ o↓{COURSE,STARTS} | o∈v(OFFR) }\n∧\n/* 历史记录对应于已知员工\
    \ r40 */\n{ h(EMPNO) | h∈v(HIST) } ⊆ { e(EMPNO) | e∈v(EMP) }\n∧\n/* 历史记录对应于已知部门\
    \ r41 */\n{ h(DEPTNO) | h∈v(HIST) } ⊆ { d(DEPTNO) | d∈v(DEPT) }\n∧\n/* ====================================================================\
    \ */\n/* 子集要求结束；特化规则开始 */\n/* ====================================================================\
    \ */\n/* 销售代表有目标和佣金 r42 */\n{ e(EMPNO) | e∈v(EMP) ∧ e(JOB) = 'SALESREP' } =\n\
    { s(EMPNO) | s∈v(SREP) }\n∧\n/* 除总裁外，所有人都是被管理的员工 r43 */\n{ e(EMPNO) | e∈v(EMP)\
    \ ∧ e(JOB) ≠ 'PRESIDENT' } =\n{ m(EMPNO) | m∈v(MEMP) }\n∧\n/* ====================================================================\
    \ */\n/* 特化结束；元组连接规则开始 */\n/* ====================================================================\
    \ */\n/* 月薪必须在分配的薪资等级范围内 r44 */\n( ∀e∈v(EMP), g∈v(GRD):\ne(SGRADE) = g(GRADE)\
    \ ⇒ g(LLIMIT) ≤ e(MSAL) ≤ g(ULIMIT)\n) ∧\n/* 离职日期必须在雇佣日期之后 r45 */\n( ∀e∈v(EMP),\
    \ t∈v(TERM):\ne(EMPNO) = t(EMPNO) ⇒ e(HIRED) < t(LEFT)\n) ∧\n/* 销售代表不能比其汇报对象的收入高\
    \ r46 */\n( ∀s∈v(SREP), es∈v(EMP), em∈v(EMP), m∈v(MEMP):\n( s(EMPNO)=es(EMPNO)\
    \ ∧ es(EMPNO)=m(EMPNO) ∧ m(MGR) = em(EMPNO) )\n⇒\n( es(MSAL) + s(COMM)/12 < em(MSAL)\
    \ )\n) ∧\n/* 非销售代表不能比其汇报对象的收入高 r47 */\n( ∀e∈v(EMP), em∈v(EMP), m∈v(MEMP):\n(e(EMPNO)=m(EMPNO)\
    \ ∧ m(MGR) = em(EMPNO) ∧ e(JOB) ≠ 'SALESREP')\n⇒\n( e(MSAL) < em(MSAL) )\n) ∧\n\
    /* 雇佣日期之前不允许有历史记录 r48 */\n( ∀e∈v(EMP), h∈v(HIST):\ne(EMPNO) = h(EMPNO) ⇒ e(HIRED)\
    \ < h(UNTIL)\n) ∧\n/* 离职日期之后不允许有历史记录 r49 */\n( ∀t∈v(TERM), h∈v(HIST):\nt(EMPNO)\
    \ = h(EMPNO) ⇒ t(LEFT) > h(UNTIL)\n) ∧\n/* 入职头四周内不能注册课程 r50 */\n( ∀e∈v(EMP), r∈v(REG):\n\
    e(EMPNO) = r(STUD) ⇒ e(HIRED) + 28 ≤ r(STARTS)\n) ∧\n/* 不能注册在离职日期当天或之后开始的课程 r51\
    \ */\n( ∀t∈v(TERM), r∈v(REG), c∈v(CRS):\n( t(EMPNO) = r(STUD) ∧ r(COURSE) = c(CODE)\
    \ )\n⇒\n( t(LEFT) ≥ r(STARTS) + c(DUR) )\n) ∧\n/* 不能注册时间重叠的课程 r52 */\n( ∀e∈v(EMP),\
    \ r1∈v(REG), r2∈v(REG), o1∈v(OFFR), o2∈v(OFFR), c1∈v(CRS), c2∈v(CRS):\n( e(EMPNO)\
    \ = r1(STUD) ∧\nr1↓{COURSE,STARTS} = o1↓{COURSE,STARTS} ∧\no1(COURSE) = c1(CODE)\
    \ ∧\ne(EMPNO) = r2(STUD) ∧\nr2↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∧\no2(COURSE)\
    \ = c2(CODE)\n) ⇒\n( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨\no1(STARTS) ≥ o2(STARTS)\
    \ + c2(DUR) ∨\no2(STARTS) ≥ o1(STARTS) + c1(DUR)\n) ) ∧\n/* 培训师不能在雇佣日期之前授课 r53\
    \ */\n( ∀e∈v(EMP), o∈v(OFFR):\ne(EMPNO) = o(TRAINER) ⇒ e(HIRED) ≤ o(STARTS)\n\
    ) ∧\n/* 培训师不能在离职日期当天或之后授课 r54 */\n( ∀t∈v(TERM), o∈v(OFFR), c∈v(CRS):\n( t(EMPNO)\
    \ = o(TRAINER) ∧ o(COURSE) = c(CODE) )\n⇒\n( t(LEFT) ≥ o(STARTS) + c(DUR) )\n\
    ) ∧\n/* 培训师不能注册自己讲授的课程 r55 */\n( ∀r∈v(REG), o∈v(OFFR):\nr↓{COURSE,STARTS} = o↓{COURSE,STARTS}\
    \ ⇒\nr(STUD) ≠ o(TRAINER)\n) ∧\n/* 培训师不能同时教授不同的课程 r56 */\n( ∀o1∈v(OFFR), o2∈v(OFFR),\
    \ c1∈v(CRS), c2∈v(CRS):\n( o1(TRAINER) = o2(TRAINER) ∧\no1(COURSE) = c1(CODE)\
    \ ∧\no2(COURSE) = c2(CODE)\n) ⇒\n( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨\n\
    o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨\no2(STARTS) ≥ o1(STARTS) + c1(DUR)\n) ) ∧\n\
    /* 员工不能注册与其作为培训师讲授的课程 r57 */\n/* 时间重叠的课程 */\n( ∀e∈v(EMP), r∈v(REG), o1∈v(OFFR),\
    \ o2∈v(OFFR), c1∈v(CRS), c2∈v(CRS):\n( e(EMPNO) = r(STUD) ∧\nr↓{COURSE,STARTS}\
    \ = o1↓{COURSE,STARTS} ∧\no1(COURSE) = c1(CODE) ∧\ne(EMPNO) = o2(TRAINER) ∧\n\
    o2(COURSE) = c2(CODE)\n) ⇒\n( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨\no1(STARTS)\
    \ ≥ o2(STARTS) + c2(DUR) ∨\no2(STARTS) ≥ o1(STARTS) + c1(DUR)\n) ) ∧\n/* ====================================================================\
    \ */\n/* 元组连接规则结束；其他数据库规则开始 */\n/* ====================================================================\
    \ */\n/* 部门经理必须在其管理的部门工作 r58 */\n( ∀d1∈v(DEPT): { e(DEPTNO)| e∈v(EMP) ∧ e(EMPNO)=d1(MGR)}\
    \ ⊆\n{ d2(DEPTNO)| d2∈v(DEPT) ∧ d2(MGR)=d1(MGR) } )\n∧\n/* 在职员工不能由已终止的员工管理 r59\
    \ */\n{ t1(EMPNO) | t1∈v(TERM) } ∩\n{ m(MGR) | m∈v(MEMP) ∧\n¬ ( ∃t2∈v(TERM): t2(EMPNO)\
    \ = m(EMPNO) ) } = ∅\n∧\n/* 部门不能由已终止的员工管理 r60 */\n{ t(EMPNO) | t∈v(TERM) } ∩ {\
    \ d(MGR) | d∈v(DEPT) } = ∅\n∧\n/* 培训师教授的课程中，至少一半（按持续时间计） r61 */\n/* 必须在“基地”进行\
    \ */\n( ∀e∈{ o(TRAINER) | o∈v(OFFR) ∧ o(STATUS) ≠ 'CANC' }: \n( ∑ t∈{ o2.DUR |\
    \ d2∈v(DEPT), e2∈v(EMP), o2∈v(OFFR), c2∈v(CRS) |\ne2(EMPNO) = e ∧\ne2(EMPNO) =\
    \ o2(TRAINER) ∧\ne2(DEPTNO) = d2(DEPTNO) ∧\no2(COURSE) = c2(CODE) ∧\no2(STATUS)\
    \ ≠ 'CANC' ∧\nc2(LOC) = d2(LOC)\n} : t\n) ≥\n( ∑ t∈{ o3.DUR | d3∈v(DEPT), e3∈v(EMP),\
    \ o3∈v(OFFR), c3∈v(CRS) |\ne3(EMPNO) = e ∧\ne3(EMPNO) = o3(TRAINER) ∧\ne3(DEPTNO)\
    \ = d3(DEPTNO) ∧\no3(COURSE) = c3(CODE) ∧\no3(STATUS) ≠ 'CANC' ∧\nc3(LOC) ≠ d3(LOC)\n\
    } : t\n) ) ∧\n/* 注册人数超过 6 人的课程必须状态为已确认 r62 */\n( ∀o∈v(OFFR):\n#{ r | r∈v(REG)\
    \ ∧\nr↓{COURSE,STARTS} = o↓{COURSE,STARTS} } ≥ 6\n⇒\no(STATUS) = 'CONF'\n) ∧\n\
    /* 注册人数不能超过课程的最大容量 r63 */\n( ∀o∈v(OFFR):\n#{ r | r∈v(REG) ∧\nr↓{COURSE,STARTS}\
    \ = o↓{COURSE,STARTS} } ≤ o(MAXCAP)\n) ∧\n/* 已取消的课程不能有注册 r64 */\n( ∀o∈v(OFFR):\
    \ o(STATUS) = 'CANC'\n⇒\n¬( ∃r∈v(REG): r↓{COURSE,STARTS} = o↓{COURSE,STARTS} )\n\
    ) ∧\n/* 你只能在满足以下条件时讲授某门课程： r65 */\n/* 1. 你已受雇至少一年，或 */\n/* 2. 你已参加过该课程，并且该课程的培训师作为参与者参加你的首次授课\
    \ */\n( ∀o1∈v(OFFR):\n/* 如果这是该培训师第一次讲授此课程 ... */\n( ¬∃o2∈v(OFFR):\no1↓{COURSE,TRAINER}\
    \ = o2↓{COURSE,TRAINER} ∧\no2(STARTS) < o1(STARTS)\n) ⇒\n( /* 那么教室里应该有一位学员 ...\
    \ */\n( ∃r1∈v(REG):\nr1↓{COURSE,STARTS} = o1↓{COURSE,STARTS} ∧\n/* 他/她在更早的日期讲授过该课程\
    \ ... */\n( ∃o3∈v(OFFR):\no3(TRAINER) = r1(STUD) ∧\no3(COURSE) = o1(COURSE) ∧\n\
    o3(STARTS) < o1(STARTS) ∧\n/* 而*该*课程由当前的培训师参加过 */\n( ∃r2∈v(REG):\no3↓{COURSE,STARTS}\
    \ = r2↓{COURSE,STARTS} ∧\nr2(STUD) = o1(TRAINER)\n) ) ) ∨\n/* 或者，该培训师已受雇至少一年 */\n\
    ( ↵{ e(HIRED) | e∈v(EMP) ∧ e(EMPNO) = o1(TRAINER) } <\no1(STARTS) - 365\n) ) )\n\
    /* ==================================================================== */\n/*\
    \ 其他数据库规则结束 */\n/* ====================================================================\
    \ */\n}\n```\n\n## 状态转换全域 TX_UEX\n\n`状态转换全域` `TX_UEX` 的定义是通过首先将数据库全域 `DB_UEX`（如本附录“数据库全域\
    \ `DB_UEX`”一节所定义）与自身进行笛卡尔积运算。你可以将这个笛卡尔积的结果视为所有可能事务的集合。在这个状态转换全域 `TX_UEX` 中，每个事务被描绘为一个有序对\
    \ `(b;e)`，其中 `b` 代表事务开始时的数据库状态，`e` 代表事务结束时的数据库状态。如列表 A-34 所示，`TX_UEX` 的定义通过指定*动态*（也称为*状态转换*或*事务*）约束，将这个集合限制为仅包含*有效*事务。\n\
    \n**注意：** 在本节中，我们使用 `sysdate` 表示移动的“现在”时间点。\n\n**列表 A-34.** `事务全域 TX_UEX`\n\n\
    ```\nTX_UEX :=\n{ (b;e) | b∈DB_UEX ∧ e∈DB_UEX ∧\n/* 月薪只能增加 r66 */\n( ∀e1∈b(EMP),\
    \ e2∈e(EMP):\ne1(EMPNO) = e2(EMPNO) ⇒ e1(MSAL) ≤ e2(MSAL)\n) ∧\n/* 新课程必须以 SCHED\
    \ 状态开始 r67 */\n( ∀o1∈e(OFFR)⇓{COURSE,STARTS} − b(OFFR)⇓{COURSE,STARTS}:\n↵{ o2(STATUS)\
    \ | o2∈e(OFFR) ∧ o2↓{COURSE,STARTS} = o1↓{COURSE,STARTS} }\n= 'SCHD'\n) ∧\n/*\
    \ 有效的课程状态转换是： r68 */\n/* SCHED -> CONF, SCHED -> CANC, CONF -> CANC */\n( ∀o1∈b(OFFR),\
    \ o2∈e(OFFR):\no1↓{COURSE,STARTS} = o2↓{COURSE,STARTS}\n⇒\n( o1(STATUS) = o2(STATUS)\
    \ ∨\n( o1(STATUS) = 'SCHD' ∧ o2(STATUS) = 'CONF' ) ∨\n( o1(STATUS) = 'SCHD' ∧\
    \ o2(STATUS) = 'CANC' ) ∨\n( o1(STATUS) = 'CONF' ∧ o2(STATUS) = 'CANC' )\n) )\
    \ ∧\n/* 不允许更新历史记录 r69 */\n( ∀h1∈b(HIST), h2∈e(HIST):\nh1↓{EMPNO,UNTIL} = h2↓{EMPNO,UNTIL}\n\
    ⇒\n( h1(DEPTNO) = h2(DEPTNO) ∧ h1(MSAL) = h2(MSAL) )\n) ∧\n/* 新的历史记录必须准确反映员工更新\
    \ r70 */\n( ∀h1∈e(HIST)⇓{EMPNO,UNTIL} − b(HIST)⇓{EMPNO,UNTIL}:\n( ∃h2∈e(HIST):\n\
    h2↓{EMPNO,UNTIL} = h1↓{EMPNO,UNTIL} ∧\nh2(UNTIL) = sysdate ∧\n( ∃e1∈b(EMP), e2∈e(EMP):\n\
    e1↓{EMPNO,MSAL,DEPTNO} = h2↓{EMPNO,MSAL,DEPTNO} ∧\ne2(EMPNO) = h2(EMPNO) ∧\n(\
    \ e2(MSAL) ≠ e1(MSAL) ∨ e2(DEPTNO) ≠ e1(DEPTNO) )\n) ) ) ∧\n/* 新的注册元组必须以 EVAL\
    \ = -1 开始 r71 */\n( ∀r1∈e(REG)⇓{STUD,STARTS} − b(REG)⇓{STUD,STARTS}:\n( ∃r2∈e(REG):\n\
    r2↓{STUD,STARTS} = r1↓{STUD,STARTS} ∧ r2(EVAL) = -1\n) ) ∧\n/* 评估的转换必须有效 r72 */\n\
    /* 且不能发生在课程开始日期之前 */\n( ∀r1∈b(REG), r2∈e(REG):\nr1↓{STUD,STARTS} = r2↓{STUD,STARTS}\
    \ ∧ r1(EVAL) ≠ r2(EVAL)\n⇒\n( ( r1(EVAL) = -1 ∧ r2(EVAL) = 0 ∧ r2(STARTS) ≥ sysdate\
    \ ) ∨\n( r1(EVAL) = 0 ∧ r2(EVAL) ∈ {1,2,3,4,5} )\n) )\n}\n```\n\n# 附录 B：符号\n\n\
