- fmt: '# Chapter 5: Tables and Database States


    ,{(EMPNO;102), (ENAME;''Thomas''), (JOB;''SALESMAN'') }


    ,{(EMPNO;103), (ENAME;''Lucas''), (JOB;''PRESIDENT'')}


    ,{(EMPNO;104), (ENAME;''Pete''), (JOB;''MANAGER'') } }


    The union of `E1` and `E2` is a table over `{EMPNO,ENAME,JOB}`. It holds four
    tuples, not five, because the tuple of employee 102 is a member of both sets.


    Now take a look at the union of tables `E1` and `E3` (`E1∪E3`): `E1∪E3` =


    { {(EMPNO;101), (ENAME;''Anne''), (JOB;''TRAINER'') }


    ,{(EMPNO;102), (ENAME;''Thomas''), (JOB;''SALESMAN'') }


    ,{(EMPNO;103), (ENAME;''Lucas''), (JOB;''PRESIDENT'') }


    ,{(E#;101), (NAME;''Anne''), (JOB;''TRAINER''), (SAL;3000)}


    ,{(E#;102), (NAME;''John''), (JOB;''MANAGER''), (SAL;5000)} }


    This result is a set of functions, but it clearly isn’t a table; not all the functions
    in this result set share the same domain.


    Remember the closure property (in the section “Union, Intersection, and Difference”
    in Chapter 2)? We’re only interested in those cases where the union of two tables
    results in another table. The union operator is evidently not closed over tables
    in general. It’s only closed over tables if the operands are tables that have
    the same heading. If the operands of the union operator are non-empty tables over
    different headings, then the resulting set won’t be a table.


    Note the special case where the empty table is involved as an operand. The union
    of a given table with the empty table (`∅`) always results in the given table;
    because `∅` is a table over any heading, the closure property holds.


    ## Intersection


    The intersection of two sets holds all objects that are an element of the first
    set and an element of the second set. Here’s the intersection of tables `E1` and
    `E2` (`E1∩E2`): `E1∩E2` = { {(EMPNO;102), (ENAME;''Thomas''), (JOB;''SALESMAN'')}
    }


    The intersection of `E1` and `E2` is a table. It’s probably not difficult to see
    that the intersection of two tables with the same heading will always result in
    another table. Note that the intersection is also closed over tables when the
    operands are tables over different headings.


    However, the intersection is useless in these cases, because it then always results
    in the empty table; you might want to check this by investigating the intersection
    of `E1` and `E3` (tables with different headings).


    You can meaningfully intersect tables `E1` and (part of ) `E3`, but first you’d
    have to transform one of these in such a way that it has the same heading as the
    other table. The concepts that enable you to do so have all been introduced in
    Chapter 4: function limitation and function composition.


    Take a look at the following definition for table `E4`. It renames attributes
    `E#` and `NAME` of table `E3`.


    `E4 := { e◊{(EMPNO;E#),(ENAME;NAME),(JOB;JOB),(SAL;SAL)} | e∈E3 }`


    Set `E4` is a table over `{EMPNO,ENAME,JOB,SAL}`. We used function composition
    (`◊`; see Definition 4-8) to rename two attributes. Attribute `E#` is renamed
    to `EMPNO` and attribute `NAME` is renamed to `ENAME`. The other two attributes
    (`JOB` and `SAL`) are left untouched.


    Next we need to get rid of the extra `SAL` attribute (which is also not part of
    the heading of `E1`). For this we use function limitation (`↓`, see Definition
    4-4). Take a look at the definition of `E5`:


    `E5 := { e↓{EMPNO,ENAME,JOB} | e∈E4 }`


    `E5` equals the following set:


    { {(EMPNO;101), (ENAME;''Anne''), (JOB;''TRAINER'')}


    ,{(EMPNO;102), (ENAME;''John''), (JOB;''MANAGER'')} }


    The intersection of `E5` with `E1` has now become meaningful, and results in the
    following set: `E5∩E1` = { {(EMPNO;101), (ENAME;''Anne''), (JOB;''TRAINER'')}
    }


    Last, we note the special case where the empty table is involved as an operand.
    The intersection of a given table with the empty table always results in the empty
    table.


    ## Difference


    The difference of two sets holds all objects that are an element of the first
    set and that are not an element of the second set. Here is the difference of tables
    `E1` and `E2` (`E1–E2`): `E1–E2` =


    { {(EMPNO;101), (ENAME;''Anne''), (JOB;''TRAINER'') }


    ,{(EMPNO;103), (ENAME;''Lucas''), (JOB;''PRESIDENT'')} }'
