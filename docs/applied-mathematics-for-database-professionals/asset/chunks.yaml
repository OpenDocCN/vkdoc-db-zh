- fmt: '# Chapter 10 Data Manipulation


    ## Listing 10-2. Transaction ETX1(dbs)


    In the SQL specifications, we''ll use the table structure names introduced by
    database characterization `DB_CHREX` (see Listing 7-38) as the table names available
    for `INSERT`, `UPDATE`, and `DELETE` statements. Alternative SQL specifications
    will be named `SEr` (`SQL` expression r), where r represents a Roman numeral (I,
    II, III, and so on).


    In the following formal expressions, we''ll specify a transaction as a function
    similar to the way `Tx1a` and `Tx2a` (always resulting in a modified database
    state) were specified in the previous section. However, we intend—as discussed
    in the previous section—that all static and dynamic constraints should remain
    satisfied; that is, that the transaction rolls back whenever either the resulting
    database state is not an element of `DB_UEX`, or the ordered pair representing
    the transition from the begin state to the end state is not an element of `ST_UEX`.


    In the previous section, you saw two examples of a transaction that inserts a
    single tuple.


    Take a look at the example in Listing 10-2. It specifies a transaction that inserts
    (potentially) multiple tuples. Listing 10-2 registers all administrators that
    have been hired in the past quarter (91 days) for the offering of course `AM4DP`
    that starts on March 1, 2007.


    **FEa**: `dbs↓{EMP,SREP,MEMP,TERM,DEPT,GRD,CRS,OFFR,HIST}`

    ∪

    `{ (REG; dbs(REG)`

    ∪

    `{ { (COURSE;''AM4DP''`

    `)`

    `,(STARTS;''01-mar-2007'')`

    `,(STUD;`

    `e(EMPNO)`

    `)`

    `,(EVAL;`

    `) }`

    `| e∈dbs(EMP) ∧ e(JOB)=''ADMIN'' ∧ e(HIRED) ≥ sysdate-91`

    `∧ e(HIRED) ≤ sysdate } ) }`


    **SEI**:

    ```sql

    insert into REG(STUD,EVAL,COURSE,STARTS)

    select e.EMPNO, -1, ''AM4DP'', ''01-mar-2007''

    from EMP e

    where e.JOB = ''ADMIN''

    and e.HIRED between sysdate - 91 and sysdate

    ```


    This transaction only changes the `REG` table structure; the tuples that result
    from a query on the `EMP` table are added to it. In these tuples, attributes `COURSE`,
    `STARTS`, and `EVAL` are set to values `''AM4DP''`, `''01-mar-2007''`, and `-1`,
    respectively. Attribute `STUD` ranges over all employee numbers of administrators
    that were hired in the past 91 days.


    In the formal specification, the order of the attribute-value pairs enumerated
    inside the query part of this specification does not matter. However, in the SQL
    expression, the order of the value expressions listed in the second line (the
    one starting with keyword `SELECT`) must match the order of the attributes listed
    in the first line (following keyword `INSERT`).


    **■Note** In SQL, embedded queries such as the one displayed in `SEI` are often
    referred to as *subqueries*.


    Finally, you should recognize that because the subquery in `SEI` selects `EMPNO`
    (the uniquely identifying attribute in the `EMP` table structure), there is no
    need to include the `distinct` keyword right after the `select` keyword.


    ## Listing 10-3. Transaction ETX2(dbs)


    Another common transaction is the deletion of tuples from the database. Listing
    10-3 gives an example that deletes registrations. Listing 10-3 deletes all registrations
    of student 3124 for scheduled or confirmed offerings that start in the future.


    **FEa**: `dbs↓{EMP,SREP,MEMP,TERM,DEPT,GRD,CRS,OFFR,HIST}`

    ∪

    `{ (REG; { r | r∈dbs(REG) ∧`

    `¬ ( r(STUD) = 3124 ∧`

    `r(STARTS) > sysdate ∧`

    `↵{ o(STATUS) | o∈dbs(OFFR) ∧`

    `o↓{COURSE,STARTS} = r↓{COURSE,STARTS} }`

    `∈{''SCHD'',''CONF''} )`

    `} ) }`


    **FEb**: `dbs↓{EMP,SREP,MEMP,TERM,DEPT,GRD,CRS,OFFR,HIST}`

    ∪

    `{ (REG; { r↓{STUD,COURSE,STARTS,EVAL} | r∈dbs(REG)⊗dbs(OFFR) ∧`

    `( r(STUD) ≠ 3124 ∨`

    `r(STARTS) ≤ sysdate ∨`

    `r(STATUS) = ''CANC'' )`

    `} ) }`


    **FEc**: `dbs↓{EMP,SREP,MEMP,TERM,DEPT,GRD,CRS,OFFR,HIST}`

    ∪

    `{ (REG; dbs(REG) -`

    `{ r | r∈dbs(REG) ∧ r(STUD) = 3124 ∧ r(STARTS) > sysdate ∧`

    `↵{ o(STATUS) | o∈dbs(OFFR) ∧`

    `o↓{COURSE,STARTS} = r↓{COURSE,STARTS} }`

    `∈{''SCHD'',''CONF''}`

    `} ) }`


    **SEI**:

    ```sql

    delete from REG r

    where r.STUD = 3124

    and r.STARTS > sysdate

    and (select o.STATUS

    from OFFR o

    where o.COURSE = r.COURSE

    and o.STARTS = r.STARTS) in (''SCHD'',''CONF'') )

    ```'
