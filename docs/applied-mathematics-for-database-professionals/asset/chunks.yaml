- fmt: '# 实施Oracle数据库设计


    ## 数据完整性代码（DI代码）


    编写试图更改当前数据库状态的`wBL`代码。当它执行时，SQL `DBMS`应确保不会违反任何数据完整性约束；产生的数据库状态应满足所有数据完整性约束。


    通常，你会发现嵌入在`wBL`代码中的代码，其特定目的是验证将要执行的事务不会导致违反任何相关数据完整性约束的状态。我们认为这种约束验证代码不属于`wBL`代码类，而是属于下一节讨论的*数据完整性代码*类。


    **数据完整性代码（DI代码）**


    数据完整性代码是所有处理验证数据完整性约束持续有效性的*声明式*或*过程式*代码。每当`wBL`代码执行事务时，作为此类事务一部分执行的数据操作语句可能违反数据完整性约束。如果确实如此，数据完整性代码将确保此类语句失败，并且回滚其所做的更改。


    **注意** 我们特意将`DI`代码视为一个独立的类，而不是业务逻辑代码类的一部分。大多数其他涉及*业务逻辑*的书籍和文章常常模糊不清`DI`代码是否被视为业务逻辑的一部分。


    对于大多数数据完整性约束——实际上是除了属性约束和元组约束之外的所有约束——`DI`代码将必须执行数据检索代码（查询）来确定给定的数据操作语句是否被允许。对于多元组约束，`DI`代码总是需要执行查询（检查其他涉及的行）以验证产生的数据库状态是否仍然满足所有数据完整性约束。


    例如，考虑在清单7-26（表`universe` `tab_EMP`）中定义的“最多允许一位总裁”表约束。当一个事务试图插入一位总裁时，你应该在执行插入操作之前或之后运行一个*约束验证查询*，以根据此约束验证该插入是否被允许。


    如果你决定在实际执行插入操作之前验证约束是否仍然满足，你可以执行以下约束验证查询：


    ```sql

    select ''there is already a president''

    from emp

    where job=''PRESIDENT''

    and rownum=1

    ```


    如果此查询返回一行，那么显然不应允许该插入继续进行；插入另一位总裁显然会创建违反此约束的数据库状态。


    在另一种情况下——在插入后执行查询——你可以运行以下查询：


    ```sql

    select count(*)

    from emp

    where job=''PRESIDENT''

    ```


    如果此查询返回的结果大于1，则将违反约束，并且必须回滚该插入。


    理想情况下，你希望给定所有约束的*声明*，`DBMS`能够自动推断并执行这些约束验证查询（以及一些条件代码，以阻止`DML`语句的执行或强制回滚`DML`语句）。提供此服务的`DBMS`使编写业务逻辑的开发人员的任务变得容易得多。


    **注意** 如果你熟悉`Oracle`，你会知道`Oracle`的`SQL DBMS`只能为有限数量的约束类型提供此服务。


    你可以将`DI`代码类细分为五个子类，每种约束类型一个：

    1. 验证属性约束的代码

    2. 验证元组约束的代码

    3. 验证表约束的代码

    4. 验证数据库约束的代码

    5. 验证转换约束的代码


    正如你将看到的，对于某些约束，你可以在`SQL DBMS`中以*声明式*的方式说明所需的`DI`代码（然后由`DBMS`负责维护该约束）。然而，对于大多数约束，你需要手动开发代码；也就是说，你负责实现。这意味着你需要自己设计和编写*过程式代码*来维护约束。


    **注意** 有两种高级的过程式实现策略来创建`DI`代码；要么你利用*数据库触发器*，要么将`DI`代码嵌入到`wBL`代码中。我们将在本章的剩余部分更详细地讨论前者。


    **用户界面代码（UI代码）**


    `UI`代码是决定业务应用程序外观和感觉的代码。它负责用户在使用应用程序时所面对的业务应用程序的前端。`UI`代码要么

    - 为用户创建用户界面——业务应用程序的*外观*——并通常在用户界面中显示检索到的数据，要么

    - 响应用户发起的用户界面事件，然后修改用户界面——业务应用程序的*感觉*。


    创建和/或修改用户界面总是需要嵌入对业务逻辑代码的调用。这些`BL`代码将把数据返回给`UI`代码进行显示，和/或将作为用户请求事务的一部分更改数据。根据这些嵌入式`BL`代码调用的结果，`UI`代码将相应地修改用户界面。


    作为总结，图11-1说明了我们在本节介绍的不同`WoD`应用程序代码类之间的相关性。


    **注意** 在图11-1中，`DI`代码框被特意绘制在`DBMS`框*之外*，因为开发`wBL`代码的应用程序开发人员需要以过程式实现大部分的`DI`代码（正如本章过程中将变得明显的那样）。


    **图11-1.** *WoD应用程序代码类*


    此图说明了代码类之间的以下关系（请注意，此列表中的数字对应于图11-1内部的数字）：

    1. `UI`代码持有对`rBL`代码（查询）或`wBL`代码（事务）的调用。

    2. `rBL`代码持有嵌入的从数据库读取数据的数据检索代码。

    3. `wBL`代码持有嵌入的向数据库写入的数据操作代码。`wBL`代码通常也持有读取数据库的嵌入式查询。

    4. `DI`代码需要执行数据检索代码。

    5. `DI`代码通常从`wBL`代码调用。

    6. `DI`代码也可以由`DBMS`通过*数据库触发器*调用（见下一节），这些触发器作为源自`wBL`代码的`DML`语句执行的结果而触发。

    7. 有时你会发现`UI`代码直接调用`DI`代码；这通常是为了创建一个响应更快、更用户友好的用户界面。


    **实现数据完整性代码**


    在本节中，你将找到一个关于在`Oracle`的`SQL DBMS`中实现`DI`代码的上述策略的简要探讨。我们还将讨论一些相关主题。


    **替代实现策略**


    如前一节所述，当事务执行时，你应该运行`DI`代码以验证所有数据完整性约束是否仍然满足。当`WoD`应用程序试图执行事务时，有三种不同的策略来确保`DI`代码的执行：

    - 声明式

    - 触发器过程式

    - 嵌入式过程式


    声明式'
  raw: 'Write BL code attempts to change the current database state. When it executes,
    the SQL


    DBMS should ensure that none of the data integrity constraints gets violated;
    the resulting database state should satisfy all data integrity constraints.


    Often, you’ll find code embedded within wBL code whose specific purpose is to
    verify that the transaction that gets executed won’t result in a state that violates
    any of the involved data integrity constraints. We consider this constraint-verifying
    code not part of the wBL code class, but rather part of the *data integrity code*
    class discussed in the next section.


    7451CH11.qxd 5/15/07 2:26 PM Page 245


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    **245**


    Data Integrity Code (DI Code)


    Data integrity code is all *declarative* or *procedural* code that deals with
    verifying the continued validity of data integrity constraints. Whenever wBL code
    executes transactions, the data manipulation statements that get executed as part
    of such transactions can potentially violate data integrity constraints. If this
    is indeed the case, data integrity code will ensure that such a statement fails
    and that the changes it made are rolled back.


    **■Note** We deliberately consider DI code to be in a distinct class by itself
    and not part of the business logic code class. Most other books and articles dealing
    with *business logic* often remain fuzzy about whether DI code is considered part
    of business logic or not.


    For the majority of the data integrity constraints—in fact, all but attribute
    and tuple constraints—DI code will have to execute data retrieval code (queries)
    to determine if a given data manipulation statement is allowed or not. For multi-tuple
    constraints, DI code will always need to execute queries (inspecting other involved
    rows) to verify that the resulting database state still satisfies all data integrity
    constraints.


    For example, consider the “at most one president allowed” table constraint defined
    in Listing 7-26 (table universe tab_EMP). When a transaction attempts to insert
    a president, you should run a *constraint validation query* either *before* execution
    of the insert or *after* execution of the insert, to verify that the insert is
    allowed given this constraint.


    If you decide to validate whether the constraint remains satisfied before the
    actual execution of the insert, you could execute the following constraint validation
    query: select ''there is already a president''


    from emp


    where job=''PRESIDENT''


    and rownum=1


    If this query returns a row, then obviously the insert must not be allowed to
    proceed; inserting another president will clearly create a database state that
    violates this constraint.


    In the other case—executing a query after the insert—you could run the following
    query: select count(*)


    from emp


    where job=''PRESIDENT''


    If this query returns more than 1, then the constraint will be violated and the
    insert must be rolled back.


    Ideally you would want that, given the *declaration* of all constraints, the DBMS
    automatically deduces and executes these constraint validation queries (alongside
    some conditional code either to refrain execution of a DML statement or to force
    a DML statement rollback). A DBMS that provides this service makes the task of
    the developer who codes business logic a lot easier.


    7451CH11.qxd 5/15/07 2:26 PM Page 246


    **246**


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    **■Note** If you’re familiar with Oracle, you’ll know that Oracle’s SQL DBMS can
    perform this service only for a limited number of types of constraints.


    You can subdivide the DI code class into five subclasses, one per type of constraint:
    **1.** Code that verifies attribute constraints


    **2.** Code that verifies tuple constraints


    **3.** Code that verifies table constraints


    **4.** Code that verifies database constraints


    **5.** Code that verifies transition constraints


    As you’ll see shortly, you can state the required DI code for some constraints
    *declaratively* in an SQL DBMS (which is then responsible for maintaining the
    constraint). However, you need to develop the code for most of them manually;
    that is, you are responsible for the implementation. This means that you need
    to design and write *procedural code* to maintain the constraint yourself.


    **■Note** There are two high-level implementation strategies for creating DI code
    procedurally; either you make use of *database triggers*, or you embed DI code
    within wBL code. We’ll discuss the former one in more detail in the remainder
    of this chapter.


    User Interface Code (UI Code)


    UI code is code that determines the look and feel of a business application. It
    is responsible for the front end of the business application that the user deals
    with when using the application. UI code either


    • Creates user interface for the user—the *look* of the business application—and
    typically displays retrieved data within the user interface, or


    • Responds to user interface events initiated by the user and then modifies the
    user interface—the *feel* of the business application.


    Creating and/or modifying the user interface always requires embedded calls to
    business logic code. This BL code will return the data to the UI code for display,
    and/or will change data as part of the transaction requested by the user. Depending
    upon the results of these embedded BL code calls, UI code will modify the user
    interface accordingly.


    As a summary, Figure 11-1 illustrates the correlation between the different WoD
    application code classes that we’ve introduced in this section.


    7451CH11.qxd 5/15/07 2:26 PM Page 247


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    **247**


    **■Note** In Figure 11-1, the reason why the DI code box is deliberately drawn
    *outside* the DBMS box is because application developers who develop wBL code
    need to implement the majority of DI code procedurally (as will become obvious
    in the course of this chapter).


    **Figure 11-1.** *WoD application code classes*


    This figure illustrates the following relations between the code classes (note
    that the numbers in this list refer to the numbers inside Figure 11-1): **1.**
    UI code holds calls to rBL code (queries) or wBL code (transactions).


    **2.** rBL code holds embedded data retrieval code that reads data from the database.


    **3.** wBL code holds embedded data manipulation code that writes to the database.
    wBL


    code often also holds embedded queries reading the database.


    **4.** DI code requires the execution data retrieval code.


    **5.** DI code is typically called from wBL code.


    **6.** DI code can also be called by the DBMS via *database triggers* (see the
    next section), which fire as a result of the execution of DML statements originating
    from wBL code.


    **7.** Sometimes you’ll see that UI code calls DI code directly; this is often
    done to create a responsive, more user-friendly user interface.


    **Implementing Data Integrity Code**


    In this section you’ll find a brief exploration of the aforementioned strategies
    for implementing DI code in Oracle’s SQL DBMS. We’ll also discuss a few related
    topics.


    7451CH11.qxd 5/15/07 2:26 PM Page 248


    **248**


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    **Alternative Implementation Strategies**


    As mentioned in the previous section, when transactions execute, you should run
    DI code to verify that all data integrity constraints remain satisfied. There
    are three different strategies to ensure execution of DI code when a WoD application
    attempts to execute a transaction:


    • Declarative


    • Triggered procedural


    • Embedded procedural


    Declarative'
