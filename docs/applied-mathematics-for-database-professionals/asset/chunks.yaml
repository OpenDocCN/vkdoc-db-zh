- fmt: '## 第三章 更多逻辑


    ### 连续嵌套量词的缩写


    如果你有两个连续的、**相同类型**且作用于**同一集合**的量词，通常可以按如下方式缩写你的公式：


    `∃x∈N: ∃y∈N: x + y > 42`


    前面针对同一集合的存在量化变为：


    `∃x,y∈N: x + y > 42`


    同样地，对于全称量化：


    `∀x∈N: ∀y∈N: x + y > 42`


    前面针对同一集合的全称量化变为：


    `∀x,y∈N: x + y > 42`


    ### 量词的分配律


    清单3-13展示了全称量词和存在量词的分配律。


    **清单 3-13.** *量词的分配律*

    * ( ∃x∈S: P(x) ∨ Q(x) ) ⇔ ( ( ∃x∈S: P(x) ) ∨ ( ∃x∈S: Q(x) ) )

    * ( ∀x∈S: P(x) ∧ Q(x) ) ⇔ ( ( ∀x∈S: P(x) ) ∧ ( ∀x∈S: Q(x) ) )

    * ( ∃x∈S: P(x) ∧ Q ) ⇔ ( ( ∃x∈S: P(x) ) ∧ Q )

    * ( ∀x∈S: P(x) ∨ Q ) ⇔ ( ( ∀x∈S: P(x) ) ∨ Q )


    注意，在清单3-13的最后两个例子中，谓词`Q`没有写成`Q(x)`；这表示谓词`Q`不具有参数`x`。只有当`x`**不**作为参数出现在谓词`Q`中时，你才能使用最后两个逻辑等价式；例如：

    `( ∀y∈S: ( ∃x∈S: x>10 ∧ y<5 ) ) ⇔ ( ∀y∈S: ( ∃x∈S: x>10 ) ∧ y<5 ) ⇔ ( ∀y∈S: ( ∃x∈S:
    x>10 ) ) ∧ ( ∀y∈S: y<5 )`


    顺便问一下，你看出最后一个等式中左边的合取项是`( ∀y∈S: Q )`这种形式了吗？更具体地说，它表示的是对一个命题的全称量化；它并不是在对一个参数被量词绑定的谓词进行量化。类似的情况也可能出现在存在量化中。看一下清单3-14，它针对这种情况引入了两条重写规则。


    **清单 3-14.** *对命题进行量化的重写规则*

    * ( ∀x∈S: P ) ⇔ ( ( S = ∅ ) ∨ P )

    * ( ∃x∈S: Q ) ⇔ ( ( S ≠ ∅ ) ∧ Q )


    这里`P`和`Q`代表命题。使用这些重写规则，你可以将前面的例子进一步重写为以下表达式：

    `( ( S = ∅ ) ∨ ( ∃x∈S: x>10 ) ) ∧ ( ∀y∈S: y<5 )`


    ### 量词的否定


    如果你将否定连接词与全称量词结合使用，会发生以下情况：


    **1.** `¬(∀x∈S: P(x))` 意味着`P`对于`S`中所有元素`x`**并非**为真。

    **2.** 因此，必然存在（至少）一个值使`P`不为真；换句话说：`(∃x∈S: ¬P(x))`


    同样地，将否定添加到存在量化中会导致以下结果：

    **1.** `¬(∃x∈S: P(x))` 意味着不存在`S`中的元素`x`使得`P`为真。

    **2.** 因此，对于`S`中所有值`x`，`P`必须为假；换句话说：`(∀x∈S: ¬P(x))`


    因此我们得到两个重要的量词重写规则，如清单3-15所示。


    **清单 3-15.** *量词否定的重写规则*

    * `¬( ∀x∈S: P(x) ) ⇔ ( ∃x∈S: ¬P(x) )`

    * `¬( ∃x∈S: P(x) ) ⇔ ( ∀x∈S: ¬P(x) )`


    你还记得前面章节“空集上的量化”（见表3-2）中关于空集上量化的讨论吗？我们不希望空集对这些规则造成任何例外。因此：

    * 给定 `(∃x∈∅: P(x)) ⇔ FALSE`，我们可以将其转换为 `¬(∀x∈∅: ¬P(x)) ⇔ FALSE`（使用清单3-15中的第一条重写规则）。

    * 但这样一来 `¬¬(∀x∈∅: ¬P(x)) ⇔ TRUE`（等价式两边的谓词都进行否定）。

    * 所以 `(∀x∈∅: ¬P(x)) ⇔ TRUE`，与谓词无关（划掉全称量词前面的双重否定）。'
  raw: '∀y∈(B∪{x}) before x is introduced in the second quantifier. To be more precise,
    the expression is not illegal, but rather confusing. If you bind a variable by
    quantification, the scope of that variable is the quantified expression; the variable
    is *unknown* outside the quantified expression. In other words, in the expression
    ∀y∈(B∪{x}): ∀x∈A: Q(x,y) the first x is not the same as the other ones. So, you
    might as well say ∀y∈(B∪{x}): ∀z∈A: Q(z,y). But then, this expression is not a
    proposition but a predicate, because it contains a free variable x.


    Abbreviation of Consecutive Nested Quantifiers


    If you have two consecutive quantifiers of the *same* type over the *same* set,
    it’s common to abbreviate your formulas as follows:


    ∃x∈**N**: ∃y∈**N**: x + y > 42


    The preceding existential quantification over the same set becomes


    ∃x,y∈**N**: x + y > 42


    And likewise for universal quantification:


    ∀x∈**N**: ∀y∈**N**: x + y > 42


    The preceding universal quantification over the same set becomes


    ∀x,y∈**N**: x + y > 42


    7451CH03.qxd 5/4/07 2:26 PM Page 57


    C H A P T E R 3 **■** S O M E M O R E L O G I C


    **57**


    **Distributive Properties of Quantifiers**


    Listing 3-13 shows the distributive properties of the universal and existential
    quantifiers.


    **Listing 3-13.** *Distributive Properties of Quantifiers* ( ∃x∈S: P(x) ∨ Q(x)
    ) ⇔ ( ( ∃x∈S: P(x) ) ∨ ( ∃x∈S: Q(x) ) ) ( ∀x∈S: P(x) ∧ Q(x) ) ⇔ ( ( ∀x∈S: P(x)
    ) ∧ ( ∀x∈S: Q(x) ) ) ( ∃x∈S: P(x) ∧ Q ) ⇔ ( ( ∃x∈S: P(x) ) ∧ Q )


    ( ∀x∈S: P(x) ∨ Q ) ⇔ ( ( ∀x∈S: P(x) ) ∨ Q )


    Note that in the last two examples in Listing 3-13, predicate Q is not written
    as Q(x); this denotes that predicate Q does not have a parameter x. You can use
    the last two logical equivalences only if x does *not* occur as a parameter in
    predicate Q; for example: ( ∀y∈S: ( ∃x∈S: x>10 ∧ y<5 ) )


    ⇔ ( ∀y∈S: ( ∃x∈S: x>10 ) ∧ y<5 )


    ⇔ ( ∀y∈S: ( ∃x∈S: x>10 ) ) ∧ ( ∀y∈S: y<5 )


    By the way, do you see that the left conjunct in the last equation is of the form
    ( ∀y∈S: Q )? More specifically, it represents a universal quantification over
    a proposition; it doesn’t quantify over a predicate whose parameter gets bound
    by the quantifier. Something similar can occur with an existential quantification.
    Take a look at Listing 3-14, which introduces two rewrite rules for these situations.


    **Listing 3-14.** *Rewrite Rules for Quantification Over Propositions* ( ∀x∈S:
    P ) ⇔ ( ( S = ∅ ) ∨ P )


    ( ∃x∈S: Q ) ⇔ ( ( S ≠ ∅ ) ∧ Q )


    Here P and Q represent propositions. Using these rewrite rules, you can further
    rewrite the preceding example into the following expression:


    ( ( S = ∅ ) ∨ ( ∃x∈S: x>10 ) ) ∧ ( ∀y∈S: y<5 )


    **Negation of Quantifiers**


    If you use the negation connective in combination with a universal quantifier,
    the following happens:


    **1.** ¬(∀x∈S: P(x)) means that P is *not* TRUE for all elements x of S.


    **2.** Therefore, there must be (at least) one value for which P is not TRUE;
    in other words: (∃x∈S: ¬P(x))


    Likewise, adding the negation to an existential quantification results in the
    following: **1.** ¬(∃x∈S: P(x)) means that there is no element x of S for which
    P is TRUE.


    **2.** Therefore, P must be FALSE for all values x in S; in other words: (∀x∈S:
    ¬P(x))


    7451CH03.qxd 5/4/07 2:26 PM Page 58


    **58**


    C H A P T E R 3 **■** S O M E M O R E L O G I C


    So we have two important quantifier rewrite rules, as shown in Listing 3-15.


    **Listing 3-15.** *Rewrite Rules for Negation of Quantifiers*


    ¬( ∀x∈S: P(x) ) ⇔ ( ∃x∈S: ¬P(x) )


    ¬( ∃x∈S: P(x) ) ⇔ ( ∀x∈S: ¬P(x) )


    Do you remember the discussion about quantification over the empty set in the
    previous section “Quantification Over the Empty Set” (see Table 3-2)? We don’t
    want the empty set to cause any exceptions to the rules. Therefore


    • Given (∃x∈∅: P(x)) ⇔ FALSE, we can transform this into ¬(∀x∈∅: ¬P(x)) ⇔ FALSE


    (using the first rewrite rule in Listing 3-15)


    • But then ¬¬(∀x∈∅: ¬P(x)) ⇔ TRUE (negation of predicates at both sides of equivalence)


    • So (∀x∈∅: ¬P(x)) ⇔ TRUE, regardless of the predicate (strike out the double
    negation in front of the universal quantifier)'
