    PAR1 as an argument to these predicates.


    As you’ve probably already noticed, PAR1 satisfies predicate P5; there are no
    two different parts in PAR1 that have the same partno value. The total stock value
    represented by PAR1 is 675, which is less than 2500, so PAR1 also satisfies P6\.
    However, it violates predicate P7; part 3 is out of stock but there isn’t a different
    part with the same name (axe) that’s in stock.


    In the remainder of this book, we’ll consider a table predicate a degenerate case
    of a table predicate if it can be rewritten into a predicate with the following
    pattern: P(T) := ( ∀t∈T: Q(t) )


    Here Q(t) represents a tuple predicate. If a table predicate is of the preceding
    form, then we consider it a *tuple predicate in disguise*. In the next chapter,
    we’ll specify these degenerate cases of table predicates differently than the
    other table predicates; in fact, for these cases we’ll specify tuple predicate
    Q(t) in a different *layer* than the other table predicates, and table predicate
    P(T) is discarded as a table predicate.


    A degenerate case of a table predicate disguising a tuple predicate would be this:
    P(T) := ( ∀t∈T: t(price) ≥ 20 ⇒ t(instock) ≤ 10 )


    This is the table predicate variation of tuple predicate P1(t) from Listing 6-1
    that we won’t allow as a table predicate.


    **■Note** Predicate P7 is indeed a table predicate, though you might at first
    sight think that it fits the preceding pattern. It actually does not; it is of
    the form (∀t∈T: Q(t,T)), which is a different pattern.


    7451CH06.qxd 5/14/07 10:37 AM Page 122


    **122**


    C H A P T E R 6 **■** T U P L E , TA B L E , A N D D ATA B A S E P R E D I C AT
    E S


    Without loss of generality we will also—just like tuple predicates—confine our
    attention to table predicates consisting of a single conjunct. If you can rewrite
    a given table predicate P(T) into an expression of the form Q(T) ∧ R(T), then
    you are in fact dealing with two table predicates. Here is an example to illustrate
    this:


    ( ∀t1∈T: t1(instock)>100 ⇒


    ( (∀t2∈T: t2(partno)≠t1(partno) ⇒ t2(name)≠t1(name))


    ∧


    t1(price)?<200


    )


    )


    This predicate states that if for a given part we have more than 100 items in
    stock, then there should not exist another part that has the same name, nor should
    the price of the given part be equal to 200 or more. This table predicate is of
    the following form: ( ∀t∈T: Q1(t) ⇒ ( Q2(t,T) ∧ Q3(t) ) )


    Using the following rewrite rule


    ( A ⇒ (B ∧ C) ) ⇔ ( (A ⇒ B) ∧ (A ⇒ C) )


    together with the distributive property of a universal quantification (see Listing
    3-12), you can rewrite this into a conjunction of two predicates:


    ( ∀t∈T: Q1(t) ⇒ Q2(t,T) )


    ∧


    ( ∀t∈T: Q1(t) ⇒ Q3(t) )


    This shows that you’re dealing with two predicates. The first conjunct is indeed
    a table predicate, and the second one is actually a tuple predicate in disguise!'
  trans: "\n## 元组谓词\n\nP1 是 `{status, total}` 上的一个元组谓词，P2 是 `{salary, sex}` 上的一个元组谓词，P3\
    \ 是 `{begindate, enddate}` 上的一个元组谓词。通常，如果给定一个谓词，比如 `P(t)`，它是某个集合 `A` 上的谓词，那么我们只能用域是\
    \ `A` 的超集的元组来有意义地实例化谓词 `P`。例如，`t5` 的域——`{salary, sex, name}`——是 `{salary, sex}`\
    \ 的（真）超集。因此，我们可以用 `t5` 来实例化谓词 `P3`——一个 `{salary, sex}` 上的谓词。\n\n正如你从所给的例子中看到的，元组谓词允许是复合的；也就是说，它可以涉及逻辑连接词。该谓词的组件通常将作为参数提供的元组的属性值与某些给定值进行比较。\n\
    \n关于元组谓词，我们还需要再观察两点。第一个涉及谓词中涉及的属性数量。注意谓词 `P0` 只引用了 `sex` 属性；它是一个单元素上的元组谓词。\n\n\
    我们认为一个单元素上的元组谓词——比如 `A` 上的 `P(t)`——是元组谓词的一种退化情况。在第 7 章以及后面的第 11 章中，我们会将这种元组谓词的退化情况视为对属性\
    \ `↵A` 的属性值集的一个条件（要刷新你对选择算子 `↵` 的记忆，请参见第 2 章的“选择算子”一节）。\n\n`■Note` *分层方法*（在本章引言的第二个注释中提到）要求，单元素上的元组谓词必须在一个单独的层级中指定，这与在集合（比如\
    \ `A`）上的元组谓词不同，后者的基数 `A` 是二或更大。\n\n7451CH06.qxd 5/14/07 10:37 AM Page 120\n\n\
    **120**\n\nC H A P T E R 6 ■ T U P L E , TA B L E , A N D D A T A B A S E P R\
    \ E D I C A T E S\n\n其次，元组谓词不应分解为多个合取项。在第 7 章和第 11 章中，我们将要求一个元组谓词在写成合取范式（CNF）时，只包含一个合取项。如果该谓词的\
    \ CNF 版本有多个合取项，那么我们实际上是在处理多个（与合取项数量一样多的）潜在的元组谓词。\n\n列表 6-1 中的谓词 `P2` 违反了这第二点观察；它的\
    \ CNF 中有多个合取项。下面是重写为 CNF 的谓词 `P2`（你可以通过使用分配重写规则快速实现这一点）：\n\n```\nP2(t) := ( (t(status)='F'\
    \ ∨ t(status)='I') ∧ (t(status)='F' ∨ t(total)>0) )\n```\n\n谓词 `P2` 在 CNF 中有两个合取项；因此，我们是在处理两个元组谓词。\n\
    \n我们将它们分别命名为 `P2a` 和 `P2b`：\n\n```\nP2a(t) := ( t(status)='F' ∨ t(status)='I'\
    \ )\nP2b(t) := ( t(status)='F' ∨ t(total)>0 )\n```\n\n正如你所看到的，谓词 `P2a` 是单元素 `{status}`\
    \ 上的一个元组谓词。因此，根据我们的第一点观察，`P2a` 是元组谓词的一种退化情况。我们已经把看起来像是一个元组谓词的 `P2` 分解成了一个（更简单的）元组谓词\
    \ `P2b` 和一个对 `status` 属性值集的条件（`P2a`）的组合。\n\n## 表谓词\n\n在上一节中，你被介绍了一种特定类型的谓词：元组谓词。在本节中，我们将向你介绍*表谓词*的概念。表谓词处理单个表中的*多个元组*。它们是具有单个类型为表（table）的参数的谓词。列表\
    \ 6-3 展示了一些表谓词的例子。\n\n**列表 6-3.** 表谓词示例\n\n```\nP5(T) := ¬( ∃t1,t2∈T: t1≠t2 ∧\
    \ t1(partno)=t2(partno) )\nP6(T) := ( (Σt∈T: t(instock)*t(price)) ≤ 2500 )\nP7(T)\
    \ := ( ∀t1∈T: t1(instock)=0 ⇒\n            (∃t2∈T: t2(partno) ≠t1(partno) ∧ t2(name)=t1(name)\
    \ ∧ t2(instock)>0 ))\n```\n\n谓词 `P5` 表明，在表 `T` 中没有两个不同的元组（零件）具有相同的 `partno` 值。假设谓词\
    \ `P6` 也处理零件表，它大致表示——由零件表 `T` 代表的总库存价值不超过 2500。谓词 `P7` 表明，每当某个零件缺货时，就应该存在另一个不同的零件（具有不同的零件编号），它具有相同的名称并且仍有库存。\n\
    \n`■Note` 重要的是，你（数据库专业人员）能够将这些形式化规范呈现为非形式化表示，反之亦然。在接下来的章节中，你将看到更多这方面的例子。\n\n7451CH06.qxd\
    \ 5/14/07 10:37 AM Page 121\n\nC H A P T E R 6 ■ T U P L E , TA B L E , A N D\
    \ D A T A B A S E P R E D I C A T E S\n\n**121**\n\n与元组谓词类似，我们说 `P5` 是 `{partno}`\
    \ 上的一个表谓词，`P6` 是 `{instock, price}` 上的一个表谓词，而 `P7` 是 `{instock, partno, name}`\
    \ 上的一个表谓词。\n\n现在看一下图 6-1 中的表 `PAR1`。\n\n**图 6-1.** 表 `PAR1`\n\n`PAR1` 是 `{partno,\
    \ name, instock, price}` 上的一个表。这是 `P5`、`P6` 和 `P7` 作为表谓词所基于的所有集合的超集；因此，我们可以有意义地将\
    \ `PAR1` 作为参数提供给这些谓词。\n\n你可能已经注意到，`PAR1` 满足谓词 `P5`；在 `PAR1` 中没有两个不同的零件具有相同的 `partno`\
    \ 值。`PAR1` 代表的总库存价值是 675，小于 2500，所以 `PAR1` 也满足 `P6`。然而，它违反了谓词 `P7`；零件 3 缺货，但没有另一个具有相同名称（斧头）的零件有库存。\n\
    \n在本书的剩余部分，如果一个表谓词可以重写为以下模式的谓词，我们将认为它是表谓词的一个退化情况：\n\n```\nP(T) := ( ∀t∈T: Q(t)\
    \ )\n```\n\n这里 `Q(t)` 代表一个元组谓词。如果一个表谓词符合前面的形式，那么我们认为它是一个*伪装的元组谓词*。在下一章中，我们将以不同于其他表谓词的方式来指定这些表谓词的退化情况；实际上，对于这些情况，我们将把元组谓词\
    \ `Q(t)` 指定在一个不同的*层级*，而表谓词 `P(T)` 则作为表谓词被丢弃。\n\n一个伪装成元组谓词的表谓词退化情况会是这样：\n\n```\n\
    P(T) := ( ∀t∈T: t(price) ≥ 20 ⇒ t(instock) ≤ 10 )\n```\n\n这是列表 6-1 中元组谓词 `P1(t)`\
    \ 的表谓词变体，我们不允许它作为表谓词。\n\n`■Note` 谓词 `P7` 确实是一个表谓词，尽管你乍一看可能认为它符合前面的模式。它实际上不符合；它的形式是\
    \ `(∀t∈T: Q(t,T))`，这是一种不同的模式。\n\n7451CH06.qxd 5/14/07 10:37 AM Page 122\n\n**122**\n\
    \nC H A P T E R 6 ■ T U P L E , TA B L E , A N D D A T A B A S E P R E D I C A\
    \ T E S\n\n不失一般性，我们也将——就像对待元组谓词一样——将注意力限制在由单个合取项组成的表谓词上。如果你可以将一个给定的表谓词 `P(T)`\
    \ 重写为 `Q(T) ∧ R(T)` 形式的表达式，那么你实际上是在处理两个表谓词。以下是一个例子来说明这一点：\n\n```\n( ∀t1∈T: t1(instock)>100\
    \ ⇒\n    ( (∀t2∈T: t2(partno)≠t1(partno) ⇒ t2(name)≠t1(name))\n      ∧\n     \
    \ t1(price)<200\n    )\n)\n```\n\n这个谓词表明，对于一个给定的零件，如果我们有超过 100 件库存，那么不应该存在另一个具有相同名称的零件，并且该给定零件的价格也不应大于等于\
    \ 200。这个表谓词是以下形式：\n\n```\n( ∀t∈T: Q1(t) ⇒ ( Q2(t,T) ∧ Q3(t) ) )\n```\n\n使用以下重写规则\n\
    \n```\n( A ⇒ (B ∧ C) ) ⇔ ( (A ⇒ B) ∧ (A ⇒ C) )\n```\n\n连同全称量词的分配律（见列表 3-12），你可以将其重写为两个谓词的合取：\n\
    \n```\n( ∀t∈T: Q1(t) ⇒ Q2(t,T) )\n∧\n( ∀t∈T: Q1(t) ⇒ Q3(t) )\n```\n\n这表明你正在处理两个谓词。第一个合取项确实是一个表谓词，而第二个实际上是一个伪装的元组谓词！\n"
- fmt: "# Chapter 6: Tuple, Table, and Database Predicates\n\nWe conclude this section\
    \ on table predicates with another example introducing three more table predicates.\
    \ Listing 6-4 first introduces characterization `chr_EMP` that models an employee.\n\
    \n**Listing 6-4.** `Characterization chr_EMP`\n\n```\nchr_EMP := { (empno; [100..999])\n\
    \            ,(ename; varchar(20))\n            ,(job; {'MANAGER','CLERK','TRAINER'}\
    \ )\n            ,(sal; [2000..9000])\n            ,(deptno; [10..99]) }\n```\n\
    \nFor an employee, the employee number (`empno`), its name (`ename`), the employee’s\
    \ job (`job`), the salary (`sal`), and the number (`deptno`) of the department\
    \ that employs the employee are the relevant attributes that are captured by this\
    \ characterization. Using this characterization, you can generate an employee\
    \ table by choosing a subset from `∏(chr_EMP)`. Such a table can be provided as\
    \ the argument to a table predicate. Listing 6-5 introduces three table predicates\
    \ that can accept a table over `dom(chr_EMP)` through parameter `T`.\n\n**Listing\
    \ 6-5.** `More Table Predicate Examples`\n\n```\nP8(T) := ¬( ∃e1,e2∈T: ( (e1(job)='MANAGER'\
    \ ∧ e2(job)='TRAINER') ∨\n                       (e1(job)='TRAINER' ∧ e2(job)='CLERK'\
    \ ) ) ∧\n             e1(sal) ≤ e2(sal) )\nP9(T)  := ( ∀d∈T⇓{deptno}: #{ e2| e2∈T\
    \ ∧ e2(deptno)=d(deptno) } ≥ 3 )\nP10(T) := ( ∀d∈T⇓{deptno}: ( Σe2∈{ e| e∈T ∧\
    \ e(deptno)=d(deptno) }: e2(sal) ) ≤ 40000 )\n```\n\nTable predicate `P8` states\
    \ that managers earn more than trainers, and trainers earn more than clerks. Predicate\
    \ `P9` states that every department should have at least three employees. Predicate\
    \ `P10` states that departmental salary budgets cannot exceed `40000`.\n\nFigure\
    \ 6-2 displays an example subset of `∏(chr_EMP)` named `EMP1`.\n\n**Figure 6-2.**\
    \ `Example table EMP1`\n\nVerify for yourself that `EMP1` is indeed a subset of\
    \ `∏(chr_EMP)` and that it satisfies predicates `P8`, `P9`, and `P10`.\n\n**Note:**\
    \ Given the attribute value set for attribute `sal` in characterization `chr_EMP`,\
    \ the last table predicate `P10` (assuming it can be considered a data integrity\
    \ constraint) implies that there can never be more than `20` employees in a single\
    \ department, because `20` times `2000` (minimum salary possible) equals `40000`\
    \ (maximum departmental salary budget). During information analysis, it’s often\
    \ quite useful to confront end users with such *derivable* statements. It can\
    \ act as a double check for the data integrity constraints already established,\
    \ or likely, it will get you more information that the end user didn’t tell you\
    \ yet.\n\n## Database Predicates\n\nWe continue now by further increasing the\
    \ scope of data that a predicate deals with. After tuple predicates (scope of\
    \ data is a tuple) and table predicates (scope of data is a table), the next level\
    \ up is predicates that deal with *multiple tables*. We’ll call this kind of predicate\
    \ a *database predicate*. A database predicate has one parameter of type database\
    \ state.\n\nTo show a few examples of predicates that deal with a database state,\
    \ we first introduce a department characterization alongside the earlier introduced\
    \ employee characterization.\n\nListing 6-6 defines characterization `chr_DEPT`\
    \ that models a department.\n\n**Listing 6-6.** `Characterization chr_DEPT`\n\n\
    ```\nchr_DEPT := { (deptno; [10..99])\n             ,(dname; varchar(20))\n  \
    \           ,(loc; {'LOS ANGELES','SAN FRANCISCO','DENVER'} )\n             ,(salbudget;\
    \ [25000..50000]) }\n```\n\nFor a department, the department number (`deptno`),\
    \ its name (`dname`), the department’s location (`loc`), and the salary budget\
    \ (`salbudget`) are the relevant attributes this characterization captures.\n\n\
    Figure 6-3 displays an example department table that we name `DEP1`.\n\n**Figure\
    \ 6-3.** `Example table DEP1`\n\nCheck that table `DEP1` is a subset of `∏(chr_DEPT)`\
    \ and that it satisfies the table predicates shown in Listing 6-7.\n\n**Listing\
    \ 6-7.** `Two Example Table Predicates`\n\n```\nP11(T) := ¬( ∃d1,d2∈T: d1≠d2 ∧\
    \ d1(deptno)=d2(deptno) )\n```"
