- fmt: '# CHAPTER 10 DATA MANIPULATION


    ## Specification Overview


    Specification `FEa` reinitializes the `REG` table structure with the result from
    a query that is based on `dbs(REG)`. The query retrieves all registrations that
    should *remain* in the database state; that is, all tuples that do not represent
    a registration of student `3124`, for an offering in the future that has status
    `confirmed` or `scheduled`.


    `FEb` does something similar, only now the query is based on a join between `REG`
    and `OFFR`.


    Note that in this specification, compared to `FEa`, we have rewritten the negation
    according to De Morgan. The query now retrieves all registrations that are either
    not for student `3124`, or that are for an offering that starts in the past (including
    today), or that have status `canceled`.


    The way `FEc` specifies this transaction might be the most intuitive. It specifies
    a table that contains all the registrations that need to be deleted, and then
    subtracts that—using the difference operator (`−`)—from `dbs(REG)`. This specification
    is much like the way you specify this transaction using SQL (see `SEI`).


    As you’ll understand by now, in our formalism a transaction is specified by defining,
    for every possible begin state, what the end state for the transaction will be.
    This involves specifying a table for every table structure. In contrast, with
    SQL you only specify the *change in data* that the transaction achieves; you needn’t
    specify data that remains unchanged.


    Right now you’re probably thinking that formally specifying transactions is rather
    tedious.


    However, you should realize that the SQL expression for the preceding transaction
    `ETX2` is actually a shorthand notation. It specifies that the SQL table variable
    `REG` is (re)assigned its begin state value minus the result set of a query that
    is essentially specified by the `WHERE` clause of the `DELETE` statement.


    ### Note


    Using the mathematical methodology presented in this book, you can also develop
    formal shorthand expressions. Bert De Brock in his book *Foundations of Semantic
    Databases* (Prentice Hall, 1995) develops these for common types of transactions
    (such as deleting tuples from a table structure). However, because this involves
    introducing a few more somewhat complex mathematical concepts, we won’t develop
    formal shorthand in this book. We refer the interested reader to Chapter 7 of
    De Brock’s book.


    ## Transaction Specification Examples


    There is an important point to be made with regards to the ways `ETX2` is specified
    in Listing 10-2\. They all involve the `OFFR` table structure to determine if
    the offering has status `scheduled` or `confirmed`. In fact, this involvement
    is not required. Given constraint `POD6` (`canceled` offerings cannot have registrations),
    in conjunction with the attribute-value set of the `STATUS` attribute in `OFFR`
    (only three values are allowed: `scheduled`, `confirmed`, and `canceled`), you
    can *deduce* that if there is a registration for an offering, then that offering
    will either have status `scheduled` or `confirmed`. There is no need for you to
    specify this in the transaction.


    Here are equivalent formal and SQL specifications for transaction `ETX2`:


    **`FEa`**:

    ```math

    dbs↓{EMP,SREP,MEMP,TERM,DEPT,GRD,CRS,OFFR,HIST}

    ∪

    { (REG; { r | r∈dbs(REG) ∧ ¬ ( r(STUD) = 3124 ∧ r(STARTS) > sysdate ) } ) }

    ```


    **`SEII`**:

    ```sql

    delete from REG r

    where r.STUD = 3124

    and r.STARTS > sysdate

    ```


    You can consider these specifications to be more efficient; a DBMS will likely
    require fewer resources to execute the transaction if specified in this less complex
    way.


    Rewriting formal specifications—be they transactions, queries, or even constraints—using
    knowledge of already established data integrity constraints, into less complex
    specifications, is referred to as *semantic optimization*.


    ### Note


    A true relational DBMS should be capable of performing this semantic optimization
    automatically for us. Unfortunately, DBMSes that perform such sophisticated semantic
    optimizations are still unavailable.


    This is primarily because current DBMSes still have poor support for declaratively
    specified data integrity constraints. This poor declarative support is also the
    reason why this book has Chapter 11.


    ## Update Transaction Example


    Another common transaction is updating tuples in a database. Listing 10-4 gives
    an example that updates the maximum capacity of certain offerings. It doubles
    the maximum capacity of all future offerings planned in Amsterdam.


    **Listing 10-4.** *Transaction `ETX3(dbs)`*


    **`FEa`**:

    ```math

    dbs↓{SREP,MEMP,TERM,EMP,DEPT,GRD,CRS,REG,HIST}

    ∪

    { (OFFR; { o | o∈dbs(OFFR) ∧ ¬ (o(STARTS) > sysdate ∧ o(LOC) = ''AMSTERDAM'')
    }

    ∪

    { o↓{COURSE,STARTS,STATUS,TRAINER,LOC}

    ∪ { (MAXCAP; 2 * o(MAXCAP)) }

    | o∈dbs(OFFR) ∧ o(STARTS) > sysdate ∧ o(LOC) = ''AMSTERDAM'' }

    ) }

    ```


    **`SEI`**:

    ```sql

    update OFFR o

    set o.MAXCAP = 2 * o.MAXCAP

    where o.STARTS > sysdate

    and o.LOC = ''AMSTERDAM''

    ```


    Specification `FEa` clearly demonstrates that updating a subset of tuples can
    be seen as first deleting these tuples and then reinserting them with updated
    attribute values. The first operand of the union operator, at the fourth line
    of the definition of `FEa`, represents the `OFFR` table from which future offerings
    in Amsterdam have been deleted. The second operand of this union operator represents
    the reinsertion of these offerings with a doubled maximum capacity.


    Again, as shown by expression `SEI`, SQL offers a convenient shorthand to specify
    an update transaction.


    We continue with another example update transaction. Transaction `ETX4` in Listing
    10-5 updates the salary of certain employees. Note that state transition constraint
    `STC5` (see Listing 8-8) requires that updates of salary must be logged in the
    `HIST` table structure; more precisely, the `MSAL` values *of the begin state*
    need to be logged. Listing 10-5 increases the salary of all trainers working in
    a department at location Denver by 10 percent.


    **Listing 10-5.** *Transaction `ETX4(dbs)`*


    **`FEa`**:

    ```math

    dbs↓{SREP,MEMP,TERM,DEPT,GRD,CRS,OFFR,REG}

    ∪

    { (HIST; dbs(HIST)

    ∪

    { { (EMPNO; e(EMPNO)

    )

    ,(UNTIL; sysdate )

    ,(DEPTNO;e(DEPTNO) )

    ,(MSAL;

    e(MSAL)

    ) }

    | e∈dbs(EMP)⊗dbs(DEPT) ∧ e(JOB) = ''TRAINER'' ∧ e(LOC) = ''DENVER'' }

    ) }

    ∪

    { (EMP; { e | e∈dbs(EMP) ∧ ¬ (e(JOB) = ''TRAINER'' ∧

    ↵{ d(LOC) | d∈dbs(DEPT) ∧

    d(DEPTNO) = e(DEPTNO) }

    = ''DENVER'') }

    ∪

    { e↓{EMPNO,ENAME,BORN,JOB,HIRED,SGRADE,USERNAME,DEPTNO}

    ∪ { (MSAL; 1.1 * e(MSAL)) }

    | e∈dbs(EMP) ∧ e(JOB) = ''TRAINER'' ∧

    ↵{ d(LOC) | d∈dbs(DEPT) ∧ d(DEPTNO) = e(DEPTNO) }

    = ''DENVER'' }

    ) }

    ```


    **`SEI`**:

    ```sql

    insert into HIST(EMPNO,UNTIL,DEPTNO,MSAL)

    (select e.EMPNO, sysdate, e.DEPTNO, e.MSAL

    from EMP e

    where e.job =''TRAINER''

    and ''DENVER'' = (select d.LOC

    from DEPT d

    where d.DEPTNO = e.DEPTNO));


    update EMP e

    set e.MSAL = 1.1 * e.MSAL

    where e.job =''TRAINER''

    and ''DENVER'' = (select d.LOC

    from DEPT d

    where d.DEPTNO = e.DEPTNO)

    ```


    **`SEII`**:

    ```sql

    update EMP e

    set e.MSAL = 1.1 * e.MSAL

    where e.job =''TRAINER''

    and ''DENVER'' = (select d.LOC

    from DEPT d

    where d.DEPTNO = e.DEPTNO);


    insert into HIST(EMPNO,UNTIL,DEPTNO,MSAL)

    (select e.EMPNO, sysdate, e.DEPTNO, e.MSAL / 1.1

    from EMP e

    where e.job =''TRAINER''

    and ''DENVER'' = (select d.LOC

    from DEPT d

    where d.DEPTNO = e.DEPTNO))

    ```


    Specification `FEa` for transaction `ETX4` assigns new values to both the `HIST`
    and `EMP` table structures, at the same time. It inserts into `HIST` the results
    of a query based on a join between `EMP` and `DEPT`, thereby logging, as required
    by constraint `STC5`, the current `MSAL` and `DEPTNO` values of the tuples that
    are about to be updated (loosely speaking). It also updates `EMP` in the requested
    way. The specifications of these tables (the “new” `HIST` table and the “new”
    `EMP` table) both refer to `dbs`, the begin state of the transaction.'
