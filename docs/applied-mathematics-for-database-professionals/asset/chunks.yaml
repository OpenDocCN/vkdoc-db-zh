    { t | t∈T6⊗T7 ∧ t(job)=''CLERK'' ∧ t(loc)=''DENVER'' }


    Note that Definition 5-4 is not restricted to those cases in which the operands
    actually have at least one attribute in common. You’re allowed to join two tables
    for which the set of join attributes is empty (the compatibility concept allows
    for this); in this case every tuple from the first table is compatible with every
    tuple from the second table (this follows from Definition 4-3). You are then in
    effect combining every tuple of the first table with every tuple of the second
    table. This special case of a join is also referred to as a *Cartesian join*.


    In general, a Cartesian join is of limited practical use in data processing. A
    Cartesian join that involves a table of cardinality one is reasonable and sometimes
    useful. Here is an example of such a Cartesian join:


    T7⊗{ { (maxbudget;75000) } }


    This expression joins every tuple of T7 with every tuple of the right-hand argument
    of the join operator, which is a table over {maxbudget}. It effectively *extends*
    every department tuple of T7 with a new attribute called maxbudget. This Cartesian
    join is in fact a special case of *table* *extension*, which will be treated shortly
    hereafter in the section “Extension.”


    Note also an opposite special case of a Cartesian join, in which you join two
    tables that share the same heading. That is, the set of join attributes equals
    this shared heading. In such a join you are in effect intersecting these two tables.
    This makes the intersection a special case of the join (and therefore a redundant
    operator).


