    **■Note** A DBMS could, by parsing the declared formal specification of a constraint,
    *compute* what the involved tables are. Also, the DBMS could *compute* the validation
    query that needs to be run to validate whether a constraint is still satisfied
    (all this requires is the application of rewrite rules to end up with a specification
    that can be translated into an SQL expression). Therefore, the DBMS could generate
    the preceding trigger. In other words, this execution model could be fully supported
    by a DBMS vendor *in a* *declarative way*!


    Listing 11-30 shows the three triggers representing the DI code for constraint
    DEPT_TAB01


    using this execution model.


