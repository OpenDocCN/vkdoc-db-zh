    **Figure 8-2.** *Intermediate tables and final table for expression prop2*


    **State Transition Predicates**


    Continuing from Chapter 6 where the concepts of a *tuple*, *table*, and *database
    predicate* were introduced, we now further increase the scope of data that a data
    integrity predicate can deal with by defining the notion of a *state transition
    predicate*.


    State transition predicates deal with *a pair of database states*. These predicates
    have two parameters, both of type database state; the first parameter is referred
    to as the begin state and the second parameter the end state. In the next section,
    we’ll use state transition predicates to define the admissible state transitions
    for a database design. Only those transactions, whose begin and end state transform
    all state transition predicates into true propositions, are considered valid (or
    admissible) transactions.


