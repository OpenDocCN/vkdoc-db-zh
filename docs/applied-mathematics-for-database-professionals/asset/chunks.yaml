  raw: 'Specification FEc is a variation of FEb; the “not exists” is now expressed
    as a “not an element of” some set. FEd might seem somewhat far-fetched; only those
    courses are included in the query result, for which the number of scheduled course
    offerings equals the number of scheduled course offerings that have a maximum
    capacity of fewer than ten students. By imposing this restriction, you end up
    precisely with those courses for which every scheduled offering has a maximum
    capacity of fewer than ten students.


    SQL lacks the possibility to express universal quantification directly.


    **■Note** Remember we are using *Oracle’s version of SQL* in this book. The SQL
    standard offers a language construct called <quantified comparison predicate>
    that can be used to specify universal quantification in SQL. However, Oracle’s
    SQL DBMS doesn’t support this language construct.


    For this reason, you cannot directly translate FEa into SQL; you must rewrite
    the universal quantification into an existential quantification (which SQL does
    support). Once you have done this (which is what alternative FEb is all about),
    you can straightforwardly compose the equivalent SQL expression for the query;
    see SEI. Alternative SEII closely follows FEb too, but instead of the “not exists,”
    it employs the “not in” operator available within SQL.


    Alternative SEIII is the SQL version of FEc; this way of query formulation can
    be considered a trick to mimic a universal quantification within SQL.


    What is your opinion on courses that currently do *not* have any scheduled offering
    at all?


    Should they appear in the result set of query EXQ6, or not?


    **■Note** Remember the truth value of a universal quantification over the empty
    set? Such a quantification is always true, regardless of the predicate that is
    being quantified.


    Courses with no scheduled offerings will appear in the result set of this query.
    Whenever you encounter a universal quantification—or a negated existential quantification—you
    should be aware of this consequence (warning bells should ring). Moreover, whenever
    the set that is quantified over can possibly be the empty set, you should double
    check with your customer (the end user) whether he or she is aware of this “side
    effect” and requires this behavior of the query.


    If courses with no scheduled offerings at all should not appear in the result
    set of this query, then here is how you could change FEa to reflect this:


