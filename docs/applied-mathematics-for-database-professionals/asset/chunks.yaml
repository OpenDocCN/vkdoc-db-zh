    Function composition is about applying two functions, serially, one after the
    other. Given some domain element, you first apply one function that results in
    a range element. You then apply the second function on this resulting range element.
    You can find a formal definition for function composition in Definition 4-8.


    **■Definition 4-8: Function Composition** Let A, B, and C be sets. Let f be a
    function over A into B.


    Let g be a function over rng(f) into C.


    The composition of functions f and g, notation g◊f (pronounced as “g of f” or
    “g after f”), is defined as follows: g◊f := { (a; g(f(a)) | a∈dom(f) ∧ f(a)∈dom(g)
    }


    As you can see from the definition, the composition of two functions results in
    another set of ordered pairs. In fact, it results in another function because
    the domain of g◊f is equal to dom(f), and only one pair per domain element of
    function f is introduced in the composition g after f.


