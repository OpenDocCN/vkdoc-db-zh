    # CHAPTER 7 SPECIFYING DATABASE DESIGNS


    ## Listing 7-26. *Table Universe `tab_EMP`*


    ```

    tab_EMP :=


    { E | E∈℘(tup_EMP) ∧


    /* EMPNO uniquely identifies an employee tuple */


    ( ∀e1,e2∈E: e1(EMPNO) = e2(EMPNO) ⇒ e1 = e2 )


    ∧


    /* USERNAME uniquely identifies an employee tuple */


    ( ∀e1,e2∈E: e1(USERNAME) = e2(USERNAME) ⇒ e1 = e2 )


    ∧


    /* At most one president allowed */


    #{ e | e∈E ∧ e(JOB) = ''PRESIDENT'' } ≤ 1


    ∧


    /* A department that employs the president or a manager */


    /* should also employ at least one administrator */


    ( ∀d∈E⇓{DEPTNO}:


    ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {''PRESIDENT'',''MANAGER''} )


    ⇒


    ( ∃e3∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = ''ADMIN'' )


    )

    }

    ```


    The first two constraints are unique identification predicates; the `EMPNO` attribute
    is uniquely identifying in an `EMP` table, as is the `USERNAME` attribute.


    The specification of the third constraint constructs the subset of tuples that
    have the value `PRESIDENT` for the `JOB` attribute and restricts the cardinality
    of this set to 1 at most. This reflects the real-world requirement that there
    cannot be more than one president.


    The last table constraint states that if there exists a `PRESIDENT` or a `MANAGER`
    in a *given* department, then there exists an `ADMIN` in the *same* department.
    The outer universal quantification supplies all departments for which to perform
    this check. Note that the informal embedded specification of this constraint might
    imply that this constraint is a multi-table constraint involving not just the
    `EMP` table structure but also the `DEPT` table structure. Take a look at the
    following database predicate named `P` that accepts two parameters: a department
    table (parameter `D`) and an employee table (parameter `E`).


    ```

    P(D,E) :=


    ( ∀d∈D:


    ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {''PRESIDENT'',''MANAGER''} )


    ⇒


    ( ∃e2∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = ''ADMIN'' )


    )

    ```


    This predicate closely follows the informal specification: it quantifies over
    all departments and states that if the department employs a `PRESIDENT` or a `MANAGER`,
    then the department should employ an `ADMIN`. Note that only the `DEPTNO` attribute
    of parameter `D` is used. The corresponding predicate inside the definition of
    `tab_EMP` quantifies over all available `DEPTNO` values inside the `EMP` table
    and then states the same. Because a `DEPTNO` attribute is available in the `EMP`
    table structure (and, as we shall see later, it always identifies a valid department),
    this constraint can be specified as a table constraint.


    7451CH07.qxd 5/15/07 9:43 AM Page 163


    # CHAPTER 7 SPECIFYING DATABASE DESIGNS


    **163**


    `Caution` It is not uncommon that constraints that are, in fact, table constraints
    are specified as database (multi-table) constraints. This can also happen one
    phase earlier: tuple constraints that are specified as table constraints. This
    refers back to the comments we made in Chapter 6 when we mentioned terms such
    as "tuple predicate in disguise." In the database design specification methodology
    introduced in this book, you should always try to specify constraints *at the
    earliest possible phase*: attribute value sets first, then tuple constraints,
    then table constraints, and finally database constraints. Not only will this result
    in a clear view of your database design, but also will it aid in your effort to
    implement it (covered in Chapter 11).


    Here is an alternative (equivalent) formal specification for the third table constraint
    of `EMP` that might be easier to understand, and clearly shows that there is no
    need to involve the `DEPT` table structure:


    ```

    ( ∀e2∈E: e2(JOB) ∈ {''PRESIDENT'',''MANAGER''}


    ⇒


    ( ∃e3∈E: e3(DEPTNO) = e2(DEPTNO) ∧ e3(JOB) = ''ADMIN'' )


    )

    ```


    This predicate states that for all employee tuples that represent a `PRESIDENT`
    or a `MANAGER`, there should exist an employee tuple that represents an `ADMIN`
    working in the same department. You probably intuitively feel that this formal
    specification is equivalent, and therefore represents the same constraint. In
    fact, it can formally be *proven* that it is equivalent to the formal specification
    of this constraint inside `tab_EMP`. However, this requires the development of
    more rewrite rules regarding quantifications, which is beyond the scope of this
    book.


    Listings 7-27, 7-28, and 7-29 define the table universes for the `SREP`, `MEMP`,
    and `TERM` table structures. As you can see, they all have a unique identification
    constraint and no other table constraints.


    ## Listing 7-27. *Table Universe `tab_SREP`*


    ```

    tab_SREP :=


    { S | S∈℘(tup_SREP) ∧


    /* EMPNO uniquely identifies a tuple */


    ( ∀s1,s2∈S: s1(EMPNO) = s2(EMPNO) ⇒ s1 = s2 )


    }

    ```


    ## Listing 7-28. *Table Universe `tab_MEMP`*


    ```

    tab_MEMP :=


    { M | M∈℘(tup_MEMP) ∧


    /* EMPNO uniquely identifies a tuple */


    ( ∀m1,m2∈M: m1(EMPNO) = m2(EMPNO) ⇒ m1 = m2 )


    }

    ```


