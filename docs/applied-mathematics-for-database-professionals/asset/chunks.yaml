    **Order of Preference**


    It should not be a surprise that the declarative strategy is highly preferable
    to the two procedural strategies. Not only will a declaratively stated constraint
    free you of the burden of developing DI code, it will likely outperform any self-developed
    procedural implementation.


    Don’t forget that it also frees you of the burden of maintaining this code during
    the WoD application’s life cycle!


    **■Note** This last remark assumes that the DBMS vendor has done its research
    with respect to designing and implementing an efficient *execution model* for
    DI code. In the section “Table Constraint Implementation Issues,” we’ll introduce
    you to various execution models, ranging from inefficient ones to more efficient
    ones.


    However, as you’re probably aware, you can state only a limited set of constraint
    types declaratively in Oracle’s SQL DBMS. Note that this is not due to an inherent
    deficiency in the SQL standard, but rather due to the poor implementation of this
    language in an SQL DBMS.


    For implementing constraints that cannot be declared to the DBMS, we prefer to
    follow the triggered procedural strategy. Following are the main two reasons why
    we prefer the triggered over the embedded procedural strategy:


    • Like declared constraints, the triggered procedural strategy cannot be subverted.


    • The triggered procedural strategy is likely to create a more manageable code
    architecture; DI code isn’t replicated in lots of BL code. DI code is fully detached
    from all BL


    code, and is therefore better manageable (the BL code itself, by the way, will
    be better manageable too).


    **■Note** The second reason assumes that triggers will only hold DI code. Embedding
    BL code in triggers is generally considered a bad practice.


    The embedded procedural strategy is the worst strategy of all; it can obviously
    be subverted, simply by using some other application (perhaps a general-purpose
    one supplied by the DBMS vendor) to update the database.


    As you’ll see starting from the section “Table Constraint Implementation Issues”
    and onwards, when we start dealing with table constraints and database constraints
    (that is, multi-tuple constraints), implementing efficient DI code for these constraints
    through triggers is far from being a trivial task.


    Obviously, the type of effort involved in implementing different constraints within
    one class (attribute, tuple, table, database, transition) is the same. Also, the
    complexity involved in implementing DI code for constraints probably increases
    as the scope of data increases. The remainder of this chapter will offer guidelines
    for implementing the table structures of a database design and, in increasing
    scope order, for implementing the DI code for the involved constraints. Here is
    an overview of the remaining sections of this chapter:


