  trans: "\n例如，元组 `{ (empno;100), (ename;'Smith'), (born;'14-feb-1965'), (job;'MANAGER'),\
    \ (salary;5000) }` 表示这样一个命题：“员工 Smith 被分配员工编号 100，出生于 1965 年 2 月 14 日，担任经理职位，月薪为\
    \ 5000 美元。”\n\n数据库管理关系模型的其中一条原则是：如果一个给定的元组出现在表设计中，那么我们假设该元组所表示的命题在现实世界中当前是一个真命题。反之，如果一个本可以出现在表设计中的给定元组当前并未出现，那么我们假设该元组所表示的命题在现实世界中是一个假命题。\n\
    \n这一原则被称为“**封闭世界假设**”；数据库设计中所持有的元组描述了现实世界中所有且仅有的当前为真的命题。\n\n## 约束规范预览\n\n回顾代码清单\
    \ 4-6 中定义的函数 `H4`：\n\n```\nH4 = { (empno;[1..99])\n      , (ename;varchar(10))\n\
    \      , (born;date)\n      , (job; {'CLERK','SALESMAN','TRAINER','MANAGER','PRESIDENT'})\n\
    \      , (salary;[1000..4999]) }\n```\n\n你可以将 `∏(H4)` 视为一个集合，它包含了基于特征描述 `H4` 所给出的属性及相应属性值集的所有*可能*的员工表示——或者，如果你愿意，也可以称之为外部谓词的实例化。这个集合包含大量的元组，但它仍然具有有限的基数，因为集合函数\
    \ `H4` 的每个值域元素都是一个有限集。\n\n> **注：** 为简化起见，我们假设 `varchar(n)` 集合简写仅使用字符 a 到 z（包括大小写），共计\
    \ 52 个字符。`date` 的基数源于其在表 2-3 中给出的定义。\n\n以下是这些值域元素的基数：\n- `#[1..99] = 99`\n- `#varchar(10)\
    \ = 52¹⁰ + 52⁹ + 52⁸ + ... + 52¹ = 7516865509350965246`\n- `#date = 3442447`\n\
    - `#{'CLERK','SALESMAN','TRAINER','MANAGER','PRESIDENT'} = 5`\n- `#[1000..4999]\
    \ = 4000`\n\n在本书第二部分，我们将开发各种可以被视为特定变量类型的值集。对于元组变量，我们关注的不是包含所有*可能*元组（基于 `H4`）的集合，而是包含所有*可接受*元组（根据现实世界中的某些规则可接受）的集合；这是\
    \ `∏(H4)` 的某个特定*子集*。例如，以下规则可能适用于员工：\n- `CLERK`（办事员）的薪资低于 2500。\n- `PRESIDENT`（总裁）的薪资高于\
    \ 4000。\n\n你可以通过首先创建所有可能元组的集合，然后通过指定每个元组都应遵循的规则（作为谓词）来缩小该集合的范围，从而定义可接受元组的集合。实现这一点所需的所有要素现已介绍完毕。看一下以下集合（命名为\
    \ `t-emp`）的规范：\n\n```\nt-emp := { t | t∈∏(H4) ∧ ( t(job)='CLERK' ⇒ t(salary)<2500\
    \ )\n                ∧ ( t(job)='PRESIDENT' ⇒ t(salary)>4000 ) }\n```\n\n在这个例子中，我们开始将第\
    \ 1 章和第 3 章介绍的逻辑与第 2 章及本章介绍的集合论结合起来。集合 `t-emp` 是 `∏(H4)` 的子集；只有那些满足集合规范内给出的两个附加谓词的（可能）元组才属于集合\
    \ `t-emp`。这两个谓词是对那两条非形式化描述规则的形式化表示。\n\n## 函数组合\n\n在你最终能够进入本书第二部分并看到前四章介绍的所有数学概念的完整应用之前，还需要介绍最后一个概念——*函数组合*。你可以使用函数组合来*重命名*元组的属性；在使用*连接*（将在第二部分介绍）、并、交或差运算符时，你偶尔需要应用此技术。\n\
    \n函数组合是关于连续、依次应用两个函数。给定某个定义域元素，你首先应用一个函数，得到一个值域元素。然后，你将第二个函数应用到这个结果值域元素上。你可以在定义\
    \ 4-8 中找到函数组合的形式化定义。\n\n> **定义 4-8：函数组合** 设 `A`、`B` 和 `C` 为集合。设 `f` 是从 `A` 到 `B`\
    \ 的函数。设 `g` 是从 `rng(f)` 到 `C` 的函数。\n> 函数 `f` 和 `g` 的组合，记作 `g◊f`（读作“g of f”或“g\
    \ after f”），定义如下：`g◊f := { (a; g(f(a)) | a∈dom(f) ∧ f(a)∈dom(g) }`\n\n从定义中可以看出，两个函数的组合结果是另一个有序对集合。实际上，它产生的是另一个函数，因为\
    \ `g◊f` 的定义域等于 `dom(f)`，并且在组合 `g` after `f` 中，函数 `f` 的每个定义域元素只引入一个有序对。\n\n让我们用一个例子来说明函数组合。代码清单\
    \ 4-8 介绍了两个函数 `f` 和 `g`，并展示了将 `g` 应用于 `f` 之后（分三步推导）的结果。\n\n**代码清单 4-8.** *示例函数\
    \ f 和 g，以及它们的函数组合 g after f*\n\n```\nf := { (num;empno), (name;ename), (occup;job)\
    \ }\ng := { (empno;999), (ename;'Smith'), (job;'Trainer') }\ng◊f = { (num;g(f(num))),\
    \ (name,g(f(name))), (occup;g(f(occup))) }\n     = { (num;g(empno)), (name;g(ename)),\
    \ (occup;g(job)) }\n     = { (num;999), (name;'Smith'), (occup;'Trainer') }\n\
    ```\n\n这个例子具体展示了如何利用函数组合来重命名给定元组的属性（本例中是函数 `g`）。在此例中，`f` 是重命名函数，`g` 是其属性根据 `f`\
    \ 进行重命名的元组。\n\n应用第一个函数 (`f`) 会对第一坐标进行重命名（属性 `empno` 重命名为 `num`，`ename` 重命名为 `name`，`job`\
    \ 重命名为 `occup`），而应用第二个函数 (`g`) 则会将第二坐标重新附加到重命名后的属性上。\n\n> **注：** 如果重命名函数所包含的属性少于被重命名属性的元组，那么实际上你同时也在进行函数限制。例如，如果\
    \ `f`（来自代码清单 4-8）等于 `{(num;empno)}`，那么 `g◊f` 的结果是 `{(num;999)}`。\n\n你也可以画图表示函数组合。图\
    \ 4-3 展示了代码清单 4-8 中介绍的函数 `f` 和 `g` 的函数组合示意图。\n\n**图 4-3.** *函数组合 g◊f*\n\n你可以从这个图中直接看出，坐标\
    \ `num` 映射到值域元素 `999`，坐标 `name` 映射到 `'Smith'`，坐标 `occup` 映射到 `'Trainer'`。\n"
- fmt: "## Chapter Summary\n\nThis section provides a summary of this chapter, formatted\
    \ as a bulleted list. You can use it to check your understanding of the various\
    \ concepts introduced in this chapter before continuing with the exercises in\
    \ the next section.\n\n- A `binary relation` from set `A` to set `B` is defined\
    \ as a subset of the Cartesian product `A×B`.\nFormally, “`R` is a binary relation\
    \ from set `A` to set `B`” ⇔ `R∈℘(A×B)`.\n- A `function` is a binary relation\
    \ where no first coordinate appears more than once.\nFormally, “`F` is a function\
    \ over `A` into `B`” ⇔ `F∈℘(A×B) ∧ ( ∀p1,p2∈F: p1≠p2 ⇒ π(p1)≠π(p2) ) ∧ { π(p)\
    \ | p∈F } = A`.\n- The set of all first coordinates of a function `F` is referred\
    \ to as the `domain` of function `F`.\nThe notation is `dom(F)`. Therefore, if\
    \ `F` is a function over `A` into `B`, then `dom(F) = A`.\n- The set of all second\
    \ coordinates of a function `F` is referred to as the `range` of function `F`.\n\
    The notation is `rng(F)`. Therefore, if `F` is a function over `A` into `B`, then\
    \ `rng(F) ⊆ B`.\n- If `F` is a function and `x` is an element of `dom(F)`, then\
    \ `F(x)` (the application of `F` to `x`) denotes the range element that is paired\
    \ to `x` in function `F`.\n- Every subset of a function is a function.\n- Two\
    \ functions are `compatible` (or `joinable`) if and only if for every first coordinate\
    \ that the two functions have in common, the corresponding second coordinates\
    \ match. Only if two functions are compatible will the union of those two functions\
    \ be a function.\n- The `limitation` of a function `F` to set `A` is the subset\
    \ of `F` that only holds those ordered pairs for which the first coordinate is\
    \ an element of set `A`. The notation is `F↓A`.\n- A `set function` is a function\
    \ in which every element (an ordered pair) holds a set as its second coordinate.\n\
    - If a set function is used to represent the aspects of something in the real\
    \ world that we want to capture, then we refer to such a set function as a `characterization`.\
    \ The domain elements of a characterization are called the `attributes` of the\
    \ characterization. The range elements are called the `attribute value sets` of\
    \ these attributes.\n- The `generalized product` of a set function `F`, with the\
    \ notation `∏(F)`, generates a set with all possible functions that have the same\
    \ domain as `F`, and for which the ordered pairs have a second coordinate that\
    \ is chosen from the corresponding set attached to the same first coordinate in\
    \ `F`.\n- The elements in a generalized product of a characterization can be considered\
    \ to represent propositions in the real world and are referred to as `tuples`.\n\
    - The first coordinates of the ordered pairs in a tuple are referred to as the\
    \ `attributes` of that tuple.\n- The `function composition` of two given functions\
    \ `f` and `g`, notation `g◊f` (g after f), can be used to rename the attributes\
    \ of a tuple. In this case, `f` is the renaming function and `g` is the tuple\
    \ for which the attributes get renamed according to `f`.\n\n## Exercises\n\n1.\
    \ How many distinct `binary relations` can be constructed from a given set `A`\
    \ with cardinality 3 to a given set `B` with cardinality 4?\n2. How many distinct\
    \ `functions` can be constructed from a given set `A` with cardinality 3 to a\
    \ given set `B` with cardinality 4?\n3. Suppose the following sets are given:\n\
    `A := {a, b, c}`\n`B := {c, d, e, f}`\nWhich of the following sets are functions\
    \ from `A` to `B`?\n   a. `{ (a;b), (b;d) }`\n   b. `{ (c;c), (b;f), (a;f) }`\n\
    \   c. `{ (a;c), (c;f), (a;c), (b;e) }`\n   d. `{ }`\n   e. `{ (x;y) | x∈{a,b}\
    \ ∧ y∈{e,f} ∧ (x=a ⇒ y=f) }`\n   f. `{ (c;b), (d;f) }`\n4. What is the domain\
    \ of the following functions?\n   a. `{ (X;1), (Y;1) }`\n   b. `{ (X;1), (Z;3),\
    \ (X;1) }`\n   c. `{ (empno;100), (ename;'Codd'), (occupation;'mathematician')\
    \ }`\n5. What is the range of the following functions?\n   a. `{ (X;1), (Y;3)\
    \ }`\n   b. `{ (X;1), (Y;{1}) }`\n   c. `{ (X;∅), (Z;3), (Y;(a;b)) }`"
  raw: '## Chapter Summary


    This section provides a summary of this chapter, formatted as a bulleted list.
    You can use it to check your understanding of the various concepts introduced
    in this chapter before continuing with the exercises in the next section.


    • A *binary relation* from set A to set B is defined as a subset of the Cartesian
    product A×B.


    Formally, “R is a binary relation from set A to set B” ⇔ R∈℘(A×B).


    • A *function* is a binary relation where no first coordinate appears more than
    once.


    Formally, “F is a function over A into B” ⇔ F∈℘(A×B) ∧ ( ∀p1,p2∈F: p1≠p2 ⇒ π (p1)≠


    π (p2) ) ∧ { π (p) | p∈F } = A.


    • The set of all first coordinates of a function F is referred to as the *domain*
    of function F.


    The notation is dom(F). Therefore, if F is a function over A into B, then dom(F)
    = A.


    • The set of all second coordinates of a function F is referred to as the *range*
    of function F.


    The notation is rng(F). Therefore, if F is a function over A into B, then rng(F)
    ⊆ B.


    • If F is a function and x is an element of dom(F), then F(x) (the application
    of F to x) denotes the range element that is paired to x in function F.


    • Every subset of a function is a function.


    • Two functions are *compatible* (or *joinable*) if and only if for every first
    coordinate that the two functions have in common, the corresponding second coordinates
    match. Only if two functions are compatible will the union of those two functions
    be a function.


    7451CH04.qxd 5/4/07 2:43 PM Page 85


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    **85**


    • The *limitation* of a function F to set A is the subset of F that only holds
    those ordered pairs for which the first coordinate is an element of set A. The
    notation is F↓A.


    • A *set function* is a function in which every element (an ordered pair) holds
    a set as its second coordinate.


    • If a set function is used to represent the aspects of something in the real
    world that we want to capture, then we refer to such a set function as a *characterization*.
    The domain elements of a characterization are called the *attributes* of the characterization.
    The range elements are called the *attribute value sets* of these attributes.


    • The *generalized product* of a set function F, with the notation ∏(F), generates
    a set with all possible functions that have the same domain as F, and for which
    the ordered pairs have a second coordinate that is chosen from the corresponding
    set attached to the same first coordinate in F.


    • The elements in a generalized product of a characterization can be considered
    to represent propositions in the real world and are referred to as *tuples*.


    • The first coordinates of the ordered pairs in a tuple are referred to as the
    *attributes* of that tuple.


    • The *function composition* of two given functions f and g, notation g◊f (g after
    f), can be used to rename the attributes of a tuple. In this case, f is the renaming
    function and g is the tuple for which the attributes get renamed according to
    f.


    **Exercises**


    **1.** How many distinct *binary relations* can be constructed from a given set
    A with cardinality 3 to a given set B with cardinality 4?


    **2.** How many distinct *functions* can be constructed from a given set A with
    cardinality 3 to a given set B with cardinality 4?


    **3.** Suppose the following sets are given:


    A := {a, b, c}


    B := {c, d, e, f}


    Which of the following sets are functions from A to B?


    **a.** { (a;b), (b;d) }


    **b.** { (c;c), (b;f), (a;f) }


    **c.** { (a;c), (c;f), (a;c), (b;e) }


    **d.** { }


    **e.** { (x;y) | x∈{a,b} ∧ y∈{e,f} ∧ (x=a ⇒ y=f) }


    **f.** { (c;b), (d;f) }


    7451CH04.qxd 5/4/07 2:43 PM Page 86


    **86**


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    **4.** What is the domain of the following functions?


    **a.** { (X;1), (Y;1) }


    **b.** { (X;1), (Z;3), (X;1) }


    **c.** { (empno;100), (ename;''Codd''), (occupation;''mathematician'') }


    **5.** What is the range of the following functions?


    **a.** { (X;1), (Y;3) }


    **b.** { (X;1), (Y;{1}) }


    **c.** { (X;∅), (Z;3), (Y;(a;b)) }'
  trans: "\n## 章节摘要\n\n本节以项目符号列表的形式提供了本章的摘要。你可以在继续下一节的练习之前，用它来检查自己对本章所介绍的各种概念的理解。\n\
    \n- 从集合`A`到集合`B`的`二元关系`被定义为笛卡尔积`A×B`的一个子集。\n形式化地，“`R`是从集合`A`到集合`B`的二元关系” ⇔ `R∈℘(A×B)`。\n\
    - `函数`是一种二元关系，其中没有第一个坐标出现超过一次。\n形式化地，“`F`是从`A`到`B`的函数” ⇔ `F∈℘(A×B) ∧ ( ∀p1,p2∈F:\
    \ p1≠p2 ⇒ π(p1)≠π(p2) ) ∧ { π(p) | p∈F } = A`。\n- 函数`F`的所有第一个坐标的集合被称为函数`F`的`定义域`。\n\
    记法为`dom(F)`。因此，如果`F`是从`A`到`B`的函数，那么`dom(F) = A`。\n- 函数`F`的所有第二个坐标的集合被称为函数`F`的`值域`。\n\
    记法为`rng(F)`。因此，如果`F`是从`A`到`B`的函数，那么`rng(F) ⊆ B`。\n- 如果`F`是一个函数，且`x`是`dom(F)`的一个元素，那么`F(x)`（`F`应用于`x`）表示在函数`F`中与`x`配对的值域元素。\n\
    - 函数的每一个子集都是一个函数。\n- 两个函数是`相容的`（或`可联合的`），当且仅当对于两个函数共有的每一个第一个坐标，相应的第二个坐标都匹配。只有当两个函数相容时，这两个函数的并集才会是一个函数。\n\
    - 函数`F`对集合`A`的`限制`是`F`的一个子集，该子集只包含那些第一个坐标是集合`A`元素的序对。记法为`F↓A`。\n- `集合函数`是一种函数，其中每个元素（一个序对）的第二个坐标是一个集合。\n\
    - 如果一个集合函数被用来表示现实世界中我们想要捕捉的某事物的各个方面，那么我们将这样的集合函数称为`特征化描述`。特征化描述的定义域元素被称为其`属性`。值域元素被称为这些属性的`属性值集`。\n\
    - 集合函数`F`的`广义积`，记法为`∏(F)`，生成一个集合，该集合包含所有与`F`定义域相同，并且其序对的第二个坐标是从`F`中相同第一个坐标所关联的相应集合中选出的函数。\n\
    - 特征化描述的广义积中的元素可以被认为代表了现实世界中的命题，并被称为`元组`。\n- 元组中序对的第一个坐标被称为该元组的`属性`。\n- 两个给定函数`f`和`g`的`函数复合`，记法为`g◊f`（`g`在`f`之后），可用于重命名元组的属性。这里，`f`是重命名函数，`g`是其属性根据`f`进行重命名的元组。\n\
    \n## 练习题\n\n1. 从一个给定的基数（元素个数）为 3 的集合`A`到一个给定的基数为 4 的集合`B`，可以构造出多少个不同的`二元关系`？\n\
    2. 从一个给定的基数（元素个数）为 3 的集合`A`到一个给定的基数为 4 的集合`B`，可以构造出多少个不同的`函数`？\n3. 假设给定以下集合：\n\
    \    `A := {a, b, c}`\n    `B := {c, d, e, f}`\n    以下哪些集合是从`A`到`B`的函数？\n    a.\
    \ `{ (a;b), (b;d) }`\n    b. `{ (c;c), (b;f), (a;f) }`\n    c. `{ (a;c), (c;f),\
    \ (a;c), (b;e) }`\n    d. `{ }`\n    e. `{ (x;y) | x∈{a,b} ∧ y∈{e,f} ∧ (x=a ⇒\
    \ y=f) }`\n    f. `{ (c;b), (d;f) }`\n4. 以下函数的定义域是什么？\n    a. `{ (X;1), (Y;1)\
    \ }`\n    b. `{ (X;1), (Z;3), (X;1) }`\n    c. `{ (empno;100), (ename;'Codd'),\
    \ (occupation;'mathematician') }`\n5. 以下函数的值域是什么？\n    a. `{ (X;1), (Y;3) }`\n\
    \    b. `{ (X;1), (Y;{1}) }`\n    c. `{ (X;∅), (Z;3), (Y;(a;b)) }`\n"
- fmt: "# 第四章 关系与函数\n\n## 6. 以下哪些表达式表示函数？\n\n**a.** `{ (X;1), (Y;3) } ∪ { (X;1), (Z;2),\
    \ (R;1) }`\n\n**b.** `{ (X;1), (Y;3) } ∩ { (X;1), (Y;2), (X;2) }`\n\n**c.** `{\
    \ (X;1), (Y;3) } ∪ { (X;1), (X;2) }`\n\n**d.** `{ (X;1), (Y;2) } ∩ { (X;1), (Y;2),\
    \ (X;2) }↓{Y}`\n\n**e.** `{ p | p∈{X,Y}×{1,2} ∧ (π₁(p)=Y ⇒ π₂(p)=2) }↓{Y}`\n\n\
    ## 7. 使用枚举法给出以下表达式的结果集合：\n\n**a.** `∏{ (a;{1}), (b;{1,2}) }`\n\n**b.** `∏{ (a;{1,2,3,4}),\
    \ (b;{5,6,7,8}), (d;∅), (e;{9,10}) }`\n\n**c.** `{ t | t∈∏{(a;{1,2,3,4}), (b;{5,6,7,8})}\
    \ ∧ t(a)+t(b)<8 }`\n\n**d.** `{ f | f∈∏{(X;{1,2}), (Y;{1,2,3})} ∧ #rng(f)=1 }`\n\
    \n## 8. 给定函数\n\n```\nf := { (ean;9786012), (descr;'A very nice book'), (price;24.99),\
