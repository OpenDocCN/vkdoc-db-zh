- fmt: "As you can see, the result is a table over `{EMPNO,ENAME,JOB}`. The difference\
    \ of two tables with the same heading always produces another table. Like the\
    \ intersection, the difference operator is also closed over tables when the operands\
    \ are tables over `different` sets.\n\nHowever, here too, in these cases the difference\
    \ is useless because it always results in the first table; the second table cannot\
    \ have tuples that are in the first table (due to the different headings). Hence,\
    \ tuples will never be “removed” from the first set.\n\nBecause the difference\
    \ operator is not commutative, we note the two special cases when the empty set\
    \ is involved as an operand (in contrast with the preceding intersection and union).\
    \ Let `T` be a given table; then `T–∅` always results in `T`, and `∅–T` always\
    \ results in the empty table.\n\n## Projection\n\nAnother important table operator\
    \ that needs to be introduced is the `projection` of a table on a given set. The\
    \ `projection` of a given table—say `T`—on a given set—say `B`—performs the `limitation`\
    \ of every tuple in `T` on set `B`. We use symbol `⇓` to denote `projection`.\
    \ The `projection` operator can be viewed as a version of the `limitation` operator\
    \ that has been lifted to the table level.\n\n### Definition 5-3: Projection of\
    \ a Table\nLet `T` be a set of functions and `B` a set. The `projection` of `T`\
    \ on `B`, notation `T⇓B`, is defined as follows:\n\n```\nT⇓B := { t↓B | t∈T }\n\
    ```\n\nThe `projection` of `T` on `B` holds every function in `T` limited to `B`.\
    \ Although the preceding definition describes the `projection` for each set of\
    \ functions `T` and each set `B`, we are mainly (but not exclusively) interested\
    \ in those cases in which `T` is a table, and moreover in which `B` is a (non-empty)\
    \ proper `subset` of the heading of such a table.\n\n### Listing 5-7. Table T3\n\
    Let’s take a look at an example to illustrate the concept of `projection`. Listing\
    \ 5-7 introduces table `T3`. It holds five tuples with domain `{empno,ename,salary,sex,dno}`.\n\
