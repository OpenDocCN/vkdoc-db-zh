    C H A P T E R 6


    Tuple, Table, and Database


    Predicates


    **T**his chapter introduces the concepts of a *tuple*,a *table*,and a *databasepredicate*(using
    the meaning of *predicate* that was established in Chapter 1). You can use tuple,
    table, and database predicates to describe the data integrity constraints of a
    database design. The goal of this chapter is to establish these three different
    classes of predicates—which jointly we’ll refer to as *data integrity predicates*—and
    to give ample examples of predicates within each class.


    **■Note** We introduce data integrity predicates in this chapter and show that
    they hold for a certain argument (value). Of course, we aren’t interested in this
    incidental property (whether a predicate is TRUE for one given value); they should
    hold for value *spaces* (that is, they should constitute a structural property).
    This will be further developed in Chapter 7.


    A data integrity predicate deals with data. We classify data integrity predicates
    into three classes by looking at the scope of data that they deal with. In increasing
    scope, a predicate can deal with a *tuple*, a *table*, or a *database state*.


    The section “Tuple Predicates” establishes the concept of a *tuple predicate*.
    This type of data integrity predicate has a single parameter of type tuple. You
    can use it to accept or reject a tuple (loosely speaking, a set of attribute values).


    The next section, “Table Predicates,” will introduce you to *table predicates*.
    A table predicate deals with a table, and consequently has a single parameter
    of type table. We’ll use them to accept or reject a table (a set of tuples).


    We familiarize you with the concept of *database predicates* in the section “Database
    Predicates.” Database predicates deal with database states. We’ll use them to
    accept or reject a database state (loosely speaking, a set of tables).


