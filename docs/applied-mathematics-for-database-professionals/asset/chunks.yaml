    **110**


    C H A P T E R 5 **■** TA B L E S A N D D ATA B A S E S TAT E S


    **Figure 5-8.** *Example of extending a table with a new attribute* Given table
    T9, you can formally specify table T10 as follows: T10 := { e ∪ { (initial;substr(e(ename),1,1))
    } | e∈T9 }


    For every tuple, say e, in T9, table T10 holds a tuple that is represented by
