    \ 章介绍过；它是一个函数，其中每个对的第一个元素是表结构名称，每个对的第二个元素是表。正如你将看到的，这种表示数据库状态的方式很方便；我们可以使用已定义的表宇宙轻松构建这样的函数。\n\
    \n让我们用前面各节中使用的 `RESULT` 表结构来说明这一点。\n\n因为本节是关于数据库约束的，所以我们首先引入第二个表结构与 `RESULT` 表结构一起使用。假设存在一个\
    \ `LIMIT` 表结构。以下是 `LIMIT` 的外部谓词：“平均分数 `SCORE` 不允许用于总体 `POPULATION`。”其思想是 `LIMIT`\
    \ 中的元组限制了 `RESULT` 的可接受表。我们将通过数据库约束来精确指定它们是如何限制的。\n\n清单 7-36 指定了特征 `chr_LIMIT`、元组宇宙\
    \ `tup_LIMIT` 和表宇宙 `tab_LIMIT`。\n\n**清单 7-36.** `chr_LIMIT`、`tup_LIMIT` 和 `tab_LIMIT`\
    \ 的规范\n\n```\nchr_LIMIT :=\n{ ( POPULATION; {'DP','NON-DP'} )\n, ( SCORE; {'A','F'}\
    \ )\n}\n\ntup_LIMIT :=\n{ l | l∈Π(chr_LIMIT) ∧\n  l(POPULATION) = 'DP' ⇒ l(SCORE)\
    \ = 'A' ∧\n  l(POPULATION) = 'NON-DP' ⇒ l(SCORE) = 'F'\n}\n\ntab_LIMIT :=\n{ L\
    \ | L∈℘(tup_LIMIT) ∧\n  ( ∀l1,l2∈L: l1(POPULATION) = l2(POPULATION) ⇒ l1 = l2\
    \ )\n}\n```\n\n`LIMIT` 的元组宇宙和表宇宙都是相当小的集合。以下是它们两者的枚举式规范：\n\n```\ntup_LIMIT = {\
    \ { (POPULATION;'DP') , (SCORE;'A') }\n            , { (POPULATION;'NON-DP'),\
    \ (SCORE;'F') } }\n\ntab_LIMIT = { ∅\n            , { { (POPULATION;'DP') , (SCORE;'A')\
    \ } }\n            , { { (POPULATION;'NON-DP'), (SCORE;'F') } }\n            ,\
    \ { { (POPULATION;'DP') , (SCORE;'A') }\n              , { (POPULATION;'NON-DP'),\
    \ (SCORE;'F') } }\n            }\n```\n\n如你所见，只有四个可接受的 `LIMIT` 表：空表、两个包含一个元组的表和一个包含两个元组的表。\n\
    \n**注意：** `tab_LIMIT` 规范中的唯一标识表约束实际上是冗余的。它是由元组约束和特征隐含的。\n\n图 7-4 使用表的简写符号显示了 `tab_LIMIT`。\n\
    \n**图 7-4.** 使用表简写符号对 `tab_LIMIT` 的枚举式规范\n\n给定这两个表结构，我们现在可以看一下一个数据库状态。图 7-5 显示了一个名为\
    \ `DBS1` 的数据库状态，它涉及 `RESULT` 和 `LIMIT` 表结构。\n\n**图 7-5.** 数据库状态 `DBS1`\n\n如你所见，它是一个包含两个对的函数。第一个有序对的第二个坐标是一个可接受的\
    \ `RESULT` 表（即 `tab_RESULT` 的一个元素）。同样，第二个有序对的第二个坐标是一个可接受的 `LIMIT` 表（即 `tab_LIMIT`\
    \ 的一个元素）。\n\n这些表可以通过它们的表结构名称访问：作为第一个坐标出现的值 `RESULT` 和 `LIMIT`。使用 `DBS1` 的定义，你可以编写诸如\
    \ `DBS1(RESULT)` 和 `DBS1(LIMIT)` 的表达式，它们分别产生显示的 `RESULT` 和 `LIMIT` 表。\n\n现在看一下以下名为\
    \ `DBCHR` 的*集合*函数：\n`DBCHR := { (RESULT; tab_RESULT), (LIMIT; tab_LIMIT) }`\n\n\
    集合函数 `DBCHR` 被称为*数据库特征*。它通过引入数据库设计中涉及的表结构的名称，并将相关的表宇宙（为每个表结构保存可接受表的集合）附加到它们上面，从而对数据库进行特征描述。\n"
- fmt: '**■Note** 数据库状态 `DBS1` 是 `∏(DBCHR)` 的一个元素。`DBS1` 与函数 `DBCHR` 具有相同的定义域，并且 `DBS1`
    的每个第二坐标都是从 `DBCHR` 中相应第二坐标出现的集合（`tab_RESULT` 和 `tab_LIMIT`）中选出的一个元素。


    你可以通过取集合函数 `DBCHR` 的广义乘积，来构造一个包含结果/限制数据库设计所有可能数据库状态的集合：

    `DB_U1 := { dbs | dbs∈∏(DBCHR) }`


    在集合 `DB_U1` 中，每个元素 `dbs` 都是在表全集 `tab_RESULT` 和 `tab_LIMIT` 下的一个可能的数据库状态。广义乘积算子生成了一个
    RESULT 表和一个 LIMIT 表的所有可能组合；总共有 52 种组合（`#tab_RESULT` 乘以 `#tab_LIMIT`）。


    现在，数据库约束终于登场了。你可以通过在规范中添加*数据库谓词*来限制集合 `DB_U1`。看一下列表 7-37，它引入了集合 `DB_U2`。


    **列表 7-37.** *数据库全集 DB_U2*


    ```

    DB_U2 :=

    { dbs | dbs∈∏(DBCHR) ∧

    ( ∀r∈db(RESULT),l∈db(LIMIT):

    r(POPULATION) = l(POPULATION) ⇒ r(AVG_SCORE) ≠ l(SCORE) ) }

    ```


    `DB_U2` 的规范包含一个数据库谓词。它表明，如果存在针对数据库专业人员的限制，则不能存在针对数据库专业人员的平均成绩为 A 的结果；并且如果存在针对非数据库专业人员的限制，则不能存在针对非数据库专业人员的平均成绩为
    F 的结果。


    这个数据库谓词丢弃了由广义乘积算子生成、但不符合我们现实世界可接受表示的可能数据库状态。


    约束数据库全集中元素的数据库谓词被称为*数据库约束*。


    **■Note** 给定数据库全集 `DB_U2` 的约束，图 7-5 所示的状态 `DBS1` 是一个不可接受的状态（即 `DB_U2∉DBS1`）；`RESULT`
    表包含一个针对数据库专业人员的平均成绩为 A 的元组。根据数据库状态 `DBS1` 中 `LIMIT` 表的内容，这是不允许的。在全集 `DB_U2` 中，数据库约束将总共丢弃
    26 个（可能的）数据库状态。你可能想自己验证一下。


    ```

    7451CH07.qxd 5/15/07 9:43 AM Page 171


    C H A P T E R 7 ■ S P E C I F Y I N G D A T A B A S E D E S I G N S


    171

    ```


    我们经常会以稍有不同的方式指定数据库约束。我们不会指定一个以数据库状态类型为单参数的数据库谓词，而是会指定一个以两个或多个表类型为参数的谓词。为了说明这一点，这里是定义数据库全集
    `DB_U2` 的另一种方式：


    `DB_U2 := { dbs | dbs∈∏(DBCHR) ∧ PDC1(dbs(RESULT),dbs(LIMIT)) }`


    在这个定义中，我们实例化了一个名为 `PDC1` 的谓词，它接受两个表作为其参数。其定义如下（`R` 和 `L` 代表表类型的参数）：

    ```

    PDC1(R,L) := ( ∀r∈R,l∈L:

    r(POPULATION) = l(POPULATION) ⇒ r(AVG_SCORE) ≠ l(SCORE)

    )

    ```


    这两个定义共同构成了与列表 7-37 中给出的规范等价的规范。这种指定方式立即显示了每个数据库约束中涉及多少张表，并且在数据库谓词内部，你可以直接使用表参数，而不必调用具有特定表结构名称的数据库状态。


    现在让我们继续示例数据库设计，定义它的数据库全集，从而正式指定所有的数据库约束。我们从定义数据库特征化开始。看一下列表 7-38，它包含了 `DB_CHREX`
    的定义。


    **列表 7-38.** *数据库特征化 DB_CHREX*


    ```

    DB_CHREX :=

    { ( EMP; tab_EMP )

    , ( SREP; tab_SREP )

    , ( MEMP; tab_MEMP )

    , ( TERM; tab_TERM )

    , ( DEPT; tab_DEPT )

    , ( GRD; tab_GRD )

    , ( CRS; tab_CRS )

    , ( OFFR; tab_OFFR )

    , ( REG; tab_REG )

    , ( HIST; tab_HIST )

    }

    ```'
  raw: '**■Note** Database state DBS1 is an element of ∏(DBCHR). DBS1 has the same
    domain as function DBCHR, and every second coordinate of DBS1 is an element chosen
    from the respective set (tab_RESULT and tab_LIMIT) that appears as the second
    coordinate in DBCHR.


    You can construct a set that holds all possible database states for the result/limit
    database design, by taking the generalized product of set function DBCHR: DB_U1
    := { dbs | dbs∈∏(DBCHR) }


    In set DB_U1, every element dbs is a possible database state given the table universes
    tab_RESULT and tab_LIMIT. The generalized product operator generates every possible
    combination of a RESULT table and a LIMIT table; there are 52 combinations in
    total (#tab_RESULT


    times #tab_LIMIT).


    Now, finally database constraints enter the picture. You can restrict set DB_U1
    by adding *database predicates* inside the specification. Take a look at Listing
    7-37, which introduces set DB_U2.


    **Listing 7-37.** *Database Universe DB_U2*


    DB_U2 :=


    { dbs | dbs∈∏(DBCHR) ∧


    ( ∀r∈db(RESULT),l∈db(LIMIT):


    r(POPULATION) = l(POPULATION) ⇒ r(AVG_SCORE) ≠ l(SCORE) ) }


    The specification of DB_U2 contains one database predicate. It states that if
    there is a limit regarding database professionals, then there cannot be a result
    with an average score of A for database professionals (regardless of the course),
    and if there is a limit regarding non-database professionals, then there cannot
    be a result with an average score of F for non-database professionals.


    This database predicate discards possible database states that were generated
    by the generalized product operator, but that do not reflect admissible representations
    of our real world.


    Database predicates that constrain the elements in a database universe are called
    *database* *constraints*.


    **■Note** Given the database constraint of universe DB_U2, state DBS1 shown in
    Figure 7-5 is not an admissible state (that is, DB_U2∉DBS1); the RESULT table
    holds a tuple that has an average score of A for database professionals. This
    is not allowed given the contents of the LIMIT table in database state DBS1\.
    In universe DB_U2, the database constraint will discard a total of 26 (possible)
    database states. You might want to verify this for yourself.


    7451CH07.qxd 5/15/07 9:43 AM Page 171


    C H A P T E R 7 **■** S P E C I F Y I N G D ATA B A S E D E S I G N S


    **171**


    We’ll often specify the database constraints in a slightly different manner. Instead
    of specifying a database predicate with one parameter of type database state,
    we’ll specify them with two or more parameters of type table. To illustrate this,
    here is an alternative manner of defining database universe DB_U2:


    DB_U2 := { dbs | dbs∈∏(DBCHR) ∧ PDC1(dbs(RESULT),dbs(LIMIT)) }


    Inside this definition, we instantiate a predicate named PDC1 that accepts two
    tables as its arguments. It is defined as follows (R and L represent parameters
    of type table): PDC1(R,L) := ( ∀r∈R,l∈L:


    r(POPULATION) = l(POPULATION) ⇒ r(AVG_SCORE) ≠ l(SCORE)


    )


    These two definitions together form an equivalent specification to the one given
    in Listing 7-37\. This way of specifying shows immediately how many tables are
    involved in each database constraint, and inside the database predicate you can
    use the table parameters directly instead of having to invoke the database state
    with a certain table structure name.


    Let’s now continue with the example database design and define its database universe,
    thereby formally specifying all database constraints. We start by defining the
    database characterization. Take a look at Listing 7-38, which holds the definition
    for DB_CHREX.


    **Listing 7-38.** *Database Characterization DB_CHREX*


    DB_CHREX :=


    { ( EMP; tab_EMP )


    , ( SREP; tab_SREP )


    , ( MEMP; tab_MEMP )


    , ( TERM; tab_TERM )


    , ( DEPT; tab_DEPT )


    , ( GRD; tab_GRD )


    , ( CRS; tab_CRS )


    , ( OFFR; tab_OFFR )


    , ( REG; tab_REG )


    , ( HIST; tab_HIST )


    }'
