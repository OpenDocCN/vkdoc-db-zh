    As you can see, E1 and E2 are both tables over {EMPNO,ENAME,JOB}, and E3 is a
    table over


    {E#,NAME,JOB,SAL}. All three tables represent information about employees. For
    E3, some of the names of the attributes were chosen differently, and E3 holds
    additional information (the salary). Employee 102 occurs in both table E1 and
    table E2 (with the same attribute values).


    Employee 101 occurs in both table E1 and table E3.


    Union


    As you probably know, the union of two sets holds all objects that are either
    an element of the first set, or an element of the second set, or an element of
    both. Here is the union of tables E1


    and E2, denoted by E1∪E2:


    E1∪E2 =


    { {(EMPNO;101), (ENAME;''Anne''), (JOB;''TRAINER'') }'
