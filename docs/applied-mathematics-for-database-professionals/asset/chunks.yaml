    \ president.');\n    end if;\n  end;\nend if;\n```\n\n`INSERT`语句之后嵌入的 DI 代码与清单\
    \ 11-2 中列出的触发器主体内的代码非常相似。它比`INSERT`语句触发器更高效；DI 代码仅在插入总裁时才会执行。\n\n还要注意，在这种过程式策略中——与触发式过程式策略相反——需要由开发人员显式地强制执行语句回滚。在前面的代码中，这是通过在执行`INSERT`语句之前设置一个事务保存点，并在发现违反约束时回滚到该保存点来实现的。\n\
    \n嵌入式过程式策略还有另一个更严重的缺点。现在，对于一个给定的约束，你必须将 DI 代码复制到每个可能包含可能违反该约束的 DML 语句的 wBL 代码模块中。在这种策略中，一个给定约束的所有必要\
    \ DI 代码通常分散在各个 wBL 代码模块中。通常，当需要更改 WoD 应用程序的 wBL 代码时，你可能会忘记更改（添加或移除）必要的 DI 代码。更有甚者，当数据库设计的实际约束需要更改时，通常很难定位所有包含该约束的嵌入式\
    \ DI 代码的 wBL 代码模块。\n\n`■注意` 这个缺点在某种程度上也适用于触发式过程式策略。清单 11-2 中给出的示例触发器实际上是两个触发器的简写：一个更新触发器和一个插入触发器。该约束的\
    \ DI 代码可以视为分散在两个触发器中。在更复杂的约束情况下，你将需要更多的触发器来实现 DI 代码；你可能需要多达三倍于约束中涉及的表结构数量的触发器（每个涉及的表结构一个插入、一个更新和一个删除触发器）。然而，使用触发式过程式策略，这个缺点不像在使用嵌入式过程式策略构建的\
    \ WoD 应用程序中可能出现的那么严重。\n\n嵌入式过程式策略在并发执行事务方面存在相同的问题（我们将在“表约束实现问题”一节中解释这些问题）。\n\n\
    ## 优选顺序\n\n声明式策略比两个过程式策略更受青睐，这应该不足为奇。不仅声明式表述的约束免除了你开发 DI 代码的负担，它还可能优于任何自行开发的过程式实现。\n\
    \n别忘了，它也使你免于在 WoD 应用程序生命周期内维护此代码的负担！\n\n`■注意` 最后一点假设 DBMS 供应商在设计和实现 DI 代码的高效*执行模型*方面已做好了研究。在“表约束实现问题”一节中，我们将向你介绍各种执行模型，从低效的到更高效的。\n\
    \n然而，正如你可能意识到的，在 Oracle 的 SQL DBMS 中，你只能声明性地表述有限的约束类型。请注意，这并非由于 SQL 标准固有的缺陷，而是由于该语言在\
    \ SQL DBMS 中的实现不佳所致。\n\n对于无法声明给 DBMS 的约束，我们更倾向于遵循触发式过程式策略。以下是我们更喜欢触发式而非嵌入式过程式策略的两个主要原因：\n\
    \n-   与声明的约束一样，触发式过程式策略无法被规避。\n-   触发式过程式策略可能创建更易管理的代码架构；DI 代码不会在大量 BL 代码中复制。DI\
    \ 代码与所有 BL 代码完全分离，因此更易于管理（顺便说一下，BL 代码本身也会更易于管理）。\n\n`■注意` 第二个原因假设触发器只包含 DI 代码。在触发器中嵌入\
    \ BL 代码通常被认为是不好的做法。\n\n嵌入式过程式策略是所有策略中最差的；它显然可以被规避，只需使用其他应用程序（可能是 DBMS 供应商提供的一些通用应用程序）来更新数据库即可。\n\
    \n正如你将从“表约束实现问题”一节开始看到的，当我们开始处理表约束和数据库约束（即多元组约束）时，通过触发器为这些约束实现高效的 DI 代码远非一项简单的任务。\n\
    \n显然，在一个类别（属性、元组、表、数据库、转换）内实现不同约束所涉及的工作量是相同的。此外，为约束实现 DI 代码的复杂性可能随着数据范围的增加而增加。本章剩余部分将提供实现数据库设计的表结构的指南，并按范围递增的顺序，为所涉及的约束实现\
    \ DI 代码提供指南。以下是本章剩余部分的概述：\n\n-   “实现表结构”一节涉及在 Oracle 的 SQL DBMS 中实现表结构。\n-   “实现属性约束”一节讨论如何实现属性约束。\n\
    -   “实现元组约束”一节讨论如何实现元组约束。\n-   “表约束实现问题”一节作为后续章节的序言。在本节中，我们将介绍在开发触发器以实现多元组约束的\
    \ DI 代码时涉及的各种问题。本节还将详细阐述不同的执行模型。\n-   “实现表约束”一节讨论如何声明性地表述某些表约束，以及如何设计触发器来检查所有其他表约束。\n\
    -   “实现数据库约束”一节讨论如何声明性地表述某些数据库约束，以及如何设计触发器来检查所有其他数据库约束。\n-   “实现转换约束”一节讨论一种为转换约束实现\
    \ DI 代码的方法。\n-   “引入延迟检查”一节解释了对某些类型的约束延迟执行 DI 代码的必要性。\n-   “RuleGen 框架”一节向你介绍\
    \ RuleGen，这是一个支持使用触发式过程式策略实现 DI 代码的框架，它处理了本章讨论的许多问题。\n\n## 实现表结构\n"
- fmt: '# 在 Oracle 中实现数据库设计


    当你在 SQL DBMS 中实施数据库设计时，通常从创建表结构开始。通过 `create table` 命令，你可以在 SQL DBMS 中实现数据库设计的表结构。在本章中，我们将逐一实现
    UEX 数据库设计。具体来说，我们将为每个表创建一个对应的 SQL 表结构。


    **注意**：本书的目标并非探讨*反规范化*（以提升性能）或其他可能导致偏离正式数据库设计的理由。此外，根据我们的个人经验，鉴于 Oracle 当前 SQL
    DBMS 中优化器技术的水平，这种一对一的实现通常能提供出色的性能。


    # 在 Oracle 中实现数据库设计


    在 SQL DBMS 中创建表涉及以下步骤：


    *   为表结构选择一个名称（我们已经在*数据库特征描述*中正式完成）

    *   声明各列的名称（我们已经在*特征描述*中正式完成）

    *   声明各列的数据类型（同样在*特征描述*中完成）


    关于最后一点，遗憾的是，目前对创建可在 `create table` 语句中使用的用户定义类型（用于表示属性值集）的支持尚不成熟。例如，我们无法执行以下操作：


    ```sql

    -- 创建一个类型来表示 EMPNO 属性的值集。

    -- 注意：这不是有效的 Oracle 语法。

    create type empno_type under number(4,0) check(member > 999);

    /


    -- 创建一个类型来表示 JOB 属性的枚举值集。

    -- 无效语法。

    create type job_type under varchar(9)

    check(member in (''ADMIN'',''TRAINER'',''SALESREP'',''MANAGER'',''PRESIDENT));

    /


    -- 现在在 create table 语句中使用 empno_type 和 job_type 类型。

    create table EMP

    (empno empno_type not null

    ,job job_type not null

    ,...);

    ```


    在实际操作中，我们被迫使用 SQL DBMS 提供的内置数据类型。对于 Oracle 而言，最常用的内置数据类型是 `varchar`、`number` 和
    `date`。这些对于我们的示例数据库设计来说已经足够。


    在下一节（“实现属性约束”）中，你将看到，通过使用 `SQL alter table add constraint` 语况，我们仍然可以有效地实现属性值集。在
    `create table` 语句中声明的列数据类型充当了属性值集的超集，而通过添加约束，我们可以将这些超集精确地缩小到表结构特征描述中指定的属性值集。


    清单 11-4 至 11-13 展示了 UEX 示例数据库设计的 `create table` 语句。


    **清单 11-4.** *为 GRD 表结构创建表*


    ```sql

    create table grd

    ( grade number(2,0) not null

    , llimit number(7,2) not null

    , ulimit number(7,2) not null

    , bonus number(7,2) not null);

    ```


    **注意**：每个列旁的 `not null` 表示该列不允许出现 `NULL`。在这种情况下，我们说该列是*必填*的。


    **清单 11-5.** *为 EMP 表结构创建表*


    ```sql

    create table emp

    ( empno number(4,0) not null

    , ename varchar(8) not null

    , job varchar(9) not null

    , born date not null

    , hired date not null

    , sgrade number(2,0) not null

    , msal number(7,2) not null

    , username varchar(15) not null

    , deptno number(2,0) not null);

    ```


    **清单 11-6.** *为 SREP 表结构创建表*


    ```sql

    create table srep

    ( empno number(4,0) not null

    , target number(6,0) not null

    , comm number(7,2) not null);

    ```


    **清单 11-7.** *为 MEMP 表结构创建表*


    ```sql

    create table memp

    ( empno number(4,0) not null

    , mgr number(4,0) not null);

    ```


    **清单 11-8.** *为 TERM 表结构创建表*


    ```sql

    create table term

    ( empno number(4,0) not null

    , left date not null

    , comments varchar(60));

    ```'
  raw: 'Whenever you implement a database design in an SQL DBMS, you usually start
    with creating the table structures. Through the create table command, you implement
    the table structures of your database design within the SQL DBMS. In this chapter,
    we’ll implement the UEX database design one on one. Specifically, we’ll create
    an SQL table-per-table structure.


    **■Note** It is not the goal of this book to investigate *denormalization* (for
    improving performance) or other reasons that could give rise to deviation from
    the formally specified database design. Moreover, it’s generally our personal
    experience that such one-on-one implementation usually provides excellent performance
    given the optimizer technology available in Oracle’s current SQL DBMS.


    7451CH11.qxd 5/15/07 2:26 PM Page 256


    **256**


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    Creating a table in an SQL DBMS involves the following:


    • Choosing a name for the table structure (we’ve done this formally in the *database*
    *characterization*)


    • Declaring names for the columns (we’ve done this formally in the *characterizations*)


    • Declaring data types for the columns (also done in the *characterizations*)
    As for the last bullet, unfortunately the support is rather immature for creating
    user-defined types—representing the attribute-value sets—that can be used in a
    create table statement. For instance, we cannot do the following:


    -- Create a type to represent the value set for the EMPNO attribute.


    -- Note this is not valid Oracle syntax.


    create type empno_type under number(4,0) check(member > 999);


    /


    -- Create a type to represent the enumeration value set for the JOB attribute.


    -- Invalid syntax.


    create type job_type under varchar(9)


    check(member in (''ADMIN'',''TRAINER'',''SALESREP'',''MANAGER'',''PRESIDENT));


    /


    -- Now use the empno_type and job_type types in the create table statement.


    create table EMP


    (empno empno_type not null


    ,job job_type not null


    ,...);


    In all practicality, we’re forced to use built-in data types provided by the SQL
    DBMS. In the case of Oracle, the most commonly used built-in data types are varchar,
    number, and date.


    These will suffice for our example database design.


    In the next section (“Implementing Attribute Constraints”), you’ll see that with
    the use of the SQL alter table add constraint statement, you can still in effect
    implement the attribute-value sets. The column data types declared in the create
    table statements act as supersets of the attribute-value sets, and by adding constraints
    you can narrow down those supersets to exactly the attribute-value sets that were
    specified in the characterizations for the table structures.


    Listings 11-4 through 11-13 show the create table statements for the UEX example
    database design.


    **Listing 11-4.** *Create Table for GRD Table Structure* create table grd


    ( grade number(2,0) not null


    , llimit number(7,2) not null


    , ulimit number(7,2) not null


    , bonus number(7,2) not null);


    7451CH11.qxd 5/15/07 2:26 PM Page 257


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    **257**


    **■Note** The not null alongside every column indicates that no NULLs are allowed
    in that column. In such cases, we say that the column is *mandatory*.


    **Listing 11-5.** *Create Table for EMP Table Structure* create table emp


    ( empno number(4,0) not null


    , ename varchar(8) not null


    , job varchar(9) not null


    , born date not null


    , hired date not null


    , sgrade number(2,0) not null


    , msal number(7,2) not null


    , username varchar(15) not null


    , deptno number(2,0) not null);


    **Listing 11-6.** *Create Table for SREP Table Structure* create table srep


    ( empno number(4,0) not null


    , target number(6,0) not null


    , comm number(7,2) not null);


    **Listing 11-7.** *Create Table for MEMP Table Structure* create table memp


    ( empno number(4,0) not null


    , mgr number(4,0) not null);


    **Listing 11-8.** *Create Table for TERM Table Structure* create table term


    ( empno number(4,0) not null


    , left date not null


    , comments varchar(60));'
