  trans: "\n# 第十章 数据操作（续）\n\n除了数据检索，事务执行是数据库的第二个最重要的应用。通过执行事务，你可以维护数据库并确保其状态是（变化中的）现实世界的有效表示。在本节中，我们将演示如何形式化地指定事务。\n\
    \n## 插入操作的形式化规范\n\n让我们从一个简单的例子开始，使用第七章引入的数据库设计。看一下元组 `tcrs1`。它表示一个需要插入数据库的新课程：\n\
    \n```\ntcrs1 := { (CODE;'AM4DP')\n         , (DESC;'Applied Mathematics for Database\
    \ Professionals')\n         , (CAT;'DSG')\n         , (DUR;5) }\n```\n\n为方便起见，我们在代码清单\
    \ 10-1 中重复了特征定义 `chr_CRS`、元组宇宙 `tup_CRS` 和表宇宙 `tab_CRS` 的定义。所有关于 `CRS` 表结构的属性、元组和表约束都在此清单中。\n\
    \n**代码清单 10-1.** `chr_CRS`、`tup_CRS` 和 `tab_CRS` 的定义\n\n```\nchr_CRS :=\n  { (\
    \ CODE; CRSCODE–TYP )\n  , ( DESCR; varchar(40) )\n  , ( CAT; { s | s∈varchar(3)\
    \ ∧ s∈{'DSG','GEN','BLD'} } )\n  , ( DUR; { n | n∈number(2,0) ∧ 1 ≤ n ≤ 15 } )\n\
    \  }\n\ntup_CRS :=\n  { c | c∈Π(chr_CRS) ∧ c(CAT) = 'BLD' ⇒ c(DUR) ≤ 5 }\n\ntab_CRS\
    \ :=\n  { C | C∈℘(tup_CRS) ∧ (∀c1,c2∈C: c1(CODE) = c2(CODE) ⇒ c1 = c2) }\n```\n\
    \n`tcrs1` 并未违反 `CRS` 表结构的任何属性或元组约束；或者换句话说，`tcrs1` 是元组宇宙 `tup_CRS` 的一个元素。\n\n以下是对将\
    \ `tcrs1` 插入 `CRS` 表结构这一事务进行形式化规范的首次尝试。我们可以将这个事务指定为一个函数，例如 `Tx1a`，定义在 `DB_UEX`\
    \ 上。对于 `DB_UEX` 中的一个给定数据库状态，例如 `dbs`，函数 `Tx1a` 返回一个反映了将 `tcrs1` 插入 `CRS` 表结构后的数据库状态。\n\
    \n```\nTx1a(dbs) := { (EMP; dbs(EMP) )\n             , (SREP; dbs(SREP))\n   \
    \          , (MEMP; dbs(MEMP))\n             , (TERM; dbs(TERM))\n           \
    \  , (DEPT; dbs(DEPT))\n             , (GRD; dbs(GRD) )\n             , (CRS;\
    \ dbs(CRS) ∪ {tcrs1} )\n             , (OFFR; dbs(OFFR))\n             , (REG;\
    \ dbs(REG) )\n             , (HIST; dbs(HIST)) }\n```\n\n如你所见，函数 `Tx1a` 生成了另一个数据库状态，该状态包含与\
    \ `dbs` 相同的十个表结构。这个结果数据库状态仅在 `CRS` 表结构上与 `dbs` 不同；元组 `tcrs1` 已被添加。对于所有其他表结构，结果数据库状态持有\
    \ `dbs` 所持有的相应表。\n\n让我们将 `Tx1a` 应用于“空数据库状态”（即所有表结构都持有空表的数据库状态）。以下是这个空数据库状态，我们将它命名为\
    \ `db_empty`。我们在第七章的练习 12 中向你介绍了这个数据库状态。\n\n```\ndb_empty := { (EMP; ∅)\n    \
