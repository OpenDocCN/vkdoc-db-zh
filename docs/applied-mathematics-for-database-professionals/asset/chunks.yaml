    为过渡约束的 `DI` 代码设计序列化策略并非易事。例如，请考虑表 11-5 中所示的两个并发执行事务 `TX5` 和 `TX6` 的场景。


    ## 表 11-5：TX5 和 TX6 的序列化


    | 时间 | TX5 | TX6 | 说明 |

    |------|-----|-----|---------|

    | t=0 | `DML1`; | | `TX5` 开始；`DML1` 不涉及 `EMP` 表结构。 |

    | t=1 | | `UPDATE` | `TX6` 开始；它更新员工 1042 的工资。 |

    | t=2 | | `INSERT` | `TX6` 插入相应的记录；`STC5` 的 `DI` 代码触发。 |

    | t=3 | | `COMMIT` | `TX6` 结束。 |

    | t=4 | `INSERT` | | `TX5` 为 1042 插入类似的历史记录，`STC5` 的 `DI` 代码触发。 |


    考虑到 Oracle 的 `读已提交` 隔离级别，当约束 `STC5` 的 `DI` 代码在 `t=4` 触发时，它能看到由事务 `TX6` 建立的员工 1042
    工资变更。`t=0` 时的旧快照没有此变更。新的快照（即 `t=4` 时的当前快照）确实有此变更，因为 `TX6` 已在 `t=4` 提交。因此，`STC5`
    的 `DI` 代码可能会批准由 `TX5` 执行的历史记录插入（当然，前提是它正确反映了工资更新）。在这种情况下，添加序列化锁调用无济于事；`TX6` 中运行的
    `DI` 代码获取的任何锁在 `t=4` 时都已释放。


    显然，当前 `STC5` 的 `DI` 代码设置无法正确工作，是因为它错误地推断它所看到的关于 `EMP` 表结构的变化是由*同一*事务中先前的 `DML`
    语句引起的。


    我们给出此示例是为了表明，为（至少某些）状态转换约束实现 `DI` 代码绝非易事，绝对需要进一步研究。


    ### ■注意


    在撰写本书时，我们尚未完全研究正确序列化状态转换 `DI` 代码的相关问题。在这种情况下，一种可能的修复方法是让约束验证查询（闪回查询）在 Oracle 的
    `可序列化` 隔离级别下运行。在此模式下运行的查询不会看到其他事务在当前事务开始后提交的更改；您只能看到当前事务所做的更改。不幸的是，您无法更改单个查询的隔离模式；您必须转而让整个事务在
    Oracle 的 `可序列化` 模式下运行。


    在下一节中，您将找到对另一个我们至今尚未忽视的问题的探讨。'
- fmt: '# Bringing Deferred Checking into the Picture


    So far we’ve been assuming that during the serial execution of DML statements
    in a transaction, every intermediate database state should satisfy all constraints;
    all required DI code is run immediately at statement level using after DML-triggers.
    However, you’ll sometimes require that the execution of DI code be deferred to
    the end of the transaction.


    ## Why Deferred Checking?


    There is a class of data integrity constraints that will always need to be temporarily
    violated during the transaction, and rechecked in a deferred way at the end of
    the transaction. An example of this is a specialization constraint. Take a look
    at constraint `PSPEC1` from our example database design:


    ```

    PSPEC1(EMP,SREP) :=


    /* Sales reps have a target and a commission */


    { e(EMPNO) | e∈EMP ∧ e(JOB) = ''SALESREP'' } =


    { s(EMPNO) | s∈SREP }

    ```


    Because with `SQL`, you cannot insert both the `EMP` row and the `SREP` row at
    the same time, a transaction that inserts a new sales representative will have
    to issue two inserts. Also, irrespective of the order of the inserts, the intermediate
    database state will violate constraint `PSPEC1`.


    This example gives us a first reason why, in our `SQL` world, you have to deal
    with temporary constraint violations.


    DML Statements Operate on a Single Table Structure


    Given our set of data integrity constraints, certain valid database state transitions
    might well require a DML statement on more than one table structure. Because constraints
    in the `database constraint` class have a data scope of multiple table structures,
    there is a good possibility that a database constraint violation will be caused
    by a first DML statement on one of the involved table structures and that a second
    DML statement will correct this violation on one of the other involved table structures.


    Note the use of the word “possibility.” Some transactions will always need to
    violate a certain database constraint temporarily, regardless of the order in
    which the DML statements within that transaction are executed (the preceding `PSPEC1`
    is an example of this). However, many database constraints never need deferred
    checking. The data constrained by them can be kept to satisfy the constraint at
    all times by issuing the different DML statements *in a specific order* implied
    by the constraint. For instance, this is the case with a subset requirement.


    It can always be satisfied by intermediate database states as long as DML statements
    are executed in the right order; you’ll first need to insert a new row to the
    superset and then to the subset.


    In the next section we’ll discuss a second shortcoming of the SQL language, which
    gives rise to deferred checking.


    7451CH11.qxd 5/15/07 2:26 PM Page 300


    300


    C H A P T E R 1 1 ■ I M P L E M E N T I N G D A T A B A S E D E S I G N S I N
    O R A C L E


    DML Statements Operate in a Single Manner


    A DML statement is an `INSERT`, an `UPDATE`, or a `DELETE` statement. However,
    a valid state transition of one table structure might require more than one type
    of DML statement to achieve, and thus could possibly give rise to the need to
    allow temporary violations for table constraints too.


    For example, take the following (not very realistic) table constraint: “The number
    of sales reps plus twice the number of clerks must equal either 100 or zero.”
    Let’s look at the transaction of introducing a clerk. Assume that the current
    `EMP` table holds 100 sales reps (rendering our table constraint `TRUE`). As soon
    as we introduce the new clerk, either by updating the `JOB` of a sales rep or
    by inserting a new clerk, we’ll always introduce a violation and need a second
    different type of DML statement to restore the truth of the table constraint.


    This shortcoming of the `SQL` language implies that DI code for certain `table
    constraints` can be subject to deferred execution too. We’ll call table and database
    constraints that require temporary violations inside transactions, `deferrable`
    constraints.


    ## Outline of Execution Model for Deferred Checking'
