    n3


    nd


    In Listing 3-17, each simple predicate SP is allowed to be prefixed with a negation
    con-ij


    nective. It’s easy to check whether a proposition in CNF is a tautology, because
    as soon as one of the conjunction members is FALSE, the proposition becomes FALSE.
    In other words, you can check the conjunction members one by one. Moreover, because
    all conjunction members of a predicate in CNF must be an iterated OR with simple
    predicates only, the tautology check can also be formulated as follows:


    *A CNF predicate is a tautology (always* TRUE *) if and only if each conjunction
    member* *contains a simple predicate* P *and its negation.*


    Listing 3-18 shows four examples of predicates in CNF (P, Q, R, and S are simple
    predicates).


    **Listing 3-18.** *Examples of Predicates in CNF*


    P


    P ∨ Q


    P ∧ Q


    (P ∨ Q ∨ ¬R) ∧ (P ∨ ¬R)


    (P ∨ Q ∨ ¬P) ∧ (Q ∨ ¬Q) ∧ (¬R ∨ R ∨ S)


    The first predicate has one conjunction member that consists of one simple predicate.


    The second predicate has one conjunction member that happens to be a disjunction
    of two simple predicates; the third and the fourth examples consist of two conjunction
    members.


    The fifth example is a tautology; note that the three conjunction members contain
    the pairs of simple predicates (P, ¬P), (Q, ¬Q), and (R, ¬R), respectively.


    **Disjunctive Normal Form**


    A predicate is in *disjunctive normal form* (DNF) if it consists of one or more
    members separated by OR; that is, if the predicate, say P-DNF, has the following
    format: P-DNF := D ∨ D ∨ D ∨ ... ∨ D


    n


    7451CH03.qxd 5/4/07 2:26 PM Page 61


    C H A P T E R 3 **■** S O M E M O R E L O G I C


    **61**


    In this formula, D , D , ... , D are known as the *disjunction members*—or just
    *disjuncts* for 1


    n


    short. Each disjunction member is an iterated AND with *simple predicates* only
    (zero iteration allowed). So DNF in full detail looks as shown in Listing 3-19.


    **Listing 3-19.** *Disjunctive Normal Form (DNF)*


    P-DNF := (SP


    ∧ SP ∧ SP ∧ ... ∧ SP ) ∨


    1a


    (SP


    ∧ SP ∧ SP ∧ ... ∧ SP ) ∨


    2b


    (SP


    ∧ SP ∧ SP ∧ ... ∧ SP ) ∨


    3c


    ...


    ∨


    (SP


    ∧ SP ∧ SP ∧ ... ∧ SP )


    n1


    n2


    n3


    nd


    In Listing 3-19, each SP is allowed to be prefixed with a negation connective.
    Compound ij


    predicates in DNF are easy to check for contradictions. For a predicate in DNF
    to be a contradiction, all disjunction members must be FALSE—because the predicate
    is written as an iterated OR construct. Following the same reasoning as we did
    for predicates in CNF, we can say the following about predicates in DNF:


    *A DNF predicate is a contradiction if and only if each disjunction member contains
    a* *simple predicate* P *and its negation.*


    See Listing 3-20 for examples of predicates in DNF.


    **Listing 3-20.** *Examples of Predicates in DNF*


    P ∨ Q


    P ∧ Q


    (P ∧ Q ∧ ¬R) ∨ (S ∧ ¬R)


    (P ∧ Q ∧ ¬P) ∨ (R ∧ ¬R ∧ S)'
  trans: "\n# 第三章 更多逻辑知识\n\n## 合取范式\n\n一个谓词如果由通过 AND（与）连接的一个或多个成员组成，则该谓词处于合取范式（CNF）；也就是说，如果谓词，例如\
    \ `P-CNF`，具有以下格式：`P-CNF := C ∧ C ∧ C ∧ ... ∧ C_n`。\n\n在此公式中，`C_1`, `C_2`, ...\
    \ `C_n` 被称为合取项（conjunction members）——或简称合取项。每个合取项只能是简单谓词的迭代 OR（或）（注意也允许零次迭代，这会导致合取项不包含\
    \ OR 的调用）；简单谓词是指无法进一步分解为析取或合取的谓词（即，它不能是复合谓词）。这些简单谓词可以选择性地以一个否定连接词开头。注意，集合 `{∨,\
    \ ∧, ¬}` 是功能完备的，如第一章所述；因此，你不需要其他连接词来表达任何任意谓词。同样，我们稍后将证明，任何任意谓词都可以转化为 CNF。\n\n\
    CNF 的完整详细形式如代码清单 3-17 所示。\n\n`代码清单 3-17. 合取范式 (CNF)`\n\n```\nP-CNF := (SP_1a ∨\
    \ SP_1b ∨ SP_1c ∨ ... ∨ SP_1d) ∧\n         (SP_2a ∨ SP_2b ∨ SP_2c ∨ ... ∨ SP_2d)\
    \ ∧\n         (SP_3a ∨ SP_3b ∨ SP_3c ∨ ... ∨ SP_3d) ∧\n         ...\n        \
    \ ∧\n         (SP_n1 ∨ SP_n2 ∨ SP_n3 ∨ ... ∨ SP_nd)\n```\n\n在代码清单 3-17 中，每个简单谓词\
    \ `SP_ij` 都可以带有一个否定连接词前缀。检查一个 CNF 命题是否为永真式（tautology）很容易，因为只要其中一个合取项为假（FALSE），整个命题就为假（FALSE）。换句话说，你可以逐个检查这些合取项。此外，因为\
    \ CNF 谓词的所有合取项都必须是仅由简单谓词构成的迭代 OR，所以永真式检查也可以表述如下：\n\n*一个 CNF 谓词是永真式（始终为真）当且仅当每个合取项都包含一个简单谓词\
    \ P 及其否定。*\n\n代码清单 3-18 展示了四个 CNF 谓词的例子（`P`, `Q`, `R` 和 `S` 是简单谓词）。\n\n`代码清单 3-18.\
    \ CNF 谓词示例`\n\n```\nP\nP ∨ Q\nP ∧ Q\n(P ∨ Q ∨ ¬R) ∧ (P ∨ ¬R)\n(P ∨ Q ∨ ¬P) ∧ (Q\
    \ ∨ ¬Q) ∧ (¬R ∨ R ∨ S)\n```\n\n第一个谓词有一个合取项，由一个简单谓词组成。第二个谓词有一个合取项，恰好是两个简单谓词的析取；第三个和第四个例子由两个合取项组成。第五个例子是一个永真式；注意这三个合取项分别包含了简单谓词对（`P`,\
    \ `¬P`）、（`Q`, `¬Q`）和（`R`, `¬R`）。\n\n## 析取范式\n\n一个谓词如果由通过 OR（或）连接的一个或多个成员组成，则该谓词处于析取范式（DNF）；也就是说，如果谓词，例如\
    \ `P-DNF`，具有以下格式：`P-DNF := D ∨ D ∨ D ∨ ... ∨ D_n`。\n\n在此公式中，`D_1`, `D_2`, ...\
    \ , `D_n` 被称为析取项（disjunction members）——或简称析取项。每个析取项只能是简单谓词的迭代 AND（与）（允许零次迭代）。因此\
    \ DNF 的完整详细形式如代码清单 3-19 所示。\n\n`代码清单 3-19. 析取范式 (DNF)`\n\n```\nP-DNF := (SP_1a\
    \ ∧ SP_1b ∧ SP_1c ∧ ... ∧ SP_1d) ∨\n         (SP_2a ∧ SP_2b ∧ SP_2c ∧ ... ∧ SP_2d)\
    \ ∨\n         (SP_3a ∧ SP_3b ∧ SP_3c ∧ ... ∧ SP_3d) ∨\n         ...\n        \
    \ ∨\n         (SP_n1 ∧ SP_n2 ∧ SP_n3 ∧ ... ∧ SP_nd)\n```\n\n在代码清单 3-19 中，每个 `SP_ij`\
    \ 都可以带有一个否定连接词前缀。DNF 中的复合谓词很容易检查是否存在矛盾。对于一个 DNF 谓词成为矛盾式（contradiction），所有析取项必须都为假——因为该谓词是写成迭代\
    \ OR 结构的。遵循与 CNF 谓词相同的推理，我们可以对 DNF 谓词做出如下论断：\n\n*一个 DNF 谓词是矛盾式当且仅当每个析取项都包含一个简单谓词\
