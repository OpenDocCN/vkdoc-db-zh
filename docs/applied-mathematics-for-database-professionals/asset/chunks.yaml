- fmt: '# Listing 7-42. The Tuple-in-Join Constraints of DB_UEX


    `PTIJ1(EMP,GRD) :=`

    `/* Monthly salary must fall within assigned salary grade */`

    `( ∀e∈EMP, g∈GRD:`

    `e(SGRADE) = g(GRADE) ⇒ ( g(LLIMIT) ≤ e(MSAL) ∧ e(MSAL) ≤ g(ULIMIT) ) )`


    `PTIJ2(EMP,TERM) :=`

    `/* Leave date must fall after hire date */`

    `( ∀e∈EMP, t∈TERM:`

    `e(EMPNO) = t(EMPNO) ⇒ e(HIRED) < t(LEFT) )`


    `PTIJ3(SREP,EMP,MEMP) :=`

    `/* Salesreps cannot earn more than the employee they report to */`

    `( ∀s∈SREP, es∈EMP, m∈MEMP, em∈EMP:`

    `( s(EMPNO)=es(EMPNO) ∧ es(EMPNO)=m(EMPNO) ∧ m(MGR) = em(EMPNO) )`

    `⇒`

    `( es(MSAL) + s(COMM)/12 < em(MSAL) ) )`


    `PTIJ4(EMP,MEMP) :=`

    `/* Non-salesreps cannot earn more than the employee they report to */`

    `( ∀e∈EMP, m∈MEMP, em∈EMP:`

    `(e(EMPNO)=m(EMPNO) ∧ m(MGR) = em(EMPNO) ∧ e(JOB) ≠ ''SALESREP'')`

    `⇒`

    `( e(MSAL) < em(MSAL) ) )`


    `PTIJ5(EMP,DEPT) :=`

    `/* Department manager must work for department he/she manages */`

    `( ∀e∈EMP, d∈DEPT:`

    `e(EMPNO) = d(MGR) ⇒ e(DEPTNO) = d(DEPTNO) )`


    `PTIJ6(EMP,HIST) :=`

    `/* No history records allowed at or before hire date */`

    `( ∀e∈EMP, h∈HIST:`

    `e(EMPNO) = h(EMPNO) ⇒ e(HIRED) < h(UNTIL) )`


    `PTIJ7(TERM,HIST) :=`

    `/* No history records allowed at or after leave date */`

    `( ∀t∈TERM, h∈HIST:`

    `t(EMPNO) = h(EMPNO) ⇒ t(LEFT) > h(UNTIL) )`


    `PTIJ8(EMP,REG) :=`

    `/* You cannot register for offerings in 1st four weeks on the job */`

    `( ∀e∈EMP, r∈REG:`

    `e(EMPNO) = r(STUD) ⇒ e(HIRED) + 28 ≤ r(STARTS) )`


    `PTIJ9(TERM,REG,CRS) :=`

    `/* You cannot register for offerings given at or after leave date */`

    `( ∀t∈TERM, r∈REG, c∈CRS:`

    `( t(EMPNO) = r(STUD) ∧ r(COURSE) = c(CODE) )`

    `⇒`

    `( t(LEFT) ≥ r(STARTS) + c(DUR) ) )`


    `PTIJ10(EMP,REG,OFFR,CRS) :=`

    `/* You cannot register for overlapping course offerings */`

    `( ∀e∈EMP, r1,r2∈REG, o1,o2∈OFFR, c1,c2∈CRS:`

    `( e(EMPNO) = r1(STUD) ∧`

    `r1↓{COURSE,STARTS} = o1↓{COURSE,STARTS} ∧`

    `o1(COURSE) = c1(CODE) ∧`

    `e(EMPNO) = r2(STUD) ∧`

    `r2↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∧`

    `o2(COURSE) = c2(CODE)`

    `) ⇒`

    `( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨`

    `o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨`

    `o2(STARTS) ≥ o1(STARTS) + c1(DUR) ) )`


    `PTIJ11(EMP,OFFR) :=`

    `/* Trainer cannot teach courses before hire date */`

    `( ∀e∈EMP, o∈OFFR:`

    `e(EMPNO) = o(TRAINER) ⇒ e(HIRED) ≤ o(STARTS) )`


    `PTIJ12(TERM,OFFR,CRS) :=`

    `/* Trainer cannot teach courses at or after leave date */`

    `( ∀t∈TERM, o∈OFFR, c∈CRS:`

    `( t(EMPNO) = o(TRAINER) ∧ o(COURSE) = c(CODE) )`

    `⇒`

    `( t(LEFT) ≥ o(STARTS) + c(DUR) ) )`


    `PTIJ13(REG,OFFR) :=`

    `/* Trainer cannot register for offerings taught by him/herself */`

    `( ∀r∈REG, o∈OFFR:`

    `r↓{COURSE,STARTS} = o↓{COURSE,STARTS} ⇒`

    `r(STUD) ≠ o(TRAINER) )`


    `PTIJ14(OFFR,CRS) :=`

    `/* Trainer cannot teach different courses simultaneously */`

    `( ∀o1,o2∈OFFR, c1,c2∈CRS:`

    `( o1(TRAINER) = o2(TRAINER) ∧`

    `o1(COURSE) = c1(CODE) ∧`

    `o2(COURSE) = c2(CODE)`

    `) ⇒`

    `( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨`

    `o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨`

    `o2(STARTS) ≥ o1(STARTS) + c1(DUR) ) )`


    `PTIJ15(EMP,REG,OFFR,CRS) :=`

    `/* Employee cannot register for course offerings that overlap */`

    `/* with another course offering where he/she is the trainer */`

    `( ∀e∈EMP, r∈REG, o1,o2∈OFFR, c1,c2∈CRS:`

    `( e(EMPNO) = r(STUD) ∧`

    `r↓{COURSE,STARTS} = o1↓{COURSE,STARTS} ∧`

    `o1(COURSE) = c1(CODE) ∧`

    `e(EMPNO) = o2(TRAINER) ∧`

    `o2(COURSE) = c2(CODE)`

    `) ⇒`

    `( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨`

    `o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨`

    `o2(STARTS) ≥ o1(STARTS) + c1(DUR) ) )`


    Predicates `PTIJ1` to `PIJ15` all limit the tuples that are allowed in some join.
    Most of these joins involve only two table structures. Five predicates (`PTIJ3`,
    `PTIJ9`, `PTIJ10`, `PTIJ12`, `PTIJ15`) limit the tuples in joins that involve
    more than two table structures. Let’s take a closer look at those five.


    Predicate `PTIJ3` joins an `SREP` tuple (variable `s`) with its related `EMP`
    tuple (variable `es`), continues to join this `EMP` tuple with its related `MEMP`
    tuple (variable `m`), and finally joins this `MEMP` tuple with its related `EMP`
    tuple (variable `em`). All tuples that are in this join across four tables (note
    that `EMP` is joined twice) are constrained by the predicate `es(MSAL) + s(COMM)/12
    < em(MSAL)`. This states that the monthly salary of the sales representative,
    increased with a twelfth of his/her commission, should be less than the monthly
    salary of the employee that is managing this sales representative. By the way,
    this managing employee cannot be a sales representative—which might have required
    adding a twelfth of a commission at the right-hand side of the smaller-than symbol
    too—due to subset requirement `PSSR3`.


    Predicate `PTIJ9` joins a `TERM` tuple (`t`) directly with a `REG` tuple (`r`)
    and continues to join the `REG` tuple with its related `CRS` tuple (`c`).


    **Note** A few notes:

    - The join from `TERM` to `REG` is not done “via `EMP`.” Because `TERM` is a specialization
    of `EMP`, you can join `TERM` directly to any other table structure that `EMP`
    can join to using the `EMPNO` attribute.

    - The join from `REG` to `CRS` is not done “via `OFFR`.” From the two subset requirements
    `PSSR6` and `PSSR10`, you can deduce that `{CRS}` in `REG` references `{CODE}`
    in `CRS` (a subset requirement between `REG` and `CRS`), and you can thus join
    `REG` directly to `CRS` in the way shown.

    - Tuples in this join are constrained by the predicate `t(LEFT) ≥ r(STARTS) +
    c(DUR)`. Do you notice that this formal specification somewhat differs from the
    embedded informal comment? The formal specification involves the `CRS` table structure
    too, or rather its `DUR` attribute.

    - Here’s a more correct informal explanation of this constraint: an employee cannot
    register for a course offering that starts at or after his or her leave date,
    nor can an employee be terminated during a course offering that he or she is attending
    as a student.

    - Now you’re going down a path that is often hard to avoid when you try to describe
    database constraints informally: you start talking in terms of transactions that
    are not allowed given the constraint. This is what just happened earlier: you
    cannot *insert* an `OFFR` tuple given a certain `TERM` tuple, and vice versa,
    you cannot insert a `TERM` tuple given a certain `OFFR` tuple.

    - With the increasing scope of data covered by a constraint, it becomes increasingly
    more difficult to informally—using a natural language—state *the what* of a constraint
    without alienating yourself from your customer. You often must dive into *the
    how* of a constraint. In your communication with the end users, this is not a
    bad thing; you start communicating in terms of *how* the system will behave (what
    transactions it will not accept given the constraint), and end users typically
    understand this. Your formal specification is the basis from which you can generate
    this behavior (we will deal with this in detail in Chapter 11). For instance,
    you might want to briefly mention to the user that given this constraint, the
    duration of a course cannot be increased (updated) given certain circumstances.


    Predicate `PTIJ10` joins an `EMP` tuple with two related `REG` tuples (`r1` and
    `r2`), continues to join each of these two `REG` tuples with their related `OFFR`
    tuple (`o1` and `o2`), and finally joins the two `OFFR` tuples with their related
    `CRS` tuple (`c1` and `c2`). Tuples in this join are constrained by the following
    predicate:

    ```

    o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨

    o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨

    o2(STARTS) ≥ o1(STARTS) + c1(DUR)

    ```

    This predicate states that if the join doesn’t involve the same two `OFFR` tuples,
    then offering `o1` must start after offering `o2` ends, or vice versa.'
