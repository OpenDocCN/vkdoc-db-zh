- fmt: "The trick is that you use the `dbms_lock` supplied package of Oracle’s SQL\
    \ DBMS. By using this package you can acquire application locks, through which\
    \ you can effectively serialize concurrently executing transactions that involve\
    \ the same constraint.\n\n### Listing 11-37. Application Lock Services\n\n`Listing\
    \ 11-37` shows the code of procedure `p_request_lock` that’s built on top of the\
    \ `dbms_lock` package, and through which you can request an application lock.\
    \ This procedure needs to call a `dbms_lock` module that performs an implicit\
    \ commit. Because you’ll be calling `p_request_lock` from DI code, which in turn\
    \ is executed from within a trigger (a context in which you’re not allowed to\
    \ commit), you need to hide this implicit commit from the current transaction.\
    \ You can do this by use of an autonomous transaction. Auxiliary function `f_allocate_unique`\
    \ (also in `Listing 11-37`) implements this autonomous transaction.\n\n```sql\n\
    create function f_allocate_unique\n(p_lockname in varchar) return varchar as\n\
    --\npragma autonomous_transaction;\n--\npl_lockhandle varchar(128);\n--\nbegin\n\
    \  -- This does implicit commit.\n  dbms_lock.allocate_unique(upper(p_lockname)\n\
    \                           ,pl_lockhandle\n                           ,60*10);\
    \ -- Set expiration to 10 minutes.\n--\n  return pl_lockhandle;\n--\nend;\n/\n\
    \ncreate procedure p_request_lock(p_lockname in varchar) as\n--\npl_lockhandle\
    \ varchar(128);\npl_return number;\n--\nbegin\n--\n  -- Go get a unique lockhandle\
    \ for this lockname.\n--\n  pl_lockhandle := f_allocate_unique(p_lockname);\n\
    --\n  -- Request the named application lock in exclusive mode.\n  -- Allow for\
    \ a blocking situation that lasts no longer than 60 seconds.\n--\n  pl_return\
    \ :=\n    dbms_lock.request(lockhandle => pl_lockhandle\n                    \
    \ ,lockmode => dbms_lock.x_mode\n                     ,timeout => 60\n       \
    \              ,release_on_commit => true);\n--\n  if pl_return not in (0,4)\n\
    \  then\n    raise_application_error(-20998,\n    'Unable to acquire constraint\
    \ serialization lock '||p_lockname||'.'); end if;\n--\nend;\n/\n```\n\nYou can\
    \ now—in this case fairly easily—ensure that two transactions, which both need\
    \ to run the DI code for constraint `DEPT_TAB01`, are correctly serialized to\
    \ prevent the concurrency problem that was demonstrated in `Table 11-3`. Take\
    \ a look at `Listing 11-38`, which shows the DI code for constraint `DEPT_TAB01`\
    \ using execution model `EM6`, including the necessary calls to `p_lock_request`\
    \ to ensure correct serialization.\n\n### Listing 11-38. EM6 Implemention of DI\
    \ Code for DEPT_TAB01 Including Serialization\n\n```sql\ncreate trigger DEPT_AIS_TAB01\n\
    after insert on DEPT\ndeclare pl_dummy varchar(40);\nbegin\n--\n  for r in (select\
    \ distinct mgr as mgr\n            from v_dept_ite)\n  loop\n    begin\n     \
    \ -- Acquire serialization lock.\n      p_request_lock('DEPT_TAB01');\n--\n  \
    \    select 'Constraint DEPT_TAB01 is satisfied' into pl_dummy from DUAL\n   \
    \   where 2 >= (select count(*)\n                  from DEPT d\n             \
    \     where d.MGR = r.MGR);\n--\n    exception when no_data_found then\n--\n \
    \     raise_application_error(-20999,'Constraint DEPT_TAB01 is violated '||\n\
    \      'for department manager '||to_char(r.MGR)||'.');\n--\n    end;\n  end loop;\n\
    --\nend;\n/\n\ncreate trigger DEPT_AUS_TAB01\nafter update on DEPT\ndeclare pl_dummy\
    \ varchar(40);\nbegin\n--\n  for r in (select distinct n_mgr as mgr\n        \
    \    from v_dept_ute)\n  loop\n    begin\n      -- Acquire serialization lock.\n\
    \      p_request_lock('DEPT_TAB01');\n--\n      select 'Constraint DEPT_TAB01\
    \ is satisfied' into pl_dummy from DUAL\n      where 2 >= (select count(*)\n \
    \                 from DEPT d\n                  where d.MGR = r.MGR);\n--\n \
    \   exception when no_data_found then\n--\n      raise_application_error(-20999,'Constraint\
    \ DEPT_TAB01 is violated '||\n      'for department manager '||to_char(r.MGR)||'.');\n\
    --\n    end;\n  end loop;\n--\nend;\n/\n```\n\nThe scenario that was described\
    \ in `Table 11-3` now executes as follows (see `Table 11-4`).\n\n### Table 11-4.\
    \ Serialization of TX3 and TX4\n\n| **Time** | **TX3** | **TX4** | **DI Code**\
    \ |\n| :--- | :--- | :--- | :--- |\n| t=0 | INSERT | | Sees 1042 now manages two\
    \ departments; therefore allows this insert. |"
