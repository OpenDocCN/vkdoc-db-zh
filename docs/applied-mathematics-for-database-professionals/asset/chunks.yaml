    the application lock. Right after t=2, this waiting ends and execution of `DI`
    code is resumed. It now executes the constraint validation query, and finds that
    the insert in `TX4` is not allowed because it would make employee 1042 the department
    manager of three departments.


    You’ve now fixed the serialization issue: two transactions that both require executing
    the `DEPT_TAB01` validation query can never execute simultaneously. However, the
    locking scheme that is implemented might be a bit too coarse. For instance, if
    `TX4` were to insert a department that is managed by someone else (that is, not
    employee 1042), then `TX4` will also block, whereas it really needn’t in this
    case for the `DI` code to enforce the constraint correctly.


    Given the use of `EM6` in Listing 11-38, you can implement a more granular locking
    scheme for this constraint, by changing the calls to `p_request_lock` to the following:
    `p_request_lock(''DEPT_TAB01''||to_char(r.mgr))`


    Instead of always requesting an application lock whose name is constant (`''DEPT_TAB01''`),
    you now request an application lock whose name is dependent upon the *case* that
    is in need to be checked. Now two transactions inserting a department managed
    by different employees are allowed to execute simultaneously.


    Note: Only `EM6` allows you to implement this more granular locking scheme.


    # 290


    ## CHAPTER 11 - IMPLEMENTING DATABASE DESIGNS IN ORACLE


    We’ll end this section with a few concluding remarks related to serializability,
    further clarifying why vendors offer such poor support for the declarative strategy
    to implement constraints.


    Recall the various execution models to which you’ve been introduced. Not only
    will less efficient execution models more often execute nonoptimized constraint
    validation queries than is necessary, but they’ll also acquire serialization locks
    more often than is necessary. For instance, if you were to add serialization lock
    calls into `DI` code built using `EM1`, then effectively you’d only allow one
    transaction at a time; there cannot be any concurrent execution of transactions
    in this execution model. In `EM2`, this is relaxed to only one transaction at
    a time per table structure. Going further through all the remaining execution
    models, the level of concurrency increases each time.


    Next to the remarks made earlier about the `DBMS` maybe not being able to compute
    neither the `TE` queries nor the optimized constraint validation queries, similar
    remarks apply to the `DBMS` being able to compute what the most optimal serialization
    lock calls should be. A lazy strategy that ensures correctness of `DI` code execution
    is always to acquire an exclusive application lock for each constraint (as shown
    in Listing 11-38). However, it is likely that you won’t accept the unnecessary
    degraded concurrency of your `DBMS` that comes along with it.


    Having extensively investigated the issues around implementing efficient `DI`
    code for table constraints using the triggered procedural strategy in this section,
    the next section will only offer you a summary of guidelines for implementing
    `DI` code for table constraints.


    ## Implementing Table Constraints


    As demonstrated by the previous section, it is here at the table constraint level
    where things rapidly become more complex. You can state only two types of table
    constraints declaratively: uniquely identifying attributes (keys), and subset
    requirements referencing back to the same table (in which case a subset requirement
    is a table constraint).


    Here’s an example that demonstrates the use of SQL primary key constraints and
    unique key constraints (see `Listing 11-39`).'
