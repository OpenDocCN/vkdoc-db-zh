    | `( P ⇒ Q )` | ⇔ `( ( P ⇒ Q ) ∨ FALSE )` | 平凡；表 1-13 中的第二个特例 |

    | | ⇔ `( ( ¬P ∨ Q ) ∨ FALSE )` | 将蕴涵转换为析取 |

    | | ⇔ `( ( ¬P ∨ ¬¬Q ) ∨ FALSE )` | 双重否定 |

    | | ⇔ `( ¬ ( P ∧ ¬Q ) ∨ FALSE )` | 德摩根定律 |

    | | ⇔ `( ( P ∧ ¬Q) ⇒ FALSE )` | 将析取转换为蕴涵 |


    这完成了证明；我们从已知的规则中推导出了一条新的重写规则，而没有使用真值表。如果你回顾表 1-7 中蕴涵连接词的定义，我们上面的新重写规则是有道理的；它恰好对应于蕴涵返回
    `FALSE` 的唯一情况，也称为 *破碎的承诺*。'
- fmt: '## Chapter Summary


    Before continuing with the exercises in the next section, you might want to revisit
    certain sections of this chapter if you don’t feel comfortable about one of the
    following concepts, introduced in this first chapter about logic:


    • A `value` is an individual constant with a well-determined meaning.


    • A `variable` is a holder for a (representation of a) value.


    • A `proposition` is a declarative sentence that is unequivocally either TRUE
    or FALSE.


    • A `predicate` is a truth-valued function with parameters.


    • You can convert a predicate into a proposition by providing values for the parameters
    or by binding parameters with a quantifier.


    • You can build compound predicates by applying `logical connectives` to existing
    ones; this chapter introduced `negation`, `conjunction`, `disjunction`, `implication`,
    and `equivalence`.


    • Logical connectives can be regarded as `logical operators`; they take one or
    more (input) predicates as their operands, and return another predicate as their
    output.


    • The input predicates of a compound predicate are also referred to as the `components`
    of the compound predicate.


    • The precise meaning of all logical connectives can be defined using `truth tables`,
    and you can use truth tables to investigate the truth value of compound predicates.


    • A `tautology` is a proposition that is always TRUE, and a `contradiction` is
    a proposition that is always FALSE.


    • A `rewrite rule` is a tautology that has the form of an equivalence.


    • You can use rewrite rules to derive new rewrite rules without using truth tables.


    ### Exercises


    **1.** Which of these predicates are propositions?


    **a.** The sun is made of orange juice


    **b.** `y + x > y`


    **c.** There exists a database management system that is truly relational


    **d.** If you are not female you must be male


    **e.** 5 is an even number


    **2.** Express the logical connectives AND and OR in terms of the `NAND` connective,
    as defined in Table 1-9.


    **3.** Show that the rewrite rules in Table 1-13 are correct, by setting up a
    truth table for each of them or by using the rewrite rules you checked earlier
    during this exercise.


    **4.** Show that the following important rewrite rules concerning the implication
    are correct:


    **a.** `( P ⇒ Q ) ⇔ ( ¬Q ⇒ ¬P )`


    **b.** `( P ⇔ Q ) ⇔ ( ( P ⇒ Q ) ∧ ( Q ⇒ P ) )`


    **c.** `¬ ( P ⇒ Q ) ⇔ ( P ∧ ¬Q )`


    **d.** `¬ ( P ∧ Q ) ⇔ ( P ⇒ ¬Q )`


    **e.** `( ( P ⇒ Q ) ∧ ( P ⇒ ¬Q ) ) ⇔ ¬P` (the absurdity rule)


    **5.** Look at the following predicates, and check whether they are tautologies:


    **a.** `P ⇒ ( P ∧ Q )`


    **b.** `P ⇒ ( P ∨ Q )`


    **c.** `( P ∧ Q ) ⇒ P`


    **d.** `( P ∨ Q ) ⇒ P`


    **e.** `( P ∧ ( P ⇒ Q ) ) ⇒ Q`


    **f.** `( P ⇒ Q ) ⇒ ( P ∧ Q )`


    **g.** `( P ∧ Q ) ⇒ ( P ⇒ Q )`


    **h.** `( ( P ⇒ Q ) ∧ ( Q ⇒ R ) ) ⇒ ( P ⇒ R )`


    **i.** `( P ⇒ R ) ⇒ ( ( P ⇒ Q ) ∧ ( Q ⇒ R ) )`


    **j.** `( P ∨ Q ) ⇔ ( ¬P ⇒ Q )`


    **k.** `( P ∨ Q ∨ R ) ⇔ ( ( ¬P ∧ ¬Q ) ⇒ R )`


    **l.** `( P ∨ Q ∨ R ) ⇔ ( ¬P ⇒ ( Q ∨ R ) )`


    **m.** `P ∨ ( Q ∧ R ) ⇔ ( ¬P ⇒ Q ) ∨ ( ¬P ⇒ R )`


    **n.** `P ∨ ( Q ∧ R ) ⇔ ( ¬P ⇒ Q ) ∧ ( ¬P ⇒ R )`


    ## Sets and Elements


    Set theory is about sets, obviously. And there we are, faced with our first problem:
    what exactly `is` a set? A set is a collection of objects, and those objects are
    called the `elements` of the set. In mathematics, we like to be precise—so we
    want formal definitions of all terms we use. Just like in geometry, we all have
    a common understanding of what a `point` is, but providing a formal definition
    of a point turns out to be difficult. That’s why we declare them as `primitive
    terms`; that is, they are just given, and you don’t need to define them. Probably
    the best definition of a set is the one given by Definition 2-1.


    ### Definition 2-1: Set

    A set is fully characterized by its distinct elements, and nothing else but these
    elements.


    As a rather obvious but important consequence, no two distinct sets contain the
    same elements; moreover:


    • The elements of a set don’t have any ordering


    • Sets don’t contain duplicate elements


    Two sets, say A and B, are the same if each element of A is also an element of
    B and each element of B is also an element of A.


    Note that elements of a set can be any type of object. They can even be sets on
    their own; you’ll see numerous examples of sets containing sets as elements in
    the remainder of this book.


    Set theory has a mathematical symbol `∈` that is used to state that some object
    is an element of some set. The following expression states that object x is an
    element of set S: `x ∈ S`


    The negation of this, saying that x is not an element of S, is expressed as follows:
    `x ∉ S`


    This latter expression is shorthand for the negation of the former expression:
    `x ∉ S ⇔ ¬(x ∈ S)`


    Table 2-1 lists these and some other commonly used set-theory symbols.'
