    of the following external predicate, for instance: “The part with part number
    `partno` is named `name`, `instock` items of it are currently held in stock, and
    its price is `price`.”


    ## ■Note

    The English word “table” here is being used in a different sense than its normal
    meaning (two-dimensional picture of columns and rows). In this book we’ll use
    `table` to denote a set of functions. However, you’ll see that a table is usually
    *represented* in columns and rows.


