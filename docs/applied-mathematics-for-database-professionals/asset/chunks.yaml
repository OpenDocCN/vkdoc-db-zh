    \n### 元组谓词\n\n让我们立即解释什么是元组谓词，然后快速用几个例子演示这个概念。元组谓词是一个带有一个参数的谓词。该参数的类型是元组。清单 6-1\
    \ 展示了几个元组谓词的例子。\n\n```\nP0(t) := ( t(sex) ∈ {'male', 'female'} )\n\nP1(t) := (\
