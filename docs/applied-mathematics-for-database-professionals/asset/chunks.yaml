    # 第 9 章 数据检索


    ## 基于 DB_UEX 的示例查询


    本节提供示例查询。它从基本查询开始，逐渐过渡到更复杂的查询。对于每个查询，我们将为你提供以下内容：


    - 查询的非形式化描述

    - 一个或多个指定查询的形式化表达式

    - 一个或多个用 `SQL` 表达的查询规范


    在此过程中，你会发现精确地用非形式化方式指定一个查询变得越来越困难；很难避免歧义。同时，你会看到 `SQL` 存在一些缺点，当你试图将形式化查询规范直接翻译成
    `SELECT` 表达式时，这些缺点会造成困难。


    清单 9-1 至 9-11 介绍了示例查询。所有查询都命名为 `EXQi` (`example query i`)，其中 `i` 代表序号。在为每个查询给出的形式化规范中，`dbs`
    代表 `DB_UEX` 的一个数据库状态。各种替代的形式化表达式命名为 `FEc` (`formal expression c`)，其中 `c` 代表一个字母（a,
    b, c 等）。


    `SQL` 表达式基于 `DB_UEX` 数据库设计的一个实现。我们将在第 11 章详细介绍这个实现。目前只需提及，在 `DB_UEX` 的实现中，每个表全域都一一对应地实现为一个
    `SQL` 表，并且在该实现中明确排除了 `NULL` 值（这是我们形式化方法中未知的概念）。


    在 `SQL` 规范中，我们将使用由数据库特征描述 `DB_CHREX`（见清单 7-38）引入的表结构名称，作为 `SELECT` 表达式可用的表名。我们将替代的
    `SQL` 规范命名为 `SEr` (`SQL expression r`)，其中 `r` 代表罗马数字（I, II, III 等）。


    **注意：** 除非在随附文本中指出，否则为每个查询列出的各自形式化替代表达式和 `SQL` 替代表达式之间没有隐含的关系。


