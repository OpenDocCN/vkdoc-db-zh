    \ {(deptno;12)} } ⊆\n{ {(deptno;10)}, {(deptno;11)}, {(deptno;12)}, {(deptno;13)}\
    \ }\n```\n这同样是一个**真**命题。左边的两个函数的集合是右边四个函数集合的子集。\n\n谓词 `P14` 表明，员工表中所有在特定部门工作的员工的工资总和不应超过部门表中找到的该部门的工资预算。数据库状态\
    \ `S1` 也满足 `P14`。\n\n与元组谓词和表谓词类似，一些数据库谓词的情况被认为是退化情况。如果一个数据库谓词，比如 `P`，可以被重写为具有以下模式的谓词，我们就认为该数据库谓词是退化情况：`P(S)\
    \ := Q(S(T))`\n\n如果一个数据库谓词是上述形式，那么它只涉及一个表结构。\n\n在右边的表达式中，`T` 代表数据库状态 `S` 中的一个表结构名。`S(T)`\
    \ 则代表对应的表，`Q` 代表一个表谓词。只涉及一个表结构（在上面的例子中是 `T`）的数据库谓词被认为是退化的。这些退化情况实际上是在伪装一个表谓词。在下一章中，我们将要求这些情况中的\
    \ `Q` 被引入作为表谓词，而数据库谓词 `P` 则被丢弃。\n\n不失一般性，我们再次将注意力限制在不能分解为多个合取项的数据库谓词上。如果你能将一个给定的数据库谓词\
    \ `P(S)` 重写为 `Pa(S) ∧ Pb(S)` 形式的表达式，那么你实际上是在处理两个数据库谓词。\n\n## 127\n\n### 关于数据完整性谓词的一些说明\n\
    \n我们通过对前述三类数据完整性谓词的几点观察来结束本节的介绍。\n\n正如你在各种示例中看到的，我们可以优雅地使用元组谓词、表谓词和数据库谓词来形式化定义现实世界的条件（业务规则），这些规则需要以某种方式反映在数据库设计的规范中。一个业务规则映射到的谓词类（元组、表或数据库）完全取决于给定数据库设计的数据库骨架。例如，谓词\
    \ `P8`（见 `清单 6-5`）是一个表谓词，因为正式指定“经理工资高于培训师，培训师工资高于文员”这一业务规则的所有信息都包含在员工表结构中。现在，如果出于某种原因引入了一个单独的表结构，比如\
    \ `trainer`，来保存所有培训师信息（使得 `employee` 仅保存经理和文员信息），那么这个现实世界的约束将映射到一个涉及 `employee`\
    \ 和 `trainer` 两个表结构的数据库谓词。\n\n你可能对我们本章介绍数据完整性谓词的方式有个疑问。在你看到的各种示例中，我们使用这些谓词来展示给定的元组、表或数据库状态是否满足它们。然而，在形式化指定数据库设计时，我们对单个数据库状态（或表或元组）并不感兴趣。我们感兴趣的是一个数据库状态空间：一个包含我们为数据库允许的所有值的集合。\n\
    \n我们打算对代表数据库变量值集的这种数据库状态空间进行数学建模（这将在第七章完成）。当我们这样做时，我们将以一种复杂的方式使用本章介绍的三类数据完整性谓词，使得它们代表在数据库状态空间级别起作用的数据完整性约束。\n\
    \n### 表和数据库谓词的常见模式\n\n本节将建立五种表和数据库谓词的常见模式：唯一标识谓词、子集要求谓词、特化谓词、泛化谓词和元组-连接谓词。这五种数据完整性谓词模式在数据库设计中很常见，因此足够重要，值得单独设立一节来讨论。\n\
    \n### 唯一标识谓词\n"
- fmt: '# 元组、表和数据库谓词


    我们之前提到过，作为给定表元素的每个元组在该表内是唯一的。使元组在表内唯一的属性是它的*值*，而不是它的属性。通常，不需要所有的属性值就能唯一地标识表中的一个元组；属性值的一个真子集就足够了。对于某个表，可以通过一种称为*唯一标识*谓词的特殊表谓词来陈述此属性。唯一标识谓词是定义6-1中定义的表谓词的一种。


    ### 定义6-1：唯一标识谓词

    设 `T` 是一个表，并设 `A` 是 `T` 的标题的一个给定非空子集。一个表谓词是唯一标识谓词，如果它具有以下形式（或可被重写为此形式）：


    ```

    ( ∀t1,t2∈T: t1↓A=t2↓A ⇒ t1=t2 )

    ```


    我们称 *`A` 在 `T` 中是唯一标识的*。


    唯一标识谓词表明，如果表中的任意两个元组在给定属性子集上具有相同的属性值，那么它们必须是同一个元组。使用本书第一部分介绍的重写规则，您也可以用列表6-9中列出的形式来表达唯一标识谓词。


    ### 列表6-9：唯一标识谓词的其他表现形式

    ```

    ( ∀t1,t2∈T: t1≠t2 ⇒ t1↓A≠t2↓A )

    ( ∀t1,t2∈T: t1=t2 ∨ t1↓A≠t2↓A )

    ¬( ∃t1,t2∈T: t1≠t2 ∧ t1↓A=t2↓A )

    ```


    列出的第一个形式可能是唯一标识谓词更直观的正式版本；表中的两个不同元组必须在给定的属性子集上有所不同。列表6-7中的谓词 `P11` 就是以这种形式编写的；它指出
    `{dname, loc}` 在表 `T` 中是唯一标识的。同一列表中的谓词 `P12` 也是一个唯一标识谓词。它以列表6-9中显示的第三种形式编写，指出
    `{deptno}` 在表 `T` 中是唯一标识的。列表6-3中的第一个谓词也使用了这种形式。


    给定集合 `A` 在表 `T`（标题为 `H`）中是唯一标识的，那么 `H` 的每个作为 `A` 的真*超集*的子集当然在表 `T` 中也是唯一标识的。在唯一标识谓词中，您希望指定一个在表
    `T` 中是唯一标识的、标题 `H` 的*不可约*子集 `A`。


    > **注意**：一个表中可能有多个这样的不可约子集是唯一标识的。

    >

    > 列表6-7显示了两个不同的子集——`{deptno}` 和 `{dname, loc}`——它们都被认为是在部门表中唯一标识的。


    如果您选择一个可约的 `H` 子集，那么得到的唯一标识谓词就太弱了。最弱的唯一标识谓词是 `T` 的标题（最大的可能超集）在表 `T` 中是唯一标识的。实际上，这对表
    `T` 允许的元组集合根本没有增加任何约束；正如本节开头提到的，我们已经知道元组在表内是唯一的。


    您也可以通过更正式的方法得出这个结论。看看如果将 `T` 的标题代入唯一标识谓词模式中的集合 `A` 会发生什么：


    ```

    ( ∀t1,t2∈T: t1↓dom(t1)=t2↓dom(t2) ⇒ t1=t2 )

    ```


    注意，如果 `t` 是 `T` 的一个元素，那么您可以通过表达式 `dom(t)`（元组 `t` 的域）来引用 `T` 的标题。使用重写规则 `t↓dom(t)
    = t`（一个元组对其所有属性的限制与该元组本身相同），我们可以将前面的谓词重写为：


    ```

    ( ∀t1,t2∈T: t1=t2 ⇒ t1=t2 )

    ```


    该谓词现在是一个重言式；无论 `T` 的值如何，它总是为真。因此，它根本没有以任何方式约束 `T`。


    > **注意**：我们在本节中刻意不讨论*键*。在第7章中，我们将为数据库设计中的每个表结构定义该表结构的可接受表集合——称为*表宇宙*。在定义表宇宙时，我们将确保每个表（在宇宙中）满足一个或多个唯一标识谓词。然后我们说，一个唯一标识属性集合构成了该表宇宙中的一个*键*。


    ## 子集要求谓词


    您在数据库设计中捕获的不同表结构并非全部相互独立。这些表结构中的许多*对*具有一种称为*子集要求*的关系。定义6-2定义了子集要求谓词的概念。此定义中谓词的结构说明了它为何被称为子集要求。


    ### 定义6-2：子集要求谓词

    设 `T1` 和 `T2` 是表，并设 `A` 是 `T1` 的标题的一个给定子集，同时也是 `T2` 的标题的一个子集。我们称一个数据库谓词为子集要求谓词，如果它具有以下形式：


    ```

    { t1↓A | t1∈T1 } ⊆ { t2↓A | t2∈T2 }

    ```


    我们称 *`A` 在 `T1` 中引用 `T2` 中的 `A`*。


    让我们用表 `EMP1` 和 `DEP1` 来演示这一点（见图6-2和图6-3）。如果我们将 `EMP1` 代入 `T1`，`DEP1` 代入 `T2`，`{deptno}`
    代入 `A`，我们最终得到以下表达式：


    ```

    { t1↓{deptno} | t1∈EMP1 } ⊆ { t2↓{deptno} | t2∈DEP1 }

    ```


    这将计算为以下表达式：


    ```

    { {(deptno;10)}, {(deptno;12)} } ⊆

    { {(deptno;10)}, {(deptno;11)}, {(deptno;12)}, {(deptno;13)} }

    ```


    这是一个真命题；`EMP1` 中的每个部门编号也出现在 `DEP1` 中。


    如果 `A` 的基数等于1（即 `A` 表示一个单元素集），那么我们通常使用函数应用而不是函数限制来指定子集要求谓词。


    使用前面的例子，我们会这样写：


    ```

    { t1(deptno) | t1∈EMP1 } ⊆ { t2(deptno) | t2∈DEP1 }

    ```


    这个子集要求类似于列表6-8中的谓词 `P13`。


    子集要求谓词通常伴随着一个唯一标识谓词。


    使用定义6-2中的名称，您经常会遇到“`A` 在 `T2` 中是唯一标识的；”在上面的例子中 `{deptno}` 确实在 `DEP1` 中是唯一标识的。这不是强制性的；第7章中将给出的示例数据库设计实际上有一个子集要求，其中伴随的唯一标识谓词是缺失的。


    当使用函数限制来指定子集要求时，有时必须应用函数组合来重命名所涉及的一个表中的一个或多个属性。


    让我们通过一个例子来说明这一点。看一下图6-5中显示的表 `DEP2`，它与表 `DEP1` 非常相似。


    ### 图6-5：示例表 DEP2

    表 `DEP2` 与表 `DEP1` 的区别在于，用于保存部门编号的属性现在命名为 `dno` 而不是 `deptno`。您可以使用函数应用来表达从 `EMP1`（见图6-2）到
    `DEP2` 的子集要求，如下所示：


    ```

    { e(deptno) | e∈EMP1 } ⊆ { d(dno) | d∈DEP2 }

    ```


    但是，如果您想使用函数限制来指定此子集要求，则必须首先将表 `EMP1` 中的 `deptno` 属性重命名为 `dno`，或者将表 `DEP2` 中的 `dno`
    属性重命名为 `deptno`。以下是此子集要求的规范，其中属性重命名应用于 `EMP1` 元组：


    ```

    { e◊{(dno;deptno)} | e∈EMP1 } ⊆ { d↓{dno} | d∈DEP2 }

    ```


    在此表达式中，函数 `{(dno;deptno)}` 表示一个属性重命名函数。它将表 `EMP1` 中的元组的 `deptno` 属性重命名为 `dno`。


    > **注意**：在这种情况下，重命名函数也执行了元组限制（参见第4章“函数组合”一节中的注释）。'
  raw: 'We’ve mentioned before that every tuple that is an element of a given table
    is unique within that table. The attribute *values* make a tuple unique inside
    a table, not its attributes. Often it doesn’t take all attribute values to identify
    a tuple uniquely in a table; a proper subset of the attribute values suffices.
    The way this property can be stated for a certain table is through a special kind
    of table predicate called a *unique identification* predicate. A unique identification
    predicate is a table predicate as defined in Definition 6-1.


    7451CH06.qxd 5/14/07 10:37 AM Page 128


    **128**


    C H A P T E R 6 **■** T U P L E , TA B L E , A N D D ATA B A S E P R E D I C AT
    E S


    **■Definition 6-1: Unique Identification Predicate** Let T be a table and let
    A be a given non-empty subset of the heading of T. A table predicate is a unique
    identification predicate if it is of the following form (or can be rewritten into
    this form):


    ( ∀t1,t2∈T: t1↓A=t2↓A ⇒ t1=t2 )


    We say that *A is uniquely identifying in T*.


    A unique identification predicate states that if any two tuples in a table have
    the same attribute values on a given subset of the attributes, then they must
    be the same tuple. Using rewrite rules introduced in Part 1 of this book, you
    can also express a unique identification predicate in the forms listed in Listing
    6-9.


    **Listing 6-9.** *Other Manifestations of Unique Identification Predicates* (
    ∀t1,t2∈T: t1≠t2 ⇒ t1↓A≠t2↓A )


    ( ∀t1,t2∈T: t1=t2 ∨ t1↓A≠t2↓A )


    ¬( ∃t1,t2∈T: t1≠t2 ∧ t1↓A=t2↓A )


    The first form listed might be a more intuitive formal version of the unique identification
    predicate; two different tuples in a table must differ on the given subset of
    attributes. Predicate P12 in Listing 6-7 was written in this form; it states that
    {dname,loc} is uniquely identifying in table T. Predicate P11 in the same listing
    is also a unique identification predicate. It is written in the third form displayed
    in Listing 6-9 and states that {deptno} is uniquely identifying in table T. The
    first predicate in Listing 6-3 also uses this form.


    Given that a set A is uniquely identifying in table T (with heading H), then every
    subset of H


    that is a proper *superset* of A is of course also uniquely identifying in table
    T. In a unique identification predicate, you want to specify an *irreducible*
    subset A of heading H that is uniquely identifying in table T.


    **■Note** There can be more than one such irreducible subset of H that is uniquely
    identifying in a table.


    Listing 6-7 shows two distinct subsets—{deptno} and {dname,loc}—that are both
    considered to be uniquely identifying in a department table.


    If you choose a reducible subset of H, then the resulting unique identification
    predicate is too weak. The weakest unique identification predicate would be that
    the heading of T (the largest possible superset) is uniquely identifying in table
    T. In fact, this wouldn’t add any constraint at all on the set of tuples that
    is admissible for table T; as mentioned at the beginning of this section, we already
    know that tuples are unique within a table.


    You can also conclude this by taking a more formal approach. Take a look what
    happens if you substitute the heading of T for set A in the unique identification
    predicate pattern: ( ∀t1,t2∈T: t1↓dom(t1)=t2↓dom(t2) ⇒ t1=t2 )


    7451CH06.qxd 5/14/07 10:37 AM Page 129


    C H A P T E R 6 **■** T U P L E , TA B L E , A N D D ATA B A S E P R E D I C AT
    E S


    **129**


    Note that if t is an element of T, then you can refer to the heading of T via
    expression dom(t): the domain of tuple t. Using the rewrite rule t↓dom(t) = t
    (the restriction of a tuple to all its attributes is the same as the tuple itself
    ), we can rewrite the preceding predicate into this:


    ( ∀t1,t2∈T: t1=t2 ⇒ t1=t2 )


    The predicate is now a tautology; it is always TRUE, irrespective of the value
    of T. Therefore it doesn’t constrain T in any way at all.


    **■Note** We are deliberately not talking about *keys* in this section. In Chapter
    7 we will define, for every table structure in a database design, the set of admissible
    tables—referred to as *the table universe*—for that table structure. When defining
    a table universe, we will ensure that every table (in the universe) satisfies
    one or more unique identification predicates. We then say that a set of uniquely
    identifying attributes constitutes a *key* in the table universe.


    **Subset Requirement Predicate**


    The different table structures that you capture in a database design are not all
    independent of each other. Many *pairs* of these table structures have a relationship
    that is referred to as a *subset requirement*. Definition 6-2 defines the concept
    of a subset requirement predicate. The structure of the predicate in this definition
    shows why it is referred to as a subset requirement.


    **■Definition 6-2: Subset Requirement Predicate** Let T1 and T2 be tables and
    let A be a given subset of the heading of T1 as well as a subset of the heading
    of T2\. We refer to a database predicate as a subset requirement predicate if
    it is of the following form:


    { t1↓A | t1∈T1 } ⊆ { t2↓A | t2∈T2 }


    We say that *A in T1 references A in T2*.


    Let’s demonstrate this with tables EMP1 and DEP1 (see Figures 6-2 and 6-3). If
    we substitute EMP1 for T1, DEP1 for T2, and {deptno} for A, we end up with the
    following expression:


    { t1↓{deptno} | t1∈EMP1 } ⊆ { t2↓{deptno} | t2∈DEP1 }


    This evaluates to the following expression:


    { {(deptno;10)}, {(deptno;12)} } ⊆


    { {(deptno;10)}, {(deptno;11)}, {(deptno;12)}, {(deptno;13)} }


    This is a TRUE proposition; every department number in EMP1 also appears in DEP1.


    7451CH06.qxd 5/14/07 10:37 AM Page 130


    **130**


    C H A P T E R 6 **■** T U P L E , TA B L E , A N D D ATA B A S E P R E D I C AT
    E S


    If the cardinality of A equals 1 (that is, if A represents a singleton), then
    we will often use function application instead of function limitation to specify
    a subset requirement predicate.


    Using the preceding example, we would write this:


    { t1(deptno) | t1∈EMP1 } ⊆ { t2(deptno) | t2∈DEP1 }


    This subset requirement is analogous to predicate P13 in Listing 6-8.


    A subset requirement predicate is often accompanied by a unique identification
    predicate.


    Using the names from Definition 6-2, you’ll often encounter that “A is uniquely
    identifying in T2;” in the preceding example {deptno} is indeed uniquely identifying
    in DEP1\. This is not mandatory; the example database design that will be given
    in Chapter 7 actually has a subset requirement where the accompanying unique identification
    predicate is absent.


    When using function limitation to specify a subset requirement, you must sometimes
    apply function composition to rename one or more attributes in one of the tables
    involved.


    Let’s illustrate this through an example. Take a look at table DEP2, displayed
    in Figure 6-5, which very much resembles table DEP1.


    **Figure 6-5.** *Example table DEP2*


    Table DEP2 differs from table DEP1 in that the attribute used to hold the department
    number is now named dno instead of deptno. You can express a subset requirement
    from EMP1 (see Figure 6-2) to DEP2 using function application, as follows:


    { e(deptno)| e∈EMP1 } ⊆ { d(dno)| d∈DEP2 }


    However, if you want to specify this subset requirement using function limitation,
    you must first either rename the deptno attribute in table EMP1 into dno, or rename
    the dno attribute in table DEP2 into deptno. Here is the specification for this
    subset requirement, where the attribute renaming is applied to EMP1 tuples:


    { e◊{(dno;deptno)} | e∈EMP1 } ⊆ { d↓{dno}| d∈DEP2 }


    In this expression, the function {(dno;deptno)} represents an attribute renaming
    function. It renames the deptno attribute in tuples from table EMP1 to dno.


    **■Note** In this case the renaming function performs a tuple limitation too (see
    the note in the section


    “Function Composition” in Chapter 4).


    7451CH06.qxd 5/14/07 10:37 AM Page 131'
