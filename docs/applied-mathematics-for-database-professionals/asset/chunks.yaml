    C H A P T E R 2


    Set Theory: Introduction


    **T**his chapter is about set theory. Set theory provides an excellent language
    to reliably describe complex database designs, data retrieval, and data manipulation.
    Set theory is reliable because it is both precise and powerful; this will become
    clear from Chapter 5 onwards.


    As explained before, you’ll need to exercise some patience: Chapters 1 through
    4 first lay down the foundation.


    In the section “Sets and Elements,” the concepts of a *set* and an *element* of
    a set are introduced. In the section “Methods to Specify Sets,” you’ll see how
    you can specify sets using the *enumerative*, *predicative*, or *substitutive*
    method.


    You probably remember your math teacher drawing pictures on the blackboard while
    explaining sets; the third section introduces these so-called *Venn diagrams*.
    Venn diagrams can be useful as graphical illustrations when you’re working with
    multiple sets. However, note that Venn diagrams are “just” pictures, just like
    the well-known entity-relationship diagrams are pictures that you can draw for
    database designs. They are often imprecise, they always leave out important details,
    and they can even be “misleading by suggestion.” Nevertheless, when used with
    caution, they can be quite helpful.


    The section “Cardinality and Singleton Sets” discusses the *cardinality* of a
    set and introduces the concept of a *singleton* set.


    Then we’ll discuss *subsets* and their most important properties in the section
    “Subsets,”


    followed by the well-known set operators *union*, *intersection*, and ( *symmetric*)
    *difference* in the section “Union, Intersection, and Difference.” In the same
    section we’ll explore *disjoint* sets—


    that is, sets with an empty intersection.


    The section “Powersets and Partitions” introduces two slightly more advanced set
    theory concepts: *powersets* and *partitions*. These two concepts are quite useful
    in database modeling, as you’ll see in later chapters.


    *Ordered pairs* (x;y) have a first coordinate x and a second coordinate y. In
    the section


    “Ordered Pairs and Cartesian Product,” we’ll explore sets of ordered pairs and
    the *Cartesian* *product* of two sets. As you’ll find out in Chapter 4, we’ll
    use sets of ordered pairs to define (binary) relations and functions, which in
    turn will be used to define tables and databases—


    so we’re getting closer and closer to the application of the mathematics.


    The section “Sum Operator” introduces the sum operator.


    **■Note** You should be familiar with logic, as explained in the previous chapter.
    In the treatment of set theory, we’ll frequently use logic connectives to define
    the various set-theory concepts.


