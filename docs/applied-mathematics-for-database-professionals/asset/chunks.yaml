  trans: '# 第 1 章 逻辑学：导论


    ## 特殊的谓词类别


    有两个谓词类别值得拥有一个专门的名称：重言式和矛盾式。


    ### 重言式与矛盾式


    一个*重言式*是一种命题形式，对于命题变量的真值所有可能的组合，它都为真。一个*矛盾式*是一种命题形式，无论命题变量碰巧取什么真值，它都为假。重言式的示例如下：


    `x = 42 ∨ x ≠ 42`

    `10 = 10`

    `P ∨ TRUE`

    `P ⇒ ( P ∨ Q )`


    第一个例子阐释了逻辑学中被称为“*排中律*”（*Tertium non datur*）的原理。第二个例子相当明显。第三个例子无论 `P` 的真值是什么都为真。你可以使用真值表来证明最后一个重言式，如表
    1-11 所示。


    **表 1-11.** *使用真值表证明一个重言式*


    如你所见，表 1-11 的最后一列只包含真（TRUE）；这意味着，无论变量 `P` 和 `Q` 的个别真值如何，相应列标题中的谓词 `P ⇒ ( P ∨ Q
    )` 总是为真，因此是一个*重言式*。表 1-10（用与非表达非连接词）也展示了一个重言式的例子。


    类似地，一个命题形式如果总是求值为假，而不管其组成部分的个别真值如何，则它是一个*矛盾式*。下列表达式是一个矛盾式：


    `( P ∨ Q ) ∧ ( ( ¬P ) ∧ (¬Q ) )`


    如果你为这个谓词建立一个真值表，你最终只会在相应的列中得到假（FALSE）。你是否认为这个表达式是矛盾式是显而易见的？也许这个例子会让你体会到，能够对逻辑表达式进行纯粹的形式分析，而不考虑所涉及的变量
    `P` 和 `Q` 代表什么，是何等重要。


    ### 假言推理与拒取式


    *假言推理*（拉丁语：*肯定前件式*）和*拒取式*（拉丁语：*否定后件式*）可能是逻辑中最著名的重言式例子。在常规文本中，它们分别表述如下：


    -   如果 `P` 蕴含 `Q` 且 `P` 为真，那么 `Q` 必须为真。

    -   如果 `P` 蕴含 `Q` 且 `Q` 为假，那么 `P` 必须为假。


    你也可以使用逻辑运算符符号来表达这两个重言式：

    `( ( P ⇒ Q ) ∧ P ) ) ⇒ Q`

    `( ( P ⇒ Q ) ∧ ( ¬Q ) ) ⇒ ¬P`


    假言推理代表了日常推理最直接的形式；因此它也被称为*直接推理*。拒取式也被称为*间接推理*，这是一种远不那么熟悉的推理形式。看下面的例子。


    令 `P` 代表谓词“员工 `e` 是经理”，令 `Q` 代表“员工 `e` 的月薪超过 1 万”。进一步假设你工作的公司有如下业务规则：“经理的薪水总是超过
    1 万”，或者用符号表示为，`P ⇒ Q`。


    间接推理允许你推断：如果你的月薪没有超过 1 万，那么你就不是经理。


    ### 逻辑等价与重写规则


    事实证明，本章介绍的五种逻辑连接词的集合是真值函数完备的。实际上，仅包含 `与`、`或` 和 `非` 这三个连接词的子集也是真值函数完备的（我们将在第 3
    章讨论析取范式时再回到这一点）。这意味着你不需要另外两个连接词——蕴含和等价——因为你可以用 `非`、`与` 和 `或` 来表达它们：`( P ⇒ Q )`
    可以表示为 `( ¬P ) ∨ Q`


    `( P ⇔ Q )` 可以表示为 `( P ∧ Q ) ∨ ( ¬P ∧ ¬Q )`


    我们将在“逻辑等价与重写规则”一节中研究（并证明）像前面这样的*等价*。尽管连接词集合 `{与, 或, 非}` 确实足以方便地表示所有可能的复合谓词，但你甚至可以用*单个*逻辑连接词达到相同的目标：`与非`
    运算符（not and），也称为谢弗竖线，通常用竖线表示，如表 1-9 所定义。如你所见，`与非` 连接词仅当两个操作数都为真时返回假，在所有其他情况下返回真。


    **表 1-9.** *与非连接词 (|) 的真值表*


    请注意，这纯粹是一个理论练习，探索我们游戏的边界；尽管你确实可以使用这个单一的 `与非` 连接词重写所有可能的逻辑表达式，但你的表达式会变得更长且更难阅读。


    表 1-10 展示了如何通过使用同一个命题变量（`P`）作为 `与非` 连接词的左右操作数，用 `与非` 来表达 `非`。


    **表 1-10.** *用与非连接词表达非*


    表 1-10 的最后一列显示，无论 `P` 的真值如何，`¬P` 在逻辑上总是等价于 `P|P`。关于你也可以用 `与非` 来表示 `与` 和 `或` 的证明，留作本章末尾的练习。


    每一本逻辑科学教科书最终都会介绍前面提到的五个运算符，其主要原因在于这门特定科学的起源：“关于语言和言语”或“人类推理”。如果你研究自然语言，你会发现这里介绍的五个运算符是我们（人类）在推理时所使用的。


    **注意** 甚至不要去想象与一个外星物种交流会是什么样子，它们的语言（推理部分）可能只基于 `与非` 运算符。:-)


    表 1-8 展示了逻辑等价连接词的真值表。逻辑等价值得我们特别关注，因为它们极其重要，原因有很多。逻辑等价最重要的应用是，你可以用它们从现有的谓词推导出新的等价谓词；因此，它们为使用真值表提供了一种替代方案，正如你将在本节中看到的那样。它们对于以不同方式指定数据完整性约束尤为重要；在本书的第
    2 部分你会看到很多这方面的内容。


    为复杂的谓词建立真值表可能变得相当耗费人力。例如，如果你想要检查的谓词包含四个命题变量（比如 `P`、`Q`、`R` 和 `S`），你需要建立一个有十六行的真值表，以反映所有可能的真值组合。你可能会想用电子表格在输入第一行后有效地填充这样的真值表，但你会发现使用（某种特定的）逻辑等价可以高效得多。


    ### 重写规则


    一条*重写规则*是一条规则，它允许我们将给定的命题形式 `X` 替换为另一个命题形式 `Y`，其方式保证无论命题变量的值如何，`X` 和 `Y` 都具有相同的真值。当且仅当等价式
    `X ⇔ Y` 是一个重言式时，这种替换才是允许的。这个等价式被称为重写规则。


    你已经在“函数完备性”一节中遇到了一个作为重言式的等价式。它展示了如何用析取和否定的组合来表达蕴含：


    `( P ⇒ Q ) ⇔ ( ¬P ) ∨ Q`


    表 1-12 所示的真值表证明了该等价式确实是一个重言式。'
