    the alternative way: as predicates with parameters of type table.


    **Listing 8-7.** *State Transition Universe ST_UEX*


    ST_UEX := { (b;e) | b∈DB_UEX ∧ e∈DB_UEX ∧


    ∧ STC1(b(EMP),e(EMP))


    ∧ STC2(b(OFFR),e(OFFR))


    ∧ STC3(b(OFFR),e(OFFR))


    ∧ STC4(b(HIST),e(HIST))


    ∧ STC5(b(HIST),b(EMP),e(HIST),e(EMP))


    ∧ STC6(b(REG),e(REG))


    ∧ STC7(b(REG),e(REG)) }


    State transition constraint STC1 involves the employee table structure. Constraints
    STC2


    and STC3 involve the offering table structure. Constraint STC4 involves the history
    table structure. Constraint STC5 involves two table structures: history and employee.
    Finally, constraints STC6 and STC7 involve the registration table structure.


    Listing 8-8 supplies the formal definitions for these seven state transition constraints.


    You’ll find an elaboration on each of these in the following section.


    **■Note** Often, state transition constraints inspect more than just the begin
    and end state of a transaction.


