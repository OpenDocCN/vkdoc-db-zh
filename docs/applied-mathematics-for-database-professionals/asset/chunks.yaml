- fmt: "# Implementing Attribute Constraints\n\n**Note** In our example, the user\
    \ doesn’t always want to supply a value for `COMMENTS` when an employee has been\
    \ terminated. Oracle doesn’t allow an empty string in a mandatory column. To prevent\
    \ the users from entering some random varchar value in these cases (for instance,\
    \ a space), this column has been made optional (sometimes called nullable), meaning\
    \ that `NULL`s are allowed to appear in this column.\n\n**Listing 11-9. Create\
    \ Table for HIST Table Structure**\n```sql\ncreate table hist\n( empno number(4,0)\
    \ not null\n, until date not null\n, deptno number(2,0) not null\n, msal number(7,2)\
    \ not null);\n```\n\n**Listing 11-10. Create Table for DEPT Table Structure**\n\
    ```sql\ncreate table dept\n( deptno number(2,0) not null\n, dname varchar(12)\
    \ not null\n, loc varchar(14) not null\n, mgr number(4,0) not null);\n```\n\n\
    **Listing 11-11. Create Table for CRS Table Structure**\n```sql\ncreate table\
    \ crs\n( code varchar(6) not null\n, descr varchar(40) not null\n, cat varchar(3)\
    \ not null\n, dur number(2,0) not null);\n```\n\n**Listing 11-12. Create Table\
    \ for OFFR Table Structure**\n```sql\ncreate table offr\n( course varchar(6) not\
    \ null\n, starts date not null\n, status varchar(4) not null\n, maxcap number(2,0)\
    \ not null\n, trainer number(4,0)\n, loc varchar(14) not null);\n```\n\n**Note**\
    \ For reasons we’ll discuss in the section “Implementing Database Constraints,”\
    \ the `TRAINER` attribute has been defined as nullable; we’ll use `NULL` instead\
    \ of the special value `-1` that was introduced in this attribute’s attribute-value\
    \ set.\n\n**Listing 11-13. Create Table for REG Table Structure**\n```sql\ncreate\
    \ table reg\n( stud number(4,0) not null\n, course varchar(6) not null\n, starts\
    \ date not null\n, eval number(1,0) not null);\n```\n\nIn the relational model\
    \ of data, all attributes in a database design are mandatory. Therefore, you can\
    \ consider it a disappointment that in the SQL standard by default a column is\
    \ nullable; SQL requires us to add `not null` explicitly alongside every column\
    \ to make it mandatory.\n\nThe next section deals with the aforementioned “narrowing\
    \ down” of the built-in data types that were used in the `create table` statements.\n\
    \n## Implementing Attribute Constraints\n\nWe now revisit the matter with regards\
    \ to the term attribute constraints (mentioned in the section “Classification\
    \ Schema for Constraints” in Chapter 7).\n\nFormally, a characterization just\
    \ attaches attribute-value sets to attributes. Attaching an attribute-value set\
    \ to an attribute can be considered an attribute constraint. However, in practice\
    \ you implement database designs in SQL DBMSes that are notorious for their poor\
    \ support of user-defined types. User-defined types would have been ideal for\
    \ implementing attribute-value sets. However, as discussed in the section “Implementing\
    \ Table Structures,” you can’t use them to do so. Instead, you must use an appropriate\
    \ superset (some built-in data type, as shown in the previous section) as the\
    \ attribute-value set of a given attribute. Luckily you can use declarative SQL\
    \ `check` constraints to narrow down these supersets to exactly the attribute-value\
    \ set that was specified in the characterizations. During implementation, we refer\
    \ to these declarative `check` constraints as the attribute constraints of an\
    \ attribute.\n\nAll attribute constraints can—and, given our preference in strategies,\
    \ *should*—be stated as declarative `check` constraints. You can declare these\
    \ constraints using the `alter table add constraint` statement.\n\nListing 11-14\
    \ shows the declaration of six `check` constraints that are required to declaratively\
    \ implement the attribute-value sets for the `EMP` table structure as defined\
    \ in the definition of `chr_EMP` in Listing 7-2. We’ll discuss each of these after\
    \ the listing.\n\n**Listing 11-14. Attribute Constraints for EMP Table Structure**\n\
    ```sql\nalter table EMP add constraint emp_chk_empno check (empno > 999);\nalter\
    \ table EMP add constraint emp_chk_job\n    check (job in ('PRESIDENT','MANAGER','SALESREP'\n\
    \                  ,'TRAINER','ADMIN' ));\nalter table EMP add constraint emp_chk_brn\
    \ check (trunc(born) = born);\nalter table EMP add constraint emp_chk_hrd check\
    \ (trunc(hired) = hired);\nalter table EMP add constraint emp_chk_msal check (msal\
    \ > 0);\nalter table EMP add constraint emp_chk_usrnm check (upper(username) =\
    \ username);\n```\n\nAs you can see from this listing, all `check` constraints\
    \ are given a name. The name for the first one is `emp_chk_empno`. It narrows\
    \ down the declared data type for the `empno` column, `number(4,0)`, to just numbers\
    \ consisting of four digits (greater than `999`).\n\nOnce this constraint is declared\
    \ and stored in the data dictionary of Oracle’s SQL DBMS, the DBMS will run the\
    \ necessary DI code whenever a new `EMPNO` value appears in `EMP` (through an\
    \ `INSERT` statement), or an existing `EMPNO` value in `EMP` is changed (through\
    \ an `UPDATE` statement). The DBMS will use the constraint name in the error message\
    \ that you receive, informing you whenever an attempt is made to store an `EMPNO`\
    \ value in `EMP` that does not satisfy this constraint.\n\nConstraint `emp_chk_job`\
    \ (the second one in the preceding listing) ensures that only the five listed\
    \ values are allowed as a value for the `JOB` column.\n\nConstraints `emp_chk_brn`\
    \ and `emp_chk_hrd` ensure that a date value (which in the case of Oracle’s SQL\
    \ DBMS always holds a time component too) is only allowed as a value for the `BORN`\
    \ or `HIRED` columns, if its time component is truncated (that is, set to `0:00`\
    \ midnight).\n\nConstraint `emp_chk_msal` ensures that only positive numbers—within\
    \ the `number(7,2)` superset—are allowed as values for the `MSAL` column.\n\n\
    Finally, constraint `emp_chk_usrnm` ensures that values for the `USERNAME` column\
    \ are always in uppercase.\n\nListings 11-15 through 11-23 supply the attribute\
