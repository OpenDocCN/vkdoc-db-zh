    ## 函数的定义域与值域'
- fmt: "# 关于函数域与范围的介绍\n\n函数 `F` 所有第一坐标的集合称为该函数的**定义域**；其表示法为 `dom(F)`。函数所有第二坐标的集合称为该函数的**值域**；其表示法为\
    \ `rng(F)`。这两个概念相当简单：要找到一个函数的定义域或值域，只需枚举该函数所有有序对的第一或第二坐标即可。\n\n## 示例函数的定义域与值域\n\
    \n**列表 4-2. 示例函数的定义域**\n\n```\ndom(F2) = dom(F3) = {X,Y,Z}\ndom(F4) = {Z}\ndom(F5)\
    \ = ∅\ndom(F6) = {empno,ename,born}\n```\n\n**列表 4-3. 示例函数的值域**\n\n```\nrng(F2)\
    \ = {1,2}\nrng(F3) = {1}\nrng(F4) = {2}\nrng(F5) = ∅\nrng(F6) = {126,'Lex de Haan','11-aug-1954'}\n\
    ```\n\n## 从图示确定定义域与值域\n\n从函数的图示中，通过省略那些没有箭头发出或到达的元素，你可以确定其定义域和值域。图 4-2 展示了一个从集合\
    \ `A := {A,B,C,D,E}` 到集合 `B := {1,2,3,4,5}` 的二元关系 `F7`。如你所见，它直接表示一个函数（集合 `A` 的元素最多只有一个箭头发出），且\
    \ `dom(F7) = {A,C,D,E}` 以及 `rng(F7) = {2,4}`。\n\n**图 4-2. 从集合 A 到集合 B 的二元关系 F7**\n\
    \n## 函数的定义\n\n如果满足以下两个性质，我们定义函数 `F` 是**在**集合 `A` **上**并**映射到**集合 `B` **内**的：\n\
    *   `dom(F) = A`\n*   `rng(F) ⊆ B`\n\n因为 `F` 是在 `A` 上映射到 `B` 内的函数，根据定义，所有第一坐标的集合——即\
    \ `F` 的定义域——等于 `A`。并且因为在一个在 `A` 上映射到 `B` 内的函数中，每个有序对都以 `B` 的一个元素作为第二坐标，所以 `F`\
    \ 的值域将是集合 `B` 的一个子集；通常它会是 `B` 的一个真子集。\n\n**注意** 你可能已经注意到，这里引入的集合论中“定义域”的概念与“域”一词在其他数据库教科书中的常见含义大不相同。在其他教科书中，一个“域”通常代表一个“表”中“列”的可能值集合——或者如果你愿意，可以说是它的类型。在本书中，有一个类似的概念对应于“域”的这个含义（我们将其称为**属性值集**），它将在“集合函数”一节中被精确定义。\n\
    \n## 函数应用\n\n给定一个函数永远不会有两个具有相同第一坐标的有序对，你可以明确地确定与函数的一个给定定义域元素配对的每一个值域元素（记住，从每个定义域元素恰好有一个箭头发出）。数学家有一种特殊的方式来表示一个给定定义域元素的单个值域元素。如果\
    \ `F` 是一个函数且 `x` 是 `dom(F)` 的一个元素，那么 `F(x)`（读作“F of x”或“F applied to x”）表示在函数\
    \ `F` 中与 `x` 配对的值域元素。这种表示法称为**函数应用**。我们将使用图 4-2 引入的函数 `F7` 来说明这一点。以下是 `F7` 的形式化规范：\n\
    \n```\nF7 := { (A;2), (C;2), (D;4), (E;4) }\n```\n\n指定函数 `F7` 的另一种有效方法是使用函数应用表示法；只需为每个定义域元素指定其值域元素是什么：\n\
    ```\nF7(A) = 2\nF7(C) = 2\nF7(D) = 4\nF7(E) = 4\n```\n\n你可能从过去的数学课上已经熟悉了这种表示法。这里是一个典型函数\
    \ `F` 的规范示例：`F(x) := 3x2 - 2x + 1`\n\n给定函数 `F`，你会写像 `F(2)` 这样的表达式，在这个例子中它的求值结果为\
    \ 9（三乘以四，减去二乘以二，加上一）。\n\n同一个函数 `F` 的集合论规范如下（假设我们想在集合 **Z** 上定义此函数并映射到集合 **Z**\
    \ 内）：\n```\nF := { (x; 3x2 - 2x + 1) | x∈Z }\n```\n\n这里我们使用了代入法以集合论的方式指定函数 `F`。\n\
    \n## 恒等函数\n\n如果集合 `A` 是函数 `f` 的定义域，并且对于集合 `A` 中的所有元素 `x`，`f` 的 `x` 都等于 `x`，则函数\
    \ `f` 称为**在 `A` 上的恒等函数**。我们使用记法 `id(A)` 来表示在 `A` 上的恒等函数。\n\n这里有几个例子：\n```\nid({1,2,3})\
    \ = { (1;1), (2;2), (3;3) }\nid({deptno}) = { (deptno;deptno) }\nid({course,startdate})\
    \ = { (course;course), (startdate;startdate) }\n```\n\n## 函数的子集\n\n在本节中，我们将简要研究函数的子集。因为函数是一个集合，所以你可以构造一个函数的子集。列表\
    \ 4-4 提供了前一节介绍的函数 `F2 := { (X;2), (Y;1), (Z;2) }` 的每一个（真）子集。\n\n**列表 4-4. 函数 F2\
    \ 的所有真子集**\n\n```\n{ (X;2), (Y;1) }\n{ (X;2), (Z;2) }\n{ (Y;1), (Z;2) }\n{ (X;2)\
    \ }\n{ (Y;1) }\n{ (Z;2) }\n∅\n```\n\n如你所见，`F2` 的每一个真子集本身又是一个函数。确实，这对于每个函数都成立。对于一个给定的函数\
    \ `F`，`F` 的每一个真子集也将是一个函数。\n\n## 小结\n\n至此，集合论函数的介绍结束。因为函数是一个重要的概念，将在本书的其余部分被广泛使用，我们在此做一个简要总结。\n\
    *   函数是一个二元关系，因此是一个**有序对的集合**。\n*   在函数中，**每个第一坐标只出现一次**。\n*   你可以使用一个函数来指定数据库设计的某个部分。\n\
    \n本章的标题被特意选为“关系与函数”，因为我们认为你应该被介绍给（至少是）二元关系的数学概念。\n\n`n-元`关系（即不仅仅是二元关系）这一更一般的概念是由\
    \ E. F. Codd 引入数据库领域的一个基石概念。二元关系的概念足以满足本书中将发展的用于指定数据库设计的数学方法的需要。其他教科书处理——并在其方法中使用——`n-元`关系的概念。它们也以不同于本书处理二元关系特例（即函数）的方式来使用\
    \ `n-元`关系。为了避免混淆，本书从现在开始将明确不再使用*二元关系*或*关系*这些术语。\n\n## 函数上的操作\n\n因为函数是集合，所以你可以应用集合运算符——并集、交集和差集——以函数作为其操作数。本节将探讨这些集合运算符在函数上的应用。\n\
    \n### 并集、交集与差集\n\n数学家总是对运算符的**闭包性质**感兴趣。在本章的上下文中，我们问自己：在集合上封闭的并集、交集和差集运算符，在函数上是否也是封闭的？换句话说，当你对两个函数应用这些运算符时，结果是否仍然是另一个函数？\n\
    \n看下面的例子，它引入了两个函数 `G1` 和 `G2`，并展示了这两个函数的并集的结果：\n```\nG1 := { (a;1), (b;2), (c;3)\
    \ }\nG2 := { (a;2), (d;4) }\nG1 ∪ G2 = { (a;1), (b;2), (c;3), (a;2), (d;4) }\n\
    ```\n\n这个例子说明了两个函数的并集不一定产生一个函数，因为函数 `G1` 和 `G2` 并集的结果包含了两个具有相同第一坐标的**不同**有序对：`(a;1)`\
    \ 和 `(a;2)`。\n\n再看另一个例子：\n```\nG3 := { (empno;999), (ename;'Toon Koppelaars'),\
    \ (born;'14-feb-1965') }\nG4 := { (empno;999), (occupation;'IT architect') }\n\
    G3∪G4 = { (empno;999), (ename;'Toon Koppelaars'),\n           (born;'14-feb-1965'),\
    \ (occupation;'IT architect') }\n```"
  raw: 'The set of all first coordinates of a function, say F, is called the *domain*
    of that function; the notation is dom(F). The set of all second coordinates of
    a function is called the *range* of that function; the notation is rng(F). These
    two concepts are rather trivial; to find the domain or range of a function you
    simply enumerate all first or second coordinates of the ordered pairs


    7451CH04.qxd 5/4/07 2:43 PM Page 72


    **72**


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    of that function. Listing 4-2 lists the domains of the five functions F2 through
    F6 introduced in the preceding section.


    **Listing 4-2.** *Domains of the Example Functions*


    dom(F2) = dom(F3) = {X,Y,Z}


    dom(F4) = {Z}


    dom(F5) = ∅


    dom(F6) = {empno,ename,born}


    Listing 4-3 gives the ranges of these five functions.


    **Listing 4-3.** *Ranges of the Example Functions*


    rng(F2) = {1,2}


    rng(F3) = {1}


    rng(F4) = {2}


    rng(F5) = ∅


    rng(F6) = {126,''Lex de Haan'',''11-aug-1954''}


    From a picture of a function, you can determine the domain and range by leaving
    out the elements that have no arrows departing from or arriving in them. Figure
    4-2 shows a binary relation F7 from a set A := {A,B,C,D,E} to a set B := {1,2,3,4,5}.
    As you can see, it straightforwardly represents a function (at most one arrow
    departs from the elements of set A) and dom(F7) = {A,C,D,E} and rng(F7) = {2,4}.


    **Figure 4-2.** *Binary relation F7 from set A to set B*


    We define a function to be *over* a set A and *into* a set B, if the following
    two properties hold:


    • dom(F) = A


    • rng(F) ⊆ B


    7451CH04.qxd 5/4/07 2:43 PM Page 73


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    **73**


    Because F is a function over A into B, by definition the set of all first coordinates—the
    domain of F—is equal to A. And because every ordered pair in a function over A
    into B has an element of B as its second coordinate, the range of F will be a
    subset of set B; often it will be a proper subset of B.


    **■Note** You probably have noticed that the set-theory concept of a *domain*
    introduced here is quite different from the usual meaning of the word “domain”
    in other database textbooks. In other textbooks, a domain usually represents the
    set of possible values—or if you will, the type—of a “column” in a “table.” In
    this book, there’s a similar concept for that meaning of the word domain (we’ll
    call this an *attribute value set*) that will be precisely defined in the section
    “Set Functions.”


    Given that a function never has two pairs with the same first coordinate, you
    can unambiguously determine the range element that is paired to a given domain
    element of a function (remember from every domain element exactly one arrow is
    departing). Mathematicians have a special way of denoting that single range element
    for a given domain element. If F is a function and x is an element of dom(F),
    then F(x) (pronounce it as “F of x,” or “F applied to x”) denotes the range element
    that is paired to x in function F. This notation is called *function* *application*.
    We’ll illustrate this using function F7 introduced in Figure 4-2\. Following is
    the formal specification of F7:


    F7 := { (A;2), (C;2), (D;4), (E;4) }


    Another valid way of specifying function F7 is by using the function application
    notation; just specify for each domain element what its range element is: F7(A)
    = 2


    F7(C) = 2


    F7(D) = 4


    F7(E) = 4


    You might already be familiar with this notation from your mathematics classes
    in the past. Here’s a typical example specification for some function F: F(x)
    := 3x2 - 2x + 1


    Given function F, you’d write expressions such as F(2), which would in this case
    evaluate to 9 (three times four, minus two times two, plus one).


    The set-theory specification of the same function F would be as follows (assuming
    we want to specify this function over set **Z** into set **Z**): F := { (x; 3x2
    - 2x + 1) | x∈**Z** }


    Here we’ve used the substitutive method to specify function F in a set-theory
    way.


    7451CH04.qxd 5/4/07 2:43 PM Page 74


    **74**


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    **Identity Function**


    A function f is called the *identity function over A* if A is the domain of f,
    and for all elements x in set A, f of x equals x. We use the notation id(A) to
    represent the identity function over A.


    Here are a few examples:


    id({1,2,3}) = { (1;1), (2;2), (3;3) }


    id({deptno}) = { (deptno;deptno) }


    id({course,startdate}) = { (course;course), (startdate;startdate) }


    **Subset of a Function**


    In this section, we’ll briefly investigate subsets of a function. Because a function
    is a set, you can construct a subset of a function. Listing 4-4 provides every
    (proper) subset of the function F2 := { (X;2), (Y;1), (Z;2) } that was introduced
    in the preceding section.


    **Listing 4-4.** *All Proper Subsets of Function F2*


    { (X;2), (Y;1) }


    { (X;2), (Z;2) }


    { (Y;1), (Z;2) }


    { (X;2) }


    { (Y;1) }


    { (Z;2) }


    ∅


    As you can see, every proper subset of F2 is again a function. Indeed, this is
    a property that holds for every function. For a given function F, every proper
    subset of F will be a function too.


    This concludes the introduction of set-theory functions. Because functions are
    an important concept that will be extensively used throughout the rest of this
    book, we offer a brief summary here.


    • A function is a binary relation and therefore a *set of ordered pairs*.


    • In a function *every first coordinate appears only once*.


    • You can use a function to specify a certain part of a database design.


    The title of this chapter was deliberately chosen to be “Relations and Functions”
    because we felt you should be introduced to (at least) the mathematical concept
    of a binary relation.


    The more general concept of an n *-ary* relation (that is, not just a binary one)
    is a cornerstone concept introduced by E. F. Codd into the database field. The
    concept of a binary relation is sufficient for the mathematical method to specify
    database designs that will be developed in this book. Other textbooks deal with—and
    use in their methods—the concept of an n-ary relation. They also use n-ary relations
    differently than the way this book deals with a special case of the 2-ary relation:
    the function. To avoid confusion from here on, this book will explicitly not use
    the terms *binary relation* or *relation* anymore.


    7451CH04.qxd 5/4/07 2:43 PM Page 75


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    **75**


    **Operations on Functions**


    Because functions are sets, you can apply the set operators—union, intersection,
    and difference—with functions as their operands. This section will explore the
    application of these set operators on functions.


    **Union, Intersection, and Difference**


    It’s always interesting for mathematicians to investigate the *closure property*
    of an operator. In the context of this chapter, we ask ourselves whether the union,
    intersection, and difference operators, which are closed on sets, are also closed
    on functions. Or put differently, when you apply these operators on two functions,
    will this result in another function?


    Take a look at the following example, which introduces two functions G1 and G2,
    and illustrates the result of the union of those two functions:


    G1 := { (a;1), (b;2), (c;3) }


    G2 := { (a;2), (d;4) }


    G1 ∪ G2 = { (a;1), (b;2), (c;3), (a;2), (d;4) }


    This example illustrates that the union of two functions does not necessarily
    result in a function, because the result of the union of functions G1 and G2 holds
    two *different* ordered pairs that have the same first coordinate: (a;1) and (a;2).


    Take a look at another example:


    G3 := { (empno;999), (ename;''Toon Koppelaars''), (born;''14-feb-1965'') }


    G4 := { (empno;999), (occupation;''IT architect'') }


    G3∪G4 = { (empno;999), (ename;''Toon Koppelaars''),


    (born;''14-feb-1965''), (occupation;''IT architect'') }'
