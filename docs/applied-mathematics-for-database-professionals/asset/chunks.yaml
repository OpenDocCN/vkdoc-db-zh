    **131**


    By using the more elaborate function limitation as opposed to the function application
    that was used in Listing 6-8, you are able to express subset requirements that
    involve multiple attributes of both involved tables at the same time. The database
    design that will be introduced in Chapter 7 has an example subset requirement
    that involves multiple attributes.


    A subset requirement predicate usually involves two *different* table structures,
    and therefore represents a database predicate. However, this need not always be
    the case; sometimes they involve just one table structure. In these cases, they
    represent a table predicate. For instance, assume that table EMP1 is extended
    with a mgr (manager) attribute that holds the employee number of the manager of
    the employee. You would require that every manager number that appears in EMP1
    also appears as an employee number in EMP1\. Formally, you can express this as
    a subset requirement:


    { t1(mgr) | t1∈EMP1 } ⊆ { t2(empno) | t2∈EMP1 }


    You might even require that every manager number that appears in EMP1 also appears
    as an employee number in a certain *restriction* of EMP1\. Perhaps the referenced
    tuples must each have a JOB value indicating that the employee in question is
    indeed a manager. Formally, you can express this as follows:


    { t1(mgr) | t1∈EMP1 } ⊆ { t2(empno) | t2∈EMP1 ∧ t2(job)=''MANAGER'' }


    We consider the preceding expression also a subset requirement.


    Subset requirements can be visualized by a picture. You can draw a picture for
    a subset requirement “A in T1 references A in T2” by drawing two rectangles (or
    some other shape)—one for T1 and one for T2—and connecting the two rectangles
    with a directed arrow going from T1


    to T2\. The arrow represents that every tuple in table T1 references at least
    one tuple in table T2.


    Figure 6-6 shows the subset requirement from EMP1 to DEP2.


    **Figure 6-6.** *Visualization of subset requirement from EMP1 to DEP2*


    Note that this picture of a subset requirement doesn’t tell you what the involved
    attributes are at both sides of the arrow, nor if any attribute renaming is involved.
    It is *just a picture* and should always be accompanied by the formal predicate
    that tells you exactly what the intended meaning of the arrow is.


    Sometimes you know that the subset requirement is actually a *proper* subset requirement.


    Suppose you want to specify the requirement that the set of department numbers
    found in an employee table is a proper subset of the set of department numbers
    found in a department table. You can specify this database predicate as follows:
    P15a(D,E) := { e(deptno)| e∈E } ⊂ { d(dno)| d∈D }


    In this book, we’ll call this special case a subset requirement too. Another way
    of dealing with this is to still use the subset operator (instead of the proper
    subset) and to specify a second database predicate that expresses the existence
    of at least one department number in the


    7451CH06.qxd 5/14/07 10:37 AM Page 132


    **132**


    C H A P T E R 6 **■** T U P L E , TA B L E , A N D D ATA B A S E P R E D I C AT
    E S


    department table that does not appear in the employee table. The following database
    predicate P15b does just that:


    P15b(D,E) := ( ∃d∈D: ( ∀e∈E: e(deptno)≠d(deptno) ) )


    Tables EMP1 (employee) and DEP2 (department) conform to both database predicate
    P15a and P15b. At other times you know that the subset requirement is actually
    an *equality* requirement. Suppose you want to specify the requirement that every
    department must have employees. You can specify this as follows:


    P16a(D,E) := { e(deptno)| e∈E } = { d(dno)| d∈D }


    In this book we’ll call this special case a subset requirement too. Again, another
    way of dealing with this is to use the subset operation (instead of the equality)
    and to add a second integrity constraint that expresses the existence of at least
    one employee for every department. Database predicate P16b expresses just that:


    P16b(D,E) := ( ∀d∈D: ( ∃e∈E: e(deptno)=d(deptno) ) )


    By the way, do you see that predicate P15b is just the negation of predicate P16b?
    This is because these two special cases—proper subset and equality—are mutually
    exclusive.


    **■Note** These variations of subset requirements in conjunction with unique identification
    predicates of the tables involved in the subset requirements are mathematical
    counterparts of various relationships found in entity relationship diagrams.


    **Specialization Predicate**


    Take a look at table TRN1 displayed in Figure 6-7.


    **Figure 6-7.** *Table TRN1*


    The propositions regarding tables EMP1 and TRN1 listed in Listing 6-10 are TRUE
    propositions.


    **Listing 6-10.** *Propositions Regarding Tables EMP1 and TRN1*


    P7 := {empno} is uniquely identifying in TRN1


    P8 := { e↓{empno}| e∈EMP1 ∧ e(job)=''TRAINER'' } = { t↓{empno}| t∈TRN1 }


    7451CH06.qxd 5/14/07 10:37 AM Page 133


    C H A P T E R 6 **■** T U P L E , TA B L E , A N D D ATA B A S E P R E D I C AT
    E S


    **133**


    **■Note** We have formally defined what we mean by saying that *a set is uniquely
    identifying in a table*.


    So P7 is indeed a formal specification.


    It follows from proposition P7 that the uniquely identifying attributes of tables
    TRN1 and EMP1 are the same. Proposition P8 states that the employee numbers of
    trainers in table EMP1


    equal the employee numbers found in table TRN1 (loosely speaking). Note the *equality*.
    For every trainer that can be found in table EMP1, you can find a related tuple
    in table TRN1\. And vice versa, for every tuple in TRN1 you can find a trainer
    in EMP1.


    Table TRN1 can be considered to hold additional information regarding trainers
    (and only trainers): the date on which they got certified (again loosely speaking).


    This type of circumstance is often found in database designs; for a certain subset
    of tuples in a given table—specifiable through some predicate (in the preceding
    case e(job)=''TRAINER'')—additional information is found in another given table
    where both tables share the same uniquely identifying attributes. In this case,
    table TRN1 is referred to as a *specialization* of table EMP1\. Definition 6-3
    formally specifies this concept.


    **■Definition 6-3: Specialization Predicate** Let T1 and T2 be tables and let
    A be a given subset of the heading of T1 as well as a subset of the heading of
    T2\. Let P be a tuple predicate. We refer to a database predicate as a specialization
    predicate if it is of the following form:


    { t1↓A | t1∈T1 ∧ P(t1) } = { t2↓A | t2∈T2 }


    We say that *T2 is a specialization of T1*.


    You’ll usually find that set A is uniquely identifying in both tables T1 and T2\.
    In the example from Listing 6-10, you saw that {empno} is uniquely identifying
    in both EMP1 and TRN1.


    A given table can have more than one specialization. Assume that you want to hold
    additional information for managers too; for instance, the agreed yearly bonus
    for a manager. For the sake of this example, assume that trainers and clerks do
    not have a yearly bonus, only managers do. Take a look at table MAN1 (see Figure
    6-8) that holds the yearly bonus for managers; it is also a specialization of
    EMP1.


    **Figure 6-8.** *Table MAN1*


    7451CH06.qxd 5/14/07 10:37 AM Page 134


    **134**


    C H A P T E R 6 **■** T U P L E , TA B L E , A N D D ATA B A S E P R E D I C AT
    E S


    The following proposition holds between tables EMP1 and MAN1\. It is of the form
    introduced in Definition 6-3.


    { e↓{empno}| e∈EMP1 ∧ e(job)=''MANAGER'' } = { t↓{empno}| t∈MAN1 }


    In the next section we’ll discuss a concept that is related to specializations.


    **Generalization**


    If a given table T has multiple specializations, say tables S1 through Sn (n>1),
    such that for every tuple in T there exists exactly one related tuple in exactly
    one of the specializations, then we say that “table T is a *generalization* of
    tables S1 through Sn.”'
  trans: '# 第六章 ■ 元组、表和数据库谓词


    ## 131


    通过使用比清单 6-8 中使用的函数应用更复杂的函数限制，你可以同时表达涉及两个相关表多个属性的子集需求。第 7 章将介绍的数据库设计中有一个涉及多个属性的子集需求示例。


    一个子集需求谓词通常涉及两个*不同*的表结构，因此代表一个数据库谓词。然而，情况并非总是如此；有时它们只涉及一个表结构。在这些情况下，它们代表一个表谓词。例如，假设表
    `EMP1` 被扩展了一个 `mgr`（经理）属性，该属性保存员工的经理的员工编号。你会要求每个在 `EMP1` 中出现的经理编号也必须作为员工编号出现在
    `EMP1` 中。形式上，你可以将其表达为一个子集需求：


    { t1(mgr) | t1∈EMP1 } ⊆ { t2(empno) | t2∈EMP1 }


    你甚至可能要求每个在 `EMP1` 中出现的经理编号也必须作为员工编号出现在 EMP1 的某个*限制*中。也许引用的元组必须每个都有一个 `JOB` 值表明该员工确实是一名经理。形式上，你可以如下表达：


    { t1(mgr) | t1∈EMP1 } ⊆ { t2(empno) | t2∈EMP1 ∧ t2(job)=''MANAGER'' }


    我们认为前面的表达式也是一个子集需求。


    子集需求可以通过图片来可视化。你可以为子集需求"A in T1 references A in T2"画一张图，方法是绘制两个矩形（或其他形状）——一个代表
    T1，一个代表 T2——并用一条从 T1 指向 T2 的有向箭头连接这两个矩形。该箭头表示 T1 表中的每个元组至少引用 T2 表中的一个元组。


    图 6-6 显示了从 `EMP1` 到 `DEP2` 的子集需求。


    ### 图 6-6. *从 EMP1 到 DEP2 的子集需求可视化*


    请注意，子集需求的这张图并没有告诉你箭头两边涉及的属性是什么，也没有告诉你是否涉及任何属性重命名。它*仅仅是一张图*，应该始终伴随着精确说明箭头预期含义的形式谓词。


    有时你知道该子集需求实际上是一个*真*子集需求。


    假设你想指定这样的需求：在员工表中找到的部门编号集合是部门表中找到的部门编号集合的真子集。你可以将此数据库谓词指定如下：`P15a(D,E) := { e(deptno)|
    e∈E } ⊂ { d(dno)| d∈D }`


    在本书中，我们将这种特殊情况也称为子集需求。另一种处理方法仍然是使用子集运算符（而不是真子集），并指定第二个数据库谓词来表达部门表中至少存在一个部门编号不出现在员工表中。以下数据库谓词
    `P15b` 正是这样做的：


    ```

    P15b(D,E) := ( ∃d∈D: ( ∀e∈E: e(deptno)≠d(deptno) ) )

    ```


    表 `EMP1`（员工）和 `DEP2`（部门）同时符合数据库谓词 `P15a` 和 `P15b`。有时你知道该子集需求实际上是一个*相等*需求。假设你想指定每个部门都必须有员工的需求。你可以如下指定：


    `P16a(D,E) := { e(deptno)| e∈E } = { d(dno)| d∈D }`


    在本书中，我们将这种特殊情况也称为子集需求。同样，另一种处理方法是使用子集操作（而不是相等操作），并添加第二个完整性约束来表达每个部门至少存在一个员工。数据库谓词
    `P16b` 正是表达了这一点：


    ```

    P16b(D,E) := ( ∀d∈D: ( ∃e∈E: e(deptno)=d(dno) ) )

    ```


    顺便问一下，你看出谓词 `P15b` 正是谓词 `P16b` 的否定吗？这是因为这两个特殊情况——真子集和相等——是互斥的。


    **■注意** 子集需求的这些变体，结合子集需求所涉及表的唯一标识谓词，是实体关系图中发现的各种关系的数学对应物。


    ## 特殊化谓词


    看一下图 6-7 中显示的表 `TRN1`。


    ### 图 6-7. *表 TRN1*


    清单 6-10 中列出的关于表 `EMP1` 和 `TRN1` 的命题是 TRUE 命题。


    ### 清单 6-10. *关于表 EMP1 和 TRN1 的命题*


    ```

    P7 := {empno} 在 TRN1 中是唯一标识的

    P8 := { e↓{empno}| e∈EMP1 ∧ e(job)=''TRAINER'' } = { t↓{empno}| t∈TRN1 }

    ```


    **■注意** 我们已经正式定义了“*一个集合在表中是唯一标识的*”这一表述的含义。


    所以 `P7` 确实是一个形式化规范。


    从命题 `P7` 可以推出，表 `TRN1` 和 `EMP1` 的唯一标识属性是相同的。命题 `P8` 表明，表 `EMP1` 中培训师的员工编号等于表 `TRN1`
    中找到的员工编号（粗略地说）。注意这里的*相等性*。对于在表 `EMP1` 中找到的每个培训师，你都能在表 `TRN1` 中找到一个相关的元组。反之亦然，对于
    `TRN1` 中的每个元组，你都能在 `EMP1` 中找到一个培训师。


    表 `TRN1` 可以被认为是保存了关于培训师（且仅关于培训师）的附加信息：他们获得认证的日期（再次粗略地说）。


    这种情形在数据库设计中经常出现；对于给定表中的某个元组子集——可通过某个谓词指定（在上例中是 `e(job)=''TRAINER''`）——在另一个给定表中发现了附加信息，且这两个表共享相同的唯一标识属性。在这种情况下，表
    `TRN1` 被称为表 `EMP1` 的一个*特殊化*。定义 6-3 正式定义了这一概念。


    **■定义 6-3：特殊化谓词** 设 `T1` 和 `T2` 是表，`A` 是 `T1` 的头部的一个给定子集，同时也是 `T2` 的头部的一个子集。设
    `P` 是一个元组谓词。如果一个数据库谓词具有以下形式，则我们称其为特殊化谓词：


    { t1↓A | t1∈T1 ∧ P(t1) } = { t2↓A | t2∈T2 }


    我们称“`T2` 是 `T1` 的一个特殊化”。


    通常你会发现集合 `A` 在表 `T1` 和 `T2` 中都是唯一标识的。在清单 6-10 的例子中，你看到 `{empno}` 在 `EMP1` 和 `TRN1`
    中都是唯一标识的。


    一个给定的表可以有多个特殊化。假设你也想为经理保存附加信息；例如，经理的年度奖金。为本例假设，培训师和文员没有年度奖金，只有经理有。看一下保存经理年度奖金的表
    `MAN1`（见图 6-8）；它也是 `EMP1` 的一个特殊化。


    ### 图 6-8. *表 MAN1*


    以下命题在表 `EMP1` 和 `MAN1` 之间成立。它符合定义 6-3 引入的形式。


    { e↓{empno}| e∈EMP1 ∧ e(job)=''MANAGER'' } = { t↓{empno}| t∈MAN1 }


    在下一节中，我们将讨论与特殊化相关的一个概念。


    ## 泛化


    如果一个给定的表 `T` 有多个特殊化，例如表 `S1` 到 `Sn` (`n>1`)，使得对于 `T` 中的每个元组，在恰好一个特殊化中存在恰好一个相关的元组，那么我们说“表
    `T` 是表 `S1` 到 `Sn` 的一个*泛化*”。'
- fmt: "# CHAPTER 6 Tuple, Table, and Database Predicates\n\nLet’s build on the example\
    \ of the previous section. Suppose you also want to hold additional information\
    \ for clerks; for instance, the type of contract they have (full time or part\
    \ time) and the manager that they report to. Table `CLK1`, shown in Figure 6-9,\
    \ is a specialization of table `EMP1` that holds this extra information for clerks.\n\
    \n### Figure 6-9. Table `CLK1`\n\nSpecializations `TRN1`, `MAN1`, and `CLK1` now\
    \ have seven tuples in total. For every tuple in table `EMP1`—there are seven—there\
    \ exists exactly one tuple in exactly one of the tables `TRN1`, `MAN1`, or `CLK1`.\
    \ This makes table `EMP1` a generalization of tables `TRN1`, `MAN1`, and `CLK1`.\n\
    \n**Note** By the way, you can now also specify a subset requirement (involving\
    \ the manager attribute of `CLK1`) from `CLK1` to `EMP1`. This is left as an exercise\
    \ at the end of the chapter.\n\nIn a generalization table, you’ll often find a\
    \ specific attribute that determines in which specialization table the additional\
    \ information can be found. In the example used, this attribute is the `job` attribute.\
    \ For the tuples in table `EMP1` that have `job='TRAINER'`, additional information\
    \ is found in specialization `TRN1`. For tuples with `job='MANAGER'`, additional\
    \ information can be found in table `MAN1`, and for tuples with `job='CLERK'`,\
    \ additional information can be found in table `CLK1`. Such an attribute in a\
    \ generalization table is referred to as the `inspection attribute`.\n\nNote that\
    \ an `inspection attribute` is a redundant attribute; that is, its value can be\
    \ derived from other tuples. For a given tuple of `EMP1`, a corresponding tuple\
    \ exists in either `TRN1`, `MAN1`, or `CLK1`. You can directly deduce the `job`\
    \ value of the `EMP1` tuple from where this corresponding tuple appears; its value\
    \ should be `'TRAINER'`, `'MANAGER'`, or `'CLERK'`, respectively.\n\nIn general,\
    \ you shouldn’t introduce data redundancy in a database design; it forces you\
    \ to maintain the redundancy whenever you update data that determines the redundant\
    \ data.\n\nOr, viewed from a database design perspective, it forces you to introduce\
    \ a constraint that imposes the data redundancy. However, an `inspection attribute`\
    \ is very helpful when specifying a generalization property in a database design\
    \ (there is an exercise on this at the end of this chapter).\n\n## Tuple-in-Join\
    \ Predicate\n\nOften two tables are related through a subset requirement. When\
    \ two tables are thus related, the need to join them arises often, for obvious\
    \ reasons. You can join tuples from tables `EMP1` and `DEP1` that correspond on\
    \ the attributes that are involved in the subset requirement between these two\
    \ tables, in this case the `deptno` attribute. The resulting table from this combination\
    \ will have as its heading the union of the heading of `EMP1` and the heading\
    \ of `DEP1`.\n\nFigure 6-10 displays the result of such a combination of tables\
    \ `EMP1` and `DEP1`.\n\n### Figure 6-10. Table `EMPDEP1`, the join of tables `EMP1`\
    \ and `DEP1`\n\nEvery tuple in table `EMPDEP1` is called a `tuple in the join`\
    \ of `EMP1` and `DEP1`. `Tuple-in-join predicates` are tuple predicates dealing\
    \ with these tuples in a join; the joined tuple is the parameter for the tuple\
    \ predicate. Here is an example of a tuple predicate regarding `EMPDEP1`:\n```\n\
    ( ∀t∈EMPDEP1: t(sal)≤t(salbudget)/5 )\n```\nThis proposition states that all tuples\
    \ in `EMPDEP1`—the join of `EMP1` and `DEP1`—have a `sal` attribute value that\
    \ doesn’t exceed 20 percent of the `salbudget` attribute value. In this proposition\
    \ the expression `t(sal)≤t(salbudget)/5` represents the tuple predicate. If you\
    \ express this proposition not in terms of table `EMPDEP1`, but in terms of the\
    \ two tables that are joined—`EMP1` and `DEP1`—you’ll end up with a proposition\
    \ looking like this:\n```\n( ∀e∈EMP1: ( ∀d∈DEP1: e(deptno)=d(deptno) ⇒ e(sal)≤d(salbudget)/5\
    \ ) )\n```\nIt states that no employee can earn more than a fifth of the departmental\
    \ salary budget (of the department where he or she is employed). Another way of\
    \ formally specifying this is as follows:\n```\n( ∀t∈EMP1⊗DEP1: t(sal)≤t(salbudget)/5\
    \ )\n```\nIn this proposition, the expression `t(sal)≤t(salbudget)/5` represents\
    \ a tuple predicate that constrains the tuples in the join. This predicate pattern\
    \ is commonly found in database designs and is referred to as the `tuple-in-join\
    \ predicate`. Definition 6-4 formally specifies it.\n\n**Definition 6-4: Tuple-in-Join\
    \ Predicate** Let `T1` and `T2` be tables and `P` a tuple predicate. A predicate\
    \ is a `tuple-in-join predicate` if it is of the following form:\n```\n( ∀t∈T1⊗T2:\
    \ P(t) )\n```\nWe say that `P` constrains tuples in the join of `T1` and `T2`.\n\
    \nIn the preceding definition, you will typically find that tables `T1` and `T2`\
    \ are related via a subset requirement that involves the join attributes.\n\n\
    Listing 6-11 demonstrates two more instantiations of a `tuple-in-join predicate`\
    \ involving tables `EMP1` and `DEP1`.\n\n### Listing 6-11. More Tuple-in-Join\
    \ Predicates Regarding Tables `EMP1` and `DEP1`\n\n```\nP9 := ( ∀e∈EMP1: ( ∀d∈DEP1:\
    \ e↓{deptno}=d↓{deptno} ⇒\n        (d(loc)='LOS ANGELES'⇒ e(job)≠'MANAGER') )\
    \ )\n\nP10 := ( ∀e∈EMP1: ( ∀d∈DEP1: e↓{deptno}=d↓{deptno} ⇒\n         (d(loc)='SAN\
    \ FRANCISCO'⇒ e(job)∈{'TRAINER','CLERK'}) ) )\n```\n`P9` states that managers\
    \ cannot be employed in Los Angeles. `P10` states that employees working in San\
    \ Francisco must either be trainers or clerks. Given the sample values `EMP1`\
    \ and `DEP1` in Figure 6-10 both propositions are `TRUE`; there are no managers\
    \ working in Los Angeles and all employees working in San Francisco—there are\
    \ none—are either trainers or clerks.\n\nIn this section, we’ve defined the `tuple-in-join\
    \ predicate` to involve only two tables. However, it is often meaningful to combine\
    \ three or even more tables with the join operator. Of course, tuples in these\
    \ joins can also be constrained by a tuple predicate. Here is the pattern of a\
    \ `tuple-in-join predicate` involving three tables (`T1`, `T2`, and `T3`):\n```\n\
    ( ∀t1∈T1: ( ∀t2∈T2: ( ∀t3∈T3: (t1↓A=t2↓A ∧ t2↓B=t3↓B) ⇒ P(t1∪t2∪t3) ) ) )\n```\n\
    In this pattern, `A` represents the set of join attributes for tables `T1` and\
    \ `T2`, and `B` represents the set of join attributes for tables `T2` and `T3`.\
    \ Predicate `P` represents a predicate whose argument is the tuple in the join.\
    \ In the next chapter, you’ll see examples of `tuple-in-join predicates` involving\
    \ more than two tables."
  raw: 'Let’s build on the example of the previous section. Suppose you also want
    to hold additional information for clerks; for instance, the type of contract
    they have (full time or part time) and the manager that they report to. Table
    CLK1, shown in Figure 6-9, is a specialization of table EMP1 that holds this extra
    information for clerks.


    **Figure 6-9.** *Table CLK1*


    Specializations TRN1, MAN1, and CLK1 now have seven tuples in total. For every
    tuple in table EMP1—there are seven—there exists exactly one tuple in exactly
    one of the tables TRN1, MAN1, or CLK1\. This makes table EMP1 a generalization
    of tables TRN1, MAN1, and CLK1.


    **■Note** By the way, you can now also specify a subset requirement (involving
    the manager attribute of CLK1) from CLK1 to EMP1. This is left as an exercise
    at the end of the chapter.


    In a generalization table, you’ll often find a specific attribute that determines
    in which specialization table the additional information can be found. In the
    example used, this attribute is the job attribute. For the tuples in table EMP1
    that have job=''TRAINER'', additional information is found in specialization TRN1\.
    For tuples with job=''MANAGER'', additional information can be found in table
    MAN1, and for tuples with job=''CLERK'', additional information can be found in
    table CLK1\. Such an attribute in a generalization table is referred to as the
    *inspection attribute*.


    Note that an inspection attribute is a redundant attribute; that is, its value
    can be derived from other tuples. For a given tuple of EMP1, a corresponding tuple
    exists in either TRN1, MAN1, or CLK1\. You can directly deduce the job value of
    the EMP1 tuple from where this corresponding tuple appears; its value should be
    ''TRAINER'', ''MANAGER'', or ''CLERK'', respectively.


