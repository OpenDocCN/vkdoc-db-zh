  raw: '## Chapter Summary


    This section contains a summary of the contents of this chapter, formatted as
    a bulleted list—


    just like the previous chapter. Again, if you don’t feel comfortable about one
    of the following concepts, you might want to revisit certain chapter sections
    before continuing with the exercises in the next section.


    • Just like regular arithmetic operators, logical connectives can also have certain
    *algebraic properties*, such as commutativity, associativity, distributivity,
    reflexivity, transitivity, idempotence, and absorption.


    • You can turn predicates into propositions in two ways, one of them being by
    binding parameters through *quantification*.


    • There are two quantifiers:


    • The *existential quantifier* allows you to express statements such as “There
    exists . . .”


    using the symbol ∃.


    • The universal quantifier allows you to express statements such as “For all .
    . .” using the symbol ∀.


    • Because sets are *finite* by definition in databases, you can always interpret
    predicates with an existential quantifier over some set in the database as an
    iterated OR construct; similarly, you can interpret predicates with a universal
    quantifier as an iterated AND


    construct.


    • Be careful when quantifying over the *empty set*. The existential quantifier
    will always return FALSE, regardless of the predicate, whereas the universal quantifier
    will always return TRUE when applied to the empty set.


    • Quantifiers can be *nested*. Sometimes you can interchange quantifiers in your
    expressions, but in many cases you’ll change the meaning of the expression. In
    general, you may interchange quantifiers if they are of the same type and none
    of the sets over which you quantify are dependent on the variable bound by the
    other set.


    7451CH03.qxd 5/4/07 2:26 PM Page 64


    **64**


    C H A P T E R 3 **■** S O M E M O R E L O G I C


    • You can apply many *rewrite rules* to quantified expressions. For example, you
    can always rewrite a universal quantifier expression to an existential quantifier
    expression, and vice versa.


    • *Normal forms* are often used to rewrite expressions in such a way that you
    can easily solve them, automate the process of proving theorems, or investigate
    predicates, whether they are tautologies or contradictions. This chapter introduced
    two normal forms:


    • *Conjunctive normal form (CNF)*: Predicate written as iterated AND. CNF is useful
    when you are investigating tautologies.


    • *Disjunctive normal form (DNF)*: Predicate written as iterated OR. DNF is useful
    when checking for contradictions.


    **Exercises**


    **1.** Prove the two absorption equivalences from Listing 3-11, using a truth
    table: P ∨ ( P ∧ Q ) ⇔ P


    P ∧ ( P ∨ Q ) ⇔ P


    **2.** The following two sets are given: A := {2,4,6,8} and B := {1,3,5,7,9}.


    Which of the following propositions are TRUE?


    **a.** ∀x∈A: x > 1


    **b.** ∃x∈B: mod(x,5) = 0


    **c.** ∀x∈A: ∀y∈B: x + y ≥ 4


    **d.** ∀x∈A: ∃y∈B: x + y = 11


    **e.** ∃y∈B: ∀x∈A: x + y = 11


    **f.** ∃x∈A: ∃y∈A: x + y = 4


    For the propositions that are FALSE, could you come up with different definitions
    for sets A or B in such a way that they become TRUE?


    **3.** Give a formal representation of the following statements: **a.** Each element
    of A is divisible by 2.


    **b.** Each number in B is less than 9.


    **c.** A contains three different numbers of which the sum is 18.


    7451CH03.qxd 5/4/07 2:26 PM Page 65


    C H A P T E R 3 **■** S O M E M O R E L O G I C


    **65**


    **4.** Eliminate the negation from the following propositions; that is, rewrite
    the formal representations without using the negation symbol (¬):


    **a.** ¬∃x∈A: x < 5


    **b.** ¬∀x∈B: mod(y,2) = 1


    **c.** ¬∀x∈A: ∃y∈B: y – x = 1


    **d.** ¬∃x,y,z∈B: x + y + z = 11


    **5.** Rewrite the following propositions to *disjunctive* normal form: **a.**
    ( P ∨ Q ) ∧ ( R ∨ S )


    **b.** ¬ ( P ⇒ ( Q ∧ ¬R ) )


    **c.** P ⇔ ¬ Q


    **6.** Rewrite the second proposition of the previous exercise to *conjunctive*
    normal form:


    ¬( P ⇒ ( Q ∧ ¬R ) )


    *Hint*: First, try to find the DNF of the negation of the preceding predicate;
    when found, apply one of De Morgan’s laws.'
  trans: "\n## 章节摘要\n\n本节包含本章内容的摘要，以项目符号列表格式呈现——与上一章类似。再次说明，如果你对以下任一概念感到不太熟悉，最好在继续下一节练习前回顾本章的相关小节。\n\
    \n-  就像常规算术运算符一样，逻辑连接词也具有某些*代数属性*，例如交换律、结合律、分配律、自反性、传递律、幂等性和吸收律。\n-  你可以通过两种方式将谓词转化为命题，其中一种是通过*量化*来绑定参数。\n\
    -  有两种量词：\n    -  *存在量词*允许你使用符号 `∃` 来表达诸如“存在……”的陈述。\n    -  全称量词允许你使用符号 `∀` 来表达诸如“对于所有……”的陈述。\n\
    -  因为根据定义，数据库中的集合是*有限*的，所以你总是可以将数据库中某个集合上带有存在量词的谓词解释为一个迭代的 OR 构造；类似地，你可以将带有全称量词的谓词解释为一个迭代的\
    \ AND 构造。\n-  对*空集*进行量化时要小心。存在量词将始终返回 FALSE，无论谓词是什么，而应用于空集时，全称量词将始终返回 TRUE。\n\
    -  量词可以*嵌套*。有时你可以在表达式中互换量词，但在许多情况下，这样做会改变表达式的含义。一般来说，如果量词类型相同，并且你所量化的集合中没有一个依赖于另一个集合所绑定的变量，那么你可以互换量词。\n\
    -  你可以对量化表达式应用许多*重写规则*。例如，你总是可以将全称量词表达式重写为存在量词表达式，反之亦然。\n-  *范式*通常用于重写表达式，以便于你轻松求解、自动化定理证明过程或研究谓词是否是重言式或矛盾式。本章介绍了两种范式：\n\
    \    -  *合取范式*：谓词写作迭代的 AND。当你研究重言式时，CNF 很有用。\n    -  *析取范式*：谓词写作迭代的 OR。DNF 在检查矛盾时很有用。\n\
    \n## 练习\n\n**1.** 使用真值表证明列表 3-11 中的两个吸收等价式：`P ∨ ( P ∧ Q ) ⇔ P` 和 `P ∧ ( P ∨ Q\
    \ ) ⇔ P`\n\n**2.** 给定以下两个集合：`A := {2,4,6,8}` 和 `B := {1,3,5,7,9}`。下列哪些命题为真？\n\
    - `a. ∀x∈A: x > 1`\n- `b. ∃x∈B: mod(x,5) = 0`\n- `c. ∀x∈A: ∀y∈B: x + y ≥ 4`\n\
    - `d. ∀x∈A: ∃y∈B: x + y = 11`\n- `e. ∃y∈B: ∀x∈A: x + y = 11`\n- `f. ∃x∈A: ∃y∈A:\
    \ x + y = 4`\n\n对于为假的命题，你能为集合 `A` 或 `B` 提供不同的定义，使其变为真吗？\n\n**3.** 用形式化表示法表述以下陈述：\n\
    - `a. A 的每个元素都能被 2 整除。`\n- `b. B 中的每个数字都小于 9。`\n- `c. A 包含三个不同的数字，其和为 18。`\n\n\
    **4.** 从下列命题中消除否定；即，在不使用否定符号 (`¬`) 的情况下重写形式化表示：\n- `a. ¬∃x∈A: x < 5`\n- `b. ¬∀x∈B:\
    \ mod(y,2) = 1`\n- `c. ¬∀x∈A: ∃y∈B: y – x = 1`\n- `d. ¬∃x,y,z∈B: x + y + z = 11`\n\
    \n**5.** 将下列命题重写为*析取*范式：\n- `a. ( P ∨ Q ) ∧ ( R ∨ S )`\n- `b. ¬ ( P ⇒ ( Q ∧ ¬R\
    \ ) )`\n- `c. P ⇔ ¬ Q`\n\n**6.** 将上一练习的第二个命题重写为*合取*范式：`¬( P ⇒ ( Q ∧ ¬R ) )`\n\
    *提示*：首先，尝试找出前述谓词的否定的 DNF；找到后，应用德摩根定律之一。\n"
- fmt: "# CHAPTER 4 Relations and Functions\n\nChapter 2 laid down the basics of set\
    \ theory. This fourth chapter will build on those basics and introduce some more\
    \ set-theory concepts that will be used in Part 2 of this book as tools to define\
    \ a database design formally—including all constraint specifications.\n\nIn the\
    \ section “Binary Relations,” we’ll revisit ordered pairs and the Cartesian product\
    \ to introduce the concept of a binary relation between two sets. As you’ll see,\
    \ such a binary relation is in fact a subset of the Cartesian product of two sets.\n\
    \nThe section “Functions” then introduces the important concept of a function.\
    \ A function is a special kind of binary relation—one that conforms to certain\
    \ properties. In this section we’ll also establish some terminology around the\
    \ (set-theory) concept of a function.\n\nThe section “Operations on Functions”\
    \ revisits the union, intersection, and difference set operators and takes a closer\
    \ look at how these behave when applied to functions as their operands. You’ll\
    \ also be introduced to a new (dyadic) set operator called limitation of a function.\n\
    \nThis chapter then continues by introducing another important concept that we\
    \ call a set function. A set function holds a special kind of ordered pair: one\
    \ where the second coordinate of the pair is always a set. We’ll reveal the link\
    \ that a set function has with specifying a database design: it can be used to\
    \ characterize an external predicate. An external predicate describes something\
    \ about the real world that we want to represent in a database. If a set function\
    \ is used for this purpose, we’ll refer to it as a characterization. In the same\
    \ section, you’ll be introduced to a new monadic set operator called the generalized\
    \ product. The generalized product takes a set function—or rather a characterization—as\
    \ its operand and produces a new set of functions. The concept of a generalized\
    \ product is the second key stepping stone (next to the concept of a powerset\
    \ that was introduced in Chapter 2) that will be used in Part 2 of this book when\
    \ we’ll demonstrate how to define a database design formally.\n\nWe conclude this\
    \ chapter with the notion of function composition, which will be applied in Chapter\
    \ 5 (operations on tables) when we investigate the join in a formal way.\n\nYou’ll\
    \ find a “Chapter Summary” at the end followed by an “Exercises” section. You’re\
    \ strongly advised to spend sufficient time on these exercises before moving on\
    \ to the other chapters.\n\n## Exercises\n\n7.  Prove the last rewrite rule from\
    \ Listing 3-16, using other rewrite rules:\n    `¬( ∃x∈S: ∀y∈T: P(x,y) ) ⇔ ( ∀x∈S:\
    \ ∃y∈T: ¬P(x,y) )`\n\n8.  Let `S` be a given finite set and `P(x)` a given predicate.\
    \ Complete the following expressions in such a way that they are transformed into\
    \ tautologies:\n    a.  `( ∃x∈S: P(x) ) ⇔ #{ x | x∈S ∧ P(x) } ...`\n    b.  `(\
    \ ∀x∈S: P(x) ) ⇔ #{ x | x∈S ∧ P(x) } ...`\n\n## Binary Relations\n\nBefore we\
    \ start dealing with binary relations, take a look at this quote from Chapter\
    \ 1: *The importance of data management being based on logic was envisioned by\
    \ E. F. (Ted) Codd (1923–2003) in 1969, when he first proposed his famous relational\
    \ model in the IBM research report “Derivability, Redundancy and Consistency of\
    \ Relations Stored in Large Data Banks.” The relational model for database management\
    \ introduced in this research report has proven to be an influential general theory\
    \ of data management and remains his most memorable achievement.*\n\nThe word\
    \ *Relations*, as used by E. F. Codd in the preceding quote in the title of his\
    \ research report, created the name of the general theory we now refer to as the\
    \ relational model of data.\n\n> **Note:** It is a common misconception that the\
    \ word *relational* in “the relational model of data” refers to “relationships”\
    \ (many-to-one, many-to-many, and so on) that can exist between different “entity\
    \ types.”"
