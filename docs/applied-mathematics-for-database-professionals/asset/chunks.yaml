  trans: '## 附录 E：部分习题答案


    ## `习题 1`


    首先，涉及两个表约束：


    ```

    /* 与会者和开始日期唯一标识一个元组 */

    ( ∀r1,r2∈R:

    r1↓{STARTS,STUD} = r2↓{STARTS,STUD} ⇒ r1 = r2 )


    /* 课程提供由所有与会者评估，或尚未到评估该课程提供的时候 */

    ( ∀r1,r2∈R:

    ( r1↓{COURSE,STARTS} = r2↓{COURSE,STARTS} )

    ⇒

    ( ( r1(EVAL) = -1 ∧ r2(EVAL) = -1 ) ∨

    ( r1(EVAL) ≠ -1 ∧ r2(EVAL) π -1 )

    ) )

    ```


    如果某位管理员已经注册了该课程提供，则第一个约束条件可能被违反。


    无论`初始状态`如何（假设 3 月 1 日仍在未来；即，已存在的其他注册信息仍然显示`EVAL=-1`），第二个约束条件都无法被事务`ETX1`违反。


    `PTIJ8`（入职前四周内不能注册课程提供）被涉及，并且由于`WHERE 子句`中`e.HIRED`介于`sysdate - 91`和`sysdate`之间的谓词，它无法被`ETX1`违反。


    `PTIJ9`（不能在离职日期当天或之后注册课程提供）被涉及。对于`ETX1`，`初始状态`应反映过去三个月内雇佣的所有管理员仍在为公司工作。


    `PTIJ10`（不能注册时间重叠的课程）被涉及。对于`ETX1`，`初始状态`应反映这些管理员中无人已注册另一个与 3 月 1 日的`AM4DP`课程提供时间重叠的课程。


    `PTIJ13`（培训师不能注册由其本人教授的课程提供）被涉及。此约束无法被违反，因为管理员不能担任某个课程提供的培训师。


    `PTIJ15`（不能注册与你作为培训师的另一门课程时间重叠的课程提供）被涉及。由于与`PTIJ13`相同的原因，此约束也无法被违反。


    `PODC4`（注册人数超过六人的课程提供必须具有“已确认”状态）被涉及。根据当前的注册人数、该课程提供的当前状态以及被`AM4DP`课程提供注册的管理员人数，`ETX1`很可能会违反此约束。


    `PODC5`（注册人数不能超过课程提供的最大容量）被涉及。同样，根据当前的注册人数以及`ETX1`添加的人数，此约束也可能被违反。


    `PODC6`（已取消的课程提供不能有注册信息）被涉及；如果该课程提供的当前状态等于`''已取消''`，则此约束将被违反。


    ## `习题 3`


    事务`ETX4`的`UPDATE`语句涉及以下完整性约束：`PTIJ1`、`PTIJ3`、`PTIJ4`、`PTIJ6`和`PTIJ7`。除`PTIJ3`外，其余所有约束都有被该语句违反的风险。


