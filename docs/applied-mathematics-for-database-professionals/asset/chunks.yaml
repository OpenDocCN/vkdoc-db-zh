    C H A P T E R 6 **■** T U P L E , TA B L E , A N D D ATA B A S E P R E D I C AT
    E S


    **Database Predicates**


    We continue now by further increasing the scope of data that a predicate deals
    with. After tuple predicates (scope of data is a tuple) and table predicates (scope
    of data is a table), the next level up is predicates that deal with *multiple
    tables*. We’ll call this kind of predicate a *database predicate*. A database
    predicate has one parameter of type database state.


    To show a few examples of predicates that deal with a database state, we first
    introduce a department characterization alongside the earlier introduced employee
    characterization.


    Listing 6-6 defines characterization chr_DEPT that models a department.


    **Listing 6-6.** *Characterization chr_DEPT*


    chr_DEPT := { (deptno; [10..99])


    ,(dname;


    varchar(20))


    ,(loc; {''LOS ANGELES'',''SAN FRANCISCO'',''DENVER''} )


    ,(salbudget;


    [25000..50000]) }


    For a department, the department number (deptno), its name (dname), the department’s
    location (loc), and the salary budget (salbudget) are the relevant attributes
    this characterization captures.


    Figure 6-3 displays an example department table that we name DEP1.


    **Figure 6-3.** *Example table DEP1*


    Check that table DEP1 is a subset of ∏(chr_DEPT) and that it satisfies the table
    predicates shown in Listing 6-7.


    **Listing 6-7.** *Two Example Table Predicates*


    P11(T) := ¬( ∃d1,d2∈T: d1≠d2 ∧d1(deptno)=d2(deptno) )'
  trans: "# 第 6 章：元组、表与数据库谓词\n\n本节关于表谓词的内容，我们将以另一个例子作为结束，该例子引入了另外三个表谓词。代码清单 6-4 首先引入了一个建模员工的特征描述\
    \ `chr_EMP`。\n\n**代码清单 6-4.** `特征描述 chr_EMP`\n\n```\nchr_EMP := { (empno; [100..999])\n\
    \            ,(ename; varchar(20))\n            ,(job; {'MANAGER','CLERK','TRAINER'}\
    \ )\n            ,(sal; [2000..9000])\n            ,(deptno; [10..99]) }\n```\n\
    \n对于一名员工，其员工编号 (`empno`)、姓名 (`ename`)、职位 (`job`)、薪水 (`sal`) 以及所属部门的编号 (`deptno`)\
    \ 是该特征描述所捕获的相关属性。利用这个特征描述，你可以通过从 `∏(chr_EMP)` 中选择一个子集来生成一个员工表。这样的表可以作为参数传递给表谓词。代码清单\
    \ 6-5 引入了三个可以通过参数 `T` 接受基于 `dom(chr_EMP)` 的表作为输入的表谓词。\n\n**代码清单 6-5.** `更多表谓词示例`\n\
    \n```\nP8(T) := ¬( ∃e1,e2∈T: ( (e1(job)='MANAGER' ∧ e2(job)='TRAINER') ∨\n   \
    \                    (e1(job)='TRAINER' ∧ e2(job)='CLERK' ) ) ∧\n            \
    \ e1(sal) ≤ e2(sal) )\nP9(T)  := ( ∀d∈T⇓{deptno}: #{ e2| e2∈T ∧ e2(deptno)=d(deptno)\
    \ } ≥ 3 )\nP10(T) := ( ∀d∈T⇓{deptno}: ( Σe2∈{ e| e∈T ∧ e(deptno)=d(deptno) }:\
    \ e2(sal) ) ≤ 40000 )\n```\n\n表谓词 `P8` 阐述了经理的收入高于培训师，而培训师的收入高于职员。谓词 `P9` 阐述了每个部门至少应有三名员工。谓词\
    \ `P10` 阐述了部门的薪资预算不能超过 `40000`。\n\n图 6-2 展示了一个名为 `EMP1` 的 `∏(chr_EMP)` 子集示例。\n\
    \n**图 6-2.** `示例表 EMP1`\n\n请自行验证 `EMP1` 确实是 `∏(chr_EMP)` 的一个子集，并且它满足谓词 `P8`、`P9`\
    \ 和 `P10`。\n\n**注意：** 鉴于特征描述 `chr_EMP` 中属性 `sal` 的取值集合，最后一个表谓词 `P10`（假设它可被视为一个数据完整性约束）意味着单个部门的员工数永远不可能超过\
    \ `20`，因为 `20` 乘以 `2000`（可能的最低薪资）等于 `40000`（最高的部门薪资预算）。在信息分析过程中，向最终用户提出此类*可推导的*陈述通常非常有用。它可以作为对已建立的数据完整性约束的双重检查，或者更可能的是，它会促使您获得最终用户尚未告知的更多信息。\n\
    \n## 数据库谓词\n\n现在我们继续通过进一步扩大谓词所处理数据的范围来进行探讨。在元组谓词（数据范围是一个元组）和表谓词（数据范围是一张表）之后，下一个层级是处理*多张表*的谓词。我们将这种谓词称为*数据库谓词*。一个数据库谓词有一个类型为数据库状态的参数。\n\
    \n为了展示几个处理数据库状态的谓词示例，我们首先引入一个部门特征描述，与之前引入的员工特征描述并列。\n\n代码清单 6-6 定义了建模部门的特征描述 `chr_DEPT`。\n\
    \n**代码清单 6-6.** `特征描述 chr_DEPT`\n\n```\nchr_DEPT := { (deptno; [10..99])\n   \
    \          ,(dname; varchar(20))\n             ,(loc; {'LOS ANGELES','SAN FRANCISCO','DENVER'}\
    \ )\n             ,(salbudget; [25000..50000]) }\n```\n\n对于一个部门，其部门编号 (`deptno`)、名称\
    \ (`dname`)、所在地 (`loc`) 以及薪资预算 (`salbudget`) 是该特征描述所捕获的相关属性。\n\n图 6-3 展示了一个我们命名为\
    \ `DEP1` 的示例部门表。\n\n**图 6-3.** `示例表 DEP1`\n\n请检查表 `DEP1` 是 `∏(chr_DEPT)` 的一个子集，并且它满足代码清单\
    \ 6-7 所示的表谓词。\n\n**代码清单 6-7.** `两个示例表谓词`\n\n```\nP11(T) := ¬( ∃d1,d2∈T: d1≠d2\
    \ ∧ d1(deptno)=d2(deptno) )\n```"
- fmt: "# CHAPTER 6: TUPLE, TABLE, AND DATABASE PREDICATES\n\n## 125\n\n`P12(T) :=\
    \ ( ∀d1,d2∈T: d1≠d2 ⇒ d1↓{dname,loc}≠d2↓{dname,loc} )`\n表谓词 `P11` 表示不能有两个不同的部门共享相同的部门编号。`P12`\
    \ 表示两个不同的部门要么名称不同，要么位置不同（或两者都不同）。\n\nBy the way, do you see that these two predicates\
    \ are of the same form? You can transform predicate `P11` into a universal quantification\
    \ using rewrite rules, as follows:\n\n```\n¬( ∃d1,d2∈T: d1≠d2 ∧ d1(deptno)=d2(deptno)\
    \ )\n⇔ ( ∀d1,d2∈T: ¬( d1≠d2 ∧ d1(deptno)=d2(deptno) ) )\n⇔ ( ∀d1,d2∈T: ¬(d1≠d2)\
    \ ∨ ¬(d1(deptno)=d2(deptno)) )\n⇔ ( ∀d1,d2∈T: ¬(d1≠d2) ∨ d1(deptno)≠d2(deptno)\
    \ )\n⇔ ( ∀d1,d2∈T: d1≠d2 ⇒ d1(deptno)≠d2(deptno) )\n```\nHere we have used a rewrite\
    \ rule that transforms an existential quantifier into a universal quantifier,\
    \ a De Morgan Law, and a rewrite rule that transforms disjunction into implication.\n\
    \nPredicates `P11` and `P12` are both of the form of one of the common patterns\
    \ of data integrity predicates that we’ll treat in the next section.\n\nYou can\
    \ now construct a database state, say `S1`, as follows: `S1 := { (employee;EMP1),\
    \ (department;DEP1) }`\n\nIn this expression, `EMP1` and `DEP1` represent the\
    \ tables that were introduced in Figures 6-2 and 6-3. You can also represent database\
    \ state `S1` in this way (see `Figure 6-4`).\n\n`Figure 6-4`. Database state `S1`\n\
    \n`S1` represents a database state over the skeleton `{ (employee;{empno,ename,job,sal,\
    \ deptno}), (department;{deptno,dname,loc,salbudget}) }`. As a reminder from the\
    \ previous chapter, you can write expressions such as `S1(employee)` and `S1(department)`,\
    \ which respectively evaluate to `EMP1` (the employee table from Figure 6-2) and\
    \ `DEP1` (the department table from Figure 6-3).\n\nNow let’s take a look at database\
    \ predicates `P13` and `P14` in `Listing 6-8`. Remember parameter `S` represents\
    \ a database state.\n\n## 126\n\n`Listing 6-8`. Two Example Database Predicates\n\
    \n```\nP13(S) := { e(deptno)| e∈S(employee) } ⊆ { d(deptno)| d∈S(department) }\n\
    P14(S) := ( ∀d∈S(department):\n  ( Σe2∈{ e1| e1∈S(employee) ∧ e1(deptno)=d(deptno)\
    \ }: e2(sal) )\n  ≤ d(salbudget) )\n```\nPredicate `P13` states that every employee\
    \ is employed within a department that is known in the department table.\n\nThis\
    \ type of database predicate (the set of values of a specified attribute of one\
    \ table forms a subset of the set of values of a specified attribute of another\
    \ table) is commonly found in database designs and will be treated in more detail\
    \ in the next section. Supplying database state `S1` as the argument to predicate\
    \ `P13` results in the following proposition:\n\n`{10,12} ⊆ {10,11,12,13}`\n\n\
    This is a TRUE proposition. The set of numbers at the left-hand side is a subset\
    \ of the set of numbers at the right-hand side. Again we say that database state\
    \ `S1` satisfies (does not violate) database predicate `P13`. A somewhat more\
    \ succinct way to specify predicate `P13` is as follows: `P13(S) := S(employee)⇓{deptno}\
    \ ⊆ S(department)⇓{deptno}`\n\nWe now use table projection. Supplying state `S1`\
    \ as the value for the parameter results in this proposition:\n\n```\n{ {(deptno;10)},\
    \ {(deptno;12)} } ⊆\n{ {(deptno;10)}, {(deptno;11)}, {(deptno;12)}, {(deptno;13)}\
    \ }\n```\nThis is again a TRUE proposition. The set of two functions at the left-hand\
    \ side is a subset of the set of four functions at the right-hand side.\n\nPredicate\
    \ `P14` states that the sum of the salaries of all employees in the employee table\
    \ that work in a particular department should not exceed the salary budget for\
    \ that department as found in the department table. Database state `S1` also satisfies\
    \ `P14`.\n\nAs with tuple and table predicates, some cases of database predicates\
    \ are considered degenerate cases. If a database predicate, say `P`, can be rewritten\
    \ into a predicate with the following pattern, we consider the database predicate\
    \ a degenerate case: `P(S) := Q(S(T))`\n\nIf a database predicate is of the preceding\
    \ form, then it involves only one table structure.\n\nIn the right-hand side expression,\
    \ `T` represents one of the table structure names in a database state `S`. `S(T)`\
    \ then represents the corresponding table, and `Q` represents a table predicate.\
    \ Database predicates that involve just one table structure (in the preceding\
    \ case, `T`) are considered degenerate. These degenerate cases are in fact disguising\
    \ a table predicate. In the next chapter we’ll require for these cases that `Q`\
    \ is introduced as a table predicate and that database predicate `P` is discarded.\n\
    \nWithout loss of generality, we again confine our attention to database predicates\
    \ that cannot be decomposed into multiple conjuncts. If you can rewrite a given\
    \ database predicate `P(S)` into an expression of the form `Pa(S) ∧ Pb(S)`, then\
    \ you are in fact dealing with two database predicates.\n\n## 127\n\n### A Few\
    \ Remarks on Data Integrity Predicates\n\nWe conclude the introduction of the\
    \ preceding three classes of data integrity predicates with a few observations.\n\
    \nAs you’ve seen through the various examples, we can elegantly use tuple, table,\
    \ and database predicates to formally define the conditions (business rules) that\
    \ are part of the real world and that need to be reflected somehow in the specification\
    \ of a database design. The predicate class (tuple, table, or database) to which\
    \ a business rule maps is fully dependent on the given database skeleton of the\
    \ database design. For instance, predicate `P8` (see `Listing 6-5`) is a table\
    \ predicate because all the information to formally specify the business rule\
    \ that managers earn more than trainers, and trainers earn more than clerks, is\
    \ available within the employee table structure. Now, if for some reason a separate\
    \ table structure, say `trainer`, was introduced to hold all trainer information\
    \ (rendering `employee` to hold only manager and clerk information), then this\
    \ real-world constraint would map to a database predicate involving both table\
    \ structures `employee` and `trainer`.\n\nYou might have a question regarding\
    \ the way we’ve introduced data integrity predicates in this chapter. In the various\
    \ examples you’ve seen, we’ve employed these predicates to show whether a given\
    \ tuple, table, or database state satisfies them. However, when formally specifying\
    \ a database design, we aren’t interested in a single database state (or table\
    \ or tuple). We are interested in a database state space: a set that holds all\
    \ values that we allow for our database.\n\nWe intend to mathematically model\
    \ such a database state space that represents the value set for a database variable\
    \ (this will be done in Chapter 7). When we do so, we’ll use the three classes\
    \ of data integrity predicates introduced in this chapter, in a sophisticated\
    \ manner such that they represent data integrity constraints that play a role\
    \ at the database state space level.\n\n### Common Patterns of Table and Database\
    \ Predicates\n\nThis section will establish five common patterns of table and\
    \ database predicates: unique identification predicates, subset requirement predicates,\
    \ specialization predicates, generalization predicates, and tuple-in-join predicates.\
    \ These five patterns of data integrity predicates are common in database designs\
    \ and are therefore important enough to justify a separate section dealing with\
    \ them.\n\n### Unique Identification Predicate"
