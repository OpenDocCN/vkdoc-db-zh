    ![](img/00002.jpeg)


    # 关于技术评审员


    ## Chris Date


    **Chris Date** 是一位专注于关系数据库系统的独立作者、讲师、研究员和顾问。他是最早认识到 Ted Codd 在关系模型方面开创性工作的根本重要性的人之一。他还参与了
    `IBM` 产品 `SQL/DS` 和 `DB2` 在加州圣何塞的 `IBM` Santa Teresa 实验室的技术规划。他以其著作而闻名——特别是 *An
    Introduction to Database Systems*, Eighth Edition (Addison-Wesley, 2003)，该领域的标准教材，全球销量已近七十五万册——以及（与
    Hugh Darwen 和 Nikos A. Lorentzos 合著的）*Temporal Data and the Relational Model*
    (Morgan Kaufmann, 2002)。

