- fmt: '# CHAPTER 11 IMPLEMENTING DATABASE DESIGNS IN ORACLE


    ### Listing 11-20. Attribute Constraints for `DEPT` Table Structure


    ```sql

    alter table DEPT add constraint dep_chk_dno check (deptno > 0);

    alter table DEPT add constraint dep_chk_dnm check (upper(dname) = dname);

    alter table DEPT add constraint dep_chk_loc check (upper(loc) = loc);

    alter table DEPT add constraint dep_chk_mgr check (mgr > 999);

    ```


    ### Listing 11-21. Attribute Constraints for `CRS` Table Structure


    ```sql

    alter table CRS add constraint reg_chk_code check (code = upper(code));

    alter table CRS add constraint reg_chk_cat check (cat in (''GEN'',''BLD'',''DSG''));

    alter table CRS add constraint reg_chk_dur1 check (dur between 1 and 15);

    ```


    ### Listing 11-22. Attribute Constraints for `OFFR` Table Structure


    ```sql

    alter table OFFR add constraint ofr_chk_crse check (course = upper(course));

    alter table OFFR add constraint ofr_chk_strs check (trunc(starts) = starts);

    alter table OFFR add constraint ofr_chk_stat check (status in (''SCHD'',''CONF'',''CANC''));

    alter table OFFR add constraint ofr_chk_trnr check (trainer > 999);

    alter table OFFR add constraint ofr_chk_mxcp check (maxcap between 6 and 99);

    ```


    **Note** You might be wondering how an SQL DBMS deals with constraint `ofr_chk_trnr`
    whenever it encounters `NULL`s in the `TRAINER` column. We’ll discuss this at
    the end of this section.


    ### Listing 11-23. Attribute Constraints for `REG` Table Structure


    ```sql

    alter table REG add constraint reg_chk_stud check (stud > 999);

    alter table REG add constraint reg_chk_crse check (course = upper(course));

    alter table REG add constraint reg_chk_strs check (trunc(starts) = starts);

    alter table REG add constraint reg_chk_eval check (eval between -1 and 5);

    ```


    If a declarative `check` constraint evaluates to `UNKNOWN`, usually arising from
    the use of `NULL`s, then the SQL standard considers the constraint satisfied;
    the `check` evaluates to `TRUE`. Beware; you’ll observe the opposite behavior
    in the PL/SQL programming language. Here a Boolean expression evaluating to unknown
    is handled as `FALSE`. To illustrate this, take a look at the following trigger
    definition; it is *not* equivalent to `check` constraint `ofr_chk_trnr`:


    ```sql

    create trigger ofr_chk_trnr

    after insert or update on OFFR

    for each row

    begin

    if not (:new.trainer > 999)

    then

    raise_application_error(-20999,''Value for trainer must be greater than 999.'');

    end if;

    end;

    ```


    The declarative `check` constraint will allow a `NULL` in the `TRAINER` column,
    whereas the preceding trigger won’t allow a `NULL` in the `TRAINER` column. You
    can fix this discrepancy by changing the fifth line in the preceding trigger definition
    into the following:


    ```sql

    if not (:new.trainer > 999 or :new.trainer IS NULL)

    ```


    The trigger is now equivalent to the declarative `check` constraint.


    We continue by investigating how you can implement tuple constraints (the next
    level after attribute constraints) in Oracle’s SQL DBMS.


    ## Implementing Tuple Constraints


    Before we deal with the implementation of tuple constraints, we need to confess
    something up front. The formal methodology that has been developed in this book
    is based on 2-valued logic (`2VL`). The science of `2VL` is sound; we’ve explored
    propositions and predicates in Chapters 1 and 3 and developed some rewrite rules
    with it. However, in this chapter we’ll make various statements about predicates
    that are expressed in SQL. As demonstrated by the preceding trigger and attribute
    constraint `ofr_chk_trnr` in Listing 11-22, due to the possible presence of `NULL`s
    SQL doesn’t apply `2VL`; instead it applies 3-valued logic (`3VL`). The most crucial
    assumption in `3VL` is that, besides the two truth values `TRUE` and `FALSE`,
    a third value represents “possible” or `UNKNOWN`.


    **Note** `3VL` is counterintuitive, as opposed to the classical `2VL`. We won’t
    provide an in-depth discussion of `3VL` here; you can find a brief exploration
    of `3VL` in Appendix D.


    We admit up front that we’re taking certain liberties in this chapter. By using
    `NOT NULL` on almost all columns in the SQL implementation of the example database
    design, we’re in effect avoiding `3VL` issues. Without the use of `NOT NULL`,
    various statements we’re making about logical expressions in this chapter would
    be open to question.


    As you saw in Chapter 1, conjunction, disjunction, and negation are *truth functionally
    complete*. Therefore, you can rewrite every formally specified tuple constraint
    into an equivalent specification that uses just the three connectives that are
    available in SQL.


    Once transformed in such a way, all tuple constraints can—and therefore should—be
    stated declaratively as `check` constraints. You can use the `alter table add
    constraint` statement to declare them to the DBMS. Let’s demonstrate this using
    the tuple constraints of the `EMP` table structure. For your convenience, we repeat
    the tuple universe definition `tup_EMP` here:


