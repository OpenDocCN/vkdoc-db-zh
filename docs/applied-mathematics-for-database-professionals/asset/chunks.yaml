    of two tables with the same heading always produces another table. Like the intersection,
    the difference operator is also closed over tables when the operands are tables
    over *different* sets.


    However, here too, in these cases the difference is useless because it always
    results in the first table; the second table cannot have tuples that are in the
    first table (due to the different headings). Hence, tuples will never be “removed”
    from the first set.


    Because the difference operator is not commutative, we note the two special cases
    when the empty set is involved as an operand (in contrast with the preceding intersection
    and union). Let T be a given table; then T–∅ always results in a given table T,
    and ∅–T always results in the empty table.


