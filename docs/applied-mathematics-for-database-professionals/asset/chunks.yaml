    **De Morgan Laws**


    The laws of De Morgan (1806–1871) are quite useful for manipulating expressions
    involving negation, and are shown in Listing 3-8.


    **Listing 3-8.** *De Morgan Laws*


    ¬( P ∨ Q ) ⇔ ( ¬P ∧ ¬Q )


    ¬( P ∧ Q ) ⇔ ( ¬P ∨ ¬Q )


    Using plain English, these laws describe that “the negation of a disjunction equals
    the conjunction of the negations (of the operands)” and vice versa “the negation
    of a conjunction equals the disjunction of the negations.”


