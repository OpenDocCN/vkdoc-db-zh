    ## 致谢


    **本**项目始于 2005 年夏末，由于一些不幸的情况，耗时远超原计划。我的合著者在联系我共同撰写一本“关于我们职业中的数学”的书时，已经被确诊。我们于
    2005 年 10 月开始写作，首先花了很多时间一起开发将贯穿全书的示例数据库设计——尤其是其中涉及的数据完整性约束。数据库设计完成后，他说过一次：“我从头开始写，你从结尾开始写，然后我们会在中间某个地方会合。”
    在随后的几个月里，莱克斯付出了巨大努力，完成了引言到第三章。不幸的是，在 2005 年圣诞节前后，他的情况迅速恶化，未能看到这本书的其余部分。


    值得庆幸的是，我得到了许多其他人的支持，才得以完成这个项目。


    我的主要审阅者对本书质量的贡献是巨大的。我要感谢克里斯·戴特、卡里·米尔萨普、休·达文和弗兰斯·雷门，感谢他们审阅手稿，并提出了许多改进本书的意见和建议。


    我也非常感谢我在 Centraal Boekhuis 的一些同事为本书付出的时间：雅普·德·克莱克、洛特·范登·胡克和埃米尔·范·博克尔审阅了若干章节；佩特拉·范德·克拉茨在我为英语表达所困时提供了帮助；以及罗纳德·詹森对本项目的全面支持。


    我必须提及我从 Apress 的工作人员那里获得的支持，特别是我的编辑乔纳森·詹尼克试，即使在原计划需要彻底修改的情况下，他仍然致力于本书，以及 Apress
    参与本书制作的其他人——这些是我唯一从未亲自见面的：特蕾西·布朗·柯林斯、蒂娜·尼尔森、苏珊娜·戴维森·法尔泽、凯利·温奎斯特和艾普丽尔·埃迪。


    我还想提及其他几个人：莫根斯·诺加德，在莱克斯去世后 2006 年初那段艰难时期给予我的支持；朱丽叶特·努伊滕，她对本项目的持续支持；以及伯特·德·布洛克，感谢他和弗兰斯·雷门在
    20 多年前提供的极具影响力的数据库系统课程。没有那些课程，本书就不会存在。


    当然，我也必须感谢我的妻子，感谢她让我有机会开启并完成这个项目，还有我们的孩子们，感谢他们的耐心，尤其是最后这三个月；我不得不向他们保证，甚至不去想再写一本书的事。


    最后，我要感谢莱克斯，他发起了这本书，并决定联系我作为他的合著者。


    好了，莱克斯，我们终于做到了，你的最后一个项目完成了。


    Toon Koppelaars


    荷兰，扎尔特博默尔，2007 年 3 月


