    Foreword


    **W**e welcome this contribution to the database literature. It is another book
    on the theory and practice of relational databases, but this one is interestingly
    different. The bulk of the book is devoted to a treatment of the theory. The treatment
    is not only rigorous and mathematical, but also rather more approachable than
    some other texts of this kind. The authors clearly recognize, as we do, the importance
    of logic and mathematics if database study is to be taken seriously. They have
    done a good job of describing a certain formalism developed by their former teachers,
    Bert de Brock and Frans Remmen. This formalism includes some ideas that will be
    novel to many readers, even those who already have a degree of familiarity with
    the subject. A particularly interesting novel idea, to us, is the formalization
    of updating and transactions in Chapter 10.


    The formalism is interestingly different from the approach we and several others
    have adopted. The differences do not appear to be earth-shattering, but the full
    consequences are not immediately obvious to us, and we hope they will provoke
    discussion. One major difference is the omission of any in-depth treatment of
    types. This omission can be justified because relations are orthogonal to the
    types available for their attributes, so the two issues are somewhat separable
    even though any relational database language must of course deal with both of
    them. Closely related to the issue of types, and possibly a consequence of the
    omission we have noted, is the fact that there is only one empty relation under
    the De Brock/'
