  trans: '

    让我们通过描述两个并发执行的事务场景来演示这个可串行性问题，这两个事务都可能违反 `EMP_TAB03` 约束。为简单起见，假设 `EMP` 表结构当前包含一行，代表在部门
    20 工作的管理员。事务 `TX1` 在 `EMP` 表结构中插入一名在部门 20 工作的经理。事务 `TX2` 从 `EMP` 表结构中删除在部门 20
    工作的管理员。现在请查看表 11-2，它描述了这两个事务并发执行的可能场景。


    ```

    表 11-2. TX1 和 TX2 并发执行

    时间        TX1       TX2       DI 代码

    ----------------------------------------------------------

    t=0                   插入      找到管理员；因此允许此次插入。

    t=1                   删除      未找到经理；因此允许此次删除。

    t=2                   提交

    t=3                   提交

    ```


    在时间 `t=0`，事务 `TX1` 开始。它插入经理，这导致执行约束 `EMP_TAB03` 的 DI 代码。作为此 DI 代码一部分执行的约束验证查询找到了部门
    20 的管理员，这导致 DI 代码允许此次插入。在时间 `t=1`，事务 `TX2` 开始。它删除 `EMP` 表结构中代表管理员的唯一一行。删除管理员也会触发执行约束
    `EMP_TAB03` 的相同 DI 代码。作为此 DI 代码一部分执行的约束验证查询没有找到在部门 20 工作的经理（或总裁），这导致 DI 代码也允许此次删除。


    **注意：** 在 `t=1`，事务 `TX2` 内执行的查询看不到事务 `TX1` 所做的未提交更改。


    在 `t=2`，事务 `TX1` 提交。在 `t=3`，事务 `TX2` 提交。数据库现在违反了约束 `EMP_TAB03`；`EMP` 表结构中持有一名在部门
    20 工作的经理，但该部门却没有管理员。


    让我们也在约束 `DEPT_TAB01` 的上下文中看一个例子。假设 `DEPT` 表结构当前包含一个由员工 1042 管理的部门。事务 `TX3` 插入一个同样由员工
    1042 管理的新部门。事务 `TX4` 也插入一个再次由员工 1042 管理的部门。请看表 11-3，它描述了这两个事务并发执行的可能场景。


    ```

    表 11-3. TX3 和 TX4 并发执行

    时间        TX3       TX4       DI 代码

    ----------------------------------------------------------

    t=0                   插入      看到 1042 现在管理两个部门；因此允许此次插入。

    t=1                   插入      看到 1042 现在管理两个部门；因此允许此次插入。

    t=2                   提交

    t=3                   提交

    ```


    同样，在 `t=1` 时于 `TX4` 中执行的 DI 代码看不到事务 `TX3` 在 `t=0` 插入的未提交部门。两次插入都成功执行。在 `t=3` 之后，数据库违反了约束
    `DEPT_TAB01`；员工 1042 正在管理三个部门。


    对于每一个多元组约束，你都可以设计一个并发执行事务的场景，使得这些事务提交后，数据库处于违反约束的状态。请注意，这与用于实现 DI 代码的执行模型无关。


    那么，问题是你能解决这个问题吗？答案是肯定的。然而，这要求你在 DI 代码中开发并嵌入有时相当复杂的串行化代码，以确保永远不会有 *两个涉及相同约束的事务同时执行*
    （即，运行相同约束的验证查询）。


    **注意：** 以下部分假设你熟悉 Oracle 的 `dbms_lock` 包和自治事务的概念。如果不熟悉，我们建议你首先学习 Oracle 关于此包和自治事务的文档。

