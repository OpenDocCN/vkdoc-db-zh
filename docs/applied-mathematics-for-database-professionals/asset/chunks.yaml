    We’ll end this section with an observation about the poor declarative support
    for multi-tuple constraints offered by DBMS vendors.


    Because we believe that it is not possible for a DBMS vendor to program an algorithm
    that accepts an arbitrarily complex predicate and then computes efficient TE queries,
    a minimal validation query, and optimal serialization code to implement execution
    model EM6, we should not expect full support for multi-tuple constraints—in a
    practical, usable and acceptable way—from these vendors in the future. The best
    we can hope for is that database researchers first come up with more common classes
    of constraints and develop convenient shorthands for these. The DBMS vendors,
    in their turn, should then provide us with new declarative constructs, consistent
    with these shorthands, to state these common classes of constraints easily to
    the DBMS. Given such a common class declaration, the DBMS vendor should be able
    to program an algorithm that provides us with an EM6-like execution model under
    the covers to implement the constraint.


    **■Note** We’ve hinted at a few common classes of constraints in this book for
    which DBMS vendors should offer us full declarative support: specialization, generalization,
    and tuple-in-join constraints. Also, in the area of subset requirement constraints—where
    we currently only have the SQL foreign key construct available to us—more declarative
    variations should be offered.


