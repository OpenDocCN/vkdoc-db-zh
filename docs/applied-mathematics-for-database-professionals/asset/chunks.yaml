  trans: '# 第 7 章 指定数据库设计


    ## 表


    ### 外部谓词


    员工编号为`EMPNO`的员工，其姓名为`ENAME`，职位为`JOB`，出生于`BORN`，入职于`HIRED`，在`SGRADE`薪资等级内月薪为`MSAL`美元，分配至账户`USERNAME`，并为部门编号`DEPTNO`的部门工作。


    **SREP**

    员工编号为`EMPNO`的销售代表，其年度销售目标为`TARGET`美元，年度佣金为`COMM`美元。


    **MEMP**

    员工编号为`EMPNO`的员工，由员工编号为`MGR`的员工管理。


    **TERM**

    员工编号为`EMPNO`的员工，已于日期`LEFT`离职或被解雇，原因为`COMMENTS`。


    DEPT

    部门编号为`DEPTNO`的部门，其名称为`DNAME`，位于`LOC`，由员工编号为`MGR`的员工管理。


    GRD

    ID 为`GRADE`的薪资等级，其月薪下限为`LLIMIT`美元，月薪上限为`ULIMIT`美元，年度最高奖金为`BONUS`美元。


    CRS

    代码为`CODE`的课程，其描述为`DESCR`，属于课程类别`CAT`，持续时间为`DUR`天。


    OFFR

    课程代码为`COURSE`、开课日期为`STARTS`的课程开设，其状态为`STATUS`，最大容纳学员数为`MAXCAP`，开设地点为`LOC`，且（除非`TRAINER`等于-1）该开设分配有员工编号为`TRAINER`的员工作为培训师。


    REG

    员工编号为`STUD`的员工，已注册课程代码为`COURSE`、开课日期为`STARTS`的课程，且（除非`EVAL`等于-1）已为该课程给出评分为`EVAL`。


    HIST

    在日期`UNTIL`，对于员工编号为`EMPNO`的员工，其部门或月薪（或两者）发生了变更。在日期`UNTIL`之前，该员工的部门为`DEPTNO`，月薪为`MSAL`。


    注：你发现这里的两处“取巧”了吗？显然，这里存在两种类型的课程开设：分配了培训师的开设和未分配培训师的开设。对于注册记录也可以做类似评论；有些包含课程开设的评分，有些则没有。在设计合理的数据库中，你应该将开设和注册表结构各自分解为两个表结构。


    这些外部谓词让你对数据库骨架引入的所有相关表结构及其属性的含义有了一个非正式的初步了解。随着我们在后续章节中完成数据库 universe 定义的所有正式阶段，这个示例数据库设计的确切含义将变得清晰。


    下一节将为骨架中引入的每个表结构提供特征描述。


    ## 特征描述


    正如你在第 4 章所见，特征描述定义了给定表结构的属性的值集。对于一个给定的表结构，特征描述是一个集合值函数，其定义域是该表结构的属性集合。对于每个属性，特征描述给出该属性的属性值集。特征描述构成了下一节构建元组
    universe 的基础。然后你会注意到，这里定义这些特征描述的方式非常方便。看一下代码清单 7-2。


    它定义了`EMP`表的特征描述。


    注：几点说明：

    - 在定义`EMP`表的属性值集时，我们使用了表 2-4 中引入的集合简写名称。

    - 我们使用 `chr_<表结构名称>` 作为表结构特征描述的命名约定。

    - 在 `chr_EMP` 的定义中（以及其他一些地方），你会看到一个名为 `upper` 的函数。该函数接受一个区分大小写的字符串，并返回该字符串的大写版本。'
- fmt: '# Tuple Universes


    ## Listing 7-2. Characterization chr_EMP


    `chr_EMP` :=

    { ( `EMPNO`; `[1000..9999]` )

    , ( `ENAME`; `varchar(9)` )

    , ( `JOB`; /* Five JOB values allowed */

    {''PRESIDENT'',''MANAGER'',''SALESREP'',

    ''TRAINER'',''ADMIN''} )

    , ( `BORN`; `date` )

    , ( `HIRED`; `date` )

    , ( `SGRADE`; `[1..99]` )

    , ( `MSAL`; { n | n∈`number(7,2)` ∧ n > 0 } )

    , ( `USERNAME`; /* Usernames are always in uppercase */

    { s | s∈`varchar(15)` ∧

    `upper(USERNAME)` = `USERNAME` } )

    , ( `DEPTNO`; `[1..99]` )

    }


    For every attribute of table structure `EMP`, function `chr_EMP` yields the attribute
    value set for that attribute. You can now write expressions such as `chr_EMP(EMPNO)`,
    which represents the attribute value set of the `EMPNO` attribute of the `EMP`
    table structure. The expression denotes set `[1000..9999]`.


    The definition of characterization `chr_EMP` tells us the following:

    - `EMPNO` values are positive integers within the range 1000 to 9999.

    - `ENAME` values are variable length strings with at most nine characters.

    - `JOB` values are restricted to the following five values: ''PRESIDENT'', ''MANAGER'',
    ''SALESREP'', ''TRAINER'',''ADMIN''.

    - `BORN` and `HIRED` values are date values.

    - `SGRADE` values are positive integers in the range 1 to 99.

    - `MSAL` values are positive numbers with precision seven and scale two.

    - `USERNAME` values are uppercase variable length strings with at most 15 characters.

    - `DEPTNO` values are positive integers in the range 1 to 99.


    In the remainder of our database design definition, four sets will occur quite
    frequently: employee numbers, department numbers, salary-related amounts, and
    course codes. We define shorthand names (symbols for ease of reference in the
    text) for them here, and use these in the characterization definitions that follow.


    `EMPNO_TYP` := { n | n∈`number(4,0)` ∧ n > 999 }

    `DEPTNO_TYP` := { n | n∈`number(2,0)` ∧ n > 0 }

    `SALARY_TYP` := { n | n∈`number(7,2)` ∧ n > 0 }

    `CRSCODE_TYP` := { s | s∈`varchar(6)` ∧ s = `upper(s)` }


    Listings 7-3 through 7-11 introduce the characterization for the remaining table
    structures. You might want to revisit Table 7-1 (the external predicates) while
    going over these characterizations. Embedded comments clarify attribute constraints
    where deemed necessary.


    ## Listing 7-3. Characterization chr_SREP


    `chr_SREP` :=

    { ( `EMPNO`; `EMPNO_TYP` )

    /* Targets for sales reps are five digit numbers */

    , ( `TARGET`; `[10000..99999]` )

    , ( `COMM`; `SALARY_TYP` )

    }


    ## Listing 7-4. Characterization chr_MEMP


    `chr_MEMP` :=

    { ( `EMPNO`; `EMPNO_TYP` )

    , ( `MGR`; `EMPNO_TYP` )

    }


    ## Listing 7-5. Characterization chr_TERM


    `chr_TERM` :=

    { ( `EMPNO`; `EMPNO_TYP` )

    , ( `LEFT`; `date` )

    , ( `COMMENTS`; `varchar(60)` )

    }


    ## Listing 7-6. Characterization chr_DEPT


    `chr_DEPT` :=

    { ( `DEPTNO`; `DEPTNO_TYP` )

    , ( `DNAME`; { s | s∈`varchar(12)` ∧ `upper(DNAME)` = `DNAME` } )

    , ( `LOC`; { s | s∈`varchar(14)` ∧ `upper(LOC)` = `LOC` } )

    , ( `MGR`; `EMPNO_TYP` )

    }


    ## Listing 7-7. Characterization chr_GRD


    `chr_GRD` :=

    { ( `GRADE`; { n | n∈`number(2,0)` ∧ n > 0 } )

    , ( `LLIMIT`; `SALARY_TYP` )

    , ( `ULIMIT`; `SALARY_TYP` )

    , ( `BONUS`; `SALARY_TYP` )

    }


    ## Listing 7-8. Characterization chr_CRS


    `chr_CRS` :=

    { ( `CODE`; `CRSCODE_TYP` )

    , ( `DESCR`; `varchar(40)` )

    /* Course category values: Design, Generate, Build */

    , ( `CAT`; {''DSG'',''GEN'',''BLD''} )

    /* Course duration must be between 1 and 15 days */

    , ( `DUR`; `[1..15]` )

    }


    ## Listing 7-9. Characterization chr_OFFR


    `chr_OFFR` :=

    { ( `COURSE`; `CRSCODE_TYP` )

    , ( `STARTS`; `date` )

    /* Three STATUS values allowed: Scheduled, Confirmed, Canceled */

    , ( `STATUS`; {''SCHD'',''CONF'',''CANC''} )

    /* Maximum course offering capacity; minimum = 6 */

    , ( `MAXCAP`; `[6..100]` )

    /* TRAINER = -1 means "no trainer assigned" */

    , ( `TRAINER`; `EMPNO_TYP` ∪ { -1 } )

    , ( `LOC`; `varchar(14)` )

    }


    ## Listing 7-10. Characterization chr_REG


    `chr_REG` :=

    { ( `STUD`; `EMPNO_TYP` )

    , ( `COURSE`; `CRSCODE_TYP` )

    , ( `STARTS`; `date` )

    /* -1: too early to evaluate (course is in the future) */

    /* 0: not evaluated by attendee */

    /* 1-5: regular evaluation values (from 1=bad to 5=excellent) */

    , ( `EVAL`; `[-1..5]` )

    }


    ## Listing 7-11. Characterization chr_HIST


    `chr_HIST` :=

    { ( `EMPNO`; `EMPNO_TYP` )

    , ( `UNTIL`; `date` )

    , ( `DEPTNO`; `DEPTNO_TYP` )

    , ( `MSAL`; `SALARY_TYP` )

    }


    Note that in Listing 7-9 the attribute value set for attribute `TRAINER` includes
    a special value -1 next to valid employee numbers. This value represents the fact
    that no trainer has been assigned yet. In our formal database design specification
    method, there is no such thing as a `NULL`, which is a “value” commonly (mis)used
    by SQL database management systems to indicate a missing value. There are no missing
    values inside tuples; they always have a value attached to every attribute. Characterizations
    specify the attribute value sets from which these values can be chosen. So, to
    represent a “missing trainer” value, you must explicitly include a value for this
    fact inside the corresponding attribute value set. Something similar is specified
    in Listing 7-10 in the attribute value set for the `EVAL` attribute.


    **Note:** Appendix F will explicitly deal with the phenomenon of `NULL`s. Chapter
    11 will revisit these -1 values when we sort out the database design implementation
    issues and provide guidelines.


    The specification of our database design started out with a skeleton definition
    and the external predicates for the table structures introduced by the skeleton.
    In this section you were introduced to the characterizations of the example database
    design. Through the attribute value sets, you are steadily gaining more insight
    into the meaning of this database design.


    The following section will advance this insight to the next layer: the tuple universes.


    # Tuple Universes


    A tuple universe is a (non-empty) set of tuples. It is a very special set of tuples;
    this set is meant to hold only tuples that are admissible for a given table structure.
    You know by now that tuples are represented as functions. For instance, here is
    an example function `tdept1` that represents a possible tuple for the `DEPT` table
    structure:


    `tdept1` := `{(DEPTNO;10), (DNAME;''ACCOUNTING''), (LOC;''DALLAS''), (MGR;1240)}`


    As you can see, the domain of `tdept1` represents the set of attributes for table
    structure `DEPT` as introduced by database skeleton `DB_S`.


    `dom(tdept1)` = `{DEPTNO, DNAME, LOC, MGR}` = `DB_S(DEPT)`


    And, for every attribute, `tdept1` yields a value from the corresponding attribute
    value set, as introduced by the characterization for the `DEPT` table structure:

    - `tdept1(DEPTNO)` = 10, which is an element of `chr_DEPT(DEPTNO)`

    - `tdept1(DNAME)` = ''ACCOUNTING'', which is an element of `chr_DEPT(DNAME)`

    - `tdept1(LOCATION)` = ''DALLAS'', which is an element of `chr_DEPT(LOCATION)`

    - `tdept1(MGR)` = 1240, which is an element of `chr_DEPT(MGR)`


    Here’s another possible tuple for the `DEPT` table structure: `tdept2` := `{(DEPTNO;20),
    (DNAME;''SALES''), (LOC;''HOUSTON''), (MGR;1755)}`


    Now consider the set `{tdept1, tdept2}`. This is a set that holds two tuples.
    Theoretically it could represent the tuple universe for the `DEPT` table structure.
    However, it is a rather small tuple universe; it is very unlikely that it represents
    the tuple universe for the `DEPT` table structure. The tuple universe for a given
    table structure should hold *every* tuple that we allow (admit) for the table
    structure.


    **Note:** Tuples `tdept1` and `tdept2` are functions that share the same domain.
    This is a requirement for a tuple universe; all tuples in the tuple universe share
    the same domain, which in turn is equal to the heading of the given table structure.'
