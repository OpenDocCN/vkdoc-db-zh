    # 第十章 数据操作


    ## 规范概述


    规范 `FEa` 使用基于 `dbs(REG)` 的查询结果来重新初始化 `REG` 表结构。该查询检索所有应*保留*在数据库状态中的注册记录；也就是说，所有不满足以下条件的元组：注册的学生是
    `3124`，且对应一个未来开课、状态为 `confirmed` 或 `scheduled` 的课程。


    `FEb` 执行类似操作，只是现在的查询基于 `REG` 和 `OFFR` 的连接。


    请注意，与 `FEa` 相比，本规范中我们根据德摩根定律重写了否定条件。该查询现在检索所有满足以下任一条件的注册记录：不是为学生 `3124` 注册的，或者对应一个过去（包括今天）开课的课程，或者状态为
    `canceled`。


    `FEc` 指定此事务的方式可能是最直观的。它指定一个包含所有需要删除的注册记录的表，然后使用差集运算符 (`−`) 将其从 `dbs(REG)` 中减去。这种指定方式与使用
    SQL 指定此事务的方式（参见 `SEI`）非常相似。


    正如你现在所理解的，在我们的形式化方法中，事务是通过为每个可能的起始状态定义其终止状态来指定的。这涉及为每个表结构指定一个表。相比之下，使用 SQL 时，你只需指定事务实现的*数据变化*；不需要指定保持不变的数据。


    此刻你可能在想，形式化指定事务是相当繁琐的。


    然而，你应该意识到，前述事务 `ETX2` 的 SQL 表达式实际上是一种简写表示法。它指定了 SQL 表变量 `REG` 被（重新）赋值为其起始状态的值减去一个查询的结果集，该查询本质上由
    `DELETE` 语句的 `WHERE` 子句指定。


    ### 注意


    使用本书介绍的数学方法，你也可以开发形式化的简写表达式。Bert De Brock 在他的著作《*Foundations of Semantic Databases*》（Prentice
    Hall, 1995）中为常见类型的事务（例如从表结构中删除元组）开发了这些简写。然而，因为这涉及引入一些更复杂的数学概念，我们不会在本书中开发形式化的简写。我们建议感兴趣的读者参考
    De Brock 著作的第 7 章。


    ## 事务规范示例


    关于在代码清单 10-2 中指定 `ETX2` 的几种方式，有一个要点需要说明。它们都涉及 `OFFR` 表结构来确定课程是否具有 `scheduled`
    或 `confirmed` 状态。实际上，这种涉及并非必需。给定约束 `POD6`（已取消的课程不能有注册记录），结合 `OFFR` 中 `STATUS`
    属性的属性值集（仅允许三个值：`scheduled`、`confirmed` 和 `canceled`），你可以*推断*出，如果一个课程有注册记录，那么该课程的状态将是
    `scheduled` 或 `confirmed`。你无需在事务中指定这一点。


    以下是事务 `ETX2` 的等效形式化规范和 SQL 规范：


    **`FEa`**:

    ```math

    dbs↓{EMP,SREP,MEMP,TERM,DEPT,GRD,CRS,OFFR,HIST}

    ∪

    { (REG; { r | r∈dbs(REG) ∧ ¬ ( r(STUD) = 3124 ∧ r(STARTS) > sysdate ) } ) }

    ```


    **`SEII`**:

    ```sql

    delete from REG r

    where r.STUD = 3124

    and r.STARTS > sysdate

    ```


    你可以认为这些规范更高效；如果以这种不太复杂的方式指定事务，数据库管理系统 (DBMS) 执行它时可能需要的资源更少。


    使用已建立的、已知的数据完整性约束知识，将形式化规范——无论是事务、查询，甚至是约束——重写为不太复杂的规范，被称为*语义优化*。


    ### 注意


    一个真正的关系数据库管理系统应该能够自动为我们执行这种语义优化。不幸的是，能够执行如此复杂语义优化的 DBMS 目前仍不可用。


    这主要是因为当前的 DBMS 对声明式指定的数据完整性约束支持仍然很差。这种对声明式支持的不足也是本书设有第 11 章的原因。


    ## 更新事务示例


    另一个常见的事务是更新数据库中的元组。代码清单 10-4 给出了一个更新某些课程最大容量的示例。它将所有计划在阿姆斯特丹开课的未来课程的最大容量翻倍。


    **代码清单 10-4.** *事务 `ETX3(dbs)`*


    **`FEa`**:

    ```math

    dbs↓{SREP,MEMP,TERM,EMP,DEPT,GRD,CRS,REG,HIST}

    ∪

    { (OFFR; { o | o∈dbs(OFFR) ∧ ¬ (o(STARTS) > sysdate ∧ o(LOC) = ''AMSTERDAM'')
    }

    ∪

    { o↓{COURSE,STARTS,STATUS,TRAINER,LOC}

    ∪ { (MAXCAP; 2 * o(MAXCAP)) }

    | o∈dbs(OFFR) ∧ o(STARTS) > sysdate ∧ o(LOC) = ''AMSTERDAM'' }

    ) }

    ```


    **`SEI`**:

    ```sql

    update OFFR o

    set o.MAXCAP = 2 * o.MAXCAP

    where o.STARTS > sysdate

    and o.LOC = ''AMSTERDAM''

    ```


    规范 `FEa` 清楚地表明，更新元组的子集可以被视为首先删除这些元组，然后使用更新后的属性值重新插入它们。`FEa` 定义第四行中并集运算符的第一个操作数代表
    `OFFR` 表，其中未来在阿姆斯特丹开课的课程已被删除。该并集运算符的第二个操作数代表以翻倍最大容量重新插入这些课程。


    同样，如表达式 `SEI` 所示，SQL 提供了一种方便的简写来指定更新事务。


    我们继续看另一个更新事务示例。代码清单 10-5 中的事务 `ETX4` 更新某些员工的薪资。请注意，状态转换约束 `STC5`（见代码清单 8-8）要求薪资更新必须记录在
    `HIST` 表结构中；更准确地说，需要记录*起始状态*的 `MSAL` 值。代码清单 10-5 将所有在位于丹佛的部门工作的培训师的薪资提高 10%。


    **代码清单 10-5.** *事务 `ETX4(dbs)`*


    **`FEa`**:

    ```math

    dbs↓{SREP,MEMP,TERM,DEPT,GRD,CRS,OFFR,REG}

    ∪

    { (HIST; dbs(HIST)

    ∪

    { { (EMPNO; e(EMPNO)

    )

    ,(UNTIL; sysdate )

    ,(DEPTNO;e(DEPTNO) )

    ,(MSAL;

    e(MSAL)

    ) }

    | e∈dbs(EMP)⊗dbs(DEPT) ∧ e(JOB) = ''TRAINER'' ∧ e(LOC) = ''DENVER'' }

    ) }

    ∪

    { (EMP; { e | e∈dbs(EMP) ∧ ¬ (e(JOB) = ''TRAINER'' ∧

    ↵{ d(LOC) | d∈dbs(DEPT) ∧

    d(DEPTNO) = e(DEPTNO) }

    = ''DENVER'') }

    ∪

    { e↓{EMPNO,ENAME,BORN,JOB,HIRED,SGRADE,USERNAME,DEPTNO}

    ∪ { (MSAL; 1.1 * e(MSAL)) }

    | e∈dbs(EMP) ∧ e(JOB) = ''TRAINER'' ∧

    ↵{ d(LOC) | d∈dbs(DEPT) ∧ d(DEPTNO) = e(DEPTNO) }

    = ''DENVER'' }

    ) }

    ```


    **`SEI`**:

    ```sql

    insert into HIST(EMPNO,UNTIL,DEPTNO,MSAL)

    (select e.EMPNO, sysdate, e.DEPTNO, e.MSAL

    from EMP e

    where e.job =''TRAINER''

    and ''DENVER'' = (select d.LOC

    from DEPT d

    where d.DEPTNO = e.DEPTNO));


    update EMP e

    set e.MSAL = 1.1 * e.MSAL

    where e.job =''TRAINER''

    and ''DENVER'' = (select d.LOC

    from DEPT d

    where d.DEPTNO = e.DEPTNO)

    ```


    **`SEII`**:

    ```sql

    update EMP e

    set e.MSAL = 1.1 * e.MSAL

    where e.job =''TRAINER''

    and ''DENVER'' = (select d.LOC

    from DEPT d

    where d.DEPTNO = e.DEPTNO);


    insert into HIST(EMPNO,UNTIL,DEPTNO,MSAL)

    (select e.EMPNO, sysdate, e.DEPTNO, e.MSAL / 1.1

    from EMP e

    where e.job =''TRAINER''

    and ''DENVER'' = (select d.LOC

    from DEPT d

    where d.DEPTNO = e.DEPTNO))

    ```


    事务 `ETX4` 的规范 `FEa` 同时为 `HIST` 和 `EMP` 表结构分配新值。它根据 `EMP` 和 `DEPT` 之间的连接查询结果向 `HIST`
    插入数据，从而按照约束 `STC5` 的要求，记录（大致来说）即将被更新的元组的当前 `MSAL` 和 `DEPTNO` 值。它还按要求更新了 `EMP`。这些表（“新”
    `HIST` 表和“新” `EMP` 表）的规范都引用了 `dbs`，即事务的起始状态。

