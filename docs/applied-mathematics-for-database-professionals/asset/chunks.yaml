- fmt: 'So you see it’s logically correct that universal quantification over the empty
    set always results in `TRUE`, regardless of the actual predicate after the colon.


    If you’re still not fully convinced, here’s an alternative reasoning. The universal
    quantifier corresponds with an iterated `AND` construct, as explained in the paragraph
    on quantifiers in section “Quantifiers and Finite Sets.” Therefore, you can set
    up the following series of logical equivalences:


    ```

    ∀x∈S: P(x)

    ⇔ P(x₁) ∧ P(x₂) ∧ P(x₃) ∧ ... ∧ P(x_{n-1}) ∧ P(x_n)

    ⇔ TRUE ∧ P(x₁) ∧ P(x₂) ∧ P(x₃) ∧ ... ∧ P(x_{n-1}) ∧ P(x_n)

    ```


    The prefix `TRUE ∧` is allowed according to one of the “special case” rewrite
    rules listed in Table 1-12. As you can see, you start with a set `S` containing
    `n` values. Now if you start removing the elements of set `S` one by one, you
    can remove `∧ P(x_n)` from the end, followed by `∧ P(x_{n-1})`, and so on, until
    you will eventually end up with the empty set—because you removed the last element
    of set `S`. However, then the equivalence is reduced to `∀x∈∅: P(x)` which is
    equivalent to `TRUE`.


    ## Rewrite Rules with Quantifiers


    The previous sections already introduced a few rewrite rules with regard to quantification.


    Listing 3-16 lists the most commonly used rewrite rules for quantifiers.


    **Listing 3-16.** Rewrite Rules With Quantifiers

    ```

    ¬( ∃x∈S: P(x) ) ⇔ ( ∀x∈S: ¬P(x) )

    ¬( ∀x∈S: P(x) ) ⇔ ( ∃x∈S: ¬P(x) )

    ( ∃x∈S: P(x) ) ⇔ ¬( ∀x∈S: ¬P(x) )

    ( ∀x∈S: P(x) ) ⇔ ¬( ∃x∈S: ¬P(x) )

    ( ∀x∈A: ( ∀y∈B: P(x,y) ) ) ⇔ ( ∀y∈B: ( ∀x∈A: P(x,y) ) )

    ( ∃x∈A: ( ∃y∈B: Q(x,y) ) ) ⇔ ( ∃y∈B: ( ∃x∈A: Q(x,y) ) )

    ( ∃x∈S: P(x) ∨ Q(x) ) ⇔ ( ( ∃x∈S: P(x) ) ∨ (∃x∈S: Q(x) ) )

    ( ∀x∈S: P(x) ∧ Q(x) ) ⇔ ( ( ∀x∈S: P(x) ) ∧ (∀x∈S: Q(x) ) )

    ( ∃x∈S: P(x) ∧ Q ) ⇔ ( ( ∃x∈S: P(x) ) ∧ Q )

    ( ∀x∈S: P(x) ∨ Q ) ⇔ ( ( ∀x∈S: P(x) ) ∨ Q )

    ¬( ∀x∈S: ∀y∈T: P(x,y) ) ⇔ ( ∃x∈S: ∃y∈T: ¬P(x,y) )

    ¬( ∃x∈S: ∃y∈T: P(x,y) ) ⇔ ( ∀x∈S: ∀y∈T: ¬P(x,y) )

    ¬( ∀x∈S: ∃y∈T: P(x,y) ) ⇔ ( ∃x∈S: ∀y∈T: ¬P(x,y) )

    ¬( ∃x∈S: ∀y∈T: P(x,y) ) ⇔ ( ∀x∈S: ∃y∈T: ¬P(x,y) )

    ```


    The third and fourth rewrite rules in Listing 3-16 state that you can rewrite
    a universal quantification into an existential quantification (with the use of
    a negation connective) and vice versa. This means that you don’t need one of the
    quantifiers to express any arbitrary quantified predicate. However, it’s convenient
    to have the two quantifiers available, because we use both in natural language.


    You’ll prove one of these rewrite rules in the exercises at the end of this chapter.


    ## Normal Forms


    Normal forms (also referred to as canonical forms) are often used in mathematics.
    The English word “normal” here is being used in the sense of conforming to a norm
    (that is a standard) as opposed to the meaning “usual.”


    Normal forms are typically used to rewrite expressions in such a way that you
    can solve (or further analyze) them easily. A characteristic example is the well-known
    normal form for quadratic equations: `ax² + bx + c = 0`. Once you have rewritten
    your quadratic equations to this format, you can use the quadratic formula to
    find the values for `x`. In logic, there are similar normal forms; we’ll discuss
    two of them in the sections that follow. In general, normal forms are useful in
    automated theorem proving. The disjunctive and conjunctive normal forms discussed
    in the following sections are particularly useful to verify whether a predicate
    is a tautology or a contradiction.


    **Note** Normal forms are also useful for comparing two predicates. By rewriting
    two seemingly similar predicates into the same normal form, you can examine more
    closely what exactly the difference is between the two. Or maybe after having
    transformed both into a normal form, you discover that they are in fact the same
    predicate. This is one of the applications in Part 2 of this book when data integrity
    rules are specified as formal predicates.


    ### Conjunctive Normal Form'
