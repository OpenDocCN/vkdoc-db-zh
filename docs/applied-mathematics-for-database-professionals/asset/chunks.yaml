    \ Q\nP ∧ Q\n(P ∧ Q ∧ ¬R) ∨ (S ∧ ¬R)\n(P ∧ Q ∧ ¬P) ∨ (R ∧ ¬R ∧ S)\n```\n"
- fmt: '## Finding the Normal Form for a Given Predicate


    In this section we’ll investigate how you can transform a given predicate into
    DNF or CNF.


    ### Finding the DNF for a Given Predicate


    There are several methods to rewrite existing predicates into DNF. Normally, you
    try to use existing rewrite rules to move your expression into the “right” direction
    until it has the desired format: an iterated OR where the disjuncts are iterated
    ANDs with simple predicates only.


    An interesting alternative technique is based on using a truth table. For example,
    suppose this is the original predicate:


    `P ⇒ ( Q ⇔ ¬P )`


    Table 3-3 shows the corresponding truth table.


    **Table 3-3.** Using a Truth Table to Rewrite Predicates to DNF


    | `P` | `Q` | `¬P` | `Q ⇔ ¬P` | `P ⇒ ( Q ⇔ ¬P )` |

    | :--- | :--- | :--- | :--- | :--- |

    | `t` | `t` | `f` | `f` | **`f`** |

    | `t` | `f` | `f` | `t` | **`t`** |

    | `f` | `t` | `t` | `t` | **`t`** |

    | `f` | `f` | `t` | `f` | **`t`** |


    As you can see from the last column of Table 3-3, the given predicate is TRUE
    for the last three truth combinations of (`P`,`Q`): (`t`, `f`), (`f`, `t`), and
    (`f`, `f`). You can represent those three truth combinations with the following
    corresponding conjunctions:

    (`t`,`f`): `C := P ∧ ¬Q`

    (`f`,`t`): `C := ¬P ∧ Q`

    (`f`,`f`): `C := ¬P ∧ ¬Q`


    Now, if you combine these three conjunctions into the iterated disjunction `C
    ∨ C ∨ C`, you end up with a rewritten predicate in DNF that precisely represents
    the truth table of the original predicate:


    `( P ∧ ¬Q ) ∨ ( ¬P ∧ Q ) ∨ ( ¬P ∧ ¬Q )`


    If you aren’t convinced, set up a truth table for the rewritten predicate and
    compare the result with the original predicate in Table 3-3. By the way, did you
    notice that the last column of Table 3-3 is identical to the definition of the
    NAND operator? The rewritten expression in DNF precisely represents the NAND operator;
    the expression is FALSE if and only if both operands are TRUE.


    **Note:** This DNF rewrite algorithm using a truth table is relatively easy to
    automate. You could write a program that does the conversion for you, without
    the need for inspiration and creativity; DNF is always achievable.


    ### FUNCTIONAL COMPLETENESS REVISITED


    Do you remember the discussion of functional completeness in Chapter 1? Clearly,
    you can use the preceding technique to rewrite any arbitrary predicate (optionally
    containing any nonstandard connectives from the huge set of theoretical connective
    possibilities) to produce a predicate in DNF. Regardless of the complexity of
    the original predicate and regardless of which connectives it contains, you end
    up with a truth table column that “represents” the truth value of the expression
    for all given truth value combinations of its variables.


    The preceding technique uses this information to generate a logically equivalent
    expression containing conjunctions, disjunctions, and negations only; therefore,
    `{∧,∨,¬}` is functionally complete.


    ### Finding the CNF for a Given Predicate


    To find the CNF for a given predicate—which is also always achievable—you first
    apply the preceding method using the truth table to find the DNF of the predicate.
    You then apply the distributive laws to convert the iterated disjunction into
    an iterated conjunction. Here’s an example derivation that converts the predicate
    `( P ∧ Q ) ∨ ( R ∧ S )`, which is in DNF, into CNF:


    ```

    ( P ∧ Q ) ∨ ( R ∧ S )

    ⇔ ( P ∨ ( R ∧ S ) ) ∧ ( Q ∨ ( R ∧ S ) )

    ⇔ ( P ∨ R ) ∧ ( P ∨ S ) ∧ ( Q ∨ R ) ∧ ( Q ∨ S )

    ```


    We’ll revisit CNF in Part 2 of this book when we discuss specification and implementation
    guidelines for data integrity constraints.'
