  trans: '

    写成在 `DUAL` 上的查询时，以下是需要查找的属性，它会在执行 `UPDATE` 语句时要求对 `EMP_TAB03` 进行验证：

    ```sql

    select ''EMP_TAB03 is in need of validation''

    from DUAL

    where exists(select ''Some department just won a president/manager or just lost
    an administrator''

    from v_emp_ute

    where (n_job in (''PRESIDENT'',''MANAGER'') and

    o_job not in (''PRESIDENT'',''MANAGER'')

    or (o_job=''ADMIN'' and n_job<>''ADMIN'')

    or (o_deptno<>n_deptno and

    (o_job=''ADMIN'' or n_job in (''PRESIDENT'',''MANAGER''))))

    ```


    您可以使用上述查询，以与清单 11-34 所示的插入和删除触发器相同的方式，创建一个更高效的更新触发器。


    在后文中，我们将这些对过渡效应视图的查询称为*过渡效应查询*（TE 查询）。


    `注意` 我们不知道数据库管理系统是否能够计算在此执行模型中使用的 TE 查询（用于查找特定于约束的属性）。对该领域已进行的科学研究进行调查，并未为我们提供关于此问题的明确答案。因此，我们无法断然地说，数据库管理系统是否原则上应该能够通过执行模型
    EM5 为我们提供完整的声明式多元组约束支持。


    清单 11-35 提供了使用执行模型 EM5 实现第二个示例表约束的触发器。它假定维护`DEPT`表结构的过渡效应视图的代码已经以类似清单 11-33 中为`EMP`设置过渡效应的方式建立起来。请注意，约束`DEPT_TAB01`不需要删除触发器。


    **清单 11-35.** *约束 DEPT_TAB01 的 DI 代码的 EM5 实现*

    ```sql

    create trigger DEPT_AIS_TAB01

    after insert on DEPT

    declare pl_dummy varchar(40);

    begin

    -- 如果此查询不返回行，则 DEPT_TAB01 不可能被违反。

    select ''DEPT_TAB01 must be validated'' into pl_dummy

    from DUAL

    where exists (select ''A row has just been inserted''

    from v_dept_ite);

    --

    begin

    --

    select ''Constraint DEPT_TAB01 is satisfied'' into pl_dummy from DUAL

    where not exists(select m.DEPTNO

    from DEPT m

    where 2 < (select count(*)

    from DEPT d

    where d.MGR = m.MGR));

    --

    exception when no_data_found then

    --

    raise_application_error(-20999,''Constraint DEPT_TAB01 is violated.'');

    --

    end;

    exception when no_data_found then

    -- 无需验证 DEPT_TAB01。

    null;

    --

    end;

    /


    create trigger DEPT_AUS_TAB01

    after update on DEPT

    declare pl_dummy varchar(40);

    begin

    -- 如果此查询不返回行，则 DEPT_TAB01 不可能被违反。

    select ''DEPT_TAB01 must be validated'' into pl_dummy

    from DUAL

    where exists (select ''A department manager has just been updated''

    from v_dept_ute

    where o_mgr<>n_mgr);

    --

    begin

    --

    select ''Constraint DEPT_TAB01 is satisfied'' into pl_dummy from DUAL

    where not exists(select m.DEPTNO

    from DEPT m

    where 2 < (select count(*)

    from DEPT d

    where d.MGR = m.MGR));

    --

    exception when no_data_found then

    --

    raise_application_error(-20999,''Constraint DEPT_TAB01 is violated.'');

    --

    end;

    exception when no_data_found then

    -- 无需验证 DEPT_TAB01。

    null;

    --

    end;

    /

    ```


    请注意，在约束`DEPT_TAB01`的情况下，执行模型 EM4 和 EM5 是等价的。


    可能会产生这样一个问题：在过渡效应中测试某个属性是否违背了其初衷。这是因为，如果执行此测试的成本与运行实际的约束验证代码一样高，那么您的收益何在？对于这个问题，我们可以做出以下观察：


    *   过渡效应中的行数通常远少于约束所涉及的表结构中的行数。

    *   过渡效应总是在缓存中，而涉及的表结构中的所有行则不能这么说。

    '
- fmt: "# Chapter 11 Implementing Database Designs in Oracle\n\nThe TE query itself\
    \ will normally be much simpler than the query that is conditionally run to validate\
    \ the constraint.\n\nThe examples shown have demonstrated this last observation.\
    \ Together with the first two observations, this should then answer the question;\
    \ a TE query does not defeat its purpose (efficiency of DI code).\n\nFurthermore,\
    \ there is a second—more important—purpose for *guarding* constraint validation\
    \ with TE queries. Preventing unnecessary execution of queries that validate the\
    \ constraint will strongly benefit the concurrency of transactions. We’ll deal\
    \ with this aspect in the next subsection, “DI Code Serialization.”\n\nThere is\
    \ one more way to further optimize the efficiency of execution model `EM5`. This\
    \ involves executing a more efficient query to validate the constraint. Up until\
    \ now you’ve derived these queries directly from the formal specifications of\
    \ the constraints, and as such they validate the *full* constraint predicate.\n\
    \nIn the case of `EMP_TAB03`, the query validates whether *every* department satisfies\
    \ the predicate that is quantified (if there is a president/manager, then there\
    \ is an administrator). In the case of `DEPT_TAB01`, the query validates whether\
    \ *every* department manager is not managing more than two departments. Often,\
    \ given a triggering `DML` statement, it suffices to execute a query that validates\
    \ a *weaker* predicate.\n\nFor instance, if an `INSERT` statement inserts a manager\
    \ for department 10 into the `EMP` table structure, then theoretically you would\
    \ only have to validate whether the quantified predicate is still satisfied *for\
    \ department 10 only*. Likewise, if an `UPDATE` statement changes the manager\
    \ for some department, then you would only have to validate whether this new department\
    \ manager isn’t managing more than two departments.\n\nThe last execution model\
    \ addresses this opportunity for further increasing the efficiency of DI code.\n\
    \n## Execution Model 6: On-Transition-Effect-Property Plus Optimized-Query\nThis\
    \ execution model (`EM6`) resembles `EM5` in that it also requires a transition\
    \ effect for each table structure; you now use this transition effect in a slightly\
    \ more sophisticated manner, so that you can determine the weaker predicate.\n\
    \nInstead of just looking for a property in the transition effect to guard execution\
    \ of a constraint validation query, you now also use the transition effect to\
    \ supply values that can be used to optimize the validation query. For instance,\
    \ in the case of `EMP_TAB03`, you can use the transition effect to determine for\
    \ which department(s) the weaker predicate must be checked; this should always\
    \ result in executing a more efficient validation query. In the case of `DEPT_TAB01`,\
    \ you can use the transition effect to find out for what `MGR` value(s) the weaker\
    \ predicate must be checked.\n\nListing 11-36 shows you how to do this. It shows\
    \ the `EM6` version of the insert, update, and delete triggers for constraint\
    \ `EMP_TAB03`.\n\n**Listing 11-36.** EM6 Implemention of DI Code for Constraint\
    \ EMP_TAB03\n\n```sql\ncreate trigger EMP_AIS_TAB03\nafter insert on EMP\ndeclare\n\
    \  pl_dummy varchar(40);\nbegin\n  --\n  for r in (select distinct deptno\n  \
    \          from v_emp_ite\n            where JOB in ('PRESIDENT','MANAGER'));\n\
    \  loop\n    begin\n      --\n      select 'Constraint EMP_TAB03 is satisfied'\
    \ into pl_dummy\n      from DUAL\n      where not exists(select e2.*\n       \
    \                from EMP e2\n                       where e2.DEPTNO = r.DEPTNO\n\
    \                       and e2.JOB in ('PRESIDENT','MANAGER'))\n      or exists(select\
    \ e3.*\n                from EMP e3\n                where e3.DEPTNO = r.DEPTNO\n\
    \                and e3.JOB = 'ADMIN');\n      --\n    exception when no_data_found\
    \ then\n      --\n      raise_application_error(-20999,\n        'Constraint EMP_TAB03\
    \ is violated for department '||to_char(r.deptno)||'.');\n      --\n    end;\n\
    \  end loop;\nend;\n/\n```\n\n```sql\ncreate trigger EMP_ADS_TAB03\nafter delete\
    \ on EMP\ndeclare\n  pl_dummy varchar(40);\nbegin\n  --\n  for r in (select distinct\
    \ deptno\n            from v_emp_dte\n            where JOB='ADMIN');\n  loop\n\
    \    begin\n      --\n      select 'Constraint EMP_TAB03 is satisfied' into pl_dummy\n\
    \      from DUAL\n      where not exists(select e2.*\n                       from\
    \ EMP e2\n                       where e2.DEPTNO = r.DEPTNO\n                \
    \       and e2.JOB in ('PRESIDENT','MANAGER'))\n      or exists(select e3.*\n\
    \                from EMP e3\n                where e3.DEPTNO = r.DEPTNO\n   \
    \             and e3.JOB = 'ADMIN');\n      --\n    exception when no_data_found\
    \ then\n      --\n      raise_application_error(-20999,\n        'Constraint EMP_TAB03\
    \ is violated for department '||to_char(r.deptno)||'.');\n      --\n    end;\n\
    \  end loop;\nend;\n/\n```\n\n```sql\ncreate trigger EMP_AUS_TAB03\nafter update\
    \ on EMP\ndeclare\n  pl_dummy varchar(40);\nbegin\n  --\n  for r in (select n_deptno\
    \ as deptno\n            from v_emp_ute\n            where (o_job not in ('PRESIDENT','MANAGER')\
    \ or updated_deptno='TRUE') and n_job in ('PRESIDENT','MANAGER')\n           \
    \ union\n            select o_deptno as deptno\n            from v_emp_ute\n \
    \           where (n_job<>'ADMIN' or updated_deptno='TRUE')\n            and old_job\
    \ ='ADMIN')\n  loop\n    begin\n      --\n      select 'Constraint EMP_TAB03 is\
    \ satisfied' into pl_dummy\n      from DUAL\n      where not exists(select e2.*\n\
    \                       from EMP e2\n                       where e2.DEPTNO =\
    \ r.DEPTNO\n                       and e2.JOB in ('PRESIDENT','MANAGER'))\n  \
    \    or exists(select e3.*\n                from EMP e3\n                where\
    \ e3.DEPTNO = r.DEPTNO\n                and e3.JOB = 'ADMIN');\n      --\n   \
    \ exception when no_data_found then\n      --\n      raise_application_error(-20999,\n\
    \        'Constraint EMP_TAB03 is violated for department '||to_char(r.deptno)||'.');\n\
    \      --\n    end;\n  end loop;\nend;\n/\n```\n\n### Note\nThe `distinct` keyword\
    \ inside the preceding `TE` queries possibly prevents multiple executions of the\
    \ same constraint validation query in case the `UPDATE` statement affected more\
    \ than one row.\n\nBecause the example constraints happen to be universal quantifications,\
    \ finding the weaker predicate in the cases of `EMP_TAB03` and `DEPT_TAB01` is\
    \ trivial. However, this is not always the case; the weaker predicate can also\
    \ be rather complex to discover. This all depends on the specification of the\
    \ constraint. Again, we don’t know if it is possible at all whether, instead of\
    \ having to discover it yourself, you can have the `DBMS` automatically compute\
    \ the weaker predicate (including the `TE` query) given a declared formal specification\
    \ of a constraint.\n\n## DI Code Serialization\nYou should be aware of another\
    \ major issue when implementing `DI` code yourself. This issue applies irrespective\
    \ of whether you follow the triggered procedural strategy or the embedded procedural\
    \ strategy.\n\nIn Oracle’s `SQL` `DBMS`, transactions execute concurrently. At\
    \ any point in time there can be many *open* transactions; that is, transactions\
    \ that have started but that have not yet committed. As mentioned earlier in this\
    \ chapter, an open transaction cannot see the changes made by other concurrent\
    \ open transactions. This has serious ramifications in the area of correctness\
    \ of the `DI` code. As we’ll demonstrate in a moment, the root cause of the issue\
    \ lies in the fact that the constraint validation query, which executes as part\
    \ of the `DI` code, assumes that all data it reads—or failed to read due to the\
    \ absence of the data—is not currently being changed (or created) by other transactions.\
    \ The `DI` code for a given constraint can only correctly implement the constraint\
    \ if concurrently running transactions, which execute the validation query (embedded\
    \ in the `DI` code) of this constraint, are *serialized*.\n\n### Note\nWe’ll actually\
    \ demonstrate some of the classical concurrency problems that arise in a `DBMS`\
    \ that does not support *serializability* of concurrently executing transactions.\
    \ If you are unfamiliar with the concept of serializability, then check out some\
    \ of the references that we’ve added in Appendix C."
