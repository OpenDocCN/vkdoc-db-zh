    C H A P T E R 7 **SPECIFYING DATABASE DESIGNS**


    ## Chapter Summary


    This section provides a summary of this chapter, formatted as a bulleted list.
    It provides a high-level overview of the material discussed in this chapter.


    *   Database designs are often documented using the natural language. The major
    part of these design documents consists of the constraint specifications that
    will make the database design a satisfactory fit for the real world.

    *   If you use plain English to express data integrity constraints, you will inevitably
    hit the problem of how English sentences map, unambiguously, into the table structures.

    *   You can use set theory to formally specify a database design in a layered
    (phased) manner. By formalizing your database design specification, you will eliminate
    all ambiguity—especially the ambiguity surrounding the constraints.

    *   In the first phase, you specify a set function for every table structure.
    This set function introduces the attribute names for the table structure and attaches
    the relevant attribute value set to each of them. These set functions are called
    `characterizations`.

    *   In the second phase, you specify for every table structure a set of tuples
    called the `tuple universe`. It holds admissible tuples for the table structure.
    You can construct a tuple universe by taking the generalized product of a characterization
    and restricting this result by specifying tuple predicates. These tuple predicates
    are called `tuple constraints`.

    *   In the third phase, you specify for every table structure a set of tables
    called the `table universe`. It holds admissible tables for the table structure.
    You can construct a table universe by taking the powerset of a tuple universe
    and restricting this result by specifying table predicates. These table predicates
    are called `table constraints`.

    *   In the last phase, you specify a set of database states called the `database
    universe`. It holds the admissible database states for the database being specified.
    You can construct a database universe by first defining a `database characterization`.
    A database characterization arranges all table universes into a single set function.
    You can construct the database universe by taking the generalized product of the
    database characterization and restricting this result by specifying database predicates.
    These database predicates are called `database constraints`.

    *   This formal model is *your*—the database professional’s—reference of the database
    design. Users should never be confronted with this formalism. You can use an external
    predicate, in conjunction with the tuple constraints, to convey the meaning of
    the attributes of each table structure. Often you should explain table and database
    constraints to users by talking about the implications they have on the behavior
    of the system. Finally, by using rewrite rules to rewrite the predicates that
    constitute the constraints, you can find alternative, informal ways to discuss
    the relevant constraints with users.


