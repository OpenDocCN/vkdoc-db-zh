- fmt: '# Venn Diagrams


    Venn diagrams (named after the Scottish professor John Venn) are *pictures* of
    sets. They can help you visualize the relationships between multiple sets. However,
    keep in mind that Venn diagrams are “just” pictures; they can also be confusing
    and even misleading. You probably remember Venn diagrams from the math lessons
    during your school days. See Figure 2-1 for Venn diagram examples showing the
    three sets `E1`, `E2`, and `E3` from Listing 2-1.


    **Figure 2-1.** *Venn diagram examples*


    The Venn diagram of set `E3` is already confusing, because it contains the numbers
    8 and 6 twice; moreover, it isn’t immediately obvious that set `E3` contains three
    elements. It isn’t clear how you should represent an element that is a set itself
    in a Venn diagram. Evidently set `E3` is not suited to be represented as a Venn
    diagram. And if you want to investigate the empty set, you face the tough problem
    of how to draw an empty set in a Venn diagram. As long as you keep their limitations
    in mind, Venn diagrams can be quite helpful. In the rest of this chapter, they’ll
    be used to clarify various set-theory concepts.


    # CHAPTER 2: SET THEORY: INTRODUCTION


    ## Cardinality and Singleton Sets


    Sets can be *finite* and *infinite*; however, when dealing with databases all
    your sets are finite by definition. For every finite set `S`, the *cardinality*
    is defined as the number of elements of `S`. A common notation for the cardinality
    of a set `S` is `|S|`, where you put the name (or specification) of the set between
    vertical bars. However, in this book we prefer to use the `#` symbol, as used
    in Definition 2-2, to denote the cardinality operator, because we use the vertical
    bar already quite heavily in predicative and substitutive set specifications.


    **■Definition 2-2: Cardinality of a Set** The cardinality of a (finite) set `S`
    is the number of elements in `S`, denoted by `#S`.


    **■Note** There is also a cardinality concept for infinite sets, but that won’t
    be discussed in this book.


    Listing 2-5 shows some examples of sets and their cardinality.


    **Listing 2-5.** *Cardinality Examples*

    ```

    #{1,2,3} = 3

    #{{1,2,3}} = 1

    #{1,3,2,3} = 3

    #{{1,3},{2,3}} = 2

    #∅ = 0

    #{∅} = 1

    ```

    Note the subtle difference between the first and second example. The third example
    shows that duplicates are not counted as separate elements; the last example shows
    that the set consisting of the empty set is not empty—it contains a single element,
    namely the empty set.


    ### Singleton Sets


    Listing 2-5 shows two examples of sets with cardinality one—the second and the
    last example. Sets with exactly one element are called a *singleton* (see Definition
    2-3).


    **■Definition 2-3: Singleton** A singleton is a set with exactly *one* element.


    Note that a singleton is still a set; therefore, `{42}` is *not* the same as `42`.
    `{42}` is a set and `42`—its only element—is an integer value. Be careful; it
    is a common mistake to mix up a singleton set with the element it contains.


    ## The Choose Operator


    We introduce a special operator that allows you to “extract” or “choose” the single
    element from a singleton set. In this book we use the symbol `↵` for this operator;
    for example:

    ```

    ↵{5} = 5

    ↵{{5,6}} = {5,6}

    ```

    For singleton sets, you could consider the choose operator as an “unbracer,” enabling
    you to write expressions that would otherwise be somewhat more awkward. The `↵`
    operator always expects a singleton set as its operand; therefore, the following
    expression is an ill-formed, meaningless formula:

    ```

    ↵{5,6}

    ```

    The operand here is not a singleton, but a set with a cardinality of 2.


    ## Subsets


    The concept of a *subset* is rather intuitive, so let’s start with the definition
    right away, as shown in Definition 2-4, which also introduces the reverse concept:
    a *superset*.


    **■Definition 2-4: Subset and Superset** `A` is a subset of `B` (`B` is a superset
    of `A`) if every element of `A` is an element of `B`. The notation is `A ⊆ B`.'
