    Listing 9-2 gives the job of employees who either earn more than 4800 monthly,
    or who are assigned to salary grade 6 or higher.


    **Listing 9-2.** *Query EXQ2(dbs)*


    **FEa**:


    { e(JOB) | e∈dbs(EMP) ∧ (e(MSAL) > 4800 ∨ e(SGRADE) ≥ 6) }


    **FEb**:


    { e↓{JOB} | e∈dbs(EMP) ∧ (e(MSAL) > 4800 ∨ e(SGRADE) ≥ 6) }


    **FEc**:


    { e↓(JOB) | e∈dbs(EMP) ∧ (e(MSAL) ≤ 4800 ⇒ e(SGRADE) ≥ 6) }


    **FEd**:


    { e↓(JOB) | e∈dbs(EMP) ∧ (e(SGRADE) < 6 ⇒ e(MSAL) > 4800) }


    **FEe**:


    { e↓(JOB) | e∈dbs(EMP) ∧ ¬(e(MSAL) ≤ 4800 ∧ e(SGRADE) < 6) }


    **FEf**:


    { e↓(JOB) | e∈dbs(EMP) ∧ e(MSAL) > 4800 }


    ∪


    { e↓(JOB) | e∈dbs(EMP) ∧ e(SGRADE) ≥ 6 }


    **SEI**:


    select distinct e.JOB from EMP e where e.MSAL > 4800 or e.SGRADE >= 6


    **SEII**:


    select distinct e.JOB from EMP e where not (e.MSAL <= 4800 and e.SGRADE < 6) **SEIII**:
    select e.JOB from EMP e where e.MSAL > 4800


    union


    select e.JOB from EMP e where e.SGRADE >= 6


    Do you notice the subtle difference between FEa and FEb? The former results in
    a set of job values (that is, this is not a table); the latter results in a set
    of tuples (that is, a table over {JOB}), and is therefore a preferred way to formally
    specify EXQ2.


    Alternatives FEc, FEd, and FEe are variations of FEb, where the disjunction is
    either rewritten into an implication or a conjunction. Alternative FEf uses the
    union operator; jobs of employees earning more than 4800 are unioned with jobs
    of employees assigned to salary grade 6 or higher.


    **■Note** The way this query is formally specified implies that we only retrieve
    *distinct* job values. Suppose table dbs(EMP) currently holds twenty employees,
    of which ten conform to the predicate “monthly salary is greater than 4800 or
    salary grade equals 6 or higher.” If eight of those ten employees have job TRAINER
    and the other two have job MANAGER, then the result of FEa will be {''TRAINER'',''MANAGER''}:
    a set with only two, not ten, elements.


    The subtle difference demonstrated by FEa and FEb cannot be expressed in SQL.
    Specification SEI is the SQL variation for both of these. Also note that in SQL
    you must add the distinct keyword to ensure that no duplicate job values appear
    in the query result.


    Alternatives FEc and FEd cannot be directly transformed into SQL, because SQL
    lacks the implication operator; only disjunction, conjunction, and negation are
    available within SQL.


    Specification SEII is the SQL version for FEe, and SEIII represents the SQL version
    for FEf.


    Note that in the latter case, the use of the keyword distinct is not necessary;
    SQL will always return distinct values whenever you use a set operator (union,
    minus, or intersect).


    Listing 9-3 gives the number, name, and salary of clerks, including the lower
    and upper limits of the salary grade to which they are assigned.


