    **Table Predicates**


    In the previous section you were introduced to a certain type of predicate: the
    tuple predicate.


    In this section we’ll introduce you to the concept of a *table predicate*. Table
    predicates deal with *multiple tuples* within a single table. They are predicates
    that have a single parameter of type table. Listing 6-3 displays a few examples
    of table predicates.


    **Listing 6-3.** *Table Predicate Examples*


