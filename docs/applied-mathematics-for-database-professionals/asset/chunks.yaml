    P(T) := ( ∀t∈T: t(price) ≥ 20 ⇒ t(instock) ≤ 10 )\n```\n\n这是列表 6-1 中元组谓词 `P1(t)`\
    \ 的表谓词变体，我们不允许它作为表谓词。\n\n`■Note` 谓词 `P7` 确实是一个表谓词，尽管你乍一看可能认为它符合前面的模式。它实际上不符合；它的形式是\
    \ `(∀t∈T: Q(t,T))`，这是一种不同的模式。\n\n7451CH06.qxd 5/14/07 10:37 AM Page 122\n\n**122**\n\
    \nC H A P T E R 6 ■ T U P L E , TA B L E , A N D D A T A B A S E P R E D I C A\
    \ T E S\n\n不失一般性，我们也将——就像对待元组谓词一样——将注意力限制在由单个合取项组成的表谓词上。如果你可以将一个给定的表谓词 `P(T)`\
    \ 重写为 `Q(T) ∧ R(T)` 形式的表达式，那么你实际上是在处理两个表谓词。以下是一个例子来说明这一点：\n\n```\n( ∀t1∈T: t1(instock)>100\
