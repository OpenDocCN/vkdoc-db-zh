    ```

    ( ∀x∈A: x > 0 ) ∧ ( ∃y∈B: y < 10 )


    ¬( ∀z∈A: z > 10 ) ⇒ ( ∃x∈A: x < 11 )

    ```


    ## 量词与有限集


    尽管如今的数据库越来越大，但根据定义，它们始终是有限的——这与数学中的集合不同，后者有时是无限的。如果你只处理有限集合，你总是可以将存在量词和全称量词分别视为迭代
