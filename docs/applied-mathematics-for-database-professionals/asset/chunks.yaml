- fmt: '# Chapter 2: Set Theory: Introduction


    Note that this definition does not exclude the possibility that sets `A` and `B`
    are equal; the symbol we use for subsets (`⊆`) actually suggests this possibility
    explicitly. If you want to exclude the possibility of equality, you should use
    the special subset flavor with its corresponding symbol, as shown in Definition
    2-5.


    ## Definition 2-5: Proper Subset/Superset


    `A` is a proper subset of `B`, `B` is a proper superset of `A` (notation: `A ⊂
    B`) ⇔ `A` is a subset of `B` and `A ≠ B`.


    You can use the diagonal stroke as a negation; for example, `A ⊄ B` means that
    `A` is `not` a proper subset of `B`. Apart from this `⊄` symbol with a built-in
    negation, you can always use a separate negation symbol to write a logically equivalent
    statement, as follows: `A ⊄ B ⇔ ¬( A ⊂ B )`


    See Listing 2-6 for some examples of propositions about subsets; check out for
    yourself that they are all TRUE.


    ## Listing 2-6: Examples of Subset Propositions That Are True


    ```

    {1,2} ⊆ {1,2,3}

    {1,2} ⊂ {1,2,3}

    {1,2,3} ⊄ {1,2,3}

    {1,2,3} ⊆ {1,2,3}

    ∅ ⊆ {1,2,3}

    ```


    The last two examples of Listing 2-6 are interesting, because they illustrate
    the following two important properties of subsets:


    - Every set is a subset of itself: `A ⊆ A`

    - The empty set is a subset of every set: `∅ ⊆ A`


    Two more subset properties worth mentioning here are the following ones:


    - Transitivity: `( ( A ⊆ B ) ∧ ( B ⊆ C ) ) ⇒ ( A ⊆ C )`

    - Equality: `( A = B ) ⇔ ( ( A ⊆ B ) ∧ ( B ⊆ A ) )`


    ## Union, Intersection, and Difference


    You can apply various operations on sets. The most well-known set operators are
    `union`, `intersection`, and `difference`. For the difference operator, we have
    two flavors: the regular difference and the symmetric difference. The formal definitions
    and the corresponding mathematical symbols for these four operators are shown
    in Table 2-2.


    ## Table 2-2: Common Set Operators


    | Name                | Symbol | Definition                                      |

    |---------------------|--------|-------------------------------------------------|

    | Union               | `∪`    | `A ∪ B = { x | x∈A ∨ x∈B }`                     |

    | Intersection        | `∩`    | `A ∩ B = { x | x∈A ∧ x∈B }`                     |

    | Difference          | `–`    | `A – B = { x | x∈A ∧ x∉B }`                     |

    | Symmetric difference | `÷`   | `A ÷ B = ( A – B ) ∪ ( B – A )`                 |


    Figure 2-2 shows corresponding Venn diagrams; the gray areas indicate the union,
    intersection, difference, and symmetric difference of the two sets `A` and `B`.


    ## Figure 2-2: Venn diagram of the union, intersection, and difference


    Let’s look at an example. Suppose the following two sets `A` and `B` are given:

    ```

    A := {1,3,5}

    B := {3,4,5,6}

    ```


    Then the union, intersection, difference, and symmetric difference of `A` and
    `B` are as follows:


    - `A ∪ B = { x | x∈A ∨ x∈B } = {1,3,4,5,6}` = areas I, II and III

    - `A ∩ B = { x | x∈A ∧ x∈B } = {3,5}` = area II

    - `A – B = { x | x∈A ∧ x∉B } = {1}` = area I

    - `B – A = { x | x∈B ∧ x∉A } = {4,6}` = area III

    - `A ÷ B = ( A–B ) ∪ ( B–A ) = {1,4,6}` = areas I and III


    ## Figure 2-3: Venn diagram of A (set {1,3,5}) and B (set {3,4,5,6})


    An important property of operators in general is the `closure property`. An operator
    is said to be closed over some given set, if every operation on elements of that
    given set always results in an(other) element of that same set.


    The set operators introduced in this section always result in sets. Union, intersection,
    and (symmetric) difference are said to be `closed over sets`. The next section
    will discuss a few more properties of the set operators.


    ## Properties of Set Operators


    Just like we investigated various properties of the logical connectives in the
    previous chapter, we can do the same for set operators. Table 2-3 shows some conclusions
    you can draw about the properties of the four set operators.


    ## Table 2-3: Properties of Set Operators


    | Property      | Set Operators                   |

    |---------------|---------------------------------|

    | Commutativity | `A ∪ B = B ∪ A`                 |

    |               | `A ∩ B = B ∩ A`                 |'
