  trans: '## 求给定谓词的范式


    本节我们将探讨如何将给定的谓词转换为析取范式（DNF）或合取范式（CNF）。


    ### 求给定谓词的析取范式


    有几种方法可以将现有谓词重写为析取范式。通常，你会尝试使用现有的重写规则，将表达式向“正确”的方向移动，直到它具有所需的格式：一个迭代的析取式，其中每个析取项是仅包含简单谓词的迭代合取式。


    一个有趣的替代方法是基于使用真值表。例如，假设原始谓词如下：


    `P ⇒ ( Q ⇔ ¬P )`


    表 3-3 显示了对应的真值表。


    **表 3-3.** 使用真值表将谓词重写为析取范式


    | `P` | `Q` | `¬P` | `Q ⇔ ¬P` | `P ⇒ ( Q ⇔ ¬P )` |

    | :--- | :--- | :--- | :--- | :--- |

    | `t` | `t` | `f` | `f` | **`f`** |

    | `t` | `f` | `f` | `t` | **`t`** |

    | `f` | `t` | `t` | `t` | **`t`** |

    | `f` | `f` | `t` | `f` | **`t`** |


    从表 3-3 的最后一列可以看出，给定谓词在 (`P`,`Q`) 的最后三种真值组合下为真：(`t`, `f`)、(`f`, `t`) 和 (`f`, `f`)。你可以用以下对应的合取式来表示这三种真值组合：

    (`t`,`f`): `C := P ∧ ¬Q`

    (`f`,`t`): `C := ¬P ∧ Q`

    (`f`,`f`): `C := ¬P ∧ ¬Q`


    现在，如果你将这三个合取式组合成迭代析取式 `C ∨ C ∨ C`，你最终会得到一个重写后的谓词，该谓词为析取范式，并精确地表示了原始谓词的真值表：


    `( P ∧ ¬Q ) ∨ ( ¬P ∧ Q ) ∨ ( ¬P ∧ ¬Q )`


    如果你不确定，可以为重写的谓词建立一个真值表，并将其结果与表 3-3 中的原始谓词进行比较。顺便说一句，你注意到表 3-3 的最后一列与与非（NAND）运算符的定义完全相同吗？重写的析取范式表达式精确地表示了与非运算符；该表达式为假，当且仅当两个操作数都为真。


    **注意：** 这种使用真值表的析取范式重写算法相对容易实现自动化。你可以编写一个程序来为你完成转换，而无需灵感和创造力；析取范式总是可以得到的。


    ### 功能完备性再探


    你还记得第 1 章中关于功能完备性的讨论吗？显然，你可以使用前面的技术将任何任意谓词（可选地包含来自大量理论连接词可能性中的任何非标准连接词）重写，以产生一个析取范式的谓词。无论原始谓词的复杂性如何，也无论它包含哪些连接词，你最终都会得到一个真值表列，该列“表示”了其变量所有给定真值组合下表达式的真值。


    前面的技术利用这些信息生成一个逻辑上等价的表达式，该表达式只包含合取、析取和否定；因此，`{∧,∨,¬}` 是功能完备的。


    ### 求给定谓词的合取范式


    要找到给定谓词的合取范式——这也总是可以实现的——你首先应用前面使用真值表的方法来找到谓词的析取范式。然后，你应用分配律将迭代析取式转换为迭代合取式。以下是一个示例推导，将处于析取范式的谓词
    `( P ∧ Q ) ∨ ( R ∧ S )` 转换为合取范式：


    ```

    ( P ∧ Q ) ∨ ( R ∧ S )

    ⇔ ( P ∨ ( R ∧ S ) ) ∧ ( Q ∨ ( R ∧ S ) )

    ⇔ ( P ∨ R ) ∧ ( P ∨ S ) ∧ ( Q ∨ R ) ∧ ( Q ∨ S )

    ```


    我们将在本书第 2 部分讨论数据完整性约束的规范和实现指南时，再次探讨合取范式。'
- fmt: "## Chapter Summary\n\nThis section contains a summary of the contents of this\
    \ chapter, formatted as a bulleted list—just like the previous chapter. Again,\
    \ if you don’t feel comfortable about one of the following concepts, you might\
    \ want to revisit certain chapter sections before continuing with the exercises\
    \ in the next section.\n\n- Just like regular arithmetic operators, logical connectives\
    \ can also have certain *algebraic properties*, such as commutativity, associativity,\
    \ distributivity, reflexivity, transitivity, idempotence, and absorption.\n- You\
    \ can turn predicates into propositions in two ways, one of them being by binding\
    \ parameters through *quantification*.\n- There are two quantifiers:\n  - The\
    \ *existential quantifier* allows you to express statements such as “There exists\
    \ . . .” using the symbol `∃`.\n  - The universal quantifier allows you to express\
    \ statements such as “For all . . .” using the symbol `∀`.\n- Because sets are\
    \ *finite* by definition in databases, you can always interpret predicates with\
    \ an existential quantifier over some set in the database as an iterated OR construct;\
    \ similarly, you can interpret predicates with a universal quantifier as an iterated\
    \ AND construct.\n- Be careful when quantifying over the *empty set*. The existential\
    \ quantifier will always return FALSE, regardless of the predicate, whereas the\
    \ universal quantifier will always return TRUE when applied to the empty set.\n\
    - Quantifiers can be *nested*. Sometimes you can interchange quantifiers in your\
    \ expressions, but in many cases you’ll change the meaning of the expression.\
    \ In general, you may interchange quantifiers if they are of the same type and\
    \ none of the sets over which you quantify are dependent on the variable bound\
    \ by the other set.\n- You can apply many *rewrite rules* to quantified expressions.\
    \ For example, you can always rewrite a universal quantifier expression to an\
    \ existential quantifier expression, and vice versa.\n- *Normal forms* are often\
    \ used to rewrite expressions in such a way that you can easily solve them, automate\
    \ the process of proving theorems, or investigate predicates, whether they are\
    \ tautologies or contradictions. This chapter introduced two normal forms:\n \
    \ - *Conjunctive normal form (CNF)*: Predicate written as iterated AND. CNF is\
    \ useful when you are investigating tautologies.\n  - *Disjunctive normal form\
    \ (DNF)*: Predicate written as iterated OR. DNF is useful when checking for contradictions.\n\
    \n## Exercises\n\n**1.** Prove the two absorption equivalences from Listing 3-11,\
    \ using a truth table: `P ∨ ( P ∧ Q ) ⇔ P` and `P ∧ ( P ∨ Q ) ⇔ P`\n\n**2.** The\
    \ following two sets are given: `A := {2,4,6,8}` and `B := {1,3,5,7,9}`. Which\
    \ of the following propositions are TRUE?\n- `a. ∀x∈A: x > 1`\n- `b. ∃x∈B: mod(x,5)\
    \ = 0`\n- `c. ∀x∈A: ∀y∈B: x + y ≥ 4`\n- `d. ∀x∈A: ∃y∈B: x + y = 11`\n- `e. ∃y∈B:\
