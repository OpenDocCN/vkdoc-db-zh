    **204**


    C H A P T E R 9 **■** D ATA R E T R I E VA L


    **SEIII**: select e.EMPNO, e.ENAME


    from EMP e


    where exists(select *


    from DEPT d1


    ,DEPT d2


    where d1.MGR = e.EMPNO


