    not defeat its purpose (efficiency of DI code).


    Furthermore, there is a second—more important—purpose for *guarding* constraint
    validation with TE queries. Preventing unnecessary execution of queries that validate
    the constraint will strongly benefit the concurrency of transactions. We’ll deal
    with this aspect in the next subsection, “DI Code Serialization.”


    There is one more way to further optimize the efficiency of execution model EM5\.
    This involves executing a more efficient query to validate the constraint. Up
