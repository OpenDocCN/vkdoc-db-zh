    `/* 不能注册离职当天或之后开始的课程 */`

    `( ∀t∈TERM, r∈REG, c∈CRS:`

    `( t(EMPNO) = r(STUD) ∧ r(COURSE) = c(CODE) )`

    `⇒`

    `( t(LEFT) ≥ r(STARTS) + c(DUR) ) )`


    `PTIJ10(EMP,REG,OFFR,CRS) :=`

    `/* 不能注册时间重叠的课程 */`

    `( ∀e∈EMP, r1,r2∈REG, o1,o2∈OFFR, c1,c2∈CRS:`

    `( e(EMPNO) = r1(STUD) ∧`

    `r1↓{COURSE,STARTS} = o1↓{COURSE,STARTS} ∧`

    `o1(COURSE) = c1(CODE) ∧`

    `e(EMPNO) = r2(STUD) ∧`

    `r2↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∧`

    `o2(COURSE) = c2(CODE)`

    `) ⇒`

    `( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨`

    `o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨`

    `o2(STARTS) ≥ o1(STARTS) + c1(DUR) ) )`


    `PTIJ11(EMP,OFFR) :=`

    `/* 培训师不能在其入职日期之前授课 */`

    `( ∀e∈EMP, o∈OFFR:`

    `e(EMPNO) = o(TRAINER) ⇒ e(HIRED) ≤ o(STARTS) )`


    `PTIJ12(TERM,OFFR,CRS) :=`

    `/* 培训师不能在其离职当天或之后授课 */`

    `( ∀t∈TERM, o∈OFFR, c∈CRS:`

    `( t(EMPNO) = o(TRAINER) ∧ o(COURSE) = c(CODE) )`

    `⇒`

    `( t(LEFT) ≥ o(STARTS) + c(DUR) ) )`


    `PTIJ13(REG,OFFR) :=`

    `/* 培训师不能注册自己讲授的课程 */`

    `( ∀r∈REG, o∈OFFR:`

    `r↓{COURSE,STARTS} = o↓{COURSE,STARTS} ⇒`

    `r(STUD) ≠ o(TRAINER) )`


    `PTIJ14(OFFR,CRS) :=`

    `/* 培训师不能同时教授不同课程 */`

    `( ∀o1,o2∈OFFR, c1,c2∈CRS:`

    `( o1(TRAINER) = o2(TRAINER) ∧`

    `o1(COURSE) = c1(CODE) ∧`

    `o2(COURSE) = c2(CODE)`

    `) ⇒`

    `( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨`

    `o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨`

    `o2(STARTS) ≥ o1(STARTS) + c1(DUR) ) )`


    `PTIJ15(EMP,REG,OFFR,CRS) :=`

    `/* 员工不能注册与自己讲授课程时间重叠的课程 */`

    `( ∀e∈EMP, r∈REG, o1,o2∈OFFR, c1,c2∈CRS:`

    `( e(EMPNO) = r(STUD) ∧`

    `r↓{COURSE,STARTS} = o1↓{COURSE,STARTS} ∧`

    `o1(COURSE) = c1(CODE) ∧`

    `e(EMPNO) = o2(TRAINER) ∧`

    `o2(COURSE) = c2(CODE)`

    `) ⇒`

    `( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨`

    `o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨`

    `o2(STARTS) ≥ o1(STARTS) + c1(DUR) ) )`


    谓词 `PTIJ1` 至 `PIJ15` 都限制了某些连接中允许的元组。这些连接大多只涉及两个表结构。有五个谓词（`PTIJ3`、`PTIJ9`、`PTIJ10`、`PTIJ12`、`PTIJ15`）限制了涉及两个以上表结构的连接中的元组。让我们更仔细地看看这五个。


    谓词 `PTIJ3` 将一个 `SREP` 元组（变量 `s`）与其相关的 `EMP` 元组（变量 `es`）连接，继续将此 `EMP` 元组与其相关的 `MEMP`
    元组（变量 `m`）连接，最后将此 `MEMP` 元组与其相关的 `EMP` 元组（变量 `em`）连接。所有在这个跨四个表的连接（注意 `EMP` 被连接了两次）中的元组都受谓词
    `es(MSAL) + s(COMM)/12 < em(MSAL)` 的约束。这表示销售代表的月工资，加上其佣金的十二分之一，应小于管理该销售代表的员工的月工资。顺便说一下，由于子集要求
    `PSSR3`，这位管理员工不能是销售代表——这本可能需要在小于号的右侧也加上十二分之一的佣金。


    谓词 `PTIJ9` 将一个 `TERM` 元组（`t`）直接与一个 `REG` 元组（`r`）连接，并继续将该 `REG` 元组与其相关的 `CRS` 元组（`c`）连接。


    **注意** 几点说明：

    -   从 `TERM` 到 `REG` 的连接不是“通过 `EMP`”完成的。因为 `TERM` 是 `EMP` 的特化，你可以使用 `EMPNO` 属性将
    `TERM` 直接连接到任何 `EMP` 可以连接到的其他表结构。

    -   从 `REG` 到 `CRS` 的连接不是“通过 `OFFR`”完成的。根据两个子集要求 `PSSR6` 和 `PSSR10`，你可以推断出 `REG`
    中的 `{CRS}` 引用了 `CRS` 中的 `{CODE}`（一个 `REG` 和 `CRS` 之间的子集要求），因此你可以按照所示方式直接将 `REG`
    连接到 `CRS`。

    -   此连接中的元组受谓词 `t(LEFT) ≥ r(STARTS) + c(DUR)` 约束。你是否注意到这个正式规范与嵌入的非正式注释有所不同？正式规范也涉及了
    `CRS` 表结构，或者更确切地说，是它的 `DUR` 属性。

    -   这里是对该约束更正确的一个非正式解释：员工不能注册在其离职当天或之后开始的课程，也不能在其离职当天或之后被终止（该员工正在注册的课程期间）。

    -   现在你正走上一条在尝试非正式描述数据库约束时通常难以避免的道路：你开始从**事务**的角度描述在给定约束下哪些操作不被允许。刚才发生的就是这样：给定某个
    `TERM` 元组，你不能*插入*一个 `OFFR` 元组，反之亦然，给定某个 `OFFR` 元组，你也不能插入一个 `TERM` 元组。

    -   随着约束所涵盖数据范围的扩大，用自然语言非正式地陈述约束的**内容**而不与客户疏远，变得越来越困难。你常常必须深入到约束的**实现方式**中。在与最终用户的沟通中，这并非坏事；你开始用系统将如何行为（给定约束下它将不接受哪些事务）的方式进行沟通，而最终用户通常能理解这一点。你的正式规范是生成这种行为的基础（我们将在第
    11 章详细讨论这一点）。例如，你可能想简要告知用户，在此约束下，某些情况下课程的时长不能被增加（更新）。


    谓词 `PTIJ10` 将一个 `EMP` 元组与两个相关的 `REG` 元组（`r1` 和 `r2`）连接，继续将这两个 `REG` 元组分别与其相关的
    `OFFR` 元组（`o1` 和 `o2`）连接，最后将两个 `OFFR` 元组与其相关的 `CRS` 元组（`c1` 和 `c2`）连接。此连接中的元组受以下谓词约束：

    ```

    o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨

    o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨

    o2(STARTS) ≥ o1(STARTS) + c1(DUR)

    ```

    该谓词表明，如果连接不涉及相同的两个 `OFFR` 元组，那么课程 `o1` 必须在课程 `o2` 结束后开始，反之亦然。'
- fmt: 'Predicate PTIJ12 is the “trainer” version of PTIJ9. Instead of joining TERM
    via REG (using the STUD attribute) to CRS, predicate PTIJ12 joins TERM via OFFR
    (using the TRAINER attribute) to CRS and limits the resulting tuples in the join
    in the same way.


    Predicate PTIJ15 joins an EMP tuple to a CRS tuple via REG and OFFR (representing
    the student that attends a course offering), and continues to join that same EMP
    tuple to a CRS tuple via OFFR (representing the trainer that gives an offering).
    It then restricts the tuples in this join in the same way as predicate PTIJ10
    does.


    You might have noticed a correlation between predicates PTIJ15 and PTIJ13; we
    will deal with this in an exercise at the end of this chapter.


    ## Listing 7-43. The “Other” Database Constraints of DB_UEX


    PODC1(TERM,MEMP) :=


    ```

    /* Active employee cannot be managed by terminated employee */

    { t1(EMPNO) | t1∈TERM } ∩

    { m(MGR) | m∈MEMP ∧

    ¬ ( ∃t2∈TERM: t2(EMPNO) = m(EMPNO) ) } = ∅

    ```


    PODC2(TERM,DEPT) :=


    ```

    /* Department cannot be managed by a terminated employee */

    { t(EMPNO) | t∈TERM } ∩ { d(MGR) | d∈DEPT } = ∅

    ```


    PODC3(OFFR,DEPT,EMP,CRS) :=


    ```

    /* At least half of the course offerings taught by a trainer */

    /* must be at home base */

    ( ∀e1∈{ o1(TRAINER) | o1∈OFFR ∧ o1(STATUS) ≠ ''CANC'' }:

    ( ∑t∈{ o2∪c2| d2∈DEPT ∧ e2∈EMP ∧ o2∈OFFR ∧ c2∈CRS ∧

    e2(EMPNO) = e1 ∧

    e2(EMPNO) = o2(TRAINER) ∧

    e2(DEPTNO) = d2(DEPTNO) ∧

    o2(COURSE) = c2(CODE) ∧

    o2(STATUS) ≠ ''CANC'' ∧

    o2(LOC) = d2(LOC)

    } : t(DUR)

    ) ≥

    ( ∑t∈{ o3∪c3| d3∈DEPT ∧ e3∈EMP ∧ o3∈OFFR ∧ c3∈CRS ∧

    e3(EMPNO) = e1 ∧

    e3(EMPNO) = o3(TRAINER) ∧

    e3(DEPTNO) = d3(DEPTNO) ∧

    o3(COURSE) = c3(CODE) ∧

    o3(STATUS) ≠ ''CANC'' ∧

    o3(LOC) ≠ d3(LOC)

    } : t(DUR) ) )

    ```


    PODC4(OFFR,REG) :=


    ```

    /* Offerings with 6+ registrations must have status confirmed */

    ( ∀o∈OFFR:

    #{ r | r∈REG ∧

    r↓{COURSE,STARTS} = o↓{COURSE,STARTS} } ≥ 6

    ⇒

    o(STATUS) = ''CONF'' )

    ```


    PODC5(OFFR,REG) :=


    ```

    /* Number of registrations cannot exceed maximum capacity of offering */

    ( ∀o∈OFFR:

    #{ r | r∈REG ∧

    r↓{COURSE,STARTS} = o↓{COURSE,STARTS} } ≤ o(MAXCAP) )

    ```


    PODC6(OFFR,REG) :=


    ```

    /* Canceled offerings cannot have registrations */

    ( ∀o∈OFFR: o(STATUS) = ''CANC''

    ⇒

    ¬( ∃r∈REG: r↓{COURSE,STARTS} = o↓{COURSE,STARTS} ) )

    ```


    PODC7(OFFR,REG,EMP) :=


    ```

    /* You are allowed to teach a certain course only if: */

    /* 1. You have been employed for at least one year, or */

    /* 2. You have attended that course first and the trainer of that */

    /* course offering attends your first teach as participant */

    ( ∀o1∈OFFR:

    /* If this is the 1st time this trainer gives this course ... */

    ( ¬∃o2∈OFFR:

    o1↓{COURSE,TRAINER} = o2↓{COURSE,TRAINER} ∧

    o2(STARTS) < o1(STARTS)

    ) ⇒

    ( /* then there should be an attendee in the classroom ... */

    ( ∃r1∈REG:

    r1↓{COURSE,STARTS} = o1↓{COURSE,STARTS} ∧

    /* who has given this course at an earlier date ... */

    ( ∃o3∈OFFR:

    o3(TRAINER) = r1(STUD) ∧

    o3(COURSE) = o1(COURSE) ∧

    o3(STARTS) < o1(STARTS) ∧

    /* and *that* course was attended by the current trainer */

    ( ∃r2∈REG:

    o3↓{COURSE,STARTS} = r2↓{COURSE,STARTS} ∧

    r2(STUD) = o1(TRAINER)

    ) ) ) ∨

    /* or, this trainer has been employed for at least one year */

    ( ↵{ e(HIRED) | e∈EMP ∧ e(EMPNO) = o1(TRAINER) } <

    o1(STARTS) - 365 ) ) )

    ```


    Predicate PODC1 states that the intersection of two sets should be the empty set.
    The first set holds all employee numbers of terminated employees. The second set
    holds all employee numbers of employees who manage an active (that is, not terminated)
    employee. By specifying that the intersection of these two sets is empty, you
    represent the informal requirement that an active employee cannot be managed by
    a terminated employee.


    In the same way, predicate PODC2 represents the informal requirement that a department
    is managed by an active employee.


    Predicate PODC3 universally quantifies over all employee numbers of employees
    that act as the trainer of some offering that has not been canceled. For each
    such employee number, it builds the set of (not canceled) OFFR tuples joined with
    their related CRS tuple, where the trainer of the offering equals the given employee
    (number), and the location of the offering is equal to the location of the department
    in which the given employee works. It then sums the DUR attribute values of all
    tuples in this set. The (summed) duration of offerings for the given trainer where
    the offering was given—at a location that differs from the trainer’s department
    location—is determined in the same way. For every given trainer, the former sum
    cannot be less than the latter sum.


    Of course, this is not the way you communicate with your users. You stick to the
    English sentence provided by them (see the embedded comments in the code) and
    verify the meaning of the terminology that they use in that sentence. The verb
    “taught” in “taught by a trainer” clearly means that the offering must have status
    scheduled or confirmed; canceled offerings are not to be considered. It appears
    that counting offerings involves the duration of the offering. Finally, an offering
    is considered to be “at home base” if its location is the same as the location
    of the department that employs the trainer.


    > **Note:** Constraint PODC3 requires that attribute LOC of the OFFR table structure
    can (meaningfully) be compared to attribute LOC of the DEPT table structure. Constraint
    PSSR7 has been introduced to ensure exactly this requirement.


    Predicate PODC4 states that offerings for which six or more students have registered
    must have status confirmed. It does this by inspecting the cardinality of the
    set that holds all registrations that are related to a given offering. If this
    cardinality is six or more, then the status of the given offering must be confirmed.


    The structure of predicate PODC5 is similar to the structure of PODC6. It universally
    quantifies over all offerings, and requires that the number of related registrations
    for the given offering cannot exceed the maximum capacity of the given offering.


    > **Note:** The combination of predicates PODC4 and PODC5 imply that it would
    be useless to allow an offering to have a maximum capacity of less than six; such
    an offering could never reach status confirmed. This is exactly why the attribute
    value set of attribute MAXCAP starts at value six (see Listing 7-9).


    Predicate PODC6 states that registrations for canceled offerings cannot exist.
    Consequently, whenever an offering gets canceled, all related registrations are
    to be removed.


    Predicate PODC7 constitutes the *pièce de résistance* of our example database
    universe. It requires that the first-time offering of every course taught by a
    trainer satisfies a certain condition. If the given trainer of such an offering
    has not been employed for at least one year, then this given trainer must have
    attended a prior offering of the same course, and the trainer of that prior course
    offering must attend such a first-time offering taught by a given trainer.


    Predicate PODC7 explicitly holds additional comments to guide you through its
    formal specification.


    When you try to read and understand a complex predicate such as PODC7, it’s useful
    to first study the top-down structure of the predicate. In this case, the structure
    of the predicate is as follows:'
