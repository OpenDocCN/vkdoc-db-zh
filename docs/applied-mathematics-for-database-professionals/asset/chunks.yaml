    }


    After a rewrite of the implication into a disjunction, this changes into the following:
    tup_OFFR :=


    { o | o∈P(chr_OFFR) ∧


    **/* Unassigned TRAINER allowed only for certain STATUS values */**


    o(TRAINER) ≠ -1 ∨ o(STATUS)∈{''CANC'',''SCHD''}


    }


    Because we have decided to represent the -1 with a NULL in the implementation
    of the OFFR table structure (again for reasons that will be explained later on),
    the first disjunct changes to trainer is not null in the preceding check constraint.


    We’ll end this section on implementing tuple constraints with an observation that
    is also valid for the constraint classes that follow hereafter.


    It is good practice to write all tuple constraints in conjunctive normal form
    (CNF; see the section “Normal Forms” in Chapter 3). This might require you to
    apply various rewrite rules first. By rewriting a constraint into CNF, you’ll
    end up with as many conjuncts as possible, where each conjunct represents a separately
    implementable constraint. For tuple constraints, you would create one declarative
    check constraint per conjunct. This in turn has the advantage that the DBMS reports
    violations of tuple constraints in *as detailed a way as possible*.


    Let’s explain this.


    7451CH11.qxd 5/15/07 2:26 PM Page 265


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    **265**


    **■Note** We again assume that SQL’s 3VL behaves in a 2VL fashion because all
    columns that are involved in constraints are mandatory.


    Suppose you create one check constraint for a tuple constraint that is—when rewritten
    in CNF—of the form A ∧ B. When that check constraint gets violated, all you know
    (in 2VL) is that A ∧ B is not TRUE. This, using the laws of De Morgan, translates
    as either A is not TRUE or B is not TRUE. Wouldn’t it be nicer if you knew exactly
    which one of the two was FALSE? If you would have created two separate check constraints
    (one for A and one for B), the DBMS could report which one of the two was causing
    the violation (or maybe they both are). In other words, by rewriting a constraint
    specification into CNF and implementing each conjunct separately, you’ll get more
    detailed error messages.


    As mentioned earlier, this observation also applies to the constraint classes
    that follow (table, database, and transition).


    **Table Constraint Implementation Issues**


    Up until now, everything has been straightforward concerning the implementation
    of data integrity constraints. However, when you increase the scope from tuple
    constraints to table constraints, and thus start dealing with constraints that
    span multiple tuples, implementing efficient DI code rapidly becomes much more
    complex.


    The main reason for this complexity is the poor support for declaring these constraints
    to the DBMS. You can state only two types of table constraints declaratively:
    uniquely identifying attributes (keys) and subset requirements referencing back
    to the same table, in which case a subset requirement is a table constraint (foreign
    key to the same table).


    Implementing all other types of table constraints requires you to develop procedural
    DI code. In practice, this means that you’ll often have to resort to the triggered
    procedural strategy.


    **■Note** We think there’s a reason why DBMS vendors offer us such poor declarative
    support. We’ll reveal this reason in the course of this section.


    We’ll introduce you to the complexity involved in implementing table constraints
    by illustrating different DI code *execution models*. In the first (rather large)
    subsection that follows, we’ll illustrate six different execution models, ranging
    from very inefficient to more efficient.


    As you’ll see, implementing more efficient execution models for DI code is also
    more complex.


    To explain every execution model clearly, we’ll be using two example table constraints
    and show how these constraints are implemented in every execution model. The constraints
    we’ll use are the last one specified in table universe tab_EMP in Listing 7-26
    and the last one specified in table universe tab_DEPT in Listing 7-30\. For your
    convenience, we repeat the formal specifications of these two constraints here
    (note that in these specifications E represents an employee table and D represents
    a department table).


    7451CH11.qxd 5/15/07 2:26 PM Page 266


    **266**


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    **/* A department that employs the president or a manager */**


    **/* should also employ at least one administrator */**


    ( ∀d∈E⇓{DEPTNO}:


    ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {''PRESIDENT'',''MANAGER''} )


    ⇒


    ( ∃e3∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = ''ADMIN'' )


    )


    **/* You cannot manage more than two departments */**


    ( ∀m∈D⇓{MGR}: #{ d | d∈D ∧ d(MGR) = m(MGR) } ≤ 2 )


    Next to implementing an efficient execution model, another—rather serious—issue
    comes into play when implementing DI code for table constraints. This concerns
    *transaction* *serialization*. Given that Oracle’s SQL DBMS can execute transactions
    concurrently, you must ensure that the queries inside DI code for a given constraint
    are executed in a serializable way: Oracle’s SQL DBMS does not guarantee serializability.
    We’ll explain this issue to you in detail in the section “DI Code Serialization.”


    **DI Code Execution Models**


    This section will discuss various execution models for implementing DI code for
    table constraints following the triggered procedural strategy. However, before
    doing so we’ll first provide you with a few preliminary observations with regards
    to the timing of DI code execution in relation to the DML statement execution.


    Some Observations


    With an SQL DBMS, you update the database by executing INSERT, UPDATE, or DELETE
    statements.


    Each of these statements operates on just one target table structure in just one
    manner—it’s either an INSERT, or an UPDATE, or a DELETE. Typically, transactions
    need to change more than one table, or possibly just one table in more than one
    manner. Therefore, your transactions in general consist of multiple DML statements
    that are serially executed one after the other.


    You implicitly start a transaction when the first DML statement is executed. A
    transaction is explicitly ended by either executing a COMMIT statement (requesting
    the DBMS to persist-ently store the changes made by this transaction), or by executing
    a rollback statement (requesting the DBMS to abort and undo the changes made by
    the current transaction). After ending a transaction, you can start a new one
    again by executing another (first) DML statement. All changes made by a transaction—that
    has not yet committed—are only visible to that transaction; other transactions
    cannot see these changes. Once a transaction commits, the changes it made become
    visible to other transactions.


    **■Note** Here we’re assuming that the DBMS is running in the read-committed isolation
    mode—the mode most often used within Oracle’s installed base.


    Of course, all constraints must be satisfied at the end of a transaction (when
    it commits).'
  trans: "### **GRD、MEMP、CRS 和 OFFR 表结构的元组约束**\n\n**代码清单 11-25.** GRD 表结构的元组约束\n```sql\n\
    alter table GRD add constraint grd_chk_bndw check (llimit <= (ulimit - 500));\n\
    alter table GRD add constraint grd_chk_bon2 check (bonus < llimit);\n```\n\n**代码清单\
    \ 11-26.** MEMP 表结构的元组约束\n```sql\nalter table MEMP add constraint mmp_chk_cycl\
    \ check (empno <> mgr);\n```\n\n**代码清单 11-27.** CRS 表结构的元组约束\n```sql\nalter table\
    \ CRS add constraint reg_chk_dur2 check ((cat <> 'BLD') or (dur <= 5));\n```\n\
    \n**代码清单 11-28.** OFFR 表结构的元组约束\n```sql\nalter table OFFR add constraint ofr_chk_trst\
    \ check (trainer is not null or status in ('CANC','SCHD'));\n```\n\n代码清单 11-28\
    \ 中所述元组约束的伴随形式化规范如下：\n\n```\ntup_OFFR :=\n{ o | o∈P(chr_OFFR) ∧\n/* 未分配的 TRAINER\
    \ 仅允许用于特定的 STATUS 值 */\no(TRAINER) = -1 ⇒ o(STATUS)∈{'CANC','SCHD'}\n}\n```\n\n\
    将蕴涵式重写为析取式后，变为以下形式：\n\n```\ntup_OFFR :=\n{ o | o∈P(chr_OFFR) ∧\n/* 未分配的 TRAINER\
    \ 仅允许用于特定的 STATUS 值 */\no(TRAINER) ≠ -1 ∨ o(STATUS)∈{'CANC','SCHD'}\n}\n```\n\n\
    由于我们决定在 `OFFR` 表结构的实现中使用 `NULL` 来表示 `-1`（原因将在后文解释），前面检查约束中的第一个析取项变为了 `trainer\
    \ is not null`。\n\n在结束关于实现元组约束的本节之前，我们提出一个观察结论，该结论对于其后的约束类别同样有效。\n\n最佳实践是将所有元组约束写成**合取范式**（CNF；参见第\
    \ 3 章“范式”一节）。这可能需要你首先应用各种重写规则。通过将约束重写为 CNF，你将得到尽可能多的合取项，每个合取项代表一个可单独实现的约束。对于元组约束，你会为每个合取项创建一个声明式检查约束。这反过来具有一个优点，即\
    \ DBMS 会以*尽可能详细的方式*报告对元组约束的违反。\n\n让我们解释一下。\n\n**注意：** 我们再次假设 SQL 的三值逻辑（3VL）以二值逻辑（2VL）的方式运行，因为约束中涉及的所有列都是强制性的（非空）。\n\
    \n假设你为一个在重写成 CNF 后形式为 `A ∧ B` 的元组约束创建了一个检查约束。当该检查约束被违反时，（在 2VL 中）你只知道 `A ∧ B`\
    \ 不是 `TRUE`。根据德摩根定律，这转化为：要么 `A` 不是 `TRUE`，要么 `B` 不是 `TRUE`。如果你能确切知道两者中哪一个为 `FALSE`，岂不是更好？如果你当初创建了两个独立的检查约束（一个用于\
    \ `A`，一个用于 `B`），DBMS 就能报告是两者中的哪一个导致了违反（或者可能两者都是）。换句话说，通过将约束规范重写为 CNF 并单独实现每个合取项，你将获得更详细的错误信息。\n\
    \n如前所述，这个观察结论也适用于后续的约束类别（表、数据库和过渡约束）。\n\n### **表约束实现问题**\n\n到目前为止，关于数据完整性约束的实现都很直接。然而，当你的范围从元组约束扩展到表约束，从而开始处理跨越多个元组的约束时，实现高效的\
    \ DI（数据完整性）代码迅速变得复杂得多。\n\n这种复杂性的主要原因在于向 DBMS 声明这些约束的支持力度不足。你只能以声明方式指定两种类型的表约束：唯一标识属性（键）和引用回同一表的子集要求（此时子集要求是表约束，即指向同一表的外键）。\n\
    \n实现所有其他类型的表约束都需要你开发过程式的 DI 代码。在实践中，这意味着你常常不得不诉诸于**触发式过程策略**。\n\n**注意：** 我们认为\
    \ DBMS 供应商之所以只提供如此有限的声明式支持，是有原因的。我们将在本节过程中揭示这个原因。\n\n我们将通过阐述不同的 DI 代码*执行模型*，向你介绍实现表约束所涉及的复杂性。在接下来的第一个（相当长的）子节中，我们将说明六种不同的执行模型，从非常低效到更高效。\n\
    \n正如你将看到的，为 DI 代码实现更高效的执行模型也更加复杂。\n\n为了清晰地解释每个执行模型，我们将使用两个示例表约束，并展示它们如何在每个执行模型中实现。我们将使用的约束是代码清单\
    \ 7-26 中表 universe `tab_EMP` 指定的最后一个约束，以及代码清单 7-30 中表 universe `tab_DEPT` 指定的最后一个约束。为方便起见，我们在此重复这两个约束的形式化规范（注意，在这些规范中，`E`\
    \ 代表员工表，`D` 代表部门表）。\n\n```\n/* 雇佣了总裁或经理的部门 */\n/* 也应至少雇佣一名管理员 */\n( ∀d∈E⇓{DEPTNO}:\n\
    \  ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {'PRESIDENT','MANAGER'} )\n  ⇒\n\
    \  ( ∃e3∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = 'ADMIN' )\n)\n\n/* 一个人最多只能管理两个部门\
    \ */\n( ∀m∈D⇓{MGR}: #{ d | d∈D ∧ d(MGR) = m(MGR) } ≤ 2 )\n```\n\n除了实现高效的执行模型之外，在为表约束实现\
    \ DI 代码时，另一个相当严重的问题也会出现。这涉及到*事务串行化*。鉴于 Oracle 的 SQL DBMS 可以并发执行事务，你必须确保 DI 代码内部的查询以可串行化的方式执行：Oracle\
    \ 的 SQL DBMS 并不保证串行化。我们将在“DI 代码串行化”一节中详细解释这个问题。\n\n### **DI 代码执行模型**\n\n本节将讨论按照触发式过程策略实现表约束\
    \ DI 代码的各种执行模型。但在讨论之前，我们首先就 DI 代码执行时间与 DML 语句执行时间的关系提供一些初步的观察结论。\n\n#### **一些观察结论**\n\
    \n使用 SQL DBMS 时，你通过执行 `INSERT`、`UPDATE` 或 `DELETE` 语句来更新数据库。这些语句中的每一个都只针对一个目标表结构以一种方式操作——要么是\
    \ `INSERT`，要么是 `UPDATE`，要么是 `DELETE`。通常，事务需要更改多个表，或者可能只是一个表但以多种方式更改。因此，你的事务通常由多个\
    \ DML 语句组成，这些语句一个接一个地串行执行。\n\n当执行第一条 DML 语句时，你隐式地启动了一个事务。事务通过执行 `COMMIT` 语句（请求\
    \ DBMS 持久存储此事务所做的更改）或执行 `rollback` 语句（请求 DBMS 中止并撤消当前事务所做的更改）来显式结束。结束一个事务后，你可以通过执行另一条（第一条）DML\
    \ 语句再次启动一个新事务。一个尚未提交的事务所做的所有更改仅对该事务可见；其他事务无法看到这些更改。一旦事务提交，它所做的更改就对其他事务可见。\n\n\
    **注意：** 这里我们假设 DBMS 运行在**读已提交**隔离模式下——这是 Oracle 已安装数据库中最常用的模式。\n\n当然，所有约束必须在事务结束时（提交时）得到满足。"
- fmt: "That is to say, you don’t want a transaction to commit successfully while\
    \ the database state produced by the serial execution of its DML statements so\
    \ far, violates one of the constraints.\n\nBut what about the database states\
    \ that exist in between the execution of two DML statements inside the same transaction?\
    \ Should these database states always satisfy all constraints too, or might they\
    \ be in violation of some constraints, as long as the last database state (the\
    \ one that the transaction commits) satisfies all constraints?\n\nFor the time\
    \ being, we disallow that these intermediate database states violate any database\
    \ constraint.\n\n## Note\nHowever, we’ll revisit this question in the section\
    \ “Bringing Deferred Checking into the Picture,” where you’ll see that to implement\
    \ certain transactions using Oracle’s SQL DBMS, we must allow certain constraints\
    \ to be temporarily violated in one of the intermediate database states.\n\nA\
    \ `DML` statement that attempts to create a database state that violates a constraint\
    \ will fail; in the following execution models we’ll ensure that the changes of\
    \ such a `DML` statement will be rolled back immediately, while preserving the\
    \ database state changes made by prior `DML` statements that executed successfully\
    \ inside the transaction.\n\nIn Table 11-1 you can find an example transaction\
    \ that executes four `DML` statements; the table shows the database state transitions\
    \ that occur within this transaction.\n\n**Table 11-1.** Database State Transitions\
    \ Inside a Transaction\n\n| Time | Start DB State | DML | End DB State | Comment\
    \ |\n| :--- | :--- | :--- | :--- | :--- |\n| | `dbs0` | `DML0;` | `dbs1` | Transaction\
    \ starts. `dbs1` is a valid state. |\n| | `dbs1` | `DML1;` | `dbs2` | `dbs2` violates\
    \ a constraint; `DML1` is rolled back. |\n| | `dbs1` | `DML2;` | `dbs3` | `dbs3`\
    \ is a valid state. |\n| | `dbs3` | `DML3;` | `dbs4` | `dbs4` violates a constraint;\
    \ `DML3` is rolled back. |\n| | `dbs3` | `commit;` | `dbs3` | `dbs3` is committed\
    \ and made visible to other transactions. |\n\nOur execution model will be based\
    \ on triggers. As mentioned before, triggers are associated with a table structure\
    \ and will automatically be executed (“fired”) by the `DBMS` if a `DML` statement\
    \ changes the content of that table. The code inside the trigger body can then\
    \ check whether the new database state satisfies all constraints. If the state\
    \ does not satisfy all constraints, then this code will force the triggering `DML`\
    \ statement to fail; the `DBMS` then ensures that its changes are rolled back.\n\
    \nYou should be aware of a limitation that `row triggers` have (the ones that\
    \ fire for each affected row). These triggers are only allowed to query the state\
    \ of *other* table structures; that is, they are not allowed to query the table\
    \ structure on which the triggering `DML` statement is currently operating. If\
    \ you try this, you’ll hit the infamous `mutating table` error (`ORA-04091: table\
    \ ... is mutating, trigger/function may not see it`).\n\nThe very valid reason\
    \ why Oracle’s `SQL DBMS` disallows you to do this is to prevent `nondeterministic\
    \ behavior`. That’s because if your `row triggers` would be allowed to query a\
    \ table structure that a `DML` statement is currently modifying, then these queries\
    \ would perform a dirty read within the transaction. These queries see intermediate\
    \ table states that only exist while the triggering `DML` statement is being executed\
    \ row by row. Depending upon the order in which the SQL optimizer happens to process\
    \ the rows, the outcome of these queries can be different. This would cause `nondeterministic\
    \ behavior`, which is why Oracle’s `DBMS` won’t allow you to query the “mutating”\
    \ table.\n\nGiven the essence of a table constraint—that is, it involves multiple\
    \ rows in a table—the `DI` code for a table constraint will always require you\
    \ to execute queries against the table that has been modified; however, the `mutating\
    \ table` error prevents you from doing so. Therefore, `row triggers` are not suitable\
    \ to be used as containers of `DI` code for table constraints.\n\n`Before statement\
    \ triggers` see the start database state in which a `DML` statement starts execution.\
    \ `After statement triggers` see the end database state created by the execution\
    \ of a `DML` statement. Because `DI` code needs to validate the end state of a\
    \ `DML` statement, you are left with no more than three `after statement triggers`\
    \ per table structure (`insert`, `update`, and `delete`) on which to base an execution\
    \ model.\n\nGiven these observations, we can now go ahead and illustrate six different\
    \ execution models for `DI` code. In discussing the execution models, we’ll sometimes\
    \ broaden the scope to also include database constraints.\n\n## Execution Model\
    \ 1: Always\nIn the first execution model (`EM1`), whenever a `DML` statement\
    \ is executed, then the corresponding `after statement trigger` will hold code\
    \ that sequentially executes the `DI` code for every constraint. In this model,\
    \ every intermediate database state (including the last one) is validated to satisfy\
    \ all constraints.\n\nThis execution model only serves as a starting point; you\
    \ would never want to make use of this model, because it’s highly inefficient.\
    \ For instance, if a `DML` statement changes the `EMP` table structure, then this\
    \ execution model would then also run the `DI` code to check constraints that\
    \ do not involve the `EMP` table structure. Obviously, this is completely unnecessary\
    \ because these other table structures remain unchanged; constraints that don’t\
    \ involve the table structure upon which the triggering `DML` statement operates\
    \ need not be validated.\n\nLet’s quickly forget this model, and move on to a\
    \ more efficient one.\n\n## Execution Model 2: On-Involved-Table\nThis execution\
    \ model (`EM2`) very much resembles `EM1`. The only difference is that you now\
    \ make use of the knowledge of what the involved table structures are for each\
    \ constraint. You only run `DI` code for a given constraint, if the table structure\
    \ that is being changed by a `DML` statement is involved in the constraint (hence\
    \ the “On-Involved-Table” in the section title).\n\nLet’s take a closer look at\
    \ how the example table constraint of the `EMP` table structure is implemented\
    \ in this execution model. Remember, this was the constraint: “A department that\
    \ employs the president or a manager should also employ at least one administrator.”\
    \ You can formally derive the constraint validation query that you need to execute\
    \ for verifying whether a new database state still satisfies this constraint.\
    \ The way to do this is by translating the formal specification into an SQL `WHERE`-clause\
    \ expression and then executing a query that evaluates the truth value of this\
    \ expression. You can use the `DUAL` table to evaluate the expression. Let’s demonstrate\
    \ this. Here is the formal specification of this table constraint:\n\n```\n( ∀d∈E⇓{DEPTNO}:\n\
    \  ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {'PRESIDENT','MANAGER'} )\n  ⇒\n\
    \  ( ∃e3∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = 'ADMIN' )\n)\n```\n\nBefore you\
    \ can translate the formal specification into an SQL expression, you’ll need to\
    \ get rid of the universal quantifier and implication. Following is the rewritten\
    \ version of the specification.\n\n## Tip\nTry to rewrite this specification yourself;\
    \ start by adding a double negation in front of the preceding specification.\n\
    \n```\n¬ ( ∃d∈E⇓{DEPTNO}:\n  ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {'PRESIDENT','MANAGER'}\
    \ )\n  ∧\n  ¬ ( ∃e3∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = 'ADMIN' )\n)\n```\n\n\
    This now easily translates to `SQL` (we’re naming this constraint `EMP_TAB03`)."
  raw: 'That is to say, you don’t want a transaction to commit successfully while
    the database state,


    7451CH11.qxd 5/15/07 2:26 PM Page 267


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    **267**


    produced by the serial execution of its DML statements so far, violates one of
    the constraints.


    But what about the database states that exist in between the execution of two
    DML statements inside the same transaction? Should these database states always
    satisfy all constraints too, or might they be in violation of some constraints,
    as long as the last database state (the one that the transaction commits) satisfies
    all constraints?


    For the time being, we disallow that these intermediate database states violate
    any database constraint.


    **■Note** However, we’ll revisit this question in the section “Bringing Deferred
    Checking into the Picture,”


    where you’ll see that to implement certain transactions using Oracle’s SQL DBMS,
    we must allow certain constraints to be temporarily violated in one of the intermediate
    database states.


    A DML statement that attempts to create a database state that violates a constraint
    will fail; in the following execution models we’ll ensure that the changes of
    such a DML statement will be rolled back immediately, while preserving the database
    state changes made by prior DML statements that executed successfully inside the
    transaction.


    In Table 11-1 you can find an example transaction that executes four DML statements;
    the table shows the database state transitions that occur within this transaction.


    **Table 11-1.** *Database State Transitions Inside a Transaction* **Time**


    **Start DB State**


    **DML**


    **End DB State**


    **Comment**


    dbs0


    DML0;


    dbs1


    Transaction starts. dbs1 is a valid state.


    dbs1


    DML1;


    dbs2


    dbs2 violates a constraint; DML1 is rolled


    back.


    dbs1


    DML2;


    dbs3


    dbs3 is a valid state.


    dbs3


    DML3;


    dbs4


    dbs4 violates a constraint; DML3 is rolled


    back.


    dbs3


    commit;


    dbs3


    dbs3 is committed and made visible to


    other transactions.


    Our execution model will be based on triggers. As mentioned before, triggers are
    associated with a table structure and will automatically be executed (“fired”)
    by the DBMS if a DML


    statement changes the content of that table. The code inside the trigger body
    can then check whether the new database state satisfies all constraints. If the
    state does not satisfy all constraints, then this code will force the triggering
    DML statement to fail; the DBMS then ensures that its changes are rolled back.


    You should be aware of a limitation that row triggers have (the ones that fire
    for each affected row). These triggers are only allowed to query the state of
    *other* table structures; that is, they are not allowed to query the table structure
    on which the triggering DML statement is currently operating. If you try this,
    you’ll hit the infamous *mutating table* error (ORA-04091: table ... is mutating,
    trigger/function may not see it).


    The very valid reason why Oracle’s SQL DBMS disallows you to do this is to prevent
    *nondeterministic behavior*. That’s because if your row triggers would be allowed
    to query a


    7451CH11.qxd 5/15/07 2:26 PM Page 268


    **268**


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    table structure that a DML statement is currently modifying, then these queries
    would perform a dirty read within the transaction. These queries see intermediate
    table states that only exist while the triggering DML statement is being executed
    row by row. Depending upon the order in which the SQL optimizer happens to process
    the rows, the outcome of these queries can be different. This would cause nondeterministic
    behavior, which is why Oracle’s DBMS


    won’t allow you to query the “mutating” table.


    Given the essence of a table constraint—that is, it involves multiple rows in
    a table—the DI code for a table constraint will always require you to execute
    queries against the table that has been modified; however, the mutating table
    error prevents you from doing so. Therefore, row triggers are not suitable to
    be used as containers of DI code for table constraints.


    Before statement triggers see the start database state in which a DML statement
    starts execution. After statement triggers see the end database state created
    by the execution of a DML statement. Because DI code needs to validate the end
    state of a DML statement, you are left with no more than three after statement
    triggers per table structure (insert, update, and delete) on which to base an
    execution model.


    Given these observations, we can now go ahead and illustrate six different execution
    models for DI code. In discussing the execution models, we’ll sometimes broaden
    the scope to also include database constraints.


    Execution Model 1: Always


    In the first execution model (EM1), whenever a DML statement is executed, then
    the corresponding after statement trigger will hold code that sequentially executes
    the DI code for every constraint. In this model, every intermediate database state
    (including the last one) is validated to satisfy all constraints.


    This execution model only serves as a starting point; you would never want to
    make use of this model, because it’s highly inefficient. For instance, if a DML
    statement changes the EMP


    table structure, then this execution model would then also run the DI code to
    check constraints that do not involve the EMP table structure. Obviously, this
    is completely unnecessary because these other table structures remain unchanged;
    constraints that don’t involve the table structure upon which the triggering DML
    statement operates need not be validated.


    Let’s quickly forget this model, and move on to a more efficient one.


    Execution Model 2: On-Involved-Table


    This execution model (EM2) very much resembles EM1\. The only difference is that
    you now make use of the knowledge of what the involved table structures are for
    each constraint. You only run DI code for a given constraint, if the table structure
    that is being changed by a DML


    statement is involved in the constraint (hence the “On-Involved-Table” in the
    section title).


    Let’s take a closer look at how the example table constraint of the EMP table
    structure is implemented in this execution model. Remember, this was the constraint:
    “A department that employs the president or a manager should also employ at least
    one administrator.” You can formally derive the constraint validation query that
    you need to execute for verifying whether a new database state still satisfies
    this constraint. The way to do this is by translating the formal specification
    into an SQL WHERE-clause expression and then executing a query that evaluates
    the truth value of this expression. You can use the DUAL table to evaluate the
    expression. Let’s demonstrate this. Here is the formal specification of this table
    constraint:


    7451CH11.qxd 5/15/07 2:26 PM Page 269


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    **269**


    ( ∀d∈E⇓{DEPTNO}:


    ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {''PRESIDENT'',''MANAGER''} )


    ⇒


    ( ∃e3∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = ''ADMIN'' )


    )


    Before you can translate the formal specification into an SQL expression, you’ll
    need to get rid of the universal quantifier and implication. Following is the
    rewritten version of the specification.


    **■Tip** Try to rewrite this specification yourself; start by adding a double
    negation in front of the preceding specification.


    ¬ ( ∃d∈E⇓{DEPTNO}:


    ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {''PRESIDENT'',''MANAGER''} )


    ∧


    ¬ ( ∃e3∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = ''ADMIN'' )


    )


    This now easily translates to SQL (we’re naming this constraint EMP_TAB03).'
  trans: "\n也就是说，你不希望一个事务成功提交，而其 DML 语句到目前为止串行执行所产生的数据库状态却违反了某条约束。\n\n但是，在同一个事务内部，两条\
    \ DML 语句执行之间存在的那些数据库状态呢？是否这些中间数据库状态也必须始终满足所有约束？还是说，只要最终的数据库状态（事务提交时的状态）满足所有约束，中间状态可以违反某些约束？\n\
    \n目前，我们不允许这些中间数据库状态违反任何数据库约束。\n\n## 注意\n不过，在“引入延迟检查”一节中，我们会重新审视这个问题。届时你会看到，为了使用\
    \ Oracle 的 SQL DBMS 实现某些事务，我们必须允许某些约束在某个中间数据库状态中被暂时违反。\n\n一条试图创建违反约束的数据库状态的`DML`语句将会失败；在接下来的执行模型中，我们会确保此类`DML`语句的更改会被立即回滚，同时保留该事务内先前成功执行的`DML`语句所做的数据库状态更改。\n\
    \n在表 11-1 中，你可以找到一个执行了四条`DML`语句的示例事务；该表展示了在此事务内发生的数据库状态转换。\n\n**表 11-1.** 事务内的数据库状态转换\n\
    \n| 时间 | 起始数据库状态 | DML | 结束数据库状态 | 注释 |\n| :--- | :--- | :--- | :--- | :--- |\n\
    | | `dbs0` | `DML0;` | `dbs1` | 事务开始。`dbs1`是一个有效状态。 |\n| | `dbs1` | `DML1;` |\
    \ `dbs2` | `dbs2`违反约束；`DML1`被回滚。 |\n| | `dbs1` | `DML2;` | `dbs3` | `dbs3`是一个有效状态。\
    \ |\n| | `dbs3` | `DML3;` | `dbs4` | `dbs4`违反约束；`DML3`被回滚。 |\n| | `dbs3` | `commit;`\
    \ | `dbs3` | `dbs3`被提交并对其他事务可见。 |\n\n我们的执行模型将基于触发器。如前所述，触发器与一个表结构相关联，如果一条`DML`语句更改了该表的内容，`DBMS`会自动执行（“触发”）该触发器。触发器主体内的代码可以检查新的数据库状态是否满足所有约束。如果该状态不满足所有约束，那么此代码将强制触发它的`DML`语句失败；随后`DBMS`会确保其更改被回滚。\n\
    \n你应该意识到`行级触发器`（为每个受影响行触发的触发器）存在一个限制。这些触发器只允许查询*其他*表结构的状态；也就是说，它们不允许查询触发它的`DML`语句当前正在操作的表结构。如果你尝试这样做，就会遇到臭名昭著的`变异表`错误（`ORA-04091:\
    \ table ... is mutating, trigger/function may not see it`）。\n\nOracle 的`SQL DBMS`不允许你这样做的非常合理的原因是为了防止`非确定性行为`。这是因为如果你的`行级触发器`被允许查询一个`DML`语句正在修改的表结构，那么这些查询将在事务内执行脏读。这些查询看到的中间表状态仅在触发它的`DML`语句逐行执行时存在。根据\
    \ SQL 优化器处理行的顺序，这些查询的结果可能不同。这将导致`非确定性行为`，这就是 Oracle 的`DBMS`不允许你查询“变异”表的原因。\n\n\
    考虑到表约束的本质——即它涉及表中的多行——表约束的`DI`代码总是需要你对已被修改的表执行查询；然而，`变异表`错误阻止你这样做。因此，`行级触发器`不适合作为表约束`DI`代码的容器。\n\
    \n`语句前触发器`看到的是`DML`语句开始执行时的起始数据库状态。`语句后触发器`看到的是由`DML`语句执行创建的结束数据库状态。由于`DI`代码需要验证`DML`语句的结束状态，因此你只剩下每个表结构（`插入`、`更新`和`删除`）的三个`语句后触发器`可以用来构建执行模型。\n\
    \n基于这些观察，我们现在可以继续说明`DI`代码的六种不同执行模型。在讨论执行模型时，我们有时会扩大范围，也将数据库约束包括在内。\n\n## 执行模型\
    \ 1：总是执行\n在第一个执行模型（`EM1`）中，每当执行一条`DML`语句，相应的`语句后触发器`将包含按顺序执行每个约束的`DI`代码。在此模型中，每个中间数据库状态（包括最后一个）都被验证是否满足所有约束。\n\
    \n这个执行模型仅作为起点；你绝不会想使用此模型，因为它效率极低。例如，如果一条`DML`语句更改了`EMP`表结构，那么此模型还会运行`DI`代码来检查那些不涉及`EMP`表结构的约束。显然，这完全是没必要的，因为其他表结构保持不变；不涉及触发它的`DML`语句所操作的表结构的约束无需验证。\n\
    \n让我们快速忘记这个模型，转向一个更高效的模型。\n\n## 执行模型 2：基于涉及的表\n这个执行模型（`EM2`）与`EM1`非常相似。唯一的区别是你现在利用了每个约束所涉及表结构的知识。只有当`DML`语句正在更改的表结构参与了某个约束时，你才运行该约束的`DI`代码（因此本节标题中有了“基于涉及的表”）。\n\
    \n让我们仔细看看`EMP`表结构的示例表约束在此执行模型中是如何实现的。记住，该约束是：“雇佣总裁或经理的部门也应至少雇佣一名管理员。”你可以形式化地推导出为验证新的数据库状态是否仍满足此约束而需要执行的约束验证查询。方法是将形式化规范转换为\
    \ SQL 的`WHERE`子句表达式，然后执行一个评估该表达式真值的查询。你可以使用`DUAL`表来评估该表达式。让我们演示一下。以下是此表约束的形式化规范：\n\
    \n```\n( ∀d∈E⇓{DEPTNO}:\n  ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {'PRESIDENT','MANAGER'}\
    \ )\n  ⇒\n  ( ∃e3∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = 'ADMIN' )\n)\n```\n\n\
    在将形式化规范转换为 SQL 表达式之前，你需要消除全称量词和蕴涵。以下是重写后的规范版本。\n\n## 提示\n试着自己重写这个规范；从前述规范前面加上双重否定开始。\n\
    \n```\n¬ ( ∃d∈E⇓{DEPTNO}:\n  ( ∃e2∈E: e2(DEPTNO) = d(DEPTNO) ∧ e2(JOB) ∈ {'PRESIDENT','MANAGER'}\
    \ )\n  ∧\n  ¬ ( ∃e3∈E: e3(DEPTNO) = d(DEPTNO) ∧ e3(JOB) = 'ADMIN' )\n)\n```\n\n\
    这现在可以轻松地转换为`SQL`（我们将此约束命名为`EMP_TAB03`）。\n"
- fmt: "## Oracle中的数据库设计实现\n\n`■Note` Oracle中的`DUAL`表是一个单列单行的系统表。它最常用于让SQL引擎计算`SELECT`子句表达式或`WHERE`子句表达式。下面的代码展示了后一种用法。\n\
    ```sql\nselect 'Constraint EMP_TAB03 is satisfied'\nfrom DUAL\nwhere not exists(select\
    \ d.DEPTNO\n                from EMP d\n                where exists(select e2.*\n\
    \                             from EMP e2\n                             where\
    \ e2.DEPTNO = d.DEPTNO\n                             and e2.JOB in ('PRESIDENT','MANAGER'))\n\
    \                and not exists(select e3.*\n                               from\
    \ EMP e3\n                               where e3.DEPTNO = d.DEPTNO\n        \
    \                       and e3.JOB = 'ADMIN'))\n```\n\n在EM2中，您将仅为涉及此约束的`EMP`表结构创建三个`after\
    \ statement`触发器。这些触发器包含前面的查询，以验证新的数据库状态是否仍满足此约束。清单11-29展示了将这三个触发器合并为一个`create\
    \ trigger`语句。\n\n**清单11-29.** *约束`EMP_TAB03`的EM2 DI代码*\n```sql\ncreate trigger\
    \ EMP_AIUDS_TAB03\nafter insert or update or delete on EMP\ndeclare pl_dummy varchar(40);\n\
    begin\n--\n  select 'Constraint EMP_TAB03 is satisfied' into pl_dummy\n  from\
    \ DUAL\n  where not exists(select d.DEPTNO\n                   from EMP d\n  \
    \                 where exists(select e2.*\n                                from\
    \ EMP e2\n                                where e2.DEPTNO = d.DEPTNO\n       \
    \                         and e2.JOB in ('PRESIDENT','MANAGER'))\n           \
    \        and not exists(select e3.*\n                                  from EMP\
    \ e3\n                                  where e3.DEPTNO = d.DEPTNO\n         \
    \                         and e3.JOB = 'ADMIN'));\n--\nexception when no_data_found\
    \ then\n--\n  raise_application_error(-20999,'Constraint EMP_TAB03 is violated.');\n\
    --\nend;\n```\n\n`■Note` 通过解析约束声明的形式规范，DBMS可以*计算*出涉及的表。此外，DBMS可以*计算*需要运行的验证查询，以验证约束是否仍然满足（这只需要应用重写规则，最终得到一个可以转换为SQL表达式的规范）。因此，DBMS可以生成前面的触发器。换句话说，DBMS供应商可以*以声明方式*完全支持这种执行模型！\n\
    \n清单11-30展示了使用此执行模型表示约束`DEPT_TAB01` DI代码的三个触发器。\n\n**清单11-30.** *约束`DEPT_TAB01`的EM2\
    \ DI代码*\n```sql\ncreate trigger DEPT_AIUDS_TAB01\nafter insert or update or delete\
    \ on DEPT\ndeclare pl_dummy varchar(40);\nbegin\n--\n  select 'Constraint DEPT_TAB01\
    \ is satisfied' into pl_dummy from DUAL\n  where not exists(select m.DEPTNO\n\
    \                   from DEPT m\n                   where 2 < (select count(*)\n\
    \                               from DEPT d\n                               where\
    \ d.MGR = m.MGR));\n--\nexception when no_data_found then\n--\n  raise_application_error(-20999,'Constraint\
    \ DEPT_TAB01 is violated.');\n--\nend;\n/\n```\n\n这种执行模型仍然效率低下。例如，当您更新员工姓名时，此执行模型将验证约束`EMP_TAB03`。显然，因为`ENAME`列完全不涉及在此约束中，更新`ENAME`的`DML`语句绝不应该引发检查约束`EMP_TAB03`的需要。类似的低效也适用于约束`DEPT_TAB01`；例如，当您更新部门位置（而属性`LOC`不涉及在约束`DEPT_TAB01`中）时，EM2将验证此约束。下一个执行模型解决了这种低效问题。\n\
    \n### 执行模型3：按涉及列\n\n这种执行模型（EM3）在`DML`语句是`INSERT`或`DELETE`的情况下与EM2相同。但是，当发生更新时，您现在还利用了每个约束（按表结构）涉及哪些属性的知识。对于给定的约束，只有当涉及的属性被`UPDATE`语句修改时，才需要验证此约束。`INSERT`和`DELETE`语句总是涉及所有属性，因此无论约束涉及哪些属性，每当它们发生时，都会引发需要验证涉及表结构的约束。\n\
    \n让我们再次使用示例表约束`EMP_TAB03`来演示。在这种情况下，插入和删除触发器与EM2中的保持相同。您只需更改更新触发器以提高效率。仅通过扫描约束`EMP_TAB03`的形式规范，您就可以发现涉及的属性；对于此约束，它们是`DEPTNO`和`JOB`。\n\
    \n每当发生`UPDATE`语句时，您现在仅当`UPDATE`语句更改了`DEPTNO`或`JOB`（或两者）属性时，才执行在EM2中开发的DI代码。\n\n\
    `■Note` 您可能很容易理解，更新`JOB`可能会违反此约束。例如，在给定部门中，当您将一名管理员提升为培训师时，很可能您刚刚“移除”了该部门要求存在的唯一管理员，因为该部门还雇佣了总裁或经理。此外，例如，当您将一名培训师提升为经理时，这可能是该部门的第一位经理。这现在将要求该部门还雇佣一名管理员。类似的情况也适用于更新`DEPTNO`；如果您将目前在部门10工作的经理切换到部门20工作，那么该经理可能是部门20的第一位经理，因此……，等等。\n\
    \nSQL标准允许您在更新触发器中指定这些列。然后，更新触发器仅在其中一个涉及的列被更改时才会触发。以下是您如何在Oracle中编写`after statement\
