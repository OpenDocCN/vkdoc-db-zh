  trans: "图 A-1 展示了构成我们示例数据库设计的十个表（由圆角框表示）及其相互关系（由箭头表示）的示意图。\n\n每条箭头都表示一对表之间适用的`子集要求`。这些`子集要求`表明，箭头起始表的某种投影应始终是箭头指向表的某种投影的子集。这些箭头大多代表了通常所说的`多对一关系`，并在最终的实现阶段将成为`外键约束`。\n\
    \n然而，正如你在第 11 章所见，情况并非总是如此。\n\n我们将在本附录的第五节中，在数据库宇宙规范 `DB_UEX` 中给出每条箭头的确切含义。\n\n\
    我们的数据库保存着公司的员工 (`EMP`) 和部门 (`DEPT`)。部分箭头表示以下关系：\n\n-   一名员工为一个部门工作。\n-   一个部门由一名员工管理。\n\
    -   一名员工被分配到一个工资等级 (`GRD`)。\n\n所有工资和/或“所属部门”变更都保留员工历史记录 (`HIST`)；每条历史记录描述了一名员工在一段时期内被分配到一个部门并享有特定工资的情况。\n\
    \n我们在一个单独的表 (`SREP`) 中保存所有销售代表的附加信息。我们在一个表 `TERM` 中保存那些不再为公司工作的员工（即，他们已被解雇或已辞职）的附加信息。我们还保存所有有经理的受管理员工\
    \ (`MEMP`) 的附加信息；即，那些有经理分配给他们的员工。\n\n数据库还保存有关课程 (`CRS`)、这些课程的开设班次 (`OFFR`) 以及这些班次的注册\
    \ (`REG`) 信息。还有一些箭头表示以下关系：\n\n-   一个班次必须由一名为公司工作的培训师来教授。\n-   一个班次属于一门现有课程。\n\
    -   一条注册记录将一名员工作为一名学员记录在一个课程班次中。\n\n### 图 A-1. 示例数据库图示\n\n## 数据库骨架 DB_S\n\n在本节中，你将找到示例数据库骨架\
    \ `DB_S` 的规范。\n\n`数据库骨架` 定义了我们的词汇表；对于每个表，我们引入一个表别名，并为每个表引入所涉及属性的名称。我们这里不给出表的外部谓词；你可以在本附录下一节的表空间定义中找到它们。\n\
    \n`数据库骨架` 是一个集合值函数；对于每个表，该函数生成该表的属性集（表头）。示例数据库的数据库骨架 `DB_S` 在清单 A-1 中定义。\n\n###\
    \ 清单 A-1. 数据库骨架定义\n\n```\nDB_S = { (EMP; -- 员工 (Employees)\n          { EMPNO\
    \ /* 员工编号 */\n          , ENAME /* 员工姓名 */\n          , JOB /* 员工职位 */\n     \
    \     , BORN /* 出生日期 */\n          , HIRED /* 入职日期 */\n          , SGRADE /* 工资等级\
    \ */\n          , MSAL /* 月薪 */\n          , USERNAME /* 用户名 */\n          , DEPTNO\
    \ } ) /* 部门编号 */\n       , (SREP; -- 销售代表 (Sales Representatives)\n          {\
    \ EMPNO /* 员工编号 */\n          , TARGET /* 销售目标 */\n          , COMM } ) /* 佣金\
    \ */\n       , (MEMP; -- 受管理员工 (Managed Employees)\n          { EMPNO /* 员工编号\
    \ */\n          , MGR } ) /* 经理：员工编号 */\n       , (TERM; -- 已离职员工 (Terminated\
    \ Employees)\n          { EMPNO /* 员工编号 */\n          , LEFT /* 离职日期 */\n    \
    \      , COMMENTS } ) /* 离职备注 */\n       , (DEPT; -- 部门 (Departments)\n      \
    \    { DEPTNO /* 部门编号 */\n          , DNAME /* 部门名称 */\n          , LOC /* 地点\
    \ */\n          , MGR } ) /* 经理：员工编号 */\n       , (GRD; -- 工资等级 (Salary Grades)\n\
    \          { GRADE /* 等级代码 */\n          , LLIMIT /* 工资下限 */\n          , ULIMIT\
    \ /* 工资上限 */\n          , BONUS } ) /* 年度奖金 */\n       , (CRS; -- 课程 (Courses)\n\
    \          { CODE /* 课程代码 */\n          , DESCR /* 课程描述 */\n          , CAT /*\
    \ 课程类别 */\n          , DUR } ) /* 课程时长（天） */\n       , (OFFR; -- 课程班次 (Course\
    \ Offerings)\n          { COURSE /* 课程代码 */\n          , STARTS /* 本次班次开始日期 */\n\
    \          , STATUS /* 已安排、已确认... */\n          , MAXCAP /* 最大参与容量 */\n      \
    \    , TRAINER /* 培训师：员工编号 */\n          , LOC } ) /* 地点 */\n       , (REG; --\
    \ 课程注册 (Course Registrations)\n          { STUD /* 学员：员工编号 */\n          , COURSE\
    \ /* 课程代码 */\n          , STARTS /* 课程班次开始日期 */\n          , EVAL } ) /* 评估 */\n\
    \       , (HIST; -- 员工历史记录 (Employee History Records)\n          { EMPNO /* 员工编号\
    \ */\n          , UNTIL /* 历史记录结束日期 */\n          , DEPTNO /* 部门编号 */\n      \
    \    , MSAL } ) } /* 月薪 */\n```\n\n## 表空间定义\n\n本节提供了示例数据库十个表空间的形式化定义。\n\n对于每个表，你将找到四个小节：\n\
    \n-   表的`外部谓词`，向数据库用户描述表属性的含义。\n-   `属性特征`，为每个属性附加`属性值集`。命名约定为 `chr_<表别名>`。\n\
    -   `元组空间`，为表定义`元组约束`（如果有）。命名约定为 `tup_<表别名>`。\n-   `表空间`，为表定义`表约束`。命名约定为 `tab_<表别名>`。\n\
    \n**注意：**`元组空间`规范建立在`属性特征`规范之上；`表空间`规范又建立在`元组空间`规范之上。"
- fmt: "# Chapter 7 Explained\n\nChapter 7 explained the following:\n\n- An `attribute-value\
    \ set` acts as the data type for the corresponding attribute.\n- A `tuple universe`\
    \ acts as the data type for a `tuple variable` of the table at hand.\n- A `table\
    \ universe` acts as the data type for a corresponding `table variable`.\n\nYou’ll\
    \ notice that the attribute-value sets are always defined by first drawing values\
    \ from the base data types that are available in current SQL database management\
    \ systems (that is, `NUMBER`, `VARCHAR`, and `DATE`) and then narrowing down these\
    \ sets by specifying attribute constraints. In doing so, the attribute constraint\
    \ expression to implement with the SQL `CHECK` clause is made explicit.\n\nWhere\
    \ deemed necessary, you’ll find embedded comments (`/* ... */`) explaining the\
    \ formal definition.\n\nAll tuple, table, database, and dynamic constraints are\
    \ sequentially numbered for easy reference.\n\n## Some Convenient Sets\n\nIn our\
    \ database definition, four sets occur frequently: employee numbers, department\
    \ numbers, salary-related amounts, and course codes. Therefore, we define them\
    \ here so we can refer to them by name. You could consider them user-defined data\
    \ types:\n\n```\nEMPNO_TYP = { n | n∈number(4,0) ∧ n > 999 }\nDEPTNO_TYP = { n\
    \ | n∈number(2,0) ∧ n > 0 }\nSALARY_TYP = { n | n∈number(7,2) ∧ n > 0 }\nCRSCODE_TYP\
    \ = { s | s∈varchar(6) ∧ s = upper(s) }\n```\n\n## Table Universe for EMP\n\n\
    **External Predicate:** The employee with employee number `EMPNO` has name `ENAME`,\
    \ job `JOB`, was born at `BORN`, is hired at `HIRED`, has a monthly salary of\
    \ `MSAL` dollars within the `SGRADE` salary grade, is assigned to account `USERNAME`,\
    \ and works for the department with department number `DEPTNO`.\n\nThe following\
    \ three listings (A-2, A-3, and A-4) show the attribute-value sets, the tuple\
    \ universe, and the table universe for `EMP`, respectively.\n\n**Listing A-2.**\
    \ `Characterization chr_EMP`\n\n```\nchr_EMP :=\n{ ( EMPNO; EMPNO_TYP )\n, ( ENAME;\
    \ varchar(9) )\n, ( JOB; { s | s∈varchar(8) ∧\ns∈{'PRESIDENT','MANAGER'\n,'SALESREP','TRAINER','ADMIN'}\
    \ )\n, ( BORN; date )\n, ( HIRED; date )\n, ( SGRADE; { n | n∈number(2,0) ∧ n\
    \ > 0 } )\n, ( MSAL; SALARY_TYP )\n, ( USERNAME; { s | s∈varchar(15) ∧\nupper(USERNAME)\
    \ = USERNAME } )\n, ( DEPTNO; DEPTNO_TYP )\n}\n```\n\n**Listing A-3.** `Tuple\
    \ Universe tup_EMP`\n\n```\ntup_EMP :=\n{ e | e∈Π(chr_EMP) ∧\n/* We hire adult\
    \ employees only r1 */\ne(BORN) + 18 ≤ e(HIRED)\n∧\n/* A president earns more\
    \ than 10K monthly r2 */\ne(JOB) = 'PRESIDENT' ⇒ e(MSAL) > 10000\n∧\n/* Administrators\
    \ earn less than 5K monthly r3 */\ne(JOB) = 'ADMIN' ⇒ e(MSAL) < 5000\n}\n```\n\
    \n**Listing A-4.** `Table Universe tab_EMP`\n\n```\ntab_EMP :=\n{ E | E∈℘(tup_EMP)\
    \ ∧\n/* EMPNO uniquely identifies an employee tuple r4 */\n( ∀e1,e2∈E: e1(EMPNO)\
    \ = e2(EMPNO) ⇒ e1 = e2 )\n∧\n/* USERNAME uniquely identifies an employee tuple\
    \ r4 */\n( ∀e1,e2∈E: e1(USERNAME) = e2(USERNAME) ⇒ e1 = e2 )\n∧\n/* At most one\
    \ president allowed r5 */\n#{ e | e∈E ∧ e(JOB) = 'PRESIDENT' } ≤ 1\n∧\n/* A department\
    \ that employs the president or a manager r6 */\n/* should also employ at least\
    \ one administrator */\n( ∀d∈{ e1(DEPTNO) | e1∈E }:\n( ∃e2∈E: e2(DEPTNO) = d ∧\
    \ e2(JOB) ∈ {'PRESIDENT','MANAGER'} )\n⇒\n( ∃e2∈E: e2(DEPTNO) = d ∧ e2(JOB) =\
    \ 'ADMIN' )\n)\n}\n```\n\n## Table Universe for SREP\n\n**External Predicate:**\
    \ The sales representative with employee number `EMPNO` has an annual sales target\
    \ of `TARGET` dollars and a yearly commission of `COMM` dollars.\n\nThe following\
    \ three listings (A-5, A-6, and A-7) show the attribute-value sets, the tuple\
    \ universe, and the table universe for `SREP`, respectively.\n\n**Listing A-5.**\
    \ `Characterization chr_SREP`\n\n```\nchr_SREP :=\n{ ( EMPNO; EMPNO_TYP )\n, (\
    \ TARGET; { n | n∈number(5,0) ∧ n > 9999 } )\n, ( COMM; SALARY_TYP )\n}\n```\n\
    \n**Listing A-6.** `Tuple Universe tup_SREP`\n\n```\ntup_SREP :=\n{ s | s∈Π(chr_SREP)\
    \ }\n```\n\n**Listing A-7.** `Table Universe tab_SREP`\n\n```\ntab_SREP :=\n{\
    \ S | S∈℘(tup_SREP) ∧\n/* EMPNO uniquely identifies a tuple r7 */\n( ∀s1,s2∈S:\
    \ s1(EMPNO) = s2(EMPNO) ⇒ s1 = s2 )\n}\n```\n\n## Table Universe for MEMP\n\n\
    **External Predicate:** The employee with employee number `EMPNO` is managed by\
    \ the employee with employee number `MGR`.\n\nThe following three listings (A-8,\
    \ A-9, and A-10) show the attribute-value sets, the tuple universe, and the table\
    \ universe for `MEMP`, respectively.\n\n**Listing A-8.** `Characterization chr_MEMP`\n\
    \n```\nchr_MEMP :=\n{ ( EMPNO; EMPNO_TYP )\n, ( MGR; EMPNO_TYP )\n}\n```\n\n**Listing\
    \ A-9.** `Tuple Universe tup_MEMP`\n\n```\ntup_MEMP :=\n{ m | m∈Π(chr_MEMP) ∧\n\
    /* You cannot manage yourself r8 */\nm(EMPNO) ≠ m(MGR)\n}\n```\n\n**Listing A-10.**\
    \ `Table Universe tab_MEMP`\n\n```\ntab_MEMP :=\n{ M | M∈℘(tup_MEMP) ∧\n/* EMPNO\
    \ uniquely identifies a tuple r9 */\n( ∀m1,m2∈M: m1(EMPNO) = m2(EMPNO) ⇒ m1 =\
    \ m2 )\n}\n```\n\n## Table Universe for TERM\n\n**External Predicate:** The employee\
    \ with number `EMPNO` has resigned or was fired at date `LEFT` due to reason `COMMENTS`.\n\
    \nThe following three listings (A-11, A-12, and A-13) show the attribute-value\
    \ sets, the tuple universe, and the table universe for `TERM`, respectively.\n\
    \n**Listing A-11.** `Characterization chr_TERM`\n\n```\nchr_TERM :=\n{ ( EMPNO;\
    \ EMPNO_TYP )\n, ( LEFT; date )\n, ( COMMENTS; varchar(60) )\n}\n```\n\n**Listing\
    \ A-12.** `Tuple Universe tup_TERM`\n\n```\ntup_TERM :=\n{ t | t∈Π(chr_TERM) }\n\
    ```\n\n**Listing A-13.** `Table Universe tab_TERM`\n\n```\ntab_TERM :=\n{ T |\
    \ T∈℘(tup_TERM) ∧\n/* EMPNO uniquely identifies a tuple r10 */\n( ∀t1,t2∈T: t1(EMPNO)\
    \ = t2(EMPNO) ⇒ t1 = t2 )\n}\n```\n\n## Table Universe for DEPT\n\n**External\
    \ Predicate:** The department with department number `DEPTNO` has name `DNAME`,\
    \ is located at `LOC`, and is managed by the employee with employee number `MGR`.\n\
    \nThe following three listings (A-14, A-15, and A-16) show the attribute-value\
    \ sets, the tuple universe, and the table universe for `DEPT`, respectively.\n\
    \n**Listing A-14.** `Characterization chr_DEPT`\n\n```\nchr_DEPT :=\n{ ( DEPTNO;\
    \ DEPTNO_TYP )\n, ( DNAME; { s | s∈varchar(12) ∧ upper(DNAME) = DNAME } )\n, (\
    \ LOC; { s | s∈varchar(14) ∧ upper(LOC) = LOC } )\n, ( MGR; EMPNO_TYP )\n}\n```\n\
    \n**Listing A-15.** `Tuple Universe tup_DEPT`\n\n```\ntup_DEPT :=\n{ d | d∈Π(chr_DEPT)\
    \ }\n```\n\n**Listing A-16.** `Table Universe tab_DEPT`\n\n```\ntab_DEPT :=\n\
    { D | D∈℘(tab_DEPT) ∧\n/* Department number uniquely identifies a tuple r11 */\n\
    ( ∀d1,d2∈D: d1(DEPTNO) = d2(DEPTNO) ⇒ d1 = d2 )\n∧\n/* Department name and location\
    \ uniquely identify a tuple r12 */\n( ∀d1,d2∈D:\nd1↓{DNAME,LOC} = d2↓{DNAME,LOC}\
    \ ⇒ d1 = d2 )\n∧\n/* You cannot manage more than two departments r13 */\n( ∀m∈{\
    \ d(MGR) | d∈D }: #{ d | d∈D ∧ d(MGR) = m } ≤ 2 )\n}\n```\n\n## Table Universe\
    \ for GRD\n\n**External Predicate:** The salary grade with ID `GRADE` has a lower\
    \ monthly salary limit of `LLIMIT` dollars, an upper monthly salary limit of `ULIMIT`\
    \ dollars, and a maximum net monthly bonus of `BONUS` dollars.\n\nThe following\
    \ three listings (A-17, A-18, and A-19) show the attribute-value sets, the tuple\
    \ universe, and the table universe for `GRD`, respectively.\n\n**Listing A-17.**\
    \ `Characterization chr_GRD`\n\n```\nchr_GRD :=\n{ ( GRADE; { n | n∈number(2,0)\
    \ ∧ n > 0 } )\n, ( LLIMIT; SALARY_TYP )\n, ( ULIMIT; SALARY_TYP )\n, ( BONUS;\
    \ SALARY_TYP )\n}\n```\n\n**Listing A-18.** `Tuple Universe tup_GRD`\n\n```\n\
    tup_GRD :=\n{ g | g∈Π(chr_GRD) ∧\n/* Salary grades have a bandwidth of at least\
    \ 500 dollars r14 */\ng(LLIMIT) ≤ g(ULIMIT) - 500\n∧\n/* Bonus must be less than\
    \ lower limit r15 */\ng(BONUS) < g(LLIMIT)\n}\n```\n\n**Listing A-19.** `Table\
    \ Universe tab_GRD`\n\n```\ntab_GRD :=\n{ G | G∈℘(tup_GRD) ∧\n/* Salary grade\
    \ code uniquely identifies a tuple r16 */\n( ∀g1,g2∈G: g1(GRADE) = g2(GRADE) ⇒\
    \ g1 = g2 )\n∧\n/* Salary grade lower limit uniquely identifies a tuple r17 */\n\
    ( ∀g1,g2∈G: g1(LLIMIT) = g2(LLIMIT) ⇒ g1 = g2 )\n∧\n/* Salary grade upper limit\
    \ uniquely identifies a tuple r18 */\n( ∀g1,g2∈G: g1(ULIMIT) = g2(ULIMIT) ⇒ g1\
    \ = g2 )\n∧\n/* A salary grade overlaps with at most one (lower) grade r20 */\n\
    ( ∀g1∈G:\n( ∃g2∈G: g2(LLIMIT) < g1(LLIMIT) )\n⇒\n#{ g3 | g3∈G ∧ g3(LLIMIT) < g1(LLIMIT)\
    \ ∧\ng3(ULIMIT) ≥ g1(LLIMIT) ∧\ng3(ULIMIT) < g1(ULIMIT) } = 1\n)\n}\n```\n\n##\
    \ Table Universe for CRS\n\n**External Predicate:** The course with code `CODE`\
    \ has description `DESCR`, falls in course category `CAT`, and has duration of\
    \ `DUR` days.\n\nThe following three listings (A-20, A-21, and A-22) show the\
    \ attribute-value sets, the tuple universe, and the table universe for `CRS`,\
    \ respectively.\n\n**Listing A-20.** `Characterization chr_CRS`\n\n```\nchr_CRS\
    \ :=\n{ ( CODE; CRSCODE_TYP )\n, ( DESCR; varchar(40) )\n/* Course category values:\
    \ Design, Generate, Build */\n, ( CAT; { s | s∈varchar(3) ∧\ns∈{'DSG','GEN','BLD'}\
    \ } )\n/* Course duration must be between 1 and 15 days */\n, ( DUR; { n | n∈number(2,0)\
    \ ∧ 1 ≤ n ≤ 15 } )\n}\n```\n\n**Listing A-21.** `Tuple Universe tup_CRS`\n\n```\n\
    tup_CRS :=\n{ c | c∈Π(chr_CRS) ∧\n/* Build courses never take more than 5 days\
    \ r21 */\nc(CAT) = 'BLD' ⇒ t(DUR) ≤ 5\n}\n```\n\n**Listing A-22.** `Table Universe\
    \ tab_CRS`\n\n```\ntab_CRS :=\n{ C | C∈℘(tup_CRS) ∧\n/* Course code uniquely identifies\
    \ a tuple r22 */\n( ∀c1,c2∈C: c1(CODE) = c2(CODE) ⇒ c1 = c2 )\n}\n```\n\n## Table\
    \ Universe for OFFR\n\n**External Predicate:** The course offering for the course\
    \ with code `COURSE` that starts at `STARTS`, has status `STATUS`, has a maximum\
    \ capacity of `MAXCAP` attendees, is taught by the employee with employee number\
    \ `TRAINER`, and is offered at location `LOC`.\n\nThe following three listings\
    \ (A-23, A-24, and A-25) show the attribute-value sets, the tuple universe, and\
    \ the table universe for `OFFR`, respectively.\n\n**Listing A-23.** `Characterization\
    \ chr_OFFR`\n\n```\nchr_OFFR :=\n{ ( COURSE; CRSCODE_TYP )\n, ( STARTS; date )\n\
    , ( STATUS; { s | s∈varchar(4) ∧\n/* Three STATUS values allowed: */\ns∈{'SCHD','CONF','CANC'}\
    \ } )\n/* Maximum course offering capacity; minimum = 6 */\n, ( MAXCAP; { n |\
    \ n∈number(2,0) ∧ n ≥ 6 } )\n/* TRAINER = -1 means \"no trainer assigned\" (see\
    \ r23) */\n, ( TRAINER; EMPNO_TYP ∪ { -1 } )\n, ( LOC; varchar(14) )\n}\n```\n\
    \n**Listing A-24.** `Tuple Universe tup_OFFR`\n\n```\ntup_OFFR :=\n{ o | o∈Π(chr_OFFR)\
    \ ∧\n/* Unassigned TRAINER allowed only for certain STATUS values r23 */\no(TRAINER)\
    \ = -1 ⇒ o(STATUS)∈{'CANC','SCHD'}\n}\n```\n\n**Listing A-25.** `Table Universe\
    \ tab_OFFR`\n\n```\ntab_OFFR :=\n{ O | O∈℘(tup_OFFR) ∧\n/* Course code and begin\
    \ date uniquely identify a tuple r24 */\n( ∀o1,o2∈O:\no1↓{COURSE,STARTS} = o2↓{COURSE,STARTS}\
    \ ⇒ o1 = o2 )\n∧\n/* Begin date and (known) trainer uniquely identify a tuple\
    \ r25 */\n( ∀o1,o2∈{ o | o∈O ∧ o(TRAINER) ≠ -1 }:\no1↓{STARTS,TRAINER} = o2↓{STARTS,TRAINER}\
    \ ⇒ o1 = o2 )\n}\n```\n\n## Table Universe for REG\n\n**External Predicate:**\
    \ The employee whose employee number is `STUD` has registered for the course offering\
    \ of course `COURSE` that starts at `STARTS`, and has rated the course with an\
    \ evaluation score of `EVAL`.\n\nThe following three listings (A-26, A-27, and\
    \ A-28) show the attribute-value sets, the tuple universe, and the table universe\
    \ for `REG`, respectively.\n\n**Listing A-26.** `Characterization chr_REG`\n\n\
    ```\nchr_REG :=\n{ ( STUD; EMPNO_TYP )\n, ( COURSE; CRSCODE_TYP )\n, ( STARTS;\
    \ date )\n/* -1: too early to evaluate; 0: not (yet) evaluated; */\n/* 1-5: regular\
    \ evaluation values (from 1=bad to 5=excellent) */\n, ( EVAL; { n | n∈number(1,0)\n\
    ∧ -1 ≤ n ≤ 5 } )\n}\n```\n\n**Listing A-27.** `Tuple Universe tup_REG`\n\n```\n\
    tup_REG :=\n{ r | r∈Π(chr_REG) }\n```\n\n**Listing A-28.** `Table Universe tab_REG`\n\
    \n```\ntab_REG :=\n{ R | R∈℘(tup_REG) ∧\n/* Attendee and begin date(!) uniquely\
    \ identify a tuple r26 */\n( ∀r1,r2∈R:\nr1↓{STUD,STARTS} = r2↓{STUD,STARTS} ⇒\
    \ r1 = r2 )\n∧\n/* Offering is evaluated, */\n/* or it is too early to evaluate\
    \ the offering r27 */\n( ∀r1,r2∈R:\n( r1↓{COURSE,STARTS} = r2↓{COURSE,STARTS}\
    \ )\n⇒\n( ( r1(EVAL) = -1 ∧ r2(EVAL) = -1 ) ∨\n( r1(EVAL) ≠ -1 ∧ r2(EVAL) ≠ -1\
    \ )\n) )\n}\n```\n\n## Table Universe for HIST\n\n**External Predicate:** At date\
    \ `UNTIL`, for employee whose employee number is `EMPNO`, either the department\
    \ or the monthly salary (or both) have changed. Prior to date `UNTIL`, the department\
    \ for that employee was `DEPTNO` and the monthly salary was `MSAL`.\n\nThe following\
    \ three listings (A-29, A-30, and A-31) show the attribute-value sets, the tuple\
    \ universe, and the table universe for `HIST`, respectively.\n\n**Listing A-29.**\
    \ `Characterization chr_HIST`\n\n```\nchr_HIST :=\n{( EMPNO; EMPNO_TYP )\n,( UNTIL;\
    \ date )\n,( DEPTNO; DEPTNO_TYP )\n,( MSAL; SALARY_TYP )\n}\n```\n\n**Listing\
    \ A-30.** `Tuple Universe tup_HIST`\n\n```\ntup_HIST :=\n{ h | h∈Π(chr_HIST) }\n\
    ```\n\n**Listing A-31.** `Table Universe tab_HIST`\n\n```\ntab_HIST :=\n{ H |\
    \ H∈℘(tup_HIST) ∧\n/* Employee number and end date uniquely identify a tuple r28\
    \ */\n( ∀h1,h2∈H: h1↓{EMPNO,UNTIL} = h2↓{EMPNO,UNTIL} ⇒ h1 = h2 )\n∧\n/* Either\
    \ department number or monthly salary (or both) r29 */\n/* must have changed between\
    \ two consecutive history records */\n( ∀h1,h2∈H:\n( h1(EMPNO) = h2(EMPNO) ∧\n\
    h1(UNTIL) < h2(UNTIL) ∧\n¬ ( ∃h3∈H: h3(EMPNO) = h1(EMPNO) ∧\nh3(UNTIL) > h1(UNTIL)\
    \ ∧\nh3(UNTIL) < h2(UNTIL) )\n) ⇒\n( h1(MSAL) ≠ h2(MSAL) ∨ h1(DEPTNO) ≠ h2(DEPTNO)\
    \ )\n)\n}\n```\n\n## Database Characterization DBCH\n\nThe database characterization\
    \ `DBCH` attaches the ten table universes (as defined in the previous section\
    \ of this appendix) to their corresponding table aliases; see Listing A-32. As\
    \ such, the database characterization “revisits” the database skeleton and provides\
    \ many more details.\n\n**Listing A-32.** `Database Characterization DBCH`\n\n\
    ```\nDBCH :=\n{ ( EMP; tab_EMP )\n, ( SREP; tab_SREP )\n, ( MEMP; tab_MEMP )\n\
    , ( TERM; tab_TERM )\n, ( DEPT; tab_DEPT )\n, ( GRD; tab_GRD )\n, ( CRS; tab_CRS\
    \ )\n, ( OFFR; tab_OFFR )\n, ( REG; tab_REG )\n, ( HIST; tab_HIST )\n}\n```\n\n\
    ## Database Universe DB_UEX\n\nAs you can see in Listing A-33, the database universe\
    \ `DB_UEX` is built on top of the database characterization `DBCH`. The specification\
    \ of `DB_UEX` contains all static database constraints.\n\n**Listing A-33.** `Database\
    \ Universe DB_UEX`\n\n```\nDB_UEX :=\n{ v | v∈Π(DBCH) ∧\n/* ====================================================================\
    \ */\n/* Start of Subset Requirements */\n/* ====================================================================\
    \ */\n/* Employee works for a known department r30 */\n{ e(DEPTNO) | e∈v(EMP)\
    \ } ⊆ { d(DEPTNO) | d∈v(DEPT) }\n∧\n/* Dept mgr is a known employee, excluding\
    \ admins and president r31 */\n{ d(MGR) | d∈v(DEPT) } ⊆\n{ e(EMPNO) | e∈v(EMP)\
    \ ∧ e(JOB) ∉ {'ADMIN','PRESIDENT'} }\n∧\n/* Employees can report to the president\
    \ or a manager only r32 */\n{ m(MGR) | m∈v(MEMP) } ⊆\n{ e(EMPNO) | e∈v(EMP) ∧\
    \ e(JOB) ∈ {'PRESIDENT','MANAGER' } }\n∧\n/* A termination is for a known employee;\
    \ not everyone has left r33 */\n{ t(EMPNO) | t∈v(TERM) } ⊂ { e(EMPNO) | e∈v(EMP)\
    \ }\n∧\n/* Employee has a known salary grade r34 */\n{ e(SGRADE) | e∈v(EMP) }\
    \ ⊆ { g(GRADE) | g∈v(GRD) }\n∧\n/* Course offering is for a known course r35 */\n\
    { o(COURSE) | o∈v(OFFR) } ⊆ { c(CODE) | c∈v(CRS) }\n∧\n/* Courses take place in\
    \ locations where we have a department r36 */\n{ o(LOC) | o∈v(OFFR) } ⊆ { d(LOC)\
    \ | d∈v(DEPT) }\n∧\n/* Trainer of course offering is a known trainer r37 */\n\
    { o(TRAINER) | o∈v(OFFR) ∧ o(TRAINER) ≠ -1 } ⊆\n{ e(EMPNO) | e∈v(EMP) ∧ e(JOB)\
    \ = 'TRAINER' }\n∧\n/* Course registration is for a known employee r38 */\n{ r(STUD)\
    \ | r∈v(REG) } ⊆ { e(EMPNO) | e∈v(EMP) }\n∧\n/* Course registration is for a known\
    \ course offering r39 */\n{ r↓{COURSE,STARTS} | r∈v(REG) } ⊆\n{ o↓{COURSE,STARTS}\
    \ | o∈v(OFFR) }\n∧\n/* History record is for a known employee r40 */\n{ h(EMPNO)\
    \ | h∈v(HIST) } ⊆ { e(EMPNO) | e∈v(EMP) }\n∧\n/* History record is for a known\
    \ department r41 */\n{ h(DEPTNO) | h∈v(HIST) } ⊆ { d(DEPTNO) | d∈v(DEPT) }\n∧\n\
    /* ==================================================================== */\n/*\
    \ End of Subset Requirements; Start of Specialization Rules */\n/* ====================================================================\
    \ */\n/* Sales reps have a target and a commission r42 */\n{ e(EMPNO) | e∈v(EMP)\
    \ ∧ e(JOB) = 'SALESREP' } =\n{ s(EMPNO) | s∈v(SREP) }\n∧\n/* Everybody, excluding\
    \ the president, is a managed employee r43 */\n{ e(EMPNO) | e∈v(EMP) ∧ e(JOB)\
    \ ≠ 'PRESIDENT' } =\n{ m(EMPNO) | m∈v(MEMP) }\n∧\n/* ====================================================================\
    \ */\n/* End of Specializations; Start of Tuple-in-Join Rules */\n/* ====================================================================\
    \ */\n/* Monthly salary must fall within assigned salary grade r44 */\n( ∀e∈v(EMP),\
    \ g∈v(GRD):\ne(SGRADE) = g(GRADE) ⇒ g(LLIMIT) ≤ e(MSAL) ≤ g(ULIMIT)\n) ∧\n/* Leave\
    \ date must fall after hire date r45 */\n( ∀e∈v(EMP), t∈v(TERM):\ne(EMPNO) = t(EMPNO)\
    \ ⇒ e(HIRED) < t(LEFT)\n) ∧\n/* Sales reps cannot earn more than the employee\
    \ they report to r46 */\n( ∀s∈v(SREP), es∈v(EMP), em∈v(EMP), m∈v(MEMP):\n( s(EMPNO)=es(EMPNO)\
    \ ∧ es(EMPNO)=m(EMPNO) ∧ m(MGR) = em(EMPNO) )\n⇒\n( es(MSAL) + s(COMM)/12 < em(MSAL)\
    \ )\n) ∧\n/* Non-sales reps cannot earn more than the employee they report to\
    \ r47 */\n( ∀e∈v(EMP), em∈v(EMP), m∈v(MEMP):\n(e(EMPNO)=m(EMPNO) ∧ m(MGR) = em(EMPNO)\
    \ ∧ e(JOB) ≠ 'SALESREP')\n⇒\n( e(MSAL) < em(MSAL) )\n) ∧\n/* No history records\
    \ allowed before hire date r48 */\n( ∀e∈v(EMP), h∈v(HIST):\ne(EMPNO) = h(EMPNO)\
    \ ⇒ e(HIRED) < h(UNTIL)\n) ∧\n/* No history records allowed after leave date r49\
    \ */\n( ∀t∈v(TERM), h∈v(HIST):\nt(EMPNO) = h(EMPNO) ⇒ t(LEFT) > h(UNTIL)\n) ∧\n\
    /* You cannot register for offerings in 1st four weeks on the job r50 */\n( ∀e∈v(EMP),\
    \ r∈v(REG):\ne(EMPNO) = r(STUD) ⇒ e(HIRED) + 28 ≤ r(STARTS)\n) ∧\n/* You cannot\
    \ register for offerings given at or after leave date r51 */\n( ∀t∈v(TERM), r∈v(REG),\
    \ c∈v(CRS):\n( t(EMPNO) = r(STUD) ∧ r(COURSE) = c(CODE) )\n⇒\n( t(LEFT) ≥ r(STARTS)\
    \ + c(DUR) )\n) ∧\n/* You cannot register for overlapping course offerings r52\
    \ */\n( ∀e∈v(EMP), r1∈v(REG), r2∈v(REG), o1∈v(OFFR), o2∈v(OFFR), c1∈v(CRS), c2∈v(CRS):\n\
    ( e(EMPNO) = r1(STUD) ∧\nr1↓{COURSE,STARTS} = o1↓{COURSE,STARTS} ∧\no1(COURSE)\
    \ = c1(CODE) ∧\ne(EMPNO) = r2(STUD) ∧\nr2↓{COURSE,STARTS} = o2↓{COURSE,STARTS}\
    \ ∧\no2(COURSE) = c2(CODE)\n) ⇒\n( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨\n\
    o1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨\no2(STARTS) ≥ o1(STARTS) + c1(DUR)\n) ) ∧\n\
    /* Trainer cannot teach courses before hire date r53 */\n( ∀e∈v(EMP), o∈v(OFFR):\n\
    e(EMPNO) = o(TRAINER) ⇒ e(HIRED) ≤ o(STARTS)\n) ∧\n/* Trainer cannot teach courses\
    \ at or after leave date r54 */\n( ∀t∈v(TERM), o∈v(OFFR), c∈v(CRS):\n( t(EMPNO)\
    \ = o(TRAINER) ∧ o(COURSE) = c(CODE) )\n⇒\n( t(LEFT) ≥ o(STARTS) + c(DUR) )\n\
    ) ∧\n/* Trainer cannot register for offerings taught by him/herself r55 */\n(\
    \ ∀r∈v(REG), o∈v(OFFR):\nr↓{COURSE,STARTS} = o↓{COURSE,STARTS} ⇒\nr(STUD) ≠ o(TRAINER)\n\
    ) ∧\n/* Trainer cannot teach different courses simultaneously r56 */\n( ∀o1∈v(OFFR),\
    \ o2∈v(OFFR), c1∈v(CRS), c2∈v(CRS):\n( o1(TRAINER) = o2(TRAINER) ∧\no1(COURSE)\
    \ = c1(CODE) ∧\no2(COURSE) = c2(CODE)\n) ⇒\n( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS}\
    \ ∨\no1(STARTS) ≥ o2(STARTS) + c2(DUR) ∨\no2(STARTS) ≥ o1(STARTS) + c1(DUR)\n\
    ) ) ∧\n/* Employee cannot register for course offerings that overlap r57 */\n\
    /* with another course offering where he/she is the trainer */\n( ∀e∈v(EMP), r∈v(REG),\
    \ o1∈v(OFFR), o2∈v(OFFR), c1∈v(CRS), c2∈v(CRS):\n( e(EMPNO) = r(STUD) ∧\nr↓{COURSE,STARTS}\
    \ = o1↓{COURSE,STARTS} ∧\no1(COURSE) = c1(CODE) ∧\ne(EMPNO) = o2(TRAINER) ∧\n\
    o2(COURSE) = c2(CODE)\n) ⇒\n( o1↓{COURSE,STARTS} = o2↓{COURSE,STARTS} ∨\no1(STARTS)\
    \ ≥ o2(STARTS) + c2(DUR) ∨\no2(STARTS) ≥ o1(STARTS) + c1(DUR)\n) ) ∧\n/* ====================================================================\
    \ */\n/* End of Tuple-in-Join Rules; Start of Other Database Rules */\n/* ====================================================================\
    \ */\n/* Department manager must work for a department he/she manages r58 */\n\
    ( ∀d1∈v(DEPT): { e(DEPTNO)| e∈v(EMP) ∧ e(EMPNO)=d1(MGR)} ⊆\n{ d2(DEPTNO)| d2∈v(DEPT)\
    \ ∧ d2(MGR)=d1(MGR) } )\n∧\n/* Active employee cannot be managed by terminated\
    \ employee r59 */\n{ t1(EMPNO) | t1∈v(TERM) } ∩\n{ m(MGR) | m∈v(MEMP) ∧\n¬ ( ∃t2∈v(TERM):\
    \ t2(EMPNO) = m(EMPNO) ) } = ∅\n∧\n/* Department cannot be managed by a terminated\
    \ employee r60 */\n{ t(EMPNO) | t∈v(TERM) } ∩ { d(MGR) | d∈v(DEPT) } = ∅\n∧\n\
    /* At least half of the course offerings (measured by duration) r61 */\n/* taught\
    \ by a trainer must be 'at home base' */\n( ∀e∈{ o(TRAINER) | o∈v(OFFR) ∧ o(STATUS)\
    \ ≠ 'CANC' }: \n( ∑ t∈{ o2.DUR | d2∈v(DEPT), e2∈v(EMP), o2∈v(OFFR), c2∈v(CRS)\
    \ |\ne2(EMPNO) = e ∧\ne2(EMPNO) = o2(TRAINER) ∧\ne2(DEPTNO) = d2(DEPTNO) ∧\no2(COURSE)\
    \ = c2(CODE) ∧\no2(STATUS) ≠ 'CANC' ∧\nc2(LOC) = d2(LOC)\n} : t\n) ≥\n( ∑ t∈{\
    \ o3.DUR | d3∈v(DEPT), e3∈v(EMP), o3∈v(OFFR), c3∈v(CRS) |\ne3(EMPNO) = e ∧\ne3(EMPNO)\
    \ = o3(TRAINER) ∧\ne3(DEPTNO) = d3(DEPTNO) ∧\no3(COURSE) = c3(CODE) ∧\no3(STATUS)\
    \ ≠ 'CANC' ∧\nc3(LOC) ≠ d3(LOC)\n} : t\n) ) ∧\n/* Offerings with 6+ registrations\
    \ must have status confirmed r62 */\n( ∀o∈v(OFFR):\n#{ r | r∈v(REG) ∧\nr↓{COURSE,STARTS}\
    \ = o↓{COURSE,STARTS} } ≥ 6\n⇒\no(STATUS) = 'CONF'\n) ∧\n/* Number of registrations\
    \ cannot exceed maximum capacity of offering r63 */\n( ∀o∈v(OFFR):\n#{ r | r∈v(REG)\
    \ ∧\nr↓{COURSE,STARTS} = o↓{COURSE,STARTS} } ≤ o(MAXCAP)\n) ∧\n/* Canceled offerings\
    \ cannot have registrations r64 */\n( ∀o∈v(OFFR): o(STATUS) = 'CANC'\n⇒\n¬( ∃r∈v(REG):\
    \ r↓{COURSE,STARTS} = o↓{COURSE,STARTS} )\n) ∧\n/* You are allowed to teach a\
    \ certain course only if: r65 */\n/* 1. You have been employed for at least one\
    \ year, or */\n/* 2. You have attended that course first and the trainer of that\
    \ */\n/* course offering attends your first teach as participant */\n( ∀o1∈v(OFFR):\n\
    /* If this is the 1st time this trainer gives this course ... */\n( ¬∃o2∈v(OFFR):\n\
    o1↓{COURSE,TRAINER} = o2↓{COURSE,TRAINER} ∧\no2(STARTS) < o1(STARTS)\n) ⇒\n( /*\
    \ then there should be an attendee in the classroom ... */\n( ∃r1∈v(REG):\nr1↓{COURSE,STARTS}\
    \ = o1↓{COURSE,STARTS} ∧\n/* who has given this course at an earlier date ...\
    \ */\n( ∃o3∈v(OFFR):\no3(TRAINER) = r1(STUD) ∧\no3(COURSE) = o1(COURSE) ∧\no3(STARTS)\
    \ < o1(STARTS) ∧\n/* and *that* course was attended by the current trainer */\n\
    ( ∃r2∈v(REG):\no3↓{COURSE,STARTS} = r2↓{COURSE,STARTS} ∧\nr2(STUD) = o1(TRAINER)\n\
    ) ) ) ∨\n/* or, this trainer has been employed for at least one year */\n( ↵{\
    \ e(HIRED) | e∈v(EMP) ∧ e(EMPNO) = o1(TRAINER) } <\no1(STARTS) - 365\n) ) )\n\
    /* ==================================================================== */\n/*\
    \ End of Other Database Rules */\n/* ====================================================================\
    \ */\n}\n```\n\n## State Transition Universe TX_UEX\n\nThe `state transition universe`\
    \ `TX_UEX` is defined by first generating the Cartesian product of the database\
    \ universe `DB_UEX` (as defined in the section “Database Universe `DB_UEX`” of\
    \ this appendix) with itself. You can view the result of this Cartesian product\
    \ as the set of all possible transactions. In this state transition universe `TX_UEX`,\
    \ every transaction is depicted as an ordered pair `(b;e)`, where `b` stands for\
    \ the database state in which the transaction began and `e` stands for the database\
    \ state in which the transaction ends. As you can see in Listing A-34, the definition\
    \ of `TX_UEX` restricts this set to hold only *valid* transactions, through specifying\
    \ the *dynamic* (also called *state transition* or *transaction*) constraints.\n\
    \n**Note:** In this section we use `sysdate` to denote the moving point “now.”\n\
    \n**Listing A-34.** `Transaction Universe TX_UEX`\n\n```\nTX_UEX :=\n{ (b;e) |\
    \ b∈DB_UEX ∧ e∈DB_UEX ∧\n/* Monthly salary can only increase r66 */\n( ∀e1∈b(EMP),\
    \ e2∈e(EMP):\ne1(EMPNO) = e2(EMPNO) ⇒ e1(MSAL) ≤ e2(MSAL)\n) ∧\n/* New offerings\
    \ must start with status SCHED r67 */\n( ∀o1∈e(OFFR)⇓{COURSE,STARTS} − b(OFFR)⇓{COURSE,STARTS}:\n\
    ↵{ o2(STATUS) | o2∈e(OFFR) ∧ o2↓{COURSE,STARTS} = o1↓{COURSE,STARTS} }\n= 'SCHD'\n\
    ) ∧\n/* Valid offering status transitions are: r68 */\n/* SCHED -> CONF, SCHED\
    \ -> CANC, CONF -> CANC */\n( ∀o1∈b(OFFR), o2∈e(OFFR):\no1↓{COURSE,STARTS} = o2↓{COURSE,STARTS}\n\
    ⇒\n( o1(STATUS) = o2(STATUS) ∨\n( o1(STATUS) = 'SCHD' ∧ o2(STATUS) = 'CONF' )\
    \ ∨\n( o1(STATUS) = 'SCHD' ∧ o2(STATUS) = 'CANC' ) ∨\n( o1(STATUS) = 'CONF' ∧\
    \ o2(STATUS) = 'CANC' )\n) ) ∧\n/* No updates allowed to history records r69 */\n\
    ( ∀h1∈b(HIST), h2∈e(HIST):\nh1↓{EMPNO,UNTIL} = h2↓{EMPNO,UNTIL}\n⇒\n( h1(DEPTNO)\
    \ = h2(DEPTNO) ∧ h1(MSAL) = h2(MSAL) )\n) ∧\n/* New history records must accurately\
    \ reflect employee updates r70 */\n( ∀h1∈e(HIST)⇓{EMPNO,UNTIL} − b(HIST)⇓{EMPNO,UNTIL}:\n\
    ( ∃h2∈e(HIST):\nh2↓{EMPNO,UNTIL} = h1↓{EMPNO,UNTIL} ∧\nh2(UNTIL) = sysdate ∧\n\
    ( ∃e1∈b(EMP), e2∈e(EMP):\ne1↓{EMPNO,MSAL,DEPTNO} = h2↓{EMPNO,MSAL,DEPTNO} ∧\n\
    e2(EMPNO) = h2(EMPNO) ∧\n( e2(MSAL) ≠ e1(MSAL) ∨ e2(DEPTNO) ≠ e1(DEPTNO) )\n)\
    \ ) ) ∧\n/* New registration tuples must start with EVAL = -1 r71 */\n( ∀r1∈e(REG)⇓{STUD,STARTS}\
    \ − b(REG)⇓{STUD,STARTS}:\n( ∃r2∈e(REG):\nr2↓{STUD,STARTS} = r1↓{STUD,STARTS}\
    \ ∧ r2(EVAL) = -1\n) ) ∧\n/* Transitions for evaluation must be valid r72 */\n\
    /* and cannot occur before start date of offering */\n( ∀r1∈b(REG), r2∈e(REG):\n\
    r1↓{STUD,STARTS} = r2↓{STUD,STARTS} ∧ r1(EVAL) ≠ r2(EVAL)\n⇒\n( ( r1(EVAL) = -1\
    \ ∧ r2(EVAL) = 0 ∧ r2(STARTS) ≥ sysdate ) ∨\n( r1(EVAL) = 0 ∧ r2(EVAL) ∈ {1,2,3,4,5}\
    \ )\n) )\n}\n```\n\n# Appendix B: Symbols\n\n**Table B-1.** `Mathematical Symbols\
    \ Related to Sets and Functions`\n\n| Symbol | Description | Examples |\n| :---\
