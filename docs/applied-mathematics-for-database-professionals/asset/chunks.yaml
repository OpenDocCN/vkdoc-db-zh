    C H A P T E R 8 **■** S P E C I F Y I N G S TAT E T R A N S I T I O N C O N S
    T R A I N T S


    **189**


    Note that the propositions in Listings 8-1 and 8-2 also deal with a pair of database
    states: the two given database states dbs1 and dbs2. Now take a look at the state
    transition predicates in Listing 8-3\. These are the “predicate versions” of the
    propositions in Listings 8-1 and 8-2.


    **Listing 8-3.** *Two State Transition Predicates*


    STP1(B,E) := ( ∀e1∈B(EMP), e2∈E(EMP): e1(empno)=e2(empno) ⇒ e1(msal) ≤ e2(msal)
    ) STP2(B,E) := ( ∀e∈((B(EMP)⇓{empno,msal})◊◊{(empno;empno),(old_msal;msal)})⊗


    ((E(EMP)⇓{empno,msal})◊◊{(empno;empno),(new_msal;msal)}): e(old_msal) ≤ e(new_msal)
    )


    When you supply database states dbs1 and dbs2 as values for parameters B and E,
    respectively, then these state transition predicates will transform into the propositions
    listed in Listings 8-1 and 8-2.


    STP1(dbs1,dbs2) = prop1


    STP2(dbs1,dbs2) = prop2


    We require that state transition predicates cannot be decomposed into multiple
    conjuncts, just like tuple, table, and database predicates. If you can rewrite
    a given state transition predicate ST(B,E) into an expression of the form STa(B,E)
    ∧ STb(B,E), then you are in fact dealing with two state transition predicates.


    In the remainder of this book, we’ll also require that a state transition predicate—say
    ST(B,E)—cannot be rewritten into a predicate of either of the following two forms:
    P(B)


    P(E)


    In these expressions, P represents a database predicate; that is, a predicate
    that inspects a single database state (either B or E in the preceding cases).
    This means that we require a state transition predicate to involve at least one
    table from the begin state as well as at least one table from the end state. That’s
    because, if the predicate involves only tables from one database state (either
    the begin or the end state), then the predicate will reflect a static constraint,
    not a state transition constraint.


    As you’ll see in the examples given in the next section, state transition predicates
    typically involve the tables from the begin and end states of the same table structure.
    Instead of specifying a state transition predicate with two parameters of type
    database state, we’ll often specify them with two or more parameters of type table.
    To illustrate this, Listing 8-4 respecifies the state transition predicates of
    Listing 8-3 in this way. Parameters EMPB and EMPE are of type table; the idea
    is for parameter EMPB to accept the employee table state that exists at the beginning
    of a transaction, and for parameter EMPE to accept the employee table state that
    exists at the end of a transaction.


    **Listing 8-4.** *Alternative Specification of State Transition Predicates STP1
    and STP2*


    STP1(EMPB,EMPE) :=


    ( ∀e1∈EMPB, e2∈EMPE: e1(empno) = e2(empno) ⇒ e1(msal) ≤ e2(msal) ) STP2(EMPB,EMPE)
    :=


    ( ∀e∈((EMPB⇓{empno,msal})◊◊{(empno;empno),(old_msal;msal)})⊗


    ((EMPE⇓{empno,msal})◊◊{(empno;empno),(new_msal;msal)}):


    e(old_msal) ≤ e(new_msal) )


