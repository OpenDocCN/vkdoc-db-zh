    In the relational model of data, all attributes in a database design are mandatory.
    Therefore, you can consider it a disappointment that in the SQL standard by default
    a column is nullable; SQL requires us to add not null explicitly alongside every
    column to make it mandatory.


    The next section deals with the aforementioned “narrowing down” of the built-in
    data types that were used in the create table statements.


    **Implementing Attribute Constraints**


    We now revisit the matter with regards to the term *attribute constraints* (mentioned
    in the section “Classification Schema for Constraints” in Chapter 7).


    Formally, a characterization just attaches attribute-value sets to attributes.
    Attaching an attribute-value set to an attribute can be considered an attribute
    constraint. However, in practice you implement database designs in SQL DBMSes
    that are notorious for their poor support of user-defined types. User-defined
    types would have been ideal for implementing attribute-value sets. However, as
    discussed in the section “Implementing Table Structures,” you can’t use them to
    do so. Instead, you must use an appropriate superset (some built-in data type,
    as shown in the previous section) as the attribute-value set of a given attribute.
    Luckily you can use declarative SQL check constraints to narrow down these supersets
    to exactly the attribute-value set that was specified in the characterizations.
    During implementation, we refer to these declarative check constraints as the
    attribute constraints of an attribute.


    All attribute constraints can—and, given our preference in strategies, *should*—be
    stated as declarative check constraints. You can declare these constraints using
    the alter table add constraint statement.


    Listing 11-14 shows the declaration of six check constraints that are required
    to declaratively implement the attribute-value sets for the EMP table structure
    as defined in the definition of chr_EMP in Listing 7-2. We’ll discuss each of
    these after the listing.


    **Listing 11-14.** *Attribute Constraints for EMP Table Structure* alter table
    EMP add constraint emp_chk_empno check (empno > 999); alter table EMP add constraint
    emp_chk_job


    check (job in (''PRESIDENT'',''MANAGER'',''SALESREP''


    ,''TRAINER'',''ADMIN'' ));


