- fmt: '# 表的限制


    `Table T4` has two tuples: the ones representing employees `''Lucas''` and `''Aidan''`,
    who are the only male employees in `T3` that earn more than 2500.


    The specification of `T4` is an example of a simple case of table restriction,
    and one you will use a lot. Here is the general pattern for this kind of restriction:
    `{ t | t∈T ∧ P(t) }`


    In this expression, `T` represents the table that is being restricted and `P(t)`
    represents a predicate with one parameter of some tuple type. Predicate `P` can
    be a simple predicate or a compound predicate (that is, one that involves logical
    connectives). This predicate will typically have expressions that involve function
    application using argument `t`; for each tuple of `T` you can decide if it remains
    in the result set by inspecting one or more attribute values of (only) that tuple.


    Restrictions of a table can be a bit more complex. For instance, let’s assume
    that we want to restrict table `T3` to only the male employee who earns the most
    (among all males) and the female employee who earns the most (among all females).
    A way to specify this restriction of `T3`, which we will name `T5`, is as follows:
    `T5 := { e | e∈T3 ∧ ¬(∃e2∈T3: e2(sex)=e(sex) ∧ e2(sal)>e(sal)) }`


    Table `T5` will have every tuple (say `e`) of `T3` for which there is no other
    tuple in `T3` (say `e2`), such that `e` and `e2` match on the `sex` attribute,
    and the `sal` value in `e2` is greater than the `sal` value in `e`. Note that
    this particular restriction actually results in a table of three tuples; there
    are two male employees in `T3` who both earn the most.


    This more complex case of restricting a table conforms to another pattern that
    is often applied. Here is the general pattern for this kind of restriction: `{
    t | t∈T ∧ P(t,T) }`


    In this pattern, `P(t,T)` represents a predicate with two parameters. The first
    parameter takes as a value a tuple from table `T`, and the second one takes as
    a value the actual table `T`. For each tuple of `T`, you decide if it remains
    in the result set, not only by inspecting one or more attribute values of that
    tuple, but also by inspecting other tuples in the same table.


    Restrictions can also involve other tables (other than the table being restricted).
    Say we have a table named `D1` over `{dno,dname,loc}`, representing a department
    table (with the obvious semantics). Let’s assume that we want to restrict table
    `T3` to only the male employees who earn more than 2500 and who are employed in
    a department that is known in `D1` and located in San Francisco (`''SF''`). A
    way to specify this restriction of `T3` is as follows: `{ e | e∈T3 ∧ e(sex)=''male''
    ∧ e(sal)>2500 ∧ (∃d∈D1: e(dno)=d(dno) ∧ d(loc)=''SF'') }`


    This case of restricting a table conforms to the following pattern: `{ t | t∈T
    ∧ P(t,S) }`


    Here `S` represents some given table (that differs from `T`). For each tuple of
    `T`, you now decide if it remains in the result set by not only inspecting one
    or more attribute values of that tuple, but also by inspecting tuples in another
    table.


    As you’ll understand by now, there are many more ways to perform a restriction
    of a given table; any number of other tables (including the table being restricted)
    could be involved.


    In practice it’s also generally possible to specify such a restriction on a table
    that is the result of a join (see the next section).


    # 连接（Join）


    In a database you’ll often find that two tables are related to each other through
    some attribute (or set of attributes) that they share. If this is the case, then
    you can meaningfully combine the tuples of these tables.


    This combining of tuples is done via the *compatibility* concept of two tuples
    (you might want to go back to Definition 4-3 and refresh your memory). Every tuple
    from the first table is combined with the tuple(s) from the second table that
    are *compatible* with this tuple. Let’s demonstrate this with an example. Figures
    5-5 and 5-6 introduce table `T6` (representing employees) and table `T7` (representing
    departments).


    **Figure 5-5.** *Example table T6*


    **Figure 5-6.** *Example table T7*


    You can combine tuples from tables `T6` and `T7` that correspond on the attributes
    that they share, in this case the `deptno` attribute. The resulting table from
    this combination has as its heading the union of the heading of `T6` and the heading
    of `T7`.


    Figure 5-7 displays the result of such a combination of tables `T6` and `T7`.


    **Figure 5-7.** *Table T8, the combination of tables T6 and T7*


    You can formally specify this table in a predicative way as follows: `{ e∪d |
    e∈T6 ∧ d∈T7 ∧ e(deptno)=d(deptno) }`


    Every tuple from `T6` is combined with the tuples in `T7` that have the same `deptno`
    value.


    This combining of tuples of two “related” tables is known as the *join* of two
    such tables. Definition 5-4 formally defines this operator.


    **Definition 5-4: The Join of Two Tables** Let `R` and `T` be two (not necessarily
    distinct) tables. The join of `R` and `T` (notation `R⊗T`) is defined as follows:


    ```

    R⊗T := { r∪t | r∈R ∧ t∈T ∧ "r and t are compatible" }

    ```


    The join of two tables, say `R` and `T`, will hold the union of every pair of
    tuples `r` and `t`, where `r` is a tuple in `R`, and `t` is a tuple in `T`, such
    that the union of `r` and `t` is a function (compatibility concept). With this
    definition, you can now specify `T8` (from Figure 5-7) as `T6⊗T7`.


    The set of attributes that two tables, that are being joined, have in common is
    referred to as the set of *join attributes*. We will also sometimes say that two
    tuples are *joinable*, instead of saying that they are compatible.


    As mentioned at the end of the previous section on restriction, you’ll often restrict
    the join of two tables. For example, here is the restriction of the join of tables
    `T6` and `T7` to only those tuples that represent clerks located in Denver: `{
    t | t∈T6⊗T7 ∧ t(job)=''CLERK'' ∧ t(loc)=''DENVER'' }`


    Note that Definition 5-4 is not restricted to those cases in which the operands
    actually have at least one attribute in common. You’re allowed to join two tables
    for which the set of join attributes is empty (the compatibility concept allows
    for this); in this case every tuple from the first table is compatible with every
    tuple from the second table (this follows from Definition 4-3). You are then in
    effect combining every tuple of the first table with every tuple of the second
    table. This special case of a join is also referred to as a *Cartesian join*.


    In general, a Cartesian join is of limited practical use in data processing. A
    Cartesian join that involves a table of cardinality one is reasonable and sometimes
    useful. Here is an example of such a Cartesian join: `T7⊗{ { (maxbudget;75000)
    } }`


    This expression joins every tuple of `T7` with every tuple of the right-hand argument
    of the join operator, which is a table over `{maxbudget}`. It effectively *extends*
    every department tuple of `T7` with a new attribute called `maxbudget`. This Cartesian
    join is in fact a special case of *table extension*, which will be treated shortly
    hereafter in the section “Extension.”


    Note also an opposite special case of a Cartesian join, in which you join two
    tables that share the same heading. That is, the set of join attributes equals
    this shared heading. In such a join you are in effect intersecting these two tables.
    This makes the intersection a special case of the join (and therefore a redundant
    operator).


