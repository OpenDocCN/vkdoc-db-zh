    \ check (ulimit > 0);\nalter table GRD add constraint grd_chk_bon1 check (bonus\
    \ > 0);\n```\n\n**Listing 11-16. Attribute Constraints for SREP Table Structure**\n\
    ```sql\nalter table SREP add constraint srp_chk_empno check (empno > 999);\nalter\
    \ table SREP add constraint srp_chk_targ check (target > 9999);\nalter table SREP\
    \ add constraint srp_chk_comm check (comm > 0);\n```\n\n**Listing 11-17. Attribute\
    \ Constraints for MEMP Table Structure**\n```sql\nalter table MEMP add constraint\
    \ mmp_chk_empno check (empno > 999);\nalter table MEMP add constraint mmp_chk_mgr\
    \ check (mgr > 999);\n```\n\n**Listing 11-18. Attribute Constraints for TERM Table\
    \ Structure**\n```sql\nalter table TERM add constraint trm_chk_empno check (empno\
    \ > 999);\nalter table TERM add constraint trm_chk_lft check (trunc(left) = left);\n\
    ```\n\n**Listing 11-19. Attribute Constraints for HIST Table Structure**\n```sql\n\
    alter table HIST add constraint hst_chk_eno check (empno > 999);\nalter table\
    \ HIST add constraint hst_chk_unt check (trunc(until) = until);\nalter table HIST\
    \ add constraint hst_chk_dno check (deptno > 0);\nalter table HIST add constraint\
    \ hst_chk_msal check (msal > 0);\n```"
