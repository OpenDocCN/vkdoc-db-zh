- fmt: "Figure A-1 shows a diagram of the ten tables (represented by rounded-corner\
    \ boxes) that make up our sample database design, and their mutual relationships\
    \ (represented by arrows).\n\nEach of these arrows indicates a `subset requirement`\
    \ that is applicable between a pair of tables. These `subset requirement`s indicate\
    \ that some projection of the table at the beginning of the arrow should always\
    \ be a subset of some projection of the table to which the arrow is pointing.\
    \ The majority of these arrows represent what is often called `many-to-one relationships`,\
    \ and will eventually end up as `foreign key constraints` during the implementation\
    \ phase.\n\nHowever, this is not always the case, as you have seen in Chapter\
    \ 11.\n\nWe’ll give the exact meaning of each arrow in the database universe specification\
    \ `DB_UEX` in the fifth section of this appendix.\n\nOur database holds employees\
    \ (`EMP`) and departments (`DEPT`) of a company. Some of the arrows indicate the\
    \ following:\n\n- An employee is working for a department.\n- A department is\
    \ managed by an employee.\n- An employee is assigned to a salary grade (`GRD`).\n\
    \nEmployee history (`HIST`) records are maintained for all salary and/or “works-for-department”\
    \ changes; every history record describes a period during which one employee was\
    \ assigned to one department with a specific salary.\n\nWe hold additional information\
    \ for all sales representatives in a separate table (`SREP`). We hold additional\
    \ information for employees who no longer work for the company (that is, they\
    \ have been terminated or they resigned) in a table `TERM`. We hold additional\
    \ information for all managed employees (`MEMP`); that is, employees who have\
    \ a manager assigned to them.\n\nThe database further holds information about\
    \ courses (`CRS`), offerings (`OFFR`) of those courses, and registrations (`REG`)\
    \ for those course offerings. Some more arrows show the following:\n\n- An offering\
    \ must be taught by a trainer who works for the company.\n- An offering is of\
    \ an existing course.\n- A registration records one employee as an attendee for\
    \ one course offering.\n\n### Figure A-1. Picture of example database\n\n## Database\
    \ Skeleton DB_S\n\nIn this section, you’ll find a specification of the skeleton\
    \ `DB_S` for the sample database.\n\nA `database skeleton` defines our vocabulary;\
    \ for each table we introduce a table alias, and for each table we introduce the\
    \ names of the involved attributes for that table. We won’t give the external\
    \ predicates for the tables here; you can find these in the definition of the\
    \ table universes in the next section of this appendix.\n\nA `database skeleton`\
    \ is a set-valued function; for each table this function yields the set of attributes\
    \ (heading) of that table. Our database skeleton `DB_S` for the sample database\
    \ is defined in Listing A-1.\n\n### Listing A-1. Database Skeleton Definition\n\
    \n```\nDB_S = { (EMP; -- Employees\n          { EMPNO /* Employee number */\n\
    \          , ENAME /* Employee name */\n          , JOB /* Employee job */\n \
    \         , BORN /* Date of birth */\n          , HIRED /* Date hired */\n   \
    \       , SGRADE /* Salary grade */\n          , MSAL /* Monthly salary */\n \
    \         , USERNAME /* Username */\n          , DEPTNO } ) /* Department number\
    \ */\n       , (SREP; -- Sales Representatives\n          { EMPNO /* Employee\
    \ number */\n          , TARGET /* Sales target */\n          , COMM } ) /* Commission\
    \ */\n       , (MEMP; -- Managed Employees\n          { EMPNO /* Employee number\
    \ */\n          , MGR } ) /* Manager: employee number */\n       , (TERM; -- Terminated\
    \ Employees\n          { EMPNO /* Employee number */\n          , LEFT /* Date\
    \ of leave */\n          , COMMENTS } ) /* Termination comments */\n       , (DEPT;\
    \ -- Departments\n          { DEPTNO /* Department number */\n          , DNAME\
    \ /* Department name */\n          , LOC /* Location */\n          , MGR } ) /*\
    \ Manager: employee number */\n       , (GRD; -- Salary Grades\n          { GRADE\
    \ /* Grade code */\n          , LLIMIT /* Lower salary limit */\n          , ULIMIT\
    \ /* Upper salary limit */\n          , BONUS } ) /* Yearly bonus */\n       ,\
    \ (CRS; -- Courses\n          { CODE /* Course code */\n          , DESCR /* Course\
    \ description */\n          , CAT /* Course category */\n          , DUR } ) /*\
    \ Duration of course in days */\n       , (OFFR; -- Course Offerings\n       \
    \   { COURSE /* Code of course */\n          , STARTS /* Begin date of this offering\
    \ */\n          , STATUS /* Scheduled, confirmed, ... */\n          , MAXCAP /*\
    \ Max participants capacity */\n          , TRAINER /* Trainer: employee number\
    \ */\n          , LOC } ) /* Location */\n       , (REG; -- Course Registrations\n\
    \          { STUD /* Student: employee number */\n          , COURSE /* Course\
    \ code */\n          , STARTS /* Begin date course offering */\n          , EVAL\
    \ } ) /* Evaluation */\n       , (HIST; -- Employee History Records\n        \
    \  { EMPNO /* Employee number */\n          , UNTIL /* History record end date\
    \ */\n          , DEPTNO /* Department number */\n          , MSAL } ) } /* Monthly\
    \ salary */\n```\n\n## Table Universe Definitions\n\nThis section provides formal\
    \ definitions of the ten table universes of our sample database.\n\nFor each table,\
    \ you’ll find four subsections:\n\n- The `external predicate` for the table, describing\
    \ the meaning of the attributes of the table to the database users.\n- The `characterization`,\
    \ attaching `attribute-value sets` to each attribute. The naming convention is\
    \ `chr_<table alias>`.\n- The `tuple universe`, defining the `tuple constraints`\
    \ (if any) for the table. The naming convention is `tup_<table alias>`.\n- The\
    \ `table universe`, defining the `table constraints` for the table. The naming\
    \ convention is `tab_<table alias>`.\n\n**Note:** The `tuple universe` specifications\
    \ build on the `characterization` specifications; the `table universe` specifications,\
    \ in turn, build on the `tuple universe` specifications."
