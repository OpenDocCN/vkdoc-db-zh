    # 第 5 章 表与数据库状态


    ## 属性重命名


    有时，两个表之间存在关联，使得连接它们是有意义的。然而，用于执行连接的属性名称并不匹配；用于连接的属性集合是空集。在这些情况下，连接操作符将无法按预期工作；它将执行一个笛卡尔积连接。连接操作的定义要求目标连接属性的名称相同。例如，假设前面表
    `T7` 中的 `deptno` 属性被命名为 `dept#`。那么执行 `T6` 和 `T7` 的连接——`T6⊗T7`——将导致 `T6` 和 `T7`
    的笛卡尔积。要解决此问题，您必须首先将 `T6` 中的属性 `deptno` 重命名为 `dept#`，或者将 `T7` 中的属性 `dept#` 重命名为
    `deptno`。


    同样，有时对两个表执行交集、并集或差集操作是有意义的；然而，两个表的标题不同，区别不在于基数，而在于属性的名称。要解决此问题，也必须首先重命名所涉及表的属性，使它们具有相等的标题。


    为此，我们引入了**属性重命名**操作符；定义 5-5 正式定义了该操作符。


    ### 定义 5-5：属性重命名操作符

    设 `T` 是一个表，`f` 是一个函数。根据函数 `f` 对 `T` 中属性的重命名（记法 `T◊◊f`）定义如下：

    ```

    T◊◊f := { t◊f | t∈T }。

    ```

    您可以将属性重命名操作符视为函数复合操作符提升到表级别的一个版本。


    使用此操作符，我们可以将 `T6` 中的属性 `deptno` 重命名为 `dept#`，如下所示：

    ```

    T6◊◊{(empno;empno),(ename;ename),(job;job),(sal;sal),(dept#;deptno)}

    ```

    请注意，重命名函数 `f` 为 `T6` 标题中的每个属性持有一个有序对。有序对中的所有第二个坐标代表表的当前属性名称。只有当需要重命名属性时，有序对的第一和第二个坐标才不同；第一个坐标将具有该属性的新名称。


    ## 扩展


    有时您希望向给定表添加属性。您想在表的标题中引入新属性，并为表中的每个元组提供这些新属性的值。在表上执行此类操作被称为**扩展表**或执行**表扩展**。表扩展不需要新的数学符号；您可以简单地使用谓词方法来指定一个新的元组集合（即一个新表），该新表基于给定的表。


    让我们看一个表扩展的例子。图 5-8 显示了两个表。左边的一个是在 `{empno, ename}` 上的表；它是表 `T6`（见图 5-5）在 `{empno,
    ename}` 上投影的结果。我们将此表命名为 `T9`。右边的一个（`T10`）代表用属性 `initial` 扩展 `T9` 的结果。对于每个元组，此属性的值等于
    `ename` 属性值的第一个字符。


    > **注意** 我们将使用一个名为 `substr` 的函数从给定字符串中提取子串。表达式 `substr(<some string value>,n,m)`
    表示 `<some string value>` 的子串，它从位置 `n` 开始，长度为 `m` 个字符。例如，表达式 `substr(''I like this
    book'',13,4)` 等于字符串值 `''book''`。


    ### 图 5-8. 用新属性扩展示例

    给定表 `T9`，您可以形式化地指定表 `T10` 如下：

    ```

    T10 := { e ∪ { (initial;substr(e(ename),1,1)) } | e∈T9 }

    ```

    对于 `T9` 中的每一个元组，例如 `e`，表 `T10` 持有一个由以下表达式表示的元组：

    ```

    e ∪ { (initial;substr(e(ename),1,1)) }

    ```

    此表达式向元组 `e` 添加一个属性-值有序对。添加的属性是 `initial`。附加到此属性的值是 `substr(e(ename),1,1)`，它表示
    `e(ename)` 值的首字母。


    这是另一个例子。图 5-9 显示了两个表。左边的一个（`T11`）代表一个在 `{deptno, dname}` 上的部门表。右边的一个（`T12`）是 `T11`
    用一个 `emps` 属性扩展的结果。对于每个元组，`emps` 属性表示在表 `T6`（见图 5-5）中找到的、被分配到该元组所代表部门的雇员数量。


    ### 图 5-9. 另一个用新属性扩展表的例子

    给定表 `T11` 和 `T6`，您可以形式化地指定表 `T12` 如下：

    ```

    T12 := { d ∪ { (emps;#{ e | e∈T6 ∧ e(deptno)=d(deptno)}) } | d∈T11 }

    ```

    这里我们使用了基数运算符（符号 `#`）来统计每个部门的雇员数量。


    ## 聚合


    聚合运算符对一个集合进行操作。它们通过对集合中所有元素的某个表达式进行聚合，产生一个（数字）值。有五种常见的聚合运算符：`sum`（求和）、`average`（平均值）、`count`（计数）、`minimum`（最小值）和
    `maximum`（最大值）。


    您在第二章已经接触过求和运算符；您可能想快速回顾定义 2-12。您可以将求和运算符应用于一个表。这里有一个例子。给定表 `T6`（见图 5-5），以下表达式计算研究部门（`deptno=10`）所有雇员工资的总和：

    ```

    (SUM x∈{ t | t∈T6 ∧ t(deptno)=10 }: x(sal))

    ```

    前面求和聚合的结果值是 `24100`。现在看下面的表达式，它再次使用了表 `T6`：

    ```

    { e1 ∪ {(sumsal;(SUM x∈{ e2 | e2∈T6 ∧ e2(deptno)=e1(deptno) }: x(sal)))}

    | e1 ∈ T6⇓{deptno} }

    ```

    这里我们首先将 `T6` 投影到 `{deptno}`，然后用一个 `sumsal` 属性扩展结果表。对于此结果表中的每个元组，我们通过计算所有在该元组所代表的部门工作的雇员的工资总和来确定这个新属性的值。图
    5-10 显示了此表达式的结果。


    ### 图 5-10. `T6` 按部门的工资总和

    我们不需要为 `count` 运算符引入新的定义。我们可以简单地使用集合论符号 `#`（基数）来统计集合的元素数量。您在前面的“扩展”部分已经看到了一个这样的例子；`T12`
    的形式化规范就是 `count` 聚合运算符的一个例子。


    定义 5-6 定义了平均值聚合运算符。


    ### 定义 5-6：平均值运算符 (AVG)

    表达式 `f(x)` 的平均值，其中 `x` 从给定的非空集合 `S` 中选择，`f` 表示在 `x` 上的任意数值函数，表示如下：

    ```

    (AVG x∈S: f(x))

    ```

    对于可以从集合 `S` 中选择的每个元素 `x`，平均值运算符计算表达式 `f(x)` 的值，并计算所有这些计算结果的平均值。请注意，如果 `S` 是空集，则此运算符未定义。


    与前面类似，定义 5-7 定义了最大值 (`MAX`) 和最小值 (`MIN`) 聚合运算符。


    ### 定义 5-7：最大值 (MAX) 和最小值 (MIN) 运算符

    表达式 `f(x)` 的最大值和最小值，其中 `x` 从给定的非空集合 `S` 中选择，`f` 表示在 `x` 上的任意数值函数，分别表示如下：

    ```

    (MAX x∈S: f(x)) 和 (MIN x∈S: f(x))

    ```

    对于可以从集合 `S` 中选择的每个元素 `x`，最大值和最小值运算符计算表达式 `f(x)` 的值，并计算所有这些计算结果的最大值或最小值。请注意，如果
    `S` 是空集，这些运算符也未定义。

