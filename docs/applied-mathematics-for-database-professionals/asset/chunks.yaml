    to expressions such as DBS1(EMPLOYEE), which denotes table EMP1, and DBS1(DEPARTMENT),
    which denotes table DEP1.


    **Database Skeleton**


    To specify a database state, you not only need actual tables (EMP1 and DEP1 in
    the preceding example), but you also need to decide upon *names* for the table
    structures (EMPLOYEE and DEPARTMENT in the preceding example).


    You probably won’t be surprised by now that the formal specification of a database
    design (which we’ll demonstrate in Chapter 7) also holds the specification of
    a characterization for every table design involved. You choose the names of the
    attributes involved in a table design when you specify the characterization for
    that table design.


    A *database skeleton* collects all these names—for the table structures and the
    involved attributes—into a single formal structure. A database skeleton is a set
    function with an ordered pair for every table structure. Every first coordinate
    introduces the table structure name, and the second coordinate introduces the
    set of names of the involved attributes.


    Listing 5-6 displays the database skeleton for the employee/department database
    design introduced in the previous section.


    **Listing 5-6.** *The Database Skeleton SK1*


    SK1 :=


    { (EMPLOYEE; {empno,ename,job,sal,deptno} )


    ,(DEPARTMENT; {deptno,dname,loc,salbudget} ) }


    As you can see, set function SK1 introduces the names EMPLOYEE and DEPARTMENT
    for the table structures involved in the employee/department database design,
    and it attaches the set of names of the relevant attributes to them.


    7451CH05.qxd 5/4/07 3:57 PM Page 101


    C H A P T E R 5 **■** TA B L E S A N D D ATA B A S E S TAT E S


    **101**


    **■Note** You should carefully choose the names introduced by the database skeleton,
    because they not only constitute the vocabulary between you (the database professional)
    and your customer (the users), they are also the first stepping stone to understanding
    the meaning (semantics) of a database design. You’ll see in the following chapters
    that data integrity constraints form a further important stepping stone for the
    understanding of the semantics of the database design.


    **Operations on Tables**


    This section covers some important table operators. *You will apply these operators
    when specifying queries and transactions (Chapters 9 and 10), or certain types
    of predicates (Chapters 6, 7,* *and 8).*


    We’ll first take a look at the well-known set operators *union*, *intersection*,
    and *difference*.


    Next we’ll investigate the *projection* and *restriction* of a table, followed
    by the *join*—an important operator in the database field—and closely related
    to the join, the *attribute renaming* operator. Finally, we’ll deal with *extension*
    and *aggregation*.


    **Union, Intersection, and Difference**


    Because tables are sets, you can apply the well-known set operators, union, intersection,
    and difference, with tables as their operands. This section will explore the application
    of these set operators on tables.


    We’ll use three example tables, named E1, E2, and E3, in the following sections.
    Figure 5-4


    displays these tables.


    **Figure 5-4.** *Example tables E1, E2, and E3*


