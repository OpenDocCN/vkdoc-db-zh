- fmt: '( ∀o1∈OFFR: P1(o1,OFFR) ⇒ ( P2(o1,OFFR,REG) ∨ P3(o1,EMP) ) )

    Predicate `PODC7` is a universal quantification over all offerings, and states
    that if some condition (`P1`) that involves the given offering and other offerings
    is TRUE, then a disjunction of two conditions (`P2` and `P3`) should hold. Condition
    `P1` states that the given offering is the first-time offering. Condition `P2`
    involves the given offering, other offerings, and registrations; it states the
    complex requirement with regards to the prior offering that must have been attended
    by the trainer of the given offering. Condition `P3` involves the given offering
    and employees; it states that the trainer of the given offering has been employed
    for at least one year.


    **Note**

    Constraint `PODC7` implies that the very first offering given for every course
    must be given by a trainer that has been employed for at least one year. Evidently
    it takes at least a year to develop the material and reach the skill level necessary
    to offer a course.


