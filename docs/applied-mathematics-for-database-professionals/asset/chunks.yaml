  trans: "\n# 第四章 关系与函数\n\n第二章奠定了集合论的基础。本章第四章将在此基础之上，引入更多将在本书第二部分中用作工具、以形式化定义数据库设计（包括所有约束规范）的集合论概念。\n\
    \n在“二元关系”一节中，我们将回顾有序对和笛卡尔积，以引入两个集合之间二元关系的概念。正如你将看到的，这种二元关系实际上是两个集合笛卡尔积的一个子集。\n\
    \n随后，“函数”一节介绍了函数这一重要概念。函数是一种特殊类型的二元关系——它符合特定的属性。在本节中，我们还将围绕（集合论中的）函数概念建立一些术语。\n\
    \n“函数上的操作”一节回顾了并、交、差这些集合并算符，并更仔细地探讨了当这些算符应用于函数作为其操作数时的行为。你还将被介绍到一个新的（二元）集合并算符，称为函数的限制。\n\
    \n接着，本章继续介绍另一个重要概念，我们称之为集函数。集函数持有一种特殊类型的有序对：其中对的第二个坐标总是一个集合。我们将揭示集函数与指定数据库设计之间的联系：它可以用来描述一个外部谓词。外部谓词描述了我们想要在数据库中表示的现实世界的某些东西。如果集函数用于此目的，我们将称其为描述。在同一小节中，你还将被介绍到一个新的单元集合并算符，称为广义积。广义积以一个集函数——或者更确切地说，一个描述——作为其操作数，并产生一个新的函数集合。广义积的概念是第二个关键的垫脚石（继第二部分中引入的幂集概念之后），当我们将在本书第二部分演示如何形式化定义数据库设计时，将会用到它。\n\
    \n本章最后以函数复合的概念作结，该概念将在第五章（表上的操作）中，当我们以形式化方式研究连接时被应用。\n\n你会发现本章末尾有一个“章节摘要”，随后是“练习”部分。强烈建议你在继续学习其他章节之前，花足够时间完成这些练习。\n\
    \n## 练习\n\n7.  使用其他重写规则，证明清单 3-16 中的最后一条重写规则：\n    `¬( ∃x∈S: ∀y∈T: P(x,y) ) ⇔\
    \ ( ∀x∈S: ∃y∈T: ¬P(x,y) )`\n\n8.  设 `S` 为一个给定的有限集合，`P(x)` 为一个给定的谓词。以如下方式完成以下表达式，使其转化为重言式：\n\
    \    a.  `( ∃x∈S: P(x) ) ⇔ #{ x | x∈S ∧ P(x) } ...`\n    b.  `( ∀x∈S: P(x) ) ⇔\
    \ #{ x | x∈S ∧ P(x) } ...`\n\n## 二元关系\n\n在我们开始处理二元关系之前，请看第一章中的这段引文：*基于逻辑的数据管理之重要性由\
    \ E. F. (特德)·科德 (1923–2003) 在 1969 年预见，当时他在 IBM 研究报告“存储在大型数据银行中的关系的可导性、冗余性和一致性”中首次提出了他著名的关系模型。这项研究报告中引入的用于数据库管理的关系模型已被证明是一个有影响力的数据管理通用理论，并且仍然是他最令人难忘的成就。*\n\
    \nE. F. 科德在前面引文中其研究报告标题所使用的“关系”一词，创造了我们现在称为数据的关系模型的通用理论的名称。\n\n> **注意：** 一个常见的误解是，“数据关系模型”中的“关系的”一词指的是可以存在于不同“实体类型”之间的“联系”（多对一、多对多等等）。\n"
- fmt: '# 关系与函数


    正如你可能在设计中使用的那样，一种普遍的设计技术被称为实体关系图（ERD）。“关系模型”中的“关系”一词与 ERD 中的 R 没有关系。它指的是（n元）关系的*数学*概念，这与
    ERD 中的“关系”概念完全不同。前者是一个数学——集合论——概念；后者最终映射到数据完整性约束的某些情况（粗略地说）。


    在本章中，你将被介绍关系——E. F. Codd 所使用含义——的集合论概念。更具体地说，你将被介绍一种特定类型的关系：*二元*关系。我们将在本书的第 2
    部分处理 ERD 意义上的关系——作为数据完整性约束。


    ## 有序对与笛卡尔积回顾


    让我们先回顾一下第 2 章的内容。该章以关于有序对和笛卡尔积的以下两个定义结束：


    - 一个*有序对*是一对元素，也称为有序对的*坐标*。符号是 `(a;b)`。

    - 两个给定集合（比如 `A` 和 `B`）的*笛卡尔积*定义如下：`A×B = { (a;b) | a∈A ∧ b∈B }`


    这个定义表明，两个给定集合的笛卡尔积的结果实际上是一个有序对的集合。它包含了来自第一个集合和第二个集合的所有可能的元素组合。


    列表 4-1 用一个例子说明了笛卡尔积。


    ```

    A := {X,Y,Z}

    B := {1,2}

    A×B = { (X;1), (X;2), (Y;1), (Y;2), (Z;1), (Z;2) }

    ```


    第 2 章的同一部分还列出了以下性质：

    `a≠b ⇒ (a;b)≠(b;a)`

    `(a;b)=(c;d) ⇔ (a=c ∧ b=d)`

    `A×B=B×A ⇔ A=B`


    这些性质说明了以下事实：


    - 有序对的坐标顺序很重要。

    - 笛卡尔积不是交换算子。


    这使我们能够在下一节中引入二元关系的数学概念。


    ## 二元关系


    从集合 `A` 到集合 `B` 的*二元关系*被定义为笛卡尔积 `A×B` 的*一个子集*。它被称为*二元*关系，因为它处理两个集合（`A` 和 `B`）。让我们从一个小例子开始，基于列表
    4-1 中的相同两个集合：


    ```

    A := {X,Y,Z}

    B := {1,2}

    ```


    看看这里显示的集合 `R1`：


    ```

    R1 := { (X;1), (X;2), (Y;1), (Z;2) }

    ```


    请注意，集合 `R1` 并不包含来自集合 `A` 和集合 `B` 的所有可能的元素组合；集合 `R1` 只包含四个有序对作为其元素。每个有序对也是集合 `A`
    和 `B` 的笛卡尔积的一个元素，如列表 4-1 所示。形式上，这可以表示如下：


    `( ∀p∈R1: p∈A×B )`


    这使得 `R1` 成为集合 `A` 和 `B` 的笛卡尔积的子集，因此是从集合 `A` 到集合 `B` 的一个二元关系。定义 4-1 说明了定义二元关系的另一种方式，并使用了第
    2 章引入的重要幂集算子。


    **定义 4-1：二元关系**

    “`R` 是从集合 `A` 到集合 `B` 的二元关系” ⇔ `R∈℘(A×B)`


    给定集合的幂集包含该集合的所有可能子集。在前面的情况下，幂集包含集合 `A` 和 `B` 的笛卡尔积的所有可能子集。因此，该幂集的每个元素都是从集合 `A`
    到集合 `B` 的二元关系。


    **注意** 在示例关系 `R1` 中，每个 `A` 值都出现在有序对中，每个 `B` 值也是如此。

    这当然并不总是成立。从 `A` 到 `B` 还有其他二元关系不是这种情况。


    你可以画出二元关系的图。这是通过可视化（如维恩图）两个集合，并用箭头连接两个集合中配对的元素来完成的。


    图 4-1 将二元关系 `R1` 显示为图片，其中四个箭头代表有序对。


    **图 4-1. 二元关系 `R1` 的图示**


    从二元关系 `R` 的图片中，你可以立即看到，集合 `A` 的元素 `X` 发出了两个箭头，而元素 `Y` 和 `Z` 各发出一个箭头。你也可以立即看到集合
    `B` 的元素 `1` 和 `2` 都有两个箭头到达。在下一节中，为了得到函数的定义，将对每个元素发出的箭头数量施加限制。


    **注意** 有些教科书可能不将二元关系声明为*从*集合 `A` *到*集合 `B`，而是声明为*在*集合 `A` *上*和*在*集合 `B` *上的。


    ## 函数


    *函数*是一种二元关系，它没有两个元素具有相同的第一坐标；或者换句话说，在函数中，两个不同的有序对总是具有不同的第一坐标。从图片的角度来看，这限制了左侧集合的元素发出的箭头数量最多为一个。


    此外，如果左侧集合中的每个元素都恰好有一个箭头发出，那么我们说该二元关系是该集合（左侧）上的函数。


    定义 4-2 说明了如何正式定义这个额外的限制。它采用了第 2 章介绍的 `π` 算子（它选择有序对的第一个坐标）。


    **定义 4-2：函数**

    “`F` 是定义在集合 `A` 上、取值于集合 `B` 的函数” ⇔

    `F∈℘(A×B) ∧ ( ∀p1,p2∈F: p1≠p2 ⇒ π(p1)≠π(p2) ) ∧ {π(p) | p∈F } = A`


    定义 4-2 中等价式右侧的第二个合取项构成了前面提到的额外限制：对于函数 `F` 中的所有有序对 `p1` 和 `p2`，如果 `p1` 和 `p2` 是不同的对，那么它们应该具有不同的第一坐标。换句话说（使用第
    1 章练习 4a 的结果），如果 `p1` 和 `p2` 具有相同的第一坐标，那么它们必须是同一个对。最后一个合取项指出，为了使 `F` 是*定义在* `A`
    上的函数，`A` 的每个元素都必须作为第一坐标出现。


    大多数时候，我们感兴趣的是函数的第一坐标来自集合 `A`（而远非第二坐标来自集合 `B`）。我们不再说“`F` 是定义在 `A` 上、取值于 `B` 的函数”，而是说“`F`
    是定义在 `A` 上的函数”。


    现在看下面的例子：


    ```

    F1 := { (X;1), (X;2), (Y;1), (Z;2) }

    F2 := { (X;2), (Y;1), (Z;2) }

    F3 := { (X;1), (Y;1), (X;1), (Z;1) }

    F4 := { (Z;2) }

    F5 := ∅

    F6 := { (empno;126), (ename;''Lex de Haan''), (born;''11-aug-1954'') }

    ```


    第一个例子 `F1` 不是函数，因为它包含两个不同的对——`(X;1)` 和 `(X;2)`——它们具有相同的第一坐标 `X`。第二个二元关系 `F2` 确实是一个函数：没有两个不同的对具有相同的第一坐标。第三个
    `F3` 也是一个函数。尽管列举了两个具有相同第一坐标的对（第一个和第三个对），但它们实际上是同一个对。其中一个对无需列举，可以省略而不改变集合 `F3`。示例
    `F4` 也是一个函数，空集（`F5`）确实也是一个函数。它是任意两个集合的笛卡尔积的子集（空集是*每个*集合的子集）。定义 4-2 中给出的额外限制也成立。你可能需要重新审视表
    3-2 中的第二条重写规则。最后一个示例二元关系 `F6` 也是一个函数。通过这个例子，你可以开始看到如何（作为构建块）使用函数来指定数据库设计。我们将在“集合函数”一节的末尾回到这一点。


    我们继续介绍围绕函数集合论概念的各种术语。


    ## 函数的定义域与值域'
  raw: 'as you too probably have designed at some point using the pervasive design
    technique known as entity-relationship diagrams (ERDs). The word *relational*
    in “the relational model of data” has nothing to do with the R of ERD. The word
    refers to the *mathematical* concept of a (n-ary) relation, which is totally different
    from the “relationship” concept in ERD. The former is a mathematical—set-theory—concept;
    the latter eventually maps to certain cases of data integrity constraints (loosely
    speaking).


    In this chapter, you’ll be introduced to the set-theory concept of a relation—the
    meaning used by E. F. Codd. More specifically, you’ll be introduced to a certain
    type of relation: a *binary* relation. We’ll deal with relationships in the ERD
    sense—as data integrity constraints—in Part 2 of this book.


    **Ordered Pairs and Cartesian Product Revisited**


    Let’s first recall a bit from Chapter 2\. That chapter ended with the following
    two definitions regarding ordered pairs and the Cartesian product:


    • An *ordered pair* is a pair of elements, also referred to as the *coordinates*
    of the ordered pair. The notation is (a;b).


    • The *Cartesian product* of two given sets, say A and B, is defined as follows:
    A×B = { (a;b) | a∈A ∧ b∈B }


    This definition shows that the result of the Cartesian product of two given sets
    is in fact a set of ordered pairs. It holds every possible combination of an element
    from the first set and one from the second set.


    Listing 4-1 illustrates the Cartesian product with an example.


    7451CH04.qxd 5/4/07 2:42 PM Page 69


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    **69**


    **Listing 4-1.** *Example Cartesian Product*


    A := {X,Y,Z}


    B := {1,2}


    A×B = { (X;1), (X;2), (Y;1), (Y;2), (Z;1), (Z;2) }


    The same section of Chapter 2 also listed the following properties: a≠b ⇒ (a;b)≠(b;a)


    (a;b)=(c;d) ⇔ (a=c ∧ b=d)


    A×B=B×A ⇔ A=B


    These properties illustrate the following facts:


    • The order of the coordinates of an ordered pair is important.


    • The Cartesian product is *not* a commutative operator.


    This enables us to introduce the mathematical concept of a binary relation in
    the next section.


    **Binary Relations**


    A *binary relation from set A to set B* is defined as a *subset of the Cartesian
    product A*× *B*. It’s called a *binary* relation because it deals with two sets
    (A and B). Let’s start with a small example, based on the same two sets in Listing
    4-1:


    A := {X,Y,Z}


    B := {1,2}


    Take a look at the set R1 shown here:


    R1 := { (X;1), (X;2), (Y;1), (Z;2) }


    Note that set R1 does not hold every possible combination of an element from set
    A and one from set B; set R1 only holds four ordered pairs as its elements. Every
    ordered pair is also an element of the Cartesian product of sets A and B, as shown
    in Listing 4-1\. Formally, this can be expressed as follows:


    ( ∀p∈R1: p∈A×B )


    This makes R1 a subset of the Cartesian product of sets A and B, and therefore
    a binary relation from set A to set B. Definition 4-1 illustrates another way
    to define a binary relation and uses the important powerset operator that was
    introduced in Chapter 2.


    **■Definition 4-1: Binary Relation** “R is a binary relation from set A to set
    B” ⇔ R∈℘(A×B) The powerset of a given set holds every possible subset of that
    set. In the preceding case, the powerset holds every possible subset of the Cartesian
    product of set A and set B. Consequently, every element of this powerset is a
    binary relation from set A to set B.


    7451CH04.qxd 5/4/07 2:43 PM Page 70


    **70**


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    **■Note** In the small example relation R1, every A value appears in the ordered
    pairs, as does every B value.


    This is not always true, of course. There are other binary relations from A to
    B where this is not the case.


    You can draw a picture of a binary relation. This is done by visualizing (as in
    a Venn diagram) the two sets separately and connecting the paired elements of
    both sets with arrows.


    Figure 4-1 shows binary relation R1 as a picture, where the four arrows represent
    the ordered pairs.


    **Figure 4-1.** *Picture of binary relation R1*


    You can instantly see in the picture of binary relation R that two arrows depart
    from element X of set A, and only one arrow each departs from elements Y and Z.
    You can also immediately see that both elements 1 and 2 of set B have two arrows
    arriving. In the next section, a limit will be imposed on the number of arrows
    departing from each element to get to the definition of a function.


    **■Note** Instead of declaring a binary relation to be *from* set A *to* set B,
    other textbooks might declare binary relations to be *over* set A and *on* set
    B.


    **Functions**


    A *function* is a binary relation that doesn’t have two elements that have the
    same first coordinate; or said in another way, in a function two distinct ordered
    pairs always have different first coordinates. From the picture point of view,
    this limits the number of arrows departing from an element of the set at the left-hand
    side to one arrow at most.


    Furthermore, if every element in the set at the left-hand side has exactly one
    arrow departing, then we say that the binary relation is a function *over* this
    set (at the left-hand side).


    7451CH04.qxd 5/4/07 2:43 PM Page 71


    C H A P T E R 4 **■** R E L AT I O N S A N D F U N C T I O N S


    **71**


    Definition 4-2 illustrates how to define this additional limitation formally.
    It employs the π operator introduced in Chapter 2 (it selects the first coordinate
    of an ordered pair).


    **■Definition 4-2: Function** “F is a function over set A into set B” ⇔


    F∈℘(A×B) ∧ ( ∀p1,p2∈F: p1≠p2 ⇒ π (p1)≠ π (p2) ) ∧ {π (p) | p∈F } = A 1


    The second conjunct at the right-hand side of the equivalence in Definition 4-2
    constitutes the additional limitation mentioned earlier: for all ordered pairs
    p1 and p2 that are in function F, if p1 and p2 are different pairs then they should
    hold different first coordinates. Put in another way (using the result of Exercise
    4a of Chapter 1), if p1 and p2 have the same first coordinate then they must be
    the same pair. The last conjunct states that for F to be a function *over* A,
    every element of A must appear as a first coordinate.


    Most of the time, we’re interested in the fact that the first coordinates of the
    function originate from set A (and much less that the second coordinates originate
    from set B). Instead of saying that “F is a function over A into B,” we say that
    “F is a function over A.”


    Now take a look at the following examples:


    F1 := { (X;1), (X;2), (Y;1), (Z;2) }


    F2 := { (X;2), (Y;1), (Z;2) }


    F3 := { (X;1), (Y;1), (X;1), (Z;1) }


    F4 := { (Z;2) }


    F5 := ∅


    F6 := { (empno;126), (ename;''Lex de Haan''), (born;''11-aug-1954'') }


    The first example F1 is not a function because it holds two distinct pairs—(X;1)
    and (X;2)—that have the same first coordinate X. The second binary relation F2
    is indeed a function: no two distinct pairs have the same first coordinate. The
    third one F3 is also a function.


    Although two pairs are enumerated that have the same first coordinate (the first
    and the third pair), they are in fact the same pair. One of these pairs need not
    have been enumerated and can be left out without changing set F3\. Example F4
    is also a function, and the empty set (F5) is indeed a function too. It is a subset
    of the Cartesian product of any two sets (the empty set is a subset of *every*
    set). The additional limitation given in Definition 4-2 also holds. You might
    want to revisit the second rewrite rule in Table 3-2 for this. The last example
    binary relation F6


    is a function too. Through this example, you can begin to see how functions can
    be used (as building blocks) to specify database designs. We’ll come back to this
    at the end of the section


    “Set Functions.”


    We continue with the introduction of various terminologies around the set-theory
    concept of a function.


    **Domain and Range of Functions**'
