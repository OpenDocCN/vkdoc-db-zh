- fmt: 'In SQL, you cannot add rows to one table, and change rows of another table,
    using one statement. You are required to specify (separately) an `INSERT` statement
    and an `UPDATE` statement, and choose an order in which these two statements are
    to be serially executed. We have indicated the serial execution in `SEI` and `SEII`
    by separating the two DML statements with a semicolon.


    Expressions `SEI` and `SEII` differ in the chosen order of the two statements.
    An SQL DBMS will provide an intermediate database state that already reflects
    the modifications made by the first DML statement to the second DML statement.
    This statement (and subqueries embedded within it) will “see” this intermediate
    database state.


    **Note** This is often the default behavior of an SQL DBMS. We’ll have more to
    say on these intermediate database states in Chapter 11.


    This side effect doesn’t occur in our formalism; `FEa` references the begin state
    only. This side effect is why, in `SEII`, the subquery retrieving the tuples that
    need to be logged (inserted) into the `HIST` table structure needs to perform
    a division by `1.1`; it sees the modifications (increased salaries) resulting
    from the `UPDATE` statement that executed first.


    Let’s take a look at another update transaction. Listing 10-6 specifies the transaction
    of canceling a scheduled offering. Note that static constraint `PODC6` (“Canceled
    offerings cannot have registrations;” see Listing 7-43) requires that all registrations
    for the offering (if any) must be deleted. Listing 10-6 cancels the offering for
    course `J2EE` that starts on February 14, 2007.


    **Listing 10-6.** Transaction `ETX5(dbs)`

    ```

    FEa: dbs↓{SREP,MEMP,TERM,DEPT,GRD,CRS,EMP,HIST}


    ∪


    { (REG; { r | r∈dbs(REG) ∧ (r(COURSE) ≠ ''J2EE'' ∨ r(STARTS) ≠ ''14-feb-2007'')
    }


    ) }


    ∪


    { (OFFR; { o | o∈dbs(OFFR) ∧ ¬ (o(COURSE) = ''J2EE'' ∧


    o(STARTS) = ''14-feb-2007'') }


    ∪


    { o↓{COURSE,STARTS,MAXCAP,TRAINER,LOC}


    ∪ { (STATUS; ''CANC'') }


    | o∈dbs(OFFR) ∧ o(COURSE) = ''J2EE'' ∧ o(STARTS) = ''14-feb-2007'' }


    ) }

    ```


    **SEI**:

    ```

    delete from REG r


    where r.COURSE = ''J2EE''


    and r.STARTS = ''14-feb-2007'';


    update OFFR o


    set o.STATUS = ''CANC''


    where o.COURSE = ''J2EE''


    and o.STARTS = ''14-feb-2007''

    ```


    **SEII**:

    ```

    update OFFR o


    set o.STATUS = ''CANC''


    where o.COURSE = ''J2EE''


    and o.STARTS = ''14-feb-2007'';


    delete from REG r


    where r.COURSE = ''J2EE''


    and r.STARTS = ''14-feb-2007''

    ```


    Formal expression `FEa` should be straightforward by now; it specifies the deletion
    of zero or more registrations and an update of a single offering. SQL expressions
    `SEI` and `SEII` again only differ in the order of execution of the required two
    DML statements to implement this transaction in an SQL DBMS.


    In contrast with `ETX4`, one of the alternative orders of execution has a prominent
    disadvantage. `SEII` creates an intermediate database state that potentially violates
    a static constraint. However, the second DML statement will always correct the
    violation.


    Suppose the offering of the `J2EE` course on Valentine’s Day already had at least
    one registration. Then, the first DML statement—setting the status of the offering
    to canceled—will create a database state that violates constraint `PODC6`. The
    second DML statement—the deletion of corresponding registrations—will repair this;
    it modifies the intermediate database state into one that conforms to `PODC6`
    (it “fixes the violation”).


    This state of affairs in alternative `SEII` is very risky. If the intermediate
    database state (that violates a constraint) is queried by other application code,
    executing within the same transaction, then results of these queries might be
    incorrect. Or, maybe even worse, subqueries inside the second DML statement can
    produce false results.


    **Note** We assume here that application code executing within other transactions
    can never see these intermediate database states. This is indeed the case in Oracle’s
    SQL DBMS (we’ll come back to this in Chapter 11 when we discuss the transaction
    isolation mode offered by Oracle).


    For instance, say that you want to query the number of scheduled or confirmed
    offerings that have at least one registration. Let’s call this query `EXQ11`.
    Here is a formal specification for `EXQ11`:

    ```

    EXQ11(dbs) = #{ o | o∈dbs(OFFR) ∧ o(STATUS)∈{''SCHD'',''CONF''} ∧


    (∃r∈dbs(REG): r↓{COURSE,STARTS} = o↓{COURSE,STARTS}) }

    ```


    In SQL this query might look like this:

    ```

    select count(*)


    from OFFR o


    where o.STATUS in (''SCHD'',''CONF'')


    and exists (select r.*


    from REG r


    where r.COURSE = o.COURSE


    and r.STARTS = o.STARTS)

    ```


    The application developer might have been very smart and semantically optimized
    the query into the following:

    ```

    EXQ11(dbs) = #{ r↓{COURSE,STARTS} | r∈dbs(REG) }

    ```


    This translates to the following query in SQL:

    ```

    select count(*)


    from (select distinct r.COURSE, r.STARTS


    from REG r)

    ```


    Here the developer has used constraint `PODC6`, which implies that if there is
    a registration for some offering, then this offering cannot have status canceled.
    So, by counting distinct (offering) foreign key values in `REG`, you are effectively
    counting offerings that have at least one registration and have status scheduled
    or confirmed.


    If this semantically rewritten query would execute in the middle of `SEII`’s version
    of transaction `ETX5`, then obviously the result would be one too many; it also
    counts the canceled offering whose registrations are about to be—but haven’t been
    yet—deleted.


    We’ll have more to say about this phenomenon in Chapter 11.


    Let’s give two more examples of transactions. Listing 10-7 defines an update transaction
    that involves subqueries to determine new attribute values. Listing 10-7 updates
    the commission of sales reps. For every sales rep, increase the commission by
    2 percent of the average monthly salaries of all sales reps (including the one
    being updated) that work in the same department as the one being updated.


    **Listing 10-7.** Transaction `ETX6(dbs)`

    ```

    FEa: dbs↓{MEMP,TERM,DEPT,GRD,REG,OFFR,CRS,EMP,HIST}


    ∪


    { (SREP; { s↓{EMPNO,TARGET}


    ∪ { (COMM; 1.02 *


    (AVG e1∈{ e | e∈dbs(EMP) ∧


    e(DEPTNO)∈{ e2(DEPTNO) | e2∈dbs(EMP) ∧


    e2(EMPNO) = s(EMPNO) } ∧


    e(JOB) = ''SALESREP'' }


    : e1(MSAL))


    ) }


    | s∈dbs(SREP) }


    ) }

    ```


    **SEI**:

    ```

    update SREP s


    set COMM = (select 1.02 * avg(e1.MSAL)


    from EMP e1


    where e1.DEPTNO = (select e2.DEPTNO


    from EMP e2


    where e2.EMPNO = s.EMPNO)


    and e1.JOB = ''SALESREP'')

    ```


    Note that, in contrast with prior update transaction examples, this is an unrestricted
    update; all rows of `SREP` are modified.


    For your convenience, here is the structure of the `AVG` operator as we have formally
    defined it in Chapter 5:

    ```

    (AVG x∈S: f(x))

    ```


    For every element `x` that can be chosen from set `S`, the average operator evaluates
    expression `f(x)` and computes the average of all such evaluations. In expression
    `FEa`, this operator is used as follows:

    ```

    (AVG e1∈{ all salesreps working in same department as salesrep s(EMPNO) }


    : e1(MSAL))

    ```


    As you can see in expression `SEI`, SQL allows you to specify subqueries within
    the set clause of an `UPDATE` statement. However, note that in these cases, the
    subquery should always retrieve exactly one row with just one column.


    Listing 10-8 defines a `DELETE` transaction; salary grades that are currently
    not “used” are deleted from `GRD`. The listing deletes salary grades that have
    no employee assigned to them.


    **Listing 10-8.** Transaction `ETX7(dbs)`


    **FEa**:

    ```

    dbs↓{SREP,MEMP,TERM,DEPT,REG,OFFR,CRS,EMP,HIST}


    ∪


    { (GRD; { g | g∈dbs(GRD) ∧ ¬(∃e∈dbs(EMP): e(SGRADE) = g(GRADE) } ) }

    ```


    **SEI**:

    ```

    delete from GRD g


    where not exists (select e.*


    from EMP e


    where e.SGRADE = g.GRADE)

    ```'
