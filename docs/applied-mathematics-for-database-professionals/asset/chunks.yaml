  trans: '

    如果针对某个给定的可延迟约束的 DI 代码发现该约束被违反，它可以将此信息存储在一个会话临时表中。而如果 DI 代码发现该约束再次得到满足，它就会从会话临时表中删除相关的记录。你可以这样设置这个会话临时表：只要该表中存有记录，事务就无法成功提交。请看**清单
    11-42**，它定义了这个会话临时表。


    **清单 11-42.** *用于存储临时违反情况的表*


    ```sql

    create global temporary table current_violations

    (constraint_name varchar(30) not null

    ,constraint all_satisfied_at_commit check(0=1) initially deferred

    ,constraint curvio_pk primary key(constraint_name))

    on commit preserve rows;

    ```


    你看出这里使用的技巧了吗？这个会话临时表（`on commit preserve rows`）和 `all_satisfied_at_commit` 约束（`initially
    deferred`）的设置方式，允许 DI 代码向 `current_violations` 表中插入记录。然而，与此同时，当该表中仍存有记录时，它禁止事务成功提交，从而防止在可延迟约束被违反时事务得以提交。


    正如你可能同意的那样，引入延迟执行会使执行模型变得相当复杂：


    -   可延迟约束的 DI 代码现在必须适当地向 `current_violations` 表插入和删除记录。

    -   你必须用过程代码扩展所有的 DI 代码，以重新检查当前在 `current_violations` 表中注册的所有约束。为了能够执行重新检查而无需复制可延迟约束的
    DI 代码，你需要将当前的 DI 代码从触发器主体中移至存储过程；这使你可以从其他触发器中调用此代码。

    -   你可能希望使用比迄今为止概述的更高效的执行模型。


    当前，一个可延迟约束（即处于违反状态的）会在每条后续的 DML 语句上被重新检查。对于一条给定的后续 DML 语句，你可以推断出重新检查约束是否合理。例如，如果一条后续
    DML 语句操作的表并未涉及该可延迟约束，那么此 DML 语句永远无法恢复该可延迟约束的违反状态。为了防止不必要的重新检查，你只应在后续 DML 语句有可能恢复违反状态时才运行重新检查。


    **注意：** 事实上，你可以通过使用过渡效应来防护对可延迟约束的 DI 代码的这种重新执行。你不再需要查询过渡效应以验证一条 DML 语句是否可能违反约束，而是做相反的事情：查询过渡效应以验证一条
    DML 语句是否可能恢复约束。


    这就结束了对延迟检查执行模型的概述。我们以关于可延迟约束的一个重要观察来结束本节。


    允许约束在事务内被暂时违反存在一个严重问题。你面临着从这些事务中执行的查询获得不正确结果的风险。例如，假设约束 `PSPEC1` 当前被违反，原因是当前事务中向
    `EMP` 表结构插入了一个新的销售代表，但尚未随后在 `SREP` 表结构中进行相应的插入。现在假设你想确定销售代表的数量。当你编写数据检索语句时，你通常假设所有约束都得到满足。在这种情况下，有两种方法可以找出销售代表的数量：


    ```sql

    select count(*)

    from EMP

    where JOB=''SALESREP'';

    ```


    ```sql

    select count(*)

    from SREP;

    ```


    请注意，当 `PSPEC1` 以刚刚描述的方式被违反时，第一个 `SELECT` 表达式将返回正确结果，而第二个 `SELECT` 表达式将返回不正确的结果。实际上，在给定的中间数据库状态中，你可能会质疑销售代表的数量是否被明确定义，因为两个本应等价的查询表达式返回了不同的结果。当你允许约束被暂时违反时，获得不正确的结果是一个严重问题。


    **注意：** 防止此问题的真正解决方案是在 SQL 语言中添加*多表更新*的概念。我们建议你参考 Chris Date 和 Hugh Darwen 在此主题上撰写的论文（见附录
    C）。


    在探讨了关于在触发式过程方法中实现 DI 代码的各种问题后，我们通过简要介绍一个可以帮助你实现 DI 代码的框架来结束本章。


    ## RuleGen 框架


    在本章中看到了 DI 代码的各种示例后，你可以想象，随着你实现的约束数量增长，维护它们可能成为一个相当大的挑战。我们的示例数据库设计只有大约 50 个多元组约束。


    真实的数据库设计通常有数百甚至超过一千个多元组约束，其中大多数无法以声明方式指定给 DBMS。


    对于你实现的每一个约束，你都在一遍又一遍地重复大量代码；每个约束不同的部分是*TE 查询*、*验证查询*和*序列化代码*。如果能针对给定的约束只注册这三部分，然后由某个软件为你生成所有必需的行级和语句级触发器，那岂不是很好？


    在过去几年中，作者之一 Toon Koppelaars 开发了一个名为 `RuleGen` 的框架，正是做这件事。`RuleGen` 实现了执行模型 `EM6`，包括为满足可延迟约束所需概述的增强功能。


    你通过填充其存储库中的几个表在 `RuleGen` 中注册一个约束。这涉及关于约束、其涉及的表和涉及的列、TE 查询、验证查询以及序列化代码的信息。给定这些信息，`RuleGen`
    将为每个涉及的表完全生成必要的行级和语句级触发器。行级触发器将维护语句级触发器所使用的过渡效应。语句级触发器将验证必要的约束。


    到本书出版时，我们期望已经可以获取关于 `RuleGen` 框架的更多信息。如果你对这个框架感兴趣，你可以在 `http://www.rulegen.com/am4dp`
    找到最新信息、文档和论文。我们还将在该站点上维护本书所述示例数据库宇宙中涉及的所有约束的 DI 代码的下载。

    '
- fmt: '## Chapter Summary


    This section provides a summary of this chapter, formatted as a bulleted list.


    * You usually implement a database design in order to build a business application
    on top of it. These applications normally are window-on-data (`WoD`) applications.
    Users query and transact data by using these applications.

    * All code of a `WoD` application can be classified into three classes: user interface
    code (`UI` code), business logic code (`BL` code), and data integrity code (`DI`
    code). `UI` code creates the user interface that the user sees, and it responds
    to events initiated by the user in the user interface. `DI` code is responsible
    for the continued validity of all data integrity constraints as users change data
    in the database. `BL` code is responsible for composing and executing queries
    and transactions.

    * This chapter’s main focus has been how to implement `DI` code in an efficient
    manner.

    * You can implement `DI` code using one of the following three strategies: declarative,
    triggered procedural, or embedded procedural.

    * You can state all attribute and tuple constraints declaratively. You can state
    only a few table and database constraints declaratively.

    * The majority of (multi-row) data integrity constraints must be implemented procedurally.
    In this chapter, the triggered procedural strategy is preferred over the embedded
    procedural strategy.

    * We introduced you to six execution models for implementing `DI` code for multi-tuple
    constraints. These range from rather inefficient (every constraint is fully checked
    for every `DML` statement), to rather efficient (a constraint is conditionally
    checked in a minimal way).

    * Given Oracle’s standard `read-committed` isolation level, you must programmatically
    serialize `DI` code. Failure to do so can result in constraint violations when
    transactions execute concurrently. Serializing `DI` code of transition constraints
    is particularly difficult.

    * Certain constraints cannot be validated at the statement level; they require
    a deferred execution model of the `DI` code. Extending the execution models to
    cater for deferred execution of `DI` code is not easy. You’ve seen an outline
    of how this could be done, which involved setting up a central table where temporary
    violations are logged.

    * If you have many data integrity constraints that require a triggered procedural
    implementation, then the `RuleGen` framework can help you manage all `DI` code
    for these constraints.


    ## Summary


    You’ve reached the last chapter of this book. In this chapter we’ll provide a
    brief summary first and then give some conclusions.


    In Part 1 of this book, we presented two important mathematical disciplines: logic
    and set theory. These two disciplines are the most relevant ones in the application
    of mathematics to the field of databases.


    Chapter 1 offered an introduction to logic. We presented the concepts of a proposition
    and a predicate, and showed how you can use logical connectives (conjunction,
    disjunction, implication, equivalence, and negation) to describe compound propositions
    and predicates.


    The chapter ended by establishing the very important concept of a rewrite rule.
    You’ve seen many applications of rewrite rules throughout this book; they enable
    you to transform predicates into other equivalent predicates.


    Chapter 2 offered an introduction to set theory. We presented several ways to
    specify sets, discussed the concept of a subset, and explored the common set operators
    union, intersection, and difference. The chapter ended with a treatment of powersets
    and ordered pairs. As you saw in Part 2 of this book, set theory provides an excellent
    language to reliably describe complex database designs, data retrieval, and data
    manipulation.


    Chapter 3 continued the treatment of logic that was started in the first chapter.
    It introduced you to the key concepts of universal and existential quantification
    and identified important rewrite rules concerning these two quantifiers. One of
    these rewrite rules demonstrated that you can transform the existential quantifier
    into a universal quantifier, and vice versa—a rewrite rule that has been applied
    many times in this book.


    Chapter 4 continued the set theory basics laid down in Chapter 2, and introduced
    some more concepts in this area. You saw how you can use a function to represent
    a tuple. We’ve also shown how you can use a special kind of function, a set function,
    to characterize something of the real world that needs to be represented in the
    database.


    Chapters 5 and 6 demonstrated how you can apply set theory and logic to describe
    important concepts in the field of databases. We used these mathematical disciplines
    to formally describe the following:


    * Tables and database states

    * Common table operators such as projection, extension, restriction, and join—to
    name a few

    * Tuple, table, and database predicates—the building blocks for specifying constraints

    At the end of Chapter 6 we also explored common types of data integrity predicates:
    unique identification, subset requirements, specialization, generalization, and
    tuple-in-join predicates.


    Chapter 7 brought everything together and demonstrated the main topic of this
    book: how you can apply all introduced mathematical concepts to create a solid
    database design specification (a database universe). The layered approach in which
    this was done gives us a good and clear insight into the relevant data integrity
    constraints. It established several classes of constraints: attribute, tuple,
    table, and database constraints. Chapter 8 explored another class of constraints:
    state transition constraints. As you’ve seen, you can also specify this class
    of constraints in a formal way. Clear insight in all involved constraints is a
    prerequisite to performing a reliable and robust implementation of the design
    using an `SQL` `DBMS`.


    Chapters 9 and 10 discussed the application of the mathematics in the areas of
    specifying data retrieval (queries) and data manipulation (transactions).


    Finally, in Chapter 11 we explored the challenges of implementing a database design—specifically
    all its data integrity constraints—in a well-known `SQL` `DBMS` (`Oracle`). As
    you’ve seen, for some classes of constraints, the implementation is trivial (they
    can be declared to the `DBMS`), but for other classes of constraints the implementation
    turns out to be a complex task. Implementing an efficient execution model, serializing
    transactions, and sometimes deferring the execution of checking the constraints
    are some of the aspects that make this task a serious challenge.


    **Note:** Many subjects haven’t been covered in this book. For instance, you can
    further explore the mathematics to come up with other useful rewrite rules. Also,
    a treatment on how to provide formal proofs isn’t included; being able to prove
    that a given transformation of a predicate is correct is sometimes very convenient.
    Also, in this book we chose to offer you only the necessary formal tools so that
    you can start dealing with database designs in a clear and professional way. We
    have specifically not covered subjects such as the following: what is a good database
    design, what are the criteria by which you can measure this, what about data redundancy,
    and the various normal forms in database design. Covering these topics justifies
    at least another book in itself.


    ## Conclusions'
  raw: '## Chapter Summary


    This section provides a summary of this chapter, formatted as a bulleted list.


    • You usually implement a database design in order to build a business application
    on top of it. These applications normally are *window-on-data* (WoD) applications.
    Users query and transact data by using these applications.


    • All code of a WoD application can be classified into three classes: *user interface*
    code (UI code), *business logic* code (BL code), and *data integrity* code (DI
    code). UI code creates the user interface that the user sees, and it responds
    to events initiated by the user in the user interface. DI code is responsible
    for the continued validity of all data integrity constraints as users change data
    in the database. BL code is responsible for composing and executing queries and
    transactions.


    • This chapter’s main focus has been how to implement DI code in an efficient
    manner.


    • You can implement DI code using one of the following three strategies: *declarative*,
    *triggered procedural*, or *embedded procedural*.


    • You can state all attribute and tuple constraints declaratively. You can state
    only a few table and database constraints declaratively.


    • The majority of (multi-row) data integrity constraints must be implemented procedurally.
    In this chapter, the triggered procedural strategy is preferred over the embedded
    procedural strategy.


    • We introduced you to six execution models for implementing DI code for multi-tuple
    constraints. These range from rather inefficient (every constraint is fully checked
    for every DML statement), to rather efficient (a constraint is conditionally checked
    in a minimal way).


    • Given Oracle’s standard read-committed isolation level, you must programmatically
    serialize DI code. Failure to do so can result in constraint violations when transactions
    execute concurrently. Serializing DI code of transition constraints is particularly
    difficult.


    • Certain constraints cannot be validated at the statement level; they require
    a deferred execution model of the DI code. Extending the execution models to cater
    for deferred execution of DI code is not easy. You’ve seen an outline of how this
    could be done, which involved setting up a central table where temporary violations
    are logged.


    • If you have many data integrity constraints that require a triggered procedural
    implementation, then the RuleGen framework can help you manage all DI code for
    these constraints.


