    2006, he was involved in the ISO SQL language standardization process as a member
    of the Dutch national body. He was also one of the founding members of the OakTable
    network (http://


    www.oaktable.net). He wrote the well-received *Mastering Oracle SQL and SQL*Plus*
    (Apress, 2005).


    **■TOON KOPPELAARS** studied computer science at the University of Technology
    in Eindhoven, the Netherlands. He is a longtime Oracle technology user, having
    used the Oracle database and tool software since 1987\. During his career he has
    been involved in application development (terminal/host in the early days, GUI
