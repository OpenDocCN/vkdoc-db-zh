    As you can see by the examples given, a tuple predicate is allowed to be compound;
    that is, one that involves logical connectives. The components of this predicate
    typically compare the attribute values of the tuple supplied as the argument with
    certain given values.


    We need to make two more observations with regards to tuple predicates. The first
    one deals with the number of attributes involved in the predicate. Note that predicate
    P0 only references the sex attribute; it is a tuple predicate over a singleton.


    We consider a tuple predicate—say P(t)—over a singleton—say A—a degenerate case
    of a tuple predicate. In Chapter 7, and also later on in Chapter 11, we’ll deal
    with such a degenerate case of a tuple predicate as a condition on the attribute
