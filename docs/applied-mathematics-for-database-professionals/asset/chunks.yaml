- fmt: '# CHAPTER 11 IMPLEMENTING DATABASE DESIGNS IN ORACLE


    ## Introduction


    Thus far this book’s main focus has been to show you how a database design can
    be formally specified. To that end, we’ve introduced you to a bit of set theory
    and a bit of logic. Set theory and logic are the required mathematical tools that
    enable you to deal with professionally, talk about, manage, and document a database
    design. Also, as you have seen, a database design is much more than just table
    structures; the data integrity constraints are by far the most important part
    of a database design.


    Of course, you want to do more than just *specify* a database design; you usually
    would like to *implement* it using some `DBMS`, and build *business applications*
    on top of it.


    Unfortunately there are no true relational `DBMS`es available to us; we are forced
    to use an `SQL` `DBMS` to implement a database design. Implementing a database
    design in an `SQL` `DBMS`, as you’ll see in the course of this chapter, poses
    quite a few challenges—not so much in the area of implementing the table structures,
    but mainly in the area of implementing the involved data integrity constraints.


    As you’ll see in the course of this chapter, `SQL` provides us with constructs
    to state data integrity constraints declaratively; however, not all of these are
    supported by `SQL` `DBMS`es available today. Most notably, the `CREATE ASSERTION`
    command—which has been in the official standard of `SQL` since 1992—is not supported
    in most `SQL` `DBMS`es (including Oracle’s).


    Before we start investigating these constraint implementation challenges, we’ll
    first broaden our scope by investigating the general software architecture of
    a *business application*, or, as we prefer to call such an application from here
    on, a *window-on-data application*. Once we’ve established this architecture,
    we’ll then, within the context of that architecture, discuss the challenges of
    implementing a database design.


    **■Note** This chapter will be quite different from the previous ones. It contains
    far less mathematics, although, as you will see, mathematics can still be applied
    when implementing a database design. We think that this chapter adds value to
    this book, because in our experience, the challenges investigated in this chapter
    are often overlooked.


    7451CH11.qxd 5/15/07 2:26 PM Page 243


    ## Window-on-Data Applications


    A window-on-data (`WoD`) application is—well, just as it says—an application that
    provides the user with windows on data. In a `WoD` application, users navigate
    through various windows of the application (browser pages, nowadays). Every page
    in the application either


    • Enables the user to compose a data retrieval request, execute it, and then have
    the retrieved data displayed in the window, or


    • Offers the user the possibility of composing a transaction using already retrieved—or
    newly entered—data, and then execute it.


    Because these applications are all about querying and manipulating data, you should
    spend a fair amount of effort on designing and implementing the underlying table
    structures and involved integrity constraints necessary to support the application.
    The database design constitutes the underlying foundation of a `WoD` application;
    the quality of a `WoD` application can only be as good as the quality of the underlying
    database design.


    **■Note** Here actually lay a main motivation for us to start writing this book.
    The current state of our industry is pretty bad when it comes to focusing on database
    design capabilities within an `IT` project. Few `IT` professionals nowadays are
    educated in the foundations of the relational model of data. Often, database designs
    are created that inevitably will cause the business application to not perform
    well, and/or be difficult to maintain. As mentioned earlier, discussing the quality
    of database designs is not within the scope of this book (it justifies at least
    another book in itself). We chose to offer you first the necessary tools to enable
    you to start dealing with database designs in a clear and professional way.


    So, in short, a `WoD` application is all about managing business data. Needless
    to say, by far the majority of all business applications built on top of a database
    are `WoD` applications. This justifies taking a closer look at the general software
    architecture of this type of application.


    In the next section we’ll introduce you to a classification scheme for the application
    code of a `WoD` application. Later on, when we discuss three implementation strategies
    for the data integrity constraints of a database design, you’ll see that we refer
    to this code classification scheme.


    ## Classifying Window-on-Data Application Code


    In this section, we’ll introduce you to a high-level code classification scheme
    that is at the core of every `WoD` application. Before we do this, we need to
    introduce two terms we’ll use in defining this classification scheme. These are
    *data retrieval code* and *data manipulation code*.


    *Data retrieval code* is all code that queries data in the database. In our day-to-day
    practice these are typically the `SQL` queries (`SELECT` expressions) embedded
    within application code and interacting with the `SQL` `DBMS`.


    *Data manipulation code* is all code that changes data in the database. These
    are the `SQL` data manipulation language (`DML`) statements (`INSERT`, `UPDATE`,
    or `DELETE`) embedded within application code that maintain data in the database.


    7451CH11.qxd 5/15/07 2:26 PM Page 244


    **■Note** We’ll refer to these three types of `DML` statements (`INSERT`, `UPDATE`,
    or `DELETE`) jointly as *update* statements.


    Having introduced these two terms, we can now introduce the code classification
    scheme. All code of a `WoD` application can be classified into one of the following
    three code classes:


    • Business logic code


    • Data integrity code


    • User interface code


    The following three sections will discuss what we mean by the preceding three
    code classes.


    ## Business Logic Code (BL Code)


    Business logic code can be subdivided into two subclasses: first, code that *composes
    and* *executes queries*, and second, code that *composes and executes transactions*.


    • *Query composing and executing code*: This is procedural code holding only embedded
    data retrieval code (that is, query expressions). This code is responsible for
    composing the actual `SQL` queries, or conditionally determining which `SQL` queries
    should be executed. This code also initiates the execution of these queries and
    processes the rows returned by the `SQL` `DBMS`. We’ll refer to this subclass
    as *read BL code* ( *rBL code* for short).


    • *Transaction composing and executing code*: This is procedural code holding
    embedded data manipulation code (that is, `SQL` `DML` statements). This code is
    responsible for composing update statements, or conditionally determining which
    update statements should be executed. This code also initiates the execution of
    these statements. Depending upon the return code(s) given by the `SQL` `DBMS`,
    this code might also execute the commit or rollback processing for the transaction.
    Note that data retrieval code will often be part of (the procedural code of )
    transaction composition. We’ll refer to this class as *write BL code* ( *wBL code*
    for short).'
