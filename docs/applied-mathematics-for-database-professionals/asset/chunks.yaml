    在 SQL 中，你无法使用一条语句向一个表添加行，同时更改另一个表的行。你必须（分别）指定一条 `INSERT` 语句和一条 `UPDATE` 语句，并选择一个顺序来串行执行这两条语句。我们在
    `SEI` 和 `SEII` 中通过分号分隔这两条 DML 语句来表示这种串行执行。


    表达式 `SEI` 和 `SEII` 的区别在于两条语句的执行顺序。SQL DBMS 会提供一个中间数据库状态，该状态已经反映了第一条 DML 语句所做的修改，并将其提供给第二条
    DML 语句。这条语句（以及嵌入其中的子查询）将“看到”这个中间数据库状态。


    **注意** 这通常是 SQL DBMS 的默认行为。我们将在第 11 章中对这些中间数据库状态有更多讨论。


    这种副作用在我们的形式化表示中不会出现；`FEa` 仅引用起始状态。正是这种副作用，导致在 `SEII` 中，用于检索需要记录（插入）到 `HIST` 表结构中的元组的子查询需要除以
    `1.1`；它看到了先执行的 `UPDATE` 语句所产生的修改（增加的薪资）。


    让我们再看一个更新事务的例子。清单 10-6 指定了取消预定课程开设的事务。注意，静态约束 `PODC6`（“被取消的课程开设不能有注册记录；”参见清单 7-43）要求该课程开设的所有注册记录（如果有）必须被删除。清单
    10-6 取消了课程 `J2EE` 于 2007 年 2 月 14 日开始的课程开设。


    **清单 10-6.** 事务 `ETX5(dbs)`

    ```

    FEa: dbs↓{SREP,MEMP,TERM,DEPT,GRD,CRS,EMP,HIST}


    ∪


    { (REG; { r | r∈dbs(REG) ∧ (r(COURSE) ≠ ''J2EE'' ∨ r(STARTS) ≠ ''14-feb-2007'')
    }


    ) }


    ∪


    { (OFFR; { o | o∈dbs(OFFR) ∧ ¬ (o(COURSE) = ''J2EE'' ∧


    o(STARTS) = ''14-feb-2007'') }


    ∪


    { o↓{COURSE,STARTS,MAXCAP,TRAINER,LOC}


    ∪ { (STATUS; ''CANC'') }


    | o∈dbs(OFFR) ∧ o(COURSE) = ''J2EE'' ∧ o(STARTS) = ''14-feb-2007'' }


    ) }

    ```


    **SEI**:

    ```

    delete from REG r


    where r.COURSE = ''J2EE''


    and r.STARTS = ''14-feb-2007'';


    update OFFR o


    set o.STATUS = ''CANC''


    where o.COURSE = ''J2EE''


    and o.STARTS = ''14-feb-2007''

    ```


    **SEII**:

    ```

    update OFFR o


    set o.STATUS = ''CANC''


    where o.COURSE = ''J2EE''


    and o.STARTS = ''14-feb-2007'';


    delete from REG r


    where r.COURSE = ''J2EE''


    and r.STARTS = ''14-feb-2007''

    ```


    形式化表达式 `FEa` 到现在应该很直观了；它指定了删除零条或多条注册记录，以及更新单个课程开设。SQL 表达式 `SEI` 和 `SEII` 同样仅在于在
    SQL DBMS 中实现此事务所需的两条 DML 语句的执行顺序不同。


    与 `ETX4` 相比，其中一种替代执行顺序有一个显著的缺点。`SEII` 创建的中间数据库状态可能违反静态约束。然而，第二条 DML 语句总是会纠正这个违规。


    假设 `J2EE` 课程在情人节当天的课程开设已经至少有一个注册记录。那么，第一条 DML 语句——将课程开设状态设置为已取消——将创建一个违反约束 `PODC6`
    的数据库状态。第二条 DML 语句——删除相应的注册记录——将修复此问题；它将中间数据库状态修改为符合 `PODC6` 的状态（它“修复了违规”）。


    `SEII` 选项中的这种情况是非常危险的。如果其他在同一事务中执行的应用程序代码查询了这个（违反约束的）中间数据库状态，那么这些查询的结果可能是错误的。或者，更糟糕的是，第二条
    DML 语句内部的子查询可能产生错误的结果。


    **注意** 我们这里假设，在其他事务中执行的应用程序代码永远看不到这些中间数据库状态。在 Oracle 的 SQL DBMS 中确实如此（我们将在第 11
    章讨论 Oracle 提供的事务隔离模式时回到这一点）。


    例如，假设你想查询至少有一个注册记录的已计划或已确认的课程开设数量。我们称这个查询为 `EXQ11`。以下是 `EXQ11` 的形式化规范：

    ```

    EXQ11(dbs) = #{ o | o∈dbs(OFFR) ∧ o(STATUS)∈{''SCHD'',''CONF''} ∧


    (∃r∈dbs(REG): r↓{COURSE,STARTS} = o↓{COURSE,STARTS}) }

    ```


    在 SQL 中，这个查询可能看起来像这样：

    ```

    select count(*)


    from OFFR o


    where o.STATUS in (''SCHD'',''CONF'')


    and exists (select r.*


    from REG r


    where r.COURSE = o.COURSE


    and r.STARTS = o.STARTS)

    ```


    应用程序开发人员可能非常聪明，并对查询进行了语义优化，将其改写如下：

    ```

    EXQ11(dbs) = #{ r↓{COURSE,STARTS} | r∈dbs(REG) }

    ```


    这对应于以下 SQL 查询：

    ```

    select count(*)


    from (select distinct r.COURSE, r.STARTS


    from REG r)

    ```


    这里开发人员利用了约束 `PODC6`，该约束意味着如果某个课程开设有注册记录，那么该课程开设的状态不能是已取消。因此，通过统计 `REG` 中不同的（课程开设）外键值，你实际上是在统计至少有一个注册记录且状态为已计划或已确认的课程开设数量。


    如果这个经过语义重写的查询在 `SEII` 版本的事务 `ETX5` 执行过程中运行，那么结果显然会多出一个；它也统计了那个其注册记录即将被删除——但尚未被删除——的已取消课程开设。


    我们将在第 11 章中对此现象有更多讨论。


    让我们再给出两个事务的例子。清单 10-7 定义了一个涉及子查询来确定新属性值的更新事务。清单 10-7 更新销售代表的佣金。对于每个销售代表，将其佣金增加其所在部门所有销售代表（包括正在更新的这位）平均月薪的
    2%。


    **清单 10-7.** 事务 `ETX6(dbs)`

    ```

    FEa: dbs↓{MEMP,TERM,DEPT,GRD,REG,OFFR,CRS,EMP,HIST}


    ∪


    { (SREP; { s↓{EMPNO,TARGET}


    ∪ { (COMM; 1.02 *


    (AVG e1∈{ e | e∈dbs(EMP) ∧


    e(DEPTNO)∈{ e2(DEPTNO) | e2∈dbs(EMP) ∧


    e2(EMPNO) = s(EMPNO) } ∧


    e(JOB) = ''SALESREP'' }


    : e1(MSAL))


    ) }


    | s∈dbs(SREP) }


    ) }

    ```


    **SEI**:

    ```

    update SREP s


    set COMM = (select 1.02 * avg(e1.MSAL)


    from EMP e1


    where e1.DEPTNO = (select e2.DEPTNO


    from EMP e2


    where e2.EMPNO = s.EMPNO)


    and e1.JOB = ''SALESREP'')

    ```


    请注意，与之前的更新事务示例相比，这是一个无限制的更新；`SREP` 的所有行都被修改。


    为了方便起见，这里给出了我们在第 5 章中形式化定义的 `AVG` 操作符的结构：

    ```

    (AVG x∈S: f(x))

    ```


    对于可以从集合 `S` 中选择的每个元素 `x`，平均值操作符计算表达式 `f(x)` 的值，并计算所有这些值的平均值。在表达式 `FEa` 中，该操作符的使用方式如下：

    ```

    (AVG e1∈{ 与销售代表 s(EMPNO) 在同一部门工作的所有销售代表 }


    : e1(MSAL))

    ```


    如你在表达式 `SEI` 中所见，SQL 允许你在 `UPDATE` 语句的 `SET` 子句中指定子查询。但是请注意，在这些情况下，子查询应始终仅检索单行单列的数据。


    清单 10-8 定义了一个 `DELETE` 事务；从 `GRD` 中删除当前未被“使用”的薪资等级。该清单删除了没有员工被分配到的薪资等级。


    **清单 10-8.** 事务 `ETX7(dbs)`


    **FEa**:

    ```

    dbs↓{SREP,MEMP,TERM,DEPT,REG,OFFR,CRS,EMP,HIST}


    ∪


    { (GRD; { g | g∈dbs(GRD) ∧ ¬(∃e∈dbs(EMP): e(SGRADE) = g(GRADE) } ) }

    ```


    **SEI**:

    ```

    delete from GRD g


    where not exists (select e.*


    from EMP e


    where e.SGRADE = g.GRADE)

    ```

