    **Listing A-16.** *Table Universe tab_DEPT*


    **tab_DEPT :=**


    { D | D∈℘(tab_DEPT) ∧


    **/* Department number uniquely identifies a tuple r11 */**


    ( ∀d1,d2∈D: d1(DEPTNO) = d2(DEPTNO) ⇒ d1 = d2 )


