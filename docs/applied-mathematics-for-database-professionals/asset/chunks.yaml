    # 第二章：集合论：导言


    请注意，这个定义并不排除集合 `A` 和 `B` 相等的可能性；我们用于表示子集的符号 (`⊆`) 实际上明确暗示了这种可能性。如果你想排除相等的可能性，你应该使用特殊的子集变体及其对应符号，如定义
    2-5 所示。


    ## 定义 2-5：真子集 / 真超集


    `A` 是 `B` 的**真子集**，`B` 是 `A` 的**真超集**（记法：`A ⊂ B`） ⇔ `A` 是 `B` 的子集**且** `A ≠ B`。


    你可以使用斜线作为否定符号；例如，`A ⊄ B` 表示 `A` **不是** `B` 的真子集。除了这个带有内置否定的 `⊄` 符号外，你总是可以使用单独的否定符号来书写逻辑上等价的陈述，如下所示：`A
    ⊄ B ⇔ ¬( A ⊂ B )`


    参见代码清单 2-6 中一些关于子集的命题示例；请自行验证它们都为真。


    ## 代码清单 2-6：为真的子集命题示例


    ```

    {1,2} ⊆ {1,2,3}

    {1,2} ⊂ {1,2,3}

    {1,2,3} ⊄ {1,2,3}

    {1,2,3} ⊆ {1,2,3}

    ∅ ⊆ {1,2,3}

    ```


    代码清单 2-6 的最后两个例子很有趣，因为它们说明了子集的以下两个重要性质：


    - 每个集合都是其自身的子集：`A ⊆ A`

    - 空集是每个集合的子集：`∅ ⊆ A`


    这里值得提及的另外两个子集性质是：


    - 传递性：`( ( A ⊆ B ) ∧ ( B ⊆ C ) ) ⇒ ( A ⊆ C )`

    - 相等性：`( A = B ) ⇔ ( ( A ⊆ B ) ∧ ( B ⊆ A ) )`


    ## 并集、交集与差集


    你可以对集合应用各种运算。最著名的集合算子是 `并集`、`交集` 和 `差集`。对于差集算子，我们有两种变体：常规差集和对称差集。表 2-2 展示了这四种算子的正式定义和对应的数学符号。


    ## 表 2-2：常见集合算子


    | 名称                 | 符号 | 定义                                           |

    |----------------------|------|------------------------------------------------|

    | 并集                 | `∪`  | `A ∪ B = { x | x∈A ∨ x∈B }`                    |

    | 交集                 | `∩`  | `A ∩ B = { x | x∈A ∧ x∈B }`                    |

