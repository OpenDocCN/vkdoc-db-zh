    \ `TRUE` 或 `FALSE`。你在第三章已经接触过这两个运算符：它们是存在量词和全称量词。它们通过对集合（用作参数）中的所有元素实例化某个谓词，并分别计算所有结果命题的合取或析取的真值，从而产生一个布尔值。\n\
    \n我们以几个再次使用 `T6` 的例子结束本章。清单 5-8 展示了涉及这些运算符的表达式，并给出了它们产生的结果值。\n\n## 清单 5-8. 涉及\
