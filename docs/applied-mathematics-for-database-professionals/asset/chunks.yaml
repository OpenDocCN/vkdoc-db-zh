    In Chapter 7 you’ll study a formal methodology of specifying a database design
    and learn that this methodology uses a *layered* approach. Every layer (three
    in total) introduces a class of constraints: tuple, table, and database constraints,
    respectively. You’ll specify these constraints through data integrity predicates.


    The section “Common Patterns of Table and Database Predicates” will explore five
    data integrity predicate *patterns* that often play a role in a database design:
    *unique identification*, *subset requirement*, *specialization*, *generalization*,
    and *tuple-in-join* predicates.


    In a database design you always (rare cases excluded) encounter data integrity
    constraints that are based on unique identification and subset requirement predicates.
    You’ll probably identify these two predicate patterns with the relational concepts
    of unique and foreign key constraints, respectively. The specialization and generalization
    predicate patterns will probably remind you of the ERD concepts of a subtype and
    a supertype. The tuple-in-join predicate pattern involves a join between two or
    more tables, and is at the basis of a type of constraint that is also often encountered
    in database designs.


    As usual, you’ll find a “Chapter Summary” at the end, followed by an “Exercises”
    section.


    **Tuple Predicates**


    Let’s explain right away what a *tuple predicate* is and then quickly demonstrate
    this concept with a few examples. A *tuple predicate* is a predicate with one
    parameter. This parameter is of type tuple. Listing 6-1 displays a few examples
    of tuple predicates.


    **Listing 6-1.** *Tuple Predicate Examples*


    P0(t) := ( t(sex) ∈ {''male'', ''female''} )


    P1(t) := ( t(price) ≥ 20 ⇒ t(instock) ≤ 10 )


    P2(t) := ( t(status) = ''F'' ∨ ( t(status) = ''I'' ∧ t(total) > 0 ) ) P3(t) :=
    ( t(salary) < 5000 ∨ t(sex) = ''female'' )


    P4(t) := ( t(begindate) < t(enddate) )


    Predicate P0 states that the sex attribute value of a tuple should be ''male''
    or ''female''.


    Predicate P1 states that if the price (attribute) value of a tuple is greater
    than or equal to 20, then the instock (attribute) value should be 10 or less.
    P2 states that the status value is either F or it is I, but then at the same time
    the total value should be greater than 0. Predicate P3


    states that salary should be less then 5000 or sex is female. Finally, predicate
    P4 states that the begindate value should be less than enddate.


    We’ll use a tuple predicate (in Chapter 7) to accept or reject a given tuple.
    If the predicate—when instantiated with a given tuple as the argument—turns into
    a FALSE proposition, then we will reject the tuple; otherwise, we will accept
    it. In the latter case, we say that the given tuple *satisfies the predicate*.
    In the former case, the tuple *violates the predicate*.


    Again, let’s demonstrate this with a few example tuples (see Listing 6-2).


