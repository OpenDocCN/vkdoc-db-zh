    \ e2(DEPTNO)≠d(DEPTNO)) }\n```\n\n`SEI`:\n\n```sql\nselect d.*\nfrom   DEPT d\n\
    where  exists(select e1.*\n              from   EMP e1\n              where  e1.DEPTNO\
    \ = d.DEPTNO\n              and    e1.JOB in ('PRESIDENT','MANAGER'))\nand   \
    \ not exists(select e2.*\n                  from   EMP e2\n                  where\
    \  e2.DEPTNO = d.DEPTNO\n                  and    e1.JOB = 'ADMIN')\n```\n\n清单\
    \ 7-26 介绍了此表约束的形式化规范。使用此规范，您可以推导出查询 `EXQ11` 的形式化表达式。因为您想查找违反此约束的部门，所以您只需要否定约束规范；只需在规范前加上\
    \ `¬`。\n\n如下所示（请注意，在此规范中，自由变量 `E` 代表一个员工表）：\n\n```\n¬(∀d∈{ e1(DEPTNO) | e1∈E }:\n\
    \    (∃e2∈E: e2(DEPTNO)=d ∧ e2(JOB)∈{'PRESIDENT','MANAGER'} )\n    ⇒\n    (∃e3∈E:\
    \ e3(DEPTNO)=d ∧ e3(JOB)='ADMIN' ) )\n```\n\n如果您然后通过将否定引入量化来重写此规范，您最终会得到以下规范（请自行验证）：\n\
    \n```\n(∃d∈{ e1(DEPTNO) | e1∈E }:\n    (∃e2∈E: e2(DEPTNO)=d ∧ e2(JOB)∈{'PRESIDENT','MANAGER'}\
    \ ) ∧\n    ¬(∃e3∈E: e3(DEPTNO)=d ∧ e3(JOB)='ADMIN' ) )\n```\n\n形式化表达式 `FEa` 现在可以直接从前面重写的约束规范中得出。`FEb`\
    \ 是 `FEa` 的重写；用全称量词替换了否定的存在量词。\n\n您可以从规范 `FEa` 轻松推导出 SQL 文本 (`SEI`)。\n\n### 关于否定的说明\n\
    \n您可能已经注意到，由于 SQL 缺乏全称量化和蕴含，某些 SQL 表达式最终比其形式化对应物包含更多的否定。`EXQ9` 的 `SEII` 就是一个很好的例子；它包含一个嵌套的否定存在量词。\n\
    \n理解此类查询的含义很困难。采用全称量词的形式化对应物更容易理解。\n\n通常，我们（人类）难以理解包含否定的表达式；否定越多，对我们来说就越难理解。当您在形式化规范中遇到否定时，您应该研究将此类规范重写为包含更少否定的表达式的机会。您可以使用本书第\
    \ 1 部分介绍的重写规则来实现这一点。\n\n> **注意** 通过重写形式化规范以使其包含更少的否定，您不仅帮助了自己，还使您的客户（用户）能够获得更清晰的非形式化规范。\n\
    \n因为它们非常重要，我们在此再次列出涉及否定的重写规则。表 9-1 包含了德摩根定律、蕴含和量词重写规则的各种替代形式。\n\n**表 9-1.** `包含否定的重写规则`\n\
    \n**表达式** | **等价于**\n---|---\n`¬¬A` | ⇔ `A`\n`¬A ⇒ ¬B` | ⇔ `B ⇒ A`\n`¬A ⇒ B` |\
    \ ⇔ `¬B ⇒ A`\n`A ⇒ ¬B` | ⇔ `B ⇒ ¬A`\n`A ⇒ ¬B` | ⇔ `(A ∧ B) ⇒ FALSE`\n`¬A ∧ ¬B`\
    \ | ⇔ `¬( A ∨ B )`\n`A ∧ ¬B` | ⇔ `¬( ¬A ∨ B )`\n`¬A ∧ B` | ⇔ `¬( A ∨ ¬B )`\n`¬A\
    \ ∨ ¬B` | ⇔ `¬( A ∧ B )`\n`A ∨ ¬B` | ⇔ `¬( ¬A ∧ B )`\n`¬A ∨ B` | ⇔ `¬( A ∧ ¬B\
    \ )`\n`¬(∃x∈X: ¬P(x))` | ⇔ `(∀x∈X: P(x))`\n`(∃x∈X: ¬P(x))` | ⇔ `¬(∀x∈X: P(x))`\n\
    `¬(∃x∈X: P(x))` | ⇔ `(∀x∈X: ¬P(x))`\n`(∃x∈X: P(x))` | ⇔ `¬(∀x∈X: ¬P(x))`\n\n有时，您可以利用有关数据库设计约束的知识来消除否定。例如，如果您需要查询所有未取消的课程，您可以等效地查询所有已安排或已确认的课程。如果\
    \ `o` 代表一个课程元组，则以下重写规则将适用：\n\n```\no(STATUS) ≠ 'CANC' ⇔ o(STATUS)∈{'SCHD','CONF'}\n\
    ```\n\n这里您使用了关于属性 `STATUS` 的属性值集的知识。\n\n如果——在重写表达式的过程中——您最终需要查询薪资不低于 5000 的员工，那么查询薪资等于或大于\
    \ 5000 的员工可能更好。以下重写规则适用（`e` 代表一个员工元组）：\n\n```\n¬(e(MSAL) < 5000) ⇔ e(MSAL) ≥ 5000\n\
    ```\n\n我们的大脑不喜欢否定。尝试通过将表达式重写为包含更少否定的表达式来避免否定。这不仅适用于查询规范，也适用于约束规范（前几章）和数据操作规范（下一章）。\n"
- fmt: '## Chapter Summary


    This section provides a summary of this chapter, formatted as a bulleted list.
    You can use it to check your understanding of the various concepts introduced
    in this chapter before continuing with the exercises in the next section.


    • Queries constitute a crucial application of a database; they enable you to extract
    information from a database that is relevant for you.


    • You can formally represent a query as a function over a database universe. For
    every database state that you supply as the argument, the function returns the
    query result.


    • Because you supply a database state, the function can reference every table
    available in the database state to determine the query result.


    • To specify a query, you can use all formal concepts introduced in Part 1 of
    this book.


    You usually specify the result set of a query as a set of tuples (a table) using
    the hybrid method. The given set from which you start such a specification is
    typically one of the tables, or a join of some of the tables available in the
    database state; you can also use any of the set operators introduced in this book.
    The predicates inside the query specification are typically compound predicates
    (they use the various logical connectives), and often employ the universal and
    existential quantifiers.


    • In practice (certainly when you use `SQL`), the result of a query will always
    be a table.


    However, our formal model does not require this.


    • When you use `SQL` as your query language, you should be aware of various limitations.


    Following are the most notable ones:


    • `SQL` is not set oriented; you sometimes have to use the `distinct` keyword.


    • `SQL` lacks the implication operator; you must rewrite these into disjunctions.


    • Oracle’s version of `SQL` lacks universal quantification; you must rewrite this
    into existential quantification.


    • `SQL` lacks the subset operator; you must rewrite this using the other available
    set operators (`union`, `intersect`, and `minus`).


    ## Exercises


    Develop both formal and `SQL` expressions for these queries.


    **Note**: In the following exercises, there may be queries that cannot be answered
    with the given database.


    In these cases, you should give arguments why the answer cannot be given.


    ### 1. Give the number and name of employees who belong to department 10.


    ### 2. Give the number and name of employees who do not belong to department 10,
    11, 12, or 15.


    ### 3. Give the number and name of employees who belong to departments 10 and
    11.


    ### 4. Give the number and name of employees who belong to a department that is
    a subdepartment of department 10.


    ### 5. Ascertain that the constraint of there being at most one president is not
    violated.


    ### 6. Give the number and name of administrators older than 35 who have a monthly
    salary of more than 2000.


    ### 7. Give the number and name of managers who earn the maximum of their grade.


    ### 8. Give the number and name of the trainers who actually worked as such in
    at least one course in 2004.


    ### 9. Give the number and name of the trainers who did not work as such in any
    course in 2004.


    ### 10. Give the number, name, and salary of every manager who earns less than
    any of his employees.


    ### 11. Find a query with answer “yes” if `COURSE` is uniquely identifying in
    `OFFR` and “no” if otherwise. Does the answer “yes” imply that `COURSE` is a key
    of `OFFR`?


    ### 12. Give of every manager: his or her number, name, and salary of every one
    of his or her subordinate employees.


    ### 13. Give for every employee whose manager is managed by another employee (super-manager):
    number and name of the employee and of his or her super-manager.


    ### 14. Give of every manager and of every one of his or her direct subordinates
    who is a manager: number, name, and date hired.


    ### 15. Give of every manager and of every one of his or her subordinates who
    is a manager: number, name, and date when they got the manager’s job.


    ### 16. Give the number and name of employees who left in 2006 and came back in
    that same year.


    ### 17. Give the number and name of employees who left in 2006 and did not come
    back.


    ### 18. Give the number of persons that left and the number that entered department
    10 in 2006.


    ### 19. Give the number of persons in department 10 at the end of 2006.


    ### 20. List the following for the course “Designing Databases” that started on
    March 4, 2006: for every registered student, username, name, job, and evaluation.


    ### 21. Give for every one of the courses (with `CODE`) `DB1`, `DB2`, `DB3`, the
    duration, and for every offering (with a begin date) in 2006: begin date, status,
    and number of registered students.


    ### 22. Give per department (`DEPTNO` and `DNAME`) the number of administrators,
    trainers, sales representatives, and managers.


    ### 23. Give all data of salary grades where every employee (that is, employee
    who is assigned to this grade) is earning more than the salary grade’s upper limit
    minus 500 dollars.


    ### 24. Give all (managed) employees who are assigned to a higher salary grade
    than their boss’s salary grade.


    ### 25. Give the courses for which every canceled offering in 2006 had at least
    one student registered for that offering.


    ### 26. Give the employees (`EMPNO` and `ENAME`) who attended (at least) one offering
    for all design courses (course category equals ''DSG'') in 2006.


    ### 27. List all employees who have received a raise of more than 20 percent in
    the year 2006.


    ## Data Manipulation


    Through executing transactions, you can manipulate the data in a database. In
    this chapter we’ll demonstrate how you can specify a transaction in a formal way.
    We won’t formally introduce any new concepts; we’ve already presented all the
    ingredients for specifying transactions.


    The section “Formally Specifying Transactions” gradually develops how you can
    specify a transaction. You’ll learn that you can specify a transaction as a function
    over the database universe at hand. For every database state, this function returns
    another database state that reflects the intended changes of the transaction.
    In this section, we’ll also give two examples to familiarize you with this formal
    concept of a transaction.


    The section “Example Transactions Over `DB_UEX`” provides example transactions
    for the database universe that was introduced in Chapter 7. For the second time
    in this book, you’ll see the use of `SQL`. Every example transaction will be accompanied
    by one or more equivalent `SQL` data manipulation language (DML) statements; that
    is, `INSERT`, `UPDATE`, and `DELETE` statements. You’ll learn that expressing
    certain transactions in `SQL` requires executing more than one DML statement.


    **Note**: We assume you have a working knowledge of `SQL` DML statements. It is
    not the goal of this book to teach `SQL`.


    In preparation for the next chapter (11) where you’ll be introduced to the challenges
    of implementing data integrity constraints using an `SQL` DBMS, we’ll also (somewhat)
    discuss which data integrity constraints a given transaction might violate. It
    is up to the DBMS to validate these involved data integrity constraints for the
    given transaction. The DBMS should reject the intended changes of the transaction
    if the resulting database state violates any of the involved constraints.


    As usual, you’ll find a “Chapter Summary” at the end, followed by an “Exercises”
    section.'
  raw: '## Chapter Summary


    This section provides a summary of this chapter, formatted as a bulleted list.
    You can use it to check your understanding of the various concepts introduced
    in this chapter before continuing with the exercises in the next section.


    • Queries constitute a crucial application of a database; they enable you to extract
    information from a database that is relevant for you.


    • You can formally represent a query as a function over a database universe. For
    every database state that you supply as the argument, the function returns the
    query result.


    • Because you supply a database state, the function can reference every table
    available in the database state to determine the query result.


    • To specify a query, you can use all formal concepts introduced in Part 1 of
    this book.


    You usually specify the result set of a query as a set of tuples (a table) using
    the hybrid method. The given set from which you start such a specification is
    typically one of the tables, or a join of some of the tables available in the
    database state; you can also use any of the set operators introduced in this book.
    The predicates inside the query specification are typically compound predicates
    (they use the various logical connectives), and often employ the universal and
    existential quantifiers.


    • In practice (certainly when you use SQL), the result of a query will always
    be a table.


    However, our formal model does not require this.


    • When you use SQL as your query language, you should be aware of various limitations.


    Following are the most notable ones:


    • SQL is not set oriented; you sometimes have to use the distinct keyword.


    • SQL lacks the implication operator; you must rewrite these into disjunctions.


    • Oracle’s version of SQL lacks universal quantification; you must rewrite this
    into existential quantification.


    • SQL lacks the subset operator; you must rewrite this using the other available
    set operators (union, intersect, and minus).


    7451CH09.qxd 5/7/07 11:28 AM Page 219


    C H A P T E R 9 **■** D ATA R E T R I E VA L


    **219**


    • Our brains dislike negations. Whenever you specify a query, try to minimize
    the number of negations in such a specification. Most of the time, you can use
    the rewrite rules introduced in Part 1 of this book to achieve this. Sometimes
    you can use simple arithmetic rewrite rules. On occasion, you can achieve this
    by using constraint knowledge of the database design that you query.


    **Exercises**


    Develop both formal and SQL expressions for these queries.


    **■Note** In the following exercises, there may be queries that cannot be answered
    with the given database.


    In these cases, you should give arguments why the answer cannot be given.


    **1.** Give the number and name of employees who belong to department 10.


    **2.** Give the number and name of employees who do not belong to department 10,
    11, 12, or 15.


    **3.** Give the number and name of employees who belong to departments 10 and
    11.


    **4.** Give the number and name of employees who belong to a department that is
    a subde-partment of department 10.


    **5.** Ascertain that the constraint of there being at most one president is not
    violated.


    **6.** Give the number and name of administrators older than 35 who have a monthly
    salary of more than 2000.


    **7.** Give the number and name of managers who earn the maximum of their grade.


    **8.** Give the number and name of the trainers who actually worked as such in
    at least one course in 2004.


    **9.** Give the number and name of the trainers who did not work as such in any
    course in 2004.


    **10.** Give the number, name, and salary of every manager who earns less than
    any of his employees.


    **11.** Find a query with answer “yes” if COURSE is uniquely identifying in OFFR
    and “no” if otherwise. Does the answer “yes” imply that COURSE is a key of OFFR?


    **12.** Give of every manager: his or her number, name, and salary of every one
    of his or her subordinate employees.


    **13.** Give for every employee whose manager is managed by another employee (super-manager):
    number and name of the employee and of his or her super-manager.


    7451CH09.qxd 5/7/07 11:28 AM Page 220


    **220**


    C H A P T E R 9 **■** D ATA R E T R I E VA L


    **14.** Give of every manager and of every one of his or her direct subordinates
    who is a manager: number, name, and date hired.


    **15.** Give of every manager and of every one of his or her subordinates who
    is a manager: number, name, and date when they got the manager’s job.


    **16.** Give the number and name of employees who left in 2006 and came back in
    that same year.


    **17.** Give the number and name of employees who left in 2006 and did not come
    back.


    **18.** Give the number of persons that left and the number that entered department
    10


    in 2006.


    **19.** Give the number of persons in department 10 at the end of 2006.


    **20.** List the following for the course “Designing Databases” that started on
    March 4, 2006: for every registered student, username, name, job, and evaluation.


    **21.** Give for every one of the courses (with CODE) DB1, DB2, DB3, the duration,
    and for every offering (with a begin date) in 2006: begin date, status, and number
    of registered students.


    **22.** Give per department (DEPTNO and DNAME) the number of administrators, trainers,
    sales representatives, and managers.


    **23.** Give all data of salary grades where every employee (that is, employee
    who is assigned to this grade) is earning more than the salary grade’s upper limit
    minus 500 dollars.


    **24.** Give all (managed) employees who are assigned to a higher salary grade
    than their boss’s salary grade.


    **25.** Give the courses for which every canceled offering in 2006 had at least
    one student registered for that offering.


    **26.** Give the employees (EMPNO and ENAME) who attended (at least) one offering
    for all design courses (course category equals ''DSG'') in 2006.


    **27.** List all employees who have received a raise of more than 20 percent in
    the year 2006.


    7451CH10.qxd 5/7/07 11:36 AM Page 221


    C H A P T E R 1 0


    Data Manipulation


    **T**hrough executing *transactions*,you can manipulate the data in a database.
    In this chapter we’ll demonstrate how you can specify a transaction in a formal
    way. We won’t formally introduce any new concepts; we’ve already presented all
    the ingredients for specifying transactions.


    The section “Formally Specifying Transactions” gradually develops how you can
    specify a transaction. You’ll learn that you can specify a transaction as a *function
    over the database* *universe* at hand. For every database state, this function
    returns another database state that reflects the intended changes of the transaction.
    In this section, we’ll also give two examples to familiarize you with this formal
    concept of a transaction.


    The section “Example Transactions Over DB_UEX” provides example transactions for
    the database universe that was introduced in Chapter 7. For the second time in
    this book, you’ll see the use of SQL. Every example transaction will be accompanied
    by one or more equivalent SQL data manipulation language (DML) statements; that
    is, INSERT, UPDATE, and DELETE statements. You’ll learn that expressing certain
    transactions in SQL requires executing more than one DML statement.


    **■Note** We assume you have a working knowledge of SQL DML statements. It is
    not the goal of this book to teach SQL.


    In preparation for the next chapter (11) where you’ll be introduced to the challenges
    of implementing data integrity constraints using an SQL DBMS, we’ll also (somewhat)
    discuss which data integrity constraints a given transaction might violate. It
    is up to the DBMS to validate these *involved* data integrity constraints for
    the given transaction. The DBMS should reject the intended changes of the transaction
    if the resulting database state violates any of the involved constraints.


    As usual, you’ll find a “Chapter Summary” at the end, followed by an “Exercises”
    section.


    **Formally Specifying Transactions**'
  trans: '## 章节总结


    本节以项目符号列表的形式提供了本章的总结。你可以在继续下一节的练习之前，使用它来检查自己对本章介绍的各种概念的理解。


    • 查询构成了数据库的一项关键应用；它们使你能够从数据库中提取对你相关的信息。


    • 你可以将查询形式化地表示为一个定义在数据库全域上的函数。对于你提供的每一个数据库状态作为参数，该函数都会返回查询结果。


    • 因为你提供了数据库状态，该函数可以引用该数据库状态中所有可用的表来确定查询结果。


    • 要指定一个查询，你可以使用本书第一部分介绍的所有形式化概念。


    你通常使用混合方法将查询的结果集指定为一个元组集合（一张表）。你开始进行这种指定的给定集合通常是一个表，或者是数据库状态中某些可用表的连接；你也可以使用本书中介绍的任何集合运算符。查询规范内部的谓词通常是复合谓词（它们使用各种逻辑连接词），并且经常使用全称量词和存在量词。


    • 在实践中（当然，当你使用 `SQL` 时），查询的结果总是一张表。

    然而，我们的形式化模型并不强制要求这一点。


    • 当你使用 `SQL` 作为查询语言时，你应该意识到其各种限制。

    以下是最值得注意的几点：


    • `SQL` 并非面向集合的；你有时必须使用 `distinct` 关键字。


    • `SQL` 缺少蕴涵运算符；你必须将其重写为析取式。


    • 甲骨文版本的 `SQL` 缺少全称量化；你必须将其重写为存在量化。


    • `SQL` 缺少子集运算符；你必须使用其他可用的集合运算符（`union`、`intersect` 和 `minus`）来重写。


    ## 练习


    为这些查询开发形式化表达式和 `SQL` 表达式。


    **注意**：在以下练习中，可能存在无法用给定数据库回答的查询。

    在这些情况下，你应该给出无法给出答案的理由。


    ### 1. 给出属于 10 号部门的员工的编号和姓名。


    ### 2. 给出不属于 10、11、12 或 15 号部门的员工的编号和姓名。


    ### 3. 给出同时属于 10 号和 11 号部门的员工的编号和姓名。


    ### 4. 给出属于 10 号部门的子部门的员工的编号和姓名。


    ### 5. 确保最多只有一位总裁的约束未被违反。


    ### 6. 给出年龄超过 35 岁且月薪超过 2000 的行政人员的编号和姓名。


    ### 7. 给出赚取其工资等级最高薪资的经理的编号和姓名。


    ### 8. 给出在 2004 年至少一门课程中实际担任过培训师的培训师的编号和姓名。


    ### 9. 给出在 2004 年未在任何课程中担任过培训师的培训师的编号和姓名。


    ### 10. 给出每位经理的编号、姓名及其薪资，但仅限于该经理的薪资低于其任何下属员工的情况。


    ### 11. 查找一个查询，如果 `COURSE` 在 `OFFR` 中能唯一标识则答案为“是”，否则为“否”。答案“是”是否意味着 `COURSE` 是
    `OFFR` 的一个键？


    ### 12. 给出每位经理的编号、姓名，以及其每一位下属员工的薪资。


    ### 13. 对于每位经理的经理是另一位员工（超级经理）的员工，给出该员工及其超级经理的编号和姓名。


    ### 14. 给出每位经理及其每一位身为经理的直属下属的编号、姓名和雇佣日期。


    ### 15. 给出每位经理及其每一位身为经理的下属的编号、姓名以及他们获得经理职位的日期。


    ### 16. 给出在 2006 年离职并在同一年返回的员工的编号和姓名。


    ### 17. 给出在 2006 年离职且未返回的员工的编号和姓名。


    ### 18. 给出 2006 年离开 10 号部门的人数以及进入该部门的人数。


    ### 19. 给出 2006 年底时 10 号部门的人数。


    ### 20. 列出 2006 年 3 月 4 日开始的“数据库设计”课程的以下信息：每位注册学生的用户名、姓名、职位和评价。


    ### 21. 对于代码（`CODE`）为 `DB1`、`DB2`、`DB3` 的每门课程，给出其时长，以及 2006 年每一次开课（带有开始日期）的开始日期、状态和注册学生人数。


    ### 22. 按部门（`DEPTNO` 和 `DNAME`）分别给出行政人员、培训师、销售代表和经理的人数。


    ### 23. 给出所有满足以下条件的工资等级数据：该等级下的每位员工（即被分配到此等级的员工）的薪资都高于该工资等级上限减去 500 美元。


    ### 24. 给出所有被分配到高于其上司工资等级的（被管理）员工。


    ### 25. 给出满足以下条件的课程：2006 年每一次被取消的开课都至少有一名学生注册了该次开课。


    ### 26. 给出在 2006 年参加了所有设计类课程（课程类别等于 ''DSG''）的（至少一次）开课的员工（`EMPNO` 和 `ENAME`）。


    ### 27. 列出在 2006 年获得超过 20% 加薪的所有员工。


    ## 数据操作


    通过执行事务，你可以操作数据库中的数据。在本章中，我们将演示如何以形式化的方式指定事务。我们不会形式化地引入任何新概念；我们已经介绍了指定事务所需的所有要素。


    “形式化指定事务”一节逐步阐述了如何指定事务。你将了解到，可以将事务指定为当前数据库全域上的一个函数。对于每一个数据库状态，该函数返回另一个反映了该事务预期更改的数据库状态。在本节中，我们还将给出两个示例，以帮助你熟悉事务的这种形式化概念。


    “在 `DB_UEX` 上的事务示例”一节为第 7 章引入的数据库全域提供了示例事务。这是你第二次在本书中看到 `SQL` 的使用。每个示例事务都将附带一个或多个等效的
    `SQL` 数据操作语言（DML）语句；即 `INSERT`、`UPDATE` 和 `DELETE` 语句。你将了解到，用 `SQL` 表达某些事务需要执行多个
    DML 语句。


    **注意**：我们假设你具备 `SQL` DML 语句的实用知识。本书的目标不是教授 `SQL`。


    为下一章（第 11 章）做准备，在那一章你将了解到使用 `SQL` DBMS 实现数据完整性约束所面临的挑战，我们也将（在一定程度上）讨论给定事务可能违反哪些数据完整性约束。由
    DBMS 负责为给定的事务验证这些涉及的数据完整性约束。如果由此产生的数据库状态违反了任何涉及的约束，DBMS 应拒绝该事务的预期更改。


    和往常一样，你将在本章末尾找到“章节总结”，随后是“练习”部分。'
- fmt: "# 第十章 数据操作（续）\n\n除了数据检索，事务执行是数据库的第二个最重要的应用。通过执行事务，你可以维护数据库并确保其状态是（变化中的）现实世界的有效表示。在本节中，我们将演示如何形式化地指定事务。\n\
    \n## 插入操作的形式化规范\n\n让我们从一个简单的例子开始，使用第七章引入的数据库设计。看一下元组 `tcrs1`。它表示一个需要插入数据库的新课程：\n\
    \n```\ntcrs1 := { (CODE;'AM4DP')\n         , (DESC;'Applied Mathematics for Database\
    \ Professionals')\n         , (CAT;'DSG')\n         , (DUR;5) }\n```\n\n为方便起见，我们在代码清单\
    \ 10-1 中重复了特征定义 `chr_CRS`、元组宇宙 `tup_CRS` 和表宇宙 `tab_CRS` 的定义。所有关于 `CRS` 表结构的属性、元组和表约束都在此清单中。\n\
    \n**代码清单 10-1.** `chr_CRS`、`tup_CRS` 和 `tab_CRS` 的定义\n\n```\nchr_CRS :=\n  { (\
    \ CODE; CRSCODE–TYP )\n  , ( DESCR; varchar(40) )\n  , ( CAT; { s | s∈varchar(3)\
    \ ∧ s∈{'DSG','GEN','BLD'} } )\n  , ( DUR; { n | n∈number(2,0) ∧ 1 ≤ n ≤ 15 } )\n\
    \  }\n\ntup_CRS :=\n  { c | c∈Π(chr_CRS) ∧ c(CAT) = 'BLD' ⇒ c(DUR) ≤ 5 }\n\ntab_CRS\
    \ :=\n  { C | C∈℘(tup_CRS) ∧ (∀c1,c2∈C: c1(CODE) = c2(CODE) ⇒ c1 = c2) }\n```\n\
    \n`tcrs1` 并未违反 `CRS` 表结构的任何属性或元组约束；或者换句话说，`tcrs1` 是元组宇宙 `tup_CRS` 的一个元素。\n\n以下是对将\
    \ `tcrs1` 插入 `CRS` 表结构这一事务进行形式化规范的首次尝试。我们可以将这个事务指定为一个函数，例如 `Tx1a`，定义在 `DB_UEX`\
    \ 上。对于 `DB_UEX` 中的一个给定数据库状态，例如 `dbs`，函数 `Tx1a` 返回一个反映了将 `tcrs1` 插入 `CRS` 表结构后的数据库状态。\n\
    \n```\nTx1a(dbs) := { (EMP; dbs(EMP) )\n             , (SREP; dbs(SREP))\n   \
    \          , (MEMP; dbs(MEMP))\n             , (TERM; dbs(TERM))\n           \
    \  , (DEPT; dbs(DEPT))\n             , (GRD; dbs(GRD) )\n             , (CRS;\
    \ dbs(CRS) ∪ {tcrs1} )\n             , (OFFR; dbs(OFFR))\n             , (REG;\
    \ dbs(REG) )\n             , (HIST; dbs(HIST)) }\n```\n\n如你所见，函数 `Tx1a` 生成了另一个数据库状态，该状态包含与\
    \ `dbs` 相同的十个表结构。这个结果数据库状态仅在 `CRS` 表结构上与 `dbs` 不同；元组 `tcrs1` 已被添加。对于所有其他表结构，结果数据库状态持有\
    \ `dbs` 所持有的相应表。\n\n让我们将 `Tx1a` 应用于“空数据库状态”（即所有表结构都持有空表的数据库状态）。以下是这个空数据库状态，我们将它命名为\
    \ `db_empty`。我们在第七章的练习 12 中向你介绍了这个数据库状态。\n\n```\ndb_empty := { (EMP; ∅)\n    \
    \        , (SREP; ∅)\n            , (MEMP; ∅)\n            , (TERM; ∅)\n     \
    \       , (DEPT; ∅)\n            , (GRD; ∅)\n            , (CRS; ∅)\n        \
    \    , (OFFR; ∅)\n            , (REG; ∅)\n            , (HIST; ∅) }\n```\n\n在第七章的练习\
    \ 12 中，你已确定 `db_empty` 是 `DB_UEX` 的一个元素。因此，你可以将函数 `Tx1a` 应用于它。将函数 `Tx1a` 应用于 `db_empty`，记为\
    \ `Tx1a(db_empty)`，得到以下数据库状态：\n\n```\nTx1a(db_empty) = { (EMP; ∅)\n          \
    \       , (SREP; ∅)\n                 , (MEMP; ∅)\n                 , (TERM; ∅)\n\
    \                 , (DEPT; ∅)\n                 , (GRD; ∅)\n                 ,\
    \ (CRS; {tcrs1} )\n                 , (OFFR; ∅)\n                 , (REG; ∅)\n\
    \                 , (HIST; ∅) }\n```\n\n注意，将 `Tx1a` 应用于 `db_empty` 的结果是一个（再次）属于\
    \ `DB_UEX` 的数据库状态；结果数据库状态符合作为 `DB_UEX` 定义一部分的所有静态约束。然而，这通常并不成立。让我们看看将 `Tx1a` 应用于以下数据库状态\
    \ (`dbs1`) 的情况：\n\n```\ndbs1 :=\n  { (EMP; ∅)\n  , (SREP; ∅)\n  , (MEMP; ∅)\n\
    \  , (TERM; ∅)\n  , (DEPT; ∅)\n  , (GRD; ∅)\n  , (CRS; { { (CODE;'AM4DP'), (DESC;'AM4DP\
    \ workshop')\n           , (CAT;'DSG'), (DUR;1) } } )\n  , (OFFR; ∅)\n  , (REG;\
    \ ∅)\n  , (HIST; ∅) }\n```\n\n将事务 `Tx1a` 应用于数据库状态 `dbs1` 会得到一个持有如下 `CRS` 表的数据库状态："
  raw: 'Next to data retrieval, transaction execution is the second most important
    application of a database. By executing transactions, you can maintain the database
    and ensure that its state remains a valid representation of the (changing) real
    world. In this section, we’ll demonstrate how you can formally specify transactions.


    **221**


    7451CH10.qxd 5/7/07 11:36 AM Page 222


    **222**


    C H A P T E R 1 0 **■** D ATA M A N I P U L AT I O N


    Let’s start with a simple example using the database design that was introduced
    in Chapter 7\. Take a look at tuple tcrs1\. It represents a new course than needs
    to be inserted into the database:


    tcrs1 := { (CODE;''AM4DP'')


    , (DESC;''Applied Mathematics for Database Professionals'')


    , (CAT;''DSG'')


    , (DUR;5) }


    For your convenience, we repeat the definitions of characterization chr_CRS, tuple
    universe tup_CRS, and table universe tab_CRS in Listing 10-1\. All involved attribute,
    tuple, and table constraints with regards to the CRS table structure are in this
    listing.


    **Listing 10-1.** *Definitions of chr_CRS, tup_CRS, and tab_CRS*


    chr_CRS :=


    { ( CODE; CRSCODE–TYP )


    , ( DESCR; varchar(40) )


    , ( CAT; { s | s∈varchar(3) ∧


    s∈{''DSG'',''GEN'',''BLD''} } )


    , ( DUR; { n | n∈number(2,0) ∧ 1 ≤ n ≤ 15 } )


    }


    tup_CRS :=


    { c | c∈Π(chr_CRS) ∧ c(CAT) = ''BLD'' ⇒ t(DUR) ≤ 5


    }


    tab_CRS :=


    { C | C∈℘(tup_CRS) ∧ (∀c1,c2∈C: c1(CODE) = c2(CODE) ⇒ c1 = c2)


    }


    **■Note** tcrs1 does not violate any attribute or tuple constraints for the CRS
    table structure; or put differently, tcrs1 is an element of tuple universe tup_CRS.


    Here is a first attempt to formally specify the transaction of inserting tcrs1
    into the CRS


    table structure. We could specify this transaction as a function, say Tx1a, over
    DB_UEX. For a given database state in DB_UEX, say dbs, function Tx1a returns a
    database state that reflects the insertion of tcrs1 into the CRS table structure.


    Tx1a(dbs) := { (EMP; dbs(EMP) )


    , (SREP; dbs(SREP))


    , (MEMP; dbs(MEMP))


    , (TERM; dbs(TERM))


    , (DEPT; dbs(DEPT))


    , (GRD; dbs(GRD) )


    7451CH10.qxd 5/7/07 11:36 AM Page 223


    C H A P T E R 1 0 **■** D ATA M A N I P U L AT I O N


    **223**


    , (CRS; dbs(CRS) ∪ {tcrs1} )


    , (OFFR; dbs(OFFR))


    , (REG; dbs(REG) )


    , (HIST; dbs(HIST)) }


