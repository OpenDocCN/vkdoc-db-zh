    \ DI 代码的复杂性，原则上与数据库约束的复杂性并无不同。\n\n过渡约束处理的是事务的开始状态和结束状态。如前所述，事务在 SQL 中是通过连续执行 DML\
    \ 语句来实现的。这种实现不仅会创建中间数据库状态，而且——在本节的上下文中——还会创建*中间状态转换*。从形式上讲，你只需要验证从事务开始状态到结束状态的转换。过渡约束的\
    \ DI 代码应该只在事务的最后一条 DML 语句创建了结束状态之后执行；也就是说，它的执行应该被推迟到事务结束时。在“引入延迟检查”一节中，你会找到一个关于延迟执行\
