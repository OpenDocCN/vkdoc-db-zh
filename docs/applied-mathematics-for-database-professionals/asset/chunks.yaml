- fmt: "Now let's investigate how you can formally specify that the salary of an employee\
    \ is not allowed to decrease. Transaction `TX1` violates this state transition\
    \ requirement because there exists a combination of an employee tuple (say `e1`)\
    \ in `E1` and an employee tuple (say `e2`) in `E2` that both concern the same\
    \ employee—that is, that correspond on the `empno` attribute—and are such that\
    \ the `msal` value in `e2` is lower than the `msal` value in `e1`.\n\nAssume that\
    \ `dbs1` is the begin state of transaction `TX1` and `dbs2` is its end state.\
    \ Note that this means that the expression `dbs1(EMP)` evaluates to `E1` and expression\
    \ `dbs2(EMP)` evaluates to `E2`. Take a look at the proposition in Listing 8-1.\n\
    \n**Listing 8-1.** A Proposition Concerning Database States `dbs1` and `dbs2`\n\
    \n```\nprop1 :=\n(∀e1∈dbs1(EMP): (∀e2∈dbs2(EMP): e1(empno) = e2(empno) ⇒ e1(msal)\
    \ ≤ e2(msal) ) )\n```\n\nThis proposition states that there cannot exist a combination\
    \ of a tuple in `E1` and a tuple in `E2` such that they correspond on the `empno`\
    \ attribute, and the `msal` value in the `E1` tuple is greater than the `msal`\
    \ value in the `E2` tuple. This precisely reflects our state transition requirement.\n\
    \nThis type of transition constraint (at the attribute level) is common, and can\
    \ also be specified in another way: by joining the table in the begin state with\
    \ its corresponding version in the end state such that all attribute values (old\
    \ and new) are available, and then restricting the attribute values in the resulting\
    \ tuples in this join.\n\n**Note** Loosely speaking, such transition constraints\
    \ can be considered *dynamic* tuple-in-join constraints.\n\nListing 8-2 shows\
    \ an alternative way to formally specify this requirement; it joins the `EMP`\
    \ table in the begin state (`dbs1`) with the `EMP` table in the end state (`dbs2`).\n\
    \n**Listing 8-2.** Alternative Specification for Our State Transition Requirement\n\
    \n```\nprop2 :=\n( ∀e∈((dbs1(EMP)⇓{empno,msal})◊◊{(empno;empno),(old_msal;msal)})⊗\n\
    \  ((dbs2(EMP)⇓{empno,msal})◊◊{(empno;empno),(new_msal;msal)}): e(old_msal) ≤\
    \ e(new_msal) )\n```\n\nWe now use the join operator (`⊗`) together with table\
    \ projection (`⇓`) and attribute renaming (`◊◊`). In this specification both `E1`\
    \ and `E2` are first projected on the `empno` and `msal` attributes. Then the\
    \ `msal` attribute in (the projection of ) `E1` is renamed to `old_msal`, and\
    \ the `msal` attribute in (the projection of ) `E2` is renamed to `new_msal`.\
    \ The resulting two tables can now be joined with the join operator. The table\
    \ resulting from this join is a table over heading `{empno,old_msal,new_msal}`.\
    \ For all tuples in this table, the `old_msal` value should be smaller than or\
    \ equal to the `new_msal` value.\n\nFigure 8-2 clarifies the preceding explanation\
    \ by displaying the intermediate tables and the final table resulting from the\
    \ subexpressions inside `prop2`.\n\n**Figure 8-2.** Intermediate tables and final\
    \ table for expression `prop2`\n\n## State Transition Predicates\n\nContinuing\
    \ from Chapter 6 where the concepts of a *tuple*, *table*, and *database predicate*\
    \ were introduced, we now further increase the scope of data that a data integrity\
    \ predicate can deal with by defining the notion of a *state transition predicate*.\n\
    \nState transition predicates deal with *a pair of database states*. These predicates\
    \ have two parameters, both of type database state; the first parameter is referred\
    \ to as the begin state and the second parameter the end state. In the next section,\
    \ we’ll use state transition predicates to define the admissible state transitions\
    \ for a database design. Only those transactions, whose begin and end state transform\
    \ all state transition predicates into true propositions, are considered valid\
    \ (or admissible) transactions.\n\nNote that the propositions in Listings 8-1\
    \ and 8-2 also deal with a pair of database states: the two given database states\
    \ `dbs1` and `dbs2`. Now take a look at the state transition predicates in Listing\
    \ 8-3. These are the “predicate versions” of the propositions in Listings 8-1\
    \ and 8-2.\n\n**Listing 8-3.** Two State Transition Predicates\n\n```\nSTP1(B,E)\
    \ := ( ∀e1∈B(EMP), e2∈E(EMP): e1(empno)=e2(empno) ⇒ e1(msal) ≤ e2(msal) )\nSTP2(B,E)\
    \ := ( ∀e∈((B(EMP)⇓{empno,msal})◊◊{(empno;empno),(old_msal;msal)})⊗\n        \
    \        ((E(EMP)⇓{empno,msal})◊◊{(empno;empno),(new_msal;msal)}): e(old_msal)\
    \ ≤ e(new_msal) )\n```\n\nWhen you supply database states `dbs1` and `dbs2` as\
    \ values for parameters `B` and `E`, respectively, then these state transition\
    \ predicates will transform into the propositions listed in Listings 8-1 and 8-2.\n\
    \n```\nSTP1(dbs1,dbs2) = prop1\nSTP2(dbs1,dbs2) = prop2\n```\n\nWe require that\
    \ state transition predicates cannot be decomposed into multiple conjuncts, just\
    \ like tuple, table, and database predicates. If you can rewrite a given state\
    \ transition predicate `ST(B,E)` into an expression of the form `STa(B,E) ∧ STb(B,E)`,\
    \ then you are in fact dealing with two state transition predicates.\n\nIn the\
    \ remainder of this book, we’ll also require that a state transition predicate—say\
    \ `ST(B,E)`—cannot be rewritten into a predicate of either of the following two\
    \ forms: `P(B)` or `P(E)`. In these expressions, `P` represents a database predicate;\
    \ that is, a predicate that inspects a single database state (either `B` or `E`\
    \ in the preceding cases). This means that we require a state transition predicate\
    \ to involve at least one table from the begin state as well as at least one table\
    \ from the end state. That’s because, if the predicate involves only tables from\
    \ one database state (either the begin or the end state), then the predicate will\
    \ reflect a static constraint, not a state transition constraint.\n\nAs you’ll\
    \ see in the examples given in the next section, state transition predicates typically\
    \ involve the tables from the begin and end states of the same table structure.\
    \ Instead of specifying a state transition predicate with two parameters of type\
    \ database state, we’ll often specify them with two or more parameters of type\
    \ table. To illustrate this, Listing 8-4 respecifies the state transition predicates\
    \ of Listing 8-3 in this way. Parameters `EMPB` and `EMPE` are of type table;\
    \ the idea is for parameter `EMPB` to accept the employee table state that exists\
    \ at the beginning of a transaction, and for parameter `EMPE` to accept the employee\
    \ table state that exists at the end of a transaction.\n\n**Listing 8-4.** Alternative\
    \ Specification of State Transition Predicates `STP1` and `STP2`\n\n```\nSTP1(EMPB,EMPE)\
    \ :=\n( ∀e1∈EMPB, e2∈EMPE: e1(empno) = e2(empno) ⇒ e1(msal) ≤ e2(msal) )\nSTP2(EMPB,EMPE)\
    \ :=\n( ∀e∈((EMPB⇓{empno,msal})◊◊{(empno;empno),(old_msal;msal)})⊗\n      ((EMPE⇓{empno,msal})◊◊{(empno;empno),(new_msal;msal)}):\n\
    \      e(old_msal) ≤ e(new_msal) )\n```\n\nIn the next section, we’ll use state\
    \ transition predicates to formally specify the state transition constraints for\
    \ a database design.\n\n## State Transition Constraints\n\nIn this section we’ll\
    \ introduce you to the concept of a *state transition universe*. The state transition\
    \ constraints will be specified as embedded state transition predicates in the\
    \ formal definition of a state transition universe.\n\n### State Transition Universe\n\
    \nTo formally specify the state transition constraints for a database design,\
    \ we’ll specify the *set of all admissible transactions* for the database design.\
    \ You can model a transaction as an ordered pair of its begin and end states;\
    \ the first coordinate in the ordered pair represents the begin state, and the\
    \ second coordinate of the ordered pair represents the end state.\n\nYou can then\
    \ specify the *set of all admissible transactions* as a set of such ordered pairs."
