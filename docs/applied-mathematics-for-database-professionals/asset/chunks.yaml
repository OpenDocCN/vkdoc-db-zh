  raw: '• EMP holds a tuple that represents a trainer with employee number 1126, who
    was hired before February 1, 200 *6*. This trainer is still working for us; that
    is, he or she has not been terminated (PSSR8, PTIJ11, PTIJ12, PODC7).


    • DEPT holds a tuple that represents a department located in Utrecht. The aforementioned
    trainer is working in this department (PSSR7, PODC3).


    Three other static constraints involve OFFR: PTIJ10, PODC4, and PODC5\. However,
    these three cannot be violated by a transaction that inserts a new CRS tuple.
    They all involve the REG table structure too. The second characteristic in the
    preceding bulleted list, together with the fact that the begin state must be a
    valid one (that is, contained in DB_UEX), imply that there are no tuples in REG.
    This in turn means that the database state conforms (and remains conformed after
    the insertion of offr1) to PTIJ10, PODC4, and PODC5.


    Given the preceding characteristics, the transaction of inserting tuple toffr1
    would successfully execute. However, note that toffr1 represents a *confirmed*
    offering. The definition of our state transition universe (ST_UEX from Chapter
    8) contains the specification of a state


    7451CH10.qxd 5/7/07 11:36 AM Page 226


    **226**


    C H A P T E R 1 0 **■** D ATA M A N I P U L AT I O N


    transition constraint stating that new offerings must start with status *scheduled*
    (constraint STC2, in Listing 8-8). Clearly this transaction violates constraint
    STC2.


    A correct definition of the transaction that attempts to insert offr1, say Tx2,
    would be as follows.


    For a database state dbs in DB_UEX, let


    Tx2a(dbs) := { (EMP; dbs(EMP) )


    , (SREP; dbs(SREP))


    , (MEMP; dbs(MEMP))


    , (TERM; dbs(TERM))


    , (DEPT; dbs(DEPT))


    , (GRD; dbs(GRD) )


    , (CRS; dbs(CRS) )


    , (OFFR; dbs(OFFR) ∪ {toffr1} )


    , (REG; dbs(REG) )


    , (HIST; dbs(HIST)) }


    and let


    Tx2b(dbs) := dbs , if Tx2a(dbs)∉DB_UEX


    := Tx2a(dbs), otherwise


    then,


    Tx2(dbs) := Tx2b(dbs), if (dbs,Tx2b(dbs))∈ST_UEX


    := dbs


    , otherwise


    The definition of Tx2a describes the insertion of toffr1\. Tx2b ensures that this
    conforms to all static constraints. The definition of Tx2 ensures that the transaction
    conforms to all state transition constraints too. It does so by adding the condition
    that the ordered pair consisting of the begin state and the end state for the
    transaction is an element of the state transition universe.


    Often a transaction modifies only a few of the table structures involved in a
    database design; many table structures remain unchanged. An alternative (and somewhat
    shorter) way of specifying Tx2a, that more explicitly shows this fact, is as follows:
    Tx2a(dbs) := dbs↓{EMP,SREP,MEMP,TERM,DEPT,GRD,CRS,REG,HIST}


