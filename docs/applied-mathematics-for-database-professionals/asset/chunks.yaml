    from regular arithmetic, typically expressed as a formula like the following,
    which was shown at the beginning of this section:


    a*(b+c) = (a*b) + (a*c)


    This algebraic property shows a certain relationship between addition and multiplication;
    in regular arithmetic, multiplication distributes over addition. In logic, something
    similar holds for the relationship between conjunction and disjunction, as shown
    in Listing 3-5.


    **Listing 3-5.** *Distributive Properties*


    ( P ∨ ( Q ∧ R ) ) ⇔ ( ( P ∨ Q ) ∧ ( P ∨ R ) )


    ( P ∧ ( Q ∨ R ) ) ⇔ ( ( P ∧ Q ) ∨ ( P ∧ R ) )


    As these tautologies demonstrate, conjunction is distributive over disjunction
    and vice versa. Note that in regular arithmetic, addition does *not* distribute
    over multiplication.


    **Reflexivity**


    The regular equality is an example of a *reflexive* operator; x = x is TRUE for
    any x (regardless of the type of x). In logic, the implication and equivalence
    connectives are reflexive, because the predicates shown in Listing 3-6 are always
    TRUE.


    **Listing 3-6.** *Reflexive Properties*


    P ⇔ P


    P ⇒ P


    **Transitivity**


    The regular equality is *transitive*, as expressed by the following formula: ((x
    = y) ∧ (y = z)) ⇒ (x = z)


    Conjunction, implication, and equivalence are transitive in logic, as shown in
    Listing 3-7.


    **Listing 3-7.** *Transitive Properties*


    ( ( P ∧ Q ) ∧ ( Q ∧ R ) ) ⇒ ( P ∧ R )


    ( ( P ⇒ Q ) ∧ ( Q ⇒ R ) ) ⇒ ( P ⇒ R )


    ( ( P ⇔ Q ) ∧ ( Q ⇔ R ) ) ⇒ ( P ⇔ R )


    Note that the disjunction is not transitive: ( P ∨ Q ) ∧ ( Q ∨ R ) does *not*
    imply P ∨ R.


