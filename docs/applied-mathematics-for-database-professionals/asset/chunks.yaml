    C H A P T E R 6 **■** T U P L E , TA B L E , A N D D ATA B A S E P R E D I C AT
    E S


    **135**


    In general, you shouldn’t introduce data redundancy in a database design; it forces
    you to maintain the redundancy whenever you update data that determines the redundant
    data.


    Or, viewed from a database design perspective, it forces you to introduce a constraint
    that imposes the data redundancy. However, an inspection attribute is very helpful
    when specifying a generalization property in a database design (there is an exercise
    on this at the end of this chapter).


    **Tuple-in-Join Predicate**


    Often two tables are related through a subset requirement. When two tables are
    thus related, the need to join them arises often, for obvious reasons. You can
    join tuples from tables EMP1


    and DEP1 that correspond on the attributes that are involved in the subset requirement
    between these two tables, in this case the deptno attribute. The resulting table
    from this combination will have as its heading the union of the heading of EMP1
    and the heading of DEP1.


    Figure 6-10 displays the result of such a combination of tables EMP1 and DEP1.


    **Figure 6-10.** *Table EMPDEP1, the join of tables EMP1 and DEP1*


    Every tuple in table EMPDEP1 is called a *tuple in the join* of EMP1 and DEP1\.
    *Tuple-in-join* *predicates* are tuple predicates dealing with these tuples in
    a join; the joined tuple is the parameter for the tuple predicate. Here is an
    example of a tuple predicate regarding EMPDEP1: ( ∀t∈EMPDEP1: t(sal)≤t(salbudget)/5
    )


    This proposition states that all tuples in EMPDEP1—the join of EMP1 and DEP1—have
    a sal attribute value that doesn’t exceed 20 percent of the salbudget attribute
    value. In this proposition the expression t(sal)≤t(salbudget)/5 represents the
    tuple predicate. If you express this proposition not in terms of table EMPDEP1,
    but in terms of the two tables that are joined—EMP1


    and DEP1—you’ll end up with a proposition looking like this: ( ∀e∈EMP1: ( ∀d∈DEP1:
    e(deptno)=d(deptno) ⇒ e(sal)≤d(salbudget)/5 ) )


    7451CH06.qxd 5/14/07 10:37 AM Page 136


    **136**


    C H A P T E R 6 **■** T U P L E , TA B L E , A N D D ATA B A S E P R E D I C AT
    E S


    It states that no employee can earn more than a fifth of the departmental salary
    budget (of the department where he or she is employed). Another way of formally
    specifying this is as follows:


    ( ∀t∈EMP1⊗DEP1: t(sal)≤t(salbudget)/5 )


    In this proposition, the expression t(sal)≤t(salbudget)/5 represents a tuple predicate
    that constrains the tuples in the join. This predicate pattern is commonly found
    in database designs and is referred to as a *tuple-in-join predicate*. Definition
    6-4 formally specifies it.


    **■Definition 6-4: Tuple-in-Join Predicate** Let T1 and T2 be tables and P a tuple
    predicate. A predicate is a tuple-in-join predicate if it is of the following
    form: ( ∀t∈T1⊗T2: P(t) )


    We say that *P constrains tuples in the join of T1 and T2*.


    In the preceding definition, you will typically find that tables T1 and T2 are
    related via a subset requirement that involves the join attributes.


    Listing 6-11 demonstrates two more instantiations of a tuple-in-join predicate
    involving tables EMP1 and DEP1.


    **Listing 6-11.** *More Tuple-in-Join Predicates Regarding Tables EMP1 and DEP1*


    P9 := ( ∀e∈EMP1: ( ∀d∈DEP1: e↓{deptno}=d↓{deptno} ⇒


    (d(loc)=''LOS ANGELES''⇒ e(job)≠''MANAGER'') ) )


    P10 := ( ∀e∈EMP1: ( ∀d∈DEP1: e↓{deptno}=d↓{deptno} ⇒


    (d(loc)=''SAN FRANCISCO''⇒ e(job)∈{''TRAINER'',''CLERK''}) ) )


    P9 states that managers cannot be employed in Los Angeles. P10 states that employees
    working in San Francisco must either be trainers or clerks. Given the sample values
    EMP1 and DEP1 in Figure 6-10 both propositions are TRUE; there are no managers
    working in Los Angeles and all employees working in San Francisco—there are none—are
    either trainers or clerks.


    In this section, we’ve defined the tuple-in-join predicate to involve only two
    tables. However, it is often meaningful to combine three or even more tables with
    the join operator. Of course, tuples in these joins can also be constrained by
    a tuple predicate. Here is the pattern of a tuple-in-join predicate involving
    three tables (T1, T2, and T3): ( ∀t1∈T1: ( ∀t2∈T2: ( ∀t3∈T3: (t1↓A=t2↓A ∧ t2↓B=t3↓B)
    ⇒ P(t1∪t2∪t3) ) ) ) In this pattern, A represents the set of join attributes for
    tables T1 and T2, and B represents the set of join attributes for tables T2 and
    T3\. Predicate P represents a predicate whose argument is the tuple in the join.
    In the next chapter, you’ll see examples of tuple-in-join predicates involving
    more than two tables.


