- fmt: "# CHAPTER 3 SOME MORE LOGIC\n\n## Conjunctive Normal Form\n\nA predicate is\
    \ in conjunctive normal form (CNF) if it consists of one or more members separated\
    \ by AND; that is, if the predicate, say `P-CNF`, has the following format: `P-CNF\
    \ := C ∧ C ∧ C ∧ ... ∧ C_n`.\n\nIn this formula, `C_1`, `C_2`, ... `C_n` are known\
    \ as the conjunction members—or just conjuncts for short. Each conjunction member\
    \ is an iterated OR of simple predicates only (note that zero iteration is allowed\
    \ too, which results in a conjunction member containing no invocation of OR);\
    \ a simple predicate is a predicate that cannot be further decomposed into a disjunction\
    \ or conjunction (that is, it cannot be a compound predicate). These simple predicates\
    \ may optionally be preceded by a negation connective. Note that the set `{∨,\
    \ ∧, ¬}` is functionally complete, as explained in Chapter 1; therefore, you don’t\
    \ need other connectives to express any arbitrary predicate. Also, as we’ll demonstrate\
    \ shortly, CNF is always achievable for any arbitrary predicate.\n\nCNF in full\
    \ detail looks as shown in Listing 3-17.\n\n`Listing 3-17. Conjunctive Normal\
    \ Form (CNF)`\n\n```\nP-CNF := (SP_1a ∨ SP_1b ∨ SP_1c ∨ ... ∨ SP_1d) ∧\n     \
    \    (SP_2a ∨ SP_2b ∨ SP_2c ∨ ... ∨ SP_2d) ∧\n         (SP_3a ∨ SP_3b ∨ SP_3c\
    \ ∨ ... ∨ SP_3d) ∧\n         ...\n         ∧\n         (SP_n1 ∨ SP_n2 ∨ SP_n3\
    \ ∨ ... ∨ SP_nd)\n```\n\nIn Listing 3-17, each simple predicate `SP_ij` is allowed\
    \ to be prefixed with a negation connective. It’s easy to check whether a proposition\
    \ in CNF is a tautology, because as soon as one of the conjunction members is\
    \ FALSE, the proposition becomes FALSE. In other words, you can check the conjunction\
    \ members one by one. Moreover, because all conjunction members of a predicate\
    \ in CNF must be an iterated OR with simple predicates only, the tautology check\
    \ can also be formulated as follows:\n\n*A CNF predicate is a tautology (always\
    \ TRUE) if and only if each conjunction member contains a simple predicate P and\
    \ its negation.*\n\nListing 3-18 shows four examples of predicates in CNF (`P`,\
    \ `Q`, `R`, and `S` are simple predicates).\n\n`Listing 3-18. Examples of Predicates\
    \ in CNF`\n\n```\nP\nP ∨ Q\nP ∧ Q\n(P ∨ Q ∨ ¬R) ∧ (P ∨ ¬R)\n(P ∨ Q ∨ ¬P) ∧ (Q\
    \ ∨ ¬Q) ∧ (¬R ∨ R ∨ S)\n```\n\nThe first predicate has one conjunction member\
    \ that consists of one simple predicate. The second predicate has one conjunction\
    \ member that happens to be a disjunction of two simple predicates; the third\
    \ and the fourth examples consist of two conjunction members. The fifth example\
    \ is a tautology; note that the three conjunction members contain the pairs of\
    \ simple predicates (`P`, `¬P`), (`Q`, `¬Q`), and (`R`, `¬R`), respectively.\n\
    \n## Disjunctive Normal Form\n\nA predicate is in disjunctive normal form (DNF)\
    \ if it consists of one or more members separated by OR; that is, if the predicate,\
    \ say `P-DNF`, has the following format: `P-DNF := D ∨ D ∨ D ∨ ... ∨ D_n`.\n\n\
    In this formula, `D_1`, `D_2`, ... , `D_n` are known as the disjunction members—or\
    \ just disjuncts for short. Each disjunction member is an iterated AND with simple\
    \ predicates only (zero iteration allowed). So DNF in full detail looks as shown\
    \ in Listing 3-19.\n\n`Listing 3-19. Disjunctive Normal Form (DNF)`\n\n```\nP-DNF\
    \ := (SP_1a ∧ SP_1b ∧ SP_1c ∧ ... ∧ SP_1d) ∨\n         (SP_2a ∧ SP_2b ∧ SP_2c\
    \ ∧ ... ∧ SP_2d) ∨\n         (SP_3a ∧ SP_3b ∧ SP_3c ∧ ... ∧ SP_3d) ∨\n       \
    \  ...\n         ∨\n         (SP_n1 ∧ SP_n2 ∧ SP_n3 ∧ ... ∧ SP_nd)\n```\n\nIn\
    \ Listing 3-19, each `SP_ij` is allowed to be prefixed with a negation connective.\
    \ Compound predicates in DNF are easy to check for contradictions. For a predicate\
    \ in DNF to be a contradiction, all disjunction members must be FALSE—because\
    \ the predicate is written as an iterated OR construct. Following the same reasoning\
    \ as we did for predicates in CNF, we can say the following about predicates in\
    \ DNF:\n\n*A DNF predicate is a contradiction if and only if each disjunction\
    \ member contains a simple predicate P and its negation.*\n\nSee Listing 3-20\
    \ for examples of predicates in DNF.\n\n`Listing 3-20. Examples of Predicates\
    \ in DNF`\n\n```\nP ∨ Q\nP ∧ Q\n(P ∧ Q ∧ ¬R) ∨ (S ∧ ¬R)\n(P ∧ Q ∧ ¬P) ∨ (R ∧ ¬R\
    \ ∧ S)\n```"
