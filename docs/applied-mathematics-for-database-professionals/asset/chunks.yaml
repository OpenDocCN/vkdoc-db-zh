    *   `EMP` 表包含一个元组，代表一位员工编号为 1126 的培训师，该培训师的入职日期早于 200*6* 年 2 月 1 日。这位培训师仍在职；即，尚未被终止雇佣关系（`PSSR8`,\
    \ `PTIJ11`, `PTIJ12`, `PODC7`）。\n*   `DEPT` 表包含一个元组，代表一个位于乌得勒支（Utrecht）的部门。上述培训师就在该部门工作（`PSSR7`,\
    \ `PODC3`）。\n\n另外三个静态约束涉及 `OFFR` 表：`PTIJ10`、`PODC4` 和 `PODC5`。然而，插入新 `CRS` 元组的事务无法违反这三个约束。它们也都涉及\
    \ `REG` 表结构。前述要点列表中的第二个特征，加上初始状态必须是有效状态（即包含在 `DB_UEX` 中）这一事实，意味着 `REG` 表中不存在任何元组。这又意味着数据库状态符合（并且在插入\
    \ `offr1` 后保持符合）`PTIJ10`、`PODC4` 和 `PODC5`。\n\n鉴于以上特征，插入元组 `toffr1` 的事务将会成功执行。但请注意，`toffr1`\
    \ 代表一个*已确认*的课程开设。我们的状态转换宇宙（第 8 章的 `ST_UEX`）的定义包含了一项状态转换约束的规范，该约束规定新课程开设必须以*已安排*状态开始（约束\
    \ `STC2`，见清单 8-8）。显然，这个事务违反了约束 `STC2`。\n\n尝试插入 `offr1` 的事务的正确定义，例如 `Tx2`，应如下所示。\n\
    \n对于 `DB_UEX` 中的某个数据库状态 `dbs`，令\n\n```\nTx2a(dbs) := { (EMP; dbs(EMP) )\n    \
    \         , (SREP; dbs(SREP))\n             , (MEMP; dbs(MEMP))\n            \
    \ , (TERM; dbs(TERM))\n             , (DEPT; dbs(DEPT))\n             , (GRD;\
    \ dbs(GRD) )\n             , (CRS; dbs(CRS) )\n             , (OFFR; dbs(OFFR)\
    \ ∪ {toffr1} )\n             , (REG; dbs(REG) )\n             , (HIST; dbs(HIST))\
    \ }\n```\n\n并令\n\n```\nTx2b(dbs) := dbs , if Tx2a(dbs)∉DB_UEX\n           := Tx2a(dbs),\
    \ otherwise\n```\n\n那么，\n\n```\nTx2(dbs) := Tx2b(dbs), if (dbs,Tx2b(dbs))∈ST_UEX\n\
    \          := dbs      , otherwise\n```\n\n`Tx2a` 的定义描述了插入 `toffr1` 的操作。`Tx2b`\
    \ 确保该操作符合所有静态约束。`Tx2` 的定义确保该事务也符合所有状态转换约束。它通过添加一个条件来实现这一点：由事务的开始状态和结束状态组成的有序对必须是状态转换宇宙的一个元素。\n\
    \n通常，一个事务只修改数据库设计中涉及的少数表结构；许多表结构保持不变。指定 `Tx2a` 的另一种（且稍微简短一些）方式如下所示，它更明确地展示了这一事实：\n\
    \n```\nTx2a(dbs) := dbs↓{EMP,SREP,MEMP,TERM,DEPT,GRD,CRS,REG,HIST}\n∪\n{ (OFFR;\
    \ dbs(OFFR) ∪ {toffr1}) }\n```\n\n这里我们使用函数限制（`↓`）将所有未更改的表结构添加到结束状态，并通过并集（`∪`）添加事务修改的表结构。\n\
    \n下一节将提供一些在 `DB_UEX` 上执行的更多事务示例，以使您进一步熟悉如何形式化地指定事务。\n\n## DB_UEX 上的示例事务\n\n7451CH10.qxd\
    \ 5/7/07 11:36 AM Page 227\n\n第 10 章 ■ 数据操作\n\n**227**\n\n本节将提供一些事务示例。对于每个事务，我们将向您展示以下内容：\n\
    \n*   事务的非形式化描述\n*   一个或多个用于指定该事务的形式化表达式\n*   一个或多个在 SQL DBMS 中实现该事务的 SQL 规范\n\
    \n在此过程中，您将看到 SQL 存在一些局限性，导致您需要执行多条 DML 语句来实现给定的事务。\n\n清单 10-1 至 10-7 介绍了这些示例事务。所有事务将被命名为\
    \ `ETXi`（*e*xample *t*ransa*ct*ion i），其中 `i` 代表序号。在为每个事务给出的形式化规范中，`dbs` 将代表事务的开始状态（`DB_UEX`\
