    规范 `FEb` 是将 `FEa` 中的子集操作符重写为根据子集操作符定义推导出的量词。集合 `A` 是 `B` 的子集，当且仅当 `A` 的每个元素都是
    `B` 的元素。


    ```

    (A ⊆ B) ⇔ (∀a∈A: ∃b∈B: b=a)

    ```


    我们应用的重写规则稍微复杂一些；其结构如下：


    ```

    { a | a∈A ∧ P(a) } ⊆ { b | b∈B ∧ Q(b) }


    ⇔


    (∀a1∈{ a2 | a2∈A ∧ P(a2) }: (∃b∈B: b=a1 ∧ Q(b)))

