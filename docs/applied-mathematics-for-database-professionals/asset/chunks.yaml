    The preceding 19 rewrite rules constitute key knowledge for a database professional.
    Most of these are intuitively obvious. The Distribution and De Morgan Laws might
    need a little more thought to see that they are in fact reasonably intuitive too.
    We’ll spend some more time on these rewrite rules in the first section of Chapter
    3.


    Rewrite rules will help you in your task of formulating queries and data integrity
    constraints. They are crucial for database management systems too; they allow
    optimizers to rewrite predicates in such a way that alternative execution plans
    (with possibly better performance) become available while guaranteeing the same
    results under all circumstances.


    **Using Existing Rewrite Rules to Prove New Ones**


    Suppose you want to investigate the following logical equivalence, to see whether
    it is a rewrite rule:


    ( P ⇒ Q ) ⇔ ( ( P ∧ ¬Q ) ⇒ FALSE )


    **■Note** This rule has the effect of moving propositional variable Q to the left
    side of the implication, negating it on the way; the right-hand side is reduced
    to a constant, FALSE. This technique is similar to the way you solve quadratic
    equations (ax2 + bx + c = 0) in arithmetic, and it turns out to be a useful technique
    when implementing nontrivial constraints too, as you will see in Chapter 11 of
    this book.


    You could use a truth table, as shown before, but you can also use existing rewrite
    rules such as the ones listed in Table 1-13 to prove that this logical equivalence
    is in fact a tautology.


