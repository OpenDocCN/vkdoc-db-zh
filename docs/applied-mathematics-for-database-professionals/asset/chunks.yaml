    # ■注意


    我们（作者）并非本书所述方法的发明者。Frans Remmen 和 Bert de Brock 最早于 20 世纪 80 年代在埃因霍温理工大学工作期间开发了这一方法。附录
    C 列出了两本由 Bert de Brock 撰写的参考书籍，他在其中介绍了用以规范数据库设计的此方法。


    # 数据库设计实现问题


    当今绝大多数数据库管理系统都基于 `SQL`（读作“ess-cue-ell”）语言的 ISO 标准。这正是你将遇到一些麻烦的地方。首先，`SQL` 语言远非一种优雅且正交的数据库语言；此外，不难看出它是多年政治辩论和试图达成共识的产物。


    # ■引言


    事后看来，有些战役是被错误的一方赢得的。的确，这正是 C. J. Date 和 Hugh Darwen 撰写他们所谓“第三宣言”的原因之一。该书完全修订的第三版于
    2006 年出版：《数据库、类型与关系模型：第三宣言》（Addison-Wesley）。


    除此之外，几家数据库软件供应商在试图将 ISO 标准实施于其产品时犯了错误——有时是小错，有时是大错。


    他们还遗漏了某些特性，并添加了非标准特性以丰富其产品，从而偏离了 ISO 标准。一旦你试图脱离数学（进而脱离关系模型）而开始使用 `SQL DBMS`，你将不可避免地打开多个“潘多拉魔盒”。


    本书尽可能远离 `SQL`，以保持其通用性。第 9 章（数据检索）和第 10 章（数据操作）展示了 `SQL` 表达式；它们仅用于演示该语言相对于本书介绍的数学形式主义的（不）能力。两位作者恰巧都有丰富的
    Oracle `SQL DBMS` 经验；这些章节中给出的 `SQL` 代码与 Oracle `SQL DBMS` 的 10 `g` 版本兼容。第 11 章（实现数据库设计）展示了更多的
    `SQL` 表达式。我们也将保留第 11 章中 Oracle 特有的内容；你可以从 Apress 网站（`http://www.apress.com`）的源代码/下载区域下载代码。


    # 第一部分


    数学


    *凡事应力求简单，但不应过分简化。*


    阿尔伯特·爱因斯坦（1879–1955）


    # 第 1 章


    逻辑：引言


    “逻辑”一词含义丰富，且负担过重。它源自希腊词 *logicos*，意为“关乎语言和言语”或“人类推理”。


    “逻辑的历史”一节简要概述了逻辑的历史，旨在展示许多杰出人物历经数个世纪的参与，发展出如今被称为数理逻辑的学科。该节绝无意求全。


    在“值、变量与类型”一节中，我们将讨论 *值*（常量）和 *变量* 之间的区别。我们还将引入 *变量类型* 的概念。我们将在“命题与谓词”一节中使用这些概念来引入
    *谓词* 的概念，及其特例 *命题*——逻辑中的主要概念。


    “逻辑连接词”一节解释了如何通过使用 *逻辑连接词* 组合现有谓词来构建新的谓词。然后，在“真值表”一节中，你将看到如何使用 *真值表* 来定义逻辑连接词并研究逻辑表达式的真值。真值表是开始发展逻辑中各种概念的重要且有用的工具。


    *功能完备性* 在“功能完备性”一节中介绍；它关乎你需要哪些逻辑连接词（作为最小集合）来表述所有可能的逻辑表达式。


    接下来的两节介绍了 *重言式* 和 *矛盾式*、*逻辑等价* 以及 *改写规则* 的概念。你可以使用改写规则将一个逻辑表达式转换为另一个（等价的）逻辑表达式。


    本章是逻辑的入门章节。第 3 章将从本章结束之处继续——两章共同构成一个完整的主题（逻辑）。这种划分是必要的，因为关于逻辑的一些概念需要首先引入几个集合论概念。第
    2 章将服务于此目的。


    本章末尾引入关键概念 *改写规则*，开启了进行一些有益练习的第一个可能性。这些练习服务于两个重要目的：


    • 学习如何使用真值表和改写规则研究逻辑表达式


    • 习惯于本章引入的数学符号


    因此，我们强烈建议你在继续学习其他章节之前，花费足够的时间在这些练习上。


    ## 逻辑的历史


    逻辑科学和人类推理的研究可追溯至 2000 多年前的古希腊人。柏拉图的学生亚里士多德（公元前 384–322 年）被普遍认为是第一位逻辑学家。


    戈特弗里德·威廉·莱布尼茨（1646–1716）为数理逻辑的发展奠定了基础。他认为符号对于理解事物极其重要，因此他试图设计一种通用符号语言来描述人类推理。莱布尼茨的逻辑基于以下两个原则：


    • 只有少数几个简单思想构成了“人类思想的字母表”。


    • 你可以通过一个类似于算术乘法的过程，从这些简单思想生成复杂思想。


    乔治·布尔（1815–1864）发明了布尔代数的一般概念，这是现代计算机算术的基础。1854 年，他出版了《思维规律的研究：逻辑与概率数学理论的基础》，他在书中展示了你可以像处理代数符号和数字一样对逻辑符号进行算术运算。


    1922 年，路德维希·维特根斯坦（1889–1951）基于戈特洛布·弗雷格（1848–1925）等人在 19 世纪 80 年代的早期工作，引入了我们今天所知的真值表。


    在形式化符号引入之后，人们多次尝试使用数理逻辑来描述数学本身的基础。戈特洛布·弗雷格的尝试（失败了）是著名的；伯特兰·罗素（1872–1970）在 1901
    年表明弗雷格的系统可能产生矛盾：著名的罗素悖论（见旁注）。后来尝试实现相同目标的人包括伯特兰·罗素和阿尔弗雷德·诺斯·怀特海（1861–1947）、大卫·希尔伯特（1862–1943）、约翰·冯·诺依曼（1903–1957）、库尔特·哥德尔（1906–1978）和阿尔弗雷德·塔斯基（1902–1983），这里仅列举几位最著名的。


    ### 罗素悖论


    对于一般不熟悉数理逻辑，特别是不熟悉构建数学证明的读者来说，罗素悖论可能难以理解。该悖论如下：


    **1.** 考虑所有不包含自身作为元素的集合的集合；让我们称这个集合为 `X`。


    **2.** 假设 `X` 是 `X` 的一个元素——但根据上面集合 `X` 的定义，它必须*不是*其自身的成员。因此该假设为假。


    **3.** 类似地，假设 `X` *不是* `X` 的一个元素——但根据上面集合 `X` 的定义，它又必须是其自身的成员。因此这个假设也为假。


    **4.** 但这两个假设中必然有一个为真；因此产生了悖论。

