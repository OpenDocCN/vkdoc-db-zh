    execution model (EM4) is the same as EM3 when the triggering DML statement is
    an UPDATE statement. However, when inserts or deletes occur, you now also make
    use of the knowledge of what the *polarity* of an involved table structure is
    per constraint.


    The polarity of a table structure for a given constraint is defined to be *positive*
    if inserts into that table structure can violate the constraint and deletes cannot.
    The polarity of a table structure for a given constraint is *negative* if deletes
    from that table structure can violate the constraint and inserts cannot. The polarity
    of a table structure is defined to be *neutral* if both an insert and a delete
    give rise to a need for the constraint to be validated. The polarity of a table
    structure for a given constraint is undefined if the table structure is not involved
    in the constraint.


    7451CH11.qxd 5/15/07 2:26 PM Page 274


    **274**


    C H A P T E R 1 1 **■** I M P L E M E N T I N G D ATA B A S E D E S I G N S I
    N O R A C L E


    If the polarity of a table structure for a given constraint is neutral, then EM4
    is equivalent to EM3; there is no opportunity for you to further optimize (in
    comparison to EM3) the insert or delete trigger. However, if it is positive or
    negative, then you can further optimize the DELETE


    or INSERT statement trigger, respectively; in fact, you can drop them.


    Let’s demonstrate this by examining the DI code for constraint DEPT_TAB01\. As
    mentioned earlier, only inserting a department can potentially violate this constraint;
    if all department managers currently manage no more than two departments, then
    deleting a department can never violate this constraint. We say that the DEPT
    table structure has a positive polarity with regards to the DEPT_TAB01 constraint.
    In this case you can optimize the delete trigger not to run any DI code at all
    for DEPT_TAB01; you simply needn’t create the DEPT DELETE statement trigger that
    would have been created in EM3 for constraint DEPT_TAB01.


    **■Note** Scientific research has shown that a DBMS can also fairly easily compute
    the polarity of an involved table structure for a given (formally specified) constraint.
    This again implies that a DBMS vendor should be capable of supplying us with full
    declarative multi-tuple constraint support using execution model EM4.


    Still, execution model EM4 sometimes runs DI code when there is no need to. For
    instance, considering constraint EMP_TAB03, when you insert a *sales rep*, or
    delete a *trainer*, EM4 will run the DI code for constraint EMP_TAB03\. But obviously,
    because neither sales reps nor trainers play any role in this constraint, then
    inserts and/or deletes of them should never give rise to the need to check constraint
    EMP_TAB03\. The next execution model addresses this inefficiency.


    Execution Model 5: On-Transition-Effect-Property


    This execution model (EM5) assumes the availability of a *transition effect* of
    a given DML'
