- fmt: 'Let’s illustrate all this using the `RESULT` table structure that was introduced
    in the previous section. The powerset of tuple universe `tup_RESULT` results in
    a set that holds every possible `RESULT` table. There are lots of tables in this
    set. To be precise, because the cardinality of `tup_RESULT` is 14, there are exactly
    16384 (2 to the 14th power) possible tables. These are far too many to list in
    the enumerative way. Figure 7-2 displays just one of these tables (an arbitrarily
    chosen subset of `tup_RESULT`). Let’s name this table `R1`.


    ## Figure 7-2. A possible table for a RESULT named R1


    Table `R1` is a subset of `tup_RESULT`. It holds 11 distinct tuples. Because these
    tuples originate from the tuple universe, all of them are admissible tuples; they
    satisfy the tuple constraints, and every attribute holds an admissible value.


    Now assume that the following (informally specified) data integrity constraints
    play a role in a table for the `RESULT` table structure:


    *   The combination of attributes `POPULATION` and `COURSE` is uniquely identifying
    in a `RESULT` table (constraint `P1`).

    *   A `RESULT` table is empty or it holds exactly four tuples: one tuple for every
    combination of `POPULATION` and `COURSE` (constraint `P2`).

    *   The average score (`AVG_SCORE`) of the logic course is always higher than
    the average score of the set theory course; score A is the highest, F the lowest
    (constraint `P3`).

    *   Non-database professionals always have a lower average score than database
    professionals (constraint `P4`).


    **■Note** Some of these integrity constraints are rather contrived. Their sole
    purpose in this example is to bring down the number of tables in the table universe
    of the `RESULT` table structure to such an extent that it becomes feasible to
    enumerate all admissible tables.


    In Listing 7-23 you can find these four constraints formally specified as table
    predicates, using the names `P1` through `P4` introduced earlier. To be able to
    compare average scores in these specifications, we introduce a function `f`, which
    is defined as follows: `f := { (''A'';6), (''B'';5), (''C'';4), (''D'';3), (''E'';2),
    (''F'';1) }`


    This enables us to compare, for instance, scores B and E. Because `f(B)=5` and
    `f(E)=2` (and 5>2), we can say that B is a higher score than E.


    ## Listing 7-23. Table Predicates P1, P2, P3, and P4


    `P1(T) := ( ∀r1,r2∈T: r1↓{POPULATION,COURSE} = r2↓{POPULATION,COURSE} ⇒ r1 = r2
    )`

    `P2(T) := ( #T = 0 ∨ #T = 4 )`

    `P3(T) := ( ∀r1,r2∈T: ( r1(POPULATION) = r2(POPULATION) ∧ r1(COURSE) = ''logic''
    ∧ r2(COURSE) = ''set theory'' ) ⇒ f(r1(AVG_SCORE)) > f(r2(AVG_SCORE)) )`

    `P4(T) := ¬( ∃r1,r2∈T: r1(POPULATION) = ''NON-DP'' ∧ r2(POPULATION) = ''DP'' ∧
    f(r1(AVG_SCORE)) ≥ f(r2(AVG_SCORE)) )`


    Table predicate `P1` is one of the common types of data integrity predicates that
    were introduced in the section “Unique Identification Predicate” in Chapter 6.


    Table predicate `P2` is rather simple; the cardinality of the table should be
    either zero or four. Here is an alternative way to specify this: `#T∈{0,4}`.


    As you can see, table predicate `P3` specifies that the average score for the
    logic course should always be higher than the average score for the set theory
    course *within a population.*


    The first conjunct in the universal quantification—`r1(POPULATION) = r2(POPULATION)`—specifies
    this. A user can take for granted that the average scores for logic are always
    higher than those for set theory, *within a given population*, but fail to mention
    this explicitly (as was done in the preceding informal specification) when conveying
    the requirement informally.


    Table predicate `P4` unambiguously specifies that the “lower average score” mentioned
    in the informal specification is meant to be irrespective of the course; there
    is no conjunct `r1(COURSE) = r2(COURSE)` inside the existential quantification.'
