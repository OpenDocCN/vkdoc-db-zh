    \ 的（真）超集。因此，我们可以用 `t5` 来实例化谓词 `P3`——一个 `{salary, sex}` 上的谓词。\n\n正如你从所给的例子中看到的，元组谓词允许是复合的；也就是说，它可以涉及逻辑连接词。该谓词的组件通常将作为参数提供的元组的属性值与某些给定值进行比较。\n\
    \n关于元组谓词，我们还需要再观察两点。第一个涉及谓词中涉及的属性数量。注意谓词 `P0` 只引用了 `sex` 属性；它是一个单元素上的元组谓词。\n\n\
