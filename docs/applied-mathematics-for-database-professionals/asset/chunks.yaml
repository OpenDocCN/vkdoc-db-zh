    ## Partitions


    Now that we’ve introduced the union of a set of sets, we can define *partitions*
    as shown in Definition 2-9.


    ### ■Definition 2-9: Partition


    If `S` is a non-empty set, then `P` is a partition of `S` if `P` is a set consisting
    of mutually disjoint non-empty subsets of `S` for which the union equals `S`.


    Or, described in a more formal way, you could use the following equation: `(P
    is a partition of S ) ⇔ ( P ⊆ ℘S–{∅} ) ∧`


    `( let A,B∈P then (A≠B ⇒ (A∩B)=∅) ) ∧`


    `( ∪P = S )`


    This definition states the following:


    • `P` is a proper subset of the powerset `℘S` (because *the empty set is excluded*).'
