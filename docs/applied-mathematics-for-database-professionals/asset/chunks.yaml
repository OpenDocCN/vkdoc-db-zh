  trans: '

    您已经了解了如何利用表结构的表征来生成一个包含该结构所有可能元组的集合（参见第 5 章的“表构建”部分）。如果您将广义积应用于一个表征，最终会得到一个元组集合。这个集合不仅仅是普通的元组集合，它正是基于该表征所定义的属性值集构成的*所有可能*元组的集合。


    让我们再用一个简单的例子来说明。假设您正在设计一个名为 `RESULT` 的表结构；它存储了属于特定人群的学生所修课程的平均分数。以下是 `RESULT`
    的外部谓词：“属于人群 `POPULATION` 的学生，针对课程 `COURSE`，其四舍五入后的平均分数为 `AVG_SCORE`。”


    ### 代码清单 7-12. 表征 `chr_RESULT`


    `chr_RESULT` :=

    { ( `POPULATION`; {''DP'',''NON-DP''} )

    /* DP = 数据库专业人士, NON-DP = 非数据库专业人士 */

    , ( `COURSE`; {''集合论'',''逻辑学''} )

    , ( `AVG_SCORE`; {''A'',''B'',''C'',''D'',''E'',''F''} )

    }


    这三个属性值集代表了 `RESULT` 表结构的属性约束。如果您将广义积 `∏` 应用于 `chr_RESULT`，您将得到 `RESULT` 表结构的以下可能元组集合：


    ```

    ∏(chr_RESULT) =

    { { (POPULATION; ''DP''), (COURSE; ''集合论''), (AVG_SCORE; ''A'') }

    , { (POPULATION; ''DP''), (COURSE; ''集合论''), (AVG_SCORE; ''B'') }

    , { (POPULATION; ''DP''), (COURSE; ''集合论''), (AVG_SCORE; ''C'') }

    , { (POPULATION; ''DP''), (COURSE; ''集合论''), (AVG_SCORE; ''D'') }

    , { (POPULATION; ''DP''), (COURSE; ''集合论''), (AVG_SCORE; ''E'') }

    , { (POPULATION; ''DP''), (COURSE; ''集合论''), (AVG_SCORE; ''F'') }

    , { (POPULATION; ''DP''), (COURSE; ''逻辑学''), (AVG_SCORE; ''A'') }

    , { (POPULATION; ''DP''), (COURSE; ''逻辑学''), (AVG_SCORE; ''B'') }

    , { (POPULATION; ''DP''), (COURSE; ''逻辑学''), (AVG_SCORE; ''C'') }

    , { (POPULATION; ''DP''), (COURSE; ''逻辑学''), (AVG_SCORE; ''D'') }

    , { (POPULATION; ''DP''), (COURSE; ''逻辑学''), (AVG_SCORE; ''E'') }

    , { (POPULATION; ''DP''), (COURSE; ''逻辑学''), (AVG_SCORE; ''F'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''集合论''), (AVG_SCORE; ''A'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''集合论''), (AVG_SCORE; ''B'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''集合论''), (AVG_SCORE; ''C'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''集合论''), (AVG_SCORE; ''D'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''集合论''), (AVG_SCORE; ''E'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''集合论''), (AVG_SCORE; ''F'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''逻辑学''), (AVG_SCORE; ''A'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''逻辑学''), (AVG_SCORE; ''B'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''逻辑学''), (AVG_SCORE; ''C'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''逻辑学''), (AVG_SCORE; ''D'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''逻辑学''), (AVG_SCORE; ''E'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''逻辑学''), (AVG_SCORE; ''F'') }

    }

    ```


    在这个包含 24 个元组的集合中，之前定义的属性约束将成立。然而，该集合对于一个元组内部不同属性的属性值*组合*没有限制。通过指定*属性间*约束——或者更准确地说，*元组约束*——您可以将可能的元组集合限制为给定表的*可接受*元组集合。


    假设您不允许数据库专业人士的平均分数为 D、E 或 F，也不允许非数据库专业人士的平均分数为 A 或 B（无论课程是什么）。您可以通过定义元组宇宙 `tup_RESULT`
    来指定这一点；它形式化地指定了两个*元组谓词*：


    `tup_RESULT` :=

    { r | r∈Π(`chr_RESULT`) ∧

    /* ============================ */

    /* RESULT 的元组约束 */

    /* ============================ */

    /* 数据库专业人士的平均分永远不会是 D、E 或 F */

    '
- fmt: '# SPECIFYING DATABASE DESIGNS


    r(`POPULATION`)=''DP'' ⇒ r(`AVG_SCORE`)∉{''D'',''E'',''F''} ∧


    /* Non database professionals never score an average of A or B */


    r(`POPULATION`)=''NON-DP'' ⇒ r(`AVG_SCORE`)∉{''A'',''B''}


    }


    The tuple predicates introduced by the definition of a tuple universe are referred
    to as tuple constraints. You can also specify set `tup_RESULT` in the enumerative
    way.


    **Note** The original set of 24 possible tuples has now been reduced to a set
    of 14 admissible tuples.


    Ten tuples did not satisfy the tuple constraints that are specified in `tup_RESULT`.


    ```

    { { (POPULATION; ''DP''), (COURSE; ''set theory''), (AVG_SCORE; ''A'') }

    , { (POPULATION; ''DP''), (COURSE; ''set theory''), (AVG_SCORE; ''B'') }

    , { (POPULATION; ''DP''), (COURSE; ''set theory''), (AVG_SCORE; ''C'') }

    , { (POPULATION; ''DP''), (COURSE; ''logic''), (AVG_SCORE; ''A'') }

    , { (POPULATION; ''DP''), (COURSE; ''logic''), (AVG_SCORE; ''B'') }

    , { (POPULATION; ''DP''), (COURSE; ''logic''), (AVG_SCORE; ''C'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''set theory''), (AVG_SCORE; ''C'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''set theory''), (AVG_SCORE; ''D'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''set theory''), (AVG_SCORE; ''E'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''set theory''), (AVG_SCORE; ''F'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''logic''), (AVG_SCORE; ''C'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''logic''), (AVG_SCORE; ''D'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''logic''), (AVG_SCORE; ''E'') }

    , { (POPULATION; ''NON-DP''), (COURSE; ''logic''), (AVG_SCORE; ''F'') }

    }

    ```


    Note that the former specification of `tup_RESULT`, using the predicative method
    to specify a set, is highly preferred over the latter enumerative specification,
    because it explicitly shows us what the tuple constraints are (and it is a shorter
    definition too; much shorter in general).


    Now let’s continue with our example database design. Take a look at Listing 7-13,
    which defines tuple universe `tup_EMP` for the `EMP` table structure of the example
    database design.


    ## Listing 7-13. Tuple Universe `tup_EMP`


    ```

    tup_EMP :=

    { e | e∈Π(chr_EMP) ∧

    /* ========================= */

    /* Tuple constraints for EMP */

    /* ========================= */

    /* We hire adult employees only */

    e(BORN) + 18 ≤ e(HIRED) ∧

    /* Presidents earn more than 120K */

    e(JOB) = ''PRESIDENT'' ⇒ 12*e(MSAL) > 120000 ∧

    /* Administrators earn less than 5K */

    e(JOB) = ''ADMIN'' ⇒ e(MSAL) < 5000

    }

    ```


    **Note** In this definition, we assume that addition has been defined for values
    of type date (see Table 2-4), enabling us to add years to such a value.


    Are you starting to see how this works? Tuple universe `tup_EMP` is a subset of
    `Π(chr_EMP)`.


    All tuples that do not satisfy the tuple constraints (three in total) specified
    in the definition of `tup_EMP` are left out. You can use any of the logical connectives
    introduced in Table 1-2 of Chapter 1 in conjunction with valid attribute expressions
    to formally specify tuple constraints.


    Note that all ambiguity is ruled out by these formal specifications:


    - By “adult,” the age of 18 or older is meant. The `≤` symbol implies that the
    day someone turns 18 he or she can be hired.

    - The “K” in `120K` and `5K` (in the comments) represents the integer `1000` and
    not `1024`. The salaries mentioned (informally by the users and formally inside
    the specifications) are actually the monthly salary in the case of a `CLERK` and
    the yearly salary in the case of a `PRESIDENT`. This could be a habit in the real
    world, and it might be wise to reflect this in the formal specification too. Of
    course, you can also specify the predicate involving the `PRESIDENT` this way:
    `e(JOB) = ''PRESIDENT'' ⇒ e(MSAL) > 10000`.


    Listings 7-14 through 7-22 introduce the tuple universes for the other table structures
    in our database design. You’ll find embedded informal comments to clarify the
    tuple constraints.


    Note that tuple constraints are only introduced for table structures `GRD`, `CRS`,
    and `OFFR`; the other table structures happen to have no tuple constraints.


    ## Listing 7-14. Tuple Universe `tup_SREP`


    ```

    tup_SREP :=

    { s | s∈Π(chr_SREP) /* No tuple constraints for SREP */ }

    ```


    ## Listing 7-15. Tuple Universe `tup_MEMP`


    ```

    tup_MEMP :=

    { m | m∈Π(chr_MEMP) }

    ```


    ## Listing 7-16. Tuple Universe `tup_TERM`


    ```

    tup_TERM :=

    { t | t∈Π(chr_TERM) }

    ```


    ## Listing 7-17. Tuple Universe `tup_DEPT`


    ```

    tup_DEPT :=

    { d | d∈Π(chr_DEPT) }

    ```


    ## Listing 7-18. Tuple Universe `tup_GRD`


    ```

