    In Part 1 of this book, we presented two important mathematical disciplines: logic
    and set theory. These two disciplines are the most relevant ones in the application
    of mathematics to the field of databases.


    Chapter 1 offered an introduction to logic. We presented the concepts of a *proposition*
    and a *predicate*, and showed how you can use *logical connectives* (conjunction,
    disjunction, implication, equivalence, and negation) to describe compound propositions
    and predicates.


    The chapter ended by establishing the very important concept of a *rewrite rule*.
    You’ve seen many applications of rewrite rules throughout this book; they enable
    you to transform predicates into other equivalent predicates.


    Chapter 2 offered an introduction to set theory. We presented several ways to
    specify *sets*, discussed the concept of a *subset*, and explored the common set
    operators *union*, *intersection*, and *difference*. The chapter ended with a
    treatment of *powersets* and *ordered pairs*. As you saw in Part 2 of this book,
    set theory provides an excellent language to reliably describe complex database
    designs, data retrieval, and data manipulation.


    Chapter 3 continued the treatment of logic that was started in the first chapter.
