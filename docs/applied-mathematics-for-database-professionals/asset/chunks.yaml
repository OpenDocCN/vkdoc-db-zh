- fmt: 'Written as a query on `DUAL`, here is the property to look for, which would
    require `EMP_TAB03` to be validated in case of the execution of an `UPDATE` statement:

    ```sql

    select ''EMP_TAB03 is in need of validation''

    from DUAL

    where exists(select ''Some department just won a president/manager or just lost
    an administrator''

    from v_emp_ute

    where (n_job in (''PRESIDENT'',''MANAGER'') and

    o_job not in (''PRESIDENT'',''MANAGER'')

    or (o_job=''ADMIN'' and n_job<>''ADMIN'')

    or (o_deptno<>n_deptno and

    (o_job=''ADMIN'' or n_job in (''PRESIDENT'',''MANAGER''))))

    ```


    You can use the preceding query to create a more efficient update trigger in the
    same way as was shown for the insert and delete triggers in Listing 11-34.


    We refer to these queries on the transition effect views hereafter as *transition
    effect queries* (TE queries).


    `Note` We don’t know whether the DBMS can compute the TE queries (looking for
    the constraint-specific property) used in this execution model. Investigating
    the scientific research done in this area does not provide us with a clear answer
    to this question. Therefore, we cannot decisively say whether a DBMS should in
    principle be capable of supplying us with full declarative multi-tuple constraint
    support using execution model EM5.


    Listing 11-35 supplies the triggers for implementing the second example table
    constraint using execution model EM5. It assumes the code for maintaining the
    transition effect views for the `DEPT` table structure has already been set up
    in a similar way as the transition effect for `EMP` was set up in Listing 11-33.
    Note that constraint `DEPT_TAB01` does not require a delete trigger.


    **Listing 11-35.** *EM5 Implemention of DI Code for Constraint DEPT_TAB01*

    ```sql

    create trigger DEPT_AIS_TAB01

    after insert on DEPT

    declare pl_dummy varchar(40);

    begin

    -- If this returns no rows, then DEPT_TAB01 cannot be violated.

    select ''DEPT_TAB01 must be validated'' into pl_dummy

    from DUAL

    where exists (select ''A row has just been inserted''

    from v_dept_ite);

    --

    begin

    --

    select ''Constraint DEPT_TAB01 is satisfied'' into pl_dummy from DUAL

    where not exists(select m.DEPTNO

    from DEPT m

    where 2 < (select count(*)

    from DEPT d

    where d.MGR = m.MGR));

    --

    exception when no_data_found then

    --

    raise_application_error(-20999,''Constraint DEPT_TAB01 is violated.'');

    --

    end;

    exception when no_data_found then

    -- No need to validate DEPT_TAB01.

    null;

    --

    end;

    /


    create trigger DEPT_AUS_TAB01

    after update on DEPT

    declare pl_dummy varchar(40);

    begin

    -- If this returns no rows, then DEPT_TAB01 cannot be violated.

    select ''DEPT_TAB01 must be validated'' into pl_dummy

    from DUAL

    where exists (select ''A department manager has just been updated''

    from v_dept_ute

    where o_mgr<>n_mgr);

    --

    begin

    --

    select ''Constraint DEPT_TAB01 is satisfied'' into pl_dummy from DUAL

    where not exists(select m.DEPTNO

    from DEPT m

    where 2 < (select count(*)

    from DEPT d

    where d.MGR = m.MGR));

    --

    exception when no_data_found then

    --

    raise_application_error(-20999,''Constraint DEPT_TAB01 is violated.'');

    --

    end;

    exception when no_data_found then

    -- No need to validate DEPT_TAB01.

    null;

    --

    end;

    /

    ```


    Note that in the case of constraint `DEPT_TAB01`, execution models EM4 and EM5
    are equivalent.


    The question might arise whether testing for a certain property in the transition
    effect defeats its purpose. That’s because if performing this test is as costly
    as is running the actual constraint validation code, then what is your gain? In
    answer to this question, we can make the following observations:


    *   The number of rows in the transition effect is usually much smaller than the
    number of rows in the table structures that are involved in the constraint.

    *   The transition effect is always in cache, which cannot be said about all rows
    in the involved table structures.'
