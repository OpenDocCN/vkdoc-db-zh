    ⇒


    ( ( r1(EVAL) = -1 ∧ r2(EVAL) = -1 ) ∨


    ( r1(EVAL) ≠ -1 ∧ r2(EVAL) ≠ -1 )


    ) )


    }


    Do you notice that the first table constraint does *not* state { *COURSE*,STARTS,STUD}
    is uniquely identifying with a REG table? Considering that REG is a “child table”
    of CRS, you would typically expect COURSE to be part of the set of attributes.
    However, in the real world we don’t allow students to register for two offerings
    that start at the same date, whatever courses are involved in these offerings.
    Therefore, the reduced set {STARTS,STUD} is uniquely identifying in a REG table.
    Here too there is a wider limitation involving the duration of a course that will
    be specified in the definition of the database universe later on.


    The second table constraint states that within the registrations of a course offering,
    either all evaluations (still) hold value -1, or all of them hold a value that
    differs from -1\. Note that (quoting from the embedded comment) “evaluated by
    all attendees” includes the special value 0\. The idea here is that near the end
    of the course offering, the trainer explicitly changes—in a single transaction—all
    evaluation values from -1 (too early to evaluate) to 0 (not evaluated).


    The students then evaluate the offering individually, each in their own transaction.
    As you’ll see in the next chapter, you can formally specify this intended behavior
    through a dynamic (state transition) constraint.


    Listing 7-35 defines the last table universe (tab_HIST) regarding the HIST table
    structure.


    7451CH07.qxd 5/15/07 9:43 AM Page 167


    C H A P T E R 7 **■** S P E C I F Y I N G D ATA B A S E D E S I G N S


    **167**


    **Listing 7-35.** *Table Universe tab_HIST*


    tab_HIST :=


    { H | H∈℘(tup_HIST) ∧


    **/* Employee number and history end date uniquely identify a tuple */**


    ( ∀h1,h2∈H: h1↓{EMPNO,UNTIL} = h2↓{EMPNO,UNTIL} ⇒ h1 = h2 )


    ∧


    **/* Either department number or monthly salary (or both) */**


    **/* must have changed between two consecutive history records */**


    ( ∀h1,h2∈H:


    ( h1(EMPNO) = h2(EMPNO) ∧


    h1(UNTIL) < h2(UNTIL) ∧


    ¬ ( ∃h3∈T: h3(EMPNO) = h1(EMPNO) ∧


    h3(UNTIL) > h1(UNTIL) ∧


    h3(UNTIL) < h2(UNTIL) )


    ) ⇒


    ( h1(MSAL) ≠ h2(MSAL) ∨ h1(DEPTNO) ≠ h2(DEPTNO) )


    )


    }


    The first (unique identification) table constraint states that there can be at
    most one history record per employee per date. The second table constraint states
    that two consecutive history records (for the same employee) cannot have both
    an unchanged monthly salary and an unchanged department number; at least one of
    these attributes must have a different value. The way the table predicate specifies
    this is by universally quantifying over all pairs of HIST tuples (h1 and h2);
    if such a pair involves two consecutive HIST tuples for the same employee, then
    either the MSAL or the DEPTNO attribute values must differ. The fact that two
    HIST tuples are consecutive is specified by the existential quantification: there
    should not exist another (third) HIST tuple (h3) for the same employee that “sits
    in between” the other two tuples.


    Again, the formal specification for this constraint leaves no room for ambiguity.


    This concludes the treatment of the table universes of the example database design.
    The next section moves on the definition of the database universe. This definition
    will build on the table universes and will formally specify the database constraints.


    **Database Universe**


    You have now reached the last stepping stone (phase) of this book’s formal methodology
    to specify a database design. As with the other phases, it continues to build
    on the sets specified in the previous phase.


    You can use the table universes to build a *set of admissible database states*
    (we’ll demonstrate this shortly). Such a set is called a *database universe*.
    Every element in the database universe is an admissible database state for the
    database design.


    At the beginning of this chapter, we said, “Every database state is an admissible
    set of n tables (one per table structure).” Of course, this was loosely speaking.
    The way you formally represent a database state was introduced in Chapter 5; it
    is a function where every first element of a pair is a table structure name and
    every second element of a pair is a table. As you’ll see, this way of representing
    a database state is convenient; we can easily construct functions such as this
    using the already defined table universes.


    7451CH07.qxd 5/15/07 9:43 AM Page 168


    **168**


    C H A P T E R 7 **■** S P E C I F Y I N G D ATA B A S E D E S I G N S


    Let’s illustrate this with the RESULT table structure that was used in the previous
    sections.


    Because this section is about database constraints, we first introduce a second
    table structure to go along with the RESULT table structure. Let’s assume the
    existence of a LIMIT table structure. Here’s the external predicate for LIMIT:
    “Average score SCORE is not allowed for population POPULATION.” The idea is that
    the tuples in LIMIT limit the admissible tables for RESULT. We’ll specify precisely
    how they do so later on, by a database constraint.


    Listing 7-36 specifies characterization chr_LIMIT, tuple universe tup_LIMIT, and
    table universe tab_LIMIT.


    **Listing 7-36.** *Specifications for chr_LIMIT, tup_LIMIT, and tab_LIMIT*


    chr_LIMIT :=


    { ( POPULATION; {''DP'',''NON-DP''} )


    , ( SCORE; {''A'',''F''} )


    }


    tup_LIMIT :=


    { l | l∈Π(chr_LIMIT) ∧


    l(POPULATION) = ''DP'' ⇒ l(SCORE) = ''A'' ∧


    l(POPULATION) = ''NON-DP'' ⇒ l(SCORE) = ''F''


    }


    tab_LIMIT :=


    { L | L∈℘(tup_LIMIT) ∧


    ( ∀l1,l2∈L: l1(POPULATION) = l2(POPULATION) ⇒ l1 = l2 )


    }


    The tuple and table universes for LIMIT are rather small sets. Here is an enumerative
    specification for both of them:


    tup_LIMIT = { { (POPULATION;''DP'') , (SCORE;''A'') }


    , { (POPULATION;''NON-DP''), (SCORE;''F'') } }


    tab_LIMIT = { ∅


    , { { (POPULATION;''DP'') , (SCORE;''A'') } }


    , { { (POPULATION;''NON-DP''), (SCORE;''F'') } }


    , { { (POPULATION;''DP'') , (SCORE;''A'') }


    , { (POPULATION;''NON-DP''), (SCORE;''F'') } }


    }


    As you can see, there are only four admissible LIMIT tables: the empty table,
    two tables with one tuple, and one table with two tuples.


    **■Note** The unique identification table constraint in the specification of tab_LIMIT
    is in fact redundant. It is implied by the tuple constraints and the characterization.


    Figure 7-4 displays tab_LIMIT using the shorthand notation for tables.


    7451CH07.qxd 5/15/07 9:43 AM Page 169


    C H A P T E R 7 **■** S P E C I F Y I N G D ATA B A S E D E S I G N S


    **169**


    **Figure 7-4.** *Enumerative specification of tab_LIMIT using table shorthand
    notation* Given these two table structures, we can now take a look at a database
    state. Figure 7-5


    displays a database state, named DBS1, that involves the RESULT and LIMIT table
    structures.


    **Figure 7-5.** *Database state DBS1*


    As you can see, it is a function that holds two pairs. The first ordered pair
    holds—as the second coordinate—an admissible RESULT table (that is, an element
    of tab_RESULT). Likewise, the second ordered pair holds an admissible LIMIT table
    (that is, an element of tab_LIMIT).


    These tables are accessible via their table structure names: the values appearing
    as the first coordinates, RESULT and LIMIT. Using the definition of DBS1, you
    can write expressions such as DBS1(RESULT) and DBS1(LIMIT), which yield the displayed
    RESULT and LIMIT tables, respectively.


    Now take a look at the following *set* function named DBCHR: DBCHR := { (RESULT;
    tab_RESULT), (LIMIT; tab_LIMIT) }


    7451CH07.qxd 5/15/07 9:43 AM Page 170


    **170**


    C H A P T E R 7 **■** S P E C I F Y I N G D ATA B A S E D E S I G N S


    Set function DBCHR is called a *database characterization*. It characterizes a
    database in that it introduces the names of the table structures that are involved
    in a database design and attaches to them the relevant table universes (the sets
    that hold the admissible tables for each table structure).'
