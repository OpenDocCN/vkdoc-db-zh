    \ 表结构的属性名集合。该表达式表示集合 `{DEPTNO, DNAME, LOC, MGR}`。\n\n通过这个表头的定义，你现在对数据库设计中每个表结构所代表的内容——它想要表示什么——有了更深一步的理解。进一步澄清表结构及其属性的*含义*的一种方法是提供*外谓词*。外谓词是一个涉及表结构所有属性的英文句子，它提供了一个关于这些属性的陈述，解释了它们相互关联的含义。以下是\
