- fmt: '# Chapter 7 Specifying Database Designs


    ## Table


    ### External Predicate


    The employee with employee number `EMPNO` has name `ENAME`, job `JOB`, was born
    on `BORN`, is hired on `HIRED`, has a monthly salary of `MSAL` dollars within
    the `SGRADE` salary grade, is assigned to account `USERNAME`, and works for the
    department with department number `DEPTNO`.


    **SREP**

    The sales representative with employee number `EMPNO` has an annual sales target
    of `TARGET` dollars and a yearly commission of `COMM` dollars.


    **MEMP**

    The employee with employee number `EMPNO` is managed by the employee with employee
    number `MGR`.


    **TERM**

    The employee with employee number `EMPNO` has resigned or was fired on date `LEFT`
    due to reason `COMMENTS`.


    DEPT

    The department with department number `DEPTNO`, has name `DNAME`, is located at
    `LOC`, and is managed by the employee with employee number `MGR`.


    GRD

    The salary grade with ID `GRADE` has a lower monthly salary limit of `LLIMIT`
    dollars, an upper monthly salary limit of `ULIMIT` dollars, and a maximum yearly
    bonus of `BONUS` dollars.


    CRS

    The course with code `CODE` has description `DESCR`, falls in course category
    `CAT`, and has a duration of `DUR` days.


    OFFR

    The course offering for the course with code `COURSE` that starts on `STARTS`,
    has status `STATUS`, has a maximum capacity of `MAXCAP` attendees, is offered
    at location `LOC`, and (unless `TRAINER` equals -1) the offering has the employee
    with employee number `TRAINER` assigned as the trainer.


    REG

    The employee whose employee number is `STUD` has registered for a course with
    code `COURSE` that starts on `STARTS`, and (unless `EVAL` equals -1) has rated
    the course with an evaluation score of `EVAL`.


    HIST

    At date `UNTIL`, for the employee whose employee number is `EMPNO`, either the
    department or the monthly salary (or both) have changed. Prior to date `UNTIL`,
    the department for that employee was `DEPTNO` and the monthly salary was `MSAL`.


    Note: Have you spotted the two hacks? Apparently there are two sorts of offerings:
    offerings with a trainer assigned and offerings without one assigned. A similar
    remark can be made about registrations; some of them include an evaluation score
    for the course offering, and some of them don’t. In a properly designed database,
    you should have decomposed the offering and registration table structures into
    two table structures each.


    These external predicates give you an informal head start with regards to the
    meaning of all involved table structures and their attributes that were introduced
    by the database skeleton. The exact meaning of this example database design will
    become clear as we progress through all formal phases of a database universe definition
    in the sections that follow.


    The next section will supply a characterization for each table structure introduced
    in the skeleton.


    ## Characterizations


    As you saw in Chapter 4, a characterization defines the attribute value sets for
    the attributes of a given table structure. For a given table structure, the characterization
    is a set-valued function whose domain is the set of attributes of that table structure.
    For each attribute, the characterization yields the attribute value set for that
    attribute. The characterizations form the base on which the next section will
    build the tuple universes. You’ll then notice that the way these characterizations
    are defined here is very convenient. Take a look at Listing 7-2.


    It defines the characterization for the `EMP` table.


    Note: A few notes:

    - In defining the attribute value sets for the `EMP` table, we are using the shorthand
    names for sets that were introduced in Table 2-4.

    - We use `chr_<table structure name>` as a naming convention for the characterization
    of a table structure.

    - In the definition of `chr_EMP` (and in various other places) you’ll see a function
    called `upper`. This function accepts a case-sensitive string and returns the
    uppercase version of that string.'
