    # Chapter 2 Answers\n\n## Exercise 1\n\n**a.** TRUE; `3` is an element of set\
    \ `A`.\n\n**b.** Meaningless; the left operand should be a set.\n\n**c.** TRUE;\
    \ the empty set is a subset of every set.\n\n**d.** FALSE; there are only five\
