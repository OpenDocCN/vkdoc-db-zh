  trans: "\n### 表的构造\n\n#### **图 5-1.** 表 `T1` 的简写记法\n\n如你所见，这看起来像通常意义上的表（一个由列和行组成的二维图形）。但请记住，本书中的`表`是一组函数。这有两个重要的含义。首先，这意味着枚举函数的顺序是任意的；顺序无关紧要。其次，枚举有序对的顺序（在元组内）也同样无关紧要。因此，在前面的简写记法中，列标题（从左到右）的顺序和行（从上到下）的顺序并不重要。\n\
    \n##### ■注意\n\n在简写记法中，引入了属性的排序，因为现在每个元组中属性值的顺序必须对应于列标题的顺序。\n\n这种简写记法展示了一些处理表时常用的其他术语。如你所见，表\
    \ `T1` 是一个定义在 `{partno, name, instock, price}` 上的表。`T1` 中元组的这个共享域被称为表 `T1` 的`标题`（参见定义\
    \ 5-2）。\n\n##### ■定义 5-2：表的标题\n\n如果“`T` 是一个定义在 `H` 上的表”，那么 `H` 被称为 `T` 的标题。\n\n\
    在本书的剩余部分，我们将经常使用这种简写记法来说明特定的表。然而，你永远不应忘记，这仅仅是一种简写记法。在本书中，表被正式定义为一组函数，这些函数都拥有相同的定义域。\n\
    \n*这种表的正式定义使你能够以清晰、正式的方式处理表上的操作（本章稍后讨论）和数据完整性谓词（下一章讨论）。*\n\n#### 表的构造\n\n你可以通过将广义积应用于一个给定的集合函数来构造一个表。\n\
    \n让我们用一个例子来演示这一点。代码清单 5-2 展示了一个名为 `F1` 的集合函数。\n\n##### **代码清单 5-2.** 集合函数 `F1`\n\
    \n```\nF1 := { (X; {0,1,2})\n      ,(Y; {0,1,2})\n      ,(Z; {-1,0,1}) }\n```\n\
    \n集合函数 `F1` 的广义积将得到一个包含二十七个函数的集合（三乘三乘三）。代码清单 5-3 展示了这一结果。\n\n##### **代码清单 5-3.**\
    \ 集合函数 `F1` 的广义积\n\n```\n∏(F1) :=\n{ { (X;0), (Y;0), (Z;-1) }, { (X;0), (Y;0),\
    \ (Z;0) }, { (X;0), (Y;0), (Z;1) }\n, { (X;0), (Y;1), (Z;-1) }, { (X;0), (Y;1),\
    \ (Z;0) }, { (X;0), (Y;1), (Z;1) }\n, { (X;0), (Y;2), (Z;-1) }, { (X;0), (Y;2),\
    \ (Z;0) }, { (X;0), (Y;2), (Z;1) }\n, { (X;1), (Y;0), (Z;-1) }, { (X;1), (Y;0),\
    \ (Z;0) }, { (X;1), (Y;0), (Z;1) }\n, { (X;1), (Y;1), (Z;-1) }, { (X;1), (Y;1),\
    \ (Z;0) }, { (X;1), (Y;1), (Z;1) }\n, { (X;1), (Y;2), (Z;-1) }, { (X;1), (Y;2),\
    \ (Z;0) }, { (X;1), (Y;2), (Z;1) }\n, { (X;2), (Y;0), (Z;-1) }, { (X;2), (Y;0),\
    \ (Z;0) }, { (X;2), (Y;0), (Z;1) }\n, { (X;2), (Y;1), (Z;-1) }, { (X;2), (Y;1),\
    \ (Z;0) }, { (X;2), (Y;1), (Z;1) }\n, { (X;2), (Y;2), (Z;-1) }, { (X;2), (Y;2),\
    \ (Z;0) }, { (X;2), (Y;2), (Z;1) } }\n```\n\n在这个结果集中，每个函数都有相同的定义域 `{X, Y, Z}`；因此，该结果集是一个定义在\
    \ `{X, Y, Z}` 上的表。现在来看下面这个更实际的例子。代码清单 5-4 展示了一个零件的特征描述。对于一个零件，我们感兴趣的属性是零件号（`partno`）、名称（`name`）、该零件的库存数量（`instock`）以及零件价格（`price`）。\n\
    \n##### **代码清单 5-4.** 零件的特征描述\n\n```\nchr_PART := { (partno; [1..999])\n     \
    \      ,(name; varchar(12))\n           ,(instock; [0..99])\n           ,(price;\
    \ [1..500]) }\n```\n\n`chr_PART` 的广义积是一个相当大的表；它包含了使用 `chr_PART` 定义中给出的属性值集可以生成的所有*可能的*元组。请注意，本章开头介绍的表\
    \ `T1` 中的每一个元组都是 `∏(chr_PART)` 的一个元素。这使得 `T1` 成为 `∏(chr_PART)` 的一个子集。\n"
- fmt: "**■Note** `∏(chr_PART)`的每一个子集——不仅仅是`T1`——都是在属性集`{partno,name,instock,price}`上的一个表。\n\
    \n事实上，表`T1`中的每个元组都是基于`∏(chr_PART)`定义的以下集合（名为`T2`）中的一个元素：\n\n```\nT2 := { t | t∈∏(chr_PART)\
    \ ∧ ( t(price) ≥ 20 ⇒ t(instock) ≤ 10 )\n                    ∧ ( t(price) ≤ 5\
    \ ⇒ t(instock) ≥ 15 )\n         }\n```\n\n在`T2`的定义中，引入了两个限定`T2`内容的谓词。第一个条件指出，如果一个零件的价格大于或等于20，那么其库存数量应小于或等于10。第二个条件指出，如果一个零件的价格小于或等于5，那么其库存数量应大于或等于15。表`T2`——一个在`{partno,name,instock,price}`上的表——将包含且仅包含`∏(chr_PART)`中同时满足这两个条件的元组。请注意，由于`∏(chr_PART)`将包含许多违反其中一个或两个条件的元组，因此`T2`是`∏(chr_PART)`的一个真子集。由于`T1`的所有元组都符合这两个条件，因此`T1`是`T2`的一个子集。实际上，它是`T2`的一个真子集。\n\
    \n在第7章，我们将重新审视这种定义`T2`的方式；也就是说，取一个特征化（characterization）的广义乘积（generalized product）并“插入”额外的谓词。\n\
    \n## 数据库状态\n\n一个数据库是某个组织事物状态的表示。它由为每个我们想在数据库中记录的关于该组织的命题类型而设的表组成。本节将向你介绍通过*数据库状态*来形式化指定数据库的方法。\n\
    \n### 数据库状态的形式化表示\n\n让我们考虑一个简单的数据库设计，涉及两个表结构：一个用于员工，一个用于部门。看一下图5-2和图5-3中展示的表`EMP1`和`DEP1`。\n\
    \n7451CH05.qxd 5/4/07 3:57 PM Page 99\n\nC H A P T E R 5 **■** TA B L E S A N\
    \ D D ATA B A S E S TAT E S\n\n**99**\n\n#### 图5-2. 示例员工表`EMP1`\n\n#### 图5-3.\
    \ 示例部门表`DEP1`\n\n假设表`EMP1`和`DEP1`分别表示员工和部门表结构的当前状态。我们可以将由表`EMP1`和`DEP1`组成的*数据库状态*形式化地指定为一个函数。在这个函数中，有序对的第一个坐标代表表结构的*名称*，第二个坐标持有这些表结构的（当前）*值*——即表`EMP1`和`DEP1`。清单5-5给出了这个示例数据库状态的形式化说明。\n\
    \n#### 清单5-5. 持有表`EMP1`和`DEP1`的数据库状态`DBS1`\n\n```\nDBS1 :=\n{ (EMPLOYEE;\n   \
    \ { {(empno;101),(ename;'Chris'), (job;'MANAGER'),(sal;7900),(deptno;10)}\n  \
    \   ,{(empno;102),(ename;'Kathy'), (job;'TRAINER'),(sal;6000),(deptno;12)}\n \
    \    ,{(empno;103),(ename;'Thomas'),(job;'CLERK'), (sal;2100),(deptno;10)}\n \
    \    ,{(empno;104),(ename;'David'), (job;'TRAINER'),(sal;5600),(deptno;10)}\n\
    \     ,{(empno;105),(ename;'Renu'), (job;'CLERK'), (sal;3000),(deptno;12)}\n \
    \    ,{(empno;106),(ename;'Bob'), (job;'MANAGER'),(sal;8500),(deptno;10)}\n  \
    \   ,{(empno;107),(ename;'Sue'), (job;'CLERK'), (sal;2700),(deptno;12)} }\n  )\n\
    \ ,(DEPARTMENT;\n    { {(deptno;10),(dname;'RESEARCH'),(loc;'DENVER'), (salbudget;50000)}\n\
    \     ,{(deptno;11),(dname;'SALES'), (loc;'DENVER'), (salbudget;20000)}\n    \
    \ ,{(deptno;12),(dname;'SUPPORT'), (loc;'LOS ANGELES'), (salbudget;40000)}\n \
    \    ,{(deptno;13),(dname;'SALES'), (loc;'SAN FRANCISCO'),(salbudget;20000)} }\n\
    \  )\n}\n```\n\n**■Note** 我们本也可以将`DBS1`列为集合`{(EMPLOYEE;EMP1), (DEPARTMENT;DEP1)}`。\n\
    \n数据库状态`DBS1`是一个仅包含两个有序对的函数。列出的第一个有序对的第一个坐标是`EMPLOYEE`（我们为员工表结构选择的名称），对应的第二个坐标是表`EMP1`。同样，在第二个有序对中，你会注意到我们选择`DEPARTMENT`作为部门表结构的名称。在这个例子中，第二个坐标是表`DEP1`。"
  raw: '**■Note** Every subset of ∏(chr_PART)—not just T1—is a table over {partno,name,instock,price}.


    In fact, every tuple in table T1 is an element of the following set (named T2)
    that is based on ∏(chr_PART):


    T2 := { t | t∈∏(chr_PART) ∧ ( t(price) ≥ 20 ⇒ t(instock) ≤ 10 )


    ∧ ( t(price) ≤ 5 ⇒ t(instock) ≥ 15 )


    }


    Inside the definition of T2, two predicates are introduced that condition the
    contents of T2\. The first condition states that if the price of a part is 20
    or more, then the quantity in stock for this part should be 10 or less. The second
    condition states that if the price of a part is 5 or less, then the quantity in
    stock for this part should be 15 or more. T2—a table over


    {partno,name,instock,price}—will hold all and only those tuples of ∏(chr_PART)
    for which both these two conditions are true. Note that because ∏(chr_PART) will
    hold many tuples that violate one or both of these conditions, T2 is a proper
    subset of ∏(chr_PART). Because all tuples of T1 conform to these two conditions,
    T1 is a subset of T2\. In fact, it is a proper subset of T2.


    In Chapter 7 we’ll revisit this way of defining T2; that is, taking the generalized
    product of a characterization and “plugging in” additional predicates.


    **Database States**


    A database is a representation of the state of affairs of some organization. It
    consists of a table for every kind of proposition about this organization that
    we would like to record in the database. This section introduces you to a formal
    way of specifying a database via a *database state*.


    **Formal Representation of a Database State**


    Let’s consider a simple database design involving two table structures: one for
    employees and one for departments. Take a look at tables EMP1 and DEP1, which
    are displayed in Figures 5-2


    and 5-3.


    7451CH05.qxd 5/4/07 3:57 PM Page 99


    C H A P T E R 5 **■** TA B L E S A N D D ATA B A S E S TAT E S


    **99**


    **Figure 5-2.** *Example employee table EMP1*


    **Figure 5-3.** *Example department table DEP1*


    Let’s assume that tables EMP1 and DEP1 represent the current state of the employee
    and department table structures, respectively. We can formally specify the *database
    state* consisting of tables EMP1 and DEP1 as a function. In this function, the
    first coordinates of the ordered pairs represent the table structure *names* and
    the second coordinates hold the (current) *values*—tables EMP1 and DEP1—for these
    table structures. Listing 5-5 gives the formal specification of this example database
    state.


    **Listing 5-5.** *The Database State DBS1 Holding Tables EMP1 and DEP1*


    DBS1 :=


    { (EMPLOYEE;


    { {(empno;101),(ename;''Chris''), (job;''MANAGER''),(sal;7900),(deptno;10)}


    ,{(empno;102),(ename;''Kathy''), (job;''TRAINER''),(sal;6000),(deptno;12)}


    ,{(empno;103),(ename;''Thomas''),(job;''CLERK''), (sal;2100),(deptno;10)}


    ,{(empno;104),(ename;''David''), (job;''TRAINER''),(sal;5600),(deptno;10)}


    ,{(empno;105),(ename;''Renu''), (job;''CLERK''), (sal;3000),(deptno;12)}


    ,{(empno;106),(ename;''Bob''), (job;''MANAGER''),(sal;8500),(deptno;10)}


    ,{(empno;107),(ename;''Sue''), (job;''CLERK''), (sal;2700),(deptno;12)} }


    7451CH05.qxd 5/4/07 3:57 PM Page 100


    **100**


    C H A P T E R 5 **■** TA B L E S A N D D ATA B A S E S TAT E S


    )


    ,(DEPARTMENT;


    { {(deptno;10),(dname;''RESEARCH''),(loc;''DENVER''), (salbudget;50000)}


    ,{(deptno;11),(dname;''SALES''), (loc;''DENVER''), (salbudget;20000)}


    ,{(deptno;12),(dname;''SUPPORT''), (loc;''LOS ANGELES''), (salbudget;40000)}


    ,{(deptno;13),(dname;''SALES''), (loc;''SAN FRANCISCO''),(salbudget;20000)} }


    )


    }


    **■Note** We could have also listed DBS1 to equal the set {(EMPLOYEE;EMP1), (DEPARTMENT;DEP1)}.


    Database state DBS1 is a function containing just two ordered pairs. The first
    coordinate of the first ordered pair listed is EMPLOYEE (the name we chose for
    the employee table structure), and the corresponding second coordinate is table
    EMP1\. Likewise, in the second ordered pair you’ll notice that we chose DEPARTMENT
    as the name for the department table structure. In this case, the second coordinate
    is table DEP1.'
