    **表 1-3.** 逻辑连接词优先级规则

    | 优先级 | 连接词 |

    |------|------------|

    | ¬    |

    | ∧, ∨ |

    | ⇒, ⇔ |


    这些优先级规则规定，例如，下面这个没有包含括号的复合谓词 `P ∧ Q ⇒ R`，实际上应被解释为 `(P ∧ Q) ⇒ R`——而不是解释为 `P ∧ (Q
    ⇒ R)`，后者是另一个不同的谓词（即具有不同的含义）。


    当涉及相同优先级的连接词时，通常让它们将其操作数从右向左结合；这有时被称为结合律规则。这意味着谓词 `P ⇒ Q ⇒ R` 实际上应被解释为 `P ⇒ (Q
    ⇒ R)`。


    考虑以下两个示例谓词，并留意括号的用法：

    1. `¬(P ⇒ Q) ⇔ (P ∧ ¬Q)`

    2. `((P ⇒ Q) ∧ (Q ⇒ R)) ⇒ (P ⇒ R)`


    在第一个例子中，第一组括号是必需的——否则否定将仅作用于 `P`。第二组括号可以省略，因为 `∧` 的优先级高于 `⇔`。在第二个例子中，左侧最外层的括号是可选的，右侧的括号也是如此（由于结合律规则），但另外两组括号是必需的。


