- fmt: 'If the DI code for a given deferrable constraint finds that this constraint
    is violated, it can store this information in a session temporary table. And if
    the DI code finds that the constraint is satisfied again, then it deletes the
    associated record from the session temporary table. You can set up this session
    temporary table in a way that whenever this table holds a record, a transaction
    cannot successfully commit. Take a look at **Listing 11-42**, which defines this
    session temporary table.


    **Listing 11-42.** *Table for Storing Temporary Violations*


    ```sql

    create global temporary table current_violations

    (constraint_name varchar(30) not null

    ,constraint all_satisfied_at_commit check(0=1) initially deferred

    ,constraint curvio_pk primary key(constraint_name))

    on commit preserve rows;

    ```


    Do you see the trick that''s used? The way this session temporary table (`on commit
    preserve rows`) and the `all_satisfied_at_commit` constraint (`initially deferred`)
    are set up allows DI code to insert records in the `current_violations` table.
    However, at the same time it disables transactions from committing successfully
    when there are still records in this table, thereby preventing transactions from
    committing when a deferrable constraint is in violation.


    As you''ll probably agree, bringing deferred execution into the picture complicates
    the execution model substantially:


    - DI code for deferrable constraints must now appropriately insert and delete
    from the `current_violations` table.

    - You must extend all DI code with procedural code that rechecks all constraints
    that are currently registered in the `current_violations` table. To be able to
    perform the recheck without having to replicate DI code for deferrable constraints,
    you''ll need to move current DI code from the trigger bodies into stored procedures;
    this enables you to call this code from other triggers too.

    - You might want a more efficient execution model than the one outlined so far.


    Currently a deferrable constraint (one that is in violation) is rechecked on every
    subsequent DML statement. For a given subsequent DML statement, you can deduce
    whether rechecking a constraint is even sensible or not. For instance, if a subsequent
    DML statement operates on a table that is not involved in the deferrable constraint,
    then this DML statement can never restore a violation of the deferrable constraint.
    To prevent unnecessary rechecks, you''ll only want to run the recheck if the subsequent
    DML statement is such that it could potentially restore a violation.


    **Note:** In fact, you can determine this by using the transition effect to guard
    such re-execution of DI code for a deferrable constraint. Instead of querying
    the transition effect to verify if a DML statement can violate a constraint, you
    now do the inverse: query the transition effect to verify if a DML statement can
    restore a constraint.


    This concludes the outline of an execution model for deferred checking. We wrap
    up this section with one important observation with regards to deferrable constraints.


    There is a serious problem with allowing constraints to be temporarily violated
    inside transactions. You run the risk of getting incorrect results from queries
    executing in these transactions. For instance, assume that constraint `PSPEC1`
    is currently violated due to the fact that in the current transaction an insert
    of a new sales reps into the `EMP` table structure has not yet been followed by
    a corresponding insert into the `SREP` table structure. Now suppose you want to
    determine the number of sales reps. When you write data retrieval statements,
    you normally assume that all constraints are satisfied. Under these circumstances,
    there are two ways to find the number of sales reps:


    ```sql

    select count(*)

    from EMP

    where JOB=''SALESREP'';

    ```


    ```sql

    select count(*)

    from SREP;

    ```


    Note that when `PSPEC1` is violated in the way just described, then the first
    `SELECT` expression will return the correct result, and the second `SELECT` expression
    will return an incorrect result. Actually, in the given intermediate database
    state you might argue whether the number of sales reps is at all defined, because
    two supposedly equivalent query expressions return different results. Getting
    incorrect results is a serious problem when you allow constraints to be temporarily
    violated.


    **Note:** The real solution for preventing this problem is to add the concept
    of a *multiple assignment* to the SQL language. We refer you to papers written
    by Chris Date and Hugh Darwen on this subject (see Appendix C).


    Having explored various matters concerning the implementation of DI code in a
    triggered procedural approach, we conclude this chapter with a short introduction
    to a framework that can assist you in implementing DI code.


    ## The RuleGen Framework


    Having seen the various examples of DI code in this chapter, you can imagine that
    as the number of constraints that you have implemented grows, maintaining them
    can become quite a challenge. Our example database design only has about 50 multi-tuple
    constraints.


    Real-world database designs typically have hundreds—if not over a thousand—multi-tuple
    constraints, most of which cannot be stated declaratively to the DBMS.


    For every constraint that you implement, you are repeating a lot of code over
    and over again; the parts that differ for each constraint are the *TE queries*,
    the *validation query*, and the *serialization code*. Wouldn''t it be great if
    you could just register these three for a given constraint and have some piece
    of software generate all the required row and statement triggers for you?


    Over the past few years one of the authors—Toon Koppelaars—has developed a framework,
    called `RuleGen`, that does just this. `RuleGen` implements execution model `EM6`,
    including the outlined enhancements necessary to cater for deferrable constraints.


    You register a constraint within `RuleGen` by populating a few tables of its repository.
    This involves information about the constraint, its involved tables and involved
    columns, the TE queries, the validation query, and the serialization code. Given
    this information, `RuleGen` will fully generate the necessary row and statement
    triggers for each involved table. Row triggers will maintain the transition effect
    that the statement triggers use. Statement triggers will validate the necessary
    constraints.


    By the time this book is available, we expect to have made available more information
    about the `RuleGen` framework. If you are interested in this framework, you can
    find up-to-date information, documentation, and papers at `http://www.rulegen.com/am4dp`.
    We''ll also maintain a download on this site of all DI code for the constraints
    involved in the example database universe described in this book.'
