    ## 证明等价是重态


    **Table 1-12.** *Proving That an Equivalence Is a Tautology*


    | **P** | **Q** | **P** ⇒ **Q** | ¬**P** | ¬**P** ∨ **Q** | **(P** ⇒ **Q)** ⇔
    **(**¬**P** ∨ **Q)** |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | T | T | T | F | T | T |

    | T | F | F | F | F | T |

    | F | T | T | T | T | T |

    | F | F | T | T | T | T |


    如表 1-12 所示，最后一列仅包含 `TRUE`。*这个重态是一个重要的重写规则，允许你将蕴涵转换为析取（反之亦然）。* 如果你遇到一个命题形式——或命题形式内的组成部分——其形式为
    `P ⇒ Q`，那么你就可以用 `¬P ∨ Q` 来替换它。


    表 1-13 列出了最重要和最知名的重写规则，按命名类别划分。使用这些重写规则，你可以在复合谓词中替换一个组成部分（与重写规则任一侧匹配的部分），而无需改变复合谓词的含义。


    ## 重要重写规则列表


    **Table 1-13.** *Some Important Rewrite Rules*


    | **Category** | **Rewrite Rule** |

    | :--- | :--- |

    | Idempotence | `( P ∧ P ) ⇔ P` |

    | | `( P ∨ P ) ⇔ P` |

    | Double negation | `P ⇔ ¬¬P` |

    | Commutativity | `( P ∧ Q ) ⇔ ( Q ∧ P )` |

    | | `( P ∨ Q ) ⇔ ( Q ∨ P )` |

    | | `( P ⇔ Q ) ⇔ ( Q ⇔ P )` |

    | Associativity | `( ( P ∧ Q ) ∧ R ) ⇔ ( P ∧ ( Q ∧ R ) )` |

    | | `( ( P ∨ Q ) ∨ R ) ⇔ ( P ∨ ( Q ∨ R ) )` |

    | *Continued* | |


    **Table 1-13.** *Continued*


    | **Category** | **Rewrite Rule** |

    | :--- | :--- |

    | Distribution | `( ( P ∨ Q ) ∧ R ) ⇔ ( ( P ∧ R ) ∨ ( Q ∧ R ) )` |

    | | `( ( P ∧ Q ) ∨ R ) ⇔ ( ( P ∨ R ) ∧ ( Q ∨ R ) )` |

    | De Morgan Laws | `¬ ( P ∨ Q ) ⇔ ( ¬P ∧ ¬Q )` |

    | | `¬ ( P ∧ Q ) ⇔ ( ¬P ∨ ¬Q )` |

    | Special cases | `( P ∧ TRUE ) ⇔ P` |

    | | `( P ∨ FALSE ) ⇔ P` |

    | | `( P ∨ TRUE ) ⇔ TRUE` |

    | | `( P ∧ FALSE ) ⇔ FALSE` |

    | | `( P ∧ ¬P ) ⇔ FALSE` |

    | | `( P ∨ ¬P ) ⇔ TRUE` |

    | Implication rewrite | `( P ⇒ Q ) ⇔ ( ¬P ∨ Q )` |


    前述 19 条重写规则构成了数据库专业人员的关键知识。其中大多数在直觉上是显而易见的。分配律和德摩根定律可能需要多思考一下，才能看出它们实际上也相当直观。我们将在第
    3 章的第一节花更多时间讨论这些重写规则。


    重写规则将帮助你完成制定查询和数据完整性约束的任务。它们对数据库管理系统也至关重要；它们允许优化器以这样的方式重写谓词，使得可替代的执行计划（可能具有更好的性能）在保证所有情况下结果相同的同时变得可用。


    ## 使用现有重写规则证明新规则


    假设你想研究以下逻辑等价，看看它是否是一个重写规则：


    `( P ⇒ Q ) ⇔ ( ( P ∧ ¬Q ) ⇒ FALSE )`


    **■ 注意** 这条规则的效果是将命题变量 `Q` 移到蕴涵的左边，并在过程中否定它；右侧被简化为一个常量 `FALSE`。这种技巧类似于在算术中求解二次方程（`ax^2
    + bx + c = 0`）的方式，事实证明，在实现非平凡约束时，这也是一种有用的技术，正如你将在本书第 11 章中看到的。


    你可以使用真值表，如前所示，但你也可以使用现有的重写规则（例如表 1-13 中列出的规则）来证明这个逻辑等价实际上是一个重态。


    表 1-14 展示了这样的证明可能的样子。这里我们利用了前面提到的、能够将蕴涵转换为析取（反之亦然）的重写规则：`( P ⇒ Q ) ⇔ (¬P ∨ Q )`


    **Table 1-14.** *Proving Rewrite Rules with Rewrite Rules*


    | **Input Expression** | **Equivalent Expression** | **Comment** |

    | :--- | :--- | :--- |

    | `( P ⇒ Q )` | ⇔ `( ( P ⇒ Q ) ∨ FALSE )` | 平凡；表 1-13 中的第二个特例 |

    | | ⇔ `( ( ¬P ∨ Q ) ∨ FALSE )` | 将蕴涵转换为析取 |

    | | ⇔ `( ( ¬P ∨ ¬¬Q ) ∨ FALSE )` | 双重否定 |

    | | ⇔ `( ¬ ( P ∧ ¬Q ) ∨ FALSE )` | 德摩根定律 |

    | | ⇔ `( ( P ∧ ¬Q) ⇒ FALSE )` | 将析取转换为蕴涵 |


    这完成了证明；我们从已知的规则中推导出了一条新的重写规则，而没有使用真值表。如果你回顾表 1-7 中蕴涵连接词的定义，我们上面的新重写规则是有道理的；它恰好对应于蕴涵返回
    `FALSE` 的唯一情况，也称为 *破碎的承诺*。'
