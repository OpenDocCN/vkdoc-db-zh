    \ by either executing a `COMMIT` statement (requesting the DBMS to persistently\
    \ store the changes made by this transaction), or by executing a `rollback` statement\
    \ (requesting the DBMS to abort and undo the changes made by the current transaction).\
    \ After ending a transaction, you can start a new one again by executing another\
    \ (first) DML statement. All changes made by a transaction—that has not yet committed—are\
    \ only visible to that transaction; other transactions cannot see these changes.\
    \ Once a transaction commits, the changes it made become visible to other transactions.\n\
    \n**Note:** Here we’re assuming that the DBMS is running in the read-committed\
    \ isolation mode—the mode most often used within Oracle’s installed base.\n\n\
    Of course, all constraints must be satisfied at the end of a transaction (when\
    \ it commits)."
