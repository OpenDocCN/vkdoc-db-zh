    Formal specification FEa queries all employees for which the set of distinct courses
    given by De Haan in 2003 is a subset of the set of courses for which an offering
    (taught by De Haan) was attended by the employee in 2003\. Note that for an employee
    to have attended a course offering, the following must be true:


    **1.** He or she must be registered for that offering.


    **2.** That offering must have status confirmed.


    Specification FEb is a rewrite of the subset operator in FEa into quantifiers
    that follow from the definition of the subset operator. Set A is a subset of B
    if and only if every element of A is an element of B.


    (A ⊆ B) ⇔ (∀a∈A: ∃b∈B: b=a)


    The rewrite rule that we have applied is slightly more sophisticated; it is of
    the following structure:


    { a | a∈A ∧ P(a) } ⊆ { b | b∈B ∧ Q(b) }


    ⇔


    (∀a1∈{ a2 | a2∈A ∧ P(a2) }: (∃b∈B: b=a1 ∧ Q(b)))


    SQL does not support all set operators: *union*, *intersection*, and *difference*
    are available; *symmetric difference* is not, nor is the *subset of* operator.
    Fortunately, you can rewrite the subset operator using other available set operators:


    (A ⊆ B) ⇔ ((A − B) = ∅)


    Set A is a subset of B if and only if the difference A minus B represents the
    empty set. To check for an empty set in SQL, you would have to apply one more
    rewrite rule: ((A − B) = ∅) ⇔ (#(A − B) = 0)


