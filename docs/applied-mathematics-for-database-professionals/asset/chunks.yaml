    This concludes the investigation of developing DI code for database constraints.
    The next section takes a look at implementing transition constraints.


    **Implementing Transition Constraints**


    Please go back to Listing 8-8 and take a moment to recall the transition constraints
    of our example database universe.


    Do you notice that the way the state transition constraints are specified is not
    different from the way you would specify a database constraint? They are predicates
    that involve two or more parameters of type table. Of course, in the case of transition
    constraints, these parameters always represent old and new snapshots of involved
    table structures. But in essence, a transition constraint is a predicate involving
    multiple table structures. This means that the complexity involved in implementing
    DI code for transition constraints is in principle not different from the complexity
    involved in database constraints.


    A transition constraint deals with a transaction’s begin state and end state.
    As explained before, transactions are implemented in SQL by the consecutive execution
    of DML statements. Such implementation not only creates intermediate database
    states, but—in the context of this section—also creates *intermediate state transitions*.
    Formally you would only need to validate the transition from the begin state to
    the end state of the transaction. DI code for transition constraints should only
    execute after the last DML statement of the transaction has created the end state;
    that is, its execution should be deferred to the end of the transaction.


    In the section “Bringing Deferred Checking into the Picture,” you’ll find a brief
    exploration of deferring execution of DI code. For now we’ll demonstrate how you
    can develop DI code for transition constraints (in the triggered procedural strategy),
    such that all intermediate state transitions satisfy them too.


    **■Note** As you probably know, there is no support whatsoever in current SQL
    DBMSes to implement transition constraints declaratively.


    If you start thinking about implementing transition constraints, you’ll immediately
    hit this question: “In an after statement trigger, how do I query the old snapshot
    of an involved table structure?” The answer happens to be simple. In Oracle’s
    SQL DBMS you can use *flashback queries* to do exactly that: query an old snapshot
    of a table structure.


    To be able to use a flashback query on a table structure, you’ll somehow need
    to administer what the *system change number* was when the transaction started.
    You can do this using a packaged variable, or a session temporary table. Note
    that only the table structures whose old snapshot is involved in any of the state
    transition constraints will ever need to be queried using a flashback query. So
    it is safe to administer the system change number only when a DML statement changes
    one of these table structures; you can use pre-statement triggers for this that
    determine the current system change number via dbms_flashback.get_system_


    change_number and store that in the packaged variable or session table. In the
    following example, we’ll assume these triggers are already in place.


