- fmt: '# C H A P T E R 9 ■ D ATA R E T R I E VA L


    209


    ```sql

    ,d.DNAME

    ,count(e.EMPNO) as NUM_EMP

    ,nvl(sum(e.MSAL),0) as SUM_MSA

    from DEPT d

    ,EMP e

    where d.DEPTNO = e.DEPTNO (+)

    group by d.DEPTNO,d.DNAME

    ```


    Do you see how the additional attributes `NUM_EMP` and `SUM_MSAL` are constructed
    for the query result? Query `EXQ5` returns a table over `{DEPTNO,DNAME,NUM_EMP,SUM_MSAL}`.
    For every tuple in `dbs(DEPT)`, a tuple appears in the result set. The first two
    attributes are drawn directly from a tuple of `dbs(DEPT)`. You specify the other
    two attributes (`NUM_EMP` and `SUM_MSAL`) separately and add them to the first
    two attributes through tuple union. You specify the value for `NUM_EMP` as the
    cardinality of the set that holds all employees for the current department. In
    a similar way, you specify the value for attribute `SUM_MSAL` by employing the
    `SUM` aggregate operator.


    The difference between `FEa` and `FEb` is the “moment” at which the department
    tuples are limited to attributes `DEPTNO` and `DNAME`. Specification `FEa` performs
    tuple limitation in the expression before the bar (`|`); `FEb` performs table
    projection on the table to which variable `d` is bound (after the bar).


    You should note the following:

    - The formal specification for this query states that empty departments (the ones
    that do not employ any employee) will be returned in the result set.

    - Both the `NUM_EMP` as well as the `SUM_MSAL` attributes have well-defined values
    for the empty departments. The cardinality of the empty set is well defined (it
    is zero), and we’ve defined the sum operator (see Definition 2-12) such that the
    sum of any expression over the empty set is equal to zero.


    Let’s now look at the SQL expressions `SEI`, `SEII`, and `SEIII`. Here is a fine
    example of where the can of worms (mentioned in the book’s Introduction) is opened.


    Specification `SEI` follows the formal specification for this query; subqueries
    are used to compute the number of employees and the sum of the salaries. However,
    note that SQL’s `count` operator is defined to be zero for the empty table, but
    SQL’s `sum` operator is defined to return `NULL` when performed over an empty
    table. To ensure that in the cases where the department employs no employees the
    SQL query will return 0 (zero) as the sum of the salaries, we have employed the
    dyadic `NVL` function. The semantics of this function are as follows: if the first
    argument represents a value other than `NULL`, then `NVL` returns this first argument,
    otherwise `NVL` returns the second argument.


    Specification `SEII` is often produced for these types of questions. You perform
    a join from `DEPT` to `EMP`, and by grouping the rows (`GROUP BY`), you can compute
    the two aggregate attributes. However, note that this SQL query won’t return empty
    departments, and therefore doesn’t represent a correct SQL version for our original
    query. By the way, because this query only returns departments that employ at
    least one employee, the `SUM` aggregation will never result in `NULL`, and therefore
    you can discard the `NVL`.


    Now, if you are a proficient SQL programmer, you probably know how to fix this,
    right?


    Specification `SEIII` represents the repaired version for `SEII`; it employs the
    outer join to ensure that empty departments are returned too in the result set.
    The addition of `(+)` behind `e.DEPTNO` changes the semantics of the original
    join into an outer join *from table `DEPT` to table `EMP`*. Outer joins will also
    return a row for the “from” table when no matching row can be found in the “to”
    table; an all-NULLs row will be generated and used to combine with the “from”
    table row.


    7451CH09.qxd 5/7/07 11:28 AM Page 210


    210


    You should be aware, though, that in the repaired query `SEIII`, you must now
    change the `count(*)` into—for instance—`count(e.EMPNO)` to have SQL return the
    correct value of zero employees for the `NUM_EMP` attribute (`count(*)` would
    have returned one for empty departments). Yes, the can of worms is wide open now.'
