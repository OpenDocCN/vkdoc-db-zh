    **319**


    **Table Universe for DEPT**


    ***External Predicate:** The department with department number DEPTNO has name
    DNAME,* *is located at LOC, and is managed by the employee with employee number
    MGR.*


    The following three listings (A-14, A-15, and A-16) show the attribute-value sets,
    the tuple universe, and the table universe for DEPT, respectively.


    **Listing A-14.** *Characterization chr_DEPT*


    **chr_DEPT :=**


    { ( DEPTNO; DEPTNO_TYP )


    , ( DNAME; { s | s∈varchar(12) ∧ upper(DNAME) = DNAME } )


