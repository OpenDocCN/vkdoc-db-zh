    **清单 3-9.** 幂等性


    `( P ∧ P ) ⇔ P`

    `( P ∨ P ) ⇔ P`


    ## 双重否定（或对合律）


    如果你应用两次否定，你应该会得到原来的运算对象。换句话说，否定运算起到补集的作用，如清单 3-10 所示。


    **清单 3-10.** 双重否定


    `¬¬P ⇔ P`


    ## 吸收律


    吸收律的性质不那么为人熟知，乍一看可能有点难以理解。它们列在清单 3-11 中。


    **清单 3-11.** 吸收律（“P 吸收 Q”）


    `( P ∨ ( P ∧ Q ) ) ⇔ P`

    `( P ∧ ( P ∨ Q ) ) ⇔ P`


    第一条吸收律说明，在两个谓词的析取式中（例如 `R1 ∨ R2`），如果其中一个析取项（例如右边的 `R2`）比另一个析取项（`R1`）更强，那么可以省略
    `R2` 而不影响该谓词的真值。


    **注意** 回想一下第 1 章“谓词强度”一节的内容，谓词 `R2` 比谓词 `R1` 强，当且仅当 `R2 ⇒ R1`。在第一条吸收律中，右边的析取项
    `P ∧ Q` 总是比 `P`（左边的析取项）更强，因为谓词 `(P ∧ Q) ⇒ P` 是一个重言式。


    类似地，第二条吸收律说明，在两个谓词的合取式中，例如 `R1 ∧ R2`，如果其中一个合取项（例如右边的 `R2`）比另一个合取项（`R1`）更弱，那么可以省略
    `R2` 而不影响该谓词的真值。


    这两个吸收等价式的证明留作本章末尾的练习。


    ## 量词


    第 1 章阐明了命题和谓词的区别。它讨论了如何将谓词转化为命题。有两种方法可以实现这个目标：

    * 为谓词中的参数提供具体的值。

    * 通过量化来绑定谓词中的参数。


    第一种方法很直接，在第 1 章已有解释；本节解释第二种方法。


    为了使用量化来实现这个目标，你必须首先定义谓词的参数（例如 `x`）允许从中选取值的集合。通过对这个可能值集合进行量化，你就可以说明*有多少*这些可能值具有某种特定属性（此时谓词被转化为命题）。例如，你可以说恰好有
    42 个 `x` 的值具有某种属性。然而，两种最常见的量化陈述如下：

    * 存在某个 `x` 的值，使得 [包含 `x` 的陈述句] 为真。

    * 对于所有 `x` 的值，[包含 `x` 的陈述句] 为真。


    第一个陈述说明了至少存在一个值；因此它被称为*存在*量化。第二个陈述被称为*全称*量化，因为你陈述了关于给定集合所有元素的性质。你可以用两个符号来表示存在和全称量词，如表
    3-1 所示。


    **表 3-1.** 存在量词和全称量词


    | 符号 | 描述 |

    | :--- | :--- |

    | `∃` | 存在量词（存在...） |

    | `∀` | 全称量词（对于所有...） |


    令 `P(x)` 和 `Q(y)` 为给定的谓词，其参数分别为 `x` 和 `y`。令集合 `A` 表示参数 `x` 的可能取值集合，集合 `B` 为 `y`
    的可能取值集合。使用量化的表达式的通用语法如清单 3-12 所示。


    **清单 3-12.** 通用量词语法


    `∃x∈A: P(x)`

    `∀y∈B: Q(y)`


    这两个表达式的含义定义如下：

