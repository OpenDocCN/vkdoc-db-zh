    A P P E N D I X A


    Formal Definition of Example


    Database


    **I**n this appendix, we deliver the formal specification of the example database
    design used throughout this book.


    The section “Bird’s Eye Overview” provides a bird’s-eye overview of the example
    database; it shows a picture of the ten tables with their relationships, and it
    provides brief informal descriptions of those tables and relationships.


    We then present you with a definition of the *database skeleton* DB_S. In the
    section “Database Skeleton DB_S” you can find the involved attributes for each
    table, including a brief description for each attribute.


    The biggest section of this appendix is the section “Table Universe Definitions,”
    providing the ten *table universe* definitions. For each table, you’ll find the
    table universe specification that formally defines all attribute, tuple, and table
    constraints that are applicable for that table, alongside the external predicate
    (describing the meaning of the table to the user).


    The appendix ends with the definition of the *static* database constraints through
    a specification of the *database universe* DB_UEX in the section “Database Universe
    DB_UEX,” followed by the *dynamic* constraints through a specification of the
    *state transition universe* TX_UEX in the section “State Transition Universe TX_UEX.”
    The following table summarizes the structure of this appendix and shows how the
    specification of the example database design is built up, starting from a skeleton
    all the way up to a database and state transition universe.


