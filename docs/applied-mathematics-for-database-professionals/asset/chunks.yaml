    **Handling Three-Valued Logic**


    Consider the following two rather obvious statements (in an SQL context):


    • A row shows up in a table (or in the result of a query) or it doesn’t.


    • A constraint gets violated or it doesn’t.


    There are no other possibilities; therefore, these are two-valued issues. However,
    in 3VL, predicates have three possible outcomes: TRUE, FALSE, or UNKNOWN. Unfortunately,
    there is no intuitive interpretation for this third possible outcome. To give
    you an idea of the inconsisten-cies, look at Table D-5 where you see the difference
    between evaluating the predicate, say P, of a WHERE clause of an SQL query compared
    with checking the predicate of an SQL CHECK


    constraint.


    **Table D-5.** *Predicate Evaluation in SQL: Queries vs. Constraints* **P(row)**


    **WHERE P(row)**


    **CHECK(P(row))**


    **T**


    Row accepted


    Row satisfies constraint


    **F**


    Row rejected


    Row violates constraint


    **U**


    Row rejected


    Row satisfies constraint


    As you can see, FALSE and UNKNOWN lead to the same result for WHERE clauses in
    queries, whereas TRUE and UNKNOWN lead to the same effect in constraints. The
    third line in the preceding table shows the discrepancy; a row will violate the
    predicate (and therefore not be retrieved) when the predicate is part of a WHERE
    clause. However, that row will satisfy the predicate when evaluated by a CHECK
    constraint that is defined on a table that receives this row.


    If you want to get control over 3VL in ISO-standard SQL, it is a good idea to
    think in terms of the three SQL functions introduced in Table D-6\. They allow
    you to create a 2VL layer on top of 3VL, thus providing more explicit control
    over the three Boolean values TRUE, FALSE, and UNKNOWN.


